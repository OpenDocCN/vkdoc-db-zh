    \n```\nF7 := { (A;2), (C;2), (D;4), (E;4) }\n```\n\n指定函数 `F7` 的另一种有效方法是使用函数应用表示法；只需为每个定义域元素指定其值域元素是什么：\n\
    ```\nF7(A) = 2\nF7(C) = 2\nF7(D) = 4\nF7(E) = 4\n```\n\n你可能从过去的数学课上已经熟悉了这种表示法。这里是一个典型函数\
    \ `F` 的规范示例：`F(x) := 3x2 - 2x + 1`\n\n给定函数 `F`，你会写像 `F(2)` 这样的表达式，在这个例子中它的求值结果为\
    \ 9（三乘以四，减去二乘以二，加上一）。\n\n同一个函数 `F` 的集合论规范如下（假设我们想在集合 **Z** 上定义此函数并映射到集合 **Z**\
    \ 内）：\n```\nF := { (x; 3x2 - 2x + 1) | x∈Z }\n```\n\n这里我们使用了代入法以集合论的方式指定函数 `F`。\n\
    \n## 恒等函数\n\n如果集合 `A` 是函数 `f` 的定义域，并且对于集合 `A` 中的所有元素 `x`，`f` 的 `x` 都等于 `x`，则函数\
    \ `f` 称为**在 `A` 上的恒等函数**。我们使用记法 `id(A)` 来表示在 `A` 上的恒等函数。\n\n这里有几个例子：\n```\nid({1,2,3})\
    \ = { (1;1), (2;2), (3;3) }\nid({deptno}) = { (deptno;deptno) }\nid({course,startdate})\
    \ = { (course;course), (startdate;startdate) }\n```\n\n## 函数的子集\n\n在本节中，我们将简要研究函数的子集。因为函数是一个集合，所以你可以构造一个函数的子集。列表\
    \ 4-4 提供了前一节介绍的函数 `F2 := { (X;2), (Y;1), (Z;2) }` 的每一个（真）子集。\n\n**列表 4-4. 函数 F2\
    \ 的所有真子集**\n\n```\n{ (X;2), (Y;1) }\n{ (X;2), (Z;2) }\n{ (Y;1), (Z;2) }\n{ (X;2)\
    \ }\n{ (Y;1) }\n{ (Z;2) }\n∅\n```\n\n如你所见，`F2` 的每一个真子集本身又是一个函数。确实，这对于每个函数都成立。对于一个给定的函数\
    \ `F`，`F` 的每一个真子集也将是一个函数。\n\n## 小结\n\n至此，集合论函数的介绍结束。因为函数是一个重要的概念，将在本书的其余部分被广泛使用，我们在此做一个简要总结。\n\
    *   函数是一个二元关系，因此是一个**有序对的集合**。\n*   在函数中，**每个第一坐标只出现一次**。\n*   你可以使用一个函数来指定数据库设计的某个部分。\n\
    \n本章的标题被特意选为“关系与函数”，因为我们认为你应该被介绍给（至少是）二元关系的数学概念。\n\n`n-元`关系（即不仅仅是二元关系）这一更一般的概念是由\
    \ E. F. Codd 引入数据库领域的一个基石概念。二元关系的概念足以满足本书中将发展的用于指定数据库设计的数学方法的需要。其他教科书处理——并在其方法中使用——`n-元`关系的概念。它们也以不同于本书处理二元关系特例（即函数）的方式来使用\
    \ `n-元`关系。为了避免混淆，本书从现在开始将明确不再使用*二元关系*或*关系*这些术语。\n\n## 函数上的操作\n\n因为函数是集合，所以你可以应用集合运算符——并集、交集和差集——以函数作为其操作数。本节将探讨这些集合运算符在函数上的应用。\n\
    \n### 并集、交集与差集\n\n数学家总是对运算符的**闭包性质**感兴趣。在本章的上下文中，我们问自己：在集合上封闭的并集、交集和差集运算符，在函数上是否也是封闭的？换句话说，当你对两个函数应用这些运算符时，结果是否仍然是另一个函数？\n\
    \n看下面的例子，它引入了两个函数 `G1` 和 `G2`，并展示了这两个函数的并集的结果：\n```\nG1 := { (a;1), (b;2), (c;3)\
    \ }\nG2 := { (a;2), (d;4) }\nG1 ∪ G2 = { (a;1), (b;2), (c;3), (a;2), (d;4) }\n\
    ```\n\n这个例子说明了两个函数的并集不一定产生一个函数，因为函数 `G1` 和 `G2` 并集的结果包含了两个具有相同第一坐标的**不同**有序对：`(a;1)`\
    \ 和 `(a;2)`。\n\n再看另一个例子：\n```\nG3 := { (empno;999), (ename;'Toon Koppelaars'),\
    \ (born;'14-feb-1965') }\nG4 := { (empno;999), (occupation;'IT architect') }\n\
    G3∪G4 = { (empno;999), (ename;'Toon Koppelaars'),\n           (born;'14-feb-1965'),\
    \ (occupation;'IT architect') }\n```\n"
- fmt: '# 函数集合理论


    ## 函数的并集与兼容性


    函数 `G3` 和 `G4` 的并集结果仍然是一个函数。这是因为 `G3(empno) = G4(empno)`，并且 `empno` 是两个函数共有的唯一定义域元素。在并集结果中，元素
    `(empno,999)` 不会重复出现两次。


    现在应该不难理解两个函数为了使其并集仍构成一个函数所需具备的一般性质。这个性质被称为两个函数的*兼容性*或*可连接性*。定义 4-3 正式规定了这一特定性质。


    **定义 4-3：兼容（可连接）函数**

    “函数 `F` 与函数 `G` 兼容” ⇔

    ```

    ( ∀c∈(dom(F)∩dom(G)): F(c)=G(c) )

    ```

    当且仅当对于两个函数共有的每一个第一坐标（即，可以从两个函数的定义域的交集中选取的坐标），相应的第二坐标匹配时，这两个函数才是兼容的。只有当两个函数兼容时，它们的并集才会产生另一个函数。


    > 注意：定义 4-3 认为两个没有共同第一坐标的函数总是兼容的。如下例所示，这样两个函数的并集确实是一个函数：

    > ```

    > G5 := { (deptno,1), (dname,''Natural Join''), (location,''Utrecht'') }

    > G6 := { (invoice,''inv123''), (amount,3500) }

    > G5 ∪ G6 = { (deptno,1), (dname,''Natural Join''), (location,''Utrecht''), (invoice,''abc123''),
    (amount,3500) }

    > ```

    > 如果两个函数没有共同的第一坐标，那么它们的并集就不会包含两个具有相同第一坐标的有序对。实际上，对于两个没有共同第一坐标的函数，这个性质总是成立的。然而，在实践中，这样的并集可能是没有意义的。


    ## 函数的交集与差集


    现在来看两个函数的交集，这里重用示例函数 `G1` 到 `G6`：

    ```

    G1 ∩ G2 = ∅

    G3 ∩ G4 = { (empno,999) }

    G5 ∩ G6 = ∅

    ```

    函数 `G1` 和 `G2` 的交集是空集；没有有序对同时是 `G1` 和 `G2` 的元素。函数 `G3` 和 `G4` 的交集正是那个第一坐标出现在 `dom(G3)`
    和 `dom(G4)` 的交集中（坐标 `empno`）且满足性质 `G3(empno) = G4(empno)` 的单元素有序对。最后，函数 `G5` 和
    `G6` 的交集是空集；尽管这两个函数是兼容的，但它们没有共同的第一坐标，更不用说有一个有序对了。


    两个函数的交集结果总是一个函数。一个简单的理解方式是，任何两个给定*集合*的交集总是这两个给定集合的子集；设 `A` 和 `B` 是两个集合，则 `(A ∩
    B) ⊆ A` 且 `(A ∩ B) ⊆ B`。两个函数的交集将是这两个函数的子集，因此是一个函数（回顾“函数的子集”一节，及清单 4-4）。


    两个函数的差集总是一个函数。这与两个函数交集的推理相同。集合 `A` 和集合 `B` 的差集——`A` 减 `B`——总是集合 `A` 的子集。


    ## 函数的限制


    在本书的第 2 部分，我们经常会对给定函数的一个子集感兴趣。我们只想考虑那些第一坐标可以从函数定义域的某个给定子集中选取的有序对。这引出了*函数的限制*这一概念。定义
    4-4 定义了函数的限制这一概念。


    **定义 4-4：函数的限制**

    设 `F` 是一个函数，`A` 是一个集合。函数 `F` 在集合 `A` 上的限制；记作 `F↓A`，定义如下：

    ```

    F↓A := { p | p∈F ∧ π₁(p)∈A }

    ```

    函数 `F` 在集合 `A` 上的限制是 `F` 的一个子集，该子集只包含那些第一坐标是集合 `A` 元素的有序对。让我们用清单 4-5 中的几个例子来说明这一点。其中重用了前面提到的函数
    `G5`。


    **清单 4-5：函数限制示例**

    ```

    { (X,2), (Y,1) }↓{X} = { (X,2) }

    { (X,2), (Z,2) }↓{Z} = { (Z,2) }

    { (X,2), (Z,2), (Y,1) }↓{X,Y,Z} = { (X,2), (Z,2), (Y,1) }

    G5↓{dname,location} = { (dname,''Natural Join''), (location,''Utrecht'') }

    G5↓∅ = ∅

    ```

    注意，函数的限制*总是*会产生另一个函数；如果你在空集上进行限制，结果是空函数。


    有了这个限制运算符，你就能给出两个函数兼容性的另一种定义；即，为了使两个函数的并集产生另一个函数，这两个函数应具备的性质。见定义 4-5。


    **定义 4-5：函数兼容性（可连接性）的替代定义（使用限制）**

    “函数 `F` 与函数 `G` 兼容” ⇔ `F↓(dom(F)∩dom(G)) = G↓(dom(F)∩dom(G))`


    当两个函数被限制到其定义域的交集时，如果得到的限制是相等的，那么这两个函数就是兼容的（可连接的）。


    ## 集合函数


    在本书的第 2 部分中，我们将需要的另一个概念是*集合函数*的概念。集合函数将被用作*数据库全域*定义的基础：这是在第 2 部分将介绍的数据库设计的形式化规范。


    如你所知，函数是一个有序对的集合，而有序对是一个顺序很重要的两个元素的对。


    > **注意**：对于允许作为有序对坐标出现的元素类型，没有施加任何限制。它们可以具有任意的复杂性。例如，坐标可以是集合。


    集合函数是一种函数，其中每一个有序对都以一个集合作为其第二坐标。定义 4-6 正式定义了这个概念。


    **定义 4-6：集合函数**

    “`F` 是一个集合函数” ⇔ `F` 是一个函数，并且 `(∀c∈dom(F): F(c) 是一个集合)`


    从这个定义可以看出，集合函数是一种函数，其中每个值域元素都是一个集合（可能是空集）。清单 4-6 提供了集合函数的各种示例。


    **清单 4-6：集合函数示例**

    ```

    H1 := { (X,{1,2,3,4,5}), (Y,{1,2,3,4}) }

    H2 := { (X,{1,2}), (Z,{3,4}) }

    H3 := { (company,{''Natural Join'',''Centraal Boekhuis'',''Oracle'',''Remmen &
    De Brock''}), (location,{''Utrecht'',''Culemborg'',''De Meern'',''Eindhoven''})
    }

    H4 := { (empno,[1..99]), (ename,varchar(10)), (born,date), (job,{''CLERK'',''SALESMAN'',''TRAINER'',''MANAGER'',''PRESIDENT''}),
    (salary,[1000..4999]) }

    ```

    第一个例子 `H1` 是一个函数（没有第一坐标出现超过一次）。它是一个集合函数，因为 `H1(X)` 和 `H1(Y)` 都求值为集合值；分别是 `{1,2,3,4,5}`
    和 `{1,2,3,4}`。第二个例子，函数 `H2`，也是一个集合函数，因为 `H2(X) = {1,2}` 且 `H2(Z) = {3,4}`。


    ## 特征化


    你可以认为集合函数 `H3` 通过其有序对的第一坐标枚举了一个公司的两个方面：公司名称（坐标 `company`）和公司位置（坐标 `location`）。这样的第一坐标被称为*属性*。


    附属于这些属性的是值集——作为有序对的第二坐标——可以被认为是代表了公司这些属性的可能值集合。同样，你可以认为集合函数 `H4` 表征了一名员工。注意 `H4`
    的定义使用了一些在表 2-3 中引入的集合规范简写形式。'
  raw: 'The result of the union of functions G3 and G4 does result in a function.
    This is because G3(empno) = G4(empno), and empno is the only domain element that
    both functions have in common. In the result of the union, you don’t repeat element
    (empno;999) twice.


    It shouldn’t be too difficult now to conceive of the generic property that two
    functions should have for the union of those two functions to result in a function.
    This property is called *compatibility* or *joinability* of two functions. Definition
    4-3 formally specifies this particular property.


    **■Definition 4-3: Compatible (Joinable) Functions** “Function F is compatible
    with function G” ⇔


    ( ∀c∈(dom(F)∩dom(G)): F(c)=G(c) )


    Two functions are compatible if and only if for every first coordinate that the
    two functions have in common (that is, that can be chosen from the intersection
    of the domains of both functions), the corresponding second coordinates match.
    Only if two functions are compatible will the union of those two functions result
    in another function.


    7451CH04.qxd 5/4/07 2:43 PM Page 76


    **76**


    C H A P T E R 4 **■** R E L AT I O N S A N D F U N C T I O N S


    Note that Definition 4-3 considers two functions that have no first coordinate
    in common always to be compatible. As the following example illustrates, the union
    of two such functions is indeed a function:


    G5 := { (deptno;1), (dname;''Natural Join''), (location;''Utrecht'') }


    G6 := { (invoice;''inv123''), (amount;3500) }


    G5 ∪ G6 = { (deptno;1), (dname;''Natural Join''), (location;''Utrecht''), (invoice;''abc123''),
    (amount;3500) }


    If two functions have no first coordinate in common, then the union of those two
    functions won’t hold two different ordered pairs with the same first coordinate.
    In fact, this is a property that is always true for two functions with no common
    first coordinate(s). However, in practice such unions will be meaningless.


    Now let’s take a look at the intersection of two functions and reuse the example
    functions G1 through G6 for this:


    G1 ∩ G2 = ∅


    G3 ∩ G4 = { (empno;999) }


    G5 ∩ G6 = ∅


    The intersection of functions G1 and G2 is empty; there is no ordered pair that
    is an element of both G1 and G2\. The intersection of functions G3 and G4 is precisely
    the singleton ordered pair for which the first coordinate appears in the intersection
    of dom(G3) and dom(G4) (coordinate empno), and the property G3(empno) = G4(empno)
    holds. Finally, the intersection of functions G5 and G6 is empty; although these
    two functions are compatible, there is no first coordinate that they have in common,
    let alone an ordered pair.


    The result of an intersection of two functions will always be another function.
    A simple way to understand this is to realize that the intersection of any two
    given *sets* will always be a subset of both given sets; let A and B be two sets,
    then (A ∩ B) ⊆ A and (A ∩ B) ⊆ B. The intersection of two functions will be a
    subset of both two functions, and therefore a function (recall the section “Subset
    of a Function,” with Listing 4-4).


    The difference of two functions will always be a function. This is due to the
    same reasoning as with the intersection of two functions. The difference of set
    A and set B—A minus B—will always be a subset of set A.


    **Limitation of a Function**


    In Part 2 of this book, we’ll often be interested in a subset of a given function.
    Instead of all ordered pairs, we’ll only want to consider those ordered pairs
    whose first coordinate can be chosen from some given subset of the domain of the
    function. This leads us to the concept of a *limitation* of a function. Definition
    4-4 defines the concept of a limitation of a function.


    **■Definition 4-4: Limitation of a Function** Let F be a function and A a set.
    The limitation of function F on set A; notation F↓A is defined as follows:


    F↓A := { p | p∈F ∧ π (p)∈A }


    7451CH04.qxd 5/4/07 2:43 PM Page 77


    C H A P T E R 4 **■** R E L AT I O N S A N D F U N C T I O N S


    **77**


    The limitation of a function F on set A is the subset of F that only holds those
    ordered pairs for which the first coordinate is an element of set A. Let’s illustrate
    this with a few examples in Listing 4-5\. The aforementioned function G5 is reused
    in this listing.


    **Listing 4-5.** *Example Limitations of Functions*


    { (X;2), (Y;1) }↓{X} = { (X;2) }


    { (X;2), (Z;2) }↓{Z} = { (Z;2) }


    { (X;2), (Z;2), (Y;1) }↓{X,Y,Z} = { (X;2), (Z;2), (Y;1) }


    G5↓{dname,location} = { (dname;''Natural Join''), (location;''Utrecht'') }


    G5↓∅=∅


    Note that a limitation of a function *always* results in another function; if
    you limit on the empty set the result is the empty function.


    With the availability of this limitation operator, you’re able to give an alternative
    definition for compatibility of two functions; that is, the property two functions
    should have in order for the union of those two functions to result in another
    function. See Definition 4-5


    for this alternative definition.


    **■Definition 4-5: Alternative Definition for Compatibility (Joinability) of Functions**
    **Using Limitation** “Function F is compatible with function G” ⇔ F↓(dom(F)∩dom(G))
    =


    G↓(dom(F)∩dom(G))


    Two functions are compatible (joinable) if, when limited to the intersection of
    their domains, these resulting limitations are equal.


    **Set Functions**


    Another concept that we’ll need in Part 2 of this book is the concept of a *set
    function*. Set functions will be used as the foundation for the definition of
    a *database universe*: a formal specification of a database design that will be
    introduced in Part 2.


    As you know by now, a function is a set of ordered pairs, and an ordered pair
    is a pair of two elements for which the order is significant.


    **■Note** No limitations have been put on the type of an element that is allowed
    to appear as a coordinate of an ordered pair. They can be of arbitrary complexity.
    For instance, coordinates are allowed to be sets.


    A set function is a function in which every ordered pair holds a set as its second
    coordinate. Definition 4-6 formally defines this concept.


    7451CH04.qxd 5/4/07 2:43 PM Page 78


    **78**


    C H A P T E R 4 **■** R E L AT I O N S A N D F U N C T I O N S


    **■Definition 4-6: Set Function** “F is a set function” ⇔ F is a function and
    (∀c∈dom(F): F(c) is a set)


    As you can read from this definition, a set function is a function in which every
    range element is a set (possibly the empty set). Listing 4-6 provides various
    examples of set functions.


    **Listing 4-6.** *Example Set Functions*


    H1 := { (X;{1,2,3,4,5}), (Y;{1,2,3,4}) }


    H2 := { (X;{1,2}), (Z;{3,4}) }


    H3 := { (company;{''Natural Join'',''Centraal Boekhuis'',''Oracle'',''Remmen &
    De Brock''})


    , (location;{''Utrecht'',''Culemborg'',''De Meern'',''Eindhoven''}) }


    H4 := { (empno;[1..99])


    , (ename;varchar(10))


    , (born;date)


    , (job;{''CLERK'',''SALESMAN'',''TRAINER'',''MANAGER'',''PRESIDENT''})


    , (salary;[1000..4999]) }


    The first example H1 is a function (no first coordinate appears more than once).
    It is a set function because both H1(X) and H1(Y) evaluate to set values; {1,2,3,4,5}
    and {1,2,3,4}, respectively. The second example, function H2, is also a set function
    because H2(X) = {1,2}


    and H2(Z) = {3,4}.


    **Characterizations**


    You can consider set function H3 to enumerate, through the first coordinates of
    its ordered pairs, two aspects of a company: the name of the company (coordinate
    company) and the location of the company (coordinate location). Such first coordinates
    are referred to as *attributes*.


    Attached to these attributes are the value sets—as second coordinates of the ordered
    pairs—


    that could be considered to represent the set of possible values for these attributes
    of a company. Equally, you can consider set function H4 to characterize an employee.
    Note that the definition of H4 uses some of the set specification shorthand that
    was introduced in Table 2-3.'
  trans: '# 函数集合理论


    ## 函数的并集与兼容性


    函数 `G3` 和 `G4` 的并集结果仍然是一个函数。这是因为 `G3(empno) = G4(empno)`，并且 `empno` 是两个函数共有的唯一定义域元素。在并集结果中，元素
    `(empno,999)` 不会重复出现两次。


    现在应该不难理解两个函数为了使其并集仍构成一个函数所需具备的一般性质。这个性质被称为两个函数的*兼容性*或*可连接性*。定义 4-3 正式规定了这一特定性质。


    **定义 4-3：兼容（可连接）函数**

    “函数 `F` 与函数 `G` 兼容” ⇔

    ```

    ( ∀c∈(dom(F)∩dom(G)): F(c)=G(c) )

    ```

    当且仅当对于两个函数共有的每一个第一坐标（即，可以从两个函数的定义域的交集中选取的坐标），相应的第二坐标匹配时，这两个函数才是兼容的。只有当两个函数兼容时，它们的并集才会产生另一个函数。


    > 注意：定义 4-3 认为两个没有共同第一坐标的函数总是兼容的。如下例所示，这样两个函数的并集确实是一个函数：

    > ```

    > G5 := { (deptno,1), (dname,''Natural Join''), (location,''Utrecht'') }

    > G6 := { (invoice,''inv123''), (amount,3500) }

    > G5 ∪ G6 = { (deptno,1), (dname,''Natural Join''), (location,''Utrecht''), (invoice,''abc123''),
    (amount,3500) }

    > ```

    > 如果两个函数没有共同的第一坐标，那么它们的并集就不会包含两个具有相同第一坐标的有序对。实际上，对于两个没有共同第一坐标的函数，这个性质总是成立的。然而，在实践中，这样的并集可能是没有意义的。


    ## 函数的交集与差集


    现在来看两个函数的交集，这里重用示例函数 `G1` 到 `G6`：

    ```

    G1 ∩ G2 = ∅

    G3 ∩ G4 = { (empno,999) }

    G5 ∩ G6 = ∅

    ```

    函数 `G1` 和 `G2` 的交集是空集；没有有序对同时是 `G1` 和 `G2` 的元素。函数 `G3` 和 `G4` 的交集正是那个第一坐标出现在 `dom(G3)`
    和 `dom(G4)` 的交集中（坐标 `empno`）且满足性质 `G3(empno) = G4(empno)` 的单元素有序对。最后，函数 `G5` 和
    `G6` 的交集是空集；尽管这两个函数是兼容的，但它们没有共同的第一坐标，更不用说有一个有序对了。


    两个函数的交集结果总是一个函数。一个简单的理解方式是，任何两个给定*集合*的交集总是这两个给定集合的子集；设 `A` 和 `B` 是两个集合，则 `(A ∩
    B) ⊆ A` 且 `(A ∩ B) ⊆ B`。两个函数的交集将是这两个函数的子集，因此是一个函数（回顾“函数的子集”一节，及清单 4-4）。


    两个函数的差集总是一个函数。这与两个函数交集的推理相同。集合 `A` 和集合 `B` 的差集——`A` 减 `B`——总是集合 `A` 的子集。


    ## 函数的限制


    在本书的第 2 部分，我们经常会对给定函数的一个子集感兴趣。我们只想考虑那些第一坐标可以从函数定义域的某个给定子集中选取的有序对。这引出了*函数的限制*这一概念。定义
    4-4 定义了函数的限制这一概念。


    **定义 4-4：函数的限制**

    设 `F` 是一个函数，`A` 是一个集合。函数 `F` 在集合 `A` 上的限制；记作 `F↓A`，定义如下：

    ```

    F↓A := { p | p∈F ∧ π₁(p)∈A }

    ```

    函数 `F` 在集合 `A` 上的限制是 `F` 的一个子集，该子集只包含那些第一坐标是集合 `A` 元素的有序对。让我们用清单 4-5 中的几个例子来说明这一点。其中重用了前面提到的函数
    `G5`。


    **清单 4-5：函数限制示例**

    ```

    { (X,2), (Y,1) }↓{X} = { (X,2) }

    { (X,2), (Z,2) }↓{Z} = { (Z,2) }

    { (X,2), (Z,2), (Y,1) }↓{X,Y,Z} = { (X,2), (Z,2), (Y,1) }

    G5↓{dname,location} = { (dname,''Natural Join''), (location,''Utrecht'') }

    G5↓∅ = ∅

    ```

    注意，函数的限制*总是*会产生另一个函数；如果你在空集上进行限制，结果是空函数。


    有了这个限制运算符，你就能给出两个函数兼容性的另一种定义；即，为了使两个函数的并集产生另一个函数，这两个函数应具备的性质。见定义 4-5。


    **定义 4-5：函数兼容性（可连接性）的替代定义（使用限制）**

    “函数 `F` 与函数 `G` 兼容” ⇔ `F↓(dom(F)∩dom(G)) = G↓(dom(F)∩dom(G))`


    当两个函数被限制到其定义域的交集时，如果得到的限制是相等的，那么这两个函数就是兼容的（可连接的）。


    ## 集合函数


    在本书的第 2 部分中，我们将需要的另一个概念是*集合函数*的概念。集合函数将被用作*数据库全域*定义的基础：这是在第 2 部分将介绍的数据库设计的形式化规范。


    如你所知，函数是一个有序对的集合，而有序对是一个顺序很重要的两个元素的对。


    > **注意**：对于允许作为有序对坐标出现的元素类型，没有施加任何限制。它们可以具有任意的复杂性。例如，坐标可以是集合。


    集合函数是一种函数，其中每一个有序对都以一个集合作为其第二坐标。定义 4-6 正式定义了这个概念。


    **定义 4-6：集合函数**

    “`F` 是一个集合函数” ⇔ `F` 是一个函数，并且 `(∀c∈dom(F): F(c) 是一个集合)`


    从这个定义可以看出，集合函数是一种函数，其中每个值域元素都是一个集合（可能是空集）。清单 4-6 提供了集合函数的各种示例。


    **清单 4-6：集合函数示例**

    ```

    H1 := { (X,{1,2,3,4,5}), (Y,{1,2,3,4}) }

    H2 := { (X,{1,2}), (Z,{3,4}) }

    H3 := { (company,{''Natural Join'',''Centraal Boekhuis'',''Oracle'',''Remmen &
    De Brock''}), (location,{''Utrecht'',''Culemborg'',''De Meern'',''Eindhoven''})
    }

    H4 := { (empno,[1..99]), (ename,varchar(10)), (born,date), (job,{''CLERK'',''SALESMAN'',''TRAINER'',''MANAGER'',''PRESIDENT''}),
    (salary,[1000..4999]) }

    ```

    第一个例子 `H1` 是一个函数（没有第一坐标出现超过一次）。它是一个集合函数，因为 `H1(X)` 和 `H1(Y)` 都求值为集合值；分别是 `{1,2,3,4,5}`
    和 `{1,2,3,4}`。第二个例子，函数 `H2`，也是一个集合函数，因为 `H2(X) = {1,2}` 且 `H2(Z) = {3,4}`。


    ## 特征化


    你可以认为集合函数 `H3` 通过其有序对的第一坐标枚举了一个公司的两个方面：公司名称（坐标 `company`）和公司位置（坐标 `location`）。这样的第一坐标被称为*属性*。


    附属于这些属性的是值集——作为有序对的第二坐标——可以被认为是代表了公司这些属性的可能值集合。同样，你可以认为集合函数 `H4` 表征了一名员工。注意 `H4`
    的定义使用了一些在表 2-3 中引入的集合规范简写形式。'
- fmt: '# 4 关系与函数


    ## 特征描述


    当使用一个集合函数来描述现实世界的某物时，它被称为一个*特征描述*，方法是列出相关的属性以及每个属性的可接受值的集合。相关属性是有序对的第一个坐标，可接受值集合是它们各自对应的第二个坐标。


    我们将特征描述的有序对的第一个坐标称为该特征描述的*属性*，将第二个坐标称为相应属性的*属性值集合*。


    如前所述，集合函数 `H4` 可被视为一个表示雇员属性的特征描述。在这种情况下，你只对表示每个雇员的编号（属性 `empno`）、姓名（属性 `ename`）、出生日期（属性
    `born`）、职业（属性 `job`）和薪水（属性 `salary`）感兴趣。


    ## 外部谓词


    看待特征描述还有另一种方式。它们可以被视为刻画了现实世界中的一个谓词；特征描述引入了谓词的（名称）参数以及这些参数可以取值的相应值集合。例如，特征描述 `H4`
    刻画了以下谓词：员工 `ENAME` 被分配员工编号 `EMPNO`，出生于日期 `BORN`，担任职位 `JOB`，并拥有每月 `SALARY` 美元的薪水。


    这个谓词有五个参数（`ENAME`、`EMPNO`、`BORN`、`JOB`、`SALARY`），对应于 `H4` 中的五个第一坐标。该谓词是一个自然语言句子，描述了所涉及属性的含义和关联。在本书的第二部分，一个特征描述将作为表设计的基础。表设计的特征描述所刻画的谓词代表了用户对该表设计所理解的含义。这样的谓词被称为该表的*外部谓词*。


    ## 集合函数的泛化乘积


    介绍了集合函数后，我们现在可以建立集合函数的*泛化乘积*概念（乍一看，这常常被认为是一个复杂的概念）。泛化乘积以一个集合函数作为操作数，并产生一个新的*函数集合*。


    泛化乘积运算符是第二个关键的垫脚石，仅次于第2章引入的幂集运算符。使用这两个集合运算符，我们将能够构造通常相当大的*值集合*、*元组*集合（此处引入）、*表*集合（在第5章引入）以及一个*数据库状态*集合（在第5章引入）。在第7章，我们将演示一种方法，该方法涉及将这些值集合定义为数据库设计的形式化规范的构建块。


    一个集合函数 `F` 的泛化乘积，记作 `∏(F)`，生成一个包含所有*可能*函数的集合，这些函数与 `F` 具有相同的定义域，并且这些函数中的有序对的第二坐标*选自（即，是）在
    `F` 中与相同第一坐标相关联的集合*。定义 4-7 正式定义了泛化乘积运算符。


    ### 定义 4-7：集合函数的泛化乘积

    设 `F` 为一个集合函数。`F` 的泛化乘积，记作 `∏(F)`，定义如下：


    ```

    ∏(F) = { f | f 是函数 ∧ dom(f) = dom(F) ∧ (∀c∈dom(f): f(c) ∈ F(c)) }

    ```


    此定义中的最后一个合取项规定，由该运算符生成的每个函数，其第二坐标都是集合函数中相应集合（第二坐标）的元素。清单 4-7 给出了一些例子，可以快速说明当你将此运算符应用于集合函数时的效果。此清单中重用了上一节中的集合函数
    `H2` 和 `H3`。


    ### 清单 4-7. *泛化乘积的应用示例*

    ```

    ∏({ (a;{1,2,3}), (b;{4,5}) }) =

    { {(a;1), (b;4)}

    , {(a;1), (b;5)}

    , {(a;2), (b;4)}

    , {(a;2), (b;5)}

    , {(a;3), (b;4)}

    , {(a;3), (b;5)} }


    ∏(H2) = { {(X;1), (Z;3)}

    , {(X;1), (Z;4)}

    , {(X;2), (Z;3)}

    , {(X;2), (Z;4)} }


    ∏(H3) = { {(company;''Natural Join''), (location;''Utrecht'')}

    , {(company;''Natural Join''), (location;''Culemborg'')}

    , {(company;''Natural Join''), (location;''De Meern'')}

    , {(company;''Natural Join''), (location;''Eindhoven'')}

    , {(company;''Centraal Boekhuis''), (location;''Utrecht'')}

    , {(company;''Centraal Boekhuis''), (location;''Culemborg'')}

    , {(company;''Centraal Boekhuis''), (location;''De Meern'')}

    , {(company;''Centraal Boekhuis''), (location;''Eindhoven'')}

    , {(company;''Remmen & De Brock''), (location;''Utrecht'')}

    , {(company;''Remmen & De Brock''), (location;''Culemborg'')}

    , {(company;''Remmen & De Brock''), (location;''De Meern'')}

    , {(company;''Remmen & De Brock''), (location;''Eindhoven'')}

    , {(company;''Oracle''), (location;''Utrecht'')}

    , {(company;''Oracle''), (location;''Culemborg'')}

    , {(company;''Oracle''), (location;''De Meern'')}

    , {(company;''Oracle''), (location;''Eindhoven'')} }

    ```


    第一个示例将泛化乘积应用于集合函数 `{(a;{1,2,3}), (b;{4,5})}`。我们称这个集合函数为 `S1`。`S1` 的定义域是 `{a,b}`。对
    `S1` 应用泛化乘积得到的*函数集合*包含六个元素，每个元素都是一个函数。第一个列举的函数是 `{(a;1), (b;4)}`。我们称这个函数为 `f1`。函数
    `f1` 与集合函数 `S1` 具有相同的定义域：`dom(S1) = dom(f1) = {a,b}`。


    还要注意以下命题成立：`f1(a)∈S1(a)` 和 `f1(b)∈S1(b)`。第一个命题求值为 `1∈{1,2,3}`，为真；第二个求值为 `4∈{4,5}`，也为真。这两个命题的合取对应于定义
    4-7 中的全称量化。同样地，你可以验证第一个示例中列出的其他五个函数也符合定义 4-7。


    第二个示例在结果集合中有四个函数。同样，你可以看到这些函数的每一个的定义域都等于 `{X,Z}`，这等同于 `dom(H2)`。


    在第三个示例中，应用于特征描述 `H3` 的泛化乘积产生一个包含 16 个函数的集合。每个函数都可以被视为表示一个基于公司示例特征描述 `H3` 的实际可能公司。


    我们将集合函数的泛化乘积的结果集中的函数称为*元组*。注意，这样的集合函数通常表示一个特征描述。元组的元素——有序对——被称为该元组的*属性-值对*。在关系数据库设计中，一个元组表示现实世界中的一个命题（参见边栏“封闭世界假设”）。


    你看出清单 4-7 中结果集的基数是如何计算的吗？


    ```

    #∏({ (a;{1,2,3}), (b;{4,5}) }) = #{1,2,3} * #{4,5} = 3 * 2 = 6

    #∏(H2) = #H2(X) * #H2(Z) = #{1,2} * #{3,4} = 2 * 2 = 4

    #∏(H3) = #H3(company) * #H3(location) = 4 * 4 = 16

    ```


    集合函数的泛化乘积的基数等于该函数所有值域元素基数的乘积。


    ## 封闭世界假设


    特征描述的泛化乘积结果集中的每个元组都可以被视为表示现实世界中的一个命题。给定元组所表示的命题，是通过使用该元组的属性值来实例化由特征描述所刻画的外部谓词而形成的命题。'
  raw: 'A set function is called a *characterization* when you use it to describe
    something in the real world by listing the relevant attributes in combination
    with the set of admissible values for each attribute. The relevant attributes
    are the first coordinates of the ordered pairs, and the sets of admissible values
    are their respective second coordinates.


    We’ll refer to the first coordinates of the ordered pairs of a characterization
    as the *attributes* of the characterization, and we’ll refer to the second coordinates
    of the ordered pairs of a characterization as the *attribute value sets* for the
    attributes of the characterization.


    As mentioned earlier, set function H4 can be considered a characterization representing
    the attributes of an employee. In this case, you’d only be interested in representing
    each employee’s number (attribute empno), name (attribute ename), birth date (attribute
    born), occupation (attribute job), and salary (attribute salary).


    7451CH04.qxd 5/4/07 2:43 PM Page 79


    C H A P T E R 4 **■** R E L AT I O N S A N D F U N C T I O N S


    **79**


    **External Predicates**


    There’s another way of looking at characterizations. They can be considered to
    characterize a predicate in the real world; the characterization introduces the
    (names of the) parameters of the predicate and the corresponding value sets from
    which these parameters can take their values. For instance, characterization H4
    characterizes the following predicate: Employee ENAME is assigned employee number
    EMPNO, is born at date BORN, holds position JOB, and has a monthly salary of SALARY
    dollars.


    This predicate has five parameters (ENAME, EMPNO, BORN, JOB, SALARY) that correspond
    to the five first coordinates in H4\. The predicate is a natural language sentence
    describing the meaning and correlation of the involved attributes. In Part 2 of
    this book, a characterization will be at the basis of a table design. The predicate
    characterized by the characterization of a table design represents the user-understood
    meaning of that table design. Such a predicate is referred to as the *external
    predicate* of that table.


    **The Generalized Product of a Set Function**


    Having introduced set functions, we can now establish the concept of a *generalized
    product* of a set function (at first sight, frequently considered a complex concept).
    The generalized product takes a set function as its operand and produces a new
    *set of functions*.


    The generalized product operator is a second key stepping stone, next to the powerset
    operator that was introduced in Chapter 2\. Using these two set operators, we’ll
    be able to construct *value sets* that are usually fairly large, sets of *tuples*
    (introduced hereafter), sets of *tables* (introduced in Chapter 5), and a set
    of *database states* (introduced in Chapter 5). In Chapter 7, we’ll demonstrate
    a method that involves defining these value sets as building blocks for a formal
    specification of a database design.


    The generalized product of a set function F, with the notation ∏(F), generates
    a set with all *possible* functions that have the same domain as F, and for which
    the ordered pairs (in these functions) have a second coordinate that is *chosen
    from (that is, is an element of ) the* *relevant set that was attached to the
    same first coordinate in F*. Definition 4-7 formally defines the generalized product
    operator.


    **■Definition 4-7: Generalized Product of a Set Function** Let F be a set function.
    The generalized product of F, notation ∏(F), is defined as follows:


    ∏(F) = { f | f is a function ∧ dom(f) = dom(F) ∧ (∀c∈dom(f): f(c) ∈ F(c)) }


    The last conjunct inside this definition specifies that every function generated
    by this operator has second coordinates that are elements of the relevant set
    (second coordinate) in the set function. Listing 4-7 gives a few examples that
    will quickly illustrate the effect this operator has when you apply it to a set
    function. Set functions H2 and H3 from the previous section are reused in this
    listing.


    7451CH04.qxd 5/4/07 2:43 PM Page 80


    **80**


    C H A P T E R 4 **■** R E L AT I O N S A N D F U N C T I O N S


    **Listing 4-7.** *Example Applications of the Generalized Product*


    ∏({ (a;{1,2,3}), (b;{4,5}) }) =


    { {(a;1), (b;4)}


    , {(a;1), (b;5)}


    , {(a;2), (b;4)}


    , {(a;2), (b;5)}


    , {(a;3), (b;4)}


    , {(a;3), (b;5)} }


    ∏(H2) = { {(X;1), (Z;3)}


    , {(X;1), (Z;4)}


    , {(X;2), (Z;3)}


    , {(X;2), (Z;4)} }


    ∏(H3) = { {(company;''Natural Join''), (location;''Utrecht'')}


    , {(company;''Natural Join''), (location;''Culemborg'')}


    , {(company;''Natural Join''), (location;''De Meern'')}


    , {(company;''Natural Join''), (location;''Eindhoven'')}


    , {(company;''Centraal Boekhuis''), (location;''Utrecht'')}


    , {(company;''Centraal Boekhuis''), (location;''Culemborg'')}


    , {(company;''Centraal Boekhuis''), (location;''De Meern'')}


    , {(company;''Centraal Boekhuis''), (location;''Eindhoven'')}


    , {(company;''Remmen & De Brock''), (location;''Utrecht'')}


    , {(company;''Remmen & De Brock''), (location;''Culemborg'')}


    , {(company;''Remmen & De Brock''), (location;''De Meern'')}


    , {(company;''Remmen & De Brock''), (location;''Eindhoven'')}


    , {(company;''Oracle''), (location;''Utrecht'')}


    , {(company;''Oracle''), (location;''Culemborg'')}


    , {(company;''Oracle''), (location;''De Meern'')}


    , {(company;''Oracle''), (location;''Eindhoven'')} }


    The first example applies the generalized product to set function {(a;{1,2,3}),
    (b;{4,5})}. Let’s call this set function S1\. The domain of S1 is {a,b}. The *set
    of functions* that results from the application of the generalized product on
    S1 holds six elements, each of which is a function. The first one enumerated is
    function {(a;1), (b;4)}. Let’s call this function f1\. Function f1 has the same
    domain as the set function S1: dom(S1) = dom(f1) = {a,b}


    Note also that the following propositions hold: f1(a)∈S1(a) and f1(b)∈S1(b). The
    first proposition evaluates to 1∈{1,2,3}, which is true, and the second evaluates
    to 4∈{4,5}, which is also true. The conjunction of these two propositions corresponds
    to the universal quantification in Definition 4-7\. In the same way, you can verify
    that the other five functions listed in the first example comply with Definition
    4-7.


    The second example holds four functions in the resulting set. Again, you can see
    that the domain of each of these functions equals {X,Z}, which is equivalent to
    dom(H2).


    In the third example, the generalized product applied to characterization H3 results
    in a set of 16 functions. Every function can be considered to represent an actual
    possible company based on the example characterization for companies, H3.


