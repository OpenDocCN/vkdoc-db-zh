    ¬P 为假当且仅当 P 为真。在另一种情况下，¬P 为真。


    ## 表 1-5. 与（合取）的真值表


    | P | Q | P ∧ Q |

    | :--- | :--- | :--- |

    | **T** | **T** | T |

    | **T** | **F** | F |

    | **F** | **T** | F |

