  trans: "\n技巧在于使用 Oracle SQL 数据库管理系统提供的 `dbms_lock` 包。通过使用这个包，你可以获取应用锁，从而有效地序列化涉及相同约束的并发执行事务。\n\
    \n### 列表 11-37. 应用锁服务\n\n`列表 11-37` 展示了构建在 `dbms_lock` 包之上的过程 `p_request_lock`\
    \ 的代码，通过它你可以请求一个应用锁。这个过程需要调用一个会执行隐式提交的 `dbms_lock` 模块。因为你将从 DI 代码中调用 `p_request_lock`，而\
    \ DI 代码又是在触发器中执行的（在此上下文中不允许提交），所以你需要对当前事务隐藏这个隐式提交。你可以通过使用一个自治事务来实现这一点。辅助函数 `f_allocate_unique`（也在\
    \ `列表 11-37` 中）实现了这个自治事务。\n\n```sql\ncreate function f_allocate_unique\n(p_lockname\
    \ in varchar) return varchar as\n--\npragma autonomous_transaction;\n--\npl_lockhandle\
    \ varchar(128);\n--\nbegin\n  -- This does implicit commit.\n  dbms_lock.allocate_unique(upper(p_lockname)\n\
    \                           ,pl_lockhandle\n                           ,60*10);\
    \ -- 将过期时间设为 10 分钟。\n--\n  return pl_lockhandle;\n--\nend;\n/\n\ncreate procedure\
    \ p_request_lock(p_lockname in varchar) as\n--\npl_lockhandle varchar(128);\n\
    pl_return number;\n--\nbegin\n--\n  -- Go get a unique lockhandle for this lockname.\n\
    --\n  pl_lockhandle := f_allocate_unique(p_lockname);\n--\n  -- Request the named\
    \ application lock in exclusive mode.\n  -- Allow for a blocking situation that\
    \ lasts no longer than 60 seconds.\n--\n  pl_return :=\n    dbms_lock.request(lockhandle\
    \ => pl_lockhandle\n                     ,lockmode => dbms_lock.x_mode\n     \
    \                ,timeout => 60\n                     ,release_on_commit => true);\n\
    --\n  if pl_return not in (0,4)\n  then\n    raise_application_error(-20998,\n\
    \    'Unable to acquire constraint serialization lock '||p_lockname||'.'); end\
    \ if;\n--\nend;\n/\n```\n\n现在，你可以——在这种情况下相当容易地——确保两个都需要为约束 `DEPT_TAB01` 运行 DI\
    \ 代码的事务被正确地序列化，以防止在 `表 11-3` 中演示的并发问题。来看一下 `列表 11-38`，它展示了使用执行模型 `EM6` 为约束 `DEPT_TAB01`\
    \ 编写的 DI 代码，其中包含了必要的对 `p_lock_request` 的调用以确保正确的序列化。\n\n### 列表 11-38. DEPT_TAB01\
