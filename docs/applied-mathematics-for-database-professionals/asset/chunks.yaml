  trans: "\n该集合中的每一个有序对都形如 `(B;E)`，其中 `B` 和 `E` 均代表一个有效的数据库状态（即，它们是数据库设计中数据库宇宙的元素）。这个有序对集合被称为*状态转移宇宙*。如果\
    \ `(B;E)` 是状态转移宇宙的一个元素，那么允许存在将状态 `B` 转换为状态 `E` 的事务。\n\n为了说明这一点，假设你需要为某个数据库设计指定一个状态转移宇宙，其数据库宇宙仅包含四个数据库状态。我们将其命名为\
    \ `s1` 到 `s4`。进一步假设，你只允许事务实现以下状态转移之一：\n\n`s1` 到 `s2`\n\n`s1` 到 `s3`\n\n`s1` 到\
    \ `s4`\n\n`s2` 到 `s3`\n\n`s2` 到 `s4`\n\n`s3` 到 `s4`\n\n`s4` 到 `s1`\n\n在此数据库设计中，仅允许前述七种不同的事务。你可以通过这四个数据库状态上的一个*有向图*来可视化这七个事务。\n\
    \n图 8-3 展示了这种查看状态转移宇宙的方式。\n\n**图 8-3.** *通过有向图表示状态转移宇宙*\n\n7451CH08.qxd 5/7/07\
    \ 11:21 AM Page 191\n\n第 8 章 **■** 指定状态转移约束\n\n**191**\n\n清单 8-5 展示了一种用集合论方法来指定此状态转移宇宙的方式；有向图中的每一个箭头都映射到一个有序对。\n\
    \n**清单 8-5.** *包含七个事务的状态转移宇宙*\n\n```\n{ (s1;s2), (s1;s3), (s1;s4)\n,(s2;s3), (s2;s4)\n\
    ,(s3;s4)\n,(s4;s1) }\n```\n\n当然，对于现实世界的数据库设计，你无法用这种枚举方式来指定状态转移宇宙，因为需要枚举的事务数量巨大。你将不得不采用谓词方式来指定可接受事务的集合。\n\
    \n你可以通过首先构造数据库宇宙与自身的笛卡尔积，以谓词方式为给定的数据库设计形式化地指定状态转移宇宙。\n\n该笛卡尔积包含了从一个可接受数据库状态到另一个可接受数据库状态的所有可能转移（建模为一个有序对）。\n\
    \n**■ 注意** 如果给定数据库设计的数据库宇宙的基数为 `n`，那么总共可以识别出 `n*n` 个不同的事务。然而，状态转移约束将不会允许所有这些事务。\n\
    \n通过指定状态转移谓词，你可以将这个可能转移的集合缩小为一个仅包含可接受转移的集合。清单 8-6 展示了状态转移宇宙的规范模板。\n\n**清单 8-6.**\
    \ *状态转移宇宙规范模板*\n\n```\nSTU := { TX | TX∈DBU×DBU ∧\nSTC1(π₁(TX),π₂(TX)) ∧ STC2(π₁(TX),π₂(TX))\
    \ ∧ ... ∧ STCn(π₁(TX),π₂(TX)) }\n```\n\n在此模板中，`DBU` 代表相关的数据库宇宙，`STC1`、`STC2`、……、`STCn`\
    \ 代表状态转移谓词。表达式 `π₁(TX)` 表示 `TX` 的起始状态，`π₂(TX)` 表示 `TX` 的结束状态。我们称状态转移谓词 `STC1`\
    \ 到 `STCn` 为 `STU` 的*状态转移约束*。\n\n定义状态转移宇宙 `STU` 的另一种方式如下：\n\n```\n{ (B;E) | B∈DBU\
    \ ∧ E∈DBU ∧\nSTC1(B,E) ∧ STC2(B,E) ∧ ... ∧ STCn(B,E) }\n```\n\n此集合包含了所有有序对 `(B;E)`，其中\
    \ `B` 和 `E` 代表可接受的数据库状态。\n\n状态 `B` 和 `E` 满足所有状态转移约束的有序对，代表了可接受的事务。\n\n7451CH08.qxd\
    \ 5/7/07 11:21 AM Page 192\n\n**192**\n\n第 8 章 **■** 指定状态转移约束\n\n## 完成示例数据库设计\n\
    \n现在，让我们通过为前一章引入的示例数据库设计指定状态转移约束，来演示所有这些概念。清单 8-7 引入了状态转移宇宙 `ST_UEX` 的形式化规范。如你所见，它建立在第\
    \ 7 章指定的 `DB_UEX` 数据库宇宙之上。`ST_UEX` 的定义为我们示例数据库设计引入了状态转移约束。此定义仅通过名称指定它们。在清单 8-8\
    \ 中，你将找到每个命名约束的形式化规范。\n\n**■ 注意** 在清单 8-7 中，我们以另一种方式指定状态转移谓词：作为以表为类型的参数的谓词。\n\n\
    **清单 8-7.** *状态转移宇宙 ST_UEX*\n\n```\nST_UEX := { (b;e) | b∈DB_UEX ∧ e∈DB_UEX ∧\n\
    \                     ∧ STC1(b(EMP),e(EMP))\n                     ∧ STC2(b(OFFR),e(OFFR))\n\
    \                     ∧ STC3(b(OFFR),e(OFFR))\n                     ∧ STC4(b(HIST),e(HIST))\n\
    \                     ∧ STC5(b(HIST),b(EMP),e(HIST),e(EMP))\n                \
    \     ∧ STC6(b(REG),e(REG))\n                     ∧ STC7(b(REG),e(REG)) }\n```\n\
    \n状态转移约束 `STC1` 涉及员工表结构。约束 `STC2` 和 `STC3` 涉及授课表结构。约束 `STC4` 涉及历史表结构。约束 `STC5`\
    \ 涉及两个表结构：历史表和员工表。最后，约束 `STC6` 和 `STC7` 涉及注册表结构。\n\n清单 8-8 提供了这七个状态转移约束的形式化定义。你将在下一节找到对每一个约束的详细阐述。\n\
    \n**■ 注意** 通常，状态转移约束检查的不仅仅是事务的起始和结束状态。在事务上下文中可用的其他数据项——通常由大多数 DBMS 提供——包括当前系统日期/时间（环境变量\
    \ `sysdate`）和当前登录用户的用户名（环境变量 `user`）。需要引用任何这些*事务环境变量*的需求，总是会映射到状态转移约束。静态约束本质上无法引用事务的上下文。清单\
    \ 8-8 中指定的约束 `STC5` 和 `STC7` 就是这个事实的例子；它们都引用了变量 `sysdate`。\n\n7451CH08.qxd 5/7/07\
    \ 11:21 AM Page 193\n\n第 8 章 **■** 指定状态转移约束\n\n**193**\n\n**清单 8-8.** *ST_UEX\
    \ 的七个状态转移约束*\n\n```\nSTC1(EMPB,EMPE) :=\n/* 月薪只能增加 */\n( ∀e1∈EMPB, e2∈EMPE: e1(EMPNO)\
    \ = e2(EMPNO) ⇒ e1(MSAL) ≤ e2(MSAL) )\n\nSTC2(OFFRB,OFFRE) :=\n/* 新授课必须以状态 SCHED\
    \ 开始 */\n( ∀o1∈OFFRE⇓{COURSE,STARTS} − OFFRB⇓{COURSE,STARTS}:\n    ↵{ o2(STATUS)\
    \ | o2∈OFFRE ∧ o2↓{COURSE,STARTS} = o1↓{COURSE,STARTS} }\n    = 'SCHD' )\n\nSTC3(OFFRB,OFFRE)\
    \ :=\n/* 有效的授课状态转移是： */\n/* SCH -> CONF, SCH -> CANC, CONF -> CANC */\n( ∀o1∈OFFRB,\
    \ o2∈OFFRE:\n    (o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∧ o1(STATUS) ≠ o2(STATUS))\n\
    \    ⇒\n    (o1(STATUS);o2(STATUS)) ∈\n    { ('SCHD';'CONF'), ('SCHD';'CANC'),\
    \ ('CONF';'CANC') } )\n\nSTC4(HISTB,HISTE) :=\n/* 不允许更新历史记录 */\n( ∀h1∈HISTB, h2∈HISTE:\n\
    \    h1↓{EMPNO,UNTIL} = h2↓{EMPNO,UNTIL}\n    ⇒\n    ( h1(DEPTNO) = h2(DEPTNO)\
    \ ∧ h1(MSAL) = h2(MSAL) ) )\n\nSTC5(HISTB,EMPB,HISTE,EMPE) :=\n/* 新历史记录必须准确反映员工更新\
    \ */\n( ∀h∈(HISTE⇓{EMPNO,UNTIL} − HISTB⇓{EMPNO,UNTIL})⊗HISTE:\n    h(UNTIL) =\
    \ sysdate ∧\n    ( ∃e1∈EMPB, e2∈EMPE:\n        e1↓{EMPNO,MSAL,DEPTNO} = h↓{EMPNO,MSAL,DEPTNO}\
    \ ∧\n        e2(EMPNO) = h(EMPNO) ∧\n        ( e2(MSAL) ≠ e1(MSAL) ∨ e2(DEPTNO)\
    \ ≠ e1(DEPTNO) ) ) )\n\nSTC6(REGB,REGE) :=\n/* 新注册元组必须以 EVAL = -1 开始 */\n( ∀r1∈(REGE⇓{STUD,STARTS}\
    \ − REGB⇓{STUD,STARTS})⊗REGE: r1(EVAL) = -1 )\n\nSTC7(REGB,REGE) :=\n/* 评估的转移必须有效\
    \ */\n/* 且不能在授课开始日期之前发生 */\n( ∀r1∈REGB, r2∈REGE:\n    (r1↓{STUD,STARTS} = r2↓{STUD,STARTS}\
    \ ∧ r1(EVAL) ≠ r2(EVAL))\n    ⇒\n    ( ( r1(EVAL) = -1 ∧ r2(EVAL) = 0 ∧ r2(STARTS)\
    \ ≤ sysdate ) ∨\n      ( r1(EVAL) = 0 ∧ r2(EVAL) ∈ {1,2,3,4,5} ) ) )\n```\n"
- fmt: "# 状态转换约束规范\n\n## 1. 约束STC1：薪资不能降低\n\n状态转换约束 `STC1` 展示了指定经典“薪资不能降低”要求的另一种方式。你可以直接从清单8-4中的\
    \ `STP1` 推导出来，方法是将存在量词重写为全称量词，然后应用德摩根定律，最后将析取式转换为蕴含式。\n\n## 2. 约束STC2与STC3：`STATUS`\
    \ 属性的转换\n\n约束 `STC2` 和 `STC3` 处理 `OFFR` 表设计中 `STATUS` 属性允许的值转换。\n\n- **STC2**：新插入的课程安排应始终具有状态\
    \ `'SCH'`（已安排）。\n- **STC3**：允许现有课程安排的状态从 `scheduled` 转换为 `'CONF'`（已确认），或从 `scheduled`\
    \ 转换为 `'CANC'`（已取消）。此外，已确认的安排也可以转换为已取消。\n\n### STC2的工作方式\n\n`STC2` 规定新安排状态值的方式如下：\n\
    1.  构造终态 `OFFR` 表在唯一标识属性（`COURSE` 和 `STARTS`）上的投影。\n2.  对初态 `OFFR` 表进行相同操作。\n\
    3.  这两个投影表的差集包含了新插入安排的元组。\n4.  全称量化的谓词随后从终态 `OFFR` 表中获取并选择这样一个新安排的 `STATUS` 值，并要求其等于\
    \ `'SCH'`。\n\n### STC3的工作方式\n\n`STC3` 检查初态和终态中对应 `OFFR` 元组的所有组合。组合是基于唯一标识属性进行的。它要求对于每一个这样的元组组合，要么\
    \ `STATUS` 值没有改变，要么根据前面描述的可接受值转换之一发生了改变。\n\n清单8-9展示了指定约束 `STC3` 的另一种稍有不同的方式。\n\
    \n**清单8-9.** `STC3` 的替代规范\n```\n( ∀o1∈OFFRB, o2∈OFFRE:\n    ( o1↓{COURSE,STARTS}\
    \ = o2↓{COURSE,STARTS} ∧ o1(STATUS) ≠ o2(STATUS) )\n    ⇒\n    ( ( o1(STATUS)\
    \ = 'SCH' ∧ o2(STATUS) = 'CONF' ) ∨\n      ( o1(STATUS) = 'SCH' ∧ o2(STATUS) =\
    \ 'CANC' ) ∨\n      ( o1(STATUS) = 'CONF' ∧ o2(STATUS) = 'CANC' ) ) )\n```\n这里我们使用了以下重写规则（留作本章末的练习）：\n\
    ```\n( P ⇒ (Q ∨ R) ) ⇔ ( (P ∧ ¬Q) ⇒ R )\n```\n\n## 3. 约束STC4：`HIST` 表的历史记录\n\n\
    与 `STC3` 类似，状态转换约束 `STC4` 组合了初态和终态的 `HIST` 元组，并要求 `DEPTNO` 和 `MSAL` 属性值均未改变。\n\
    \n## 4. 约束STC5：`HIST` 表的语义\n\n约束 `STC5` 定义了 `HIST` 表设计的语义。如果一个事务更改了 `EMP` 元组的\
    \ `DEPTNO` 或 `MSAL` 属性值，那么同一事务应在 `HIST` 表中记录一个元组，记录 `DEPTNO` 和 `MSAL` 的旧值。这个新的\
    \ `HIST` 元组应将 `UNTIL` 属性设置为当前系统日期和时间。\n\n`STC5` 对所有新插入的 `HIST` 元组进行全称量化，并要求在同一事务内，`DEPTNO`\
    \ 和 `MSAL` 值应与在**初态**中找到的匹配 `EMP` 元组的 `DEPTNO` 和 `MSAL` 值相对应。当然，它也要求对于这个特定的 `EMP`\
    \ 元组，**终态**反映了 `DEPTNO` 或 `MSAL` 属性值（或两者）的变化。\n\n## 5. `REG` 表的 `EVAL` 属性\n\n\
    `REG` 表设计中 `EVAL` 属性的属性值集总共包含七个元素：-1, 0, 1, 2, 3, 4, 5。其含义如下：\n- `-1`：评估为时过早\n\
    - `0`：未评估或尚未评估\n- `1`：非常差\n- `2`：差\n- `3`：一般\n- `4`：好\n- `5`：优秀\n\n评估的有效值转换如图8-4所示。\n\
    \n### 约束STC6：新注册的初始评估值\n\n新注册必须从评估值 -1 开始（`STC6`）。只要课程安排尚未开始，所有评估都应保持为值 -1；评估该安排为时过早。\n\
    \n### 约束STC7：评估值的转换\n\n一旦课程安排“进行中”，培训师可以决定学生何时评估该安排。这是通过将该安排的所有注册的评估设置为值 0 来完成的。由于表宇宙\
    \ `tab_REG` 中引入的以下表约束（见清单7-34），培训师必须在单个事务中完成此操作。\n\n```\n/* 课程安排已被评估，或评估为时过早 */\n\
    ( ∀r1,r2∈R:\n    ( r1↓{COURSE,STARTS} = r2↓{COURSE,STARTS} )\n    ⇒\n    ( ( r1(EVAL)\
    \ = -1 ∧ r2(EVAL) = -1 ) ∨\n      ( r1(EVAL) ≠ -1 ∧ r2(EVAL) ≠ -1 ) ) )\n```\n\
    \n此时，注册值为 0 表示学生**尚未**评估该安排。从评估值 -1 到值 0 的转换由状态转换约束 `STC7` 蕴含式结论中的第一个析取项覆盖。该析取项也覆盖了只有在安排已开始（`r2(STARTS)\
    \ ≥ sysdate`）时才能从 -1 转换为 0 这一事实。\n\n一旦评估被设置为 0，学生可以通过将 0 更改为 1 到 5 之间的值来评估该安排。这些值转换由\
    \ `STC7` 蕴含式结论中的第二个析取项覆盖。学生也可以选择完全不进行评估，让评估保持为值 0（现在代表“未评估”）。\n\n## 6. 约束规范方式总结\n\
    \n你注意到 `STC2`、`STC5` 和 `STC6` 展示了指定新插入元组属性值限制的三种不同方式了吗？你也可以用“`STC2` 方式”或“`STC5`\
    \ 方式”编写约束 `STC6`；参见清单8-10。\n\n**清单8-10.** `STC6` 的替代规范\n```\nSTC6(REGB,REGE) :=\n\
    ( ∀r1∈REGE⇓{STUD,STARTS} − REGB⇓{STUD,STARTS}:\n    ↵{ r2(EVAL) | r2∈e(REGE) ∧\
    \ r2↓{STUD,STARTS} = r1↓{STUD,STARTS} }\n    = -1 )\n\nSTC6(REGB,REGE) :=\n( ∀r∈(REGE⇓{STUD,STARTS}\
    \ − REGB⇓{STUD,STARTS})⊗REGE: r(EVAL) = -1 )\n```\n如果你仔细研究了清单8-8中的规范，可能还会注意到并非所有状态转换约束都满足其\
    \ `CNF` 只有一个合取项的要求。“练习”部分的一个练习将涉及此问题。\n\n## 结论\n\n我们通过重申第7章早些时候的一个陈述来结束本章：**信息系统的整体规范中有很大一部分实际上存在于数据库设计的规范中**。状态转换宇宙作为数据库设计规范的一个组成部分，再次证明了这一点。专门处理事务的“业务逻辑”通常可以由状态转换约束表示，因此这部分业务逻辑应该成为数据库设计规范的一部分。"
  raw: 'State transition constraint STC1 shows yet another way to specify the classical
    “salary cannot be decreased” requirement. You can derive it directly from STP1
    in Listing 8-4 by rewriting the existential quantifier into a universal quantifier,
    then applying De Morgan, and finally transforming a disjunction into an implication.


    7451CH08.qxd 5/7/07 11:21 AM Page 194


    **194**


    C H A P T E R 8 **■** S P E C I F Y I N G S TAT E T R A N S I T I O N C O N S
    T R A I N T S


    Constraints STC2 and STC3 deal with the value transitions that are allowed for
    the STATUS


    attribute in the OFFR table design. Newly inserted course offerings should always
    have status


    ''SCH'' (scheduled); this is covered by STC2\. The status of an existing offering
    is allowed to change from scheduled to ''CONF'' (confirmed), or from scheduled
    to ''CANC'' (canceled). Finally, confirmed offerings can change into canceled
    offerings too. These status changes are covered by STC3.


    The way STC2 mandates the status value of new offerings is as follows. It first
    constructs the projection of the OFFR table in the end state on the uniquely identifying
    attributes (COURSE


    and STARTS). It then does the same for the OFFR table in the begin state. The
    difference of these two projected tables contains tuples that identify the newly
    inserted offerings. The universally quantified predicate then fetches—from the
    OFFR table in the end state—and chooses the STATUS value of such a new offering
    and requires it (the STATUS value) to be equal to ''SCH''.


    STC3 inspects all combinations of corresponding OFFR tuples from the begin state
    and the end state. The combination is performed with the uniquely identifying
    attributes. It then requires that for every such tuple combination, either the
    STATUS value has not changed, or it has changed according to one of the admissible
    value transitions described earlier.


    Another slightly different way to specify constraint STC3 is shown in Listing
    8-9.


    **Listing 8-9.** *Alternative Specification for STC3*


    ( ∀o1∈OFFRB, o2∈OFFRE:


    ( o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∧ o1(STATUS) ≠ o2(STATUS) )


    ⇒


    ( ( o1(STATUS) = ''SCH''


    ∧ o2(STATUS) = ''CONF'' ) ∨


    ( o1(STATUS) = ''SCH''


    ∧ o2(STATUS) = ''CANC'' ) ∨


    ( o1(STATUS) = ''CONF'' ∧ o2(STATUS) = ''CANC'' ) ) )


    Here we’ve employed the following rewrite rule (which is left as an exercise at
    the end of this chapter):


    ( P ⇒ (Q ∨ R) ) ⇔ ( (P ∧ ¬Q) ⇒ R )


    In the same way as STC3, state transition constraint STC4 combines HIST tuples
    from the begin and the end state, and requires that neither the DEPTNO nor the
    MSAL attribute value has changed.


    Constraint STC5 defines the semantics of the HIST table design. If a transaction
    changes the DEPTNO or the MSAL attribute value of an EMP tuple, then the same
    transaction should log a tuple that records the old values of DEPTNO and MSAL
    in the HIST table. This new HIST tuple should have the UNTIL attribute set to
    the current system date and time.


    STC5 universally quantifies over all newly inserted HIST tuples and requires that
    within the same transaction, the DEPTNO and MSAL values should correspond with
    the DEPTNO and MSAL values of the matching EMP tuple found *in the begin state*.
    Of course, it also requires that for this particular EMP tuple *the end state*
    reflects a change in either the DEPTNO or MSAL attribute values (or both).


    The attribute-value set of the EVAL attribute of the REG table design holds seven
    elements in total: –1, 0, 1, 2, 3, 4, and 5\. Their meanings follow:


    7451CH08.qxd 5/7/07 11:21 AM Page 195


    C H A P T E R 8 **■** S P E C I F Y I N G S TAT E T R A N S I T I O N C O N S
    T R A I N T S


    **195**


    -1 : Too early to evaluate


    0 : Not evaluated or not yet evaluated


    1 : Really bad


    2 : Bad


    3 : Fair


    4 : Good


    5 : Excellent


    The valid value transitions for an evaluation are shown in Figure 8-4.


    **Figure 8-4.** *Valid transitions for an evaluation* New registrations must start
    with an evaluation value of -1 (STC6). As long as a course offering has not started
    yet, all evaluations should remain holding value -1; it is too early to evaluate
    the offering.


    Once the course offering is “in session,” the trainer decides when the students
    can evaluate the offering. This is done by setting the evaluation of all registrations
    for the offering to value 0\. Due to the following table constraint introduced
    in the table universe tab_REG (see Listing 7-34), the trainer must do this within
    a single transaction.


    **/* Offering is evaluated, or it is too early to evaluate the offering */**


    ( ∀r1,r2∈R:


    ( r1↓{COURSE,STARTS} = r2↓{COURSE,STARTS} )


    ⇒


    ( ( r1(EVAL) = -1 ∧ r2(EVAL) = -1 ) ∨


    ( r1(EVAL) ≠ -1 ∧ r2(EVAL) ≠ -1 )


    ) )


    A registration value of 0 at this time represents that the student has *not yet*
    evaluated the offering. This transition from an evaluation value of -1 to a value
    of 0 is covered by the first disjunct in the conclusion of the implication in
    state transition constraint STC7\. The disjunct also covers the fact that the
    transition from -1 to 0 can be done only if the offering has already started (r2(STARTS)
    ≥ sysdate).


    Once the evaluations have been set to 0, the students can then evaluate the offering
    by changing the 0 into a value in the range of 1 through 5\. These value transitions
    are covered by the second disjunct in the conclusion of the implication of STC7\.
    A student can also choose not to evaluate at all, and have the evaluation stay
    at value 0 (now representing “not evaluated”).


    7451CH08.qxd 5/7/07 11:21 AM Page 196


    **196**


    C H A P T E R 8 **■** S P E C I F Y I N G S TAT E T R A N S I T I O N C O N S
    T R A I N T S


    Did you notice that STC2, STC5, and STC6 demonstrate three different ways to specify
    a limitation on an attribute value of a newly inserted tuple? You can also write
    constraint STC6 the


    “STC2 way” or the “STC5 way”; see Listing 8-10 for this.


    **Listing 8-10.** *Alternative Specifications for STC6*


    STC6(REGB,REGE) :=


    ( ∀r1∈REGE⇓{STUD,STARTS} − REGB⇓{STUD,STARTS}:


    ↵{ r2(EVAL) | r2∈e(REGE) ∧ r2↓{STUD,STARTS} = r1↓{STUD,STARTS} }


    = -1 )


    STC6(REGB,REGE) :=


    ( ∀r∈(REGE⇓{STUD,STARTS} − REGB⇓{STUD,STARTS})⊗REGE: r(EVAL) = -1 ) If you’ve
    carefully studied the specifications in Listing 8-8, you might also have noticed
    that not all state transition constraints satisfy the requirement that their CNF
    only have one conjunct. One of the exercises in the “Exercises” section will deal
    with this.


    We conclude this chapter by reaffirming a statement made earlier in Chapter 7:
    *much* *of the overall specification of an information system actually sits in
    the specification of the* *database design.* The concept of a state transition
    universe, being an integral part of the specification of a database design, demonstrates
    this again. “Business logic” specifically dealing with transactions can often
    be represented by state transition constraints, and as such this business logic
    should be part of a database design’s specification.'
  trans: "\n# 状态转换约束规范\n\n## 1. 约束 STC1：薪资不能降低\n\n状态转换约束 `STC1` 展示了指定经典“薪资不能降低”要求的另一种方式。你可以直接从清单\
    \ 8-4 中的 `STC1` 推导出来，方法是将存在量词重写为全称量词，然后应用德摩根定律，最后将析取式转换为蕴含式。\n\n## 2. 约束 STC2\
    \ 与 STC3：`STATUS` 属性的转换\n\n约束 `STC2` 和 `STC3` 处理 `OFFR` 表设计中 `STATUS` 属性允许的值转换。\n\
    \n- **STC2**：新插入的课程安排应始终具有状态 `'SCH'`（已安排）。\n- **STC3**：允许现有课程安排的状态从 `scheduled`\
    \ 转换为 `'CONF'`（已确认），或从 `scheduled` 转换为 `'CANC'`（已取消）。此外，已确认的安排也可以转换为已取消。\n\n###\
    \ STC2 的工作方式\n\n`STC2` 规定新安排状态值的方式如下：\n1.  构造终态 `OFFR` 表在唯一标识属性（`COURSE` 和 `STARTS`）上的投影。\n\
    2.  对初态 `OFFR` 表进行相同操作。\n3.  这两个投影表的差集包含了新插入安排的元组。\n4.  全称量化的谓词随后从终态 `OFFR` 表中获取并选择这样一个新安排的\
    \ `STATUS` 值，并要求其等于 `'SCH'`。\n\n### STC3 的工作方式\n\n`STC3` 检查初态和终态中对应 `OFFR` 元组的所有组合。组合是基于唯一标识属性进行的。它要求对于每一个这样的元组组合，要么\
    \ `STATUS` 值没有改变，要么根据前面描述的可接受值转换之一发生了改变。\n\n清单 8-9 展示了指定约束 `STC3` 的另一种稍有不同的方式。\n\
    \n**清单 8-9.** `STC3` 的替代规范\n```\n( ∀o1∈OFFRB, o2∈OFFRE:\n    ( o1↓{COURSE,STARTS}\
    \ = o2↓{COURSE,STARTS} ∧ o1(STATUS) ≠ o2(STATUS) )\n    ⇒\n    ( ( o1(STATUS)\
    \ = 'SCH' ∧ o2(STATUS) = 'CONF' ) ∨\n      ( o1(STATUS) = 'SCH' ∧ o2(STATUS) =\
    \ 'CANC' ) ∨\n      ( o1(STATUS) = 'CONF' ∧ o2(STATUS) = 'CANC' ) ) )\n```\n这里我们使用了以下重写规则（留作本章末的练习）：\n\
    ```\n( P ⇒ (Q ∨ R) ) ⇔ ( (P ∧ ¬Q) ⇒ R )\n```\n\n## 3. 约束 STC4：`HIST` 表的历史记录\n\n\
    与 `STC3` 类似，状态转换约束 `STC4` 组合了初态和终态的 `HIST` 元组，并要求 `DEPTNO` 和 `MSAL` 属性值均未改变。\n\
    \n## 4. 约束 STC5：`HIST` 表的语义\n\n约束 `STC5` 定义了 `HIST` 表设计的语义。如果一个事务更改了 `EMP` 元组的\
    \ `DEPTNO` 或 `MSAL` 属性值，那么同一事务应在 `HIST` 表中记录一个元组，记录 `DEPTNO` 和 `MSAL` 的旧值。这个新的\
    \ `HIST` 元组应将 `UNTIL` 属性设置为当前系统日期和时间。\n\n`STC5` 对所有新插入的 `HIST` 元组进行全称量化，并要求在同一事务内，`DEPTNO`\
    \ 和 `MSAL` 值应与在**初态**中找到的匹配 `EMP` 元组的 `DEPTNO` 和 `MSAL` 值相对应。当然，它也要求对于这个特定的 `EMP`\
    \ 元组，**终态**反映了 `DEPTNO` 或 `MSAL` 属性值（或两者）的变化。\n\n## 5. `REG` 表的 `EVAL` 属性\n\n\
    `REG` 表设计中 `EVAL` 属性的属性值集总共包含七个元素：-1, 0, 1, 2, 3, 4, 5。其含义如下：\n- `-1`：评估为时过早\n\
    - `0`：未评估或尚未评估\n- `1`：非常差\n- `2`：差\n- `3`：一般\n- `4`：好\n- `5`：优秀\n\n评估的有效值转换如图\
    \ 8-4 所示。\n\n### 约束 STC6：新注册的初始评估值\n\n新注册必须从评估值 -1 开始（`STC6`）。只要课程安排尚未开始，所有评估都应保持为值\
    \ -1；评估该安排为时过早。\n\n### 约束 STC7：评估值的转换\n\n一旦课程安排“进行中”，培训师可以决定学生何时评估该安排。这是通过将该安排的所有注册的评估设置为值\
    \ 0 来完成的。由于表宇宙 `tab_REG` 中引入的以下表约束（见清单 7-34），培训师必须在单个事务中完成此操作。\n\n```\n/* 课程安排已被评估，或评估为时过早\
    \ */\n( ∀r1,r2∈R:\n    ( r1↓{COURSE,STARTS} = r2↓{COURSE,STARTS} )\n    ⇒\n  \
    \  ( ( r1(EVAL) = -1 ∧ r2(EVAL) = -1 ) ∨\n      ( r1(EVAL) ≠ -1 ∧ r2(EVAL) ≠ -1\
    \ ) ) )\n```\n\n此时，注册值为 0 表示学生**尚未**评估该安排。从评估值 -1 到值 0 的转换由状态转换约束 `STC7` 蕴含式结论中的第一个析取项覆盖。该析取项也覆盖了只有在安排已开始（`r2(STARTS)\
    \ ≥ sysdate`）时才能从 -1 转换为 0 这一事实。\n\n一旦评估被设置为 0，学生可以通过将 0 更改为 1 到 5 之间的值来评估该安排。这些值转换由\
    \ `STC7` 蕴含式结论中的第二个析取项覆盖。学生也可以选择完全不进行评估，让评估保持为值 0（现在代表“未评估”）。\n\n## 6. 约束规范方式总结\n\
    \n你注意到 `STC2`、`STC5` 和 `STC6` 展示了指定新插入元组属性值限制的三种不同方式了吗？你也可以用“`STC2` 方式”或“`STC5`\
    \ 方式”编写约束 `STC6`；参见清单 8-10。\n\n**清单 8-10.** `STC6` 的替代规范\n```\nSTC6(REGB,REGE)\
    \ :=\n( ∀r1∈REGE⇓{STUD,STARTS} − REGB⇓{STUD,STARTS}:\n    ↵{ r2(EVAL) | r2∈e(REGE)\
    \ ∧ r2↓{STUD,STARTS} = r1↓{STUD,STARTS} }\n    = -1 )\n\nSTC6(REGB,REGE) :=\n\
    ( ∀r∈(REGE⇓{STUD,STARTS} − REGB⇓{STUD,STARTS})⊗REGE: r(EVAL) = -1 )\n```\n如果你仔细研究了清单\
    \ 8-8 中的规范，可能还会注意到并非所有状态转换约束都满足其 `CNF` 只有一个合取项的要求。“练习”部分的一个练习将涉及此问题。\n\n## 结论\n\
    \n我们通过重申第 7 章早些时候的一个陈述来结束本章：**信息系统的整体规范中有很大一部分实际上存在于数据库设计的规范中**。状态转换宇宙作为数据库设计规范的一个组成部分，再次证明了这一点。专门处理事务的“业务逻辑”通常可以由状态转换约束表示，因此这部分业务逻辑应该成为数据库设计规范的一部分。\n"
- fmt: "## Chapter Summary\n\nThis section provides a summary of this chapter, formatted\
    \ as a bulleted list. You can use it to check your understanding of the various\
    \ concepts introduced in this chapter before continuing with the exercises in\
    \ the next section.\n\n• Next to the four classes of constraints introduced earlier\
    \ (attribute, tuple, table, and database constraints), there is a fifth class\
    \ of constraints called the `state transition constraints`.\n\n• These constraints\
    \ limit transactions that are allowed within the database design.\n\n`State transition\
    \ predicates` are the basis of state transition constraints.\n\n• State transition\
    \ constraints are predicates that reference a pair of database states as their\
    \ parameters, one database state representing the `begin state` of a transaction,\
    \ and the other representing the `end state` of the transaction.\n\n• Typical\
    \ examples for state transition constraints are limitations on the values allowed\
    \ for attributes of newly inserted tuples, or limitations on value transitions\
    \ (updates) of an attribute whose value set represents a set of codes.\n\n• State\
    \ transition constraints are specified as part of the specification of the `state\
    \ transition universe` for a database design. This is the set representing all\
    \ admissible transactions for a database design.\n\n• State transition (contrary\
    \ to static) constraints may reference `transactional environment variables` offered\
    \ by the DBMS. Typical examples of these variables are the system date and time\
    \ (denoted by `sysdate`) and the currently logged in user (denoted by `user`).\n\
    \n## Exercises\n\n1.  Prove the rewrite rule `( P ⇒ (Q ∨ R) ) ⇔ ( (P ∧ ¬Q) ⇒ R\
    \ )` either by using the rewrite rules from Table 1-13 or by using a truth table.\n\
    2.  Rewrite `prop1` from Listing 8-1 into a universal quantification. You might\
    \ find this a more intuitive specification.\n3.  Formally specify the state transition\
    \ constraint stating that the salary of an employee can only be decreased if at\
    \ the same time the salary grade for the employee is increased. Does transaction\
    \ `TX1` introduced in the section “More Data Integrity Predicates” violate this\
    \ constraint too?\n4.  Give an alternative specification for state transition\
    \ constraint `STC2` that involves the join operator.\n5.  Specify a state transition\
    \ constraint stating that the value of attribute `HIRED` for newly inserted `EMP`\
    \ tuples cannot be more than one month after `sysdate`. Informally, new employees\
    \ can at the soonest be registered one month prior to their first workday.\n6.\
    \  Can state transition constraint `STC7` be decomposed into multiple conjuncts?\
    \ What about `STC3`?\n7.  Specify a state transition constraint stating that new\
    \ employee tuples can only be inserted by sessions that are logged in with the\
    \ `USERNAME` of an employee that works in the HR department (`DNAME = 'Human resources'`).\n\
    8.  As explained in this chapter, the way course offerings are evaluated is that\
    \ the trainer first has to enable the evaluation by resetting the evaluation attribute\
    \ of all registered attendees for the offering, to value 0. After this transaction—\
    \ that has to be performed by a session of the trainer—the attendees can evaluate\
    \ the offering by changing the 0 into a value ranging from 1 to 5. Every attendee\
    \ should be allowed only to update the evaluation of his or her own registration.\
    \ Modify the specification of `STC7` to reflect these additional authorization\
    \ requirements.\n9.  Further modify `STC7` such that evaluations must occur at\
    \ or before the last day of the offering.\n10. You need to cater for the possibility\
    \ of a terminated employee to be reinstated. One of your colleagues suggests that\
    \ in these cases the `TERM` tuple involved should be removed and at the same time\
    \ the `HIRED` attribute (in the corresponding `EMP` tuple) updated to reflect\
    \ the start of the renewed employment for the employee.\n\n    **a.** Give a formal\
    \ specification stating that `TERM` tuples can only be deleted if at the same\
    \ time the `HIRED` attribute of the employee is updated (that is, increased to\
    \ a more recent date).\n\n    **b.** Do you see potential problems with this solution?\
    \ Under what conditions would this solution be viable?\n\n## Chapter 9 Data Retrieval\n\
    \nBy means of a `query`, you retrieve data from a database. In this chapter we’ll\
    \ demonstrate how you can specify a query in a formal way. To do so, we won’t\
    \ require the formal introduction of any new concepts; we’ve already presented\
    \ all ingredients for specifying queries.\n\nThe section “Formally Specifying\
    \ Queries” introduces you to the formal concept of a `query over a database universe`.\
    \ You’ll find out that you can specify a query as a set-theory expression based\
    \ on a given database state. In this section, we’ll also give a few simple examples\
    \ to familiarize you with this formal concept of a query.\n\nThe section “Example\
    \ Queries Over `DB_UEX`” provides example queries over `DB_UEX`, the example database\
    \ universe that was introduced in Chapter 7. It will start out with basic queries\
    \ and gradually move to more complex queries. For every query, we’ll present you\
    \ with multiple (equivalent) formal expressions to specify the query.\n\nFor the\
    \ first time in this book, you’ll see the use of SQL. Every example query will\
    \ be accompanied by one or more equivalent SQL expressions. You’ll discover that\
    \ expressing particular queries in SQL turns out to be not so trivial.\n\n**Note**\
    \ We assume you have a working knowledge of SQL. It is certainly not the goal\
    \ of this book to teach the SQL language (although showing both the formal and\
    \ the SQL expressions alongside each other might have this as a side effect).\
    \ As mentioned in the book’s Introduction, the SQL expressions given in this chapter,\
    \ as well as in the following two chapters, are compliant with the 10 `g` release\
    \ of Oracle’s SQL DBMS.\n\nAs usual, you’ll find a “Chapter Summary” at the end,\
    \ followed by an “Exercises” section.\n\n### Formally Specifying Queries\n\nData\
    \ retrieval is a crucial application of a database. Through queries, you can extract\
    \ information that is relevant to you from the database. In this section, we’ll\
    \ demonstrate how you can formally specify queries.\n\nLet’s first start with\
    \ a simple example. We’ll use the example database design that was introduced\
    \ in Chapter 7. Assume `E` represents the employee table in some database state\
    \ of universe `DB_UEX`. Here’s a formal specification of a query, named `Q1`,\
    \ on `E` that extracts the trainers who earn more than 6000:\n\n`Q1(E) := { e\
    \ | e∈E ∧ e(JOB)='TRAINER' ∧ e(MSAL)>6000 }`\n\nQuery `Q1` returns all employee\
    \ tuples representing trainers earning more than 6000.\n\nInstead of the complete\
    \ tuple, if all you were interested in was the employee number (`EMPNO`), name\
    \ (`ENAME`), and salary (`MSAL`), of trainers earning more than 6000, then the\
    \ following query (`Q2`) would do the job:\n\n`Q2(E) := { e↓{EMPNO,ENAME,MSAL}\
    \ | e∈E ∧ e(JOB)='TRAINER' ∧ e(MSAL)>6000 }`\n\n**Note** Both `Q1` and `Q2` return\
    \ a table as their result. As you’ll see shortly, this is not a requirement in\
    \ the formal methodology set out by this book; queries are allowed to return simple\
    \ values too (for instance, a single numeric or string value). However, in practice\
    \ we prefer query specifications that return tables.\n\nAs indicated through the\
    \ preceding example, you can view a query as a function. In this case, you pass\
    \ this function a table as its argument, and it then returns another value based\
    \ on the argument. Of course, queries often involve more than just one table.\
    \ In general, a query can be considered to accept a database state (our formal\
    \ structure that contains all current tables) as its argument. The query can then\
    \ inspect any table available within this database state to determine its return\
    \ value."
  raw: '## Chapter Summary


    This section provides a summary of this chapter, formatted as a bulleted list.
    You can use it to check your understanding of the various concepts introduced
    in this chapter before continuing with the exercises in the next section.


    • Next to the four classes of constraints introduced earlier (attribute, tuple,
    table, and database constraints), there is a fifth class of constraints called
    the *state transition constraints*.


    • These constraints limit transactions that are allowed within the database design.


    *State transition predicates* are the basis of state transition constraints.


    • State transition constraints are predicates that reference a pair of database
    states as their parameters, one database state representing the *begin state*
    of a transaction, and the other representing the *end state* of the transaction.


    • Typical examples for state transition constraints are limitations on the values
    allowed for attributes of newly inserted tuples, or limitations on value transitions
    (updates) of an attribute whose value set represents a set of codes.


    • State transition constraints are specified as part of the specification of the
    *state* *transition universe* for a database design. This is the set representing
    all admissible transactions for a database design.


    • State transition (contrary to static) constraints may reference *transactional
    environment variables* offered by the DBMS. Typical examples of these variables
    are the system date and time (denoted by sysdate) and the currently logged in
    user (denoted by user).


