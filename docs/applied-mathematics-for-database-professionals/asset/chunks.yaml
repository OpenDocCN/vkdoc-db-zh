    \ 章介绍过；它是一个函数，其中每个对的第一个元素是表结构名称，每个对的第二个元素是表。正如你将看到的，这种表示数据库状态的方式很方便；我们可以使用已定义的表宇宙轻松构建这样的函数。\n\
    \n让我们用前面各节中使用的 `RESULT` 表结构来说明这一点。\n\n因为本节是关于数据库约束的，所以我们首先引入第二个表结构与 `RESULT` 表结构一起使用。假设存在一个\
