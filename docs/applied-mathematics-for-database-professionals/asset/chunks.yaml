    This execution model is still inefficient. For instance, when you update the name
    of an employee, then this execution model will validate constraint EMP_TAB03\.
    Obviously, because the ENAME column is not involved at all in this constraint,
    DML statements that update ENAME


    should never give rise to the need to check constraint EMP_TAB03\. A similar inefficiency
    applies to constraint DEPT_TAB01; for instance, EM2 will validate this constraint
    when you update the location of a department (whereas attribute LOC is not involved
    in constraint DEPT_TAB01). The next execution model addresses this inefficiency.


    Execution Model 3: On-Involved-Column(s)


    This execution model (EM3) is the same as EM2 in the cases where the DML statement
    is an INSERT or a DELETE. However, when updates occur you now also make use of
    the knowledge of what the involved attributes are (per table structure) for each
    constraint. For a given constraint, there’s only a need for this constraint to
    be validated if involved attributes get modified by the UPDATE statement. INSERT
    and DELETE statements always involve all attributes, and therefore give rise to
    a need for constraints that involve the table structure to be validated whenever
    they occur (irrespective of the attributes involved in the constraint).


    Let’s again demonstrate this using the example table constraint EMP_TAB03\. In
    this case, the insert and delete triggers remain the same as in EM2\. You only
    change the update trigger to be more efficient. Simply by scanning the formal
    specification of constraint EMP_TAB03, you can discover the attributes that are
    involved; for this constraint these are DEPTNO and JOB.


    Whenever UPDATE statements occur, you now only execute the DI code that was developed
    in EM2 when the UPDATE statement changes either the DEPTNO or the JOB (or both)
    attributes.


    **■Note** You’ll probably easily understand that an update of JOB can violate
    this constraint. For instance, in a given department, when you promote an administrator
    to become a trainer, it might well be the case that you just “removed” the single
    administrator who was required to be in that department, because that department
    also employs the president or a manager. Also, for instance, when you promote
    a trainer to become a manager, this might be the first manager in the department.
    This now would require that the department also employ an administrator. Similar
    scenarios apply to updates of DEPTNO; if you switch a manager who is currently
    working in department 10 to start working in department 20, then this manager
    might be the first manager in department 20, therefore . . . , and so on.


