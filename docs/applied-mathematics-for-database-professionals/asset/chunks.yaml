    ## Listing 7-29. *Table Universe `tab_TERM`*


    ```

    tab_TERM :=


    { T | T∈℘(tup_TERM) ∧


    /* EMPNO uniquely identifies a tuple */


    ( ∀t1,t2∈T: t1(EMPNO) = t2(EMPNO) ⇒ t1 = t2 )


    }

    ```


    The table universe for `DEPT` (shown in Listing 7-30) introduces two unique identification
