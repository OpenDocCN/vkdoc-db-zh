    Once you formally specify the database design, a good implementation of the database
    design becomes possible. We’ve discussed various strategies for implementing the
    important part of every database design: the data integrity constraints.


    Implementing data constraints declaratively is easy. Implementing data constraints
    procedurally is by far not a trivial task (as discussed in Chapter 11). It’s time
    consuming and will produce more lines of complex procedural code than you might
    have expected (part of which can be generated, though). The current status of
    DBMS technology, such as Oracle’s SQL


    DBMS, enables us to implement database designs in a robust way; that is, including
    the DI code for all data integrity constraints in a triggered procedural way.


    Still, few database professionals actually do this. Why? Probably because designing
    DI code that is fully detached from BL code (the triggered procedural strategy)
    is indeed truly complex given the current state of DBMSes available to us. However,
    this neglects the big picture. Failing to fully detach DI code from BL code implies
    not being able to efficiently maintain and manage the DI code and thus the constraints.


    We should not underestimate the gains we receive once all DI code is implemented
    separately. Data integrity constraints have then finally become manageable. There
    is an interesting opportunity for DBMS vendors to evolve their products into data
    integrity constraint engines.


    It is up to the scientific world to come up with more meaningful subclasses of
    constraints first.


    The DBMS vendors, in their turn, should then provide us with new declarative constructs
    at the DBMS level to implement these easily.


    Once more declarative constructs are available, there is not only a huge potential
    of much more rapid construction of WoD applications, but also the potential of
    achieving considerable savings in the cost of maintaining such an application.


