  trans: "## Oracle 中的数据库设计实现\n\n`■Note` Oracle 中的`DUAL`表是一个单列单行的系统表。它最常用于让 SQL 引擎计算`SELECT`子句表达式或`WHERE`子句表达式。下面的代码展示了后一种用法。\n\
    ```sql\nselect 'Constraint EMP_TAB03 is satisfied'\nfrom DUAL\nwhere not exists(select\
