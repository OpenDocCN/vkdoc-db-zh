    e ∪ { (initial;substr(e(ename),1,1)) }


    This expression adds an attribute-value ordered pair to tuple e. The attribute
    that is added is initial. The value attached to this attribute is substr(e(ename),1,1),
    which represents the initial of value e(ename).


    Here’s another example. Figure 5-9 shows two tables. The one at the left (T11)
