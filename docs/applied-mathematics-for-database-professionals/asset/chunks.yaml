    # 第 5 章 ■ 表与数据库状态


    95


    定义 5-1 以形式化方式描述了`表`的概念。它使用了“给定集合上的函数”的概念（参见定义 4-2）。


    ## ■定义 5-1：表

    如果`T`和`H`是集合，那么`“T 是 H 上的一个表” ⇔ ( ∀t∈T: t 是 H 上的一个函数 )`。


    这个定义是通用的，因为它对集合`H`的元素没有施加任何限制。然而，在实践中，我们只对`H`是代表属性的名称集合的情况感兴趣。


    表`T1`可被视为一个*零件表*。它是在`{partno, name, instock, price}`上的一个表，包含六个元组，每个元组代表一个不同零件的信息。它为每个这样的零件保存零件号、名称、库存数量和价格。


    以下是更多例子：


    `T2 := { { (X;2), (Y;1) }, { (Y;8), (X;0) }, { (Y;10), (X;5) } }`


    `T3 := { { (partno;3), (name;''hammer'') }, { (pno;4), (pname;''nail'') } }`


    `T4 := { { (empno;105), (ename;''Mrs. Sparks''), (born;''03-apr-1970'') },{ (empno;202),
    (ename;''Mr. Tedesco'') } }`


    `T2`确实是一个表。它包含三个函数，所有这些函数共享定义域`{X,Y}`。它是一个在`{X,Y}`上的表。注意，对（在函数内部）的顺序无关紧要。`T3`不是一个表。它是一个函数集合；然而，第一个函数的定义域是`{partno,
    name}`，这与第二个函数的定义域`{pno, pname}`不同。同样，`T4`也不是一个表。它是一个函数集合；然而，第一个函数的定义域是`{empno,
    ename, born}`，这与第二个函数的定义域`{empno, ename}`不同。


    表的一个元素是一个函数，每个这样的函数被特别称为一个`元组`。在第 4 章介绍表征的广义积时（参见“集合函数的广义积”一节），你们已经接触过这个术语。


    表征的广义积实际上是一个表；它包含函数，所有这些函数共享相同的定义域。


    表是一个集合，该集合的元素是元组。根据集合的定义，这意味着每个元组在该集合内都是唯一的；同一个表中不能出现重复的元组。


    如果`T`是`H`上的一个表，那么`T`的任何真子集（包含的元组少于`T`）当然也是`H`上的一个表。


    即使是空集`(∅)`也是一个表。事实上，根据定义 5-1（它量化表中的元素），空集是*任何集合上的表*。关于这一点，你可能需要回顾表 3-2 中的重写规则。


    ## ■注意

    空集通常用作给定表结构的初始状态。


    7451CH05.qxd 5/4/07 3:57 PM Page 96


    96


    第 5 章 ■ 表与数据库状态


    ### 简写记法

    使用清单 5-1 中介绍的形式化枚举方法来写出一个表是相当繁琐的。对于作为表元素的每个元组，你基本上都在重复（共享的）定义域作为有序对的第一坐标。为了避免这种重复，通常的做法是绘制一个表的图示。在此图示中，你只需列出一次元组属性的名称（作为列标题），然后在这些列标题下，为每个元组列出其属性值（每行一个）。图
    5-1 展示了`表`的这种简写记法。它展示的是清单 5-1 中引入的表`T1`。

