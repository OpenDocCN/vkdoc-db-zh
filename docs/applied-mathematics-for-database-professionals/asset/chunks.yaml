    ## Chapter Summary


    This section provides a summary of this chapter, formatted as a bulleted list.
    You can use it to check your understanding of the various concepts introduced
    in this chapter before continuing with the exercises in the next section.


    • A *table* can formally be represented as a set of functions, all of which share
    a common domain; you can specify this set by writing down all involved functions
    in the *enumerative way*.


    • The elements of a table are referred to as tuples; the ordered pairs of a tuple
    are called *attribute-value pairs*.


    • The shared domain of all tuples in a table is referred to as the *heading* of
    the table.


    • We usually draw a table as a *two-dimensional picture* of rows and columns (shorthand
    notation). The column header represents the heading of the table and the rows
    represent the tuples of the table.


    • The order in which tuples are drawn (shorthand notation) or enumerated (set-theory
    notation) doesn’t matter. Neither do the order of the columns or the order of
    the attribute-value pairs matter.


    • The generalized product of a characterization will result in a table. You can
    use this as the given set to specify tables in a *predicative way*; by adding
    predicates you further constrain the content of the set.


    • A *database state*, containing x tables, can formally be represented as a function
    containing x ordered pairs. In every ordered pair, the first coordinate represents
    the name of a table structure and the second coordinate represents the current
    table for that table structure.


    • A *database skeleton* formally describes the structure of a database design.
    It introduces the table structure names and the names of all attributes involved
    in the database design.


    • Because tables are sets, you can apply the well-known set operators *union*
    (∪), *intersection* (∩), and *difference* (–) with tables as their operands.


    • You can use the *projection* operator (⇓) to *limit* all tuples to a given subset
    of the heading of the table.


    • You can select a subset of the tuples from a given table by specifying, in a
    predicative way, a new set based on the given table. The predicates that you add
    in such a predicative specification are said to perform a table *restriction*.


    7451CH05.qxd 5/4/07 3:57 PM Page 114


    **114**


    C H A P T E R 5 **■** TA B L E S A N D D ATA B A S E S TAT E S


    • The *join* operator (⊗) combines *compatible* tuples from two given tables.
    Because it is based on the compatibility concept, it requires the attributes that
    are to be used for this combination to have matching names.


    • The *attribute renaming* operator (◊◊) enables you to selectively rename one
    or more attributes in the heading of a table. You can use it to ensure that attributes
    of two tables have matching names, prior to performing the join of these two tables.


    • You can use *table extension* to add new attributes to a table (including their
    values for every tuple).


    • The five aggregate operators— *sum*, *count*, *average*, *maximum*, and *minimum*—enable
    you to compute a value by aggregation over all elements in a given set.


