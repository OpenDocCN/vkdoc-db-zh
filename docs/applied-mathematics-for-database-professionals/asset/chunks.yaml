    C H A P T E R 6 **■** T U P L E , TA B L E , A N D D ATA B A S E P R E D I C AT
    E S


    **127**


    **A Few Remarks on Data Integrity Predicates**


    We conclude the introduction of the preceding three classes of data integrity
    predicates with a few observations.


    As you’ve seen through the various examples, we can elegantly use tuple, table,
    and database predicates to formally define the conditions (business rules) that
    are part of the real world and that need to be reflected somehow in the specification
    of a database design. The predicate class (tuple, table, or database) to which
    a business rule maps is fully dependent on the given database skeleton of the
    database design. For instance, predicate P8 (see Listing 6-5) is a *table predicate*
    because all the information to formally specify the business rule that managers
    earn more than trainers, and trainers earn more than clerks, is available within
    the employee table structure. Now, if for some reason a separate table structure,
    say trainer, was introduced to hold all trainer information (rendering employee
    to hold only manager and clerk information), then this real-world constraint would
    map to a *database predicate* involving both table structures employee and trainer.


    You might have a question regarding the way we’ve introduced data integrity predicates
    in this chapter. In the various examples you’ve seen, we’ve employed these predicates
    to show whether a given tuple, table, or database state satisfies them. However,
    when formally specifying a database design, we aren’t interested in a single database
    state (or table or tuple). We are interested in a *database state space*: a set
    that holds all values that we allow for our database.


    We intend to mathematically model such a database state space that represents
    the *value set* for a database variable (this will be done in Chapter 7). When
    we do so, we’ll use the three classes of data integrity predicates introduced
    in this chapter, in a sophisticated manner such that they represent data integrity
    constraints that play a role at the database state space level.


    **Common Patterns of Table and Database**


    **Predicates**


    This section will establish five common patterns of table and database predicates:
    *unique* *identification* predicates, *subset requirement* predicates, *specialization*
    predicates, *generalization* predicates, and *tuple-in-join* predicates. These
    five patterns of data integrity predicates are common in database designs and
    are therefore important enough to justify a separate section dealing with them.


