    Projection


    Another important table operator that needs to be introduced is the *projection*
    of a table on a given set. The projection of a given table—say T—on a given set—say
    B—performs the *limitation* of every tuple in T on set B. We use symbol ⇓ to denote
    projection. The projection operator can be viewed as a version of the limitation
    operator that has been lifted to the table level.


    Definition 5-3 formally defines this operator.


    **■Definition 5-3: Projection of a Table** Let T be a set of functions and B a
    set. The projection of T on B, notation T⇓B, is defined as follows:


    T⇓B := { t↓B | t∈T }


    The projection of T on B holds every function in T limited to B. Although the
    preceding definition describes the projection for each set of functions T and
    each set B, we are mainly (but not exclusively) interested in those cases in which
    T is a table, and moreover in which B is a (non-empty) proper subset of the heading
    of such a table.


    Let’s take a look at an example to illustrate the concept of projection. Listing
    5-7 introduces table T3\. It holds five tuples with domain {empno,ename,salary,sex,dno}.


    **Listing 5-7.** *Table T3*


    T3 := { {(empno;10), (ename;''Thomas''), (salary;2400), (sex;''male''), (dno;1)}


    ,{(empno;20), (ename;''Lucas''), (salary;3000), (sex;''male''), (dno;1)}


    ,{(empno;30), (ename;''Aidan''), (salary;3000), (sex;''male''), (dno;2)}


    ,{(empno;40), (ename;''Keeler''), (salary;2400), (sex;''male''), (dno;1)}


    ,{(empno;50), (ename;''Elizabeth''), (salary;5600), (sex;''female''), (dno;2)}
    }


    Here’s the result of the projection of T3 on {salary,sex}, denoted by T3⇓{salary,sex}:
    T3⇓{salary,sex} =


    { {(salary;2400), (sex;''male'')}


    , {(salary;3000), (sex;''male'')}


    , {(salary;5600), (sex;''female'')} }


    Note that the projection of T3 on {salary,sex} results in another table: a table
    over


    {salary,sex}. This table has only three elements, whereas T3 has five elements.
    The first and the fourth tuple enumerated in the definition of T3 result in the
