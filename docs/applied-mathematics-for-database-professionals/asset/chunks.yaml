    ## Truth Tables


    Truth tables are primarily used in logic to establish the basic logical concepts.
    You can use them for two (quite different) basic purposes:

    * To define the meaning of logical connectives

    * To investigate the truth value of compound logical expressions


    By investigating compound logical expressions using truth values, you can establish
    (develop) new logical concepts; the development of rewrite rules at the end of
    this chapter is a fine example of this. Once basic logical concepts have been
    established, you’ll rarely use truth tables anymore.


    Every truth table consists of a header and a body. When defining the meaning of
    logical connectives, the leftmost column headers list the variables involved with
    the connective you want to define, and the rightmost column header lists the connective
    itself.


    When you investigate the truth value of a compound logical expression, the leftmost
    column headers list the variables involved in the compound expression, and the
    rightmost column header lists the compound expression. Optionally, you can have
    additional columns in the middle to help you gradually work towards the logical
    expression in the last column; this is especially useful if the logical expression
    under investigation is a complicated one.


    Take a look at Figure 1-1. It shows the truth table that defines the meaning of
    the logical AND connective.


    **Figure 1-1.** Structure of the truth table for logical AND


    The body of a truth table always contains one row for every possible truth combination
    of the variables involved. That is, if you have only one variable you need two
    rows (one for `TRUE` and one for `FALSE`), if you have two variables you need
    four rows (`TRUE/TRUE`, `TRUE/FALSE`, `FALSE/TRUE`, `FALSE/FALSE`), and so on.


    **Note** The variables involved in a truth table are propositional variables.


