  trans: '

    ## 引言


    本书无意改变你对数学的态度——这种态度可能介于厌恶和喜爱之间。本书的唯一目标，是向你展示作为一名数据库专业人士，如何在生活中应用数学，以及数学如何帮助你解决某些问题。我们，作为作者，坚信：熟悉本书将介绍的数学领域（`数据关系模型`正是建立在此基础之上），对于任何旨在专业从事数据库工作的人来说，都是一个强有力的先决条件。


    本书试图填补许多现有数据库书籍尚未涵盖的一个空白。在第 1 部分中，我们仅涵盖对数据库专业人士实践有用的数学知识；本部分涉及的数学理论与第 2 部分（指定数据库设计）和第
    3 部分（实现数据库设计）中的实践相关联。


    有一件事是确定的：数学迫使你清晰而精确地思考，然后尽可能正式而精确地将其书写下来。这是因为数学语言既正式又富有表现力。自然语言富有表现力但高度非正式；另一方面，编程语言是正式的，但其表现力通常远不及数学。


    ### 数学家


    数学家是奇怪的人。他们中的大多数人都有各种古怪的爱好，并且都对谜题和游戏怀有热烈的喜爱。更准确地说，他们喜欢创造自己的游戏，然后玩这些游戏。嗯，你如何创造一个游戏？你只需建立一套规则，然后开始玩。如果你是游戏的创造者，你处于一个相当奢侈的位置：如果你不太喜欢这个游戏，你只需重新审视规则，实施一些改变，然后再次开始玩——直到你喜欢这个游戏为止。


    数学家总是追求优雅和`正交性`——他们不喜欢例外。如果一个游戏的组件集合（这些组件共同构成了游戏的全部功能）是非重叠且相互独立的，则该游戏被称为是以正交方式设计的。每种功能应该只由一个组件实现，而一个组件应该只实现游戏的一种功能。分离良好且独立的组件确保没有副作用：使用甚至更改一个组件不会在游戏的其他领域引起副作用。


    > **注意** 更多信息，可参见例如 C. J. Date 的“关于正交性的说明”，最初发表于*Database Programming & Design*（1995
    年 7 月），或访问 `http://en.wikipedia.org/wiki/Orthogonality`。


    如果你能以更简单的方式完成同样的事情，为何要采用复杂的方式？为何允许在某些地方使用技巧，却同时在另一些地方禁止它们，而同样的技巧在那里可能很有意义？例外是最糟糕的。因此，数学家总是探索他们游戏的边界。如果既定规则在边界处表现不佳，就有改进的空间。


    ### 书籍高层概述


    随着时间的推移，数学家催生了几门正式的学科。本书特别关注以下两门正式学科，因为它们是在数据库领域应用数学时最相关的两门：


    *   逻辑学

    *   集合论


    本书的第一部分由四章组成；它们介绍了数学本身。在阅读这些章节时，如果你没有立即看到它们与你的相关性，请尝试保持一些耐心；它们为本书的第二和第三部分奠定了所需的数学概念、技术和符号基础。


    > **注意** 即使你乍一看认为自己的数学技能已经足够强大，我们也建议你详细阅读和研究前四章，并完成所有习题，且不要先看相应的解答。这将帮助你习惯本书通篇使用的数学符号；此外，一些习题旨在让你意识到某些常见错误。


    第二部分由第 5 章到第 10 章组成，展示了数学在数据库问题上的应用。第 5 章介绍了一种指定表设计的正式方法，并介绍了数据库状态的概念。第 6 章确立了数据完整性谓词的概念；我们使用它们来指定数据完整性约束。第
    7 章以清晰的数学形式指定了一个完整的数据库设计示例。通过这个示例，你会发现指定数据库设计在很大程度上涉及指定数据完整性约束。第 8 章增加了状态转移约束的概念，并为给定的示例数据库设计正式指定了这些约束。第
    9 章展示了如何用数学精确地表述查询，第 10 章展示了如何正式地指定事务。


    第三部分由第 11 章和第 12 章组成。第 11 章深入探讨了在数据库管理系统（`DBMS`）中实现数据库设计，特别是其数据完整性约束的细节——这对任何数据库专业人士来说都是一项关键且具有挑战性的任务。在第
    11 章中，我们建立了理论与当今`SQL` `DBMS`实践之间的进一步联系。


    > **注意** 第 11 章是选读章节。但是，如果你涉及在 Oracle 的`SQL` `DBMS`中实现数据库设计，你会欣赏它的内容。


    第 12 章总结了本书，列出了一些结论，并提供了一些通用指南。


    本书包含若干附录：


    *   附录 A 给出了本书所用数据库设计的完整正式定义。

    *   附录 B 包含了本书使用的所有数学符号的快速参考。

    *   附录 C 提供了进一步背景阅读的参考文献。

    *   附录 D 简要探讨了`NULL`值的使用。

    *   附录 E 提供了部分习题的解答。


    我们假设你已经知晓关系模型的存在，或许你对它的内涵也有一些深入的了解（尽管这并非必需）。


    我们还假设你拥有设计数据库的经验，因此熟悉诸如键、外键、（函数）依赖和第三范式等概念（后两者并非必需）。


    *本书的主要重点在于，通常性地指定关系数据库设计，并具体性地指定此类设计中涉及的数据完整性约束。* 我们演示了初等集合论（结合逻辑学）如何帮助我们生成可靠的数据库设计规范，从而让我们清晰深入地理解相关约束。


    其他作者，最著名的是 C. J. Date 在他最近的著作*Database In Depth*（O’Reilly，2005）中，阐述了关系模型的基础，但有时假设你精通某些数学学科。本书则不预设任何数学知识；我们将从基础开始，提供必要的理论——集合论——概念，以定义关系数据库设计。


    我们必须提前说明，本书采用的方法与其他作者的方法不同（对某些人来说，可能截然不同）。本书开发的方法论仅仅使用初等集合论结合逻辑学。初等集合论足以指定关系数据库设计，包括所有相关的数据完整性约束。我们也将使用集合作为工具，来指定此类设计上的查询和事务。

    '
- fmt: '# ■Note


    We (the authors) are not the inventors of the methodology presented in this book.
    Frans Remmen and Bert de Brock originally developed this methodology in the 1980s,
    while they were both engaged at the Eindhoven University of Technology. Appendix
    C lists two references of books authored by Bert de Brock in which he introduces
    this methodology to specify database designs.


    # Database Design Implementation Issues


    The majority of all DBMSes these days are based on the ISO standard of the `SQL`
    (pronounced as “ess-cue-ell”) language. This is where you’ll get into some trouble.
    First of all, the `SQL` language is far from an elegant and orthogonal database
    language; furthermore, it is not too difficult to see that it is a product of
    years of political debates and attempts to achieve consensus.


    # ■ I N T R O D U C T I O N


    In hindsight, some battles were won by the wrong guys. Indeed, this is one of
    the reasons why C. J. Date and Hugh Darwen wrote their book on what they call
    “the third manifesto.” A fully revised third edition was published in 2006: *Databases,
    Types, and the Relational Model: The Third Manifesto* (Addison-Wesley).


    On top of this, several database software vendors have made mistakes—sometimes
    small ones, sometimes big ones—in their attempts to implement the ISO standard
    in their products.


    They also left certain features out and added nonstandard features to enrich their
    products, thus deviating from the ISO standard. As soon as you try to step away
    from mathematics (and thus from the relational model) and start using an `SQL
    DBMS`, you’ll inevitably open up several cans of worms.


    This book tries to stay away as much as possible from `SQL`, thus keeping the
    book as generic as possible. Chapter 9 (data retrieval) and Chapter 10 (data manipulation)
    display `SQL` expressions; they serve only to demonstrate (in)abilities of this
    language in comparison to the mathematical formalism introduced in this book.
    Both authors happen to have extensive experience with the `SQL DBMS` from Oracle;
    the `SQL` code given in these chapters is compliant with the 10 `g` release of
    Oracle’s `SQL DBMS`. Chapter 11 (implementing database designs) displays `SQL`
    expressions even more. We’ll also maintain the Oracle-specific content of Chapter
    11; you can download the code from the Source Code/Download area of the Apress
    Web site (`http://www.apress.com`).


    # P A R T 1


    The Mathematics


    *Everything should be made as simple as possible, but not simpler.*


    Albert Einstein (1879–1955)


    # C H A P T E R 1


    Logic: Introduction


    The word “logic” has many meanings, and is heavily overloaded. It’s derived from
    the Greek word *logicos*, meaning “concerning language and speech” or “human reasoning.”


    The section “The History of Logic” gives a concise overview of the history of
    logic, just to show that many brilliant people have been involved over several
    centuries to develop what’s now known as mathematical logic. The section is by
    no means meant to be complete.


    In the section “Values, Variables, and Types,” we’ll discuss the difference between
    *values* (constants) and *variables*. We’ll also introduce the notion of the *type
    of a variable*. We’ll use these notions in the section “Propositions and Predicates”
    to introduce the concept of a *predicate*, and its special case, a *proposition*—the
    main concepts in logic.


    The section “Logical Connectives” explains how you can build new predicates by
    combining existing predicates using *logical connectives*. Then, in the section
    “Truth Tables” you’ll see how you can use *truth tables* to define logical connectives
    and to investigate the truth value of logical expressions. Truth tables are an
    important and useful tool to start developing various concepts in logic.


    *Functional completeness* is covered in the section “Functional Completeness”;
    it’s about which logical connectives you need (as a minimum) to formulate all
    possible logical expressions.


    The following two sections introduce the concepts of *tautologies* and *contradictions*,
    *logical equivalence*, and *rewrite rules*. You can use a rewrite rule to transform
    one logical expression into another (equivalent) logical expression.


    This chapter is an introductory chapter on logic. Chapter 3 will continue where
    this one stops—the two chapters make up one single topic (logic). The split is
    necessary because some concepts concerning logic require the introduction of a
    few set-theory notions first. Chapter 2 will serve that purpose.


    The introduction of the crucial concept of *rewrite rules* at the end of this
    chapter opens up the first possibility to do some useful exercises. They serve
    two important purposes:


    • Learning how to use truth tables and rewrite rules to investigate logical expressions


    • Getting used to the mathematical symbols introduced in this chapter


    Therefore, we strongly advise you to spend sufficient time on these exercises
    before moving on to other chapters.


    ## The History of Logic


    The science of logic and the investigation of human reasoning goes back to the
    ancient Greeks, more than 2,000 years ago. Aristotle (384–322 BC), a student of
    Plato, is commonly considered the first logician.


    Gottfried Wilhelm Leibnitz (1646–1716) established the foundations for the development
    of mathematical logic. He thought that symbols were extremely important to understand
    things, so he tried to design a universal symbolic language to describe human
    reasoning. The logic of Leibnitz was based on the following two principles:


    • There are only a few simple ideas that form the “alphabet of human thought.”


    • You can generate complex ideas from those simple ideas by a process analogous
    to arithmetical multiplication.


    George Boole (1815–1864) invented the general concept of a Boolean algebra, the
    foundation of modern computer arithmetic. In 1854 he published *An Investigation
    of the Laws of Thought on Which Are Founded the Mathematical Theories of Logic
    and Probabilities*, in which he shows that you can perform arithmetic on logical
    symbols just like algebraic symbols and numbers.


    In 1922, Ludwig Wittgenstein (1889–1951) introduced truth tables as we know them
    today, based on the earlier work of Gottlob Frege (1848–1925) and others during
    the 1880s.


    After a formal notation was introduced, several attempts were made to use mathematical
    logic to describe the foundation of mathematics itself. The attempt by Gottlob
    Frege (that failed) is famous; Bertrand Russell (1872–1970) showed in 1901 that
    Frege’s system could produce a contradiction: the famous Russell’s paradox (see
    sidebar). Later attempts to achieve the same goal were performed by Bertrand Russell
    and Alfred North Whitehead (1861–1947), David Hilbert (1862–1943), John von Neumann
    (1903–1957), Kurt Gödel (1906–1978), and Alfred Tarski (1902–1983), just to name
    a few of the most famous ones.


    ### RUSSELL’S PARADOX


    Russell’s paradox can be difficult to understand for readers who are unfamiliar
    with mathematical logic in general and with setting up a mathematical proof in
    particular. The paradox goes as follows:


    **1.** Consider the set of all sets that are not members of themselves; let’s
    call this set `X`.


    **2.** Suppose `X` is an element of `X`—but then it must *not* be a member of
    itself, according to the preceding definition of set `X`. So the supposition is
    FALSE.


    **3.** Similarly, suppose `X` is *not* an element of `X`—but then it must be a
    member of itself, again according to the preceding definition of set `X`. So this
    supposition is FALSE too.


    **4.** But surely one of these two suppositions must be TRUE; hence the paradox.'
