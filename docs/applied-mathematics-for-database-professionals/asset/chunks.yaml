- fmt: '## Idempotence


    Some (dyadic) operators have the property that if their operands are equal, then
    their result is equal to this operand. The operands are said to be idempotent
    under the operator. In logic, propositions are idempotent under disjunction and
    conjunction, as shown in Listing 3-9.


    **Listing 3-9.** Idempotence Properties


    `( P ∧ P ) ⇔ P`

    `( P ∨ P ) ⇔ P`


    ## Double Negation (or Involution)


    If you apply the negation twice, you should get back the original operand. In
    other words, the negation operates as the complement, as shown in Listing 3-10.


    **Listing 3-10.** Double Negation


    `¬¬P ⇔ P`


    ## Absorption


    The absorption properties are not so well known and might be a little difficult
    to understand at first glance. They are listed in Listing 3-11.


    **Listing 3-11.** Absorption Properties (“P Absorbs Q”)


    `( P ∨ ( P ∧ Q ) ) ⇔ P`

    `( P ∧ ( P ∨ Q ) ) ⇔ P`


    The first absorption rule states that in a disjunction of two predicates (say
    `R1 ∨ R2`) where one of the disjuncts (say the right one `R2`) is stronger than
    the other disjunct (`R1`), then `R2` may be left out without affecting the truth
    value of the predicate.


    **Note** Recall from the section “Predicate Strength” in Chapter 1 that a predicate
    `R2` is stronger than a predicate `R1` if and only if `R2 ⇒ R1`. In the first
    absorption rule, the right disjunct `P ∧ Q` is always stronger than `P` (left
    disjunct), because the predicate `(P ∧ Q) ⇒ P` is a tautology.


    Similarly, the second absorption rule states that in a conjunction of two predicates,
    say `R1 ∧ R2`, where one of the conjuncts (say the right one `R2`) is weaker than
    the other conjunct (`R1`), then `R2` may be left out without affecting the truth
    value of the predicate.


    The proof of the two absorption equivalences is left as an exercise at the end
    of this chapter.


    ## Quantifiers


    Chapter 1 clarified the difference between propositions and predicates. It talked
    about how you can turn a predicate into a proposition. There are two ways to achieve
    that goal:

    * By providing values for the parameters in the predicate.

    * By binding the parameters in the predicate through quantification.


    The first method is straightforward and is explained in Chapter 1; this section
    explains the second method.


    To use quantification for this goal, you must first define which set of possible
    values a parameter of the predicate, say `x`, is allowed to choose its values
    from. Through quantification over this set of possible values, you can then say
    something about *how many* of those possible values have a certain property (this
    is, where the predicate is turned into a proposition). For example, you could
    say that there are precisely 42 values for `x` with a certain property. However,
    the two most common quantifying statements are as follows:

    * There exists a value for `x` for which it is TRUE that, [declarative sentence
    with `x`].

    * For all values for `x` it is TRUE that, [declarative sentence with `x`].


    The first statement says something about the existence of at least one value;
    therefore it’s referred to as *existential* quantification. The second statement
    is known as *universal* quantification because you say something about all elements
    of a given set. You can represent the existential and universal quantifiers with
    two symbols, as you can see in Table 3-1.


    **Table 3-1.** The Existential and Universal Quantifiers


    | Symbol | Description |

    | :--- | :--- |

    | `∃` | Existential quantifier (There exists . . .) |

    | `∀` | Universal quantifier (For all . . .) |


    Let `P(x)` and `Q(y)` be given predicates with parameters `x` and `y`, respectively.
    Let set `A` be a given set representing the possible values for parameter `x`,
    and set `B` the same for `y`. The general syntax for expressions using quantification
    is shown in Listing 3-12.


    **Listing 3-12.** General Quantifier Syntax


    `∃x∈A: P(x)`

    `∀y∈B: Q(y)`


    The meaning of these two expressions is defined as follows:'
