- fmt: "# 第11章 在Oracle中实现数据库设计\n\n### 声明式策略\n\n在*声明式*策略中，您只需向`DBMS`声明数据库设计中涉及的约束。`DBMS`随后会自动确保——希望是以一种高效的方式——当违规的`DML`语句试图创建违反任何已声明约束的数据库状态时，这些语句将被回滚。\n\
    \n请注意，为了能够向`DBMS`声明约束，您首先需要这些约束的（某种形式的）形式化规范，以精确说明约束的*内容*。声明式策略的优势在于，您只需告诉`DBMS`约束的*内容*是什么；也就是说，您无需编写任何`DI`代码。从本质上讲，向`DBMS`声明约束就构成了`DI`代码。\n\
    \n一旦您声明了一个约束，`DBMS`就面临着以何种方式高效检查该约束的挑战；它的任务是生成（希望）*高效*的`DI`代码，并确保在处理事务时，这些代码在适当的时间被自动执行。\n\
    \n### 注意\n您将在本章中看到，上一句话中的“高效”一词是至关重要的。\n\nOracle的`SQL DBMS`允许您以声明方式指定某些约束，可以作为`create\
    \ table`命令的一部分，也可以在表创建后通过`alter table add constraint`命令单独指定。\n\n从“实现属性约束”一节开始，您将找到可以声明指定的约束的完整介绍。作为预览，清单11-1包含一个向已创建表添加约束的示例。它展示了用于声明清单7-26（`EMP`表的宇宙）中第二个表约束的`SQL`语法，该约束声明：\n\
    \n`{USERNAME}`是一个键。\n\n### 清单11-1. 使用`SQL`声明键\n```\nalter table EMP add constraint\
    \ EMP_K2 unique (USERNAME);\n```\n\n通过前面的`alter table SQL`语句，您将`{USERNAME}`声明为`EMP`表结构的键。此命令允许您为约束命名（在上面的例子中，它被命名为`EMP_K2`）。如果您想删除此约束，就需要使用这个名称。\n\
    \n### 注意\n如果您不提供名称，`DBMS`将为您生成一个。\n\n在本章的所有示例中，我们选择只使用`alter table add constraint`语句，以便逐步构建数据库设计的实现。您也可以选择将每个声明式添加的约束作为`create\
    \ table`语句的一部分来声明。您可以在线找到作为`create table`语句一部分的、声明`UEX`数据库设计约束的`SQL`表达式，网址为：`http://www.rulegen.com/am4dp`。\n\
    \n### 触发式过程策略\n\n在*触发式过程*策略中，您不向`DBMS`声明约束（*内容*）。相反，您的任务是自己编写过程化的`DI`代码（*方式*）。同时，您通过创建*触发器*来调用您的`DI`代码，从而告诉`DBMS`*何时*执行这些代码。您可以将触发器视为一段过程代码，`DBMS`将在某些事件发生时自动执行它。让我们更详细地解释一下。\n\
    \n### 注意\n触发器可以用于多种目的。执行`DI`代码以强制执行数据完整性只是其中之一（也是本章我们将重点关注的目的）。\n\n每个触发器都与一个表结构相关联，并且每当事务对该表结构执行`DML`语句时，`DBMS`都会自动执行（*触发*）它。\n\
    \n然后，作为同一事务一部分执行的触发器代码可以检查新的数据库状态是否仍然满足所有约束。\n\nOracle的`SQL DBMS`为每个表结构提供了`SQL`标准中定义的12种不同类型的触发器：\n\
    \n*   四种*插入触发器*：一种在`INSERT`语句开始执行前触发（称为*语句前插入触发器*），一种在实际插入行之前触发（*行前插入触发器*），一种在行插入后触发（*行后插入触发器*），最后一种在`INSERT`语句完成后触发（*语句后插入触发器*）。\n\
    *   四种*更新触发器*：类似于插入触发器，有四种类型的更新触发器——语句前、行前、行后和语句后。\n*   四种*删除触发器*：同样的四种类型。\n\n\
    语句触发器（前和后）每个（触发）`DML`语句只会触发一次。\n\n行触发器将根据`DML`语句影响的行数触发相应次数。\n\n例如，一个`UPDATE`语句增加了员工表中所有员工（假设目前有十名）的月薪，将导致行前和行后更新触发器各自触发十次。而语句前和语句后更新触发器在此情况下各只触发一次。\n\
    \n行级触发器能够引用受触发`DML`语句影响的行的列值。行前和行后插入触发器可以检查新行（被插入的行）的所有列值。行前和行后删除触发器可以检查旧行（被删除的行）的所有列值。行前和行后更新触发器可以同时检查旧行的所有列值和新行的所有列值。\n\
    \n### 注意\n`UPDATE`语句用一组行（“新”行）替换另一组行（“旧”行）。\n\n如果您还不熟悉Oracle中可用的各种表触发器类型，我们建议您参考Oracle手册以获取更多信息。在本章的其余部分，我们假设您熟悉它们。\n\
    \n对于语句级触发器来说，要引用受触发`DML`语句影响的行并非易事；它们要么看到`DML`语句开始前存在的（旧）表（前触发器），要么看到`DML`语句完成后得到的（新）表（后触发器）。您可以使语句级触发器能够看到受影响的行，但这需要您进行一些复杂的编码。在本章后面，您会发现这实际上是在触发式过程策略中开发*高效*`DI`代码的一个要求。然后我们将演示如何实现这一点。\n\
    \n为了说明使用触发器作为实现`DI`代码的手段，这里有一个例子。\n\n让我们看看为`EMP`表结构的“最多允许一位总裁”表约束实现一个触发器。清单11-2展示了实现这样一个附加到`EMP`表结构的触发器的`SQL`语法。\n\
    \n### 清单11-2. 使用`SQL`将触发器附加到表\n```\ncreate trigger EMP_AIUS\nafter insert or update\
    \ on EMP\ndeclare\n  pl_num_presidents number;\nbegin\n  --\n  select count(*)\
    \ into pl_num_presidents\n  from EMP\n  where job='PRESIDENT';\n  --\n  if pl_num_presidents\
    \ > 1\n  then\n    raise_application_error(-20999,'Not allowed to have more than\
    \ one president.');\n  end if;\n  --\nend;\n/\n```\n\n创建此触发器的方式（第二行：`after insert\
    \ or update`）确保了每当`BL`代码插入或更新一名员工（此约束的*何时*）时，`DBMS`都会执行触发器的过程代码。该触发器会在这样的插入或更新执行后立即触发。因此，嵌入的代码将看到反映该插入或更新所做更改的数据库状态。"
  raw: 'In the *declarative* strategy, you simply declare the constraints that are
    involved in your database design to the DBMS. The DBMS then automatically ensures—hopefully
    in an efficient manner—that offending DML statements will be rolled back when
    they try to create a database state that violates any of the declared constraints.


    Note that to be able to declare constraints to the DBMS, you first require (some
    form of ) a formal specification of these constraints that states exactly *what*
    the constraint is. The strength of the declarative strategy is that you just tell
    the DBMS *what* the constraint is; that is, there is no need for you to write
    any DI code. In essence, the declaration of the constraint to the DBMS constitutes
    the DI code.


    Once you’ve declared a constraint, the DBMS then has the challenge of computing
    *how* best to check the constraint in an efficient manner; it is tasked to generate
    (hopefully) *efficient* DI code and ensure this code is automatically executed
    at the appropriate times when transactions are processed.


    **■Note** You’ll see in the course of this chapter that the word “efficient” in
    the preceding sentence is imperative.


    Oracle’s SQL DBMS allows you to specify certain constraints declaratively either
    as part of the create table command, or separately (after the table has already
    been created) through the alter table add constraint command.


    Starting from the section “Implementing Attribute Constraints” onwards, you’ll
    find a full treatment of constraints that you can specify declaratively. As a
    preview, Listing 11-1 contains an example of adding a constraint to an already
    created table. It shows the SQL syntax for declaring the second table constraint
    in Listing 7-26 (the table universe for EMP) stating that


    {USERNAME} is a key.


    **Listing 11-1.** *Declaring a Key Using SQL*


    alter table EMP add constraint EMP_K2 unique (USERNAME);


    Through the preceding alter table SQL statement, you declare {USERNAME} as a key
    for the EMP table structure. This command allows you to give the constraint a
    name (in the preceding case it is named EMP_K2). You’ll need to use this name
    if you want to drop the constraint.


    7451CH11.qxd 5/15/07 2:26 PM Page 249


    C H A P T E R 1 1 **■** I M P L E M E N T I N G D ATA B A S E D E S I G N S I
    N O R A C L E


    **249**


    **■Note** If you don’t supply a name, the DBMS will generate one for you.


    We’ve chosen to use only the alter table add constraint statement in our examples
    throughout this chapter, so that we can gradually build the implementation of
    the database design. You could have declared every declaratively added constraint
    instead as part of the create table statement. You can find the SQL expressions
    that declare constraints of the UEX


    database design as part of the create table statement online at http://www.rulegen.com/


    am4dp.


    Triggered Procedural


    In the *triggered procedural* strategy, you don’t declare the constraint (the
    *what*) to the DBMS.


    Instead, you are tasked to write procedural DI code (the *how*) yourself. And,
    in conjunction, you also tell the DBMS *when* to execute your DI code by creating
    *triggers* that call your DI code. You can view a trigger as a piece of procedural
    code that the DBMS will automatically execute when certain events occur. Let’s
    explain this a bit more.


    **■Note** Triggers can serve many purposes. Executing DI code to enforce data
    integrity is only one such purpose (and the one we’ll be focusing on in this chapter).


    Every trigger is associated with a table structure and will automatically be executed
    ( *fired*) by the DBMS whenever a transaction executes a DML statement against
    that table structure.


    The trigger code—which executes as part of the same transaction—can then check
    whether the new database state still satisfies all constraints.


    Oracle’s SQL DBMS offers the 12 different types of triggers for each table structure,
    which are defined in the SQL standard:


    • Four *insert triggers*: One that fires before an INSERT statement starts executing
    (referred to as the *before statement insert trigger*), one that fires right before
    an actual row is inserted ( *before row insert trigger*), one that fires after
    a row has been inserted ( *after row* *insert trigger*), and finally one that
    fires after completion of an INSERT statement ( *after* *statement insert trigger*).


    • Four *update triggers*: Similar to the insert triggers, there are four types
    of update triggers—before statement, before row, after row, and after statement.


    • Four *delete triggers*: The same four types.


    The statement triggers (before and after) will only fire once per (triggering)
    DML statement.


    The row triggers will fire as many times as there are rows affected by the DML
    statement.


    For instance, an UPDATE statement that increases the monthly salary of all employees
    in the employee table (say there are currently ten) will cause the before and
    after row update triggers each to fire ten times. The before and after statement
    update triggers will only fire once each in this case.


    7451CH11.qxd 5/15/07 2:26 PM Page 250


    **250**


    C H A P T E R 1 1 **■** I M P L E M E N T I N G D ATA B A S E D E S I G N S I
    N O R A C L E


    Row-level triggers are able to refer to the column values of the rows that are
    affected by the triggering DML statement. Before and after row insert triggers
    can inspect all column values of the new rows (the ones that are inserted). Before
    and after row delete triggers can inspect all columns of the old rows (the ones
    that are deleted). Before and after row update triggers can inspect both all column
    values of the old rows and all column values of the new rows.


    **■Note** An UPDATE statement replaces one set of rows (the “old” ones) by another
    (the “new” ones).


    If you aren’t already familiar with the various types of table triggers available
    in Oracle, we refer you to the Oracle manuals for more information on this. In
    the rest of this chapter, we assume you are familiar with them.


    There isn’t an easy way for statement-level triggers to reference the rows that
    are affected by the triggering DML statement; they either see the (old) table
    as it existed before the start of the DML statement (before trigger), or the resulting
    (new) table as it exists after completion of the DML statement (after trigger).
    You can enable statement-level triggers to see the affected rows, but it requires
    some sophisticated coding on your part. Later on in this chapter, you’ll discover
    that this is actually a requirement in order to be able to develop *efficient*
    DI code in the triggered procedural strategy. We’ll then demonstrate how this
    can be done.


    To illustrate the use of a trigger as a means to implement DI code, here is an
    example.


    Let’s take a look at implementing a trigger for the “at most one president allowed”
    table constraint of the EMP table structure. Listing 11-2 shows the SQL syntax
    for implementing such a trigger that is attached to the EMP table structure.


    **Listing 11-2.** *Attaching a Trigger to a Table Using SQL*


    create trigger EMP_AIUS


    after insert or update on EMP


    declare pl_num_presidents number;


    begin


    --


    select count(*) into pl_num_presidents


    from EMP


    where job=''PRESIDENT'';


    --


    if pl_num_presidents > 1


    then


    raise_application_error(-20999,''Not allowed to have more than one president.'');
    end if;


    --


    end;


    /


    7451CH11.qxd 5/15/07 2:26 PM Page 251


    C H A P T E R 1 1 **■** I M P L E M E N T I N G D ATA B A S E D E S I G N S I
    N O R A C L E


    **251**


    The way this trigger is created (in the second line: after insert or update) ensures
    that the DBMS executes the procedural code of the trigger whenever BL code inserts
    or updates an employee (the *when* of this constraint). The trigger will fire
    immediately after execution of such an insert or update. Therefore, the embedded
    code will see a database state that reflects the changes made by the insert or
    update.'
