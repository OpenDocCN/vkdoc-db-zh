- fmt: '# 量化空集与嵌套量词


    第二个命题——对空集的普遍量化——不太直观。将普遍量化视为迭代的与运算（AND），你会发现对空集的普遍量化不产生任何合取项。这样的量化根本不添加任何谓词，因此可以被认为是最弱的谓词，即为真（TRUE）（回顾第一章“真值表”小节中关于谓词强度的段落）。正如我们在“量词的否定”一节中讨论关于量词否定的一些额外重写规则时将看到的，这完全合理。表3-2列出了关于空集量化的这两个重要的重写规则。


    **表3-2. 空集量化——重写规则**


    | 量化 | 求值结果 |

    | :--- | :--- |

    | `( ∃x∈∅: P(x) )` | 假（FALSE），与谓词 `P(x)` 无关 |

    | `( ∀y∈∅: Q(y) )` | 真（TRUE），与谓词 `Q(y)` 无关 |


    ## 嵌套量词


    量词可以嵌套。也就是说，你可以在单个谓词中使用多个量词。先看一个例子。假设有以下两个集合：`S := {1,2,3,4}` 和 `T := {1,2}`。


    现在看下面四个（非常相似的）命题：


    - `(∀x∈S: (∃y∈S: y = x ))` （对于 `S` 中的所有 `x`，存在 `S` 中的一个 `y` 使得 `y = x`）

    - `(∃y∈S: (∀x∈S: y = x ))` （存在 `S` 中的一个 `y`，使得对于 `S` 中的所有 `x` 都有 `y = x`）

    - `(∀x∈S: (∃y∈T: y = x ))` （对于 `S` 中的所有 `x`，存在 `T` 中的一个 `y` 使得 `y = x`）

    - `(∀x∈T: (∃y∈S: y = x ))` （对于 `T` 中的所有 `x`，存在 `S` 中的一个 `y` 使得 `y = x`）


    如果你比较前两个命题，你会发现它们只涉及集合 `S`；此外，两个量词的位置互换了。在最后两个例子中，两个集合 `S` 和 `T` 的位置互换了。现在，如果你根据给定的两个集合检查这些命题以研究它们的真值，可以得出以下结论：


    - 第一个命题显然是真（TRUE），因为你可以简单地为 `y` 选择与 `x` 相同的值。

    - 第二个命题是假（FALSE）；不存在这样的值 `y`。一旦你通过选择一个值绑定了变量 `y`，`x` 就只有一个选择（即相同的值）。

    - 第三个命题也是假（FALSE）；反例是 `x = 3` 和 `x = 4`。

    - 最后一个命题是真（TRUE），因为 `T` 是 `S` 的子集。


    ### 交换嵌套量词


    从前一节的前两个例子中，你可以得出这个重要结论：有时你可以安全地交换表达式中嵌套的量词，但有时不能——这会改变表达式的含义。


    **> 注意** 嵌套量化并不总是可以无风险地互换。


    如果满足以下两个条件，你可以安全地交换公式中两个连续的量词：


    - 两个量化类型*相同*；即它们必须都是全称量词（∀）或都是存在量词（∃）。

    - 你量化的集合都不依赖于另一个集合所绑定的变量；即内部量化的集合不受你为外部量化选择的变量值的影响。


    例如，以下两个表达式是重言式：


    ```

    ∀x∈A: ∀y∈B: P(x,y) ⇔ ∀y∈B: ∀x∈A: P(x,y)

    ∃x∈A: ∃y∈B: Q(x,y) ⇔ ∃y∈B: ∃x∈A: Q(x,y)

    ```


    然而，以下两个表达式*不是*重言式：


    ```

    ∀x∈A: ∃y∈B: P(x,y) ⇔ ∃y∈B: ∀x∈A: P(x,y)

    ∀x∈A: ∀y∈(B∪{x}): Q(x,y) ⇔ ∀y∈(B∪{x}): ∀x∈A: Q(x,y)

    ```


    最后一个例子相当棘手；回想一下第二章，符号 `∪` 代表并集运算符。所以，一旦你为 `x` 选择了一个值，在试图找到一个使 `Q(x,y)` 为真（TRUE）的
    `y` 值之前，你会将该值添加到集合 `B` 中。请注意，如果你交换量词，表达式甚至会变得非法，因为现在你引用了变量 `x`，而此时它尚未被绑定。'
  raw: 'The second proposition—universal quantification over the empty set—is less
    intuitive. By treating universal quantification as an iterated AND, you’ll notice
    that a universal quantification over the empty set delivers no conjunct. Such
    quantification adds no predicate at all, and can therefore be considered the weakest
    predicate possible, which is TRUE (recall the paragraph on predicate strength
    in the “Truth Tables” section in Chapter 1). As you’ll see when we discuss some
    additional rewrite rules regarding the negation of quantifiers in the section
    “Negation of Quantifiers,” it makes complete sense. Table 3-2 lists these two
    important rewrite rules regarding quantification over the empty set.


    7451CH03.qxd 5/4/07 2:26 PM Page 55


    C H A P T E R 3 **■** S O M E M O R E L O G I C


    **55**


    **Table 3-2.** *Quantification Over the Empty Set—Rewrite Rules* **Quantification**


    **Evaluates to**


    ( ∃x∈∅: P(x) )


    FALSE, regardless of predicate P(x)


    ( ∀y∈∅: Q(y) )


    TRUE, regardless of predicate Q(y)


    **Nesting Quantifiers**


    Quantifiers can be nested. That is, you can use multiple quantifiers in a single
    predicate. Let’s look at an example first. Suppose the following two sets are
    given: S := {1,2,3,4}


    T := {1,2}


    Now look at the following four (very similar) propositions:


    • (∀x∈S: (∃y∈S: y = x )) (For all x in S there exists a y in S for which y = x)


    • (∃y∈S: (∀x∈S: y = x )) (There exists a y in S for which all x in S y = x)


    • (∀x∈S: (∃y∈T: y = x )) (For all x in S there exists a y in T for which y = x)


    • (∀x∈T: (∃y∈S: y = x )) (For all x in T there exists a y in S for which y = x)
    If you compare the first two propositions, you’ll see that they refer to the set
    S only; moreover, the two quantifiers are interchanged. In the last two examples,
    the two sets S and T are interchanged. Now if you check these propositions against
    the given two sets to investigate their truth value, you can draw the following
    conclusions:


    • The first proposition is obviously TRUE, because you can simply choose the same
    value for y as the one you chose for x.


    • The second proposition is FALSE; there is no such value y. As soon as you’ve
    bound variable y by selecting a value, there is only one choice for x (namely
    the same value).


    • The third proposition is FALSE too; the counter examples are x = 3 and x = 4.


    • The last proposition is TRUE, because T is a subset of S.


    Interchanging Nested Quantifiers


    From the first two examples in the previous section, you can draw this important
    conclusion: sometimes you can safely interchange nested quantifiers in your expressions,
    but sometimes you can’t—without changing the meaning of the expression.


    **■Caution** Nested quantifications cannot always be interchanged without risk.


    7451CH03.qxd 5/4/07 2:26 PM Page 56


    **56**


    C H A P T E R 3 **■** S O M E M O R E L O G I C


    You can safely interchange two successive quantifiers in a formula if the following
    two conditions are met:


    • Both quantifications are of the *same type*; that is, they must be either both
    universal or both existential.


    • None of the sets over which you quantify is dependent on the variable bound
    to the other set; that is, the set for the inner quantifier is not influenced
    by the value you choose for the variable in the outer quantifier.


    For example, the following two expressions are tautologies:


    ∀x∈A: ∀y∈B: P(x,y) ⇔ ∀y∈B: ∀x∈A: P(x,y)


    ∃x∈A: ∃y∈B: Q(x,y) ⇔ ∃y∈B: ∃x∈A: Q(x,y)


    However, these two *are not* tautologies:


    ∀x∈A: ∃y∈B: P(x,y) ⇔ ∃y∈B: ∀x∈A: P(x,y)


    ∀x∈A: ∀y∈(B∪{x}): Q(x,y) ⇔ ∀y∈(B∪{x}): ∀x∈A: Q(x,y)


    The last example is rather tricky; remember from Chapter 2, the symbol ∪ stands
    for the union operator. So as soon as you have chosen a value for x, you add that
    value to set B before you try to find a value y for which Q(x,y) is TRUE. Note
    that the expression even becomes illegal if you interchange the quantifiers, because
    now you have a reference to the variable x in'
