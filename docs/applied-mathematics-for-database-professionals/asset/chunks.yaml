  trans: '## 章节小结


    在继续下一节的练习之前，如果你对本章（关于逻辑的第一章）介绍的以下概念中的任何一个感到不熟悉，可能需要回顾一下本章的某些部分：


    •  `值` 是一个具有确定含义的独立常量。


    •  `变量` 是一个用于存放（某种表示的）值的容器。


    •  `命题` 是一个非真即假的陈述句。


    •  `谓词` 是一个带有参数的、返回真值的函数。


    •  通过为参数提供值或用量词绑定参数，你可以将谓词转换为命题。


    •  你可以通过将 `逻辑连接词` 应用于现有的谓词来构建复合谓词；本章介绍了 `否定`、`合取`、`析取`、`蕴含` 和 `等价`。


    •  逻辑连接词可以被视为 `逻辑算子`；它们接受一个或多个（输入）谓词作为操作数，并返回另一个谓词作为输出。


    •  复合谓词的输入谓词也称为该复合谓词的 `组成部分`。


    •  所有逻辑连接词的精确含义都可以用 `真值表` 来定义，你可以使用真值表来研究复合谓词的真值。


    •  `重言式` 是一个恒为真的命题，`矛盾式` 是一个恒为假的命题。


    •  `重写规则` 是一个具有等价形式的重言式。


    •  你可以使用重写规则来推导出新的重写规则，而无需使用真值表。


    ### 练习题


    **1.** 以下哪些谓词是命题？


    **a.** 太阳是由橙汁构成的


    **b.** `y + x > y`


    **c.** 存在一个真正的关系型数据库管理系统


    **d.** 如果你不是女性，那你就一定是男性


    **e.** 5 是偶数


    **2.** 用表 1-9 中定义的 `与非` 连接词来表达逻辑连接词 AND 和 OR。


    **3.** 通过为表 1-13 中的每个重写规则建立真值表，或使用你在此练习中早些时候验证过的重写规则，来证明这些重写规则是正确的。


    **4.** 证明以下关于蕴含的重要重写规则是正确的：


    **a.** `( P ⇒ Q ) ⇔ ( ¬Q ⇒ ¬P )`


    **b.** `( P ⇔ Q ) ⇔ ( ( P ⇒ Q ) ∧ ( Q ⇒ P ) )`


    **c.** `¬ ( P ⇒ Q ) ⇔ ( P ∧ ¬Q )`


    **d.** `¬ ( P ∧ Q ) ⇔ ( P ⇒ ¬Q )`


    **e.** `( ( P ⇒ Q ) ∧ ( P ⇒ ¬Q ) ) ⇔ ¬P` （谬误规则）


    **5.** 查看以下谓词，并检查它们是否是重言式：


    **a.** `P ⇒ ( P ∧ Q )`


    **b.** `P ⇒ ( P ∨ Q )`


    **c.** `( P ∧ Q ) ⇒ P`


    **d.** `( P ∨ Q ) ⇒ P`


    **e.** `( P ∧ ( P ⇒ Q ) ) ⇒ Q`


    **f.** `( P ⇒ Q ) ⇒ ( P ∧ Q )`


    **g.** `( P ∧ Q ) ⇒ ( P ⇒ Q )`


    **h.** `( ( P ⇒ Q ) ∧ ( Q ⇒ R ) ) ⇒ ( P ⇒ R )`


    **i.** `( P ⇒ R ) ⇒ ( ( P ⇒ Q ) ∧ ( Q ⇒ R ) )`


    **j.** `( P ∨ Q ) ⇔ ( ¬P ⇒ Q )`


    **k.** `( P ∨ Q ∨ R ) ⇔ ( ( ¬P ∧ ¬Q ) ⇒ R )`


    **l.** `( P ∨ Q ∨ R ) ⇔ ( ¬P ⇒ ( Q ∨ R ) )`


    **m.** `P ∨ ( Q ∧ R ) ⇔ ( ¬P ⇒ Q ) ∨ ( ¬P ⇒ R )`


    **n.** `P ∨ ( Q ∧ R ) ⇔ ( ¬P ⇒ Q ) ∧ ( ¬P ⇒ R )`


    ## 集合与元素


    集合论显然是关于集合的。在这里，我们遇到了第一个问题：集合`是`什么？集合是对象的汇集，这些对象被称为集合的 `元素`。在数学中，我们喜欢精确——所以我们希望为我们使用的所有术语提供正式的定义。就像在几何学中，我们都对
    `点` 是什么有一个共同的理解，但提供一个点的形式定义却很困难。这就是为什么我们将它们声明为 `原始术语`；也就是说，它们只是给定的，你不需要定义它们。关于集合最好的定义可能就是定义
    2-1 所给出的那个。


    ### 定义 2-1：集合

    集合由其互异的元素完全刻画，除了这些元素之外别无其他。


    作为一个相当明显但重要的推论，没有两个不同的集合包含完全相同的元素；此外：


    •  集合的元素没有任何顺序


    •  集合不包含重复的元素


    如果集合 A 的每个元素都是集合 B 的元素，并且集合 B 的每个元素也都是集合 A 的元素，那么这两个集合（比如 A 和 B）是相同的。


    注意，集合的元素可以是任何类型的对象。它们甚至可以是集合本身；在本书的剩余部分，你将会看到大量包含集合作为元素的集合示例。


    集合论有一个数学符号 `∈`，用于声明某个对象是某个集合的元素。下面的表达式声明对象 x 是集合 S 的一个元素：`x ∈ S`


    这个命题的否定，即说 x 不是 S 的一个元素，表示如下：`x ∉ S`


    后一个表达式是前一个表达式的否定简写：`x ∉ S ⇔ ¬(x ∈ S)`


    表 2-1 列出了这些以及一些其他常用的集合论符号。'
- fmt: "# 第二章 集合论：导论\n\n**表 2-1. 集合论符号**\n\n| 符号 | 含义 |\n| :--- | :--- |\n| ∈ | 是...的元素\
    \ |\n| ∉ | 不是...的元素 |\n| **Z** | 所有正整数、负整数及零构成的集合 |\n| **N** | 自然数集，即大于或等于零的整数\
    \ |\n| ∅ | 空集 |\n\n**N** 和 **Z** 是来自常规算术的集合示例；以下是一些其他例子：\n- 所有小于20的素数构成的集合（例如称为\
    \ `P`）：\n  `P := {2,3,5,7,11,13,17,19}`\n- 一周七天名称构成的集合（例如称为 `W`）：\n  `W := {'sunday','monday',\
    \ 'tuesday','wednesday','thursday','friday','saturday'}`\n\n这里我们使用了枚举法来指定一个集合：在花括号内列出所有用逗号分隔的元素。这种方法以及其他一些指定集合的方法将在下一节介绍。\n\
    \n空集符号 `∅` 表示一个不包含任何元素的集合。`{}` 也用于表示空集。\n\n一旦你为集合命名（就像我们为前面两个集合 `P` 和 `W` 所做的那样），就可以写出如下表达式：\n\
    - `-5 ∉ N`\n- `-6 ∈ Z`\n- `'4' ∉ N`\n- `'thursday' ∈ W`\n- `x ∈ P`\n\n注意，前四个表达式实际上是命题；顺便说一下，它们都具有真值\
    \ TRUE。最后一个是一个谓词（假设 `x` 代表一个数值变量）。\n\n你可以通过采用某些标准来保持表达式的可读性；例如，通常约定使用*小写*命名元素，使用*大写*命名集合。\n\
    \n但请注意，这只是一个命名约定；你不能根据标识符名称是大写还是小写来得出任何结论。考虑以下表达式：\n`X ∈ Y`\n\n该表达式*仅*在 `Y` 表示（或指代）一个集合时有定义；否则，它是一个未定义、无意义或格式错误的公式。也就是说，如果\
    \ `Y` 不指代一个集合，你就无法判断该语句是 TRUE 还是 FALSE。另一方面，`X` 和 `Y` 都可能指代集合，因为集合可以包含集合作为元素。看看以下三个例子：\n\
    - `3 ∈ 5` 既非 TRUE 也非 FALSE；它是一个*无意义*的表达式。\n- `1 ∈ {1,2}` 为 TRUE，`2 ∈ {1,2}` 为\
    \ TRUE。\n- `{1,2} ∈ {1,2}` 为 FALSE。\n- `{1,2} ∈ {{1,2},3}` 为 TRUE。\n\n为了澄清最后一个例子为何是一个\
    \ TRUE 命题，我们给右边的集合起个名字：\n`S := {{1,2},3}`\n\n那么集合 `S` 包含两个元素：第一个元素是集合 `{1,2}`，另一个元素是数值\
    \ `3`。因此，语句 `{1,2} ∈ {{1,2},3}` 是一个 TRUE 命题。\n\n## 指定集合的方法\n\n到目前为止，你已经看到了几个集合的例子；除了集合\
    \ `Z` 和 `N` 外，它们都使用了*枚举法*来指定其元素，将所有元素列为一个用逗号分隔并放在花括号内的列表。我们将在本节讨论的其他方法基于一个给定的集合，并使用谓词来导出新的集合。\n\
    \n### 枚举法\n\n枚举（顾名思义，逐一列出）是迄今为止最简单的集合指定方法；你在花括号（也称为大括号）内列出集合的所有元素，并用逗号分隔。\n\n\
    参见代码清单 2-1 中的一些例子。\n\n**代码清单 2-1. 枚举法指定集合示例**\n```\nE1 := {1,3,5,7,9}\nE2 := {'a',2,'c',4}\n\
    E3 := {8,6,{8,6}}\n```\n请注意，在数学中，同一集合的元素不需要是相同类型；例如，代码清单 2-1 中的集合 `E2` 包含数字和字符的混合体。\n\
    \n还要注意，指定集合元素的顺序无关紧要；此外，重复多次指定同一个元素并非被禁止，但毫无意义。因此，以下三个集合是相等的：\n`{1,2} = {2,1}\
    \ = {1,2,1}`\n\n当集合的元素数量增加时，枚举法的缺点变得显而易见；写下所有元素需要很多时间，而且表达式会变得太长。\n\n### 谓词法\n\
    \n对于大型集合，指定集合的另一种方法是*谓词法*。设 `S` 是一个给定的集合（例如自然数集），并设 `P(x)` 是一个给定的谓词，它恰好有一个类型为\
    \ `S` 的参数 `x`（即 `S` 中的元素构成参数 `x` 可以取的值）。那么，以下对一个名为 `E4` 的集合的定义是有效的：\n`E4 := {\
    \ x∈S | P(x) }`\n\n这种方法也使用花括号来括住集合指定（就像枚举法一样），但现在你在花括号内的某处指定了一个竖线符号（`|`）。这个竖线应读作“...使得...”或“...满足以下条件为真：...”。\n\
    \n在竖线的右边你指定一个*谓词*，在左边你指定一个*集合*，从中为谓词中涉及的参数选择值。前面的语法应解读如下：“集合 `E4` 由 `S` 中使得谓词\
    \ `P(x)` 变为 TRUE 的所有元素 `x` 组成。”\n\n参见代码清单 2-2 使用此方法的一些示例（假设 `EMP` 表示某个包含“员工记录”的集合，非正式地说）。第一个示例使用了\
    \ `mod`（取模）函数，你可能不熟悉；它返回第一个参数除以第二个参数的余数。\n\n**代码清单 2-2. 谓词法指定集合示例**\n```\nE5 :=\
    \ { x∈Z | mod(x,2) = 0 ∧ x2 ≤ 169}\nE6 := { e∈EMP | e(JOB) = 'SALESREP'}\n```\n\
    集合 `E5` 的元素是所有偶数整数（除以二后余数为零），其平方小于或等于 169。集合 `E6` 的元素是所有 `JOB` 值等于 `'SALESREP'`\
    \ 的员工记录。\n\n### 替换法\n\n指定集合的第三种方法是*替换法*。参见代码清单 2-3 使用此方法的一些示例。\n\n**代码清单 2-3.\
    \ 替换法指定集合示例**\n```\nE7 := { x2 – 1 | x∈N }\nE8 := { (e(HIRED)–e(BORN)) | e∈EMP\
    \ }\n```\n前面集合 `E7` 的指定应解读如下：“集合 `E7` 由所有 `x2 – 1` 的值组成，其中 `x` 是 `N` 的一个元素。” 通常，两个集合指定（`E7`\
    \ 和 `E8`）的左边现在包含一个*表达式*；竖线右边的右边告诉你必须从哪个集合中选择 `x` 的值代入该表达式。\n\n### 混合法\n\n可选地，右边后面可以跟一个以\
    \ `x` 为参数的谓词。这使你也能如下指定集合 `E4`：\n`E4 := { x | x∈S ∧ P(x) }`\n\n左边现在只包含 `x`，而不是使用\
    \ `x` 的某个表达式。通常，对于集合指定，混合使用谓词法和替换法很方便。看一下代码清单 2-4 中的例子。\n\n**代码清单 2-4. 混合法指定集合示例**\n\
    ```\nE9 := { x2 – 1 | x∈N ∧ mod(x,3) = 1 }\n```\n形式上，这是以下指定集合 `E9` 的两步收缩，使用中间集合定义\
    \ `T1`：\n```\nT1 := { x∈N | mod(x,3) = 1 }   // 首先使用谓词法\nE9 := { x2 – 1 | x∈T1\
    \ }        // 然后使用替换法\n```\n当然，我们不会这样正式拆分集合定义。谓词法、替换法和混合法的共同点是，在枚举法变得过于繁琐的情况下，它们允许你使用一个*给定集合*和*谓词*。对于你想指定的每个集合，你只需选择最合适的方法。在本书中，混合法将是指定大型集合的主要方法。\n\
    \n## 韦恩图\n"
