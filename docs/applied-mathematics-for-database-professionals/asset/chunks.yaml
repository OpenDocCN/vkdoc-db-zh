- fmt: '# CHAPTER 11: IMPLEMENTING DATABASE DESIGNS IN ORACLE


    ## Transition Effect


    The transition effect describes the actual rows that have been affected by a DML
    statement, including—in the case of an `UPDATE` statement—how these rows have
    been modified. The transition effect provides a convenient means for an `after
    statement trigger` to see which rows precisely have been affected by the triggering
    `DML` statement.


    By inspecting the transition effect in the `after statement trigger`, you are
    able to address the inefficiency mentioned earlier for `EM4`.


    You can implement the transition effect as a view that only holds rows directly
    after the processing of a `DML` statement. `After statement triggers` that fire
    can access the view to determine exactly which rows have been inserted, deleted,
    or updated.


    In this execution model, we assume the availability of three transition effect
    (`TE`) views for each table structure:


    *   The **insert TE view** named `v_[table name]_ite`: This view will show the
    row(s) that a triggering `INSERT` statement has just inserted. It is empty (holds
    no rows) if the triggering statement is not an `INSERT`.

    *   The **update TE view** named `v_[table_name]_ute`: This view will show the
    row(s) that a triggering `UPDATE` statement has just updated; this view shows
    both old and new values of modified columns. It is empty if the triggering statement
    is not an `UPDATE`.

    *   The **delete TE view** named `v_[table_name]_dte`: This view will show the
    row(s) that a triggering `DELETE` statement has just deleted. It is empty if the
    triggering statement is not a `DELETE`.


    Currently, Oracle’s `SQL DBMS` does not provide you with a transition effect (there
    is at least one other `DBMS` vendor that does supply it). However, you can develop
    a row and a statement trigger for each table structure that do the necessary bookkeeping
    to provide these three `TE` views.


    ## Implementation Example


    Take a look at Listing 11-33. It shows the necessary `DI` code required to maintain
    the transition effect of the `EMP` table structure. The row triggers use the session
    temporary table `EMP_TE` to store the transition effect. On top of this table,
    the three `TE` views are defined.


    **Listing 11-33.** DI Code for Maintaining Transition Effect of `EMP` Table Structure


    ```sql

    create global temporary table EMP_TE

    (DML char(1) not null check(DML in (''I'',''U'',''D''))

    ,ROW_ID rowid

    ,EMPNO number(4,0)

    ,JOB varchar(9)

    ,HIRED date

    ,SGRADE number(2,0)

    ,MSAL number(7,2)

    ,DEPTNO number(2,0)

    ,check(DML<>''I'' or ROW_ID is not null)

    ,check(DML<>''U'' or ROW_ID is not null)

    ,check(DML<>''D'' or ROW_ID is null)

    ) on commit delete rows

    /


    create trigger EMP_BIUDS_TE

    before insert or update or delete on EMP

    begin

    -- Reset transition effect before every DML statement execution.

    delete from EMP_TE;

    --

    end;

    /


    create trigger EMP_AIUDR_TE

    after insert or update or delete on EMP

    for each row

    begin

    -- Conditionally maintain the transition effect.

    if INSERTING

    then

    -- Only store ''pointer'' to affected row.

    insert into EMP_TE(DML,ROW_ID) values(''I'',:new.rowid);

    elsif UPDATING

    then

    -- Store snapshot of old version of row, plus pointer to new version.

    insert into EMP_TE(DML,ROW_ID,EMPNO,JOB,HIRED,SGRADE,MSAL,DEPTNO) values (''U'',:new.rowid,:old.empno,:old.job,:old.hired

    ,:old.sgrade,:old.msal,:old.deptno);

    elsif DELETING

    then

    -- Store snapshot of old version of row.

    insert into EMP_TE(DML,ROW_ID,EMPNO,JOB,HIRED,SGRADE,MSAL,DEPTNO) values (''D'',null,:old.empno,:old.job,:old.hired

    ,:old.sgrade,:old.msal,:old.deptno);

    end if;

    --

    end;

    /


    create view V_EMP_ITE as

    select e.*

    from EMP_TE te

    ,EMP e

    where DML=''I''

    and te.ROW_ID = e.ROWID

    /


    create view V_EMP_UTE as

    select e.EMPNO as N_EMPNO ,e.JOB as N_JOB ,e.HIRED as N_HIRED

    ,e.SGRADE as N_SGRADE ,e.MSAL as N_MSAL ,e.DEPTNO as N_DEPTNO

    ,te.EMPNO as O_EMPNO ,te.JOB as O_JOB ,te.HIRED as O_HIRED

    ```'
