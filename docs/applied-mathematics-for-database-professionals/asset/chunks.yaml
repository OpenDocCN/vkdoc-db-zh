    The given constraint is abstractly of the following form: `(∀o∈OFFR: (P(o) ⇒ (Q(o,REG)
    ∧ R(o,OFFR)))`


    Here `P`, `Q`, and `R` are predicates with free variables `o`, `o` plus `REG`,
    and `o` plus `OFFR`, respectively. You can rewrite this predicate form into this:


    `(∀o∈OFFR: (P(o) ⇒ Q(o,REG)) ∧ (P(o) ⇒ R(o,OFFR)))`


    You can rewrite this, in turn, into the following conjunction: `(∀o∈OFFR: P(o)
    ⇒ Q(o,REG)) ∧ (∀o∈OFFR: P(o) ⇒ R(o,OFFR))`


    Note that the second conjunct now only involves the `OFFR` table structure and
    therefore is a table predicate.


