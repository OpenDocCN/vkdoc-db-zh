    # 第 9 章 数据检索


    ## 清单 9-8. 查询 `EXQ8(dbs)`


    **FEa**:

    ```

    { d↓{DEPTNO,DNAME} ∪

    { (RICHEMP; { e1↓{EMPNO,ENAME,MSAL} | e1∈dbs(EMP) ∧ e1(DEPTNO)=d(DEPTNO) ∧

    ¬(∃e2∈dbs(EMP): e2(DEPTNO)=e1(DEPTNO) ∧

    e2(MSAL)>e1(MSAL)) }

    )

    }

    | d∈dbs(DEPT) }

    ```


    **FEb**:

    ```

    dbs(DEPT)⇓{DEPTNO,DNAME}⊗

    { e1↓{EMPNO,ENAME,MSAL,DEPTNO} | e1∈dbs(EMP) ∧

    ¬(∃e2∈dbs(EMP): e2(DEPTNO)=e1(DEPTNO) ∧

    e2(MSAL)>e1(MSAL)) }

    ```


    **FEc**:

    ```

    dbs(DEPT)⇓{DEPTNO,DNAME}⊗

    { e1↓{EMPNO,ENAME,MSAL,DEPTNO} | e1∈dbs(EMP) ∧

    (∀e2∈dbs(EMP): e2(DEPTNO)=e1(DEPTNO) ⇒

    e2(MSAL)≤e1(MSAL)) }

    ```


    **SEI**:

    ```

    select d.DEPTNO, d.DNAME

    ,cursor(select e1.EMPNO, e1.ENAME, e1.MSAL

    from EMP e1

    where e1.DEPTNO = d.DEPTNO

    and not exists(select e2.*

    from EMP e2

    where e2.DEPTNO = e1.DEPTNO

    and e2.MSAL > e1.MSAL)) as RICHEMP

    from DEPT d

    ```


    **SEII**:

    ```

    select d.DEPTNO, d.DNAME, e.EMPNO, e.ENAME, e.MSAL

    from DEPT d

    ,(select e1.EMPNO,e1.ENAME,e1.MSAL,e1.DEPTNO

    from EMP e1

    where not exists(select e2.*

    from EMP e2

    where e2.DEPTNO = e1.DEPTNO

    and e2.MSAL > e1.MSAL)) e

    where d.DEPTNO = e.DEPTNO

    ```


    下一个查询为每个部门检索该部门内具有最高薪资的员工。注意，有可能两名或多名员工拥有相同的最高薪资。清单 9-8 给出了每个部门（`DEPTNO` 和 `DNAME`）及其部门内拥有最高薪资的一名或多名员工（`EMPNO`、`ENAME`
    和 `MSAL`）。


    请注意 `FEa` 和 `FEb` 指定的结果集在结构上的差异。查询 `FEa` 返回一个基于 `{DEPTNO, DNAME, RICHEMP}` 的表；每个部门返回一个元组（空部门也会返回）。在属性
    `RICHEMP` 下，返回一个基于 `{EMPNO, ENAME, MSAL}` 的嵌套表。属性 `RICHEMP` 保存代表该部门最高薪资员工的员工元组集合（仅限三个属性）。查询
    `FEb` 返回一个基于 `{DEPTNO, DNAME, EMPNO, ENAME, MSAL}` 的表。此查询不返回空部门。此外，如果一个部门内有多名员工都赚取相同的最高薪资，则该部门的数据会为这些员工重复显示。


    让我们通过给出 `dbs(DEPT)` 和 `dbs(EMP)` 的示例表来进一步澄清这一点。图 9-1 展示了 `DB_UEX` 在某个给定状态 `dbs`
    下的部门表和员工表的投影版本。


    ## 图 9-1. 部门和员工表示例


    给定这两张表，查询 `EXQ8` 的 `FEa` 版本将返回以下集合：

    ```

    { {(DEPTNO;10), (DNAME;''RESEARCH''),

    (RICHEMP; { {(EMPNO;1002), (ENAME;''SUSAN''), (MSAL;5500)}

    ,{(EMPNO;1003), (ENAME;''BRITNEY''), (MSAL;5500)} })}

    }

    ,{(DEPTNO;11), (DNAME;''SALES''), (RICHEMP;∅)}

    ,{(DEPTNO;12), (DNAME;''MARKETING''),

    (RICHEMP; { {(EMPNO;1005), (ENAME;''DEBBY''), (MSAL;6200)} })}

    }

    ```


    `FEb` 版本将返回此集合：

    ```

    { {(DEPTNO;10), (DNAME;''RESEARCH''), (EMPNO;1002), (ENAME;''SUSAN''), (MSAL;5500)}

    ,{(DEPTNO;10), (DNAME;''RESEARCH''), (EMPNO;1003), (ENAME;''BRITNEY''),(MSAL;5500)}

    ,{(DEPTNO;12), (DNAME;''MARKETING''),(EMPNO;1005), (ENAME;''DEBBY''), (MSAL;6200)}

    }

    ```


    规范 `FEc` 再次展示了量词的重写；它与 `FEb` 的区别在于将存在量词重写为全称量词。


    SQL 表达式 `SEI` 表明像 `FEa` 这样的规范可以直接翻译成 SQL。通过使用关键字 `cursor`，你指明了在 `SELECT` 子句中使用的子查询有可能返回多行。SQL
    表达式 `SEII` 是 `FEb` 的直接翻译；它在 `FROM` 子句中使用了子查询。


    **注意** 在接下来的清单 9-9 中，我们在表达式 `FEa` 和 `FEb` 中使用了一个函数 `to_year`。该函数被定义为返回给定日期值的年份部分。在
    Oracle SQL 中，你可以通过 `to_char` 函数实现相同的功能，如 `SEI` 和 `SEII` 中所演示的那样。


    清单 9-9 给出了参加了培训师 “De Haan”（员工编号 1206）在 2003 年开设的每一门课程至少一次的员工（`EMPNO` 和 `ENAME`）。

