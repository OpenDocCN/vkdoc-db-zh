    In EM2, you would create three after statement triggers for this constraint on
    only the EMP


    table structure (the one involved in this constraint). These triggers hold the
    preceding query to verify that the new database state still satisfies this constraint.
    Listing 11-29 shows these three triggers combined into one create trigger statement.


