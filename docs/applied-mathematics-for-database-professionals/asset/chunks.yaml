    `PSSR3(MEMP, EMP) :=`


    /* Employees can report to a president or a manager only */


    `{ m(MGR) | m∈MEMP } ⊆ { e(EMPNO) | e∈EMP ∧ e(JOB) ∈ {''PRESIDENT'',''MANAGER''}
    }`


    `PSSR4(TERM, EMP) :=`


    /* A termination is for a known employee; not everyone has left */


    `{ t(EMPNO) | t∈TERM } ⊂ { e(EMPNO) | e∈EMP }`


    `PSSR5(EMP, GRD) :=`


    /* Employee has a known salary grade */


    `{ e(SGRADE) | e∈EMP } ⊆ { g(GRADE) | g∈GRD }`


    `PSSR6(OFFR, CRS) :=`


    /* Course offering is for a known course */


    `{ o(COURSE) | o∈OFFR } ⊆ { c(CODE) | c∈CRS }`


    `PSSR7(OFFR, DEPT) :=`


    /* Courses take place in locations where we have a department */


    `{ o(LOC) | o∈OFFR } ⊆ { d(LOC) | d∈DEPT }`


    `PSSR8(OFFR, EMP) :=`


    /* Trainer of course offering is a known trainer */


    `{ o(TRAINER) | o∈OFFR ∧ o(TRAINER) ≠ -1 } ⊆ { e(EMPNO) | e∈EMP ∧ e(JOB) = ''TRAINER''
    }`


    `PSSR9(REG, EMP) :=`


    /* Course registration is for a known employee */


    `{ r(STUD) | r∈REG } ⊆ { e(EMPNO) | e∈EMP }`


    `PSSR10(REG, OFFR) :=`


    /* Course registration is for a known course offering */


    `{ r↓{COURSE,STARTS} | r∈REG } ⊆ { o↓{COURSE,STARTS} | o∈OFFR }`


    `PSSR11(HIST, EMP) :=`


    /* History record is for a known employee */


    `{ h(EMPNO) | h∈HIST } ⊆ { e(EMPNO) | e∈EMP }`


    `PSSR12(HIST, DEPT) :=`


    /* History record is for a known department */


    `{ h(DEPTNO) | h∈HIST } ⊆ { d(DEPTNO) | d∈DEPT }`


    **174**


    Most subset requirements are straightforward; `PSSR1`, `PSSR5`, `PSSR6`, `PSSR9`,
    `PSSR10`, `PSSR11`, and `PSSR12` all state that every tuple in the first argument
    is related to some tuple in the second argument.


    You’ll probably find `PSSR7` a bit unusual. It states that `{LOC}` in `OFFR` references
    `{LOC}` in `DEPT`. Usually, given such a subset requirement, `{LOC}` would be
    uniquely identifying in `DEPT`; however, this is not the case here. This means
    that an `OFFR` tuple might be related to more than one `DEPT` tuple.


    **Note** Apparently the example database design does not need to hold information
    with regards to locations, other than the name of a location. If that were the
    case, then a separate table structure, say with alias `LOC`, would have been introduced
    to hold location information. Also, two subset requirements, one from `DEPT` to
    `LOC` and one from `OFFR` to `LOC`, would have been introduced.


    Predicates `PSSR2` and `PSSR3` state that every tuple in the first parameter value
    is related to some tuple in *a subset of* the second parameter value; the set
    specified at the right-hand side denotes a table restriction in these cases.


    Predicate `PSSR8` states that every tuple in *a subset of* the first parameter
    value is related to some tuple in *a subset of* the second parameter value; the
    sets specified at both sides denote table restrictions.


    Finally, you might have noticed that inside predicate `PSSR4` the *proper* subset
    operator is used; this ensures that not every employee has been terminated (at
    least one employee still works for the company).


    You can find the definitions for the specialization constraints `PSPEC1` and `PSPEC2`
    in Listing 7-41.


    **Listing 7-41.** The Specializations of `DB_UEX`


    `PSPEC1(EMP, SREP) :=`


    /* Salesreps have a target and a commission */


    `{ e(EMPNO) | e∈EMP ∧ e(JOB) = ''SALESREP'' } = { s(EMPNO) | s∈SREP }`


    `PSPEC2(EMP, MEMP) :=`


    /* Everybody, excluding presidents, is a managed employee */


    `{ e(EMPNO) | e∈EMP ∧ e(JOB) ≠ ''PRESIDENT'' } = { m(EMPNO) | m∈MEMP }`


    Predicate `PSPEC1` specifies that you can find additional information for sales
    representatives (and no other employees) in the `SREP` table structure; only sales
    representatives have a target and a commission. Predicate `PSPEC2` specifies that
    for all employees excluding presidents, additional information can be found in
    the `MEMP` table structure; here the employee number of the employee that acts
    as the manager is maintained.


    **Note** We say that `SREP` and `MEMP` are *specializations* of `EMP`.


