    \n**第 9 章涉及数据检索。通过*查询*，你从数据库中检索数据。我们将向你介绍一种形式化规约查询的方法。本章也将是第一章使用 SQL 来进一步演示本书中介绍的数学应用的章节，给出了大量示例。**\n\
    \n**第 10 章介绍了一种形式化规约*事务*的方法。像第 9 章一样，它给出了各种例子来演示这一点，既通过形式化方法，也通过使用 SQL 表达式。**\n\
    \n---\n\n# 第五章 表与数据库状态\n\n从本章开始，我们将假设你已经完全熟悉本书第一部分中引入的所有术语。只有在我们认为必要时，才会明确回指特定术语首次引入和定义的位置。\n\
    \n我们将从介绍本章以及后续第二部分各章中使用的各种相互关联的术语开始。\n\n在第一部分中，我们暗示了一个表可以被视为一个函数的集合。在本章中，我们将详细演示这一点。“表的规约”一节展示了如何形式化地表示一个*表*。它还介绍了一个表的*简写表示法*，并定义了所谓的表的*标题*。我们将让你熟悉一种方法，给定一个特征描述，以（谓词方式）形式化地规约一个表。你已经在第\
    \ 4 章中看到了这方面的预览。\n\n“数据库状态”一节处理形式化规约一个*数据库状态*。作为数据库变量当前值的数据库状态持有数据库的所有表。本节还定义了*数据库骨架*的概念。\n\
    \n“表上的运算”一节讨论了各种常见的表运算符：*并*、*交*、*差*、*投影*、*限制*、*连接*、*属性重命名*、*扩展*和*聚合*。这些运算符以表作为操作数并产生另一个表。\n\
    \n你会发现本章末尾有“章节总结”，然后是“练习”部分。\n\n## 术语\n\n本节介绍我们将第二部分各章中使用的各种相互关联的术语。\n\n由于其中一些术语对你可能具有与我们本书中打算使用的含义不同的含义，或者其中一些术语对你来说是新的，我们决定提前在这里介绍它们。这个介绍是非形式化的。其中两个术语（*数据库设计*和*表设计*）已经在第\
    \ 4 章中使用过。有些术语是形式化术语；我们将在本书的这一部分精确地指定它们。\n\n> **注意** 你可能会发现其中一些术语的非形式化介绍有些模糊。如果是这样，那么现在不必担心。只需开始阅读第二部分的章节，稍后再回顾这些术语的非形式化介绍。\n\
    \n### 数据库设计\n\n`Database Design`\n"
- fmt: 'Database design is the informal term for the blueprint of a set of data structures
    that are used to store business data, including the integrity requirements of
    this data. In this book, these blueprints will always be relational designs; they
    will conform to the relational model of data.


    Among other things, this implies that the aforementioned data structures are `table
    data structures`; that is, the data is stored via `tables` (using the meaning
    of a `table` as introduced hereafter).


    We’ll often use a business term to indicate what particular database design we’re
    talking about; for instance, the HR (human resources) database design, or the
    education department database design.


    ### Note

    The other meaning often attributed to database design is the process of developing
    such a blueprint. This process includes activities such as requirements analysis,
    conceptual database design, logical database design, and physical database design.
    Using this other meaning, you can say that this book refers to a database design
    as the end result of the logical database design (process). In Part 3 (Chapter
    11) we’ll look into the physical database design using an SQL DBMS.


    ## Database Variable

    `Database variable` is an implementation term. It is a variable (that is, a holder
    for a value) that is capable of storing actual values for the data structures
    described by a `database design`. In Chapter 7 we’ll provide a mathematical treatment
    of the type of—or value set for—a database variable. This value set is referred
    to as the `database universe`. At any given point in time and space, a database
    variable will hold an element of this value set as its current value. The elements
    of a `database universe` are referred to as `database states`. Note that a database
    consists of exactly one `database variable`. In a sense, that variable *is* the
    database.


    Like every variable, the `database variable` will have a name, allowing us to
    talk about it without knowing which database state it currently holds.


    ### Note

    An SQL DBMS does not supply the concept of a database variable. Instead, SQL DBMS
    vendors have implemented the concept of table variables. A table variable can
    hold a table as its value; in an SQL DBMS you create one through the `create table`
    statement. In these DBMSes, a database design is implemented by creating as many
    table variables as the database design has table structures, and defining their
    respective types (instead of defining just one database variable and defining
    its type).


    ## Database Universe

    `Database universe` is a formal term. It is the mathematical construct used to
    formally specify the `table data structures` and integrity requirements of a `database
    design`. A `database universe` is the main part of the formal specification of
    a `database design`; it precisely describes the data values (tables) that we allow
    to be stored by the `table data structures`. Chapter 7 will establish the formal
    definition of a `database universe`; for now just think of it as a set of all
    values that we allow for a given `database variable` to hold over the course of
    time.


    We’ll often use a shorthand name for a given `database universe` (just symbols)
    for convenience of reference in the text.


    ## Database State

    `Database state` is a formal term. It is a mathematical construct used to formally
    specify a value that can be held by a `database variable`. This chapter will establish
    the formal definition of a `database state`. We’ll often use a shorthand name
    for a given `database state` for convenience of reference in the text.


    ## Database

    `Database` is an informal term for the actual (business) data that is stored in
    a computer in a structured way (that is, conforming to the database design). Abstractly,
    a `database` is the current value of the `database variable`; it is the informal
    term for `database state`.


    ## Database Management System (DBMS)

    A `DBMS` is a computer program used to manage, query, and update the value of
    a `database variable`.


    ## Table Design

    `Table design` is the informal term for the blueprint of one of the `table data
    structures` of a `database design`. A relational `database design` typically consists
    of several `table designs` and a set of constraints (see Chapter 7) addressing
    the integrity requirements for the database. It is often convenient to talk about
    a single `table design`, and for this reason we’ll use a business term to indicate
    what particular `table design` we’re talking about; for instance, the employee
    `table design`, or the department `table design`.


    ## Table Structure

    `Table structure`, short for `table data structure`, is an implementation term.
    It is used to refer to the data structure that implements a specific `table design`.
    As mentioned before in the implementation of a `database design`, you are accustomed
    to using SQL table variables to implement the separate `table data structures`.
    You could regard a `table structure` as a table variable. However, we deliberately
    do not use the term table variable in this book; the methodology developed in
    this book only knows the concept of a `database variable`. A `table structure`
    can be considered a specific subsection of the `database variable`: the subsection
    that holds the current `table` for only one of the involved `table designs`.


    In Chapter 10 we’ll discuss a formal way of specifying updates (value changes)
    of a `database variable`; we consider updating just one of the `table structures`
    of a database as an update of the `database variable`. However, when explaining
    our formal methodology we’ll often conveniently use the term `table structure`
    as if it were a separately addressable (table) variable, and we’ll even give such
    a `table data structure` a name—as we would give a name to a table variable—enabling
    us to talk about it without knowing which value is currently held by the data
    structure.


    ## Table

    `Table` is a formal term. It is a mathematical construct used to formally specify
    a value that can be held by a `table structure` that implements a specific `table
    design` (or if you will, a value that can be held by a table variable). We’ll
    formally establish this term in the next section. We’ll often use a shorthand
    name for a given `table` for convenience of reference in the text.


    ## Tables

    In Chapter 4 you saw that you can use a tuple (a set of ordered pairs) to describe
    a true proposition in the real world. For instance, the tuple `{ (empno;100),
    (ename;''Smith''), (job;''MANAGER'') }` might represent this proposition: “Employee
    with number 100 has name Smith and is employed as a MANAGER.” In this section
    we’ll build on this use of tuples and introduce you to a formal way of specifying
    a table.


    ### Formal Specification of a Table

    A table represents many (zero or more) true propositions of the same kind. If
    you can use a tuple to represent a single proposition, then evidently a table
    can be regarded as a `set of tuples`.


    Take a look at the set of tuples, which we have named `T1`, in Listing 5-1.


    **Listing 5-1.** A Set of Tuples


    ```

    T1 :=


    { { (partno;1), (name;''hammer''), (instock;22), (price;10) }


    ,{ (partno;2), (name;''screwdriver''), (instock;19), (price;5) }


    ,{ (partno;3), (name;''axe''), (instock;0), (price;30) }


    ,{ (partno;4), (name;''saw''), (instock;4), (price;15) }


    ,{ (partno;5), (name;''wrench''), (instock;7), (price;20) }


    ,{ (partno;6), (name;''scissors''), (instock;32), (price;5) } }

    ```


    Set `T1` contains six tuples; in other words, six functions (recall that a tuple
    can be regarded as a function). All six functions have the same domain: `{partno,name,instock,price}`.
    We’ll refer to a set of functions that all share the same domain as a `table`.'
