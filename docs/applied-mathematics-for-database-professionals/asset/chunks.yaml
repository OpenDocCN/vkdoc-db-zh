    ## 幂等性


    一些（二元）运算符具有这样的性质：如果它们的运算对象相等，那么结果就等于这个运算对象。这些运算对象被称为在该运算符下是幂等的。在逻辑中，命题在析取和合取运算下是幂等的，如清单
