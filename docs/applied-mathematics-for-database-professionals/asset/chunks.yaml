- fmt: '# 量词与集合论


    *   集合A中存在一个值，当该值被提供给谓词 `P(x)` 的参数 `x` 时，会使谓词 `P(x)` 转换为真命题。

    *   对于集合B中的所有值，当该值被提供给谓词 `Q(y)` 的参数 `y` 时，谓词 `Q(y)` 都将转换为真命题。


    > **注意** 这两个量化表达式是否为真，显然取决于所涉及的集合（A 和 B）以及给定的谓词 `P(x)` 和 `Q(y)`。


    ## 一般量词语法


    3-12节中介绍的一般存在量词和全称量词语法实际上是简写语法。


    该语法依赖于集合论（它使用了“属于”运算符）。纯粹的逻辑学家不需要集合论来表达量化。事实上，集合论是逻辑学的一个分支。从逻辑学家的角度来看，一个集合表示某个谓词的外延。例如，集合A可能表示谓词
    `A(x)` 的外延，其形式为“x是<whatever A means>”。集合A如何表示谓词 `A(x)`？通过成为包含所有对象的集合，这些对象在代入 `A(x)`
    中的 `x` 后，会产生一个真命题。文中给出的关于撒谎的数学家的例子，可以表示为 `∀x: "x is a mathematician" ⇒ "x is a
    liar"`。等价于3-12节介绍的简写语法且**不**依赖于集合论的通用语法现在分别是 `∃x: "x is a <whatever A means>"
    ⇒ P(x)` 和 `∀y: "y is a <whatever B means>" ⇒ Q(y)`。由于大多数实际的量化谓词形式正是“如果 x 是...，则
    `P(x)`”，因此习惯上使用依赖于集合论的简写符号。


    我们现在可以重新审视第1章“命题与谓词”一节中给出的一个示例命题：所有数学家都是撒谎者。这个命题实际上是一个全称量化。以下是规范指定此谓词的形式方法：


    ```

    ∀x∈M: "x is a liar"

    ```


    这里 `M` 代表所有是数学家的人的集合。该集合用于对谓词“`x`是撒谎者”进行量化——这是一个包含名为 `x` 的参数的谓词。


    此量化绑定了参数 `x`（它为该参数提供了值）。结果的量化现在是一个命题；它实际上不再具有参数。


    看下面三个例子（使用第2章介绍的自然数集 `N`）：


    ```

    ∃x∈N: x < 42


    ∀y∈N: y/2 ∈ N


    ∀z∈N: z ≥ 0

    ```


    第一个和第三个谓词（更准确地说，是命题，因为它们实际上没有参数）为真，第二个为假。要证明第一个（存在量化）为真，只需给出一个例子即可。在这种情况下，我们必须为
    `x` 提供一个小于42的自然数；例如，41是小于42的自然数。要证明一个全称量化为假（第二个），只需给出一个反例；例如，3（一个奇数）除以2得到1.5（一又二分之一），这不是自然数。对于第三个语句，你必须检查所有自然数，并找出一个不大于或等于零的自然数，以证明该命题为假。当然，你永远找不到这样的数。最小的自然数是0（零）——它大于或等于0——因此，该谓词对所有自然数都为真。


    当一个谓词的参数被量词绑定时，该参数的*名称*就可以自由选择了。让我们用一个例子来阐明这一点。考虑谓词“`x`住在乌得勒支”。这个谓词有一个参数，碰巧被命名为
    `x`。现在让我们通过将该谓词在集合 `{Toon, Lex, Chris, Cary, Hugh}` 上进行全称量化来定义一个新命题，如下所示：


    ```

    ∀x∈{Toon, Lex, Chris, Cary, Hugh}: "x lives in Utrecht"

    ```


    可能不难看出，这个命题等价于以下复合命题（一个包含五个合取支的合取式）：


    ```

    "Toon lives in Utrecht"

    ∧ "Lex lives in Utrecht"

    ∧ "Chris lives in Utrecht"

    ∧ "Cary lives in Utrecht"

    ∧ "Hugh lives in Utrecht"

    ```


    你应该意识到，参数的原始名称（`x`）不会影响构成我们新命题的全称量化的含义。如果你将参数 `x` 替换为一个名为 `y` 的参数——同时在量词和被量化的谓词内部进行替换——你将得到一个与前述五个合取支的合取式逻辑等价的命题：


    ```

    ∀y∈{Toon, Lex, Chris, Cary, Hugh}: "y lives in Utrecht"

    ```


    你可以任意选择量化（无论是全称还是存在）中绑定参数的名称。有时为了避开混淆，为这样的参数选择一个不同的名称是方便的。


    因为一个量化表达式（如前面的例子）是一个谓词，所以将其用作*复合*谓词的组成部分是完全有效的。也就是说，你可以使用第1章介绍的逻辑连接词将量化表达式与其他谓词组合起来。例如，以下两个表达式是有效的谓词（事实上，两者都是命题）：


    ```

    ( ∀x∈A: x > 0 ) ∧ ( ∃y∈B: y < 10 )


    ¬( ∀z∈A: z > 10 ) ⇒ ( ∃x∈A: x < 11 )

    ```


    ## 量词与有限集


    尽管如今的数据库越来越大，但根据定义，它们始终是有限的——这与数学中的集合不同，后者有时是无限的。如果你只处理有限集合，你总是可以将存在量词和全称量词分别视为迭代
    `OR` 和迭代 `AND` 结构。迭代是在量化参数所来自的集合的所有元素上进行的；对于每个元素值，谓词中变量的出现都被该值替换。这种解释量化表达式的替代方法可能在你研究其真值时有所帮助。


    例如，假设 `P` 是所有小于15的质数的集合：`P := {2,3,5,7,11,13}`


    那么这两个命题


    ```

    ∃x∈P: x > 12


    ∀y∈P: y > 3

    ```


    在逻辑上等价于以下两个命题：在 `P` 的所有元素上迭代 `x`：`2>12 ∨ 3>12 ∨ 5>12 ∨ 7>12 ∨ 11>12 ∨ 13>12`


    在 `P` 的所有元素上迭代 `y`：`2>3 ∧ 3>3 ∧ 5>3 ∧ 7>3 ∧ 11>3 ∧ 13>3`


    你现在可以手动计算两个谓词的真值。如果你评估第一个命题中每个析取支的真值，它变成 `FALSE ∨ FALSE ∨ ... ∨ FALSE ∨ TRUE`，结果为
    `TRUE`。如果你对第二个命题的合取支做同样的事情，你得到 `FALSE ∧ FALSE ∧ TRUE ∧ ... ∧ TRUE`，结果为 `FALSE`。


    ## 空集上的量化


    空集（`∅`）不包含任何元素。因为它仍然是一个集合，所以你可以在空集上进行量化。以下两个表达式是有效的命题：


    ```

    ∃x∈∅: P(x)


    ∀y∈∅: Q(y)

    ```


    但是，说空集中存在一个元素 `x` 使得 `P(x)` 成立是什么意思呢？显然，空集没有元素。因此，无论涉及的谓词 `P` 是什么，只要我们声称在空集中有这样的元素，我们必定是在陈述一些明显为**假**的事情，因为不可能从空集中选择一个元素。'
  raw: '• There exists a value in set A that will transform predicate P(x) into a
    TRUE proposition when that value is provided as the value for parameter x of predicate
    P(x).


    • For all values in set B, predicate Q(y) will transform into a TRUE proposition
    when such value is provided as the value for parameter y of predicate Q(y).


    **■Note** Whether these two quantified expressions are TRUE obviously depends
    on the sets involved (A and B) and the given predicates, P(x) and Q(y).


    **GENERAL QUANTIFIER SYNTAX**


    The general existential and universal quantifier syntax introduced in Listing
    3-12 is actually shorthand syntax.


    That syntax relies on set theory (it uses the ''is element of'' operator). Pure
    logicians don’t need set theory to express quantifications. In fact, set theory
    is an offshoot of logic. From a logician’s viewpoint, a set represents the extension
    of some predicate. For example, the set A might represent the extension of the
    predicate A(x) that has the form "x is a <whatever A means>". How does set A represent
    predicate A(x)? By being the set that holds every object that, when substituted
    for x in A(x), yields a TRUE proposition. The example that’s given in the text
    regarding lying mathematicians would be expressed as ∀x: "x is a mathematician"
    ⇒ "x is a liar". General syntax equivalent to the shorthand syntax introduced
    in Listing 3-12, and *not* depending on set theory, would now be ∃x: "x is a <whatever
    A means>" ⇒ P(x) and ∀y: "y is a <whatever B means>" ⇒ Q(y), respectively. Because
    most practical cases of quantified predicates are precisely of the form "if x
    is a . . . then P(x)", it’s customary to use the shorthand notation that relies
    on set theory.


    We can now revisit an example proposition that was given in the section “Propositions
    and Predicates” in Chapter 1: all mathematicians are liars. This proposition is
    actually a universal quantification. Following is a formal way of specifying this
    predicate:


    ∀x∈M: "x is a liar"


    Here M represents the set of all persons who are mathematicians. This set is used
    to quantify over the predicate "x is a liar"—a predicate that contains one parameter
    named x.


    This quantification binds parameter x (it supplies values for this parameter).
    The resulting quantification is now a proposition; it effectively doesn’t have
    a parameter anymore.


    Look at the following three examples (using the set of natural numbers that was
    introduced in Chapter 2):


    7451CH03.qxd 5/4/07 2:26 PM Page 53


    C H A P T E R 3 **■** S O M E M O R E L O G I C


    **53**


    ∃x∈**N**: x < 42


    ∀y∈**N**: y/2 ∈ **N**


    ∀z∈**N**: z ≥ 0


    The first and third predicate (more precisely, propositions, because they effectively
    don’t have a parameter) are TRUE, the second one is FALSE. To show that the first
    one—an existential quantification—is TRUE, it’s sufficient to give a single example.
    In this case, we must supply a single natural number for x that is smaller than
    42; for example, 41 is a natural number less than 42\. To show a universal quantification
    is FALSE (the second one), it’s sufficient to give a single counter example; for
    example, 3 (an odd number) divided by 2 results in 1.5 (one and a half ), which
    is not a natural number. For the third statement, you’ll have to check all natural
    numbers and come up with a single natural number not greater than or equal to
    zero, to show that the proposition is FALSE. Of course, you’ll never find such
    a number. The smallest natural number is 0 (zero)—which is greater than or equal
    to 0—therefore, the predicate is TRUE for all natural numbers.


    When a parameter of a predicate gets bound by a quantifier, the *name* of the
    parameter becomes free to choose. Let’s clarify this with an example. Consider
    the predicate "x lives in Utrecht". This predicate has one parameter that happens
    to have been named x. Let’s now define a new proposition by universally quantifying
    this predicate across set {Toon, Lex, Chris, Cary, Hugh} as follows:


    ∀x∈{Toon, Lex, Chris, Cary, Hugh}: "x lives in Utrecht"


    It’s probably not too difficult to see that this proposition is equivalent to
    the following compound proposition (a conjunction with five conjuncts):


    "Toon lives in Utrecht"


    ∧ "Lex lives in Utrecht"


    ∧ "Chris lives in Utrecht"


    ∧ "Cary lives in Utrecht"


    ∧ "Hugh lives in Utrecht"


    You should realize that the original name of the parameter (x) doesn’t influence
    the meaning of the universal quantification that constitutes our new proposition.
    If you replace parameter x with a parameter named y—both at the quantifier and
    inside the predicate that is quantified—you’ll end up with a proposition that’s
    logically equivalent to the preceding conjunction of five conjuncts:


    ∀y∈{Toon, Lex, Chris, Cary, Hugh}: "y lives in Utrecht"


    You can choose names of bound parameters in quantifications (both universal and
    existential) arbitrarily. Sometimes it’s convenient to pick a different name for
    such a parameter to avoid confusion.


    Because a quantified expression, like the preceding examples, is a predicate,
    it’s perfectly valid to use such an expression as a component of a *compound*
    predicate. That is, you can combine quantified expressions with other predicates
    by using the logical connectives introduced in Chapter 1\. For example, the following
    two expressions are valid predicates (in fact, both are propositions):


    ( ∀x∈A: x > 0 ) ∧ ( ∃y∈B: y < 10 )


    ¬( ∀z∈A: z > 10 ) ⇒ ( ∃x∈A: x < 11 )


    7451CH03.qxd 5/4/07 2:26 PM Page 54


    **54**


    C H A P T E R 3 **■** S O M E M O R E L O G I C


    **Quantifiers and Finite Sets**


    Although databases grow larger and larger these days, they are always finite by
    definition—as opposed to sets in mathematics, which are sometimes infinite. If
    you work with finite sets only, you can always treat the existential and universal
    quantifiers as iterated OR and iterated AND constructs, respectively. Iteration
    is done over all elements of the set from which the quantifier parameter is drawn;
    for each element value, the occurrences of the variable inside the predicate are
    replaced by that value. This alternative way of interpreting quantified expressions
    might help when you investigate their truth values.


    For example, suppose P is the set of all prime numbers less than 15: P := {2,3,5,7,11,13}


    Then these two propositions


    ∃x∈P: x > 12


    ∀y∈P: y > 3


    are logically equivalent with the following two propositions: Iterate x over all
    elements in P: 2>12 ∨ 3>12 ∨ 5>12 ∨ 7>12 ∨ 11>12 ∨ 13>12


    Iterate y over all elements in P: 2>3 ∧ 3>3 ∧ 5>3 ∧ 7>3 ∧ 11>3 ∧ 13>3


    You could now manually compute the truth value of both predicates. If you evaluate
    the truth value of every disjunct, the first proposition becomes FALSE ∨ FALSE
    ∨ ... ∨ FALSE ∨ TRUE, which results in TRUE. If you do the same for the conjuncts
    of the second proposition, you get FALSE ∧ FALSE ∧ TRUE ∧ ... ∧ TRUE, which results
    in FALSE.


    **Quantification Over the Empty Set**


    The empty set (∅) contains no elements. Because it still is a set, you can quantify
    over the empty set. The following two expressions are valid propositions:


    ∃x∈∅: P(x)


    ∀y∈∅: Q(y)


    But what does it mean to say that there exists an element x in the empty set for
    which P(x) holds? Clearly, the empty set has no elements. Therefore, regardless
    of the involved predicate P, whenever we propose that there’s such an element
    in the empty set, we must be stating something that’s unmistakably FALSE, because
    it’s impossible to choose an element from the empty set.'
