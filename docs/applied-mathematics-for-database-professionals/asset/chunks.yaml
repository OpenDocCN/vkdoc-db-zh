    是定义在 `A` 上的函数”。


    现在看下面的例子：


    ```

    F1 := { (X;1), (X;2), (Y;1), (Z;2) }

    F2 := { (X;2), (Y;1), (Z;2) }

    F3 := { (X;1), (Y;1), (X;1), (Z;1) }

    F4 := { (Z;2) }

    F5 := ∅

    F6 := { (empno;126), (ename;''Lex de Haan''), (born;''11-aug-1954'') }

    ```


    第一个例子 `F1` 不是函数，因为它包含两个不同的对——`(X;1)` 和 `(X;2)`——它们具有相同的第一坐标 `X`。第二个二元关系 `F2` 确实是一个函数：没有两个不同的对具有相同的第一坐标。第三个
    `F3` 也是一个函数。尽管列举了两个具有相同第一坐标的对（第一个和第三个对），但它们实际上是同一个对。其中一个对无需列举，可以省略而不改变集合 `F3`。示例
    `F4` 也是一个函数，空集（`F5`）确实也是一个函数。它是任意两个集合的笛卡尔积的子集（空集是*每个*集合的子集）。定义 4-2 中给出的额外限制也成立。你可能需要重新审视表
    3-2 中的第二条重写规则。最后一个示例二元关系 `F6` 也是一个函数。通过这个例子，你可以开始看到如何（作为构建块）使用函数来指定数据库设计。我们将在“集合函数”一节的末尾回到这一点。


