    Nulls and Three (or More)


    Valued Logic


    ***Note from the author**:Much of the text in this appendix was originally part
    of Chapter 3—the* *last chapter that Lex had been able to spend time on at the
    end of 2005\. Being called “Mr. NULL,”*


    *as some of you might know, he produced quite a bit of text on the topic of NULLs
    and 3-valued* *logic (3VL) as part of Chapter 3. By the time Chapter 3 review
    comments were in and I (Toon)* *started working on them, I decided that it would
    be better, for Chapter 3, to move all text with* *regards to NULLs and 3VL out
    of Chapter 3 and into this appendix.*


    During his career, my coauthor dedicated quite a bit of time to investigating
    the phenomenon of a NULL “value” in SQL DBMSes and to researching the 3 (or more)
    valued logic that arises from it. I just used NULLs (cautiously) in my job as
    a database professional. Because it was difficult to integrate my perspective
    on this subject into Lex’s text, I chose to split this appendix into two sections.


    In the first section (“To Be Applicable or Not”), I’ll give you my thoughts on
    NULLs in SQL


    DBMSes from a database design point of view.


    The second section, “Three (or More) Valued Logic,” consists of a “cut and paste”
    of Lex’s text on 3VL from the original version of Chapter 3\. I did incorporate
    the review comments (from Jonathan Gennick and Chris Date), which Lex never had
    the time to study, into his text.


    **To Be Applicable or Not**


    As you saw in Chapter 11, the example database design introduced in this book
    hardly contains any *nullable* attributes; all attributes in all table structures,
    with the exception of TRAINER


    in OFFR, and COMMENTS in TERM, are mandatory (NOT NULL, in SQL terminology). You’ll
    probably find a lot more nullable attributes in the database designs that you
    deal with in your daily job, right?


    Most likely the main reason why an attribute is left optional is the *inapplicability*
    of the value that could have been stored in it for certain rows. Let me explain
    this. Optional attributes are usually introduced in database designs for one of
    the following three reasons:


    • The data values that could have been stored are *inapplicable.*


    • The data values are *not yet applicable*.


    • The values are *nice to know* (if known), but not mandatory.


    **337**


    7451AppD.qxd 5/16/07 12:40 PM Page 338


    **338**


