    ```

    ( ∀t1,t2∈T: t1≠t2 ⇒ t1↓A≠t2↓A )

    ( ∀t1,t2∈T: t1=t2 ∨ t1↓A≠t2↓A )

    ¬( ∃t1,t2∈T: t1≠t2 ∧ t1↓A=t2↓A )

    ```


    列出的第一个形式可能是唯一标识谓词更直观的正式版本；表中的两个不同元组必须在给定的属性子集上有所不同。列表 6-7 中的谓词 `P11` 就是以这种形式编写的；它指出
    `{dname, loc}` 在表 `T` 中是唯一标识的。同一列表中的谓词 `P12` 也是一个唯一标识谓词。它以列表 6-9 中显示的第三种形式编写，指出
    `{deptno}` 在表 `T` 中是唯一标识的。列表 6-3 中的第一个谓词也使用了这种形式。


    给定集合 `A` 在表 `T`（标题为 `H`）中是唯一标识的，那么 `H` 的每个作为 `A` 的真*超集*的子集当然在表 `T` 中也是唯一标识的。在唯一标识谓词中，您希望指定一个在表
    `T` 中是唯一标识的、标题 `H` 的*不可约*子集 `A`。


    > **注意**：一个表中可能有多个这样的不可约子集是唯一标识的。

    >

    > 列表 6-7 显示了两个不同的子集——`{deptno}` 和 `{dname, loc}`——它们都被认为是在部门表中唯一标识的。


    如果您选择一个可约的 `H` 子集，那么得到的唯一标识谓词就太弱了。最弱的唯一标识谓词是 `T` 的标题（最大的可能超集）在表 `T` 中是唯一标识的。实际上，这对表
    `T` 允许的元组集合根本没有增加任何约束；正如本节开头提到的，我们已经知道元组在表内是唯一的。


    您也可以通过更正式的方法得出这个结论。看看如果将 `T` 的标题代入唯一标识谓词模式中的集合 `A` 会发生什么：


    ```

    ( ∀t1,t2∈T: t1↓dom(t1)=t2↓dom(t2) ⇒ t1=t2 )

    ```


    注意，如果 `t` 是 `T` 的一个元素，那么您可以通过表达式 `dom(t)`（元组 `t` 的域）来引用 `T` 的标题。使用重写规则 `t↓dom(t)
    = t`（一个元组对其所有属性的限制与该元组本身相同），我们可以将前面的谓词重写为：


    ```

    ( ∀t1,t2∈T: t1=t2 ⇒ t1=t2 )

    ```


    该谓词现在是一个重言式；无论 `T` 的值如何，它总是为真。因此，它根本没有以任何方式约束 `T`。


    > **注意**：我们在本节中刻意不讨论*键*。在第 7 章中，我们将为数据库设计中的每个表结构定义该表结构的可接受表集合——称为*表宇宙*。在定义表宇宙时，我们将确保每个表（在宇宙中）满足一个或多个唯一标识谓词。然后我们说，一个唯一标识属性集合构成了该表宇宙中的一个*键*。


    ## 子集要求谓词


    您在数据库设计中捕获的不同表结构并非全部相互独立。这些表结构中的许多*对*具有一种称为*子集要求*的关系。定义 6-2 定义了子集要求谓词的概念。此定义中谓词的结构说明了它为何被称为子集要求。


    ### 定义 6-2：子集要求谓词

    设 `T1` 和 `T2` 是表，并设 `A` 是 `T1` 的标题的一个给定子集，同时也是 `T2` 的标题的一个子集。我们称一个数据库谓词为子集要求谓词，如果它具有以下形式：


    ```

    { t1↓A | t1∈T1 } ⊆ { t2↓A | t2∈T2 }

    ```


    我们称 *`A` 在 `T1` 中引用 `T2` 中的 `A`*。


    让我们用表 `EMP1` 和 `DEP1` 来演示这一点（见图 6-2 和图 6-3）。如果我们将 `EMP1` 代入 `T1`，`DEP1` 代入 `T2`，`{deptno}`
    代入 `A`，我们最终得到以下表达式：


    ```

    { t1↓{deptno} | t1∈EMP1 } ⊆ { t2↓{deptno} | t2∈DEP1 }

    ```


    这将计算为以下表达式：


    ```

    { {(deptno;10)}, {(deptno;12)} } ⊆

    { {(deptno;10)}, {(deptno;11)}, {(deptno;12)}, {(deptno;13)} }

    ```


    这是一个真命题；`EMP1` 中的每个部门编号也出现在 `DEP1` 中。


    如果 `A` 的基数等于 1（即 `A` 表示一个单元素集），那么我们通常使用函数应用而不是函数限制来指定子集要求谓词。


    使用前面的例子，我们会这样写：


    ```

    { t1(deptno) | t1∈EMP1 } ⊆ { t2(deptno) | t2∈DEP1 }

    ```


    这个子集要求类似于列表 6-8 中的谓词 `P13`。


    子集要求谓词通常伴随着一个唯一标识谓词。


    使用定义 6-2 中的名称，您经常会遇到“`A` 在 `T2` 中是唯一标识的；”在上面的例子中 `{deptno}` 确实在 `DEP1` 中是唯一标识的。这不是强制性的；第
    7 章中将给出的示例数据库设计实际上有一个子集要求，其中伴随的唯一标识谓词是缺失的。


    当使用函数限制来指定子集要求时，有时必须应用函数组合来重命名所涉及的一个表中的一个或多个属性。


    让我们通过一个例子来说明这一点。看一下图 6-5 中显示的表 `DEP2`，它与表 `DEP1` 非常相似。


    ### 图 6-5：示例表 DEP2

    表 `DEP2` 与表 `DEP1` 的区别在于，用于保存部门编号的属性现在命名为 `dno` 而不是 `deptno`。您可以使用函数应用来表达从 `EMP1`（见图
    6-2）到 `DEP2` 的子集要求，如下所示：


    ```

    { e(deptno) | e∈EMP1 } ⊆ { d(dno) | d∈DEP2 }

    ```


    但是，如果您想使用函数限制来指定此子集要求，则必须首先将表 `EMP1` 中的 `deptno` 属性重命名为 `dno`，或者将表 `DEP2` 中的 `dno`
    属性重命名为 `deptno`。以下是此子集要求的规范，其中属性重命名应用于 `EMP1` 元组：


    ```

    { e◊{(dno;deptno)} | e∈EMP1 } ⊆ { d↓{dno} | d∈DEP2 }

    ```


    在此表达式中，函数 `{(dno;deptno)}` 表示一个属性重命名函数。它将表 `EMP1` 中的元组的 `deptno` 属性重命名为 `dno`。


    > **注意**：在这种情况下，重命名函数也执行了元组限制（参见第 4 章“函数组合”一节中的注释）。'
- fmt: '# CHAPTER 6 ■ TUPLE, TABLE, AND DATABASE PREDICATES


    ## 131


    通过使用更复杂的函数限制，而不是清单 6-8 中使用的函数应用，你能够同时表达涉及两个相关表的多个属性的子集需求。第 7 章将介绍的数据库设计中有一个涉及多个属性的子集需求示例。


    一个子集需求谓词通常涉及两个*不同*的表结构，因此代表一个数据库谓词。然而，情况并非总是如此；有时它们只涉及一个表结构。在这些情况下，它们代表一个表谓词。例如，假设表
    `EMP1` 被扩展了一个 `mgr`（经理）属性，该属性保存员工的经理的员工编号。你会要求每个在 `EMP1` 中出现的经理编号也必须作为员工编号出现在
    `EMP1` 中。形式上，你可以将其表达为一个子集需求：


    { t1(mgr) | t1∈EMP1 } ⊆ { t2(empno) | t2∈EMP1 }


    你甚至可能要求每个在 `EMP1` 中出现的经理编号也必须作为员工编号出现在 EMP1 的某个*限制*中。也许引用的元组必须每个都有一个 `JOB` 值表明该员工确实是一名经理。形式上，你可以如下表达：


    { t1(mgr) | t1∈EMP1 } ⊆ { t2(empno) | t2∈EMP1 ∧ t2(job)=''MANAGER'' }


    我们认为前面的表达式也是一个子集需求。


    子集需求可以通过图片来可视化。你可以为子集需求“A in T1 references A in T2”画一张图，方法是绘制两个矩形（或其他形状）——一个代表
    T1，一个代表 T2——并用一条从 T1 指向 T2 的有向箭头连接这两个矩形。该箭头表示 T1 表中的每个元组至少引用 T2 表中的一个元组。


    图 6-6 显示了从 `EMP1` 到 `DEP2` 的子集需求。


    ### Figure 6-6. *Visualization of subset requirement from EMP1 to DEP2*


    请注意，子集需求的这张图并没有告诉你箭头两边涉及的属性是什么，也没有告诉你是否涉及任何属性重命名。它*仅仅是一张图*，应该始终伴随着精确说明箭头预期含义的形式谓词。


    有时你知道该子集需求实际上是一个*真*子集需求。


    假设你想指定这样的需求：在员工表中找到的部门编号集合是部门表中找到的部门编号集合的真子集。你可以将此数据库谓词指定如下：`P15a(D,E) := { e(deptno)|
    e∈E } ⊂ { d(dno)| d∈D }`


    在本书中，我们将这种特殊情况也称为子集需求。另一种处理方法仍然是使用子集运算符（而不是真子集），并指定第二个数据库谓词来表达部门表中至少存在一个部门编号不出现在员工表中。以下数据库谓词
    `P15b` 正是这样做的：


    ```

    P15b(D,E) := ( ∃d∈D: ( ∀e∈E: e(deptno)≠d(deptno) ) )

    ```


    表 `EMP1`（员工）和 `DEP2`（部门）同时符合数据库谓词 `P15a` 和 `P15b`。有时你知道该子集需求实际上是一个*相等*需求。假设你想指定每个部门都必须有员工的需求。你可以如下指定：


    `P16a(D,E) := { e(deptno)| e∈E } = { d(dno)| d∈D }`


    在本书中，我们将这种特殊情况也称为子集需求。同样，另一种处理方法是使用子集操作（而不是相等操作），并添加第二个完整性约束来表达每个部门至少存在一个员工。数据库谓词
    `P16b` 正是表达了这一点：


    ```

    P16b(D,E) := ( ∀d∈D: ( ∃e∈E: e(deptno)=d(deptno) ) )

    ```


    顺便问一下，你看出谓词 `P15b` 正是谓词 `P16b` 的否定吗？这是因为这两个特殊情况——真子集和相等——是互斥的。


    **■Note** 子集需求的这些变体，结合子集需求所涉及表的唯一标识谓词，是实体关系图中发现的各种关系的数学对应物。


    ## Specialization Predicate


    看一下图 6-7 中显示的表 `TRN1`。


    ### Figure 6-7. *Table TRN1*


    清单 6-10 中列出的关于表 `EMP1` 和 `TRN1` 的命题是 TRUE 命题。


    ### Listing 6-10. *Propositions Regarding Tables EMP1 and TRN1*


    ```

    P7 := {empno} is uniquely identifying in TRN1

    P8 := { e↓{empno}| e∈EMP1 ∧ e(job)=''TRAINER'' } = { t↓{empno}| t∈TRN1 }

    ```


    **■Note** 我们已经正式定义了“*一个集合在表中是唯一标识的*”这一表述的含义。


    所以 `P7` 确实是一个形式化规范。


    从命题 `P7` 可以推出，表 `TRN1` 和 `EMP1` 的唯一标识属性是相同的。命题 `P8` 表明，表 `EMP1` 中培训师的员工编号等于表 `TRN1`
    中找到的员工编号（粗略地说）。注意这里的*相等性*。对于在表 `EMP1` 中找到的每个培训师，你都能在表 `TRN1` 中找到一个相关的元组。反之亦然，对于
    `TRN1` 中的每个元组，你都能在 `EMP1` 中找到一个培训师。


    表 `TRN1` 可以被认为是保存了关于培训师（且仅关于培训师）的附加信息：他们获得认证的日期（再次粗略地说）。


    这种情形在数据库设计中经常出现；对于给定表中的某个元组子集——可通过某个谓词指定（在上例中是 `e(job)=''TRAINER''`）——在另一个给定表中发现了附加信息，且这两个表共享相同的唯一标识属性。在这种情况下，表
    `TRN1` 被称为表 `EMP1` 的一个*特殊化*。定义 6-3 正式定义了这一概念。


    **■Definition 6-3: Specialization Predicate** 设 `T1` 和 `T2` 是表，`A` 是 `T1` 的头部的一个给定子集，同时也是
    `T2` 的头部的一个子集。设 `P` 是一个元组谓词。如果一个数据库谓词具有以下形式，则我们称其为特殊化谓词：


    { t1↓A | t1∈T1 ∧ P(t1) } = { t2↓A | t2∈T2 }


    我们称“`T2` 是 `T1` 的一个特殊化”。


    通常你会发现集合 `A` 在表 `T1` 和 `T2` 中都是唯一标识的。在清单 6-10 的例子中，你看到 `{empno}` 在 `EMP1` 和 `TRN1`
    中都是唯一标识的。


    一个给定的表可以有多个特殊化。假设你也想为经理保存附加信息；例如，经理的年度奖金。为本例假设，培训师和文员没有年度奖金，只有经理有。看一下保存经理年度奖金的表
    `MAN1`（见图 6-8）；它也是 `EMP1` 的一个特殊化。


    ### Figure 6-8. *Table MAN1*


    以下命题在表 `EMP1` 和 `MAN1` 之间成立。它符合定义 6-3 引入的形式。


    { e↓{empno}| e∈EMP1 ∧ e(job)=''MANAGER'' } = { t↓{empno}| t∈MAN1 }


    在下一节中，我们将讨论与特殊化相关的一个概念。


    ## Generalization


    如果一个给定的表 `T` 有多个特殊化，例如表 `S1` 到 `Sn` (`n>1`)，使得对于 `T` 中的每个元组，在恰好一个特殊化中存在恰好一个相关的元组，那么我们说“表
    `T` 是表 `S1` 到 `Sn` 的一个*泛化*”。'
