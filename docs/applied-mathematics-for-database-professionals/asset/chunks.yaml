- fmt: '# Some More Logic


    As announced in Chapter 1’s introduction, this third chapter about logic continues
    where the first one stopped.


    In the section `Algebraic Properties`, we’ll revisit rewrite rules to focus on
    certain algebraic properties of our logical connectives: identity, commutativity,
    associativity, distributivity, reflexivity, transitivity, idempotence, double
    negation, and absorption.


    In the section `Quantifiers`, we’ll explore quantification. Quantification over
    a set is a powerful concept to bind parameters, and as such it’s important in
    data management. The two most important quantifiers are the universal quantifier
    (represented by the symbol `∀` and read “for all”) and the existential quantifier
    (represented by the symbol `∃` and read “there exists”). Once these two quantifiers
    are introduced, we’ll identify some important rewrite rules concerning quantifiers.
    We’ll also investigate quantification over the empty set, which is often misunderstood
    and therefore a source of confusion.


    The section `Normal Forms` discusses normal forms in logic—not to be confused
    with normal forms of data (defined for database design purposes). Normal forms
    can help you to structure your predicates. We’ll explore the following two normal
    forms for predicates:


    - Conjunctive normal form is a predicate rewritten in the format of an iterated
    `AND`.

    - Disjunctive normal form is a predicate rewritten in the format of an iterated
    `OR`.


    After the `Chapter Summary`, there’s another section with exercises, focusing
    on quantifiers and normal forms. We again strongly advise you to spend sufficient
    time on these exercises before moving on to other chapters.


    This chapter ends the formal treatment of logic; Chapter 4 will continue with
    more set theory.


    ## Algebraic Properties


    From regular mathematics, we know that arithmetic operations such as sum and product
    have certain properties, such as those shown in Listing 3-1.


    **Listing 3-1.** Examples of Properties for Sum and Product


    ```

    -(-x) = x

    x+y = y+x

    (x+y)+z = x+(y+z)

    x*(y+z) = (x*y)+(x*z)

    ```


    Such arithmetic properties are referred to as algebraic properties. Logical connectives
    also have similar algebraic properties. Table 1-13 in Chapter 1 showed 19 rewrite
    rule examples, subdivided in certain categories. The names of those categories
    refer to algebraic properties; they are important enough to justify giving them
    more attention, so the following sections discuss them in more detail, while adding
    more properties.


