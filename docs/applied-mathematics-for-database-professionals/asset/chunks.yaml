    \ ∅)\n  , (HIST; ∅) }\n```\n\n将事务 `Tx1a` 应用于数据库状态 `dbs1` 会得到一个持有如下 `CRS` 表的数据库状态：\n"
- fmt: '## 事务定义与约束讨论


    ### 问题分析


    以下数据表示存在约束违反：


    ```

    { { (CODE;''AM4DP''), (DESC;''AM4DP workshop''), (CAT;''DSG''), (DUR;1) }, { (CODE;''AM4DP''),
    (DESC;''Applied Mathematics for Database Professionals''), (CAT;''DSG''), (DUR;5)
    } }

    ```


    此表明确违反了作为 `tab_CRS` 定义一部分指定的表约束，因此不是 CRS 表结构的可接受表。因此，在此情况下，`Tx1a(dbs1)` 不是 `DB_UEX`
    的元素。显然，当前对此事务的定义是有缺陷的，因为我们不希望事务导致数据库最终处于违反任何数据完整性约束的状态。


    ### 改进的事务定义


    将 `tcrs1` 插入数据库的更合适的事务定义如下，命名为 `Tx1b`。请注意，在此定义中我们重用了函数 `Tx1a`，该函数在本节前面已指定。


    `Tx1b(dbs) := dbs , if Tx1a(dbs) ∉ DB_UEX`

    `:= Tx1a(dbs), otherwise`


    事务 `Tx1b` 描述了一次插入 *尝试*。如果 `tcrs1` 的插入导致数据库状态违反任何数据完整性约束（即，结果数据库状态不是 `DB_UEX` 的元素），则该插入被拒绝（也称为
    *回滚*），数据库状态保持不变。否则，`tcrs1` 的插入被允许（事务 *成功执行* 或 *提交*）。


    在此特定示例中，给定数据库状态 `dbs`，仅当 `dbs` 中的 CRS 表不包含 `code` 属性值等于 `''AM4DP''` 的元组时，插入尝试才会成功执行。但是，如果该元组恰好是
    `tcrs1`，则插入尝试成功，但在此情况下根本不会添加元组。通过集合并集将元组添加到已包含该元组的表中，不会向表中引入新元素（元组）。


    ### 约束的考量


    至此，我们仅关注属性、元组和表约束。


    在检查 `Tx1a(dbs)` 是否是 `DB_UEX` 的元素时，您还应考虑涉及 CRS 表结构的数据库约束。


    **■ 注意**

    您可以通过在形式化数据库约束规范中简单扫描字符串 `''CRS''` 来确定在插入元组到 CRS 的事务中所涉及的数据库约束。


    以下是涉及的数据库约束（使用清单 7-39 中引入的简称）：`PSSR6`、`PTIJ9`、`PTIJ10`、`PTIJ12`、`PTIJ14`、`PTIJ15`
    和 `PODC3`。在此特定示例中，将新的 CRS 元组插入到有效的数据库状态（即 `DB_UEX` 中的数据库状态）永远不会违反这些数据库约束之一（您可能需要自行验证这一点）。


    因此，在此示例的讨论中，我们无需考虑这些涉及的数据库约束。


    **■ 注意**

    `Tx1b` 的定义涵盖了所有静态约束：属性、元组、表和数据库。


    ### 状态转换约束


    最后——这应该不足为奇——*状态转换* 约束应包含在事务的形式化定义中。


    看看元组 `toffr1`。它代表一个需要插入数据库的 `AM4DP` 课程的授课安排。


    ```

    toffr1 := { (COURSE; ''AM4DP''), (STARTS; ''01-FEB-2007''), (STATUS; ''CONF''),
    (MAXCAP; 20), (TRAINER; 1126), (LOC; ''UTRECHT'') }

    ```


    此元组符合为 `OFFR` 表结构指定的所有属性和元组约束（参见第 7 章中 `chr_OFFR` 和 `tup_OFFR` 的定义）。


    假设您希望尝试将 `offr1` 元组插入到其开始状态当前符合 `DB_UEX` 定义中所有静态约束的数据库中。我们进一步假设此事务的开始数据库状态符合以下附加特征。括号内列出了导致我们列出该特征的涉及约束。


    *   `CRS` 包含一个代表 `AM4DP` 课程的元组 (`PSSR6`)。

    *   `OFFR` 中尚无任何授课安排；这是要插入的第一个 (`tab_OFFR` 约束 `PTIJ13`、`PTIJ14`、`PTIJ15`)。'
  raw: '{ { (CODE;''AM4DP''), (DESC;''AM4DP workshop''), (CAT;''DSG''), (DUR;1) }


    , { (CODE;''AM4DP''), (DESC;''Applied Mathematics for Database Professionals''),
    (CAT;''DSG''), (DUR;5) } }


    This table clearly violates the table constraint that is specified as part of
    the definition of tab_CRS, and is therefore not an admissible table for the CRS
    table structure. Consequently, in this case, Tx1a(dbs1) is *not* an element of
    DB_UEX. Clearly the current definition of this transaction is flawed, for we don’t
    want a transaction to have the database end up in a state that violates any of
    the data integrity constraints.


    A more proper definition of the transaction that inserts tcrs1 to the database
    would be this one, named Tx1b. Note that in this definition we are reusing function
    Tx1a, which was specified earlier in this section.


    Tx1b(dbs) := dbs , if Tx1a(dbs)∉DB_UEX


    := Tx1a(dbs), otherwise


    Transaction Tx1b describes an insertion *attempt*. If the insertion of tcrs1 results
    in a database state that violates any of the data integrity constraints—that is,
    the resulting database state is not an element of DB_UEX—then the insertion is
    refused (also referred to as *rolled back*), and the database state remains the
    same. Otherwise, the insertion of tcrs1 is allowed (the transaction *executes
    successfully*, or *commits*).


    In this particular example, given a database state dbs, the insertion attempt
    successfully executes only if the CRS table in dbs does not already contain a
    tuple where the code attribute value equals ''AM4DP''. However, if that tuple
    is in fact tcrs1, the insertion attempt succeeds, but in this case does not add
    a tuple at all. Adding a tuple (through set union) to a table that already contains
    this tuple does not introduce a new element (tuple) to the table.


    Thus far, we are only focusing on attribute, tuple, and table constraints in this
    discussion.


    When checking whether Tx1a(dbs) is an element of DB_UEX, you should also consider
    the database constraints that involve the CRS table structure.


    **■Note** You can determine the involved database constraints for a transaction
    that inserts a tuple in CRS by simply scanning for the string ''CRS'' in the formal
    specifications of the database constraints.


    Here are the involved database constraints (using the short names introduced in
    Listing 7-39): PSSR6, PTIJ9, PTIJ10, PTIJ12, PTIJ14, PTIJ15, and PODC3\. In this
    particular example, inserting a new CRS tuple into a valid database state—a database
    state in DB_UEX—will


    7451CH10.qxd 5/7/07 11:36 AM Page 225


    C H A P T E R 1 0 **■** D ATA M A N I P U L AT I O N


    **225**


    never violate one of these database constraints (you might want to verify this
    for yourself ).


    Therefore, we need not consider these involved database constraints in the discussion
    of this example.


    **■Note** The definition of Tx1b does cover all static constraints: attribute,
    tuple, table, and database.


    Last—this should not surprise you—the *state transition* constraints should be
    involved in the formal definition of a transaction.


    Take a look at tuple toffr1\. It represents an offering for the AM4DP course that
    needs to be inserted into the database.


    toffr1 := { (COURSE; ''AM4DP'')


    , (STARTS;


    ''01-FEB-2007'')


    , (STATUS; ''CONF'')


    , (MAXCAP;


    20)


    , (TRAINER; 1126)


    , (LOC;


    ''UTRECHT'') }


    This tuple conforms to all attribute and tuple constraints that are specified
    for the OFFR


    table structure (see the definitions of chr_OFFR and tup_OFFR in Chapter 7).


    Let’s assume you’d like to attempt to insert the offr1 tuple into the database
    whose begin state currently conforms to all static constraints specified in the
    definition of DB_UEX. We’ll further assume that the begin database state for this
    transaction conforms to the following additional characteristics. In parentheses,
    we list involved constraints that cause us to list the characteristic.


    • CRS holds a tuple that represents the AM4DP course (PSSR6).


    • No offerings are in OFFR yet; this is the first one to be inserted (tab_OFFR
    constraints PTIJ13, PTIJ14, PTIJ15).'
