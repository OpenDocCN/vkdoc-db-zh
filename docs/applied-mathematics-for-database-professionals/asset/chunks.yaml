    **Set Operators and the Empty Set**


    As another special case, it’s always a good idea to check the behavior of the
    *empty set*, because we want it to behave just like any other set. So let’s see
    how the union, intersection, and difference set operators behave if the empty
    set is involved as one of their operands: A ∪ ∅ = { x | x∈A ∨ x∈∅ } = A


    A ∩ ∅ = { x | x∈A ∧ x∈∅ } = ∅


    A – ∅ = { x | x∈A ∧ x∉∅ } = A


    ∅ – A = { x | x∈∅ ∧ x∉A } = ∅


    A ÷ ∅ = ( A–∅ ) ∪ ( ∅–A ) = A ∪ ∅ = A


    In other words, a union with the empty set doesn’t add anything. Every intersection
    with the empty set is empty because there are no common elements; the difference
    and the symmetric difference don’t take any elements out, so they don’t change
    anything either.


    The following logical equivalence is also a tautology—that is, it is a rewrite
    rule: ( ( ( A – B ) = ∅ ) ∧ ( ( B – A ) = ∅ ) ) ⇔ ( A = B )


    You can prove this equivalence in two steps, with the following reasoning:


    • If A – B is the empty set, then you can show that A is a subset of B;


    • if B – A is also the empty set, then you can also show that B is a subset of
    A;


    • but then A must be equal to B.


