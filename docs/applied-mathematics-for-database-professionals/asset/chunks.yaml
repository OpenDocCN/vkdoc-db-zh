  trans: "# 第 11 章 在 Oracle 中实现数据库设计\n\nTE 查询本身通常比为验证约束而条件运行的查询要简单得多。\n\n示例已展示了最后一点观察结果。结合前两点观察，这应该能够回答那个问题：TE\
    \ 查询不会违背其目的（DI 代码的效率）。\n\n此外，使用 TE 查询来*守护*约束验证还有第二个——更重要的——目的。防止执行不必要的约束验证查询将极大地有利于事务的并发性。我们将在下一小节“DI\
    \ 代码序列化”中处理这个方面。\n\n还有一种方法可以进一步优化执行模型 `EM5` 的效率。这涉及执行一个更高效的查询来验证约束。到目前为止，你都是直接从约束的形式化规范中推导出这些查询，因此它们验证的是*完整*的约束谓词。\n\
    \n在 `EMP_TAB03` 的情况下，该查询验证是否*每个*部门都满足量化的谓词（如果有总裁/经理，则有管理员）。在 `DEPT_TAB01` 的情况下，该查询验证是否*每个*部门经理管理的部门都不超过两个。通常，给定一个触发的\
    \ `DML` 语句，执行一个验证*较弱*谓词的查询就足够了。\n\n例如，如果一条 `INSERT` 语句向 `EMP` 表结构插入一个部门 10 的经理，那么理论上你只需要验证该量化谓词是否仍*仅对部门\
    \ 10* 满足。同样，如果一条 `UPDATE` 语句更改了某个部门的经理，那么你只需要验证这位新的部门经理管理的部门是否没有超过两个。\n\n最后一个执行模型解决了这个进一步提高\
    \ DI 代码效率的机会。\n\n## 执行模型 6：过渡效应属性加上优化查询\n这个执行模型 (`EM6`) 与 `EM5` 相似，因为它也需要每个表结构的过渡效应；你现在以稍微更复杂的方式使用这个过渡效应，以便能够确定较弱的谓词。\n\
    \n你现在不仅利用过渡效应中的某个属性来守护约束验证查询的执行，而且还利用过渡效应来提供可用于优化验证查询的值。例如，在 `EMP_TAB03` 的情况下，你可以使用过渡效应来确定需要检查哪些部门的较弱谓词；这应该总是导致执行更高效的验证查询。在\
    \ `DEPT_TAB01` 的情况下，你可以使用过渡效应来找出需要检查哪些 `MGR` 值的较弱谓词。\n\n清单 11-36 向你展示了如何做到这一点。它展示了约束\
    \ `EMP_TAB03` 的插入、更新和删除触发器的 `EM6` 版本。\n\n**清单 11-36.** 约束 EMP_TAB03 的 DI 代码的 EM6\
    \ 实现\n\n```sql\ncreate trigger EMP_AIS_TAB03\nafter insert on EMP\ndeclare\n \
    \ pl_dummy varchar(40);\nbegin\n  --\n  for r in (select distinct deptno\n   \
    \         from v_emp_ite\n            where JOB in ('PRESIDENT','MANAGER'));\n\
    \  loop\n    begin\n      --\n      select 'Constraint EMP_TAB03 is satisfied'\
    \ into pl_dummy\n      from DUAL\n      where not exists(select e2.*\n       \
    \                from EMP e2\n                       where e2.DEPTNO = r.DEPTNO\n\
    \                       and e2.JOB in ('PRESIDENT','MANAGER'))\n      or exists(select\
    \ e3.*\n                from EMP e3\n                where e3.DEPTNO = r.DEPTNO\n\
    \                and e3.JOB = 'ADMIN');\n      --\n    exception when no_data_found\
    \ then\n      --\n      raise_application_error(-20999,\n        'Constraint EMP_TAB03\
    \ is violated for department '||to_char(r.deptno)||'.');\n      --\n    end;\n\
    \  end loop;\nend;\n/\n```\n\n```sql\ncreate trigger EMP_ADS_TAB03\nafter delete\
    \ on EMP\ndeclare\n  pl_dummy varchar(40);\nbegin\n  --\n  for r in (select distinct\
    \ deptno\n            from v_emp_dte\n            where JOB='ADMIN');\n  loop\n\
    \    begin\n      --\n      select 'Constraint EMP_TAB03 is satisfied' into pl_dummy\n\
    \      from DUAL\n      where not exists(select e2.*\n                       from\
    \ EMP e2\n                       where e2.DEPTNO = r.DEPTNO\n                \
    \       and e2.JOB in ('PRESIDENT','MANAGER'))\n      or exists(select e3.*\n\
    \                from EMP e3\n                where e3.DEPTNO = r.DEPTNO\n   \
    \             and e3.JOB = 'ADMIN');\n      --\n    exception when no_data_found\
    \ then\n      --\n      raise_application_error(-20999,\n        'Constraint EMP_TAB03\
    \ is violated for department '||to_char(r.deptno)||'.');\n      --\n    end;\n\
    \  end loop;\nend;\n/\n```\n\n```sql\ncreate trigger EMP_AUS_TAB03\nafter update\
    \ on EMP\ndeclare\n  pl_dummy varchar(40);\nbegin\n  --\n  for r in (select n_deptno\
    \ as deptno\n            from v_emp_ute\n            where (o_job not in ('PRESIDENT','MANAGER')\
    \ or updated_deptno='TRUE') and n_job in ('PRESIDENT','MANAGER')\n           \
    \ union\n            select o_deptno as deptno\n            from v_emp_ute\n \
    \           where (n_job<>'ADMIN' or updated_deptno='TRUE')\n            and old_job\
    \ ='ADMIN')\n  loop\n    begin\n      --\n      select 'Constraint EMP_TAB03 is\
    \ satisfied' into pl_dummy\n      from DUAL\n      where not exists(select e2.*\n\
    \                       from EMP e2\n                       where e2.DEPTNO =\
    \ r.DEPTNO\n                       and e2.JOB in ('PRESIDENT','MANAGER'))\n  \
    \    or exists(select e3.*\n                from EMP e3\n                where\
    \ e3.DEPTNO = r.DEPTNO\n                and e3.JOB = 'ADMIN');\n      --\n   \
    \ exception when no_data_found then\n      --\n      raise_application_error(-20999,\n\
    \        'Constraint EMP_TAB03 is violated for department '||to_char(r.deptno)||'.');\n\
    \      --\n    end;\n  end loop;\nend;\n/\n```\n\n### 注意\n前面 `TE` 查询中的 `distinct`\
    \ 关键字可能防止在 `UPDATE` 语句影响了多行的情况下多次执行相同的约束验证查询。\n\n因为示例约束恰好是全称量词，所以在 `EMP_TAB03`\
    \ 和 `DEPT_TAB01` 的情况下找到较弱的谓词是显而易见的。然而，情况并非总是如此；要发现较弱的谓词也可能相当复杂。这完全取决于约束的规范。同样，我们不知道是否有可能，不必你自己去发现，而是让\
    \ `DBMS` 在给定声明的约束形式规范的情况下自动计算较弱的谓词（包括 `TE` 查询）。\n\n## DI 代码序列化\n当你自己实现 `DI` 代码时，你应该意识到另一个主要问题。无论你是遵循触发式过程策略还是嵌入式过程策略，这个问题都适用。\n\
    \n在 Oracle 的 `SQL` `DBMS` 中，并发执行事务。在任何时候都可能有许多*开放*事务；也就是说，事务已启动但尚未提交。如本章前面所述，一个开放事务无法看到其他并发开放事务所做的更改。这在\
    \ `DI` 代码的正确性方面具有严重的影响。正如我们稍后将演示的，该问题的根本原因在于，作为 `DI` 代码一部分执行的约束验证查询，假定它读取的所有数据——或由于数据不存在而未能读取的数据——目前没有被其他事务更改（或创建）。对于给定约束的\
    \ `DI` 代码，只有当并发运行的、执行该约束验证查询（嵌入在 `DI` 代码中）的事务被*序列化*时，才能正确实现该约束。\n\n### 注意\n我们实际上将演示在不支持并发执行事务*可串行性*的\
    \ `DBMS` 中出现的一些经典并发问题。如果你不熟悉可串行性的概念，请查阅我们在附录 C 中添加的一些参考文献。"
- fmt: 'Let''s demonstrate this serializability issue by describing a scenario of
    two concurrently executing transactions that both potentially violate the `EMP_TAB03`
    constraint. For the sake of simplicity, assume that the `EMP` table structure
    currently contains a single row representing an administrator working for department
    20. Transaction `TX1` inserts a manager working for department 20 in the `EMP`
    table structure. Transaction `TX2` deletes the administrator working for department
    20 from the `EMP` table structure. Now take a look at Table 11-2. It describes
    a possible scenario of these two transactions executing concurrently.


    ```

    Table 11-2. TX1 and TX2 Executing Concurrently

    Time        TX1       TX2       DI Code

    ----------------------------------------------------------

    t=0                   INSERT    Finds the administrator; therefore allows this
    insert.

    t=1                   DELETE    Doesn''t find a manager; therefore allows the
    delete.

    t=2                   COMMIT

    t=3                   COMMIT

    ```


    At time `t=0`, transaction `TX1` starts. It inserts the manager, which causes
    the execution of DI code for constraint `EMP_TAB03`. The constraint validation
    query that executes as part of this DI code finds the administrator in department
    20, which causes the DI code to allow this insert. At time `t=1`, transaction
    `TX2` starts. It deletes the only row in the `EMP` table structure representing
    the administrator. Deleting an administrator also causes the same DI code for
    constraint `EMP_TAB03` to be executed. The constraint validation query that executes
    as part of this DI code does not find a manager (or president) working in department
    20, which causes the DI code to also allow this delete.


    **Note:** At `t=1`, queries executing within transaction `TX2` do not see the
    uncommitted changes made by transaction `TX1`.


    At `t=2`, transaction `TX1` commits. At `t=3`, transaction `TX2` commits. The
    database now violates constraint `EMP_TAB03`; the `EMP` table structure holds
    a manager working for department 20, but there is no administrator in that department.


    Let''s also look at an example within the context of constraint `DEPT_TAB01`.
    Assume the `DEPT` table structure currently holds one department managed by employee
    1042. Transaction `TX3` inserts a new department that is also managed by employee
    1042. Transaction `TX4` also inserts a department again managed by employee 1042.
    Take a look at Table 11-3. It describes a possible scenario of these two transactions
    executing concurrently.


    ```

    Table 11-3. TX3 and TX4 Executing Concurrently

    Time        TX3       TX4       DI Code

    ----------------------------------------------------------

    t=0                   INSERT    Sees 1042 now manages two departments; therefore
    allows this insert.

    t=1                   INSERT    Sees 1042 now manages two departments; therefore
    allows this insert.

    t=2                   COMMIT

    t=3                   COMMIT

    ```


    Again, the DI code that executes at `t=1` in `TX4` does not see the uncommitted
    department inserted by transaction `TX3` at `t=0`. Both inserts execute successfully.
    After `t=3`, the database violates constraint `DEPT_TAB01`; employee 1042 is managing
    three departments.


    For every multi-tuple constraint, you can devise a scenario of concurrently executing
    transactions such that upon commit of these transactions the database is in violation
    of the constraint. Note that this is irrespective of the execution model that
    is used to implement the DI code.


    Now, the question is, can you resolve this issue? The answer is yes. However,
    it requires that you develop and embed sometimes rather sophisticated serialization
    code in the DI code to ensure that there can never be *two transactions executing
    at the same time that involve the same constraint* (that is, that run the validation
    query of the same constraint).


    **Note:** The following section assumes that you are familiar with Oracle''s `dbms_lock`
    package and the concept of an autonomous transaction. If you''re not, then we
    advise you first to study the Oracle documentation on this package and autonomous
    transactions.'
