    ### Exercise 2


    **a.** TRUE; all elements in set `A` are greater than 1.


    **b.** TRUE; 5 is an element that exists in `B` for which, when chosen for variable
    `x`, `mod(x,5) = 0`.


    **c.** FALSE; if you choose element 2 in `A` for `x` and choose 1 in `B` for `y`,
    then `x + y = 3`, which is not greater than or equal to 4. Because there exists
    such a combination for `x` and `y`, the given predicate does not hold for all
    values `x` and `y`, and is therefore FALSE. The predicate would be TRUE if you
    redefine set `B` to `{3,5,7,9}`.


    **d.** TRUE; for each element that you can choose from `A`, there is always an
    element in `y` that can be picked such that `x + y = 11`. For `x = 2, 4, 6, 8`,
    pick `y = 9, 7, 5, 3`, respectively.


    **e.** FALSE; there is no value in set `B` such that if you add that value to
    every available value in set `A`, the result of every such addition would always
    be 11. The predicate would be TRUE if you redefined set `A` such that it only
    holds *one* element, which effectively down-grades the inner universal quantification
    to an existential quantification. For `A = {2}` you can choose `y = 9`. For `A
    = {4}` you can choose `y = 7`. For `A = {6}` you can choose `y = 5`. For `A =
    {8}` you can choose `y = 3`. Another option would be to redefine set `A` to the
    empty set. The inner universal quantification will then be TRUE, irrespective
    of the expression (`x + y = 11`). As long as `B` has at least one element, the
    full predicate will then always be TRUE.


    **f.** TRUE; choose 2 in `A` for both `x` and `y`. You might think that it is
    not allowed to choose the same value twice, but it is in this case. Variables
    `x` and `y` are bound independently to set `A`. The binding of `y` to (the inner)
    `A` is not influenced by the value you choose for `x` that is bound to the outer
    `A`.


