    \ ∧ t2(instock)>0 ))\n```\n\n谓词 `P5` 表明，在表 `T` 中没有两个不同的元组（零件）具有相同的 `partno` 值。假设谓词\
    \ `P6` 也处理零件表，它大致表示——由零件表 `T` 代表的总库存价值不超过 2500。谓词 `P7` 表明，每当某个零件缺货时，就应该存在另一个不同的零件（具有不同的零件编号），它具有相同的名称并且仍有库存。\n\
    \n`■Note` 重要的是，你（数据库专业人员）能够将这些形式化规范呈现为非形式化表示，反之亦然。在接下来的章节中，你将看到更多这方面的例子。\n\n7451CH06.qxd\
