    The first constraint can be violated if one of the administrators has already
    been registered for the offering.


    The second constraint cannot be violated by transaction ETX1 irrespective of the
    begin state (assuming March 1 is still in the future; that is, other registrations
    already present still reflect EVAL=-1).


    PTIJ8 (you cannot register for offerings in the first four weeks on the job) is
    involved and cannot be violated by ETX1 given the e.HIRED between sysdate - 91
    and sysdate predicate in the WHERE clause.


    PTIJ9 (you cannot register for offerings given at or after leave date) is involved.
    For ETX1


    the begin state should reflect that all administrators who have been hired in
    the past three months are still working for the company.


    7451AppE.qxd 5/15/07 1:43 PM Page 365


    A P P E N D I X E **■** A N S W E R S TO S E L E C T E D E X E R C I S E S


    **365**


    PTIJ10 (you cannot register for overlapping courses) is involved. For ETX1 the
    begin state should reflect that none of these administrators are already registered
    for another offering that overlaps with the March 1 AM4DP offering.


    PTIJ13 (trainer cannot register for offerings taught by him/herself ) is involved.
    This one cannot be violated because administrators cannot act as the trainer for
    an offering.


    PTIJ15 (you cannot register for offering that overlaps with another one where
    you are the trainer) is involved. For the same reason mentioned with PTIJ13, this
    one cannot be violated either.


    PODC4 (offerings with more than six registrations must have status confirmed)
    is involved.


    Depending upon the current number of registrations, the current status for the
    offering, and the number of administrators that get registered for the AM4DP offering,
    this constraint might well get violated by ETX1.


    PODC5 (number of registrations cannot exceed maximum capacity of offering) is
    involved.


    This one too will get violated by ETX1, depending on the current number of registrations
    and the number added by ETX1.


    PODC6 (canceled offerings cannot have registrations) is involved; it will get
    violated if the current status of the offering equals ''canceled''.


    **Exercise 3**


    The following integrity constraints are involved in the UPDATE statement of transaction
    ETX4: PTIJ1, PTIJ3, PTIJ4, PTIJ6, and PTIJ7. All of these except PTIJ3 run the
    risk of being violated by the statement.


