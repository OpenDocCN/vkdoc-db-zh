    # 第 7 章 指定数据库设计


    **7.** 数据库约束 `PTIJ5` 暗示没有任何员工可以管理多于一个部门。这使得表宇宙 `tab_DEPT` 的第三个表约束变得无用：在给定 `PTIJ5`
    的情况下，它永远无法被违反。


    **a.** 修改数据库约束 `PTIJ5` 的规范，使得如果员工管理两个部门，那么其中一个部门必须是该员工受雇的部门。


    **b.** 添加一个新约束，规定如果一名员工管理两个部门，那么这两个部门必须位于同一地点。


    **8.** 谓词 `PODC6` 是一个伪装的元组-连接谓词。你能提供遵循元组-连接谓词结构的另一种形式化规范吗？


    **9.** 示例数据库设计特意没有设置约束来禁止在受管理员工的层次结构中出现循环。这是因为其他约束防止了此类循环的发生。你能看出是哪些约束吗？


    **10.** 使用量词给出谓词 `PODC1` 的另一种形式化规范。


    **11.** 员工编号为 1000 的员工在公司内具有特殊地位。看看下面关于该员工的数据库约束：

    ```

    PODC8(OFFR,REG) :=

    (∀o∈OFFR: (∃r∈REG: r↓{course,starts}=o↓{course,starts} ∧ r(stud)=1000)

    ⇒

    ( #{ r2 | r2∈REG ∧ r2↓{course,starts}=o↓{course,starts)} = 1

    ∧¬(∃o2∈OFFR: o2↓{loc,starts}=o↓{loc,starts} ∧ o2(course)≠o(course))

    )

    )

    ```

    该约束规定，每当员工 1000 参加某个课程班时，则不允许其他学生参加此课程班，并且也不能有任何其他课程班（针对不同课程）在与该课程班相同的日期和地点开始。该约束实际上是两个约束的合取，其中一个是（伪装的）表约束，另一个是（更简单的）数据库约束。请运用本书第
    1 部分介绍的各种重写规则，找出这两个约束是什么。


    **12.** 看看下面的数据库状态，名为 `db_empty`：

    ```

    { ( EMP; ∅ ), ( SREP; ∅ ), ( MEMP; ∅ ), ( TERM; ∅ ), ( DEPT; ∅ ), ( GRD; ∅ ),
    ( CRS; ∅ ), ( OFFR; ∅ ), ( REG; ∅ ), ( HIST; ∅ ) }

    ```

    状态 `db_empty` 是数据库宇宙 `DB_UEX` 的一个元素吗？


    **13.** 用 `BONUS` 表结构扩展示例数据库设计。以下是该表结构的外部谓词：“员工编号为 `EMPNO` 的员工在 `YEAR` 年获得了 `AMOUNT`
    美元的奖金。” 对于这个新的表结构，适用以下约束：


    **a.** 年度奖金不得超过该员工工资等级的上限。


    **b.** 员工只能因（活跃）工作满整年而获得奖金。


    **c.** 销售代表不获得奖金。


    为 `BONUS` 表结构提供表征、元组宇宙和表宇宙，并（如果需要）修改 `DB_UEX` 宇宙。


    **14.** 总统决定，业务规则“同一课程的两个课程班不能在同一天开始”应放宽为“只有当同一课程的两个课程班在不同地点进行时，才允许在同一天开始。”


    分析这一变化对 `DB_UEX` 宇宙数据完整性约束的影响。


    **15.** 对谓词 `PTIJ15` 稍作修改，你可以让它包含谓词 `PTIJ13` 所施加的限制；这样它就蕴含了 `PTIJ13`，这意味着你可以去掉
    `PTIJ13`。你知道如何修改 `PTIJ15` 吗？


    # 第 8 章 指定状态转移约束


    在第 6 章中，你接触到了元组谓词、表谓词和数据库谓词。这些谓词处理数据的范围依次增大：单个元组内的属性值、单个表内的元组，以及单个数据库状态内的表。


    “更多数据完整性谓词”一节沿着范围扩大的路径，引入了*状态转移谓词*的概念。状态转移谓词处理一对数据库状态，它们分别被称为*起始状态*和*终止状态*。


    我们将使用状态转移谓词来为数据库设计定义可接受的数据库状态转移（也称为*事务*）。


    在“状态转移约束”一节中，你将发现一个事务可以建模为两个数据库状态的有序对：事务开始时存在的数据库状态，以及事务结束时存在的数据库状态（即事务导致的结果状态）。


    我们将定义*状态转移宇宙*的概念：它持有数据库设计所有可接受事务的集合。为了定义状态转移宇宙，你将定义代表数据库设计中*状态转移约束*的状态转移谓词。


    “状态转移约束”一节以第 7 章引入的示例数据库设计的状态转移宇宙规范作为结束；它包含了该数据库设计的七个状态转移约束。示例状态转移宇宙也可在附录 A 中找到。


    照例，本章末尾会有“本章小结”，随后是“练习”部分。


    ## 更多数据完整性谓词


    在上一章中，你接触了四类数据完整性约束：属性约束、元组约束、表约束和数据库约束。这四类约束接受或拒绝给定的数据库状态。它们可以在数据库状态的上下文中进行检查，被称为静态约束。在现实世界中，常常有要求基于静态约束以外的原因禁止某些*数据库状态转移*。这些限制状态转移的约束被称为*动态*（或*状态转移*）约束。


    ## 一个简单例子


    状态转移约束的一个经典说明是要求员工的工资不允许降低。正如你所见，这个要求无法在单个数据库状态的上下文中进行检查；你需要一个改变数据库状态的事务的上下文。要检查这个要求，你需要检查事务开始时存在的数据库状态（其*起始状态*）中的工资值，并检查事务结束时存在的数据库状态（其*终止状态*）中的工资值。


    **注意：** 很快你会看到，我们将使用这两个数据库状态——起始状态和终止状态——来刻画一个事务。


    让我们用上一章引入的数据库设计为例来演示这一点。图 8-1 显示了两个员工表 `E1` 和 `E2`。


    **图 8-1.** *表 `E1` 和 `E2`*


    这两个表仅在三个属性值上有所不同。


    假设一个给定的事务，例如 `TX1`，起始于一个包含 `E1` 的起始状态，并产生一个包含 `E2` 的终止状态。如图 8-1 所示，`TX1` 显然降低了员工
    101 的工资（从 8200 降到 7900），并改变了该员工的工资等级。`TX1` 也增加了员工 105 的工资（从 3000 增加到 4000）。事务
    `TX1` 没有改变所有其他员工的工资。


    **注意：** 显然，`TX1` 违反了规定工资不允许降低的状态转移约束。

