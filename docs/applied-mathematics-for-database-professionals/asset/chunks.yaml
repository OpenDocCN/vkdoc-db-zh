  trans: "\n# 第 6 章 元组、表与数据库谓词\n\n让我们在上一节示例的基础上继续构建。假设你还想为办事员保存额外的信息；例如，他们的合同类型（全职或兼职）以及他们汇报的经理。如图\
    \ 6-9 所示的表`CLK1`，是表`EMP1`的一个特化（specialization），用于保存办事员的这些额外信息。\n\n### 图 6-9. 表\
    \ `CLK1`\n\n现在，特化表`TRN1`、`MAN1`和`CLK1`总共有七个元组。对于表`EMP1`中的每一个元组——共有七个——在表`TRN1`、`MAN1`或`CLK1`中的恰好一个表中，存在且仅存在一个对应的元组。这使得表`EMP1`成为表`TRN1`、`MAN1`和`CLK1`的一个**泛化（generalization）**。\n\
    \n**注意** 顺便提一下，你现在也可以指定一个从`CLK1`到`EMP1`的子集需求（涉及`CLK1`的经理属性）。这将作为本章末尾的一个练习。\n\n\
    在泛化表中，你经常会发现一个特定的属性，它决定了额外信息可以在哪个特化表中找到。在所使用的示例中，这个属性是`job`属性。对于表`EMP1`中`job='TRAINER'`的元组，其额外信息在特化表`TRN1`中找到。对于`job='MANAGER'`的元组，额外信息可在表`MAN1`中找到；而对于`job='CLERK'`的元组，额外信息则在表`CLK1`中找到。泛化表中的这样的属性被称为`检查属性（inspection\
    \ attribute）`。\n\n请注意，`检查属性`是一个冗余属性；也就是说，它的值可以从其他元组推导出来。对于`EMP1`中的一个给定元组，它在`TRN1`、`MAN1`或`CLK1`中存在一个对应的元组。你可以直接从该对应元组出现的位置推导出`EMP1`元组的`job`值；其值应分别为`'TRAINER'`、`'MANAGER'`或`'CLERK'`。\n\
    \n通常，你不应该在数据库设计中引入数据冗余；这迫使你在更新决定冗余数据的数据时，必须维护这种冗余。\n\n或者，从数据库设计的角度来看，这迫使你引入一个约束来强制实施数据冗余。然而，在数据库设计中指定泛化属性时，`检查属性`非常有帮助（本章末尾有一个关于此的练习）。\n\
    \n## 连接中的元组谓词\n\n两个表通常通过子集需求相关联。当两个表以这种方式关联时，由于显而易见的原因，连接它们的需求会经常出现。你可以根据涉及这两个表之间子集需求的属性（本例中是`deptno`属性），连接表`EMP1`和`DEP1`中对应的元组。这种组合产生的表，其标题将是`EMP1`的标题与`DEP1`标题的并集。\n\
    \n图 6-10 展示了表`EMP1`和`DEP1`这种组合的结果。\n\n### 图 6-10. 表 `EMPDEP1`，表 `EMP1` 和 `DEP1`\
    \ 的连接\n\n表`EMPDEP1`中的每个元组被称为`连接中的元组`。`连接中的元组谓词`是处理这些连接中元组的元组谓词；被连接的元组是该元组谓词的参数。以下是关于`EMPDEP1`的一个元组谓词示例：\n\
    ```\n( ∀t∈EMPDEP1: t(sal)≤t(salbudget)/5 )\n```\n这个命题表明，`EMPDEP1`（即`EMP1`和`DEP1`的连接）中的所有元组，其`sal`属性值不超过`sabudget`属性值的\
    \ 20%。在此命题中，表达式`t(sal)≤t(salbudget)/5`代表了元组谓词。如果你不以表`EMPDEP1`的形式，而是以两个被连接的表——`EMP1`和`DEP1`——的形式来表达这个命题，你将得到如下形式的命题：\n\
    ```\n( ∀e∈EMP1: ( ∀d∈DEP1: e(deptno)=d(deptno) ⇒ e(sal)≤d(salbudget)/5 ) )\n```\n\
    它表明，任何员工的薪资都不能超过其受雇部门工资预算的五分之一。另一种正式的指定方式如下：\n```\n( ∀t∈EMP1⊗DEP1: t(sal)≤t(salbudget)/5\
    \ )\n```\n在这个命题中，表达式`t(sal)≤t(salbudget)/5`代表了一个约束连接中元组的元组谓词。这种谓词模式在数据库设计中很常见，被称为`连接中的元组谓词`。定义\
    \ 6-4 正式定义了它。\n\n**定义 6-4: 连接中的元组谓词** 设`T1`和`T2`为表，`P`为一个元组谓词。如果一个谓词具有以下形式，则它是`连接中的元组谓词`：\n\
    ```\n( ∀t∈T1⊗T2: P(t) )\n```\n我们说`P`约束了`T1`和`T2`连接中的元组。\n\n在前面的定义中，你通常会发现表`T1`和`T2`是通过涉及连接属性的子集需求相关联的。\n\
    \n列表 6-11 展示了另外两个涉及表`EMP1`和`DEP1`的`连接中的元组谓词`实例。\n\n### 列表 6-11. 更多关于表 `EMP1` 和\
    \ `DEP1` 的连接中的元组谓词\n\n```\nP9 := ( ∀e∈EMP1: ( ∀d∈DEP1: e↓{deptno}=d↓{deptno} ⇒\n\
    \        (d(loc)='LOS ANGELES'⇒ e(job)≠'MANAGER') ) )\n\nP10 := ( ∀e∈EMP1: ( ∀d∈DEP1:\
    \ e↓{deptno}=d↓{deptno} ⇒\n         (d(loc)='SAN FRANCISCO'⇒ e(job)∈{'TRAINER','CLERK'})\
    \ ) )\n```\n`P9`指出经理不能被雇佣在洛杉矶。`P10`指出在旧金山工作的员工必须是培训师或办事员。根据图 6-10 中的示例值`EMP1`和`DEP1`，这两个命题都是`真（TRUE）`；没有经理在洛杉矶工作，并且所有在旧金山工作的员工——实际上没有这样的员工——都是培训师或办事员。\n\
    \n在本节中，我们定义了只涉及两个表的`连接中的元组谓词`。然而，使用连接操作符组合三个甚至更多的表通常也是有意义的。当然，这些连接中的元组也可以被元组谓词约束。以下是涉及三个表（`T1`、`T2`和`T3`）的`连接中的元组谓词`的模式：\n\
    ```\n( ∀t1∈T1: ( ∀t2∈T2: ( ∀t3∈T3: (t1↓A=t2↓A ∧ t2↓B=t3↓B) ⇒ P(t1∪t2∪t3) ) ) )\n\
    ```\n在此模式中，`A`代表表`T1`和`T2`的连接属性集，`B`代表表`T2`和`T3`的连接属性集。谓词`P`代表一个以连接中的元组为参数的谓词。在下一章中，你将看到涉及两个以上表的`连接中的元组谓词`示例。\n"
- fmt: '## Chapter Summary


    This section provides a summary of this chapter, formatted as a bulleted list.
    You can use it to check your understanding of the various concepts introduced
    in this chapter before continuing with the exercises in the next section.


    - A `tuple predicate` is a predicate with one parameter of type tuple. It can
    be used to accept (or reject) tuples based on the combination of attribute values
    that they hold.

    - A `table predicate` is a predicate with one parameter of type table. It can
    be used to accept (or reject) tables based on the combination of tuples that they
    hold.

    - A `database (multi-table) predicate` is a predicate with one parameter of type
    database state. It can be used to accept (or reject) database states based on
    the combination of tables that they hold.

    - Five patterns of table and database predicates are commonly found in database
    designs: `unique identification`, `subset requirement`, `specialization`, `generalization`,
    and `tuple-in-join` predicates.

    - A `unique identification` predicate is a table predicate of the following form
    (`T` represents a table): `( ∀t1,t2∈T: t1↓A=t2↓A ⇒ t1=t2 )`.

    In this expression, `A` represents the set of attributes that uniquely identify
    tuples in table `T`.

    - A `subset requirement` predicate is a predicate of the following form (`T1`
    and `T2` represent tables): `{ t1↓A| t1∈T1 } ⊆ { t2↓A| t2∈T2 }`.

    In this expression, `A` often represents the set of attributes that uniquely identify
    tuples in table `T2`.

    - A `specialization` predicate is a database predicate of the following form (`T1`
    and `T2` represent tables): `{ t1↓A| t1∈T1 ∧ P(t1) } = { t2↓A| t2∈T2 }`.

    In this expression, `A` represents the set of attributes that uniquely identify
    tuples in both tables `T1` and `T2`. Predicate `P` is a predicate specifying a
    subset of table `T1`. We say that "`T2` is a specialization of `T1`." `T2` is
    considered to hold additional information for the subset of tuples in `T1` specified
    by predicate `P`.

    - If a given table, say `T`, has more than one specialization such that for every
    tuple in `T` there exists exactly one tuple in exactly one of the specialization
    tables that holds additional information for that tuple, then table `T` is referred
    to as the `generalization` of the specializations.

    - A `tuple-in-join` predicate is a predicate of the following form (`T1` and `T2`
    represent tables): `( ∀t1∈T1: ( ∀t2∈T2: t1↓A=t2↓A ⇒ P(t1∪t2) ) )`.

    In this expression, `A` represents the set of attributes that is typically involved
    in a subset requirement between tables `T1` and `T2`. Predicate `P` is a tuple
    predicate.


    7451CH06.qxd 5/14/07 10:37 AM Page 138


    **138**

    **CHAPTER 6 ■ TUPLE, TABLE, AND DATABASE PREDICATES**


    ### Exercises


    **1.** Evaluate the truth value of the following propositions (`PAR1` was introduced
    in Figure 6-1):

    **a.** `( ∀p∈PAR1: mod(p(partno),2)=0 ⇒ p(price)≤15 )`

    **b.** `¬( ∃p∈PAR1: p(price)≠5 ∨ p(instock)=0 )`

    **c.** `#{ p | p∈PAR1 ∧ ( p(instock)>10 ⇒ p(price)≤10 ) } = 6`


    **2.** Let `A` be a subset of the heading of `PAR1`. Give all possible values
    for `A` such that "`A` is uniquely identifying in `PAR1`" (only give the smallest
    possible subsets).


    **3.** Specify a subset requirement predicate from `CLK1` and `EMP1` stating that
    the manager of a clerk must be an employee whose job is `''MANAGER''`.


    **4.** Formally specify the fact that table `EMP1` is a generalization of tables
    `TRN1`, `MAN1`, and `CLK1`.


    **5.** In `EMP1` the `job` attribute is a (redundant) inspection attribute. Formally
    specify the fact that `EMP1` is a generalization of `TRN1`, `MAN1`, and `CLK1`
    given that `EMP1` does **not** have this attribute.


    **6.** Using rewrite rules for implication and quantifiers that have been introduced
    in Part 1, give at least three alternative formal expressions for proposition
    `P12`.


    **7.** Using the semantics introduced by tables `EMP1` and `CLK1`, give a formal
    specification for the database predicate "A manager of a clerk must work in the
    same department as the clerk."

    Is this proposition TRUE for tables `EMP1` and `CLK1`?'
