    C H A P T E R 2 **■** S E T T H E O RY: I N T R O D U C T I O N


    **25**


    **Table 2-1.** *Set-Theory Symbols*


    **Symbol**


    **Meaning**


    ∈


    Is an element of


    ∉


    Is *not* an element of


    **Z**


    The set of all positive and negative integers, including value zero **N**


    The set of natural numbers; that is, integers greater than or equal to zero


    ∅


    The empty set


    **N** and **Z** are examples of sets from regular arithmetic; following are some
    other examples:


    • The set, say P, of all prime numbers less than 20:


    P := {2,3,5,7,11,13,17,19}


    • The set, say W, of the seven names of the days of the week: W := {''sunday'',''monday'',
    ''tuesday'',''wednesday'',''thursday'',''friday'',''saturday''}


    Here we use the enumerative method of specifying a set: listing all elements,
    separated by commas, between braces. This and some other methods of specifying
    a set are introduced in the next section.


    The empty set symbol ∅ represents a set that has no elements. {} is also used
    for the representation of the empty set.


    As soon as you have given your sets a name, as we did for the preceding two sets
    P and W, you can write expressions such as the following:


    -5 ∉ **N**


    -6 ∈ **Z**


    ''4''∉ **N**


    ''thursday'' ∈ W


    x ∈ P


    Note that the first four expressions are in fact propositions; all of them have
    truth value TRUE, by the way. The last one is a predicate (assuming x represents
    a numeric variable).


    You can try to keep your expressions readable by adopting certain standards; for
    example, it’s common practice to use *lowercase* naming for elements and *uppercase*
    naming for sets.


    However, note that this is a naming convention only; you cannot draw any conclusions
    from the fact that an identifier name is spelled in uppercase or lowercase. Consider
    the following expression:


    X ∈ Y


    This expression is defined *only* if Y represents (or refers to) a set; otherwise,
    it is an undefined, meaningless, or ill-formed formula. That is, if Y doesn’t
    refer to a set, you cannot say whether the statement is TRUE or FALSE. On the
    other hand, both X and Y could refer to sets, because sets may contain sets as
    elements. Check out the following three examples:


    7451CH02.qxd 5/4/07 2:12 PM Page 26


    **26**


    C H A P T E R 2 **■** S E T T H E O RY: I N T R O D U C T I O N


    3∈5 is neither TRUE nor FALSE; it is a *meaningless* expression 1∈{1,2} is TRUE
    and 2∈{1,2} is TRUE


    {1,2}∈{1,2} is FALSE


    {1,2}∈{{1,2},3} is TRUE


    To clarify the last example being a TRUE proposition, let’s give the set at the
    right-hand side a name:


    S := {{1,2},3}


    Then set S contains two elements: the first element is set {1,2} and the other
    element is the numeric value 3\. Therefore, the statement {1,2}∈{{1,2},3} is a
    TRUE proposition.


    **Methods to Specify Sets**


    So far, you have already seen several examples of sets; with the exception of
    sets **Z** and **N**, they all used the *enumerative* method to specify their
    elements, listing all their elements as a comma-separated list enclosed in braces.
    The other methods we’ll discuss in this section are based on a given set and use
    predicates to derive new sets.


    **Enumerative Method**


    Enumeration (literally, to name one by one) is by far the simplest set specification
    method; you list all elements of a set between braces (also known as accolades)
    separated by commas.


    See Listing 2-1 for some examples.


    **Listing 2-1.** *Enumerative Set Specification Examples* E1 := {1,3,5,7,9}


    E2 := {''a'',2,''c'',4}


    E3 := {8,6,{8,6}}


    Note that in mathematics, elements of the same set don’t need to be of the same
    type; for example, set E2 in Listing 2-1 contains a mixture of numbers and characters.


    Note also that the order in which you specify the elements of a set is irrelevant;
    moreover, repeating the same element more than once is not forbidden but meaningless.
    Therefore, the following three sets are equal:


    {1,2} = {2,1} = {1,2,1}


    The disadvantage of the enumerative method to specify sets becomes obvious as
    soon as the number of elements of the set increases; it takes a lot of time to
    write them all down, and the expressions become too long.


    **Predicative Method**


    For a large set, an alternative way to specify the set is the *predicative* method.
    Let S be a given set (for instance the set of natural numbers), and let P(x) be
    a given predicate with exactly one


    7451CH02.qxd 5/4/07 2:12 PM Page 27


    C H A P T E R 2 **■** S E T T H E O RY: I N T R O D U C T I O N


    **27**


    parameter named x *of type* S (that is, the elements in S constitute the values
    that parameter x is allowed to take). Then, the following definition of a set,
    called E4, is a valid one: E4 := { x∈S | P(x) }


    This method also uses braces to enclose the set specification (just like the enumerative
    method) but now you specify a vertical bar symbol (|) somewhere between the braces.
    This vertical bar should be read as “. . . *such that* . . .” or “. . . *for which
    the following is true:* . . .”


    At the right-hand side of the vertical bar you specify a *predicate*, and at the
    left-hand side you specify a *set* from which to choose values for the parameter
    involved in the predicate. The preceding syntax should be read as follows: “The
    set E4 consists of all elements x of S for which the predicate P(x) becomes TRUE.”


    See Listing 2-2 for some examples of using this method (assume EMP represents
    some set containing “employee records,” loosely speaking). The first example uses
    the mod (modulo) function, which might be unfamiliar for you; it returns the remainder
    of division of the first argument by the second argument.


    **Listing 2-2.** *Predicative Set Specification Examples* E5 := { x∈**Z** | mod(x,2)
    = 0 ∧ x2 ≤ 169}


    E6 := { e∈EMP | e(JOB) = ''SALESREP''}


    Set E5 has as its elements all even integers (zero remains after division by two)
    whose quadratic is less than or equal to 169\. Set E6 has as its elements all
    employee records whose JOB value equals ''SALESREP''.


    **Substitutive Method**


    The third method to specify sets is the *substitutive* method. See Listing 2-3
    for some examples of using this method.


    **Listing 2-3.** *Substitutive Set Specification Examples* E7 := { x2 – 1 | x∈**N**
    }


    E8 := { (e(HIRED)–e(BORN)) | e∈EMP }


    The preceding specification for set E7 should be read as follows: “The set E7
    consists of all x2 – 1 values where x is an element of **N**.” In general, the
    left-hand side of both set specifications (E7 and E8) now contains an *expression*;
    the right-hand side after the vertical bar tells you from which set you must choose
    the values for x to substitute in that expression.


    **Hybrid Method**


    Optionally, the right-hand side can be followed by a predicate that has x as a
    parameter. This enables you to specify set E4 also, as follows:


    E4 := { x | x∈S ∧ P(x) }


    The left-hand side now contains just x, instead of some expression using x. Often
    it is convenient to use a hybrid combination of the predicative and the substitutive
    method for a set specification. Take a look at the example in Listing 2-4.


    7451CH02.qxd 5/4/07 2:12 PM Page 28


    **28**


    C H A P T E R 2 **■** S E T T H E O RY: I N T R O D U C T I O N


    **Listing 2-4.** *Hybrid Set Specification Example*


    E9 := { x2 – 1 | x∈**N** ∧ mod(x,3) = 1 }


    Formally, this is a contraction of the following specification of set E9 consisting
    of two steps, using an intermediate set definition T1:


    T1 := { x∈**N** | mod(x,3) = 1 } (Using the predicative method first) E9 := {
    x2 – 1 | x∈T1 } (Followed by the substitutive method) Of course, we don’t formally
    split up set definitions like this. The predicative, substitutive, and hybrid
    methods all have in common that they allow you to use a *given set* and *predicates*
    in cases where using the enumerative method would become too labor intensive.
    For every set you want to specify, you just select the most appropriate specification
    method. In this book, the hybrid method will be the main method used to specify
    large sets.


