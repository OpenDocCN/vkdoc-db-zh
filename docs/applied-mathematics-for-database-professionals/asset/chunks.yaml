    ## Union of a Set of Sets


    Before we discuss the concept of partitions in the next section, we first introduce
    a slightly more convenient flavor of the union operator. Although the union operator
    is *dyadic* (that is, it accepts two operands), it often occurs that you want
    to “union” several sets, not just two; for example:


    `A1 ∪ A2 ∪ A3 ∪ ... ∪ An`


    To save a lot of typing (repeating the union symbol each time), we introduce a
    special *monadic* notation (accepting only one operand) for the union operator,
    as shown in Definition 2-8.


    ### ■Definition 2-8: Monadic Union Operator


    If `A` is a set consisting of sets, then


    `∪A := { x | x is an element of some element of A }.`


    You see what this definition does? The result of the union `∪A` contains all elements
    `x` that occur in some set, say `Ai`, which is an element of `A`. Remember, for
    this definition to be valid, every element of set `A` must be a set.


    If you look at the following examples, you’ll see that this “union of a set of
    sets” is indeed a more powerful and generic union operator than the dyadic one
    we used so far, because now you can produce the union of any number of sets with
    a convenient shorthand notation. In these examples, `S` and `T` represent a set:


    `∪{S} = S`


    `∪{S,T} = S∪T`


    `∪∅ = ∅`


    `∪℘S = S`


