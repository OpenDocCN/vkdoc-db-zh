  trans: '

    尽管存在“不存在”的限制，但考虑到表全域 `tab_GRD` 定义中指定的最后一个表约束（见清单 7-31），事务 `ETX7` 仍然很可能失败。事实上，只有当最低薪资等级（及其零个或多个直接后继）或最高薪资等级（及其零个或多个直接前驱）是唯一被删除的等级时，它才能成功执行。在所有其他情况下，该表约束将被违反，从而导致事务回滚。


    本章末尾有一个练习，要求你指定一个修复此类违规的 `UPDATE` 语句。


    ## 章节总结


    本节以项目符号列表的形式总结了本章内容。在继续下一节的练习之前，你可以用它来检查自己对本章引入的各种概念的理解。


    -   你可以将事务形式化地指定为数据库全域上的一个函数。对于每个数据库状态，这个函数返回另一个数据库状态，该状态反映了事务预期的修改。

    -   你可以结合第 1 部分介绍的集合论与逻辑，以及第 2 部分介绍的各种表运算符，来指定这个函数。

    -   事务起始于一个有效的数据库状态，并且应该始终结束于一个有效的数据库状态；它们必须使数据库处于符合所有约束的状态。

    -   每个事务实际上都是一个事务 *尝试*。当结果的数据库状态不符合所有静态约束，或者状态转换未被状态转换全域涵盖时，DBMS 应确保事务被回滚。

    -   在 SQL 中，事务被实现为一个或多个数据操作语言（DML）语句，这些语句按你决定的顺序依次执行。

    -   你不能随意选择这些 DML 语句的顺序。后续的 DML 语句查询的是已修改的（中间）数据库状态；先前在事务中执行的 DML 语句所做的修改会由 SQL
    DBMS 对它们可见。

    -   有时，中间数据库状态会违反一个或多个数据完整性约束。这种情况是不希望出现的，因为针对此类数据库状态执行的查询可能会给出错误的结果。

    -   语义优化的（子）查询在此类情况下产生错误结果的风险尤其高。


    ### 练习


    **1.** 列出事务 `ETX1` 涉及的所有数据完整性约束。并讨论为使事务 `ETX1` 成功执行，起始状态应具备的属性。


    **2.** 事务 `ETX2` 可能违反约束 `PODC4`；如果删除学生 3124 的一门注册导致某个 *已确认* 开课项的注册人数低于六人，则违反了此约束。请修改
    `ETX2` 的规范（形式化和 SQL），使得在尽可能多地删除学生 3124 的注册的同时，不违反约束 `PODC4`。


    **3.** 确定事务 `ETX4` 的 SQL `UPDATE` 语句可能违反的静态数据完整性约束。


    **4.** 假设事务 `ETX7` 创建了一个确实违反所讨论表约束的数据库状态。选择一种策略，通过更新剩余的薪资等级来修复此问题。形式化地指定你的策略，并为其提供一个
    SQL `UPDATE` 语句。


    **5.** 形式化地并用 SQL 指定以下事务：将部门 40 中所有管理员的月薪提高 5%。如果更新需要修改薪资等级，则也修改薪资等级。


    **6.** 形式化地并用 SQL 指定以下事务：删除所有五年前已离职员工的数据。此事务会遇到哪些与约束相关的问题？


    # 在 Oracle 中实现数据库设计


    至此，本书的主要焦点一直放在形式化地指定数据库设计上。当然，你想要做的不仅仅是指定一个数据库设计；你通常希望使用某个 DBMS 来 *实现* 它。在本章中，我们将注意力转向实现数据库设计。


    鉴于两位作者的背景，本章特别关注在 Oracle 的 SQL DBMS 中实现数据库设计。我们假设你熟悉 PL/SQL 语言——Oracle 的过程化编程语言。我们假设诸如数据库触发器、包、过程和函数等概念都是已知的。


    **注意：** 如果你在本章中遇到任何不熟悉的 PL/SQL 概念，我们建议你参考网上可用的标准 Oracle 文档 (http://tahiti.oracle.com)。


    这将是一章不那么形式化的章节。在指代 SQL 构造时，我们将使用 SQL 术语（如 *行* 和 *列*）。在指代本书引入的形式化概念时，我们仍将使用形式化术语。


    前几节（到“实现数据完整性代码”一节为止）确立了有关在数据库之上实现业务应用的一些概念。你还将看到，存在三种截然不同的策略来实现数据完整性约束。


    接下来的章节涉及实现表结构、属性约束和元组约束（直到“实现元组约束”一节）。


    “表约束实现问题”一节是一个相当大的部分。它介绍了在实现多元组约束（即表或数据库约束）时所面临的挑战。本节很大一部分将探讨各种约束验证执行模型。这些执行模型范围从效率较低的模型到更复杂（高效）的模型。


    “实现表约束”和“实现数据库约束”两节分别涵盖使用“表约束实现问题”一节中引入的一种执行模型来实现表约束和数据库约束。接着探讨了转换约束的实现（“实现转换约束”一节）。


    “引入延迟检查”一节涉及延迟约束验证——鉴于你在 SQL DBMS 中实现数据库设计，这是一个无法避免的棘手现象。


    在本章末尾，我们将向你介绍 `RuleGen` 框架：这是一个可以帮助你在 Oracle 的 SQL DBMS 中实现数据完整性约束的框架，它应用了本章通篇解释的许多概念。


    本章没有“练习”部分。


    如果你熟悉不同的 SQL DBMS，那么本章讨论的大部分概念可能也适用。不过，鉴于我们的背景，我们不能完全确定。涉及事务序列化的讨论很可能是 Oracle
    特有的。当然，实际的代码示例在其他 SQL DBMS 中必须以不同的方式完成。

