    **第 7 章** **指定数据库设计**


    ## 章节摘要


    本节提供了本章的摘要，以项目符号列表格式呈现。它提供了本章所讨论内容的高级概述。


    *   数据库设计通常使用自然语言进行记录。这些设计文档的主要部分由约束规范组成，这些约束将确保数据库设计能满意地适配现实世界。

    *   如果你使用纯英文来表达数据完整性约束，你将不可避免地遇到英文句子如何明确无误地映射到表结构的问题。

    *   你可以使用集合论以分层（分阶段）的方式形式化地规范数据库设计。通过形式化你的数据库设计规范，你将消除所有歧义——尤其是围绕约束的歧义。

    *   在第一阶段，你为每个表结构指定一个集合函数。该集合函数引入表结构的属性名，并将相关的属性值集附加到每个属性上。这些集合函数被称为 `特征化`。

    *   在第二阶段，你为每个表结构指定一组称为 `元组宇宙` 的元组。它保存该表结构可接受的元组。你可以通过获取一个特征化的广义积，并通过指定元组谓词来限制此结果，从而构造一个元组宇宙。这些元组谓词被称为
    `元组约束`。

    *   在第三阶段，你为每个表结构指定一组称为 `表宇宙` 的表。它保存该表结构可接受的表。你可以通过获取元组宇宙的幂集，并通过指定表谓词来限制此结果，从而构造一个表宇宙。这些表谓词被称为
    `表约束`。

    *   在最后阶段，你指定一组称为 `数据库宇宙` 的数据库状态。它保存被规范数据库的可接受数据库状态。你可以通过首先定义一个 `数据库特征化` 来构造数据库宇宙。数据库特征化将所有表宇宙排列成一个单一的集合函数。你可以通过获取数据库特征化的广义积，并通过指定数据库谓词来限制此结果，从而构造数据库宇宙。这些数据库谓词被称为
    `数据库约束`。

