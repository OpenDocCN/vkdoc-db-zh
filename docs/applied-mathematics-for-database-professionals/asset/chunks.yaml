    ## Listing 9-9. Query EXQ9(dbs)


    ### FEa:


    ```

    { e↓{EMPNO,ENAME} | e∈dbs(EMP) ∧


    { o(COURSE) | o∈dbs(OFFR) ∧ o(TRAINER)=1206 ∧


    o(STATUS)=''CONF'' ∧ to_year(o(STARTS))=2003 }


    ⊆


    { r(COURSE) | r∈dbs(REG)⊗dbs(OFFR) ∧


    r(STUD)=e(EMPNO) ∧ r(TRAINER)=1206 ∧


    r(STATUS)=''CONF'' ∧ to_year(r(STARTS))=2003 }


    }

    ```


    ### FEb:


    ```

    { e↓{EMPNO,ENAME} | e∈dbs(EMP) ∧


    (∀o1∈{ o2↓{COURSE} | o2∈dbs(OFFR) ∧ o2(TRAINER)=1206 ∧


    o2(STATUS)=''CONF'' ∧ to_year(o2(STARTS))=2003 }:


    (∃r∈dbs(REG)⊗dbs(OFFR): r(COURSE)=o1(COURSE) ∧


    r(STUD)=e(EMPNO) ∧ r(TRAINER)=1206 ∧


    r(STATUS)=''CONF'' ∧ to_year(r(STARTS))=2003))


    }

    ```


    ### SEI:


    ```sql

    select e.EMPNO,e.ENAME

    from EMP e

    where 0 = (select count(*)

    from (select o1.COURSE

    from OFFR o1

    where o1.TRAINER = 1206

    and o1.STATUS = ''CONF''

    and to_char(o1.STARTS,''YYYY'') = ''2003''

    minus

    select o2.COURSE

    from OFFR o2

    ,REG r

    where o2.COURSE = r.COURSE

    and o2.STARTS = r.STARTS

    and r.STUD = e.EMPNO

    and o2.TRAINER = 1206

    and o2.STATUS = ''CONF''

    and to_char(o2.STARTS,''YYYY'') = ''2003''))

    ```


    ### SEII:


    ```sql

    select e.EMPNO,e.ENAME

    from EMP e

    where not exists(select o1.*

    from (select o.COURSE

    from OFFR o

    where o.TRAINER = 1206

    and o.STATUS = ''CONF''

    and to_char(o.STARTS,''YYYY'') = ''2003'') o1

    where not exists(select r.*

    from REG r

    ,OFFR o2

    where r.COURSE = o2.COURSE

    and r.STARTS = o2.STARTS

    and r.STUD = e.EMPNO

    and o2.STATUS = ''CONF''

    and to_char(r.STARTS,''YYYY'') = ''2003''

    and r.TRAINER = 1206

    and r.COURSE = o1.COURSE))

    ```


    Formal specification `FEa` queries all employees for which the set of distinct
    courses given by De Haan in 2003 is a subset of the set of courses for which an
    offering (taught by De Haan) was attended by the employee in 2003. Note that for
    an employee to have attended a course offering, the following must be true:


    1. He or she must be registered for that offering.

    2. That offering must have status confirmed.


    Specification `FEb` is a rewrite of the subset operator in `FEa` into quantifiers
    that follow from the definition of the subset operator. Set `A` is a subset of
    `B` if and only if every element of `A` is an element of `B`.


    ```

    (A ⊆ B) ⇔ (∀a∈A: ∃b∈B: b=a)

    ```


    The rewrite rule that we have applied is slightly more sophisticated; it is of
    the following structure:


    ```

    { a | a∈A ∧ P(a) } ⊆ { b | b∈B ∧ Q(b) }


    ⇔


    (∀a1∈{ a2 | a2∈A ∧ P(a2) }: (∃b∈B: b=a1 ∧ Q(b)))

    ```


    SQL does not support all set operators: `union`, `intersection`, and `difference`
    are available; `symmetric difference` is not, nor is the `subset of` operator.
    Fortunately, you can rewrite the subset operator using other available set operators:


    ```

    (A ⊆ B) ⇔ ((A − B) = ∅)

    ```


    Set `A` is a subset of `B` if and only if the difference `A` minus `B` represents
    the empty set. To check for an empty set in SQL, you would have to apply one more
    rewrite rule: `((A − B) = ∅) ⇔ (#(A − B) = 0)`


    Instead of checking that `A` minus `B` represents the empty set, you now check
    that the cardinality of `A` minus `B` equals zero. The preceding rewrite rules
    were applied to `FEa` to end up with SQL expression `SEI`.


    Alternative `SEII` represents the SQL version for the formal version where the
    subset operator was rewritten into quantifiers (`FEb`). Note that (again) the
    universal quantifier had to be further rewritten into an existential quantifier.


    Listing 9-10 gives courses (`CODE` and `DESCR`) for which all offerings (and there
    must be at least one) in 2006 were given by only one trainer, and for which none
    of these offerings was attended by another trainer.


    ## Listing 9-10. Query EXQ10(dbs)


    ### FEa:


    ```

    { c↓{CODE,DESCR}

    | c∈dbs(CRS) ∧ /* there is one trainer for all offerings of this course */


    (∃e∈dbs(EMP):


    (∀o∈dbs(OFFR): (o(COURSE)=c(CODE) ∧ o(STATUS)=''CONF'' ∧


    to_year(o(STARTS))=2006) ⇒


    o(TRAINER)=e(EMPNO) )


    ∧ /* course was offered in 2006 */


    (∃o∈dbs(OFFR): o(COURSE)=c(CODE) ∧ o(STATUS)=''CONF'' ∧


    to_year(o(STARTS))=2006)


    ∧ /* none of the offerings was attended by another trainer */


    ¬(∃r∈dbs(REG)⊗


    (dbs(EMP)◊◊{(STUD;EMPNO),(JOB;JOB)})⊗dbs(OFFR):


    r(COURSE)=c(CODE) ∧ r(STATUS)=''CONF'' ∧

    ```'
