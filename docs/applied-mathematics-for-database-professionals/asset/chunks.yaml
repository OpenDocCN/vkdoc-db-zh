    **a.** TRUE.\n**b.** TRUE.\n**f.** TRUE.\n7451AppE.qxd 5/15/07 1:43 PM Page 353\n\
    \nA P P E N D I X E **■** A N S W E R S TO S E L E C T E D E X E R C I S E S\n\
    \n**353**\n\n**g.** FALSE.\n**n.** There are ten distinct subsets of `S` that\
    \ have two elements. You can construct these subsets as follows. Pick a first\
    \ element from `S`. You have five possible choices for this.\nThen pick a second\
    \ element from `S`, excluding the first-picked element. You have four possible\
    \ choices for this. This gives a total of five times four, which equals twenty\
    \ choices of two elements from `S`. However, because the order of the choices\
