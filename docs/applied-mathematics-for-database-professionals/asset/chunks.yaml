    **State Transition Constraints**


    In this section we’ll introduce you to the concept of a *state transition universe*.
    The state transition constraints will be specified as embedded state transition
    predicates in the formal definition of a state transition universe.


    **State Transition Universe**


    To formally specify the state transition constraints for a database design, we’ll
    specify the *set of* *all admissible transactions* for the database design. You
    can model a transaction as an ordered pair of its begin and end states; the first
    coordinate in the ordered pair represents the begin state, and the second coordinate
    of the ordered pair represents the end state.


    You can then specify the *set of all admissible transactions* as a set of such
    ordered pairs.'
  trans: "\n现在让我们来研究如何形式化地规定一名员工的薪资不允许降低。事务 `TX1` 违反了此状态转换要求，因为在 `E1` 中的一个员工元组（比如\
    \ `e1`）和在 `E2` 中的一个员工元组（比如 `e2`）存在一种组合，它们都涉及同一名员工——即它们在 `empno` 属性上对应——并且 `e2`\
    \ 中的 `msal` 值低于 `e1` 中的 `msal` 值。\n\n假设 `dbs1` 是事务 `TX1` 的开始状态，`dbs2` 是其结束状态。注意，这意味着表达式\
    \ `dbs1(EMP)` 的计算结果为 `E1`，表达式 `dbs2(EMP)` 的计算结果为 `E2`。看一下列表 8-1 中的命题。\n\n**列表\
    \ 8-1.** 一个关于数据库状态 `dbs1` 和 `dbs2` 的命题\n\n```\nprop1 :=\n(∀e1∈dbs1(EMP): (∀e2∈dbs2(EMP):\
    \ e1(empno) = e2(empno) ⇒ e1(msal) ≤ e2(msal) ) )\n```\n\n该命题指出，不可能存在 `E1` 中的一个元组和\
    \ `E2` 中的一个元组的组合，使得它们在 `empno` 属性上对应，并且 `E1` 元组中的 `msal` 值大于 `E2` 元组中的 `msal`\
    \ 值。这精确地反映了我们的状态转换要求。\n\n这种类型的转换约束（在属性级别上）很常见，并且可以用另一种方式来指定：将开始状态中的表与其在结束状态中的对应版本进行连接，使得所有属性值（旧的和新的）都可用，然后限制此连接结果中元组的属性值。\n\
    \n**注意** 大致来说，此类转换约束可以被视为*动态*的元组连接约束。\n\n列表 8-2 展示了一种形式化指定此要求的替代方法；它连接了开始状态 (`dbs1`)\
    \ 中的 `EMP` 表与结束状态 (`dbs2`) 中的 `EMP` 表。\n\n**列表 8-2.** 我们的状态转换要求的替代指定\n\n```\n\
    prop2 :=\n( ∀e∈((dbs1(EMP)⇓{empno,msal})◊◊{(empno;empno),(old_msal;msal)})⊗\n\
    \  ((dbs2(EMP)⇓{empno,msal})◊◊{(empno;empno),(new_msal;msal)}): e(old_msal) ≤\
    \ e(new_msal) )\n```\n\n我们现在使用连接运算符 (`⊗`) 以及表投影 (`⇓`) 和属性重命名 (`◊◊`)。在此指定中，`E1`\
    \ 和 `E2` 都首先投影到 `empno` 和 `msal` 属性上。然后，（`E1` 投影的）`msal` 属性被重命名为 `old_msal`，（`E2`\
    \ 投影的）`msal` 属性被重命名为 `new_msal`。得到的两个表现在可以用连接运算符进行连接。此连接产生的表是一个基于 `{empno,old_msal,new_msal}`\
    \ 结构的表。对于此表中的所有元组，`old_msal` 值都应小于或等于 `new_msal` 值。\n\n图 8-2 通过显示 `prop2` 内部子表达式产生的中间表和最终表，阐明了前面的解释。\n\
    \n**图 8-2.** 表达式 `prop2` 的中间表和最终表\n\n## 状态转换谓词\n\n承接第 6 章引入的*元组*、*表*和*数据库谓词*概念，我们现在通过定义*状态转换谓词*的概念，进一步扩展数据完整性谓词可以处理的数据范围。\n\
    \n状态转换谓词处理的是*一对数据库状态*。这些谓词有两个参数，类型均为数据库状态；第一个参数称为开始状态，第二个参数称为结束状态。在下一节中，我们将使用状态转换谓词来为数据库设计定义可允许的状态转换。只有那些事务，其开始和结束状态能将所有状态转换谓词转换为真命题，才被认为是有效（或可允许的）事务。\n\
    \n注意，列表 8-1 和 8-2 中的命题也处理一对数据库状态：给定的两个数据库状态 `dbs1` 和 `dbs2`。现在看一下列表 8-3 中的状态转换谓词。这些是列表\
    \ 8-1 和 8-2 中命题的“谓词版本”。\n\n**列表 8-3.** 两个状态转换谓词\n\n```\nSTP1(B,E) := ( ∀e1∈B(EMP),\
    \ e2∈E(EMP): e1(empno)=e2(empno) ⇒ e1(msal) ≤ e2(msal) )\nSTP2(B,E) := ( ∀e∈((B(EMP)⇓{empno,msal})◊◊{(empno;empno),(old_msal;msal)})⊗\n\
    \                ((E(EMP)⇓{empno,msal})◊◊{(empno;empno),(new_msal;msal)}): e(old_msal)\
    \ ≤ e(new_msal) )\n```\n\n当你分别将数据库状态 `dbs1` 和 `dbs2` 作为参数 `B` 和 `E` 的值提供时，这些状态转换谓词将转换为列表\
    \ 8-1 和 8-2 中列出的命题。\n\n```\nSTP1(dbs1,dbs2) = prop1\nSTP2(dbs1,dbs2) = prop2\n\
    ```\n\n我们要求状态转换谓词不能分解为多个合取项，就像元组谓词、表谓词和数据库谓词一样。如果你能将给定的状态转换谓词 `ST(B,E)` 重写为形式为\
    \ `STa(B,E) ∧ STb(B,E)` 的表达式，那么你实际上是在处理两个状态转换谓词。\n\n在本书的后续部分，我们还将要求状态转换谓词——比如\
    \ `ST(B,E)`——不能被重写为以下两种形式之一的谓词：`P(B)` 或 `P(E)`。在这些表达式中，`P` 代表一个数据库谓词；即一个检查单个数据库状态的谓词（在前面的情况中是\
    \ `B` 或 `E`）。这意味着我们要求一个状态转换谓词必须至少涉及开始状态中的一个表以及结束状态中的一个表。这是因为，如果谓词只涉及来自一个数据库状态（开始状态或结束状态）的表，那么该谓词将反映一个静态约束，而不是一个状态转换约束。\n\
    \n正如你将在下一节给出的示例中看到的，状态转换谓词通常涉及来自相同表结构的开始状态和结束状态的表。我们通常不会用两个类型为数据库状态的参数来指定状态转换谓词，而是会用两个或多个类型为表的参数来指定。为了说明这一点，列表\
    \ 8-4 以这种方式重新指定了列表 8-3 中的状态转换谓词。参数 `EMPB` 和 `EMPE` 的类型是表；其意图是让参数 `EMPB` 接受在事务开始时存在的员工表状态，让参数\
    \ `EMPE` 接受在事务结束时存在的员工表状态。\n\n**列表 8-4.** 状态转换谓词 `STP1` 和 `STP2` 的替代指定\n\n```\n\
    STP1(EMPB,EMPE) :=\n( ∀e1∈EMPB, e2∈EMPE: e1(empno) = e2(empno) ⇒ e1(msal) ≤ e2(msal)\
    \ )\nSTP2(EMPB,EMPE) :=\n( ∀e∈((EMPB⇓{empno,msal})◊◊{(empno;empno),(old_msal;msal)})⊗\n\
    \      ((EMPE⇓{empno,msal})◊◊{(empno;empno),(new_msal;msal)}):\n      e(old_msal)\
    \ ≤ e(new_msal) )\n```\n\n在下一节中，我们将使用状态转换谓词来形式化地指定数据库设计的状态转换约束。\n\n## 状态转换约束\n\
    \n在本节中，我们将向你介绍*状态转换全域*的概念。状态转换约束将作为嵌入式状态转换谓词，在状态转换全域的形式化定义中进行指定。\n\n### 状态转换全域\n\
    \n为了形式化地指定数据库设计的状态转换约束，我们将指定该数据库设计的*所有可允许事务的集合*。你可以将一个事务建模为其开始状态和结束状态的有序对；有序对中的第一个坐标代表开始状态，第二个坐标代表结束状态。\n\
    \n然后，你可以将*所有可允许事务的集合*指定为此类有序对的集合。\n"
- fmt: "Every ordered pair in this set is of the form `(B;E)`, where both `B` and\
    \ `E` represent a valid database state (that is, they are elements of the database\
    \ universe for the database design). This set of ordered pairs is called the *state\
    \ transition universe*. If `(B;E)` is an element of the state transition universe,\
    \ then the transaction that transforms state `B` into state `E` is allowed.\n\n\
    To illustrate this, let’s assume you need to specify a state transition universe\
    \ for some database design whose database universe only has four database states.\
    \ We’ll name these database states `s1` through `s4`. Let’s further assume that\
    \ you only allow a transaction if it implements one of the following state transitions:\n\
    \n`s1` to `s2`\n\n`s1` to `s3`\n\n`s1` to `s4`\n\n`s2` to `s3`\n\n`s2` to `s4`\n\
    \n`s3` to `s4`\n\n`s4` to `s1`\n\nIn this database design, only the preceding\
    \ seven distinct transactions are allowed. You can visualize these seven transactions\
    \ through a *directed graph* on the four database states.\n\nFigure 8-3 illustrates\
    \ this way of looking at a state transition universe.\n\n**Figure 8-3.** *Representing\
    \ a state transition universe through a directed graph*\n\n7451CH08.qxd 5/7/07\
    \ 11:21 AM Page 191\n\nC H A P T E R 8 **■** S P E C I F Y I N G S TAT E T R A\
    \ N S I T I O N C O N S T R A I N T S\n\n**191**\n\nListing 8-5 shows a set-theory\
    \ way to specify this state transition universe; every arrow in the directed graph\
    \ maps to an ordered pair.\n\n**Listing 8-5.** *State Transition Universe Containing\
    \ Seven Transactions*\n\n```\n{ (s1;s2), (s1;s3), (s1;s4)\n,(s2;s3), (s2;s4)\n\
    ,(s3;s4)\n,(s4;s1) }\n```\n\nOf course, for real-world database designs you can’t\
    \ specify a state transition universe in this enumerative way, due to the vast\
    \ amount of transactions that would need to be enumerated. You’ll have to resort\
    \ to the predicative way of specifying the set of admissible transactions.\n\n\
    You can formally specify a state transition universe for a given database design\
    \ in a predicative way by first constructing the Cartesian product of the database\
    \ universe with itself.\n\nThis Cartesian product holds every possible transition\
    \ from an admissible database state to another admissible database state (modeled\
    \ as an ordered pair).\n\n**■Note** If the database universe for a given database\
    \ design has cardinality `n`, then a total of `n*n` distinct transactions can\
    \ be identified. However, state transition constraints won’t allow all of these.\n\
    \nBy specifying state transition predicates, you can then narrow down this set\
    \ of possible transitions to a set that only holds admissible transitions. Listing\
    \ 8-6 shows the specification template for a state transition universe.\n\n**Listing\
    \ 8-6.** *State Transition Universe Specification Template*\n\n```\nSTU := { TX\
    \ | TX∈DBU×DBU ∧\nSTC1(π₁(TX),π₂(TX)) ∧ STC2(π₁(TX),π₂(TX)) ∧ ... ∧ STCn(π₁(TX),π₂(TX))\
    \ }\n```\n\nIn this template, `DBU` represents the relevant database universe\
    \ and `STC1`, `STC2`, . . . , `STCn` represent state transition predicates. Expression\
    \ `π₁(TX)` represents the begin state of `TX`, and `π₂(TX)` represents the end\
    \ state of `TX`. We say that state transition predicates `STC1` through `STCn`\
    \ are the *state transition constraints* of `STU`.\n\nAnother way of defining\
    \ state transition universe `STU` is as follows:\n\n```\n{ (B;E) | B∈DBU ∧ E∈DBU\
    \ ∧\nSTC1(B,E) ∧ STC2(B,E) ∧ ... ∧ STCn(B,E) }\n```\n\nThis set holds all ordered\
    \ pairs `(B;E)` where `B` and `E` represent admissible database states.\n\nThe\
    \ ordered pairs where states `B` and `E` satisfy all state transition constraints\
    \ represent admissible transactions.\n\n7451CH08.qxd 5/7/07 11:21 AM Page 192\n\
    \n**192**\n\nC H A P T E R 8 **■** S P E C I F Y I N G S TAT E T R A N S I T I\
    \ O N C O N S T R A I N T S\n\n## Completing the Example Database Design\n\nLet’s\
    \ now demonstrate all this by specifying state transition constraints for the\
    \ example database design that was introduced in the previous chapter. Listing\
    \ 8-7 introduces the formal specification of state transition universe `ST_UEX`.\
    \ As you can see, it builds on the `DB_UEX` database universe that was specified\
    \ in Chapter 7. The definition of `ST_UEX` introduces the state transition constraints\
    \ for our example database design. This definition specifies them by name only.\
    \ In Listing 8-8, you’ll find the formal specification for each of these named\
    \ constraints.\n\n**■Note** In Listing 8-7 we are specifying the state transition\
    \ predicates in the alternative way: as predicates with parameters of type table.\n\
    \n**Listing 8-7.** *State Transition Universe ST_UEX*\n\n```\nST_UEX := { (b;e)\
    \ | b∈DB_UEX ∧ e∈DB_UEX ∧\n                     ∧ STC1(b(EMP),e(EMP))\n      \
    \               ∧ STC2(b(OFFR),e(OFFR))\n                     ∧ STC3(b(OFFR),e(OFFR))\n\
    \                     ∧ STC4(b(HIST),e(HIST))\n                     ∧ STC5(b(HIST),b(EMP),e(HIST),e(EMP))\n\
    \                     ∧ STC6(b(REG),e(REG))\n                     ∧ STC7(b(REG),e(REG))\
    \ }\n```\n\nState transition constraint `STC1` involves the employee table structure.\
    \ Constraints `STC2` and `STC3` involve the offering table structure. Constraint\
    \ `STC4` involves the history table structure. Constraint `STC5` involves two\
    \ table structures: history and employee. Finally, constraints `STC6` and `STC7`\
    \ involve the registration table structure.\n\nListing 8-8 supplies the formal\
    \ definitions for these seven state transition constraints. You’ll find an elaboration\
    \ on each of these in the following section.\n\n**■Note** Often, state transition\
    \ constraints inspect more than just the begin and end state of a transaction.\
    \ Other data items available within the context of a transaction—and typically\
    \ offered by most DBMSes—are the current system date/time (environment variable\
    \ `sysdate`) and the username of the currently logged in user (environment variable\
    \ `user`). Requirements that need to reference any of these *transactional environment\
    \ variables* will always map to state transition constraints. Static constraints\
    \ inherently cannot reference the context of a transaction. Constraints `STC5`\
    \ and `STC7` specified in Listing 8-8 are examples of this fact; both reference\
    \ variable `sysdate`.\n\n7451CH08.qxd 5/7/07 11:21 AM Page 193\n\nC H A P T E\
    \ R 8 **■** S P E C I F Y I N G S TAT E T R A N S I T I O N C O N S T R A I N\
    \ T S\n\n**193**\n\n**Listing 8-8.** *The Seven State Transition Constraints of\
    \ ST_UEX*\n\n```\nSTC1(EMPB,EMPE) :=\n/* Monthly salary can only increase */\n\
    ( ∀e1∈EMPB, e2∈EMPE: e1(EMPNO) = e2(EMPNO) ⇒ e1(MSAL) ≤ e2(MSAL) )\n\nSTC2(OFFRB,OFFRE)\
    \ :=\n/* New offerings must start with status SCHED */\n( ∀o1∈OFFRE⇓{COURSE,STARTS}\
    \ − OFFRB⇓{COURSE,STARTS}:\n    ↵{ o2(STATUS) | o2∈OFFRE ∧ o2↓{COURSE,STARTS}\
    \ = o1↓{COURSE,STARTS} }\n    = 'SCHD' )\n\nSTC3(OFFRB,OFFRE) :=\n/* Valid offering\
    \ status transitions are: */\n/* SCH -> CONF, SCH -> CANC, CONF -> CANC */\n(\
    \ ∀o1∈OFFRB, o2∈OFFRE:\n    (o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∧ o1(STATUS)\
    \ ≠ o2(STATUS))\n    ⇒\n    (o1(STATUS);o2(STATUS)) ∈\n    { ('SCHD';'CONF'),\
    \ ('SCHD';'CANC'), ('CONF';'CANC') } )\n\nSTC4(HISTB,HISTE) :=\n/* No updates\
    \ allowed to history records */\n( ∀h1∈HISTB, h2∈HISTE:\n    h1↓{EMPNO,UNTIL}\
    \ = h2↓{EMPNO,UNTIL}\n    ⇒\n    ( h1(DEPTNO) = h2(DEPTNO) ∧ h1(MSAL) = h2(MSAL)\
    \ ) )\n\nSTC5(HISTB,EMPB,HISTE,EMPE) :=\n/* New history records must accurately\
    \ reflect employee updates */\n( ∀h∈(HISTE⇓{EMPNO,UNTIL} − HISTB⇓{EMPNO,UNTIL})⊗HISTE:\n\
    \    h(UNTIL) = sysdate ∧\n    ( ∃e1∈EMPB, e2∈EMPE:\n        e1↓{EMPNO,MSAL,DEPTNO}\
    \ = h↓{EMPNO,MSAL,DEPTNO} ∧\n        e2(EMPNO) = h(EMPNO) ∧\n        ( e2(MSAL)\
    \ ≠ e1(MSAL) ∨ e2(DEPTNO) ≠ e1(DEPTNO) ) ) )\n\nSTC6(REGB,REGE) :=\n/* New registration\
    \ tuples must start with EVAL = -1 */\n( ∀r1∈(REGE⇓{STUD,STARTS} − REGB⇓{STUD,STARTS})⊗REGE:\
    \ r1(EVAL) = -1 )\n\nSTC7(REGB,REGE) :=\n/* Transitions for evaluation must be\
    \ valid */\n/* and cannot occur before start date of offering */\n( ∀r1∈REGB,\
    \ r2∈REGE:\n    (r1↓{STUD,STARTS} = r2↓{STUD,STARTS} ∧ r1(EVAL) ≠ r2(EVAL))\n\
    \    ⇒\n    ( ( r1(EVAL) = -1 ∧ r2(EVAL) = 0 ∧ r2(STARTS) ≤ sysdate ) ∨\n    \
    \  ( r1(EVAL) = 0 ∧ r2(EVAL) ∈ {1,2,3,4,5} ) ) )\n```"
