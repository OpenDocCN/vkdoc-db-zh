    fail, given the last table constraint specified in the definition of table universe
    `tab_GRD` (see Listing 7-31). In fact, it would only successfully execute when
    either the lowest (and zero or more of its direct successors), or the highest
    (and zero or more of its direct predecessors) salary grades are the only ones
    that are deleted. In all other cases, the table constraint would be violated and
    thus the transaction rolled back.


    There is an exercise at the end of this chapter for you to specify an `UPDATE`
    statement that fixes such a violation.


    ## Chapter Summary


    This section provides a summary of this chapter, formatted as a bulleted list.
    You can use it to check your understanding of the various concepts introduced
    in this chapter before continuing with the exercises in the next section.


    - You can formally specify a transaction as a function over a database universe.
    For every database state, this function returns another database state that reflects
    the modifications intended by the transaction.

    - You can specify this function using the set theory and logic introduced in Part
    1 in conjunction with the various table operators introduced in Part 2.

    - Transactions start out in a valid database state and they should always end
    up in a valid database state; they must leave the database in a state that conforms
    to all constraints.

    - Every transaction is in fact a transaction *attempt*. The DBMS should ensure
    that a transaction is rolled back when the resulting database state does not conform
    to all static constraints, or when the state transition is not covered by the
    state transition universe.

    - In SQL a transaction is implemented as one or more data manipulation language
    (DML) statements that execute serially, one after the other, in an order determined
    by you.

    - You cannot choose the order of these DML statements arbitrarily. Subsequent
    DML statements query a modified (intermediate) database state; the modifications
    of prior DML statements executed in the transaction are made visible to them by
    the SQL DBMS.

    - Sometimes the intermediate database state is in violation of one or more data
    integrity constraints. Such a situation is undesirable, because queries executed
    against such a database state might deliver wrong results.

    - Semantically optimized (sub) queries run a particularly high risk of producing
    false results in these circumstances.


    ### Exercises


    **1.** List all involved data integrity constraints for transaction `ETX1`. Also
    discuss the properties that the begin state should have for transaction `ETX1`
    to execute successfully.


    **2.** Transaction `ETX2` might violate constraint `PODC4`; if the removal of
    a registration for student 3124 brings the number of registrations for a *confirmed*
    offering below six, then this constraint is violated. Amend the specification
    (both formal and SQL) for `ETX2`, such that as many as possible registrations
    for student 3124 are deleted, without violating constraint `PODC4`.


    **3.** Determine the static data integrity constraints that might get violated
    by the SQL `UPDATE` statement of transaction `ETX4`.


    **4.** Suppose transaction `ETX7` creates a database state that indeed violates
    the discussed table constraint. Choose a strategy to fix this by updating the
    remaining salary grades. Formally specify your strategy and supply an SQL `UPDATE`
    statement for it.


    **5.** Specify, both formally and with SQL, the following transaction: increase
    the monthly salary of all administrators working in department 40 by 5 percent.
    If the update requires the modification of the salary grade, then modify the salary
    grade too.


    **6.** Specify, both formally and with SQL, the following transaction: remove
    all data of employees who have been terminated more than five years ago. What
    issues with regards to constraints will this transaction encounter?


    # Implementing Database Designs in Oracle


    Thus far this book’s main focus has been on formally specifying a database design.
    Of course, you want to do more than just specify a database design; you usually
    would like to *implement* it using some DBMS. In this chapter we turn our attention
    towards implementing a database design.


    Given the background of both authors, this chapter focuses specifically on implementing
    a database design in Oracle’s SQL DBMS. We’ll assume you’re familiar with the
    PL/SQL language—Oracle’s procedural programming language. We assume concepts such
    as database triggers, packages, procedures, and functions are known concepts.


    **Note:** We refer you to the standard Oracle documentation available on the Internet
    (http://tahiti.oracle.com) if you are unfamiliar with any of the PL/SQL concepts
    that you’ll encounter in this chapter.


    This will be a less formal chapter. We’ll use SQL terminology (such as *row* and
    *column*) when referring to SQL constructs. We’ll still use formal terminology
    when referring to the formal concepts introduced in this book.


    The first few sections (through the section “Implementing Data Integrity Code”)
    establish some concepts with regards to implementing business applications on
    top of a database. You’ll also see that three distinctly different strategies
    exist to implement data integrity constraints.


    Sections then follow that deal with implementing table structures, attribute constraints,
    and tuple constraints (through the section “Implementing Tuple Constraints”).


    The section “Table Constraint Implementation Issues” is a rather large section.
    It introduces the challenges that you’re faced with when implementing multi-tuple
    constraints (that is, table or database constraints). A big chunk of this section
    will explore various constraint validation execution models. These execution models
    range from rather inefficient ones to more sophisticated (efficient) ones.


    The sections “Implementing Table Constraints” and “Implementing Database Constraints”
    cover the implementation of table and database constraints, respectively, using
    one of the execution models introduced in the section “Table Constraint Implementation
    Issues.” This is followed by an exploration of the implementation of transition
    constraints (the section “Implementing Transition Constraints”).


    The section “Bringing Deferred Checking into the Picture” deals with deferring
    the validation of constraints—a nasty phenomenon that cannot be avoided given
    that you implement a database design in an SQL DBMS.


    At the end of this chapter we introduce you to the `RuleGen` framework: a framework
    that can help you implement data integrity constraints in Oracle’s SQL DBMS, and
    that applies many of the concepts explained throughout this chapter.


    This chapter does not have an “Exercises” section.


    If you’re familiar with a different SQL DBMS, then most of the concepts discussed
    in this chapter will probably also apply. We can’t be sure though, given our background.
    The discussion that involves serializing transactions is likely Oracle specific.
    Of course, the actual code examples will have to be done differently given another
    SQL DBMS.'
