    **272**


    C H A P T E R 1 1 **■** I M P L E M E N T I N G D ATA B A S E D E S I G N S I
    N O R A C L E


    The SQL standard allows you to specify these columns in update triggers. The update
    trigger will then only fire if one of the involved columns has been changed. Here
    is how you would code the after statement update trigger in Oracle (see Listing
    11-31).


    **Listing 11-31.** *EM3’s More Efficient Update Trigger for Constraint EMP_TAB03*


    create trigger EMP_AUS_TAB03


    after update of DEPTNO,JOB on EMP


    declare pl_dummy varchar(40);


    begin


    --


    select ''Constraint EMP_TAB03 is satisfied'' into pl_dummy


    from DUAL


    where not exists(select d.DEPTNO


    from EMP d


    where exists(select e2.*


    from EMP e2


    where e2.DEPTNO = d.DEPTNO


    and e2.JOB in (''PRESIDENT'',''MANAGER''))


    and not exists(select e3.*


    from EMP e3


    where e3.DEPTNO = d.DEPTNO


    and e3.JOB = ''ADMIN''));


    --


    exception when no_data_found then


    --


    raise_application_error(-20999,''Constraint EMP_TAB03 is violated.'');


    --


    end;


    /


    The second line in Listing 11-31 specifies the involved columns.


    **■Note** As was the case with EM2, a DBMS vendor can also easily support this
    execution model declaratively. The extra work the DBMS needs to do for EM3, compared
    to EM2, is to parse all constraints. It does this not only to determine the table
    structure(s) that are involved for EM2, but also to determine per table structure
    what the involved attribute(s) are. The DBMS can then implement the more sophisticated
    update trigger automatically.


    Listing 11-32 displays the optimized DI code for constraint DEPT_TAB01 in the
    case of UPDATE statement execution (note that only the MGR attribute is involved
    in this constraint).


