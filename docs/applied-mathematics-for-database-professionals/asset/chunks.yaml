    请解释这两个表达式之间的区别。\n\n## 元组、表与数据库谓词\n\n本章将介绍元组谓词、表谓词和数据库谓词的概念（使用在第一章中建立的谓词含义）。你可以使用元组谓词、表谓词和数据库谓词来描述数据库设计的数据完整性约束。本章的目标是建立这三类不同的谓词——我们将其统称为数据完整性谓词——并为每一类谓词提供充足的示例。\n\
    \n> **注意：** 我们在本章介绍数据完整性谓词，并展示它们对于某个特定论元（值）成立。当然，我们并不关心这种附带属性（一个谓词对于一个给定值是否为真）；它们应该对值空间成立（也就是说，它们应该构成一种结构性属性）。这一点将在第七章进一步阐述。\n\
