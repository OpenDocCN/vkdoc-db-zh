    This methodology of formally defining the data type of a database variable was
    developed by the Dutch mathematician Bert De Brock together with Frans Remmen
    in the 1980s, and is an elegant method of accurately defining a database design,
    including all relevant data integrity constraints. The references *De grondslagen
    van semantische databases* (Academic Service, 1990, in Dutch) and *Foundations
    of Semantic Databases* (Prentice Hall, 1995) are books written by Bert De Brock
    in which he introduces this methodology.


    **Classification Schema for Constraints**


    In this bottom-up solid construction of a database universe, you explicitly only
    allow sets of admissible values at each of the levels described earlier. This
    means that at each level these sets must satisfy certain data integrity constraints.
    The constraints specify which sets are valid ones; they condition the contents
    of the sets. This leads straightforwardly to four classes of data integrity constraints:


    • *Attribute constraints*: In fact, these are the attribute value sets that you
    specify in a characterization. You can argue whether the term “constraint” is
    appropriate here. A characterization simply specifies the attribute value set
    for every attribute (without further *constraining* the elements in it). However,
    the attribute value set does *constrain* the values allowed for the attribute.


    **■Note** We’ll revisit this matter in Chapter 11 when the attribute value sets
    are implemented in an SQL


    database management system.


    • *Tuple constraints*: These are the *tuple predicates* that you specify inside
    the definition of a tuple universe. The tuple predicates constrain combinations
    of values of different attributes within a tuple. Sometimes these constraints
    are referred to as *inter-attribute* *constraints*. You can specify them without
    referring to other tuples. For instance, here’s a constraint between attributes
    Job and Salary of an EMP (employee) table structure:


    “Employees with job President earn a monthly salary greater than 10000 dollars.”


    • *Table constraints*: These are *table predicates* that you specify inside the
    definition of a table universe. The table predicates constrain combinations of
    different tuples within the same table. Sometimes these constraints are referred
    to as *inter-tuple constraints*.


    You can specify them without referring to other tables. For instance: “No employee
    can earn a higher monthly salary than his/her manager” (here we assume the presence
    of a Manager attribute in the EMP table structure that references the employee’s
    manager).


    7451CH07.qxd 5/15/07 9:43 AM Page 143


    C H A P T E R 7 **■** S P E C I F Y I N G D ATA B A S E D E S I G N S


    **143**


    • *Database constraints*: These are database predicates that you specify inside
    the definition of a database universe. The database predicates constrain combinations
    of tables for different table structures. Sometimes these constraints are referred
    to as inter-table constraints. You can only specify them while referring to different
    table structures.


    For instance, there’s the omnipresent database constraint between the EMP and
    DEPT


    table structures: each employee must work for a known department.


    These four classes of constraints accept or reject a given database state. They
    condition database states and are often referred to as *static* (or *state*) *constraints*;
    they can be checked within the context of a (static) database state. In actuality
    there is one more constraint class.


    This is the class of constraints that limit database state *transitions* (on grounds
    other than the static constraints). Predicates specifically conditioning database
    state transitions are referred to as *dynamic* (or *state transition*) *constraints*.
    We’ll cover these separately in Chapter 8.


    Because the preceding classification scheme is driven by the *scope of data* that
    a constraint deals with, it has the advantage of being closely related to implementation
    issues of constraints. When you implement a database design in an SQL DBMS, you’ll
    be confronted with these issues, given the poor declarative support for data integrity
    constraints in these systems. This lack of support puts the burden upon you to
    develop often complex code that enforces the constraints. Chapter 11 will investigate
    these implementation challenges of data integrity constraints using the classification
    introduced here.


    **Specifying the Example Database Design**


    We’ll demonstrate the application of the theory presented in Part 1 of this book
    through an elaborate treatment of a database design that consists of ten table
    structures.'
  trans: '


    在任何给定时间点，数据库本质上都是表的集合。我们的数据库，或者更准确地说，我们的数据库变量，保存着数据库的当前状态。随着时间的推移，会发生事务，并为数据库变量分配新的数据库状态。我们需要为数据库变量指定所有`admissible
    database states`的集合。这个集合被称为`database universe`，实际上定义了数据库变量的数据类型。自上而下地看，对于一个涉及
    n 个表结构的给定数据库设计，你可以观察到以下内容：


    • 每个数据库状态都是一个可接受的 n 个表的集合（每个表结构一个），其中


    • 每个表都是一个可接受的元组集合，其中


    • 每个元组都是一个可接受的属性-值对集合，其中


    • 每个值都是该给定属性的可接受值。


    由于前面的所有层都是集合，你可以使用集合论从数学上定义它们全部。通过逻辑（通过添加嵌入式谓词），你可以精确定义每个层中“可接受”的含义；此时数据完整性约束就出现了。


    那么，如何以形式化的方式指定这个称为`database universe`的集合呢？这是采用与之前介绍的层级相同的自下而上方法来完成的。首先，定义你的词汇表：在数据库中，你想处理现实世界中的哪些事物及其哪些方面？换句话说，你需要哪些表结构，每个表结构具有哪些属性？这在所谓的`database
    skeleton`中形式化定义。


    对于在`database skeleton`中引入的每个属性，你接着定义可接受的属性值集合。你已经接触过这个；在此阶段，所有的`characterizations`（每个表结构一个）被定义。


    然后，你使用`characterizations`作为构建块，为每个表结构构建（定义）`set of admissible tuples`。这涉及应用广义积运算符（参见定义
    4-7）和引入元组谓词。可接受的元组集合被称为`tuple universe`。


    然后，你可以使用`tuple universes`为每个表结构构建`set of admissible tables`，这被称为`table universe`。你将在本章中看到如何做到这一点；它涉及应用幂集运算符和引入表谓词。


    在最后阶段，你使用先前定义的`table universes`定义可接受的数据库状态集合——`database universe`。


    这种形式化定义数据库变量数据类型的方法是由荷兰数学家 Bert De Brock 与 Frans Remmen 在 20 世纪 80 年代开发的，是准确定义数据库设计（包括所有相关数据完整性约束）的一种优雅方法。参考文献`De
    grondslagen van semantische databases`（Academic Service，1990，荷兰语）和`Foundations
    of Semantic Databases`（Prentice Hall，1995）是 Bert De Brock 撰写的书籍，他在其中介绍了这种方法。


    ## 约束分类模式


    在这种对`database universe`的自下而上的稳固构造中，你在前面描述的每个层级上只显式允许可接受值的集合。这意味着在每个层级上，这些集合必须满足某些数据完整性约束。约束指定了哪些集合是有效的；它们限定了集合的内容。这直接引出了四类数据完整性约束：


    • `Attribute constraints`：实际上，这些是你在一个`characterization`中指定的属性值集合。你可以争论“约束”一词在这里是否合适。`characterization`只是为每个属性指定属性值集合（而不进一步*约束*其中的元素）。然而，属性值集合确实*约束*了属性允许的值。


    **注意**：当属性值集合在 SQL 数据库管理系统中实现时，我们将在第 11 章重新讨论这个问题。


    • `Tuple constraints`：这些是你在定义`tuple universe`时指定的`tuple predicates`。`tuple predicates`约束了一个元组内不同属性值的组合。有时这些约束被称为`inter-attribute
    constraints`。你可以在不引用其他元组的情况下指定它们。例如，这里是 EMP（员工）表结构中属性 Job 和 Salary 之间的一个约束：


    “职位为 President 的员工每月工资大于 10000 美元。”


    • `Table constraints`：这些是你在定义`table universe`时指定的`table predicates`。`table predicates`约束同一表中不同元组的组合。有时这些约束被称为`inter-tuple
    constraints`。你可以在不引用其他表的情况下指定它们。例如：“没有员工的月工资能高于其经理”（这里我们假设 EMP 表结构中存在一个 Manager
    属性，引用该员工的经理）。


    • `Database constraints`：这些是你在定义`database universe`时指定的`database predicates`。`database
    predicates`约束不同表结构的表的组合。有时这些约束被称为`inter-table constraints`。你只能在引用不同表结构时指定它们。


    例如，存在 EMP 和 DEPT 表结构之间无处不在的数据库约束：每个员工必须为一个已知的部门工作。


    这四类约束接受或拒绝给定的数据库状态。它们限定数据库状态，并且通常被称为`static`或`state constraints`；它们可以在（静态）数据库状态的上下文中被检查。实际上还有一类约束。这是限制数据库状态`transitions`（基于静态约束之外的理由）的约束类别。专门限定数据库状态转换的谓词被称为`dynamic`或`state
    transition constraints`。我们将在第 8 章单独讨论这些。


    由于前面的分类模式是由约束所处理的`scope of data`驱动的，它具有与约束实现问题密切相关的优点。当你在 SQL DBMS 中实现数据库设计时，鉴于这些系统对数据完整性约束的声明性支持较差，你将面临这些问题。这种支持的缺乏将负担加在你身上，要求你开发通常复杂的代码来强制执行约束。第
    11 章将使用这里介绍的分类来研究数据完整性约束的这些实现挑战。


    ## 指定示例数据库设计


    我们将通过详细处理一个包含十个表结构的数据库设计，来演示本书第一部分所介绍理论的应用。


    '
- fmt: "# 第7章 指定数据库设计\n\n我们在此声明，本数据库设计仅用作展示形式化规范方法的载体；我们明确无意讨论该设计*为何*如此。我们承认，本设计所基于的一些假设可能存在疑问。同时我们也提前说明，本设计中有两处“取巧”实现，可能在某些人看来相当糟糕。我们会在引入它们时予以指出。\n\
    \n`Figure 7-1`展示了十个表结构（由方框表示）及其相互关系（由箭头表示）的示意图。每条箭头都表示适用于一对表结构之间的子集要求谓词。\n\n`Figure\
    \ 7-1.` 示例数据库图示\n\n7451CH07.qxd 5/15/07 9:43 AM Page 144\n\n**144**\n\n第7章 ■ 指定数据库设计\n\
    \n> **注意** 这些箭头大多代表通常所说的*多对一关系*，并最终在SQL DBMS的实施阶段成为*外键*。然而，情况并非总是如此，你将会看到。每条箭头的确切含义将在数据库宇宙规范中给出，其中每条箭头都转化为一个数据库约束。\n\
    \n我们的数据库存储了公司的员工（`EMP`）和部门（`DEPT`）。部分箭头表明：\n- 每位员工为一个部门工作。\n- 每个部门由一位员工管理。\n-\
    \ 每位员工被分配到一个薪资等级（`GRD`）。\n\n为所有薪资和/或“所属部门”变更维护员工历史记录（`HIST`）；每条历史记录描述了一位员工被分配到某个部门并享有特定薪资的时期。\n\
    \n我们将所有销售代表的额外信息保存在另一个表结构（`SREP`）中。我们将所有已不再为公司工作的员工（即已被终止雇佣或辞职）的额外信息保存在`TERM`中。注意，我们为已终止雇佣的员工保留`EMP`信息。我们还为所有有经理的员工（`MEMP`）保存额外信息；即，那些分配了经理的员工。\n\
    \n数据库还进一步保存了课程（`CRS`）、这些课程的开设班次（`OFFR`）以及这些班次的注册（`REG`）信息。更多的箭头表明：\n- 一个班次必须由一位为公司工作的培训师教授。\n\
    - 一个班次对应一门已存在的课程。\n- 一条注册记录将一位员工作为参与者与一个课程班次关联起来。\n\n现在你对我们在此数据库中维护的信息有了一定了解。下一节，你将看到*数据库骨架*。如前所述，它引入了每个表结构的所有属性名称。这些名称与表结构名称一起，构成了我们数据库设计中可用的词汇表。\n\
    \n## 数据库骨架\n\n我们在数据库设计中所表示的真实世界事物的名称，包括所关注的属性名称，在所谓的**数据库骨架**中引入。我们有时将其称为*概念骨架*。正如你在第5章所见，数据库骨架被表示为一个集合值函数。骨架函数的定义域是表结构名称的集合。对于每个名称，该函数生成该表结构的属性名称集合；即，该表结构的标题。\n\
    \n示例数据库设计的数据库骨架`DB_S`在`Listing 7-1`中定义。\n\n在`DB_S`的规范中，你可以看到嵌入的注释（`/* ... */`），用于进一步澄清为表结构和属性名称选择的缩写。\n\
    \n7451CH07.qxd 5/15/07 9:43 AM Page 145\n\n第7章 ■ 指定数据库设计\n\n**145**\n\n`Listing\
    \ 7-1.` 数据库骨架定义\n\n```\nDB_S := { (EMP; -- Employees\n          { EMPNO\n    \
    \        /* Employee number */\n          , ENAME\n            /* Employee name\
    \ */\n          , JOB\n            /* Employee job */\n          , BORN\n    \
    \        /* Date of birth */\n          , HIRED\n            /* Date hired */\n\
    \          , SGRADE\n```"
  raw: 'We comment up front that this database design merely serves as a vehicle to
    demonstrate the formal specification methodology; it is explicitly not our intention
    to discuss *why* the design is as it is. We acknowledge that some of the assumptions
    on which this design is based could be questionable. Also we mention up front
    that this design has two hacks, probably by some of you considered rather horrible.
    We’ll indicate these when they are introduced.


    Figure 7-1 shows a diagram of the ten table structures (represented by boxes)
    and their mutual relationships (represented by arrows). Each of the arrows indicates
    a subset requirement predicate that is applicable between a pair of table structures.


    **Figure 7-1.** *Picture of example database*


    7451CH07.qxd 5/15/07 9:43 AM Page 144


    **144**


    C H A P T E R 7 **■** S P E C I F Y I N G D ATA B A S E D E S I G N S


    **■Note** The majority of these arrows represent what is often called *many-to-one
    relationships* and will eventually end up as *foreign keys* during the implementation
    phase in an SQL DBMS. However, this need not always be the case, as you will see.
    The exact meaning of each arrow will be given in the database universe specification
    where each arrow translates to a database constraint.


    Our database holds employees (EMP) and departments (DEPT) of a company. Some of
    the arrows indicate the following:


    • Every employee works for a department.


    • Every department is managed by an employee.


    • Every employee is assigned to a salary grade (GRD).


    Employee history (HIST) records are maintained for all salary and/or “works-for-department”
    changes; every history record describes a period during which one employee was
    assigned to a department with a specific salary.


    We hold additional information for all sales representatives in a separate table
    structure (SREP). We hold additional information for employees who no longer work
    for the company (that is, they have been terminated or they resigned) in TERM.
    Note that we keep the EMP information for terminated employees. We also hold additional
    information for all managed employees (MEMP); that is, employees who have a manager
    assigned to them.


    The database further holds information about courses (CRS), offerings (OFFR) of
    those courses, and registrations (REG) for those course offerings. Some more arrows
    show the following:


    • An offering must be taught by a trainer who works for the company.


    • An offering is for an existing course.


    • A registration records an employee as an attendee for a course offering.


    You now have some idea of the information we’re maintaining in this database.
    In the next section, you’ll find the *database skeleton*. As mentioned before,
    it introduces the names of all attributes for every table structure. Together
    with the table structure names, they form the vocabulary that we have available
    in our database design.


    **Database Skeleton**


    The names of the things in the real world that we are representing in our database
    design, including the names of the attributes of interest, are introduced in what
    is called a database skeleton. We sometimes refer to this as the *conceptual skeleton*.
    As you saw in Chapter 5, a database skeleton is represented as a set-valued function.
    The domain of the skeleton function is the set of table structure names. For each
    name, this function yields the set of attribute names of that table structure;
    that is, the heading of that table structure.


    Our database skeleton DB_S for the example database design is defined in Listing
    7-1.


    Inside the specification of DB_S you see embedded comments (/* ... */) to clarify
    further the chosen abbreviations for the table structure and attribute names.


    7451CH07.qxd 5/15/07 9:43 AM Page 145


    C H A P T E R 7 **■** S P E C I F Y I N G D ATA B A S E D E S I G N S


    **145**


    **Listing 7-1.** *Database Skeleton Definition*


    DB_S := { (EMP; **-- Employees**


    { EMPNO


    /* Employee number */


    , ENAME


    /* Employee name */


    , JOB


    /* Employee job */


    , BORN


    /* Date of birth */


    , HIRED


    /* Date hired */


    , SGRADE'
