- fmt: '8. Using the semantics introduced by tables `DEP1`, `EMP1`, and `CLK1`, give
    a formal specification for the database predicate “A manager of a clerk must work
    in a department that is located in Denver.”


    Is this proposition TRUE for these tables?


    # Chapter 7: Specifying Database Designs


    In this chapter, we’ll give a demonstration of how youcan formally specify a database
    design.


    Formalizing a database design specification has the advantage of avoiding any
    ambiguity in the documentation of not only the database structure but, even more
    importantly, of all involved data integrity constraints.


    ■Note Within the IT industry, the term `business rules` is often used to denote
    what this book refers to as `data integrity constraints`. However, because a clear
    definition of what exactly is meant by business rules is seldom given, we cannot
    be sure about this. In this book, we prefer not to use the term business rules,
    but instead use data integrity constraints. In this chapter, we’ll give a clear
    definition of the latter term.


    We’ll give the formal specification of a database design by defining the data
    type of a database variable. This data type—essentially a set—holds all admissible
    database states for the database variable and is dubbed the `database universe`.


    You’ll see that a database universe can be constructed in a phased (layered) manner,
    which along the way provides us with a clear classification schema for data integrity
    constraints.


    First, you define what the vocabulary is. What are the things, and aspects of
    these things in the real world, that you want to deal with in your database? Here
    you specify a name for each table structure that is deemed necessary, and the
    names of the attributes that the table structure will have. We’ll introduce an
    example database design to demonstrate this. The vocabulary is formally defined
    in what is called a `database skeleton`. A good way to further explain the meaning
    of all attributes (and their correlation) is to provide the `external predicate`
    for each table structure; this is a natural language sentence describing the meaning
    and correlation of the involved attributes.


    Given the database skeleton, we then define for each attribute the set of admissible
    attribute values. This is done by introducing a `characterization` for each table
    structure. You were introduced to the concept of a characterization in Chapter
    4.


    You’ll then use these characterizations as building blocks to construct the set
    of admissible tuples for each table. This is called a `tuple universe`, and includes
    the formal specification of `tuple constraints`.


    Then, you’ll use the tuple universes to build the set of admissible tables for
    each table structure. This set is called a `table universe`, and can be considered
    the data type of a table variable. The definition of a table universe will include
    the formal specification of the relevant `table constraints`.


    The last section of this chapter shows how you can bring together the table universes
    in the definition of the set of admissible database states, which was the goal
    set out for this chapter: to define a database universe. In this phase you formally
    specify the `database (multi-table) constraints`.


    Because the example database universe presented in this chapter has ten table
    structures, we’ll introduce you to ten characterizations, ten tuple universes,
    and ten table universes. This, together with the explanatory material provided,
    makes this chapter a rather big one. However, the number of examples should provide
    you with a solid head start to applying the formal theory, and thereby enable
    you to start practicing this methodology in your job as a database professional.
    You can find a version of this example database design specification that includes
    the design’s bare essentials in Appendix A.


    After the “Chapter Summary” section, a section with exercises focuses primarily
    on changing or adding constraint specifications in the various layers of the example
    database universe introduced in this chapter.


    ## Documenting Databases and Constraints


    Because you’re reading this book, you consider yourself a database professional.
    Therefore, it’s likely that the activity of specifying database designs is part
    of your job. You’ll probably agree that the process of designing a database roughly
    consists of two major tasks: 1. Discovering the things in the real world for which
    you need to introduce a table structure in your database design. This is done
    by interviewing and communicating with the users and stakeholders of the information
    system that you’re trying to design.


    2. Discovering the data integrity constraints that will control the data that’s
    maintained in the table structures. These constraints add meaning to the table
    structures introduced in step one, and will ultimately make the database design
    a satisfactory fit for the reality that you’re modeling.


