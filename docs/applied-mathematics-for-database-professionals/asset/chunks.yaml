- fmt: '# Chapter 1. Logic: Introduction


    ## Special Predicate Categories


    Two predicate categories deserve a special name: tautologies and contradictions.


    ### Tautologies and Contradictions


    A *tautology* is a propositional form that’s TRUE for every possible combination
    of truth values of the propositional variables. A *contradiction* is a propositional
    form that’s false regardless of the truth values the propositional variables happen
    to take. Examples of tautologies are as follows:


    `x = 42 ∨ x ≠ 42`

    `10 = 10`

    `P ∨ TRUE`

    `P ⇒ ( P ∨ Q )`


    The first example illustrates what is known in logic as “*Tertium non datur*,”
    or the law of the excluded middle. The second example is rather obvious. The third
    one is TRUE regardless of the truth value of `P`. You can prove the last tautology
    using a truth table, as shown in Table 1-11.


    **Table 1-11.** *Proving a Tautology Using a Truth Table*


    As you can see, the last column of Table 1-11 contains only TRUE; this means that
    the predicate `P ⇒ ( P ∨ Q )` in the corresponding column header is always TRUE
    regardless of the individual truth values of the variables `P` and `Q`, and therefore
    a *tautology*. Table 1-10 (expressing the NOT connective with NAND) also shows
    an example of a tautology.


    Along the same lines, a propositional form is a *contradiction* if it always evaluates
    to FALSE, regardless of the individual truth values of its components. The following
    expression is a contradiction:


    `( P ∨ Q ) ∧ ( ( ¬P ) ∧ (¬Q ) )`


    If you set up a truth table for this predicate, you’ll end up with only FALSE
    in the corresponding column. Do you think it’s obvious that the expression is
    a contradiction? Perhaps this example will give you some feel for the importance
    of being able to perform purely formal analysis on logic expressions, without
    regard for what the variables `P` and `Q` involved stand for.


    ## Modus Ponens and Modus Tollens


    The *Modus Ponens* (Latin: *mode that affirms*) and *Modus Tollens* (Latin: *mode
    that denies*) are probably the most famous examples of tautologies in logic. In
    regular text, they respectively read as follows:


    - If `P` implies `Q` and `P` is TRUE, then `Q` must be TRUE.

    - If `P` implies `Q` and `Q` is FALSE, then `P` must be FALSE.


    You can also express these two tautologies using the logic operator symbols:

    `( ( P ⇒ Q ) ∧ P ) ) ⇒ Q`

    `( ( P ⇒ Q ) ∧ ( ¬Q ) ) ⇒ ¬P`


    The Modus Ponens represents the most direct form of everyday reasoning; therefore
    it is also referred to as *direct reasoning*. The Modus Tollens is also known
    as *indirect reasoning*, a form of reasoning that’s much less familiar. Take a
    look at the following example.


    Let `P` represent the predicate “Employee `e` is a manager” and let `Q` represent
    “Employee `e` earns a monthly salary of more than 10K.” Further assume that the
    company you work at has the following business rule: “Managers always earn more
    then 10K,” or, using symbols, `P ⇒ Q`.


    Indirect reasoning allows you to deduce that if you aren’t earning more than 10K
    monthly then you are not a manager.


    ## Logical Equivalences and Rewrite Rules


    It turns out the set of five logical connectives introduced in this chapter is
    truth functionally complete. In fact, the subset containing only the three connectives
    `AND`, `OR`, and `NOT` is also truth functionally complete (we’ll come back on
    this in Chapter 3 when we discuss the disjunctive normal form). This means that
    you don’t need the other two connectives—implication and equivalence—because you
    can express them in terms of `NOT`, `AND`, and `OR`: `( P ⇒ Q )` can be expressed
    as `( ¬P ) ∨ Q`


    `( P ⇔ Q )` can be expressed as `( P ∧ Q ) ∨ ( ¬P ∧ ¬Q )`


    We’ll investigate (and prove) *equivalences* like the preceding ones in the section
    “Logical Equivalences and Rewrite Rules.” Although the set of connectives `{AND,
    OR, NOT}` is indeed both sufficient and convenient to express all possible compound
    predicates, you can achieve the same goal with even a *single* logical connective:
    the `NAND` operator (not and), also known as the Sheffer stroke, and commonly
    represented by a vertical bar, as defined in Table 1-9. As you can see, the `NAND`
    connective returns FALSE if and only if both operands are TRUE, and returns TRUE
    in all other cases.


    **Table 1-9.** *Truth Table for the NAND Connective (|)*


    Note that this is purely a theoretical exercise, exploring the extreme edges of
    our game; although you can indeed rewrite all possible logical expressions using
    this single `NAND` connective, your expressions will become longer and much more
    difficult to read.


    Table 1-10 shows how you can express `NOT` using `NAND` by using the same propositional
    variable (`P`) for the left and right operands of the `NAND` connective.


    **Table 1-10.** *Expressing NOT with the NAND Connective*


    The last column of Table 1-10 shows that regardless of the truth value of `P`,
    `¬P` is always logically equivalent with `P|P`. The proof that you can also express
    `AND` and `OR` in terms of `NAND` is left as an exercise at the end of this chapter.


    The main reason why every textbook on the science of logic ends up with the five
    operators introduced earlier lies in the origin of this particular science: “concerning
    language and speech” or “human reasoning.” If you study natural languages, you’ll
    discover that the five operators introduced here are the ones we (human beings)
    use when reasoning.


    **Caution** Don’t even try to imagine what it would be like to communicate with
    an alien species whose language (the reasoning part of it) would be based on just
    the `NAND` operator. :-)


    Table 1-8 showed the truth table of the logical equivalence connective. Logical
    equivalences deserve our special attention because they’re extremely important,
    for many reasons. The most important application of logical equivalences is that
    you can use them to derive new equivalent predicates from existing ones; as such,
    they provide an alternative for using truth tables, as you’ll see in this section.
    They’re especially important for specifying data integrity constraints in different
    ways; you’ll see a lot of this in Part 2 of this book.


    Setting up truth tables for complicated predicates can become quite labor intensive.
    For example, if the predicate you want to examine contains four proposition variables
    (say `P`, `Q`, `R`, and `S`), you need to set up a truth table with sixteen rows,
    reflecting all possible truth value combinations. You might want to use a spreadsheet
    to fill such a truth table efficiently once you have entered the first row, but
    you’ll see that using (a particular kind of ) logical equivalence can be much
    more efficient.


    ### Rewrite Rules


    A *rewrite rule* is a rule that allows us to replace a given propositional form
    `X` by another propositional form `Y`, in such a way that `X` and `Y` are guaranteed
    to have the same truth value regardless of the value of the propositional variables.
    Such a replacement is permissible if and only if the equivalence `X ⇔ Y` is a
    tautology. This equivalence is referred to as the rewrite rule.


    You already encountered an equivalence that is a tautology in the section “Functional
    Completeness.” It showed how implication can be expressed using a combination
    of disjunction and negation:


    `( P ⇒ Q ) ⇔ ( ¬P ) ∨ Q`


    The truth table shown in Table 1-12 proves that this equivalence is indeed a tautology.'
