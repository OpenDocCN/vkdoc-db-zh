    \ 200。这个表谓词是以下形式：\n\n```\n( ∀t∈T: Q1(t) ⇒ ( Q2(t,T) ∧ Q3(t) ) )\n```\n\n使用以下重写规则\n\
    \n```\n( A ⇒ (B ∧ C) ) ⇔ ( (A ⇒ B) ∧ (A ⇒ C) )\n```\n\n连同全称量词的分配律（见列表 3-12），你可以将其重写为两个谓词的合取：\n\
    \n```\n( ∀t∈T: Q1(t) ⇒ Q2(t,T) )\n∧\n( ∀t∈T: Q1(t) ⇒ Q3(t) )\n```\n\n这表明你正在处理两个谓词。第一个合取项确实是一个表谓词，而第二个实际上是一个伪装的元组谓词！"
