    ## Table Universes


    You can use a tuple universe to build a set of admissible tables (we’ll demonstrate
    this shortly).


    Such a set is called a table universe. Every element in a table universe is an
    admissible table for the corresponding table structure.


    A tuple universe is a set of tuples and can be considered a table too. It is a
    rather large set of tuples, because it has every tuple that can be built using
    the characterization and taking into consideration the tuple constraints. We’ve
    mentioned before that a tuple universe can be considered the largest table for
    a given table structure.


    Every subset of a tuple universe is a table too. In fact, if you would construct
    a set that holds every subset of a tuple universe, then this set would contain
    lots of tables; every possible table for a given table structure would be in this
    set. Do you remember, from Part 1 of this book, how to construct the set of all
    subsets of a given set? The powerset operator does just that. The powerset of
    a tuple universe can be considered the set of all possible tables for a given
    table structure.


    **Note** You might want to revisit the section “Powersets and Partitions” in Chapter
    2, and refresh your memory regarding the powerset operator.


    In a similar way as tuple universes are defined, you can restrict the powerset
    of a tuple universe to obtain the set of admissible tables. You can add table
    predicates (constraining combinations of tuples) to discard possible tables that
    were generated by the powerset operator, but that do not reflect a valid representation
    of the real world. Table predicates that are used to restrict the powerset of
    a tuple universe are referred to as table constraints.'
