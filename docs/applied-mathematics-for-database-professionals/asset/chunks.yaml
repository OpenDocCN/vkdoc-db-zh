  trans: '# 逻辑恒等式与性质


    正如数值 `1` 是常规乘法的恒等元（任何给定数与 `1` 相乘结果仍是该给定数），`0` 是常规加法的恒等元（任何数与 `0` 相加结果仍是该数），逻辑中也存在类似的恒等式，如
    `清单 3-2` 所示。


    `清单 3-2. 恒等式`

    ```

    P ∧ TRUE ⇔ P

    P ∨ FALSE ⇔ P

    P ∧ FALSE ⇔ FALSE

    P ∨ TRUE ⇔ TRUE

    ```


    第一个表达式表明 `TRUE` 是关于与运算（AND）的恒等元。第二个表达式表明 `FALSE` 是关于或运算（OR）的恒等元。最后两个表达式也被称为两个*有界性*恒等式；它们表明任何东西与
    `FALSE` 进行与运算（ANDed）结果为 `FALSE`，任何东西与 `TRUE` 进行或运算（ORed）结果为 `TRUE`。


    ## 交换律


    一个运算符（或连接词）当且仅当它是二元运算符，且其左右操作数互换不影响结果时，才是*可交换的*。`清单 3-3` 展示了一些逻辑运算符的交换律。


    `清单 3-3. 交换律`

    ```

    ( P ∧ Q ) ⇔ ( Q ∧ P )

    ( P ∨ Q ) ⇔ ( Q ∨ P )

    ( P ⇔ Q ) ⇔ ( Q ⇔ P )

    ```


    合取（conjunction）、析取（disjunction）和等价（equivalence）都是可交换的连接词。


    ## 结合律


    如果你想对一系列操作数重复使用相同的二元运算符，并且处理该运算符出现的顺序无关紧要，那么这个运算符就是*可结合的*。请注意 `清单 3-4` 中命题形式里的括号。


    `清单 3-4. 结合律`

    ```

    ( ( P ∧ Q ) ∧ R ) ⇔ ( P ∧ ( Q ∧ R ) )

    ( ( P ∨ Q ) ∨ R ) ⇔ ( P ∨ ( Q ∨ R ) )

    ```


    合取和析取是可结合的。结合律解释了为什么在涉及两个以上操作数的迭代合取或析取表达式中，括号常常被省略。


    ## 分配律


    就像交换律和结合律一样，你可能还记得常规算术中的*分配律*，通常表达为如下公式（本节开头已展示）：

    ```

    a*(b+c) = (a*b) + (a*c)

    ```

    这个代数性质展示了加法和乘法之间的某种关系；在常规算术中，乘法对加法具有分配律。在逻辑中，合取与析取之间也存在类似的关系，如 `清单 3-5` 所示。


    `清单 3-5. 分配律`

    ```

    ( P ∨ ( Q ∧ R ) ) ⇔ ( ( P ∨ Q ) ∧ ( P ∨ R ) )

    ( P ∧ ( Q ∨ R ) ) ⇔ ( ( P ∧ Q ) ∨ ( P ∧ R ) )

    ```


    正如这些重言式所示，合取对析取具有分配律，反之亦然。请注意，在常规算术中，加法对乘法*不*具有分配律。


    ## 自反性


    常规等号是*自反*运算符的一个例子；对于任何 `x`（无论 `x` 的类型如何），`x = x` 都为 `TRUE`。在逻辑中，蕴含和等价连接词是自反的，因为
    `清单 3-6` 所示的谓词始终为 `TRUE`。


    `清单 3-6. 自反性`

    ```

    P ⇔ P

    P ⇒ P

    ```


    ## 传递性


    常规等号是*传递的*，如以下公式所示：`((x = y) ∧ (y = z)) ⇒ (x = z)`


    在逻辑中，合取、蕴含和等价是传递的，如 `清单 3-7` 所示。


    `清单 3-7. 传递性`

    ```

    ( ( P ∧ Q ) ∧ ( Q ∧ R ) ) ⇒ ( P ∧ R )

    ( ( P ⇒ Q ) ∧ ( Q ⇒ R ) ) ⇒ ( P ⇒ R )

    ( ( P ⇔ Q ) ∧ ( Q ⇔ R ) ) ⇒ ( P ⇔ R )

    ```


    请注意，析取不具有传递性：`( P ∨ Q ) ∧ ( Q ∨ R )` 并*不*蕴含 `P ∨ R`。


    ## 德·摩根定律


    德·摩根定律（1806–1871）对于处理涉及否定的表达式非常有用，如 `清单 3-8` 所示。


    `清单 3-8. 德·摩根定律`

    ```

    ¬( P ∨ Q ) ⇔ ( ¬P ∧ ¬Q )

    ¬( P ∧ Q ) ⇔ ( ¬P ∨ ¬Q )

    ```


    用平实的英语描述，这些定律表明“析取的否定等于（操作数的）否定的合取”，反之亦然，“合取的否定等于否定的析取”。


