- fmt: "# C H A P T E R 1 0 ■ D A T A M A N I P U L A T I O N\n\n7451CH10.qxd 5/7/07\
    \ 11:36 AM Page 226\n\n**226**\n\n*   `EMP` holds a tuple that represents a trainer\
    \ with employee number 1126, who was hired before February 1, 200 *6*. This trainer\
    \ is still working for us; that is, he or she has not been terminated (`PSSR8`,\
    \ `PTIJ11`, `PTIJ12`, `PODC7`).\n*   `DEPT` holds a tuple that represents a department\
    \ located in Utrecht. The aforementioned trainer is working in this department\
    \ (`PSSR7`, `PODC3`).\n\nThree other static constraints involve `OFFR`: `PTIJ10`,\
    \ `PODC4`, and `PODC5`. However, these three cannot be violated by a transaction\
    \ that inserts a new `CRS` tuple. They all involve the `REG` table structure too.\
    \ The second characteristic in the preceding bulleted list, together with the\
    \ fact that the begin state must be a valid one (that is, contained in `DB_UEX`),\
    \ imply that there are no tuples in `REG`. This in turn means that the database\
    \ state conforms (and remains conformed after the insertion of `offr1`) to `PTIJ10`,\
    \ `PODC4`, and `PODC5`.\n\nGiven the preceding characteristics, the transaction\
    \ of inserting tuple `toffr1` would successfully execute. However, note that `toffr1`\
    \ represents a *confirmed* offering. The definition of our state transition universe\
    \ (`ST_UEX` from Chapter 8) contains the specification of a state transition constraint\
    \ stating that new offerings must start with status *scheduled* (constraint `STC2`,\
    \ in Listing 8-8). Clearly this transaction violates constraint `STC2`.\n\nA correct\
    \ definition of the transaction that attempts to insert `offr1`, say `Tx2`, would\
    \ be as follows.\n\nFor a database state `dbs` in `DB_UEX`, let\n\n```\nTx2a(dbs)\
