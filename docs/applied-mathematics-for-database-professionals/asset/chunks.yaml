    other side. Let’s start with the left side:


    ```

    ¬( ∃x∈S: ∀y∈T: P(x,y) )

    ```


    Note that you can view this expression as follows: `¬( ∃x∈S: R(x) )`, where `R(x)
    = ( ∀y∈T: P(x,y) )`. Now you can apply the third rewrite rule of Listing 2-15,
    which has the following result:


    ```

    ( ∀x∈S: ¬R(x) )

    ```


    Substituting the expression for `R(x)` back into this gives the following result:
    `( ∀x∈S: ¬( ∀y∈T: P(x,y) ) )`


    Now you can apply the fourth rewrite rule of Listing 2-15 to the inner (negated)
    universal quantification, which has the following result:


    ```

    ( ∀x∈S: ∃y∈T: ¬P(x,y) )

    ```


    This ends the proof of the given equivalence.


