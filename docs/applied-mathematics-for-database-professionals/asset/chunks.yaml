    C H A P T E R 5


    Tables and Database States


    **F**rom this chapter onward we’ll assume that you’re thoroughly familiar with
    all terminology introduced in Part 1 of this book. Only if we deem it necessary
    will we make explicit references back to where specific terminology was first
    introduced and defined.


    We’ll start with an introduction of various interrelated terms that are used in
    this chapter and the other chapters of Part 2 that follow.


    In Part 1 we hinted that a table can be considered a set of functions. In this
    chapter we’ll demonstrate this in detail. The section “Formal Specification of
    a Table” shows how you can formally represent a *table*. It also introduces a
    *shorthand notation* for a table and defines what’s called the *heading* of a
    table. We’ll familiarize you with a method to formally specify—


    in a predicative way—a table given a characterization. You already saw a preview
    of this in Chapter 4.


    The section “Database States” deals with formally specifying a *database state*.
    The database state that is the current value of the database variable holds all
    tables of a database. This section also defines the concept of a *database skeleton*.


    The section “Operations on Tables” discusses various common table operators: *union*,
    *intersection*, *difference*, *projection*, *restriction*, *join*, *attribute
    renaming*, *extension*, and *aggregation*. These operators take tables as their
    operands and produce another table.


    You’ll find a “Chapter Summary” at the end, followed by an “Exercises” section.


    **Terminology**


    This section introduces various interrelated terms that we’ll use in the chapters
    of Part 2.


    Because some of these terms might have a meaning to you that differs from the
    one we intend to use in this book, or because some of these terms are new to you,
    we decided to introduce them here in advance. This introduction is informal. Two
    of these terms ( *database design* and *table design*) were already used in Chapter
    4\. Some of the terms are formal terms; we’ll specify these precisely in this
    part of the book.


    **■Note** You might find the informal introduction of some of these terms somewhat
    vague. If so, then don’t worry about it now. Just start reading the chapters of
    Part 2 and revisit this informal introduction of the terms later.


