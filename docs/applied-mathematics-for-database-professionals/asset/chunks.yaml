- fmt: '# CHAPTER 9 ■ DATA RETRIEVAL


    ## SEII

    `select d.* from DEPT d`


    这个查询很直接。它从给定的数据库状态`dbs(DEPT)`中检索部门表。另一种形式化表示方法（FEb）稍微不那么简洁。在SEII中，星号（`*`）符号被用作表示部门表所有属性的简写。SEII实际上列出了所有属性（顺序是任意的）。


    ## Listing 9-2. Query EXQ2(dbs)

    此列表给出了月薪超过4800，或工资级别大于等于6的员工的工作。


    ### FEa:

    ```

    { e(JOB) | e∈dbs(EMP) ∧ (e(MSAL) > 4800 ∨ e(SGRADE) ≥ 6) }

    ```


    ### FEb:

    ```

    { e↓{JOB} | e∈dbs(EMP) ∧ (e(MSAL) > 4800 ∨ e(SGRADE) ≥ 6) }

    ```


    ### FEc:

    ```

    { e↓(JOB) | e∈dbs(EMP) ∧ (e(MSAL) ≤ 4800 ⇒ e(SGRADE) ≥ 6) }

    ```


    ### FEd:

    ```

    { e↓(JOB) | e∈dbs(EMP) ∧ (e(SGRADE) < 6 ⇒ e(MSAL) > 4800) }

    ```


    ### FEe:

    ```

    { e↓(JOB) | e∈dbs(EMP) ∧ ¬(e(MSAL) ≤ 4800 ∧ e(SGRADE) < 6) }

    ```


    ### FEf:

    ```

    { e↓(JOB) | e∈dbs(EMP) ∧ e(MSAL) > 4800 }

    ∪

    { e↓(JOB) | e∈dbs(EMP) ∧ e(SGRADE) ≥ 6 }

    ```


    ### SEI:

    ```

    select distinct e.JOB from EMP e where e.MSAL > 4800 or e.SGRADE >= 6

    ```


    ### SEII:

    ```

    select distinct e.JOB from EMP e where not (e.MSAL <= 4800 and e.SGRADE < 6)

    ```


    ### SEIII:

    ```

    select e.JOB from EMP e where e.MSAL > 4800

    union

    select e.JOB from EMP e where e.SGRADE >= 6

    ```


    你注意到FEa和FEb之间的细微差别了吗？前者产生的是一个工作值的集合（即这不是一张表）；后者产生的是一个元组集合（即一个在`{JOB}`上的表），因此是形式化指定`EXQ2`的首选方式。


    备选方案FEc、FEd和FEe是FEb的变体，其中析取被重写为蕴涵或合取。备选方案FEf使用并集运算符；收入超过4800的员工的工作与工资级别大于等于6的员工的工作进行并集。


    **■注意** 这个查询的形式化指定方式意味着我们只检索*不同的*工作值。假设表`dbs(EMP)`当前有二十名员工，其中十名符合谓词“月薪大于4800或工资级别等于6或更高”。如果这十名员工中有八名的工作是`TRAINER`，另外两名的工作是`MANAGER`，那么FEa的结果将是`{''TRAINER'',''MANAGER''}`：一个只有两个，而不是十个元素的集合。


    FEa和FEb演示的细微差别无法用SQL表达。规范SEI是这两者的SQL变体。另请注意，在SQL中，必须添加`distinct`关键字以确保查询结果中不出现重复的工作值。


    备选方案FEc和FEd不能直接转换为SQL，因为SQL缺乏蕴涵运算符；在SQL中只有析取、合取和否定可用。


    规范SEII是FEe的SQL版本，SEIII代表FEf的SQL版本。


    请注意，在后一种情况下，使用`distinct`关键字不是必需的；当使用集合运算符（`union`、`minus`或`intersect`）时，SQL总是返回不同的值。


    ## Listing 9-3. Query EXQ3(dbs)

    此列表给出了办事员的编号、姓名和工资，包括他们所属工资级别的下限和上限。


    ### FEa:

    ```

    { e↓{EMPNO,ENAME,MSAL,LLIMIT,ULIMIT} | e∈dbs(EMP)⊗

    (dbs(GRD)◊◊{(SGRADE;GRADE),(LLIMIT;LLIMIT),(ULIMIT;ULIMIT)}) ∧

    e(JOB)=''CLERK'' }

    ```


    ### SEI:

    ```

    select e.EMPNO, e.ENAME, e.MSAL, g.LLIMIT, g.ULIMIT

    from EMP e, GRD g

    where e.SGRADE = g.GRADE

    and e.JOB = ''CLERK''

    ```


    这个查询由员工表和工资级别表之间的连接表示。为了能够使用连接运算符，你必须重命名员工表中的属性`SGRADE`或工资级别表中的属性`GRADE`。规范FEa执行了后者重命名。你可以直接从FEa推导出SQL表达式SEI。


    现在你可能在想SQL表达式看起来比形式化表达式容易得多，对吧？这是因为这个例子太简单了。当我们看到更复杂的例子时，你会看到这种情况不再适用；那时SQL表达式将变得比数学表达式更复杂。


    ## Listing 9-4. Query EXQ4(dbs)

    此列表给出了在两个不同地点恰好管理两个部门的员工（`EMPNO`和`ENAME`）。


    ### FEa:

    ```

    { e↓{EMPNO,ENAME} | e∈dbs(EMP) ∧

    #{ d(LOC) | d∈dbs(DEPT) ∧ d(MGR)=e(EMPNO) } = 2 }

    ```


    ### FEb:

    ```

    { e↓{EMPNO,ENAME} | e∈dbs(EMP) ∧

    (∃d1,d2∈dbs(DEPT): d1(MGR)=e(EMPNO) ∧

    d2(MGR)=e(EMPNO) ∧

    d1(LOC)≠d2(LOC)) }

    ```


    ### FEc:

    ```

    { e↓{EMPNO,ENAME} | e∈(dbs(EMP)⇓{EMPNO,ENAME})⊗

    (dbs(DEPT)◊◊{(EMPNO;MGR),(LOC1;LOC)})⊗

    (dbs(DEPT)◊◊{(EMPNO;MGR),(LOC2;LOC)}) ∧

    e(LOC1)≠e(LOC2) }

    ```


    ### SEI:

    ```

    select e.EMPNO, e.ENAME

    from EMP e

    where 2 = (select count(distinct d.LOC)

    from DEPT d

    where d.MGR = e.EMPNO)

    ```


    ### SEII:

    ```

    select e.EMPNO, e.ENAME

    from EMP e

    where exists(select d1.*

    from DEPT d1

    where d1.MGR = e.EMPNO

    and exists(select d2.*

    from DEPT d2

    where d2.MGR = e.EMPNO

    and d1.LOC <> d2.LOC))

    ```


    ### SEIII:

    ```

    select e.EMPNO, e.ENAME

    from EMP e

    where exists(select *

    from DEPT d1, DEPT d2

    where d1.MGR = e.EMPNO

    and d2.MGR = e.EMPNO

    and d1.LOC <> d2.LOC)

    ```


    ### SEIV:

    ```

    select distinct e.EMPNO, e.ENAME

    from EMP e, DEPT d1, DEPT d2

    where e.EMPNO = d1.MGR

    and e.EMPNO = d2.MGR

    and d1.LOC <> d2.LOC

    ```


    规范FEa指出，由该员工管理的部门地点集合的基数必须为2。备选方案FEb通过对两个由该员工管理的不同地点的部门进行存在性量化来实现这一要求。


    **■注意** 在FEb中，使用了对同一集合的两个嵌套存在性量词的简写表示法。


    你可以直接将这两种形式化规范翻译成SQL。注意，在SEI中，必须在`count`聚合函数内使用`distinct`关键字。规范SEII用于演示SQL中可用的存在性量词——`exists(...)`表达式的嵌套使用。SEIII是一个简写版本，类似于形式化规范FEb中使用的简写。


    规范FEc使用连接来定位由该员工管理的两个不同地点的部门。注意，在其SQL版本（SEIV）中，必须使用`distinct`关键字，以防止管理两个不同地点部门的员工在结果集中出现两次。


    ## Listing 9-5. Query EXQ5(dbs)

    此列表给出了所有收入超过其上司工资90%的被管理员工的编号和姓名。


    ### FEa:

    ```

    { e1↓{EMPNO,ENAME} | e1∈dbs(EMP) ∧ m∈dbs(MEMP) ∧ e2∈dbs(EMP) ∧

    e1(EMPNO) = m(EMPNO) ∧ m(MGR) = e2(EMPNO) ∧

    e1(MSAL) > 0.9*e2(MSAL) }

    ```


    ### FEb:

    ```

    { e↓{EMPNO,ENAME} | e∈(dbs(EMP)⊗dbs(MEMP))⊗

    (dbs(EMP)◊◊{ (MGR;EMPNO), (MGR_MSAL;MSAL) }) ∧

    e(MSAL) > 0.9*e(MGR_MSAL) }

    ```


    ### FEc:

    ```

    { e1↓{EMPNO,ENAME} | e1∈dbs(EMP) ∧

    (∃m∈dbs(MEMP): m(EMPNO)=e1(EMPNO) ∧

    (∃e2∈dbs(EMP): e2(EMPNO)=m(MGR) ∧

    e1(MSAL) > 0.9*e2(MSAL) )) }

    ```


    ### SEI:

    ```

    select e1.EMPNO, e1.ENAME

    from EMP e1, MEMP m, EMP e2

    where e1.EMPNO = m.EMPNO

    and m.MGR = e2.EMPNO

    and e1.MSAL > 0.9 * e2.MSAL

    ```


    ### SEII:

    ```

    select e1.EMPNO, e1.ENAME

    from EMP e1

    where exists (select m.*

    from MEMP m

    where m.EMPNO = e1.EMPNO

    and exists (select e2.*

    from EMP e2

    where e2.EMPNO = m.MGR

    and e1.MSAL > 0.9 * e2.MSAL))

    ```'
