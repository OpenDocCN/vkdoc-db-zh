    ¬P is FALSE if and only if P is TRUE. In the other case, ¬P is TRUE.


    ## Table 1-5. Truth Table for AND (Conjunction)


    | P | Q | P ∧ Q |

    | :--- | :--- | :--- |

    | **T** | **T** | T |

    | **T** | **F** | F |

    | **F** | **T** | F |

    | **F** | **F** | F |


    `P ∧ Q` is TRUE if and only if both `P` and `Q` are TRUE. In all other cases,
    `P ∧ Q` is FALSE. In a conjunction `P ∧ Q`, `P` and `Q` are referred to as the
    *conjuncts*.


    ## Table 1-6. Truth Table for OR (Disjunction)


    | P | Q | P ∨ Q |

    | :--- | :--- | :--- |

    | **T** | **T** | T |

    | **T** | **F** | T |

    | **F** | **T** | T |

    | **F** | **F** | F |


    `P ∨ Q` is FALSE if and only if both `P` and `Q` are FALSE. In a disjunction `P
    ∨ Q`, `P` and `Q` are referred to as the *disjuncts*.


    **Note** The OR operator that is defined here is called the *inclusive* or. In
    natural language, we normally refer to the inclusive or when using the word “or.”
    However, we sometimes use “or” to denote what is called the *exclusive* or (`eor`
    for short). Compared to the truth table for the inclusive or (Table 1-6), the
    truth table for the exclusive or differs only on the first row; the propositional
    form `P eor Q` is FALSE if both `P` and `Q` are TRUE.


    An example use of the exclusive or is in the statement, “You must clean up your
    room or you go to bed early.” Clearly you aren’t required to both clean up your
    room *and* go to bed early. In this book we will always use the inclusive or.


    ## Table 1-7. Truth Table for IF . . . THEN (Implication)


    | P | Q | P ⇒ Q |

    | :--- | :--- | :--- |

    | **T** | **T** | T |

    | **T** | **F** | F |

    | **F** | **T** | T |

    | **F** | **F** | T |


    `P ⇒ Q` is FALSE if and only if `P` is TRUE and `Q` is FALSE. In all other cases
    `P ⇒ Q` is TRUE. In an implication `P ⇒ Q`, `P` is often referred to as the *antecedent*,
    *hypothesis*, or *premise*, and `Q` as the *consequent* or *conclusion*.


    ## Table 1-8. Truth Table for IF AND ONLY IF (Equivalence)


    | P | Q | P ⇔ Q |

    | :--- | :--- | :--- |

    | **T** | **T** | T |

    | **T** | **F** | F |

    | **F** | **T** | F |

    | **F** | **F** | T |


    Logical equivalence is nothing more than the conventional `=` operator as it applies
    to Boolean values; `P ⇔ Q` is TRUE if and only if `P` and `Q` have the same truth
    value. Another common way to express equivalence is to use the words “necessary
    and sufficient.”


    Note that the negation (see Table 1-4) is a *monadic* operator; it accepts only
    one operand. The other connectives in Tables 1-5 through 1-8 are *dyadic*; they
    accept two operands.


    **Note** Other books sometimes use the terms unary, binary, and ternary instead
    of monadic, dyadic, and triadic when classifying operators.


    ## Implication


    In real life, implication plays a predominant role, because life is full of if-then
    situations. Database designs are meant to represent parts of real life. You’ll
    see in Part 2 of this book that the implication is often used within formal specifications
    of data integrity constraints that play a role in these database designs. Therefore,
    it’s important to understand fully the formal definition of the implication connective
    as given by Table 1-7.


    Probably the most “controversial” truth table entry is this one: if `P` is FALSE
    and `Q` is TRUE, the implication `P ⇒ Q` is TRUE. You remember in the introduction
    of this book, when we described how mathematicians create their own games, changing
    the rules until they like the game? Well, the preceding definition of implication
    turns out to work better in practice than any other definition. One way to think
    about the implication `P ⇒ Q` is as follows:


    * This implication says something about the truth of `Q` in case `P` is TRUE.

    * If `P` is *not* true, the implication does not “say” anything; therefore, the
    truth of `Q` does not matter and the implication is considered TRUE.


    Take a look at the following proposition: *Toon lives in Utrecht implies Lex has
    two daughters.*


    You can regard this as an instantiation of the propositional form `P ⇒ Q` where
    the proposition “Toon lives in Utrecht” is substituted as the value for propositional
    variable `P`, and the proposition “Lex has two daughters” is substituted as the
    value for variable `Q`. Because Toon doesn’t live in Utrecht, the value for `Q`
    might as well have stated that Lex has three daughters (in reality there are two);
    the implication `P ⇒ Q` would still be TRUE.


    Another way of looking at this is as follows: if you believe a falsehood, you’ll
    believe anything.


    ## Predicate Strength


    Implication can be considered to *order* the two predicates it has as its operands;
    it declares an order between the two operands, the hypothesis and the conclusion.
    This order is referred to as the *strength* of a predicate. If two predicates—say
    `P` and `Q`—are involved in an implication `P ⇒ Q`, then predicate `P` is said
    to be *stronger* than predicate `Q`—or `Q` is *weaker* than `P`.


    Assuming `x` is a variable of type integer, take a look at the following implication:
    `x > 42 ⇒ x > 0`


    To declare that `x` is greater than 42 clearly implies that `x` is greater than
    0. This implication is TRUE irrespective of the value that you supply for `x`,
    and the statement "`x > 42`" is said to be stronger than the statement "`x > 0`".


    Two predicates, say `P` and `Q`, are of equal strength if and only if both `P
    ⇒ Q` and `Q ⇒ P` are TRUE. In this case `P` and `Q` are equivalent: `P ⇔ Q`.


    **Note** You aren’t always able to state for two given predicates, say `P` and
    `Q`, which one is the stronger one.


    If neither `P ⇒ Q` holds, nor `Q ⇒ P` holds, then there is no order between `P`
    and `Q`. In mathematics this kind of ordering is referred to as a *partial ordering*.


    Given this ordering of predicates, you can ask yourself whether there exists a
    predicate that is the strongest of all predicates, and likewise, is there one
    that is weakest of all? The strongest predicate would be the one *implying every
    other predicate*. Indeed there is such a predicate: `FALSE` is the strongest predicate
    because `FALSE ⇒ Q` is TRUE for any conclusion `Q`. This follows from the third
    and fourth entry in the truth table listed in Table 1-7 that defines the implication.


    The weakest predicate would be the one *implied by every other predicate*; `TRUE`
    is the *weakest* predicate because `P ⇒ TRUE` is true for any hypothesis `P`.
    This follows from the first and third entry in the truth table listed in Table
    1-7.


    ## Going a Little Further


    Let’s explore the area of logical connectives a little further, just for fun.
    The preceding truth tables show five logical connectives. Why *five*? How many
    logical connectives, each with a distinct different meaning, can we come up with
    in total? How many of them do we need? What would be the theoretical minimum set
    of logical connectives to express all other ones?


    For example, it’s relatively easy to see that you can define four different monadic
    and sixteen different dyadic logical connectives. A truth table for a monadic
    connective has two rows, and a truth table for a dyadic connective has four rows;
    because you have two choices for each truth table cell (`TRUE` and `FALSE`), the
    total number of possibilities is 2 * 2 = 4 and 2 * 2 * 2 * 2 = 16, respectively.
    So, we could give all those 20 connectives a name, also choose a symbol to represent
    them, and start using them in our logical expressions. Obviously, we don’t do
    that; it would be too difficult to remember all those operators, our expressions
    would become difficult to read, and apparently we don’t need all those connectives.
    This leads to the important concept of functional completeness.


    ## Functional Completeness


    A given set of logical connectives is *truth functionally complete* if and only
    if all possible connectives can be expressed through suitable combinations of
    the ones in the given set.'
