  trans: '## 章节总结


    本节提供了本章内容的总结，以项目符号列表形式呈现。


    *   你实现数据库设计，通常是为了在其之上构建业务应用程序。这些应用程序通常是**数据窗口**（`WoD`）应用程序。用户通过这些应用程序查询数据并进行交易。

    *   一个`WoD`应用程序的所有代码可以分为三类：用户界面代码（`UI` 代码）、业务逻辑代码（`BL` 代码）和数据完整性代码（`DI` 代码）。`UI`
    代码创建用户所见的用户界面，并响应用户在用户界面中发起的事件。`DI` 代码负责在用户更改数据库中的数据时，持续维护所有数据完整性约束的有效性。`BL` 代码负责组合和执行查询及交易。

    *   本章的重点是如何以高效的方式实现 `DI` 代码。

    *   你可以使用以下三种策略之一来实现 `DI` 代码：声明式、触发过程式或嵌入过程式。

    *   你可以声明所有属性和元组约束。但只有少数表和数据库约束可以声明。

    *   大多数（多行）数据完整性约束必须以过程式实现。在本章中，触发过程式策略优于嵌入过程式策略。

    *   我们向你介绍了六种用于实现多元组约束的 `DI` 代码的执行模型。这些模型的效率范围很广，从相当低效（对每个 `DML` 语句都完整检查每个约束）到相当高效（以最小化方式有条件地检查约束）。

    *   鉴于 Oracle 标准的 `读已提交` 隔离级别，你必须以程序方式序列化 `DI` 代码。未能这样做可能导致事务并发执行时发生约束违反。序列化过渡约束的
    `DI` 代码尤其困难。

    *   某些约束无法在语句级别进行验证；它们需要 `DI` 代码的延迟执行模型。扩展执行模型以适应 `DI` 代码的延迟执行并非易事。你已经看到了一个实现此目标的大纲，这涉及建立一个用于记录临时违规的中央表。

    *   如果你有很多需要触发过程式实现的数据完整性约束，那么 `RuleGen` 框架可以帮助你管理所有这些约束的 `DI` 代码。


    ## 总结


    你已经到达了本书的最后一章。在本章中，我们将首先提供一个简要总结，然后给出一些结论。


    在本书的第一部分，我们介绍了两个重要的数学学科：逻辑学和集合论。这两个学科是数学应用于数据库领域中最相关的学科。


    第 1 章提供了逻辑学的入门介绍。我们介绍了命题和谓词的概念，并展示了如何使用逻辑连接词（合取、析取、蕴含、等价和否定）来描述复合命题和谓词。


    本章最后建立了非常重要的重写规则概念。你在本书中已经看到了重写规则的许多应用；它们使你能够将谓词转换为其他等价的谓词。


    第 2 章提供了集合论的入门介绍。我们介绍了几种指定集合的方法，讨论了子集的概念，并探讨了常见的集合运算符：并集、交集和差集。本章最后处理了幂集和有序对。正如你在本书第二部分所见，集合论提供了一种优秀的语言，可以可靠地描述复杂的数据库设计、数据检索和数据操作。


    第 3 章继续了第一章开始的逻辑学讨论。它向你介绍了全称量化和存在量化的关键概念，并指出了关于这两个量词的重要重写规则。其中一个重写规则表明，你可以将存在量词转换为全称量词，反之亦然——这个重写规则在本书中已多次应用。


    第 4 章延续了第 2 章建立的集合论基础，并介绍了该领域的一些更多概念。你看到了如何使用函数来表示元组。我们还展示了如何使用一种特殊的函数，即集合函数，来表征现实世界中需要在数据库中表示的事物。


    第 5 章和第 6 章演示了如何应用集合论和逻辑来描述数据库领域中的重要概念。我们使用这些数学学科来形式化地描述以下内容：

    *   表和数据库状态

    *   常见的表运算符，如投影、扩展、限制和连接——仅举几例

    *   元组、表和数据库谓词——用于指定约束的构建块

    在第 6 章末尾，我们还探讨了常见的数据完整性谓词类型：唯一标识、子集要求、特化、泛化和连接中的元组谓词。


    第 7 章将所有内容整合在一起，并展示了本书的主要主题：如何应用所有介绍的数学概念来创建一个可靠的数据库设计规范（一个数据库宇宙）。采用这种分层方法使我们对相关的数据完整性约束有了清晰而深入的认识。它确立了几类约束：属性约束、元组约束、表约束和数据库约束。第
    8 章探讨了另一类约束：状态转换约束。正如你所见，你也可以以形式化的方式指定这类约束。清晰理解所有涉及的约束，是使用 `SQL` `DBMS` 执行可靠且健壮的设计实现的先决条件。


    第 9 章和第 10 章讨论了数学在指定数据检索（查询）和数据操作（事务）领域的应用。


    最后，在第 11 章，我们探讨了在知名的 `SQL` `DBMS`（`Oracle`）中实现数据库设计——特别是其所有数据完整性约束——所面临的挑战。正如你所见，对于某些类别的约束，实现是微不足道的（它们可以声明给
    `DBMS`），但对于其他类别的约束，实现却是一项复杂的任务。实现高效的执行模型、序列化事务，有时还需要延迟执行约束检查，是使这项任务成为严峻挑战的几个方面。


    **注意：** 本书并未涵盖许多主题。例如，你可以进一步研究数学，以提出其他有用的重写规则。此外，关于如何提供形式化证明的讨论并未包含；能够证明给定的谓词转换是否正确有时非常方便。另外，在本书中，我们选择只向你提供必要的形式化工具，以便你能以清晰且专业的方式开始处理数据库设计。我们特别没有涉及以下主题：什么是好的数据库设计、衡量它的标准是什么、数据冗余如何处理，以及数据库设计中的各种范式。涵盖这些主题本身就足以再写一本书。


    ## 结论'
- fmt: '## CHAPTER 12: SUMMARY AND CONCLUSIONS


    The unique aspect of this book is captured by its title: applied mathematics for
    database professionals. We’ve described two disciplines of mathematics that can
    act as high-quality toolsets for a database professional. We’ve described how
    to apply these toolsets in the area of data integrity constraints.


    Data integrity constraints add semantic value to the data captured by a database
    design by describing how the table structures represent the real world that we
    work in. For this reason, data integrity constraint specifications are an integral
    part of a database design specification. The formal methodology described in this
    book enables us to specify a database design precisely, and in particular to specify
    all involved data integrity constraints precisely.


    Here is quote that reiterates the importance of data integrity constraints: It
    should be clear that integrity constraints are crucially important, since they
    control the correctness of the data. In many ways, in fact, integrity constraints
    are the most important part of the system.


    C. J. Date, *What Not How* (Addison-Wesley, 2000)


    Why are formal constraint specifications so important?


    Well, if we use plain English, or some awkward derivative, to express data integrity
    constraints we’ll inevitably hit the problem of how the English sentence maps,
    unambiguously, into the database design. Different software developers will implement
    such specifications diversely, because they all try to convert the sentence—everybody
    in his or her own way—to something that will map into the database design, and
    then code it.


    Every informal language is bound to be ambiguous. This is unsolvable. An informal
    or natural language effort to capture data integrity constraints will always fail
    in exposing, unambiguously, how such a constraint maps into the database design,
    because there exists no mapping from the informal natural language to the formal
    world of a database design. This data integrity constraint problem is inevitable
    unless we adopt a formal methodology. With a formal language, we can unambiguously
    describe how a constraint maps into a database design.


    Within the IT profession we should recognize that database design is a task for
    properly educated database professionals. Their education must involve enough
    set theory and logic, including how these disciplines can be applied in the field
    of designing databases. This book aims to provide this formal education.


    How can you start applying this knowledge in your job as a database professional?
    Here’s a little roadmap that you can adopt.


    1. Whenever you design your next database, start by specifying the involved data
    integrity constraints in a formal way. Specify them as data integrity predicates
    and adopt the classification scheme introduced in Chapters 7 and 8.


    2. Apply this formalism to queries too, especially the more complex ones. Use
    rewrite rules in the formal world to come up with expressions that can easily
    be transformed to SQL.


    3. Finally, you can move on to specifying transactions formally too. This should
    avoid all ambiguities when software is developed to implement the business logic
    of a WoD application.


    You’ll get the biggest gains from step 1. It ensures that there is a documented
    single truth of the meaning (semantics) of the database design, which in turn
    makes certain that all software developers will understand and therefore use the
    database design in the same way.


    Once you formally specify the database design, a good implementation of the database
    design becomes possible. We’ve discussed various strategies for implementing the
    important part of every database design: the data integrity constraints.


    Implementing data constraints declaratively is easy. Implementing data constraints
    procedurally is by far not a trivial task (as discussed in Chapter 11). It’s time
    consuming and will produce more lines of complex procedural code than you might
    have expected (part of which can be generated, though). The current status of
    DBMS technology, such as Oracle’s SQL DBMS, enables us to implement database designs
    in a robust way; that is, including the DI code for all data integrity constraints
    in a triggered procedural way.


    Still, few database professionals actually do this. Why? Probably because designing
    DI code that is fully detached from BL code (the triggered procedural strategy)
    is indeed truly complex given the current state of DBMSes available to us. However,
    this neglects the big picture. Failing to fully detach DI code from BL code implies
    not being able to efficiently maintain and manage the DI code and thus the constraints.


    We should not underestimate the gains we receive once all DI code is implemented
    separately. Data integrity constraints have then finally become manageable. There
    is an interesting opportunity for DBMS vendors to evolve their products into data
    integrity constraint engines.


    It is up to the scientific world to come up with more meaningful subclasses of
    constraints first.


    The DBMS vendors, in their turn, should then provide us with new declarative constructs
    at the DBMS level to implement these easily.


    Once more declarative constructs are available, there is not only a huge potential
    of much more rapid construction of WoD applications, but also the potential of
    achieving considerable savings in the cost of maintaining such an application.


    # PART 4: Appendixes


    ## APPENDIX A: Formal Definition of Example Database


    In this appendix, we deliver the formal specification of the example database
    design used throughout this book.


    The section “Bird’s Eye Overview” provides a bird’s-eye overview of the example
    database; it shows a picture of the ten tables with their relationships, and it
    provides brief informal descriptions of those tables and relationships.


    We then present you with a definition of the *database skeleton* `DB_S`. In the
    section “Database Skeleton `DB_S`” you can find the involved attributes for each
    table, including a brief description for each attribute.


    The biggest section of this appendix is the section “Table Universe Definitions,”
    providing the ten *table universe* definitions. For each table, you’ll find the
    table universe specification that formally defines all attribute, tuple, and table
    constraints that are applicable for that table, alongside the external predicate
    (describing the meaning of the table to the user).


    The appendix ends with the definition of the *static* database constraints through
    a specification of the *database universe* `DB_UEX` in the section “Database Universe
    `DB_UEX`,” followed by the *dynamic* constraints through a specification of the
    *state transition universe* `TX_UEX` in the section “State Transition Universe
    `TX_UEX`.” The following table summarizes the structure of this appendix and shows
    how the specification of the example database design is built up, starting from
    a skeleton all the way up to a database and state transition universe.


    **Table A-1.** Appendix Structure


    | Section | Specifies | Description |

    |---------|-----------|-------------|

    | “Database Skeleton `DB_S`” | `DB_S` | Lists the table and column names |

    | “Table Universe Definitions” | `tab_XXX` | Provides the characterization, tuple
    universe, and table universe for each of the ten tables |

    | “Database Characterization `DBCH`” | `DBCH` | Maps each table to its table universe
    |

    | “Database Universe `DB_UEX`” | `DB_UEX` | Lists all static database constraints
    |

    | “State Transition Universe `TX_UEX`” | `TX_UEX` | Lists all dynamic database
    constraints |


    ### Bird’s Eye Overview'
