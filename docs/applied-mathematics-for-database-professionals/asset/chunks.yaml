    and r.COURSE = c.CODE


    and o2.STATUS = ''CONF''


    and to_char(o2.STARTS,''YYYY'') = ''2006''


    and e.JOB = ''TRAINER'')


    Note the additional conjunct (the one with comment /* course was offered in 2006
    */) inside the specification of FEa to ensure that the universal quantification
    inside the first conjunct does not involve the empty set.


    Specification FEb takes care of this by stating that the cardinality of all distinct
    trainers, who have given an offering in 2006 for the course, is at least one.
    By stating that this cardinality should be exactly one, you specify that the course
    was given by no more than one trainer.


    You can translate both formal specifications into SQL; FEa requires a rewrite
    of the universal quantifier.


    Listing 9-11 finds all departments that violate the employee table constraint
    stating that departments that employ the president or a manager should also employ
    at least one administrator.


    7451CH09.qxd 5/7/07 11:28 AM Page 216


    **216**


    C H A P T E R 9 **■** D ATA R E T R I E VA L


    **Listing 9-11.** *Query EXQ11(dbs)*


    **FEa**: { d | d∈dbs(DEPT) ∧


    (∃e1∈dbs(EMP): e1(DEPTNO)=d(DEPTNO) ∧


    e1(JOB)∈{''PRESIDENT'',''MANAGER''}) ∧


    ¬(∃e2∈E: e2(DEPTNO)=d ∧ e2(JOB) = ''ADMIN'' ) }


    **FEb**: { d | d∈dbs(DEPT) ∧


    (∃e1∈dbs(EMP): e1(DEPTNO)=d(DEPTNO) ∧


    e1(JOB)∈{''PRESIDENT'',''MANAGER''}) ∧


    (∀e2∈dbs(EMP): e2(JOB)=''ADMIN'' ⇒ e2(DEPTNO)≠d(DEPTNO)) }


    **SEI**: select d.*


    from DEPT d


    where exists(select e1.*


    from EMP e1


    where e1.DEPTNO = d.DEPTNO


    and e1.JOB in (''PRESIDENT'',''MANAGER''))


    and not exists(select e2.*


    from EMP e2


    where e2.DEPTNO = d.DEPTNO


    and e1.JOB = ''ADMIN'')


    Listing 7-26 introduced the formal specification for this table constraint. Using
    this specification, you can derive the formal expression for query EXQ11\. Because
    you want to find departments that violate this constraint, all you have to do
    is negate the constraint specification; just prefix the specification with ¬.


    Here it is (note that in this specification, free variable E represents an employee
    table):


    ¬(∀d∈{ e1(DEPTNO) | e1∈E }:


    (∃e2∈E: e2(DEPTNO)=d ∧ e2(JOB)∈{''PRESIDENT'',''MANAGER''} )


    ⇒


    (∃e3∈E: e3(DEPTNO)=d ∧ e3(JOB)=''ADMIN'' ) )


    If you then rewrite this specification by bringing the negation into the quantification,
    you end up with the following specification (verify this for yourself ): (∃d∈{
    e1(DEPTNO) | e1∈E }:


    (∃e2∈E: e2(DEPTNO)=d ∧ e2(JOB)∈{''PRESIDENT'',''MANAGER''} ) ∧


    ¬(∃e3∈E: e3(DEPTNO)=d ∧ e3(JOB)=''ADMIN'' ) )


    Formal expression FEa now follows straightforwardly from the preceding rewritten
    constraint specification. FEb is a rewrite of FEa; a universal quantifier replaces
    the negated existential quantifier.


    You can easily derive the SQL text (SEI) from specification FEa.


    **A Remark on Negations**


    You might have noticed that because SQL lacks universal quantification and implication,
    certain SQL expressions end up having more negations than their formally specified
    counterpart did. SEII of EXQ9 is a fine example of this; it contains a nested
    negated existential quantifier.


    7451CH09.qxd 5/7/07 11:28 AM Page 217


    C H A P T E R 9 **■** D ATA R E T R I E VA L


    **217**


    It is difficult to understand the meaning of such a query. The formal counterpart
    that employs the universal quantifier is easier to understand.


    In general we (humans) have difficulty understanding expressions that contain
    negations; the more negations, the more difficult it gets for us. Whenever you
    encounter negations in formal specifications, you should investigate the opportunity
    of rewriting such a specification into an expression holding fewer negations.
    You can use the rewrite rules introduced in Part 1


    of this book to achieve this.


    **■Note** By rewriting formal specifications such that they hold fewer negations,
    you not only help yourself; you also enable clearer informal specifications that
    your customer (the user) will definitely appreciate.


    Because they are so important, we list rewrite rules that involve negations once
    again here. Table 9-1 contains various alternatives for the De Morgan, implication,
    and quantifier rewrite rules.


    **Table 9-1.** *Rewrite Rules with Negations*


    **Expression**


    **Is Equivalent To**


    ¬¬A


    ⇔


    A


    ¬A ⇒ ¬B


    ⇔


    B ⇒ A


    ¬A ⇒ B


    ⇔


    ¬B ⇒ A


    A ⇒ ¬B


    ⇔


    B ⇒ ¬A


    A ⇒ ¬B


    ⇔


    (A ∧ B) ⇒ FALSE


    ¬A ∧ ¬B


    ⇔


    ¬( A ∨ B )


    A ∧ ¬B


    ⇔


    ¬( ¬A ∨ B )


    ¬A ∧ B


    ⇔


    ¬( A ∨ ¬B )


    ¬A ∨ ¬B


    ⇔


    ¬( A ∧ B )


    A ∨ ¬B


    ⇔


    ¬( ¬A ∧ B )


    ¬A ∨ B


    ⇔


    ¬( A ∧ ¬B )


    ¬(∃x∈X: ¬P(x))


    ⇔


    (∀x∈X: P(x))


    (∃x∈X: ¬P(x))


    ⇔


    ¬(∀x∈X: P(x))


    ¬(∃x∈X: P(x))


    ⇔


    (∀x∈X: ¬P(x))


    (∃x∈X: P(x))


    ⇔


    ¬(∀x∈X: ¬P(x))


    Sometimes you can get rid of a negation by using knowledge about the constraints
    of a database design. For instance, if you need to query all offerings that are
    not canceled, you can equivalently query all offerings that are either scheduled
    or confirmed. If o represents an offering tuple, then the following rewrite rule
    will apply:


    o(STATUS) ≠ ''CANC'' ⇔ o(STATUS)∈{''SCHD'',''CONF''}


    Here you use knowledge about the attribute value set of attribute STATUS.


    7451CH09.qxd 5/7/07 11:28 AM Page 218


    **218**


    C H A P T E R 9 **■** D ATA R E T R I E VA L


    If—in the course of rewriting expressions—you end up querying employees who don’t
    have a salary of less than 5000, it might be better to query the employees who
    have a salary equal to or more than 5000 instead. The following rewrite rule applies
    (e represents an employee tuple):


    ¬(e(MSAL) < 5000) ⇔ e(MSAL) ≥ 5000


    Our brains dislike negations. Try to avoid negations by rewriting expressions
    into expressions containing fewer negations. This is not only true for query specifications,
    but also for constraint specifications (in previous chapters), and data manipulation
    specifications (in the next chapter).'
