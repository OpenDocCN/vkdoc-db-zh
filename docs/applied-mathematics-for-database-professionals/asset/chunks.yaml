    { ( `STUD`; `EMPNO_TYP` )

    , ( `COURSE`; `CRSCODE_TYP` )

    , ( `STARTS`; `date` )

    /* -1：评估为时过早（课程在未来） */

    /* 0：参与者未评估 */

    /* 1-5：常规评估值（1=差 到 5=优秀） */

    , ( `EVAL`; `[-1..5]` )

    }


    ## 代码清单 7-11. 特征化 chr_HIST


    `chr_HIST` :=

    { ( `EMPNO`; `EMPNO_TYP` )

    , ( `UNTIL`; `date` )

    , ( `DEPTNO`; `DEPTNO_TYP` )

    , ( `MSAL`; `SALARY_TYP` )

    }


    请注意，在代码清单 7-9 中，属性 `TRAINER` 的属性值集除了包含有效的员工编号外，还包含一个特殊值 -1。该值代表尚未分配培训师的事实。在我们正式的数据库设计规范方法中，不存在
    SQL 数据库管理系统中常被（误）用作表示缺失值的 `NULL` 这种“值”。元组内部没有缺失值；它们总是为每个属性关联一个值。特征化指定了可以从中选择这些值的属性值集。因此，要表示一个“缺失的培训师”值，你必须在相应的属性值集中显式地为此事实包含一个值。代码清单
    7-10 中 `EVAL` 属性的属性值集也指定了类似的内容。


    **注意：** 附录 F 将专门处理 `NULL` 现象。第 11 章在解决数据库设计实现问题并提供指导原则时，将重新讨论这些 -1 值。


    我们的数据库设计规范始于一个骨架定义以及骨架引入的表结构的外部谓词。在本节中，你了解了示例数据库设计的特征化。通过属性值集，你正在逐步深入地理解这个数据库设计的含义。


    下一节将把这一理解推进到下一层：元组全域。


    # 元组全域


    元组全域是一个（非空的）元组集合。这是一个非常特殊的元组集合；该集合旨在仅包含对给定表结构可接受的元组。你现在知道元组是用函数表示的。例如，这里有一个示例函数
    `tdept1`，它代表 `DEPT` 表结构的一个可能元组：


    `tdept1` := `{(DEPTNO;10), (DNAME;''ACCOUNTING''), (LOC;''DALLAS''), (MGR;1240)}`


    如你所见，`tdept1` 的定义域代表了数据库骨架 `DB_S` 引入的表结构 `DEPT` 的属性集合。


    `dom(tdept1)` = `{DEPTNO, DNAME, LOC, MGR}` = `DB_S(DEPT)`


    并且，对于每个属性，`tdept1` 都从 `DEPT` 表结构的特征化引入的相应属性值集中产生一个值：

    - `tdept1(DEPTNO)` = 10，它是 `chr_DEPT(DEPTNO)` 的一个元素

    - `tdept1(DNAME)` = ''ACCOUNTING''，它是 `chr_DEPT(DNAME)` 的一个元素

    - `tdept1(LOCATION)` = ''DALLAS''，它是 `chr_DEPT(LOCATION)` 的一个元素

    - `tdept1(MGR)` = 1240，它是 `chr_DEPT(MGR)` 的一个元素


    这是 `DEPT` 表结构的另一个可能元组：`tdept2` := `{(DEPTNO;20), (DNAME;''SALES''), (LOC;''HOUSTON''),
    (MGR;1755)}`


    现在考虑集合 `{tdept1, tdept2}`。这是一个包含两个元组的集合。理论上它可能代表 `DEPT` 表结构的元组全域。然而，这是一个相当小的元组全域；它不太可能代表
    `DEPT` 表结构的元组全域。对于给定表结构的元组全域应该包含我们为该表结构允许（接受）的*每一个*元组。


    **注意：** 元组 `tdept1` 和 `tdept2` 是共享相同定义域的函数。这是对元组全域的要求；元组全域中的所有元组都共享相同的定义域，该定义域又等于给定表结构的标题。'
- fmt: 'You have already seen how you can generate a set that holds every possible
    tuple for a given table structure using the characterization of that table structure
    (see the section “Table Construction” in Chapter 5). If you apply the generalized
    product to a characterization, you’ll end up with a set of tuples. This set is
    not just any set of tuples, but it is precisely the set of *all possible* tuples
    based on the attribute value sets that the characterization defines.


    Let us illustrate this once more with a small example. Suppose you’re designing
    a table structure called `RESULT`; it holds average scores for courses followed
    by students that belong to a certain population. Here’s the external predicate
    for `RESULT`: “The rounded average score scored by students of population `POPULATION`
    for course `COURSE` is `AVG_SCORE`.”


    ### Listing 7-12. Characterization `chr_RESULT`


    `chr_RESULT` :=

    { ( `POPULATION`; {''DP'',''NON-DP''} )

    /* DP = Database Professionals, NON-DP = Non Database Professionals */

    , ( `COURSE`; {''set theory'',''logic''} )

    , ( `AVG_SCORE`; {''A'',''B'',''C'',''D'',''E'',''F''} )

    }


    The three attribute value sets represent the attribute constraints for the `RESULT`
    table structure. If you apply the generalized product `∏` to `chr_RESULT`, you
    get the following set of possible tuples for the `RESULT` table structure:


    ```

    ∏(chr_RESULT) =

    { { (POPULATION; ''DP''), (COURSE; ''set theory''), (AVG_SCORE; ''A'') }

    , { (POPULATION; ''DP''), (COURSE; ''set theory''), (AVG_SCORE; ''B'') }

    , { (POPULATION; ''DP''), (COURSE; ''set theory''), (AVG_SCORE; ''C'') }

    , { (POPULATION; ''DP''), (COURSE; ''set theory''), (AVG_SCORE; ''D'') }

    , { (POPULATION; ''DP''), (COURSE; ''set theory''), (AVG_SCORE; ''E'') }

    , { (POPULATION; ''DP''), (COURSE; ''set theory''), (AVG_SCORE; ''F'') }

    , { (POPULATION; ''DP''), (COURSE; ''logic''), (AVG_SCORE; ''A'') }

    , { (POPULATION; ''DP''), (COURSE; ''logic''), (AVG_SCORE; ''B'') }

    , { (POPULATION; ''DP''), (COURSE; ''logic''), (AVG_SCORE; ''C'') }

    , { (POPULATION; ''DP''), (COURSE; ''logic''), (AVG_SCORE; ''D'') }

    , { (POPULATION; ''DP''), (COURSE; ''logic''), (AVG_SCORE; ''E'') }

    , { (POPULATION; ''DP''), (COURSE; ''logic''), (AVG_SCORE; ''F'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''set theory''), (AVG_SCORE; ''A'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''set theory''), (AVG_SCORE; ''B'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''set theory''), (AVG_SCORE; ''C'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''set theory''), (AVG_SCORE; ''D'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''set theory''), (AVG_SCORE; ''E'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''set theory''), (AVG_SCORE; ''F'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''logic''), (AVG_SCORE; ''A'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''logic''), (AVG_SCORE; ''B'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''logic''), (AVG_SCORE; ''C'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''logic''), (AVG_SCORE; ''D'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''logic''), (AVG_SCORE; ''E'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''logic''), (AVG_SCORE; ''F'') }

    }

    ```


    In this set of 24 tuples, the previously defined attribute constraints will hold.
    However, no restrictions exist in this set with regards to *combinations* of attribute
    values of different attributes inside a tuple. By specifying *inter-attribute*—or
    rather, *tuple constraints*—you can restrict the set of possible tuples to the
    set of *admissible* tuples for the given table.


    Suppose that you do not allow average scores D, E, and F for database professionals,
    nor average scores A and B for non-database professionals (regardless of the course).
    You can specify this by the following definition of tuple universe `tup_RESULT`;
    it formally specifies two *tuple predicates*:


    `tup_RESULT` :=

    { r | r∈Π(`chr_RESULT`) ∧

    /* ============================ */

    /* Tuple constraints for RESULT */

    /* ============================ */

    /* Database professionals never score an average of D, E or F */'
