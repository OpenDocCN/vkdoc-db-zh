    SQL 要求被引用的属性集构成一个键。在上述例子中，确实如此；`DEPTNO` 在 `DEPT` 中是唯一标识。然而，在以下情况——要求 PSSR7——`LOC`\
    \ 在 `DEPT` 中不构成键。因此，你不能通过声明外键来实现 PSSR7。\n\n`7451CH11.qxd 5/15/07 2:26 PM Page\
    \ 292`\n\nPSSR7(OFFR,DEPT) :=\n\n/* 课程在我们有部门的地点进行 */\n\n{ o(LOC) | o∈OFFR } ⊆\
    \ { d(LOC) | d∈DEPT }\n\n如果你尝试以下 `alter table` 命令，SQL 数据库管理系统将报错：\n\n```sql\n\
    -- 因为 dept(loc) 不是键，所以无效。\nalter table offr add constraint offr_fk_dept\nforeign\
    \ key(loc) references dept(loc);\n```\n\n还有其他一些情况，无法使用外键来声明性地实现子集要求。示例数据库设计中的一些子集要求引用被引用表结构中的\
    \ *子集* 元组；这很常见。这里有一个例子：\n\nPSSR2(DEPT,EMP) :=\n\n/* 部门经理是已知员工，不包括管理员和总裁 */\n\n\
    { d(MGR) | d∈DEPT } ⊆\n\n{ e(EMPNO) | e∈EMP ∧ e(JOB) ∉ {'ADMIN','PRESIDENT'} }\n"
- fmt: 'You can declare a foreign key from `DEPT` to `EMP` as follows: `alter table
    offr add constraint offr_fk_dept foreign key(loc) references dept(loc);`


    This foreign key will enforce that only known employees are referenced; it will
    still allow administrators or the president to manage a department. There is no
    declarative possibility to specify that a subset of the employees is only allowed
    to be referenced; you’ll need to write additional procedural code for this.


    A similar restriction applies to the cases where only a subset of the rows needs
    to reference the key values in rows of another table. This is the case in subset
    requirement `PSSR8`: `PSSR8(OFFR,EMP) :=`


    `/* Trainer of course offering is a known trainer */`


    ```

    { o(TRAINER) | o∈OFFR ∧ o(TRAINER) ≠ -1 } ⊆

    { e(EMPNO) | e∈EMP ∧ e(JOB) = ''TRAINER'' }

    ```


    It is not possible to declare to the DBMS that only the subset of `OFFR` rows
    where `TRAINER≠-1` each references a known trainer.


    There is a trick that you can apply in this case, though. By choosing to use a
    `NULL` instead of value `-1` as a means to represent that no trainer has been
    assigned yet, you enable yourself to declare a foreign key, at least, to enforce
    that trainer assignments reference a known employee. Again, you still need to
    develop additional procedural code to implement the restriction at the other end
    (only employees where `JOB=''TRAINER''` are allowed to be referenced).


    Now let’s spend a little time investigating this; before you build additional
    procedural code, it would be wise first to think about what the remaining predicate
    to be implemented would be here (given that the foreign key already does some
    work to implement `PSSR8`). To be more precise, can you rewrite `PSSR8` into a
    conjunction where one conjunct covers exactly what the foreign key already implements
    declaratively, and the other conjunct covers what remains to be implemented procedurally?
    Here it is.


    7451CH11.qxd 5/15/07 2:26 PM Page 293


    ## C H A P T E R 1 1 ■ I M P L E M E N T I N G D A T A B A S E D E S I G N S I
    N O R A C L E


    293


    ```

    (∀o∈OFFR: o(TRAINER)≠-1 ⇒ (∃e∈EMP: e(empno)=o(trainer))) ∧

    (∀t∈(OFFR◊◊{(trainer;empno)})⊗EMP: t(job)=''TRAINER'')

    ```


    The preceding first conjunct states that for every offering the assigned trainer
    should be a known employee; this represents what the foreign key implements. The
    second conjunct states that for all tuples in the join of `OFFR` (which requires
    attribute renaming) and `EMP`, the `JOB` attribute should hold value `''TRAINER''`;
    this represents what remains to be implemented procedurally. By the way, do you
    recognize the predicate pattern of the second conjunct? It is in fact a tuple-in-join
    predicate.


    ### ■Note


    You’ll probably intuitively comprehend that the second predicate is exactly what
    remains to be implemented procedurally for `PSSR8`. It is worth mentioning that
    you could actually formally prove that the preceding conjunction is logically
    equivalent with the `PSSR8` predicate. It requires the development of more rewrite
    rules with regards to quantifiers, and a few concepts with regards to how formal
    proofs are to be set up (both of which we haven’t done in this book).


    Procedurally implementing database constraints is done in a similar way as table
    constraints; it just requires developing more triggers because multiple table
    structures are involved now. Take a look at `Listing 11-40`. It lists all necessary
    triggers using `EM6` (including serialization logic) for implementing the remaining
    tuple-in-join predicate listed earlier to complete the `PSSR8` implementation.
    In this case, you require an after statement update trigger on the `EMP` table
    structure, and an after `INSERT` statement trigger together with an after statement
    update trigger on the `OFFR` table structure.


    `Listing 11-40` does not list the necessary global temporary table, pre-statement
    trigger, after row triggers, and view definitions to maintain the transition effect
    views; you need to set these up for both the `OFFR` and `EMP` table structures
    in a similar way, as shown in `Listing 11-33`.'
