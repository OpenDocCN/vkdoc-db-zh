    ∅) ⇔ (#(A − B) = 0)`


    你现在检查的是 `A` 减 `B` 的差集的基数是否为零，而不是检查其是否代表空集。前面的重写规则已应用于 `FEa`，最终得到 SQL 表达式 `SEI`。


