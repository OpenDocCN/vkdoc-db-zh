    Using the transition effect, you can now precisely code when the constraints need
    to be validated on execution of INSERT statements or DELETE statements:


    • *For inserts*: Only when the statement inserts a president or a manager should
    you need to check whether there is an administrator (in the same department).


    • *For deletes*: Only when the statement deletes an administrator should you need
    to check whether there (still) is another administrator, in case the department
    employs a manager or president.


    In all other cases of INSERT or DELETE statements, it is not required to validate
    constraint EMP_TAB03.


    In Listing 11-34 you can find the modified insert and delete triggers. These now
    first query the transition effect to verify if one of the preceding properties
    is TRUE, and if so, only then execute the query that validates constraint EMP_TAB03.


    **Listing 11-34.** *EM5’s More Efficient Insert and Delete Triggers for Constraint
    EMP_TAB03*


    create trigger EMP_AIS_TAB03


    after insert on EMP


    declare pl_dummy varchar(40);


    begin


    -- If this returns no rows, then EMP_TAB03 cannot be violated.


    select ''EMP_TAB03 must be validated'' into pl_dummy


    from DUAL


    where exists (select ''A president or manager has just been inserted''


    from v_emp_ite


    where JOB in (''PRESIDENT'',''MANAGER''));


    --


    begin


    --


    select ''Constraint EMP_TAB03 is satisfied'' into pl_dummy


    from DUAL


    where not exists(select d.DEPTNO


    from EMP d


    where exists(select e2.*


    from EMP e2


    where e2.DEPTNO = d.DEPTNO


    and e2.JOB in (''PRESIDENT'',''MANAGER''))


    and not exists(select e3.*


    from EMP e3


    where e3.DEPTNO = d.DEPTNO


    and e3.JOB = ''ADMIN''));


    --


    exception when no_data_found then


    --


    raise_application_error(-20999,''Constraint EMP_TAB03 is violated.'');


    --


    end;


