    **State Transition Universe TX_UEX**


    The *state transition universe* TX_UEX is defined by first generating the Cartesian
    product of the database universe DB_UEX (as defined in the section “Database Universe
    DB_UEX” of this appendix) with itself. You can view the result of this Cartesian
    product as the set of all possible transactions. In this state transition universe
    TX_UEX, every transaction is depicted as an ordered pair (b;e), where b stands
    for the database state in which the transaction began and e stands for the database
    state in which the transaction ends. As you can see in Listing A-34, the definition
    of TX_UEX restricts this set to hold only *valid* transactions, through specifying
    the *dynamic* (also called *state transition* or *transaction*) constraints.


    **■Note** In this section we use sysdate to denote the moving point “now.”


    **Listing A-34.** *Transaction Universe TX_UEX*


    **TX_UEX :=**


    { (b;e) | b∈DB_UEX ∧ e∈DB_UEX ∧


    **/* Monthly salary can only increase r66 */**


    ( ∀e1∈b(EMP), e2∈e(EMP):


    e1(EMPNO) = e2(EMPNO) ⇒ e1(MSAL) ≤ e2(MSAL)


    ) ∧


    **/* New offerings must start with status SCHED r67 */**


    ( ∀o1∈e(OFFR)⇓{COURSE,STARTS} − b(OFFR)⇓{COURSE,STARTS}:


    ↵{ o2(STATUS) | o2∈e(OFFR) ∧ o2↓{COURSE,STARTS} = o1↓{COURSE,STARTS} }


    = ''SCH''


