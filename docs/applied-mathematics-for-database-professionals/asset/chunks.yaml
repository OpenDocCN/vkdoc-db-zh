    **Completing the Example Database Design**


    Let’s now demonstrate all this by specifying state transition constraints for
    the example database design that was introduced in the previous chapter. Listing
    8-7 introduces the formal specification of state transition universe ST_UEX. As
    you can see, it builds on the DB_UEX database universe that was specified in Chapter
    7\. The definition of ST_UEX introduces the state transition constraints for our
