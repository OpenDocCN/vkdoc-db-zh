    ## 有序对与笛卡尔积


    如果一个集合包含两个元素，这两个元素的顺序是无关紧要的。例如，集合`{1,2}`与集合`{2,1}`是相同的。另一方面，在几何学中，我们通常用`x`和`y`坐标来表示点，其中坐标的顺序很重要。如果交换一个给定点的`x`和`y`坐标（假设它们值不相同），你会得到一个不同的点。


    ### 有序对


    本节介绍有序对的概念，允许你对两个配对值的顺序进行区分。我们使用一种特殊的符号表示，如定义2-10所示。


    **■定义2-10：有序对** 一个有序对是一对元素，例如`a`和`b`，其中顺序很重要。符号表示为`(a;b)`。


    有序对的概念在本书中很重要。这不仅是因为我们将使用有序对来引入笛卡尔乘积运算符；更重要的是，在第4章中，我们将需要用它们来引入二元关系和函数，这反过来又将用于表示*元组*（我们注意到这个词的发音与“couples”押韵）。


    **■注** 通常使用逗号作为有序对元素的序列化运算符。一个有序对将被描述为`(a,b)`。然而，由于逗号已经被大量用于分隔枚举指定集合的元素，本书使用分号来分隔有序对的元素。这使得各种表达式更易于阅读。


    有序对的两个元素也被称为该有序对的第一和第二*坐标*。由于有序对的坐标顺序很重要，因此成立以下两个性质：


    `(a ≠ b) ⇔ ( (a;b) ≠ (b;a) )`


    `( (a;b) = (c;d) ) ⇔ ( (a = c) ∧ (b = d) )`


    前面等式中的第二个性质也称为“相等公理”。


    使用德·摩根重写规则，你也可以如下指定此公理：

    `( (a;b) ≠ (c;d) ) ⇔ ( (a ≠ c) ∨ (b ≠ d) )`


    **■注** 就像集合中的元素一样，有序对中配对的两个值可以是任意复杂的。例如，`(A;{1,2,3})`是一个有效的有序对。这个对以`A`作为其第一坐标，以集合`{1,2,3}`作为其第二坐标。


    我们引入运算符`π1`和`π2`来从有序对中检索第一和第二坐标。对于一个给定的有序对——例如`(a;b)`——第一坐标可以使用表达式`π1(a;b)`检索，结果为`a`；第二坐标可以通过表达式`π2(a;b)`检索，结果等于`b`。


    ### 笛卡尔积


    两个给定集合的笛卡尔积现在可以使用有序对来定义，如定义2-11所示。


    **■定义2-11：笛卡尔积** 两个给定集合`A`和`B`的笛卡尔积，记作`A×B`，等于`{ (a;b) | a∈A ∧ b∈B }`。


    也就是说，笛卡尔积`A×B`是你可以通过从集合`A`中选择一个第一坐标、从集合`B`中选择一个第二坐标来构造的所有有序对的集合。让我们看一个例子。假设给定以下集合：

    ```

    A := {1,2,3}

    B := {3,4}

    ```

    那么

    ```

    A×B = { (1;3), (1;4), (2;3), (2;4), (3;3), (3;4) }

    ```

    并且

    ```

    B×A = { (3;1), (3;2), (3;3), (4;1), (4;2), (4;3) }

    ```

    这个例子清楚地表明，`A×B`通常*不*等同于`B×A`。换句话说，笛卡尔积运算符不是交换的。你甚至可以证明，在`A×B`和`B×A`相同的情况下，`A`和`B`必须相等（反之亦然）：

    `( A×B = B×A ) ⇔ ( A = B )`


    另请注意，两个示例集合`A`和`B`包含*数字*作为其元素，而两个笛卡尔积的结果包含*有序对*。在这方面，笛卡尔积显然不同于我们之前讨论的运算符。并、交和差运算符都是重复（或省略）其操作数的元素；它们不会创建新类型的元素。


    因为笛卡尔积从两个有限输入集中产生两个坐标的所有可能组合，所以以下性质也相当直观（也见前面的例子）：

    `#A×B = #A * #B`


    笛卡尔积的基数等于两个操作数基数的乘积。最后但并非最不重要的一点是，别忘了检查空集：`A×∅ = ∅×A = ∅`


    ## 求和运算符


    我们通过建立求和运算符（见定义2-12）来结束这个集合论的导论章节。使用求和运算符，你可以对给定集合中的每个元素计算一个数值表达式，并计算所有这些计算结果的和。


    **■定义2-12：求和运算符（SUM）** 数值表达式`f(x)`的和，其中`x`取自给定集合`S`，表示如下：

    `( SUM x∈S: f(x) )`


    对于可以从集合`S`中选择的每个元素`x`，求和运算符计算表达式`f(x)`并计算所有这些计算结果的和。如果`S`代表空集，那么（根据定义）求和运算符返回数值`0`。


    这里有几个例子：

    ```

    ( SUM x∈{ -1, 2, 5 }: x )

    ( SUM x∈{ -1, 2, 5 }: 1 )

    ( SUM n∈{ x| x∈N ∧ x ≤ 4 }: 2*n )

    ( SUM p∈{ (A;1), (B;1), (C;5) }: π2(p) )

    ```


    第一个例子对值-1、2和5求和。结果是6。第二个例子是计算集合`{ -1, 2, 5 }`基数的某种复杂方式；它对集合中的每个元素求值1，结果为3。第三个例子计算和`2*0
    + 2*1 + 2*2 + 2*3 + 2*4`，结果为20。第四个例子计算`1 + 1 + 5`，结果为7。


    ## 一些方便的集合简写表示法


    我们在数据库世界中经常使用一些（有限的）集合：日期、数字和字符串。因此，我们引入表2-4中列出的集合指定简写。


    **表2-4.** *一些方便的集合指定简写*


    | 简写 | 定义 |

    | :--- | :--- |

    | `date` | `{ d \| d 是一个介于公元前4712年1月1日和公元4712年12月31日之间的日期 }` |

    | `number(p,s)` | `{ n \| n 是一个精度为p、标度为s的有效数字 }` |

    | `varchar(n)` | `{ s \| s 是一个长度至少为1、最多为n个字符的字符串 }` |

    | `[n..m]` | `{ x∈Z \| x ≥ n ∧ x ≤ m }` |


    如你所见，这种简写与SQL数据库管理系统支持的常见数据类型有着相当明显的相似之处。对于`date`简写，定义的边界是至少一个常见DBMS供应商所实现的边界。表2-4中的最后一个简写允许你指定整数的闭区间。'
