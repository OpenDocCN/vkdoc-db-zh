  \n通常，你会发现嵌入在`wBL`代码中的代码，其特定目的是验证将要执行的事务不会导致违反任何相关数据完整性约束的状态。我们认为这种约束验证代码不属于`wBL`代码类，而是属于下一节讨论的*数据完整性代码*类。\n\
  \n**数据完整性代码（DI 代码）**\n\n数据完整性代码是所有处理验证数据完整性约束持续有效性的*声明式*或*过程式*代码。每当`wBL`代码执行事务时，作为此类事务一部分执行的数据操作语句可能违反数据完整性约束。如果确实如此，数据完整性代码将确保此类语句失败，并且回滚其所做的更改。\n\
  \n**注意** 我们特意将`DI`代码视为一个独立的类，而不是业务逻辑代码类的一部分。大多数其他涉及*业务逻辑*的书籍和文章常常模糊不清`DI`代码是否被视为业务逻辑的一部分。\n\
  \n对于大多数数据完整性约束——实际上是除了属性约束和元组约束之外的所有约束——`DI`代码将必须执行数据检索代码（查询）来确定给定的数据操作语句是否被允许。对于多元组约束，`DI`代码总是需要执行查询（检查其他涉及的行）以验证产生的数据库状态是否仍然满足所有数据完整性约束。\n\
