  `V := {1,2,3}`


  `W := {1,{2,3},4}`


  那么，`V` 的幂集如下所示：


  `℘V = { ∅, {1},{2},{3}, {1,2},{1,3},{2,3}, {1,2,3} }`


  而 `W` 的幂集如下所示：


  `℘W = { ∅`




  , {1},{{2,3}},{4}


  , {1,{2,3}},{1,4},{{2,3},4}


  , {1,{2,3},4}


  }


  注意，集合 `V` 本身是 `V` 的幂集中的一个元素，空集也是——正如我们之前提到的，这是子集的两个重要特性。请根据以下相同的两个集合 `V` 和 `W`，自行验证以下命题是否全部为真：


  `{2,3} ∈ ℘V`


  `{2,3} ∈ W`


  `{1,{2,3}} ∈ ℘W`


  `℘∅ = {∅}`


  ## ■注意


  空集是每个幂集的元素；这意味着即使是空集的幂集也*不是*空的，正如前面示例中最后一个命题所示。


