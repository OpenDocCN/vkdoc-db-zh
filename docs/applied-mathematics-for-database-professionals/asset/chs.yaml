  参见代码清单 2-6 中一些关于子集的命题示例；请自行验证它们都为真。


  ##### 代码清单 2-6：为真的子集命题示例


  ```

  {1,2} ⊆ {1,2,3}

  {1,2} ⊂ {1,2,3}

  {1,2,3} ⊄ {1,2,3}

  {1,2,3} ⊆ {1,2,3}

  ∅ ⊆ {1,2,3}

  ```


  代码清单 2-6 的最后两个例子很有趣，因为它们说明了子集的以下两个重要性质：


  - 每个集合都是其自身的子集：`A ⊆ A`

  - 空集是每个集合的子集：`∅ ⊆ A`


  这里值得提及的另外两个子集性质是：


  - 传递性：`( ( A ⊆ B ) ∧ ( B ⊆ C ) ) ⇒ ( A ⊆ C )`

  - 相等性：`( A = B ) ⇔ ( ( A ⊆ B ) ∧ ( B ⊆ A ) )`


  ##### 并集、交集与差集


  你可以对集合应用各种运算。最著名的集合算子是 `并集`、`交集` 和 `差集`。对于差集算子，我们有两种变体：常规差集和对称差集。表 2-2 展示了这四种算子的正式定义和对应的数学符号。


  ##### 表 2-2：常见集合算子


  | 名称                 | 符号 | 定义                                           |

  |----------------------|------|------------------------------------------------|

  | 并集                 | `∪`  | `A ∪ B = { x | x∈A ∨ x∈B }`                    |

  | 交集                 | `∩`  | `A ∩ B = { x | x∈A ∧ x∈B }`                    |

  | 差集                 | `–`  | `A – B = { x | x∈A ∧ x∉B }`                    |

  | 对称差集             | `÷`  | `A ÷ B = ( A – B ) ∪ ( B – A )`                |


  图 2-2 展示了对应的韦恩图；灰色区域表示两个集合 `A` 和 `B` 的并集、交集、差集和对称差集。


  ##### 图 2-2：并集、交集和差集的韦恩图


  让我们看一个例子。假设给定以下两个集合 `A` 和 `B`：

  ```

  A := {1,3,5}

  B := {3,4,5,6}

  ```


  那么 `A` 和 `B` 的并集、交集、差集和对称差集如下：


  - `A ∪ B = { x | x∈A ∨ x∈B } = {1,3,4,5,6}` = 区域 I、II 和 III

  - `A ∩ B = { x | x∈A ∧ x∈B } = {3,5}` = 区域 II

  - `A – B = { x | x∈A ∧ x∉B } = {1}` = 区域 I

  - `B – A = { x | x∈B ∧ x∉A } = {4,6}` = 区域 III

  - `A ÷ B = ( A–B ) ∪ ( B–A ) = {1,4,6}` = 区域 I 和 III


  ##### 图 2-3：A (集合 {1,3,5}) 和 B (集合 {3,4,5,6}) 的韦恩图


  通常，算子的一个重要性质是 `闭包性质`。如果一个算子在某个给定集合上的运算结果总是属于该集合的（另一个）元素，则称该算子在该集合上是封闭的。


  本节介绍的集合算子结果总是集合。并集、交集和（对称）差集被称为 `在集合上是封闭的`。下一节将讨论集合算子的更多性质。


  #### 集合算子的性质


  就像我们在前一章研究了逻辑连接词的各种性质一样，我们也可以对集合算子做同样的事情。表 2-3 展示了关于四种集合算子性质的一些结论。


  ##### 表 2-3：集合算子的性质


  | 性质         | 集合算子                       |

  |--------------|-------------------------------|

  | 交换律       | `A ∪ B = B ∪ A`               |

  |              | `A ∩ B = B ∩ A`               |




  A ÷ B = B ÷ A


  ###### 结合律 (Associativity)


  ( A ∪ B ) ∪ C = A ∪ ( B ∪ C )


  ( A ∩ B ) ∩ C = A ∩ ( B ∩ C )


  ###### 分配律 (Distributivity)


  A ∪ ( B ∩ C ) = ( A ∪ B ) ∩ ( A ∪ C )


  A ∩ ( B ∪ C ) = ( A ∩ B ) ∪ ( A ∩ C )


  请注意，常规的差集运算符*不是*交换的。


