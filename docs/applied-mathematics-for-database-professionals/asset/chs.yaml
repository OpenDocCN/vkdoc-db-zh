  \ DBMS`中实现`DI`代码的上述策略的简要探讨。我们还将讨论一些相关主题。\n\n**替代实现策略**\n\n如前一节所述，当事务执行时，你应该运行`DI`代码以验证所有数据完整性约束是否仍然满足。当`WoD`应用程序试图执行事务时，有三种不同的策略来确保`DI`代码的执行：\n\
  - 声明式\n- 触发器过程式\n- 嵌入式过程式\n\n声明式\n\n### 第 11 章 在 Oracle 中实现数据库设计\n\n### 声明式策略\n\n\
  在*声明式*策略中，您只需向`DBMS`声明数据库设计中涉及的约束。`DBMS`随后会自动确保——希望是以一种高效的方式——当违规的`DML`语句试图创建违反任何已声明约束的数据库状态时，这些语句将被回滚。\n\
  \n请注意，为了能够向`DBMS`声明约束，您首先需要这些约束的（某种形式的）形式化规范，以精确说明约束的*内容*。声明式策略的优势在于，您只需告诉`DBMS`约束的*内容*是什么；也就是说，您无需编写任何`DI`代码。从本质上讲，向`DBMS`声明约束就构成了`DI`代码。\n\
  \n一旦您声明了一个约束，`DBMS`就面临着以何种方式高效检查该约束的挑战；它的任务是生成（希望）*高效*的`DI`代码，并确保在处理事务时，这些代码在适当的时间被自动执行。\n\
  \n##### 注意\n您将在本章中看到，上一句话中的“高效”一词是至关重要的。\n\nOracle 的`SQL DBMS`允许您以声明方式指定某些约束，可以作为`create\
  \ table`命令的一部分，也可以在表创建后通过`alter table add constraint`命令单独指定。\n\n从“实现属性约束”一节开始，您将找到可以声明指定的约束的完整介绍。作为预览，清单\
  \ 11-1 包含一个向已创建表添加约束的示例。它展示了用于声明清单 7-26（`EMP`表的宇宙）中第二个表约束的`SQL`语法，该约束声明：\n\n`{USERNAME}`是一个键。\n\
  \n### 清单 11-1. 使用`SQL`声明键\n```\nalter table EMP add constraint EMP_K2 unique (USERNAME);\n\
  ```\n\n通过前面的`alter table SQL`语句，您将`{USERNAME}`声明为`EMP`表结构的键。此命令允许您为约束命名（在上面的例子中，它被命名为`EMP_K2`）。如果您想删除此约束，就需要使用这个名称。\n\
  \n##### 注意\n如果您不提供名称，`DBMS`将为您生成一个。\n\n在本章的所有示例中，我们选择只使用`alter table add constraint`语句，以便逐步构建数据库设计的实现。您也可以选择将每个声明式添加的约束作为`create\
  \ table`语句的一部分来声明。您可以在线找到作为`create table`语句一部分的、声明`UEX`数据库设计约束的`SQL`表达式，网址为：`http://www.rulegen.com/am4dp`。\n\
  \n### 触发式过程策略\n\n在*触发式过程*策略中，您不向`DBMS`声明约束（*内容*）。相反，您的任务是自己编写过程化的`DI`代码（*方式*）。同时，您通过创建*触发器*来调用您的`DI`代码，从而告诉`DBMS`*何时*执行这些代码。您可以将触发器视为一段过程代码，`DBMS`将在某些事件发生时自动执行它。让我们更详细地解释一下。\n\
  \n##### 注意\n触发器可以用于多种目的。执行`DI`代码以强制执行数据完整性只是其中之一（也是本章我们将重点关注的目的）。\n\n每个触发器都与一个表结构相关联，并且每当事务对该表结构执行`DML`语句时，`DBMS`都会自动执行（*触发*）它。\n\
  \n然后，作为同一事务一部分执行的触发器代码可以检查新的数据库状态是否仍然满足所有约束。\n\nOracle 的`SQL DBMS`为每个表结构提供了`SQL`标准中定义的\
  \ 12 种不同类型的触发器：\n\n*   四种*插入触发器*：一种在`INSERT`语句开始执行前触发（称为*语句前插入触发器*），一种在实际插入行之前触发（*行前插入触发器*），一种在行插入后触发（*行后插入触发器*），最后一种在`INSERT`语句完成后触发（*语句后插入触发器*）。\n\
  *   四种*更新触发器*：类似于插入触发器，有四种类型的更新触发器——语句前、行前、行后和语句后。\n*   四种*删除触发器*：同样的四种类型。\n\n语句触发器（前和后）每个（触发）`DML`语句只会触发一次。\n\
  \n行触发器将根据`DML`语句影响的行数触发相应次数。\n\n例如，一个`UPDATE`语句增加了员工表中所有员工（假设目前有十名）的月薪，将导致行前和行后更新触发器各自触发十次。而语句前和语句后更新触发器在此情况下各只触发一次。\n\
  \n行级触发器能够引用受触发`DML`语句影响的行的列值。行前和行后插入触发器可以检查新行（被插入的行）的所有列值。行前和行后删除触发器可以检查旧行（被删除的行）的所有列值。行前和行后更新触发器可以同时检查旧行的所有列值和新行的所有列值。\n\
  \n##### 注意\n`UPDATE`语句用一组行（“新”行）替换另一组行（“旧”行）。\n\n如果您还不熟悉 Oracle 中可用的各种表触发器类型，我们建议您参考\
  \ Oracle 手册以获取更多信息。在本章的其余部分，我们假设您熟悉它们。\n\n对于语句级触发器来说，要引用受触发`DML`语句影响的行并非易事；它们要么看到`DML`语句开始前存在的（旧）表（前触发器），要么看到`DML`语句完成后得到的（新）表（后触发器）。您可以使语句级触发器能够看到受影响的行，但这需要您进行一些复杂的编码。在本章后面，您会发现这实际上是在触发式过程策略中开发*高效*`DI`代码的一个要求。然后我们将演示如何实现这一点。\n\
  \n为了说明使用触发器作为实现`DI`代码的手段，这里有一个例子。\n\n让我们看看为`EMP`表结构的“最多允许一位总裁”表约束实现一个触发器。清单 11-2\
  \ 展示了实现这样一个附加到`EMP`表结构的触发器的`SQL`语法。\n\n### 清单 11-2. 使用`SQL`将触发器附加到表\n```\ncreate\
  \ trigger EMP_AIUS\nafter insert or update on EMP\ndeclare\n  pl_num_presidents\
  \ number;\nbegin\n  --\n  select count(*) into pl_num_presidents\n  from EMP\n \
  \ where job='PRESIDENT';\n  --\n  if pl_num_presidents > 1\n  then\n    raise_application_error(-20999,'Not\
  \ allowed to have more than one president.');\n  end if;\n  --\nend;\n/\n```\n\n\
  创建此触发器的方式（第二行：`after insert or update`）确保了每当`BL`代码插入或更新一名员工（此约束的*何时*）时，`DBMS`都会执行触发器的过程代码。该触发器会在这样的插入或更新执行后立即触发。因此，嵌入的代码将看到反映该插入或更新所做更改的数据库状态。\n\
  \n\n触发器主体（即 `declare` 与 `end` 之间的过程代码），如代码清单 11-2 所示，代表了这个约束的“如何实现”部分。首先执行一个查询来检索\
  \ `EMP` 表中总统的数量。然后，如果该数字大于一，触发器会通过调用 `raise_application_error()` 来产生一个错误。这个调用会引发一个\
  \ SQL 异常，进而导致触发它的 DML 语句执行失败，并使其所做的更改被撤销。在这种情况下，`DBMS` 会为你执行这条 DML 语句的回滚，这与后面描述的嵌入式过程策略相反。\n\
  \n请注意，让此触发器也为 `DELETE` 语句触发是低效的。当一个事务从 `EMP` 表结构中删除行时，这个特定约束不会被违反；如果在从 `EMP` 删除行之前至多有一个总统，那么在删除该行之后也仍然至多有一个总统。\n\
  \n在触发式过程策略中，你——`DI` 代码开发者——不仅需要考虑 `DI` 代码何时`应该运行`，还需要考虑何时 `DI` 代码的运行是`不必要的`。\n\n\
  这是确保 `DI` 代码被高效实现的一部分。当然，在声明式策略中，你则无需考虑这些事情。\n\n`■注意` 代码清单 11-2 中的触发器现在会对针对 `EMP`\
  \ 表结构执行的每一种 `INSERT` 和每一种 `UPDATE` 语句都进行触发。这仍然是相当低效的。例如，如果你插入一个新的职员或更新某个员工的月薪，触发器实际上根本不需要运行。在这两种情况下（与前面讨论的\
  \ `DELETE` 语句类似），触发它的 DML 语句都不可能违反该约束。\n\n除了在效率上并非最优之外，我们还需要解决代码清单 11-2 中触发器的一个更严重的问题：在实现给定约束方面，它并不完整。仍然存在问题，我们将在“表约束实现问题”一节中更详细地讨论这些问题，这些问题涉及并发执行的事务。\n\
  \n## 嵌入式过程策略\n\n最后，在实现 `DI` 代码的 `嵌入式过程` 策略中，你同样需要自己编写 `DI` 代码（“如何做”）。你不再创建调用你的 `DI`\
  \ 代码的触发器，而是将 `DI` 代码嵌入到包含可能导致约束违反的 DML 语句的 `业务逻辑` 代码模块中。`DI` 代码随后作为 `业务逻辑` 代码执行的一部分运行。\n\
  \n这很可能是迄今为止在 `面向数据库` 应用程序中实现 `DI` 代码最常用的过程策略。\n\n`■注意` 在这种情况下，“最常用”的策略肯定不意味着“最佳”策略。\n\
  \n让我们看一个例子。假设应用程序提供了一个页面，用户可以在其中输入要插入的新员工的数据。用户提供了属性 `ENAME`、`BORN`、`JOB` 和 `DEPTNO`。`BL`\
  \ 代码根据与用户商定的规则确定其他员工属性（`EMPNO`、`SGRADE`、`MSAL`、`HIRED` 和 `USERNAME`）。代码清单 11-3 列出了\
  \ `UI` 代码调用来插入新员工的过程。它首先包含 `BL` 代码以确定其他员工属性，然后执行一个 `INSERT` 语句。紧接在此 `INSERT` 语句之后，`BL`\
  \ 代码运行嵌入的 `DI` 代码，以确保“至多一个总统”的约束保持满足。\n\n**代码清单 11-3.** *在业务逻辑代码中嵌入 DI 代码*\n\n```\n\
  create procedure p_new_employee\n(p_ename in varchar\n,p_born in date\n,p_job in\
  \ varchar\n,p_deptno in number) as\n--\npl_sgrade number;\npl_msal number;\npl_hired\
  \ date;\npl_username varchar(15);\n--\nbegin\n-- Determine monthly start salary.\n\
  select grade, llimit into pl_sgrade, pl_msal\nfrom grd\nwhere grade = case p_job\n\
  when 'ADMIN' then 1\nwhen 'TRAINER' then 3\nwhen 'SALESREP' then 5\nwhen 'MANAGER'\
  \ then 7\nwhen 'PRESIDENT' then 9;\n-- Determine date hired.\npl_hired := trunc(sysdate);\n\
  -- Determine username.\n```\n\n\n\n`pl_username := upper(substr(p_ename,1,8));`\n\
  \n`-- 现在插入新员工行。首先设置一个事务保存点。`\n\n`savepoint sp_pre_insert;`\n\n`-- 使用 EMP_SEQ 序列来生成一个键。`\n\
  \n```sql\ninsert into emp(empno,ename,job,born,hired,sgrade,msal,username,deptno)\
  \ values(emp_seq.nextval,p_ename,p_job,p_born,pl_hired,pl_sgrade,pl_msal,pl_username,p_deptno);\n\
  ```\n\n`-- 验证‘至多一个总裁’约束。`\n\n```sql\nif p_job = 'PRESIDENT'\nthen\n  declare\n \
  \   pl_num_presidents number;\n  begin\n    --\n    select count(*) into pl_num_presidents\n\
  \    from EMP\n    where job='PRESIDENT';\n    --\n    if pl_num_presidents > 1\n\
  \    then\n      -- 违反了约束，需要回滚插入操作。\n      rollback to sp_pre_insert;\n      raise_application_error(-20999,\n\
  \        'Not allowed to have more than one president.');\n    end if;\n  end;\n\
  end if;\n```\n\n`INSERT`语句之后嵌入的 DI 代码与清单 11-2 中列出的触发器主体内的代码非常相似。它比`INSERT`语句触发器更高效；DI\
  \ 代码仅在插入总裁时才会执行。\n\n还要注意，在这种过程式策略中——与触发式过程式策略相反——需要由开发人员显式地强制执行语句回滚。在前面的代码中，这是通过在执行`INSERT`语句之前设置一个事务保存点，并在发现违反约束时回滚到该保存点来实现的。\n\
  \n嵌入式过程式策略还有另一个更严重的缺点。现在，对于一个给定的约束，你必须将 DI 代码复制到每个可能包含可能违反该约束的 DML 语句的 wBL 代码模块中。在这种策略中，一个给定约束的所有必要\
  \ DI 代码通常分散在各个 wBL 代码模块中。通常，当需要更改 WoD 应用程序的 wBL 代码时，你可能会忘记更改（添加或移除）必要的 DI 代码。更有甚者，当数据库设计的实际约束需要更改时，通常很难定位所有包含该约束的嵌入式\
  \ DI 代码的 wBL 代码模块。\n\n`■注意` 这个缺点在某种程度上也适用于触发式过程式策略。清单 11-2 中给出的示例触发器实际上是两个触发器的简写：一个更新触发器和一个插入触发器。该约束的\
  \ DI 代码可以视为分散在两个触发器中。在更复杂的约束情况下，你将需要更多的触发器来实现 DI 代码；你可能需要多达三倍于约束中涉及的表结构数量的触发器（每个涉及的表结构一个插入、一个更新和一个删除触发器）。然而，使用触发式过程式策略，这个缺点不像在使用嵌入式过程式策略构建的\
  \ WoD 应用程序中可能出现的那么严重。\n\n嵌入式过程式策略在并发执行事务方面存在相同的问题（我们将在“表约束实现问题”一节中解释这些问题）。\n\n##\
  \ 优选顺序\n\n声明式策略比两个过程式策略更受青睐，这应该不足为奇。不仅声明式表述的约束免除了你开发 DI 代码的负担，它还可能优于任何自行开发的过程式实现。\n\
  \n别忘了，它也使你免于在 WoD 应用程序生命周期内维护此代码的负担！\n\n`■注意` 最后一点假设 DBMS 供应商在设计和实现 DI 代码的高效*执行模型*方面已做好了研究。在“表约束实现问题”一节中，我们将向你介绍各种执行模型，从低效的到更高效的。\n\
  \n然而，正如你可能意识到的，在 Oracle 的 SQL DBMS 中，你只能声明性地表述有限的约束类型。请注意，这并非由于 SQL 标准固有的缺陷，而是由于该语言在\
  \ SQL DBMS 中的实现不佳所致。\n\n对于无法声明给 DBMS 的约束，我们更倾向于遵循触发式过程式策略。以下是我们更喜欢触发式而非嵌入式过程式策略的两个主要原因：\n\
  \n-   与声明的约束一样，触发式过程式策略无法被规避。\n-   触发式过程式策略可能创建更易管理的代码架构；DI 代码不会在大量 BL 代码中复制。DI\
  \ 代码与所有 BL 代码完全分离，因此更易于管理（顺便说一下，BL 代码本身也会更易于管理）。\n\n`■注意` 第二个原因假设触发器只包含 DI 代码。在触发器中嵌入\
  \ BL 代码通常被认为是不好的做法。\n\n嵌入式过程式策略是所有策略中最差的；它显然可以被规避，只需使用其他应用程序（可能是 DBMS 供应商提供的一些通用应用程序）来更新数据库即可。\n\
  \n正如你将从“表约束实现问题”一节开始看到的，当我们开始处理表约束和数据库约束（即多元组约束）时，通过触发器为这些约束实现高效的 DI 代码远非一项简单的任务。\n\
  \n显然，在一个类别（属性、元组、表、数据库、转换）内实现不同约束所涉及的工作量是相同的。此外，为约束实现 DI 代码的复杂性可能随着数据范围的增加而增加。本章剩余部分将提供实现数据库设计的表结构的指南，并按范围递增的顺序，为所涉及的约束实现\
  \ DI 代码提供指南。以下是本章剩余部分的概述：\n\n-   “实现表结构”一节涉及在 Oracle 的 SQL DBMS 中实现表结构。\n-   “实现属性约束”一节讨论如何实现属性约束。\n\
  -   “实现元组约束”一节讨论如何实现元组约束。\n-   “表约束实现问题”一节作为后续章节的序言。在本节中，我们将介绍在开发触发器以实现多元组约束的 DI\
  \ 代码时涉及的各种问题。本节还将详细阐述不同的执行模型。\n-   “实现表约束”一节讨论如何声明性地表述某些表约束，以及如何设计触发器来检查所有其他表约束。\n\
  -   “实现数据库约束”一节讨论如何声明性地表述某些数据库约束，以及如何设计触发器来检查所有其他数据库约束。\n-   “实现转换约束”一节讨论一种为转换约束实现\
  \ DI 代码的方法。\n-   “引入延迟检查”一节解释了对某些类型的约束延迟执行 DI 代码的必要性。\n-   “RuleGen 框架”一节向你介绍 RuleGen，这是一个支持使用触发式过程式策略实现\
  \ DI 代码的框架，它处理了本章讨论的许多问题。\n\n#### 实现表结构\n\n\n\n"
- '# 在 Oracle 中实现数据库设计


  当你在 SQL DBMS 中实施数据库设计时，通常从创建表结构开始。通过 `create table` 命令，你可以在 SQL DBMS 中实现数据库设计的表结构。在本章中，我们将逐一实现
  UEX 数据库设计。具体来说，我们将为每个表创建一个对应的 SQL 表结构。


  **注意**：本书的目标并非探讨*反规范化*（以提升性能）或其他可能导致偏离正式数据库设计的理由。此外，根据我们的个人经验，鉴于 Oracle 当前 SQL DBMS
  中优化器技术的水平，这种一对一的实现通常能提供出色的性能。


  '
- "# 在 Oracle 中实现数据库设计\n\n在 SQL DBMS 中创建表涉及以下步骤：\n\n*   为表结构选择一个名称（我们已经在*数据库特征描述*中正式完成）\n\
  *   声明各列的名称（我们已经在*特征描述*中正式完成）\n*   声明各列的数据类型（同样在*特征描述*中完成）\n\n关于最后一点，遗憾的是，目前对创建可在\
  \ `create table` 语句中使用的用户定义类型（用于表示属性值集）的支持尚不成熟。例如，我们无法执行以下操作：\n\n```sql\n-- 创建一个类型来表示\
  \ EMPNO 属性的值集。\n-- 注意：这不是有效的 Oracle 语法。\ncreate type empno_type under number(4,0)\
  \ check(member > 999);\n/\n\n-- 创建一个类型来表示 JOB 属性的枚举值集。\n-- 无效语法。\ncreate type job_type\
  \ under varchar(9)\ncheck(member in ('ADMIN','TRAINER','SALESREP','MANAGER','PRESIDENT));\n\
  /\n\n-- 现在在 create table 语句中使用 empno_type 和 job_type 类型。\ncreate table EMP\n(empno\
  \ empno_type not null\n,job job_type not null\n,...);\n```\n\n在实际操作中，我们被迫使用 SQL\
  \ DBMS 提供的内置数据类型。对于 Oracle 而言，最常用的内置数据类型是 `varchar`、`number` 和 `date`。这些对于我们的示例数据库设计来说已经足够。\n\
  \n在下一节（“实现属性约束”）中，你将看到，通过使用 `SQL alter table add constraint` 语况，我们仍然可以有效地实现属性值集。在\
  \ `create table` 语句中声明的列数据类型充当了属性值集的超集，而通过添加约束，我们可以将这些超集精确地缩小到表结构特征描述中指定的属性值集。\n\
  \n清单 11-4 至 11-13 展示了 UEX 示例数据库设计的 `create table` 语句。\n\n**清单 11-4.** *为 GRD 表结构创建表*\n\
  \n```sql\ncreate table grd\n( grade number(2,0) not null\n, llimit number(7,2) not\
  \ null\n, ulimit number(7,2) not null\n, bonus number(7,2) not null);\n```\n\n**注意**：每个列旁的\
  \ `not null` 表示该列不允许出现 `NULL`。在这种情况下，我们说该列是*必填*的。\n\n**清单 11-5.** *为 EMP 表结构创建表*\n\
  \n```sql\ncreate table emp\n( empno number(4,0) not null\n, ename varchar(8) not\
  \ null\n, job varchar(9) not null\n, born date not null\n, hired date not null\n\
  , sgrade number(2,0) not null\n, msal number(7,2) not null\n, username varchar(15)\
  \ not null\n, deptno number(2,0) not null);\n```\n\n**清单 11-6.** *为 SREP 表结构创建表*\n\
  \n```sql\ncreate table srep\n( empno number(4,0) not null\n, target number(6,0)\
  \ not null\n, comm number(7,2) not null);\n```\n\n**清单 11-7.** *为 MEMP 表结构创建表*\n\
  \n```sql\ncreate table memp\n( empno number(4,0) not null\n, mgr number(4,0) not\
  \ null);\n```\n\n**清单 11-8.** *为 TERM 表结构创建表*\n\n```sql\ncreate table term\n( empno\
  \ number(4,0) not null\n, left date not null\n, comments varchar(60));\n```\n\n\n\
  #### 实现属性约束\n\n**注意** 在我们的示例中，当员工已离职时，用户并不总是希望为 `COMMENTS` 列提供值。Oracle 不允许在强制列中存储空字符串。为了防止用户在此类情况下输入一些随机的\
  \ varchar 值（例如一个空格），该列已被设为可选（有时称为可为空），这意味着该列允许出现 `NULL`。\n\n**代码清单 11-9. 用于 HIST\
  \ 表结构的 CREATE TABLE 语句**\n```sql\ncreate table hist\n( empno number(4,0) not null\n\
  , until date not null\n, deptno number(2,0) not null\n, msal number(7,2) not null);\n\
  ```\n\n**代码清单 11-10. 用于 DEPT 表结构的 CREATE TABLE 语句**\n```sql\ncreate table dept\n\
  ( deptno number(2,0) not null\n, dname varchar(12) not null\n, loc varchar(14) not\
  \ null\n, mgr number(4,0) not null);\n```\n\n**代码清单 11-11. 用于 CRS 表结构的 CREATE TABLE\
  \ 语句**\n```sql\ncreate table crs\n( code varchar(6) not null\n, descr varchar(40)\
  \ not null\n, cat varchar(3) not null\n, dur number(2,0) not null);\n```\n\n**代码清单\
  \ 11-12. 用于 OFFR 表结构的 CREATE TABLE 语句**\n```sql\ncreate table offr\n( course varchar(6)\
  \ not null\n, starts date not null\n, status varchar(4) not null\n, maxcap number(2,0)\
  \ not null\n, trainer number(4,0)\n, loc varchar(14) not null);\n```\n\n**注意** 出于我们将在“实现数据库约束”一节中讨论的原因，`TRAINER`\
  \ 属性被定义为可为空；我们将使用 `NULL` 来代替该属性的属性值集中引入的特殊值 `-1`。\n\n**代码清单 11-13. 用于 REG 表结构的 CREATE\
  \ TABLE 语句**\n```sql\ncreate table reg\n( stud number(4,0) not null\n, course varchar(6)\
  \ not null\n, starts date not null\n, eval number(1,0) not null);\n```\n\n在关系数据模型中，数据库设计中的所有属性都是强制性的。因此，你可能会感到失望，在\
  \ SQL 标准中，默认情况下列是可为空的；SQL 要求我们必须在每一列旁边显式添加 `not null` 才能使其变为强制性的。\n\n下一节将讨论在 `create\
  \ table` 语句中使用的内置数据类型的前述“窄化”问题。\n\n#### 实现属性约束\n\n我们现在重新审视“约束分类模式”一章第 7 节中提到的术语“属性约束”。\n\
  \n形式上，特征描述只是将属性值集附加到属性上。将属性值集附加到属性可以被视为一个属性约束。然而，在实践中，你是在 SQL DBMS 中实现数据库设计，而这些\
  \ DBMS 以对用户定义类型支持不佳而闻名。用户定义类型本应是实现属性值集的理想选择。但是，正如“实现表结构”一节所讨论的，你不能用它们来实现这一点。相反，你必须使用适当的超集（如前一节所示的某种内置数据类型）作为给定属性的属性值集。幸运的是，你可以使用声明式\
  \ SQL `check` 约束将这些超集窄化为特征描述中指定的确切属性值集。在实现过程中，我们将这些声明式 `check` 约束称为属性的属性约束。\n\n\
  所有属性约束都可以——并且根据我们的策略偏好，*应该*——被声明为声明式 `check` 约束。你可以使用 `alter table add constraint`\
  \ 语句来声明这些约束。\n\n代码清单 11-14 展示了六个 `check` 约束的声明，这些约束是声明式实现代码清单 7-2 中 `chr_EMP` 定义的\
  \ `EMP` 表结构属性值集所必需的。我们将在代码清单之后讨论每一个约束。\n\n**代码清单 11-14. EMP 表结构的属性约束**\n```sql\n\
  alter table EMP add constraint emp_chk_empno check (empno > 999);\nalter table EMP\
  \ add constraint emp_chk_job\n    check (job in ('PRESIDENT','MANAGER','SALESREP'\n\
  \                  ,'TRAINER','ADMIN' ));\nalter table EMP add constraint emp_chk_brn\
  \ check (trunc(born) = born);\nalter table EMP add constraint emp_chk_hrd check\
  \ (trunc(hired) = hired);\nalter table EMP add constraint emp_chk_msal check (msal\
  \ > 0);\nalter table EMP add constraint emp_chk_usrnm check (upper(username) = username);\n\
  ```\n\n从这个代码清单可以看出，所有的 `check` 约束都被赋予了名称。第一个约束的名称是 `emp_chk_empno`。它将 `empno` 列声明的数据类型\
  \ `number(4,0)` 窄化为仅包含大于 `999` 的四位数字。\n\n一旦该约束被声明并存储在 Oracle SQL DBMS 的数据字典中，每当\
  \ `EMP` 表中出现新的 `EMPNO` 值（通过 `INSERT` 语句），或 `EMP` 表中现有的 `EMPNO` 值被更改（通过 `UPDATE`\
  \ 语句）时，DBMS 就会运行必要的 DI 代码。DBMS 将在错误消息中使用该约束名，每当尝试存储在 `EMP` 表中的 `EMPNO` 值不满足此约束时，你都会收到通知。\n\
  \n约束 `emp_chk_job`（前面代码清单中的第二个）确保只有列出的五个值可以作为 `JOB` 列的值。\n\n约束 `emp_chk_brn` 和 `emp_chk_hrd`\
  \ 确保一个日期值（在 Oracle SQL DBMS 中，日期值总是包含一个时间成分）只有在时间成分被截断（即设置为午夜 `0:00`）时，才被允许作为 `BORN`\
  \ 或 `HIRED` 列的值。\n\n约束 `emp_chk_msal` 确保只有正数——在 `number(7,2)` 超集范围内——才被允许作为 `MSAL`\
  \ 列的值。\n\n最后，约束 `emp_chk_usrnm` 确保 `USERNAME` 列的值始终为大写。\n\n代码清单 11-15 到 11-23 提供了\
  \ UEX 数据库设计中其他表结构的属性约束。\n\n**代码清单 11-15. GRD 表结构的属性约束**\n```sql\nalter table GRD\
  \ add constraint grd_chk_grad check (grade > 0);\nalter table GRD add constraint\
  \ grd_chk_llim check (llimit > 0);\nalter table GRD add constraint grd_chk_ulim\
  \ check (ulimit > 0);\nalter table GRD add constraint grd_chk_bon1 check (bonus\
  \ > 0);\n```\n\n**代码清单 11-16. SREP 表结构的属性约束**\n```sql\nalter table SREP add constraint\
  \ srp_chk_empno check (empno > 999);\nalter table SREP add constraint srp_chk_targ\
  \ check (target > 9999);\nalter table SREP add constraint srp_chk_comm check (comm\
  \ > 0);\n```\n\n**代码清单 11-17. MEMP 表结构的属性约束**\n```sql\nalter table MEMP add constraint\
  \ mmp_chk_empno check (empno > 999);\nalter table MEMP add constraint mmp_chk_mgr\
  \ check (mgr > 999);\n```\n\n**代码清单 11-18. TERM 表结构的属性约束**\n```sql\nalter table\
  \ TERM add constraint trm_chk_empno check (empno > 999);\nalter table TERM add constraint\
  \ trm_chk_lft check (trunc(left) = left);\n```\n\n**代码清单 11-19. HIST 表结构的属性约束**\n\
  ```sql\nalter table HIST add constraint hst_chk_eno check (empno > 999);\nalter\
  \ table HIST add constraint hst_chk_unt check (trunc(until) = until);\nalter table\
  \ HIST add constraint hst_chk_dno check (deptno > 0);\nalter table HIST add constraint\
  \ hst_chk_msal check (msal > 0);\n```\n\n\n### 第 11 章 在 Oracle 中实现数据库设计\n\n### 清单\
  \ 11-20. `DEPT` 表结构的属性约束\n\n```sql\nalter table DEPT add constraint dep_chk_dno\
  \ check (deptno > 0);\nalter table DEPT add constraint dep_chk_dnm check (upper(dname)\
  \ = dname);\nalter table DEPT add constraint dep_chk_loc check (upper(loc) = loc);\n\
  alter table DEPT add constraint dep_chk_mgr check (mgr > 999);\n```\n\n### 清单 11-21.\
  \ `CRS` 表结构的属性约束\n\n```sql\nalter table CRS add constraint reg_chk_code check (code\
  \ = upper(code));\nalter table CRS add constraint reg_chk_cat check (cat in ('GEN','BLD','DSG'));\n\
  alter table CRS add constraint reg_chk_dur1 check (dur between 1 and 15);\n```\n\
  \n### 清单 11-22. `OFFR` 表结构的属性约束\n\n```sql\nalter table OFFR add constraint ofr_chk_crse\
  \ check (course = upper(course));\nalter table OFFR add constraint ofr_chk_strs\
  \ check (trunc(starts) = starts);\nalter table OFFR add constraint ofr_chk_stat\
  \ check (status in ('SCHD','CONF','CANC'));\nalter table OFFR add constraint ofr_chk_trnr\
  \ check (trainer > 999);\nalter table OFFR add constraint ofr_chk_mxcp check (maxcap\
  \ between 6 and 99);\n```\n\n**注意** 你可能想知道，每当在 `TRAINER` 列中遇到 `NULL` 时，SQL DBMS\
  \ 如何处理约束 `ofr_chk_trnr`。我们将在本节末尾讨论这一点。\n\n### 清单 11-23. `REG` 表结构的属性约束\n\n```sql\n\
  alter table REG add constraint reg_chk_stud check (stud > 999);\nalter table REG\
  \ add constraint reg_chk_crse check (course = upper(course));\nalter table REG add\
  \ constraint reg_chk_strs check (trunc(starts) = starts);\nalter table REG add constraint\
  \ reg_chk_eval check (eval between -1 and 5);\n```\n\n如果声明式的 `check` 约束求值为 `UNKNOWN`（通常由使用\
  \ `NULL` 引起），那么 SQL 标准认为该约束已满足；`check` 求值为 `TRUE`。注意；在 PL/SQL 编程语言中，你会观察到相反的行为。在这里，一个求值为未知的布尔表达式会被视为\
  \ `FALSE`。为了说明这一点，请看以下触发器定义；它*并不*等同于 `check` 约束 `ofr_chk_trnr`：\n\n```sql\ncreate\
  \ trigger ofr_chk_trnr\nafter insert or update on OFFR\nfor each row\nbegin\nif\
  \ not (:new.trainer > 999)\nthen\nraise_application_error(-20999,'Value for trainer\
  \ must be greater than 999.');\nend if;\nend;\n```\n\n声明式的 `check` 约束将允许 `TRAINER`\
  \ 列中出现 `NULL`，而前面的触发器则不允许 `TRAINER` 列中出现 `NULL`。你可以通过将前面触发器定义中的第五行更改为以下内容来修复此差异：\n\
  \n```sql\nif not (:new.trainer > 999 or :new.trainer IS NULL)\n```\n\n现在该触发器就等同于声明式的\
  \ `check` 约束了。\n\n我们继续研究如何在 Oracle 的 SQL DBMS 中实现元组约束（属性约束之后的下一级）。\n\n#### 实现元组约束\n\
  \n在处理元组约束的实现之前，我们需要坦白一些事情。本书中开发的形式化方法基于二值逻辑 (`2VL`)。`2VL` 的科学性是可靠的；我们已在第 1 章和第 3\
  \ 章探讨了命题和谓词，并基于此开发了一些重写规则。然而，在本章中，我们将对以 SQL 表达的谓词做出各种陈述。如前面的触发器和清单 11-22 中的属性约束\
  \ `ofr_chk_trnr` 所示，由于可能存在 `NULL`，SQL 并不应用 `2VL`；而是应用三值逻辑 (`3VL`)。`3VL` 中最关键的假设是，除了\
  \ `TRUE` 和 `FALSE` 这两个真值之外，第三个值表示“可能”或 `UNKNOWN`。\n\n**注意** 与经典的 `2VL` 相反，`3VL`\
  \ 是反直觉的。我们在此不深入讨论 `3VL`；你可以在附录 D 中找到对 `3VL` 的简要探讨。\n\n我们事先承认，在本章中我们采取了一些自由处理的方式。通过在示例数据库设计的\
  \ SQL 实现中几乎在所有列上使用 `NOT NULL`，我们实际上是在避免 `3VL` 问题。如果不使用 `NOT NULL`，本章中我们关于逻辑表达式的各种陈述都将受到质疑。\n\
  \n正如你在第 1 章看到的，合取、析取和否定是*真值函数完备的*。因此，你可以将每个正式指定的元组约束重写为等效的规范，该规范仅使用 SQL 中可用的三种连接词。\n\
  \n一旦以这种方式转换，所有元组约束都可以——因此也应该——声明式地表述为 `check` 约束。你可以使用 `alter table add constraint`\
  \ 语句向 DBMS 声明它们。让我们以 `EMP` 表结构的元组约束为例来演示这一点。为方便起见，我们在此重复元组 universe 定义 `tup_EMP`：\n\
  \n```\ntup_EMP :=\n{ e | e∈Π(chr_EMP) ∧\n/* We hire adult employees only */\ne(BORN)\
  \ + 18 ≤ e(HIRED) ∧\n/* Presidents earn more than 120K */\ne(JOB) = 'PRESIDENT'\
  \ ⇒ 12*e(MSAL) > 120000 ∧\n/* Administrators earn less than 5K */\ne(JOB) = 'ADMIN'\
  \ ⇒ e(MSAL) < 5000 }\n```\n\n前面的三个元组约束可以表述如下（参见清单 11-24）。\n\n**注意** 前面的三个约束是用 `2VL`\
  \ 正式表达的，但清单 11-24 中用 SQL 表达的三个约束是 `3VL` 的。在这种情况下，`3VL` 表达的约束之所以等同于正式表达的约束，仅仅是因为我们小心地将所有涉及的列都声明为必填\
  \ (`NOT NULL`)。\n\n### 清单 11-24. `EMP` 表结构的元组约束\n\n```sql\nalter table EMP add constraint\
  \ emp_chk_adlt\ncheck ((born + interval '18' year) <= hired);\nalter table EMP add\
  \ constraint emp_chk_dsal\ncheck ((job <> 'PRESIDENT') or (msal > 10000));\nalter\
  \ table EMP add constraint emp_chk_asal\ncheck ((job <> 'ADMIN') or (msal < 5000));\n\
  ```\n\n第一个名为 `emp_chk_adlt` 的约束的实现使用了日期算术（`+ interval` 运算符）在给定的 `born` 日期值上加上 18\
  \ 年。\n\n因为 SQL 只提供了三种逻辑连接词 (`and`, `or`, `not`)，所以你被迫将第二和第三个元组约束——两者都涉及蕴涵连接词——转换为析取式。万一你忘记了实现这一点的重要重写规则，这里再次列出：\n\
  \n```\n( P ⇒ Q ) ⇔ ( ( ¬P ) ∨ Q )\n```\n\n你再次需要注意，这种转换在一般情况下可能不安全，因为当你使用 SQL 时，你处于\
  \ `3VL` 的世界，而不是该重写规则所来源的 `2VL` 世界。如果允许 `NULL` 出现在任何涉及的列中，你将需要考虑这些约束在 SQL 的 `3VL`\
  \ 逻辑中如何工作。\n\n给定元组约束以清单 11-24 所示的方式声明，DBMS 将确保拒绝违反其中任何约束的行。\n\n在清单 11-25 到 11-28\
  \ 中，你可以找到表结构 `GRD`、`MEMP`、`CRS` 和 `OFFR` 的元组约束的实现。示例数据库设计中其他剩余的表结构没有元组约束。\n\n\n\
  ### **GRD、MEMP、CRS 和 OFFR 表结构的元组约束**\n\n**代码清单 11-25.** GRD 表结构的元组约束\n```sql\nalter\
  \ table GRD add constraint grd_chk_bndw check (llimit <= (ulimit - 500));\nalter\
  \ table GRD add constraint grd_chk_bon2 check (bonus < llimit);\n```\n\n**代码清单 11-26.**\
  \ MEMP 表结构的元组约束\n```sql\nalter table MEMP add constraint mmp_chk_cycl check (empno\
  \ <> mgr);\n```\n\n**代码清单 11-27.** CRS 表结构的元组约束\n```sql\nalter table CRS add constraint\
  \ reg_chk_dur2 check ((cat <> 'BLD') or (dur <= 5));\n```\n\n**代码清单 11-28.** OFFR\
  \ 表结构的元组约束\n```sql\nalter table OFFR add constraint ofr_chk_trst check (trainer\
  \ is not null or status in ('CANC','SCHD'));\n```\n\n代码清单 11-28 中所述元组约束的伴随形式化规范如下：\n\
  \n```\ntup_OFFR :=\n{ o | o∈P(chr_OFFR) ∧\n/* 未分配的 TRAINER 仅允许用于特定的 STATUS 值 */\n\
  o(TRAINER) = -1 ⇒ o(STATUS)∈{'CANC','SCHD'}\n}\n```\n\n将蕴涵式重写为析取式后，变为以下形式：\n\n```\n\
  tup_OFFR :=\n{ o | o∈P(chr_OFFR) ∧\n/* 未分配的 TRAINER 仅允许用于特定的 STATUS 值 */\no(TRAINER)\
  \ ≠ -1 ∨ o(STATUS)∈{'CANC','SCHD'}\n}\n```\n\n由于我们决定在 `OFFR` 表结构的实现中使用 `NULL` 来表示\
  \ `-1`（原因将在后文解释），前面检查约束中的第一个析取项变为了 `trainer is not null`。\n\n在结束关于实现元组约束的本节之前，我们提出一个观察结论，该结论对于其后的约束类别同样有效。\n\
  \n最佳实践是将所有元组约束写成**合取范式**（CNF；参见第 3 章“范式”一节）。这可能需要你首先应用各种重写规则。通过将约束重写为 CNF，你将得到尽可能多的合取项，每个合取项代表一个可单独实现的约束。对于元组约束，你会为每个合取项创建一个声明式检查约束。这反过来具有一个优点，即\
  \ DBMS 会以*尽可能详细的方式*报告对元组约束的违反。\n\n让我们解释一下。\n\n**注意：** 我们再次假设 SQL 的三值逻辑（3VL）以二值逻辑（2VL）的方式运行，因为约束中涉及的所有列都是强制性的（非空）。\n\
  \n假设你为一个在重写成 CNF 后形式为 `A ∧ B` 的元组约束创建了一个检查约束。当该检查约束被违反时，（在 2VL 中）你只知道 `A ∧ B` 不是\
  \ `TRUE`。根据德摩根定律，这转化为：要么 `A` 不是 `TRUE`，要么 `B` 不是 `TRUE`。如果你能确切知道两者中哪一个为 `FALSE`，岂不是更好？如果你当初创建了两个独立的检查约束（一个用于\
  \ `A`，一个用于 `B`），DBMS 就能报告是两者中的哪一个导致了违反（或者可能两者都是）。换句话说，通过将约束规范重写为 CNF 并单独实现每个合取项，你将获得更详细的错误信息。\n\
  \n如前所述，这个观察结论也适用于后续的约束类别（表、数据库和过渡约束）。\n\n### **表约束实现问题**\n\n到目前为止，关于数据完整性约束的实现都很直接。然而，当你的范围从元组约束扩展到表约束，从而开始处理跨越多个元组的约束时，实现高效的\
  \ DI（数据完整性）代码迅速变得复杂得多。\n\n这种复杂性的主要原因在于向 DBMS 声明这些约束的支持力度不足。你只能以声明方式指定两种类型的表约束：唯一标识属性（键）和引用回同一表的子集要求（此时子集要求是表约束，即指向同一表的外键）。\n\
  \n实现所有其他类型的表约束都需要你开发过程式的 DI 代码。在实践中，这意味着你常常不得不诉诸于**触发式过程策略**。\n\n**注意：** 我们认为 DBMS\
  \ 供应商之所以只提供如此有限的声明式支持，是有原因的。我们将在本节过程中揭示这个原因。\n\n我们将通过阐述不同的 DI 代码*执行模型*，向你介绍实现表约束所涉及的复杂性。在接下来的第一个（相当长的）子节中，我们将说明六种不同的执行模型，从非常低效到更高效。\n\
  \n正如你将看到的，为 DI 代码实现更高效的执行模型也更加复杂。\n\n为了清晰地解释每个执行模型，我们将使用两个示例表约束，并展示它们如何在每个执行模型中实现。我们将使用的约束是代码清单\
  \ 7-26 中表 universe `tab_EMP` 指定的最后一个约束，以及代码清单 7-30 中表 universe `tab_DEPT` 指定的最后一个约束。为方便起见，我们在此重复这两个约束的形式化规范（注意，在这些规范中，`E`\
  \ 代表员工表，`D` 代表部门表）。\n\n```\n/* 雇佣了总裁或经理的部门 */\n/* 也应至少雇佣一名管理员 */\n( ∀d∈E⇓{DEPTNO}:\n\
  \  ( ∃e2∈E: e2(DEPTNO) = d(DEPTNO) ∧ e2(JOB) ∈ {'PRESIDENT','MANAGER'} )\n  ⇒\n\
  \  ( ∃e3∈E: e3(DEPTNO) = d(DEPTNO) ∧ e3(JOB) = 'ADMIN' )\n)\n\n/* 一个人最多只能管理两个部门\
  \ */\n( ∀m∈D⇓{MGR}: #{ d | d∈D ∧ d(MGR) = m(MGR) } ≤ 2 )\n```\n\n除了实现高效的执行模型之外，在为表约束实现\
  \ DI 代码时，另一个相当严重的问题也会出现。这涉及到*事务串行化*。鉴于 Oracle 的 SQL DBMS 可以并发执行事务，你必须确保 DI 代码内部的查询以可串行化的方式执行：Oracle\
  \ 的 SQL DBMS 并不保证串行化。我们将在“DI 代码串行化”一节中详细解释这个问题。\n\n### **DI 代码执行模型**\n\n本节将讨论按照触发式过程策略实现表约束\
  \ DI 代码的各种执行模型。但在讨论之前，我们首先就 DI 代码执行时间与 DML 语句执行时间的关系提供一些初步的观察结论。\n\n#### **一些观察结论**\n\
  \n使用 SQL DBMS 时，你通过执行 `INSERT`、`UPDATE` 或 `DELETE` 语句来更新数据库。这些语句中的每一个都只针对一个目标表结构以一种方式操作——要么是\
  \ `INSERT`，要么是 `UPDATE`，要么是 `DELETE`。通常，事务需要更改多个表，或者可能只是一个表但以多种方式更改。因此，你的事务通常由多个\
  \ DML 语句组成，这些语句一个接一个地串行执行。\n\n当执行第一条 DML 语句时，你隐式地启动了一个事务。事务通过执行 `COMMIT` 语句（请求 DBMS\
  \ 持久存储此事务所做的更改）或执行 `rollback` 语句（请求 DBMS 中止并撤消当前事务所做的更改）来显式结束。结束一个事务后，你可以通过执行另一条（第一条）DML\
  \ 语句再次启动一个新事务。一个尚未提交的事务所做的所有更改仅对该事务可见；其他事务无法看到这些更改。一旦事务提交，它所做的更改就对其他事务可见。\n\n**注意：**\
  \ 这里我们假设 DBMS 运行在**读已提交**隔离模式下——这是 Oracle 已安装数据库中最常用的模式。\n\n当然，所有约束必须在事务结束时（提交时）得到满足。\n\
  \n\n也就是说，你不希望一个事务成功提交，而其 DML 语句到目前为止串行执行所产生的数据库状态却违反了某条约束。\n\n但是，在同一个事务内部，两条 DML\
  \ 语句执行之间存在的那些数据库状态呢？是否这些中间数据库状态也必须始终满足所有约束？还是说，只要最终的数据库状态（事务提交时的状态）满足所有约束，中间状态可以违反某些约束？\n\
  \n目前，我们不允许这些中间数据库状态违反任何数据库约束。\n\n##### 注意\n不过，在“引入延迟检查”一节中，我们会重新审视这个问题。届时你会看到，为了使用\
  \ Oracle 的 SQL DBMS 实现某些事务，我们必须允许某些约束在某个中间数据库状态中被暂时违反。\n\n一条试图创建违反约束的数据库状态的`DML`语句将会失败；在接下来的执行模型中，我们会确保此类`DML`语句的更改会被立即回滚，同时保留该事务内先前成功执行的`DML`语句所做的数据库状态更改。\n\
  \n在表 11-1 中，你可以找到一个执行了四条`DML`语句的示例事务；该表展示了在此事务内发生的数据库状态转换。\n\n**表 11-1.** 事务内的数据库状态转换\n\
  \n| 时间 | 起始数据库状态 | DML | 结束数据库状态 | 注释 |\n| :--- | :--- | :--- | :--- | :--- |\n\
  | | `dbs0` | `DML0;` | `dbs1` | 事务开始。`dbs1`是一个有效状态。 |\n| | `dbs1` | `DML1;` | `dbs2`\
  \ | `dbs2`违反约束；`DML1`被回滚。 |\n| | `dbs1` | `DML2;` | `dbs3` | `dbs3`是一个有效状态。 |\n\
  | | `dbs3` | `DML3;` | `dbs4` | `dbs4`违反约束；`DML3`被回滚。 |\n| | `dbs3` | `commit;`\
  \ | `dbs3` | `dbs3`被提交并对其他事务可见。 |\n\n我们的执行模型将基于触发器。如前所述，触发器与一个表结构相关联，如果一条`DML`语句更改了该表的内容，`DBMS`会自动执行（“触发”）该触发器。触发器主体内的代码可以检查新的数据库状态是否满足所有约束。如果该状态不满足所有约束，那么此代码将强制触发它的`DML`语句失败；随后`DBMS`会确保其更改被回滚。\n\
  \n你应该意识到`行级触发器`（为每个受影响行触发的触发器）存在一个限制。这些触发器只允许查询*其他*表结构的状态；也就是说，它们不允许查询触发它的`DML`语句当前正在操作的表结构。如果你尝试这样做，就会遇到臭名昭著的`变异表`错误（`ORA-04091:\
  \ table ... is mutating, trigger/function may not see it`）。\n\nOracle 的`SQL DBMS`不允许你这样做的非常合理的原因是为了防止`非确定性行为`。这是因为如果你的`行级触发器`被允许查询一个`DML`语句正在修改的表结构，那么这些查询将在事务内执行脏读。这些查询看到的中间表状态仅在触发它的`DML`语句逐行执行时存在。根据\
  \ SQL 优化器处理行的顺序，这些查询的结果可能不同。这将导致`非确定性行为`，这就是 Oracle 的`DBMS`不允许你查询“变异”表的原因。\n\n考虑到表约束的本质——即它涉及表中的多行——表约束的`DI`代码总是需要你对已被修改的表执行查询；然而，`变异表`错误阻止你这样做。因此，`行级触发器`不适合作为表约束`DI`代码的容器。\n\
  \n`语句前触发器`看到的是`DML`语句开始执行时的起始数据库状态。`语句后触发器`看到的是由`DML`语句执行创建的结束数据库状态。由于`DI`代码需要验证`DML`语句的结束状态，因此你只剩下每个表结构（`插入`、`更新`和`删除`）的三个`语句后触发器`可以用来构建执行模型。\n\
  \n基于这些观察，我们现在可以继续说明`DI`代码的六种不同执行模型。在讨论执行模型时，我们有时会扩大范围，也将数据库约束包括在内。\n\n## 执行模型 1：总是执行\n\
  在第一个执行模型（`EM1`）中，每当执行一条`DML`语句，相应的`语句后触发器`将包含按顺序执行每个约束的`DI`代码。在此模型中，每个中间数据库状态（包括最后一个）都被验证是否满足所有约束。\n\
  \n这个执行模型仅作为起点；你绝不会想使用此模型，因为它效率极低。例如，如果一条`DML`语句更改了`EMP`表结构，那么此模型还会运行`DI`代码来检查那些不涉及`EMP`表结构的约束。显然，这完全是没必要的，因为其他表结构保持不变；不涉及触发它的`DML`语句所操作的表结构的约束无需验证。\n\
  \n让我们快速忘记这个模型，转向一个更高效的模型。\n\n## 执行模型 2：基于涉及的表\n这个执行模型（`EM2`）与`EM1`非常相似。唯一的区别是你现在利用了每个约束所涉及表结构的知识。只有当`DML`语句正在更改的表结构参与了某个约束时，你才运行该约束的`DI`代码（因此本节标题中有了“基于涉及的表”）。\n\
  \n让我们仔细看看`EMP`表结构的示例表约束在此执行模型中是如何实现的。记住，该约束是：“雇佣总裁或经理的部门也应至少雇佣一名管理员。”你可以形式化地推导出为验证新的数据库状态是否仍满足此约束而需要执行的约束验证查询。方法是将形式化规范转换为\
  \ SQL 的`WHERE`子句表达式，然后执行一个评估该表达式真值的查询。你可以使用`DUAL`表来评估该表达式。让我们演示一下。以下是此表约束的形式化规范：\n\
  \n```\n( ∀d∈E⇓{DEPTNO}:\n  ( ∃e2∈E: e2(DEPTNO) = d(DEPTNO) ∧ e2(JOB) ∈ {'PRESIDENT','MANAGER'}\
  \ )\n  ⇒\n  ( ∃e3∈E: e3(DEPTNO) = d(DEPTNO) ∧ e3(JOB) = 'ADMIN' )\n)\n```\n\n在将形式化规范转换为\
  \ SQL 表达式之前，你需要消除全称量词和蕴涵。以下是重写后的规范版本。\n\n## 提示\n试着自己重写这个规范；从前述规范前面加上双重否定开始。\n\n\
  ```\n¬ ( ∃d∈E⇓{DEPTNO}:\n  ( ∃e2∈E: e2(DEPTNO) = d(DEPTNO) ∧ e2(JOB) ∈ {'PRESIDENT','MANAGER'}\
  \ )\n  ∧\n  ¬ ( ∃e3∈E: e3(DEPTNO) = d(DEPTNO) ∧ e3(JOB) = 'ADMIN' )\n)\n```\n\n\
  这现在可以轻松地转换为`SQL`（我们将此约束命名为`EMP_TAB03`）。\n\n\n## Oracle 中的数据库设计实现\n\n`■Note` Oracle\
  \ 中的`DUAL`表是一个单列单行的系统表。它最常用于让 SQL 引擎计算`SELECT`子句表达式或`WHERE`子句表达式。下面的代码展示了后一种用法。\n\
  ```sql\nselect 'Constraint EMP_TAB03 is satisfied'\nfrom DUAL\nwhere not exists(select\
  \ d.DEPTNO\n                from EMP d\n                where exists(select e2.*\n\
  \                             from EMP e2\n                             where e2.DEPTNO\
  \ = d.DEPTNO\n                             and e2.JOB in ('PRESIDENT','MANAGER'))\n\
  \                and not exists(select e3.*\n                               from\
  \ EMP e3\n                               where e3.DEPTNO = d.DEPTNO\n          \
  \                     and e3.JOB = 'ADMIN'))\n```\n\n在 EM2 中，您将仅为涉及此约束的`EMP`表结构创建三个`after\
  \ statement`触发器。这些触发器包含前面的查询，以验证新的数据库状态是否仍满足此约束。清单 11-29 展示了将这三个触发器合并为一个`create\
  \ trigger`语句。\n\n**清单 11-29.** *约束`EMP_TAB03`的 EM2 DI 代码*\n```sql\ncreate trigger\
  \ EMP_AIUDS_TAB03\nafter insert or update or delete on EMP\ndeclare pl_dummy varchar(40);\n\
  begin\n--\n  select 'Constraint EMP_TAB03 is satisfied' into pl_dummy\n  from DUAL\n\
  \  where not exists(select d.DEPTNO\n                   from EMP d\n           \
  \        where exists(select e2.*\n                                from EMP e2\n\
  \                                where e2.DEPTNO = d.DEPTNO\n                  \
  \              and e2.JOB in ('PRESIDENT','MANAGER'))\n                   and not\
  \ exists(select e3.*\n                                  from EMP e3\n          \
  \                        where e3.DEPTNO = d.DEPTNO\n                          \
  \        and e3.JOB = 'ADMIN'));\n--\nexception when no_data_found then\n--\n  raise_application_error(-20999,'Constraint\
  \ EMP_TAB03 is violated.');\n--\nend;\n```\n\n`■Note` 通过解析约束声明的形式规范，DBMS 可以*计算*出涉及的表。此外，DBMS\
  \ 可以*计算*需要运行的验证查询，以验证约束是否仍然满足（这只需要应用重写规则，最终得到一个可以转换为 SQL 表达式的规范）。因此，DBMS 可以生成前面的触发器。换句话说，DBMS\
  \ 供应商可以*以声明方式*完全支持这种执行模型！\n\n清单 11-30 展示了使用此执行模型表示约束`DEPT_TAB01` DI 代码的三个触发器。\n\n\
  **清单 11-30.** *约束`DEPT_TAB01`的 EM2 DI 代码*\n```sql\ncreate trigger DEPT_AIUDS_TAB01\n\
  after insert or update or delete on DEPT\ndeclare pl_dummy varchar(40);\nbegin\n\
  --\n  select 'Constraint DEPT_TAB01 is satisfied' into pl_dummy from DUAL\n  where\
  \ not exists(select m.DEPTNO\n                   from DEPT m\n                 \
  \  where 2 < (select count(*)\n                               from DEPT d\n    \
  \                           where d.MGR = m.MGR));\n--\nexception when no_data_found\
  \ then\n--\n  raise_application_error(-20999,'Constraint DEPT_TAB01 is violated.');\n\
  --\nend;\n/\n```\n\n这种执行模型仍然效率低下。例如，当您更新员工姓名时，此执行模型将验证约束`EMP_TAB03`。显然，因为`ENAME`列完全不涉及在此约束中，更新`ENAME`的`DML`语句绝不应该引发检查约束`EMP_TAB03`的需要。类似的低效也适用于约束`DEPT_TAB01`；例如，当您更新部门位置（而属性`LOC`不涉及在约束`DEPT_TAB01`中）时，EM2\
  \ 将验证此约束。下一个执行模型解决了这种低效问题。\n\n### 执行模型 3：按涉及列\n\n这种执行模型（EM3）在`DML`语句是`INSERT`或`DELETE`的情况下与\
  \ EM2 相同。但是，当发生更新时，您现在还利用了每个约束（按表结构）涉及哪些属性的知识。对于给定的约束，只有当涉及的属性被`UPDATE`语句修改时，才需要验证此约束。`INSERT`和`DELETE`语句总是涉及所有属性，因此无论约束涉及哪些属性，每当它们发生时，都会引发需要验证涉及表结构的约束。\n\
  \n让我们再次使用示例表约束`EMP_TAB03`来演示。在这种情况下，插入和删除触发器与 EM2 中的保持相同。您只需更改更新触发器以提高效率。仅通过扫描约束`EMP_TAB03`的形式规范，您就可以发现涉及的属性；对于此约束，它们是`DEPTNO`和`JOB`。\n\
  \n每当发生`UPDATE`语句时，您现在仅当`UPDATE`语句更改了`DEPTNO`或`JOB`（或两者）属性时，才执行在 EM2 中开发的 DI 代码。\n\
  \n`■Note` 您可能很容易理解，更新`JOB`可能会违反此约束。例如，在给定部门中，当您将一名管理员提升为培训师时，很可能您刚刚“移除”了该部门要求存在的唯一管理员，因为该部门还雇佣了总裁或经理。此外，例如，当您将一名培训师提升为经理时，这可能是该部门的第一位经理。这现在将要求该部门还雇佣一名管理员。类似的情况也适用于更新`DEPTNO`；如果您将目前在部门\
  \ 10 工作的经理切换到部门 20 工作，那么该经理可能是部门 20 的第一位经理，因此……，等等。\n\nSQL 标准允许您在更新触发器中指定这些列。然后，更新触发器仅在其中一个涉及的列被更改时才会触发。以下是您如何在\
  \ Oracle 中编写`after statement update`触发器（参见清单 11-31）。\n\n**清单 11-31.** *约束`EMP_TAB03`的\
  \ EM3 更高效更新触发器*\n```sql\ncreate trigger EMP_AUS_TAB03\nafter update of DEPTNO,JOB\
  \ on EMP\ndeclare pl_dummy varchar(40);\nbegin\n--\n  select 'Constraint EMP_TAB03\
  \ is satisfied' into pl_dummy\n  from DUAL\n  where not exists(select d.DEPTNO\n\
  \                   from EMP d\n                   where exists(select e2.*\n  \
  \                              from EMP e2\n                                where\
  \ e2.DEPTNO = d.DEPTNO\n                                and e2.JOB in ('PRESIDENT','MANAGER'))\n\
  \                   and not exists(select e3.*\n                               \
  \   from EMP e3\n                                  where e3.DEPTNO = d.DEPTNO\n\
  \                                  and e3.JOB = 'ADMIN'));\n--\nexception when no_data_found\
  \ then\n--\n  raise_application_error(-20999,'Constraint EMP_TAB03 is violated.');\n\
  --\nend;\n/\n```\n\n清单 11-31 中的第二行指定了涉及的列。\n\n`■Note` 与 EM2 的情况一样，DBMS 供应商也可以轻松地以声明方式支持此执行模型。与\
  \ EM2 相比，DBMS 为 EM3 需要做的额外工作是解析所有约束。它这样做不仅是为了确定 EM2 涉及的表结构，还要确定每个表结构涉及的属性是什么。DBMS\
  \ 然后可以自动实现更复杂的更新触发器。\n\n清单 11-32 展示了在`UPDATE`语句执行情况下，约束`DEPT_TAB01`的优化 DI 代码（请注意，只有`MGR`属性涉及在此约束中）。\n\
  \n**清单 11-32.** *更新情况下`DEPT_TAB01`的 DI 代码*\n```sql\ncreate trigger DEPT_AUS_TAB01\n\
  after update of MGR on DEPT\ndeclare pl_dummy varchar(40);\nbegin\n--\n  select\
  \ 'Constraint DEPT_TAB01 is satisfied' into pl_dummy from DUAL\n```\n\n\n\n```sql\n\
  where not exists(select m.DEPTNO\n                 from DEPT m\n               \
  \  where 2 < (select count(*)\n                            from DEPT d\n       \
  \                     where d.MGR = m.MGR));\n```\n\n```sql\nexception\nwhen no_data_found\
  \ then\n   raise_application_error(-20999,'Constraint DEPT_TAB01 is violated.');\n\
  end;\n/\n```\n\n有一种方法可以进一步提高此执行模型的效率。对于给定的约束，你有时可以推断出，一条 `INSERT` 语句（插入到涉及的某个表结构中）或一条\
  \ `DELETE` 语句（从涉及的某个表结构中删除）永远不会违反该约束。在表约束 `EMP_TAB03` 的情况下，两者都无法被推断出来。你可能会插入一名总裁，这种情况下应该验证约束。或者，你可能会删除一名管理员，这种情况下同样应该验证约束。然而，在表约束\
  \ `DEPT_TAB01` 的情况下，你可以推断删除一个部门永远不会违反此约束。\n\n下一个执行模型针对 `INSERT` 或 `DELETE` 语句进一步探讨了这种优化。\n\
  \n## 执行模型 4：基于涉及列 + 涉及表的极性\n\n此执行模型 (`EM4`) 在触发 `DML` 语句是 `UPDATE` 语句时与 `EM3` 相同。但是，当发生插入或删除时，你现在还需要利用关于每个约束下涉及表结构的\
  \ *极性* 的知识。\n\n对于给定的约束，一个表结构的**极性**定义如下：如果向该表结构的插入可能违反约束而删除不能，则为**正向**；如果从该表结构的删除可能违反约束而插入不能，则为**负向**；如果插入和删除都导致需要验证约束，则为**中性**；如果该表结构不参与该约束，则为**未定义**。\n\
  \n如果对于给定的约束，一个表结构的极性是 `中性`，那么 `EM4` 等同于 `EM3`；与 `EM3` 相比，你没有机会进一步优化插入或删除触发器。然而，如果它是\
  \ `正向` 或 `负向`，那么你可以分别进一步优化 `DELETE` 或 `INSERT` 语句的触发器；实际上，你可以直接移除它们。\n\n让我们通过检查约束\
  \ `DEPT_TAB01` 的 `DI` 代码来演示这一点。如前所述，只有插入部门才可能违反此约束；如果当前所有部门经理管理的部门都不超过两个，那么删除部门永远不会违反此约束。我们说\
  \ `DEPT` 表结构对于 `DEPT_TAB01` 约束具有 `正向` 极性。在这种情况下，你可以优化删除触发器，使其根本不为 `DEPT_TAB01` 运行任何\
  \ `DI` 代码；你根本不需要创建在 `EM3` 中为约束 `DEPT_TAB01` 所创建的那个 `DEPT` `DELETE` 语句触发器。\n\n> **Note**\
  \ 科学研究表明，`DBMS` 也可以相当轻松地计算出给定（形式化指定的）约束下涉及表结构的极性。这再次意味着，`DBMS` 供应商应该能够使用执行模型 `EM4`\
  \ 为我们提供完整的声明式多元组约束支持。\n\n尽管如此，执行模型 `EM4` 有时会在没有必要时运行 `DI` 代码。例如，考虑约束 `EMP_TAB03`，当你插入一名*销售代表*，或删除一名*培训师*时，`EM4`\
  \ 将为约束 `EMP_TAB03` 运行 `DI` 代码。但显然，因为销售代表和培训师在此约束中都不扮演任何角色，所以他们的插入和/或删除绝不应导致需要检查约束\
  \ `EMP_TAB03`。下一个执行模型解决了这种低效问题。\n\n## 执行模型 5：基于转换效应属性\n\n此执行模型 (`EM5`) 假设可以获取给定\
  \ `DML` 的*转换效应*\n\n\n\n"
- '# 第 11 章：在 Oracle 中实现数据库设计


  ## 过渡效应


  过渡效应描述了受 DML 语句影响的实际行，对于`UPDATE`语句而言，还包括这些行是如何被修改的。过渡效应为`语句后触发器`提供了一种便捷方式，可以精确查看哪些行受到了触发它的`DML`语句的影响。


  通过在`语句后触发器`中检查过渡效应，你能够解决之前为`EM4`提到的效率低下问题。


  你可以将过渡效应实现为一个视图，该视图仅保存在`DML`语句处理后立即存在的行。触发的`语句后触发器`可以访问此视图，以确定究竟哪些行被插入、删除或更新。


  在此执行模型中，我们假设每个表结构都有三个可用的过渡效应 (`TE`) 视图：


  *   **插入 TE 视图**，名为 `v_[表名]_ite`：此视图将显示触发它的`INSERT`语句刚刚插入的行。如果触发语句不是`INSERT`，则此视图为空（不包含任何行）。

  *   **更新 TE 视图**，名为 `v_[表名]_ute`：此视图将显示触发它的`UPDATE`语句刚刚更新的行；此视图会显示被修改列的新旧值。如果触发语句不是`UPDATE`，则此视图为空。

  *   **删除 TE 视图**，名为 `v_[表名]_dte`：此视图将显示触发它的`DELETE`语句刚刚删除的行。如果触发语句不是`DELETE`，则此视图为空。


  目前，Oracle 的`SQL DBMS`并未为你提供过渡效应（至少还有另外一家`DBMS`供应商提供了此功能）。但是，你可以为每个表结构开发行级和语句级触发器，通过执行必要的簿记工作来提供这三个`TE`视图。


  ## 实现示例


  请参见清单 11-33。它展示了为维护`EMP`表结构的过渡效应所需的`DI`代码。行级触发器使用会话临时表`EMP_TE`来存储过渡效应。在此表之上，定义了三个`TE`视图。


  **清单 11-33.** 维护`EMP`表结构过渡效应的 DI 代码


  ```sql

  create global temporary table EMP_TE

  (DML char(1) not null check(DML in (''I'',''U'',''D''))

  ,ROW_ID rowid

  ,EMPNO number(4,0)

  ,JOB varchar(9)

  ,HIRED date

  ,SGRADE number(2,0)

  ,MSAL number(7,2)

  ,DEPTNO number(2,0)

  ,check(DML<>''I'' or ROW_ID is not null)

  ,check(DML<>''U'' or ROW_ID is not null)

  ,check(DML<>''D'' or ROW_ID is null)

  ) on commit delete rows

  /


  create trigger EMP_BIUDS_TE

  before insert or update or delete on EMP

  begin

  -- 在每个 DML 语句执行前重置过渡效应。

  delete from EMP_TE;

  --

  end;

  /


  create trigger EMP_AIUDR_TE

  after insert or update or delete on EMP

  for each row

  begin

  -- 有条件地维护过渡效应。

  if INSERTING

  then

  -- 仅存储指向受影响行的“指针”。

  insert into EMP_TE(DML,ROW_ID) values(''I'',:new.rowid);

  elsif UPDATING

  then

  -- 存储旧行的快照，加上指向新版本的指针。

  insert into EMP_TE(DML,ROW_ID,EMPNO,JOB,HIRED,SGRADE,MSAL,DEPTNO) values (''U'',:new.rowid,:old.empno,:old.job,:old.hired

  ,:old.sgrade,:old.msal,:old.deptno);

  elsif DELETING

  then

  -- 存储旧行的快照。

  insert into EMP_TE(DML,ROW_ID,EMPNO,JOB,HIRED,SGRADE,MSAL,DEPTNO) values (''D'',null,:old.empno,:old.job,:old.hired

  ,:old.sgrade,:old.msal,:old.deptno);

  end if;

  --

  end;

  /


  create view V_EMP_ITE as

  select e.*

  from EMP_TE te

  ,EMP e

  where DML=''I''

  and te.ROW_ID = e.ROWID

  /


  create view V_EMP_UTE as

  select e.EMPNO as N_EMPNO ,e.JOB as N_JOB ,e.HIRED as N_HIRED

  ,e.SGRADE as N_SGRADE ,e.MSAL as N_MSAL ,e.DEPTNO as N_DEPTNO

  ,te.EMPNO as O_EMPNO ,te.JOB as O_JOB ,te.HIRED as O_HIRED

  ```




  '
- "# 在 ORACLE 中实现数据库设计\n\n##### 注意\n\n在过渡效应中，你只需要维护那些涉及与`EMP`表结构相关的任何（多行）约束的列。这就是为什么前面的代码不维护列`ENAME`、`BORN`和`USERNAME`：这三个列不涉及`DB_UEX`的任何约束。\n\
  \n基于前面的代码，你现在可以为约束`EMP_TAB03`创建更高效的 `INSERT` 和 `DELETE` 语句后的触发器。请记住，在`EM4`中，如果插入了一个销售代表或删除了一名培训师，这个约束的`DI`代码将会不必要地运行。\n\
  \n利用过渡效应，你现在可以精确地编写在执行`INSERT`语句或`DELETE`语句时需要验证约束的代码：\n\n-   对于插入操作：只有当语句插入了一名总裁或经理时，你才需要检查（同一部门内）是否存在管理员。\n\
  -   对于删除操作：只有当语句删除了一名管理员时，你才需要检查（是否仍然）有另一名管理员，以防该部门雇佣了经理或总裁。\n\n在所有其他`INSERT`或`DELETE`语句的情况下，不需要验证约束`EMP_TAB03`。\n\
  \n在清单 11-34 中，你可以找到修改后的插入和删除触发器。它们现在首先查询过渡效应以验证前述属性之一是否为`TRUE`，如果是，才执行验证约束`EMP_TAB03`的查询。\n\
  \n**清单 11-34.** `EM5`为约束`EMP_TAB03`设计的更高效的插入和删除触发器\n\n```sql\ncreate trigger EMP_AIS_TAB03\n\
  after insert on EMP\ndeclare\n  pl_dummy varchar(40);\nbegin\n  -- 如果此查询返回无行，则 EMP_TAB03\
  \ 不可能被违反。\n  select 'EMP_TAB03 must be validated' into pl_dummy\n  from DUAL\n \
  \ where exists (select 'A president or manager has just been inserted'\n       \
  \         from v_emp_ite\n                where JOB in ('PRESIDENT','MANAGER'));\n\
  \  --\n  begin\n    --\n    select 'Constraint EMP_TAB03 is satisfied' into pl_dummy\n\
  \    from DUAL\n    where not exists(select d.DEPTNO\n                     from\
  \ EMP d\n                     where exists(select e2.*\n                       \
  \           from EMP e2\n                                  where e2.DEPTNO = d.DEPTNO\n\
  \                                  and e2.JOB in ('PRESIDENT','MANAGER'))\n    \
  \                 and not exists(select e3.*\n                                 \
  \   from EMP e3\n                                    where e3.DEPTNO = d.DEPTNO\n\
  \                                    and e3.JOB = 'ADMIN'));\n    --\n  exception\
  \ when no_data_found then\n    --\n    raise_application_error(-20999,'Constraint\
  \ EMP_TAB03 is violated.');\n    --\n  end;\nexception when no_data_found then\n\
  \  -- 无需验证 EMP_TAB03。\n  null;\n  --\nend;\n/\n```\n\n```sql\ncreate trigger EMP_ADS_TAB03\n\
  after delete on EMP\ndeclare\n  pl_dummy varchar(40);\nbegin\n  -- 如果此查询返回无行，则 EMP_TAB03\
  \ 不可能被违反。\n  select 'EMP_TAB03 must be validated' into pl_dummy\n  from DUAL\n \
  \ where exists (select 'An administrator has just been deleted'\n              \
  \  from v_emp_dte\n                where JOB='ADMIN');\n  --\n  begin\n    --\n\
  \    select 'Constraint EMP_TAB03 is satisfied' into pl_dummy\n    from DUAL\n \
  \   where not exists(select d.DEPTNO\n                     from EMP d\n        \
  \             where exists(select e2.*\n                                  from EMP\
  \ e2\n                                  where e2.DEPTNO = d.DEPTNO\n           \
  \                       and e2.JOB in ('PRESIDENT','MANAGER'))\n               \
  \      and not exists(select e3.*\n                                    from EMP\
  \ e3\n                                    where e3.DEPTNO = d.DEPTNO\n         \
  \                           and e3.JOB = 'ADMIN'));\n    --\n  exception when no_data_found\
  \ then\n    --\n    raise_application_error(-20999,'Constraint EMP_TAB03 is violated.');\n\
  \    --\n  end;\nexception when no_data_found then\n  -- 无需验证 EMP_TAB03。\n  null;\n\
  \  --\nend;\n/\n```\n\n你可能已经注意到，随着过渡效应的可用，你现在也可以编写更高效的更新触发器。例如，将一名培训师更新为销售代表，不需要为`EMP_TAB03`执行`DI`代码。\n\
  \n\n\n写成在 `DUAL` 上的查询时，以下是需要查找的属性，它会在执行 `UPDATE` 语句时要求对 `EMP_TAB03` 进行验证：\n```sql\n\
  select 'EMP_TAB03 is in need of validation'\nfrom DUAL\nwhere exists(select 'Some\
  \ department just won a president/manager or just lost an administrator'\nfrom v_emp_ute\n\
  where (n_job in ('PRESIDENT','MANAGER') and\no_job not in ('PRESIDENT','MANAGER')\n\
  or (o_job='ADMIN' and n_job<>'ADMIN')\nor (o_deptno<>n_deptno and\n(o_job='ADMIN'\
  \ or n_job in ('PRESIDENT','MANAGER'))))\n```\n\n您可以使用上述查询，以与清单 11-34 所示的插入和删除触发器相同的方式，创建一个更高效的更新触发器。\n\
  \n在后文中，我们将这些对过渡效应视图的查询称为*过渡效应查询*（TE 查询）。\n\n`注意` 我们不知道数据库管理系统是否能够计算在此执行模型中使用的 TE\
  \ 查询（用于查找特定于约束的属性）。对该领域已进行的科学研究进行调查，并未为我们提供关于此问题的明确答案。因此，我们无法断然地说，数据库管理系统是否原则上应该能够通过执行模型\
  \ EM5 为我们提供完整的声明式多元组约束支持。\n\n清单 11-35 提供了使用执行模型 EM5 实现第二个示例表约束的触发器。它假定维护`DEPT`表结构的过渡效应视图的代码已经以类似清单\
  \ 11-33 中为`EMP`设置过渡效应的方式建立起来。请注意，约束`DEPT_TAB01`不需要删除触发器。\n\n**清单 11-35.** *约束 DEPT_TAB01\
  \ 的 DI 代码的 EM5 实现*\n```sql\ncreate trigger DEPT_AIS_TAB01\nafter insert on DEPT\n\
  declare pl_dummy varchar(40);\nbegin\n-- 如果此查询不返回行，则 DEPT_TAB01 不可能被违反。\nselect\
  \ 'DEPT_TAB01 must be validated' into pl_dummy\nfrom DUAL\nwhere exists (select\
  \ 'A row has just been inserted'\nfrom v_dept_ite);\n--\nbegin\n--\nselect 'Constraint\
  \ DEPT_TAB01 is satisfied' into pl_dummy from DUAL\nwhere not exists(select m.DEPTNO\n\
  from DEPT m\nwhere 2 < (select count(*)\nfrom DEPT d\nwhere d.MGR = m.MGR));\n--\n\
  exception when no_data_found then\n--\nraise_application_error(-20999,'Constraint\
  \ DEPT_TAB01 is violated.');\n--\nend;\nexception when no_data_found then\n-- 无需验证\
  \ DEPT_TAB01。\nnull;\n--\nend;\n/\n\ncreate trigger DEPT_AUS_TAB01\nafter update\
  \ on DEPT\ndeclare pl_dummy varchar(40);\nbegin\n-- 如果此查询不返回行，则 DEPT_TAB01 不可能被违反。\n\
  select 'DEPT_TAB01 must be validated' into pl_dummy\nfrom DUAL\nwhere exists (select\
  \ 'A department manager has just been updated'\nfrom v_dept_ute\nwhere o_mgr<>n_mgr);\n\
  --\nbegin\n--\nselect 'Constraint DEPT_TAB01 is satisfied' into pl_dummy from DUAL\n\
  where not exists(select m.DEPTNO\nfrom DEPT m\nwhere 2 < (select count(*)\nfrom\
  \ DEPT d\nwhere d.MGR = m.MGR));\n--\nexception when no_data_found then\n--\nraise_application_error(-20999,'Constraint\
  \ DEPT_TAB01 is violated.');\n--\nend;\nexception when no_data_found then\n-- 无需验证\
  \ DEPT_TAB01。\nnull;\n--\nend;\n/\n```\n\n请注意，在约束`DEPT_TAB01`的情况下，执行模型 EM4 和 EM5\
  \ 是等价的。\n\n可能会产生这样一个问题：在过渡效应中测试某个属性是否违背了其初衷。这是因为，如果执行此测试的成本与运行实际的约束验证代码一样高，那么您的收益何在？对于这个问题，我们可以做出以下观察：\n\
  \n*   过渡效应中的行数通常远少于约束所涉及的表结构中的行数。\n*   过渡效应总是在缓存中，而涉及的表结构中的所有行则不能这么说。\n\n\n### 第\
  \ 11 章 在 Oracle 中实现数据库设计\n\nTE 查询本身通常比为验证约束而条件运行的查询要简单得多。\n\n示例已展示了最后一点观察结果。结合前两点观察，这应该能够回答那个问题：TE\
  \ 查询不会违背其目的（DI 代码的效率）。\n\n此外，使用 TE 查询来*守护*约束验证还有第二个——更重要的——目的。防止执行不必要的约束验证查询将极大地有利于事务的并发性。我们将在下一小节“DI\
  \ 代码序列化”中处理这个方面。\n\n还有一种方法可以进一步优化执行模型 `EM5` 的效率。这涉及执行一个更高效的查询来验证约束。到目前为止，你都是直接从约束的形式化规范中推导出这些查询，因此它们验证的是*完整*的约束谓词。\n\
  \n在 `EMP_TAB03` 的情况下，该查询验证是否*每个*部门都满足量化的谓词（如果有总裁/经理，则有管理员）。在 `DEPT_TAB01` 的情况下，该查询验证是否*每个*部门经理管理的部门都不超过两个。通常，给定一个触发的\
  \ `DML` 语句，执行一个验证*较弱*谓词的查询就足够了。\n\n例如，如果一条 `INSERT` 语句向 `EMP` 表结构插入一个部门 10 的经理，那么理论上你只需要验证该量化谓词是否仍*仅对部门\
  \ 10* 满足。同样，如果一条 `UPDATE` 语句更改了某个部门的经理，那么你只需要验证这位新的部门经理管理的部门是否没有超过两个。\n\n最后一个执行模型解决了这个进一步提高\
  \ DI 代码效率的机会。\n\n## 执行模型 6：过渡效应属性加上优化查询\n这个执行模型 (`EM6`) 与 `EM5` 相似，因为它也需要每个表结构的过渡效应；你现在以稍微更复杂的方式使用这个过渡效应，以便能够确定较弱的谓词。\n\
  \n你现在不仅利用过渡效应中的某个属性来守护约束验证查询的执行，而且还利用过渡效应来提供可用于优化验证查询的值。例如，在 `EMP_TAB03` 的情况下，你可以使用过渡效应来确定需要检查哪些部门的较弱谓词；这应该总是导致执行更高效的验证查询。在\
  \ `DEPT_TAB01` 的情况下，你可以使用过渡效应来找出需要检查哪些 `MGR` 值的较弱谓词。\n\n清单 11-36 向你展示了如何做到这一点。它展示了约束\
  \ `EMP_TAB03` 的插入、更新和删除触发器的 `EM6` 版本。\n\n**清单 11-36.** 约束 EMP_TAB03 的 DI 代码的 EM6\
  \ 实现\n\n```sql\ncreate trigger EMP_AIS_TAB03\nafter insert on EMP\ndeclare\n  pl_dummy\
  \ varchar(40);\nbegin\n  --\n  for r in (select distinct deptno\n            from\
  \ v_emp_ite\n            where JOB in ('PRESIDENT','MANAGER'));\n  loop\n    begin\n\
  \      --\n      select 'Constraint EMP_TAB03 is satisfied' into pl_dummy\n    \
  \  from DUAL\n      where not exists(select e2.*\n                       from EMP\
  \ e2\n                       where e2.DEPTNO = r.DEPTNO\n                      \
  \ and e2.JOB in ('PRESIDENT','MANAGER'))\n      or exists(select e3.*\n        \
  \        from EMP e3\n                where e3.DEPTNO = r.DEPTNO\n             \
  \   and e3.JOB = 'ADMIN');\n      --\n    exception when no_data_found then\n  \
  \    --\n      raise_application_error(-20999,\n        'Constraint EMP_TAB03 is\
  \ violated for department '||to_char(r.deptno)||'.');\n      --\n    end;\n  end\
  \ loop;\nend;\n/\n```\n\n```sql\ncreate trigger EMP_ADS_TAB03\nafter delete on EMP\n\
  declare\n  pl_dummy varchar(40);\nbegin\n  --\n  for r in (select distinct deptno\n\
  \            from v_emp_dte\n            where JOB='ADMIN');\n  loop\n    begin\n\
  \      --\n      select 'Constraint EMP_TAB03 is satisfied' into pl_dummy\n    \
  \  from DUAL\n      where not exists(select e2.*\n                       from EMP\
  \ e2\n                       where e2.DEPTNO = r.DEPTNO\n                      \
  \ and e2.JOB in ('PRESIDENT','MANAGER'))\n      or exists(select e3.*\n        \
  \        from EMP e3\n                where e3.DEPTNO = r.DEPTNO\n             \
  \   and e3.JOB = 'ADMIN');\n      --\n    exception when no_data_found then\n  \
  \    --\n      raise_application_error(-20999,\n        'Constraint EMP_TAB03 is\
  \ violated for department '||to_char(r.deptno)||'.');\n      --\n    end;\n  end\
  \ loop;\nend;\n/\n```\n\n```sql\ncreate trigger EMP_AUS_TAB03\nafter update on EMP\n\
  declare\n  pl_dummy varchar(40);\nbegin\n  --\n  for r in (select n_deptno as deptno\n\
  \            from v_emp_ute\n            where (o_job not in ('PRESIDENT','MANAGER')\
  \ or updated_deptno='TRUE') and n_job in ('PRESIDENT','MANAGER')\n            union\n\
  \            select o_deptno as deptno\n            from v_emp_ute\n           \
  \ where (n_job<>'ADMIN' or updated_deptno='TRUE')\n            and old_job ='ADMIN')\n\
  \  loop\n    begin\n      --\n      select 'Constraint EMP_TAB03 is satisfied' into\
  \ pl_dummy\n      from DUAL\n      where not exists(select e2.*\n              \
  \         from EMP e2\n                       where e2.DEPTNO = r.DEPTNO\n     \
  \                  and e2.JOB in ('PRESIDENT','MANAGER'))\n      or exists(select\
  \ e3.*\n                from EMP e3\n                where e3.DEPTNO = r.DEPTNO\n\
  \                and e3.JOB = 'ADMIN');\n      --\n    exception when no_data_found\
  \ then\n      --\n      raise_application_error(-20999,\n        'Constraint EMP_TAB03\
  \ is violated for department '||to_char(r.deptno)||'.');\n      --\n    end;\n \
  \ end loop;\nend;\n/\n```\n\n##### 注意\n前面 `TE` 查询中的 `distinct` 关键字可能防止在 `UPDATE`\
  \ 语句影响了多行的情况下多次执行相同的约束验证查询。\n\n因为示例约束恰好是全称量词，所以在 `EMP_TAB03` 和 `DEPT_TAB01` 的情况下找到较弱的谓词是显而易见的。然而，情况并非总是如此；要发现较弱的谓词也可能相当复杂。这完全取决于约束的规范。同样，我们不知道是否有可能，不必你自己去发现，而是让\
  \ `DBMS` 在给定声明的约束形式规范的情况下自动计算较弱的谓词（包括 `TE` 查询）。\n\n###### DI 代码序列化\n当你自己实现 `DI`\
  \ 代码时，你应该意识到另一个主要问题。无论你是遵循触发式过程策略还是嵌入式过程策略，这个问题都适用。\n\n在 Oracle 的 `SQL` `DBMS` 中，并发执行事务。在任何时候都可能有许多*开放*事务；也就是说，事务已启动但尚未提交。如本章前面所述，一个开放事务无法看到其他并发开放事务所做的更改。这在\
  \ `DI` 代码的正确性方面具有严重的影响。正如我们稍后将演示的，该问题的根本原因在于，作为 `DI` 代码一部分执行的约束验证查询，假定它读取的所有数据——或由于数据不存在而未能读取的数据——目前没有被其他事务更改（或创建）。对于给定约束的\
  \ `DI` 代码，只有当并发运行的、执行该约束验证查询（嵌入在 `DI` 代码中）的事务被*序列化*时，才能正确实现该约束。\n\n##### 注意\n我们实际上将演示在不支持并发执行事务*可串行性*的\
  \ `DBMS` 中出现的一些经典并发问题。如果你不熟悉可串行性的概念，请查阅我们在附录 C 中添加的一些参考文献。\n\n\n让我们通过描述两个并发执行的事务场景来演示这个可串行性问题，这两个事务都可能违反\
  \ `EMP_TAB03` 约束。为简单起见，假设 `EMP` 表结构当前包含一行，代表在部门 20 工作的管理员。事务 `TX1` 在 `EMP` 表结构中插入一名在部门\
  \ 20 工作的经理。事务 `TX2` 从 `EMP` 表结构中删除在部门 20 工作的管理员。现在请查看表 11-2，它描述了这两个事务并发执行的可能场景。\n\
  \n```\n表 11-2. TX1 和 TX2 并发执行\n时间        TX1       TX2       DI 代码\n----------------------------------------------------------\n\
  t=0                   插入      找到管理员；因此允许此次插入。\nt=1                   删除      未找到经理；因此允许此次删除。\n\
  t=2                   提交\nt=3                   提交\n```\n\n在时间 `t=0`，事务 `TX1` 开始。它插入经理，这导致执行约束\
  \ `EMP_TAB03` 的 DI 代码。作为此 DI 代码一部分执行的约束验证查询找到了部门 20 的管理员，这导致 DI 代码允许此次插入。在时间 `t=1`，事务\
  \ `TX2` 开始。它删除 `EMP` 表结构中代表管理员的唯一一行。删除管理员也会触发执行约束 `EMP_TAB03` 的相同 DI 代码。作为此 DI 代码一部分执行的约束验证查询没有找到在部门\
  \ 20 工作的经理（或总裁），这导致 DI 代码也允许此次删除。\n\n**注意：** 在 `t=1`，事务 `TX2` 内执行的查询看不到事务 `TX1`\
  \ 所做的未提交更改。\n\n在 `t=2`，事务 `TX1` 提交。在 `t=3`，事务 `TX2` 提交。数据库现在违反了约束 `EMP_TAB03`；`EMP`\
  \ 表结构中持有一名在部门 20 工作的经理，但该部门却没有管理员。\n\n让我们也在约束 `DEPT_TAB01` 的上下文中看一个例子。假设 `DEPT`\
  \ 表结构当前包含一个由员工 1042 管理的部门。事务 `TX3` 插入一个同样由员工 1042 管理的新部门。事务 `TX4` 也插入一个再次由员工 1042\
  \ 管理的部门。请看表 11-3，它描述了这两个事务并发执行的可能场景。\n\n```\n表 11-3. TX3 和 TX4 并发执行\n时间        TX3\
  \       TX4       DI 代码\n----------------------------------------------------------\n\
  t=0                   插入      看到 1042 现在管理两个部门；因此允许此次插入。\nt=1                  \
  \ 插入      看到 1042 现在管理两个部门；因此允许此次插入。\nt=2                   提交\nt=3            \
  \       提交\n```\n\n同样，在 `t=1` 时于 `TX4` 中执行的 DI 代码看不到事务 `TX3` 在 `t=0` 插入的未提交部门。两次插入都成功执行。在\
  \ `t=3` 之后，数据库违反了约束 `DEPT_TAB01`；员工 1042 正在管理三个部门。\n\n对于每一个多元组约束，你都可以设计一个并发执行事务的场景，使得这些事务提交后，数据库处于违反约束的状态。请注意，这与用于实现\
  \ DI 代码的执行模型无关。\n\n那么，问题是你能解决这个问题吗？答案是肯定的。然而，这要求你在 DI 代码中开发并嵌入有时相当复杂的串行化代码，以确保永远不会有\
  \ *两个涉及相同约束的事务同时执行* （即，运行相同约束的验证查询）。\n\n**注意：** 以下部分假设你熟悉 Oracle 的 `dbms_lock` 包和自治事务的概念。如果不熟悉，我们建议你首先学习\
  \ Oracle 关于此包和自治事务的文档。\n\n\n\n技巧在于使用 Oracle SQL 数据库管理系统提供的 `dbms_lock` 包。通过使用这个包，你可以获取应用锁，从而有效地序列化涉及相同约束的并发执行事务。\n\
  \n### 列表 11-37. 应用锁服务\n\n`列表 11-37` 展示了构建在 `dbms_lock` 包之上的过程 `p_request_lock` 的代码，通过它你可以请求一个应用锁。这个过程需要调用一个会执行隐式提交的\
  \ `dbms_lock` 模块。因为你将从 DI 代码中调用 `p_request_lock`，而 DI 代码又是在触发器中执行的（在此上下文中不允许提交），所以你需要对当前事务隐藏这个隐式提交。你可以通过使用一个自治事务来实现这一点。辅助函数\
  \ `f_allocate_unique`（也在 `列表 11-37` 中）实现了这个自治事务。\n\n```sql\ncreate function f_allocate_unique\n\
  (p_lockname in varchar) return varchar as\n--\npragma autonomous_transaction;\n\
  --\npl_lockhandle varchar(128);\n--\nbegin\n  -- This does implicit commit.\n  dbms_lock.allocate_unique(upper(p_lockname)\n\
  \                           ,pl_lockhandle\n                           ,60*10);\
  \ -- 将过期时间设为 10 分钟。\n--\n  return pl_lockhandle;\n--\nend;\n/\n\ncreate procedure\
  \ p_request_lock(p_lockname in varchar) as\n--\npl_lockhandle varchar(128);\npl_return\
  \ number;\n--\nbegin\n--\n  -- Go get a unique lockhandle for this lockname.\n--\n\
  \  pl_lockhandle := f_allocate_unique(p_lockname);\n--\n  -- Request the named application\
  \ lock in exclusive mode.\n  -- Allow for a blocking situation that lasts no longer\
  \ than 60 seconds.\n--\n  pl_return :=\n    dbms_lock.request(lockhandle => pl_lockhandle\n\
  \                     ,lockmode => dbms_lock.x_mode\n                     ,timeout\
  \ => 60\n                     ,release_on_commit => true);\n--\n  if pl_return not\
  \ in (0,4)\n  then\n    raise_application_error(-20998,\n    'Unable to acquire\
  \ constraint serialization lock '||p_lockname||'.'); end if;\n--\nend;\n/\n```\n\
  \n现在，你可以——在这种情况下相当容易地——确保两个都需要为约束 `DEPT_TAB01` 运行 DI 代码的事务被正确地序列化，以防止在 `表 11-3`\
  \ 中演示的并发问题。来看一下 `列表 11-38`，它展示了使用执行模型 `EM6` 为约束 `DEPT_TAB01` 编写的 DI 代码，其中包含了必要的对\
  \ `p_lock_request` 的调用以确保正确的序列化。\n\n### 列表 11-38. DEPT_TAB01 的 DI 代码的 EM6 实现（包含序列化）\n\
  \n```sql\ncreate trigger DEPT_AIS_TAB01\nafter insert on DEPT\ndeclare pl_dummy\
  \ varchar(40);\nbegin\n--\n  for r in (select distinct mgr as mgr\n            from\
  \ v_dept_ite)\n  loop\n    begin\n      -- Acquire serialization lock.\n      p_request_lock('DEPT_TAB01');\n\
  --\n      select 'Constraint DEPT_TAB01 is satisfied' into pl_dummy from DUAL\n\
  \      where 2 >= (select count(*)\n                  from DEPT d\n            \
  \      where d.MGR = r.MGR);\n--\n    exception when no_data_found then\n--\n  \
  \    raise_application_error(-20999,'Constraint DEPT_TAB01 is violated '||\n   \
  \   'for department manager '||to_char(r.MGR)||'.');\n--\n    end;\n  end loop;\n\
  --\nend;\n/\n\ncreate trigger DEPT_AUS_TAB01\nafter update on DEPT\ndeclare pl_dummy\
  \ varchar(40);\nbegin\n--\n  for r in (select distinct n_mgr as mgr\n          \
  \  from v_dept_ute)\n  loop\n    begin\n      -- Acquire serialization lock.\n \
  \     p_request_lock('DEPT_TAB01');\n--\n      select 'Constraint DEPT_TAB01 is\
  \ satisfied' into pl_dummy from DUAL\n      where 2 >= (select count(*)\n      \
  \            from DEPT d\n                  where d.MGR = r.MGR);\n--\n    exception\
  \ when no_data_found then\n--\n      raise_application_error(-20999,'Constraint\
  \ DEPT_TAB01 is violated '||\n      'for department manager '||to_char(r.MGR)||'.');\n\
  --\n    end;\n  end loop;\n--\nend;\n/\n```\n\n在 `表 11-3` 中描述的场景现在按如下方式执行（参见 `表\
  \ 11-4`）。\n\n### 表 11-4. TX3 和 TX4 的序列化\n\n| **时间** | **TX3** | **TX4** | **DI 代码**\
  \ |\n| :--- | :--- | :--- | :--- |\n| t=0 | INSERT | | 看到 1042 目前管理着两个部门；因此允许此次插入。\
  \ |\n\n\n\nt=1\n\nINSERT\n\n在序列化锁上被阻塞（`DI`代码的执行被暂停）。\n\nt=2\n\nCOMMIT\n\n（在 60 秒内。）\n\
  \nt=3\n\n`TX4`解除阻塞，`DI`代码恢复执行。\n\nt=4\n\n`DI`代码看到员工 1042 现在管理着三个部门，插入操作失败。\n\n在\
  \ t=1 时，事务`TX4`开始等待事务`TX3`释放应用程序锁。紧接着 t=2 之后，这个等待结束，`DI`代码的执行得以恢复。它现在执行约束验证查询，并发现`TX4`中的插入操作不被允许，因为它会使员工\
  \ 1042 成为三个部门的经理。\n\n你现在已经解决了序列化问题：两个都需要执行`DEPT_TAB01`验证查询的事务永远不可能同时执行。然而，所实现的锁定方案可能有点过于粗放。例如，如果`TX4`要插入一个由其他人管理的部门（即不是员工\
  \ 1042），那么`TX4`也将被阻塞，而实际上在这种情况下，为了`DI`代码能正确实施约束，它并不需要被阻塞。\n\n鉴于在代码清单 11-38 中对`EM6`的使用，你可以通过将对`p_request_lock`的调用改为以下形式，为此约束实现一个更细粒度的锁定方案：`p_request_lock('DEPT_TAB01'||to_char(r.mgr))`\n\
  \n你现在不是始终请求名称恒定的应用程序锁（`'DEPT_TAB01'`），而是请求一个名称取决于需要检查的*情况*的应用程序锁。现在，插入由不同员工管理的两个部门的两个事务被允许同时执行。\n\
  \n注意：只有`EM6`允许你实现这种更细粒度的锁定方案。\n\n"
- "# 290\n\n## 第 11 章 - 在 ORACLE 中实现数据库设计\n\n我们将以一些关于可序列化的总结性评论来结束本节，进一步阐明为何供应商对声明式策略来实现约束的支持如此欠缺。\n\
  \n回想一下你已经了解的多种执行模型。效率较低的执行模型不仅会比必要更频繁地执行非优化的约束验证查询，它们也会比必要更频繁地获取序列化锁。例如，如果你在使用`EM1`构建的`DI`代码中加入序列化锁调用，实际上你将只允许一次执行一个事务；在这个执行模型中，不可能有任何事务的并发执行。在`EM2`中，这被放宽为每个表结构一次只允许一个事务。进一步遍历所有剩余的执行模型，并发级别每次都在增加。\n\
  \n除了之前关于`DBMS`可能无法计算`TE`查询和优化的约束验证查询的评论外，类似的评论也适用于`DBMS`能够计算出最优的序列化锁调用应该是什么。确保`DI`代码执行正确性的一个惰性策略是为每个约束获取一个独占的应用程序锁（如代码清单\
  \ 11-38 所示）。然而，你可能不会接受随之而来的`DBMS`并发性不必要下降的问题。\n\n本节广泛研究了使用触发式过程策略为表约束实现高效`DI`代码的相关问题后，下一节将只为你提供一个为表约束实现`DI`代码的指导原则摘要。\n\
  \n#### 实现表约束\n\n正如前一节所展示的，正是在表约束这个级别，事情迅速变得更加复杂。你只能以声明方式规定两种类型的表约束：唯一标识属性（键），以及引用回同一表的子集要求（此时子集要求是一个表约束）。\n\
  \n以下是一个示例，展示了 SQL 主键约束和唯一键约束的使用（见`代码清单 11-39`）。\n\n\n\n#### 第 11 章\n\n#### 实现数据库约束\n\
  \n**清单 11-39. DEPT 表结构键的声明性实现**\n\n```sql\nalter table DEPT add constraint DEPT_key1\
  \ primary key(deptno);\nafter table DEPT add constraint DEPT_key2 unique(dname,loc);\n\
  ```\n\n该示例数据库设计不涉及表级别的子集要求。下一节你将看到如何声明性地表述数据库级别的子集要求。\n\n鉴于“表约束实现问题”这一节，你或许现在能意识到为什么数据库管理系统供应商不提供在声明性约束中包含查询的可能性；很可能因为数据库管理系统无法提供比\
  \ EM4 更好的执行模型，并且你也可能不会接受 EM4 所带来的强加事务串行化。\n\n例如，以下试图声明性实现 `DEPT_TAB01` 的 SQL 语句是不被允许的：\n\
  \n`7451CH11.qxd 5/15/07 2:26 PM Page 291`\n\n```sql\n-- Oracle 的无效 \"alter table\
  \ add constraint\" 语法。\nalter table DEPT add constraint dept_tab01 check\n(not exists(select\
  \ m.DEPTNO\n            from DEPT m\n            where 2 < (select count(*)\n  \
  \                     from DEPT d\n                       where d.MGR = m.MGR)))\n\
  ```\n\n你必须为所有其他类型的表约束自己编写过程性的 DI 代码。\n\n开发和实现高效的 DI 代码并非易事。正如研究各种执行模型时所展示的，每个约束都需要以下高级步骤：\n\
  \n1.  将形式化规范转化为约束验证查询。\n2.  编写维护转换效应的代码。\n3.  设计 TE 查询，确保仅在必要时运行约束验证查询。\n4.  寻找一种方法，通过\
  \ TE 查询提供可用于验证查询的值来优化约束验证查询。\n5.  为 DI 代码设计和添加串行化策略。\n\n然而，你会发现，通过定期实现表约束并熟练掌握该技能，以过程化方式实现表约束通常是完全可行的。\n\
  \n如你所知，实现数据库约束的声明性支持仅适用于子集要求；在 SQL 中，子集要求通过声明 *外键* 来表达。让我们看看如何实现来自示例数据库设计的子集要求 PSSR1：\n\
  \nPSSR1(EMP,DEPT) :=\n\n/* 员工为一个已知的部门工作 */\n\n{ e(DEPTNO) | e∈EMP } ⊆ { d(DEPTNO)\
  \ | d∈DEPT }\n\n在 SQL 中，此子集要求表述如下：\n\n```sql\nalter table emp add constraint emp_fk_dept\n\
  foreign key(deptno) references dept(deptno);\n```\n\nSQL 要求被引用的属性集构成一个键。在上述例子中，确实如此；`DEPTNO`\
  \ 在 `DEPT` 中是唯一标识。然而，在以下情况——要求 PSSR7——`LOC` 在 `DEPT` 中不构成键。因此，你不能通过声明外键来实现 PSSR7。\n\
  \n`7451CH11.qxd 5/15/07 2:26 PM Page 292`\n\nPSSR7(OFFR,DEPT) :=\n\n/* 课程在我们有部门的地点进行\
  \ */\n\n{ o(LOC) | o∈OFFR } ⊆ { d(LOC) | d∈DEPT }\n\n如果你尝试以下 `alter table` 命令，SQL\
  \ 数据库管理系统将报错：\n\n```sql\n-- 因为 dept(loc) 不是键，所以无效。\nalter table offr add constraint\
  \ offr_fk_dept\nforeign key(loc) references dept(loc);\n```\n\n还有其他一些情况，无法使用外键来声明性地实现子集要求。示例数据库设计中的一些子集要求引用被引用表结构中的\
  \ *子集* 元组；这很常见。这里有一个例子：\n\nPSSR2(DEPT,EMP) :=\n\n/* 部门经理是已知员工，不包括管理员和总裁 */\n\n{\
  \ d(MGR) | d∈DEPT } ⊆\n\n{ e(EMPNO) | e∈EMP ∧ e(JOB) ∉ {'ADMIN','PRESIDENT'} }\n\
  \n\n\n您可以按如下方式声明从 `DEPT` 到 `EMP` 的外键：`alter table offr add constraint offr_fk_dept\
  \ foreign key(loc) references dept(loc);`\n\n这个外键将确保只引用已知的员工；但它仍然允许管理员或总裁管理部门。目前无法通过声明方式指定只允许引用员工的一个子集；为此，您需要编写额外的过程式代码。\n\
  \n类似的限制也适用于只需要引用另一表中行键值的行子集的情况。这在子集要求 `PSSR8` 中有所体现：`PSSR8(OFFR,EMP) :=`\n\n`/*\
  \ 课程授课的讲师是已知的讲师 */`\n\n```\n{ o(TRAINER) | o∈OFFR ∧ o(TRAINER) ≠ -1 } ⊆\n{ e(EMPNO)\
  \ | e∈EMP ∧ e(JOB) = 'TRAINER' }\n```\n\n无法向 DBMS 声明，只有 `TRAINER≠-1` 的 `OFFR` 行子集中的每一行都引用一个已知的讲师。\n\
  \n不过，这种情况有一种技巧可以应用。通过选择使用 `NULL` 而不是值 `-1` 来表示尚未分配讲师，您至少可以声明一个外键，以强制讲师分配必须引用一个已知的员工。同样，您仍然需要开发额外的过程式代码来在另一端实现限制（只允许引用\
  \ `JOB='TRAINER'` 的员工）。\n\n现在让我们花点时间研究一下；在构建额外的过程式代码之前，明智的做法是首先思考一下这里需要实现的剩余谓词是什么（给定外键已经为实现\
  \ `PSSR8` 做了一些工作）。更准确地说，您能将 `PSSR8` 重写为一个合取式，其中一个合取项恰好涵盖外键已经通过声明方式实现的内容，而另一个合取项涵盖需要通过过程式代码实现的内容吗？如下所示。\n\
  \n7451CH11.qxd 5/15/07 2:26 PM Page 293\n\n## 第 11 章 ■ 在 ORACLE 中实现数据库设计\n\n293\n\
  \n```\n(∀o∈OFFR: o(TRAINER)≠-1 ⇒ (∃e∈EMP: e(empno)=o(trainer))) ∧\n(∀t∈(OFFR◊◊{(trainer;empno)})⊗EMP:\
  \ t(job)='TRAINER')\n```\n\n前面的第一个合取项表明，对于每个课程授课，分配的讲师应该是一个已知的员工；这代表了外键所实现的内容。第二个合取项表明，对于\
  \ `OFFR`（需要属性重命名）与 `EMP` 的连接中的所有元组，`JOB` 属性应持有值 `'TRAINER'`；这代表了需要通过过程式代码实现的内容。顺便问一下，您认出第二个合取项的谓词模式了吗？它实际上是一个元组连接谓词。\n\
  \n### ■ 注意\n\n您可能凭直觉就能理解，第二个谓词正是为 `PSSR8` 需要通过过程式代码实现的部分。值得一提的是，您实际上可以形式化地证明前面的合取式在逻辑上等同于\
  \ `PSSR8` 谓词。这需要开发更多关于量词的重写规则，以及关于如何建立形式化证明的一些概念（这两方面在本书中我们都未涉及）。\n\n过程式地实现数据库约束的方式与表约束类似；只是现在因为涉及多个表结构，需要开发更多的触发器。请看一下\
  \ `清单 11-40`。它列出了使用 `EM6`（包括序列化逻辑）实现前述剩余的元组连接谓词以完成 `PSSR8` 实现所需的所有触发器。在这种情况下，您需要一个在\
  \ `EMP` 表结构上的 after statement update 触发器，以及一个在 `OFFR` 表结构上的 after `INSERT` statement\
  \ 触发器和 after statement update 触发器。\n\n`清单 11-40` 没有列出维护转换效果视图所必需的全局临时表、pre-statement\
  \ 触发器、after row 触发器和视图定义；您需要以类似 `清单 11-33` 所示的方式，为 `OFFR` 和 `EMP` 两个表结构设置这些。\n\n\
  \n\n**清单 11-40.** 剩余 PSSR8 谓词 DI 代码的 EM6 实现\n\n```\ncreate trigger EMP_AUS_PSSR8\n\
  after update on EMP\ndeclare\n  pl_dummy varchar(40);\nbegin\n  -- Changing a trainers\
  \ job, requires validation of PSSR8.\n  for r in (select n_empno as empno\n    \
  \        from v_emp_ute e\n            where (e.0_empno=e.n_empno and e.n_job<>'TRAINER'\
  \ and e.o_job='TRAINER') or (e.0_empno<>e.n_empno and e.n_job<>'TRAINER')) loop\n\
  \    begin\n      -- Acquire serialization lock.\n      p_request_lock('PSSR8'||to_char(r.empno));\n\
  \      --\n      select 'Constraint PSSR8 is satisfied' into pl_dummy\n      from\
  \ DUAL\n      where not exists(select 'This employee is assigned as a trainer to\
  \ an offering'\n                       from OFFR o\n                       where\
  \ o.TRAINER = r.empno);\n      --\n    exception when no_data_found then\n     \
  \ --\n      raise_application_error(-20999,'Constraint PSSR8 is violated '||\n \
  \       'for employee '||to_char(r.empno)||'.');\n      --\n    end;\n  end loop;\n\
  \  --\nend;\n/\n\ncreate trigger OFFR_AIS_PSSR8\nafter insert on OFFR\ndeclare\n\
  \  pl_dummy varchar(40);\nbegin\n  -- Inserting an offering, requires validation\
  \ of PSSR8.\n  for r in (select distinct trainer\n            from v_offr_ite i)\n\
  \  loop\n    begin\n      -- Acquire serialization lock.\n      p_request_lock('PSSR8'||to_char(r.trainer));\n\
  \      --\n      select 'Constraint PSSR8 is satisfied' into pl_dummy\n      from\
  \ DUAL\n      where not exists(select 'This employee is not a trainer'\n       \
  \                from EMP e\n                       where e.EMPNO = r.trainer\n\
  \                       and e.JOB <> 'TRAINER');\n      --\n    exception when no_data_found\
  \ then\n      --\n      raise_application_error(-20999,'Constraint PSSR8 is violated\
  \ '||\n        'for trainer '||to_char(r.trainer)||'.');\n      --\n    end;\n \
  \ end loop;\n  --\nend;\n/\n\ncreate trigger OFFR_AUS_PSSR8\nafter update on OFFR\n\
  declare\n  pl_dummy varchar(40);\nbegin\n  -- Updating the trainer of an offering,\
  \ requires validation of PSSR8.\n  for r in (select distinct n_trainer as trainer\n\
  \            from v_offr_ute u\n            where o_trainer<>n_trainer)\n  loop\n\
  \    begin\n      -- Acquire serialization lock.\n      p_request_lock('PSSR8'||to_char(r.trainer));\n\
  \      --\n      select 'Constraint PSSR8 is satisfied' into pl_dummy\n      from\
  \ DUAL\n      where not exists(select 'This employee is not a trainer'\n       \
  \                from EMP e\n                       where e.EMPNO = r.trainer\n\
  \                       and e.JOB <> 'TRAINER');\n      --\n    exception when no_data_found\
  \ then\n      --\n      raise_application_error(-20999,'Constraint PSSR8 is violated\
  \ '||\n        'for trainer '||to_char(r.trainer)||'.');\n      --\n    end;\n \
  \ end loop;\n  --\nend;\n/\n```\n\n我们将以对数据库供应商在多元组约束方面提供的声明性支持不足的观察来结束本节。因为我们相信，对于数据库供应商而言，不可能编程实现一个算法，该算法能接受任意复杂的谓词，然后计算高效的\
  \ TE 查询、一个最小的验证查询以及实现执行模型 EM6 的最优序列化代码，所以我们不应期望未来这些供应商能以实用、可用且可接受的方式提供对多元组约束的完全支持。我们所能期望的最好是，数据库研究人员首先提出更常见的约束类别，并为这些类别开发便捷的简写形式。然后，数据库供应商应提供与我们这些简写形式一致的新声明性构造，以便我们能够轻松地向\
  \ DBMS 陈述这些常见的约束类别。有了这样一个常见类别的声明，数据库供应商就应该能够编程实现一个算法，在底层为我们提供一个类似 EM6 的执行模型来实现该约束。\n\
  \n`注意` 我们在本书中已经暗示了几种常见的约束类别，数据库供应商应为其提供完全的声明性支持：特化、泛化和连接中的元组约束。此外，在子集需求约束领域——我们目前只有\
  \ SQL 外键构造可用——应该提供更多声明性的变体形式。\n\n至此，关于为数据库约束开发 DI 代码的探讨就结束了。下一节将探讨如何实现过渡约束。\n\n\
  ### 实现过渡约束\n\n请返回清单 8-8，花点时间回顾一下我们示例数据库宇宙中的过渡约束。你是否注意到，状态过渡约束的指定方式与指定数据库约束的方式并无不同？它们是涉及两个或多个表类型参数的谓词。当然，在过渡约束的情况下，这些参数总是代表所涉及表结构的旧快照和新快照。但从本质上讲，过渡约束是一个涉及多个表结构的谓词。这意味着，为过渡约束实现\
  \ DI 代码的复杂性，原则上与数据库约束的复杂性并无不同。\n\n过渡约束处理的是事务的开始状态和结束状态。如前所述，事务在 SQL 中是通过连续执行 DML\
  \ 语句来实现的。这种实现不仅会创建中间数据库状态，而且——在本节的上下文中——还会创建*中间状态转换*。从形式上讲，你只需要验证从事务开始状态到结束状态的转换。过渡约束的\
  \ DI 代码应该只在事务的最后一条 DML 语句创建了结束状态之后执行；也就是说，它的执行应该被推迟到事务结束时。在“引入延迟检查”一节中，你会找到一个关于延迟执行\
  \ DI 代码的简要探讨。现在我们将演示如何为过渡约束开发 DI 代码（在触发式过程策略中），使得所有中间状态转换也满足这些约束。\n\n`注意` 正如你可能知道的，当前的\
  \ SQL DBMS 中完全没有支持以声明方式实现过渡约束。\n\n如果你开始思考如何实现过渡约束，你立即会碰到这个问题：“在 after 语句触发器中，我如何查询所涉及表结构的旧快照？”答案其实很简单。在\
  \ Oracle 的 SQL DBMS 中，你可以使用*闪回查询*来做到这一点：查询表结构的某个旧快照。为了能够对表结构使用闪回查询，你必须以某种方式管理事务开始时的*系统变更号*。你可以使用包变量或会话临时表来做到这一点。请注意，只有那些旧快照参与了任何状态过渡约束的表结构，才需要使用闪回查询进行查询。因此，仅当\
  \ DML 语句更改了这些表结构之一时才管理系统变更号是安全的；你可以使用语前触发器来实现这一点，这些触发器通过 `dbms_flashback.get_system_change_number`\
  \ 确定当前的系统变更号，并将其存储在包变量或会话表中。在下面的例子中，我们将假设这些触发器已经就位。\n\n我们现在将为你展示实现状态过渡约束 `STC5`\
  \ 的 DI 代码的探讨。\n\n`STC5(HISTB,EMPB,HISTE,EMPE) :=`\n\n`/* 新的历史记录必须准确反映员工的更新 */`\n\
  \n`( ∀h∈(HISTE⇓{EMPNO,UNTIL} − HISTB⇓{EMPNO,UNTIL})⊗HISTE:`\n\n`h(UNTIL) = sysdate\
  \ ∧`\n\n`( ∃e1∈EMPB, e2∈EMPE:`\n\n`e1↓{EMPNO,MSAL,DEPTNO} = h↓{EMPNO,MSAL,DEPTNO}\
  \ ∧`\n\n`e2(EMPNO) = h(EMPNO) ∧`\n\n`( e2(MSAL) ≠ e1(MSAL) ∨ e2(DEPTNO) ≠ e1(DEPTNO)\
  \ ) ) )`\n\n\n为维持这一约束，您只需在 `HIST` 表结构上开发一个 `INSERT` 语句后的触发器。`代码清单 11-41` 列出了此触发器。请注意，形式化规范再次相对容易地被转化为约束验证查询。以下代码假设存在一个过渡状态视图，并且假设存在函数\
  \ `f_get_start_scn` 来检索先前存储的系统变更号。\n\n## 代码清单 11-41：用于 STC5 的 DI 代码在 EM6 中的实现（无序列化）\n\
  \n```\ncreate or replace trigger HIST_AIS_STC5\n\nafter insert on HIST\n\ndeclare\
  \ pl_dummy varchar(40);\n\nbegin\n\n-- 插入历史记录需要验证 STC5。\n\nfor r in (select empno,until\n\
  \nfrom v_hist_ite i)\n\nloop\n\nbegin\n\n--\n\nselect 'Constraint STC5 is satisfied'\
  \ into pl_dummy\n\nfrom DUAL\n\nwhere exists (select 'The history record is OK'\n\
  \nfrom HIST h\n\nwhere h.EMPNO = r.empno\n\nand h.UNTIL = r.until\n\nand h.UNTIL\
  \ = sysdate\n\nand exists(select 'A corresponding update on EMP'\n\nfrom EMP as\
  \ of scn f_get_tx_start_scn e1\n\n,EMP e2\n\nwhere e1.EMPNO = h.EMPNO\n\nand e1.MSAL\
  \ = h.MSAL\n\nand e1.DEPTNO = h.DEPTNO\n\nand e2.EMPNO = h.EMPNO\n\nand (e2.MSAL<>e1.MSAL\
  \ or e2.DEPTNO<>e1.DEPTNO))); exception when no_data_found then\n\n--\n\nraise_application_error(-20999,'Constraint\
  \ STC5 is violated '||\n\n'for history record '||to_char(r.empno)||'/'||\n\nto_char(r.until)||'.');\n\
  \n--\n\nend;\n\nend loop;\n\n--\n\nend;\n```\n\n为过渡约束的 `DI` 代码设计序列化策略并非易事。例如，请考虑表\
  \ 11-5 中所示的两个并发执行事务 `TX5` 和 `TX6` 的场景。\n\n## 表 11-5：TX5 和 TX6 的序列化\n\n| 时间 | TX5\
  \ | TX6 | 说明 |\n|------|-----|-----|---------|\n| t=0 | `DML1`; | | `TX5` 开始；`DML1`\
  \ 不涉及 `EMP` 表结构。 |\n| t=1 | | `UPDATE` | `TX6` 开始；它更新员工 1042 的工资。 |\n| t=2 | | `INSERT`\
  \ | `TX6` 插入相应的记录；`STC5` 的 `DI` 代码触发。 |\n| t=3 | | `COMMIT` | `TX6` 结束。 |\n| t=4\
  \ | `INSERT` | | `TX5` 为 1042 插入类似的历史记录，`STC5` 的 `DI` 代码触发。 |\n\n考虑到 Oracle 的 `读已提交`\
  \ 隔离级别，当约束 `STC5` 的 `DI` 代码在 `t=4` 触发时，它能看到由事务 `TX6` 建立的员工 1042 工资变更。`t=0` 时的旧快照没有此变更。新的快照（即\
  \ `t=4` 时的当前快照）确实有此变更，因为 `TX6` 已在 `t=4` 提交。因此，`STC5` 的 `DI` 代码可能会批准由 `TX5` 执行的历史记录插入（当然，前提是它正确反映了工资更新）。在这种情况下，添加序列化锁调用无济于事；`TX6`\
  \ 中运行的 `DI` 代码获取的任何锁在 `t=4` 时都已释放。\n\n显然，当前 `STC5` 的 `DI` 代码设置无法正确工作，是因为它错误地推断它所看到的关于\
  \ `EMP` 表结构的变化是由*同一*事务中先前的 `DML` 语句引起的。\n\n我们给出此示例是为了表明，为（至少某些）状态转换约束实现 `DI` 代码绝非易事，绝对需要进一步研究。\n\
  \n### ■注意\n\n在撰写本书时，我们尚未完全研究正确序列化状态转换 `DI` 代码的相关问题。在这种情况下，一种可能的修复方法是让约束验证查询（闪回查询）在\
  \ Oracle 的 `可序列化` 隔离级别下运行。在此模式下运行的查询不会看到其他事务在当前事务开始后提交的更改；您只能看到当前事务所做的更改。不幸的是，您无法更改单个查询的隔离模式；您必须转而让整个事务在\
  \ Oracle 的 `可序列化` 模式下运行。\n\n在下一节中，您将找到对另一个我们至今尚未忽视的问题的探讨。\n\n\n"
- '# 引入延迟检查机制


  到目前为止，我们一直假设在事务中串行执行 DML 语句时，每个中间数据库状态都应满足所有约束；所有必需的 DI 代码都通过 DML 后触发器在语句级别立即执行。然而，有时你可能需要将
  DI 代码的执行延迟到事务结束时。


  ###### 为何需要延迟检查？


  有一类数据完整性约束在事务执行过程中总是需要被暂时违反，并在事务结束时以延迟方式重新检查。特化约束就是这样一个例子。看看我们示例数据库设计中的约束 `PSPEC1`：


  ```

  PSPEC1(EMP,SREP) :=


  /* 销售代表有目标销售额和佣金 */


  { e(EMPNO) | e∈EMP ∧ e(JOB) = ''SALESREP'' } =


  { s(EMPNO) | s∈SREP }

  ```


  因为在 `SQL` 中，你无法同时插入 `EMP` 行和 `SREP` 行，所以插入新销售代表的事务将不得不执行两次插入操作。而且，无论插入顺序如何，中间数据库状态都会违反约束
  `PSPEC1`。


  这个例子给了我们第一个理由，说明为何在我们的 `SQL` 世界中，你必须处理暂时的约束违反。


  **DML 语句操作单一表结构**


  鉴于我们设定的数据完整性约束集，某些有效的数据库状态转换很可能需要对多个表结构执行 DML 语句。因为 `数据库约束` 类别的约束其数据范围跨越多个表结构，所以极有可能出现这样的情况：第一个对某个涉及表结构执行的
  DML 语句导致了数据库约束违反，而第二个在其他某个涉及表结构上执行的 DML 语句纠正了这一违反。


  注意"可能性"这个词的用法。有些事务总是需要暂时违反某个特定的数据库约束，无论该事务内部的 DML 语句以何种顺序执行（前述的 `PSPEC1` 就是一例）。然而，许多数据库约束永远不需要延迟检查。通过按约束所隐含的*特定顺序*执行不同的
  DML 语句，受这些约束约束的数据可以始终保持满足约束的状态。例如，子集要求就是这种情况。


  只要 DML 语句按正确的顺序执行，中间数据库状态总是能满足子集要求；你将需要先向超集插入新行，然后再向子集插入。


  下一节我们将讨论 SQL 语言的第二个缺陷，这引发了延迟检查的需要。


