  \n我们将在本书第 2 部分讨论数据完整性约束的规范和实现指南时，再次探讨合取范式。\n\n\n#### 章节摘要\n\n本节包含本章内容的摘要，以项目符号列表格式呈现——与上一章类似。再次说明，如果你对以下任一概念感到不太熟悉，最好在继续下一节练习前回顾本章的相关小节。\n\
  \n-  就像常规算术运算符一样，逻辑连接词也具有某些*代数属性*，例如交换律、结合律、分配律、自反性、传递律、幂等性和吸收律。\n-  你可以通过两种方式将谓词转化为命题，其中一种是通过*量化*来绑定参数。\n\
