- "# 第 8 章 指定状态转移约束\n\n在第 6 章中，你接触到了元组谓词、表谓词和数据库谓词。这些谓词处理数据的范围依次增大：单个元组内的属性值、单个表内的元组，以及单个数据库状态内的表。\n\
  \n“更多数据完整性谓词”一节沿着范围扩大的路径，引入了*状态转移谓词*的概念。状态转移谓词处理一对数据库状态，它们分别被称为*起始状态*和*终止状态*。\n\n\
  我们将使用状态转移谓词来为数据库设计定义可接受的数据库状态转移（也称为*事务*）。\n\n在“状态转移约束”一节中，你将发现一个事务可以建模为两个数据库状态的有序对：事务开始时存在的数据库状态，以及事务结束时存在的数据库状态（即事务导致的结果状态）。\n\
  \n我们将定义*状态转移宇宙*的概念：它持有数据库设计所有可接受事务的集合。为了定义状态转移宇宙，你将定义代表数据库设计中*状态转移约束*的状态转移谓词。\n\n\
  “状态转移约束”一节以第 7 章引入的示例数据库设计的状态转移宇宙规范作为结束；它包含了该数据库设计的七个状态转移约束。示例状态转移宇宙也可在附录 A 中找到。\n\
  \n照例，本章末尾会有“本章小结”，随后是“练习”部分。\n\n#### 更多数据完整性谓词\n\n在上一章中，你接触了四类数据完整性约束：属性约束、元组约束、表约束和数据库约束。这四类约束接受或拒绝给定的数据库状态。它们可以在数据库状态的上下文中进行检查，被称为静态约束。在现实世界中，常常有要求基于静态约束以外的原因禁止某些*数据库状态转移*。这些限制状态转移的约束被称为*动态*（或*状态转移*）约束。\n\
  \n#### 一个简单例子\n\n状态转移约束的一个经典说明是要求员工的工资不允许降低。正如你所见，这个要求无法在单个数据库状态的上下文中进行检查；你需要一个改变数据库状态的事务的上下文。要检查这个要求，你需要检查事务开始时存在的数据库状态（其*起始状态*）中的工资值，并检查事务结束时存在的数据库状态（其*终止状态*）中的工资值。\n\
  \n**注意：** 很快你会看到，我们将使用这两个数据库状态——起始状态和终止状态——来刻画一个事务。\n\n让我们用上一章引入的数据库设计为例来演示这一点。图\
  \ 8-1 显示了两个员工表 `E1` 和 `E2`。\n\n**图 8-1.** *表 `E1` 和 `E2`*\n\n这两个表仅在三个属性值上有所不同。\n\
  \n假设一个给定的事务，例如 `TX1`，起始于一个包含 `E1` 的起始状态，并产生一个包含 `E2` 的终止状态。如图 8-1 所示，`TX1` 显然降低了员工\
  \ 101 的工资（从 8200 降到 7900），并改变了该员工的工资等级。`TX1` 也增加了员工 105 的工资（从 3000 增加到 4000）。事务\
  \ `TX1` 没有改变所有其他员工的工资。\n\n**注意：** 显然，`TX1` 违反了规定工资不允许降低的状态转移约束。\n\n\n\n现在让我们来研究如何形式化地规定一名员工的薪资不允许降低。事务\
  \ `TX1` 违反了此状态转换要求，因为在 `E1` 中的一个员工元组（比如 `e1`）和在 `E2` 中的一个员工元组（比如 `e2`）存在一种组合，它们都涉及同一名员工——即它们在\
  \ `empno` 属性上对应——并且 `e2` 中的 `msal` 值低于 `e1` 中的 `msal` 值。\n\n假设 `dbs1` 是事务 `TX1`\
  \ 的开始状态，`dbs2` 是其结束状态。注意，这意味着表达式 `dbs1(EMP)` 的计算结果为 `E1`，表达式 `dbs2(EMP)` 的计算结果为\
  \ `E2`。看一下列表 8-1 中的命题。\n\n**列表 8-1.** 一个关于数据库状态 `dbs1` 和 `dbs2` 的命题\n\n```\nprop1\
  \ :=\n(∀e1∈dbs1(EMP): (∀e2∈dbs2(EMP): e1(empno) = e2(empno) ⇒ e1(msal) ≤ e2(msal)\
  \ ) )\n```\n\n该命题指出，不可能存在 `E1` 中的一个元组和 `E2` 中的一个元组的组合，使得它们在 `empno` 属性上对应，并且 `E1`\
  \ 元组中的 `msal` 值大于 `E2` 元组中的 `msal` 值。这精确地反映了我们的状态转换要求。\n\n这种类型的转换约束（在属性级别上）很常见，并且可以用另一种方式来指定：将开始状态中的表与其在结束状态中的对应版本进行连接，使得所有属性值（旧的和新的）都可用，然后限制此连接结果中元组的属性值。\n\
  \n**注意** 大致来说，此类转换约束可以被视为*动态*的元组连接约束。\n\n列表 8-2 展示了一种形式化指定此要求的替代方法；它连接了开始状态 (`dbs1`)\
  \ 中的 `EMP` 表与结束状态 (`dbs2`) 中的 `EMP` 表。\n\n**列表 8-2.** 我们的状态转换要求的替代指定\n\n```\nprop2\
  \ :=\n( ∀e∈((dbs1(EMP)⇓{empno,msal})◊◊{(empno;empno),(old_msal;msal)})⊗\n  ((dbs2(EMP)⇓{empno,msal})◊◊{(empno;empno),(new_msal;msal)}):\
  \ e(old_msal) ≤ e(new_msal) )\n```\n\n我们现在使用连接运算符 (`⊗`) 以及表投影 (`⇓`) 和属性重命名 (`◊◊`)。在此指定中，`E1`\
  \ 和 `E2` 都首先投影到 `empno` 和 `msal` 属性上。然后，（`E1` 投影的）`msal` 属性被重命名为 `old_msal`，（`E2`\
  \ 投影的）`msal` 属性被重命名为 `new_msal`。得到的两个表现在可以用连接运算符进行连接。此连接产生的表是一个基于 `{empno,old_msal,new_msal}`\
  \ 结构的表。对于此表中的所有元组，`old_msal` 值都应小于或等于 `new_msal` 值。\n\n图 8-2 通过显示 `prop2` 内部子表达式产生的中间表和最终表，阐明了前面的解释。\n\
  \n**图 8-2.** 表达式 `prop2` 的中间表和最终表\n\n#### 状态转换谓词\n\n承接第 6 章引入的*元组*、*表*和*数据库谓词*概念，我们现在通过定义*状态转换谓词*的概念，进一步扩展数据完整性谓词可以处理的数据范围。\n\
  \n状态转换谓词处理的是*一对数据库状态*。这些谓词有两个参数，类型均为数据库状态；第一个参数称为开始状态，第二个参数称为结束状态。在下一节中，我们将使用状态转换谓词来为数据库设计定义可允许的状态转换。只有那些事务，其开始和结束状态能将所有状态转换谓词转换为真命题，才被认为是有效（或可允许的）事务。\n\
  \n注意，列表 8-1 和 8-2 中的命题也处理一对数据库状态：给定的两个数据库状态 `dbs1` 和 `dbs2`。现在看一下列表 8-3 中的状态转换谓词。这些是列表\
  \ 8-1 和 8-2 中命题的“谓词版本”。\n\n**列表 8-3.** 两个状态转换谓词\n\n```\nSTP1(B,E) := ( ∀e1∈B(EMP),\
  \ e2∈E(EMP): e1(empno)=e2(empno) ⇒ e1(msal) ≤ e2(msal) )\nSTP2(B,E) := ( ∀e∈((B(EMP)⇓{empno,msal})◊◊{(empno;empno),(old_msal;msal)})⊗\n\
  \                ((E(EMP)⇓{empno,msal})◊◊{(empno;empno),(new_msal;msal)}): e(old_msal)\
  \ ≤ e(new_msal) )\n```\n\n当你分别将数据库状态 `dbs1` 和 `dbs2` 作为参数 `B` 和 `E` 的值提供时，这些状态转换谓词将转换为列表\
  \ 8-1 和 8-2 中列出的命题。\n\n```\nSTP1(dbs1,dbs2) = prop1\nSTP2(dbs1,dbs2) = prop2\n```\n\
  \n我们要求状态转换谓词不能分解为多个合取项，就像元组谓词、表谓词和数据库谓词一样。如果你能将给定的状态转换谓词 `ST(B,E)` 重写为形式为 `STa(B,E)\
  \ ∧ STb(B,E)` 的表达式，那么你实际上是在处理两个状态转换谓词。\n\n在本书的后续部分，我们还将要求状态转换谓词——比如 `ST(B,E)`——不能被重写为以下两种形式之一的谓词：`P(B)`\
  \ 或 `P(E)`。在这些表达式中，`P` 代表一个数据库谓词；即一个检查单个数据库状态的谓词（在前面的情况中是 `B` 或 `E`）。这意味着我们要求一个状态转换谓词必须至少涉及开始状态中的一个表以及结束状态中的一个表。这是因为，如果谓词只涉及来自一个数据库状态（开始状态或结束状态）的表，那么该谓词将反映一个静态约束，而不是一个状态转换约束。\n\
  \n正如你将在下一节给出的示例中看到的，状态转换谓词通常涉及来自相同表结构的开始状态和结束状态的表。我们通常不会用两个类型为数据库状态的参数来指定状态转换谓词，而是会用两个或多个类型为表的参数来指定。为了说明这一点，列表\
  \ 8-4 以这种方式重新指定了列表 8-3 中的状态转换谓词。参数 `EMPB` 和 `EMPE` 的类型是表；其意图是让参数 `EMPB` 接受在事务开始时存在的员工表状态，让参数\
  \ `EMPE` 接受在事务结束时存在的员工表状态。\n\n**列表 8-4.** 状态转换谓词 `STP1` 和 `STP2` 的替代指定\n\n```\n\
  STP1(EMPB,EMPE) :=\n( ∀e1∈EMPB, e2∈EMPE: e1(empno) = e2(empno) ⇒ e1(msal) ≤ e2(msal)\
  \ )\nSTP2(EMPB,EMPE) :=\n( ∀e∈((EMPB⇓{empno,msal})◊◊{(empno;empno),(old_msal;msal)})⊗\n\
  \      ((EMPE⇓{empno,msal})◊◊{(empno;empno),(new_msal;msal)}):\n      e(old_msal)\
  \ ≤ e(new_msal) )\n```\n\n在下一节中，我们将使用状态转换谓词来形式化地指定数据库设计的状态转换约束。\n\n##### 状态转换约束\n\
  \n在本节中，我们将向你介绍*状态转换全域*的概念。状态转换约束将作为嵌入式状态转换谓词，在状态转换全域的形式化定义中进行指定。\n\n##### 状态转换全域\n\
  \n为了形式化地指定数据库设计的状态转换约束，我们将指定该数据库设计的*所有可允许事务的集合*。你可以将一个事务建模为其开始状态和结束状态的有序对；有序对中的第一个坐标代表开始状态，第二个坐标代表结束状态。\n\
  \n然后，你可以将*所有可允许事务的集合*指定为此类有序对的集合。\n\n\n\n该集合中的每一个有序对都形如 `(B;E)`，其中 `B` 和 `E` 均代表一个有效的数据库状态（即，它们是数据库设计中数据库宇宙的元素）。这个有序对集合被称为*状态转移宇宙*。如果\
  \ `(B;E)` 是状态转移宇宙的一个元素，那么允许存在将状态 `B` 转换为状态 `E` 的事务。\n\n为了说明这一点，假设你需要为某个数据库设计指定一个状态转移宇宙，其数据库宇宙仅包含四个数据库状态。我们将其命名为\
  \ `s1` 到 `s4`。进一步假设，你只允许事务实现以下状态转移之一：\n\n`s1` 到 `s2`\n\n`s1` 到 `s3`\n\n`s1` 到 `s4`\n\
  \n`s2` 到 `s3`\n\n`s2` 到 `s4`\n\n`s3` 到 `s4`\n\n`s4` 到 `s1`\n\n在此数据库设计中，仅允许前述七种不同的事务。你可以通过这四个数据库状态上的一个*有向图*来可视化这七个事务。\n\
  \n图 8-3 展示了这种查看状态转移宇宙的方式。\n\n**图 8-3.** *通过有向图表示状态转移宇宙*\n\n7451CH08.qxd 5/7/07 11:21\
  \ AM Page 191\n\n第 8 章 **■** 指定状态转移约束\n\n**191**\n\n清单 8-5 展示了一种用集合论方法来指定此状态转移宇宙的方式；有向图中的每一个箭头都映射到一个有序对。\n\
  \n**清单 8-5.** *包含七个事务的状态转移宇宙*\n\n```\n{ (s1;s2), (s1;s3), (s1;s4)\n,(s2;s3), (s2;s4)\n\
  ,(s3;s4)\n,(s4;s1) }\n```\n\n当然，对于现实世界的数据库设计，你无法用这种枚举方式来指定状态转移宇宙，因为需要枚举的事务数量巨大。你将不得不采用谓词方式来指定可接受事务的集合。\n\
  \n你可以通过首先构造数据库宇宙与自身的笛卡尔积，以谓词方式为给定的数据库设计形式化地指定状态转移宇宙。\n\n该笛卡尔积包含了从一个可接受数据库状态到另一个可接受数据库状态的所有可能转移（建模为一个有序对）。\n\
  \n**■ 注意** 如果给定数据库设计的数据库宇宙的基数为 `n`，那么总共可以识别出 `n*n` 个不同的事务。然而，状态转移约束将不会允许所有这些事务。\n\
  \n通过指定状态转移谓词，你可以将这个可能转移的集合缩小为一个仅包含可接受转移的集合。清单 8-6 展示了状态转移宇宙的规范模板。\n\n**清单 8-6.**\
  \ *状态转移宇宙规范模板*\n\n```\nSTU := { TX | TX∈DBU×DBU ∧\nSTC1(π₁(TX),π₂(TX)) ∧ STC2(π₁(TX),π₂(TX))\
  \ ∧ ... ∧ STCn(π₁(TX),π₂(TX)) }\n```\n\n在此模板中，`DBU` 代表相关的数据库宇宙，`STC1`、`STC2`、……、`STCn`\
  \ 代表状态转移谓词。表达式 `π₁(TX)` 表示 `TX` 的起始状态，`π₂(TX)` 表示 `TX` 的结束状态。我们称状态转移谓词 `STC1` 到\
  \ `STCn` 为 `STU` 的*状态转移约束*。\n\n定义状态转移宇宙 `STU` 的另一种方式如下：\n\n```\n{ (B;E) | B∈DBU\
  \ ∧ E∈DBU ∧\nSTC1(B,E) ∧ STC2(B,E) ∧ ... ∧ STCn(B,E) }\n```\n\n此集合包含了所有有序对 `(B;E)`，其中\
  \ `B` 和 `E` 代表可接受的数据库状态。\n\n状态 `B` 和 `E` 满足所有状态转移约束的有序对，代表了可接受的事务。\n\n7451CH08.qxd\
  \ 5/7/07 11:21 AM Page 192\n\n**192**\n\n第 8 章 **■** 指定状态转移约束\n\n#### 完成示例数据库设计\n\
  \n现在，让我们通过为前一章引入的示例数据库设计指定状态转移约束，来演示所有这些概念。清单 8-7 引入了状态转移宇宙 `ST_UEX` 的形式化规范。如你所见，它建立在第\
  \ 7 章指定的 `DB_UEX` 数据库宇宙之上。`ST_UEX` 的定义为我们示例数据库设计引入了状态转移约束。此定义仅通过名称指定它们。在清单 8-8 中，你将找到每个命名约束的形式化规范。\n\
  \n**■ 注意** 在清单 8-7 中，我们以另一种方式指定状态转移谓词：作为以表为类型的参数的谓词。\n\n**清单 8-7.** *状态转移宇宙 ST_UEX*\n\
  \n```\nST_UEX := { (b;e) | b∈DB_UEX ∧ e∈DB_UEX ∧\n                     ∧ STC1(b(EMP),e(EMP))\n\
  \                     ∧ STC2(b(OFFR),e(OFFR))\n                     ∧ STC3(b(OFFR),e(OFFR))\n\
  \                     ∧ STC4(b(HIST),e(HIST))\n                     ∧ STC5(b(HIST),b(EMP),e(HIST),e(EMP))\n\
  \                     ∧ STC6(b(REG),e(REG))\n                     ∧ STC7(b(REG),e(REG))\
  \ }\n```\n\n状态转移约束 `STC1` 涉及员工表结构。约束 `STC2` 和 `STC3` 涉及授课表结构。约束 `STC4` 涉及历史表结构。约束\
  \ `STC5` 涉及两个表结构：历史表和员工表。最后，约束 `STC6` 和 `STC7` 涉及注册表结构。\n\n清单 8-8 提供了这七个状态转移约束的形式化定义。你将在下一节找到对每一个约束的详细阐述。\n\
  \n**■ 注意** 通常，状态转移约束检查的不仅仅是事务的起始和结束状态。在事务上下文中可用的其他数据项——通常由大多数 DBMS 提供——包括当前系统日期/时间（环境变量\
  \ `sysdate`）和当前登录用户的用户名（环境变量 `user`）。需要引用任何这些*事务环境变量*的需求，总是会映射到状态转移约束。静态约束本质上无法引用事务的上下文。清单\
  \ 8-8 中指定的约束 `STC5` 和 `STC7` 就是这个事实的例子；它们都引用了变量 `sysdate`。\n\n7451CH08.qxd 5/7/07\
  \ 11:21 AM Page 193\n\n第 8 章 **■** 指定状态转移约束\n\n**193**\n\n**清单 8-8.** *ST_UEX 的七个状态转移约束*\n\
  \n```\nSTC1(EMPB,EMPE) :=\n/* 月薪只能增加 */\n( ∀e1∈EMPB, e2∈EMPE: e1(EMPNO) = e2(EMPNO)\
  \ ⇒ e1(MSAL) ≤ e2(MSAL) )\n\nSTC2(OFFRB,OFFRE) :=\n/* 新授课必须以状态 SCHED 开始 */\n( ∀o1∈OFFRE⇓{COURSE,STARTS}\
  \ − OFFRB⇓{COURSE,STARTS}:\n    ↵{ o2(STATUS) | o2∈OFFRE ∧ o2↓{COURSE,STARTS} =\
  \ o1↓{COURSE,STARTS} }\n    = 'SCHD' )\n\nSTC3(OFFRB,OFFRE) :=\n/* 有效的授课状态转移是： */\n\
  /* SCH -> CONF, SCH -> CANC, CONF -> CANC */\n( ∀o1∈OFFRB, o2∈OFFRE:\n    (o1↓{COURSE,STARTS}\
  \ = o2↓{COURSE,STARTS} ∧ o1(STATUS) ≠ o2(STATUS))\n    ⇒\n    (o1(STATUS);o2(STATUS))\
  \ ∈\n    { ('SCHD';'CONF'), ('SCHD';'CANC'), ('CONF';'CANC') } )\n\nSTC4(HISTB,HISTE)\
  \ :=\n/* 不允许更新历史记录 */\n( ∀h1∈HISTB, h2∈HISTE:\n    h1↓{EMPNO,UNTIL} = h2↓{EMPNO,UNTIL}\n\
  \    ⇒\n    ( h1(DEPTNO) = h2(DEPTNO) ∧ h1(MSAL) = h2(MSAL) ) )\n\nSTC5(HISTB,EMPB,HISTE,EMPE)\
  \ :=\n/* 新历史记录必须准确反映员工更新 */\n( ∀h∈(HISTE⇓{EMPNO,UNTIL} − HISTB⇓{EMPNO,UNTIL})⊗HISTE:\n\
  \    h(UNTIL) = sysdate ∧\n    ( ∃e1∈EMPB, e2∈EMPE:\n        e1↓{EMPNO,MSAL,DEPTNO}\
  \ = h↓{EMPNO,MSAL,DEPTNO} ∧\n        e2(EMPNO) = h(EMPNO) ∧\n        ( e2(MSAL)\
  \ ≠ e1(MSAL) ∨ e2(DEPTNO) ≠ e1(DEPTNO) ) ) )\n\nSTC6(REGB,REGE) :=\n/* 新注册元组必须以\
  \ EVAL = -1 开始 */\n( ∀r1∈(REGE⇓{STUD,STARTS} − REGB⇓{STUD,STARTS})⊗REGE: r1(EVAL)\
  \ = -1 )\n\nSTC7(REGB,REGE) :=\n/* 评估的转移必须有效 */\n/* 且不能在授课开始日期之前发生 */\n( ∀r1∈REGB,\
  \ r2∈REGE:\n    (r1↓{STUD,STARTS} = r2↓{STUD,STARTS} ∧ r1(EVAL) ≠ r2(EVAL))\n  \
  \  ⇒\n    ( ( r1(EVAL) = -1 ∧ r2(EVAL) = 0 ∧ r2(STARTS) ≤ sysdate ) ∨\n      ( r1(EVAL)\
  \ = 0 ∧ r2(EVAL) ∈ {1,2,3,4,5} ) ) )\n```\n\n\n\n##### 状态转换约束规范\n\n###### 1. 约束\
  \ STC1：薪资不能降低\n\n状态转换约束 `STC1` 展示了指定经典“薪资不能降低”要求的另一种方式。你可以直接从清单 8-4 中的 `STC1` 推导出来，方法是将存在量词重写为全称量词，然后应用德摩根定律，最后将析取式转换为蕴含式。\n\
  \n###### 2. 约束 STC2 与 STC3：`STATUS` 属性的转换\n\n约束 `STC2` 和 `STC3` 处理 `OFFR` 表设计中 `STATUS`\
  \ 属性允许的值转换。\n\n- **STC2**：新插入的课程安排应始终具有状态 `'SCH'`（已安排）。\n- **STC3**：允许现有课程安排的状态从\
  \ `scheduled` 转换为 `'CONF'`（已确认），或从 `scheduled` 转换为 `'CANC'`（已取消）。此外，已确认的安排也可以转换为已取消。\n\
  \n###### STC2 的工作方式\n\n`STC2` 规定新安排状态值的方式如下：\n1.  构造终态 `OFFR` 表在唯一标识属性（`COURSE`\
  \ 和 `STARTS`）上的投影。\n2.  对初态 `OFFR` 表进行相同操作。\n3.  这两个投影表的差集包含了新插入安排的元组。\n4.  全称量化的谓词随后从终态\
  \ `OFFR` 表中获取并选择这样一个新安排的 `STATUS` 值，并要求其等于 `'SCH'`。\n\n###### STC3 的工作方式\n\n`STC3`\
  \ 检查初态和终态中对应 `OFFR` 元组的所有组合。组合是基于唯一标识属性进行的。它要求对于每一个这样的元组组合，要么 `STATUS` 值没有改变，要么根据前面描述的可接受值转换之一发生了改变。\n\
  \n清单 8-9 展示了指定约束 `STC3` 的另一种稍有不同的方式。\n\n**清单 8-9.** `STC3` 的替代规范\n```\n( ∀o1∈OFFRB,\
  \ o2∈OFFRE:\n    ( o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∧ o1(STATUS) ≠ o2(STATUS)\
  \ )\n    ⇒\n    ( ( o1(STATUS) = 'SCH' ∧ o2(STATUS) = 'CONF' ) ∨\n      ( o1(STATUS)\
  \ = 'SCH' ∧ o2(STATUS) = 'CANC' ) ∨\n      ( o1(STATUS) = 'CONF' ∧ o2(STATUS) =\
  \ 'CANC' ) ) )\n```\n这里我们使用了以下重写规则（留作本章末的练习）：\n```\n( P ⇒ (Q ∨ R) ) ⇔ ( (P ∧ ¬Q)\
  \ ⇒ R )\n```\n\n###### 3. 约束 STC4：`HIST` 表的历史记录\n\n与 `STC3` 类似，状态转换约束 `STC4` 组合了初态和终态的\
  \ `HIST` 元组，并要求 `DEPTNO` 和 `MSAL` 属性值均未改变。\n\n###### 4. 约束 STC5：`HIST` 表的语义\n\n\
  约束 `STC5` 定义了 `HIST` 表设计的语义。如果一个事务更改了 `EMP` 元组的 `DEPTNO` 或 `MSAL` 属性值，那么同一事务应在 `HIST`\
  \ 表中记录一个元组，记录 `DEPTNO` 和 `MSAL` 的旧值。这个新的 `HIST` 元组应将 `UNTIL` 属性设置为当前系统日期和时间。\n\n\
  `STC5` 对所有新插入的 `HIST` 元组进行全称量化，并要求在同一事务内，`DEPTNO` 和 `MSAL` 值应与在**初态**中找到的匹配 `EMP`\
  \ 元组的 `DEPTNO` 和 `MSAL` 值相对应。当然，它也要求对于这个特定的 `EMP` 元组，**终态**反映了 `DEPTNO` 或 `MSAL`\
  \ 属性值（或两者）的变化。\n\n###### 5. `REG` 表的 `EVAL` 属性\n\n`REG` 表设计中 `EVAL` 属性的属性值集总共包含七个元素：-1,\
  \ 0, 1, 2, 3, 4, 5。其含义如下：\n- `-1`：评估为时过早\n- `0`：未评估或尚未评估\n- `1`：非常差\n- `2`：差\n-\
  \ `3`：一般\n- `4`：好\n- `5`：优秀\n\n评估的有效值转换如图 8-4 所示。\n\n###### 约束 STC6：新注册的初始评估值\n\n\
  新注册必须从评估值 -1 开始（`STC6`）。只要课程安排尚未开始，所有评估都应保持为值 -1；评估该安排为时过早。\n\n###### 约束 STC7：评估值的转换\n\
  \n一旦课程安排“进行中”，培训师可以决定学生何时评估该安排。这是通过将该安排的所有注册的评估设置为值 0 来完成的。由于表宇宙 `tab_REG` 中引入的以下表约束（见清单\
  \ 7-34），培训师必须在单个事务中完成此操作。\n\n```\n/* 课程安排已被评估，或评估为时过早 */\n( ∀r1,r2∈R:\n    ( r1↓{COURSE,STARTS}\
  \ = r2↓{COURSE,STARTS} )\n    ⇒\n    ( ( r1(EVAL) = -1 ∧ r2(EVAL) = -1 ) ∨\n   \
  \   ( r1(EVAL) ≠ -1 ∧ r2(EVAL) ≠ -1 ) ) )\n```\n\n此时，注册值为 0 表示学生**尚未**评估该安排。从评估值\
  \ -1 到值 0 的转换由状态转换约束 `STC7` 蕴含式结论中的第一个析取项覆盖。该析取项也覆盖了只有在安排已开始（`r2(STARTS) ≥ sysdate`）时才能从\
  \ -1 转换为 0 这一事实。\n\n一旦评估被设置为 0，学生可以通过将 0 更改为 1 到 5 之间的值来评估该安排。这些值转换由 `STC7` 蕴含式结论中的第二个析取项覆盖。学生也可以选择完全不进行评估，让评估保持为值\
  \ 0（现在代表“未评估”）。\n\n###### 6. 约束规范方式总结\n\n你注意到 `STC2`、`STC5` 和 `STC6` 展示了指定新插入元组属性值限制的三种不同方式了吗？你也可以用“`STC2`\
  \ 方式”或“`STC5` 方式”编写约束 `STC6`；参见清单 8-10。\n\n**清单 8-10.** `STC6` 的替代规范\n```\nSTC6(REGB,REGE)\
  \ :=\n( ∀r1∈REGE⇓{STUD,STARTS} − REGB⇓{STUD,STARTS}:\n    ↵{ r2(EVAL) | r2∈e(REGE)\
  \ ∧ r2↓{STUD,STARTS} = r1↓{STUD,STARTS} }\n    = -1 )\n\nSTC6(REGB,REGE) :=\n( ∀r∈(REGE⇓{STUD,STARTS}\
  \ − REGB⇓{STUD,STARTS})⊗REGE: r(EVAL) = -1 )\n```\n如果你仔细研究了清单 8-8 中的规范，可能还会注意到并非所有状态转换约束都满足其\
  \ `CNF` 只有一个合取项的要求。“练习”部分的一个练习将涉及此问题。\n\n##### 结论\n\n我们通过重申第 7 章早些时候的一个陈述来结束本章：**信息系统的整体规范中有很大一部分实际上存在于数据库设计的规范中**。状态转换宇宙作为数据库设计规范的一个组成部分，再次证明了这一点。专门处理事务的“业务逻辑”通常可以由状态转换约束表示，因此这部分业务逻辑应该成为数据库设计规范的一部分。\n\
  \n\n\n#### 章节总结\n\n本节以项目符号列表的形式提供了本章的摘要。你可以在继续下一节的练习之前，用它来检查自己对本章引入的各种概念的理解程度。\n\
  \n-   除了之前介绍的四类约束（属性约束、元组约束、表约束和数据库约束）外，还有第五类约束称为 `状态转换约束`。\n\n-   这些约束限制了数据库设计中允许的事务。\n\
  \n`状态转换谓词`是状态转换约束的基础。\n\n-   状态转换约束是引用一对数据库状态作为其参数的谓词，其中一个数据库状态代表事务的`起始状态`，另一个代表事务的`结束状态`。\n\
  \n-   状态转换约束的典型例子包括对新插入元组的属性值允许范围的限制，或者对值集表示一组代码的属性值转换（更新）的限制。\n\n-   状态转换约束是作为数据库设计`状态转换全域`规范的一部分来指定的。该全域代表了一个数据库设计所有可允许的事务集合。\n\
  \n-   状态转换（与静态相对）约束可以引用 DBMS 提供的`事务环境变量`。这些变量的典型例子是系统日期和时间（由`sysdate`表示）以及当前登录的用户（由`user`表示）。\n\
  \n##### 练习题\n\n1.  使用表 1-13 中的重写规则或通过真值表，证明重写规则 `( P ⇒ (Q ∨ R) ) ⇔ ( (P ∧ ¬Q) ⇒\
  \ R )`。\n2.  将清单 8-1 中的 `prop1` 重写为全称量化形式。你可能会发现这是一种更直观的规范。\n3.  形式化地指定以下状态转换约束：只有在同一时刻员工的薪资等级得到提升时，才能降低该员工的薪资。在“更多数据完整性谓词”一节中引入的事务\
