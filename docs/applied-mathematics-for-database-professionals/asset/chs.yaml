  ###### 清单 7-42. DB_UEX 中的元组-连接约束


  `PTIJ1(EMP,GRD) :=`

  `/* 月工资必须落在指定的工资等级范围内 */`

  `( ∀e∈EMP, g∈GRD:`

  `e(SGRADE) = g(GRADE) ⇒ ( g(LLIMIT) ≤ e(MSAL) ∧ e(MSAL) ≤ g(ULIMIT) ) )`


  `PTIJ2(EMP,TERM) :=`

  `/* 离职日期必须晚于入职日期 */`

  `( ∀e∈EMP, t∈TERM:`

  `e(EMPNO) = t(EMPNO) ⇒ e(HIRED) < t(LEFT) )`


  `PTIJ3(SREP,EMP,MEMP) :=`

  `/* 销售代表的收入不能超过其汇报对象 */`

  `( ∀s∈SREP, es∈EMP, m∈MEMP, em∈EMP:`

  `( s(EMPNO)=es(EMPNO) ∧ es(EMPNO)=m(EMPNO) ∧ m(MGR) = em(EMPNO) )`

  `⇒`

  `( es(MSAL) + s(COMM)/12 < em(MSAL) ) )`


  `PTIJ4(EMP,MEMP) :=`

  `/* 非销售代表的收入不能超过其汇报对象 */`

  `( ∀e∈EMP, m∈MEMP, em∈EMP:`

  `(e(EMPNO)=m(EMPNO) ∧ m(MGR) = em(EMPNO) ∧ e(JOB) ≠ ''SALESREP'')`

  `⇒`

  `( e(MSAL) < em(MSAL) ) )`


  `PTIJ5(EMP,DEPT) :=`

  `/* 部门经理必须在管理的部门工作 */`

  `( ∀e∈EMP, d∈DEPT:`

  `e(EMPNO) = d(MGR) ⇒ e(DEPTNO) = d(DEPTNO) )`


  `PTIJ6(EMP,HIST) :=`

  `/* 入职当天或之前不允许存在历史记录 */`

  `( ∀e∈EMP, h∈HIST:`

  `e(EMPNO) = h(EMPNO) ⇒ e(HIRED) < h(UNTIL) )`


  `PTIJ7(TERM,HIST) :=`

  `/* 离职当天或之后不允许存在历史记录 */`

  `( ∀t∈TERM, h∈HIST:`

  `t(EMPNO) = h(EMPNO) ⇒ t(LEFT) > h(UNTIL) )`


  `PTIJ8(EMP,REG) :=`

  `/* 入职前四周内不能注册课程 */`

  `( ∀e∈EMP, r∈REG:`

  `e(EMPNO) = r(STUD) ⇒ e(HIRED) + 28 ≤ r(STARTS) )`


  `PTIJ9(TERM,REG,CRS) :=`

  `/* 不能注册离职当天或之后开始的课程 */`

  `( ∀t∈TERM, r∈REG, c∈CRS:`

  `( t(EMPNO) = r(STUD) ∧ r(COURSE) = c(CODE) )`

  `⇒`

  `( t(LEFT) ≥ r(STARTS) + c(DUR) ) )`


  `PTIJ10(EMP,REG,OFFR,CRS) :=`

  `/* 不能注册时间重叠的课程 */`

  `( ∀e∈EMP, r1,r2∈REG, o1,o2∈OFFR, c1,c2∈CRS:`

  `( e(EMPNO) = r1(STUD) ∧`

  `r1↓{COURSE,STARTS} = o1↓{COURSE,STARTS} ∧`

  `o1(COURSE) = c1(CODE) ∧`

  `e(EMPNO) = r2(STUD) ∧`

  `r2↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∧`

  `o2(COURSE) = c2(CODE)`

  `) ⇒`

  `( o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∨`

  `o1(STARTS) ≥ o2(STARTS) + c2(DUR) ∨`

  `o2(STARTS) ≥ o1(STARTS) + c1(DUR) ) )`


  `PTIJ11(EMP,OFFR) :=`

  `/* 培训师不能在其入职日期之前授课 */`

  `( ∀e∈EMP, o∈OFFR:`

  `e(EMPNO) = o(TRAINER) ⇒ e(HIRED) ≤ o(STARTS) )`


  `PTIJ12(TERM,OFFR,CRS) :=`

  `/* 培训师不能在其离职当天或之后授课 */`

  `( ∀t∈TERM, o∈OFFR, c∈CRS:`

  `( t(EMPNO) = o(TRAINER) ∧ o(COURSE) = c(CODE) )`

  `⇒`

  `( t(LEFT) ≥ o(STARTS) + c(DUR) ) )`


  `PTIJ13(REG,OFFR) :=`

  `/* 培训师不能注册自己讲授的课程 */`

  `( ∀r∈REG, o∈OFFR:`

  `r↓{COURSE,STARTS} = o↓{COURSE,STARTS} ⇒`

  `r(STUD) ≠ o(TRAINER) )`


  `PTIJ14(OFFR,CRS) :=`

  `/* 培训师不能同时教授不同课程 */`

  `( ∀o1,o2∈OFFR, c1,c2∈CRS:`

  `( o1(TRAINER) = o2(TRAINER) ∧`

  `o1(COURSE) = c1(CODE) ∧`

  `o2(COURSE) = c2(CODE)`

  `) ⇒`

  `( o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∨`

  `o1(STARTS) ≥ o2(STARTS) + c2(DUR) ∨`

  `o2(STARTS) ≥ o1(STARTS) + c1(DUR) ) )`


  `PTIJ15(EMP,REG,OFFR,CRS) :=`

  `/* 员工不能注册与自己讲授课程时间重叠的课程 */`

  `( ∀e∈EMP, r∈REG, o1,o2∈OFFR, c1,c2∈CRS:`

  `( e(EMPNO) = r(STUD) ∧`

  `r↓{COURSE,STARTS} = o1↓{COURSE,STARTS} ∧`

  `o1(COURSE) = c1(CODE) ∧`

  `e(EMPNO) = o2(TRAINER) ∧`

  `o2(COURSE) = c2(CODE)`

  `) ⇒`

  `( o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∨`

  `o1(STARTS) ≥ o2(STARTS) + c2(DUR) ∨`

  `o2(STARTS) ≥ o1(STARTS) + c1(DUR) ) )`


  谓词 `PTIJ1` 至 `PIJ15` 都限制了某些连接中允许的元组。这些连接大多只涉及两个表结构。有五个谓词（`PTIJ3`、`PTIJ9`、`PTIJ10`、`PTIJ12`、`PTIJ15`）限制了涉及两个以上表结构的连接中的元组。让我们更仔细地看看这五个。


  谓词 `PTIJ3` 将一个 `SREP` 元组（变量 `s`）与其相关的 `EMP` 元组（变量 `es`）连接，继续将此 `EMP` 元组与其相关的 `MEMP`
  元组（变量 `m`）连接，最后将此 `MEMP` 元组与其相关的 `EMP` 元组（变量 `em`）连接。所有在这个跨四个表的连接（注意 `EMP` 被连接了两次）中的元组都受谓词
  `es(MSAL) + s(COMM)/12 < em(MSAL)` 的约束。这表示销售代表的月工资，加上其佣金的十二分之一，应小于管理该销售代表的员工的月工资。顺便说一下，由于子集要求
  `PSSR3`，这位管理员工不能是销售代表——这本可能需要在小于号的右侧也加上十二分之一的佣金。


  谓词 `PTIJ9` 将一个 `TERM` 元组（`t`）直接与一个 `REG` 元组（`r`）连接，并继续将该 `REG` 元组与其相关的 `CRS` 元组（`c`）连接。


  **注意** 几点说明：

  -   从 `TERM` 到 `REG` 的连接不是“通过 `EMP`”完成的。因为 `TERM` 是 `EMP` 的特化，你可以使用 `EMPNO` 属性将
  `TERM` 直接连接到任何 `EMP` 可以连接到的其他表结构。

  -   从 `REG` 到 `CRS` 的连接不是“通过 `OFFR`”完成的。根据两个子集要求 `PSSR6` 和 `PSSR10`，你可以推断出 `REG`
  中的 `{CRS}` 引用了 `CRS` 中的 `{CODE}`（一个 `REG` 和 `CRS` 之间的子集要求），因此你可以按照所示方式直接将 `REG`
  连接到 `CRS`。

  -   此连接中的元组受谓词 `t(LEFT) ≥ r(STARTS) + c(DUR)` 约束。你是否注意到这个正式规范与嵌入的非正式注释有所不同？正式规范也涉及了
  `CRS` 表结构，或者更确切地说，是它的 `DUR` 属性。

  -   这里是对该约束更正确的一个非正式解释：员工不能注册在其离职当天或之后开始的课程，也不能在其离职当天或之后被终止（该员工正在注册的课程期间）。

  -   现在你正走上一条在尝试非正式描述数据库约束时通常难以避免的道路：你开始从**事务**的角度描述在给定约束下哪些操作不被允许。刚才发生的就是这样：给定某个
  `TERM` 元组，你不能*插入*一个 `OFFR` 元组，反之亦然，给定某个 `OFFR` 元组，你也不能插入一个 `TERM` 元组。

  -   随着约束所涵盖数据范围的扩大，用自然语言非正式地陈述约束的**内容**而不与客户疏远，变得越来越困难。你常常必须深入到约束的**实现方式**中。在与最终用户的沟通中，这并非坏事；你开始用系统将如何行为（给定约束下它将不接受哪些事务）的方式进行沟通，而最终用户通常能理解这一点。你的正式规范是生成这种行为的基础（我们将在第
  11 章详细讨论这一点）。例如，你可能想简要告知用户，在此约束下，某些情况下课程的时长不能被增加（更新）。


  谓词 `PTIJ10` 将一个 `EMP` 元组与两个相关的 `REG` 元组（`r1` 和 `r2`）连接，继续将这两个 `REG` 元组分别与其相关的 `OFFR`
  元组（`o1` 和 `o2`）连接，最后将两个 `OFFR` 元组与其相关的 `CRS` 元组（`c1` 和 `c2`）连接。此连接中的元组受以下谓词约束：

  ```

  o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∨

  o1(STARTS) ≥ o2(STARTS) + c2(DUR) ∨

  o2(STARTS) ≥ o1(STARTS) + c1(DUR)

  ```

  该谓词表明，如果连接不涉及相同的两个 `OFFR` 元组，那么课程 `o1` 必须在课程 `o2` 结束后开始，反之亦然。



  谓词 PTIJ12 是 PTIJ9 的“培训师”版本。PTIJ12 不通过 REG（使用 STUD 属性）将 TERM 连接到 CRS，而是通过 OFFR（使用
  TRAINER 属性）将 TERM 连接到 CRS，并以相同的方式限制连接结果中的元组。


  谓词 PTIJ15 通过 REG 和 OFFR 将一个 EMP 元组连接到一个 CRS 元组（代表参加课程班次的学生），并继续通过 OFFR 将同一个 EMP
  元组连接到另一个 CRS 元组（代表授课的培训师）。然后，它以与谓词 PTIJ10 相同的方式限制此连接中的元组。


  你可能已经注意到谓词 PTIJ15 和 PTIJ13 之间存在关联；我们将在本章末尾的一个练习中处理这个问题。


  ###### 代码清单 7-43. DB_UEX 的“其他”数据库约束


  PODC1(TERM,MEMP) :=


  ```

  /* 在职员工不能由已离职员工管理 */

  { t1(EMPNO) | t1∈TERM } ∩

  { m(MGR) | m∈MEMP ∧

  ¬ ( ∃t2∈TERM: t2(EMPNO) = m(EMPNO) ) } = ∅

  ```


  PODC2(TERM,DEPT) :=


  ```

  /* 部门不能由已离职员工管理 */

  { t(EMPNO) | t∈TERM } ∩ { d(MGR) | d∈DEPT } = ∅

  ```


  PODC3(OFFR,DEPT,EMP,CRS) :=


  ```

  /* 培训师教授的至少一半课程班次 */

  /* 必须在其所属基地进行 */

  ( ∀e1∈{ o1(TRAINER) | o1∈OFFR ∧ o1(STATUS) ≠ ''CANC'' }:

  ( ∑t∈{ o2∪c2| d2∈DEPT ∧ e2∈EMP ∧ o2∈OFFR ∧ c2∈CRS ∧

  e2(EMPNO) = e1 ∧

  e2(EMPNO) = o2(TRAINER) ∧

  e2(DEPTNO) = d2(DEPTNO) ∧

  o2(COURSE) = c2(CODE) ∧

  o2(STATUS) ≠ ''CANC'' ∧

  o2(LOC) = d2(LOC)

  } : t(DUR)

  ) ≥

  ( ∑t∈{ o3∪c3| d3∈DEPT ∧ e3∈EMP ∧ o3∈OFFR ∧ c3∈CRS ∧

  e3(EMPNO) = e1 ∧

  e3(EMPNO) = o3(TRAINER) ∧

  e3(DEPTNO) = d3(DEPTNO) ∧

  o3(COURSE) = c3(CODE) ∧

  o3(STATUS) ≠ ''CANC'' ∧

  o3(LOC) ≠ d3(LOC)

  } : t(DUR) ) )

  ```


  PODC4(OFFR,REG) :=


  ```

  /* 注册人数达到或超过 6 人的班次状态必须为已确认 */

  ( ∀o∈OFFR:

  #{ r | r∈REG ∧

  r↓{COURSE,STARTS} = o↓{COURSE,STARTS} } ≥ 6

  ⇒

  o(STATUS) = ''CONF'' )

  ```


  PODC5(OFFR,REG) :=


  ```

  /* 注册人数不能超过班次的最大容量 */

  ( ∀o∈OFFR:

  #{ r | r∈REG ∧

  r↓{COURSE,STARTS} = o↓{COURSE,STARTS} } ≤ o(MAXCAP) )

  ```


  PODC6(OFFR,REG) :=


  ```

  /* 已取消的班次不能有注册记录 */

  ( ∀o∈OFFR: o(STATUS) = ''CANC''

  ⇒

  ¬( ∃r∈REG: r↓{COURSE,STARTS} = o↓{COURSE,STARTS} ) )

