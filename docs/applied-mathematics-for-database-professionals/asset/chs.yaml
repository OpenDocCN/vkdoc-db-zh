  这里我们使用了一个将存在量词转换为全称量词的重写规则、一个德·摩根定律，以及一个将析取转换为蕴含的重写规则。\n\n谓词 `P11` 和 `P12` 都属于我们将在下一节讨论的数据完整性谓词的常见模式之一。\n\
