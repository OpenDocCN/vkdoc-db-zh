  7-25 中列出）也满足所有这四个表约束。


  如果你在阅读这个嵌套的集合时遇到困难，图 7-3 可能会澄清其中的含义。它展示了另一种使用表的简写符号来指定表全域 `tab_RESULT` 的方法。


