  \ t∈T6 ∧ t(deptno)=10 }: x)\n```\n\n请解释这两个表达式之间的区别。\n\n## 元组、表与数据库谓词\n\n本章将介绍元组谓词、表谓词和数据库谓词的概念（使用在第一章中建立的谓词含义）。你可以使用元组谓词、表谓词和数据库谓词来描述数据库设计的数据完整性约束。本章的目标是建立这三类不同的谓词——我们将其统称为数据完整性谓词——并为每一类谓词提供充足的示例。\n\
  \n> **注意：** 我们在本章介绍数据完整性谓词，并展示它们对于某个特定论元（值）成立。当然，我们并不关心这种附带属性（一个谓词对于一个给定值是否为真）；它们应该对值空间成立（也就是说，它们应该构成一种结构性属性）。这一点将在第七章进一步阐述。\n\
  \n数据完整性谓词处理的是数据。通过考察它们所处理的数据范围，我们将数据完整性谓词分为三类。按作用范围递增的顺序，一个谓词可以处理一个元组、一个表或一个数据库状态。\n\
  \n“元组谓词”一节确立了元组谓词的概念。这类数据完整性谓词有一个类型为元组的参数。你可以用它来接受或拒绝一个元组（粗略地说，一组属性值）。\n\n下一节“表谓词”将介绍表谓词。表谓词处理一个表，因此有一个类型为表的参数。我们将使用它们来接受或拒绝一个表（一组元组）。\n\
  \n在“数据库谓词”一节中，我们将使你熟悉数据库谓词的概念。数据库谓词处理数据库状态。我们将使用它们来接受或拒绝一个数据库状态（粗略地说，一组表）。\n\n>\
  \ **注意：** 本书区分这三类数据完整性谓词是有原因的。在第七章，你将学习一种形式化的方法来规约数据库设计，并了解该方法采用了一种分层的方法。每一层（总共三层）分别引入一类约束：元组约束、表约束和数据库约束。你将通过数据完整性谓词来指定这些约束。\n\
  \n“表和数据库谓词的常见模式”一节将探讨五种在数据库设计中经常起作用的数据完整性谓词模式：唯一标识、子集要求、特化、泛化以及连接中元组谓词。\n\n在数据库设计中，你总是会遇到（极少数情况除外）基于唯一标识和子集要求谓词的数据完整性约束。你可能会将这两种谓词模式分别与关系概念中的唯一键和外键约束联系起来。特化和泛化谓词模式可能会让你想起\
  \ ERD 中的子类型和超类型概念。连接中元组谓词模式涉及两个或多个表之间的连接，它是数据库设计中也经常遇到的另一类约束的基础。\n\n和往常一样，你将在本章末尾找到“章节总结”，随后是“习题”部分。\n\
  \n#### 元组谓词\n\n让我们立即解释什么是元组谓词，然后快速用几个例子演示这个概念。元组谓词是一个带有一个参数的谓词。该参数的类型是元组。清单 6-1\
  \ 展示了几个元组谓词的例子。\n\n```\nP0(t) := ( t(sex) ∈ {'male', 'female'} )\n\nP1(t) := ( t(price)\
  \ ≥ 20 ⇒ t(instock) ≤ 10 )\n\nP2(t) := ( t(status) = 'F' ∨ ( t(status) = 'I' ∧ t(total)\
  \ > 0 ) )\nP3(t) := ( t(salary) < 5000 ∨ t(sex) = 'female' )\n\nP4(t) := ( t(begindate)\
  \ < t(enddate) )\n```\n\n谓词 `P0` 规定元组的 `sex` 属性值应为 `'male'` 或 `'female'`。\n\n谓词\
  \ `P1` 规定，如果一个元组的 `price`（属性）值大于或等于 20，那么其 `instock`（属性）值应小于或等于 10。`P2` 规定 `status`\
  \ 值要么是 `'F'`，要么是 `'I'`，但若是后者，同时 `total` 值应大于 0。谓词 `P3` 规定 `salary` 应小于 5000 或 `sex`\
  \ 是 `'female'`。最后，谓词 `P4` 规定 `begindate` 值应小于 `enddate`。\n\n我们将使用元组谓词（在第七章）来接受或拒绝一个给定的元组。如果谓词——当用给定元组作为论元实例化后——变成一个假命题，那么我们将拒绝该元组；否则，我们将接受它。在后一种情况下，我们说给定的元组满足该谓词。在前一种情况下，该元组违反了该谓词。\n\
  \n再次，让我们用几个示例元组来演示（见清单 6-2）。\n\n```\nt0 := { (empno;101), (begindate;'01-aug-2005'),\
  \ (enddate;'31-mar-2007') }\n\nt1 := { (price;30), (instock;4) }\n\nt2 := { (partno;101),\
  \ (instock;30), (price;20), (type;'A') }\n\nt3 := { (status;'F'), (total;20) }\n\
  \nt4 := { (total;50) }\n\nt5 := { (salary;6000), (sex;'male'), (name;'Felix') }\n\
  \nt6 := { (salary;5000), (sex;'female') }\n```\n\n用元组 `t5` 实例化谓词 `P0`——形成表达式 `P0(t5)`——得到命题\
  \ `'male'∈{'male', 'female'}`，这是一个真命题，我们说 `t5` 满足 `P0`。用元组 `t1` 实例化谓词 `P1`——表达式\
  \ `P1(t1)`——得到命题 `30 ≥ 20 ⇒ 4 ≤ 10`。这也是一个真命题；因此 `t1` 满足 `P1`。请自行验证以下命题是真命题：`P0(t6)`、`P2(t3)`、`P3(t6)`、`P4(t0)`。以下是假命题：`P1(t2)`、`P3(t5)`。\n\
  \n注意，我们不能用任意元组来实例化一个元组谓词。例如，无法用元组 `t4` 实例化谓词 `P2`，因为 `t4` 缺少 `status` 属性。这就引出了集合上元组谓词的概念。\n\
  \n我们称谓词 `P1` 是 `{price,instock}` 上的元组谓词；该谓词的各个组成部分假设在作为参数提供的元组中，存在 `price` 和 `instock`\
  \ 属性。正如谓词 `P0` 是 `{sex}` 上的元组谓词，`P2`\n\n\n\n#### 元组谓词\n\nP1 是 `{status, total}`\
  \ 上的一个元组谓词，P2 是 `{salary, sex}` 上的一个元组谓词，P3 是 `{begindate, enddate}` 上的一个元组谓词。通常，如果给定一个谓词，比如\
