  `注意` 通常，表全域包含的元素数量太多，无法一一列举。


  现在让我们继续我们的示例数据库设计的指定。看看代码清单 7-26，它展示了 `EMP` 表结构的表全域 `tab_EMP` 的定义。


  此定义正式指定了 `EMP` 的四个表约束。一些非正式的说明作为注释嵌入其中。


