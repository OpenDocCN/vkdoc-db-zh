  \n###### 求给定谓词的析取范式\n\n有几种方法可以将现有谓词重写为析取范式。通常，你会尝试使用现有的重写规则，将表达式向“正确”的方向移动，直到它具有所需的格式：一个迭代的析取式，其中每个析取项是仅包含简单谓词的迭代合取式。\n\
  \n一个有趣的替代方法是基于使用真值表。例如，假设原始谓词如下：\n\n`P ⇒ ( Q ⇔ ¬P )`\n\n表 3-3 显示了对应的真值表。\n\n**表\
  \ 3-3.** 使用真值表将谓词重写为析取范式\n\n| `P` | `Q` | `¬P` | `Q ⇔ ¬P` | `P ⇒ ( Q ⇔ ¬P )` |\n\
