  , {(company;'Oracle'), (location;'De Meern')}\n, {(company;'Oracle'), (location;'Eindhoven')}\
  \ }\n```\n\n第一个示例将泛化乘积应用于集合函数 `{(a;{1,2,3}), (b;{4,5})}`。我们称这个集合函数为 `S1`。`S1` 的定义域是\
  \ `{a,b}`。对 `S1` 应用泛化乘积得到的*函数集合*包含六个元素，每个元素都是一个函数。第一个列举的函数是 `{(a;1), (b;4)}`。我们称这个函数为\
  \ `f1`。函数 `f1` 与集合函数 `S1` 具有相同的定义域：`dom(S1) = dom(f1) = {a,b}`。\n\n还要注意以下命题成立：`f1(a)∈S1(a)`\
  \ 和 `f1(b)∈S1(b)`。第一个命题求值为 `1∈{1,2,3}`，为真；第二个求值为 `4∈{4,5}`，也为真。这两个命题的合取对应于定义 4-7\
