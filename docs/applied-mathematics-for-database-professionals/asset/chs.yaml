  \ SQL；你必须将全称量化重写为存在量化（SQL 支持后者）。一旦你完成了这项工作（这正是备选方案 `FEb` 的核心），你就可以直接为该查询编写等效的 SQL\
  \ 表达式；参见 `SEI`。备选方案 `SEII` 也紧密遵循 `FEb`，但它使用了 SQL 中可用的“不存在”运算符，而非“不在”运算符。\n\n备选方案\
  \ `SEIII` 是 `FEc` 的 SQL 版本；这种查询表述方式可以被视为在 SQL 中模拟全称量化的一种技巧。\n\n你对当前**完全没有**任何已安排开设的课程有何看法？它们是否应该出现在查询\
  \ `EXQ6` 的结果集中？\n\n## ■注意\n\n还记得对空集进行全称量化的真值吗？无论被量化的谓词是什么，这样的量化结果总是为真。\n\n没有已安排开设的课程将会出现在此查询的结果集中。每当你遇到全称量化——或一个否定的存在量化时——你应该意识到这个后果（警钟应该响起）。此外，每当被量化的集合可能为空时，你都应该与你的客户（最终用户）再次确认，确保他或她知晓这种“副作用”，并需要查询具备这种行为。\n\
  \n如果完全没有已安排开设的课程不应该出现在此查询的结果集中，那么你可以按如下方式修改 `FEa` 来反映这一点：\n\n7451CH09.qxd 5/7/07\
