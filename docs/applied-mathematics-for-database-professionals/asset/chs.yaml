  \ < e2(SGRADE))\n```\n\n### 练习 4\n\n```\nSTC2(OFFRB,OFFRE) :=\n/* 新的课程安排必须以状态 SCHED\
  \ 开始 */\n( ∀o∈(OFFRE⇓{COURSE,STARTS}-OFFRB⇓{COURSE,STARTS})⊗OFFRE: o(STATUS)='SCHD'\
  \ )\n```\n\n### 练习 5\n\n我们假设日期数据类型上已定义了加法运算。通过增加 31 天，我们形式化地指定了“一个月”。\n\n```\nSTC(EMPB,EMPE)\
  \ :=\n( ∀e∈(EMPE⇓{EMPNO}−EMPB⇓{EMPNO})⊗EMPE: e(HIRED)<=sysdate+31 )\n```\n\n###\
  \ 练习 6\n\n如果你将 `STC7` 量化蕴涵的结论重写为合取范式，最终会得到六个合取项。按照第 7 章练习 11 的相同方法，你可以将该蕴涵式重写为六个蕴涵式的合取。由此，你可以将全称量化重写为六个量化式的合取。\n\
  \n你可以将 `STC3` 重写为如下合取式：\n\n```\n( ∀o1∈OFFRB, o2∈OFFRE:\n(o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS}\
  \ ∧ o1(STATUS) ≠ o2(STATUS))\n⇒ (o1(STATUS)='SCHD' ⇒ (o2(STATUS)='CONF' ∨ o2(STATUS)='CANC')\
  \ )\n∧\n( ∀o1∈OFFRB, o2∈OFFRE:\n(o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∧ o1(STATUS)\
  \ ≠ o2(STATUS))\n⇒ (o1(STATUS)='CONF' ⇒ o2(STATUS)='CANC') )\n```\n\n### 练习 9\n\n\
