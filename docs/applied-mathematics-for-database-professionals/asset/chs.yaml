  \n**362**\n\n附录 E **■** 部分练习答案\n\n## 练习 7\n\n“经理”有几种解释方式。经理可以是职位等于 `MANAGER` 的员工，也可以是管理其他员工的员工，或者是管理部门的员工，或是这些情况的任意组合。我们将针对前两种解释给出查询。\n\
  \n```\n{ e↓{empno,name} | e∈dbs(EMP)⊗(dbs(GRD)◊◊{(sgrade;grade),(ulimit;ulimit)})\
  \ ∧\ne(job)='MANAGER' ∧ e(msal)=e(ulimit) }\n```\n\n```\n{ e↓{empno,name} | e∈dbs(EMP)\
  \ ∧ e(empno) ∈ { m(mgr) | m∈dbs(MEMP) } ∧\ne(msal)=↵{ g(ulimit) | g∈dbs(GRD) ∧ g(grade)=e(sgrade)\
  \ }\n```\n\n```sql\nselect e.EMPNO, e.NAME\nfrom EMP e\nwhere e.JOB='MANAGER'\n\
  \  and e.MSAL = (select g.ULIMIT\n                from GRD g\n                where\
  \ g.GRADE = e.SGRADE)\n```\n\n```sql\nselect e.EMPNO, e.NAME\nfrom EMP e\nwhere\
  \ e.EMPNO in (select m.MGR\n                  from MEMP m)\n  and e.MSAL = (select\
  \ g.ULIMIT\n                from GRD g\n                where g.GRADE = e.SGRADE)\n\
  ```\n\n## 练习 10\n\n此问题的表述方式表明，“经理”指的是管理其他员工的员工（`MEMP` 表结构）。这种情况下，问题的答案很简单：∅。这样的经理不存在，因为有两个元组连接约束规定，经理的收入总是高于他们管理的员工。\n\
  \n你也可以将“他的员工”解释为在该“经理”管理的部门中工作的员工。我们将提供这种情况下的查询：\n\n```\n{ em↓{empno,name,msal}\
  \ | em∈dbs(EMP)⊗(dbs(DEPT)◊◊{(empno;mgr),(mdeptno;deptno)})\n∧((∃e∈dbs(EMP): e(job)≠'SALESREP'\
  \ ∧\n   e(deptno)=em(mdeptno) ∧\n   e(msal)>em(msal)) ∨\n (∃e∈dbs(EMP)⊗dbs(SREP):\n\
  \   e(job)≠'SALESREP' ∧\n   e(deptno)=em(mdeptno) ∧\n   e(msal)+e(comm)/12>em(msal)))\
  \ }\n```\n\n7451AppE.qxd 5/15/07 1:43 PM Page 363\n\n附录 E **■** 部分练习答案\n\n**363**\n\
  \n```sql\nselect distinct /* 必须使用 distinct！ */\n       em.EMPNO, em.NAME, em.MSAL\n\
  from EMP em\n    ,DEPT d\nwhere d.MGR = em.EMPNO\n  and (exists (select '一位\"他的员工\"\
  收入更高（非销售代表情况）'\n               from EMP e\n               where e.job <> 'SALESREP'\n\
  \                 and e.DEPTNO = d.DEPTNO\n                 and e.MSAL > em.MSAL)\n\
  \       or\n       exists (select '一位\"他的员工\"收入更高（销售代表情况）'\n               from\
  \ EMP e\n                   ,SREP s\n               where e.EMPNO = s.EMPNO\n  \
  \               and e.DEPTNO = d.DEPTNO\n                 and e.MSAL + s.COMM/12\
  \ > em.MSAL))\n```\n\n## 练习 13\n\n```\n{ {(empno;e(empno)),(name;e(name)),(smempno;sm(empno)),(smname;sm(name))}\n\
