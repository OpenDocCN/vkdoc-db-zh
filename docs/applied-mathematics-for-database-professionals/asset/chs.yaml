  \ `o` 加 `OFFR`。你可以将该谓词形式重写为：\n\n`(∀o∈OFFR: (P(o) ⇒ Q(o,REG)) ∧ (P(o) ⇒ R(o,OFFR)))`\n\
  \n你进而可以将其重写为以下合取式：`(∀o∈OFFR: P(o) ⇒ Q(o,REG)) ∧ (∀o∈OFFR: P(o) ⇒ R(o,OFFR))`\n\n\
  注意，第二个合取项现在只涉及 `OFFR` 表结构，因此是一个表谓词。\n\n## 第 8 章答案\n\n### 练习 3\n\n```\nSTC(EMPB,EMPE)\
