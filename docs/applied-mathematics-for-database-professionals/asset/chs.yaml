  \ A T A B A S E P R E D I C A T E S\n\n**121**\n\n与元组谓词类似，我们说 `P5` 是 `{partno}`\
  \ 上的一个表谓词，`P6` 是 `{instock, price}` 上的一个表谓词，而 `P7` 是 `{instock, partno, name}` 上的一个表谓词。\n\
  \n现在看一下图 6-1 中的表 `PAR1`。\n\n**图 6-1.** 表 `PAR1`\n\n`PAR1` 是 `{partno, name, instock,\
  \ price}` 上的一个表。这是 `P5`、`P6` 和 `P7` 作为表谓词所基于的所有集合的超集；因此，我们可以有意义地将 `PAR1` 作为参数提供给这些谓词。\n\
  \n你可能已经注意到，`PAR1` 满足谓词 `P5`；在 `PAR1` 中没有两个不同的零件具有相同的 `partno` 值。`PAR1` 代表的总库存价值是\
  \ 675，小于 2500，所以 `PAR1` 也满足 `P6`。然而，它违反了谓词 `P7`；零件 3 缺货，但没有另一个具有相同名称（斧头）的零件有库存。\n\
  \n在本书的剩余部分，如果一个表谓词可以重写为以下模式的谓词，我们将认为它是表谓词的一个退化情况：\n\n```\nP(T) := ( ∀t∈T: Q(t) )\n\
  ```\n\n这里 `Q(t)` 代表一个元组谓词。如果一个表谓词符合前面的形式，那么我们认为它是一个*伪装的元组谓词*。在下一章中，我们将以不同于其他表谓词的方式来指定这些表谓词的退化情况；实际上，对于这些情况，我们将把元组谓词\
  \ `Q(t)` 指定在一个不同的*层级*，而表谓词 `P(T)` 则作为表谓词被丢弃。\n\n一个伪装成元组谓词的表谓词退化情况会是这样：\n\n```\n\
