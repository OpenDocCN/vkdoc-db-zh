  形式化地，“`R`是从集合`A`到集合`B`的二元关系” ⇔ `R∈℘(A×B)`。\n- `函数`是一种二元关系，其中没有第一个坐标出现超过一次。\n形式化地，“`F`是从`A`到`B`的函数”\
  \ ⇔ `F∈℘(A×B) ∧ ( ∀p1,p2∈F: p1≠p2 ⇒ π(p1)≠π(p2) ) ∧ { π(p) | p∈F } = A`。\n- 函数`F`的所有第一个坐标的集合被称为函数`F`的`定义域`。\n\
  记法为`dom(F)`。因此，如果`F`是从`A`到`B`的函数，那么`dom(F) = A`。\n- 函数`F`的所有第二个坐标的集合被称为函数`F`的`值域`。\n\
  记法为`rng(F)`。因此，如果`F`是从`A`到`B`的函数，那么`rng(F) ⊆ B`。\n- 如果`F`是一个函数，且`x`是`dom(F)`的一个元素，那么`F(x)`（`F`应用于`x`）表示在函数`F`中与`x`配对的值域元素。\n\
  - 函数的每一个子集都是一个函数。\n- 两个函数是`相容的`（或`可联合的`），当且仅当对于两个函数共有的每一个第一个坐标，相应的第二个坐标都匹配。只有当两个函数相容时，这两个函数的并集才会是一个函数。\n\
  - 函数`F`对集合`A`的`限制`是`F`的一个子集，该子集只包含那些第一个坐标是集合`A`元素的序对。记法为`F↓A`。\n- `集合函数`是一种函数，其中每个元素（一个序对）的第二个坐标是一个集合。\n\
  - 如果一个集合函数被用来表示现实世界中我们想要捕捉的某事物的各个方面，那么我们将这样的集合函数称为`特征化描述`。特征化描述的定义域元素被称为其`属性`。值域元素被称为这些属性的`属性值集`。\n\
  - 集合函数`F`的`广义积`，记法为`∏(F)`，生成一个集合，该集合包含所有与`F`定义域相同，并且其序对的第二个坐标是从`F`中相同第一个坐标所关联的相应集合中选出的函数。\n\
  - 特征化描述的广义积中的元素可以被认为代表了现实世界中的命题，并被称为`元组`。\n- 元组中序对的第一个坐标被称为该元组的`属性`。\n- 两个给定函数`f`和`g`的`函数复合`，记法为`g◊f`（`g`在`f`之后），可用于重命名元组的属性。这里，`f`是重命名函数，`g`是其属性根据`f`进行重命名的元组。\n\
