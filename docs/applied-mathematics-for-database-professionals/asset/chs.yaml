  \ `f`)、(`f`, `t`) 和 (`f`, `f`)。你可以用以下对应的合取式来表示这三种真值组合：\n(`t`,`f`): `C := P ∧ ¬Q`\n\
  (`f`,`t`): `C := ¬P ∧ Q`\n(`f`,`f`): `C := ¬P ∧ ¬Q`\n\n现在，如果你将这三个合取式组合成迭代析取式 `C\
