- '# 关系与函数


  正如你可能在设计中所使用的那样，一种普遍的设计技术被称为实体关系图（ERD）。“关系模型”中的“关系”一词与 ERD 中的 R 没有关系。它指的是（n 元）关系的*数学*概念，这与
  ERD 中的“关系”概念完全不同。前者是一个数学——集合论——概念；后者最终映射到数据完整性约束的某些情况（粗略地说）。


  在本章中，你将被介绍关系——E. F. Codd 所使用含义——的集合论概念。更具体地说，你将被介绍一种特定类型的关系：*二元*关系。我们将在本书的第 2 部分处理
  ERD 意义上的关系——作为数据完整性约束。


  #### 有序对与笛卡尔积回顾


  让我们先回顾一下第 2 章的内容。该章以关于有序对和笛卡尔积的以下两个定义结束：


  - 一个*有序对*是一对元素，也称为有序对的*坐标*。符号是 `(a;b)`。

  - 两个给定集合（比如 `A` 和 `B`）的*笛卡尔积*定义如下：`A×B = { (a;b) | a∈A ∧ b∈B }`


  这个定义表明，两个给定集合的笛卡尔积的结果实际上是一个有序对的集合。它包含了来自第一个集合和第二个集合的所有可能的元素组合。


  列表 4-1 用一个例子说明了笛卡尔积。


  ```

  A := {X,Y,Z}

  B := {1,2}

  A×B = { (X;1), (X;2), (Y;1), (Y;2), (Z;1), (Z;2) }

  ```


  第 2 章的同一部分还列出了以下性质：

  `a≠b ⇒ (a;b)≠(b;a)`

  `(a;b)=(c;d) ⇔ (a=c ∧ b=d)`

  `A×B=B×A ⇔ A=B`


  这些性质说明了以下事实：


  - 有序对的坐标顺序很重要。

  - 笛卡尔积不是交换算子。


  这使我们能够在下一节中引入二元关系的数学概念。


  #### 二元关系


  从集合 `A` 到集合 `B` 的*二元关系*被定义为笛卡尔积 `A×B` 的*一个子集*。它被称为*二元*关系，因为它处理两个集合（`A` 和 `B`）。让我们从一个小例子开始，基于列表
  4-1 中的相同两个集合：


  ```

  A := {X,Y,Z}

  B := {1,2}

  ```


  看看这里显示的集合 `R1`：


  ```

  R1 := { (X;1), (X;2), (Y;1), (Z;2) }

  ```


  请注意，集合 `R1` 并不包含来自集合 `A` 和集合 `B` 的所有可能的元素组合；集合 `R1` 只包含四个有序对作为其元素。每个有序对也是集合 `A`
  和 `B` 的笛卡尔积的一个元素，如列表 4-1 所示。形式上，这可以表示如下：


  `( ∀p∈R1: p∈A×B )`


  这使得 `R1` 成为集合 `A` 和 `B` 的笛卡尔积的子集，因此是从集合 `A` 到集合 `B` 的一个二元关系。定义 4-1 说明了定义二元关系的另一种方式，并使用了第
  2 章引入的重要幂集算子。


  **定义 4-1：二元关系**

  “`R` 是从集合 `A` 到集合 `B` 的二元关系” ⇔ `R∈℘(A×B)`


  给定集合的幂集包含该集合的所有可能子集。在前面的情况下，幂集包含集合 `A` 和 `B` 的笛卡尔积的所有可能子集。因此，该幂集的每个元素都是从集合 `A` 到集合
  `B` 的二元关系。


  **注意** 在示例关系 `R1` 中，每个 `A` 值都出现在有序对中，每个 `B` 值也是如此。

  这当然并不总是成立。从 `A` 到 `B` 还有其他二元关系不是这种情况。


  你可以画出二元关系的图。这是通过可视化（如维恩图）两个集合，并用箭头连接两个集合中配对的元素来完成的。


  图 4-1 将二元关系 `R1` 显示为图片，其中四个箭头代表有序对。


  **图 4-1. 二元关系 `R1` 的图示**


  从二元关系 `R` 的图片中，你可以立即看到，集合 `A` 的元素 `X` 发出了两个箭头，而元素 `Y` 和 `Z` 各发出一个箭头。你也可以立即看到集合 `B`
  的元素 `1` 和 `2` 都有两个箭头到达。在下一节中，为了得到函数的定义，将对每个元素发出的箭头数量施加限制。


  **注意** 有些教科书可能不将二元关系声明为*从*集合 `A` *到*集合 `B`，而是声明为*在*集合 `A` *上*和*在*集合 `B` *上的。


  #### 函数


  *函数*是一种二元关系，它没有两个元素具有相同的第一坐标；或者换句话说，在函数中，两个不同的有序对总是具有不同的第一坐标。从图片的角度来看，这限制了左侧集合的元素发出的箭头数量最多为一个。


  此外，如果左侧集合中的每个元素都恰好有一个箭头发出，那么我们说该二元关系是该集合（左侧）上的函数。


  定义 4-2 说明了如何正式定义这个额外的限制。它采用了第 2 章介绍的 `π` 算子（它选择有序对的第一个坐标）。


  **定义 4-2：函数**

  “`F` 是定义在集合 `A` 上、取值于集合 `B` 的函数” ⇔

  `F∈℘(A×B) ∧ ( ∀p1,p2∈F: p1≠p2 ⇒ π(p1)≠π(p2) ) ∧ {π(p) | p∈F } = A`


  定义 4-2 中等价式右侧的第二个合取项构成了前面提到的额外限制：对于函数 `F` 中的所有有序对 `p1` 和 `p2`，如果 `p1` 和 `p2` 是不同的对，那么它们应该具有不同的第一坐标。换句话说（使用第
  1 章练习 4a 的结果），如果 `p1` 和 `p2` 具有相同的第一坐标，那么它们必须是同一个对。最后一个合取项指出，为了使 `F` 是*定义在* `A`
  上的函数，`A` 的每个元素都必须作为第一坐标出现。


  大多数时候，我们感兴趣的是函数的第一坐标来自集合 `A`（而远非第二坐标来自集合 `B`）。我们不再说“`F` 是定义在 `A` 上、取值于 `B` 的函数”，而是说“`F`
  是定义在 `A` 上的函数”。


  现在看下面的例子：


  ```

  F1 := { (X;1), (X;2), (Y;1), (Z;2) }

  F2 := { (X;2), (Y;1), (Z;2) }

  F3 := { (X;1), (Y;1), (X;1), (Z;1) }

  F4 := { (Z;2) }

  F5 := ∅

  F6 := { (empno;126), (ename;''Lex de Haan''), (born;''11-aug-1954'') }

  ```


  第一个例子 `F1` 不是函数，因为它包含两个不同的对——`(X;1)` 和 `(X;2)`——它们具有相同的第一坐标 `X`。第二个二元关系 `F2` 确实是一个函数：没有两个不同的对具有相同的第一坐标。第三个
  `F3` 也是一个函数。尽管列举了两个具有相同第一坐标的对（第一个和第三个对），但它们实际上是同一个对。其中一个对无需列举，可以省略而不改变集合 `F3`。示例
  `F4` 也是一个函数，空集（`F5`）确实也是一个函数。它是任意两个集合的笛卡尔积的子集（空集是*每个*集合的子集）。定义 4-2 中给出的额外限制也成立。你可能需要重新审视表
  3-2 中的第二条重写规则。最后一个示例二元关系 `F6` 也是一个函数。通过这个例子，你可以开始看到如何（作为构建块）使用函数来指定数据库设计。我们将在“集合函数”一节的末尾回到这一点。


  我们继续介绍围绕函数集合论概念的各种术语。


  #### 函数的定义域与值域



  '
- "# 关于函数域与范围的介绍\n\n函数 `F` 所有第一坐标的集合称为该函数的**定义域**；其表示法为 `dom(F)`。函数所有第二坐标的集合称为该函数的**值域**；其表示法为\
  \ `rng(F)`。这两个概念相当简单：要找到一个函数的定义域或值域，只需枚举该函数所有有序对的第一或第二坐标即可。\n\n##### 示例函数的定义域与值域\n\
  \n**列表 4-2. 示例函数的定义域**\n\n```\ndom(F2) = dom(F3) = {X,Y,Z}\ndom(F4) = {Z}\ndom(F5)\
  \ = ∅\ndom(F6) = {empno,ename,born}\n```\n\n**列表 4-3. 示例函数的值域**\n\n```\nrng(F2)\
  \ = {1,2}\nrng(F3) = {1}\nrng(F4) = {2}\nrng(F5) = ∅\nrng(F6) = {126,'Lex de Haan','11-aug-1954'}\n\
  ```\n\n##### 从图示确定定义域与值域\n\n从函数的图示中，通过省略那些没有箭头发出或到达的元素，你可以确定其定义域和值域。图 4-2 展示了一个从集合\
  \ `A := {A,B,C,D,E}` 到集合 `B := {1,2,3,4,5}` 的二元关系 `F7`。如你所见，它直接表示一个函数（集合 `A` 的元素最多只有一个箭头发出），且\
  \ `dom(F7) = {A,C,D,E}` 以及 `rng(F7) = {2,4}`。\n\n**图 4-2. 从集合 A 到集合 B 的二元关系 F7**\n\
  \n##### 函数的定义\n\n如果满足以下两个性质，我们定义函数 `F` 是**在**集合 `A` **上**并**映射到**集合 `B` **内**的：\n\
  *   `dom(F) = A`\n*   `rng(F) ⊆ B`\n\n因为 `F` 是在 `A` 上映射到 `B` 内的函数，根据定义，所有第一坐标的集合——即\
  \ `F` 的定义域——等于 `A`。并且因为在一个在 `A` 上映射到 `B` 内的函数中，每个有序对都以 `B` 的一个元素作为第二坐标，所以 `F` 的值域将是集合\
  \ `B` 的一个子集；通常它会是 `B` 的一个真子集。\n\n**注意** 你可能已经注意到，这里引入的集合论中“定义域”的概念与“域”一词在其他数据库教科书中的常见含义大不相同。在其他教科书中，一个“域”通常代表一个“表”中“列”的可能值集合——或者如果你愿意，可以说是它的类型。在本书中，有一个类似的概念对应于“域”的这个含义（我们将其称为**属性值集**），它将在“集合函数”一节中被精确定义。\n\
  \n##### 函数应用\n\n给定一个函数永远不会有两个具有相同第一坐标的有序对，你可以明确地确定与函数的一个给定定义域元素配对的每一个值域元素（记住，从每个定义域元素恰好有一个箭头发出）。数学家有一种特殊的方式来表示一个给定定义域元素的单个值域元素。如果\
  \ `F` 是一个函数且 `x` 是 `dom(F)` 的一个元素，那么 `F(x)`（读作“F of x”或“F applied to x”）表示在函数 `F`\
  \ 中与 `x` 配对的值域元素。这种表示法称为**函数应用**。我们将使用图 4-2 引入的函数 `F7` 来说明这一点。以下是 `F7` 的形式化规范：\n\
  \n```\nF7 := { (A;2), (C;2), (D;4), (E;4) }\n```\n\n指定函数 `F7` 的另一种有效方法是使用函数应用表示法；只需为每个定义域元素指定其值域元素是什么：\n\
  ```\nF7(A) = 2\nF7(C) = 2\nF7(D) = 4\nF7(E) = 4\n```\n\n你可能从过去的数学课上已经熟悉了这种表示法。这里是一个典型函数\
  \ `F` 的规范示例：`F(x) := 3x2 - 2x + 1`\n\n给定函数 `F`，你会写像 `F(2)` 这样的表达式，在这个例子中它的求值结果为\
  \ 9（三乘以四，减去二乘以二，加上一）。\n\n同一个函数 `F` 的集合论规范如下（假设我们想在集合 **Z** 上定义此函数并映射到集合 **Z** 内）：\n\
  ```\nF := { (x; 3x2 - 2x + 1) | x∈Z }\n```\n\n这里我们使用了代入法以集合论的方式指定函数 `F`。\n\n####\
  \ 恒等函数\n\n如果集合 `A` 是函数 `f` 的定义域，并且对于集合 `A` 中的所有元素 `x`，`f` 的 `x` 都等于 `x`，则函数 `f`\
  \ 称为**在 `A` 上的恒等函数**。我们使用记法 `id(A)` 来表示在 `A` 上的恒等函数。\n\n这里有几个例子：\n```\nid({1,2,3})\
  \ = { (1;1), (2;2), (3;3) }\nid({deptno}) = { (deptno;deptno) }\nid({course,startdate})\
  \ = { (course;course), (startdate;startdate) }\n```\n\n#### 函数的子集\n\n在本节中，我们将简要研究函数的子集。因为函数是一个集合，所以你可以构造一个函数的子集。列表\
  \ 4-4 提供了前一节介绍的函数 `F2 := { (X;2), (Y;1), (Z;2) }` 的每一个（真）子集。\n\n**列表 4-4. 函数 F2\
  \ 的所有真子集**\n\n```\n{ (X;2), (Y;1) }\n{ (X;2), (Z;2) }\n{ (Y;1), (Z;2) }\n{ (X;2)\
  \ }\n{ (Y;1) }\n{ (Z;2) }\n∅\n```\n\n如你所见，`F2` 的每一个真子集本身又是一个函数。确实，这对于每个函数都成立。对于一个给定的函数\
  \ `F`，`F` 的每一个真子集也将是一个函数。\n\n#### 小结\n\n至此，集合论函数的介绍结束。因为函数是一个重要的概念，将在本书的其余部分被广泛使用，我们在此做一个简要总结。\n\
  *   函数是一个二元关系，因此是一个**有序对的集合**。\n*   在函数中，**每个第一坐标只出现一次**。\n*   你可以使用一个函数来指定数据库设计的某个部分。\n\
  \n本章的标题被特意选为“关系与函数”，因为我们认为你应该被介绍给（至少是）二元关系的数学概念。\n\n`n-元`关系（即不仅仅是二元关系）这一更一般的概念是由\
  \ E. F. Codd 引入数据库领域的一个基石概念。二元关系的概念足以满足本书中将发展的用于指定数据库设计的数学方法的需要。其他教科书处理——并在其方法中使用——`n-元`关系的概念。它们也以不同于本书处理二元关系特例（即函数）的方式来使用\
  \ `n-元`关系。为了避免混淆，本书从现在开始将明确不再使用*二元关系*或*关系*这些术语。\n\n#### 函数上的操作\n\n因为函数是集合，所以你可以应用集合运算符——并集、交集和差集——以函数作为其操作数。本节将探讨这些集合运算符在函数上的应用。\n\
  \n##### 并集、交集与差集\n\n数学家总是对运算符的**闭包性质**感兴趣。在本章的上下文中，我们问自己：在集合上封闭的并集、交集和差集运算符，在函数上是否也是封闭的？换句话说，当你对两个函数应用这些运算符时，结果是否仍然是另一个函数？\n\
  \n看下面的例子，它引入了两个函数 `G1` 和 `G2`，并展示了这两个函数的并集的结果：\n```\nG1 := { (a;1), (b;2), (c;3)\
  \ }\nG2 := { (a;2), (d;4) }\nG1 ∪ G2 = { (a;1), (b;2), (c;3), (a;2), (d;4) }\n```\n\
  \n这个例子说明了两个函数的并集不一定产生一个函数，因为函数 `G1` 和 `G2` 并集的结果包含了两个具有相同第一坐标的**不同**有序对：`(a;1)`\
  \ 和 `(a;2)`。\n\n再看另一个例子：\n```\nG3 := { (empno;999), (ename;'Toon Koppelaars'), (born;'14-feb-1965')\
  \ }\nG4 := { (empno;999), (occupation;'IT architect') }\nG3∪G4 = { (empno;999),\
  \ (ename;'Toon Koppelaars'),\n           (born;'14-feb-1965'), (occupation;'IT architect')\
  \ }\n```\n\n\n"
- '# 函数集合理论


  ###### 函数的并集与兼容性


  函数 `G3` 和 `G4` 的并集结果仍然是一个函数。这是因为 `G3(empno) = G4(empno)`，并且 `empno` 是两个函数共有的唯一定义域元素。在并集结果中，元素
  `(empno,999)` 不会重复出现两次。


  现在应该不难理解两个函数为了使其并集仍构成一个函数所需具备的一般性质。这个性质被称为两个函数的*兼容性*或*可连接性*。定义 4-3 正式规定了这一特定性质。


  **定义 4-3：兼容（可连接）函数**

  “函数 `F` 与函数 `G` 兼容” ⇔

  ```

  ( ∀c∈(dom(F)∩dom(G)): F(c)=G(c) )

  ```

  当且仅当对于两个函数共有的每一个第一坐标（即，可以从两个函数的定义域的交集中选取的坐标），相应的第二坐标匹配时，这两个函数才是兼容的。只有当两个函数兼容时，它们的并集才会产生另一个函数。


  > 注意：定义 4-3 认为两个没有共同第一坐标的函数总是兼容的。如下例所示，这样两个函数的并集确实是一个函数：

  > ```

  > G5 := { (deptno,1), (dname,''Natural Join''), (location,''Utrecht'') }

  > G6 := { (invoice,''inv123''), (amount,3500) }

  > G5 ∪ G6 = { (deptno,1), (dname,''Natural Join''), (location,''Utrecht''), (invoice,''abc123''),
  (amount,3500) }

  > ```

  > 如果两个函数没有共同的第一坐标，那么它们的并集就不会包含两个具有相同第一坐标的有序对。实际上，对于两个没有共同第一坐标的函数，这个性质总是成立的。然而，在实践中，这样的并集可能是没有意义的。


  ###### 函数的交集与差集


  现在来看两个函数的交集，这里重用示例函数 `G1` 到 `G6`：

  ```

  G1 ∩ G2 = ∅

  G3 ∩ G4 = { (empno,999) }

  G5 ∩ G6 = ∅

  ```

  函数 `G1` 和 `G2` 的交集是空集；没有有序对同时是 `G1` 和 `G2` 的元素。函数 `G3` 和 `G4` 的交集正是那个第一坐标出现在 `dom(G3)`
  和 `dom(G4)` 的交集中（坐标 `empno`）且满足性质 `G3(empno) = G4(empno)` 的单元素有序对。最后，函数 `G5` 和 `G6`
  的交集是空集；尽管这两个函数是兼容的，但它们没有共同的第一坐标，更不用说有一个有序对了。


  两个函数的交集结果总是一个函数。一个简单的理解方式是，任何两个给定*集合*的交集总是这两个给定集合的子集；设 `A` 和 `B` 是两个集合，则 `(A ∩ B)
  ⊆ A` 且 `(A ∩ B) ⊆ B`。两个函数的交集将是这两个函数的子集，因此是一个函数（回顾“函数的子集”一节，及清单 4-4）。


  两个函数的差集总是一个函数。这与两个函数交集的推理相同。集合 `A` 和集合 `B` 的差集——`A` 减 `B`——总是集合 `A` 的子集。


  ##### 函数的限制


  在本书的第 2 部分，我们经常会对给定函数的一个子集感兴趣。我们只想考虑那些第一坐标可以从函数定义域的某个给定子集中选取的有序对。这引出了*函数的限制*这一概念。定义
  4-4 定义了函数的限制这一概念。


  **定义 4-4：函数的限制**

  设 `F` 是一个函数，`A` 是一个集合。函数 `F` 在集合 `A` 上的限制；记作 `F↓A`，定义如下：

  ```

  F↓A := { p | p∈F ∧ π₁(p)∈A }

  ```

  函数 `F` 在集合 `A` 上的限制是 `F` 的一个子集，该子集只包含那些第一坐标是集合 `A` 元素的有序对。让我们用清单 4-5 中的几个例子来说明这一点。其中重用了前面提到的函数
  `G5`。


  **清单 4-5：函数限制示例**

  ```

  { (X,2), (Y,1) }↓{X} = { (X,2) }

  { (X,2), (Z,2) }↓{Z} = { (Z,2) }

  { (X,2), (Z,2), (Y,1) }↓{X,Y,Z} = { (X,2), (Z,2), (Y,1) }

  G5↓{dname,location} = { (dname,''Natural Join''), (location,''Utrecht'') }

  G5↓∅ = ∅

  ```

  注意，函数的限制*总是*会产生另一个函数；如果你在空集上进行限制，结果是空函数。


  有了这个限制运算符，你就能给出两个函数兼容性的另一种定义；即，为了使两个函数的并集产生另一个函数，这两个函数应具备的性质。见定义 4-5。


  **定义 4-5：函数兼容性（可连接性）的替代定义（使用限制）**

  “函数 `F` 与函数 `G` 兼容” ⇔ `F↓(dom(F)∩dom(G)) = G↓(dom(F)∩dom(G))`


  当两个函数被限制到其定义域的交集时，如果得到的限制是相等的，那么这两个函数就是兼容的（可连接的）。


  ##### 集合函数


  在本书的第 2 部分中，我们将需要的另一个概念是*集合函数*的概念。集合函数将被用作*数据库全域*定义的基础：这是在第 2 部分将介绍的数据库设计的形式化规范。


  如你所知，函数是一个有序对的集合，而有序对是一个顺序很重要的两个元素的对。


  > **注意**：对于允许作为有序对坐标出现的元素类型，没有施加任何限制。它们可以具有任意的复杂性。例如，坐标可以是集合。


  集合函数是一种函数，其中每一个有序对都以一个集合作为其第二坐标。定义 4-6 正式定义了这个概念。


  **定义 4-6：集合函数**

  “`F` 是一个集合函数” ⇔ `F` 是一个函数，并且 `(∀c∈dom(F): F(c) 是一个集合)`


  从这个定义可以看出，集合函数是一种函数，其中每个值域元素都是一个集合（可能是空集）。清单 4-6 提供了集合函数的各种示例。


  **清单 4-6：集合函数示例**

  ```

  H1 := { (X,{1,2,3,4,5}), (Y,{1,2,3,4}) }

  H2 := { (X,{1,2}), (Z,{3,4}) }

  H3 := { (company,{''Natural Join'',''Centraal Boekhuis'',''Oracle'',''Remmen & De
  Brock''}), (location,{''Utrecht'',''Culemborg'',''De Meern'',''Eindhoven''}) }

  H4 := { (empno,[1..99]), (ename,varchar(10)), (born,date), (job,{''CLERK'',''SALESMAN'',''TRAINER'',''MANAGER'',''PRESIDENT''}),
  (salary,[1000..4999]) }

  ```

  第一个例子 `H1` 是一个函数（没有第一坐标出现超过一次）。它是一个集合函数，因为 `H1(X)` 和 `H1(Y)` 都求值为集合值；分别是 `{1,2,3,4,5}`
  和 `{1,2,3,4}`。第二个例子，函数 `H2`，也是一个集合函数，因为 `H2(X) = {1,2}` 且 `H2(Z) = {3,4}`。


  ##### 特征化


  你可以认为集合函数 `H3` 通过其有序对的第一坐标枚举了一个公司的两个方面：公司名称（坐标 `company`）和公司位置（坐标 `location`）。这样的第一坐标被称为*属性*。


  附属于这些属性的是值集——作为有序对的第二坐标——可以被认为是代表了公司这些属性的可能值集合。同样，你可以认为集合函数 `H4` 表征了一名员工。注意 `H4`
  的定义使用了一些在表 2-3 中引入的集合规范简写形式。



  '
- "# 4 关系与函数\n\n##### 特征描述\n\n当使用一个集合函数来描述现实世界的某物时，它被称为一个*特征描述*，方法是列出相关的属性以及每个属性的可接受值的集合。相关属性是有序对的第一个坐标，可接受值集合是它们各自对应的第二个坐标。\n\
  \n我们将特征描述的有序对的第一个坐标称为该特征描述的*属性*，将第二个坐标称为相应属性的*属性值集合*。\n\n如前所述，集合函数 `H4` 可被视为一个表示雇员属性的特征描述。在这种情况下，你只对表示每个雇员的编号（属性\
  \ `empno`）、姓名（属性 `ename`）、出生日期（属性 `born`）、职业（属性 `job`）和薪水（属性 `salary`）感兴趣。\n\n######\
  \ 外部谓词\n\n看待特征描述还有另一种方式。它们可以被视为刻画了现实世界中的一个谓词；特征描述引入了谓词的（名称）参数以及这些参数可以取值的相应值集合。例如，特征描述\
  \ `H4` 刻画了以下谓词：员工 `ENAME` 被分配员工编号 `EMPNO`，出生于日期 `BORN`，担任职位 `JOB`，并拥有每月 `SALARY`\
  \ 美元的薪水。\n\n这个谓词有五个参数（`ENAME`、`EMPNO`、`BORN`、`JOB`、`SALARY`），对应于 `H4` 中的五个第一坐标。该谓词是一个自然语言句子，描述了所涉及属性的含义和关联。在本书的第二部分，一个特征描述将作为表设计的基础。表设计的特征描述所刻画的谓词代表了用户对该表设计所理解的含义。这样的谓词被称为该表的*外部谓词*。\n\
  \n##### 集合函数的泛化乘积\n\n介绍了集合函数后，我们现在可以建立集合函数的*泛化乘积*概念（乍一看，这常常被认为是一个复杂的概念）。泛化乘积以一个集合函数作为操作数，并产生一个新的*函数集合*。\n\
  \n泛化乘积运算符是第二个关键的垫脚石，仅次于第 2 章引入的幂集运算符。使用这两个集合运算符，我们将能够构造通常相当大的*值集合*、*元组*集合（此处引入）、*表*集合（在第\
  \ 5 章引入）以及一个*数据库状态*集合（在第 5 章引入）。在第 7 章，我们将演示一种方法，该方法涉及将这些值集合定义为数据库设计的形式化规范的构建块。\n\
  \n一个集合函数 `F` 的泛化乘积，记作 `∏(F)`，生成一个包含所有*可能*函数的集合，这些函数与 `F` 具有相同的定义域，并且这些函数中的有序对的第二坐标*选自（即，是）在\
  \ `F` 中与相同第一坐标相关联的集合*。定义 4-7 正式定义了泛化乘积运算符。\n\n###### 定义 4-7：集合函数的泛化乘积\n设 `F` 为一个集合函数。`F`\
  \ 的泛化乘积，记作 `∏(F)`，定义如下：\n\n```\n∏(F) = { f | f 是函数 ∧ dom(f) = dom(F) ∧ (∀c∈dom(f):\
  \ f(c) ∈ F(c)) }\n```\n\n此定义中的最后一个合取项规定，由该运算符生成的每个函数，其第二坐标都是集合函数中相应集合（第二坐标）的元素。清单\
  \ 4-7 给出了一些例子，可以快速说明当你将此运算符应用于集合函数时的效果。此清单中重用了上一节中的集合函数 `H2` 和 `H3`。\n\n###### 清单\
  \ 4-7. *泛化乘积的应用示例*\n```\n∏({ (a;{1,2,3}), (b;{4,5}) }) =\n{ {(a;1), (b;4)}\n, {(a;1),\
  \ (b;5)}\n, {(a;2), (b;4)}\n, {(a;2), (b;5)}\n, {(a;3), (b;4)}\n, {(a;3), (b;5)}\
