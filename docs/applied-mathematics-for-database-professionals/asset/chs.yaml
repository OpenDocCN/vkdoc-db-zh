  \n### 第 9 章 数据检索\n\n通过`查询`，你可以从数据库中检索数据。在本章中，我们将演示如何以形式化的方式指定查询。为此，我们不需要正式引入任何新概念；我们已经呈现了指定查询的所有要素。\n\
  \n“形式化指定查询”一节向你介绍了`数据库全域上的查询`的形式化概念。你会发现，可以基于给定的数据库状态，将查询指定为一个基于集合论的表达式。在本节中，我们还将给出一些简单的例子，帮助你熟悉这个查询的形式化概念。\n\
  \n“基于 `DB_UEX` 的查询示例”一节提供了基于 `DB_UEX`（第 7 章引入的示例数据库全域）的查询示例。它将从基本查询开始，并逐渐过渡到更复杂的查询。对于每个查询，我们将为你提供多种（等价的）形式化表达式来指定它。\n\
  \n在本书中，你将首次看到 SQL 的使用。每个示例查询都会附带一个或多个等价的 SQL 表达式。你会发现，用 SQL 表达某些查询并不那么简单。\n\n**注意**\
  \ 我们假设你具备 SQL 的工作知识。本书的目标当然不是教授 SQL 语言（尽管同时展示形式化表达式和 SQL 表达式可能会有这个副作用）。正如本书引言中提到的，本章以及接下来两章中给出的\
  \ SQL 表达式符合 Oracle SQL DBMS 的 10 `g` 版本。\n\n照例，你会在章末找到“章节总结”，然后是“练习题”部分。\n\n####\
  \ 形式化指定查询\n\n数据检索是数据库的关键应用。通过查询，你可以从数据库中提取与你相关的信息。在本节中，我们将演示如何形式化地指定查询。\n\n让我们从一个简单的例子开始。我们将使用第\
  \ 7 章引入的示例数据库设计。假设 `E` 代表全域 `DB_UEX` 的某个数据库状态中的员工表。以下是一个名为 `Q1` 的在 `E` 上的查询的形式化规范，它提取收入超过\
  \ 6000 的培训师：\n\n`Q1(E) := { e | e∈E ∧ e(JOB)='TRAINER' ∧ e(MSAL)>6000 }`\n\n查询 `Q1`\
  \ 返回所有表示收入超过 6000 的培训师的员工元组。\n\n如果你感兴趣的不是完整的元组，而只是收入超过 6000 的培训师的员工号 (`EMPNO`)、姓名\
  \ (`ENAME`) 和薪水 (`MSAL`)，那么以下查询 (`Q2`) 将完成这项工作：\n\n`Q2(E) := { e↓{EMPNO,ENAME,MSAL}\
  \ | e∈E ∧ e(JOB)='TRAINER' ∧ e(MSAL)>6000 }`\n\n**注意** `Q1` 和 `Q2` 都返回一个表作为结果。正如你将很快看到的，这在本书阐述的形式化方法中并非必须；查询也可以返回简单的值（例如，单个数值或字符串值）。然而，在实践中，我们更倾向于返回表的查询规范。\n\
  \n如前面的例子所示，你可以将查询视为一个函数。在这种情况下，你向该函数传递一个表作为其参数，然后它根据该参数返回另一个值。当然，查询通常涉及不止一个表。一般来说，一个查询可以被视为接受一个数据库状态（我们包含所有当前表的形式结构）作为其参数。然后，查询可以检查此数据库状态内的任何可用表，以确定其返回值。\n\
  \n\n\n我们同样用一个示例来演示这一点。假设 `dbs` 表示数据库全域 `DB_UEX` 的某个数据库状态。请看查询 `Q3`；它返回雇佣了总裁（如果有的话）的部门：\n\
  \n```\nQ3(dbs) := { d | d∈dbs(DEPT) ∧\n\n(∃e∈dbs(EMP): e(DEPTNO)=d(DEPTNO) ∧ e(JOB)='PRESIDENT')\
  \ }\n```\n\n查询 `Q3` 检查状态 `dbs` 中保存的两个表；表达式 `dbs(DEPT)` 表示部门表，表达式 `dbs(EMP)` 表示员工表。因为查询的参数现在代表一个数据库状态，所以该查询可以检查该状态下任何可用的表。\n\
  \n正如这个例子向我们展示的，一个查询可以形式化地视为`数据库全域上的函数`。换句话说，查询是一个函数，其定义域是一组数据库状态。对于每个数据库状态，该函数返回（或者说`计算`）某个值。查询的结果可以是任何类型的值。查询\
  \ `Q3` 的结果是一个表。如果有总裁，那么结果将是一个包含一个元组的表；如果没有总裁，那么结果将是空表。数据库查询通常会生成表。事实上，对于查询语言 `SQL`，一个查询总是生成一个表。在本书介绍的形式化方法中，查询的结果也可以简单到单个数字或字符串值。这里有一个例子。查询\
  \ `Q4` 返回部门 10 的员工数量：\n\n```\nQ4(dbs) := #{ e | e∈dbs(EMP) ∧ e(DEPTNO)=10 }\n```\n\
  \n查询 `Q4` 的结果是一个数值。这里是一个返回表的 `Q4` 的形式化规范：\n\n```\nQ4(dbs) := { { (DEPT_TEN_EMPS;\
  \ #{ e | e∈dbs(EMP) ∧ e(DEPTNO)=10 }) } }\n```\n\n这个版本的 `Q4` 返回一个基于 `{DEPT_TEN_EMPS}`\
  \ 的表。它包含一个元组，其中有一个属性-值对。\n\n### 第 9 章 数据检索\n\n#### 基于 DB_UEX 的示例查询\n\n本节提供示例查询。它从基本查询开始，逐渐过渡到更复杂的查询。对于每个查询，我们将为你提供以下内容：\n\
  \n- 查询的非形式化描述\n- 一个或多个指定查询的形式化表达式\n- 一个或多个用 `SQL` 表达的查询规范\n\n在此过程中，你会发现精确地用非形式化方式指定一个查询变得越来越困难；很难避免歧义。同时，你会看到\
  \ `SQL` 存在一些缺点，当你试图将形式化查询规范直接翻译成 `SELECT` 表达式时，这些缺点会造成困难。\n\n清单 9-1 至 9-11 介绍了示例查询。所有查询都命名为\
  \ `EXQi` (`example query i`)，其中 `i` 代表序号。在为每个查询给出的形式化规范中，`dbs` 代表 `DB_UEX` 的一个数据库状态。各种替代的形式化表达式命名为\
  \ `FEc` (`formal expression c`)，其中 `c` 代表一个字母（a, b, c 等）。\n\n`SQL` 表达式基于 `DB_UEX`\
  \ 数据库设计的一个实现。我们将在第 11 章详细介绍这个实现。目前只需提及，在 `DB_UEX` 的实现中，每个表全域都一一对应地实现为一个 `SQL` 表，并且在该实现中明确排除了\
  \ `NULL` 值（这是我们形式化方法中未知的概念）。\n\n在 `SQL` 规范中，我们将使用由数据库特征描述 `DB_CHREX`（见清单 7-38）引入的表结构名称，作为\
  \ `SELECT` 表达式可用的表名。我们将替代的 `SQL` 规范命名为 `SEr` (`SQL expression r`)，其中 `r` 代表罗马数字（I,\
  \ II, III 等）。\n\n**注意：** 除非在随附文本中指出，否则为每个查询列出的各自形式化替代表达式和 `SQL` 替代表达式之间没有隐含的关系。\n\
  \n清单 9-1 给出了所有部门的数据。\n\n**清单 9-1.** 查询 `EXQ1(dbs)`\n\n**FEa:**\n\n```\ndbs(DEPT)\n\
  ```\n\n**FEb:**\n\n```\n{ d | d∈dbs(DEPT) }\n```\n\n**SEI:**\n\n\n"
- "# 第九章 ■ 数据检索\n\n## SEII\n`select d.* from DEPT d`\n\n这个查询很直接。它从给定的数据库状态`dbs(DEPT)`中检索部门表。另一种形式化表示方法（FEb）稍微不那么简洁。在\
  \ SEII 中，星号（`*`）符号被用作表示部门表所有属性的简写。SEII 实际上列出了所有属性（顺序是任意的）。\n\n#### 代码清单 9-2. 查询\
  \ EXQ2(dbs)\n此清单给出了月薪超过 4800，或工资级别大于等于 6 的员工的工作。\n\n### FEa:\n```\n{ e(JOB) | e∈dbs(EMP)\
  \ ∧ (e(MSAL) > 4800 ∨ e(SGRADE) ≥ 6) }\n```\n\n### FEb:\n```\n{ e↓{JOB} | e∈dbs(EMP)\
  \ ∧ (e(MSAL) > 4800 ∨ e(SGRADE) ≥ 6) }\n```\n\n### FEc:\n```\n{ e↓(JOB) | e∈dbs(EMP)\
  \ ∧ (e(MSAL) ≤ 4800 ⇒ e(SGRADE) ≥ 6) }\n```\n\n### FEd:\n```\n{ e↓(JOB) | e∈dbs(EMP)\
  \ ∧ (e(SGRADE) < 6 ⇒ e(MSAL) > 4800) }\n```\n\n### FEe:\n```\n{ e↓(JOB) | e∈dbs(EMP)\
  \ ∧ ¬(e(MSAL) ≤ 4800 ∧ e(SGRADE) < 6) }\n```\n\n### FEf:\n```\n{ e↓(JOB) | e∈dbs(EMP)\
  \ ∧ e(MSAL) > 4800 }\n∪\n{ e↓(JOB) | e∈dbs(EMP) ∧ e(SGRADE) ≥ 6 }\n```\n\n### SEI:\n\
  ```\nselect distinct e.JOB from EMP e where e.MSAL > 4800 or e.SGRADE >= 6\n```\n\
  \n### SEII:\n```\nselect distinct e.JOB from EMP e where not (e.MSAL <= 4800 and\
  \ e.SGRADE < 6)\n```\n\n### SEIII:\n```\nselect e.JOB from EMP e where e.MSAL >\
  \ 4800\nunion\nselect e.JOB from EMP e where e.SGRADE >= 6\n```\n\n你注意到 FEa 和 FEb\
  \ 之间的细微差别了吗？前者产生的是一个工作值的集合（即这不是一张表）；后者产生的是一个元组集合（即一个在`{JOB}`上的表），因此是形式化指定`EXQ2`的首选方式。\n\
  \n备选方案 FEc、FEd 和 FEe 是 FEb 的变体，其中析取被重写为蕴涵或合取。备选方案 FEf 使用并集运算符；收入超过 4800 的员工的工作与工资级别大于等于\
  \ 6 的员工的工作进行并集。\n\n**■注意** 这个查询的形式化指定方式意味着我们只检索*不同的*工作值。假设表`dbs(EMP)`当前有二十名员工，其中十名符合谓词“月薪大于\
  \ 4800 或工资级别等于 6 或更高”。如果这十名员工中有八名的工作是`TRAINER`，另外两名的工作是`MANAGER`，那么 FEa 的结果将是`{'TRAINER','MANAGER'}`：一个只有两个，而不是十个元素的集合。\n\
  \nFEa 和 FEb 演示的细微差别无法用 SQL 表达。规范 SEI 是这两者的 SQL 变体。另请注意，在 SQL 中，必须添加`distinct`关键字以确保查询结果中不出现重复的工作值。\n\
  \n备选方案 FEc 和 FEd 不能直接转换为 SQL，因为 SQL 缺乏蕴涵运算符；在 SQL 中只有析取、合取和否定可用。\n\n规范 SEII 是 FEe\
  \ 的 SQL 版本，SEIII 代表 FEf 的 SQL 版本。\n\n请注意，在后一种情况下，使用`distinct`关键字不是必需的；当使用集合运算符（`union`、`minus`或`intersect`）时，SQL\
  \ 总是返回不同的值。\n\n#### 代码清单 9-3. 查询 EXQ3(dbs)\n此清单给出了办事员的编号、姓名和工资，包括他们所属工资级别的下限和上限。\n\
  \n### FEa:\n```\n{ e↓{EMPNO,ENAME,MSAL,LLIMIT,ULIMIT} | e∈dbs(EMP)⊗\n(dbs(GRD)◊◊{(SGRADE;GRADE),(LLIMIT;LLIMIT),(ULIMIT;ULIMIT)})\
  \ ∧\ne(JOB)='CLERK' }\n```\n\n### SEI:\n```\nselect e.EMPNO, e.ENAME, e.MSAL, g.LLIMIT,\
  \ g.ULIMIT\nfrom EMP e, GRD g\nwhere e.SGRADE = g.GRADE\nand e.JOB = 'CLERK'\n```\n\
  \n这个查询由员工表和工资级别表之间的连接表示。为了能够使用连接运算符，你必须重命名员工表中的属性`SGRADE`或工资级别表中的属性`GRADE`。规范 FEa\
  \ 执行了后者重命名。你可以直接从 FEa 推导出 SQL 表达式 SEI。\n\n现在你可能在想 SQL 表达式看起来比形式化表达式容易得多，对吧？这是因为这个例子太简单了。当我们看到更复杂的例子时，你会看到这种情况不再适用；那时\
  \ SQL 表达式将变得比数学表达式更复杂。\n\n#### 代码清单 9-4. 查询 EXQ4(dbs)\n此清单给出了在两个不同地点恰好管理两个部门的员工（`EMPNO`和`ENAME`）。\n\
  \n### FEa:\n```\n{ e↓{EMPNO,ENAME} | e∈dbs(EMP) ∧\n#{ d(LOC) | d∈dbs(DEPT) ∧ d(MGR)=e(EMPNO)\
  \ } = 2 }\n```\n\n### FEb:\n```\n{ e↓{EMPNO,ENAME} | e∈dbs(EMP) ∧\n(∃d1,d2∈dbs(DEPT):\
  \ d1(MGR)=e(EMPNO) ∧\nd2(MGR)=e(EMPNO) ∧\nd1(LOC)≠d2(LOC)) }\n```\n\n### FEc:\n\
  ```\n{ e↓{EMPNO,ENAME} | e∈(dbs(EMP)⇓{EMPNO,ENAME})⊗\n(dbs(DEPT)◊◊{(EMPNO;MGR),(LOC1;LOC)})⊗\n\
  (dbs(DEPT)◊◊{(EMPNO;MGR),(LOC2;LOC)}) ∧\ne(LOC1)≠e(LOC2) }\n```\n\n### SEI:\n```\n\
  select e.EMPNO, e.ENAME\nfrom EMP e\nwhere 2 = (select count(distinct d.LOC)\nfrom\
  \ DEPT d\nwhere d.MGR = e.EMPNO)\n```\n\n### SEII:\n```\nselect e.EMPNO, e.ENAME\n\
  from EMP e\nwhere exists(select d1.*\nfrom DEPT d1\nwhere d1.MGR = e.EMPNO\nand\
  \ exists(select d2.*\nfrom DEPT d2\nwhere d2.MGR = e.EMPNO\nand d1.LOC <> d2.LOC))\n\
  ```\n\n### SEIII:\n```\nselect e.EMPNO, e.ENAME\nfrom EMP e\nwhere exists(select\
  \ *\nfrom DEPT d1, DEPT d2\nwhere d1.MGR = e.EMPNO\nand d2.MGR = e.EMPNO\nand d1.LOC\
  \ <> d2.LOC)\n```\n\n### SEIV:\n```\nselect distinct e.EMPNO, e.ENAME\nfrom EMP\
  \ e, DEPT d1, DEPT d2\nwhere e.EMPNO = d1.MGR\nand e.EMPNO = d2.MGR\nand d1.LOC\
  \ <> d2.LOC\n```\n\n规范 FEa 指出，由该员工管理的部门地点集合的基数必须为 2。备选方案 FEb 通过对两个由该员工管理的不同地点的部门进行存在性量化来实现这一要求。\n\
  \n**■注意** 在 FEb 中，使用了对同一集合的两个嵌套存在性量词的简写表示法。\n\n你可以直接将这两种形式化规范翻译成 SQL。注意，在 SEI 中，必须在`count`聚合函数内使用`distinct`关键字。规范\
  \ SEII 用于演示 SQL 中可用的存在性量词——`exists(...)`表达式的嵌套使用。SEIII 是一个简写版本，类似于形式化规范 FEb 中使用的简写。\n\
  \n规范 FEc 使用连接来定位由该员工管理的两个不同地点的部门。注意，在其 SQL 版本（SEIV）中，必须使用`distinct`关键字，以防止管理两个不同地点部门的员工在结果集中出现两次。\n\
  \n#### 代码清单 9-5. 查询 EXQ5(dbs)\n此清单给出了所有收入超过其上司工资 90%的被管理员工的编号和姓名。\n\n### FEa:\n\
  ```\n{ e1↓{EMPNO,ENAME} | e1∈dbs(EMP) ∧ m∈dbs(MEMP) ∧ e2∈dbs(EMP) ∧\ne1(EMPNO) =\
  \ m(EMPNO) ∧ m(MGR) = e2(EMPNO) ∧\ne1(MSAL) > 0.9*e2(MSAL) }\n```\n\n### FEb:\n\
  ```\n{ e↓{EMPNO,ENAME} | e∈(dbs(EMP)⊗dbs(MEMP))⊗\n(dbs(EMP)◊◊{ (MGR;EMPNO), (MGR_MSAL;MSAL)\
  \ }) ∧\ne(MSAL) > 0.9*e(MGR_MSAL) }\n```\n\n### FEc:\n```\n{ e1↓{EMPNO,ENAME} |\
  \ e1∈dbs(EMP) ∧\n(∃m∈dbs(MEMP): m(EMPNO)=e1(EMPNO) ∧\n(∃e2∈dbs(EMP): e2(EMPNO)=m(MGR)\
  \ ∧\ne1(MSAL) > 0.9*e2(MSAL) )) }\n```\n\n### SEI:\n```\nselect e1.EMPNO, e1.ENAME\n\
  from EMP e1, MEMP m, EMP e2\nwhere e1.EMPNO = m.EMPNO\nand m.MGR = e2.EMPNO\nand\
  \ e1.MSAL > 0.9 * e2.MSAL\n```\n\n### SEII:\n```\nselect e1.EMPNO, e1.ENAME\nfrom\
  \ EMP e1\nwhere exists (select m.*\nfrom MEMP m\nwhere m.EMPNO = e1.EMPNO\nand exists\
  \ (select e2.*\nfrom EMP e2\nwhere e2.EMPNO = m.MGR\nand e1.MSAL > 0.9 * e2.MSAL))\n\
  ```\n\n\n通过结合每个 EMP 元组与对应的 MEMP 元组（通过特化 `PSPEC2`），然后将 MEMP 元组合并回 EMP 元组（通过子集要求 `PSSR3`），您可以将受管理员工的月薪与其经理的月薪进行比较。规范\
  \ `FEa` 通过绑定两个用于 `EMP` 的元组变量（一个用于员工，一个用于经理）和一个用于 `MEMP` 的元组变量，然后对这些变量施加组合限制来实现这一点。规范\
  \ `FEb` 通过绑定一个从执行组合的嵌套连接中提取值的单一元组变量来实现这一点。第一个连接将 `EMP` 与 `MEMP` 的元组合并（以找到经理的员工编号）。第二个连接将\
  \ `MEMP` 的元组合并回 `EMP`（以找到经理的薪资）并要求属性重命名。\n\n规范 `SEI` 代表了 `FEa` 和 `FEb` 的 SQL 版本。\n\
  \n规范 `FEc` 采用嵌套存在量化来实现相同的结果。\n\n您可以利用 SQL 中对存在量化的支持，将其直接翻译为 SQL（参见 `SEII`）。\n\n\
  代码清单 9-6 给出了所有课程的代码、描述和类别，这些课程的每个预定授课单元的最大容量都少于十名学生。\n\n**代码清单 9-6.** 查询 `EXQ6(dbs)`\n\
  \n`FEa`:\n\n```\n{ c↓{CODE,DESCR,CAT} | c∈dbs(CRS) ∧\n\n(∀o∈dbs(OFFR): (o(COURSE)\
  \ = c(CODE) ∧\n\no(STATUS) = 'SCHD') ⇒\n\no(MAXCAP) < 10 ) }\n```\n\n`FEb`:\n\n\
  ```\n{ c↓{CODE,DESCR,CAT} | c∈dbs(CRS) ∧\n\n¬(∃o∈dbs(OFFR): o(COURSE) = c(CODE)\
  \ ∧\n\no(STATUS) = 'SCHD' ∧\n\no(MAXCAP) ≥ 10 ) }\n```\n\n`FEc`:\n\n```\n{ c↓{CODE,DESCR,CAT}\
  \ | c∈dbs(CRS) ∧\n\nc(CODE) ∉ { o(COURSE) | o∈dbs(OFFR) ∧\n\no(STATUS) = 'SCHD'\
  \ ∧\n\no(MAXCAP) ≥ 10 ) } }\n```\n\n`FEd`:\n\n```\n{ c↓{CODE,DESCR,CAT} | c∈dbs(CRS)\
  \ ∧\n\n#{ o1 | o1∈dbs(OFFR) ∧ o1(COURSE) = c(CODE) ∧\n\no1(STATUS) = 'SCHD' }\n\n\
  =\n\n#{ o2 | o2∈dbs(OFFR) ∧ o2(COURSE) = c(CODE) ∧\n\no2(STATUS) = 'SCHD' ∧\n\n\
  o2(MAXCAP) < 10 ) } }\n```\n\n`SEI`:\n\n```sql\nselect c.CODE, c.DESC, c.CAT\nfrom\
  \ CRS c\nwhere not exists (select o.*\n                  from OFFR o\n         \
  \         where o.COURSE = c.CODE\n                  and o.STATUS = 'SCHD'\n   \
  \               and o.MAXCAP >= 10)\n```\n\n`SEII`:\n\n```sql\nselect c.CODE, c.DESC,\
  \ c.CAT\nfrom CRS c\nwhere c.CODE not in (select o.COURSE\n                    \
  \ from OFFR o\n                     where o.STATUS = 'SCHD'\n                  \
  \   and o.MAXCAP >= 10)\n```\n\n`SEIII`:\n\n```sql\nselect c.CODE, c.DESC, c.CAT\n\
  from CRS c\nwhere (select count(*)\n       from OFFR o1\n       where o1.COURSE\
  \ = c.CODE\n       and o1.STATUS = 'SCHD')\n      =\n      (select count(*)\n  \
  \     from OFFR o2\n       where o2.COURSE = c.CODE\n       and o2.STATUS = 'SCHD'\n\
  \       and o2.MAXCAP < 10)\n```\n\n规范 `FEa` 紧密遵循了查询的非正式描述。`FEb` 是 `FEa` 的一个重写版本；全称量词被重写为存在量词。非正式地讲，它查询所有不存在最大容量为十或更多的预定授课单元的课程。因为将谓词重写为等价谓词的能力极其重要，我们将在此案例中再次演示其执行过程：\n\
  \n`(∀o∈dbs(OFFR): (o(COURSE)=c(CODE) ∧ o(STATUS)='SCHD') ⇒ o(MAXCAP)<10 )`\n\n```\n\
  ⇔ /* Add double negation */\n¬¬(∀o∈dbs(OFFR): (o(COURSE)=c(CODE) ∧ o(STATUS) = 'SCHD')\
  \ ⇒ o(MAXCAP)<10 )\n⇔ /* Bring one negation into the quantification, quantifier\
  \ changes */\n¬(∃o∈dbs(OFFR): ¬((o(COURSE)=c(CODE) ∧ o(STATUS)='SCHD') ⇒ o(MAXCAP)<10\
  \ ))\n⇔ /* Transform implication into disjunction */\n¬(∃o∈dbs(OFFR): ¬(¬(o(COURSE)=c(CODE)\
  \ ∧ o(STATUS)='SCHD') ∨ o(MAXCAP)<10 ))\n⇔ /* Apply De Morgan, disjunction changes\
  \ into conjuction */\n¬(∃o∈dbs(OFFR): ¬¬(o(COURSE)=c(CODE) ∧ o(STATUS)='SCHD') ∧\
  \ ¬o(MAXCAP)<10 )\n⇔ /* Get rid of negations */\n¬(∃o∈dbs(OFFR): o(COURSE)=c(CODE)\
  \ ∧ o(STATUS)='SCHD' ∧ o(MAXCAP)≥10 )\n```\n\n您经常会需要将全称量化重写为存在量化，原因很快就会明了。\n\n\n\
  \n规范 `FEc` 是 `FEb` 的一种变体；“不存在”现在被表达为“不是某个集合的元素”。`FEd` 可能看起来有点牵强；只有那些已安排的课程开设数量等于那些最大容量少于十个学生的已安排课程开设数量的课程，才会被包含在查询结果中。通过施加这个限制，你最终得到的正好是那些每个已安排的开设其最大容量都少于十个学生的课程。\n\
  \nSQL 缺乏直接表达全称量化的能力。\n\n## ■注意\n\n请记住，本书中我们使用的是 `Oracle 版本的 SQL`。SQL 标准提供了一种称为 `<量化比较谓词>`\
