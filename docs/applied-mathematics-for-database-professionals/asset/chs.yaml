  from EMP e\nwhere 0 = (select count(*)\nfrom (select o1.COURSE\nfrom OFFR o1\nwhere\
  \ o1.TRAINER = 1206\nand o1.STATUS = 'CONF'\nand to_char(o1.STARTS,'YYYY') = '2003'\n\
  minus\nselect o2.COURSE\nfrom OFFR o2\n,REG r\nwhere o2.COURSE = r.COURSE\nand o2.STARTS\
  \ = r.STARTS\nand r.STUD = e.EMPNO\nand o2.TRAINER = 1206\nand o2.STATUS = 'CONF'\n\
  and to_char(o2.STARTS,'YYYY') = '2003'))\n```\n\n### SEII:\n\n```sql\nselect e.EMPNO,e.ENAME\n\
  from EMP e\nwhere not exists(select o1.*\nfrom (select o.COURSE\nfrom OFFR o\nwhere\
  \ o.TRAINER = 1206\nand o.STATUS = 'CONF'\nand to_char(o.STARTS,'YYYY') = '2003')\
  \ o1\nwhere not exists(select r.*\nfrom REG r\n,OFFR o2\nwhere r.COURSE = o2.COURSE\n\
  and r.STARTS = o2.STARTS\nand r.STUD = e.EMPNO\nand o2.STATUS = 'CONF'\nand to_char(r.STARTS,'YYYY')\
  \ = '2003'\nand r.TRAINER = 1206\nand r.COURSE = o1.COURSE))\n```\n\n形式化规范 `FEa`\
  \ 查询所有员工，对于这些员工，De Haan 在 2003 年讲授的不同课程集合是该员工在 2003 年参加过的（由 De Haan 讲授的）课程的一个子集。请注意，要使员工参加了某门课程，必须满足以下条件：\n\
  \n1.  他或她必须注册了该课程。\n2.  该课程的状态必须是已确认。\n\n规范 `FEb` 是将 `FEa` 中的子集操作符重写为根据子集操作符定义推导出的量词。集合\
  \ `A` 是 `B` 的子集，当且仅当 `A` 的每个元素都是 `B` 的元素。\n\n```\n(A ⊆ B) ⇔ (∀a∈A: ∃b∈B: b=a)\n\
  ```\n\n我们应用的重写规则稍微复杂一些；其结构如下：\n\n```\n{ a | a∈A ∧ P(a) } ⊆ { b | b∈B ∧ Q(b) }\n\n\
  ⇔\n\n(∀a1∈{ a2 | a2∈A ∧ P(a2) }: (∃b∈B: b=a1 ∧ Q(b)))\n```\n\nSQL 并不支持所有的集合操作符：支持\
  \ `union`（并集）、`intersection`（交集）和 `difference`（差集）；不支持 `symmetric difference`（对称差集），也不支持\
  \ `subset of`（子集）操作符。幸运的是，你可以使用其他可用的集合操作符来重写子集操作符：\n\n```\n(A ⊆ B) ⇔ ((A − B) =\
  \ ∅)\n```\n\n集合 `A` 是 `B` 的子集，当且仅当 `A` 减 `B` 的差集代表空集。要在 SQL 中检查空集，你还需要应用一条重写规则：`((A\
  \ − B) = ∅) ⇔ (#(A − B) = 0)`\n\n你现在检查的是 `A` 减 `B` 的差集的基数是否为零，而不是检查其是否代表空集。前面的重写规则已应用于\
  \ `FEa`，最终得到 SQL 表达式 `SEI`。\n\n备选方案 `SEII` 代表了将子集操作符重写为量词 (`FEb`) 后的形式化版本的 SQL 实现。注意（再次）全称量词必须被进一步重写为存在量词。\n\
  \n代码清单 9-10 给出了课程 (`CODE` 和 `DESCR`)，这些课程在 2006 年的所有开课（且至少必须有一次）只由一位讲师讲授，并且这些开课中没有任何一次被其他讲师参加。\n\
  \n#### 代码清单 9-10. 查询 EXQ10(dbs)\n\n### FEa:\n\n```\n{ c↓{CODE,DESCR}\n| c∈dbs(CRS)\
  \ ∧ /* 该课程的所有开课只有一位讲师 */\n\n(∃e∈dbs(EMP):\n\n(∀o∈dbs(OFFR): (o(COURSE)=c(CODE) ∧\
  \ o(STATUS)='CONF' ∧\n\nto_year(o(STARTS))=2006) ⇒\n\no(TRAINER)=e(EMPNO) )\n\n\
  ∧ /* 该课程在 2006 年有开课 */\n\n(∃o∈dbs(OFFR): o(COURSE)=c(CODE) ∧ o(STATUS)='CONF' ∧\n\
  \nto_year(o(STARTS))=2006)\n\n∧ /* 这些开课中没有任何一次被其他讲师参加 */\n\n¬(∃r∈dbs(REG)⊗\n\n(dbs(EMP)◊◊{(STUD;EMPNO),(JOB;JOB)})⊗dbs(OFFR):\n\
  \nr(COURSE)=c(CODE) ∧ r(STATUS)='CONF' ∧\n```\n\n\n#### 查询示例：EXQ9\n\n`FEa`:\n\n\
  ```\n{ c↓{CODE,DESCR} |\n  c∈dbs(CRS) ∧ /* 该课程的所有班次均由一名讲师负责 */\n  1 = #{ o(TRAINER)\
  \ | o∈dbs(OFFR) ∧ o(COURSE)=c(CODE) ∧\n                   o(STATUS)='CONF' ∧ to_year(o(STARTS))=2006\
  \ }\n  ∧ /* 没有其他讲师参加这些班次 */\n  (∀r∈dbs(REG)⊗\n     (dbs(EMP)◊◊{(STUD;EMPNO),(JOB;JOB)})⊗dbs(OFFR):\n\
  \       (r(COURSE)=c(CODE) ∧ r(STATUS)='CONF' ∧\n        to_year(r(STARTS))=2006)\
  \ ⇒ r(JOB)≠'TRAINER')\n}\n```\n\n`FEb`:\n\n```\n{ c↓{CODE,DESCR} |\n  c∈dbs(CRS)\
  \ ∧ /* 该课程的所有班次均由一名讲师负责 */\n  1 = #{ o(TRAINER) | o∈dbs(OFFR) ∧ o(COURSE)=c(CODE)\
  \ ∧\n                   o(STATUS)='CONF' ∧ to_year(o(STARTS))=2006 }\n  ∧ /* 没有其他讲师参加这些班次\
  \ */\n  (∀r∈dbs(REG)⊗\n     (dbs(EMP)◊◊{(STUD;EMPNO),(JOB;JOB)})⊗dbs(OFFR):\n  \
  \     (r(COURSE)=c(CODE) ∧ r(STATUS)='CONF' ∧\n        to_year(r(STARTS))=2006)\
  \ ⇒ r(JOB)≠'TRAINER')\n}\n```\n\n`SEI`:\n\n```sql\nselect c.CODE\n       ,c.DESCR\n\
  from   CRS c\nwhere  exists(select e.*\n              from   EMP e\n           \
  \   where  not exists(select o2.*\n                                from   OFFR o2\n\
  \                                where  o2.COURSE = c.CODE\n                   \
  \             and    o2.STATUS = 'CONF'\n                                and   \
  \ to_char(o2.STARTS,'YYYY') = '2006'\n                                and    o2.TRAINER\
  \ <> e.EMPNO))\nand    exists(select o1.*\n              from   OFFR o1\n      \
  \        where  o1.COURSE = c.CODE\n              and    o1.STATUS = 'CONF'\n  \
  \            and    to_char(o1.STARTS,'YYYY') = '2006')\nand    not exists(select\
  \ r.*\n                  from   REG r\n                        ,EMP e\n        \
  \                ,OFFR o3\n                  where  r.STUD = e.EMPNO\n         \
  \         and    r.COURSE = o3.COURSE\n                  and    r.STARTS = o3.STARTS\n\
  \                  and    r.COURSE = c.CODE\n                  and    o3.STATUS\
  \ = 'CONF'\n                  and    to_char(o3.STARTS,'YYYY') = '2006'\n      \
  \            and    e.JOB = 'TRAINER')\n```\n\n`SEII`:\n\n```sql\nselect c.CODE,\
  \ c.DESCR\nfrom   COURSE c\nwhere  1 = (select count(distinct o1.TRAINER)\n    \
  \        from   OFFR o1\n            where  o1.COURSE = c.CODE\n            and\
  \    o1.STATUS = 'CONF'\n            and    to_char(o1.STARTS,'YYYY') = 2006)\n\
  and    not exists(select r.*\n                  from   REG r\n                 \
  \       ,EMP e\n                        ,OFFR o2\n                  where  r.STUD\
  \ = e.EMPNO\n                  and    r.COURSE = o2.COURSE\n                  and\
  \    r.STARTS = o2.STARTS\n                  and    r.COURSE = c.CODE\n        \
  \          and    o2.STATUS = 'CONF'\n                  and    to_char(o2.STARTS,'YYYY')\
  \ = '2006'\n                  and    e.JOB = 'TRAINER')\n```\n\n注意`FEa`规范内部额外的合取项（带有注释`/*\
  \ 课程于 2006 年开设 */`），用于确保第一个合取项内的全称量化不涉及空集。\n\n`FEb`通过声明在 2006 年为该课程授课的所有不同讲师的基数至少为一来处理此问题。通过声明此基数应恰好为一，您指定了该课程由不超过一名讲师讲授。\n\
  \n您可以将这两个形式化规范翻译成 SQL；`FEa`需要重写全称量词。\n\n#### 查询示例：EXQ11\n\n**清单 9-11.** `查询 EXQ11(dbs)`\n\
  \n`FEa`:\n\n```\n{ d | d∈dbs(DEPT) ∧\n  (∃e1∈dbs(EMP): e1(DEPTNO)=d(DEPTNO) ∧\n\
  \   e1(JOB)∈{'PRESIDENT','MANAGER'}) ∧\n  ¬(∃e2∈E: e2(DEPTNO)=d ∧ e2(JOB) = 'ADMIN'\
  \ ) }\n```\n\n`FEb`:\n\n```\n{ d | d∈dbs(DEPT) ∧\n  (∃e1∈dbs(EMP): e1(DEPTNO)=d(DEPTNO)\
  \ ∧\n   e1(JOB)∈{'PRESIDENT','MANAGER'}) ∧\n  (∀e2∈dbs(EMP): e2(JOB)='ADMIN' ⇒ e2(DEPTNO)≠d(DEPTNO))\
  \ }\n```\n\n`SEI`:\n\n```sql\nselect d.*\nfrom   DEPT d\nwhere  exists(select e1.*\n\
  \              from   EMP e1\n              where  e1.DEPTNO = d.DEPTNO\n      \
  \        and    e1.JOB in ('PRESIDENT','MANAGER'))\nand    not exists(select e2.*\n\
  \                  from   EMP e2\n                  where  e2.DEPTNO = d.DEPTNO\n\
  \                  and    e1.JOB = 'ADMIN')\n```\n\n清单 7-26 介绍了此表约束的形式化规范。使用此规范，您可以推导出查询\
  \ `EXQ11` 的形式化表达式。因为您想查找违反此约束的部门，所以您只需要否定约束规范；只需在规范前加上 `¬`。\n\n如下所示（请注意，在此规范中，自由变量\
  \ `E` 代表一个员工表）：\n\n```\n¬(∀d∈{ e1(DEPTNO) | e1∈E }:\n    (∃e2∈E: e2(DEPTNO)=d ∧\
  \ e2(JOB)∈{'PRESIDENT','MANAGER'} )\n    ⇒\n    (∃e3∈E: e3(DEPTNO)=d ∧ e3(JOB)='ADMIN'\
  \ ) )\n```\n\n如果您然后通过将否定引入量化来重写此规范，您最终会得到以下规范（请自行验证）：\n\n```\n(∃d∈{ e1(DEPTNO) |\
  \ e1∈E }:\n    (∃e2∈E: e2(DEPTNO)=d ∧ e2(JOB)∈{'PRESIDENT','MANAGER'} ) ∧\n    ¬(∃e3∈E:\
  \ e3(DEPTNO)=d ∧ e3(JOB)='ADMIN' ) )\n```\n\n形式化表达式 `FEa` 现在可以直接从前面重写的约束规范中得出。`FEb`\
  \ 是 `FEa` 的重写；用全称量词替换了否定的存在量词。\n\n您可以从规范 `FEa` 轻松推导出 SQL 文本 (`SEI`)。\n\n#### 关于否定的说明\n\
  \n您可能已经注意到，由于 SQL 缺乏全称量化和蕴含，某些 SQL 表达式最终比其形式化对应物包含更多的否定。`EXQ9` 的 `SEII` 就是一个很好的例子；它包含一个嵌套的否定存在量词。\n\
  \n理解此类查询的含义很困难。采用全称量词的形式化对应物更容易理解。\n\n通常，我们（人类）难以理解包含否定的表达式；否定越多，对我们来说就越难理解。当您在形式化规范中遇到否定时，您应该研究将此类规范重写为包含更少否定的表达式的机会。您可以使用本书第\
  \ 1 部分介绍的重写规则来实现这一点。\n\n> **注意** 通过重写形式化规范以使其包含更少的否定，您不仅帮助了自己，还使您的客户（用户）能够获得更清晰的非形式化规范。\n\
  \n因为它们非常重要，我们在此再次列出涉及否定的重写规则。表 9-1 包含了德摩根定律、蕴含和量词重写规则的各种替代形式。\n\n**表 9-1.** `包含否定的重写规则`\n\
  \n**表达式** | **等价于**\n---|---\n`¬¬A` | ⇔ `A`\n`¬A ⇒ ¬B` | ⇔ `B ⇒ A`\n`¬A ⇒ B` | ⇔\
  \ `¬B ⇒ A`\n`A ⇒ ¬B` | ⇔ `B ⇒ ¬A`\n`A ⇒ ¬B` | ⇔ `(A ∧ B) ⇒ FALSE`\n`¬A ∧ ¬B` | ⇔\
  \ `¬( A ∨ B )`\n`A ∧ ¬B` | ⇔ `¬( ¬A ∨ B )`\n`¬A ∧ B` | ⇔ `¬( A ∨ ¬B )`\n`¬A ∨ ¬B`\
  \ | ⇔ `¬( A ∧ B )`\n`A ∨ ¬B` | ⇔ `¬( ¬A ∧ B )`\n`¬A ∨ B` | ⇔ `¬( A ∧ ¬B )`\n`¬(∃x∈X:\
  \ ¬P(x))` | ⇔ `(∀x∈X: P(x))`\n`(∃x∈X: ¬P(x))` | ⇔ `¬(∀x∈X: P(x))`\n`¬(∃x∈X: P(x))`\
  \ | ⇔ `(∀x∈X: ¬P(x))`\n`(∃x∈X: P(x))` | ⇔ `¬(∀x∈X: ¬P(x))`\n\n有时，您可以利用有关数据库设计约束的知识来消除否定。例如，如果您需要查询所有未取消的课程，您可以等效地查询所有已安排或已确认的课程。如果\
  \ `o` 代表一个课程元组，则以下重写规则将适用：\n\n```\no(STATUS) ≠ 'CANC' ⇔ o(STATUS)∈{'SCHD','CONF'}\n\
  ```\n\n这里您使用了关于属性 `STATUS` 的属性值集的知识。\n\n如果——在重写表达式的过程中——您最终需要查询薪资不低于 5000 的员工，那么查询薪资等于或大于\
  \ 5000 的员工可能更好。以下重写规则适用（`e` 代表一个员工元组）：\n\n```\n¬(e(MSAL) < 5000) ⇔ e(MSAL) ≥ 5000\n\
  ```\n\n我们的大脑不喜欢否定。尝试通过将表达式重写为包含更少否定的表达式来避免否定。这不仅适用于查询规范，也适用于约束规范（前几章）和数据操作规范（下一章）。\n\
  \n\n#### 章节总结\n\n本节以项目符号列表的形式提供了本章的总结。你可以在继续下一节的练习之前，使用它来检查自己对本章介绍的各种概念的理解。\n\n\
  • 查询构成了数据库的一项关键应用；它们使你能够从数据库中提取对你相关的信息。\n\n• 你可以将查询形式化地表示为一个定义在数据库全域上的函数。对于你提供的每一个数据库状态作为参数，该函数都会返回查询结果。\n\
  \n• 因为你提供了数据库状态，该函数可以引用该数据库状态中所有可用的表来确定查询结果。\n\n• 要指定一个查询，你可以使用本书第一部分介绍的所有形式化概念。\n\
  \n你通常使用混合方法将查询的结果集指定为一个元组集合（一张表）。你开始进行这种指定的给定集合通常是一个表，或者是数据库状态中某些可用表的连接；你也可以使用本书中介绍的任何集合运算符。查询规范内部的谓词通常是复合谓词（它们使用各种逻辑连接词），并且经常使用全称量词和存在量词。\n\
  \n• 在实践中（当然，当你使用 `SQL` 时），查询的结果总是一张表。\n然而，我们的形式化模型并不强制要求这一点。\n\n• 当你使用 `SQL` 作为查询语言时，你应该意识到其各种限制。\n\
  以下是最值得注意的几点：\n\n• `SQL` 并非面向集合的；你有时必须使用 `distinct` 关键字。\n\n• `SQL` 缺少蕴涵运算符；你必须将其重写为析取式。\n\
  \n• 甲骨文版本的 `SQL` 缺少全称量化；你必须将其重写为存在量化。\n\n• `SQL` 缺少子集运算符；你必须使用其他可用的集合运算符（`union`、`intersect`\
  \ 和 `minus`）来重写。\n\n##### 练习\n\n为这些查询开发形式化表达式和 `SQL` 表达式。\n\n**注意**：在以下练习中，可能存在无法用给定数据库回答的查询。\n\
  在这些情况下，你应该给出无法给出答案的理由。\n\n### 1. 给出属于 10 号部门的员工的编号和姓名。\n\n### 2. 给出不属于 10、11、12\
  \ 或 15 号部门的员工的编号和姓名。\n\n### 3. 给出同时属于 10 号和 11 号部门的员工的编号和姓名。\n\n### 4. 给出属于 10 号部门的子部门的员工的编号和姓名。\n\
  \n### 5. 确保最多只有一位总裁的约束未被违反。\n\n### 6. 给出年龄超过 35 岁且月薪超过 2000 的行政人员的编号和姓名。\n\n###\
  \ 7. 给出赚取其工资等级最高薪资的经理的编号和姓名。\n\n### 8. 给出在 2004 年至少一门课程中实际担任过培训师的培训师的编号和姓名。\n\n\
  ### 9. 给出在 2004 年未在任何课程中担任过培训师的培训师的编号和姓名。\n\n### 10. 给出每位经理的编号、姓名及其薪资，但仅限于该经理的薪资低于其任何下属员工的情况。\n\
  \n### 11. 查找一个查询，如果 `COURSE` 在 `OFFR` 中能唯一标识则答案为“是”，否则为“否”。答案“是”是否意味着 `COURSE` 是\
  \ `OFFR` 的一个键？\n\n### 12. 给出每位经理的编号、姓名，以及其每一位下属员工的薪资。\n\n### 13. 对于每位经理的经理是另一位员工（超级经理）的员工，给出该员工及其超级经理的编号和姓名。\n\
  \n### 14. 给出每位经理及其每一位身为经理的直属下属的编号、姓名和雇佣日期。\n\n### 15. 给出每位经理及其每一位身为经理的下属的编号、姓名以及他们获得经理职位的日期。\n\
  \n### 16. 给出在 2006 年离职并在同一年返回的员工的编号和姓名。\n\n### 17. 给出在 2006 年离职且未返回的员工的编号和姓名。\n\n\
  ### 18. 给出 2006 年离开 10 号部门的人数以及进入该部门的人数。\n\n### 19. 给出 2006 年底时 10 号部门的人数。\n\n###\
  \ 20. 列出 2006 年 3 月 4 日开始的“数据库设计”课程的以下信息：每位注册学生的用户名、姓名、职位和评价。\n\n### 21. 对于代码（`CODE`）为\
  \ `DB1`、`DB2`、`DB3` 的每门课程，给出其时长，以及 2006 年每一次开课（带有开始日期）的开始日期、状态和注册学生人数。\n\n### 22.\
  \ 按部门（`DEPTNO` 和 `DNAME`）分别给出行政人员、培训师、销售代表和经理的人数。\n\n### 23. 给出所有满足以下条件的工资等级数据：该等级下的每位员工（即被分配到此等级的员工）的薪资都高于该工资等级上限减去\
  \ 500 美元。\n\n### 24. 给出所有被分配到高于其上司工资等级的（被管理）员工。\n\n### 25. 给出满足以下条件的课程：2006 年每一次被取消的开课都至少有一名学生注册了该次开课。\n\
  \n### 26. 给出在 2006 年参加了所有设计类课程（课程类别等于 'DSG'）的（至少一次）开课的员工（`EMPNO` 和 `ENAME`）。\n\n\
  ### 27. 列出在 2006 年获得超过 20% 加薪的所有员工。\n\n## 数据操作\n\n通过执行事务，你可以操作数据库中的数据。在本章中，我们将演示如何以形式化的方式指定事务。我们不会形式化地引入任何新概念；我们已经介绍了指定事务所需的所有要素。\n\
  \n“形式化指定事务”一节逐步阐述了如何指定事务。你将了解到，可以将事务指定为当前数据库全域上的一个函数。对于每一个数据库状态，该函数返回另一个反映了该事务预期更改的数据库状态。在本节中，我们还将给出两个示例，以帮助你熟悉事务的这种形式化概念。\n\
  \n“在 `DB_UEX` 上的事务示例”一节为第 7 章引入的数据库全域提供了示例事务。这是你第二次在本书中看到 `SQL` 的使用。每个示例事务都将附带一个或多个等效的\
  \ `SQL` 数据操作语言（DML）语句；即 `INSERT`、`UPDATE` 和 `DELETE` 语句。你将了解到，用 `SQL` 表达某些事务需要执行多个\
  \ DML 语句。\n\n**注意**：我们假设你具备 `SQL` DML 语句的实用知识。本书的目标不是教授 `SQL`。\n\n为下一章（第 11 章）做准备，在那一章你将了解到使用\
  \ `SQL` DBMS 实现数据完整性约束所面临的挑战，我们也将（在一定程度上）讨论给定事务可能违反哪些数据完整性约束。由 DBMS 负责为给定的事务验证这些涉及的数据完整性约束。如果由此产生的数据库状态违反了任何涉及的约束，DBMS\
  \ 应拒绝该事务的预期更改。\n\n和往常一样，你将在本章末尾找到“章节总结”，随后是“练习”部分。\n\n\n"
- "# 第十章 数据操作（续）\n\n除了数据检索，事务执行是数据库的第二个最重要的应用。通过执行事务，你可以维护数据库并确保其状态是（变化中的）现实世界的有效表示。在本节中，我们将演示如何形式化地指定事务。\n\
  \n#### 插入操作的形式化规范\n\n让我们从一个简单的例子开始，使用第七章引入的数据库设计。看一下元组 `tcrs1`。它表示一个需要插入数据库的新课程：\n\
  \n```\ntcrs1 := { (CODE;'AM4DP')\n         , (DESC;'Applied Mathematics for Database\
  \ Professionals')\n         , (CAT;'DSG')\n         , (DUR;5) }\n```\n\n为方便起见，我们在代码清单\
  \ 10-1 中重复了特征定义 `chr_CRS`、元组宇宙 `tup_CRS` 和表宇宙 `tab_CRS` 的定义。所有关于 `CRS` 表结构的属性、元组和表约束都在此清单中。\n\
  \n**代码清单 10-1.** `chr_CRS`、`tup_CRS` 和 `tab_CRS` 的定义\n\n```\nchr_CRS :=\n  { ( CODE;\
  \ CRSCODE–TYP )\n  , ( DESCR; varchar(40) )\n  , ( CAT; { s | s∈varchar(3) ∧ s∈{'DSG','GEN','BLD'}\
  \ } )\n  , ( DUR; { n | n∈number(2,0) ∧ 1 ≤ n ≤ 15 } )\n  }\n\ntup_CRS :=\n  { c\
  \ | c∈Π(chr_CRS) ∧ c(CAT) = 'BLD' ⇒ c(DUR) ≤ 5 }\n\ntab_CRS :=\n  { C | C∈℘(tup_CRS)\
  \ ∧ (∀c1,c2∈C: c1(CODE) = c2(CODE) ⇒ c1 = c2) }\n```\n\n`tcrs1` 并未违反 `CRS` 表结构的任何属性或元组约束；或者换句话说，`tcrs1`\
  \ 是元组宇宙 `tup_CRS` 的一个元素。\n\n以下是对将 `tcrs1` 插入 `CRS` 表结构这一事务进行形式化规范的首次尝试。我们可以将这个事务指定为一个函数，例如\
  \ `Tx1a`，定义在 `DB_UEX` 上。对于 `DB_UEX` 中的一个给定数据库状态，例如 `dbs`，函数 `Tx1a` 返回一个反映了将 `tcrs1`\
  \ 插入 `CRS` 表结构后的数据库状态。\n\n```\nTx1a(dbs) := { (EMP; dbs(EMP) )\n             , (SREP;\
  \ dbs(SREP))\n             , (MEMP; dbs(MEMP))\n             , (TERM; dbs(TERM))\n\
  \             , (DEPT; dbs(DEPT))\n             , (GRD; dbs(GRD) )\n           \
  \  , (CRS; dbs(CRS) ∪ {tcrs1} )\n             , (OFFR; dbs(OFFR))\n            \
  \ , (REG; dbs(REG) )\n             , (HIST; dbs(HIST)) }\n```\n\n如你所见，函数 `Tx1a`\
  \ 生成了另一个数据库状态，该状态包含与 `dbs` 相同的十个表结构。这个结果数据库状态仅在 `CRS` 表结构上与 `dbs` 不同；元组 `tcrs1`\
  \ 已被添加。对于所有其他表结构，结果数据库状态持有 `dbs` 所持有的相应表。\n\n让我们将 `Tx1a` 应用于“空数据库状态”（即所有表结构都持有空表的数据库状态）。以下是这个空数据库状态，我们将它命名为\
  \ `db_empty`。我们在第七章的练习 12 中向你介绍了这个数据库状态。\n\n```\ndb_empty := { (EMP; ∅)\n      \
  \      , (SREP; ∅)\n            , (MEMP; ∅)\n            , (TERM; ∅)\n         \
  \   , (DEPT; ∅)\n            , (GRD; ∅)\n            , (CRS; ∅)\n            , (OFFR;\
  \ ∅)\n            , (REG; ∅)\n            , (HIST; ∅) }\n```\n\n在第七章的练习 12 中，你已确定\
  \ `db_empty` 是 `DB_UEX` 的一个元素。因此，你可以将函数 `Tx1a` 应用于它。将函数 `Tx1a` 应用于 `db_empty`，记为\
  \ `Tx1a(db_empty)`，得到以下数据库状态：\n\n```\nTx1a(db_empty) = { (EMP; ∅)\n            \
  \     , (SREP; ∅)\n                 , (MEMP; ∅)\n                 , (TERM; ∅)\n\
  \                 , (DEPT; ∅)\n                 , (GRD; ∅)\n                 , (CRS;\
  \ {tcrs1} )\n                 , (OFFR; ∅)\n                 , (REG; ∅)\n       \
  \          , (HIST; ∅) }\n```\n\n注意，将 `Tx1a` 应用于 `db_empty` 的结果是一个（再次）属于 `DB_UEX`\
  \ 的数据库状态；结果数据库状态符合作为 `DB_UEX` 定义一部分的所有静态约束。然而，这通常并不成立。让我们看看将 `Tx1a` 应用于以下数据库状态 (`dbs1`)\
  \ 的情况：\n\n```\ndbs1 :=\n  { (EMP; ∅)\n  , (SREP; ∅)\n  , (MEMP; ∅)\n  , (TERM; ∅)\n\
  \  , (DEPT; ∅)\n  , (GRD; ∅)\n  , (CRS; { { (CODE;'AM4DP'), (DESC;'AM4DP workshop')\n\
  \           , (CAT;'DSG'), (DUR;1) } } )\n  , (OFFR; ∅)\n  , (REG; ∅)\n  , (HIST;\
  \ ∅) }\n```\n\n将事务 `Tx1a` 应用于数据库状态 `dbs1` 会得到一个持有如下 `CRS` 表的数据库状态：\n\n\n#### 事务定义与约束讨论\n\
  \n##### 问题分析\n\n以下数据表示存在约束违反：\n\n```\n{ { (CODE;'AM4DP'), (DESC;'AM4DP workshop'),\
  \ (CAT;'DSG'), (DUR;1) }, { (CODE;'AM4DP'), (DESC;'Applied Mathematics for Database\
  \ Professionals'), (CAT;'DSG'), (DUR;5) } }\n```\n\n此表明确违反了作为 `tab_CRS` 定义一部分指定的表约束，因此不是\
  \ CRS 表结构的可接受表。因此，在此情况下，`Tx1a(dbs1)` 不是 `DB_UEX` 的元素。显然，当前对此事务的定义是有缺陷的，因为我们不希望事务导致数据库最终处于违反任何数据完整性约束的状态。\n\
  \n##### 改进的事务定义\n\n将 `tcrs1` 插入数据库的更合适的事务定义如下，命名为 `Tx1b`。请注意，在此定义中我们重用了函数 `Tx1a`，该函数在本节前面已指定。\n\
  \n`Tx1b(dbs) := dbs , if Tx1a(dbs) ∉ DB_UEX`\n`:= Tx1a(dbs), otherwise`\n\n事务 `Tx1b`\
  \ 描述了一次插入 *尝试*。如果 `tcrs1` 的插入导致数据库状态违反任何数据完整性约束（即，结果数据库状态不是 `DB_UEX` 的元素），则该插入被拒绝（也称为\
  \ *回滚*），数据库状态保持不变。否则，`tcrs1` 的插入被允许（事务 *成功执行* 或 *提交*）。\n\n在此特定示例中，给定数据库状态 `dbs`，仅当\
  \ `dbs` 中的 CRS 表不包含 `code` 属性值等于 `'AM4DP'` 的元组时，插入尝试才会成功执行。但是，如果该元组恰好是 `tcrs1`，则插入尝试成功，但在此情况下根本不会添加元组。通过集合并集将元组添加到已包含该元组的表中，不会向表中引入新元素（元组）。\n\
  \n##### 约束的考量\n\n至此，我们仅关注属性、元组和表约束。\n\n在检查 `Tx1a(dbs)` 是否是 `DB_UEX` 的元素时，您还应考虑涉及\
  \ CRS 表结构的数据库约束。\n\n**■ 注意**\n您可以通过在形式化数据库约束规范中简单扫描字符串 `'CRS'` 来确定在插入元组到 CRS 的事务中所涉及的数据库约束。\n\
  \n以下是涉及的数据库约束（使用清单 7-39 中引入的简称）：`PSSR6`、`PTIJ9`、`PTIJ10`、`PTIJ12`、`PTIJ14`、`PTIJ15`\
  \ 和 `PODC3`。在此特定示例中，将新的 CRS 元组插入到有效的数据库状态（即 `DB_UEX` 中的数据库状态）永远不会违反这些数据库约束之一（您可能需要自行验证这一点）。\n\
  \n因此，在此示例的讨论中，我们无需考虑这些涉及的数据库约束。\n\n**■ 注意**\n`Tx1b` 的定义涵盖了所有静态约束：属性、元组、表和数据库。\n\n\
  ##### 状态转换约束\n\n最后——这应该不足为奇——*状态转换* 约束应包含在事务的形式化定义中。\n\n看看元组 `toffr1`。它代表一个需要插入数据库的\
  \ `AM4DP` 课程的授课安排。\n\n```\ntoffr1 := { (COURSE; 'AM4DP'), (STARTS; '01-FEB-2007'),\
  \ (STATUS; 'CONF'), (MAXCAP; 20), (TRAINER; 1126), (LOC; 'UTRECHT') }\n```\n\n此元组符合为\
  \ `OFFR` 表结构指定的所有属性和元组约束（参见第 7 章中 `chr_OFFR` 和 `tup_OFFR` 的定义）。\n\n假设您希望尝试将 `offr1`\
  \ 元组插入到其开始状态当前符合 `DB_UEX` 定义中所有静态约束的数据库中。我们进一步假设此事务的开始数据库状态符合以下附加特征。括号内列出了导致我们列出该特征的涉及约束。\n\
  \n*   `CRS` 包含一个代表 `AM4DP` 课程的元组 (`PSSR6`)。\n*   `OFFR` 中尚无任何授课安排；这是要插入的第一个 (`tab_OFFR`\
  \ 约束 `PTIJ13`、`PTIJ14`、`PTIJ15`)。\n\n"
- "# 第 10 章 ■ 数据操作\n\n7451CH10.qxd 5/7/07 11:36 AM Page 226\n\n**226**\n\n*   `EMP`\
  \ 表包含一个元组，代表一位员工编号为 1126 的培训师，该培训师的入职日期早于 200*6* 年 2 月 1 日。这位培训师仍在职；即，尚未被终止雇佣关系（`PSSR8`,\
  \ `PTIJ11`, `PTIJ12`, `PODC7`）。\n*   `DEPT` 表包含一个元组，代表一个位于乌得勒支（Utrecht）的部门。上述培训师就在该部门工作（`PSSR7`,\
  \ `PODC3`）。\n\n另外三个静态约束涉及 `OFFR` 表：`PTIJ10`、`PODC4` 和 `PODC5`。然而，插入新 `CRS` 元组的事务无法违反这三个约束。它们也都涉及\
  \ `REG` 表结构。前述要点列表中的第二个特征，加上初始状态必须是有效状态（即包含在 `DB_UEX` 中）这一事实，意味着 `REG` 表中不存在任何元组。这又意味着数据库状态符合（并且在插入\
  \ `offr1` 后保持符合）`PTIJ10`、`PODC4` 和 `PODC5`。\n\n鉴于以上特征，插入元组 `toffr1` 的事务将会成功执行。但请注意，`toffr1`\
  \ 代表一个*已确认*的课程开设。我们的状态转换宇宙（第 8 章的 `ST_UEX`）的定义包含了一项状态转换约束的规范，该约束规定新课程开设必须以*已安排*状态开始（约束\
  \ `STC2`，见清单 8-8）。显然，这个事务违反了约束 `STC2`。\n\n尝试插入 `offr1` 的事务的正确定义，例如 `Tx2`，应如下所示。\n\
  \n对于 `DB_UEX` 中的某个数据库状态 `dbs`，令\n\n```\nTx2a(dbs) := { (EMP; dbs(EMP) )\n      \
  \       , (SREP; dbs(SREP))\n             , (MEMP; dbs(MEMP))\n             , (TERM;\
  \ dbs(TERM))\n             , (DEPT; dbs(DEPT))\n             , (GRD; dbs(GRD) )\n\
  \             , (CRS; dbs(CRS) )\n             , (OFFR; dbs(OFFR) ∪ {toffr1} )\n\
  \             , (REG; dbs(REG) )\n             , (HIST; dbs(HIST)) }\n```\n\n并令\n\
  \n```\nTx2b(dbs) := dbs , if Tx2a(dbs)∉DB_UEX\n           := Tx2a(dbs), otherwise\n\
  ```\n\n那么，\n\n```\nTx2(dbs) := Tx2b(dbs), if (dbs,Tx2b(dbs))∈ST_UEX\n          :=\
  \ dbs      , otherwise\n```\n\n`Tx2a` 的定义描述了插入 `toffr1` 的操作。`Tx2b` 确保该操作符合所有静态约束。`Tx2`\
  \ 的定义确保该事务也符合所有状态转换约束。它通过添加一个条件来实现这一点：由事务的开始状态和结束状态组成的有序对必须是状态转换宇宙的一个元素。\n\n通常，一个事务只修改数据库设计中涉及的少数表结构；许多表结构保持不变。指定\
  \ `Tx2a` 的另一种（且稍微简短一些）方式如下所示，它更明确地展示了这一事实：\n\n```\nTx2a(dbs) := dbs↓{EMP,SREP,MEMP,TERM,DEPT,GRD,CRS,REG,HIST}\n\
  ∪\n{ (OFFR; dbs(OFFR) ∪ {toffr1}) }\n```\n\n这里我们使用函数限制（`↓`）将所有未更改的表结构添加到结束状态，并通过并集（`∪`）添加事务修改的表结构。\n\
  \n下一节将提供一些在 `DB_UEX` 上执行的更多事务示例，以使您进一步熟悉如何形式化地指定事务。\n\n#### DB_UEX 上的示例事务\n\n7451CH10.qxd\
