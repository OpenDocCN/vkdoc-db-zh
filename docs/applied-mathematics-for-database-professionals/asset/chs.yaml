  PODC7(OFFR,REG,EMP) :=


  ```

  /* 只有满足以下条件，才允许你教授某门课程： */

  /* 1. 你已受雇至少满一年，或 */

  /* 2. 你曾参加过该课程，且该课程班次的培训师 */

  /* 以学员身份参加了你的首次授课 */

  ( ∀o1∈OFFR:

  /* 如果这是该培训师首次教授此课程 ... */

  ( ¬∃o2∈OFFR:

  o1↓{COURSE,TRAINER} = o2↓{COURSE,TRAINER} ∧

  o2(STARTS) < o1(STARTS)

  ) ⇒

  ( /* 那么教室内应有一位学员 ... */

  ( ∃r1∈REG:

  r1↓{COURSE,STARTS} = o1↓{COURSE,STARTS} ∧

  /* 他/她曾在更早的日期教授过此课程 ... */

  ( ∃o3∈OFFR:

  o3(TRAINER) = r1(STUD) ∧

  o3(COURSE) = o1(COURSE) ∧

  o3(STARTS) < o1(STARTS) ∧

  /* 且 *该* 课程由当前培训师参加过 */

  ( ∃r2∈REG:

  o3↓{COURSE,STARTS} = r2↓{COURSE,STARTS} ∧

  r2(STUD) = o1(TRAINER)

  ) ) ) ) ∨

  /* 或者，该培训师已受雇至少满一年 */

  ( ↵{ e(HIRED) | e∈EMP ∧ e(EMPNO) = o1(TRAINER) } <

  o1(STARTS) - 365 ) ) )

  ```


  谓词 PODC1 声明两个集合的交集应为空集。第一个集合包含所有已离职员工的员工编号。第二个集合包含所有管理在职（即未离职）员工的员工编号。通过指定这两个集合的交集为空，你表达了“在职员工不能由已离职员工管理”这一非正式需求。


  同样，谓词 PODC2 表达了“部门由在职员工管理”这一非正式需求。


  谓词 PODC3 对所有担任未取消班次的培训师的员工编号进行全称量化。对于每个这样的员工编号，它构建一个集合，包含（未取消的）OFFR 元组与其关联的 CRS
  元组的连接，其中班次的培训师等于给定的员工（编号），并且班次的地点等于该员工工作部门的地点。然后，它对这个集合中所有元组的 DUR 属性值求和。以同样的方式，计算出该培训师教授的、地点与其部门地点不同的班次的（合计）持续时间。对于每位给定的培训师，前一个总和不能小于后一个总和。


  当然，这不是你与用户沟通的方式。你需要坚持使用他们提供的英文句子（见代码中的嵌入注释），并核实他们在该句子中使用的术语含义。“taught by a trainer”中的动词“taught”明确意味着班次的状态必须是“已安排”或“已确认”；已取消的班次不予考虑。计算班次数量似乎涉及班次的持续时间。最后，如果一个班次的地点与其培训师所属部门的地点相同，则认为它是在“所属基地”进行的。


  > **注意：** 约束 PODC3 要求 OFFR 表结构的 LOC 属性可以（有意义地）与 DEPT 表结构的 LOC 属性进行比较。约束 PSSR7 正是为了确保这一要求而引入的。


  谓词 PODC4 声明，已有六名或以上学生注册的班次状态必须为“已确认”。它通过检查与给定班次关联的所有注册记录的集合的基数来实现这一点。如果该基数大于或等于六，则给定班次的状态必须为“已确认”。


  谓词 PODC5 的结构与 PODC6 类似。它对所有班次进行全称量化，并要求给定班次的关联注册人数不得超过该班次的最大容量。


  > **注意：** 谓词 PODC4 和 PODC5 的组合意味着，允许一个班次的最大容量小于六是毫无意义的；这样的班次永远无法达到“已确认”状态。这正是属性
  MAXCAP 的属性值集从数值六开始的原因（见代码清单 7-9）。


  谓词 PODC6 声明，已取消的班次不能存在注册记录。因此，每当一个班次被取消时，所有相关的注册记录都应被移除。


  谓词 PODC7 构成了我们示例数据库宇宙的*点睛之笔*。它要求培训师教授的每门课程的首次班次满足特定条件。如果给定班次的培训师受雇未满一年，那么该培训师必须参加过同一课程的先前班次，并且该先前班次的培训师必须参加由该给定培训师教授的此类首次班次。


  谓词 PODC7 明确包含额外的注释，以引导你理解其形式化规范。


  当你尝试阅读和理解像 PODC7 这样复杂的谓词时，首先研究其自上而下的结构是很有用的。在本例中，该谓词的结构如下：




  ( ∀o1∈OFFR: P1(o1,OFFR) ⇒ ( P2(o1,OFFR,REG) ∨ P3(o1,EMP) ) )

  谓词 `PODC7` 是对所有课程产品的全称量化，它指出：如果涉及给定课程产品和其他课程产品的某个条件 (`P1`) 为真，那么两个条件 (`P2` 和 `P3`)
  的析取式应成立。条件 `P1` 指出给定课程产品是首次开设的课程产品。条件 `P2` 涉及给定课程产品、其他课程产品和注册信息；它规定了关于先前课程产品的复杂要求，该课程必须由给定课程产品的培训师讲授过。条件
  `P3` 涉及给定课程产品和员工；它指出给定课程产品的培训师至少已被雇佣一年。


  **注意**

  约束 `PODC7` 意味着，每门课程首次开设时，必须由至少已被雇佣一年的培训师来讲授。显然，开发教材并达到讲授课程所需的技能水平至少需要一年时间。


  至此，我们完成了如何形式化规范关系数据库设计的演示。


