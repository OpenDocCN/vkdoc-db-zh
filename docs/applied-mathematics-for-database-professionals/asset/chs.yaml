  \          { EMPNO /* 员工编号 */\n          , LEFT /* 离职日期 */\n          , COMMENTS\
  \ } ) /* 离职备注 */\n       , (DEPT; -- 部门 (Departments)\n          { DEPTNO /* 部门编号\
  \ */\n          , DNAME /* 部门名称 */\n          , LOC /* 地点 */\n          , MGR }\
  \ ) /* 经理：员工编号 */\n       , (GRD; -- 工资等级 (Salary Grades)\n          { GRADE /*\
