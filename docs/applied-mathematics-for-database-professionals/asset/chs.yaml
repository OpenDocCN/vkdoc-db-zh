- "# 第 5 章 ■ 表与数据库状态\n\n95\n\n定义 5-1 以形式化方式描述了`表`的概念。它使用了“给定集合上的函数”的概念（参见定义 4-2）。\n\
  \n## ■定义 5-1：表\n如果`T`和`H`是集合，那么`“T 是 H 上的一个表” ⇔ ( ∀t∈T: t 是 H 上的一个函数 )`。\n\n这个定义是通用的，因为它对集合`H`的元素没有施加任何限制。然而，在实践中，我们只对`H`是代表属性的名称集合的情况感兴趣。\n\
  \n表`T1`可被视为一个*零件表*。它是在`{partno, name, instock, price}`上的一个表，包含六个元组，每个元组代表一个不同零件的信息。它为每个这样的零件保存零件号、名称、库存数量和价格。\n\
  \n以下是更多例子：\n\n`T2 := { { (X;2), (Y;1) }, { (Y;8), (X;0) }, { (Y;10), (X;5) } }`\n\
  \n`T3 := { { (partno;3), (name;'hammer') }, { (pno;4), (pname;'nail') } }`\n\n`T4\
  \ := { { (empno;105), (ename;'Mrs. Sparks'), (born;'03-apr-1970') },{ (empno;202),\
  \ (ename;'Mr. Tedesco') } }`\n\n`T2`确实是一个表。它包含三个函数，所有这些函数共享定义域`{X,Y}`。它是一个在`{X,Y}`上的表。注意，对（在函数内部）的顺序无关紧要。`T3`不是一个表。它是一个函数集合；然而，第一个函数的定义域是`{partno,\
  \ name}`，这与第二个函数的定义域`{pno, pname}`不同。同样，`T4`也不是一个表。它是一个函数集合；然而，第一个函数的定义域是`{empno,\
  \ ename, born}`，这与第二个函数的定义域`{empno, ename}`不同。\n\n表的一个元素是一个函数，每个这样的函数被特别称为一个`元组`。在第\
  \ 4 章介绍表征的广义积时（参见“集合函数的广义积”一节），你们已经接触过这个术语。\n\n表征的广义积实际上是一个表；它包含函数，所有这些函数共享相同的定义域。\n\
  \n表是一个集合，该集合的元素是元组。根据集合的定义，这意味着每个元组在该集合内都是唯一的；同一个表中不能出现重复的元组。\n\n如果`T`是`H`上的一个表，那么`T`的任何真子集（包含的元组少于`T`）当然也是`H`上的一个表。\n\
  \n即使是空集`(∅)`也是一个表。事实上，根据定义 5-1（它量化表中的元素），空集是*任何集合上的表*。关于这一点，你可能需要回顾表 3-2 中的重写规则。\n\
  \n## ■注意\n空集通常用作给定表结构的初始状态。\n\n7451CH05.qxd 5/4/07 3:57 PM Page 96\n\n96\n\n第 5\
  \ 章 ■ 表与数据库状态\n\n##### 简写记法\n使用清单 5-1 中介绍的形式化枚举方法来写出一个表是相当繁琐的。对于作为表元素的每个元组，你基本上都在重复（共享的）定义域作为有序对的第一坐标。为了避免这种重复，通常的做法是绘制一个表的图示。在此图示中，你只需列出一次元组属性的名称（作为列标题），然后在这些列标题下，为每个元组列出其属性值（每行一个）。图\
  \ 5-1 展示了`表`的这种简写记法。它展示的是清单 5-1 中引入的表`T1`。\n\n\n\n##### 表的构造\n\n#### **图 5-1.**\
  \ 表 `T1` 的简写记法\n\n如你所见，这看起来像通常意义上的表（一个由列和行组成的二维图形）。但请记住，本书中的`表`是一组函数。这有两个重要的含义。首先，这意味着枚举函数的顺序是任意的；顺序无关紧要。其次，枚举有序对的顺序（在元组内）也同样无关紧要。因此，在前面的简写记法中，列标题（从左到右）的顺序和行（从上到下）的顺序并不重要。\n\
  \n##### ■注意\n\n在简写记法中，引入了属性的排序，因为现在每个元组中属性值的顺序必须对应于列标题的顺序。\n\n这种简写记法展示了一些处理表时常用的其他术语。如你所见，表\
  \ `T1` 是一个定义在 `{partno, name, instock, price}` 上的表。`T1` 中元组的这个共享域被称为表 `T1` 的`标题`（参见定义\
  \ 5-2）。\n\n##### ■定义 5-2：表的标题\n\n如果“`T` 是一个定义在 `H` 上的表”，那么 `H` 被称为 `T` 的标题。\n\n\
  在本书的剩余部分，我们将经常使用这种简写记法来说明特定的表。然而，你永远不应忘记，这仅仅是一种简写记法。在本书中，表被正式定义为一组函数，这些函数都拥有相同的定义域。\n\
  \n*这种表的正式定义使你能够以清晰、正式的方式处理表上的操作（本章稍后讨论）和数据完整性谓词（下一章讨论）。*\n\n##### 表的构造\n\n你可以通过将广义积应用于一个给定的集合函数来构造一个表。\n\
  \n让我们用一个例子来演示这一点。代码清单 5-2 展示了一个名为 `F1` 的集合函数。\n\n##### **代码清单 5-2.** 集合函数 `F1`\n\
  \n```\nF1 := { (X; {0,1,2})\n      ,(Y; {0,1,2})\n      ,(Z; {-1,0,1}) }\n```\n\n\
  集合函数 `F1` 的广义积将得到一个包含二十七个函数的集合（三乘三乘三）。代码清单 5-3 展示了这一结果。\n\n##### **代码清单 5-3.** 集合函数\
  \ `F1` 的广义积\n\n```\n∏(F1) :=\n{ { (X;0), (Y;0), (Z;-1) }, { (X;0), (Y;0), (Z;0)\
  \ }, { (X;0), (Y;0), (Z;1) }\n, { (X;0), (Y;1), (Z;-1) }, { (X;0), (Y;1), (Z;0)\
  \ }, { (X;0), (Y;1), (Z;1) }\n, { (X;0), (Y;2), (Z;-1) }, { (X;0), (Y;2), (Z;0)\
  \ }, { (X;0), (Y;2), (Z;1) }\n, { (X;1), (Y;0), (Z;-1) }, { (X;1), (Y;0), (Z;0)\
  \ }, { (X;1), (Y;0), (Z;1) }\n, { (X;1), (Y;1), (Z;-1) }, { (X;1), (Y;1), (Z;0)\
  \ }, { (X;1), (Y;1), (Z;1) }\n, { (X;1), (Y;2), (Z;-1) }, { (X;1), (Y;2), (Z;0)\
  \ }, { (X;1), (Y;2), (Z;1) }\n, { (X;2), (Y;0), (Z;-1) }, { (X;2), (Y;0), (Z;0)\
  \ }, { (X;2), (Y;0), (Z;1) }\n, { (X;2), (Y;1), (Z;-1) }, { (X;2), (Y;1), (Z;0)\
  \ }, { (X;2), (Y;1), (Z;1) }\n, { (X;2), (Y;2), (Z;-1) }, { (X;2), (Y;2), (Z;0)\
  \ }, { (X;2), (Y;2), (Z;1) } }\n```\n\n在这个结果集中，每个函数都有相同的定义域 `{X, Y, Z}`；因此，该结果集是一个定义在\
  \ `{X, Y, Z}` 上的表。现在来看下面这个更实际的例子。代码清单 5-4 展示了一个零件的特征描述。对于一个零件，我们感兴趣的属性是零件号（`partno`）、名称（`name`）、该零件的库存数量（`instock`）以及零件价格（`price`）。\n\
  \n##### **代码清单 5-4.** 零件的特征描述\n\n```\nchr_PART := { (partno; [1..999])\n       \
  \    ,(name; varchar(12))\n           ,(instock; [0..99])\n           ,(price; [1..500])\
  \ }\n```\n\n`chr_PART` 的广义积是一个相当大的表；它包含了使用 `chr_PART` 定义中给出的属性值集可以生成的所有*可能的*元组。请注意，本章开头介绍的表\
  \ `T1` 中的每一个元组都是 `∏(chr_PART)` 的一个元素。这使得 `T1` 成为 `∏(chr_PART)` 的一个子集。\n\n\n\n**注意**\
  \ `∏(chr_PART)` 的每一个子集——不仅仅是`T1`——都是在属性集 `{partno, name, instock, price}` 上的一个表。\n\
  \n事实上，表 `T1` 中的每个元组都是基于 `∏(chr_PART)` 定义的以下集合（名为 `T2`）中的一个元素：\n\n```\nT2 := { t\
  \ | t∈∏(chr_PART) ∧ ( t(price) ≥ 20 ⇒ t(instock) ≤ 10 )\n                    ∧ (\
  \ t(price) ≤ 5 ⇒ t(instock) ≥ 15 )\n         }\n```\n\n在 `T2` 的定义中，引入了两个限定 `T2`\
  \ 内容的谓词。第一个条件指出，如果一个零件的价格大于或等于 20，那么其库存数量应小于或等于 10。第二个条件指出，如果一个零件的价格小于或等于 5，那么其库存数量应大于或等于\
  \ 15。表 `T2`——一个在 `{partno, name, instock, price}` 上的表——将包含且仅包含 `∏(chr_PART)` 中同时满足这两个条件的元组。请注意，由于\
  \ `∏(chr_PART)` 将包含许多违反其中一个或两个条件的元组，因此 `T2` 是 `∏(chr_PART)` 的一个真子集。由于 `T1` 的所有元组都符合这两个条件，因此\
  \ `T1` 是 `T2` 的一个子集。实际上，它是 `T2` 的一个真子集。\n\n在第 7 章，我们将重新审视这种定义 `T2` 的方式；也就是说，取一个特征化（characterization）的广义乘积（generalized\
  \ product）并“插入”额外的谓词。\n\n#### 数据库状态\n\n一个数据库是某个组织事物状态的表示。它由为每个我们想在数据库中记录的关于该组织的命题类型而设的表组成。本节将向你介绍通过*数据库状态*来形式化指定数据库的方法。\n\
  \n##### 数据库状态的形式化表示\n\n让我们考虑一个简单的数据库设计，涉及两个表结构：一个用于员工，一个用于部门。看一下图 5-2 和图 5-3 中展示的表`EMP1`和`DEP1`。\n\
  \n7451CH05.qxd 5/4/07 3:57 PM Page 99\n\nC H A P T E R 5 **■** TA B L E S A N D\
  \ D ATA B A S E S TAT E S\n\n**99**\n\n###### 图 5-2. 示例员工表`EMP1`\n\n###### 图 5-3.\
  \ 示例部门表`DEP1`\n\n假设表`EMP1`和`DEP1`分别表示员工和部门表结构的当前状态。我们可以将由表`EMP1`和`DEP1`组成的*数据库状态*形式化地指定为一个函数。在这个函数中，有序对的第一个坐标代表表结构的*名称*，第二个坐标持有这些表结构的（当前）*值*——即表`EMP1`和`DEP1`。清单\
  \ 5-5 给出了这个示例数据库状态的形式化说明。\n\n###### 清单 5-5. 持有表`EMP1`和`DEP1`的数据库状态`DBS1`\n\n```\n\
  DBS1 :=\n{ (EMPLOYEE;\n    { {(empno;101),(ename;'Chris'), (job;'MANAGER'),(sal;7900),(deptno;10)}\n\
  \     ,{(empno;102),(ename;'Kathy'), (job;'TRAINER'),(sal;6000),(deptno;12)}\n \
  \    ,{(empno;103),(ename;'Thomas'),(job;'CLERK'), (sal;2100),(deptno;10)}\n   \
  \  ,{(empno;104),(ename;'David'), (job;'TRAINER'),(sal;5600),(deptno;10)}\n    \
  \ ,{(empno;105),(ename;'Renu'), (job;'CLERK'), (sal;3000),(deptno;12)}\n     ,{(empno;106),(ename;'Bob'),\
  \ (job;'MANAGER'),(sal;8500),(deptno;10)}\n     ,{(empno;107),(ename;'Sue'), (job;'CLERK'),\
  \ (sal;2700),(deptno;12)} }\n  )\n ,(DEPARTMENT;\n    { {(deptno;10),(dname;'RESEARCH'),(loc;'DENVER'),\
  \ (salbudget;50000)}\n     ,{(deptno;11),(dname;'SALES'), (loc;'DENVER'), (salbudget;20000)}\n\
  \     ,{(deptno;12),(dname;'SUPPORT'), (loc;'LOS ANGELES'), (salbudget;40000)}\n\
  \     ,{(deptno;13),(dname;'SALES'), (loc;'SAN FRANCISCO'),(salbudget;20000)} }\n\
  \  )\n}\n```\n\n**注意** 我们本也可以将`DBS1`列为集合 `{(EMPLOYEE;EMP1), (DEPARTMENT;DEP1)}`。\n\
  \n数据库状态`DBS1`是一个仅包含两个有序对的函数。列出的第一个有序对的第一个坐标是`EMPLOYEE`（我们为员工表结构选择的名称），对应的第二个坐标是表`EMP1`。同样，在第二个有序对中，你会注意到我们选择`DEPARTMENT`作为部门表结构的名称。在这个例子中，第二个坐标是表`DEP1`。\n\
  \n\n\n给定函数 `DBS1` 的这个定义，你现在可以通过——函数应用——来引用诸如 `DBS1(EMPLOYEE)`（表示表 `EMP1`）和 `DBS1(DEPARTMENT)`（表示表\
  \ `DEP1`）这样的表达式。\n\n## `数据库骨架`\n\n要指定一个数据库状态，你不仅需要实际的表（如前面示例中的 `EMP1` 和 `DEP1`），还需要为表结构确定名称（如前面示例中的\
  \ `EMPLOYEE` 和 `DEPARTMENT`）。\n\n你可能不会感到惊讶，数据库设计的正式规范（我们将在第 7 章演示）也包含了对所涉及的每个表设计的特征说明规范。当你为一个表设计指定特征说明时，你就选择了该表设计中涉及的属性名称。\n\
  \n一个 `数据库骨架` 将所有这些名称——表结构的名称和所涉及的属性名称——收集到一个单一的正式结构中。数据库骨架是一个集合函数，它为每个表结构包含一个有序对。第一个坐标引入表结构名称，第二个坐标引入所涉及的属性名称集合。\n\
  \n###### 清单 5-6. 数据库骨架 `SK1`\n\n`SK1 :=`\n`{ (EMPLOYEE; {empno,ename,job,sal,deptno}\
  \ )`\n`,(DEPARTMENT; {deptno,dname,loc,salbudget} ) }`\n\n如你所见，集合函数 `SK1` 为员工/部门数据库设计中涉及的表结构引入了名称\
  \ `EMPLOYEE` 和 `DEPARTMENT`，并将相关属性的名称集合附加到它们之上。\n\n> **注意** 你应该仔细选择数据库骨架引入的名称，因为它们不仅构成了你（数据库专业人员）和你的客户（用户）之间的词汇表，也是理解数据库设计含义（语义）的第一块垫脚石。在接下来的章节中，你将会看到数据完整性约束是理解数据库设计语义的另一块重要垫脚石。\n\
  \n## `表上的操作`\n\n本节涵盖了一些重要的表运算符。当你在指定查询和事务（第 9 章和第 10 章），或某些类型的谓词（第 6、7 和 8 章）时，将会应用这些运算符。\n\
  \n我们首先来看众所周知的集合运算符 `并集`、`交集` 和 `差集`。\n\n接下来，我们将研究表的 `投影` 和 `限制`，然后是数据库领域中的一个重要运算符——`连接`，以及与连接密切相关的\
  \ `属性重命名` 运算符。最后，我们将处理 `扩展` 和 `聚合`。\n\n###### 并集、交集和差集\n\n因为表是集合，你可以将众所周知的集合运算符\
  \ `并集`、`交集` 和 `差集` 应用于以表为操作数的情况。本节将探讨这些集合运算符在表上的应用。\n\n在接下来的小节中，我们将使用三个名为 `E1`、`E2`\
  \ 和 `E3` 的示例表。图 5-4 展示了这些表。\n\n###### 图 5-4. 示例表 `E1`、`E2` 和 `E3`\n\n如你所见，`E1` 和\
  \ `E2` 都是基于 `{EMPNO,ENAME,JOB}` 的表，而 `E3` 是基于 `{E#,NAME,JOB,SAL}` 的表。所有三个表都代表关于员工的信息。对于\
  \ `E3`，一些属性的名称被选得不同，并且 `E3` 持有额外的信息（工资）。员工 `102` 同时出现在表 `E1` 和表 `E2` 中（具有相同的属性值）。员工\
  \ `101` 同时出现在表 `E1` 和表 `E3` 中。\n\n###### 并集\n\n你可能知道，两个集合的并集包含所有属于第一个集合、或属于第二个集合、或同时属于两个集合的元素。以下是表\
  \ `E1` 和 `E2` 的并集，记作 `E1∪E2`：\n\n`E1∪E2 =`\n`{ {(EMPNO;101), (ENAME;'Anne'), (JOB;'TRAINER')\
  \ }`\n\n\n\n"
- "# 第 5 章：表与数据库状态\n\n,{(EMPNO;102), (ENAME;'Thomas'), (JOB;'SALESMAN') }\n\n,{(EMPNO;103),\
  \ (ENAME;'Lucas'), (JOB;'PRESIDENT')}\n\n,{(EMPNO;104), (ENAME;'Pete'), (JOB;'MANAGER')\
  \ } }\n\n`E1`和`E2`的并集是一个定义在`{EMPNO,ENAME,JOB}`上的表。它包含四个元组，而不是五个，因为员工 102 的元组同时属于这两个集合。\n\
  \n现在来看表`E1`和`E3`的并集（`E1∪E3`）：`E1∪E3` =\n\n{ {(EMPNO;101), (ENAME;'Anne'), (JOB;'TRAINER')\
  \ }\n\n,{(EMPNO;102), (ENAME;'Thomas'), (JOB;'SALESMAN') }\n\n,{(EMPNO;103), (ENAME;'Lucas'),\
  \ (JOB;'PRESIDENT') }\n\n,{(E#;101), (NAME;'Anne'), (JOB;'TRAINER'), (SAL;3000)}\n\
  \n,{(E#;102), (NAME;'John'), (JOB;'MANAGER'), (SAL;5000)} }\n\n这个结果是一个函数集合，但它显然不是一个表；并非此结果集中的所有函数都共享相同的定义域。\n\
  \n还记得闭包性质吗（见第 2 章的“并集、交集与差集”一节）？我们只关心两个表的并集结果是另一个表的情况。显然，并集运算符通常并不在表上封闭。它只在参与运算的表具有相同标题时才在表上封闭。如果并集运算符的操作数是定义在不同标题上的非空表，那么得到的结果集将不是一个表。\n\
  \n注意空表作为操作数参与的特殊情况。一个给定的表与空表（`∅`）的并集总是得到给定的表；因为`∅`是定义在任何标题上的表，所以闭包性质成立。\n\n######\
  \ 交集\n\n两个集合的交集包含所有同时是第一个集合元素和第二个集合元素的对象。以下是表`E1`和`E2`的交集（`E1∩E2`）：`E1∩E2` = { {(EMPNO;102),\
  \ (ENAME;'Thomas'), (JOB;'SALESMAN')} }\n\n`E1`和`E2`的交集是一个表。不难看出，两个具有相同标题的表的交集将总是产生另一个表。注意，当操作数是定义在不同标题上的表时，交集在表上也是封闭的。\n\
  \n然而，在这些情况下，交集是无用的，因为它总是产生空表；你或许可以通过研究`E1`和`E3`（不同标题的表）的交集来验证这一点。\n\n你可以有意义地对表`E1`和（部分）`E3`进行交集运算，但首先你必须将其中一个表转换，使其具有与另一个表相同的标题。实现这一点所需的所有概念都已在第\
  \ 4 章介绍：函数限制和函数复合。\n\n看看下面表`E4`的定义。它将表`E3`的属性`E#`和`NAME`进行了重命名。\n\n`E4 := { e◊{(EMPNO;E#),(ENAME;NAME),(JOB;JOB),(SAL;SAL)}\
  \ | e∈E3 }`\n\n集合`E4`是一个定义在`{EMPNO,ENAME,JOB,SAL}`上的表。我们使用函数复合（`◊`；参见定义 4-8）来重命名两个属性。属性`E#`被重命名为`EMPNO`，属性`NAME`被重命名为`ENAME`。另外两个属性（`JOB`和`SAL`）保持不变。\n\
  \n接下来我们需要去掉额外的`SAL`属性（它也不是`E1`标题的一部分）。为此我们使用函数限制（`↓`，参见定义 4-4）。看看`E5`的定义：\n\n`E5\
  \ := { e↓{EMPNO,ENAME,JOB} | e∈E4 }`\n\n`E5`等于以下集合：\n\n{ {(EMPNO;101), (ENAME;'Anne'),\
  \ (JOB;'TRAINER')}\n\n,{(EMPNO;102), (ENAME;'John'), (JOB;'MANAGER')} }\n\n`E5`与`E1`的交集现在变得有意义了，结果为以下集合：`E5∩E1`\
  \ = { {(EMPNO;101), (ENAME;'Anne'), (JOB;'TRAINER')} }\n\n最后，我们注意空表作为操作数参与的特殊情况。一个给定的表与空表的交集总是得到空表。\n\
  \n###### 差集\n\n两个集合的差集包含所有是第一个集合元素但不是第二个集合元素的对象。以下是表`E1`和`E2`的差集（`E1–E2`）：`E1–E2`\
  \ =\n\n{ {(EMPNO;101), (ENAME;'Anne'), (JOB;'TRAINER') }\n\n,{(EMPNO;103), (ENAME;'Lucas'),\
  \ (JOB;'PRESIDENT')} }\n\n\n\n如你所见，结果是一个基于 `{EMPNO, ENAME, JOB}` 的表。具有相同表头的两个表之间的差集运算总会产生另一个表。与交集类似，当操作数是基于\
  \ `不同` 集合的表时，差集运算符在表上也是封闭的。\n\n然而，在这里，这些情况下的差集同样是无用的，因为它总是产生第一个表；第二个表不可能包含第一个表中的元组（由于表头不同）。因此，元组永远不会从第一个集合中被“移除”。\n\
  \n由于差集运算符不满足交换律，我们记下当空集作为操作数参与运算时的两种特殊情况（与前面的交集和并集形成对比）。令 `T` 为一个给定的表；那么 `T–∅` 的结果总是\
  \ `T`，而 `∅–T` 的结果总是空表。\n\n###### 投影\n\n另一个需要引入的重要表运算是：将一个表 `投影` 到给定集合上。给定表（例如 `T`）在给定集合（例如\
  \ `B`）上的 `投影`，执行了对 `T` 中每一个元组在集合 `B` 上的 `限制`。我们使用符号 `⇓` 来表示 `投影`。`投影` 运算符可以看作是 `限制`\
  \ 运算符提升到表层面的一个版本。\n\n###### 定义 5-3：表的投影\n令 `T` 为一个函数集合，`B` 为一个集合。`T` 在 `B` 上的 `投影`（记作\
  \ `T⇓B`）定义如下：\n\n```\nT⇓B := { t↓B | t∈T }\n```\n\n`T` 在 `B` 上的 `投影` 包含 `T` 中每一个被限制在\
  \ `B` 上的函数。虽然上述定义描述了任何函数集合 `T` 和任何集合 `B` 的 `投影`，但我们主要（但不仅限于）对 `T` 是一个表，且 `B` 是此类表的表头的一个（非空）真\
  \ `子集` 的情况感兴趣。\n\n###### 清单 5-7. 表 T3\n让我们看一个例子来说明 `投影` 的概念。清单 5-7 引入了表 `T3`。它包含五个元组，其域为\
  \ `{empno, ename, salary, sex, dno}`。\n\n```\nT3 := { {(empno;10), (ename;'Thomas'),\
  \ (salary;2400), (sex;'male'), (dno;1)}\n      ,{(empno;20), (ename;'Lucas'), (salary;3000),\
  \ (sex;'male'), (dno;1)}\n      ,{(empno;30), (ename;'Aidan'), (salary;3000), (sex;'male'),\
  \ (dno;2)}\n      ,{(empno;40), (ename;'Keeler'), (salary;2400), (sex;'male'), (dno;1)}\n\
  \      ,{(empno;50), (ename;'Elizabeth'), (salary;5600), (sex;'female'), (dno;2)}\
  \ }\n```\n\n这是 `T3` 在 `{salary, sex}` 上的 `投影` 结果，记作 `T3⇓{salary, sex}`：\n\n```\n\
  T3⇓{salary,sex} =\n{ {(salary;2400), (sex;'male')}\n, {(salary;3000), (sex;'male')}\n\
  , {(salary;5600), (sex;'female')} }\n```\n\n请注意，`T3` 在 `{salary, sex}` 上的 `投影` 产生了另一个表：一个基于\
  \ `{salary, sex}` 的表。此表只有三个元素，而 `T3` 有五个元素。`T3` 定义中列举的第一个和第四个元组产生了相同的（限制后的）函数，`T3`\
  \ 中列举的第二和第三个函数也是如此。因此，这个 `投影` 结果的集合中只剩下三个元组。\n\n你现在可以使用 `E4⇓{EMPNO,ENAME,JOB}` 来指定在“交集”一节中引入的\
  \ `E5`。\n\n###### 限制\n\n表通常包含许多元组。通常你只对其中一些元组感兴趣：具有特定属性的元组。你想查看给定表中元组的一个 `子集`。你可以通过\
  \ `表限制` 来派生给定表的一个 `子集`。这个运算符不需要新的数学符号；你可以简单地使用谓词方法来指定一个基于给定表的新元组集合（即一个新表）。\n\n使用清单\
  \ 5-7 中的员工表 `T3`，假设你想将该表限制为仅包含薪资大于 2500 的男性员工。以下是你指定该操作的方式（我们将此结果命名为 `T4`）：\n\n\
  ```\nT4 := { e | e∈T3 ∧ e(sex)='male' ∧ e(salary)>2500 }\n```\n\n\n"
- '# 表的限制


  `表 T4` 包含两个元组：代表员工 `''Lucas''` 和 `''Aidan''` 的元组，他们是 `T3` 中仅有的工资超过 2500 的男性员工。


  `T4` 的规范是表限制的一个简单案例示例，这也是你将经常使用的一种操作。以下是这类限制的通用模式：`{ t | t∈T ∧ P(t) }`


  在此表达式中，`T` 代表被限制的表，`P(t)` 代表一个以某种元组类型为单个参数的谓词。谓词 `P` 可以是一个简单谓词或复合谓词（即涉及逻辑连接词的谓词）。此谓词通常包含涉及使用参数
  `t` 的函数应用的表达式；对于 `T` 的每个元组，你可以通过检查（仅）该元组的一个或多个属性值来决定它是否保留在结果集中。


  表的限制可以稍微复杂一些。例如，假设我们希望将表 `T3` 限制为仅包含男性员工中工资最高的（在所有男性中）和女性员工中工资最高的（在所有女性中）。指定这种对
  `T3` 的限制（我们将命名为 `T5`）的一种方式如下：`T5 := { e | e∈T3 ∧ ¬(∃e2∈T3: e2(sex)=e(sex) ∧ e2(sal)>e(sal))
  }`


  表 `T5` 将包含 `T3` 中每一个元组（比如 `e`），条件是在 `T3` 中不存在另一个元组（比如 `e2`），使得 `e` 和 `e2` 在 `sex`
  属性上匹配，并且 `e2` 中的 `sal` 值大于 `e` 中的 `sal` 值。请注意，这个特定的限制实际上会产生一个包含三个元组的表；`T3` 中有两名男性员工的工资都是最高的。


  这种更复杂的表限制符合另一种常用的模式。以下是这类限制的通用模式：`{ t | t∈T ∧ P(t,T) }`


  在此模式中，`P(t,T)` 代表一个带有两个参数的谓词。第一个参数取表 `T` 中的一个元组作为值，第二个参数取实际的表 `T` 作为值。对于 `T` 的每个元组，你不仅通过检查该元组的一个或多个属性值，还通过检查同一表中的其他元组来决定它是否保留在结果集中。


  限制也可以涉及其他表（除了被限制的表之外）。假设我们有一个名为 `D1` 的表，其模式为 `{dno,dname,loc}`，代表部门表（具有明显的语义）。假设我们希望将表
  `T3` 限制为仅包含工资超过 2500 且受雇于一个在 `D1` 中已知且位于旧金山 (`''SF''`) 的部门的男性员工。指定这种对 `T3` 的限制的一种方式如下：`{
  e | e∈T3 ∧ e(sex)=''male'' ∧ e(sal)>2500 ∧ (∃d∈D1: e(dno)=d(dno) ∧ d(loc)=''SF'')
  }`


  这种表的限制符合以下模式：`{ t | t∈T ∧ P(t,S) }`


  这里 `S` 代表某个给定的表（不同于 `T`）。对于 `T` 的每个元组，你现在不仅通过检查该元组的一个或多个属性值，还通过检查另一个表中的元组来决定它是否保留在结果集中。


  正如你现在可能理解的，执行对给定表的限制还有很多其他方式；可能涉及任意数量的其他表（包括被限制的表）。


  在实践中，通常也可以对作为连接（join）结果的表指定此类限制（参见下一节）。


  ###### 连接（Join）


  在数据库中，你经常会发现两个表通过它们共享的某个属性（或属性集）相互关联。如果是这种情况，那么你可以有意义地组合这些表的元组。


  这种元组的组合是通过两个元组的*兼容性*概念完成的（你可能需要回顾定义 4-3 以刷新记忆）。第一个表中的每个元组都与第二个表中与其*兼容*的元组进行组合。让我们用一个例子来演示这一点。图
  5-5 和 5-6 介绍了表 `T6`（代表员工）和表 `T7`（代表部门）。


  **图 5-5.** *示例表 T6*


  **图 5-6.** *示例表 T7*


  你可以将表 `T6` 和 `T7` 中在共享属性（本例中为 `deptno` 属性）上对应的元组组合起来。这种组合产生的表，其标题是 `T6` 标题和 `T7`
  标题的并集。


  图 5-7 显示了表 `T6` 和 `T7` 组合的结果。


  **图 5-7.** *表 T8，表 T6 和 T7 的组合*


  你可以用谓词方式正式指定此表如下：`{ e∪d | e∈T6 ∧ d∈T7 ∧ e(deptno)=d(deptno) }`


  `T6` 中的每个元组都与 `T7` 中具有相同 `deptno` 值的元组组合。


  两个“相关”表的元组的这种组合被称为这两个表的*连接（join）*。定义 5-4 正式定义了这个操作符。


  **定义 5-4：两个表的连接** 设 `R` 和 `T` 为两个（不一定相异）的表。`R` 和 `T` 的连接（记作 `R⊗T`）定义如下：


  ```

  R⊗T := { r∪t | r∈R ∧ t∈T ∧ "r 和 t 是兼容的" }

  ```


  两个表（比如 `R` 和 `T`）的连接将包含每对元组 `r` 和 `t` 的并集，其中 `r` 是 `R` 中的一个元组，`t` 是 `T` 中的一个元组，且
  `r` 和 `t` 的并集是一个函数（兼容性概念）。根据这个定义，你现在可以将图 5-7 中的 `T8` 指定为 `T6⊗T7`。


  两个正在进行连接的表所共有的属性集被称为*连接属性集*。我们有时也会说两个元组是*可连接的*，而不是说它们是兼容的。


  正如前一节关于限制的结尾所提到的，你经常会限制两个表的连接。例如，下面是表 `T6` 和 `T7` 的连接限制为仅包含那些代表位于丹佛的职员的元组：`{ t |
  t∈T6⊗T7 ∧ t(job)=''CLERK'' ∧ t(loc)=''DENVER'' }`


  请注意，定义 5-4 并不限于操作数实际至少有一个共同属性的情况。你可以连接两个连接属性集为空的表（兼容性概念允许这种情况）；在这种情况下，第一个表中的每个元组都与第二个表中的每个元组兼容（这遵循定义
  4-3）。你实际上是在将第一个表的每个元组与第二个表的每个元组进行组合。这种连接的特殊情况也被称为*笛卡尔积*。


  通常，笛卡尔积在数据处理中的实际用途有限。涉及基数为 1 的表的笛卡尔积是合理且有时有用的。以下是这样一个笛卡尔积的例子：`T7⊗{ { (maxbudget;75000)
  } }`


  这个表达式将 `T7` 中的每个元组与连接操作符的右侧参数（这是一个模式为 `{maxbudget}` 的表）中的每个元组进行连接。它实际上*扩展*了 `T7`
  中的每个部门元组，添加了一个名为 `maxbudget` 的新属性。这个笛卡尔积实际上是*表扩展*的一个特例，这将在后面的“扩展”一节中介绍。


  还要注意笛卡尔积的一个相反特殊情况，即你连接两个共享相同标题的表。也就是说，连接属性集等于这个共享的标题。在这种连接中，你实际上是在对这两个表求交集。这使得交集成为连接的一个特例（因此是一个冗余操作符）。


  ###### 属性重命名（Attribute Renaming）



  ### 第 5 章 表与数据库状态


  ## 属性重命名


  有时，两个表之间存在关联，使得连接它们是有意义的。然而，用于执行连接的属性名称并不匹配；用于连接的属性集合是空集。在这些情况下，连接操作符将无法按预期工作；它将执行一个笛卡尔积连接。连接操作的定义要求目标连接属性的名称相同。例如，假设前面表
  `T7` 中的 `deptno` 属性被命名为 `dept#`。那么执行 `T6` 和 `T7` 的连接——`T6⊗T7`——将导致 `T6` 和 `T7` 的笛卡尔积。要解决此问题，您必须首先将
  `T6` 中的属性 `deptno` 重命名为 `dept#`，或者将 `T7` 中的属性 `dept#` 重命名为 `deptno`。


  同样，有时对两个表执行交集、并集或差集操作是有意义的；然而，两个表的标题不同，区别不在于基数，而在于属性的名称。要解决此问题，也必须首先重命名所涉及表的属性，使它们具有相等的标题。


  为此，我们引入了**属性重命名**操作符；定义 5-5 正式定义了该操作符。


  ###### 定义 5-5：属性重命名操作符

  设 `T` 是一个表，`f` 是一个函数。根据函数 `f` 对 `T` 中属性的重命名（记法 `T◊◊f`）定义如下：

  ```

  T◊◊f := { t◊f | t∈T }。

  ```

  您可以将属性重命名操作符视为函数复合操作符提升到表级别的一个版本。


  使用此操作符，我们可以将 `T6` 中的属性 `deptno` 重命名为 `dept#`，如下所示：

  ```

  T6◊◊{(empno;empno),(ename;ename),(job;job),(sal;sal),(dept#;deptno)}

  ```

  请注意，重命名函数 `f` 为 `T6` 标题中的每个属性持有一个有序对。有序对中的所有第二个坐标代表表的当前属性名称。只有当需要重命名属性时，有序对的第一和第二个坐标才不同；第一个坐标将具有该属性的新名称。


  ###### 扩展


  有时您希望向给定表添加属性。您想在表的标题中引入新属性，并为表中的每个元组提供这些新属性的值。在表上执行此类操作被称为**扩展表**或执行**表扩展**。表扩展不需要新的数学符号；您可以简单地使用谓词方法来指定一个新的元组集合（即一个新表），该新表基于给定的表。


  让我们看一个表扩展的例子。图 5-8 显示了两个表。左边的一个是在 `{empno, ename}` 上的表；它是表 `T6`（见图 5-5）在 `{empno,
  ename}` 上投影的结果。我们将此表命名为 `T9`。右边的一个（`T10`）代表用属性 `initial` 扩展 `T9` 的结果。对于每个元组，此属性的值等于
  `ename` 属性值的第一个字符。


  > **注意** 我们将使用一个名为 `substr` 的函数从给定字符串中提取子串。表达式 `substr(<some string value>,n,m)`
  表示 `<some string value>` 的子串，它从位置 `n` 开始，长度为 `m` 个字符。例如，表达式 `substr(''I like this
  book'',13,4)` 等于字符串值 `''book''`。


  ###### 图 5-8. 用新属性扩展示例

  给定表 `T9`，您可以形式化地指定表 `T10` 如下：

  ```

  T10 := { e ∪ { (initial;substr(e(ename),1,1)) } | e∈T9 }

  ```

  对于 `T9` 中的每一个元组，例如 `e`，表 `T10` 持有一个由以下表达式表示的元组：

  ```

  e ∪ { (initial;substr(e(ename),1,1)) }

  ```

  此表达式向元组 `e` 添加一个属性-值有序对。添加的属性是 `initial`。附加到此属性的值是 `substr(e(ename),1,1)`，它表示 `e(ename)`
  值的首字母。


  这是另一个例子。图 5-9 显示了两个表。左边的一个（`T11`）代表一个在 `{deptno, dname}` 上的部门表。右边的一个（`T12`）是 `T11`
  用一个 `emps` 属性扩展的结果。对于每个元组，`emps` 属性表示在表 `T6`（见图 5-5）中找到的、被分配到该元组所代表部门的雇员数量。


  ###### 图 5-9. 另一个用新属性扩展表的例子

  给定表 `T11` 和 `T6`，您可以形式化地指定表 `T12` 如下：

  ```

  T12 := { d ∪ { (emps;#{ e | e∈T6 ∧ e(deptno)=d(deptno)}) } | d∈T11 }

  ```

  这里我们使用了基数运算符（符号 `#`）来统计每个部门的雇员数量。


  ###### 聚合


  聚合运算符对一个集合进行操作。它们通过对集合中所有元素的某个表达式进行聚合，产生一个（数字）值。有五种常见的聚合运算符：`sum`（求和）、`average`（平均值）、`count`（计数）、`minimum`（最小值）和
  `maximum`（最大值）。


  您在第二章已经接触过求和运算符；您可能想快速回顾定义 2-12。您可以将求和运算符应用于一个表。这里有一个例子。给定表 `T6`（见图 5-5），以下表达式计算研究部门（`deptno=10`）所有雇员工资的总和：

  ```

  (SUM x∈{ t | t∈T6 ∧ t(deptno)=10 }: x(sal))

  ```

  前面求和聚合的结果值是 `24100`。现在看下面的表达式，它再次使用了表 `T6`：

  ```

  { e1 ∪ {(sumsal;(SUM x∈{ e2 | e2∈T6 ∧ e2(deptno)=e1(deptno) }: x(sal)))}

  | e1 ∈ T6⇓{deptno} }

  ```

  这里我们首先将 `T6` 投影到 `{deptno}`，然后用一个 `sumsal` 属性扩展结果表。对于此结果表中的每个元组，我们通过计算所有在该元组所代表的部门工作的雇员的工资总和来确定这个新属性的值。图
  5-10 显示了此表达式的结果。


  ###### 图 5-10. `T6` 按部门的工资总和

  我们不需要为 `count` 运算符引入新的定义。我们可以简单地使用集合论符号 `#`（基数）来统计集合的元素数量。您在前面的“扩展”部分已经看到了一个这样的例子；`T12`
  的形式化规范就是 `count` 聚合运算符的一个例子。


  定义 5-6 定义了平均值聚合运算符。


  ###### 定义 5-6：平均值运算符 (AVG)

  表达式 `f(x)` 的平均值，其中 `x` 从给定的非空集合 `S` 中选择，`f` 表示在 `x` 上的任意数值函数，表示如下：

  ```

  (AVG x∈S: f(x))

  ```

  对于可以从集合 `S` 中选择的每个元素 `x`，平均值运算符计算表达式 `f(x)` 的值，并计算所有这些计算结果的平均值。请注意，如果 `S` 是空集，则此运算符未定义。


  与前面类似，定义 5-7 定义了最大值 (`MAX`) 和最小值 (`MIN`) 聚合运算符。


  ###### 定义 5-7：最大值 (MAX) 和最小值 (MIN) 运算符

  表达式 `f(x)` 的最大值和最小值，其中 `x` 从给定的非空集合 `S` 中选择，`f` 表示在 `x` 上的任意数值函数，分别表示如下：

  ```

  (MAX x∈S: f(x)) 和 (MIN x∈S: f(x))

  ```

  对于可以从集合 `S` 中选择的每个元素 `x`，最大值和最小值运算符计算表达式 `f(x)` 的值，并计算所有这些计算结果的最大值或最小值。请注意，如果 `S`
  是空集，这些运算符也未定义。




