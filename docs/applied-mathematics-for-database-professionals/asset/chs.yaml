  #### 逻辑恒等式与性质


  正如数值 `1` 是常规乘法的恒等元（任何给定数与 `1` 相乘结果仍是该给定数），`0` 是常规加法的恒等元（任何数与 `0` 相加结果仍是该数），逻辑中也存在类似的恒等式，如
  `清单 3-2` 所示。


  `清单 3-2. 恒等式`

  ```

  P ∧ TRUE ⇔ P

  P ∨ FALSE ⇔ P

  P ∧ FALSE ⇔ FALSE

  P ∨ TRUE ⇔ TRUE

  ```


  第一个表达式表明 `TRUE` 是关于与运算（AND）的恒等元。第二个表达式表明 `FALSE` 是关于或运算（OR）的恒等元。最后两个表达式也被称为两个*有界性*恒等式；它们表明任何东西与
  `FALSE` 进行与运算（ANDed）结果为 `FALSE`，任何东西与 `TRUE` 进行或运算（ORed）结果为 `TRUE`。


  ##### 交换律


  一个运算符（或连接词）当且仅当它是二元运算符，且其左右操作数互换不影响结果时，才是*可交换的*。`清单 3-3` 展示了一些逻辑运算符的交换律。


  `清单 3-3. 交换律`

  ```

  ( P ∧ Q ) ⇔ ( Q ∧ P )

  ( P ∨ Q ) ⇔ ( Q ∨ P )

  ( P ⇔ Q ) ⇔ ( Q ⇔ P )

  ```


  合取（conjunction）、析取（disjunction）和等价（equivalence）都是可交换的连接词。


  ##### 结合律


  如果你想对一系列操作数重复使用相同的二元运算符，并且处理该运算符出现的顺序无关紧要，那么这个运算符就是*可结合的*。请注意 `清单 3-4` 中命题形式里的括号。


  `清单 3-4. 结合律`

  ```

  ( ( P ∧ Q ) ∧ R ) ⇔ ( P ∧ ( Q ∧ R ) )

  ( ( P ∨ Q ) ∨ R ) ⇔ ( P ∨ ( Q ∨ R ) )

  ```


  合取和析取是可结合的。结合律解释了为什么在涉及两个以上操作数的迭代合取或析取表达式中，括号常常被省略。


  ##### 分配律


  就像交换律和结合律一样，你可能还记得常规算术中的*分配律*，通常表达为如下公式（本节开头已展示）：

  ```

  a*(b+c) = (a*b) + (a*c)

  ```

  这个代数性质展示了加法和乘法之间的某种关系；在常规算术中，乘法对加法具有分配律。在逻辑中，合取与析取之间也存在类似的关系，如 `清单 3-5` 所示。


  `清单 3-5. 分配律`

  ```

  ( P ∨ ( Q ∧ R ) ) ⇔ ( ( P ∨ Q ) ∧ ( P ∨ R ) )

  ( P ∧ ( Q ∨ R ) ) ⇔ ( ( P ∧ Q ) ∨ ( P ∧ R ) )

  ```


  正如这些重言式所示，合取对析取具有分配律，反之亦然。请注意，在常规算术中，加法对乘法*不*具有分配律。


  ##### 自反性


  常规等号是*自反*运算符的一个例子；对于任何 `x`（无论 `x` 的类型如何），`x = x` 都为 `TRUE`。在逻辑中，蕴含和等价连接词是自反的，因为
  `清单 3-6` 所示的谓词始终为 `TRUE`。


  `清单 3-6. 自反性`

  ```

  P ⇔ P

  P ⇒ P

  ```


  ##### 传递性


  常规等号是*传递的*，如以下公式所示：`((x = y) ∧ (y = z)) ⇒ (x = z)`


  在逻辑中，合取、蕴含和等价是传递的，如 `清单 3-7` 所示。


  `清单 3-7. 传递性`

  ```

  ( ( P ∧ Q ) ∧ ( Q ∧ R ) ) ⇒ ( P ∧ R )

  ( ( P ⇒ Q ) ∧ ( Q ⇒ R ) ) ⇒ ( P ⇒ R )

  ( ( P ⇔ Q ) ∧ ( Q ⇔ R ) ) ⇒ ( P ⇔ R )

  ```


  请注意，析取不具有传递性：`( P ∨ Q ) ∧ ( Q ∨ R )` 并*不*蕴含 `P ∨ R`。


  ##### 德·摩根定律


  德·摩根定律（1806–1871）对于处理涉及否定的表达式非常有用，如 `清单 3-8` 所示。


  `清单 3-8. 德·摩根定律`

  ```

  ¬( P ∨ Q ) ⇔ ( ¬P ∧ ¬Q )

  ¬( P ∧ Q ) ⇔ ( ¬P ∨ ¬Q )

  ```


  用平实的英语描述，这些定律表明“析取的否定等于（操作数的）否定的合取”，反之亦然，“合取的否定等于否定的析取”。


  ##### 幂等性



  ##### 幂等性


  一些（二元）运算符具有这样的性质：如果它们的运算对象相等，那么结果就等于这个运算对象。这些运算对象被称为在该运算符下是幂等的。在逻辑中，命题在析取和合取运算下是幂等的，如清单
  3-9 所示。


  **清单 3-9.** 幂等性


  `( P ∧ P ) ⇔ P`

  `( P ∨ P ) ⇔ P`


  ##### 双重否定（或对合律）


  如果你应用两次否定，你应该会得到原来的运算对象。换句话说，否定运算起到补集的作用，如清单 3-10 所示。


  **清单 3-10.** 双重否定


  `¬¬P ⇔ P`


  ##### 吸收律


  吸收律的性质不那么为人熟知，乍一看可能有点难以理解。它们列在清单 3-11 中。


  **清单 3-11.** 吸收律（“P 吸收 Q”）


  `( P ∨ ( P ∧ Q ) ) ⇔ P`

  `( P ∧ ( P ∨ Q ) ) ⇔ P`


  第一条吸收律说明，在两个谓词的析取式中（例如 `R1 ∨ R2`），如果其中一个析取项（例如右边的 `R2`）比另一个析取项（`R1`）更强，那么可以省略 `R2`
  而不影响该谓词的真值。


  **注意** 回想一下第 1 章“谓词强度”一节的内容，谓词 `R2` 比谓词 `R1` 强，当且仅当 `R2 ⇒ R1`。在第一条吸收律中，右边的析取项 `P
  ∧ Q` 总是比 `P`（左边的析取项）更强，因为谓词 `(P ∧ Q) ⇒ P` 是一个重言式。


  类似地，第二条吸收律说明，在两个谓词的合取式中，例如 `R1 ∧ R2`，如果其中一个合取项（例如右边的 `R2`）比另一个合取项（`R1`）更弱，那么可以省略
  `R2` 而不影响该谓词的真值。


  这两个吸收等价式的证明留作本章末尾的练习。


  #### 量词


  第 1 章阐明了命题和谓词的区别。它讨论了如何将谓词转化为命题。有两种方法可以实现这个目标：

  * 为谓词中的参数提供具体的值。

  * 通过量化来绑定谓词中的参数。


  第一种方法很直接，在第 1 章已有解释；本节解释第二种方法。


  为了使用量化来实现这个目标，你必须首先定义谓词的参数（例如 `x`）允许从中选取值的集合。通过对这个可能值集合进行量化，你就可以说明*有多少*这些可能值具有某种特定属性（此时谓词被转化为命题）。例如，你可以说恰好有
  42 个 `x` 的值具有某种属性。然而，两种最常见的量化陈述如下：

  * 存在某个 `x` 的值，使得 [包含 `x` 的陈述句] 为真。

  * 对于所有 `x` 的值，[包含 `x` 的陈述句] 为真。


  第一个陈述说明了至少存在一个值；因此它被称为*存在*量化。第二个陈述被称为*全称*量化，因为你陈述了关于给定集合所有元素的性质。你可以用两个符号来表示存在和全称量词，如表
  3-1 所示。


  **表 3-1.** 存在量词和全称量词


  | 符号 | 描述 |

  | :--- | :--- |

  | `∃` | 存在量词（存在...） |

  | `∀` | 全称量词（对于所有...） |


  令 `P(x)` 和 `Q(y)` 为给定的谓词，其参数分别为 `x` 和 `y`。令集合 `A` 表示参数 `x` 的可能取值集合，集合 `B` 为 `y`
  的可能取值集合。使用量化的表达式的通用语法如清单 3-12 所示。


  **清单 3-12.** 通用量词语法


  `∃x∈A: P(x)`

  `∀y∈B: Q(y)`


  这两个表达式的含义定义如下：




  '
- '# 量词与集合论


  *   在集合 A 中存在一个值，当该值被提供给谓词 `P(x)` 作为参数 `x` 时，会使谓词 `P(x)` 成为真命题。

  *   对于集合 B 中的所有值，当该值被提供给谓词 `Q(y)` 作为参数 `y` 时，谓词 `Q(y)` 都将成为真命题。


  > **注意**：这两个量化表达式是否为真，显然取决于所涉及的集合（A 和 B）以及给定的谓词 `P(x)` 和 `Q(y)`。


  ##### 一般量词语法


  3-12 节中介绍的一般存在量词和全称量词语法实际上是简写语法。


  该语法依赖于集合论（它使用了“属于”运算符）。纯粹的逻辑学家不需要集合论来表达量化。事实上，集合论是逻辑学的一个分支。从逻辑学家的角度来看，一个集合表示某个谓词的外延。例如，集合
  A 可能表示谓词 `A(x)` 的外延，其形式为“x 是<whatever A means>”。集合 A 如何表示谓词 `A(x)`？通过成为包含所有对象的集合，这些对象在代入
  `A(x)` 中的 `x` 后，会产生一个真命题。文中给出的关于撒谎的数学家的例子，可以表示为 `∀x: "x is a mathematician" ⇒ "x
  is a liar"`。等价于 3-12 节介绍的简写语法且**不**依赖于集合论的通用语法现在分别是 `∃x: "x is a <whatever A means>"
  ⇒ P(x)` 和 `∀y: "y is a <whatever B means>" ⇒ Q(y)`。由于大多数实际的量化谓词形式正是“如果 x 是...，则
  `P(x)`”，因此习惯上使用依赖于集合论的简写符号。


  我们现在可以重新审视第 1 章“命题与谓词”一节中给出的一个示例命题：所有数学家都是撒谎者。这个命题实际上是一个全称量化。以下是规范指定此谓词的形式方法：


  ```

  ∀x∈M: "x is a liar"

  ```


  这里 `M` 代表所有是数学家的人的集合。该集合用于对谓词“`x`是撒谎者”进行量化——这是一个包含名为 `x` 的参数的谓词。


  此量化绑定了参数 `x`（它为该参数提供了值）。结果的量化现在是一个命题；它实际上不再具有参数。


  看下面三个例子（使用第 2 章介绍的自然数集 `N`）：


  ```

  ∃x∈N: x < 42


  ∀y∈N: y/2 ∈ N


  ∀z∈N: z ≥ 0

  ```


  第一个和第三个谓词（更准确地说，是命题，因为它们实际上没有参数）为真，第二个为假。要证明第一个（存在量化）为真，只需给出一个例子即可。在这种情况下，我们必须为
  `x` 提供一个小于 42 的自然数；例如，41 是小于 42 的自然数。要证明一个全称量化为假（第二个），只需给出一个反例；例如，3（一个奇数）除以 2 得到
  1.5（一又二分之一），这不是自然数。对于第三个语句，你必须检查所有自然数，并找出一个不大于或等于零的自然数，以证明该命题为假。当然，你永远找不到这样的数。最小的自然数是
  0（零）——它大于或等于 0——因此，该谓词对所有自然数都为真。


  当一个谓词的参数被量词绑定时，该参数的*名称*就可以自由选择了。让我们用一个例子来阐明这一点。考虑谓词“`x`住在乌得勒支”。这个谓词有一个参数，碰巧被命名为
  `x`。现在让我们通过将该谓词在集合 `{Toon, Lex, Chris, Cary, Hugh}` 上进行全称量化来定义一个新命题，如下所示：


  ```

  ∀x∈{Toon, Lex, Chris, Cary, Hugh}: "x lives in Utrecht"

  ```


  可能不难看出，这个命题等价于以下复合命题（一个包含五个合取支的合取式）：


  ```

  "Toon lives in Utrecht"

  ∧ "Lex lives in Utrecht"

  ∧ "Chris lives in Utrecht"

  ∧ "Cary lives in Utrecht"

  ∧ "Hugh lives in Utrecht"

  ```


  你应该意识到，参数的原始名称（`x`）不会影响构成我们新命题的全称量化的含义。如果你将参数 `x` 替换为一个名为 `y` 的参数——同时在量词和被量化的谓词内部进行替换——你将得到一个与前述五个合取支的合取式逻辑等价的命题：


  ```

  ∀y∈{Toon, Lex, Chris, Cary, Hugh}: "y lives in Utrecht"

  ```


  你可以任意选择量化（无论是全称还是存在）中绑定参数的名称。有时为了避开混淆，为这样的参数选择一个不同的名称是方便的。


  因为一个量化表达式（如前面的例子）是一个谓词，所以将其用作*复合*谓词的组成部分是完全有效的。也就是说，你可以使用第 1 章介绍的逻辑连接词将量化表达式与其他谓词组合起来。例如，以下两个表达式是有效的谓词（事实上，两者都是命题）：


  ```

  ( ∀x∈A: x > 0 ) ∧ ( ∃y∈B: y < 10 )


  ¬( ∀z∈A: z > 10 ) ⇒ ( ∃x∈A: x < 11 )

  ```


  ##### 量词与有限集


  尽管如今的数据库越来越大，但根据定义，它们始终是有限的——这与数学中的集合不同，后者有时是无限的。如果你只处理有限集合，你总是可以将存在量词和全称量词分别视为迭代
  `OR` 和迭代 `AND` 结构。迭代是在量化参数所来自的集合的所有元素上进行的；对于每个元素值，谓词中变量的出现都被该值替换。这种解释量化表达式的替代方法可能在你研究其真值时有所帮助。


  例如，假设 `P` 是所有小于 15 的质数的集合：`P := {2,3,5,7,11,13}`


  那么这两个命题


  ```

  ∃x∈P: x > 12


  ∀y∈P: y > 3

  ```


  在逻辑上等价于以下两个命题：在 `P` 的所有元素上迭代 `x`：`2>12 ∨ 3>12 ∨ 5>12 ∨ 7>12 ∨ 11>12 ∨ 13>12`


  在 `P` 的所有元素上迭代 `y`：`2>3 ∧ 3>3 ∧ 5>3 ∧ 7>3 ∧ 11>3 ∧ 13>3`


  你现在可以手动计算两个谓词的真值。如果你评估第一个命题中每个析取支的真值，它变成 `FALSE ∨ FALSE ∨ ... ∨ FALSE ∨ TRUE`，结果为
  `TRUE`。如果你对第二个命题的合取支做同样的事情，你得到 `FALSE ∧ FALSE ∧ TRUE ∧ ... ∧ TRUE`，结果为 `FALSE`。


  ##### 空集上的量化


  空集（`∅`）不包含任何元素。因为它仍然是一个集合，所以你可以在空集上进行量化。以下两个表达式是有效的命题：


  ```

  ∃x∈∅: P(x)


  ∀y∈∅: Q(y)

  ```


  但是，说空集中存在一个元素 `x` 使得 `P(x)` 成立是什么意思呢？显然，空集没有元素。因此，无论涉及的谓词 `P` 是什么，只要我们声称在空集中有这样的元素，我们必定是在陈述一些明显为**假**的事情，因为不可能从空集中选择一个元素。




  '
- '# 量化空集与嵌套量词


  第二个命题——对空集的普遍量化——不太直观。将普遍量化视为迭代的“与”运算（AND），你会发现对空集的普遍量化不产生任何合取项。这样的量化根本不添加任何谓词，因此可以被认为是最弱的谓词，即为**真**（TRUE）（回顾第一章“真值表”小节中关于谓词强度的段落）。正如我们在“量词的否定”一节中讨论关于量词否定的一些额外重写规则时将看到的，这完全合理。表
  3-2 列出了关于空集量化的这两个重要的重写规则。


  **表 3-2. 空集量化——重写规则**


  | 量化 | 求值结果 |

  | :--- | :--- |

  | `( ∃x∈∅: P(x) )` | **假**（FALSE），与谓词 `P(x)` 无关 |

  | `( ∀y∈∅: Q(y) )` | **真**（TRUE），与谓词 `Q(y)` 无关 |


  ##### 嵌套量词


  量词可以嵌套。也就是说，你可以在单个谓词中使用多个量词。先看一个例子。假设有以下两个集合：`S := {1,2,3,4}` 和 `T := {1,2}`。


  现在看下面四个（非常相似的）命题：


  - `(∀x∈S: (∃y∈S: y = x ))` （对于 `S` 中的所有 `x`，存在 `S` 中的一个 `y` 使得 `y = x`）

  - `(∃y∈S: (∀x∈S: y = x ))` （存在 `S` 中的一个 `y`，使得对于 `S` 中的所有 `x` 都有 `y = x`）

  - `(∀x∈S: (∃y∈T: y = x ))` （对于 `S` 中的所有 `x`，存在 `T` 中的一个 `y` 使得 `y = x`）

  - `(∀x∈T: (∃y∈S: y = x ))` （对于 `T` 中的所有 `x`，存在 `S` 中的一个 `y` 使得 `y = x`）


  如果你比较前两个命题，你会发现它们只涉及集合 `S`；此外，两个量词的位置互换了。在最后两个例子中，两个集合 `S` 和 `T` 的位置互换了。现在，如果你根据给定的两个集合检查这些命题以研究它们的真值，可以得出以下结论：


  - 第一个命题显然是**真**（TRUE），因为你可以简单地为 `y` 选择与 `x` 相同的值。

  - 第二个命题是**假**（FALSE）；不存在这样的值 `y`。一旦你通过选择一个值绑定了变量 `y`，`x` 就只有一个选择（即相同的值）。

  - 第三个命题也是**假**（FALSE）；反例是 `x = 3` 和 `x = 4`。

  - 最后一个命题是**真**（TRUE），因为 `T` 是 `S` 的子集。


  ###### 交换嵌套量词


  从前一节的前两个例子中，你可以得出这个重要结论：有时你可以安全地交换表达式中嵌套的量词，但有时不能——这会改变表达式的含义。


  **> 注意** 嵌套量化并不总是可以无风险地互换。


  如果满足以下两个条件，你可以安全地交换公式中两个连续的量词：


  - 两个量化类型*相同*；即它们必须都是全称量词（∀）或都是存在量词（∃）。

  - 你量化的集合都不依赖于另一个集合所绑定的变量；即内部量化的集合不受你为外部量化选择的变量值的影响。


  例如，以下两个表达式是重言式：


  ```

  ∀x∈A: ∀y∈B: P(x,y) ⇔ ∀y∈B: ∀x∈A: P(x,y)

  ∃x∈A: ∃y∈B: Q(x,y) ⇔ ∃y∈B: ∃x∈A: Q(x,y)

  ```


  然而，以下两个表达式*不是*重言式：


  ```

  ∀x∈A: ∃y∈B: P(x,y) ⇔ ∃y∈B: ∀x∈A: P(x,y)

  ∀x∈A: ∀y∈(B∪{x}): Q(x,y) ⇔ ∀y∈(B∪{x}): ∀x∈A: Q(x,y)

  ```


  最后一个例子相当棘手；回想一下第二章，符号 `∪` 代表并集运算符。所以，一旦你为 `x` 选择了一个值，在试图找到一个使 `Q(x,y)` 为**真**（TRUE）的
  `y` 值之前，你会将该值添加到集合 `B` 中。请注意，如果你交换量词，表达式甚至会变得非法，因为现在你引用了变量 `x`，而此时它尚未被绑定。




  ## 第三章 更多逻辑


  ##### 连续嵌套量词的缩写


  如果你有两个连续的、**相同类型**且作用于**同一集合**的量词，通常可以按如下方式缩写你的公式：


  `∃x∈N: ∃y∈N: x + y > 42`


  前面针对同一集合的存在量化变为：


  `∃x,y∈N: x + y > 42`


  同样地，对于全称量化：


  `∀x∈N: ∀y∈N: x + y > 42`


  前面针对同一集合的全称量化变为：


  `∀x,y∈N: x + y > 42`


  ##### 量词的分配律


  清单 3-13 展示了全称量词和存在量词的分配律。


  **清单 3-13.** *量词的分配律*

  * ( ∃x∈S: P(x) ∨ Q(x) ) ⇔ ( ( ∃x∈S: P(x) ) ∨ ( ∃x∈S: Q(x) ) )

  * ( ∀x∈S: P(x) ∧ Q(x) ) ⇔ ( ( ∀x∈S: P(x) ) ∧ ( ∀x∈S: Q(x) ) )

  * ( ∃x∈S: P(x) ∧ Q ) ⇔ ( ( ∃x∈S: P(x) ) ∧ Q )

  * ( ∀x∈S: P(x) ∨ Q ) ⇔ ( ( ∀x∈S: P(x) ) ∨ Q )


  注意，在清单 3-13 的最后两个例子中，谓词`Q`没有写成`Q(x)`；这表示谓词`Q`不具有参数`x`。只有当`x`**不**作为参数出现在谓词`Q`中时，你才能使用最后两个逻辑等价式；例如：

  `( ∀y∈S: ( ∃x∈S: x>10 ∧ y<5 ) ) ⇔ ( ∀y∈S: ( ∃x∈S: x>10 ) ∧ y<5 ) ⇔ ( ∀y∈S: ( ∃x∈S:
  x>10 ) ) ∧ ( ∀y∈S: y<5 )`


  顺便问一下，你看出最后一个等式中左边的合取项是`( ∀y∈S: Q )`这种形式了吗？更具体地说，它表示的是对一个命题的全称量化；它并不是在对一个参数被量词绑定的谓词进行量化。类似的情况也可能出现在存在量化中。看一下清单
  3-14，它针对这种情况引入了两条重写规则。


  **清单 3-14.** *对命题进行量化的重写规则*

  * ( ∀x∈S: P ) ⇔ ( ( S = ∅ ) ∨ P )

  * ( ∃x∈S: Q ) ⇔ ( ( S ≠ ∅ ) ∧ Q )


  这里`P`和`Q`代表命题。使用这些重写规则，你可以将前面的例子进一步重写为以下表达式：

  `( ( S = ∅ ) ∨ ( ∃x∈S: x>10 ) ) ∧ ( ∀y∈S: y<5 )`


  ##### 量词的否定


  如果你将否定连接词与全称量词结合使用，会发生以下情况：


  **1.** `¬(∀x∈S: P(x))` 意味着`P`对于`S`中所有元素`x`**并非**为真。

  **2.** 因此，必然存在（至少）一个值使`P`不为真；换句话说：`(∃x∈S: ¬P(x))`


  同样地，将否定添加到存在量化中会导致以下结果：

  **1.** `¬(∃x∈S: P(x))` 意味着不存在`S`中的元素`x`使得`P`为真。

  **2.** 因此，对于`S`中所有值`x`，`P`必须为假；换句话说：`(∀x∈S: ¬P(x))`


  因此我们得到两个重要的量词重写规则，如清单 3-15 所示。


  **清单 3-15.** *量词否定的重写规则*

  * `¬( ∀x∈S: P(x) ) ⇔ ( ∃x∈S: ¬P(x) )`

  * `¬( ∃x∈S: P(x) ) ⇔ ( ∀x∈S: ¬P(x) )`


  你还记得前面章节“空集上的量化”（见表 3-2）中关于空集上量化的讨论吗？我们不希望空集对这些规则造成任何例外。因此：

  * 给定 `(∃x∈∅: P(x)) ⇔ FALSE`，我们可以将其转换为 `¬(∀x∈∅: ¬P(x)) ⇔ FALSE`（使用清单 3-15 中的第一条重写规则）。

  * 但这样一来 `¬¬(∀x∈∅: ¬P(x)) ⇔ TRUE`（等价式两边的谓词都进行否定）。

  * 所以 `(∀x∈∅: ¬P(x)) ⇔ TRUE`，与谓词无关（划掉全称量词前面的双重否定）。




  所以你看，无论冒号后的实际谓词是什么，空集上的全称量化总是得到`TRUE`，这在逻辑上是正确的。


  如果你还没有完全信服，这里还有另一种推理方式。正如“量词与有限集”一节中关于量词的段落所解释的，全称量词对应于迭代的`AND`结构。因此，你可以建立以下一系列逻辑等价式：


  ```

  ∀x∈S: P(x)

  ⇔ P(x₁) ∧ P(x₂) ∧ P(x₃) ∧ ... ∧ P(x_{n-1}) ∧ P(x_n)

  ⇔ TRUE ∧ P(x₁) ∧ P(x₂) ∧ P(x₃) ∧ ... ∧ P(x_{n-1}) ∧ P(x_n)

  ```


  根据表 1-12 中列出的“特殊情况”重写规则之一，添加前缀`TRUE ∧`是允许的。如你所见，你从一个包含`n`个值的集合`S`开始。现在，如果你开始逐个移除集合`S`的元素，你可以从末尾移除`∧
  P(x_n)`，然后是`∧ P(x_{n-1})`，依此类推，直到你最终得到空集——因为你移除了集合`S`的最后一个元素。然而，此时等价式就简化为`∀x∈∅:
  P(x)`，它等价于`TRUE`。


  #### 带量词的重写规则


  前面的章节已经介绍了一些关于量化的重写规则。


  列表 3-16 列出了最常用的量词重写规则。


  **列表 3-16.** 带量词的重写规则

  ```

  ¬( ∃x∈S: P(x) ) ⇔ ( ∀x∈S: ¬P(x) )

  ¬( ∀x∈S: P(x) ) ⇔ ( ∃x∈S: ¬P(x) )

  ( ∃x∈S: P(x) ) ⇔ ¬( ∀x∈S: ¬P(x) )

  ( ∀x∈S: P(x) ) ⇔ ¬( ∃x∈S: ¬P(x) )

  ( ∀x∈A: ( ∀y∈B: P(x,y) ) ) ⇔ ( ∀y∈B: ( ∀x∈A: P(x,y) ) )

  ( ∃x∈A: ( ∃y∈B: Q(x,y) ) ) ⇔ ( ∃y∈B: ( ∃x∈A: Q(x,y) ) )

  ( ∃x∈S: P(x) ∨ Q(x) ) ⇔ ( ( ∃x∈S: P(x) ) ∨ (∃x∈S: Q(x) ) )

  ( ∀x∈S: P(x) ∧ Q(x) ) ⇔ ( ( ∀x∈S: P(x) ) ∧ (∀x∈S: Q(x) ) )

  ( ∃x∈S: P(x) ∧ Q ) ⇔ ( ( ∃x∈S: P(x) ) ∧ Q )

  ( ∀x∈S: P(x) ∨ Q ) ⇔ ( ( ∀x∈S: P(x) ) ∨ Q )

  ¬( ∀x∈S: ∀y∈T: P(x,y) ) ⇔ ( ∃x∈S: ∃y∈T: ¬P(x,y) )

  ¬( ∃x∈S: ∃y∈T: P(x,y) ) ⇔ ( ∀x∈S: ∀y∈T: ¬P(x,y) )

  ¬( ∀x∈S: ∃y∈T: P(x,y) ) ⇔ ( ∃x∈S: ∀y∈T: ¬P(x,y) )

  ¬( ∃x∈S: ∀y∈T: P(x,y) ) ⇔ ( ∀x∈S: ∃y∈T: ¬P(x,y) )

  ```


  列表 3-16 中的第三和第四条重写规则指出，你可以将全称量化重写为存在量化（通过使用否定连接词），反之亦然。这意味着你不需要两种量词中的任何一种来表达任意量化谓词。然而，同时拥有这两种量词是很方便的，因为我们在自然语言中两者都使用。


  你将在本章末尾的练习中证明其中一条重写规则。


  #### 范式


  范式（也称为规范形式）在数学中经常使用。这里的英文词“normal”是在符合规范（即标准）的意义上使用的，而不是“通常的”意思。


  范式通常用于重写表达式，以便于求解（或进一步分析）。一个典型的例子是众所周知的二次方程范式：`ax² + bx + c = 0`。一旦你将二次方程重写为这种格式，你就可以使用二次公式来求出`x`的值。在逻辑中，也有类似的范式；我们将在接下来的章节中讨论其中两种。一般来说，范式在自动定理证明中很有用。接下来讨论的析取范式和合取范式对于验证一个谓词是永真式还是矛盾式特别有用。


  **注意** 范式对于比较两个谓词也很有用。通过将两个看似相似的谓词重写为相同的范式，你可以更仔细地检查两者之间到底有什么区别。或者，在将两者都转换为范式后，你可能会发现它们实际上是同一个谓词。这是本书第二部分的一个应用场景，其中数据完整性规则被指定为形式化谓词。


