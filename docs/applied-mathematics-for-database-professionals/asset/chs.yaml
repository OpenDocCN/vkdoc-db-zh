- '# 第七章：规范数据库设计


  在本章中，我们将演示如何形式化地规范一个数据库设计。


  形式化数据库设计规范的优势在于，不仅能避免数据库结构文档中的任何歧义，更重要的是，还能避免所有涉及的数据完整性约束的歧义。


  ■注意 在 IT 行业中，术语 `业务规则` 常用来指代本书所称的 `数据完整性约束`。然而，由于很少有对业务规则确切定义的清晰说明，我们对此无法确定。在本书中，我们倾向于不使用业务规则这个术语，而是使用数据完整性约束。在本章中，我们将对后者给出一个清晰的定义。


  我们将通过定义数据库变量的数据类型来给出数据库设计的形式化规范。这个数据类型——本质上是一个集合——容纳了数据库变量所有可接受的数据库状态，被称为 `数据库全域`。


  你将会看到，数据库全域可以以分阶段（分层）的方式构建，这同时为我们提供了一个清晰的数据完整性约束分类体系。


  首先，你定义词汇表。在你想要在数据库中处理的现实世界里，有哪些事物以及这些事物的哪些方面？在这里，你为每一个被认为是必要的表结构指定一个名称，以及该表结构将拥有的属性名称。我们将引入一个示例数据库设计来演示这一点。词汇表在所谓的
  `数据库骨架` 中形式化定义。进一步解释所有属性（及其关联）含义的一个好方法是，为每个表结构提供 `外在谓词`；这是一个描述所涉及属性的含义和关联的自然语言句子。


  给定数据库骨架后，我们接着为每个属性定义可接受的属性值集合。这是通过对每个表结构引入一个 `特征描述` 来完成的。你在第四章已经了解了特征描述的概念。


  然后，你将使用这些特征描述作为构建块，为每个表构建可接受的元组集合。这被称为 `元组全域`，并包括 `元组约束` 的形式化规范。


  接着，你将使用元组全域为每个表结构构建可接受的表的集合。这个集合被称为 `表全域`，可以被视为表变量的数据类型。表全域的定义将包括相关 `表约束` 的形式化规范。


  本章最后一节展示了如何将表全域汇集到可接受的数据库状态集合的定义中，这也是本章设定的目标：定义一个数据库全域。在这个阶段，你形式化地指定 `数据库（多表）约束`。


  由于本章展示的示例数据库全域包含十个表结构，我们将向你介绍十个特征描述、十个元组全域和十个表全域。这加上所提供的解释性材料，使得本章篇幅相当大。然而，其中的示例数量应该能为你应用形式化理论提供一个坚实的起点，从而使你能够开始在数据库专业人员的实践中应用这种方法论。你可以在附录
  A 中找到包含该设计核心要点的示例数据库设计规范版本。


  在“章节小结”部分之后，有一个练习部分，主要侧重于修改或添加本章引入的示例数据库全域各层中的约束规范。


  #### 记录数据库与约束


  因为你在阅读本书，所以你将自己视为一名数据库专业人员。因此，规范数据库设计很可能是你工作的一部分。你可能会同意，设计数据库的过程大致包括两项主要任务：

  1.  发现现实世界中那些你需要在数据库设计中引入表结构来表示的事物。这是通过与你正在设计的信息系统的用户和利益相关者进行访谈和沟通来完成的。

  2.  发现将控制表结构中维护的数据的数据完整性约束。这些约束为第一步引入的表结构增添了含义，并将最终使数据库设计能够令人满意地拟合你所建模的现实。


  本书第一部分引入的数学应用主要面向第二项任务；它使你能够形式化地规范数据完整性约束。我们相信，无论何时你设计一个数据库，都应该将最多的时间花在设计所涉及的数据完整性约束上。准确地——即无歧义地——记录这些数据完整性约束，可能决定了你的成败。


  尽管如此，如今记录数据完整性约束最广泛的方式仍是使用自然语言，这常常会迅速陷入歧义。如果你使用纯英语来表达数据完整性约束，你不可避免地会遇到“这个英语句子如何无歧义地映射到表结构中”的问题。不同的程序员（以及用户）会以不同的方式解释这样的句子，因为他们都试图将这些句子转换为能够映射到数据库设计的东西。程序员然后会编写他们自己对约束的理解（不一定是规范制定者的本意）。


  接下来的几节将证明，本书第一部分介绍的逻辑和集合论非常适合以形式化的方式捕捉包含其完整性约束的数据库设计。数据完整性约束的形式化规范确切地告诉你它们如何映射到表结构中。你不仅可以避免前面提到的歧义，而且还能获得对数据库最重要方面的清晰而专业的视角：所有涉及的数据完整性约束。


  ■注意 你们中的一些人可能会对接下来的例子感到惊讶，即信息系统整体规范中有多少实际上存在于数据库设计的规范中。信息系统中涉及的许多“业务逻辑”通常可以由映射到支撑信息系统的底层表结构的数据完整性约束来表示。


  #### 数据库设计的内部层次


  在设定了场景之后，我们现在将演示集合论和逻辑如何使你能够清晰而专业地审视数据库设计及其完整性约束。接下来的两节（非正式地）向你介绍一种看待数据库设计精髓的特殊方式。这种视角将使数据库设计的分层集合论规范成为可能。


  ##### 数据库的自顶向下视图





  在任何给定时间点，数据库本质上都是表的集合。我们的数据库，或者更准确地说，我们的数据库变量，保存着数据库的当前状态。随着时间的推移，会发生事务，并为数据库变量分配新的数据库状态。我们需要为数据库变量指定所有`admissible
  database states`的集合。这个集合被称为`database universe`，实际上定义了数据库变量的数据类型。自上而下地看，对于一个涉及 n
  个表结构的给定数据库设计，你可以观察到以下内容：


  • 每个数据库状态都是一个可接受的 n 个表的集合（每个表结构一个），其中


  • 每个表都是一个可接受的元组集合，其中


  • 每个元组都是一个可接受的属性-值对集合，其中


  • 每个值都是该给定属性的可接受值。


  由于前面的所有层都是集合，你可以使用集合论从数学上定义它们全部。通过逻辑（通过添加嵌入式谓词），你可以精确定义每个层中“可接受”的含义；此时数据完整性约束就出现了。


  那么，如何以形式化的方式指定这个称为`database universe`的集合呢？这是采用与之前介绍的层级相同的自下而上方法来完成的。首先，定义你的词汇表：在数据库中，你想处理现实世界中的哪些事物及其哪些方面？换句话说，你需要哪些表结构，每个表结构具有哪些属性？这在所谓的`database
  skeleton`中形式化定义。


  对于在`database skeleton`中引入的每个属性，你接着定义可接受的属性值集合。你已经接触过这个；在此阶段，所有的`characterizations`（每个表结构一个）被定义。


  然后，你使用`characterizations`作为构建块，为每个表结构构建（定义）`set of admissible tuples`。这涉及应用广义积运算符（参见定义
  4-7）和引入元组谓词。可接受的元组集合被称为`tuple universe`。


  然后，你可以使用`tuple universes`为每个表结构构建`set of admissible tables`，这被称为`table universe`。你将在本章中看到如何做到这一点；它涉及应用幂集运算符和引入表谓词。


  在最后阶段，你使用先前定义的`table universes`定义可接受的数据库状态集合——`database universe`。


  这种形式化定义数据库变量数据类型的方法是由荷兰数学家 Bert De Brock 与 Frans Remmen 在 20 世纪 80 年代开发的，是准确定义数据库设计（包括所有相关数据完整性约束）的一种优雅方法。参考文献`De
  grondslagen van semantische databases`（Academic Service，1990，荷兰语）和`Foundations of
  Semantic Databases`（Prentice Hall，1995）是 Bert De Brock 撰写的书籍，他在其中介绍了这种方法。


  #### 约束分类模式


  在这种对`database universe`的自下而上的稳固构造中，你在前面描述的每个层级上只显式允许可接受值的集合。这意味着在每个层级上，这些集合必须满足某些数据完整性约束。约束指定了哪些集合是有效的；它们限定了集合的内容。这直接引出了四类数据完整性约束：


  • `Attribute constraints`：实际上，这些是你在一个`characterization`中指定的属性值集合。你可以争论“约束”一词在这里是否合适。`characterization`只是为每个属性指定属性值集合（而不进一步*约束*其中的元素）。然而，属性值集合确实*约束*了属性允许的值。


  **注意**：当属性值集合在 SQL 数据库管理系统中实现时，我们将在第 11 章重新讨论这个问题。


  • `Tuple constraints`：这些是你在定义`tuple universe`时指定的`tuple predicates`。`tuple predicates`约束了一个元组内不同属性值的组合。有时这些约束被称为`inter-attribute
  constraints`。你可以在不引用其他元组的情况下指定它们。例如，这里是 EMP（员工）表结构中属性 Job 和 Salary 之间的一个约束：


  “职位为 President 的员工每月工资大于 10000 美元。”


  • `Table constraints`：这些是你在定义`table universe`时指定的`table predicates`。`table predicates`约束同一表中不同元组的组合。有时这些约束被称为`inter-tuple
  constraints`。你可以在不引用其他表的情况下指定它们。例如：“没有员工的月工资能高于其经理”（这里我们假设 EMP 表结构中存在一个 Manager
  属性，引用该员工的经理）。


  • `Database constraints`：这些是你在定义`database universe`时指定的`database predicates`。`database
  predicates`约束不同表结构的表的组合。有时这些约束被称为`inter-table constraints`。你只能在引用不同表结构时指定它们。


  例如，存在 EMP 和 DEPT 表结构之间无处不在的数据库约束：每个员工必须为一个已知的部门工作。


  这四类约束接受或拒绝给定的数据库状态。它们限定数据库状态，并且通常被称为`static`或`state constraints`；它们可以在（静态）数据库状态的上下文中被检查。实际上还有一类约束。这是限制数据库状态`transitions`（基于静态约束之外的理由）的约束类别。专门限定数据库状态转换的谓词被称为`dynamic`或`state
  transition constraints`。我们将在第 8 章单独讨论这些。


  由于前面的分类模式是由约束所处理的`scope of data`驱动的，它具有与约束实现问题密切相关的优点。当你在 SQL DBMS 中实现数据库设计时，鉴于这些系统对数据完整性约束的声明性支持较差，你将面临这些问题。这种支持的缺乏将负担加在你身上，要求你开发通常复杂的代码来强制执行约束。第
  11 章将使用这里介绍的分类来研究数据完整性约束的这些实现挑战。


  #### 指定示例数据库设计


  我们将通过详细处理一个包含十个表结构的数据库设计，来演示本书第一部分所介绍理论的应用。




  '
- "# 第 7 章 指定数据库设计\n\n我们在此声明，本数据库设计仅用作展示形式化规范方法的载体；我们明确无意讨论该设计*为何*如此。我们承认，本设计所基于的一些假设可能存在疑问。同时我们也提前说明，本设计中有两处“取巧”实现，可能在某些人看来相当糟糕。我们会在引入它们时予以指出。\n\
  \n`Figure 7-1`展示了十个表结构（由方框表示）及其相互关系（由箭头表示）的示意图。每条箭头都表示适用于一对表结构之间的子集要求谓词。\n\n`Figure\
  \ 7-1.` 示例数据库图示\n\n7451CH07.qxd 5/15/07 9:43 AM Page 144\n\n**144**\n\n第 7 章 ■ 指定数据库设计\n\
  \n> **注意** 这些箭头大多代表通常所说的*多对一关系*，并最终在 SQL DBMS 的实施阶段成为*外键*。然而，情况并非总是如此，你将会看到。每条箭头的确切含义将在数据库宇宙规范中给出，其中每条箭头都转化为一个数据库约束。\n\
  \n我们的数据库存储了公司的员工（`EMP`）和部门（`DEPT`）。部分箭头表明：\n- 每位员工为一个部门工作。\n- 每个部门由一位员工管理。\n- 每位员工被分配到一个薪资等级（`GRD`）。\n\
  \n为所有薪资和/或“所属部门”变更维护员工历史记录（`HIST`）；每条历史记录描述了一位员工被分配到某个部门并享有特定薪资的时期。\n\n我们将所有销售代表的额外信息保存在另一个表结构（`SREP`）中。我们将所有已不再为公司工作的员工（即已被终止雇佣或辞职）的额外信息保存在`TERM`中。注意，我们为已终止雇佣的员工保留`EMP`信息。我们还为所有有经理的员工（`MEMP`）保存额外信息；即，那些分配了经理的员工。\n\
  \n数据库还进一步保存了课程（`CRS`）、这些课程的开设班次（`OFFR`）以及这些班次的注册（`REG`）信息。更多的箭头表明：\n- 一个班次必须由一位为公司工作的培训师教授。\n\
  - 一个班次对应一门已存在的课程。\n- 一条注册记录将一位员工作为参与者与一个课程班次关联起来。\n\n现在你对我们在此数据库中维护的信息有了一定了解。下一节，你将看到*数据库骨架*。如前所述，它引入了每个表结构的所有属性名称。这些名称与表结构名称一起，构成了我们数据库设计中可用的词汇表。\n\
  \n##### 数据库骨架\n\n我们在数据库设计中所表示的真实世界事物的名称，包括所关注的属性名称，在所谓的**数据库骨架**中引入。我们有时将其称为*概念骨架*。正如你在第\
  \ 5 章所见，数据库骨架被表示为一个集合值函数。骨架函数的定义域是表结构名称的集合。对于每个名称，该函数生成该表结构的属性名称集合；即，该表结构的标题。\n\n\
  示例数据库设计的数据库骨架`DB_S`在`Listing 7-1`中定义。\n\n在`DB_S`的规范中，你可以看到嵌入的注释（`/* ... */`），用于进一步澄清为表结构和属性名称选择的缩写。\n\
  \n7451CH07.qxd 5/15/07 9:43 AM Page 145\n\n第 7 章 ■ 指定数据库设计\n\n**145**\n\n`Listing\
  \ 7-1.` 数据库骨架定义\n\n```\nDB_S := { (EMP; -- Employees\n          { EMPNO\n      \
  \      /* Employee number */\n          , ENAME\n            /* Employee name */\n\
  \          , JOB\n            /* Employee job */\n          , BORN\n           \
  \ /* Date of birth */\n          , HIRED\n            /* Date hired */\n       \
  \   , SGRADE\n```\n\n\n##### 薪资等级\n\n##### SREP -- 销售代表\n```\n{\n    EMPNO /* 员工编号\
  \ */,\n    TARGET /* 销售目标 */,\n    COMM /* 佣金 */\n}\n```\n\n##### MEMP -- 被管理员工\n\
  ```\n{\n    EMPNO /* 员工编号 */,\n    MGR /* 经理：员工编号 */\n}\n```\n\n##### TERM -- 已离职员工\n\
  ```\n{\n    EMPNO /* 员工编号 */,\n    LEFT /* 离职日期 */,\n    COMMENTS /* 离职备注 */\n}\n\
  ```\n\n##### DEPT -- 部门\n```\n{\n    DEPTNO /* 部门编号 */,\n    DNAME /* 部门名称 */,\n\
  \    LOC /* 地点 */,\n    MGR /* 经理：员工编号 */\n}\n```\n\n##### GRD -- 薪资等级\n```\n{\n\
  \    GRADE /* 等级代码 */,\n    LLIMIT /* 薪资下限 */,\n    ULIMIT /* 薪资上限 */,\n    BONUS\
  \ /* 年度奖金 */\n}\n```\n\n##### CRS -- 课程\n```\n{\n    CODE /* 课程代码 */,\n    DESCR\
  \ /* 课程描述 */,\n    CAT /* 课程类别 */,\n    DUR /* 课程时长（天） */\n}\n```\n\n##### OFFR\
  \ -- 课程开设\n```\n{\n    COURSE /* 课程代码 */,\n    STARTS /* 本次开设的开始日期 */,\n    STATUS\
  \ /* 已安排、已确认... */,\n    MAXCAP /* 最大参与容量 */,\n    TRAINER /* 讲师：员工编号 */,\n    LOC\
  \ /* 地点 */\n}\n```\n\n##### REG -- 课程注册\n```\n{\n    STUD /* 学员：员工编号 */,\n    COURSE\
  \ /* 课程代码 */,\n    STARTS /* 课程开设的开始日期 */,\n    EVAL /* 评估 */\n}\n```\n\n##### HIST\
  \ -- 员工历史记录\n```\n{\n    EMPNO /* 员工编号 */,\n    UNTIL /* 历史记录结束日期 */,\n    DEPTNO\
  \ /* 部门编号 */,\n    MSAL /* 月薪 */\n}\n```\n\n给定这个数据库骨架，你现在可以编写诸如 `DB_S(DEPT)` 的表达式，它表示\
  \ `DEPT` 表结构的属性名集合。该表达式表示集合 `{DEPTNO, DNAME, LOC, MGR}`。\n\n通过这个表头的定义，你现在对数据库设计中每个表结构所代表的内容——它想要表示什么——有了更深一步的理解。进一步澄清表结构及其属性的*含义*的一种方法是提供*外谓词*。外谓词是一个涉及表结构所有属性的英文句子，它提供了一个关于这些属性的陈述，解释了它们相互关联的含义。以下是\
  \ `EMP` 表结构的外谓词：员工编号为 `EMPNO` 的员工，其姓名为 `ENAME`，职位为 `JOB`，出生于 `BORN`，受雇于 `HIRED`，月薪为\
  \ `MSAL` 美元，薪资等级为 `SGRADE`，分配的账户是 `USERNAME`，并且为部门编号为 `DEPTNO` 的部门工作。\n\n它之所以被称为*外*谓词，是因为数据库管理系统无法处理这个英文句子。它是为系统的（外部）用户提供，并为所选属性名称提供解释。它被称为*谓词*，是因为你可以将这个英文句子视为被参数化的，其中参数就是嵌入的属性名称。\n\
  \n你可以使用当前 `EMP` 表中的元组来实例化这个外谓词。方法是将句子中出现的每个属性名称替换为给定元组中对应的属性值。这样形成的新句子可以被视为一个命题，它要么为真（TRUE），要么为假（FALSE）。由外谓词这样生成的句子是关于表所代表的真实世界的陈述。按照惯例，以此方式构建的命题被假定为真（TRUE）。这正是外谓词进一步阐明你的数据库设计含义的方式。\n\
  \n表 7-1 列出了骨架中介绍的所有表结构的外谓词。\n\n###### 表 7-1. 外谓词\n\n| 表     | 外谓词 |\n| :----- |\
  \ :----- |\n| `EMP`  |        |\n\n\n"
- "# 第 7 章 指定数据库设计\n\n##### 表\n\n###### 外部谓词\n\n员工编号为`EMPNO`的员工，其姓名为`ENAME`，职位为`JOB`，出生于`BORN`，入职于`HIRED`，在`SGRADE`薪资等级内月薪为`MSAL`美元，分配至账户`USERNAME`，并为部门编号`DEPTNO`的部门工作。\n\
  \n**SREP**\n员工编号为`EMPNO`的销售代表，其年度销售目标为`TARGET`美元，年度佣金为`COMM`美元。\n\n**MEMP**\n员工编号为`EMPNO`的员工，由员工编号为`MGR`的员工管理。\n\
  \n**TERM**\n员工编号为`EMPNO`的员工，已于日期`LEFT`离职或被解雇，原因为`COMMENTS`。\n\nDEPT\n部门编号为`DEPTNO`的部门，其名称为`DNAME`，位于`LOC`，由员工编号为`MGR`的员工管理。\n\
  \nGRD\nID 为`GRADE`的薪资等级，其月薪下限为`LLIMIT`美元，月薪上限为`ULIMIT`美元，年度最高奖金为`BONUS`美元。\n\nCRS\n\
  代码为`CODE`的课程，其描述为`DESCR`，属于课程类别`CAT`，持续时间为`DUR`天。\n\nOFFR\n课程代码为`COURSE`、开课日期为`STARTS`的课程开设，其状态为`STATUS`，最大容纳学员数为`MAXCAP`，开设地点为`LOC`，且（除非`TRAINER`等于-1）该开设分配有员工编号为`TRAINER`的员工作为培训师。\n\
  \nREG\n员工编号为`STUD`的员工，已注册课程代码为`COURSE`、开课日期为`STARTS`的课程，且（除非`EVAL`等于-1）已为该课程给出评分为`EVAL`。\n\
  \nHIST\n在日期`UNTIL`，对于员工编号为`EMPNO`的员工，其部门或月薪（或两者）发生了变更。在日期`UNTIL`之前，该员工的部门为`DEPTNO`，月薪为`MSAL`。\n\
  \n注：你发现这里的两处“取巧”了吗？显然，这里存在两种类型的课程开设：分配了培训师的开设和未分配培训师的开设。对于注册记录也可以做类似评论；有些包含课程开设的评分，有些则没有。在设计合理的数据库中，你应该将开设和注册表结构各自分解为两个表结构。\n\
  \n这些外部谓词让你对数据库骨架引入的所有相关表结构及其属性的含义有了一个非正式的初步了解。随着我们在后续章节中完成数据库 universe 定义的所有正式阶段，这个示例数据库设计的确切含义将变得清晰。\n\
  \n下一节将为骨架中引入的每个表结构提供特征描述。\n\n##### 特征描述\n\n正如你在第 4 章所见，特征描述定义了给定表结构的属性的值集。对于一个给定的表结构，特征描述是一个集合值函数，其定义域是该表结构的属性集合。对于每个属性，特征描述给出该属性的属性值集。特征描述构成了下一节构建元组\
  \ universe 的基础。然后你会注意到，这里定义这些特征描述的方式非常方便。看一下代码清单 7-2。\n\n它定义了`EMP`表的特征描述。\n\n注：几点说明：\n\
  - 在定义`EMP`表的属性值集时，我们使用了表 2-4 中引入的集合简写名称。\n- 我们使用 `chr_<表结构名称>` 作为表结构特征描述的命名约定。\n\
  - 在 `chr_EMP` 的定义中（以及其他一些地方），你会看到一个名为 `upper` 的函数。该函数接受一个区分大小写的字符串，并返回该字符串的大写版本。\n\
  \n##### 元组全域\n\n###### 代码清单 7-2. 特征化 chr_EMP\n\n`chr_EMP` :=\n{ ( `EMPNO`; `[1000..9999]`\
  \ )\n, ( `ENAME`; `varchar(9)` )\n, ( `JOB`; /* 允许五种 JOB 值 */\n{'PRESIDENT','MANAGER','SALESREP',\n\
  'TRAINER','ADMIN'} )\n, ( `BORN`; `date` )\n, ( `HIRED`; `date` )\n, ( `SGRADE`;\
  \ `[1..99]` )\n, ( `MSAL`; { n | n∈`number(7,2)` ∧ n > 0 } )\n, ( `USERNAME`; /*\
  \ 用户名始终为大写 */\n{ s | s∈`varchar(15)` ∧\n`upper(USERNAME)` = `USERNAME` } )\n, (\
  \ `DEPTNO`; `[1..99]` )\n}\n\n对于表结构 `EMP` 的每个属性，函数 `chr_EMP` 都会生成该属性的属性值集。现在你可以编写诸如\
  \ `chr_EMP(EMPNO)` 的表达式，它代表 `EMP` 表结构的 `EMPNO` 属性的属性值集。该表达式表示集合 `[1000..9999]`。\n\
  \n特征化 `chr_EMP` 的定义告诉我们以下信息：\n- `EMPNO` 值是介于 1000 到 9999 之间的正整数。\n- `ENAME` 值是最多包含九个字符的可变长度字符串。\n\
  - `JOB` 值仅限于以下五个值：'PRESIDENT', 'MANAGER', 'SALESREP', 'TRAINER','ADMIN'。\n- `BORN`\
  \ 和 `HIRED` 值是日期值。\n- `SGRADE` 值是 1 到 99 之间的正整数。\n- `MSAL` 值是精度为七、小数位数为二的正数。\n-\
  \ `USERNAME` 值是最多 15 个字符的大写可变长度字符串。\n- `DEPTNO` 值是 1 到 99 之间的正整数。\n\n在我们数据库设计定义的剩余部分中，有四个集合会频繁出现：员工编号、部门编号、薪资相关金额和课程代码。我们在这里为它们定义简短名称（便于文中引用的符号），并在后续的特征化定义中使用它们。\n\
  \n`EMPNO_TYP` := { n | n∈`number(4,0)` ∧ n > 999 }\n`DEPTNO_TYP` := { n | n∈`number(2,0)`\
  \ ∧ n > 0 }\n`SALARY_TYP` := { n | n∈`number(7,2)` ∧ n > 0 }\n`CRSCODE_TYP` := {\
  \ s | s∈`varchar(6)` ∧ s = `upper(s)` }\n\n代码清单 7-3 至 7-11 介绍了剩余表结构的特征化。在查看这些特征化时，你可能想重新审视表\
  \ 7-1（外部谓词）。嵌入的注释在认为必要时澄清了属性约束。\n\n###### 代码清单 7-3. 特征化 chr_SREP\n\n`chr_SREP` :=\n\
  { ( `EMPNO`; `EMPNO_TYP` )\n/* 销售代表的目标是五位数数字 */\n, ( `TARGET`; `[10000..99999]`\
  \ )\n, ( `COMM`; `SALARY_TYP` )\n}\n\n###### 代码清单 7-4. 特征化 chr_MEMP\n\n`chr_MEMP`\
  \ :=\n{ ( `EMPNO`; `EMPNO_TYP` )\n, ( `MGR`; `EMPNO_TYP` )\n}\n\n###### 代码清单 7-5.\
  \ 特征化 chr_TERM\n\n`chr_TERM` :=\n{ ( `EMPNO`; `EMPNO_TYP` )\n, ( `LEFT`; `date`\
  \ )\n, ( `COMMENTS`; `varchar(60)` )\n}\n\n###### 代码清单 7-6. 特征化 chr_DEPT\n\n`chr_DEPT`\
  \ :=\n{ ( `DEPTNO`; `DEPTNO_TYP` )\n, ( `DNAME`; { s | s∈`varchar(12)` ∧ `upper(DNAME)`\
  \ = `DNAME` } )\n, ( `LOC`; { s | s∈`varchar(14)` ∧ `upper(LOC)` = `LOC` } )\n,\
  \ ( `MGR`; `EMPNO_TYP` )\n}\n\n###### 代码清单 7-7. 特征化 chr_GRD\n\n`chr_GRD` :=\n{ (\
  \ `GRADE`; { n | n∈`number(2,0)` ∧ n > 0 } )\n, ( `LLIMIT`; `SALARY_TYP` )\n, (\
  \ `ULIMIT`; `SALARY_TYP` )\n, ( `BONUS`; `SALARY_TYP` )\n}\n\n###### 代码清单 7-8. 特征化\
  \ chr_CRS\n\n`chr_CRS` :=\n{ ( `CODE`; `CRSCODE_TYP` )\n, ( `DESCR`; `varchar(40)`\
  \ )\n/* 课程类别值：设计、生成、构建 */\n, ( `CAT`; {'DSG','GEN','BLD'} )\n/* 课程时长必须在 1 到 15 天之间\
  \ */\n, ( `DUR`; `[1..15]` )\n}\n\n###### 代码清单 7-9. 特征化 chr_OFFR\n\n`chr_OFFR` :=\n\
  { ( `COURSE`; `CRSCODE_TYP` )\n, ( `STARTS`; `date` )\n/* 允许三种状态值：已计划、已确认、已取消 */\n\
  , ( `STATUS`; {'SCHD','CONF','CANC'} )\n/* 最大课程提供容量；最小值 = 6 */\n, ( `MAXCAP`; `[6..100]`\
  \ )\n/* TRAINER = -1 表示“未分配培训师” */\n, ( `TRAINER`; `EMPNO_TYP` ∪ { -1 } )\n, ( `LOC`;\
  \ `varchar(14)` )\n}\n\n###### 代码清单 7-10. 特征化 chr_REG\n\n`chr_REG` :=\n{ ( `STUD`;\
  \ `EMPNO_TYP` )\n, ( `COURSE`; `CRSCODE_TYP` )\n, ( `STARTS`; `date` )\n/* -1：评估为时过早（课程在未来）\
  \ */\n/* 0：参与者未评估 */\n/* 1-5：常规评估值（1=差 到 5=优秀） */\n, ( `EVAL`; `[-1..5]` )\n}\n\n\
  ###### 代码清单 7-11. 特征化 chr_HIST\n\n`chr_HIST` :=\n{ ( `EMPNO`; `EMPNO_TYP` )\n, (\
  \ `UNTIL`; `date` )\n, ( `DEPTNO`; `DEPTNO_TYP` )\n, ( `MSAL`; `SALARY_TYP` )\n\
  }\n\n请注意，在代码清单 7-9 中，属性 `TRAINER` 的属性值集除了包含有效的员工编号外，还包含一个特殊值 -1。该值代表尚未分配培训师的事实。在我们正式的数据库设计规范方法中，不存在\
  \ SQL 数据库管理系统中常被（误）用作表示缺失值的 `NULL` 这种“值”。元组内部没有缺失值；它们总是为每个属性关联一个值。特征化指定了可以从中选择这些值的属性值集。因此，要表示一个“缺失的培训师”值，你必须在相应的属性值集中显式地为此事实包含一个值。代码清单\
  \ 7-10 中 `EVAL` 属性的属性值集也指定了类似的内容。\n\n**注意：** 附录 F 将专门处理 `NULL` 现象。第 11 章在解决数据库设计实现问题并提供指导原则时，将重新讨论这些\
  \ -1 值。\n\n我们的数据库设计规范始于一个骨架定义以及骨架引入的表结构的外部谓词。在本节中，你了解了示例数据库设计的特征化。通过属性值集，你正在逐步深入地理解这个数据库设计的含义。\n\
  \n下一节将把这一理解推进到下一层：元组全域。\n\n##### 元组全域\n\n元组全域是一个（非空的）元组集合。这是一个非常特殊的元组集合；该集合旨在仅包含对给定表结构可接受的元组。你现在知道元组是用函数表示的。例如，这里有一个示例函数\
  \ `tdept1`，它代表 `DEPT` 表结构的一个可能元组：\n\n`tdept1` := `{(DEPTNO;10), (DNAME;'ACCOUNTING'),\
  \ (LOC;'DALLAS'), (MGR;1240)}`\n\n如你所见，`tdept1` 的定义域代表了数据库骨架 `DB_S` 引入的表结构 `DEPT`\
  \ 的属性集合。\n\n`dom(tdept1)` = `{DEPTNO, DNAME, LOC, MGR}` = `DB_S(DEPT)`\n\n并且，对于每个属性，`tdept1`\
  \ 都从 `DEPT` 表结构的特征化引入的相应属性值集中产生一个值：\n- `tdept1(DEPTNO)` = 10，它是 `chr_DEPT(DEPTNO)`\
  \ 的一个元素\n- `tdept1(DNAME)` = 'ACCOUNTING'，它是 `chr_DEPT(DNAME)` 的一个元素\n- `tdept1(LOCATION)`\
  \ = 'DALLAS'，它是 `chr_DEPT(LOCATION)` 的一个元素\n- `tdept1(MGR)` = 1240，它是 `chr_DEPT(MGR)`\
  \ 的一个元素\n\n这是 `DEPT` 表结构的另一个可能元组：`tdept2` := `{(DEPTNO;20), (DNAME;'SALES'), (LOC;'HOUSTON'),\
  \ (MGR;1755)}`\n\n现在考虑集合 `{tdept1, tdept2}`。这是一个包含两个元组的集合。理论上它可能代表 `DEPT` 表结构的元组全域。然而，这是一个相当小的元组全域；它不太可能代表\
  \ `DEPT` 表结构的元组全域。对于给定表结构的元组全域应该包含我们为该表结构允许（接受）的*每一个*元组。\n\n**注意：** 元组 `tdept1`\
  \ 和 `tdept2` 是共享相同定义域的函数。这是对元组全域的要求；元组全域中的所有元组都共享相同的定义域，该定义域又等于给定表结构的标题。\n\n\n您已经了解了如何利用表结构的表征来生成一个包含该结构所有可能元组的集合（参见第\
  \ 5 章的“表构建”部分）。如果您将广义积应用于一个表征，最终会得到一个元组集合。这个集合不仅仅是普通的元组集合，它正是基于该表征所定义的属性值集构成的*所有可能*元组的集合。\n\
  \n让我们再用一个简单的例子来说明。假设您正在设计一个名为 `RESULT` 的表结构；它存储了属于特定人群的学生所修课程的平均分数。以下是 `RESULT`\
  \ 的外部谓词：“属于人群 `POPULATION` 的学生，针对课程 `COURSE`，其四舍五入后的平均分数为 `AVG_SCORE`。”\n\n######\
  \ 代码清单 7-12. 表征 `chr_RESULT`\n\n`chr_RESULT` :=\n{ ( `POPULATION`; {'DP','NON-DP'}\
  \ )\n/* DP = 数据库专业人士, NON-DP = 非数据库专业人士 */\n, ( `COURSE`; {'集合论','逻辑学'} )\n, ( `AVG_SCORE`;\
  \ {'A','B','C','D','E','F'} )\n}\n\n这三个属性值集代表了 `RESULT` 表结构的属性约束。如果您将广义积 `∏` 应用于\
  \ `chr_RESULT`，您将得到 `RESULT` 表结构的以下可能元组集合：\n\n```\n∏(chr_RESULT) =\n{ { (POPULATION;\
  \ 'DP'), (COURSE; '集合论'), (AVG_SCORE; 'A') }\n, { (POPULATION; 'DP'), (COURSE; '集合论'),\
  \ (AVG_SCORE; 'B') }\n, { (POPULATION; 'DP'), (COURSE; '集合论'), (AVG_SCORE; 'C')\
  \ }\n, { (POPULATION; 'DP'), (COURSE; '集合论'), (AVG_SCORE; 'D') }\n, { (POPULATION;\
  \ 'DP'), (COURSE; '集合论'), (AVG_SCORE; 'E') }\n, { (POPULATION; 'DP'), (COURSE; '集合论'),\
  \ (AVG_SCORE; 'F') }\n, { (POPULATION; 'DP'), (COURSE; '逻辑学'), (AVG_SCORE; 'A')\
  \ }\n, { (POPULATION; 'DP'), (COURSE; '逻辑学'), (AVG_SCORE; 'B') }\n, { (POPULATION;\
  \ 'DP'), (COURSE; '逻辑学'), (AVG_SCORE; 'C') }\n, { (POPULATION; 'DP'), (COURSE; '逻辑学'),\
  \ (AVG_SCORE; 'D') }\n, { (POPULATION; 'DP'), (COURSE; '逻辑学'), (AVG_SCORE; 'E')\
  \ }\n, { (POPULATION; 'DP'), (COURSE; '逻辑学'), (AVG_SCORE; 'F') }\n, { (POPULATION;\
  \ 'NON-DP'), (COURSE; '集合论'), (AVG_SCORE; 'A') }\n, { (POPULATION; 'NON-DP'), (COURSE;\
  \ '集合论'), (AVG_SCORE; 'B') }\n, { (POPULATION; 'NON-DP'), (COURSE; '集合论'), (AVG_SCORE;\
  \ 'C') }\n, { (POPULATION; 'NON-DP'), (COURSE; '集合论'), (AVG_SCORE; 'D') }\n, { (POPULATION;\
  \ 'NON-DP'), (COURSE; '集合论'), (AVG_SCORE; 'E') }\n, { (POPULATION; 'NON-DP'), (COURSE;\
  \ '集合论'), (AVG_SCORE; 'F') }\n, { (POPULATION; 'NON-DP'), (COURSE; '逻辑学'), (AVG_SCORE;\
  \ 'A') }\n, { (POPULATION; 'NON-DP'), (COURSE; '逻辑学'), (AVG_SCORE; 'B') }\n, { (POPULATION;\
  \ 'NON-DP'), (COURSE; '逻辑学'), (AVG_SCORE; 'C') }\n, { (POPULATION; 'NON-DP'), (COURSE;\
  \ '逻辑学'), (AVG_SCORE; 'D') }\n, { (POPULATION; 'NON-DP'), (COURSE; '逻辑学'), (AVG_SCORE;\
  \ 'E') }\n, { (POPULATION; 'NON-DP'), (COURSE; '逻辑学'), (AVG_SCORE; 'F') }\n}\n```\n\
  \n在这个包含 24 个元组的集合中，之前定义的属性约束将成立。然而，该集合对于一个元组内部不同属性的属性值*组合*没有限制。通过指定*属性间*约束——或者更准确地说，*元组约束*——您可以将可能的元组集合限制为给定表的*可接受*元组集合。\n\
  \n假设您不允许数据库专业人士的平均分数为 D、E 或 F，也不允许非数据库专业人士的平均分数为 A 或 B（无论课程是什么）。您可以通过定义元组宇宙 `tup_RESULT`\
  \ 来指定这一点；它形式化地指定了两个*元组谓词*：\n\n`tup_RESULT` :=\n{ r | r∈Π(`chr_RESULT`) ∧\n/* ============================\
  \ */\n/* RESULT 的元组约束 */\n/* ============================ */\n/* 数据库专业人士的平均分永远不会是\
  \ D、E 或 F */\n\n\n\n##### 指定数据库设计\n\nr(`POPULATION`)='DP' ⇒ r(`AVG_SCORE`)∉{'D','E','F'}\
  \ ∧\n\n/* 非数据库专业人员从不会获得平均成绩 A 或 B */\n\nr(`POPULATION`)='NON-DP' ⇒ r(`AVG_SCORE`)∉{'A','B'}\n\
  \n}\n\n由元组宇宙定义引入的元组谓词被称为元组约束。你也可以用枚举方式指定集合 `tup_RESULT`。\n\n**注意** 原始的 24 个可能元组集合现在已缩减为\
  \ 14 个可允许元组的集合。\n\n有十个元组不满足在 `tup_RESULT` 中指定的元组约束。\n\n```\n{ { (POPULATION; 'DP'),\
  \ (COURSE; 'set theory'), (AVG_SCORE; 'A') }\n, { (POPULATION; 'DP'), (COURSE; 'set\
  \ theory'), (AVG_SCORE; 'B') }\n, { (POPULATION; 'DP'), (COURSE; 'set theory'),\
  \ (AVG_SCORE; 'C') }\n, { (POPULATION; 'DP'), (COURSE; 'logic'), (AVG_SCORE; 'A')\
  \ }\n, { (POPULATION; 'DP'), (COURSE; 'logic'), (AVG_SCORE; 'B') }\n, { (POPULATION;\
  \ 'DP'), (COURSE; 'logic'), (AVG_SCORE; 'C') }\n, { (POPULATION; 'NON-DP'), (COURSE;\
  \ 'set theory'), (AVG_SCORE; 'C') }\n, { (POPULATION; 'NON-DP'), (COURSE; 'set theory'),\
  \ (AVG_SCORE; 'D') }\n, { (POPULATION; 'NON-DP'), (COURSE; 'set theory'), (AVG_SCORE;\
  \ 'E') }\n, { (POPULATION; 'NON-DP'), (COURSE; 'set theory'), (AVG_SCORE; 'F') }\n\
  , { (POPULATION; 'NON-DP'), (COURSE; 'logic'), (AVG_SCORE; 'C') }\n, { (POPULATION;\
  \ 'NON-DP'), (COURSE; 'logic'), (AVG_SCORE; 'D') }\n, { (POPULATION; 'NON-DP'),\
  \ (COURSE; 'logic'), (AVG_SCORE; 'E') }\n, { (POPULATION; 'NON-DP'), (COURSE; 'logic'),\
  \ (AVG_SCORE; 'F') }\n}\n```\n\n请注意，使用谓词方法来指定集合的 `tup_RESULT` 的先前规范，远优于后者的枚举规范，因为它明确地向我们展示了元组约束是什么（而且它的定义也更短；通常情况下要短得多）。\n\
  \n现在让我们继续我们的示例数据库设计。看一下清单 7-13，它为示例数据库设计的 `EMP` 表结构定义了元组宇宙 `tup_EMP`。\n\n######\
  \ 清单 7-13. 元组宇宙 `tup_EMP`\n\n```\ntup_EMP :=\n{ e | e∈Π(chr_EMP) ∧\n/* =========================\
  \ */\n/* EMP 的元组约束 */\n/* ========================= */\n/* 我们只雇佣成年员工 */\ne(BORN)\
  \ + 18 ≤ e(HIRED) ∧\n/* 总统的薪资高于 120K */\ne(JOB) = 'PRESIDENT' ⇒ 12*e(MSAL) > 120000\
  \ ∧\n/* 管理员薪资低于 5K */\ne(JOB) = 'ADMIN' ⇒ e(MSAL) < 5000\n}\n```\n\n**注意** 在这个定义中，我们假设已为日期类型的值定义了加法（参见表\
  \ 2-4），使我们能够向这样的值添加年数。\n\n你开始明白这是如何运作的了吗？元组宇宙 `tup_EMP` 是 `Π(chr_EMP)` 的一个子集。\n\n\
  所有不满足在 `tup_EMP` 定义中指定的元组约束（总共有三个）的元组都被排除在外。你可以使用第 1 章表 1-2 中引入的任何逻辑连接词，并结合有效的属性表达式，来形式化地指定元组约束。\n\
  \n请注意，这些形式化规范消除了所有歧义：\n\n-   “成年”指的是 18 岁或以上。`≤` 符号意味着某人年满 18 岁的当天就可以被雇佣。\n-   `120K`\
  \ 和 `5K`（在注释中）的 “K” 代表整数 `1000`，而不是 `1024`。提到的薪资（用户非正式地提及，规范内形式化地提及）对于 `CLERK` 实际上是月薪，对于\
  \ `PRESIDENT` 则是年薪。这可能是现实世界中的习惯做法，在形式化规范中反映这一点或许是明智的。当然，你也可以这样指定涉及 `PRESIDENT` 的谓词：`e(JOB)\
  \ = 'PRESIDENT' ⇒ e(MSAL) > 10000`。\n\n清单 7-14 到 7-22 介绍了我们数据库设计中其他表结构的元组宇宙。你会发现其中嵌入了非正式注释以阐明元组约束。\n\
  \n请注意，仅为表结构 `GRD`、`CRS` 和 `OFFR` 引入了元组约束；其他表结构恰好没有元组约束。\n\n###### 清单 7-14. 元组宇宙\
  \ `tup_SREP`\n\n```\ntup_SREP :=\n{ s | s∈Π(chr_SREP) /* SREP 无元组约束 */ }\n```\n\n\
  ###### 清单 7-15. 元组宇宙 `tup_MEMP`\n\n```\ntup_MEMP :=\n{ m | m∈Π(chr_MEMP) }\n```\n\
  \n###### 清单 7-16. 元组宇宙 `tup_TERM`\n\n```\ntup_TERM :=\n{ t | t∈Π(chr_TERM) }\n```\n\
  \n###### 清单 7-17. 元组宇宙 `tup_DEPT`\n\n```\ntup_DEPT :=\n{ d | d∈Π(chr_DEPT) }\n```\n\
  \n###### 清单 7-18. 元组宇宙 `tup_GRD`\n\n```\ntup_GRD :=\n{ g | g∈Π(chr_GRD) ∧\n/* 薪资等级的“带宽”至少为\
  \ 500 美元 */\ng(LLIMIT) ≤ g(ULIMIT) - 500 ∧\n/* 奖金必须低于下限 */\ng(BONUS) < g(LLIMIT)\n\
  }\n```\n\n###### 清单 7-19. 元组宇宙 `tup_CRS`\n\n```\ntup_CRS :=\n{ c | c∈Π(chr_CRS)\
  \ ∧\n/* 构建类课程从不超过 5 天 */\nc(CAT) = 'BLD' ⇒ c(DUR) ≤ 5\n}\n```\n\n###### 清单 7-20.\
  \ 元组宇宙 `tup_OFFR`\n\n```\ntup_OFFR :=\n{ o | o∈Π(chr_OFFR) ∧\n/* 仅对某些 STATUS 值允许未分配的\
  \ TRAINER */\no(TRAINER) = -1 ⇒ o(STATUS)∈{'CANC','SCHD'}\n}\n```\n\n###### 清单 7-21.\
  \ 元组宇宙 `tup_REG`\n\n```\ntup_REG :=\n{ r | r∈Π(chr_REG) }\n```\n\n###### 清单 7-22.\
  \ 元组宇宙 `tup_HIST`\n\n```\ntup_HIST :=\n{ h | h∈Π(chr_HIST) }\n```\n\n清单 7-20 定义了何时允许\
  \ `TRAINER` 属性使用特殊的 `-1` 值；已确认的课程 (`STATUS = 'CONF'`) 必须分配一个员工作为培训师。\n\n这完成了我们示例数据库设计的元组宇宙层。通过指定元组约束，你对这个数据库设计的含义有了更深入的了解。下一节将继续构建数据库设计的规范，推进到表宇宙层。正如你将看到的，这涉及应用本书第一部分中介绍的更多集合论和逻辑概念。\n\
  \n##### 表宇宙\n\n你可以使用元组宇宙来构建一个可允许表的集合（我们很快会演示这一点）。\n\n这样的集合被称为表宇宙。表宇宙中的每个元素都是对应表结构的一个可允许表。\n\
  \n元组宇宙是一个元组集合，也可以被看作一张表。它是一个相当大的元组集合，因为它包含了使用特征化并考虑元组约束所能构建的每一个元组。我们之前提到过，元组宇宙可以被看作给定表结构的最大表。\n\
  \n元组宇宙的每个子集也是一张表。事实上，如果你构造一个包含元组宇宙的所有子集的集合，那么这个集合将包含许多表；给定表结构的所有可能的表都将包含在这个集合中。你还记得本书第一部分中如何构造给定集合的所有子集的集合吗？幂集算子正是做这个的。元组宇宙的幂集可以被看作给定表结构的所有可能表的集合。\n\
  \n**注意** 你可能需要回顾第 2 章中“幂集与划分”一节，并重温一下关于幂集算子的知识。\n\n与定义元组宇宙的方式类似，你可以限制元组宇宙的幂集以获得可允许表的集合。你可以添加表谓词（约束元组的组合）来丢弃由幂集算子生成但不反映现实世界有效表示的那些可能的表。用于限制元组宇宙幂集的表谓词被称为表约束。\n\
  \n\n\n让我们用上一节介绍的 `RESULT` 表结构来阐明这一切。元组宇宙 `tup_RESULT` 的幂集产生了一个包含所有可能 `RESULT` 表的集合。这个集合里有大量的表。确切地说，因为\
  \ `tup_RESULT` 的基数是 14，所以恰好有 16384（2 的 14 次方）种可能的表。用枚举的方式列出它们实在太多了。图 7-2 展示了其中一张表（`tup_RESULT`\
  \ 的一个任意选择的子集）。让我们将这个表命名为 `R1`。\n\n###### 图 7-2. 一个可能的名为 R1 的 RESULT 表\n\n表 `R1`\
  \ 是 `tup_RESULT` 的一个子集。它包含了 11 个不同的元组。因为这些元组来源于元组宇宙，所以它们都是可接受的元组；它们满足元组约束，并且每个属性都持有一个可接受的值。\n\
  \n现在假设以下（非形式化的）数据完整性约束在 `RESULT` 表结构的表中起作用：\n\n*   属性 `POPULATION` 和 `COURSE` 的组合在\
  \ `RESULT` 表中是唯一标识的（约束 `P1`）。\n*   一个 `RESULT` 表要么是空的，要么恰好包含四个元组：每个 `POPULATION`\
  \ 和 `COURSE` 的组合对应一个元组（约束 `P2`）。\n*   逻辑课程的平均分 (`AVG_SCORE`) 总是高于集合论课程的平均分；分数 A\
  \ 最高，F 最低（约束 `P3`）。\n*   非数据库专业人员的平均分总是低于数据库专业人员（约束 `P4`）。\n\n**■ 注意** 其中一些完整性约束是相当刻意设计的。它们在本例中的唯一目的，就是将\
  \ `RESULT` 表结构的表宇宙中的表数量减少到可以实际枚举所有可接受表的程度。\n\n在代码清单 7-23 中，你可以看到这四个约束被形式化地指定为表谓词，使用了前面引入的名称\
  \ `P1` 到 `P4`。为了能够比较这些规范中的平均分，我们引入了一个函数 `f`，其定义如下：`f := { ('A';6), ('B';5), ('C';4),\
  \ ('D';3), ('E';2), ('F';1) }`\n\n这使得我们可以比较，例如，分数 B 和 E。因为 `f(B)=5` 且 `f(E)=2`（并且\
  \ 5>2），我们可以说 B 是比 E 更高的分数。\n\n###### 代码清单 7-23. 表谓词 P1, P2, P3 和 P4\n\n`P1(T) :=\
  \ ( ∀r1,r2∈T: r1↓{POPULATION,COURSE} = r2↓{POPULATION,COURSE} ⇒ r1 = r2 )`\n`P2(T)\
  \ := ( #T = 0 ∨ #T = 4 )`\n`P3(T) := ( ∀r1,r2∈T: ( r1(POPULATION) = r2(POPULATION)\
  \ ∧ r1(COURSE) = 'logic' ∧ r2(COURSE) = 'set theory' ) ⇒ f(r1(AVG_SCORE)) > f(r2(AVG_SCORE))\
  \ )`\n`P4(T) := ¬( ∃r1,r2∈T: r1(POPULATION) = 'NON-DP' ∧ r2(POPULATION) = 'DP' ∧\
  \ f(r1(AVG_SCORE)) ≥ f(r2(AVG_SCORE)) )`\n\n表谓词 `P1` 是第 6 章“唯一标识谓词”一节中介绍的常见类型的数据完整性谓词之一。\n\
  \n表谓词 `P2` 相当简单；表的基数应该为零或四。这是另一种指定方式：`#T∈{0,4}`。\n\n如你所见，表谓词 `P3` 指定了逻辑课程的平均分应该总是高于集合论课程的平均分，*在一个人群范围内*。\n\
  \n全称量化中的第一个合取项——`r1(POPULATION) = r2(POPULATION)`——指定了这一点。用户可以理所当然地认为，在*给定的人群内*，逻辑课程的平均分总是高于集合论课程的平均分，但在非形式化传达需求时，可能会忘记明确说明这一点（如前面非形式化规范中所做的那样）。\n\
  \n表谓词 `P4` 明确地指定了非形式化规范中提到的“较低平均分”是不考虑课程的；在存在量词内部没有合取项 `r1(COURSE) = r2(COURSE)`。\n\
  \n\n\n你可以使用图 7-2 中介绍的表 `R1` 来实例化谓词 `P1` 到 `P4`。请自行验证表 `R1` 违反了谓词 `P1`、`P2` 和 `P3`，但满足谓词\
  \ `P4`。\n\n`P1(R1) = false`\n`P2(R1) = false`\n`P3(R1) = false`\n`P4(R1) = true`\n\
  \n利用这些形式化的表谓词规范，你现在可以为 `RESULT` 表结构定义表宇宙。请看代码清单 7-24，它使用元组宇宙 `tup_RESULT` 和表谓词 `P1`、`P2`、`P3`、`P4`\
  \ 形式化地定义了表宇宙 `tab_RESULT`。\n\n###### 代码清单 7-24. 表宇宙 `tab_RESULT` 的规范\n\n```\ntab_RESULT\
  \ :=\n{ R | R∈℘(tup_RESULT) ∧ P1(R) ∧ P2(R) ∧ P3(R) ∧ P4(R)\n}\n```\n\n`tab_RESULT`\
  \ 包含了满足所有四个表谓词的 `tup_RESULT` 的每个子集；显然，表 `R1` 不是 `tab_RESULT` 的一个元素。表谓词限制了元组宇宙的幂集，因此被称为*表约束*。\n\
  \n**注意：** 如果一个唯一标识谓词构成了一个表约束（如上例中的 `P1`），那么唯一标识属性的集合通常被称为给定表结构的*键*。在这种情况下，`{POPULATION,\
  \ COURSE}` 是 `RESULT` 表结构的一个键。\n\n表约束 `P1`、`P2`、`P3` 和 `P4` 是精心设计的，它们显著地将幂集生成的原始\
  \ 16384 个可能表的总数大幅降低；事实上，此表宇宙中仅剩 13 个允许的表。代码清单 7-25 展示了表宇宙 `tab_RESULT` 的枚举规范。\n\n\
