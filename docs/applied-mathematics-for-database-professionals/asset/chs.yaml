  \ `Q` 被引入作为表谓词，而数据库谓词 `P` 则被丢弃。\n\n不失一般性，我们再次将注意力限制在不能分解为多个合取项的数据库谓词上。如果你能将一个给定的数据库谓词\
  \ `P(S)` 重写为 `Pa(S) ∧ Pb(S)` 形式的表达式，那么你实际上是在处理两个数据库谓词。\n\n## 127\n\n##### 关于数据完整性谓词的一些说明\n\
  \n我们通过对前述三类数据完整性谓词的几点观察来结束本节的介绍。\n\n正如你在各种示例中看到的，我们可以优雅地使用元组谓词、表谓词和数据库谓词来形式化定义现实世界的条件（业务规则），这些规则需要以某种方式反映在数据库设计的规范中。一个业务规则映射到的谓词类（元组、表或数据库）完全取决于给定数据库设计的数据库骨架。例如，谓词\
  \ `P8`（见 `清单 6-5`）是一个表谓词，因为正式指定“经理工资高于培训师，培训师工资高于文员”这一业务规则的所有信息都包含在员工表结构中。现在，如果出于某种原因引入了一个单独的表结构，比如\
  \ `trainer`，来保存所有培训师信息（使得 `employee` 仅保存经理和文员信息），那么这个现实世界的约束将映射到一个涉及 `employee`\
  \ 和 `trainer` 两个表结构的数据库谓词。\n\n你可能对我们本章介绍数据完整性谓词的方式有个疑问。在你看到的各种示例中，我们使用这些谓词来展示给定的元组、表或数据库状态是否满足它们。然而，在形式化指定数据库设计时，我们对单个数据库状态（或表或元组）并不感兴趣。我们感兴趣的是一个数据库状态空间：一个包含我们为数据库允许的所有值的集合。\n\
  \n我们打算对代表数据库变量值集的这种数据库状态空间进行数学建模（这将在第七章完成）。当我们这样做时，我们将以一种复杂的方式使用本章介绍的三类数据完整性谓词，使得它们代表在数据库状态空间级别起作用的数据完整性约束。\n\
  \n##### 表和数据库谓词的常见模式\n\n本节将建立五种表和数据库谓词的常见模式：唯一标识谓词、子集要求谓词、特化谓词、泛化谓词和元组-连接谓词。这五种数据完整性谓词模式在数据库设计中很常见，因此足够重要，值得单独设立一节来讨论。\n\
  \n###### 唯一标识谓词\n\n\n"
- '# 元组、表和数据库谓词


  我们之前提到过，作为给定表元素的每个元组在该表内是唯一的。使元组在表内唯一的属性是它的*值*，而不是它的属性。通常，不需要所有的属性值就能唯一地标识表中的一个元组；属性值的一个真子集就足够了。对于某个表，可以通过一种称为*唯一标识*谓词的特殊表谓词来陈述此属性。唯一标识谓词是定义
  6-1 中定义的表谓词的一种。


  ###### 定义 6-1：唯一标识谓词

  设 `T` 是一个表，并设 `A` 是 `T` 的标题的一个给定非空子集。一个表谓词是唯一标识谓词，如果它具有以下形式（或可被重写为此形式）：


  ```

  ( ∀t1,t2∈T: t1↓A=t2↓A ⇒ t1=t2 )

  ```


  我们称 *`A` 在 `T` 中是唯一标识的*。


  唯一标识谓词表明，如果表中的任意两个元组在给定属性子集上具有相同的属性值，那么它们必须是同一个元组。使用本书第一部分介绍的重写规则，您也可以用列表 6-9 中列出的形式来表达唯一标识谓词。


  ###### 列表 6-9：唯一标识谓词的其他表现形式

  ```

  ( ∀t1,t2∈T: t1≠t2 ⇒ t1↓A≠t2↓A )

  ( ∀t1,t2∈T: t1=t2 ∨ t1↓A≠t2↓A )

  ¬( ∃t1,t2∈T: t1≠t2 ∧ t1↓A=t2↓A )

  ```


  列出的第一个形式可能是唯一标识谓词更直观的正式版本；表中的两个不同元组必须在给定的属性子集上有所不同。列表 6-7 中的谓词 `P11` 就是以这种形式编写的；它指出
  `{dname, loc}` 在表 `T` 中是唯一标识的。同一列表中的谓词 `P12` 也是一个唯一标识谓词。它以列表 6-9 中显示的第三种形式编写，指出
  `{deptno}` 在表 `T` 中是唯一标识的。列表 6-3 中的第一个谓词也使用了这种形式。


  给定集合 `A` 在表 `T`（标题为 `H`）中是唯一标识的，那么 `H` 的每个作为 `A` 的真*超集*的子集当然在表 `T` 中也是唯一标识的。在唯一标识谓词中，您希望指定一个在表
  `T` 中是唯一标识的、标题 `H` 的*不可约*子集 `A`。


  > **注意**：一个表中可能有多个这样的不可约子集是唯一标识的。

  >

  > 列表 6-7 显示了两个不同的子集——`{deptno}` 和 `{dname, loc}`——它们都被认为是在部门表中唯一标识的。


  如果您选择一个可约的 `H` 子集，那么得到的唯一标识谓词就太弱了。最弱的唯一标识谓词是 `T` 的标题（最大的可能超集）在表 `T` 中是唯一标识的。实际上，这对表
  `T` 允许的元组集合根本没有增加任何约束；正如本节开头提到的，我们已经知道元组在表内是唯一的。


  您也可以通过更正式的方法得出这个结论。看看如果将 `T` 的标题代入唯一标识谓词模式中的集合 `A` 会发生什么：


  ```

  ( ∀t1,t2∈T: t1↓dom(t1)=t2↓dom(t2) ⇒ t1=t2 )

  ```


  注意，如果 `t` 是 `T` 的一个元素，那么您可以通过表达式 `dom(t)`（元组 `t` 的域）来引用 `T` 的标题。使用重写规则 `t↓dom(t)
  = t`（一个元组对其所有属性的限制与该元组本身相同），我们可以将前面的谓词重写为：


  ```

  ( ∀t1,t2∈T: t1=t2 ⇒ t1=t2 )

  ```


  该谓词现在是一个重言式；无论 `T` 的值如何，它总是为真。因此，它根本没有以任何方式约束 `T`。


  > **注意**：我们在本节中刻意不讨论*键*。在第 7 章中，我们将为数据库设计中的每个表结构定义该表结构的可接受表集合——称为*表宇宙*。在定义表宇宙时，我们将确保每个表（在宇宙中）满足一个或多个唯一标识谓词。然后我们说，一个唯一标识属性集合构成了该表宇宙中的一个*键*。


  ###### 子集要求谓词


  您在数据库设计中捕获的不同表结构并非全部相互独立。这些表结构中的许多*对*具有一种称为*子集要求*的关系。定义 6-2 定义了子集要求谓词的概念。此定义中谓词的结构说明了它为何被称为子集要求。


  ###### 定义 6-2：子集要求谓词

  设 `T1` 和 `T2` 是表，并设 `A` 是 `T1` 的标题的一个给定子集，同时也是 `T2` 的标题的一个子集。我们称一个数据库谓词为子集要求谓词，如果它具有以下形式：


  ```

  { t1↓A | t1∈T1 } ⊆ { t2↓A | t2∈T2 }

  ```


  我们称 *`A` 在 `T1` 中引用 `T2` 中的 `A`*。


  让我们用表 `EMP1` 和 `DEP1` 来演示这一点（见图 6-2 和图 6-3）。如果我们将 `EMP1` 代入 `T1`，`DEP1` 代入 `T2`，`{deptno}`
  代入 `A`，我们最终得到以下表达式：


  ```

  { t1↓{deptno} | t1∈EMP1 } ⊆ { t2↓{deptno} | t2∈DEP1 }

  ```


  这将计算为以下表达式：


  ```

  { {(deptno;10)}, {(deptno;12)} } ⊆

  { {(deptno;10)}, {(deptno;11)}, {(deptno;12)}, {(deptno;13)} }

  ```


  这是一个真命题；`EMP1` 中的每个部门编号也出现在 `DEP1` 中。


  如果 `A` 的基数等于 1（即 `A` 表示一个单元素集），那么我们通常使用函数应用而不是函数限制来指定子集要求谓词。


  使用前面的例子，我们会这样写：


  ```

  { t1(deptno) | t1∈EMP1 } ⊆ { t2(deptno) | t2∈DEP1 }

  ```


  这个子集要求类似于列表 6-8 中的谓词 `P13`。


  子集要求谓词通常伴随着一个唯一标识谓词。


  使用定义 6-2 中的名称，您经常会遇到“`A` 在 `T2` 中是唯一标识的；”在上面的例子中 `{deptno}` 确实在 `DEP1` 中是唯一标识的。这不是强制性的；第
  7 章中将给出的示例数据库设计实际上有一个子集要求，其中伴随的唯一标识谓词是缺失的。


  当使用函数限制来指定子集要求时，有时必须应用函数组合来重命名所涉及的一个表中的一个或多个属性。


  让我们通过一个例子来说明这一点。看一下图 6-5 中显示的表 `DEP2`，它与表 `DEP1` 非常相似。


  ###### 图 6-5：示例表 DEP2

  表 `DEP2` 与表 `DEP1` 的区别在于，用于保存部门编号的属性现在命名为 `dno` 而不是 `deptno`。您可以使用函数应用来表达从 `EMP1`（见图
  6-2）到 `DEP2` 的子集要求，如下所示：


  ```

  { e(deptno) | e∈EMP1 } ⊆ { d(dno) | d∈DEP2 }

  ```


  但是，如果您想使用函数限制来指定此子集要求，则必须首先将表 `EMP1` 中的 `deptno` 属性重命名为 `dno`，或者将表 `DEP2` 中的 `dno`
  属性重命名为 `deptno`。以下是此子集要求的规范，其中属性重命名应用于 `EMP1` 元组：


  ```

  { e◊{(dno;deptno)} | e∈EMP1 } ⊆ { d↓{dno} | d∈DEP2 }

  ```


  在此表达式中，函数 `{(dno;deptno)}` 表示一个属性重命名函数。它将表 `EMP1` 中的元组的 `deptno` 属性重命名为 `dno`。


  > **注意**：在这种情况下，重命名函数也执行了元组限制（参见第 4 章“函数组合”一节中的注释）。


  '
- "# 第六章 ■ 元组、表和数据库谓词\n\n## 131\n\n通过使用比清单 6-8 中使用的函数应用更复杂的函数限制，你可以同时表达涉及两个相关表多个属性的子集需求。第\
  \ 7 章将介绍的数据库设计中有一个涉及多个属性的子集需求示例。\n\n一个子集需求谓词通常涉及两个*不同*的表结构，因此代表一个数据库谓词。然而，情况并非总是如此；有时它们只涉及一个表结构。在这些情况下，它们代表一个表谓词。例如，假设表\
  \ `EMP1` 被扩展了一个 `mgr`（经理）属性，该属性保存员工的经理的员工编号。你会要求每个在 `EMP1` 中出现的经理编号也必须作为员工编号出现在\
  \ `EMP1` 中。形式上，你可以将其表达为一个子集需求：\n\n{ t1(mgr) | t1∈EMP1 } ⊆ { t2(empno) | t2∈EMP1\
  \ }\n\n你甚至可能要求每个在 `EMP1` 中出现的经理编号也必须作为员工编号出现在 EMP1 的某个*限制*中。也许引用的元组必须每个都有一个 `JOB`\
  \ 值表明该员工确实是一名经理。形式上，你可以如下表达：\n\n{ t1(mgr) | t1∈EMP1 } ⊆ { t2(empno) | t2∈EMP1 ∧\
  \ t2(job)='MANAGER' }\n\n我们认为前面的表达式也是一个子集需求。\n\n子集需求可以通过图片来可视化。你可以为子集需求\"A in T1\
  \ references A in T2\"画一张图，方法是绘制两个矩形（或其他形状）——一个代表 T1，一个代表 T2——并用一条从 T1 指向 T2 的有向箭头连接这两个矩形。该箭头表示\
  \ T1 表中的每个元组至少引用 T2 表中的一个元组。\n\n图 6-6 显示了从 `EMP1` 到 `DEP2` 的子集需求。\n\n###### 图 6-6.\
  \ *从 EMP1 到 DEP2 的子集需求可视化*\n\n请注意，子集需求的这张图并没有告诉你箭头两边涉及的属性是什么，也没有告诉你是否涉及任何属性重命名。它*仅仅是一张图*，应该始终伴随着精确说明箭头预期含义的形式谓词。\n\
  \n有时你知道该子集需求实际上是一个*真*子集需求。\n\n假设你想指定这样的需求：在员工表中找到的部门编号集合是部门表中找到的部门编号集合的真子集。你可以将此数据库谓词指定如下：`P15a(D,E)\
  \ := { e(deptno)| e∈E } ⊂ { d(dno)| d∈D }`\n\n在本书中，我们将这种特殊情况也称为子集需求。另一种处理方法仍然是使用子集运算符（而不是真子集），并指定第二个数据库谓词来表达部门表中至少存在一个部门编号不出现在员工表中。以下数据库谓词\
  \ `P15b` 正是这样做的：\n\n```\nP15b(D,E) := ( ∃d∈D: ( ∀e∈E: e(deptno)≠d(deptno) ) )\n\
  ```\n\n表 `EMP1`（员工）和 `DEP2`（部门）同时符合数据库谓词 `P15a` 和 `P15b`。有时你知道该子集需求实际上是一个*相等*需求。假设你想指定每个部门都必须有员工的需求。你可以如下指定：\n\
  \n`P16a(D,E) := { e(deptno)| e∈E } = { d(dno)| d∈D }`\n\n在本书中，我们将这种特殊情况也称为子集需求。同样，另一种处理方法是使用子集操作（而不是相等操作），并添加第二个完整性约束来表达每个部门至少存在一个员工。数据库谓词\
  \ `P16b` 正是表达了这一点：\n\n```\nP16b(D,E) := ( ∀d∈D: ( ∃e∈E: e(deptno)=d(dno) ) )\n```\n\
  \n顺便问一下，你看出谓词 `P15b` 正是谓词 `P16b` 的否定吗？这是因为这两个特殊情况——真子集和相等——是互斥的。\n\n**■注意** 子集需求的这些变体，结合子集需求所涉及表的唯一标识谓词，是实体关系图中发现的各种关系的数学对应物。\n\
  \n###### 特殊化谓词\n\n看一下图 6-7 中显示的表 `TRN1`。\n\n###### 图 6-7. *表 TRN1*\n\n清单 6-10 中列出的关于表\
  \ `EMP1` 和 `TRN1` 的命题是 TRUE 命题。\n\n###### 清单 6-10. *关于表 EMP1 和 TRN1 的命题*\n\n```\n\
  P7 := {empno} 在 TRN1 中是唯一标识的\nP8 := { e↓{empno}| e∈EMP1 ∧ e(job)='TRAINER' } = {\
  \ t↓{empno}| t∈TRN1 }\n```\n\n**■注意** 我们已经正式定义了“*一个集合在表中是唯一标识的*”这一表述的含义。\n\n所以 `P7`\
  \ 确实是一个形式化规范。\n\n从命题 `P7` 可以推出，表 `TRN1` 和 `EMP1` 的唯一标识属性是相同的。命题 `P8` 表明，表 `EMP1`\
  \ 中培训师的员工编号等于表 `TRN1` 中找到的员工编号（粗略地说）。注意这里的*相等性*。对于在表 `EMP1` 中找到的每个培训师，你都能在表 `TRN1`\
  \ 中找到一个相关的元组。反之亦然，对于 `TRN1` 中的每个元组，你都能在 `EMP1` 中找到一个培训师。\n\n表 `TRN1` 可以被认为是保存了关于培训师（且仅关于培训师）的附加信息：他们获得认证的日期（再次粗略地说）。\n\
  \n这种情形在数据库设计中经常出现；对于给定表中的某个元组子集——可通过某个谓词指定（在上例中是 `e(job)='TRAINER'`）——在另一个给定表中发现了附加信息，且这两个表共享相同的唯一标识属性。在这种情况下，表\
  \ `TRN1` 被称为表 `EMP1` 的一个*特殊化*。定义 6-3 正式定义了这一概念。\n\n**■定义 6-3：特殊化谓词** 设 `T1` 和 `T2`\
  \ 是表，`A` 是 `T1` 的头部的一个给定子集，同时也是 `T2` 的头部的一个子集。设 `P` 是一个元组谓词。如果一个数据库谓词具有以下形式，则我们称其为特殊化谓词：\n\
  \n{ t1↓A | t1∈T1 ∧ P(t1) } = { t2↓A | t2∈T2 }\n\n我们称“`T2` 是 `T1` 的一个特殊化”。\n\n通常你会发现集合\
  \ `A` 在表 `T1` 和 `T2` 中都是唯一标识的。在清单 6-10 的例子中，你看到 `{empno}` 在 `EMP1` 和 `TRN1` 中都是唯一标识的。\n\
  \n一个给定的表可以有多个特殊化。假设你也想为经理保存附加信息；例如，经理的年度奖金。为本例假设，培训师和文员没有年度奖金，只有经理有。看一下保存经理年度奖金的表\
  \ `MAN1`（见图 6-8）；它也是 `EMP1` 的一个特殊化。\n\n###### 图 6-8. *表 MAN1*\n\n以下命题在表 `EMP1` 和\
  \ `MAN1` 之间成立。它符合定义 6-3 引入的形式。\n\n{ e↓{empno}| e∈EMP1 ∧ e(job)='MANAGER' } = { t↓{empno}|\
  \ t∈MAN1 }\n\n在下一节中，我们将讨论与特殊化相关的一个概念。\n\n###### 泛化\n\n如果一个给定的表 `T` 有多个特殊化，例如表 `S1`\
  \ 到 `Sn` (`n>1`)，使得对于 `T` 中的每个元组，在恰好一个特殊化中存在恰好一个相关的元组，那么我们说“表 `T` 是表 `S1` 到 `Sn`\
  \ 的一个*泛化*”。\n\n\n### 第 6 章 元组、表与数据库谓词\n\n让我们在上一节示例的基础上继续构建。假设你还想为办事员保存额外的信息；例如，他们的合同类型（全职或兼职）以及他们汇报的经理。如图\
  \ 6-9 所示的表`CLK1`，是表`EMP1`的一个特化（specialization），用于保存办事员的这些额外信息。\n\n###### 图 6-9.\
  \ 表 `CLK1`\n\n现在，特化表`TRN1`、`MAN1`和`CLK1`总共有七个元组。对于表`EMP1`中的每一个元组——共有七个——在表`TRN1`、`MAN1`或`CLK1`中的恰好一个表中，存在且仅存在一个对应的元组。这使得表`EMP1`成为表`TRN1`、`MAN1`和`CLK1`的一个**泛化（generalization）**。\n\
  \n**注意** 顺便提一下，你现在也可以指定一个从`CLK1`到`EMP1`的子集需求（涉及`CLK1`的经理属性）。这将作为本章末尾的一个练习。\n\n在泛化表中，你经常会发现一个特定的属性，它决定了额外信息可以在哪个特化表中找到。在所使用的示例中，这个属性是`job`属性。对于表`EMP1`中`job='TRAINER'`的元组，其额外信息在特化表`TRN1`中找到。对于`job='MANAGER'`的元组，额外信息可在表`MAN1`中找到；而对于`job='CLERK'`的元组，额外信息则在表`CLK1`中找到。泛化表中的这样的属性被称为`检查属性（inspection\
  \ attribute）`。\n\n请注意，`检查属性`是一个冗余属性；也就是说，它的值可以从其他元组推导出来。对于`EMP1`中的一个给定元组，它在`TRN1`、`MAN1`或`CLK1`中存在一个对应的元组。你可以直接从该对应元组出现的位置推导出`EMP1`元组的`job`值；其值应分别为`'TRAINER'`、`'MANAGER'`或`'CLERK'`。\n\
  \n通常，你不应该在数据库设计中引入数据冗余；这迫使你在更新决定冗余数据的数据时，必须维护这种冗余。\n\n或者，从数据库设计的角度来看，这迫使你引入一个约束来强制实施数据冗余。然而，在数据库设计中指定泛化属性时，`检查属性`非常有帮助（本章末尾有一个关于此的练习）。\n\
  \n###### 连接中的元组谓词\n\n两个表通常通过子集需求相关联。当两个表以这种方式关联时，由于显而易见的原因，连接它们的需求会经常出现。你可以根据涉及这两个表之间子集需求的属性（本例中是`deptno`属性），连接表`EMP1`和`DEP1`中对应的元组。这种组合产生的表，其标题将是`EMP1`的标题与`DEP1`标题的并集。\n\
  \n图 6-10 展示了表`EMP1`和`DEP1`这种组合的结果。\n\n###### 图 6-10. 表 `EMPDEP1`，表 `EMP1` 和 `DEP1`\
  \ 的连接\n\n表`EMPDEP1`中的每个元组被称为`连接中的元组`。`连接中的元组谓词`是处理这些连接中元组的元组谓词；被连接的元组是该元组谓词的参数。以下是关于`EMPDEP1`的一个元组谓词示例：\n\
  ```\n( ∀t∈EMPDEP1: t(sal)≤t(salbudget)/5 )\n```\n这个命题表明，`EMPDEP1`（即`EMP1`和`DEP1`的连接）中的所有元组，其`sal`属性值不超过`sabudget`属性值的\
  \ 20%。在此命题中，表达式`t(sal)≤t(salbudget)/5`代表了元组谓词。如果你不以表`EMPDEP1`的形式，而是以两个被连接的表——`EMP1`和`DEP1`——的形式来表达这个命题，你将得到如下形式的命题：\n\
  ```\n( ∀e∈EMP1: ( ∀d∈DEP1: e(deptno)=d(deptno) ⇒ e(sal)≤d(salbudget)/5 ) )\n```\n\
  它表明，任何员工的薪资都不能超过其受雇部门工资预算的五分之一。另一种正式的指定方式如下：\n```\n( ∀t∈EMP1⊗DEP1: t(sal)≤t(salbudget)/5\
  \ )\n```\n在这个命题中，表达式`t(sal)≤t(salbudget)/5`代表了一个约束连接中元组的元组谓词。这种谓词模式在数据库设计中很常见，被称为`连接中的元组谓词`。定义\
  \ 6-4 正式定义了它。\n\n**定义 6-4: 连接中的元组谓词** 设`T1`和`T2`为表，`P`为一个元组谓词。如果一个谓词具有以下形式，则它是`连接中的元组谓词`：\n\
  ```\n( ∀t∈T1⊗T2: P(t) )\n```\n我们说`P`约束了`T1`和`T2`连接中的元组。\n\n在前面的定义中，你通常会发现表`T1`和`T2`是通过涉及连接属性的子集需求相关联的。\n\
  \n列表 6-11 展示了另外两个涉及表`EMP1`和`DEP1`的`连接中的元组谓词`实例。\n\n###### 列表 6-11. 更多关于表 `EMP1`\
  \ 和 `DEP1` 的连接中的元组谓词\n\n```\nP9 := ( ∀e∈EMP1: ( ∀d∈DEP1: e↓{deptno}=d↓{deptno} ⇒\n\
  \        (d(loc)='LOS ANGELES'⇒ e(job)≠'MANAGER') ) )\n\nP10 := ( ∀e∈EMP1: ( ∀d∈DEP1:\
  \ e↓{deptno}=d↓{deptno} ⇒\n         (d(loc)='SAN FRANCISCO'⇒ e(job)∈{'TRAINER','CLERK'})\
  \ ) )\n```\n`P9`指出经理不能被雇佣在洛杉矶。`P10`指出在旧金山工作的员工必须是培训师或办事员。根据图 6-10 中的示例值`EMP1`和`DEP1`，这两个命题都是`真（TRUE）`；没有经理在洛杉矶工作，并且所有在旧金山工作的员工——实际上没有这样的员工——都是培训师或办事员。\n\
  \n在本节中，我们定义了只涉及两个表的`连接中的元组谓词`。然而，使用连接操作符组合三个甚至更多的表通常也是有意义的。当然，这些连接中的元组也可以被元组谓词约束。以下是涉及三个表（`T1`、`T2`和`T3`）的`连接中的元组谓词`的模式：\n\
  ```\n( ∀t1∈T1: ( ∀t2∈T2: ( ∀t3∈T3: (t1↓A=t2↓A ∧ t2↓B=t3↓B) ⇒ P(t1∪t2∪t3) ) ) )\n\
  ```\n在此模式中，`A`代表表`T1`和`T2`的连接属性集，`B`代表表`T2`和`T3`的连接属性集。谓词`P`代表一个以连接中的元组为参数的谓词。在下一章中，你将看到涉及两个以上表的`连接中的元组谓词`示例。\n\
  \n\n\n#### 章节摘要\n\n本节以项目符号列表的形式提供了本章的摘要。你可以在继续下一节的练习之前，使用此摘要来检查对本章引入的各种概念的理解。\n\n\
  -   `元组谓词`是一种带有一个类型为元组的参数的谓词。它可以基于元组所具有的属性值的组合来接受（或拒绝）元组。\n-   `表谓词`是一种带有一个类型为表的参数的谓词。它可以基于表所包含的元组的组合来接受（或拒绝）表。\n\
  -   `数据库（多表）谓词`是一种带有一个类型为数据库状态的参数的谓词。它可以基于数据库状态所包含的表的组合来接受（或拒绝）数据库状态。\n-   表谓词和数据库谓词有五种常见模式：`唯一标识`、`子集要求`、`特化`、`泛化`和`连接中的元组`谓词。\n\
  -   `唯一标识`谓词是如下形式的表谓词（`T`代表一个表）：`( ∀t1,t2∈T: t1↓A=t2↓A ⇒ t1=t2 )`。\n    在此表达式中，`A`代表在表`T`中唯一标识元组的属性集合。\n\
  -   `子集要求`谓词是如下形式的谓词（`T1`和`T2`代表表）：`{ t1↓A| t1∈T1 } ⊆ { t2↓A| t2∈T2 }`。\n    在此表达式中，`A`通常代表在表`T2`中唯一标识元组的属性集合。\n\
  -   `特化`谓词是如下形式的数据库谓词（`T1`和`T2`代表表）：`{ t1↓A| t1∈T1 ∧ P(t1) } = { t2↓A| t2∈T2 }`。\n\
  \    在此表达式中，`A`代表在表`T1`和`T2`中唯一标识元组的属性集合。谓词`P`是一个指定表`T1`子集的谓词。我们称\"`T2`是`T1`的特化\"\
  。`T2`被认为持有表`T1`中由谓词`P`指定的元组子集的附加信息。\n-   如果给定的表`T`有多个特化，并且对于`T`中的每个元组，在其中一个特化表中恰好存在一个持有该元组附加信息的元组，那么表`T`被称为这些特化的`泛化`。\n\
  -   `连接中的元组`谓词是如下形式的谓词（`T1`和`T2`代表表）：`( ∀t1∈T1: ( ∀t2∈T2: t1↓A=t2↓A ⇒ P(t1∪t2) )\
  \ )`。\n    在此表达式中，`A`代表通常参与表`T1`和`T2`之间子集要求的属性集合。谓词`P`是一个元组谓词。\n\n7451CH06.qxd 5/14/07\
