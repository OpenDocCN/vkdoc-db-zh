  \n本节总结了本章内容，以项目符号列表格式呈现。在继续下一节的练习之前，你可以使用它来检查对本章引入的各种概念的理解程度。\n\n-   *表* 可以形式化地表示为一组函数，这些函数共享一个共同的域；你可以通过以*枚举方式*列出所有涉及的函数来指定这个集合。\n\
  -   表的元素被称为元组；元组中的有序对称为*属性-值对*。\n-   表中所有元组共享的域被称为该表的*表头*。\n-   我们通常将表绘制为行和列的*二维图像*（简写记法）。列标题代表表的表头，行代表表中的元组。\n\
