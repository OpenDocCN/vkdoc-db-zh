  \ */\n          , MAXCAP /* 最大参与容量 */\n          , TRAINER /* 培训师：员工编号 */\n    \
  \      , LOC } ) /* 地点 */\n       , (REG; -- 课程注册 (Course Registrations)\n     \
  \     { STUD /* 学员：员工编号 */\n          , COURSE /* 课程代码 */\n          , STARTS /*\
  \ 课程班次开始日期 */\n          , EVAL } ) /* 评估 */\n       , (HIST; -- 员工历史记录 (Employee\
  \ History Records)\n          { EMPNO /* 员工编号 */\n          , UNTIL /* 历史记录结束日期\
  \ */\n          , DEPTNO /* 部门编号 */\n          , MSAL } ) } /* 月薪 */\n```\n\n##\
  \ 表空间定义\n\n本节提供了示例数据库十个表空间的形式化定义。\n\n对于每个表，你将找到四个小节：\n\n-   表的`外部谓词`，向数据库用户描述表属性的含义。\n\
  -   `属性特征`，为每个属性附加`属性值集`。命名约定为 `chr_<表别名>`。\n-   `元组空间`，为表定义`元组约束`（如果有）。命名约定为 `tup_<表别名>`。\n\
