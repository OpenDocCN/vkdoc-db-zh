  \ | `TX_UEX` | 列出所有动态数据库约束 |\n\n### 鸟瞰概览\n\n\n图 A-1 展示了构成我们示例数据库设计的十个表（由圆角框表示）及其相互关系（由箭头表示）的示意图。\n\
  \n每条箭头都表示一对表之间适用的`子集要求`。这些`子集要求`表明，箭头起始表的某种投影应始终是箭头指向表的某种投影的子集。这些箭头大多代表了通常所说的`多对一关系`，并在最终的实现阶段将成为`外键约束`。\n\
  \n然而，正如你在第 11 章所见，情况并非总是如此。\n\n我们将在本附录的第五节中，在数据库宇宙规范 `DB_UEX` 中给出每条箭头的确切含义。\n\n\
  我们的数据库保存着公司的员工 (`EMP`) 和部门 (`DEPT`)。部分箭头表示以下关系：\n\n-   一名员工为一个部门工作。\n-   一个部门由一名员工管理。\n\
