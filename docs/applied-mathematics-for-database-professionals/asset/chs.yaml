  #### 基数与单元素集


  集合可以是*有限*的或*无限*的；然而，在处理数据库时，根据定义，你所有的集合都是有限的。对于每一个有限集合 `S`，其*基数*被定义为 `S` 中元素的个数。表示集合
  `S` 基数的常见记法是 `|S|`，即在竖线之间放入集合的名称（或说明）。然而，在本书中，我们更倾向于使用 `#` 符号（如定义 2-2 中所用）来表示基数运算符，因为我们已经在谓词性集合说明和替代性集合说明中大量使用了竖线。


  **■定义 2-2：集合的基数** 一个（有限）集合 `S` 的基数是 `S` 中元素的个数，记作 `#S`。


  **■注** 无限集也有基数概念，但本书不予讨论。


  代码清单 2-5 展示了一些集合及其基数的例子。


  **代码清单 2-5.** *基数示例*

  ```

