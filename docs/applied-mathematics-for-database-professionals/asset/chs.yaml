  \ `P-CNF`，具有以下格式：`P-CNF := C ∧ C ∧ C ∧ ... ∧ C_n`。\n\n在此公式中，`C_1`, `C_2`, ... `C_n`\
  \ 被称为合取项（conjunction members）——或简称合取项。每个合取项只能是简单谓词的迭代 OR（或）（注意也允许零次迭代，这会导致合取项不包含\
  \ OR 的调用）；简单谓词是指无法进一步分解为析取或合取的谓词（即，它不能是复合谓词）。这些简单谓词可以选择性地以一个否定连接词开头。注意，集合 `{∨, ∧,\
  \ ¬}` 是功能完备的，如第一章所述；因此，你不需要其他连接词来表达任何任意谓词。同样，我们稍后将证明，任何任意谓词都可以转化为 CNF。\n\nCNF 的完整详细形式如代码清单\
  \ 3-17 所示。\n\n`代码清单 3-17. 合取范式 (CNF)`\n\n```\nP-CNF := (SP_1a ∨ SP_1b ∨ SP_1c ∨\
  \ ... ∨ SP_1d) ∧\n         (SP_2a ∨ SP_2b ∨ SP_2c ∨ ... ∨ SP_2d) ∧\n         (SP_3a\
