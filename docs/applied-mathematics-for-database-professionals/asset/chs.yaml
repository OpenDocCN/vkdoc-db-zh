  \ 表达式重复了 `CRS` 的信息。\n\n## 第 10 章答案\n\n\n## 附录 E：部分习题答案\n\n## `习题 1`\n\n首先，涉及两个表约束：\n\
  \n```\n/* 与会者和开始日期唯一标识一个元组 */\n( ∀r1,r2∈R:\nr1↓{STARTS,STUD} = r2↓{STARTS,STUD}\
