  \n# 将模式修改锁与其他锁类型混合使用\n\n在同一事务中混合使用模式修改锁与其他锁类型会增加死锁的可能性。假设有两个会话。第一个会话启动事务并更新表中的一行。此时，它持有该行上的排他（`X`）锁和两个意向排他\n\
  \n\n\n# 第 23 章 ■ 模式锁\n\n（IX）锁，分别在页面和表上各有一个。如果另一个会话尝试读取（或更新）同一行，它将被阻塞。此时，它将等待该行上的共享（S）锁，然后在页面和表上持有意向共享（IS）锁。该阶段如图\
