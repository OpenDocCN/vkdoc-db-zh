  \ 阅读更多关于行级安全性的内容。\n\n#### 始终加密\n\n`始终加密` 是 SQL Server 2016 企业版的新功能，允许你在系统中按列加密 *静态数据*\
  \ 和 *传输中数据*。与其他类似技术相比，`始终加密` 有两个关键区别。\n\n首先，它几乎对客户端应用程序透明地执行数据的加密和解密，并且传输中数据加密不依赖于传输安全性（如\
  \ SSL 或 TLS）。其次，也是更重要的，它允许你在管理安全性的安全管理员和...\n\n\n# 第 5 章 ■ SQL SERVER 2016 特性\n\n\
  ## 始终加密概述\n\n始终加密使用两种类型的密钥来保护数据。列加密密钥（`CEK`）加密数据库中的数据。列主密钥（`CMK`）加密列加密密钥。加密后的 `CEK`\
  \ 存储在数据库中，而 `CMK` 存储在受信任的密钥存储区中，例如 Windows 证书存储、Azure 密钥保管库或硬件安全模块。必要时，也可以实现自定义密钥存储区。\n\
  \n数据库中的数据始终使用 `AEAD_AES_256_CBC_HMAC_SHA_256` 算法加密存储，SQL Server 永远不会解密它。所有解密操作都由客户端应用程序完成，它需要使用支持始终加密的客户端驱动程序。截至\
  \ 2016 年 8 月，Microsoft .Net 4.6、Microsoft JDBC 6.0 和 Windows ODBC 13.1 SQL Server\
  \ 驱动程序支持始终加密。此列表未来可能会有变化。\n\n应用程序需要在连接字符串中使用 `Column Encryption Setting` 属性来指明它能够处理始终加密。当\
  \ SQL Server 向此类应用程序发送加密数据时，会将一个加密的 `CEK` 以及 `CMK` 的位置附加到结果集。客户端驱动程序与密钥存储区通信，获取\
  \ `CMK`，用于解密 `CEK` 和列数据。\n\n类似的处理过程也发生在参数化查询中。驱动程序与 SQL Server 协作，确定哪些参数需要加密。它从\
  \ SQL Server 获取 `CEK` 和 `CMK` 的位置，从密钥存储区获取 `CMK`，然后在将查询发送到 SQL Server 之前加密参数值。所有加密和解密操作对客户端应用程序都是透明的，并且数据从未以未加密形式通过网络传输。还值得注意的是，驱动程序使用本地缓存来存储已解密的列加密密钥，以减少对密钥存储区的往返调用次数。\n\
  \n图 5-19 展示了始终加密的组件。\n\n**图 5-19. 始终加密工作流程**\n\n与服务器通信会增加额外的往返调用和网络流量。图 5-20 显示了当对具有加密\
  \ `ClientName` 列的表运行查询时，客户端应用程序执行的调用。如你所见，驱动程序调用了 `sp_describe_parameter_encryption`\
  \ 存储过程，该过程提供了有关加密列的信息。\n\n![](img/index-158_1.jpg)\n\n**图 5-20. 启用始终加密时的客户端/SQL\
  \ Server 通信**\n\n始终加密支持两种不同类型的加密。*确定性加密* 对于任何给定的未加密值始终生成相同的加密值，这允许你在加密列上创建索引并将其用于点查找搜索、等值连接和分组。然而，确定性加密通过允许未经授权的用户检查加密数据中的模式并猜测其值，增加了安全风险。如果可能的加密值数量相对较少，确定性加密不是最佳选择。\n\
  \n第二种加密类型，*随机化加密*，在每次加密时生成随机值。它比确定性加密更安全；但是，它阻止了在加密列上进行搜索、分组和连接。\n\n与始终加密相关的还有一些其他限制。最值得注意的是：\n\
  *   以下数据类型无法加密：`xml`、`timestamp/rowversion`、`image`、`(n)text`、`sql_variant`、`hierarchyid`、`geography`、`geometry`\
  \ 和用户定义类型。\n*   文本列（`(n)char` 和 `(n)varchar`）必须具有二进制 `BIN2` 排序规则才能被加密。\n*   加密列不能有\
  \ `DEFAULT` 或 `CHECK` 约束。\n\n\n# SQL Server 2016 功能特性\n\n使用随机化加密的列无法被索引、定义为 `UNIQUE`，或参与\
  \ `PRIMARY KEY` 或 `FOREIGN KEY` 约束。\n\n`注意` 您可以在以下网址查看完整的限制列表：[`https://msdn.microsoft.com/en-us/library/mt163865.aspx`](https://msdn.microsoft.com/en-us/library/mt163865.aspx)\n\
  \n正如您可能猜到的那样，加密值需要额外的存储空间。存储开销相当显著，特别是对于较小的数据类型。所有在明文状态下存储空间小于 16 字节的数据类型，在加密后将使用\
  \ 65 字节。对于使用 16 字节或更多字节的数据，存储空间可根据以下公式计算：\n\n```\n1 + 32 + 16 + (FLOOR(DATALENGTH(plain_text_length)/16)\
  \ + 1) * 16\n```\n\n例如，一个 16 字节的 `uniqueidentifier` 值在加密后将使用 81 字节。显然，如果您决定加密一个宽表，应该记住\
  \ `IN_ROW` 数据的 8,060 字节行大小限制。\n\n## 可编程性\n\n正如我已经提到的，\"始终加密\"功能对应用程序几乎是*透明的*。所有的加密和解密操作都由驱动程序完成，您只需在连接字符串中设置\
  \ `Column Encryption Setting=enabled` 属性来启用始终加密。\n\n然而，有一个陷阱。一旦数据被加密，SQL Server\
  \ 就无法将其解密以执行任何需要解密数据的操作。以包含加密 `Salary` 列的 `dbo.Employees` 表为例。SQL Server 将无法执行 `SELECT\
  \ * FROM dbo.Employees WHERE Salary >= @Salary` 语句，因为它无法解密 `Salary` 列的数据来评估谓词。同样，SQL\
  \ Server 无法使用 `LIKE` 运算符执行子字符串搜索，也无法使用 `LEN` 函数计算加密字符串列的长度。所有这些查询都将失败，您需要更改客户端应用程序，并在数据解密后在那里实现所有逻辑。在许多情况下，这还将要求客户端应用程序通过网络传输更多数据。\n\
  \n使用随机化加密的列不能用于任何谓词、连接条件或分组。随机化加密对相同的输入生成不同的值，因此，SQL Server 无法在不解密的情况下比较数据。另一方面，确定性加密保证相同输入产生相同的加密值，SQL\
  \ Server 可以对加密数据执行相等性比较，这允许您在点查找搜索、相等连接和分组中引用使用确定性加密的列。您还可以对使用确定性加密的列创建索引来优化这些用例。\n\
  \n相等性比较是确定性加密唯一支持的操作。例如，带有 `Salary = @Salary` 谓词的查询在确定性加密下可以工作，而 `Salary >= @Salary`\
  \ 谓词无论使用何种加密类型都会导致查询失败。\n\n始终加密不支持临时非参数化查询，并且要求在插入数据或更新加密列时使用参数。对于使用确定性加密的列进行相等性搜索谓词时，也应使用参数。尽管这些要求看起来像是限制，但消除临时工作负载可以减少执行计划的缓存内存消耗，并可能提高系统性能。尽管如此，这可能需要在客户端应用程序中进行代码更改。\n\
  \n## 安全注意事项与密钥管理\n\n始终为工作选择正确的工具非常重要，而\"始终加密\"与其他 SQL Server 加密技术相比有一个关键区别。它是唯一允许您实现`职责分离`安全概念的技术，将业务中的安全管理员和数据库管理员的角色分开。当不需要这种分离时，其他\
  \ SQL Server 加密技术可能完全是可行的选择。\n\n\n\n服务器技术会是更好的解决方案。例如，使用`透明数据加密`(TDE)和/或`列级加密`配合`SSL/TLS`来保障传输安全，可以更轻松地对静态数据进行加密。\n\
  \n此外，实施职责分离从来不仅限于技术层面。它要求企业定义并采纳正式的策略和流程，技术只是为这些提供支持。例如，实施`始终加密`的先决条件之一就是定义密钥管理流程，该流程概述了安全密钥应如何生成、存储、备份和轮换。\n\
  \n通常，安全管理员应该在独立于`SQL Server`的计算机上生成`CMK`和`CEK`。这将防止托管`始终加密`数据的计算机的恶意管理员访问磁盘或计算机内存中的密钥。在密钥生成后备份这些密钥，并将备份存储在安全的物理位置也至关重要。\n\
  \n密钥轮换是安全的另一个重要因素。`始终加密`允许你轮换`CMK`和`CEK`，既可以通过`SSMS`，也可以使用`T-SQL`来完成。轮换`CMK`意味着用旧密钥解密所有`CEK`，然后用新密钥重新加密它们。这是一个非常快的操作。另一方面，轮换`CEK`则需要你解密并加密所有表数据，这对于大表来说可能非常耗时。\n\
  \n最后，重要的是要记住，在使用`始终加密`时，数据是在驱动程序级别解密，并以明文形式存储在内存中。一些安全标准和法规要求应用程序即使在内存中也要保持某些数据的加密状态。例如，`支付卡行业`(PCI)标准要求你始终加密所有信用卡号。在这种情况下，你应该将`始终加密`与其他技术结合使用。\n\
  \n**注意** 你可以在 [`msdn.microsoft.com/en-us/library/mt163865.aspx`](https://msdn.microsoft.com/en-us/library/mt163865.aspx)\
  \ 阅读更多关于`始终加密`以及如何配置和使用它的信息。\n\n## 第 5 章 ■ SQL SERVER 2016 功能\n\n#### 动态数据屏蔽\n\n\
  动态数据屏蔽允许你通过对结果集中的敏感列内容进行屏蔽来隐藏它。你可以混淆整个列数据或仅部分值；例如，允许用户查看信用卡号或社会安全号码的最后四位数字。\n\n\
  动态数据屏蔽在列级别工作，并由`UNMASK`权限控制。拥有此权限的用户将在结果集中看到未屏蔽的数据，而没有该权限的用户将看到混淆后的数据。例如，你可以将`CreditCardNumber`列上的`UNMASK`权限授予`Accounting`组，该组将看到未屏蔽的值。而`Call\
  \ Center`组则不应拥有此权限，并将看到被屏蔽的值。\n\n屏蔽规则由`屏蔽函数`控制。`SQL Server 2016 RTM`支持四种屏蔽函数，如下所述。值得注意的是，`NULL`值将始终显示为`NULL`。\n\
  \n-   `default()`返回数据类型的默认值。例如，该函数对数值数据类型使用`0`，对日期时间信息使用`1900-01-01`。对于文本数据，它用`XXXX`字符替换文本。\n\
  -   `email()`通过显示电子邮件的第一个实际字母，并用`xxx@XXXX.com`替换其余部分，来屏蔽电子邮件地址的值。例如，一个`tg@grohser.at`电子邮件地址将被替换为`txxx@XXXX.com`值。\n\
  -   `random()`仅适用于数字数据类型(`int`、`float`、`money`等)，并用作为函数参数指定的区间内的随机值替换数据。\n-   `partial()`是最灵活的函数，允许你定义用于屏蔽的自定义字符串。它接受三个参数，如`prefix`、`padding`和`suffix`。前缀和后缀是定义数量的整数值。\n\
  \n\n\n文本开头和结尾的字符由原始值填充。可选的填充值控制着屏蔽模式。\n\n清单 5-18 展示了动态数据屏蔽的实际操作。代码创建了一个表，其中多个列使用不同的屏蔽函数进行屏蔽。然后，在有和没有\
  \ `UNMASK` 权限的用户上下文中执行了两次 `SELECT` 查询。\n\n**清单 5-18.** 动态数据屏蔽实战\n\n```sql\ncreate\
  \ table dbo.Consultants\n(\n    ID int not null,\n    FirstName varchar(32)\n  \
  \      masked with (function='partial(1,\"XXXXXXXX\",0)') not null,\n    LastName\
  \ varchar(32) not null,\n    DateOfBirth date\n        masked with (function='default()')\
  \ not null,\n    SSN char(12)\n        masked with (function='partial(0,\"XXX-XXX-\"\
  ,4)') not null,\n    EMail nvarchar(255)\n        masked with (function='email()')\
  \ not null,\n    SpendingLimit money\n        masked with (function='random(500,1000)')\
  \ not null\n);\n\n![](img/index-161_1.jpg)\n\n![](img/index-161_2.jpg)\n\n第 5 章\
