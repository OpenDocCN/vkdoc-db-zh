- "# 第 33 章：基于列的存储与批处理模式执行\n\n## 压缩与存储大小\n\n我们已经了解到，列存储索引中的数据经过高度压缩，与页面压缩相比也能显著节省空间。此外，SQL\
  \ Server 2014 引入了另一种称为 `归档压缩` 的压缩选项。它可以通过指定 `DATA_COMPRESSION=COLUMNSTORE_ARCHIVE`\
  \ 列存储索引属性来应用于整个索引或单个分区，从而进一步减少存储空间。它使用 Xpress 8 压缩库，这是 Microsoft 对 LZ77 算法的内部实现。这种压缩直接处理二进制数据，无需了解底层\
  \ SQL Server 数据结构。\n\n归档压缩与其他 SQL Server 功能透明协作。列存储数据在保存到磁盘时被压缩，在加载到内存之前被解压缩。\n\n\
  让我们比较一下不同压缩方法的结果。我创建了四个模式相同的表，如代码清单 33-9 所示。前两个表是堆表，没有定义非聚集索引。第一个表未压缩，第二个表使用页面压缩。第三和第四个表具有聚集列存储索引（下一章将详细介绍），分别使用\
  \ `COLUMNSTORE` 和 `COLUMNSTORE_ARCHIVE` 压缩方法进行压缩。每个表都有大约 6200 万行数据，这些数据基于 `AdventureWorksDW2012`\
  \ 数据库中的 `dbo.FactResellerSales` 表生成。\n\n### 代码清单 33-9. 测试表的模式\n\n```sql\ncreate\
  \ table dbo.FactSalesBig\n(\n    ProductKey int not null,\n    OrderDateKey int\
  \ not null,\n    DueDateKey int not null,\n    ShipDateKey int not null,\n    CustomerKey\
  \ int not null,\n    PromotionKey int not null,\n    CurrencyKey int not null,\n\
  \    SalesTerritoryKey int not null,\n    SalesOrderNumber nvarchar(20) not null,\n\
  \    SalesOrderLineNumber tinyint not null,\n    RevisionNumber tinyint not null,\n\
  \    OrderQuantity smallint not null,\n    UnitPrice money not null,\n    ExtendedAmount\
  \ money not null,\n    UnitPriceDiscountPct float not null,\n    DiscountAmount\
  \ float not null,\n    ProductStandardCost money not null,\n    TotalProductCost\
  \ money not null,\n    SalesAmount money not null,\n    TaxAmt money not null,\n\
  \    Freight money not null,\n    CarrierTrackingNumber nvarchar(25) null,\n   \
  \ CustomerPONumber nvarchar(25) null,\n    OrderDate datetime null,\n    DueDate\
  \ datetime null,\n    ShipDate datetime null\n)\n```\n\n表 33-5 比较了所有四种压缩方法的磁盘占用大小。\n\
  \n**表 33-5. 不同压缩方法对应的磁盘数据大小**\n\n| 堆表（无压缩） | 堆表（页面压缩） | 列存储压缩 | 归档压缩 |\n| :--- |\
  \ :--- | :--- | :--- |\n| 10,504 MB | 2,440 MB | 831 MB | 362 MB |\n\n显然，不同的表模式和数据会导致不同的压缩结果；然而，在大多数情况下，实施归档压缩将实现**显著**更大的空间节省。归档压缩在压缩和解压缩时会带来额外的\
  \ CPU 开销。\n\n代码清单 33-8 显示了一个查询，用于展示本章前面创建的 `dbo.FactSales` 表的分配单元。\n\n### 代码清单 33-8.\
  \ `dbo.FactSales` 表的分配单元\n\n```sql\nselect i.name as [Index], p.index_id, p.partition_number\
  \ as [Partition]\n,p.data_compression_desc as [Compression], u.type_desc, u.total_pages\n\
  from sys.partitions p join sys.allocation_units u on\np.partition_id = u.container_id\n\
  join sys.indexes i on\np.object_id = i.object_id and p.index_id = i.index_id\nwhere\
  \ p.object_id = object_id(N'dbo.FactSales')\n```\n\n如图 33-20 所示，列存储索引存储为 `LOB_DATA`。值得注意的是，此索引具有\
  \ `IN_ROW_DATA` 分配单元；但是，这些分配单元不存储任何数据。如果没有 `IN_ROW_DATA` 分配，索引中就不可能存在 `LOB_DATA`\
  \ 分配。\n\n**图 33-20. `dbo.FactSales` 表的分配单元**\n\n"
- '# 列存储压缩与元数据查询


  让我们运行一个查询，该查询在表的 20 个列上执行 `MAX()` 聚合。查询结果没有意义；然而，它迫使 SQL Server 从表中每个行组的 20 个不同列段中读取数据。清单
  33-10 展示了该查询。


  **清单 33-10.** 测试查询


  ```sql

  select max(ProductKey),max(OrderDateKey),max(DueDateKey),max(ShipDateKey),max(CustomerKey)

  ,max(PromotionKey),max(CurrencyKey),max(SalesTerritoryKey),max(SalesOrderLineNumber)

  ,max(RevisionNumber),max(OrderQuantity),max(UnitPrice),max(ExtendedAmount)

  ,max(UnitPriceDiscountPct),max(DiscountAmount),max(ProductStandardCost)

  ,max(TotalProductCost)

  ,max(SalesAmount),max(TaxAmt),max(Freight)

  from dbo.FactSalesBig;

  ```


  表 33-6 说明了针对具有不同列存储压缩方法的表执行该查询的执行时间。即使使用归档压缩的数据在磁盘上占用的空间显著减少，但由于涉及解压缩开销，查询完成所需的时间更长。显然，结果会根据系统的
  CPU 和 I/O 性能而有所不同。


  **表 33-6.** 不同压缩方法的执行时间

  *   **列存储压缩**（经过时间/CPU 时间）：1,458 ms / 4,733 ms

  *   **列存储归档压缩**（经过时间/CPU 时间）：1,774 ms / 6,098 ms


  归档压缩是静态、极少访问数据的绝佳选择，我想重申一下，它可以基于每个索引分区使用。数据仓库通常会保留长时间的数据，即使历史数据很少被访问。您可能希望考虑对存储旧数据的分区应用归档压缩，并从中获益于其节省的磁盘空间。


  #### 元数据


  SQL Server 提供了几个与列存储索引相关的目录和数据管理视图。接下来描述的两个目录视图在 SQL Server 2012-2016 中有效。我们将在下一章中查看其他视图。


  ### sys.column_store_segments


  `sys.column_store_segments` 视图为每个列的每个段返回一行。


  清单 33-11 展示了一个查询，该查询返回有关在 `dbo.FactSales` 表上定义的 `IDX_FactSales_ColumnStore` 列存储索引的信息。这里有几个需要注意的地方。首先，该视图不返回索引的
  `object_id` 或 `index_id`。这不是问题，因为一个表只能定义一个列存储索引。但是，当需要时，您需要使用 `sys.partitions` 视图来获取
  `object_id`。


  其次，与常规 B-Tree 索引类似，非聚集列存储索引包含一个 *row-id*，它要么是堆表中行的地址，要么是聚集索引键值。在后一种情况下，即使您没有在 `CREATE
  COLUMNSTORE INDEX` 语句中显式定义它们，聚集索引的所有列也会包含在列存储索引中。但是，这些列不会存在于 `sys.index_columns`
  视图中，如果您想获取列名，则需要使用外连接。


  **清单 33-11.** 检查 `sys.column_store_segments` 视图


  ```sql

  select p.partition_number as [partition], c.name as [column], s.column_id, s.segment_id

  ,p.data_compression_desc as [compression], s.version, s.encoding_type, s.row_count

  , s.has_nulls, s.magnitude,s.primary_dictionary_id, s.secondary_dictionary_id,

  , s.min_data_id, s.max_data_id, s.null_value

  , convert(decimal(12,3),s.on_disk_size / 1024.0 / 1024.0) as [Size MB]

  from sys.column_store_segments s join sys.partitions p on

  p.partition_id = s.partition_id

  join sys.indexes i on

  p.object_id = i.object_id

  left join sys.index_columns ic on

  i.index_id = ic.index_id and

  i.object_id = ic.object_id and

  s.column_id = ic.index_column_id

  left join sys.columns c on

  ic.column_id = c.column_id and

  ic.object_id = c.object_id

  where i.name = ''IDX_FactSales_ColumnStore''

  order by p.partition_number, s.segment_id, s.column_id

  ```


  '
