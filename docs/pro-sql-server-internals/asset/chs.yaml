  视图检测此类查询，如代码清单 28-17 所示。


  ***代码清单 28-17.*** 检测失控查询


  ```sql

  select top 10

  er.session_id, er.start_time, er.cpu_time, er.status, er.command, er.blocking_session_id

  ,er.wait_time, er.wait_type, er.last_wait_type, er.logical_reads

  ,substring(qt.text, (er.statement_start_offset/2)+1,

  (( case er.statement_end_offset

  when -1 then datalength(qt.text)

  else er.statement_end_offset

  end - er.statement_start_offset)/2)+1) as SQL

  from

  sys.dm_exec_requests er with (nolock)

  cross apply sys.dm_exec_sql_text(er.sql_handle) qt

  order by cpu_time desc

  ```


  你可以使用 `KILL` 命令终止一个包含失控查询的会话。然而，你应该谨慎行事，并分析该会话正在做什么。当你终止会话时，`SQL Server` 会回滚活动会话事务，在大量数据修改的情况下，这可能会非常耗时且消耗资源。完全有可能，允许会话完成任务是更快、更好的选择。


  你还可以考虑使用 `资源调控器` 来防止任务消耗所有 `SQL Server` 资源。如果一台服务器托管属于多个系统的多个数据库，这可能特别有用。你可以将不同系统的连接分离到不同的资源池中，配置方式要确保为每个系统都留出一些可用资源。


  ## 使用基准线工作


  正如你已经注意到的，我在本章中经常提到*基准线*。创建基准线是任何数据库和 IT 专业人员的必备任务。它使你能够积极主动，在问题变得明显并影响系统健康与性能之前的早期阶段就发现它们。


  许多性能计数器和指标本身用途非常有限。其中一些具有指示问题的阈值或*不良*值；然而，*良好*值并不总是能保证系统是健康的。观察动态变化和趋势，监控值的变化总是有益的。


  考虑*页面预期寿命*计数器。对于拥有 64 GB 内存的服务器来说，10,000 的值是非常健康的。然而，如果上周它是 50,000，那就表明有情况发生了变化。也许上次部署删除了一些索引或引入了未优化的查询，从而引发了沉重的
  I/O 负载。随时间监控页面预期寿命值使你能够积极主动，并在问题开始影响系统的其他部分之前启动调查和处理。


  另一个很好的例子是 I/O 子系统性能。每个 I/O 子系统都有某个临界点，超过该点后性能会随着负载的增加而呈指数级下降。在初始部署之前确定极限，并监控 I/O
  负载随时间的变化，确保仍有增长空间，这总是有益的。基准线将有助于你进行监控和分析。


  ■ **提示** 你可以在初始部署之前使用 `DiskSpd` 实用程序对 I/O 子系统进行压力测试。你可以从 [`gallery.technet.microsoft.com/DiskSpd-a-robust-storage-6cd2f223`](https://gallery.technet.microsoft.com/DiskSpd-a-robust-storage-6cd2f223)
  下载它。


  市场上有很多工具可以帮助你自动化基准线的创建和监控。然而，你也可以轻松地手动实现，通过使用各种数据管理对象和通过 `sys.dm_os_`



  `performance_counters`（性能计数器）视图。我们已经讨论了其中相当多的计数器，显然，你可以根据需要扩展其他信息。


  捕获系统工作负载的信息至关重要，这包括连接数、批处理数、每秒事务数、数据库大小以及其他类似指标。这将帮助你分析趋势，将工作负载与系统负载关联起来，并在需要时进行容量分析。


  捕获系统关键代码部分性能信息也非常有益。应用程序开发者可以收集并持久化最关键查询和/或存储过程的响应时间，这将使你能够监控趋势，确保关键代码始终表现令人满意。


  ## 第 28 章 ■ 系统故障排除


  最后，创建基线是系统故障排除中非常有用的第一步。它帮助你评估是否达到了预期的结果，然后你可以向管理层或客户进行展示。


  #### 总结


  数据库并非在真空环境中运行。它们是一个大型生态系统的一部分，该系统包含各种硬件和软件组件。客户端应用程序的响应迟缓和无法响应，不一定与数据库或`SQL Server`相关。问题的根本原因可能存在于系统中的任何地方，从硬件配置错误到不正确的应用程序代码。


  在故障排除过程中，检查整个系统基础设施作为初始步骤非常重要。这包括硬件的性能特征、网络拓扑和吞吐量、操作系统和`SQL Server`配置、进程以及服务器上运行的数据库。


  `SQL Server`由几个主要组件组成，包括协议层、查询处理器、存储引擎、实用工具和`SQL Server 操作系统 (SQLOS)`。`SQLOS`是 Windows
  与所有其他`SQL Server`组件之间的层，负责调度、资源管理以及其他一些低级任务。


  `SQLOS`创建的调度器数量等于系统中的逻辑处理器数量。每个调度器负责管理一组执行工作的工作者。在执行期间，每个任务被分配给一个或多个工作者。


  任务在执行期间主要保持三种状态之一：`running`（正在调度器上执行）、`runnable`（等待调度器执行）和`suspended`（等待资源）。`SQL
  Server`跟踪不同类型等待的累计等待时间，并将此信息提供给用户。等待统计信息分析是一种常见的性能故障排除技术，它分析主要的系统等待类型并消除等待的根本原因。


  通过收集和监控系统中的各种性能和负载指标来创建基线至关重要。基线帮助你在问题开始影响用户之前，主动在早期阶段检测和解决问题。它显示了系统行为和负载如何随时间变化，这有助于容量分析并防止系统规模超出硬件能力的情况。


  ## 第 29 章 查询存储


  `查询存储`是`SQL Server 2016`的一个新组件，用于收集系统中查询的执行计划和运行时统计信息。它帮助你检测次优查询，展示执行计划如何随时间演变，并允许你强制使用特定计划以解决参数嗅探相关问题。


  本章概述了`查询存储`，解释了它如何集成到查询处理流水线中，并演示了如何在系统监控和性能故障排除期间使用它。


  ### 为何需要查询存储？


  尽管每个数据库系统都是独特的，但每个数据库专业人员都必须处理一些常见的任务和问题。性能调优也许是其中最常见的一个。



  '
- '# 性能调优与查询存储


  性能调优是一个复杂的过程。它涵盖许多主题，例如硬件、操作系统与 SQL Server 的安装和配置，以及应用程序与数据库设计等等。查询优化是首要任务之一。这里的关键挑战在于选择优化哪些查询。对系统中的所有查询进行优化既不可能也不可行，你需要专注于那些能带来最佳投资回报的查询。实际上，这意味着那些频繁执行、引入大量
  I/O 活动和/或消耗大量 CPU 与内存的查询。


  检测这类查询并非总是易事。尽管 SQL Server 会为缓存的执行计划保留运行时执行统计信息，但它有一些限制。执行计划可能因各种原因从缓存中被移除，或者根本未被缓存；例如，当使用语句级重编译时。最后，计划缓存的运行时统计信息不会持久保存在数据库中，并且会在
  SQL Server 重启时被清除。


  你可以通过使用`Extended Events`捕获查询运行时统计信息来解决其中一些限制；然而，这需要在事后进行复杂分析，并且在本已繁忙的服务器上也可能引入性能开销。


  数据库专业人员需要解决的第二类常见问题是参数嗅引所引入的性能回归。正如你在第 26 章会回忆起的，SQL Server 会因为统计信息更新而重编译查询，而在重编译时出现的非典型参数值可能导致低效的执行计划被缓存和重用。


  可以主动保护关键查询免受此类问题影响。但这通常需要索引或查询提示、计划指南或代码变更。这些方法都有其缺点，尤其是在可维护性方面。实际上，数据库专业人员通常是在问题已经在系统中发生、用户已报告性能问题后，才被动地处理这些问题。


  幸运的是，查询存储有助于应对这两个挑战。你可以将其视为`SQL Server 飞行数据记录器`；启用查询存储后，SQL Server 会捕获并持久保存数据库中查询的运行时统计信息和执行计划。它向你展示执行计划如何随时间演变，并允许你强制查询使用特定的执行计划。


  © Dmitri Korotkevitch 2016


  D. Korotkevitch, *Pro SQL Server Internals*, DOI 10.1007/978-1-4842-1964-5_29


  ![](img/index-592_1.jpg)


  ## 第 29 章 ■ 查询存储


  `查询存储`在`SQL Server 2016`的所有版本以及`Microsoft Azure SQL 数据库`中均可用。启用时，它会给`SQL Server`带来一些开销；然而，这种开销相对较小。我们将在本章后面讨论如何监控此类开销。


  #### 查询存储配置


  `查询存储`是一个数据库级别的功能，默认是禁用的。你可以在`SQL Server Management Studio (SSMS)`中或使用`T-SQL`命令`ALTER
  DATABASE SET QUERY_STORE = ON`来启用它。


  `查询存储`可以在两种操作模式下运行。在默认的`READ_WRITE`模式下，`SQL Server`收集执行计划和运行时统计信息并持久保存到`查询存储`中，并允许你对其进行操作。在`READ_ONLY`模式下，你可以从`查询存储`中查询数据；但是，`SQL
  Server`不会在那里收集任何新信息。你可以使用`ALTER DATABASE SET QUERY_STORE (OPERATION_MODE = mode)`命令来设置操作模式。


  `SSMS`界面有点令人困惑。你可以通过`数据库属性`窗口的`查询存储`页面访问其配置。在`常规`组中有两个`操作模式`设置可用，如图 29-1 所示。`操作模式（实际）`显示`查询存储`是否已启用及其当前模式。`操作模式（请求）`允许你选择新的值或禁用`查询存储`，该更改将在应用后生效。


  '
- '# 第 29 章：查询存储


  #### 查询存储配置


  ***图 29-1.** SSMS 中的查询存储配置*


  为了降低开销，查询存储将最近捕获的信息保存在内存缓存中，并根据 `DATA_FLUSH_INTERVAL_SECONDS` 设置（SSMS 中的 **数据刷新间隔（分钟）**）定义的计划将其刷新到磁盘，默认值为
  15 分钟。简而言之，该值控制了在 SQL Server 崩溃事件中将丢失的已捕获数据量。


  查询存储在由 `INTERVAL_LENGTH_MINUTES` 设置（SSMS 中的 **统计信息收集间隔**）控制的固定时间间隔上聚合运行时统计信息，默认值为
  60 分钟。减小此间隔可提供更好的粒度；但是，它可能会增加存储信息所需的磁盘空间。不幸的是，SQL Server 不允许指定任意值，您应从以下值中选择：1、5、10、15、30、60
  或 1440 分钟。


  您可以使用 `MAX_STORAGE_SIZE_MB` 设置（SSMS 中的 **最大大小 (MB)**）控制查询存储磁盘上表的大小。一旦达到该大小，查询存储将变为只读。默认情况下，SQL
  Server 2016 RTM 允许查询存储使用最多 100 MB 的磁盘空间。您应记住查询存储表位于主文件组中，并在设计数据库布局和灾难恢复策略时考虑这一点。


  查询存储清理策略可以通过 `STALE_QUERY_THRESHOLD_DAYS` 设置（SSMS 中的 **陈旧查询阈值（天）**）和 `SIZE_BASED_CLEANUP_POLICY`
  设置（SSMS 中的 **基于大小的清理模式**）进行配置。第一个设置指定信息在查询存储中保留的时间。第二个设置控制自动清理过程，当查询存储空间使用约达 80%
  时运行，并删除最不重要的查询信息。


  > **重要提示** SQL Server 2016 RTM 存在一个错误，会阻止除 Enterprise 和 Developer 版本外的其他版本执行自动数据清理。您应使用
  `ALTER DATABASE SET QUERY_STORE (CLEANUP_POLICY = (STALE_QUERY_THRESHOLD_DAYS =
  0), SIZE_BASED_CLEANUP_MODE = OFF)` 命令在受影响的版本中禁用它，并实施手动清理，我们将在本章后面讨论。此错误已在 CU1 中修复。


  `QUERY_CAPTURE_MODE` 设置（SSMS 中的 **查询存储捕获模式**）控制捕获哪些查询。它有三个值：`ALL`、`NONE` 或 `AUTO`。前两个值不言自明。最后一个值会触发一个内部算法来过滤掉不重要的查询。


  最后，`MAX_PLAN_PER_QUERY` 设置限制了为每个查询维护的计划数量。此设置在 SSMS 中不可用。


  `sys.database_query_store_options` 视图提供了有关当前查询存储配置设置及其大小的信息。


  #### 查询存储内部原理


  从内部来看，查询存储由两个相关的部分组成：*计划存储* 和 *运行时统计信息存储*。SQL Server 在查询编译和执行阶段都会与它们进行交互。当查询编译时，SQL
  Server 与 *计划存储* 交互，更新其数据并检查是否有可用的强制计划。在查询执行期间，SQL Server 在 *运行时统计信息存储* 中更新其执行统计信息。


  如您所知，每个存储都由一个内存缓存和磁盘数据组成。新信息被放入缓存，并根据 `DATA_FLUSH_INTERVAL_SECONDS` 设置定义的计划异步写入磁盘。内存缓存也可以通过
  `sys.sp_query_store_flush_db` 存储过程手动刷新。当您从查询存储查询数据时，SQL Server 会合并来自两个来源的数据。


  图 29-2 展示了 SQL Server 查询存储的高级工作流程。


  ![](img/index-594_1.jpg)


  ![](img/index-594_2.jpg)


  ***图 29-2.** SQL Server 查询存储的高级工作流程*


