  \ 23-4 所示。\n\n**图 23-4.** 混合使用 DDL 和 DML 语句导致的死锁：步骤 2\n\n#### 多会话与锁兼容性\n\n我们尚未涉及的一个重要点是，当超过两个会话竞争同一资源时的锁兼容性。让我们看几个例子。\n\
  \n如表 23-2 所示，第一个会话（`SPID=55`）在该行上持有一个共享（S）锁。第二个会话（`SPID=54`）正试图在同一行上获取一个独占（X）锁，但由于锁不兼容而被阻塞。第三个会话（`SPID=53`）在`READ\
  \ COMMITTED`事务隔离级别下读取同一行。该会话未被阻塞。\n\n**表 23-2.** 多会话与锁兼容性（READ COMMITTED 隔离级别）\n\
