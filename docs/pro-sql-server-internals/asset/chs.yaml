  \ in Row` 列表示数据列在行中的起始偏移量。`Max Length` 列指定了该列使用了多少字节的数据。最后，`Column Type` 列显示了该列的系统数据类型。\n\
  \n***图 1-20.** 表修改：修改前的列偏移量*\n\n现在，让我们执行一些修改操作，如 代码清单 1-19 所示。\n\n***代码清单 1-19.***\
