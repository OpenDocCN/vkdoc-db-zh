  此列表仅是分析的起点，除了基本配置问题外，并未涵盖其他内容，也未向您提供有关瓶颈和系统运行状况的任何信息。尽管如此，作为系统故障排除的初始阶段，它还是很有用的。


  #### 资源调控器概述


  SQL Server 企业版附带另一项有用功能，称为 `资源调控器`。它允许您将不同的工作负载模式和会话分离到不同的 `工作负载组` 中。分类通过一个用户定义的函数（称为
  `分类器函数`）完成，SQL Server 在登录阶段调用此函数。分类器函数根据用户定义的标准执行分类；例如，登录名、主机或应用程序名称。


  工作负载组允许您指定多个参数，例如 `MAXDOP`（最大并行度）、要执行的最大并发请求数、用于查询内存授予的工作空间内存百分比（稍后详述）以及其他一些参数。此外，每个工作负载组都与一个
  `资源池` 相关联，该资源池允许您为关联的工作负载组自定义或限制资源使用。


  SQL Server 文档将资源池称为主实例内部的虚拟 SQL Server 实例。但我认为这并不准确。资源池并未提供足够的相互隔离；然而，它们确实允许您配置某些参数，例如设置关联性、限制
  CPU 带宽以及控制用于内存授予的工作空间内存。在 SQL Server 2014 和 2016 中，您还可以控制磁盘吞吐量。不过，`资源调控器` 不允许您控制缓冲池使用量；它在所有池之间是共享的。



  系统中有两种工作负载组和资源池：`internal` 和 `default`。顾名思义，第一种处理内部工作负载，第二种负责所有未分类的工作负载。实际上，你可以更改默认工作负载组的参数——例如，减少最大内存授予的大小——而无需创建其他用户定义的工作负载组和资源池。


  图 28-1 展示了一个资源配置器的配置示例。它描绘了一个将面向客户的 OLTP 与内部报告活动分离的场景，从而避免了报告查询占满磁盘吞吐量和 CPU 的情况。另一个常见示例是为维护活动创建独立的工作负载和资源池，通过限制这些操作的磁盘吞吐量来减轻索引维护或数据库一致性检查的影响。


