- "# 第 1 章 ■ 数据存储内部原理\n\n## LOB 存储\n\n对于 `text`、`ntext` 或 `image` 列，SQL Server 默认将数据存储在行外。它使用另一种称为\
  \ `LOB 数据页面` 的页面。\n\n**注意** 你可以在一定程度上通过使用“行内文本”表选项来控制此行为。例如，`exec sp_table_option\
  \ dbo.MyTable, 'text in row', 200` 强制 SQL Server 将小于或等于 200 字节的 LOB 数据存储在行内。大于 200\
  \ 字节的 LOB 数据将存储在 LOB 页中。\n\n逻辑 LOB 数据结构如 图 1-13 所示。\n\n## 图 1-13. LOB 数据：逻辑结构\n\n\
  与行溢出数据类似，这里有一个指向另一段信息的指针，称为 `LOB 根结构`，其中包含一组指向其他数据页和行的指针。当 LOB 数据小于 32 KB 并且可以放入五个数据页时，LOB\
  \ 根结构包含指向实际 LOB 数据块的指针。否则，LOB 树开始包含额外的中间级指针，类似于索引 B 树，我们将在下一章讨论。\n\n让我们创建表并插入一行数据，如\
  \ 清单 1-12 所示。我们需要将 `replicate` 函数的第一个参数强制转换为 `varchar(max)`。否则，`replicate` 函数的结果将被限制为\
  \ 8,000 字节。\n\n### 清单 1-12. LOB 数据：表创建\n\n```sql\ncreate table dbo.TextData\n(\n\
  \    ID int not null,\n    Col1 text null\n);\n\ninsert into dbo.TextData(ID, Col1)\
  \ values (1, replicate(convert(varchar(max),'a'),16000));\n```\n\n该表的页分配情况如 图 1-14\
  \ 所示。\n\n![](img/index-43_1.jpg)\n\n## 第 1 章 ■ 数据存储内幕\n\n### 图 1-14. LOB 数据：DBCC\
  \ IND 结果\n\n如你所见，该表有一个用于行内数据的数据页和三个用于 LOB 数据的数据页。我不会检查行内分配的数据行结构；它与行溢出分配类似。然而，对于\
  \ LOB 分配，表在指针中存储的元数据信息较少，使用 16 字节而不是行溢出指针所需的 24 字节。\n\n存储 LOB 根结构的页的 `DBCC PAGE`\
  \ 命令结果如 清单 1-13 所示。\n\n### 清单 1-13. LOB 数据：包含 LOB 根结构的 LOB 页的 DBCC PAGE 结果\n\n```text\n\
  Blob row at: Page (1:3046835) Slot 0 Length: 84 Type: 5 (LARGE_ROOT_YUKON)\nBlob\
  \ Id: 131661824 Level: 0 MaxLinks: 5 CurLinks: 2\nChild 0 at Page (1:3046834) Slot\
  \ 0 Size: 8040 Offset: 8040\nChild 1 at Page (1:3046832) Slot 0 Size: 7960 Offset:\
  \ 16000\n```\n\n如你所见，有两个指向包含 LOB 数据块的其他页的指针，这些数据块与 清单 1-11 中显示的 blob 数据类似。\n\nSQL\
  \ Server 存储来自 `(MAX)` 列（如 `varchar(max)`、`nvarchar(max)` 和 `varbinary(max)`）的数据的格式取决于实际数据大小。SQL\
  \ Server 尽可能将其存储在行内。当无法进行行内分配且数据大小小于或等于 8,000 字节时，它将作为行溢出数据存储。超过 8,000 字节的数据将作为\
  \ LOB 数据存储。\n\n**重要提示** `text`、`ntext` 和 `image` 数据类型已弃用，并将在未来版本的 SQL Server 中移除。请改用\
  \ `varchar(max)`、`nvarchar(max)` 和 `varbinary(max)` 列。\n\n同样值得一提的是，SQL Server 始终使用行内分配来存储适合单个页面的行。当一页没有足够的可用空间来容纳一行时，SQL\
  \ Server 会分配一个新页并将该行放在那里，而不是将其放在半满的页面上并将一些数据移动到行溢出页面。\n\n## SELECT * 和 I/O\n\n使用\
  \ `SELECT *` 运算符从表中选择所有列有很多缺点。它会通过传输客户端应用程序不需要的列来增加网络流量。它还使查询性能调优变得更加复杂，并且在表架构更改时会引入副作用。\n\
  \n## 第 1 章 ■ 数据存储内幕\n\n建议避免使用这种模式，而是显式指定列列表。\n\n\n##### SELECT * 与 I/O\n\n客户端应用程序如何访问数据至关重要。这在行溢出和大对象（LOB）存储的情况下尤其重要，因为一行数据可能被分散存储在多个数据页中。SQL\
  \ Server 需要读取所有这些页面，这会显著降低查询性能。\n\n## 示例：表创建与数据插入\n\n以 `dbo.Employees` 表为例，其中有一列用于存储员工图片。**清单\
  \ 1-14** 创建了该表并填充了一些数据。\n\n```sql\ncreate table dbo.Employees\n(\n    EmployeeId\
  \ int not null,\n    Name varchar(128) not null,\n    Picture varbinary(max) null\n\
  );\n\n;with N1(C) as (select 0 union all select 0) -- 2 rows\n,N2(C) as (select\
  \ 0 from N1 as T1 cross join N1 as T2) -- 4 rows\n,N3(C) as (select 0 from N2 as\
  \ T1 cross join N2 as T2) -- 16 rows\n,N4(C) as (select 0 from N3 as T1 cross join\
  \ N3 as T2) -- 256 rows\n,N5(C) as (select 0 from N4 as T1 cross join N2 as T2)\
  \ -- 1,024 rows\n,IDs(ID) as (select row_number() over (order by (select null))\
  \ from N5)\ninsert into dbo.Employees(EmployeeId, Name, Picture)\nselect\n    ID,\
  \ 'Employee ' + convert(varchar(5),ID),\n    convert(varbinary(max),replicate(convert(varchar(max),'a'),120000))\n\
  from Ids;\n```\n\n该表包含 1,024 行数据，二进制数据总量为 120,000 字节。假设客户端应用程序中的代码需要 `EmployeeId`\
  \ 和 `Name` 来填充下拉菜单。如果开发者不注意，可能会使用 `SELECT *` 模式编写查询语句，尽管该场景并不需要图片数据。\n\n## 性能对比\n\
  \n让我们比较两个查询的性能：一个选择所有数据列，另一个只选择 `EmployeeId` 和 `Name`。**清单 1-15** 展示了实现代码。在我的计算机上，执行时间和读取次数如**表\
  \ 1-1** 所示。\n\n```sql\nselect * from dbo.Employees;\n\nselect EmployeeId, Name from\
  \ dbo.Employees;\n```\n\n**表 1-1. 两个 SELECT 操作的执行时间**\n\n| 查询语句 | 读取次数 | 执行时间 |\n\
  | :--- | :--- | :--- |\n| `select EmployeeID, Name from dbo.Employees` | | 2 ms\
  \ |\n| `select * from dbo.Employees` | 90,895 | 3,343 ms |\n\n"
- '# 第一章 ■ 数据存储内部机制


  如你所见，第一个查询读取了 LOB 数据并将其传输到客户端，比第二个查询慢了几个数量级。这在客户端应用程序使用对象关系映射（ORM）框架时变得极其重要。开发者倾向于在应用的不同部分复用相同的实体对象。结果，即使许多情况下并不需要所有数据，应用程序也可能加载所有属性/列。


  更好的做法是根据具体的用例，定义具有最小必要属性集的不同实体。在我们的例子中，最好创建独立的实体/类，例如 `EmployeeList` 和 `EmployeeProperties`。`EmployeeList`
  实体将包含两个属性：`EmployeeId` 和 `Name`。`EmployeeProperties` 则在前两者基础上增加 `Picture` 属性。这种方法可以显著提升系统性能。


  #### 区与区分配映射页


  SQL Server 在逻辑上将八个页面分组为 64 KB 的单元，称为**区**。有两种类型的区可用：**混合区**存储属于不同对象的数据，而**统一区**存储同一对象的数据。


  默认情况下，创建新对象时，SQL Server 将其前八个对象页面存储在混合区中。此后，该对象的所有后续空间分配都使用统一区完成。


  SQL Server 使用一种称为**分配映射**的特殊页面来跟踪文件中区和页面的使用情况。SQL Server 中有几种不同类型的分配映射页。


  **全局分配映射（GAM）** 页跟踪区是否已被任何对象分配。数据以位图的形式表示，其中每个位指示一个区的分配状态。零位表示




  相应的区正在使用中。值为 1 的位表示对应的区是空闲的。每个`GAM`页覆盖大约 64,000 个区，即近 4GB 的数据。这意味着每个数据库文件每约 4GB
  的文件大小就有一个`GAM`页。


  ## 共享全局分配映射（SGAM）页

  *共享全局分配映射（`SGAM`）* 页跟踪混合区的信息。与`GAM`页类似，它是一个位图，每个区对应一个位。如果对应的区是混合区并且至少有一个可用的空闲页，则该位的值为
  1。否则，该位被设置为 0。与`GAM`页一样，一个`SGAM`页跟踪大约 64,000 个区，即近 4GB 的数据。


  ## 区分配状态

  `SQL Server`可以通过查看`GAM`和`SGAM`页中对应的位来确定区的分配状态。表 1-2 显示了位值的可能组合。


  ### **表 1-2.** 区的分配状态

  | **状态** | **SGAM 位** | **GAM 位** |

  | :--- | :--- | :--- |

  | 空闲，未使用 | 0 | 1 |

  | 至少有一个可用空闲页的混合区 | 1 | 0 |

  | 统一区或已满的混合区 | 0 | 0 |


  ## 查找区

  当`SQL Server`需要分配一个新的统一区时，它可以使用`GAM`页中位值为 1 的任何区。当`SQL Server`需要在混合区中查找一个页时，它会搜索两个分配映射图，寻找在`SGAM`页中位值为
  1 且在`GAM`页中对应位为 0 的区。如果没有这样的区可用，`SQL Server`会根据`GAM`页分配新的空闲区，并在`SGAM`页中将对应位设置为 1。


  尽管混合区在数据库中能节省的空间微不足道，但它们需要`SQL Server`执行更多对分配映射图页的修改，这在繁忙的系统中可能成为争用的来源。这对于`tempdb`数据库尤其关键，因为小对象通常会以极快的速度被创建。


  ![](img/index-46_1.jpg)


  ## 配置混合区分配

  `SQL Server 2016`允许您通过设置`MIXED_PAGE_ALLOCATION`数据库选项，在数据库级别控制混合区的空间分配。默认情况下，该选项对于用户数据库是启用的，而对于`tempdb`是禁用的。在大多数情况下，此配置应该足够。


  在 2016 之前的`SQL Server`版本中，您可以使用跟踪标志`T1118`在整个实例上禁用混合区的空间分配。设置此标志可以显著减少繁忙`OLTP`服务器上的分配映射图页争用，特别是对于`tempdb`数据库。**我建议您在每个`SQL
  Server`实例上将此标志设置为启动参数。**


  ## 分配映射图页的位置

  每个数据库文件都有自己的`GAM`和`SGAM`页链。第一个`GAM`页始终是数据文件中的第三页（页号 2）。第一个`SGAM`页始终是数据文件中的第四页（页号
  3）。接下来的`GAM`和`SGAM`页每隔 511,230 页出现在数据文件中，这使得`SQL Server`在需要时能够快速浏览它们。


  ## 索引分配映射（IAM）页

  `SQL Server`使用另一组称为*索引分配映射（`IAM`）*的分配映射图页，来跟踪属于某个对象的不同类型页面（`IN_ROW_DATA`、`ROW_OVERFLOW`和`LOB`页）所使用的页和区。每个表/索引都有自己的一组`IAM`页，这些页被组合成称为*`IAM`链*的独立链表。每个`IAM`链覆盖自己的*分配单元*——`IN_ROW_DATA`、`ROW_OVERFLOW_DATA`和`LOB_DATA`。


  链中的每个`IAM`页覆盖一个特定的`GAM`区间。`IAM`页代表一个位图，其中每个位指示相应的区是否存储了属于特定对象的特定分配单元的数据。此外，对象的第一个`IAM`页存储了对象前八个页的实际页地址，这些页存储在混合区中。


  图 1-15 展示了分配映射图页位图的简化版本。


  ### **图 1-15.** 分配映射图页

  ■ **注意** 分区表和索引的每个分区都有单独的`IAM`链。我们将在……讨论




