  第二种方法以**以元素为中心的** XML 格式一次性发送整个批处理，并使用存储过程来解析它。.Net 代码已省略，存储过程如清单 13-14 所示。\n\n\
  **清单 13-14.** 插入一批行：使用以元素为中心的 XML\n\n```sql\ncreate proc dbo.InsertDataXmlElementCentric\n\
  (\n    @Data xml\n)\nas\n-- @Data 格式如下：\n-- <Rows><R><ID>{0}</ID><C1>{1}</C1><C2>{2}</C2>..<C20>{20}</C20></R></Rows>\n\
