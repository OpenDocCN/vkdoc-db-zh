  ## 与 Microsoft Azure 的集成


  SQL Server 包含多个与 Microsoft Azure 集成的备份相关功能。让我们详细看看它们。


  ### 备份到 Microsoft Azure


  从 SQL Server 2012 SP1 CU2 开始，您可以通过在 `BACKUP` 和 `RESTORE` 命令中指定 URL 位置，直接备份到或从 Microsoft
  Azure Blob 存储还原。清单 31-24 展示了此过程的示例。


  **清单 31-24.** 备份到 Windows Azure Blob 存储及从中还原


  ```sql

  create credential MyCredential

  with identity = ''mystorageaccount'', secret = ''<Secret Key>'';


  backup database MyDb

  to url = ''https://mystorageaccount.blob.core.windows.net/mycontainer/MyDb.bak''

  with credential = ''MyCredential'', stats = 5;


  restore database MyDb

  from url = ''https://mystorageaccount.blob.core.windows.net/mycontainer/MyDb.bak''

  with credential = ''MyCredential'', recovery, stats = 5;

  ```


  当您在 Microsoft Azure 的虚拟机中运行 SQL Server 时，将数据库备份存储在 Azure Blob 存储中是一个很好的选择。但是，对于本地安装，您需要考虑可用的上传和下载带宽。上传和下载大型的多
  GB 备份文件可能需要数小时甚至数天，这使其不切实际，并在发生灾难时导致长时间的停机。

  综上所述，对于 RTO（恢复时间目标）允许较长停机时间的小型和非关键任务数据库，将备份文件存储在 Microsoft Azure 仍然是一个可选方案。

  除了 `BACKUP TO URL` 命令外，您还可以使用 `Microsoft SQL Server Backup to Microsoft Windows
  Azure Tool`，它适用于任何版本和版本的 SQL Server。此工具独立于 SQL Server 工作。它根据指定的规则拦截正在写入文件夹的备份文件，并将这些文件上传到
  Azure Blob 存储。

  不幸的是，`Microsoft SQL Server Backup to Microsoft Windows Azure Tool` 不保留备份文件的本地副本。如果您决定使用它，应考虑可用的带宽和
  RTO 要求。


  > **注意** 您可以从 [`www.microsoft.com/en-us/download/details.aspx?id=40740`](https://www.microsoft.com/en-us/download/details.aspx?id=40740)
  下载 `Microsoft SQL Server Backup to Microsoft Windows Azure Tool`。


  综上所述，当您需要为本地安装提供一个经济高效、冗余的解决方案时，将备份文件存储在云端可能是一个不错的选择。不过，最好将其与 SQL Server 备份过程分开实施，在之后上传备份文件的本地副本。这种方法允许您通过使用备份文件的本地副本快速从灾难中恢复数据库，同时将文件的另一份副本保留在云端以实现冗余。


  ### 托管备份到 Microsoft Azure


  SQL Server 2014 引入了托管备份到 Microsoft Azure Blob 存储的概念。这可以



  可在实例或数据库级别启用此功能。`SQL Server` 会根据以下条件自动执行完整备份和事务日志备份，并保留这些备份最多 30 天：


  在以下任一情况下会执行`完整备份`：上一次完整备份距今已超过一周、自上次完整备份以来日志增长达到或超过 1 GB、或者备份链已中断。


  `事务日志备份`会每两小时执行一次，或者当日志空间使用量达到 5 MB 时，或者当事务日志备份落后于完整备份时执行。


  `SQL Server 2014` 的托管备份不支持处于`SIMPLE`或`BULK LOGGED`恢复模型的数据库，也不支持系统数据库。这些限制已在`SQL
  Server 2016`中移除。


  托管备份仅将文件备份到`Microsoft Azure Blob Storage`。不支持本地存储。我们在“备份到 Microsoft Azure”部分讨论的所有注意事项同样适用于托管备份。


  ■ **注意** 您可以在 [`https://msdn.microsoft.com/en-us/library/dn449496.aspx`](https://msdn.microsoft.com/en-us/library/dn449496.aspx)
  阅读更多关于托管备份的信息。请确保选择正确的`SQL Server`版本。`SQL Server 2014` 和 `2016` 之间的配置有显著变化。


  ## Azure 中数据库文件的文件快照备份


  从`SQL Server 2014`开始，您可以将数据库文件存储在`Microsoft Azure Blob Storage`中，适用于本地安装和 Azure
  虚拟机中的`SQL Server`安装。这为您提供了使用廉价且冗余存储的选项，适用于那些能够容忍 Blob 存储较低 I/O 性能和较高延迟的系统。


  作为一项额外增强，`SQL Server 2016`允许您在数据库备份和还原过程中利用 Azure Blob 快照功能。这种方法与传统备份的工作原理截然不同。与常规备份文件（包含数据页和日志记录的副本）相反，Blob
  快照存储的是在创建快照时所有数据库文件的只读副本。


  图 31-10 说明了文件快照备份的概念。仅支持完整备份和日志备份。然而，这两种类型非常相似，都包含所有数据库文件的副本。它们之间的区别在于：完整备份会初始化备份链，而日志备份会在操作后截断日志。


