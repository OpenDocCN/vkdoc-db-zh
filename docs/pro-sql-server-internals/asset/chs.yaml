  ## CustomerId 查询


  索引叶子层的数据已经根据 `CustomerId` 列值排序。因此，`SQL Server` 可以从索引叶子层的第一页扫描到最后一页，并按存储顺序返回这些行。


  `SQL Server` 从索引的根页开始，读取其中的第一行。该行指向一个中间页，该中间页包含表中具有最小键值的行。`SQL Server` 读取该页并重复此过程，直到找到叶子层的第一页。然后，`SQL
  Server` 开始逐行读取，沿着页面的链表移动，直到所有行都被读取。图 2-8 展示了这一过程。


  ![](img/index-64_1.jpg)


  ![](img/index-64_2.jpg)


