  \  ,rows.n.value('@C1', 'varchar(20)')\n    ,rows.n.value('@C2', 'varchar(20)')\n\
  \    /* 其他 17 列 */\n    ,rows.n.value('@C20', 'varchar(20)')\nfrom\n    @Data.nodes('//Rows/R')\
  \ rows(n)\n```\n\n第四种方法使用 `SqlBulkCopy` .Net 类，以 `DataTable` 作为源并使用行级锁。其代码如清单 13-16\
  \ 所示。\n\n**清单 13-16.** 插入一批行：使用 `SqlBulkCopy` .Net 类\n\n```csharp\nusing (SqlConnection\
  \ conn = GetConnection())\n{\n    /* 创建并填充带有模拟数据的 DataTable 对象 */\n    DataTable\
  \ tbl = new DataTable();\n    tbl.Columns.Add(\"ID\", typeof(Int32));\n    for (int\
