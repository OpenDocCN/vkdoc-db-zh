  \n大多数数据库专业人员都经历过这样的情况：某些查询或存储过程的执行时间突然比之前长了很多，尽管近期并没有向生产环境部署更改。在大多数情况下，这些情况是由于统计信息更新导致查询重新编译时，发生了参数嗅探而引起的。\n\
