  #### 内存管理与配置


  讨论系统故障排除和 SQLOS 时，不可能不涉及 SQL Server 如何与内存协同工作。让我们从内存配置开始。


  ## 内存配置


  如您所知，SQL Server 会尝试根据操作需要分配并使用尽可能多的内存。它并非在启动时就分配所有内存；分配是按需进行的——例如，当 SQL Server 将数据页读取到缓冲池或将编译后的计划存储到缓存时。


  常见的情况是，实例会消耗数百 GB 甚至数 TB 的内存。这完全正常，简而言之，是件好事——它减少了物理 I/O 的数量和重编译次数，提升了系统性能。**实际上，为服务器增加内存通常是提升系统性能最快、最经济的方式。**


  非企业版的 SQL Server 对其可使用的内存量有限制。标准版在 SQL Server 2014-2016 中最多可使用 128 GB RAM，在更早版本中则最多可使用
  64 GB RAM。速成版被限制为 1 GB。


  您可以通过分析 `SQL Server: Memory Manager` 对象的性能计数器来检查 SQL Server 的内存使用情况。`Total Server
  Memory (KB)` 表示 SQL Server 正在消耗的内存量。`Target Server Memory (KB)` 表示 SQL Server 期望消耗的理想内存量。如果
  `Total Server Memory (KB)` 显著低于 `Target Server Memory (KB)`，则可能表明存在内存压力。或者，您可以使用
  `sys.dm_os_process_memory` 视图来获取此信息。


  建议在 SQL Server 配置中设置 `Maximum Server Memory` 选项。在 SQL Server 2012 及更高版本中，此设置适用于所有
  SQL Server 内部组件。在 2012 之前的 SQL Server 中，此设置控制缓冲池的大小，您需要降低该值以考虑其他组件的内存在用。在大多数情况下，这些组件将需要额外保留
  1 到 2 GB 的 RAM。


  `Maximum Server Memory` 值应为操作系统及服务器上运行的应用程序留出足够的内存。最好在每台服务器上进行微调。根据经验，您可以从为前 16
  GB RAM 保留 4 GB 开始，之后每 8 GB RAM 保留 1 GB。例如，一台配备 128 GB RAM 的服务器，起始值可设为 (128-16) /
  8 + 4 = 110 GB RAM。显然，对于非专用的 SQL Server 实例，需要降低此数值，为其他应用程序预留内存。


  设置初始的 `Maximum Server Memory` 值后，您应监控 `memory/available mbytes` 性能计数器，并根据需要微调 `Maximum
  Server Memory` 值。您应始终保持至少 500 MB 的可用内存（在安装了大量 RAM 的服务器上甚至更多），以避免出现内存压力情况。


  授予 SQL Server 启动账户 `Lock Pages in Memory` 权限也是有益的，这可以防止 SQL Server 内存被分页到磁盘的情况。您可以在
  `Group Policy` (`gpedit.msc`) 编辑器中进行设置。`Lock Pages in Memory` 在企业版和标准版中均受支持；但是，在
  SQL Server 2005 和 2008 的标准版中，它需要特定的服务包级别才能工作。


