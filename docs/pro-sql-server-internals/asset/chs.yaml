- "# 第 2 章 ■ 表与索引：内部结构与访问方法\n\n找到大量行，进而需要大量键查找操作，会导致大量 I/O 操作，这使得非聚集索引的使用效率低下。\n\n\
  导致非聚集索引效率低下的还有另一个重要因素。键查找操作需要从数据文件的不同位置读取数据。尽管来自根级别和中间索引级别的数据页通常会被缓存，仅引入逻辑读取，但访问叶级页会导致随机物理\
  \ I/O 活动。相比之下，索引扫描会触发顺序 I/O 活动，这比随机 I/O 更高效，尤其是在磁盘驱动器的情况下。\n\n## 键查找与 RID 查找\n\n\
  在堆表上定义的非聚集索引引用行在数据文件中的实际位置。SQL Server 使用 `RID lookup` 操作从堆中获取数据行。理论上，`RID lookup`\
  \ 似乎比键查找更高效，因为它可以直接读取行，而无需遍历聚集索引的根级别和中间级别。\n\n然而，在实际中，读取非叶级聚集索引数据页的性能影响相对较小。这些页面通常缓存在缓冲池中，访问时不需要物理\
  \ I/O。逻辑读取仍然会带来一些开销；但与物理 I/O 和磁盘访问相比，这种开销通常微不足道。此外，堆表中的转发指针可能在单个 `RID lookup` 操作中引入多次物理读取，这会影响其性能。\n\
  \n因此，当预计需要大量键或 `RID lookup` 操作时，SQL Server 在选择非聚集索引时会非常保守。为了说明这一点，我们创建一个表并使用清单 2-10\
  \ 所示的数据填充它。\n\n### 清单 2-10. 非聚集索引用法：创建测试表\n\n```sql\ncreate table dbo.Books\n(\n\
