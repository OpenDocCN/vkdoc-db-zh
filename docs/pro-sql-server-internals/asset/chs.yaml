  ### 提示

  您可以通过检查执行计划中的 `INDEX SCAN` 或 `INDEX SEEK` 运算符属性来查看扫描方向。但请注意，`Management Studio`
  在执行计划的图形表示中不显示这些属性。您需要通过在执行计划中选择运算符并选择 `View/Properties Window` 菜单项或按 `F4` 键来打开
  `Properties` 窗口才能看到它。


  `SQL Server` 的 `Enterprise Edition` 有一项名为 `merry-go-round scan`（循环扫描）的优化功能，允许多个任务共享同一次索引扫描。假设您有一个正在扫描索引的会话
  `S1`。在扫描过程中的某个时刻，另一个会话 `S2` 运行了一个需要扫描相同索引的查询。通过 `merry-go-round scan`，`S2` 会加入到
  `S1` 当前的扫描位置。`SQL Server` 每页只读取一次，将行传递给两个会话。


  当 `S1` 的扫描到达索引末尾时，`S2` 会从索引开头开始扫描数据，直到其开始扫描的点。`merry-go-round scan` 是另一个例子，说明为什么不能依赖索引键的顺序，以及为什么在顺序重要时应始终指定
  `ORDER BY` 子句。


