  SQL Server 都在之后使用了一个额外的筛选运算符。这引入了在索引扫描期间加载不必要行的开销。你可以在图 33-24 中看到第二个查询的部分执行计划。


  ***图 33-24.** 使用事实表中的字符串属性过滤文章类别的查询的执行计划（SQL Server 2016 之前）*


  SQL Server 2016 生成了一个不同的执行计划，它将字符串谓词向下推送到列存储索引扫描运算符，如图 33-25 所示。


