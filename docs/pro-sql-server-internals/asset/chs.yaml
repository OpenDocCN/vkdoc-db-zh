- '# 基于列的存储与批处理模式执行


  SQL Server 通过列存储索引和批处理模式执行来解决这些问题。列存储索引以列为单位而非以行为单位存储数据。图 33-3 说明了这种方法。


  ***图 33-3.*** 基于行的存储与基于列的存储


  列存储索引中的数据使用算法进行了高度压缩，即使与页面压缩相比，也能显著节省空间。我们将在本章后面比较不同压缩方法的结果。此外，SQL Server 可以跳过查询未请求的列，并且不会将这些列的数据加载到内存中。


  列存储索引的这种新数据存储格式使得 SQL Server 能够实现一种新的批处理模式执行模型，该模型显著降低了数据仓库查询的 CPU 负载和执行时间。在此模式下，SQL
  Server 按行组或批次处理数据，而不是一次处理一行。批次的大小会调整以适应 CPU 缓存，这减少了 CPU 需要从内存或其他组件请求*外部*数据的次数。此外，批处理方法提高了聚合计算的性能，因为聚合可以在每个批次而非每行的基础上计算。


  与行模式执行（数据在操作符之间复制）相反，批处理模式处理通过创建和维护一个特殊的位图来最小化此类复制，该位图指示行在批次中是否仍然有效。


  为了说明这种方法，让我们考虑清单 33-2 中的查询。


  ***清单 33-2.*** 示例查询



  '
- "# 第 33 章 ■ 基于列的存储与批处理模式执行\n\n## SQL 查询示例\n\n```sql\nselect ArticleId, sum(Quantity)\n\
  from dbo.FactSales\nwhere UnitPrice >= 10.00\ngroup by ArticleId\n```\n\n## 行模式执行\n\
  \n在常规的行模式执行中，`SQL Server` 会扫描聚集索引并在每一行上应用筛选器。对于满足 `UnitPrice >= 10.00` 的行，它会将一个包含两列（`ArticleId`\
  \ 和 `Quantity`）的行传递给 `聚合` 算子。图 33-4 展示了此过程。\n\n***图 33-4.** 行模式执行*\n\n![](img/index-671_1.jpg)\n\
  \n![](img/index-671_2.jpg)\n\n## 批处理模式执行\n\n或者，在批处理模式执行中，`筛选` 算子会设置一个内部位图来指示行的有效性。后续的\
  \ `聚合` 算子将处理同一批行，忽略无效的行。不涉及数据复制。图 33-5 展示了这种方法。同样值得注意的是，只有 `ArticleId`、`Quantity`\
  \ 和 `UnitPrice` 列会被加载到批处理中。\n\n***图 33-5.** 批处理模式执行*\n\n■ **注意** 在实际系统中，`SQL Server`\
  \ 可以将用于判断 `UnitPrice >= 10` 的谓词下推到 `列存储索引扫描` 算子，从而防止不必要的行被加载到批处理中。然而，在我们的示例中，让我们假设情况并非如此。\n\
  \n## 并行性比较\n\n`SQL Server` 在行模式和批处理模式执行中处理并行性的方式非常不同。如您所知，在行模式执行中，`交换` 算子使用可用的分布算法之一将行分发到不同的并行线程之间。然而，分发行之后，在遇到另一个用于收集或重新分区数据的\
  \ `交换` 算子之前，该行永远不会从一个线程迁移到另一个线程。\n\n图 33-6 通过展示一个使用 `Range` 重分布方法将数据分发到三个执行 `哈希联接`\
  \ 的并行线程的 `交换` 算子来说明这一点。联接键值的第一个字母将控制行被分发到哪个线程以及在何处处理。\n\n***图 33-6.** 行模式执行中的并行性*\n\
  \n![](img/index-672_1.jpg)\n\n`SQL Server` 在批处理模式执行中采用了不同的方法。在该模式下，每个算子都有一个工作项（批处理）队列要处理。来自共享池的工作线程从队列中选取项目进行处理，并从一个算子迁移到另一个算子。图\
  \ 33-7 说明了这种方法。\n\n***图 33-7.** 批处理模式执行中的并行性*\n\n在行模式执行中，增加并行查询响应时间的常见问题之一是数据分布不均匀。`交换`\
  \ 算子等待所有并行线程完成；因此，执行时间取决于最慢的线程。当数据分布不均匀时，一些线程比其他线程有更多的工作要做。批处理模式执行消除了此类问题。每个线程从共享队列中拾取工作项，直到队列为空。\n\
