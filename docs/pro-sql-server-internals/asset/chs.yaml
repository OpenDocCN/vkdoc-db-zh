  ## 图 26-2. 参数嗅探：为 `@Country=''Canada''` 缓存的计划


  有几种方法可以解决此问题。你可以使用 `EXECUTE WITH RECOMPILE` 强制重新编译存储过程，或者使用 `OPTION (RECOMPILE)`
  子句进行语句级重编译。显然，语句级重编译更好，因为它在较小的范围内执行重编译。SQL Server 在重编译时*嗅探*参数值，为每个参数值生成最优执行计划。代码清单
  26-5 展示了语句级重编译方法。


  ## 代码清单 26-5. 参数嗅探：语句级重编译


  ```sql

  alter proc dbo.GetAverageSalary @Country varchar(64)

  as

  select Avg(Salary) as [Avg Salary]

  from dbo.Employees

  where Country = @Country

  option (recompile);

  go


  exec dbo.GetAverageSalary @Country=''Canada'';

  exec dbo.GetAverageSalary @Country=''USA'';

  ```


  如图 26-3 所示，SQL Server 不缓存执行计划，而是在每次调用时重新编译语句，为每个参数值生成最高效的执行计划。


  ![](img/index-509_1.jpg)

  ![](img/index-509_2.jpg)


  ## 图 26-3. 参数嗅探：语句级重编译


  当查询不经常执行，或者对于复杂查询而言编译时间仅占总执行时间的一小部分时，语句级重编译可能是一个不错的选择。然而，对于频繁执行的 OLTP 查询而言，由于重编译会带来额外的
  CPU 负载，这几乎算不上最佳方法。


  另一种选择是使用 `OPTIMIZE FOR` 提示，它强制 SQL Server 根据提示中提供的特定参数值来优化查询。代码清单 26-6 说明了这种方法。


  ## 代码清单 26-6. 参数嗅探：`OPTIMIZE FOR` 提示


  ```sql

  alter proc dbo.GetAverageSalary @Country varchar(64)

  as

  select Avg(Salary) as [Avg Salary]

  from dbo.Employees

  where Country = @Country

  option (optimize for(@Country=''USA''));

  go


  exec dbo.GetAverageSalary @Country=''Canada'';

  exec dbo.GetAverageSalary @Country=''USA'';

