- '# 高可用性技术


  | 特性 | 同步 | 故障转移时间 | 性能开销 |

  | :--- | :--- | :--- | :--- |

  | 丢失 | 无 | 最佳情况：分钟级（实例中所有数据库的崩溃恢复） | 无开销 |

  | 延迟 | 无 | 不适用 | 无开销 |

  | 存储 | 无 | 秒级（单个数据库的崩溃恢复） | 同步提交的开销 |

  | 日志备份 | 无 | 秒级（AG 中所有数据库的崩溃恢复） | 同步提交的开销 |

  | 镜像 | 是 | 不适用 | 对事务日志的额外负载 |

  | 单点故障 | 无 | 自动 | 手动 |

  | 故障转移 | 自动 | 手动 | 自动（需要见证） |


  显然，您并不局限于使用单一的高可用技术。结合使用多种技术通常是有益的，将它们一起使用以防范不同类型的故障。


  ## 技术组合


  例如，如果由于 SQL Server 版本或版本不兼容而无法使用 `AlwaysOn Availability Group`，您可以将故障转移集群与数据库镜像或日志传送结合使用。故障转移集群可以保护您免受服务器故障的影响，而第二种技术可以保护您免受存储系统故障的影响。


  ## 数据零丢失选项


  在数据丢失绝对不允许的情况下，选择仅限于数据库镜像或采用同步提交的 `AlwaysOn Availability Groups`。尽管故障转移集群使用数据库的单个副本，因此您不会因为复制（或同步）延迟而丢失数据，但它并不能防止存储故障。不幸的是，在某些极端情况下，同步提交可能会引入不可接受的延迟。


  这是一个需要与利益相关者合作并达成妥协的情况示例。例如，在某些情况下，拥有一个故障转移集群，数据存储在高度冗余的磁盘阵列上，并通过异步提交到另一台服务器，可能就
  *足够好了*。


  ## 保护单元


  保护单元是另一个需要考虑的非常重要的因素。如果 `AlwaysOn Availability Groups` 不可用，同步数据库镜像可能是一个很好的选择，它能保证零数据丢失且没有单点故障。然而，它在单个数据库范围内工作，这对于必须驻留在同一服务器上的多个数据库组成的系统来说可能存在问题。故障转移集群是除了
  `AlwaysOn Availability Group` 之外，唯一能保证多个数据库始终一起故障转移的选项。


  ## 镜像的变通方案


  您仍然可以在此类场景中使用数据库镜像，通过实现一个例程来监控主服务器数据库位置，并在需要时故障转移数据库。一种可能的实现是创建一个 `SQL Agent` 作业，该作业每分钟运行一次，并查询
  `sys.databases` 视图中组内某个数据库的 `State` 或 `State_Desc` 列。当该作业检测到数据库处于 `RESTORING` 状态（这意味着它已被故障转移到不同的服务器）时，它可以故障转移组中的其他数据库。


  ## 测试与验证


  在生产环境实施后，测试您的高可用性策略并执行故障转移是极其重要的。一切第一次就完美运行的情况极为罕见。您可能会遇到安全问题、应用程序连接字符串中的错误设置、服务器上缺少对象，以及许多其他阻止系统在故障转移后按预期工作的问题。尽管测试故障转移过程可能导致系统停机，但最好是在所有人员待命的情况下进行有计划的停机，而不是在发生未计划的灾难后系统无法工作的情况。


  最后，您应该定期重新评估和测试您的高可用性与灾难恢复策略。数据库规模和活动量的增长可能会使您的 `HA` 实现失效，从而无法满足 `RPO` 和 `RTO` 要求。当备用（辅助）服务器的性能低于主服务器时，这一点尤为重要。在这种情况下，系统在故障转移后很可能无法跟上负载。


  #### 总结



  '
- '# 第 32 章 ■ 高可用性技术


  尽管高可用性与灾难恢复策略相互关联，但它们并非同一概念。


  高可用性策略通过向用户透明地处理硬件或软件故障，来提升系统的可用性。灾难恢复策略则用于处理高可用性策略未能应对的情况，以及在灾难发生后需要恢复系统时。


  SQL Server 故障转移群集通过使用 SQL Server 实例作为共享资源来实现群集模型，从而保护你免受服务器故障的影响。在任何给定时间，只有一个服务器/节点可以处理用户请求；然而，一个
  Windows Server 故障转移群集可以托管多个 SQL Server 群集。尽管运行多个 SQL Server 故障转移群集实例是降低解决方案成本的常见做法，但你应避免出现群集没有备用被动节点，以及故障转移后多个
  SQL Server 实例在同一节点上运行且性能不可接受的情况。


  SQL Server 故障转移群集使用共享存储，这成为单点故障。你应将故障转移群集与其他将数据存储在不同存储设备上的高可用性技术结合使用，以最大程度地减少因存储故障导致数据丢失的可能性。


  数据库镜像和 AlwaysOn 可用性组允许你通过持续通过网络发送事务日志记录，在另一台服务器上维护数据库的字节级副本。使用同步提交时，SQL Server 会等到日志记录在辅助服务器上固化后，才在主服务器上提交事务。这种方法保证了已提交事务不会丢失数据，尽管它增加了事务的额外延迟。使用异步提交时，日志记录是异步发送的，可能存在数据丢失。即使使用同步提交，如果辅助服务器离线或数据未完全同步，数据丢失也是可能的。


  AlwaysOn 可用性组允许创建一个具有一台处理读写活动的主服务器和多台允许对数据库进行只读访问的辅助服务器的基础设施。AlwaysOn 可用性组应安装在 Windows
  Server 故障转移群集之下，尽管每个节点使用独立的存储来存放数据库。


  日志传送允许通过应用连续的日志备份流，在多个辅助服务器上维护数据库的副本。它不能防止自上次备份应用以来的时段内发生数据丢失。


  复制允许你跨多个数据库复制数据库中的数据子集，允许在每个位置进行读写访问。事务复制在将更改分发到订阅者方面延迟较低。然而，设置和监控复杂的复制拓扑是一项极具挑战性的任务。


  设计高可用性策略是一个迭代和互动的过程，需要你与技术团队的其他成员以及利益相关者合作。你必须确保恢复时间目标和恢复点目标要求是现实的，并在项目分配的预算内可以实现。


  高可用性技术的选择取决于需求和预算，以及安装的 SQL Server 版本和版本。你不局限于单一技术——结合几种技术通常是有益的。


  你应考虑使用同步提交的技术的性能影响，特别是当系统有性能服务等级协议规定某些联机事务处理事务的延迟时。


  在生产环境实施后，测试你的高可用性技术并执行故障转移是极其重要的。在受控环境中发现并修复任何问题，比在灾难发生后与之抗争要好得多。




  你应该定期根据数据库规模和活动增长情况，重新评估已实施的高可用性解决方案，尤其是当你的备用服务器性能低于主服务器时。


  '
- '# 第七部分


  ## 列存储索引


  ### 第 33 章


  #### 基于列的存储与批处理模式执行


  `列存储索引`是 SQL Server 2012 引入的企业版功能。它们是名为 `x Velocity`（曾用名 `VertiPaq`）的新技术家族的一部分，该技术旨在优化扫描和聚合大量数据的分析查询的性能。


  列存储索引采用一种不同的数据存储格式，按列而非按行存储压缩数据。这种存储格式有利于数据仓库、报表和分析环境中的查询处理，因为尽管这些查询通常读取非常大量的行，但它们只涉及表中的部分列。


  数据仓库系统的设计和实现是一个非常复杂的过程，本书不作详细讨论。不过，本章将参考此类系统中常见的数据库设计模式。此外，本章将概述列存储索引及其存储格式，讨论批处理模式执行，并简要介绍几条可提升数据仓库解决方案性能的建议。


  #### 数据仓库系统概览


  数据仓库系统提供用于分析、报告和决策支持的数据。与旨在支持运营活动、在短事务中处理简单查询的 OLTP（在线事务处理）系统不同，数据仓库系统处理的是通常执行聚合操作并处理大量数据的复杂查询。


  例如，考虑一家向客户销售商品的公司。其 `销售点 (POS)` 系统的一个典型 OLTP 查询语义可能是：*提供此特定客户本月下达的订单列表*。而数据仓库系统中的一个典型查询则可能是：*按商品类别和客户地区分组，提供截至今日的年度销售总额*。


  数据仓库系统与 OLTP 系统还有其他区别。OLTP 系统中的数据通常是易变的。此类系统同时服务大量请求，并且其面向客户的查询通常关联有性能 SLA（服务等级协议）。相比之下，数据仓库系统中的数据相对静态，通常按固定计划（例如在夜间或周末）进行更新。这些系统通常服务于少量客户，主要是业务分析师、经理和高管，他们由于需要处理大量数据，可以接受较长的查询执行时间。


