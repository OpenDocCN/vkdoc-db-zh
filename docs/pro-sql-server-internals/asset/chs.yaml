  where CustomerID = @CustomerID\n```\n\n或者，`EXPAND VIEWS`提示允许`SQL Server`在企业版中将索引视图展开为其定义。老实说，我想不出这种行为在哪些使用场景下是有益的。\n\
  \n## `FAST N`提示\n\n`FAST N`提示告诉`SQL Server`生成一个以快速返回指定参数行数为目标的执行计划。即使与使用阻塞操作符的计划相比，该计划成本更高，它也可能生成一个包含非阻塞操作符的执行计划。\n\
  \n这种提示的一个可能使用场景是：某个应用程序在后台加载大量数据（可能在进行缓存），并希望尽快将数据的第一页显示给用户。`清单 25-24`展示了一个使用此类提示的查询示例。\n\
  \n`清单 25-24.` `FAST N`提示\n\n```\nselect o.OrderId, OrderNumber, OrderData, CustomerId,\
  \ CustomerName, OrderTotal\nfrom dbo.vOrders\nwhere OrderDate > @StartDate\norder\
  \ by OrderDate desc\noption (FAST 50)\n```\n\n■ `注意`你可以在 [`technet.microsoft.com/en-us/library/ms181714.aspx`](http://technet.microsoft.com/en-us/library/ms181714.aspx)\
  \ 查看查询和表提示的完整列表。\n\n#### 总结\n\n查询生命周期包含四个不同的阶段：解析、绑定、优化和执行。查询使用树状结构进行多次转换，从解析阶段的逻辑查询树开始，到优化后的执行计划结束。\n\
  \n查询优化分几个阶段进行。除了简单计划搜索外，`SQL Server`使用基于成本的模型，评估访问方法的成本、资源使用情况以及其他一些因素。\n\n执行计划的质量很大程度上取决于输入数据的正确性。准确且最新的统计信息是改进基数估计的关键因素，它使得`SQL\
  \ Server`能够生成高效的执行计划。然而，与任何模型一样，它也有局限性。在某些情况下，你需要重构、拆分和简化查询以克服这些限制。\n\n"
- '# 第 25 章 ■ 查询优化与执行


  执行计划由物理操作符组成，除了`Parallelism`（并行操作符），它们都使用基于轮询的、逐行的模型。每个父操作符逐行地向其子操作符请求数据。从`SQL Server`
  2012 开始，还有另一种批处理模式执行模型可用，该模型与`列存储索引`和一些数据仓库查询一起使用。


  操作符有两种类型：阻塞和非阻塞。非阻塞操作符在获得行后立即将其返回给父操作符。阻塞操作符在将行返回给父操作符之前，先从子操作符获取并缓存所有行。


  阻塞操作符需要内存来存储数据。在内存估计不正确的情况下，数据会溢出到`tempdb`。这种溢出会降低查询性能，并且可以通过`SQL Trace`和`Extended
  Events`中的`排序和哈希警告`进行监控。


  内存授予大小不正确的两种最常见情况是基数估计和行大小估计不正确。你可以通过保持统计信息最新，并将可变长度数据列的大小定义为实际存储数据的大约两倍来改进这些估计。你还应该避免在连接条件中使用`SARGable
  谓词`，尤其是在查询连接大量表时。


  你可以使用查询和表提示来控制查询优化的某些方面。但是，在使用它们时必须非常小心，记录其用法并定期重新评估。这




