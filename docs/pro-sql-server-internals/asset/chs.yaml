  \ 5-18 所示的执行计划。\n\n## 图 5-18. 创建索引后带有查找表的执行计划\n\n在某些情况下，当安全模型相对静态时，您可以考虑在登录阶段填充信息，并将其存储在会话上下文中。策略函数可以使用`session_context()`函数从那里获取信息，而无需执行数据访问。您将在第\
