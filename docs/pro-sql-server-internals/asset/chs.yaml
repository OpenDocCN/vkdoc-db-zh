- '# 第 30 章 ■ 事务日志内部原理


  在数据库启动页面中，并将更改应用于数据。尽管部分更改可能已经保存到数据文件中，SQL Server 仍然会像常规工作负载一样，对修改的行获取锁。在重做阶段结束时，数据库处于
  SQL Server 意外关闭时的状态。


  3. 最后，在`undo`阶段，SQL Server 回滚所有活动的、未提交的事务。


  **图 30-7** 显示了数据库恢复场景的示例。SQL Server 将重做并提交事务 T2 和 T3，并回滚事务 T4。


  **图 30-7.** 数据库恢复


  恢复过程对每个数据库使用单个线程。SQL Server 企业版支持`fast recovery`，该功能使数据库在重做阶段后即可供用户使用。


  系统中有两个与事务日志相关的等待类型需要监控。`WRITELOG`等待发生在 SQL Server 将日志块刷新到磁盘以持久化时。过多的此类等待表明日志驱动器没有足够的吞吐量来处理日志生成速率。


  `LOGBUFFER`等待发生在 SQL Server 等待日志缓冲区中的空间来保存记录时。尽管在数据库启动后 SQL Server 构建日志缓冲区时可能短暂发生此类等待，但通常这些等待表明日志缓冲区已满，SQL
  Server 正在等待记录刷新到磁盘，这并行地生成了`WRITELOG`等待。


  当系统中出现这些等待时，您应该分析事务日志驱动器的性能和吞吐量。在分析期间，您也可以查看来自`sys.dm_io_virtual_file_stats`和磁盘相关性能计数器的数据。


  您可以通过减少生成的日志记录和写操作来提高事务日志吞吐量。在许多情况下，这可以通过改进客户端应用程序中的事务管理来实现。在隐式单个事务中进行大量数据修改会产生大量日志记录，并迫使
  SQL Server 在每次提交时刷新日志缓冲区。将代码修改为在单个显式事务中执行数据修改可以解决此问题。


  或者，如果您使用的是 SQL Server 2014-2016 并且可以容忍少量数据丢失，您可以切换到事务的延迟持久性，我们接下来将讨论这一点。


  ## 延迟持久性


  `延迟持久性`，也称为`lazy commit`，在 SQL Server 2014 中引入。如前所述，默认情况下，提交操作是同步的。SQL Server 在提交时刷新日志缓冲区的内容，将日志记录持久化到日志文件中，并且只有在提交记录写入磁盘后才会向客户端发送确认。延迟持久性通过使提交操作异步来改变此行为。客户端会立即收到事务已提交的确认，而无需等待提交记录持久化到磁盘。提交记录保留在日志缓冲区中，直到其内容被刷新，这发生在以下情况之一：


  - 日志块已满。

  - 同一数据库中的一个完全持久性事务被提交。该事务的提交记录会将日志块的内容刷新到磁盘。

  - 发生`CHECKPOINT`操作。

  - `sp_flush_log`存储过程成功完成。


  如果 SQL Server 在提交记录持久化之前崩溃，则在恢复时，来自该事务的数据修改将被回滚，就好像该事务从未提交过一样。然而，其他事务能够在该事务提交后到
  SQL Server 崩溃之间的时间段内看到该事务所做的数据修改。


  在常规 SQL Server 关闭时也可能发生数据丢失。尽管 SQL Server 会尝试在关闭时刷新日志缓冲区，但无法保证此操作会成功。



  '
- '# 第 30 章：事务日志内部原理


  延迟持久性对于那些在事务日志写入方面存在瓶颈且能容忍少量数据丢失的系统来说，可能是一个不错的选择。然而，这存在一个小风险。在某些罕见情况下，`CHECKPOINT`
  进程可能会在事务日志记录固化（hardened）之前就将脏数据页刷新到磁盘。如果 SQL Server 恰好在此时崩溃，重启后数据库将进入损坏且事务不一致的状态。如果你决定使用延迟持久性，应评估此风险。


  ## 数据库选项：DELAYED_DURABILITY


  一个名为 `DELAYED_DURABILITY` 的数据库选项，用于控制数据库范围内延迟持久性的行为。它可能有以下三种设置：


  - `DISABLED`：此选项禁用数据库事务的延迟持久性，无论事务持久性模式如何。数据库中的所有事务始终是完全持久的。这是默认选项，与早期版本的 SQL Server
  行为一致。

  - `FORCED`：此选项强制数据库事务使用延迟持久性，无论事务持久性模式如何。

  - `ALLOWED`：延迟持久性在事务级别进行控制。除非明确指定延迟持久性，否则事务是完全持久的。


  值得注意的是，对于跨数据库或分布式事务，所有事务都是完全持久的，无论其设置如何。这同样适用于更改跟踪（Change Tracking）和变更数据捕获（Change
  Data Capture）技术。任何更新启用了这些技术之一的表的事务都将是完全持久的。延迟持久性也不支持与事务复制一起使用。


  你可以通过在 `COMMIT` 操作符中指定持久性模式来控制事务的持久性。代码清单 30-1 展示了一个使用延迟持久性事务的示例。如前所述，`DELAYED_DURABILITY`
  数据库选项可以覆盖该设置。


  ### 代码清单 30-1：具有延迟持久性的事务


  ```sql

  begin tran


  /* 执行某些操作 */


  commit with (delayed_durability=on)

  ```


  任何其他与事务日志交互的 SQL Server 技术，只有在这些提交记录被固化到日志中（并因此在数据库中变为持久）之后，才会看到并处理来自延迟持久性事务的提交记录。例如，如果在事务提交和日志缓冲区刷新之间完成了数据库备份，那么提交日志记录将不会包含在备份中，因此在还原时该事务将被回滚。


  另一个例子是 AlwaysOn 可用性组。辅助节点只会在主节点上的日志记录固化并通过网络传输之后，才会接收到提交记录。


  #### 虚拟日志文件


  尽管一个事务日志可以包含多个文件，但 SQL Server 在写入和读取日志记录流时是以顺序方式处理它的。因此，SQL Server 无法从多个物理日志文件中受益。


  > **注意**：在某些极端情况下，你可以从多个日志文件中获益。例如，将多个日志文件放置在独立的磁盘阵列上，将允许 SQL Server 在数据库创建或还原操作期间并行地对日志文件进行零初始化。


  在内部，SQL Server 将每个物理日志文件划分为更小的部分，称为*虚拟日志文件 (VLF)*。SQL Server 使用虚拟日志文件作为管理单元；它们可以是活动的（active）或非活动的（inactive）。


  ![](img/index-615_1.jpg)

  ![](img/index-615_2.jpg)


  当一个 VLF 存储*事务日志的活动部分*时，它就是活动的。该活动部分包含在发生事务回滚或意外 SQL Server 关闭时保持数据库事务一致性所需的一系列日志记录。目前，请不要关注是什么让日志保持活动状态；我们将在本章后面探讨这一点。一个非活动的
  VLF 包含事务日志中*已被截断*（非活动）和未使用的部分。



  '
- '# 数据库恢复模型


  图 30-8 展示了一个事务日志和虚拟日志文件的示例。


  **图 30-8.** 事务日志与虚拟日志文件


  事务日志截断并不会减小磁盘上日志文件的大小。截断意味着事务日志的部分（一个或多个 VLF）被标记为不活动并准备重用。它清理了日志的内部空间，同时保持日志文件大小不变。


  事务日志是一个可循环写入的文件。当逻辑日志文件的末尾到达物理文件的末尾时，日志会循环回开头，如图 30-9 所示。


  **图 30-9.** 事务日志是一个可循环写入的文件


  每次日志增长时，SQL Server 都会创建新的虚拟日志文件。VLF 的数量取决于新分配的空间大小和 SQL Server 版本。SQL Server 2014
  之前的分配算法如表 30-1 所示。


  **表 30-1.** 分配大小与创建的 VLF 数量（SQL Server 2014 之前）


  | 分配大小 | 创建的 VLF 数量 |

  | :--- | :--- |

  | < 64 MB | 4 个 VLF |

  | 64 MB – 1 GB | 8 个 VLF |

  | > 1 GB | 16 个 VLF |


  在 SQL Server 2014 和 2016 中，算法略有变化。它会分析日志文件当前的大小，如果增长量小于当前日志大小的 1/8，则只生成一个 VLF 文件。否则，它会使用旧的算法。


  你可以使用 `DBCC LOGINFO` 命令来检查虚拟日志文件。图 30-10 展示了在某个 SQL Server 实例上对 master 数据库运行此命令的输出。它显示该数据库有一个物理日志文件（`FileId
  = 2`）和三个虚拟日志文件。其他列指示以下信息：


  - `Status` 是 VLF 的状态。值 `0` 和 `2` 分别表示不活动和活动的 VLF。

  - `FileSize` 是 VLF 的大小（以字节为单位）。

  - `StartOffset` 是 VLF 在文件中的起始偏移量。

  - `CreateLSN` 是创建 VLF 时的 LSN（日志序列号）。`零` 表示该 VLF 是在数据库创建时生成的。

  - `FSeqNo` 是 VLF 的使用顺序。具有最高 `FSeqNo` 的 VLF 是当前日志记录写入的文件。

  - `Parity` 可以是两个可能值之一：`64` 和 `128`。每次重用 VLF 时，SQL Server 会切换奇偶校验值。SQL Server 使用奇偶校验值在崩溃恢复期间检测处理日志记录的停止位置。


  **图 30-10.** `DBCC LOGINFO` 命令输出


  ## 数据库恢复模型


  有三种影响事务日志管理和截断行为的数据库恢复模型：`SIMPLE`（简单）、`FULL`（完整）和 `BULK_LOGGED`（大容量日志）。尽管无论恢复模型如何，SQL
  Server 都会记录足够的信息以回滚事务和/或执行崩溃恢复，但这些模型控制着日志何时被截断以及 VLF 何时变为不活动状态。你无法访问并重做来自日志不活动部分的任何操作，因此如果数据文件不可用，截断将影响潜在的数据丢失量。


  这里需要再次提及，事务日志截断并不会减小日志文件的大小，而是将 VLF 标记为不活动并准备重用。


  在 `SIMPLE` 恢复模型中，SQL Server 在 `CHECKPOINT`（检查点）时截断事务日志。假设你有一个系统，其中有三个活动的 VLF，如图
  30-11 所示。最旧的活动 LSN 位于 `VLF4` 中。因此，如果发生事务回滚，SQL Server 可能需要访问来自 `VLF4` 和 `VLF5` 的日志记录，这要求
  SQL Server 保持 `VLF4` 和 `VLF5` 处于活动状态。


  `VLF3` 中虽然没有来自活动事务的日志记录，但缓冲池中的一些脏数据页可能对应存储在那里的日志记录。在崩溃恢复的情况下，SQL Server 需要访问这些记录以重做更改；因此，`VLF3`
  也应保持活动状态。




  '
- '# 第 30 章 ■ 事务日志内部机制


  ## 图 30-11. 简单恢复模型：初始阶段


  当 SQL Server 执行 `CHECKPOINT` 时，所有脏数据页都会被保存到数据文件中。因此，崩溃恢复不需要重做与来自 `VLF3` 的日志记录相关的任何更改，该虚拟日志文件可以被截断并标记为非活动。但是，`VLF4`
  必须保持活动状态，以支持回滚那些在 `VLF4` 中存储有相应日志记录的事务。图 30-12 说明了这一点。


  ## 图 30-12. 简单恢复模型：CHECKPOINT 后的日志截断


  因此，在 `SIMPLE` 恢复模型中，事务日志的活动部分起始于一个 `VLF`，该 `VLF` 包含最旧的活动事务的最旧 `LSN` 或最后一次 `CHECKPOINT`
  的 `LSN`。同样值得注意的是，如果启用了事务复制，则 `VLF` 只有在 `复制日志读取器` 处理完其中的事务后才能被截断。


  > **注意**

  > 活动的数据库备份会延迟事务日志截断，直到其完成。


  正如你可能猜到的那样，尽管 SQL Server 在 `SIMPLE` 模型中支持崩溃恢复，但你仍需保持数据和日志文件完好无损，以避免数据丢失并保持数据库的事务一致性。


  或者，使用 `完整` 或 `大容量日志` 恢复模型，SQL Server 支持事务日志备份，这使你能够恢复数据库并避免数据丢失，无论数据文件的状态如何，只要事务日志是完整的。当然，这假设有一套合适的备份可用。我们将在下一章更详细地讨论备份和恢复过程。


  在 `完整` 和 `大容量日志` 恢复模型中，SQL Server 要求你执行事务日志备份以触发日志截断。此外，如果你有其他需要读取事务日志记录的进程，截断可能会被延迟。想想事务复制、数据库镜像和
  `AlwaysOn 可用性组` 就是这类进程的例子。


  图 30-13 展示了一个例子。最小和当前 `LSN` 都在 `VLF5` 中，尽管上次事务日志备份的 `LSN` 在 `VLF3` 中。因此，事务日志的活动部分包括
  `VLF3`、`VLF4` 和 `VLF5`。


  ![](img/index-618_1.jpg)


  ![](img/index-618_2.jpg)


  ## 图 30-13. 完整和大容量日志恢复模型：初始阶段


  在进行另一次事务日志备份后，SQL Server 可以截断 `VLF3`。然而，`VLF4` 必须保持活动，因为 `复制日志读取器` 尚未处理来自 `VLF4`
  的部分日志记录。图 30-14 说明了这一点。


  ## 图 30-14. 完整和大容量日志恢复模型：日志截断


  如你所见，在 `完整` 或 `大容量日志` 恢复模型中，事务日志的活动部分起始于一个 `VLF`，该 `VLF` 包含以下项中最旧的一个：

  * 上次日志备份的 `LSN`

  * 最旧的活动事务的 `LSN`

  * 读取事务日志记录的进程的 `LSN`


  > **重要提示**

  > `完整` 数据库备份不会截断事务日志。你必须执行事务日志备份才能做到这一点。


  `完整` 和 `大容量日志` 恢复模型之间的区别在于 SQL Server 如何记录最小化日志操作，例如：


  ```sql

  CREATE INDEX, ALTER INDEX REBUILD, BULK INSERT, INSERT INTO, INSERT SELECT

  ```


  以及其他一些操作。在 `完整` 恢复模型中，这些操作被完整记录。SQL Server 为操作影响的每一行数据写入日志记录。或者，在 `大容量日志` 恢复模型中，SQL
  Server 不会逐行记录最小化日志操作；而是记录区的分配情况。所有最小化日志操作都会生成新的（或现有对象的副本）对象，而区的分配撤消则回滚更改。非最小化日志操作在
  `大容量日志` 模型中总是像在 `完整` 恢复模型中一样被完整记录。同样值得注意的是，`简单`




  恢复模型以类似于 `BULK LOGGED` 恢复模型的方式记录最小日志记录操作。


