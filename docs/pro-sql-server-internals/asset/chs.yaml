- '# 第三十三章：列式存储与批处理模式执行


  遗憾的是，在 SQL Server 2016 中使用行模式执行时情况并非如此，其执行计划的效率低于聚集索引扫描。如果您升级到 SQL Server 2016 并决定将数据库兼容级别保持在
  130 以下，请确保针对带有列存储索引表的查询能够利用并行处理。


  在下一组测试中，我们将移除 `MAXDOP` 提示，允许 SQL Server 为查询生成并行执行计划。第一步，我们将使用**代码清单 33-6** 中所示的代码强制执行聚集索引扫描来运行查询。


  ## 代码清单 33-6：测试查询：带并行执行计划的聚集索引扫描


