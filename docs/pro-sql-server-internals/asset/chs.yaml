  \n\n\n# 12.4 处理 XML 数据\n\n```sql\ninsert into dbo.AttributeCentricTyped(XMLData)\n\
  \nselect XMLData from dbo.AttributeCentricUntyped;\n```\n\n当我们比较所有四个表使用的存储空间时，我们看到的结果如表\
  \ 12-1 所示。\n\n`表 12-1. 类型化与非类型化 XML 存储需求`\n\n| 类型 | 群集索引大小 (KB) | 主要 XML 索引大小 (KB)\
  \ | 总大小 (KB) |\n| :--- | :--- | :--- | :--- |\n| 非类型化 元素中心 XML | 28,906 | 90,956\
  \ | 119,862 |\n| 类型化 元素中心 XML | 45,760 | 52,595 | 99,355 |\n| 非类型化 属性中心 XML | 26,021\
  \ | 57,390 | 83,411 |\n| 类型化 属性中心 XML | 36,338 | 54,105 | 90,443 |\n\n如你所见，类型化 XML\
  \ 在表的群集索引中使用了更多空间，因为 `XML` 数据类型列中存储了额外的信息。同时，向元素中心 XML 添加类型信息可以显著减小主要 XML 索引的大小。不幸的是，即使在最理想的情况下，XML\
  \ 索引也需要大量的存储空间，这超过了 `XML` 数据类型本身所需的存储空间。\n\n## 12.5 XML 索引\n\n> **注意** 主要 XML 索引的实际大小取决于\
  \ XML 数据中的节点数量和数据类型。\n\n*次要 XML 索引* 是表中的非群集索引，并由主要 XML 索引表示。请查看表 12-2，它展示了图 12-3\
  \ 中主要 XML 索引表数据的简化版本。\n\n`表 12-2. 主要 XML 索引简化版`\n\n| PK | ID | NodeId | 类型 | 值 |\
  \ HID |\n| :--- | :--- | :--- | :--- | :--- | :--- |\n| 1 (Order) | Null | Null\
  \ | 1.1 |  |  |\n| 2 (OrderId) | xs:int | #@OrderId#Order | 1.5 |  |  |\n| 3 (OrderLineItems)\
  \ | SectionT | Null | #OrderLineItems#Order | 1.5.1 |  |\n| 4 (OrderLineItem) |\
  \ SectionT | Null | #OrderLineItem#OrderLineItems#Order | 1.5.1.1 |  |\n| 5 (ArticleId)\
  \ | xs:int | #ArticleId #OrderLineItem#OrderLineItems#Order |  |  |  |\n\n`VALUE`\
  \ 次要 XML 索引是一个包含两列的非群集索引：`Value` 和 `HID`。正如你猜到的，这类索引的最佳用例是当你想要根据节点的值和可选路径来定位行时。在我们的例子中，如果你想要查找所有包含具有特定\
  \ `ArticleID` 的订单项的订单，`VALUE` 次要 XML 索引将会很有用。\n\n`PATH` 次要 XML 索引有两列：`HID` 和 `Value`。与\
  \ `VALUE` 索引类似，`PATH` 索引可用于查找在特定路径中具有特定值的所有行，尽管这些索引之间存在一些差异。`VALUE` 索引可用于在不引用路径的情况下，在\
  \ XML 中的任何位置查找具有特定值的 XML 元素或属性。而 `PATH` 索引对于这种用例来说不是一个好选择。然而，当你基于特定路径检查元素是否存在时，`PATH`\
  \ 索引非常有用。例如，如果你有一个名为 `Comments` 的可选可空节点，并且你希望选择所有存在该节点的订单，那么 `PATH` 索引就很有优势。此外，当你在路径中使用\
  \ `//` 快捷方式时，`PATH` 索引也很有用。例如，`Order//ArticleId` 会在 `Order` 节点内的任何位置查找 `ArticleId`\
  \ 元素。`HID` 存储了反转的路径，因此，SQL Server 在处理此类查询时可以在索引上执行前缀查找。\n\n`PROPERTY` 次要 XML 索引有三列：`PK`、`HID`\
  \ 和 `Value`。当你已经知道 XML 所属的行，并且想要获取特定路径的值和潜在的节点信息时，这个索引很有用。\n\nSQL Server 2012 及以上版本支持选择性\
  \ XML 索引，它允许你仅对 XML 节点的子集进行索引。当大多数查询只处理 XML 数据的子集时，这些索引有助于节省存储空间。有关选择性 XML 索引的更多信息，请查看此链接：[`msdn.microsoft.com/en-us/library/jj670108.aspx`](http://msdn.microsoft.com/en-us/library/jj670108.aspx)。\n\
  \n\n# 第 12 章 ■ XML 与 JSON\n\n> **注意**：代数化阶段负责名称解析、类型推导、绑定，并将 XML 运算符转换为关系运算符树，供查询优化器进一步使用。\n\
  \n当存在 XML 索引时，SQL Server 总是从索引中检索数据。否则，它会使用表值函数将 XML 数据分解为关系格式。在这两种情况下，数据库引擎在优化和执行查询时都使用\
  \ XML 数据的关系表示形式。\n\nSQL Server 中的 XML 数据类型支持五种不同的方法。其中四种——`value()`、`exist()`、`query()`\
  \ 和 `nodes()`——可用于访问和转换数据。最后一种 `modify()` 使用 XML DML 来修改数据。\n\n## value() 方法\n\n\
  `value()` 方法从 XML 实例中返回标量值。XPath 是一个定义值路径的表达式，它应通过引用 XML 中的单个元素或属性来静态表示单例。\n\n代码清单\
  \ 12-7 提供了未类型化 XML 中单例的示例。\n\n**代码清单 12-7.** 未类型化 XML 中的 XPath 引用单例\n\n```sql\n\
  declare\n@X xml =\n'<Order OrderId=\"42\" OrderTotal=\"49.96\">\n    <Customer Id=\"\
  123\"/>\n    <OrderLineItems>\n        <OrderLineItem>\n            <ArticleId>250</ArticleId>\n\
  \            <Quantity>3</Quantity>\n            <Price>9.99</Price>\n        </OrderLineItem>\n\
  \    </OrderLineItems>\n</Order>'\n\n-- 成功：从第一个订单的第一个客户获取 @Id\nselect @X.value('/Order[1]/Customer[1]/@Id','int')\n\
  \n-- 错误：不是单例；XML 可以包含关于多个订单和/或客户的信息\nselect @X.value('/Order/Customer/@Id','int')\n\
  \n-- 成功：从第一个订单的第一个行项获取第一个 ArticleId\nselect @X.value('/Order[1]/OrderLineItems[1]/OrderLineItem[1]/ArticleId[1]','int')\n\
  \n-- 错误：不是单例；SQL Server 不知道 ArticleId 是一个元素而不是一个节\nselect @X.value('/Order[1]/OrderLineItems[1]/OrderLineItem[1]/ArticleId','int')\n\
  ```\n\n> **注意**：XML 模式帮助 SQL Server 检测 XPath 是否引用了单例，而无需在路径表达式中指定索引/序数。\n\n一个关键的\
  \ XQuery 概念称为 *节点原子化*。当 XPath 表达式在未类型化 XML 中识别一个元素时，XQuery 不知道该元素是一个节还是它有任何子节点。因此，它尝试解析并连接该节下所有\
  \ XML 子节点的值，通过在执行计划中添加另一个表值函数来实现。这样做可能会给查询引入明显的性能影响。作为解决方法，可以使用 XQuery 函数 `text()`，该函数返回元素的文本表示形式，并消除表值函数调用。\n\
  \n代码清单 12-8 展示了这种行为的示例，图 12-4 显示了这两个调用的执行计划。\n\n**代码清单 12-8.** 节点原子化的开销\n\n```sql\n\
  declare\n@X xml =\n'<Order OrderId=\"42\" OrderTotal=\"49.96\">\n    <CustomerId>123</CustomerId>\n\
  \    <OrderNum>10025</OrderNum>\n    <OrderDate>2016-07-15T10:05:20</OrderDate>\n\
  \    <OrderLineItems>\n        <OrderLineItem>\n            <ArticleId>250</ArticleId>\n\
  \            <Quantity>3</Quantity>\n            <Price>9.99</Price>\n        </OrderLineItem>\n\
  \        <OrderLineItem>\n            <ArticleId>404</ArticleId>\n            <Quantity>1</Quantity>\n\
  \            <Price>19.99</Price>\n        </OrderLineItem>\n    </OrderLineItems>\n\
  </Order>'\n\nselect @X.value('(/Order/CustomerId)[1]','int')\nselect @X.value('(/Order/CustomerId/text())[1]','int')\n\
  ```\n\n**图 12-4.** 节点原子化的开销\n\n节点原子化仅在 XML 实例是未类型化时发生。让我们看看类型化 XML 数据会发生什么，如代码清单\
  \ 12-9 和图 12-5 所示。\n\n**代码清单 12-9.** 类型化 XML 数据与节点原子化\n\n\n# 第 12 章 ■ XML 与 JSON\n\
  \n声明\n`@X xml` (文档 `ElementCentricSchema`) =\n'<Order>\n<OrderId>42</OrderId>\n\
  <OrderTotal>49.96</OrderTotal>\n<CustomerId>123</CustomerId>\n<OrderNum>10025</OrderNum>\n\
  <OrderDate>2016-07-15T10:05:20</OrderDate>\n<OrderLineItems>\n<OrderLineItem>\n\
  <ArticleId>250</ArticleId>\n<Quantity>3</Quantity>\n<Price>9.99</Price>\n</OrderLineItem>\n\
  <OrderLineItem>\n<ArticleId>404</ArticleId>\n<Quantity>1</Quantity>\n<Price>19.99</Price>\n\
  </OrderLineItem>\n</OrderLineItems>\n</Order>'\n\nselect `@X.value('(/Order/CustomerId)[1]','int')`\n\
  \n***图 12-5.** 类型化 XML 与节点原子化*\n\n如你所见，不存在节点原子化的额外开销。SQL Server 知道 `CustomerId`\
  \ 是一个整数，而不是一个片段。这是通过 XML 架构集合保留 XML 类型信息的另一个好处。\n\n最后，让我们看看当我们定义了主 XML 索引，并对 `ElementCentricTyped`\
  \ 表中的一行运行相同方法时会发生什么，如代码清单 12-10 所示。执行计划如图 12-6 所示。\n\n***代码清单 12-10.** 存在 XML 索引时调用\
  \ XML 数据类型方法*\n```\nselect XmlData.value('(/Order/CustomerId)[1]','int')\nfrom dbo.ElementCentricTyped\n\
  where ID = 1\n```\n\n![](img/index-275_1.jpg)\n\n***图 12-6.** 存在 XML 索引时的执行计划*\n\
  \n如你所见，SQL Server 从主 XML 索引中检索数据，而不是使用表值函数。\n\n## exists() 方法\n\n`exist()` 方法在 XQuery/XPath\
  \ 返回非空结果时返回 `1`。虽然你可以在需要检查 XML 节点是否存在时使用此方法，但该方法的典型用例是检查具有特定值的元素或属性的存在性。\n\n这种方法通常比先使用\
  \ `value()` 方法解析 XML 然后再比较结果的方法性能更好。这是因为你是在 XML Reader 中评估 XPath 谓词，而不是在解析 XML 之后进行评估。你还可以使用\
  \ `sql:column()` 和 `sql:variable()` 函数将变量或表列中的值传递给 XPath 谓词。\n\n另一个重要因素是，`exist()`\
  \ 方法可以利用辅助的 `FOR VALUE` XML 索引，而 `value()` 方法则不能。\n\n现在，让我们创建该索引并比较这两种方法的性能。实现此目标的代码如代码清单\
  \ 12-11 所示，执行计划如图 12-7 所示。\n\n***代码清单 12-11.** 比较 exist() 和 value() 方法*\n```\ncreate\
  \ xml index XML_Value on dbo.ElementCentricUntyped(XMLData)\nusing xml index XML_Primary_ElementCentricUntyped\
  \ for value;\n\nselect count(*)\nfrom dbo.ElementCentricUntyped\nwhere XmlData.exist('/Order/OrderNum/text()[.=\"\
  10025\"]') = 1;\n\nselect count(*)\nfrom dbo.ElementCentricUntyped\nwhere XmlData.value('(/Order/OrderNum/text())[1]','varchar(32)')\
  \ = '10025';\n```\n\n![](img/index-276_1.jpg)\n\n![](img/index-276_2.jpg)\n\n***图\
  \ 12-7.** 比较 exist() 和 value() 方法*\n\n然而，在没有 `FOR VALUE` 辅助 XML 索引的情况下，`value()`\
  \ 方法可能比 `exist()` 方法更高效。还有一点需要注意。XQuery 将字符串数据比较为 Unicode 区分大小写的字符串，并且不考虑数据库排序规则。因此，在\
  \ XQuery `value()` 方法内执行比较时，你可能会得到不同的结果。代码清单 12-12 所示的代码展示了此类行为的一个例子。\n\n***代码清单\
  \ 12-12.** XQuery 中的字符串比较*\n```\ndeclare\n  @X xml = '<Order OrderNum=\"Order1\"\
  ><OrderId>1</OrderId></Order>'\n  ,@V varchar(32) = 'ORDER1'\n\nselect 'exist():\
  \ found' as [Result]\nwhere @X.exist('/Order/@OrderNum[.=sql:variable(\"@V\")]')\
  \ = 1\n\nselect 'value(): found' as [Result]\nwhere @X.value('/Order[1]/@OrderNum','varchar(16)')\
  \ = @V\n```\n\n\n\n# 第 12 章 ■ XML 与 JSON\n\n## exist() 方法\n\n如图 12-8 所示，`exist()`\
  \ 方法以区分大小写的方式比较 `OrderNum` 属性和 `@V` 变量，当使用不区分大小写的排序规则时，它在 T-SQL 中会产生不同的比较结果。\n\n\
  **图 12-8.** XQuery 中的字符串比较\n\n与 `value()` 方法一样，节点的原子化规则也适用于 `exist()` 方法。在处理无类型\
  \ XML 时，最好将节点路径移到谓词部分之外，并使用 *当前节点* 符号 '.' 来引用它。这有助于避免类型转换，类型转换会在执行计划中引入一个实现 XQuery/XPath\
  \ 操作的额外 UDX 运算符。\n\n![](img/index-277_1.jpg)\n\n清单 12-13 所示的代码执行三个查询。第一个查询在谓词内部引用元素，并执行节点的原子化，这导致对表值\
  \ XML Reader 函数的额外调用。第二个查询不执行节点的原子化，尽管它执行了将值转换为 `xs:int` 类型的比较转换。这会将 UDX 运算符添加到执行计划中。最后一个查询将值作为字符串进行比较，这是最高效的方法。再次记住，字符串比较使用的是\
  \ Unicode、区分大小写的比较规则。图 12-9 展示了所有三个查询的执行计划。\n\n**清单 12-13.** 节点的原子化和类型转换\n\n```sql\n\
  declare\n    @X xml = '<Order OrderNum=\"Order1\"><OrderId>1</OrderId></Order>'\n\
  \nselect 'Atomization of nodes'\nwhere @X.exist('/Order[OrderId=1]') = 1;\n\nselect\
  \ 'No text() function'\nwhere @X.exist('/Order/OrderId[.=1]') = 1;\n\nselect 'With\
  \ text() function'\nwhere @X.exist('/Order/OrderId/text()[.=1]') = 1;\n```\n\n**图\
  \ 12-9.** 节点的原子化和类型转换\n\n![](img/index-278_1.jpg)\n\n## query() 方法\n\n`query()`\
  \ 方法返回该查询指定的无类型 XML。您可以使用此方法获取原始 XML 的一部分，或将其转换为另一个 XML。清单 12-14 所示的代码演示了这两种用例。结果如图\
  \ 12-10 所示。\n\n**清单 12-14.** `query()` 方法\n\n```sql\ndeclare\n    @X xml =\nN'<Order\
  \ OrderId=\"42\" OrderTotal=\"49.96\">\n    <CustomerId>123</CustomerId>\n    <OrderNum>10025</OrderNum>\n\
  </Order>'\n\nselect\n    @X.query('/Order/CustomerId') as [Part of XML]\n    ,@X.query('<Customer\
  \ Id=\"{/Order/CustomerId/text()}\"/>') as [Transform]\n```\n\n**图 12-10.** `query()`\
  \ 方法\n\n## nodes() 方法\n\n`nodes()` 方法将 XML 拆解为关系数据。它返回一个行集，其中的行表示由路径表达式标识的节点。此外，您可以使用其他\
  \ XML 方法（例如 `value()`）将这些行拆解为单个元素和属性。\n\n清单 12-15 所示的代码展示了如何从行集中访问单个节点，并将它们拆解为单个值。您可以在图\
  \ 12-11 中看到结果。\n\n**清单 12-15.** `nodes()` 方法\n\n```sql\ndeclare\n    @X xml =\n\
  '<Order OrderId=\"42\" OrderTotal=\"49.96\">\n    <CustomerId>123</CustomerId>\n\
  \    <OrderNum>10025</OrderNum>\n    <OrderDate>2016-07-15T10:05:20</OrderDate>\n\
  \    <OrderLineItems>\n        <OrderLineItem>\n            <ArticleId>250</ArticleId>\n\
  \            <Quantity>3</Quantity>\n            <Price>9.99</Price>\n        </OrderLineItem>\n\
  \        <OrderLineItem>\n            <ArticleId>404</ArticleId>\n            <Quantity>1</Quantity>\n\
  \            <Price>19.99</Price>\n        </OrderLineItem>\n    </OrderLineItems>\n\
  </Order>'\n\nselect\n    t.c.query('.') as [Raw Node]\n    ,t.c.value('(ArticleId/text())[1]','int')\
  \ as [ArticleId]\nfrom @X.nodes('/Order/OrderLineItems/OrderLineItem') as t(c)\n\
  ```\n\n**图 12-11.** `nodes()` 方法\n\n当您将 `nodes()` 方法与表中的 XML 列一起使用时，必须使用 `APPLY`\
  \ 运算符。您可以在清单 12-16 中看到一个例子。\n\n**清单 12-16.** 将 `nodes()` 方法与 `APPLY` 运算符一起使用\n\n\
  ```sql\nselect\n    t.ID\n```\n\n\n\n# 第 12 章 ■ XML 与 JSON\n\n## 向下钻取方法\n\n```xquery\n\
  ,sum(Items.Item.value('(Quantity/text())[1]','int') *\n    Items.Item.value('(Price/text())[1]','float'))\
  \ as [Total]\nfrom\n    dbo.ElementCentricUntyped t cross apply\n    t.XMLData.nodes('/Order/OrderLineItems/OrderLineItem')\n\
  \        as Items(Item)\ngroup by\n    t.ID\n```\n\n在路径表达式中，应避免使用后代轴来引用父节点；相反，应使用多个`nodes()`方法的向下钻取方法。\n\
  \n现在，让我们比较这两种方法。假设你有一个包含多个订单信息的 XML，如代码清单 12-17 所示。\n\n### 代码清单 12-17. 向下钻取方法：XML\n\
  \n```xml\ndeclare\n@X xml =\nN'<Orders>\n    <Order OrderId=\"42\" CustomerId=\"\
  123\" OrderNum=\"10025\">\n        <OrderLineItem ArticleId=\"250\" Quantity=\"\
  3\" Price=\"9.99\"/>\n        <OrderLineItem ArticleId=\"404\" Quantity=\"1\" Price=\"\
  19.99\"/>\n    </Order>\n    <Order OrderId=\"54\" CustomerId=\"234\" OrderNum=\"\
  10025\">\n        <OrderLineItem ArticleId=\"15\" Quantity=\"1\" Price=\"14.99\"\
  />\n        <OrderLineItem ArticleId=\"121\" Quantity=\"2\" Price=\"6.99\"/>\n \
  \   </Order>\n</Orders>'\n```\n\n假设你想要得到一个包含`OrderId`、`CustomerId`、`ArticleId`、`Quantity`和`Price`列的结果集。第一种方法使用`nodes()`方法来分解`OrderLineItems`节点，并将使用后代轴从那里访问`CustomerId`和`OrderId`。第二种方法将使用两个`nodes()`方法：一个用于分解各个`Order`节点，第二个用于从这些节点分解`OrderLineItems`。实现这两种方法所需的代码如代码清单\
  \ 12-18 所示。\n\n### 代码清单 12-18. 向下钻取方法：查询\n\n```sql\nselect\n    LineItems.Item.value('../@OrderId','int')\
  \ as [OrderId]\n    ,LineItems.Item.value('../@OrderNum','varchar(32)') as [OrderNum]\n\
  \    ,LineItems.Item.value('@ArticleId','int') as [ArticleId]\n    ,LineItems.Item.value('@Quantity','int')\
  \ as [Quantity]\n    ,LineItems.Item.value('@Price','float') as [Price]\nfrom\n\
  \    @X.nodes('/Orders/Order/OrderLineItem') as LineItems(Item);\n```\n\n```sql\n\
  select\n    Orders.Ord.value('@OrderId','int') as [OrderId]\n    ,Orders.Ord.value('@OrderNum','varchar(32)')\
  \ as [CustomerId]\n    ,LineItems.Item.value('@ArticleId','int') as [ArticleId]\n\
  \    ,LineItems.Item.value('@Quantity','int') as [Quantity]\n    ,LineItems.Item.value('@Price','float')\
  \ as [Price]\nfrom\n    @X.nodes('/Orders/Order') as Orders(Ord) cross apply\n \
  \   Orders.Ord.nodes('OrderLineItem') as LineItems(Item)\n```\n\n图 12-12 显示了这些查询的执行计划。后代轴在执行计划中引入了一对额外的\
  \ XML 读取器，这显著降低了查询的性能。\n\n![图 12-12. 向下钻取方法：执行计划](img/index-281_1.jpg)\n\n## modify()方法\n\
  \n最后，`modify()`方法允许你使用**XML 数据修改语言（XML DML）**来修改 XML 数据。我不会深入讲解 DML XML 语法。你可以在联机丛书[`msdn.microsoft.com/en-us/library/ms177454.aspx`](http://msdn.microsoft.com/en-us/library/ms177454.aspx)中找到关于\
  \ XML DML 的详细信息。\n\n前面讨论的所有 XQuery/XPath 性能注意事项在这里同样适用。\n\n#### OPENXML\n\n**OPENXML**是在\
  \ SQL Server 中处理 XML 数据的另一种方式。它利用 MSXML 解析器（`Msxmlsql.dll`），并将文档保存在内存缓存中，该缓存最多可使用\
  \ SQL Server 内存的八分之一。\n\n所有 XML 文档都需要使用`sp_xml_preparedocument`存储过程单独解析。因此，你不能使用`OPENXML`来处理来自多个表行的\
  \ XML 数据。对于单个 XML 文档，`OPENXML`的性能优于 XQuery，尽管`OPENXML`的内存使用模式使其成为一个危险的选择。如果你的代码没有使用`sp_xml_removedocument`存储过程将文档从缓存中移除，你可能会丢失大量\
  \ SQL Server 内存。除非 XQuery 的性能不足以完成要执行的任务，否则我建议避免使用`OPENXML`。\n\n\n\n# 第 12 章 ■ XML\
  \ 与 JSON\n\n#### SELECT FOR XML\n\n你可以通过使用 `FOR XML` 子句，以 XML 格式检索 `SELECT` 查询的结果。有四种模式可以控制生成的\
  \ XML 的形态：`RAW`、`AUTO`、`EXPLICIT` 和 `PATH`。当你需要为复杂结构生成 XML 时，我推荐使用 `PATH` 模式。清单\
  \ 12-19 中展示的代码演示了如何使用 `FOR XML PATH` 来实现这一点。\n\n### 清单 12-19. 使用 `FOR XML PATH`\n\
  \n```sql\ndeclare\n@Orders table\n(\n    OrderId int not null primary key,\n   \
  \ CustomerId int not null,\n    OrderNum varchar(32) not null,\n    OrderDate date\
  \ not null\n)\n\ndeclare\n@OrderLineItems table\n(\n    OrderId int not null,\n\
  \    ArticleId int not null,\n    Quantity int not null,\n    Price money not null,\n\
  \    primary key(OrderId, ArticleId)\n)\n\ninsert into @Orders(OrderId, CustomerId,\
  \ OrderNum, OrderDate)\nvalues\n    (42,123,'10025','2016-07-15T10:05:20'),\n  \
  \  (54,25,'10032','2016-07-15T11:21:00')\n\ninsert into @OrderLineItems(OrderId,\
  \ ArticleId, Quantity, Price)\nvalues\n    (42,250,3,9.99), (42,404,1,19.99),\n\
  \    (54,15,1,14.99), (54,121,2,6.99)\n\nselect\n    o.OrderId as [@OrderId]\n \
  \   ,o.OrderNum as [OrderNum]\n    ,o.CustomerId as [CustomerId]\n    ,o.OrderDate\
  \ as [OrderDate]\n    ,( select\n        i.ArticleId as [@ArticleId]\n        ,i.Quantity\
  \ as [@Quantity]\n        ,i.Price as [@Price]\n        from @OrderLineItems i\n\
  \        where i.OrderId = o.OrderId\n        for xml path('OrderLineItem'),root('OrderLineItems'),\
  \ type )\nfrom @Orders o\nfor xml path('Order'),root('Orders');\n```\n\n### 结果：\n\
  \n```xml\n<Orders>\n  <Order OrderId=\"42\">\n    <OrderNum>10025</OrderNum>\n \
  \   <CustomerId>123</CustomerId>\n    <OrderDate>2016-07-15</OrderDate>\n    <OrderLineItems>\n\
  \      <OrderLineItem ArticleId=\"250\" Quantity=\"3\" Price=\"9.99\" />\n     \
  \ <OrderLineItem ArticleId=\"404\" Quantity=\"1\" Price=\"19.99\" />\n    </OrderLineItems>\n\
  \  </Order>\n  <Order OrderId=\"54\">\n    <OrderNum>10032</OrderNum>\n    <CustomerId>25</CustomerId>\n\
  \    <OrderDate>2016-07-15</OrderDate>\n    <OrderLineItems>\n      <OrderLineItem\
  \ ArticleId=\"15\" Quantity=\"1\" Price=\"14.99\" />\n      <OrderLineItem ArticleId=\"\
  121\" Quantity=\"2\" Price=\"6.99\" />\n    </OrderLineItems>\n  </Order>\n</Orders>\n\
  ```\n\n你可以使用 `FOR XML PATH` 子句生成一个由分隔符分隔的值列表。清单 12-20 中的代码从表中生成了一个以逗号分隔的 `RecId`\
  \ 值列表。\n\n### 清单 12-20. 使用 `FOR XML PATH` 生成逗号分隔的值列表\n\n```sql\nselect LEFT(Data,LEN(Data)\
  \ - 1) -- 移除最右边的逗号\nfrom\n(   select convert(varchar(max),\n        ( select RecId\
  \ as [text()], ',' as [text()]\n          from dbo.Data\n          for XML PATH('')\
  \ ) ) as Data\n) List\n```\n\n与在代码中使用常规的字符串连接相比，这种方法非常快。然而，你需要小心，因为 SQL Server 会在必要时用字符实体替换字符。例如，如果存在\
  \ `<` 字符，它会将其替换为 `&lt;`。\n\n有关 `FOR XML` 子句及其生成的 XML 形状的更多信息，请阅读此文：`http://msdn.microsoft.com/en-us/library/ms178107.aspx`。\n\
  \n## 处理 JSON 数据 (SQL Server 2016)\n\nSQL Server 2016 提供了几种有助于处理 JSON 数据的方法。它没有原生的\
  \ JSON 数据类型，你需要将 JSON 数据作为文本存储在数据库中。但是，你可以使用 `SELECT FOR JSON` 操作符以 JSON 格式选择数据，使用\
  \ `OPENJSON` 表值函数将 JSON 数据解析为行集，并使用几个内置函数操作 JSON 数据。\n\n在 XML 和 JSON 之间的选择取决于许多因素。尽管这两种技术都允许你处理半结构化数据，但它们有所不同。XML，代表\
  \ `可扩展标记语言`，是一种允许你描述、验证和操作数据的 `语言`。一个结构良好的 XML 文档是自包含且自解释的，并且可以通过 XML 架构进行强类型化。\n\
  \n\n\n# SQL Server 中的 XML 与 JSON 支持\n\n## XML 与 JSON 对比\n\nSQL Server 中的 XML 支持更为成熟。你可以通过\
  \ XML 架构（**XML schema**）来实施强类型检查，并使用 XQuery 进行操作。你还可以为其创建索引，以提升处理 XML 数据的查询性能。当你期望在\
  \ T-SQL 中查询或修改半结构化数据，和/或希望在查询中受益于 XML 索引时，XML 是更好的选择。\n\n另一方面，JSON 代表 `JavaScript\
  \ Object Notation`。它不是一种语言，而是一种为系统间数据通信优化的数据格式。与 XML 相比，它更易读、更轻量，并且分解和解析速度更快。然而，它并非设计用于复杂的数据操作和转换。\n\
  \n相比之下，SQL Server 2016 对 JSON 的支持相当有限。无法验证 JSON 架构或为 JSON 数据创建索引。当你无需强制实施特定的 JSON\
  \ 架构，也不期望在数据库中分解或解析大量 JSON 数据时，它可能是一个不错的选择。\n\n#### SELECT FOR JSON\n\n你可以使用 `FOR\
  \ JSON` 子句，并选择 `AUTO` 或 `PATH` 模式，将查询结果格式化为 JSON 格式。在 `AUTO` 模式下，JSON 输出基于 `SELECT`\
  \ 语句的结构进行格式化。而 `PATH` 模式则让你能完全控制输出格式。\n\n有三个附加选项用于控制格式化，如下所示：\n-   `ROOT` 向 JSON\
  \ 输出添加顶级元素。\n-   `INCLUDE_NULL_VALUES` 允许你将 `NULL` 属性添加到输出中。默认情况下，`NULL` 值会被省略。\n\
  -   `WITHOUT_ARRAY_WRAPPER` 移除用于包裹输出的数组方括号。\n\n清单 12-21 展示了 `SELECT FOR JSON AUTO`\
  \ 操作符的示例。它使用了在清单 12-19 中定义的 `@Orders` 和 `@OrderLineItems` 表变量。\n\n***清单 12-21.***\
  \ 使用 `SELECT FOR JSON AUTO`\n```sql\nselect\n    o.OrderId as [OrderId]\n    ,o.OrderNum\
  \ as [OrderNum]\n    ,o.CustomerId as [CustomerId]\n    ,o.OrderDate as [OrderDate]\n\
  \    ,(\n        select\n            i.ArticleId as [ArticleId]\n            ,i.Quantity\
  \ as [Quantity]\n            ,i.Price as [Price]\n        from @OrderLineItems i\n\
  \        where i.OrderId = o.OrderId\n        for json auto\n    ) as LineItems\n\
  from @Orders o\nfor json auto\n```\n```json\n-- 部分结果：\n[\n  {\n    \"OrderId\":42,\n\
  \    \"OrderNum\":\"10025\",\n    \"CustomerId\":123,\n    \"OrderDate\":\"2016-07-15\"\
  ,\n    \"LineItems\":\n    [\n      {\n        \"ArticleId\":250,\n        \"Quantity\"\
  :3,\n        \"Price\":9.9900\n      },\n      {\n        \"ArticleId\":404,\n \
  \       \"Quantity\":1,\n        \"Price\":19.9900\n      }\n    ]\n  },\n  {\n\
  \    \"OrderId\":54,\n    -- 已跳过\n  }\n]\n```\n与 `SELECT FOR XML PATH` 类似，`SELECT\
  \ FOR JSON PATH` 让你能完全控制生成 JSON 的形状。你可以在 [`msdn.microsoft.com/en-us/library/dn921882.aspx`](https://msdn.microsoft.com/en-us/library/dn921882.aspx)\
  \ 阅读更多相关内容。\n\n#### 内置函数\n\nSQL Server 2016 提供了多个处理 JSON 数据的函数，如下所示：\n-   `ISJSON`\
  \ 测试字符串是否包含有效的 JSON。如果需要强制列存储有效的 JSON 数据，可以在 `CHECK` 约束中使用此函数。\n-   `JSON_VALUE`\
  \ 从 JSON 字符串中提取标量值。你可以使用此函数将 JSON 属性提取到持久化计算列中，随后为其创建索引。\n-   `JSON_QUERY` 从 JSON\
  \ 字符串中提取对象或数组。\n-   `JSON_MODIFY` 更新 JSON 字符串中属性的值，并返回修改后的 JSON 字符串。\n\n清单 12-22\
  \ 展示了这些函数的实际应用。\n\n***清单 12-22.*** 使用内置函数\n```sql\ndeclare\n    @Data nvarchar(max)\
  \ = N'\n    {\n        \"Book\":{\n            \"Title\":\"Pro SQL Server Internals\
  \ 2nd Edition\",\n            \"ISBN\":\"978-1484219638\",\n            \"Author\"\
  : {\n                \"Name\":\"Dmitri Korotkevitch\",\n                \"Blog\"\
  :\"http://aboutsqlserver.com\"\n            }\n        }\n    }'\n\nselect\n   \
  \ isjson(@Data) as [Is JSON]\n    ,json_value(@Data,'$.Book.Title') as [Title]\n\
  \    ,json_query(@Data,'$.Book.Author') as [Author in JSON]\n    ,json_modify(@Data,'$.Book.Year',2016)\
  \ as [Modified JSON];\n```\n\n\n\n你可以在 [`msdn.microsoft.com/en-us/library/dn921890.aspx`](https://msdn.microsoft.com/en-us/library/dn921890.aspx)\
  \ 阅读更多相关内容。\n\n#### OPENJSON\n\n`OPENJSON` 表值函数可让你将 JSON 值分解为行集。它仅在兼容级别为 `130` 的数据库中可用。你可以调用此函数，无论是否通过\
  \ `WITH` 子句为输出提供显式的架构定义。\n\n清单 12-23 展示了一个示例，该示例分解了清单 12-20 中生成的 JSON 数据。\n\n***清单\
  \ 12-23.*** 使用 `OPENJSON`\n\n```sql\ndeclare\n    @Data varchar(max) = '/* JSON\
  \ FROM LISTING 12-20 */'\n\nselect\n    Orders.OrderId, Orders.CustomerId, Orders.OrderNum\n\
  \    ,Orders.OrderDate, Orders.LineItems\n    ,sum(Items.Quantity * Items.Price)\
  \ as Total\nfrom\n    openjson(@Data,'$')\n    with\n    (\n        OrderId int\
  \ '$.OrderId',\n        CustomerId int '$.CustomerId',\n        OrderNum varchar(32)\
  \ '$.OrderNum',\n        OrderDate date '$.OrderDate',\n        LineItems nvarchar(max)\
  \ '$.LineItems' as json\n    ) as Orders\n    cross apply\n        openjson(Orders.LineItems,'$')\n\
  \        with\n        (\n            Quantity int '$.Quantity',\n            Price\
  \ float '$.Price'\n        ) as Items\ngroup by\n    Orders.OrderId, Orders.CustomerId,\
  \ Orders.OrderNum\n    ,Orders.OrderDate, Orders.LineItems\n```\n\n![](img/index-287_1.jpg)\n\
  \n![](img/index-287_2.jpg)\n\n第 12 章 ■ XML 和 JSON\n\n图 12-13 展示了此查询的输出。如你所见，第一个结果集中的\
  \ `LineItems` 列是 JSON 格式，然后被第二个 `OPENJSON` 函数分解。\n\n***图 12-13.** `OPENJSON`：查询输出*\n\
  \n图 12-14 展示了查询的部分执行计划。如你所见，SQL Server 为 `OPENJSON` 函数的输出估计了五十行。这个值是硬编码的，即使你在数据库中启用了旧版基数估计器，它也不会改变。如果你预期输出包含大量行，你应该意识到这种行为。\n\
  \n***图 12-14.** `OPENJSON`：查询执行计划*\n\n你可以使用 JSON 从客户端应用程序传递一批行，然后使用 `OPENJSON` 函数进行分解。与表值参数相比，它的*效率较低*；但是，如果\
  \ SQL 客户端库不支持表值参数，可以使用此方法。我们将在下一章比较这种方法与其他方法的性能。\n\n你可以在 [`msdn.microsoft.com/en-us/library/mt629158.aspx`](https://msdn.microsoft.com/en-us/library/mt629158.aspx)\
  \ 阅读更多相关内容。\n\n第 12 章 ■ XML 和 JSON\n\n#### 总结\n\n虽然 XML 和 JSON 为数据模型增加了灵活性，但其代价*高昂*。针对\
  \ XML 数据的查询比针对关系数据的查询更慢且更耗费 CPU。你可以使用 XML 索引来改进 XQuery 性能，尽管它们需要大量的存储空间——通常是 XML\
  \ 数据本身大小的数倍。JSON 数据操作给 CPU 增加的开销较少；但是，它仅在 SQL Server 2016 中受支持，且支持相当有限。SQL Server\
  \ 2016 不提供原生 JSON 数据类型，也不允许对 JSON 数据建立索引。\n\n建议在 XML 数据相对静态、索引维护不会引入大量开销、XML 数据被足够频繁地查询、并且你有足够的存储空间来容纳索引时，创建主\
  \ XML 索引。二级 XML 索引（在主 XML 索引的内部表上的非聚集索引）对于优化代码中的特定查询模式可能很有用。\n\n你可以通过指定 XML 符合特定的\
  \ XML 架构集合来使 XML 具有类型。针对类型化 XML 的查询通常更高效。类型化 XML 需要更多的存储空间，因为 XML 数据类型保留类型信息，即使它减少了主\
  \ XML 索引的大小，尤其是在以元素为中心的 XML 的情况下。在创建类型化 XML 之前，你需要考虑架构验证的开销。\n\n在设计高效的 XQuery 和\
  \ XPath 表达式时，必须遵循几个规则。\n\n\n\n在未类型化的 XML 中，最大的性能损耗之一是节点的原子化。这会导致对 XML Reader 的表值函数的额外调用。此外，路径中的后代轴、路径中间的表达式以及类型转换也会对\
  \ XQuery 性能产生负面影响。\n\n除非绝对必要，否则必须避免使用存储名称/值对的属性容器设计模式，例如 `<props><name>color</name>\
  \ <value>black</value></props>`。原因在于，当您访问此类 XML 中存储在值元素中的数据时，属性容器设计模式通常会在路径中间引入表达式。\n\
  \n最重要的决策是在设计阶段做出的。您必须评估是否需要使用 XML 或 JSON，然后必须定义哪些数据应以 XML 或 JSON 格式存储。当数据符合关系模型时，通过分解全部或部分数据，并将独立的元素和属性保留为常规的非\
  \ XML/非 JSON 列，您将获得更好的性能。虽然在系统中拥有灵活性是件好事，但您必须记住，没有什么是免费的，灵活性是以性能为代价的。\n\n# 第 13\
  \ 章\n\n## 临时对象与 TempDB\n\n临时对象是 SQL Server 的重要组成部分。SQL Server 有时会在查询执行过程中创建它们来存储工作表和中间结果集。其他时候，它们由开发人员创建。在本章中，我们将讨论用户可以创建的几种不同类型的临时对象：局部临时表和全局临时表、表变量、用户定义的表类型以及表值参数。我们还将讨论\
  \ `tempdb` 及其性能优化方法。\n\n#### 临时表\n\n我们创建*临时表*来存储短期信息，例如数据处理过程中的中间结果和临时数据。临时表位于 `tempdb`\
  \ 中，其行为与常规表非常相似。不过，它们之间存在一些细微差别，我们将在本章后面讨论。\n\n临时表有两种：局部和全局。*局部临时表*以 `#` 符号开头命名，并且仅在创建它们的会话以及从该会话调用的模块中可见。当多个会话同时创建同名的局部临时表时，每个会话都将拥有自己独立的表实例。\n\
  \n例如，当您在存储过程中创建临时表时，您可以在该特定存储过程中以及从该存储过程调用的其他存储过程中访问它。\n\n**注意** 如果存储过程执行了触发某些表上定义触发器的操作，则可以从这些触发器中访问在存储过程中创建的临时表。然而，这显然不是一个好主意，因为如果临时表尚未创建，数据修改操作将会失败。\n\
  \n清单 13-1 提供了一个演示临时表作用域的示例。\n\n***清单 13-1.*** 局部临时表的作用域和可见性\n\n```\ncreate table\
  \ #SessionScope(C1 int not null)\ngo\ncreate proc dbo.P1\nas\nbegin\n    -- 成功:\
  \ #SessionScope 可见，因为它是在会话作用域中创建的\n    select * from #SessionScope\n    -- 结果取决于如何调用\
  \ P1\n    select * from #P2Scope\nend\ngo\ncreate proc dbo.P2\nas\nbegin\n    create\
  \ table #P2Scope(ID int)\n    -- 成功: #SessionScope 可见，因为它是在会话作用域中创建的\n    select\
  \ * from #SessionScope;\n    -- 成功 - P1 从 P2 中调用，因此表 #P2Scope 在其中可见\n    exec dbo.P1;\n\
  \    -- 成功 #P2Scope 从 P2 内部调用的动态 SQL 中可见\n    exec sp_executesql N'select * from\
  \ #P2Scope';\nend\ngo\n-- 成功: #SessionScope 可见，因为它是在会话作用域中创建的\nselect * from #SessionScope;\n\
  -- 成功\nexec dbo.P2;\n```\n\n\n\n# 第 13 章 ■ 临时对象与 TEMPDB\n\n## 错误示例与基础概念\n\n-- 错误：无效的对象名\
  \ '`#P2Scope`'\n\n```sql\nexec dbo.P1;\n```\n\n`#SessionScope` 是在连接/会话级别创建的临时表。此表在该会话内的任何位置都是可见且可访问的。另一个临时表\
  \ `#P2Scope` 是在存储过程 `dbo.P2` 中创建的。该表在创建后，在存储过程 `dbo.P2` 内部以及从 `dbo.P2` 调用的其他存储过程和动态\
  \ SQL 中都是可见的。最后，如你所见，存储过程 `dbo.P1` 引用了 `#SessionScope` 和 `#P2Scope` 表。因此，当该存储过程从\
  \ `dbo.P2` 存储过程内部调用时可以正常工作，但如果从其他任何地方调用，而临时表 `#P2Scope` 尚未被创建，则会失败。\n\n## 临时表的删除时机\n\
  \n你可以使用 `DROP TABLE` 语句来删除临时表。或者，当会话断开连接或在创建它们的模块执行完毕后，SQL Server 会自动删除它们。在前面的例子中，`#SessionScope`\
  \ 表会在会话断开时被删除，而 `#P2Scope` 会在 `dbo.P2` 存储过程执行完毕后被删除。\n\n## 全局临时表\n\n全局临时表的名称以 `##`\
  \ 开头，它们对所有会话可见。它们会在创建它们的会话断开连接**并且**其他会话停止引用它们后被删除。\n\n## 临时表的特性与限制\n\n无论是全局还是局部临时表，都不能在它们上面定义触发器，也不能参与视图。尽管如此，与常规表一样，你可以在临时表上创建聚集索引和非聚集索引并定义约束。\n\
  \n## 统计信息与查询优化\n\nSQL Server 维护临时表上定义的索引的统计信息，其方式与常规表类似。临时表有一个额外的统计信息更新阈值（最左边统计信息列有六次变更），这是常规表所没有的。`KEEP\
  \ PLAN` 查询提示可以让我们防止基于该阈值的统计信息更新，从而匹配常规表的行为。\n\n临时表通常用于通过将大型复杂查询拆分成更小更简单的查询来简化它们。这有助于查询优化器在几个方面找到更好的执行计划。首先，更简单的查询通常具有更少数量的可能执行计划，这减少了查询优化器的搜索范围，并提高了找到更好执行计划的机会。此外，更简单的查询通常具有更好的基数估算，因为当计划中出现越来越多的运算符时，错误的数量往往会快速增长。而且，临时表维护的统计信息允许查询优化器使用实际的基数数据，而不是依赖那些经常不正确的估算。\n\
  \n## 使用示例：创建表与填充数据\n\n让我们来看一个这样的例子。第一步，如代码清单 13-2 所示，我们创建一个表并填充数据。\n\n***代码清单 13-2.***\
  \ 使用临时表优化查询：表创建\n\n```sql\ncreate table dbo.Orders\n(\n    OrderId int not null,\n\
  \    CustomerId int not null,\n    Amount money not null,\n    Placeholder char(100),\n\
  \    constraint PK_Orders\n        primary key clustered(OrderId)\n);\n\ncreate\
  \ index IDX_Orders_CustomerId on dbo.Orders(CustomerId);\n\n;with N1(C) as (select\
  \ 0 union all select 0) -- 2 rows\n,N2(C) as (select 0 from N1 as T1 cross join\
  \ N1 as T2) -- 4 rows\n,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) --\
  \ 16 rows\n,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256 rows\n\
  ,N5(C) as (select 0 from N4 as T1 cross join N4 as T2) -- 65,536 rows\n,IDs(ID)\
  \ as (select row_number() over (order by (select null)) from N5)\ninsert into dbo.Orders(OrderId,\
  \ CustomerId, Amount)\nselect ID, ID % 250 + 1, Id % 50 from IDs;\n```\n\n此时，表中已有\
  \ 65,536 行订单数据，均匀分布在 250 个客户中。在下一步中，我们将创建一个多语句表值函数，它接受一个以逗号分隔的 ID 值列表作为参数，并返回一个包含各行\
  \ ID 值的表。\n\n\n\n# 第 13 章 ■ 临时对象与 TEMPDB\n\n## 清单 13-3. 使用临时表优化查询：创建函数\n\n```sql\n\
  create function dbo.ParseIDList(@List varchar(8000))\nreturns @IDList table\n(\n\
  \    ID int\n)\nas\nbegin\n    if (IsNull(@List,'') = '')\n        return;\n\n \
  \   if (right(@List,1) <> ',')\n        select @List += ',';\n\n    ;with CTE(F,\
  \ L)\n    as\n    (\n        select 1, charindex(',',@List)\n        union all\n\
  \        select L + 1, charindex(',',@List,L + 1)\n        from CTE\n        where\
  \ charindex(',',@List,L + 1) <> 0\n    )\n    insert into @IDList(ID)\n    select\
  \ distinct convert(int,substring(@List,F,L-F))\n    from CTE\n    option (maxrecursion\
  \ 0);\n\n    return;\nend\n```\n\n![](img/index-292_1.jpg)\n\n现在，让我们运行一条 SELECT\
  \ 语句来计算所有客户的所有订单总额。我们将构建一个从 1 到 250 的逗号分隔值列表，并使用`dbo.ParseIDList`函数来解析它。我们将`dbo.Orders`表与该函数进行联接，如清单\
  \ 13-4 所示，然后检查如图 13-1 所示的执行计划。\n\n## 图 13-1. 联接表与函数的查询执行计划（旧版基数估计器）\n\n## 清单 13-4.\
  \ 使用临时表优化查询：将 Orders 表与多语句表值函数联接\n\n```sql\ndeclare\n    @List varchar(8000)\n\n\
  -- 用从 1 到 250 的逗号分隔整数列表填充@List\n;with N1(C) as (select 0 union all select 0) --\
  \ 2 行\n,N2(C) as (select 0 from N1 as T1 cross join N1 as T2) -- 4 行\n,N3(C) as\
  \ (select 0 from N2 as T1 cross join N2 as T2) -- 16 行\n,N4(C) as (select 0 from\
  \ N3 as T1 cross join N3 as T2) -- 256 行\n,IDs(ID) as (select row_number() over\
  \ (order by (select null)) from N4)\nselect @List = convert(varchar(8000),\n   \
  \ ( select ID as [text()], ',' as [text()]\n      from IDs\n      where ID <= 250\n\
  \      for xml path('') ));\n\nselect sum(o.Amount)\nfrom dbo.Orders o join dbo.ParseIDList(@List)\
  \ l on\n    o.CustomerID = l.ID;\n```\n\n如您所知，旧版基数估计器总是估计多语句表值函数只返回一行。这将在我们的示例中导致非常低效的执行计划。\n\
  \n在我的计算机上，I/O 统计信息和执行时间产生了以下结果：\n\n```\nTable 'Orders'. Scan count 250, logical\
  \ reads 201295\nTable '#25869641'. Scan count 1, logical reads 1\nSQL Server Execution\
  \ Times:\n   CPU time = 249 ms,  elapsed time = 239 ms.\n```\n\n现在，让我们改变方法，用`dbo.ParseIDList`函数返回的值填充一个临时表，如清单\
  \ 13-5 所示。\n\n## 清单 13-5. 使用临时表优化查询：临时表方法\n\n```sql\ndeclare\n    @List varchar(8000)\n\
  \n-- 用从 1 到 250 的逗号分隔整数列表填充@List\n;with N1(C) as (select 0 union all select 0) --\
  \ 2 行\n,N2(C) as (select 0 from N1 as T1 cross join N1 as T2) -- 4 行\n,N3(C) as\
  \ (select 0 from N2 as T1 cross join N2 as T2) -- 16 行\n,N4(C) as (select 0 from\
  \ N3 as T1 cross join N3 as T2) -- 256 行\n,IDs(ID) as (select row_number() over\
  \ (order by (select null)) from N4)\nselect @List = convert(varchar(8000),\n   \
  \ ( select ID as [text()], ',' as [text()]\n      from IDs\n      where ID <= 250\n\
  \      for xml path('') ));\n\ncreate table #Customers(ID int not null primary key);\n\
  \ninsert into #Customers(ID)\nselect ID from dbo.ParseIDList(@List);\n\nselect sum(o.Amount)\n\
  from dbo.Orders o join #Customers c on\n    o.CustomerID = c.ID;\n\ndrop table #Customers;\n\
  ```\n\n![](img/index-294_1.jpg)\n\n正如您在图 13-2 中所看到的，SQL Server 正确估计了 ID 的数量，因此最终得到了一个高效得多的执行计划。\n\
  \n## 图 13-2. 使用临时表的查询执行计划\n\n在我的计算机上，I/O 统计信息和执行时间如下：\n\n```\nSQL Server Execution\
  \ Times:\n   CPU time = 0 ms,  elapsed time = 1 ms.\nTable '#Customers__________00000000001D'.\
  \ Scan count 0, logical reads 501\nTable '#25869641'. Scan count 1, logical reads\
  \ 1\n```\n\n\n# 第 13 章 ■ 临时对象与 TempDB\n\nSQL Server 执行时间：\n\n`CPU 时间 = 0 ms，耗时 =\
  \ 6 ms。`\n\n`表 'Orders'。扫描计数 1，逻辑读取 1029`\n\n`表 '#Customers__________00000000001D'。扫描计数\
  \ 1，逻辑读取 2`\n\n你可以看到，与使用多语句表值函数的查询相比，使用临时表后，我们的查询速度提升了 30 多倍，I/O 消耗降低了两个数量级。\n\n\
  显然，使用临时表是需要付出开销的，特别是在插入大量数据时。在某些情况下，这种开销即使使用了生成的更高效的执行计划，也会降低查询性能。例如，如果你的大多数情况都是为单个或极少数客户计算总订单金额，那么使用临时表的方法可能比不用它更慢。最终你会得到相似的执行计划，但必须处理创建和填充临时表带来的开销。另一方面，你可能宁愿承受这种开销，也不愿在偶尔为大型客户列表运行查询时，面对由此产生的糟糕性能。\n\
  \n临时表的创建和删除都需要访问并修改分配映射页（如 `IAM`、`SGAM` 和 `PFS`）以及系统表。虽然在用户数据库中创建常规表时也会发生相同的操作，但系统很少以高速率创建和删除用户表。而临时表则可能被相当频繁地创建和删除。在繁忙的系统上，当多个会话试图修改分配映射页时，这可能导致争用。\n\
  \n■ **注意** 本书第五部分“实用故障排除”中，我们将讨论如何检测此类争用。\n\n为了提高性能，SQL Server 引入了 `临时对象缓存` 的概念。这个术语有点令人困惑。它指的是临时对象的分配，而非数据页的缓存，后者与常规表类似，在缓冲池中进行缓存。\n\
  \n![](img/index-295_1.jpg)\n\n简而言之，通过 `临时对象缓存`，SQL Server 不会删除表，而是对其进行截断，为每个索引保留两个预分配的页面：一个\
  \ `IAM` 页和一个数据页。下次创建该表时，SQL Server 将重用这些页面，这有助于减少分配映射页所需的修改次数。\n\n让我们看看清单 13-6 所示的例子。第一步，我们定义创建和删除临时表的存储过程。\n\
  \n## 清单 13-6. 临时对象缓存：存储过程\n\n```\ncreate proc dbo.TempTableCaching\nas\ncreate table\
  \ #T(C int not null primary key);\ndrop table #T;\n```\n\n下一步，让我们运行该存储过程，并检查它产生的事务日志活动。执行此操作的代码见清单\
  \ 13-7。\n\n## 清单 13-7. 临时对象缓存：运行存储过程\n\n```\ncheckpoint;\ngo\nexec dbo.TempTableCaching;\n\
  go\nselect Operation, Context, AllocUnitName, [Transaction Name], [Description]\n\
  from sys.fn_dblog(null, null);\n```\n\n首次运行此代码时，你将看到类似于图 13-3 的结果。\n\n## 图 13-3.\
  \ 临时表未缓存时的日志活动\n\n如你所见，第一次调用存储过程产生了 51 条日志记录。其中 40 条（高亮部分）与临时表创建期间更新分配映射页和系统表有关。\n\
  \n![](img/index-296_1.jpg)\n\n如果你第二次运行清单 13-7 中的代码，你将看到不同的情况，如图 13-4 所示。\n\n## 图\
  \ 13-4. 临时表已缓存时的日志活动\n\n这一次，由于临时表已被缓存，表创建仅引入了几条日志记录，所有\n\n\n# 第 13 章 ■ 临时对象与 TEMPDB\n\
  \n这些操作是针对系统表进行的，但不涉及分配映射页。\n\nSQL Server 不会缓存全局临时表的 `IAM` 或数据页，也不会缓存在会话范围内创建的局部临时表。只有在存储过程和触发器内创建的临时表才会被缓存。\n\
  \n对于表和代码也有一些要求，包括以下几点：\n\n-   该表需要小于八兆字节。大表不会被缓存。\n-   不存在更改表结构的 DDL 语句。代码中的任何架构修改语句，除了\
  \ `DROP TABLE *`，都将阻止临时对象缓存。但是，你可以在表上创建索引，并且如前所述，SQL Server 会缓存它们。\n-   表中没有定义*命名*约束。未命名的约束不会阻止缓存。\n\
  \n如你所见，遵循使临时表可缓存的指导原则非常简单。在繁忙的系统上，这可以显著提高性能并减少对 `tempdb` 分配映射页的争用。\n\n#### 表变量\n\
  \n尽管存在表变量是内存中对象的误解，但它们实际上是在 `tempdb` 中创建和存在的，类似于常规临时表。你可以将它们视为轻量级的临时表，尽管这种轻量级伴随着一系列限制和约束。\n\
  \n■ **注意** SQL Server 2014 中引入的内存优化 OLTP 技术允许你创建内存优化表变量。这些对象仅存在于内存中，不使用 `tempdb`。我们将在本书的第八部分讨论内存优化\
  \ OLTP。\n\n临时表和表变量之间的第一个主要区别是作用域。表变量仅存在于创建它们的批处理中。与临时表不同，它们不能从批处理外部访问。例如，当你在存储过程中定义表变量时，你无法从动态\
  \ SQL 或从原始存储过程调用的其他存储过程中引用它。\n\n你无法在表变量上创建索引，主键和唯一约束除外。\n\n■ **重要提示** SQL Server\
  \ 不会在表变量上维护任何统计信息，并且它总是估计表变量只有一行，除非使用了语句级重新编译。\n\n看一下 `清单 13-8` 所示的例子。在这里，我们创建了一个临时表和一个表变量，用一些数据填充它，并检查\
  \ SQL Server 的基数估计。\n\n### 清单 13-8. 临时表和表变量的基数估计\n\n```sql\ndeclare\n@TTV table(ID\
  \ int not null primary key)\ncreate table #TT(ID int not null primary key);\n;with\
  \ N1(C) as (select 0 union all select 0) -- 2 rows\n,N2(C) as (select 0 from N1\
  \ as T1 cross join N1 as T2) -- 4 rows\n,N3(C) as (select 0 from N2 as T1 cross\
  \ join N2 as T2) -- 16 rows\n,N4(C) as (select 0 from N3 as T1 cross join N3 as\
  \ T2) -- 256 rows\n,IDs(ID) as (select row_number() over (order by (select null))\
  \ from N4)\ninsert into #TT(ID)\nselect ID from IDs;\ninsert into @TTV(ID)\nselect\
  \ ID from #TT;\nselect count(*) from #TT;\nselect count(*) from @TTV;\nselect count(*)\
  \ from @TTV option (recompile);\n```\n\n如 `图 13-5` 所示，除非你使用语句级重新编译，否则 SQL Server\
  \ 会估计表变量只有一行。基数估计错误通常会在执行计划中快速传播，这可能导致在使用表变量时生成效率极低的计划。语句级重新编译为查询优化器提供了总行数的信息，尽管没有保存任何统计信息，且查询优化器对表变量中的数据分布一无所知。\n\
  \n![](img/index-298_1.jpg)\n\n### 图 13-5. 临时表和表变量的基数估计\n\n![](img/index-299_1.jpg)\n\
  \n\n\n# 第 13 章：临时对象与 tempdb\n\n现在，让我们修改之前的示例，在三个 SELECT 查询中都添加一个`where ID > 0`子句。两个表中的所有\
  \ ID 值都是正数。当你运行这些查询时，你将收到如图 13-6 所示的基数估计结果。\n\n**图 13-6. 临时表与表变量的基数估计**\n\n普通临时表在索引上维护统计信息，因此，SQL\
  \ Server 能够访问直方图并正确估计第一个 SELECT 中的行数。如前所述，如果没有语句级重新编译，系统会假定表变量只有一行。然而，即使进行了语句级重新编译，估计值也偏差很大。由于没有统计信息，SQL\
  \ Server 假设`greater`运算符将返回表中三分之一的行，这在我们的案例中是错误的。\n\n临时表和表变量之间的另一个区别在于它们处理事务的方式。临时表是完全事务感知的，类似于常规表。而表变量仅支持语句级回滚。任何语句级错误——例如“键冲突”——都会回滚该语句，尽管显式事务回滚会使表变量数据保持完整。\n\
  \n让我们看几个例子。在第一个例子中，我们将在 INSERT 操作期间产生一个`primary key violation`错误。相关代码如清单 13-9 所示。\n\
  \n![](img/index-300_1.jpg)\n\n**清单 13-9. 表变量：语句级回滚**\n```sql\ndeclare\n    @T table(ID\
  \ int not null primary key)\n\n-- Success\ninsert into @T(ID) values(1);\n\n-- Error:\
  \ primary key violation\ninsert into @T(ID) values(2),(3),(3);\n\n-- 1 row\nselect\
  \ * from @T;\n```\n\n如图 13-7 所示，第二个 INSERT 语句没有向表中添加行。\n\n**图 13-7. 表变量：语句级回滚**\n\
  \n现在，让我们检查当回滚一个显式事务时会发生什么。执行此操作的代码如清单 13-10 所示。\n\n**清单 13-10. 表变量：显式事务**\n```sql\n\
  declare\n    @Errors table\n    (\n        RecId int not null primary key,\n   \
  \     [Error] nvarchar(512) not null\n    )\n\nbegin tran\n    -- Insert error information\n\
  \    insert into @Errors(RecId, [Error])\n    values\n        (11,'Price mistake'),\n\
  \        (42,'Insufficient stock');\n\nrollback\n\n/* Do something with errors */\n\
  select RecId, [Error] from @Errors;\n```\n\n如图 13-8 所示，显式的`rollback`语句没有影响表变量的数据。当你需要收集一些错误或日志信息，并希望这些信息在事务回滚后仍然保留时，你可以受益于这种行为。\n\
  \n![](img/index-301_1.jpg)\n\n**图 13-8. 表变量：显式事务**\n\n> **注意**：虽然表变量在某些情况下因其开销较低而可能比临时表性能更好，但你需要极其小心地使用它们，尤其是在表变量中存储大量数据时。单行基数估计规则和缺失的统计信息可能导致涉及大量行时生成高度低效的执行计划。语句级重新编译有助于解决一些基数估计问题，尽管在需要分析数据分布时它无济于事。\n\
  \n作为一般规则，当你需要将临时对象与其他表进行连接时，使用临时表比使用表变量更安全。由于单行基数估计，当连接中存在表变量时，查询优化器通常会选择`nested\
  \ loop`连接。当两个连接输入中都存储了大量数据时，这种连接类型效率极低。\n\n当你需要处理大量行且不涉及与其他表连接时，表变量是一个不错的选择。例如，考虑一个存储过程，你在其中暂存数据，进行...\n\
  \n\n\n## 临时对象与表变量\n\n在某些情况下，无论使用何种对象类型，数据库都必须进行全表扫描，此时你会得到相同的执行计划。在这些情况下，表变量的性能可能优于临时表。**然而，在大多数情况下，临时表是更稳妥的选择。**\n\
  \n最后，表变量与临时表以相同的方式被缓存。\n\n## 用户定义表类型与表值参数\n\n你可以在数据库中定义表类型。当你在代码中声明该表类型的变量时，其工作方式与表变量相同。\n\
  \n此外，你可以将表类型的变量（称为*表值参数 (TVPs)*）传递给 T-SQL 模块。虽然表值参数在底层实现为表变量，但它们实际上是只读的。你无法在表值参数中插入、更新或删除数据。\n\
  \n代码清单 13-11 展示了如何使用表值参数。它创建了表类型 `dbo.tvpErrors`、一个带有表值参数的存储过程，并展示了如何将该参数传递给存储过程和动态\
  \ SQL。\n\n### 代码清单 13-11. 表值参数\n\n```sql\ncreate type dbo.tvpErrors as table\n(\n\
  RecId int not null primary key,\n[Error] nvarchar(512) not null,\n)\ngo\n\ncreate\
  \ proc dbo.TvpDemo\n(\n@Errors dbo.tvpErrors readonly\n)\nas\nselect RecId, [Error]\
  \ from @Errors;\n\nexec sp_executesql\nN'select RecId, [Error] from @Err'\n,N'@Err\
  \ dbo.tvpErrors readonly'\n,@Err = @Errors;\ngo\n\ndeclare\n@Errors dbo.tvpErrors\n\
  insert into @Errors(RecId, [Error])\nvalues\n(11,'Price mistake'),\n(42,'Insufficient\
  \ stock')\n\nexec dbo.TvpDemo @Errors\n```\n\n正如你所见，在存储过程和动态 SQL 的参数列表中，你都需要明确声明表值参数是只读的。\n\
  \n表值参数是从客户端应用程序向 T-SQL 例程传递一批行数据的最快方法之一。表值参数比单独的 DML 语句快一个数量级，在某些情况下，它们甚至可以胜过批量操作。\n\
  \n现在，让我们运行一些测试，比较使用不同方法和不同批处理大小将数据插入表的性能。第一步，让我们创建一个用于存储数据的表，如代码清单 13-12 所示。测试中使用的实际表有\
  \ 21 个数据列。为节省空间，代码清单中省略了部分数据列。实际的测试应用程序和所有脚本都包含在本书的配套资料中。\n\n### 代码清单 13-12. 插入一批行：创建表\n\
