  \n> **注意** 我们将在第 25 章“查询优化与执行”和第 28 章“系统故障排除”中更详细地讨论内存授予。\n\n## 第三章 ■ 统计信息\n\n####\
  \ 统计信息维护\n\n正如我已经提到的，默认情况下 SQL Server 会自动更新统计信息。这种行为对于小表通常是可接受的；但是，对于拥有数百万或数十亿行的大表，除非您使用的是\
  \ SQL Server 2016 且数据库兼容级别为 130 或启用了跟踪标志 `T2371`，否则不应依赖自动统计信息更新。触发统计信息更新所需的更改数量（20%\
  \ 的更新阈值）会非常高，因此更新可能不会频繁触发。\n\n在这种情况下，建议您手动更新统计信息。在选择最佳统计信息维护策略时，必须分析表的大小、数据修改模式和系统可用性。例如，如果系统在非工作时间没有高负载，您可以决定每晚更新关键表上的统计信息。别忘了，统计信息和/或索引维护会给\
  \ SQL Server 增加额外负载。您必须分析它对同一服务器和/或磁盘阵列上的其他数据库的影响。\n\n在设计统计信息维护策略时，另一个需要考虑的重要因素是数据如何被修改。对于具有始终递增或递减键值的索引，例如当索引中最左侧的列定义为标识符或使用序列对象填充时，您需要更频繁地更新统计信息。如您所见，如果特定键值超出直方图范围，SQL\
  \ Server 会严重低估行数。这种行为在 SQL Server 2014 到 2016 中可能不同，我们将在本章后面看到。\n\n您可以使用 `UPDATE\
  \ STATISTICS` 命令来更新统计信息。当 SQL Server 更新统计信息时，它会读取数据样本，而不是扫描整个索引。您可以使用 `FULLSCAN`\
  \ 选项来更改此行为，该选项强制 SQL Server 读取并分析索引中的所有数据。正如您可能猜到的那样，该选项提供了最准确的结果，尽管在大表的情况下可能引入大量的\
  \ I/O 活动。\n\n> **注意** 当您重建索引时，SQL Server 会更新统计信息。我们将在第 6 章“索引碎片”中更详细地讨论索引维护。\n\n\
  您可以使用系统存储过程 `sp_updatestats` 来更新数据库中的所有统计信息。建议在升级到新版本 SQL Server 后，使用此存储过程并更新数据库中的所有统计信息。您应该与\
  \ `DBCC UPDATEUSAGE` 存储过程一起运行，该过程更正目录视图中不正确的页和行计数信息。\n\n有一个名为 `sys.dm_db_stats_properties`\
  \ 的动态管理视图 (DMV)，它显示自上次统计信息更新以来对统计信息列所做的修改次数。使用该 DMV 的代码如清单 3-9 所示。\n\n```sql\n--\
  \ 清单 3-9. 使用 sys.dm_db_stats_properties\nselect\n    s.stats_id as [Stat ID],\n\
  \    sc.name + '.' + t.name as [Table],\n    s.name as [Statistics],\n    p.last_updated,\n\
  \    p.rows,\n    p.rows_sampled,\n    p.modification_counter as [Mod Count]\nfrom\n\
  \    sys.stats s\n    join sys.tables t on s.object_id = t.object_id\n    join sys.schemas\
  \ sc on t.schema_id = sc.schema_id\n    outer apply\n        sys.dm_db_stats_properties(t.object_id,\
  \ s.stats_id) p\nwhere\n    sc.name = 'dbo' and t.name = 'Books';\n```\n\n\n\n"
- "# 第 3 章：统计\n\n![](img/index-93_1.jpg)\n\n如图 3-1 所示，查询结果表明自上次统计信息更新以来，统计信息列已发生了\
  \ 250,000 次修改。你可以构建一个统计信息维护例程，定期检查 `sys.dm_db_stats_properties` DMV 并重建那些修改计数器值较大的统计信息。\n\
  \n**图 3-11。** `Sys.dm_db_stats_properties` 输出\n\n## 异步自动更新统计信息\n\n另一个与统计信息相关的数据库选项是\
  \ `异步自动更新统计信息`。默认情况下，当 SQL Server 检测到统计信息已过时时，它会暂停查询执行，同步更新统计信息，并在统计信息更新完成后生成新的执行计划。而在异步统计信息更新模式下，SQL\
  \ Server 会使用基于过时统计信息的旧执行计划来执行查询，同时在后台异步更新统计信息。建议除非系统具有非常短的查询超时时间（在这种情况下，同步统计信息更新可能导致查询超时），否则应保持同步统计信息更新。\n\
  \n最后，当你创建新索引时，SQL Server 不会自动删除列级统计信息。你应该手动删除冗余的列级统计信息对象。\n\n## 新基数估计器（SQL Server\
  \ 2014–2016）\n\n正如你已了解的，查询优化的质量依赖于准确的基数估计。SQL Server 必须正确估计查询执行每个步骤中的行数，以生成高效的执行计划。SQL\
  \ Server 2005-2012 中使用的基数估计模型最初是为 SQL Server 7.0 开发的，于 1998 年发布。显然，在 SQL Server\
  \ 的新版本中，该模型进行了一些细微的改进和更改；然而，从概念上讲，该模型保持不变。\n\n该模型使用了四个主要假设，包括：\n\n-   **均匀性**：在没有统计信息的情况下，该模型假设数据分布是均匀的。例如，在直方图步骤内，假定所有键值都是均匀分布的。\n\
  -   **独立性**：该模型假设实体中的属性是相互独立的。例如，当一个查询针对同一表的不同列有多个谓词时，它假设这些列之间没有任何关联。\n-   **简单包含**：该模型假设用户查询的是表中实际存在的数据。例如，当你连接两个表时，在没有统计信息的情况下，该模型假设一个表中的所有不同值都存在于另一个表中。此模型中连接操作符的选择性是基于连接谓词的选择性。\n\
  -   **包含**：该模型假设当一个属性与常量进行比较时，总是存在匹配项。\n\n尽管这些假设在许多情况下能提供可接受的结果，但它们并不总是正确的。不幸的是，该模型的原始实现使其非常难以重构，这导致了在\
  \ SQL Server 2014 中决定重新设计它。新的基数估计器使用了一套不同的代码，更易于支持，并且模型中有几个不同的假设，包括：\n\n-   **相关性**：新模型假设查询中的谓词之间存在相关性；与\
  \ `独立性` 假设模型相比，这更符合现实查询中的许多情况。\n-   **基本包含**：该模型假设用户可能查询表中不存在的数据。除了连接谓词的选择性外，它还将基础表的直方图纳入连接操作中进行考量。\n\
  \n在 SQL Server 2014 和 2016 中，你可以通过数据库兼容级别设置在每数据库级别选择基数估计模型，或者使用跟踪标志在服务器、会话甚至查询级别进行选择。此外，SQL\
  \ Server 2016 中的新基数估计器允许你在 SQL Server 2014 和 2016 的实现之间进行选择。\n\n\n\n### 注意事项\n\n\
  你可以通过分析执行计划根元素的`CardinalityEstimationModelVersion`属性来查看基数估计模型的版本。它可能具有 70、120 和\
  \ 130 这些值，分别对应旧版、SQL Server 2014 和 2016 实现。\n\n表 3-2 根据数据库兼容性级别和追踪标志 T2312 / T9481，说明了\
  \ SQL Server 2014 和 2016 中的基数估计器模型选择。这些追踪标志可以在服务器和查询级别使用。需要提醒的是，120 和 130 的数据库兼容性模型分别对应\
  \ SQL Server 2014 和 2016。\n\n**表 3-2. SQL Server 2014 与 2016 中的基数估计器模型选择**\n\n|\
  \ 兼容性级别 < 120 | 兼容性级别 = 120 | 兼容性级别 = 130 |\n| :--- | :--- | :--- |\n| 默认行为 | 在\
  \ SQL Server 2014 和 2016 中均为 120 | 在 SQL Server 2014 和 2016 中均为 120 |\n| T2312 |\
  \ 在 SQL Server 2014 和 2016 中均为 120 | 在 SQL Server 2014 和 2016 中均为 120 |\n| T9481\
  \ | 在 SQL Server 2014 和 2016 中均为 120 | 在 SQL Server 2014 和 2016 中均为 120 |\n\nSQL\
  \ Server 2016 的一个新功能是*数据库范围配置*，它允许你覆盖基于数据库兼容性级别的基数估计器模型选择。你可以使用 `ALTER DATABASE\
  \ SCOPED CONFIGURATION SET LEGACY_CARDINALITY_ESTIMATION = ON` 语句来启用旧版估计器。表 3-3\
  \ 显示了当启用 `LEGACY_CARDINALITY_ESTIMATION` 数据库范围配置时的模型选择。\n\n**表 3-3. 当 `LEGACY_CARDINALITY_ESTIMATION=ON`\
  \ 时，SQL Server 2016 中的基数估计器模型选择**\n\n| 兼容性级别 < 120 | 兼容性级别 = 120 | 兼容性级别 = 130 |\n\
  | :--- | :--- | :--- |\n| 默认行为 | T2312 | T9481 |\n\n旧版和新版基数估计器的一个关键区别在于它们如何处理多语句表值函数。旧版基数估计器总是期望函数返回单行。而\
  \ 120 和 130 估计器则期望返回 100 行。这两种模型都不正确；然而，在许多情况下，当多语句表值函数返回大量数据时，估计为 100 行效果更好。我们将在第\
