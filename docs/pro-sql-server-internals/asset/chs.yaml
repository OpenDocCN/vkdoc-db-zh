  最后，SQL Server 使用了另一种同步对象——*自旋锁*。当需要对数据结构的访问保持非常短的时间时，会使用自旋锁。SQL Server 以类似于闩锁的方式使用自旋锁来保护内部数据结构。它们之间的主要区别在于，当线程无法获取自旋锁时，它会通过循环持续自旋，定期检查资源是否可用，而不是像闩锁那样将
  CPU 让给另一个线程。这有助于避免线程上下文切换，这是一项相对昂贵的操作。


