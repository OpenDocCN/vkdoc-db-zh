  ## 图 27-13. 检查 `ring_buffer` 目标数据


  不幸的是，`sys.dm_xe_session_targets` 视图存在一个限制，它将 `target_data` 列的 XML 输出大小限制为 4 MB。这可能导致
  `ring_buffer` 目标中的某些事件未出现在视图中。即使配置的 `ring_buffer` 大小小于 4 MB，也可能发生这种情况；事件在内部以二进制格式存储，而
  XML 序列化会显著增加输出大小，使其超过 4 MB。更安全的方法是使用基于文件的目标来避免这种“事件丢失”的情况。


  ## 使用 `event_file` 和 `asynchronous_file_target` 目标


  `sys.fn_xe_file_target_read_file` 表值函数允许您读取 `asynchronous_file_target` 和 `event_file`
  目标的内容。


  与 SQL 跟踪类似，扩展事件的基于文件的目标可以生成多个滚动文件。您可以通过在函数的第一个参数 `@path` 中指定确切的文件名来读取单个文件的数据。或者，您可以使用带有通配符的
  `@path` 来读取所有文件的数据。


  SQL Server 2008/2008R2 的 `asynchronous_file_target` 会创建另一种称为*元数据文件*的文件类型。您应该在函数的第二个参数
  `@mdpath` 中提供此文件的路径。尽管 SQL Server 2012-2016 不使用元数据文件，但此函数出于向后兼容的原因仍保留了此参数。您可以使用
  `NULL` 代替。


  最后，第三和第四个参数允许您指定开始读取的位置。第三个参数 `@initial_file_name` 是要读取的第一个文件。第四个参数 `@initial_offset`
  是文件中的起始偏移量。此函数会跳过文件中直到该偏移值的所有数据。文件名和偏移量都包含在结果集中，这使您能够实现仅读取新收集数据的代码。


