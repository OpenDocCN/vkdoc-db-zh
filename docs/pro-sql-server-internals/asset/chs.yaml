  \n过滤统计信息的局限性与过滤索引类似。在缓存计划的情况下，如果过滤统计信息可能不适用于所有可能的参数选择，SQL Server 将不会使用此功能进行基数估算。发生这种情况的一种情况是\
  \ `自动参数化`，即 SQL Server 用查询的 `WHERE` 子句中的参数替换常量值；也就是说，如果 SQL Server 对前述查询中 `Model`\
  \ 列上的谓词进行了自动参数化，它将不会使用统计信息。语句级重新编译可以帮助你避免这种情况。此外，SQL Server 不会将对筛选列的修改计入统计信息修改阈值，因此在某些情况下需要你手动更新统计信息。\n\
  \n#### 计算列\n\nSQL Server 允许你使用表达式或系统和标量用户定义函数在表中定义计算列。清单 4-19 展示了一个包含两个计算列的表示例。\n\
  \n## 第 4 章 ■ 特殊索引和存储功能\n\n清单 4-19. 包含两个计算列的表\n\n```sql\ncreate table dbo.Customers\n\
  (\n    CustomerId int not null,\n    SSN char(11) not null,\n    Phone varchar(32)\
  \ null,\n    SSNLastFour as (right(SSN,4)),\n    PhoneAreaCode as (dbo.ExtractAreaCode(Phone)),\n\
  \    /* 其他列 */\n);\n```\n\n当查询引用计算列时，SQL Server 会计算该列的值。在计算复杂的情况下，这可能会带来一些性能影响，尤其是当计算列被引用在查询的\
  \ `WHERE` 子句中时。你可以通过将计算列设置为 `PERSISTED` 来避免这种情况。在这种情况下，SQL Server 会持久化计算值，将它们像常规列一样存储在数据行中。虽然这种方法通过消除即时计算提高了读取数据的查询性能，但它降低了数据修改的性能，并增加了行的大小。\n\
  \n用户定义函数 (`UDF`) 允许实现非常复杂的计算。然而，它们可能会显著降低查询的性能。让我们看一个例子，并创建一个包含 65,536 行的表，如 清单\
  \ 4-20 所示。我们将使用此表作为数据源。\n\n清单 4-20. 计算列和 UDF：创建包含数据的表\n\n```sql\ncreate table dbo.InputData\
  \ ( ID int not null );\n\n;with N1(C) as (select 0 union all select 0) -- 2 行\n\
  ```\n\n\n```\n,N2(C) as (select 0 from N1 as T1 cross join N1 as T2) -- 4 行\n,N3(C)\
  \ as (select 0 from N2 as T1 cross join N2 as T2) -- 16 行\n,N4(C) as (select 0 from\
  \ N3 as T1 cross join N3 as T2) -- 256 行\n,N5(C) as (select 0 from N4 as T1 cross\
  \ join N4 as T2 ) -- 65,536 行\n,Nums(Num) as (select row_number() over (order by\
  \ (select null)) from N5)\ninsert into dbo.InputData(ID)\nselect Num from Nums;\n\
  ```\n\n接下来，让我们创建另外两个带有计算列的表。其中一个表会持久化计算列数据，而另一个表则不会。完成此操作的代码如清单 4-21 所示。\n\n###\
  \ 清单 4-21. 计算列与用户定义函数：创建测试表\n\n```\ncreate function dbo.SameWithID(@ID int)\nreturns\
