  对于活动会话，你可以从 `sys.dm_xe_session_object_columns` 视图获取目标文件的路径。然而，此路径不包含回滚信息，而 SQL Server
  在创建文件时会将此信息附加到文件名中。你需要通过向路径添加通配符来转换它。清单 27-15 展示了如何在 SQL Server 2012-2016 中执行此操作。


  **清单 27-15.** 读取 SQL Server 2012 – 2016 中 event_file 目标文件的路径


  ```sql

  declare @dataFile nvarchar(260)

  -- Get path to event data file

  select

  @dataFile = left(column_value,len(column_value ) - charindex(''.'',reverse(column_value)))

  + ''*.'' + right(column_value, charindex(''.'',reverse(column_value))-1)

  from

  sys.dm_xe_session_object_columns oc join sys.dm_xe_sessions s on

  oc.event_session_address = s.address

  where

  s.name = ''TempDB Spills'' and

  oc.object_name = ''event_file'' and

  oc.column_name = ''filename'';

  ```


  **CHAPTER 27 ■ EXTENDED EVENTS**


  你可以使用类似的方法在 SQL Server 2008/2008R2 中获取元数据文件的路径。但是，如果你未将元数据文件路径指定为目标的参数，则它在 `sys.dm_xe_session_object_columns`
  视图中可能为 NULL，在这种情况下，你需要使用与事件文件相同的文件名，将扩展名替换为 `.xem`。


  **使用 event_counter 和 synchronous_event_counter 目标**


  `synchronous_event_counter` (SQL Server 2008/2008R2) 和 `event_counter` (SQL Server
  2012-2016) 目标允许你计算特定事件发生的次数。这两个目标都以非常简单的 XML 格式提供数据，可以通过 `sys.dm_xe_session_targets`
  视图中的 `event_data` 列访问。


  清单 27-16 创建了一个事件会话，用于计算对 tempdb 文件的读取和写入次数；这将在 SQL Server 2012-2016 中工作。如果你将目标名称替换为
  `synchronous_event_counter`，此代码同样适用于 SQL Server 2008/2008R2。


  **清单 27-16.** 创建一个计算 tempdb 文件读写次数的会话


  ```sql

  create event session [FileStats]

  on server

  add event sqlserver.file_read_completed ( where(sqlserver.database_id = 2) ),

  add event sqlserver.file_write_completed ( where(sqlserver.database_id = 2) )

  add target package0.event_counter

  with

  (

  event_retention_mode=allow_single_event_loss

  ,max_dispatch_latency=5 seconds

  );

  ```


  启动会话后，你可以使用清单 27-17 中所示的代码检查收集的数据。如果你正在使用 SQL Server 2008/2008R2，应将 `TargetData`
  CTE 中的目标名称更改为 `synchronous_event_counter`。


  **清单 27-17.** 检查会话数据


  ```sql

  ;with TargetData(Data)

  as

  (

  select convert(xml,st.target_data) as Data

  from sys.dm_xe_sessions s join sys.dm_xe_session_targets st on

  s.address = st.event_session_address

  where s.name = ''FileStats'' and st.target_name = ''event_counter''

  )

  ,EventInfo([Event],[Count])

  as

  (

  select t.e.value(''@name'',''sysname'') as [Event], t.e.value(''@count'',''bigint'')
  as [Count]

  from

  TargetData cross apply

  TargetData.Data.nodes(''/CounterTarget/Packages/Package[@name="sqlserver"]/Event'')
  as t(e)

  )

  select [Event], [Count] from EventInfo;

  ```


