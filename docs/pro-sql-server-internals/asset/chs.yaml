  最后，根据 SQL Server 版本的不同，非聚集索引键不能超过 900 或 1,700 字节。因此，你无法向索引中添加大量数据或 LOB 列。尽管创建大的索引行不一定是个好主意，但在某些情况下可能会有帮助。


  SQL Server 2005 引入了一种创建覆盖索引的新方法：将列存储在索引中而不将它们添加到索引键。这些列的数据仅存储在叶级，不影响索引行的排序顺序。因此，当包含列被修改时，SQL
  Server 不需要将行移动到索引中的不同位置。包含列不计入 900/1,700 字节的索引键大小限制，如果绝对需要，你甚至可以存储 LOB 列。


  图 4-1 展示了一个包含列的索引结构，该索引在表上定义为以下 SQL 语句，其中 `CustomerId` 是聚集索引：


  ```sql

  CREATE INDEX IDX_Customers_Name ON dbo.Customers(Name) INCLUDE(DateOfBirth)

  ```


  ***图 4-1.** 包含列的索引结构*




  '
- '# 包含列的索引如何助力查询优化


  让我们来看看包含列的索引如何帮助我们优化查询。我们将使用 `dbo.Customers` 表，该表在上一章的清单 3-3 中创建并填充了数据。


  该表在 `CustomerId` 列上有一个聚集索引，在 `(LastName, FirstName)` 列上有一个复合非聚集索引。


  我们来选择一个姓氏为 *Smith* 的客户的数据。我们将运行两个查询。在第一种情况下，我们将让 SQL Server 自行选择执行计划。在第二种情况下，我们将通过索引提示强制
  SQL Server 使用非聚集索引。实现此目的的代码如 清单 4-1 所示。图 4-2 显示了查询的执行计划。


  ***清单 4-1.*** 选择姓氏为 ''Smith'' 的客户的数据

  ```sql

  select CustomerId, LastName, FirstName, Phone

  from dbo.Customers

  where LastName = ''Smith'';

  ```

  ![](img/index-107_1.jpg)


  CHAPTER 4 ■ SPECIAL INDEXING AND STORAGE FEATURES

  ```sql

  select CustomerId, LastName, FirstName, Phone

  from dbo.Customers with (Index=IDX_Customers_LastName_FirstName)

  where LastName = ''Smith'';

  ```


  ***图 4-2.** 查询的执行计划*


  如您所见，SQL Server 正确估计了 `LastName = ''Smith''` 的行数，并决定使用聚集索引扫描而非非聚集索引查找。*非聚集索引查找*
  和键查找引入了七倍以上的读取操作来获取数据。


  查询从表中选择了四个列：`CustomerId`、`LastName`、`FirstName` 和 `Phone`。`LastName` 和 `FirstName`
  是非聚集索引键中的键列。`CustomerId` 是聚集索引键，这使其成为非聚集索引中的行 ID。唯一不在非聚集索引中的列是 `Phone`。您可以通过查看执行计划中键查找运算符属性中的输出列表来确认这一点。


  让我们通过包含 `Phone` 列来使我们的索引成为覆盖索引，然后观察它如何影响执行计划。实现此目的的代码如 清单 4-2 所示。图 4-3 显示了新的执行计划。


  ***清单 4-2.*** 创建覆盖索引并再次运行查询

  ```sql

  create nonclustered index IDX_Customers_LastName_FirstName_PhoneIncluded

  on dbo.Customers(LastName, FirstName)

  include(Phone);


  select CustomerId, LastName, FirstName, Phone

  from dbo.Customers

  where LastName = ''Smith'';

  ```

  ![](img/index-108_1.jpg)


  CHAPTER 4 ■ SPECIAL INDEXING AND STORAGE FEATURES


  ***图 4-3.** 使用覆盖索引的执行计划*


  新索引包含了所有必需的列，因此不再需要键查找。这导致了效率高得多的执行计划。表 4-1 显示了所有三种情况下的逻辑读取次数。


  ***表 4-1.** 不同执行计划下的逻辑读取次数*


  | 聚集索引扫描 | 无覆盖索引的非聚集索引查找 | 有覆盖索引的非聚集索引查找 |

  | :--- | :--- | :--- |

  | 853 次逻辑读取 | 6,146 次逻辑读取 | 12 次逻辑读取 |


  ■ **注意** 新的覆盖索引 `IDX_LastName_FirstName_PhoneIncluded` 使得原始的非聚集索引 `IDX_LastName_FirstName`
  变得冗余。我们将在[第 7 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_7) “设计和调整索引”中更详细地讨论索引整合。


  尽管覆盖索引是优化查询的强大工具，但它们是有代价的。索引中的每个列都会增加其叶级行大小以及它在磁盘和内存中使用的数据页数量。这会在索引维护期间引入额外的开销，并增加数据库大小。此外，当扫描索引的全部或部分时，查询需要读取更多的页。在小范围扫描时，与使用键查找相比，多读取几个页的效率要高得多，因此覆盖索引不一定引入明显的性能影响。然而，它们可能会对……产生负面影响




  '
- "# 第 4 章 ■ 特殊索引与存储特性\n\n## 数据修改查询的性能\n\n那些需要扫描大量数据页或整个索引的查询的性能。\n\n通过向非聚集索引中添加列，你会将数据存储在多个位置。这提高了选择数据的查询的性能。然而，在执行更新操作时，SQL\
  \ Server 需要更改包含被更新列的所有索引中的行。\n\n让我们看一个示例，运行两个 `UPDATE` 语句，如**代码清单 4-3** 所示。第一条语句修改了\
  \ `Placeholder` 列，该列未包含在任何非聚集索引中。第二条语句修改了 `Phone` 列，该列被包含在 `IDX_Customers_LastName_FirstName_PhoneIncluded`\
  \ 索引中。\n\n### 代码清单 4-3. 在 dbo.Customers 表中更新数据\n\n```sql\nupdate dbo.Customers set\
  \ Placeholder = 'Placeholder' where CustomerId = 1;\n\nupdate dbo.Customers set\
  \ Phone = '505-123-4567' where CustomerId = 1;\n```\n\n如**图 4-4** 所示，第二条 `UPDATE`\
  \ 语句的执行计划要求 SQL Server 同时更新聚集索引和非聚集索引中的数据。\n\n![UPDATE 语句的执行计划](img/index-109_1.jpg)\n\
  \n### 图 4-4. UPDATE 语句的执行计划\n\n这种行为会降低数据修改查询的性能，在系统中引入额外的锁，并导致索引碎片化。你需要谨慎行事，并根据具体情况权衡将索引设为覆盖索引的利弊。\n\
  \n> **注意** 我们将在第三部分“锁、阻塞与并发”中详细讨论锁。\n\n## 包含列与键列\n\n了解何时向索引键添加列以及何时将其设为包含列非常重要。虽然在这两种情况下该列都存在于索引的叶级，但在包含列上的谓词**不具有搜索参数**。让我们比较两个索引，如**代码清单\
  \ 4-4** 所示。\n\n### 代码清单 4-4. 包含列与键列：创建索引\n\n```sql\ndrop index IDX_Customers_LastName_FirstName_PhoneIncluded\
  \ on dbo.Customers;\n\ndrop index IDX_Customers_LastName_FirstName on dbo.Customers;\n\
  \ncreate index IDX_Key on dbo.Customers(LastName, FirstName);\n\ncreate index IDX_Include\
  \ on dbo.Customers(LastName) include(FirstName);\n```\n\n`IDX_Key` 索引中的数据首先基于 `LastName`\
  \ 排序，然后基于 `FirstName` 排序。`IDX_Include` 中的数据仅基于 `LastName` 排序。`FirstName` 根本不影响索引中的排序顺序。`LastName`\
  \ 在两个索引中都**具有搜索参数**。这两个索引在搜索特定的 `LastName` 值时都支持*索引搜索*。当 `LastName` 是查询中唯一的谓词时，性能没有差异。**代码清单\
  \ 4-5** 和**图 4-5** 说明了这一点。\n\n### 代码清单 4-5. 包含列与键列：仅按 LastName 选择\n\n```sql\nselect\
  \ CustomerId, LastName, FirstName\nfrom dbo.Customers with (index = IDX_Key)\nwhere\
  \ LastName = 'Smith';\n\nselect CustomerId, LastName, FirstName\nfrom dbo.Customers\
  \ with (index = IDX_Include)\nwhere LastName = 'Smith';\n```\n\n![包含列与键列：仅按 LastName\
  \ 选择 (IDX_Key 的计划)](img/index-110_1.jpg)\n\n![包含列与键列：仅按 LastName 选择 (IDX_Include\
  \ 的计划)](img/index-110_2.jpg)\n\n### 图 4-5. 包含列与键列：仅按 LastName 选择\n\n然而，当你向查询中添加\
  \ `FirstName` 谓词时，情况就发生了变化。使用 `IDX_Key` 索引，查询能够使用 `LastName` 和 `FirstName` 作为搜索谓词进行*索引搜索*。这对于\
  \ `IDX_Include` 索引来说是不可能的。SQL Server 需要扫描具有特定 `LastName` 的所有行，并检查 `FirstName` 列上的谓词。**代码清单\
  \ 4-6** 和**图 4-6** 说明了这一点。\n\n### 代码清单 4-6. 包含列与键列：按 LastName 和 FirstName 选择\n\n\
  ```sql\nselect CustomerId, LastName, FirstName\nfrom dbo.Customers with (index =\
  \ IDX_Key)\nwhere LastName = 'Smith' and FirstName = 'Andrew';\n\nselect CustomerId,\
  \ LastName, FirstName\nfrom dbo.Customers with (index = IDX_Include)\nwhere LastName\
  \ = 'Smith' and FirstName = 'Andrew';\n```\n\n\n\n## 第四章：特殊索引与存储特性\n\n***图 4-6.**\
  \ 包含列与键列：通过 `LastName` 和 `FirstName` 进行选择*\n\n正如你所看到的，如果你预计会针对某列使用 **SARGable**\
  \ 谓词，那么将该列添加为键列是更好的选择。否则，最好将该列添加为包含列，这样可以使非叶子索引层级更小，并避免维护额外列排序的开销。\n\n最后，当我们讨论覆盖索引时，无法避免提及\
  \ `SELECT *` 模式。`SELECT *` 返回表中所有列的数据，这实际上使你无法创建覆盖索引来对其进行优化。你不应在代码中使用 `SELECT *`。\n\
  \n#### 筛选索引\n\n*筛选索引*（*Filtered Indexes*）在 SQL Server 2008 中引入，允许你仅对数据的一个子集进行索引。这减少了索引的大小和维护开销。\n\
  \n考虑一个包含需要处理数据的表。该表可以有一个 `Processed` 位（bit）列，用于指示行的状态。列表 4-7 展示了一个可能的表结构。\n\n**列表\
  \ 4-7.** 筛选索引：表创建\n\n```sql\ncreate table dbo.Data\n(\n    RecId int not null,\n\
  \    Processed bit not null,\n    /* Other Columns */\n);\n\ncreate unique clustered\
  \ index IDX_Data_RecId on dbo.Data(RecId);\n```\n\n假设你有一个后端进程，它基于列表 4-8 中所示的查询加载未处理的数据。\n\
  \n**列表 4-8.** 筛选索引：读取未处理数据的查询\n\n```sql\nselect top 1000 RecId, /* Other Columns\
  \ */\nfrom dbo.Data\nwhere Processed = 0\norder by RecId;\n```\n\n这个查询可以从以下索引中受益：`CREATE\
  \ NONCLUSTERED INDEX IDX_Data_Processed_RecId ON dbo.Data(Processed, RecId)`。然而，所有键值为\
  \ `Processed=1` 的索引行都是无用的。它们会增加索引大小，浪费存储空间，并在索引维护期间引入额外开销。\n\n筛选索引通过允许你仅索引未处理的行来解决这个问题，使索引小巧而高效。列表\
  \ 4-9 阐明了这个概念。\n\n## 第四章：特殊索引与存储特性\n\n**列表 4-9.** 筛选索引：筛选索引\n\n```sql\ncreate nonclustered\
  \ index IDX_Data_Unprocessed_Filtered\n    on dbo.Data(RecId)\n    include(Processed)\n\
  \    where Processed = 0;\n```\n\n**重要提示** SQL Server 查询优化器存在一个设计限制，当筛选条件中的列未出现在叶子级索引行中时，可能导致次优的执行计划。务必将筛选条件中的所有列作为键列或包含列添加到索引中。\n\
  \n筛选索引有一些限制。仅支持简单的筛选条件。你不能使用逻辑 `OR` 运算符，也不能引用函数和计算列。\n\n筛选索引的另一个重要限制与计划缓存有关。当执行计划需要被缓存，并且该索引无法与某些参数值组合一起使用时，SQL\
  \ Server 可能无法使用筛选索引。例如，即使编译时 `@Processed=0`，`IDX_Data_Unprocessed_Filtered` 索引也无法用于列表\
  \ 4-10 中所示的参数化查询。\n\n**列表 4-10.** 筛选索引：参数化查询\n\n```sql\nselect top 1000 RecId, /*\
  \ Other Columns */\nfrom dbo.Data\nwhere Processed = @Processed\norder by RecId;\n\
  ```\n\nSQL Server 无法缓存使用了筛选索引的计划，因为对于 `@Processed=1` 的调用，该计划将是错误的。这里的解决方案是使用带有 `(recompile)`\
  \ 选项的语句级重编译、使用动态 SQL，或者添加一个 `IF` 语句，如列表 4-11 所示。\n\n**列表 4-11.** 筛选索引：使用 `IF` 语句重写参数化查询\n\
  \n```sql\nif @Processed = 0\n    select top 1000 RecId, /* Other Columns */\n  \
  \  from dbo.Data\n    where Processed = 0\n    order by RecId;\nelse\n    select\
  \ top 1000 RecId, /* Other Columns */\n    from dbo.Data\n    where Processed =\
  \ 1\n    order by RecId;\n```\n\n\n\n"
- "# 第四章 ■ 特殊索引与存储特性\n\n**注意** 我们将在[第 26 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_26)\
  \ “计划缓存”中更深入地讨论计划缓存。\n\n![](img/index-113_1.jpg)\n\n处理筛选索引时，另一个需要记住的重要方面是 SQL Server\
  \ 如何更新其上的统计信息。遗憾的是，SQL Server 并不会将筛选条件中列的修改计入统计信息更新阈值。举个例子，让我们向 `dbo.Data` 表填充一些数据，然后更新统计信息。完成此操作的代码如清单\
  \ 4-12 所示。\n\n***清单 4-12.*** 筛选索引：插入数据并更新统计信息\n\n```sql\n;with N1(C) as (select\
  \ 0 union all select 0) -- 2 rows\n,N2(C) as (select 0 from N1 as T1 CROSS JOIN\
  \ N1 as T2) -- 4 rows\n,N3(C) as (select 0 from N2 as T1 CROSS JOIN N2 as T2) --\
  \ 16 rows\n,N4(C) as (select 0 from N3 as T1 CROSS JOIN N3 as T2) -- 256 rows\n\
  ,N5(C) as (select 0 from N4 as T1 CROSS JOIN N4 as T2) -- 65,536 rows\n,IDs(ID)\
  \ as (select row_number() over (order by (select NULL)) from N5)\ninsert into dbo.Data(RecId,\
  \ Processed)\nselect ID, 0 from Ids;\n\nupdate statistics dbo.Data;\n```\n\n此时，`dbo.Data`\
  \ 表有 65,536 行。让我们更新表中的所有数据，将 `Processed` 设置为 `1`。之后，我们将查看统计信息的列修改计数。完成此操作的代码如清单\
  \ 4-13 所示。\n\n***清单 4-13.*** 筛选索引：更新数据\n\n```sql\nupdate dbo.Data set Processed\
  \ = 1;\n\nselect\n    s.stats_id as [Stat ID],\n    sc.name + '.' + t.name as [Table],\n\
  \    s.name as [Statistics],\n    p.last_updated,\n    p.rows,\n    p.rows_sampled,\n\
  \    p.modification_counter as [Mod Count]\nfrom\n    sys.stats s\n    join sys.tables\
  \ t on s.object_id = t.object_id\n    join sys.schemas sc on t.schema_id = sc.schema_id\n\
  \    outer apply sys.dm_db_stats_properties(t.object_id, s.stats_id) p\nwhere\n\
  \    sc.name = 'dbo'\n    and t.name = 'Data'\n```\n\n如图 4-7 所示，筛选索引列的修改计数显示为零。此外，索引中的行数仍然是\
  \ 65,536，尽管表中的所有行现在都已被处理。\n\n***图 4-7.** 筛选索引：统计信息*\n\n![](img/index-114_1.jpg)\n\
  \n如果你查看图 4-8 中显示的直方图，会发现它包含的仍是旧的数据分布信息。\n\n***图 4-8.** 筛选索引：统计信息直方图*\n\n这种行为可能导致错误的基数估计和次优的执行计划。当筛选列易变且未包含在索引键中时，你应该定期更新筛选索引上的统计信息。从好的方面看，筛选索引通常很小，其索引维护带来的开销比常规索引要小。\n\
  \n筛选索引另一个非常有用的领域是在值的子集上支持唯一性。举一个实际例子，考虑一个包含 SSN（社会安全号码）作为可选可空列的表。这种场景通常要求你维护所提供\
  \ SSN 值的唯一性。然而，你不能为此目的使用唯一的非聚集索引。SQL Server 将 NULL 视为常规值，不允许你存储多个 SSN 未指定的行。幸运的是，唯一的筛选索引可以解决这个问题。清单\
  \ 4-14 展示了这样一种方法。\n\n***清单 4-14.*** 在值的子集上支持唯一性\n\n```sql\ncreate table dbo.Customers\n\
  (\n    CustomerId int not null,\n    SSN varchar(11) null,\n    /* Other Columns\
  \ */\n);\n\ncreate unique index IDX_Customers_SSN on dbo.Customers(SSN)\nwhere SSN\
  \ is not null;\n```\n\n#### 筛选统计信息\n\n传统基数估算器 (70) 的假设之一是查询谓词相互独立。\n\n\n\n为了说明这个概念，让我们看一下清单\
  \ 4-15 中所示的代码。此表存储有关文章的信息，它有一些属性，例如 `Color` 和 `Size`。\n\n**清单 4-15.** 具有多个谓词的基数估计\n\
  \n```sql\ncreate table dbo.Articles\n(\n    ArticleId int not null,\n    Name nvarchar(64)\
  \ not null,\n    Description nvarchar(max) null,\n    Color nvarchar(32) null,\n\
  \    Size smallint null\n);\n\nselect ArticleId, Name from dbo.Articles where Color\
  \ = 'Red' and Size = 3\n```\n\n当你基于两个属性筛选数据时，查询优化器正确地假设只有行的子集是红色的。此外，只有一部分红色文章的尺寸会等于三。因此，它预期应用两个谓词后的总行数将低于应用任何一个单独谓词的情况。\n\
  \n虽然这种方法在某些情况下效果良好，但在谓词高度相关的情况下，它会引入不正确的基数估计。让我们看另一个例子，创建一个存储汽车信息的表，包括其制造商和型号。清单\
  \ 4-16 创建了这个表并填充了一些数据。最后一步，它在两列上创建了列级统计信息。\n\n**清单 4-16.** 相关谓词：表创建\n\n```sql\n\
  create table dbo.Cars\n(\n    ID int not null identity(1,1),\n    Make varchar(32)\
  \ not null,\n    Model varchar(32) not null\n);\n\n;with N1(C) as (select 0 union\
  \ all select 0) -- 2 rows\n,N2(C) as (select 0 from N1 as T1 cross join N1 as T2)\
  \ -- 4 rows\n,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) -- 16 rows\n\
  ,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256 rows\n,IDs(ID) as\
  \ (select row_number() over (order by (select null)) from N4)\n,Models(Model)\n\
  as\n(\n    select Models.Model\n    from\n    ( values('Yaris'),('Corolla'),('Matrix'),('Camry'),('Avalon'),('Sienna')\n\
  \    ,('Tacoma'),('Tundra'),('RAV4'),('Venza'),('Highlander'),('FJ Cruiser'),('4Runner')\n\
  \    ,('Sequoia'),('Land Cruiser'),('Prius') ) Models(Model)\n)\ninsert into dbo.Cars(Make,Model)\n\
  select 'Toyota', Model from Models cross join IDs;\n\n;with N1(C) as (select 0 union\
  \ all select 0) -- 2 rows\n,N2(C) as (select 0 from N1 as T1 cross join N1 as T2)\
  \ -- 4 rows\n,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) -- 16 rows\n\
  ,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256 rows\n,IDs(ID) as\
  \ (select row_number() over (order by (select null)) from N4)\n,Models(Model)\n\
