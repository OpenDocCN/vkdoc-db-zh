  ## SQL Server 执行模型


  从高层次来看，SQL Server 的架构包含五个不同的组件，如图 28-2 所示。


  **图 28-2.** SQL Server 高层架构


  `协议`层处理 SQL Server 与客户端应用程序之间的通信。数据以一种称为 `表格数据流 (TDS)` 的内部格式，通过标准网络通信协议（如 `TCP/IP`
  或 `命名管道`）之一进行传输。另一种称为 `共享内存` 的通信协议，可在 SQL Server 和客户端应用程序本地运行于同一服务器上时使用。`共享内存` 协议不使用网络，比其他协议更高效。


  不同版本的 SQL Server 在安装后启用的协议不同。例如，SQL Server Express 版默认禁用所有网络协议，在启用它们之前无法服务网络请求。你可以在
  SQL Server 配置管理器实用工具中启用和禁用协议。


  `查询处理器`层负责查询优化和执行。我们已在前面的章节中讨论了其行为的各个方面。


  `存储引擎`由 SQL Server 中与数据访问和数据管理相关的组件组成。它处理磁盘上的数据，管理事务和并发，管理事务日志，并执行其他若干功能。


  SQL Server 包含一组`实用工具`，负责备份和恢复操作、数据大容量加载、全文索引管理以及其他若干操作。


  最后，SQL Server 的关键组件是 `SQL Server 操作系统 (SQLOS)`。`SQLOS` 是 SQL Server 与 Windows 之间的层，负责调度和资源管理、同步、异常处理、死锁检测、CLR
  托管等。例如，当任何 SQL Server 组件需要分配内存时，它不会直接调用 Windows API 函数，而是向 `SQLOS` 请求内存，`SQLOS`
  随后使用`内存分配器`组件来满足该请求。


  **注意：** SQL Server 2014-2016 的企业版包含另一个主要组件，称为 `内存中 OLTP 引擎`。我们将在第八部分“内存中 OLTP”中更详细地讨论此组件。


  `SQLOS` 最初在 SQL Server 7.0 中引入，旨在提高 SQL Server 中调度的效率并最小化上下文和内核模式切换。Windows 与 `SQLOS`
  的主要区别在于调度模型。Windows 是一个采用抢占式调度的通用操作系统。



