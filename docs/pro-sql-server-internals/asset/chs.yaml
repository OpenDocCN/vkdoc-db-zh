  ## 数据库作用域配置与查询存储


  SQL Server 2016 允许你通过数据库作用域配置，在数据库级别控制参数嗅探，使用的是 `ALTER DATABASE SCOPED CONFIGURATION
  SET PARAMETER_SNIFFING` 命令。禁用参数嗅探等同于对所有查询使用 `OPTIMIZE FOR UNKNOWN` 提示。另一个命令 `ALTER
  DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE` 可用于清除数据库的存储过程计划缓存。


  你可以通过 `sys.dm_exec_query_stats` 视图和 `sys.dm_exec_query_plan` 函数分析缓存的计划，来排查由参数嗅探引发的问题。我们将在本章后面及第
