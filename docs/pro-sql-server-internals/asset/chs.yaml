  我在 SQL Server 2016 RTM 上进行了两系列测试，测量了不同方法和不同批处理量的平均执行时间。在第一次测试中，应用程序与 SQL Server\
  \ 运行在同一台服务器上。在第二次测试中，应用程序通过网络连接到 SQL Server。您可以在表 13-1 和 13-2 中看到这两项测试的执行时间（以毫秒计）。\n\
  \n## 表 13-1. 应用程序本地运行时的执行时间（毫秒）\n\n| 行数 | 单独插入 | 以元素为中心的 XML | 以属性为中心的 XML | SQLBulkCopy\
  \ | 表值参数 | JSON |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| 1,000 |\
  \ 5,000 | 2,525 | 1,409 | 10,000 | 1,844 | 5,365 |\n| 10,000 | 51,030 | 29,125 |\
  \ 2,219 | 1,946 | 6,479 | |\n| 100,000 | | | | | | |\n\n## 表 13-2. 应用程序远程运行时的执行时间（毫秒）\n\
  \n| 行数 | 单独插入 | 以元素为中心的 XML | 以属性为中心的 XML | SQLBulkCopy | 表值参数 | JSON |\n| :---\
  \ | :--- | :--- | :--- | :--- | :--- | :--- |\n| 1,000 | 5,000 | 2,089 | 2,561 |\
  \ 1,478 | 10,000 | 4,302 |\n| 10,000 | 5,203 | 2,964 | 43,644 | 52,860 | 28,534\
  \ | 2,275 |\n| 100,000 | 1,998 | 6,491 | | | | |\n\n### 性能分析\n单独 `INSERT` 语句的性能在很大程度上取决于网络速度。这种方法会引入大量网络活动，尤其是在网络速度较慢时，表现不佳。其他方法的性能则不太依赖于网络。\n\
  \n正如预期的那样，以属性为中心的 XML 性能优于以元素为中心的 XML。即使在网络开销为零的情况下，它在大批量插入时也会优于单独的插入操作。值得一提的是，XML\
  \ 实现的性能在很大程度上取决于数据模式。每个 XML 元素都会在执行计划中增加一个运算符，这会减慢 XML 解析速度。\n\n### 第 13 章 ■ 临时对象与\
  \ TEMPDB\n`SQLBulkCopy` 和表值参数是迄今为止最快的方法。在我的测试中，表值参数效率略高；然而，性能上的差异可以忽略不计，并且取决于 SQL\
  \ Server 版本和 `tempdb` 性能。\n\n最后，SQL Server 2016 中的 `OPENJSON` 实现性能优于单独的 `INSERT`\
  \ 语句和 XML 方法。尽管与表值参数和 `SQLBulkCopy` 相比仍然较慢，但在某些情况下，如果 `SQL Client` 库不支持 TVP，它可能是一个不错的选择。\n\
  \n**■ 注意** 内存中 OLTP 允许您使用*内存优化表值参数*，它们比其基于磁盘的对应物更快，尤其是在处理大批数据时。我们将在第 37 章“内存中 OLTP\
  \ 可编程性”中讨论它们。\n\n### 使用表值参数\n在客户端代码中使用表值参数时，您需要将一个 `DataTable` 对象分配给相应的 `SqlParameter`\
  \ 对象。`DataTable` 对象在模式和数据方面都应与数据库中定义的相应表类型定义相匹配。`DataTable` 对象应具有相同数量的列，并且这些列的名称、顺序应与数据库中定义的表类型一致。它们还需要支持相应的\
  \ .Net 和 SQL 数据类型之间的类型转换。\n\n表中的数据需要符合表类型的主键和唯一约束，并且不应超过定义的列大小和 `T-SQL` 数据类型的域值。\n\
  \n最后，表类型不应包含 `sql_variant` 列。不幸的是，.Net SQL 客户端无法正确处理这些类型，当表值类型定义了 `sql_variant`\
  \ 列时，调用期间会引发异常。\n\n### TempDB 中的常规表\n您可以在 `tempdb` 中直接创建常规表，或者通过 `model` 数据库创建。`tempdb`\
  \ 中的用户表\n\n\n\n# 第 13 章：临时对象与 tempdb\n\n它们在所有会话中可见。\n\n`tempdb`在每次`SQL Server`重启时都会重建，正因如此，它不需要支持崩溃恢复。因此，`tempdb`使用`SIMPLE`恢复模型，并且具有一些额外的日志记录优化，使其比写入用户数据库的日志记录更高效。\n\
  \n## 注意\n\n我们将在[第 30 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_30)“事务日志内部原理”中讨论恢复模型以及`tempdb`与用户数据库在日志记录上的差异。\n\
  \n`tempdb`可以作为`ETL`进程的暂存区选项，当你需要尽可能快地加载和处理大量数据，并希望日志开销最小时使用。当整个过程作为单个会话完成时，可以使用临时表；然而，在更复杂的情况下，你需要使用常规表。\n\
  \n虽然`tempdb`有助于提高暂存区的性能，但客户端应用程序需要处理`tempdb`被重建且存储数据的表消失的情况。如果`SQL Server`重启或故障转移到另一个节点，就可能发生这种情况。\n\
  \n更糟糕的是，在某些情况下，这对于客户端应用程序可能是透明发生的。应用程序需要通过检查暂存表是否存在，或者，如果你是自动创建表，则将状态信息持久化到其他地方来处理这些情况。\n\
  \n假设我们有一个名为`dbo.ETLStatuses`的表，其中包含有关`ETL`进程状态的信息。创建这样的表有几种方法。一种是使用`model`数据库。在`model`数据库中创建的所有对象都会在`SQL\
  \ Server`启动时复制到`tempdb`中。\n\n## 小心\n\n在`model`数据库中创建的所有对象都将被复制到之后创建的用户数据库中。\n\n\
  或者，你可以使用在`SQL Server`启动时执行的存储过程在`tempdb`中创建对象。**代码清单 13-20** 展示了一个这样的例子。\n\n## 代码清单\
  \ 13-20：使用启动存储过程在 tempdb 中创建表\n\n```sql\nuse master;\ngo\n\n-- 启用扫描启动存储过程\nexec\
  \ sp_configure 'show advanced option', '1';\nreconfigure;\nexec sp_configure 'scan\
  \ for startup procs', '1';\nreconfigure;\ngo\n\ncreate proc dbo.CreateETLStatusesTable\n\
  as\ncreate table tempdb.dbo.ETLStatuses\n(\n    ProcessId int not null,\n    ActivityTime\
  \ datetime not null,\n    StageNo smallint not null,\n    [Status] varchar(16) not\
  \ null,\n    constraint PK_ETLStatuses\n        primary key clustered (ProcessID)\n\
  )\ngo\n\n-- 标记该过程在 SQL Server 启动时运行\nexec sp_procoption N'CreateETLStatusesTable',\
  \ 'startup', 'on';\n```\n\n**代码清单 13-21** 展示了一个可能的存储过程实现，该过程使用`dbo.ETLStatuses`表来验证进程状态信息，从而执行`ETL`处理的其中一个阶段。\n\
  \n## 代码清单 13-21：ETL 存储过程示例\n\n```sql\n-- 可以定义在用户数据库或 tempdb 中\ncreate proc dbo.ETL_Process1Stage2\n\
  as\nbegin\n    -- 返回值\n    -- 0: 成功\n    -- -1: ETL 表不存在 – 出了问题\n    -- -2: ETLStatuses\
  \ 表中没有该进程的记录\n    -- -3: 无效的阶段\n\n    set xact_abort on\n    declare\n        @StageNo\
  \ smallint\n        ,@Status varchar(16)\n\n    if object_id(N'tempdb.dbo.ETLStatuses')\
  \ is null or\n       object_id(N'tempdb.dbo.ETLData') is null\n        return -1;\n\
  \n    select @StageNo = StageNo, @Status = [Status]\n    from tempdb.dbo.ETLStatuses\n\
  \    where ProcessId = 1;\n\n    if @@rowcount = 0\n        return -2;\n\n    if\
  \ @StageNo <> 1 or @Status <> 'COMPLETED'\n        return -3;\n\n    -- 此实现在发生错误时回滚所有更改，\n\
  \    -- 并向客户端应用程序抛出异常。\n    begin tran\n        update tempdb.dbo.ETLStatuses\n\
  \        set ActivityTime = getutcdate(), StageNo = 2, [Status] = 'STARTED'\n  \
  \      where ProcessId = 1;\n\n        /* 进行一些处理 */\n\n        update tempdb.dbo.ETLStatuses\n\
  \        set ActivityTime = getutcdate(), [Status] = 'COMPLETED'\n        where\
  \ ProcessId = 1;\n    commit\n\n    return 0;\nend\n```\n\n当然，还有其他方法可以完成相同的任务。然而，这里的要点是需要\n\
  \n\n\n让你的代码能够应对 `tempdb` 被重新创建且暂存数据丢失的情况。\n\n## 优化 TempDB 性能\n\n`Tempdb` 通常是服务器上最繁忙的数据库之一。除了用户创建的临时对象外，`SQL\
  \ Server` 还使用此数据库在查询执行期间存储内部结果集、版本存储区、用于排序、哈希和数据库一致性检查等的内部临时表。`Tempdb` 性能是服务器整体健康与性能的关键组成部分。因此，在大多数情况下，你应该将\
  \ `tempdb` 放在你可用的最快磁盘阵列上。\n\n如果你在 `Standard Edition`（标准版）上使用内存超过 `SQL Server` 可利用量的服务器，可以考虑创建\
  \ `RAM drive`（RAM 磁盘）并将 `tempdb` 放置其上。在这种情况下，请确保 `RAM drive` 有足够空间来容纳 `tempdb` 的增长。然而，在\
  \ `Enterprise Edition`（企业版）中，最好将内存留给 `SQL Server`，而将 `tempdb` 放在最快的磁盘阵列上。\n\n# 第\
  \ 13 章 ■ 临时对象与 TEMPDB\n\n阵列的冗余是另一个问题。一方面，你无需太担心存储在 `tempdb` 中的数据。另一方面，如果 `tempdb`\
  \ 磁盘阵列发生故障，`SQL Server` 将变得不可用。因此，作为一般规则，你会希望磁盘阵列具备冗余性。\n\n然而，在某些情况下，当 `tempdb`\
  \ 性能成为瓶颈，且你的 `High Availability`（高可用性）策略支持两个或更多节点同时故障，并且有备件可用，同时存在一个流程允许你快速将故障节点恢复上线时，你可以考虑将\
  \ `tempdb` 磁盘阵列设置为非冗余模式。但这是一条危险的途径，你需要非常仔细地权衡此决策的利弊，尽可能避免不必要的故障转移。\n\n有一个跟踪标志 `T1118`，它可以防止\
  \ `SQL Server` 使用混合区进行空间分配。通过仅分配统一区，你可以减少在对象创建期间分配映射页所需的更改数量。此外，即使临时对象缓存只保留一个数据页在缓存中，该页也将属于其自己的空闲统一区。因此，当分配表的第二到第八个数据页时，`SQL\
  \ Server` 不需要搜索并可能分配带有可用空闲页的混合区。这些页可以存储在第一个缓存数据页所属的同一个统一区内。\n\n关键点在于，跟踪标志 `T1118`\
  \ 可以显著减少 `tempdb` 中的分配映射页争用。在每个早于 `SQL Server 2016` 的 `SQL Server` 实例中，都应启用此跟踪标志；也就是说，这样做没有坏处。\n\
  \n另一方面，`SQL Server 2016` 即使在未启用 `T1118` 的情况下，在 `tempdb` 中也不使用混合区分配。因此，在 `SQL Server\
  \ 2016` 中不需要此跟踪标志。\n\n另一种减少争用的方法是创建多个 `tempdb` 数据文件。每个数据文件都有自己的一组分配映射页，因此，分配会分散在这些文件和页之间。这减少了争用的可能性，因为更少的线程会同时竞争访问相同的分配映射页。\n\
  \n没有通用规则来定义 `tempdb` 数据文件的最优数量——一切都取决于实际的系统工作负载和行为。旧的建议——让数据文件数量等于逻辑处理器数量——已不再是最佳建议。虽然这种方法仍然有效，但极其大量的数据文件可能会因文件管理开销而降低系统性能。\n\
  \n当 `SQL Server` 使用 `tempdb` 在 `Sort`（排序）和 `Hash`（哈希）操作期间存储内部记录集时，拥有多个数据文件也可能降低\
  \ `tempdb` 溢出操作的性能。作为一般规则，你需要执行查询优化以减少系统中的溢出操作；然而，如果这不可能，你可以考虑\n\n\n\n# 第 13 章 ■\
  \ 临时对象与 TEMPDB\n\n使用 `-E` SQL Server 启动参数，该参数会增加比例填充算法中每个数据文件分配的范围数。请谨慎使用此启动参数，仅作为最后手段，并验证其对工作负荷的影响。我们将在\
  \ [第 25 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_25) 中详细讨论溢出问题。\n\nMicrosoft\
  \ CSS 团队使用一台具有 64 个逻辑处理器的服务器，在 500 个连接的高负载下执行了 `tempdb` 性能压力测试，这些连接在循环中创建、填充和删除临时表。表\
  \ 13-3 显示了基于 `tempdb` 中文件数量和跟踪标志 `T1118` 配置的执行时间。\n\n```\n表 13-3. 基于 tempdb 中数据文件数量的执行时间\n\
  \n1 个数据文件        8 个数据文件       32 个数据文件      64 个数据文件\n无 T1118           1,080 秒\
  \          45 秒             17 秒             15 秒\n有 T1118           525 秒     \
  \       38 秒             15 秒             15 秒\n```\n\n如您所见，创建多个数据文件显著提升了 `tempdb`\
  \ 性能，尽管性能在某个点后趋于稳定。例如，32 个和 64 个数据文件的场景之间性能差异很小。\n\n通常，如果系统具有八个或更少的逻辑处理器，您应从与逻辑处理器数量相等的文件数开始。否则，从八个数据文件开始，如果系统中仍然存在争用，则以四个为一组进行添加。确保文件使用相同的初始大小和相同的自动增长参数创建，增长大小以兆字节（MB）而非百分比设置。这有助于避免文件不成比例增长的情况，导致某些文件处理比其他文件更多的分配。\n\
  \nSQL Server 2016 在任何一个 `tempdb` 数据文件需要增长时，会同时增长所有 `tempdb` 数据文件。这减少了 `tempdb` 数据文件增长不均匀和分配不成比例的可能性。您仍应确保所有文件都指定了完全相同的自动增长参数。\n\
  \n您可以使用跟踪标志 `T1117` 在早期版本的 SQL Server 中启用相同的自动增长行为。但请注意，此行为将应用于整个服务器并影响用户数据库。文件组中的所有数据文件在自动增长事件发生时将一起增长。\n\
  \n将最新的 SQL Server 服务包和累积更新应用到系统也是有益的。Microsoft 在各种用例中不断优化 `tempdb` 性能并减少 `tempdb`\
  \ 磁盘活动。\n\n当然，优化 `tempdb` 性能的最佳方法是减少不必要的活动。您可以重构代码以避免不必要地使用临时表，避免由于触发器或不必要的乐观事务隔离级别而向版本存储区发送额外负载，通过优化查询和简化执行计划来减少\
  \ SQL Server 创建的内部工作表数量，等等。`tempdb` 的不必要活动越少，其性能就越好。\n\n#### 总结\n\n用户可以在 `tempdb`\
  \ 中创建许多不同类型的对象。临时表的行为类似于常规表。它们可用于在处理期间存储中间数据。在某些情况下，您可以通过将中间结果保存在临时表中来将复杂查询拆分为较小的查询。虽然这引入了创建和填充临时表的开销，但它可以帮助查询优化器生成更简单、更高效的执行计划。\n\
  \n表变量是临时表的轻量级版本。虽然它们在某些情况下可能比临时表性能更好，但它们有一系列限制和约束。这些限制可能导致次优的执行计划，特别是当您将表变量与其他表连接时。\n\
  \n表值参数允许您将行集作为参数传递给存储过程和函数。\n\n\n\n# 第 14 章\n\n## CLR（公共语言运行时）\n\n它们是向 T-SQL 例程传递客户端应用程序数据批次的最快方式之一。\n\
  \n`tempdb`中的用户表可以用作 ETL 过程中的数据暂存区。这种方法可能比用户数据库中的暂存表性能更高，因为`tempdb`中的日志记录更高效。\n\n\
  但是，客户端应用程序需要处理这些表和/或数据在 SQL Server 重启或故障转移到另一个节点后消失的情况。\n\n与用户数据库中的常规表相反，临时对象可能以极高的速率创建，并可能在`tempdb`中引入分配映射页和系统对象争用。您应该创建多个`tempdb`数据文件，并且对于\
  \ SQL Server 2014 及更早版本，使用跟踪标志`T1118`来减少争用。\n\n最后，您应该利用临时对象缓存，这可以进一步减少争用。您需要避免在临时表中使用具名约束，并且不要修改它们以使它们可缓存。\n\
  \n如今存在几种不同的编程范式。有些语言，如 SQL 或 XQuery，是声明式的。它们定义了*需要做什么*，而无需指定*如何实现*。\n\n其他语言，如 C#或\
  \ Java，是命令式的。这种模型需要指定精确的、逐步的控制执行流，定义*如何*达到结果。\n\n举个例子，考虑一个场景：您需要读取属于特定客户的所有数据。在\
  \ SQL 实现的声明式模型中，您会在`where`子句中使用针对`CustomerId`列的谓词。在命令式模型中，您将逐条处理所有记录，使用`IF`运算符比较`CustomerId`。\n\
  \nSQL 是一种声明式语言，并且已经为基于集合的声明式逻辑进行了优化。尽管 Transact SQL 有一套允许我们开发命令式代码的结构，但这些结构效率不高。此外，与现代命令式开发语言相比，T-SQL\
  \ 语言非常有限。公共语言运行时（CLR）通过提供在 SQL Server 内执行.Net 代码的环境来帮助解决其中的一些挑战，并允许我们使用.Net 编程语言开发各种数据库对象。\n\
  \n在 CLR 中实现命令式、过程式风格的代码通常比在 T-SQL 中更高效。此外，在计算密集型领域，如数学计算、字符串操作、序列化、大对象的字节级操作等，CLR\
  \ 的性能优于 T-SQL。\n\n涵盖 CLR 开发的所有方面很容易就能单独写成一本书。本章概述了 SQL Server 中的 CLR 集成，讨论了一些与安全性相关的问题，并在几个不同领域比较了\
  \ T-SQL 和 CLR 例程的性能。\n\n### CLR 集成概述\n\nSQL Server 将.Net 运行时环境加载到其自身进程内，并在那里管理内存和其他资源。它对该环境有完全的控制权，并且可以在需要时关闭.Net\
  \ 应用程序域。\n\n> **注意**：*应用程序域*是.Net 中的一个关键概念，它代表执行.Net 代码的隔离环境。它为原生 Windows 代码中的 Windows\
  \ 进程提供了类似的隔离级别。\n\nCLR 代码被编译成程序集 DLL，这些 DLL 存储在数据库中。您可以使用`CREATE ASSEMBLY`语句在那里注册和编录程序集，指定文件路径或表示程序集代码的二进制序列。然后，SQL\
  \ Server 将程序集加载到单独的应用程序域中进行验证，并检查 DLL 或程序集位是否表示已编译的.Net 代码。此外，SQL Server 执行代码验证以确保程序集不会执行未经授权的操作。\n\
  \n© Dmitri Korotkevitch 2016\n\nD. Korotkevitch, *Pro SQL Server Internals*, DOI\
  \ 10.1007/978-1-4842-1964-5_14\n\n第 14 章 ■ CLR\n\n\n\n# 第 14 章 ■ CLR（公共语言运行时）\n\n\
  程序集属于三种不同的安全类别之一，称为`权限集`。你需要在`CREATE ASSEMBLY`语句中指定相应的权限集。类别如下：\n\n`SAFE`：此代码完全可靠，并且仅在进程内工作。这里只能使用标准\
  \ .NET 库和类的一个子集。这是程序集的默认权限集，也是 Microsoft Azure SQL 数据库中唯一支持的权限集。\n\n`EXTERNAL_ACCESS`：此代码可以执行一些进程外调用以访问外部资源，例如文件系统、注册表、Web\
  \ 服务和 Windows 事件日志。与`SAFE`程序集类似，只能使用 .NET 库和类的一个子集。代码也保证是可靠的。\n\n`UNSAFE`：在不安全的\
  \ CLR 代码中没有限制。它可以进行进程外调用，利用几乎所有的 .NET 库，启动自己的线程，并执行可能导致代码不可靠的其他操作。\n\n当你运行 CLR 代码时，SQL\
  \ Server 会根据数据库和程序集所有者创建一个独立的应用域。例如，如果用户 `Mary` 是程序集 `A1` 的所有者，用户 `Bob` 是程序集 `A2`\
  \ 和 `A3` 的所有者，那么无论有多少用户调用 CLR 例程，你都将拥有两个运行 CLR 代码的应用域——一个用于 Bob 的程序集，另一个用于 Mary\
  \ 的程序集。\n\n当发生未处理的异常时，SQL Server 可以关闭整个应用域。这将影响在该域中运行 CLR 代码的其他会话。导致这种情况的条件通常只出现在`UNSAFE`权限集中，在处理此类异常时需要格外小心。\n\
  \n你可以用与排查 T-SQL 代码类似的方式来排查 CLR 例程的性能问题。探查器事件（以及相应的扩展事件），例如`SQL:Batch Starting`、`Completed`、`SP:Starting`、`Completed`、`StmtStarting`和`StmtCompleted`，可以监控\
  \ T-SQL 和 CLR 代码的执行。数据管理视图（DMV），例如`sys.dm_exec_query_stats`、`sys.dm_exec_requests`和`sys.dm_os_memory_*`，其工作原理相同。\n\
  \n■ **注意** 我们将在本书第五部分“实用故障排除”中，讨论如何使用这些 DMV 进行性能排查。\n\n性能计数器`SQL Server: CLR\\CLR\
  \ Execution`显示了在 CLR 执行中花费的总时间。\n\nSQL Server 的 T-SQL 线程使用协作式非抢占调度并会主动让出（yield）。而托管的\
  \ CLR 线程则使用抢占式调度，并依赖宿主（SQL Server）来中断它们。即使 SQL Server 有能力检测并中断不让出的线程，失控的 CLR 代码对系统性能的影响也可能比\
  \ T-SQL 代码大得多。你必须避免这种情况，并通过在 CLR 代码中调用`System.Threading.Thread.Sleep(0)`方法，让 CLR\
  \ 不时地主动让出。\n\n你可以使用`sys.dm_clr_tasks` DMV 来识别运行非让出 CLR 代码的会话，如代码清单 14-1 所示。\n\n\
  ***代码清单 14-1.*** 识别具有非让出 CLR 代码的会话\n\n```\nselect\n    er.session_id, ct.forced_yield_count,\n\
  \    w.task_address, w.[state], w.last_wait_type, ct.state\nfrom\n    sys.dm_clr_tasks\
  \ ct with (nolock) join\n    sys.dm_os_workers w with (nolock) on\n        ct.sos_task_address\
  \ = w.task_address\n    join sys.dm_exec_requests er with (nolock) on\n        w.task_address\
  \ = er.task_address\nwhere\n    ct.type = 'E_TYPE_USER'\n```\n\n图 14-1 所示的结果包含了当前正在运行的\
  \ CLR 任务的信息。`forced_yield_count`列表示调度器强制 CLR 代码让出的次数。\n\n***图 14-1.*** 识别具有非让出 CLR\
  \ 代码的会话\n\n#### 安全注意事项\n\n默认情况下，SQL Server 的 CLR 集成是禁用的。虽然这不会阻止你部署包含程序集和 CLR 对象的数据库，但在启用\
  \ CLR 之前，你将无法调用 CLR 例程。\n\n\n# CLR 集成\n\n## 启用 CLR 集成\n\n可以在服务器级别启用 CLR，如清单 14-2\
  \ 所示。\n\n**清单 14-2.** 启用 CLR 集成\n\n```sql\nsp_configure 'show advanced options',\
  \ 1;\nreconfigure;\ngo\n\nsp_configure 'clr enabled', 1;\nreconfigure;\ngo\n\nsp_configure\
  \ 'show advanced options', 0;\nreconfigure;\ngo\n```\n\n在服务器级别启用 CLR 的要求可能会给试图在企业环境中部署系统的独立软件供应商（ISV）带来阻碍。在这种环境中，数据库和安全管理员在处理\
  \ ISV 的此类要求时常常持反对意见。\n\n另外值得一提的是，系统级 CLR 代码始终是启用的。无论配置设置如何，都可以使用系统 CLR 类型，例如 `HierarchyId`、`Geometry`\
  \ 和 `Geography`。我们将在下一章详细讨论这些类型。\n\n访问数据的 CLR 对象会以类似于动态 SQL 的方式打破所有权链。这会导致系统中额外的安全管理开销。让我们看一下清单\
  \ 14-3 和 14-4 中的示例。\n\n## 所有权链问题\n\n**清单 14-3.** 所有权链：CLR 部分\n\n```csharp\n[Microsoft.SqlServer.Server.SqlFunction(DataAccess\
  \ = DataAccessKind.Read)]\npublic static SqlMoney GetOrderTotalCLR(SqlInt32 orderId)\n\
  {\n    using (SqlConnection conn = new SqlConnection(\"context connection=true\"\
  ))\n    {\n        conn.Open();\n        SqlCommand cmd = new SqlCommand(\n    \
  \        @\"select @Result = sum(Quantity * Price)\n              from dbo.OrderLineItems\n\
  \              where OrderId = @OrderId\", conn);\n        cmd.Parameters.Add(\"\
  @OrderId\", SqlDbType.Int).Value = orderId;\n        cmd.Parameters.Add(\"@Result\"\
  , SqlDbType.Float).Direction = ParameterDirection.Output;\n        cmd.ExecuteNonQuery();\n\
  \        return new SqlMoney((double)cmd.Parameters[1].Value);\n    }\n}\n```\n\n\
  **清单 14-4.** 所有权链：T-SQL 部分\n\n```sql\ncreate function dbo.GetOrderTotal(@OrderId\
  \ int)\nreturns money\nas\nreturn\n(\n    select sum(Quantity * Price) as Total\n\
  \    from dbo.OrderLineItems\n    where OrderId = @OrderId\n)\ngo\n\ncreate view\
  \ dbo.vOrdersTSQL(OrderId, OrderTotal)\nas\nselect o.OrderId, dbo.GetOrderTotal(o.OrderId)\n\
  from dbo.Orders o\ngo\n\ncreate view dbo.vOrdersCLR(OrderId, OrderTotal)\nas\nselect\
  \ o.OrderId, dbo.GetOrderTotalCLR(o.OrderId)\nfrom dbo.Orders o\ngo\n\ngrant select\
  \ on object::dbo.vOrdersTSQL to [Bob];\ngrant select on object::dbo.vOrdersCLR to\
  \ [Bob];\ngo\n\nexecute as user='Bob';\n-- Success\nselect * from dbo.vOrdersTSQL;\n\
  -- Failure - Bob needs to have SELECT permission on dbo.OrderLineItems table\nselect\
  \ * from dbo.vOrdersCLR;\n```\n\n在清单 14-4 中，我们创建了两个视图 `dbo.vOrdersTSQL` 和 `dbo.vOrdersCLR`，它们分别使用了\
  \ T-SQL 和 CLR 用户定义函数。两个函数都从 `dbo.OrderLineItems` 表中选择数据。\n\n当用户 *Bob* 查询 `dbo.vOrdersTSQL`\
  \ 视图时，它工作正常。只要 *Bob* 对视图本身拥有 SELECT 权限，并且视图和表具有相同的拥有者，SQL Server 就不要求*Bob*对视图引用的表拥有\
  \ SELECT 权限。这就是 *所有权链* 的一个例子。\n\n然而，*Bob* 无法查询 `dbo.vOrdersCLR` 视图，因为所有权链在 CLR 例程中不起作用，为了使\
  \ `dbo.GetOrderTotalCLR` 方法能够工作，他需要对 `dbo.OrderLineItems` 表拥有 SELECT 权限。\n\n当 CLR\
  \ 代码访问外部资源时，它是在 SQL Server 启动账户的上下文中完成的，这可能需要授予额外的权限。您可以通过在.Net 代码中使用模拟来规避此类要求，但这仅在使用\
  \ Windows 身份验证时有效。\n\n最后，`EXTERNAL_ACCESS` 或 `UNSAFE` 程序集必须使用与已授予 `EXTERNAL_ACCESS`\
  \ 或 `UNSAFE` 权限的 SQL Server 登录名相同的密钥进行签名。让我们看看如何做到这一点。\n\n## 程序集签名与密钥对\n\n第一步，如图\
  \ 14-2 所示，您需要生成一个 *密钥对* 文件。Visual Studio 和 Windows SDK 提供了实用程序 `sn.exe` 可供使用。\n\n\
  **图 14-2.** 使用`sn.exe`生成密钥对文件\n\n\n# 第 14 章 ■ CLR\n\n你应在 CLR 项目属性中指定生成的文件，如图 14-3\
  \ 和图 14-4 所示。\n\n![](img/index-317_1.jpg)\n*图 14-3. 签名 CLR 项目：步骤 1*\n\n![](img/index-317_2.jpg)\n\
  *图 14-4. 签名 CLR 项目：步骤 2*\n\n之后，你可以从密钥对文件创建非对称密钥，并创建具有相应权限的登录名，如代码清单 14-5 所示。\n\n\
  *代码清单 14-5. 从密钥对文件创建具有 `EXTERNAL ACCESS` 权限的登录名*\n\n```sql\nuse master\ngo\n\n--\
  \ 如果不存在则创建主密钥\nif not exists\n(\n    select *\n    from sys.symmetric_keys\n   \
  \ where name = '##MS_DatabaseMasterKey##'\n)\ncreate master key encryption by password\
  \ = '$tr0ngPas$word1';\ngo\n\ncreate asymmetric key KeyExternalAccess from file\
  \ = 'c:\\SQL\\CLRSecurity\\CLRSecurityKey.snk';\ncreate login CLRExtAccessLogin\
  \ from asymmetric key KeyExternalAccess;\ngrant external access assembly to CLRExtAccessLogin;\n\
  ```\n\n现在，你应该能够成功注册需要 `EXTERNAL_ACCESS` 权限集的已签名程序集了。\n\n> **注意** 注册具有 `EXTERNAL_ACCESS`\
  \ 或 `UNSAFE` 权限集的程序集的另一种选项是将宿主数据库标记为 `TRUSTWORTHY`。但是，此操作违反了安全最佳实践。\n\n当你决定在系统中开始使用\
  \ CLR 集成时，尤其是如果你是独立软件供应商 (ISV) 并且计划将软件部署给大量客户，所有这些安全要求都必须加以考虑。\n\n##### 性能考量\n\n\
  比较 CLR 和 T-SQL 例程的性能并非易事。这两项技术本质上有所不同，应用于不同的任务。T-SQL 是一种解释型语言，针对基于集合的逻辑和数据访问进行了优化。而\
  \ CLR 产生的是编译代码，最适合处理命令式逻辑。\n\n即使使用命令式代码，你也需要决定是在 CLR 中实现它，还是在客户端（可能运行在应用服务器上）实现。CLR\
  \ 在 SQL Server 进程内工作。一方面，它消除了网络流量，并且由于相较于在应用服务器上运行的代码更“接近”数据，可能提供最佳性能；但另一方面，CLR\
  \ 会增加 SQL Server 的负载。增加更多的应用服务器可能比升级 SQL Server 服务器更容易且成本更低。\n\n然而，在某些情况下，你必须使用\
  \ CLR 代码。一个例子是在 `where` 子句中执行 `RegEx`（正则表达式）评估的查询。将此类评估移动到客户端代码中效率低下，并且 SQL Server\
  \ 中没有正则表达式支持。在这种情况下，CLR 是你唯一的选择。但在其他情况下，当命令式逻辑可以移动到应用服务器时，你应该考虑这种选项，特别是当这些服务器靠近\
  \ SQL Server 且网络延迟和吞吐量不是问题时。\n\n在本节中，我们将比较 CLR 和 T-SQL 在几个不同领域的性能。与其他 SQL Server\
  \ 技术类似，CLR 和 T-SQL 之间的选择属于“视情况而定”的范畴。\n\n开始之前，让我们先看表 14-1，比较两种技术支持的对象类型。\n\n*表 14-1.\
  \ CLR 和 T-SQL 对象类型*\n\n| T-SQL | CLR |\n| :--- | :--- |\n| 标量用户定义函数 | 是 | 是 |\n\
  | 多语句表值用户定义函数 | 是 | 是 |\n| 内联表值用户定义函数 | 是 | 否 |\n| 存储过程 | 是 | 是 |\n| 触发器 | 是 | 是\
  \ |\n| 用户定义聚合 | 否 | 是 |\n| 用户定义类型 | 否 | 是 |\n\n> **注意** 尽管你可以使用 `CREATE TYPE` 语句创建\
  \ T-SQL 类型，但 T-SQL 用户定义类型派生自标量 T-SQL 类型。而 CLR 用户定义类型则是 .Net 类，可以具有多个属性和/或方法。我们将在下一节更深入地讨论\
  \ T-SQL 和 CLR 用户定义类型。\n\n\n\n# 第 14 章 ■ CLR\n\n[第 15 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_15)，“CLR\
  \ 类型”。\n\nCLR 允许你创建用户定义的聚合和复杂类型，这是 T-SQL 无法做到的。\n\n用户定义聚合是扩展标准 SQL Server 函数库的好方法，并且，正如你将在本章后面看到的，与\
  \ T-SQL 代码相比，它可以提供非常好的性能。在某些情况下，用户定义类型也能有所帮助。\n\n让我们创建一个简单的表并填充一些数据，如代码清单 14-6 所示。\n\
  \n### 代码清单 14-6. 测试表创建\n\n```sql\ncreate table dbo.Numbers\n(\n    Num int not null,\n\
  \    constraint PK_Numbers\n    primary key clustered(Num)\n);\n\n;with N1(C) as\
  \ (select 0 union all select 0)\n,N2(C) as (select 0 from N1 as T1 cross join N1\
  \ as T2)\n,N3(C) as (select 0 from N2 as T1 cross join N2 as T2)\n,N4(C) as (select\
  \ 0 from N3 as T1 cross join N3 as T2)\n,N5(C) as (select 0 from N4 as T1 cross\
  \ join N4 as T2)\n,N6(C) as (select 0 from N4 as T1 cross join N4 as T2 cross join\
  \ N2 as T3) -- 262,144 行\n,Nums(Num) as (select row_number() over (order by (select\
  \ null)) from N6)\n\ninsert into dbo.Numbers(Num)\nselect Num from Nums;\n```\n\n\
  调用 T-SQL 标量函数与其 CLR 对应函数相比，会引入更高的开销。让我们用一个测试来证明这一点：我们将使用接受整数值作为参数并在该值为偶数时返回 1 的函数。CLR\
  \ 实现如代码清单 14-7 所示。\n\n### 代码清单 14-7. 调用开销：CLR 函数\n\n```csharp\n[Microsoft.SqlServer.Server.SqlFunction(\n\
  \    IsDeterministic=true,\n    IsPrecise=true,\n    DataAccess=DataAccessKind.None\n\
  ) ]\npublic static SqlInt32 EvenNumberCLR(SqlInt32 num)\n{ return new SqlInt32((num\
  \ % 2 == 0) ? 1 : 0); }\n\n[Microsoft.SqlServer.Server.SqlFunction(\n    IsDeterministic=true,\n\
  \    IsPrecise=true,\n    DataAccess=DataAccessKind.Read\n) ]\npublic static SqlInt32\
  \ EvenNumberCLRWithDataAccess(SqlInt32 num)\n{ return new SqlInt32((num % 2 == 0)\
  \ ? 1 : 0); }\n```\n\n为每个函数指定了一组属性。这些属性描述了函数的行为，它们可以帮助查询优化器生成更高效的执行计划。\n\n在我们的例子中，指定了三个属性。`IsDeterministic`指明函数是否是确定性的，即对于特定的参数值和数据库状态，它是否总是返回相同的结果。我们的函数是确定性的——偶数总是偶数。作为反例，你可以想想`getdate()`系统函数，它不是确定性的——每次调用的结果都会不同。\n\
  \n`IsPrecise`描述函数是否涉及不精确的计算；例如，使用浮点运算。\n\n最后，`DataAccess`属性表明函数是否执行任何数据访问。如果是这种情况，SQL\
  \ Server 会在一个不同的上下文中调用该函数，该上下文将允许它访问数据库中的数据。建立这样的上下文会在函数调用期间引入额外的开销，这将在我们的测试中看到。\n\
  \n这些函数的 T-SQL 实现如代码清单 14-8 所示。\n\n### 代码清单 14-8. 调用开销：T-SQL 函数\n\n```sql\ncreate\
  \ function dbo.EvenNumber(@Num int)\nreturns int\nwith schemabinding\nas\nreturn\
  \ (case when @Num % 2 = 0 then 1 else 0 end);\n\ncreate function dbo.EvenNumberInline(@Num\
  \ int)\nreturns table\nas\nreturn\n(\n    select (case when @Num % 2 = 0 then 1\
  \ else 0 end) as Result\n);\n```\n\n让我们在测试中使用标量函数和内联表值函数，并测量代码清单 14-9 中所示语句的平均执行时间。我在我的环境中的结果如表\
  \ 14-2 所示。\n\n### 代码清单 14-9. 调用开销：测试语句\n\n```sql\n-- CLR UDF - 无数据访问上下文\nselect\
  \ count(*)\nfrom dbo.Numbers\nwhere dbo.EvenNumberCLR(Num) = 1\n\n-- CLR UDF - 有数据访问上下文\n\
  select count(*)\nfrom dbo.Numbers\nwhere dbo.EvenNumberCLRWithDataAccess(Num) =\
  \ 1\n\n-- TSQL - 标量 UDF\nselect count(*)\nfrom dbo.Numbers\nwhere dbo.EvenNumber(Num)\
  \ = 1;\n```\n\n\n# T-SQL - 多语句 UDF\n\n```sql\nselect count(*)\nfrom\ndbo.Numbers\
  \ n cross apply\ndbo.EvenNumberInline(n.Num) e\nwhere\ne.Result = 1;\n```\n\n**表\
  \ 14-2. T-SQL 和 CLR 例程的调用开销：执行时间**\n\n| **CLR UDF** | **T-SQL** |\n| :--- | :---\
  \ |\n| **无数据访问上下文** | **有数据访问上下文** | **标量 UDF** | **多语句** |\n| 167 ms | 246 ms |\
  \ 675 ms | 18 ms |\n\n每个语句都对 `dbo.Numbers` 表执行一次`聚集索引扫描`，并检查表中每一行的 `Num` 列是否为偶数。对于\
  \ CLR 和 T-SQL 标量用户定义函数，这将引入函数调用。另一方面，内联表值函数在查询内联中执行计算。\n\n可以看出，没有数据访问上下文的 CLR UDF\
  \ 的运行速度比 T-SQL 标量函数快大约四倍。即使存在数据访问上下文的开销，CLR 实现仍然比 T-SQL 标量 UDF 快，尽管在此特定示例中，停止使用函数而转换为\
  \ CLR 可以实现最佳性能。函数调用的开销远高于内联计算。\n\n虽然你应该始终考虑将代码重构作为一种选项，但在某些情况下，即使涉及所有开销，CLR 的性能也会超过内联\
  \ T-SQL 实现。最常见的两个领域是数学计算和字符串操作。\n\n让我们测试一个计算两点之间距离的函数的性能，这两点由经纬度坐标定义。CLR 实现见清单 14-10。T-SQL\
  \ 实现见清单 14-11。我们将测试两种 T-SQL 方法：标量函数和内联表值函数。\n\n## 第 14 章 ■ CLR\n\n**清单 14-10.**\
  \ 计算两点之间的距离：CLR 函数\n\n```csharp\n[Microsoft.SqlServer.Server.SqlFunction(IsDeterministic=true,\
  \ IsPrecise=false,\nDataAccess=DataAccessKind.None) ]\npublic static SqlDouble CalcDistanceCLR\n\
  (SqlDouble fromLat, SqlDouble fromLon, SqlDouble toLat, SqlDouble toLon)\n{\n  \
  \  double fromLatR = Math.PI / 180 * fromLat.Value;\n    double fromLonR = Math.PI\
  \ / 180 * fromLon.Value;\n    double toLatR = Math.PI / 180 * toLat.Value;\n   \
  \ double toLonR = Math.PI / 180 * toLon.Value;\n    return new SqlDouble(\n    \
  \    2 * Math.Asin(\n            Math.Sqrt(\n                Math.Pow(Math.Sin((fromLatR\
  \ - toLatR) / 2.0),2) +\n                (\n                    Math.Cos(fromLatR)\
  \ * Math.Cos(toLatR) * Math.Pow(Math.Sin((fromLonR -\n                    toLonR)\
  \ / 2.0),2) )\n            )\n        ) * 20001600.0 / Math.PI\n    );\n}\n```\n\
  \n**清单 14-11.** 计算两点之间的距离：T-SQL 函数\n\n```sql\ncreate function dbo.CalcDistance\n\
  \    (@FromLat decimal(9,6), @FromLon decimal(9,6),@ToLat decimal(9,6), @ToLon decimal(9,6))\n\
  returns float\nwith schemabinding\nas\ndeclare\n    @Dist float\n    ,@FromLatR\
  \ float = radians(@FromLat)\n    ,@FromLonR float = radians(@FromLon)\n    ,@ToLatR\
  \ float = radians(@ToLat)\n    ,@ToLonR float = radians(@ToLon)\nset @Dist =\n \
  \   2 * asin(\n        sqrt(\n            power(sin( (@FromLatR - @ToLatR) / 2.),\
  \ 2) +\n            ( cos(@FromLatR) * cos(@ToLatR) * power(sin((@FromLonR - @ToLonR)\
  \ / 2.0), 2))\n        )\n    ) * 20001600. / pi();\nreturn @Dist;\n```\n\n```sql\n\
  create function dbo.CalcDistanceInline\n    (@FromLat decimal(9,6), @FromLon decimal(9,6),@ToLat\
  \ decimal(9,6), @ToLon decimal(9,6))\nreturns table\nas\nreturn\n(\n    with Rads(FromLatR,\
  \ FromLonR, ToLatR, ToLonR)\n    as\n    (\n        select radians(@FromLat), radians(@FromLon),\
  \ radians(@ToLat), radians(@ToLon)\n    )\n    select\n        2 * asin(\n     \
  \       sqrt(\n                power(sin((FromLatR - ToLatR) / 2.), 2) +\n     \
  \           (\n                    cos(FromLatR) * cos(ToLatR) * power(sin((FromLonR\
  \ - ToLonR) / 2.0),2))\n            )\n        ) * 20001600. / pi() as Distance\n\
  \    from Rads\n);\n```\n\n## 第 14 章 ■ CLR\n\n当你比较 262,144 行的计算结果时，如表 14-3 所示，你可以看到\
  \ CLR UDF 的执行速度比内联表值函数快近两倍，比 T-SQL 标量 UDF 快五倍以上。\n\n**表 14-3. 计算两点之间的距离：执行时间**\n\
  \n| **CLR UDF** | **TSQL 标量 UDF** | **TSQL 内联表值函数** |\n| :--- | :--- | :--- |\n\
  | 347 ms | 1,955 ms | 721 ms |\n\n现在，让我们来看数据访问性能。第一次测试比较了来自 T-SQL 和 CLR 存储过程的单独\
  \ DML 语句的执行时间。在此测试中，我创建了用于计算 `dbo.Numbers` 表中特定数字范围内行数的存储过程。T-SQL 和 CLR 实现分别见清单\
  \ 14-12 和清单 14-13。\n\n***清单 14-12.*** 数据访问性能：T-SQL 存储过程（单独语句）\n\n```sql\ncreate\
  \ proc dbo.ExistInInterval(@MinNum int, @MaxNum int, @RowCount int output)\nas\n\
  set @RowCount = 0;\nwhile @MinNum <= @MaxNum\nbegin\nif exists( select * from dbo.Numbers\
  \ where Num = @MinNum )\nset @RowCount += 1\nset @MinNum += 1\nend;\n```\n\n第 14\
  \ 章 ■ CLR\n\n***清单 14-13.*** 数据访问性能：CLR 存储过程（单独语句）\n\n```csharp\n[Microsoft.SqlServer.Server.SqlProcedure]\n\
  public static void ExistInIntervalCLR(SqlInt32 minNum, SqlInt32 maxNum, out SqlInt32\
  \ rowCnt)\n{\nint result = 0;\nusing (SqlConnection conn = new SqlConnection(\"\
  context connection=true\"))\n{\nconn.Open();\nSqlCommand cmd = new SqlCommand\n\
  (\"select Num from dbo.Numbers where Num between @minNum and @maxNum\", conn);\n\
  cmd.Parameters.Add(\"@Result\", SqlDbType.Int).Direction = ParameterDirection.Output;\n\
  cmd.Parameters.Add(\"@Number\", SqlDbType.Int);\nfor (int i = minNum.Value; i <=\
  \ maxNum.Value; i++)\n{\ncmd.Parameters[1].Value = i;\ncmd.ExecuteNonQuery();\n\
  result += (int)cmd.Parameters[0].Value;\nSystem.Threading.Thread.Sleep(0);\n}\n\
  }\nrowCnt = new SqlInt32(result);\n}\n```\n\n表 14-4 显示了导致 50,000 个单独 `SELECT` 语句的存储过程调用的平均执行时间。如你所见，使用\
  \ CLR 代码的数据访问比使用 T-SQL 的数据访问慢大约五倍。\n\n***表 14-4.*** 数据访问性能（单独语句）：执行时间\n\n**T-SQL\
  \ 存储过程**\n**CLR 存储过程**\n410 ms\n2,330 ms\n\n在设计需要从数据库访问数据的用户定义函数时，你需要记住这一点。虽然 CLR\
  \ 在调用方面比 T-SQL 更高效，但数据访问代码的运行速度会显著变慢。你需要测试两种实现方式，以确定哪种解决方案对你的目的更有效。此外，你还需要考虑代码重构和从查询中移除\
  \ UDF 作为另一种可能性。\n\n下一步，让我们看看 `.Net SqlDataReader` 类的性能，并将其与 T-SQL 中的游标实现进行比较。你可以在清单\
  \ 14-14 中看到 CLR 代码，在清单 14-15 中看到 T-SQL 实现。\n\n***清单 14-14.*** 数据访问性能：CLR 存储过程（SQL\
  \ Reader）\n\n```csharp\n[Microsoft.SqlServer.Server.SqlProcedure]\npublic static\
  \ void ExistInIntervalReaderCLR\n( SqlInt32 minNum, SqlInt32 maxNum, out SqlInt32\
  \ rowCnt )\n{\nint result = 0;\nusing (SqlConnection conn = new SqlConnection(\"\
  context connection=true\"))\n{\nconn.Open();\nSqlCommand cmd = new SqlCommand\n\
  (\"select Num from dbo.Numbers where Num between @MinNum and @MaxNum\", conn);\n\
  cmd.Parameters.Add(\"@MinNum\", SqlDbType.Int).Value = minNum;\ncmd.Parameters.Add(\"\
  @MaxNum\", SqlDbType.Int).Value = maxNum;\nusing (SqlDataReader reader = cmd.ExecuteReader())\n\
  {\nwhile (reader.Read())\n{\nresult++;\n// 每 500 行让出一次执行权\nif (result % 500 == 0)\
  \ System.Threading.Thread.Sleep(0);\n}\n}\n}\nrowCnt = new SqlInt32(result);\n}\n\
  ```\n\n***清单 14-15.*** 数据访问性能：T-SQL 存储过程（游标）\n\n```sql\ncreate proc dbo.ExistInIntervalCursor(@MinNum\
  \ int, @MaxNum int, @RowCount int output)\nas\ndeclare\n@Num int\ndeclare\ncurWork\
  \ cursor fast_forward\nfor\nselect Num\nfrom dbo.Numbers\nwhere Num between @MinNum\
  \ and @MaxNum\nset @RowCount = 0;\nopen curWork;\nfetch next from curWork into @Num;\n\
  while @@fetch_status = 0\nbegin\nset @RowCount += 1;\nfetch next from curWork into\
  \ @Num;\nend\nclose curWork;\ndeallocate curWork;\n```\n\n正如你在表 14-5 中看到的那样，使用 `SqlDataReader`\
  \ 进行逐行处理比使用 T-SQL 游标高效得多。\n\n# 第 14 章 ■ CLR\n\n## 表 14-5. 数据访问性能（SQLReader 与 Cursor\
  \ 对比）：执行时间\n\n| T-SQL 存储过程 | CLR 存储过程 |\n| :--- | :--- |\n| 556 毫秒 | 116 毫秒 |\n\n\
  最后，让我们看看 CLR 聚合的性能。我们将使用一个将值连接成逗号分隔字符串的聚合。实现此功能的代码见清单 14-16。\n\n## 清单 14-16. CLR\
  \ 聚合\n\n```csharp\n[Serializable]\n[SqlUserDefinedAggregate(\n    Format.UserDefined,\
  \ IsInvariantToNulls=true, IsInvariantToDuplicates=false,\n    IsInvariantToOrder=false,\
  \ MaxByteSize=-1) ]\npublic class Concatenate : IBinarySerialize\n{\n    // 用于存储中间结果的缓冲区\n\
  \    private StringBuilder intermediateResult;\n\n    // 初始化缓冲区\n    public void\
  \ Init() { this.intermediateResult = new StringBuilder(); }\n\n    // 如果值不为 null，则累加下一个值\n\
  \    public void Accumulate(SqlString value)\n    {\n        if (value.IsNull)\n\
  \            return;\n\n        this.intermediateResult.Append(value.Value).Append(',');\n\
  \    }\n\n    // 合并部分完成的聚合\n    public void Merge(Concatenate other)\n    { this.intermediateResult.Append(other.intermediateResult);\n\
  \    }\n\n    // 在聚合结束时调用\n    public SqlString Terminate()\n    {\n        string\
  \ output = string.Empty;\n        if (this.intermediateResult != null && this.intermediateResult.Length\
  \ > 0)\n        { // 删除尾部的逗号\n            output = this.intermediateResult.ToString(0,\
  \ this.intermediateResult.Length - 1);\n        }\n\n        return new SqlString(output);\n\
  \    }\n\n    // 反序列化数据\n    public void Read(BinaryReader r)\n    { intermediateResult\
  \ = new StringBuilder(r.ReadString()); }\n\n    // 序列化数据\n    public void Write(BinaryWriter\
  \ w)\n    { w.Write(this.intermediateResult.ToString()); }\n}\n```\n\n与用户定义函数一样，设置属性以告知查询优化器\
  \ CLR 聚合的行为和实现方式极为重要。这有助于生成更高效的执行计划，并防止因优化而导致的结果不正确。同样重要的是指定 `MaxByteSize` 属性，该属性定义聚合输出的最大大小。在我们的例子中，我们将其设置为\
  \ `-1`，这意味着该聚合最多可容纳 2 GB 的数据。\n\n让我们比较两种不同的 T-SQL 实现的性能。在第一种实现中，我将使用一个 SQL 变量来保存中间结果。这种方法在底层实现了逐行的命令式处理。第二种方法利用了我们在第\
  \ 13 章讨论的 `FOR XML PATH` 技术。代码见清单 14-17。\n\n## 清单 14-17. 字符串连接：T-SQL 实现\n\n```sql\n\
  -- 使用 SQL 变量\ndeclare\n    @V nvarchar(max) = N''\n    ,@MaxNum int -- 测试批处理大小\n\
  \nselect @V = @V + convert(nvarchar(32), Num) + ','\nfrom dbo.Numbers\nwhere Num\
  \ <= @MaxNum;\n\n-- 删除尾部的逗号\nselect @V = case when @V = '' then '' else left(@V,len(@V)\
  \ - 1) end;\n\n-- 显示结果\nselect @v;\n\n\n-- 使用 FOR XML PATH\nselect case when Result\
  \ is null then '' else left(Result,len(Result) - 1) end\nfrom\n(\n    select convert(nvarchar(max),\n\
  \        (\n            select Num as [text()], ',' as [text()]\n            from\
  \ dbo.Numbers\n            where Num <= @MaxNum\n            for xml path('')\n\
  \        )) as Result\n) r\n```\n\n表 14-6 显示了连接不同行数时的平均执行时间。\n\n## 表 14-6. 字符串连接：执行时间\n\
  \n| | CLR 聚合 | SQL 变量 | FOR XML PATH |\n| :--- | :--- | :--- | :--- |\n| 1,000 行\
  \ | 3 毫秒 | 1 毫秒 | <1 毫秒 |\n| 10,000 行 | 12 毫秒 | 129 毫秒 | 3 毫秒 |\n| 25,000 行 | 33\
  \ 毫秒 | 840 毫秒 | 6 毫秒 |\n| 50,000 行 | 63 毫秒 | 37,182 毫秒 | 21 毫秒 |\n| 100,000 行 |\
  \ 146 毫秒 | 535,040 毫秒 | 43 毫秒 |\n\n如你所见，与 T-SQL 变量方法相比，CLR 聚合的启动成本略高，尽管在处理较大的行集时这种差异迅速消失。CLR\
  \ 聚合和 `FOR XML PATH` 方法的性能都与行数呈线性关系，而 SQL 变量方法的性能则呈指数级下降。SQL Server 每次连接新值时都需要重新实例化字符串，尤其是在字符串变得很大时，这种方式效率不高。\n\
  \n\n最终，无论拼接的行数多少，`FOR XML PATH` 方法都是最高效的。\n\n关键点在于，你需要始终审视可用的选项，尝试用声明式的集合逻辑来替代命令式的代码。虽然\
  \ `CLR` 通常优于命令式的 `T-SQL` 代码，但集合逻辑的性能则更胜一筹。\n\n由此可见，`T-SQL` 和 `CLR` 各有优劣。`CLR` 擅长处理命令式代码和复杂计算，并且用户定义函数的调用开销要低得多。而另一方面，在数据访问领域，除了逐行处理（在此场景下，`.Net`\
  \ 的 `SqlDataReader` 类比 `T-SQL` 游标更快）之外，`T-SQL` 的表现优于 `CLR`。\n\n#### 总结\n`CLR` 代码为\
  \ `SQL Server` 增添了灵活性。它有助于提升需要复杂计算的函数的性能，并通过添加新方法来扩展标准函数库。它还允许你从数据库代码内部访问外部资源。\n\
  \n然而，`CLR` 代码会带来性能和安全方面的代价。`CLR` 代码在 `SQL Server` 进程内运行，这会增加额外负载，如果编码不当，可能导致显著的性能问题。此外，`CLR`\
  \ 也带来了安全挑战。它需要在服务器级别启用，这违背了安全最佳实践。它还会中断所有权链，这意味着在使用权限时需要格外小心。\n\n考虑到所有这些因素，在使用 `CLR`\
  \ 代码之前，你应该始终评估其他选项。你需要考虑将命令式逻辑移至客户端应用程序，并/或尽可能重构查询以使用声明式的集合逻辑。\n\n与 `SQL Server`\
  \ 中的其他技术一样，\"`T-SQL` 和 `CLR` 哪个更好？\"这个问题没有标准答案。不同的用例需要不同的解决方案，在决策阶段评估并测试所有可用的选项总是有益的。\n\
  \n## 第十五章\n### CLR 类型\n`CLR` 类型是公共语言运行时 (`CLR`) 与 `SQL Server` 集成的另一个领域。用户定义的 `CLR`\
  \ 类型允许我们通过开发 `.Net` 类并将其注册到数据库中来扩展标准类型库。标准的 `CLR` 类型，如 `Geometry`、`Geography` 和\
  \ `HierarchyId`，为地理空间和层次数据提供了内置支持。在本章中，你将了解用户定义和系统 `CLR` 类型。\n\n### 用户定义的 CLR 类型\n\
  `SQL Server` 多年来一直支持用户定义类型 (`UDT`)。历史上，基于 `T-SQL` 的用户定义类型被用于强制类型一致性。例如，当你需要将美国邮政地址持久化存储在多个表中时，你可以使用以下语句创建一个用户定义类型来存储州信息：\n\
  \n```sql\nCREATE TYPE dbo.PostalState FROM char(2) NOT NULL.\n```\n\n现在，你可以使用 `dbo.PostalState`\
  \ 作为定义表列、参数和 `SQL` 变量的数据类型。这保证了数据库中对邮政州的每一次引用都具有完全相同的格式：一个非空的、双字符的字符串。\n\n不过，这种方法有一些缺点。`SQL\
  \ Server` 不允许修改类型定义。如果在任何时候你需要让 `dbo.PostalState` 可为空，或者允许使用完整的州名而非缩写，唯一的选项是删除并重新创建该类型。而且，为了执行此操作，你必须先删除数据库中对该类型的任何引用。\n\
  \n`提示` 你可以将列的类型更改为 `UDT` 所使用的基础数据类型。这仅涉及元数据操作。例如，你可以运行 `ALTER TABLE ... ALTER COLUMN\
  \ ...`。\n\n`T-SQL` 用户定义类型总是派生自标量 `T-SQL` 类型。例如，你无法创建一个名为 `Address` 的 `T-SQL` 用户定义数据类型，使其包含多个属性。你也不能在类型级别上定义检查约束。尽管这种方式不太方便，但仍然可以在列级别单独定义约束。考虑到所有这些，我们可以得出结论：`T-SQL`\
  \ 用户定义类型在 `SQL Server` 中的用途非常有限。\n\n\n\n# 第 15 章 ■ CLR 类型\n\n**注意** 你可以通过将规则对象绑定到\
  \ UDT 来在类型级别执行验证。然而，**不推荐这样做**，因为规则已被弃用，并将在未来版本的 SQL Server 中移除。\n\n© Dmitri Korotkevitch\
  \ 2016\n\nD. Korotkevitch, `Pro SQL Server Internals`, DOI 10.1007/978-1-4842-1964-5_15\n\
  \n另一方面，CLR 用户定义类型解决了其中一些问题。它们允许你创建具有多个属性/特性的复杂类型，为类型定义数据验证规则，并实现可用于增强类型功能的方法。\n\n\
  例如，让我们看一个表示简化版美国邮政地址的类型的实现。其代码如 清单 15-1 所示。\n\n## 清单 15-1. CLR 用户定义类型\n\n```csharp\n\
  [Serializable]\n[Microsoft.SqlServer.Server.SqlUserDefinedType(\n    Format.UserDefined,\n\
  \    ValidationMethodName = \"ValidateAddress\",\n    MaxByteSize=8000) ]\npublic\
  \ struct USPostalAddress : INullable, IBinarySerialize\n{\n    // 需要排序以支持二分查找\n\
  \    private static readonly List<string> _validStates = new List<string>\n    {\n\
  \        \"AK\",\"AL\",\"AR\",\"AZ\",\"CA\",\"CO\",\"CT\",\"DC\",\"DE\",\"FL\",\"\
  GA\",\"HI\",\"IA\"\n        ,\"ID\",\"IL\",\"IN\",\"KS\",\"KY\",\"LA\",\"MA\",\"\
  MD\",\"ME\",\"MI\",\"MN\",\"MO\",\"MS\"\n        ,\"MT\",\"NC\",\"ND\",\"NE\",\"\
  NH\",\"NJ\",\"NM\",\"NV\",\"NY\",\"OH\",\"OK\",\"OR\",\"PA\"\n        ,\"PR\",\"\
  RI\",\"SC\",\"SD\",\"TN\",\"TX\",\"UT\",\"VA\",\"VT\",\"WA\",\"WI\",\"WV\",\"WY\"\
  \n    };\n\n    private bool _null;\n    private string _address;\n    private string\
  \ _city;\n    private string _state;\n    private string _zipCode;\n\n    public\
  \ bool IsNull { get { return _null; } }\n\n    public string Address\n    {\n  \
  \      [SqlMethod(IsDeterministic = true, IsPrecise = true)]\n        get { return\
  \ _address; }\n    }\n\n    public string City\n    {\n        [SqlMethod(IsDeterministic\
  \ = true, IsPrecise = true)]\n        get { return _city; }\n    }\n\n    public\
  \ string State\n    {\n        [SqlMethod(IsDeterministic = true, IsPrecise=true)]\n\
  \        get { return _state; }\n    }\n\n    public string ZipCode\n    {\n   \
  \     [SqlMethod(IsDeterministic = true, IsPrecise = true)]\n        get { return\
  \ _zipCode; }\n    }\n\n    public override string ToString()\n    { return String.Format(\"\
  {0}, {1}, {2}, {3}\", _address, _city, _state, _zipCode); }\n\n    // Null 对象的静态表示\n\
  \    public static USPostalAddress Null\n    {\n        get\n        {\n       \
  \     USPostalAddress h = new USPostalAddress();\n            h._null = true;\n\
  \            return h;\n        }\n    }\n\n    // 验证地址信息是否正确\n    private bool\
  \ ValidateAddress()\n    {\n        // 检查是否指定了所有属性且州有效\n        return\n       \
  \     !( String.IsNullOrEmpty(_address) || String.IsNullOrEmpty(_city) ||\n    \
  \           String.IsNullOrEmpty(_state) || String.IsNullOrEmpty(_zipCode) ||\n\
  \               _validStates.BinarySearch(_state.ToUpper()) == -1 );\n    }\n\n\
  \    // 从字符串创建对象\n    public static USPostalAddress Parse(SqlString s)\n    {\n\
  \        if (s.IsNull) return Null;\n\n        USPostalAddress u = new USPostalAddress();\n\
  \n        string[] parts = s.Value.Split(\",\".ToCharArray());\n        if (parts.Length\
  \ != 4)\n            throw new ArgumentException(\"格式不正确。应为 <地址>, <城市>, <州>, <邮政编码>\"\
  );\n\n        u._address = parts[0].Trim();\n        u._city = parts[1].Trim();\n\
  \        u._state = parts[2].Trim();\n        u._zipCode = parts[3].Trim();\n\n\
  \        if (!u.ValidateAddress())\n            throw new ArgumentException(\"格式不正确。属性为空或州不正确\"\
  );\n\n        return u;\n    }\n\n    // 类方法示例\n    [SqlMethod(OnNullCall = false,\
  \ IsDeterministic = true, DataAccess=DataAccessKind.None)]\n    public double CalculateShippingCost(USPostalAddress\
  \ destination)\n    {\n        // 计算两个地址之间的运输成本\n        return (destination.State\
  \ == this.State)?15.0:25.0;\n    }\n\n    // IBinarySerializer.Read\n    public\
  \ void Read(System.IO.BinaryReader r)\n    {\n        _address = r.ReadString();\n\
  \        _city = r.ReadString();\n        _state = r.ReadString();\n        _zipCode\
  \ = r.ReadString();\n    }\n\n    // IBinarySerializer.Write\n    public void Write(System.IO.BinaryWriter\
  \ w)\n    {\n        w.Write(_address);\n        w.Write(_city);\n        w.Write(_state);\n\
  \        w.Write(_zipCode);\n    }\n}\n```\n\n如你所见，该类型包含四个不同的公共属性/特性（`Street`、`City`、`State`\
  \ 和 `ZIPCode`）以及几个方法。其中一些方法（`ToString`、`Parse`、`Read` 和 `Write`）是必需的。\n\n\n\n# CLR\
  \ 类型\n\n## 类型创建与序列化\n\n以支持类型创建与序列化。另一个（`CalculateShippingCost`）是类型功能增强的示例。\n\n在数据库中，定义表列、变量和参数时可以使用此类型。\n\
  \n清单 15-2 和图 15-1 展示了一个示例。\n\n### 清单 15-2. CLR 用户定义类型用法\n\n```sql\ndeclare\n @MicrosoftAddr\
  \ dbo.USPostalAddress = 'One Microsoft Way, Redmond, WA, 98052'\n,@GoogleAddr dbo.USPostalAddress\
  \ = '1600 Amphitheatre Pkwy, Mountain View, CA, 94043'\nselect\n @MicrosoftAddr\
  \ as [Raw Data]\n,@MicrosoftAddr.ToString() as [Text Data]\n,@MicrosoftAddr.Address\
  \ as [Address]\n,@MicrosoftAddr.CalculateShippingCost(@GoogleAddr) as [ShippingCost]\n\
  ```\n\n**图 15-1.** CLR 用户定义类型用法\n\n## 维护与注意事项\n\nCLR 用户定义类型使你能够轻松地使用以面向对象方式开发和使用的自定义类型来扩展\
  \ SQL Server 类型库。从开发角度来看，这听起来好得令人难以置信，但不幸的是，有几点注意事项你需要了解。\n\n正如我已经提到的，SQL Server\
  \ 不允许你在创建类型后对其进行修改。你可以使用 `ALTER ASSEMBLY` 命令重新部署新版本的程序集。这允许你更改方法的实现和/或修复实现中的任何错误，尽管你将无法更改现有方法的接口，除非删除并重新创建类型，否则也无法利用新的公共方法。这需要从数据库代码中删除所有类型引用。\n\
  \n所有这些意味着你必须执行以下一系列操作来重新部署类型：\n\n1.  从 T-SQL 代码中删除所有对该类型的引用。\n2.  将该类型列的所有数据保存到其他地方，可以通过将类型属性分解为关系格式或将其强制转换为\
  \ `varbinary` 来实现。对于后一种方法，你需要小心，并确保可以从旧对象的二进制数据反序列化新版本的类型对象。\n3.  删除所有该类型的列。\n4.\
  \  删除类型，重新部署程序集，然后再次创建类型。\n5.  重新创建列并用数据重新填充它们。\n6.  重建索引，回收旧列的空间并减少碎片。\n7.  重新创建引用该类型的\
  \ T-SQL 代码。\n\n如你所见，这带来了大量的维护开销，并可能导致系统长时间停机。\n\n##### 性能考量\n\n性能是另一个需要考虑的重要方面。SQL\
  \ Server 以二进制格式存储 CLR 类型。每次访问 CLR 类型的属性或方法时，SQL Server 都会反序列化对象并调用 CLR 方法，这会导致类似于你在第\
  \ 14 章看到的开销。\n\n让我们运行一些测试并创建两个包含地址信息的表：一个使用常规 T-SQL 数据类型，另一个使用 `dbo.USPostalAddress`\
  \ CLR 用户定义类型。你可以在清单 15-3 中看到实现此目的的代码。\n\n### 清单 15-3. UDT 性能：表创建\n\n```sql\ncreate\
  \ table dbo.Addresses\n(\n ID int not null identity(1,1),\n Address varchar(128)\
  \ not null,\n City varchar(64) not null,\n State char(2) not null,\n ZipCode varchar(10)\
  \ not null,\n constraint CHK_Address_State check\n ( State in ( 'AK','AL','AR','AZ','CA','CO','CT','DC','DE','FL','GA','HI','IA','ID'\n\
  \ ,'IL','IN','KS','KY','LA','MA','MD','ME','MI','MN','MO','MS','MT','NC','ND','NE','NH'\n\
  \ ,'NJ','NM','NV','NY','OH','OK','OR','PA','PR','RI','SC','SD','TN','TX','UT','VA'\n\
  \ ,'VT','WA','WI','WV','WY') ),\n constraint PK_Addresses primary key clustered(ID)\n\
  );\n\ncreate table dbo.AddressesCLR\n(\n ID int not null identity(1,1),\n Address\
  \ dbo.USPostalAddress not null,\n constraint PK_AddressesCLR primary key clustered(ID)\n\
  );\n\n;with Streets(Street)\nas\n(\n select v.v\n from (values('Street 1'),('Street\
  \ 2'),('Street 3'),('Street 4'),('Street 5')\n ,('Street 6'),('Street 7'),('Street\
  \ 8'),('Street 9'),('Street 10')) v(v)\n)\n,Cities(City)\nas\n(\n select v.v\n```\n\
  \n\n# 第 15 章 ■ CLR 类型\n\n```sql\nfrom (values('City 1'),('City 2'),('City 3'),('City\
  \ 4'),('City 5')\n,('City 6'),('City 7'),('City 8'),('City 9'),('City 10')) v(v)\n\
  )\n,ZipCodes(Zip)\nas\n(\nselect v.v\nfrom (values('99991'),('99992'),('99993'),('99994'),('99995')\n\
  ,('99996'),('99997'),('99998'),('99999'),('99990')) v(v)\n)\n,States(state)\nas\n\
  (\nselect v.v\nfrom (values('AL'),('AK'),('AZ'),('AR'),('CA'),('CO'),('CT'),('DE'),('FL'),('GA'),('HI')\n\
  ,('ID'),('IL'),('IN'),('IA'),('KS'),('KY'),('LA'),('ME'),('MD'),('MA'),('MI'),('MN')\n\
  ,('MS'),('MO'),('MT'),('NE'),('NV'),('NH'),('NJ'),('NM'),('NY'),('NC'),('ND'),('OH')\n\
  ,('OK'),('OR'),('PA'),('RI'),('SC'),('SD'),('TN'),('TX'),('UT'),('VT'),('VA'),('WA')\n\
  ,('WV'),('WI'),('WY'),('DC'),('PR')) v(v)\n)\ninsert into dbo.Addresses(Address,City,State,ZipCode)\n\
  select Street,City,State,Zip\nfrom Streets cross join Cities cross join States cross\
  \ join ZipCodes;\n\ninsert into dbo.AddressesCLR(Address)\nselect Address + ', '\
  \ + City + ', ' + State + ', ' + ZipCode from dbo.Addresses;\n```\n\n现在，让我们运行一个测试，看看针对这两个表的查询性能如何。我们将使用清单\
  \ 15-4 中所示的查询。\n\n![](img/index-335_1.jpg)\n\n![](img/index-335_2.jpg)\n\n## **清单\
  \ 15-4.** UDT 性能：查询数据\n\n```sql\nselect State, count(*)\nfrom dbo.Addresses\ngroup\
  \ by State\n\nselect Address.State, count(*)\nfrom dbo.AddressesCLR\ngroup by Address.State\n\
  ```\n\n如图 15-2 所示，第二个`SELECT`语句对每一行都引入了一个`CLR`方法调用，这显著影响了查询的性能。你可以在`计算标量`运算符属性中看到有关该调用的信息，如图\
  \ 15-3 所示。\n\n## **图 15-2.** UDT 性能：查询数据\n\n## **图 15-3.** UDT 性能：计算标量运算符属性\n\n\
  ![](img/index-336_1.jpg)\n\n![](img/index-336_2.jpg)\n\n部分性能问题可以通过持久化计算列来解决，如果需要，这些列甚至可以创建索引。让我们通过向`dbo.AddressesCLR`表添加一个`State`列并在两个表中创建索引来测试这一点。执行此操作的代码如清单\
  \ 15-5 所示。\n\n## **清单 15-5.** UDT 性能：添加持久化计算列\n\n```sql\nalter table dbo.AddressesCLR\
  \ add State as Address.State persisted;\n\n-- 重建索引以减少因表修改导致的索引碎片\nalter index PK_AddressesCLR\
  \ on dbo.AddressesCLR rebuild;\n\ncreate index IDX_AddressesCLR_State on dbo.AddressesCLR(State);\n\
  \ncreate index IDX_Addresses_State on dbo.Addresses(State);\n```\n\n现在，如果你再次运行清单\
  \ 15-4 中的查询，你将看到如图 15-4 所示的结果。在第二个执行计划中仍然存在一个`计算标量`运算符，尽管这次它与`CLR`方法调用无关，而是用作列引用占位符，如图\
  \ 15-5 所示。\n\n## **图 15-4.** UDT 性能：持久化计算列\n\n## **图 15-5.** UDT 性能：带有计算列的计算标量运算符\n\
  \n尽管持久化计算列有助于提高性能，但它们会增加行的大小。你将相同的信息存储了多次：一次作为`UDT`二进制值的一部分，另一次在聚集索引中，还可能存储在非聚集索引中。当`UDT`数据被频繁修改时，这些列还会引入维护计算列的额外开销。\n\
  \n考虑到可支持性和性能方面，在系统中引入`CLR`用户定义类型时应非常谨慎。该类型的公共方法应在初始部署前确定，并且代码必须经过仔细测试。这将有助于你避免需要重新部署该类型的情况。\n\
  \n此外，你需要通过创建并可能索引持久化计算列来最小化`CLR`调用的次数。\n\n\n#### 空间数据类型\n\n计算列，用于存储那些频繁被查询调用的用户定义类型（UDT）属性和方法的值。\n\
  \nSQL Server 支持两种数据类型来存储空间信息：`geometry` 和 `geography`。`geometry` 支持平面的、或欧几里得的、flat-earth\
  \ 数据。`geography` 支持椭球体的、round-earth 表面。这两种数据类型都可用于存储位置信息，例如 GPS 纬度和经度坐标。`geography`\
  \ 数据类型考虑了地球的曲率，因此精度略高，尽管它对数据有更严格的要求。例如，数据必须位于单一半球内，且多边形必须以特定的环方向定义。客户端应用程序需要知晓这些要求，并在代码中正确处理它们。\n\
  \n将位置信息存储在 `geometry` 数据类型中会带来其特有的问题。当你需要判断一个位置是否属于特定区域，或者区域之间是否相交时，它工作良好，并且通常比\
  \ `geography` 数据类型性能更好。但是，你无法计算点之间的距离：结果的单位是十进制度数，这在非平坦表面上是无用的。\n\n**注意** 空间数据类型方法的详细讲解超出了本书范围。如果你有兴趣了解更多，请访问此站点以获取更多详情：[`msdn.microsoft.com/en-us/library/bb933790.aspx`](http://msdn.microsoft.com/en-us/library/bb933790.aspx)\n\
  \n#### 性能注意事项\n\n尽管空间数据类型提供了一套丰富的方法来处理数据，但在使用它们时，你必须考虑性能方面的问题。空间数据类型是基于 `CLR` 的；然而，`SQL\
  \ Server 2012 SP3`、`SQL Server 2014 SP2` 和 `SQL Server 2016 RTM` 允许你为一些空间方法使用原生实现，这在某些场景下可以显著提升性能。你应该使用跟踪标志\
  \ `T6533` 和 `T6534` 来在 `SQL Server 2012 SP3` 和 `SQL Server 2014 SP2` 中启用原生实现。在 `SQL\
  \ Server 2016` 中，原生实现默认启用。\n\n## 性能比较\n\n让我们来比较计算两点之间距离的方法的性能。此类场景的一个典型用例是搜索特定位置附近的兴趣点（`POI`）。作为第一步，让我们创建三个存储\
  \ `POI` 信息的不同表。\n\n第一个表 `dbo.Locations` 使用 `decimal(9,6)` 数据类型存储坐标。另外两个表使用 `geography`\
  \ 数据类型。最后，表 `dbo.LocationsGeoIndexed` 的 `Location` 列使用一种称为 `空间索引` 的特殊索引类型进行了索引。这些索引有助于提升某些操作的性能，例如距离计算或检查对象是否相交的操作。代码如\
  \ **清单 15-6** 所示。\n\n### 清单 15-6. POI 查找：创建测试表\n\n```sql\ncreate table dbo.Locations\n\
  (\n    Id int not null identity(1,1),\n    Latitude decimal(9,6) not null,\n   \
  \ Longitude decimal(9,6) not null,\n    constraint PK_Locations primary key clustered(Id)\n\
  );\n\ncreate table dbo.LocationsGeo\n(\n    Id int not null identity(1,1),\n   \
  \ Location geography not null,\n    constraint PK_LocationsGeo primary key clustered(Id)\n\
  );\n\ncreate table dbo.LocationsGeoIndexed\n(\n    Id int not null identity(1,1),\n\
  \    Location geography not null,\n    constraint PK_LocationsGeoIndexed primary\
  \ key clustered(Id)\n);\n\n-- 241,402 行\n;with Latitudes(Lat)\nas\n(\n    select\
  \ convert(float,40.0)\n    union all\n    select convert(float,Lat + 0.01)\n   \
  \ from Latitudes\n    where Lat < 48\n)\n,Longitudes(Lon)\nas\n(\n    select convert(float,-120.0)\n\
  \    union all\n    select Lon - 0.01\n    from Longitudes\n    where Lon > -123\n\
  )\ninsert into dbo.Locations(Latitude, Longitude)\nselect Latitudes.Lat, Longitudes.Lon\n\
  from Latitudes cross join Longitudes\noption (maxrecursion 0);\n\ninsert into dbo.LocationsGeo(Location)\n\
  select geography::Point(Latitude, Longitude, 4326)\nfrom dbo.Locations;\n\ninsert\
  \ into dbo.LocationsGeoIndexed(Location)\nselect Location\n```\n\n\n# 第 15 章 CLR\
  \ 类型\n\n```sql\nfrom dbo.LocationsGeo;\n\ncreate spatial index Idx_LocationsGeoIndexed_Spatial\n\
  on dbo.LocationsGeoIndexed(Location);\n```\n\n■ `提示` 我们使用 `decimal(9,6)` 数据类型以关系格式存储位置信息，而非\
  \ `float`。`Decimal` 数据类型每对数值可节省六字节存储空间，并且其精度超过了商用级 GPS 接收器。\n\n代码清单 15-6 中各表的存储空间使用情况如表\
  \ 15-1 所示。\n\n### 表 15-1. 代码清单 15-6 中各表的存储空间使用情况\n\n| dbo.Locations | dbo.LocationsGeo\
  \ | dbo.LocationsGeoIndexed |\n|---------------|------------------|-------------------------|\n\
  | 5,488 KB      | 9,368 KB         | 13,936 KB               |\n\n如你所见，空间类型的二进制表示比关系格式占用更多空间。正如预期的那样，空间索引需要额外空间，不过其开销远不及你在[第\
  \ 12 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_12) “XML 与 JSON”中所看到的 XML 索引产生的开销。\n\
  \n让我们运行测试，测量计算西雅图市中心一英里内位置数量的查询性能。在 `dbo.Locations` 表中，我们将使用 [第 14 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_14)\
  \ 定义的 `dbo.CalcDistanceCLR` 函数。对于另外两个表，我们将调用空间方法 `STDistance`，分别在启用和不启用通过跟踪标志实现的本地化实现两种情况下进行。完成此操作的测试代码如代码清单\
  \ 15-7 所示。查询执行计划如图 15-6 所示。\n\n### 代码清单 15-7. POI 查找：测试查询\n\n```sql\n/* 在 SQL Server\
  \ 2012 SP3 和 SQL Server 2014 SP2 中，使用 T6533 和 T6534 启用本地化实现 */\n\ndeclare\n    @Lat\
  \ decimal(9,6) = 47.620309\n    ,@Lon decimal(9,6) = -122.349563\n\ndeclare\n  \
  \  @G geography = geography::Point(@Lat,@Lon,4326)\n\nselect ID\nfrom dbo.Locations\n\
  where dbo.CalcDistanceCLR(Latitude, Longitude, @Lat, @Lon) < 1609;\n\nselect ID\n\
  from dbo.LocationsGeo\nwhere Location.STDistance(@G) < 1609;\n\nselect ID\nfrom\
  \ dbo.LocationsGeoIndexed\nwhere Location.STDistance(@G) < 1609;\n```\n\n![](img/index-340_1.jpg)\n\
  \n### 图 15-6. POI 查找：执行计划\n\n第一和第二个查询执行*聚集索引扫描*，并为表中的每一行计算距离。最后一个查询使用空间索引来查找这些行。在我的环境中，查询的执行时间如表\
  \ 15-2 所示。\n\n### 表 15-2. POI 查找：执行时间\n\n|                  | dbo.Locations | dbo.LocationsGeo\
  \ | dbo.LocationsGeoIndexed |\n|------------------|---------------|------------------|-------------------------|\n\
  | SQL Server 2014 SP1 | 245 ms        | 9,477 ms         | 42 ms               \
  \    |\n| SQL Server 2014 SP2 （未启用 `T6533` 和 `T6534`） | 245 ms | 9,652 ms | 15 ms\
  \ |\n| SQL Server 2014 SP2 （启用 `T6533` 和 `T6534`） | 245 ms | 224 ms | 15 ms |\n\
  | SQL Server 2016 | 241 ms        | 222 ms           | 12 ms                   |\n\
  \n如你所见，空间索引极大地提升了查询性能。还值得一提的是，在没有索引且未启用本地化实现的情况下，`CalcDistanceCLR` 方法的性能明显优于 `STDistance`\
  \ 方法。\n\n尽管空间索引能极大提升性能，但它也有其局限性。它在整表范围内工作，并且所有其他谓词都在空间索引操作之后进行评估。这在某些情况下可能导致次优计划。\n\
  \n举个例子，让我们看一个按客户存储 POI 信息的用例，如代码清单 15-8 所示。值得注意的是，此代码执行将花费大量时间，并会产生大量事务日志记录。\n\n\
  ### 代码清单 15-8. 基于客户的 POI 查找：表创建\n\n```sql\ncreate table dbo.LocationsGeo2\n(\n \
  \   CompanyId int not null,\n    Id int not null identity(1,1),\n    Location geography\
  \ not null,\n    constraint PK_LocationsGeo2\n    primary key clustered(CompanyId,Id)\n\
  );\n\n-- 12,070,100 行; 50 家公司; 每家公司 241,402 行\n;with Companies(CID)\nas\n(\n   \
  \ select 1\n    union all\n```\n\n# 第 15 章 ■ CLR 类型\n\n## 基于客户的 POI 查询\n\n执行以下查询：\n\
  \n```sql\nselect CID + 1 from Companies where CID < 50\n\n)\n\ninsert into dbo.LocationsGeo2(CompanyId,Location)\n\
  \nselect c.CID, l.Location\n\nfrom dbo.LocationsGeo l cross join Companies c;\n\n\
  create spatial index Idx_LocationsGeo2_Spatial\n\non dbo.LocationsGeo2(Location);\n\
  ```\n\n在这种情况下，当我们对特定公司执行 POI（兴趣点）查询时，`CompanyId`列必须作为查询的谓词。SQL Server 有两种处理方式。第一种是基于`CompanyId`值的`clustered\
  \ index seek`（聚集索引查找），并为该公司的每个 POI 调用`STDistance`方法。第二种是使用空间索引，查找指定距离内的所有 POI，无论其所属公司，最后再与聚集索引数据进行连接。\n\
  \n让我们运行清单 15-9 中显示的查询。\n\n**清单 15-9.** 基于客户的 POI 查找：测试查询\n\n```sql\ndeclare\n@Lat\
  \ decimal(9,6) = 47.620309\n,@Lon decimal(9,6) = -122.349563\n,@CompanyId int =\
  \ 15\n\ndeclare\n@g geography = geography::Point(@Lat,@Lon,4326)\n\nselect count(*)\n\
  from dbo.LocationsGeo2 with (index= PK_LocationsGeo2)\nwhere Location.STDistance(@g)\
  \ < 1609 and CompanyId = @CompanyId;\n\nselect count(*)\nfrom dbo.LocationsGeo2\
  \ with (index=Idx_LocationsGeo2_Spatial)\nwhere Location.STDistance(@g) < 1609 and\
  \ CompanyId = @CompanyId;\n```\n\n![](img/index-342_1.jpg)\n\n![](img/index-342_2.jpg)\n\
  \n![](img/index-342_3.jpg)\n\n当表为大量公司存储大量数据时，这两种方法效率都不高。第一个查询使用聚集索引查找的执行计划显示，它执行了\
  \ 241,402 次`STDistance`调用，即每个公司 POI 调用一次。执行计划如图 15-7 所示。\n\n**图 15-7.** 基于客户的 POI\
  \ 查找：第一个查询的执行计划\n\n第二个查询的执行计划（如图 15-8 所示）表明，空间索引查找返回了 550 行；即该区域内的所有 POI，无论其所属公司。然后，SQL\
  \ Server 必须在评估`CompanyId`谓词之前，将这些行与聚集索引进行连接。\n\n**图 15-8.** 基于客户的 POI 查找：第二个查询的执行计划\n\
  \n解决此类问题的方法之一称为`bounding box`（边界框）方法。该方法通过过滤掉兴趣区域外的 POI，来最小化计算次数。\n\n如图 15-9 所示，我们需要选择的点都位于以位置为中心点、以距离为半径的圆内。我们唯一需要评估的点位于包围该圆的方框内。\n\
  \n**图 15-9.** 基于客户的 POI 查找：边界框\n\n我们可以计算方框角点的坐标，将其持久化在表中，并使用常规的非聚集索引来预过滤数据。这使我们能够将需要执行的昂贵距离计算次数降至最少。\n\
  \n边界框角点坐标的计算可以通过 CLR 表值函数完成，如清单 15-10 所示。清单 15-11 展示了修改表并创建非聚集索引的 T-SQL 代码。\n\n\
  **清单 15-10.** 基于客户的 POI 查找：计算边界框坐标\n\n```csharp\nprivate struct BoundingBox\n{\n\
  \    public double minLat;\n    public double maxLat;\n    public double minLon;\n\
  \    public double maxLon;\n}\n\nprivate static void CircleBoundingBox_FillValues(\n\
  \    object obj, out SqlDouble MinLat, out SqlDouble MaxLat,\n    out SqlDouble\
  \ MinLon, out SqlDouble MaxLon)\n{\n    BoundingBox box = (BoundingBox)obj;\n  \
  \  MinLat = new SqlDouble(box.minLat);\n    MaxLat = new SqlDouble(box.maxLat);\n\
  \    MinLon = new SqlDouble(box.minLon);\n    MaxLon = new SqlDouble(box.maxLon);\n\
  }\n\n[Microsoft.SqlServer.Server.SqlFunction(\n    DataAccess = DataAccessKind.None,\
  \ IsDeterministic = true, IsPrecise = false,\n    SystemDataAccess = SystemDataAccessKind.None,\n\
  ```\n\n\n```\nFillRowMethodName = `CircleBoundingBox_FillValues`,\n\nTableDefinition\
  \ = `MinLat float, MaxLat float, MinLon float, MaxLon float`\n```\n\n```csharp\n\
  public static IEnumerable CalcCircleBoundingBox(SqlDouble lat, SqlDouble lon, SqlInt32\
  \ distance)\n{\n    if (lat.IsNull || lon.IsNull || distance.IsNull) return null;\n\
  \n    BoundingBox[] box = new BoundingBox[1];\n\n    double latR = Math.PI / 180\
  \ * lat.Value;\n    double lonR = Math.PI / 180 * lon.Value;\n\n    double rad45\
  \ = 0.785398163397448300; // RADIANS(45.)\n    double rad135 = 2.356194490192344800;\
  \ // RADIANS(135.)\n    double rad225 = 3.926990816987241400; // RADIANS(225.)\n\
  \    double rad315 = 5.497787143782137900; // RADIANS(315.)\n\n    double distR\
  \ = distance.Value * 1.4142135623731 * Math.PI / 20001600.0;\n\n    double latR45\
  \ = Math.Asin(Math.Sin(latR) * Math.Cos(distR) + Math.Cos(latR) *\n    Math.Sin(distR)\
  \ * Math.Cos(rad45));\n\n    double latR135 = Math.Asin(Math.Sin(latR) * Math.Cos(distR)\
  \ + Math.Cos(latR) *\n    Math.Sin(distR) * Math.Cos(rad135));\n\n    double latR225\
  \ = Math.Asin(Math.Sin(latR) * Math.Cos(distR) + Math.Cos(latR) *\n    Math.Sin(distR)\
  \ * Math.Cos(rad225));\n\n    double latR315 = Math.Asin(Math.Sin(latR) * Math.Cos(distR)\
  \ + Math.Cos(latR) *\n    Math.Sin(distR) * Math.Cos(rad315));\n\n    double dLonR45\
  \ = Math.Atan2(Math.Sin(rad45) * Math.Sin(distR) * Math.Cos(latR),\n    Math.Cos(distR)\
  \ - Math.Sin(latR) * Math.Sin(latR45));\n\n    double dLonR135 = Math.Atan2(Math.Sin(rad135)\
  \ * Math.Sin(distR) * Math.Cos(latR),\n    Math.Cos(distR) - Math.Sin(latR) * Math.Sin(latR135));\n\
  \n    double dLonR225 = Math.Atan2(Math.Sin(rad225) * Math.Sin(distR) * Math.Cos(latR),\n\
  \    Math.Cos(distR) - Math.Sin(latR) * Math.Sin(latR225));\n\n    double dLonR315\
  \ = Math.Atan2(Math.Sin(rad315) * Math.Sin(distR) * Math.Cos(latR),\n    Math.Cos(distR)\
  \ - Math.Sin(latR) * Math.Sin(latR315));\n\n    double lat45 = latR45 * 180.0 /\
  \ Math.PI;\n    double lat225 = latR225 * 180.0 / Math.PI;\n\n    double lon45 =\
  \ (((lonR - dLonR45 + Math.PI) % (2 * Math.PI)) - Math.PI) * 180.0 / Math.PI;\n\
  \    double lon135 = (((lonR - dLonR135 + Math.PI) % (2 * Math.PI)) - Math.PI) *\
  \ 180.0 / Math.PI;\n    double lon225 = (((lonR - dLonR225 + Math.PI) % (2 * Math.PI))\
  \ - Math.PI) * 180.0 / Math.PI;\n    double lon315 = (((lonR - dLonR315 + Math.PI)\
  \ % (2 * Math.PI)) - Math.PI) * 180.0 / Math.PI;\n\n    box[0].minLat = Math.Min(lat45,\
  \ lat225);\n    box[0].maxLat = Math.Max(lat45, lat225);\n    box[0].minLon = Math.Min(Math.Min(lon45,\
  \ lon135), Math.Min(lon225,lon315));\n    box[0].maxLon = Math.Max(Math.Max(lon45,\
  \ lon135), Math.Max(lon225, lon315));\n\n    return box;\n}\n```\n\n清单 15-11. 基于客户的\
  \ POI 查找：修改表\n\n```sql\nalter table dbo.LocationsGeo2 add MinLat decimal(9,6);\n\
  alter table dbo.LocationsGeo2 add MaxLat decimal(9,6);\nalter table dbo.LocationsGeo2\
  \ add MinLon decimal(9,6);\nalter table dbo.LocationsGeo2 add MaxLon decimal(9,6);\n\
  \nupdate t\nset\nt.MinLat = b.MinLat\n,t.MinLon = b.MinLon\n,t.MaxLat = b.MaxLat\n\
  ,t.MaxLon = b.MaxLon\nfrom\ndbo.LocationsGeo2 t cross apply\ndbo.CalcCircleBoundingBox(t.Location.Lat,t.Location.Long,1609)\
  \ b;\n\ncreate index IDX_LocationsGeo2_BoundingBox\non dbo.LocationsGeo2(CompanyId,\
  \ MinLon, MaxLon)\ninclude (MinLat, MaxLat);\n```\n\n现在，你可以修改查询以利用边界框。该查询展示在清单 15-12\
  \ . 中。对应的执行计划显示在图 15-10 中。](#index_split_000.html#345)\n\n![](img/index-345_1.jpg)\n\
  \n清单 15-12. 基于客户的 POI 查找：利用边界框的查询\n\n```sql\ndeclare\n@Lat decimal(9,6) = 47.620309\n\
  ,@Lon decimal(9,6) = -122.349563\n,@CompanyId int = 15\n\ndeclare\n@g geography\
  \ = geography::Point(@Lat,@Lon,4326)\n\nselect count(*)\nfrom dbo.LocationsGeo2\n\
  where\nLocation.STDistance(@g) < 1609 and\nCompanyId = @CompanyId and\n@Lat between\
  \ MinLat and MaxLat and\n@Lon between MinLon and MaxLon;\n```\n\n图 15-10. 基于客户的\
  \ POI 查找：执行计划（边界框方法）\n\n如你所见，最后一个查询仅计算了 15 次距离。相比原始查询中的 241,402 次计算，这是一个显著的改进。在我环境中的执行时间如表\
  \ 15-3](#index_split_000.html#345) 所示。\n\n\n\n# 第 15 章：CLR 类型\n\n## 表格 15-3. 基于客户的\
  \ POI 查找：执行时间\n\n| 聚集索引查找 | 空间索引 | 边界框 |\n| :--- | :--- | :--- |\n| **SQL Server\
  \ 2014 SP1** | 9,923 ms | 55 ms | 13 ms |\n| **SQL Server 2014 SP2**<br>（不含 T6533\
  \ 和 T6534） | 10,337 ms | 19 ms | 10 ms |\n| **SQL Server 2014 SP2**<br>（含 T6533\
  \ 和 T6534） | 231 ms | 18 ms | 10 ms |\n| **SQL Server 2016** | 222 ms | 16 ms |\
  \ 5 ms |\n\n正如你所看到的，即使启用了原生实现，边界框的性能也优于聚集索引查找和空间索引查找。显然，只有当边界框减少计算量的程度足以抵消 `nonclustered\
  \ index seek` 和 `key lookup` 操作的开销时，才会出现这种情况。同样值得注意的是，这种方法不需要空间索引。\n\n![](img/index-346_1.jpg)\n\
  \n你也可以将边界框用于其他用例；例如，当你检查一个位置是否属于由多边形定义的区域时。边界框的角坐标应存储多边形角点的最小和最大纬度及经度坐标。与距离计算类似，在执行昂贵的空间方法调用（该调用用于验证点是否在多边形区域内）之前，你会先过滤掉框外的位置。\n\
  \n#### HierarchyId\n\n`HierarchyId` 数据类型帮助你处理层次数据结构。它针对表示树（最常见的层次数据类型）进行了优化。\n\n\
  > **注意** 对 `HierarchyId` 数据类型方法的详细讲解超出了本书的范围。你可以访问 [`technet.microsoft.com/en-us/library/bb677173.aspx`](http://technet.microsoft.com/en-us/library/bb677173.aspx)\
  \ 了解更多关于 `HierarchyId` 数据类型的信息。\n\n有几种技术可以让我们在数据库中存储层次信息。让我们看看最常见的几种，如下所示：\n\n###\
  \ 邻接表\n\n这可能是最常用的技术。它在每个子节点中保留对父节点的引用。这种结构如图 15-11 和代码清单 15-13 所示。\n\n**图 15-11.\
  \ 邻接表**\n\n**代码清单 15-13.** 邻接表 DDL\n\n```sql\ncreate table dbo.OrgChart\n(\n   \
  \ ID int not null,\n    Name nvarchar(64) not null,\n    Title nvarchar(64) not\
  \ null,\n    ParentID int null,\n    constraint PK_OrgChart primary key clustered(ID),\n\
  \    constraint FK_OrgChart_OrgChart\n        foreign key(ParentId)\n        references\
  \ dbo.OrgChart(ID)\n);\n```\n\n### 闭包表\n\n这与邻接表类似；然而，父子关系是单独存储的。图 15-12 和代码清单 15-14\
  \ 展示了一个闭包表的例子。\n\n**图 15-12. 闭包表**\n\n**代码清单 15-14.** 闭包表 DDL\n\n```sql\ncreate\
  \ table dbo.OrgChart\n(\n    ID int not null,\n    Name nvarchar(64) not null,\n\
  \    Title nvarchar(64) not null,\n    constraint PK_OrgChart primary key clustered(ID),\n\
  );\n\ncreate table dbo.OrgTree\n(\n    ParentId int not null,\n    ChildId int not\
  \ null,\n    constraint PK_OrgTree primary key clustered(ParentId, ChildId),\n \
  \   constraint FK_OrgTree_OrgChart_Parent\n        foreign key(ParentId)\n     \
  \   references dbo.OrgChart(ID),\n    constraint FK_OrgTree_OrgChart_Child\n   \
  \     foreign key(ChildId)\n        references dbo.OrgChart(ID)\n);\n```\n\n###\
  \ 嵌套集\n\n在嵌套集中，每个节点包含两个值，称为 `left` 和 `right bower`。子节点的 `bower` 值位于父节点 `bower` 值的区间内。因此，当你需要找到父节点的所有子节点时，你可以选择所有\
  \ `bower` 值在父节点值之间的节点。图 15-13 和代码清单 15-15 展示了一个嵌套集的例子。\n\n**图 15-13. 嵌套集**\n\n**代码清单\
  \ 15-15.** 嵌套集 DDL\n\n```sql\ncreate table dbo.OrgChart\n(\n    ID int not null,\n\
  \    Name nvarchar(64) not null,\n    Title nvarchar(64) not null,\n    LeftBower\
  \ float not null,\n    RightBower float not null,\n    constraint PK_OrgChart primary\
  \ key clustered(ID),\n);\n```\n\n### 物化路径\n\n这种方法通过在每个节点中拼接层次路径来持久化层次路径...\n\n\n\
  \n# 第 15 章 ■ CLR 类型\n\n……关于父节点的信息一直上溯到层级的根节点。因此，你可以通过基于父路径的前缀查找来找到所有子节点。一些实现在路径中存储节点的实际键值，而另一些则存储节点在层级中的相对位置。图\
  \ 15-14 展示了后一种方法的例子。代码清单 15-16 展示了这种方法的一种可能实现。\n\n![](img/index-349_1.jpg)\n\n**图\
  \ 15-14.** 具体化（层级）路径\n\n**代码清单 15-16.** 具体化路径 DDL\n\n```sql\ncreate table dbo.OrgChart\n\
  (\n    ID int not null,\n    Name nvarchar(64) not null,\n    Title nvarchar(64)\
  \ not null,\n    Path varchar(256) not null,\n    constraint PK_OrgChart primary\
  \ key clustered(ID),\n);\n```\n\n每种层级结构方法都有其优缺点。邻接表和闭包表易于维护；在层级中添加或移除新成员，以及子树的移动，只影响单个或极少数节点。然而，查询这些结构通常需要递归或命令式代码。\n\
  \n相比之下，嵌套集和具体化路径非常易于查询，尽管层级维护的开销很大。例如，如果你将一个子树移动到另一个父节点下，你必须更新该子树中每个子节点对应的 `bower`\
  \ 或 `path` 值。\n\n`HierarchyId` 类型采用了具体化路径技术，以类似于图 15-14 所示示例的方式持久化相对路径信息。路径信息以二进制格式存储。实际的存储空间各不相同，取决于几个因素。首先，层级中的每一级都会在路径中添加一个额外的节点并增加其大小。\n\
  \n另一个重要因素是如何生成新的 `HierarchyId` 值。如前所述，`HierarchyId` 存储的是节点的相对位置，而不是它们的绝对键值。因此，如果你需要在父节点最右侧的节点处添加一个新的子节点，你可以递增前一个最右侧节点的值。但是，如果你需要在两个现有节点之间插入节点，就需要在路径中持久化额外的信息。图\
  \ 15-15 展示了这方面的示例。\n\n![](img/index-350_1.jpg)\n\n## 第 15 章 ■ CLR 类型\n\n**图 15-15.**\
  \ 插入数据\n\n让我们通过创建代码清单 15-17 所示的表来测试 `HierarchyId` 的生成如何影响路径大小。\n\n**代码清单 15-17.**\
  \ `HierarchyId`：测试表\n\n```sql\ncreate table dbo.HierarchyTest\n(\n    ID hierarchyid\
  \ not null,\n    Level tinyint not null\n)\n```\n\n代码清单 15-18 和 15-19 中所示的代码创建了一个八层级的层级结构，每个节点有八个子节点。我们将比较当子节点作为最右侧节点插入（代码清单\
  \ 15-18）和当子节点在现有节点之间插入（代码清单 15-19）时，`HierarchyId` 数据的平均数据大小。\n\n**代码清单 15-18.**\
  \ `HierarchyId`：将子节点作为最右侧节点添加\n\n```sql\ndeclare\n    @MaxLevels int = 8\n    ,@ItemPerLevel\
  \ int = 8\n    ,@Level int = 2\n\ninsert into dbo.HierarchyTest(ID, Level) values(hierarchyid::GetRoot(),\
  \ 1);\n\nwhile @Level <= @MaxLevels\nbegin\n    ;with CTE(ID, Child, Num)\n    as\n\
  \    (\n        select ID, ID.GetDescendant(null,null), 1\n        from dbo.HierarchyTest\n\
  \        where Level = @Level - 1\n        union all\n        select ID, ID.GetDescendant(Child,null),\
  \ Num + 1\n        from CTE\n        where Num < @ItemPerLevel\n    )\n    insert\
  \ into dbo.HierarchyTest(ID, Level)\n    select Child, @Level from CTE\n    option\
  \ (maxrecursion 0);\n\n    set @Level += 1;\nend;\n\nselect avg(datalength(ID))\
  \ from dbo.HierarchyTest;\n```\n\n结果：\n\n**代码清单 15-19.** `HierarchyId`：在现有节点之间添加子节点\n\
  \n```sql\ntruncate table dbo.HierarchyTest\ngo\n\ndeclare\n    @MaxLevels int =\
  \ 8\n    ,@ItemPerLevel int = 8\n    ,@Level int = 2\n\ninsert into dbo.HierarchyTest(ID,\
  \ Level) values(hierarchyid::GetRoot(), 1);\n\nwhile @Level <= @MaxLevels\nbegin\n\
  ```\n\n\n## 第 15 章 ■ CLR 类型\n\n```sql\n;with CTE(ID, Child, PrevChild, Num)\n\n\
  as\n\n(\n\nselect ID, ID.GetDescendant(null,null), convert(hierarchyid,null), 1\n\
  \nfrom dbo.HierarchyTest\n\nwhere Level = @Level - 1\n\nunion all\n\nselect ID,\n\
  \ncase\n\nwhen PrevChild < Child\n\nthen ID.GetDescendant(PrevChild, Child)\n\n\
  else ID.GetDescendant(Child, PrevChild)\n\nend, Child, Num + 1\n\nfrom CTE\n\nwhere\
  \ Num < @ItemPerLevel\n\n)\n\ninsert into dbo.HierarchyTest(ID, Level)\n\nselect\
  \ Child, @Level from CTE\n\noption (maxrecursion 0);\n\nset @Level += 1;\n\nend;\n\
  \nselect avg(datalength(ID)) from dbo.HierarchyTest;\n```\n\n如你所见，在层次结构中的现有节点之间添加子节点，使得存储路径的大小增加了一倍多。\n\
  \n■ **注意**\n\n`HierarchyId` 数据类型在每一行的变长偏移数组中额外存储了两个字节的开销。\n\n你需要记住的关键点是，`HierarchyId`\
  \ 数据类型持久化了一个层次结构路径，并提供了一组在处理层次结构数据时很有用的方法。它并不强制保证表中存储的层次结构的正确性，也不保证值的唯一性。你有责任在代码中强制实现这一点。\n\
  \n层次结构数据的维护开销很大。更改带有子节点的节点路径，需要更新每一个子节点中的路径。这会导致表中多行数据被更新。此外，`HierarchyId` 列通常会被索引，这会引起物理数据移动和额外的索引碎片，尤其是当\
  \ `HierarchyId` 列是聚簇索引的一部分时。在为包含 `HierarchyId` 列的表设计索引维护策略时，尤其是在数据易变的情况下，你需要牢记这一点。\n\
  \n#### 总结\n\n用户定义的 CLR 数据类型允许我们扩展标准的 SQL Server 类型库。不幸的是，这种灵活性是有代价的。CLR 数据类型在数据库中以二进制格式存储，访问对象属性和方法会导致反序列化和\
  \ CLR 方法调用。当这些调用针对大量行执行时，可能会引发严重的性能问题。\n\n你可以通过添加持久化计算列来减少 CLR 调用的数量，这些列存储了经常访问的属性和方法的结果。同时，这会增加行的大小，并在数据修改时引入开销。\n\
  \n另一个重要方面是可维护性。SQL Server 不支持 `ALTER TYPE` 操作。在删除并重新创建类型之前，无法更改现有方法的接口或使用类型的新方法。\n\
  \n`Geometry` 和 `geography` 类型帮助我们处理空间数据。它们提供了一套丰富的方法用于操作数据，尽管这些方法通常开销较大，并且在针对大量行调用时可能导致性能不佳。SQL\
  \ Server 2012 SP3、SQL Server 2014 SP2 和 SQL Server 2016 允许你对某些方法使用本机实现，这可以显著提高空间调用的性能。它在\
  \ SQL Server 2016 中默认启用。在 SQL Server 2012 SP3 和 SQL Server 2014 SP2 中，你可以使用跟踪标志\
  \ `T6533` 和 `T6534` 来启用它。\n\n空间索引可以解决一些性能问题，尽管它们在整个表的范围内工作。所有进一步的谓词求值都在后续的执行阶段完成。这导致在对数据子集执行空间操作时性能不佳。你可以使用边界框方法来解决此问题，在调用空间方法之前过滤掉不需要的行。\n\
  \n`HierarchyId` 类型为层次结构数据提供了内置支持。尽管其查询性能优异，但层次结构维护的开销很大。层次结构中的每次更改都需要更新每一个子节点中的层次结构路径。当数据易变时，你必须考虑这种开销。\n\
  \n`HierarchyId` 类型并不强制保证层次结构的正确性。这必须在代码中完成。你还应避免在现有节点之间插入新节点，因为这会增加存储路径的大小。\n\n\n\
  最终，对系统定义和用户定义的 CLR 类型的支持在不同开发平台上并不一致。在决定使用它们之前，您需要确保客户端应用程序能够利用这些类型。或者，在可能且可行的情况下，您可以借助\
  \ T-SQL 存储过程，将这些类型隐藏在数据访问层之后。\n\n# 第 16 章\n\n## 数据分区\n\n关系数据库中存储的数据量每年都在呈指数级增长。客户正在收集更多的数据，并且处理和保留这些数据的时间也更长。作为数据库专业人员，我们面对的数据库随着时间的推移变得越来越大。\n\
  \n从开发的角度来看，数据库大小并不是那么关键。未优化的查询无论数据库大小如何都会超时。然而，从数据库管理的角度来看，管理大型数据库会带来额外的挑战。数据分区有助于解决其中一些挑战。\n\
  \n在本章中，我们将讨论我们想要对数据进行分区的原因，并介绍 SQL Server 中可用的不同数据分区技术。我们将重点讨论 SQL Server 中的实际实现场景和典型的数据分区用例。\n\
  \n#### 数据分区的原因\n\n假设我们的系统将数据存储在一个大的未分区表中。这种方法极大地简化了开发。所有数据都在同一个地方，您可以从同一个表读取数据并向其写入数据。然而，采用这种设计，所有数据都存储在同一位置。该表驻留在单个文件组中，该文件组由一个或多个存储在同一磁盘阵列上的文件组成。尽管从技术上讲，您可以将索引分布在不同文件组上，或者将数据文件分布在不同磁盘阵列上，但这会带来额外的数据库管理挑战，降低了灾难情况下的数据可恢复性，并且很少对性能有所帮助。\n\
  \n同时，在几乎每个系统中，存储在大表中的数据可以分为两个不同的类别：*操作型* 数据和 *历史型* 数据。第一个类别包含公司当前运营期间的数据，处理了表中大部分的客户请求。另一方面，历史数据属于较早的运营期间，系统出于各种原因（例如法规和业务要求等）必须保留这些数据。\n\
  \n表中的大部分活动是针对操作型数据执行的，即使它相对于表的总大小可能非常小。显然，将操作型数据存储在快速且昂贵的磁盘阵列上是有益的。另一方面，历史型数据不需要这样的\
  \ I/O 性能。\n\n当数据未分区时，您无法将其分隔在不同的磁盘阵列之间。您要么需要为您不需要的快速存储支付额外费用，要么妥协并购买更大但更慢的存储。\n\n\
  操作型数据和历史型数据通常具有不同的工作负载。操作型数据通常支持面向客户系统部分的 OLTP 事务。历史数据主要用于分析和报告。这两种工作负载产生不同的查询集合，这些查询将受益于不同的索引集合，有时甚至受益于不同的存储格式。例如，操作型数据可以从内存\
  \ OLTP 中受益，而历史数据则可以利用列存储索引。\n\n© Dmitri Korotkevitch 2016\n\nD. Korotkevitch, *Pro\
  \ SQL Server Internals*, DOI 10.1007/978-1-4842-1964-5_16\n\n第 16 章 ■ 数据分区\n\n不幸的是，对表中数据的一个子集进行索引几乎是不可能的。尽管您可以使用筛选索引和/或索引视图，但这两种方法都有几个限制。在大多数情况下，您必须在表范围内创建一组覆盖两种工作负载的索引。这需要额外的存储空间。\n\
  \n\n\n## 第 16 章 ■ 数据分区\n\n并为系统中的操作活动引入了更新开销。此外，易变的`操作型数据`与静态的`历史数据`相比，需要进行不同且更频繁的索引维护，而在未分区的情况下，这是无法实现的。\n\
  \n### 注意\n`SQL Server 2016`允许你创建过滤索引，这有助于加速针对历史数据的分析和报表查询。我们将在本书的第七部分详细讨论它们。\n\n\
  数据压缩是另一个需要考虑的重要因素。静态历史数据通常能从页面压缩中受益，这可以显著减少所需的存储空间。此外，在非 CPU 受限的系统中，通过减少读取数据所需的\
  \ I/O 操作次数，它还可以提升针对历史数据的查询性能。与此同时，当数据易变时，页面压缩会引入不必要的 CPU 开销。\n\n### 提示\n在某些情况下，即使数据是易变的操作型数据，如果页面压缩能节省大量空间且系统工作在高\
  \ I/O 负载下，使用它也是有益的。和往常一样，你应该测试并监控它对系统的影响。\n\n遗憾的是，无法只压缩表中的部分数据。你必须选择压缩整个表（这会为操作型数据引入\
  \ CPU 开销），或者让历史数据保持未压缩状态，从而付出额外的存储和 I/O 成本。\n\n在历史数据为只读的情况下，将其排除在完整数据库备份之外可能是有益的。这将减小备份文件的大小，减少备份操作期间的\
  \ I/O 和网络负载。遗憾的是，部分数据库备份是在文件组级别工作的，当数据未分区时，这是无法实现的。\n\n`SQL Server`的企业版支持分段还原，允许你以文件组为基础逐个还原数据库并使其上线。拥有一个灾难恢复策略是极好的，该策略允许你单独还原操作型数据并使其对客户可用，而无需等待历史数据还原。这可以显著减少大型数据库的灾难恢复时间。\n\
  \n遗憾的是，这样的设计要求将操作型数据和历史数据分离到不同的文件组中，而当数据未分区时，这是无法实现的。\n\n### 注意\n我们将在[第 31 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_31)“设计备份策略”中更详细地讨论备份和灾难恢复策略。\n\
  \n另一个重要因素是统计信息。如你所知，无论表大小如何，统计信息直方图最多存储 200 个步骤。因此，大表上的直方图步骤必须覆盖更大的键值区间。这使得统计信息和基数估计的准确性降低，并可能导致大表产生非最优的执行计划。此外，除非你使用的是`SQL\
  \ Server 2016`中兼容级别为`130`的数据库，或者启用了跟踪标志`T2371`，否则`SQL Server`不会使统计信息过时，除非你修改了表中约\
  \ 20%总行数所涉及的统计列。\n\n这个列表绝不是完整的，关于为什么数据分区有益，还有其他因素，尽管上述任何一个理由都足以让我们开始考虑它。\n\n## 何时进行分区？\n\
  \n数据库专业人员通常认为只有非常大的数据库才需要数据分区。尽管数据库大小绝对是一个因素，但它几乎不是唯一需要考虑的因素。\n\n*服务级别协议*是决定是否分区的关键因素之一。当系统有一个基于可用性的\
  \ SLA 条款时，数据分区就变得至关重要。可能的停机时间取决于灾难发生后你能多快地从备份中恢复数据库并使其上线。这段时间取决于为使系统上线而必须恢复在线的核心文件组的总大小。\n\
  \n\n\n# 数据分区\n\n数据分区是唯一能够在不同文件组之间分离数据，并使用分段还原以最小化停机时间的方法。\n\n基于性能的 SLA 条款是另一个重要因素。数据分区可以帮助解决性能调优中的一些挑战。例如，通过在多个表之间分区数据，你将提高统计信息的准确性，并且可以为历史数据和操作数据使用不同的索引策略。此外，数据分区允许你实现**分层存储**方法，并将数据的操作部分放在更快的磁盘上，从而提高系统性能。我们将在本章后面更详细地讨论分层存储。\n\
  \n需要记住的关键点是，你不应仅以数据库大小作为分区的唯一标准。将数据分区仅仅视为帮助你应对某些挑战的工具。无论数据库大小如何，这个工具都可能是有用的。\n\n\
  然而，数据分区是有成本的。它会改变查询的执行计划，并且通常需要重构代码。你需要记住这一点，特别是在新开发的情况下。当你预计系统在未来会收集大量数据时，通常最好在开发的早期阶段就实现数据分区。尽管数据分区会带来开发开销，但这种开销可能远小于对包含大量数据的生产系统进行代码重构和重新测试所涉及的开销。\n\
  \n最后，在保持数据库在线并可供用户访问的同时对数据进行分区通常非常困难，甚至不可能。移动大量数据可能非常耗时，并导致长时间的停机。这是在开发初始阶段实施数据分区的另一个理由。\n\
  \n#### 数据分区技术\n\n在 SQL Server 中有两种可用的数据分区技术：**分区表**和**分区视图**。我们将在本节详细讨论它们。\n\n在数据分区的背景下，不可能不提及\
  \ SQL Server 2016 的`Stretch Database`。尽管它们允许我们应对一些 VLDB 管理挑战并减少存储成本和灾难恢复时间，但我认为它们是一种与**经典**数据分区不同的技术。`Stretch\
  \ Database`允许你通过将部分数据移动到云中来*透明地*构建分布式数据库系统，而不是在一个中心位置对数据进行分区。正如我们在第 5 章已经讨论过的，这种方法有一系列的优点和缺点，在选择系统中使用的技术时，你需要对其进行分析。\n\
  \n> **注意** 在本章中，我们将使用一个存储了两年半订单信息的订单录入系统作为示例。假设我们希望按月对数据进行分区，并且我们的操作周期包括两个月：2016\
  \ 年 5 月和 6 月。\n\n##### 分区表\n\n表分区是企业版在 SQL Server 2005 中引入的一项功能。你可以将分区表视为由多个独立的内部物理表（即分区）组成的逻辑表。虽然这个术语——**逻辑**表和**物理**表——并非标准，但它完美地描述了这一点。\n\
  \nSQL Server 中的每个表都是分区的。当一个表未被用户分区时，SQL Server 在内部将其视为单个分区表。\n\nSQL Server 为每个分区单独跟踪分配单元，例如`IN-ROW`、`ROW-OVERFLOW`和`LOB`数据。例如，一个有\
  \ 10 个分区的表，每个数据文件会有 30 条不同的 IAM 链——每个分区每个分配单元一条。\n\n还有两个额外的数据库对象与表分区一起使用。一个*分区函数*和一个*分区方案*。\n\
  \n\n`function` 用于指定边界值，这是数据如何进行分区的标准。`partition scheme` 指定存储物理分区表的文件组。\n\n清单 16-1\
  \ 展示了创建分区表 `dbo.OrdersPT` 的代码，该表按月对数据进行分区。此代码假设数据库有四个不同的文件组：`FG2014` 和 `FG2015`\
  \ 分别存储 2014 年和 2015 年的数据。`FG2016` 存储 2016 年前四个月的数据。最后，`FASTSTORAGE` 文件组存储从 2016\
  \ 年 5 月开始的运营数据。\n\n`清单 16-1.` 创建分区表\n\n```sql\ncreate partition function pfOrders(datetime2(0))\n\
  as range right for values\n('2014-02-01', '2014-03-01','2014-04-01','2014-05-01','2014-06-01','2014-07-01'\n\
  ,'2014-08-01','2014-09-01','2014-10-01','2014-11-01','2014-12-01','2015-01-01'\n\
  ,'2015-02-01','2015-03-01','2015-04-01','2015-05-01','2015-06-01','2015-07-01'\n\
  ,'2015-08-01','2015-09-01','2015-10-01','2015-11-01','2015-12-01','2016-01-01'\n\
  ,'2016-02-01','2016-03-01','2016-04-01','2016-05-01','2016-06-01','2016-07-01');\n\
  \ncreate partition scheme psOrders\nas partition pfOrders\nto (FG2014 /* FileGroup\
  \ to store data <'2014-02-01' */\n,FG2014 /* FileGroup to store data >='2014-02-01'\
  \ and <'2014-03-01' */\n,FG2014,FG2014,FG2014,FG2014,FG2014\n,FG2014,FG2014,FG2014,FG2014,FG2014\n\
  ,FG2015 /* FileGroup to store data >='2015-01-01' and <'2015-02-01' */\n,FG2015,FG2015,FG2015,FG2015,FG2015\n\
  ,FG2015,FG2015,FG2015,FG2015,FG2015,FG2015\n,FG2016 /* FileGroup to store data >='2016-01-01'\
  \ and <'2016-02-01' */\n,FG2016,FG2016,FG2016\n,FASTSTORAGE /* FileGroup to store\
  \ data >='2016-05-01' and <'2016-06-01' */\n,FASTSTORAGE /* FileGroup to store data\
  \ >='2016-06-01' and <'2016-07-01' */\n,FASTSTORAGE /* FileGroup to store data >='2016-07-01'\
  \ */ );\n\ncreate table dbo.OrdersPT\n(\n    OrderId int not null,\n    OrderDate\
  \ datetime2(0) not null,\n    OrderNum varchar(32) not null,\n    OrderTotal money\
  \ not null,\n    CustomerId int not null,\n    /* Other Columns */\n);\n```\n\n\
  ![](img/index-357_1.jpg)\n\n`第 16 章 ■ 数据分区`\n\n```sql\ncreate unique clustered index\
  \ IDX_OrdersPT_OrderDate_OrderId\non dbo.OrdersPT(OrderDate, OrderId)\nwith\n(\n\
  \    data_compression = page on partitions(1 to 28),\n    data_compression = row\
  \ on partitions(29 to 31)\n)\non psOrders(OrderDate);\n\ncreate nonclustered index\
  \ IDX_OrdersPT_CustomerId\non dbo.OrdersPT(CustomerId)\nwith\n(\n    data_compression\
  \ = page on partitions(1 to 28),\n    data_compression = row on partitions(29 to\
  \ 31)\n)\non psOrders(OrderDate);\n```\n\n通过指定分区函数的 `RANGE LEFT` 或 `RANGE RIGHT`\
  \ 参数，可以控制边界值的存储方式。在我们的示例中，使用了 `RANGE RIGHT` 参数，这表明边界值存储在右侧分区。使用此选项，如果 `2014-02-01`\
  \ 是第一个边界值，则最左侧分区存储该日期之前的数据。所有等于边界值的数据存储在从左数第二个分区中。或者，如果我们使用 `RANGE LEFT` 参数，边界值数据将存储在左分区中。\n\
  \n`图 16-1` 展示了 `dbo.OrdersPT` 表的物理数据布局。\n\n`图 16-1.` `dbo.OrdersPT` 表的数据布局\n\n`第\
  \ 16 章 ■ 数据分区`\n\n每个分区可以驻留在自己的文件组中，并拥有自己的数据压缩方法。但是，所有分区都具有完全相同的模式和由逻辑表控制的索引集。此外，SQL\
  \ Server 不会在分区级别维护单独的统计信息。无论是否分区，索引上都有一个单一的、200 步的直方图。\n\nSQL Server 2014 和 2016\
  \ 引入了 `incremental statistics` 的概念，它允许您为每个分区创建统计信息。启用后，SQL Server 开始跟踪分区级别的统计信息列更新次数，并在超出单个分区的阈值时将统计信息标记为过时。\n\
  \n# 表分区技术详解\n\n## 增量统计与分区\n\n分区后，后续的统计信息更新将仅刷新各个分区上的统计信息，而非整个表。此行为需要分别启用 `statistics_incremental`\
  \ 索引选项和 `incremental statistics` 选项。\n\n尽管增量统计改善了分区表上的统计信息维护，但直方图步骤数在整个索引上仍被限制为\
  \ 200 步，无论是否启用了增量统计。\n\n## 分区的透明性\n\n表分区可以以对客户端应用程序透明的方式实现。代码继续引用逻辑表，而 SQL Server\
  \ 在底层管理内部的数据布局。\n\n然而，在某些情况下，您仍然需要在查询优化阶段引用单个分区。我们将在本章后面讨论这些情况。\n\n## 拆分与合并分区\n\n\
  您可以通过更改分区方案和函数来创建新的（`split`）或删除现有的（`merge`）分区。清单 16-2 中的代码合并了 `dbo.OrdersPT` 表中最左侧的两个分区，并拆分了最右侧的分区。拆分后，最左侧分区将存储\
  \ `OrderDate` 在 2014 年 3 月 1 日之前的数据，而表的两个最右侧分区将分别存储 `OrderDate` 为 2016 年 7 月的数据和大于等于\
  \ 2016-08-01 的数据。\n\n**清单 16-2.** 拆分与合并分区\n\n```sql\n/* 合并最左侧的两个分区 */\nalter partition\
  \ function pfOrders() merge range('2014-02-01');\n\n/* 拆分最右侧分区 */\n-- 步骤 1: 修改分区方案\
  \ - 指定新分区需要存储在哪个文件组\nalter partition scheme psOrders next used [FASTSTORAGE];\n\n\
  -- 步骤 2: 拆分分区函数\nalter partition function pfOrders() split range('2016-08-01');\n\
  ```\n\n## 在表之间切换分区\n\n表分区最强大的功能之一是能够在表之间切换分区。这极大地简化了某些操作的实现，例如清除旧数据或将数据导入表中。我们将在本章后面讨论实现数据清除和滑动窗口模式。\n\
  \n清单 16-3 展示了如何通过将另一个暂存表 `dbo.StagingData` 作为新分区切换进入表 `dbo.MainData` 来导入新数据。当您需要将数据从外部源导入表中时，这种方法非常有用。尽管您可以直接将数据插入表中，但分区切换是一项元数据操作，可以最大限度地减少导入过程中的锁定。\n\
  \n**清单 16-3.** 将暂存表切换为新分区\n\n```sql\ncreate partition function pfMainData(datetime)\n\
  as range right for values\n('2016-02-01', '2016-03-01','2016-04-01','2016-05-01','2016-06-01','2016-07-01'\n\
  ,'2016-08-01','2016-09-01','2016-10-01','2016-11-01','2016-12-01');\n\ncreate partition\
  \ scheme psMainData\nas partition pfMainData\nall to (FG2016);\n\n/* 尽管我们有 12 个分区——每月一个，但假设只有\n\
  1 月到 4 月的数据已填充。例如，当前时间是年中 */\ncreate table dbo.MainData\n(\nADate datetime not null,\n\
  ID bigint not null,\nCustomerId int not null,\n/* 其他列 */\nconstraint PK_MainData\n\
  primary key clustered(ADate, ID)\non psMainData(ADate)\n);\n\ncreate nonclustered\
  \ index IDX_MainData_CustomerId\non dbo.MainData(CustomerId)\non psMainData(ADate);\n\
  \ncreate table dbo.StagingData\n(\nADate datetime not null,\nID bigint not null,\n\
  CustomerId int not null,\n/* 其他列 */\nconstraint PK_StagingData\nprimary key clustered(ADate,\
  \ ID),\nconstraint CHK_StagingData\ncheck(ADate >= '2016-05-01' and ADate < '2016-06-01')\n\
  ) on [FG2016];\n\ncreate nonclustered index IDX_StagingData_CustomerId\non dbo.StagingData(CustomerId)\n\
  on [FG2016];\n\n/* 切换分区 */\nalter table dbo.StagingData\nswitch to dbo.MainData\n\
  partition 5;\n```\n\n两个表必须具有完全相同的模式和索引。暂存表应放置在 `FG2016` 文件组中。\n\n# 第十六章 ■ 数据分区\n\
  \n##### 分区视图\n\n与分区表不同，分区视图可在 SQL Server 的所有版本中使用。在此类架构中，您创建独立的表，并通过使用 `union all`\
  \ 运算符的分区视图来组合所有表中的数据。\n\n> **注意** SQL Server 允许您通过组合来自多个数据库甚至 SQL Server 实例的数据来定义分区视图。后一种情况称为*分布式分区视图*。对此类场景的讨论超出了本书范围。然而，它们的行为与在单一数据库范围内定义的分区视图类似。\n\
  \n代码清单 16-4 展示了使用分区视图方法对 *Orders* 实体进行数据分区的示例。\n\n**代码清单 16-4.** 创建分区视图\n\n```sql\n\
  create table dbo.Orders2014_01\n(\n    OrderId int not null,\n    OrderDate datetime2(0)\
  \ not null,\n    OrderNum varchar(32) not null,\n    OrderTotal money not null,\n\
  \    CustomerId int not null,\n    /* Other Columns */\n\n    constraint PK_Orders2014_01\n\
  \        primary key clustered(OrderId),\n    constraint CHK_Orders2014_01\n   \
  \     check (OrderDate >= '2014-01-01' and OrderDate < '2014-02-01')\n) on [FG2014];\n\
  \ncreate nonclustered index IDX_Orders2014_01_CustomerId\n    on dbo.Orders2014_01(CustomerId)\n\
  \    on [FG2014];\n\ncreate table dbo.Orders2014_02\n(\n    OrderId int not null,\n\
  \    OrderDate datetime2(0) not null,\n    OrderNum varchar(32) not null,\n    OrderTotal\
  \ money not null,\n    CustomerId int not null,\n    /* Other Columns */\n\n   \
  \ constraint PK_Orders2014_02\n        primary key clustered(OrderId)\n        with\
  \ (data_compression=page),\n    constraint CHK_Orders2014_02\n        check (OrderDate\
  \ >= '2014-02-01' and OrderDate < '2014-03-01')\n) on [FG2014];\n\ncreate nonclustered\
  \ index IDX_Orders2014_02_CustomerId\n    on dbo.Orders2014_02(CustomerId)\n   \
  \ with (data_compression=page)\n    on [FG2014];\n\n/* Other tables */\n\ncreate\
  \ table dbo.Orders2016_06\n(\n    OrderId int not null,\n    OrderDate datetime2(0)\
  \ not null,\n    OrderNum varchar(32) not null,\n    OrderTotal money not null,\n\
  \    CustomerId int not null,\n    /* Other Columns */\n\n    constraint PK_Orders2016_06\n\
  \        primary key clustered(OrderId)\n        with (data_compression=row),\n\
  \    constraint CHK_Orders2016_06\n        check (OrderDate >= '2016-06-01' and\
  \ OrderDate < '2016-07-01')\n) on [FASTSTORAGE];\n\ncreate nonclustered index IDX_Orders2016_04_CustomerId\n\
  \    on dbo.Orders2016_06(CustomerId)\n    with (data_compression=row)\n    on [FASTSTORAGE]\n\
  go\n\ncreate view dbo.Orders(OrderId, OrderDate, OrderNum, OrderTotal, CustomerId\
  \ /*Other Columns*/)\nwith schemabinding\nas\n    select OrderId, OrderDate, OrderNum,\
  \ OrderTotal, CustomerId /*Other Columns*/\n    from dbo.Orders2014_01\n    union\
  \ all\n    select OrderId, OrderDate, OrderNum, OrderTotal, CustomerId /*Other Columns*/\n\
  \    from dbo.Orders2014_02\n    /* union all -- Other tables */\n    union all\n\
  \    select OrderId, OrderDate, OrderNum, OrderTotal, CustomerId /*Other Columns*/\n\
  \    from dbo.Orders2016_06;\n```\n\n图 16-2 展示了表的物理数据布局。\n\n![](img/index-362_1.jpg)\n\
  \n**图 16-2.** 使用分区视图方法的数据布局\n\n如您所见，不同的表可以放置在不同的文件组中，甚至可以根据需要将其标记为只读。每个表可以拥有自己的一组索引，并维护各自、更精确的统计信息。分区视图为所有底层表提供了一个统一的查询界面。\n\
  \n暂存表必须与分区表中目标分区所在的文件组相同。最后，暂存表必须有一个 `CHECK` 约束，该约束阻止超出分区边界范围的值。\n\n您可能已经注意到，所有`非聚集`索引都已按照与`聚集`索引相同的方式进行了分区。这类索引被称为*对齐索引*。尽管没有强制要求保持索引对齐，但如果表定义了非对齐的`非聚集`索引，SQL\
  \ Server 将无法切换分区。\n\n最后，如果一个表被其他表中定义的`外键`约束所引用，则分区切换操作将不起作用。然而，当表本身具有引用其他表的`外键`约束时，是允许进行分区切换的。\n\
  \n# 第 16 章 数据分区\n\n统计信息。此外，每个表都可以拥有自己的架构。这在操作活动需要表包含额外列时是有益的——例如用于数据处理——之后你可以再将这些列删除。这种架构上的差异可以在分区视图层面进行抽象。\n\
  \n**提示** 你可以在同一个分区视图中结合使用内存优化表（In-Memory OLTP memory-optimized tables）、基于列存储的表（columnstore-based\
  \ tables）和常规的磁盘 B-Tree 表（on-disk B-Tree tables）。这有助于提高具有混合工作负载的系统性能。\n\n为每个表定义 `CHECK`\
  \ 约束是极其重要的。这些约束有助于 SQL Server 在查询数据时避免访问不必要的表。清单 16-5 展示了一个查询分区视图的示例。\n\n## 清单 16-5：查询分区视图\n\
  \n```sql\nselect count(*) from dbo.Orders;\n\nselect count(*) from dbo.Orders where\
  \ OrderDate = '2016-06-03'\n```\n\n如图 `Figure 16-3` 所示，第一个查询要求 SQL Server 访问分区视图中的所有表。而第二个查询以\
  \ `OrderDate` 作为参数，允许 SQL Server 精确指向需要查询的单个表。\n\n![](img/index-363_1.jpg)\n\n**图\
  \ 16-3：分区视图查询的执行计划**\n\n你应该始终添加谓词，以减少查询需要处理的表数量。\n\n让我们看一个实际的例子，第一步是创建另一个名为 `OrderLineItems`\
  \ 的实体。显然，你会希望以与 `Orders` 实体相同的方式对其进行分区，即按月分区。\n\n**提示** 你应该对相关实体进行分区，并将它们放置在支持 piecemeal\
  \ restore 并允许你同时将实体联机的文件组中。\n\n清单 16-6 展示了创建表集合和分区视图的代码。尽管 `OrderDate` 列在 `OrderLineItems`\
  \ 表中是冗余的，但你需要将其添加到所有表中，以便创建与 `Orders` 表一致的分区布局。\n\n## 清单 16-6：OrderLineItems 分区视图\n\
  \n```sql\ncreate table dbo.OrderLineItems2014_01\n(\n    OrderId int not null,\n\
  \    OrderLineItemId int not null,\n    OrderDate datetime2(0) not null,\n    ArticleId\
  \ int not null,\n    Quantity decimal(9,3) not null,\n    Price money not null,\n\
  \    /* Other Columns */\n    constraint CHK_OrderLineItems2014_01\n        check\
  \ (OrderDate >= '2014-01-01' and OrderDate < '2014-02-01'),\n    constraint FK_OrderLineItems_Orders_2014_01\n\
  \        foreign key(OrderId)\n        references dbo.Orders2014_01(OrderId),\n\n\
  constraint FK_OrderLineItems2014_01_Articles\n    foreign key(ArticleId)\n    references\
  \ dbo.Articles(ArticleId)\n);\n\ncreate unique clustered index IDX_Orders2014_01_OrderId_OrderLineItemId\n\
  \    on dbo.OrderLineItems2014_01(OrderId, OrderLineItemId)\n    on [FG2014];\n\n\
  create nonclustered index IDX_Orders2014_01_ArticleId\n    on dbo.OrderLineItems2014_01(ArticleId)\n\
  \    on [FG2014];\n\n/* Other tables */\n\ncreate view dbo.OrderLineItems(OrderId,\
  \ OrderLineItemId, OrderDate, ArticleId, Quantity,\nPrice)\n    with schemabinding\n\
  as\n    select OrderId, OrderLineItemId, OrderDate, ArticleId, Quantity, Price\n\
  \        from dbo.OrderLineItems2014_01\n    /*union all other tables*/\n    union\
  \ all\n    select OrderId, OrderLineItemId, OrderDate, ArticleId, Quantity, Price\n\
  \        from dbo.OrderLineItems2016_06;\n```\n\n假设你有一个查询，它返回在 2016 年 1 月由特定客户购买的包含特定商品的订单列表。这种查询的典型实现如清单\
  \ 16-7 所示。\n\n## 清单 16-7：选择包含特定商品的客户订单列表：非优化版本\n\n```sql\nselect o.OrderId, o.OrderNum,\
  \ o.OrderDate, i.Quantity, i.Price\nfrom dbo.Orders o join dbo.OrderLineItems i\
  \ on\n    o.OrderId = i.OrderId\nwhere\n    o.OrderDate >= '2016-01-01' and\n  \
  \  o.OrderDate < '2016-02-01' and\n    o.CustomerId = @CustomerId and\n    i.ArticleId\
  \ = @ArticleId\n```\n\n\n# 第 16 章 ■ 数据分区\n\n如图 16-4 所示，在搜紧行项目记录时，SQL Server 必须对每个`OrderLineItems`表执行一次`索引查找`。`查询优化器`并不知道所有需要的行都存储在`dbo.OrderLineItems2016_01`表中。\n\
  \n![](img/index-365_1.jpg)\n\n![](img/index-365_2.jpg)\n\n**图 16-4.** 未优化查询的执行计划\n\
  \n你可以通过在`OrderDate`列上添加另一个联接谓词来优化此查询，如代码清单 16-8 所示。`CHECK`约束允许`查询优化器`排除访问那些无法存储特定月份数据的表。其执行计划如图\
  \ 16-5 所示。\n\n**代码清单 16-8.** 选择包含特定商品的客户订单列表：优化版本\n\n```sql\nselect o.OrderId, o.OrderNum,\
  \ o.OrderDate, i.Quantity, i.Price\nfrom dbo.Orders o join dbo.OrderLineItems i\
  \ on\n    o.OrderId = i.OrderId and\n    o.OrderDate = i.OrderDate\nwhere\n    o.OrderDate\
  \ >= '2016-01-01' and\n    o.OrderDate < '2016-02-01' and\n    o.CustomerId = @CustomerId\
  \ and\n    i.ArticleId = @ArticleId\n```\n\n**图 16-5.** 优化后查询的执行计划\n\n不幸的是，在大多数情况下，使用分区视图需要修改客户端代码，尤其是在更新数据时。在某些情况下，你可以直接通过视图更新数据；然而，分区视图需要满足一些限制条件才能可更新。例如，视图中的表应具有定义分区条件的`CHECK`约束，并且该约束中的列必须是主键的一部分。\n\
  \n另一个重要的要求是，视图应仅传递表中的所有列；不允许有计算列。有了这个要求，你就无法拥有不同架构的表来在视图层面抽象差异。\n\n即使满足所有要求并能创建可更新的视图，仍然存在可维护性问题。在修改视图以避免意外破坏客户端代码的情况时，你需要格外小心。\n\
  \n另一种使视图可更新的方法是在视图上定义一个`INSTEAD OF`触发器。然而，这种方法通常比客户端代码直接更新基表的效率要低。此外，通过客户端代码，你可以从不同线程同时更新不同的表，这可以提高批处理操作的性能。\n\
  \n## 比较分区表和分区视图\n\n表 16-1 更详细地比较了分区表和分区视图。\n\n**表 16-1.** 分区表与分区视图对比\n\n| 分区表 |\
  \ 分区视图 |\n| :--- | :--- |\n| 仅限企业版和开发人员版 | 所有版本 |\n| 根据 SQL Server 版本不同，最多 1,000\
  \ 或 15,000 个分区 | 最多 255 个表/分区 |\n| 所有分区的表架构和索引相同 | 每个表/分区可以有自己的架构和索引集 |\n| 统计信息保存在表级别\
  \ | 每个表/分区有独立的统计信息 |\n| SQL Server 2014 之前没有分区级别的联机索引重建 | 在 SQL Server 企业版中，可以对表/分区进行联机索引重建\
  \ |\n| 对客户端代码透明（可能需要一些查询重构） | 通常需要修改客户端代码 |\n| 对复制透明 | 当创建新表/分区和/或删除现有表/分区时，需要在发布中进行更改\
  \ |\n\n如你所见，与分区表相比，分区视图更加灵活。分区视图适用于 SQL Server 的所有版本，这对于向使用不同版本 SQL Server 的多个客户部署系统的独立软件供应商（`ISV`）来说很重要。然而，分区视图实现起来更困难，并且通常需要对现有系统进行大量的代码重构。\n\
  \n\n\n# 第 16 章 ■ 数据分区\n\n系统的可维护性是另一个因素。考虑一种情况，你需要更改实体的模式。使用分区表时，主逻辑表控制模式，只需要一条 `ALTER\
  \ TABLE` 语句。而分区视图则需要多条 `ALTER TABLE` 语句——每个基础表一条。\n\n不过，这未必是坏事。通过多条 `ALTER TABLE`\
  \ 语句，你在单个表级别获取架构修改 (`SCH-M`) 锁，这可以缩短锁的持有时间，并减少对表访问的阻塞。我们将在第 23 章“架构锁”中更详细地讨论架构锁。\n\
  \n有时你可以在分区视图级别抽象模式变更，从而避免修改某些表。例如，考虑添加一个带有默认约束的 `NOT NULL` 列。在 SQL Server 2005-2008R2\
  \ 中，此操作将修改表中的每一行数据，并在操作期间持续持有架构修改 (`SCH-M`) 锁。它还会产生大量的事务日志活动。\n\n对于分区视图，你可以仅使用视图中带有历史数据表的常量来修改操作数据表。代码清单\
  \ 16-9 展示了这种方法。请记住，这种方法会阻止分区视图可更新。\n\n### 代码清单 16-9. 在分区视图中抽象模式变更\n\n```sql\nalter\
  \ table dbo.Orders2016_06\nadd IsReviewed bit not null\nconstraint DEF_Orders2016_06_IsReviewed\n\
  default 0;\n\nalter view dbo.Orders(OrderId, OrderDate, OrderNum, OrderTotal, CustomerId,\
  \ IsReviewed)\nwith schemabinding\nas\nselect OrderId, OrderDate, OrderNum, OrderTotal,\
  \ CustomerId,\n0 as [IsReviewed]\nfrom dbo.Orders2014_01\n/* union all -- 其他表 */\n\
  union all\nselect OrderId, OrderDate, OrderNum, OrderTotal, CustomerId,\nIsReviewed\n\
  from dbo.Orders2016_06;\n```\n\n## 结合使用分区表和分区视图\n\n通过结合使用分区表和分区视图，你可以提高系统的可维护性并减少所需表的数量。采用这种方法，你将一个或多个分区表中存储历史数据，而在常规表中存储操作数据，并将它们全部组合到一个分区视图中。\n\
  \n代码清单 16-10 展示了一个这样的例子。有三个分区表，`dbo.Orders2014`、`dbo.Orders2015` 和 `dbo.Orders2016`，它们按月存储历史数据。还有两个存储操作数据的常规表：`dbo.Orders2016_05`\
  \ 和 `dbo.Orders2016_06`。\n\n### 代码清单 16-10. 结合使用分区表和视图\n\n```sql\ncreate partition\
  \ function pfOrders2014(datetime2(0))\nas range right for values\n('2014-02-01',\
  \ '2014-03-01','2014-04-01','2014-05-01','2014-06-01','2014-07-01'\n,'2014-08-01','2014-09-01','2014-10-01','2014-11-01','2014-12-01');\n\
  \ncreate partition scheme psOrders2014\nas partition pfOrders2014\nall to ([FG2014]);\n\
  \ncreate table dbo.Orders2014\n(\nOrderId int not null,\nOrderDate datetime2(0)\
  \ not null,\nOrderNum varchar(32) not null,\nOrderTotal money not null,\nCustomerId\
  \ int not null,\n/* 其他列 */\nconstraint CHK_Orders2014\ncheck(OrderDate >= '2014-01-01'\
  \ and OrderDate < '2015-01-01')\n);\n\ncreate unique clustered index IDX_Orders2014_OrderDate_OrderId\n\
  on dbo.Orders2014(OrderDate, OrderId)\nwith (data_compression = page)\non psOrders2014(OrderDate);\n\
  \ncreate nonclustered index IDX_Orders2014_CustomerId\non dbo.Orders2014(CustomerId)\n\
  with (data_compression = page)\non psOrders2014(OrderDate);\ngo\n\n/* dbo.Orders2015\
  \ 表定义 – 已跳过 */\n\ncreate partition function pfOrders2016(datetime2(0))\nas range\
  \ right for values\n('2016-02-01', '2016-03-01','2016-04-01','2016-05-01','2016-06-01','2016-07-01'\n\
  ,'2016-08-01','2016-09-01','2016-10-01','2016-11-01','2016-12-01');\n\ncreate partition\
  \ scheme psOrders2016\nas partition pfOrders2016\nall to ([FG2016]);\n\ncreate table\
  \ dbo.Orders2016\n(\n```\n\n\n\n## 第 16 章 ■ 数据分区\n\n```sql\nOrderId int not null,\n\
  OrderDate datetime2(0) not null,\nOrderNum varchar(32) not null,\nOrderTotal money\
  \ not null,\nCustomerId int not null,\n/* 其他列 */\nconstraint CHK_Orders2016\ncheck(订单日期\
  \ >= '2016-01-01' and 订单日期 < '2016-05-01')\n);\n\ncreate unique clustered index\
  \ IDX_Orders2016_OrderDate_OrderId\non dbo.Orders2016(订单日期, OrderId)\nwith (data_compression\
  \ = page)\non psOrders2016(订单日期);\n\ncreate nonclustered index IDX_Orders2016_CustomerId\n\
  on dbo.Orders2016(CustomerId)\nwith (data_compression = page)\non psOrders2016(订单日期);\n\
  \ncreate table dbo.Orders2016_05\n(\nOrderId int not null,\nOrderDate datetime2(0)\
  \ not null,\nOrderNum varchar(32) not null,\nOrderTotal money not null,\nCustomerId\
  \ int not null,\n/* 其他列 */\nconstraint CHK_Orders2016_05\ncheck(订单日期 >= '2016-05-01'\
  \ and 订单日期 < '2016-06-01')\n);\n\ncreate unique clustered index IDX_Orders2016_05_OrderDate_OrderId\n\
  on dbo.Orders2016_05(订单日期, OrderId)\nwith (data_compression = row)\non [FASTSTORAGE];\n\
  \ncreate nonclustered index IDX_Orders2016_05_CustomerId\non dbo.Orders2016_05(CustomerId)\n\
  with (data_compression = row)\non [FASTSTORAGE]\n\n/* dbo.Orders2016_06 表定义 */\n\
  \ncreate view dbo.Orders(OrderId, OrderDate, OrderNum, OrderTotal, CustomerId /*其他列*/)\n\
  with schemabinding\nas\nselect OrderId, OrderDate, OrderNum, OrderTotal, CustomerId\
  \ /*其他列*/\nfrom dbo.Orders2014\nunion all\nselect OrderId, OrderDate, OrderNum,\
  \ OrderTotal, CustomerId /*其他列*/\nfrom dbo.Orders2015\nunion all\nselect OrderId,\
  \ OrderDate, OrderNum, OrderTotal, CustomerId /*其他列*/\nfrom dbo.Orders2016\nunion\
  \ all\nselect OrderId, OrderDate, OrderNum, OrderTotal, CustomerId /*其他列*/\nfrom\
  \ dbo.Orders2016_05\nunion all\nselect OrderId, OrderDate, OrderNum, OrderTotal,\
  \ CustomerId /*其他列*/\nfrom dbo.Orders2016_06;\n```\n\n值得一提的是，表 `dbo.Orders2016`\
  \ 是按月分区的，一直分到年底，即使它只存储到五月开始的运营期间的数据。该表中的 `CHECK` 约束表明了这一点。\n\n数据布局如图 16-6 所示。\n\n\
  ![](img/index-370_1.jpg)\n\n`图 16-6. 结合使用分区表和视图：数据布局`\n\n正如您所见，与分区视图实现相比，这种方法显著减少了表的数量，同时保持了分区视图的灵活性。\n\
  \n#### 分层存储\n\n数据分区的一个关键好处是降低系统中的存储成本。您可以通过两种不同的方式实现这一点。首先，您可以通过对数据的历史部分使用数据压缩来减少数据大小。此外，更重要的是，您可以在系统中的不同存储阵列之间分离数据。\n\
  \n系统中不同数据具有不同的性能和可用性要求，这很常见。在我们的例子中，操作数据可能定义有 `99.99%` 的可用性和 `20 毫秒` 延迟的 SLA。然而，对于较早的历史数据，要求可能大不相同。例如，2014\
  \ 年的订单必须保留在系统中，但没有性能要求，并且可用性 SLA 远低于操作数据。\n\n您可以根据这些要求设计数据布局和存储子系统。图 16-7 展示了一种可能的解决方案。您可以为包含操作数据的\
  \ `FASTSTORAGE` 文件组使用基于 SSD 的快速 `RAID-10` 阵列。2016 年 1-4 月的数据相对静态，可以存储在速度较慢的、使用 `15,000\
  \ RPM` 磁盘的 `RAID-5` 阵列上。最后，您可以为 2015 年和 2014 年的数据使用缓慢且廉价的 `5,400 RPM` 磁盘组成的 `RAID-1`\
  \ 阵列。\n\n![](img/index-371_1.jpg)\n\n`图 16-7. 分层存储`\n\n*分层存储* 可以显著降低系统的存储成本。最后，它也更容易...\n\
  \n\n\n# 第 16 章 ■ 数据分区\n\n由于成本较低，可以申请到已批准的预算来购买容量较低但速度更快的磁盘阵列。分层存储设计的关键问题在于，如何在运营周期变化时，在不同层级之间移动数据，同时保持系统在线并对客户可用。让我们更详细地看一下可用的选项。\n\
  \n## 在文件组之间移动非分区表\n\n您可以通过重建所有索引，将非分区表移动到另一个文件组，并将新文件组指定为目标。在 SQL Server 企业版中，此操作可以使用\
  \ `CREATE INDEX WITH (ONLINE=ON, DROP_EXISTING=ON)` 命令在线上完成。在联机索引重建期间，其他会话仍可以访问该表。因此，系统对客户是可用的。\n\
  \n■ `注意` 在线索引重建会在执行的最后阶段获取架构修改（`SCH-M`）锁。尽管这个锁的持有时间非常短，但在非常活跃的 OLTP 系统中，它可能会增加锁定和阻塞。SQL\
  \ Server 2014 引入了低优先级锁的概念，可用于在在线索引重建操作期间提高系统并发性。我们将在[第 23 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_23)“架构锁”中详细讨论它们。\n\
  \n不幸的是，在线索引重建有两个需要注意的地方。首先，即使是在企业版中，如果索引定义了大对象（`LOB`）列，例如 `(n)text`、`image`、`(n)varchar(max)`、`varbinary(max)`、`xml`\
  \ 和其他几种类型，SQL Server 2005-2008R2 也不支持在线索引重建。\n\n第二个问题更复杂。索引重建不会将 `LOB_DATA` 分配单元移动到新的文件组。让我们看一个例子，在\
  \ `FG1` 文件组上创建一个包含 `LOB` 列的表。`清单 16-11` 显示了相关代码。\n\n`清单 16-11.` 将包含 `LOB` 列的表移动到不同的文件组：表创建\n\
  \n```\ncreate table dbo.RegularTable\n(\n    OrderDate date not null,\n    OrderId\
  \ int not null identity(1,1),\n    OrderNum varchar(32) not null,\n    LobColumn\
  \ varchar(max) null,\n    Placeholder char(50) null,\n) textimage_on [FG1];\n```\n\
  \n![](img/index-372_1.jpg)\n\ncreate unique clustered index `IDX_RegularTable_OrderDate_OrderId`\n\
  on `dbo.RegularTable`(`OrderDate`, `OrderId`)\non [`FG1`];\n\n接下来，让我们检查所有分配单元是否都位于\
  \ `FG1` 文件组中。代码如 `清单 16-12` 所示。您可以在 `图 16-8` 中看到查询结果。\n\n`清单 16-12.` 将包含 `LOB` 列的表移动到不同的文件组：检查分配单元的位置\n\
  \n```\nselect\n    p.partition_number as [Partition]\n    ,object_name(p.object_id)\
  \ as [Table]\n    ,filegroup_name(a.data_space_id) as [FileGroup]\n    ,a.type_desc\
  \ as [Allocation Unit]\nfrom\n    sys.partitions p join sys.allocation_units a on\n\
  \        p.partition_id = a.container_id\nwhere\n    p.object_id = object_id('dbo.RegularTable')\n\
  order by\n    p.partition_number\n```\n\n`图 16-8.` 表创建后的分配单元位置\n\n现在，让我们重建聚集索引，将数据移动到\
  \ `FG2` 文件组。实现这一点的代码如 `清单 16-13` 所示。\n\n`清单 16-13.` 通过将数据移动到不同文件组来重建索引\n\n```\n\
  create unique clustered index IDX_RegularTable_OrderDate_OrderId\non dbo.RegularTable(OrderDate,\
  \ OrderId)\nwith (drop_existing=on, online=on)\non [FG2]\n```\n\n现在，如果您再次运行 `清单\
  \ 16-12` 中的查询，您将看到如 `图 16-9` 所示的结果。如您所见，索引重建将 `IN_ROW_DATA` 和 `ROW_OVERFLOW_DATA`\
  \ 分配单元移动到了新的文件组，而 `LOB_DATA` 保持不变。\n\n![](img/index-373_1.jpg)\n\n![](img/index-373_2.jpg)\n\
  \n`图 16-9.` 索引重建后的分配单元位置\n\n幸运的是，有一个可用的解决方法。您可以将 `LOB_DATA` 分配单元移动到另一个文件组。\n\n\n\
  # 第 16 章 ■ 数据分区\n\n通过执行在线索引重建，使用分区方案而非文件组作为目标，来将索引迁移到不同的文件组。\n\n代码清单 16-14 展示了这样一种方法。第一步，你需要创建一个具有一个边界值和两个分区的分区函数，使得其中一个分区为空。之后，你需要创建一个分区方案，让两个分区都使用目标文件组，然后将索引重建到这个分区方案中。最后，你需要通过修改分区函数来合并两个分区。由于其中一个分区是空的，这只是一个快速的元数据操作。\n\
  \n**代码清单 16-14.** 在分区方案中重建索引\n\n```\ncreate partition function pfRegularTable(date)\n\
  as range right for values ('2100-01-01');\n\ncreate partition scheme psRegularTable\n\
  as partition pfRegularTable\nall to ([FG2]);\n\ncreate unique clustered index IDX_RegularTable_OrderDate_OrderId\n\
  on dbo.RegularTable(OrderDate, OrderId)\nwith (drop_existing=on, online=on)\non\
  \ psRegularTable(OrderDate);\n\nalter partition function pfRegularTable()\nmerge\
  \ range('2100-01-01');\n```\n\n图 16-10 显示了索引重建后分配单元的位置。\n\n**图 16-10.** 在分区方案中重建索引后的分配单元位置\n\
  \n显然，此方法需要 SQL Server 企业版。由于涉及 LOB 列，还需要 SQL Server 2012 或更高版本才能作为联机操作运行。\n\n如果没有\
  \ SQL Server 企业版，移动 `LOB_DATA` 分配单元的唯一选择是在目标文件组中创建一个新表，然后将数据从原表复制过去。\n\n## 在文件组之间移动分区\n\
  \n你可以通过修改分区方案和分区函数，将分区表中的单个分区移动到另一个文件组。修改分区方案会标记新创建的分区必须放置到的文件组。拆分和合并分区函数会触发数据移动。\n\
  \n在 `SPLIT RANGE` 和 `MERGE RANGE` 操作期间，数据在分区之间移动的方式取决于分区函数的 `RANGE LEFT` 和 `RANGE\
  \ RIGHT` 参数。让我们看一个例子，假设你有一个数据库，包含四个文件组：`FG1`、`FG2`、`FG3` 和 `FG4`。数据库中有一个使用 `RANGE\
  \ LEFT` 值的分区函数，如代码清单 16-15 所示。\n\n**代码清单 16-15.** `RANGE LEFT` 分区函数\n\n```\ncreate\
  \ partition function pfLeft(int) as range left for values (10,20);\n\ncreate partition\
  \ scheme psLeft\nas partition pfLeft\nto ([FG1],[FG2],[FG3]);\n\nalter partition\
  \ scheme psLeft next used [FG4];\n```\n\n在 `RANGE LEFT` 分区函数中，边界值代表一个分区中的最大值。当你拆分一个\
  \ `RANGE LEFT` 分区时，具有最高新边界值的新分区会被移动到 `NEXT USED` 文件组。\n\n表 16-2 显示了各种 `SPLIT` 操作对应的分区和文件组布局。\n\
  \n**表 16-2.** `RANGE LEFT` 分区函数与 `SPLIT` 操作\n\n```\nFG1         FG2         FG3\
  \         FG4\n原始分区\n{min..10}   {11..20}    {21..max}\nSPLIT RANGE(0)\n{1..10}\
  \     {11..20}    {21..max}   {min..0}\nSPLIT RANGE(15)\n{min..10}   {16..20}  \
  \  {21..max}   {11..15}\nSPLIT RANGE(30)\n{min..10}   {11..20}    {31..max}   {21..30}\n\
  ```\n\n现在，让我们看看当使用具有相同边界值的 `RANGE RIGHT` 分区函数时会发生什么，其定义如代码清单 16-16 所示。\n\n**代码清单\
  \ 16-16.** `RANGE RIGHT` 分区函数\n\n```\ncreate partition function pfRight(int) as\
  \ range right for values (10,20);\n\ncreate partition scheme psRight\nas partition\
  \ pfRight\nto ([FG1],[FG2],[FG3]);\n\nalter partition scheme psRight next used [FG4];\n\
  ```\n\n在 `RANGE RIGHT` 分区函数中，边界值代表一个分区中的最小值。当你拆分一个 `RANGE RIGHT` 分区时，具有新的最低边界值的新分区会被移动到\
  \ `NEXT USED` 文件组。\n\n`表 16-3` 展示了不同 `SPLIT` 操作下的分区与文件组布局。\n\n***表 16-3.** `RANGE\
  \ RIGHT` 分区函数与 `SPLIT` 操作*\n\n`FG1`\n\n`FG2`\n\n`FG3`\n\n`FG4`\n\n原始状态\n\n{min..9}\n\
  \n{10..19}\n\n{20..max}\n\n`SPLIT RANGE(0)`\n\n{min.. -1}\n\n{10..19}\n\n{20..max}\n\
  \n{0..9}\n\n`SPLIT RANGE(15)`\n\n{min..9}\n\n{10..14}\n\n{20..max}\n\n{15..19}\n\
  \n`SPLIT RANGE(30)`\n\n{min..9}\n\n{10..19}\n\n{20..29}\n\n{30..max}\n\n现在，让我们来看一个\
  \ `MERGE` 操作，假设你的分区函数的边界值为 (10, 20, 30)。对于 `RANGE RIGHT` 分区函数，来自右侧分区的数据会移动到左侧分区的文件组中。`表\
  \ 16-4` 说明了这一点。\n\n***表 16-4.** `RANGE RIGHT` 分区函数与 `MERGE` 操作*\n\n`FG1`\n\n`FG2`\n\
  \n`FG3`\n\n`FG4`\n\n原始状态\n\n{min..9}\n\n{10..19}\n\n{20..29}\n\n{30..max}\n\n`MERGE\
  \ RANGE(10)`\n\n{min.. 19}\n\n{20..29}\n\n{30..max}\n\n`MERGE RANGE(20)`\n\n{min..9}\n\
  \n{10..29}\n\n{30..max}\n\n`MERGE RANGE(30)`\n\n{min..9}\n\n{10..19}\n\n{20..max}\n\
  \n相反，对于 `RANGE LEFT` 分区函数，来自左侧分区的数据会移动到右侧分区的文件组，如 `表 16-5` 所示。\n\n***表 16-5.** `RANGE\
  \ LEFT` 分区函数与 `MERGE` 操作*\n\n`FG1`\n\n`FG2`\n\n`FG3`\n\n`FG4`\n\n原始状态\n\n{min..10}\n\
  \n{11..20}\n\n{21..30}\n\n{31..max}\n\n`MERGE RANGE(10)`\n\n{min..20}\n\n{21..30}\n\
  \n{31..max}\n\n`MERGE RANGE(20)`\n\n{min..10}\n\n{11..30}\n\n{31..max}\n\n`MERGE\
  \ RANGE(30)`\n\n{min..10}\n\n{11..20}\n\n{21..max}\n\n当你要将一个分区移动到不同的文件组时，应该选择一个边界值来对分区函数执行\
  \ `SPLIT` 和 `MERGE` 操作。例如，如果你想将存储 `dbo.OrdersPT` 表中 2016 年 5 月数据的分区从 `FASTSTORAGE`\
  \ 文件组移动到 `FG2016` 文件组，你需要针对边界值 `2016-05-01` 执行 `MERGE` 和 `SPLIT`。分区函数定义为 `RANGE\
  \ RIGHT`，因此 `MERGE` 操作会将 2016 年 5 月的数据移动到包含 2016 年 4 月数据的分区（该分区位于 `FG2016` 文件组上）。之后，通过修改分区方案，`SPLIT`\
  \ 操作会将 2016 年 5 月的数据移动到你指定为 `NEXT USED` 的文件组。\n\n你可以在 `清单 16-17` 中看到实现这一点的代码。提醒一下，`dbo.OrdersPT`\
  \ 表是在 `清单 16-1` 中创建的。\n\n# 第 16 章 ■ 数据分区\n\n***清单 16-17.*** 移动单个分区的数据\n\n```sql\n\
  -- 将 2016 年 5 月的分区数据移动到 2016 年 4 月的文件组\nalter partition function pfOrders() merge\
  \ range ('2016-05-01');\n\n-- 标记下一个要使用的文件组\nalter partition scheme psOrders next\
  \ used [FG2016];\n\n-- 为 2016 年 5 月创建新分区并将其移动到 FG2016\nalter partition function\
  \ pfOrders() split range ('2016-05-01');\n```\n\n尽管代码非常简单，但这种方法存在几个问题。首先，当你对分区函数执行\
  \ `MERGE` 和 `SPLIT` 时，数据会被移动两次。另一个问题是，在数据移动期间，SQL Server 会获取并持有架构修改 (`SCH-M`) 锁，这会阻止其他会话访问该表。\n\
  \n对于在数据移动过程中保持表在线的问题，没有简单的解决方法。`清单 16-18` 所示的一个选项是使用不同的分区方案重建索引。尽管此操作可以在线执行，但它会引入巨大的\
  \ I/O 和事务日志开销，因为你重建的是整个表的索引，而不是仅仅移动一个分区。此外，如果表包含 LOB 列，此操作在 SQL Server 2005 至 2008R2\
  \ 中无法在线运行。\n\n***清单 16-18.*** 移动单个分区的数据\n\n```sql\ncreate partition scheme psOrders2\n\
  as partition pfOrders\nto (FG2014,FG2014,FG2014,FG2014,FG2014,FG2014,FG2014,FG2014,FG2014,FG2014\n\
  ,FG2014,FG2014,FG2015,FG2015,FG2015,FG2015,FG2015,FG2015,FG2015,FG2015,FG2015\n\
  ,FG2015,FG2015,FG2015,FG2016,FG2016,FG2016,FG2016,FASTSTORAGE,FASTSTORAGE);\n\n\
  create unique clustered index IDX_OrdersPT_OrderDate_OrderId\non dbo.OrdersPT(OrderDate,\
  \ OrderId)\nwith\n(\n```\n\n\n# 第 16 章 ■ 数据分区\n\n## 使用临时表移动分区数据\n\n```sql\ncreate\
  \ partition function pfOrders(datetime2(0))\nas range right for values\n('2016-02-01','2016-03-01','2016-04-01','2016-05-01','2016-06-01','2016-07-01');\n\
  \ncreate partition scheme psOrders\nas partition pfOrders\nto (FG1,FG1,FG1,FG1,FG2,FG2,FG2);\n\
  \ncreate table dbo.tblOrders\n(\nOrderId int not null,\nOrderDate datetime2(0) not\
  \ null,\nOrderNum varchar(32) not null,\nOrderTotal money not null,\nCustomerId\
  \ int not null,\n/* 其他列 */\n);\n\ncreate unique clustered index IDX_tblOrders_OrderDate_OrderId\n\
  on dbo.tblOrders(OrderDate, OrderId)\non psOrders(OrderDate);\n\ncreate nonclustered\
  \ index IDX_tblOrders_CustomerId\non dbo.tblOrders(CustomerId)\non psOrders(OrderDate);\n\
  \ngo\n\ncreate view dbo.Orders(OrderId, OrderDate, OrderNum, OrderTotal, CustomerId\
  \ /*其他列*/)\nwith schemabinding\nas\nselect OrderId, OrderDate, OrderNum, OrderTotal,\
  \ CustomerId /*其他列*/\nfrom dbo.tblOrders;\n```\n\n如您所见，该脚本除了创建表之外，还创建了一个可更新的 `dbo.Orders`\
  \ 视图。所有数据访问操作都应通过该视图进行。\n\n假设您希望将 2016 年 5 月的数据移动到 `FG1` 文件组。第一步，您需要创建一个暂存表，并将 5\
  \ 月份的分区切换到该表所在的位置。该表必须驻留在 `FG2` 文件组中，并定义一个 `CHECK` 约束。实现此目标的代码如 **代码清单 16-20** 所示。\n\
  \n### 代码清单 16-20. 将分区切换到暂存表\n\n```sql\ncreate table dbo.tblOrdersStage\n(\nOrderId\
  \ int not null,\nOrderDate datetime2(0) not null,\nOrderNum varchar(32) not null,\n\
  OrderTotal money not null,\nCustomerId int not null,\n/* 其他列 */\nconstraint CHK_tblOrdersStage\n\
  check(OrderDate >= '2016-05-01' and OrderDate < '2016-06-01')\n);\n\ncreate unique\
  \ clustered index IDX_tblOrdersStage_OrderDate_OrderId\non dbo.tblOrdersStage(OrderDate,\
  \ OrderId)\non [FG2];\n\ncreate nonclustered index IDX_tblOrdersStage_CustomerId\n\
  on dbo.tblOrdersStage(CustomerId)\non [FG2];\n\nalter table dbo.tblOrders switch\
  \ partition 5 to dbo.tblOrdersStage;\n```\n\n现在，数据位于两个不同的表中，您需要修改视图，使其成为分区视图。这种变更允许客户端应用程序透明地从两张表中读取数据。然而，这会使视图无法更新。解决此问题的最简单方法是创建\
  \ `INSTEAD OF` 触发器。\n\n您可以在 **代码清单 16-21** 中看到执行此操作的代码。为了节省本书篇幅，这里只展示了一个 `INSTEAD\
  \ OF INSERT` 触发器语句。\n\n### 代码清单 16-21. 修改视图\n\n```sql\nalter view dbo.Orders(OrderId,\
  \ OrderDate, OrderNum, OrderTotal, CustomerId /*其他列*/)\n```\n\n另一种变通方法是：将分区切换到暂存表，通过在线索引重建将该表移动到新的文件组，然后将该表作为分区切换回原表。这种方法需要进行一些规划，并编写额外的代码来使其对客户端应用程序透明。\n\
  \n\n# 第 16 章 ■ 数据分区\n\n```sql\nwith schemabinding\n\nas\n\nselect OrderId, OrderDate,\
  \ OrderNum, OrderTotal, CustomerId /*Other Columns*/\n\nfrom dbo.tblOrders\n\nunion\
  \ all\n\nselect OrderId, OrderDate, OrderNum, OrderTotal, CustomerId /*Other Columns*/\n\
  \nfrom dbo.tblOrdersStage\n\ngo\n```\n\n```sql\ncreate trigger dbo.trgOrdersView_Ins\n\
  \non dbo.Orders\n\ninstead of insert\n\nas\n\nif @@rowcount = 0 return\n\nset nocount\
  \ on\n\nif not exists(select * from inserted)\n\nreturn\n```\n\n```sql\ninsert into\
  \ dbo.tblOrders(OrderId, OrderDate, OrderNum, OrderTotal, CustomerId)\n\nselect\
  \ OrderId, OrderDate, OrderNum, OrderTotal, CustomerId\n\nfrom inserted\n\nwhere\
  \ OrderDate < '2016-05-01' or OrderDate >= '2016-06-01';\n\ninsert into dbo.tblOrdersStage(OrderId,\
  \ OrderDate, OrderNum, OrderTotal, CustomerId)\n\nselect OrderId, OrderDate, OrderNum,\
  \ OrderTotal, CustomerId\n\nfrom inserted\n\nwhere OrderDate >= '2016-05-01' and\
  \ OrderDate < '2016-06-01';\n```\n\n现在，你可以通过执行索引重建，将暂存表移动到 `FG1` 文件组，如 代码清单 16-22\
  \ 所示。值得重申的是，如果表包含 `LOB` 列，在 `SQL Server 2005-2008R2` 中无法以在线操作方式工作。此外，你将需要使用变通方法，并重建索引到新的分区方案，以移动\
  \ `LOB_DATA` 分配单元，如 前面代码清单 16-14 所示。\n\n**代码清单 16-22.** 使用临时表移动分区数据：移动暂存表\n\n```sql\n\
  create unique clustered index IDX_tblOrdersStage_OrderDate_OrderId\n\non dbo.tblOrdersStage(OrderDate,\
  \ OrderId)\n\nwith (drop_existing=on, online=on)\n\non [FG1];\n\ncreate nonclustered\
  \ index IDX_tblOrdersStage_CustomerId\n\non dbo.tblOrdersStage(CustomerId)\n\nwith\
  \ (drop_existing=on, online=on)\n\non [FG1];\n```\n\n作为最后一步，你需要通过合并和拆分分区函数，将 `dbo.tblOrders`\
  \ 表的 `五月` 数据分区移动到 `FG1` 文件组。该分区是空的，因此架构修改 (`SCH-M`) 锁不会被长时间持有。之后，你可以将暂存表切换回 `dbo.tblOrders`\
  \ 表的一个分区，删除触发器，并再次修改视图。实现此操作的代码如 代码清单 16-23 所示。\n\n**代码清单 16-23.** 使用临时表移动分区数据：移动暂存表\n\
  \n```sql\nalter partition function pfOrders() merge range ('2016-05-01');\n\nalter\
  \ partition scheme psOrders next used [FG1];\n\nalter partition function pfOrders()\
  \ split range ('2016-05-01');\n\nalter table dbo.tblOrdersStage switch to dbo.tblOrders\
  \ partition 5;\n\ndrop trigger dbo.trgOrdersView_Ins;\n\nalter view dbo.Orders(OrderId,\
  \ OrderDate, OrderNum, OrderTotal, CustomerId /*Other Columns*/)\n\nwith schemabinding\n\
  \nas\n\nselect OrderId, OrderDate, OrderNum, OrderTotal, CustomerId /*Other Columns*/\n\
  \nfrom dbo.tblOrders;\n```\n\n如果你需要将数据归档到另一个表，同样的技术也适用。只要表结构和索引相同，你可以将暂存表切换为那个表的一个分区。\n\
  \n## 在磁盘阵列之间移动数据文件\n\n正如你所看到的，即使在 `SQL Server` 的企业版中，也有许多限制会阻碍在线的跨文件组数据移动。在非企业版中，这根本不可能完成，因为这些版本完全不支持在线索引重建。\n\
  \n幸运的是，仍然有一个变通方法可以让你构建分层存储，不受这些限制的影响。你可以通过将文件组的数据库文件移动到不同的磁盘阵列，来让对象保持在相同的文件组中。\n\
  \n有两种方法可以实现这一点。首先，你可以手动复制数据文件，然后修改数据库以指定它们的新位置。不幸的是，这种方法需要系统在文件复制操作期间停机，除非系统使用数据库镜像作为高可用性技术，否则对于大量数据来说，这可能需要很长时间。在后一种情况下，你可以使用以下一系列操作来移动数据库文件：\n\
  \n1.  使用 `ALTER DATABASE MODIFY FILE (FILENAME=...)` 修改文件路径。\n\n\n# 第 16 章 ■ 数据分区\n\
  \n在辅助（镜像）服务器上执行命令。这是一个元数据操作，它会在系统目录中更改文件的位置。\n\n2. 关闭辅助（镜像）实例，并将数据库文件复制到新位置。\n\n\
  3. 启动辅助（镜像）实例并执行故障转移，使其成为主（主体）服务器。\n\n4. 在先前的主（主体）服务器和现在的辅助（镜像）服务器上重复此过程。\n\n尽管此方法对客户端应用程序几乎是透明的，但它需要您关闭整个\
  \ SQL Server 实例并执行故障转移操作。如果在辅助（镜像）服务器离线时，主（主体）服务器发生故障，也存在数据丢失的可能性。\n\n还有另一种方法允许您通过向文件组添加新文件并使用\
  \ `DBCC SHRINKFILE(EMPTYFILE)` 命令收缩原始文件来在线移动数据。SQL Server 会透明地将数据在文件之间移动，对客户端应用程序保持系统在线，无论\
  \ SQL Server 的版本如何。\n\n清单 16-24 展示了将数据文件从文件组 `FG2015` 移动到磁盘 `S:` 的代码。它假设在执行前，该文件组有两个逻辑名称为\
  \ `Orders2015_01` 和 `Orders2015_02` 的文件。\n\n***清单 16-24.*** 在磁盘阵列间移动数据文件\n\n```\n\
  use master\ngo\n\nalter database OrderEntryDB\nadd file ( name = N'Orders2015_03',\
  \ filename = N'S:\\Orders2015_03.ndf' )\nto filegroup [FG1];\n\nalter database OrderEntryDB\n\
  add file ( name = N'Orders2015_04', filename = N'S:\\Orders2015_04.ndf' )\nto filegroup\
  \ [FG1];\ngo\n\nuse OrderEntryDb\ngo\n\n-- 防止第二个旧文件增长\n-- 这将停止数据在旧数据文件之间的移动\ndeclare\n\
  \    @MaxFileSizeMB int\n    ,@SQL nvarchar(max)\n\n-- 获取当前文件大小\nselect @MaxFileSizeMB\
  \ = size / 128 + 1\nfrom sys.database_files\nwhere name = 'Orders2015_02';\n\nset\
  \ @SQL = N'alter database OrderEntryDb\nmodify file(name=N''Orders2015_02'',maxsize='\
  \ +\nconvert(nvarchar(32),@MaxFileSizeMB) + N'MB);';\n\nexec sp_executesql @SQL;\n\
  \n-- 步骤 1：收缩并移除第一个旧文件\ndbcc shrinkfile(Orders2015_01, emptyfile);\nalter database\
  \ OrderEntryDb remove file Orders2015_01;\n\n-- 步骤 2：收缩并移除第二个旧文件\ndbcc shrinkfile(Orders2015_02,\
  \ emptyfile);\nalter database OrderEntryDb remove file Orders2015_02;\n```\n\n■\
  \ **重要提示** 务必使用相同的初始大小和自动增长参数（增长大小以 MB 为单位）创建新文件。这有助于 SQL Server 在数据文件之间均匀分布数据。\n\
  \n当您使用 `DBCC SHRINKFILE` 命令清空一个文件时，它会将数据分散到文件组中的所有其他文件，包括您将在后续步骤中清空并移除的文件。您可以通过限制最大文件大小并防止您要移除的文件自动增长来避免这种开销，如清单\
  \ 16-24 所示。\n\n不幸的是，此方法会导致索引碎片。在 `DBCC SHRINKFILE` 操作之后，新数据文件中的数据将高度碎片化。您应在数据移动完成后执行索引维护。\n\
  \n■ **提示**\n\n在这种情况下，`REORGANIZE` 可能是比 `REBUILD` 更好的选择。`REORGANIZE` 是一个在线操作，不会阻止对表的访问。此外，它不会增加数据文件的大小。\n\
  \n`DBCC SHRINKFILE` 和索引维护都会产生大量的事务日志活动。您需要牢记此行为，并定期进行日志备份，以便事务日志能够截断。\n\n■ **注意**\
  \ 我们将在第 30 章 “事务日志内部原理” 中更深入地讨论事务日志管理。\n\n最后，值得注意的是，此技术不适用于移动数据库中的主数据文件（MDF）。SQL\
  \ Server 不允许您从数据库中移除此文件。这是另一个\n\n\n\n# 实战中的分层存储\n\n避免在任何用户对象存储于主文件组中的原因。\n\n**提示**\
  \ 你依然可以在主（MDF）数据文件上运行 `DBCC SHRINKFILE(EMPTYFILE)` 命令。该命令会将主文件组中大部分数据移动到其他文件中，并在执行的最后阶段失败。\n\
  \n你可以使用清单 16-25 所示的脚本来监控 `SHRINK` 操作的进度。此脚本会显示每个数据库文件当前分配的文件大小和可用空间。\n\n### 清单 16-25.\
  \ 监控数据库文件的大小\n```sql\nselect\nname as [FileName], physical_name as [Path], size\
  \ / 128.0 as [CurrentSizeMB]\n,size / 128.0 - convert(int,fileproperty(name,'SpaceUsed'))\
  \ / 128.0 as [FreeSpaceMb]\nfrom sys.database_files\n```\n\n## 实战中的分层存储\n\n表 16-6\
  \ 展示了根据所使用的 SQL Server 版本和版本，对不同数据库对象可用的联机数据移动选项。\n\n### 表 16-6. 基于 SQL Server 版本和版本的数据库对象联机数据移动\n\
  \n| | 将分区移动到不同的文件组 | 将带有大对象列的表移动到不同的文件组 | 将不带大对象列的表移动到不同的文件组 | 将数据移动到不同的磁盘阵列 |\n\
  | :--- | :--- | :--- | :--- | :--- |\n| **SQL Server 2012-2016 企业版** （引入了架构修改（SCH-M）锁。可以通过临时表和分区视图实现）\
  \ | 支持直接方法 | 支持 | 支持 | 所有版本均支持 |\n| **SQL Server 2005-2008R2 企业版** （在 SQL Server\
  \ 2005-2008R2 中受大对象列脱机索引重建的限制） | | 不支持 | 支持 | |\n| **非企业版** | 不适用 | 不支持 | 不支持 |\
  \ |\n\n如你所见，使用非分区表通常比分区表更容易实现联机数据移动。这使得我们在本章“结合使用分区表和视图”一节中讨论的方法成为最优化的解决方案之一。采用这种方法，你使用非分区表来存储操作数据，将历史数据保留在分区表中，如图\
  \ 16-6 所示。\n\n![](img/index-383_1.jpg)\n\n![](img/index-383_2.jpg)\n\n# 第 16 章 ■\
  \ 数据分区\n\n让我们更深入地看看更改操作周期的过程，假设你需要归档 2016 年 5 月的数据并将操作周期延长至 2016 年 7 月。\n\n在图 16-11\
  \ 所示的第一步中，你将 `dbo.Orders2016_05` 表从 `FASTSTORAGE` 移动到 `FG2016` 文件组。\n\n### 图 16-11.\
  \ 实战中的分层存储：移动 dbo.Orders2016_05 表\n\n之后，你将 `dbo.Orders2016_05` 表切换为 `dbo.Orders2016`\
  \ 表的一个分区，在 `FASTSTORAGE` 文件组中创建一个新的 `dbo.Orders2016_07` 表，并重新创建分区视图。你可以在图 16-12\
  \ 中看到这些步骤的演示。\n\n### 图 16-12. 实战中的分层存储：后续步骤\n\n所有这些操作都可以在 SQL Server 2012 及以上版本的企业版中联机完成。只要表不包含大对象列，它们也可以在\
  \ SQL Server 2005-2008R2 中联机完成。\n\n在将 `dbo.Orders2016_05` 切换到 `dbo.Orders2016` 表时，仍有可能长时间持有架构修改（SCH-M）锁。在此过程中你需要做的一件事是更改\
  \ `dbo.Orders2016` 表上的 `CHECK` 约束，以指示该表现在存储的是 2016 年 5 月的数据。不幸的是，SQL Server 总是扫描表中的一个索引来验证\
  \ `CHECK` 约束，并在扫描期间持有架构修改（SCH-M）锁。\n\n解决此问题的一种方法是在 `CREATE`\n\n\n## 清单 16-26\n\n\
  在表上创建多个 `CHECK` 约束。\n\n```sql\ncreate table dbo.Orders2016\n(\n    OrderId int not\
  \ null,\n    OrderDate datetime2(0) not null,\n    OrderNum varchar(32) not null,\n\
  \    OrderTotal money not null,\n    CustomerId int not null,\n    constraint CHK_Orders2016_01\
  \ check(OrderDate >= '2016-01-01' and OrderDate < '2016-02-01'),\n    constraint\
  \ CHK_Orders2016_02 check(OrderDate >= '2016-01-01' and OrderDate < '2016-03-01'),\n\
  \    constraint CHK_Orders2016_03 check(OrderDate >= '2016-01-01' and OrderDate\
  \ < '2016-04-01'),\n    constraint CHK_Orders2016_04 check(OrderDate >= '2016-01-01'\
  \ and OrderDate < '2016-05-01'),\n    constraint CHK_Orders2016_05 check(OrderDate\
  \ >= '2016-01-01' and OrderDate < '2016-06-01'),\n    constraint CHK_Orders2016_06\
  \ check(OrderDate >= '2016-01-01' and OrderDate < '2016-07-01'),\n    constraint\
  \ CHK_Orders2016_07 check(OrderDate >= '2016-01-01' and OrderDate < '2016-08-01'),\n\
  \    constraint CHK_Orders2016_08 check(OrderDate >= '2016-01-01' and OrderDate\
  \ < '2016-09-01'),\n    constraint CHK_Orders2016_09 check(OrderDate >= '2016-01-01'\
  \ and OrderDate < '2016-10-01'),\n    constraint CHK_Orders2016_10 check(OrderDate\
  \ >= '2016-01-01' and OrderDate < '2016-11-01'),\n    constraint CHK_Orders2016_11\
  \ check(OrderDate >= '2016-01-01' and OrderDate < '2016-12-01'),\n    constraint\
  \ CHK_Orders2016 check(OrderDate >= '2016-01-01' and OrderDate < '2017-01-01')\n\
  )\non [FG2016]\n```\n\n`SQL Server` 在优化期间会评估所有约束，并选择限制性最强的那个。\n\n> **注意**\n> 尽管\
  \ `SQL Server` 不阻止你在每张表上创建数百甚至数千个 `CHECK` 约束，但你应该谨慎操作。极大量的 `CHECK` 约束会减慢查询优化的速度。此外，在某些情况下，优化可能会因堆栈大小限制而失败。尽管如此，这种方法在约束数量不过多的情况下运行良好。\n\
  \n## 第 16 章：数据分区\n\n### 分层存储与高可用技术\n\n尽管我们将在第 32 章更深入地讨论高可用性（HA）技术，但在本章提及它们与分层存储和数据移动的兼容性很重要。需要考虑两个不同的因素：数据库文件和文件组管理，以及数据移动开销。\n\
  \n对于 `SQL Server` 故障转移集群（你只有一个数据库副本），这两者都不影响。然而，对于基于事务日志的 HA 技术（如 `AlwaysOn Availability\
  \ Groups`、数据库镜像和日志传送）情况则不同。\n\n高可用技术都不阻止你创建数据库文件。但是，对于基于事务日志的 HA 技术，你必须在所有节点上维护完全相同的文件夹和磁盘结构，并且\
  \ `SQL Server` 必须能在各处相同路径下创建新文件。否则，HA 数据流将被挂起。\n\n另一个重要因素是由索引重建或 `DBCC SHRINKFILE`\
  \ 命令引入的开销。这些操作 I/O 密集度很高，并产生大量的事务日志记录。所有这些记录都需要传输到辅助节点，这可能会使网络饱和。\n\n不过，有一个较少人知的问题。基于事务日志的\
  \ HA 技术只处理事务日志记录。有一组线程，称为 `REDO threads`，它们以 `asynchronously`（异步）方式重做事务日志记录，并在辅助节点上将更改应用到数据文件。即使在\
  \ `AlwaysOn Availability Groups` 和数据库镜像中提供的同步（同步）模式下，`SQL Server` 也仅是 `synchronously`（同步）保存（硬化）日志记录到事务日志中。`REDO\
  \ threads` 以 `asynchronously`（异步）方式在数据库文件中应用更改。\n\n\n# 第 16 章 数据分区\n\n这里，REDO 线程的性能是限制因素。数据移动产生事务日志记录的速度可能超过\
  \ REDO 线程在数据文件中应用更改的速度。REDO 进程需要几分钟甚至几小时才能追上进度的情况并不少见。这可能导致故障切换时系统停机时间延长，因为在新主节点中的数据库在\
  \ REDO 阶段完成之前会一直保持恢复状态。\n\n如果你正在使用 AlwaysOn 可用性组的可读次要副本，也应该小心。尽管数据在 REDO 过程中可用，但它不是最新的，并且针对主节点和次要节点的查询会返回不同的结果。\n\
  \n■ **注意** 任何类型的繁重事务日志活动都可能给可读次要副本带来此类问题。\n\n当使用基于事务日志的高可用性技术时，实施分层存储应谨慎。你应该将故障切换期间潜在的停机时间纳入可用性\
  \ SLA，并通过逐个索引移动数据来最小化它，让次要副本在操作间隙追赶进度。你还应该在数据移动期间阻止对只读次要副本的访问。\n\n#### 实现滑动窗口场景和数据清除\n\
  \nOLTP 系统通常需要将数据保留特定时长。例如，一个订单录入系统可能保留一年的订单，并运行一个每月第一天执行的进程来删除更早的订单。通过这种称为*滑动窗口*场景的实现方式，你有一个在数据上*滑动*的窗口，并根据给定的时间表清除最旧的数据。\n\
  \n对于非分区数据，实现滑动窗口场景的唯一方法是使用`DELETE`语句清除数据。这种方法会带来巨大的 I/O 和事务日志开销。此外，它还可能引发系统中的并发和阻塞问题。幸运的是，数据分区极大地简化了这项任务，使清除操作变成仅涉及元数据的操作。\n\
  \n当你实现滑动窗口场景时，通常根据清除间隔对数据进行分区。尽管这不是强制要求，但它有助于将清除过程保持在元数据级别。例如，在刚才描述的订单录入系统中，你可以按月对数据进行分区。\n\
  \n对于分区视图，清除过程很简单。你需要删除最旧的表，为*下一个分区周期*的数据创建另一个表，然后重新创建分区视图。必须预先定义好下一个分区周期的表，以确保始终有地方可以插入数据。\n\
  \n分区表的实现是类似的。你可以通过将相应的分区切换到临时表来清除旧数据，然后可以截断该临时表。对于下个月的数据，你需要使用拆分分区功能。\n\n不过，有一个注意事项。为了将操作保持在元数据级别并减少持有架构修改（`SCH-M`）锁的时间，你应该保持最右侧的分区为空。这可以防止\
  \ SQL Server 在拆分过程中移动数据，这对于大表来说可能非常耗时。\n\n■ **注意** 即使是元数据级别的分区切换，在非常活跃的 OLTP 系统中也可能导致锁和阻塞。SQL\
  \ Server 2014 引入了低优先级锁的概念，可用于在此类操作期间提高系统并发性。我们将在[第 23 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_23)“架构锁”中详细讨论它们。\n\
  \n让我们看一个例子，假设现在是 2016 年 6 月，清除过程将在 7 月 1 日运行。\n\n如清单 16-27 所示，分区函数`pfOrderData`的边界值是\
  \ 2016-07-01 和 2016-08-01。这些值预定义了两个分区：一个用于 2016 年 7 月的数据，另一个是空的、最右侧的分区，你将在清除过程中拆分它。\n\
  \n\n\n# 数据分区\n\n## 滑动窗口场景\n\n预先定义好两个分区非常重要。数据将在 purge 过程运行之前，于 2016 年 7 月 1 日午夜插入到\
  \ 2016 年 7 月的分区中。空的右侧最末分区保证了在 purge 过程中进行的分区拆分将在元数据级别完成。\n\n脚本中还创建了一个 `dbo.OrderDataTmp`\
  \ 表，我们将用它作为分区切换和 purge 的目标。该表必须与左侧最末分区位于同一文件组中，并具有相同的模式和索引定义。\n\n***清单 16-27.***\
  \ 滑动窗口场景：对象创建\n\n```sql\ncreate partition function pfOrderData(datetime2(0))\nas\
  \ range right for values\n('2015-07-01','2015-08-01','2015-09-01','2015-10-01','2015-11-01','2015-12-01'\n\
  ,'2016-01-01','2016-02-01','2016-03-01','2016-04-01','2016-05-01','2016-06-01'\n\
  ,'2016-07-01','2016-08-01' /* One extra empty partition */ );\n\ncreate partition\
  \ scheme psOrderData as partition pfOrderData all to ([FG1]);\n\ncreate table dbo.OrderData\n\
  (\n    OrderId int not null,\n    OrderDate datetime2(0) not null,\n    OrderNum\
  \ varchar(32) not null,\n    OrderTotal money not null,\n    CustomerId int not\
  \ null,\n    /* Other Columns */\n);\n\ncreate unique clustered index IDX_OrderData_OrderDate_OrderId\n\
  \    on dbo.OrderData(OrderDate, OrderId)\n    on psOrderData(OrderDate);\n\ncreate\
  \ nonclustered index IDX_OrderData_CustomerId\n    on dbo.OrderData(CustomerId)\n\
  \    on psOrderData(OrderDate);\n\ncreate table dbo.OrderDataTmp\n(\n    OrderId\
  \ int not null,\n    OrderDate datetime2(0) not null,\n    OrderNum varchar(32)\
  \ not null,\n    OrderTotal money not null,\n    CustomerId int not null,\n    /*\
  \ Other Columns */\n);\n\ncreate unique clustered index IDX_OrderDataTmp_OrderDate_OrderId\n\
  \    on dbo.OrderDataTmp(OrderDate, OrderId)\n    on [FG1];\n\ncreate nonclustered\
  \ index IDX_OrderDataTmp_CustomerId\n    on dbo.OrderDataTmp(CustomerId)\n    on\
  \ [FG1];\n```\n\nPurge 过程如清单 16-28 所示。它将左侧最末分区切换到临时表，并拆分右侧最末分区，为下个月的运行创建一个新的空分区。\n\
  \n***清单 16-28.*** 滑动窗口场景：Purge 过程\n\n```sql\n-- Purging old partition\nalter table\
  \ dbo.OrderData switch partition 1 to dbo.OrderDataTmp;\ntruncate table dbo.OrderDataTmp;\n\
  \n-- Creating new partition\nalter partition scheme psOrderData next used [FG1];\n\
  alter partition function pfOrderData() split range('2016-09-01');\n```\n\n#### 潜在问题\n\
  \n尽管数据分区带来诸多好处，但它们也是有代价的。首先，SQL Server 要求分区表中的分区列必须是聚集索引键的一部分。这反过来又会将该列添加到行 ID 中，并增加每个非聚集索引中的行大小。例如，在一个存储\
  \ 3.65 亿行的表中，一个 `datetime` 类型的分区列会为每个非聚集索引增加 2.7 GB 的空间，这还不计算碎片开销和非叶级存储空间。\n\n■\
  \ **提示** 始终根据业务需求选择最节省存储的数据类型。在上面的例子中，如果可以接受一分钟或一秒的精度，你可以使用 `smalldatetime`（4 字节）或\
  \ `datetime2(0)`（6 字节）来代替 `datetime`（8 字节）。\n\n尽管在某些情况下，你可以通过在历史数据上实施数据压缩来缓解这种空间增长，但行\
  \ ID 大小的增加也可能为索引添加新的非叶级，并在 SQL Server 遍历索引 B 树时导致额外的读取操作。\n\n唯一性支持是另一个问题。你无法在分区视图上创建唯一约束或索引。对于分区表，SQL\
  \ Server 要求分区列是已对齐的唯一非聚集索引的一部分。这仅在单个分区范围内强制唯一性。虽然你可以定义未对齐的唯一索引，但这会阻止你使用分区切换——这是分区表最大的好处之一。\n\
  \n不幸的是，对于这个问题没有简单的解决方案。在需要支持...\n\n\n为了在多个数据分区之间实现唯一性，你必须实现复杂的代码，通常需要使用`SERIALIZEABLE`事务隔离级别，这会在系统中引入阻塞问题。我们将在第\
  \ 17 章“锁类型”中更深入地讨论事务隔离级别。\n\n最终，数据分区的最大问题是它会改变查询的执行计划。对于某些查询，它可能引入次优的性能，而这些查询在数据未分区时运行良好。\n\
  \n让我们看一个这样的例子，创建一个非分区表，然后用一些随机数据填充它，如清单 16-29 所示。\n\n### 清单 16-29. 数据分区的潜在问题：创建非分区表\n\
  ```sql\ncreate table dbo.Data\n(\n    Id int not null,\n    DateCreated datetime\
  \ not null\n        constraint DEF_Data_DateCreated default getutcdate(),\n    DateModified\
  \ datetime not null\n        constraint DEF_Data_DateModified default getutcdate(),\n\
  \    Placeholder char(500) null\n);\n\ncreate unique clustered index IDX_Data_Id\n\
  \    on dbo.Data(DateCreated, Id);\n\ncreate unique nonclustered index IDX_Data_DateModified_Id\n\
  \    on dbo.Data(DateModified, Id);\n\ndeclare @StartDate datetime = '2016-01-01';\n\
  \n;with N1(C) as (select 0 union all select 0) -- 2 rows\n,N2(C) as (select 0 from\
  \ N1 as T1 cross join N1 as T2) -- 4 rows\n,N3(C) as (select 0 from N2 as T1 cross\
  \ join N2 as T2) -- 16 rows\n,N4(C) as (select 0 from N3 as T1 cross join N3 as\
  \ T2) -- 256 rows\n,N5(C) as (select 0 from N4 as T1 cross join N4 as T2) -- 65,536\
  \ rows\n,N6(C) as (select 0 from N5 as T1 cross join N2 as T2 cross join N1 as T3)\
  \ -- 524,288 rows\n,IDs(ID) as (select row_number() over (order by (select NULL))\
  \ from N6)\ninsert into dbo.Data(ID, DateCreated, DateModified)\nselect ID, dateadd(second,35\
  \ * Id,@StartDate),\n    case\n        when ID % 10 = 0\n        then\n        \
  \    dateadd(second, 24 * 60 * 60 * (ID % 31) + 11200 + ID % 59 + 35 * ID,\n   \
  \         @StartDate)\n        else dateadd(second,35 * ID,@StartDate)\n    end\n\
  from IDs;\n```\n\n假设我们有一个从表中读取修改数据并将其导出到某处的进程。虽然实现此任务有几种不同的方法，但也许最简单的方法是使用查询，如清单\
  \ 16-30 所示，其中`@DateModified`参数代表上一次读取记录集中最近的`DateModified`值。\n\n### 清单 16-30. 数据分区的潜在问题：读取修改的数据\n\
  ```sql\nselect top (@Top) Id, DateCreated, DateModified, PlaceHolder\nfrom dbo.Data\n\
  where DateModified > @LastDateModified\norder by DateModified, Id\n```\n\n该查询（选择\
  \ 100 行）的执行计划如图 16-13 所示。该计划非常高效，它利用了一个带范围扫描的`nonclustered index seek`。SQL Server\
  \ 找到第一行`DateModified`值超过`@LastDateModified`的行，然后扫描索引，从中选择前 100 行。\n\n**图 16-13.**\
  \ 非分区表的执行计划\n\n现在，让我们按月对表进行分区，如清单 16-31 所示。\n\n### 清单 16-31. 数据分区的潜在问题：对表进行分区\n\
  ```sql\ncreate partition function pfData(datetime)\nas range right for values\n\
  ('2016-02-01', '2016-03-01','2016-04-01','2016-05-01','2016-06-01','2016-07-01','2016-08-01');\n\
  \ncreate partition scheme psData as partition pfData all to ([FG1]);\n\ncreate unique\
  \ clustered index IDX_Data_DateCreated_Id\n    on dbo.Data(DateCreated,ID)\n   \
  \ on psData(DateCreated);\n\ncreate unique nonclustered index IDX_Data_DateModified_Id_DateCreated\n\
  \    on dbo.Data(DateModified, ID, DateCreated)\n    on psData(DateCreated);\n```\n\
  \n如果你再次运行清单 16-30 中的代码，执行计划将发生变化，如...\n\n\n\n如图 16-14 所示，SQL Server 决定使用`clustered\
  \ index scan`（聚集索引扫描），这显著降低了查询的性能。\n\n**图 16-14.** 分区表的执行计划\n\n问题的根本原因在于，聚集索引和非聚集索引中的数据现在是在分区内排序，而不是在整个表上排序。你可以将每个分区视为一个独立的表，拥有自己的数据集和索引。在这种情况下，SQL\
  \ Server 认为`clustered index scan`是成本最低的执行选项。\n\n让我们看看如果你通过索引提示强制 SQL Server 使用非聚集索引会发生什么，如清单\
  \ 16-32 所示。\n\n**清单 16-32.** 数据分区可能导致的潜在问题：使用带提示的非聚集索引\n\n```sql\ndeclare\n    @LastDateModified\
  \ datetime = '2016-05-25'\n\nselect top 100 Id, DateCreated, DateModified, PlaceHolder\n\
  from dbo.Data with (index=IDX_Data_DateModified_Id_DateCreated)\nwhere DateModified\
  \ > @LastDateModified\norder by DateModified, Id\n```\n\n如图 16-15 所示，执行计划甚至比之前效率更低。SQL\
  \ Server 从每个分区定位并读取了所有`DateModified`大于`@LastDateModified`的行，并对所有这些行执行了`key lookup`（键查找）操作，之后还进行了排序。\n\
  \n**图 16-15.** 使用索引提示的执行计划\n\n![](img/index-391_1.jpg)\n\n**第 16 章 ■ 数据分区**\n\n\
  没有简单的方法可以解决此问题。你可以使用未对齐的非聚集索引，即不分区的索引。不幸的是，在这种情况下，你无法使用分区切换，也无法执行部分数据库恢复，从而无法使数据子集对客户可用。因此，你唯一的选择是重构代码。\n\
  \n■ **提示** 你可以在分区切换之前删除一个未对齐的非聚集索引，并在切换完成后重新创建它。\n\n`$PARTITION`系统函数根据作为参数提供的值返回分区号。你可以在查询的`where`子句中使用此函数，从而排除其他分区，并生成与针对非分区表的查询类似的执行计划。你可以查看从分区\
  \ 5 中读取修改行的查询，如清单 16-33 所示。\n\n**清单 16-33.** 数据分区可能导致的潜在问题：从单个分区选择数据\n\n```sql\n\
  declare\n    @LastDateModified datetime = '2016-05-25'\n\nselect top 100 Id, DateCreated,\
  \ DateModified, PlaceHolder\nfrom dbo.Data with (index=IDX_Data_DateModified_Id_DateCreated)\n\
  where\n    DateModified > @LastDateModified and\n    $partition.pfData(DateCreated)\
  \ = 5\norder by DateModified, Id\n```\n\n如图 16-16 所示，执行计划与从非分区表中读取修改数据的查询非常相似。\n\
  \n**图 16-16.** 查询“从单个分区选择数据”的执行计划\n\n在某些情况下，你可以利用此行为来优化针对分区表的查询。在我们的案例中，你可以使用以下算法：\n\
  \n1.  使用`$PARTITION`函数从每个分区读取前 100 个修改行，将执行范围限制在单个分区内。\n2.  对上一步中读取的行进行排序，并从所有分区中选择前\
  \ 100 行。\n3.  从聚集索引中选择由上一步返回的 100 行的数据。\n\n**第 16 章 ■ 数据分区**\n\n该算法的第一步要求你了解表中的分区数量。你可以使用`sys.partition_range_values`\
  \ DMV 来查找分区函数中边界值的数量，该数量比表中的分区数少一。\n\n清单 16-34 中的代码展示了一个优化后的查询版本。`Partitions` CTE\
  \ 返回表中对应的分区编号，这些编号在`CROSS APPLY`中用作筛选器。\n\n\n\n\n`Steps1and2` CTE 的 `CROSS APPLY`\
  \ 运算符。`CROSS APPLY` 运算符实现了算法的第一步。`CROSS APPLY` 中的 `SELECT` 语句对每个分区执行一次。\n\n`Steps1and2`\
  \ CTE 中的外部 `select` 语句对 `CROSS APPLY` 运算符跨所有分区返回的数据进行排序，这是算法的第二步。\n\n最后，CTE 之外的最后一个\
  \ `SELECT` 是算法的第三步。\n\n***清单 16-34.*** 数据分区可能存在的问题：优化后的查询\n\n```\ndeclare\n    @LastDateModified\
  \ datetime = '2016-05-25'\n    ,@BoundaryValuesCount int\n\n-- 获取分区函数中的边界值数量\nselect\
  \ @BoundaryValuesCount = max(boundary_id)\nfrom sys.partition_functions pf join\
  \ sys.partition_range_values prf on\n    pf.function_id = prf.function_id\nwhere\
  \ pf.name = 'pfData';\n\n;with Partitions(PartitionNum)\nas\n(\n    select 1\n \
  \   union all\n    select PartitionNum + 1\n    from Partitions\n    where PartitionNum\
  \ <= @BoundaryValuesCount\n)\n,Steps1and2(Id, DateCreated, DateModified)\nas\n(\n\
  \    select top 100 PartData.ID, PartData.DateCreated, PartData.DateModified\n \
  \   from Partitions p\n    cross apply\n    (   -- 步骤 1 - 每个分区执行一次\n        select\
  \ top 100 Id, DateCreated, DateModified\n        from dbo.Data\n        where\n\
  \            DateModified > @LastDateModified and\n            $Partition.pfData(DateCreated)\
  \ = p.PartitionNum\n        order by DateModified, ID\n    ) PartData\n    order\
  \ by PartData.DateModified, PartData.Id\n)\n-- 步骤 3 - CI 索引查找作为键查找操作\nselect s.Id,\
  \ s.DateCreated, s.DateModified, d.Placeholder\nfrom Steps1and2 s join dbo.Data\
  \ d on\n    d.Id = s.Id and s.DateCreated = d.DateCreated\norder by s.DateModified,\
  \ s.Id\n```\n\n![](img/index-393_1.jpg)\n\n第 16 章 ■ 数据分区\n\n你可以在图 16-17 中看到该查询的执行计划。该计划的效率几乎与针对非分区表的计划一样高。\n\
  \n***图 16-17.*** 优化后查询的执行计划\n\n不幸的是，SQL Server 低估了递归 CTE 的执行次数和返回的行数。在某些情况下，这可能导致进一步的基数估计错误和次优的执行计划。你可以通过使用临时表来存储分区号来避免此错误，如清单\
  \ 16-35 所示。\n\n***清单 16-35.*** 在临时表中存储分区号\n\n```\ndeclare\n    @LastDateModified\
  \ datetime = '2016-05-25',\n    @BoundaryValuesCount int\n\ncreate table #Partitions(PartitionNum\
  \ smallint not null primary key);\n\n-- 获取分区函数中的边界值数量\nselect @BoundaryValuesCount\
  \ = max(boundary_id)\nfrom sys.partition_functions pf join sys.partition_range_values\
  \ prf on\n    pf.function_id = prf.function_id\nwhere pf.name = 'pfData';\n\n;with\
  \ Partitions(PartitionNum)\nas\n(\n    select 1\n    union all\n    select PartitionNum\
  \ + 1\n    from Partitions\n    where PartitionNum <= @BoundaryValuesCount\n)\n\
  insert into #Partitions(PartitionNum)\nselect PartitionNum from Partitions;\n\n\
  第 16 章 ■ 数据分区\n\n;with Steps1and2(Id, DateCreated, DateModified)\nas\n(\n    select\
  \ top 100 PartData.ID, PartData.DateCreated, PartData.DateModified\n    from #Partitions\
  \ p\n    cross apply\n    (\n        select top 100 Id, DateCreated, DateModified\n\
  \        from dbo.Data\n        where\n            DateModified > @LastDateModified\
  \ and\n            $Partition.pfData(DateCreated) = p.PartitionNum\n        order\
  \ by DateModified, ID\n    ) PartData\n    order by PartData.DateModified, PartData.Id\n\
  )\n-- 步骤 3 - CI 索引查找作为键查找操作\nselect s.Id, s.DateCreated, s.DateModified, d.Placeholder\n\
  from Steps1and2 s join dbo.Data d on\n    d.Id = s.Id and s.DateCreated = d.DateCreated\n\
  order by s.DateModified, s.Id\n```\n\n或者，如果分区数量是静态且预定义的，你可以将其硬编码在 `Partitions` CTE\
  \ 中，如清单 16-36 所示。\n\n***清单 16-36.*** 硬编码分区号\n\n```\ndeclare\n    @LastDateModified\
  \ datetime = '2016-05-25'\n\n;with Partitions(PartitionNum)\nas\n(\n    select v.V\
  \ from (values(1),(2),(3),(4),(5),(6),(7),(8)) v(V)\n)\n,Steps1and2(Id, DateCreated,\
  \ DateModified)\nas\n(\n    select top 100 PartData.ID, PartData.DateCreated, PartData.DateModified\n\
  \    from Partitions p\n    cross apply\n    (\n        select top 100 Id, DateCreated,\
  \ DateModified\n        from dbo.Data\n        where\n            DateModified >\
  \ @LastDateModified and\n```\n\n\n```markdown\n$Partition.pfData(DateCreated) =\
  \ p.PartitionNum\n\norder by DateModified, ID\n\n) PartData\n\norder by PartData.DateModified,\
  \ PartData.Id\n\n)\n\n## 第 16 章 ■ 数据分区\n\n```\n-- 步骤 3 - 作为键查找操作的 CI 查找\n\nselect\
  \ s.Id, s.DateCreated, s.DateModified, d.Placeholder\n\nfrom Steps1and2 s join dbo.Data\
  \ d on\n\nd.Id = s.Id and s.DateCreated = d.DateCreated\n\norder by s.DateModified,\
  \ s.Id\n```\n\n回顾一下，数据分区会改变查询的执行计划。您应该在预发布环境中，使用与生产环境规模及数据分布相似的数据库，仔细测试系统。这将有助于避免在生产服务器上实施变更时出现令人不快的意外。\n\
  \n#### 总结\n\n管理大量数据是一项具有挑战性的任务，尤其是在数据未分区的情况下。将大量数据存放在同一位置，效率低下，原因有多种。它会增加存储成本，并因数据不同部分的工作负载和索引管理需求不同而引入额外开销。此外，它还阻碍了分段数据库恢复，这使得满足可用性\
  \ SLA 变得复杂。\n\nSQL Server 提供了两种主要的数据分区技术。分区表在 SQL Server 企业版中可用。它允许您将表数据分区到单独的内部表/分区中，这对客户端应用程序是透明的。每个分区可以放在自己的文件组中，并拥有自己的数据压缩设置。但是，数据库架构、索引和统计信息在所有分区中是相同的。\n\
  \n或者，您可以通过将数据分隔到多个表中来进行分区，并使用 `union all` 运算符通过分区视图将它们全部组合起来。每个表可以有自己的架构、索引集和统计信息。分区视图在\
  \ SQL Server 的所有版本中都受支持。\n\n尽管分区视图更加灵活，但这种实现需要重构代码，并且由于涉及大量表而增加了系统维护成本。您可以通过结合使用分区表和分区视图来降低该成本。\n\
  \n数据分区通过实施分层存储，有助于降低存储子系统成本。采用这种方法，您可以将活动操作数据放在快速磁盘阵列上，同时将很少访问的历史数据放在更便宜的磁盘上。您应该设计一种策略，允许在需要时在不同磁盘阵列之间移动数据。SQL\
  \ Server 的不同版本和 edition 需要不同的任务实现方法。\n\n当使用基于事务日志的高可用性技术时，移动大量数据应谨慎。大量的事务日志记录会导致辅助节点上的\
  \ REDO 进程积压，并且在发生故障转移时可能增加系统停机时间。此外，在积压的情况下，您应防止查询访问可读辅助副本。\n\n您可以使用数据分区来提高数据导入和清除操作的性能及并发性。在系统中实施滑动窗口场景时，请确保保持最右侧分区为空。\n\
  \n最后，数据分区是有成本的。对于分区表，分区列必须包含在聚集索引中，这会增加非聚集索引行的大小。此外，索引在各个分区内排序。这可能导致次优执行计划，并在分区实施后出现性能下降。`$PARTITION`\
  \ 函数可用于访问各个分区中的数据，这有助于优化。\n\n## 第三部分 锁定、阻塞与并发\n\n### 第 17 章 锁类型与事务隔离级别\n\n并发模型可能是\
  \ SQL Server 内部最不为人所理解的部分。它常常令人困惑；几乎在每个 SQL Server 安装中，您都可能遇到难以解释的阻塞问题。\n```\n\n\
  \n# 第 17 章 ■ 锁类型与事务隔离级别\n\n然而在内部，SQL Server 的并发模型是基于几个定义明确的原则构建的，我们将在本书的这一部分对此进行讨论。\n\
  \n本章从 SQL Server 并发性的关键概念——锁——开始。它将概述 SQL Server 中的主要锁类型，解释其兼容性，并最终演示不同的事务隔离级别如何影响系统中锁的生命周期。\n\
  \n## 第三部分代码\n\n本书第三部分的所有代码示例都将依赖于此处定义的 `Delivery.Orders` 表。该表在 `OrderId` 列上有一个聚集主键，且未定义任何非聚集索引。\n\
  \n```sql\ncreate table Delivery.Orders\n(\n    OrderId int not null identity(1,1),\n\
  \    OrderDate smalldatetime not null,\n    OrderNum varchar(20) not null,\n   \
  \ Reference varchar(64) null,\n    CustomerId int not null,\n    PickupAddressId\
  \ int not null,\n    DeliveryAddressId int not null,\n    Amount smallmoney not\
  \ null,\n    ModTime datetime2(0) not null,\n    Placeholder char(100) not null\n\
  \    constraint PK_Orders\n    primary key clustered(OrderId)\n)\n```\n\n© Dmitri\
  \ Korotkevitch 2016\nD. Korotkevitch, *Pro SQL Server Internals*, DOI 10.1007/978-1-4842-1964-5_17\n\
  \n## 事务与 ACID\n\n事务是读取和修改数据库中数据的工作单元，有助于确保系统中数据的一致性和持久性。在一个正确实现的事务管理系统中，每个事务都具有四个不同的特性，即原子性、一致性、隔离性和持久性，通常合称为\
  \ ACID。\n\n-   **原子性**保证每个事务都以“全有或全无”的方式执行。事务中所做的所有更改要么全部提交，要么全部回滚。考虑在支票账户和储蓄账户之间转账的经典例子。该操作包含两个独立的操作：减少支票账户的余额和增加储蓄账户的余额。事务原子性保证这两个操作要么同时成功，要么同时失败，系统永远不会出现资金已从支票账户扣除但从未添加到储蓄账户的情况。\n\
  -   **一致性**确保任何数据库事务都将数据库从一个一致状态带到另一个一致状态，并且不违反任何已定义的数据库规则和约束。\n-   **隔离性**确保事务中所做的更改是隔离的，并且在事务提交之前对其他事务不可见。\n\
  -   **持久性**保证事务提交后，该事务所做的所有更改都是永久性的，并且能够在系统崩溃后幸存。SQL Server 通过在提交阶段将事务日志记录刷写到磁盘来实现持久性。\n\
  \n隔离性，也许是最复杂的实现要求。理论上，事务隔离应保证多个事务的并发执行使系统达到与这些事务串行执行相同的状态。然而，在大多数数据库系统中，这一规则通常被放宽，并通过事务隔离级别进行控制。\n\
  \n从历史上看，SQL Server 支持六个隔离级别，可分为两个不同的类别。**悲观隔离级别**，如 `READ UNCOMMITTED`、`READ COMMITTED`、`REPEATABLE\
  \ READ` 和 `SERIALIZABLE` 严格依赖于锁机制。**乐观隔离级别**——`READ COMMITTED SNAPSHOT` 和 `SNAPSHOT`——除了锁之外，还利用行版本控制。\n\
  \n我们将在本章详细讨论悲观隔离级别，并在本书第 21 章介绍乐观隔离级别。\n\n#### 主要锁类型\n\nSQL Server 使用锁来支持事务的隔离要求。锁在资源（如数据行、页、表（对象）、数据库等）上获取和持有。默认情况下，SQL\
  \ Server 在访问资源时获取锁。\n\n\n\n# SQL Server 中的锁类型与事务隔离级别\n\n服务器在对数据行获取锁时使用行级锁定，这最大限度地减少了系统中可能的并发问题。然而，你应该记住，SQL\
  \ Server 提供的唯一保证是基于事务隔离级别来强制数据隔离和一致性。锁行为并未被完整记录，并且在某些情况下，SQL Server 可能会选择使用比行级锁定更低的锁定粒度。尽管如此，锁兼容性规则总是会被强制执行，理解锁定模型足以帮助你排查和解决系统中的大多数并发问题。\n\
  \n在内部，SQL Server 使用超过 20 种不同的锁类型。然而，根据其类型和用途，它们可以被分为几个主要类别。\n\n## 排他 (X) 锁\n\n排他锁由**写入者**获取——即修改数据的\
  \ `INSERT`、`UPDATE`、`DELETE` 和 `MERGE` 语句。这些查询在受影响的行上获取排他锁，并持有它们直到事务结束。正如其名——*排他*意味着*独占*——在任何给定时间点，只有一个会话可以持有某个资源上的排他锁。此行为强制了系统中最重要的并发规则——多个会话不能同时修改相同的数据。就是这样。\n\
  \n在第一个事务完成并释放被修改行上的排他锁之前，其他会话无法在该行上获取排他锁。\n\n事务隔离级别不影响排他锁的行为。即使在 `READ UNCOMMITTED`\
  \ 模式下，排他锁也会被获取并持有直到事务结束。你的事务持续时间越长，排他锁被持有的时间也就越长。\n\n## 意向锁\n\n尽管行级锁定提高了数据一致性，但只将锁保持在行级别从性能角度来看是糟糕的。考虑一种情况，一个会话需要独占访问整个表——例如，在修改表结构时。在这种情况下，如果只有行级锁定存在，该会话将不得不扫描整个表，检查是否有任何行级锁被持有。正如你可以想象的，这将是一个效率极低的过程，尤其是在大表上。\n\
  \nSQL Server 通过引入**意向锁**的概念来解决这种情况。意向锁在数据页和表级别持有，它们指示了子对象上存在锁。让我们运行清单 17-1 中的代码，并检查在更新表中一行后持有的锁。该代码使用\
  \ `sys.dm_tran_locks` 动态管理视图，它返回系统中当前锁请求的信息。\n\n***清单 17-1.*** 更新一行并检查持有的锁\n\n```sql\n\
  set transaction isolation level read uncommitted\nbegin tran\nupdate Delivery.Orders\n\
  set Reference = 'New Reference'\nwhere OrderId = 100;\n\nselect resource_type, resource_description,\n\
  request_type, request_mode, request_status\nfrom sys.dm_tran_locks\nwhere request_session_id\
  \ = @@spid;\ncommit\n```\n\n图 17-1 展示了此 `SELECT` 语句的输出。如你所见，SQL Server 在行（键）上持有一个排他锁，并在页和对象（表）上各持有一个意向排他锁。这些意向排他锁指示了存在的行级排他锁。最后，在数据库上还有一个共享锁，我们将在本章后面介绍。\n\
  \n![](img/index-400_1.jpg)\n\n***图 17-1.** 排他锁和意向排他锁*\n\n`resource_description`\
  \ 列指示了这些锁所获取的资源。对于页，它指示其物理位置（数据库文件 1 中的页 944），对于行（键），它指示索引键的哈希值。\n\n\n\n当一个会话需要获取对象或页面级别的锁时，它可以检查与表或页面上持有的其他锁（意向锁或完整锁）的兼容性，而无需扫描表/页面并在那里检查行级锁。\n\
  \n## 更新 (U) 锁\n\n在数据修改过程中，SQL Server 会使用另一种锁类型——`更新 (U) 锁`，在搜索需要更新的行时获取。获取 `更新 (U)`\
  \ 锁后，SQL Server 会读取该行，并通过将行数据与查询谓词进行比对来评估该行是否需要更新。如果需要更新，SQL Server 会将 `更新 (U)`\
  \ 锁转换为 `排他 (X)` 锁，然后执行数据修改。否则，`更新 (U)` 锁将被释放。\n\n让我们看下面的例子，并运行代码清单 17-2 中的代码。\n\n\
  **代码清单 17-2.** 使用聚集索引键作为谓词来更新多行\n\n```sql\nbegin tran\n\nupdate Delivery.Orders\n\
  set Reference = 'New Reference'\nwhere OrderId in (1000, 5000);\n\ncommit\n```\n\
  \n图 17-2 说明了在查询执行期间锁是如何获取和释放的。SQL Server 首先在表上获取了 `意向排他 (IX)` 锁，然后在页面上获取了 `意向更新\
  \ (IU)` 锁，在行上获取了 `更新 (U)` 锁，随后将它们转换为 `意向排他 (IX)` 和 `排他 (X)` 锁。这些锁一直持有到事务结束，并在 `COMMIT`\
  \ 时释放。\n\n![](img/index-401_1.jpg)\n\n第 17 章 ■ 锁类型与事务隔离级别\n\n**图 17-2.** `更新 (U)`\
  \ 锁和 `排他 (X)` 锁\n\n`更新 (U)` 锁的行为取决于执行计划。在某些情况下，SQL Server 会首先在所有行上获取 `更新 (U)` 锁，然后才将它们转换为\
  \ `排他 (X)` 锁。在其他情况下——例如，当你根据聚集索引值只更新一行时——SQL Server 可能完全不使用 `更新 (U)` 锁，而是直接获取一个\
  \ `排他 (X)` 锁。\n\n获取的锁数量也极大地取决于执行计划。让我们运行语句 `UPDATE Delivery.Orders SET Reference\
  \ = 'Ref' WHERE OrderNum='1000'`，该语句基于 `OrderNum` 列来过滤数据。图 17-3 说明了在执行过程中获取和释放的锁，以及处理的锁总数。\n\
  \n![](img/index-402_1.jpg)\n\n第 17 章 ■ 锁类型与事务隔离级别\n\n**图 17-3.** 查询执行期间的锁\n\n`OrderNum`\
  \ 列上没有索引，SQL Server 需要执行一次 `聚集索引扫描`，从而在表的每一行上获取一个 `更新 (U)` 锁。尽管该语句只更新了一行，但获取的锁数量却超过了一百万个。\n\
  \n这种行为是典型的阻塞场景之一。设想这样一种情况：一个会话在单行上持有一个 `排他 (X)` 锁。如果另一个会话尝试通过运行一个未优化的 `UPDATE` 语句来更新不同的行，SQL\
  \ Server 将在其扫描的每一行上获取一个 `更新 (U)` 最终在读取那行持有 `排他 (X)` 锁的行时被阻塞。即使第二个会话不需要更新那一行；SQL\
  \ Server 仍然需要获取一个 `更新 (U)` 锁来评估该行是否需要更新。\n\n## 共享 (S) 锁\n\n`共享 (S) 锁` 由系统中的读取者——即\
  \ `SELECT` 查询——获取。顾名思义，`共享 (S)` 锁彼此兼容，多个会话可以同时对同一资源持有 `共享 (S)` 锁。\n\n让我们运行表 17-1\
  \ 中的代码来演示这一点。\n\n**表 17-1.** `共享 (S)` 锁\n\n**会话 1 (SPID=53)**\n\n**会话 2 (SPID=55)**\n\
  \n`set transaction isolation level repeatable read`\n\n`set transaction isolation\
  \ level repeatable read`\n\n`begin tran`\n\n`begin tran`\n\n`select OrderNum`\n\n\
  `select OrderNum`\n\n`from Delivery.Orders`\n\n`from Delivery.Orders`\n\n`where\
  \ OrderId = 500;`\n\n`where OrderId = 500;`\n\n`select request_session_id, resource_type,\
  \ resource_description, request_type, request_mode, request_status`\n\n`from sys.dm_tran_locks;`\n\
  \n`commit;`\n\n\n\n# 第十七章 锁类型与事务隔离级别\n\n图 17-4 展示了`sys.dm_tran_locks`视图的输出。如你所见，两个会话都在数据库上获取了共享锁(S)，在表和页(1:955)上获取了意向共享锁(IS)，并在行上获取了共享锁(S)，彼此之间都没有发生阻塞。\n\
  \n**图 17-4.** 会话获取的锁\n\n#### 锁的兼容性、行为与生命周期\n\n表 17-2 展示了锁兼容性矩阵。\n\n**表 17-2.** 锁兼容性矩阵\
  \ (I, S, U, X 锁)\n\n| | **(IS)** | **(S)** | **(IU)** | **(U)** | **(IX)** | **(X)**\
  \ |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| **(IS)** | 是 | 是 | 是\
  \ | 是 | 是 | 否 |\n| **(S)** | 是 | **是** | 是 | **是** | 否 | **否** |\n| **(IU)** | 是\
  \ | 是 | 是 | 否 | 是 | 否 |\n| **(U)** | 是 | **是** | 否 | **否** | 否 | **否** |\n| **(IX)**\
  \ | 是 | 否 | 是 | 否 | 是 | 否 |\n| **(X)** | 否 | **否** | 否 | **否** | 否 | **否** |\n\n\
  关键的锁兼容性规则如下：\n\n- 意向锁(IS/IU/IX)彼此兼容。意向锁表示子对象上存在锁，多个会话可以同时在对象和页级别持有意向锁。\n- 排他锁(X)彼此不兼容，并且与其他任何锁类型也不兼容。多个会话不能同时更新同一行。此外，获取了共享锁(S)的读取器无法读取持有排他锁(X)的未提交行。\n\
  - 更新锁(U)彼此不兼容，并且与排他锁(X)也不兼容。写入器无法同时评估行是否需要更新，也无法访问持有排他锁(X)的行。\n- 更新锁(U)与共享锁(S)兼容。写入器可以评估行是否需要更新而不会被阻塞或阻塞读取器。值得注意的是，(S)/(U)锁的兼容性是\
  \ SQL Server 在内部使用更新锁(U)的主要原因，它们减少了读取器和写入器之间的阻塞。\n\n![](img/index-404_1.jpg)\n\n\
  如你所知，排他锁(X)的行为不依赖于事务隔离级别。**写入器总是获取排他锁(X)并一直持有到事务结束。** 除了`SNAPSHOT`隔离级别，对于更新锁(U)也是如此；写入器在评估行是否需要更新时会使用它们。\n\
  \n另一方面，共享锁(S)的行为取决于事务隔离级别。\n\n> **注意** SQL Server 总是在事务上下文中处理数据。在这种情况下，当应用程序不使用`BEGIN\
  \ TRAN`/`COMMIT`语句启动显式事务时，SQL Server 对语句持续期间使用隐式事务。即使是`SELECT`语句也在其自己的轻量级事务中运行。SQL\
  \ Server 不会将它们写入事务日志，尽管所有锁定和并发规则仍然适用。\n\n在`READ UNCOMMITTED`隔离级别下，不会获取共享锁(S)。因此，读取器可以读取已被其他会话修改并持有排他锁(X)的行。这种隔离级别通过消除读取器和写入器之间的冲突来减少系统中的阻塞，代价是数据一致性。读取器会读取行的当前（已修改）版本，而不管接下来发生什么——无论更改是否会被回滚，或者一行是否被多次修改。这就是为什么这个隔离级别通常被称为*脏读*。\n\
  \n表 17-3 中的代码说明了这一点。第一个会话运行一条`DELETE`语句，在行上获取一个排他锁(X)。第二个会话在`READ UNCOMMITTED`模式下运行一条`SELECT`语句。\n\
  \n**表 17-3.** 事务隔离级别与并发性\n\n| **会话 1** | **会话 2** |\n| :--- | :--- |\n| `begin tran`\
  \ | |\n| `delete from Delivery.Orders where OrderId = 95;` | |\n| -- 成功 / 无阻塞 |\
  \ |\n| | `set transaction isolation level read uncommitted;` |\n| | `select OrderId,\
  \ Amount from Delivery.Orders where OrderId between 94 and 96;` |\n| `rollback;`\
  \ | |\n\n在`READ UNCOMMITTED`隔离级别下，读取器不会获取共享锁(S)。会话 2 将不会\n\n\n\n## 第 17 章 ■ 锁类型与事务隔离级别\n\
  \n会被阻塞，并返回如图 17-5 所示的结果集。它不包括`OrderId`=95 的行，该行已在第一个会话的未提交事务中被删除，即使该事务随后被回滚。\n\n\
  ### 图 17-5. `READ UNCOMMITTED`与共享（`S`）锁的行为\n\n![](img/index-405_1.jpg)\n\n值得再次注意的是，排他（`X`）锁和更新（`U`）锁的行为不受事务隔离级别的影响。即使在`READ\
  \ UNCOMMITTED`模式下，你仍然会遇到写入器/写入器阻塞。\n\n在`READ COMMITTED`隔离级别中，SQL Server 在读取行后立即获取并释放共享（`S`）锁。这保证了事务不能读取来自其他会话的未提交数据。让我们运行代码清单\
  \ 17-3 中的代码。\n\n### 代码清单 17-3. 在`READ COMMITTED`隔离级别下读取数据\n\n```sql\nset transaction\
  \ isolation level read committed;\n\nselect OrderId, Amount\nfrom Delivery.Orders\n\
  where OrderId in (90,91);\n```\n\n图 17-6 说明了 SQL Server 如何获取和释放锁。如你所见，行级锁被立即获取和释放。\n\
  \n### 图 17-6. `READ COMMITTED`模式下的共享（`S`）锁行为\n\n值得注意的是，在某些情况下，在`READ COMMITTED`模式下，SQL\
  \ Server 可以在整个`SELECT`语句期间持有共享（`S`）锁。其中一个例子是从表中读取 LOB 数据的查询。\n\n在`REPEATABLE READ`隔离级别中，SQL\
  \ Server 获取共享（`S`）锁并一直持有到事务结束。这保证了其他会话在数据被读取后无法修改它。如果你运行代码清单 17-3 中的代码，但将隔离级别改为`REPEATABLE\
  \ READ`，就能看到这种行为。\n\n图 17-7 说明了 SQL Server 如何获取和释放锁。如你所见，SQL Server 首先获取两个共享（`S`）锁，并在事务结束时释放它们。\n\
  \n![](img/index-406_1.jpg)\n\n![](img/index-406_2.jpg)\n\n### 图 17-7. `REPEATABLE\
  \ READ`模式下的共享（`S`）锁行为\n\n在`SERIALIZABLE`隔离级别中，共享（`S`）锁同样持有到事务结束。然而，SQL Server 使用另一种锁的变体，称为*范围锁*。范围锁（包括共享和排他）保护的是索引键范围，而不是单个行。\n\
  \n考虑一种情况：`Delivery.Orders`表只有两行，`OrderId`值分别为 1 和 10。在`REPEATABLE READ`隔离级别中，一个`SELECT`语句会获取两个行级锁。其他会话将无法修改这些行，但仍可以在这些值之间插入新行。在`SERIALIZABLE`隔离级别中，一个`SELECT`语句会获取一个范围共享（`RangeS-S`）锁，阻止其他会话在`OrderId`\
  \ 1 和 10 之间插入任何行。\n\n图 17-8 说明了 SQL Server 如何在`SERIALIZABLE`隔离级别下获取和释放锁。\n\n###\
  \ 图 17-8. `SERIALIZABLE`隔离级别下的共享（`S`）锁行为\n\n表 17-4 总结了 SQL Server 在悲观隔离级别下如何处理共享（`S`）锁。\n\
  \n### 表 17-4. 悲观事务隔离级别与共享（`S`）锁行为\n\n**事务隔离级别** | **表提示** | **共享锁行为**\n---|---|---\n\
  `READ UNCOMMITTED` | `(``NOLOCK``)` | 不获取（`S`）锁\n`READ COMMITTED` (默认) | `(``READCOMMITTED``)`\
  \ | 立即获取并释放（`S`）锁\n`REPEATABLE READ` | `(``REPEATABLEREAD``)` | 获取（`S`）锁并持有到事务结束\n\
  `SERIALIZABLE` | `(``SERIALIZABLE``)` 或 `(``XLOCK``)` | 获取范围锁并持有到事务结束\n\n你可以通过使用`SET`命令在事务级别控制隔离级别和锁行为。\n\
  \n\n\n# 事务隔离级别\n\n`TRANSACTION ISOLATION LEVEL` 语句，或在表级别使用表锁提示来设置。在同一个查询中，也可以对不同的表使用不同的隔离级别，正如\
  \ 清单 17-4 所示。\n\n## 清单 17-4：使用表提示控制锁行为\n\n```sql\nselect c.CustomerName, sum(o.Total)\
  \ as [Total]\nfrom dbo.Customers c with (READCOMMITTED)\njoin dbo.Orders o with\
  \ (SERIALIZABLE) on\n  o.CustomerId = c.CustomerId\ngroup by\n  c.CustomerName;\n\
  ```\n\n你可以使用 `(UPDLOCK)` 和 `(XLOCK)` 表提示来控制读取者获取的锁类型。这些提示强制 `SELECT` 查询分别使用更新 (`U`)\
  \ 锁和排他 (`X`) 锁，而不是共享 (`S`) 锁。当你需要防止多个 `SELECT` 查询同时访问数据时，这可能很有用。\n\n清单 17-5 展示了如何在系统中实现自定义计数器。该\
  \ `SELECT` 语句使用排他 (`X`) 锁，这将阻止其他会话读取同一计数器行，直到事务提交。\n\n`注意`：此代码仅用于演示，它没有处理特定计数器在表中不存在的情况。最好使用\
  \ `SEQUENCE` 对象代替。\n\n## 清单 17-5：计数器表管理\n\n```sql\nbegin tran\nselect @Value = Value\n\
  from dbo.Counters with (XLOCK)\nwhere CounterName = @CounterName;\n\nupdate dbo.Counters\n\
  set Value += @ReserveCount\nwhere CounterName = @CounterName;\ncommit\n```\n\n##\
  \ 第 17 章：锁类型与事务隔离级别\n\n另一个锁提示 (`READPAST`) 允许会话跳过持有不兼容锁的行，而不是被阻塞。你将在本书的 [第 22 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_22)\
  \ 看到这种提示何时有用的示例。\n\n`注意`：有关表提示的更多信息，请访问 [`msdn.microsoft.com/en-us/library/ms187373.aspx`](http://msdn.microsoft.com/en-us/library/ms187373.aspx)。\n\
  \n#### 事务隔离级别与数据一致性\n\n最后，让我们分析一下多用户环境中常见的数据不一致问题。\n\n**脏读**：当一个事务读取其他未提交事务的未提交（脏）数据时，就会出现此问题。目前尚不清楚那些活动事务是会提交还是回滚，或者数据在逻辑上是否一致。设想一个用户将资金从支票账户转账到储蓄账户的例子。数据有两个物理操作：减少支票账户余额和增加储蓄账户余额，它们在逻辑上组合在一个事务中。如果另一个会话在这两次更新之间读取账户余额，结果将是不正确的。\n\
  \n从锁的角度来看，当会话不获取共享 (`S`) 锁并忽略其他会话的排他 (`X`) 锁时，在 `READ UNCOMMITTED` 隔离级别中可能发生这种现象。所有其他悲观隔离级别都使用共享\
  \ (`S`) 锁，因此可以防止脏读。\n\n**不可重复读**：在同一事务中后续尝试读取相同数据时，返回不同的结果。当其他事务在读取之间修改甚至删除数据时，就会出现这种数据不一致问题。考虑这样一种情况：你正在生成一份报告显示特定客户的订单列表以及一些汇总信息（例如，客户每月的消费总额）。如果另一个会话在这些查询之间修改或删除了这些订单，结果集将不一致。\n\
  \n从锁的角度来看，当会话在读取之间不保护/锁定数据时，就可能发生这种现象。这可能发生在不使用共享 (`S`) 锁的 `READ UNCOMMITTED` 隔离级别中，也可能发生在会话立即获取并释放共享\
  \ (`S`) 锁的 `READ COMMITTED` 隔离级别中。`REPEATABLE READ` 和 `SERIALIZABLE` 隔离级别\n\n\n\n\
  # 第 17 章 - 锁类型与事务隔离级别\n\n## 事务隔离级别与数据不一致现象\n\n`将共享（S）锁保持到事务结束，这可以防止数据在读取后被修改。`\n\
  \n### 幻读 (Phantom Reads)\n\n这种现象发生在同一事务中后续读操作返回了新的行（即该事务之前未读取过的行）。回想一下之前的例子，另一个会话在查询执行之间插入了一个新订单。只有采用范围锁的\
  \ `SERIALIZABLE` 隔离级别能避免这种现象。\n\n### 重复读 (Duplicated Reads)\n\n这个问题发生在一个查询多次返回同一行时。想象一个查询返回特定时间间隔内的订单列表，在执行过程中扫描\
  \ `OrderDate` 列上的索引。如果另一个查询更改了 `OrderDate` 值，将该行从已处理（已扫描）的索引部分移动到未处理部分，那么该行将被读取两次。\n\
  \n这种状况类似于不可重复读，可能在 `READ UNCOMMITTED` 和 `READ COMMITTED` 隔离级别下发生，因为读操作在读取行后不持有共享（`S`）锁。\n\
  \n### 跳过行 (Skipped Rows)\n\n这种现象发生在查询不返回某些行时。它可能出现在与上述重复读类似的情景中，即行从索引的未处理部分移动到了已处理部分。只有\
  \ `SERIALIZABLE` 隔离级别能避免这种现象，因为它会锁定索引键范围区间。\n\n### 总结表格\n\n表 17-5 总结了不同事务隔离级别下的数据不一致问题。\n\
  \n**表 17-5. 事务隔离级别与数据不一致异常**\n\n| 隔离级别 | 脏读 | 不可重复读 | 重复读 | 幻读 | 跳过行 |\n| :--- |\
  \ :--- | :--- | :--- | :--- | :--- |\n| `READ UNCOMMITTED` | 是 | 是 | 是 | 是 | 是 |\n\
  | `READ COMMITTED` | 否 | 是 | 是 | 是 | 是 |\n| `REPEATABLE READ` | 否 | 否 | 否 | 是 |\
  \ 是 |\n| `SERIALIZABLE` | 否 | 否 | 否 | 否 | 否 |\n\n`SERIALIZABLE` 是唯一能保护你免受数据不一致问题的悲观事务隔离级别。然而，由于在数据易变的系统中存在过度的锁定，这个隔离级别会引入主要的并发问题。幸运的是，乐观隔离级别（我们将在第\
  \ 21 章讨论）可以在不引入过多阻塞的情况下解决不一致现象。\n\n#### 总结\n\nSQL Server 使用锁来支持数据隔离和一致性规则，使用行级锁作为最高粒度级别。\n\
  \n写入器在修改数据时获取排他（`X`）锁。无论隔离级别如何，排他（`X`）锁总是在获取后一直持有到事务结束。写入器在评估数据是否需要修改时获取更新（`U`）锁。如果需要更新行，这些锁会被转换为排他（`X`）锁。意向（`I*`）锁在对象和页级别获取，它们指示存在相同类型的子行级锁。\n\
  \n除了 `READ UNCOMMITTED` 隔离级别外，SQL Server 在悲观隔离级别下读取数据时会获取共享（`S`）锁。事务隔离级别控制共享（`S`）锁的释放时机。在\
  \ `READ COMMITTED` 隔离级别中，这些锁在行被读取后立即释放。在 `REPEATABLE READ` 和 `SERIALIZABLE` 隔离级别中，共享（`S`）锁会一直持有到事务结束。此外，在\
  \ `SERIALIZABLE` 隔离级别中，SQL Server 使用范围锁，锁定索引键的范围而不是单个行。\n\n你可以在事务级别使用 `SET TRANSACTION\
  \ ISOLATION LEVEL` 语句，或在单个查询中对每个表使用表锁定提示来控制事务隔离级别。\n\n---\n\n# 第 18 章 - 故障排除：阻塞问题\n\
  \n阻塞是系统中遇到的最常见问题之一。当发生阻塞时，多个...\n\n\n\n查询相互阻塞，这会增加查询的执行时间并导致超时。所有这些都对用户体验产生负面影响。\n\
  \n本章概述了如何在系统中对阻塞问题进行故障排除。\n\n## 通用故障排除方法\n\n当多个会话争夺同一资源时，就会发生阻塞。尽管在某些情况下这是正确且预期的行为（例如，多个会话无法同时更新同一行），但更多情况下，它是由于非优化查询导致的不必要扫描而发生的。\n\
  \n一定程度的阻塞在系统中始终存在，这完全正常。然而，不正常的是过度阻塞。从最终用户的角度来看，过度阻塞表现为其总体性能问题。系统变慢，查询超时，并且存在死锁。除了死锁，性能缓慢并不一定就是阻塞问题的征兆；很可能只是查询本身未优化。但是，阻塞问题肯定会加剧系统整体的缓慢。\n\
  \n**注意** 确定系统是否遭受阻塞的最简单方法之一是查看等待统计信息中的锁等待，我们将在本书第五部分中讨论。\n\n简而言之，要排除阻塞问题，必须遵循以下步骤：\n\
  \n1.  检测涉及阻塞的查询。\n2.  找出阻塞发生的原因。\n3.  修复问题的根本原因。\n\n## 故障排除工具\n\nSQL Server 提供了多种可帮助你在系统中排查阻塞问题的工具。这些工具可分为两类。第一类包括你可以用来排查系统当前状况的动态管理视图\
  \ (`DMVs`)。当你在阻塞发生时有权访问系统，并希望执行实时故障排除时，这些工具非常有用。\n\n第二类工具允许你收集系统中有关阻塞问题的信息并保留以供进一步分析。让我们详细看看这两类工具。\n\
  \n© Dmitri Korotkevitch 2016\nD. Korotkevitch, *Pro SQL Server Internals*, DOI 10.1007/978-1-4842-1964-5_18\n\
  \n![](img/index-411_1.jpg)\n\n## 实时故障排除阻塞问题\n\n实时排查阻塞的关键工具是 `sys.dm_tran_locks`\
  \ 动态管理视图，它提供有关当前发送给锁管理器的活动请求的信息。它返回锁请求列表及其状态（例如 `GRANT` 或 `WAIT`）、请求锁的资源信息以及其他几个有用的属性。\n\
  \n表 18-1 显示了导致阻塞情况的代码。\n\n***表 18-1.** 导致阻塞情况的代码*\n\n**会话 1 (SPID=52)** | **会话 2\
  \ (SPID=53)** | **说明**\n---|---|---\n`set transaction isolation level read uncommitted`\
  \ | | 会话 1 获取 `OrderId=95` 行上的排他 (`X`) 锁\n`begin tran` | |\n`delete from Delivery.Orders\
  \ where OrderId = 95` | |\n| `select OrderId, Amount from Delivery.Orders with (readcommitted)\
  \ where OrderNum = '1000'` | 会话 2 被阻塞，尝试获取 `OrderId=95` 行上的共享 (`S`) 锁\n`rollback`\
  \ | |\n\n图 18-1 显示了阻塞发生时 `sys.dm_tran_locks`、`sys.dm_os_waiting_tasks` 和 `sys.dm_exec_requests`\
  \ 视图的部分输出。如你所见，会话 53 正在等待由会话 52 持有的 `OrderId=95` 行上的共享 (`S`) 锁。输出中的 `LCK_M_S` 等待类型表示共享\
  \ (`S`) 锁等待。我们将在本书第五部分更详细地讨论等待类型。\n\n***图 18-1.** 阻塞发生时系统视图的输出*\n\n`sys.dm_tran_locks`\
  \ 视图提供的信息对于故障排除来说有点过于晦涩，你需要将其与其他动态管理视图（如 `sys.dm_exec_requests` 和 `sys.dm_os_waiting_tasks`）连接起来。\n\
  \n\n\n# 第 18 章 ■ 排查阻塞问题\n\n`waiting_tasks`，以获得更清晰的图景。代码清单 18-1 提供了所需的代码。\n\n## 代码清单\
  \ 18-1. 获取关于被阻塞和阻塞会话的更多信息\n\n```sql\nselect\n    tl.resource_type as [Resource Type]\n\
  \    ,db_name(tl.resource_database_id) as [DB Name]\n    ,case tl.resource_type\n\
  \        when 'OBJECT' then object_name(tl.resource_associated_entity_id\n     \
  \                                  ,tl.resource_database_id)\n        when 'DATABASE'\
  \ then 'DB'\n        else\n            case when tl.resource_database_id = db_id()\n\
  \                then\n                    ( select object_name(object_id, tl.resource_database_id)\n\
  \                      from sys.partitions\n                      where hobt_id\
  \ = tl.resource_associated_entity_id )\n                else '(Run under DB context)'\n\
  \            end\n    end as [Object]\n    ,tl.resource_description as [Resource]\n\
  \    ,tl.request_session_id as [Session]\n    ,tl.request_mode as [Mode]\n    ,tl.request_status\
  \ as [Status]\n    ,wt.wait_duration_ms as [Wait (ms)]\n    ,qi.sql\n    ,qi.query_plan\n\
  from\n    sys.dm_tran_locks tl with (nolock)\n    left outer join sys.dm_os_waiting_tasks\
  \ wt with (nolock) on\n        tl.lock_owner_address = wt.resource_address and tl.request_status\
  \ = 'WAIT'\n    outer apply\n        (\n            select\n                substring(s.text,\
  \ (er.statement_start_offset / 2) + 1,\n                         (( case er.statement_end_offset\n\
  \                                when -1 then datalength(s.text)\n             \
  \                   else er.statement_end_offset\n                            end\
  \ - er.statement_start_offset) / 2) + 1) as sql\n                , qp.query_plan\n\
  \            from\n                sys.dm_exec_requests er with (nolock)\n     \
  \           cross apply sys.dm_exec_sql_text(er.sql_handle) s\n                outer\
  \ apply sys.dm_exec_query_plan(er.plan_handle) qp\n            where\n         \
  \       tl.request_session_id = er.session_id\n        ) qi\nwhere\n    tl.request_session_id\
  \ <> @@spid\norder by\n    tl.request_session_id\noption (recompile)\n```\n\n![](img/index-413_1.jpg)\n\
  \n## 图 18-2. 连接 `sys.dm_tran_locks` 与其他 DMV\n\n**注意** 您需要在涉及阻塞的数据库上下文中运行查询，才能正确解析对象名称。同样重要的是，对于已授予锁请求的会话，`SQL`\
  \ 和 `Query Plan` 代表的是当前正在执行的批处理，而不是触发原始锁定请求的批处理。\n\n`sys.dm_tran_locks` 视图会为系统中的每个活动锁请求返回一行，当您在繁忙的服务器上运行时，这可能导致结果集非常大。您可以基于\
  \ `resource_description` 和 `resource_associated_entity_id` 列对此视图进行自联接，从而减少信息量，并识别出竞争相同资源的会话。这种方法允许您筛选结果，只查看涉及阻塞链的会话。\n\
  \n代码清单 18-2 和 图 18-3 说明了代码和查询结果。\n\n## 代码清单 18-2. 筛选出被阻塞和阻塞会话信息\n\n```sql\nselect\n\
  \    tl1.resource_type as [Resource Type]\n    ,db_name(tl1.resource_database_id)\
  \ as [DB Name]\n    ,case tl1.resource_type\n        when 'OBJECT' then object_name(tl1.resource_associated_entity_id\n\
  \                                       ,tl1.resource_database_id)\n        when\
  \ 'DATABASE' then 'DB'\n        else\n            case when tl1.resource_database_id\
  \ = db_id()\n                then\n                    ( select object_name(object_id,\
  \ tl1.resource_database_id)\n                      from sys.partitions\n       \
  \               where hobt_id = tl1.resource_associated_entity_id )\n          \
  \      else '(Run under DB context)'\n            end\n    end as [Object]\n   \
  \ ,tl1.resource_description as [Resource]\n    ,tl1.request_session_id as [Session]\n\
  \    ,tl1.request_mode as [Mode]\n    ,tl1.request_status as [Status]\n    ,wt.wait_duration_ms\
  \ as [Wait (ms)]\n    ,qi.sql\n    ,qi.query_plan\nfrom\n    sys.dm_tran_locks tl1\
  \ with (nolock)\n    join sys.dm_tran_locks tl2 with (nolock) on\n```\n\n![](img/index-414_1.jpg)\n\
  \n\n\n```sql\ntl1.resource_associated_entity_id = tl2.resource_associated_entity_id\n\
  \nleft outer join sys.dm_os_waiting_tasks wt with (nolock) on\n\ntl1.lock_owner_address\
  \ = wt.resource_address and tl1.request_status = 'WAIT'\n\nouter apply\n\n(\n\n\
  select\n\nsubstring(s.text, (er.statement_start_offset / 2) + 1,\n\n(( case er.statement_end_offset\n\
  \nwhen -1\n\nthen datalength(s.text)\n\nelse er.statement_end_offset\n\nend - er.statement_start_offset)\
  \ / 2) + 1) as sql\n\n, qp.query_plan\n\nfrom\n\nsys.dm_exec_requests er with (nolock)\n\
  \ncross apply sys.dm_exec_sql_text(er.sql_handle) s\n\nouter apply sys.dm_exec_query_plan(er.plan_handle)\
  \ qp\n\nwhere\n\ntl1.request_session_id = er.session_id\n\n) qi\n\nwhere\n\ntl1.request_status\
  \ <> tl2.request_status and\n\n(\n\ntl1.resource_description = tl2.resource_description\
  \ or\n\n( tl1.resource_description is null and tl2.resource_description is null\
  \ )\n\n)\n\noption (recompile)\n```\n\n## 图 18-3. 被阻塞和阻塞的会话\n\n正如你已了解的，当两个或多个会话竞争同一资源时，就会发生阻塞。\n\
  \n在故障排除时，你需要回答两个问题：\n\n为什么*阻塞*会话持有该资源上的锁？\n\n为什么*被阻塞*会话要获取该资源上的锁？\n\n通常，从检查*被阻塞*会话开始故障排除会更容易，因为你可以获取到被阻塞的语句及其执行计划。在许多情况下，通过分析其执行计划，你可以识别出阻塞的根本原因。你可以从动态管理视图（如刚刚演示的那样）获取该执行计划，或者通过重新运行查询来获取。\n\
  \n图 18-4 展示了我们示例中被阻塞查询的执行计划。\n\n![](img/index-415_1.jpg)\n\n# 第 18 章 ■ 故障排除阻塞问题\n\
  \n## 图 18-4. 被阻塞查询的执行计划\n\n从执行计划中可以看到，被阻塞查询正在扫描整个表，根据 `OrderNum` 列上的谓词来查找订单。该查询使用了\
  \ `READ COMMITTED` 事务隔离级别，并在表中的每一行上获取共享 (`S`) 锁。因此，在某个时刻，该查询会被第一个 `DELETE` 查询阻塞，因为该查询在其中一行上持有排他\
  \ (`X`) 锁。值得注意的是，即使持有排他 (`X`) 锁的行其 `OrderNum` 不等于 `'1000'`，该查询也会被阻塞。在获取共享 (`S`)\
  \ 锁并读取该行之前，SQL Server 无法评估谓词。\n\n你可以通过优化查询并在 `OrderNum` 列上添加索引来解决这个问题，这将在执行计划中用\
  \ `非聚集索引查找` 操作符替换 `聚集索引扫描`。只要查询不删除和选择相同的行，这将消除锁冲突和阻塞。\n\n尽管在许多情况下，通过分析和优化*被阻塞*查询，你可以检测并解决阻塞的根本原因，但并非总是如此。考虑这样一种情况：一个会话更新了表中的大量行，从而在这些行上获取并持有了大量的排他\
  \ (`X`) 锁。其他需要访问这些行的会话将会被阻塞，即使其执行计划是高效的，不会执行不必要的扫描。这种情况下，阻塞的根本原因是*阻塞*会话，而不是*被阻塞*会话。\n\
  \n不幸的是，要检测获取了锁的语句要困难得多。清单 18-1 和 18-2 中的查询为你提供的是`阻塞`会话中当前正在运行的语句信息，而不是导致阻塞状况的语句信息。此外，在某些情况下，如果客户端应用程序存在错误并保持一个未提交的事务处于空闲状态，查询可能根本不返回任何信息。你可以在图\
  \ 18-2 和 18-3 中看到这种情况，其中 SQL 语句和执行计划都是 `NULL`。在这种情况下，你需要分析阻塞会话中的什么代码导致了该问题。\n\n\n\
  \n# 第 18 章 ■ 阻塞问题的故障排除\n\n#### 收集阻塞信息以供进一步分析\n\n阻塞。你可以使用 `sys.dm_exec_sessions`\
  \ 视图来获取有关阻塞会话的主机和应用程序的信息。当你知道阻塞会话当前正在执行哪条语句后，就可以分析客户端和 T-SQL 代码，定位到该语句所属的事务。该事务中之前执行过的某条语句，很可能就是导致阻塞情况发生的根源。\n\
  \n我们即将讨论的 `阻塞进程报告`，也能在此类故障排除中提供帮助。\n\n尽管动态管理视图（DMVs）在提供系统当前状态信息方面非常有用，但如果你没有在阻塞发生的确切时刻运行它们，帮助就不大了。幸运的是，SQL\
  \ Server 可以通过 `阻塞进程报告` 自动捕获阻塞信息。该报告提供了有关阻塞情况的信息，你可以将其保留以供进一步分析。\n\n有一个名为 `阻塞进程阈值`\
  \ 的配置设置，它指定了 SQL Server 检查系统中阻塞情况并生成报告的频率。清单 18-3 展示了将阈值设置为十秒的代码。\n\n![](img/index-416_1.jpg)\n\
  \n### 清单 18-3. 指定阻塞进程阈值\n\n```sql\nsp_configure 'show advanced options', 1;\ngo\n\
  reconfigure;\ngo\nsp_configure 'blocked process threshold', 10; -- 以秒为单位\ngo\nreconfigure;\n\
  go\n```\n\n你需要在生产环境中对 `阻塞进程阈值` 的值进行微调。关键是要避免误报，同时又能捕捉到问题。微软建议最低不要低于五秒作为最小值，并且你显然需要将此值设置得小于查询超时时间。\n\
  \n有几种方法可以在系统中捕获该报告。你可以使用 SQL Trace —— 在“错误和警告”部分有一个“阻塞进程报告”事件，如图 18-5 所示。\n\n###\
  \ 图 18-5. SQL Trace 中的阻塞进程报告事件\n\n或者，你可以使用 `blocked_process_report` 事件创建一个扩展事件会话，如图\
  \ 18-6 所示。此会话将为你提供除 SQL Trace 提供的信息之外的几个额外属性。\n\n![](img/index-417_1.jpg)\n\n###\
  \ 图 18-6. 使用扩展事件捕获阻塞进程报告\n\n■ **注意** 我们将在本书第五部分更详细地讨论扩展事件。\n\n`阻塞进程报告` 包含 XML，显示了系统中有关阻塞进程和被阻塞进程的信息（其中最重要的部分在清单\
  \ 18-4 中以粗体突出显示）。\n\n### 清单 18-4. 阻塞进程报告 XML\n\n```xml\n<blocked-process-report\
  \ monitorLoop=\"224\">\n<blocked-process>\n<process id=\"process3e576c928\" taskpriority=\"\
  0\" logused=\"0\"\nwaitresource=\"KEY: …\n\"\nwaittime=\"14102\n\" ownerId=\"…\"\
  \ transactionname=\"SELECT\" lasttranstarted=\"…\" XDES=\"…\"\nlockMode=\"S\"\n\
  schedulerid=\"1\" kpid=\"…\" status=\"suspended\"\nspid=\"53\"\nsbid=\"0\" ecid=\"\
  0\"\npriority=\"0\" trancount=\"0\" lastbatchstarted=\"…\" lastbatchcompleted=\"\
  …\" lastattention=\"…\"\nclientapp=\"…\" hostname=\"…\" hostpid=\"…\" loginname=\"\
  …\"\nisolationlevel=\"read committed (2)\"\nxactid=\"…\" currentdb=\"14\" lockTimeout=\"\
  …\" clientoption1=\"…\" clientoption2=\"…\">\n<executionStack>\n<frame line=\"3\"\
  \ stmtstart=\"46\" sqlhandle=\"…\"/>\n<frame line=\"3\" stmtstart=\"100\" sqlhandle=\"\
  …\"/>\n</executionStack>\n<inputbuf>\nset transaction isolation level read committed\n\
  select OrderId, Amount\nfrom Delivery.Orders\nwhere OrderNum = '1000'\n</inputbuf>\n\
  </process>\n</blocked-process>\n<blocking-process>\n<process status=\"sleeping\"\
  \ spid=\"54\"\nsbid=\"0\" ecid=\"0\" priority=\"0\"\ntrancount=\"1\"\nlastbatchstarted=\"\
  ...\" lastbatchcompleted=\"...\" lastattention=\"...\" clientapp=\"...\"\nhostname=\"\
  ...\" hostpid=\"...\" loginname=\"...\"\nisolationlevel=\"read uncommitted (1)\"\
  \n```\n\n\n\n# 第 18 章 ■ 故障排除阻塞问题\n\n## 阻塞进程报告分析\n\n```sql\nxactid=\"...\" currentdb=\"\
  14\" lockTimeout=\"...\" clientoption1=\"...\" clientoption2=\"...\">\n\n<executionStack/>\n\
  \n<inputbuf>\n\nset transaction isolation level read uncommitted\n\nbegin tran\n\
  \ndelete from Delivery.Orders\n\nwhere OrderId = 95\n\n</inputbuf>\n\n</process>\n\
  \n</blocking-process>\n\n</blocked-process-report>\n```\n\n与实时故障排除一样，您应该同时分析阻塞进程和被阻塞进程，并找出问题的根本原因。从被阻塞进程的角度来看，最重要的信息如下：\n\
  \n``waittime`` ：查询等待的时间长度，以毫秒为单位\n\n``lockMode`` ：正在等待的锁类型\n\n``isolationlevel``\
  \ ：事务隔离级别\n\n``executionStack`` 和 ``inputBuf`` ：查询和/或执行堆栈。您将在清单 18-5 中看到如何获取涉及阻塞的实际\
  \ SQL 语句。\n\n从阻塞进程的角度来看，您必须查看以下内容：\n\n``status`` ：状态指进程是 ``running``（运行中）、``sleeping``（睡眠中）还是\
  \ ``suspended``（挂起）。在进程处于睡眠状态的情况下，存在未提交的事务。当进程挂起时，该进程要么在等待资源（例如，来自磁盘的数据页），要么涉及阻塞链。我们将在本书第五部分更详细地讨论\
  \ SQL Server 执行模型。\n\n``trancount`` ：``trancount`` 值大于 1 表示存在嵌套事务。如果进程状态同时是 ``sleeping``，那么很可能客户端没有正确提交嵌套事务（例如，代码中提交语句的数量少于\
  \ ``begin tran`` 语句的数量）。\n\n``executionStack`` 和 ``inputBuf`` ：正如我们已经讨论过的，在某些情况下，您需要分析阻塞进程中发生了什么。一些常见问题包括失控的事务（例如，嵌套事务中缺少提交语句）；可能涉及某些用户界面的长时间运行事务；或过度扫描（例如，详细信息表中引用列上缺少索引会导致在引用完整性检查期间进行扫描）。此时，有关来自阻塞会话的查询信息可能很有用。请记住，在被阻塞进程的情况下，``executionStack``\
  \ 和 ``inputBuf`` 将对应于生成被阻塞进程报告时正在运行的查询，而不是阻塞发生时的查询。\n\n## 通过执行计划检测低效操作\n\n然而，在大量情况下，阻塞是由于非优化查询导致的不必要扫描而发生的，您可以通过分析被阻塞的查询来检测到它。因此，下一个合理的步骤是查看被阻塞查询的执行计划并检测低效之处。您可以运行查询并检查执行计划，也可以使用\
  \ DMV 并基于执行堆栈中的 ``sql_handle``、``stmtStart`` 和 ``stmtEnd`` 元素从 ``sys.dm_exec_query_stats``\
  \ 获取执行计划。清单 18-5 和 图 18-7 展示了此策略的代码和查询输出。\n\n![](img/index-419_1.jpg)\n\n***清单 18-5.***\
  \ 获取查询文本和执行计划\n\n```sql\ndeclare\n    @H varbinary(max) = /* 从执行堆栈顶行插入 sql_handle\
  \ */\n    ,@S int = /* 从执行堆栈顶行插入 stmtStart */\n    ,@E int = /* 从执行堆栈顶行插入 stmtEnd\
  \ */\n\nselect\n    substring(qt.text, (qs.statement_start_offset / 2) + 1,\n  \
  \      (( case qs.statement_end_offset\n            when -1 then datalength(qt.text)\n\
  \            else qs.statement_end_offset\n            end - qs.statement_start_offset)\
  \ / 2) + 1) as sql\n    ,qp.query_plan\n    ,qs.creation_time\n    ,qs.last_execution_time\n\
  from\n    sys.dm_exec_query_stats qs with (nolock)\n    cross apply sys.dm_exec_sql_text(qs.sql_handle)\
  \ qt\n    outer apply sys.dm_exec_query_plan(qs.plan_handle) qp\nwhere\n    qs.sql_handle\
  \ = @H and\n    qs.statement_start_offset = @S\n    and qs.statement_end_offset\
  \ = @E\noption (recompile)\n```\n\n***图 18-7.*** 从 ``sys.dm_exec_query_stats`` 获取信息\n\
  \n您应该注意 ``sys.dm_exec_query_stats`` 视图存在一些潜在问题。首先，此视图依赖于执行计划缓存。如果执行计划不在缓存中，您将无法获取它；例如，如果查询使用了带\
  \ ``option (recompile)`` 子句的语句级重编译。其次，您可能会返回多个缓存计划。在某些情况下，即使发生重编译后，SQL Server 仍会保留执行统计信息，这可能会在结果集中产生多行。此外，当会话使用不同的\
  \ ``SET`` 选项时，您可能会有多个缓存计划。有两列——``creation_time`` 和 ``last_execution_time``——可以帮助您确定正确的计划。\n\
  \n在故障排除期间对计划缓存的这种依赖是阻塞进程报告最大的缺点。在查询重编译和/或计划不再被重用后，SQL Server 最终会从计划缓存中删除旧计划。因此，您等待故障排除的时间越长，计划存在于缓存中的机会就越小。\n\
  \n解决此问题的方法之一是构建基于扩展事件和/或事件通知的监控解决方案。这允许您在阻塞发生时解析阻塞进程报告，与稍后开始分析相比，增加了捕获正确执行计划的机会。我在本书的配套材料中包含了一个示例，展示了如何使用事件通知设置监控。\n\
  \nSQL Server 2016 允许您在名为*查询存储*（*Query Store*）的新组件中收集和持久化有关正在运行的查询及其执行计划和统计信息的信息。查询存储不依赖于计划缓存，在系统故障排除期间非常有用。我们将在本书第五部分更深入地讨论查询存储。\n\
  \n## 小结\n\n在系统中故障排除阻塞问题的过程需要您检测涉及阻塞的查询，找出问题的根本原因，并解决该问题。\n\n``sys.dm_tran_locks``\
  \ 数据管理视图为您提供了系统中所有活动锁请求的信息。它可以帮助您实时检测阻塞情况。您可以将此视图与其他 DMV（如 ``sys.dm_exec_requests``、``sys.dm_exec_query_stats``、``sys.dm_exec_sessions``\
  \ 和 ``sys.dm_os_waiting_tasks``）联接，以获取有关涉及阻塞情况的会话和查询的更多信息。\n\nSQL Server 可以生成*阻塞进程报告*，为您提供有关阻塞的信息，您可以收集并保留以供进一步分析。您可以使用\
  \ SQL 跟踪、扩展事件和事件通知来捕获它。\n\n在大量情况下，阻塞是由于非优化查询导致的过度扫描而发生的。您应该分析阻塞查询和被阻塞查询的执行计划，以检测和优化低效操作。\n\
  \n另一个导致阻塞的常见问题是代码中不正确的事务管理，这包括失控的事务、在打开的事务中间与用户交互等。\n\n![](img/index-421_1.jpg)\n\
  \n# 第 19 章 ■ 死锁\n\n*死锁*是一种特殊的阻塞情况，此时多个会话（有时是单个会话内的多个执行线程）相互阻塞。当这种情况发生时，SQL Server\
  \ 会终止其中一个会话，从而允许其他会话继续。\n\n本章演示了为什么系统中会发生死锁，并解释了如何进行故障排除和解决它们。\n\n#### 经典死锁\n\n\
  经典死锁发生在两个或更多会话争用同一组资源时。让我们看一个典型的例子，假设您有两个会话以相反的顺序更新表中的两行。\n\n\n# 第 19 章 ■ 死锁\n\n\
  首先，会话 1 更新行`R1`，会话 2 更新行`R2`。如你所知，此时两个会话都获取并持有了行上的排他锁。你可以在图 19-1 中看到这一过程。\n\n**图\
  \ 19-1. 经典死锁，步骤 1**\n\n接下来，假设会话 1 想要更新行`R2`。它将尝试获取`R2`上的排他锁，但由于会话 2 已持有该锁，它将被阻塞。如果会话\
  \ 2 想要更新`R1`，同样的事情将会发生——它会因为会话 1 持有的排他锁而被阻塞。\n\n如你所见，此时两个会话都在互相等待，无法继续执行。这就构成了经典的死锁，如图\
  \ 19-2 所示。\n\n![](img/index-422_1.jpg)\n\n**图 19-2. 经典死锁，步骤 2**\n\n系统有一个名为`死锁监视器`的任务，它每五秒唤醒一次，检查系统中是否存在死锁。当检测到死锁时，SQL\
  \ Server 会回滚其中一个事务。这将释放该事务持有的所有锁，并允许其他会话继续执行。\n\n> **注意：** 如果系统中存在死锁，死锁监视器的唤醒间隔会缩短。在某些情况下，它可能每秒唤醒多达十次。\n\
  \n选择哪个会话作为死锁牺牲品取决于几个因素。默认情况下，SQL Server 会回滚使用较少日志空间的事务对应的会话。你可以在一定程度上控制这一行为，方法是通过\
  \ `SET DEADLOCK_PRIORITY` 命令为会话设置死锁优先级。\n\n## 由于非优化查询导致的死锁\n\n经典死锁通常发生在数据高度易变且多个会话更新相同行的情况下，但死锁还有另一个常见原因。它们是由于非优化查询引入的扫描操作导致的。让我们看一个例子：假设你有一个进程在订单录入系统中更新一个订单行，下一步是查询该客户有多少订单。让我们看看当两个这样的会话使用\
  \ `READ COMMITTED` 事务隔离级别并行运行时会发生什么。\n\n第一步，两个会话分别运行两条 `UPDATE` 语句。两条语句都顺利执行，没有涉及阻塞。如你所记得的，该表在\
  \ `OrderId` 列上有一个聚集索引，因此执行计划中会有一个*聚集索引查找*操作。图 19-3 说明了这一步。\n\n![](img/index-423_1.jpg)\n\
  \n![](img/index-423_2.jpg)\n\n**图 19-3. 由于扫描导致的死锁，步骤 1**\n\n此时，两个会话都持有了它们各自更新行上的排他锁。在第二步中，每个会话根据\
  \ `CustomerId` 过滤器运行 `SELECT` 语句。该表上没有非聚集索引，因此执行计划将包含一个*聚集索引扫描*操作。在 `READ COMMITTED`\
  \ 隔离级别下，SQL Server 在读取数据时会获取共享锁，因此，一旦某个会话尝试读取被持有排他锁的行，它就会被阻塞。图 19-4 说明了这一点。\n\n\
  **图 19-4. 由于扫描导致的死锁，步骤 2**\n\n如果在两个会话都被阻塞之后、死锁监视器任务唤醒之前运行清单 19-1 中所示的查询，你将看到图 19-5\
  \ 所示的结果。\n\n![](img/index-424_1.jpg)\n\n**清单 19-1. 两个会话都被阻塞时的锁请求**\n\n```sql\nselect\n\
  \    tl.request_session_id as [SPID], tl.resource_type as [Resouce Type]\n    ,tl.resource_description\
  \ as [Resource], tl.request_mode as [Mode]\n    ,tl.request_status as [Status],\
  \ wt.blocking_session_id as [Blocked By]\nfrom\n    sys.dm_tran_locks tl with (nolock)\
  \ left outer join\n```\n\n\n```markdown\nsys.dm_os_waiting_tasks wt with (nolock)\
  \ on\ntl.lock_owner_address = wt.resource_address and\ntl.request_status = 'WAIT'\n\
  where\ntl.request_session_id <> @@SPID and tl.resource_type = 'KEY'\norder by\n\
  tl.request_session_id\n\n***图 19-5.** 死锁发生时的锁请求*\n\n如你所见，会话之间相互阻塞。即使这些会话并不打算将那些行包含在计数计算中，这也没有关系。在获取共享（S）锁并读取行之前，SQL\
  \ Server 无法评估 `CustomerId` 谓词。\n\n在任何读者需要获取共享（S）锁的事务隔离级别中，你都会遇到这种死锁。在 `READ UNCOMMITTED`\
  \ 隔离级别中不会发生这种死锁，因为该级别不使用共享（S）锁。然而，在 `READ UNCOMMITTED` 隔离级别中，由于写入者的冲突，你仍然可能出现死锁。你可以通过将\
  \ `SELECT` 语句替换为引入了前述示例中扫描操作的 `UPDATE` 语句来触发它。\n\n查询优化有助于解决由扫描和非优化查询引起的死锁。在前面的情况下，你可以通过在\
  \ `CustomerId` 列上添加一个非聚集索引来解决问题。这将改变 `SELECT` 语句的执行计划，用 *非聚集索引查找* 替换聚集索引扫描。结果，会话将无需读取已被其他会话修改并持有不相容锁的行。\n\
  \n## 键查找死锁\n\n在某些情况下，当多个会话试图同时读取和更新同一行时，可能会发生死锁。\n\n假设你在表上有一个非聚集索引，并且一个会话想使用此索引读取该行。如果该索引不是覆盖索引，并且会话需要从聚集索引中获取一些数据，那么你将得到一个包含\
  \ *非聚集索引查找* 和 *键查找* 操作的执行计划。会话将先在非聚集索引行上获取共享（S）锁，然后再在聚集索引行上获取共享（S）锁。\n\n与此同时，如果你有另一个会话更新基于聚集键值的非聚集索引中包含的列之一，该会话将以相反的顺序获取独占（X）锁；即，先在聚集索引行上获取锁，然后再在非聚集索引行上获取锁。\n\
  \n![](img/index-425_1.jpg)\n![](img/index-425_2.jpg)\n\n第 19 章 ■ 死锁\n\n图 19-6 显示了第一步之后的情况。两个会话都已成功获取了在聚集和非聚集索引中行的锁。\n\
  \n***图 19-6.** 键查找死锁，第 1 步*\n\n在下一步中，每个会话都试图获取另一个索引中行的锁，这将被阻塞，如图 19-7 所示。\n\n***图\
  \ 19-7.** 键查找死锁，第 2 步*\n\n如果这恰好在同一时刻发生，你将遇到死锁，并且读取数据的会话将被选为死锁牺牲品。这里的解决方案是使非聚集索引成为覆盖索引，从而避免\
  \ `键查找` 操作。\n\n不幸的是，该解决方案会增加非聚集索引中叶行的大小，并在数据修改和索引维护期间引入额外的开销。或者，你可以使用乐观隔离级别并切换到\
  \ `READ COMMITTED SNAPSHOT` 模式。我们将在第 21 章“乐观隔离级别”中更详细地介绍这种方法。\n\n## 因多次更新同一行导致的死锁\n\
  \n另一种类似的死锁模式可能由多次更新同一行引入，前提是后续的更新访问或更改了不同非聚集索引中的列。这可能导致类似于你已见过的死锁情况，即另一个会话在更新之间锁定了非聚集索引行。一个常见的场景是\
  \ `AFTER UPDATE` 触发器更新了同一行。\n\n![](img/index-426_1.jpg)\n![](img/index-426_2.jpg)\n\
  ![](img/index-426_3.jpg)\n\n第 19 章 ■ 死锁\n```\n\n\n## 处理包含聚簇与非聚簇索引及`AFTER UPDATE`触发器的死锁场景\n\
  \n我们来看一个场景：你有一个表，其中定义了聚簇索引、非聚簇索引以及`AFTER UPDATE`触发器。假设会话 1 更新了一个不属于非聚簇索引的列。\n\n\
  如图 19-8 所示，此步骤仅对聚簇索引的行获取排他锁（X 锁）。\n\n**图 19-8. 因对同一行多次更新导致的死锁，步骤 1**\n\n该更新操作触发了`AFTER\
  \ UPDATE`触发器。同时，假设另一个会话正尝试使用非聚簇索引选择相同的行。此会话在非聚簇索引的查找操作中成功获取了该非聚簇索引行上的共享锁（S 锁）。然而，在如图\
  \ 19-9 所示的关键查找过程中，当它尝试在聚簇索引行上获取共享锁（S 锁）时，将会被阻塞。\n\n**图 19-9. 因对同一行多次更新导致的死锁，步骤 2**\n\
  \n最后，如果会话 1 的触发器尝试再次更新同一行，修改存在于非聚簇索引中的列，它将会被会话 2 持有的共享锁（S 锁）所阻塞。图 19-10 展示了这种情况。\n\
  \n**图 19-10. 因对同一行多次更新导致的死锁，步骤 3**\n\n### 使用代码验证\n\n让我们用清单 19-2 中展示的代码来证明这一点。\n\n\
  **清单 19-2.** 对同一行的多次更新\n\n```sql\ncreate table dbo.T1\n(\n    CI_Key int not null,\n\
  \    NCI_Key int not null,\n    CI_Col varchar(32),\n    NCI_Included_Col int\n\
  );\n\ncreate unique clustered index IDX_T1_CI on dbo.T1(CI_Key);\n\ncreate nonclustered\
  \ index IDX_T1_NCI\n    on dbo.T1(NCI_Key)\n    include (NCI_Included_Col);\n\n\
  insert into dbo.T1(CI_Key,NCI_Key,CI_Col,NCI_Included_Col)\n    values(1,1,'a',0),\
  \ (2,2,'b',0), (3,3,'c',0), (4,4,'d',0);\n\nbegin tran\n\nupdate dbo.T1 set CI_Col\
  \ = 'abc' where CI_Key = 1;\n\nselect\n    l.request_session_id as [SPID], object_name(p.object_id)\
  \ as [Object]\n    ,i.name as [Index]\n    ,l.resource_type as [Lock Type], l.resource_description\
  \ as [Resource]\n    ,l.request_mode as [Mode], l.request_status as [Status]\n \
  \   ,wt.blocking_session_id as [Blocked By]\nfrom\n    sys.dm_tran_locks l join\
  \ sys.partitions p on\n        p.hobt_id = l.resource_associated_entity_id\n   \
  \ join sys.indexes i on\n        p.object_id = i.object_id and p.index_id = i.index_id\n\
  \    left outer join sys.dm_os_waiting_tasks wt with (nolock) on\n        l.lock_owner_address\
  \ = wt.resource_address and\n        l.request_status = 'WAIT'\nwhere\n    resource_type\
  \ = 'KEY' and request_session_id = @@SPID;\n\nupdate dbo.T1 set NCI_Included_Col\
  \ = 1 where NCI_Key = 1\n\nselect\n    l.request_session_id as [SPID], object_name(p.object_id)\
  \ as [Object]\n    ,i.name as [Index]\n    ,l.resource_type as [Lock Type], l.resource_description\
  \ as [Resource]\n    ,l.request_mode as [Mode], l.request_status as [Status]\n \
  \   ,wt.blocking_session_id as [Blocked By]\nfrom\n    sys.dm_tran_locks l join\
  \ sys.partitions p on\n        p.hobt_id = l.resource_associated_entity_id\n   \
  \ join sys.indexes i on\n        p.object_id = i.object_id and p.index_id = i.index_id\n\
  \    left outer join sys.dm_os_waiting_tasks wt with (nolock) on\n        l.lock_owner_address\
  \ = wt.resource_address and\n        l.request_status = 'WAIT'\nwhere\n    resource_type\
  \ = 'KEY' and request_session_id = @@SPID;\n\ncommit\n```\n\n清单 19-2 中的代码更新了同一行两次。如果查看第一次更新后持有的行级锁，你将只会看到聚簇索引上有一个锁，如图\
  \ 19-11 所示。\n\n**图 19-11. 第一次更新后的行级锁**\n\n第二次更新（更新了存在于非聚簇索引中的列）在此处放置了另一个排他锁（X 锁），如图\
  \ 19-12 所示。这证明了只有在实际更新索引列时才会获取非聚簇索引行上的锁。\n\n**图 19-12. 第二次更新后的行级锁**\n\n# 第 19 章\
  \ ■ 死锁\n\n## 清单 19-3：导致死锁的代码\n\n```sql\nselect CI_Key, CI_Col\n\nfrom dbo.T1 with\
  \ (index = IDX_T1_NCI)\n\nwhere NCI_Key = 1\n```\n\n正如你在图 19-13 中所看到的，该查询成功获取了非聚集索引行上的共享锁(`S`)，但试图获取聚集索引行上的锁时被阻塞。\n\
  \n## 图 19-13：SELECT 查询被阻塞时的行级锁\n\n![](img/index-429_1.jpg)\n\n现在，让我们看看另一个 `SPID\
  \ = 55` 的会话，它在两次更新之间运行了清单 19-3 所示的 `SELECT`，此时你只有一个行级锁被持有。\n\n如果你现在在原始会话（`SPID =\
  \ 56`）中运行第二次更新，它将尝试获取非聚集索引上的排他锁(`X`)，并会被第二个（`SELECT`）会话阻塞，如图 19-14 所示。这导致了死锁情况。\n\
  \n## 图 19-14：运行第二个更新时的行级锁（死锁）\n\n避免此类问题的最佳方法是消除对相同行的多次更新。你可以使用变量或临时表来存储初步数据，并在事务接近尾声时运行单个\
  \ `UPDATE` 语句。或者，你可以更改代码，在第一次 `UPDATE` 语句中为 `NCI_Included_Col` 分配一个临时值，这将同时获取两个索引上的排他锁(`X`)。来自第二个会话的\
  \ `SELECT` 将无法在非聚集索引上获取锁，而第二次更新则可以正常运行。\n\n作为最后的手段，你可以使用一个利用两个索引的计划来读取行，并使用 `XLOCK`\
  \ 锁定提示，这将在两行上都放置排他锁(`X`)，如清单 19-4 和图 19-15 所示。显然，你需要考虑这带来的额外开销。\n\n## 清单 19-4：在两个索引的行上获取排他锁(X\
  \ 锁)\n\n```sql\nbegin tran\n\ndeclare\n\n@Dummy varchar(32)\n\nselect @Dummy = CI_Col\n\
  \nfrom dbo.T1 with (XLOCK index=IDX_T1_NCI)\n\nwhere NCI_Key = 1;\n\nselect\n\n\
  l.request_session_id as [SPID], object_name(p.object_id) as [Object]\n\n,i.name\
  \ as [Index]\n\n,l.resource_type as [Lock Type], l.resource_description as [Resource]\n\
  \n,l.request_mode as [Mode], l.request_status as [Status]\n\n,wt.blocking_session_id\
  \ as [Blocked By]\n\nfrom\n\nsys.dm_tran_locks l join sys.partitions p on\n\np.hobt_id\
  \ = l.resource_associated_entity_id\n\njoin sys.indexes i on\n\np.object_id = i.object_id\
  \ and p.index_id = i.index_id\n\nleft outer join sys.dm_os_waiting_tasks wt with\
  \ (nolock) on\n\nl.lock_owner_address = wt.resource_address and\n\nl.request_status\
  \ = 'WAIT'\n\nwhere\n\nresource_type = 'KEY' and request_session_id = @@SPID;\n\n\
  update dbo.T1 set CI_Col = 'abc' where CI_Key = 1;\n\n/* some code */\n\nupdate\
  \ dbo.T1 set NCI_Included_Col = 1 where NCI_Key = 1;\n\ncommit\n```\n\n![](img/index-430_1.jpg)\n\
  \n## 图 19-15：使用 (XLOCK) 提示的 SELECT 语句之后的行级锁\n\n# 死锁故障排查\n\n简而言之，死锁故障排查与阻塞问题排查非常相似。你需要分析死锁涉及的进程和查询，识别问题的根本原因，并最终解决它。\n\
  \n与 *阻塞进程报告* 类似，还有 *死锁图*，它以 XML 格式提供有关死锁的信息。获取死锁图的方法有很多，如下所示：\n\n-   跟踪标志 1222：此跟踪标志将死锁信息保存到\
  \ SQL Server 错误日志中。你可以使用 `DBCC TRACEON(1222,-1)` 命令为所有会话启用它，或使用启动 *参数 -T1222*。这是在生产环境中使用的完全安全的方法。\n\
  -   `xml_deadlock_report` 扩展事件。\n-   死锁图 SQL Trace 事件。值得注意的是，SQL Profiler 会以图形方式显示死锁。通过事件上下文菜单（鼠标右键单击）中的\
  \ *提取事件数据* 操作，你可以提取 XML 死锁图。\n\n\n- 您可以创建一个在死锁发生时触发的事件通知。\n\n从 SQL Server 2008 开始，每个系统默认都启用了\
  \ `system_health` 扩展事件会话。此会话捕获基本的服务器运行状况信息，包括 `xml_deadlock_report` 事件。如果没有启用其他收集方法，这可能是开始进行故障排除的理想位置。\n\
  \n在 SQL Server 2012 及更高版本中，您可以从 Management Studio 的 `Management` 节点访问 `system_health`\
  \ 会话数据，如图 19-16 所示。您可以通过搜索 `xml_deadlock_report` 事件来分析目标数据。\n\n![](img/index-431_1.jpg)\n\
  \n# 第 19 章 ■ 死锁\n\n## 图 19-16. 访问 `system_health` 扩展事件会话\n\n■ **注意** 我们将在第 27 章更详细地讨论扩展事件。\n\
  \n死锁图的 XML 表示包含两个不同的部分，如清单 19-5 所示。`<process-list>` 和 `<resource-list>` 部分包含有关死锁中涉及的进程和资源的信息。\n\
  \n## 清单 19-5. 死锁图格式\n\n```\n<deadlock-list>\n<deadlock\nvictim=\"...\"\n>\n<process-list>\n\
  <process id=\"...\">\n...\n</process>\n<process id=\"...\">\n...\n</process>\n</process-list>\n\
  <resource-list>\n<\n*有关死锁中涉及资源的信息*\n>\n...\n</\n*有关死锁中涉及资源的信息*\n>\n<\n*有关死锁中涉及资源的信息*\n\
  >\n...\n</\n*有关死锁中涉及资源的信息*\n>\n</resource-list>\n</deadlock>\n</deadlock-list>\n\
  ```\n\n让我们使用表 19-1 中所示的代码在系统中触发一次死锁。您需要并行运行两个会话，先运行 `UPDATE` 语句，然后运行 `SELECT` 语句。\n\
  \n## 表 19-1. 在系统中触发死锁\n\n| 会话 1 | 会话 2 |\n|-----------|-----------|\n| `begin tran`\
  \ | `begin tran` |\n| `update Delivery.Orders` | `update Delivery.Orders` |\n| `set\
  \ OrderStatusId = 1` | `set OrderStatusId = 1` |\n| `where OrderId = 100001;` |\
  \ `where OrderId = 100050;` |\n| `select count(*) as [Cnt]` | `select count(*) as\
  \ [Cnt]` |\n| `from Delivery.Orders` | `from Delivery.Orders` |\n| `where CustomerId\
  \ = 317;` | `where CustomerId = 766;` |\n| `commit` | `commit` |\n\n死锁图中的每个 `<process>`\
  \ 节点都会显示特定进程的详细信息，如清单 19-6 所示。我移除了一些属性的值以便于阅读。我已用粗体突出显示了在故障排除时特别有用的那些属性。\n\n## 清单\
  \ 19-6. 死锁图：`<Process>` 节点\n\n```\n<process id=\"process3e4b29868\"\ntaskpriority=\"\
  0\" logused=\"264\"\nwaitresource=\"KEY: ...\"\nwaittime=\"...\" ownerId=\"...\"\
  \ transactionname=\"... \" lasttranstarted=\"...\" XDES=\"...\"\nlockMode=\"S\"\n\
  schedulerid=\"...\" kpid=\"...\" status=\"suspended\" spid=\"55\" sbid=\"...\"\n\
  ecid=\"...\" priority=\"0\" trancount=\"1\" lastbatchstarted=\"...\" lastbatchcompleted=\"\
  ...\"\nlastattention=\"...\" clientapp=\"...\" hostname=\"...\" hostpid=\"...\"\
  \ loginname=\"...\"\nisolationlevel=\"read committed (2)\"\nxactid=\"...\" currentdb=\"\
  ...\" lockTimeout=\"...\"\nclientoption1=\"...\" clientoption2=\"...\">\n<executionStack>\n\
  <frame procname=\"adhoc\" line=\"1\" stmtstart=\"26\" sqlhandle=\"...\">\nSELECT\
  \ COUNT(*) [Cnt] FROM [Delivery].[Orders] WHERE [CustomerId]=@1\n</frame>\n</executionStack>\n\
  <inputbuf>\nselect count(*) as [Cnt]\nfrom Delivery.Orders\nwhere CustomerId = 766\n\
  commit\n</inputbuf>\n</process>\n```\n\n`id` 属性唯一标识该进程。`waitresource` 和 `lockMode`\
  \ 提供有关进程正在等待的锁类型和资源的信息。在我们的示例中，您可以看到该进程正在等待某一行（键）上的共享 (S) 锁。\n\n`isolationlevel`\
  \ 属性显示当前的事务隔离级别。最后，`executionStack` 和 `inputBuf` 允许您找到死锁发生时执行的 SQL 语句。在某些情况下，特别是当涉及存储过程时，您将需要使用\
  \ sys。\n\n\n\n# 第 19 章 ■ 死锁\n\n`dm_exec_sql_text` 函数用于获取 SQL 语句，其方法与我们在前一章的 [清单\
  \ 18-5](http://dx.doi.org/10.1007/978-1-4842-1964-5_18#Par51) 中所做的一样。\n\n死锁图的 `<resource-list>`\
  \ 部分包含了涉及死锁的资源信息。该信息展示在 清单 19-7 中。\n\n## 清单 19-7. 死锁图：`<Resource-list>` 节点\n\n```xml\n\
  <resource-list>\n  <keylock hobtid=\"72057594039500800\" dbid=\"14\" objectname=\"\
  SqlServerInternals.\nDelivery.Orders\" indexname=\"PK_Orders\" id=\"lock3e98b5d00\"\
  \ mode=\"X\"\nassociatedObjectId=\"72057594039500800\">\n    <owner-list>\n    \
  \  <owner id=\"process3e6a890c8\" mode=\"X\"/>\n    </owner-list>\n    <waiter-list>\n\
  \      <waiter id=\"process3e4b29868\" mode=\"S\" requestType=\"wait\"/>\n    </waiter-list>\n\
  \  </keylock>\n  <keylock hobtid=\"72057594039500800\" dbid=\"14\" objectname=\"\
  SqlServerInternals.\nDelivery.Orders\" indexname=\"PK_Orders\" id=\"lock3e98ba500\"\
  \ mode=\"X\"\nassociatedObjectId=\"72057594039500800\">\n    <owner-list>\n    \
  \  <owner id=\"process3e4b29868\" mode=\"X\"/>\n    </owner-list>\n    <waiter-list>\n\
  \      <waiter id=\"process3e6a890c8\" mode=\"S\" requestType=\"wait\"/>\n    </waiter-list>\n\
  \  </keylock>\n</resource-list>\n```\n\nXML 元素的名称标识了资源的类型。`keylock`、`pagelock` 和\
  \ `objectlock` 分别代表行级锁、页锁和对象锁。你还可以看到这些锁属于哪些对象和索引。最后，`owner-list` 和 `waiter-list`\
  \ 节点提供了拥有锁和等待锁的进程信息，以及所获取和请求的锁类型。你可以将这些信息与死锁图的 `process-list` 部分的数据关联起来。\n\n你可能已经猜到，接下来的步骤与**阻塞进程故障排除**非常相似；也就是说，你需要找出涉及死锁的查询，并弄清楚死锁发生的原因。\n\
  \n然而，有一个重要因素需要考虑。在大多数情况下，一个会话中的死锁涉及同一事务内运行的多条语句。死锁图仅为你提供最后一条语句的信息——即触发死锁的那条语句。\n\
  \n你可以在 `resource-list` 节点中看到其他语句的*迹象*。它显示进程在行上持有排他锁（X），但没有告诉你获取这些锁的语句。在分析问题的根本原因时，识别涉及死锁的语句非常有用。\n\
  \n在我们的示例中，当你查看 表 19-1 中的列表时，你会看到两条语句。`UPDATE` 语句更新单行——它获取并持有该行上的排他锁（X）。你可以在死锁图的\
  \ `resource-list` 节点中看到两个进程都拥有那些排他锁（X）。\n\n下一步，你需要理解为什么 `SELECT` 查询试图在已经持有排他锁（X）的行上获取共享锁（S）。你可以通过运行查询或使用\
  \ `sys.dm_exec_query_stats` DMV 来查看进程节点中 `SELECT` 语句的执行计划，如前一章的 [清单 18-5](http://dx.doi.org/10.1007/978-1-4842-1964-5_18#Par51)\
  \ 所示。结果，你将得到如 图 19-17 所示的执行计划。该图还显示了查询执行期间获取的锁数量。\n\n![](img/index-434_1.jpg)\n\n\
  ![](img/index-434_2.jpg)\n\n## 图 19-17. 查询的执行计划\n\n如你所见，计划中有一个聚集索引扫描，这为你提供了足够的数据分析。`SELECT`\
  \ 查询扫描了整个表。因为两个进程都使用 `READ COMMITTED` 隔离级别，所以查询试图对表中的每一行获取共享锁（S），并被另一个会话持有的排他锁（X）阻塞。即使这些行没有查询正在查找的\
  \ `CustomerId` 也无关紧要。为了评估这个谓词，查询必须读取这些行，这\n\n\n\n# 第十九章 ■ 死锁\n\n需要在其上获取共享（S）锁。\n\
  \n你可以通过在 `CustomerID` 列上添加一个非聚集索引来解决这种死锁情况。这将消除聚集索引扫描，并用一个 `索引查找` 运算符替代，如图 19-18\
  \ 所示。\n\n**图 19-18.** 使用非聚集索引的查询执行计划\n\n查询将不再获取表中每一行的共享（S）锁，而是只读取属于特定客户的行。这将大幅减少需要获取的共享（S）锁的数量，并防止查询被其他客户行上的排他（X）锁阻塞。\n\
  \n在某些情况下，你可能会遇到查询内并行死锁——即具有并行执行计划的查询自身发生死锁。幸运的是，这种情况很少见，并且通常是由 SQL Server 中的错误而非应用程序或数据库问题引起的。当死锁图中出现两个以上具有相同\
  \ `SPID` 的进程，并且 `resource-list` 中列出 `exchangeEvent` 和/或 `threadPoll` 作为资源，且没有任何关联的锁资源时，你就可以检测到这些情况。当这种情况发生时，你可以通过使用\
  \ `MAXDOP 提示` 降低查询的并行度来规避问题。也有可能该问题已在最新的服务包或累积更新中得到修复。\n\n## 降低死锁的几率\n\n最后，我可以提供一些实用的建议来帮助你降低系统中发生死锁的几率，如下所示：\n\
  \n1.  **优化查询。** 非优化查询引入的扫描是死锁最常见的原因。正确的索引不仅能提高查询性能，还能减少需要读取的行数和需要获取的锁的数量，从而降低与其他会话发生锁冲突的可能性。\n\
  \n2.  **尽可能缩短锁的持有时间。** 正如你所记得的，所有排他（X）锁都会一直持有到事务结束。保持事务简短，并尝试在尽可能接近事务结束时才更新数据，以减少锁冲突的机会。在我们的例子中，你可以修改代码，交换\
  \ `SELECT` 和 `UPDATE` 语句的顺序。这将解决这个特定的死锁问题，因为在获取排他（X）锁之后，事务中将没有任何可能被阻塞的语句。\n\n3.\
  \  **使用满足所需数据一致性的最低事务隔离级别。** 这可以缩短共享（S）锁的持有时间。即使在我们的例子中交换了 `SELECT` 和 `UPDATE` 语句，在\
  \ `可重复读` 或 `可序列化` 隔离级别下，你仍然可能出现死锁。在这些隔离级别下，共享（S）锁会一直持有到事务结束，从而会阻塞 `UPDATE` 语句。在\
  \ `读已提交` 模式下，共享（S）锁在行被读取后就会释放，`UPDATE` 语句不会被阻塞。在某些情况下，你可以切换到乐观隔离级别，我们将在[第 22 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_22)中讨论。\n\
  \n4.  **当涉及多个索引时，避免在同一事务中多次更新同一行。** 正如你在本章前面所见，当索引列未被更新时，SQL Server 不会在非聚集索引行上放置排他（X）锁。其他会话可以在那里放置不兼容的锁，从而阻塞后续的更新，导致死锁。\n\
  \n5.  **使用重试逻辑。** 将关键代码封装在 `TRY..CATCH` 块中，如果发生死锁则重试该操作。由死锁引起的异常错误编号是 `1205`。清单\
  \ 19-8 中的代码展示了如何实现这一点。\n\n**清单 19-8.** 使用 `TRY..CATCH` 块在发生死锁时重试操作\n\n```sql\n--\
  \ 声明并设置变量，以在退出前跟踪重试次数。\ndeclare\n@retry int = 5\n```\n\n\n\n```sql\n-- 如果此任务被选为死锁受害者，则持续尝试更新表。\n\
  \nwhile (@retry > 0)\n\nbegin\n\nbegin try\n\nbegin tran\n\n-- 可能导致死锁的某些代码\n\ncommit\n\
  \nend try\n\nbegin catch\n\n-- 检查错误号。如果是死锁受害者错误，则减少下一次更新重试的重试计数。\n-- 如果发生其他错误，则退出\
  \ WHILE 循环。\n\nif (error_number() = 1205)\n\nset @retry = @retry – 1;\n\nelse\n\n\
  set @retry = 0;\n\nif xact_state() <> 0\n\nrollback;\n\nend catch\n\nend\n```\n\n\
  # 第 19 章 死锁\n\n## 摘要\n\n除了被视为 SQL Server 代码中缺陷的查询内并行死锁外，当多个会话竞争同一组资源时，就会发生死锁。\n\n\
  死锁故障排除的关键元素是死锁图，它提供了有关死锁中涉及的进程和资源的信息。您可以通过启用跟踪标志 `T1222`、捕获 `xml_deadlock_report`\
  \ 扩展事件和 `Deadlock graph` SQL 跟踪事件，或在系统中设置死锁事件通知来收集死锁图。在 SQL Server 2008 及更高版本中，`xml_deadlock_report`\
  \ 事件包含在 `system_health` 扩展事件会话中，该会话在每个 SQL Server 安装中默认启用。\n\n死锁图将为您提供有关触发死锁的查询的信息。然而，您应该记住，在大多数情况下，死锁涉及在同一事务内获取并持有锁的多个语句。\n\
  \n尽管死锁可能由多种原因引起，但它们通常是由未优化查询中的扫描期间过度加锁导致的。查询优化可以帮助解决这些问题。\n\n# 第 20 章 锁升级\n\n尽管行级锁从并发性角度来看非常棒，但它的开销很大。在内存中，一个锁结构在\
  \ 32 位操作系统中使用 64 字节，在 64 位操作系统中使用 128 字节。保存关于数百万行级和页级锁的信息将需要 SQL Server 分配千兆字节的\
  \ RAM 来存储它们。SQL Server 使用一种称为 `锁升级` 的技术来减少内存中持有的锁数量，我们将在本章中讨论此技术。\n\n#### 锁升级概述\n\
  \n一旦一个语句在同一个对象上获取了至少 5,000 个行级和页级锁，SQL Server 就会尝试升级，或者更准确地说，将这些锁替换为单个表级锁，在某些情况下是分区级锁。如果没有其他会话在该对象或分区上持有不兼容的锁，此操作就会成功。\n\
  \n当此类操作成功时，SQL Server 会释放事务在该对象（或分区）上持有的所有行级和页级锁，仅保留对象级（或分区级）锁。如果操作失败，SQL Server\
  \ 将继续使用行级锁，并在大约每获取 1,250 个新锁后重复升级尝试。除了获取的锁数量外，当实例中的锁总数超过内存或配置阈值时，SQL Server 也可能升级锁。\n\
  \n### 注意\n\n锁数量的阈值 5,000/1,250 是一个近似值。触发锁升级的实际获取锁数量会有所不同。\n\n让我们看一个例子。第一个会话在 `REPEATABLE\
  \ READ` 事务隔离级别下启动一个事务，并运行一个 `SELECT` 语句来计算 `Delivery.Orders` 表中的行数。您会记得，在此隔离级别下，SQL\
  \ Server 会一直持有共享锁直到事务结束。\n\n让我们使用 `ALTER TABLE SET (LOCK_ESCALATION=DISABLE)` 命令为此表禁用锁升级（稍后会详细介绍），并查看\
  \ SQL Server 获取的锁数量以及存储它们所需的内存。我们将使用 `WITH (ROWLOCK)` 提示来防止 SQL Server 通过获取页级共享锁而不是行级锁来优化加锁的情况。此外，在事务仍处于活动状态时，让我们从另一个会话插入另一行，以演示锁升级如何影响系统中的并发性。\n\
  \n\n\n# 第 20 章 ■ 锁升级\n\n表 20-1 展示了两个会话的代码以及来自动态管理视图（DMV）的输出。图 20-1 显示了在事务活动期间的`锁内存（KB）`系统性能计数器。\n\
  \n© Dmitri Korotkevitch 2016\n\nD. Korotkevitch, *Pro SQL Server Internals*, DOI\
  \ 10.1007/978-1-4842-1964-5_20\n\n![](img/index-438_1.jpg)\n\n## 表 20-1. 禁用锁升级的测试代码\n\
  \n**会话 1**\n\n**会话 2**\n\n```sql\nalter table Delivery.Orders set (lock_escalation=disable);\n\
  ```\n\n```sql\nset transaction isolation level repeatable read\nbegin tran\nselect\
  \ count(*) from Delivery.Orders with (rowlock);\n-- 成功\n\ninsert into Delivery.Orders\n\
  (OrderDate,OrderNum,CustomerId)\nvalues(getUTCDate(),'99999',100);\n-- 结果: 10,212,326\n\
  \nselect count(*) as [Lock Count]\nfrom sys.dm_tran_locks;\n-- 结果: 1,940,272 KB\n\
  \nselect sum(pages_kb) as [Memory, KB]\nfrom sys.dm_os_memory_clerks\nwhere type\
  \ = 'OBJECTSTORE_LOCK_MANAGER';\n\ncommit\n```\n\n## 图 20-1. 锁内存（KB）系统性能计数器\n\n\
  正如您所见，从并发性的角度来看，行级锁定是完美的。只要会话不争夺相同的行，它们就不会相互阻塞。同时，保持大量的锁是内存密集型的，而内存是 SQL Server\
  \ 中最宝贵的资源之一。这对于非企业版尤其重要，因为非企业版对可以使用的内存量有限制。在我们的示例中，SQL Server 需要保留数百万个锁结构，占用近 2\
  \ GB 的 RAM。这个数字包括了行级共享（S）锁以及页级意向共享（IS）锁。此外，维护锁信息和系统中大量锁结构也有开销。\n\n让我们看看如果使用 `ALTER\
  \ TABLE SET (LOCK_ESCALATION=TABLE)` 命令启用锁升级，并运行表 20-2 所示的代码，会发生什么。图 20-2 显示了 `sys.dm_tran_locks`\
  \ 视图的输出。\n\n![](img/index-439_1.jpg)\n\n## 表 20-2. 启用锁升级的测试代码\n\n**会话 1**\n\n**会话\
  \ 2**\n\n```sql\nalter table Delivery.Orders set (lock_escalation=table);\n```\n\
  \n```sql\nset transaction isolation level repeatable read\nbegin tran\nselect count(*)\
  \ from Delivery.Orders with (rowlock);\n-- 会话被阻塞\n\ninsert into Delivery.Orders\n\
  (OrderDate,OrderNum,CustomerId)\nvalues(getUTCDate(),'100000',100);\n\nselect\n\
  \    request_session_id as [SPID]\n    ,resource_type as [Resource]\n    ,request_mode\
  \ as [Lock Mode]\n    ,request_status as [Status]\nfrom sys.dm_tran_locks;\n\ncommit\n\
  ```\n\n## 图 20-2. 启用锁升级时的 Sys.dm_tran_locks 输出\n\nSQL Server 用对象级共享（S）锁替换了行级和页级锁。虽然从内存使用角度来看这很棒——只需要维护一个锁——但它影响了并发性。正如您所见，第二个会话被阻塞；它无法在表上获取意向排他（IX）锁，因为它与第一个会话持有的完整共享（S）锁不兼容。还值得一提的是，`WITH\
  \ (ROWLOCK)` 提示不会影响锁升级行为。\n\n锁升级默认是启用的，并且可能引入阻塞问题，这对开发人员和数据库管理员来说可能会令人困惑。我们来讨论几种典型情况。\n\
  \n第一种情况是为了数据一致性目的，使用 `REPEATABLE READ` 或 `SERIALIZABLE` 隔离级别进行报表查询。如果报表查询在无会话更新数据时读取大量数据，这些查询可能会将共享（S）锁升级到表级别。之后，所有写入者都将被阻塞，即使试图插入新数据或修改报表查询未读取的数据，正如您在本章前面所见。解决此问题的一种方法是切换到*乐观事务隔离*。\n\
  \n![](img/index-440_1.jpg)\n\n\n\n# 第 20 章 ■ 锁升级\n\n## 锁升级\n\n*级别*，我们将在下一章讨论。\n\n\
  第二种情况是清除（purge）过程的实现。假设你需要使用一条 `DELETE` 语句来清除大量数据。如果实现方式是一次性删除大量行，那么可能会有一个排他（`X`）锁升级到表级别。这会阻止所有写入者访问该表，也会阻止处于\
  \ `READ COMMITTED`、`REPEATABLE READ` 或 `SERIALIZABLE` 隔离级别的读取者访问，即使这些查询处理的数据集与你正在清除的数据完全不同。\n\
  \n最后，考虑一下使用单条 `INSERT` 语句插入大量行的过程。与清除过程类似，它可能会将一个排他（`X`）锁升级到表级别，并阻止其他会话访问该表。\n\n\
  所有这些模式都有一个共同点：它们在单条语句中获取并持有大量的行级和页级锁。这会触发锁升级，如果当时没有其他会话在表（或分区）级别持有不兼容的锁，升级就会成功。然后，这会阻止其他会话在该表（或分区）上获取不兼容的意向锁或完全锁，直到第一个会话完成其事务为止，无论被阻塞的会话是否试图访问受第一个会话影响的数据。\n\
  \n值得重申的是，锁升级是由语句获取的锁数量触发的，而不是由事务触发的。如果各个语句获取的行级和页级锁各自少于 5,000 个，则不会触发锁升级，无论事务总共持有多少锁。\n\
  \n清单 20-1 展示了一个在单个事务中循环运行多条更新语句的示例。\n\n### 清单 20-1. 锁升级与多条语句\n\n```sql\ndeclare\n\
  @id int = 1\n\nbegin tran\n\nwhile @id < 100000\nbegin\n    update Delivery.Orders\n\
  \    set OrderStatusId = 1\n    where OrderId between @id and @id + 4998;\n\n  \
  \  select @id += 4999\nend\n\nselect count(*) as [Lock Count]\nfrom sys.dm_tran_locks\n\
  where request_session_id = @@SPID;\n\ncommit\n```\n\n图 20-3 显示了清单 20-1 中 `SELECT`\
  \ 语句的输出。即使事务持有的锁总数远超阈值，也未触发锁升级。\n\n### 图 20-3. 事务持有的锁数量\n\n![](img/index-441_1.jpg)\n\
  \n#### 锁升级故障排除\n\n有几种方法可以排除因锁升级而引起的阻塞问题。潜在问题的一个迹象是等待统计中意向锁等待的百分比很高。\n\n你可以使用扩展事件（Extended\
  \ Events）来监控和捕获锁升级。图 20-4 展示了 `lock_escalation` 扩展事件及其部分可用事件字段。\n\n■ **注意** 我们将在本书第五部分讨论等待统计分析和扩展事件。\n\
  \n### 图 20-4. Lock_escalation 扩展事件\n\n图 20-5 展示了该事件捕获的数据。\n\n![](img/index-442_1.jpg)\n\
  \n![](img/index-442_2.jpg)\n\n### 图 20-5. Lock_escalation 扩展事件数据\n\n类似地，你可以使用 SQL\
  \ 跟踪（SQL Traces）来捕获锁升级事件。图 20-6 展示了在 *SQL Profiler* 应用程序中此事件的输出。\n\n### 图 20-6.\
  \ SQL Server Profiler 中的锁升级事件\n\nSQL 跟踪提供以下属性：\n\n-   `EventSubClass` 指示是什么触发了锁升级——是锁数量达到阈值还是内存阈值。\n\
  -   `IntegerData` 和 `IntegerData2` 显示了升级发生时存在的锁数量以及在升级过程中转换了多少个锁。值得注意的是，在我们的示例中，锁升级是在语句获取了\
  \ 6,248 个锁而非 5,000 个锁时发生的。\n-   `Mode` 告知升级的是哪种类型的锁。\n\n\n\n# 第 20 章 ■ 锁升级\n\n![](img/index-443_1.jpg)\n\
  \n![](img/index-443_2.jpg)\n\n-   `ObjectID` 是触发锁升级的表的 `object_id`。\n-   `ObjectID2`\
  \ 是触发锁升级的 `HoBT` ID。\n-   `Type` 代表锁升级的粒度。\n-   `TextData`、`LineNumber` 和 `Offset`\
  \ 提供了关于触发锁升级的批处理和语句的信息。\n\n在“SQL Server 访问方法”部分中，还有一个 `Table Lock Escalations/sec`\
  \ 性能计数器，这对于建立系统基线可能很有用。\n\n从被阻塞会话的角度来看，如果你运行如代码清单 18-2（第 18 章）所示的代码，你将看到如图 20-7\
  \ 所示的结果。\n\n**图 20-7.** 由锁升级导致的阻塞与被阻塞会话\n\n这里的关键点是，你拥有两个对象级锁。被阻塞的会话正试图获取对象级别的意向锁，而阻塞会话则持有一个不兼容的完全锁。\n\
  \n如果你查看被阻塞进程报告，可以看到被阻塞的进程正在等待对象上的意向锁，如代码清单 20-2 所示。\n\n**代码清单 20-2.** 被阻塞进程报告（部分）\n\
  \n```xml\n<blocked-process-report>\n<blocked-process>\n<process id=\"...\" taskpriority=\"\
  0\" logused=\"0\"\nwaitresource=\"OBJECT: ...\"\nwaittime=\"...\"\nownerId=\"...\"\
  \ transactionname=\"user_transaction\" lasttranstarted=\"...\" XDES=\"...\"\nlockMode=\"\
  IX\"\nschedulerid=\"...\" ...>\n```\n\n请记住，会话获取完全对象级锁或被阻塞等待表上的意向锁可能有其他原因。你必须关联来自其他来源（扩展事件、SQL\
  \ 跟踪等）的信息，以确定阻塞确实是由于锁升级引起的。\n\n尽管锁升级可能引入阻塞问题，但它有助于保护 SQL Server 内存。如果没有锁升级，实例持有的大量锁会减少缓冲池的大小。结果，缓存中的数据页变少，这可能导致更多的物理\
  \ I/O 操作并降低查询性能。此外，当没有可用内存来存储锁信息时，SQL Server 可能会以错误 1204 终止查询。图 20-8 显示了这样一个错误消息。\n\
  \n**图 20-8.** 错误 1204\n\n## 第 20 章 ■ 锁升级\n\n在 SQL Server 2008 及更高版本中，你可以使用 `ALTER\
  \ TABLE SET LOCK_ESCALATION` 语句在表级别控制锁升级行为。此选项影响为表定义的所有聚集和非聚集索引的锁升级行为。有三个可用选项：\n\
  \n-   `DISABLE`：此选项禁用特定表的锁升级。\n-   `TABLE`：SQL Server 将锁升级到表级别。这是默认选项。\n-   `AUTO`：当表已分区时，SQL\
  \ Server 将锁升级到分区级别；当表未分区时，则升级到表级别。对于大型分区表，特别是当有大型报表查询运行在旧数据上时，使用此选项。\n\n不幸的是，SQL\
  \ Server 2005 不支持此选项，此版本中禁用锁升级的唯一方法是在实例或会话级别使用已记录的跟踪标志 `T1211` 或 `T1224`。请记住，你需要拥有\
  \ `sysadmin` 权限才能调用 `DBCC TRACEON` 命令并在会话级别设置跟踪标志。\n\n-   `T1211` 无论内存状况如何都禁用锁升级。\n\
  -   `T1224` 根据锁数量阈值禁用锁升级，尽管在内存压力情况下锁升级仍可能被触发。\n\n**注意** 你可以在联机丛书中阅读更多关于跟踪标志 `T1211`\
  \ 和 `T1224` 的信息：[`technet.microsoft.com/en-us/library/ms188396.aspx`](http://technet.microsoft.com/en-us/library/ms188396.aspx)。\n\
  \n\n# 锁升级问题的分析与解决方案\n\n## 概述\n\n与其他阻塞问题一样，您应当找出导致锁升级发生的根本原因。同时，您也应该权衡在系统特定对象上禁用锁升级的利弊。\n\
  \n虽然这样做可以减少系统中的阻塞，但 SQL Server 将消耗更多内存来存储锁信息。当然，您也可以将代码重构视为另一种备选方案。\n\n## 针对写操作导致的锁升级\n\
  \n如果锁升级是由写操作（writers）触发的，您可以通过减小批处理量来使其在每个对象上获取的行锁和页锁少于 5,000 个。您仍然可以在同一个事务中处理多个批次——5,000\
  \ 个锁的阈值是针对每条语句而言的。同时，您需要记住，较小的批次通常不如大的批次高效。您需要微调批处理大小并找到最佳值。只要对象级锁没有被持有过长的时间，和/或它不影响其他会话，那么触发锁升级是正常现象。\n\
  \n## 针对读操作导致的锁升级\n\n至于由读操作（readers）触发的锁升级，您应避免出现持有大量共享（S）锁的情况。一个例子是由于非优化查询或报表查询在\
  \ `REPEATABLE READ` 或 `SERIALIZABLE` 事务隔离级别下进行扫描，这些查询会持有共享（S）锁直到事务结束。示例 清单 20-3\
  \ r 使用 `REPEATABLE READ` 隔离级别对 `Delivery.Orders` 表执行 `SELECT`。图 图 20-9 展示了该查询的输出。\n\
  \n**清单 20-3.** 由非优化查询触发的锁升级\n\n```sql\nset transaction isolation level repeatable\
  \ read\n\nbegin tran\n\nselect OrderId, OrderDate, Amount\nfrom Delivery.Orders\n\
  where OrderNum = '1';\n\nselect\n    resource_type as [Resource Type]\n    ,case\
  \ resource_type\n        when 'OBJECT' then object_name(resource_associated_entity_id,resource_database_id)\n\
  \        when 'DATABASE' then 'DB'\n        else\n            ( select object_name(object_id,\
  \ resource_database_id)\n              from sys.partitions\n              where\
  \ hobt_id = resource_associated_entity_id )\n    end as [Object]\n    ,request_mode\
  \ as [Mode]\n    ,request_status as [Status]\nfrom sys.dm_tran_locks\nwhere request_session_id\
  \ = @@SPID;\n\ncommit\n```\n\n**图 20-9.** 在 `REPEATABLE READ` 隔离级别下选择数据\n\n即使该查询只返回了一行，您也可以看到共享（S）锁已被升级到表级。让我们看一下图\
  \ 图 20-10 . 中展示的执行计划。\n\n**图 20-10.** 查询的执行计划\n\n`OrderNum` 列上没有索引，SQL Server 使用了\
  \ *聚集索引扫描* 操作符。即使查询只返回一行，它也会获取并持有其读取的所有行的共享（S）锁。结果便是触发了锁升级。如果您在 `OrderNum` 列上添加一个索引，它会将执行计划更改为\
  \ *非聚集索引查找*。此时只读取一行，获取并持有的行级和页级锁极少，因此不再需要锁升级。\n\n## 高级解决方案与替代方法\n\n在某些情况下，您可以考虑对表进行分区，并使用\
  \ `ALTER TABLE SET (LOCK_ESCALATION=AUTO)` 语句将锁升级选项设置为使用分区级升级，而非表级。这在必须使用 `DELETE`\
  \ 语句清除旧数据或在 `REPEATABLE READ` 或 `SERIALIZABLE` 隔离级别下针对旧数据运行报表查询的场景中可能有所帮助。在这些情况下，语句会将锁升级到分区而非表，而那些不访问这些分区的查询就不会被阻塞。\n\
  \n在其他情况下，您可以切换到乐观隔离级别，这将在 [第 21 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_21)\
  \ 中讨论。\n\n最后，在 `READ UNCOMMITTED` 事务隔离级别下，您将不会遇到任何与读操作相关的阻塞问题，因为该级别不获取共享（S）锁。尽管这种方法由于引入的所有其他数据一致性问题而不被推荐。\n\
  \n# 第 20 章 ■ 锁升级\n\n#### 总结\n\nSQL Server 会进行**锁升级**，通常会在一条语句获取并持有大约 5,000 个行级和页级锁之后升级到对象级别。当升级成功时，SQL\
  \ Server 会保留一个单独的对象级锁，从而阻止其他持有不兼容锁类型的会话访问该表。如果升级失败，SQL Server 会在每获取大约 1,250 个新锁后重复尝试升级。\n\
  \n锁升级完全符合“视情况而定”的类别。它能减少 SQL Server 锁管理器的内存使用以及维护大量锁的开销。同时，由于持有的对象级或分区级锁，它也可能增加系统中的阻塞。\n\
  \n除非你发现它导致了系统中明显的阻塞问题，否则应保持锁升级处于启用状态。即便如此，你也应进行根本原因分析，探究为何会发生因锁升级导致的阻塞，并评估禁用它的利弊。你还应考虑其他可用选项，例如代码和数据库架构重构、查询优化或切换到乐观事务隔离级别。这些选项中的任何一个都可能是解决阻塞问题的更佳选择，而不是禁用锁升级。\n\
  \n![](img/index-447_1.png)\n\n# 第 21 章 ■ 乐观隔离级别\n\n#### 乐观事务隔离级别\n\n*乐观事务隔离级别*在\
  \ SQL Server 2005 中引入，作为一种处理阻塞问题和解决数据一致性问题的新方法。使用乐观事务隔离级别时，查询在访问被其他会话修改的数据时，会读取行的“旧”已提交版本，而不是被共享锁和排他锁的不兼容性所阻塞。\n\
  \n本章将解释乐观隔离级别的实现方式及其如何影响系统的锁行为。\n\n#### 行版本控制概述\n\n使用乐观事务隔离级别时，当发生更新操作，SQL Server\
  \ 会将行的旧版本存储在 `tempdb` 中一个称为*版本存储区*的特殊区域。数据库中的原始行也会被修改，添加一个 14 字节的指针，该指针引用行的旧版本。根据情况，版本存储区中可能为一行存储多个版本记录。图\
  \ 21-1 说明了这种行为。\n\n***图 21-1.** 版本存储区*\n\n现在，当读取器（有时也包括写入器）访问持有排他锁的行时，它们会从版本存储区读取旧版本，而不是被阻塞，如图\
  \ 21-2 所示。\n\n© Dmitri Korotkevitch 2016\n\nD. Korotkevitch, *Pro SQL Server Internals*,\
  \ DOI 10.1007/978-1-4842-1964-5_21\n\n![](img/index-448_1.jpg)\n\n## 第 21 章 ■ 乐观隔离级别\n\
  \n***图 21-2.** 读取器与版本存储区*\n\n正如你所猜测的，虽然乐观隔离级别有助于减少阻塞，但也需要付出一些权衡。其中最显著的是它们增加了 `tempdb`\
  \ 的负载。在高度易变的系统上使用乐观隔离级别可能导致非常繁重的 `tempdb` 活动，并显著增加 `tempdb` 的大小。我们将在本章后面更详细地探讨这个问题。\n\
  \n在数据修改和检索期间也存在开销。SQL Server 需要将数据复制到 `tempdb`，并维护版本记录的链表。同样，在读取数据时，它也需要遍历该列表。这增加了额外的\
  \ CPU 和 I/O 负载。你需要记住这些权衡，尤其是在将系统托管在云中时，因为 I/O 性能可能迅速成为系统的瓶颈。\n\n最后，乐观隔离级别会导致索引碎片。当一行被修改时，由于版本控制标签指针，SQL\
  \ Server 会使行大小增加 14 字节。如果页面被紧密打包，并且行的新版本无法放入该页面，将导致页面拆分和进一步的碎片。这非常类似于我们在第 6 章“索引碎片”中讨论的插入/更新模式。这\
  \ 14 字节将保留在行中，即使版本存储区中的记录已被删除，直到索引被重建。\n\n■ **提示** 如果使用乐观隔离级别，建议使用小于 100 的 `FILLFACTOR`\
  \ 在页面上预留一些空间。这可以减少因版本存储区指针导致行大小增加而引起的页面拆分。\n\n#### 乐观事务隔离级别\n\n有两种乐观事务隔离级别：`READ\
  \ COMMITTED SNAPSHOT` 和 `SNAPSHOT`。严格来说，`SNAPSHOT` 是一个独立的事务隔离级别，而 `READ COMMITTED\
  \ SNAPSHOT` 是一个数据库选项，它改变了读取器在 `READ COMMITTED` 事务隔离级别下的行为。\n\n让我们深入探讨这些级别。\n\n###\
  \ READ COMMITTED SNAPSHOT 隔离级别\n\n两种乐观隔离级别都需要在数据库级别启用。你可以使用 `ALTER DATABASE SET\
  \ READ_COMMITTED_SNAPSHOT ON` 命令来启用 `READ COMMITTED SNAPSHOT`。该语句需要获取数据库上的排他锁以更改数据库选项，如果还有其他用户连接到数据库，它将被阻塞。你可以通过运行\
  \ `ALTER DATABASE SET READ_COMMITTED_SNAPSHOT ON WITH ROLLBACK AFTER X SECONDS`\
  \ 命令来解决此问题。这将回滚所有活动事务并终止现有数据库连接，从而允许更改数据库选项。\n\n![](img/index-449_1.jpg)\n\n## 第\
  \ 21 章 ■ 乐观隔离级别\n\n如前所述，`RCSI` 改变了读取器在 `READ COMMITTED` 模式下的行为。然而，它并不影响写入器的行为。\n\
  \n如图 21-3 所示，读取器不再获取共享锁并被行上持有的排他锁阻塞，而是使用版本存储区中行的旧版本。写入器仍然以与悲观隔离级别相同的方式获取更新锁和排他锁。再次说明，如你所见，不同会话的写入器之间仍然存在阻塞，尽管写入器不会阻塞读取器，其行为类似于\
  \ `READ UNCOMMITTED` 模式。\n\n***图 21-3.** Read Committed Snapshot 隔离级别行为*\n\n然而，`READ\
  \ UNCOMMITTED` 和 `READ COMMITTED SNAPSHOT` 隔离级别之间有一个主要区别。`READ UNCOMMITTED` 是以牺牲数据一致性为代价来消除阻塞的。许多一致性异常是可能的，包括读取未提交的数据、重复读和丢失行。另一方面，`READ\
  \ COMMITTED SNAPSHOT` 隔离级别为你提供了完整的语句级一致性。在此隔离级别下运行的语句既不会访问未提交的数据，也不会访问语句开始后提交的数据。\n\
  \n一个明显的结论是，你应该避免在使用 `READ COMMITTED SNAPSHOT` 隔离级别的查询中使用 `NOLOCK` 提示。虽然在 `READ UNCOMMITTED`\
  \ 中使用 `NOLOCK` 本身就是一种不好的实践，但在 `READ COMMITTED SNAPSHOT` 模式下完全无用，因为它提供了相同的阻塞行为而不会丢失查询的数据一致性。\n\
  \n■ **提示** 将数据库切换到 `READ COMMITTED SNAPSHOT` 隔离级别可以是一个很好的应急技术，当系统正遭受阻塞问题时。它可以在不更改任何代码的情况下消除写入器/读取器的阻塞，前提是读取器运行在\
  \ `READ COMMITTED` 隔离级别下。显然，这只是临时解决方案，你需要检测并消除问题的根本原因。\n\n### SNAPSHOT 隔离级别\n\n\
  `SNAPSHOT` 是一个独立的事务隔离级别，需要在代码中通过 `SET TRANSACTION ISOLATION LEVEL SNAPSHOT` 语句或使用\
  \ `WITH (SNAPSHOT)` 表提示来显式设置。\n\n默认情况下，禁止使用 `SNAPSHOT` 隔离级别。你必须使用 `ALTER DATABASE`\
  \ 命令来启用它。\n\n\n`SET ALLOW_SNAPSHOT_ISOLATION ON` 语句不需要独占数据库锁，可以在其他用户连接到数据库时执行。\n\
  \n快照隔离级别提供事务级别的一致性。无论事务活跃时间多长、其他事务在此期间做了多少数据更改，事务都将看到其启动时刻数据的快照。\n\n![](img/index-450_1.jpg)\n\
  \n# 第 21 章 ■ 乐观隔离级别\n\n在图 21-4 所示的例子中，我们有一个会话 1，它在时间 T1 启动事务并读取一行。在时间 T2，有会话 2 在隐式事务中修改了该行。此时，该行的旧（原始）版本被移动到\
  \ tempdb 中的版本存储区。\n\n## 图 21-4. 快照隔离级别与读取者行为\n\n下一步，我们在时间 T3 有会话 3 启动另一个事务并读取同一行。它看到的是由会话\
  \ 2（在时间 T2）修改并提交的行版本。在时间 T4，有会话 4 在隐式事务中再次修改该行。此时，版本存储区中有两个行版本——一个存在于 T2 到 T4 之间，另一个是\
  \ T2 之前存在的原始版本。现在，如果会话 3 再次运行`SELECT`，它将使用存在于 T2 到 T4 之间的版本，因为这个版本在会话 3 事务启动时已经提交。类似地，会话\
  \ 1 将使用 T2 之前存在的原始行版本。在会话 1 和会话 3 提交后的某个时刻，版本存储区清理任务会将这两条记录都从版本存储区中移除——当然，前提是没有任何其他事务需要它们。\n\
  \n`SERIALIZABLE`和`SNAPSHOT`隔离级别针对数据不一致问题提供相同级别的保护；然而，它们的行为有细微差别。快照隔离级别的事务看到的数据是事务开始时的数据。而`SERIALIZABLE`隔离级别的事务看到的数据是首次访问数据时的数据。考虑这样一种情况：某个会话在事务中途从表中读取数据。如果另一个会话在事务启动后、但数据被读取前更改了该表中的数据，`SERIALIZABLE`隔离级别的事务会看到这些更改，而`SNAPSHOT`事务则不会。\n\
  \n快照隔离级别无需阻塞即可提供事务级别的数据一致性，尽管它可能在 tempdb 中生成大量数据。如果一个会话从表中删除数百万行，所有这些行都需要复制到版本存储区，即使原始的`DELETE`语句运行在非快照隔离模式下，也只是为了可能存在的快照或`RCSI`事务保留数据状态。\n\
  \n现在，让我们检查一下写入者的行为。假设会话 1 启动事务并更新其中一行。如图 21-5 所示，该会话在该行上持有一个排他锁。\n\n![](img/index-451_1.jpg)\n\
  \n![](img/index-451_2.jpg)\n\n# 第 21 章 ■ 乐观隔离级别\n\n## 图 21-5. 快照隔离级别与写入者行为 (1)\n\
  \n会话 2 想要更新所有`Cancelled = 1`的行。它开始扫描表，当它需要读取`OrderId = 10`的数据时，它从版本存储区读取该行，即会话 2\
  \ 事务启动前最后提交的版本。这个版本是原始的（未更新的）行版本，并且它的`Cancelled = 0`，因此会话 2 不需要更新它。会话 2 继续扫描行，不受更新锁和排他锁不兼容性的影响。\n\
  \n类似地，会话 3 想要更新所有`Amount = 29.95`的行。当它读取该行的版本时，\n\n\n\n从版本存储中，系统判断该行需要更新。同样地，会话\
  \ 1 也修改了同一行的金额这一事实并不重要。此时，该行的“新版本”尚未提交，对其他会话不可见。现在，会话 3 试图更新数据库中的该行，尝试获取一个排他锁（`X`），但被阻塞，因为会话\
  \ 1 已经持有了该行的排他锁（`X`）。\n\n然而，还存在另一种可能性。让我们考虑以下场景，同时记住`SNAPSHOT`隔离级别所保证的事务一致性。\n\n\
  在如图 21-6 所示的例子中，会话 1 启动一个事务并更新了其中一行。下一步，会话 2 启动了另一个事务。实际上，哪个会话先启动事务并不重要，只要`OrderId\
  \ = 10`的行的新版本尚未提交。\n\n### 图 21-6. 快照隔离级别与写入者行为（2）\n\n![](img/index-452_1.jpg)\n\n\
  ## 第 21 章 ■ 乐观隔离级别\n\n无论哪种情况，会话 1 在下一步提交了事务。此时，该行上的排他锁（`X`）被释放。如果会话 2 尝试读取该行，它仍然会使用版本存储中的版本，因为那是会话\
  \ 2 事务启动时最后提交的版本。然而，如果会话 2 尝试修改该行，则会生成`3960`错误并回滚事务，如图 21-7 所示。\n\n### 图 21-7. 错误\
  \ 3960\n\n> **提示** 如果业务需求允许，你可以使用`TRY/CATCH`语句实现重试逻辑来处理`3960`错误。\n\n当在一个数据易变的系统中，于`SNAPSHOT`隔离级别下更新数据时，你需要牢记这种行为。如果在你的事务启动后，其他会话更新了你正在修改的行，你最终会遇到这个错误，即使你在更新前并未访问过那些行。一种可能的解决方法是在`UPDATE`语句中使用`READCOMMITTED`或其他非乐观隔离级别的表提示，如代码清单\
  \ 21-1 所示。\n\n### 代码清单 21-1. 使用 READCOMMITTED 提示防止 3960 错误\n\n```sql\nset transaction\
  \ isolation level snapshot\nbegin tran\nselect count(*) from Delivery.Drivers;\n\
  update Delivery.Orders\nwith (readcommitted)\nset Cancelled = 1\nwhere OrderId =\
  \ 10;\ncommit\n```\n\n`SNAPSHOT`隔离级别可以改变系统的行为。假设有一个表`dbo.Colors`，包含两行数据：`Black`和`White`。创建该表的代码如代码清单\
  \ 21-2 所示。\n\n### 代码清单 21-2. 快照隔离级别更新行为：表创建\n\n```sql\ncreate table dbo.Colors\n\
  (\n    Id int not null,\n    Color char(5) not null\n);\ninsert into dbo.Colors(Id,\
  \ Color) values(1,'Black'),(2,'White')\n```\n\n现在，让我们同时运行两个会话。在第一个会话中，我们运行更新语句`UPDATE\
  \ dbo.Colors SET Color='White' WHERE Color='Black'`，将当前为黑色的行颜色设置为白色。在第二个会话中，我们执行相反的操作，使用语句`UPDATE\
  \ dbo.Colors SET Color='Black' WHERE Color='White'`。\n\n![](img/index-453_1.jpg)\n\
  \n![](img/index-453_2.jpg)\n\n## 第 21 章 ■ 乐观隔离级别\n\n让我们在`READ COMMITTED`或任何其他悲观事务隔离级别下同时运行这两个会话。如图\
  \ 21-8 所示，在第一步中，我们遇到了竞态条件。其中一个会话对其更新的行放置了排他锁（`X`），而另一个会话在尝试获取同一行的更新锁（`U`）时将被阻塞。\n\
  \n### 图 21-8. 悲观锁行为：步骤 1\n\n一旦第一个会话提交了事务，排他锁（`X`）将被释放。此时，该行的`Color`值将被第一个会话更新，因此第二个会话更新的行数将是两行而不是...\n\
  \n\n\n# 第二十一章 ■ 乐观隔离级别\n\n如图 21-9 所示，最终，表中的两行数据要么都会变成`黑色`，要么都会变成`白色`，这取决于哪个会话先获得锁。\n\
  \n**图 21-9.** 悲观锁行为：第二步\n\n![](img/index-454_1.jpg)\n\n然而，使用`SNAPSHOT`隔离级别时，情况会有些不同，如图\
  \ 21-10 所示。当第一个会话更新该行时，它会将该行的旧版本移动到版本存储中。第二个会话将从那里读取该行，而不是被阻塞，反之亦然。因此，颜色将会被交换。\n\
  \n**图 21-10.** 快照隔离级别的锁行为\n\n你需要了解`RCSI`和`SNAPSHOT`隔离级别的行为，特别是如果你有依赖阻塞的代码。一个例子是基于触发器的参照完整性实现。你可以在被引用表上创建一个`ON\
  \ DELETE`触发器，在其中运行一条`SELECT`语句，以检查在另一张表中是否有引用了被删除行的行。在乐观隔离级别下，该触发器可能会跳过在事务启动后插入的行。这里的解决方案再次是在被引用表和引用表的触发器中，将`READ\
  \ COMMITTED`或其他悲观隔离级别表提示作为`SELECT`语句的一部分使用。\n\n> **注意**\n> SQL Server 在验证外键约束时使用\
  \ `READ COMMITTED` 隔离级别。这意味着即使使用乐观隔离级别，写入者和读取者之间仍然可能发生阻塞，特别是如果引用列上没有索引导致对引用表进行表扫描。\n\
  \n#### 版本存储行为\n\n如前所述，你需要监控乐观隔离级别如何影响系统中的 `tempdb`。例如，让我们运行 `DELETE FROM Delivery.Orders\
  \ WITH (NOLOCK)` 语句，该语句会从 `Delivery.Orders` 表中删除所有行。\n\n`WITH (NOLOCK)` 提示强制该语句以\
  \ `READ UNCOMMITTED` 事务隔离级别运行。即使没有其他使用乐观隔离级别的事务，在 `DELETE` 事务提交之前，它们仍然有可能启动。因此，SQL\
  \ Server 需要维护版本存储，无论是否有活动事务在使用乐观隔离级别。\n\n![](img/index-455_1.jpg)\n\n![](img/index-455_2.jpg)\n\
  \n图 21-11 显示了 `tempdb` 的可用空间和版本存储大小。如你所见，一旦删除操作开始，版本存储就会增长并占据 `tempdb` 中的所有可用空间。\n\
  \n**图 21-11.** Tempdb 可用空间与版本存储大小\n\n在图 21-12 中，你可以看到版本存储的生成速率和清理速率。生成速率在执行期间大致保持不变，而清理任务则在事务提交后清理版本存储。默认情况下，清理任务每分钟运行一次，并且在\
  \ `tempdb` 满时，也会在自动增长事件之前运行。\n\n**图 21-12.** 版本生成与清理速率\n\n还有其他三个与乐观隔离级别相关的性能计数器，如下所示：\n\
  \n1.  **快照事务**。显示活动快照事务的总数。\n2.  **更新冲突比率**。显示更新冲突次数与更新快照事务总数的比率。\n3.  **最长事务运行时间**。显示使用行版本控制的最旧活动事务的持续时间（秒）。\n\
  \n有几个动态管理视图（DMV）对于排查与版本存储和事务相关的各种问题很有用。请参阅 [`technet.microsoft.com/en-us/library/ms178621.aspx`](http://technet.microsoft.com/en-us/library/ms178621.aspx)\
  \ 上的“与事务相关的动态管理视图和函数”部分。\n\n\n[进一步阅读](http://technet.microsoft.com/en-us/library/ms178621.aspx)。\n\
  \n#### 总结\n\nSQL Server 使用采用乐观隔离级别的行版本控制模型。查询访问的是行的“旧”已提交版本，而不会因为共享（S）、更新（U）和排他（X）锁的不兼容性而被阻塞。有两种可用的乐观事务隔离级别：`READ\
  \ COMMITTED SNAPSHOT` 和 `SNAPSHOT`。\n\n`READ COMMITTED SNAPSHOT` 是一个数据库选项，它会更改 `READ\
  \ COMMITTED` 模式下读取者的行为。它不改变写入者的行为——由于（U）/（U）和（U）/（X）锁的不兼容性，仍然存在阻塞。`READ COMMITTED\
  \ SNAPSHOT` 不需要任何代码更改，可以在系统遇到阻塞问题时作为一种紧急技术使用。\n\n`READ COMMITTED SNAPSHOT` 提供语句级一致性；也就是说，查询读取的是该语句开始时数据的快照。\n\
  \n`SNAPSHOT` 隔离级别是一个独立的事务隔离级别，需要在代码中显式指定。此级别提供事务级一致性；也就是说，查询访问的是该事务开始时数据的快照。\n\n\
  使用 `SNAPSHOT` 隔离级别时，写入者不会相互阻塞，除非两个会话正在更新相同的行。这种情况要么导致阻塞，要么导致 3960 错误。\n\n虽然乐观隔离级别减少了阻塞，但它们会显著增加\
  \ `tempdb` 的负载，尤其是在数据不断变化的 OLTP 系统中。它们还会通过向数据行添加 14 字节的版本控制标签指针而导致索引碎片。在实施阶段，您应考虑使用它们的权衡取舍，执行\
  \ `tempdb` 优化，并监控系统以确保版本存储区不被滥用。\n\n# 第 22 章\n\n## 应用程序锁\n\n本章讨论 SQL Server 的另一个锁定功能，称为\
  \ `应用程序锁`，它允许您根据名称对应用程序的资源放置锁。应用程序锁最常见的应用场景之一是对客户端应用程序中的 T-SQL 代码访问进行序列化，类似于临界区和互斥体。\n\
  \n#### 应用程序锁概述\n\n应用程序锁允许应用程序在 `应用程序资源` 上放置锁，该资源与数据库对象无关，仅通过名称标识。该锁在锁兼容性方面遵循常规规则，可以是以下类型之一：共享（S）、更新（U）、排他（X）、意向共享（IS）和意向排他（IX）。\n\
  \n应用程序需要调用 `sp_getapplock()` 存储过程来获取锁，使用以下参数：\n\n- `@Resource`：指定应用程序锁的名称。\n- `@LockMode`：指定锁的类型。\n\
  - `@LockOwner`：应为两个值之一——`Transaction` 或 `Session`——并控制锁的所有者（和范围）。\n- `@LockTimeout`：指定超时时间（以毫秒为单位）。如果存储过程无法在此间隔内获取锁，将返回错误。\n\
  - `@DbPrincipal`：指定安全上下文（调用者需要是 `database_principal`、`dbo` 或 `db_owner` 角色的成员）。\n\
  \n该过程在成功时返回大于或等于零的值，在失败时返回负值。与常规锁一样，存在死锁的可能性，尽管这不会回滚被选为牺牲品的会话的事务，而是返回一个指示死锁状况的错误代码。\n\
  \n应用程序需要调用 `sp_releaseapplock()` 存储过程来释放应用程序锁。或者，如果锁的 `@LockOwner` 是事务，则当事务提交或回滚时，锁会自动释放。这与常规锁类似。\n\
  \n#### 应用程序锁用法\n\n计算机科学中有一个概念叫做 `互斥执行`。它表示多个线程或进程\n\n\n无法同时执行特定的代码。举例来说，想象一个多线程应用程序，其中线程使用共享对象。在这些系统中，你通常需要将访问这些对象的代码串行化，以防止多个线程同时读取和更新它们而产生的竞态条件。\n\
  \n© Dmitri Korotkevitch 2016\n\nD. Korotkevitch, *SQL Server Internals 实战指南*, DOI\
  \ 10.1007/978-1-4842-1964-5_22\n\n## 第 22 章 ■ 应用锁\n\n每种开发语言都有一套可以完成此类任务的同步原语（例如，互斥锁和临界区）。当你需要将部分\
  \ T-SQL 代码串行化时，应用锁也能起到同样的作用。\n\n例如，让我们考虑一个系统，它收集一些数据，将其保存到数据库中，并有一组应用服务器用于数据处理。每个应用服务器读取一批数据包，进行处理，最后从原始表中删除已处理的数据。显然，你不想让不同的应用服务器处理相同的行，而将数据加载过程串行化是可选的方案之一。排他（`X`）表锁将不起作用，因为它会阻止任何表访问，而不仅仅是数据加载。\n\
  \n在应用服务器层面实现串行化也并非易事。幸运的是，应用锁可以帮助解决这个问题。\n\n假设你有一个如清单 22-1 所示的表。为简单起见，有一个名为 `Attributes`\
  \ 的列，它代表了所有的行数据。\n\n### ***清单 22-1.*** 表结构\n\n```sql\ncreate table dbo.RawData\n\
  (\n    ID int not null,\n    Attributes char(100) not null\n        constraint DEF_RawData_Attributes\
  \ default 'Row Data',\n    ProcessingTime datetime not null\n        constraint\
  \ DEF_RawData_ProcessingTime default '2000-01-01',\n    constraint PK_RawData\n\
  \        primary key clustered(ID)\n)\n```\n\n有两个重要的列：`ID`，它是主键；以及 `ProcessingTime`，它表示行被加载进行处理的时间。你应该使用\
  \ UTC 时间而不是本地时间，以支持应用服务器位于不同时区的情况，并防止因时钟调整为夏令时而产生的问题。此列还有助于防止其他会话在数据仍在处理时重新读取数据。最好避免为此类目的使用布尔（`bit`）列，因为如果应用服务器崩溃，该行将永远留在表中。使用时间列，系统可以在超时一段时间后重新读取它。\n\
  \n现在，让我们创建读取数据的存储过程，如清单 22-2 所示。\n\n### ***清单 22-2.*** 读取数据的存储过程\n\n```sql\ncreate\
  \ proc dbo.LoadRawData(@PacketSize int)\nas\n    set nocount, xact_abort on\n\n\
  \    declare\n        @EarliestProcessingTime datetime\n        ,@ResCode int\n\n\
  \    declare\n        @Data table\n        (\n            ID int not null primary\
  \ key,\n            Attributes char(100) not null\n        )\n\n    begin tran\n\
  \        exec @ResCode = sp_getapplock\n            @Resource = 'LoadRowDataLock'\n\
  \            ,@LockMode = 'Exclusive'\n            ,@LockOwner = 'Transaction'\n\
  \            ,@LockTimeout = 15000; -- 15 seconds\n\n        if @ResCode >= 0 --\
  \ success\n        begin\n            -- We assume that app server processes the\
  \ packet within 1 minute unless crashed\n            select @EarliestProcessingTime\
  \ = dateadd(minute,-1,getutcdate());\n\n            ;with DataPacket(ID, Attributes,\
  \ ProcessingTime)\n            as\n            (\n                select top (@PacketSize)\
  \ ID, Attributes, ProcessingTime\n                from dbo.RawData\n           \
  \     where ProcessingTime <= @EarliestProcessingTime\n                order by\
  \ ID\n            )\n            update DataPacket\n                set ProcessingTime\
  \ = getutcdate()\n                output inserted.ID, inserted.Attributes into @Data(ID,\
  \ Attributes);\n        end\n\n    -- we don't need to explicitly release application\
  \ lock because @LockOwner is\n    -- Transaction\n    commit\n\n    select ID, Attributes\
  \ from @Data;\n```\n\n该存储过程在事务开始时获取一个排他（`X`）应用锁。因此，所有其他调用此存储过程的会话都将被阻塞，直到事务提交。\n\
  \n\n# 应用锁\n\n## 第 22 章\n\n此时应用锁会被释放。它保证了只有一个会话能够从存储过程内部同时更新和读取数据。与此同时，其他会话仍然可以操作该表（例如，插入新行或删除已处理的行）。应用锁独立于数据锁，除非会话尝试通过调用\
  \ `sp_getapplock` 来获取同一 `@Resource` 上的应用锁，否则会话不会被阻塞。\n\n图 22-1 展示了当两个会话同时调用 `dbo.LoadRawData`\
  \ 存储过程时，`sys.dm_tran_locks` 数据管理视图的输出情况。`SPID=58` 的会话成功获取了应用锁，而另一个 `SPID=63` 的会话则被阻塞。`resource_type`\
  \ 值为 `APPLICATION` 表示一个应用锁。\n\n*图 22-1. `Sys.dm_tran_locks` 输出*\n\n值得一提的是，如果我们的目标只是简单地保证多个会话不能同时读取相同的行，而不是将整个读取过程串行化，那么还有另一种更简单的解决方案。你可以使用锁定表提示，如清单\
  \ 22-3 所示。\n\n### 清单 22-3. 使用表锁定提示串行化数据访问\n\n```sql\n;with DataPacket(ID, Attributes,\
  \ ProcessingTime)\nas\n(\n    select top (@PacketSize) ID, Attributes, ProcessingTime\n\
  \    from dbo.RawData with (\n        updlock, readpast\n    )\n    where ProcessingTime\
  \ <= @EarliestProcessingTime\n    order by ID\n)\nupdate DataPacket\nset ProcessingTime\
  \ = getutcdate()\noutput inserted.ID, inserted.Attributes into @Data(ID, Attributes)\n\
  ```\n\n`UPDLOCK` 提示强制 SQL Server 在 `SELECT` 操作期间使用更新锁（`U`）而非共享锁（`S`）。这可以防止其他会话同时读取相同的行。同时，`READPAST`\
  \ 提示强制会话跳过持有不兼容锁的行，而不是被阻塞。\n\n尽管两种实现都达到了相同的目标，但它们采用了不同的方法。后者通过使用数据（行级别）锁来串行化对相同行的访问。应用锁则串行化对代码的访问，并阻止多个会话同时执行该语句。在你希望防止某些代码并行执行的情况下，这可能非常有用。\n\
  \n#### 总结\n\n应用锁允许应用程序对一个应用资源放置锁；它与数据库对象无关，并通过名称来标识。它是一个有用的工具，帮助你实现*互斥执行*代码模式，类似于客户端应用程序中的临界区和互斥量，将对\
  \ T-SQL 代码的访问串行化。\n\n你可以使用 `sp_getapplock` 存储过程创建应用锁，并使用 `sp_releaseapplock` 存储过程释放它们。应用锁可以具有会话或事务作用域，并且它们遵循与数据锁相同的常规锁兼容性规则。\n\
  \n## 第 23 章\n\n# 架构锁\n\nSQL Server 使用两种额外的锁类型，称为*架构锁*，以防止在查询执行期间更改表和元数据。本章将深入探讨架构锁，以及其他主题，例如在超过\
  \ 16 个 CPU 的系统中发生的锁分区，以及在 SQL Server 2014 中引入的、旨在减少在线索引重建和分区切换操作期间阻塞的低优先级锁。\n\n\
  #### 架构修改锁\n\nSQL Server 需要保护数据库元数据，以防止在查询执行过程中表结构被更改的情况。然而，这个问题比看起来更复杂。尽管理论上，独占表锁（`X`）可以在\
  \ `ALTER TABLE` 操作期间阻止对表的访问，但在 `READ UNCOMMITTED` 隔离级别下它们将不起作用，因为读取者不获取意向共享锁（`IS`）。\n\
  \nSQL Server 使用两种额外的锁类型来解决这个问题：架构稳定性锁（`Sch-S`）和架构修改锁（`Sch-M`）。\n\n\n# 模式修改（Sch-M）锁\n\
  \n模式修改（Sch-M）锁在发生任何元数据更改之前，以及在执行 `TRUNCATE TABLE` 语句期间获取。你可以将这种锁类型视为一种“超级锁”。它与任何其他锁类型都不兼容，并且会完全阻止对对象的访问。\n\
  \n与排他（`X`）锁类似，模式修改（`Sch-M`）锁会一直持有到事务结束。当你在显式事务中运行 DDL 语句时，需要牢记这一点。虽然显式事务允许你在发生错误时回滚所有模式更改，但它也会在事务提交前阻止对受影响对象的任何访问。\n\
  \n**重要提示** 许多数据库模式比较工具在更改脚本中使用显式事务。如果你在其他用户访问系统的同时，在实时服务器上运行该脚本，这可能会导致严重的阻塞。\n\n\
  SQL Server 在修改分区函数时也会使用模式修改（`Sch-M`）锁。如果此类修改引入了数据移动或扫描，这可能会严重影响系统的可用性。在操作完成之前，对整个分区表的访问都会被阻塞。\n\
  \n# 模式稳定性（Sch-S）锁\n\n模式稳定性（`Sch-S`）锁在 DML 查询编译和执行期间使用。SQL Server 会获取它们，而不考虑事务隔离级别，即使在\
  \ `READ UNCOMMITTED` 模式下也是如此。模式稳定性（`Sch-S`）锁与除模式修改（`Sch-M`）锁以外的任何锁类型都兼容。\n\nSQL\
  \ Server 可以执行一些优化以减少获取的锁数量。虽然查询编译期间始终使用模式稳定性（`Sch-S`）锁，但 SQL Server 可以在查询执行期间用意向对象锁替换它。让我们看一下表\
  \ 23-1 中所示的示例。\n\n第一个会话启动事务并修改表，在那里获取一个模式修改（`Sch-M`）锁。在下一步中，另外两个会话分别在 `READ UNCOMMITTED`\
  \ 隔离级别运行一个 `SELECT` 语句和一个 `DELETE` 语句。\n\n© Dmitri Korotkevitch 2016\nD. Korotkevitch,\
  \ `Pro SQL Server Internals`, DOI 10.1007/978-1-4842-1964-5_23\n\n第 23 章 ■ 模式锁\n\
  \n**表 23-1.** 模式锁：查询编译\n\n**会话 1 (SPID=64)**\n**会话 2 (SPID=65)**\n**会话 3 (SPID=66)**\n\
  \n```\nbegin tran\nalter table Delivery.Orders\nadd Dummy int;\n```\n\n```\nselect\
  \ count(*)\nfrom Delivery.Orders with (nolock);\n```\n\n```\ndelete from Delivery.Orders\n\
  where OrderId = 1;\n```\n\n```\nselect request_session_id\n,resource_type, request_type\n\
  ,request_mode, request_status\nfrom sys.dm_tran_locks\nwhere resource_type = 'OBJECT';\n\
  ```\n\n```\nrollback\n```\n\n如图 23-1 所示，会话 2 和 3 在等待查询编译所需的模式稳定性（`Sch-S`）锁时被阻塞。\n\
