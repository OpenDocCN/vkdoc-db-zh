  列的谓词都向下推送到列存储索引扫描运算符，在执行的非常早期阶段就过滤掉了不必要的行。SQL Server 2014 和 2016 会生成略有不同的计划；但是，它们会使用相同的方法，在列存储索引扫描期间计算谓词。


  ***图 33-23.** 使用维度表过滤文章类别的查询的执行计划*


