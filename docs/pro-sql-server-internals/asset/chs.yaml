  ## 数据库整合


  当我们谈论托管多个数据库的 SQL Server 安装时，不可能不讨论数据库整合过程。尽管它与本章主题没有直接关系，但我想在这里回顾一下数据库整合过程的几个方面。


  没有适用于每个项目的通用整合策略。在做出此决策时，您应该分析数据量、负载、硬件配置以及业务和安全要求。然而，作为一般规则，当 `OLTP` 和数据仓库/报告数据库在重负载下工作时，应避免将它们整合到同一台服务器上。数据仓库



