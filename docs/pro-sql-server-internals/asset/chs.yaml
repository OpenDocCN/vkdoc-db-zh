  ## 选择模型


  新版基数估算模型移除了独立性假设，并期望实体属性之间存在一定程度的相关性。当查询包含涉及表中多列的多个谓词时，它采用不同的估算方法。代码清单 3-18 展示了此类查询的示例。图
  3-23 显示了两种模型的基数估算结果。


  ***代码清单 3-18.*** 带多个谓词的查询


  ```sql

  select ID, ADate

  from dbo.CETest

  where

  ID between 20000 and 30000 and

  ADate between ''2017-01-01'' and ''2017-02-01'';

  ```


  ![](img/index-102_1.jpg)


  ***图 3-23.** 包含多个谓词的基数估算*


  旧版基数估算器假设谓词相互独立，并使用以下公式：

  （第一个谓词的选择性 * 第二个谓词的选择性）*（表中的总行数）=（第一个谓词的估算行数 * 第二个谓词的估算行数）/（表中的总行数）。


  新版基数估算器则期望谓词之间存在某种相关性，它采用另一种称为 *指数退避算法* 的方法，公式如下：

  （最具限制性谓词的选择性）* SQRT(次具限制性谓词的选择性) *（表中的总行数）。


  这一变化完全属于“视情况而定”的范畴。如我们的例子所示，当属性/谓词之间没有相关性时，旧版基数估算器效果更好。而在存在相关性的情况下，新版基数估算器能提供更好的结果。我们将在下一章的“筛选统计信息”一节中看一个这样的例子。


  如你所见，旧版（`70`）基数估算器与 SQL Server 2014 引入的新版基数估算器（`120`）行为差异显著。而 SQL Server 2014（`120`）与
  SQL Server 2016（`130`）模型之间的差异则不太明显。SQL Server 2016 在以下若干方面有一些




  '
- '# 模型选择与升级考虑


  增强功能。最值得注意的是，它能更好地处理不断增长的索引的估算，并更充分地利用多列统计信息中的密度信息。然而，您应当将 130 模型视为对 120 模型的增强，而非一个全新的实现。


  作为一般规则，对于新开发，您应始终选择最新的模型。另一方面，升级则更为复杂。即使新的基数估算模型在具有现代工作负载的系统中可能提供更好的结果，但始终存在因生成不同的执行计划而导致性能下降的可能性。不可能构建一个覆盖所有可能工作负载和数据分布的模型，因此在升级后应仔细测试系统。


  在 SQL Server 2016 中，您可以使用一个名为 *查询存储* 的新组件，它会在系统中捕获并持久化执行统计信息和计划。这可以极大地简化测试过程，使您能够快速定位性能回退。显然，在测试期间您需要有代表性的负载和数据分布。我们将在第
  29 章更深入地讨论查询存储。


  当然，没有任何东西阻止您在升级后继续使用旧版基数估算器。然而，您应预计，未来产品中的大部分增强和改进都将属于新模型。旧版基数估算器不会从 SQL Server
  中消失；然而，我严重怀疑 Microsoft 是否会继续投入大量时间和资源来改进旧模型。


  '
- '# 查询优化器修复与跟踪标志 T4199


  查询优化器的复杂性以及产品的庞大客户群带来了可支持性问题。不可能在所有可能的场景和工作负载下测试修复和改进，因此，任何查询优化算法变更都有可能引入性能问题。


  随着云采用率的提高，这种情况正在改变。Microsoft Azure 中的 SQL 数据库与盒装版本共享代码库。SQL Server 与其他 Microsoft
  产品一样，遵循 *云优先* 模型，其中功能在出现在盒装产品之前很久就被部署到云端。这使得 Microsoft 能够跨数百万个 SQL 数据库测试功能，从各种生产工作负载中收集遥测数据，并在
  RTM 版本发布前修复任何问题。所有这些极大地提高了产品质量并减少了产品中的错误数量。


  从历史上看，Microsoft 在发布查询优化器的修复方面一直非常谨慎。它们默认是禁用的，必须使用与之关联的各个跟踪标志来启用。另一个跟踪标志 `T4199`
  将许多此类修复——推荐在大多数系统中启用的——组合在一个标志下。然而，大多数安装没有启用这些跟踪标志，因此无法从产品中的所有改进中受益。


  从 SQL Server 2016 开始，修复分发策略由数据库兼容性级别控制，而不是由跟踪标志控制。将数据库兼容性级别设置为 130 将启用所有查询优化器修复和增强，类似于跟踪标志
  `T4199`。而该标志本身，则启用了在 SQL Server 2016 RTM 版本发布后引入的修复，如表 3-4 所示。


  表 3-4. SQL Server 2016 中的数据库兼容性级别与修复

  ```

  **兼容性级别** | **TF4199** | **SQL Server 2016 RTM 之前发布的修复** | **SQL Server 2016 RTM
  之后发布的修复**

  --- | --- | --- | ---

  <= 120 | 关闭 | 禁用 | 禁用

  <= 120 | 开启 | 启用 | 禁用

  130 | 关闭 | 启用 | 禁用

  130 | 开启 | 启用 | 启用

  ```


  在未来的 SQL Server 版本中，您应该依赖相同的行为。设置数据库兼容性...




  将产品版本级别设为兼容级别，将启用先前所有 SQL Server 版本中的所有修补程序和增强功能。跟踪标志 `T4199` 将启用当前 SQL Server 版本在
  RTM 发布后引入的所有修补程序。


  这种行为会导致未来在不同版本的 SQL Server 中，跟踪标志 `T4199` 将控制不同的修补程序集。在完成 SQL Server 2016 升级后，依赖数据库兼容级别而非跟踪标志可能更安全，如果需要，可以通过使用
  `LEGACY_CARDINALITY_ESTIMATOR` 数据库设置切换到传统基数估计器。


  **注意** 您可以在 [`support.microsoft.com/en-us/kb/974006`](https://support.microsoft.com/en-us/kb/974006)
  阅读更多关于查询优化服务模型的信息。


  ## 第三章 ■ 统计信息


  ### 概述


  正确的基数估计是使查询优化器能够生成高效执行计划的最重要因素之一。基数估计影响索引选择、连接策略和其他参数。


  SQL Server 使用统计信息来执行基数估计。统计信息的关键部分是直方图，它存储了最左侧统计信息列的数据分布信息。直方图中的每个步骤包含一个样本统计信息列值以及该直方图步骤中发生情况的信息，例如区间内有多少行、有多少唯一键值等。


  SQL Server 为系统中定义的每个索引创建统计信息。此外，您可以在表中的单个列或多列上创建列级统计信息。如果数据库启用了 `自动创建统计信息` 选项，SQL
  Server 会自动创建列级统计信息。


  统计信息有一些限制。直方图中最多存储 200 个步骤（键值区间）。因此，随着表的增长，直方图的步骤覆盖的键值区间会更大。这导致区间内的近似值更大，并且在包含数百万或数十亿行的表上基数估计的准确性降低。此外，直方图仅存储最左侧统计信息列的数据分布信息。除了多列密度外，没有关于统计信息或索引中其他列的信息。


  SQL Server 跟踪对统计信息列所做的更改次数。默认情况下，当更改次数超过表中总行数的约 20% 时，SQL Server 会使统计信息过时并进行更新。因此，在大型表上很少自动更新统计信息。您需要根据计划手动考虑更新大型表上的统计信息。


  在 SQL Server 2016 中，数据库兼容级别为 130 时，统计信息更新阈值是动态的，并基于表的大小，这使得大型表上的统计信息更加准确。在早期版本的
  SQL Server 中，或数据库兼容级别低于 130 时，可以使用跟踪标志 `T2371`。建议在大多数系统中设置此跟踪标志。


  您还应该更频繁地更新始终递增或始终递减的索引上的统计信息，因为除非您使用 SQL Server 2014 中引入的新基数估计模型，否则当参数超出直方图范围时，SQL
  Server 往往会低估行数。


  新基数估计模型在 SQL Server 2014 和 2016 中针对兼容级别为 120 或 130 的数据库启用。该模型解决了一些常见问题，例如当统计信息未更新时，对始终递增索引的估计；然而，在某些情况下，它可能会导致计划退化。在升级
  SQL Server 后启用新基数估计模型之前，您应该仔细测试现有系统。


  ## 第四章 ■ 特殊索引和存储功能


  本章讨论 SQL Server 中可用的几种与存储和索引相关的功能。它涵盖了




  '
- '# 第四章 ■ 特殊索引与存储特性


  索引与包含列、筛选索引与统计信息、数据压缩以及稀疏列。


  ## 索引与包含列


  正如你已知的，当 SQL Server 预计需要进行大量 `Key` 或 `RID` 查找操作时，它很少使用非聚集索引。这些操作通常会导致大量的逻辑读和物理读。


  在键查找操作中，SQL Server 每次需要获取单行数据时，都必须从聚集索引的不同层级访问多个数据页。尽管根层级和中间索引层级通常缓存在缓冲池中，但对叶级页的访问会产生随机且通常是物理的
  I/O 读取，这在磁盘驱动器的情况下尤其缓慢。


  对于堆表也是如此。尽管非聚集索引中的行 ID（RID）存储了堆表中行的物理位置，并且 RID 查找操作不需要遍历聚集索引树，但它们仍然会引入随机 I/O。此外，如果一行被更新并移动到另一个页面，转发表指针可能会导致额外的读取。


  键或 RID 查找的存在是此处的**关键**因素。非聚集索引中的行比聚集索引中的行要小。非聚集索引使用更少的数据页，因此更高效。只要不需要进行键或 RID 查找，即使预计需要选择大量行，SQL
  Server 也会使用非聚集索引。


  回想一下，非聚集索引存储索引键列的数据和行 ID。对于具有聚集索引的表，行 ID 就是索引行的聚集键值。所有索引中的这些值都是相同的：当你更新一行时，SQL Server
  会同步更新所有索引。


  当查询所需的所有数据都存在于非聚集索引中时，SQL Server 就不需要执行键或 RID 查找。这些索引被称为 `覆盖索引`，因为它们提供了查询所需的所有信息，本质上**覆盖**了查询。


  使非聚集索引成为覆盖索引是最常用的查询优化技术之一。过去，实现这一目标的唯一方法是将查询引用的列作为最右侧的索引键列添加进去。尽管这种方法通常有效，但它有一些缺点。


  首先，SQL Server 根据索引键值存储排序的索引行。更新索引键列可能导致一行需要移动到索引中的不同位置，这会增加 I/O 和事务日志负载，以及碎片。


  其次，新的列会增加索引键的大小，这可能会增加索引的层级数量，使其效率降低。


