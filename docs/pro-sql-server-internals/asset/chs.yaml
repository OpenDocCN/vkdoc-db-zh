  \ N' and Number=@Number' else N'' end +\n\ncase when @Name is not null then N' and\
  \ Name=@Name' else N'' end;\n\nexec sp_executesql @Sql, N'@Number varchar(32), @Name\
  \ varchar(100)'\n\n,@Number=@Number, @Name=@Name;\n```\n\n■ `重要提示` 始终在 `sp_executesql`\
  \ 存储过程中使用参数，以避免 SQL 注入。\n\n在使用筛选索引时请记住此行为。在某些参数值组合下无法使用筛选索引时，SQL Server 将不会生成并缓存使用该筛选索引的计划。清单\
  \ 26-14 展示了一个示例。当 `@Processed` 参数设置为零时，SQL Server 不会生成使用 `IDX_Data_UnprocessedData`\
  \ 索引的计划，因为这个计划对于非零的 `@Processed` 参数值是无效的。\n\n***清单 26-14.*** 计划重用：筛选索引（非功能性演示）\n\
  \n```sql\ncreate unique nonclustered index IDX_Data_UnprocessedData\non dbo.RawData(ID)\n\
  include(Processed)\nwhere Processed = 0;\n\n-- 此查询的缓存计划将不会使用筛选索引\nselect top 100\
  \ *\nfrom dbo.RawData\nwhere ID > @ID and Processed = @Processed\norder by ID;\n\
  ```\n\nSQL Server 会缓存那些在 WHERE 子句中使用常量而非参数的即席查询（和批处理）的计划。清单 26-15 展示了即席查询的示例。\n\n\
  ***清单 26-15.*** 即席查询\n\n```sql\nselect * from dbo.Customers where LastName='Smith'\n\
  go\nselect * from dbo.Customers where LastName='Smith'\ngo\nSELECT * FROM dbo.Customers\
  \ WHERE LastName='Smith'\ngo\nselect * from dbo.Customers where LastName = 'Smith'\n\
  go\n```\n\nSQL Server 仅在查询完全相同且字符完全匹配的情况下才会重用即席查询的计划。例如，清单 26-15 中的四个查询会引入三个不同的计划。第一个和第二个查询是相同的，共享一个计划。其他两个查询由于\
  \ WHERE 子句中关键字大小写不匹配以及等号运算符周围的额外空格字符，将不会重用该计划。\n\n由于即席查询的性质，它们不经常重用计划。不幸的是，即席查询的缓存计划可能会消耗大量内存。让我们看一个例子，运行\
  \ 1000 个简单的即席批处理，如清单 26-16 所示，之后检查计划缓存状态。该脚本使用 `DBCC FREEPROCCACHE` 命令清除缓存内容；请勿在生产服务器上运行此命令。\n\
  \n***清单 26-16.*** 即席查询的内存使用情况：运行即席查询\n\n```sql\ndbcc freeproccache\ngo\n\ndeclare\n\
  \    @SQL nvarchar(max)\n    ,@I int = 0\n\nwhile @I < 1000\nbegin\n    select @SQL\
  \ =\n        N'declare @C int;select @C=ID from dbo.Employees where ID='\n     \
  \   + convert(nvarchar(10),@I);\n\n    exec(@SQL);\n\n    select @I += 1;\nend\n\
  go\n\nselect\n    p.usecounts, p.cacheobjtype, p.objtype, p.size_in_bytes, t.[text]\n\
  from\n    sys.dm_exec_cached_plans p cross apply\n    sys.dm_exec_sql_text(p.plan_handle)\
  \ t\nwhere\n    p.cacheobjtype like 'Compiled Plan%' and\n    t.[text] like '%Employees%'\n\
  order by\n    p.objtype desc;\n```\n\n如图 26-9 所示，缓存了 1000 个计划，每个计划使用 32 KB 内存，总计\
  \ 32 MB。可以想见，在繁忙系统中，即席查询可能导致计划缓存内存使用过度。\n\n***图 26-9.** 查询执行后的计划缓存内容*\n\nSQL Server\
  \ 2008 引入了一个名为 `优化即席工作负载` 的服务器端配置设置。启用此设置后，SQL Server 会缓存小于 300 字节的小型结构，称为 `已编译计划存根`，而不是实际的编译计划。已编译计划存根是一个占位符，用于跟踪哪些即席查询已被执行。当相同的查询第二次运行时，SQL\
  \ Server 会用实际的编译计划替换已编译计划存根，并在后续运行中重用它。\n\n\n"
- '# 第 26 章 ■ 计划缓存


  *即席工作负载优化*设置默认是禁用的。然而，在大多数系统中应该启用它。尽管它会在第二次即席查询重新编译时引入轻微的 CPU 开销，但对于即席活动频繁的系统，它可以显著减少计划缓存内存的使用。这些节省出来的内存可以用于缓冲池，从而减少物理
  I/O 操作次数并提升系统性能。


  你可以使用清单 26-17 所示的代码启用此设置。此外，也可以在 Management Studio 的“服务器属性”窗口的“高级”选项卡中启用它。


  ## 清单 26-17. 启用“即席工作负载优化”设置


  ```sql

  exec sys.sp_configure N''optimize for ad hoc workloads'', N''1'';

  reconfigure with override;

  ```


  ![](img/index-517_1.jpg)


  ![](img/index-517_2.jpg)


  如果在启用了*即席工作负载优化*设置的情况下运行清单 26-16 中的代码，你会看到如图 26-10 所示的计划缓存内容。如你所见，它现在只使用 272 KB
  内存，而不是之前的 32 MB。


  ## 图 26-10. 启用“即席工作负载优化”时的计划缓存内容


  #### 自动参数化


  在某些情况下，SQL Server 可能会决定将即席查询中的一些常量替换为参数，并缓存编译后的计划，就好像查询已被参数化一样。当这种情况发生时，使用不同常量的类似即席查询可以重用缓存的计划。


  清单 26-18 展示了两个可以被参数化并共享一个编译计划的查询。


  ## 清单 26-18. 参数化


  ```sql

  select ID, Number, Name from dbo.Employees where ID = 5

  go


  select ID, Number, Name from dbo.Employees where ID = 10

  go

  ```


  在内部，SQL Server 存储的编译计划如下所示：


  ```sql

  (@1 tinyint)SELECT [ID],[Number],[Name] FROM [dbo].[Employees] WHERE [ID]=@1

  ```


  默认情况下，SQL Server 根据常量值定义参数数据类型，选择能容纳该值的最小数据类型。例如，查询 `SELECT ID, Number, Name FROM
  dbo.Employees WHERE ID = 10000` 将引入另一个缓存计划，如下所示：


  ```sql

  (@1 smallint)SELECT [ID],[Number],[Name] FROM [dbo].[Employees] WHERE [ID]=@1

  ```


  当发生参数化时，除了参数化查询的编译计划外，SQL Server 还会在计划缓存中存储另一个结构，称为 *Shell 查询*。Shell 查询使用大约 16 KB
  内存，存储有关原始查询的信息，将其链接到编译计划。


  在图 26-11 中，你可以看到运行清单 26-18 中的查询后计划缓存的内容。如你所见，它存储了一个编译计划和两个 Shell 查询。


  ## 图 26-11. 发生参数化后的计划缓存内容


  默认情况下，SQL Server 使用*简单参数化*，并且它在参数化查询时非常保守。简单参数化仅在缓存计划被认为是*安全可参数化*时发生，这意味着即使常量/参数值发生变化，该计划在计划形状和基数估计方面也会保持相同。例如，在唯一索引上具有*非聚集索引查找*和*密钥查找*的计划是安全的，因为无论参数值如何，它返回的行数永远不会超过一行。相反，在非唯一索引上进行相同操作则不安全。不同的参数值会导致不同的基数估计，这使得*聚集索引扫描*成为其中一些参数值的更好选择。


  此外，有许多语言构造会阻止简单参数化，例如 `IN`、`TOP`、`DISTINCT`、`JOIN`、`UNION`、子查询以及相当多的其他构造。


  或者，SQL Server 可以使用*强制参数化*，可以在数据库级别通过 `ALTER DATABASE SET PARAMETERIZATION FORCED`
  命令启用，或者在查询级别通过...



  ## 参数化强制提示


  在此模式下，SQL Server 会自动参数化大多数即席查询，只有极少数例外。


  正如所料，强制参数化带来了一系列好处和缺点。一方面，它可以显著减少计划缓存的大小和 CPU 负载；另一方面，由于参数嗅探问题，它也增加了生成次优执行计划的可能性。


  强制参数化的另一个问题是，SQL Server 在替换常量为参数时，不会给你任何关于要参数化哪些常量的控制权。这对于筛选索引尤其关键，因为参数化可能会阻止 SQL
  Server 生成并缓存一个利用筛选索引的计划，方法是用参数替换语句中的常量值。我在本书的配套材料中包含了一个这样的示例。


  强制参数化的一个良好用例是客户端应用程序提交的复杂即席查询，特别是在执行计划的选择不依赖于常量值的情况下。虽然最好修改客户端应用程序并参数化查询，但这并非总是可行。


  清单 26-19 展示了一个此类查询的示例。每次查询执行都会导致一次编译，并向计划缓存添加一个条目。这样的查询受益于强制参数化，因为该查询的最佳执行计划是聚集索引查找，并且它不会基于常量/参数值而改变。


  ### 清单 26-19. 一个受益于强制参数化的查询示例


  ```sql

  select top 100 RecId, /* Other Columns */

  from dbo.RawData

  where RecID > 432312 -- Client application uses different values at every call

  order by RecId

  ```


  综上所述，在数据库级别启用强制参数化时，你需要小心谨慎。如果需要，在单个查询级别启用它会更安全。


  #### 计划指南


  查询提示在帮助解决各种与计划缓存相关的问题时非常有用。不幸的是，在某些情况下，你无法修改查询文本，要么是因为你无法访问应用程序代码，要么是因为重新编译和重新部署不可行或不切实际。


  你可以通过使用计划指南来解决此类问题，它允许你在不更改查询文本的情况下向查询添加提示，甚至强制特定的执行计划。你可以使用 `sp_create_plan_guide`
  存储过程创建它们，并使用 `sp_control_plan_guide` 存储过程管理它们。


  ![index-519_1.jpg](img/index-519_1.jpg)


  ### 第 26 章 ■ 计划缓存


  有三种类型的计划指南可用，如下所示：


  - **对象** 计划指南允许你为存在于 T-SQL 对象（如存储过程、触发器或用户定义函数）中的查询指定提示。

  - **SQL** 计划指南允许你为特定的 SQL 查询（独立或作为批处理的一部分）指定提示。

  - **模板** 计划指南允许你为特定的查询模板指定强制或简单的参数化类型，覆盖数据库设置。


  清单 26-20 中的代码 从 `dbo.GetAverageSalary` 存储过程中删除了查询提示，并创建了一个带有 `OPTIMIZE FOR UNKNOWN`
  提示的计划指南。`@Stmt` 参数应指定需要添加提示的查询，而 `@module_or_batch` 应指定对象的名称。


  ### 清单 26-20. 对象计划指南


  ```sql

  alter proc dbo.GetAverageSalary @Country varchar(64)

  as

  select Avg(Salary) as [Avg Salary]

  from dbo.Employees

  where Country = @Country;

  go


  exec sp_create_plan_guide

  @type = N''OBJECT''

  ,@name = N''object_plan_guide_demo''

  ,@stmt = N''select Avg(Salary) as [Avg Salary]

  from dbo.Employees

  where Country = @Country''

  ,@module_or_batch = N''dbo.GetAverageSalary''

  ,@params = null

  ,@hints = N''OPTION (OPTIMIZE FOR (@Country UNKNOWN))'';

  ```


  现在，如果你对 `@Country = ''Canada''` 运行存储过程，你将获得执行计划。



  '
- "# 第 26 章 ■ 计划缓存\n\n图 26-12 显示了这与在存储过程中使用查询提示的情况类似。你可以在图形化计划中顶级运算符的属性中，以及在其 XML\
  \ 表示中看到，在优化过程中使用了计划指南。\n\n**图 26-12.** 使用对象计划指南的执行计划\n\n![](img/index-520_1.jpg)\n\
  \n代码清单 26-21 展示了一个 SQL 计划指南的示例，该指南为查询设置了 MAXDOP 选项。在此模式下，`@module_or_batch`参数应设置为\
  \ null。\n\n**代码清单 26-21.** SQL 计划指南\n\n```sql\nexec sp_create_plan_guide\n    @type\
  \ = N'SQL'\n    ,@name = N'SQL_plan_guide_demo'\n    ,@stmt = N'select Country,\
  \ count(*) as [Count]\nfrom dbo.Employees\ngroup by Country'\n    ,@module_or_batch\
  \ = NULL\n    ,@params = null\n    ,@hints = N'OPTION (MAXDOP 2)' ;\n```\n\n使用模板计划指南则稍微复杂一些。与\
  \ SQL 和对象计划指南不同（在后者中，`@stmt`参数需要与查询逐字符匹配），模板计划指南要求你提供查询的模板。幸运的是，你可以使用另一个系统存储过程`sp_get_query_template`来准备它。\n\
  \n让我们看一个例子，假设我们希望 SQL Server 自动参数化代码清单 26-22 中的查询。尽管该查询的执行计划是安全的——在唯一索引上的聚集索引查找总会返回一行——但\
  \ TOP 子句阻止了 SQL Server 对其进行参数化。你可以在图 26-13 中看到这个即席缓存的计划。\n\n**代码清单 26-22.** 模板计划指南：示例查询\n\
  \n```sql\nselect top 1 ID, Number, Name from dbo.Employees where ID = 5;\ngo\nselect\
  \ p.usecounts, p.cacheobjtype, p.objtype, p.size_in_bytes, t.[text]\nfrom sys.dm_exec_cached_plans\
  \ p cross apply\nsys.dm_exec_sql_text(p.plan_handle) t\nwhere t.[text] like '%Employees%'\n\
  order by p.objtype desc\noption (recompile);\n```\n\n**图 26-13.** 创建模板计划指南之前的计划缓存\n\
  \n代码清单 26-23 展示了如何创建模板计划指南并覆盖 PARAMETERIZATION 数据库选项。\n\n**代码清单 26-23.** 模板计划指南：创建计划指南\n\
  \n```sql\ndeclare\n    @stmt nvarchar(max)\n    ,@params nvarchar(max)\n\n-- 获取查询的模板\n\
  exec sp_get_query_template\n    @querytext = N'select top 1 ID, Number, Name from\
  \ dbo.Employees where ID = 5;'\n    ,@templatetext = @stmt output\n    ,@params\
  \ = @params output;\n\n-- 创建计划指南\nexec sp_create_plan_guide\n    @type = N'TEMPLATE'\n\
  \    ,@name = N'template_plan_guide_demo'\n    ,@stmt = @stmt\n    ,@module_or_batch\
  \ = null\n    ,@params = @params\n    ,@hints = N'OPTION (PARAMETERIZATION FORCED)'\n\
  ```\n\n现在，如果你运行代码清单 26-22 中的代码，该语句将被参数化，如图 26-14 所示。\n\n**图 26-14.** 创建模板计划指南之后的计划缓存\n\
  \n![](img/index-521_1.jpg)\n\n作为最后的选项，你可以通过在计划指南中指定或使用 USE PLAN 查询提示，强制 SQL Server\
  \ 使用特定的执行计划。代码清单 26-24 展示了这两种方法的示例。完整的 XML 计划因节省书籍篇幅而被省略。\n\n**代码清单 26-24.** 强制\
  \ XML 查询计划\n\n```sql\n-- 使用 USE PLAN 查询提示\nselect Avg(Salary) as [Avg Salary]\n\
  from dbo.Employees\nwhere Country = 'Germany'\noption (use plan N'<?xml version=\"\
  1.0\"?>\n<ShowPlanXML><!-- 实际执行计划在此 --></ShowPlanXML>');\ngo\n\n-- 使用计划指南\ndeclare\n\
  \    @Xml xml = N'<?xml version=\"1.0\"?>\n<ShowPlanXML><!-- 实际执行计划在此 --> </ShowPlanXML>';\n\
  \ndeclare\n    @XmlAsNVarchar nvarchar(max) = convert(nvarchar(max),@Xml)\n\nexec\
  \ sp_create_plan_guide\n    @type = N'SQL'\n    ,@name = N'xml_plan_guide_demo'\n\
  \    ,@stmt = N'select Avg(Salary) as [Avg Salary]\nfrom dbo.Employees\nwhere Country\
  \ = ''Germany'''\n    ,@module_or_batch = NULL\n    ,@params = null\n    ,@hints\
  \ = @XmlAsNVarchar;\n```\n\n![](img/index-522_1.jpg)\n\n\n虽然查询提示和计划指南都强制 SQL Server\
  \ 使用特定的执行计划，但在 SQL Server 2008 及以上版本中，当计划变得不正确时，它们表现出不同的行为。查询优化器会忽略不正确的计划指南，并生成一个如同未指定计划指南的计划。另一方面，带有\
  \ `USE PLAN` 提示的查询则会产生错误。此处显示了此类错误的一个示例。而在 SQL Server 2005 中，如果指定了无效的计划指南，查询会直接失败。\n\
  \n```\nMsg 8712, Level 16, State 0, Line 1\nUSE PLAN 提示中指定的索引 'tempdb.dbo.Employees.IDX_Employees_Country'\
  \ 不存在。请指定一个现有索引，或用指定名称创建索引。\n```\n\n当更改计划指南和 `USE PLAN` 提示中引用的对象的架构时，需要小心。即使你的更改不直接影响查询使用的索引和列，也完全有可能使计划失效。例如，唯一索引或约束可以消除计划中的某些断言，因此当你删除它们时会使计划失效。另一个常见示例是分区架构和函数的更改。\n\
  \n## 验证计划指南\n\n从 SQL Server 2008 开始，你可以使用 `sys.fn_validate_plan_guide` 系统函数来检查计划指南是否仍然有效。清单\
  \ 26-25 中的代码展示了一个示例。\n\n**清单 26-25.** 验证计划指南\n\n```sql\nselect pg.plan_guide_id,\
  \ pg.name, pg.scope_type_desc, pg.is_disabled, vpg.message\nfrom sys.plan_guides\
  \ pg cross apply\n( select message from sys.fn_validate_plan_guide(pg.plan_guide_id)\
  \ ) vpg;\n```\n\n如果计划指南不正确，`sys.fn_validate_plan_guide` 函数会返回一行。你可以在图 26-15 中看到其输出的示例。\n\
  \n**图 26-15.** 验证计划指南\n\n最后需要注意的是，计划指南仅在 SQL Server 的标准版、企业版和开发版中受支持。你仍然可以在不受支持的版本中创建计划指南，但查询优化器会忽略它们。\n\
  \n#### 计划缓存内部机制\n\nSQL Server 将计划缓存分为四个不同的内存区域，称为*缓存存储*。每个缓存存储缓存不同的实体和计划，如下所示：\n\
  \n-   *SQL 计划*缓存存储（内部名称 `CACHESTORE_SQLCP`）存储参数化、即席查询和批处理的计划，以及自动参数化计划。\n-   *对象计划*缓存存储（`CACHESTORE_OBJCP`）存储\
  \ T-SQL 对象（如存储过程、触发器和用户定义函数）的计划。\n-   *扩展存储过程*缓存存储（`CACHESTORE_XPROC`）存储扩展存储过程的计划。\n\
  -   *绑定树*缓存存储（`CACHESTORE_PHDR`）存储在查询优化阶段生成的绑定树。\n\n请注意，SQL Server 使用其他与计划缓存无关的缓存存储。你可以使用\
  \ `sys.dm_os_memory_cache_counters` 数据管理视图来检查它们的内容。\n\n你可以使用 `SELECT` 语句来监控每个缓存存储的大小，如清单\
  \ 26-26 所示。\n\n**清单 26-26.** 检查缓存存储的大小\n\n```sql\nselect type as [Cache Store],\
  \ sum(pages_in_bytes) / 1024.0 as [Size in KB]\nfrom sys.dm_os_memory_objects\n\
  where type in ( 'MEMOBJ_CACHESTORESQLCP','MEMOBJ_CACHESTOREOBJCP'\n,'MEMOBJ_CACHESTOREXPROC','MEMOBJ_SQLMGR'\
  \ )\ngroup by type ;\n```\n\n每个缓存存储使用一个哈希表，其中哈希桶保存零个或多个计划。在 64 位实例的对象计划存储和 SQL 计划存储中，大约有\
  \ 40,000 个桶，而在 SQL Server 的 32 位实例中大约有 10,000 个桶。绑定树缓存存储的大小约为该数字的十分之一，扩展存储过程存储中的桶数始终为\
  \ 127。你可以使用 `sys.dm_os_memory_cache_hash_tables` 视图检查缓存存储属性。\n\nSQL Server 使用一个非常简单的算法来计算计划的哈希值，基于以下公式：`(object_id\
  \ * database_id) mod hash_table_size`。\n\n\n"
- '# 第 26 章 ■ 计划缓存


  对于参数化和即席查询，`object_id` 是查询或批处理的内部哈希值。完全有可能一个存储桶存储了同一对象或查询的多个计划。正如我们已经讨论过的，不同的 `SET`
  选项、数据库用户以及许多其他因素都会阻止计划重用。`SQL Server` 在缓存中查找正确计划时会比较多个计划属性。我们将在本章后面讨论如何分析计划属性。


  为多语句批处理缓存的编译计划基本上是各个语句级计划的数组。当批处理中的某个语句需要重新编译时，`SQL Server` 会重新编译该单个语句，而不是整个批处理。


  `SQL Server` 将缓存的批处理计划视为一个单元。整个批处理必须与产生缓存计划的原始批处理逐字符匹配，该计划才能被重用。`SQL Server` 为整个批处理从编译计划生成执行计划。


  计划缓存可使用的内存量取决于所使用的 `SQL Server` 版本（参见 表 26-1）。


  ## 表 26-1. 计划缓存压力限制计算公式


  **SQL Server 版本**


  **缓存压力限制**


  `SQL Server 2005 RTM, SP1`


  可见目标内存从 0-8 GB 的 75% + 从 8 GB-64 GB 的 50% + 大于 64 GB 的可见目标内存的 25%


  `SQL Server 2005 SP2+`, `SQL Server 2008/2008R2`, `SQL Server 2012 - 2016`


  可见目标内存从 0-4 GB 的 75% + 从 8 GB-64 GB 的 10% + 大于 64 GB 的可见目标内存的 5%


  *可见内存* 在 `SQL Server` 的 32 位和 64 位实例中是不同的。`SQL Server` 的 32 位实例最多有 2 GB 或 3 GB 的可见内存，具体取决于
  `boot.ini` 文件中是否存在 `/3GB` 开关。即使正在使用 `AWE`（地址窗口扩展）内存，也只能将 4 GB 以上的内存用于缓冲池。在 `SQL
  Server` 的 64 位实例上不存在此类限制。


  在内存压力下，`SQL Server` 开始从缓存中移除计划。有两种内存压力：`local`（本地）和 `global`（全局）。当某个缓存存储增长得过大并开始使用过多的
  `SQL Server` 进程内存时，会发生本地内存压力。当 `Windows` 强制 `SQL Server` 减少其物理内存使用量，或者所有缓存存储的组合大小达到计划缓存压力限制的
  80% 时，会发生全局内存压力。


  当某个缓存存储开始使用过多内存时，会触发本地内存压力。在 `SQL Server 2005-2008R2` 中，单页和多页分配被分开处理，当缓存存储在单页分配中达到计划缓存压力限制的
  75% 或在多页分配中达到 50% 时，会发生内存压力。在 `SQL Server 2012` 及更高版本中，只有一个内存分配器，称为 `any-size page
  allocator`（任意大小页面分配器），当缓存存储增长到计划缓存压力限制的 62.5% 时，会触发内存压力。


  本地内存压力也可能基于 `SQL` 和 `Object Plan` 缓存存储中的计划数量来触发。该数字大约是哈希表大小的四倍，在 32 位和 64 位实例上分别为
  40,000 或 160,000 个计划。


  本地和全局内存压力都使用称为 `eviction policy`（驱逐策略）的算法从缓存中移除计划，该算法基于计划成本。对于即席计划，成本从零开始，并在每次计划重用时增加一。其他类型的计划衡量生成它们所需资源的成本。它基于
  `I/O`、内存和上下文切换，单位称为 `ticks`（滴答），如下所示：


  `I/O`：每次 `I/O` 操作成本为 1 tick，最大为 19。


  `Memory`：每 16 页内存成本为 1 tick，最大为 4。


  `Context Switches`：每次切换成本为 1 tick，最大为 8。


  当没有内存压力时，成本不会减少，直到所有缓存计划的总大小...



