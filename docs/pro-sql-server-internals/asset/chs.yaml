  ![](img/index-643_2.jpg)


  ### 图 31-10. 文件快照备份


  还原过程从快照复制数据库文件，始终创建数据库的新副本。正如您所想，这允许您使用日志备份快照作为源来运行 `RESTORE DATABASE` 命令。它包含数据库文件的副本，您无需先还原完整备份。


  对于时间点还原，您应该使用两个相邻的备份集执行两次还原操作。首先，您需要使用 `RESTORE DATABASE WITH NORECOVERY` 命令从第一个备份集还原数据库。此命令将创建截至该备份集时间的数据库新副本。接下来，您需要使用
  `RESTORE LOG WITH STOPAT` 语句从第二个备份集还原日志。此命令会重放事务日志中从先前还原的备份集开始直到 `STOPAT` 选项中指定时间的部分。图
