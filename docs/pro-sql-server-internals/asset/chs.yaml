  ## Azure SQL 数据库中的扩展事件


  Microsoft Azure SQL 数据库 v12 也支持扩展事件。尽管公开的事件列表相对较小，但它支持在排查常见性能问题时很有帮助的事件，例如检测低效查询、阻塞问题、`tempdb`
  溢出、过量内存授予等。


  在撰写本书时，SQL Azure 支持三种事件目标：例如 `ring_buffer`、`event_counter` 和 `event_file`。你可以通过使用本章的查询来查询目录视图，从而分析支持的扩展事件对象列表。


  你可以在 SQL 数据库中创建扩展事件会话并查询目标，就像在常规 SQL Server 中一样。不过，在语法上存在一些细微差异。首先，你必须使用 `CREATE
  EVENT SESSION ON DATABASE` 子句，而不是 `ON SERVER` 子句。SQL 数据库将事件的作用域限定在数据库级别，而非服务器级别。数据库管理视图的命名约定也不同。你需要在名称中添加
  `_database`；例如，使用 `sys.dm_xe_database_sessions` 视图而非 `sys.dm_xe_sessions` 视图。


  **注意** 你可以在 [`azure.microsoft.com/en-us/documentation/articles/sql-database-xevent-db-diff-from-svr/`](https://azure.microsoft.com/en-us/documentation/articles/sql-database-xevent-db-diff-from-svr/)
  阅读关于 Azure SQL 数据库中扩展事件支持的文章。


  #### 总结


  扩展事件是一种轻量级且高度可扩展的监视和调试基础设施，将在未来版本的 SQL Server 中取代 SQL 跟踪。它解决了 SQL 跟踪在可用性方面的限制，并且通过仅收集所需信息以及在事件执行的早期阶段进行谓词分析，从而降低了对
  SQL Server 的开销。


  SQL Server 在每个新版本中都会公开新的扩展事件。从 SQL Server 2012 开始，所有 SQL 跟踪事件都有对应的扩展事件。此外，新的 SQL
  Server 功能不提供任何 SQL 跟踪支持，而是依赖于扩展事件。


  扩展事件以 XML 格式提供数据。每种事件类型都有其自己的架构，其中包括该事件类型的特定数据列。你可以使用一组全局可用的可用操作向事件数据添加额外信息，并且可以对事件数据应用谓词，过滤掉不需要的事件。


  事件数据可以存储在多个内存中和磁盘上的目标中，这使你可以收集原始事件数据或执行一些分析和聚合，例如计数和分组事件，或跟踪不匹配的事件对。


  `system_health` 事件会话提供有关 SQL Server 一般组件健康状况、资源使用情况和高严重性错误的信息。此会话在每个 SQL Server
  实例上默认创建并运行。收集的事件之一是 `xml_deadlock_report`，它允许你获取最近死锁的死锁图，而无需设置 SQL 跟踪事件或 `T1222`
  跟踪标志。


  扩展事件是一项很棒的技术，它允许你使用其他方法无法解决的复杂场景进行故障排除。尽管学习曲线陡峭，但学习和使用扩展事件是非常有益的。



