  您可以在图 1-1 中看到数据库和数据文件的物理布局。共有五个磁盘，包含四个数据文件和一个事务日志文件。虚线矩形代表文件组。


  ***图 1-1.** 数据库和数据文件的物理布局*


  能够在文件组中放置多个数据文件，使我们能够将负载分散到不同的存储上。




