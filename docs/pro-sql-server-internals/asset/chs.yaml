  |

  | | | | 在 2012–2014 中已弃用。`SQL Server` 2016 支持基础 `AG`。 | |

  | **标准版** | 仅支持 2 个节点 | 支持 | 仅同步模式 | 不支持 | 支持 |

  | **保护单位** | 实例 | 数据库 | 数据库 | 数据库组。（基础 `AG` 中为单个 `DB`） | 发布（数据子集） |

  | **数据丢失** | 无数据丢失但无保护 | 基于...的数据丢失 | 同步模式下无数据丢失 | 同步模式下无数据丢失 | 基于...的数据丢失 |


