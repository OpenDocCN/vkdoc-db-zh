- "# 查询优化与执行\n\n#### 查询优化过程\n\n查询优化过程包含多个阶段，如图 25-2 所示。\n\n*图 25-2. 查询优化阶段*\n\n在*简化*阶段，SQL\
  \ Server 以一种能进一步简化优化过程的方式转换查询树。查询优化器会移除查询中的矛盾条件、进行计算列匹配，并处理连接操作，根据统计信息和基数数据选择一个初始连接顺序。\n\
  \n![](img/index-478_1.jpg)\n\n## 查询优化示例\n\n列表 25-1 提供了从执行计划中移除矛盾部分的示例。`dbo.NegativeNumbers`\
  \ 和 `dbo.PositiveNumbers` 表都有 `CHECK` 约束，这些约束定义了值的域范围。SQL Server 可以检测到域值矛盾，并理解内连接操作不会返回任何数据。它会生成一个不访问任何表的执行计划，如图\
  \ 25-3 所示。\n\n**列表 25-1.** 从执行计划中移除矛盾部分\n\n```\ncreate table dbo.PositiveNumbers\n\
  (\n    PositiveNumber int not null\n        constraint CHK_PositiveNumbers check\
  \ (PositiveNumber > 0)\n);\n\ncreate table dbo.NegativeNumbers\n(\n    NegativeNumber\
  \ int not null\n        constraint CHK_NegativeNumbers check (NegativeNumber < 0)\n\
  );\n\nselect *\nfrom dbo.PositiveNumbers e join dbo.NegativeNumbers o on\n    e.PositiveNumber\
  \ = o.NegativeNumber\n```\n\n*图 25-3. 该查询的执行计划*\n\n简化阶段完成后，查询优化器会检查该查询是否有*简易执行计划*可用。当查询只有一个可用的执行计划，或者执行计划的选择显而易见时，就会发生这种情况。列表\
  \ 25-2 显示了这样一个例子。\n\n**列表 25-2.** 具有简易执行计划的查询\n\n```\ncreate table dbo.Data\n(\n\
  ```\n\n\n\n"
- "# 第 25 章 ■ 查询优化与执行\n\n```sql\nCREATE TABLE Data (\n    ID int not null,\n    Col1\
  \ int not null,\n    Col2 int not null,\n    constraint PK_Data primary key clustered(ID)\n\
  );\n\nselect ID, Col1, Col2 from dbo.Data where ID = 11111;\n```\n\nSQL Server 生成了**简单执行计划**，该计划使用\
  \ `聚集索引查找` 运算符，如 `图 25-4` 所示。\n\n![](img/index-479_1.jpg)\n\n`图 25-4.` 简单执行计划\n\n\
  尽管从技术上讲存在两种不同的执行计划选择，即 `聚集索引查找` 和 `聚集索引扫描`，但查询优化器并未考虑扫描选项，因为它显然开销更大。此外，在 `Col1`\
  \ 或 `Col2` 上添加非聚集索引会引入额外的、非最优的执行计划选项。尽管如此，查询优化器仍然能够检测到这种情况，并转而生成一个简单执行计划。你可以通过根运算符的属性或执行计划的\
  \ XML 表示形式来检查一个执行计划是否是简单的。\n\n如果没有找到简单计划，SQL Server 会检查是否有任何自动更新的统计信息已过期，并在需要时触发统计信息更新。如果统计信息需要同步更新（这是默认选项），查询优化器会等待统计信息更新完成。否则，优化将基于旧的、过时的统计信息进行，同时统计信息在另一个线程中异步更新。之后，SQL\
  \ Server 开始基于成本的优化，其中包括几个不同的阶段。每个阶段探索更多的规则，因此执行时间可能更长。\n\n`阶段 0` 称为 `事务处理`，其目标场景是具有\
  \ OLTP 工作负载的情况：使用索引进行多表（至少三表）连接，选择相对较少的行。此阶段通常使用嵌套循环连接，尽管在某些情况下可能会考虑哈希连接。在此阶段只探索有限数量的优化规则。\n\
  \n`阶段 1` 称为 `快速计划`，它应用 SQL Server 中可用的大多数优化规则。如果需要，它可能会运行两次，分别查找串行和并行执行计划。SQL Server\
  \ 中的大多数查询都在此阶段找到执行计划。\n\n`阶段 2` 称为 `完全优化`，它执行最全面、因此运行时间最长的分析，探索所有可用的优化规则。\n\n每个阶段都有其自身的进入和终止条件。例如，`阶段\
  \ 0` 要求查询至少具有三表连接；否则，它将不会被执行。或者，如果在优化过程中计划成本超过某个阈值，则该阶段终止，查询优化器继续进入下一个更全面的阶段。一旦找到“足够好”的计划，优化可以在任何阶段完成。\n\
  \n你可以使用未文档化的跟踪标志 `T8675` 来检查优化过程的细节。关于未文档化跟踪标志的通常免责声明在此适用：请谨慎使用，不要在生产环境中使用。你还需要使用跟踪标志\
  \ `T3604` 将输出重定向到控制台。\n\n`图 25-5` 展示了一个查询的优化统计信息。如你所见，SQL Server 执行了 `阶段 0` 和 `阶段\
  \ 1` 的优化，并在 `阶段 1` 之后生成了执行计划。\n\n![](img/index-480_1.jpg)\n\n`图 25-5.` 跟踪标志 8675\
  \ 返回的优化统计信息\n\n**注意：** 已文档化的数据管理视图 (DMV) `sys.dm_exec_query_optimizer_info` 允许你检索与查询优化器相关的统计信息。虽然此\
  \ DMV 在服务器范围内提供了很好的概览，但它不允许你按特定会话过滤信息，这使得在繁忙的环境中很难使用。你可以在 [`technet.microsoft.com/en-us/library/ms175002.aspx`](http://technet.microsoft.com/en-us/library/ms175002.aspx)\
  \ 获取关于此 DMV 的更多信息。\n\n\n\n"
- '# 查询优化与执行


  ## 查询优化


  最终，当**查询优化器**对优化结果满意时，它会生成执行计划。


  正如您所料，在查询优化阶段，**SQL Server** 会分析并探索大量备选的执行策略。这些备选方案是查询树的一部分，存储在**查询优化器**称为 `Memo`
  的部分中。SQL Server 会对 `Memo` 中的每一个组进行成本估算，这使其能够在生成执行计划时定位成本最低的方案。


  成本计算基于一个复杂的数学模型，该模型考虑了各种因素，例如：

  *   基数（`cardinality`）

  *   行大小（`row size`）

  *   预期内存使用量

  *   顺序和随机 I/O 操作的数量

  *   并行开销

  等。成本数值和计划成本本身并无意义；它们仅应用于比较目的。


  成本模型中有相当多的假设，旨在使其更加一致，如下所示：


  *   随机 I/O 被预期在数据库文件中均匀分布。例如，如果一个执行计划需要在堆表中执行十次 `RID lookup` 操作，成本模型将预计需要十次随机物理
  I/O 操作。实际上，数据可能驻留在相同的数据页上，这可能导致查询优化器高估计划中某些运算符的成本。

  *   **查询优化器**期望所有查询都从冷缓存开始，并在访问数据时执行物理 I/O。在生产系统中，数据页通常缓存在缓冲池中，这种假设可能不正确。在极少数情况下，这可能导致
  SQL Server 选择一个效率较低但需要较少 I/O，而以较高的 CPU 或内存使用为代价的计划。

  *   **查询优化器**假设顺序 I/O 性能显著快于随机 I/O 性能。这对于磁性硬盘驱动器通常成立，但对于固态介质则不完全如此，与磁性硬盘相比，后者的随机
  I/O 性能与顺序 I/O 性能更为接近。SQL Server 不考虑驱动器类型，在基于固态硬盘的磁盘阵列情况下会高估随机 I/O 操作的成本。对于某些查询，它可能生成使用聚集索引扫描而不是
  `nonclustered index seek` 和 `key lookup` 的执行计划，而这在基于 SSD 的磁盘子系统中效率可能较低。还值得注意的是，对于具有大量驱动器且随机
  I/O 性能非常好的现代高性能磁盘阵列，也可能发生同样的情况。


  综上所述，SQL Server 中的成本模型 `generally` 能产生正确且一致的结果。然而，与任何数学模型一样，输出的质量高度取决于输入数据的质量。例如，当由于统计信息过时而导致基数估算不正确时，就不可能提供正确的成本估算。保持统计信息最新有助于
  SQL Server 生成高效的执行计划。


  #### 查询执行


  SQL Server 在查询优化的最终阶段生成执行计划。然后，执行计划被传递给 `query executor`，顾名思义，它负责执行查询。


  执行计划是一个树状结构，包含一组 `operators`，有时也称为 `iterators`。通常，SQL Server 使用 `row-based` 执行模型，其中每个运算符通过从一个或多个子节点请求行来生成单个行，并将生成的行传递给其父节点。


  > **注意**：SQL Server 2012 引入了一种新的批处理模式执行模型，该模型用于某些数据仓库查询。我们将在本书的第八部分讨论这种执行模型。


  让我们看一个例子来说明基于行的执行模型，假设您有如 清单 25-3 所示的查询。


  ***清单 25-3.*** 基于行的执行：示例查询




  ```sql

  select top 10 c.CustomerId, c.Name, a.Street, a.City, a.State, a.ZipCode

  from dbo.Customers c join dbo.Addresses a on

  c.PrimaryAddressId = a.AddressId

  order by c.Name

  ```


  此查询将生成如图 25-6 所示的执行计划。SQL Server 从 `dbo.Customers` 表中选取所有数据，根据 `Name` 列进行排序，获取前十行，然后与
  `dbo.Addresses` 的数据进行联接，最后将结果返回给客户端。


  ![](img/index-482_1.jpg)


  ![](img/index-482_2.jpg)


  '
- '# 第 25 章 ■ 查询优化与执行


  ## 图 25-6. 基于行的模型：获取输出中的第一行


  让我们看看 SQL Server 如何基于逐个运算符来执行这样的查询。作为执行计划中的父运算符，`SELECT` 运算符调用 `Top` 运算符的 `GetRow()`
  方法。


  `Top` 运算符则调用 `nested loop join`（嵌套循环联接）的 `GetRow()` 方法。


  如您所知，一个联接需要从两个不同的来源获取数据才能产生输出。作为第一步，它调用 `Sort`（排序）运算符的 `GetRow()` 方法。为了进行排序，SQL
  Server 首先需要读取所有行；因此，`Sort` 运算符多次调用 `Clustered Index Scan`（聚集索引扫描）运算符的 `GetRow()`
  方法，以累积结果。`Scan`（扫描）运算符是执行计划树中最低层的运算符，每次调用从 `dbo.Customers` 表返回一行。为简洁起见，图 25-6 仅显示了两次
  `GetRow()` 调用。


  当 `dbo.Customers` 表的所有数据都被读取后，`Sort` 运算符执行排序操作，并将第一行返回给 `Join`（联接）运算符。随后，`Join`
  运算符调用 `dbo.Addresses` 表上 `Clustered Index Seek`（聚集索引查找）运算符的 `GetRow()` 方法。如果存在匹配项，`Join`
  运算符将来自两个输入的数据拼接起来，并将结果行传递给 `Top` 运算符，后者继而将其传递给 `SELECT`。


  `SELECT` 运算符将一行返回给客户端，并再次调用 `Top` 运算符的 `GetRow()` 方法来请求下一行。此过程会重复，直到选中了前十行。值得一提的是，各运算符保持了它们的状态，`Sort`
  运算符保留了已排序的数据，可以返回所有后续行，而无需再次访问 `Clustered Index Scan` 运算符，如图 25-7 所示。


  ## 图 25-7. 基于行的模型：获取后续行


  ### 注意


  在执行过程中，每个运算符还会调用另外两个方法：`Open()` 和 `Close()`。`Open()` 方法在第一次 `GetRow()` 调用之前初始化运算符。`Close()`
  方法在执行结束时进行清理工作。


  '
- '# 第 25 章 ■ 查询优化与执行


  您可能已经注意到，有两种类型的运算符。第一组称为 `non-blocking operators`（非阻塞运算符），它们从子运算符消耗行并立即产生输出。第二组称为
  `blocking operators`（阻塞运算符），它们必须先消耗子运算符的所有行，才能产生输出。在我们的例子中，`Sort` 运算符是唯一的阻塞运算符，因为它消耗了
  `dbo.Customers` 表的所有行之后才进行排序。另一个常见的阻塞运算符是 `Hash`（哈希），它用于哈希联接和聚合运算，我们将在本章后面讨论。


  尽管阻塞运算符完全正常，并且在许多情况下无法避免，但与它们相关存在几个问题。第一个问题是内存使用。每个运算符，无论是阻塞还是非阻塞，都需要一些内存来执行；然而，阻塞运算符在累积和处理行时可能会使用大量内存。该内存称为
  `memory grant`（内存授权），需要在查询开始执行前分配给它们。我们将在第[28](http://dx.doi.org/10.1007/978-1-4842-1964-5_28)章“系统故障排除”中详细讨论这个过程。


  正确估算内存授权大小非常重要。高估和低估都会导致问题。



  '
- "# 第 25 章 查询优化与执行\n\n内存估算不准确会对系统产生负面影响。高估会浪费服务器内存，并可能增加查询等待内存授权的时间。另一方面，低估会迫使 SQL\
  \ Server 在`tempdb`而非内存中执行排序或哈希操作，这显著更慢。这种情况被称为 `tempdb 溢出`。\n\n算子的内存估算依赖于基数和平均行大小的估算。任何一种错误都会导致不正确的内存授权请求。基数估算错误的典型来源包括：统计信息不准确、`WHERE`子句和连接条件中存在非\
  \ SARGable 谓词和函数，以及查询优化器模型的局限性。这些问题通常可以通过统计信息维护、查询简化和优化来解决。然而，处理行大小估算错误则更为棘手。\n\n\
  SQL Server 知道行中定长数据部分的大小。但对于变长列，它估算数据平均填充了所定义列大小的 50%。例如，如果你有两个定义为`varchar(100)`和`nvarchar(200)`的列，SQL\
  \ Server 会估算每个数据行在这些列中分别存储 50 和 200 个字节。对于`(n)varchar(max)`和`varbinary(max)`列，SQL\
  \ Server 使用 4000 字节作为基准数值。\n\n> **提示：** 你可以通过将变长列定义为所存储数据平均大小的两倍来改善行大小估算。\n\n让我们看一个例子，创建两个表，如清单\
  \ 25-4 所示。\n\n### 清单 25-4. 变长列与内存授权：创建表\n\n```sql\ncreate table dbo.Data1\n(\n \
  \   ID int not null,\n    Value varchar(100) not null,\n    constraint PK_Data1\
  \ primary key clustered(ID)\n);\n\ncreate table dbo.Data2\n(\n    ID int not null,\n\
  \    Value varchar(200) not null,\n    constraint PK_Data2 primary key clustered(ID)\n\
  );\n```\n\n![图片](img/index-484_1.jpg)\n\n```sql\n;with N1(C) as (select 0 union\
  \ all select 0) -- 2 rows\n,N2(C) as (select 0 from N1 as T1 cross join N1 as T2)\
  \ -- 4 rows\n,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) -- 16 rows\n\
  ,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256 rows\n,N5(C) as (select\
  \ 0 from N4 as T1 cross join N4 as T2 ) -- 65,536 rows\n,Nums(Num) as (select row_number()\
  \ over (order by (select null)) from N5)\ninsert into dbo.Data1(ID, Value)\nselect\
  \ Num, replicate('0',100) from Nums;\n\ninsert into dbo.Data2(ID, Value)\nselect\
  \ ID, Value from dbo.Data1;\n```\n\n在下一步中，让我们对这两个表运行两个相同的查询，如清单 25-5 所示。我使用变量来丢弃结果集。\n\
  \n### 清单 25-5. 变长列与内存授权：查询\n\n```sql\ndeclare\n    @V varchar(200)\n\nselect @V\
  \ = Value from dbo.Data1 where ID < 42000 order by Value, ID desc;\n\nselect @V\
  \ = Value from dbo.Data2 where ID < 42000 order by Value, ID desc;\n```\n\n如图 25-8\
  \ 所示，不正确的内存授权迫使 SQL Server 将数据溢出到`tempdb`，从而增加了执行时间。\n\n### 图 25-8. 变长列与内存授权：执行计划\n\
  \n> **提示：** 你可以通过 SQL 跟踪和扩展事件中的“排序和哈希警告”来监控数据溢出到`tempdb`的情况。如果你使用的是 SQL Server 2012\
  \ SP3、SQL Server 2014 SP2 或 SQL Server 2016，还可以使用`MIN_GRANT_PERCENT`和`MAX_GRANT_PERCENT`查询提示来指定内存授权的最小和最大大小。\n\
  \n![图片](img/index-485_1.jpg)\n\n当阻塞算子出现在执行计划的并行部分时，它们会对查询性能产生负面影响。`并行`算子会合并来自并行执行线程的数据，并会等待所有线程完成执行。因此，执行时间将取决于最慢的线程。阻塞算子会加剧延迟，尤其是在发生`tempdb\
  \ 溢出`的情况下。\n\n\n在并行线程工作负载因基数估计错误而分布不均的情况下，经常会出现条件问题。\n\n■ **提示** 在 `SQL Server Management\
  \ Studio` 图形执行计划的并行部分中，打开运算符的 `属性窗口` 时，您可以看到线程之间的工作负载分布。\n\n在某些情况下，添加索引可以从执行计划中移除阻塞运算符。例如，如果你添加了索引\
  \ `CREATE INDEX IDX_Customers_Name ON dbo.Customers(Name)`，`SQL Server` 就不再需要对客户数据进行排序，而清单\
  \ 25-3 中的查询最终会得到一个不含阻塞运算符的执行计划，如图 25-9 所示。\n\n**图 25-9.** 不含阻塞运算符的执行计划\n\n在 `SQL\
  \ Server Management Studio` 中，有三种方法可以分析执行计划。最常见的方法是图形执行计划表示法，可以通过 `查询` 菜单中的 `包含实际执行计划`\
  \ 菜单项启用。图形执行计划将执行计划树逆时针旋转 90 度来表示。树的顶级根元素是计划中最左侧的图标，其子节点位于父节点的右侧。\n\n当你在计划中选择一个运算符时，会弹出一个小窗口，显示该运算符的部分属性。但是，通过在\
  \ `Management Studio` 中打开运算符的 `属性窗口`，你可以获得更全面的信息。\n\n■ **提示** SentryOne “Plan Explorer”\
  \ 是一款出色的免费工具，可以简化执行计划分析。你可以从这里下载：`http://sentryone.com`。\n\n除了执行计划的图形表示外，`SQL Server`\
  \ 还可以将其显示为文本或 XML。文本表示法将每个运算符放在单独的行上，并使用缩进和 `|` 符号显示父子关系。当你需要分享一个紧凑且易于理解的执行计划表示，而无需担心图形执行计划的图像大小和比例时，文本执行计划可能很有用。\n\
  \n"
- '# 第 25 章 ■ 查询优化与执行


  XML 执行计划将运算符表示为 XML 节点，子运算符节点嵌套在父节点中。这是执行计划最完整的表示形式，包含了在其他模式中被省略的大量属性。然而，XML 执行计划比较复杂，需要一些时间和实践才能变得易于理解。


  除了实际执行计划，`SQL Server` 还可以在不运行实际查询的情况下提供 `估计执行计划`。这使你可以快速获取执行计划的形状以供分析。但是，它不包括实际的行数和执行次数，这些信息在查询性能调优过程中非常有帮助。


  表 25-1 展示了在图形、文本和 XML 模式下生成估计和实际执行计划的不同命令。


  **表 25-1.** 生成实际和估计执行计划的命令


  | 计划类型 | 命令 / 菜单项 | 执行查询 | 包含估计的行和执行计数 | 包含实际的行和执行计数 |

  |-----------|---------------------|-----------------|-------------------------------------------|----------------------------------------|

  | 图形 | 显示估计的执行计划 | 否 | 是 | 否 |

  | 图形 | 包含实际执行计划 | 是 | 是 | 是 |

  | 文本 | `SET SHOWPLAN_TEXT ON` | 否 | 否 | 否 |

  | 文本 | `SET SHOWPLAN_ALL ON` | 否 | 是 | 否 |

  | 文本 | `SET STATISTICS PROFILE ON` | 是 | 是 | 是 |

  | XML | `SET SHOWPLAN_XML ON` | 否 | 是 | 否 |

  | XML | `SET STATISTICS PROFILE XML` | 是 | 是 | 是 |


  ■ **重要提示** 你应该始终关注执行计划中实际行数和估计行数之间的差异。这两个值之间的巨大差异通常是基数估计错误的迹象，而基数估计错误则源于不准确的统计信息。


  #### 运算符


  `SQL Server` 使用两种类型的运算符：`逻辑` 和 `物理`。这些运算符在不同类型的查询树中，于查询生命周期的不同阶段使用。`SQL Server`
  在



  '
- "# 第 25 章 ■ 查询优化与执行\n\n## 联接\n\n解析和绑定阶段，并在优化过程中用物理运算符替换它们。例如，一个 `inner join`（内联接）逻辑运算符可以在执行计划中被替换为三种物理联接运算符之一。\n\
  \n本章不可能涵盖所有物理运算符；但是，我们将讨论一些在执行计划中经常遇到的常见运算符。\n\nSQL Server 中有多种物理联接运算符的变体，它们决定了联接谓词的匹配方式以及结果行中包含的内容。然而，就算法而言，只有三种联接类型：`nested\
  \ loop`（嵌套循环）、`merge`（合并）和 `hash`（哈希）联接。\n\n### 嵌套循环联接\n\n`nested loop join`（嵌套循环联接）是最简单的联接算法。与任何联接类型一样，它接受两个输入，分别称为\
  \ `outer`（外表）和 `inner`（内表）。内嵌套循环联接的算法如 清单 25-6 所示，而外嵌套循环联接的算法如 清单 25-7 所示。\n\n```\n\
  for each row R1 in outer table\n  for each row R2 in inner table\n    if R1 joins\
  \ with R2\n      return join (R1, R2)\n```\n\n```\nfor each row R1 in outer table\n\
  \  for each row R2 in inner table\n    if R1 joins with R2\n      return join (R1,\
  \ R2)\n    else\n      return join (R1, NULL)\n```\n\n如你所见，该算法的成本取决于输入的大小，并与其乘积成正比；即外表的大小乘以内表的大小。成本随着输入的大小快速增长；因此，当至少一个输入很小时，嵌套循环联接是高效的。在等式联接谓词的情况下，如果内表的谓词列上有索引也是有益的。这有助于避免执行过程中的\
  \ `index scan`（索引扫描）操作。\n\n嵌套循环联接不要求联接键必须具有等式谓词。SQL Server 会评估两个输入中每一行之间的联接谓词。事实上，它甚至不要求必须有联接谓词。例如，`CROSS\
  \ JOIN`（交叉联接）逻辑运算符将导致一个嵌套循环物理联接，其中两个输入的所有行都被联接在一起。\n\n### 合并联接\n\n`merge join`（合并联接）适用于两个已排序的输入。它一次比较两行，如果相等，则将其联接结果返回给客户端。否则，它会丢弃值较小的那一行，并转到该输入中的下一行。与嵌套循环联接相反，合并联接要求联接键上至少有一个等式谓词。清单\
  \ 25-8 展示了内合并联接的算法。\n\n```\n/* Pre-requirements: Inputs I1 and I2 are sorted */\n\
  get first row R1 from input I1\nget first row R2 from input I2\nwhile not end of\
  \ either input\nbegin\n  if R1 joins with R2\n  begin\n    return join (R1, R2)\n\
  \    get next row R2 from I2\n  end\n  else if R1 < R2\n    get next row R1 from\
  \ I1\n  else /* R1 > R2 */\n    get next row R2 from I2\nend\n```\n\n合并联接算法的成本与两个输入大小的总和成正比，这使得它在处理大输入时比嵌套循环联接更高效。然而，合并联接要求两个输入都是已排序的，当输入在联接键列上有索引时通常就是这种情况。\n\
  \n在某些情况下，SQL Server 可能会在合并联接之前决定使用 `Sort`（排序）运算符对输入进行排序。显然，在分析时，排序的成本需要与联接运算符的成本一起考虑。你也可以考虑创建索引来预排序数据。\n\
  \n### 哈希联接\n\n与在小型输入上效果最佳的嵌套循环联接，以及在已排序输入上表现出色的合并联接不同，`hash join`（哈希联接）旨在处理大型、未排序的输入。哈希联接算法包含两个不同的阶段。\n\
  \n在第一个阶段，即 `build`（生成）阶段，哈希联接扫描其中一个输入（通常是较小的那个），计算\n\n\n"
- "# 第 25 章 ■ 查询优化与执行\n\n连接键的哈希值，并将其放入哈希表中。接下来，在第二个阶段，即*探测*阶段，哈希连接会扫描第二个输入，并检查（或*探测*）来自第二个输入的连接键的哈希值是否存在于哈希表中。当存在时，SQL\
  \ Server 会对来自第二个输入的行和来自第一个输入且属于同一哈希桶的所有行评估连接谓词。\n\n这种比较是必须的，因为计算哈希值的算法并不能保证各个键的哈希值是唯一的，这会导致多个键生成相同哈希值的情况，即*哈希冲突*。尽管由于哈希冲突可能带来额外比较操作的开销，但这种情况相对较少。\n\
  \n清单 25-9 展示了内连接哈希连接的算法。\n\n***清单 25-9.*** 内连接哈希连接算法\n```\n/* 构建阶段 */\nfor each\
  \ row R1 in input I1\nbegin\n    calculate hash value on R1 join key\n    insert\
  \ hash value to appropriate bucket in hash table\nend\n\n/* 探测阶段 */\nfor each row\
  \ R2 in input I2\nbegin\n    calculate hash value on R2 join key\n    for each row\
  \ R1 in hash table bucket\n        if R1 joins with R2\n            return join\
  \ (R1, R2)\nend\n```\n\n如你所料，哈希连接需要内存来存储哈希表。哈希连接的性能在很大程度上取决于内存授予估算是否正确。当内存估算不正确时，哈希连接会将一些哈希表桶存储在\
  \ `tempdb` 中，这会大大降低操作符的性能。当这种情况发生时，SQL Server 会跟踪桶的位置：是在内存中还是在磁盘上。对于来自第二个输入的每一行，它都会检查哈希桶的位置。如果在内存中，SQL\
  \ Server 会立即处理该行。否则，它会将该行存储在 `tempdb` 的另一个内部临时表中。\n\n第一次处理完成后，SQL Server 会丢弃内存中的桶，用磁盘上的桶替换它们，并对存储在内部临时表中来自第二个输入的所有剩余行重复探测阶段。如果仍然没有足够的内存来容纳所有的哈希桶，其中一些桶会再次溢出到磁盘上。\n\
  \n这种情况发生的次数称为*递归级别*。SQL Server 会跟踪这个级别，并最终切换到一个特殊的*备用*算法，该算法效率较低，但保证在某个时刻能够完成。\n\
  \n■ **提示** 你可以使用 SQL 跟踪和扩展事件中的 `Hash Warnings` 来监控哈希表溢出到 `tempdb` 的情况。\n\n与合并连接类似，哈希连接要求连接条件中至少有一个相等谓词。\n\
  \n## 连接类型比较\n\n通常，连接操作符的选择属于“视情况而定”的范畴。每种连接类型都有其自身的优缺点，这使得它适用于某些场景，而不适用于其他场景。\n\n\
  表 25-2 比较了不同场景下的各种连接类型。\n\n***表 25-2.*** 连接类型比较\n\n| 属性 | 嵌套循环连接 | 合并连接 | 哈希连接 |\n\
  |-----------|------------------|------------|-----------|\n| 最佳用例 | 小型输入。内层表在连接键上有索引时更优。\
  \ | 中大型输入，在索引键上已排序。 | 中大型输入。 |\n| 要求输入已排序 | 否 | 是 | 否 |\n| 要求相等谓词 | 否 | 是 | 是 |\n\
  | 阻塞操作符 | 否 | 否 | 是（仅构建阶段） |\n| 使用内存 | 否 | 否 | 是 |\n| 使用 tempdb | 否 | 否（多对多连接除外）\
  \ | 是，在溢出情况下 |\n| 保留顺序 | 是（外部输入） | 是 | 否 |\n\n人们在进行性能调优时常犯的一个错误是严格依赖查询产生的逻辑读数量。尽管这个数字是一个很好的性能指标，但在涉及连接的情况下，它可能会产生误导。例如，完全有可能哈希连接比嵌套循环连接产生的读取次数更少。然而，它并未考虑\
  \ CPU 使用率和内存开销，或者 `tempdb` 溢出和备用算法带来的性能影响。\n\n"
- "# 第 25 章 ■ 查询优化与执行\n\n\n\n## 合并连接\n\n合并连接是另一个很好的范例。虽然它在已排序的输入上比嵌套循环更高效，但人们很容易忽略为合并连接准备输入的\
  \ `Sort` 操作的开销。\n\n通常，你应该在分析中牢记连接行为以及每种连接类型的优缺点。\n\n## 聚合\n\n聚合对一组值执行计算并返回单个值。SQL\
  \ 中聚合的一个典型例子是 `MIN()` 函数，它返回其处理的一组值中的最小值。\n\nSQL Server 支持两种类型的聚合运算符：`stream`（流）聚合和\
  \ `hash`（哈希）聚合。\n\n### 流聚合\n\n`stream aggregate` 基于已排序的输入执行聚合；例如，当数据按 `group by`\
  \ 子句中指定的列排序时。清单 25-10 展示了流聚合算法。\n\n***清单 25-10.*** 流聚合算法\n\n```\n/* Pre-requirement:\
  \ input is sorted */\n\nfor each row R1 from input\n\nbegin\n\n    if R1 does not\
  \ match current group by criteria\n\n    begin\n\n        return current aggregate\
  \ results (if any)\n\n        clear current aggregate results\n\n        set current\
  \ group criteria to match R1\n\n    end\n\n    update aggregate results with R1\
  \ data\n\nend\n\nreturn current aggregate results (if any)\n```\n\n由于需要已排序的输入，SQL\
  \ Server 经常将流聚合与 `Sort` 运算符一起使用。让我们看一个例子，创建一个包含公司销售信息的表格。之后，运行一个查询来计算每个客户的总销售额。执行此操作的代码如清单\
  \ 25-11 所示。\n\n***清单 25-11.*** 使用流聚合的查询\n\n```\ncreate table dbo.Orders\n\n(\n\n\
  \    OrderID int not null,\n\n    CustomerId int not null,\n\n    Total money not\
  \ null,\n\n    constraint PK_Orders primary key clustered(OrderID)\n\n);\n\n;with\
  \ N1(C) as (select 0 union all select 0) -- 2 rows\n\n,N2(C) as (select 0 from N1\
  \ as T1 cross join N1 as T2) -- 4 rows\n\n,N3(C) as (select 0 from N2 as T1 cross\
  \ join N2 as T2) -- 16 rows\n\n,N4(C) as (select 0 from N3 as T1 cross join N3 as\
  \ T2) -- 256 rows\n\n,Nums(Num) as (select row_number() over (order by (select null))\
  \ from N4)\n\ninsert into dbo.Orders(OrderId, CustomerId, Total)\n\nselect Num,\
  \ Num % 10 + 1, Num from Nums;\n\nselect Customerid, sum(Total) as [Total Sales]\n\
  \nfrom dbo.Orders\n\ngroup by CustomerId;\n```\n\n你可以在图 25-10 中看到查询的执行计划。由于`CustomerId`\
  \ 列上没有索引，SQL Server 需要添加一个 `Sort` 运算符来为 `Stream Aggregate` 运算符保证已排序的输入。\n\n***图\
  \ 25-10.** 使用流聚合的查询执行计划*\n\n### 哈希聚合\n\n`hash aggregate` 与哈希连接非常相似。它针对大型输入，并需要内存来存储哈希表。哈希聚合算法如清单\
  \ 25-12 所示。\n\n***清单 25-12.*** 哈希聚合算法\n\n```\nfor each row R1 from input\n\nbegin\n\
  \n    calculate hash value of R1 group columns\n\n    check for a matching row in\
  \ hash table\n\n    if matching row exists\n\n        update aggregate results of\
  \ matching row\n\n    else\n\n        insert new row into hash table\n\nend\n\n\
  return all rows from hash table with aggregate results\n```\n\n类似于哈希连接，哈希表可能溢出到\
  \ `tempdb`，这对聚合的性能有负面影响。\n\n### 聚合比较\n\n与连接一样，流聚合和哈希聚合针对不同的用例。流聚合在输入已排序时效果最好——无论是由于现有索引，还是数据量小易于排序。另一方面，哈希聚合针对大型、未排序的输入。\n\
  \n表 25-3 比较了哈希聚合和流聚合。\n\n***表 25-3.** 聚合比较*\n\n| | **流聚合** | **哈希聚合** |\n| :---\
  \ | :--- | :--- |\n| **最佳用例** | 输入规模小，数据可排序 | 输入规模中到大，且未排序 |\n\n\n\n"
- "# 第 25 章 ■ 查询优化与执行\n\n## 排序操作符\n\n| 特性 | 流聚合 | 哈希聚合 |\n| :--- | :--- | :--- |\n\
  | 输入要求 | `排序`操作符或预排序输入 | 要求排序输入 |\n| 阻塞性 | 否。但通常需要一个阻塞性的 `排序`操作符。 | 是 |\n| 使用内存\
  \ | 否 | 是 |\n| 使用 tempdb | 否 | 是，在溢出情况下 |\n\n在性能调优期间，如果使用`排序`操作符仅仅是为了支持流聚合的先决条件，你应该考虑其成本。排序的成本通常超过流聚合本身的成本。你通常可以通过创建索引来移除它，这些索引会按照流聚合所需的顺序对数据进行排序。\n\
  \n## 假脱机\n\n简而言之，`假脱机`操作符是内部的内存中或 tempdb 中的缓存/临时表。SQL Server 通常出于性能原因使用假脱机来缓存复杂子表达式的结果，这些结果在查询执行过程中需要多次使用。\n\
  \n让我们看一个例子，使用我们在清单 25-11 中创建的表。我们将运行一个查询，返回所有订单的信息，以及每个客户的销售总额，如清单 25-13 所示。\n\n\
  ### 清单 25-13. 表假脱机示例\n\n```sql\nselect OrderId, CustomerID, Total, sum(Total) over(partition\
  \ by CustomerID) as [Customer Sales]\nfrom dbo.Orders\n```\n\n查询的执行计划如图 25-11 所示。如你所见，SQL\
  \ Server 扫描表，根据`CustomerID`顺序对数据进行排序，并使用`表假脱机`操作符来缓存结果。这使得 SQL Server 可以访问缓存的数据，并避免之后昂贵的排序操作。\n\
  \n### 图 25-11. 查询的执行计划\n\n![](img/index-493_1.jpg)\n\n尽管执行计划中多次显示了`表假脱机`操作符，但它本质上是同一个假脱机/缓存。SQL\
  \ Server 在第一次构建它，并在之后使用其数据。\n\n当修改数据时，SQL Server 会使用假脱机来实现`万圣节保护`。`万圣节保护`有助于避免数据修改影响需要更新的数据的情况。这种情形的一个经典例子如清单\
  \ 25-14 所示。如果没有`万圣节保护`，`INSERT`语句将陷入无限循环，读取它正在插入的行。\n\n### 清单 25-14. 万圣节保护\n\n```sql\n\
  create table dbo.HalloweenProtection\n(\n    Id int not null identity(1,1),\n  \
  \  Data int not null\n);\n\ninsert into dbo.HalloweenProtection(Data)\nselect Data\
  \ from dbo.HalloweenProtection;\n```\n\n`INSERT`语句的执行计划如图 25-12 所示。SQL Server 在`INSERT`之前使用`表假脱机`操作符来缓存表中的数据，以避免执行期间的无限循环。\n\
  \n### 图 25-12. 万圣节保护执行计划\n\n正如我在第 11 章“用户定义函数”中提到的，在定义标量用户定义函数时，使用`WITH SCHEMABINDING`选项非常重要。此选项强制\
  \ SQL Server 分析用户定义函数是否执行数据访问，并避免执行计划中额外的、与`万圣节保护`相关的`假脱机`操作符。\n\n清单 25-15 展示了一个代码示例，它创建了两个用户定义函数，并在`UPDATE`语句的`where`子句中使用它们。\n\
  \n### 清单 25-15. 万圣节保护和用户定义函数\n\n```sql\ncreate function dbo.ShouldUpdateData(@Id\
  \ int)\nreturns bit\nas\n    return (1);\ngo\n\ncreate function dbo.ShouldUpdateDataSchemaBound(@Id\
  \ int)\nreturns bit\nwith schemabinding\nas\n    return (1);\ngo\n\nupdate dbo.HalloweenProtection\
  \ set Data = 0 where dbo.ShouldUpdateData(ID) = 1;\nupdate dbo.HalloweenProtection\
  \ set Data = 0 where dbo.ShouldUpdateDataSchemaBound(ID) = 1;\n```\n\n这两个函数都没有访问数据，因此不会引入万圣节效应。然而，对于非架构绑定的函数，SQL\
  \ Server 并不知道这一点，因此它会添加一个`假脱机`操作符。\n\n\n\n操作符到执行计划的映射，如图 25-13 所示。\n\n### 图 25-13.\
  \ 万圣节保护与用户定义函数：执行计划\n\n`Spool`临时表在查询的 I/O 统计中通常被称为`worktables`。在进行查询性能调优时，你应该分析与表\
  \ Spool 相关的读取操作。虽然 Spool 可以提升查询性能，但不必要的 Spool 也会带来管理和`tempdb`的开销。你通常可以通过在表上创建适当的索引来移除它们。\n\
  \nSQL Server 2016 引入了新的查询提示`NO_PERFORMANCE_SPOOL`，它可以防止`Spool`操作符被添加到执行计划中。这在某些情况下可能很有帮助，尤其是在`tempdb`负载非常重的系统中，当创建内部\
  \ Spool 临时表的开销变得不可接受时。然而，这个提示会改变执行计划的形状，并可能在其他情况下降低查询性能。请谨慎使用，并务必分析它对查询执行计划和性能的影响。\n\
  \n### 并行度\n\nSQL Server 可以同时使用多个 CPU 来执行查询。尽管并行查询执行可以减少查询的响应时间，但这是有代价的。并行度总是会引入管理多个执行线程的开销。\n\
  \n让我们看一个例子，创建两个表，如清单 25-16 所示。该脚本向表`dbo.T1`插入 65,536 行，向表`dbo.T2`插入 1,048,576 行。\n\
  \n#### 清单 25-16. 并行度：创建表\n\n```sql\ncreate table dbo.T1\n(\n    T1ID int not null,\n\
  \    Placeholder char(100),\n    constraint PK_T1 primary key clustered(T1ID)\n\
  );\n\ncreate table dbo.T2\n(\n    T1ID int not null,\n    T2ID int not null,\n \
  \   Placeholder char(100)\n);\n\ncreate unique clustered index IDX_T2_T1ID_T2ID\n\
  on dbo.T2(T1ID, T2ID);\n\n;with N1(C) as (select 0 union all select 0) -- 2 rows\n\
  ,N2(C) as (select 0 from N1 as T1 cross join N1 as T2) -- 4 rows\n,N3(C) as (select\
  \ 0 from N2 as T1 cross join N2 as T2) -- 16 rows\n,N4(C) as (select 0 from N3 as\
  \ T1 cross join N3 as T2) -- 256 rows\n,N5(C) as (select 0 from N4 as T1 cross join\
  \ N4 as T2) -- 65,536 rows\n,Nums(Num) as (select row_number() over (order by (select\
  \ null)) from N5)\ninsert into dbo.T1(T1ID)\nselect Num from Nums;\n\n;with N1(C)\
  \ as (select 0 union all select 0) -- 2 rows\n,N2(C) as (select 0 from N1 as T1\
  \ cross join N1 as T2) -- 4 rows\n,N3(C) as (select 0 from N2 as T1 cross join N2\
  \ as T2) -- 16 rows\n,Nums(Num) as (select row_number() over (order by (select null))\
  \ from N3)\ninsert into dbo.T2(T1ID, T2ID)\nselect T1ID, Num from dbo.T1 cross join\
  \ Nums;\n```\n\n下一步，让我们运行两个`SELECT`语句，如清单 25-17 所示。\n\n#### 清单 25-17. 并行度：测试查询\n\
  \n```sql\nselect count(*)\nfrom\n(\n    select t1.T1ID, count(*) as Cnt\n    from\
  \ dbo.T1 t1 join dbo.T2 t2 on\n        t1.T1ID = t2.T1ID\n    group by t1.T1ID\n\
  ) s\noption (maxdop 1);\n\nselect count(*)\nfrom\n(\n    select t1.T1ID, count(*)\
  \ as Cnt\n    from dbo.T1 t1 join dbo.T2 t2 on\n        t1.T1ID = t2.T1ID\n    group\
  \ by t1.T1ID\n) s;\n```\n\n我们对第一个查询使用`MAXDOP 1`作为查询提示来强制执行串行计划。第二个查询具有并行执行计划。图 25-14\
  \ 说明了这种情况。\n\n![](img/index-496_1.jpg)\n![](img/index-496_2.jpg)\n![](img/index-496_3.jpg)\n\
  \n### 图 25-14. 并行执行：查询计划\n\n如你所见，第一个查询的响应（总耗时）时间比第二个查询慢得多：245 毫秒对 90 毫秒。然而，第一个查询的总\
  \ CPU 时间比第二个查询低得多：240 毫秒对 655 毫秒。我们正在为并行度管理使用 CPU 资源。\n\n并行执行计划并不一定意味着所有操作符都在并行执行。一个执行计划可以同时包含并行和串行执行区域。图\
  \ 25-14 中所示的并行计划\n\n\n\n在并行区域内运行子查询，并在外部以串行方式执行 `COUNT(*)` 计算。\n\n`Parallelism`\
  \ 操作符，有时也称为 `Exchange`，在查询执行期间管理并行操作。它从一个或多个 `producer`（生产者）线程接收输入数据，并将其分配给一个或多个\
  \ `consumer`（消费者）线程，该操作符可以三种不同模式运行。\n\n## 图 25-15. 并行性：分发流模式\n\n在 `distribute streams`（分发流）模式下，`Parallelism`\
  \ 操作符从一个 `producer` 线程接收数据，并将其分发到多个 `consumer` 线程。此模式通常是执行计划中并行执行区域的入口点。图 25-15\
  \ 说明了这一概念。\n\n## 图 25-16. 并行性：汇聚流模式\n\n在 `gather streams`（汇聚流）模式下，`Parallelism`\
  \ 操作符合并来自多个 `producer` 线程的数据，并将其传递给单个 `consumer` 线程。此模式通常是执行计划中并行执行区域的出口点。图 25-16\
  \ 阐释了这一思想。\n\n![](img/index-497_1.jpg)\n\n## 图 25-17. 并行性：重分布流模式\n\n最后，在 `repartition\
  \ streams`（重分布流）模式下，`Parallelism` 操作符从多个 `producer` 线程接收数据，并将其分发到多个 `consumer` 线程。这发生在执行计划的并行区域中部，当需要在执行线程之间重新分配数据时。图\
  \ 25-17 说明了这一概念。\n\n数据在 `consumer` 线程之间有多种不同的分配方式。表 25-4 总结了这些方法。\n\n## 表 25-4.\
  \ 并行操作符中的数据重分布方法\n\n| **重分布方法** | **描述** |\n| :--- | :--- |\n| 广播 | 将行发送到所有 `consumer`\
  \ 线程 |\n| 轮询 | 按顺序将行发送到下一个 `consumer` 线程 |\n| 按需 | 将行发送到下一个请求该行的 `consumer` 线程 |\n\
  | 范围 | 使用 `range` 函数确定哪个 `consumer` 线程应获得一行 |\n| 哈希 | 使用 `hash` 函数确定哪个 `consumer`\
  \ 线程应获得一行 |\n\n`Parallelism` 操作符使用的执行模型与其他操作符不同。它采用基于推送的模型，由 `producer` 线程将行推送给他。这与基于拉取的模型相反，在拉取模型中，父操作符调用子操作符的\
  \ `GetRow()` 方法来获取数据。\n\n均匀分布的工作负载是并行执行计划获得良好性能的关键因素。你可以在 Management Studio 中操作符属性窗口的“实际行数”部分看到每个线程处理的行数。该信息在图形执行计划的工具提示中不显示。线程\
  \ 0 是并行管理线程，其处理的行数始终显示为零。\n\n不均匀的数据分布和过时的统计信息是导致线程间工作负载分布不均的常见原因。图 25-18 展示了在其中一个表上更新统计信息后工作负载分布的变化情况。左侧显示的是更新统计信息前的分布，右侧显示的是更新后的分布。\n\
  \n![](img/index-498_1.jpg)\n\n## 图 25-18. 统计信息更新前后的工作负载分布情况\n\n### 查询和表提示\n\n查询优化器通常能很好地生成合理的执行计划。然而，在某些情况下，你可以决定使用\
  \ `query hints`（查询提示）和 `table hints`（表提示）来微调执行计划的形状。例如，`query` 和 `table hints` 允许你强制查询优化器为查询选择特定的索引或联接类型。\n\
  \n`Query hints` 是一个非常有用但非常危险的工具。它们可以帮助你提高执行计划的质量；然而，如果应用不当，它们也可能显著降低系统的性能。在使用它们之前，你应该对\
  \ SQL Server 的工作原理有非常深入的理解，并了解你的系统和数据。\n\n\n"
- "# 第 25 章：查询优化与执行\n\n系统的可维护性是另一个非常重要的因素。您应该记录使用提示（hints）的情况，并定期重新评估它们是否仍然必要。数据量和数据分布的变化可能导致由提示强制的执行计划变得次优。例如，考虑一种情况，提示强制查询优化器使用嵌套循环联接。随着数据量和输入集的增长，这种联接类型的效率会越来越低。\n\
  \n强制查询优化器使用特定索引是另一个例子。在数据选择性变化的情况下，索引的选择可能变得低效，并且这会阻止查询优化器使用后来创建的其他索引。此外，如果您删除了提示中引用的索引或对其重命名，代码会出错，查询将无法执行。\n\
  \n作为一般规则，您应该仅在最后万不得已的情况下才使用提示。如果使用，请确保统计信息是最新的，并且在应用提示之前，查询无法再被优化、简化或重构。\n\n在参数嗅探（parameter\
  \ sniffing）的情况下，通常最好使用 `OPTIMIZE FOR` 提示或语句级重编译，而不是使用索引提示来强制使用特定索引。我们将在下一章更深入地讨论这些方法。\n\
  \n## INDEX 表提示\n\n`INDEX` 可能是最常用的表提示之一。它强制查询优化器使用特定索引进行数据访问。它要求您指定索引的名称或 ID 作为参数。在大多数情况下，出于可维护性考虑，索引名称是更好的选择。然而，有两个例外情况，使用索引\
  \ ID 是更好的选择：强制聚集索引或堆表扫描。在这些情况下，您可以考虑分别使用 `1` 和 `0` 作为 ID。\n\nSQL Server 可以对索引使用\
  \ `扫描（Scan）` 或 ` Seek ` 访问方法。代码清单 25-18 展示了一个使用 `INDEX` 提示的例子，它强制 SQL Server 在查询中使用\
  \ `IDX_Orders_OrderDate` 索引。\n\n***代码清单 25-18.*** `INDEX` 查询提示\n\n```sql\nselect\
  \ OrderId, OrderDate, CustomerID, Total\nfrom dbo.Orders with (Index = IDX_Orders_OrderDate)\n\
  where OrderDate between @StartDate and @EndDate\n```\n\n`INDEX` 查询提示的一个合法使用场景是，在无法进行正确的基数估计的情况下，强制\
  \ SQL Server 使用复合索引之一。考虑一个表存储属于不同账户的多台设备的位置信息，如代码清单 25-19 所示。我们假设 `DeviceId` 仅在单个账户内是唯一的。\n\
  \n***代码清单 25-19.*** 复合索引与不均匀数据分布：表创建\n\n```sql\ncreate table dbo.Locations\n(\n\
  \    AccountId int not null,\n    DeviceId int not null,\n    UtcTimeTag datetime2(0)\
  \ not null,\n    /* 其他列 */\n);\n\ncreate unique clustered index IDX_Locations_AccountId_UtcTimeTag_DeviceId\n\
  \    on dbo.Locations(AccountId, UtcTimeTag, DeviceId);\n\ncreate unique nonclustered\
  \ index IDX_Locations_AccountId_DeviceId_UtcTimeTag\n    on dbo.Locations(AccountId,\
  \ DeviceId, UtcTimeTag);\n```\n\n在多租户系统中，数据分布非常不均匀是很常见的，有些账户拥有数百甚至数千台设备，而其他账户只有少数几台。假设我们希望为特定时间范围选择属于设备子集的数据，如代码清单\
  \ 25-20 所示。\n\n***代码清单 25-20.*** 复合索引与不均匀数据分布：查询\n\n```sql\nselect DeviceId, UtcTimeTag\
  \ /* 其他列 */\nfrom dbo.Locations\nwhere\n    AccountId = @AccountID and\n    UtcTimeTag\
  \ between @StartTime and @StopTime and\n    DeviceID in (select DeviceID from #ListOfDevices);\n\
  ```\n\nSQL Server 对于执行计划有两种不同的选择。第一种选择使用 `非聚集索引 Seek` 和 `键查找（key lookup）`，当您需要选择账户中非常小一部分设备的数据时，这种方式更好。在所有其他情况下，使用以\
  \ `AccountId` 和 `UtcTimeTag` 作为 Seek 谓词的 `聚集索引 Seek`，并对属于该账户的所有设备执行范围扫描，会更高效。\n\n\
  不幸的是，SQL Server 没有足够的数据来在任一情况下进行正确的基数估计。它可以根据任一索引的直方图来估计特定 `AccountID` 数据的选择性；然而，这对于估计设备列表的基数是不够的。\n\
  \n一种可能的解决方案是编写代码来计算 `#ListOfDevices` 表中的设备数量，并将其与每个账户的设备总数进行比较，然后根据比较结果使用 `INDEX`\
  \ 提示强制 SQL Server 使用特定索引。\n\n值得一提的是，这种系统设计并不理想。最好使 `DeviceId` 在全局范围内唯一，而不仅仅在账户范围内。这将允许您将\
  \ `DeviceId` 作为非聚集索引中最左边的列，这将帮助 SQL Server 基于设备列表进行基数估计。然而，这种方法仍然不会将时间参数纳入此类估计中。\n\
  \n## FORCE ORDER 提示\n\n`FORCE ORDER` 查询提示保留查询中的联接顺序。指定此提示后，SQL Server 将始终按照查询 `from`\
  \ 子句中列出的顺序联接表。但是，SQL Server 会在每种情况下选择开销最小的联接类型。\n\n代码清单 25-21 展示了这种提示的一个例子。SQL Server\
  \ 将按以下顺序执行联接：`((TableA join TableB) join TableC)`。\n\n***代码清单 25-21.*** `FORCE ORDER`\
  \ 提示\n\n```sql\nselect /* 列 */\nfrom\n    TableA join TableB on TableA.ID = TableB.AID\n\
  \    join TableC on TableB.ID = TableC.BID\noption (force order)\n```\n\n## LOOP,\
  \ MERGE, 和 HASH JOIN 提示\n\n您可以在查询级别和单个联接级别使用 `LOOP`、`MERGE` 和 `HASH` 提示来指定联接类型。可以在查询提示中指定多个联接类型，并允许\
  \ SQL Server 选择开销最小的一个。如果同时指定了联接操作符提示和查询提示，则联接操作符提示优先级更高。最后，联接类型提示会以类似于 `FORCE ORDER`\
  \ 提示的方式强制联接顺序。\n\n代码清单 25-22 展示了使用联接类型提示的例子。SQL Server 将按以下顺序执行联接：`((TableA join\
  \ TableB) join TableC)`。它将使用嵌套循环联接来联接 `TableA` 和 `TableB`，并使用嵌套循环或合并联接来联接 `TableC`。\n\
  \n***代码清单 25-22.*** 联接类型提示\n\n```sql\nselect /* 列 */\nfrom\n    TableA inner loop\
  \ join TableB on TableA.ID = TableB.AID\n    join TableC on TableB.ID = TableC.BID\n\
  option (loop join, merge join)\n```\n\n## FORCESEEK/FORCESCAN 提示\n\n`FORCESEEK`\
  \ 提示阻止 SQL Server 使用 `索引扫描` 操作符。它可用于查询级别和单个表级别，如果需要，可以与 `INDEX` 提示结合使用。如果无法生成不含索引扫描的执行计划，SQL\
  \ Server 将生成错误。您还可以为 `SEEK` 谓词指定一个可选的列列表。\n\n相反的提示 `FORCESCAN` 阻止 SQL Server 使用\
  \ `索引 Seek` 操作符，并强制其扫描数据。这两个提示都是在 SQL Server 2008 SP1 中引入的。\n\n## NOEXPAND/EXPAND\
  \ VIEWS 提示\n\n`NOEXPAND` 和 `EXPAND VIEWS` 提示控制 SQL Server 如何处理索引视图。此行为因版本而异。默认情况下，非企业版的\
  \ SQL Server 会将索引视图展开为其定义，即使查询中引用了视图，也不会使用其中的数据。您应指定 `NOEXPAND` 提示来避免这种情况。\n\n**提示：**\
  \ 如果数据库有可能迁移到非企业版 SQL Server，在查询中引用索引视图时，始终指定 `NOEXPAND` 提示。\n\n\n`清单 25-23`展示了`NOEXPAND`和`INDEX`提示的示例，这些提示强制`SQL\
  \ Server`使用在索引视图上创建的非聚集索引。\n\n`清单 25-23.` `NOEXPAND`和`INDEX`提示\n\n```\nselect CustomerID,\
