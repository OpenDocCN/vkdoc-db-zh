  ## 图 2-9. 有序索引扫描执行计划


  值得一提的是，触发有序扫描并不需要 `ORDER BY` 子句。有序扫描仅意味着 `SQL Server` 按照索引键的顺序读取数据。


  `SQL Server` 可以双向导航索引，向前或向后。然而，有一个重要的方面您必须牢记：在向后索引扫描期间，`SQL Server` 不使用并行处理。


