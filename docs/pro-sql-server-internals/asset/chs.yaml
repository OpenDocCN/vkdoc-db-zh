  ■ **注意** 请与 Microsoft 许可专家合作，以确定您的高可用性配置的确切许可要求。许可要求因 SQL Server 版本和软件保障协议的存在而异。

  降低故障转移群集解决方案成本的方法之一是使用`多实例故障转移群集`。在此配置中，一个 Windows 群集承载多个 SQL Server 故障转移群集实例。图
