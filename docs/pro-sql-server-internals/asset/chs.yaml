  \ 13-17.** 插入一批行：表值参数 T-SQL 代码\n\n```sql\ncreate type dbo.tvpData as table\n(\n\
  \    ID int not null primary key,\n    Col1 varchar(20) not null,\n    Col2 varchar(20)\
  \ not null,\n    /* 另外十七列：Col3 - Col19 */\n    Col20 varchar(20) not null\n)\nGo\n\
  \ncreate proc dbo.InsertDataTVP\n(\n    @Data dbo.tvpData readonly\n)\nas\ninsert\
  \ into dbo.Data(ID,Col1,Col2,/*…*/Col20)\nselect ID,Col1,Col2,/*…*/Col20\nfrom @Data;\n\
  ```\n\n**清单 13-18.** 插入一批行：表值参数 .Net 代码\n\n```csharp\nusing (SqlConnection conn\
  \ = GetConnection())\n{\n    DataTable tbl = new DataTable();\n    tbl.Columns.Add(\"\
  ID\", typeof(Int32));\n    for (int i = 1; i <= 20; i++)\n        tbl.Columns.Add(\"\
  Col\" + i.ToString(), typeof(string));\n    for (int i = 0; i < packetSize; i++)\n\
  \        tbl.Rows.Add(i, \"Parameter: 1\", /* 其他列 */ \"Parameter: 20\");\n\n   \
  \ /* 调用带有 TVP 参数的存储过程 */\n    SqlCommand cmd = new SqlCommand(\"dbo.InsertDataTVP\"\
  , conn);\n    cmd.Parameters.Add(\"@Data\", SqlDbType.Structured);\n    cmd.Parameters[0].TypeName\
  \ = \"dbo.tvpData\";\n    cmd.Parameters[0].Value = table;\n    cmd.ExecuteNonQuery();\n\
