- '# 数据库镜像：自动故障转移与客户端连接性


  在进行辅助服务器的滚动升级时，需要执行故障转移，然后升级之前的主服务器。请务必记住，故障转移后不可能回滚到旧版本的 SQL Server。同时，请记得在升级后使用
  `sp_updatestats` 存储过程更新数据库中的所有统计信息。


  同步数据库镜像提供两种不同的模式：*高保护* 和 *高可用性*。这两种模式的唯一区别在于对自动故障转移的支持。SQL Server 在高可用性模式下支持自动故障转移；但是，它需要您拥有第三个
  SQL Server 实例，即 *见证服务器*，它有助于在配置中建立仲裁。


  > **注意**

  >

  > 仲裁是指参与数据库镜像会话的服务器就它们的角色达成一致；即，哪台服务器充当主体服务器，哪台服务器充当镜像服务器。实际上，只要至少两台服务器（来自主体、镜像和见证服务器）能够相互通信，就可以建立仲裁。我们将在本章后面讨论当一台或多台服务器不可用时镜像会发生什么情况。


  您可以使用任何版本的 SQL Server（包括 Express 版）作为见证服务器。然而，至关重要的是，见证实例必须安装在另一台物理服务器上，以避免单台物理服务器的硬件故障导致多个
  SQL Server 实例离线并阻止建立仲裁的情况。


  表 32-1 显示了不同数据库镜像模式之间的异同。


  ***表 32-1.** 数据库镜像模式*


  | | **高性能** | **高保护** | **高可用性** |

  | :--- | :--- | :--- | :--- |

  | **提交** | 异步 | 同步 | 同步 |

  | **SQL Server 版本** | 仅企业版 | 企业版和标准版 | 企业版和标准版 |

  | **数据丢失** | 可能 | 当数据库处于 `SYNCHRONIZED` 状态时不可能 | 当数据库处于 `SYNCHRONIZED` 状态时不可能 |

  | **自动故障转移** | 不支持 | 不支持 | 在有见证服务器的情况下支持 |

  | **性能影响** | 无 | 网络和镜像 I/O 子系统延迟 | 网络和镜像 I/O 子系统延迟 |


  让我们看看高可用性模式下几个可能的故障转移场景。这里的关键点是，在任何时间点，服务器都必须拥有仲裁，因此至少两台服务器必须能够相互连接。


  首先，假设主体服务器和见证服务器失去了与镜像服务器的连接。主体和见证服务器仍然拥有仲裁，因此主体服务器继续在 `SUSPENDED` 状态下进行镜像工作。如果在此阶段主体服务器失去了与见证服务器的连接，因此没有仲裁，主体服务器将关闭。


  > **提示**

  >

  > 考虑将见证实例放置在靠近主体服务器的位置，以避免它们之间的连接问题以及不必要的故障转移和关闭。当服务器重新联机时，将故障转移回靠近见证实例的前主体服务器也是有益的。


  现在，假设主体服务器脱机。在这种情况下，镜像和见证服务器可以相互看见，因此拥有仲裁，于是发生自动故障转移，镜像服务器成为新的主体服务器。如果旧的主体服务器重新上线并看到这两台服务器，它将成为镜像服务器并与新的主体服务器同步自身。否则，它将自行关闭以避免
  *脑裂* 情况，即两台不同的服务器允许客户端连接到同一数据库的不同副本，并同时更改数据。


  如果见证服务器脱机，镜像将继续工作，但无法执行自动故障转移。这类似于高保护模式，不同之处在于，如果主体服务器失去与镜像服务器的连接，而见证服务器又不可用，主体服务器将关闭以避免脑裂情况。


  '
- '# 第 32 章 ■ 高可用性技术


  在高保护模式下，`主服务器`与`镜像服务器`之间的连接丢失不会导致`主服务器`停止工作。如果`主服务器`宕机，您必须执行手动故障转移，使`镜像服务器`成为新的`主服务器`。但有一个注意事项。如果您执行了手动故障转移，而在某个时刻，`主服务器`在没有连接到前`镜像服务器`的情况下重新上线，它将继续作为`主服务器`运行，这就产生了脑裂情况。


  `.Net SQL 客户端`在连接到`主服务器`时会自动获取并缓存`镜像服务器`名称。如果在缓存了`镜像服务器`名称之后发生故障转移，客户端应用程序将能够重新连接到已成为新`主服务器`的`镜像服务器`。但是，如果故障转移发生在缓存`镜像服务器`名称之前，应用程序将无法连接到前`主服务器`，而该服务器现在作为`镜像服务器`运行，并将数据库保持在`RESTORING`状态。应用程序将无法获取关于新`主服务器`的信息，因此无法连接到数据库。


  您可以通过在一个额外的连接字符串属性`Failover Partner`中指定`镜像服务器`名称来避免这种情况。仅当`SQL 客户端`无法连接到`主服务器`时，它才会尝试连接到在此属性中指定的服务器。当`主服务器`在线时，`SQL
  客户端`会忽略此属性中指定的`镜像服务器`名称，并缓存从`主服务器`检索到的`镜像服务器`名称。


  删除数据库镜像时需要小心。只有当`SQL 客户端`运行在连接字符串的`Server Name`属性所指定的服务器上时，它才能在镜像被删除后连接到数据库。如果它运行在被指定为`Failover
  Partner`的服务器上，您将会得到一个`"Database is not configured for database mirroring"`错误。


  数据库镜像故障转移通常比故障转移群集故障转移更快。与重启整个`SQL Server`实例的故障转移群集不同，数据库镜像对单个数据库执行崩溃恢复。然而，故障转移过程的实际持续时间取决于重做队列的大小以及需要重放的日志记录数量。


  `PARTNER TIMEOUT`数据库设置控制数据库镜像故障转移检测时间，默认为十秒。您可以使用`ALTER DATABASE SET PARTNER TIMEOUT`命令更改此设置。


  ```sql

  ALTER DATABASE SET PARTNER TIMEOUT

  ```


  如果`主服务器`和`镜像服务器`之间的网络延迟较高，例如服务器位于不同数据中心和/或在云中时，增加此设置是有益的。另一个应该增加此设置的例子是，当您使用一个`SQL
  Server`故障转移群集实例作为数据库镜像伙伴之一来设置数据库镜像时。群集故障转移过程通常超过十秒，保持默认的`PARTNER TIMEOUT`设置可能会触发不必要的数据库镜像故障转移。您应将`PARTNER
  FAILOVER`值设置为大于典型的群集故障转移时间。


  `镜像服务器`上的数据库保持在`RESTORING`状态；因此，客户端无法访问它。但是，可以在`镜像服务器`上创建一个只读数据库快照，以便您可以出于报告目的访问它。此快照代表了`主服务器`上最后一个`CHECKPOINT`时刻的数据库状态。


  **注意：** 数据库快照的涵盖范围超出了本书的范围。您可以在 `http://technet.microsoft.com/en-us/library/ms175158.aspx`
  阅读更多关于此主题的内容。


  数据库镜像在 `SQL Server 2012` 中已被弃用。`AlwaysOn 可用性组`是一项非常出色的功能



  '
- '# 高可用性技术


  ## 数据库镜像的替代方案


  基本可用性组是数据库镜像的替代方案；但是，在 SQL Server 2012 和 2014 中，它们仅包含在企业版中。


  另一方面，SQL Server 2016 的标准版支持*基本可用性组*，它允许你创建一个类似数据库镜像的单数据库、双服务器副本。然而，基本可用性组支持异步提交，这与数据库镜像的情况不同。


  **注意** 你可以在以下网址阅读更多关于数据库镜像的信息：[`technet.microsoft.com/en-us/library/ms189852.aspx`](http://technet.microsoft.com/en-us/library/ms189852.aspx)。


  ## AlwaysOn 可用性组


  与数据库镜像相反，AlwaysOn 可用性组需要并依赖 Windows Server 故障转移集群 (WSFC)。虽然这使得它们的基础设施和设置相比数据库镜像更为复杂，但它也简化了客户端应用程序的部署。它们可以通过*监听器*连接到
  AlwaysOn 可用性组，该监听器以类似于 SQL Server 故障转移集群的方式虚拟化一个 SQL Server 实例。


  AlwaysOn 可用性组由一个具有读/写访问权限的主节点（或副本）组成。在企业版中，使用 SQL Server 2012 最多可以有四个辅助节点，使用 SQL
  Server 2014–2016 最多可以有八个辅助节点。可用性组中的三个节点可以使用同步提交。你需要两个节点才能支持自动故障转移。正如我已经提到的，SQL Server
  2016 的标准版支持双节点基本可用性组。


  图 32-7 展示了一个包含三个节点的 AlwaysOn 可用性组配置示例。


  ![](img/index-656_1.jpg)


  **图 32-7.** AlwaysOn 可用性组


  事实上，可用性组可以只包含一个主节点。这种行为有助于将可用性组基础设施与应用程序抽象分离。例如，在部署的初始阶段，你可以建立一个单节点可用性组并创建一个监听器，以虚拟化一个
  SQL Server 实例。之后，系统管理员可以在不担心可用性组基础设施状态的情况下开始更改连接字符串，同时你可以在那里添加其他节点。


  另一个有用的例子是更改需要单用户访问权限的数据库选项，例如启用 `READ COMMITTED SNAPSHOT` 隔离级别。在启用数据库镜像的情况下，无法将数据库切换到
  `SINGLE_USER` 模式。你可以移除数据库镜像并在之后重新建立，尽管你需要检查所有连接字符串，确保主服务器始终被指定为*服务器*而不是*故障转移伙伴*。然而，AlwaysOn
  可用性组允许你移除所有辅助节点，而无需担心连接字符串。虽然仍然无法将参与 AlwaysOn 可用性组的数据库切换到 `SINGLE_USER` 模式，但你可以将数据库从可用性组中移除，更改数据库选项，并在几秒钟内将数据库添加回可用性组，对客户端应用程序的影响最小。


  与在单数据库范围内工作的数据库镜像不同，AlwaysOn 可用性组可以包含多个数据库。这保证了组中的所有数据库将一起故障转移，并且始终具有相同的主节点。当系统需要多个数据库驻留在同一服务器上才能运行时，这种行为很有帮助。


  AlwaysOn 可用性组允许对辅助节点进行只读访问，并允许你从中执行数据库备份。此外，应用程序可以在连接字符串中指定它只需要只读访问，AlwaysOn 可用性组会自动将其路由到一个可读的辅助节点。




  '
- '# 第 32 章 ■ 高可用性技术


  ## ■ **注意**

  您可以阅读有关客户端连接到 AlwaysOn 可用性组的文档，网址为 [`technet.microsoft.com/en-us/library/hh510184.aspx`](http://technet.microsoft.com/en-us/library/hh510184.aspx)。


  这种行为有助于减少主服务器的负载，尽管您需要小心并始终监视重做队列的大小。辅助副本上的 REDO 进程很可能落后，从而向客户端提供非最新且与主节点数据库不同的数据。同样重要的是要记住，在此类条件下，故障转移过程可能需要很长时间。即使使用同步提交不会有任何数据丢失，但在崩溃恢复过程完成之前，数据库将不可用。


  ![](img/index-657_1.jpg)


  对于可读辅助副本，您还应小心处理 SQL Server Agent 作业。作业能够访问可读辅助副本上的数据库并从那里读取数据。这可能导致同一作业在多个节点上运行的情况，即使您希望它们只在主节点上运行。


  作为解决方案，在 SQL Server 2014 及更高版本中，您可以使用`sys.fn_hadr_is_primary_replica`函数，该函数为您提供副本的状态。在
  SQL Server 2012 中，您可以检查可用性组中某个数据库的`sys.dm_hadr_availability_replica_states`视图的`Role_Desc`列，以检查和验证节点是否为主副本。您可以在每个作业中使用它，或者，创建另一个每分钟运行一次的作业，并根据节点的状态启用或禁用作业。


  您可以将运行在 Microsoft Azure 云中虚拟机内的 SQL Server 实例作为可用性组的成员。这可以帮助您为高可用性解决方案添加另一个地理冗余节点。但是，您需要小心处理这种方法，并确保基于云的
  SQL Server 实例能够处理负载。


  互联网连接是另一个需要考虑的因素。它应具有足够的带宽来传输日志记录，并且足够稳定，以便大部分时间保持 Microsoft Azure 节点在线和连接。请记住，当连接中断时，事务日志不会被截断，并且有些记录尚未传输到辅助节点。


  AlwaysOn 可用性组为数据库镜像提供了一个很好的替代方案。不幸的是，此功能在 SQL Server 2012-2014 的标准版中不受支持。


  ## ■ **注意**

  您可以阅读有关 AlwaysOn 可用性组的文档，网址为 [`technet.microsoft.com/en-us/library/hh510230.aspx`](http://technet.microsoft.com/en-us/library/hh510230.aspx)。


  #### 日志传送


  *日志传送*允许您在一个或多个辅助服务器上维护数据库的副本。简而言之，日志传送是一个非常简单的过程。您根据某种计划执行日志备份，将这些备份文件复制到共享位置，然后在一个或多个辅助服务器上还原它们。可选地，您可以有一台单独的服务器来监视日志传送过程，保留有关备份和还原操作的信息，并在需要关注时发送警报。


  **图 32-8.** 日志传送


  日志传送不能防止数据丢失。日志备份是按计划执行的，如果主服务器上的事务日志损坏，您将丢失自上次日志备份以来的所有更改。


  日志传送通常与其他高可用性技术一起使用。一种常见的场景是将其与故障转移集群实例结合使用，将日志传送到远程异地位置的辅助服务器。这以较低的实现成本为系统中的数据层提供了地理冗余。



  **第 32 章 高可用性技术**


  日志传送在你故意不希望备用服务器上拥有最新数据的情况下也很有用。这可以帮助你从主服务器上的意外删除操作中恢复数据。


  日志传送不提供自动故障转移支持。手动故障转移包含几个步骤。

  ```

  首先，你需要将用户与数据库断开连接，并且可能需要将数据库切换到 `RESTRICTED_USER` 或 `SINGLE_USER` 模式，以避免在故障转移过程中发生客户端连接。

  接下来，你需要备份主服务器上剩余的日志部分。如果你预计稍后要故障恢复回主服务器，在备份时使用 `NORECOVERY` 选项可能是有益的。

  最后，你应该在备用服务器上应用所有剩余的日志备份，并恢复数据库以使其上线。显然，你还应将连接字符串更改为指向新的服务器。

  ```


  备用服务器将数据库保持在 `RESTORING` 状态，阻止客户端访问它。你可以通过使用 `STANDBY` 选项来解决此问题，该选项为你提供对数据库的只读访问权限。但是，在日志备份被还原所需的时间内，客户端将失去连接。你还应考虑
  `SQL Server` 许可模式，该模式要求你在服务器用于支持高可用性以外的任何用途时购买另一个许可证。


  你应该设计日志传送策略和备份计划，以避免当日志备份通过网络传输且还原速度慢于生成速度时出现积压。


  确保你用于备份存储的共享位置有足够的空间来容纳你的备份文件。如果你的 `SQL Server` 版本和版本支持备份压缩，并且你有足够的 `CPU` 资源来处理压缩开销，那么使用备份压缩可以减少存储大小和传输时间，并提高备份和还原过程的性能。


  日志传送可能是设置和维护最简单的解决方案。同样常见的是，人们会看到类似日志传送的自定义实现，允许你实现额外的业务需求并解决原生 `SQL Server` 日志传送的限制。然而，你应该牢记可能的数据丢失，并考虑如果这种数据丢失是不可接受的或者需要自动故障转移，则将其与其他技术结合使用。


  ### 注意

  你可以在 [`technet.microsoft.com/en-us/library/ms187103.aspx`](http://technet.microsoft.com/en-us/library/ms187103.aspx)
  阅读有关日志传送的更多信息。


  #### 复制


  与本章已经讨论过的其他技术相比，复制远不止是一种高可用性解决方案。复制的主要目标是在多个数据库之间复制和拷贝数据。尽管它可以用作高可用性技术，但这几乎不是其主要目的。


  复制在出版物的范围内工作，出版物是数据库对象的集合。如果你只想保护数据库中数据的子集（例如，几个关键表），复制是一个不错的选择。复制与其他高可用性技术之间的另一个关键区别是，复制允许你实现一种可以在多个地方修改数据的解决方案。这可能需要实现复杂的冲突检测机制，并且在某些情况下可能对性能产生负面影响，尽管在某些场景下这是值得付出的小代价。


  ![](img/index-659_1.jpg)


  `SQL Server` 中有三种主要的复制类型，如下所示：


  快照复制根据某个计划生成和分发数据的快照。这可能有用的一种情况是一组表基于计划进行更新，也许每周一次。你可以考虑使用



  快照复制用于在这些表更新后分发数据。


  另一个例子涉及一个具有高度易变数据的小表。在这种情况下，当你不需要在辅助服务器上拥有数据的最新副本时，与其他复制类型相比，快照复制的开销要小得多。


  `合并复制`允许你在多个服务器之间复制和合并更改，例如在那些服务器彼此不经常连接的场景中。一个可能的例子是一家拥有中央服务器和分支办公室独立服务器的公司。数据可以在每个分支办公室更新，并使用合并复制在服务器之间合并/分发。不幸的是，合并复制需要更改数据库模式并使用触发器，这可能会引入性能问题。


  `事务复制`允许你在不同服务器之间以相对较低的延迟（通常在几秒钟内）复制更改。默认情况下，称为`订阅者`的辅助服务器是只读的，尽管你可以选择在那里更新数据。事务复制的一种特殊类型，称为`点对点复制`，可在
  SQL Server 的企业版中使用，它允许你构建一个解决方案，其中包含托管在不同服务器上的多个可更新数据库，并在它们之间复制数据。


  事务复制是最适合作为可更新数据的高可用性技术的复制类型。`图 32-9` 说明了事务复制中使用的组件。


  称为`发布者`的主服务器由一个称为`日志读取器代理`的特殊作业访问，该作业不断扫描配置为复制的数据库的事务日志，并收集代表出版物中更改的日志记录。这些日志记录被转换为逻辑操作（`INSERT`、`UPDATE`、`DELETE`），并存储在另一个`分发数据库`中，该数据库通常位于运行`日志读取器代理`作业的另一个称为`分发者`的服务器上。最后，分发者要么将这些更改推送给订阅者，要么根据复制配置，订阅者从分发者那里拉取它们。


  `图 32-9. 使用推送订阅的事务复制`


  ![](img/index-660_1.jpg)


  '
- '# 第 32 章 ■ 高可用性技术


  `点对点复制`（如`图 32-10`所示）允许你构建一个分布式且可扩展的解决方案，其中包含驻留在不同服务器（称为`节点`）上的多个可更新数据库。它是企业版的一项功能，基于事务复制，因此在节点之间分发更改的延迟非常低。它适用的一个场景是具有多个数据中心的系统。你可以在每个数据中心托管单独的
  SQL Server 实例，并将客户端重定向到最近的实例。点对点复制在所有节点之间同步数据，并处理某个节点暂时失去与其他节点连接的情况。


  `图 32-10. 点对点复制`


  复制最大的缺点是其复杂性。设置和监控复杂的复制拓扑结构，迄今为止比其他高可用性解决方案要复杂得多。此外，它通常需要实现复杂的冲突解决机制，并且可能需要更改应用程序逻辑和数据库模式以最小化冲突。


  我建议避免将复制用于高可用性目的，除非你需要保护数据库中非常小的一部分数据，或者有其他除了高可用性之外也能从复制中受益的用例。


  ■ **注意** 你可以在 `http://technet.microsoft.com/en-us/library/ms151198.aspx` 阅读更多关于复制的信息



  #### 设计高可用性策略


  ## 第 32 章 ■ 高可用性技术


  设计高可用性策略的过程融合了艺术、科学与政治。这是一个收集并经常调整需求、设定合理预期、并构建符合预算的解决方案的迭代过程。


  *需求收集*是该过程的第一阶段。如同备份策略一样，你需要处理 `RPO` 和 `RTO` 指标。通常，你可以从服务等级协议（`SLA`）中获得它们。或者，如果这些指标未出现在
  `SLA` 中，你应该与系统的利益相关者共同定义它们。


  > **注意**

  > 系统可用性需求通常以"九的个数"来衡量。例如，`五个九` ，即 99.999%的可用性，意味着系统应在 99.999%的时间内可用，相当于每年 5.26 分钟的停机时间。`四个九`
  ，即 99.99%的可用性，相当于每年 52.56 分钟的停机时间。`三个九` ，即 99.9%的可用性，允许每年 8.76 小时的停机时间。


  与利益相关者协作是一个微妙的过程。虽然利益相关者通常希望零停机和零数据丢失，但这既在技术上不可行，在财务上也不可行。例如，现有的高可用性技术都无法提供零停机。在故障转移过程中，总有一段时间系统是无法访问的。


  另一方面，零数据丢失是可以实现的，但这需要付出代价。数据库镜像或 `AlwaysOn 可用性组` 中的同步提交会给修改数据的事务增加开销和额外延迟。在某些情况下，对于高端
  `OLTP` 系统，这种开销是不可接受的。


  无论哪种情况，预算都是另一个需要考虑的关键因素。实施高可用性策略总会导致额外支出。在大多数情况下，你需要购买新的服务器、软件许可证以及网络和存储设备。这些采购反过来又需要额外的机架空间，并为新硬件及其空调消耗更多
  `AC` 电力。此外，你还需要有可用的人力来实施和维护该解决方案。


  预算限制了你能实现的目标。如果预算不允许你购买所需的硬件和软件许可证，那么实现 99.999%甚至 99.99%的可用性是不可能的。你应该与系统的利益相关者合作，根据需要调整需求和预期，或争取额外的预算。


  另一个重要的行动是定义高可用性解决方案的范围。例如，明确所需的可用性水平是需要全天候达到，还是仅在营业时间达到，这一点非常重要。另一个需要解决的重要问题是解决方案是否应具备地理冗余。该要求可能极大地增加解决方案的复杂性和成本。


  在收集并分析所有需求（包括预算限制）之前，切勿开始实施，这一点至关重要。综合起来，这些需求将决定你能够在实施中使用哪种或哪些技术。


  表 32-2 比较了 `SQL Server` 不同版本和版本中可用的高可用性技术。


