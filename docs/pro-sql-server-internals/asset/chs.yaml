- "# 备份数据库\n\n你可以使用 Management Studio 界面、T-SQL、PowerShell 以及第三方工具来备份和还原数据库。本章我们将重点讨论\
  \ T-SQL 的实现方式。\n\n### 清单 31-1：执行完整数据库备份\n\n执行完整数据库备份的 T-SQL 语句使用 `BACKUP DATABASE`\
  \ 命令，并以磁盘作为目标。\n\n```sql\nbackup database OrderEntryDb\nto disk = N'e:\\backups\\\
  OrderEntry.bak'\nwith format, init,\n    name = N'OrderEntryDb-Full Database Backup',\n\
  \    stats = 5, checksum, compression;\n```\n\n## 第 31 章：备份与还原\n\nSQL Server 允许你在单个文件中存储备份集。然而，使用这种方法时必须非常小心。虽然它减少了磁盘上的文件数量并简化了管理，但可能会覆盖现有备份并导致备份链失效。\n\
  \n你的备份位置设计应考虑在发生灾难时，需要通过网络复制的数据量应尽可能减少。不要将来自不同日志链的备份存储在同一个文件中。此外，不要将差异备份与其他冗余的差异备份和/或日志备份存储在一起。这既能减小备份文件的大小，也能在灾难发生时减少通过网络复制文件所需的时间。\n\
  \n`FORMAT` 和 `INIT` 选项告知 SQL Server 覆盖备份文件中的所有现有备份。\n\n`CHECKSUM` 选项强制 SQL Server\
  \ 验证数据页上的校验和，并为备份文件生成校验和。这有助于验证数据页在保存到磁盘后未被 I/O 子系统损坏。但是，此选项不应替代使用 `DBCC CHECKDB`\
  \ 命令进行的常规数据库一致性检查。`BACKUP WITH CHECKSUM` 不测试数据库对象和分配映射页的完整性，也不测试那些没有生成 `CHECKSUM`\
  \ 的页。\n\n最后，`COMPRESSION` 选项强制 SQL Server 压缩备份。备份压缩可以显著减小备份文件的大小，尽管在备份和还原过程中会使用更多的\
  \ CPU 资源。建议使用备份压缩，除非系统 CPU 负载极高，或者数据库已加密。在后一种情况下，备份压缩不会带来任何空间节省。\n\n备份压缩在 SQL Server\
  \ 2008R2 及以上版本的企业版和标准版，以及 SQL Server 2008 的企业版中可用。值得一提的是，每个版本的 SQL Server 都可以还原压缩的备份。\n\
  \n> **注意**：你可以在 [`technet.microsoft.com/en-us/library/ms186865.aspx`](http://technet.microsoft.com/en-us/library/ms186865.aspx)\
  \ 查看所有可用的 `BACKUP` 命令选项。\n\n### 清单 31-2：执行差异数据库备份\n\n你可以使用 `DIFFERENTIAL` 选项来执行差异备份。\n\
  \n```sql\nbackup database OrderEntryDb\nto disk = N'e:\\backups\\OrderEntry.bak'\n\
  with differential, noformat, noinit,\n    name = N'OrderEntryDb-Differential Database\
  \ Backup',\n    stats = 5, checksum, compression;\n```\n\n现在，我们的备份文件 `OrderEntry.bak`\
  \ 包含两个备份：一个 `FULL`（完整）备份和一个 `DIFFERENTIAL`（差异）备份。最后，清单 31-3 展示了如何通过将其放入另一个文件来执行事务日志备份。\n\
  \n### 清单 31-3：执行事务日志备份\n\n```sql\nbackup log OrderEntryDb\nto disk = N'e:\\backups\\\
  OrderEntry.trn'\nwith format, init,\n    name = N'OrderEntryDb-Transaction Log Backup',\n\
  \    stats = 5, checksum, compression;\n```\n\n你必须被授予 `BACKUP DATABASE` 和 `BACKUP\
  \ LOG` 权限才能执行备份操作。默认情况下，这些权限授予 `sysadmin` 服务器角色、`db_owner` 和 `db_backupoperator`\
  \ 数据库角色的成员。此外，SQL Server 启动账户应该具有足够的\n\n\n\n向指定位置写入备份文件的权限。\n\n"
- '# 第 31 章 ■ 备份与还原


  你可以指定多个目标备份文件，并允许 SQL Server 将备份**条带化**分布到所有这些文件中。如果备份驱动器的 I/O 性能成为瓶颈，这可以提高备份以及后续还原操作的性能。


  `COPY_ONLY` 选项允许你在不中断日志链的情况下执行备份。该选项的一个可能用例是，当你需要将数据库副本迁移到开发环境中时。


  SQL Server 将关于服务器实例上每个备份和还原操作的信息，存储在 `msdb` 数据库中定义的一组表中。这些表的描述超出了本书的范围。你可以在在线丛书中阅读文章“备份历史记录和标头信息”来了解更多细节，网址为：[`msdn.microsoft.com/en-us/library/ms188653.aspx`](http://msdn.microsoft.com/en-us/library/ms188653.aspx)。


  最后，SQL Server 会将每个备份的信息写入错误日志文件。如果备份运行频繁，这可能会导致日志文件大小迅速膨胀。你可以使用跟踪标志 `T3226` 来禁用此行为。这会使错误日志更紧凑，但代价是需要查询
  `msdb` 来获取备份历史记录。


  ## 还原数据库


  你可以使用 `RESTORE DATABASE` 命令来还原数据库。你可以在代码清单 31-4 中看到此命令的实际示例。它在新的目的地还原 `OrderEntryDB`
  数据库（由 `MOVE` 选项控制此操作），并在之后应用差异备份和事务日志备份。


  ### 代码清单 31-4. 还原数据库


  ```sql

  -- 初始完整备份

  restore database OrderEntryDbDev

  from disk = N''C:\Backups\OrderEntry.bak'' with file = 1,

  move N''OrderEntryDB'' to N''c:\backups\OrderEntryDB.mdf'',

  move N''OrderEntryDB_log'' to N''c:\backups\OrderEntryDB_log.ldf'',

  norecovery, nounload, stats = 5;


  -- 差异备份

  restore database OrderEntryDbDev

  from disk = N''C:\Backups\OrderEntry.bak'' with file = 2,

  norecovery, nounload, stats = 5;


  -- 事务日志备份

  restore log OrderEntryDbDev

  from disk = N''C:\Backups\OrderEntry.trn''

  with nounload, norecovery, stats = 10;


  restore database OrderEntryDbDev with recovery;

  ```


  当备份文件存储了多个备份时，你应该使用 `WITH FILE` 选项来指定文件编号。正如我之前提到的，使用此方法时要小心，并确保你的备份例程不会意外覆盖文件中的现有备份。


  每个 `RESTORE` 操作都应指定一个数据库恢复选项。当使用 `RECOVERY` 选项还原备份时，SQL Server 会通过执行重做和撤销两个恢复阶段来恢复数据库，并使其可供用户使用。之后不能再还原其他备份。或者，`NORECOVERY`
  选项仅执行数据库恢复的重做阶段，并使数据库保持在 `RESTORING` 状态。这允许你从日志链中还原更多的备份。


  '
- '# 第 31 章 ■ 备份与还原


  `重要提示` 管理工具 (Management Studio) 中的用户界面默认使用 `RECOVERY` 选项。在管理工具中使用数据库还原界面时，请始终注意此设置。意外使用
  `RECOVERY` 选项将导致你需要从头开始重复还原过程，这对于大型数据库来说可能非常耗时。更安全的方法是始终使用 T-SQL `RESTORE` 命令并全程使用
  `NORECOVERY` 选项来还原所有备份。最后，你可以使用 `RESTORE DATABASE WITH RECOVERY` 命令（如代码清单 31-4 所示）来恢复数据库并使其联机。


  我们将在本章后面讨论如何在灾难后恢复数据库。现在，让我们介绍一些在还原过程中可以使用的有用选项。


  ## 还原到某个时间点




  '
- '# 第 31 章 ■ 备份与恢复


  你可以使用 `STOPAT` 选项将数据库恢复到某个特定时间点。该选项接受一个日期/时间值或变量作为参数，并将数据库恢复至该时刻的状态。或者，你也可以使用 `STOPATMARK`
  和 `STOPBEFOREMARK` 选项，它们允许你通过停在某个特定的 LSN（日志序列号）或命名事务来恢复数据库。


  这些选项的一个常见用例是恢复意外删除的对象。让我们看一下代码清单 31-5 中的示例，创建一个包含表 `dbo.Invoices` 的数据库，填充一些数据，并执行一次完整的数据库备份。


  ## 代码清单 31-5. 时间点恢复：数据库创建


  ```sql

  create database MyDB

  go

  create table MyDB.dbo.Invoices(InvoiceId int not null);

  insert into MyDB.dbo.Invoices values(1),(2),(3) ;

  go

  backup database MyDB

  to disk = N''c:\backups\MyDB.bak''

  with noformat, init,

  name = N''MyDB-Full Database Backup'', stats = 5;

  ```


  现在，假设有人意外地使用 `DROP TABLE dbo.Invoices` 命令删除了 `dbo.Invoices` 表。如果数据库处于活动状态，并且其他数据随时间已被修改，那么最佳操作是从备份中恢复数据库的另一个副本到该表被删除的时间点，然后将数据从新恢复的副本复制到原始数据库。


  作为恢复过程的第一步，让我们按代码清单 31-6 所示备份事务日志。显然，在真实系统中，你可能已经拥有覆盖表被删除时刻的日志备份。


  ## 代码清单 31-6. 时间点恢复：备份日志


  ```sql

  backup log MyDB

  to disk = N''c:\backups\MyDB.trn''

  with noformat, init,

  name = N''MyDB-Transaction Log Backup'', stats = 5;

  ```


  棘手的部分是找出表被删除的时间。你有一个选择是分析系统默认跟踪，它捕获了此类事件。你可以使用 `fn_trace_gettable` 系统函数，如代码清单 31-7
  所示。


  ## 代码清单 31-7. 时间点恢复：分析系统跟踪


  ```sql

  declare

  @TraceFilePath nvarchar(2000)

  select @TraceFilePath = convert(nvarchar(2000),value)

  from ::fn_trace_getinfo(0)

  where traceid = 1 and property = 2;

  select

  StartTime, EventClass

  ,case EventSubClass

  when 0 then ''DROP''

  when 1 then ''COMMIT''

  when 2 then ''ROLLBACK''

  end as SubClass

  ,ObjectID, ObjectName, TransactionID

  from ::fn_trace_gettable(@TraceFilePath, default)

  where EventClass = 47 and DatabaseName = ''MyDB''

  order by StartTime desc

  ```


  如图 31-2 所示，输出中有两行。其中一行对应对象被删除的时间。另一行则与事务提交的时间相关。


  ## 图 31-2. 默认系统跟踪的输出


  你可以使用输出中的时间来指定 `RESTORE` 命令的 `STOPAT` 参数，如代码清单 31-8 所示。也可以在 Management Studio 的数据库恢复
  UI 中执行时间点恢复。然而，该选项不允许你在 `STOPAT` 值中指定毫秒。


  ## 代码清单 31-8. 时间点恢复：使用 STOPAT 参数


  ```sql

  restore database MyDBCopy

  from disk = N''C:\Backups\MyDB.bak'' with file = 1,

  move N''MyDB'' to N''c:\db\MyDBCopy.mdf'',

  move N''MyDB_log'' to N''c:\db\MyDBCopy.ldf'',

  norecovery, stats = 5;

  restore log MyDBCopy

  from disk = N''C:\Backups\MyDB.trn'' with file = 1,

  norecovery, stats = 5,

  stopat = N''2016-03-10T06:21:27.697'';

  restore database MyDBCopy with recovery;

  ```


  虽然系统默认跟踪是一个非常简单的选项，但它也有一个缺点。跟踪中事件的时间不够精确，可能与你需要指定的时间相差几毫秒。




  作为 `STOPAT` 值。因此，无法保证你能恢复到删除时刻最新的表数据。此外，`DROP OBJECT` 事件可能已被覆盖，或者服务器上的跟踪功能可能已被禁用。


  针对此问题的一个变通方法是使用一个未公开的系统函数 `fn_dump_dblog`，它会返回事务日志备份文件的内容。你需要找到属于 `DROP TABLE` 语句的
  `LSN`，然后使用 `STOPBEFOREMARK` 选项来恢复数据库的一个副本。清单 31-9 展示了调用 `fn_dump_dblog` 函数的代码。图
  31-3 展示了查询的输出结果。


  ***清单 31-9.*** 时间点恢复：使用 `fn_dump_dblog` 函数


  ```sql

  select [Current LSN], [Begin Time], Operation,[Transaction Name], [Description]

  from fn_dump_dblog

  ( default, default, default, default, ''C:\backups\mydb.trn'',default, default,
  default

  ,default, default, default, default, default, default, default, default, default,
  default

  ,default, default, default, default, default, default, default, default, default,
  default

  ,default, default, default, default, default, default, default, default, default,
  default

  ,default, default, default, default, default, default, default, default, default,
  default

  ,default, default, default, default, default, default, default, default, default,
  default

  ,default, default, default, default, default, default, default, default, default,
  default )

  where [Transaction Name] = ''DROPOBJ'';

  ```


  ***图 31-3.** `fn_dump_dblog` 输出*


  清单 31-10 展示了一个使用上述输出中 `LSN` 的 `RESTORE` 语句。你应该在 `STOPBEFOREMARK` 参数中指定 `lsn:0x`
  前缀。这告诉 SQL Server 你使用的是十六进制格式的 `LSN`。


  ***清单 31-10.*** 时间点恢复：使用 `STOPBEFOREMARK` 参数


  ```sql

  restore log MyDBCopy

  from disk = N''C:\Backups\MyDB.trn''

  with file = 1, norecovery, stats = 5,

  stopbeforemark = ''lsn:0x 00000024:00000178:0001'';

  ```


  分析事务日志记录是一项繁琐且耗时的工作。然而，它能提供最准确的结果。此外，当数据因 `DELETE` 语句被意外删除时，你可以使用这种技术。此类操作不会被系统默认跟踪记录，分析事务日志内容是唯一可用的选择。幸运的是，有一些第三方工具可以简化在日志中搜索操作
  `LSN` 的过程。


  '
- '# 第 31 章 ■ 备份与恢复


  ## 使用 STANDBY 进行恢复


  当你使用 `NORECOVERY` 选项完成恢复过程后，数据库将保持在 `RESTORING` 状态，并且对用户不可用。`STANDBY` 选项允许你以只读模式访问数据库。


  如前所述，SQL Server 在恢复过程的最后一步执行恢复的重做阶段。恢复的撤消阶段则会延迟，直到使用 `RECOVERY` 选项调用恢复时才会执行。`STANDBY`
  选项强制 SQL Server 使用一个临时的*撤消文件*来执行撤消阶段，该文件用于存储撤消过程中生成的补偿日志记录。这些补偿日志记录不会成为数据库事务日志的一部分，如果需要，你可以恢复额外的日志备份或恢复数据库。


  清单 31-11 展示了 `RESTORE WITH STANDBY` 操作符的用法。值得一提的是，在此模式下不应指定 `RECOVERY`/`NORECOVERY`
  选项。


  ***清单 31-11.*** 使用 `STANDBY` 选项进行恢复


  ```sql

  restore log MyDBCopy

  from disk = N''C:\Backups\MyDB.trn''

  with file = 1, stats = 5,

  standby = ''C:\Backups\undo.trn'';

  ```


  `STANDBY` 选项可以与时间点恢复结合使用。这可以帮助你在需要确定用于 `STOPBEFOREMARK` 选项的 `LSN` 时避免不必要的恢复操作。设想一种情况，日志文件中有多个
  `DROP OBJECT` 事务，而你不知道哪一个...



  '
- '# 第 31 章 ■ 备份与恢复


  #### 设计备份策略


  假设你误删了希望恢复的表。这种情况下，你可以结合使用 `STOPBEFOREMARK` 和 `STANDBY` 选项执行多次恢复，并查询数据库，直到找到正确的恢复点。


  或者，你可以将 `STANDBY` 选项与 `STOPAT` 结合使用，以分析特定时间点的数据库状态。


  每个生产系统都有两个影响和塑造备份策略实施的要求。


  第一个是 `恢复点目标`，它规定了在灾难情况下可接受的数据丢失量。第二个要求是 `恢复时间目标`，它定义了恢复过程可接受的停机时间。


  `RPO` 和 `RTO` 指标通常包含为系统定义的服务级别协议中。当 `RPO` 和 `RTO` 未正式记录时，你可以通过与利益相关者面谈并收集他们期望的信息来确定它们。


  非技术利益相关者在定义 `RPO` 和 `RTO` 要求时，常常抱有不切实际的期望。他们经常要求零数据丢失和零系统停机。在现实生活中，保证或实现这样的目标是不可能的。此外，非常小的
  `RPO`/`RTO` 会给服务器增加额外负载，并且通常不切实际且实施成本高昂。你的职责是教育利益相关者，并与他们合作，根据业务需求定义现实的 `RPO` 和
  `RTO`。


  `RPO` 决定了数据库应使用的恢复模式。表 31-1 显示了在假设备份文件可用且备份链完整的前提下，不同数据库恢复模式下可能的数据丢失和恢复点。显然，如果数据和日志文件都损坏，无论使用哪种恢复模式，恢复最后一次备份都是唯一的选择。


  ### 表 31-1. 基于数据库恢复模式的数据丢失情况


  | 恢复模式 | 描述 | 数据文件损坏 | 日志损坏 |

  | :--- | :--- | :--- | :--- |

  | `SIMPLE` | 不支持日志备份。自上次完整或差异备份以来的更改必须重做。 | 数据库可以恢复到上次完整或差异备份的时间点。 | |

  | `FULL` | 所有操作均完整记录在事务日志中。 | 无数据丢失 | 自上次 `LOG` 备份以来的更改必须重做。 |

  | `BULK LOGGED` | 大容量复制操作被最小化记录。所有其他操作均完整记录。 | 如果自上次日志备份以来未发生大容量复制操作，则无数据丢失。否则，自上次
  `LOG` 备份以来的更改必须重做。 | |


  在 `SIMPLE` 恢复模式下，自上次完整或差异备份以来的所有更改都必须重做。因此，对于需要保护的易失性数据，此模型并非最佳选择。


  然而，当数据是静态的时，`SIMPLE` 恢复模型是完全可以接受的；例如，在数据仓库和/或报表系统中，这些系统的数据会根据某个计划刷新。你可以在每次数据刷新后执行完整数据库备份，从而使用
  `SIMPLE` 恢复模型。


  `SIMPLE` 恢复模型的另一个可能用例是，数据库中的数据可以轻松、快速地从其他来源重建。在这些情况下，你可以考虑使用此模型以避免事务日志维护。同样值得注意的是，处于
  `SIMPLE` 恢复模型的数据库不支持依赖于事务日志扫描的功能，例如数据库镜像、`AlwaysOn 可用性组`、日志传送等。


  `FULL` 和 `BULK LOGGED` 恢复模型对常规（非大容量复制）操作的日志记录方式彼此相同，并且具有相同的事务日志维护要求。尽管 `BULK LOGGED`
  恢复模型通过最小化日志记录提高了大容量复制操作的性能，但在数据文件损坏的情况下，它面临数据丢失的风险。因此，你应该避免使用 `BULK LOGGED` 恢复模型。尽管如此，你仍可考虑将数据库从
  `FULL` 恢复模型切换到 `BULK LOGGED` 恢复模型



  '
- '# 第 31 章 ■ 备份与还原


  在批量复制操作期间（例如，在重建索引期间），数据库的恢复模型会临时切换为 `SIMPLE`，操作完成后再切换回 `FULL` 恢复模型。


  ### ■ 重要提示

  在数据库切换回 `FULL` 恢复模型后，应立即执行一次完整备份或日志备份。


  这两种恢复模型都无法在事务日志损坏时保持数据库的事务一致性。为最大限度地减少此类情况的发生，应将事务日志存储在高度冗余的磁盘阵列上。然而，没有任何解决方案是 100%冗余的。应定期进行日志备份，以最大程度地减少可能的数据丢失。*日志备份的频率有助于控制可能的数据丢失，并指示在事务日志损坏的情况下需要重做多少工作量*。


  例如，如果你每小时执行一次日志备份，那么在还原最后一个日志备份时，你最多只会丢失一个小时的工作量。


  ![](img/index-633_1.jpg)


  ### ■ 重要提示

  日志备份之间的间隔不应超过恢复点目标（RPO）要求所规定的时间。在设计备份策略时，还应考虑日志备份的持续时间。


  虽然基于 RPO 定义备份策略相对容易，但基于 RTO 则要棘手得多。RTO 规定了恢复过程的最大持续时间，也就是系统的停机时间。这段时间取决于几个因素，例如网络吞吐量（它决定了通过网络传输备份文件所需的时间），以及备份文件的大小和数量。此外，这个持续时间会随着数据库和负载的增长而变化。应定期测试数据库恢复过程，确保其仍然满足
  RTO 要求。


  图 31-4 展示了一个具有多个差异备份和日志备份的数据库的恢复场景。恢复过程的第一步是执行一个尾日志备份，该备份会备份自上次日志备份以来尚未备份的那部分事务日志。之后，你应该还原最近的一次完整备份、最近的一次差异备份，以及之后进行的所有日志备份，包括尾日志备份。


  ### 图 31-4. 恢复序列


  让我们假设图 31-4 中的示例表示一个数据库，其主文件组位于磁盘 `M:` 上，次要文件组位于磁盘 `N:` 上，事务日志位于磁盘 `L:` 上。所有备份文件都存储在磁盘
  `V:` 上。清单 31-12 展示了在灾难发生后（磁盘 `N:` 损坏且不可用）恢复数据库的脚本。次要文件组的数据文件被移动到磁盘 `M:`。在此示例中，`SQL
  Server` 必须重做从差异备份 `D2` 的时间点到故障发生时间点之间发生的所有数据修改。


  ### 清单 31-12. 灾难后恢复数据库


  ```

  -- 备份尾日志。数据库将保持在 RESTORING 状态

  backup log RecoveryDemo

  to disk = N''V:\RecoveryDemo-tail-log.trn''

  with no_truncate, noformat, init,

  name = N''RecoveryDemo-Tail-log backup'',

  norecovery, stats = 5;


  -- 还原完整备份，将文件从次要文件组移动到 M: 盘

  restore database RecoveryDemo

  from disk = N''V:\RecoveryDemo-F1.bak'' with file = 1,

  move N''RecoveryDemo_Secondary'' to N''M:\RecoveryDemo_Secondary.ndf'',

  norecovery, stats = 5;


  -- 还原差异备份

  restore database RecoveryDemo

  from disk = N''V:\RecoveryDemo-F2.bak'' with file = 1,

  norecovery, stats = 5;


  -- 还原 L5 日志备份

  restore log RecoveryDemo

  from disk = N''V:\RecoveryDemo-L5.trn'' with file = 1,

  norecovery, stats = 5;


  -- 还原 L6 日志备份

  restore log RecoveryDemo

  from disk = N''V:\RecoveryDemo-L6.trn'' with file = 1,

  norecovery, stats = 5;


  -- 还原尾日志备份

  restore log RecoveryDemo

  from disk = N''V:\RecoveryDemo-tail-log.trn'' with file = 1,

  norecovery, stats = 5;


  -- 恢复数据库

  ```




  '
- '# 第 31 章 ■ 备份与恢复


  ## 数据库恢复策略


  ```sql

  restore database RecoveryDemo with recovery;

  ```


  在恢复数据库时，可以采取多种恢复路径。除了刚才展示的方法，你还可以使用差异备份 `D1` ，并应用日志备份 `L3` – `L7` 以及尾日志备份。作为另一种选项，你可以在还原完整备份后，仅使用日志备份，完全不使用任何差异备份。然而，恢复过程所需的时间很大程度上取决于需要重放的事务日志记录量。差异备份有助于减少所涉及的时间量，并加快恢复过程。


  你应该设计一个备份策略，并找到完整的、差异的和日志备份的正确组合，以便能在 `RTO` 需求定义的时间内恢复数据库。这里的关键点是定义完整备份和差异备份的时间安排，因为日志备份的频率取决于
  `RPO` 和可能的数据丢失。


  ■ **提示** 记得启用 `即时文件初始化` ，这可以防止在恢复的数据库创建阶段将数据文件置零。


  你应该足够频繁地创建差异备份，以最小化在需要恢复时需要还原的日志备份数量和需要重放的日志记录量。然而，差异备份是累积的，你应该避免它们存储自上次完整备份以来被修改的大量数据的情况。在这种情况下，更频繁地执行完整备份会更好。


  ## 示例场景


  举例来说，考虑一个数据库，它从外部源收集一些数据，保留最近一周的数据，并使用滑动窗口模式实现每日清除。在这种模式下，每天有七分之一的数据在变化。


  假设每周进行一次完整备份，每天进行一次差异备份。如果完整备份的大小是 `1 TB`，那么差异备份将以每天 `140–150 GB` 的速度增长。在这种情况下，如果在上次完整备份后的第七天发生灾难，你需要先还原
  `1 TB` 的完整备份和大约 `850 GB` 的差异备份，然后才能应用日志备份，这非常耗时且冗余。在这种情况下，每天执行一次完整备份会高效得多。


  ## 备份与恢复的关键考量


  ### 备份文件位置


  备份文件的位置是影响恢复时间的另一个重要因素。通过网络复制大量数据可能非常耗时。在合适的情况下，请考虑保留备份文件的多个副本——异地、本地，甚至可能就在服务器本地。


  确保磁盘上有足够的可用空间来存储备份文件，并在备份失败时实现系统告警。请记住，失败的日志备份将阻止事务日志的截断，并会迫使事务日志增长。


  当快速的系统恢复至关重要时，你可以考虑将备份条带化分布在多个本地 `DAS` 驱动器上，之后将备份文件复制到其他服务器和异地位置。这将保护你免受各种类型的故障影响，并提供最佳的备份和恢复过程性能。


  ### 性能与压缩


  I/O 子系统和网络性能通常是备份和恢复期间最大的瓶颈。备份压缩有助于减少需要通过网络传输或从磁盘读取的数据量。如果数据库未加密，并且服务器能够处理压缩带来的额外
  CPU 负载，请始终使用备份压缩。


  你应该记住，备份压缩会影响备份和恢复操作的持续时间。SQL Server 会花费额外的时间来压缩和解压缩数据；然而，这可以通过更小的备份文件以及因此更少的通过网络传输和/或从磁盘读取的数据量来弥补。你需要在系统中启用备份压缩后，验证是否仍能实现
  `RTO`。




  '
- '# 第 31 章 ■ 备份与还原


  ## 部分数据库可用性与分段还原


  良好备份策略的关键要素之一是备份验证。仅仅备份数据库是不够的，您应确保备份文件未损坏，并且可以从它们还原数据库。您可以通过在另一台服务器上还原备份文件来验证其有效性。


  `提示` 在备份还原到另一台服务器后，您也可以运行 `DBCC CHECKDB` 来执行数据库一致性检查。这有助于降低生产服务器的负载。


  另一个确保备份安全的好做法是存储备份文件的冗余集。在进行新的差异备份后，不要删除包含旧差异备份和日志备份的备份文件。这样的策略可以帮助您在最近一次备份损坏时恢复数据库。


  最后，数据库并非存在于真空中。灾难后仅仅恢复数据库是不够的；它还必须能为客户端应用程序所用。备份和灾难恢复策略应纳入数据库生态系统中的其他要素，并支持在另一台
  SQL Server 上执行数据库还原。这些要素包括服务器登录名、SQL 作业、数据库邮件配置文件、`master` 数据库中的存储过程等。它们应与备份策略一起进行脚本化和测试。


  *部分数据库可用性*是企业版的一项功能，它允许您在灾难期间保持部分数据库处于联机状态，或者按文件组逐个还原数据库，从而逐个使这些文件组对用户可用。部分数据库可用性基于每个文件组工作，并要求
  `PRIMARY` 文件组和事务日志文件可用且在线。


  `提示` 不要将用户对象放在 `PRIMARY` 文件组中。这可以减小 `PRIMARY` 文件组的大小，并在灾难发生时缩短其还原所需的时间。


  部分数据库可用性在数据分区的情况下尤其有益。系统中的不同数据可能有不同的 RTO（恢复时间目标）要求。例如，当前关键操作数据的恢复时间要求以分钟计，而较早的历史数据恢复时间则以小时甚至天计，这种情况并不少见。分段还原允许您执行部分数据库快速还原，并使操作数据快速联机，而无需等待历史数据还原完成。


  ![](img/index-636_1.jpg)


  假设我们有一个数据库 `OrderEntryDB`，包含四个文件组：`Primary`、`Entities`、`OperationalData` 和 `HistoricalData`。`Primary`
  文件组位于 `M:` 驱动器上，`Entities` 和 `OperationalData` 位于 `N:` 驱动器上，`HistoricalData` 位于
  `S:` 驱动器上。清单 31-13 显示了该数据库的布局。


  ***清单 31-13.*** 部分数据库可用性：数据库布局


  ```sql

  create database OrderEntryDB

  on primary

  (name = N''OrderEntryDB'', filename = N''M:\OrderEntryDB.mdf''),

  filegroup Entities

  (name = N''OrderEntryDB_Entities'', filename = N''N:\OrderEntryDB_Entities.ndf''),

  filegroup OperationalData

  (name = N''OrderEntryDB_Operational'', filename = N''N:\OrderEntryDB_Operational.ndf''),

  filegroup HistoricalData

  (name = N''OrderEntryDB_Historical'', filename = N''S:\OrderEntryDB_Historical.ndf'')

  log on

  (name = N''OrderEntryDB_log'', filename = N''L:\OrderEntryDB_log.ldf'');

  ```


  在第一个示例中，假设 `S:` 驱动器损坏，`HistoricalData` 文件组变得不可用。让我们看看如何从该文件组恢复数据并将文件移动到另一个驱动器。


  第一步，如清单 31-14 所示，您需要将损坏的文件标记为脱机。此操作将终止所有数据库连接，尽管用户之后可以立即重新连接到数据库。


  ***清单 31-14.*** 部分数据库可用性：将文件标记为脱机


  ```sql

  alter database OrderEntryDb modify file(name = OrderEntryDB_Historical, offline);

  ```




  '
- '# 部分数据库可用性恢复流程


  此时，`HistoricalData` 文件组中的所有数据对用户都不可用。但是，用户仍然可以使用其他文件组中的数据。


  如果使用 清单 31-15 中所示的查询查询 `sys.database_files` 视图，您将看到 `HistoricalData` 文件组的数据文件处于
  `OFFLINE` 状态。图 31-5 显示了此状态。


  ***清单 31-15.*** 部分数据库可用性：查询文件状态


  ```sql

  select file_id, name, state_desc, physical_name

  from sys.database_files

  ```


  ***图 31-5.*** 部分数据库可用性：将一个文件标记为脱机后的数据文件状态

  ![](img/index-637_1.jpg)


  下一步，您应该进行一个尾日志备份，如 清单 31-16 所示。数据库是否仍然在线以及其他会话是否正在生成日志记录并不重要。`OrderEntryDB_Historical`
  文件已脱机，因此新生成的日志记录都不会应用于该文件中的数据。值得一提的是，在进行尾日志备份时不应使用 `NORECOVERY` 选项，因为 `NORECOVERY`
  会将数据库切换到 `RESTORING` 状态。


  ***清单 31-16.*** 部分数据库可用性：进行尾日志备份


  ```sql

  backup log OrderEntryDB

  to disk = N''V:\OrderEntryDB-tail-log.trn''

  with no_truncate, init,

  name = N''OrderEntryDB-Tail-log backup'';

  ```


  接下来，您应该从当前的日志链中恢复一个完整备份，并按 清单 31-17 所示恢复单个文件。


  ***清单 31-17.*** 部分数据库可用性：恢复完整备份


  ```sql

  restore database OrderEntryDB

  file = N''OrderEntryDB_Historical''

  from disk = N''V:\OrderEntryDB.bak'' with file = 1,

  move N''OrderEntryDB_Historical'' to N''P:\OrderEntryDB_Historical.ndf'',

  norecovery, stats = 5;

  ```


  如果您再次运行 清单 31-15 中显示文件状态的查询，您将看到 图 31-6 中所示的结果。只有一个文件将处于 `RESTORING` 阶段，而所有其他文件都将在线并可供用户使用。


  ***图 31-6.*** 部分数据库可用性：应用完整备份后的数据文件状态


  最后，您应该恢复所有其他差异备份和日志备份文件，最后恢复尾日志备份。这里不需要指定每个单独的文件。SQL Server 将仅恢复处于 `RESTORING` 状态的文件。实现此操作的代码如
  清单 31-18 所示。


  ***清单 31-18.*** 部分数据库可用性：恢复其他备份文件


  ```sql

  restore log OrderEntryDB

  from disk = N''V:\OrderEntryDB.trn'' with file = 1,

  norecovery, stats = 5;


  -- 恢复尾日志备份

  restore log OrderEntryDB

  from disk = N''V:\OrderEntryDB-tail-log.trn'' with file = 1,

  norecovery, stats = 5;


  restore database OrderEntryDB with recovery;

  ```


  ![](img/index-638_1.jpg)


  数据库已恢复，所有文件现在都在线，如 图 31-7 所示。


  ***图 31-7.*** 部分数据库可用性：恢复后的数据文件状态


  在 SQL Server 的非企业版中恢复单个文件时，您可以使用相同的动作序列，尽管在此过程中数据库会切换到 `RESTORING` 状态，并且用户将无法访问。


  当您希望对数据库执行分段恢复，使其按文件组逐个上线时，可以应用相同的技术。您可以使用一个 `RESTORE` 语句，指定文件组列表，并使用 `PARTIAL`
  选项。清单 31-19 展示了如何对 `Primary`、`Entities` 和 `OperationalData` 文件组执行分段恢复。


  ***清单 31-19.*** 分段文件组恢复：恢复 Primary、Entities 和 OperationalData 文件组


  ```sql

  restore database OrderEntryDB

  filegroup=''Primary'', filegroup=''Entities'', filegroup=''OperationalData''

  ```




