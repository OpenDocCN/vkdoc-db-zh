- "# 第 29 章 ■ 查询存储\n\n#### 使用场景\n\n执行次数、CPU 时间、调用持续时间、逻辑与物理 I/O 统计信息、事务日志使用情况、并行度、内存授予大小以及其他一些有用的指标信息。你可以在\
  \ [`msdn.microsoft.com/en-us/library/dn818158.aspx`](https://msdn.microsoft.com/en-us/library/dn818158.aspx)\
  \ 阅读更多信息。\n\n最后，查询存储允许你从内存中 OLTP 工作负载收集数据。当启用查询存储时，SQL Server 会自动为内存中 OLTP 对象收集查询、计划和优化统计信息，无需任何额外的配置更改。但是，运行时统计信息默认不被收集，你需要通过\
  \ `sys.sp_xtp_control_query_exec_stats` 存储过程显式启用此功能。\n\n请记住，收集运行时统计信息会引入开销，这可能会降低内存中\
  \ OLTP 工作负载的性能。同样重要的是要记住，SQL Server 不会持久化内存中 OLTP 运行时统计信息的收集设置，该设置将在 SQL Server\
  \ 重启后被禁用。\n\n■ **注意** 我们将在本书第八部分详细讨论内存中 OLTP。\n\nSQL Server 为你提供了一套丰富的工具，可以在 `SSMS`\
  \ 和 `T-SQL` 中使用查询存储。让我们详细看看它们。\n\n作为第一步，让我们收集一些数据并模拟因参数嗅探导致的性能回归。我将使用第 26 章清单 26-1\
  \ 和 26-2 中定义的表和存储过程，如清单 29-1 所示，在两个会话中调用它们。\n\n![](img/index-597_1.jpg)\n\n***清单\
  \ 29-1.*** 模拟因参数嗅探导致的性能回归\n\n```sql\n-- 会话 1\nwhile 1 = 1\nbegin\n    exec dbo.GetAverageSalary\
  \ @Country='USA';\n    waitfor delay '0:00:01.000';\nend;\n\n-- 会话 2\ndbcc freeproccache;\n\
  exec dbo.GetAverageSalary @Country='CANADA';\n```\n\n## 在 SSMS 中使用查询存储\n\n在数据库中启用查询存储后，你可以在对象资源管理器中看到\
  \ `查询存储` 文件夹，如图 29-5 所示。此文件夹包含四个交互式报表，允许你分析收集的数据、强制查询的执行计划以及执行其他一些操作。\n\n***图 29-5.**\
  \ 对象资源管理器中的查询存储文件夹*\n\n如图 29-6 所示的 `回归查询` 报表，显示了随时间性能回归的查询。你可以配置回归标准和分析的时间范围，以及其他几个参数。\n\
  \n![](img/index-598_1.jpg)\n\n***图 29-6.** 回归查询报表*\n\n你可以在左上方的图表中选择要显示的查询。报表的右上方部分展示了所选查询收集到的执行计划。你可以点击代表不同执行计划的点，并在底部查看它们。如果需要，还可以比较不同的执行计划。\n\
  \n`强制计划` 按钮允许你为查询强制执行选定的计划。它在内部调用 `sys.sp_query_store_force_plan` 存储过程。类似地，`取消强制计划`\
  \ 按钮通过调用 `sys.sp_query_store_unforce_plan` 存储过程来移除强制计划。\n\n回归查询报表是一个强大的工具，可用于排查系统中与参数嗅探相关的问题，并通过强制特定执行计划快速修复它们。\n\
  \n如图 29-7 所示的 `资源消耗最高的查询` 报表，允许你检测系统中资源消耗最密集的查询。简而言之，其工作方式类似于 `sys.dm_exec_query_stats`\
  \ 视图；但是，它没有该视图的限制，例如对计划缓存的依赖。该报表是一个绝佳工具，可帮助你快速识别系统中的优化目标。\n\n![](img/index-599_1.jpg)\n\
  \n"
- "# 第 29 章 ■ 查询存储\n\n## 图 29-7. 资源消耗最高的查询报告\n\n`Overall Resource Consumption`（总体资源消耗）报告向你展示了工作负载随时间间隔变化的统计信息和资源使用情况。它允许你检测和分析资源使用的峰值，并深入探究引发这些峰值的查询。图\
  \ 29-8 展示了该报告的输出。\n\n![](img/index-600_1.jpg)\n\n## 图 29-8. 总体资源消耗报告\n\n`Tracked\
  \ Queries`（已跟踪的查询）报告允许你监控单个查询的执行计划和统计信息。它提供的信息与`Regressed Queries`（性能回退的查询）和`Top\
  \ Resource Consuming Queries`（资源消耗最高的查询）报告类似，但范围限定在单个查询。图 29-9 对此进行了说明。\n\n![](img/index-601_1.jpg)\n\
  \n## 图 29-9. 已跟踪的查询报告\n\n### 通过 T-SQL 使用查询存储\n\n尽管 SSMS 提供了丰富的工具集来操作查询存储，但在某些情况下，使用\
  \ T-SQL 直接处理查询存储数据是有益的。让我们来看几个常见的适用场景。\n\n第一个非常常见的任务是，在选择后续性能优化目标时，查找资源消耗最密集的查询。在上一章中，你已经看到了如何从\
  \ `sys.dm_exec_query_stats` 视图获取执行统计信息。如你所记得的，该视图依赖于计划缓存，并且在分析过程中你经常需要与扩展事件进行交叉核对。查询存储可以为你提供类似的信息，且无需依赖任何计划缓存，这极大地简化了流程。\n\
  \n代码清单 29-2 展示了返回系统中最近 50 个 I/O 最密集查询信息的代码。如你所知，查询存储按时间区间聚合执行统计信息，因此你需要聚合来自多个 `sys.query_store_runtime_stats`\
  \ 行的数据。输出将包括过去 24 小时内结束的所有区间的数据，并按查询及其执行计划进行分组。\n\n#### 代码清单 29-2. 获取最昂贵查询的信息\n\n\
  ```sql\nselect top 50\n    q.query_id\n    , qt.query_sql_text\n    , qp.plan_id\n\
  \    , qp.query_plan\n    , sum(rs.count_executions) as [Execution Cnt]\n    , convert(int,\
  \ sum(rs.count_executions *\n        (rs.avg_logical_io_reads + avg_logical_io_writes))\
  \ /\n        sum(rs.count_executions)) as [Avg IO]\n    , convert(int, sum(rs.count_executions\
  \ *\n        (rs.avg_logical_io_reads + avg_logical_io_writes))) as [Total IO]\n\
  \    , convert(int, sum(rs.count_executions * rs.avg_cpu_time) /\n        sum(rs.count_executions))\
  \ as [Avg CPU]\n    , convert(int, sum(rs.count_executions * rs.avg_cpu_time)) as\
  \ [Total CPU]\n    , convert(int, sum(rs.count_executions * rs.avg_duration) /\n\
  \        sum(rs.count_executions)) as [Avg Duration]\n    , convert(int, sum(rs.count_executions\
  \ * rs.avg_duration))\n        as [Total Duration]\n    , convert(int, sum(rs.count_executions\
  \ * rs.avg_physical_io_reads) /\n        sum(rs.count_executions)) as [Avg Physical\
  \ Reads]\n    , convert(int, sum(rs.count_executions * rs.avg_physical_io_reads))\n\
  \        as [Total Physical Reads]\n    , convert(int, sum(rs.count_executions *\
  \ rs.avg_query_max_used_memory) /\n        sum(rs.count_executions)) as [Avg Memory\
  \ Grant Pages]\n    , convert(int, sum(rs.count_executions * rs.avg_query_max_used_memory))\n\
  \        as [Total Memory Grant Pages]\n    , convert(int, sum(rs.count_executions\
  \ * rs.avg_rowcount) /\n        sum(rs.count_executions)) as [Avg Rows]\n    , convert(int,\
  \ sum(rs.count_executions * rs.avg_rowcount)) as [Total Rows]\n    , convert(int,\
  \ sum(rs.count_executions * rs.avg_dop) /\n        sum(rs.count_executions)) as\
  \ [Avg DOP]\n    , convert(int, sum(rs.count_executions * rs.avg_dop)) as [Total\
  \ DOP]\nfrom\n    sys.query_store_query q\n    join sys.query_store_plan qp on q.query_id\
  \ = qp.query_id\n    join sys.query_store_query_text qt on q.query_text_id = qt.query_text_id\n\
  \    join sys.query_store_runtime_stats rs on qp.plan_id = rs.plan_id\n    join\
  \ sys.query_store_runtime_stats_interval rsi on rs.runtime_stats_interval_id = rsi.runtime_stats_interval_id\n\
  where\n```\n\n\n"
- "# 第 29 章 ■ 查询存储\n\n除了平均 I/O，你还可以选择不同的筛选标准。你也可以向查询的 `WHERE` 和/或 `HAVING` 子句添加谓词来缩小结果范围。例如，如果你想检测在\
  \ OLTP 环境中使用了并行的查询，然后对其进行优化或微调 `并行度成本阈值` 的值，可以添加通过 `DOP` 进行筛选。\n\n**重要提示** SQL Server\
  \ 2016 RTM 存在一个 bug，当 `sys.query_store_plan` 视图在同一语句中与其他视图联接时，有时会损坏其返回的执行计划的文本表示。你可以通过先获取\
  \ `plan_id`，然后在不涉及任何联接的情况下查询 `sys.query_store_plan` 视图来实现解决方法。此 bug 在某个 CU 版本中已修复。\n\
  \n## 清单 29-3. 获取有关性能回退的信息\n\n清单 29-3 返回过去 72 小时内发生的查询性能回退信息。它使用平均查询时长增加一倍作为回退标准，并为每个查询返回一行，包含具有最低和最高平均时长的计划。你可以使用输出中的\
  \ `query_id` 来对回退进行进一步分析。\n\n```sql\n;with Regressions(query_id, query_text_id,\
  \ plan1_id, plan2_id, plan1\n,plan2, dur1, dur2, row_num)\nas\n(\n    select\n \
  \       q.query_id, q.query_text_id, qp1.plan_id, q2.plan_id\n        ,qp1.query_plan,\
  \ q2.query_plan, rs1.avg_duration, q2.avg_duration\n        ,row_number() over (partition\
  \ by qp1.plan_id order by rs1.avg_duration)\n    from\n        sys.query_store_query\
  \ q join sys.query_store_plan qp1 on\n            q.query_id = qp1.query_id\n  \
  \      join sys.query_store_runtime_stats rs1 on\n            qp1.plan_id = rs1.plan_id\n\
  \        join sys.query_store_runtime_stats_interval rsi1 on\n            rs1.runtime_stats_interval_id\
  \ = rsi1.runtime_stats_interval_id\n        cross apply\n        (\n           \
  \ select top 1\n                qp2.query_plan, qp2.plan_id, rs2.avg_duration\n\
  \            from\n                sys.query_store_plan qp2\n                join\
  \ sys.query_store_runtime_stats rs2 on\n                    qp2.plan_id = rs2.plan_id\n\
  \                join sys.query_store_runtime_stats_interval rsi2 on\n         \
  \           rs2.runtime_stats_interval_id =\n                        rsi2.runtime_stats_interval_id\n\
  \            where\n                q.query_id = qp2.query_id and\n            \
  \    qp1.plan_id <> qp2.plan_id and\n                rsi1.start_time < rsi2.start_time\
  \ and\n                rs1.avg_duration * 2 <= rs2.avg_duration\n            order\
  \ by\n                rs2.avg_duration desc\n        ) q2\n    where\n        rsi1.start_time\
  \ >= dateadd(day,-3,getdate())\n)\nselect\n    r.query_id, qt.query_sql_text, r.plan1_id,\
  \ r.plan1, r.plan2_id, r.plan2\n    ,r.dur1, r.dur2\nfrom\n    Regressions r join\
  \ sys.query_store_query_text qt on\n        r.query_text_id = qt.query_text_id\n\
  where\n    r.row_num = 1\norder by\n    r.dur2 / r.dur1 desc;\n```\n\n## 清单 29-4.\
  \ 具有多个上下文设置的查询\n\n你还可以使用查询存储来检测污染计划缓存的查询。清单 29-4 说明了如何获取有关因不同上下文设置而生成多个执行计划的查询的信息。发生这种情况的两个最常见条件是：会话使用了不同的\
  \ `SET` 选项，以及查询引用对象时没有使用架构名称。\n\n```sql\nselect\n    q.query_id, qt.query_sql_text\n\
  \    ,count(distinct q.context_settings_id) as [Context Setting Cnt]\n    ,count(distinct\
  \ qp.plan_id) as [Plan Count]\nfrom\n    sys.query_store_query q join sys.query_store_query_text\
  \ qt on\n        q.query_text_id = qt.query_text_id\n    join sys.query_store_plan\
  \ qp on\n        q.query_id = qp.query_id\ngroup by\n    q.query_id, qt.query_sql_text\n\
  having\n    count(distinct q.context_settings_id) > 1\norder by\n    count(distinct\
  \ q.context_settings_id);\n```\n\n清单 29-5 展示了如何查找具有重复 `query_hash` 值且执行次数较少的相似查询。通常，这些查询属于系统中的非参数化即席工作负载。你应该在代码中将这些查询参数化，或者，如果不可能，可以考虑强制它们。\n\
  \n\n\n"
- "# 第 29 章 ■ 查询存储\n\n#### 管理与监控查询存储\n\n尽管查询存储不应给系统带来明显的性能开销，但监控其健康状况和对性能的影响仍然很重要。这将使您能够以最小化性能开销并提供足够细粒度的分析数据的方式，微调查询存储的参数。\n\
  \n我们在[第 26 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_26)中讨论过的数据库级别的参数化或使用计划指南。\n\
  \n#### 清单 29-5. 检测具有相同哈希值的查询\n\n```sql\nselect top 100\n q.query_hash\n ,count(*)\
  \ as [Query Count]\n ,avg(rs.count_executions) as [Avg Exec Count]\nfrom\n sys.query_store_query\
  \ q join sys.query_store_plan qp on\n  q.query_id = qp.query_id\n join sys.query_store_runtime_stats\
  \ rs on\n  qp.plan_id = rs.plan_id\ngroup by\n q.query_hash\nhaving\n count(*) >\
  \ 1\norder by\n [Avg Exec Count] asc, [Query Query] desc\n```\n\n如您所见，查询存储提供的信息为系统分析和性能调优提供了无限的可能性。\n\
  \n查询存储的大小取决于数据保留策略（由 `STALE_QUERY_THRESHOLD_DAYS` 和 `SIZE_BASED_CLEANUP_POLICY`\
  \ 设置控制）和收集模式（由 `QUERY_CAPTURE_MODE` 和 `MAX_PLAN_PER_QUERY` 设置指定）。此外，运行时统计信息存储的大小在很大程度上取决于聚合间隔，该间隔由\
  \ `INTERVAL_LENGTH_MINUTES` 值定义。聚合间隔越短，存储中保存的数据就越多。\n\n以符合您需求的方式定义聚合间隔非常重要。将 `INTERVAL_LENGTH_MINUTES`\
  \ 值设置得过小会产生过量的数据，从而使分析更加复杂。例如，如果您想创建系统的通用基线，一天的聚合间隔就足够了。但是，如果您需要详细分析工作负载在一天中的变化情况，则应使用一小时甚至更短的间隔。一如既往，关键在于避免在系统中收集不必要的信息。\n\
  \n您可以使用 `sys.database_query_store_options` 视图来分析查询存储的大小及其状态，如清单 29-6 所示。您应通过分析 `current_storage_size_mb`\
  \ 和 `max_storage_size_mb` 值来监控查询存储的可用空间。请记住：当查询存储已满时，它将切换为只读模式。\n\n#### 清单 29-6.\
  \ 分析查询存储状态\n\n```sql\nselect actual_state_desc, desired_state_desc, current_storage_size_mb\n\
  \ ,max_storage_size_mb, readonly_reason, interval_length_minutes\n ,stale_query_threshold_days,\
  \ size_based_cleanup_mode_desc\n ,query_capture_mode_desc\nfrom sys.database_query_store_options\n\
  ```\n\n您可以使用 `ALTER DATABASE SET QUERY_STORE CLEAR` 语句或在 Management Studio 中清除查询存储中的数据。或者，您可以使用\
  \ `sys.sp_query_store_remove_query` 存储过程按查询清除查询存储，如清单 29-7 所示。此代码清除所有超过三天且仅执行过一次的查询。顺便提一下，`sys.sp_query_store_remove_plan`\
  \ 存储过程允许您从查询存储中移除单个计划。\n\n#### 清单 29-7. 从查询存储中移除查询\n\n```sql\ndeclare\n @RecId int\
  \ = -1\n ,@QueryId int;\n\ndeclare\n @Queries table\n (\n  RecId int not null identity(1,1)\
  \ primary key,\n  QueryId int not null\n );\n\ninsert into @Queries(QueryId)\nselect\
  \ p.query_id\nfrom sys.query_store_plan p join sys.query_store_runtime_stats rs\
  \ on\n p.plan_id = rs.plan_id\ngroup by\n p.query_id\nhaving\n sum(rs.count_executions)\
  \ < 2 and\n max(rs.last_execution_time) < dateadd(day,-72,getdate());\n\nwhile 1\
  \ = 1\nbegin\n select top 1 @RecId = RecId, @QueryID = QueryId\n from @Queries\n\
  \ where RecId > @RecId\n order by RecID;\n\n if @@rowcount = 0\n  break;\n\n exec\
  \ sys.sp_query_store_remove_query @QueryID;\nend;\n```\n\n有几种方法可以监控查询存储的性能。\n\n\n"
- '# 第六部分


  ## 事务日志内部机制


  ### 第 30 章


  #### 事务日志内部原理


  如你所知，SQL Server 中的每个数据库除了数据文件外，还有一个或多个事务日志文件。事务日志存储了数据库中所有更改的信息，并允许 SQL Server 在发生意外关闭或崩溃时将数据库恢复到事务一致的状态。


  在本章中，我们将探讨事务日志的内部结构，讨论 SQL Server 如何记录数据修改，并回顾其如何执行数据库崩溃恢复。我们还将介绍如何诊断事务日志的过度增长，并讨论一些与日志管理和
  I/O 文件放置相关的最佳实践。


  #### 数据修改、日志记录与恢复


  SQL Server 始终将数据库保持在事务一致的状态。事务中进行的数据修改必须全部提交或全部回滚。SQL Server 绝不允许仅应用未提交事务的部分更改，从而导致数据在事务上不一致。


  即使在 SQL Server 意外关闭时也是如此。每次 SQL Server 重新启动时，它都会对实例中的每个数据库运行恢复过程。SQL Server 会回滚（`undo`）所有未提交事务所做的更改，并重新应用（`redo`）所有已提交事务所做的更改（如果在关闭或崩溃时尚未保存到数据文件中）。


  从备份还原数据库时也会发生相同的过程。无法保证在运行备份时所有事务都已完成。因此，SQL Server 需要在还原过程的最后一步恢复数据库。


  #### 总结


  查询存储是 SQL Server 2016 的“飞行数据记录器”，它捕获系统中查询的执行计划和统计信息。它完全集成到查询处理管道中，不依赖于计划缓存。


  在内部，查询存储由两个存储组成：计划存储（包含有关执行计划的信息）和运行时统计信息存储（收集按特定时间间隔聚合的运行时执行统计信息）。这两个存储都包含内存缓存和磁盘表。新收集的数据存储在内存中，并根据计划刷新到磁盘。查询存储的磁盘表存储在主文件组中。


  当你需要解决与参数嗅探相关的性能问题时，查询存储非常有用。它向你展示计划如何随时间演变，并允许你强制特定的执行计划应用于查询。你可以通过 Management
  Studio 中提供的一组交互式报告或通过 T-SQL 中的一组数据库视图来使用查询存储。


  查询存储不应给系统带来明显的性能开销。你可以通过一组性能计数器和扩展事件来监控其影响。你还应防止查询存储达到最大大小并变为只读，如果自动清理任务被禁用，这种情况可能发生。


  `SQL Server:Query Store` 对象中的性能计数器允许你跟踪查询存储的 CPU 使用情况和磁盘活动。


  查询存储公开了大量扩展事件。其中之一 `query_store_plan_forcing_failed`，在无法应用强制计划的情况下触发。一个可能发生的情况是更改数据库名称时。SQL
  Server 使用三部分对象引用来保留执行计划，重命名数据库将使这些计划失效。


  最后，SQL Server 2016 RTM 公开了 19 个与查询存储相关的等待类型，你可以通过名称中的 `QDS` 前缀来识别。除了 `QDS_PERSIST_TASK_MAIN_LOOP_SLEEP`
  和 `QDS_ASYNC_QUEUE` 等待外，系统中不应出现大量这些等待。这些等待是正常的，在等待统计分析期间，你应将它们作为非必要等待过滤掉。


  '
- '# 事务日志内部机制


  事务日志保证了数据库中数据的事务一致性。它由数据修改操作生成的*日志记录*流组成。每条日志记录都有一个唯一的、自增的*日志序列号 (LSN)*，并且它也描述了数据变更。日志记录包含有关操作和受影响行的信息；数据的旧版本和新版本；执行修改的事务等等。此外，一些内部操作，例如`CHECKPOINT`，会生成它们自己的日志记录。


  每个数据页都保留了最后修改它的日志记录的 LSN。在恢复阶段，SQL Server 可以比较日志和数据页中的日志记录的 LSN，从而找出最近的更改是否已保存到数据文件中。日志记录中存储了足够的信息，以便在需要时撤销或重做操作。


  SQL Server 使用*预写式日志*，这保证了在脏数据页保存到数据库之前，日志记录已写入日志文件。在第 1 章中，我提到日志记录与数据修改同步保存，而数据页在`CHECKPOINT`过程中异步保存。然而，这并不完全准确。SQL
  Server 将日志记录缓存在一个名为*日志缓冲区*的小型内存缓存中，一次保存多条日志记录。这有助于减少所需的物理 I/O 操作次数。


  在内部，日志缓冲区由 128 个 60KB 的结构组成，称为*日志块*。SQL Server 在一次 I/O 操作中将日志块写入事务日志文件。但这并不意味着 SQL
  Server 会等到整个日志块都满了才写入；写入请求中的数据大小可以从 512 字节到 60 KB 不等。此外，SQL Server 在队列中可以有多个未完成的日志写入请求。允许的最大请求数取决于
  SQL Server 版本。


  不幸的是，SQL Server 文档有些混乱，经常将日志块称为日志缓冲区，指出每个数据库有很多个。最终，重要的是每个数据库在将日志记录刷新到磁盘（批次大小最多
  60 KB）之前，都会在内存中缓存它们。


  现在，让我们更详细地看看数据修改是如何工作的。假设我们有一个系统，其日志缓冲区为空，事务日志中的最后一个 LSN 是 7213，如图 30-1 所示。再假设还有两个活动事务：`T1`和`T2`。这些事务的`BEGIN
  TRAN`日志记录都已保存在事务日志中。


  ***图 30-1.** 数据修改：初始状态*


  作为第一步，假设事务`T1`更新了页面`(1:24312)`中的一行。如图 30-2 所示，此操作生成了一条新的日志记录，该记录已被放入日志缓冲区。此外，它修改了数据页，将其标记为脏页，更新了页面头部的
  LSN，并更改了数据行。虽然日志记录尚未保存（*硬化*）到日志文件，但只要数据页尚未保存到数据文件中，这并不关键。如果 SQL Server 崩溃，日志记录和数据页上的修改都将丢失，这是可以的，因为事务尚未提交。


  ***图 30-2.** 数据修改：T1 更新其中一行*


  接下来，假设事务`T2`在页面`(1:26912)`中插入一个新行，而事务`T1`在同一页面上删除另一个行。这些操作生成两条日志记录，并被放入日志缓冲区，如图
  30-3 所示。


  '
- '# 事务日志内部原理


  ***图 30-3.** 数据修改：T1 和 T2 在另一页上更改数据*


  如您所见，所有日志记录仍在日志缓冲区中。现在，假设事务 `T2` 想要提交。此操作生成另一条日志记录，并强制 `SQL Server` 将日志块的内容刷写到磁盘，如
  *图 30-4* 所示。`SQL Server` 将 `COMMIT` 及其之前的所有日志记录从日志缓冲区硬化到事务日志中，而不管生成它们的事务如何。


  **注意** 准确地说，`COMMIT` 操作将包含 `COMMIT` 及其之前所有日志记录的日志缓冲区部分标记为“准备刷写”。另一个 `SQL Server`
  进程，*日志写入器*，会持续扫描日志缓冲区并将“准备刷写”区域刷写到事务日志。


  ***图 30-4.** 数据修改：提交*


  ![](img/index-611_1.jpg)


  ![](img/index-611_2.jpg)


  '
- '# 第 30 章 ■ 事务日志内部原理


  只有在所有日志记录都硬化后，客户端应用程序才会收到事务已提交的确认。即使数据页 `(1:26912)` 仍然是脏页且尚未保存到数据文件中，磁盘上已硬化的日志记录也包含足够的信息来重新应用（重做）已提交的
  `T2` 事务所做的所有更改。因此，如果发生 `SQL Server` 崩溃，这可以保证数据不会丢失。


  此时，系统已将日志记录硬化到事务日志中，尽管数据文件中的数据页尚未更新。下一个 `CHECKPOINT` 进程会保存脏数据页，并在缓冲池中将它们标记为干净。`CHECKPOINT`
  也会生成自己的日志记录，如 *图 30-5* 所示。


  ***图 30-5.** 数据修改：CHECKPOINT*


  此时，数据文件中的页存储的是未提交事务 `T1` 的数据。然而，事务日志中的日志记录包含足够的信息，以便在需要时撤销更改。在这种情况下，`SQL Server`
  会执行*补偿操作*，这些操作执行与原始数据修改相反的操作，并生成*补偿日志记录*。


  *图 30-6* 展示了这样一个例子。`SQL Server` 执行了一次补偿更新，生成了 `LSN` 为 `7219` 的补偿日志记录，以撤消 `LSN` 为
  `7214` 的原始更新操作所做的更改。它还生成了 `LSN` 为 `7920` 的补偿插入，以补偿 `LSN` 为 `7216` 的删除操作。


  ***图 30-6.** 数据修改：回滚*


  ![](img/index-612_1.jpg)


