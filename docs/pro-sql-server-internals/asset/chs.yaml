- "# 第五部分\n\n## 第二十七章\n\n### 扩展事件\n\n`扩展事件`是 SQL Server 2008 中引入的一个高度可扩展的性能监控和故障排除解决方案。它旨在替代在\
  \ SQL Server 2012 中被弃用的 SQL 跟踪。\n\n扩展事件是轻量级的，它们具有灵活性，可以对一些 SQL 跟踪无法处理的场景进行故障排除。\n\
  \n本章概述了扩展事件框架，并展示了如何使用它们。\n\n#### 扩展事件概述\n\n尽管 SQL 跟踪事件极其易于设置，但它们存在严重的局限性。所有事件类型都以相同格式生成输出。输出中的相同列对于不同的\
  \ SQL 跟踪事件可能提供不同的数据。例如，在`SQL:Batch Completed`事件中，`TextData`列包含 SQL 批处理的文本。而在`Lock:Acquired`事件中，同一列显示的是获取锁的资源。分析收集不同事件的跟踪输出很复杂。\n\
  \n性能是另一个重要因素。一个名为`跟踪控制器`的 SQL Server 组件管理所有`跟踪使用者`定义的 SQL 跟踪。它维护一个内部位图，显示当前活动跟踪所消耗的事件类型，因此需要被收集。其他\
  \ SQL Server 组件（在此上下文中称为`跟踪生产者`）分析该位图，并在需要时触发相应的事件。\n\n跟踪生产者不知道跟踪中包含了哪些数据列。所有列的数据都会被收集并传递给控制器，由控制器评估跟踪过滤器并丢弃不需要的事件和数据列。\n\
  \n这种架构带来了不必要的开销。考虑这样一种情况：你想从特定会话中捕获长时间运行的 SQL 语句。SQL 跟踪可能只定义很少的列并只收集少量事件。然而，跟踪生产者会对进入系统的每条\
  \ SQL 语句都触发事件。跟踪控制器将完成所有进一步的过滤和列移除操作。\n\n扩展事件框架的设计旨在解决这些局限。与 SQL 跟踪类似，它包括定义事件收集边界的`事件会话`。它们指定需要收集的事件类型和数据、用于过滤的谓词，以及存储数据的目标。SQL\
  \ Server 可以同步地（在事件发生的同一线程中）或异步地（在为每个事件会话保留的内存中缓冲数据）将事件写入目标。\n\n扩展事件使用 XML 格式。每种事件类型都有其自己的一组数据列。例如，`sql_statement_completed`事件提供了查询的读写次数、CPU\
  \ 时间、持续时间和其他执行统计信息。你可以通过执行称为`操作`的运算符来收集额外的属性——例如，`tsql`堆栈。与 SQL 跟踪相比，扩展事件不会收集不必要的数据；也就是说，只收集一小部分事件数据列和指定的操作。\n\
  \n© Dmitri Korotkevitch 2016\nD. Korotkevitch, `Pro SQL Server Internals`, DOI 10.1007/978-1-4842-1964-5_27\n\
  \n![](img/index-530_1.jpg)\n\n### 第二十七章 ■ 扩展事件\n\n当 SQL Server 触发一个`事件`时，它会检查是否有任何活动的事件会话使用此类事件。当存在此类会话时，SQL\
  \ Server 会收集事件数据列，如果定义了谓词，则会收集评估谓词所需的信息。如果谓词评估成功且需要触发事件，SQL Server 会收集所有操作，将数据传递给`同步目标`，并为...\n\
  \n\n\n## 异步目标\n图 27-1 展示了这一过程。\n\n***图 27-1.** 扩展事件生命周期*\n\n最后，值得注意的是，SQL Server\
  \ 2008 对扩展事件的支持相当有限，并未包含 SQL 跟踪中存在的所有事件。此外，SQL Server 2008 中的 Management Studio\
  \ 没有提供用于操作扩展事件的用户界面。幸运的是，这些限制在 SQL Server 2012 及更高版本中得到了解决，所有 SQL 跟踪事件都有对应的扩展事件，并且\
  \ Management Studio 提供了管理和分析扩展事件数据的工具。\n\n> **注意** 你可以从 SqlSkills.com 网站 `[`www.sqlskills.com/free-tools/`](http://www.sqlskills.com/free-tools/)`\
  \ 或 CodePlex 下载由 Jonathan Kehayias 开发的 SQL Server 2008 扩展事件 Management Studio 插件。此外，Jonathan\
  \ 撰写了一个关于扩展事件的出色教程，名为 “每日一事件”（An XEvent a Day），可在 `[`www.sqlskills.com/blogs/jonathan/category/xevent-a-day-series/`](http://www.sqlskills.com/blogs/jonathan/category/xevent-a-day-series/)`\
  \ 获取。\n\n#### 扩展事件对象\n\n扩展事件框架由几个不同的对象组成。让我们详细研究它们。\n\n### 包\n\nSQL Server 将扩展事件对象组合成\
  \ *包*。你可以将包视为元数据信息的容器。每个扩展事件对象都通过一个两部分的名称来引用，包括包名和对象名。包并不为事件定义功能边界。将来自不同包的对象一起使用是完全正常的。\n\
  \n不同版本的 SQL Server 拥有不同数量的可用包，并通过 `sys.dm_xe_packages` 视图公开它们。你可以使用 清单 27-1 中所示的代码来检查它们。`Capabilities`\
  \ 列是一个位掩码，描述了包的属性。最左边的位指示包是否是私有的，因此该包中的对象是否由 SQL Server 内部使用且用户无法访问。例如，`SecAudit`\
  \ 包是私有的，被 SQL Server 用于审核功能。此包不能在任何用户定义的扩展事件会话中被引用。\n\n![图片](img/index-531_1.jpg)\n\
  \n**第 27 章 ■ 扩展事件**\n\n***清单 27-1.*** 检查扩展事件包\n```sql\nselect\n    dxp.guid, dxp.name,\
  \ dxp.description, dxp.capabilities,\n    dxp.capabilities_desc, os.name as [Module]\n\
  from\n    sys.dm_xe_packages dxp\n    join sys.dm_os_loaded_modules os on\n    \
  \    dxp.module_address = os.base_address\n```\n\n图 27-2 显示了此查询在 SQL Server 2016\
  \ 中的输出。\n\n***图 27-2.** SQL Server 2016 中的扩展事件*\n\n### 事件\n\n*事件* 对应于 SQL Server\
  \ 代码中的特定点；例如，SQL 语句完成、获取和释放锁、死锁条件等。\n\n不同版本的 SQL Server 公开的事件数量不同。此外，事件数量可能随服务包的发布而增加。例如，SQL\
  \ Server 2008 SP2 公开了 253 个事件，SQL Server 2012 RTM 公开了 617 个事件，SQL Server 2012 SP1\
  \ 公开了 625 个事件，SQL Server 2014 RTM 公开了 870 个事件，而 SQL Server 2016 RTM 公开了 1,301 个事件。\n\
  \n在 SQL Server 2012 及更高版本中，每个 SQL 跟踪事件都有一个对应的扩展事件。然而，反之则不成立。SQL 跟踪在 SQL Server 2012\
  \ 中已弃用，新的 SQL Server 功能不再通过 SQL 跟踪公开故障排除功能，而是使用扩展事件。\n\n你可以使用 `sys.dm_xe_objects`\
  \ 视图分析可用的事件，如 清单 27-2 所示。图 27-3 显示了 SQL Server 2016 中一个查询的部分输出。\n\n***清单 27-2.***\
  \ 检查扩展事件\n```sql\nselect\n    xp.name as [Package],\n    xo.name as [Event],\n \
  \   xo.Description\nfrom\n    sys.dm_xe_packages xp\n    join sys.dm_xe_objects\
  \ xo on\n        xp.guid = xo.package_guid\nwhere\n```\n\n\n"
- "# 第 27 章 ■ 扩展事件\n\n![](img/index-532_1.jpg)\n\n每个事件都有一组相关的列，这些列属于以下三类之一：\n\n* \
  \  **只读** 列包含关于事件的静态信息，例如事件 GUID、架构版本和其他静态信息。\n*   **数据** 列包含运行时事件数据。例如，`sql_statement_completed`\
  \ 事件公开了各种与执行统计数据相关的数据列，如 I/O 操作次数、CPU 时间和其他运行时事件数据。\n*   **可自定义** 列允许你在创建事件会话时更改其值，它们控制事件的行为。例如，`sql_statement_completed`\
  \ 事件的 `collect_statement` 列控制在事件触发时是否收集 SQL 语句。默认情况下它是启用的；但是，你可以更改其值，并在繁忙的服务器上禁用语句收集。或者，`collect_parameterized_plan_handle`\
  \ 列默认是禁用的，但可以在需要时启用。\n\n你可以使用 `sys.dm_xe_object_columns` 视图检查事件列。以下查询展示了如何获取 `sql_statement_completed`\
  \ 事件的列信息。\n\n**清单 27-3.** 检查扩展事件列\n\n```sql\nselect\n    dxoc.column_id, dxoc.name,\
  \ dxoc.type_name as [Data Type]\n    , dxoc.column_type as [Column Type], dxoc.column_value\
  \ as [Value], dxoc.description\nfrom\n    sys.dm_xe_object_columns dxoc\nwhere\n\
  \    dxoc.object_name = 'sql_statement_completed'\n```\n\n可用列的集合会根据所使用的 SQL Server\
  \ 版本而变化。图 27-4 显示了在 SQL Server 2008 中执行上述查询的输出，图 27-5 显示了在 SQL Server 2012 及以上版本中的输出。值得注意的是，在这些情况下，事件数据中的\
  \ `VERSION` 列值是不同的。\n\n![](img/index-533_1.jpg)\n![](img/index-533_2.jpg)\n\n**图\
  \ 27-4.** SQL Server 2008 中的 `sql_statement_completed` 事件列\n\n**图 27-5.** SQL Server\
  \ 2012 及以上版本中的 `sql_statement_completed` 事件列\n\n## 谓词\n\n*谓词* 定义了事件需要触发的布尔条件。例如，如果你想收集有关\
  \ CPU 密集型查询的信息，你可以在 `sql_statement_completed` 事件的 `cpu_time` 列上定义一个谓词，只捕获 CPU 时间超过某个预定义阈值的语句。\n\
  \n尽管谓词看起来与 SQL 跟踪中的列筛选器非常相似，但它们之间有一个细微的区别。SQL 跟踪在事件被收集并传递给跟踪控制器后才评估列筛选器。相比之下，扩展事件只收集评估谓词所需的最少量数据，如果谓词评估结果为\
  \ `False`，则不会执行操作或触发事件。\n\n谓词可以针对事件数据列或全局属性（如 `session_id`、`database_id` 等）来定义。你可以使用以下查询查看可用全局属性的列表。下图显示了在\
  \ SQL Server 2016 中此查询的部分输出。\n\n![](img/index-534_1.jpg)\n![](img/index-534_2.jpg)\n\
  \n**清单 27-4.** 检查全局属性\n\n```sql\nselect xp.name as [Package], xo.name as [Predicate],\
  \ xo.Description\nfrom sys.dm_xe_packages xp join sys.dm_xe_objects xo on\n    xp.guid\
  \ = xo.package_guid\nwhere\n    (xp.capabilities is null or xp.capabilities & 1\
  \ = 0) and -- 排除私有包\n    (xo.capabilities is null or xo.capabilities & 1 = 0) and\
  \ -- 排除私有对象\n    xo.object_type = 'pred_source'\norder by\n    xp.name, xo.name\n\
  ```\n\n**图 27-6.** 可用于谓词中的全局属性\n\n\n谓词可以使用扩展事件框架提供的基本算术运算和比较函数。通过使用清单 27-5 中所示的查询，你可以查看可用函数的列表。\n\
  \n图 27-7 展示了此查询在 SQL Server 2016 中的部分输出。\n\n***清单 27-5.*** 查看比较函数\n```sql\nselect\
  \ xp.name as [Package], xo.name as [Comparison Function], xo.Description\nfrom sys.dm_xe_packages\
  \ xp join sys.dm_xe_objects xo on\nxp.guid = xo.package_guid\nwhere\n(xp.capabilities\
  \ is null or xp.capabilities & 1 = 0) and -- exclude private packages\n(xo.capabilities\
  \ is null or xo.capabilities & 1 = 0) and -- exclude private objects\nxo.object_type\
  \ = 'pred_compare'\norder by\nxp.name, xo.name\n```\n\n***图 27-7.*** *可在谓词中使用的比较函数*\n\
  \n与 Transact SQL 不同，扩展事件支持短路谓词求值，类似于 C# 或 Java 等开发语言。当你使用逻辑 `OR` 和 `AND` 条件定义了多个谓词时，SQL\
  \ Server 会在结果确定后立即停止求值。例如，如果你有两个使用逻辑 `AND` 运算符的谓词，并且第一个谓词被求值为 `False`，则 SQL Server\
  \ 不会求值第二个谓词。\n\n■ **提示** 收集全局属性数据会给谓词求值带来轻微开销。以先求值事件数据列、再求值全局属性的方式编写多个谓词是有帮助的，这样可以由于短路求值而防止收集全局属性数据。\n\
  \nSQL Server 在事件会话中维护谓词状态。例如，`package0.counter` 属性存储谓词被求值的次数。如果你想创建对数据进行采样的事件会话，例如每一百次或前十次事件发生时收集数据，可以依赖谓词状态。\n\
  \n## 操作\n\n*操作* 让你能够随事件收集额外信息。可用操作包括 `session_id`、`client_app_name`、`query_plan_hash`\
  \ 等许多其他项。操作在谓词求值之后执行，并且仅在事件将要触发时才执行。\n\nSQL Server 在与事件相同的线程中同步执行操作，这会给事件收集增加开销。开销量取决于具体操作。其中一些操作——例如\
  \ `session_id` 或 `cpu_id`——相对较轻量。而其他操作，如 `sql_text` 或 `callstack`，在与频繁触发的事件一起收集时，可能会给\
  \ SQL Server 带来显著开销。执行计划相关的事件和操作也是如此，它们可能给服务器增加相当大的开销。\n\n■ **重要提示** 尽管单个扩展事件相比\
  \ SQL 跟踪事件是轻量级的，但如果使用不当，仍然会给服务器带来相当大的开销。不要给 SQL Server 增加不必要的负载，仅收集故障排除所需的那些事件和操作。\n\
  \n你可以使用清单 27-6 中所示的查询来查看可用操作的列表。图 27-8 展示了该查询在 SQL Server 2016 中运行时的部分输出。\n\n***清单\
  \ 27-6.*** 查看操作\n```sql\nselect xp.name as [Package], xo.name as [Action], xo.Description\n\
  from sys.dm_xe_packages xp join sys.dm_xe_objects xo on\nxp.guid = xo.package_guid\n\
  where\n(xp.capabilities is null or xp.capabilities & 1 = 0) and -- exclude private\
  \ packages\n(xo.capabilities is null or xo.capabilities & 1 = 0) and -- exclude\
  \ private objects\nxo.object_type = 'action'\norder by\nxp.name, xo.name\n```\n\n\
  ![](img/index-536_1.jpg)\n\n![](img/index-536_2.jpg)\n\n***图 27-8.*** *扩展事件操作*\n\
  \n## 类型和映射\n\n在扩展事件框架中，数据属性通过类型或映射进行强类型化。*类型*\n\n\n## 类型与映射\n\n表示标量数据类型，如整型、字符型或\
  \ GUID。`映射`则是将整型键转换为人类可读表示的枚举器。\n\n您可以将等待类型视为扩展事件映射的一个示例。可用的等待类型列表是预定义的，SQL Server\
  \ 可以随事件返回一个整型等待类型键。`wait_types` 映射允许您将此代码转换为易于理解的等待类型定义。\n\n您可以使用**清单 27-7**所示的查询查看可用类型和映射的列表。图\
  \ 27-9 显示了在 SQL Server 2016 中运行该查询时的部分输出。\n\n### 清单 27-7. 检查类型和映射\n\n```sql\nselect\
  \ xo.object_type as [Object], xo.name, xo.description, xo.type_name, xo.type_size\n\
  from sys.dm_xe_objects xo\nwhere xo.object_type in ('type','map')\n```\n\n### 图\
  \ 27-9. 扩展事件类型和映射\n\n您可以使用 `sys.dm_xe_map_values` 视图检查某个类型的映射值列表。**清单 27-8** 展示了如何获取\
  \ `wait_types` 映射的值。图 27-10 显示了该查询的部分输出。\n\n![](img/index-537_1.jpg)\n\n![](img/index-537_2.jpg)\n\
  \n## 第 27 章 ■ 扩展事件\n\n### 清单 27-8. 检查 wait_types 映射\n\n```sql\nselect name, map_key,\
  \ map_value\nfrom sys.dm_xe_map_values\nwhere name = 'wait_types'\norder by map_key\n\
  ```\n\n### 图 27-10. wait_types 映射键值\n\n## 目标\n\n当所有事件数据被收集且事件触发后，它会被发送到`目标`。目标允许您存储和保留原始事件数据，或执行某些数据分析与聚合。\n\
  \n与包类似，有些目标是私有的，不能在扩展事件会话的定义中使用。您可以使用**清单 27-9**所示的代码检查公共目标的列表。\n\n### 清单 27-9.\
  \ 检查公共目标\n\n```sql\nselect\n    xp.name as [Package], xo.name as [Action], xo.Description,\n\
  \    xo.capabilities_desc as [Capabilities]\nfrom\n    sys.dm_xe_packages xp join\
  \ sys.dm_xe_objects xo on\n    xp.guid = xo.package_guid\nwhere\n    (xp.capabilities\
  \ is null or xp.capabilities & 1 = 0) and -- 排除私有包\n    (xo.capabilities is null\
  \ or xo.capabilities & 1 = 0) and -- 排除私有对象\n    xo.object_type = 'target'\norder\
  \ by\n    xp.name, xo.name\n```\n\n不同版本的 SQL Server 中，可用目标的集合基本相同。然而，目标名称在 SQL Server\
  \ 2008/2008R2 与后续版本之间有所不同。图 27-11 显示了 SQL Server 2012-2016 中的可用目标列表。\n\n### 图 27-11.\
  \ SQL Server 2012-2016 扩展事件目标\n\n## 第 27 章 ■ 扩展事件\n\n现在，让我们更深入地了解目标。一些最有用的目标列举如下：\n\
  \n`ring_buffer` 目标将数据存储在一个预定义大小的内存中环形缓冲区中。当缓冲区满时，新事件会覆盖缓冲区中最旧的事件。因此，事件可以被无限期地消费。但是，只保留最新的事件。当您需要进行故障排除且之后不需要保留事件数据时，此目标最有用。这是一个异步目标（稍后会详细介绍），在所有\
  \ SQL Server 版本中均受支持。\n\n`asynchronous_file_target`（SQL Server 2008/2008R2）和 `event_file`（SQL\
  \ Server 2012-2016）目标使用专有二进制格式将事件存储在文件中。当您希望保留会话收集的原始事件数据时，这些目标最有用。这些目标是异步的。\n\n\
  `etw_classic_sync_target` 是一个基于文件的目标，它以支持 ETW 的读取器可以使用的格式写入数据。当您需要将 SQL Server 事件与由\
  \ Windows 内核和其他非 SQL Server 组件生成的事件跟踪事件关联时，会使用此目标。（这些场景超出了本书的范围。）这是一个同步目标，在所有 SQL\
  \ Server 版本中均受支持。\n\n`synchronous_event_counter`（SQL Server 2008/2008R2）和 `event_`\n\
  \n\n## 第 27 章 ■ 扩展事件\n\n`counter`（SQL Server 2012-2016）目标用于计算事件会话中每个事件的发生次数。当您需要分析工作负载中的特定指标，而又不想引入完整事件收集的开销时，此目标非常有用。例如，您可以考虑计算系统中的查询数量。这些目标是同步的。\n\
  \n`synchronous_bucketizer`（SQL Server 2008/2008R2）、`asynchronous_bucketizer`（SQL\
  \ Server 2008/2008R2）和`histogram`（SQL Server 2012-2016）目标允许您对特定事件进行计数，并根据指定的事件数据列或操作对结果进行分组。例如，您可以按数据库计算系统中的查询数量。SQL\
  \ Server 2008/2008R2 中的 `bucketizer` 目标可以是同步的，也可以是异步的，而 `histogram` 目标是异步的。\n\n\
  `pair_matching` 目标可帮助您排查因某种原因导致某个预期事件未发生的情况。一个例子是通过查找有 `database_transaction_begin`\
  \ 事件但没有相应 `database_transaction_end` 事件的情况来排查孤立事务。`pair_matching` 目标会丢弃所有匹配的事件对，只保留不匹配的事件。这是一个异步目标，在所有\
  \ SQL Server 版本中均受支持。\n\n每个目标都有自己的一套属性，需要在事件会话中进行配置。例如，`ring_buffer` 目标要求您指定要保留的内存量和/或事件数量，以及缓冲区中每种事件类型的最大出现次数。清单\
  \ 27-10 展示了如何检查目标的配置参数，这里以 `event_file` 目标为例。图 27-12 显示了此查询的输出。\n\n![](img/index-539_1.jpg)\n\
  \n***清单 27-10.*** 检查目标配置参数\n\n```sql\nselect\n    oc.column_id, oc.name as [Column],\
  \ oc.type_name\n    ,oc.Description, oc.capabilities_desc as [Capabilities]\nfrom\n\
  \    sys.dm_xe_objects xo join sys.dm_xe_object_columns oc on\n    xo.package_guid\
  \ = oc.object_package_guid and\n    xo.name = oc.object_name\nwhere\n    xo.object_type\
  \ = 'target' and\n    xo.name = 'event_file'\norder by\n    oc.column_id\n```\n\n\
  ***图 27-12.** Event_file 目标配置设置*\n\n■ **注意** 您可以在 `http://technet.microsoft.com/en-us/library/bb630339.aspx`\
  \ 阅读更多关于目标及其配置设置的信息。请记住，配置设置在不同版本的 SQL Server 中有所不同。\n\n您可以在一个事件会话中使用多个事件目标。例如，您可以将\
  \ `event_file` 目标与 `ring_buffer` 结合使用，后者用于实时故障排查，同时将事件保留在文件中。\n\n如您所见，目标可以是同步的或异步的。SQL\
  \ Server 在触发事件的执行线程中将数据写入同步目标。对于异步目标，SQL Server 将事件缓冲在内存中，并定期将它们刷新到目标。事件会话配置设置 `EVENT_RETENTION_MODE`\
  \ 控制当缓冲区已满时新事件的处理方式，如下所示：\n\n`NO_EVENT_LOSS` 选项表示必须保留所有事件，事件丢失是不可接受的。SQL Server\
  \ 执行线程会等待，直到缓冲区被刷新并有空闲空间来容纳新事件。正如您所猜测的，此选项可能对 SQL Server 产生重大的性能影响。例如，考虑一个使用 `event_file`\
  \ 目标收集已获取和已释放锁信息的事件会话。该事件会话可以收集大量的事件，当保存事件数据时，I/O 吞吐量很快就会成为瓶颈。\n\n`ALLOW_SINGLE_EVENT_LOSS`\
  \ 选项允许会话在缓冲区已满时丢失单个事件。此选项可减少对 SQL Server 的性能影响。\n\n\n\n"
- "# 第 27 章 ■ 扩展事件\n\n#### 创建事件会话\n\n现在是时候将所有内容整合起来，了解扩展事件会话了。我们将重点介绍 T-SQL 实现；不过，如果你更喜欢通过\
  \ UI 操作，也可以使用 SQL Server 2012 及以上版本的 Management Studio，或者使用 Jonathan Kehayias 的\
  \ SSMS 插件来操作 SQL Server 2008。\n\n每个扩展事件会话都指定了要收集的事件、收集数据的目标以及几个配置属性。清单 27-11 展示了一个创建扩展事件会话的语句，该会话使用`hash_warning`和`sort_warning`事件收集有关`tempdb`溢出的信息。此代码适用于\
  \ SQL Server 2012 及以上版本，因为 SQL Server 2008/2008R2 不支持`hash_warning`或`sort_warning`事件。然而，`CREATE\
  \ EVENT SESSION`命令的语法在所有版本的 SQL Server 中都是相同的。\n\n**清单 27-11.** 创建事件会话\n\n```sql\n\
  create event session [TempDB Spills]\non server\nadd event sqlserver.hash_warning\n\
  (\n    action ( sqlserver.session_id, sqlserver.plan_handle, sqlserver.sql_text\
  \ )\n    where ( sqlserver.is_system=0 )\n),\nadd event sqlserver.sort_warning\n\
  (\n    action ( sqlserver.session_id, sqlserver.plan_handle, sqlserver.sql_text\
  \ )\n    where ( sqlserver.is_system=0 )\n)\nadd target package0.event_file\n( set\
  \ filename='c:\\ExtEvents\\TempDB_Spiils.xel', max_file_size=25 ),\nadd target package0.ring_buffer\n\
  ( set max_memory=4096 )\nwith -- Extended Events session properties\n(\n    max_memory=4096KB\n\
  \    ,event_retention_mode=allow_single_event_loss\n    ,max_dispatch_latency=15\
  \ seconds\n    ,track_causality=off\n    ,memory_partition_mode=none\n    ,startup_state=off\n\
  );\n```\n\n如前所述，对于异步目标，SQL Server 将收集的事件存储在一组内存缓冲区中，使用多个缓冲区来分离事件的收集和处理。缓冲区的数量及其大小取决于`max_memory`和`memory_partition_mode`设置。SQL\
  \ Server 使用以下算法，将缓冲区大小向上舍入到下一个 64 KB 边界：\n\n`memory_partition_mode = none`：SQL Server\
  \ 使用三个中央缓冲区，大小为`max_memory / 3`向上舍入到下一个 64 KB 边界。例如，无论服务器配置如何，`max_memory`为 4000\
  \ KB 将创建三个大小为 1344 KB 的缓冲区。\n\n`memory_partition_mode = per_node`：SQL Server 为每个\
  \ NUMA 节点创建一组独立的三个缓冲区。例如，在具有两个 NUMA 节点的服务器上，`max_memory`为 4000 KB 将创建六个缓冲区，每个节点三个，每个缓冲区大小为\
  \ 704 KB。\n\n`memory_partition_mode = per_cpu`：SQL Server 根据公式`2.5 * (number of\
  \ CPUs)`创建缓冲区数量，并在每个 CPU 上进行分区。例如，在具有 20 个 CPU 的服务器上，`max_memory`为 4000 KB 将创建 50\
  \ 个大小为 128 KB 的缓冲区。\n\n按 NUMA 节点或 CPU 分区允许多个 CPU 将事件存储在一组独立的缓冲区中，这有助于减少争用，从而降低收集大量事件的扩展事件会话对性能的影响。然而，有一个注意事项。事件需要能够放入缓冲区才能被收集。你可能已经注意到，缓冲区分区增加了缓冲区的数量，这减小了它们的大小。这通常不是问题，因为大多数事件相对较小。但是，也可能定义一个非常大的事件，以至于无法放入缓冲区。在具有大量\
  \ NUMA 节点和/或 CPU 的服务器上对事件进行分区时，请确保增加`max_memory`。\n\n> **注意** 你可以检查`sys.dm_xe_sessions`视图的`largest_event_dropped_size`列，以确认缓冲区是否足够大以容纳事件。\n\
  \n`ALLOW_MULTIPLE_EVENT_LOSS`选项允许一个会话在缓冲区满时丢失多个事件。此选项以潜在丢失大量事件为代价，最小化了对 SQL Server\
  \ 的性能影响。\n\n\n\n"
- '# SQL Server 扩展事件


  ## 事件会话配置


  SQL Server 会在缓冲区满时，和/或根据 `max_dispatch_latency` 设置指定的时间间隔（默认 30 秒），将事件会话数据刷新到异步目标。


  `startup_state` 选项控制事件会话是否应在 SQL Server 启动时自动启动。


  最后，`track_causality` 选项允许你跟踪事件的序列，并查看不同事件如何相互引发。一个这样的场景示例是：一个 SQL 语句触发了文件读取事件，该事件又触发了带有
  `PAGELATCHIO` 等待的等待事件，等等。启用此选项后，SQL Server 会添加一个唯一的活动 ID，该 ID 是 GUID 值（对于任务保持不变）和事件序列号的组合。


  ## 管理会话


  创建事件会话后，可以使用 `ALTER EVENT SESSION` 命令启动或停止它，或使用 `DROP EVENT SESSION` 命令删除它，如清单 27-12
  所示。


  清单 27-12. 操作事件会话


  ```sql

  -- 启动事件会话

  alter event session [TempDB Spills] on server state=start;


  -- 停止事件会话

  alter event session [TempDB Spills] on server state=stop;


  -- 删除事件会话

  drop event session [TempDB Spills] on server;

  ```


  #### 处理事件数据


  Management Studio 2012 及以上版本提供了一个 UI，用于监控事件的实时流或检查已在目标中收集的数据。这个 UI 非常方便灵活，它允许你自定义显示事件的网格布局，让你能够对事件数据进行分组、聚合，并将其导出到数据库表、事件或
  CSV 文件。但是，在连接到实时事件流时应小心，因为事件会话生成事件的速度可能快于 Management Studio 消费它们的速度。发生这种情况时，Management
  Studio 会断开与实时数据流的连接，以避免对服务器性能产生负面影响。


  在本节中，我将不讨论如何使用 Management Studio UI，而是专注于 T-SQL 实现。不过，我鼓励你尝试使用 Management Studio。尽管扩展事件管理
  UI 存在一些局限性，但在大量情况下它已足够。


  ### 关键数据管理视图


  可用于检查事件会话和数据的关键扩展事件数据管理视图包括：


  - `sys.dm_xe_sessions` 视图提供有关活动事件会话的信息。它显示会话的配置参数以及执行统计信息，例如，如果使用了 `NO_EVENT_LOSS`
  选项，则显示丢弃的事件数量或事件收集导致阻塞的时间量。

  - `sys.dm_xe_session_targets` 视图返回有关目标的信息。该视图的关键列之一是 `event_data`。某些目标（例如 `ring_buffer`
  或 `histogram`）通过此列公开收集的事件数据。对于其他目标（如 `event_file`），`event_data` 列包含元数据信息，例如文件名和会话统计信息。

  - `sys.dm_xe_sessions_object_columns` 视图公开绑定到会话的对象的配置值。你可以使用此视图获取目标的配置属性；例如，事件文件路径。


  > **注意**：你可以在 [`technet.microsoft.com/en-us/library/bb677293.aspx`](http://technet.microsoft.com/en-us/library/bb677293.aspx)
  找到有关扩展事件 DMV 的更多信息。


  现在，让我们看看如何访问存储在不同目标中的数据。


