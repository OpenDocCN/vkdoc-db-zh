  如**表 33-8** 所示，第二个查询的执行时间没有变化。这在 SQL Server 2012 和 2014 中并非如此，当时在筛选器运算符中计算字符串谓词会显著减慢查询速度。


  **表 33-8.** 第二个查询的执行时间

