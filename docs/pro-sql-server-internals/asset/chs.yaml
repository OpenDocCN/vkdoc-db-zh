  ```sql

  ,(ps.total_logical_reads + ps.total_logical_writes) / ps.execution_count as [Avg
  IO]

  ,ps.total_logical_reads as [Total Reads], ps.last_logical_reads as [Last Reads]

  ,ps.total_logical_writes as [Total Writes], ps.last_logical_writes as [Last Writes]

  ,ps.total_worker_time as [Total Worker Time], ps.last_worker_time as [Last Worker
  Time]

  ,ps.total_elapsed_time / 1000 as [Total Elapsed Time]

  ,ps.last_elapsed_time / 1000 as [Last Elapsed Time]

  ,ps.last_execution_time as [Last Exec Time]

  from

  sys.dm_exec_procedure_stats ps with (nolock)

  cross apply sys.dm_exec_query_plan(ps.plan_handle) qp

  order by

  [Avg IO] desc

  ```


  SQL Server 2016 引入了另一个视图 `sys.dm_exec_function_stats`，它允许你跟踪标量用户定义函数的执行统计信息。它适用于
  T-SQL、CLR 和 In-Memory OLTP 标量函数；但是，它不捕获表值函数的执行统计信息。


  `sys.dm_exec_function_stats` 视图返回的信息与 `sys.dm_exec_procedure_stats` 返回的信息类似。实际上，只要替换列表
  28-5 中的 DMV 名称，该代码同样有效。


  市场上有大量工具可帮助你自动化数据收集和分析过程，包括 SQL Server 管理数据仓库。它们都能帮助你实现相同的目标，即在系统中找到优化目标。


  最后，值得提及的是，数据仓库和报表系统通常遵循不同的规则。在这些系统中，扫描大量数据的 I/O 密集型查询很常见。针对此类系统的性能调优可能需要与 OLTP 环境不同的方法，并且它们通常会导致数据库架构变更，而不是索引调整。


  ## 并行性


  并行性可能是故障排查中最令人困惑的方面之一。它通过 `CXPACKET` 等待类型显现出来，该等待类型常出现在系统顶级等待列表中。`CXPACKET` 等待类型（代表
  `Class eXchange`，即类交换）在并行线程等待其他线程完成其执行时发生。


  让我们考虑一个简单的例子，并假设我们有一个包含两个线程的并行计划，后面跟着 *交换/重分区流* 操作符。当一个并行线程完成其工作时，它会等待另一个线程完成。等待的线程不消耗任何
  CPU 资源；它只是等待，从而产生 `CXPACKET` 等待类型。


  `CXPACKET` 等待类型仅仅表明系统中存在并行性，而这通常属于“视情况而定”的范畴。当大型复杂查询利用并行性时，这是有益的，因为它可以显著减少其执行时间。然而，并行性管理和交换操作符总是伴随着开销。例如，如果一个串行计划在单个
  CPU 上一秒钟完成，那么使用两个 CPU 的并行计划的执行时间总是会超过 0.5 秒。并行性管理总是需要额外的 CPU 时间。尽管并行计划的响应（总耗时）时间更短，但
  CPU 时间总是会大于串行计划的情况。


  当大量 OLTP 查询等待可用 CPU 来执行时，你需要避免这种开销。`SOS_SCHEDULER_YIELD` 和 `CXPACKET` 等待比例过高就是这种情况的一个迹象。


  一个常见的误解认为，在 OLTP 系统中 `CXPACKET` 等待占比很高的情况下，你应该完全禁用并行性，并将服务器级别的 `MAXDOP` 设置设为 1。然而，这并不是处理并行性等待的正确方法。你需要调查
  OLTP 系统中并行性的根本原因，并分析为什么 SQL Server 生成了并行执行计划。在大多数情况下，这是由于复杂和/或未优化的查询导致的。查询优化可以简化执行计划并消除并行性。



  '
- '# 第 28 章 ■ 系统故障排除


  ## 与内存相关的等待类型


  此外，任何 OLTP 系统都有一些合理的复杂查询能够从并行处理中受益。将`Cost Threshold for Parallelism`（并行度的成本阈值）配置选项调高，比将`MAXDOP`设置为
  1 来禁用并行处理要好。这样做可以在处理复杂且开销大的查询时利用并行度，同时让低成本的 OLTP 查询以串行方式运行。


  对于如何设置`Cost Threshold for Parallelism`的值，没有通用的建议。默认情况下，该值被设为 5，这在当今是非常低的。你应该分析系统中查询的活动和成本，以找到此设置的最佳值。检查你希望串行和并行运行的查询的成本，并相应地调整阈值。你可以在执行计划中根（顶部）操作符的属性里看到该成本。


  说到`MAXDOP`设置，通常它不应超过每个硬件 NUMA 节点的逻辑 CPU 数量。然而，在一些数据仓库系统中，你可以考虑使用超过此数量的`MAXDOP`设置。同样，你应该分析和测试你的工作负载，以找到此设置的最佳值。


  SQL Server 从缓冲池中一个称为`workspace memory`（工作区内存）的特殊部分分配查询内存授予。`workspace memory`的最大大小限制为缓冲池大小的
  75%。默认情况下，最大查询内存授予大小不能超过`workspace memory`的 25%；不过，你可以通过资源调控器工作负载组中的`REQUEST_MAX_MEMORY_GRANT_PERCENT`设置来控制它。


  如你所知，每个查询执行时都会使用少量内存。此外，`sort`（排序）和`hash`（哈希）操作符需要额外内存才能运行，这些内存可分为两组，如下所示：


  *Required memory*（必需内存）是存储操作所需的内部数据结构所必需的。没有此内存可用，查询将无法运行。


  *Additional memory*（附加内存）用于在操作期间将数据行存储在内存中。附加内存量基于行大小和基数估计。如果附加内存量不足，查询仍可运行，但会在需要时将数据溢出到
  tempdb。


  必需内存量也受并行度影响。每个工作线程都需要为`sort`或`hash`操作符创建自己的一套内部数据结构。此外，交换操作符将需要一些内存来缓冲行。


  在计算完内存授予的大小后，SQL Server 会检查它是否超过最大大小限制，并在需要时减少它。之后，它会向`MEMORYCLERK_SQLQERESERVATIONS`内存
  clerks 请求内存，该 clerk 使用一个称为`Resource Semaphore`（资源信号量）的线程同步对象来分配内存。我们将在本章后面讨论内存 clerks
  和 SQL Server 内存分配。


  当无法分配内存时，`Resource Semaphore` 会将查询放入等待队列，这会导致 `RESOURCE_SEMAPHORE` 等待。在内部，`Resource
  Semaphore` 使用两个等待队列，根据内存授予大小和查询成本对查询进行排序。一个队列称为 `Small-query Resource Semaphore`（小查询资源信号量），存储需要少于
  5 MB 且成本低于 3 个成本单位的查询。第二个队列存储所有其他查询。


  当 `Resource Semaphore` 收到新请求时，它首先检查是否有任何查询在等待，然后按照先到先得的原则处理请求。它偏向于小查询队列而非常规队列，这减少了对不需要大量内存的小查询的等待时间。


  大型内存授予会消耗系统内存，并可能阻止查询立即执行。不幸的是，有时 SQL Server 会高估查询所需的内存授予大小，通常是由于基数估计过高。此类错误的一个常见情况是复杂



  '
- "# 第 28 章 ■ 系统故障排除\n\n## 高 CPU 负载\n\n查询涉及大量连接和非可搜索参数（SARGable）谓词，和/或连接条件及 `WHERE`\
  \ 子句中存在函数。SQL Server 在基数估计期间必须应用启发式方法，这可能导致针对实际数据产生不正确的结果。\n\n您应该监控系统中内存授予的情况。即使是少量的\
  \ `RESOURCE_SEMAPHORE` 等待也可能表明严重的性能问题。这可能是内存压力以及查询极低效和优化不良的迹象。\n\n您可以通过查看 `SQL Server:Memory\
  \ Manager` 对象中的 `memory grants pending` 性能计数器来确认问题。此计数器显示等待内存授予的查询数量。理想情况下，计数器值应始终为零。\n\
  \n`sys.dm_exec_query_resource_semaphores` 视图显示了两个 Resource Semaphore 队列的统计信息，包括已授予和可用的工作空间内存、等待队列中的查询数量以及其他几个参数。您还可以查看\
  \ `sys.dm_exec_query_memory_grants` 视图，它提供有关内存授予请求（包括挂起和未完成）的信息。清单 28-6 说明了如何获取相关信息，以及查询文本和执行计划。\n\
  \n***清单 28-6.*** 从 `sys.dm_exec_query_memory_grants` 视图获取查询信息\n\n```sql\nselect\n\
  mg.session_id, t.text as [SQL], qp.query_plan as [Plan], mg.is_small, mg.dop\n,mg.query_cost,\
  \ mg.request_time, mg.required_memory_kb, mg.requested_memory_kb\n,mg.wait_time_ms,\
  \ mg.grant_time, mg.granted_memory_kb, mg.used_memory_kb\n,mg.max_used_memory_kb\n\
  from\nsys.dm_exec_query_memory_grants mg with (nolock)\ncross apply sys.dm_exec_sql_text(mg.sql_handle)\
  \ t\ncross apply sys.dm_exec_query_plan(mg.plan_handle) as qp\n```\n\nSQL Server\
  \ 2012 SP3、SQL Server 2014 SP2 和 SQL Server 2016 有多项增强功能，可简化内存授予的故障排查。`sys.dm_exec_query_stats`\
  \ 视图在输出列中提供了内存授予相关的统计信息。还有一个 `query_memory_grant_usage` 扩展事件，可用于实时跟踪内存分配。最后，SQL\
  \ Server 2016 中的 Query Store 会收集内存授予指标以及其他参数。\n\n如果您运行的是旧版本的 SQL Server，可以从缓存的执行计划中获取有关内存授予的信息。与其他指标一样，那里的内存授予信息缺乏实际的执行统计信息，并且它还显示了串行执行计划所需的内存授予请求信息，不涉及并行开销。\n\
  \n清单 28-7 显示了如何使用 `sys.dm_exec_cached_plans` 视图从缓存的执行计划中获取内存授予信息。或者，您也可以使用 `sys.dm_exec_query_stats`\
  \ 视图和 `sys.dm_exec_query_plan` 函数获取类似信息。\n\n***清单 28-7.*** 从缓存计划获取内存授予信息\n\n```sql\n\
  ;with xmlnamespaces(default 'http://schemas.microsoft.com/sqlserver/2004/07/showplan')\n\
  ,Statements(PlanHandle, ObjType, UseCount, StmtSimple)\nas\n(\nselect cp.plan_handle,\
  \ cp.objtype, cp.usecounts, nodes.stmt.query('.')\nfrom sys.dm_exec_cached_plans\
  \ cp with (nolock)\ncross apply sys.dm_exec_query_plan(cp.plan_handle) qp\ncross\
  \ apply qp.query_plan.nodes('//StmtSimple') nodes(stmt)\n)\nselect top 50\ns.PlanHandle,\
  \ s.ObjType, s.UseCount\n,p.qp.value('@CachedPlanSize','int') as CachedPlanSize\n\
  ,mg.mg.value('@SerialRequiredMemory','int') as [SerialRequiredMemory KB]\n,mg.mg.value('@SerialDesiredMemory','int')\
  \ as [SerialDesiredMemory KB]\nfrom Statements s\ncross apply s.StmtSimple.nodes('.//QueryPlan')\
  \ p(qp)\ncross apply p.qp.nodes('.//MemoryGrantInfo') mg(mg)\norder by\nmg.mg.value('@SerialRequiredMemory','int')\
  \ desc\n```\n\n您可以通过使用 `MAX_GRANT_PERCENT` 查询提示（在 SQL Server 2012 SP3、SQL Server\
  \ 2014 SP2 和 SQL Server 2016 中支持）或通过限制 Resource Governor 工作负载组中的 `REQUEST_MAX_MEMORY_GRANT_PERCENT`\
  \ 设置来限制内存授予的最大大小。然而，最好的方法是通过简化和优化查询，以从执行计划中移除内存密集型操作符，如哈希、排序，有时还包括并行。通常可以通过索引调优和查询重构来实现。\n\
  \n`CXMEMTHREAD` 是另一个您可能在系统中遇到的与内存相关的等待类型。当多个线程尝试同时从未分配的内存堆中分配内存时，就会发生这些等待。您经常可以在具有大量即席查询的系统中观察到这些等待的百分比很高，因为\
  \ SQL Server 不断分配和释放计划缓存内存。如果计划缓存内存分配是根本原因，启用 `Optimize for Ad-hoc Workloads` 配置设置可以帮助解决此问题。\n\
  \nSQL Server 有三类内存对象。其中一些是在服务器范围内全局创建的。其他则按 NUMA 节点或按 CPU 进行分区。在 SQL Server 2016\
  \ 之前的版本中，您可以使用启动跟踪标志 `T8048` 将每个 NUMA 节点的分区切换为每个 CPU 的分区，这有助于减少 `CXMEMTHREAD` 等待，但代价是额外的内存使用。另一方面，SQL\
  \ Server 2016 在检测到争用时，会自动将这种分区提升到每个 NUMA 级别，然后是每个 CPU 级别，因此不需要 `T8048`。\n\n■ **注意**\
  \ 您可以阅读有关[非统一内存访问 (NUMA) 架构](http://technet.microsoft.com/en-us/library/ms178144.aspx)的更多信息。\n\
  \n清单 28-8 向您展示了如何分析内存对象的内存分配。如果您发现主要的内存消费者是按 NUMA 节点分区的，并且在系统中可以看到很大比例的 `CXMEMTHREAD`\
  \ 等待，您可以考虑应用 `T8048` 跟踪标志。这在每个 NUMA 节点有超过八个 CPU 的服务器场景中尤其重要，因为旧版本的 SQL Server 存在每个\
  \ NUMA 节点内存对象可伸缩性的已知问题。正如我已经提到的，此跟踪标志在 SQL Server 2016 中不需要。\n\n***清单 28-8.*** 分析内存对象分区和内存使用情况\n\
  \n```sql\nselect type, pages_in_bytes\n,case\nwhen (creation_options & 0x20 = 0x20)\n\
  then 'Global PMO. Cannot be partitioned by CPU/NUMA Node. T8048 not applicable.'\n\
  when (creation_options & 0x40 = 0x40)\nthen 'Partitioned by CPU. T8048 not applicable.'\n\
  when (creation_options & 0x80 = 0x80)\nthen 'Partitioned by Node. Use T8048 to further\
  \ partition by CPU.'\nelse 'Unknown'\nend as [Partitioning Type]\nfrom sys.dm_os_memory_objects\n\
  order by pages_in_bytes desc\n```\n\n■ **注意** 您可以阅读 Microsoft CSS 团队发布的一篇文章，该文章解释了[如何调试\
  \ `CXMEMTHREAD` 等待类型](http://blogs.msdn.com/b/psssql/archive/2012/12/20/how-it-works-cmemthread-and-debugging-them.aspx)。\n\
  \n## 高 CPU 负载\n\n尽管听起来很奇怪，但服务器上的低 CPU 负载并不一定是好兆头。它表明服务器未被充分利用。尽管未充分利用为系统留下了增长空间，但它增加了\
  \ IT 基础设施和运营成本；需要托管和维护更多的服务器。显然，高 CPU 负载也不好。持续对 SQL Server 施加 CPU 压力会使系统响应迟缓和缓慢。\n\
  \n有几个指标可以帮助您检测服务器是否在 CPU 压力下工作。这些包括高百分比的 `SOS_SCHEDULER_YIELD` 等待，当工作线程等待时发生...\n\
  \n\n运行就绪状态。您可以分析`% processor time`（处理器时间百分比）和`processor queue length`（处理器队列长度）性能计数器，并比较`sys.dm_os_wait_stats`视图中的信号等待时间和资源等待时间，如清单\
  \ 28-9 所示。\n\n信号等待表示等待 CPU 的时间，而资源等待表示等待资源（例如磁盘页面）的时间。尽管微软建议信号等待类型不应超过 25%，但我认为在繁忙系统中，15%到\
  \ 20%是更好的目标值。\n\n***清单 28-9.*** 比较信号等待与资源等待\n\n```\nselect\n    sum(signal_wait_time_ms)\
  \ as [Signal Wait Time (ms)]\n    ,convert(decimal(7,4), 100.0 * sum(signal_wait_time_ms)\
  \ / sum (wait_time_ms)) as [% Signal waits]\n    ,sum(wait_time_ms - signal_wait_time_ms)\
  \ as [Resource Wait Time (ms)]\n    ,convert(decimal(7,4), 100.0 * sum(wait_time_ms\
  \ - signal_wait_time_ms) / sum (wait_time_ms)) as [% Resource waits]\nfrom\n   \
  \ sys.dm_os_wait_stats with (nolock)\n```\n\n许多因素可能导致系统中的 CPU 负载，而糟糕的 T-SQL 代码是首要原因。命令式处理、游标、XQuery、多语句用户定义函数和复杂计算尤其消耗\
  \ CPU 资源。\n\n"
- "# 第 28 章 ■ 系统故障排除\n\n检测 CPU 最密集型查询的过程与检测未优化查询的过程非常相似。您可以使用`sys.dm_exec_query_stats`视图，如清单\
  \ 28-4 所示。 您可以按`total_worker_time`列对数据排序，该列可检测当前缓存计划中 CPU 最密集型查询。或者，您可以使用扩展事件，按\
  \ CPU 时间而非 I/O 指标来筛选数据。\n\n持续的重新编译是 CPU 负载的另一个来源。您可以检查`batch requests/sec`（批处理请求/秒）、`SQL\
  \ compilations/sec`（SQL 编译/秒）和`SQL recompilations/sec`（SQL 重新编译/秒）性能计数器，并使用以下公式计算计划重用率：\n\
  \n`Plan Reuse = (Batch Requests/Sec - (SQL Compilations/Sec - SQL Recompilations/Sec))\
  \ / Batch Requests/Sec`\n\n`Low plan reuse`（计划重用率低）在 OLTP 系统中表明存在大量即席活动，通常需要重构代码并参数化查询。然而，未优化的查询仍然是\
  \ CPU 负载的主要贡献者。对于未优化的查询，SQL Server 会处理大量数据，这无论如何都会消耗 CPU 周期。在大多数情况下，查询优化可以降低系统中的\
  \ CPU 负载。\n\n显然，糟糕的 T-SQL 代码也是如此。您应该减少命令式数据处理的量，避免多语句函数，并尽可能将计算和 XML 处理移至应用端。\n\n\
  ## 锁定与阻塞\n\n系统中过度的锁定和阻塞问题会呈现各种`LCK_M_*`等待类型。每种锁类型都有其对应的等待类型。例如，`LCK_M_U`表示更新（U）锁等待，这可能是未优化的数据修改查询的迹象。\n\
  \n我们已经介绍了如何排查系统中的锁定和阻塞问题。您需要使用`blocked process report`（阻塞进程报告）、`deadlock graph`（死锁图）事件和`sys.dm_tran_locks`视图来检测哪些进程参与了阻塞链，并找到阻塞的根本原因。在大多数情况下，这是由于未优化的查询造成的。\n\
  \n## 工作线程匮乏\n\n在极少数情况下，SQL Server 可能会遇到`worker thread starvation`（工作线程匮乏），即没有可用的工作线程来分配给新任务的情况。这种情况发生的一种场景是：某个任务获取并持有一个关键资源上的锁，该锁阻塞了大量其他任务/工作线程，使其保持挂起状态。当系统中的工作线程数量达到由`Maximum\
  \ Worker Thread`（最大工作线程）阈值定义的限制时，SQL Server 将无法创建新的工作线程，新任务将无法分配，从而产生`THREADPOOL`等待。\n\
  \n阻塞并非导致此情况发生的唯一原因。也可能达到限制\n\n\n## 第 28 章 系统故障排除\n\n当服务器面临内存压力和/或可用内存不足时，系统中的工作线程数量会减少。在这种情况下，工作线程被分配的任务会持续更长时间，等待内存授权（请检查\
  \ `RESOURCE_SEMAPHORE` 等待）或执行大量的物理 I/O 操作。最终，大量用户产生的高并发工作负载也可能耗尽工作线程池。\n\n通常，你需要找到问题的根本原因。虽然可以在\
  \ `SQL Server` 配置中增加 `最大工作线程数`，但这可能有用，也可能没用。例如，在刚刚描述的阻塞场景中，新创建的工作线程极有可能以与现有线程相同的方式被阻塞。更好的做法是调查阻塞问题的根本原因并加以解决。\n\
  \n![](img/index-578_1.jpg)\n\n你可以通过分析 `sys.dm_os_waiting_tasks` 或 `sys.dm_exec_requests`\
  \ 视图的结果来检查阻塞情况并定位阻塞会话。清单 28-10 展示了第一种方法。请记住，`sys.dm_exec_requests` 视图不会显示没有分配工作线程、且以\
  \ `THREADPOOL` 等待类型等待的任务。同样值得注意的是，工作线程匮乏可能会阻止任何连接到服务器。在这种情况下，你需要使用 `专用管理员连接 (DAC)`\
  \ 进行故障排除。我们将在本章后面讨论 `DAC`。\n\n`清单 28-10.` 使用 `sys.dm_os_waiting_tasks`\n\n```sql\n\
  select session_id, wait_type, wait_duration_ms, blocking_session_id, resource_description\n\
  from sys.dm_os_waiting_tasks with (nolock)\norder by wait_duration_ms desc\n```\n\
  \n如图 28-10 所示，阻塞会话的 ID 是 51。\n\n`图 28-10.` `sys.dm_os_waiting_tasks` 结果\n\n下一步，你可以使用\
  \ `sys.dm_exec_sessions` 和 `sys.dm_exec_connections` 视图来获取有关阻塞会话的信息，如清单 28-11 所示。你可以调查锁被保持的原因，和/或在需要时使用\
  \ `KILL` 命令终止该会话。\n\n`清单 28-11.` 获取有关阻塞会话的信息\n\n```sql\nselect\n    ec.session_id,\
  \ s.login_time, s.host_name, s.program_name, s.login_name\n    ,s.original_login_name,\
  \ ec.connect_time, qt.text as [SQL]\nfrom\n    sys.dm_exec_connections ec with (nolock)\n\
  \    join sys.dm_exec_sessions s with (nolock) on\n        ec.session_id = s.session_id\n\
  \    cross apply sys.dm_exec_sql_text(ec.most_recent_sql_handle) qt\nwhere\n   \
  \ ec.session_id = 51 -- 阻塞会话的会话 ID\n```\n\n值得一提的是，即使增加 `最大工作线程` 设置不一定能解决问题，升级到 64\
  \ 位版本的 `Windows` 和 `SQL Server` 总是值得的。64 位版本的 `SQL Server` 默认拥有更多可用的工作线程，并且它可以利用更多内存用于查询授权和其他组件。这减少了内存授权等待，使\
  \ `SQL Server` 更高效，因此能让任务更快完成执行并释放工作线程。\n\n然而，工作线程会消耗内存，这减少了可用于其他 `SQL Server` 组件的内存量。这通常不是问题，除非\
  \ `SQL Server` 运行在物理内存非常少的服务器上。如果是这种情况，你应该考虑为服务器增加更多内存。毕竟，这在如今是个廉价的解决方案。\n\n###\
  \ ASYNC_NETWORK_IO 等待\n\n当 `SQL Server` 生成数据的速度快于客户端应用程序消耗它的速度时，会发生 `ASYNC_NETWORK_IO`\
  \ 等待类型。虽然这可能是网络吞吐量不足的迹象，但在大量情况下，`ASYNC_NETWORK_IO` 等待的累积是由于客户端代码不正确或效率低下造成的。\n\n\
  一个这样的例子是从服务器读取过量的数据。客户端应用程序读取了不必要的数据，或者可能执行了客户端筛选，这增加了额外的负载并超出了网络吞吐量。\n\n"
- "# 第 28 章 ■ 系统故障排除\n\n另一种模式是读取并同时处理数据，如清单 28-12 所示。\n\n客户端应用程序逐行消费和处理数据，保持 `SqlDataReader`\
  \ 处于打开状态。因此，工作线程会等待客户端消费完所有行，从而产生 `ASYNC_NETWORK_IO` 等待类型。\n\n### 清单 28-12. 数据的读取与处理：不正确的实现\n\
  \n```csharp\nusing (SqlConnection connection = new SqlConnection(connectionString))\n\
  {\n    SqlCommand command = new SqlCommand(cmdText, connection);\n    connection.Open();\n\
  \    using (SqlDataReader reader = command.ExecuteReader())\n    {\n        while\
  \ (reader.Read())\n            ProcessRow((IDataRecord)reader);\n    }\n}\n```\n\
  \n处理这种情况的正确方法是，先尽可能快地读取所有行，然后在所有行都读取完毕后再进行处理。清单 28-13 说明了这种方法。\n\n### 清单 28-13.\
  \ 数据的读取与处理：正确的实现\n\n```csharp\nList<Orders> orderRows = new List<Orders>();\nusing\
  \ (SqlConnection connection = new SqlConnection(connectionString))\n{\n    SqlCommand\
  \ command = new SqlCommand(cmdText, connection);\n    connection.Open();\n    using\
  \ (SqlDataReader reader = command.ExecuteReader())\n    {\n        while (reader.Read())\n\
  \            orderRows.Add(ReadOrderRow((IDataRecord)reader));\n    }\n}\nProcessAllOrderRows(orderRows);\n\
  ```\n\n你可以在 Management Studio 中运行测试，连接到本地的 SQL Server 实例，轻松重现此行为。它将使用共享内存协议，不涉及任何网络流量。你可以使用命令\
  \ `DBCC SQLPERF ('sys.dm_os_wait_stats', CLEAR)` 清除服务器上的等待统计信息，然后运行一条读取大量数据的 `SELECT`\
  \ 语句，并在结果网格中显示。如果在执行后检查等待统计信息，你会看到大量的 `ASYNC_NETWORK_IO` 等待，这是因为网格显示性能缓慢，即使 Management\
  \ Studio 是运行在本地的 SQL Server 主机上。之后，你应该启用*执行后丢弃结果*配置设置来重复该测试。你应该会看到 `ASYNC_NETWORK_IO`\
  \ 等待消失了。\n\n如果你在系统中看到很大比例的 `ASYNC_NETWORK_IO` 等待，你应该检查网络性能并分析客户端代码。\n\n## 闩锁与自旋锁\n\
  \n闩锁是轻量级的同步对象，用于保护 SQL Server 内部数据结构的一致性。与保护事务数据一致性的锁相反，闩锁用于防止内存中的数据结构损坏。\n\n考虑一种情况：多个会话需要更新同一页数据上的不同行。这些会话不会相互阻塞，因为它们并未在同一对象上获取不兼容的锁。然而，SQL\
  \ Server 必须防止多个会话同时更新内存中的数据页结构，导致其不一致并损坏。此外，SQL Server 还需要防止其他会话在修改期间访问该数据页结构。SQL\
  \ Server 使用闩锁来实现这一点。\n\nSQL Server 中有五种不同的闩锁类型，如下所示：\n\n- `KP` – 保持闩锁确保被引用的结构不会被销毁。除了销毁（`DT`）闩锁外，它与任何其他闩锁类型都兼容。\n\
  - `SH` – 共享闩锁在线程需要读取数据结构时是必需的。共享闩锁彼此兼容，也与保持（`KP`）和更新（`UP`）闩锁兼容。\n- `UP` – 更新闩锁允许其他线程读取该结构，但防止更新该结构。SQL\
  \ Server 在某些场景中使用它们来提高并发性，类似于更新（`U`）锁。更新闩锁与保持（`KP`）和共享（`SH`）闩锁兼容，与任何其他类型不兼容。\n-\
  \ `EX` – 独占闩锁在修改数据结构时是必需的。从概念上讲，独占（`EX`）闩锁类似于独占（`X`）锁，它们\n\n\n"
- '# 第 28 章 ■ 系统故障排除


  与其他类型的闩锁不兼容，除了保留（`KP`）闩锁。


  `DT` – 销毁闩锁是销毁数据结构所必需的。例如，当 `lazy writer` 进程从缓冲池中移除一个数据页时，会获取一个销毁闩锁。这些闩锁与任何其他类型的闩锁都不兼容。


  当线程无法在数据结构上获得闩锁时，它会被放入 FIFO 队列，在那里保持挂起状态，生成一种与闩锁相关的等待类型，直到可以获得闩锁。我们将在稍后讨论这些类型。


  在具有 32 个或更多逻辑处理器的系统中，SQL Server 可以基于每个 CPU 对某些闩锁进行分区。这些分区的闩锁称为 `超级闩锁`，有时也称为 `子闩锁`。在这种情况下，每个逻辑
  CPU 维护其自己的闩锁对象状态和等待者列表，这提高了在引用结构上获取共享（`SH`）闩锁的性能。另一方面，获取排他（`EX`）闩锁需要跨所有超级闩锁分区进行同步，因此，与常规闩锁相比开销更大。


  SQL Server 根据活动情况动态地将闩锁提升为超级闩锁或从超级闩锁降级。对频繁读取的数据结构（例如，索引的根页）上的闩锁会快速提升为超级闩锁。繁重的修改操作（如页面拆分）可能会将这些超级闩锁降级回常规闩锁。


  闩锁产生的等待类型可以属于三个不同的类别。此外，在每个类别中，SQL Server 会根据闩锁类型使用不同的等待类型。你可以通过等待类型名称的后缀来确定闩锁类型。例如，`PAGELATCH_EX`
  等待类型表示数据页结构上的排他（`EX`）闩锁，而 `PAGELATCH_SH` 表示共享（`SH`）闩锁。


  这三种等待类型类别如下：


  `PAGEIOLATCH` – 表示与 I/O 相关的闩锁。SQL Server 在等待数据页从磁盘读入缓冲池时使用这些闩锁/等待类型。此类等待类型的高比例可能表明存在大量未优化的查询和/或次优的磁盘系统。我们已经在本章中介绍了如何对这些情况进行故障排除。


  `PAGELATCH` – 表示与缓冲池相关的闩锁，当线程需要访问或修改缓冲池中的数据和分配映射页时发生。


  `LATCH` – 所有与缓冲池无关的其他闩锁。


  导致 `PAGELATCH` 等待的两种主要情况。第一种是分配映射争用，最常发生在 `tempdb` 中，或者有时发生在具有高度易变数据的用户表中。正如我们已经在本书中讨论过的，你可以通过增加
  `tempdb` 和/或受影响文件组中的数据文件数量来解决此问题，并且在 SQL Server 2016 之前的版本中，可以通过启用跟踪标志 `T1118` 来防止混合区分配。


  第二种情况涉及数据上的始终递增或始终递减的索引，且并发插入活动非常高。考虑这样一种情况：你有一个表，该表在标识列上有一个索引，并且每秒接受数百或数千次插入。虽然这种设计大大减少了索引碎片，但所有会话都将数据插入到相同的数据页中，获取排他的
  `PAGELATCH_EX` 闩锁并相互阻塞。这种情况称为 `热区`，解决它的唯一方法是更改数据库架构并移除始终递增/始终递减的索引。


  当你看到 `PAGELATCH` 等待占比较高时，你应该定位发生争用的资源。你可以监控 `sys.dm_exec_requests` 视图中的 `wait_resource`
  列或 `sys.dm_os_waiting_tasks` 视图中的 `resource_description` 列，以获取相应的等待类型。这些列中的信息包括数据库
  ID、文件 ID 和页号，这将使你能够识别问题的根本原因。例如，`tempdb` 中的分配映射争用通常发生在 `PFS (2:1:1)` 和 `SGAM (2:1:3)`
  页上。




