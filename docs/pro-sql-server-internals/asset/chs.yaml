  \ 999 为前缀的行的查询执行计划\n\n如你所见，错误的基数估算可能导致效率极低的执行计划。过时的统计信息或许是导致基数估算错误的最常见原因之一。`你可以通过检查执行计划中的估计行数和实际行数来锁定其中一些情况。这两个值之间的巨大差异通常表明统计信息不正确。`\
  \ 更新统计信息可以解决此问题并生成更高效的执行计划。\n\n#### 统计信息与查询内存授予\n\nSQL Server 查询需要内存来执行。执行计划中的不同操作符有不同的内存需求。例如，索引扫描操作符逐行获取行，不需要在内存中存储多行。其他操作符——例如排序操作符——需要在开始执行前访问整个行集。\n\
  \nSQL Server 尝试基于行大小和基数估算来估计查询及其操作符所需的内存量（内存授予）。内存授予的正确性很重要。低估和高估都会引入效率问题。高估会浪费\
  \ SQL Server 内存。此外，在繁忙的服务器上，分配大额内存授予可能需要更长时间。\n\n另一方面，低估可能导致执行计划中的某些操作符内存不足。如果排序操作符没有足够的内存进行内存中排序，SQL\
  \ Server 会将行集溢出到 `tempdb` 并在那里排序数据。哈希表也会出现类似情况。SQL Server 在需要时会使用 `tempdb`。无论哪种情况，使用\
  \ `tempdb` 都会显著降低操作乃至整个查询的性能。\n\n让我们看一个例子，创建一个表并填充一些数据。代码清单 3-6 创建了表 `dbo.MemoryGrantDemo`\
  \ 并填充了 65,536 行数据。`Col` 列存储从 0 到 99 的值，每个值对应 655 或 656 行。在 `Col` 列上有一个非聚集索引，它是在\n\
  \n\n\n"
