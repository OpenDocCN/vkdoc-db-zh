  \ 0\nInt3 = [NULL]\n\n\n\n# 第四章 ■ 特殊索引与存储特性\n\n##### 页面压缩\n\n*页面压缩*的工作方式与行压缩不同。它应用于整个页面，但仅在页面已满且压缩能显著节省页面空间时才启用。此外，SQL\
  \ Server 不会在非叶索引级别使用页面压缩——当使用页面压缩时，这些级别会使用行压缩。\n\n页面压缩由三个不同的阶段组成。首先，SQL Server 对行执行行压缩。接下来，它通过定位并重用最常见的前缀来在列级执行*前缀压缩*，从而减小该列中值的数据大小。最后，SQL\
  \ Server 通过移除所有列中的所有重复数据来执行*字典压缩*。让我们深入研究前缀压缩和字典压缩。\n\n第一步，SQL Server 检测列数据中最常见的前缀，并找到使用该前缀的最长值。该值称为*锚点值*。页面上的所有其他行存储它们的值与锚点值之间的差异，而不是实际值。\n\
  \n让我们看一个例子，假设我们有一个四列的表，数据如表 4-4 所示。\n\n**表 4-4. 页面压缩：原始数据**\n\n| 列 1 | 列 2 | 列 3\
  \ | 列 4 |\n| :--- | :--- | :--- | :--- |\n| PALETTE | CAN | NULL | PONY |\n| PAL\
  \ | BALL | MILL | HORSE |\n| POX | BILL | MALL | TIGER |\n| PILL | BOX | MAN | BUNNY\
  \ |\n\n对于第一列，最常见的前缀是 *P*；因此 *PALETTE* 是锚点值。SQL Server 将锚点值存储为空的非空字符串（在随后的表中用 <>\
  \ 表示锚点值）。所有其他值都基于前缀进行存储。例如，值 *PILL* 存储为 <1><ILL>，表示它应使用锚点值的一个字母作为前缀，后跟 *ILL*。值 *PAL*\
  \ 存储为 <3><>，表示它仅使用锚点值的三个字母。如果未找到可用的前缀，SQL Server 不存储锚点值，所有数据按原样存储。\n\n表 4-5 说明了应用前缀压缩后的页面数据。\n\
  \n![](img/index-126_1.jpg)\n\n图 4-18 说明了行中的数据。请记住，多字节值以字节交换顺序存储，类似于 FixedVar 格式。此外，CD\
  \ 数组中的四位部分也在每个字节内交换。\n\n**图 4-18. 行压缩：行数据**\n\n然而，有一个非常重要的注意事项。在某些情况下，压缩可能会增加行的大小。考虑一种情况，你有一个包含多个固定长度列的表，这些列根据数据类型使用了所有存储空间。考虑存储非零值的\
  \ `tinyint` 列、存储两字节值的 `smallint` 列，或始终使用八字节的 `datetime` 列。这些列不会从行压缩中受益，实际上，行压缩会在\
  \ CD 数组中为每列使用额外的四位，而 FixedVar 格式则没有这额外开销。幸运的是，这些情况相对较少，行压缩通常能显著节省空间。\n\n最后，值得重申的是，默认类型值（例如，`int`\
  \ 和 `bit` 数据类型的零）除了 CD 区域中的四位外，不使用其他存储空间。\n\n![](img/index-127_1.jpg)\n\n\n# 第四章\
  \ ■ 特殊索引与存储功能\n\n*表 4-5.* `页面压缩：前缀压缩后的数据`\n\n| *列 1* | *列 2* | *列 3* | *列 4* |\n\
  | :--- | :--- | :--- | :--- |\n| 锚点值 | PALETTE | BALL | MALL |\n| NULL | <><> |\
  \ <><CAN> | NULL |\n| PONY | <3><> | <><> | <1><ILL> |\n| HORSE | <1><OX> | <1><ILL>\
  \ | <><> |\n| TIGER | <1><ILL> | <1><OX> | <2><N> |\n| BUNNY | | | |\n\n在字典压缩过程中，SQL\
  \ Server 会检测页面上所有数据中的相同模式，并用字典条目替换它们，如 `表 4-6` 所示。此过程与数据类型无关，适用于字节序列。该行仍在使用 CD 数据格式。CD\
  \ 数组存储值 13 (0xC) 以表示该行值已被字典条目替换。\n\n*表 4-6.* `页面压缩：字典压缩后的数据`\n\n| *列 1* | *列 2*\
  \ | *列 3* | *列 4* |\n| :--- | :--- | :--- | :--- |\n| 字典实体: [D1]: <1><OX>; [D2]:<1><ILL>\
  \ | <><> | <><CAN> | NULL |\n| PONY | <3><> | <><> | [D2] |\n| HORSE | [D1] | [D2]\
  \ | <><> |\n| TIGER | [D2] | [D1] | <2><N> |\n| BUNNY | | | |\n\n锚点值和字典值都是可选的。如果数据模式重复不够频繁，SQL\
  \ Server 不会创建其中任意一个或两者都不创建。\n\n当页面被压缩时，SQL Server 会在页面头之后添加另一个隐藏行，称为 `压缩信息（CI）记录`。`图\
  \ 4-19` 展示了其格式。\n\n*图 4-19.* `压缩信息记录格式`\n\n*   `Header` 是一个位掩码，指示 CI 记录的版本以及是否存在锚点记录和/或字典条目。\n\
  *   `PageModCount` 指示页面被压缩后发生的更改次数。SQL Server 会在 25 次修改后，或者当修改次数超过页面上行数的 25% 时，尝试重新压缩页面并重建\
  \ CI 记录。\n*   `Offsets` 是一个数组，存储 CI 记录中锚点记录和/或字典条目的起始偏移量和结束偏移量。\n*   `Anchor Record`\
  \ 是另一个 CD 格式的行，每一列代表特定表列的锚点值。\n*   `Dictionary` 存储字典条目的数组，由三部分组成：条目数量、它们的偏移量以及实际值。\n\
  \n如前所述，SQL Server 仅当页面已满且压缩能带来显著的空间节省时，才会以页面压缩格式存储数据。当页面已满时，SQL Server 执行压缩并评估新压缩的页面是否能比压缩前多存储五行或多存储\
  \ 25% 的行。如果是这种情况，则保留页面压缩，SQL Server 以页面压缩格式存储数据。否则，页面压缩将被丢弃，数据以行压缩格式存储。\n\n当 CI\
  \ 记录中的 `PageModCount` 超过阈值时，也会发生相同的过程。SQL Server 尝试重新压缩页面，评估空间节省情况，并决定保留或丢弃结果。\n\
  \n**注意** 您可以在 `sys.dm_db_index_operational_stats` DMF 中的 `page_compression_attempt_count`\
  \ 和 `page_compression_success_count` 列中查看页面压缩统计信息。\n\n最后，无论是数据修改的事务日志记录，还是 tempdb\
  \ 中的版本存储，都不支持页面压缩。每当需要将一行放入版本存储或写入事务日志时，SQL Server 都需要解压缩页面并移除锚点和字典记录。当使用乐观隔离级别或\
  \ AFTER 触发器，或者压缩数据被频繁修改时，这可能会引入额外的性能影响。\n\n**注意** 我们将在第 9 章“触发器”和第 21 章“乐观隔离级别”中更详细地讨论版本存储。事务日志内部原理将在第\
  \ 30 章“事务日志内部原理”中介绍。\n\n# 性能考虑\n\n数据压缩可以显著减少数据所需的存储空间，但代价是额外的 CPU 开销。\n\n\nload。无论使用何种压缩类型，SQL\
  \ Server 都需要更多时间来访问行数据。这并不一定意味着查询执行时间会增加，因为在许多情况下，由于需要扫描的数据页更少且执行的 I/O 读取更少，查询运行得甚至更快。然而，批量数据修改和索引维护例程的性能可能会受到负面影响。\n\
  \n让我们做一些测试，看看数据压缩如何影响存储大小和查询执行时间。我使用了来自某个生产表的数据，该表包含大量定长和变长列。显然，不同的表结构和数据分布会导致略有不同的结果。然而，在大多数情况下，您会看到相似的模式。\n\
  \n## 第 4 章 ■ 特殊索引与存储特性\n\n为了开始测试，我创建了三个不同的堆表，并向每个表插入了一百万行数据。之后，我创建了具有不同压缩设置和 `FILLFACTOR=100`\
  \ 的聚集索引。此工作流程导致数据页完全填充且索引碎片为零。\n\n在第一次测试中，我运行 `SELECT` 语句来扫描所有聚集索引，访问部分行数据。第二次测试更新了表中的每一行，以不增加行大小的方式更改了定长列的值。第三次测试向表中插入了另一批一百万行数据。最后，我重建了所有聚集索引。\n\
  \n您可以在表 4-7 中看到执行统计信息。所有测试均在缓存预热的情况下运行，数据页已缓存在缓冲池中。冷缓存可能会减少针对压缩数据和非压缩数据的查询之间的执行时间差异，因为针对压缩数据的查询执行的物理\
  \ I/O 更少。\n\n**表 4-7.** 数据压缩、存储空间与性能\n\n**大小（MB）** | **平均行大小（字节）** | **SELECT 耗时（毫秒）**\
  \ | **UPDATE 耗时（毫秒）** | **INSERT 耗时（毫秒）** | **索引重建耗时（毫秒）**\n--- | --- | --- | ---\
  \ | --- | ---\n无压缩 | 3,745 | 12,596 | 21,537 | |\n行压缩 | 12,618 | 17,808 | 33,074\
  \ | |\n页压缩 | 36,690 | 39,121 | 76,694 | |\n\n所有语句都通过使用 `MAXDOP 1` 查询提示强制在单个 CPU\
  \ 上运行。使用并行性会减少查询执行时间；但是，它也会在查询执行期间增加并行性管理的开销。我们将在本书后面讨论这种开销。\n\n如您所见，即使没有涉及物理 I/O，数据压缩也提高了读取和扫描数据的查询的性能。这使我们得出结论：读取压缩数据给系统带来的开销非常小。然而，压缩降低了数据修改的性能；因此，压缩数据代价高昂，尤其是在使用页压缩时。\n\
  \n然而，CPU 开销并不是唯一需要考虑的因素。压缩减少了行的大小以及存储它们所需的数据页数量。压缩索引在缓冲池中占用的空间更少，这允许您在系统中缓存更多数据。即使涉及所有数据修改开销，压缩也可以显著减少物理\
  \ I/O 量，并由于这种缓存而改善系统性能。此外，数据压缩减小了数据库的大小，从而也减小了备份文件的大小及其存储成本。\n\n显然，在谈到使用数据压缩时，不可能提供通用的建议。在某些情况下，尤其是对于\
  \ CPU 负载过重的服务器，压缩可能会降低系统性能。然而，在大多数情况下，压缩将使系统受益。当数据易变时，行压缩通常是一个不错的选择。另一方面，页压缩更适合静态数据。但是，您应该单独分析每种情况，考虑\
  \ CPU 和 I/O 负载、数据修改模式以及各种其他因素。\n\n您还应该估算压缩实际为您节省了多少空间。如果节省的空间微乎其微，就没有必要压缩数据。行压缩减少了定长数据使用的存储空间。它对变长数据存储空间的帮助不大。页压缩的结果取决于数据本身，而不是数据类型。最后，两种数据压缩方法都只适用于行内数据，它们不会压缩存储在行溢出和\
  \ LOB 页中的数据。\n\n根据经验，当能带来空间节省时，我通常为所有易变索引启用行压缩，并为具有静态数据的索引启用页压缩。当系统中活动数据的大小超过可用内存量时，即使数据是易变的，我也会考虑启用页压缩。正如我已经提到的，压缩允许\
  \ SQL Server 在缓冲池中缓存更多数据，从而减少物理 I/O 活动并提高系统性能，即使涉及所有数据修改开销。\n\n## 第 4 章 ■ 特殊索引与存储特性\n\
  \n■ **提示** 当您处理大量使用定长数据类型的第三方系统时，数据压缩可能很有用。例如，一些独立软件供应商使用定长 `char` 数据类型来存储文本信息。在这里实现数据压缩可以显著减少表存储空间，并透明地提高应用程序的性能。\n\
  \n您可以使用 `sp_estimate_data_compression_savings` 存储过程来估算行压缩和页压缩的空间节省。此过程将数据样本复制到 `tempdb`\
  \ 并应用所需的数据压缩方法，从而估算空间节省。显然，如果数据分布不均匀，它可能会产生不正确的结果。我将估算数据库中所有索引的压缩空间节省的脚本包含在本书的配套资料中。\n\
  \n您可以基于每个索引应用不同的数据压缩方法。对于分区表，压缩可以基于每个分区应用。例如，您可能决定对包含易变操作数据的分区使用行压缩或完全不压缩，而对静态存档数据使用页压缩。\n\
  \n■ **注意** 我们将在第 16 章“数据分区”中讨论分区表和其他数据分区技术。\n\n#### 稀疏列\n\n`稀疏列` 于 SQL Server 2008\
  \ 中引入，具有一种针对 `NULL` 值存储进行优化的特殊存储格式。您会记得，在没有数据压缩的情况下，定长列即使存储 `NULL` 值也始终使用相同的存储空间。变长列使用的空间量基于值的大小，外加在变长偏移数组中的额外两个字节。\n\
  \n当列被定义为 `稀疏` 时，如果它为 `NULL`，则不使用任何存储空间，代价是在 `NOT NULL` 值的情况下会有额外的存储开销。对于定长数据类型，此存储开销为四个字节；对于变长数据类型，为两个字节。\n\
  \n■ **注意** 即使 `NULL` 定长数据类型在定义为稀疏时不使用存储空间，您也不应将它们与变长数据类型互换使用。稀疏 `char` 列在 `NOT NULL`\
  \ 时将存储在行内，并计入 8,060 字节的最大行大小限制。或者，稀疏 `varchar` 列在需要时可以存储在行溢出页中。\n\n稀疏列数据存储在行中一个称为\
  \ `稀疏向量` 的特殊部分。我不打算深入探讨稀疏向量的内部存储格式，但我想提到它位于行的变长部分之后。此外，稀疏向量增加了额外的存储开销，这增加了行的大小并计入\
  \ 8,060 字节的限制。\n\n\n\n# 第四章 ■ 特殊索引与存储特性\n\n## 表 4-8. 非稀疏列与稀疏列的空间占用\n\n**数据类型** |\
  \ **非稀疏存储空间（字节）** | **非空时稀疏存储空间（字节）** | **NULL 百分比**\n:--- | :--- | :--- | :---\n\
  Bit | 0.125 | 4.125 | 98%\nTinyint | 1 | 4 | 86%\nSmallint | 2 | 6 | 76%\nDate |\
  \ 3 | 6 | 69%\ntime(0) | 3 | 6 | 69%\nInt | 4 | 8 | 64%\nReal | 4 | 8 | 64%\nSmallmoney\
  \ | 4 | 8 | 64%\nSmalldatetime | 4 | 8 | 64%\ntime(7) | 5 | 8 | 60%\ndecimal/numeric(1,s)\
  \ | 5 | 8 | 60%\ndatetime2(0) | 6 | 8 | 57%\nBigint | 8 | 12 | 52%\nFloat | 8 |\
  \ 12 | 52%\nMoney | 8 | 12 | 52%\nDatetime | 8 | 12 | 52%\ndatetime2(7) | 8 | 12\
  \ | 52%\ndatetimeoffset(0) | 8 | 12 | 52%\ndatetimeoffset(7) | 10 | 14 | 49%\nUniqueidentifier\
  \ | 16 | 20 | 43%\ndecimal/numeric(38,s) | 17 | 20 | 42%\n可变长度类型 | 2 + 平均数据大小 |\
  \ 4 + 平均数据大小 | 60%\n\n稀疏列允许创建包含多达 30,000 列的宽表。某些系统——例如 Microsoft SharePoint——使用宽表来存储半结构化数据。\n\
  \n举个例子，设想一个存储不同类型文档的表。每种文档类型都有自己定义的一组属性/列。某些属性，如 *文档编号* 和 *创建日期*，存在于每种文档类型中，而其他属性则对特定类型是唯一的。\n\
  \n如果你决定将所有文档保存在单个表中，可以将通用属性定义为常规的非稀疏列，将与文档类型相关的属性定义为稀疏列。当大量属性存储 `NULL` 值时，这种方法可以显著减小表行的大小。\n\
  \n值得一提的是，在这种情况下，除了宽表之外，你还可以选择其他设计方案。你可以考虑将不同的文档类型存储在单独的表中，并用另一个表来存储通用的文档属性。或者，你可以使用\
  \ XML 来存储部分属性，或者将它们逆透视到另一个名称/值对表中。每种方法根据业务和功能需求都有其优缺点。\n\n每个表仍然有最多 1,024 个非稀疏列的限制。此外，行的行内部分不得超过\
  \ 8,060 字节。\n\n在代码中管理大量稀疏列可能会变得很麻烦。作为解决方法，SQL Server 允许你定义一个名为 `COLUMN_SET` 的指定列。可以将\
  \ `COLUMN_SET` 列视为一个未类型的、计算得出的 `XML` 列，它包含了行中 `NOT NULL` 稀疏列的信息。\n\n`COLUMN_SET`\
  \ 列改变了 `SELECT *` 操作的行为。当指定了它时，SQL Server 不会在结果集中包含单独的稀疏列，而是返回一个 `COLUMN_SET` 列。此外，如果你向表中添加新的稀疏列，它们会出现在结果集中。\n\
  \n清单 4-28 展示了一个例子。代码创建了两个带稀疏列的表——一个包含 `COLUMN_SET`——并用相同的数据填充它们。\n\n### 清单 4-28.\
  \ 稀疏列：COLUMN_SET——表创建\n\n```sql\ncreate table dbo.SparseDemo\n(\n    ID int not\
  \ null,\n    Col1 int sparse,\n    Col2 varchar(32) sparse,\n    Col3 int sparse\n\
  );\n\ncreate table dbo.ColumnSetDemo\n(\n    ID int not null,\n    Col1 int sparse,\n\
  \    Col2 varchar(32) sparse,\n    Col3 int sparse,\n    SparseColumns xml column_set\
  \ for all_sparse_columns\n);\n\ninsert into dbo.SparseDemo(ID,Col1) values(1,1);\n\
  insert into dbo.SparseDemo(ID,Col3) values(2,2);\ninsert into dbo.SparseDemo(ID,Col1,Col2)\
  \ values(3,3,'Col2');\n\ninsert into dbo.ColumnSetDemo(ID,Col1,Col2,Col3)\nselect\
  \ ID,Col1,Col2,Col3 from dbo.SparseDemo;\n```\n\n下一步，让我们使用 `SELECT *` 操作符从这些表中选择数据，如清单\
  \ 4-29 所示。\n\n### 清单 4-29. 稀疏列：COLUMN_SET——select *\n\n```sql\nselect 'SparseDemo'\
  \ as [Table], * from dbo.SparseDemo;\nselect 'ColumnSetDemo' as [Table], * from\
  \ dbo.ColumnSetDemo;\n```\n\n\n# 第 4 章 特殊索引与存储特性\n\n图 4-20 展示了结果。如你所见，当你从第二个表中选择数据时，结果集中不会出现独立的稀疏列。\n\
  \n![](img/index-133_1.jpg)\n\n![](img/index-133_2.jpg)\n\n图 4-20. 稀疏列：COLUMN_SET\
  \ 与选择查询\n\n你可以通过 `COLUMN_SET` 列插入或更新稀疏列。代码清单 4-30 展示了一个示例，图 4-21 显示了执行结果。\n\n**代码清单\
  \ 4-30.** 稀疏列：使用 COLUMN_SET 操作数据\n\n```sql\ninsert into dbo.ColumnSetDemo(ID, SparseColumns)\n\
  values(4, '<col1>4</col1><col2>Insert data through column_set</col2>');\n\nupdate\
  \ dbo.ColumnSetDemo\nset SparseColumns = '<col2>Update data through column_set</col2>'\n\
  where ID = 3;\n\nselect ID, Col1, Col2, Col3 from dbo.ColumnSetDemo where ID in\
  \ (3,4);\n```\n\n图 4-21. 稀疏列：使用 COLUMN_SET 操作数据\n\n通过 `COLUMN_SET` 处理稀疏列可以简化开发和数据库管理，尤其是在表结构因业务或功能需求而发生变化时。\n\
  \n**注意：** `COLUMN_SET` 列存在一系列限制。详情请阅读此文档：[`technet.microsoft.com/en-us/library/cc280521.aspx`](http://technet.microsoft.com/en-us/library/cc280521.aspx)。\n\
  \n对于稀疏列，常规索引由于存在大量 `NULL` 值而效率低下。你应该改用筛选索引。即使在被索引的行只占极小子集的情况下，使用大量筛选索引也可能是可接受的，并且不会引入显著的数据修改和维护开销。\n\
  \nMicrosoft 建议，只有当与非稀疏实现相比，净空间节省至少达到 20%至 40%时，才实施稀疏列。然而，稀疏列是有成本的。某些 SQL 功能，如复制、更改跟踪和变更数据捕获，在处理稀疏列和/或列集时会受到限制。此外，包含稀疏列的表无法被压缩。\n\
  \n处理稀疏列时需要监控数据。列中 `NULL` 值的百分比可能会随时间变化，这会使稀疏列变得低效。\n\n对于 SQL Server 企业版，当目标是减少那些主要存储\
  \ `NULL` 值的定长列所占用的存储空间时，我倾向于使用数据压缩而不是稀疏列。在此用例中，数据压缩与稀疏列一样能减少存储空间，同时，它对其他 SQL Server\
  \ 功能是透明的。\n\n#### 总结\n\n当 SQL Server 预计需要大量键或 RID 查找操作时，它不会使用非聚集索引。你可以通过向索引添加列，使其成为查询的覆盖索引来消除这些操作。这是一种出色的优化技术，可以显著提升系统性能。\n\
  \n然而，向索引添加包含列会增加叶级行的大小，这将对扫描数据的查询性能产生负面影响。它还会引入额外的索引维护开销，减慢数据修改操作，并增加系统中的锁定。\n\n\
  筛选索引允许你仅索引数据的一个子集，从而减少索引存储大小和维护成本。SQL Server 在筛选索引方面存在一些设计限制。尽管不是必须，但你应该将筛选条件中的所有列都作为叶级索引行的一部分，以防止生成次优的执行计划。\n\
  \n对筛选条件中列的修改不会增加统计信息的列修改计数器，这可能导致统计信息不准确。你需要将此行为纳入系统的统计信息维护策略中考虑。\n\n\n# SQL Server\
  \ 2016 特性\n## Dmitri Korotkevitch with Thomas Grohser\n\n筛选统计信息能够帮助你在查询谓词高度相关的情况下提升**基数估计**的准确性。不过，它们具有与筛选索引相同的局限性。\n\
  \nSQL Server 的企业版支持两种不同的数据压缩方法。行压缩通过移除行中未使用的存储空间来减小数据行的大小。页压缩则通过移除数据页中重复的字节序列来实现压缩。\n\
  \n数据压缩能显著减少表的存储空间，代价是额外的 CPU 负载，尤其是在修改数据时。然而，压缩数据在缓冲池中占用的空间更少，并且需要更少的 I/O 操作，这可以提升系统的性能。即使数据经常变动，在非\
  \ CPU 瓶颈的系统上，行压缩也是一个不错的选择。页压缩则非常适合静态数据。\n\n稀疏列可以在某些列主要存储`NULL`值时减少行大小。稀疏列在存储`NULL`值时不占用存储空间，代价是存储`NOT\
  \ NULL`值时需要额外的存储空间。\n\n虽然稀疏列允许创建包含数千列的宽表，但你需要谨慎使用它们。仍然存在`8,060 字节`的行内数据大小限制，这可能会阻止你插入或更新某些行。此外，当需要频繁更改架构时，宽表通常会带来开发和管理上的开销。\n\
  \n最后，你应该监控存储在稀疏列中的数据，确保`NOT NULL`数据的百分比没有增加，这将使稀疏存储的效率低于非稀疏存储。\n\n本章概述了 SQL Server\
  \ 2016 的几个新特性，例如时态表、伸缩数据库、行级安全、动态数据掩码和始终加密。\n\n#### 时态表\n\n当今的大多数系统都在处理随时间变化的数据。新数据被收集并插入系统，旧数据被清除，目录实体被修改。\n\
  \n系统中通常存在两个需求。第一个是保留任何数据更改的审计跟踪，提供关于谁在何时更改了什么信息。基于现有技术（如 SQL Audit、变更跟踪和变更数据捕获）有许多构建此解决方案的方法。基于触发器的自定义实现也很常见。\n\
  \n不幸的是，在某些情况下，仅保留更改的审计跟踪是不够的。一些系统——例如，库存管理或金融投资组合管理解决方案——需要能够在任何特定时间点访问数据的快照。可以从审计跟踪表中重建此类快照；然而，这是一项复杂且容易出错的工作，尤其是在涉及多个相关表时。\n\
  \n系统版本化时态表是新的用户表类型，有助于实现这些需求。它们旨在保留数据更改的完整历史，并便于进行时间点分析。\n\n### 系统版本化与应用版本化时态表\n\
  \n`ANSI SQL 2011`定义了两种类型的时态表。系统版本化时态表根据更改在系统中发生的时间来保留数据更改的历史记录。它们为你提供数据库在特定时间存在的数据的快照。而应用版本化时态表则从业务角度为你提供一个有效的数据快照。\n\
  \n以保险系统为例。每份保险单都有生效日期，定义了保单开始和失效（或将要失效）的时间。应用版本化时态表可以帮助识别在特定时间点生效的保单。系统版本化时态表则可以帮助查找在特定时间点存在于数据库中的保单数据行，无论该保单当时是否生效。\n\
  \n\n\n# 第五章 SQL SERVER 2016 功能\n\n## 概述\n\n每个系统版本化的时态表由两个表组成——包含当前数据的**当前表**，和存储行旧版本的**历史表**。每次在当前表中修改或删除数据时，`SQL\
  \ Server`会将这些行的原始版本添加到历史表中。\n\n当前表必须始终定义有主键。此外，当前表和历史表都应有两个`datetime2`列，称为**周期列**，用于指示行的生命周期。`SQL\
  \ Server`根据事务开始时间自动填充这些列。当一行在一个事务中被多次修改时，`SQL Server`不会在历史表中保留未提交的中间行版本。\n\n值得注意的是，周期列始终存储事务开始时间，而不是实际的`DML`操作时间。当事务修改多个相关实体时（例如`Orders`和`OrderLineItems`），这提供了时间点一致性。然而，这也引出了另一种现象，我们将在本章后面讨论。\n\
  \n## 创建历史表的方式\n\n有三种方式可以创建历史表。\n\n1.  **允许`SQL Server`生成匿名历史表**：在创建时态表时省略其名称。`SQL\
  \ Server`随后会创建一个历史表，并自动生成其名称。\n2.  **指定历史表的名称和架构**：允许`SQL Server`创建对应的表。\n\n在这两种情况下，`SQL\
  \ Server`都会将历史表放置在默认文件组上，并在控制行生命周期的两个`datetime2`列上创建非唯一的聚集索引。它不会在该表上创建任何其他索引。\n\n\
  > **重要提示**\n> 在企业版和开发版中，历史表默认使用页面压缩。除非你重建索引以移除数据压缩，否则你将无法在`SQL Server`的较低版本中还原数据库。\n\
  \n3.  **指定现有的表作为历史表**：前提是表架构兼容。可以预见，这种方法在配置上提供了最大的灵活性。\n\n代码清单 5-1 展示了通过指定历史表架构和表名来创建时态表的代码。其中与时态表相关的新语言构造以粗体显示。\n\
  \n### 代码清单 5-1 创建时态表\n\n```sql\ncreate table dbo.Employees\n(\n    EmployeeId int\
  \ not null,\n    FullName nvarchar(128) not null,\n    Position nvarchar(128) not\
  \ null,\n    Salary money not null,\n    SysStartTime datetime2\n        generated\
  \ always as row start not null\n    ,\n    SysEndTime datetime2\n        generated\
  \ always as row end not null\n    ,\n    constraint PK_Employees\n        primary\
  \ key clustered(EmployeeId)\n    period for system_time(SysStartTime, SysEndTime)\n\
  )\nwith\n(\n    system_versioning = on (history_table = dbo.EmployeesHistory)\n\
  );\n\ncreate nonclustered index IDX_Employees_FullName\non dbo.Employees(FullName);\n\
  ```\n\n![图片](img/index-137_1.jpg)\n\n![图片](img/index-137_2.jpg)\n\n图 5-1 展示了`SSMS`中的当前表和历史表，并显示了在历史表上定义的聚集索引的属性。\n\
  \n### 图 5-1 SSMS 中的时态表\n\n当前表和历史表在逻辑上是相互链接的，并且应具有匹配的列集。然而，在物理存储和索引方面没有依赖关系。这些表可以各自拥有不同的索引集，位于不同的文件组中，甚至使用不同的存储技术。例如，可以为历史数据使用聚集列存储索引，同时在当前表中保持基于行的存储。\n\
  \n***\n\n*注：原始文本中包含一些无法解析的内部文档链接，已在处理中移除或调整为更通用的引用。图片引用已按原文保留。*\n\n\n\n# 第 5 章 ■\
  \ SQL SERVER 2016 功能特性\n\n然而，历史表不能拥有唯一索引或外键与表约束，也不能参与变更跟踪、变更数据捕获，或事务复制与合并复制。在索引和统计维护方面，你应该像对待常规表一样对待历史表，我们将在下一章讨论这个主题。\n\
  \n当你修改当前表的架构时，变更会传播到历史表。但是，在你使用 `ALTER TABLE SET (SYSTEM_VERSIONING = OFF)` 命令停止系统版本控制之前，无法删除时态表。此命令会将一个时态表转换为数据库中的两个常规表。\n\
  \n当你在当前表中更新或删除数据时，SQL Server 会将受影响的行复制到历史表。图 5-2 展示了 `DELETE FROM dbo.Employees\
  \ WHERE EmployeeId = @EmployeeId` 语句的执行计划，其中包含对历史表的*聚集索引插入*操作。另外需要注意的是，SQL Server\
  \ 不会在历史表中存储行的当前版本，因此，`INSERT` 语句不会向那里插入数据。\n\n`图 5-2.` DELETE 语句的执行计划\n\n![](img/index-138_1.jpg)\n\
  \n![](img/index-138_2.jpg)\n\n当你从时态表中选择数据时，SQL Server 会根据查询访问一个或两个表。让我们看几个例子，首先，让我们像清单\
  \ 5-2 所示，用一些数据填充 `dbo.Employees` 表。图 5-3 显示了代码中 `SELECT` 语句的输出。需要注意的是，SQL Server\
  \ 在生成周期列值时使用的是 UTC 时间。\n\n`清单 5-2.` 用数据填充时态表\n\n```\ninsert into dbo.Employees(EmployeeId,\
  \ FullName, Position, Salary)\nvalues\n(1,'John Doe','Database Administrator',85000),\n\
  (2,'David Black','Sr. Software Developer',95000),\n(3,'Mike White','QA Engineer',75000);\n\
  \nwaitfor delay '00:01:00.000';\n\nupdate dbo.Employees set Salary = 85500 where\
  \ EmployeeID = 1;\n\ndelete from dbo.Employees where EmployeeId = 2;\n\nselect 'dbo.Employees'\
  \ as [Table], * from dbo.Employees;\n\nselect 'dbo.EmployeesHistory' as [Table],\
  \ * from dbo.EmployeesHistory;\n```\n\n你可以直接查询历史数据；但是，你应该记住它不包含行的*当前*版本。图 5-3 刚好说明了这一点——在\
  \ `dbo.EmployeesHistory` 表中，*John Doe* 只有一条旧记录，而 *Mike White* 则没有任何数据。\n\n`图 5-3.`\
  \ 表中的数据\n\n默认情况下，当你查询当前表时，查询作用于数据的当前快照，其行为类似于常规表，并且不会访问历史数据。图 5-4 说明了这一点。\n\n`图\
  \ 5-4.` 不使用 `FOR SYSTEM_TIME` 子句查询时态表\n\n你可以通过指定 `SELECT` 的 `FOR SYSTEM_TIME` 子句来访问历史数据。有几种可能的选项。\n\
  \n![](img/index-139_1.jpg)\n\n![](img/index-139_2.jpg)\n\n`FOR SYSTEM_TIME AS OF\
  \ <time>` 选项返回与系统中特定时间点相对应的数据快照。SQL Server 在执行 `SELECT` 时会组合两个表中的数据。图 5-5 展示了 `SELECT\
  \ * FROM dbo.Employees FOR SYSTEM_TIME AS OF '2016-07-09T17:57:00'` 语句的输出和执行计划。如你所见，数据代表的是初始插入之后、清单\
  \ 5-2 所见的数据修改之前的状态。\n\n`图 5-5.` 查询时态表：`FOR SYSTEM_TIME AS OF`\n\n如图 5-5 所示，SQL Server\
  \ 会在两个表的周期列上添加谓词。当你在查询中使用 `FOR SYSTEM_TIME` 选项时，你应该为这些列添加索引。\n\n`FOR SYSTEM_TIME\
  \ FROM <starttime> TO <endtime>` 和 `FOR SYSTEM_TIME BETWEEN <starttime>`\n\n\n\n\
  # 第 5 章 ■ SQL SERVER 2016 特性\n\n`AND` 和 `<endtime>` 子句返回在特定时间间隔内存在的所有版本的行。它们的区别在于\
  \ `FOR SYSTEM_TIME FROM` 会从输出中排除 `<endtime>`，而 `FOR SYSTEM_TIME BETWEEN` 会将其包含在内。图\
  \ 5-6 对此进行了说明。\n\n**图 5-6.** 查询时态表：`FOR SYSTEM_TIME FROM` 和 `FOR SYSTEM_TIME BETWEEN`\n\
  \n![](img/index-140_1.jpg)\n\n`FOR SYSTEM_TIME CONTAINED IN` 选项返回在特定时间间隔内有效的所有行版本。它不包含任何当前版本，并且应仅与历史表一起使用。图\
  \ 5-7 展示了一个带有 `FOR SYSTEM_TIME CONTAINED IN` 子句的查询的执行计划。\n\n尽管它在当前表上包含了聚集索引扫描操作符，但筛选器操作符阻止了它的执行。\n\
  \n**图 5-7.** 查询时态表：`FOR SYSTEM_TIME CONTAINED IN`\n\n最后，`FOR SYSTEM_TIME ALL` 会将来自两个表的数据连接起来并返回给客户端。当您需要访问行的所有版本——包括当前版本和所有历史版本时，这可能很有用；例如，在分析随时间变化的趋势时。图\
  \ 5-8 对此进行了说明。\n\n![](img/index-141_1.jpg)\n\n**图 5-8.** 查询时态表：`FOR SYSTEM_TIME\
  \ ALL`\n\n我想重申一个非常重要的点。使用 `FOR SYSTEM_TIME` 子句访问时态数据会在当前表和历史表的时段列上添加谓词。您需要将其纳入系统的索引策略中考量。\n\
  \n在处理访问时态数据的查询时，还有另一个需要注意的现象。正如我已经提到的，SQL Server 使用对应于插入、更新或删除数据的事务开始时间来填充时段列。因此，时态查询可能会返回在特定时间点尚未提交的数据。\n\
  \n考虑一种情况，您有一个在时间 `TStart` 开始并在时间 `TEnd` 提交的事务。此事务所做的数据修改对其他会话是不可见的，除非它们使用 `READ\
  \ UNCOMMITTED` 事务隔离级别。根据隔离级别，这些会话要么会被阻塞，要么会读取在 `TStart` 时间点的数据快照。\n\n但是，如果您使用 `FOR\
  \ SYSTEM_TIME` 子句查询时态数据，SQL Server 会基于时段列筛选数据，这些列包含的是 `TStart` 而不是 `TEnd` 时间戳，这可能会导致结果不正确。\n\
  \n**注意** 我们将在本书的第五部分讨论事务隔离级别和并发性。\n\n您可以在 [`msdn.microsoft.com/en-us/library/dn935015.aspx`](https://msdn.microsoft.com/en-us/library/dn935015.aspx)\
  \ 阅读更多关于时态表的内容。\n\n![](img/index-142_1.jpg)\n\n## Stretch Database\n\n系统收集大量数据并在数据库中长期保留数据已变得很常见。在许多情况下，旧数据很少被用户访问；它只是由于合规性和法规或其他目的而被保留。设计良好的数据库会对数据进行分区，将当前数据和旧数据彼此分开；然而，也有许多实现将所有内容存储在一个未分区的表中。\n\
  \n这种实现方式存在许多挑战。它使得性能调整和数据库维护更加困难。它使高可用性和灾难恢复规划复杂化，同时也增加了硬件和存储成本。SQL Server 2016\
  \ 的一个新功能，即 *Stretch Database*，可以通过将部分数据存储在 Microsoft Azure SQL Database 中并透明地供应用程序访问，来应对其中一些挑战。\n\
  \n从概念上讲，Stretch Database 类似于链接服务器设置，带有一组内部进程。\n\n\n\n# 第五章 ■ SQL SERVER 2016 功能特性\n\
  \n在后台在服务器之间移动数据。你可以通过指定一个内联表值`筛选器函数`来迁移整个表或仅表数据的子集，该函数控制需要移动哪些行。\n\n查询继续在本地数据库上工作，SQL\
  \ Server 通过在需要时运行远程查询，透明地访问 Microsoft Azure 中的远程数据部分。\n\n这项技术的一个注意事项是要求服务器之间具有连接性。如果没有连接性，访问远程数据的查询将会失败。在选择使用此功能时，你应该记住这一行为。\n\
  \n图 5-9 提供了 Stretch Database（延伸数据库）实现的高级概述。当数据被迁移时，SQL Server 会在本地内部暂存表中临时保留迁移行的副本，确保如果你还原本地或\
  \ Azure SQL 数据库备份时，数据可以被协调一致。默认情况下，数据会保留八小时，这与 SQL Azure 的自动备份计划相对应。你可以使用 `sys.sp_rda_set_rpo_duration`\
  \ 存储过程来增加此时间。但请记住，保留时间越长，本地数据库中暂存表的大小就越大。\n\n`图 5-9. Stretch Database 概述`\n\n当你备份启用了\
  \ Stretch 的数据库时，SQL Server 会创建一个`浅备份`。它仅包含本地数据以及备份运行时符合迁移条件的行。Azure SQL Database\
  \ 中的远程数据部分由每八小时运行一次并保留七天的、自动的、地理冗余的存储快照备份保护，为你提供了一系列恢复点。我们将在[第 31 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_31)讨论\
  \ Azure 存储快照备份。\n\n还原启用了 Stretch 的数据库后，你需要使用 `sys.sp_rda_reauthorize_db` 存储过程重新建立本地数据库与\
  \ Azure 数据库之间的连接。你可以从 Azure 门户执行 SQL 数据库的时间点还原，该处的存储备份会保留七天。\n\n## 配置 Stretch Database\n\
  \n在开始使用 Stretching（延伸）之前，必须在服务器和数据库级别都启用它。执行初始设置最简单的方法可能是在 SSMS 中使用 `为数据库启用 Stretch`\
  \ 向导。此向导配置服务器和数据库级别的 Stretching，并允许你选择要延伸的表。\n\n或者，你可以使用 T-SQL 来配置它。通过运行 `EXEC SP_CONFIGURE\
  \ 'remote data archive', '1'` 命令可以在服务器级别启用 Stretching，这需要 `sysadmin` 或 `serveradmin`\
  \ 权限。\n\n### 清单 5-3. 在数据库级别启用 Stretch Database\n\n清单 5-3 展示了如何使用现有的 Microsoft Azure\
  \ SQL Server 作为目标在数据库上启用 Stretching。此操作需要 `CONTROL DATABASE` 权限才能执行。\n\n```\n--\
  \ 创建主密钥\ncreate master key encryption by password='Strong Password';\n\n-- 使用 SQL\
  \ Server 登录信息创建数据库范围凭据\ncreate database scoped credential SQLServerLoginInfo\nwith\n\
  identity = 'my_azure_sql_server_login_name'\n,secret = 'my_password';\n\n-- 为数据库启用\
  \ Stretching\nalter database MyDatabase\nset remote_data_archive = on\n(\nserver\
  \ = 'myserver.database.windows.net'\n,credential = SQLServerLoginInfo\n);\n```\n\
  \n启用该功能后，你可以选择要延伸的表。包含在 `SQL Server 2016 升级顾问` 中的 `Stretch Database Advisor` 工具可以帮助你识别哪些表最能从此技术中受益，以及任何可能阻止延伸的阻塞问题。\n\
  \n在 SQL Server 2016 RTM 中，存在相当多的此类阻塞问题。例如，一个表不能有 `DEFAULT`（默认）和 `CHECK`（检查）约束，也不能被外键引用。该表不能使用\
  \ `XML`、`text`、`ntext`、\n\n\n\n# 第 5 章 ■ SQL SERVER 2016 功能\n\n`image`、`timestamp`、`sql_variant`\
  \ 或 `CLR` 数据类型不被支持，也不能包含在索引视图中。\n\n启用 Stretch 后还有其他限制。最值得注意的是，SQL Server 不会强制执行\
  \ `UNIQUE` 和 `PRIMARY KEY` 约束，也不允许你对已迁移的数据执行 `UPDATE` 和 `DELETE` 操作。\n\n## 注意\n\n\
  你可以阅读有关 Stretch Database Advisor 工具的文章：[`msdn.microsoft.com/en-us/library/dn935004.aspx`](https://msdn.microsoft.com/en-us/library/dn935004.aspx)。完整的限制列表可在此处获取：[`msdn.microsoft.com/en-us/library/mt605114.aspx`](https://msdn.microsoft.com/en-us/library/mt605114.aspx)。\n\
  \n当一个表兼容 Stretch 时，你可以使用 `ALTER TABLE SET (REMOTE_DATA_ARCHIVE = ON)` 命令或通过 SSMS\
  \ 中的 `Stretch` 任务来拉伸它。正如我已经提到的，你可以迁移整个表或表数据的子集。后一种情况需要你指定控制哪些行需要迁移的过滤函数。当提供过滤函数时，SQL\
  \ Server 会使用 `CROSS APPLY` 运算符将其应用于表中的行。当函数返回非空结果集时，该行就有资格被迁移。\n\n### 启用表的 Stretch\
  \ 功能\n\n```\nalter table dbo.AppLogs\nset (remote_data_archive = on (migration_state\
  \ = outbound));\n\ncreate function dbo.fnOrdersOlderThanJan2016(@OrderDate datetime2(0))\n\
  returns table\nwith schemabinding\nas\nreturn\n(\n  select 1 as is_migrating\n \
  \ where @OrderDate < convert(datetime2(0), '1/1/2016', 101)\n)\ngo\n\nalter table\
  \ dbo.Orders set\n(\n  remote_data_archive = on\n  (\n    filter_predicate = dbo.fnOrdersOlderThanJan2016(OrderDate),\n\
  \    migration_state = outbound\n  )\n);\n```\n\n如你所猜，过滤函数应该是 deterministic（确定性的），并且不应依赖于正在评估的行之外的数据。你不能从那里执行任何数据访问。此外，仅支持原始谓词和条件，例如\
  \ `AND` 和 `OR` 谓词、`IN`、`IS NULL`、`IS NOT NULL` 以及比较运算符。所有这些保证了一个函数对于相同的参数值集合总是返回相同的结果。\n\
  \n你可以通过修改表来更改过滤函数。但是，新函数应提供 less restrictive（限制性更少）的结果，并允许你迁移比之前更多的行。\n\n### 替换过滤函数\n\
  \n```\ncreate function dbo.fnOrdersOlderThanFeb2016(@OrderDate datetime2(0))\nreturns\
  \ table\nwith schemabinding\nas\nreturn\n(\n  select 1 as is_migrating\n  where\
  \ @OrderDate < convert(datetime2(0), '2/1/2016', 101)\n)\ngo\n\nalter table dbo.Orders\
  \ set\n(\n  remote_data_archive = on\n  (\n    filter_predicate = dbo.fnOrdersOlderThanFeb2016(OrderDate),\n\
  \    migration_state = outbound\n  )\n);\n```\n\n再举一个例子，下面的函数不能用作原始过滤函数的替换。它添加了\
  \ `@Completed` 参数谓词，因此比原始函数限制性更强。因此，一些已经迁移的行不再符合迁移条件，这是不允许的。\n\n\n\n### 查询伸缩数据库\n\
  \n尽管伸缩数据库对客户端应用程序是透明的，但它们并不保证查询性能会保持不变。在某些情况下，伸缩可以通过减少本地扫描的数据量和/或在两台服务器上并行运行扫描来提高性能。在其他情况下，由于网络延迟和跨服务器连接，它们可能会损害性能。\n\
  \n如果你曾使用过链接服务器，你应该意识到该技术可能存在的潜在性能问题。当谓词可以远程评估且服务器不需要通过网络推送大量数据时，分布式查询工作良好。否则，大量的网络流量和远程调用会极大地影响性能。该技术还存在连接性方面的问题。如果服务器之间没有连接，分布式查询将会失败。\n\
  \n所有这些对于伸缩数据库仍然成立。让我们看几个与性能和数据访问相关的例子。\n\n#### 清单 5-6. 限制性更强的筛选函数\n\n```sql\ncreate\
  \ function dbo.fnInvalid(@OrderDate datetime2(0), @Completed bit)\nreturns table\n\
  with schemabinding\nas\nreturn\n(\n    select 1 as is_migrating\n    where\n   \
  \     (@Completed = 1) and\n        @OrderDate < convert(datetime2(0), '2/1/2016',\
  \ 101)\n)\n```\n\n清单 5-7 展示了创建 `dbo.Customers` 和 `dbo.Orders` 表并用一些数据填充它们的代码。它还假设我们通过运行清单\
  \ 5-5 中的代码启用了 `dbo.Orders` 表的伸缩功能，并将 2016 年 2 月之前的所有订单迁移到了 Microsoft Azure。\n\n\
  #### 清单 5-7. 查询伸缩数据库：表创建\n\n```sql\ncreate table dbo.Customers\n(\n    CustomerId\
  \ int identity(1,1) not null,\n    Name nvarchar(32) not null,\n    PostalCode char(5)\
  \ not null,\n    constraint PK_Customers primary key clustered(CustomerId)\n);\n\
  \ncreate table dbo.Orders\n(\n    OrderId int not null,\n    CustomerID int not\
  \ null,\n    OrderDate datetime2(0) not null,\n    Amount money not null,\n    Completed\
  \ bit not null,\n    constraint PK_Orders primary key clustered(OrderId)\n);\n\n\
  create nonclustered index IDX_Orders_CustomerId on dbo.Orders(CustomerId);\ncreate\
  \ nonclustered index IDX_Orders_OrderDate on dbo.Orders(OrderDate);\n\n-- 65,536\
  \ customers total. 256 customers per Postal Code\n;with N1(C) as (select 0 union\
  \ all select 0) -- 2 rows\n,N2(C) as (select 0 from N1 as T1 cross join N1 as T2)\
  \ -- 4 rows\n,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) -- 16 rows\n\
  ,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256 rows\n,IDs(ID) as\
  \ (select row_number() over (order by (select null)) from N4)\ninsert into dbo.Customers(Name,\
  \ PostalCode)\nselect 'Customer ' + convert(varchar(32),i1.ID * i2.Id)\n    ,convert(char(5),10000\
  \ + i2.ID)\nfrom IDs i1 cross join IDs i2;\n\ndeclare\n    @StartDate datetime2(0)\
  \ = '2016-09-01';\n\n;with N1(C) as (select 0 union all select 0) -- 2 rows\n,N2(C)\
  \ as (select 0 from N1 as T1 cross join N1 as T2) -- 4 rows\n,N3(C) as (select 0\
  \ from N2 as T1 cross join N2 as T2) -- 16 rows\n,N4(C) as (select 0 from N3 as\
  \ T1 cross join N3 as T2) -- 256 rows\n,N5(C) as (select 0 from N4 as T1 cross join\
  \ N4 as T2) -- 65,536 rows\n,N6(C) as (select 0 from N5 as T1 cross join N3 as T2)\
  \ -- 1,048,576 rows\n,IDs(ID) as (select row_number() over (order by (select null))\
  \ from N6)\n\ninsert into dbo.Orders(OrderId, CustomerId, Amount, OrderDate, Completed)\n\
  select ID, ID % 65536 + 1, Id % 50, dateadd(day,-ID % 365, getDate()), 0\nfrom IDs;\n\
  \n/* 使用清单 5-5 的代码为 dbo.Orders 表启用伸缩功能 */\n```\n\n首先，让我们运行一个查询，计算 2016 年 1 月和 2 月提交了多少订单。该代码如清单\
  \ 5-8 所示。\n\n#### 清单 5-8. 查询伸缩数据库：统计订单总数\n\n```sql\nselect count(*) as [Order Count]\n\
  from dbo.Orders o\nwhere o.OrderDate >= '2016-01-01' and o.OrderDate < '2016-03-01';\n\
  ```\n\n\n\n图 5-10 illustr 展示了该查询的部分执行计划。如您所见，SQL Server 在远程执行了 `COUNT()` 聚合，远程查询仅向本地服务器返回了一行数据。\n\
  \n**图 5-10.** 执行计划：统计订单总数\n\n现在，让我们运行一个查询，该查询按客户计算总销售额，如代码清单 5-9 所示。\n\n**代码清单 5-9.**\
  \ 查询拉伸数据库：按客户计算总销售额\n\n```sql\nselect c.Name, sum(o.Amount) as [Total Sales]\nfrom\
  \ dbo.Customers c join dbo.Orders o on\nc.CustomerId = o.CustomerId\ngroup by c.Name\n\
  ```\n\n图 5-11 sho 展示了该查询的执行计划和执行时间。如您所见，SQL Server 决定将所有远程数据通过网络传输过来，并在本地执行聚合。您还可以看到一个基数估算错误，尽管两台服务器上的统计信息都是最新的。这是因为远程\
  \ SQL Server 向查询中添加了额外的内部谓词。\n\n![](img/index-148_1.jpg)\n\n![](img/index-148_2.jpg)\n\
  \n第 5 章 ■ SQL SERVER 2016 特性\n\n**图 5-11.** 执行计划：按客户计算总销售额\n\n最后，让我们向之前的查询添加谓词，按邮政编码筛选客户。该查询如代码清单\
  \ 5-10 所示。\n\n**代码清单 5-10.** 查询拉伸数据库：按 PostalCode 筛选\n\n```sql\nselect c.Name, sum(o.Amount)\
  \ as [Total Sales]\nfrom dbo.Customers c join dbo.Orders o on\nc.CustomerId = o.CustomerId\n\
  where c.PostalCode = '10050'\ngroup by c.Name\n```\n\n如图 5-12 所示，执行计划的形状已经改变。SQL\
  \ Server 使用 `nested loop` 运算符运行多个远程查询，为单个客户选择数据。尽管这种方法减少了通过网络传输的行数，但多次远程调用的开销导致了显著更长的执行时间。\n\
  \n**图 5-12.** 执行计划：按 PostalCode 筛选\n\n所有这些查询都没有在 `OrderDate` 列上设置谓词，因此 SQL Server\
  \ 必须同时访问本地和远程数据。添加这样的谓词将允许 SQL Server 避免不必要的远程服务器访问。例如，如果您运行 `SELECT COUNT(*) FROM\
  \ dbo.Orders WHERE OrderDate >= '2016-05-01'` 语句，您将得到如图 5-13 所示的不访问远程服务器的执行计划。\n\
  \n![](img/index-149_1.jpg)\n\n第 5 章 ■ SQL SERVER 2016 特性\n\n**图 5-13.** 执行计划：在 `OrderDate`\
  \ 列上的谓词\n\n然而，参数化和自动参数化仍然可能导致一种情况：当执行计划被缓存时，查询必须访问远程服务器。虽然这不一定会带来巨大的性能影响——远程查询可能只需计算谓词值而不执行任何数据访问——但如果服务器之间没有连接，查询将会失败。\n\
  \n在决定拉伸数据时，您应该牢记这些性能和连接性影响。在许多情况下，将数据分区到单独的表中、拉伸整个 `History` 表，而不是从单个表中迁移一部分数据会更安全。然而，这种方法需要代码修改，并且违背了该技术对客户端应用程序透明的目的。\n\
  \n### 注意\n我们将在第[16](http://dx.doi.org/10.1007/978-1-4842-1964-5_16)章更详细地讨论数据分区，并在第[26](http://dx.doi.org/10.1007/978-1-4842-1964-5_26)章讨论计划缓存。\n\
  \n最后，值得再次重申，默认情况下，当您查询启用拉伸功能的表时，SQL Server 不允许您指定数据位置。它也不允许您在行迁移后更新或删除远程数据。存在表提示\
  \ `—WITH (REMOTE_DATA_ARCHIVE_OVERRIDE)—`，它允许成员\n\n\n\n# 第五章 ■ SQL SERVER 2016 功能\n\
  \n`db_owner` 角色的权限，以更改查询的范围。此提示可以具有以下三个值之一：\n\n`LOCAL_ONLY` - 仅针对本地数据运行查询\n\n`REMOTE_ONLY`\
  \ - 仅针对远程数据运行查询\n\n`STAGE_ONLY` - 针对暂存数据（迁移到 Azure 后临时保留在本地数据库中的行）运行查询\n\n此提示可用于\
  \ `SELECT`、`UPDATE` 和 `DELETE` 查询，并允许你修改和删除远程数据。但是，如果你需要在活动事务范围内修改远程数据，请谨慎操作。此操作可能耗费大量时间，如果\
  \ SQL Server 无法访问远程数据库，甚至可能失败。最好使用 Service Broker 或其他基于队列的技术异步实现数据修改。\n\n## Stretch\
  \ Database 定价\n\nStretch 数据库是一项令人兴奋的功能，在许多场景中都很有用。不幸的是，它很昂贵。使用 Stretch 数据库的成本包括两部分——计算和存储。本质上，你是在选择\
  \ Microsoft Azure SQL Database 的性能层级，并为数据库文件和备份的存储付费。\n\nMicrosoft Azure 的定价可能随时变动，但截至\
  \ 2016 年 9 月，具有 100 个 DSU（数据库扩展单元）的最低计算层级定价为每月 1,860 美元。存储成本为每 1TB 存储每月 164 美元。实际上，这意味着使用最低计算层级远程存储\
  \ 1 TB 数据，你每月需要支付超过 2,000 美元。\n\n你应该将此成本纳入分析考量。在许多情况下，从长远来看，实施数据分区和分层存储是一种更具成本效益的解决方案，特别是如果你使用的是\
  \ SQL Server 企业版。我们将在[第 16 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_16)讨论此类实现。\n\
  \n> **注意** 你可以在 [`msdn.microsoft.com/en-us/library/dn935011.aspx`](https://msdn.microsoft.com/en-us/library/dn935011.aspx)\
  \ 阅读更多关于 Stretch 数据库设置、维护和监控的信息。\n\n#### 行级安全性\n\n行级安全性根据每个用户为基础，限制对表中某些行的读写访问。与作用于整个表范围的常规\
  \ `SELECT`、`INSERT`、`UPDATE` 和 `DELETE` 权限相反，行级安全性有助于实施考虑行数据的安全模型。例如，在客户管理系统中，你可以使用行级安全性限制普通用户访问部分客户，同时允许区域经理查看该区域的所有客户。另一个常见用例是多租户设置中的安全性，此时租户的数据应对系统中的其他租户不可见。\n\
  \n要实现行级安全性，你必须编写一个内联表值函数，称为 `策略函数`。该函数为对用户可见的行返回单行结果集。下一步，你应该创建一个 `安全策略`，将该函数绑定到表。\n\
  \n让我们看一个例子，假设我们想要实现一个简单的客户管理系统。清单 5-11 中显示的代码在数据库中创建了几个用户和一个包含几行的表。\n\n***清单 5-11.***\
  \ 行级安全性：设置用户和用于行级安全性的表\n\n```sql\ncreate user ClientManager1 without login;\ncreate\
  \ user RegionalManager without login;\n\ncreate schema Client;\ngo\n\ncreate table\
  \ Client.Client1\n(\n    ClientID int not null,\n    ClientManager sysname not null,\n\
  \    Revenue money not null,\n    OtherInfo nvarchar(100) not null\n);\n\ngrant\
  \ select on Client.Client1 to ClientManager1, RegionalManager;\n\ninsert into Client.Client1\
  \ values\n(1, 'ClientManager1', 100000, 'abc')\n,(2, 'ClientManager1', 200000, 'def')\n\
  ,(3, 'ClientManager2', 300000, 'ghi')\n,(4, 'ClientManager2', 400000, 'jkl')\n,(5,\
  \ 'ClientManager3', 500000, 'mno');\n```\n\n\n\n在当前实现下，每个用户都能看到表中的所有数据。你可以通过使用 `EXECUTE\
  \ AS` 命令模拟用户来测试这一点，如代码清单 5-12 所示。\n\n![](img/index-151_1.jpg)\n\n# 第 5 章 ■ SQL SERVER\
  \ 2016 特性\n\n**代码清单 5-12.** 行级安全：模拟用户以选择数据\n\n```\nexecute as user = 'ClientManager1';\n\
  select * from Client.Client1;\nrevert;\n```\n\n如图 5-14 所示，查询返回了所有行，这在当前阶段是符合预期的。执行计划是一个简单的全*表扫描*。\n\
  \n**图 5-14.** 行级安全：未应用 RLS 时的数据与执行计划\n\n让我们来设置行级安全。第一步是创建一个策略函数，用于确定某行是否可被用户看见。如代码清单\
  \ 5-13 所示，该函数非常简单。它接受一个参数——经理姓名，并将其与执行查询的用户进行比较。显然，在实际场景中，检查 Active Directory 组成员资格会是更好的做法。\n\
  \n如果某行数据应对当前用户可见，该函数必须返回一行（返回值与列名无关紧要）。同样值得注意的是，使用 `SCHEMABINDING` 子句定义的安 全函数，不要求用户对函数内访问的表拥有\
  \ `SELECT` 权限。反之，未使用 `SCHEMABINDING` 子句定义的函数则要求用户拥有这些权限。\n\n**代码清单 5-13.** 行级安全：安全策略函数\n\
  \n```\ncreate function Client.fn_LimitToManager(@Manager as sysname)\nreturns table\n\
  with schemabinding\nas\nreturn\n( select 1 AS fn_LimitToManagerResult\n  where @Manager\
  \ = user_name() or user_name() = 'RegionalManager' )\n```\n\n最后一步是创建将函数与表关联起来的安全策略。你可以在代码清单\
  \ 5-14 中看到该命令的语法。安全策略中的 `FILTER` 谓词指定了负责数据读取访问的函数。`BLOCK` 谓词（我们将在本章后面讨论）则控制对数据的写入访问。\n\
  \n**代码清单 5-14.** 行级安全：安全策略\n\n```\ncreate security policy LimitMgrFilter\nadd filter\
  \ predicate Client.fn_LimitToManager(ClientManager)\non Client.Client1\nwith (state\
  \ = on)\n```\n\n![](img/index-152_1.jpg)\n\n![](img/index-152_2.jpg)\n\n第 5 章 ■\
