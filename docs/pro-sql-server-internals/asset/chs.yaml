- '# 第 33 章 ■ 基于列的存储与批处理模式执行


  ***图 33-15.** 包含列存储索引扫描和批处理模式执行的执行计划（SQL Server 2012）*


  图 33-16 展示了此查询在 `SQL Server 2014` 和 `SQL Server 2016` 中的执行计划。如你所见，执行计划明显更简单，且不包含`并行/交换`运算符。`SQL
  Server 2014` 和 `SQL Server 2016` 即使在 `tempdb` 溢出的情况下也支持`批处理模式执行`。`SQL Server 2016`
  无论数据库兼容级别如何，都会生成相同的执行计划。


  ***图 33-16.** 包含列存储索引扫描和批处理模式执行的执行计划（SQL Server 2014 和 2016）*


  表 33-4 说明了这些查询的执行统计信息。值得注意的是，尽管 `SQL Server 2014/2016` 在`批处理模式执行`上的性能提升是边际的，但当出现`tempdb`溢出时情况会有所不同，此时
  `SQL Server 2012` 会切换到`行模式执行`。


  ***表 33-4.** 执行统计信息：列存储索引扫描与并行执行计划*


  | **逻辑读取次数** | **CPU 时间 (毫秒)** | **已用时间 (毫秒)** |

  | :--- | :--- | :--- |

  | `SQL Server 2012` | 10,048 |  |

  | `SQL Server 2014` | 25,784 |  |

  | `SQL Server 2016` | 29,952 |  |


  如你所见，列存储索引显著降低了系统中的 I/O 负载以及查询的 CPU 时间和已用时间。这种差异在`批处理模式执行`的情况下尤为明显，与`行模式聚集索引扫描`相比，查询运行速度快了几个数量级。


  `SQL Server`的每个新版本都增加了支持`批处理模式执行`的运算符和用例数量。例如，`SQL Server 2012`中的`批处理模式`支持极其有限。它不支持除内部哈希联接以外的任何联接类型；不支持标量聚合，也不支持
  `union all` 运算符，还有其他相当多的限制。


  在 `SQL Server 2014` 中，`批处理模式执行`支持所有联接类型和外联接，在查询优化阶段探索不同的联接顺序，并支持标量聚合和 `union all`
  运算符。此外，各种运算符的执行算法也得到了改进。例如，`SQL Server 2014`中的哈希联接运算符现在可以溢出到`tempdb`而无需切换到`行模式执行`，这在`SQL
  Server 2012`中是不可能的。


  `SQL Server 2016` 进一步改善了这种情况。它支持带有`排序`运算符的`批处理模式执行`，在某些情况下允许将字符串谓词推送到`扫描`运算符，并包含许多其他增强功能，包括能够在串行执行计划中使用`批处理模式执行`。


  所有这些改进使得在数据仓库环境中升级到最新的`SQL Server`版本是值得的，特别是在`SQL Server 2012`的情况下，其`批处理模式执行`支持非常有限，并且需要进行复杂的查询重构。


  #### 基于列的存储


  不同版本的`SQL Server`提供多种类型的列存储索引。尽管它们的需求和行为各异，但底层都采用基于列的存储格式。我们将在后续章节中讨论不同类型的列存储索引。


  需要重点提及的是，无论列存储索引的类型如何，`SQL Server`都不允许为一个表定义多个列存储索引。


  ## 存储格式


  基于列的存储中，每个数据列都单独存储在一组称为`行组`的结构中。每个`行组`最多存储大约一百万行，准确地说，是 `2²⁰=1,048,576` 行。`SQL Server`在创建索引时会尝试完全填充`行组`，只留下最后一个`行组`部分填充。例如，如果一个表有五百万行，`SQL
  Server`会创建四个包含 `1,048,576` 行的`行组`和一个包含 `805,696` 行的`行组`。


  ```

  实际上，当多个线程创建索引时，你可能会遇到不止一个部分填充的行组。

  ```


  '
- '# 列存储索引的创建与编码


  ## 索引创建过程


  `columnstore indexes` 使用并行执行计划。每个线程将处理自己的数据子集，创建独立的 `row groups`。此外，对于分区表，每个表分区都有自己的一组
  `row groups`。


  构建完 `row groups` 后，SQL Server 会按 `row group` 合并所有列数据，并对这些组进行编码和压缩。如果有利于实现更好的压缩率，可以重新排列
  `row group` 内的行。


  `row group` 内的列数据称为一个 `segment`。当需要访问列存储数据时，SQL Server 会将整个 `segment` 加载到内存中。SQL
  Server 还会保留有关每个 `segment` 中存储数据的元数据信息（例如最小值和最大值），并可以跳过不包含所需数据的 `segment`。


  图 33-17 展示了索引创建过程。它显示了一个包含四列和三个 `row groups` 的列存储索引。其中两个 `row groups` 被完全填充，最后一个部分填充。


  ![](img/index-681_1.jpg)


  ![](img/index-681_2.jpg)


  **图 33-17.** 构建列存储索引


  ## 编码过程


  在编码过程中，SQL Server 使用两种编码算法之一，将所有数据中的值替换为 64 位整数。


  第一种算法称为 `dictionary encoding`，它将数据中的不同值存储在一个称为 `dictionary` 的独立结构中。`dictionary`
  中的每个值都有一个唯一的 `ID`。SQL Server 用 `dictionary` 中的 `ID` 替换数据中的实际值。


  SQL Server 创建一个 `global dictionary`，该字典在属于同一索引分区的所有 `segments` 之间共享。此外，SQL Server
  可以使用未出现在 `global dictionary` 中的值为单个 `segments` 创建 `local dictionaries`。


  图 33-18 展示了 `dictionary encoding`。为简单起见，它既没有显示多个 `row groups`，也没有显示 `local dictionaries`，以便聚焦于算法的主要思想。


  **图 33-18.** 字典编码


  第二种编码类型称为 `value-based encoding`，主要用于重复值不足的数值和整数数据类型。在这种情况下，`dictionary encoding`
  效率低下。


  `value-based encoding` 的目的是将整数和数值转换为更小范围的 64 位整数。此过程包括以下两个步骤。


  ### 第一步：数值转换


  第一步，使用允许此转换的最小正指数将数值数据类型转换为整数。这个指数称为 `magnitude`。例如，对于一组值如 0.8、1.24 和 1.1，最小指数是
  2，代表乘数 100。应用此指数后，值将分别转换为 80、124 和 110。此过程的目标是将所有数值转换为整数。


  或者，对于整数数据类型，SQL Server 选择可以应用于所有值而不损失精度的最小负指数。例如，对于值 1340、20 和 2340，该指数是 -1，代表除数
  10。此操作后，值将转换为 134、2 和 234。此类操作的目标是减小存储在 `segment` 中的最小值和最大值之间的区间。


  ![](img/index-682_1.jpg)


  ![](img/index-682_2.jpg)


  ### 第二步：减去基值


  在第二步中，SQL Server 选择 `base value`（即 `segment` 中的最小值），并从所有其他值中减去它。这使得 `segment` 中的最小值变为
  0。


  图 33-19 展示了 `value-based encoding` 的过程。


  **图 33-19.** 值编码


  ## 数据压缩与存储


  编码后，SQL Server 会压缩数据并将其作为 `LOB` 分配单元存储。我们在第 1 章“数据存储内部”中讨论过此类数据的存储方式。


