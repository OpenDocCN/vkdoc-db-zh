  ### 第 33 章 ■ 列式存储与批处理模式执行


  数据仓库系统中的典型查询是从一个事实表中选择数据，并将其与一个或多个维度表连接。`SQL Server` 能够检测 `星型` 和 `雪花型` 数据库模式，并使用一些优化技术来尝试减少需要扫描的行数和查询所需的
  I/O 量。它会将谓词下推到执行计划树中的最低级运算符，试图尽早计算它们，以减少需要选择的行数。其他优化包括维度表的交叉连接以及使用 `位图` 过滤器进行预过滤的哈希连接。


  **注意** 在事实表和维度表之间定义外键约束有助于 `SQL Server` 更可靠地检测 `星型` 和 `雪花型` 模式。如果创建阶段验证约束的开销无法接受，你可以考虑使用
  `WITH NOCHECK` 选项创建外键约束。


  然而，即使采用了所有优化技术，大型数据仓库中的查询性能也并非总是足够。即使在当今的硬件上，扫描 GB 或 TB 级的数据也非常耗时。部分



  #### 列存储索引与批处理模式执行概述


  问题在于 SQL Server 中查询处理的性质；也就是说，操作符逐行请求和处理数据，这在处理大量数据时并不总是高效的。


  其中一些问题可以通过列存储索引和批处理模式执行来解决，我将在接下来的内容中介绍。


  如前所述，典型的数据仓库查询会连接事实表和维度表，并在仅访问事实表列的子集的情况下执行一些计算和聚合。清单 33-1 展示了一个在遵循星型模式设计的数据库中的查询示例，如图
  33-1 所示。


  ***清单 33-1.*** 数据仓库环境中的典型查询

  ```sql

  select a.ArticleCode, sum(s.Quantity) as [Units Sold]

  from dbo.FactSales s join dbo.DimArticles a on

  s.ArticleId = a.ArticleId

  join dbo.DimDates d on

  s.DateId = d.DateId

  where d.AnYear = 2016

  group by a.ArticleCode

  ```


  如你所见，这个查询需要从事实表中扫描大量数据；然而，它只使用了三个表列。使用常规的基于行的执行模式，SQL Server 会逐行访问数据，将整行加载到内存中，而不管该行中有多少列是实际需要的。


  你可以通过实现页面压缩来减少表的存储大小，从而减少 I/O 操作次数。但是，页面压缩的作用范围仅限于单个页面。每个页面会维护一个独立的压缩字典副本，用于该页面上的所有行。维护字典并以列为单位压缩大批量的行将显著提升压缩效果。


  最后，还有另一个不那么明显的问题。尽管访问内存中数据的速度比访问磁盘数据快几个数量级，但与 CPU 缓存访问时间相比，它仍然很慢。在行模式执行下，SQL Server
  会不断地用从主内存复制的新行数据重新加载 CPU 缓存数据。这种开销在 OLTP 工作负载和简单查询中通常不是问题；然而，在处理数百万甚至数十亿行的数据仓库查询中，它会变得非常明显。


