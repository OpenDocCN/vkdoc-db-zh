  \n## 组合安全特性\n\nSQL Server 2016 的新安全特性可以帮助您应对一些安全挑战...\n\n\n\n您的系统。然而，它们应该与其他`经典`安全技术结合使用。您应遵循`最小权限`原则，将它们与其他\
  \ SQL Server 安全功能相结合，并在列、对象、数据库和服务器级别为用户授予`最小必需`的权限。\n\n这对于`行级安全`和`动态数据屏蔽`尤为重要。这些功能应被视为`应用安全`特性。它们有助于实施应用安全；但是，它们并不保护数据库中的数据。只要恶意用户有能力对表执行即席查询，就有可能绕过这些保护。\n\
  \n您也可以组合使用这些功能。例如，可以将`行级安全`与`始终加密`和/或`动态数据屏蔽`结合使用。显然，您不能在同一列上同时结合使用`始终加密`和`动态数据屏蔽`，如果需要屏蔽，则必须在应用程序中手动实现。\n\
  \n最后，这三项新的安全功能都能与`透明数据库加密 (TDE)`和`备份加密`良好协作。当安全是关注点时，将`TDE`和`备份加密`与`始终加密`一起使用是有益的。这将允许您保护数据库中的所有数据，而不是像`始终加密`那样按列加密数据。\n\
  \n#### 总结\n\n`系统版本控制时态表`维护表中数据更改的历史记录。它们由两张表组成：包含当前数据的`当前表`，以及存储行先前版本的`历史表`。每当当前表中的行被更新或删除时，该行的先前版本就会被复制到历史表。您可以使用`SELECT`查询中的`FOR\
  \ SYSTEM_TIME`子句访问特定时间点的快照。\n\n当前表和历史表都应有两个`datetime2`周期列，用于指示行的生命周期。当您使用`FOR SYSTEM_TIME`子句时，SQL\
  \ Server 会在周期列上添加谓词，您在设计系统索引时需要考虑到这一点。\n\n`Stretch 数据库`允许您将部分数据库数据透明地存储在 Microsoft\
  \ Azure 的 SQL 数据库中，对客户端应用程序透明。您可以通过指定筛选函数来迁移整个表或部分表数据。`Stretch 数据库`的工作方式与`链接服务器`类似，具有相似的连接要求和性能影响。\n\
  \nSQL Server 2016 附带了三个新的安全功能。`行级安全`允许您基于单个用户控制数据的可见性。此解决方案有助于提高多租户环境中的安全性。`动态数据屏蔽`允许您在结果集中屏蔽特定列中的值。最后，`始终加密`使您能够通过实施职责分离的安全概念来加密特定列中的数据，从而防止数据库管理员访问敏感数据。\n\
  \n在加固系统安全性时，您应将新的安全功能与经典的 SQL Server 安全功能（如列和对象权限、`TDE`等）结合使用。\n\n# 第六章：索引碎片\n\n\
  索引碎片可能是少数几个不完全属于“视情况而定”类别的主题之一。大多数数据库专业人员都同意碎片会对系统产生负面影响。虽然这是正确的，但理解索引碎片的缺点并分析您的系统如何受其影响仍然很重要。\n\
  \n在本章中，我们将讨论 SQL Server 中的内部和外部索引碎片，哪些代码和设计模式会增加碎片，以及在设计索引维护策略时必须考虑哪些因素。\n\n####\
  \ 碎片类型\n\n如您所知，SQL Server 将数据存储在数据页上，这些数据页按每对象分配单元组合成八页的区。对于索引的行内页，每个数据页都有指向上一个和\n\
  \n\n\n# 第六章：索引碎片\n\nSQL Server 既不会直接从磁盘读取数据，也不会直接修改磁盘上的数据。数据页需要加载到内存中才能被访问。每次 SQL\
  \ Server 访问内存中的数据页时，都会发出一次逻辑读取操作。当数据页不在内存中时，SQL Server 会执行物理读取，这将导致物理磁盘访问。\n\n###\
  \ 注意\n通过使用 `set statistics io on` 命令启用 I/O 统计信息，您可以查看查询在每个表上执行的 I/O 操作数量。过多的逻辑读取通常表明由于缺少索引和/或因基数估算不准确而选择了次优的连接策略，导致了执行计划不佳。但是，在优化过程中，您不应仅将此数字作为唯一标准，还应考虑其他因素，例如资源使用率、并行度以及执行计划中的相关运算符。\n\
  \n逻辑读取和物理读取都会影响查询的性能。尽管逻辑读取速度很快，但并非瞬时完成。SQL Server 在访问内存中的数据页时会消耗 CPU 周期，而物理 I/O\
  \ 操作则速度缓慢。即使使用快速磁盘子系统，大量的物理读取也会迅速累积延迟。\n\n© Dmitri Korotkevitch 2016\nD. Korotkevitch,\
  \ *Pro SQL Server Internals*, DOI 10.1007/978-1-4842-1964-5_6\n\n![](img/index-166_1.jpg)\n\
  \n![](img/index-166_2.jpg)\n\n## 第六章：索引碎片\n\nSQL Server 用来减少物理读取数量的一种优化技术称为 `read-ahead`。使用此技术，SQL\
  \ Server 根据中间索引级别信息确定叶级页是否在磁盘上连续存放，并从数据文件中作为单个读取操作读取多个页面。这增加了后续读取请求引用已缓存在内存中的数据页的机会，并最小化了所需的物理读取数量。\n\
  \n图 6-1 说明了这种情况，显示了两个相邻的区，其中所有数据页都完全填充了数据。\n\n### 图 6-1：逻辑读取与物理读取\n\n让我们看看当您向索引中插入新行时会发生什么。您会记得，聚集索引和非聚集索引中的数据都是基于索引键的值排序的，SQL\
  \ Server 知道该行必须插入到哪个数据页中。如果数据页有足够的可用空间来容纳新行，那么 SQL Server 只需将新行插入其中。但是，如果数据页没有足够的可用空间，则会发生以下情况：\n\
  \n1.  分配一个新的数据页，如果需要，还会分配一个新的区。\n2.  将旧数据页中的一些数据移动到新分配的页中。\n3.  更新前一页和后一页的指针，以维护索引中的逻辑排序顺序。\n\
  \n此过程称为 `page split`。图 6-2 说明了发生这种情况时的数据布局。值得一提的是，当您更新现有行从而增加其大小，并且数据页没有足够空间来容纳该行的新版本时，也可能发生页拆分。\n\
  \n### 图 6-2：页拆分与碎片\n\n此时，您有了两种索引碎片：内部碎片和外部碎片。`External fragmentation` 意味着页面的逻辑顺序与其物理顺序不匹配，和/或逻辑上连续的页面不位于相同或相邻的区中。这种碎片迫使\
  \ SQL Server 在从磁盘读取数据时跳跃式进行，这使得预读效率降低，并增加了所需的物理读取数量。此外，它增加了随机磁盘 I/O，与顺序 I/O 相比，随机\
  \ I/O 效率要低得多，尤其是在磁性硬盘驱动器的情况下。\n\n另一方面，`Internal fragmentation` 意味着索引中的数据页存在过多的\n\
  \n\n# 第 6 章 ■ 索引碎片\n\n## 索引内部碎片的影响\n\n索引的内部碎片会导致数据页的可用空间减少。因此，索引在存储数据时会使用更多的数据页，这增加了查询执行期间的逻辑读取次数。此外，SQL\
  \ Server 会在缓冲池中使用更多内存来缓存索引页。\n\n少量的内部碎片并不一定是坏事。当数据从索引的不同部分插入或更新时，它能减少插入和更新操作期间的页拆分。然而，大量的内部碎片会浪费索引空间并降低系统性能。此外，对于键值始终递增的索引（例如，在标识符列上），内部碎片是不希望出现的，因为数据总是在索引的末尾插入。\n\
  \n## 分析碎片的数据管理函数\n\n有一个数据管理函数 `sys.dm_db_index_physical_stats`，可用于分析系统中的碎片情况。结果集中最重要的三个列如下：\n\
  \n`avg_page_space_used_in_percent` 显示页面上平均使用的数据存储空间百分比。此值向您展示了内部索引碎片的程度。\n\n`avg_fragmentation_in_percent`\
  \ 提供有关外部索引碎片的信息。对于具有聚集索引的表，它表示无序页的百分比，即索引中下一个物理分配的页与当前页的下一页指针所引用的页不同。对于堆表，它表示无序区的百分比，即区在数据文件中不是连续存放的。\n\
  \n`fragment_count` 表示索引有多少个连续的数据片段。每个片段由彼此相邻的区组成。相邻的数据增加了 SQL Server 在访问数据时使用顺序\
  \ I/O 和预读的可能性。\n\n## 分析模式\n\n`Sys.dm_db_index_physical_stats` 可以在三种不同的模式下分析数据：`LIMITED`、`SAMPLED`\
  \ 和 `DETAILED`，您需要将这些模式指定为函数的参数。\n\n- 在 `LIMITED` 模式下，SQL Server 使用非叶索引页来分析数据。这是最快的模式，尽管它不提供关于内部碎片的信息。\n\
  - 在 `DETAILED` 模式下，SQL Server 会扫描整个索引。您可以猜到，这种模式提供了最准确的结果，但也是 I/O 密集度最高的方法。\n- 在\
  \ `SAMPLED` 模式下，当表具有 10,000 个或更多数据页时，SQL Server 会基于表的百分之一的数据样本来返回统计信息。它在执行期间从叶级别读取每第一百个页。对于数据页少于\
  \ 10,000 个的表，SQL Server 会改用 `DETAILED` 模式扫描整个索引。\n\n> **注意**：请查看 [Books Online 文章](http://technet.microsoft.com/en-us/library/ms188917.aspx)\
  \ 以获取有关 `sys.dm_db_index_physical_stats` 的更多详细信息。\n\n## 页拆分示例\n\n页拆分不仅限于单页分配和数据移动。让我们看一个例子，创建一个表并用一些数据填充它，如清单\
  \ 6-1 所示。\n\n**清单 6-1.** 多次页拆分：表创建\n\n```sql\ncreate table dbo.PageSplitDemo\n(\n\
  \    ID int not null,\n    Data varchar(8000) null\n);\n\ncreate unique clustered\
  \ index IDX_PageSplitDemo_ID\non dbo.PageSplitDemo(ID);\n\n;with N1(C) as (select\
  \ 0 union all select 0) -- 2 rows\n,N2(C) as (select 0 from N1 as T1 cross join\
  \ N1 as T2) -- 4 rows\n,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) --\
  \ 16 rows\n,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256 rows\n\
  ,N5(C) as (select 0 from N4 as T1 cross join N2 as T2) -- 1,024 rows\n,IDs(ID) as\
  \ (select row_number() over (order by (select NULL)) from N5)\ninsert into dbo.PageSplitDemo(ID)\n\
  select ID * 2 from Ids where ID <= 620\n\nselect page_count, avg_page_space_used_in_percent\n\
  from sys.dm_db_index_physical_stats(db_id(),object_id(N'dbo.PageSplitDemo'),1,null\n\
  ,'DETAILED');\n```\n\n\n以下是代码清单 5-1 的输出结果。如你所见，只有一个数据页，并且它几乎已满。\n```\npage_count\
  \ avg_page_space_used_in_percent\n---------------- ---------------------------------------------\n\
  1 99.5552260934025\n```\n接下来，让我们使用代码清单 6-2 中的代码向表中插入一个大型行。\n\n*Listing 6-2.* 多页拆分：向表中插入一个大型行\n\
  ```\ninsert into dbo.PageSplitDemo(ID,Data) values(101,replicate('a',8000));\n\n\
  select page_count, avg_page_space_used_in_percent\nfrom sys.dm_db_index_physical_stats(db_id(),object_id(N'dbo.PageSplitDemo'),1,null,'DETAILED');\n\
  ```\n如果你使用 SQL Server 2012 之前的版本运行代码清单 6-2，输出结果如下。如你所见，SQL Server 必须分配七个新的叶级数据页来容纳新的数据行，并保持索引中的逻辑排序顺序。\n\
  \n该过程以如下方式进行。SQL Server 将 `ID<=100` 的 50 行保留在原始页面上，试图将新行 (`ID=101`) 和剩余行 (`ID>=102`)\
  \ 放入新分配的数据页中。它们无法放入单个页面，于是 SQL Server 继续分配页面，每次将行拆分到一半，直到最终能够容纳。\n\n值得一提的是，SQL Server\
  \ 还必须在索引中创建根级别。\n```\npage_count avg_page_space_used_in_percent\n----------------\
  \ ---------------------------------------------\n8 24.8038670620213\n1 1.26019273535953\n\
  ```\n幸运的是，页面拆分算法在 SQL Server 2012 中得到了显著改进。如果你使用 SQL Server 2012 或更高版本运行代码清单 6-2，输出结果如下。当\
  \ SQL Server 检测到数据无法放入新分配的页面时，它会分配另一个（第三个）页面，将新行 (`ID=101`) 放入其中一个页面，将所有剩余行 (`ID\
  \ >= 102`) 放入另一个页面。因此，在 SQL Server 2012-2016 中，页面拆分最多引入两个新的页面分配。\n```\npage_count\
  \ avg_page_space_used_in_percent\n---------------- ---------------------------------------------\n\
  3 99.5552260934025\n1 0.457128737336299\n```\n\n### `FILLFACTOR` 和 `PAD_INDEX`\n\
  SQL Server 中的每个索引都有一个 `FILLFACTOR` 选项，允许你在叶级索引数据页上预留一些空间。将 `FILLFACTOR` 设置为小于 100\
  \ 的值（默认值为 100）会增加数据页有足够空闲空间来容纳新插入或更新的数据行而无需进行页面拆分的机会。此选项可以在服务器级别和单个索引级别设置。如果索引没有显式指定\
  \ `FILLFACTOR`，则 SQL Server 会使用服务器级别的 `FILLFACTOR`。\n\nSQL Server 仅在创建或重建索引时维护 `FILLFACTOR`。在正常工作负载期间，它仍然会将页面填充至\
  \ 100%，并在需要时拆分页面。\n\n另一个需要牢记的重要因素是，通过降低 `FILLFACTOR`，你通过增加内部索引碎片来减少外部索引碎片和页面拆分次数。索引将拥有更多的数据页，这将对扫描操作的性能产生负面影响。此外，SQL\
  \ Server 将在缓冲池中使用更多内存来容纳增加的索引页数量。\n\n`FILLFACTOR` 没有推荐的设置。你需要通过逐渐减小其值并使用 `sys.dm_db_index_physical_stats`\
  \ 函数监控其对碎片的影响来进行微调。你可以从 `FILLFACTOR = 100` 开始，通过使用新的 `FILLFACTOR` 重建索引，以 5% 的增量递减，直到找到内部和外部碎片程度都最低的最佳值。显然，你需要在生产工作负载下进行此分析，并允许在两次测量之间让碎片逐渐积累。\n\
  \n在 SQL Server 2012 或更高版本中，你可以使用扩展事件实时监控页面拆分操作。\n\n\n\n# 第 6 章 ■ 索引碎片整理\n\n####\
  \ 索引维护\n\nSQL Server 支持两种减少碎片的索引维护方法：索引重新组织和索引重建。\n\n*索引重新组织*（通常称为索引碎片整理）将叶子级数据页按其逻辑顺序重新排列，并试图通过减少内部碎片来压缩页面。这是一项在线操作，可以随时中断而不会丢失中断点之前的进度。你可以使用\
  \ `ALTER INDEX REORGANIZE` 命令来重新组织索引。\n\n■ **提示** SQL Server 不会从数据库中释放空的 LOB 数据页。`ALTER\
  \ INDEX REORGANIZE` 默认会压缩（释放）这些页面。当大量 LOB 数据被删除或 LOB 列被删除后，重新组织索引是有益的。\n\n*索引重建*操作（可使用\
  \ `ALTER INDEX REBUILD` 命令完成）通过创建另一个索引来替换旧的、碎片化的索引，从而消除外部碎片。默认情况下，这是一个离线操作，SQL Server\
  \ 会在操作期间获取并保持架构修改（`Sch-M`）表锁，这会阻止任何其他会话访问该表。我们将在本书第三部分更详细地讨论 SQL Server 并发模型。\n\n\
  SQL Server 企业版可以执行在线索引重建。此操作在底层使用行版本控制，并允许其他会话在索引重建仍在进行时修改数据。\n\n■ **注意** 在线索引重建在执行的最后阶段仍然会获取一个架构修改（`SCH-M`）锁。尽管此锁保持的时间非常短，但在非常活跃的\
  \ OLTP 系统中，它可能会增加锁定和阻塞。SQL Server 2014 引入了低优先级锁的概念，这可以在此情况下提供帮助。我们将在第 23 章“架构锁”中详细讨论低优先级锁。\n\
  \n索引重建比重索引重新组织能取得更好的效果，尽管它是一个*全有或全无*的操作；也就是说，如果索引重建被中断，SQL Server 会回滚整个操作。你还应该在数据库中有足够的可用空间来容纳索引重建阶段生成的另一份数据副本。\n\
  \n最后，索引重建会更新统计信息，而索引重新组织则不会。如果对于大表来说自动统计信息更新不是最优方案，你需要在系统的统计信息维护策略中考虑这一行为。\n\n####\
  \ 设计索引维护策略\n\nMicrosoft 建议当外部索引碎片（`sys.dm_dm_index_physical_stats` 中的 `avg_fragmentation_in_percent`\
  \ 值）超过 30% 时执行索引重建，当碎片在 5% 到 30% 之间时执行索引重新组织。虽然这可以作为一般性建议，但在设计索引维护策略时，分析系统受碎片影响的程度非常重要。\n\
  \n索引碎片在索引扫描期间（即 SQL Server 需要从磁盘读取大量数据时）危害最大。经过高度优化的 OLTP 系统（主要使用小型范围扫描和点查找）通常受碎片的影响较小。如果查询\n\
  \n\n\n# 第六章 ■ 索引碎片\n\n只需要遍历索引树并读取少数几个数据页。此外，当数据已经缓存在缓冲池中时，外部碎片几乎无关紧要。\n\n## 数据库文件放置\n\
  \n数据库文件放置是另一个需要考虑的因素。减少外部碎片的原因之一是为了提升顺序 I/O 性能。在机械硬盘的情况下，顺序 I/O 性能通常比随机 I/O 性能高一个数量级。然而，如果多个数据库文件共享同一个磁盘阵列，这就无关紧要了。多个活动数据库同时产生的\
  \ I/O 活动会*随机化*磁盘阵列上的所有 I/O 活动，使得外部碎片变得不那么关键。\n\n## 内部碎片\n\n尽管如此，内部碎片仍然是个问题。当数据页有大量未使用空间时，索引会占用更多内存，查询也需要扫描更多的数据页。无论数据页是否被缓存，这都会对系统性能产生负面影响。\n\
  \n## 系统工作负载\n\n另一个重要因素是系统工作负载。索引维护会给 SQL Server 增加负载，最好在活动量较低的时间段进行。请记住，索引维护的开销并不仅限于单个数据库，您需要分析它对位于同一服务器和/或磁盘阵列上的其他数据库的影响。\n\
  \n索引的重建和重组都会产生大量的事务日志活动并生成大量日志记录。这会影响事务日志备份的大小，如果系统使用基于事务日志的高可用性技术，如 `AlwaysOn 可用性组`、`数据库镜像`、`日志传送`和`复制`，还可能产生巨大的网络流量。如果在操作期间发生故障转移到另一个节点，也会影响系统的可用性。\n\
  \n`注意` 我们将在第 32 章“设计高可用性策略”中更详细地讨论高可用性策略。\n\n考虑在全天候运行的繁忙服务器上进行索引维护的开销非常重要。在某些情况下，最好降低索引维护例程的频率，在系统中保留一定程度的碎片。但是，如果开销不是问题，则应始终执行索引维护。例如，对于在非工作时间活动量低的系统，没有理由不在夜间或周末进行索引维护。\n\
  \n## 在线索引操作\n\n所使用的 SQL Server 版本和版本决定了其在线执行索引维护操作的能力。表 6-1 显示了基于 SQL Server 版本和版本可用的选项。它还显示了分区级索引重建选项，这对于分区表非常有益。我们将在第\
  \ 16 章详细讨论它们。\n\n*表 6-1. 基于 SQL Server 版本和版本的索引维护选项*\n\n| **SQL Server 版本和版本** |\
  \ **索引重组** | **索引重建（索引包含 LOB 列）** | **索引重建（索引不包含 LOB 列）** | **分区级索引重建** |\n| :---\
  \ | :--- | :--- | :--- | :--- |\n| SQL Server 2005-2016 非企业版 | 在线 | 仅离线 | 仅离线 |\
  \ 不适用 |\n| SQL Server 2005-2008R2 企业版 | 在线 | 仅离线 | 离线或在线 | 仅离线 |\n| SQL Server 2012\
  \ 企业版 | 在线 | 离线或在线 | 离线或在线 | 仅离线 |\n| SQL Server 2014-2016 企业版 | 在线 | 离线或在线 | 离线或在线\
  \ | 离线或在线 |\n\n`注意` 小心使用 SQL Server 维护计划。它们倾向于对所有索引执行索引维护，即使这并非必要。\n\n`提示` Ola Hallengren\
  \ 的免费数据库维护脚本是一个很好的解决方案，它基于每个索引分析碎片级别，并且只在需要时执行索引重建/重组。可从 `http://ola.hallengren.com/`\
  \ 下载。\n\n\n综上所述，减少碎片化的最佳方式是避免在数据库设计和代码中创建会导致此类情况的模式。\n\n## 增加碎片化的模式\n\n导致碎片化的最常见情况之一是对完全随机的值建立索引，例如使用\
  \ `NEWID()` 生成的唯一标识符或使用 `HASHBYTE()` 函数生成的字节序列。这些函数生成的值会随机插入到索引的不同部分，从而导致过多的页面拆分和碎片化。如果可能，你应该避免使用此类索引。\n\
  \n**注意** 我们将在下一章讨论在随机值上建立索引对性能的影响。\n\n另一个导致索引碎片化的常见模式是在更新过程中增加行的大小；例如，当系统收集数据并执行某种后处理，在数据行中填充额外的属性/列时。这会增加行的大小，如果页面没有足够的空间来容纳它，就会触发页面拆分。\n\
  \n举个例子，让我们思考一个存储 GPS 位置信息的表，其中既包含地理坐标，也包含位置的地址。我们假设地址是在位置信息已经插入系统后，在后处理阶段填充的。清单\
  \ 6-3 展示了创建该表并用一些数据填充它的代码。\n\n### 清单 6-3. 导致碎片化的模式：表创建\n\n```sql\ncreate table dbo.Positions\n\
  (\n    DeviceId int not null,\n    ATime datetime2(0) not null,\n    Latitude decimal(9,6)\
  \ not null,\n    Longitude decimal(9,6) not null,\n    Address nvarchar(200) null,\n\
  \    Placeholder char(100) null,\n);\n\n;with N1(C) as (select 0 union all select\
  \ 0) -- 2 rows\n,N2(C) as (select 0 from N1 as T1 cross join N1 as T2) -- 4 rows\n\
  ,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) -- 16 rows\n,N4(C) as (select\
  \ 0 from N3 as T1 cross join N3 as T2) -- 256 rows\n,N5(C) as (select 0 from N4\
  \ as T1 cross join N4 as T2) -- 65,536 rows\n,IDs(ID) as (select row_number() over\
  \ (order by (select NULL)) from N5)\ninsert into dbo.Positions(DeviceId, ATime,\
  \ Latitude, Longitude)\nselect\n    ID % 100 /*DeviceId*/\n    ,dateadd(minute,\
  \ -(ID % 657), getutcdate()) /*ATime*/\n    ,0 /*Latitude - just dummy value*/\n\
  \    ,0 /*Longitude - just dummy value*/\nfrom IDs;\n\ncreate unique clustered index\
  \ IDX_Postitions_DeviceId_ATime\non dbo.Positions(DeviceId, ATime);\n\nselect index_level,\
  \ page_count, avg_page_space_used_in_percent, avg_fragmentation_in_percent\nfrom\
  \ sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(N'dbo.Positions'),1,null,'DETAILED')\n\
  ```\n\n此时，该表有 65,536 行。聚集索引是在执行的最后阶段创建的。因此，索引上没有碎片化。图 6-3 说明了这一点。\n\n### 图 6-3.\
  \ 表创建后的碎片化情况\n\n让我们运行填充地址信息的代码。这段代码在清单 6-4 中展示，它模拟了后处理过程。\n\n### 清单 6-4. 导致碎片化的模式：后处理\n\
  \n```sql\nupdate dbo.Positions set Address = N'Position address';\n\nselect index_level,\
  \ page_count, avg_page_space_used_in_percent, avg_fragmentation_in_percent\nfrom\
  \ sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(N'dbo.Positions'),1,null,'DETAILED')\n\
  ```\n\n图 6-4 显示了索引碎片化情况。后处理使索引的叶级页面数量增加了一倍，导致其内部和外部都严重碎片化。\n\n### 图 6-4. 后处理后的碎片化情况\n\
  \n正如你可能猜到的，你可以通过在插入阶段就填充地址信息来避免这种情况。然而，这个选项并非总是可用。\n\n另一个选择是，你可以在插入阶段通过填充以下内容来预留行中的空间：\n\
  \n# 第 6 章 ■ 索引碎片\n\n地址列具有一个默认值，从而预分配了空间。让我们通过清单 6-5 中展示的代码，来看看地址信息使用了多少空间。图 6-5\
  \ 显示了结果。\n\n## 清单 6-5. 导致碎片的模式：计算平均地址大小\n\n```\nselect avg(datalength(Address))\
  \ as [Avg Address Size] from dbo.Positions\n```\n\n## 图 6-5. 后处理后的碎片情况\n\n平均地址大小为\
  \ 32 字节，即 16 个 Unicode 字符。你可以在插入阶段用一个由 16 个空格字符组成的字符串来填充它，这样就能在行中预留出所需空间。清单 6-6\
  \ 中的代码演示了这种方法。\n\n## 清单 6-6. 导致碎片的模式：在插入阶段用 16 个空格字符填充地址\n\n```\ntruncate table\
  \ dbo.Positions\n\ngo\n\n;with N1(C) as (select 0 union all select 0) -- 2 rows\n\
  ,N2(C) as (select 0 from N1 as T1 cross join N1 as T2) -- 4 rows\n,N3(C) as (select\
  \ 0 from N2 as T1 cross join N2 as T2) -- 16 rows\n,N4(C) as (select 0 from N3 as\
  \ T1 cross join N3 as T2) -- 256 rows\n,N5(C) as (select 0 from N4 as T1 cross join\
  \ N4 as T2) -- 65,536 rows\n,IDs(ID) as (select row_number() over (order by (select\
  \ NULL)) from N5)\n\ninsert into dbo.Positions(DeviceId, ATime, Latitude, Longitude,\
  \ Address)\nselect\n    ID % 100 /*DeviceId*/\n    ,dateadd(minute, -(ID % 657),\
  \ getutcdate()) /*ATime*/\n    ,0 /*Latitude - just dummy value*/\n    ,0 /*Longitude\
  \ - just dummy value*/\n    ,replicate(N' ',16) /*Address - adding string of 16\
  \ space characters*/\nfrom IDs;\n```\n\n![](img/index-175_1.jpg)\n\n# 第 6 章 ■ 索引碎片\n\
  \n```\ncreate unique clustered index IDX_Postitions_DeviceId_ATime\non dbo.Positions(DeviceId,\
  \ ATime);\n\nupdate dbo.Positions set Address = N'Position address';\n\nselect index_level,\
  \ page_count, avg_page_space_used_in_percent, avg_fragmentation_in_percent\nfrom\
  \ sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(N'Positions'),1,null,'DETAILED')\n\
  ```\n\n尽管你在后处理阶段更新了地址信息，但这并未增加数据行的大小。因此，表中没有产生碎片，如图 6-6 所示。\n\n## 图 6-6. 当行在插入阶段已为地址预填充了\
  \ 16 个空格字符时的碎片情况\n\n不幸的是，在某些情况下，由于系统的业务或功能要求，你无法在插入阶段预先填充某些列。作为一种变通方法，你可以在表中创建一个可变长度列，并将其用作占位符来预留空间。清单\
  \ 6-7 展示了这样一种方法。\n\n## 清单 6-7. 导致碎片的模式：使用占位符列来预留空间\n\n```\ndrop table dbo.Positions\n\
  \ngo\n\ncreate table dbo.Positions\n(\n    DeviceId int not null,\n    ATime datetime2(0)\
  \ not null,\n    Latitude decimal(9,6) not null,\n    Longitude decimal(9,6) not\
  \ null,\n    Address nvarchar(200) null,\n    Placeholder char(100) null,\n    Dummy\
  \ varbinary(32)\n);\n\n;with N1(C) as (select 0 union all select 0) -- 2 rows\n\
  ,N2(C) as (select 0 from N1 as T1 cross join N1 as T2) -- 4 rows\n,N3(C) as (select\
  \ 0 from N2 as T1 cross join N2 as T2) -- 16 rows\n,N4(C) as (select 0 from N3 as\
  \ T1 cross join N3 as T2) -- 256 rows\n,N5(C) as (select 0 from N4 as T1 cross join\
  \ N4 as T2) -- 65,536 rows\n,IDs(ID) as (select row_number() over (order by (select\
  \ NULL)) from N5)\n\ninsert into dbo.Positions(DeviceId, ATime, Latitude, Longitude,\
  \ Dummy)\nselect\n    ID % 100 /*DeviceId*/\n    ,dateadd(minute, -(ID % 657), getutcdate())\
  \ /*ATime*/\n    ,0 /*Latitude - just dummy value*/\n    ,0 /*Longitude - just dummy\
  \ value*/\n    ,convert(varbinary(32),replicate('0',32)) /* Reserving the space*/\n\
  from IDs;\n```\n\n![](img/index-176_1.jpg)\n\n# 第 6 章 ■ 索引碎片\n\n```\ncreate unique\
  \ clustered index IDX_Postitions_DeviceId_ATime\non dbo.Positions(DeviceId, ATime);\n\
  \nupdate dbo.Positions\nset\n    Address = N'Position address'\n    ,Dummy = null;\n\
  \nselect index_level, page_count, avg_page_space_used_in_percent, avg_fragmentation_in_percent\n\
  ```\n\n\n# 第六章 ■ 索引碎片\n\n## 摘要\n\nSQL Server 中存在两种类型的索引碎片。外部碎片指逻辑上连续的数据页未位于相同或相邻的区中。这种碎片会影响需要物理\
  \ I/O 读取的扫描操作的性能。\n\n当仅执行索引查找操作时，外部碎片对性能的影响要小得多。\n\n从 `sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(N'Positions'),1,null,'DETAILED')`\
  \ 获取数据。\n\n后处理过程中的行大小保持不变。尽管它给 `Address` 列增加了 32 个字节，但它也将同一行的 `Dummy` 列设置为 `null`，从而减少了\
  \ 32 个字节的行大小。图 6-7 展示了执行代码后的碎片情况。\n\n*图 6-7. 使用占位列时的碎片*\n\n值得注意的是，此方法的效率取决于几个因素。首先，当行大小增加量变化显著时，很难预测要预留的空间量。在这种情况下，你可以选择谨慎地高估。请记住，尽管高估减少了外部碎片，但它增加了内部碎片，并在数据页上留下了未使用的空间。\n\
  \n另一个因素是碎片是如何产生的。该方法最适用于插入碎片最小的、不断增长的索引。当页面拆分和碎片在插入阶段发生时，它的效率较低；例如，当使用 `NEWID()`\
  \ 值填充 `uniqueidentifier` 列上的索引时。\n\n最后，尽管使用占位符可以减少碎片，但它不能取代其他索引维护例程，而是与它们并行工作。\n\
  \n不幸的是，更新过程中行大小增加的情况比乍看起来要常见得多。SQL Server 使用行版本控制来支持其某些功能。使用行版本控制时，SQL Server 将一个或多个旧行版本存储在\
  \ `tempdb` 的一个特殊部分中，称为*版本存储区*。它还会在数据文件的行中添加一个 14 字节的版本标签，以引用版本存储区中的行。该 14 字节的版本标签在行被修改时添加，简而言之，它以类似于你在后处理示例中看到的方式增加了行大小。版本标签会一直保留在行中，直到索引被重建。\n\
  \n依赖于行版本控制的两个最常见的 SQL Server 功能是乐观事务隔离级别和 `AFTER` 触发器。这两个功能都会导致索引碎片，在设计索引维护策略时需要考虑到它们。我们将在本书后面讨论触发器和乐观事务隔离级别。\n\
  \n■ **最佳实践** 如果数据库正在使用乐观事务隔离级别和/或表定义了 `AFTER UPDATE` 或 `AFTER DELETE` 触发器，则不要使用\
  \ `FILLFACTOR=100`。这有助于减少在数据修改过程中由行版本控制引入的索引碎片。\n\n最后，数据库收缩会极大地增加外部碎片，这是由其实现方式决定的。`DBCC\
  \ SHRINK` 命令根据 GAM 分配映射定位文件中已分配的最高页面，并将其尽可能向前移动，而不考虑该页面属于哪个对象。除非绝对必要，建议避免收缩。\n\n\
  在收缩操作完成后，重新组织索引比重建索引更好。索引重建会创建索引的另一个副本，这会增加数据文件的大小，从而违背了收缩的目的。\n\n作为收缩过程的替代方法，你可以创建一个新的文件组，并通过将对象移动到那里来重建索引。之后，可以删除旧的、空的文件组。这种方法以类似于收缩操作的方式减少数据库的大小，但不会引入碎片。\n\
  \n\n# 第 6 章 ■ 索引碎片\n\n只需读取少量行和数据页。此外，当数据页缓存在缓冲池中时，它不会影响性能。\n\n当索引中的叶级数据页存在可用空间时，就会发生内部碎片。因此，索引在磁盘和内存中使用更多的数据页来存储数据。即使数据页已被缓存，由于需要处理额外的数据页，内部碎片也会对扫描操作的性能产生负面影响。\n\
  \n轻微程度的内部碎片可以加速插入和更新操作，并减少页拆分的次数。你可以在创建索引或重建索引时，通过指定 `FILLFACTOR` 属性，在叶级索引页中预留一些空间。建议通过逐渐减小\
  \ `FILLFACTOR` 的值并监控其对系统碎片的影响来对其进行微调。如果你使用的是 SQL Server 2012 或更高版本，还可以使用扩展事件来监控页拆分操作。\n\
  \n`sys.dm_db_index_physical_stats` 数据管理函数允许你监控内部和外部碎片。有两种方法可以减少索引碎片。`ALTER INDEX\
  \ REORGANIZE` 命令重新排序索引叶页。这是一个联机操作，可以随时取消而不会丢失其进度。`ALTER INDEX REBUILD` 命令用新的副本替换旧的、碎片化的索引。默认情况下，这是一个脱机操作，尽管\
  \ SQL Server 企业版可以联机重建索引。\n\n在设计索引维护策略时，你必须考虑多种因素，例如系统工作负载和可用性、使用的 SQL Server 版本和版本，以及系统中使用的任何高可用性技术。你还应该分析碎片对系统的影响。索引维护非常耗费资源，在某些情况下，它引入的开销超过了它带来的好处。\n\
  \n然而，最小化碎片的最佳方法是消除其根源。考虑避免在更新期间行大小增加的情况，不要收缩数据文件，不要使用 AFTER 触发器，并避免在填充了随机值的 `uniqueidentifier`\
  \ 或 `hashbyte` 列上创建索引。\n\n# 第 7 章 ■ 索引的设计与调优\n\n不可能定义一个在所有地方都适用的索引策略。每个系统都是独特的，需要根据工作负载、业务需求以及许多其他因素采用其自己的索引方法。\n\
  \n然而，有一些设计考虑因素和指导原则可以应用于每个系统。\n\n当我们优化现有系统时，情况也是如此。虽然优化是一个迭代过程，在每种情况下都是独特的，但有一组技术可用于检测每个数据库系统中的低效之处。\n\
  \n在本章中，我们将介绍在设计新索引和优化现有系统时需要牢记的几个重要因素。\n\n#### 聚集索引设计注意事项\n\n每次更改聚集索引键的值时，都会发生两件事。首先，SQL\
  \ Server 将行移动到聚集索引页链和数据文件中的不同位置。其次，它更新 `row-id`，即聚集索引键。`row-id` 被存储，并且需要更新到所有非聚集索引中。就\
  \ I/O 而言，这可能代价高昂，尤其是在批量更新的情况下。此外，它会增加聚集索引的碎片，在 `row-id` 大小增加的情况下，也会增加非聚集索引的碎片。因此，最好使用键值不会改变的*静态*聚集索引。\n\
  \n所有非聚集索引都使用聚集索引键作为 `row-id`。过宽的聚集索引键会增加非聚集索引行的大小，并需要更多空间来存储它们。因此，在索引或范围扫描操作期间，SQL\
  \ Server 需要处理更多的数据页，这使得索引效率降低。\n\n# 第 7 章 ■ 索引的设计与调优\n\n在非唯一非聚集索引的情况下，`row-id`也会存储在非叶级索引层级中，这反过来会减少每页的索引记录数量，并可能导致索引中出现额外的中间层级。尽管非叶索引层级通常缓存在内存中，但每次`SQL\
  \ Server`遍历非聚集索引`B-Tree`时，这都会引入额外的逻辑读取。\n\n最终，较大的非聚集索引会在缓冲池中占用更多空间，并在索引维护期间引入更多开销。显然，不可能提供一个通用的阈值来定义可应用于任何表的键的最大可接受大小。然而，作为一般规则，最好使用`窄`的聚集索引键，并使索引键尽可能小。\n\
  \n将聚集索引定义为`唯一`也是有益的。其重要性的原因并不显而易见。考虑这样一种场景：一个表没有唯一的聚集索引，而你希望运行一个查询，该查询在执行计划中使用`非聚集索引\
  \ seek`。在这种情况下，如果非聚集索引中的`row-id`不是唯一的，`SQL Server`在键查找操作期间将不知道选择哪个聚集索引行。\n\n`SQL\
  \ Server`通过向非唯一聚集索引中添加另一个可为空的整数列来解决此类问题，该列称为`uniquifier`。对于键值的首次出现，`SQL Server`会用`NULL`填充`uniquifier`，对于插入表中的每个后续重复项，会自动递增该值。\n\
  \n© Dmitri Korotkevitch 2016\nD. Korotkevitch, *Pro SQL Server Internals*, DOI 10.1007/978-1-4842-1964-5_7\n\
  \n## **注意**\n每个聚集索引键值可能的重复项数量受整数值域限制。具有相同聚集索引键的行数不能超过 2,147,483,648。这是一个理论限制，并且创建具有如此差选择性的索引显然不是一个好主意。\n\
  \n让我们看看非唯一聚集索引中由`uniquifiers`引入的开销。清单 7-1 中显示的代码创建了三个结构相同但聚集索引配置不同的表，并为每个表填充了 65,536\
  \ 行数据。\n\n表`dbo.UniqueCI`是唯一定义了唯一聚集索引的表。表`dbo.NonUniqueCINoDups`没有任何重复的键值。最后，表`dbo.NonUniqueCIDups`的索引中有大量重复项。\n\
  \n## 清单 7-1. 非唯一聚集索引：表创建\n\n```sql\ncreate table dbo.UniqueCI\n(\n    KeyValue int\
  \ not null,\n    ID int not null,\n    Data char(986) null,\n    VarData varchar(32)\
  \ not null\n        constraint DEF_UniqueCI_VarData\n        default 'Data'\n);\n\
  \ncreate unique clustered index IDX_UniqueCI_KeyValue\n    on dbo.UniqueCI(KeyValue);\n\
  \ncreate table dbo.NonUniqueCINoDups\n(\n    KeyValue int not null,\n    ID int\
  \ not null,\n    Data char(986) null,\n    VarData varchar(32) not null\n      \
  \  constraint DEF_NonUniqueCINoDups_VarData\n        default 'Data'\n);\n\ncreate\
  \ /*unique*/ clustered index IDX_NonUniqueCINoDups_KeyValue\n    on dbo.NonUniqueCINoDups(KeyValue);\n\
  \ncreate table dbo.NonUniqueCIDups\n(\n    KeyValue int not null,\n    ID int not\
  \ null,\n    Data char(986) null,\n    VarData varchar(32) not null\n        constraint\
  \ DEF_NonUniqueCIDups_VarData\n        default 'Data'\n);\n\ncreate /*unique*/ clustered\
  \ index IDX_NonUniqueCIDups_KeyValue\n    on dbo.NonUniqueCIDups(KeyValue);\n```\n\
  \n## 填充数据\n\n```sql\n;with N1(C) as (select 0 union all select 0) -- 2 rows\n,N2(C)\
  \ as (select 0 from N1 as T1 cross join N1 as T2) -- 4 rows\n,N3(C) as (select 0\
  \ from N2 as T1 cross join N2 as T2) -- 16 rows\n,N4(C) as (select 0 from N3 as\
  \ T1 cross join N3 as T2) -- 256 rows\n,N5(C) as (select 0 from N4 as T1 cross join\
  \ N4 as T2) -- 65,536 rows\n,IDs(ID) as (select row_number() over (order by (select\
  \ null)) from N5)\ninsert into dbo.UniqueCI(KeyValue, ID)\n    select ID, ID from\
  \ IDs;\n\ninsert into dbo.NonUniqueCINoDups(KeyValue, ID)\n    select KeyValue,\
  \ ID from dbo.UniqueCI;\n\ninsert into dbo.NonUniqueCIDups(KeyValue, ID)\n    select\
  \ KeyValue % 10, ID from dbo.UniqueCI;\n```\n\n# 第七章 ■ 索引的设计与调优\n\n现在，让我们查看每个表的聚集索引物理统计信息。相关代码如\
  \ `清单 7-2` 所示，结果如 `图 7-1` 所示。\n\n## 清单 7-2. 非唯一聚集索引：检查聚集索引的行大小\n\n```sql\nselect\
  \ index_level, page_count, min_record_size_in_bytes as [min row size]\n    ,max_record_size_in_bytes\
  \ as [max row size]\n    ,avg_record_size_in_bytes as [avg row size]\nfrom\n   \
  \ sys.dm_db_index_physical_stats(db_id(), object_id(N'dbo.UniqueCI'), 1, null ,'DETAILED');\n\
  \nselect index_level, page_count, min_record_size_in_bytes as [min row size]\n \
  \   ,max_record_size_in_bytes as [max row size]\n    ,avg_record_size_in_bytes as\
  \ [avg row size]\nfrom\n    sys.dm_db_index_physical_stats(db_id(), object_id(N'dbo.NonUniqueCINoDups'),\
  \ 1, null\n        ,'DETAILED');\n\nselect index_level, page_count, min_record_size_in_bytes\
  \ as [min row size]\n    ,max_record_size_in_bytes as [max row size]\n    ,avg_record_size_in_bytes\
  \ as [avg row size]\nfrom\n    sys.dm_db_index_physical_stats(db_id(), object_id(N'dbo.NonUniqueCIDups'),\
  \ 1, null\n        ,'DETAILED');\n```\n\n![](img/index-182_1.jpg)\n\n## 图 7-1. 非唯一聚集索引：聚集索引的行大小\n\
  \n尽管 `dbo.NonUniqueCINoDups` 表中没有重复的键值，但行中仍然增加了两个额外的字节。SQL Server 在数据的可变长度部分存储了一个唯一值添加器，并且这两个字节是通过可变长度数据偏移数组中的另一个条目添加的。\n\
  \n在聚集索引具有重复值的情况下，唯一值添加器又会增加四个字节，这总共造成了六个字节的开销。\n\n值得一提的是，在某些边缘情况下，唯一值添加器使用的额外存储空间会减少数据页上可容纳的行数。我们的示例演示了这种情况。如你所见，`dbo.UniqueCI`\
  \ 比另外两个表少用了大约 15% 的数据页。\n\n现在，让我们看看唯一值添加器如何影响非聚集索引。`清单 7-3` 所示的代码在所有三个表中创建了非聚集索引。`图\
  \ 7-2` 显示了这些索引的物理统计信息。\n\n## 清单 7-3. 非唯一聚集索引：检查非聚集索引的行大小\n\n```sql\ncreate nonclustered\
  \ index IDX_UniqueCI_ID\non dbo.UniqueCI(ID);\n\ncreate nonclustered index IDX_NonUniqueCINoDups_ID\n\
  on dbo.NonUniqueCINoDups(ID);\n\ncreate nonclustered index IDX_NonUniqueCIDups_ID\n\
  on dbo.NonUniqueCIDups(ID);\n\nselect index_level, page_count, min_record_size_in_bytes\
  \ as [min row size]\n    ,max_record_size_in_bytes as [max row size]\n    ,avg_record_size_in_bytes\
  \ as [avg row size]\nfrom\n    sys.dm_db_index_physical_stats(db_id(), object_id(N'dbo.UniqueCI'),\
  \ 2, null\n        ,'DETAILED');\n\nselect index_level, page_count, min_record_size_in_bytes\
  \ as [min row size]\n    ,max_record_size_in_bytes as [max row size]\n    ,avg_record_size_in_bytes\
  \ as [avg row size]\nfrom\n    sys.dm_db_index_physical_stats(db_id(), object_id(N'dbo.NonUniqueCINoDups'),\
  \ 2, null\n        ,'DETAILED');\n\nselect index_level, page_count, min_record_size_in_bytes\
  \ as [min row size]\n    ,max_record_size_in_bytes as [max row size]\n    ,avg_record_size_in_bytes\
  \ as [avg row size]\nfrom\n    sys.dm_db_index_physical_stats(db_id(), object_id(N'dbo.NonUniqueCIDups'),\
  \ 2, null\n        ,'DETAILED');\n```\n\n![](img/index-183_1.jpg)\n\n## 图 7-2. 非唯一聚集索引：非聚集索引的行大小\n\
  \n在 `dbo.NonUniqueCINoDups` 表的非聚集索引中没有开销。如你所忆，SQL Server 不会为存储 NULL 数据的尾随列在可变长度偏移数组中存储偏移信息。尽管如此，唯一值添加器在\
  \ `dbo.NonUniqueCIDups` 表中引入了八个字节的开销。这八个字节由一个四字节的唯一值添加器值、一个两字节的可变长度数据偏移数组条目以及一个两字节的用于存储行中可变长度列数量的条目组成。\n\
  \n\n我们可以通过以下方式总结唯一值生成器的存储开销。对于`uniquifier`为`NULL`的行，如果索引中至少有一个存储了`NOT NULL`值的可变长度列，则会产生两字节的开销。该开销来源于唯一值生成器列的变长偏移量数组条目。否则，则没有额外开销。\n\
  \n在唯一值生成器被赋值的情况下，如果存在存储`NOT NULL`值的可变长度列，则开销为六字节。否则，开销为八字节。\n\n■ `提示` 如果你预计聚集索引值中会有大量重复项，可以添加一个整数`identity`列作为索引的最右列，从而使索引具有唯一性。与唯一值生成器引入的最高八字节的不可预测存储开销相比，这为每行增加了四字节的可预测存储开销。当你通过聚集索引的所有列引用该行时，这还可以提高单次查找操作的性能。\n\
  \n## 第 7 章 ■ 设计和优化索引\n\n设计聚集索引时，以最小化因插入新行而导致的索引碎片是有益的。实现此目标的方法之一是使聚集索引值保持`单调递增`。`identity`列上的索引就是一个例子。另一个例子是使用插入时当前系统时间填充的`datetime`列。\n\
  \n然而，单调递增的索引存在两个潜在问题。第一个与统计信息有关。正如你在第 3 章所学，当参数值不在直方图中时，SQL Server 的旧版基数估计器会低估基数。除非你使用的是\
  \ SQL Server 2014-2016 的新版基数估计器（它假定直方图外的数据分布与表中其他数据相似），否则你应该将此行为纳入系统的统计信息维护策略中。\n\
  \n下一个问题更为复杂。对于单调递增的索引，数据总是插入到索引的末尾。一方面，这可以防止页拆分并减少碎片。另一方面，它可能导致`热点`，即当多个会话试图修改同一数据页和/或分配新页或区时发生的序列化延迟。SQL\
  \ Server 不允许多个会话更新相同的数据结构，而是将这些操作序列化。\n\n除非系统以极高的速率收集数据，并且索引每秒处理数百次插入，否则热点通常不是问题。我们将在第\
  \ 27 章“系统故障排除”中讨论如何检测此类问题。\n\n最后，如果系统有一组频繁执行且重要的查询，考虑使用针对它们进行优化的聚集索引可能是有益的。这消除了昂贵的`键查找`操作，并提高了系统性能。\n\
  \n尽管此类查询可以通过使用覆盖非聚集索引来优化，但这并非总是理想的解决方案。在某些情况下，这需要你创建非常宽的非聚集索引，从而在磁盘和缓冲池中占用大量存储空间。\n\
  \n另一个重要因素是列的修改频率。将频繁修改的列添加到非聚集索引中，会迫使 SQL Server 在多个地方更改数据，这对系统的更新性能产生负面影响并增加阻塞。\n\
  \n综上所述，设计出满足所有这些指导原则的聚集索引并不总是可能的。此外，你不应将这些指导原则视为绝对要求。你应该分析系统、业务需求、工作负载和查询，并选择对你有益的聚集索引，即使它们违反了一些指导原则。\n\
  \n##### 标识符、序列和唯一标识符\n\n\n\n# 第七章 设计与优化索引\n\n人们通常选择标识符（identity）、序列（sequence）和唯一标识符（uniqueidentifier）作为聚簇索引键。一如既往，这种方法有其自身的优缺点。\n\
  \n在这些列上定义的聚簇索引是`unique`（唯一）、`static`（静态）且`narrow`（窄）的。此外，标识符和序列是单调递增的，这减少了索引碎片。目录实体表是它们的理想用例之一。你可以将存储客户、文章或设备列表的表视为示例。这些表存储数千行甚至数百万行数据，尽管数据相对静态，因此热点问题不是问题。此外，此类表通常被外键引用并在连接（join）中使用。在整型（`integer`）或大整型（`bigint`）列上的索引非常紧凑和高效，这将提高查询性能。\n\
  \n> **注意** 我们将在第 8 章 “[约束](http://dx.doi.org/10.1007/978-1-4842-1964-5_8)” 中更详细地讨论外键约束。\n\
  \n对于事务性表，即以极高速率收集大量数据的表，在标识符或序列列上的聚簇索引效率较低，因为它们可能引入潜在的热点。\n\n另一方面，唯一标识符很少是索引（无论是聚簇还是非聚簇）的良好选择。由`NEWID()`函数生成的随机值会大大增加索引碎片。此外，唯一标识符上的索引会降低批处理操作的性能。让我们看一个例子，创建两个表：一个在标识符列上有聚簇索引，另一个在唯一标识符列上有聚簇索引。下一步，我们将向两个表中插入\
  \ 65,536 行。你可以参考清单 7-4 中的代码来完成此操作。\n\n## 清单 7-4. 唯一标识符：表创建\n\n```sql\ncreate table\
  \ dbo.IdentityCI\n(\n    ID int not null identity(1,1),\n    Val int not null,\n\
  \    Placeholder char(100) null\n);\n\ncreate unique clustered index IDX_IdentityCI_ID\n\
  on dbo.IdentityCI(ID);\n\ncreate table dbo.UniqueidentifierCI\n(\n    ID uniqueidentifier\
  \ not null\n        constraint DEF_UniqueidentifierCI_ID\n        default newid(),\n\
  \    Val int not null,\n    Placeholder char(100) null,\n);\n\ncreate unique clustered\
  \ index IDX_UniqueidentifierCI_ID\non dbo.UniqueidentifierCI(ID)\ngo\n\n;with N1(C)\
  \ as (select 0 union all select 0) -- 2 rows\n,N2(C) as (select 0 from N1 as T1\
  \ cross join N1 as T2) -- 4 rows\n,N3(C) as (select 0 from N2 as T1 cross join N2\
  \ as T2) -- 16 rows\n,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256\
  \ rows\n,N5(C) as (select 0 from N4 as T1 cross join N4 as T2) -- 65,536 rows\n\
  ,IDs(ID) as (select row_number() over (order by (select null)) from N5)\ninsert\
  \ into dbo.IdentityCI(Val)\nselect ID from IDs;\n\n;with N1(C) as (select 0 union\
  \ all select 0) -- 2 rows\n,N2(C) as (select 0 from N1 as T1 cross join N1 as T2)\
  \ -- 4 rows\n,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) -- 16 rows\n\
  ,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256 rows\n,N5(C) as (select\
  \ 0 from N4 as T1 cross join N4 as T2) -- 65,536 rows\n,IDs(ID) as (select row_number()\
  \ over (order by (select null)) from N5)\ninsert into dbo.UniqueidentifierCI(Val)\n\
  select ID from IDs;\n```\n\n![图片](img/index-186_1.jpg)\n\n## 表 7-1. 向表中插入数据：执行统计\n\
  \n| **指标** | **标识符 (Identity)** | **唯一标识符 (Uniqueidentifier)** |\n| :--- | :---\
  \ | :--- |\n| **读取次数** | 158,438 | 181,879 |\n| **执行时间 (毫秒)** | 173 | 256 |\n\n\
  ## 图 7-3. 向表中插入数据：执行计划\n\n如你所见，在唯一标识符列索引的情况下，执行计划中多了一个排序运算符。SQL Server 在插入前对随机生成的唯一标识符值进行排序，这降低了查询性能。\n\
  \n让我们再向表中插入一批行，并检查索引碎片。执行此操作的代码...\n\n\n\n# 第 7 章 ■ 索引的设计与优化\n\n如代码清单 7-5 所示。图 7-4\
  \ 展示了查询的结果。\n\n## 代码清单 7-5. Uniqueidentifier（唯一标识符）：插入行并检查碎片\n\n```sql\n;with N1(C)\
  \ as (select 0 union all select 0) -- 2 行\n,N2(C) as (select 0 from N1 as T1 cross\
  \ join N1 as T2) -- 4 行\n,N3(C) as (select 0 from N2 as T1 cross join N2 as T2)\
  \ -- 16 行\n,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256 行\n,N5(C)\
  \ as (select 0 from N4 as T1 cross join N4 as T2) -- 65,536 行\n,IDs(ID) as (select\
  \ row_number() over (order by (select null)) from N5)\ninsert into dbo.IdentityCI(Val)\n\
  select ID from IDs;\n\n;with N1(C) as (select 0 union all select 0) -- 2 行\n,N2(C)\
  \ as (select 0 from N1 as T1 cross join N1 as T2) -- 4 行\n,N3(C) as (select 0 from\
  \ N2 as T1 cross join N2 as T2) -- 16 行\n,N4(C) as (select 0 from N3 as T1 cross\
  \ join N3 as T2) -- 256 行\n,N5(C) as (select 0 from N4 as T1 cross join N4 as T2)\
  \ -- 65,536 行\n,IDs(ID) as (select row_number() over (order by (select null)) from\
  \ N5)\n\n![](img/index-187_1.jpg)\n\ninsert into dbo.UniqueidentifierCI(Val)\nselect\
  \ ID from IDs;\n\nselect page_count, avg_page_space_used_in_percent, avg_fragmentation_in_percent\n\
  from sys.dm_db_index_physical_stats(db_id(),object_id(N'dbo.IdentityCI'),1,null,'DETAILED');\n\
  \nselect page_count, avg_page_space_used_in_percent, avg_fragmentation_in_percent\n\
  from sys.dm_db_index_physical_stats(db_id(),object_id(N'dbo.UniqueidentifierCI'),1,null,'DETAILED');\n\
  ```\n\n## 图 7-4. 索引的碎片情况\n\n如你所见，在`uniqueidentifier`列上的索引碎片化严重，与在标识列上的索引相比，它多使用了大约\
  \ 40%的数据页。\n\n对`uniqueidentifier`列上的索引进行批量插入时，会在数据文件的不同位置插入数据，这在大型表的情况下会导致大量的随机物理\
  \ I/O。这会显著降低操作性能。\n\n## 个人经验\n\n不久前，我参与了一个系统的优化工作。该系统有一个 250 GB 的表，包含一个聚集索引和三个非聚集索引。其中一个非聚集索引建立在`uniqueidentifier`列上。通过移除这个索引，我们将\
  \ 50,000 行的批量插入时间从 45 秒加速到了 7 秒。\n\n通常，在以下两种常见场景中，你会希望在`uniqueidentifier`列上创建索引。第一种是为了支持跨多个数据库的值唯一性。想象一个分布式系统，行可以插入到每个数据库中。开发人员通常使用`uniqueidentifier`来确保每个键值在整个系统范围内都是唯一的。\n\
  \n这种实现的关键要素在于键值是如何生成的。正如你已经看到的，使用`NEWID()`函数或在客户端代码中生成的随机值会对系统性能产生负面影响。但是，你可以使用`NEWSEQUENTIALID()`函数，它生成唯一且*通常*递增的值（SQL\
  \ Server 会不时重置它们的基数）。使用`NEWSEQUENTIALID()`函数生成的`uniqueidentifier`列上的索引与标识列和序列列上的索引类似；然而，你需要记住，`uniqueidentifier`数据类型使用\
  \ 16 字节的存储空间，而`int`类型为 4 字节，`bigint`类型为 8 字节。\n\n作为替代方案，你可以考虑创建一个包含两个列 (`InstallationId`,\
  \ `Unique_Id_Within_Installation`) 的复合索引。这种列组合保证了跨多个安装和数据库的唯一性，并且比`uniqueidentifier`占用的存储空间更少。你可以使用整型标识或序列来生成`Unique_Id_Within_Installation`值，这将减少索引的碎片化。\n\
  \n在你需要为数据库中所有实体生成唯一键值的情况下，你可以\n\n\n\n考虑在所有实体间使用单一的序列对象。此方法满足了需求，但使用的数据类型比 `uniqueidentifier`\
  \ 更小。\n\n另一个常见用例是安全性，其中 `uniqueidentifier` 值被用作安全令牌或随机对象 ID。不幸的是，你无法在此场景中使用 `NEWSEQUENTIALID()`\
  \ 函数，因为有可能猜出该函数返回的下一个值。\n\n此场景中一种可能的改进是，使用 `CHECKSUM()` 函数创建一个计算列，随后对其建立索引，而无需在\
  \ `uniqueidentifier` 列上直接创建索引。代码如清单 7-6 所示。\n\n***清单 7-6.*** 使用 `CHECKSUM()`：表结构\n\
  \n```\ncreate table dbo.Articles\n(\n    ArticleId int not null identity(1,1),\n\
  \    ExternalId uniqueidentifier not null\n        constraint DEF_Articles_ExternalId\n\
  \            default newid(),\n    ExternalIdCheckSum as checksum(ExternalId),\n\
  \    /* 其他列 */\n);\n\ncreate unique clustered index IDX_Articles_ArticleId\n   \
  \ on dbo.Articles(ArticleId);\n\ncreate nonclustered index IDX_Articles_ExternalIdCheckSum\n\
  \    on dbo.Articles(ExternalIdCheckSum);\n```\n\n■ **提示** 你可以对计算列创建索引而无需持久化它。\n\
  \n尽管 `IDX_Articles_ExternalIdCheckSum` 索引会产生严重的碎片，但与在 `uniqueidentifier` 列上的索引相比（4\
  \ 字节键对比 16 字节键），它将更紧凑。由于排序更快，它也提高了批量操作的性能，这同时也需要更少的内存来进行。\n\n你必须牢记的一点是，`CHECKSUM()`\
  \ 函数的结果不能保证唯一。你应该在查询中包含两个谓词，如清单 7-7 所示。\n\n***清单 7-7.*** 使用 `CHECKSUM()`：选择数据\n\n\
  ```\nselect ArticleId /* 其他列 */\nfrom dbo.Articles\nwhere checksum(@ExternalId)\
  \ = ExternalIdCheckSum and ExternalId = @ExternalId\n```\n\n## 第 7 章 ■ 索引的设计与调优\n\
  \n■ **提示** 在需要对大于 900/1,700 字节的字符串列（这是非聚集索引键的最大大小）建立索引的情况下，你可以使用相同的技术。尽管这样的索引不支持\
  \ `范围扫描` 操作，但它可以用于 `点查找`。\n\n#### 非聚集索引设计注意事项\n\n很难找到那个转折点，即连接多个非聚集索引比使用单个非聚集 `索引查找`\
  \ 和 `键查找` 操作更高效。当索引选择性高且 SQL Server 估计索引查找操作将返回少量行时，键查找的成本相对较低。在这种情况下，没有理由使用另一个非聚集索引。反之，当索引选择性低时，索引查找会返回大量行，SQL\
  \ Server 通常不会使用它，因为效率不高。\n\n让我们看一个例子，我们将创建一个表并填充 1,048,576 行。`Col1` 列中存储 50 个不同的值，`Col2`\
  \ 存储 150 个值，`Col3` 存储 200 个值。最后，我们将在表上创建三个不同的非聚集索引。执行此操作的代码如清单 7-8 所示。\n\n***清单\
  \ 7-8.*** 多个非聚集索引：表创建\n\n```\ncreate table dbo.IndexIntersection\n(\n    Id int\
  \ not null,\n    Placeholder char(100),\n    Col1 int not null,\n    Col2 int not\
  \ null,\n    Col3 int not null\n);\n\ncreate unique clustered index IDX_IndexIntersection_ID\n\
  \    on dbo.IndexIntersection(ID);\n\n;with N1(C) as (select 0 union all select\
  \ 0) -- 2 行\n,N2(C) as (select 0 from N1 as T1 cross join N1 as T2) -- 4 行\n,N3(C)\
  \ as (select 0 from N2 as T1 cross join N2 as T2) -- 16 行\n,N4(C) as (select 0 from\
  \ N3 as T1 cross join N3 as T2) -- 256 行\n,N5(C) as (select 0 from N4 as T1 cross\
  \ join N4 as T2) -- 65,536 行\n,N6(C) as (select 0 from N3 as T1 cross join N5 as\
  \ T2) -- 1,048,576 行\n,IDs(ID) as (select row_number() over (order by (select null))\
  \ from N6)\ninsert into dbo.IndexIntersection(ID, Col1, Col2, Col3)\n```\n\n\n#\
  \ 第 7 章 ■ 索引的设计与调优\n\n```sql\nselect ID, ID % 50, ID % 150, ID % 200 from IDs;\n\
  \ncreate nonclustered index IDX_IndexIntersection_Col1\non dbo.IndexIntersection(Col1);\n\
  \ncreate nonclustered index IDX_IndexIntersection_Col2\non dbo.IndexIntersection(Col2);\n\
  \ncreate nonclustered index IDX_IndexIntersection_Col3\non dbo.IndexIntersection(Col3);\n\
  ```\n\n![](img/index-190_1.jpg)\n\n## 多个非聚集索引：数据查询\n\n接下来，让我们看一个查询的执行计划，该查询从表中选择数据，其\
  \ where 子句中使用了三个谓词。每个谓词都可以在单独的索引上使用索引查找操作。实现此功能的代码如清单 7-9 所示，执行计划如图 7-5 所示。需要说明的是，根据您安装的\
  \ SQL Server 版本和补丁包，您环境中看到的执行计划和基数估计可能会有所不同。\n\n***清单 7-9.*** 多个非聚集索引：数据查询\n\n```sql\n\
  select ID\nfrom dbo.IndexIntersection\nwhere Col1 = 42 and Col2 = 43 and Col3 =\
  \ 44;\n```\n\n***图 7-5.*** 多个非聚集索引：使用索引交叉的执行计划\n\n这里有几个值得注意的地方。尽管在 `Col1` 上有另一个非聚集索引，并且所有索引都包含\
  \ `ID` 列（即行 ID），但 SQL Server 选择使用键查找操作，而不是执行第三次索引查找操作。表中 `Col1=42` 的行有 20,971 行，这使得键查找成为更好的选择。\n\
  \n另一个重要因素是基数估计。尽管 SQL Server 正确估计了两次索引查找操作的基数，但连接操作符之后的估计是错误的。SQL Server 没有任何关于表中列值相关性的数据，这可能导致基数估计错误，并可能产生非最优的执行计划。\n\
  \n让我们添加另一个包含索引，它将包含 where 子句中的所有三个列，并再次运行清单 7-9 中的查询。创建该索引的代码如清单 7-10 所示。执行计划如图\
  \ 7-6 所示。\n\n**■ 注意** 包含两个附加列的新索引使得 `IDX_IndexIntersection_Col1` 索引变得冗余。我们将在本章后面讨论这种情况。\n\
  \n***清单 7-10.*** 多个非聚集索引：添加一个包含索引\n\n```sql\ncreate nonclustered index IDX_IndexIntersection_Col3_Included\n\
  on dbo.IndexIntersection(Col3)\ninclude (Col1, Col2)\n```\n\n![](img/index-191_1.jpg)\n\
  \n***图 7-6.*** 多个非聚集索引：使用包含索引的执行计划\n\nCPU 时间和读取次数如表 7-2 所示。\n\n***表 7-2.*** 索引交叉与包含索引对比\n\
  \n|   | 读取次数 | CPU 时间（毫秒） |\n|---|---|---|\n| 索引交叉 | 9 ms | |\n| 包含索引 | 1 ms | |\n\
  \n尽管两种情况下的读取次数差别不大，但使用索引交叉的查询 CPU 时间远高于使用包含索引的查询。\n\n采用多个狭窄的非聚集索引（导致索引交叉）的设计仍然有帮助，特别是在数据仓库工作负载的情况下，这些查询需要扫描和聚合大量数据。然而，与包含索引相比，它们的效率较低。通常，创建一小部分包含多个列的宽索引比创建大量狭窄的（可能是单列的）索引更好。\n\
  \n虽然理想的索引应该覆盖查询，但这并不是必需的。少量的键查找操作是完全可以接受的。理想情况下，SQL Server 会执行非聚集索引查找，通过评估索引中包含列的其它谓词进一步过滤行。这将减少所需的键查找次数。这里的关键词是针对查询谓词进行评估\n\
  \n## 设计与优化索引\n\n### 不同工作负载下的索引策略\n\n数据在键查找阶段之后来自非聚集索引，而非其本身。这可以通过在索引中包含谓词列来实现。\n\
  \n无法建议每个表应创建多少个索引。此外，对于 OLTP、数据仓库或混合工作负载的系统，这个数量也各不相同。无论如何，这个数量属于“视情况而定”的范畴。\n\n\
  在数据高度易变的 OLTP 系统中，您应该只拥有**最必需**的索引集。虽然拥有足够的索引以提供充足的系统查询性能很重要，但您必须考虑它们引入的数据修改开销。在某些情况下，忍受很少执行的查询的次优性能，比忍受每次数据修改操作时的开销更可取。\n\
  \n在数据仓库环境中，您可以创建大量索引和/或索引视图，特别是在数据相对静态并根据给定计划刷新的情况下。在某些情况下，通过在更新前删除索引并在更新后重新创建，您可以获得更好的更新性能。还值得一提的是，在专用数据仓库系统中，使用列存储索引通常会带来显著更好的性能。\n\
  \n> **注意** 我们将在[第 9 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_9)“视图”中讨论索引视图。列存储索引将在本书的第八部分介绍。\n\
  \n在混合工作负载环境中工作总是一个挑战。我倾向于为 OLTP 活动优化它们，这通常是面向客户的，因此更为关键。然而，在处理此类系统时，您始终需要牢记报告/数据仓库方面的因素。设计一组表来存储聚合数据，然后将它们用于报告和分析目的，或者使用结合了基于行和基于列存储的数据分区来处理不同类型的数据，这种情况并不少见。我们将在[本书第\
  \ 16 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_16)讨论后一种场景。\n\n最后，记住尽可能将索引定义为唯一。唯一的非聚集索引更紧凑，因为它们不在非叶级别存储行\
  \ ID。此外，唯一性有助于查询优化器生成更高效的执行计划。\n\n### 优化与调优索引\n\n系统优化和性能调优是一个迭代的、永无止境的过程，特别是在系统处于开发阶段的情况下。新特性和功能通常需要您重新评估和重构代码，并更改系统中的索引。\n\
  \n虽然索引调优是系统优化的重要组成部分，但它几乎不是您必须关注的唯一领域。除了不良或缺失的索引之外，还有许多其他因素可能导致性能欠佳。在排查系统问题时，您必须分析整个技术栈，包括硬件、操作系统、SQL\
  \ Server 和数据库配置。\n\n> **注意** 我们将在[第 27 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_27)“系统故障排除”中更详细地讨论系统故障排除。\n\
  \n与开发新系统相比，对现有系统进行索引调优可能需要略有不同的方法。对于新开发，通常将索引调优推迟到后期阶段更有意义，此时数据库模式和查询已基本定型。这种方法有助于避免在因代码重构而变得过时的优化上花费时间。在敏捷开发环境中尤其如此，因为此类重构在每次迭代中都会例行进行。\n\
  \n在新开发的最初阶段，您仍然应该创建最必需的索引集。这包括主键约束以及用于支持系统中唯一性和引用完整性的索引和/或约束。然而，所有进一步的索引调优都可以推迟到后期的开发阶段。\n\
  \n\n# 第 7 章 ■ 索引的设计与调优\n\n在新系统的索引调优过程中，有两个`必备`要素。首先，数据库应存储足够的数据，理想情况下其数据分布应与生产环境预期相似。其次，你应该能够模拟工作负载，这有助于定位系统中最常见的查询和低效之处。\n\
  \n优化现有系统则需要略有不同的方法。显然，在某些情况下，你必须修复关键的生产问题，此时除了快速添加或调整索引外别无选择。然而，作为一般规则，在向系统添加新索引之前，应先执行索引分析和整合，移除未使用和低效的索引，有时甚至需要重构查询。让我们详细看看所有这些步骤。\n\
  \n##### 检测未使用和低效的索引\n\n索引提升了读取操作的性能。不过，`读取`一词在数据库世界中有些令人困惑。每一个 DML 查询，如`SELECT`、`INSERT`、`UPDATE`、`DELETE`或`MERGE`，都会读取数据。例如，当你从表中删除一行时，SQL\
  \ Server 会读取少量数据页，在每个索引中定位该行。\n\n**注意** 每一个数据库系统，即使是那些数据高度易变的系统，处理的读取操作也远多于写入操作。\n\
  \n与此同时，索引在数据修改时会带来额外开销。行数据需要插入到每个索引中或从每个索引中删除。列值必须在它们出现的每个索引中进行更新。显然，我们希望减少这种开销，并删除那些不常使用的索引。\n\
  \nSQL Server 在内部跟踪索引使用统计信息，并通过 `sys.dm_db_index_usage_stats` 和 `sys.dm_db_index_operation_stats`\
  \ 这两个 DMO（动态管理对象）将其公开。\n\n第一个数据管理视图——`sys.dm_db_index_usage_stats`——提供了关于不同类型索引操作的信息以及上次执行该操作的时间。让我们看一个例子：创建一个表，填充一些数据，然后查看索引使用统计信息。执行此操作的代码如清单\
  \ 7-11 所示。\n\n### 清单 7-11. 索引使用统计信息：表创建\n\n```\ncreate table dbo.UsageDemo\n(\n\
  ID int not null,\nCol1 int not null,\nCol2 int not null,\nPlaceholder char(8000)\
  \ null\n);\n\ncreate unique clustered index IDX_CI on dbo.UsageDemo(ID);\n\ncreate\
  \ unique nonclustered index IDX_NCI1 on dbo.UsageDemo(Col1);\n\ncreate unique nonclustered\
  \ index IDX_NCI2 on dbo.UsageDemo(Col2);\n\n;with N1(C) as (select 0 union all select\
  \ 0) -- 2 rows\n,N2(C) as (select 0 from N1 as T1 cross join N1 as T2) -- 4 rows\n\
  ,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) -- 16 rows\n,IDs(ID) as (select\
  \ row_number() over (order by (select null)) from N3)\ninsert into dbo.UsageDemo(ID,\
  \ Col1, Col2)\nselect ID, ID, ID from IDs;\n\nselect\ns.Name + N'.' + t.name as\
  \ [Table] ,i.name as [Index]\n,ius.user_seeks as [Seeks], ius.user_scans as [Scans]\n\
  ,ius.user_lookups as [Lookups]\n,ius.user_seeks + ius.user_scans + ius.user_lookups\
  \ as [Reads]\n,ius.user_updates as [Updates], ius.last_user_seek as [Last Seek]\n\
  ,ius.last_user_scan as [Last Scan], ius.last_user_lookup as [Last Lookup]\n,ius.last_user_update\
  \ as [Last Update]\nfrom\n![](img/index-194_1.jpg)\nsys.tables t join sys.indexes\
  \ i on\nt.object_id = i.object_id\njoin sys.schemas s on\nt.schema_id = s.schema_id\n\
  left outer join sys.dm_db_index_usage_stats ius on\nius.database_id = db_id() and\n\
  ius.object_id = i.object_id and\nius.index_id = i.index_id\nwhere\ns.name = N'dbo'\
  \ and t.name = N'UsageDemo'\norder by\ns.name, t.name, i.index_id\n```\n\n`sys.dm_db_index_usage_stats`\
  \ 中的 `user_seeks`、`user_scans` 和 `user_lookups` 列分别指示该索引被用于索引查找、索引扫描和键查找操作的次数。`User_updates`\
  \ 表示该索引处理的插入、更新和删除次数。`sys.dm_index_usage_stats` DMV 还返回有关系统使用索引的统计信息以及上次操作发生的时间。\n\
  \n\n# 第 7 章 ■ 索引的设计与调优\n\n如图 7-7 所示，聚集索引和非聚集索引均被更新了一次，在我们的案例中对应于那条`INSERT`语句。两个索引均未被用于任何类型的读操作。\n\
  \n## 图 7-7. 表创建后的索引使用统计\n\n有一点值得提及：我们在查询中使用了外连接。如果自统计计数器重置以来索引未被使用过，`sys.dm_db_index_usage_stats`和`sys.dm_index_operation_stats`这两个动态管理对象（DMO）不会返回任何关于该索引的信息。\n\
  \n> **重要提示**\n>\n> 索引使用统计信息会在 SQL Server 重启时重置。此外，当数据库被分离，或当`AUTO_CLOSE`数据库属性启用且数据库被关闭时，统计信息也会被清除。而且，SQL\
  \ Server 2012 和 2014 存在一个错误，会在索引重建时重置统计信息。此错误在 SQL Server 2012 SP3 CU3、SQL Server\
  \ 2014 SP2 和 SQL Server 2016 中已修复。\n\n在进行索引分析时，你必须牢记此特性。支持按特定计划执行的查询的索引，其统计信息显示未被使用的情况并不少见。例如，想象一个支持每两周或每月运行一次的薪资处理进程的索引。如果\
  \ SQL Server 最近重启过，或者在 SQL Server 2012 RTM–SP3 CU2 及 SQL Server 2014 RTM 和 SP1 版本中如果索引最近重建过，索引统计信息可能会显示该索引未被用于读操作。\n\
  \n> **提示**\n>\n> 你可以考虑按计划创建和删除此类索引，以避免在进程执行间隔期间产生更新开销。\n\n![](img/index-195_1.jpg)\n\
  \n现在，让我们对`dbo.UsageDemo`表运行一些查询，如代码清单 7-12 所示。\n\n## 代码清单 7-12. 索引使用统计：查询\n\n```sql\n\
  -- 查询 1: CI 寻找（点查找）\nselect Placeholder from dbo.UsageDemo where ID = 5;\n\n-- 查询\
  \ 2: CI 寻找（范围扫描）\nselect count(*)\nfrom dbo.UsageDemo with (index=IDX_CI)\nwhere\
  \ ID between 2 and 6;\n\n-- 查询 3: CI 扫描\nselect count(*) from dbo.UsageDemo with\
  \ (index=IDX_CI);\n\n-- 查询 4: NCI 寻找（点查找 + 键查找）\nselect Placeholder from dbo.UsageDemo\
  \ where Col1 = 5;\n\n-- 查询 5: NCI 寻找（范围扫描 - 表中所有数据）\nselect count(*) from dbo.UsageDemo\
  \ where Col1 > -1;\n\n-- 查询 6: NCI 寻找（范围扫描 + 键查找）\nselect sum(Col2)\nfrom dbo.UsageDemo\
  \ with (index = IDX_NCI1)\nwhere Col1 between 1 and 5;\n\n-- 查询 7-8: 更新操作\nupdate\
  \ dbo.UsageDemo set Col2 = -3 where Col1 = 3;\nupdate dbo.UsageDemo set Col2 = -4\
  \ where Col1 = 4;\n```\n\n如果再次运行显示索引使用统计信息的`SELECT`语句，你会看到如图 7-8 所示的结果。\n\n## 图\
  \ 7-8. 执行若干查询后的索引使用统计\n\n这里有几个重要的注意事项。首先，`sys.dm_db_index_usage_stats`返回的是相应操作在执行计划中出现的次数。例如，对于`IDX_CI`索引，只返回了四次查找操作，这意味着有四条查询的执行计划中包含键查找操作，而不管查询执行期间实际进行了多少次键查找。\n\
  \n其次，`sys.dm_db_index_usage_stats`这个动态管理视图（DMV）将点查找和范围扫描都计为“寻找”，这对应于索引寻址操作符。这可能会掩盖索引寻址操作在大量行上执行范围扫描的情况。例如，在我们的示例中，第五条查询扫描了`IDX_NCI1`索引的所有行，但它被计为“寻找”而非“扫描”。\n\
  \n当你在生产系统中进行此类分析时，可以考虑删除那些处理更新多于读取的索引，类似于我们示例中的`IDX_NCI2`。在某些情况下，特别是在 OLTP 环境中，不将扫描操作计入读取次数也是有益的，因为执行索引扫描的查询通常应该被优化。\n\
  \n\n虽然 `sys.dm_db_index_usage_stats` 能从执行计划的角度提供索引使用情况的良好高层概览，但 `sys.dm_db_index_operation_stats`\
  \ 则更深入地提供了关于索引的详细 I/O、访问方法和锁统计信息。\n\n这两个 DMO（动态管理对象）的关键区别在于数据收集方式。`Sys.dm_db_index_usage_stats`\
  \ 记录的是某个操作在执行计划中出现的次数。相比之下，`sys.dm_db_index_operation_stats` 在行级别跟踪操作。在我们的索引查找示例中，`sys.dm_db_index_operation_stats`\
  \ 会报告八次操作，而非四次。\n\n尽管 `sys.dm_db_index_operation_stats` 提供了关于索引使用、I/O 和锁开销的极其详细的信息，但这可能会让人应接不暇，尤其是在初始性能调优阶段。通常，先使用\
  \ `sys.dm_db_index_usage_stats` 进行初步分析，然后在后续对系统进行微调时再使用 `sys.dm_db_index_operation_stats`\
  \ 会更简单。\n\n■ **注意** 你可以在在线丛书中阅读更多关于 `sys.dm_db_index_operation_stats` DMF 的信息：[`technet.microsoft.com/en-us/library/ms174281.aspx`](http://technet.microsoft.com/en-us/library/ms174281.aspx)\n\
  \n■ **重要提示** 在进行分析之前，请确保使用统计数据已收集到足以代表典型系统工作负载的信息。\n\n## 索引整合\n\n正如我们在第 2 章 “表与索引：内部结构与访问方法”(http://dx.doi.org/10.1007/978-1-4842-1964-5_2)\
  \ 中所讨论的，只要查询在最左侧的查询列上具有 `SARGable` 谓词，SQL Server 就可以将复合索引用于索引查找操作。\n\n让我们看一下清单 7-13\
  \ 中所示的表。有两个非聚集索引，`IDX_Employee_LastName_FirstName` 和 `IDX_Employee_LastName`，它们都定义了\
  \ `LastName` 列作为最左侧列。只要在 `LastName` 列上存在 `SARGable` 谓词，第一个索引 `IDX_Employee_LastName_FirstName`\
  \ 就可以用于索引查找操作，即使查询没有针对 `FirstName` 列的谓词。因此，`IDX_Employee_LastName` 索引是冗余的。\n\n***清单\
  \ 7-13.*** 冗余索引示例\n\n```\ncreate table dbo.Employee\n(\nEmployeeId int not null,\n\
  LastName nvarchar(64) not null,\nFirstName nvarchar(64) not null,\nDateOfBirth date\
  \ not null,\nPhone varchar(20) nul\n);\n\nCHAPTER 7 ■ DESIGNING AND TUNING THE INDEXES\n\
  \ncreate unique clustered index IDX_Employee_EmployeeId\non dbo.Employee(EmployeeId);\n\
  \ncreate nonclustered index IDX_Employee_LastName_FirstName\non dbo.Employee(LastName,\
  \ FirstName);\n\ncreate nonclustered index IDX_Employee_LastName\non dbo.Employee(LastName);\n\
  ```\n\n作为一般规则，你可以从系统中移除冗余索引。尽管这类索引由于其紧凑的大小在扫描期间可能稍微更高效，但更新开销通常超过这一优点。\n\n显然，规则总有例外。考虑一个购物车系统，它允许根据产品名称的一部分进行搜索。有几种方法可以实现此功能，但当表足够小时，在\
  \ `Name` 列上的非聚集索引上执行的索引扫描操作可能会提供可接受的性能。在这种情况下，你会希望索引尽可能紧凑，以减少其大小和扫描操作期间所需的读取次数。因此，你可能会考虑在\
  \ `Name` 列上保留一个单独的非聚集索引，即使该索引可以与其他索引合并。\n\n清单 7-14 中显示的脚本返回关于具有相同最左侧列定义的潜在冗余索引的信息。图\
  \ 7-9 展示了执行结果。\n\n***清单 7-14.*** 检测潜在的冗余索引\n\n```\nselect\ns.Name + N'.' + t.name\
  \ as [Table]\n,i1.index_id as [Index1 ID], i1.name as [Index1 Name]\n,dupIdx.index_id\
  \ as [Index2 ID], dupIdx.name as [Index2 Name]\n,c.name as [Column]\nfrom\nsys.tables\
  \ t join sys.indexes i1 on\nt.object_id = i1.object_id\n```\n\n\n\n```sql\njoin\
  \ sys.index_columns ic1 on\n    ic1.object_id = i1.object_id and\n    ic1.index_id\
  \ = i1.index_id and\n    ic1.index_column_id = 1\njoin sys.columns c on\n    c.object_id\
  \ = ic1.object_id and\n    c.column_id = ic1.column_id\njoin sys.schemas s on\n\
  \    t.schema_id = s.schema_id\ncross apply\n(\n    select i2.index_id, i2.name\n\
  \    from\n        sys.indexes i2 join sys.index_columns ic2 on\n            ic2.object_id\
  \ = i2.object_id and\n            ic2.index_id = i2.index_id and\n            ic2.index_column_id\
  \ = 1\n    where\n        i2.object_id = i1.object_id and\n        i2.index_id >\
  \ i1.index_id and\n        ic2.column_id = ic1.column_id\n) dupIdx\norder by\n \
  \   s.name, t.name, i1.index_id\n```\n\n`图 7-9.` 潜在冗余索引\n\n在检测到潜在冗余索引后，你应该对所有索引进行逐案分析。在某些情况下，合并操作是显而易见的。例如，如果系统有两个索引\
  \ `IDX1(LastName, FirstName) include (Phone)` 和 `IDX2(LastName) include(DateOfBirth)`，你可以将它们合并为\
  \ `IDX3(LastName, FirstName) include(DateOfBirth, Phone)`。\n\n在其他情况下，合并需要进一步分析。例如，如果系统有两个索引\
  \ `IDX1(OrderDate, WarehouseId)` 和 `IDX2(OrderDate, OrderStatus)`，你有三个选项。你可以将其合并为\
  \ `IDX3(OrderDate, WarehouseId) include(OrderStatus)` 或 `IDX4(OrderDate, OrderStatus)\
  \ include(WarehouseId)`。最终，你也可以保留这两个索引。决策主要取决于最左列的选择性和索引使用统计信息。\n\n`提示`\n`sys.dm_db_index_operation_stats`\
  \ 函数提供了行级别的索引使用情况信息。此外，它还单独跟踪点查找的次数与范围扫描的次数。在分析索引合并方案时，使用此函数非常有益。\n\n最后，你应该记住，索引合并的目标是移除冗余和不必要的索引。虽然减少索引更新开销很重要，但保留一个不必要的索引总比删除一个必要的索引更安全。在此过程中，你应始终宁可保守一些。\n\
  \n##### 检测次优查询\n\n有很多方法可以使用 SQL Server 标准工具和第三方工具来检测次优查询。在检测次优查询时，有两个主要指标需要分析：I/O\
  \ 操作数和查询的 CPU 时间。\n\n大量的 I/O 操作通常是次优或缺失索引的迹象，尤其是在 OLTP 系统中。它还会影响查询的 CPU 时间——需要处理的数据越多，消耗的\
  \ CPU 时间就越多。然而，反之则并非总是如此。除了 I/O，还有许多因素会导致高 CPU 时间。最常见的有多语句用户定义函数、命令式代码以及计算。\n\n\
  `注意` 我们将在第 10 章“函数”中更详细地讨论用户定义函数。\n\nSQL Profiler 也许是检测次优查询最常用的工具。你可以设置 SQL 跟踪来捕获\
  \ `SQL:Stmt Completed` 事件，并按 `Reads`、`CPU` 或 `Duration` 列进行筛选。然而，CPU 时间和持续时间之间是有区别的。`CPU`\
  \ 列指示查询使用的 CPU 时间量。`Duration` 列存储总的查询执行时间。对于并行执行计划，CPU 时间由所有 CPU 所花费的时间组成，可能超过持续时间。然而，高持续时间并不一定表示高\
  \ CPU 时间，因为阻塞和 I/O 延迟会影响查询的执行时间。\n\n从 SQL Server 2008 开始，最好使用 Extended Events 而不是\
  \ SQL Profiler。与 SQL 跟踪相比，Extended Events 更灵活且引入的开销更少。\n\n`注意` 我们将在第 28 章“Extended\
  \ Events”中更详细地讨论 Extended Events。\n\n\n# 第 7 章：索引的设计与调优\n\nSQL Server 会跟踪查询的执行统计信息，并通过\
  \ `sys.dm_exec_query_stats` DMV（动态管理视图）来公开这些信息。查询此 DMV 或许是找出系统中最耗资源查询的最简单方法。\n\n\
  `代码清单 7-15` 展示了一个查询示例，该查询返回系统中按每次执行的平均 I/O 排序的前 50 个最耗资源的查询信息。\n\n`代码清单 7-15. 使用\
  \ sys.dm_exec_query_stats`\n```sql\nselect top 50\n\nsubstring(qt.text, (qs.statement_start_offset/2)+1,\n\
  \n((\n\ncase qs.statement_end_offset\n\nwhen -1 then datalength(qt.text)\n\nelse\
  \ qs.statement_end_offset\n\nend - qs.statement_start_offset)/2)+1) as [Sql]\n\n\
  ,qs.execution_count as [Exec Cnt]\n\n,(qs.total_logical_reads + qs.total_logical_writes)\n\
  \n/ qs.execution_count as [Avg IO]\n\n,qp.query_plan as [Plan]\n\n,qs.total_logical_reads\
  \ as [Total Reads]\n\n,qs.last_logical_reads as [Last Reads]\n\n,qs.total_logical_writes\
  \ as [Total Writes]\n\n,qs.last_logical_writes as [Last Writes]\n\n,qs.total_worker_time\
  \ as [Total Worker Time]\n\n,qs.last_worker_time as [Last Worker Time]\n\n,qs.total_elapsed_time/1000\
  \ as [Total Elps Time]\n\n,qs.last_elapsed_time/1000 as [Last Elps Time]\n\n,qs.creation_time\
  \ as [Compile Time]\n\n,qs.last_execution_time as [Last Exec Time]\n\nfrom\n\nsys.dm_exec_query_stats\
  \ qs with (nolock)\n\ncross apply sys.dm_exec_sql_text(qs.sql_handle) qt\n\ncross\
  \ apply sys.dm_exec_query_plan(qs.plan_handle) qp\n\norder by\n\n[Avg IO] desc\n\
  \noption (recompile)\n```\n\n![](img/index-200_1.jpg)\n\n查询结果如 图 7-10 所示，可帮助您快速识别系统中的优化目标。\n\
  \n在我们的示例中，结果集中的第二个查询执行非常频繁，这使它成为理想的优化候选对象，即使它不是系统中最耗资源的查询。显然，您也可以根据其他标准对结果进行排序，例如执行次数、执行时间等。\n\
  \n`图 7-10. Sys.dm_exec_query_stats 查询结果`\n\n不幸的是，`sys.dm_exec_query_stats` 只返回有关执行计划已缓存的查询的信息。因此，对于那些使用\
  \ `option (recompile)` 进行语句级重编译的语句，没有统计信息。此外，如果查询最近被重编译过，`execution_count` 数据可能会产生误导。您可以通过关联\
  \ `execution_count` 和 `creation_time` 列来检测执行最频繁的查询。\n\n`注意` 我们将在 [第 26 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_26)\
  \ “计划缓存”中更详细地讨论计划缓存。\n\n从 SQL Server 2008 开始，提供了另一个 DMV `sys.dm_exec_procedure_stats`，它返回有关已缓存执行计划的存储过程的类似信息。`代码清单\
  \ 7-16` 展示了一个查询，该查询返回前 50 个 I/O 最密集的存储过程列表。图 7-11 显示了该查询在其中一台生产服务器上的运行结果。\n\n`代码清单\
  \ 7-16. 使用 sys.dm_exec_procedure_stats`\n```sql\nselect top 50\n\ns.name + '.' +\
  \ p.name as [Procedure]\n\n,qp.query_plan as [Plan]\n\n,(ps.total_logical_reads\
  \ + ps.total_logical_writes) /\n\nps.execution_count as [Avg IO]\n\n,ps.execution_count\
  \ as [Exec Cnt]\n\n,ps.cached_time as [Cached]\n\n,ps.last_execution_time as [Last\
  \ Exec Time]\n\n,ps.total_logical_reads as [Total Reads]\n\n,ps.last_logical_reads\
  \ as [Last Reads]\n\n,ps.total_logical_writes as [Total Writes]\n\n,ps.last_logical_writes\
  \ as [Last Writes]\n\n,ps.total_worker_time as [Total Worker Time]\n\n,ps.last_worker_time\
  \ as [Last Worker Time]\n\n,ps.total_elapsed_time as [Total Elapsed Time]\n\n,ps.last_elapsed_time\
  \ as [Last Elapsed Time]\n\nfrom\n\nsys.procedures as p with (nolock) join sys.schemas\
  \ s with (nolock) on\n\np.schema_id = s.schema_id\n\njoin sys.dm_exec_procedure_stats\
  \ as ps with (nolock) on\n\np.object_id = ps.object_id\n\nouter apply sys.dm_exec_query_plan(ps.plan_handle)\
  \ qp\n\norder by\n\n[Avg IO] desc\n\noption (recompile);\n```\n\n![](img/index-201_1.jpg)\n\
  \n`图 7-11. Sys.dm_exec_procedure_stats 查询结果`\n\n\n# 第 7 章 ■ 索引的设计与优化\n\n#### 总结\n\
  \n**注意** 我们将在[第 28 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_28) \"系统故障排除\"\
  中更详细地讨论 `sys.dm_exec_query_stats` 和 `sys.dm_exec_procedure_stats` 视图。\n\nSQL Server\
  \ 在系统中收集有关缺失索引的信息，并通过一组名称以 `sys.dm_db_missing_index` 开头的 DMV（动态管理视图）来公开这些信息。此外，你可以在\
  \ Management Studio 显示的执行计划中看到创建此类索引的建议。\n\n处理有关缺失索引的建议时，有两个注意事项。首先，SQL Server 提出的索引建议仅对正在执行的特定查询有帮助。它并未考虑更新开销、其他查询以及现有索引。例如，如果一个表已经有一个能覆盖查询的索引，只是缺少一个列，SQL\
  \ Server 会建议创建一个新索引，而不是修改现有索引。\n\n此外，建议的索引有助于提高特定执行计划的性能。SQL Server 不考虑那些可能改变执行计划形态的索引，例如，为查询使用更高效的联接类型。\n\
  \n**重要提示** 严格根据缺失索引 DMV 的建议来创建索引，将导致系统中出现大量冗余和低效的索引。\n\n数据库引擎优化顾问 (DTA) 结果的质量在很大程度上取决于用于分析的工作负载质量。良好且具有代表性的工作负载数据会带来可靠的结果，这远比缺失索引\
  \ DMV 提供的建议要好。如果你使用 DTA，请确保捕获的工作负载不仅包含查询，还包含数据修改语句。\n\n无论工具的质量如何，它们都有相同的局限性：它们都是基于现有的数据库架构和代码来分析和调整索引的。除了索引调优之外，通过执行数据库架构和代码重构，你通常可以取得更好的效果。\n\
  \n理想的聚集索引应该是窄的、静态的、唯一的。此外，它应针对表的最重要查询进行优化，并减少碎片。设计一个满足本章提供的所有五项设计准则的聚集索引通常是不可能的。你应该分析系统、业务需求和工作负载，并选择最高效的聚集索引——即使它们违反了其中一些准则。\n\
  \n递增型聚集索引通常具有较低的碎片，因为数据被插入到表的末尾。这类索引的良好示例包括标识列、序列以及持续递增的日期/时间值。虽然对于包含数千甚至数百万行的目录实体来说，这类索引可能是一个不错的选择，但对于插入率很高的超大表，你应该考虑其他选项。\n\
  \n具有随机值的 `Uniqueidentifier` 列由于其高碎片率，很少是索引的良好候选者。如果需要在 `uniqueidentifier` 数据类型上创建索引，你应该使用\
  \ `NEWSEQUENTIALID()` 函数来生成键值。\n\nSQL Server 很少使用索引交叉，特别是在 OLTP 工作负载中。通常，拥有一小组包含列的宽复合非聚集索引比一大组窄的单列索引更有益。\n\
  \n在 OLTP 系统中，你应该创建满足最低要求的索引集，以避免索引更新开销。在数据仓库系统中，索引的数量在很大程度上取决于数据刷新策略。你还需要考虑在专用的数据仓库数据库中使用列存储索引。\n\
  \n在向系统添加新索引之前，删除未使用和低效的索引并执行索引整合是很重要的。这可以简化优化过程并减少数据修改开销。SQL Server 通过 `sys.dm_db_index_usage_stats`\
  \ 和 `sys.dm_db_index_operation_stats` DMO（动态管理对象）提供索引使用统计信息。\n\n\n\n# 第二部分\n\n##\
  \ 其他重要事项\n\n# 第 8 章\n\n## 约束\n\n设计数据库时，使其能够高效地处理和查询数据非常重要。然而，仅此一点还不够。我们必须确保从数据库中获取的数据是可信的。例如，想象一个订单录入系统。我们可以查询\
  \ `OrderLineItems` 表来获取我们销售产品的信息，但除非我们知道该表中没有不属于系统中任何订单的孤立行，否则我们无法信任这些结果。\n\n约束允许我们为数据库声明数据完整性和业务规则，并让\
  \ SQL Server 强制实施这些规则。它们确保数据在`逻辑上`是正确的，帮助我们在开发早期阶段发现缺陷，并提高系统的可维护性和性能。让我们更详细地了解不同类型的约束。\n\
  \n#### 主键约束\n\n从概念上讲，数据库设计可以分为逻辑设计和物理设计两个阶段。在逻辑数据库设计阶段，我们根据业务需求识别系统中的实体，并定义它们的属性和关系。之后，在物理数据库设计阶段，我们将这些实体映射到数据库表，通过索引定义数据访问策略，并设计跨不同文件组和存储阵列的物理数据放置。\n\
  \n尽管逻辑和物理数据库设计阶段常常混合在一起，但从概念上讲它们是相互独立的，甚至可以由不同的团队执行，尤其是在大型项目中。\n\n`主键约束`定义了在实体或物理数据库设计范围（即表中的一行）中唯一标识一个对象的属性或属性集。在内部，主键约束是作为唯一索引实现的。默认情况下，SQL\
  \ Server 将主键创建为唯一的聚集索引，尽管这不是必须的。我们可以拥有非聚集主键，甚至可以有没有主键的表。\n\n你可能已经注意到，本书第一部分没有提到主键，而是常规性地使用了`聚集索引`。这是有意为之的。主键在概念上属于逻辑数据库设计范畴，而聚集索引和非聚集索引则是物理数据库设计的一部分。\n\
  \n然而，数据库专业人员常常将两者混为一谈，将聚集索引定义为主键，尽管在某些情况下，从逻辑设计的角度看这是不正确的。例如，考虑一个订单录入系统，其中 `Orders`\
  \ 表有一个 `OrderId` 标识列。该列唯一标识订单行，将是主键约束的完美候选者。它是聚集还是非聚集主键取决于其他因素，主要是我们如何查询和处理数据。最终，我们会得到类似于代码清单\
  \ 8-1 所示的结果。\n\n© Dmitri Korotkevitch 2016\n\nD. Korotkevitch, *Pro SQL Server Internals*,\
  \ DOI 10.1007/978-1-4842-1964-5_8\n\n第 8 章 ■ 约束\n\n***代码清单 8-1.*** `Orders` 表\n\n\
  ```\ncreate table dbo.Orders\n(\n    OrderId int not null identity(1,1),\n    --\
  \ 其他列\n    constraint PK_Orders\n        primary key clustered(OrderId)\n)\n```\n\
  \n`OrderLineItems` 表可能有两个关键列：引用 `Orders` 表行的 `OrderId`，以及 `OrderLineItemId` 标识列。在大多数情况下，我们将使用\
  \ `OrderLineItems` 表来\n\n\n\n# 第 8 章 ■ 约束\n\n在特定订单的上下文中，查询将以 `OrderId` 作为谓词。因此，该表中聚集索引的自然候选键是\
  \ (`OrderId`, `OrderLineItemId`)。然而，将该聚集索引定义为主键在*逻辑上*是错误的——该行可以通过单一的 `OrderLineItemId`\
  \ 标识列唯一标识，为此我们并不需要 `OrderId`。\n\n我们是否要在 `OrderLineItemId` 上定义非聚集主键，这取决于其他因素。从逻辑设计的角度来看，这样做是正确的，特别是当该表被其他表通过外键约束引用时（我们将在本章后面讨论这一点）。然而，这会引入另一个非聚集索引，我们需要对其进行存储和维护。最终的实现可能类似于代码清单\
  \ 8-2 中所示的代码。\n\n### 代码清单 8-2. OrderLineItems 表\n\n```sql\ncreate table dbo.OrderLineItems\n\
  (\n    OrderId int not null,\n    OrderLineItemId int not null identity(1,1),\n\
  \    -- other columns\n    constraint PK_OrderLineItems\n        primary key nonclustered(OrderLineItemId)\n\
  );\n\ncreate unique clustered index IDX_OrderLineItems_OrderId_OrderLineItemId\n\
  \    on dbo.OrderLineItems(OrderId,OrderLineItemId);\n```\n\n虽然从物理实现的角度来看，主键可以表示为唯一索引，但它们之间存在细微差别。主键列不可为空。另一方面，唯一索引可以在可为空的列上创建，并将\
  \ `NULL` 视为常规值。\n\n要记住非常重要的一点是，我们无法更改主键的定义，实际上也无法在不删除并重新创建的情况下更改任何约束的定义。因此，如果主键约束是聚集的，将导致两次表重建。删除约束会移除聚集索引并将表转换为堆表。添加聚集主键会在堆表上创建聚集索引。或者，更改聚集索引的定义将导致一次索引重建。\n\
  \n■ **提示** 如果需要删除并重新创建聚集主键约束，请先禁用非聚集索引。在两个操作都完成后，再启用（重建）它们。这将加快进程，因为非聚集索引只会在操作完成后重建一次，而不是在每个步骤中都重建。\n\
  \n主键通常对系统有益。它们提供更好的数据完整性并提高系统的可维护性。我建议在能够承担在主键列上拥有额外索引的代价时，定义主键。\n\n■ **注意** 某些\
  \ SQL Server 功能（如事务复制）要求表必须定义主键。仅定义聚集索引而没有主键是不够的。\n\n因为主键是作为常规索引实现的，所以没有专门针对它们的目录视图。您可以通过查看\
  \ `sys.indexes` 目录视图中的 `is_primary_key` 列来确定索引是否被定义为主键。\n\n■ **注意** SQL Server 目录视图允许我们以编程方式获取有关数据库和服务器元数据的信息。[参见\
  \ http://technet.microsoft.com/en-us/library/ms174365.aspx](http://technet.microsoft.com/en-us/library/ms174365.aspx)\
  \ 了解详情。\n\n#### 唯一约束\n\n唯一约束强制实体中的一个或多个属性（在物理世界中即表中的列）值的唯一性。类似于主键，唯一约束也唯一地标识表中的行，但它们可以在可为空的列上创建，从而将\
  \ `NULL` 视为可能的值之一。与主键类似，唯一约束属于逻辑数据库设计，在物理级别上实现为唯一的、非聚集索引。\n\n\n# 第 8 章 ■ 约束\n\n\
  #### 唯一约束\n\n代码清单 8-3 中的代码 展示了一个定义了两个唯一约束的表：一个约束定义在 `SSN` 列上，另一个定义在 `DepartmentCode`\
  \ 和 `IntraDepartmentCode` 列的组合上。\n\n***代码清单 8-3.*** 定义唯一约束\n\n```sql\ncreate table\
  \ dbo.Employees\n(\n    EmployeeId int not null\n        constraint PK_Employees\
  \ primary key clustered,\n    Name nvarchar(64) not null,\n    SSN char(9) not null\n\
  \        constraint UQ_Employees_SSN unique,\n    DepartmentCode varchar(32) not\
  \ null,\n    IntraDepartmentCode varchar(32) not null,\n    constraint UQ_Employees_Codes\n\
  \        unique(DepartmentCode, IntraDepartmentCode)\n)\n```\n\n![](img/index-207_1.jpg)\n\
  \n如 图 8-1 所示，SQL Server Management Studio 将唯一（和主键）约束列在两个不同的位置：既在 `键` 节点下，也在 `索引`\
  \ 节点下。\n\n***图 8-1.** SQL Server Management Studio 中的唯一约束*\n\n通常，当数据具有唯一性时，强制实施唯一性是一个好主意。这有助于保持数据的清洁并避免数据完整性问题。唯一约束还可以帮助查询优化器生成更高效的执行计划。缺点在于，你为定义的每一个唯一性条件都必须维护另一个非聚集索引。在选择实现约束时，需要考虑由此引入的数据修改和索引维护开销。\n\
  \n选择唯一约束还是唯一索引很大程度上取决于个人偏好。唯一性通常以业务需求的形式出现，通过约束来强制实施唯一性有助于提高系统的可维护性。另一方面，唯一索引更灵活。除了强制实施唯一性之外，你还可以包含列并使用这些索引进行查询优化。你还可以指定排序顺序，这在少数情况下会有所帮助。\n\
  \n另外，不删除并重新创建约束，就不可能更改唯一约束的定义。尽管删除约束是一项元数据操作，不会引起数据移动，但在删除约束时有可能会违反唯一性规则。或者，你可以使用\
  \ `CREATE INDEX .. WITH (DROP_EXISTING=ON)` 语句，通过原子操作来更改唯一索引的定义。\n\n与主键约束类似，没有专门用于唯一约束的目录视图。`sys.indexes`\
  \ 目录视图中有一个 `is_unique_constraint` 列，它显示索引是否是作为唯一约束创建的。\n\n#### 外键约束\n\n*外键约束* 标识并强制实施实体/表之间的关系。回想一下我们的\
  \ `Orders` 和 `OrderLineItems` 表示例。每个 `OrderLineItems` 行都属于一个对应的 `Orders` 表行，不能独立存在。这类关系就是通过外键约束来强制实施的。\n\
  \n与其他约束一样，外键强制实施数据完整性。处理干净、正确的数据总是比临时清理数据更容易。此外，在开发和测试阶段，外键有助于捕获大量与错误数据处理相关的缺陷。\n\
  \n![](img/index-208_1.jpg)\n\n![](img/index-208_2.jpg)\n\n然而，外键是有代价的。每次向*引用*表中插入数据时，你都需要检查*被引用*表中是否存在相应的行。让我们来看一个使用本章前面创建的相同的\
  \ `Orders` 和 `OrderLineItems` 表的示例。如 图 8-2 所示，如果在未定义任何外键的情况下向 `OrderLineItems` 表插入一行，查询只需要执行一次聚集索引插入操作。\n\
  \n***图 8-2.** 在未定义外键约束的情况下向引用表插入一行*\n\n现在，让我们给表添加一个外键约束。代码清单 8-4 展示了执行此任务的 `ALTER\
  \ TABLE` 语句。\n\n### 代码清单 8-4.\n向 OrderLineItems 表添加外键约束\n\n```sql\nalter table dbo.OrderLineItems\
  \ with check\nadd constraint FK_OrderLineItems_Orders\nforeign key(OrderId)\nreferences\
  \ dbo.Orders(OrderId)\n```\n\n当你再次运行插入操作时，会看到执行计划发生了变化，如图 8-3 所示。\n\n### 图 8-3.\n\
  在定义了外键约束的引用表中插入一行\n\n如你所见，现在的执行计划包含了对 `被引用` (`Orders`) 表的聚集索引查找操作。\n\nSQL Server\
  \ 需要验证外键约束，确保你正在插入的行项目对应有一个存在的订单行。\n\n现在，让我们看看当你从 `Orders` 表中删除一行时会发生什么。如你在图 8-4\
  \ 所见，我们的执行计划现在包含了对 `引用` (`OrderLineItems`) 表的聚集索引查找。SQL Server 需要检查是否存在引用了你正在删除的那行的行项目。如果存在这样的行项目，SQL\
  \ Server 会中止删除操作或执行一些级联操作，这取决于外键约束的规则。\n\n![](img/index-209_1.jpg)\n\n![](img/index-209_2.jpg)\n\
  \n## 第 8 章 ■ 约束\n\n### 图 8-4.\n从被引用表中删除一行（无级联操作）\n\n让我们给这个外键约束添加一个 `ON DELETE CASCADE`\
  \ 操作，如代码清单 8-5 所示。现在当你从 `Orders` 表中删除一行时，SQL Server 需要查找并删除 `OrderLineItems` 表中引用该行的所有行。执行计划如图\
  \ 8-5 所示。\n\n### 代码清单 8-5.\n将约束替换为 `ON DELETE CASCADE` 操作\n\n```sql\nalter table\
  \ dbo.OrderLineItems drop constraint FK_OrderLineItems_Orders;\nalter table dbo.OrderLineItems\
  \ with check\nadd constraint FK_OrderLineItems_Orders\nforeign key(OrderId)\nreferences\
  \ dbo.Orders(OrderId)\non delete cascade;\n```\n\n### 图 8-5.\n从被引用表中删除一行（`ON DELETE\
  \ CASCADE` 操作）\n\n有一件非常重要的事需要记住：当你创建外键约束时，SQL Server 要求你在 `被引用` (`Orders`) 表的 `被引用`\
  \ (`OrderId`) 列上有一个唯一索引。\n\n然而，并不要求在 `引用` (`OrderLineItems`) 表上也有一个类似的索引。如果你没有这样的索引，任何在引用表上进行的引用完整性检查都会引入扫描操作。为了证明这一点，让我们使用\
  \ `DROP INDEX IDX_OrderLineItems_OrderId_OrderLineItemId ON dbo.OrderLineItems`\
  \ 语句删除 `OrderLineItems` 表上的聚集索引。\n\n现在，当你再次运行删除操作时，会看到如图 8-6 所示的执行计划。\n\n![](img/index-210_1.jpg)\n\
  \n## 第 8 章 ■ 约束\n\n### 图 8-6.\n从被引用表中删除一行，但引用列上未指定索引\n\n在表数据量很大的情况下，引用列上缺失索引可能会对性能产生巨大影响。这会导致过多且不必要的\
  \ I/O 负载，并可能引发阻塞。此外，除了支持引用完整性，这些索引在表之间的联接操作中也可能很有用。除了极少数例外情况，你应该在创建外键约束时创建这些索引。\n\
  \n在某些情况下，外键约束可以辅助查询优化器。它们可以帮助消除不必要的联接，尤其是在涉及视图时，也能提升数据仓库环境中某些查询的性能。\n\n**注意：** 我们将在[第\
  \ 10 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_10)“视图”中更详细地讨论联接消除。\n\n不幸的是，外键与某些\
  \ SQL Server 功能不兼容。例如，当一个表被分区并且被外键引用时，你无法修改该表并将其分区切换到另一个\n\n# 第 8 章 ■ 约束\n\n## CHECK\
  \ 约束\n\n*CHECK 约束*通过限制可以放入列或多列组合中的值来强制域完整性。它们指定了一个逻辑表达式，该表达式在每次插入行或修改对应列时都会被计算，当表达式计算结果为\
  \ `FALSE` 时，操作将失败。\n\n请参阅清单 8-6 中的示例。\n\n**清单 8-6.** CHECK 约束：表创建\n\n```sql\ncreate\
  \ table dbo.Accounts\n(\n  AccountId int not null identity(1,1),\n  AccountType\
  \ varchar(32) not null,\n  CreditLimit money null,\n  constraint CHK_Accounts_AccountType\n\
  \    check (AccountType in ('Checking','Saving','Credit Card')),\n  constraint CHK_Accounts_CreditLimit_For_CC\n\
  \    check ((AccountType <> 'Credit Card') or (CreditLimit > 0))\n)\n```\n\n这里指定了两个\
  \ CHECK 约束。第一个约束 `CHK_Accounts_AccountType` 强制 `AccountType` 必须属于三个值之一。第二个约束更复杂，它强制对于信用卡账户，必须提供一个正的\
  \ `CreditLimit`。需要记住的一个关键点是，只有当约束表达式计算结果为 `FALSE` 时，数据才会被拒绝。计算结果为 `NULL` 是被接受的。例如，清单\
  \ 8-7 中所示的 `INSERT` 语句可以正常执行。\n\n**清单 8-7.** CHECK 约束：插入 `NULL` 值\n\n```sql\ninsert\
  \ into dbo.Accounts(AccountType, CreditLimit)\nvalues('Credit Card',null)\n```\n\
  \nCHECK 约束的主要目的是强制数据完整性，尽管在某些情况下，它们也可以帮助查询优化器并简化执行计划。假设有两张表：一张包含正数，另一张包含负数，如清单 8-8\
  \ 所示。\n\n**清单 8-8.** CHECK 约束：`PositiveNumbers` 和 `NegativeNumbers` 表创建\n\n```sql\n\
  create table dbo.PositiveNumbers\n( PositiveNumber int not null );\n\ncreate table\
  \ dbo.NegativeNumbers\n( NegativeNumber int not null );\n\ninsert into dbo.PositiveNumbers(PositiveNumber)\
  \ values(1);\ninsert into dbo.NegativeNumbers(NegativeNumber) values(-1);\n```\n\
  \n现在，让我们运行一个联接这两张表数据的 `SELECT` 查询。你可以在清单 8-9 中看到该 `SELECT` 语句，在图 8-7 中看到其执行计划。\n\
  \n![](img/index-212_1.jpg)\n![](img/index-212_2.jpg)\n\n**清单 8-9.** CHECK 约束：未创建\
  \ CHECK 约束时联接两张表\n\n```sql\nselect *\nfrom dbo.PositiveNumbers e join dbo.NegativeNumbers\
  \ o on\ne.PositiveNumber = o.NegativeNumber\n```\n\n**图 8-7.** 没有 CHECK 约束时的执行计划\n\
  \n如你所见，`SQL Server` 扫描并联接了两张表。这是合理的。即使我们之前定义了（CHECK 约束）...\n\n### 定义外键约束\n\n定义外键约束通常是件好事，当然，前提是你能接受额外的索引，并且系统能够处理在引用完整性检查期间由索引查找操作带来的轻微性能开销。在\
  \ OLTP 系统中，我建议你在引用目录实体（数据量相对较小且静态）时总是创建外键。例如，订单录入系统的目录实体可能包括 `Articles`（商品）、`Customers`（客户）、`Warehouses`（仓库）等。然而，在处理存储数十亿行数据且每秒处理数千次插入的事务性实体时，你需要谨慎。尽管如此，我仍然会在可能的情况下使用外键，不过我会根据具体情况分析其对性能的影响。\n\
  \n有几张目录视图，`sys.foreign_keys` 和 `sys.foreign_key_columns`，提供了数据库中定义的任何外键约束的相关信息。\n\
  \n只要不涉及分区切换，你仍然可以对表进行分区。另一个例子是表截断。当一个表被外键引用时，你无法截断该表。\n\n# 第 8 章 ■ 约束\n\n## 清单 8-10.\
  \ 检查约束：向表中添加检查约束\n\n```sql\nalter table dbo.PositiveNumbers\nadd constraint CHK_IsNumberPositive\n\
  check (PositiveNumber > 0);\n\nalter table dbo.NegativeNumbers\nadd constraint CHK_IsNumberNegative\n\
  check (NegativeNumber < 0);\n```\n\n如果再次运行查询，你会看到一个不同的执行计划，如图 8-8 所示。\n\n## 图 8-8.\
  \ 带有检查约束的执行计划\n\nSQL Server 评估了检查约束，确定它们是**互斥**的，并移除了任何不必要的连接。\n\n> **注意：** 一个必须定义检查约束的非常重要的场景是分区视图的情况。检查约束可以防止访问不必要的表，并极大地提高查询性能。我们将在第\
  \ 16 章“数据分区”中更详细地讨论分区视图。\n\n![](img/index-213_1.jpg)\n\n显然，检查约束在数据修改时会引入开销，特别是当从约束中调用函数时。它们会显著降低执行插入或更新数据的批处理操作的性能。\n\
  \n让我们创建一个表，并在不使用检查约束的情况下向其中插入 65,536 行数据。代码如清单 8-11 所示。\n\n## 清单 8-11. 检查约束：创建 CheckConstraintTest\
  \ 表\n\n```sql\ncreate table dbo.CheckConstraintTest\n( Value varchar(32) not null\
  \ );\n\nwith N1(C) as (select 0 union all select 0) -- 2 rows\n,N2(C) as (select\
  \ 0 from N1 as T1 cross join N1 as T2) -- 4 rows\n,N3(C) as (select 0 from N2 as\
  \ T1 cross join N2 as T2) -- 16 rows\n,N4(C) as (select 0 from N3 as T1 cross join\
  \ N3 as T2) -- 256 rows\n,N5(C) as (select 0 from N4 as T1 cross join N4 as T2)\
  \ -- 65,536 rows\n,IDs(ID) as (select row_number() over (order by (select null))\
  \ from N5)\ninsert into dbo.CheckConstraintTest(Value)\nselect 'ABC' from IDs;\n\
  ```\n\n你可以在图 8-9 中看到将数据插入表的那部分执行计划。\n\n## 图 8-9. 执行计划的一部分：无检查约束的插入\n\n在我的计算机上，执行时间如下：\n\
  SQL Server 执行时间：\nCPU 时间 = 78 毫秒，经过时间 = 87 毫秒。\n\n现在，我们向该表添加一个检查约束，看看它如何影响 `INSERT`\
  \ 操作的性能。代码如清单 8-12 所示。\n\n## 清单 8-12. 检查约束：向 CheckConstraintTest 表添加检查约束\n\n```sql\n\
  alter table dbo.CheckConstraintTest with check\nadd constraint CHK_CheckConstraintTest_Value\n\
  check (Value = 'ABC')\n```\n\n如图 8-10 所示，执行计划中由检查约束引入了两个额外的操作，这导致了更长的执行时间。\n\n![](img/index-214_1.jpg)\n\
  \n## 图 8-10. 执行计划的一部分：带检查约束的插入\n\n在我的计算机上，执行时间如下：\nSQL Server 执行时间：\nCPU 时间 = 93\
  \ 毫秒，经过时间 = 118 毫秒。\n\n现在，让我们看看当从检查约束中调用系统函数时会发生什么。我们更改约束定义，如清单 8-13 所示。\n\n## 清单\
  \ 8-13. 检查约束：用一个调用系统函数的约束替换原检查约束\n\n```sql\nalter table dbo.CheckConstraintTest\n\
  drop constraint CHK_CheckConstraintTest_Value;\n\nalter table dbo.CheckConstraintTest\
  \ with check\nadd constraint CHK_CheckConstraintTest_Value\ncheck (Right(Value,\
  \ 1) = 'C');\n```\n\n我们再次运行插入操作后，执行时间如下：\nSQL Server 执行时间：\nCPU 时间 = 109 毫秒，经过时间\
  \ = 131 毫秒。\n\n# 第 8 章 ■ 约束\n\n虽然系统函数不一定会带来巨大的 CPU 负载和执行时间开销，但用户定义函数（UDF）的情况就不同了。让我们创建一个简单的\
  \ UDF，看看它如何影响性能。代码如清单 8-14 所示。\n\n**清单 8-14.** 检查约束：用调用 UDF 函数的约束替换原有的检查约束\n\n```sql\n\
  create function dbo.DummyCheck(@Value varchar(32))\nreturns bit\nwith schemabinding\n\
  as\nreturn (1);\ngo\n\nalter table dbo.CheckConstraintTest\ndrop constraint CHK_CheckConstraintTest_Value;\n\
  \nalter table dbo.CheckConstraintTest\nadd constraint CHK_CheckConstraintTest_Value\n\
  check (dbo.DummyCheck(Value) = 1);\n```\n\n当我们再次运行相同的 `INSERT` 语句时，执行时间如下：\n\n```text\n\
  SQL Server 执行时间:\nCPU 时间 = 375 ms，耗时 = 475 ms。\n```\n\n可以看到，与未指定检查约束时相比，现在运行所需时间是原来的五倍。\n\
  \n> **注意** 我们将在[第 11 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_11)“函数”中更详细地讨论用户定义函数的性能影响。\n\
  \n与其他约束类型一样，检查约束有助于我们强制执行数据完整性，并且在某些情况下可以带来更好的执行计划。只要您能接受它们在数据修改期间引入的开销，使用它们是一个好主意。您可以从\
  \ `sys.check_constraints` 目录视图获取有关检查约束的信息。\n\n#### 总结\n\n在处理外键和检查约束时，另一件需要牢记的重要事情是约束是否受信任。当约束不受信任时，SQL\
  \ Server 不会保证表中的所有数据都符合约束规则。此外，在查询优化阶段，SQL Server 不会考虑不受信任的约束。您可以通过检查相应目录视图中的 `is_not_trusted`\
  \ 列来查看约束是否受信任。\n\n无论约束是否受信任，SQL Server 都会在数据修改期间对其进行验证。拥有不受信任的约束并不意味着 SQL Server\
  \ 允许违反它。它意味着在创建约束时，旧数据未被验证。\n\n> **注意** 在某些情况下，SQL Server 仍然可以从不受信任的外键约束中受益。当表结构属于数据仓库环境中的星型或雪花型模式时，它们可以触发查询优化器探索额外的连接策略（星型连接扩展）。\n\
  \n您可以通过使用 `ALTER TABLE` 语句的 `WITH CHECK` / `WITH NOCHECK` 参数来控制约束是否创建为受信任。使用 `WITH\
  \ CHECK` 条件，您强制 SQL Server 验证现有数据是否符合约束规则，这将导致表扫描。这里的问题是，此类操作需要架构修改（`Sch-M`）锁，这使得其他会话无法访问该表。对于大表，这种扫描可能非常耗时。或者，使用\
  \ `WITH NOCHECK` 条件创建不受信任的约束是一项元数据操作。\n\n> **注意** 我们将在[第 23 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_23)“架构锁”中更详细地讨论架构锁。\n\
  \n最后，您始终需要显式命名约束，即使这不是强制性要求，因为处理自动生成的名称很不方便。对于自动生成的名称，每次以编程方式访问约束时，您都需要查询目录视图。使用自动生成的名称也会降低系统的可支持性。例如，如果不深入探究细节，很难知道名为\
  \ `CK__A__3E52440B` 的约束是做什么的。\n\n我建议您选择最适合您的命名约定，并在整个系统中使用。细节并不重要，只要它是一致的，并且最好能提供关于\n\
  \n# 摘要\n\n主键约束定义了表中唯一标识一行的列或列集。在内部，主键约束是作为唯一索引实现的，可以是聚集索引或非聚集索引。\n\n外键约束定义了系统中表之间的关系。它们有助于提高数据库中的数据质量；然而，它们会在引用完整性检查时引入一些开销。在可能的情况下，重要的是在引用表的引用列上定义索引。\n\
  \n检查约束通过限制你可以放入列或行中多列的值来强制域完整性。与外键约束一样，它们有助于提高系统中的数据质量，代价是在数据修改期间进行验证的开销。你应该考虑这种开销，尤其是在使用用户定义函数来验证约束的情况下。\n\
  \n外键和检查约束可以是可信的或不可信的。SQL Server 在创建阶段不会验证不可信的约束；但是，它会在约束创建后执行验证。在大多数情况下，查询优化器在查询优化期间不依赖于不可信的约束。\n\
  \n# 第 9 章 触发器\n\n触发器定义了响应特定事件而运行的代码。SQL Server 中有三种类型的触发器，如下所示：\n\n1.  DML 触发器在发生数据修改时触发。当你需要在数据修改期间强制执行特定的业务规则，并且系统没有实现专用的数据访问层时，可以使用\
  \ DML 触发器。你可以将捕获谁更改了表中数据的审计跟踪功能视为一个示例。当多个应用程序直接与数据库交互时，基于触发器的审计跟踪实现是最简单的。\n2.  DDL\
  \ 触发器在响应更改数据库和服务器对象的事件时触发。你可以使用 DDL 触发器来防止或审计这些更改；例如，删除表、修改存储过程或创建新登录名。\n3.  登录触发器在用户登录过程中触发。你可以将触发器用于审计目的，也可以在需要时阻止用户登录系统。\n\
  \n## DML 触发器\n\nDML 触发器允许你定义在数据修改操作（如 `INSERT`、`UPDATE`、`DELETE` 或 `MERGE`）期间将执行的代码。DML\
  \ 触发器有两种类型：`INSTEAD OF` 和 `AFTER` 触发器。\n\n`INSTEAD OF` 触发器作为对表或视图上实际数据修改操作的*替代*运行。使用这些类型的触发器，你可以评估和/或实施业务规则。如果你希望修改数据，还需要对表发出实际的\
  \ DML 语句。`AFTER` 触发器在数据修改操作之后、表中的数据已被更改时触发。\n\n© Dmitri Korotkevitch 2016\n\nD.\
  \ Korotkevitch, *Pro SQL Server Internals*, DOI 10.1007/978-1-4842-1964-5_9\n\n\
  第 9 章 ■ 触发器\n\n让我们看看当我们将数据插入到具有已定义触发器和约束的表中时会发生什么。首先，让我们使用清单 9-1 中显示的代码创建一个表。\n\n\
  ***清单 9-1.*** 将数据插入表：创建表和两个触发器\n\n```\ncreate table dbo.OrderLineItems\n(\n    OrderId\
  \ int not null,\n    OrderLineItemId int identity(1,1) not null,\n    ProductId\
  \ int not null,\n```\n\n\n# 第 9 章 ■ 触发器\n\n```sql\n(\n    ProductName nvarchar(64)\
  \ not null,\n    CreationDate smalldatetime not null,\n    constraint DEF_OrderLineItems_CreationDate\n\
  \        default GetUtcDate(),\n    Quantity decimal(9,3) not null,\n    Price smallmoney\
  \ not null,\n    constraint PK_OrderLineItems\n        primary key clustered(OrderId,\
  \ OrderLineItemId),\n    constraint CHK_OrderLineItems_PositiveQuantity\n      \
  \  check (Quantity > 0),\n    constraint FK_OrderLineItems_Orders\n        foreign\
  \ key(OrderId)\n            references dbo.Orders(OrderId),\n    constraint FK_OrderLineItems_Products\n\
  \        foreign key(ProductId)\n            references dbo.Products(ProductId)\n\
  )\ngo\n\ncreate trigger trg_OrderLineItems_InsteadOfInsert on dbo.OrderLineItems\n\
  instead of insert\nas\nbegin\n    if @@rowcount = 0\n        return;\n\n    set\
  \ nocount on\n\n    if not exists(select * from inserted)\n        return;\n\n \
  \   insert into dbo.OrderLineItems(OrderId, ProductId, ProductName, Quantity, Price)\n\
  \    select i.OrderId, i.ProductId, p.ProductName, i.Quantity, i.Price\n    from\
  \ inserted i join dbo.Products p on\n        i.ProductId = p.ProductId;\nend\ngo\n\
  \ncreate trigger trg_OrderLineItems_AfterInsert on dbo.OrderLineItems\nafter insert\n\
  as\nbegin\n    if @@rowcount = 0\n        return;\n\n    set nocount on\n\n    if\
  \ not exists(select * from inserted)\n        return;\n\n    if exists\n    (\n\
  \        select *\n        from inserted i join dbo.Orders o on\n            i.OrderId\
  \ = o.OrderId\n        where o.Status = 'CLOSED'\n    )\n    begin\n        raiserror('Cannot\
  \ change the closed order',16,1);\n        rollback tran;\n        return;\n   \
  \ end\nend\ngo\n```\n\n该表既有主键和外键，也有默认值和检查约束。同时还定义了 `INSTEAD OF` 和 `AFTER` 触发器。让我们来看看当我们对该表执行一条\
  \ `INSERT` 语句时会发生什么，如代码清单 9-2 所示。\n\n### 代码清单 9-2. 向表中插入数据：Insert 语句\n\n```sql\n\
  insert into dbo.OrderLineItems(OrderId, ProductId, ProductName, Quantity, Price)\n\
  values(@OrderId, @ProductId, @ProductName, @Quantity, @Price)\n```\n\n第一步，SQL Server\
  \ 会创建并填充 `inserted` 和 `deleted` 虚拟表，这些表包含了受 `DML` 语句影响的行的新版本和旧版本的信息。这些表在 `INSTEAD\
  \ OF` 触发器中是可访问的。在我们的例子中，`inserted` 表将包含一行，其值就是我们在 `INSERT` 语句中提供的值，而 `deleted` 表将为空，因为在插入时不存在该行的“旧”版本。我们将在本章后面讨论这些表，但现在让我们记住一件非常重要的事情：`DML\
  \ 触发器具有语句作用域，无论影响了多少行，它都只会被激发一次。虚拟表可能包含多行，其实现需要正确处理这种情况。`\n\n下一步，SQL Server 激发 `trg_OrderLineItems_InsteadOfInsert`\
  \ 这个 `INSTEAD OF` 触发器。在触发器中，我们实现了业务逻辑并对实际表执行了一条 `INSERT` 语句。我们实现的这个触发器忽略了原始 `INSERT`\
  \ 语句提供的 `ProductName` 值，并用从 `Products` 表中获取的实际产品名称替换了它。内连接也过滤掉了在系统中没有对应产品的行。即使我们通过外键约束强制实施相同的规则，这种实现的行为也是不同的。违反外键约束会终止整个批处理而不插入任何行，而触发器中的连接只是过滤掉不正确的行并插入正确的行。\n\
  \n**提示** 是否应该采用这种方法——即忽略不正确的行而不是终止整个批处理，取决于业务需求。尽管在某些情况下这可能有帮助，但它会使系统故障排查变得复杂。至少，我建议你在系统中的某个地方记录有关被跳过行的信息。\n\
  \n当 `INSTEAD OF` 触发器运行 `INSERT` 语句时，SQL Server 按顺序执行以下任务：\n\n1.  它将默认约束值赋给 `CreationDate`\
  \ 列。\n2.  它验证表中的 `not null`、主键、唯一、检查约束以及唯一索引，如果发生约束或唯一性违规，则终止该语句。\n\n\n# 第 9 章 ■\
  \ 触发器\n\n它会检查引用完整性，并在外键约束违规时终止语句。否则，它会将新行插入表中。\n\n**注意**\n\n在发生约束或索引唯一性违规时，`AFTER`触发器不会触发。\n\
  \n最后，我们创建了新的`inserted`和`deleted`表，并且`AFTER`触发器被触发。此时，新行已被插入表中，如果我们需要回滚更改，`SQL Server`将撤销`INSERT`操作。在前面的例子中，将订单状态检查实现为`INSTEAD\
  \ OF`触发器的一部分，会比实现为`AFTER`触发器更高效。\n\n正如我已经提到的，触发器是在语句级别而非行级别运行的。我们的实现需要在`inserted`和`deleted`表包含多行时也能正确工作。例如，代码清单\
  \ 9-3 中的实现会失败并抛出异常，因为如果更新了多行，在集合运算符中使用的子查询返回了多行。\n\n**代码清单 9-3.** 触发器实现：错误的实现\n\n\
  ```sql\ncreate trigger Trg_OrderLineItems_AfterUpdate_Incorrect on dbo.OrderLineItems\n\
  after update\nas\nbegin\n-- Some code here\ndeclare\n    @OrderId int;\nset @OrderId\
  \ = (select OrderId from inserted);\n-- Some code here\nend\n```\n\n错误信息：\n`Msg\
  \ 512, Level 16, State 1, Procedure Trg_OrderLineItems_AfterUpdate_Incorrect, Line\
  \ 9`\n`Subquery returned more than 1 value. This is not permitted when the subquery\
  \ follows =, !=, <, <= , >, >= or when the subquery is used as an expression.`\n\
  \n另外，即使`DML`语句没有改变（`INSERT`、`UPDATE`或`DELETE`）任何数据，触发器也会触发。在这种情况下，`inserted`表和`deleted`表都将是空的。为了创建高效的实现，你需要在触发器开头进行一些检查，以防止执行不必要的代码。让我们再次看一下我们的实现，如代码清单\
  \ 9-4.所示。\n\n**代码清单 9-4.** 触发器实现：防止执行不必要的代码\n\n```sql\ncreate trigger trg_OrderLineItems_InsteadOfInsert\
  \ on dbo.OrderLineItems\ninstead of insert\nas\nbegin\n    if @@rowcount = 0\n \
  \       return;\n    set nocount on\n    if not exists(select * from inserted)\n\
  \        return;\n    -- Some code here\nend\n```\n\n触发器中的第一条语句——`if @@rowcount\
  \ = 0`——检查`INSERT`语句是否确实插入了任何行。例如，你可以考虑`insert/select`模式，其中`SELECT`查询没有返回任何数据。你希望避免在这种情况下执行触发器代码。\n\
  \n第二条语句——`set nocount on`——阻止`SQL Server`返回显示触发器中代码影响行数的消息。某些客户端库无法正确处理多条消息。\n\n\
  最后一条语句——`if not exists(select * from inserted)`——则更为微妙。虽然`@@rowcount`可以帮助你检测到没有行受`INSERT`、`UPDATE`或`DELETE`语句影响的情况，但它对`MERGE`操作符不太有效。该操作符在`SQL\
  \ Server 2008`中引入，允许你将所有三个操作合并到单个语句中。即使没有相应的操作，触发器也会触发。触发器中的`@@rowcount`代表`MERGE`语句影响的总行数。\n\
  \n让我们创建一个简单的表和三个触发器，用于显示`@@rowcount`的值以及`inserted`和`deleted`表中的行数。你可以在代码清单 9-5 中看到此代码。同样值得指出的是，从触发器中返回任何结果集是非常糟糕的做法，因为它很容易破坏客户端应用程序。\n\
  \n**代码清单 9-5.** 触发器与`MERGE`语句：创建表和三个触发器\n\n```sql\ncreate table dbo.Data(Col int\
  \ not null);\ncreate trigger trg_Data_AI on dbo.Data\nafter insert\nas\nselect\n\
  \    'After Insert' as [Trigger]\n    ,@@RowCount as [RowCount]\n    ,(select count(*)\
  \ from inserted) as [Inserted Cnt]\n```\n\n# 第 9 章：触发器\n\n![index-222_1.jpg](img/index-222_1.jpg)\n\
  \n```sql\ncreate trigger trg_Data_AU on dbo.Data\nafter update\nas\nselect\n   \
  \ 'After Update' as [Trigger]\n    ,@@RowCount as [RowCount]\n    ,(select count(*)\
  \ from inserted) as [Inserted Cnt]\n    ,(select count(*) from deleted) as [Deleted\
  \ Cnt];\n```\n\n```sql\ncreate trigger trg_Data_AD on dbo.Data\nafter delete\nas\n\
  select\n    'After Delete' as [Trigger]\n    ,@@RowCount as [RowCount]\n    ,(select\
  \ count(*) from inserted) as [Inserted Cnt]\n    ,(select count(*) from deleted)\
  \ as [Deleted Cnt];\n```\n\n现在，让我们运行`MERGE`语句，如清单 9-6 所示。\n\n***清单 9-6.*** 触发器与`MERGE`语句：`MERGE`\n\
  \n```sql\nmerge into dbo.Data as Target\nusing (select 1 as [Value]) as Source\n\
  on Target.Col = Source.Value\nwhen not matched by target then\n    insert(Col) values(Source.Value)\n\
  when not matched by source then\n    delete\nwhen matched then\n    update set Col\
  \ = Source.Value;\n```\n\n由于`dbo.Data`表为空，`MERGE`语句将在其中插入一行。让我们看看触发器的输出，如图 9-1 所示。\n\
  \n***图 9-1.** `@@rowcount`、`inserted`和`deleted`表与`MERGE`运算符*\n\n如您所见，所有三个触发器都被触发了。在每个触发器中，`@@rowcount`代表了受`MERGE`影响的行数。然而，对于`AFTER\
  \ UPDATE`和`AFTER DELETE`触发器，`inserted`和`deleted`表是空的。为了防止触发器中的代码执行，您需要检查这些表的内容。\n\
  \n正如您所猜测的，触发器存在开销。至少，当存在触发器时，SQL Server 需要创建`inserted`和`deleted`虚拟表。SQL Server 不会分析触发器内是否有引用这些表的逻辑，而是简单地始终创建它们。\n\
  \n虽然`INSTEAD OF`触发器相关的开销并不特别大，但`AFTER`触发器的情况并非如此。`AFTER`触发器将这些表中的数据存储在`tempdb`的特殊部分，称为*版本存储*，并将其保留到事务完成之后。\n\
  \n> **注意** SQL Server 使用版本存储来维护行的多个版本，并支持多种功能，例如乐观事务隔离级别、在线索引、多个活动结果集（MARS）和触发器。我们将在[第\
  \ 21 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_21)“乐观隔离级别”中更详细地讨论它。\n\n虽然版本存储的使用引入了额外的`tempdb`负载，但还有另一个重要因素您需要牢记。为了维护行的新旧版本之间的链接，`AFTER\
  \ UPDATE`和`AFTER DELETE`触发器向它们修改或删除的行添加一个 14 字节的版本标记指针，该指针将一直保留到索引被重建。这可能会增加行的大小并引入类似于[第\
  \ 6 章“索引碎片”](http://dx.doi.org/10.1007/978-1-4842-1964-5_6)中讨论的插入/更新模式的碎片。\n\n让我们看一个例子，并创建一个包含一些数据的表，如清单\
  \ 9-7 所示。\n\n***清单 9-7.*** 触发器和碎片：表创建\n\n```sql\ncreate table dbo.Data\n(\n    ID\
  \ int not null identity(1,1),\n    Value int not null,\n    LobColumn varchar(max)\
  \ null,\n    constraint PK_Data\n        primary key clustered(ID)\n);\n\n;with\
  \ N1(C) as (select 0 union all select 0) -- 2 rows\n,N2(C) as (select 0 from N1\
  \ as T1 cross join N1 as T2) -- 4 rows\n,N3(C) as (select 0 from N2 as T1 cross\
  \ join N2 as T2) -- 16 rows\n,N4(C) as (select 0 from N3 as T1 cross join N3 as\
  \ T2) -- 256 rows\n,N5(C) as (select 0 from N4 as T1 cross join N4 as T2 ) -- 65,536\
  \ rows\n,Numbers(Num) as (select row_number() over (order by (select null)) from\
  \ N5)\ninsert into dbo.Data(Value)\nselect Num from Numbers;\n```\n\n现在，让我们删除表中每隔一行的数据，在操作前后查看索引的物理统计信息。\n\
  \n\n# 第 9 章 ■ 触发器\n\n## 清单 9-8. 触发器与碎片化：删除前后的物理索引统计信息\n\n```sql\nselect\n    alloc_unit_type_desc\
  \ as [分配单元],\n    index_level,\n    page_count,\n    avg_page_space_used_in_percent\
  \ as [空间使用率],\n    avg_fragmentation_in_percent as [碎片 %]\nfrom sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(N'dbo.Data'),1,null,'DETAILED');\n\
  \ndelete from dbo.Data where ID % 2 = 0;\n\nselect\n    alloc_unit_type_desc as\
  \ [分配单元],\n    index_level,\n    page_count,\n    avg_page_space_used_in_percent\
  \ as [空间使用率],\n    avg_fragmentation_in_percent as [碎片 %]\nfrom sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(N'dbo.Data'),1,null,'DETAILED');\n\
  ```\n\n## 图 9-2. 无 AFTER DELETE 触发器时，执行 DELETE 语句后的聚集索引物理统计信息\n\n![](img/index-224_1.jpg)\n\
  \n您应该记得，`DELETE` 操作并不会从页面物理移除行；它只是将行标记为幽灵行。在我们的示例中，唯一改变的是页面上的可用空间量。\n\n现在，让我们截断该表，并使用\
  \ **清单 9-9** 中所示的代码，用与之前相同的数据重新填充它。\n\n## 清单 9-9. 触发器与碎片化：用数据填充表\n\n```sql\ntruncate\
  \ table dbo.Data;\n\n;with N1(C) as (select 0 union all select 0) -- 2 行\n,N2(C)\
  \ as (select 0 from N1 as T1 cross join N1 as T2) -- 4 行\n,N3(C) as (select 0 from\
  \ N2 as T1 cross join N2 as T2) -- 16 行\n,N4(C) as (select 0 from N3 as T1 cross\
  \ join N3 as T2) -- 256 行\n,N5(C) as (select 0 from N4 as T1 cross join N4 as T2\
  \ ) -- 65,536 行\n,Numbers(Num) as (select row_number() over (order by (select null))\
  \ from N5)\ninsert into dbo.Data(Value)\nselect Num from Numbers;\n```\n\n![](img/index-225_1.jpg)\n\
  \n接下来，让我们在表上创建一个空的 `AFTER DELETE` 触发器，如 **清单 9-10** 所示。\n\n## 清单 9-10. 触发器与碎片化：创建触发器\n\
  \n```sql\ncreate trigger trg_Data_AfterDelete\non dbo.data\nafter delete\nas\nreturn;\n\
  ```\n\n如果您运行与之前相同的删除语句，您将看到如 **图 9-3** 所示的结果。\n\n## 图 9-3. 有 AFTER DELETE 触发器时，执行\
  \ DELETE 语句后的聚集索引物理统计信息\n\n版本控制标签增大了行的大小，并导致在 `DELETE` 操作期间发生大量的页拆分和碎片化。此外，最终我们几乎使索引中的页数翻了一番。\n\
  \n**注意** 在某些情况下，当只涉及行内分配时（例如，当表没有 `LOB` 列或可变长度列——这些列可能需要将数据存储在行溢出页中），SQL Server\
  \ 会优化该行为，不会向行添加 14 字节的版本控制标签。\n\n触发器始终与触发生它的语句在同一个事务中运行。我们需要使触发器执行时间尽可能短，以最小化锁的持有时间。如果触发器包含可以在事务外执行的复杂逻辑，您可以考虑使用\
  \ Service Broker 来实现该逻辑。触发器可以向 Service Broker 发送一条消息，Service Broker 随后可以执行一个实现该逻辑的激活存储过程。\n\
  \n**注意** Service Broker 的内容超出了本书的范围。您可以在 [`msdn.microsoft.com/en-us/library/bb522893.aspx`](https://msdn.microsoft.com/en-us/library/bb522893.aspx)\
  \ 上阅读相关信息。\n\n## DDL 触发器\n\nDDL 触发器允许您定义响应各种 DDL 事件（如数据库对象的创建、更改或删除；权限更改；以及更新统计信息）而执行的代码。您可以将这些触发器用于审核目的，以及限制对数据库架构的某些操作。\n\
  \n\n\n# 第 9 章 ■ 触发器\n\n例如，清单 9-11 中所示的触发器可以防止意外修改或删除表，它可以作为生产环境中的一个安全特性来使用。\n\n\
  ### 清单 9-11. DDL 触发器：防止在生产环境中修改和删除表\n\n```sql\ncreate trigger trg_PreventAlterDropTable\
  \ on database\nfor alter_table, drop_table\nas\nbegin\n    print 'Table cannot be\
  \ altered or dropped with trgPreventAlterDropTable trigger enabled' ;\n    rollback;\n\
  end\n```\n\n虽然这种方法有助于保持表及其架构的完整性，但它引入了一个潜在问题。DDL 触发器是在操作完成后*触发*的。因此，以我们的示例为例，如果你有一个会话正在修改表，SQL\
  \ Server 会先执行修改操作，然后触发器才会触发并回滚所有更改。\n\n现在让我们来验证一下。第一步，我们修改触发器，以便在执行期间捕获有关表结构的信息，然后在触发时显示表中的列列表。你可以在清单\
  \ 9-12 中看到完成此操作的代码。\n\n### 清单 9-12. DDL 触发器：触发器代码\n\n```sql\nalter trigger trg_PreventAlterDropTable\
  \ on database\nfor alter_table\nas\nbegin\n    declare\n        @objName nvarchar(257)\
  \ =\n            eventdata().value('/EVENT_INSTANCE[1]/SchemaName[1]','nvarchar(128)')\
  \ +\n            '.' + eventdata().value('/EVENT_INSTANCE[1]/ObjectName[1]','nvarchar(128)');\n\
  \n    select column_id, name\n    from sys.columns\n    where object_id = object_id(@objName);\n\
  \n    print 'Table cannot be altered or dropped with trgPreventAlterDropTable trigger\
  \ enabled'\n    rollback;\nend\n```\n\n![](img/index-227_1.jpg)\n\n现在，我们运行 `ALTER\
  \ TABLE` 语句，向表中添加一个持久化计算列，在执行期间捕获 I/O 统计信息。你可以在清单 9-13 中看到执行此操作的代码。\n\n### 清单 9-13.\
  \ DDL 触发器：ALTER TABLE 语句\n\n```sql\nset statistics io on;\nalter table Delivery.Addresses\
  \ add NewColumn as AddressId persisted;\n```\n\n此次修改为表中的每一行数据都添加了另一个列。我们可以在图 9-4\
  \ 中看到结果。\n\n### 图 9-4. 包含操作 I/O 统计信息的 DDL 触发器中的表结构\n\n如你所见，当触发器触发时，表已经被修改，并且创建了一个名为\
  \ `NewColumn` 的新列。因此，当触发器回滚事务时，SQL Server 需要撤销表修改操作。这个过程可能效率非常低，尤其是对于大表。\n\n正如你已经看到的，我们正在触发器内部使用\
  \ `EVENTDATA()` 函数来获取有关 DDL 事件的信息。该函数返回一个 `xml` 值，其中包含事件类型、会话和 DDL 命令、受影响对象以及其他属性的信息。例如，在我们的示例中，你会得到以下\
  \ XML 代码：\n\n```xml\n<EVENT_INSTANCE>\n    <EventType>ALTER_TABLE</EventType>\n\
  \    <PostTime>2015-11-28T12:26:44.453</PostTime>\n    <SPID>54</SPID>\n    <ServerName>SQL2016</ServerName>\n\
  \    <LoginName>SQL2016\\Administrator</LoginName>\n    <UserName>dbo</UserName>\n\
  \    <DatabaseName>SqlServerInternals</DatabaseName>\n    <SchemaName>Delivery</SchemaName>\n\
  \    <ObjectName>Addresses</ObjectName>\n    <ObjectType>TABLE</ObjectType>\n  \
  \  <AlterTableActionList>\n        <Create>\n            <Columns>\n           \
  \     <Name>NewColumn</Name>\n            </Columns>\n        </Create>\n    </AlterTableActionList>\n\
  \    <TSQLCommand>\n        <SetOptions ANSI_NULLS=\"ON\" ANSI_NULL_DEFAULT=\"ON\"\
  \ ANSI_PADDING=\"ON\" QUOTED_IDENTIFIER=\"ON\" ENCRYPTED=\"FALSE\" />\n        <CommandText>alter\
  \ table Delivery.Addresses add NewColumn as AddressId persisted</CommandText>\n\
  \    </TSQLCommand>\n</EVENT_INSTANCE>\n```\n\nDDL 触发器可以在服务器或数据库范围内创建。某些 DDL 事件——例如\
  \ `CREATE_DATABASE`——要求触发器具有服务器范围。其他事件——例如 `ALTER_TABLE`——则可以使用两者中的任一范围。当在此类触发器在服务器范围内创建时，它会在该服务器上任何数据库中发生相应事件时触发。\n\
  \n\n\n在 SQL Server Management Studio 中，数据库级 DDL 触发器位于数据库的 *可编程性* 节点下。服务器级 DDL 触发器则显示在\
  \ *服务器对象* 节点下。您也可以使用 `sys.triggers` 和 `sys.server_triggers` 目录视图通过 T-SQL 来查找它们。\n\
  \n#### 登录触发器\n\n登录触发器在用户成功通过服务器验证后、但会话建立之前触发。您可以使用登录触发器的场景包括：防止同一用户打开多个数据库连接，或根据某些自定义标准限制对系统的访问。\n\
  \n清单 9-14 中的触发器可防止 `HRLogin` 登录名在非工作时间访问系统。\n\n### 清单 9-14. 登录触发器\n\n```sql\ncreate\
  \ trigger trg_Logon_BusinessHoursOnly\non all server\nfor logon\nas\nbegin\n   \
  \ declare\n        @currTime datetime = current_timestamp;\n    if original_login()\
  \ = 'HRLogin' and\n       ( -- Check if today is weekend\n         ((@@datefirst\
  \ + datepart(dw, @currTime)) % 7 in (0,1)) or\n         (cast(@currTime as time)\
  \ >= '18:00:00') or\n         (cast(@currTime as time) < '8:00:00')\n       )\n\
  \        rollback;\nend\n```\n\n与 DDL 触发器类似，有一个 `EVENTDATA()` 函数，它返回包含有关登录事件附加信息的\
  \ XML。以下是此 XML 代码的示例：\n\n```xml\n<EVENT_INSTANCE>\n    <EventType>LOGON</EventType>\n\
  \    <PostTime>2016-11-18T17:55:40.090</PostTime>\n    <SPID>55</SPID>\n    <ServerName>SQL2016</ServerName>\n\
  \    <LoginName>SQL2016\\Administrator</LoginName>\n    <LoginType>Windows (NT)\
  \ Login</LoginType>\n    <SID>sid</SID>\n    <ClientHost>&lt;local machine&gt;</ClientHost>\n\
  \    <IsPooled>0</IsPooled>\n</EVENT_INSTANCE>\n```\n\n您需要确保登录触发器执行得尽可能快，以防止可能的连接超时。如果触发器访问响应时间无法保证的外部资源，则必须非常小心。例如，考虑一个执行额外公司\
  \ Active Directory 身份验证的 CLR 函数。该函数需要为 AD 查询设置短超时时间，并正确处理可能的异常。否则，将无人能登录到 SQL Server。\n\
  \n#### UPDATE() 和 COLUMNS_UPDATED() 函数\n\n`UPDATE()` 和 `COLUMNS_UPDATED()` 函数允许您检查特定列是否受到\
  \ `INSERT` 或 `UPDATE` 操作的影响。\n\n`UPDATE()` 函数接受列名作为参数，并返回一个布尔值，显示该列是否受到触发触发器的语句的影响。对于\
  \ `INSERT` 操作，它总是返回 `TRUE`。对于 `UPDATE` 操作，如果尝试更新某列，或者更具体地说，如果该列出现在需要更新的列列表中，**无论其值是否发生了变化**，它都会返回\
  \ `TRUE`。例如，在清单 9-15 中，`UPDATE` 语句并未更改行中列 `C` 的值。然而，触发器中的 `UPDATE(C)` 函数返回 `TRUE`，因为列\
  \ `C` 被包含在 `UPDATE` 语句的列列表中。\n\n### 清单 9-15. UPDATE() 函数行为\n\n```sql\ncreate trigger\
  \ trg_T_AU\non dbo.T\nafter update\nas\nbegin\n    -- Some code here\n    if update(C)\n\
  \    -- Some code here\nend\ngo\n\ndeclare @V int = null;\nupdate T set C = IsNull(@V,\
  \ C) where ID = 1;\n```\n\n清单 9-16 展示了一个触发器的示例，当订单项价格或数量发生变化时，该触发器会重新计算订单总额。\n\n\
  ### 清单 9-16. UPDATE() 函数实现示例\n\n```sql\ncreate trigger trg_OrderLineItems_AfterUpdate\n\
  on dbo.OrderLineItems\nafter update\nas\nbegin\n    -- Some code here\n    if update(Quantity)\
  \ or update(Price)\n    begin\n        -- recalculating order total\n        update\
  \ o\n        set\n            o.Total =\n            ( select sum(li.Price * li.Quantity)\n\
  \              from dbo.OrderLineItems li\n              where li.OrderId = o.OrderId\
  \ )\n        from dbo.Orders o\n        where o.OrderId in (select OrderId from\
  \ inserted);\n    end;\n    -- Some code here\nend\n```\n\n`COLUMNS_UPDATED()` 函数返回一个\
  \ `varbinary` 值，它表示一个位掩码，其中每一位...\n\n\n如果列受语句影响，则设置为 1。位的顺序，从最低有效位到最高有效位，对应于 `sys.columns`\
  \ 目录视图中的 `column_id` 值。\n\n假设 `Quantity` 列的 `column_id` 为 4，`Price` 列的 `column_id`\
  \ 为 5，我们可以将 `if` 运算符替换为以下位掩码比较：`if columns_updated() & 24 <> 0`。\n\n整数值 24 代表二进制值\
  \ 11000。如果 `columns_updated` 函数返回的相应位中任一为 1，则按位 `&`（与）运算符的结果将不等于 0。\n\n#### 嵌套和递归触发器\n\
  \n当 DDL 和 DML 触发器的操作引发其他表中的触发器时，它们就是嵌套的。例如，你可以在表 A 上有一个 `AFTER UPDATE` 触发器，该触发器更新表\
  \ B，而表 B 自己定义了 `AFTER UPDATE` 触发器。启用嵌套触发器时，表 B 上的触发器将被触发。你可以通过设置 `nested triggers`\
  \ 服务器配置选项来控制该行为。清单 9-17 中的代码禁用了嵌套触发器的执行。\n\n***清单 9-17.*** 禁用嵌套触发器\n\n```sql\nEXEC\
  \ sp_configure 'show advanced options', 1;\nGO\nRECONFIGURE;\nGO\nEXEC sp_configure\
  \ 'nested triggers', 0;\nGO\nRECONFIGURE;\nGO\n```\n\n默认情况下，嵌套触发器执行是启用的。在无限循环的情况下，当嵌套层级超过\
  \ 32 时，SQL Server 会终止执行并回滚事务。\n\n另一个数据库选项 `recursive_triggers` 控制 `AFTER` 触发器是否可以触发自身。有两种类型的递归。对于*直接递归*，触发器通过对其定义所在的表执行相同操作来触发自身；例如，当一个\
  \ `AFTER UPDATE` 触发器更新同一张表时。默认情况下，直接递归是禁用的。而*间接递归*发生在表 A 执行操作引发表 B 中的触发器，而表 B 中的触发器执行操作又引发表\
  \ A 中的同一触发器时。为了防止间接递归发生，我们需要在服务器级别禁用 `nested triggers` 配置选项。\n\n■ **注意** 更改 `nested\
  \ triggers` 或 `recursive triggers` 选项时需要小心。开发人员通常依赖默认的触发器行为，更改这些选项可能会破坏现有系统。\n\n\
  ## 首个和最后一个触发器\n\n当一个表有多个 `AFTER` 触发器时，你可以使用系统存储过程 `sp_settriggerorder` 来指定哪些触发器最先和最后触发。例如，清单\
  \ 9-18 中的代码使 `trg_Data_AUAudit` 成为执行中的第一个触发器。\n\n***清单 9-18.*** 指定触发器的执行顺序\n\n```sql\n\
  sp_settriggerorder @triggername = 'trg_Data_AUAudit', @order = 'first',\n      \
  \             @stmttype = 'UPDATE'\n```\n\n每个操作——`INSERT`、`UPDATE` 和 `DELETE`——都可以指定各自的首个和最后一个触发器。当触发器被修改时，该值将被清除。\n\
  \n无法以任何其他方式控制触发器的触发顺序。\n\n#### CONTEXT_INFO 和 SESSION_CONTEXT\n\n每个会话最多关联 128 字节的二进制数据值，称为上下文信息。该值具有会话范围，当你需要向触发器传递参数或从触发器传出参数时可以使用它。\n\
  \n你可以使用 `SET CONTEXT_INFO` 语句设置该值，并使用 `CONTEXT_INFO` 函数检索它。\n\n例如，让我们修改 DDL 触发器\
  \ `trg_PreventAlterDropTable`，以允许当上下文信息包含字符串 `ALLOW_TABLE_ALTERATION` 时修改表。实现此目的的代码如清单\
  \ 9-19 所示。\n\n***清单 9-19.*** CONTEXT_INFO：触发器代码\n\n```sql\ncreate trigger trg_PreventAlterDropTable\
  \ on database\nfor alter_table\nas\nbegin\n    if isnull(convert(varchar(22), context_info()),\
  \ '') <> 'ALLOW_TABLE_ALTERATION'\n    begin\n        print 'Table alteration is\
  \ not allowed in such context';\n        rollback;\n    end\nend\n```\n\n\n要能够修改表，会话需要设置\
  \ `CONTEXT_INFO`，如清单 9-20 所示。\n\n### 清单 9-20. `CONTEXT_INFO`：设置 `CONTEXT_INFO` 值\n\
  \n```sql\ndeclare\n@CI varbinary(128) = convert(varbinary(22),'ALLOW_TABLE_ALTERATION');\n\
  set context_info @CI\nalter table Delivery.Addresses add NewColumn int null\n```\n\
  \n上下文二进制数据也通过 `sys.dm_exec_request`、`sys.dm_exec_sessions` 和 `sys.processes` 系统视图中的\
  \ `CONTEXT_INFO` 列公开。\n\nSQL Server 2016 引入了称为 `session context` 的会话特定存储概念，它允许每个会话以键值对的形式存储最多\
  \ 256 KB 的数据。可以想见，与上下文信息相比，`session context` 更加灵活且更易于使用。\n\n清单 9-21 展示了一个 DDL 触发器的示例，该触发器基于会话上下文数据允许表的修改。\n\
  \n### 清单 9-21. 会话上下文：触发器代码\n\n```sql\ncreate table dbo.AlterationEvents\n(\n   \
  \ OnDate datetime2(7) not null\n        constraint DEF_AlterationEvents_OnDate\n\
  \        default sysutcdatetime(),\n    Succeed bit not null,\n    RequestedBy varchar(255)\
  \ not null,\n    Description varchar(8000) not null,\n    constraint PK_AlterationEvents\n\
  \        primary key clustered(OnDate)\n)\ngo\n\nCHAPTER 9 ■ TRIGGERS\n\ncreate\
  \ trigger trg_PreventAlterDropTable_WithAudit on database\nfor alter_table\nas\n\
  begin\n    set nocount on\n\n    declare\n        @AlterationAllowed bit = 1\n \
  \       ,@RequestedBy varchar(255)\n        ,@Description varchar(8000)\n\n    select\n\
  \        @AlterationAllowed = convert(bit,session_context(N'AlterationAllowed'))\n\
  \        ,@RequestedBy = convert(varchar(255),session_context(N'RequestedBy'))\n\
  \        ,@Description = convert(varchar(255),session_context(N'Description'));\n\
  \n    if (\n        @AlterationAllowed != 1) or (IsNull(@RequestedBy,'') = '') or\n\
  \        (IsNull(@Description,'') = '')\n    begin\n        set @AlterationAllowed\
  \ = 0;\n        print 'Table alteration is not allowed in such context';\n     \
  \   rollback;\n    end;\n\n    insert into dbo.AlterationEvents(Succeed,RequestedBy,Description)\n\
  \    values(@AlterationAllowed,IsNull(@RequestedBy,'Not Provided')\n          ,IsNull(@Description,'Not\
  \ Provided'));\nend\n```\n\n清单 9-22 展示了用允许执行修改操作的值填充会话上下文的代码。\n\n### 清单 9-22. 会话上下文：填充会话上下文数据\n\
  \n```sql\nexec sp_set_session_context @key = N'AlterationAllowed', @value = 1, @read_only\
  \ = 0\nexec sp_set_session_context @key = N'RequestedBy', @value = 'Developers',\
  \ @read_only = 0\nexec sp_set_session_context @key = N'Description', @value = 'Client\
  \ App v1.0.1 Support', @read_only = 0\n\nalter table dbo.Config add SyncURL nvarchar(1024)\
  \ not null;\n```\n\n**注意** 您可以在 [`msdn.microsoft.com/en-us/library/mt605113.aspx`](https://msdn.microsoft.com/en-us/library/mt605113.aspx)\
  \ 了解更多关于 `session context` 的信息。\n\n## 第 9 章 ■ 触发器\n\n#### 总结\n\n触发器在某些场景下可以提供帮助。DDL\
  \ 触发器可以验证并防止系统中发生不需要的元数据更改。登录触发器可以帮助实现自定义身份验证。DML 触发器有助于将某些逻辑集中在代码中，尤其是在系统中没有专门的数据访问层时。一个例子是实现审计跟踪功能，当您想要捕获有关更改数据的用户的信息时。虽然实现此类任务还有其他方法，但基于触发器的实现可能是最简单的。\n\
  \n不幸的是，触发器的代价很高。AFTER DML 触发器引入了与维护 `inserted` 和 `deleted` 虚拟表相关的开销。这会导致额外的 `tempdb`\
  \ 负载和索引碎片。INSTEAD OF 触发器可能导致系统可维护性问题。很容易忘记或忽略在此类触发器中实现的逻辑。\n\nDDL 触发器在模式更改完成后运行。虽然您可以从触发器内部回滚这些更改，但此类操作在\
  \ I/O、CPU 和事务日志活动方面可能非常昂贵，尤其是在处理大表时。\n\n\n# 第十章\n\n#### 视图\n\n最后，如果实现不当，登录触发器可能会阻止用户登录系统——特别是当这些触发器访问外部资源时，由于逻辑错误或执行时间过长导致的连接超时。\n\
  \n触发器总是在事务的上下文中运行。在触发器运行期间及事务完成之前，所有活动的锁（即数据和架构锁）都将被保持。你需要使触发器尽可能快速高效，并避免任何可能耗时的操作。例如，将审计跟踪功能实现为使用外部（链接）服务器进行日志记录是个坏主意。如果该服务器宕机，连接尝试将花费很长时间才能超时。此外，如果未妥善处理异常，它将回滚原始事务。\n\
  \n考虑到所有这些影响，在处理触发器时需要非常小心。除非绝对必要，否则最好避免使用它们。\n\n视图代表由基础查询定义的虚拟表，它们为系统增加了另一层抽象。视图隐藏了实现细节，并可以将带有复杂连接和聚合的查询呈现为单个表。此外，视图可用于限制对数据的访问，仅向用户提供行和列的子集。\n\
  \n在 `SQL Server` 中有两种不同类型的视图：常规视图和索引（物化）视图。让我们详细看看它们。\n\n常规视图只是元数据。当你在查询中引用视图时，`SQL\
  \ Server` 会将其替换为视图定义中的查询，然后优化并执行该语句，因为视图本身实际上并不存在。视图的工作方式类似于 `C` 编程语言中的 `#define`\
  \ 宏，在编译期间预处理器会用其定义替换宏。\n\n视图提供了两个主要好处。首先，它们简化了系统中的安全管理。你可以将视图作为另一安全层，并向用户授予对视图的权限，而不是对实际表的权限。此外，视图可以仅向用户提供数据的子集，从原始表中过滤掉某些行和列。\n\
  \n考虑这样一种情况：你有一个包含公司员工信息的表，该表包含私有和公共属性。创建此表的代码如代码清单 10-1 所示。\n\n**代码清单 10-1.** 视图与安全性：表创建\n\
  \n```sql\ncreate table dbo.Employees\n(\n    EmployeeId int not null,\n    Name\
  \ nvarchar(100) not null,\n    Position nvarchar(100) not null,\n    Email nvarchar(256)\
  \ not null,\n    DateOfBirth date not null,\n    SSN varchar(10) not null,\n   \
  \ Salary money not null,\n    -- specifies if employee info needs to be listed in\
  \ the intranet\n    PublishProfile bit not null,\n    constraint PK_Employee\n \
  \       primary key clustered(EmployeeID)\n)\n```\n\n© Dmitri Korotkevitch 2016\n\
  D. Korotkevitch, *Pro SQL Server Internals*, DOI 10.1007/978-1-4842-1964-5_10\n\n\
  假设你有一个在公司内网上显示公司通讯录的系统。你可以定义一个视图，从该表中选择公共信息，过滤掉那些不希望其个人资料被发布的员工，然后授予用户对该视图的 `SELECT`\
  \ 权限，而不是对表的权限。你可以在代码清单 10-2 中看到此代码。\n\n**代码清单 10-2.** 视图与安全性：视图创建\n\n```sql\ncreate\
  \ view dbo.vPublicEmployeeProfiles(EmployeeId, Name, Position, Email)\nas\n    select\
  \ EmployeeId, Name, Position, Email\n    from dbo.Employees\n    where PublishProfile\
  \ = 1\ngo\n\ngrant select on object::dbo.vPublicEmployeeProfiles to [IntranetUsers];\n\
  ```\n\n虽然你可以通过使用列级权限和在查询中添加额外过滤器来在不使用视图的情况下完成此任务，但视图方法更易于开发和维护。\n\n**注意** 在 `SQL\
  \ Server 2016` 中，你可以使用行级安全性从结果集中排除行。\n\n\n# 第 10 章 ■ 视图\n\n## 视图与连接：表的创建\n\n视图的另一个好处是，它们将数据库模式从客户端应用程序中抽象出来。您可以通过修改视图和改变底层查询来更改数据库模式，同时对应用程序保持透明。只要视图的接口保持不变，这对客户端应用程序就是透明的。\n\
  \n此外，您可以隐藏复杂的实现细节和表连接，将视图作为客户端应用程序的简单接口使用。然而，这种方法有点危险，可能会导致系统中不必要且意外的性能开销。您还应避免创建在底层查询中引用其他视图的嵌套视图，因为这可能会带来优化挑战和性能问题。\n\
  \n让我们看几个例子。假设我们有一个包含两个表的订单录入系统：`dbo.Orders` 和 `dbo.Clients`。创建这些表的代码如 **清单 10-3**\
  \ 所示。\n\n### 清单 10-3. 视图与连接：表的创建\n\n```sql\ncreate table dbo.Clients\n(\n    ClientId\
  \ int not null,\n    ClientName varchar(32),\n    constraint PK_Clients\n    primary\
  \ key clustered(ClientId)\n);\n```\n\n![](img/index-237_1.jpg)\n\n```sql\ncreate\
  \ table dbo.Orders\n(\n    OrderId int not null identity(1,1),\n    Clientid int\
  \ not null,\n    OrderDate datetime not null,\n    OrderNumber varchar(32) not null,\n\
  \    Amount smallmoney not null,\n    constraint PK_Orders\n    primary key clustered(OrderId)\n\
  );\n```\n\n让我们创建一个返回订单信息（包括客户名称）的视图，如 **清单 10-4** 所示。\n\n### 清单 10-4. 视图与连接：vOrders\
  \ 视图的创建\n\n```sql\ncreate view dbo.vOrders(OrderId, Clientid, OrderDate, OrderNumber,\
  \ Amount, ClientName)\nas\nselect o.OrderId, o.ClientId, o.OrderDate, o.OrderNumber,\
  \ o.Amount, c.ClientName\nfrom dbo.Orders o join dbo.Clients c on\no.Clientid =\
  \ c.ClientId;\n```\n\n这种实现对开发人员来说非常方便。通过引用视图，他们可以获得订单的完整信息，而无需担心底层的连接操作。当客户端应用程序想要选择特定订单时，它可以执行一个\
  \ `SELECT` 语句，如 **清单 10-5** 所示，并获得如 **图 10-1** 所示的执行计划。\n\n### 清单 10-5. 视图与连接：从\
  \ vOrders 视图中选择所有列\n\n```sql\nselect OrderId, Clientid, ClientName, OrderDate, OrderNumber,\
  \ Amount\nfrom dbo.vOrders\nwhere OrderId = @OrderId\n```\n\n### 图 10-1. 从视图中选择所有列时的执行计划\n\
  \n这正是您所期望的。SQL Server 用底层的查询替换了视图，该查询从 `dbo.Orders` 表中选择数据，并将其与 `dbo.Clients` 表中的数据连接起来。然而，如果您运行一个只返回\
  \ `dbo.Orders` 表中列的查询，如 **清单 10-6** 所示，您会得到一个意想不到的执行计划，如 **图 10-2** 所示。\n\n![](img/index-238_1.jpg)\n\
  \n![](img/index-238_2.jpg)\n\n### 清单 10-6. 视图与连接：使用 vOrders 视图选择 Orders 表中的列\n\n\
  ```sql\nselect OrderId, OrderNumber, Amount\nfrom dbo.vOrders\nwhere OrderId = @OrderId\n\
  ```\n\n### 图 10-2. 仅选择属于 Orders 表的列时的执行计划\n\n如您所见，即使您不需要 `ClientName` 列的数据，SQL Server\
  \ 仍然执行了连接操作。这是有道理的；因为您在视图中使用了内连接，SQL Server 需要排除 `dbo.Orders` 表中在 `dbo.Clients`\
  \ 表中没有对应行的行。\n\n有两种方法可以解决这个问题并从执行计划中消除不必要的连接。第一种是使用外连接而不是内连接，如 **清单 10-7** 所示。\n\
  \n### 清单 10-7. 视图与连接：vOrders2 视图的创建\n\n```sql\ncreate view dbo.vOrders2(OrderId,\
  \ Clientid, OrderDate, OrderNumber, Amount, ClientName)\nas\nselect o.OrderId, o.ClientId,\
  \ o.OrderDate, o.OrderNumber, o.Amount, c.ClientName\nfrom dbo.Orders o\nleft outer\
  \ join\ndbo.Clients c on\n```\n\n\n\n# 第十章 ■ 视图\n\n`o.Clientid = c.ClientId;`\n\n\
  现在，如果你运行如清单 10-8 所示的`SELECT`语句，你将得到一个不含内连接的执行计划，如图 10-3 所示。\n\n## 清单 10-8. 视图与连接：使用`vOrders2`视图从\
  \ Orders 表中选择列\n\n```sql\nselect OrderId, OrderNumber, Amount\nfrom dbo.vOrders2\n\
  where OrderId = @OrderId\n```\n\n## 图 10-3. 使用左外连接的执行计划\n\n![](img/index-239_1.jpg)\n\
  \n虽然这种方法有效，但外连接限制了查询优化器在生成执行计划时的可选方案。另一件需要记住的事情是，你改变了视图的行为。如果你现在可以拥有不属于系统中客户的订单，那么新的实现方式将不会将它们从结果集中排除。这可能会引入副作用，并破坏那些引用该视图并依赖于原有内连接行为的其他代码。在使用外连接实现连接消除之前，你必须分析数据和业务领域。\n\
  \n一个更好的选择是向`dbo.Orders`表添加一个外键约束，如清单 10-9 所示。\n\n## 清单 10-9. 视图与连接：添加外键约束\n\n```sql\n\
  alter table dbo.Orders with check\nadd constraint FK_Orders_Clients\nforeign key(ClientId)\n\
  references dbo.Clients(ClientId)\n```\n\n一个受信任的外键约束保证了每个订单都有对应的客户行。因此，SQL Server\
  \ 可以从执行计划中消除该连接。图 10-4 显示了如果你使用清单 10-6 中的代码查询`dbo.vOrders`视图时的执行计划，该视图仅从`dbo.Orders`表中选择数据。\n\
  \n## 图 10-4. 存在外键约束时使用内连接的执行计划\n\n不幸的是，无法保证 SQL Server 会消除所有不必要的连接，尤其是在涉及多张表的非常复杂的情况下。此外，如果外键约束包含多个列，SQL\
  \ Server 则不会消除连接。\n\n现在，让我们来看一个情况：一个系统收集属于多家公司的设备的位置信息。创建表的代码如清单 10-10 所示。\n\n##\
  \ 清单 10-10. 连接消除与多列外键约束：表创建\n\n```sql\ncreate table dbo.Devices\n(\nCompanyId int\
  \ not null,\nDeviceId int not null,\nDeviceName nvarchar(64) not null,\n);\n\ncreate\
  \ unique clustered index IDX_Devices_CompanyId_DeviceId\non dbo.Devices(CompanyId,\
  \ DeviceId);\n\ncreate table dbo.Positions\n(\nCompanyId int not null,\nOnTime datetime2(0)\
  \ not null,\nRecId bigint not null,\nDeviceId int not null,\nLatitude decimal(9,6)\
  \ not null,\nLongitute decimal(9,6) not null,\nconstraint FK_Positions_Devices\n\
  foreign key(CompanyId, DeviceId)\nreferences dbo.Devices(CompanyId, DeviceId)\n\
  );\n\ncreate unique clustered index IDX_Positions_CompanyId_OnTime_RecId\non dbo.Positions(CompanyId,\
  \ OnTime, RecId);\n\ncreate nonclustered index IDX_Positions_CompanyId_DeviceId_OnTime\n\
  on dbo.Positions(CompanyId, DeviceId, OnTime);\n```\n\n让我们创建一个连接这些表的视图，如清单 10-11\
  \ 所示。\n\n## 清单 10-11. 连接消除与多列外键约束：视图创建\n\n```sql\ncreate view dbo.vPositions(CompanyId,\
  \ OnTime, RecId, DeviceId, DeviceName, Latitude,\nLongitude)\nas\nselect p.CompanyId,\
  \ p.OnTime, p.RecId, p.DeviceId, d.DeviceName, p.Latitude, p.Longitude\nfrom dbo.Positions\
  \ p join dbo.Devices d on\np.CompanyId = d.CompanyId and p.DeviceId = d.DeviceId;\n\
  ```\n\n现在，让我们运行[清单 10-12]中所示的`SELECT`语句。该语句仅返回`dbo.Positions`表中的列，并生成如图 10-5 所示的执行计划。\n\
  \n## 清单 10-12. 连接消除与多列外键约束：从`vPositions`视图中选择\n\n```sql\nselect OnTime, DeviceId,\
  \ Latitude, Longitude\n```\n\n\n\nfrom dbo.vPositions\n\nwhere CompanyId = @CompanyId\
  \ and OnTime between @StartTime and @StopTime\n\n**图 10-5.** 具有多列外键约束的执行计划\n\n即使存在外键约束，联接仍然存在。当外键约束包含多个列时，SQL\
  \ Server 不会执行联接消除。遗憾的是，在这种情况下，你几乎无法采取太多措施来实现联接消除。你可以采用外连接的方法，尽管在这种情况下，值得考虑直接查询表而非使用视图。\n\
  \n# 第 10 章 ■ 视图\n\n最后，当表是在 `tempdb` 中创建时，即使存在单列外键约束，SQL Server 也不会执行联接消除。如果你在从外部源加载数据时，将\
  \ `tempdb` 用作 ETL 过程的暂存区，进行一些处理和数据转换后再插入到用户数据库中，你需要牢记这一点。\n\n## 索引视图（物化视图）\n\n与仅是元数据的视图相反，`索引视图`会将视图查询的数据物化，以类似于表的方式存储在数据库中。然后，每当基础表更新时，SQL\
  \ Server 会同步刷新索引视图中的数据，从而保持它们是最新的。\n\n为了定义索引视图，你需要使用 `schemabinding` 选项创建常规视图。此选项会将视图和基础表“绑定”在一起，并防止任何影响视图的表更改。\n\
  \n接下来，你需要在视图上创建唯一的聚集索引。此时，SQL Server 会将视图数据`物化`到数据库中。在创建聚集索引后，如果需要，你还可以创建非聚集索引。当索引被定义为唯一时，SQL\
  \ Server 会强制实施该规则，如果存在唯一性冲突，则会使任何基础表的修改失败。你可以依赖此行为在 SQL Server 2005 中支持值子集的唯一性，或用于筛选索引不支持的复杂情况。其中一个例子是包含\
  \ `OR` 条件的筛选器。\n\n为了让视图可被索引化，存在大量要求和限制。仅举几例，视图不能包含子查询、半连接或外连接，不能引用 LOB 列，也不能指定 `UNION`、`DISTINCT`\
  \ 或 `TOP`。对可以在视图中使用的聚合函数也有限制。最后，视图需要使用特定的 `SET` 选项来创建，并且只能引用确定性函数，这些函数在使用特定参数值调用时总是返回相同的结果。\n\
  \n**注意** 有关完整的要求和限制列表，请查阅在线手册：`http://technet.microsoft.com/en-us/library/ms191432.aspx`。\n\
  \n**提示** 你可以使用 `OBJECTPROPERTY` 函数和参数 `IsIndexable` 来确定是否可以在视图上创建聚集索引。如果视图 `vPositions`\
  \ 是可索引的，下面的查询将返回 1：\n\n```\nSELECT OBJECTPROPERTY (OBJECT_ID(N'dbo.vPositions'),\
  \ 'IsIndexable')\n```\n\n索引视图有用的一个场景是优化在大表上包含联接和聚合的查询。让我们看一下这种情况，假设系统中存在 `dbo.OrderLineItems`\
  \ 和 `dbo.Products` 表。创建这些表的代码如清单 10-13 所示。\n\n**清单 10-13.** 索引视图：表创建\n\n```\ncreate\
  \ table dbo.Products\n(\nProductID int not null identity(1,1),\nName nvarchar(100)\
  \ not null,\nconstraint PK_Product\nprimary key clustered(ProductID)\n);\n```\n\n\
  ![](img/index-242_1.jpg)\n\n# 第 10 章 ■ 视图\n\n```\ncreate table dbo.OrderLineItems\n\
  (\nOrderId int not null,\nOrderLineItemId int not null identity(1,1),\nQuantity\
  \ decimal(9,3) not null,\nPrice smallmoney not null,\nProductId int not null,\n\
  constraint PK_OrderLineItems\nprimary key clustered(OrderId,OrderLineItemId),\n\
  constraint FK_OrderLineItems_Products\nforeign key(ProductId)\n```\n\n\n\n# 第 10\
  \ 章 ■ 视图\n\n## 清单 10-14. 索引视图：仪表板查询\n\n`references dbo.Products(ProductId)`;\n\n\
  `create index IDX_OrderLineItems_ProductId on dbo.OrderLineItems(ProductId)`;\n\n\
  现在，让我们设想一个显示迄今为止销量前十名产品的仪表板。该仪表板可以使用清单 10-14 中所示的查询。\n\n```sql\nselect top 10 p.ProductId,\
  \ p.name as ProductName, sum(o.Quantity) as TotalQuantity\nfrom\ndbo.OrderLineItems\
  \ o join dbo.Products p on\no.ProductId = p.ProductId\ngroup by\np.ProductId, p.Name\n\
  order by\nTotalQuantity desc\n```\n\n如果你在系统中运行此仪表板查询，你将收到如图 10-6 所示的执行计划。\n\n##\
  \ 图 10-6. 选择前 10 名最畅销产品查询的执行计划\n\n![](img/index-243_1.jpg)\n\n如你所见，此计划扫描并聚合来自 `dbo.OrderLineItems`\
  \ 表的数据，这在 I/O 和 CPU 方面开销很大。或者，你可以创建一个执行相同聚合的索引视图，并将结果物化在数据库中。创建此视图的代码如清单 10-15 所示。顺便提一下，索引视图的要求之一是当存在\
  \ `GROUP BY` 子句时，必须包含 `COUNT_BIG(*)` 聚合。\n\n## 清单 10-15. 索引视图：索引视图创建\n\n```sql\n\
  create view dbo.vProductSaleStats(ProductId, ProductName, TotalQuantity, Cnt)\n\
  with schemabinding\nas\nselect p.ProductId, p.Name, sum(o.Quantity), count_big(*)\n\
  from dbo.OrderLineItems o join dbo.Products p on\no.ProductId = p.ProductId\ngroup\
  \ by\np.ProductId, p.Name\ngo\n\ncreate unique clustered index IDX_vProductSaleStats_ProductId\n\
  on dbo.vProductSaleStats(ProductId);\n\ncreate nonclustered index IDX_vClientOrderTotal_TotalQuantity\n\
  on dbo.vProductSaleStats(TotalQuantity desc)\ninclude(ProductName);\n```\n\n清单 10-15\
  \ 中的代码在 `ProductId` 列上创建了一个唯一的聚集索引，并在 `TotalQuantity` 列上创建了一个非聚集索引。\n\n现在你可以直接从视图中选择数据，如清单\
  \ 10-16 所示。\n\n## 清单 10-16. 索引视图：从索引视图中选择数据\n\n```sql\nselect top 10 ProductId,\
  \ ProductName, TotalQuantity\nfrom dbo.vProductSaleStats\norder by TotalQuantity\
  \ desc\n```\n\n如图 10-7 所示的执行计划则高效得多。\n\n## 图 10-7. 利用索引视图选择前 10 名最畅销产品查询的执行计划\n\n\
  ![](img/index-244_1.jpg)\n\n一如既往，“天下没有免费的午餐。” 现在，SQL Server 需要维护该视图。每次你在 `dbo.OrderLineItem`\
  \ 中插入或删除行，或者修改数量或产品时，SQL Server 除了更新主表中的数据外，还需要更新索引视图中的数据。\n\n让我们看一下 `INSERT` 操作的执行计划，如图\
  \ 10-8 所示。\n\n## 图 10-8. 向 OrderLineItems 表插入数据查询的执行计划\n\n计划高亮区域的部分负责索引视图的维护。当表中的数据高度易变时，这部分计划可能会引入大量开销，这引出了一个非常重要的结论：*当我们在选择数据时获得的收益超过在数据修改期间维护视图的开销时，索引视图的效果最好。*\
  \ 简单来说，当底层数据相对静态时，索引视图最为有益。例如，考虑数据仓库系统，其典型工作负载需要大量连接和聚合，且数据更新不频繁，可能是基于某种计划进行的。\n\
  \n**提示：** 当存在引用某个表的索引视图时，务必测试批量数据更新的性能。在某些情况下，删除然后重新创建视图比在此类操作期间保留它更快。\n\n\n\n#\
  \ 第 10 章 ■ 视图\n\n在联机事务处理（OLTP）系统中，你需要仔细权衡索引视图的利弊，具体情况具体分析。如果底层数据变动过于频繁，最好避免使用索引视图。我们之前创建的视图就是一个例子，在数据（此处特指\
  \ `dbo.OrderLineItems` 表中的数据）持续变化的系统中，这类视图是**不应**被采用的。\n\n索引视图的另一个有益应用场景是连接优化。我曾接触过一个系统，它采用了一个包含五个层级的安全模型。有五个不同的表，每个表都存储了层级中每一级的特定权限信息。系统中几乎每个请求都需要通过连接这些表的数据来检查权限。我通过创建一个执行五表连接的索引视图优化了这部分系统，这样每个请求只需对索引视图执行一次索引查找操作。尽管这是一个\
  \ OLTP 系统，但底层表中的数据相对静态，所获得的收益超过了维护索引视图带来的开销。\n\n![](img/index-245_1.jpg)\n![](img/index-245_2.jpg)\n\
  \n虽然可以在 SQL Server 的每个版本中创建索引视图，但其行为确实因版本而异。非企业版的 SQL Server 需要在查询中直接引用视图并使用 `WITH\
  \ (NOEXPAND)` 提示，才能利用索引视图中的数据。若不使用此提示，SQL Server 会展开索引视图定义，并将其替换为类似于常规视图的底层查询。企业版和开发者版则不需要此类提示。即使你在查询中不引用索引视图，SQL\
  \ Server 也能利用它们。\n\n现在，让我们回到之前的例子。在企业版中，当你运行如**代码清单 10-17**所示的查询时，你仍然会得到一个利用了索引视图的执行计划，如**图\
  \ 10-9**所示。\n\n***代码清单 10-17.*** 索引视图：仪表板查询\n```sql\nselect top 10 p.ProductId,\
  \ p.name as ProductName, sum(o.Quantity) as\nTotalQuantity\nfrom\ndbo.OrderLineItems\
  \ o join dbo.Products p on\no.ProductId = p.ProductId\ngroup by\np.ProductId, p.Name\n\
  order by\nTotalQuantity desc\n```\n\n***图 10-9.*** 一个未引用索引视图的查询的执行计划（`企业版或开发者版`）\n\
  \n实际上，SQL Server 企业版可以将索引视图用于任何查询，无论这些查询与视图定义有多接近。例如，让我们运行一个查询，选择系统中曾经售出的所有产品的列表。该查询如**代码清单\
  \ 10-18**所示。\n\n***代码清单 10-18.*** 索引视图：返回系统中所有曾经售出产品列表的查询\n```sql\nselect p.ProductId,\
  \ p.Name\nfrom dbo.Products p\nwhere\nexists ( select *\nfrom dbo.OrderLineItems\
  \ o\nwhere p.ProductId = o.ProductId )\n```\n\nSQL Server 会识别出扫描索引视图比在两张表之间执行连接更高效，并会生成一个执行计划，如**图\
  \ 10-10**所示。\n\n***图 10-10.*** 该查询的执行计划（`企业版或开发者版`）\n\n在某些情况下，如果你需要优化那些无法更改数据库架构和查询的系统，可以利用此行为。如果你使用的是企业版，你可以创建索引视图，优化器将开始为某些查询使用这些视图，即使这些查询并未直接引用这些视图。显然，你需要仔细考虑采用这种方法所引入的索引视图维护开销。\n\
  \n##### 分区视图\n\n*分区视图*通过 `UNION ALL` 组合存储在相同或不同数据库服务器上的多个表中的数据。这种实现方式的常见应用场景之一是数据分区；即根据某些标准（例如数据的新旧程度）将数据拆分到多个表中，然后通过视图将它们组合起来。\n\
  \n\n# 第 10 章 ■ 视图\n\n通过分区视图获取所有表的数据。\n\n另一种情况是`数据分片`，即你根据某些标准将数据分离（分片）到多个服务器之间。例如，一个大型的、基于\
  \ Web 的购物车系统可以根据客户的地理位置来分片数据。在这种情况下，`分区视图`可以合并来自所有分片的数据，用于分析和报告目的。\n\n■ **注意** 我们将在第\
  \ 16 章“数据分区”中更详细地讨论`分区视图`。\n\n#### 可更新视图\n\n客户端应用程序可以通过`视图`修改底层表中的数据。它可以在`DML`语句中引用`视图`，但需要满足一系列要求。仅举几例，所有修改必须只引用一个基表中的列。这些列应该是物理列，不应参与计算和聚合。\n\
  \n■ **注意** 你可以在在线手册中查看完整的要求列表：[`technet.microsoft.com/en-us/library/ms187956.aspx`](http://technet.microsoft.com/en-us/library/ms187956.aspx)。\n\
  \n这些限制是此方法最大的缺点。我们使用`视图`的原因之一是为了增加一个抽象层，以隐藏实现细节。通过直接对`视图`进行更新，我们在更改它们的方式上受到了限制。如果我们的更改违反了使`视图`可更新的某些要求，客户端应用程序发出的`DML`语句将会失败。\n\
  \n另一种使`视图`可更新的方法是定义一个`INSTEAD OF`触发器。虽然这给了我们按意愿重构`视图`的灵活性，但这种方法通常比直接更新底层表更慢。它也使得系统更难支持和维护；你必须记住，表中的数据可以通过`视图`进行修改。\n\
  \n最后，你可以使用`CHECK OPTION`参数创建`视图`。指定此选项后，`SQL Server`会检查通过`视图`插入或更新的数据是否符合`视图的 SELECT`语句中设定的标准。它保证事务提交后，这些行将通过`视图`可见。例如，查看清单\
  \ 10-19 中定义的表和`视图`。\n\n***清单 10-19.*** `CHECK OPTION`：表和视图创建\n\n```sql\ncreate table\
  \ dbo.Numbers(Number int)\ngo\n\ncreate view dbo.PositiveNumbers(Number)\nas\nselect\
  \ Number\nfrom dbo.Numbers\nwhere Number > 0\nwith check option\ngo\n```\n\n清单 10-20\
  \ 中显示的任意一条语句都会失败，因为它们违反了`视图`查询中指定的`Number > 0`标准。\n\n***清单 10-20.*** `CHECK OPTION`：失败的语句\n\
  \n```sql\ninsert into dbo.PositiveNumbers(Number) values(-1)\nupdate dbo.PositiveNumbers\
  \ set Number = -1 where Number = 1\n```\n\n当`视图`用于防止访问数据的一个子集，并且客户端应用程序通过`视图`更新数据时，你应该考虑创建带`CHECK\
  \ OPTION`的`视图`。客户端应用程序将无法修改允许范围之外的数据。\n\n## 小结\n\n`视图`是一个强大且有用的工具，可以在多种不同情况下提供帮助。常规`视图`可以从安全和实现的角度提供抽象层。索引`视图`可以帮助优化系统，减少需要执行的连接和聚合操作。\n\
  \n与其他`SQL Server`对象一样，`视图`也有其代价。常规`视图`可能通过引入不必要的连接而对性能产生负面影响。索引`视图`在数据修改期间会带来开销，你需要以类似于维护常规表上定义的索引的方式来维护它们的索引。在设计`视图`时，你需要牢记这些因素。\n\
  \n`视图`通常更适合读取数据。通过`视图`更新数据是一种值得商榷的\n\n\n实践中，使用 `INSTEAD OF` 触发器通常比直接更新底层表更慢。\n\n\
  如果没有触发器，你必须遵循一些限制才能使视图可更新。更改视图的实现可能会带来副作用并破坏客户端应用程序。\n\n与其他数据库对象一样，你需要权衡视图的利弊，尤其是在设计专用的数据访问层时。你还可以考虑使用存储过程。尽管在客户端应用程序中视图通常更易于使用（例如，你可以在客户端添加另一个筛选谓词，而无需更改视图定义），但存储过程在开发和优化阶段提供了更多的灵活性和实现控制权。\n\
  \n# 第 11 章 用户自定义函数\n\n本章讨论多语句和内联用户自定义函数。它分析了 `SQL Server` 如何执行多语句函数及其带来的性能影响。随后，本章演示了一种通过将多语句函数转换为内联函数来解决这些性能问题的技术。\n\
  \n## 关于代码复用的讨论\n\n开发者职业生涯中最早了解到的概念之一就是代码复用的好处。将代码封装并复用到独立的库中可以加速开发和测试过程，并减少系统中的错误数量。\n\
  \n不幸的是，这种方法在 `T-SQL` 中并不总是有效。从开发和测试的角度看，代码复用无疑是有益的。然而，从性能角度看，如果实现不当，它可能会引入不必要的开销。一个这样的例子是“一刀切”的方法，即开发者创建一个存储过程或函数，然后用它来支持不同的用例。\n\
  \n例如，考虑一个包含两个表的系统——`dbo.Orders` 和 `dbo.Clients`——如代码清单 11-1 所示。\n\n### 代码清单 11-1.\
  \ 代码复用：表创建\n\n```sql\ncreate table dbo.Clients\n(\n    ClientId int not null,\n\
  \    ClientName varchar(32),\n    constraint PK_Clients\n        primary key clustered(ClientId)\n\
  );\n\ncreate table dbo.Orders\n(\n    OrderId int not null identity(1,1),\n    Clientid\
  \ int not null,\n    OrderDate datetime not null,\n    OrderNumber varchar(32) not\
  \ null,\n    Amount smallmoney not null,\n    IsActive bit not null,\n    constraint\
  \ PK_Orders\n        primary key clustered(OrderId)\n);\n\ncreate index IDX_Orders_OrderNumber\n\
  \    on dbo.Orders(OrderNumber)\n        include(IsActive, Amount)\n    where IsActive\
  \ = 1;\n```\n\n让我们假设该系统有一个基于存储过程的数据访问层，其中一个过程提供系统中所有活动订单的信息。该存储过程的代码如代码清单 11-2 所示。\n\
  \n### 代码清单 11-2. 代码复用：返回系统中活动订单列表的存储过程\n\n```sql\ncreate proc dbo.usp_Orders_GetActiveOrders\n\
  as\n    select o.OrderId, o.ClientId, c.ClientName, o.OrderDate, o.OrderNumber,\
  \ o.Amount\n    from dbo.Orders o join dbo.Clients c on\n        o.Clientid = c.ClientId\n\
  \    where IsActive = 1;\n```\n\n每当需要订单列表时，客户端应用程序都可以调用此存储过程。例如，它可以有一个显示所有订单属性的页面，以及一个仅显示订单号和金额的下拉控件。在这两种情况下，都可以使用相同的存储过程——应用程序在填充下拉列表时，只需忽略输出中任何不必要的列即可。\n\
  \n虽然这种方法有助于我们复用代码，但它也复用了执行计划。当我们运行该存储过程时，将得到如图 11-1.所示的计划。\n\n### 图 11-1. `dbo.usp_Orders_GetActiveOrders`\
  \ 存储过程的执行计划\n\n© Dmitri Korotkevitch 2016\nD. Korotkevitch, *Pro SQL Server Internals*,\
  \ DOI 10.1007/978-1-4842-1964-5_11\n\n![](img/index-249_1.jpg)\n\n\n# 第十一章：用户自定义函数\n\
  \n在上述两种情况下，此执行计划都会被使用。然而，下拉控件不需要所有的订单属性或客户信息，它可以通过代码清单 11-3 中所示的查询来获取所需信息。\n\n![](img/index-250_1.jpg)\n\
  \n## 代码清单 11-3：代码重用——返回下拉控件所需信息的查询\n\n```sql\nselect OrderId, OrderNumber, Amount\n\
  from dbo.Orders\nwhere IsActive = 1\n```\n\n这样的查询将会拥有一个高效得多的执行计划，因为它没有连接操作符，如图 11-2\
  \ 所示。\n\n**图 11-2：** 返回下拉控件所需订单号和金额的查询的执行计划\n\n如你所见，通过重用同一个存储过程，我们为其中一个用例引入了一个次优的执行计划，其中包含不必要的连接以及一个`聚集索引扫描`，而不是过滤后的`非聚集索引扫描`。我们在用户自定义函数中也可能遇到非常类似的问题，这将是本章讨论的内容。\n\
  \nSQL Server 中可用的用户自定义函数有三种类型：`标量`函数、`多语句表值`函数和`内联表值`函数。不过，我更倾向于根据它们的执行行为和影响使用不同的分类方式：即`多语句`函数和`内联`函数。\n\
  \n#### 多语句函数\n\n`多语句函数`中的代码以`BEGIN`关键字开始，以`END`关键字结束。无论它们包含多少条语句，只要存在`BEGIN`和`END`关键字，即使只有一条`RETURN`语句的函数也被视为多语句函数。\n\
  \n多语句函数有两种不同的类型。第一种是`标量`函数，它返回单个标量值。第二种是`表值`函数，它构建并返回一个表结果集，该结果集可以在语句的任何地方使用。\n\n\
  不幸的是，多语句函数调用开销昂贵，会带来显著的 CPU 额外负担。\n\n让我们用 100,000 行数据填充我们已经定义的`dbo.Orders`表，并创建一个用于截断`OrderDate`列时间部分的标量函数。函数代码如代码清单\
  \ 11-4 所示。\n\n### 代码清单 11-4：多语句函数的开销——标量函数创建\n\n```sql\ncreate function dbo.udfDateOnly(@Value\
  \ datetime)\nreturns datetime\nwith schemabinding\nas\nbegin\n    return (convert(datetime,convert(varchar(10),@Value,121)));\n\
  end\n```\n\n此函数接受`datetime`参数，并通过一种截断值的时间部分的方式将其转换为`varchar`。最后一步，它将该`varchar`转换回`datetime`，并将该值返回给调用者。这种实现方式效率极低，它引入了函数调用和类型转换的双重开销。然而，我们经常在各种生产系统中看到这种做法。\n\
  \n现在，让我们运行代码清单 11-5 中所示的语句。该查询计算`OrderDate`为 2013 年 3 月 1 日的订单数量。\n\n### 代码清单 11-5：多语句函数的开销——使用标量函数的查询\n\
  \n```sql\nselect count(*)\nfrom dbo.Orders\nwhere dbo.udfDateOnly(OrderDate) = '2013-03-01'\n\
  ```\n\n在我的计算机上的执行时间如下：\n\n> SQL Server 执行时间:\n>\n> CPU 时间 = 468 毫秒， elapsed time\
  \ = 509 毫秒\n\n接下来，让我们尝试在不使用标量函数的情况下进行类型转换，如代码清单 11-6 所示。\n\n### 代码清单 11-6：多语句函数的开销——不使用标量函数的查询\n\
  \n```sql\nselect count(*)\nfrom dbo.Orders\nwhere convert(datetime,convert(varchar(10),OrderDate,121)))\
  \ = '2013-03-01'\n```\n\n此查询的执行时间如下：\n\n> SQL Server 执行时间:\n>\n> CPU 时间 = 75 毫秒，\
  \ elapsed time = 82 毫秒。\n\n你可以看到，在不涉及任何多语句调用开销的情况下，该语句的运行速度快了六倍。\n\n\n# 第 11 章：用户定义函数\n\
  \n## 清单 11-7. 多语句函数的开销：无类型转换的查询\n\n有一种更好的方式来编写此查询。你可以检查`OrderDate`是否在日期区间内，如清单 11-7\
  \ 所示。\n\n```sql\nselect count(*)\nfrom dbo.Orders\nwhere OrderDate >= '2013-03-01'\
  \ and OrderDate < '2013-03-02'\n```\n\n这种方法将执行时间缩短至如下：\n\n```\nSQL Server Execution\
  \ Times:\nCPU time = 0 ms, elapsed time = 5 ms.\n```\n\n如你所见，用户定义的多语句函数和类型转换操作（可被视为系统函数）引入了巨大的开销，并显著增加了查询执行时间。然而，你在执行计划中几乎察觉不到这一点。图\
  \ 11-3 展示了使用用户定义函数（清单 11-5）和日期区间（清单 11-7）的查询的执行计划。\n\n![](img/index-252_1.jpg)\n\
  ![](img/index-252_2.jpg)\n\n## 图 11-3. 使用和不使用标量用户定义函数的执行计划\n\n用户定义函数向执行计划中添加了*筛选器*运算符。然而，运算符和查询的成本估计都极不准确。\n\
  \n如果你运行`SQL Server Profiler`并捕获`SP:Starting`事件，你将看到如图 11-4 所示的屏幕。如你所见，`SQL Server`调用了该函数\
  \ 100,000 次——每行调用一次。\n\n## 图 11-4. 带有 SP:Starting 事件的 SQL 跟踪\n\n另一个重要因素是多语句函数使谓词变得不可使用索引查找（non-SARGable）。让我们用`CREATE\
  \ NONCLUSTERED INDEX IDX_Orders_OrderDate ON dbo.Orders(OrderDate)`语句在`OrderDate`列上添加一个索引，然后检查查询的执行计划。\n\
  \n![](img/index-253_1.jpg)\n\n如图 11-5 所示，两个查询现在都在使用非聚集索引。然而，第一个查询扫描了整个索引，并为其中的每一行调用函数，而第二个查询则执行了*索引查找*操作。\n\
  \n## 图 11-5. 在 OrderDate 列上带有非聚集索引的查询的执行计划\n\n`查询优化器`处理多语句函数的方式也存在一些限制。首先，它不会将函数执行开销纳入计划成本估算中。正如你在图\
  \ 11-4 中看到的，执行计划中有一个额外的`筛选器`运算符，尽管`SQL Server`预计该运算符的成本非常低，但这与其实际引入的开销相去甚远。此外，`SQL\
  \ Server`也不会将函数内部运算符的成本计入调用查询的执行计划成本中。\n\n为了说明这种行为，让我们创建一个函数，该函数基于作为参数提供的`ClientId`返回特定客户的订单数量。该函数如清单\
  \ 11-8 所示。\n\n## 清单 11-8. 多语句函数的成本与估算：函数创建\n\n```sql\ncreate function dbo.ClientOrderCount(@ClientId\
  \ int)\nreturns int\nwith schemabinding\nas\nbegin\n    return\n    (\n        select\
  \ count(*)\n        from dbo.Orders\n        where ClientId = @ClientId\n    )\n\
  end\n```\n\n现在，让我们用`SELECT dbo.ClientOrderCount(1)`语句调用此函数，并查看其执行计划，如图 11-6 所示。\n\
  \n![](img/index-254_1.jpg)\n![](img/index-254_2.jpg)\n\n## 图 11-6. 多语句函数的估计执行计划\n\
  \n如你所见，`SQL Server`显示了两个查询的执行计划。`ClientId`列上没有索引，即使`查询优化器`没有将函数的估计成本计入外部查询成本，该函数仍需对`dbo.Orders`表执行聚集索引扫描。\n\
  \n另一个非常重要的限制是，使用旧版基数估算器（70）时，`查询优化器`...\n\n\n\n# 第 11 章 ■ 用户定义函数\n\n旧版基数估计器总是估计多语句表值函数只返回一行，而不管可用的统计信息如何。SQL\
  \ Server 2014 和 2016 中的新基数估计器模型（120 和 130）则总是估计多语句表值函数返回 100 行。\n\n为了演示这一点，让我们在使用旧版基数估计器的数据库中，使用\
  \ `CREATE NONCLUSTERED INDEX IDX_Orders_ClientId ON dbo.Orders(ClientId)` 语句在 `ClientId`\
  \ 列上创建一个非聚集索引。\n\n在这个演示中，我们的系统中有 100 个客户，每个客户有 1,000 个订单。你应该还记得，统计信息直方图最多保留 200\
  \ 个步骤，因此它会存储每个 `ClientId` 的信息。你可以通过运行 `DBCC SHOW_STATISTICS('dbo.Orders', 'IDX_Orders_ClientId')`\
  \ 命令来确认这一点。部分输出如图 11-7 所示。\n\n## 图 11-7. `IDX_Orders_ClientId` 直方图\n\n现在，让我们创建一个返回特定客户订单信息的多语句表值函数，并在单客户端作用域中调用它。实现此目的的代码如清单\
  \ 11-9 所示。\n\n## 清单 11-9. 多语句函数的成本与估计：返回所提供 clientid 的订单的函数\n\n```sql\ncreate function\
  \ dbo.udfClientOrders(@ClientId int)\nreturns @Orders table\n(\n    OrderId int\
  \ not null,\n    OrderDate datetime not null,\n    OrderNumber varchar(32) not null,\n\
  \    Amount smallmoney not null\n)\nwith schemabinding\nas\nbegin\n    insert into\
  \ @Orders(OrderId, OrderDate, OrderNumber, Amount)\n    select OrderId, OrderDate,\
  \ OrderNumber, Amount\n    from dbo.Orders\n    where ClientId = @ClientId\n   \
  \ return\nend\ngo\n\nselect c.ClientName, o.OrderId, o.OrderDate, o.OrderNumber,\
  \ o.Amount\nfrom dbo.Clients c cross apply dbo.udfClientOrders(c.ClientId) o\nwhere\
  \ c.ClientId = 1\n```\n\n**注意**\n`APPLY` 运算符为外部表的每一行调用一个表值函数。该表值函数可以接受来自该行的值作为参数。SQL\
  \ Server 将外部表的行与函数输出的每一行连接起来，类似于两个表的连接。`CROSS APPLY` 的工作方式类似于内连接。因此，如果函数不返回任何行，则外部表的行将从输出中排除。`OUTER\
  \ APPLY` 的工作方式类似于外连接。\n\n尽管有足够的统计信息来正确估计 `ClientId=1` 客户的订单数量，但估计的行数是错误的。图 11-8\
  \ 展示了这一点。当函数返回大量行时，这种行为可能导致执行计划效率极低。还值得一提的是，SQL Server 2014 和 2016 中的新基数估计器在此示例中会估计为\
  \ 100 行，这也是不正确的。\n\n## 图 11-8. 带多语句表值函数的查询执行计划（旧版基数估计器）\n\n你应该记住这个限制，并在基数估计错误可能导致低效计划时避免使用多语句表值函数。一个常见场景是当函数参与连接时。在许多情况下，通过将函数结果集存储到临时表中，并在连接中使用该临时表，你会获得更好的结果，我们将在第\
  \ 13 章讨论这一点。\n\n你可能已经注意到，所有函数都是使用 `schemabinding` 选项创建的。虽然这不是必需的，但指定此选项可以在几个方面提供帮助。它将函数与其引用的对象“绑定”在一起，并防止任何可能破坏代码的元数据更改。此外，当函数不访问数据时，`schemabinding`\
  \ 会强制 SQL Server 分析函数主体。SQL Server 将知道该函数不访问任何数据，这有助于生成更高效的计划。\n\n\n\n# 第 11 章 ■\
  \ 用户自定义函数\n\n执行计划。我们将在[第 25 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_25) “查询优化与执行”中详细探讨这种情况。\n\
  \n#### 内联表值函数\n\n`内联表值函数`的工作方式与多语句函数完全不同。\n\n有时，这些函数甚至被称为`参数化视图`。这个定义很有道理。与作为独立代码块执行的多语句函数相反，`SQL\
  \ Server`会将内联表值函数展开并嵌入到实际查询中，类似于常规视图，并且会将其语句作为查询的一部分进行优化。因此，不存在对函数的单独调用，你也不必处理其相关的开销。\n\
  \n让我们将多语句表值函数重写为内联表值函数，如清单 11-10 所示。然后我们将检查其执行计划，如图 11-9 所示。\n\n***清单 11-10.***\
  \ 内联表值函数：为提供的 clientid 返回订单的函数\n\n```sql\ncreate function dbo.udfClientOrdersInline(@ClientId\
  \ int)\nreturns table\nas\nreturn\n(\n    select OrderId, OrderDate, OrderNumber,\
  \ Amount\n    from dbo.Orders\n    where ClientId = @ClientId\n)\ngo\n\nselect c.ClientName,\
  \ o.OrderId, o.OrderDate, o.OrderNumber, o.Amount\nfrom dbo.Clients c cross apply\
  \ dbo.udfClientOrdersInline(c.ClientId) o\nwhere c.ClientId = 1;\n```\n\n***图 11-9.***\
  \ *带有内联表值函数的查询的执行计划*\n\n![](img/index-257_1.jpg)\n\n如你所见，执行计划中没有对该函数的引用，现在估计的行数也是正确的。实际上，如果你根本不使用内联表值函数，将会得到完全相同的执行计划。清单\
  \ 11-11 和图 11-10 阐明了这一点。\n\n***清单 11-11.*** 内联表值函数：不使用内联表值函数的 Select 语句\n\n```sql\n\
  select c.ClientName, o.OrderId, o.OrderDate, o.OrderNumber, o.Amount\nfrom dbo.Clients\
  \ c join dbo.Orders o on\n    c.ClientId = o.Clientid\nwhere c.ClientId = 1\n```\n\
  \n***图 11-10.*** *不使用内联表值函数的查询的执行计划*\n\n■ **注意** 在某些情况下，基于内联表值函数的代码复用可能是可接受的。`SQL\
  \ Server`会将这些函数与外部语句一起展开并优化，从而消除不必要的开销和连接。但是，请记住我们在前一章讨论的连接消除问题。\n\n虽然内联表值函数可以帮助我们封装和复用代码，避免不必要的副作用，但它们不能包含多个语句。幸运的是，在某些情况下，你可以重构代码，将多语句函数转换为内联表值函数。\n\
  \n一般规则是，标量函数可以替换为返回单行单列表的内联表值函数。例如，看一下 `dbo.udfDateOnly` 函数的实现。你可以将其转换为内联表值函数，如表\
  \ 11-1 所示。\n\n![](img/index-258_1.jpg)\n\n***表 11-1.*** *将多语句标量函数转换为内联表值函数*\n\n\
  `多语句标量函数` | `内联表值函数`\n--- | ---\n`create function dbo.udfDateOnly (@Value datetime)\
  \ returns datetime with schemabinding as begin return convert(datetime, convert(varchar(10),@Value,121))\
  \ end` | `create function dbo.udfDateOnlyInline (@Value datetime) returns table\
  \ as return ( select convert(datetime, convert(varchar(10),@Value,121)) as [OrderDate]\
  \ )`\n`select count(*) from dbo.Orders where dbo.udfDateOnly(OrderDate) = '2013-03-01'`\
  \ | `select count(*) from dbo.Orders o cross apply dbo.udfDateOnlyInline(o.OrderDate)\
  \ udf where udf.OrderDate = '2013-03-01'`\n\n如果你运行带有内联表值函数的 `SELECT` 语句，其执行计划如图\
  \ 11-11 所示\n\n\n\n# 第 11 章 ■ 用户定义函数\n\n仍然会使用索引扫描运算符而非索引查找。即使对于内联表值函数，由于调用了`convert`系统函数，你也无法使谓词具备\
  \ SARG 性。\n\n`图 11-11. 使用内联表值函数的查询的执行计划`\n\n如果你将图 11-11 所示的执行计划与使用多语句标量函数的计划（如图\
  \ 11-5 所示）进行比较，你会发现图 11-11 中没有筛选运算符。SQL Server 作为索引扫描运算符的一部分来检查谓词。在代码清单 11-6 的查询中，这种行为是相同的。\n\
  \n在我的计算机上，执行时间如下：\nSQL Server 执行时间：\nCPU 时间 = 78 ms，经过时间 = 84 ms。\n\n虽然由于执行了扫描操作，这远非最优，但这些数字比我们使用多语句函数调用时要好得多。\n\
  \n当然，当函数由多个语句组成时，情况要棘手得多。幸运的是，在某些情况下，你可以发挥创意，将这些函数重构为内联函数。一个`IF`语句通常可以被`CASE`运算符替代，而公共表表达式有时可以处理过程式代码。\n\
  \n例如，让我们看一个多语句函数，它接受地理位置作为输入参数，并返回一个包含附近兴趣点（POI）信息的表。此表包含按名称字母顺序排列的第一个 POI 的信息，以及一个可选的`XML`列，该列包含该位置所属的所有\
  \ POI ID 的列表。在数据库中，每个 POI 由一对最小和最大纬度、经度值指定。代码清单 11-12 展示了这个多语句表值函数的实现。\n\n`代码清单\
  \ 11-12. 将多语句函数转换为内联函数：多语句函数实现`\n\n```sql\ncreate function dbo.GetPOIInfo(@Lat decimal(9,6),\
  \ @Lon decimal(9,6), @ReturnList bit)\nreturns @Result table\n(\n    POIID int not\
  \ null,\n    POIName nvarchar(64) not null,\n    IDList xml null\n)\nas\nbegin\n\
  \    declare @POIID int, @POIName nvarchar(64), @IDList xml\n\n    select top 1\
  \ @POIID = POIID, @POIName = Name\n    from dbo.POI\n    where @Lat between MinLat\
  \ and MaxLat and @Lon between MinLon and MaxLon\n    order by Name;\n\n    if @@rowcount\
  \ > 0\n    begin\n        if @ReturnList = 1\n            select @IDList = (\n \
  \               select POIID as [@POIID]\n                from dbo.POI\n       \
  \         where @Lat between MinLat and MaxLat and @Lon between MinLon and MaxLon\n\
  \                for xml path('POI'), root('POIS')\n            );\n\n        insert\
  \ into @Result(POIID, POIName, IDList) values(@POIID, @POIName, @IDList);\n    end\n\
  \n    return;\nend\n```\n\n如你所见，实现中针对该表有两个独立的查询。如果你想将此函数转换为内联表值函数，可以将这两个查询作为两个公共表表达式运行，或者作为子查询然后交叉连接它们的结果。`IF\
  \ @ReturnList = 1`语句可以用`CASE`运算符替换，如代码清单 11-13 所示的实现。\n\n`代码清单 11-13. 将多语句函数转换为内联函数：内联函数实现`\n\
  \n```sql\ncreate function dbo.GetPOIInfoInline(@Lat decimal(9,6), @Lon decimal(9,6),\
  \ @ReturnList bit)\nreturns table\nas\nreturn\n(\n    with TopPOI(POIID, POIName)\n\
  \    as\n    (\n        select top 1 POIID, Name\n        from dbo.POI\n       \
  \ where @Lat between MinLat and MaxLat and @Lon between MinLon and MaxLon\n    \
  \    order by Name\n    )\n    ,IDList(IDList)\n    as\n    (\n        select case\n\
  \                 when @ReturnList = 1\n                 then ( select POIID as\
  \ [@POIID]\n                        from dbo.POI\n                        where\
  \ @Lat between MinLat and MaxLat and @Lon between MinLon and MaxLon\n          \
  \              for xml path('POI'), root('POIS'), type )\n                 else\
  \ null\n               end\n    )\n    select TopPOI.POIID, TopPOI.POIName, IDList.IDList\n\
  \    from TopPOI cross join IDList\n)\n```\n\n然而，这两种实现之间有一个非常重要的区别。当第一个查询没有返回结果时，多语句函数将不会运行第二个`SELECT`（该语句生成\
  \ XML）。\n\n\n\n没有任何行。它没有理由这么做：位置不属于任何 POI。或者，内联实现总会运行两个查询。如果位置不属于某个 POI，且针对 POI\
  \ 表的底层查询开销很大时，这种做法甚至会降低性能。更好的做法是将函数拆分成两个独立的函数，`GetPOINameInline` 和 `GetPOIIDListInline`，并按照清单\
  \ 11-14 所示的方式重构外部查询。\n\n### 清单 11-14. 将多语句函数转换为内联函数：外部查询的重构\n\n```\nfrom\ndbo.Locations\
  \ l\nouter apply dbo.GetPOINameInline(l.Latitude, l.Longitude) pn\nouter apply\n\
  (\nselect\ncase\nwhen @ReturnList = 1 and pn.POIID is not null\nthen ( select IDList\
  \ from dbo.GetPOIIDListInline(l.latitude,l.longitude) )\nelse null\nend\n) pids\n\
  ```\n\n第二个 `OUTER APPLY` 操作符中的 `CASE` 语句保证了只有在 `dbo.GetPOINameInline` 函数返回数据时（即\
  \ `pn.POIID is not null`，表明该位置至少存在一个 POI）才会执行第二个函数。\n\n# 第 11 章 ■ 用户定义函数\n\n■ **注意**\
  \ 您可以在[第 14 章](http://dx.doi.org/10.1007/978-1-4842-1964-5_14)“CLR”以及本书的配套资料中看到将复杂多语句函数转换为内联表值函数的其他示例。\n\
  \n#### 总结\n\n虽然封装和代码重用是能够简化并降低开发成本的优秀流程，但它们并不总是非常适合 T-SQL 代码。为了在一个方法中支持多个用例而对实现进行泛化，有时会导致次优的执行计划。这对于多语句函数（无论是标量函数还是表值函数）尤其如此。调用它们存在很大的开销，当函数被大量行调用时，这反过来会引发严重的性能问题。此外，SQL\
  \ Server 不会将它们展开到引用的查询中，并且总是估计表值函数将返回单行（使用传统基数估计器时）或 100 行（在 SQL Server 2014 和 2016\
  \ 中使用新的基数估计器时）。\n\n包含多语句函数的谓词始终是非 SARGable 的，无论表上定义了何种索引。这会导致查询的执行计划次优，并且由于函数调用而产生额外的\
  \ CPU 负载。在创建多语句函数时，您需要牢记所有这些因素。\n\n另一方面，内联表值函数会被展开到外部查询中，类似于常规视图。它们没有多语句函数那样的开销，并且作为查询的一部分被优化。只要可能，您就应该将多语句函数重构为内联表值函数。\n\
  \n# 第 12 章\n\n## XML 与 JSON\n\n我们生活在一个充满信息的世界里。企业不断从多种来源收集大量数据，对其进行处理，并与其他系统交换。XML\
  \ 及其流行的替代方案 JSON 已成为信息交换的事实标准。它们跨平台工作，并且在当今存在的每一个开发平台中都得到支持。\n\n此外，并非所有数据都容易融入结构化的关系数据模型。例如，我们可以考虑一个物联网系统，它从不同类型的传感器收集指标。有些传感器可能提供温度信息，而另一些则提供湿度数据。尽管有几种方法可以在数据库中存储此类数据，但\
  \ XML 和 JSON 绝对是值得考虑的选择。\n\n在本章中，我们将讨论 XML 和 JSON 数据类型、系统设计考量，以及在 SQL Server 中处理\
  \ XML 数据时，有助于提高系统性能的几种方法。\n\n## 是否使用 XML 或 JSON？这是个问题！\n\n当在数据库中处理 XML 和 JSON 数据时，您需要回答的关键问题之一是\n\
  \n\n\n# 第 12 章 ■ XML 与 JSON\n\n当需要在 `SQL Server` 中处理 `XML` 或 `JSON` 数据时，你有几种选择。如果数据适合结构化的关系模型，最佳做法是将其分解并存储为关系表格式。例如，你可以将\
  \ `XML` 或类似的 `JSON` 数据（如 `清单 12-1` 所示）分解并存储到两个表中：`Orders` 和 `OrderLineItems`。\n\n\
  ## `清单 12-1`. 适合关系模型的 `XML`\n\n```xml\n<Order OrderId=\"42\" OrderTotal=\"49.96\"\
  >\n    <CustomerId>123</CustomerId>\n    <OrderNum>10025</OrderNum>\n    <OrderDate>2016-07-15T10:05:20</OrderDate>\n\
  \    <OrderLineItems>\n        <OrderLineItem>\n            <ArticleId>250</ArticleId>\n\
  \            <Quantity>3</Quantity>\n            <Price>9.99</Price>\n        </OrderLineItem>\n\
  \        <OrderLineItem>\n            <ArticleId>404</ArticleId>\n            <Quantity>1</Quantity>\n\
  \            <Price>19.99</Price>\n        </OrderLineItem>\n    </OrderLineItems>\n\
  </Order>\n```\n\n在某些情况下，当数据是半结构化时，你可以将结构化部分分解到非 `XML`/非 `JSON` 列中，而将半结构化部分保留为 `XML`/`JSON`。`清单\
  \ 12-2` 展示了此情况的一个例子。在这种情况下，你可以考虑分解并将位置相关信息保存在非 `XML` 列中，而将 `DeviceData` 信息保留为 `XML`。\n\
  \n## `清单 12-2`. 半结构化 `XML`\n\n```xml\n<Locations>\n    <Location DeviceId=\"321432345\"\
  \ Timestamp=\"2016-07-10T09:01:03\">\n        <Latitude>47.609102</Latitude>\n \
  \       <Longitude>-122.321503</Longitude>\n        <DeviceData>\n            <Ignition>1</Ignition>\n\
  \            <Sensor1>0</Sensor1>\n            <Sensor2>1</Sensor2>\n        </DeviceData>\n\
  \    </Location>\n    <Location DeviceId=\"1563287\" Timestamp=\"2016-07-10T09:02:00\"\
  >\n        <Latitude>47.610611</Latitude>\n        <Longitude>-122.201202</Longitude>\n\
  \        <DeviceData>\n            <Speed>56</Speed>\n            <Temperature>29</Temperature>\n\
  \        </DeviceData>\n    </Location>\n</Locations>\n```\n\n### 存储选项\n\n你需要支持哪些用例。尽管\
  \ `XML` 和 `JSON` 这两种技术都为你提供了处理半结构化数据的灵活性，但它们是有代价的。`XQuery` 是 CPU 密集型的，其性能无法与针对关系数据的查询相媲美。你可以通过创建\
  \ `XML` 索引来克服其中一些限制，这些索引在内部将 `XML` 数据分解为关系格式，但这些索引需要大量的存储空间——通常是 `XML` 数据本身大小的数倍。\n\
  \n另一方面，`JSON` 对 CPU 的开销较小，但它在 `SQL Server` 中的支持相当有限。它在 2016 之前的 `SQL Server` 版本中不受支持，并且需要数据库兼容级别为\
  \ 130 才能启用所有功能。此外，`SQL Server` 不支持原生的 `JSON` 数据类型，你必须将其存储为字符串。`SQL Server` 也不允许你为\
  \ `JSON` 数据创建索引。你可以为一些 `JSON` 属性创建计算持久化列，然后为其建立索引；然而，不可能像 `XML` 索引那样自动将 `JSON` 数据分解为关系格式。\n\
  \n### 存储 `XML` 数据\n\n在唯一要求是保存 `XML` 数据而无需进一步处理的情况下，最佳方法是将其作为常规 `BLOB` 存储在 `varbinary(max)`\
  \ 列中。这允许重建原始文档，而不会引入由 `varchar` / `nvarchar` 数据类型导致的编码相关问题。`XML` 数据类型不是一个好选择，因为它不保留原始文档。即使可以接受，解析\
  \ `XML` 数据相关的开销也是你希望避免的。\n\n如果你决定以二进制格式存储 `XML` 数据，请考虑将其放入一个单独的表中，该表与主表具有一对一关系。这有助于减小主表中的行大小，并在许多场景下提高系统性能。你还可以在客户端代码中压缩它，或使用\
  \ `SQL Server 2016` 中的 `COMPRESS` 和 `DECOMPRESS` 函数，或者在早期版本的 `SQL Server` 中构建基于\
  \ `CLR` 的压缩。压缩也有助于减小数据库中大型 `JSON` 片段的大小。\n\n© Dmitri Korotkevitch 2016\n\nD. Korotkevitch,\
  \ `Pro SQL Server Internals`, DOI 10.1007/978-1-4842-1964-5_12\n\n\n\n使用稀疏列是另一种选择。你可以创建一个包含大量稀疏列的宽表，这些列代表\
  \ XML/JSON 数据中所有可能的属性，而不会引入与存储`NULL`值相关的存储开销。\n\n你可以在插入或更新数据时，在代码中分解（shred）XML/JSON。或者，你可以创建一组标量用户定义函数，这些函数从\
  \ XML/JSON 中提取数据并将其存储在持久化的计算列中。两种方法各有优缺点。第一种方法需要在每次 XML/JSON 数据更新时分解 XML 数据并更新列，这可能发生在代码中不同的地方。另一方面，第二种方法可能会导致一些性能问题。\n\
  \n将数据分解到计算列中的用户定义函数，会阻止任何引用该表的查询使用并行执行计划，即使这些查询并未使用计算列。此外，在某些情况下，当你引用计算列时，SQL Server\
  \ 会重新计算它们的值，而不是使用持久化字段。\n\n尽管 XML 和 JSON 数据为我们数据模型增加了灵活性，但它们会影响系统的性能。在设计解决方案时，你必须始终牢记这一点。\n\
  \n## XML 数据类型\n\n`XML` 数据类型以内部格式存储数据，使用 UTF-16 编码并涉及一些压缩，它不保留原始 XML 文档。代码清单 12-3\
  \ 展示了这样一个例子。\n\n***代码清单 12-3.*** `XML` 数据类型不保留原始 XML 文档\n\n```sql\nselect cast(\n\
  N'<script>\n  <![CDATA[\n    function max(a,b)\n    {\n        if (a <= b) then\
  \ { return b; } else { return a; }\n    }]]>\n</script>' as xml)\n```\n\n结果：\n\n\
  ```xml\n<script>\n  function max(a,b)\n  {\n      if (a &lt;= b) then { return b;\
  \ } else { return a; }\n  }\n</script>\n```\n\n如你所见，输出中没有`CDATA`部分，**<** 字符已被字符实体\
  \ `&lt;` 替换。\n\n`XML` 数据类型使用的总存储空间是变化的。即使采用压缩，当原始文本使用 UTF-8 编码时，它也可能超过原始文本大小。然而，对于\
  \ UTF-16 数据，与文本表示形式相比，XML 可能会节省一些空间。\n\nSQL Server 中有两种类型的 XML 数据：*非类型化* 和 *类型化*。非类型化\
  \ XML 只要格式有效就可以存储数据，而类型化 XML 则受 XML 架构约束。你可以使用`CREATE XML SCHEMA COLLECTION`语句创建\
  \ XML 架构，并将其分配给`XML`数据类型的列、参数或变量。\n\n类型化 XML 允许 SQL Server 利用来自 XML 节点的数据类型信息。虽然它提高了`XQuery`性能，但在插入或修改数据时，也引入了架构验证的开销。通常，当数据符合特定的\
  \ XML 架构并且你能承担这种开销时，你会希望使用类型化 XML。\n\nXML 架构以内部格式存储在系统表中。与常规 XML 数据一样，SQL Server\
  \ 不会持久化原始的架构定义。你需要单独存储它，或许作为一个`BLOB`，以防将来需要重建它。\n\n正如我已经提到的，你可以在 XML 数据上创建索引。有两种\
  \ XML 索引：*主* 索引 和 *辅助* 索引。主 XML 索引将 XML 数据分解为关系格式，每个 XML 节点对应一到两行。辅助 XML 索引是在存储主\
  \ XML 索引数据的关系表上定义的非聚集索引。它们可以提高针对 XML 数据的某些操作的性能。\n\n现在，让我们创建如代码清单 12-4 所示的表。我们将使用来自代码清单\
  \ 12-1 的 XML 插入一行数据。\n\n***代码清单 12-4.*** 在非类型化 XML 上创建主 XML 索引\n\n```sql\ncreate\
  \ table dbo.XmlDemo\n(\n    ID int not null identity(1,1),\n    XMLData xml not\
  \ null,\n    constraint PK_XmlDemo primary key clustered(ID)\n);\n\ninsert into\
  \ dbo.XMLDemo(XMLData)\nvalues(/*XML From Listing 12-1*/);\n```\n\n\n# 第 12 章 ■\
  \ XML 与 JSON\n\n```sql\ncreate primary xml index XML_Primary_XmlDemo on dbo.XmlDemo(XMLData);\n\
  ```\n\n接下来，我们来看主 XML 索引的内部结构。你可以通过查询 `sys.internal_tables` 视图来找到存储该索引的内部表名称。你会看到与图\
  \ 12-1 所示类似的结果。\n\n## 图 12-1. `sys.internal_tables` 内容\n\n![](img/index-266_1.jpg)\n\
  \n现在，如果你从主 XML 索引表中查询数据，将会看到如图 12-2 所示的结果。你需要通过专用的管理员连接才能执行此操作。\n\n## 图 12-2. 主\
  \ XML 索引数据（非类型化 XML）\n\n如你所见，原始表中的一行数据在主 XML 索引中生成了二十五行，每行有十二列。主 XML 索引的聚集索引由原始表中的主键（输出中的\
  \ `pk1` 列）和内部节点 ID（输出中的 `id` 列）组成。`HID` 列代表层次结构 ID，包含指向节点的二进制格式反向路径。\n\n还值得一提的是，主\
  \ XML 索引要求表必须定义聚集主键。唯一的聚集索引或非聚集主键都不起作用。\n\n现在，让我们创建一个架构集合，并使用类型化 XML 构建表。实现此目的的代码如代码清单\
  \ 12-5 所示。\n\n## 代码清单 12-5. 类型化 XML 上的主 XML 索引\n\n```sql\ncreate xml schema collection\
  \ XmlDemoCollection as\nN'<xs:schema attributeFormDefault=\"unqualified\" elementFormDefault=\"\
  qualified\">\n  <xs:element name=\"Order\">\n    <xs:complexType>\n      <xs:sequence>\n\
  \        <xs:element type=\"xs:int\" name=\"CustomerId\"/>\n        <xs:element\
  \ type=\"xs:string\" name=\"OrderNum\"/>\n        <xs:element type=\"xs:dateTime\"\
  \ name=\"OrderDate\"/>\n        <xs:element name=\"OrderLineItems\">\n         \
  \ <xs:complexType>\n            <xs:sequence>\n              <xs:element name=\"\
  OrderLineItem\" maxOccurs=\"unbounded\" minOccurs=\"0\">\n                <xs:complexType>\n\
  \                  <xs:sequence>\n                    <xs:element type=\"xs:short\"\
  \ name=\"ArticleId\"/>\n                    <xs:element type=\"xs:int\" name=\"\
  Quantity\"/>\n                    <xs:element type=\"xs:float\" name=\"Price\"/>\n\
  \                  </xs:sequence>\n                </xs:complexType>\n         \
  \     </xs:element>\n            </xs:sequence>\n          </xs:complexType>\n \
  \       </xs:element>\n      </xs:sequence>\n      <xs:attribute type=\"xs:int\"\
  \ name=\"OrderId\"/>\n      <xs:attribute type=\"xs:float\" name=\"OrderTotal\"\
  />\n    </xs:complexType>\n  </xs:element>\n</xs:schema>';\n\ncreate table dbo.XmlTypedDemo\n\
  (\n  ID int not null identity(1,1),\n  XMLData xml (document xmldemocollection)\
  \ not null,\n  constraint PK_XmlTypedDemo primary key clustered(ID)\n);\n\ninsert\
  \ into dbo.XMLTypedDemo(XMLData)\nvalues(/*XML From Listing 12-1*/);\n\ncreate primary\
  \ xml index XML_Primary_XmlTypedDemo\non dbo.XmlDemo(XMLData);\n```\n\n现在，我们来看类型化\
  \ XML 的主 XML 索引，如图 12-3 所示。\n\n## 图 12-3. 主 XML 索引数据（类型化 XML）\n\n如你所见，主 XML 索引现在只有十六行——原始数据中的每个\
  \ XML 节点对应一行。它还为每个节点指定了类型信息（`tid` 列）。\n\n让我们比较一下类型化和非类型化 XML 中，以元素为中心和以属性为中心的 XML\
  \ 所需的存储空间。让我们创建两个 XML 架构集合和四个带有主 XML 索引的表。然后，我们将用 65,536 行数据填充这些表。代码清单 12-6 展示了所有这些步骤。\n\
  \n## 代码清单 12-6. 比较类型化与非类型化 XML 所需的存储空间\n\n```sql\ncreate xml schema collection ElementCentricSchema\
  \ as\n'<xs:schema attributeFormDefault=\"unqualified\" elementFormDefault=\"qualified\"\
  >\n  <xs:element name=\"Order\">\n    <xs:complexType>\n      <xs:sequence>\n  \
  \      <xs:element type=\"xs:int\" name=\"OrderId\"/>\n        <xs:element type=\"\
  xs:float\" name=\"OrderTotal\"/>\n        <xs:element type=\"xs:int\" name=\"CustomerId\"\
  />\n        <xs:element type=\"xs:string\" name=\"OrderNum\"/>\n        <xs:element\
  \ type=\"xs:dateTime\" name=\"OrderDate\"/>\n        <xs:element name=\"OrderLineItems\"\
  >\n          <xs:complexType>\n            <xs:sequence>\n```\n\n\n\n# 第 12 章 ■\
  \ XML 与 JSON\n\n创建以元素为中心的 XML 模式集合：\n\n```sql\ncreate xml schema collection ElementCentricSchema\
  \ as\n'<xs:schema attributeFormDefault=\"unqualified\" elementFormDefault=\"qualified\"\
  >\n    <xs:element name=\"Order\">\n        <xs:complexType>\n            <xs:sequence>\n\
  \                <xs:element name=\"OrderLineItem\" maxOccurs=\"unbounded\" minOccurs=\"\
  0\">\n                    <xs:complexType>\n                        <xs:sequence>\n\
  \                            <xs:element type=\"xs:int\" name=\"ArticleId\"/>\n\
