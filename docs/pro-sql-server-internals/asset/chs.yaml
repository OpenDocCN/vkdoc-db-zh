  不幸的是，当其中一台服务器变得不可用，且 SQL Server 实例故障转移到另一个节点时（如图 32-3 所示），情况会变得复杂得多。两个 SQL Server
  群集实例运行在同一台服务器上，争用 CPU 和内存，并相互影响性能。

