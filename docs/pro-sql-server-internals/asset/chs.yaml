- '# 第 30 章 ■ 事务日志内部原理


  ## 概述


  SQL Server 使用事务日志来存储对数据库所做所有数据修改的信息。它使 SQL Server 能够保持数据库的事务一致性，即使在发生意外关闭或崩溃的情况下也是如此。


  SQL Server 采用**预写日志记录**机制，这保证了日志记录总是先被保存到日志文件中，然后才会将更新后的数据页保存到数据文件。SQL Server 使用一个小型缓冲区在内存中缓存日志记录，并在需要时一次性保存所有记录。


  事务日志是一个**循环文件**，其内部由多个**虚拟日志文件**组成。每个虚拟日志文件可以是**活动**或**非活动**状态。事务日志截断会将一些 VLF 标记为非活动状态，使其可以被重用。在
  `SIMPLE` 恢复模式下，SQL Server 在 `CHECKPOINT` 时截断事务日志。在 `FULL` 和 `BULK LOGGED` 恢复模式下，SQL
  Server 在日志备份期间截断事务日志。


  有多种问题可能阻止事务日志截断。最常见的原因是在 `FULL` 和 `BULK LOGGED` 恢复模式下缺少日志备份，或是长时间运行的未提交事务。你可以通过分析
  `sys.databases` 视图中的 `log_reuse_wait_desc` 列来检查是什么阻止了日志截断。


  你应当避免事务日志拥有过多或过少的 VLF。这两种情况都会对系统性能产生负面影响。对于需要大型事务日志文件的数据库，你可以按 4,000 MB 的块来预分配事务日志，这样会产生大约
  16 个每个约 250 MB 的 VLF。


  建议你手动管理事务日志大小，以避免日志自动增长。但是，你仍应保持自动增长功能启用，以避免 `"9002: 事务日志已满"` 错误。自动增长大小应以 MB 为单位指定，而不是百分比。你需要根据系统的
  I/O 性能来微调大小。


  当将多个活动数据库存储在单个磁盘阵列上时，日志 I/O 访问会变为随机而非顺序。在测试你的 I/O 子系统时，你应考虑到这种行为，并选择能代表你预期生产环境负载的测试场景。


  最重要的是，你应当将事务日志存储在**高度冗余**的磁盘阵列上。如果事务日志损坏，则不可能将数据库恢复到事务一致的状态。


  快速的事务日志吞吐量对于良好性能至关重要，尤其是在 OLTP 系统中。你必须将事务日志存储在快速的磁盘阵列上，以最小化写入延迟。最重要的是，该阵列必须是冗余的。如果事务日志损坏，则不可能将数据库恢复到事务一致的状态。


  '
- '# 第 31 章 ■ 备份与恢复


  在技术领域，灾难的发生只是时间问题。数据库可能因用户错误、硬件故障或软件缺陷而损坏。磁盘阵列可能失效，导致用户无法访问数据库。工程师可能意外更改 SAN 阵列中的
  LUN 配置，从而影响其存储的数据库。自然灾害可能影响数据中心的可用性。在任何这些情况下，都必须能够恢复数据库，并以最小的数据丢失和停机时间将系统恢复在线。


  本章讨论 SQL Server 如何执行数据库备份和恢复，并涵盖数据库恢复过程中可以使用的几个重要用例。它还提供了关于如何设计备份策略以最小化系统停机时间和数据丢失的若干思路。


  #### 数据库备份类型


  SQL Server 提供三种不同类型的数据库备份。


  `完整`数据库备份会备份整个数据库。SQL Server 将 `CHECKPOINT` 作为数据库备份的第一步，备份数据文件中所有已分配的区，最后，备份代表备份期间所做工作的那部分事务日志。



  事务日志是恢复数据库后在还原操作中必需的。该部分包含所有日志记录，起始于以下事件中最早的一个：


  -   最后一个 `CHECKPOINT`（检查点）。

  -   最老的活动事务的开始。

  -   日志未扫描部分的开始（如果有任何依赖于事务日志扫描的进程，例如事务复制、数据库镜像、`AlwaysOn 可用性组`等）。


  完整数据库备份代表备份操作完成时的数据库状态。它在每种恢复模型中都受支持。


  `差异`备份自上次完整备份以来备份那些已修改的区。SQL Server 使用一组称为 `差异更改映射 (DCM)` 的分配映射页来跟踪哪些区已被更改。SQL Server
  仅在完整数据库备份期间清除这些映射页。因此，差异备份是累积的，每个差异备份存储自上次完整备份（而非上次差异备份）以来所有已修改的区。与完整数据库备份一样，差异备份在每种恢复模型中均有效。


  `日志`备份备份事务日志的活动部分，起始于上次完整备份或日志备份的 `LSN`（日志序列号）。此备份类型仅在 `FULL`（完整）或 `BULK LOGGED`（大容量日志）恢复模型中受支持。它是事务日志管理的重要组成部分，并且是触发日志截断所必需的。值得重申的是，在
  `FULL` 或 `BULK LOGGED` 恢复模型中，完整数据库备份不会截断事务日志。您应执行日志备份来截断事务日志。


  如果日志备份与完整数据库备份同时运行，日志截断将被推迟，直到完整备份完成。


