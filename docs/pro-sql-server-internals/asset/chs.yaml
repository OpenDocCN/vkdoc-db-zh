  系统数据库也使用共享存储。幸运的是，从 SQL Server 2012 开始，您可以将`tempdb`放在本地驱动器上，这可以显著提高群集的性能，特别是如果将其放置在基于固态硬盘的存储上。

  虽然设置承载单个 SQL Server 群集实例的 Windows 群集相对容易，但它们会使您需要的服务器数量翻倍。尽管通常不需要为仅用于高可用性的被动节点购买额外的
