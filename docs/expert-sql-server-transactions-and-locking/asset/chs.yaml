  分析系统中顶级等待的过程被称为等待统计分析。这是 SQL Server 中最常用的故障排除和性能调优技术之一，它使您能够快速识别系统中的潜在问题。图 12-4
  说明了一个典型的等待统计分析故障排除周期。


  ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig4_HTML.jpg](img/463519_1_En_12_Fig4_HTML.jpg)


  图 12-4 等待统计分析故障排除周期


  作为第一步，查看等待统计信息，以检测系统中的顶级等待。这缩小了进一步分析的关注领域。之后，使用其他工具（如 `DMV`、`Windows Performance
  Monitor`、`SQL Traces` 和 `Extended Events`）确认问题，并检测问题的根本原因。当根本原因被确认后，修复它，然后再次分析等待统计信息，选择一个新的分析和改进目标。


  让我们详细地看看与锁相关的等待类型。


  #### 注意


  我的 *Pro SQL Server Internals* 一书提供了关于等待统计分析的更深入内容，并解释了如何在系统中排除各种非锁相关的故障。


  您还可以从[此链接](http://download.microsoft.com/download/4/7/a/47a548b9-249e-484c-abd7-29f31282b04d/performance_tuning_waits_queues.doc)下载关于等待统计分析的白皮书。虽然它侧重于
  SQL Server 2005，但其内容对任何版本的 SQL Server 都有效。


  ## 锁等待


  系统中的每种锁类型都有一个对应的等待类型，其名称以`LCK_M_`开头，后跟锁类型。例如，`LCK_M_U`和`LCK_M_IS`分别表示等待更新（U）锁和意向排他（IX）锁。


  当锁请求在队列中等待时，就会发生锁等待，这发生在阻塞期间。如果请求可以立即被授予且没有发生阻塞，SQL Server 则不会生成锁等待。


  您需要同时关注总等待时间和等待发生的次数。完全有可能出现一种等待类型，其总等待时间很长，但仅由少数几次长时间等待产生。您可以根据您的目标来决定是否对其进行故障排除或忽略。


  您还应该记住，等待统计信息是从上次 SQL Server 重启开始累积的。运行时间较长的服务器的等待统计信息可能无法代表当前负载。在许多情况下，在开始故障排除之前，使用`DBCC
  SQLPERF(''sys.dm_os_wait_stats'', CLEAR)`命令清除等待统计信息，收集近期的等待信息可能是有益的。您显然需要在系统中有代表性的工作负载时执行此操作。


  让我们看看锁等待类型，讨论可能导致此类等待的原因以及我们如何对其进行故障排除。



  ### LCK_M_U 等待类型


  `LCK_M_U` 等待类型可以说是 OLTP 系统中最常见的与锁相关的等待类型之一，因为它表示正在等待更新（U）锁。


  如你所知，SQL Server 在更新扫描期间使用更新（U）锁来查找需要更新或删除的行。SQL Server 在读取行时获取更新（U）锁，之后释放或将其转换为排他（X）锁。在大多数情况下，大量的
  `LCK_M_U` 等待表明系统中存在优化不佳的写入查询（`UPDATE`、`DELETE`、`MERGE`）。


  你可以将此数据与 `PAGEIOLATCH*` 等待类型关联分析。这些等待发生在 SQL Server 等待从磁盘读取数据页时。大量的此类等待指向高磁盘 I/O，这通常是系统中查询未优化的另一个迹象。除了未优化的查询外，还有其他情况可能导致此类等待，因此不应在未进行额外分析的情况下就得出结论。


  `PAGEIOLATCH*` 等待类型表示系统中的物理 I/O。如今，配备足够内存以在缓冲池中缓存活动数据的服务器很常见。在此类环境中，未优化的查询不会产生物理读取和
  `PAGEIOLATCH*` 等待。然而，它们可能遭遇阻塞，并在更新扫描期间产生 `LCK_M_U` 等待。


  优化不佳的查询需要处理大量数据，这增加了执行计划的成本。在许多情况下，SQL Server 会为它们生成并行执行计划。高的 `CXPACKET` 等待表明大量的并行度，这可能是
  OLTP 系统中查询未优化的另一个迹象。


  然而，你应该记住，并行是完全正常且预期的。`CXPACKET` 等待并不一定表示存在问题，在分析时应考虑系统的工作负载。同样值得注意的是，*并行度成本阈值* 的默认值极低，在如今大多数情况下都需要提高。


  有几种方法可以使用标准 SQL Server 工具检测资源密集型（I/O）的未优化查询。最常见的方法之一是使用 SQL Traces 或 Extended Events
  捕获系统活动，按读取和/或写入次数过滤数据。然而，这种方法需要你在收集数据后进行额外分析。在确定优化目标时，应检查查询执行的频率。


  ### 重要提示


  在繁忙系统中，捕获查询执行统计信息的 Extended Events 会话和 SQL Traces 可能导致显著开销。请谨慎使用，并且除非正在进行性能故障排除，否则不要保持它们运行。


  另一种非常简单而强大的检测资源密集型查询的方法是 `sys.dm_exec_query_stats` 数据管理视图。SQL Server 跟踪缓存的执行计划的各种统计信息，包括执行次数和
  I/O 操作、经过时间以及 CPU 时间，并通过该视图公开它们。此外，你可以将其与其他数据管理对象联接，获取这些查询的 SQL 文本和执行计划。这简化了分析，并且对系统中各种性能和计划缓存问题的故障排除很有帮助。


  清单 12-2 展示了一个查询，它返回截至执行时计划已缓存的 50 个 I/O 最密集的查询。值得注意的是，`sys.dm_exec_query_stats`
  视图在不同版本的 SQL Server 中的结果集列略有不同。清单 12-2 中的查询适用于 SQL Server 2008R2 及以上版本。你可以从 `SELECT`
  列表中移除最后四列，以使其兼容 SQL Server 2005-2008。


  ```

  select top 50

  substring(qt.text, (qs.statement_start_offset/2)+1,

  ((

  case qs.statement_end_offset

  when -1 then datalength(qt.text)

  else qs.statement_end_offset

  end - qs.statement_start_offset)/2)+1) as SQL

  ,qp.query_plan as [Query Plan]

  ,qs.execution_count as [Exec Cnt]

  ,(qs.total_logical_reads + qs.total_logical_writes) /

  qs.execution_count as [Avg IO]

  ,qs.total_logical_reads as [Total Reads], qs.last_logical_reads

  as [Last Reads]

  ,qs.total_logical_writes as [Total Writes], qs.last_logical_writes

  as [Last Writes]

  ,qs.total_worker_time as [Total Worker Time], qs.last_worker_time

  as [Last Worker Time]

  ,qs.total_elapsed_time / 1000 as [Total Elapsed Time]

  ,qs.last_elapsed_time / 1000 as [Last Elapsed Time]

  ,qs.creation_time as [Cached Time], qs.last_execution_time

  as [Last Exec Time]

  ,qs.total_rows as [Total Rows], qs.last_rows as [Last Rows]

  ,qs.min_rows as [Min Rows], qs.max_rows as [Max Rows]

  from

  sys.dm_exec_query_stats qs with (nolock)

  cross apply sys.dm_exec_sql_text(qs.sql_handle) qt

  cross apply sys.dm_exec_query_plan(qs.plan_handle) qp

  order by

  [Avg IO] desc

  清单 12-2

  使用 sys.dm_exec_query_stats

  ```


  如图 12-5 所示，它允许你根据资源使用情况和执行次数轻松定义优化目标。例如，结果集中的第二个查询是优化的最佳候选，因为它运行得非常频繁。显然，如果我们的目标是减少系统中的更新锁等待量，我们需要专注于数据修改查询。


  ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig5_HTML.jpg](img/463519_1_En_12_Fig5_HTML.jpg)


  图 12-5

  Sys.dm_exec_query_stats 结果


  不幸的是，`sys.dm_exec_query_stats` 视图不返回任何对于没有缓存执行计划的查询的信息。通常这不是问题，因为我们的优化目标不仅是资源密集型，而且是频繁执行的查询。这些查询的计划通常由于频繁重用而保留在缓存中。但是，在发生语句级重新编译的情况下，SQL
  Server 不会缓存计划；因此，`sys.dm_exec_query_stats` 会遗漏它们。你应该使用 Extended Events 和/或 SQL Traces
  来捕获它们。我通常从 `sys.dm_exec_query_stats` 输出的查询开始，然后使用 Extended Events 交叉检查优化目标。


  在 SQL Server 重新启动、内存压力、由于统计信息更新引起的重新编译以及其他一些情况下，查询计划可能会从缓存中移除，因此不会包含在 `sys.dm_exec_query_stats`
  的结果中。除了执行次数之外，分析 `creation_time` 和 `last_execution_time` 列也是有益的。


  在 SQL Server 2016 及以上版本中，你可以使用 *查询存储* 来收集系统中所有查询的执行统计信息。它提供了丰富的报告和数据管理视图，你可以使用它们快速识别系统中的低效查询。来自查询存储的数据持久存储在数据库中，并且会在
  SQL Server 重启后保留。查询存储是一个极其强大的工具，对故障排除有巨大帮助。


  你也可以使用我们在第 4 章讨论过的阻塞监控框架。你可以分析更新（U）锁等待的数据，选择优化的目标。我们将在本章后面更详细地讨论这个框架。


  正如我们已经讨论过的，阻塞条件和锁等待也可能由于系统中不正确的事务管理而发生。长事务可能长时间持有锁，阻止其他会话在受影响的行上获取不兼容的锁。请记住这种行为，并将其纳入分析和故障排除中。



  ### LCK_M_S 等待类型


  `LCK_M_S` 等待类型表示对共享 (S) 锁的等待。此锁类型由 `SELECT` 查询在 `READ COMMITTED`、`REPEATABLE READ`
  和 `SERIALIZABLE` 隔离级别中获取。


  在许多情况下，`LCK_M_S` 等待的根本原因与 `LCK_M_U` 等待类似。优化不佳的 `SELECT` 查询可能扫描大量数据，并可能被其他会话持有的排他
  (X) 锁阻塞。你可以使用与刚才讨论的相同的故障排除技术来识别此类查询。


  对于在 `READ COMMITTED` 隔离级别下运行的查询，你可以考虑启用 `READ_COMMITTED_SNAPSHOT` 数据库选项来消除读写阻塞。在此模式下，SQL
  Server 在 `READ COMMITTED` 隔离级别下不再获取共享 (S) 锁，而是依赖行版本控制。请记住，这种方法并不能解决问题的根本原因，只是掩盖了由优化不佳的查询引入的问题。同时也要记住它带来的额外开销。


  #### 注意


  除非不需要数据一致性，否则不要使用 `(NOLOCK)` 提示或 `READ UNCOMMITTED` 隔离级别。


  在某些情况下，`LCK_M_S` 等待可能由 SQL Server 在某些操作期间获取的表级锁等待引起，或者由于代码中的 `(TABLOCK)` 提示导致。一个例子是在线索引重建过程，它在执行开始时获取一个短期的共享
  (S) 表级锁。在繁忙的 OLTP 系统中，数据的易变性可能导致阻塞，尤其是在涉及锁分区的情况下。


  此类情况在等待统计信息中可能表现为发生次数相对较少但平均等待时间较长的等待类型。然而，你不应仅依赖等待统计信息得出结论。分析单个阻塞案例是有益的，在这种情况下，阻塞监控框架可能非常有用。


  ### LCK_M_X 等待类型


  `LCK_M_X` 等待类型表示对排他 (X) 锁的等待。听起来很奇怪，但在数据易变的 OLTP 系统中，`LCK_M_X` 等待可能比 `LCK_M_U` 等待发生得更少。


  正如你已经知道的，SQL Server 通常在更新扫描期间使用更新 (U) 锁。然而，这种行为并不能保证。在某些情况下，SQL Server 可能决定省略更新
  (U) 锁，而直接使用排他 (X) 锁。一个例子是点查找搜索，当查询使用索引列上的谓词更新单行时。在这种情况下，SQL Server 可能会立即获取排他 (X)
  锁，而不使用更新 (U) 锁。在此条件下的阻塞将导致 `LCK_M_X` 等待。


  在从更新 (U) 锁转换为排他 (X) 锁时，你也可能遇到 `LCK_M_X` 等待。更新 (U) 和共享 (S) 锁彼此兼容，因此查询可能在持有共享 (S)
  锁的行上获取更新 (U) 锁。但是，如果该行需要更新，SQL Server 将无法将其转换为排他 (X) 锁。


  这种情况发生在 `SELECT` 查询使用 `REPEATABLE READ` 或 `SERIALIZABLE` 隔离级别时，共享 (S) 锁会一直保持到事务结束。它也可能发生在
  `READ COMMITTED` 级别，当 `SELECT` 查询有时会在整个语句期间持有共享 (S) 锁时；例如，当它读取 LOB 列时。


  当多个会话处理相同的数据时，可能会发生 `LCK_M_X` 等待。常见场景之一是 *计数器表* 实现，多个会话尝试同时递增同一个计数器，或者使用 `(TABLOCKX)`
  提示。你可以通过切换到 `SEQUENCE` 对象或标识列来解决此冲突。


  与往常一样，当你在系统中看到大量 `LCK_M_X` 等待时，应分析单个阻塞案例并理解阻塞的根本原因。


  ### LCK_M_SCH_S 和 LCK_M_SCH_M 等待类型


  `LCK_M_SCH_S` 和 `LCK_M_SCH_M` 等待类型表示对架构稳定性 (Sch-S) 和架构修改 (Sch-M) 锁的等待。这些等待不应在系统中大规模发生。


  SQL Server 在架构更改期间获取架构修改 (Sch-M) 锁。此锁要求对表进行独占访问，在所有其他会话断开与表的连接之前，请求将被阻塞，从而产生等待。


  有几种常见情况可能导致此类阻塞：


  *   在有其他用户连接到系统的情况下在线进行数据库架构更改。请记住，在这种情况下，架构修改 (Sch-M) 锁会一直保持到事务结束。

  *   离线索引重建。

  *   分区切换或在线索引重建的最后阶段。需要架构修改 (Sch-M) 锁来修改数据库中的元数据。如果支持，可以通过使用低优先级锁来减少阻塞。


  架构稳定性 (Sch-S) 锁用于避免在表使用时进行表更改。SQL Server 在查询编译期间以及在未使用意向锁的隔离级别（如 `READ UNCOMMITTED`、`READ
  COMMITTED SNAPSHOT` 和 `SNAPSHOT`）中执行 `SELECT` 查询期间获取它们。


  架构稳定性 (Sch-S) 锁与除架构修改 (Sch-M) 锁之外的任何其他锁类型都兼容。`LCK_M_SCH_S` 等待的存在总是表明存在由架构修改引起的阻塞。


  如果你在系统中遇到大量的架构锁等待，你应该识别是什么导致了这种阻塞。在大多数情况下，你可以通过更改系统中的部署或数据库维护策略，或者切换到低优先级锁来解决它们。


  ### Intent LCK_M_I* 等待类型


  意向锁等待类型表示系统中对意向锁的等待。每种意向锁类型都有对应的等待类型。例如，`LCK_M_IS` 表示意向共享 (IS) 锁等待，`LCK_M_IX` 表示意向排他
  (IX) 锁等待。


  SQL Server 在对象（表）和页级别获取意向锁。在表级别，阻塞可能在两种条件下发生。首先，由于对象上持有不兼容的架构修改 (Sch-M) 锁，会话无法获取意向锁。通常，在这种情况下你还会看到一些架构锁等待，你需要排查它们在系统中发生的原因。


  另一种情况是表上存在不兼容的完全锁。例如，当表上持有完全排他 (X) 锁时，任何意向锁都无法获取。


  在某些情况下，这可能是由于代码中的表级锁提示（如 `(TABLOCK)` 或 `(TABLOCKX)`）导致的。然而，这种状况也可能由大规模批处理修改期间成功的锁升级触发。你可以通过监控
  `lock_escalation` 扩展事件来确认这一点，并通过在某些关键表上禁用锁升级来解决。我还将在本章后面演示如何使用阻塞监控框架识别涉及对象级阻塞的表。


  当会话请求对持有不兼容完全锁的页获取意向锁时，也可能发生意向锁阻塞。考虑一种情况，SQL Server 需要运行一个扫描整个表的 `SELECT` 语句。在此场景中，SQL
  Server 可能选择使用页级而不是行级锁，在页上获取完全共享 (S) 锁。如果另一个会话尝试通过获取页上的意向排他 (IX) 锁来修改行，这将引入阻塞。


  与往常一样，当你遇到此类问题时，你需要识别并解决阻塞的根本原因。



  ### 锁等待：总结


  表 12-1 总结了常见锁相关等待类型的根本原因及故障排除步骤。


  **表 12-1** 最常见的锁相关等待类型


  | 等待类型 | 可能的根本原因 | 故障排除步骤 |

  | --- | --- | --- |

  | `LCK_M_U` | 由于查询优化不佳导致的更新扫描 | 使用查询存储、`sys.dm_exec_query_stats`、xEvent 会话、阻塞监控框架检测并优化优化不佳的查询
  |

  | `LCK_M_X` | 多个会话处理相同数据 | 更改代码 |

  | | 由于查询优化不佳导致的更新扫描 | 使用查询存储、`sys.dm_exec_query_stats`、xEvent 会话、阻塞监控框架检测并优化优化不佳的查询
  |

  | `LCK_M_S` | 由于查询优化不佳导致的扫描 | 使用查询存储、`sys.dm_exec_query_stats`、xEvent 会话、阻塞监控框架检测并优化优化不佳的查询<br>考虑切换到乐观隔离级别
  |

  | `LCK_M_U`, `LCK_M_S`, `LCK_M_X` | 事务管理不正确，长时间运行的事务持有不兼容的锁 | 重新设计事务策略。优化查询 |

  | `LCK_M_SCH_S`, `LCK_M_SCH_M` | 由于数据库架构更改或索引或分区维护导致的阻塞 | 评估部署和维护策略。如果可能，切换到低优先级锁
  |

  | `LCK_M_I*` | 由于数据库架构更改或索引或分区维护导致的阻塞 | 评估部署和维护策略 |

  | | 锁升级 | 分析并在受影响的表上禁用锁升级 |


  正如我已经提到的，系统中的每种锁类型都有对应的等待类型。你可能会遇到本章未涉及的其他锁相关等待类型。尽管如此，了解 SQL Server 并发模型将有助于你进行故障排除。分析可能产生此类锁类型的阻塞状况，并确定阻塞的根本原因。


  ## 数据管理视图


  SQL Server 提供了一组庞大的数据管理视图，用于公开有关系统运行状况和 SQL Server 状态的信息。我想提及几个我们尚未介绍的视图。


  ### sys.dm_exec_requests 视图


  `sys.dm_exec_requests` 视图提供了当前正在执行的请求列表。此视图在故障排除过程中极为有用，它为你提供了服务器上当前运行会话的极高可见性。该视图中最值得注意的列如下：


  *   `session_id` 列提供会话的 ID。系统中的用户会话的 `session_id` 始终大于 50，尽管某些系统会话的 `session_id`
  也可能大于 50。你可以通过将结果与 `sys.dm_exec_sessions` 和 `sys.dm_exec_connections` 视图进行联接来获取有关会话和客户端应用程序的信息。


  *   `start_time`、`total_elapsed_time`、`cpu_time`、`reads`、`logical_reads` 和 `writes`
  列提供了请求的执行统计信息。


  *   `sql_handle`、`statement_start_offset` 和 `statement_end_offset` 列允许你获取有关查询的信息。在
  SQL Server 2016 及更高版本中，你可以将其与函数 `sys.dm_exec_input_buffer` 结合使用，以获取有关当前正在运行的 SQL
  语句的信息。你也可以使用 `sys.dm_exec_sql_text` 函数达到此目的，正如你在本书中已经看到的那样。


  *   `plan_handle` 列允许你使用 `sys.dm_exec_query_plan` 和 `sys.dm_exec_text_query_plan`
  函数获取语句的执行计划。


  *   `status` 列为你提供工作线程的状态。对于处于 `SUSPENDED` 状态的被阻塞会话，你可以使用 `wait_type`、`wait_time`、`wait_resource`
  和 `blocking_session_id` 列来获取有关会话等待和阻塞者的信息。此外，`last_wait_type` 列将显示会话的上一次等待类型。


  有许多场景下 `sys.dm_exec_requests` 视图可能有助于故障排除。其中之一是在分析长时间运行语句的状态时。你可以查看状态和与等待相关的列，以查看请求是正在运行还是被阻塞，并通过
  `blocking_session_id` 列识别阻塞会话。


  **注意**


  你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-requests-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-requests-transact-sql)
  获取有关 `sys.dm_exec_requests` 视图的更多信息。


  ### sys.dm_os_waiting_tasks 视图


  你可以使用 `sys.dm_os_waiting_tasks` 视图获取有关被阻塞会话的更多信息。此视图在任务/工作线程级别返回数据，这在分析具有并行执行计划的查询的阻塞时是有益的。输出包括每个被阻塞工作线程一行，并提供有关等待类型和持续时间、被阻塞资源以及阻塞会话
  ID 的信息。


  **注意**


  你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-os-waiting-tasks-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-os-waiting-tasks-transact-sql)
  获取有关 `sys.dm_os_waiting_tasks` 视图的更多信息。


  ### sys.dm_exec_session_wait_stats 视图和 wait_info xEvent


  在某些情况下，你可能希望在会话级别跟踪等待；例如，当你排查长时间运行查询的性能问题时。详细的等待信息将使你能够理解可能导致延迟的原因，并相应地调整你的优化策略。


  SQL Server 2016 及更高版本通过 `sys.dm_exec_session_wait_stats` 视图为你提供此信息。简而言之，此视图返回与 `sys.dm_os_wait_stats`
  类似的数据，但在会话级别收集。它在会话打开或轮询连接重置时清除信息。


  当你怀疑某个查询遭受大量短期阻塞等待时，`sys.dm_exec_session_wait_stats` 视图非常有用。此类等待可能不会触发*被阻塞进程报告*；但是，它们可能导致累积阻塞时间很长。


  在 SQL Server 2016 之前的版本中，你可以使用 `opcode=1` 谓词（指示等待结束）通过 `wait_info` 扩展事件来跟踪会话级等待。正如你可以猜到的，此会话可能会生成海量信息，从而影响服务器性能。除非你正在进行故障排除，否则不要保持其运行，并且由于它会引入
  I/O 系统延迟，不要使用 `event_file` 目标。


  你可以将谓词设置在 `duration` 字段上，仅捕获长期等待——例如，等待时间超过 50 毫秒。你也可以通过使用 `session_id` 过滤器来减少收集的信息量。不幸的是，`session_id`
  是 `wait_type` 事件的一个操作，这会在数据收集期间增加一些开销。SQL Server 在对扩展事件字段评估谓词后执行操作，因此从处理中移除不必要的等待类型是有益的。


  清单 12-3 提供了与每个等待类型对应的映射值列表，你可以将其用作等待类型的过滤器。


  ```

  select name, map_key, map_value

  from sys.dm_xe_map_values

  where name = ''wait_types''

  order by map_key

  Listing 12-3

  Wait_type 映射值

  ```


  最后，另一个扩展事件 `wait_type_external` 捕获有关抢先式等待（`PREEMPTIVE*` 等待类型）的信息。这些等待与外部 OS 调用相关联；例如，当
  SQL Server 需要将日志文件零初始化或在 Active Directory 中验证用户身份时。在某些情况下，你需要对它们进行故障排除；然而，这些情况与阻塞和并发问题无关。




  ## 注意事项


  你可以从 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-session-wait-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-session-wait-stats-transact-sql)
  获取关于 `sys.dm_exec_session_wait_stats` 视图的更多信息。你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/extended-events/extended-events`](https://docs.microsoft.com/en-us/sql/relational-databases/extended-events/extended-events)
  阅读关于扩展事件的内容。


  ### sys.dm_db_index_operational_stats 和 sys.dm_db_index_usage_stats 视图


  SQL Server 使用 `sys.dm_db_index_usage_stats` 和 `sys.dm_db_index_operational_stats`
  视图来跟踪索引使用统计信息。它们提供了关于索引访问模式的信息，例如查找、扫描和查找的次数；索引中的数据修改次数；闩锁和锁统计信息；以及许多其他有用的指标。


  `sys.dm_db_index_usage_stats` 视图主要关注索引访问模式，计算利用索引的查询数量。另一方面，`sys.dm_db_index_operational_stats`
  视图则按行跟踪操作。例如，如果你运行了一个在单个批处理中更新了十行索引的查询，`sys.dm_db_index_usage_stats` 视图会将其计为一次数据修改，并将
  `user_updates` 列增加 1，而 `sys.dm_db_index_operational_stats` 视图则会根据操作影响的行数将 `leaf_update_count`
  列增加 10。


  这两个视图在索引分析期间都极其有用，并允许你检测未使用和效率低下的索引。此外，`sys.dm_db_index_operational_stats` 视图还为你提供了关于索引操作指标的非常有用的洞察，有助于识别那些遭受大量阻塞、闩锁和物理磁盘活动的索引。


  从锁的角度来看，`sys.dm_db_index_operational_stats` 视图包含三组不同的列：


  *   `row_lock_count`、`row_lock_wait_count` 和 `row_lock_wait_ms` 表示索引中请求的行级锁的数量以及锁等待统计信息。

  *   `page_lock_count`、`page_lock_wait_count` 和 `page_lock_wait_ms` 显示页级锁的信息。

  *   `index_lock_promotion_count` 和 `index_lock_promotion_attempt_count` 返回锁升级统计信息。


  你可以在故障排除期间将此信息与其他来源关联起来。例如，当你分析系统中锁升级的影响时，你可以查看 `index_lock_promotion_count` 列值，并识别最常触发锁升级的索引。


  代码清单 12-4 展示了一个查询，该查询返回行级和页级锁等待时间最长的十个索引，帮助你识别阻塞最严重的索引。


  ```sql

  select top 10

  t.object_id

  ,i.index_id

  ,sch.name + ''.'' + t.name as [table]

  ,i.name as [index]

  ,ius.user_seeks

  ,ius.user_scans

  ,ius.user_lookups

  ,ius.user_seeks + ius.user_scans + ius.user_lookups as reads

  ,ius.user_updates

  ,ius.last_user_seek

  ,ius.last_user_scan

  ,ius.last_user_lookup

  ,ius.last_user_update

  ,ios.*

  from

  sys.tables t with (nolock) join sys.indexes i with (nolock) on

  t.object_id = i.object_id

  join sys.schemas sch with (nolock)  on

  t.schema_id = sch.schema_id

  left join sys.dm_db_index_usage_stats ius with (nolock) on

  i.object_id = ius.object_id and

  i.index_id = ius.index_id

  outer apply

  (

  select

  sum(range_scan_count) as range_scan_count

  ,sum(singleton_lookup_count) as singleton_lookup_count

  ,sum(row_lock_wait_count) as row_lock_wait_count

  ,sum(row_lock_wait_in_ms) as row_lock_wait_in_ms

  ,sum(page_lock_wait_count) as page_lock_wait_count

  ,sum(page_lock_wait_in_ms) as page_lock_wait_in_ms

  ,sum(page_latch_wait_count) as page_latch_wait_count

  ,sum(page_latch_wait_in_ms) as page_latch_wait_in_ms

  ,sum(page_io_latch_wait_count) as page_io_latch_wait_count

  ,sum(page_io_latch_wait_in_ms) as page_io_latch_wait_in_ms

  from sys.dm_db_index_operational_stats(db_id(),i.object_id,i.index_id,null)

  ) ios

  order by

  ios.row_lock_wait_in_ms + ios.page_lock_wait_in_ms desc

  ```


  **代码清单 12-4** 锁等待时间最长的索引


  图 12-6 显示了其中一个生产服务器上该查询的部分输出。请注意，输出中的第一个索引读取次数非常低，但更新开销很高，有可能可以从系统中移除。


  ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig6_HTML.jpg](img/463519_1_En_12_Fig6_HTML.jpg)


  **图 12-6** 锁等待时间最长的索引


  你可以使用代码清单 12-5 中的代码来检测使用特定索引的查询。然而，结果并非绝对可靠；此代码分析的是缓存的执行计划，可能会因为某些原因错过那些计划未被缓存的查询。如果系统中启用了查询存储，你可以调整它以使用查询存储
  DMV。


  需要注意的是，此代码对 CPU 的消耗很大。在 CPU 受限且缓存中有大量计划的生产服务器上运行时请务必小心。


  ```sql

  declare

  @IndexName sysname = quotename(''IDX_CI''); -- 在此添加索引名称

  ;with xmlnamespaces(default ''http://schemas.microsoft.com/sqlserver/2004/07/showplan'')

  ,CachedData

  as

  (

  select distinct

  obj.value(''@Database'',''sysname'') as [Database]

  ,obj.value(''@Schema'',''sysname'') + ''.'' +

  obj.value(''@Table'',''sysname'') as [Table]

  ,obj.value(''@Index'',''sysname'') as [Index]

  ,obj.value(''@IndexKind'',''varchar(64)'') as [Type]

  ,stmt.value(''@StatementText'', ''nvarchar(max)'') as [Statement]

  ,convert(nvarchar(max),qp.query_plan) as query_plan

  ,cp.plan_handle

  from

  sys.dm_exec_cached_plans cp with (nolock)

  cross apply sys.dm_exec_query_plan(plan_handle) qp

  cross apply query_plan.nodes

  (''/ShowPlanXML/BatchSequence/Batch/Statements/StmtSimple'') batch(stmt)

  cross apply stmt.nodes

  (''.//IndexScan/Object[@Index=sql:variable("@IndexName")]'') idx(obj)

  )

  select

  cd.[Database]

  ,cd.[Table]

  ,cd.[Index]

  ,cd.[Type]

  ,cd.[Statement]

  ,convert(xml,cd.query_plan) as query_plan

  ,qs.execution_count

  ,(qs.total_logical_reads + qs.total_logical_writes) /

  qs.execution_count as [Avg IO]

  ,qs.total_logical_reads

  ,qs.total_logical_writes

  ,qs.total_worker_time

  ,qs.total_worker_time / qs.execution_count /

  1000 as [Avg Worker Time (ms)]

  ,qs.total_rows

  ,qs.creation_time

  ,qs.last_execution_time

  from

  CachedData cd

  outer apply

  (

  select

  sum(qs.execution_count) as execution_count

  ,sum(qs.total_logical_reads) as total_logical_reads

  ,sum(qs.total_logical_writes) as total_logical_writes

  ,sum(qs.total_worker_time) as total_worker_time

  ,sum(qs.total_rows) as total_rows

  ,min(qs.creation_time) as creation_time

  ,max(qs.last_execution_time) as last_execution_time

  from sys.dm_exec_query_stats qs with (nolock)

  where qs.plan_handle = cd.plan_handle

  ) qs

  option (recompile, maxdop 1)

  ```


