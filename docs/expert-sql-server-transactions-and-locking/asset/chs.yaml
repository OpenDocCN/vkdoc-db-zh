- "# 2. 事务管理与并发模型\n\n事务是数据管理系统的核心概念；它们保证了数据库中数据的一致性和持久性。没有适当的事务管理，就不可能实现数据库系统。\n\n\
  本章将阐述事务的重要性，概述悲观和乐观并发模型，并简述事务隔离级别以及它们可能引入的数据一致性现象。最后，本章将讨论与 SQL Server 中事务管理和错误处理相关的几个问题。\n\
  \n## 事务\n\nMicrosoft SQL Server 的设计初衷是与其他通用数据库服务器一样，能在多用户环境中运行。数据库引擎需要处理来自多个用户的并发工作负载，并在用户查询和修改相同数据时，提供所需级别的数据一致性。\n\
  \n在数据库和数据管理系统中，有一个核心概念称为 *事务*。事务是读取和修改数据库中数据的单一工作单元，有助于确保数据的一致性和持久性。在正确实现的事务管理系统中，每个事务都具有四个不同的特性：*原子性*、*一致性*、*隔离性*和*持久性*，通常统称为\
  \ *ACID*。\n\n### ACID 特性\n\n*   **原子性** 保证每个事务作为一个单一工作单元执行，采用“要么全做，要么全不做”的原则。事务中的所有更改要么全部提交，要么全部回滚。考虑经典的银行活期账户和储蓄账户之间转账的例子。该操作由两个独立的步骤组成：减少活期账户余额和增加储蓄账户余额。事务的原子性保证这两个操作要么同时成功，要么同时失败，系统永远不会出现资金已从活期账户扣除但未存入储蓄账户的不一致状态。\n\
  \n*   **一致性** 确保任何数据库事务都使数据库从一个一致的状态转换到另一个一致的状态，并且不违反任何已定义的数据库规则和约束。\n\n*   **隔离性**\
  \ 确保事务中所做的更改是隔离的，并且在事务提交之前对其他事务不可见。严格来说，事务隔离性应保证多个事务的并发执行使系统达到与这些事务串行执行相同的状态。然而，在大多数数据库系统中，此要求通常被放宽，并通过\
  \ *事务隔离级别* 进行控制，我们将在本章后面讨论。\n\n*   **持久性** 保证事务提交后，该事务所做的所有更改都是永久性的，并能在系统故障后幸存。SQL\
  \ Server 通过使用 *预写式日志* 将日志记录硬化到事务日志中来实现持久性。事务只有在由其生成的所有日志记录都硬化到日志文件后，才被视为已提交。\n\n\
  在多用户环境中，隔离性要求是最难实现的。尽管可以完全隔离不同的事务，但这可能导致在具有易变数据的系统中出现高级别的阻塞和其他并发问题。SQL Server 通过引入几种事务隔离级别来解决这种情况，这些隔离级别以可能的、与读取数据一致性相关的并发现象为代价放宽了隔离要求：\n\
  \n*   **脏读：** 一个事务从其他未提交的事务中读取未提交（脏）数据。\n*   **不可重复读：** 在同一个事务中，后续尝试读取相同的数据会返回不同的结果。当受影响的事务在两次读取之间，其他事务修改甚至删除了数据时，就会出现这种数据不一致问题。\n\
  *   **幻读：** 当同一个事务中的后续读取返回了新的行（该事务之前未读取过的行）时，就会发生这种现象。这发生在另一个事务在受影响的事务两次读取之间插入了新数据的情况下。\n\
  \n## 悲观和乐观并发控制\n\n事务隔离级别控制着 SQL Server 行为的另一个方面，即决定事务的 *并发模型*。从概念上讲，数据库系统中使用两种并发模型：\n\
  \n*   **悲观并发** 基于这样的假设：访问相同数据的多个用户最终都可能希望修改数据并覆盖彼此的更改。数据库引擎通过在第一个会话访问和/或修改数据后立即锁定数据，直到事务结束，来防止这种情况发生。\n\
  *   **乐观并发** 则假设，虽然多个用户可能访问相同数据，但同时更新的可能性较低。数据不会被锁定；然而，多个更新操作会触发写-写冲突并回滚受影响的事务。\n\
  \n让我们通过一个例子来说明这些模型之间的区别。再次假设我们有一个事务想要在活期账户和储蓄账户之间转账。如前所述，这将导致两个更新操作——减少活期账户余额和增加储蓄账户余额。另外假设你还有另一个会话，希望与转账操作并行地从活期账户取款。此操作将减少活期账户余额（更新同一行）并执行其他操作。\n\
  \n在悲观并发模型下，第一个更新（在某些情况下甚至是读取）活期账户余额的会话将锁定该行，阻止其他会话访问或更新它。第二个会话将被阻塞，直到第一个会话完成事务，之后它才能读取新的活期账户余额。\n\
  \n在乐观并发模型下，两个会话都不会被阻塞。但是，其中一个会话将无法提交，并会因 *写-写冲突* 错误而失败。\n\n两种并发模型各有优缺点。悲观并发可能在系统中引入阻塞。而乐观并发则需要妥善处理写-写冲突，并且通常在数据修改期间引入额外的开销。\n\
  \nSQL Server 同时支持悲观和乐观并发模型，并通过事务隔离级别来控制它们。\n\n\n### 事务隔离级别\n\n对于基于磁盘的表，SQL Server\
  \ 支持六种不同的事务隔离级别，如表 2-1 所示。该表还展示了每种事务隔离级别下可能发生的并发现象。\n\n表 2-1\n\n事务隔离级别与并发现象\n\n\
  | 隔离级别 | 类型 | 脏读 | 不可重复读 | 幻读 | 写-写冲突 |\n| --- | --- | --- | --- | --- | --- |\n\
  | `READ UNCOMMITTED` | 悲观 | 是 | 是 | 是 | 否 |\n| `READ COMMITTED` | 悲观 | 否 | 是 | 是\
  \ | 否 |\n| `REPEATABLE READ` | 悲观 | 否 | 否 | 是 | 否 |\n| `SERIALIZABLE` | 悲观 | 否 |\
  \ 否 | 否 | 否 |\n| `READ COMMITTED SNAPSHOT` | 对读操作是乐观的。对写操作是悲观的。 | 否 | 是 | 是 | 否\
  \ |\n| `SNAPSHOT` | 乐观 | 否 | 否 | 否 | 是 |\n\n对于悲观隔离级别，SQL Server 严格依赖锁来防止访问被其他会话修改（有时甚至是读取）的行。对于乐观隔离级别，SQL\
  \ Server 使用行版本控制，并将修改行的旧版本复制到 `tempdb` 中一个称为版本存储区的特殊区域。其他会话将从那里读取行的旧（已提交的）版本，而不是被阻塞。\n\
  \n需要注意的是，在乐观隔离级别下，SQL Server 仍然会对更新的行获取锁，以防止其他会话同时更新相同的行。我们将在第 6 章更详细地讨论这一点。\n\n\
  `READ COMMITTED SNAPSHOT` 隔离级别结合了乐观和悲观并发模型。读操作（`SELECT` 查询）使用行版本控制，而写操作（`INSERT`、`UPDATE`\
  \ 和 `DELETE` 查询）则依赖锁。\n\n严格来说，`READ COMMITTED SNAPSHOT` 并不是一个真正的隔离级别，而是一个数据库选项（`READ_COMMITTED_SNAPSHOT`），它改变了\
  \ `READ COMMITTED` 隔离级别下读操作（`SELECT` 查询）的默认行为。然而，在本书中，我将把此选项视为一个独立的事务隔离级别。\n\n####\
  \ 注意\n\n`READ_COMMITTED_SNAPSHOT` 数据库选项在 Microsoft Azure SQL 数据库中默认启用，而在常规版本的 SQL\
  \ Server 中默认禁用。\n\n你可以使用 `SET TRANSACTION ISOLATION LEVEL` 语句在会话级别设置事务隔离级别。大多数客户端库使用\
  \ `READ COMMITTED`（或者在启用 `READ_COMMITTED_SNAPSHOT` 数据库选项时使用 `READ COMMITTED SNAPSHOT`）作为默认隔离级别。你也可以使用锁提示在每表基础上控制隔离级别，我们将在下一章讨论。\n\
  \n### 处理事务\n\n让我们看看系统中事务管理的几个方面，从事务类型开始。\n\n#### 事务类型\n\nSQL Server 中有三种类型的事务：显式事务、自动提交事务和隐式事务。\n\
  \n显式事务由代码显式控制。你可以使用 `BEGIN TRAN` 语句启动它们。它们将保持活动状态，直到你在代码中显式调用 `COMMIT` 或 `ROLLBACK`。\n\
  \n如果没有活动的事务存在，SQL Server 将使用自动提交事务——为它执行的每个语句启动并提交事务。需要特别记住的是，自动提交事务是按语句而非按模块工作的。例如，当一个存储过程由五个语句组成时，SQL\
  \ Server 将执行五个自动提交事务。此外，如果此过程在执行过程中失败，SQL Server 不会回滚其先前已提交的自动提交事务。这种行为可能导致系统中的逻辑数据不一致。\n\
  \n对于包含多个数据修改语句的逻辑，由于它们引入的日志记录开销，自动提交事务的效率低于显式事务。在这种模式下，每个语句都会为隐式的 `BEGIN TRAN` 和\
  \ `COMMIT` 操作生成事务日志记录，这将导致大量的事务日志活动并降低系统性能。\n\n过多的自动提交事务还可能引起另一个潜在的性能问题。正如我已经提到的，SQL\
  \ Server 实现了预写日志以支持事务持久性，通过同步地将日志记录硬化到磁盘来与数据修改保持一致。然而，在内部，SQL Server 会批量处理日志写入操作，并将日志记录缓存在称为日志缓冲区的小型\
  \ 60 KB 内存结构中。提交日志记录会强制 SQL Server 将日志缓冲区刷新到磁盘，从而引入同步 I/O 操作。\n\n图 2-1 说明了这种情况。`INSERT_1`、`UPDATE_1`\
  \ 和 `DELETE_1` 操作在自动提交事务中运行，生成额外的日志记录，并在每次 `COMMIT` 时强制日志缓冲区刷新。相比之下，`INSERT_2`、`UPDATE_2`\
  \ 和 `DELETE_2` 操作在一个显式事务中运行，从而实现了更高效的日志记录。\n\n![使用自动提交和显式事务的事务日志记录](img/463519_1_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1\n\n使用自动提交和显式事务的事务日志记录\n\n清单 2-1 中的代码演示了这种开销的实际表现。它在一个循环中以自动提交和显式事务执行 `INSERT/UPDATE/DELETE`\
  \ 序列 10,000 次，并使用 `sys.dm_io_virtual_file_stats` 视图测量执行时间和事务日志吞吐量。\n\n\n\n## 事务处理与错误处理\n\
  \n### 自动提交与显式事务\n\n以下代码展示了自动提交事务与显式事务的区别。\n\n```sql\ncreate table dbo.TranOverhead\n\
  (\nId int not null,\nCol char(50) null,\nconstraint PK_TranOverhead\nprimary key\
  \ clustered(Id)\n);\n-- Autocommitted transactions\ndeclare\n@Id int = 1,\n@StartTime\
  \ datetime = getDate(),\n@num_of_writes bigint,\n@num_of_bytes_written bigint\n\
  select\n@num_of_writes = num_of_writes\n,@num_of_bytes_written = num_of_bytes_written\n\
  from\nsys.dm_io_virtual_file_stats(db_id(),2);\nwhile @Id < 10000\nbegin\ninsert\
  \ into dbo.TranOverhead(Id, Col) values(@Id, ‘A’);\nupdate dbo.TranOverhead set\
  \ Col = ‘B’ where Id = @Id;\ndelete from dbo.TranOverhead where Id = @Id;\nset @Id\
  \ += 1;\nend;\nselect\ndatediff(millisecond, @StartTime, getDate())\nas [Exec Time\
  \ ms: Autocommitted Tran]\n,s.num_of_writes - @num_of_writes as [Number of writes]\n\
  ,(s.num_of_bytes_written - @num_of_bytes_written) / 1024\nas [Bytes written (KB)]\n\
  from\nsys.dm_io_virtual_file_stats(db_id(),2) s;\ngo\n-- Explicit Tran\ndeclare\n\
  @Id int = 1,\n@StartTime datetime = getDate(),\n@num_of_writes bigint,\n@num_of_bytes_written\
  \ bigint\nselect\n@num_of_writes = num_of_writes\n,@num_of_bytes_written = num_of_bytes_written\n\
  from\nsys.dm_io_virtual_file_stats(db_id(),2);\nwhile @Id < 10000\nbegin\nbegin\
  \ tran\ninsert into dbo.TranOverhead(Id, Col) values(@Id, ‘A’);\nupdate dbo.TranOverhead\
  \ set Col = ‘B’ where Id = @Id;\ndelete from dbo.TranOverhead where Id = @Id;\n\
  commit\nset @Id += 1;\nend;\nselect\ndatediff(millisecond, @StartTime, getDate())\n\
  as [Exec Time ms: Explicit Tran]\n,s.num_of_writes - @num_of_writes as [Number of\
  \ writes]\n,(s.num_of_bytes_written - @num_of_bytes_written) / 1024\nas [Bytes written\
  \ (KB)]\n```\n\n**代码清单 2-1** 自动提交与显式事务\n\n图 2-2 展示了代码在我的环境中的输出。如你所见，显式事务比自动提交事务快大约两倍，并且产生的日志活动减少了三分之一。\n\
  \n![显式与自动提交事务性能](img/463519_1_En_2_Fig2_HTML.jpg)\n\n**图 2-2** 显式与自动提交事务性能\n\nSQL\
  \ Server 2014 及以上版本允许你通过使用 `延迟持久性` 来提高事务日志吞吐量。在此模式下，当生成 `COMMIT` 日志记录时，SQL Server\
  \ 不会刷新日志缓冲区。这减少了磁盘写入次数，但在发生灾难时可能会造成少量数据丢失。\n\n#### 注意\n\n你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/logs/control-transaction-durability`](https://docs.microsoft.com/en-us/sql/relational-databases/logs/control-transaction-durability)\
  \ 或我写的 `Pro SQL Server Internals` 一书中阅读更多关于延迟持久性的内容。\n\nSQL Server 还支持 `隐式事务`，你可以通过\
  \ `SET IMPLICIT_TRANSACTION ON` 语句启用它。启用此选项后，当没有活动的显式事务存在时，SQL Server 会开始一个新的事务。该事务将保持活动状态，直到你显式发出\
  \ `COMMIT` 或 `ROLLBACK` 语句。\n\n从性能和事务日志吞吐量的角度来看，隐式事务与显式事务类似。然而，它们使事务管理更加复杂，在生产环境中很少使用。但需要注意的是——`SET\
  \ ANSI_DEFAULT ON` 选项也会自动启用隐式事务。这种行为可能会导致系统中出现意外的并发问题。\n\n### 错误处理\n\nSQL Server\
  \ 中的错误处理是一个棘手的问题，尤其是在涉及事务时。SQL Server 根据错误严重性、活动事务上下文和其他几个因素来不同地处理异常。\n\n让我们看看异常在执行过程中如何影响控制流。代码清单\
  \ 2-2 创建了两个表——`dbo.Customers` 和 `dbo.Orders`——并向其中填充数据。注意 `dbo.Orders` 表中定义的外键约束。\n\
  \n```sql\ncreate table dbo.Customers\n(\nCustomerId int not null,\nconstraint PK_Customers\n\
  primary key(CustomerId)\n);\ncreate table dbo.Orders\n(\nOrderId int not null,\n\
  CustomerId int not null,\nconstraint FK_Orders_Customerss\nforeign key(CustomerId)\n\
  references dbo.Customers(CustomerId)\n);\ngo\ncreate proc dbo.ResetData\nas\nbegin\n\
  begin tran\ndelete from dbo.Orders;\ndelete from dbo.Customers;\ninsert into dbo.Customers(CustomerId)\
  \ values(1),(2),(3);\ninsert into dbo.Orders(OrderId, CustomerId) values(2,2);\n\
  commit\nend;\ngo\nexec dbo.ResetData;\n```\n\n**代码清单 2-2** 错误处理：表创建\n\n让我们在一个批处理中运行三个\
  \ `DELETE` 语句，如代码清单 2-3 所示。第二个语句将触发 *外键违反* 错误。`@@ERROR` 系统变量提供了最后执行的 T-SQL 语句的错误号（`0`\
  \ 表示没有错误）。\n\n```sql\ndelete from  dbo.Customers where CustomerId = 1; -- 成功\nselect\
  \ @@ERROR as [@@ERROR: CustomerId = 1];\ndelete from  dbo.Customers where CustomerId\
  \ = 2; -- 外键违反\nselect @@ERROR as [@@ERROR: CustomerId = 2];\ndelete from  dbo.Customers\
  \ where CustomerId = 3; -- 成功\nselect @@ERROR as [@@ERROR: CustomerId = 3];\ngo\n\
  select * from dbo.Customers;\n```\n\n**代码清单 2-3** 错误处理：删除客户\n\n图 2-3 展示了代码的输出。如你所见，SQL\
  \ Server 在非关键的 *外键违反* 错误后继续执行，随后删除了 `CustomerId=3` 的行。\n\n![在批处理中删除三个客户](img/463519_1_En_2_Fig3_HTML.jpg)\n\
  \n**图 2-3** 在批处理中删除三个客户\n\n如果你使用 `TRY..CATCH` 块，情况会有所不同，如代码清单 2-4 所示。\n\n```sql\n\
  exec dbo.ResetData;\ngo\nbegin try\ndelete from  dbo.Customers where CustomerId\
  \ = 1; -- 成功\ndelete from  dbo.Customers where CustomerId = 2; -- 外键违反\ndelete from\
  \  dbo.Customers where CustomerId = 3; -- 未执行\nend try\nbegin catch\nselect\nERROR_NUMBER()\
  \ as [Error Number]\n,ERROR_LINE() as [Error Line]\n,ERROR_MESSAGE() as [Error Message];\n\
  end catch\ngo\nselect * from dbo.Customers;\n```\n\n**代码清单 2-4** 错误处理：在 TRY..CATCH\
  \ 块中删除客户\n\n如图 2-4 所示，错误在 `CATCH` 块中被捕获，第三个删除语句没有被执行。\n\n![在 TRY..CATCH 块中删除三个客户](img/463519_1_En_2_Fig4_HTML.jpg)\n\
  \n**图 2-4** 在 TRY..CATCH 块中删除三个客户\n\n你可以在 `CATCH` 块中使用以下几个函数：\n\n*   `ERROR_NUMBER()`\
  \ 返回导致 `CATCH` 块运行的错误编号。\n*   `ERROR_MESSAGE()` 提供错误消息。\n*   `ERROR_SEVERITY()`\
  \ 和 `ERROR_STATE()` 分别表示错误的严重性和状态号。\n*   `ERROR_PROCEDURE()` 返回发生错误的存储过程或触发器的名称。如果外部模块中有嵌套的存储过程调用并使用了\
  \ `TRY..CATCH`，这将非常有用。\n*   `ERROR_LINE()` 提供发生错误的行号。\n*   最后，`THROW` 操作符允许你从 `CATCH`\
  \ 块中重新抛出错误。\n\n\n\n## 重要\n\n非关键异常不会自动回滚显式或隐式事务，无论是否存在 `TRY..CATCH` 块。在错误发生后，你仍然需要提交或回滚事务。\n\
  \n根据错误的严重程度，发生错误的事务可能是可提交的，也可能变为不可提交并被标记为“已损坏”。SQL Server 将不允许你提交不可提交的事务，必须回滚它才能完成。\n\
  \n`XACT_STATE()` 函数允许你分析事务的状态；它返回以下三个值之一：\n\n*   `0` 表示当前没有活动事务。\n*   `1` 表示存在一个活动的、*可提交*\
  \ 事务。你可以执行任何操作和数据修改，随后提交事务。\n*   `-1` 表示存在一个活动的、*不可提交* 事务。你无法提交此类事务。\n\n有一个非常重要的\
  \ `SET` 选项 `XACT_ABORT`，它允许你控制代码中的错误处理行为。当此选项设置为 `ON` 时，SQL Server 会将每个运行时错误都视为严重错误，使事务变为不可提交。这可以防止你在某些数据修改因非关键错误而失败时，意外地提交事务。再次回想一下在支票账户和储蓄账户之间转账的例子。如果其中一个\
  \ `UPDATE` 语句触发了错误，无论其严重程度如何，都不应提交此事务。\n\n当启用 `XACT_ABORT` 时，如果不存在 `TRY..CATCH`\
  \ 块，任何错误都将终止批处理。例如，如果你使用 `SET XACT_ABORT ON` 再次运行清单 2-3 中的代码，第三个 `DELETE` 语句将不会被执行，并且只有\
  \ `CustomerId=1` 的行会被删除。此外，在批处理完成后，SQL Server 会自动回滚已损坏的未提交事务。\n\n清单 2-5 说明了此行为。存储过程\
  \ `dbo.GenerateError` 将 `XACT_ABORT` 设置为 `ON`，并在活动事务中生成一个错误。`@@TRANCOUNT` 变量返回事务的嵌套级别（稍后会详细介绍），非零值表示事务是活动的。\n\
  \n```sql\ncreate proc dbo.GenerateError\nas\nbegin\n    set xact_abort on\n    begin\
  \ tran\n        delete from dbo.Customers where CustomerId = 2; -- Error\n     \
  \   select 'This statement will never be executed';\nend\ngo\nexec dbo.GenerateError;\n\
  select 'This statement will never be executed';\ngo\n-- Another batch\nselect XACT_STATE()\
  \ as [XACT_STATE()], @@TRANCOUNT as [@@TRANCOUNT];\ngo\n-- Listing 2-5\n-- SET XACT_ABORT\
  \ behavior\n```\n\n图 2-5 展示了代码的输出。如你所见，批处理执行已终止，并且在批处理结束时事务已自动回滚。\n\n![../images/463519_1_En_2_Chapter/463519_1_En_2_Fig5_HTML.jpg](img/463519_1_En_2_Fig5_HTML.jpg)\n\
  \n图 2-5\nXACT_ABORT 行为\n\n然而，即使 `XACT_ABORT` 设置为 `ON`，`TRY..CATCH` 块也允许你捕获错误。清单\
  \ 2-6 说明了这种情况。\n\n```sql\nbegin try\n    exec dbo.GenerateError;\n    select 'This\
  \ statement will never be executed';\nend try\nbegin catch\n    select\n       \
  \ ERROR_NUMBER() as [Error Number]\n        ,ERROR_PROCEDURE() as [Procedure]\n\
  \        ,ERROR_LINE() as [Error Line]\n        ,ERROR_MESSAGE() as [Error Message];\n\
  \    select\n        XACT_STATE() as [XACT_STATE()]\n        ,@@TRANCOUNT as [@@TRANCOUNT];\n\
  \    if @@TRANCOUNT > 0\n        rollback;\nend catch\n-- Listing 2-6\n-- SET XACT_ABORT\
  \ behavior with TRY..CATCH block\n```\n\n如图 2-6 所示，异常已在 `CATCH` 块中被捕获，此时事务在该块中仍处于活动状态。\n\
  \n![../images/463519_1_En_2_Chapter/463519_1_En_2_Fig6_HTML.jpg](img/463519_1_En_2_Fig6_HTML.jpg)\n\
  \n图 2-6\n带有 TRY..CATCH 块的 XACT_ABORT 行为\n\n一致的错误处理和事务管理策略极其重要，可以帮助你避免数据一致性错误并提高系统中的数据质量。我推荐以下最佳实践方法：\n\
  \n*   在数据修改期间，始终在代码中使用显式事务。这将保证由多个操作组成的事务中的数据一致性。它也比单个自动提交的事务更高效。\n*   在启动事务之前，将\
  \ `XACT_ABORT` 设置为 `ON`。这将保证事务的“全部或没有”行为，防止 SQL Server 忽略非严重错误或提交部分完成的事务。\n*   使用适当的\
  \ `TRY..CATCH` 块进行错误处理，并在出现异常时显式回滚事务。这有助于避免错误发生时产生不可预见的副作用。\n\n在事务变为不可提交后，执行生成事务日志记录的操作是不可能的。实际上，这意味着在回滚不可提交的事务之前，你无法执行任何数据修改操作——例如，在\
  \ `CATCH` 块中将错误记录到数据库中。如果需要，可以将数据持久化在表变量中。\n\n#### 提示\n\n与临时表相反，表变量不参与事务。表变量中的数据不会受到事务回滚的影响。\n\
  \n客户端与服务器端事务管理的选择取决于应用程序架构。当数据修改在应用程序代码中完成时（例如，更改由 ORM 框架生成），需要客户端管理。另一方面，基于存储过程的数据访问层可能受益于服务器端事务管理。\n\
  \n清单 2-7 提供了一个实现服务器端事务管理的存储过程示例。\n\n```sql\ncreate proc dbo.PerformDataModifications\n\
  as\nbegin\n    set xact_abort on\n    begin try\n        begin tran\n          \
  \  /* Perform required data modifications */\n        commit\n    end try\n    begin\
  \ catch\n        if @@TRANCOUNT > 0 -- Transaction is active\n            rollback;\n\
  \        /* Additional error-handling code */\n        throw;  -- Re-throw error.\
  \ Alternatively, SP may return the error code\n    end catch;\nend;\n-- Listing\
  \ 2-7\n-- Server-side transaction management\n```\n\n\n#### 嵌套事务与保存点\n\nSQL Server\
  \ *从技术上讲* 支持嵌套事务；然而，它们主要用于简化嵌套存储过程调用期间的事务管理。在实践中，这意味着代码需要显式提交所有嵌套事务，并且 `COMMIT`\
  \ 调用的次数应与 `BEGIN TRAN` 调用的次数相匹配。而 `ROLLBACK` 语句则会回滚整个事务，无论当前的嵌套级别如何。\n\n代码清单 2-8\
  \ 展示了此行为。正如我已经提到的，系统变量 `@@TRANCOUNT` 返回事务的嵌套级别。\n\n```\nselect @@TRANCOUNT as [Original\
  \ @@TRANCOUNT];\nbegin tran\nselect @@TRANCOUNT as [@@TRANCOUNT after the first\
  \ BEGIN TRAN];\nbegin tran\nselect @@TRANCOUNT as [@@TRANCOUNT after the second\
  \ BEGIN TRAN];\ncommit\nselect @@TRANCOUNT as [@@TRANCOUNT after nested COMMIT];\n\
  begin tran\nselect @@TRANCOUNT as [@@TRANCOUNT after the third BEGIN TRAN];\nrollback\n\
  select @@TRANCOUNT as [@@TRANCOUNT after ROLLBACK];\nrollback; -- This ROLLBACK\
  \ generates the error\nListing 2-8\n嵌套事务\n```\n\n您可以在图 2-7 中看到代码的输出。\n\n![../images/463519_1_En_2_Chapter/463519_1_En_2_Fig7_HTML.jpg](img/463519_1_En_2_Fig7_HTML.jpg)\n\
  \n图 2-7\n嵌套事务\n\n您可以使用 `SAVE TRANSACTION` 语句来保存事务的状态并创建一个*保存点*。这将允许您部分回滚事务，返回到最近的保存点。该事务将保持活动状态，并且需要在之后通过显式的\
  \ `COMMIT` 或 `ROLLBACK` 语句来完成。\n\n#### 注意\n\n具有 `XACT_STATE() = -1` 的不可提交事务无法回滚到保存点。在实践中，这意味着如果\
  \ `XACT_ABORT` 设置为 `ON`，则在发生错误后您无法回滚到保存点。\n\n代码清单 2-9 说明了此行为。该存储过程在运行活动事务时创建保存点，并在遇到可提交错误时回滚到此保存点。\n\
  \n```\ncreate proc dbo.TryDeleteCustomer\n(\n@CustomerId int\n)\nas\nbegin\n-- Setting\
  \ XACT_ABORT to OFF for rollback to savepoint to work\nset xact_abort off\ndeclare\n\
  @ActiveTran bit\n-- Check if SP is calling in context of active transaction\nset\
  \ @ActiveTran = IIF(@@TranCount > 0, 1, 0);\nif @ActiveTran = 0\nbegin tran;\nelse\n\
  save transaction TryDeleteCustomer;\nbegin try\ndelete dbo.Customers where CustomerId\
  \ = @CustomerId;\nif @ActiveTran = 0\ncommit;\nreturn 0;\nend try\nbegin catch\n\
  if @ActiveTran = 0 or XACT_STATE() = -1\nbegin\n-- Roll back entire transaction\n\
  rollback tran;\nreturn -1;\nend\nelse begin\n-- Roll back to savepoint\nrollback\
  \ tran TryDeleteCustomer;\nreturn 1;\nend\nend catch;\nend;\nListing 2-9\n保存点\n\
  ```\n\n代码清单 2-10 在第二次调用 `dbo.TryDeleteCustomer` 时触发了外键约束违规。这是一个非关键错误，因此代码能够在错误发生后提交。\n\
  \n```\ndeclare\n@ReturnCode int\nexec dbo.ResetData;\nbegin tran\nexec @ReturnCode\
  \ = TryDeleteCustomer @CustomerId = 1;\nselect\n1 as [CustomerId]\n,@ReturnCode\
  \ as [@ReturnCode]\n,XACT_STATE() as [XACT_STATE()];\nif @ReturnCode >= 0\nbegin\n\
  exec @ReturnCode = TryDeleteCustomer @CustomerId = 2;\nselect\n2 as [CustomerId]\n\
  ,@ReturnCode as [@ReturnCode]\n,XACT_STATE() as [XACT_STATE()];\nend\nif @ReturnCode\
  \ >= 0\ncommit;\nelse\nif @@TRANCOUNT > 0\nrollback;\ngo\nselect * from dbo.Customers;\n\
  Listing 2-10\ndbo.TryDeleteCustomer 实战演示\n```\n\n图 2-8 显示了代码的输出。如您所见，SQL Server\
  \ 成功删除了 `CustomerId=1` 的行并在该状态下提交了事务。\n\n![../images/463519_1_En_2_Chapter/463519_1_En_2_Fig8_HTML.jpg](img/463519_1_En_2_Fig8_HTML.jpg)\n\
  \n图 2-8\n代码清单 2-10 的输出\n\n值得注意的是，此示例仅用于演示目的。从效率角度考虑，在删除操作发生前就验证引用完整性和订单的存在性，会比在发生错误时捕获异常并回滚到保存点更好。\n\
  \n## 总结\n\n事务是数据管理系统中的一个核心概念，它支持系统中数据修改的原子性、一致性、隔离性和持久性要求。\n\n数据库系统中使用两种并发模型。悲观并发预期用户可能想要更新相同的数据，并阻止其他会话访问未提交的更改。乐观并发假设同时发生数据更新的概率较低。在此模型下没有阻塞；然而，同时更新将导致写-写冲突。\n\
  \nSQL Server 支持四种悲观（`READ UNCOMMITTED`、`READ COMMITTED`、`REPEATABLE READ` 和 `SERIALIZABLE`）和一种乐观（`SNAPSHOT`）隔离级别。它还支持\
  \ `READ COMMITTED SNAPSHOT` 隔离级别，该级别为读取器实现乐观并发，为数据修改查询实现悲观并发。\n\nSQL Server 中有三种类型的事务——显式事务、自动提交事务和隐式事务。自动提交事务由于它们引入的事务日志开销而效率较低。\n\
  \n根据错误的严重程度和其他一些因素，事务可能是可提交的，或者可能变得不可提交并被标记为“已损坏”。您可以通过将 `XACT_ABORT` 选项设置为 `ON`\
  \ 来将所有错误视为不可提交。这种方法简化了错误处理并降低了系统中数据不一致的可能性。\n\nSQL Server 支持嵌套事务。要使事务被提交，`COMMIT`\
  \ 调用的次数应与 `BEGIN TRAN` 调用次数相匹配。而 `ROLLBACK` 语句则会回滚整个事务，无论嵌套级别如何。\n\n"
- "# 3. 锁类型\n\n本章将讨论 SQL Server 并发中的关键概念——*锁*。它将概述 SQL Server 中的主要锁类型，解释它们的兼容性，并最终演示不同的事务隔离级别如何影响系统中锁的生命周期。\n\
  \n## 主要锁类型\n\nSQL Server 使用锁来支持事务的隔离需求。简而言之，每个锁都是一个由名为*锁管理器*的 SQL Server 组件管理的内存中结构。每个锁结构在\
  \ SQL Server 的 32 位版本上使用 64 字节内存，在 64 位版本上使用 128 字节内存。\n\n锁在*资源*（如数据行、页、分区、表（对象）、数据库等）上获取和持有。默认情况下，SQL\
  \ Server 使用行级锁来获取数据行上的锁，这最大限度地减少了系统中可能的并发问题。然而，您应该记住，SQL Server 提供的唯一保证是基于事务隔离级别强制执行数据隔离和一致性。锁定行为未被记录，并且在某些情况下，SQL\
  \ Server 可以选择在页或表级别而不是行级别锁定。尽管如此，锁兼容性规则始终强制执行，并且理解锁定模型足以解决和处理系统中大多数并发问题。\n\n锁结构中的关键属性是*锁类型*。在内部，SQL\
  \ Server 使用超过 20 种不同的锁类型。它们可以根据其类型和用途分为几个主要类别。\n\n### 代码示例\n\n本章及后续章节中的代码示例将依赖于此处定义的\
  \ `Delivery.Orders` 表。该表在 `OrderId` 列上定义了聚集主键，且未定义任何非聚集索引。\n\n你可以在本书的配套资料中找到创建该表并填充数据的脚本。\n\
  \n```sql\ncreate schema Delivery;\ncreate table Delivery.Orders\n(\nOrderId int\
  \ not null identity(1,1),\nOrderDate smalldatetime not null,\nOrderNum varchar(20)\
  \ not null,\nReference varchar(64) null,\nCustomerId int not null,\nPickupAddressId\
  \ int not null,\nDeliveryAddressId int not null,\nServiceId int not null,\nRatePlanId\
  \ int not null,\nOrderStatusId int not null,\nDriverId int null,\nPieces smallint\
  \ not null,\nAmount smallmoney not null,\nModTime datetime not null\nconstraint\
  \ DEF_Orders_ModTime\ndefault getDate(),\nPlaceHolder char(100) not null\nconstraint\
  \ DEF_Orders_Placeholder\ndefault 'Placeholder',\nconstraint PK_Orders\nprimary\
  \ key clustered(OrderId)\n)\ngo\ndeclare\n@MaxOrderId int = 65536\n,@MaxCustomers\
  \ int = 1000\n,@MaxAddresses int = 20\n,@MaxDrivers int = 125\n;with N1(C) as (select\
  \ 0 union all select 0) -- 2 rows\n,N2(C) as (select 0 from N1 as T1 cross join\
  \ N1 as T2) -- 4 rows\n,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) --\
  \ 16 rows\n,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256 rows\n\
  ,N5(C) as (select 0 from N4 as T1 cross join N4 as T2) -- 65,536 rows\n,IDs(ID)\
  \ as (select row_number() over (order by (select null)) from N5)\n,Info(OrderId,\
  \ CustomerId, OrderDateOffset, RatePlanId, ServiceId, Pieces)\nas\n(\nselect\nID,\
  \ ID % @MaxCustomers + 1, ID % (365*24*60)\n,ID % 2 + 1, ID % 3 + 1, ID % 5 + 1\n\
  from IDs\nwhere ID  5 * 24 * 60\nthen 4\nelse OrderId % 4 + 1\nend\n,(OrderId %\
  \ 5 + 1) * 10.\nfrom Info\n)\ninsert into Delivery.Orders(OrderDate, OrderNum, CustomerId,\n\
  PickupAddressId, DeliveryAddressId, ServiceId, RatePlanId,\nOrderStatusId, DriverId,\
  \ Pieces, Amount)\nselect\no.OrderDate\n,o.OrderNum\n,o.CustomerId\n,o.PickupAddressId\n\
  ,case\nwhen o.PickupAddressId % @MaxAddresses = 0\nthen o.PickupAddressId + 1\n\
  else o.PickupAddressId - 1\nend\n,o.ServiceId\n,o.RatePlanId\n,o.OrderStatusId\n\
  ,case\nwhen o.OrderStatusId in (1,4)\nthen NULL\nelse OrderId % @MaxDrivers + 1\n\
  end\n,o.Pieces\n,o.Rate\nfrom Info2 o;\n```\n\n### 排他锁\n\n排他锁由 `写入者`（即修改数据的 `INSERT`、`UPDATE`、`DELETE`\
  \ 和 `MERGE` 语句）获取。这些查询会对受影响的行获取排他锁，并持有该锁直到事务结束。\n\n顾名思义——`排他` 意味着 `互斥`——在任何给定时间点，只有一个会话可以持有资源上的排他锁。这种行为强制了系统中最重要的并发规则：多个会话不能同时修改相同的数据。也就是说，在第一个事务完成并释放被修改行上的排他锁之前，其他会话无法获取该行上的排他锁。\n\
  \n事务隔离级别不影响排他锁的行为。即使在 `READ UNCOMMITTED` 模式下，排他锁也会被获取并持有直到事务结束。事务持续时间越长，排他锁持有时间也越长，这将增加发生阻塞的可能性。\n\
  \n### 意向锁\n\n尽管行级锁减少了系统中的阻塞，但仅在行级别保持锁从性能角度来看是不利的。考虑这样一种情况：一个会话需要独占访问一个表，例如在表结构变更期间。如果只存在行级锁，那么该会话就必须扫描整个表，检查是否存在任何行级锁。可以想象，这将是一个极其低效的过程，尤其是在大表上。\n\
  \nSQL Server 通过引入意向锁的概念来解决这种情况。意向锁在数据页和表级别持有，用以指示其子对象上存在锁。\n\n让我们运行清单 3-1 中的代码，检查在更新表中一行后持有哪些锁。该代码使用了\
  \ `sys.dm_tran_locks` 动态管理视图，它返回有关系统中当前锁请求的信息。\n\n值得注意的是，我使用了 `READ UNCOMMITTED`\
  \ 隔离级别来展示排他锁在任何事务隔离级别下都会被获取。\n\n```sql\nset transaction isolation level read uncommitted\n\
  begin tran\nupdate Delivery.Orders\nset Reference = 'New Reference'\nwhere OrderId\
  \ = 100;\nselect\nl.resource_type\n,case\nwhen l.resource_type = 'OBJECT'\nthen\n\
  object_name\n(\nl.resource_associated_entity_id,\nl.resource_database_id\n)\nelse\
  \ ''\nend as [table]\n,l.resource_description\n,l.request_type\n,l.request_mode\n\
  ,l.request_status\nfrom\nsys.dm_tran_locks l\nwhere\nl.request_session_id = @@spid;\n\
  commit\n-- 清单 3-1\n-- 更新一行并检查持有的锁\n```\n\n图 3-1 展示了 `SELECT` 语句的输出。可以看到，SQL Server\
  \ 在行（键）上持有排他锁，并在页和对象（表）上持有意向排他锁。`这些意向排他锁指示了存在行级别的排他锁。` 此外，数据库上还有一个共享锁，表明该会话正在访问它。我们将在本章后面介绍共享锁。\n\
  \n![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig1_HTML.jpg](img/463519_1_En_3_Fig1_HTML.jpg)\n\
  \n**图 3-1**\nUPDATE 语句后持有的锁\n\n`resource_description` 列指示了获取这些锁的资源。对于页，它指示了其物理位置（数据库文件\
  \ 1 中的页 944），对于行（键），它指示了索引键的哈希值。对于对象锁，你可以从视图中的 `resource_associated_entry_id` 列获取\
  \ `object_id`。\n\n当会话需要获取对象或页级别的锁时，它可以检查与表或页上持有的其他锁（意向或完全）的锁兼容性，而不是扫描表/页并检查那里的行级锁。\n\
  \n最后，值得注意的是，在某些情况下，SQL Server 可能在其他中间对象上获取意向锁，例如表分区或列存储索引中的行组。\n\n\n### 更新(U)锁\n\
  \nSQL Server 在数据修改过程中使用另一种锁类型——更新(U)锁，在搜索需要更新的行时获取它们。获取更新(U)锁后，SQL Server 会读取行并通过对照查询谓词检查行数据来评估是否需要更新该行。如果是这种情况，SQL\
  \ Server 会将更新(U)锁转换为排他(X)锁并执行数据修改。否则，更新(U)锁将被释放。\n\n让我们看一个例子，并运行代码清单 3-2 中的代码。\n\
  \n```\nbegin tran\nupdate Delivery.Orders\nset Reference = 'New Reference'\nwhere\
  \ OrderId in (1000, 5000);\ncommit\n代码清单 3-2\n使用聚集索引键作为谓词更新多行\n```\n\n图 3-2 展示了捕获\
  \ `lock_acquired` 和 `lock_released` 事件的扩展事件会话的输出。SQL Server 在页上获取了意向更新(IU)锁，在行上获取了更新(U)锁，随后将它们转换为意向排他(IX)锁和排他(X)锁。这些锁一直保持到事务结束，并在\
  \ `COMMIT` 时释放。\n\n![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig2_HTML.jpg](img/463519_1_En_3_Fig2_HTML.jpg)\n\
  *图 3-2：更新(U)锁和排他(X)锁*\n\n更新(U)锁的行为取决于执行计划。在某些情况下，SQL Server 首先在所有行上获取更新(U)锁，随后将它们转换为排他(X)锁。在其他情况下——例如，当你基于聚集索引键值仅更新一行时——SQL\
  \ Server 可以直接获取排他(X)锁，而完全不使用更新(U)锁。\n\n要获取的锁数量也很大程度上取决于执行计划。让我们运行 `UPDATE Delivery.Orders\
  \ SET Reference = 'Ref' WHERE OrderNum=\"1000\"` 语句，基于 `OrderNum` 列过滤数据。图 3-3 展示了获取和释放的锁以及处理的锁总数。\n\
  \n![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig3_HTML.jpg](img/463519_1_En_3_Fig3_HTML.jpg)\n\
  *图 3-3：查询执行期间的锁*\n\n`OrderNum` 列上没有索引，因此 SQL Server 需要执行*聚集索引扫描*，在表中的每一行上获取更新(U)锁。尽管该语句只更新了一行，却获取了超过一百万个锁。\n\
  \n这种行为说明了一个典型的阻塞场景。假设其中一个会话在单个行上持有一个排他(X)锁。如果另一个会话通过运行未优化的 `UPDATE` 语句来更新不同的行，SQL\
  \ Server 将在其扫描的每一行上获取一个更新(U)锁，并最终在尝试读取持有排他(X)锁的行时被阻塞。即使第二个会话最终并不需要更新该行——SQL Server\
  \ 仍然需要获取一个更新(U)锁来评估该行是否需要更新。\n\n### 共享(S)锁\n\n共享(S)锁由系统中的读取者——`SELECT` 查询——获取。顾名思义，共享(S)锁彼此兼容，多个会话可以在同一资源上持有共享(S)锁。\n\
  \n让我们运行表 3-1 中的代码来说明这一点。\n\n*表 3-1：共享(S)锁*\n\n| 会话 1 (SPID=53) | 会话 2 (SPID=55)\
  \ |\n| --- | --- |\n| `set transaction isolation level repeatable read`<br>`begin\
  \ tran`<br>`select OrderNum`<br>`from Delivery.Orders`<br>`where OrderId = 500;`\
  \ | `set transaction isolation level repeatable read`<br>`begin tran`<br>`select\
  \ OrderNum`<br>`from Delivery.Orders`<br>`where OrderId = 500;` |\n| `select`<br>`request_session_id`<br>`,resource_type`<br>`,resource_description`<br>`,request_type`<br>`,request_mode`<br>`,request_status`<br>`from\
  \ sys.dm_tran_locks;` |  |\n| `commit;` | `commit` |\n\n图 3-4 展示了 `sys.dm_tran_locks`\
  \ 视图的输出。如你所见，两个会话都在数据库上获取了共享(S)锁，在表和页(1:955)上获取了意向共享(IS)锁，并在行上获取了共享(S)锁，所有这些都没有相互阻塞。\n\
  \n![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig4_HTML.jpg](img/463519_1_En_3_Fig4_HTML.jpg)\n\
  *图 3-4：会话获取的锁*\n\n## 锁兼容性、行为和生命周期\n\n表 3-2 显示了锁兼容性矩阵，展示了锁类型之间的兼容性。\n\n*表 3-2：锁兼容性矩阵\
  \ (IS, S, U, X 锁)*\n\n| | (IS) | (S) | (IU) | (U) | (IX) | (X) |\n| --- | --- |\
  \ --- | --- | --- | --- | --- |\n| (IS) | 是 | 是 | 是 | 是 | 是 | 否 |\n| (S) | 是 | 是\
  \ | 是 | 是 | 否 | 否 |\n| (IU) | 是 | 是 | 是 | 否 | 是 | 否 |\n| (U) | 是 | 是 | 否 | 否 | 否\
  \ | 否 |\n| (IX) | 是 | 否 | 是 | 否 | 是 | 否 |\n| (X) | 否 | 否 | 否 | 否 | 否 | 否 |\n\n最重要的锁兼容性规则是：\n\
  \n1.  意向(IS/IU/IX)锁彼此兼容。意向锁表示在子对象上存在锁，多个会话可以同时在对象和页级别持有意向锁。\n2.  排他(X)锁彼此不兼容，也与任何其他锁类型不兼容。多个会话不能同时更新同一行。此外，获取共享(S)锁的读取者无法读取持有排他(X)锁的未提交行。\n\
  3.  更新(U)锁彼此不兼容，也与排他(X)锁不兼容。写入者不能同时评估行是否需要更新，也不能访问持有排他(X)锁的行。\n4.  更新(U)锁与共享(S)锁兼容。写入者可以评估行是否需要更新，而不会被读取者阻塞或阻塞读取者。值得注意的是，(S)/(U)\
  \ 锁兼容性是 SQL Server 在内部使用更新(U)锁的主要原因。它们减少了读取者和写入者之间的阻塞。\n\n正如你已经知道的，排他(X)锁的行为不依赖于事务隔离级别。写入者总是获取排他(X)锁并将其保持到事务结束。除了\
  \ `SNAPSHOT` 隔离级别外，更新(U)锁也是如此——写入者在扫描每一行时都会获取更新(U)锁，同时评估这些行是否需要更新。\n\n另一方面，共享(S)锁的行为取决于事务隔离级别。\n\
  \n\n\n### SQL Server 中的事务隔离级别与锁\n\nSQL Server 始终在事务上下文中处理数据。在这种情况下，当应用程序未使用 `BEGIN\
  \ TRAN` / `COMMIT` 语句启动显式事务时，SQL Server 会为语句的持续时间使用自动提交事务。即使是 `SELECT` 语句也在其自己的轻量级事务中运行。SQL\
  \ Server 不会将它们写入事务日志，尽管所有锁定和并发规则仍然适用。\n\n#### READ UNCOMMITTED 隔离级别\n\n使用 `READ\
  \ UNCOMMITTED` 隔离级别时，不会获取共享（S）锁。因此，读取器可以读取其他会话已修改并持有排他（X）锁的行。此隔离级别通过消除读取器和写入器之间的冲突来减少系统中的阻塞，代价是数据一致性。无论接下来发生什么（例如更改被回滚或一行被多次修改），读取器都会读取行的当前（已修改）版本。这解释了为什么此隔离级别通常被称为\
  \ `脏读`。\n\n表 3-3 中的代码说明了这一点。第一个会话运行 `DELETE` 语句，在行上获取排他（X）锁。第二个会话在 `READ UNCOMMITTED`\
  \ 模式下运行 `SELECT` 语句。\n\n**表 3-3：READ UNCOMMITTED 隔离级别一致性**\n\n| 会话 1 | 会话 2 |\n\
  | --- | --- |\n| `begin tran`       `delete from Delivery.Orders`       `where OrderId\
  \ = 95;` |   |\n|   | `-- 成功 / 无阻塞``set transaction isolation level read uncommitted;``select\
  \ OrderId, Amount``from Delivery.Orders``where OrderId between 94 and 96;` |\n|\
  \ `rollback;` |   |\n\n在 `READ UNCOMMITTED` 隔离级别中，读取器不获取共享（S）锁。会话 2 不会被阻塞，并将返回如图\
  \ 3-5 所示的结果集。它不包含 `OrderId=95` 的行，该行在第一个会话的未提交事务中已被删除，即使该事务随后被回滚。\n\n![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig5_HTML.jpg](img/463519_1_En_3_Fig5_HTML.jpg)\n\
  \n**图 3-5：READ UNCOMMITTED 和共享（S）锁行为**\n\n值得再次注意的是，排他（X）锁和更新（U）锁的行为不受事务隔离级别影响。即使在\
  \ `READ UNCOMMITTED` 模式下，你仍然会遇到写入器/写入器阻塞。\n\n#### READ COMMITTED 隔离级别\n\n在 `READ\
  \ COMMITTED` 隔离级别中，SQL Server 在读取行后立即获取并释放共享（S）锁。这保证了事务无法读取其他会话的未提交数据。让我们运行清单 3-3\
  \ 中的代码。\n\n```sql\nset transaction isolation level read committed;\nselect OrderId,\
  \ Amount\nfrom Delivery.Orders\nwhere OrderId in (90,91);\n-- 清单 3-3：在 READ COMMITTED\
  \ 隔离级别中读取数据\n```\n\n图 3-6 说明了 SQL Server 如何获取和释放锁。如你所见，行级锁被获取并立即释放。\n\n![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig6_HTML.jpg](img/463519_1_En_3_Fig6_HTML.jpg)\n\
  \n**图 3-6：READ COMMITTED 模式下的共享（S）锁行为**\n\n值得注意的是，在某些情况下，在 `READ COMMITTED` 模式下，SQL\
  \ Server 可能在 `SELECT` 语句的持续时间内持有共享（S）锁，仅在完成后才释放锁。一个这样的例子是从表中读取 LOB 列数据的查询。\n\n####\
  \ 提示\n\n不要在代码中选择不必要的列或使用 `SELECT *` 模式。这可能会引入性能开销并增加系统中的锁定。\n\n#### REPEATABLE READ\
  \ 隔离级别\n\n在 `REPEATABLE READ` 隔离级别中，SQL Server 获取共享（S）锁并一直持有到事务结束。这保证了其他会话在数据被读取后无法修改它。你可以通过运行清单\
  \ 3-3 的代码（将隔离级别更改为 `REPEATABLE READ`）来查看此行为。\n\n图 3-7 说明了 SQL Server 如何获取和释放锁。如你所见，SQL\
  \ Server 首先获取两个共享（S）锁，并在事务结束时释放它们。\n\n![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig7_HTML.jpg](img/463519_1_En_3_Fig7_HTML.jpg)\n\
  \n**图 3-7：REPEATABLE READ 模式下的共享（S）锁行为**\n\n#### SERIALIZABLE 隔离级别\n\n在 `SERIALIZABLE`\
  \ 隔离级别中，共享（S）锁也会一直持有到事务结束。但是，SQL Server 使用另一种称为 `范围锁` 的锁变体。范围锁（共享和排他）保护索引键范围，而不是单个行。\n\
  \n考虑一个 `Delivery.Orders` 表只有两行，`OrderId` 分别为 1 和 10 的情况。在 `REPEATABLE READ` 隔离级别中，`SELECT`\
  \ 语句将获取两个行级锁。其他会话将无法修改这些行，但仍然可以插入 `OrderId` 值介于两者之间的新行。在 `SERIALIZABLE` 隔离级别中，`SELECT`\
  \ 语句将获取一个范围共享（RangeS-S）锁，阻止其他会话在 `OrderId` 1 到 10 之间插入任何行。\n\n图 3-8 说明了 SQL Server\
  \ 在 `SERIALIZABLE` 隔离级别中如何获取和释放锁。\n\n![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig8_HTML.jpg](img/463519_1_En_3_Fig8_HTML.jpg)\n\
  \n**图 3-8：SERIALIZABLE 隔离级别下的共享（S）锁行为**\n\n#### 乐观隔离级别\n\n乐观隔离级别——`READ COMMITTED\
  \ SNAPSHOT` 和 `SNAPSHOT`——不获取共享（S）锁。当读取器（`SELECT` 查询）遇到一个持有排他（X）锁的行时，它们从 `tempdb`\
  \ 中的版本存储读取该行的旧（先前提交的）版本。写入器和未提交的数据修改不会在系统中阻塞读取器。\n\n从阻塞和并发的角度来看，`READ COMMITTED\
  \ SNAPSHOT` 与 `READ UNCOMMITTED` 具有相同的行为。这两个隔离级别都消除了系统中读取器/写入器阻塞的问题。然而，`READ COMMITTED\
  \ SNAPSHOT` 通过消除对未提交数据的访问和脏读，提供了更好的数据一致性。在绝大多数情况下，你不应该使用 `READ UNCOMMITTED`，而应改用\
  \ `READ COMMITTED SNAPSHOT`。\n\n#### 注意\n\n我们将在第 6 章中更深入地讨论乐观隔离级别。\n\n表 3-4 总结了\
  \ SQL Server 如何根据事务隔离级别处理共享（S）锁。\n\n**表 3-4：事务隔离级别和共享（S）锁行为**\n\n| 事务隔离级别 | 表提示\
  \ | 共享锁行为 |\n| --- | --- | --- |\n| `READ UNCOMMITTED` | `(NOLOCK)` | 不获取 (S) 锁\
  \ |\n| `READ COMMITTED` (默认) | `(READCOMMITTED)` | 获取 (S) 锁并立即释放 |\n| `REPEATABLE\
  \ READ` | `(REPEATABLEREAD)` | 获取 (S) 锁并持有到事务结束 |\n| `SERIALIZABLE` | `(SERIALIZABLE)`\
  \ 或 `(HOLDLOCK)` | 获取范围锁并持有到事务结束 |\n| `READ COMMITTED SNAPSHOT` | `N/A` | 不获取 (S)\
  \ 锁 |\n| `SNAPSHOT` | `N/A` | 不获取 (S) 锁 |\n\n你可以使用 `SET TRANSACTION ISOLATION LEVEL`\
  \ 语句在事务级别控制隔离级别和锁定行为，或者使用表锁定提示在表级别进行控制。\n\n可以在同一个查询中针对不同的表使用不同的隔离级别，如清单 3-4 所示。\n\
  \n```sql\nselect c.CustomerName, sum(o.Total) as [Total]\nfrom\ndbo.Customers c\
  \ with (READCOMMITTED) join\ndbo.Orders o with (SERIALIZABLE) on\no.CustomerId =\
  \ c.CustomerId\ngroup by\nc.CustomerName;\n-- 清单 3-4：使用表提示控制锁定行为\n```\n\n\n\n##\
  \ 注意事项\n\n著名的 `NOLOCK` 提示只是 `READ UNCOMMITTED` 表访问方式的同义词。\n\n最后，我想重申一点：除了 `SNAPSHOT`\
  \ 以外，所有事务隔离级别行为方式相同，都会在更新扫描期间使用更新 (`U`) 锁，并在数据修改期间使用排他 (`X`) 锁。这会导致系统中出现写入器/写入器阻塞。\n\
  \n`SNAPSHOT` 隔离级别在数据修改期间同样使用排他 (`X`) 锁。然而，它在更新扫描期间不使用更新 (`U`) 锁，而是从 `tempdb` 中的版本存储区读取行的旧版本。除非多个会话同时尝试更新相同的行，否则这消除了写入器/写入器阻塞。\n\
  \n### 事务隔离级别与数据一致性\n\n正如前一章已经提到的，我们可能会在系统中遇到几种并发现象。现在，让我们基于事务隔离级别的锁行为，来分析为什么这些现象是可能发生的。\n\
  \n*   **脏读**：当一个事务从其他未提交的事务中读取到未提交的（脏）数据时，就会出现此问题。尚不清楚这些活动事务是会提交还是回滚，或者数据在逻辑上是否一致。\n\
  \    从锁的角度看，在 `READ UNCOMMITTED` 隔离级别中，当会话不获取共享 (`S`) 锁并忽略其他会话的排他 (`X`) 锁时，就可能发生此现象。所有其他隔离级别都能避免脏读。悲观隔离级别使用共享\
  \ (`S`) 锁，当尝试访问持有排他 (`X`) 锁的未提交行时会被阻塞。而乐观隔离级别则从版本存储区读取行的旧的（先前提交的）版本。\n\n*   **不可重复读**：在同一个事务中，后续尝试读取相同的数据返回不同的结果。当其他事务在读取之间修改甚至删除数据时，就会出现这种数据不一致问题。设想一个情况：您正在生成一份报告，显示特定客户的订单列表以及一些汇总信息（例如，客户每月消费总额）。如果另一个会话在这些查询之间修改或删除了订单，结果集就会不一致。\n\
  \    从锁的角度来看，当会话在读取之间不保护/锁定数据时，就可能发生这种现象。在 `READ UNCOMMITTED` 和 `READ COMMITTED\
  \ SNAPSHOT` 隔离级别中（它们不使用共享 (`S`) 锁）以及在 `READ COMMITTED` 隔离级别中（当会话立即获取并释放共享 (`S`)\
  \ 锁时），都可能发生这种情况。`REPEATABLE READ` 和 `SERIALIZABLE` 隔离级别会持有共享 (`S)` 锁直到事务结束，这可以防止数据在被读取后遭到修改。\n\
  \    `SNAPSHOT` 隔离级别也能避免此现象，因为它处理的是事务开始时数据的快照。我们将在第 6 章深入讨论它。\n\n*   **幻读**：此现象发生在同一个事务中的后续读取返回新行（即该事务之前未读取过的行）时。回想一下前面的例子，如果在查询执行期间，另一个会话插入了一个新订单。只有\
  \ `SERIALIZABLE` 和 `SNAPSHOT` 隔离级别能避免此现象。`SERIALIZABLE` 使用范围锁，而 `SNAPSHOT` 访问事务开始时数据的快照。\n\
  \n另外两种现象与因索引键值更改导致的数据移动有关。这两种现象都不会在乐观隔离级别中发生。\n\n*   **重复读**：当一个查询多次返回相同的行时，就会出现此问题。考虑一个查询，它返回特定时间间隔内的订单列表，在执行期间扫描\
  \ `OrderDate` 列上的索引。如果另一个查询更改了 `OrderDate` 值，将行从已处理（扫描过）的索引部分移动到未处理部分，那么该行将被读取两次。\n\
  \    这种情况类似于不可重复读，当读取器在 `READ UNCOMMITTED` 和 `READ COMMITTED` 隔离级别中读取行后不持有共享 (`S`)\
  \ 锁时，就可能发生。\n\n*   **跳过的行**：当查询没有返回某些行时，就会发生此现象。在类似重复读描述的条件下，如果行从索引的未处理部分移动到已处理部分，就可能发生这种情况。`SERIALIZABLE`\
  \ 隔离级别（锁定索引键范围区间）以及乐观隔离级别——`READ COMMITTED SNAPSHOT` 和 `SNAPSHOT`——都能避免此现象。\n\n\
  表 3-5 总结了不同事务隔离级别下的数据不一致问题。\n\n表 3-5：事务隔离级别与数据不一致异常\n\n| | 脏读 | 不可重复读 | 重复读 | 幻读\
  \ | 跳过的行 |\n| :--- | :--- | :--- | :--- | :--- | :--- |\n| `READ UNCOMMITTED` |\
  \ 是 | 是 | 是 | 是 | 是 |\n| `READ COMMITTED` | 否 | 是 | 是 | 是 | 是 |\n| `REPEATABLE READ`\
  \ | 否 | 否 | 否 | 是 | 是 |\n| `SERIALIZABLE` | 否 | 否 | 否 | 否 | 否 |\n| `READ COMMITTED\
  \ SNAPSHOT` | 否 | 是 | 否 | 是 | 否 |\n| `SNAPSHOT` | 否 | 否 | 否 | 否 | 否 |\n\n`SERIALIZABLE`\
  \ 和 `SNAPSHOT` 是唯一能保护您免受数据不一致问题影响的事务隔离级别。然而，两者都有缺点。`SERIALIZABLE` 在数据易变的系统中可能因过度加锁而引入严重的阻塞问题和死锁。另一方面，`SNAPSHOT`\
  \ 可能导致显著的 `tempdb` 负载以及写入/写入冲突错误。请谨慎使用它们！\n\n### 与锁相关的表提示\n\n除了我们已经介绍的隔离级别相关提示外，还有其他几个与锁相关的表提示。\n\
  \n您可以使用 `(UPDLOCK)` 和 `(XLOCK)` 表提示来控制读取器获取的锁类型。这些提示强制 `SELECT` 查询分别使用更新 (`U`) 锁和排他\
  \ (`X`) 锁，而不是共享 (`S`) 锁。当您需要防止多个 `SELECT` 查询同时读取相同的行时，这会非常有用。\n\n清单 3-5 展示了一个这样的例子，在系统中实现自定义计数器。`SELECT`\
  \ 语句使用了更新 (`U`) 锁，这将阻止其他会话读取相同的计数器行，直到事务提交。\n\n\n\n#### 注意\n\n此代码仅用于演示目的，并未处理计数器表中不存在特定计数器的情况。最好使用\
  \ `SEQUENCE` 对象代替。\n\n```sql\nbegin tran\nselect @Value = Value\nfrom dbo.Counters\
  \ with (UPDLOCK)\nwhere CounterName = @CounterName;\nupdate dbo.Counters\nset Value\
  \ += @ReserveCount\nwhere CounterName = @CounterName;\ncommit\n```\n**代码清单 3-5:\
  \ 计数器表管理**\n\n有几种锁提示可以帮助你控制锁的粒度。`(TABLOCK)` 和 `(TABLOCKX)` 提示强制 SQL Server 获取共享（S）或排他（X）表级锁。使用\
  \ `(TABLOCK)` 提示时，锁的类型取决于语句——读取器获取共享（S）锁，写入器获取排他（X）锁。而 `(TABLOCKX)` 提示则始终在表上获取排他（X）锁，即使对于读取器也是如此。\n\
  \n正如我已经提到的，SQL Server 在某些情况下可能会决定使用更低粒度的锁。例如，在扫描过程中，SQL Server 可能决定使用完整的（非意向）页锁，而不是在页的每一行上都获取行级锁。然而，这种行为并不保证，但可以在一定程度上通过\
  \ `(PAGLOCK)` 和 `(ROWLOCK)` 提示来控制。\n\n`(PAGLOCK)` 提示强制 SQL Server 在页级别而非行级别使用完整锁。或者，`(ROWLOCK)`\
  \ 提示阻止 SQL Server 使用完整的页级锁，强制其使用行级锁。和往常一样，这两种方法都有利弊，在绝大多数情况下，最好允许 SQL Server 选择合适的锁定策略，而不是使用这些提示。\n\
  \n`(READPAST)` 提示允许会话跳过那些被其他会话持有不兼容锁的行，而不是被阻塞。你将在第 10 章看到一个此类提示有用的示例。或者，`(NOWAIT)`\
  \ 提示会在 SQL Server 遇到其他会话持有的不兼容行或页级锁时立即触发错误。\n\n只要多个锁提示彼此不冲突，你就可以将它们组合在一起。代码清单 3-6\
  \ 展示了这样一个例子。第一个 `SELECT` 语句将使用页级排他（X）锁。第二个 `SELECT` 语句将使用行级锁，并且由于 `(REPEATABLEREAD)`\
  \ 提示，共享（S）锁会一直保持到事务结束，同时它会跳过持有不兼容锁类型的行。最后，第三个语句将由于锁提示组合冲突而失败。\n\n```sql\nselect\
  \ OrderId, OrderDate\nfrom Delivery.Orders with (PAGLOCK XLOCK)\nwhere CustomerId\
  \ = @CustomerId;\nselect OrderId, OrderDate\nfrom Delivery.Orders with (ROWLOCK\
  \ REPEATABLEREAD READPAST)\nwhere CustomerId = @CustomerId;\nselect OrderId, OrderDate\n\
  from Delivery.Orders with (NOLOCK TABLOCK)\nwhere CustomerId = @CustomerId;\n```\n\
  **代码清单 3-6: 组合锁提示**\n\n#### 注意\n\n有关表提示的更多信息，请访问 [`https://docs.microsoft.com/en-us/sql/t-sql/queries/hints-transact-sql-table`](https://docs.microsoft.com/en-us/sql/t-sql/queries/hints-transact-sql-table)。\n\
  \n最后是 `SET LOCK_TIMEOUT` 选项，它可以在会话级别使用，以控制会话应等待锁请求被授予的时间。如果请求无法在指定的间隔内被授予，SQL Server\
  \ 会生成一个错误。值为 -1 表示无超时，值为 0 表示立即超时，类似于 `(NOWAIT)` 提示。\n\nSQL Server 处理锁超时错误的方式与系统中其他错误类似。除非你将\
  \ `XACT_ABORT` 选项设置为 `ON`，否则该错误不会终止批处理，也不会使显式事务变为不可提交。正如我们在上一章讨论的那样，你需要将此行为纳入错误处理策略中。\n\
  \n另外，请记住 `SET LOCK_TIMEOUT` 不会覆盖 SQL 客户端的 `CommandTimeout` 值。当语句执行时间超过 `CommandTimeout`\
  \ 时，无论等待的根本原因是什么，客户端调用都会失败。\n\n\n\n## 转换锁\n\n`转换锁`是你在生产环境中可能遇到的另一组锁类型。它们是完全锁和意向锁的组合，可以在页和对象级别获取。当\
  \ SQL Server 需要*扩展*已获取的完全锁（附加一个意向锁），或者用另一种不同类型的完全锁来扩展已获取的意向锁时，就会使用它们。你可以将它们视为一种内部优化，使得会话能够避免在同一个资源上持有多个锁。\n\
  \n让我们看一个例子，并运行代码清单 3-7 中的代码。第一步，我们将在活动事务中使用 `(REPEATABLEREAD TABLOCK)` 提示运行一个 `SELECT`\
  \ 语句。这些提示将强制该语句获取对象级锁并在事务持续期间持有它。\n\n```\nbegin tran\nselect top 10 OrderId, Amount\n\
  from Delivery.Orders with (REPEATABLEREAD TABLOCK)\norder by OrderId;\nselect\n\
  l.resource_type\n,case\nwhen l.resource_type = 'OBJECT'\nthen\nobject_name\n(\n\
  l.resource_associated_entity_id\n,l.resource_database_id\n)\nelse ''\nend as [table]\n\
  ,l.resource_description\n,l.request_type\n,l.request_mode\n,l.request_status\nfrom\n\
  sys.dm_tran_locks l\nwhere\nl.request_session_id = @@spid;\n代码清单 3-7\n转换锁：运行 SELECT\
  \ 语句\n```\n\n图 3-9 说明了该语句获取的锁。你可以看到对象级别的共享 (S) 锁已就位。\n\n![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig9_HTML.jpg](img/463519_1_En_3_Fig9_HTML.jpg)\n\
  \n图 3-9：转换锁：由 SELECT 语句持有的锁\n\n现在，让我们在同一个活动事务中运行另一个更新其中一行的查询，如代码清单 3-8 所示。\n\n```\n\
  update Delivery.Orders\nset Amount *= 0.95\nwhere OrderId = 100;\n代码清单 3-8\n转换锁：运行\
  \ UPDATE 语句\n```\n\n此操作要求 SQL Server 在行上获取排他 (X) 锁，并在页和对象级别获取意向排他 (IX) 锁。然而，该表已经持有一个完全共享\
  \ (S) 锁，SQL Server 将其替换为 `共享意向排他 (SIX)` 锁，如图 3-10 所示。\n\n![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig10_HTML.jpg](img/463519_1_En_3_Fig10_HTML.jpg)\n\
  \n图 3-10：转换锁：UPDATE 语句之后持有的锁\n\n除了 `SIX` 之外，还有另外两种转换锁：\n\n*   `共享意向更新 (SIU)` 锁在更新扫描期间获取，此时\
  \ SQL Server 需要在已持有共享 (S) 锁的同一资源上获取意向更新 (IU) 锁。\n*   `更新意向排他 (UIX)` 锁可能在 SQL Server\
  \ 需要在已持有更新 (U) 锁的资源上获取意向排他 (IX) 锁时获取。此锁类型通常在更新扫描期间用于数据页，此时 SQL Server 使用页级而不是行级锁定。在此模式下，SQL\
  \ Server 首先获取页级更新 (U) 锁，如果该页上的某些行需要更新，则将其更改为更新意向排他 (UIX) 锁。值得注意的是，SQL Server 之后不会将页级\
  \ (UIX) 锁替换为意向排他 (IX) 锁，而是会保持 (UIX) 锁直到事务结束。\n\n简而言之，转换锁由两种不同的锁类型组成。其他锁需要与两者都兼容才能被授予。例如，意向共享\
  \ (IS) 锁与共享意向排他 (SIX) 锁兼容，因为 (IS) 锁与 (S) 和 (IX) 锁都兼容。另一方面，意向排他 (IX) 锁由于与 (S) 锁不兼容，因此与\
  \ (SIX) 锁不兼容。\n\n#### 注意\n\n本章中的表 3-2 展示了常规锁的锁兼容性矩阵。\n\n## 总结\n\nSQL Server 使用锁来支持数据隔离和一致性规则，并使用行级锁作为最高的粒度级别。\n\
  \n排他 (X) 锁在修改数据时由写入者获取。无论隔离级别如何，排他 (X) 锁总是被获取并持有到事务结束。更新 (U) 锁在写入者评估是否需要修改数据时获取。如果数据需要更新，这些锁将转换为排他\
  \ (X) 锁，否则将被释放。意向 (I*) 锁在对象和页级别获取，表示存在相同类型的子行级锁。\n\n除了 `READ UNCOMMITED` 隔离级别外，SQL\
  \ Server 在悲观隔离级别下读取数据时会获取共享 (S) 锁。事务隔离级别控制何时释放共享 (S) 锁。在 `READ COMMITTED` 隔离级别中，这些锁在行被读取后立即释放。在\
  \ `REPEATABLE READ` 和 `SERIALIZABLE` 隔离级别中，共享 (S) 锁将持有到事务结束。此外，在 `SERIALIZABLE`\
  \ 隔离级别中，SQL Server 使用范围锁来锁定索引键的范围，而不是锁定单个行。\n\n乐观隔离级别依赖于行版本控制，并从 `tempdb` 中的版本存储区读取行的旧（先前提交的）版本。`READ\
  \ COMMMITTED SNAPSHOT` 具有与 `READ UNCOMMITTED` 相同的阻塞行为；然而，它通过防止访问未提交的脏数据提供了更好的数据一致性。你应该使用\
  \ `READ COMMITTED SNAPSHOT` 而不是 `READ UNCOMMITTED`。\n\n你可以使用 `SET TRANSACTION ISOLATION\
  \ LEVEL` 语句在事务级别控制事务隔离级别，或者在单个查询中使用表锁定提示在表级别控制。\n\n"
- '# 4. 系统中的阻塞


  阻塞可能是系统中遇到的最常见的并发问题之一。当阻塞发生时，多个查询相互阻塞，这增加了查询的执行时间并导致超时。所有这些都会对用户体验系统产生负面影响。


  本章将展示如何对系统中的阻塞问题进行故障排除。它将说明如何实时分析阻塞情况并收集信息以供进一步分析。




  ## 通用的故障排查方法


  当多个会话争用同一资源时，就会发生阻塞。在某些情况下，这是正确且预期的行为；例如，多个会话无法同时更新同一行。然而，在许多情况下，阻塞是意外发生的，这是因为查询试图获取不必要的锁。


  系统中总是存在一定程度的阻塞，这完全正常。然而，不正常的是过度的阻塞。从最终用户的角度来看，过度阻塞会表现为一般的性能问题。系统运行缓慢、查询超时，并且经常出现死锁。


  除了死锁，系统缓慢并不一定是阻塞问题的迹象——许多其他因素都可能对性能产生负面影响。但是，阻塞问题确实可能导致系统整体变慢。


  在性能故障排查的初始阶段，你应该从系统的全局视角出发，找出需要解决的最关键问题。正如你可能猜到的那样，阻塞和并发问题可能在这个列表中，也可能不在。我们将在第 12
  章讨论如何进行这种全局分析，而本章将重点讨论通用的阻塞故障排查。


  简而言之，要排查阻塞问题，必须遵循以下步骤：

  1.  检测涉及阻塞的查询。

  2.  找出阻塞发生的原因。

  3.  修复问题的根本原因。


  SQL Server 提供了几个可以帮助你完成这些任务的工具。这些工具可以分为两个不同的类别。第一类由动态管理视图组成，你可以使用它们来排查系统当前正在发生的情况。当你在阻塞发生时能够访问系统并希望进行实时故障排查时，这些工具非常有用。


  第二类工具允许你收集有关系统中阻塞问题的信息，并将其保留以供进一步分析。让我们详细看看这两类工具。


  ## 实时排查阻塞问题


  用于实时阻塞排查的关键工具是 `sys.dm_tran_locks` 动态管理视图，它提供有关系统中当前活动锁请求的信息。它会返回一个锁请求列表及其类型、请求状态（`GRANT`
  或 `WAIT`）、有关请求锁的资源的信息以及其他几个有用的属性。


  表 4-1 展示了导致阻塞情况的代码。


  表 4-1

  导致阻塞情况的代码


  | 会话 1 (SPID=52) | 会话 2 (SPID=53) | 注释 |

  | --- | --- | --- |

  | `begin tran`        `delete from Delivery.Orders`        `where OrderId = 95`
  |   | 会话 1 在 OrderId=95 的行上获取了排他 (X) 锁 |

  |   | `select OrderId, Amount``from Delivery.Orders``with (readcommitted)``where
  OrderNum = ''1000''` | 会话 2 被阻塞，试图在 OrderId=95 的行上获取共享 (S) 锁 |

  | `rollback` |   |   |


  图 4-1 显示了阻塞发生时，`sys.dm_tran_locks`、`sys.dm_os_waiting_tasks` 和 `sys.dm_exec_requests`
  视图的部分输出。如你所见，会话 53 正在等待对由会话 52 持有排他 (X) 锁的行获取共享 (S) 锁。输出中的 `LCK_M_S` 等待类型表示共享 (S)
  锁等待。我们将在第 12 章更详细地讨论等待类型。


  ![../images/463519_1_En_4_Chapter/463519_1_En_4_Fig1_HTML.jpg](img/463519_1_En_4_Fig1_HTML.jpg)

