  ## 总结


  当多个会话使用不兼容的锁类型竞争相同资源时，就会发生阻塞。故障排除过程需要您检测涉及阻塞的查询，找到问题的根本原因并解决它。


  `sys.dm_tran_locks` 数据管理视图为您提供有关系统中所有活动锁请求的信息。它可以帮助您实时检测阻塞条件。您可以将此视图与其他 DMV（如 `sys.dm_exec_requests`、`sys.dm_exec_query_stats`、`sys.dm_exec_sessions`
  和 `sys.dm_os_waiting_tasks`）联接，以获取有关涉及阻塞条件的会话和查询的更多信息。


  SQL Server 可以生成阻塞进程报告，为您提供有关阻塞的信息，您可以收集并保留以供进一步分析。您可以使用 SQL 跟踪、扩展事件和事件通知来捕获它。


  在大量情况下，阻塞是由非优化查询引入的过度扫描引起的。您应该分析阻塞和被阻塞查询的执行计划，以检测和优化低效之处。


  另一个导致阻塞的常见问题是代码中不正确的事务管理，包括失控的事务以及在打开事务期间与用户交互等。


  '
- "# 5. 死锁\n\n死锁是一种特殊的阻塞情况，当多个会话（有时是单个会话内的多个执行线程）相互阻塞时发生。当它发生时，SQL Server 会终止其中一个会话，允许其他会话继续。\n\
  \n本章将演示为什么系统中会发生死锁，并解释如何对它们进行故障排除和解决。\n\n## 经典死锁\n\n经典死锁发生在两个或更多会话竞争同一组资源时。让我们看一个典型的例子，假设您有两个会话以相反的顺序更新表中的两行。\n\
  \n作为第一步，会话 1 更新行 *R1*，会话 2 更新行 *R2*。您知道此时两个会话都在行上获取并保持排他 (X) 锁。您可以在图 5-1 中看到这种情况。\n\
  \n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig1_HTML.png](img/463519_1_En_5_Fig1_HTML.png)\n\
  \n图 5-1\n\n经典死锁：步骤 1\n\n接下来，我们假设会话 1 想要更新行 *R2*。它将尝试获取 *R2* 上的排他 (X) 锁，但由于会话 2 已经持有的排他\
  \ (X) 锁而被阻塞。如果会话 2 想要更新 R1，同样的事情会发生——它将被会话 1 持有的排他 (X) 锁阻塞。正如您所看到的，此时两个会话都在等待对方，无法继续执行。这代表了*经典*或*循环*死锁，如图\
  \ 5-2 所示。\n\n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig2_HTML.jpg](img/463519_1_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2\n\n经典死锁：步骤 2\n\n系统任务 *Deadlock Monitor* 每五秒唤醒一次，检查系统中是否有任何死锁。检测到死锁时，SQL\
  \ Server 会回滚其中一个事务并显示错误 1205。这会释放该事务中持有的所有锁，并允许其他会话继续。\n\n#### 注意\n\n如果系统中存在死锁，死锁监视器唤醒间隔会缩短。在某些情况下，它可能每秒唤醒多达十次。\n\
  \n选择哪个会话作为死锁受害者的决定取决于几个因素。默认情况下，SQL Server 会回滚使用较少日志空间进行事务的会话。您可以通过使用 `SET DEADLOCK_PRIORITY`\
  \ 选项为会话设置死锁优先级来在一定程度上控制它。\n\n## 因未优化查询导致的死锁\n\n经典的死锁通常发生在数据高度易变且多个会话更新相同行时，但死锁还有另一个常见原因。它是由于未优化查询引入的扫描操作所导致的。让我们看一个例子：假设你有一个进程，它更新\
  \ `Delivery.Orders` 表中的一行，然后查询该客户有多少订单。让我们看看当两个这样的会话使用 `READ COMMITTED` 事务隔离级别并行运行时会发生什么。\n\
  \n第一步，两个会话执行两条 `UPDATE` 语句。这两条语句都能顺利运行，不会涉及阻塞——正如你所记得的，该表在 `OrderId` 列上有聚集索引，因此执行计划中会有\
  \ *聚集索引 seek* 操作符。图 5-3 展示了这一步。\n\n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig3_HTML.png](img/463519_1_En_5_Fig3_HTML.png)\n\
  \n**图 5-3** 由扫描导致的死锁：第一步\n\n此时，两个会话都在其更新的行上持有排他锁。作为第二步，会话运行基于 `CustomerId` 过滤器的\
  \ `SELECT` 语句。该表上没有非聚集索引，因此执行计划中将包含 *聚集索引扫描* 操作。在 `READ COMMITTED` 隔离级别下，SQL Server\
  \ 在读取数据时会获取共享锁，结果就是，一旦两个会话尝试读取已被持有排他锁的行，它们就会被阻塞。图 5-4 展示了这种情况。\n\n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig4_HTML.jpg](img/463519_1_En_5_Fig4_HTML.jpg)\n\
  \n**图 5-4** 由扫描导致的死锁：第二步\n\n如果在两个会话都被阻塞之后、死锁监视器任务唤醒之前，你运行清单 5-1 所示的查询，你会看到两个会话正在互相阻塞。\n\
  \n```sql\nselect\ntl.request_session_id as [SPID]\n,tl.resource_type as [Resouce\
  \ Type]\n,tl.resource_description as [Resource]\n,tl.request_mode as [Mode]\n,tl.request_status\
  \ as [Status]\n,wt.blocking_session_id as [Blocked By]\nfrom\nsys.dm_tran_locks\
  \ tl with (nolock) left outer join\nsys.dm_os_waiting_tasks wt with (nolock) on\n\
  tl.lock_owner_address = wt.resource_address and\ntl.request_status = 'WAIT'\nwhere\n\
  tl.request_session_id <> @@SPID and tl.resource_type = 'KEY'\norder by\ntl.request_session_id\n\
  ```\n\n**清单 5-1** 两个会话被阻塞时的锁请求\n\n图 5-5 显示了该查询的输出。如你所见，两个会话正在互相阻塞。即使这些会话并不打算将这些行包含在计数计算中，这也无关紧要。在共享锁被获取且行被读取之前，SQL\
  \ Server 无法评估 `CustomerId` 谓词。\n\n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig5_HTML.jpg](img/463519_1_En_5_Fig5_HTML.jpg)\n\
  \n**图 5-5** 死锁发生时的锁请求\n\n在任何读者需要获取共享锁的事务隔离级别中，你都会遇到类似的死锁。在 `READ UNCOMMITTED`、`READ\
  \ COMMITTED SNAPSHOT` 或 `SNAPSHOT` 这些不使用共享锁的隔离级别下，则不会发生这种死锁。\n\n尽管如此，在 `READ UNCOMMITTED`\
  \ 和 `READ COMMITTED SNAPSHOT` 隔离级别下，你仍可能因为写入者冲突而发生死锁。你可以在前面的例子中将 `SELECT` 语句替换为引入扫描操作的\
  \ `UPDATE` 语句来触发它。另一方面，`SNAPSHOT` 隔离级别除非在你更新相同行的情况下，否则不会发生写入者/写入者阻塞，即使使用 `UPDATE`\
  \ 语句也不会导致死锁。\n\n查询优化有助于修复由扫描和未优化查询引起的死锁。在上述案例中，你可以通过在 `CustomerId` 列上添加一个非聚集索引来解决问题。这会改变\
  \ `SELECT` 语句的执行计划，用 *非聚集索引 seek* 替换掉 *聚集索引扫描*。结果，会话将无需读取被另一个会话修改过且持有不兼容锁的行。\n\n\
  ## 键查找死锁\n\n在某些情况下，当多个会话尝试同时读取和更新同一行时，可能会发生死锁。\n\n假设你表上有一个非聚集索引，一个会话想要使用该索引来读取该行。如果该索引不是覆盖索引，并且会话需要从聚集索引中获取一些数据，SQL\
  \ Server 生成的执行计划可能包含 `非聚集索引 seek` 和 `键查找` 操作。该会话将首先在非聚集索引行上获取共享锁，然后在聚集索引行上获取共享锁。\n\
  \n同时，如果你有另一个会话，它使用聚集键值作为查询谓词来更新属于该非聚集索引的一部分的某个列，那么该会话将以相反的顺序获取排他锁；即先在聚集索引行上获取排他锁，然后在非聚集索引行上获取。\n\
  \n图 5-6 显示了第一步之后发生的情况：两个会话都成功地在聚集索引和非聚集索引的行上获取了锁。\n\n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig6_HTML.jpg](img/463519_1_En_5_Fig6_HTML.jpg)\n\
  \n**图 5-6** 键查找死锁：第一步\n\n在下一步中，两个会话都尝试在另一个索引的行上获取锁，结果如图 5-7 所示，它们被阻塞了。\n\n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig7_HTML.jpg](img/463519_1_En_5_Fig7_HTML.jpg)\n\
  \n**图 5-7** 键查找死锁：第二步\n\n如果这恰好同时发生，你就会遇到死锁，并且读取数据的会被选作死锁牺牲品。这是我们之前看到的典型循环死锁的一个例子。尽管两个会话操作的是单表单行，但\
  \ SQL Server 在内部处理的是两行——分别位于聚集索引和非聚集索引中。\n\n你可以通过将非聚集索引设为覆盖索引并避免 `键查找` 操作来解决这类死锁。不幸的是，这种方案会增加非聚集索引中叶子行的大小，并在数据修改和索引维护期间引入额外开销。或者，你可以使用乐观隔离级别，并切换到\
  \ `READ COMMITTED SNAPSHOT` 模式，在该模式下，读取者不获取共享锁。\n\n## 死锁：因同一行被多次更新而引发\n\n一种与之前类似的死锁模式，可能会因对同一行进行多次更新而引入，特别是当这些更新访问或修改了位于不同索引中的列时。这可能导致一种死锁情况——类似于键查找死锁——即另一个会话在更新操作之间锁定了非聚集索引行。一个常见的场景是使用\
  \ `AFTER UPDATE` 触发器来更新同一行。\n\n让我们看一个场景：你有一个同时包含聚集索引和非聚集索引的表，并且定义了 `AFTER UPDATE`\
  \ 触发器。让会话 1 更新一个不属于非聚集索引的列。此步骤如图 5-8 所示。它仅获取聚集索引上该行的排他锁（X 锁）。\n\n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig8_HTML.jpg](img/463519_1_En_5_Fig8_HTML.jpg)\n\
  *图 5-8：因同一行多次更新导致的死锁：步骤 1*\n\n更新操作触发了 `AFTER UPDATE` 触发器。同时，假设另一个会话正尝试通过非聚集索引选择同一行。该会话在非聚集索引查找操作期间，成功获取了非聚集索引行上的共享锁（S\
  \ 锁）。然而，在尝试键查找操作以获取聚集索引行上的共享锁（S 锁）时，它将被阻塞，如图 5-9 所示。\n\n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig9_HTML.jpg](img/463519_1_En_5_Fig9_HTML.jpg)\n\
  *图 5-9：因同一行多次更新导致的死锁：步骤 2*\n\n最后，如果会话 1 中的触发器尝试再次更新同一行，修改存在于非聚集索引中的列，它将被会话 2 持有的共享锁（S\
  \ 锁）阻塞。图 5-10 说明了这种情况。\n\n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig10_HTML.jpg](img/463519_1_En_5_Fig10_HTML.jpg)\n\
  *图 5-10：因同一行多次更新导致的死锁*\n\n让我们通过清单 5-2 中的代码来验证这一点。\n\n```sql\ncreate table dbo.T1\n\
  (\nCI_Key int not null,\nNCI_Key int not null,\nCI_Col varchar(32),\nNCI_Included_Col\
  \ int\n);\ncreate unique clustered index IDX_T1_CI on dbo.T1(CI_Key);\ncreate nonclustered\
  \ index IDX_T1_NCI\non dbo.T1(NCI_Key)\ninclude (NCI_Included_Col);\ninsert into\
  \ dbo.T1(CI_Key,NCI_Key,CI_Col,NCI_Included_Col)\nvalues(1,1,'a',0), (2,2,'b',0),\
  \ (3,3,'c',0), (4,4,'d',0);\nbegin tran\nupdate dbo.T1 set CI_Col = 'abc' where\
  \ CI_Key = 1;\nselect\nl.request_session_id as [SPID]\n,object_name(p.object_id)\
  \ as [Object]\n,i.name as [Index]\n,l.resource_type as [Lock Type]\n,l.resource_description\
  \ as [Resource]\n,l.request_mode as [Mode]\n,l.request_status as [Status]\n,wt.blocking_session_id\
  \ as [Blocked By]\nfrom\nsys.dm_tran_locks l join sys.partitions p on\np.hobt_id\
  \ = l.resource_associated_entity_id\njoin sys.indexes i on\np.object_id = i.object_id\
  \ and p.index_id = i.index_id\nleft outer join sys.dm_os_waiting_tasks wt with (nolock)\
  \ on\nl.lock_owner_address = wt.resource_address and\nl.request_status = 'WAIT'\n\
  where\nresource_type = 'KEY' and request_session_id = @@SPID;\nupdate dbo.T1 set\
  \ NCI_Included_Col = 1 where NCI_Key = 1\nselect\nl.request_session_id as [SPID]\n\
  ,object_name(p.object_id) as [Object]\n,i.name as [Index]\n,l.resource_type as [Lock\
  \ Type]\n,l.resource_description as [Resource]\n,l.request_mode as [Mode]\n,l.request_status\
  \ as [Status]\n,wt.blocking_session_id as [Blocked By]\nfrom\nsys.dm_tran_locks\
  \ l join sys.partitions p on\np.hobt_id = l.resource_associated_entity_id\njoin\
  \ sys.indexes i on\np.object_id = i.object_id and p.index_id = i.index_id\nleft\
  \ outer join sys.dm_os_waiting_tasks wt with (nolock) on\nl.lock_owner_address =\
  \ wt.resource_address and\nl.request_status = 'WAIT'\nwhere\nresource_type = 'KEY'\
  \ and request_session_id = @@SPID;\ncommit\n```\n*清单 5-2：同一行的多次更新*\n\n清单 5-2 中的代码对该行执行了两次更新。如果你查看第一次更新后持有的行级锁，你会看到仅在聚集索引上持有一个锁，如图\
  \ 5-11 所示。\n\n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig11_HTML.jpg](img/463519_1_En_5_Fig11_HTML.jpg)\n\
  *图 5-11：第一次更新后的行级锁*\n\n第二次更新（修改了存在于非聚集索引中的列）在那里放置了另一个排他锁（X 锁），如图 5-12 所示。这证明了，除非实际更新了索引列，否则不会在非聚集索引行上获取锁。\n\
  \n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig12_HTML.jpg](img/463519_1_En_5_Fig12_HTML.jpg)\n\
  *图 5-12：第二次更新后的行级锁*\n\n现在，让我们看另一个 `SPID = 55` 的会话，在两次更新之间运行清单 5-3 中所示的 `SELECT`\
  \ 语句，此时你只有一个行级锁被持有。\n\n```sql\nselect CI_Key, CI_Col\nfrom dbo.T1 with (index =\
  \ IDX_T1_NCI)\nwhere NCI_Key = 1\n```\n*清单 5-3：导致死锁的代码*\n\n如图 5-13 所示，该查询成功获取了非聚集索引行上的共享锁（S\
  \ 锁），并因尝试获取聚集索引行上的锁而被阻塞。\n\n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig13_HTML.jpg](img/463519_1_En_5_Fig13_HTML.jpg)\n\
  *图 5-13：SELECT 查询被阻塞时的行级锁*\n\n如果你在原始会话（`SPID = 56`）中运行第二个更新语句，它将尝试获取非聚集索引上的排他锁（X\
  \ 锁），并会被第二个（`SELECT`）会话阻塞，如图 5-14 所示。这便导致了死锁条件。\n\n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig14_HTML.jpg](img/463519_1_En_5_Fig14_HTML.jpg)\n\
  *图 5-14：第二次更新运行时的行级锁（死锁）*\n\n## 避免死锁的方法\n\n避免此类问题的最佳方法是消除对同一行的多次更新。你可以使用变量或临时表来存储初步数据，并在事务接近结束时运行单一的\
  \ `UPDATE` 语句。或者，你可以修改代码，在第一次 `UPDATE` 语句中为 `NCI_Included_Col` 分配一个临时值，该语句将在两个索引上获取排他（X）锁。来自第二个会话的\
  \ `SELECT` 语句将无法在非聚集索引上获取锁，因此第二个更新可以正常运行。\n\n作为最后的手段，你可以使用需要两个索引都使用 `(XLOCK)` 锁定提示的计划来读取行，这将同时在两行上放置排他（X）锁，如清单\
  \ 5-4 和图 5-15 所示。显然，你需要考虑这会带来的开销。\n\n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig15_HTML.jpg](img/463519_1_En_5_Fig15_HTML.jpg)\n\
  \n**图 5-15** 使用 `(XLOCK)` 提示的 SELECT 语句后的行级锁\n\n```\nbegin tran\ndeclare\n@Dummy\
  \ varchar(32)\nselect @Dummy = CI_Col\nfrom dbo.T1 with (XLOCK index=IDX_T1_NCI)\n\
  where NCI_Key = 1;\nselect\nl.request_session_id as [SPID]\n,object_name(p.object_id)\
  \ as [Object]\n,i.name as [Index]\n,l.resource_type as [Lock Type]\n,l.resource_description\
  \ as [Resource]\n,l.request_mode as [Mode]\n,l.request_status as [Status]\n,wt.blocking_session_id\
  \ as [Blocked By]\nfrom\nsys.dm_tran_locks l join sys.partitions p on\np.hobt_id\
  \ = l.resource_associated_entity_id\njoin sys.indexes i on\np.object_id = i.object_id\
  \ and p.index_id = i.index_id\nleft outer join sys.dm_os_waiting_tasks wt with (nolock)\
  \ on\nl.lock_owner_address = wt.resource_address and\nl.request_status = 'WAIT'\n\
  where\nresource_type = 'KEY' and request_session_id = @@SPID;\nupdate dbo.T1 set\
  \ CI_Col = 'abc' where CI_Key = 1;\n/* some code */\nupdate dbo.T1 set NCI_Included_Col\
  \ = 1 where NCI_Key = 1;\ncommit\n```\n\n**清单 5-4** 在两个索引的行上获取排他（X）锁\n\n### 死锁排查\n\
  \n简而言之，死锁排查与上一章讨论的阻塞排查非常相似。你需要分析涉及死锁的进程和查询，识别问题的根本原因，并最终解决它。\n\n类似于 *阻塞进程报告*，有一个\
  \ *死锁图*，它以 XML 格式为你提供有关死锁的信息。获取死锁图的方法有很多：\n\n*   `xml_deadlock_report` 扩展事件\n* \
  \  从 SQL Server 2008 开始，每个系统在默认的 SQL Server 安装中都有一个启用的 `system_health` 扩展事件会话。该会话捕获基本的服务器运行状况信息，包括\
  \ `xml_deadlock_report` 事件。\n*   跟踪标志 1222：此跟踪标志将死锁信息保存到 SQL Server 错误日志中。你可以使用\
  \ `DBCC TRACEON(1222,-1)` 命令或使用启动参数 `T1222` 为所有会话启用它。这在生产环境中是绝对安全的方法；然而，由于 `system_health`\
  \ 会话的存在，现在它可能是多余的。\n*   `Deadlock graph` SQL 跟踪事件。值得注意的是，SQL Profiler 以图形方式显示死锁。事件上下文菜单（鼠标右键单击）中的“提取事件数据”操作允许你提取\
  \ XML 死锁图。\n\n使用 `system_health` xEvent 会话时，默认捕获 `xml_deadlock_graph`。即使你没有显式启用任何其他收集方法，你也可能拥有用于故障排除的数据。在\
  \ SQL Server 2012 及以上版本中，你可以从 Management Studio 的 *管理* 节点访问 `system_health` 会话数据，如图\
  \ 5-16 所示。你可以分析 *目标数据*，搜索 `xml_deadlock_report` 事件。\n\n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig16_HTML.jpg](img/463519_1_En_5_Fig16_HTML.jpg)\n\
  \n**图 5-16** 访问 system_health xEvents 会话\n\n死锁图的 XML 表示包含两个不同的部分，如清单 5-5 所示。`<process-list>`\
  \ 和 `<resource-list>` 部分分别包含有关死锁中涉及的进程和资源的信息。\n\n```\n...\n...\n...\n...\n```\n\n\
  **清单 5-5** 死锁图格式\n\n让我们使用表 5-1 中所示的代码在系统中触发死锁。你需要并行运行两个会话——先运行 `UPDATE` 语句，然后运行\
  \ `SELECT` 语句。\n\n**表 5-1** 在系统中触发死锁\n\n| 会话 1 | 会话 2 |\n| --- | --- |\n| `begin\
  \ tran`        `update Delivery.Orders`        `set OrderStatusId = 1`        `where\
  \ OrderId = 10001;` | `begin tran`        `update Delivery.Orders`        `set OrderStatusId\
  \ = 1`        `where OrderId = 10050;` |\n|         `select count(*) as [Cnt]`        `from\
  \ Delivery.Orders with (READCOMMITTED)`        `where CustomerId = 317;``commit`\
  \ |         `select count(*) as [Cnt]`        `from Delivery.Orders with (READCOMMITTED)`        `where\
  \ CustomerId = 766;``commit` |\n\n死锁图中的每个 `<process>` 节点显示特定进程的详细信息，如清单 5-6 所示。为了便于阅读，我移除了一些属性的值。我还特别高亮显示了那些在故障排除过程中我发现特别有用的属性。\n\
  \n```\n...\n```\n\n**清单 5-6** 死锁图：`<process>` 节点\n\n`id` 属性唯一标识进程。`Waitresource`\
  \ 和 `lockMode` 提供有关锁类型和进程正在等待的资源的信息。在我们的示例中，你可以看到该进程正在等待其中一行（键）上的共享（S）锁。\n\n\n`Isolationlevel`\
  \ 属性向您展示当前的事务隔离级别。最后，`executionStack` 和 `inputBuf` 允许您找到死锁发生时执行的 SQL 语句。与 `blocked\
  \ process report` 相反，死锁图中的 `executionStack` 通常为您提供有关涉及死锁的查询和模块的信息。然而，在某些情况下，您需要像前一章的清单\
  \ 4-5 中所做的那样，使用 `sys.dm_exec_sql_text` 函数来获取 SQL 语句。\n\n死锁图的 `<resource-list>` 部分包含了有关涉及死锁的资源的信息。如清单\
  \ 5-7 所示。\n\n#### 清单 5-7\n死锁图：`<resource-list>` 节点\n\nXML 元素的名称标识了资源的类型。`Keylock`、`pagelock`\
  \ 和 `objectlock` 分别代表行级锁、页锁和对象锁。您还可以看到这些锁属于哪些对象和索引。最后，`owner-list` 和 `waiter-list`\
  \ 节点提供了有关拥有锁和等待锁的进程的信息，以及已获取和请求的锁的类型。您可以将这些信息与图中 `process-list` 部分的数据关联起来。\n\n您可能已经猜到了，接下来的步骤与阻塞故障排除非常相似；即，您需要精确定位涉及死锁的查询，并找出死锁发生的原因。\n\
  \n然而，有一个重要因素需要考虑。在大多数情况下，一个死锁涉及同一事务中每个会话的多个语句。死锁图仅为您提供最后一个语句的信息——即触发死锁的那个语句。\n\n\
  您可以在 `<resource-list>` 节点中看到其他语句的 `迹象`。它显示了事务持有的锁，但没有告诉您获取这些锁的语句。在分析问题的根本原因时，识别这些语句非常有用。\n\
  \n在我们的示例中，当您查看表 5-1 中显示的代码时，您会看到两个语句。`UPDATE` 语句更新单行——它在那里获取并持有一个排他 (X) 锁。您可以在死锁图的\
  \ `<resource-list>` 节点中看到，两个进程都拥有那些排他 (X) 锁。\n\n接下来，您需要理解为什么 `SELECT` 查询试图在已持有排他\
  \ (X) 锁的行上获取共享 (S) 锁。您可以通过运行查询或使用 `sys.dm_exec_query_stats` DMV（如前一章清单 4-5 所示）从进程节点查看\
  \ `SELECT` 语句的执行计划。结果，您将得到如图 5-17 所示的执行计划。该图还显示了查询执行期间获取的锁的数量。\n\n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig17_HTML.jpg](img/463519_1_En_5_Fig17_HTML.jpg)\n\
  \n##### 图 5-17\n查询的执行计划\n\n#### 提示\n您可以使用 `sys.dm_exec_procedure_stats` 视图获取存储过程的缓存执行计划。\n\
  \n如您所见，计划中有一个 `Clustered Index Scan`，这为您提供了足够的分析数据。`SELECT` 查询扫描了整个表。因为两个进程都使用 `READ\
  \ COMMITTED` 隔离级别，查询试图获取表中每一行的共享 (S) 锁，并被另一个会话持有的排他 (X) 锁所阻塞。即使那些行没有查询正在寻找的 `CustomerId`\
  \ 也无所谓。为了评估这个谓词，查询必须读取这些行，这需要获取它们的共享 (S) 锁。\n\n您可以通过在 `CustomerID` 列上添加一个非聚集索引来解决这种死锁情况。这将消除\
  \ `Clustered Index Scan` 并用 `Index Seek` 运算符替代，如图 5-18 所示。\n\n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig18_HTML.jpg](img/463519_1_En_5_Fig18_HTML.jpg)\n\
  \n##### 图 5-18\n带有非聚集索引的查询执行计划\n\n查询将只读取属于特定客户的行，而不是获取表中每一行的共享 (S) 锁。这将大大减少需要获取的共享\
  \ (S) 锁的数量，并防止查询被属于不同客户的行上的排他 (X) 锁所阻塞。\n\n不幸的是，死锁故障排除对计划缓存的依赖性与阻塞故障排除相同。您通常需要从那里获取涉及死锁的语句的文本和执行计划。计划缓存中的数据会随时间变化，等待时间越长，所需信息存在的可能性就越小。\n\
  \n您可以通过实施基于事件通知的监控解决方案来解决此问题，类似于我们在前一章所做的。该代码作为阻塞监控框架代码的一部分包含在本书的配套材料中，也可以从我的博客下载：[`http://aboutsqlserver.com/bmframework`](http://aboutsqlserver.com/bmframework)。\n\
  \n最后，在某些情况下，您可能会遇到查询内并行死锁——当一个具有并行执行计划的查询自身发生死锁时。幸运的是，这种情况很少见，通常是由 SQL Server 中的错误而不是应用程序或数据库问题引起的。当死锁图中有两个以上具有相同\
  \ `SPID` 的进程，并且 `<resource-list>` 中列出了 `exchangeEvent` 和/或 `threadPoll` 作为资源，而没有任何关联的锁资源时，您可以检测到这种情况。当这种情况发生时，您可以通过使用\
  \ `MAXDOP` 提示减少甚至完全移除查询的并行度来解决问题。此问题也很可能已在最新的服务包或累积更新中得到修复。\n\n\n## 由于 `IGNORE_DUP_KEY`\
  \ 索引选项导致的死锁\n\n存在一种非常特殊且令人困惑、难以解释的死锁类型。乍看之下，这种死锁似乎通过在非 `SERIALIZABLE` 隔离级别使用范围锁，违反了\
  \ SQL Server 的并发模型。然而，其解释其实很简单。\n\n如你所知，SQL Server 使用范围锁来保护索引键的范围，从而避免幻读和不可重复读现象。此类锁保证在事务中执行的查询始终处理同一组数据，并且不受其他会话修改的影响。\n\
  \n但是，还有另一种情况 SQL Server 会使用范围锁：在对设置了 `IGNORE_DUP_KEY` 选项为 `ON` 的非聚集索引进行数据修改时。在这种情况下，SQL\
  \ Server 会忽略具有重复键值的行，而不是引发异常。\n\n让我们看一个例子，创建一个表，如清单 5-8 所示。\n\n```sql\ncreate table\
  \ dbo.IgnoreDupKeysDeadlock\n(\nCICol int not null,\nNCICol int not null\n);\ncreate\
  \ unique clustered index IDX_IgnoreDupKeysDeadlock_CICol\non dbo.IgnoreDupKeysDeadlock(CICol);\n\
  create unique nonclustered index IDX_IgnoreDupKeysDeadlock_NCICol\non dbo.IgnoreDupKeysDeadlock(NCICol)\n\
  with (ignore_dup_key = on);\ninsert into dbo.IgnoreDupKeysDeadlock(CICol, NCICol)\n\
  values(0,0),(5,5),(10,10),(20,20);\n```\n**清单 5-8** `IGNORE_DUP_KEY` 死锁：表创建\n\n\
  现在，让我们使用 `READ UNCOMMITTED` 隔离级别启动事务，然后向表中插入一行，并检查会话获取的锁。代码如清单 5-9 所示。\n\n```sql\n\
  set transaction isolation level read uncommitted\nbegin tran\ninsert into dbo.IgnoreDupKeysDeadlock(CICol,NCICol)\n\
  values(1,1);\nselect request_session_id, resource_type, resource_description\n,resource_associated_entity_id,\
  \ request_mode, request_type, request_status\nfrom sys.dm_tran_locks\nwhere request_session_id\
  \ = @@SPID;\n```\n**清单 5-9** `IGNORE_DUP_KEY` 死锁：向表中插入一行\n\n图 5-19 展示了 `sys.dm_tran_locks`\
  \ 视图的输出。如你所见，会话在聚集索引和非聚集索引的行上获取了两个排他锁。它还在非聚集索引上获取了一个范围锁。此锁类型表示现有键受共享锁保护，而区间本身受更新锁保护。\n\
  \n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig19_HTML.jpg](img/463519_1_En_5_Fig19_HTML.jpg)\n\
  **图 5-19** 第一个会话获取的锁\n\n在此场景中，由于 SQL Server 处理数据修改的方式，需要范围锁。正如我们已经讨论过的，数据首先在聚集索引中修改，然后是非聚集索引。当\
  \ `IGNORE_DUP_KEY=ON` 时，SQL Server 需要防止在聚集索引插入后，重复键同时插入到非聚集索引中的情况，从而导致某些插入需要回滚。因此，它锁定非聚集索引中的键范围，阻止其他会话在那里插入任何行。\n\
  \n我们可以通过查看图 5-20 所示的 `lock_acquired` 扩展事件来确认这一点。如你所见，范围锁是在两个索引中获取排他锁之前获取的。\n\n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig20_HTML.jpg](img/463519_1_En_5_Fig20_HTML.jpg)\n\
  **图 5-20** `lock_acquired` 扩展事件\n\n然而，这里的关键问题是，范围锁的行为与在 `SERIALIZABLE` 隔离级别中的行为相同。无论使用何种隔离级别，它们都会一直持有直到事务结束。这种行为大大增加了死锁的可能性。\n\
  \n让我们在另一个会话中运行清单 5-10 中的代码。第一条语句会成功，而第二条语句将被阻塞。\n\n```sql\nset transaction isolation\
  \ level read uncommitted\nbegin tran\n-- Success\ninsert into dbo.IgnoreDupKeysDeadlock(CICol,NCICol)\n\
  values(12,12);\n-- Statement is blocked\ninsert into dbo.IgnoreDupKeysDeadlock(CICol,NCICol)\n\
  values(2,2);\ncommit;\n```\n**清单 5-10** `IGNORE_DUP_KEY` 死锁：第二个会话代码\n\n现在，如果我们查看两个会话持有的锁，将会看到图\
  \ 5-21 所示的情况。来自第一个会话的范围锁保护了 `0..5` 区间，并阻塞了试图在同一区间获取范围锁的第二个会话。\n\n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig21_HTML.jpg](img/463519_1_En_5_Fig21_HTML.jpg)\n\
  **图 5-21** 阻塞发生时的锁请求\n\n反过来，第二个会话持有 `10..20` 区间上的范围锁。如果第一个会话尝试使用清单 5-11 中的代码向该区间插入另一行，它将被阻塞，从而导致经典的死锁情况。\n\
  \n```sql\ninsert into dbo.IgnoreDupKeysDeadlock(CICol,NCICol)\nvalues(11,11);\n\
  ```\n**清单 5-11** `IGNORE_DUP_KEY` 死锁：第一个会话的第二次插入\n\n图 5-22 显示了死锁图的部分输出。如你所见，通过存在非\
  \ `SERIALIZABLE` 隔离级别中的范围锁，可以清晰地识别出这种特定模式。\n\n![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig22_HTML.jpg](img/463519_1_En_5_Fig22_HTML.jpg)\n\
  **图 5-22** 死锁图\n\n除了移除 `IGNORE_DUP_KEY` 索引选项外，你对此问题几乎无能为力。幸运的是，这个选项很少需要，并且在许多情况下，可以通过使用\
  \ `NOT EXISTS` 谓词和/或暂存表来解决。\n\n最后，需要注意的是，SQL Server 不会使用范围锁来强制在聚集索引中设置 `IGNORE_DUP_KEY=ON`。数据首先在聚集索引中插入或修改，SQL\
  \ Server 不需要使用范围锁来避免竞争条件。\n\n\n## 降低死锁发生的可能性\n\n最后，我可以提供几点实用的建议，以帮助降低系统中死锁发生的可能性：\n\
  \n1.  **优化查询**。由未优化的查询引起的扫描是死锁最常见的原因。合适的索引不仅能提升查询性能，还能减少需要读取的行数和需要获取的锁，从而降低与其他会话发生锁冲突的可能性。\n\
  \n2.  **尽可能缩短锁的持有时间**。回想一下，所有的排他（`X`）锁都会一直持有到事务结束。应使事务保持简短，并尝试在尽可能接近事务结束时更新数据，以减少锁冲突的机会。在我们表\
  \ 5-1 的示例中，你可以修改代码，交换`SELECT`和`UPDATE`语句的顺序。这将解决那个特定的死锁问题，因为事务在获取排他（`X`）锁之后，没有任何可能被阻塞的语句了。\n\
  \n3.  **考虑使用乐观隔离级别，例如 `READ COMMITTED SNAPSHOT` 或 `SNAPSHOT`**。如果不可行，则使用能提供所需数据一致性的最低事务隔离级别。这可以减少共享（`S`）锁的持有时间。即使你在之前的例子中交换了`SELECT`和`UPDATE`语句的顺序，在`REPEATABLE\
  \ READ`或`SERIALIZABLE`隔离级别下，你仍然会遇到死锁。在这些隔离级别下，共享（`S`）锁会一直持有到事务结束，从而会阻塞`UPDATE`语句。而在`READ\
  \ COMMITTED`模式下，共享（`S`）锁在读取一行后就会释放，`UPDATE`语句就不会被阻塞。\n\n4.  **当涉及多个索引时，避免在同一事务内多次更新同一行**。正如本章前面所见，当索引列未被更新时，SQL\
  \ Server 不会在非聚集索引行上放置排他（`X`）锁。其他会话可以在那里放置不兼容的锁并阻塞后续的更新，从而导致死锁。\n\n5.  **使用重试逻辑**。将关键代码包裹在`TRY..CATCH`块中，如果发生死锁则重试该操作。由死锁引起的异常错误号是`1205`。代码清单\
  \ 5-12 展示了如何实现这一点。\n\n```sql\n-- 声明并设置变量，用于跟踪在退出前尝试重试的次数。\ndeclare\n    @retry tinyint\
  \ = 5\n-- 如果此任务被选为死锁牺牲品，则持续尝试更新表。\nwhile (@retry > 0)\nbegin\n    begin try\n  \
  \      begin tran\n            -- 可能导致死锁的一些代码\n        commit\n    end try\n   \
  \ begin catch\n        -- 检查错误号。如果是死锁牺牲品错误，则减少下次重试的计数。\n        -- 如果发生其他错误，则退出\
  \ WHILE 循环。\n        if (error_number() = 1205)\n            set @retry = @retry\
  \ - 1;\n        else\n            set @retry = 0;\n        if @@trancount > 0\n\
  \            rollback;\n    end catch\nend\n```\n代码清单 5-12\n使用`TRY..CATCH`块在发生死锁时重试操作\n\
  \n## 小结\n\n除了被认为属于 SQL Server 代码错误的查询内并行死锁外，死锁发生在多个会话竞争同一组资源时。\n\n死锁疑难解答中的关键元素是死锁图，它提供了关于死锁中涉及的进程和资源的信息。你可以通过启用跟踪标志`T1222`、捕获`xml_deadlock_report`扩展事件和`Deadlock\
  \ graph` SQL 跟踪事件，或者在系统中设置死锁事件通知来收集死锁图。在 SQL Server 2008 及更高版本中，`xml_deadlock_report`事件包含在默认情况下每个\
  \ SQL Server 安装都启用的`system_health`扩展事件会话中。\n\n死锁图会为你提供有关触发死锁的查询的信息。然而，你应该记住，在大多数情况下，死锁涉及在同一事务内获取并持有锁的多个语句，你可能需要分析所有这些语句才能解决问题。\n\
  \n尽管死锁可能由多种原因引起，但通常是因为未优化的查询在扫描过程中产生了过多的锁。查询优化可以帮助解决这些问题。\n\n"
- "# 6. 乐观隔离级别\n\n乐观事务隔离级别在 SQL Server 2005 中被引入，作为一种处理阻塞问题和解决系统中并发现象的新方法。使用乐观事务隔离级别，查询在访问被其他会话修改的数据时，会读取行的“旧”已提交版本，而不是被共享（`S`）锁和排他（`X`）锁的不兼容性所阻塞。\n\
  \n本章将解释乐观隔离级别是如何实现的，以及它们如何影响系统的锁行为。\n\n## 行版本控制概述\n\n使用乐观事务隔离级别时，当发生更新时，SQL Server\
  \ 将行的旧版本存储在`tempdb`中一个称为`版本存储区`的特殊部分。数据库中的原始行通过一个 14 字节的版本指针引用它们，SQL Server 会将这个指针添加到被修改（更新和删除）的行中。根据情况，一行在版本存储区中可能存储多个版本记录。图\
  \ 6-1 说明了此行为。\n\n![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig1_HTML.jpg](img/463519_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1\n版本存储区\n\n现在，当读取器（有时是写入器）访问持有排他（`X`）锁的行时，它们会从版本存储区读取旧版本，而不是被阻塞，如图 6-2 所示。\n\
  \n![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig2_HTML.jpg](img/463519_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2\n读取器与版本存储区\n\n正如你所猜想的，虽然乐观隔离级别有助于减少阻塞，但也存在一些权衡。其中最显著的是它们增加了`tempdb`的负载。在高度易变的系统上使用乐观隔离级别可能导致非常繁重的`tempdb`活动，并显著增加`tempdb`的大小。我们将在本章后面更详细地探讨这个问题。\n\
  \n数据修改和检索过程中存在开销。SQL Server 需要将数据复制到`tempdb`，并维护版本记录的链表。同样，在读取数据时需要遍历该链表。这增加了额外的\
  \ CPU、内存和 I/O 负载。你需要记住这些权衡，尤其是在云端托管系统时，那里的 I/O 性能通常不如本地现代高端磁盘阵列高效。\n\n最后，乐观隔离级别会导致索引碎片。当一行被修改时，SQL\
  \ Server 会因为版本指针而使行大小增加 14 字节。如果一个页面被紧密填充，并且行的新版本无法容纳在该页面中，它将导致页面拆分和进一步的碎片。我们将在本章后面更深入地研究这种行为。\n\
  \n## 乐观事务隔离级别\n\n有两种乐观事务隔离级别：`READ COMMITTED SNAPSHOT` 和 `SNAPSHOT`。准确来说，`SNAPSHOT`是一个独立的事务隔离级别，而`READ\
  \ COMMITTED SNAPSHOT`是一个数据库选项，它改变了`READ COMMITTED`事务隔离级别中读取器的行为。\n\n让我们深入研究这些级别。\n\
  \n\n\n## 快照隔离级别详解\n\n### 读取提交快照隔离级别\n\n两种乐观隔离级别都需要在数据库级别启用。你可以使用 `ALTER DATABASE\
  \ SET READ_COMMITTED_SNAPSHOT ON` 命令来启用 `读取提交快照 (RCSI)`。该语句会获取一个独占（X）数据库锁来更改数据库选项，如果数据库中还有其他用户连接，则会被阻塞。你可以通过运行\
  \ `ALTER DATABASE SET READ_COMMITTED_SNAPSHOT ON WITH ROLLBACK AFTER X SECONDS`\
  \ 命令来解决这个问题。这将回滚所有活动事务并终止现有数据库连接，从而允许更改数据库选项。\n\n#### 注意\n\n在 Microsoft Azure SQL\
  \ 数据库中，`读取提交快照` 默认是启用的。\n\n如前所述，`RCSI` 改变了 `读取提交` 模式下读取器的行为。然而，它并不影响写入器的行为。\n\n\
  如图 6-3 所示，读取器不再获取共享（S）锁并被行上持有的任何独占（X）锁阻塞，而是使用版本存储中的旧版本。写入器仍然以与悲观隔离级别相同的方式获取更新（U）和独占（X）锁。再次说明，正如你所看到的，不同会话的写入器之间仍然存在阻塞，尽管写入器不会像\
  \ `读取未提交` 模式那样阻塞读取器。\n\n![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig3_HTML.jpg](img/463519_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3 读取提交快照隔离级别的行为\n\n然而，`读取未提交` 和 `读取提交快照` 隔离级别之间有一个主要区别。`读取未提交` 以牺牲数据一致性为代价消除了阻塞。可能发生许多一致性异常，包括读取未提交数据、重复读取和遗漏行。另一方面，`读取提交快照`\
  \ 隔离级别为你提供了完整的*语句级一致性*。在此隔离级别运行的语句既不会访问未提交的数据，也不会访问语句开始后提交的数据。\n\n一个显而易见的结论是，当启用了\
  \ `读取提交快照` 隔离级别时，应避免在查询中使用 `（NOLOCK）` 提示。虽然使用 `（NOLOCK）` 和 `读取未提交` 本身就是一种糟糕的做法，但当\
  \ `读取提交快照` 能在不丢失查询数据一致性的情况下提供类似的非阻塞行为时，使用它就完全没用了。\n\n#### 提示\n\n将数据库切换到 `读取提交快照`\
  \ 隔离级别可以是一个很好的紧急技术，当系统正遭受阻塞问题时。假设读取器运行在 `读取提交` 隔离级别，它可以在不更改任何代码的情况下消除写入器/读取器阻塞。显然，这只是临时解决方案，你需要检测并消除阻塞的根本原因。\n\
  \n### 快照隔离级别\n\n`快照` 是一个独立的事务隔离级别，需要在代码中使用 `SET TRANSACTION ISOLATION LEVEL SNAPSHOT`\
  \ 语句显式设置。\n\n默认情况下，禁止使用 `快照` 隔离级别。你必须使用 `ALTER DATABASE SET ALLOW_SNAPSHOT_ISOLATION\
  \ ON` 语句来启用它。此语句不需要独占数据库锁，并且可以在有其他用户连接到数据库时执行。\n\n`快照` 隔离级别提供了*事务级一致性*。无论事务活动时间多长以及其他事务在此期间做了多少数据更改，事务都将看到事务开始时数据的*快照*。\n\
  \n#### 注意\n\nSQL Server 在第一次访问数据时启动显式事务，而不是在 `BEGIN TRAN` 语句时。\n\n在图 6-4 所示的示例中，我们有一个会话\
  \ 1 在时间 *T1* 启动事务并读取行。在时间 *T2*，我们有一个会话 2 在自动提交事务中修改了该行。此时，该行的旧（原始）版本移动到 `tempdb`\
  \ 中的版本存储。\n\n![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig4_HTML.jpg](img/463519_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4 快照隔离级别和读取器行为\n\n接下来，我们有一个会话 3 启动另一个事务，并在时间 *T3* 读取同一行。它看到的是会话 2（在时间 *T2*）修改并提交的行版本。在时间\
  \ *T4*，我们有一个会话 4 再次在自动提交事务中修改该行。此时，版本存储中有该行的两个版本——一个存在于 *T2* 到 *T4* 之间，以及在 *T2*\
  \ 之前存在的原始版本。现在，如果会话 3 再次运行 `SELECT`，它将使用在 *T2* 到 *T4* 之间存在的版本，因为该版本是在会话 3 事务开始时提交的。同样，会话\
  \ 1 将使用在 *T2* 之前存在的原始行版本。在会话 1 和会话 3 提交后的某个时间点，*版本存储清理任务* 将从版本存储中删除这两条记录，当然，前提是其他事务不再需要它们。\n\
  \n`可序列化` 和 `快照` 隔离级别提供了相同级别的防止数据不一致问题的保护；然而，它们的行为存在细微差别。`快照` 隔离级别事务看到的是事务开始时的数据。使用\
  \ `可序列化` 隔离级别，事务看到的是首次访问数据并获取锁时的数据。考虑一种情况，一个会话在事务中间从表中读取数据。如果另一个会话在事务开始之后但在读取数据之前更改了该表中的数据，那么在\
  \ `可序列化` 隔离级别中的事务将看到这些更改，而 `快照` 事务则不会。\n\n乐观事务隔离级别通过减少甚至消除阻塞来提供语句级或事务级的数据一致性，尽管它们可能会在\
  \ `tempdb` 中生成大量数据。如果有一个会话从表中删除数百万行，即使原始的 `DELETE` 语句运行在悲观隔离级别，所有这些行也需要复制到版本存储中，只是为了为可能的\
  \ `快照` 或 `RCSI` 事务保留数据状态。你将在本章后面看到这样的例子。\n\n现在，让我们检查写入器的行为。假设会话 1 启动事务并更新其中一行。如图\
  \ 6-5 所示，该会话在那里持有一个独占（X）锁。\n\n![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig5_HTML.jpg](img/463519_1_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5 快照隔离级别和写入器的行为\n\n会话 2 想要更新 `Cancelled = 1` 的所有行。它开始扫描表，当需要读取 `OrderId =\
  \ 10` 的数据时，它从版本存储中读取该行；也就是说，读取会话 2 事务开始前最后提交的版本。此版本是该行的原始（未更新）版本，其 `Cancelled =\
  \ 0`，因此会话 2 不需要更新它。会话 2 继续扫描行，而不会被更新（U）和独占（X）锁不兼容性所阻塞。\n\n\n\n同样地，会话 3 希望更新所有 `Amount\
  \ = 29.95` 的行。当它从版本存储中读取该行的版本时，它判定该行需要被更新。同样地，会话 1 也修改了同一行的金额，但这并不重要。此时，该行的“新版本”尚未提交，对其他会话不可见。现在，会话\
  \ 3 想要更新数据库中的该行，试图获取一个排他锁（X），但被阻塞，因为会话 1 已经在该行上持有了一个排他锁（X）。\n\n现在，如果会话 1 提交了事务，会话\
  \ 3 将会回滚，并出现 `Error 3960`，如图 6-6 所示，这指示了一个写/写冲突。这与任何其他隔离级别下的行为都不同，在其他隔离级别下，一旦会话\
  \ 1 的排他锁（X）被释放，会话 3 就能成功覆盖会话 1 所做的更改。\n\n![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig6_HTML.jpg](img/463519_1_En_6_Fig6_HTML.jpg)\n\
  图 6-6\n`Error 3960`\n\n当一个 `SNAPSHOT` 事务试图更新在该事务启动后已被修改的数据时，就会发生写/写冲突。在我们的示例中，即使会话\
  \ 1 在会话 3 的 `UPDATE` 语句之前提交，只要这次提交发生在会话 3 的事务启动之后，冲突仍然会发生。\n\n#### 提示\n如果业务逻辑允许，你可以使用\
  \ `TRY..CATCH` 语句实现重试逻辑来处理 `3960` 错误。\n\n在数据易变的系统中使用 `SNAPSHOT` 隔离级别更新数据时，你需要牢记这种行为。如果在事务启动后，其他会话更新了你正在修改的行，你最终会遇到\
  \ `Error 3960`，即使你在更新前并未访问这些行。一种可能的解决方法是在 `UPDATE` 语句中使用（`READCOMMITTED`）或其他非乐观隔离级别的表提示，如清单\
  \ 6-1 所示。\n\n```\nset transaction isolation level snapshot\nbegin tran\nselect count(*)\
  \ from Delivery.Drivers;\nupdate Delivery.Orders with (readcommitted)\nset Cancelled\
  \ = 1\nwhere OrderId = 10;\ncommit\n```\n清单 6-1\n使用 `READCOMMITTED` 提示来防止 `3960`\
  \ 错误\n\n`SNAPSHOT` 隔离级别可以改变系统的行为。假设有一个表 `dbo.Colors`，包含两行数据：`Black` 和 `White`。创建该表的代码如清单\
  \ 6-2 所示。\n\n```\ncreate table dbo.Colors\n(\nId int not null,\nColor char(5) not\
  \ null\n);\ninsert into dbo.Colors(Id, Color) values(1,'Black'),(2,'White')\n```\n\
  清单 6-2\n`SNAPSHOT` 隔离级别更新行为：表创建\n\n现在，让我们同时运行两个会话。在第一个会话中，我们运行更新语句，将颜色当前为 `black`\
  \ 的行设置为 `white`，使用的语句是 `UPDATE dbo.Colors SET Color=\"White\" WHERE Color=\"Black\"\
  `。在第二个会话中，我们执行相反的操作，使用语句 `UPDATE dbo.Colors SET Color=\"Black\" WHERE Color=\"White\"\
  `。\n\n让我们在 `READ COMMITTED` 或任何其他悲观的事务隔离级别下同时运行这两个会话。如图 6-7 所示，在第一步中，我们遇到了竞争条件。一个会话在它更新的行上放置了排他锁（X），而另一个会话在尝试获取同一行的更新锁（U）时被阻塞。\n\
  \n![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig7_HTML.png](img/463519_1_En_6_Fig7_HTML.png)\n\
  图 6-7\n悲观锁行为：步骤 1\n\n当第一个会话提交事务时，排他锁（X）被释放。此时，该行的 `Color` 值已被第一个会话更新，因此第二个会话更新了两行而不是一行，如图\
  \ 6-8 所示。最终，表中的两行都将变为黑色或白色，具体取决于哪个会话先获取到锁。\n\n![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig8_HTML.jpg](img/463519_1_En_6_Fig8_HTML.jpg)\n\
  图 6-8\n悲观锁行为：步骤 2\n\n然而，在 `SNAPSHOT` 隔离级别下，这个过程的工作方式有所不同，如图 6-9 所示。当一个会话更新行时，它会将该行的旧版本移动到版本存储中。另一个会话将从那里读取该行，而不是被阻塞，反之亦然。结果是，颜色将被互换。\n\
  \n![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig9_HTML.jpg](img/463519_1_En_6_Fig9_HTML.jpg)\n\
  图 6-9\n`SNAPSHOT` 隔离级别锁行为\n\n你需要了解 `RCSI` 和 `SNAPSHOT` 隔离级别的行为，特别是当你的代码依赖于阻塞时。一个例子是基于触发器的参照完整性实现。你可以在被引用表上有一个\
  \ `ON DELETE` 触发器，其中运行一个 `SELECT` 语句；这个触发器将检查是否有其他表中的行引用了被删除的行。在乐观隔离级别下，该触发器可能会跳过在事务启动后插入的行。这里的解决方案同样是在被引用表和引用表上的触发器中，将（`READCOMMITTED`）或其他悲观隔离级别的表提示作为\
  \ `SELECT` 语句的一部分。\n\n#### 注意\nSQL Server 在验证外键约束时使用 `READ COMMITTED` 隔离级别。这意味着即使使用乐观隔离级别，写入者和读取者之间仍然可能发生阻塞，特别是在引用列上没有索引导致对引用表进行表扫描的情况下。\n\
  \n\n## 版本存储行为与监控\n\n正如已经提到的，你需要监控乐观隔离级别如何影响系统中的 `tempdb`。例如，让我们运行清单 6-3 中的代码，该代码使用\
  \ `READ UNCOMMITTED` 事务隔离级别从 `Delivery.Orders` 表中删除所有行。\n\n```\nset transaction\
  \ isolation level read uncommitted\nbegin tran\ndelete from Delivery.Orders;\ncommit\n\
  Listing 6-3\n从 Delivery.Orders 表中删除数据\n```\n\n即使在 `DELETE` 语句开始时没有其他使用乐观隔离级别的事务，仍然有可能在当前事务提交之前启动一个这样的事务。因此，SQL\
  \ Server 需要维护版本存储，无论是否有活动事务正在使用乐观隔离级别。\n\n图 6-10 显示了 `tempdb` 的可用空间和版本存储大小。可以看到，一旦删除开始，版本存储就会增长并占据\
  \ `tempdb` 中的所有可用空间。\n\n![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig10_HTML.jpg](img/463519_1_En_6_Fig10_HTML.jpg)\n\
  \n图 6-10\ntempdb 可用空间与版本存储大小\n\n在图 6-11 中，你可以看到版本存储的生成速率和清理速率。生成速率在执行期间基本保持不变，而清理任务则在事务提交后清理版本存储。默认情况下，清理任务每分钟运行一次，并且在\
  \ `tempdb` 已满的情况下，也会在任何自动增长事件之前运行。\n\n![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig11_HTML.jpg](img/463519_1_En_6_Fig11_HTML.jpg)\n\
  \n图 6-11\n版本生成与清理速率\n\n如你所见，版本存储会给系统带来额外开销。除非你计划使用，否则不要在数据库中启用乐观隔离级别。对于 `SNAPSHOT`\
  \ 隔离尤其如此，因为它需要你在代码中显式设置。虽然许多系统可以无需更改任何代码就从 `READ COMMITTED SNAPSHOT` 中受益，但 `SNAPSHOT`\
  \ 隔离级别则不会这样。\n\n还有另外三个与乐观隔离级别相关的性能计数器，在版本存储监控期间可能有所帮助：\n\n1.  `Snapshot Transactions`：显示活动快照事务的总数。你可以分析此计数器，以确定在系统启用\
  \ `SNAPSHOT` 隔离级别后，应用程序是否使用了它。\n2.  `Update Conflict Ratio`：显示更新冲突次数与更新快照事务总数的比率。\n\
  3.  `Longest Transaction Running Time`：显示使用行版本控制的最老活动事务的运行时长（以秒为单位）。此计数器的高值可能解释了系统中版本存储过大的原因。\n\
  \n还有几个动态管理视图（DMVs）可用于排查与版本存储及事务相关的各种问题。\n\n`sys.dm_db_file_space_usage` 视图返回数据库中每个文件的空间使用信息。该视图中的一列\
  \ `version_store_reserved_page_count` 返回了版本存储使用的页数。清单 6-4 展示了此视图的实际用法。\n\n```\n\
  select\nsum(user_object_reserved_page_count) * 8\nas [用户对象 (KB)]\n,sum(internal_object_reserved_page_count)\
  \ * 8\nas [内部对象 (KB)]\n,sum(version_store_reserved_page_count) * 8\nas [版本存储 (KB)]\n\
  ,sum(unallocated_extent_page_count) * 8\nas [可用空间 (KB)]\nfrom\ntempdb.sys.dm_db_file_space_usage;\n\
  Listing 6-4\n使用 sys.dm_db_file_space_usage 视图\n```\n\n你可以使用 `sys.dm_tran_version_store`\
  \ 视图按数据库跟踪版本存储使用情况，如清单 6-5 所示。此视图返回版本存储中每一行的信息，当版本存储很大时，它可能极其低效。它也不包括已保留但未使用的空间信息。\n\
  \n```\nselect\ndb_name(database_id) as [数据库]\n,database_id\n,sum(record_length_first_part_in_bytes\
  \ + record_length_second_part_in_bytes) / 1024\nas [版本存储 (KB)]\nfrom\nsys.dm_tran_version_store\n\
  group by\ndatabase_id\nListing 6-5\n使用 sys.dm_tran_version_store 视图\n```\n\n在 SQL\
  \ Server 2017 中，你可以使用 `sys.dm_tran_version_store_space_usage` 视图获取相同的信息。此视图比 `sys.dm_tran_version_store`\
  \ 更高效，并且它也返回有关保留空间的信息，如清单 6-6 所示。\n\n```\nselect\ndb_name(database_id) as [数据库]\n\
  ,database_id\n,reserved_page_count\n,reserved_space_kb\nfrom\nsys.dm_tran_version_store_space_usage\n\
  Listing 6-6\n使用 sys.dm_tran_version_store_space_usage 视图\n```\n\n当版本存储变得非常大时，你需要找出阻止其清理的活动事务。记住：一旦启用了乐观隔离级别，无论执行数据修改的事务使用何种隔离级别，都会使用行版本控制。\n\
  \n清单 6-7 展示了如何识别系统中五个最老的用户事务。长时间运行的事务是版本存储无法清理的最常见原因。它们也可能在系统中引入其他问题；例如，阻止事务日志的截断。\n\
  \n### 重要提示\n\nSQL Server 的某些功能，如在线索引重建、`AFTER UPDATE` 和 `AFTER DELETE` 触发器以及 MARS，无论是否启用了乐观隔离级别，都会使用版本存储。此外，在启用了可读辅助副本的\
  \ AlwaysOn 可用性组的系统中也会使用行版本控制。我们将在第 12 章更详细地讨论这一点。\n\n```\nselect top 5\nat.transaction_id\n\
  ,at.elapsed_time_seconds\n,at.session_id\n,s.login_time\n,s.login_name\n,s.host_name\n\
  ,s.program_name\n,s.last_request_start_time\n,s.last_request_end_time\n,er.status\n\
  ,er.wait_type\n,er.blocking_session_id\n,er.wait_type\n,substring(\nst.text,\n(er.statement_start_offset\
  \ / 2) + 1,\n(case\ner.statement_end_offset\nwhen -1\nthen datalength(st.text)\n\
  else er.statement_end_offset\nend - er.statement_start_offset) / 2 + 1\n) as [SQL]\n\
  from\nsys.dm_tran_active_snapshot_database_transactions at\njoin sys.dm_exec_sessions\
  \ s on\nat.session_id = s.session_id\nleft join sys.dm_exec_requests er on\nat.session_id\
  \ = er.session_id\nouter apply\nsys.dm_exec_sql_text(er.sql_handle) st\norder by\n\
  at.elapsed_time_seconds desc\nListing 6-7\n识别系统中最老的活动事务\n```\n\n#### 注意\n\n还有其他几个有用的事务相关动态管理视图。你可以在\
  \ [`https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/transaction-related-dynamic-management-views-and-functions-transact-sql`](https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/transaction-related-dynamic-management-views-and-functions-transact-sql)\
  \ 阅读有关它们的信息。\n\n最后，值得注意的是，SQL Server 在 `sys.databases` 视图中公开了 `READ COMMITTED SNAPSHOT`\
  \ 和 `SNAPSHOT` 隔离级别是否启用的信息。`is_read_committed_snapshot` 列指示是否启用了 RCSI。`snapshot_isolation_state`\
  \ 和 `snapshot_isolation_state_desc` 列分别指示在运行 `ALTER DATABASE SET ALLOW_SNAPSHOT_ISOLATION`\
  \ 语句后，是否允许 `SNAPSHOT` 事务和/或数据库是否处于过渡状态。\n\n\n### 行版本控制与索引碎片\n\n乐观隔离级依赖于行版本控制。在更新操作期间，行的旧版本被复制到`tempdb`中的版本存储。数据库中的行通过更新操作期间添加的\
  \ 14 字节版本存储指针来引用它们。\n\n在删除操作期间也会发生同样的事情。在 SQL Server 中，`DELETE`语句并不会从表中移除行，而是将它们标记为`deleted`，并在事务提交后在后台回收空间。使用乐观隔离级时，删除操作也会将行复制到版本存储，并通过版本存储指针扩展已删除的行。\n\
  \n版本存储指针使行大小增加了 14 字节，这可能导致数据页没有足够的空闲空间来容纳行的新版本。这将触发`页面拆分`并增加索引碎片。\n\n让我们看一个例子。第一步，我们将禁用乐观隔离级，并使用`FILLFACTOR=100`重建`Delivery.Orders`表上的索引。这强制\
  \ SQL Server 完全填充数据页，不在其中预留任何空闲空间。代码如清单 6-8 所示。\n\n```\nalter database SQLServerInternals\n\
  set read_committed_snapshot off\nwith rollback immediate;\ngo\nalter database SQLServerInternals\n\
  set allow_snapshot_isolation off;\ngo\nalter index PK_Orders on Delivery.Orders\
  \ rebuild\nwith (fillfactor = 100);\n清单 6-8\n乐观隔离级与碎片：索引重建\n```\n\n清单 6-9 展示了分析`Delivery.Orders`表中聚集索引碎片的代码。\n\
  \n```\nselect\nalloc_unit_type_desc as [alloc_unit]\n,index_level\n,page_count\n\
  ,convert(decimal(4,2),avg_page_space_used_in_percent)\nas [space_used]\n,convert(decimal(4,2),avg_fragmentation_in_percent)\n\
  as [frag %]\n,min_record_size_in_bytes as [min_size]\n,max_record_size_in_bytes\
  \ as [max_size]\n,avg_record_size_in_bytes as [avg_size]\nfrom\nsys.dm_db_index_physical_stats(db_id()\n\
  ,object_id(N'Delivery.Orders'),1,null,'DETAILED');\n清单 6-9\n乐观隔离级与碎片：分析碎片\n```\n\
  \n如图 6-12 所示，索引使用了 1,392 个页面，没有任何碎片。\n\n![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig12_HTML.jpg](img/463519_1_En_6_Fig12_HTML.jpg)\n\
  \n图 6-12\n\nFILLFACTOR = 100 时的索引统计信息\n\n现在，让我们运行清单 6-10 中的代码，从表中删除 50%的行。注意，我们在下一次测试之前回滚了事务以重置环境。\n\
  \n```\nbegin tran\ndelete from Delivery.Orders where OrderId % 2 = 0;\n-- update\
  \ Delivery.Orders set Pieces += 1;\nselect\nalloc_unit_type_desc as [alloc_unit]\n\
  ,index_level\n,page_count\n,convert(decimal(4,2),avg_page_space_used_in_percent)\n\
  as [space_used]\n,convert(decimal(4,2),avg_fragmentation_in_percent)\nas [frag %]\n\
  ,min_record_size_in_bytes as [min_size]\n,max_record_size_in_bytes as [max_size]\n\
  ,avg_record_size_in_bytes as [avg_size]\nfrom\nsys.dm_db_index_physical_stats(db_id()\n\
  ,object_id(N'Delivery.Orders'),1,null,'DETAILED');\nrollback\n清单 6-10\n乐观隔离级与碎片：删除\
  \ 50%的行\n```\n\n图 6-13 显示了此代码的输出。如您所见，此操作不会增加索引中的页面数量。如果您更新任何定长列的值，也会发生同样的情况。此更新不会改变行的大小，因此不会触发任何页面拆分。\n\
  \n![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig13_HTML.jpg](img/463519_1_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13\n\nDELETE 语句后的索引统计信息\n\n现在，我们启用`READ COMMITTED SNAPSHOT`隔离级并重复我们的测试。清单\
  \ 6-11 显示了执行此操作的代码。\n\n```\nalter database SQLServerInternals\nset read_committed_snapshot\
  \ on\nwith rollback immediate;\ngo\nset transaction isolation level read uncommitted\n\
  begin tran\ndelete from Delivery.Orders where OrderId % 2 = 0;\n-- update Delivery.Orders\
  \ set Pieces += 1;\nrollback\n清单 6-11\n乐观隔离级与碎片：在启用 RCSI 的情况下重复测试\n```\n\n图 6-14\
  \ 显示了操作后的索引统计信息。注意，我们使用了`READ UNCOMMITTED`隔离级并回滚了事务。尽管如此，行版本控制仍在使用，这会导致数据删除期间出现页面拆分。\n\
  \n![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig14_HTML.jpg](img/463519_1_En_6_Fig14_HTML.jpg)\n\
  \n图 6-14\n\n启用 RCSI 后 DELETE 语句的索引统计信息\n\n添加后，14 字节的版本存储指针会保留在行中，即使在记录从版本存储中移除后也是如此。您可以通过执行索引重建来回收此空间。\n\
  \n您需要记住此行为，并将其纳入索引维护策略。如果启用了乐观隔离级，最好不要使用`FILLFACTOR = 100`。这同样适用于定义在具有`AFTER UPDATE`和`AFTER\
  \ DELETE`触发器的表上的索引。这些触发器依赖于行版本控制，并且在内部也会使用版本存储。\n\n## 总结\n\nSQL Server 在使用乐观隔离级时采用行版本控制模型。查询访问行的“旧”已提交版本，而不是被共享(S)、更新(U)和排他(X)锁的不兼容性所阻塞。有两种可用的乐观事务隔离级：`READ\
  \ COMMITTED SNAPSHOT`和`SNAPSHOT`。\n\n`READ COMMITTED SNAPSHOT`是一个数据库选项，它会改变`READ\
  \ COMMITTED`模式下读取者的行为。它不会改变写入者的行为——由于(U)/(U)和(U)/(X)锁的不兼容性，仍然存在阻塞。`READ COMMITTED\
  \ SNAPSHOT`不需要任何代码更改，并且可以在系统遇到阻塞问题时用作紧急技术。\n\n`READ COMMITTED SNAPSHOT`提供语句级一致性；也就是说，查询读取的是语句开始时数据的快照。\n\
  \n`SNAPSHOT`隔离级是一个独立的事务隔离级，需要在代码中显式指定。此级别提供事务级一致性；也就是说，查询访问的是事务开始时数据的快照。\n\n使用`SNAPSHOT`隔离级时，写入者不会相互阻塞，除非两个会话正在更新相同的行。这种情况要么导致阻塞，要么导致\
  \ 3960 错误。\n\n虽然乐观隔离级减少了阻塞，但它们会显著增加`tempdb`负载，尤其是在数据不断变化的 OLTP 系统中。它们还通过向数据行添加 14\
  \ 字节指针来加剧索引碎片。您应在实施阶段考虑使用它们的权衡，执行`tempdb`优化，并监控系统以确保版本存储不被滥用。\n\n## 7. 锁升级\n\n尽管从并发性角度来看行级锁很棒，但它开销很大。在内存中，锁结构在\
  \ 32 位操作系统中使用 64 字节，在 64 位操作系统中使用 128 字节。保存数百万个行级和页级锁的信息将使用千兆字节的内存。\n\nSQL Server\
  \ 使用一种称为`锁升级`的技术来减少内存中持有的锁数量，我们将在本章中讨论该技术。\n\n\n## 锁升级概述\n\nSQL Server 尝试通过一种称为锁升级的简单技术来减少内存消耗和锁管理开销。一旦某个语句在同一个对象上获取了至少\
  \ 5,000 个行级和页级锁，SQL Server 就会尝试将这些锁升级——或者更准确地说，替换为单个表级锁，或者如果启用了分区，则替换为分区级锁。如果其他会话没有在该对象或分区上持有不兼容的锁，则此操作成功。\n\
  \n当操作成功时，SQL Server 会释放事务在该对象（或分区）上持有的所有行级和页级锁，仅保留对象级（或分区级）锁。如果操作失败，SQL Server 将继续使用行级锁，并在大约每获取\
  \ 1,250 个新锁后重复升级尝试。除了响应已获取的锁数量外，当实例中的锁总数超过内存或配置阈值时，SQL Server 也可以进行锁升级。\n\n####\
  \ 注意\n\n5,000/1,250 的锁数量阈值是一个近似值。触发锁升级的实际获取锁数量可能有所不同，通常略大于该阈值。\n\n让我们看一个例子，在一个使用\
  \ `REPEATABLE READ` 隔离级别的事务中运行一个 `SELECT` 语句，该语句统计 `Delivery.Orders` 表中的行数。你会记得，在这种隔离级别下，SQL\
  \ Server 会一直持有共享（S）锁直到事务结束。\n\n让我们使用 `ALTER TABLE SET (LOCK_ESCALATION=DISABLE)`\
  \ 命令（稍后会详细介绍）为该表禁用锁升级，并观察 SQL Server 获取的锁数量以及存储它们所需的内存。我们将使用 `(ROWLOCK)` 提示来防止 SQL\
  \ Server `优化` 锁定，即获取页级共享（S）锁而不是行级锁。此外，在事务仍处于活动状态时，让我们从另一个会话插入另一行，以演示锁升级如何影响系统并发性。\n\
  \n#### 表 7-1\n\n禁用锁升级的测试代码\n\n| 会话 1 | 会话 2 |\n| --- | --- |\n| `alter table Delivery.Orders``set\
  \ (lock_escalation=disable);``set transaction isolation level repeatable read``begin\
  \ tran`       `select count(*)`       `from Delivery.Orders`           `with (rowlock);`\
  \ |   |\n|   | `-- 成功``insert into Delivery.Orders``(OrderDate,OrderNum,CustomerId)``values(getUTCDate(),'99999',100);`\
  \ |\n|        `-- 结果: 10,212,326`       `select count(*) as [Lock Count]`       `from\
  \ sys.dm_tran_locks;`       `-- 结果: 1,940,272 KB`       `select sum(pages_kb) as\
  \ [Memory, KB]`       `from sys.dm_os_memory_clerks`       `where type =`           `'OBJECTSTORE_LOCK_MANAGER';``commit`\
  \ |   |\n\n图 7-1 显示了事务活动期间的 *锁内存（KB）* 系统性能计数器。\n\n![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig1_HTML.jpg](img/463519_1_En_7_Fig1_HTML.jpg)\n\
  \n如你所见，从并发角度来看，行级锁定是完美的。只要会话不争夺相同的行，它们就不会相互阻塞。同时，维护大量锁是内存密集型的，而内存是 SQL Server 中最宝贵的资源之一。在我们的示例中，SQL\
  \ Server 需要维护数百万个锁结构，占用了近 2 GB 的 RAM。这个数字包括行级共享（S）锁以及页级意向共享（IS）锁。此外，维护锁定信息和系统中的大量锁结构也有开销。\n\
  \n让我们看看，如果我们使用 `ALTER TABLE SET (LOCK_ESCALATION=TABLE)` 命令启用默认的锁升进行为，并运行表 7-2 中所示的代码，会发生什么情况。\n\
  \n#### 表 7-2\n\n启用锁升级的测试代码\n\n| 会话 1 (SPID=57) | 会话 2 (SPID=58) |\n| --- | --- |\n\
  | `alter table Delivery.Orders``set (lock_escalation=table);``set transaction isolation\
  \ level repeatable read``begin tran`       `select count(*)`       `from Delivery.Orders`           `with\
  \ (rowlock);` |   |\n|   | `-- 该会话被阻塞``insert into Delivery.Orders``(OrderDate,OrderNum,CustomerId)``values(getUTCDate(),'100000',100);`\
  \ |\n|        `select`           `request_session_id as [SPID]`           `,resource_type\
  \ as [Resource]`           `,request_mode as [Lock Mode]`           `,request_status\
  \ as [Status]`       `from sys.dm_tran_locks;``commit` |   |\n\n图 7-2 显示了从 `sys.dm_tran_locks`\
  \ 视图输出的查询结果。\n\n![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig2_HTML.jpg](img/463519_1_En_7_Fig2_HTML.jpg)\n\
  \n\n## 启用锁升级时的 Sys.dm_tran_locks 输出\n\nSQL Server 会用对象共享（S）锁替换行级和页级锁。尽管从内存使用角度看这很棒——只需要维护一个锁——但它会影响并发性。正如你所见，第二个会话被阻塞了——它无法在表上获取意向排他（IX）锁，因为它与第一个会话持有的完整共享（S）锁不兼容。\n\
  \n锁粒度提示，例如 `(ROWLOCK)` 和 `(PAGLOCK)`，不会影响锁升级行为。例如，使用 `(PAGLOCK)` 提示时，SQL Server\
  \ 使用完整的页级锁而非行级锁。然而，如果获取的锁数量超过阈值，这仍然可能触发锁升级。\n\n锁升级默认启用，并且可能引发阻塞问题，这对开发人员和数据库管理员来说可能令人困惑。我们来讨论几种典型情况。\n\
  \n第一种情况是报表查询为了数据一致性目的而使用 `REPEATABLE READ` 或 `SERIALIZABLE` 隔离级别。如果报表查询在没有会话更新数据的情况下读取大量数据，这些查询可能会将共享（S）锁升级到表级。随后，所有写入者都会被阻塞，即使它们试图插入新数据或修改报表查询未读取的数据，正如你在本章前面所见。解决此问题的方法之一是切换到乐观事务隔离级别，我们在前一章中讨论过。\n\
  \n第二种情况是清理过程的实现。假设你需要使用 `DELETE` 语句清理大量旧数据。如果实现方式是一次性删除大量行，你可能会将排他（X）锁升级到表级。这将阻塞所有写入者访问该表，以及处于\
  \ `READ COMMITTED`、`REPEATABLE READ` 或 `SERIALIZABLE` 隔离级别的读取者，即使这些查询操作的数据集与你正在清理的数据完全不同。\n\
  \n最后，你可以想象一个使用单个 `INSERT` 语句插入大批量行的过程。与清理过程类似，它可能将排他（X）锁升级到表级，并阻止其他会话访问该表。\n\n所有这些模式都有一个共同点——它们作为单个语句的一部分获取并持有大量行级和页级锁。这会触发锁升级，如果当时没有其他会话在表（或分区）级别持有不兼容的锁，升级就会成功。这将阻止其他会话在第一个会话完成事务之前获取不兼容的意向锁或完整锁（在表或分区上），无论被阻塞的会话是否试图访问受第一个会话影响的数据。\n\
  \n值得再次强调的是，锁升级是由语句获取的锁数量触发的，而不是由整个事务触发的。如果各个语句各自获取的行级和页级锁少于 5,000 个，则不会触发锁升级，无论该事务持有的锁总数是多少。清单\
  \ 7-1 展示了一个在单个事务中循环运行多个 `UPDATE` 语句的例子。\n\n```sql\ndeclare\n@id int = 1\nbegin tran\n\
  while @id < 100000\nbegin\nupdate Delivery.Orders\nset OrderStatusId = 1\nwhere\
  \ OrderId between @id and @id + 4998;\nselect @id += 4999;\nend\nselect count(*)\
  \ as [Lock Count]\nfrom sys.dm_tran_locks\nwhere request_session_id = @@SPID;\n\
  commit\n```\n清单 7-1：锁升级与多条语句\n\n![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig3_HTML.jpg](img/463519_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3：事务持有的锁数量\n\n## 锁升级故障排除\n\n锁升级是完全正常的。它有助于减少锁管理开销和内存使用，从而提高系统性能。除非它开始在系统中引起明显的阻塞问题，否则你应该保持其启用状态。不幸的是，检测锁升级是否导致阻塞并不总是那么容易，你需要分析具体的阻塞案例来理解它。\n\
  \n潜在的由锁升级引起的阻塞的一个迹象是，在等待统计中，意向锁等待 `(LCK_M_I*)` 占比很高。然而，锁升级并非此类等待的唯一原因，你在分析时还需要查看其他指标。\n\
  \n\n#### 注意\n\n我们将在第 12 章中讨论等待统计分析。\n\n锁升级事件会导致完全的表级锁。你可以在 `sys.dm_tran_locks` 视图输出和被阻塞进程报告中看到这一点。图\
  \ 7-4 展示了如果你在阻塞发生时运行第 3 章中的清单 3-2 所得到的输出。如你所见，被阻塞的会话正试图在对象上获取一个意向锁，而阻塞会话——即触发锁升级的那个会话——持有一个不兼容的完全锁。\n\
  \n![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig4_HTML.jpg](img/463519_1_En_7_Fig4_HTML.jpg)\n\
  \n图 7-4. 锁升级期间的清单 3-2 输出 (`sys.dm_tran_locks` 视图)\n\n如果你查看被阻塞进程报告，你会看到被阻塞的进程正在等待对象上的意向锁，如清单\
  \ 7-2 所示。\n\n```\n清单 7-2\n被阻塞进程报告（部分）\n```\n\n再次提醒，请记住，会话获取完全对象锁或在等待表上的意向锁时被阻塞，可能有其他原因。你必须关联来自其他来源的信息，以确认阻塞是由于锁升级造成的。\n\
  \n你可以使用 SQL 跟踪捕获锁升级事件。图 7-5 展示了 `Profiler` 应用程序中的输出。\n\n![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig5_HTML.jpg](img/463519_1_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5. SQL Server Profiler 中显示的锁升级事件\n\nSQL 跟踪提供以下属性：\n\n*   `EventSubClass` 指示是什么触发了锁升级——锁的数量或内存阈值。\n\
  *   `IntegerData` 和 `IntegerData2` 显示升级发生时存在的锁数量以及在升级过程中转换了多少个锁。值得注意的是，在我们的示例中，当语句获取了\
  \ 6,248 个锁而非 5,000 个时，发生了锁升级。\n*   `Mode` 告知哪种类型的锁被升级。\n*   `ObjectID` 是触发锁升级的表的\
  \ `object_id`。\n*   `ObjectID2` 是触发锁升级的 `HoBT` ID。\n*   `Type` 代表锁升级的粒度。\n*   `TextData`、`LineNumber`\
  \ 和 `Offset` 提供有关触发锁升级的批处理和语句的信息。\n\n另一种也是更好的捕获锁升级发生的方法是使用扩展事件。图 7-6 展示了一个 `lock_escalation`\
  \ 事件及一些可用的事件字段。此事件在 SQL Server 2012 及更高版本中可用。\n\n![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig6_HTML.jpg](img/463519_1_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6. `lock_escalation` 扩展事件\n\n该扩展事件有助于了解哪些对象最常触发锁升级。你可以查询和聚合原始捕获的数据，或者，也可以使用\
  \ `histogram` 目标在扩展事件会话中进行聚合。\n\n清单 7-3 展示了后一种方法，按 `object_id` 字段对数据进行分组。此代码适用于\
  \ SQL Server 2012 及更高版本。\n\n```sql\ncreate event session LockEscalationInfo\non\
  \ server\nadd event\n    sqlserver.lock_escalation\n    (\n        where\n     \
  \       database_id = 5  -- DB_ID()\n    )\nadd target\n    package0.histogram\n\
  \    (\n        set\n            slots = 1024 -- 基于数据库中的表数量\n            ,filtering_event_name\
  \ = 'sqlserver.lock_escalation'\n            ,source_type = 0 -- 事件数据列\n       \
  \     ,source = 'object_id' -- 分组列\n    )\nwith\n    (\n        event_retention_mode=allow_single_event_loss\n\
  \        ,max_dispatch_latency=10 seconds\n    );\nalter event session LockEscalationInfo\n\
  on server\nstate=start;\n```\n清单 7-3. 使用 xEvents 捕获锁升级事件的发生次数\n\n清单 7-4 中的代码查询会话目标并返回基于每个表的锁升级次数。\n\
  \n```sql\n;with TargetData(Data)\nas\n(\n    select convert(xml,st.target_data)\
  \ as Data\n    from sys.dm_xe_sessions s join sys.dm_xe_session_targets st on\n\
  \        s.address = st.event_session_address\n    where s.name = 'LockEscalationInfo'\
  \ and st.target_name = 'histogram'\n)\n,EventInfo([count],object_id)\nas\n(\n  \
  \  select\n        t.e.value('@count','int')\n        ,t.e.value('((./value)/text())[1]','int')\n\
  \    from\n        TargetData cross apply\n        TargetData.Data.nodes('/HistogramTarget/Slot')\
  \ as t(e)\n)\nselect\n    e.object_id\n    ,s.name + '.' + t.name as [table]\n \
  \   ,e.[count]\nfrom\n    EventInfo e join sys.tables t on\n        e.object_id\
  \ = t.object_id\n    join sys.schemas s on\n        t.schema_id = s.schema_id\n\
  order by\n    e.count desc;\n```\n清单 7-4. 分析捕获的结果\n\n你不应仅仅为了禁用锁升级而使用此数据。然而，当分析涉及对象级阻塞的阻塞案例时，它非常有用。\n\
  \n我想重申，锁升级是完全正常的，并且是 SQL Server 中一个非常有用的功能。尽管它可能引起阻塞问题，但它有助于保留 SQL Server 内存。实例持有的大量锁会减少缓冲池的大小。因此，缓存中的数据页会减少，这可能导致更多的物理\
  \ I/O 操作并降低查询性能。\n\n此外，当没有可用内存来存储锁信息时，SQL Server 可能会终止查询并返回错误 1204。图 7-7 显示了这样一个错误消息。\n\
  \n![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig7_HTML.jpg](img/463519_1_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7. 错误 1204\n\n在 SQL Server 2008 及更高版本中，你可以使用 `ALTER TABLE SET LOCK_ESCALATION`\
  \ 语句在表级别控制升级行为。此选项影响为表定义的所有索引（包括聚集索引和非聚集索引）的锁升级行为。提供三个选项：\n\n*   `DISABLE:` 此选项禁用特定表的锁升级。\n\
  *   `TABLE:` SQL Server 将锁升级到表级别。这是默认选项。\n*   `AUTO:` 当表已分区时，SQL Server 将锁升级到分区级别；当表未分区时，升级到表级别。对于大型分区表，尤其是当有大型报告或清理查询在旧数据上运行时，请使用此选项。\n\
  \n#### 注意\n\n`sys.tables` 目录视图在 `lock_escalation` 和 `lock_escalation_desc` 列中提供了有关表锁升级模式的信息。\n\
  \n不幸的是，SQL Server 2005 不支持此选项，在该版本中禁用锁升级的唯一方法是使用有记录的跟踪标志 `T1211` 或 `T1224`，在实例或会话级别进行设置。请记住，你需要拥有\
  \ `sysadmin` 权限才能调用 `DBCC TRACEON` 命令并在会话级别设置跟踪标志。\n\n*   `T1211` 禁用锁升级，无论内存条件如何。\n\
  *   `T1224` 基于锁数量阈值禁用锁升级，尽管在内存压力下仍可能触发锁升级。\n\n\n## 注意事项\n\n你可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/database-console-commands/dbcc-traceon-trace-flags-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/database-console-commands/dbcc-traceon-trace-flags-transact-sql)\
  \ 阅读更多关于跟踪标志 `T1211` 和 `T1224` 的信息。\n\n与其他阻塞问题一样，你应该找到锁升级的根本原因。你还应该考虑在系统中的特定表上禁用锁升级的利弊。虽然这可能会减少系统中的阻塞，但\
  \ SQL Server 将使用更多内存来存储锁信息。当然，你也可以将代码重构视为另一种选择。\n\n如果锁升级是由写入者触发的，你可以减少批处理的大小，直到每个对象获取的行级和页级锁少于\
  \ 5,000 个。你仍然可以在同一个事务中处理多个批处理——5,000 个锁的阈值是每个语句的。同时，你应该记住，较小的批处理通常比较大的批处理效率低。你需要微调批处理大小并找到最优值。如果对象级锁没有被保持过长时间和/或其他会话没有受到影响，触发锁升级是正常的。\n\
  \n至于由读取者触发的锁升级，你应该避免持有许多共享 (S) 锁的情况。一个例子是由于未优化的查询或报表查询在 `REPEATABLE READ` 或 `SERIALIZABLE`\
  \ 事务隔离级别下进行扫描，这些查询会持有共享 (S) 锁直到事务结束。清单 7-5 中显示的示例使用 `SERIALIZABLE` 隔离级别从 `Delivery.Orders`\
  \ 表运行 `SELECT`。\n\n```\nset transaction isolation level serializable\nbegin tran\n\
  select OrderId, OrderDate, Amount\nfrom Delivery.Orders with (rowlock)\nwhere OrderNum\
  \ = '1';\nselect\nresource_type as [Resource Type]\n,case resource_type\nwhen 'OBJECT'\
  \ then\nobject_name\n(\nresource_associated_entity_id\n,resource_database_id\n)\n\
  when 'DATABASE' then 'DB'\nelse\n(\nselect object_name(object_id, resource_database_id)\n\
  from sys.partitions\nwhere hobt_id = resource_associated_entity_id\n)\nend as [Object]\n\
  ,request_mode as [Mode]\n,request_status as [Status]\nfrom sys.dm_tran_locks\nwhere\
  \ request_session_id = @@SPID;\ncommit\nListing 7-5\n由未优化查询触发的锁升级\n```\n\n图 7-8\
  \ 显示了来自 `sys.dm_tran_locks` 视图的第二个查询的输出。\n\n![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig8_HTML.jpg](img/463519_1_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8\n\n在 SERIALIZABLE 隔离级别中选择数据\n\n即使查询只返回一行，你也会看到共享 (S) 锁已升级到表级别。和往常一样，我们需要查看执行计划（如图\
  \ 7-9 所示）来对其进行故障排除。\n\n![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig9_HTML.jpg](img/463519_1_En_7_Fig9_HTML.jpg)\n\
  \n图 7-9\n\n查询的执行计划\n\n`OrderNum` 列上没有索引，SQL Server 使用了 `Clustered Index Scan` 运算符。尽管查询只返回一行，但由于\
  \ `SERIALIZABLE` 隔离级别，它获取并保持了它读取的所有行的共享 (S) 范围锁。结果，触发了锁升级。如果你在 `OrderNum` 列上添加索引，它会将执行计划更改为\
  \ `Nonclustered Index Seek`。只读取一行，获取并保持的行级和页级锁非常少，因此不需要锁升级。\n\n在某些情况下，你可以考虑对表进行分区，并使用\
  \ `ALTER TABLE SET (LOCK_ESCALATION=AUTO)` 语句将锁升级选项设置为使用分区级升级，而不是表级。在必须使用 `DELETE`\
  \ 语句清除旧数据或在 `REPEATABLE READ` 或 `SERIALIZABLE` 隔离级别下对旧数据运行报表查询的情况下，这可能会有所帮助。在这些情况下，语句会将锁升级到分区，而不是表，而不访问这些分区的查询将不会被阻塞。\n\
  \n在其他情况下，你可以切换到乐观隔离级别。最后，在 `READ UNCOMMITTED` 事务隔离级别下，你不会有任何与读取者相关的阻塞问题，因为不会获取共享\
  \ (S) 锁，但由于它带来的所有其他数据一致性问题，不推荐使用此方法。\n\n## 总结\n\n在语句获取并保持大约 5,000 个行级和页级锁后，SQL Server\
  \ 会将锁升级到对象或分区级别。当升级成功时，SQL Server 保留单个对象级锁，阻止具有不兼容锁类型的其他会话访问表。如果升级失败，SQL Server\
  \ 会在大约每获取 1,250 个新锁后重复升级尝试。\n\n锁升级完全符合“视情况而定”的类别。它减少了 SQL Server 锁管理器的内存使用和维护大量锁的开销。同时，由于持有的对象或分区级锁，它可能会增加系统中的阻塞。\n\
  \n你应该保持锁升级启用，除非你发现它在系统中引入了明显的阻塞问题。即使在这些情况下，你也应该进行根本原因分析，以了解为何会发生由锁升级引起的阻塞，并评估禁用它的利弊。你还应该查看其他可用选项，例如代码和数据库模式重构、查询调优以及切换到乐观事务隔离级别。这些选项中的任何一个都可能是比禁用锁升级更好的选择，以解决你的阻塞问题。\n\
  \n"
- "# 8. 模式锁和低优先级锁\n\nSQL Server 使用两种额外的锁类型，称为模式锁，以防止在查询执行期间更改表和元数据。本章将深入讨论模式锁以及低优先级锁，后者在\
  \ SQL Server 2014 中引入，旨在减少在线索引重建和分区切换操作期间的阻塞。\n\n## 模式锁\n\nSQL Server 需要保护数据库元数据，以防止在查询执行过程中更改表结构的情况。这个问题比看起来更复杂。虽然理论上独占\
  \ (X) 表锁可以在 `ALTER TABLE` 操作期间阻止对表的访问，但它们在 `READ UNCOMMITTED`、`READ COMMITTED SNAPSHOT`\
  \ 和 `SNAPSHOT` 隔离级别中不起作用，因为在这些级别下读取者不获取意向共享 (IS) 表锁。\n\nSQL Server 使用两种额外的锁类型来解决这个问题：模式稳定性\
  \ (Sch-S) 锁和模式修改 (Sch-M) 锁。模式修改 (Sch-M) 锁在发生任何元数据更改时以及执行 `TRUNCATE TABLE` 语句期间获取。你可以将这种锁类型视为“超级锁”。它与任何其他锁类型都不兼容，并且完全阻止对对象的访问。\n\
  \n像独占 (X) 锁一样，模式修改 (Sch-M) 锁会一直保持到事务结束。在显式事务中运行 DDL 语句时，你需要记住这一点。虽然这允许你在发生错误时回滚所有模式更改，但它也会阻止对受影响对象的任何访问，直到事务提交。\n\
  \n\n\n### 重要提示\n\n许多数据库架构比较工具会在修改脚本中使用显式事务。当你在其他用户正在访问系统的实时服务器上运行此脚本时，这可能会导致严重的阻塞。\n\
  \nSQL Server 在修改分区函数时也会使用架构修改锁。当此类修改导致数据移动或扫描时，这会严重影响系统的可用性。所有使用该分区函数的分区表的访问都会被阻塞，直到操作完成。\n\
  \n### 架构稳定性锁\n\n`架构稳定性锁`在 DML 查询编译和执行期间使用。SQL Server 会获取它，无论事务隔离级别如何，即使在`READ UNCOMMITTED`模式下也是如此。它们的唯一目的是在查询访问表时，保护表不被更改或删除。`架构稳定性锁`与任何其他锁类型都兼容，但`架构修改锁`除外。\n\
  \nSQL Server 可以执行一些优化来减少获取的锁数量。虽然在查询编译期间始终使用`架构稳定性锁`，但 SQL Server 可以在查询执行期间用意向对象锁替换它。让我们看一下表\
  \ 8-1 中的示例。\n\n### 架构锁：查询编译\n\n表 8-1\n\n| 会话 1 (SPID=64) | 会话 2 (SPID=65) | 会话 3\
  \ (SPID=66) |\n| --- | --- | --- |\n| `begin tran`<br>`alter table Delivery.Orders`<br>`add\
  \ Dummy int;` |  |  |\n|  | `select count(*) from Delivery.Orders with (nolock);`\
  \ | `delete from Delivery.Orders where OrderId = 1;` |\n| `select`<br>`request_session_id,\
  \ resource_type, request_type, request_mode, request_status`<br>`from sys.dm_tran_locks`<br>`where\
  \ resource_type = 'OBJECT';`<br>`rollback` |  |  |\n\n第一个会话启动事务并修改表，在那里获取了一个`架构修改锁`。在下一步中，另外两个会话分别在`READ\
  \ UNCOMMITTED`隔离级别下运行`SELECT`语句和`DELETE`语句。\n\n如图 8-1 所示，会话 2 和 3 因等待查询编译所需的`架构稳定性锁`而被阻塞。\n\
  \n![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig1_HTML.jpg](img/463519_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1\n查询编译期间的架构锁\n\n### 带有缓存计划的架构锁\n\n如果你第二次运行该示例，此时查询已被编译且计划已缓存，你会看到略有不同的情况，如图\
  \ 8-2 所示。\n\n![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig2_HTML.jpg](img/463519_1_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2\n执行计划被缓存时的架构锁\n\n第二个会话仍然会等待授予`架构稳定性锁`。在`READ UNCOMMITTED`模式下没有`共享锁`，而`架构稳定性锁`是在执行期间保持架构稳定的唯一方式。但是，运行`DELETE`语句的会话会等待`意向排他锁`。无论如何都需要获取该锁类型，因为它也与`架构修改锁`不兼容并能防止架构被更改，所以它可以替换`架构稳定性锁`。\n\
  \n### 混合锁导致的死锁\n\n在同一事务中混合使用`架构修改锁`与其他锁类型会增加死锁的可能性。假设我们有两个会话：第一个启动事务，并更新表中的一行。此时，它持有该行上的`排他锁`以及页和表上的两个`意向排他锁`。如果另一个会话尝试读取（或更新）同一行，它将被阻塞。此时，它会等待该行上的`共享锁`，并在页和表上持有`意向共享锁`。此阶段如图\
  \ 8-3 所示。（省略了页级意向锁。）\n\n![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig3_HTML.jpg](img/463519_1_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3\n由于混合 DDL 和 DML 语句导致的死锁：步骤 1 和 2\n\n如果此时第一个会话想要修改表，它需要获取`架构修改锁`。该锁类型与任何其他锁类型都不兼容，而该会话会被第二个会话持有的`意向共享锁`阻塞，这导致了死锁条件，如图\
  \ 8-4 所示。\n\n![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig4_HTML.jpg](img/463519_1_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4\n由于混合 DDL 和 DML 语句导致的死锁：步骤 3\n\n值得注意的是，这种特定的死锁模式可能发生在任何完整的表级锁上。然而，`架构修改锁`由于与系统中所有其他锁类型不兼容，增加了死锁的可能性。\n\
  \n\n\n### 锁队列与锁兼容性\n\n到目前为止，我们所讨论的阻塞情况仅涉及两个会话，并且资源上已持有不兼容的锁类型。在实际情况中，问题通常更为复杂。在繁忙的系统中，同时有数十甚至数百个会话访问同一资源（例如一个表）是很常见的。让我们通过几个例子，来分析在多会话场景下的锁兼容性规则。\n\
  \n#### 多会话与 READ COMMITTED 隔离级别\n\n首先，让我们看一个多个会话获取行级锁的场景。如表 8-2 所示，第一个会话`(SPID=55)`在该行上持有一个共享锁(`S`)。第二个会话`(SPID=54)`试图在同一行上获取一个排他锁(`X`)，但由于锁不兼容而被阻塞。第三个会话`(SPID=53)`在`READ\
  \ COMMITTED`事务隔离级别下读取同一行。该会话没有被阻塞。\n\n**表 8-2：多会话与锁兼容性：READ COMMITTED 隔离级别**\n\n\
  | 会话 1 (SPID=55) | 会话 2 (SPID=54) | 会话 3 (SPID=53) |\n| --- | --- | --- |\n| ```begin\
  \ tran    select OrderId, Amount    from Delivery.Orders        with (repeatableread)\
  \    where OrderId = 1;``` | | |\n| | ```-- 被阻塞 delete from Delivery.Orders where\
  \ OrderId = 1;``` | ```-- 成功 select OrderId, Amount from Delivery.Orders    with\
  \ (readcommitted)where OrderId = 1;``` |\n| ```    select          l.request_session_id\
  \ as [SPID]        ,l.resource_description        ,l.resource_type        ,l.request_mode\
  \        ,l.request_status        ,r.blocking_session_id    from          sys.dm_tran_locks\
  \ l join    sys.dm_exec_requests r on    l.request_session_id =                r.session_id\
  \    where l.resource_type = 'KEY'rollback``` | | |\n\n图 8-5 展示了在`OrderId=1`的行上持有的行级锁。\n\
  \n![超过两个会话时的锁兼容性：READ COMMITTED](img/463519_1_En_8_Fig5_HTML.jpg)\n\n如图 8-6 所示，第三个会话(`SPID=53`)甚至没有尝试在该行上获取共享锁(`S`)。该行上已经有一个由第一个会话(`SPID=55`)持有的共享锁(`S`)，这保证了该行没有被未提交的事务修改过。在`READ\
  \ COMMITTED`隔离级别下，共享锁(`S`)在行被读取后会立即释放。因此，会话 3(`SPID=53`)在读取该行后无需持有自己的共享锁(`S`)，它可以依赖来自会话\
  \ 1 的锁。\n\n![操作期间获取的锁](img/463519_1_En_8_Fig6_HTML.jpg)\n\n#### 多会话与 REPEATABLE\
  \ READ 隔离级别\n\n让我们修改例子，看看如果第三个会话尝试在`REPEATABLE READ`隔离级别下读取该行会发生什么。在该隔离级别下，共享锁(`S`)需要持有到事务结束，如表\
  \ 8-3 所示。这种情况下，第三个会话不能依赖来自其他会话的共享锁(`S`)，因为它的生命周期可能不同。该会话需要获取自己的共享锁(`S`)，但将被队列中第二个会话持有的不兼容排他锁(`X`)所阻塞。\n\
  \n**表 8-3：多会话与锁兼容性 (REPEATABLE READ 隔离级别)**\n\n| 会话 1 (SPID=55) | 会话 2 (SPID=54)\
  \ | 会话 3 (SPID=53) |\n| --- | --- | --- |\n| ```begin tran  select OrderId, Amount\
  \  from Delivery.Orders       with (repeatableread)  where OrderId = 1;``` | | |\n\
  | | ```-- 被阻塞 delete from Delivery.Orders where OrderId = 1;``` | ```-- 被阻塞 select\
  \ OrderId, Amountfrom Delivery.Orders    with (repeatableread)where OrderId = 1;```\
  \ |\n| ```  select      l.request_session_id       as [SPID],l.resource_description\
  \    ,l.resource_type    ,l.request_mode    ,l.request_status,r.blocking_session_id\
  \  from      sys.dm_tran_locks l join    sys.dm_exec_requests r        on    l.request_session_id\
  \ =            r.session_id  where l.resource_type = 'KEY';rollback``` | | |\n\n\
  图 8-7 展示了此时的行级锁请求。\n\n![超过两个会话时的锁兼容性](img/463519_1_En_8_Fig7_HTML.jpg)\n\n#### 重要结论\n\
  \n这让我们得出一个非常重要的结论：一个锁要被授予，必须与该资源上的**所有**锁请求（无论是否已授予）都兼容。\n\n\n\n### 重要提示\n\n第一种场景，当第三个会话在\
  \ `READ COMMITTED` 隔离级别下运行且未获取到资源上的锁时，可以被视为一种内部优化，但你不应依赖于此。在某些情况下，SQL Server 在 `READ\
  \ COMMITTED` 模式下仍然会尝试获取资源上的另一个共享 (S) 锁，即使该资源上已经存在另一个共享 (S) 锁。在这种情况下，查询将像在 `REPEATABLE\
  \ READ` 隔离级别示例中一样被阻塞。\n\n不幸的是，SQL Server 中的会话不会重用其他会话在表级别的锁。无法估计任何表级锁意图、完全锁或架构稳定性锁需要保持的时间。会话将始终尝试获取对象级锁，如果锁队列中存在任何其他不兼容的锁类型，它将被阻塞。\n\
  \n这种行为可能会在系统中引入严重的阻塞问题。最常见的案例之一是在线索引重建操作。尽管它在重建过程中持有意向共享 (IS) 表锁，但它需要在开始时获取一个共享\
  \ (S) 表锁，并在执行的最后阶段获取一个架构修改 (Sch-M) 锁。这两个锁的持有时间都非常短；然而，它们在繁忙的 OLTP 环境中可能会引发阻塞问题。\n\
  \n考虑这样一种情况：当另一个活动事务正在修改表中的数据时，你启动了在线索引重建。该事务将持有表上的意向排他 (IX) 锁，这会阻止在线索引重建获取共享 (S)\
  \ 表锁。锁请求将在队列中等待，并阻塞所有其他想要修改表中数据并请求意向排他 (IX) 锁的事务。图 8-8 说明了这种情况。\n\n![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig8_HTML.jpg](img/463519_1_En_8_Fig8_HTML.jpg)\n\
  图 8-8\n索引重建初始阶段的阻塞\n\n只有当第一个事务完成，并且在线索引重建获取并释放了共享 (S) 表锁后，这种阻塞状况才会清除。同样，更严重的阻塞可能发生在在线索引重建的最后阶段，此时它需要获取一个架构修改\
  \ (Sch-M) 锁以在元数据中替换索引引用。在索引重建等待架构修改 (Sch-M) 锁被授予期间，读取者和写入者都将被阻塞。\n\n在分区切换操作期间也可能发生类似的阻塞，该操作也会获取架构修改\
  \ (Sch-M) 锁。尽管分区切换是在元数据级别完成且速度非常快，但架构修改 (Sch-M) 锁在队列中等待被授予时会阻塞其他会话。\n\n在设计索引维护和分区管理策略时，你需要记住这一行为。在\
  \ SQL Server 的非企业版，甚至在 SQL Server 2014 之前的企业版中，能做的很少。你可以在系统负载最低的时间段安排操作运行。或者，你可以使用\
  \ `LOCK_TIMEOUT` 设置编写代码来终止操作。\n\n清单 8-1 说明了这种方法。你可以将其用于离线索引重建和分区切换操作。在离线索引重建期间，当架构修改\
  \ (Sch-M) 锁被持有时，你仍然会遇到阻塞。但是，如果在 `LOCK_TIMEOUT` 间隔内无法获取此锁，你将消除阻塞。请记住，当 `XACT_ABORT`\
  \ 设置为 `OFF` 时，锁超时错误不会回滚事务。请使用适当的事务管理和错误处理，正如我们在第 2 章讨论的那样。\n\n另外，作为另一个告诫，不要在在线索引重建中使用\
  \ `LOCK_TIMEOUT`，因为它可能会在会话等待架构修改 (Sch-M) 锁以在元数据中替换索引定义时，在最后阶段终止并回滚操作。\n\n```sql\n\
  set xact_abort off\nset lock_timeout 100 -- 100 milliseconds\ngo\ndeclare\n    @attempt\
  \ int = 1\n    ,@maxAttempts int = 10\nwhile @attempt <= @maxAttempts\nbegin\n \
  \   begin try\n        raiserror('Rebuilding index. Attempt %d / %d',0,1,@attempt,@maxAttempts)\
  \ with nowait;\n        alter index PK_Orders\n        on Delivery.Orders rebuild\n\
  \        with (online = off);\n        break;\n    end try\n    begin catch\n  \
  \      if ERROR_NUMBER() = 1222 and @attempt < @maxAttempts\n        begin\n   \
  \         set @attempt += 1;\n            waitfor delay '00:00:15.000';\n      \
  \  end\n        else\n            throw;\n    end catch\nend;\n```\n清单 8-1\n减少离线索引重建期间的阻塞\n\
  \n幸运的是，SQL Server 2014 及以上版本的企业版提供了一种更好的方法来处理此问题。\n\n## 低优先级锁\n\nSQL Server 2014\
  \ 引入了一个新功能——低优先级锁，它有助于减少在线索引重建和分区切换操作期间的阻塞。从概念上讲，你可以将低优先级锁视为驻留在与常规锁不同的锁队列中。\n\n\
  图 8-9 说明了这一点。\n\n![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig9_HTML.jpg](img/463519_1_En_8_Fig9_HTML.jpg)\n\
  图 8-9\n低优先级锁\n\n### 重要提示\n\n必须记住，一旦获取了低优先级锁，其行为将与常规锁相同，阻止其他会话在该资源上获取不兼容的锁。\n\n图\
  \ 8-10 展示了第 3 章清单 3-2 中查询的输出。它演示了低优先级锁如何在 `sys.dm_tran_locks` 视图输出中显示。值得注意的是，该视图不提供这些锁的等待时间。\n\
  \n![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig10_HTML.jpg](img/463519_1_En_8_Fig10_HTML.jpg)\n\
  图 8-10\n`sys.dm_tran_locks` 数据管理视图中的低优先级锁\n\n你可以在 `ALTER INDEX` 和 `ALTER TABLE`\
  \ 语句中使用 `WAIT_AT_LOW_PRIORITY` 子句来指定锁优先级，如清单 8-2 所示。\n\n```sql\nalter index PK_Customers\
  \ on Delivery.Customers rebuild\nwith\n(\n    online=on\n    (\n        wait_at_low_priority(\
  \   max_duration=10 minutes  ,abort_after_wait=blockers )\n    )\n);\nalter table\
  \ Delivery.Orders\nswitch partition 1 to Delivery.OrdersTmp\nwith\n(\n    wait_at_low_priority\
  \ (   max_duration=60 minutes  ,abort_after_wait=self )\n)\n```\n清单 8-2\n指定锁优先级\n\
  \n如你所见，`WAIT_AT_LOW_PRIORITY` 有两个选项。`MAX_DURATION` 设置指定以分钟为单位的锁等待时间。`ABORT_AFTER_WAIT`\
  \ 设置定义了如果在指定时间限制内无法获取锁时，会话的行为。可能的值为：\n\n*   `NONE`：低优先级锁转换为常规锁。之后，它的行为就像常规锁一样，会阻塞尝试在该资源上获取不兼容锁类型的其他会话。会话继续等待，直到锁被获取。\n\
  *   `SELF`：如果在 `MAX_DURATION` 设置指定的时间内无法授予锁，则操作将中止。\n*   `BLOCKERS`：所有持有该资源锁的会话都将被中止，等待低优先级锁的会话将能够获取它。\n\
  \n\n\n\n#### 注意\n\n省略 `WAIT_AT_LOW_PRIORITY` 选项的效果与指定 `WAIT_AT_LOW_PRIORITY(MAX_DURATION=0\
  \ MINUTES, ABORT_AFTER_WAIT=NONE)` 相同。\n\n非常活跃的 OLTP 表总是有大量的并发会话访问它们。因此，即使指定了较长的\
  \ `MAX_DURATION`，会话仍有可能无法获得低优先级锁。你可以考虑使用 `ABORT_AFTER_WAIT=BLOCKERS` 选项，这将允许操作完成，尤其是在客户端应用程序实现了适当的异常处理和重试逻辑的情况下。\n\
  \n最后值得注意的是，在线索引重建仅在 SQL Server 的企业版和 Microsoft Azure SQL 数据库中受支持。在其他版本中，无法在索引重建期间使用低优先级锁。然而，从\
  \ SQL Server 2016 SP1 开始，表分区在非企业版本中也得到支持，并且你可以在任何版本的 SQL Server 中在此场景下使用低优先级锁。\n\
  \n## 总结\n\nSQL Server 使用架构锁在查询编译和执行期间保护元数据不被更改。SQL Server 中有两种类型的架构锁：架构稳定性锁 (`Sch-S`)\
  \ 和架构修改锁 (`Sch-M`)。\n\n在查询编译和执行期间，会在查询引用的对象上获取架构稳定性 (`Sch-S`) 锁。但在某些情况下，SQL Server\
  \ 可以用意向表锁替换架构稳定性 (`Sch-S`) 锁，这也能保护表架构。架构稳定性 (`Sch-S`) 锁与任何其他锁类型兼容，除了架构修改 (`Sch-M`)\
  \ 锁。\n\n架构修改 (`Sch-M`) 锁与任何其他锁类型都不兼容。SQL Server 在 DDL 操作期间使用它们。如果 DDL 操作需要扫描或修改数据（例如，向表添加受信任的外键约束或在非空分区上修改分区函数），则架构修改\
  \ (`Sch-M`) 锁将在整个操作期间保持。在大型表上，这可能需要很长时间，并导致系统中出现严重的阻塞问题。在设计并行运行 DDL 和 DML 操作的系统时，你需要牢记这一点。\n\
  \n为了被授予，一个锁需要与该资源上所有（无论是否已授予的）锁请求兼容。这可能导致在繁忙的系统中，当某个会话请求表上的架构修改 (`Sch-M`) 锁或完整的对象级锁时，出现严重的阻塞。在系统设计索引或分区维护策略时，你需要记住这种行为。\n\
  \nSQL Server 2014 及以上版本支持低优先级锁，可用于减少在线索引重建和分区切换操作期间的阻塞。当操作正在等待获取低优先级锁时，这些锁不会阻塞请求不兼容锁类型的其他会话。\n\
  \n"
- '# 9. 锁分区


  与其它现代数据库引擎一样，SQL Server 设计用于在具有大量 CPU 的服务器上运行。它具有许多优化措施，帮助引擎在此类环境中扩展并高效工作。


  本章将讨论其中一项优化：锁分区，当服务器具有 16 个或更多逻辑 CPU 时，该功能会自动启用。


  ## 锁分区概述


  众所周知，硬件成本随着时间的推移不断下降，使我们能够构建更强大的服务器。二十年前，数据库服务器通常只有一个或极少数 CPU。如今，使用具有几十个甚至有时数百个核心的服务器已经非常普遍。


  大多数多 CPU 服务器使用*非统一内存访问 (NUMA)* 架构构建。在此架构中，物理 CPU 被分区为称为 *NUMA 节点* 的组。内存也在各节点间进行分区，每个节点使用独立的系统总线来访问其内存。每个处理器都可以访问系统中的所有内存；但是，访问属于
  CPU 的 NUMA 节点的*本地内存* 比访问来自不同 NUMA 节点的*外部内存* 更快。


  #### 注意


  你可以在 [`https://technet.microsoft.com/en-us/library/ms178144.aspx`](https://technet.microsoft.com/en-us/library/ms178144.aspx)
  阅读更多关于 NUMA 架构的信息。


  SQL Server 原生支持 NUMA 架构，并拥有一些内部优化来利用它。例如，SQL Server 总是尝试为线程分配本地内存，并且它还具有基于每个 NUMA
  节点的分布式 I/O 线程。


  此外，各种缓存和队列在 NUMA 节点级别——有时是调度器级别——进行分区，这减少了多个调度器（逻辑 CPU）访问它们时可能出现的争用。这包括系统中的锁队列。当系统有
  16 个或更多逻辑处理器时，SQL Server 开始使用一种称为*锁分区*的技术。


  启用锁分区后，SQL Server 开始基于每个调度器存储锁信息。在此模式下，对象级的意向共享锁 (`IS`)、意向排他锁 (`IX`) 和架构稳定性锁 (`Sch-S`)
  在执行批处理的 CPU（调度器）上的单个分区中获取和存储。所有其他锁类型需要在所有分区上获取。


  从锁兼容性的角度来看，这没有任何改变。例如，当会话需要获取表的排他 (`X`) 锁时，它会遍历所有锁分区，如果任何分区在表上持有不兼容的意向锁，则会被阻塞。然而，这可能导致一种有趣的情况：一个对象级锁在部分分区上被授予，但在另一个持有不兼容意向
  (`I*`) 或架构稳定性 (`Sch-S`) 锁的分区上被阻塞。


  让我们看一个演示这种情况的例子。正如我已经提到的，锁分区在具有 16 个或更多逻辑 CPU 的服务器上自动启用。你可以使用未公开的启动参数 `-P` 来更改测试系统中的调度器数量。*切勿在生产环境中使用此参数！*


  清单 9-1 展示了一个查询，该查询启动一个事务，并在 `REPEATABLE READ` 隔离级别下从表中选择一行，该隔离级别会持有共享 (`S`) 锁直到事务结束。接下来，它使用
  `sys.dm_tran_locks` 视图获取会话持有的锁的信息。我在测试环境中使用 `-P16` 启动参数运行此代码，这将创建 16 个调度器并启用锁分区。


  ```

  begin tran

  select *

  from Delivery.Orders with (repeatableread)

  where OrderId = 100;

  select

  request_session_id

  ,resource_type

  ,resource_lock_partition

  ,request_mode

  ,request_status

  from sys.dm_tran_locks

  where request_session_id = @@SPID;

  ```

  **清单 9-1** 锁分区：更新表中的一行


  图 9-1 展示了 `SELECT` 语句的输出。`resource_lock_partition` 列指示锁存储在哪个分区（`NULL` 表示锁未分区，并在所有分区上获取）。如你所见，表级的意向共享
  (`IS`) 锁已分区并存储在分区四中。页级和行级锁未分区，存储在所有分区中。


  ![../images/463519_1_En_9_Chapter/463519_1_En_9_Fig1_HTML.jpg](img/463519_1_En_9_Fig1_HTML.jpg)


  **图 9-1** 更新后的锁请求


  现在，让我们在另一个会话中运行代码，该会话希望使用 `ALTER INDEX PK_Orders on Delivery.Orders REBUILD` 命令对同一表执行索引重建。此操作需要在表上获取架构修改
  (`Sch-M`) 锁。这种锁类型是非分区的，需要在系统中的所有分区上获取。




  ## 锁分区的潜在问题


  锁分区可能导致在繁忙系统中，当会话试图获取架构修改（Sch-M）锁或全表锁时，出现长时间的阻塞。SQL Server 将以顺序方式遍历所有分区，在授予当前请求之前不会移动到下一个分区。在此期间，所有在请求已被授予的调度器上运行的其他会话都将被阻塞。


  这种情况最常见的例子是在其他用户访问系统时在线进行架构更改。类似地，在在线索引重建和与表分区相关的操作（例如分区函数更改和分区切换）期间也可能出现此问题。幸运的是，低优先级锁可以优雅地处理锁分区，它们不会在低优先级队列中等待时引入阻塞。


  最后，锁分区会增加锁管理器的内存消耗。非分区锁保存在每个分区中，这对于具有大量调度器的系统来说可能非常耗费内存。并非所有行级和页级锁都会被分区；因此，在不会给系统带来明显阻塞的情况下，保持锁升级开启是有益的。


  ## 由于锁分区导致的死锁


  当 SQL Server 从客户端接收到一个批处理时，它会将该批处理分配给一个或（在并行执行计划的情况下）多个调度器。除了极少数例外，在批处理完成之前，它不会更改调度器。然而，来自同一会话的后续批处理可能会被分配到不同的调度器。尽管
  SQL Server 倾向于为所有会话请求重用同一个调度器，但这并不能保证，尤其是在繁忙的系统中。


  #### 注意


  你可以通过运行 `SELECT scheduler_id FROM sys.dm_exec_requests WHERE session_id = @@SPID`
  语句来分析会话调度器分配情况。


  这种行为可能导致繁忙系统中难以解释的死锁。假设你有一个会话启动了一个事务并更新了表中的一行。我们假设该批处理正在调度器/逻辑 CPU 2 上运行。此会话获取了一个意向排他（IX）表锁，该锁是分区的并仅存储在调度器
  2 上。它还获取了一个行级排他（X）锁，该锁不是分区的，存储在所有分区中。（为了简单起见，我再次省略了页级意向锁。）


  假设你有第二个会话试图更改该表并获取架构修改（Sch-M）锁。此锁类型是非分区的，因此该会话需要在每个调度器上获取它。它成功地获取并持有了调度器 0 和 1 上的锁，但由于架构修改（Sch-M）锁与在那里持有的意向排他（IX）锁不兼容，它在调度器
  2 上被阻塞。图 9-4 说明了这种情况。


  ![../images/463519_1_En_9_Chapter/463519_1_En_9_Fig4_HTML.jpg](img/463519_1_En_9_Fig4_HTML.jpg)

  **图 9-4**

  由于锁分区导致的死锁：步骤 1


  现在假设会话 1 需要更新同一表中的另一行，并且该批处理已被分配到另一个调度器——0 或 1。该会话需要在新的锁分区中获取另一个意向表锁，但它将被那里的架构修改（Sch-M）锁阻塞，这将导致死锁，如图
  9-5 所示。


  ![../images/463519_1_En_9_Chapter/463519_1_En_9_Fig5_HTML.jpg](img/463519_1_En_9_Fig5_HTML.jpg)

  **图 9-5**

  由于锁分区导致的死锁：步骤 2


  正如你可以猜到的，这个死锁的发生是因为同一事务的第二个批处理运行在与第一个批处理不同的调度器上。发生这种情况的一个例子是客户端应用程序在多个单独的批处理中逐行执行数据修改。你可以通过将所有更新批处理在一起（例如，使用表值参数）来减少可能的死锁机会。这也有助于提高操作的性能。


  幸运的是，在许多情况下，SQL Server 能够从不同的锁分区中*重用*意向锁并避免这种死锁。然而，这种行为没有文档记录或保证。此外，如果第二个批处理需要获取全表锁，它将无法工作；在这种情况下会发生死锁。


  让我们看一个例子，并运行清单 9-2 中的代码。在我的案例中，该批处理在 `SPID=67` 的会话中运行在调度器 13 上。


  ```

  begin tran

  select *

  from Delivery.Orders with (repeatableread)

  where OrderId = 100;

  ```

  *清单 9-2*

  锁分区死锁：步骤 1


  作为下一步，让我们在 `SPID=68` 的会话中运行 `ALTER INDEX PK_Orders ON Delivery.Orders REBUILD` 语句。此会话成功获取了分区
  0-12 上的架构修改（Sch-M）锁，并在分区 13 上被阻塞。图 9-6 说明了此时锁请求的状态。


  ![../images/463519_1_En_9_Chapter/463519_1_En_9_Fig6_HTML.jpg](img/463519_1_En_9_Fig6_HTML.jpg)

  **图 9-6**

  之前步骤后的锁请求


  作为下一步，让我们在第一个会话中运行一个 `UPDATE` 语句，如清单 9-3 所示。此时，该批处理在我的系统上运行在调度器 10 上。


  ```

  update Delivery.Orders

  set Pieces += 1

  where OrderId = 10;

  ```

  *清单 9-3*

  锁分区死锁：步骤 2



  尽管该批处理在不同的调度器上执行，但 `SQL Server` 能够复用来自 `分区 13` 的意向锁，因此没有发生死锁。图 9-7 说明了此时的锁请求状态。请注意，`SQL
  Server` 将表级锁类型从意向共享（`IS`）转换为意向排他（`IX`），即使存在行级共享（`S`）锁，表上也不再有意向共享（`IS`）锁。


  ![../images/463519_1_En_9_Chapter/463519_1_En_9_Fig7_HTML.jpg](img/463519_1_En_9_Fig7_HTML.jpg)


  图 9-7

  UPDATE 语句后的锁请求


  最后，让我们使用清单 9-4 中的代码在 `SPID = 67` 的第一个会话中运行，来触发一个需要获取完整表级锁的操作。


  ```

  select count(*)

  from Delivery.Orders with (tablock)

  Listing 9-4

  锁分区死锁：步骤 3

  ```


  `SQL Server` 试图在所有分区上获取一个共享意向排他（`SIX`）锁，但它被 `分区 0` 上持有的不兼容的架构修改（`Sch-M`）锁所阻塞。这导致了死锁。


  清单 9-5 展示了死锁图中部分的 `resource-list` 部分。`lockPartition` 属性提供了发生冲突的锁分区的信息。


  ```

  清单 9-5

  死锁图（部分）

  ```


  与锁分区相关的死锁虽然可能发生，但较为罕见，尤其是当你在同一事务中混合使用意向锁和完整表级锁时。尽可能避免这种代码模式。


  对于在线索引重建和分区切换，你可以利用低优先级锁（如果可用）。或者，当从代码中运行 `DDL` 语句时，你可以在其周围使用 `TRY..CATCH` 来实现重试逻辑。提升
  `SET DEADLOCK_PRIORITY` 也有助于减少 `DDL` 会话被选为死锁牺牲品的机会。你还可以基于应用程序锁实现 `mutex` 逻辑，这将在下一章讨论。


  在拥有 16 个或更多逻辑 CPU 的系统中，锁分区默认启用，并且无法通过公开记录的方法禁用。存在一个未公开的跟踪标志 `T1229` 可以禁用它；但是，不建议在生产环境中使用未公开的跟踪标志。此外，在具有大量逻辑
  CPU 的系统中，禁用锁分区可能会导致在锁结构管理期间因过度串行化而引发性能问题。最好保持锁分区启用。


  ## 总结


  锁分区在拥有 16 个或更多逻辑 CPU 的服务器上自动启用。当锁分区启用时，`SQL Server` 会按调度器 basis 使用独立的锁队列。意向共享（`IS`）、意向排他（`IX`）和架构稳定性（`Sch-S`）锁会在单个分区中获取并存储。所有其他锁类型需要跨所有分区获取。


  `SQL Server` 以顺序方式跨所有分区获取非分区锁类型。这可能导致锁请求在某些分区上被授予，而在持有不兼容的意向（`I*`）或架构稳定性（`Sch-S`）锁的分区上被阻塞的情况。这种情况可能会增加在线架构更改期间的阻塞，并在某些情况下导致死锁。


