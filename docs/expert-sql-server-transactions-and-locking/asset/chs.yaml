- "# 10. 应用程序锁\n\n本章将讨论 `SQL Server` 的另一个锁功能，称为应用程序锁，它在按名称标识的应用程序资源上放置锁。应用程序锁允许你序列化对\
  \ `T-SQL` 代码的访问，类似于客户端应用程序中的临界区和互斥体。\n\n## 应用程序锁概述\n\n`应用程序锁` 允许应用程序在与数据库对象无关、仅通过名称标识的\
  \ `应用程序资源` 上放置锁。该锁在锁兼容性方面遵循常规规则，可以是以下类型之一：共享（`S`）、更新（`U`）、排他（`X`）、意向共享（`IS`）和意向排他（`IX`）。\n\
  \n应用程序需要调用 `sp_getapplock` 存储过程，使用以下参数来获取锁：\n\n*   `@Resource:` 指定应用程序锁的名称。无论数据库和服务器排序规则如何，它都是区分大小写的。\n\
  *   `@LockMode:` 指定锁类型。你需要使用以下值之一来指定类型：`Shared`、`Update`、`IntentShared`、`IntentExclusive`\
  \ 或 `Exclusive`。\n*   `@LockOwner:` 应为两个值之一—`Transaction` 或 `Session`—并控制锁的所有者（和作用域）。\n\
  *   `@LockTimeout:` 指定超时时间（毫秒）。如果存储过程无法在此时间间隔内获取锁，将返回错误。\n*   `@DbPrincipal:` 指定安全上下文（调用者需要是\
  \ `database_principal`、`dbo` 或 `db_owner` 角色的成员）。\n\n该存储过程在成功时返回大于或等于零的值，在失败时返回负值。与常规锁一样，存在死锁的可能性，尽管这不会回滚被选为牺牲品的会话的事务，而是返回指示死锁状况的错误代码。\n\
  \n应用程序需要调用 `sp_releaseapplock` 存储过程来释放应用程序锁。或者，如果锁的 `@LockOwner` 是 `transaction`，则在事务提交或回滚时会自动释放。此行为类似于常规锁。\n\
  \n\n\n### 应用锁的使用\n\n计算机科学中有一个概念叫做 **互斥锁**。它表示多个线程或进程不能同时执行特定代码。举个例子，设想一个多线程应用程序，其中的线程使用共享对象。在这些系统中，通常需要对访问这些对象的代码进行序列化，以防止多个线程同时读取和更新同一对象时发生竞态条件。\n\
  \n每种开发语言都有一套可以完成此类任务的同步原语（例如，互斥锁和临界区）。当你需要对 T-SQL 代码的某部分进行序列化时，应用锁也能起到同样的作用。\n\n\
  举个例子，假设有一个系统收集一些数据，将其保存到数据库中，并且有一组用于数据处理的应用服务器。每台应用服务器读取数据包，处理它，最后从原始表中删除已处理的数据。显然，你不希望不同的应用服务器处理相同的行，而对数据加载过程进行序列化是可用的选项之一。排他（X）表锁不起作用，因为它会阻塞所有表访问，而不仅仅是数据加载。在应用服务器级别实现序列化也并非易事。幸运的是，应用锁可以帮助解决这个问题。\n\
  \n假设你有如代码清单 10-1 所示的表。为简单起见，有一个名为 `Attributes` 的列代表所有行数据。\n\n```sql\ncreate table\
  \ dbo.RawData\n(\n    ID int not null,\n    Attributes char(100) not null\n    \
  \    constraint DEF_RawData_Attributes\n        default 'Row Data',\n    ProcessingTime\
  \ datetime not null\n        constraint DEF_RawData_ProcessingTime\n        default\
  \ '2000-01-01', -- Default constraint simplifies data loading in the code below\n\
  \    constraint PK_RawData\n        primary key clustered(ID)\n)\n```\n代码清单 10-1\n\
  表结构\n\n有两个重要的列：作为主键的 `ID`，以及代表行加载处理时间的 `ProcessingTime`。你应该使用 UTC 时间而非本地时间，以支持应用服务器位于不同时区的情况，并防止夏令时调整时钟引发问题。该列还有助于防止其他会话在数据仍在处理时重新读取它。最好避免为此目的使用布尔（`bit`）列，因为如果应用服务器崩溃，该行将永远留在表中。而使用时间列，系统可以在超时后再次读取它。\n\
  \n现在，让我们创建一个读取数据的存储过程，如代码清单 10-2 所示。\n\n```sql\ncreate proc dbo.LoadRawData(@PacketSize\
  \ int)\nas\nbegin\n    set nocount, xact_abort on\n\n    declare\n        @EarliestProcessingTime\
  \ datetime\n        ,@ResCode int\n\n    declare\n        @Data table\n        (\n\
  \            ID int not null primary key,\n            Attributes char(100) not\
  \ null\n        )\n\n    begin tran\n        exec @ResCode = sp_getapplock\n   \
  \         @Resource = 'LoadRowDataLock'\n            ,@LockMode = 'Exclusive'\n\
  \            ,@LockOwner = 'Transaction'\n            ,@LockTimeout = 15000; --\
  \ 15 seconds\n\n        if @ResCode >= 0 -- success\n        begin\n           \
  \ -- We assume that app server processes the packet within 1 minute unless crashed\n\
  \            set @EarliestProcessingTime = dateadd(minute,-1,getutcdate());\n\n\
  \            ;with DataPacket(ID, Attributes, ProcessingTime)\n            as\n\
  \            (\n                select top (@PacketSize) ID, Attributes, ProcessingTime\n\
  \                from dbo.RawData\n                where ProcessingTime <= @EarliestProcessingTime\n\
  \                order by ID\n            )\n            update DataPacket\n   \
  \         set ProcessingTime = getutcdate()\n            output inserted.ID, inserted.Attributes\
  \ into @Data(ID, Attributes);\n        end\n\n        -- we don't need to explicitly\
  \ release application lock because @LockOwner is Transaction\n    commit\n\n   \
  \ select ID, Attributes from @Data;\nend\n```\n代码清单 10-2\n读取数据的存储过程\n\n该存储过程在事务开始时获取一个排他（X）应用锁。结果，所有其他调用该存储过程的会话都会被阻塞，直到事务提交且应用锁被释放。这保证了只有一个会话可以在存储过程内更新和读取数据。同时，其他会话仍然可以处理该表（例如，插入新行或删除已处理的行）。应用锁独立于数据锁，除非会话试图通过\
  \ `sp_getapplock` 调用为相同的 `@Resource` 获取不兼容的应用锁，否则不会阻塞。\n\n图 10-1 展示了当两个会话同时调用 `dbo.LoadRawData`\
  \ 存储过程时，`sys.dm_tran_locks` 数据管理视图的输出。`SPID=58` 的会话成功获取了应用锁，而 `SPID=63` 的另一个会话被阻塞。`Resource_type`\
  \ 值为 `APPLICATION` 表示这是一个应用锁。\n\n![../images/463519_1_En_10_Chapter/463519_1_En_10_Fig1_HTML.jpg](img/463519_1_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1\n`sys.dm_tran_locks` 的输出\n\n值得一提的是，如果我们的目标仅仅是保证多个会话不能同时读取相同的行，而不是序列化整个读取过程，还有另一种更简单的解决方案。你可以使用锁定表提示，如代码清单\
  \ 10-3 所示。\n\n```sql\ncreate proc dbo.LoadRawData(@PacketSize int)\nas\nbegin\n\
  \    set nocount, xact_abort on\n\n    declare\n        @EarliestProcessingTime\
  \ datetime = dateadd(minute,-1,getutcdate());\n\n    declare\n        @Data table\n\
  \        (\n            ID int not null primary key,\n            Attributes char(100)\
  \ not null\n        )\n\n    ;with DataPacket(ID, Attributes, ProcessingTime)\n\
  \    as\n    (\n        select top (@PacketSize) ID, Attributes, ProcessingTime\n\
  \        from dbo.RawData with (updlock, readpast)\n        where ProcessingTime\
  \ <= @EarliestProcessingTime\n        order by ID\n    )\n    update DataPacket\n\
  \    set ProcessingTime = getutcdate()\n    output inserted.ID, inserted.Attributes\
  \ into @Data(ID, Attributes);\n\n    select ID, Attributes from @Data;\nend\n```\n\
  代码清单 10-3\n使用表锁提示序列化对数据的访问\n\n`UPDLOCK` 提示强制 SQL Server 在 `SELECT` 操作期间使用更新（U）锁，而不是共享（S）锁。这可以防止其他会话同时读取相同的行。同时，`READPAST`\
  \ 提示强制会话跳过持有不兼容锁的行，而不是被阻塞。\n\n尽管两种实现方式都达到了相同的目标，但它们采用了不同的方法。后者通过使用数据（行级）锁来序列化对相同行的访问。应用锁则序列化对代码的访问，防止多个会话同时运行该语句。\n\
  \n虽然这两种方法都可以用于基于磁盘的表，但在使用内存优化表实现队列的情况下，锁定提示将不起作用。在这种场景下锁定提示无效，但应用锁可以帮助实现所需的序列化。\n\
  \n\n\n#### 注意\n\n我们将在第 13 章讨论内存 OLTP 并发模型。\n\n当系统具有结构化的数据访问层时，应用程序锁可能有助于减少阻塞，并在某些会话获取表级锁时改善用户体验。一个这样的例子是在不支持低优先级锁的\
  \ SQL Server 系统中进行索引维护或分区切换。\n\n考虑一个场景，你有一个多租户系统，其中一组服务按租户查询数据。清单 10-4 所示的代码在查询表之前尝试获取一个共享的(S)应用程序锁。如果此操作不成功，它会返回一个空的结果集，模拟“无新数据”的情况，而不对表执行任何访问。\n\
  \n```sql\ncreate table dbo.CollectedData\n(\nTenantId int not null,\nOnDate datetime\
  \ not null,\nId bigint not null identity(1,1),\nAttributes char(100) not null\n\
  constraint DEF_CollectedData_Attributes\ndefault 'Other columns'\n);\ncreate unique\
  \ clustered index IDX_CollectedData_TenantId_OnDate_Id\non dbo.CollectedData(TenantId,OnDate,Id);\n\
  go\ncreate proc dbo.GetTenantData\n(\n@TenantId int\n,@LastOnDate datetime\n,@PacketSize\
  \ int\n)\nas\nbegin\nset nocount, xact_abort on\ndeclare\n@ResCode int\nbegin tran\n\
  exec @ResCode = sp_getapplock\n@Resource = 'TenantDataAccess'\n,@LockMode = 'Shared'\n\
  ,@LockOwner = 'Transaction'\n,@LockTimeout = 0 ; -- 无等待\nif @ResCode >= 0 -- 成功\n\
  begin\nif @LastOnDate is null\nset @LastOnDate = '2018-01-01';\nselect top (@PacketSize)\
  \ with ties\nTenantId, OnDate, Id, Attributes\nfrom dbo.CollectedData\nwhere\nTenantId\
  \ = @TenantId and\nOnDate > @LastOnDate\norder by\nOnDate;\nend\nelse\n-- 返回空结果集\n\
  select\nconvert(int,null) as TenantId\n,convert(datetime,null) as OnDate\n,convert(char(100),null)\
  \ as Attributes\nwhere\n1 = 2;\ncommit\nend\n```\n`清单 10-4`\n在索引重建期间防止对表进行访问：表和存储过程\n\
  \n第二个需要获取完整表级锁的会话，可以先获取一个排他的(X)应用程序锁，如清单 10-5 所示。这将防止在索引重建期间，存储过程在查询表时被阻塞。\n\n```sql\n\
  begin tran\nexec sp_getapplock\n@Resource = 'TenantDataAccess'\n,@LockMode = 'Exclusive'\n\
  ,@LockOwner = 'Transaction'\n,@LockTimeout = -1 ; -- 无限期等待\nalter index IDX_CollectedData_TenantId_OnDate_Id\n\
  on dbo.CollectedData rebuild;\ncommit\n```\n`清单 10-5`\n在索引重建期间防止对表进行访问：获取对表的排他访问权\n\
  \n这种方法可以通过消除系统中可能的查询超时来改善用户体验。此外，它还可以减少获取排他表锁所需的时间。SQL Server 不使用应用程序锁的锁分区，因此应用程序锁请求只需在单个锁定队列中被授予权限，而不是在每个分区上顺序进行。\n\
  \n最后，值得注意的是，如果在`ALTER INDEX REBUILD`运行时需要编译存储过程，仍然存在阻塞的可能性。编译过程将需要获取一个表级锁，而这将被索引重建所持有的架构修改(Sch-M)锁所阻塞。\n\
  \n## 总结\n\n应用程序锁允许应用程序对一个与数据库对象无关、通过名称标识的应用程序资源放置锁。这是一个有用的工具，帮助你实现互斥代码模式，这些模式序列化对\
  \ T-SQL 代码的访问，类似于客户端应用程序中的临界区和互斥体。\n\n你可以分别使用`sp_getapplock`和`sp_releaseapplock`存储过程来创建和释放应用程序锁。应用程序锁可以具有会话或事务范围，并且它们遵循常规的锁兼容性规则。\n\
  \n"
- "# 11. 设计事务策略\n\n一个正确实施的事务策略将使每个系统受益。本章将提供一套关于该主题的通用指南，并讨论如何提高系统的并发性。\n\n### 事务策略设计注意事项\n\
  \n一致的事务和错误处理策略总是有利于系统。它们有助于减少阻塞，并在阻塞发生时简化故障排除。\n\n正如我们在第 2 章中已经讨论过的，在客户端和服务器端事务管理之间的选择很大程度上取决于数据访问层的架构。基于存储过程的实现可能受益于从存储过程中启动的显式事务。另一方面，使用\
  \ ORM 框架或代码生成器的客户端实现则需要在客户端代码中管理事务。\n\n有一种常见的误解，认为自动提交事务可能对系统有益。尽管这种方法可能在一定程度上减少阻塞——毕竟，每个语句都在自己的事务中运行，排他(X)锁的持有时间更短——但这很难说是最佳选择。大量的小事务可能会显著增加事务日志活动并降低系统性能。\n\
  \n更重要的是，当多个相关的数据修改由于错误而部分失败时，自动提交事务可能会引入数据质量问题。当这些问题在生产环境中发生时，极难诊断和解决。在绝大多数情况下，最好在系统中使用显式事务。\n\
  \n#### 提示\n\n避免自动提交事务，改用显式事务。\n\n你可以通过使用`SET XACT_ABORT ON`选项来进一步减少出现数据质量问题的可能性。如你所记，此设置使事务在发生任何错误时变为不可提交状态。这可以防止在部分数据修改未成功完成时，显式事务被提交。\n\
  \n\n\n#### 提示\n\n使用 `SET XACT_ABORT ON`。\n\n回顾 `BEGIN TRAN/COMMIT` 语句的嵌套行为。如果您在同一模块中调用\
  \ `BEGIN TRAN` 和 `COMMIT`，则无需检查 `@@TRANCOUNT` 变量和活动事务的存在。但请记住，`ROLLBACK` 语句会回滚整个事务，而不考虑\
  \ `@@TRANCOUNT` 嵌套级别。在回滚之前，最好检查是否有活动事务。\n\n11-1 清单展示了在启动事务前检查是否存在活动事务的代码示例。由于 `BEGIN\
  \ TRAN/COMMIT` 语句的嵌套行为，这完全是不必要的，因此您可以从实现中删除 `IF` 语句。\n\n```sql\ncreate proc dbo.Proc1\n\
  as\nbegin\n    set xact_abort on\n    declare @CurrentTranCount = @@TRANCOUNT;\n\
  \    if @CurrentTranCount = 0 -- IF is not required and can be removed\n       \
  \ begin tran;\n    /* Some logic here */\n    if @CurrentTranCount = 0  -- IF is\
  \ not required and can be removed\n        commit;\nend\n```\n清单 11-1\n不必要的活动事务检查实现\n\
  \n11-2 清单展示了执行服务器端事务管理和错误处理的存储过程模板。假设调用代码正确处理了异常，此方法无论该存储过程是从外部调用还是在活动事务中调用都有效。\n\
  \n需要注意的是，`CATCH` 块正在检查 `@@TRANCOUNT` 是否大于零。一个常见的错误是使用 `IF @@TRANCOUNT = 1 ROLLBACK`\
  \ 模式，这与嵌套的 `BEGIN TRAN` 调用不兼容。\n\n```sql\ncreate proc dbo.MyProc\nas\nbegin\n  \
  \  set xact_abort on\n    begin try\n        begin tran\n        /* Some logic here\
  \  */\n        commit\n    end try\n    begin catch\n        if @@TRANCOUNT > 0\
  \ -- Transaction is active\n            rollback;\n        /* Optional error-handling\
  \  code */\n        throw;\n    end catch;\nend;\n```\n清单 11-2\n服务器端事务管理\n\n客户端事务管理的实现取决于系统的技术和架构。然而，使用\
  \ `TRY..CATCH` 块并在那里显式提交或回滚事务总是有益的。11-3 清单展示了使用经典 ADO.Net 的这种方法。\n\n```csharp\n\
  using (SqlConnection conn = new SqlConnection(connString))\n{\n    conn.Open();\n\
  \    using (SqlTransaction tran = conn.BeginTransaction(IsolationLevel.ReadCommitted))\n\
  \    {\n        try\n        {\n            SqlCommand cmd = conn.CreateCommand(\"\
  exec dbo.MyProc @Param1\");\n            cmd.Parameters.Add(\"@Param1\",SqlDbType.VarChar,255).Value\
  \ = \"Param Value\";\n            cmd.Transaction = tran;\n            cmd.ExecuteNonQuery();\n\
  \            tran.Commit();\n        }\n        catch (Exception ex)\n        {\n\
  \            tran.Rollback();\n            throw;\n        }\n    }\n}\n```\n清单\
  \ 11-3\nADO.Net 事务管理\n\n尽管客户端代码需要在 `BeginTransaction()` 和 `ExecuteNonQuery()` 调用之间执行若干操作，但它不会在系统中引入任何低效。SQL\
  \ Server 将事务视为在第一次数据访问操作时开始，而不是在 `BEGIN TRAN` 调用时开始。此外，在事务完成第一次数据修改之前，它不会在事务日志中记录事务的开始\
  \ (`LOP_BEGIN_XACT`)。\n\n您应该记住 `SNAPSHOT` 事务的这种行为，它们处理的是事务开始时的数据“快照”。在实践中，这意味着此类事务将看到第一次数据访问操作（无论是读还是写）时的数据。\n\
  \n## 选择事务隔离级别\n\n选择合适的事务隔离级别并非易事。您需要在阻塞和 `tempdb` 开销与系统所需的数据一致性和隔离级别之间找到适当的平衡。系统必须向客户提供可靠的数据，您不应为了减少阻塞而选择无法保证数据可靠性的隔离级别。\n\
  \n您应选择提供所需数据一致性级别的*最低要求*隔离级别。在许多情况下，默认的 `READ COMMITTED` 隔离级别已经*足够好*，特别是当查询经过优化且不执行不必要的扫描时。除非有正当理由，否则避免在\
  \ OLTP 系统中使用 `REPEATABLE READ` 或 `SERIALIZABLE` 隔离级别。这些隔离级别会持有共享（S）锁直到事务结束，这可能导致易失性数据的严重阻塞问题。它们还会在扫描期间触发共享（S）锁升级。\n\
  \n在系统中使用不同的隔离级别是完全正常的。例如，财务管理系统在执行可能影响客户账户余额的操作时，可能需要使用 `REPEATABLE READ` 甚至 `SERIALIZABLE`\
  \ 隔离级别。然而，其他用例（例如更改客户配置文件信息）可能完全适用于 `READ COMMITTED` 级别。\n\n作为一般规则，最好避免使用 `READ\
  \ UNCOMMITTED` 隔离级别。尽管许多数据库专业人员尝试通过显式切换或使用 `(NOLOCK)` 提示切换到此隔离级别来减少阻塞，但这很少是正确的选择。首先，`READ\
  \ UNCOMMITTED` 不能解决写入者引入的阻塞问题。它们在扫描期间仍然获取更新（U）锁。然而，最重要的是，通过使用 `READ UNCOMMITTED`，您是在声明根本不需要数据一致性，而这不仅仅是读取未提交数据的问题。SQL\
  \ Server 可能选择在大型表上使用*分配映射扫描*的执行计划，这可能导致行丢失和重复读取，尤其是在具有易失性数据的繁忙系统中，这源于页面拆分。\n\n在大多数情况下，乐观隔离级别，特别是\
  \ `READ COMMITTED SNAPSHOT`，是比 `READ UNCOMMITTED`、`REPEATABLE READ` 或 `SERIALIZABLE`\
  \ 更好的选择，即使在 OLTP 系统中也是如此。它在不涉及读写器阻塞的情况下提供语句级数据一致性。历史上，由于其 `tempdb` 开销，我在 OLTP 系统中建议\
  \ `RCSI` 时一直非常谨慎；然而，如今，由于现代硬件和基于闪存的磁盘阵列，这已不那么是个问题。尽管如此，您仍应在分析中考虑额外的索引碎片和 `tempdb`\
  \ 开销。同样值得重复的是，`READ COMMITTED SNAPSHOT` 在 Azure SQL 数据库中默认启用。\n\n作为一般规则，我建议不要在 OLTP\
  \ 系统中使用 `SNAPSHOT` 隔离级别，因为它会过度使用 `tempdb`，除非绝对需要事务级一致性。对于数据大部分时间是静态的数据仓库和报告系统，它可能是一个不错的选择。\n\
  \n如果在数据库中启用了乐观隔离级别，您必须非常小心事务管理。导致未提交事务的代码中的错误会阻止 `tempdb` 版本存储清理，并导致 `tempdb` 数据文件过度增长。即使您不在系统中使用乐观隔离级别，只要启用了\
  \ `READ_COMMITTED_SNAPSHOT` 或 `ALLOW_SNAPSHOT_ISOLATION` 数据库设置，这种情况也可能发生。\n\n\n\
  ### 乐观隔离级别与阻塞减少模式\n\n然而，乐观隔离级别常常会`掩盖`系统中未优化的查询。尽管这些查询是导致系统性能低下的原因，但它们并未参与阻塞条件，因此常被忽视。常见的情况是，人们通过启用`READ\
  \ COMMITTED SNAPSHOT`来“解决”读写阻塞，但之后并未解决阻塞的根本原因。你应该牢记这一点，并且无论系统中是否存在阻塞，都应进行查询优化。\n\
  \n对于数据仓库系统，事务策略很大程度上取决于数据的更新方式。对于静态只读数据，任何隔离级别都适用，因为读取者不会阻塞其他读取者。你甚至可以将数据库或文件组切换为只读模式，以减少锁开销。否则，乐观隔离级别是更好的选择。它们为报表查询提供事务级或语句级一致性，并能在\
  \ ETL 过程中减少阻塞。当此方法可行时，你也应考虑在 ETL 过程中利用表分区并使用分区切换。\n\n## 减少阻塞的模式\n\n当多个会话竞争同一组资源时，就会发生阻塞。会话试图在其上获取不兼容的锁，这会导致锁冲突和阻塞。\n\
  \n正如你所知，SQL Server 在`处理`数据时获取锁。需要修改或返回给客户端的行数并不那么重要。更重要的是 SQL Server 在语句执行期间`访问`了多少行。一个查询可能只选择或更新了一行，但由于执行了过度扫描，它完全可能获取了数千甚至数百万个锁。\n\
  \n适当的查询优化和索引调优可以减少 SQL Server 在查询执行期间需要访问的行数。这反过来又减少了获取的锁数量以及发生锁冲突的机会。\n\n#### 提示\n\
  \n优化查询。这将有助于提高系统中的并发性、性能和用户体验。\n\n减少锁冲突机会的另一种方法是减少锁的持有时间。排他锁（X 锁）总是持有到事务结束。在`REPEATABLE\
  \ READ`和`SERIALIZABLE`隔离级别下的共享锁（S 锁）也是如此。锁持有时间越长，发生锁冲突和阻塞的可能性就越大。\n\n你需要使事务尽可能短，并避免在事务活动期间执行任何长时间操作以及与用户通过\
  \ UI 进行交互。在处理使用 CLR 或链接服务器的外部资源时也需要小心。例如，当链接服务器宕机时，可能需要很长时间才会发生连接超时，而你希望避免锁在此期间一直被保持的情况。\n\
  \n#### 提示\n\n使事务尽可能短。\n\n尽可能在事务接近结束时更新数据。这减少了排他锁（X 锁）的持有时间。在某些情况下，使用临时表作为暂存区是有意义的：先将数据插入其中，然后在事务的最后更新实际表。\n\
  \n#### 提示\n\n尽可能在事务接近结束时修改数据。\n\n这种技术的一个特定变体是，对于一条无法优化或不切实际的`UPDATE`语句。考虑这样一种情况：该语句扫描大量行，但只更新其中一小部分。你可以修改代码，将需要更新的行的聚集索引键值存储在临时表中，然后基于这些收集到的键值运行`UPDATE`。\n\
  \n清单 11-4 展示了一条在执行时可能导致聚集索引扫描的语句示例。SQL Server 将需要获取表中每一行的更新锁（U 锁）。\n\n```\nupdate\
  \ dbo.Orders\nset\nCancelled = 1\nwhere\n(PendingCancellation = 1) or\n(Paid = 0\
  \ and OrderDate < @StockDate)\nListing 11-4\n使用临时表减少阻塞：原始语句\n```\n\n你可以将代码修改为类似于清单\
  \ 11-5 所示。`SELECT`语句根据隔离级别获取共享锁（S 锁）或根本不获取行级锁。`UPDATE`语句是经过优化的，只获取少量的更新锁（U 锁）和排他锁（X\
  \ 锁）。\n\n```\ncreate table #OrdersToBeCancelled\n( OrderId int not null primary\
  \ key );\ninsert into #OrdersToBeCancelled(OrderId)\nselect OrderId\nfrom dbo.Orders\n\
  where\n(PendingCancellation = 1) or\n(Paid = 0 and OrderDate < @StockDate);\nupdate\
  \ dbo.Orders\nset Cancelled = 1\nwhere OrderId in (select OrderId from #OrdersToBeCancelled);\n\
  Listing 11-5\n使用临时表减少阻塞：利用临时表暂存待更新的键值\n```\n\n你需要记住，虽然这种方法有助于减少阻塞，但创建和填充临时表可能会带来显著的\
  \ I/O 开销，尤其是在涉及大量数据时。在某些情况下，你可以使用 CTE 来避免这种开销，如清单 11-6 所示。\n\n```\n;with UpdateIds(OrderId)\n\
  as\n(\nselect OrderId\nfrom dbo.Orders\nwhere\n(PendingCancellation = 1) or\n(Paid\
  \ = 0 and OrderDate < @StockDate)\n)\nupdate o\nset o.Cancelled = 1\nfrom UpdateIds\
  \ u inner loop join dbo.Orders o on\no.OrderId = u.OrderId\nListing 11-6\n使用 CTE\
  \ 减少阻塞\n```\n\n与前面的例子类似，`SELECT`语句在扫描期间不获取更新锁（U 锁）。`inner loop`连接提示保证排他锁（X 锁）仅保持在需要修改的行上。记住，连接提示强制语句中的连接顺序。在我们的例子中，需要将\
  \ CTE 指定为连接的*左*输入/表，以生成正确的执行计划。\n\n这两种方法都可能以引入额外开销为代价来减少阻塞。此开销会随着待更新数据量的增加而增加，如果你预计要更新表中的大部分行，则不应使用这些方法。记住，在大多数情况下，创建正确的索引是更好的选择。\n\
  \n#### 提示\n\n避免在大表上进行更新扫描。\n\n当`UPDATE`语句修改不同的非聚集索引中的数据时，应避免在同一事务中多次更新数据行。请记住，SQL\
  \ Server 在更新索引行时是基于每个索引来获取锁的。多次更新会增加其他会话访问已更新行时发生死锁的机会。\n\n#### 提示\n\n不要在单个事务中多次更新数据行。\n\
  \n你需要了解锁升级是否影响你的系统，尤其是在 OLTP 工作负载的情况下。你可以监视对象级阻塞条件和锁等待，然后将其与 `lock_escalation` 扩展事件和跟踪事件关联起来。记住，锁升级有助于减少内存消耗并提高系统性能。在做出任何决定之前，你应该分析锁升级发生的原因及其对系统的影响。在许多情况下，改变代码和工作流程比禁用锁升级更好。\n\
  \n#### 提示\n\n监视系统中的锁升级。\n\n通常，你应该避免在同一事务中混合使用可能导致行级锁和对象级锁的语句，特别是混合 DML 和 DDL 语句。这种模式可能导致意向锁与完整的对象级锁之间的阻塞，以及死锁情况。当服务器具有\
  \ 16 个或更多逻辑 CPU 时（这启用了锁分区），这一点尤其重要。\n\n\n## 总结\n\n不要在单个事务中混合使用 DDL 和 DML 语句。\n\n\
  如果你的系统中出现死锁，你需要分析其根本原因。在大多数情况下，查询优化和代码重构有助于解决它们。你还应该考虑在系统中的关键用例周围实施重试逻辑。\n\n找到死锁的根本原因。如果查询优化和代码重构无法解决它们，则实施重试逻辑。\n\
  \n完全消除系统中的所有阻塞是不可能的。幸运的是，理解阻塞的根本原因有助于设计能够缓解该问题的解决方案。\n\n一致的事务和错误处理策略可以减少阻塞并简化并发问题的故障排除。客户端和服务器端实现的选择取决于数据访问层架构；然而，作为一般规则，你应该使用显式事务而非自动提交事务。\n\
  \n业务需求应决定系统中的数据一致性和隔离规则。你应该选择满足这些需求的`最小所需`隔离级别。除非绝对必要，否则不要使用`READ UNCOMMITTED`。\n\
  \n乐观隔离级别是可以接受的，即使是 OLTP 工作负载，只要系统能够处理额外的`tempdb`开销。除非需要事务级一致性，否则最好使用`READ COMMITTED\
  \ SNAPSHOT`。\n\n在大多数情况下，适当的查询优化和索引调整有助于提高并发性。经过良好优化的查询获取的锁更少，这降低了锁冲突和系统中阻塞的可能性。你还应尽量缩短事务，并在事务结束前修改数据，以减少持有锁的时间。\n\
  \n每个系统都是独特的，无法提供普遍适用的通用建议。然而，对 SQL Server 并发模型的良好理解将帮助你设计正确的事务策略，并解决系统中的任何阻塞和并发问题。\n\
  \n"
- '# 12. 并发问题故障排除


  系统故障排除既是一门艺术，也是一门科学。它也是一个非常庞大和复杂的话题。如果我要写一本涵盖系统故障排除所有方面的书，它的页数会比你正在阅读的这本还要多。


  系统故障排除和性能调优的过程要求你从全局视角审视系统。SQL Server 从不孤立存在，问题的根本原因可能不一定在数据库中。硬件不足、操作系统和 SQL Server
  配置不当、数据库和应用程序设计效率低下——所有这些因素都可能导致各种问题和糟糕的系统性能。


  并发性只是这个难题中的一小部分。每个多用户数据库都会遭受一定程度的阻塞。然而，并发问题可能不是问题的主要来源，而且通常通过关注系统中的其他领域，你可以获得更好的投资回报率。


  本章将讨论一种常见的故障排除技术，称为`等待统计信息分析`。尽管我们将重点讨论与锁相关的等待和并发问题，但这种技术在一般的故障排除中非常有用。我建议你多了解这种技术以及系统中可能存在的其他等待类型。


  然而，请记住采取全局视角，在专注于数据库内部问题之前，先分析整个系统——硬件和软件。


  ## SQL Server 执行模型


  从高层来看，SQL Server 的架构包括六个不同的组件，如图 12-1 所示。


  ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig1_HTML.jpg](img/463519_1_En_12_Fig1_HTML.jpg)


  图 12-1


  高层 SQL Server 架构


  *   `协议层`处理 SQL Server 和客户端应用程序之间的通信。数据以称为`表格数据流 (TDS)`的内部格式通过标准网络通信协议（如 TCP/IP
  或命名管道）进行传输。另一种称为`共享内存`的通信协议，可在 SQL Server 和客户端应用程序本地运行在同一服务器上时使用。

  *   `查询处理器`层负责查询优化和执行。

  *   `存储引擎`由与 SQL Server 中数据访问和数据管理相关的组件组成。它处理磁盘上的数据，处理事务和并发，管理事务日志，并执行其他几个功能。

  *   `内存中 OLTP 引擎`于 SQL Server 2014 引入。这种无锁、无闩锁的技术有助于提高 OLTP 工作负载的性能。它与将所有数据存储在内存中的内存优化表一起工作。我们将在下一章讨论内存中
  OLTP 并发模型。

  *   SQL Server 包括一组`实用工具`，它们负责备份和还原操作、数据大容量加载、全文索引管理以及其他几个操作。

  *   最后，SQL Server 的关键组件是`SQL Server 操作系统 (SQLOS)`。SQLOS 是位于 SQL Server 和操作系统（Windows
  或 Linux）之间的层，负责调度和资源管理、同步、异常处理、死锁检测、CLR 托管等。例如，当任何 SQL Server 组件需要分配内存时，它不会直接调用操作系统
  API 函数，而是向 SQLOS 请求内存，然后 SQLOS 使用内存分配器组件来满足该请求。


  SQLOS 最初在 SQL Server 2005 中引入，旨在提高 SQL Server 中调度的效率并最小化上下文和内核模式切换。Windows 和 SQLOS
  之间的主要区别在于调度模型。Windows 是使用抢占式调度的通用操作系统。它控制当前正在运行的进程，根据需要挂起和恢复它们。相反，除 CLR 代码外，SQLOS
  使用协作式调度，进程会定期自愿让出。


  SQL Server 2017 中的 Linux 支持导致了 SQLOS 的进一步转型，并引入了`平台抽象层 (SQL PAL)`。它作为 SQLOS 和操作系统之间的网关工作，为操作系统
  API/内核调用提供抽象。在性能关键代码中极少数例外情况下，SQLOS 不会直接调用操作系统 API，而是使用 PAL。


  SQLOS 在启动时创建一组`调度程序`。调度程序的数量等于系统中逻辑 CPU 的数量，另有一个用于专用管理员连接的额外调度程序。例如，如果一个服务器有两个启用超线程的四核
  CPU，SQL Server 将创建 17 个调度程序。根据处理器关联性设置和基于核心的许可模型，每个调度程序可以处于`在线`或`离线`状态。


  尽管调度程序的数量与系统中的 CPU 数量相匹配，但除非启用了处理器关联性设置，否则它们之间没有严格的一一对应关系。在某些情况下，在高负载下，有可能出现多个调度程序在同一
  CPU 上运行的情况。或者，当设置了处理器关联性时，调度程序以严格的一一对应关系绑定到 CPU。




  ### SQL Server 执行模型与调度器


  每个调度器负责管理称为 *工作线程 (workers)* 的工作线程。系统中的最大工作线程数由 `Max Worker Thread` 配置选项指定。默认值 `zero`
  表示 SQL Server 会根据系统中的调度器数量来计算最大工作线程数。在大多数情况下，您无需更改此默认值。


  每当有任务需要执行时，它会被分配给一个处于空闲状态的 *工作线程 (worker)*。如果没有空闲的 *工作线程 (worker)*，调度器会创建一个新的。它还会在
  15 分钟不活动后或遇到内存压力时销毁空闲的 *工作线程 (worker)*。值得注意的是，在 32 位 SQL Server 中，每个 *工作线程 (worker)*
  的线程堆栈会使用 512 KB 的 RAM，而在 64 位系统中则使用 2 MB 的 RAM。


  *工作线程 (Worker)* 不会在调度器之间移动。同样，一个任务也绝不会在 *工作线程 (worker)* 之间移动。然而，SQLOS 可以创建子任务并将其分配给不同的
  *工作线程 (worker)*；例如，在并行执行计划的情况下。


  #### 任务状态


  每个任务可能处于以下六种状态之一：


  *   `Pending`：任务正在等待可用的 *工作线程 (worker)*。

  *   `Done`：任务已完成。

  *   `Running`：任务当前正在调度器上执行。

  *   `Runnable`：任务正在等待被调度器执行。

  *   `Suspended`：任务正在等待外部事件或资源。

  *   `Spinloop`：任务正在处理自旋锁。自旋锁是保护某些内部对象的同步对象。当 SQL Server 预期能快速获得对对象的访问权限时可能会使用它们，从而避免
  *工作线程 (worker)* 的上下文切换。


  每个调度器最多有一个处于 `running` 状态的任务。此外，它有两个不同的队列——一个用于 `runnable` 任务，另一个用于 `suspended`
  任务。当正在运行的任务需要某些资源（例如来自磁盘的数据页）时，它会提交一个 I/O 请求并将状态更改为 `suspended`。它会停留在 `suspended`
  队列中，直到请求完成且页面被读取。当任务准备好恢复执行时，它会被移动到 `runnable` 队列。


  #### 生活中的类比：杂货店


  杂货店或许是 SQL Server 执行模型最贴切的现实类比。将收银员视为调度器，在结账队伍中的顾客视为 `runnable` 队列中的任务。正在结账的顾客类似于
  `running` 状态的任务。


  如果某件商品缺少通用产品代码（UPC），收银员会派一名商店员工去核查价格。收银员会暂停当前顾客的结账过程，请他或她站到一边（进入 `suspended` 队列）。当员工带着价格信息回来后，那位站到一边的顾客会移动到结账队伍的末尾（`runnable`
  队列的末尾）。


  值得一提的是，与现实生活相比，SQL Server 的处理过程要高效得多，因为其他人会在价格核查期间耐心排队等待。然而，一位被迫移动到 `runnable` 队列末尾的顾客可能不会同意这样的结论。


  #### 任务生命周期与等待统计


  图 12-2 展示了 SQL Server 执行模型中一个典型的任务生命周期。任务的总执行时间可以计算为任务在 `running` 状态（在调度器上运行时）、`runnable`
  状态（等待可用调度器时）和 `suspended` 状态（等待资源或外部事件时）所花费时间的总和。


  ![任务生命周期示意图](img/463519_1_En_12_Fig2_HTML.jpg)


  **图 12-2** 任务生命周期


  SQL Server 会跟踪任务因不同类型的等待而处于 `suspended` 状态的累积时间，并通过 `sys.dm_os_wait_tasks` 视图暴露这些信息。该信息自上次
  SQL Server 重启以来或使用 `DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)` 命令清除以来一直被收集。


  代码清单 12-1 展示了如何查找系统中的 *top* 等待类型，即 *工作线程 (worker)* 花费等待时间最长的等待类型。它过滤掉了一些非必要的等待类型，主要是那些与
  SQL Server 内部进程相关的类型。尽管在高级性能调优期间分析其中一些类型是有益的，但在系统故障排除的初始阶段，您很少会关注它们。



  #### 注意


  每个新版本的 SQL Server 都会引入新的等待类型。您可以在[此链接](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-os-wait-stats-transact-sql)查看等待类型的列表。请确保选择相应版本的
  SQL Server。


  ```sql

  ;with Waits

  as

  (

  select

  wait_type, wait_time_ms, waiting_tasks_count,signal_wait_time_ms

  ,wait_time_ms - signal_wait_time_ms as resource_wait_time_ms

  ,100\. * wait_time_ms / SUM(wait_time_ms) over() as Pct

  ,row_number() over(order by wait_time_ms desc) as RowNum

  from sys.dm_os_wait_stats with (nolock)

  where

  wait_type not in /* Filtering out non-essential system waits */

  (N''BROKER_EVENTHANDLER'',N''BROKER_RECEIVE_WAITFOR''

  ,N''BROKER_TASK_STOP'',N''BROKER_TO_FLUSH''

  ,N''BROKER_TRANSMITTER'',N''CHECKPOINT_QUEUE'',N''CHKPT''

  ,N''CLR_SEMAPHORE'',N''CLR_AUTO_EVENT''

  ,N''CLR_MANUAL_EVENT'',N''DBMIRROR_DBM_EVENT''

  ,N''DBMIRROR_EVENTS_QUEUE'',N''DBMIRROR_WORKER_QUEUE''

  ,N''DBMIRRORING_CMD'',N''DIRTY_PAGE_POLL''

  ,N''DISPATCHER_QUEUE_SEMAPHORE'',N''EXECSYNC''

  ,N''FSAGENT'',N''FT_IFTS_SCHEDULER_IDLE_WAIT''

  ,N''FT_IFTSHC_MUTEX'',N''HADR_CLUSAPI_CALL''

  ,N''HADR_FILESTREAM_IOMGR_IOCOMPLETION''

  ,N''HADR_LOGCAPTURE_WAIT''

  ,N''HADR_NOTIFICATION_DEQUEUE''

  ,N''HADR_TIMER_TASK'',N''HADR_WORK_QUEUE''

  ,N''KSOURCE_WAKEUP'',N''LAZYWRITER_SLEEP''

  ,N''LOGMGR_QUEUE'',N''MEMORY_ALLOCATION_EXT''

  ,N''ONDEMAND_TASK_QUEUE''

  ,N''PARALLEL_REDO_WORKER_WAIT_WORK''

  ,N''PREEMPTIVE_HADR_LEASE_MECHANISM''

  ,N''PREEMPTIVE_SP_SERVER_DIAGNOSTICS''

  ,N''PREEMPTIVE_OS_LIBRARYOPS''

  ,N''PREEMPTIVE_OS_COMOPS''

  ,N''PREEMPTIVE_OS_CRYPTOPS''

  ,N''PREEMPTIVE_OS_PIPEOPS''

  , N''PREEMPTIVE_OS_AUTHENTICATIONOPS''

  ,N''PREEMPTIVE_OS_GENERICOPS''

  ,N''PREEMPTIVE_OS_VERIFYTRUST

  '',N''PREEMPTIVE_OS_FILEOPS''

  ,N''PREEMPTIVE_OS_DEVICEOPS''

  ,N''PREEMPTIVE_OS_QUERYREGISTRY''

  ,N''PREEMPTIVE_OS_WRITEFILE''

  ,N''PREEMPTIVE_XE_CALLBACKEXECUTE''

  ,N''PREEMPTIVE_XE_DISPATCHER''

  ,N''PREEMPTIVE_XE_GETTARGETSTATE''

  ,N''PREEMPTIVE_XE_SESSIONCOMMIT''

  ,N''PREEMPTIVE_XE_TARGETINIT''

  ,N''PREEMPTIVE_XE_TARGETFINALIZE''

  ,N''PWAIT_ALL_COMPONENTS_INITIALIZED''

  ,N''PWAIT_DIRECTLOGCONSUMER_GETNEXT''

  ,N''QDS_PERSIST_TASK_MAIN_LOOP_SLEEP''

  ,N''QDS_ASYNC_QUEUE''

  ,N''QDS_CLEANUP_STALE_QUERIES_TASK_MAIN_LOOP_SLEEP''

  ,N''REQUEST_FOR_DEADLOCK_SEARCH''

  ,N''RESOURCE_QUEUE'',N''SERVER_IDLE_CHECK''

  ,N''SLEEP_BPOOL_FLUSH'',N''SLEEP_DBSTARTUP''

  ,N''SLEEP_DCOMSTARTUP''

  ,N''SLEEP_MASTERDBREADY'',N''SLEEP_MASTERMDREADY''

  ,N''SLEEP_MASTERUPGRADED'',N''SLEEP_MSDBSTARTUP''

  , N''SLEEP_SYSTEMTASK'', N''SLEEP_TASK''

  ,N''SLEEP_TEMPDBSTARTUP'',N''SNI_HTTP_ACCEPT''

  ,N''SP_SERVER_DIAGNOSTICS_SLEEP''

  ,N''SQLTRACE_BUFFER_FLUSH''

  ,N''SQLTRACE_INCREMENTAL_FLUSH_SLEEP''

  ,N''SQLTRACE_WAIT_ENTRIES'',N''WAIT_FOR_RESULTS''

  ,N''WAITFOR'',N''WAITFOR_TASKSHUTDOWN''

  ,N''WAIT_XTP_HOST_WAIT''

  ,N''WAIT_XTP_OFFLINE_CKPT_NEW_LOG''

  ,N''WAIT_XTP_CKPT_CLOSE'',N''WAIT_XTP_RECOVERY''

  ,N''XE_BUFFERMGR_ALLPROCESSED_EVENT''

  , N''XE_DISPATCHER_JOIN'',N''XE_DISPATCHER_WAIT''

  ,N''XE_LIVE_TARGET_TVF'',N''XE_TIMER_EVENT'')

  )

  select

  w1.wait_type as [Wait Type]

  ,w1.waiting_tasks_count as [Wait Count]

  ,convert(decimal(12,3), w1.wait_time_ms / 1000.0)

  as [Wait Time]

  ,convert(decimal(12,1), w1.wait_time_ms / w1.waiting_tasks_count)

  as [Avg Wait Time]

  ,convert(decimal(12,3), w1.signal_wait_time_ms / 1000.0)

  as [Signal Wait Time]

  ,convert(decimal(12,1), w1.signal_wait_time_ms / w1.waiting_tasks_count)

  as [Avg Signal Wait Time]

  ,convert(decimal(12,3), w1.resource_wait_time_ms / 1000.0)

  as [Resource Wait Time]

  ,convert(decimal(12,1), w1.resource_wait_time_ms

  / w1.waiting_tasks_count) as [Avg Resource Wait Time]

  ,convert(decimal(6,3), w1.Pct) as [Percent]

  ,convert(decimal(6,3), w1.Pct + IsNull(w2.Pct,0)) as [Running Percent]

  from

  Waits w1 cross apply

  (

  select sum(w2.Pct) as Pct

  from Waits w2

  where w2.RowNum < w1.RowNum

  ) w2

  where

  w1.RowNum = 1 or w2.Pct <= 99

  order by

  w1.RowNum

  option (recompile);

  ```


