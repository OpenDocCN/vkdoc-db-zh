  `sys.dm_db_index_usage_stats` 和 `sys.dm_db_index_operational_stats` 这两个视图都提供了在性能故障排除期间非常有用的信息。然而，数据可能不完整。这些视图不包含在可用组的可读辅助副本上运行的查询的使用统计信息。SQL
  Server 也不会持久化数据库中的数据以使其在 SQL Server 重启后保留。最后，在 SQL Server 2012 RTM-SP3 CU2、SQL Server
  2014 RTM 和 SP1 中，这些视图在索引重建操作时会被清除。


  请谨慎使用数据，并在分析时将结果与其他来源关联起来。




  #### 注意


  你可以通过以下链接获取关于 `sys.dm_db_index_usage_stats` 视图的更多信息：[`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-index-usage-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-index-usage-stats-transact-sql)。关于
  `sys.dm_db_index_operational_stats` 视图的信息可在此处找到：[`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-index-operational-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-index-operational-stats-transact-sql)。


  ## 阻塞链


  在解决并发问题时，一个常见的挑战是*阻塞链*，它代表了一种多级阻塞的情况。正如你所记得的，锁请求只有在与资源上所有其他请求（无论它们是已授予还是待处理状态）都兼容时，才能被授予。


  图 12-7 说明了这种情况。会话 1 在表上持有意向排他锁，这与请求的模式修改锁不兼容。模式修改锁与所有锁类型都不兼容，因此会阻止其他所有试图访问该表的会话，即使它们的锁请求与会话
  1 持有的意向排他锁兼容。


  ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig7_HTML.jpg](img/463519_1_En_12_Fig7_HTML.jpg)


  **图 12-7 阻塞链**


  当这种情况发生时，会话 2 可能成为系统中大量其他会话的*阻塞会话*。在数据管理视图和被阻塞的进程报告中，它将作为*阻塞者*被显示出来。另一方面，会话 1 只会成为会话
  2 的阻塞会话，这在故障排除时可能会产生误导。


  让我们用一个稍微复杂的代码示例来说明这一点。清单 12-6 在 `SPID=53` 的会话中更新了 `Delivery.Customers` 表的一行。


  ```sql

  begin tran

  update Delivery.Customers

  set Phone = ''111-111-1234''

  where CustomerId = 1;

  -- 清单 12-6

  -- 阻塞链：步骤 1（SPID=53）

  ```


  作为下一步，我们在 `SPID=56` 的会话中运行清单 12-7 的代码。第一条语句在 `Delivery.Orders` 表上获取一个意向排他锁。第二条语句扫描
  `Delivery.Customers` 表，并因与第一个 `SPID=53` 的会话存在不兼容的排他锁而被阻塞。


  ```sql

  begin tran

  update Delivery.Orders

  set Pieces += 1

  where OrderId = 1;

  select count(*)

  from Delivery.Customers with (readcommitted);

  -- 清单 12-7

  -- 阻塞链：步骤 2（SPID=56）

  ```


  接下来，我们在 `SPID=57` 的会话中运行清单 12-8 的代码。此代码试图在 `Delivery.Orders` 表上获取一个共享锁，并将被 `SPID=56`
  的会话持有的不兼容的意向排他锁阻塞。


  ```sql

  select count(*)

  from Delivery.Orders with (tablock);

  -- 清单 12-8

  -- 阻塞链：步骤 3（SPID=57）

  ```


  最后，我们在几个 `SPID=60` 及以上的会话（你可以在每个会话中使用不同的 `OrderId`）中运行清单 12-9 的代码。这些会话需要获取 `Delivery.Orders`
  表上的意向排他锁，并将被 `SPID=57` 的会话持有的不兼容的共享锁请求阻塞。


  ```sql

  update Delivery.Orders

  set Pieces += 1

  where OrderId = 5000;

  -- 清单 12-9

  -- 阻塞链：步骤 4（SPID>=60）

  ```


  图 12-8 展示了 `sys.dm_os_waiting_tasks` 和 `sys.dm_exec_requests` DMV 的部分输出。它可能显示 `SPID=57`
  的会话是阻塞源。然而，这是不正确的，你需要在故障排除时将阻塞链展开，直到 `SPID=53` 的会话。


  ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig8_HTML.jpg](img/463519_1_En_12_Fig8_HTML.jpg)


  **图 12-8 sys.dm_os_waiting_tasks 和 sys.dm_exec_requests 视图的输出**


  同样值得注意的是，根本阻塞者 `SPID=53` 并未出现在输出中。`sys.dm_os_waiting_tasks` 和 `sys.dm_exec_requests`
  视图分别显示当前挂起和已执行的请求。在我们的例子中，`SPID=53` 的会话处于*睡眠*状态，因此这两个视图都不包含它。


  图 12-9 显示了 `SPID` 为 60、57 或 56 的会话的阻塞进程报告的部分输出。你可以通过阻塞进程的 `suspended` 状态以及与锁定相关的
  `waitresource` 来检测阻塞链状况。


  ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig9_HTML.jpg](img/463519_1_En_12_Fig9_HTML.jpg)


  **图 12-9 被阻塞的进程报告**


  尽管阻塞链可能会增加额外的复杂性，但它们不会改变你的故障排除方法。你需要展开阻塞链以识别阻塞的根本原因并解决该问题。


  ## AlwaysOn 可用性组与阻塞


  AlwaysOn 可用性组可能已成为与 SQL Server 一起使用的最常见的高可用性技术。该技术提供数据库组级别的保护，并在每个服务器/节点上存储数据库的单独副本。这消除了
  SQL Server 级别的单点故障；然而，其内部仍然依赖于 Windows 或 Linux 故障转移群集。


  AlwaysOn 可用性组的实现和维护值得单独写一本书来探讨。然而，有几件事可能会影响系统中的阻塞和并发性。




  ### 同步提交延迟


  AlwaysOn 可用性组由一个*主*节点和一个或多个*辅助*节点/服务器组成。所有数据修改均在主节点上进行，主节点将事务日志记录流发送到辅助节点。这些日志记录在辅助节点上的事务日志中被保存（*固化*），然后由一组*REDO
  线程*异步地重新应用到那里的数据文件中。假设没有延迟，可用性组中的每个服务器都将存储与数据库字节级完全相同的副本。


  辅助节点可以配置为使用*异步*或*同步*提交。在异步提交模式下，当 `COMMIT` 日志记录在主节点上固化后，事务即被视为已提交。然后 SQL Server
  会将该 `COMMIT` 记录发送给辅助节点；但是，它不会等待该记录在辅助节点的日志中固化的确认。此过程如图 12-10 所示。


  ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig10_HTML.jpg](img/463519_1_En_12_Fig10_HTML.jpg)


  图 12-10 异步提交


  可以想到，这种行为会降低可用性组引入的开销，但代价是，在某些日志记录尚未发送到辅助节点之前，如果主节点发生崩溃/数据损坏，则可能发生数据丢失。


  当您使用同步提交时，这种行为会发生变化，如图 12-11 所示。在此模式下，SQL Server 在收到 `COMMIT` 日志记录已在辅助节点日志中固化的确认之前，不会认为事务已提交。虽然这种方法可以避免数据丢失，但会导致额外的提交延迟，因为主节点正在等待辅助服务器的确认。


  ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig11_HTML.jpg](img/463519_1_En_12_Fig11_HTML.jpg)


  图 12-11 同步提交


  高同步提交延迟可能会在系统中引入微妙且难以理解的并发问题。SQL Server 会保持事务处于活动状态，并且在收到提交确认之前不会释放锁。这会增加锁请求竞争和系统中阻塞的可能性。


  还有另一个潜在问题。某些操作——例如索引维护——可能会生成大量的事务日志记录并使发送队列饱和。这可能导致极高的提交延迟，并在系统中引入严重的阻塞。


  #### 提示


  您可以通过降低语句的 `MAXDOP` 选项来限制索引维护操作的日志生成速率。请记住，这会增加操作所需的时间。


  您可以使用 `HADR_SYNC_COMMIT` 等待类型来监控同步提交延迟。从 `sys.dm_os_wait_stats` 视图中获取的平均等待时间将为您提供延迟信息。请记住，在非典型的、日志密集型工作负载期间，延迟可能会严重偏离；在对特定时间点的延迟进行故障排除时，可以考虑使用
  `DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)` 命令清除等待统计信息。


  高提交延迟故障排除需要您定位瓶颈并识别在此过程中消耗时间最多的部分。主要有三个因素导致延迟：


  1.  日志记录在发送队列中等待的时间。您可以使用清单 12-10 中的代码，利用 `[Send Queue Size(KB)]` 和 `[Send Rate
  KB/Sec]` 列的数据来分析这一点。值得注意的是，队列管理过程是 CPU 密集型的，在 CPU 负载高的系统中可能会导致额外的延迟。

  2.  网络吞吐量。您可以使用与网络相关的性能计数器对其进行故障排除。还有一些与可用性组相关的性能计数器，它们指示节点之间发送的数据量。

  3.  辅助节点上的 I/O 延迟。同步提交要求 `COMMIT` 日志记录在事务日志中固化后才会向主节点发送确认。您可以使用 `sys.dm_io_virtual_file_stats`
  视图来监控事务日志文件的写入延迟。我在本书的配套材料中包含了允许您执行此操作的脚本。


  ```

  select

  ag.name as [Availability Group]

  ,ar.replica_server_name as [Server]

  ,db_name(drs.database_id) as [Database]

  ,case when ars.is_local = 1 then ''Local'' else ''Remote'' end

  ,case as [DB Location]

  ,ars.role_desc as [Replica Role]

  ,drs.synchronization_state_desc as [Sync State]

  ,ars.synchronization_health_desc as [Health State]

  ,drs.log_send_queue_size as [Send Queue Size (KB)]

  ,drs.log_send_rate as [Send Rate KB/Sec]

  ,drs.redo_queue_size as [Redo Queue Size (KB)]

  ,drs.redo_rate as [Redo Rate KB/Sec]

  from

  sys.availability_groups ag with (nolock)

  join sys.availability_replicas ar  with (nolock) on

  ag.group_id = ar.group_id

  join sys.dm_hadr_availability_replica_states ars  with (nolock) on

  ar.replica_id = ars.replica_id

  join sys.dm_hadr_database_replica_states drs  with (nolock) on

  ag.group_id = drs.group_id and drs.replica_id = ars.replica_id

  order by

  ag.name, drs.database_id, ar.replica_server_name

  ```


  清单 12-10 分析可用性组队列


  虽然网络和 I/O 性能有时可以通过硬件升级来解决，但在非常繁忙的 OLTP 系统中，处理由大量日志记录引起的延迟要困难得多。您可以通过使用更高时钟频率的 CPU
  来减少队列管理的影响；然而，硬件所能达到的效果存在一些限制。


  当您遇到这种情况时，可以采取以下几项措施：


  *   确保 SQL Server 调度程序在 NUMA 节点之间均匀平衡。例如，如果 SQL Server 在一个具有 2 个 NUMA 节点、每个节点 8
  个内核的服务器上使用 10 个内核，则设置关联性掩码以使用每个节点 5 个内核。调度不均衡可能会在系统中引入各种性能问题，并影响可用性组吞吐量。

  *   减少系统中生成的日志记录数量。一些选择是：重新设计事务策略以避免自动提交的事务；删除未使用和冗余的索引；微调索引的 `FILLFACTOR` 属性以减少系统中的页拆分。

  *   重新设计系统中的数据层。系统中的不同数据可能具有不同的 RPO（*恢复点目标*）要求和对数据丢失的容忍度，这种情况非常常见。您可以考虑将某些数据移动到另一个不需要同步提交的可用性组，和/或对某些实体利用
  NoSQL 技术。

  *   最后，如果您使用的是 SQL Server 2016 之前的版本，您应该考虑升级到产品的最新版本。SQL Server 2016 具有若干内部优化，可显著提高可用性组吞吐量，远超
  SQL Server 2012 和 2014。在许多情况下，这可能是最简单的解决方案。


  #### 注意


  在同步数据库镜像中，您也可能会遇到相同的提交延迟问题。在这种情况下，您应该监控 `DBMIRROR_SEND` 等待类型。



  ### 可读辅助副本与行版本控制


  SQL Server 企业版允许你配置 AlwaysOn 可用性组中辅助节点的只读访问，从而扩展系统中的只读工作负载。然而，这可能会对可用性组中的主节点产生意外副作用。


  当针对辅助节点运行查询时，SQL Server 总是使用 `SNAPSHOT` 隔离级别，忽略 `SET TRANSACTION ISOLATION LEVEL`
  语句和锁定提示。这使得它能够消除可能的读写阻塞，即使你没有启用 `ALLOW_SNAPSHOT_ISOLATION` 数据库选项，此行为也会发生。


  这也意味着 SQL Server 将在主节点上使用行版本控制。当乐观隔离级别未在数据库中启用时，你可能无法在程序中使用它们；但尽管如此，SQL Server 仍会在内部使用行版本控制。主节点和辅助节点上的数据库是完全相同的，因此不可能只在辅助节点上使用行版本控制。


  正如你在第 6 章所了解到的，此行为将引入额外的 `tempdb` 负载以支持版本存储。由于数据修改时附加到数据行的 14 字节指针，它还可能增加索引碎片。然而，这还会导致另一种现象：辅助节点上长时间运行的
  `SNAPSHOT` 事务可能会延迟主节点上的幽灵记录和版本存储清理。SQL Server 无法删除已删除的行并重用空间，因为辅助节点上的 `SNAPSHOT`
  事务可能需要访问这些行的旧版本。


  让我们看一个例子，并在数据库中创建两个表，如代码清单 12-11 所示。表 `dbo.T1` 将有 65,536 行，并占用 65,536 个页面——每个数据页面一行。


  ```sql

  create table dbo.T1

  (

  ID int not null,

  Placeholder char(8000) null,

  constraint PK_T1

  primary key clustered(ID)

  );

  create table dbo.T2

  (

  Col int

  );

  ;with N1(C) as (select 0 union all select 0) -- 2 rows

  ,N2(C) as (select 0 from N1 as T1 cross join N1 as T2) -- 4 rows

  ,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) -- 16 rows

  ,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256 rows

  ,N5(C) as (select 0 from N4 as T1 cross join N4 as T2 ) -- 65,536 rows

  ,IDs(ID) as (select row_number() over (order by (select null)) from N5)

  insert into dbo.T1(ID)

  select ID from IDs;

  ```

  代码清单 12-11: 可读辅助副本：创建表


  下一步，让我们在辅助节点上启动一个事务，并针对 `dbo.T2` 表运行查询，如代码清单 12-12 所示。即使我们使用显式事务，在自动提交事务中长时间运行的语句也会发生相同的行为。


  ```sql

  begin tran

  select * from dbo.T2;

  ```

  代码清单 12-12: 可读辅助副本：在辅助节点上启动事务


  接下来，让我们从 `dbo.T1` 表中删除所有数据，然后在主节点上运行一个将进行聚集索引扫描的查询。代码如代码清单 12-13 所示。


  ```sql

  delete from dbo.T1;

  go

  -- 等待 1 分钟

  waitfor delay ''00:01:00.000'';

  set statistics io on

  select count(*) from dbo.T1;

  set statistics io off

  --输出：Table ''T1''. Scan count 1, logical reads 65781

  ```

