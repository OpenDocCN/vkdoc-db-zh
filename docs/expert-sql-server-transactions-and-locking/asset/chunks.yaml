    Server` 将表级锁类型从意向共享（`IS`）转换为意向排他（`IX`），即使存在行级共享（`S`）锁，表上也不再有意向共享（`IS`）锁。


    ![../images/463519_1_En_9_Chapter/463519_1_En_9_Fig7_HTML.jpg](img/463519_1_En_9_Fig7_HTML.jpg)


    图 9-7

    UPDATE 语句后的锁请求


    最后，让我们使用清单 9-4 中的代码在 `SPID = 67` 的第一个会话中运行，来触发一个需要获取完整表级锁的操作。


    ```

    select count(*)

    from Delivery.Orders with (tablock)

    Listing 9-4

    锁分区死锁：步骤 3

    ```


    `SQL Server` 试图在所有分区上获取一个共享意向排他（`SIX`）锁，但它被 `分区 0` 上持有的不兼容的架构修改（`Sch-M`）锁所阻塞。这导致了死锁。


    清单 9-5 展示了死锁图中部分的 `resource-list` 部分。`lockPartition` 属性提供了发生冲突的锁分区的信息。


    ```

    清单 9-5

    死锁图（部分）

    ```


    与锁分区相关的死锁虽然可能发生，但较为罕见，尤其是当你在同一事务中混合使用意向锁和完整表级锁时。尽可能避免这种代码模式。


    对于在线索引重建和分区切换，你可以利用低优先级锁（如果可用）。或者，当从代码中运行 `DDL` 语句时，你可以在其周围使用 `TRY..CATCH` 来实现重试逻辑。提升
    `SET DEADLOCK_PRIORITY` 也有助于减少 `DDL` 会话被选为死锁牺牲品的机会。你还可以基于应用程序锁实现 `mutex` 逻辑，这将在下一章讨论。


    在拥有 16 个或更多逻辑 CPU 的系统中，锁分区默认启用，并且无法通过公开记录的方法禁用。存在一个未公开的跟踪标志 `T1229` 可以禁用它；但是，不建议在生产环境中使用未公开的跟踪标志。此外，在具有大量逻辑
    CPU 的系统中，禁用锁分区可能会导致在锁结构管理期间因过度串行化而引发性能问题。最好保持锁分区启用。


    ## 总结


    锁分区在拥有 16 个或更多逻辑 CPU 的服务器上自动启用。当锁分区启用时，`SQL Server` 会按调度器 basis 使用独立的锁队列。意向共享（`IS`）、意向排他（`IX`）和架构稳定性（`Sch-S`）锁会在单个分区中获取并存储。所有其他锁类型需要跨所有分区获取。


    `SQL Server` 以顺序方式跨所有分区获取非分区锁类型。这可能导致锁请求在某些分区上被授予，而在持有不兼容的意向（`I*`）或架构稳定性（`Sch-S`）锁的分区上被阻塞的情况。这种情况可能会增加在线架构更改期间的阻塞，并在某些情况下导致死锁。


    # 10. 应用程序锁


    本章将讨论 `SQL Server` 的另一个锁功能，称为应用程序锁，它在按名称标识的应用程序资源上放置锁。应用程序锁允许你序列化对 `T-SQL` 代码的访问，类似于客户端应用程序中的临界区和互斥体。


    ## 应用程序锁概述


    `应用程序锁` 允许应用程序在与数据库对象无关、仅通过名称标识的 `应用程序资源` 上放置锁。该锁在锁兼容性方面遵循常规规则，可以是以下类型之一：共享（`S`）、更新（`U`）、排他（`X`）、意向共享（`IS`）和意向排他（`IX`）。


    应用程序需要调用 `sp_getapplock` 存储过程，使用以下参数来获取锁：


    *   `@Resource:` 指定应用程序锁的名称。无论数据库和服务器排序规则如何，它都是区分大小写的。

    *   `@LockMode:` 指定锁类型。你需要使用以下值之一来指定类型：`Shared`、`Update`、`IntentShared`、`IntentExclusive`
    或 `Exclusive`。

    *   `@LockOwner:` 应为两个值之一—`Transaction` 或 `Session`—并控制锁的所有者（和作用域）。

    *   `@LockTimeout:` 指定超时时间（毫秒）。如果存储过程无法在此时间间隔内获取锁，将返回错误。

    *   `@DbPrincipal:` 指定安全上下文（调用者需要是 `database_principal`、`dbo` 或 `db_owner` 角色的成员）。


    该存储过程在成功时返回大于或等于零的值，在失败时返回负值。与常规锁一样，存在死锁的可能性，尽管这不会回滚被选为牺牲品的会话的事务，而是返回指示死锁状况的错误代码。


    应用程序需要调用 `sp_releaseapplock` 存储过程来释放应用程序锁。或者，如果锁的 `@LockOwner` 是 `transaction`，则在事务提交或回滚时会自动释放。此行为类似于常规锁。

    '
- fmt: "# Application Lock Usage\n\n计算机科学中有一个概念叫做 **mutual exclusion**（互斥锁）。它表示多个线程或进程不能同时执行特定代码。举个例子，设想一个多线程应用程序，其中的线程使用共享对象。在这些系统中，通常需要对访问这些对象的代码进行序列化，以防止多个线程同时读取和更新同一对象时发生竞态条件。\n\
    \n每种开发语言都有一套可以完成此类任务的同步原语（例如，互斥锁和临界区）。当你需要对 T-SQL 代码的某部分进行序列化时，应用锁也能起到同样的作用。\n\
    \n举个例子，假设有一个系统收集一些数据，将其保存到数据库中，并且有一组用于数据处理的应用服务器。每台应用服务器读取数据包，处理它，最后从原始表中删除已处理的数据。显然，你不希望不同的应用服务器处理相同的行，而对数据加载过程进行序列化是可用的选项之一。排他（X）表锁不起作用，因为它会阻塞所有表访问，而不仅仅是数据加载。在应用服务器级别实现序列化也并非易事。幸运的是，应用锁可以帮助解决这个问题。\n\
    \n假设你有如代码清单 [10-1](#463519_1_En_10_Chapter.xhtml#PC1) 所示的表。为简单起见，有一个名为 `Attributes`\
    \ 的列代表所有行数据。\n\n```sql\ncreate table dbo.RawData\n(\n    ID int not null,\n  \
    \  Attributes char(100) not null\n        constraint DEF_RawData_Attributes\n\
    \        default 'Row Data',\n    ProcessingTime datetime not null\n        constraint\
    \ DEF_RawData_ProcessingTime\n        default '2000-01-01', -- Default constraint\
    \ simplifies data loading in the code below\n    constraint PK_RawData\n     \
    \   primary key clustered(ID)\n)\n```\n代码清单 10-1\n表结构\n\n有两个重要的列：作为主键的 `ID`，以及代表行加载处理时间的\
    \ `ProcessingTime`。你应该使用 UTC 时间而非本地时间，以支持应用服务器位于不同时区的情况，并防止夏令时调整时钟引发问题。该列还有助于防止其他会话在数据仍在处理时重新读取它。最好避免为此目的使用布尔（`bit`）列，因为如果应用服务器崩溃，该行将永远留在表中。而使用时间列，系统可以在超时后再次读取它。\n\
    \n现在，让我们创建一个读取数据的存储过程，如代码清单 [10-2](#463519_1_En_10_Chapter.xhtml#PC2) 所示。\n\n\
    ```sql\ncreate proc dbo.LoadRawData(@PacketSize int)\nas\nbegin\n    set nocount,\
    \ xact_abort on\n\n    declare\n        @EarliestProcessingTime datetime\n   \
    \     ,@ResCode int\n\n    declare\n        @Data table\n        (\n         \
    \   ID int not null primary key,\n            Attributes char(100) not null\n\
    \        )\n\n    begin tran\n        exec @ResCode = sp_getapplock\n        \
    \    @Resource = 'LoadRowDataLock'\n            ,@LockMode = 'Exclusive'\n   \
    \         ,@LockOwner = 'Transaction'\n            ,@LockTimeout = 15000; -- 15\
    \ seconds\n\n        if @ResCode >= 0 -- success\n        begin\n            --\
    \ We assume that app server processes the packet within 1 minute unless crashed\n\
    \            set @EarliestProcessingTime = dateadd(minute,-1,getutcdate());\n\n\
    \            ;with DataPacket(ID, Attributes, ProcessingTime)\n            as\n\
    \            (\n                select top (@PacketSize) ID, Attributes, ProcessingTime\n\
    \                from dbo.RawData\n                where ProcessingTime <= @EarliestProcessingTime\n\
    \                order by ID\n            )\n            update DataPacket\n \
    \           set ProcessingTime = getutcdate()\n            output inserted.ID,\
    \ inserted.Attributes into @Data(ID, Attributes);\n        end\n\n        -- we\
    \ don't need to explicitly release application lock because @LockOwner is Transaction\n\
    \    commit\n\n    select ID, Attributes from @Data;\nend\n```\n代码清单 10-2\n读取数据的存储过程\n\
    \n该存储过程在事务开始时获取一个排他（X）应用锁。结果，所有其他调用该存储过程的会话都会被阻塞，直到事务提交且应用锁被释放。这保证了只有一个会话可以在存储过程内更新和读取数据。同时，其他会话仍然可以处理该表（例如，插入新行或删除已处理的行）。应用锁独立于数据锁，除非会话试图通过\
    \ `sp_getapplock` 调用为相同的 `@Resource` 获取不兼容的应用锁，否则不会阻塞。\n\n图 [10-1](#463519_1_En_10_Chapter.xhtml#Fig1)\
    \ 展示了当两个会话同时调用 `dbo.LoadRawData` 存储过程时，`sys.dm_tran_locks` 数据管理视图的输出。`SPID=58`\
    \ 的会话成功获取了应用锁，而 `SPID=63` 的另一个会话被阻塞。`Resource_type` 值为 `APPLICATION` 表示这是一个应用锁。\n\
    \n![../images/463519_1_En_10_Chapter/463519_1_En_10_Fig1_HTML.jpg](images/463519_1_En_10_Chapter/463519_1_En_10_Fig1_HTML.jpg)\n\
    \n图 10-1\n`sys.dm_tran_locks` 的输出\n\n值得一提的是，如果我们的目标仅仅是保证多个会话不能同时读取相同的行，而不是序列化整个读取过程，还有另一种更简单的解决方案。你可以使用锁定表提示，如代码清单\
    \ [10-3](#463519_1_En_10_Chapter.xhtml#PC3) 所示。\n\n```sql\ncreate proc dbo.LoadRawData(@PacketSize\
    \ int)\nas\nbegin\n    set nocount, xact_abort on\n\n    declare\n        @EarliestProcessingTime\
    \ datetime = dateadd(minute,-1,getutcdate());\n\n    declare\n        @Data table\n\
    \        (\n            ID int not null primary key,\n            Attributes char(100)\
    \ not null\n        )\n\n    ;with DataPacket(ID, Attributes, ProcessingTime)\n\
    \    as\n    (\n        select top (@PacketSize) ID, Attributes, ProcessingTime\n\
    \        from dbo.RawData with (updlock, readpast)\n        where ProcessingTime\
    \ <= @EarliestProcessingTime\n        order by ID\n    )\n    update DataPacket\n\
    \    set ProcessingTime = getutcdate()\n    output inserted.ID, inserted.Attributes\
    \ into @Data(ID, Attributes);\n\n    select ID, Attributes from @Data;\nend\n\
    ```\n代码清单 10-3\n使用表锁提示序列化对数据的访问\n\n`UPDLOCK` 提示强制 SQL Server 在 `SELECT` 操作期间使用更新（U）锁，而不是共享（S）锁。这可以防止其他会话同时读取相同的行。同时，`READPAST`\
    \ 提示强制会话跳过持有不兼容锁的行，而不是被阻塞。\n\n尽管两种实现方式都达到了相同的目标，但它们采用了不同的方法。后者通过使用数据（行级）锁来序列化对相同行的访问。应用锁则序列化对代码的访问，防止多个会话同时运行该语句。\n\
    \n虽然这两种方法都可以用于基于磁盘的表，但在使用内存优化表实现队列的情况下，锁定提示将不起作用。在这种场景下锁定提示无效，但应用锁可以帮助实现所需的序列化。"
  raw: '## Application Lock Usage


    There is a concept in computer science called *mutual exclusion* . It signifies
    that multiple threads or processes cannot execute specific code at the same time.
    As an example, think about a multi-threaded application in which threads use shared
    objects. In those systems, you often need to serialize the code that accesses
    those objects to prevent the race conditions that occur when multiple threads
    read and update the same objects simultaneously.


    Every development language has a set of synchronization primitives that can accomplish
    such tasks (for example, mutexes and critical sections). Application locks do
    the same trick when you need to serialize some part of the T-SQL code.


    As an example, let’s think about a system that collects some data, saves it into
    a database, and has a set of application servers for data processing. Each application
    server reads the package of data, processes it, and finally deletes the processed
    data from the original table. Obviously, you do not want different application
    servers processing the same rows, and serializing the data-loading process is
    one of the available options. An exclusive (X) table lock would not work, because
    it blocks any table access, rather than just the data loading. Implementing serialization
    on the application-server level is not a trivial task either. Fortunately, application
    locks could help to solve the problem.


    Let’s assume that you have the table shown in Listing [10-1](#463519_1_En_10_Chapter.xhtml#PC1).
    For simplicity’s sake, there is a column called `Attributes` that represents all
    of the row data.


    ```

    create table dbo.RawData

    (

    ID int not null,

    Attributes char(100) not null

    constraint DEF_RawData_Attributes

    default ''Row Data'',

    ProcessingTime datetime not null

    constraint DEF_RawData_ProcessingTime

    default ''2000-01-01'', -- Default constraint simplifies data loading in the code
    below

    constraint PK_RawData

    primary key clustered(ID)

    )

    Listing 10-1

    Table structure

    ```


    There are two important columns: `ID`, which is the primary key, and `ProcessingTime`*,*
    which represents the time the row was loaded for processing. You should use UTC
    rather than local time to support situations in which application servers reside
    in different time zones, as well as to prevent issues when the clock is adjusted
    to Daylight Saving Time. This column also helps to prevent other sessions from
    rereading the data while it is still processing. It is better to avoid Boolean
    (`bit`) columns for such purposes because if the application server crashes, the
    row would remain in the table forever. With the time column, the system can read
    it again after some timeout.


    Now, let’s create a stored procedure that reads the data, as shown in Listing
    [10-2](#463519_1_En_10_Chapter.xhtml#PC2).


    ```

    create proc dbo.LoadRawData(@PacketSize int)

    as

    begin

    set nocount, xact_abort on

    declare

    @EarliestProcessingTime datetime

    ,@ResCode int

    declare

    @Data table

    (

    ID int not null primary key,

    Attributes char(100) not null

    )

    begin tran

    exec @ResCode = sp_getapplock

    @Resource = ''LoadRowDataLock''

    ,@LockMode = ''Exclusive''

    ,@LockOwner = ''Transaction''

    ,@LockTimeout = 15000; -- 15 seconds

    if @ResCode >= 0 -- success

    begin

    -- We assume that app server processes the packet within 1 minute unless crashed

    set @EarliestProcessingTime = dateadd(minute,-1,getutcdate());

    ;with DataPacket(ID, Attributes, ProcessingTime)

    as

    (

    select top (@PacketSize) ID, Attributes, ProcessingTime

    from dbo.RawData

    where ProcessingTime <= @EarliestProcessingTime

    order by ID

    )

    update DataPacket

    set ProcessingTime = getutcdate()

    output inserted.ID, inserted.Attributes into @Data(ID, Attributes);

    end

    -- we don''t need to explicitly release application lock because @LockOwner is
    Transaction

    commit

    select ID, Attributes from @Data;

    end

    Listing 10-2

    Stored procedure that reads the data

    ```


    The stored procedure obtains an exclusive (X) application lock at the beginning
    of the transaction. As a result, all other sessions calling the stored procedure
    are blocked until the transaction is committed and the application lock is released.
    It guarantees that only one session can update and read the data from within the
    stored procedure. At the same time, other sessions can still work with the table
    (for example, insert new or delete processed rows). Application locks are separate
    from data locks, and sessions would not be blocked unless they were trying to
    obtain the incompatible application lock for the same `@Resource` with an `sp_getapplock`
    call.


    Figure [10-1](#463519_1_En_10_Chapter.xhtml#Fig1) demonstrates the output from
    the `sys.dm_tran_locks` data management view at a time when two sessions are calling
    the `dbo.LoadRawData` stored procedure simultaneously. The session with `SPID=58`
    successfully obtains the application lock, while another session with `SPID=63`
    is blocked. The `Resource_type` value of `APPLICATION` indicates an application
    lock.


    ![../images/463519_1_En_10_Chapter/463519_1_En_10_Fig1_HTML.jpg](images/463519_1_En_10_Chapter/463519_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Sys.dm_tran_locks output


    It is worth mentioning that, if our goal is to simply guarantee that multiple
    sessions cannot read the same rows simultaneously, rather than serializing the
    entire read process, there is another, simpler, solution. You can use locking
    table hints, as shown in Listing [10-3](#463519_1_En_10_Chapter.xhtml#PC3).


    ```

    create proc dbo.LoadRawData(@PacketSize int)

    as

    begin

    set nocount, xact_abort on

    declare

    @EarliestProcessingTime datetime = dateadd(minute,-1,getutcdate());

    ;with DataPacket(ID, Attributes, ProcessingTime)

    as

    (

    select top (@PacketSize) ID, Attributes, ProcessingTime

    from dbo.RawData with (updlock, readpast)

    where ProcessingTime <= @EarliestProcessingTime

    order by ID

    )

    update DataPacket

    set ProcessingTime = getutcdate()

    output inserted.ID, inserted.Attributes into @Data(ID, Attributes);

    end

    Listing 10-3

    Serializing access to the data with table locking hints

    ```


    The `UPDLOCK` hint forces SQL Server to use update (U), rather than shared (S),
    locks during the `SELECT` operation. This prevents other sessions from reading
    the same rows simultaneously. At the same time, the `READPAST` hint forces the
    sessions to skip the rows with incompatible locks held rather than being blocked.


    Although both implementations accomplish the same goal, they use different approaches.
    The latter serializes access to the same rows by using data (row-level) locks.
    Application locks serialize access to the code and prevent multiple sessions from
    running the statement simultaneously.


    While both approaches can be used with disk-based tables, locking hints would
    not work in cases where queues are implemented using memory-optimized tables.
    Locking hints do not work in that scenario, but application locks would help to
    achieve the required serialization.'
  trans: "\n# 应用锁的使用\n\n计算机科学中有一个概念叫做 **互斥锁**。它表示多个线程或进程不能同时执行特定代码。举个例子，设想一个多线程应用程序，其中的线程使用共享对象。在这些系统中，通常需要对访问这些对象的代码进行序列化，以防止多个线程同时读取和更新同一对象时发生竞态条件。\n\
    \n每种开发语言都有一套可以完成此类任务的同步原语（例如，互斥锁和临界区）。当你需要对 T-SQL 代码的某部分进行序列化时，应用锁也能起到同样的作用。\n\
    \n举个例子，假设有一个系统收集一些数据，将其保存到数据库中，并且有一组用于数据处理的应用服务器。每台应用服务器读取数据包，处理它，最后从原始表中删除已处理的数据。显然，你不希望不同的应用服务器处理相同的行，而对数据加载过程进行序列化是可用的选项之一。排他（X）表锁不起作用，因为它会阻塞所有表访问，而不仅仅是数据加载。在应用服务器级别实现序列化也并非易事。幸运的是，应用锁可以帮助解决这个问题。\n\
    \n假设你有如代码清单 10-1 所示的表。为简单起见，有一个名为 `Attributes` 的列代表所有行数据。\n\n```sql\ncreate table\
    \ dbo.RawData\n(\n    ID int not null,\n    Attributes char(100) not null\n  \
    \      constraint DEF_RawData_Attributes\n        default 'Row Data',\n    ProcessingTime\
    \ datetime not null\n        constraint DEF_RawData_ProcessingTime\n        default\
    \ '2000-01-01', -- Default constraint simplifies data loading in the code below\n\
    \    constraint PK_RawData\n        primary key clustered(ID)\n)\n```\n代码清单 10-1\n\
    表结构\n\n有两个重要的列：作为主键的 `ID`，以及代表行加载处理时间的 `ProcessingTime`。你应该使用 UTC 时间而非本地时间，以支持应用服务器位于不同时区的情况，并防止夏令时调整时钟引发问题。该列还有助于防止其他会话在数据仍在处理时重新读取它。最好避免为此目的使用布尔（`bit`）列，因为如果应用服务器崩溃，该行将永远留在表中。而使用时间列，系统可以在超时后再次读取它。\n\
    \n现在，让我们创建一个读取数据的存储过程，如代码清单 10-2 所示。\n\n```sql\ncreate proc dbo.LoadRawData(@PacketSize\
    \ int)\nas\nbegin\n    set nocount, xact_abort on\n\n    declare\n        @EarliestProcessingTime\
    \ datetime\n        ,@ResCode int\n\n    declare\n        @Data table\n      \
    \  (\n            ID int not null primary key,\n            Attributes char(100)\
    \ not null\n        )\n\n    begin tran\n        exec @ResCode = sp_getapplock\n\
    \            @Resource = 'LoadRowDataLock'\n            ,@LockMode = 'Exclusive'\n\
    \            ,@LockOwner = 'Transaction'\n            ,@LockTimeout = 15000; --\
    \ 15 seconds\n\n        if @ResCode >= 0 -- success\n        begin\n         \
    \   -- We assume that app server processes the packet within 1 minute unless crashed\n\
    \            set @EarliestProcessingTime = dateadd(minute,-1,getutcdate());\n\n\
    \            ;with DataPacket(ID, Attributes, ProcessingTime)\n            as\n\
    \            (\n                select top (@PacketSize) ID, Attributes, ProcessingTime\n\
    \                from dbo.RawData\n                where ProcessingTime <= @EarliestProcessingTime\n\
    \                order by ID\n            )\n            update DataPacket\n \
    \           set ProcessingTime = getutcdate()\n            output inserted.ID,\
    \ inserted.Attributes into @Data(ID, Attributes);\n        end\n\n        -- we\
    \ don't need to explicitly release application lock because @LockOwner is Transaction\n\
    \    commit\n\n    select ID, Attributes from @Data;\nend\n```\n代码清单 10-2\n读取数据的存储过程\n\
    \n该存储过程在事务开始时获取一个排他（X）应用锁。结果，所有其他调用该存储过程的会话都会被阻塞，直到事务提交且应用锁被释放。这保证了只有一个会话可以在存储过程内更新和读取数据。同时，其他会话仍然可以处理该表（例如，插入新行或删除已处理的行）。应用锁独立于数据锁，除非会话试图通过\
    \ `sp_getapplock` 调用为相同的 `@Resource` 获取不兼容的应用锁，否则不会阻塞。\n\n图 10-1 展示了当两个会话同时调用\
    \ `dbo.LoadRawData` 存储过程时，`sys.dm_tran_locks` 数据管理视图的输出。`SPID=58` 的会话成功获取了应用锁，而\
    \ `SPID=63` 的另一个会话被阻塞。`Resource_type` 值为 `APPLICATION` 表示这是一个应用锁。\n\n![../images/463519_1_En_10_Chapter/463519_1_En_10_Fig1_HTML.jpg](img/463519_1_En_10_Fig1_HTML.jpg)\n\
    \n图 10-1\n`sys.dm_tran_locks` 的输出\n\n值得一提的是，如果我们的目标仅仅是保证多个会话不能同时读取相同的行，而不是序列化整个读取过程，还有另一种更简单的解决方案。你可以使用锁定表提示，如代码清单\
    \ 10-3 所示。\n\n```sql\ncreate proc dbo.LoadRawData(@PacketSize int)\nas\nbegin\n\
    \    set nocount, xact_abort on\n\n    declare\n        @EarliestProcessingTime\
    \ datetime = dateadd(minute,-1,getutcdate());\n\n    declare\n        @Data table\n\
    \        (\n            ID int not null primary key,\n            Attributes char(100)\
    \ not null\n        )\n\n    ;with DataPacket(ID, Attributes, ProcessingTime)\n\
    \    as\n    (\n        select top (@PacketSize) ID, Attributes, ProcessingTime\n\
    \        from dbo.RawData with (updlock, readpast)\n        where ProcessingTime\
    \ <= @EarliestProcessingTime\n        order by ID\n    )\n    update DataPacket\n\
    \    set ProcessingTime = getutcdate()\n    output inserted.ID, inserted.Attributes\
    \ into @Data(ID, Attributes);\n\n    select ID, Attributes from @Data;\nend\n\
    ```\n代码清单 10-3\n使用表锁提示序列化对数据的访问\n\n`UPDLOCK` 提示强制 SQL Server 在 `SELECT` 操作期间使用更新（U）锁，而不是共享（S）锁。这可以防止其他会话同时读取相同的行。同时，`READPAST`\
    \ 提示强制会话跳过持有不兼容锁的行，而不是被阻塞。\n\n尽管两种实现方式都达到了相同的目标，但它们采用了不同的方法。后者通过使用数据（行级）锁来序列化对相同行的访问。应用锁则序列化对代码的访问，防止多个会话同时运行该语句。\n\
    \n虽然这两种方法都可以用于基于磁盘的表，但在使用内存优化表实现队列的情况下，锁定提示将不起作用。在这种场景下锁定提示无效，但应用锁可以帮助实现所需的序列化。\n"
- fmt: '### Note


    We will discuss the In-Memory OLTP Concurrency Model in Chapter [13](#463519_1_En_13_Chapter.xhtml).


    When a system has a structured data access tier, application locks may help to
    reduce blocking and improve the user experience when some sessions acquire table-level
    locks. One such example is index maintenance or partition switches in SQL Server
    systems that do not support low-priority locks.


    Consider a scenario where you have a multi-tenant system with a set of services
    that query data on a per-tenant basis. The code shown in Listing [10-4](#463519_1_En_10_Chapter.xhtml#PC4)
    tries to acquire a shared (S) application lock before querying the table. If this
    operation is not successful, it returns an empty result set emulating the “no
    new data” condition without performing any access to the table.


    ```sql

    create table dbo.CollectedData

    (

    TenantId int not null,

    OnDate datetime not null,

    Id bigint not null identity(1,1),

    Attributes char(100) not null

    constraint DEF_CollectedData_Attributes

    default ''Other columns''

    );

    create unique clustered index IDX_CollectedData_TenantId_OnDate_Id

    on dbo.CollectedData(TenantId,OnDate,Id);

    go

    create proc dbo.GetTenantData

    (

    @TenantId int

    ,@LastOnDate datetime

    ,@PacketSize int

    )

    as

    begin

    set nocount, xact_abort on

    declare

    @ResCode int

    begin tran

    exec @ResCode = sp_getapplock

    @Resource = ''TenantDataAccess''

    ,@LockMode = ''Shared''

    ,@LockOwner = ''Transaction''

    ,@LockTimeout = 0 ; -- No wait

    if @ResCode >= 0 -- success

    begin

    if @LastOnDate is null

    set @LastOnDate = ''2018-01-01'';

    select top (@PacketSize) with ties

    TenantId, OnDate, Id, Attributes

    from dbo.CollectedData

    where

    TenantId = @TenantId and

    OnDate > @LastOnDate

    order by

    OnDate;

    end

    else

    -- return empty resultset

    select

    convert(int,null) as TenantId

    ,convert(datetime,null) as OnDate

    ,convert(char(100),null) as Attributes

    where

    1 = 2;

    commit

    end

    ```

    `Listing 10-4`

    Preventing access to the table during index rebuild: Table and stored procedure


    The second session, which needs to acquire a full table-level lock, may obtain
    an exclusive (X) application lock first, as shown in Listing [10-5](#463519_1_En_10_Chapter.xhtml#PC5).
    This will prevent the stored procedure from being blocked when querying the table
    for the duration of the index rebuild.


    ```sql

    begin tran

    exec sp_getapplock

    @Resource = ''TenantDataAccess''

    ,@LockMode = ''Exclusive''

    ,@LockOwner = ''Transaction''

    ,@LockTimeout = -1 ; -- Indefinite wait

    alter index IDX_CollectedData_TenantId_OnDate_Id

    on dbo.CollectedData rebuild;

    commit

    ```

    `Listing 10-5`

    Preventing access to the table during index rebuild: Obtaining exclusive access
    to the table


    This approach may improve the user experience by eliminating possible query timeouts
    in the system. Moreover, it may reduce the time it takes for an exclusive table
    lock to be obtained. SQL Server does not use lock partitioning with application
    locks, and therefore the application lock request needs to be granted just within
    the single locking queue rather than on each partition sequentially.


    Finally, it is worth noting that there is still the possibility of blocking if
    a stored procedure needs to be compiled at a time when `ALTER INDEX REBUILD` is
    running. The compilation process will need to acquire a table-level lock, which
    will be blocked by the schema modification (Sch-M) lock held by the index rebuild.


    ## Summary


    Application locks allow an application to place a lock on an application resource
    that is not related to the database objects and is identified by the name. It
    is a useful tool that helps you implement mutual exclusion code patterns that
    serialize access to T-SQL code, similar to critical sections and mutexes in client
    applications.


    You can create and release application locks using the `sp_getapplock` and `sp_releaseapplock`
    stored procedures, respectively. Application locks can have either session or
    transaction scope, and they follow the regular lock compatibility rules.


    # 11. Designing Transaction Strategies


    A properly implemented transaction strategy would benefit every system. This chapter
    will provide a set of generic guidelines on the subject and discuss how you can
    improve concurrency in a system.


    ## Transaction Strategy Design Considerations


    Consistent transaction and error-handling strategies always benefit the system.
    They help to reduce blocking and simplify troubleshooting when blocking does occur.


    As we already discussed in Chapter [2](#463519_1_En_2_Chapter.xhtml), the choice
    between client- and server-side transaction management greatly depends on the
    data access tier architecture. A stored procedure–based implementation may benefit
    from explicit transactions started from within the stored procedures. A client-side
    implementation with ORM frameworks or code generators, on the other hand, would
    require transactions to be managed in the client code.


    There is a common misconception that autocommitted transactions may benefit the
    system. Even though such an approach may somewhat reduce blocking—after all, every
    statement runs in its own transaction, and exclusive (X) locks are held for a
    shorter amount of time—it is hardly the best choice. The large number of small
    transactions could significantly increase transaction log activity and reduce
    the performance of the system.


    More important, autocommitted transactions may introduce data-quality issues when
    multiple related data modifications partially fail due to errors. Such issues
    are extremely hard to diagnose and address when they occur in production. In the
    vast majority of cases it is better to use explicit transactions in the system.


    ### Tip


    Avoid autocommitted transactions and use explicit transactions instead.


    You can further reduce the chance of having data-quality issues by using the `SET
    XACT_ABORT ON` option . As you will remember, this setting makes a transaction
    uncommittable if there is any error. This prevents explicit transactions from
    committing when some data modifications have not been completed successfully.'
