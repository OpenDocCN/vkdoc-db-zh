- fmt: '### Nested Transactions and Savepoints


    SQL Server *technically* supports nested transactions; however, they are primarily
    intended to simplify transaction management during nested stored procedure calls.
    In practice, it means that the code needs to explicitly commit all nested transactions,
    and the number of `COMMIT` calls should match the number of `BEGIN TRAN` calls.
    The `ROLLBACK` statement, however, rolls back the entire transaction regardless
    of the current nested level.


    The code in Listing [2-8](#463519_1_En_2_Chapter.xhtml#PC8) demonstrates this
    behavior. As I already mentioned, system variable `@@TRANCOUNT` returns the nested
    level of the transaction.


    ```

    select @@TRANCOUNT as [Original @@TRANCOUNT];

    begin tran

    select @@TRANCOUNT as [@@TRANCOUNT after the first BEGIN TRAN];

    begin tran

    select @@TRANCOUNT as [@@TRANCOUNT after the second BEGIN TRAN];

    commit

    select @@TRANCOUNT as [@@TRANCOUNT after nested COMMIT];

    begin tran

    select @@TRANCOUNT as [@@TRANCOUNT after the third BEGIN TRAN];

    rollback

    select @@TRANCOUNT as [@@TRANCOUNT after ROLLBACK];

    rollback; -- This ROLLBACK generates the error

    Listing 2-8

    Nested transactions

    ```


    You can see the output of the code in Figure [2-7](#463519_1_En_2_Chapter.xhtml#Fig7).


    ![../images/463519_1_En_2_Chapter/463519_1_En_2_Fig7_HTML.jpg](images/463519_1_En_2_Chapter/463519_1_En_2_Fig7_HTML.jpg)


    Figure 2-7

    Nested transactions


    You can save the state of the transaction and create a *savepoint* by using a
    `SAVE TRANSACTION` statement. This will allow you to partially roll back a transaction,
    returning to the most recent savepoint. The transaction will remain active and
    will need to be completed with an explicit `COMMIT` or `ROLLBACK` statement later.


    ### Note


    Uncommittable transactions with `XACT_STATE() = -1` cannot be rolled back to a
    savepoint. In practice, it means that you cannot roll back to a savepoint after
    an error if `XACT_ABORT` is set to `ON`.


    The code in Listing [2-9](#463519_1_En_2_Chapter.xhtml#PC9) illustrates this behavior.
    The stored procedure creates the savepoint when it runs an active transaction
    and rolls back to this savepoint in case of a committable error.


    ```

    create proc dbo.TryDeleteCustomer

    (

    @CustomerId int

    )

    as

    begin

    -- Setting XACT_ABORT to OFF for rollback to savepoint to work

    set xact_abort off

    declare

    @ActiveTran bit

    -- Check if SP is calling in context of active transaction

    set @ActiveTran = IIF(@@TranCount > 0, 1, 0);

    if @ActiveTran = 0

    begin tran;

    else

    save transaction TryDeleteCustomer;

    begin try

    delete dbo.Customers where CustomerId = @CustomerId;

    if @ActiveTran = 0

    commit;

    return 0;

    end try

    begin catch

    if @ActiveTran = 0 or XACT_STATE() = -1

    begin

    -- Roll back entire transaction

    rollback tran;

    return -1;

    end

    else begin

    -- Roll back to savepoint

    rollback tran TryDeleteCustomer;

    return 1;

    end

    end catch;

    end;

    Listing 2-9

    Savepoints

    ```


    The code in Listing [2-10](#463519_1_En_2_Chapter.xhtml#PC10) triggers a foreign
    key violation during the second `dbo.TryDeleteCustomer` call. This is a non-critical
    error, and therefore the code is able to commit after it.


    ```

    declare

    @ReturnCode int

    exec dbo.ResetData;

    begin tran

    exec @ReturnCode = TryDeleteCustomer @CustomerId = 1;

    select

    1 as [CustomerId]

    ,@ReturnCode as [@ReturnCode]

    ,XACT_STATE() as [XACT_STATE()];

    if @ReturnCode >= 0

    begin

    exec @ReturnCode = TryDeleteCustomer @CustomerId = 2;

    select

    2 as [CustomerId]

    ,@ReturnCode as [@ReturnCode]

    ,XACT_STATE() as [XACT_STATE()];

    end

    if @ReturnCode >= 0

    commit;

    else

    if @@TRANCOUNT > 0

    rollback;

    go

    select * from dbo.Customers;

    Listing 2-10

    dbo.TryDeleteCustomer in action

    ```


    Figure [2-8](#463519_1_En_2_Chapter.xhtml#Fig8) shows the output of the code.
    As you can see, SQL Server has been able to successfully delete the row with `CustomerId=1`
    and commit the transaction at this state.


    ![../images/463519_1_En_2_Chapter/463519_1_En_2_Fig8_HTML.jpg](images/463519_1_En_2_Chapter/463519_1_En_2_Fig8_HTML.jpg)


    Figure 2-8

    Output of Listing [2-10](#463519_1_En_2_Chapter.xhtml#PC10)


    It is worth noting that this example is shown for demonstration purposes only.
    From an efficiency standpoint , it would be better to validate the referential
    integrity and existence of the orders before deletion occurred rather than catching
    an exception and rolling back to a savepoint in case of an error.


    ## Summary


    Transactions are a key concept in data management systems and support atomicity,
    consistency, isolation, and durability requirements for data modifications in
    the system.


    There are two concurrency models used in database systems. Pessimistic concurrency
    expects that users may want to update the same data, and it blocks access to uncommitted
    changes from other sessions. Optimistic concurrency assumes that the chance of
    simultaneous data updates is low. There is no blocking under this model; however,
    simultaneous updates will lead to write–write conflicts.


    SQL Server supports four pessimistic (`READ UNCOMMITTED`, `READ COMMITTED`, `REPEATABLE
    READ`, and `SERIALIZABLE`) and one optimistic (`SNAPSHOT`) isolation levels. It
    also supports the `READ COMMITTED SNAPSHOT` isolation level, which implements
    optimistic concurrency for readers and pessimistic concurrency for data modification
    queries.


    There are three types of transactions in SQL Server—explicit, autocommitted, and
    implicit. Autocommitted transactions are less efficient as a result of the transaction
    logging overhead they introduce.


    Depending on the severity of the errors and a few other factors, transactions
    may be committable or may become uncommittable and doomed. You can treat all errors
    as uncommittable by setting `XACT_ABORT` option to `ON`. This approach simplifies
    error handling and reduces the chance of data inconsistency in the system.


    SQL Server supports nested transactions. The number of `COMMIT` calls should match
    the `BEGIN TRAN` calls for the transaction to be committed. A `ROLLBACK` statement,
    on the other hand, rolls back the entire transaction regardless of the nested
    level.


    # 3. Lock Types


    This chapter will discuss the key concept in SQL Server concurrency—*locks*. It
    will provide an overview of the major lock types in SQL Server, explain their
    compatibility, and, finally, demonstrate how different transaction isolation levels
    affect the lifetime of the locks in the system.


    ## Major Lock Types


    SQL Server uses locking to support the isolation requirements of the transaction.
    Every lock, in a nutshell, is an in-memory structure managed by a SQL Server component
    called the *lock manager*. Each lock structure uses 64 bytes of memory on the
    32-bit and 128 bytes on the 64-bit edition of SQL Server.


    Locks are acquired and held on *resources*, such as data rows, pages, partitions,
    tables (objects), databases, and several others. By default, SQL Server uses row-level
    locking to acquire locks on the data rows, which minimizes possible concurrency
    issues in the system. You should remember, however, that the only guarantee SQL
    Server provides is enforcing data isolation and consistency based on transaction
    isolation levels. The locking behavior is not documented, and in some cases SQL
    Server can choose to lock at the page or table level rather than at the row level.
    Nevertheless, lock compatibility rules are always enforced, and understanding
    the locking model is enough to troubleshoot and address the majority of the concurrency
    issues in the system.


    The key attribute in the lock structure is the *lock type*. Internally, SQL Server
    uses more than 20 different lock types. They can be grouped into several major
    categories based on their type and usage.'
  raw: '### Nested Transactions and Savepoints


    SQL Server *technically* supports nested transactions; however, they are primarily
    intended to simplify transaction management during nested stored procedure calls.
    In practice, it means that the code needs to explicitly commit all nested transactions,
    and the number of `COMMIT` calls should match the number of `BEGIN TRAN` calls.
    The `ROLLBACK` statement, however, rolls back the entire transaction regardless
    of the current nested level.


    The code in Listing [2-8](#463519_1_En_2_Chapter.xhtml#PC8) demonstrates this
    behavior. As I already mentioned, system variable `@@TRANCOUNT` returns the nested
    level of the transaction.


    ```

    select @@TRANCOUNT as [Original @@TRANCOUNT];

    begin tran

    select @@TRANCOUNT as [@@TRANCOUNT after the first BEGIN TRAN];

    begin tran

    select @@TRANCOUNT as [@@TRANCOUNT after the second BEGIN TRAN];

    commit

    select @@TRANCOUNT as [@@TRANCOUNT after nested COMMIT];

    begin tran

    select @@TRANCOUNT as [@@TRANCOUNT after the third BEGIN TRAN];

    rollback

    select @@TRANCOUNT as [@@TRANCOUNT after ROLLBACK];

    rollback; -- This ROLLBACK generates the error

    Listing 2-8

    Nested transactions

    ```


    You can see the output of the code in Figure [2-7](#463519_1_En_2_Chapter.xhtml#Fig7).


    ![../images/463519_1_En_2_Chapter/463519_1_En_2_Fig7_HTML.jpg](images/463519_1_En_2_Chapter/463519_1_En_2_Fig7_HTML.jpg)


    Figure 2-7


    Nested transactions


    You can save the state of the transaction and create a *savepoint* by using a
    `SAVE TRANSACTION` statement. This will allow you to partially roll back a transaction,
    returning to the most recent savepoint. The transaction will remain active and
    will need to be completed with an explicit `COMMIT` or `ROLLBACK` statement later.


    ### Note


    Uncommittable transactions with `XACT_STATE() = -1` cannot be rolled back to a
    savepoint. In practice, it means that you cannot roll back to a savepoint after
    an error if `XACT_ABORT` is set to `ON`.


    The code in Listing [2-9](#463519_1_En_2_Chapter.xhtml#PC9) illustrates this behavior.
    The stored procedure creates the savepoint when it runs an active transaction
    and rolls back to this savepoint in case of a committable error.


    ```

    create proc dbo.TryDeleteCustomer

    (

    @CustomerId int

    )

    as

    begin

    -- Setting XACT_ABORT to OFF for rollback to savepoint to work

    set xact_abort off

    declare

    @ActiveTran bit

    -- Check if SP is calling in context of active transaction

    set @ActiveTran = IIF(@@TranCount > 0, 1, 0);

    if @ActiveTran = 0

    begin tran;

    else

    save transaction TryDeleteCustomer;

    begin try

    delete dbo.Customers where CustomerId = @CustomerId;

    if @ActiveTran = 0

    commit;

    return 0;

    end try

    begin catch

    if @ActiveTran = 0 or XACT_STATE() = -1

    begin

    -- Roll back entire transaction

    rollback tran;

    return -1;

    end

    else begin

    -- Roll back to savepoint

    rollback tran TryDeleteCustomer;

    return 1;

    end

    end catch;

    end;

    Listing 2-9

    Savepoints

    ```


    The code in Listing [2-10](#463519_1_En_2_Chapter.xhtml#PC10) triggers a foreign
    key violation during the second `dbo.TryDeleteCustomer` call. This is a non-critical
    error, and therefore the code is able to commit after it.


    ```

    declare

    @ReturnCode int

    exec dbo.ResetData;

    begin tran

    exec @ReturnCode = TryDeleteCustomer @CustomerId = 1;

    select

    1 as [CustomerId]

    ,@ReturnCode as [@ReturnCode]

    ,XACT_STATE() as [XACT_STATE()];

    if @ReturnCode >= 0

    begin

    exec @ReturnCode = TryDeleteCustomer @CustomerId = 2;

    select

    2 as [CustomerId]

    ,@ReturnCode as [@ReturnCode]

    ,XACT_STATE() as [XACT_STATE()];

    end

    if @ReturnCode >= 0

    commit;

    else

    if @@TRANCOUNT > 0

    rollback;

    go

    select * from dbo.Customers;

    Listing 2-10

    dbo.TryDeleteCustomer in action

    ```


    Figure [2-8](#463519_1_En_2_Chapter.xhtml#Fig8) shows the output of the code.
    As you can see, SQL Server has been able to successfully delete the row with `CustomerId=1`
    and commit the transaction at this state.


    ![../images/463519_1_En_2_Chapter/463519_1_En_2_Fig8_HTML.jpg](images/463519_1_En_2_Chapter/463519_1_En_2_Fig8_HTML.jpg)


    Figure 2-8


    Output of Listing [2-10](#463519_1_En_2_Chapter.xhtml#PC10)


    It is worth noting that this example is shown for demonstration purposes only.
    From an efficiency standpoint , it would be better to validate the referential
    integrity and existence of the orders before deletion occurred rather than catching
    an exception and rolling back to a savepoint in case of an error.


    ## Summary


    Transactions are a key concept in data management systems and support atomicity,
    consistency, isolation, and durability requirements for data modifications in
    the system.


    There are two concurrency models used in database systems. Pessimistic concurrency
    expects that users may want to update the same data, and it blocks access to uncommitted
    changes from other sessions. Optimistic concurrency assumes that the chance of
    simultaneous data updates is low. There is no blocking under this model; however,
    simultaneous updates will lead to write–write conflicts.


    SQL Server supports four pessimistic (`READ UNCOMMITTED`, `READ COMMITTED`, `REPEATABLE
    READ`, and `SERIALIZABLE`) and one optimistic (`SNAPSHOT`) isolation levels. It
    also supports the `READ COMMITTED SNAPSHOT` isolation level, which implements
    optimistic concurrency for readers and pessimistic concurrency for data modification
    queries.


    There are three types of transactions in SQL Server—explicit, autocommitted, and
    implicit. Autocommitted transactions are less efficient as a result of the transaction
    logging overhead they introduce.


    Depending on the severity of the errors and a few other factors, transactions
    may be committable or may become uncommittable and doomed. You can treat all errors
    as uncommittable by setting `XACT_ABORT` option to `ON`. This approach simplifies
    error handling and reduces the chance of data inconsistency in the system.


    SQL Server supports nested transactions. The number of `COMMIT` calls should match
    the `BEGIN TRAN` calls for the transaction to be committed. A `ROLLBACK` statement,
    on the other hand, rolls back the entire transaction regardless of the nested
    level.


    # 3. Lock Types


    This chapter will discuss the key concept in SQL Server concurrency—*locks*. It
    will provide an overview of the major lock types in SQL Server, explain their
    compatibility, and, finally, demonstrate how different transaction isolation levels
    affect the lifetime of the locks in the system.


    ## Major Lock Types


    SQL Server uses locking to support the isolation requirements of the transaction.
    Every lock, in a nutshell, is an in-memory structure managed by a SQL Server component
    called the *lock manager*. Each lock structure uses 64 bytes of memory on the
    32-bit and 128 bytes on the 64-bit edition of SQL Server.


    Locks are acquired and held on *resources*, such as data rows, pages, partitions,
    tables (objects), databases, and several others. By default, SQL Server uses row-level
    locking to acquire locks on the data rows, which minimizes possible concurrency
    issues in the system. You should remember, however, that the only guarantee SQL
    Server provides is enforcing data isolation and consistency based on transaction
    isolation levels. The locking behavior is not documented, and in some cases SQL
    Server can choose to lock at the page or table level rather than at the row level.
    Nevertheless, lock compatibility rules are always enforced, and understanding
    the locking model is enough to troubleshoot and address the majority of the concurrency
    issues in the system.


    The key attribute in the lock structure is the *lock type*. Internally, SQL Server
    uses more than 20 different lock types. They can be grouped into several major
    categories based on their type and usage.'
  trans: '### 嵌套事务与保存点


    SQL Server *从技术上讲* 支持嵌套事务；然而，它们主要用于简化嵌套存储过程调用期间的事务管理。在实践中，这意味着代码需要显式提交所有嵌套事务，并且
    `COMMIT` 调用的次数应与 `BEGIN TRAN` 调用的次数相匹配。而 `ROLLBACK` 语句则会回滚整个事务，无论当前的嵌套级别如何。


    代码清单 2-8 展示了此行为。正如我已经提到的，系统变量 `@@TRANCOUNT` 返回事务的嵌套级别。


    ```

    select @@TRANCOUNT as [Original @@TRANCOUNT];

    begin tran

    select @@TRANCOUNT as [@@TRANCOUNT after the first BEGIN TRAN];

    begin tran

    select @@TRANCOUNT as [@@TRANCOUNT after the second BEGIN TRAN];

    commit

    select @@TRANCOUNT as [@@TRANCOUNT after nested COMMIT];

    begin tran

    select @@TRANCOUNT as [@@TRANCOUNT after the third BEGIN TRAN];

    rollback

    select @@TRANCOUNT as [@@TRANCOUNT after ROLLBACK];

    rollback; -- This ROLLBACK generates the error

    Listing 2-8

    嵌套事务

    ```


    您可以在图 2-7 中看到代码的输出。


    ![../images/463519_1_En_2_Chapter/463519_1_En_2_Fig7_HTML.jpg](img/463519_1_En_2_Fig7_HTML.jpg)


    图 2-7

    嵌套事务


    您可以使用 `SAVE TRANSACTION` 语句来保存事务的状态并创建一个*保存点*。这将允许您部分回滚事务，返回到最近的保存点。该事务将保持活动状态，并且需要在之后通过显式的
    `COMMIT` 或 `ROLLBACK` 语句来完成。


    ### 注意


    具有 `XACT_STATE() = -1` 的不可提交事务无法回滚到保存点。在实践中，这意味着如果 `XACT_ABORT` 设置为 `ON`，则在发生错误后您无法回滚到保存点。


    代码清单 2-9 说明了此行为。该存储过程在运行活动事务时创建保存点，并在遇到可提交错误时回滚到此保存点。


    ```

    create proc dbo.TryDeleteCustomer

    (

    @CustomerId int

    )

    as

    begin

    -- Setting XACT_ABORT to OFF for rollback to savepoint to work

    set xact_abort off

    declare

    @ActiveTran bit

    -- Check if SP is calling in context of active transaction

    set @ActiveTran = IIF(@@TranCount > 0, 1, 0);

    if @ActiveTran = 0

    begin tran;

    else

    save transaction TryDeleteCustomer;

    begin try

    delete dbo.Customers where CustomerId = @CustomerId;

    if @ActiveTran = 0

    commit;

    return 0;

    end try

    begin catch

    if @ActiveTran = 0 or XACT_STATE() = -1

    begin

    -- Roll back entire transaction

    rollback tran;

    return -1;

    end

    else begin

    -- Roll back to savepoint

    rollback tran TryDeleteCustomer;

    return 1;

    end

    end catch;

    end;

    Listing 2-9

    保存点

    ```


    代码清单 2-10 在第二次调用 `dbo.TryDeleteCustomer` 时触发了外键约束违规。这是一个非关键错误，因此代码能够在错误发生后提交。


    ```

    declare

    @ReturnCode int

    exec dbo.ResetData;

    begin tran

    exec @ReturnCode = TryDeleteCustomer @CustomerId = 1;

    select

    1 as [CustomerId]

    ,@ReturnCode as [@ReturnCode]

    ,XACT_STATE() as [XACT_STATE()];

    if @ReturnCode >= 0

    begin

    exec @ReturnCode = TryDeleteCustomer @CustomerId = 2;

    select

    2 as [CustomerId]

    ,@ReturnCode as [@ReturnCode]

    ,XACT_STATE() as [XACT_STATE()];

    end

    if @ReturnCode >= 0

    commit;

    else

    if @@TRANCOUNT > 0

    rollback;

    go

    select * from dbo.Customers;

    Listing 2-10

    dbo.TryDeleteCustomer 实战演示

    ```


    图 2-8 显示了代码的输出。如您所见，SQL Server 成功删除了 `CustomerId=1` 的行并在该状态下提交了事务。


    ![../images/463519_1_En_2_Chapter/463519_1_En_2_Fig8_HTML.jpg](img/463519_1_En_2_Fig8_HTML.jpg)


    图 2-8

    代码清单 2-10 的输出


    值得注意的是，此示例仅用于演示目的。从效率角度考虑，在删除操作发生前就验证引用完整性和订单的存在性，会比在发生错误时捕获异常并回滚到保存点更好。


    ## 总结


    事务是数据管理系统中的一个核心概念，它支持系统中数据修改的原子性、一致性、隔离性和持久性要求。


    数据库系统中使用两种并发模型。悲观并发预期用户可能想要更新相同的数据，并阻止其他会话访问未提交的更改。乐观并发假设同时发生数据更新的概率较低。在此模型下没有阻塞；然而，同时更新将导致写-写冲突。


    SQL Server 支持四种悲观（`READ UNCOMMITTED`、`READ COMMITTED`、`REPEATABLE READ` 和 `SERIALIZABLE`）和一种乐观（`SNAPSHOT`）隔离级别。它还支持
    `READ COMMITTED SNAPSHOT` 隔离级别，该级别为读取器实现乐观并发，为数据修改查询实现悲观并发。


    SQL Server 中有三种类型的事务——显式事务、自动提交事务和隐式事务。自动提交事务由于它们引入的事务日志开销而效率较低。


    根据错误的严重程度和其他一些因素，事务可能是可提交的，或者可能变得不可提交并被标记为“已损坏”。您可以通过将 `XACT_ABORT` 选项设置为 `ON`
    来将所有错误视为不可提交。这种方法简化了错误处理并降低了系统中数据不一致的可能性。


    SQL Server 支持嵌套事务。要使事务被提交，`COMMIT` 调用的次数应与 `BEGIN TRAN` 调用次数相匹配。而 `ROLLBACK` 语句则会回滚整个事务，无论嵌套级别如何。


    # 3. 锁类型


    本章将讨论 SQL Server 并发中的关键概念——*锁*。它将概述 SQL Server 中的主要锁类型，解释它们的兼容性，并最终演示不同的事务隔离级别如何影响系统中锁的生命周期。


    ## 主要锁类型


    SQL Server 使用锁来支持事务的隔离需求。简而言之，每个锁都是一个由名为*锁管理器*的 SQL Server 组件管理的内存中结构。每个锁结构在 SQL
    Server 的 32 位版本上使用 64 字节内存，在 64 位版本上使用 128 字节内存。


    锁在*资源*（如数据行、页、分区、表（对象）、数据库等）上获取和持有。默认情况下，SQL Server 使用行级锁来获取数据行上的锁，这最大限度地减少了系统中可能的并发问题。然而，您应该记住，SQL
    Server 提供的唯一保证是基于事务隔离级别强制执行数据隔离和一致性。锁定行为未被记录，并且在某些情况下，SQL Server 可以选择在页或表级别而不是行级别锁定。尽管如此，锁兼容性规则始终强制执行，并且理解锁定模型足以解决和处理系统中大多数并发问题。


    锁结构中的关键属性是*锁类型*。在内部，SQL Server 使用超过 20 种不同的锁类型。它们可以根据其类型和用途分为几个主要类别。'
- fmt: '### Code Samples


    The code examples in this and subsequent chapters will rely on the `Delivery.Orders`
    table defined here. This table has a clustered primary key on the `OrderId` column
    with no nonclustered indexes defined.


    You can find the script that creates the table and populates it with the data
    in the companion materials of the book.


    ```sql

    create schema Delivery;

    create table Delivery.Orders

    (

    OrderId int not null identity(1,1),

    OrderDate smalldatetime not null,

    OrderNum varchar(20) not null,

    Reference varchar(64) null,

    CustomerId int not null,

    PickupAddressId int not null,

    DeliveryAddressId int not null,

    ServiceId int not null,

    RatePlanId int not null,

    OrderStatusId int not null,

    DriverId int null,

    Pieces smallint not null,

    Amount smallmoney not null,

    ModTime datetime not null

    constraint DEF_Orders_ModTime

    default getDate(),

    PlaceHolder char(100) not null

    constraint DEF_Orders_Placeholder

    default ''Placeholder'',

    constraint PK_Orders

    primary key clustered(OrderId)

    )

    go

    declare

    @MaxOrderId int = 65536

    ,@MaxCustomers int = 1000

    ,@MaxAddresses int = 20

    ,@MaxDrivers int = 125

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as T1 cross join N1 as T2) -- 4 rows

    ,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) -- 16 rows

    ,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256 rows

    ,N5(C) as (select 0 from N4 as T1 cross join N4 as T2) -- 65,536 rows

    ,IDs(ID) as (select row_number() over (order by (select null)) from N5)

    ,Info(OrderId, CustomerId, OrderDateOffset, RatePlanId, ServiceId, Pieces)

    as

    (

    select

    ID, ID % @MaxCustomers + 1, ID % (365*24*60)

    ,ID % 2 + 1, ID % 3 + 1, ID % 5 + 1

    from IDs

    where ID  5 * 24 * 60

    then 4

    else OrderId % 4 + 1

    end

    ,(OrderId % 5 + 1) * 10.

    from Info

    )

    insert into Delivery.Orders(OrderDate, OrderNum, CustomerId,

    PickupAddressId, DeliveryAddressId, ServiceId, RatePlanId,

    OrderStatusId, DriverId, Pieces, Amount)

    select

    o.OrderDate

    ,o.OrderNum

    ,o.CustomerId

    ,o.PickupAddressId

    ,case

    when o.PickupAddressId % @MaxAddresses = 0

    then o.PickupAddressId + 1

    else o.PickupAddressId - 1

    end

    ,o.ServiceId

    ,o.RatePlanId

    ,o.OrderStatusId

    ,case

    when o.OrderStatusId in (1,4)

    then NULL

    else OrderId % @MaxDrivers + 1

    end

    ,o.Pieces

    ,o.Rate

    from Info2 o;

    ```


    ### Exclusive (X) Locks


    Exclusive (X) locks are acquired by `writers`—`INSERT`, `UPDATE`, `DELETE`, and
    `MERGE` statements that modify data. Those queries acquire exclusive (X) locks
    on the affected rows and hold them until the end of the transaction.


    As you can guess by the name—`exclusive` means `exclusive`—only one session can
    hold an exclusive (X) lock on the resource at any given point in time. This behavior
    enforces the most important concurrency rule in the system—multiple sessions cannot
    modify the same data simultaneously. That’s it; other sessions are unable to acquire
    exclusive (X) locks on the row until the first transaction is completed and the
    exclusive (X) lock on the modified row is released.


    Transaction isolation levels do not affect exclusive (X) lock behavior. Exclusive
    (X) locks are acquired and held until the end of the transaction, even in `READ
    UNCOMMITTED` mode. The longer the transaction you have, the longer the exclusive
    (X) locks would be held, which would increase the chance that blocking would occur.


    ### Intent (I*) Locks


    Even though row-level locking reduces blocking in the system, keeping locks only
    on the row level would be bad from a performance standpoint. Consider a situation
    where a session needs to have exclusive access to a table; for example, during
    the table alteration. In this case, if only row-level locking existed, the session
    would have to scan the entire table, checking if any row-level locks were held
    there. As you can imagine, this would be an extremely inefficient process, especially
    on large tables.


    SQL Server addresses this situation by introducing the concept of intent (I*)
    locks . Intent locks are held on the data-page and table levels and indicate the
    existence of locks on the child objects.


    Let’s run the code from Listing 3-1 and check what locks are held after we update
    one row in the table. The code uses the `sys.dm_tran_locks` dynamic management
    view, which returns information about current lock requests in the system.


    It is worth noting that I am using the `READ UNCOMMITTED` isolation level to demonstrate
    that exclusive (X) locks are acquired in any transaction isolation level.


    ```sql

    set transaction isolation level read uncommitted

    begin tran

    update Delivery.Orders

    set Reference = ''New Reference''

    where OrderId = 100;

    select

    l.resource_type

    ,case

    when l.resource_type = ''OBJECT''

    then

    object_name

    (

    l.resource_associated_entity_id,

    l.resource_database_id

    )

    else ''''

    end as [table]

    ,l.resource_description

    ,l.request_type

    ,l.request_mode

    ,l.request_status

    from

    sys.dm_tran_locks l

    where

    l.request_session_id = @@spid;

    commit

    -- Listing 3-1

    -- Updating a row and checking the locks held

    ```


    Figure 3-1 illustrates the output from the `SELECT` statement. As you can see,
    SQL Server held an exclusive (X) lock on the row (key) and intent exclusive (IX)
    locks on both the page and the object (table). `Those intent exclusive (IX) locks
    indicate the existence of the exclusive (X) row-level lock held.` Finally, there
    was also a shared (S) lock on the database, which indicates that the session was
    accessing it. We will cover shared (S) locks later in this chapter.


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig1_HTML.jpg](images/463519_1_En_3_Chapter/463519_1_En_3_Fig1_HTML.jpg)


    **Figure 3-1**

    Locks held after UPDATE statement


    The `resource_description` column indicates the resources on which those locks
    were acquired. For the page, it indicates its physical location (page 944 in the
    database file 1), and for the row (key) it indicates the hash value of the index
    key. For object locks, you can obtain the `object_id` from the `resource_associated_entry_id`
    column in the view.


    When the session needs to obtain object- or page-level locks, it could check lock
    compatibility with the other locks (intent or full) held on the table or page
    rather than scanning the table/page and checking row-level locks there.


    Finally, it is worth noting that in some cases SQL Server may acquire intent locks
    on other intermediate objects, such as table partitions or row groups in columnstore
    indexes.'
  raw: '### Code Samples


    The code examples in this and subsequent chapters will rely on the `Delivery.Orders`
    table defined here. This table has a clustered primary key on the `OrderId` column
    with no nonclustered indexes defined.


    You can find the script that creates the table and populates it with the data
    in the companion materials of the book.


    ```

    create schema Delivery;

    create table Delivery.Orders

    (

    OrderId int not null identity(1,1),

    OrderDate smalldatetime not null,

    OrderNum varchar(20) not null,

    Reference varchar(64) null,

    CustomerId int not null,

    PickupAddressId int not null,

    DeliveryAddressId int not null,

    ServiceId int not null,

    RatePlanId int not null,

    OrderStatusId int not null,

    DriverId int null,

    Pieces smallint not null,

    Amount smallmoney not null,

    ModTime datetime not null

    constraint DEF_Orders_ModTime

    default getDate(),

    PlaceHolder char(100) not null

    constraint DEF_Orders_Placeholder

    default ''Placeholder'',

    constraint PK_Orders

    primary key clustered(OrderId)

    )

    go

    declare

    @MaxOrderId int = 65536

    ,@MaxCustomers int = 1000

    ,@MaxAddresses int = 20

    ,@MaxDrivers int = 125

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as T1 cross join N1 as T2) -- 4 rows

    ,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) -- 16 rows

    ,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256 rows

    ,N5(C) as (select 0 from N4 as T1 cross join N4 as T2) -- 65,536 rows

    ,IDs(ID) as (select row_number() over (order by (select null)) from N5)

    ,Info(OrderId, CustomerId, OrderDateOffset, RatePlanId, ServiceId, Pieces)

    as

    (

    select

    ID, ID % @MaxCustomers + 1, ID % (365*24*60)

    ,ID % 2 + 1, ID % 3 + 1, ID % 5 + 1

    from IDs

    where ID  5 * 24 * 60

    then 4

    else OrderId % 4 + 1

    end

    ,(OrderId % 5 + 1) * 10.

    from Info

    )

    insert into Delivery.Orders(OrderDate, OrderNum, CustomerId,

    PickupAddressId, DeliveryAddressId, ServiceId, RatePlanId,

    OrderStatusId, DriverId, Pieces, Amount)

    select

    o.OrderDate

    ,o.OrderNum

    ,o.CustomerId

    ,o.PickupAddressId

    ,case

    when o.PickupAddressId % @MaxAddresses = 0

    then o.PickupAddressId + 1

    else o.PickupAddressId - 1

    end

    ,o.ServiceId

    ,o.RatePlanId

    ,o.OrderStatusId

    ,case

    when o.OrderStatusId in (1,4)

    then NULL

    else OrderId % @MaxDrivers + 1

    end

    ,o.Pieces

    ,o.Rate

    from Info2 o;

    ```


    ### Exclusive (X) Locks


    Exclusive (X) locks are acquired by *writers*—`INSERT`, `UPDATE`, `DELETE`, and
    `MERGE` statements that modify data. Those queries acquire exclusive (X) locks
    on the affected rows and hold them until the end of the transaction.


    As you can guess by the name—*exclusive* means *exclusive*—only one session can
    hold an exclusive (X) lock on the resource at any given point in time. This behavior
    enforces the most important concurrency rule in the system—multiple sessions cannot
    modify the same data simultaneously. That’s it; other sessions are unable to acquire
    exclusive (X) locks on the row until the first transaction is completed and the
    exclusive (X) lock on the modified row is released.


    Transaction isolation levels do not affect exclusive (X) lock behavior. Exclusive
    (X) locks are acquired and held until the end of the transaction, even in `READ
    UNCOMMITTED` mode. The longer the transaction you have, the longer the exclusive
    (X) locks would be held, which would increase the chance that blocking would occur.


    ### Intent (I*) Locks


    Even though row-level locking reduces blocking in the system, keeping locks only
    on the row level would be bad from a performance standpoint. Consider a situation
    where a session needs to have exclusive access to a table; for example, during
    the table alteration. In this case, if only row-level locking existed, the session
    would have to scan the entire table, checking if any row-level locks were held
    there. As you can imagine, this would be an extremely inefficient process, especially
    on large tables.


    SQL Server addresses this situation by introducing the concept of intent (I*)
    locks . Intent locks are held on the data-page and table levels and indicate the
    existence of locks on the child objects.


    Let’s run the code from Listing [3-1](#463519_1_En_3_Chapter.xhtml#PC2) and check
    what locks are held after we update one row in the table. The code uses the `sys.dm_tran_locks`
    dynamic management view, which returns information about current lock requests
    in the system.


    It is worth noting that I am using the `READ UNCOMMITTED` isolation level to demonstrate
    that exclusive (X) locks are acquired in any transaction isolation level.


    ```

    set transaction isolation level read uncommitted

    begin tran

    update Delivery.Orders

    set Reference = ''New Reference''

    where OrderId = 100;

    select

    l.resource_type

    ,case

    when l.resource_type = ''OBJECT''

    then

    object_name

    (

    l.resource_associated_entity_id

    ,l.resource_database_id

    )

    else ''''

    end as [table]

    ,l.resource_description

    ,l.request_type

    ,l.request_mode

    ,l.request_status

    from

    sys.dm_tran_locks l

    where

    l.request_session_id = @@spid;

    commit

    Listing 3-1

    Updating a row and checking the locks held

    ```


    Figure [3-1](#463519_1_En_3_Chapter.xhtml#Fig1) illustrates the output from the
    `SELECT` statement. As you can see, SQL Server held an exclusive (X) lock on the
    row (key) and intent exclusive (IX) locks on both the page and the object (table).
    *Those intent exclusive (IX) locks* *indicate the existence of the exclusive (X)
    row-level lock held.* Finally, there was also a shared (S) lock on the database,
    which indicates that the session was accessing it. We will cover shared (S) locks
    later in this chapter.


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig1_HTML.jpg](images/463519_1_En_3_Chapter/463519_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Locks held after UPDATE statement


    The `resource_description` column indicates the resources on which those locks
    were acquired. For the page, it indicates its physical location (page 944 in the
    database file 1), and for the row (key) it indicates the hash value of the index
    key. For object locks, you can obtain the `object_id` from the `resource_associated_entry_id`
    column in the view.


    When the session needs to obtain object- or page-level locks, it could check lock
    compatibility with the other locks (intent or full) held on the table or page
    rather than scanning the table/page and checking row-level locks there.


    Finally, it is worth noting that in some cases SQL Server may acquire intent locks
    on other intermediate objects, such as table partitions or row groups in columnstore
    indexes.'
  trans: '### 代码示例


    本章及后续章节中的代码示例将依赖于此处定义的 `Delivery.Orders` 表。该表在 `OrderId` 列上定义了聚集主键，且未定义任何非聚集索引。


    你可以在本书的配套资料中找到创建该表并填充数据的脚本。


    ```sql

    create schema Delivery;

    create table Delivery.Orders

    (

    OrderId int not null identity(1,1),

    OrderDate smalldatetime not null,

    OrderNum varchar(20) not null,

    Reference varchar(64) null,

    CustomerId int not null,

    PickupAddressId int not null,

    DeliveryAddressId int not null,

    ServiceId int not null,

    RatePlanId int not null,

    OrderStatusId int not null,

    DriverId int null,

    Pieces smallint not null,

    Amount smallmoney not null,

    ModTime datetime not null

    constraint DEF_Orders_ModTime

    default getDate(),

    PlaceHolder char(100) not null

    constraint DEF_Orders_Placeholder

    default ''Placeholder'',

    constraint PK_Orders

    primary key clustered(OrderId)

    )

    go

    declare

    @MaxOrderId int = 65536

    ,@MaxCustomers int = 1000

    ,@MaxAddresses int = 20

    ,@MaxDrivers int = 125

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as T1 cross join N1 as T2) -- 4 rows

    ,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) -- 16 rows

    ,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256 rows

    ,N5(C) as (select 0 from N4 as T1 cross join N4 as T2) -- 65,536 rows

    ,IDs(ID) as (select row_number() over (order by (select null)) from N5)

    ,Info(OrderId, CustomerId, OrderDateOffset, RatePlanId, ServiceId, Pieces)

    as

    (

    select

    ID, ID % @MaxCustomers + 1, ID % (365*24*60)

    ,ID % 2 + 1, ID % 3 + 1, ID % 5 + 1

    from IDs

    where ID  5 * 24 * 60

    then 4

    else OrderId % 4 + 1

    end

    ,(OrderId % 5 + 1) * 10.

    from Info

    )

    insert into Delivery.Orders(OrderDate, OrderNum, CustomerId,

    PickupAddressId, DeliveryAddressId, ServiceId, RatePlanId,

    OrderStatusId, DriverId, Pieces, Amount)

    select

    o.OrderDate

    ,o.OrderNum

    ,o.CustomerId

    ,o.PickupAddressId

    ,case

    when o.PickupAddressId % @MaxAddresses = 0

    then o.PickupAddressId + 1

    else o.PickupAddressId - 1

    end

    ,o.ServiceId

    ,o.RatePlanId

    ,o.OrderStatusId

    ,case

    when o.OrderStatusId in (1,4)

    then NULL

    else OrderId % @MaxDrivers + 1

    end

    ,o.Pieces

    ,o.Rate

    from Info2 o;

    ```


    ### 排他锁


    排他锁由 `写入者`（即修改数据的 `INSERT`、`UPDATE`、`DELETE` 和 `MERGE` 语句）获取。这些查询会对受影响的行获取排他锁，并持有该锁直到事务结束。


    顾名思义——`排他` 意味着 `互斥`——在任何给定时间点，只有一个会话可以持有资源上的排他锁。这种行为强制了系统中最重要的并发规则：多个会话不能同时修改相同的数据。也就是说，在第一个事务完成并释放被修改行上的排他锁之前，其他会话无法获取该行上的排他锁。


    事务隔离级别不影响排他锁的行为。即使在 `READ UNCOMMITTED` 模式下，排他锁也会被获取并持有直到事务结束。事务持续时间越长，排他锁持有时间也越长，这将增加发生阻塞的可能性。


    ### 意向锁


    尽管行级锁减少了系统中的阻塞，但仅在行级别保持锁从性能角度来看是不利的。考虑这样一种情况：一个会话需要独占访问一个表，例如在表结构变更期间。如果只存在行级锁，那么该会话就必须扫描整个表，检查是否存在任何行级锁。可以想象，这将是一个极其低效的过程，尤其是在大表上。


    SQL Server 通过引入意向锁的概念来解决这种情况。意向锁在数据页和表级别持有，用以指示其子对象上存在锁。


    让我们运行清单 3-1 中的代码，检查在更新表中一行后持有哪些锁。该代码使用了 `sys.dm_tran_locks` 动态管理视图，它返回有关系统中当前锁请求的信息。


    值得注意的是，我使用了 `READ UNCOMMITTED` 隔离级别来展示排他锁在任何事务隔离级别下都会被获取。


    ```sql

    set transaction isolation level read uncommitted

    begin tran

    update Delivery.Orders

    set Reference = ''New Reference''

    where OrderId = 100;

    select

    l.resource_type

    ,case

    when l.resource_type = ''OBJECT''

    then

    object_name

    (

    l.resource_associated_entity_id,

    l.resource_database_id

    )

    else ''''

    end as [table]

    ,l.resource_description

    ,l.request_type

    ,l.request_mode

    ,l.request_status

    from

    sys.dm_tran_locks l

    where

    l.request_session_id = @@spid;

    commit

    -- 清单 3-1

    -- 更新一行并检查持有的锁

    ```


    图 3-1 展示了 `SELECT` 语句的输出。可以看到，SQL Server 在行（键）上持有排他锁，并在页和对象（表）上持有意向排他锁。`这些意向排他锁指示了存在行级别的排他锁。`
    此外，数据库上还有一个共享锁，表明该会话正在访问它。我们将在本章后面介绍共享锁。


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig1_HTML.jpg](img/463519_1_En_3_Fig1_HTML.jpg)


    **图 3-1**

    UPDATE 语句后持有的锁


    `resource_description` 列指示了获取这些锁的资源。对于页，它指示了其物理位置（数据库文件 1 中的页 944），对于行（键），它指示了索引键的哈希值。对于对象锁，你可以从视图中的
    `resource_associated_entry_id` 列获取 `object_id`。


    当会话需要获取对象或页级别的锁时，它可以检查与表或页上持有的其他锁（意向或完全）的锁兼容性，而不是扫描表/页并检查那里的行级锁。


    最后，值得注意的是，在某些情况下，SQL Server 可能在其他中间对象上获取意向锁，例如表分区或列存储索引中的行组。'
- fmt: '## Update (U) locks


    SQL Server uses another lock type, update (U) locks, during data modifications,
    acquiring them while searching for the rows that need to be updated. After an
    update (U) lock is acquired, SQL Server reads the row and evaluates if the row
    needs to be updated by checking the row data against query predicates. If this
    is the case, SQL Server converts the update (U) lock to an exclusive (X) lock
    and performs the data modification. Otherwise, the update (U) lock is released.


    Let’s look at an example and run the code from Listing 3-2.


    ```

    begin tran

    update Delivery.Orders

    set Reference = ''New Reference''

    where OrderId in (1000, 5000);

    commit

    Listing 3-2

    Updating multiple rows using clustered index key as the predicate

    ```


    Figure 3-2 provides the output from the Extended Events session that captures
    `lock_acquired` and `lock_released` events. SQL Server acquired intent update
    (IU) locks on the pages and update (U) locks on the rows converting them to intent
    exclusive (IX) and exclusive (X) locks afterwards. The locks were held until the
    end of the transactions and were released at the time of `COMMIT`.


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig2_HTML.jpg](images/463519_1_En_3_Chapter/463519_1_En_3_Fig2_HTML.jpg)

    *Figure 3-2: Update (U) and exclusive (X) locks*


    Update (U) locks’ behavior depends on the execution plan. In some cases, SQL Server
    acquires update (U) locks on all rows first, converting them to exclusive (X)
    locks afterward. In other cases—when, for example, you update only one row based
    on the clustered index key value—SQL Server can acquire an exclusive (X) lock
    without using an update (U) lock at all.


    The number of locks to acquire also greatly depends on the execution plan. Let’s
    run the `UPDATE Delivery.Orders SET Reference = ''Ref'' WHERE OrderNum="1000"`
    statement, filtering data based on the `OrderNum` column. Figure 3-3 illustrates
    the locks that were acquired and released along with the total number of locks
    processed.


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig3_HTML.jpg](images/463519_1_En_3_Chapter/463519_1_En_3_Fig3_HTML.jpg)

    *Figure 3-3: Locks during query execution*


    There are no indexes on the `OrderNum` column, so SQL Server needs to perform
    a *clustered index scan*, acquiring an update (U) lock on every row in the table.
    More than one million locks have been acquired even though the statement updated
    just a single row.


    That behavior illustrates one of the typical blocking scenarios. Consider a situation
    where one of the sessions holds an exclusive (X) lock on a single row. If another
    session were to update a different row by running a non-optimized `UPDATE` statement,
    SQL Server would acquire an update (U) lock on every row it was scanning, and
    eventually it would be blocked trying to read the row with the exclusive (X) lock
    held on it. It does not matter that the second session does not need to update
    that row after all—SQL Server still needs to acquire an update (U) lock to evaluate
    if that row needs to be updated.


    ## Shared (S) locks


    Shared (S) locks are acquired by the readers—`SELECT` queries—in the system. As
    you can guess by the name, shared (S) locks are compatible with each other, and
    multiple sessions can hold shared (S) locks on the same resource.


    Let’s run the code from Table 3-1 to illustrate that.


    *Table 3-1: Shared (S) Locks*


    | Session 1 (SPID=53) | Session 2 (SPID=55) |

    | --- | --- |

    | `set transaction isolation level repeatable read`<br>`begin tran`<br>`select
    OrderNum`<br>`from Delivery.Orders`<br>`where OrderId = 500;` | `set transaction
    isolation level repeatable read`<br>`begin tran`<br>`select OrderNum`<br>`from
    Delivery.Orders`<br>`where OrderId = 500;` |

    | `select`<br>`request_session_id`<br>`,resource_type`<br>`,resource_description`<br>`,request_type`<br>`,request_mode`<br>`,request_status`<br>`from
    sys.dm_tran_locks;` |  |

    | `commit;` | `commit` |


    Figure 3-4 illustrates the output from the `sys.dm_tran_locks` view. As you can
    see, both sessions acquired shared (S) locks on the database, intent shared (IS)
    locks on the table and page (1:955), and shared (S) locks on the row, all without
    blocking each other.


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig4_HTML.jpg](images/463519_1_En_3_Chapter/463519_1_En_3_Fig4_HTML.jpg)

    *Figure 3-4: Locks acquired by the sessions*


    ## Lock Compatibility, Behavior, and Lifetime


    Table 3-2 shows the lock compatibility matrix that shows compatibility between
    lock types.


    *Table 3-2: Lock Compatibility Matrix (I*, S, U, X Locks)*


    | | (IS) | (S) | (IU) | (U) | (IX) | (X) |

    | --- | --- | --- | --- | --- | --- | --- |

    | (IS) | Yes | Yes | Yes | Yes | Yes | No |

    | (S) | Yes | Yes | Yes | Yes | No | No |

    | (IU) | Yes | Yes | Yes | No | Yes | No |

    | (U) | Yes | Yes | No | No | No | No |

    | (IX) | Yes | No | Yes | No | Yes | No |

    | (X) | No | No | No | No | No | No |


    The most important lock compatibility rules are:


    1.  Intent (IS/IU/IX) locks are compatible with each other. Intent locks indicate
    the existence of locks on the child objects, and multiple sessions can hold intent
    locks on the object and page levels simultaneously.


    2.  Exclusive (X) locks are incompatible with each other and any other lock types.
    Multiple sessions cannot update the same row simultaneously. Moreover, readers
    that acquire shared (S) locks cannot read uncommitted rows with exclusive (X)
    locks held.


    3.  Update (U) locks are incompatible with each other as well as with exclusive
    (X) locks. Writers cannot evaluate if the row needs to be updated simultaneously
    nor access a row that has an exclusive (X) lock held.


    4.  Update (U) locks are compatible with shared (S) locks. Writers can evaluate
    if the row needs to be updated without blocking or being blocked by the readers.
    It is worth noting that (S)/(U) lock compatibility is the main reason why SQL
    Server uses update (U) locks internally. They reduce the blocking between readers
    and writers.


    As you already know, exclusive (X) lock behavior does not depend on transaction
    isolation level. Writers always acquire exclusive (X) locks and hold them until
    the end of the transaction. With the exception of the `SNAPSHOT` isolation level,
    the same is true for update (U) locks—writers acquire them on every row they scan
    while evaluating if the rows need to be updated.


    The shared (S) locks’ behavior, on the other hand, depends on transaction isolation
    level.'
