    现在，让我们运行清单 6-10 中的代码，从表中删除 50%的行。注意，我们在下一次测试之前回滚了事务以重置环境。


    ```

    begin tran

    delete from Delivery.Orders where OrderId % 2 = 0;

    -- update Delivery.Orders set Pieces += 1;

    select

    alloc_unit_type_desc as [alloc_unit]

    ,index_level

    ,page_count

    ,convert(decimal(4,2),avg_page_space_used_in_percent)

    as [space_used]

    ,convert(decimal(4,2),avg_fragmentation_in_percent)

    as [frag %]

    ,min_record_size_in_bytes as [min_size]

    ,max_record_size_in_bytes as [max_size]

    ,avg_record_size_in_bytes as [avg_size]

    from

    sys.dm_db_index_physical_stats(db_id()

    ,object_id(N''Delivery.Orders''),1,null,''DETAILED'');

    rollback

    清单 6-10

    乐观隔离级与碎片：删除 50%的行

    ```


    图 6-13 显示了此代码的输出。如您所见，此操作不会增加索引中的页面数量。如果您更新任何定长列的值，也会发生同样的情况。此更新不会改变行的大小，因此不会触发任何页面拆分。


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig13_HTML.jpg](img/463519_1_En_6_Fig13_HTML.jpg)


    图 6-13


    DELETE 语句后的索引统计信息


    现在，我们启用`READ COMMITTED SNAPSHOT`隔离级并重复我们的测试。清单 6-11 显示了执行此操作的代码。


    ```

    alter database SQLServerInternals

    set read_committed_snapshot on

    with rollback immediate;

    go

    set transaction isolation level read uncommitted

    begin tran

    delete from Delivery.Orders where OrderId % 2 = 0;

    -- update Delivery.Orders set Pieces += 1;

    rollback

    清单 6-11

    乐观隔离级与碎片：在启用 RCSI 的情况下重复测试

    ```


    图 6-14 显示了操作后的索引统计信息。注意，我们使用了`READ UNCOMMITTED`隔离级并回滚了事务。尽管如此，行版本控制仍在使用，这会导致数据删除期间出现页面拆分。


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig14_HTML.jpg](img/463519_1_En_6_Fig14_HTML.jpg)


    图 6-14


    启用 RCSI 后 DELETE 语句的索引统计信息


    添加后，14 字节的版本存储指针会保留在行中，即使在记录从版本存储中移除后也是如此。您可以通过执行索引重建来回收此空间。


    您需要记住此行为，并将其纳入索引维护策略。如果启用了乐观隔离级，最好不要使用`FILLFACTOR = 100`。这同样适用于定义在具有`AFTER UPDATE`和`AFTER
    DELETE`触发器的表上的索引。这些触发器依赖于行版本控制，并且在内部也会使用版本存储。


    ## 总结


    SQL Server 在使用乐观隔离级时采用行版本控制模型。查询访问行的“旧”已提交版本，而不是被共享(S)、更新(U)和排他(X)锁的不兼容性所阻塞。有两种可用的乐观事务隔离级：`READ
    COMMITTED SNAPSHOT`和`SNAPSHOT`。


    `READ COMMITTED SNAPSHOT`是一个数据库选项，它会改变`READ COMMITTED`模式下读取者的行为。它不会改变写入者的行为——由于(U)/(U)和(U)/(X)锁的不兼容性，仍然存在阻塞。`READ
    COMMITTED SNAPSHOT`不需要任何代码更改，并且可以在系统遇到阻塞问题时用作紧急技术。


    `READ COMMITTED SNAPSHOT`提供语句级一致性；也就是说，查询读取的是语句开始时数据的快照。


    `SNAPSHOT`隔离级是一个独立的事务隔离级，需要在代码中显式指定。此级别提供事务级一致性；也就是说，查询访问的是事务开始时数据的快照。


    使用`SNAPSHOT`隔离级时，写入者不会相互阻塞，除非两个会话正在更新相同的行。这种情况要么导致阻塞，要么导致 3960 错误。


    虽然乐观隔离级减少了阻塞，但它们会显著增加`tempdb`负载，尤其是在数据不断变化的 OLTP 系统中。它们还通过向数据行添加 14 字节指针来加剧索引碎片。您应在实施阶段考虑使用它们的权衡，执行`tempdb`优化，并监控系统以确保版本存储不被滥用。


    ## 7. 锁升级


    尽管从并发性角度来看行级锁很棒，但它开销很大。在内存中，锁结构在 32 位操作系统中使用 64 字节，在 64 位操作系统中使用 128 字节。保存数百万个行级和页级锁的信息将使用千兆字节的内存。


    SQL Server 使用一种称为`锁升级`的技术来减少内存中持有的锁数量，我们将在本章中讨论该技术。

    '
- fmt: '## Lock Escalation Overview


    SQL Server tries to reduce memory consumption and the overhead of lock management
    by using the simple technique called lock escalation. Once a statement acquires
    at least 5,000 row- and page-level locks on the same object, SQL Server tries
    to escalate—or perhaps better said, replace—those locks with a single table- or,
    if enabled, partition-level lock. The operation succeeds if no other sessions
    hold incompatible locks on the object or partition.


    When an operation succeeds, SQL Server releases all row- and page-level locks
    held by the transaction on the object (or partition), keeping the object- (or
    partition-) level lock only. If an operation fails, SQL Server continues to use
    row-level locking and repeats escalation attempts after about every 1,250 new
    locks acquired. In addition to reacting to the number of locks taken, SQL Server
    can escalate locks when the total number of locks in the instance exceeds memory
    or configuration thresholds.


    ### Note


    The number of locks thresholds of 5,000/1,250 is an approximation. The actual
    number of acquired locks that triggers lock escalation may vary and is usually
    slightly bigger than that threshold.


    Let’s look at the example and run a `SELECT` statement that counts the number
    of rows in the `Delivery.Orders` table in a transaction with a `REPEATABLE READ`
    isolation level. As you will remember, in this isolation level, SQL Server keeps
    shared (S) locks until the end of the transaction.


    Let’s disable lock escalation for this table with the `ALTER TABLE SET (LOCK_ESCALATION=DISABLE)`
    command (more about this later) and look at the number of locks SQL Server acquires,
    as well as at the memory required to store them. We will use a `(ROWLOCK)` hint
    to prevent the situation in which SQL Server `optimizes` the locking by acquiring
    page-level shared (S) locks instead of row-level locks. In addition, while the
    transaction is still active, let’s insert another row from a different session
    to demonstrate how lock escalation affects concurrency in the system.


    ### Table 7-1


    Test Code with Lock Escalation Disabled


    | Session 1 | Session 2 |

    | --- | --- |

    | `alter table Delivery.Orders``set (lock_escalation=disable);``set transaction
    isolation level repeatable read``begin tran`       `select count(*)`       `from
    Delivery.Orders`           `with (rowlock);` |   |

    |   | `-- Success``insert into Delivery.Orders``(OrderDate,OrderNum,CustomerId)``values(getUTCDate(),''99999'',100);`
    |

    |        `-- Result: 10,212,326`       `select count(*) as [Lock Count]`       `from
    sys.dm_tran_locks;`       `-- Result: 1,940,272 KB`       `select sum(pages_kb)
    as [Memory, KB]`       `from sys.dm_os_memory_clerks`       `where type =`           `''OBJECTSTORE_LOCK_MANAGER'';``commit`
    |   |


    Figure 7-1 shows the *Lock Memory (KB)* system performance counter while the transaction
    is active.


    ![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig1_HTML.jpg](images/463519_1_En_7_Chapter/463519_1_En_7_Fig1_HTML.jpg)


    As you can see, from a concurrency standpoint, the row-level locking is perfect.
    Sessions do not block each other as long as they do not compete for the same rows.
    At the same time, keeping the large number of locks is memory intensive, and memory
    is one of the most precious resources in SQL Server. In our example, SQL Server
    needs to keep millions of lock structures, utilizing almost two gigabytes of RAM.
    This number includes the row-level shared (S) locks, as well as the page-level
    intent shared (IS) locks. Moreover, there is the overhead of maintaining the locking
    information and the large number of lock structures in the system.


    Let’s see what happens if we enable default lock escalation behavior with the
    `ALTER TABLE SET (LOCK_ESCALATION=TABLE)` command and run the code shown in Table
    7-2.


    ### Table 7-2


    Test Code with Lock Escalation Enabled


    | Session 1 (SPID=57) | Session 2 (SPID=58) |

    | --- | --- |

    | `alter table Delivery.Orders``set (lock_escalation=table);``set transaction
    isolation level repeatable read``begin tran`       `select count(*)`       `from
    Delivery.Orders`           `with (rowlock);` |   |

    |   | `-- The session is blocked``insert into Delivery.Orders``(OrderDate,OrderNum,CustomerId)``values(getUTCDate(),''100000'',100);`
    |

    |        `select`           `request_session_id as [SPID]`           `,resource_type
    as [Resource]`           `,request_mode as [Lock Mode]`           `,request_status
    as [Status]`       `from sys.dm_tran_locks;``commit` |   |


    Figure 7-2 shows the output from the `sys.dm_tran_locks` view.


    ![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig2_HTML.jpg](images/463519_1_En_7_Chapter/463519_1_En_7_Fig2_HTML.jpg)'
