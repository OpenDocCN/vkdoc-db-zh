    ### 元组移动器与 `ALTER INDEX REORGANIZE` 的锁定行为


    最后，我们来看一下**元组移动器**进程和 `ALTER INDEX REORGANIZE` 操作的锁定行为。两者都将关闭的增量存储区压缩到压缩行组中，本质上做的是相同的事情；但是，它们的实现方式略有不同。元组移动器是一个在后台运行的单线程进程，以节省系统资源。而索引重组则使用多线程并行运行。


    在压缩过程中，SQL Server 会对增量存储区获取并保持一个共享 (`S`) 锁。这些锁既不会阻止你从表中选择数据，也不会阻塞插入操作。新数据将被插入到其他打开的增量存储区中；但是，在整个操作期间，对被锁定的增量存储区的删除和数据修改操作将被阻塞。


    图 14-12 展示了在执行 `ALTER INDEX REORGANIZE` 命令期间，在增量存储区上捕获的 `lock_acquired` 和 `lock_released`
    扩展事件。你可以看到在此操作期间获取的共享 (`S`) 锁。


    ![../images/463519_1_En_14_Chapter/463519_1_En_14_Fig12_HTML.jpg](img/463519_1_En_14_Fig12_HTML.jpg)


    图 14-12

    ALTER INDEX REORGANIZE 命令期间的锁定


    `associated_object_id` 列表示增量存储区的 `hobt_id`，我们可以通过分析 `sys.column_store_row_groups`
    视图来确认。图 14-13 显示了 `ALTER INDEX REORGANIZE` 完成后行组的状态。处于 `TOMBSTONE` 状态的行组表示刚刚被压缩并等待释放的增量存储区。正如你所见，这些文件组的
    `delta_store_hobt_id` 值与获取了共享 (`S`) 锁的资源相匹配。


    ![../images/463519_1_En_14_Chapter/463519_1_En_14_Fig13_HTML.jpg](img/463519_1_En_14_Fig13_HTML.jpg)


    图 14-13

    ALTER INDEX REORGANIZE 命令后的行组


    正如你可能猜到的，这种行为在 OLTP 系统中面对更新和删除工作负载时，扩展性并不好。


    ### 总结


    虽然在 OLTP 环境中使用**聚集列存储索引**来存储数据很有吸引力，但这很少是最佳选择。这些索引中的可更新性设计是为了简化 ETL 过程并执行不频繁的数据修改。虽然聚集列存储索引可能处理仅追加的工作负载，但在具有大量并发事务修改表中数据的通用
    OLTP 工作负载中，它们的扩展性并不好。


    你仍然可以从 OLTP 系统中的聚集列存储索引中受益。许多系统需要长时间保留数据，随着数据变得陈旧，其数据和工作负载的易变性也会发生变化。你可以将数据分区到多个表中，将列存储索引、B-树索引、内存中
    OLTP 表与分区视图结合起来。这将使你能够充分发挥每种技术的优势，从而提高系统性能并减少数据库中的数据大小。


    ### 注意


    我在我的《`Pro SQL Server Internals`》一书中详细讨论了这种架构，包括表之间数据移动的方法。


    ### 小结


    列存储索引以基于列而非基于行的格式存储数据。这种方法可以显著提高系统中数据仓库、操作型分析和报表工作负载的性能。


    列存储索引中的数据被高度压缩。与 B-树表相比，聚集列存储索引可以显著减少存储空间。然而，从锁定的角度来看，在多个并发会话并行修改数据的 OLTP 工作负载下，它们的扩展性并不好。你不应在这样的环境中将它们用作
    OLTP 表的替代品。


    最后，再次感谢你阅读本书！为你写作是我的荣幸！


