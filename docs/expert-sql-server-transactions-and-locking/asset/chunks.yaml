    ## Blocking Chains


    One of the common challenges experienced during the troubleshooting of concurrency
    issues is that of *blocking chains*, which represent a case of multi-level blocking.
    As you remember, a lock request can be granted only when it is compatible with
    all other requests on the resource, regardless of whether they are in a granted
    or pending state.


    Figure [12-7](#463519_1_En_12_Chapter.xhtml#Fig7) illustrates this situation .
    Session 1 holds an intent exclusive (IX) lock on the table, which is incompatible
    with the schema modification (Sch-M) lock requested by session 2\. The schema
    modification (Sch-M) lock is incompatible with all lock types and thus blocks
    all other sessions trying to access the table, even when their lock requests are
    compatible with the intent exclusive (IX) lock held by session 1.


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig7_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig7_HTML.jpg)


    Figure 12-7


    Blocking chain


    When this condition occurs, session 2 may become the *blocking session* for a
    large number of other sessions in the system. It will be exposed as the *blocker*
    in data management views and in the blocked process report. Session 1, on the
    other hand, would become the blocking session only for session 2, which may be
    misleading during troubleshooting.


    Let’s illustrate this with a slightly more complicated example in code. Listing
    [12-6](#463519_1_En_12_Chapter.xhtml#PC6) updates one row from the `Delivery.Customers`
    table in the session with `SPID=53` .


    ```

    begin tran

    update Delivery.Customers

    set Phone = ''111-111-1234''

    where CustomerId = 1;

    Listing 12-6

    Blocking chain: Step 1 (SPID=53)

    ```


    As the next step, let’s run the code from Listing [12-7](#463519_1_En_12_Chapter.xhtml#PC7)
    in the session with `SPID=56` . The first statement acquires an intent exclusive
    (IX) lock on the `Delivery.Orders` table. The second statement scans the `Delivery.Customers`
    table and is blocked due to an incompatible exclusive (X) lock from the first
    session with `SPID=53`.


    ```

    begin tran

    update Delivery.Orders

    set Pieces += 1

    where OrderId = 1;

    select count(*)

    from Delivery.Customers with (readcommitted);

    Listing 12-7

    Blocking chain: Step 2 (SPID=56)

    ```


    Next, we will run the code from Listing [12-8](#463519_1_En_12_Chapter.xhtml#PC8)
    in the session with `SPID=57` . This code is trying to acquire a shared (S) lock
    on the `Delivery.Orders` table and will be blocked by the incompatible intent
    exclusive (IX) lock held by the session with `SPID=56`.


    ```

    select count(*)

    from Delivery.Orders with (tablock);

    Listing 12-8

    Blocking chain: Step 3 (SPID=57)

    ```


    Finally, let’s run the code from Listing [12-9](#463519_1_En_12_Chapter.xhtml#PC9)
    in several sessions with `SPID=60` and above (you may use a different `OrderId`
    in each session). Those sessions will need to acquire intent exclusive (IX) locks
    on the `Delivery.Orders` table and will be blocked due to the incompatible shared
    (S) lock request held by the session with `SPID=57`.


    ```

    update Delivery.Orders

    set Pieces += 1

    where OrderId = 5000;

    Listing 12-9

    Blocking chain: Step 4 (SPID>=60)

    ```


    Figure [12-8](#463519_1_En_12_Chapter.xhtml#Fig8) demonstrates the partial output
    of the `sys.dm_os_waiting_tasks` and `sys.dm_exec_requests` DMVs . It may appear
    that the session with `SPID=57` is the source of the blocking. This is incorrect,
    however, and you need to unwind the blocking chain up to the session with `SPID=53`
    during troubleshooting.


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig8_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig8_HTML.jpg)


    Figure 12-8


    Output of sys.dm_os_waiting_tasks and sys.dm_exec_requests views


    It is also worth noting that the root blocker with `SPID=53` is not present in
    the output. The `sys.dm_os_waiting_tasks` and `sys.dm_exec_requests` views show
    currently suspended and executed requests, respectively. In our case, the session
    with `SPID=53` is in the *sleeping* state, and therefore neither of the views
    includes it.


    Figure [12-9](#463519_1_En_12_Chapter.xhtml#Fig9) shows the partial output of
    the blocked process reports for sessions with an `SPID` of 60, 57, or 56\. You
    can detect the blocking chain condition by the `suspended` status of the blocking
    process with a locking-related `waitresource`.


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig9_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig9_HTML.jpg)


    Figure 12-9


    Blocked process reports


    Even though blocking chains may add additional complexity, they do not change
    your troubleshooting approach. You need to unwind the blocking chain to identify
    the root cause of the blocking and address the issue.


    ## AlwaysOn Availability Groups and Blocking


    AlwaysOn Availability Groups have perhaps become the most common High Availability
    technology used with SQL Server. This technology provides database group–level
    protection and stores a separate copy of the databases on each server/node. This
    eliminates the single point of failure on the SQL Server level; however, there
    is still a dependency on Windows or Linux Failover Clustering internally.


    The implementation and maintenance of AlwaysOn Availability Groups are worth a
    separate book. There are, however, a couple of things that may affect blocking
    and concurrency in the system.'
