    ### 注意


    省略 `WAIT_AT_LOW_PRIORITY` 选项的效果与指定 `WAIT_AT_LOW_PRIORITY(MAX_DURATION=0 MINUTES,
    ABORT_AFTER_WAIT=NONE)` 相同。


    非常活跃的 OLTP 表总是有大量的并发会话访问它们。因此，即使指定了较长的 `MAX_DURATION`，会话仍有可能无法获得低优先级锁。你可以考虑使用
    `ABORT_AFTER_WAIT=BLOCKERS` 选项，这将允许操作完成，尤其是在客户端应用程序实现了适当的异常处理和重试逻辑的情况下。


    最后值得注意的是，在线索引重建仅在 SQL Server 的企业版和 Microsoft Azure SQL 数据库中受支持。在其他版本中，无法在索引重建期间使用低优先级锁。然而，从
    SQL Server 2016 SP1 开始，表分区在非企业版本中也得到支持，并且你可以在任何版本的 SQL Server 中在此场景下使用低优先级锁。


    ## 总结


    SQL Server 使用架构锁在查询编译和执行期间保护元数据不被更改。SQL Server 中有两种类型的架构锁：架构稳定性锁 (`Sch-S`) 和架构修改锁
    (`Sch-M`)。


    在查询编译和执行期间，会在查询引用的对象上获取架构稳定性 (`Sch-S`) 锁。但在某些情况下，SQL Server 可以用意向表锁替换架构稳定性 (`Sch-S`)
    锁，这也能保护表架构。架构稳定性 (`Sch-S`) 锁与任何其他锁类型兼容，除了架构修改 (`Sch-M`) 锁。


    架构修改 (`Sch-M`) 锁与任何其他锁类型都不兼容。SQL Server 在 DDL 操作期间使用它们。如果 DDL 操作需要扫描或修改数据（例如，向表添加受信任的外键约束或在非空分区上修改分区函数），则架构修改
    (`Sch-M`) 锁将在整个操作期间保持。在大型表上，这可能需要很长时间，并导致系统中出现严重的阻塞问题。在设计并行运行 DDL 和 DML 操作的系统时，你需要牢记这一点。


    为了被授予，一个锁需要与该资源上所有（无论是否已授予的）锁请求兼容。这可能导致在繁忙的系统中，当某个会话请求表上的架构修改 (`Sch-M`) 锁或完整的对象级锁时，出现严重的阻塞。在系统设计索引或分区维护策略时，你需要记住这种行为。


    SQL Server 2014 及以上版本支持低优先级锁，可用于减少在线索引重建和分区切换操作期间的阻塞。当操作正在等待获取低优先级锁时，这些锁不会阻塞请求不兼容锁类型的其他会话。


    # 9. 锁分区


    与其它现代数据库引擎一样，SQL Server 设计用于在具有大量 CPU 的服务器上运行。它具有许多优化措施，帮助引擎在此类环境中扩展并高效工作。


    本章将讨论其中一项优化：锁分区，当服务器具有 16 个或更多逻辑 CPU 时，该功能会自动启用。


    ## 锁分区概述


    众所周知，硬件成本随着时间的推移不断下降，使我们能够构建更强大的服务器。二十年前，数据库服务器通常只有一个或极少数 CPU。如今，使用具有几十个甚至有时数百个核心的服务器已经非常普遍。


    大多数多 CPU 服务器使用*非统一内存访问 (NUMA)* 架构构建。在此架构中，物理 CPU 被分区为称为 *NUMA 节点* 的组。内存也在各节点间进行分区，每个节点使用独立的系统总线来访问其内存。每个处理器都可以访问系统中的所有内存；但是，访问属于
    CPU 的 NUMA 节点的*本地内存* 比访问来自不同 NUMA 节点的*外部内存* 更快。


    ### 注意


    你可以在 [`https://technet.microsoft.com/en-us/library/ms178144.aspx`](https://technet.microsoft.com/en-us/library/ms178144.aspx)
    阅读更多关于 NUMA 架构的信息。


    SQL Server 原生支持 NUMA 架构，并拥有一些内部优化来利用它。例如，SQL Server 总是尝试为线程分配本地内存，并且它还具有基于每个 NUMA
    节点的分布式 I/O 线程。


    此外，各种缓存和队列在 NUMA 节点级别——有时是调度器级别——进行分区，这减少了多个调度器（逻辑 CPU）访问它们时可能出现的争用。这包括系统中的锁队列。当系统有
    16 个或更多逻辑处理器时，SQL Server 开始使用一种称为*锁分区*的技术。


    启用锁分区后，SQL Server 开始基于每个调度器存储锁信息。在此模式下，对象级的意向共享锁 (`IS`)、意向排他锁 (`IX`) 和架构稳定性锁 (`Sch-S`)
    在执行批处理的 CPU（调度器）上的单个分区中获取和存储。所有其他锁类型需要在所有分区上获取。


    从锁兼容性的角度来看，这没有任何改变。例如，当会话需要获取表的排他 (`X`) 锁时，它会遍历所有锁分区，如果任何分区在表上持有不兼容的意向锁，则会被阻塞。然而，这可能导致一种有趣的情况：一个对象级锁在部分分区上被授予，但在另一个持有不兼容意向
    (`I*`) 或架构稳定性 (`Sch-S`) 锁的分区上被阻塞。


    让我们看一个演示这种情况的例子。正如我已经提到的，锁分区在具有 16 个或更多逻辑 CPU 的服务器上自动启用。你可以使用未公开的启动参数 `-P` 来更改测试系统中的调度器数量。*切勿在生产环境中使用此参数！*


    清单 9-1 展示了一个查询，该查询启动一个事务，并在 `REPEATABLE READ` 隔离级别下从表中选择一行，该隔离级别会持有共享 (`S`) 锁直到事务结束。接下来，它使用
    `sys.dm_tran_locks` 视图获取会话持有的锁的信息。我在测试环境中使用 `-P16` 启动参数运行此代码，这将创建 16 个调度器并启用锁分区。


    ```

    begin tran

    select *

    from Delivery.Orders with (repeatableread)

    where OrderId = 100;

    select

    request_session_id

    ,resource_type

    ,resource_lock_partition

    ,request_mode

    ,request_status

    from sys.dm_tran_locks

    where request_session_id = @@SPID;

    ```

    **清单 9-1** 锁分区：更新表中的一行


    图 9-1 展示了 `SELECT` 语句的输出。`resource_lock_partition` 列指示锁存储在哪个分区（`NULL` 表示锁未分区，并在所有分区上获取）。如你所见，表级的意向共享
    (`IS`) 锁已分区并存储在分区四中。页级和行级锁未分区，存储在所有分区中。


    ![../images/463519_1_En_9_Chapter/463519_1_En_9_Fig1_HTML.jpg](img/463519_1_En_9_Fig1_HTML.jpg)


    **图 9-1** 更新后的锁请求


    现在，让我们在另一个会话中运行代码，该会话希望使用 `ALTER INDEX PK_Orders on Delivery.Orders REBUILD` 命令对同一表执行索引重建。此操作需要在表上获取架构修改
    (`Sch-M`) 锁。这种锁类型是非分区的，需要在系统中的所有分区上获取。


    '
- fmt: '## 锁分区的潜在问题


    锁分区可能导致在繁忙系统中，当会话试图获取架构修改（Sch-M）锁或全表锁时，出现长时间的阻塞。SQL Server 会以顺序方式遍历所有分区，在授予当前请求之前不会移动到下一个分区。在此期间，所有在请求已被授予的调度器上运行的其他会话都将被阻塞。


    这种情况最常见的例子是在其他用户访问系统时在线进行架构更改。类似地，在在线索引重建和与表分区相关的操作（例如分区函数更改和分区切换）期间也可能出现此问题。幸运的是，低优先级锁可以优雅地处理锁分区，它们不会在低优先级队列中等待时引入阻塞。


    最后，锁分区会增加锁管理器的内存消耗。非分区锁保存在每个分区中，这对于具有大量调度器的系统来说可能非常耗费内存。并非所有行级和页级锁都会被分区；因此，在不会给系统带来明显阻塞的情况下，保持锁升级开启是有益的。


    ## 由于锁分区导致的死锁


    当 SQL Server 从客户端接收到一个批处理时，它会将该批处理分配给一个或（在并行执行计划的情况下）多个调度器。除了极少数例外，在批处理完成之前，它不会更改调度器。然而，来自同一会话的后续批处理可能会被分配到不同的调度器。尽管
    SQL Server 倾向于为所有会话请求重用同一个调度器，但这并不能保证，尤其是在繁忙的系统中。


    ### 注意


    你可以通过运行 `SELECT scheduler_id FROM sys.dm_exec_requests WHERE session_id = @@SPID`
    语句来分析会话调度器分配情况。


    这种行为可能导致繁忙系统中难以解释的死锁。假设你有一个会话启动了一个事务并更新了表中的一行。我们假设该批处理正在调度器/逻辑 CPU 2 上运行。此会话获取了一个意向排他（IX）表锁，该锁是分区的并仅存储在调度器
    2 上。它还获取了一个行级排他（X）锁，该锁不是分区的，存储在所有分区中。（为了简单起见，我再次省略了页级意向锁。）


    假设你有第二个会话试图更改该表并获取架构修改（Sch-M）锁。此锁类型是非分区的，因此该会话需要在每个调度器上获取它。它成功地获取并持有了调度器 0 和 1
    上的锁，但由于架构修改（Sch-M）锁与在那里持有的意向排他（IX）锁不兼容，它在调度器 2 上被阻塞。图 [9-4](#463519_1_En_9_Chapter.xhtml#Fig4)
    说明了这种情况。


    ![../images/463519_1_En_9_Chapter/463519_1_En_9_Fig4_HTML.jpg](images/463519_1_En_9_Chapter/463519_1_En_9_Fig4_HTML.jpg)

    **图 9-4**

    由于锁分区导致的死锁：步骤 1


    现在假设会话 1 需要更新同一表中的另一行，并且该批处理已被分配到另一个调度器——0 或 1。该会话需要在新的锁分区中获取另一个意向表锁，但它将被那里的架构修改（Sch-M）锁阻塞，这将导致死锁，如图
    [9-5](#463519_1_En_9_Chapter.xhtml#Fig5) 所示。


    ![../images/463519_1_En_9_Chapter/463519_1_En_9_Fig5_HTML.jpg](images/463519_1_En_9_Chapter/463519_1_En_9_Fig5_HTML.jpg)

    **图 9-5**

    由于锁分区导致的死锁：步骤 2


    正如你可以猜到的，这个死锁的发生是因为同一事务的第二个批处理运行在与第一个批处理不同的调度器上。发生这种情况的一个例子是客户端应用程序在多个单独的批处理中逐行执行数据修改。你可以通过将所有更新批处理在一起（例如，使用表值参数）来减少可能的死锁机会。这也有助于提高操作的性能。


    幸运的是，在许多情况下，SQL Server 能够从不同的锁分区中*重用*意向锁并避免这种死锁。然而，这种行为没有文档记录或保证。此外，如果第二个批处理需要获取全表锁，它将无法工作；在这种情况下会发生死锁。


    让我们看一个例子，并运行清单 [9-2](#463519_1_En_9_Chapter.xhtml#PC2) 中的代码。在我的案例中，该批处理在 `SPID=67`
    的会话中运行在调度器 13 上。


    ```

    begin tran

    select *

    from Delivery.Orders with (repeatableread)

    where OrderId = 100;

    ```

    *清单 9-2*

    锁分区死锁：步骤 1


    作为下一步，让我们在 `SPID=68` 的会话中运行 `ALTER INDEX PK_Orders ON Delivery.Orders REBUILD`
    语句。此会话成功获取了分区 0-12 上的架构修改（Sch-M）锁，并在分区 13 上被阻塞。图 [9-6](#463519_1_En_9_Chapter.xhtml#Fig6)
    说明了此时锁请求的状态。


    ![../images/463519_1_En_9_Chapter/463519_1_En_9_Fig6_HTML.jpg](images/463519_1_En_9_Chapter/463519_1_En_9_Fig6_HTML.jpg)

    **图 9-6**

    之前步骤后的锁请求


    作为下一步，让我们在第一个会话中运行一个 `UPDATE` 语句，如清单 [9-3](#463519_1_En_9_Chapter.xhtml#PC3) 所示。此时，该批处理在我的系统上运行在调度器
    10 上。


    ```

    update Delivery.Orders

    set Pieces += 1

    where OrderId = 10;

    ```

    *清单 9-3*

    锁分区死锁：步骤 2'
  raw: 'Figure [9-2](#463519_1_En_9_Chapter.xhtml#Fig2) shows the lock requests from
    both sessions. As you can see, session 2 (`SPID=77`) was able to successfully
    acquire schema modification (Sch-M) locks on partitions 0-3 and was blocked by
    Session 1 (`SPID=89`), which holds an intent shared (IS) lock on partition 4.


    ![../images/463519_1_En_9_Chapter/463519_1_En_9_Fig2_HTML.jpg](images/463519_1_En_9_Chapter/463519_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Lock requests during ALTER INDEX operation


    Now, when other sessions try to access the table and acquire object-level locks,
    they either get blocked or succeed depending on which scheduler handles their
    requests.


    Figure [9-3](#463519_1_En_9_Chapter.xhtml#Fig3) illustrates this condition. As
    you can see, the request from the session with `SPID=53` executes on scheduler
    14 and is granted. However, the request from the session with `SPID=115` runs
    on scheduler 1 and is blocked due to an incompatible schema modification (Sch-M)
    lock from `SPID=77` held on this partition.


    ![../images/463519_1_En_9_Chapter/463519_1_En_9_Fig3_HTML.jpg](images/463519_1_En_9_Chapter/463519_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Lock requests from other sessions


    Lock partitioning may lead to prolonged blocking when a session is trying to acquire
    schema modification (Sch-M) or full-table locks in a busy system. SQL Server goes
    through all partitions in a sequential manner, waiting for the request to be granted
    before moving to the next partition. All other sessions that run on schedulers
    where requests were already granted would be blocked during this time.


    The most common case when this happens is a schema alteration done online at a
    time when other users are accessing the system. Similarly, you can have this problem
    during online index rebuilds and table partitioning-related actions, such as partition
    function alteration and partition switches. Fortunately, low-priority locks handle
    lock partitioning gracefully, and they would not introduce blocking while waiting
    in the low-priority queue.


    Finally, lock partitioning increases Lock Manager memory consumption. Non-partitioned
    locks are kept in each partition, which may be memory intensive in systems with
    a large number of schedulers. Not all row- and page-level locks are partitioned;
    thus, it is beneficial to keep lock escalation enabled when it does not introduce
    noticeable blocking in the system.


    ## Deadlocks Due to Lock Partitioning


    When SQL Server receives a batch from a client, it assigns the batch to one or—in
    the case of parallel execution plans—multiple schedulers. With very rare exceptions,
    the batch does not change the scheduler(s) until it is completed. However, subsequent
    batches from the same session may be assigned to different scheduler(s). Even
    though SQL Server tends to reuse the same scheduler for all session requests,
    it is not guaranteed, especially in busy systems.


    ### Note


    You can analyze session scheduler assignments by running the `SELECT scheduler_id
    FROM sys.dm_exec_requests WHERE session_id = @@SPID` statement.


    This behavior may lead to hard-to-explain deadlocks in busy systems. Let’s say
    you have a session that starts a transaction and updates a row in a table. Let’s
    assume that the batch is running on scheduler/logical CPU 2\. This session acquires
    an intent exclusive (IX) table lock, which is partitioned and stored on scheduler
    2 only. It also acquires a row-level exclusive (X) lock , which is not partitioned
    and is stored across all partitions. (I am omitting page-level intent locks again
    for simplicity’s sake.)


    Let’s assume that you have a second session that is trying to alter the table
    and acquire a schema modification (Sch-M) lock. This lock type is non-partitioned,
    so the session needs to acquire it on every scheduler . It successfully acquires
    and holds the locks on schedulers 0 and 1, and it is blocked on scheduler 2 due
    to the schema modification (Sch-M) lock’s incompatibility with the intent exclusive
    (IX) lock held there. Figure [9-4](#463519_1_En_9_Chapter.xhtml#Fig4) illustrates
    this condition.


    ![../images/463519_1_En_9_Chapter/463519_1_En_9_Fig4_HTML.jpg](images/463519_1_En_9_Chapter/463519_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    Deadlock due to lock partitioning: Step 1


    Let’s now say that session 1 needs to update another row in the same table, and
    the batch has been assigned to another scheduler—either 0 or 1\. The session will
    need to acquire another intent table lock in the new lock partition, but it would
    be blocked by the schema modification (Sch-M) lock there, which would lead to
    a deadlock, as shown in Figure [9-5](#463519_1_En_9_Chapter.xhtml#Fig5).


    ![../images/463519_1_En_9_Chapter/463519_1_En_9_Fig5_HTML.jpg](images/463519_1_En_9_Chapter/463519_1_En_9_Fig5_HTML.jpg)


    Figure 9-5


    Deadlock due to lock partitioning: Step 2


    As you can guess, this deadlock occurred because the second batch from the same
    transaction ran on a different scheduler than the first batch. One case when this
    may occur is a client application that performs data modifications on a row-by-row
    basis in multiple separate batches. You can reduce the chance of possible deadlocks
    by batching all updates together; for example, with table-valued parameters. This
    will also help to improve the performance of the operation.


    Fortunately, in many cases, SQL Server is able to *reuse* intent locks from different
    lock partitions and avoid such a deadlock. This behavior, however, is not documented
    or guaranteed. Moreover, it would not work if the second batch needed to acquire
    a full-table lock; a deadlock would occur in this case.


    Let’s look at the example and run the code from Listing [9-2](#463519_1_En_9_Chapter.xhtml#PC2).
    In my case, the batch is running on scheduler 13 in the session with `SPID=67`.


    ```

    begin tran

    select *

    from Delivery.Orders with (repeatableread)

    where OrderId = 100;

    Listing 9-2

    Lock partitioning deadlock: Step 1

    ```


    As the next step, let’s run the `ALTER INDEX PK_Orders ON Delivery.Orders REBUILD`
    statement in the session with `SPID=68`. This session successfully acquires schema
    modification (Sch-M) locks on partitions 0-12 and is blocked on partition 13\.
    Figure [9-6](#463519_1_En_9_Chapter.xhtml#Fig6) illustrates the status of lock
    requests at this point.


    ![../images/463519_1_En_9_Chapter/463519_1_En_9_Fig6_HTML.jpg](images/463519_1_En_9_Chapter/463519_1_En_9_Fig6_HTML.jpg)


    Figure 9-6


    Lock requests after the previous steps


    As the next step, let’s run an `UPDATE` statement in the first session as shown
    in Listing [9-3](#463519_1_En_9_Chapter.xhtml#PC3). At this time, the batch has
    been executed on scheduler 10 in my system .


    ```

    update Delivery.Orders

    set Pieces += 1

    where OrderId = 10;

    Listing 9-3

    Lock partitioning deadlock: Step 2

    ```'
