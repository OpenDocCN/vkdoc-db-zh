    ## 附加资源


    内存 OLTP 是一项引人入胜的技术，它能显著提升 OLTP 系统的性能和可扩展性。本章仅聚焦于该技术的一个方面——内存 OLTP 并发模型——甚至未能触及技术其他领域的皮毛。


    我已在 Apress 出版了另一本书《`Expert SQL Server In-Memory OLTP`》，该书对这项技术提供了深入的概述。如果您计划在系统中利用内存
    OLTP，可以考虑阅读它。第一版侧重于 SQL Server 2014 的实现。第二版则涵盖了 SQL Server 2016 和 2017 的技术增强功能。


    ## 总结


    内存 OLTP 支持三种事务隔离级别：`SNAPSHOT`、`REPEATABLE READ`和`SERIALIZABLE`。与基于磁盘的表（其中通过获取和保持锁来解决不可重复读和幻读）不同，内存
    OLTP 在事务提交阶段验证数据一致性规则。如果规则被违反，将引发异常并且回滚事务。


    可重复读验证和可序列化验证会给事务处理增加开销。除非需要`REPEATABLE READ`或`SERIALIZABLE`的数据一致性，否则建议在常规工作负载期间使用`SNAPSHOT`隔离级别。


    SQL Server 执行可重复读和可序列化验证以强制系统中的参照完整性。请始终在引用表的外键列上创建索引，以提高性能并避免验证错误。


    在跨容器事务中，您可以为基于磁盘的表和内存优化表使用不同的事务隔离级别；但是，并非所有组合都受支持。推荐的实践是对基于磁盘的表使用`READ COMMITTED`隔离级别，对内存优化表使用`SNAPSHOT`隔离级别。


    # 14. 列存储索引中的锁定


    列存储索引是一种按列而非按行存储数据的索引类型。这种存储格式有利于数据仓库、报表和分析环境中的查询处理，因为尽管这些查询通常读取大量行，但它们只处理表中列的子集。


    本章将概述基于列的存储，讨论列存储索引的锁定行为及其在 OLTP 系统中的使用。


    ### 基于列存储概述


    尽管每个数据库系统都是独特的，但存在两种通用工作负载——OLTP 和数据仓库。OLTP，即`在线事务处理`，描述了支持企业运营活动的系统。此类系统通常在短事务中处理大量并发请求，并处理易变数据。


    另一方面，数据仓库系统支持企业的报告和分析活动。这些系统中的数据相对静态，通常基于某种计划进行更新。查询很复杂，通常执行聚合操作并处理大量数据。


    例如，考虑一家向客户销售商品的公司。来自公司`销售点`（POS）系统的典型 OLTP 查询可能具有以下语义：*提供本月该特定客户下的订单列表*。或者，数据仓库系统中的典型查询可能表述如下：*提供截至当前日期的总销售额，按商品类别和客户地区对结果进行分组*。


    然而，OLTP 和数据仓库系统之间的界限相对模糊。几乎每个 OLTP 系统都有一些报表查询。在数据仓库系统中看到 OLTP 查询也并非罕见。最后，还有另一类任务称为`运营分析`，它们针对`热门的`OLTP
    数据运行分析查询。想象一个销售点系统，您希望监控最新的销售情况，并根据商品的受欢迎程度动态调整其销售价格。


    对具有混合工作负载的系统进行性能调优并非易事。OLTP 和数据仓库查询将受益于不同的数据库模式设计和索引策略，它们也可能受益于不同的存储技术。


    在经典的基于行的存储格式中，所有列的数据都存储在一个单一的`数据行`对象中。这种方法在处理易变数据时效果很好——所有列的数据被组合在一起，并且`INSERT`、`UPDATE`和`DELETE`操作可以作为单一操作完成。B-Tree
    索引对于 OLTP 工作负载很有用，此时查询通常处理大型表中的一个或少数几行。


    然而，对于扫描大量数据的数据仓库查询来说，基于行的存储并非最优。此类查询通常只处理表中列的子集，并且无法在跳过不必要列的同时避免读取整个数据行对象。


    数据压缩可能有助于减少数据大小和 I/O 开销。但是，对于基于行的存储，`页`压缩作用于数据页范围。来自不同列的数据相似度不足以使压缩有效，`页`压缩很少能将数据压缩超过
    2 倍或 2.5 倍。


    SQL Server 2012 引入了一种新型索引——`列存储索引`——它以`基于列的存储`格式保存数据。这些索引按列而非按行存储数据。每列的数据存储在一起，与其他列分离，如图
    14-1 所示。


    ![../images/463519_1_En_14_Chapter/463519_1_En_14_Fig1_HTML.jpg](img/463519_1_En_14_Fig1_HTML.jpg)


    图 14-1：基于行和基于列的存储


    列存储索引中的数据使用算法进行了高度压缩，即使与`页`压缩相比，也能显著节省空间。此外，SQL Server 可以跳过查询未请求的列，并且不会将这些列的数据加载到内存中，从而显著减少查询的
    I/O 占用空间。


    此外，列存储索引的新数据存储格式允许 SQL Server 实现新的`批处理`执行模型。在此模型中，SQL Server 按行组或`批`处理数据，而不是一次处理一行。批处理的大小会调整以适应
    CPU 缓存，这减少了 CPU 需要从内存或其他组件请求`外部`数据的次数。所有这些增强功能显著降低了数据仓库查询的 CPU 负载和执行时间。


    列存储索引是 SQL Server 中一个相对较新的功能，并且发展迅速。SQL Server 2012 的初始实现仅支持只读的`非聚集列存储索引`，这些索引以基于列的存储格式存储表中数据的副本。这些索引实际上使表变为只读，导入数据的唯一方式是通过`分区切换`。我们将不讨论这些索引；从锁定角度来看，它们的行为很简单。


    从 SQL Server 2014 开始，您可以创建具有聚集列存储索引的表，并将整个表存储在基于列的存储格式中。这些索引是可更新的；但是，您不能在这些表上定义任何非聚集索引。


    此限制已在 SQL Server 2016 中解除，您可以在表上为索引利用不同的存储技术。您可以通过在具有聚集列存储索引的表上创建非聚集 B-Tree 索引来支持混合工作负载，或者，您也可以在
    B-Tree 表上创建可更新的非聚集列存储索引。值得注意的是，您可以在内存优化表中创建列存储索引，从而提升内存 OLTP 中运营分析查询的性能。

    '
- fmt: '## Columnstore Index Internals Overview


    Each data column in column-based storage is stored separately in a set of structures
    called `row groups`. Each `row group` stores data for up to approximately one
    million—or, to be precise, `2^20=1,048,576`—rows. SQL Server tries to populate
    row groups completely during index creation, leaving the last row group partially
    populated. For example, if a table has five million rows, SQL Server creates four
    row groups of 1,048,576 rows each and one row group with 805,696 rows.


    In practice, you can have more than one partially populated row group when multiple
    threads create columnstore indexes using a parallel execution plan. Each thread
    will work with its own subset of data, creating separate row groups. Moreover,
    in the case of partitioned tables, each table partition will have its own set
    of row groups.


    After row groups are built, SQL Server encodes and compresses the column data
    in each row group. The rows within a row group can be rearranged if that helps
    to achieve a better compression rate.


    Column data within a row group is called a `segment`. SQL Server loads an entire
    segment to memory when it needs to access columnstore data. SQL Server also keeps
    information about data in the segments’ metadata—for example, minimum and maximum
    values stored in the segment—and can skip the segments that do not have the required
    data.


    The data that belong to the same data row are identified by the `offset` within
    the segments. For example, the first row in the table consists of the first values
    from all segments from the first row group on the first table partition. The second
    row consists of the second values from all segments from the same row group, and
    so forth. The combination of `partition_id`, `row_group_id`, and `offset` uniquely
    identifies the row and is called a `row-id` in columnstore indexes.


    The data in columnstore indexes is heavily compressed and can introduce significant
    space savings compared to page compression. It is common to see column-based storage
    providing a more than 10X compression rate over the row-based data. Moreover,
    SQL Server 2014 introduced another compression option called `archival compression`
    that reduces storage space even further. It uses the Xpress 8 compression library,
    which is an internal Microsoft implementation of the LZ77 algorithm. This compression
    works directly with row-group data without having any knowledge of the underlying
    SQL Server data structures.


    Updateable columnstore indexes have two additional elements to support data modifications.
    The first is the `delete bitmap`, which stores the `row-id` of the rows that were
    deleted from a table. The second structure is the `delta store`, which stores
    the newly inserted rows. In disk-based columnstore indexes, both the delta store
    and the delete bitmap are implemented as regular heap tables.


    ### Note


    The internal structure of columnstore indexes defined on memory-optimized tables
    is conceptually the same; however, the delta store and delete bitmap are implemented
    differently. Such indexes support In-Memory OLTP multi-version concurrency control
    and do not introduce any locking in memory-optimized tables. You can read more
    about them in the book `Expert SQL Server In-Memory OLTP`; we are not going to
    focus on them in this book.


    Figure [14-2](#463519_1_En_14_Chapter.xhtml#Fig2) illustrates the structure of
    an updateable columnstore index in a table that has two partitions. Each partition
    can have a single delete bitmap and multiple delta stores. This structure makes
    each partition self-contained and independent from other partitions, which allows
    you to perform a partition switch on tables that have columnstore indexes defined.


    ![../images/463519_1_En_14_Chapter/463519_1_En_14_Fig2_HTML.jpg](images/463519_1_En_14_Chapter/463519_1_En_14_Fig2_HTML.jpg)

    Figure 14-2

    Updateable columnstore index structure


    It is worth noting that delete bitmaps and delta stores are created `on-demand`.
    For example, a delete bitmap would not be created unless some of the rows in the
    row groups were deleted.


    Every time you delete a row that is stored in a compressed row group (not in a
    delta store), SQL Server adds information about the deleted row to the delete
    bitmap. Nothing happens to the original row. It is still stored in a row group.
    However, SQL Server checks the delete bitmap during query execution, excluding
    deleted rows from the processing.


    As already mentioned, when you insert data into a columnstore index, it goes into
    a delta store, which is a heap table. Updating a row that is stored in a row group
    does not change the row data either. Such an update triggers the deletion of a
    row, which is, in fact, insertion into a delete bitmap marking old version as
    `deleted`, and insertion of a new version of the row into a delta store. However,
    any data modifications of the rows in a delta store are done in-place as in regular
    heap tables by updating and deleting actual rows there.


    Each delta store can be in either an `open` or a `closed` state. Open delta stores
    accept new rows and allow modifications and deletions of data. SQL Server closes
    a delta store when it reaches 1,048,576 rows, which is the maximum number of rows
    that can be stored in a row group. Another SQL Server process, called `tuple mover`,
    runs every five minutes and converts closed delta stores to row groups that store
    data in a column-based storage format.


    Both large delta stores and delete bitmaps may affect query performance. SQL Server
    must access delete bitmaps to check if compressed rows were deleted, and it reads
    the rows from delta stores during query execution. Consider rebuilding indexes
    on affected partitions if ETL processes lead to large delta stores and delete
    bitmaps.


    ### Tip


    You can examine the state of row groups and delta stores with the `sys.column_store_row_groups`
    view. Rows in an `OPEN` or `CLOSED` state correspond to delta stores. Rows in
    a `COMPRESSED` state correspond to row groups with data in a column-based storage
    format. Finally, the `deleted_rows` column provides statistics about deleted rows
    stored in a delete bitmap.'
