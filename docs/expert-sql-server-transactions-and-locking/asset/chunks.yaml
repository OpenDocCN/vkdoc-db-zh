  trans: '# 版本存储行为与监控


    正如已经提到的，你需要监控乐观隔离级别如何影响系统中的 `tempdb`。例如，让我们运行清单 6-3 中的代码，该代码使用 `READ UNCOMMITTED`
    事务隔离级别从 `Delivery.Orders` 表中删除所有行。


    ```

    set transaction isolation level read uncommitted

    begin tran

    delete from Delivery.Orders;

    commit

    Listing 6-3

    从 Delivery.Orders 表中删除数据

    ```


    即使在 `DELETE` 语句开始时没有其他使用乐观隔离级别的事务，仍然有可能在当前事务提交之前启动一个这样的事务。因此，SQL Server 需要维护版本存储，无论是否有活动事务正在使用乐观隔离级别。


    图 6-10 显示了 `tempdb` 的可用空间和版本存储大小。可以看到，一旦删除开始，版本存储就会增长并占据 `tempdb` 中的所有可用空间。


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig10_HTML.jpg](img/463519_1_En_6_Fig10_HTML.jpg)


    图 6-10

    tempdb 可用空间与版本存储大小


    在图 6-11 中，你可以看到版本存储的生成速率和清理速率。生成速率在执行期间基本保持不变，而清理任务则在事务提交后清理版本存储。默认情况下，清理任务每分钟运行一次，并且在
    `tempdb` 已满的情况下，也会在任何自动增长事件之前运行。


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig11_HTML.jpg](img/463519_1_En_6_Fig11_HTML.jpg)


    图 6-11

    版本生成与清理速率


    如你所见，版本存储会给系统带来额外开销。除非你计划使用，否则不要在数据库中启用乐观隔离级别。对于 `SNAPSHOT` 隔离尤其如此，因为它需要你在代码中显式设置。虽然许多系统可以无需更改任何代码就从
    `READ COMMITTED SNAPSHOT` 中受益，但 `SNAPSHOT` 隔离级别则不会这样。


    还有另外三个与乐观隔离级别相关的性能计数器，在版本存储监控期间可能有所帮助：


    1.  `Snapshot Transactions`：显示活动快照事务的总数。你可以分析此计数器，以确定在系统启用 `SNAPSHOT` 隔离级别后，应用程序是否使用了它。

    2.  `Update Conflict Ratio`：显示更新冲突次数与更新快照事务总数的比率。

    3.  `Longest Transaction Running Time`：显示使用行版本控制的最老活动事务的运行时长（以秒为单位）。此计数器的高值可能解释了系统中版本存储过大的原因。


    还有几个动态管理视图（DMVs）可用于排查与版本存储及事务相关的各种问题。


    `sys.dm_db_file_space_usage` 视图返回数据库中每个文件的空间使用信息。该视图中的一列 `version_store_reserved_page_count`
    返回了版本存储使用的页数。清单 6-4 展示了此视图的实际用法。


    ```

    select

    sum(user_object_reserved_page_count) * 8

    as [用户对象 (KB)]

    ,sum(internal_object_reserved_page_count) * 8

    as [内部对象 (KB)]

    ,sum(version_store_reserved_page_count) * 8

    as [版本存储 (KB)]

    ,sum(unallocated_extent_page_count) * 8

    as [可用空间 (KB)]

    from

    tempdb.sys.dm_db_file_space_usage;

    Listing 6-4

    使用 sys.dm_db_file_space_usage 视图

    ```


    你可以使用 `sys.dm_tran_version_store` 视图按数据库跟踪版本存储使用情况，如清单 6-5 所示。此视图返回版本存储中每一行的信息，当版本存储很大时，它可能极其低效。它也不包括已保留但未使用的空间信息。


    ```

    select

    db_name(database_id) as [数据库]

    ,database_id

    ,sum(record_length_first_part_in_bytes + record_length_second_part_in_bytes) /
    1024

    as [版本存储 (KB)]

    from

    sys.dm_tran_version_store

    group by

    database_id

    Listing 6-5

    使用 sys.dm_tran_version_store 视图

    ```


    在 SQL Server 2017 中，你可以使用 `sys.dm_tran_version_store_space_usage` 视图获取相同的信息。此视图比
    `sys.dm_tran_version_store` 更高效，并且它也返回有关保留空间的信息，如清单 6-6 所示。


    ```

    select

    db_name(database_id) as [数据库]

    ,database_id

    ,reserved_page_count

    ,reserved_space_kb

    from

    sys.dm_tran_version_store_space_usage

    Listing 6-6

    使用 sys.dm_tran_version_store_space_usage 视图

    ```


    当版本存储变得非常大时，你需要找出阻止其清理的活动事务。记住：一旦启用了乐观隔离级别，无论执行数据修改的事务使用何种隔离级别，都会使用行版本控制。


    清单 6-7 展示了如何识别系统中五个最老的用户事务。长时间运行的事务是版本存储无法清理的最常见原因。它们也可能在系统中引入其他问题；例如，阻止事务日志的截断。


    ### 重要提示


    SQL Server 的某些功能，如在线索引重建、`AFTER UPDATE` 和 `AFTER DELETE` 触发器以及 MARS，无论是否启用了乐观隔离级别，都会使用版本存储。此外，在启用了可读辅助副本的
    AlwaysOn 可用性组的系统中也会使用行版本控制。我们将在第 12 章更详细地讨论这一点。


    ```

    select top 5

    at.transaction_id

    ,at.elapsed_time_seconds

    ,at.session_id

    ,s.login_time

    ,s.login_name

    ,s.host_name

    ,s.program_name

    ,s.last_request_start_time

    ,s.last_request_end_time

    ,er.status

    ,er.wait_type

    ,er.blocking_session_id

    ,er.wait_type

    ,substring(

    st.text,

    (er.statement_start_offset / 2) + 1,

    (case

    er.statement_end_offset

    when -1

    then datalength(st.text)

    else er.statement_end_offset

    end - er.statement_start_offset) / 2 + 1

    ) as [SQL]

    from

    sys.dm_tran_active_snapshot_database_transactions at

    join sys.dm_exec_sessions s on

    at.session_id = s.session_id

    left join sys.dm_exec_requests er on

    at.session_id = er.session_id

    outer apply

    sys.dm_exec_sql_text(er.sql_handle) st

    order by

    at.elapsed_time_seconds desc

    Listing 6-7

    识别系统中最老的活动事务

    ```


    ### 注意


    还有其他几个有用的事务相关动态管理视图。你可以在 [`https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/transaction-related-dynamic-management-views-and-functions-transact-sql`](https://docs.microsoft.com/zh-cn/sql/relational-databases/system-dynamic-management-views/transaction-related-dynamic-management-views-and-functions-transact-sql)
    阅读有关它们的信息。


    最后，值得注意的是，SQL Server 在 `sys.databases` 视图中公开了 `READ COMMITTED SNAPSHOT` 和 `SNAPSHOT`
    隔离级别是否启用的信息。`is_read_committed_snapshot` 列指示是否启用了 RCSI。`snapshot_isolation_state`
    和 `snapshot_isolation_state_desc` 列分别指示在运行 `ALTER DATABASE SET ALLOW_SNAPSHOT_ISOLATION`
    语句后，是否允许 `SNAPSHOT` 事务和/或数据库是否处于过渡状态。'
- fmt: '## Row Versioning and Index Fragmentation


    乐观隔离级依赖于行版本控制。在更新操作期间，行的旧版本被复制到`tempdb`中的版本存储。数据库中的行通过在更新操作期间添加的14字节版本存储指针来引用它们。


    在删除操作期间也会发生同样的事情。在SQL Server中，`DELETE`语句并不会从表中移除行，而是将它们标记为`deleted`，在事务提交后在后台回收空间。使用乐观隔离级时，删除操作也会将行复制到版本存储，通过版本存储指针扩展已删除的行。


    版本存储指针使行大小增加了14字节，这可能导致数据页没有足够的空闲空间来容纳行的新版本。这将触发`page split`并增加索引碎片。


    让我们看一个例子。第一步，我们将禁用乐观隔离级，并使用`FILLFACTOR=100`重建`Delivery.Orders`表上的索引。这强制SQL Server完全填充数据页，不在其中预留任何空闲空间。代码如清单[6-8](#463519_1_En_6_Chapter.xhtml#PC8)所示。


    ```

    alter database SQLServerInternals

    set read_committed_snapshot off

    with rollback immediate;

    go

    alter database SQLServerInternals

    set allow_snapshot_isolation off;

    go

    alter index PK_Orders on Delivery.Orders rebuild

    with (fillfactor = 100);

    Listing 6-8

    乐观隔离级和碎片：索引重建

    ```


    清单[6-9](#463519_1_En_6_Chapter.xhtml#PC9)展示了分析`Delivery.Orders`表中聚集索引碎片的代码。


    ```

    select

    alloc_unit_type_desc as [alloc_unit]

    ,index_level

    ,page_count

    ,convert(decimal(4,2),avg_page_space_used_in_percent)

    as [space_used]

    ,convert(decimal(4,2),avg_fragmentation_in_percent)

    as [frag %]

    ,min_record_size_in_bytes as [min_size]

    ,max_record_size_in_bytes as [max_size]

    ,avg_record_size_in_bytes as [avg_size]

    from

    sys.dm_db_index_physical_stats(db_id()

    ,object_id(N''Delivery.Orders''),1,null,''DETAILED'');

    Listing 6-9

    乐观隔离级和碎片：分析碎片

    ```


    如图[6-12](#463519_1_En_6_Chapter.xhtml#Fig12)所示，索引使用了1,392个页面，没有任何碎片。


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig12_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig12_HTML.jpg)


    图 6-12


    FILLFACTOR = 100 时的索引统计信息


    现在，让我们运行清单[6-10](#463519_1_En_6_Chapter.xhtml#PC10)中的代码，从表中删除50%的行。注意，我们在下一次测试之前回滚了事务以重置环境。


    ```

    begin tran

    delete from Delivery.Orders where OrderId % 2 = 0;

    -- update Delivery.Orders set Pieces += 1;

    select

    alloc_unit_type_desc as [alloc_unit]

    ,index_level

    ,page_count

    ,convert(decimal(4,2),avg_page_space_used_in_percent)

    as [space_used]

    ,convert(decimal(4,2),avg_fragmentation_in_percent)

    as [frag %]

    ,min_record_size_in_bytes as [min_size]

    ,max_record_size_in_bytes as [max_size]

    ,avg_record_size_in_bytes as [avg_size]

    from

    sys.dm_db_index_physical_stats(db_id()

    ,object_id(N''Delivery.Orders''),1,null,''DETAILED'');

    rollback

    Listing 6-10

    乐观隔离级和碎片：删除50%的行

    ```


    图[6-13](#463519_1_En_6_Chapter.xhtml#Fig13)显示了此代码的输出。如您所见，此操作不会增加索引中的页面数量。如果您更新任何定长列的值，也会发生同样的情况。此更新不会改变行的大小，因此不会触发任何页面拆分。


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig13_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig13_HTML.jpg)


    图 6-13


    DELETE 语句后的索引统计信息


    现在，我们启用`READ COMMITTED SNAPSHOT`隔离级并重复我们的测试。清单[6-11](#463519_1_En_6_Chapter.xhtml#PC11)显示了执行此操作的代码。


    ```

    alter database SQLServerInternals

    set read_committed_snapshot on

    with rollback immediate;

    go

    set transaction isolation level read uncommitted

    begin tran

    delete from Delivery.Orders where OrderId % 2 = 0;

    -- update Delivery.Orders set Pieces += 1;

    rollback

    Listing 6-11

    乐观隔离级和碎片：在启用RCSI的情况下重复测试

    ```


    图[6-14](#463519_1_En_6_Chapter.xhtml#Fig14)显示了操作后的索引统计信息。注意，我们使用了`READ UNCOMMITTED`隔离级并回滚了事务。尽管如此，行版本控制仍在使用，这会导致数据删除期间出现页面拆分。


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig14_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig14_HTML.jpg)


    图 6-14


    启用RCSI后DELETE语句的索引统计信息


    添加后，14字节的版本存储指针会保留在行中，即使在记录从版本存储中移除后也是如此。您可以通过执行索引重建来回收此空间。


    您需要记住此行为，并将其纳入索引维护策略。如果启用了乐观隔离级，最好不要使用`FILLFACTOR = 100`。这同样适用于定义在具有`AFTER UPDATE`和`AFTER
    DELETE`触发器的表上的索引。这些触发器依赖于行版本控制，并且在内部也会使用版本存储。


    ## Summary


    SQL Server在使用乐观隔离级时采用行版本控制模型。查询访问行的“旧”已提交版本，而不是被共享(S)、更新(U)和排他(X)锁的不兼容性所阻塞。有两种可用的乐观事务隔离级：`READ
    COMMITTED SNAPSHOT`和`SNAPSHOT`。


    `READ COMMITTED SNAPSHOT`是一个数据库选项，它会改变`READ COMMITTED`模式下读取者的行为。它不会改变写入者的行为——由于(U)/(U)和(U)/(X)锁的不兼容性，仍然存在阻塞。`READ
    COMMITTED SNAPSHOT`不需要任何代码更改，并且可以在系统遇到阻塞问题时用作紧急技术。


    `READ COMMITTED SNAPSHOT`提供语句级一致性；也就是说，查询读取的是语句开始时数据的快照。


    `SNAPSHOT`隔离级是一个独立的事务隔离级，需要在代码中显式指定。此级别提供事务级一致性；也就是说，查询访问的是事务开始时数据的快照。


    使用`SNAPSHOT`隔离级时，写入者不会相互阻塞，除非两个会话正在更新相同的行。这种情况要么导致阻塞，要么导致3960错误。


    虽然乐观隔离级减少了阻塞，但它们会显著增加`tempdb`负载，尤其是在数据不断变化的OLTP系统中。它们还通过向数据行添加14字节指针来加剧索引碎片。您应在实施阶段考虑使用它们的权衡，执行`tempdb`优化，并监控系统以确保版本存储不被滥用。


    ## 7. Lock Escalation


    尽管从并发性角度来看行级锁很棒，但它开销很大。在内存中，锁结构在32位操作系统中使用64字节，在64位操作系统中使用128字节。保存数百万个行级和页级锁的信息将使用千兆字节的内存。


    SQL Server使用一种称为`lock escalation`的技术来减少内存中持有的锁数量，我们将在本章中讨论该技术。'
  raw: '## Row Versioning and Index Fragmentation


    Optimistic isolation levels rely on row versioning. During updates, the old versions
    of the rows are copied to the version store in `tempdb`. The rows in the database
    reference them through 14-byte version store pointers that are added during update
    operations.


    The same thing happens during deletions. In SQL Server, a `DELETE` statement does
    not remove the rows from the table, but rather marks them as *deleted*, reclaiming
    the space in the background after the transaction is committed. With optimistic
    isolation levels, deletions also copy the rows to the version store, expanding
    the deleted rows with version store pointers.


    The version store pointer increases the row size by 14 bytes, which may lead to
    the situation where the data page does not have enough free space to accommodate
    the new version of the row. This would trigger a *page split* and increase index
    fragmentation.


    Let’s look at an example. As the first step, we will disable optimistic isolation
    levels and rebuild the index on the `Delivery.Orders` table using `FILLFACTOR=100`.
    This forces SQL Server to fully populate the data pages without reserving any
    free space on them. The code is shown in Listing [6-8](#463519_1_En_6_Chapter.xhtml#PC8).


    ```

    alter database SQLServerInternals

    set read_committed_snapshot off

    with rollback immediate;

    go

    alter database SQLServerInternals

    set allow_snapshot_isolation off;

    go

    alter index PK_Orders on Delivery.Orders rebuild

    with (fillfactor = 100);

    Listing 6-8

    Optimistic isolation levels and fragmentation: Index rebuild

    ```


    Listing [6-9](#463519_1_En_6_Chapter.xhtml#PC9) shows the code that analyzes the
    index fragmentation of the clustered index in the `Delivery.Orders` table.


    ```

    select

    alloc_unit_type_desc as [alloc_unit]

    ,index_level

    ,page_count

    ,convert(decimal(4,2),avg_page_space_used_in_percent)

    as [space_used]

    ,convert(decimal(4,2),avg_fragmentation_in_percent)

    as [frag %]

    ,min_record_size_in_bytes as [min_size]

    ,max_record_size_in_bytes as [max_size]

    ,avg_record_size_in_bytes as [avg_size]

    from

    sys.dm_db_index_physical_stats(db_id()

    ,object_id(N''Delivery.Orders''),1,null,''DETAILED'');

    Listing 6-9

    Optimistic isolation levels and fragmentation: Analyzing fragmentation

    ```


    As you can see in Figure [6-12](#463519_1_En_6_Chapter.xhtml#Fig12), the index
    is using 1,392 pages and does not have any fragmentation.


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig12_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig12_HTML.jpg)


    Figure 6-12


    Index statistics with FILLFACTOR = 100


    Now, let’s run the code from Listing [6-10](#463519_1_En_6_Chapter.xhtml#PC10)
    and delete 50 percent of the rows from the table. Note that we rolled back the
    transaction to reset the environment before the next test.


    ```

    begin tran

    delete from Delivery.Orders where OrderId % 2 = 0;

    -- update Delivery.Orders set Pieces += 1;

    select

    alloc_unit_type_desc as [alloc_unit]

    ,index_level

    ,page_count

    ,convert(decimal(4,2),avg_page_space_used_in_percent)

    as [space_used]

    ,convert(decimal(4,2),avg_fragmentation_in_percent)

    as [frag %]

    ,min_record_size_in_bytes as [min_size]

    ,max_record_size_in_bytes as [max_size]

    ,avg_record_size_in_bytes as [avg_size]

    from

    sys.dm_db_index_physical_stats(db_id()

    ,object_id(N''Delivery.Orders''),1,null,''DETAILED'');

    rollback

    Listing 6-10

    Optimistic isolation levels and fragmentation: Deleting 50 percent of the rows

    ```


    Figure [6-13](#463519_1_En_6_Chapter.xhtml#Fig13) shows the output of this code.
    As you can see, this operation does not increase the number of pages in the index
    . The same will happen if you update a value of any fixed-length column. This
    update would not change the size of the rows, and therefore it would not trigger
    any page splits.


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig13_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig13_HTML.jpg)


    Figure 6-13


    Index statistics after DELETE statement


    Now, let’s enable the `READ COMMITTED SNAPSHOT` isolation level and repeat our
    test. Listing [6-11](#463519_1_En_6_Chapter.xhtml#PC11) shows the code to do that.


    ```

    alter database SQLServerInternals

    set read_committed_snapshot on

    with rollback immediate;

    go

    set transaction isolation level read uncommitted

    begin tran

    delete from Delivery.Orders where OrderId % 2 = 0;

    -- update Delivery.Orders set Pieces += 1;

    rollback

    Listing 6-11

    Optimistic isolation levels and fragmentation: Repeating the test with RCSI enabled

    ```


    Figure [6-14](#463519_1_En_6_Chapter.xhtml#Fig14) shows index statistics after
    the operation. Note that we were using the `READ UNCOMMITTED` isolation level
    and rolling back the transaction. Nevertheless, row versioning is used, which
    introduces page splits during data deletion.


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig14_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig14_HTML.jpg)


    Figure 6-14


    Index statistics after DELETE statement with RCSI enabled


    After being added, the 14-byte version store pointers stay in the rows, even after
    the records are removed from the version store. You can reclaim this space by
    performing an index rebuild.


    You need to remember this behavior and factor it into your index maintenance strategy.
    It is best not to use `FILLFACTOR = 100` if optimistic isolation levels are enabled.
    The same applies to indexes defined on tables that have `AFTER UPDATE` and `AFTER
    DELETE` triggers defined. Those triggers rely on row versioning and will also
    use the version store internally.


    ## Summary


    SQL Server uses a row-versioning model with optimistic isolation levels. Queries
    access “old” committed versions of rows rather than being blocked by the incompatibility
    of shared (S), update (U), and exclusive (X) locks. There are two optimistic transaction
    isolation levels available: `READ COMMITTED SNAPSHOT` and `SNAPSHOT`.


    `READ COMMITTED SNAPSHOT` is a database option that changes the behavior of readers
    in `READ COMMITTED` mode. It does not change the behavior of writers—there is
    still blocking due to (U)/(U) and (U)/(X) locks’ incompatibility. `READ COMMITTED
    SNAPSHOT` does not require any code changes, and it can be used as an emergency
    technique when a system is experiencing blocking issues.


    `READ COMMITTED SNAPSHOT` provides statement-level consistency; that is, the query
    reads a snapshot of the data at the time the statement started.


    The `SNAPSHOT` isolation level is a separate transaction isolation level that
    needs to be explicitly specified in the code. This level provides transaction-level
    consistency; that is, the query accesses a snapshot of the data at the time the
    transaction started.


    With the `SNAPSHOT` isolation level, writers do not block each other, with the
    exception of the situation where both sessions are updating the same rows. That
    situation leads either to blocking or to a 3960 error.


    While optimistic isolation levels reduce blocking, they can significantly increase
    `tempdb` load, especially in OLTP systems where data is constantly changing. They
    also contribute to index fragmentation by adding 14-byte pointers to the data
    rows. You should consider the tradeoffs of using them at the implementation stage,
    perform `tempdb` optimization, and monitor the system to make sure that the version
    store is not abused.


    # 7. Lock Escalation


    Although row-level locking is great from a concurrency standpoint, it is expensive.
    In memory, a lock structure uses 64 bytes in 32-bit and 128 bytes in 64-bit operating
    systems. Keeping information about millions of row- and page-level locks would
    use gigabytes of memory.


    SQL Server reduces the number of locks held in memory with a technique called
    *lock escalation*, which we will discuss in this chapter.'
