    values to specify the type: `Shared`, `Update`, `IntentShared`, `IntentExclusive`,
    or `Exclusive`.


    *   `@LockOwner:` should be one of two values—`Transaction` or `Session`*—*and
    controls the owner (and scope) of the lock


    *   `@LockTimeout:` specifies the timeout in milliseconds. If a stored procedure
    cannot acquire the lock within this interval, it would return an error.


    *   `@DbPrincipal:` specifies security context (The caller needs to be a member
    of the `database_principal`, `dbo`, or `db_owner` roles.)


    This procedure returns a value greater than or equal to zero in the case of success,
