- fmt: "## Important\n\n非关键异常不会自动回滚显式或隐式事务，无论是否存在 `TRY..CATCH` 块。在错误发生后，你仍然需要提交或回滚事务。\n\
    \n根据错误的严重程度，发生错误的事务可能是可提交的，也可能变为不可提交并被标记为“已损坏”。SQL Server 将不允许你提交不可提交的事务，必须回滚它才能完成。\n\
    \n`XACT_STATE()` 函数允许你分析事务的状态；它返回以下三个值之一：\n\n*   `0` 表示当前没有活动事务。\n*   `1` 表示存在一个活动的、*可提交*\
    \ 事务。你可以执行任何操作和数据修改，随后提交事务。\n*   `-1` 表示存在一个活动的、*不可提交* 事务。你无法提交此类事务。\n\n有一个非常重要的\
    \ `SET` 选项 `XACT_ABORT`，它允许你控制代码中的错误处理行为。当此选项设置为 `ON` 时，SQL Server 会将每个运行时错误都视为严重错误，使事务变为不可提交。这可以防止你在某些数据修改因非关键错误而失败时，意外地提交事务。再次回想一下在支票账户和储蓄账户之间转账的例子。如果其中一个\
    \ `UPDATE` 语句触发了错误，无论其严重程度如何，都不应提交此事务。\n\n当启用 `XACT_ABORT` 时，如果不存在 `TRY..CATCH`\
    \ 块，任何错误都将终止批处理。例如，如果你使用 `SET XACT_ABORT ON` 再次运行清单 [2-3](#463519_1_En_2_Chapter.xhtml#PC3)\
    \ 中的代码，第三个 `DELETE` 语句将不会被执行，并且只有 `CustomerId=1` 的行会被删除。此外，在批处理完成后，SQL Server\
    \ 会自动回滚已损坏的未提交事务。\n\n清单 [2-5](#463519_1_En_2_Chapter.xhtml#PC5) 说明了此行为。存储过程 `dbo.GenerateError`\
    \ 将 `XACT_ABORT` 设置为 `ON`，并在活动事务中生成一个错误。`@@TRANCOUNT` 变量返回事务的嵌套级别（稍后会详细介绍），非零值表示事务是活动的。\n\
    \n```sql\ncreate proc dbo.GenerateError\nas\nbegin\n    set xact_abort on\n  \
    \  begin tran\n        delete from dbo.Customers where CustomerId = 2; -- Error\n\
    \        select 'This statement will never be executed';\nend\ngo\nexec dbo.GenerateError;\n\
    select 'This statement will never be executed';\ngo\n-- Another batch\nselect\
    \ XACT_STATE() as [XACT_STATE()], @@TRANCOUNT as [@@TRANCOUNT];\ngo\n-- Listing\
    \ 2-5\n-- SET XACT_ABORT behavior\n```\n\n图 [2-5](#463519_1_En_2_Chapter.xhtml#Fig5)\
    \ 展示了代码的输出。如你所见，批处理执行已终止，并且在批处理结束时事务已自动回滚。\n\n![../images/463519_1_En_2_Chapter/463519_1_En_2_Fig5_HTML.jpg](images/463519_1_En_2_Chapter/463519_1_En_2_Fig5_HTML.jpg)\n\
    \n图 2-5\nXACT_ABORT 行为\n\n然而，即使 `XACT_ABORT` 设置为 `ON`，`TRY..CATCH` 块也允许你捕获错误。清单\
    \ [2-6](#463519_1_En_2_Chapter.xhtml#PC6) 说明了这种情况。\n\n```sql\nbegin try\n    exec\
    \ dbo.GenerateError;\n    select 'This statement will never be executed';\nend\
    \ try\nbegin catch\n    select\n        ERROR_NUMBER() as [Error Number]\n   \
    \     ,ERROR_PROCEDURE() as [Procedure]\n        ,ERROR_LINE() as [Error Line]\n\
    \        ,ERROR_MESSAGE() as [Error Message];\n    select\n        XACT_STATE()\
    \ as [XACT_STATE()]\n        ,@@TRANCOUNT as [@@TRANCOUNT];\n    if @@TRANCOUNT\
    \ > 0\n        rollback;\nend catch\n-- Listing 2-6\n-- SET XACT_ABORT behavior\
    \ with TRY..CATCH block\n```\n\n如图 [2-6](#463519_1_En_2_Chapter.xhtml#Fig6) 所示，异常已在\
    \ `CATCH` 块中被捕获，此时事务在该块中仍处于活动状态。\n\n![../images/463519_1_En_2_Chapter/463519_1_En_2_Fig6_HTML.jpg](images/463519_1_En_2_Chapter/463519_1_En_2_Fig6_HTML.jpg)\n\
    \n图 2-6\n带有 TRY..CATCH 块的 XACT_ABORT 行为\n\n一致的错误处理和事务管理策略极其重要，可以帮助你避免数据一致性错误并提高系统中的数据质量。我推荐以下最佳实践方法：\n\
    \n*   在数据修改期间，始终在代码中使用显式事务。这将保证由多个操作组成的事务中的数据一致性。它也比单个自动提交的事务更高效。\n*   在启动事务之前，将\
    \ `XACT_ABORT` 设置为 `ON`。这将保证事务的“全部或没有”行为，防止 SQL Server 忽略非严重错误或提交部分完成的事务。\n* \
    \  使用适当的 `TRY..CATCH` 块进行错误处理，并在出现异常时显式回滚事务。这有助于避免错误发生时产生不可预见的副作用。\n\n在事务变为不可提交后，执行生成事务日志记录的操作是不可能的。实际上，这意味着在回滚不可提交的事务之前，你无法执行任何数据修改操作——例如，在\
    \ `CATCH` 块中将错误记录到数据库中。如果需要，可以将数据持久化在表变量中。\n\n## Tip\n\n与临时表相反，表变量不参与事务。表变量中的数据不会受到事务回滚的影响。\n\
    \n客户端与服务器端事务管理的选择取决于应用程序架构。当数据修改在应用程序代码中完成时（例如，更改由 ORM 框架生成），需要客户端管理。另一方面，基于存储过程的数据访问层可能受益于服务器端事务管理。\n\
    \n清单 [2-7](#463519_1_En_2_Chapter.xhtml#PC7) 提供了一个实现服务器端事务管理的存储过程示例。\n\n```sql\n\
    create proc dbo.PerformDataModifications\nas\nbegin\n    set xact_abort on\n \
    \   begin try\n        begin tran\n            /* Perform required data modifications\
    \ */\n        commit\n    end try\n    begin catch\n        if @@TRANCOUNT > 0\
    \ -- Transaction is active\n            rollback;\n        /* Additional error-handling\
    \ code */\n        throw;  -- Re-throw error. Alternatively, SP may return the\
    \ error code\n    end catch;\nend;\n-- Listing 2-7\n-- Server-side transaction\
    \ management\n```"
  raw: '### Important


    Non-critical exceptions do not automatically roll back explicit or implicit transactions,
    regardless of whether a `TRY..CATCH` block is present. You still need to commit
    or roll back the transactions after the error.


    Depending on the severity of the error, a transaction in which an error occurred
    may be committable or may become uncommittable and doomed. SQL Server would not
    allow you to commit uncommittable transactions, and you must roll it back to complete
    it.


    The `XACT_STATE()` function allows you to analyze the state of a transaction;
    it returns one of three values:


    *   `0` indicates that there are no active transactions present.


    *   `1` indicates that there is an active *committable* transaction present. You
    can perform any actions and data modifications, committing the transactions afterward.


    *   `-1` indicates that there is an active *uncommittable* transaction present.
    You cannot commit such a transaction.


    There is a very important `SET` option, `XACT_ABORT`, that allows you to control
    error-handling behavior in the code. When this option is set to `ON`, SQL Server
    treats every run-time error as severe, making transactions uncommittable. This
    prevents you from accidentally committing transactions when some data modifications
    failed with non-critical errors. Again, remember the example with the money transfer
    between checking and savings accounts. This transaction should not be committed
    if one of the `UPDATE` statements triggered an error, regardless of its severity.


    When `XACT_ABORT` is enabled, any error would terminate the batch when a `TRY..CATCH`
    block is not present. For example, if you run the code from Listing [2-3](#463519_1_En_2_Chapter.xhtml#PC3)
    again using `SET XACT_ABORT ON`, the third `DELETE` statement would not be executed,
    and only the row with `CustomerId=1` will be deleted. Moreover, SQL Server would
    automatically roll back doomed uncommitted transactions after the batch completed.


    Listing [2-5](#463519_1_En_2_Chapter.xhtml#PC5) illustrates this behavior. The
    stored procedure `dbo.GenerateError` sets `XACT_ABORT` to `ON` and generates an
    error within the active transaction. The `@@TRANCOUNT` variable returns the nested
    level of the transaction (more on this later), and non-zero values indicate that
    the transaction is active.


    ```

    create proc dbo.GenerateError

    as

    begin

    set xact_abort on

    begin tran

    delete from dbo.Customers where CustomerId = 2; -- Error

    select ''This statement will never be executed'';

    end

    go

    exec dbo.GenerateError;

    select ''This statement will never be executed'';

    go

    -- Another batch

    select XACT_STATE() as [XACT_STATE()], @@TRANCOUNT as [@@TRANCOUNT];

    go

    Listing 2-5

    SET XACT_ABORT behavior

    ```


    Figure [2-5](#463519_1_En_2_Chapter.xhtml#Fig5) illustrates the output of the
    code . As you can see, batch execution has been terminated, and the transaction
    has been automatically rolled back at the end of the batch.


    ![../images/463519_1_En_2_Chapter/463519_1_En_2_Fig5_HTML.jpg](images/463519_1_En_2_Chapter/463519_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    XACT_ABORT behavior


    A `TRY..CATCH` block, however, will allow you to capture the error even with `XACT_ABORT`
    set to `ON`. Listing [2-6](#463519_1_En_2_Chapter.xhtml#PC6) illustrates such
    a situation.


    ```

    begin try

    exec dbo.GenerateError;

    select ''This statement will never be executed'';

    end try

    begin catch

    select

    ERROR_NUMBER() as [Error Number]

    ,ERROR_PROCEDURE() as [Procedure]

    ,ERROR_LINE() as [Error Line]

    ,ERROR_MESSAGE() as [Error Message];

    select

    XACT_STATE() as [XACT_STATE()]

    ,@@TRANCOUNT as [@@TRANCOUNT];

    if @@TRANCOUNT > 0

    rollback;

    end catch

    Listing 2-6

    SET XACT_ABORT behavior with TRY..CATCH block

    ```


    As you can see in Figure [2-6](#463519_1_En_2_Chapter.xhtml#Fig6), the exception
    has been trapped in the `CATCH` block, with the transaction still remaining active
    there.


    ![../images/463519_1_En_2_Chapter/463519_1_En_2_Fig6_HTML.jpg](images/463519_1_En_2_Chapter/463519_1_En_2_Fig6_HTML.jpg)


    Figure 2-6


    XACT_ABORT behavior with TRY..CATCH block


    Consistent error handling and transaction management strategies are extremely
    important and allow you to avoid data consistency errors and improve data quality
    in the system. I would recommend the following approach as the best practice:


    *   Always use explicit transactions in the code during data modifications. This
    would guarantee data consistency in transactions that consist of multiple operations.
    It is also more efficient than individual autocommitted transactions.


    *   Set `XACT_ABORT` to `ON` before transaction is started. This would guarantee
    the “all-or-nothing” behavior of the transaction, preventing SQL Server from ignoring
    non-severe errors or committing partially completed transactions.


    *   Use proper error handling with `TRY..CATCH` blocks and explicitly roll back
    transactions in case of exceptions. This helps to avoid unforeseen side effects
    in case of errors.


    It is impossible to perform the operations that generate transaction log records
    after a transaction becomes uncommittable. In practice, it means that you could
    not perform any data modifications—for example, log errors in the database in
    the `CATCH` block—until you roll back an uncommittable transaction. You can persist
    the data in table variables if needed.


    ### Tip


    As the opposite of temporary tables, table variables are not transaction-aware.
    The data in table variables would not be affected by a transaction rollback.


    The choice between client-side and server-side transaction management depends
    on the application architecture. Client-side management is required when data
    modifications are done in the application code; for example, changes are generated
    by ORM frameworks. On the other hand, stored procedure-based data access tiers
    may benefit from server-side transaction management.


    Listing [2-7](#463519_1_En_2_Chapter.xhtml#PC7) provides an example of a stored
    procedure that implements server-side transaction management.


    ```

    create proc dbo.PerformDataModifications

    as

    begin

    set xact_abort on

    begin try

    begin tran

    /* Perform required data modifications */

    commit

    end try

    begin catch

    if @@TRANCOUNT > 0 -- Transaction is active

    rollback;

    /* Addional error-handling code */

    throw;  -- Re-throw error. Alternatively, SP may return the error code

    end catch;

    end;

    Listing 2-7

    Server-side transaction management

    ```'
