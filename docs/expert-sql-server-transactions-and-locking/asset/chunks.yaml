- fmt: '### Locking Waits: Summary


    Table [12-1](#463519_1_En_12_Chapter.xhtml#Tab1) summarizes possible root causes
    and troubleshooting steps for common lock-related wait types.


    **Table 12-1** Most Common Lock-Related Wait Types


    | Wait Type | Possible Root Cause | Troubleshooting Steps |

    | --- | --- | --- |

    | `LCK_M_U` | Update scans due to poorly optimized queries | Detect and optimize
    poorly optimized queries using Query Store, `sys.dm_exec_query_stats`, xEvent
    sessions, Blocking Monitoring Framework |

    | `LCK_M_X` | Multiple sessions work with the same data | Change the code |

    | | Update scans due to poorly optimized queries | Detect and optimize poorly
    optimized queries using Query Store, `sys.dm_exec_query_stats`, xEvent sessions,
    Blocking Monitoring Framework |

    | `LCK_M_S` | Select scans due to poorly optimized queries | Detect and optimize
    poorly optimized queries using Query Store, `sys.dm_exec_query_stats`, xEvent
    sessions, Blocking Monitoring Framework<br>Consider switching to optimistic isolation
    levels |

    | `LCK_M_U`, `LCK_M_S`, `LCK_M_X` | Incorrect transaction management with long-running
    transactions holding incompatible locks | Redesign transaction strategy. Optimize
    the queries |

    | `LCK_M_SCH_S`, `LCK_M_SCH_M` | Blocking due to database schema alteration or
    index or partition maintenance | Evaluate deployment and maintenance strategies.
    Switch to low-priority locks if possible |

    | `LCK_M_I*` | Blocking due to database schema alteration or index or partition
    maintenance | Evaluate deployment and maintenance strategies |

    | | Lock Escalation | Analyze and disable lock escalations on affected tables
    |


    As I already mentioned, every lock type in the system has a corresponding wait
    type. You may encounter other lock-related wait types that we have not covered
    in this chapter. Nevertheless, knowledge of the SQL Server Concurrency Model will
    help you in troubleshooting. Analyze blocking conditions that may generate such
    lock types and identify the root cause of the blocking.


    ## Data Management Views


    SQL Server provides a large set of data management views that expose information
    about system health and the SQL Server state. I would like to mention several
    views that we have not yet covered.


    ### sys.dm_exec_requests View


    The `sys.dm_exec_requests` view provides a list of currently executed requests.
    This view is extremely useful during troubleshooting and provides you with great
    visibility of the sessions that are currently running on the server. The most
    notable columns in the view are as follows:


    *   The `session_id` column provides ID of the session. The user sessions in the
    system will always have a `session_id` greater than 50, although it is possible
    that some of the system sessions may also have a `session_id` greater than 50.
    You can get information about the session and client application by joining results
    with the `sys.dm_exec_sessions` and `sys.dm_exec_connections` views.


    *   The `start_time`, `total_elapsed_time`, `cpu_time`, `reads`, `logical_reads`,
    and `writes` columns provide execution statistics for the request.


    *   The `sql_handle`, `statement_start_offset`, and `statement_end_offset` columns
    allow you to get information about the query. In SQL Server 2016 and above, you
    can use it together with the function `sys.dm_exec_input_buffer` to obtain information
    about currently running SQL statements. You can also use the `sys.dm_exec_sql_text`
    function for such a purpose, as you have already seen in this book.


    *   The `plan_handle` column allows you to obtain the execution plan of the statement
    using the `sys.dm_exec_query_plan` and `sys.dm_exec_text_query_plan` functions.


    *   The `status` column provides you with the status of the worker. For blocked
    sessions in `SUSPENDED` status, you can use the `wait_type`, `wait_time`, `wait_resource`,
    and `blocking_session_id` columns to get information about session wait and blocker.
    Moreover, the `last_wait_type` column will show the last wait type for the session.


    There are many scenarios where the `sys.dm_exec_requests` view may help with troubleshooting.
    One of them is when analyzing the state of a long-running statement. You can look
    at the status and wait-related columns to see if a request is running or being
    blocked, identifying a blocking session by the `blocking_session_id` column.


    **Note**


    You can get more information about the `sys.dm_exec_requests` view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-requests-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-requests-transact-sql).


    ### sys.dm_os_waiting_tasks View


    You can get more information about blocked sessions by using the `sys.dm_os_waiting_tasks`
    view. This view returns data on the tasks/workers level, which is beneficial when
    you analyze blocking for queries with parallel execution plans. The output includes
    one row per blocked worker and provides information about wait type and duration,
    blocked resource, and ID of the blocking session.


    **Note**


    You can get more information about the `sys.dm_os_waiting_tasks` view at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-os-waiting-tasks-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-os-waiting-tasks-transact-sql).


    ### sys.dm_exec_session_wait_stats view and wait_info xEvent


    In some cases, you may want to track waits on the session level; for example,
    when you troubleshoot the performance of long-running queries. Detailed wait information
    will allow you to understand what may cause the delays and adjust your tuning
    strategy accordingly.


    SQL Server 2016 and above provide you this information with the `sys.dm_exec_session_wait_stats`
    view. This view, in a nutshell, returns similar data as `sys.dm_os_wait_stats`
    does, collected on the session level. It clears the information when the session
    is opened or when the polled connection is reset.


    The `sys.dm_exec_session_wait_stats` view is useful when you suspect that a query
    suffers from a large number of short-term blocking waits. Such waits may not trigger
    a *blocked process report*; however, they may lead to a large cumulative blocking
    time.


    In SQL Server prior to 2016, you can track session-level waits with the `wait_info`
    Extended Event using the `opcode=1` predicate, which indicates the end of the
    wait. As you can guess, this session may generate an enormous amount of information,
    which can impact server performance. Do not keep it running unless you are troubleshooting,
    and do not use the `event_file` target due to the I/O system latency it would
    introduce.


    You may set the predicate on the `duration` field, capturing only long-term waits—for
    example, waits longer than 50ms. You can also reduce the amount of collected information
    by using a `session_id` filter. Unfortunately, `session_id` is an action for a
    `wait_type` event, which adds some overhead during data collection. SQL Server
    executes actions after it evaluates the predicates on Extended Event fields, and
    it is beneficial to remove unnecessary wait types from the processing.


    Listing [12-3](#463519_1_En_12_Chapter.xhtml#PC3) provides a list of map values
    that correspond to each wait type, which you can use as the filter for the wait
    types.


    ```

    select name, map_key, map_value

    from sys.dm_xe_map_values

    where name = ''wait_types''

    order by map_key

    Listing 12-3

    Wait_type map values

    ```


    Finally, another External Event, `wait_type_external`, captures information about
    preemptive waits (`PREEMPTIVE*` wait types). Those waits are associated with external
    OS calls; for example, when SQL Server needs to zero-initialize a log file or
    authenticate a user in Active Directory. In some cases, you need to troubleshoot
    them; however, those cases are not related to blocking and concurrency issues.'
