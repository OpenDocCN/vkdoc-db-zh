  trans: '

    # 重要提示


    许多数据库架构比较工具会在修改脚本中使用显式事务。当你在其他用户正在访问系统的实时服务器上运行此脚本时，这可能会导致严重的阻塞。


    SQL Server 在修改分区函数时也会使用架构修改锁。当此类修改导致数据移动或扫描时，这会严重影响系统的可用性。所有使用该分区函数的分区表的访问都会被阻塞，直到操作完成。


    ## 架构稳定性锁


    `架构稳定性锁`在 DML 查询编译和执行期间使用。SQL Server 会获取它，无论事务隔离级别如何，即使在`READ UNCOMMITTED`模式下也是如此。它们的唯一目的是在查询访问表时，保护表不被更改或删除。`架构稳定性锁`与任何其他锁类型都兼容，但`架构修改锁`除外。


    SQL Server 可以执行一些优化来减少获取的锁数量。虽然在查询编译期间始终使用`架构稳定性锁`，但 SQL Server 可以在查询执行期间用意向对象锁替换它。让我们看一下表
    8-1 中的示例。


    ## 架构锁：查询编译


    表 8-1


    | 会话 1 (SPID=64) | 会话 2 (SPID=65) | 会话 3 (SPID=66) |

    | --- | --- | --- |

    | `begin tran`<br>`alter table Delivery.Orders`<br>`add Dummy int;` |  |  |

    |  | `select count(*) from Delivery.Orders with (nolock);` | `delete from Delivery.Orders
    where OrderId = 1;` |

    | `select`<br>`request_session_id, resource_type, request_type, request_mode,
    request_status`<br>`from sys.dm_tran_locks`<br>`where resource_type = ''OBJECT'';`<br>`rollback`
    |  |  |


    第一个会话启动事务并修改表，在那里获取了一个`架构修改锁`。在下一步中，另外两个会话分别在`READ UNCOMMITTED`隔离级别下运行`SELECT`语句和`DELETE`语句。


    如图 8-1 所示，会话 2 和 3 因等待查询编译所需的`架构稳定性锁`而被阻塞。


    ![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig1_HTML.jpg](img/463519_1_En_8_Fig1_HTML.jpg)


    图 8-1

    查询编译期间的架构锁


    ## 带有缓存计划的架构锁


    如果你第二次运行该示例，此时查询已被编译且计划已缓存，你会看到略有不同的情况，如图 8-2 所示。


    ![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig2_HTML.jpg](img/463519_1_En_8_Fig2_HTML.jpg)


    图 8-2

    执行计划被缓存时的架构锁


    第二个会话仍然会等待授予`架构稳定性锁`。在`READ UNCOMMITTED`模式下没有`共享锁`，而`架构稳定性锁`是在执行期间保持架构稳定的唯一方式。但是，运行`DELETE`语句的会话会等待`意向排他锁`。无论如何都需要获取该锁类型，因为它也与`架构修改锁`不兼容并能防止架构被更改，所以它可以替换`架构稳定性锁`。


    ## 混合锁导致的死锁


    在同一事务中混合使用`架构修改锁`与其他锁类型会增加死锁的可能性。假设我们有两个会话：第一个启动事务，并更新表中的一行。此时，它持有该行上的`排他锁`以及页和表上的两个`意向排他锁`。如果另一个会话尝试读取（或更新）同一行，它将被阻塞。此时，它会等待该行上的`共享锁`，并在页和表上持有`意向共享锁`。此阶段如图
    8-3 所示。（省略了页级意向锁。）


    ![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig3_HTML.jpg](img/463519_1_En_8_Fig3_HTML.jpg)


    图 8-3

    由于混合 DDL 和 DML 语句导致的死锁：步骤 1 和 2


    如果此时第一个会话想要修改表，它需要获取`架构修改锁`。该锁类型与任何其他锁类型都不兼容，而该会话会被第二个会话持有的`意向共享锁`阻塞，这导致了死锁条件，如图
    8-4 所示。


    ![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig4_HTML.jpg](img/463519_1_En_8_Fig4_HTML.jpg)


    图 8-4

    由于混合 DDL 和 DML 语句导致的死锁：步骤 3


    值得注意的是，这种特定的死锁模式可能发生在任何完整的表级锁上。然而，`架构修改锁`由于与系统中所有其他锁类型不兼容，增加了死锁的可能性。

    '
- fmt: '## Lock Queues and Lock Compatibility


    Up until now, we have looked at blocking conditions with only two sessions involved
    and with an incompatible lock type already being held on a resource. In real life,
    the situation is usually more complicated. In busy systems, it is common to have
    dozens or even hundreds of sessions accessing the same resource—a table, for example—simultaneously.
    Let’s look at several examples and analyze lock compatibility rules when multiple
    sessions are involved.


    ### Multiple Sessions and READ COMMITTED Isolation Level


    First, let’s look at a scenario where multiple sessions are acquiring row-level
    locks. As you can see in Table 8-2, the first session `(SPID=55)` holds a shared
    (`S`) lock on the row. The second session `(SPID=54)` is trying to acquire an
    exclusive (`X`) lock on the same row, and it is being blocked due to lock incompatibility.
    The third session `(SPID=53)` is reading the same row in the `READ COMMITTED`
    transaction isolation level. This session has not been blocked.


    Table 8-2: Multiple Sessions and Lock Compatibility: READ COMMITTED Isolation
    Level


    | Session 1 (SPID=55) | Session 2 (SPID=54) | Session 3 (SPID=53) |

    | --- | --- | --- |

    | ```begin tran    select OrderId, Amount    from Delivery.Orders        with
    (repeatableread)    where OrderId = 1;``` | | |

    | | ```-- Blockeddelete from Delivery.Orders where OrderId = 1;``` | ```-- Successselect
    OrderId, Amount from Delivery.Orders    with (readcommitted)where OrderId = 1;```
    |

    | ```    select          l.request_session_id as [SPID]        ,l.resource_description        ,l.resource_type        ,l.request_mode        ,l.request_status        ,r.blocking_session_id    from          sys.dm_tran_locks
    l join    sys.dm_exec_requests r on    l.request_session_id =                r.session_id    where
    l.resource_type = ''KEY''rollback``` | | |


    Figure 8-5 illustrates the row-level locks held on the row with `OrderId=1`.


    ![Lock compatibility with more than two sessions: READ COMMITTED](images/463519_1_En_8_Chapter/463519_1_En_8_Fig5_HTML.jpg)


    As you can see in Figure 8-6, the third session (`SPID=53`) did not even try to
    acquire a shared (`S`) lock on the row. There is already a shared (`S`) lock on
    the row held by the first session (`SPID=55`), which guarantees that the row has
    not been modified by uncommitted transactions. In the `READ COMMITTED` isolation
    level, a shared (`S`) lock releases immediately after a row is read. As a result,
    session 3 (`SPID=53`) does not need to hold its own shared (`S`) lock after reading
    the row, and it can rely on the lock from session 1.


    ![Locks acquired during the operation](images/463519_1_En_8_Chapter/463519_1_En_8_Fig6_HTML.jpg)


    ### Multiple Sessions and REPEATABLE READ Isolation Level


    Let’s change our example and see what happens if the third session tries to read
    the row in a `REPEATABLE READ` isolation level, where a shared (`S`) lock needs
    to be held until the end of the transaction, as shown in Table 8-3. In this case,
    the third session cannot rely on the shared (`S`) lock from another session, because
    it would have a different lifetime. The session will need to acquire its own shared
    (`S`) lock, and it will be blocked due to an incompatible exclusive (`X`) lock
    from the second session in the queue.


    Table 8-3: Multiple Sessions and Lock Compatibility (REPEATABLE READ Isolation
    Level)


    | Session 1 (SPID=55) | Session 2 (SPID=54) | Session 3 (SPID=53) |

    | --- | --- | --- |

    | ```begin tran  select OrderId, Amount  from Delivery.Orders       with (repeatableread)  where
    OrderId = 1;``` | | |

    | | ```-- Blockeddelete from Delivery.Orders where OrderId = 1;``` | ```-- Blockedselect
    OrderId, Amountfrom Delivery.Orders    with (repeatableread)where OrderId = 1;```
    |

    | ```  select      l.request_session_id       as [SPID],l.resource_description    ,l.resource_type    ,l.request_mode    ,l.request_status,r.blocking_session_id  from      sys.dm_tran_locks
    l join    sys.dm_exec_requests r        on    l.request_session_id =            r.session_id  where
    l.resource_type = ''KEY'';rollback``` | | |


    Figure 8-7 illustrates the row-level lock requests at this point.


    ![Lock compatibility with more than two sessions](images/463519_1_En_8_Chapter/463519_1_En_8_Fig7_HTML.jpg)


    ### Important Conclusion


    This leads us to a very important conclusion: In order to be granted, a lock needs
    to be compatible with all of the lock requests on that resource—granted or not.'
  raw: '## Lock Queues and Lock Compatibility


    Up until now, we have looked at blocking conditions with only two sessions involved
    and with an incompatible lock type already being held on a resource. In real life,
    the situation is usually more complicated. In busy systems, it is common to have
    dozens or even hundreds of sessions accessing the same resource—a table, for example—simultaneously.
    Let’s look at several examples and analyze lock compatibility rules when multiple
    sessions are involved.


    First, let’s look at a scenario where multiple sessions are acquiring row-level
    locks. As you can see in Table [8-2](#463519_1_En_8_Chapter.xhtml#Tab2), the first
    session `(SPID=55)` holds a shared (S) lock on the row. The second session `(SPID=54)`
    is trying to acquire an exclusive (X) lock on the same row, and it is being blocked
    due to lock incompatibility. The third session `(SPID=53)` is reading the same
    row in the `READ COMMITTED` transaction isolation level. This session has not
    been blocked.


    Table 8-2


    Multiple Sessions and Lock Compatibility: READ COMMITTED Isolation Level


    | Session 1 (SPID=55) | Session 2 (SPID=54) | Session 3 (SPID=53) |

    | --- | --- | --- |

    | `begin tran`    `select OrderId, Amount`    `from Delivery.Orders`        `with
    (repeatableread)`    `where OrderId = 1;` |   |   |

    |   | `-- Blocked``delete from Delivery.Orders where OrderId = 1;` | `-- Successselect
    OrderId, Amount from Delivery.Orders``with (readcommitted)where OrderId = 1;`
    |

    |     `select`         `l.request_session_id as [SPID]`        `,l.resource_description`        `,l.resource_type`       `,l.request_mode`        `,l.request_status`        `,r.blocking_session_id`    `from`         `sys.dm_tran_locks
    l join``sys.dm_exec_requests r on``l.request_session_id =`                `r.session_id`    `where
    l.resource_type = ''KEY''rollback` |   |   |


    Figure [8-5](#463519_1_En_8_Chapter.xhtml#Fig5) illustrates the row-level locks
    held on the row with `OrderId=1`.


    ![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig5_HTML.jpg](images/463519_1_En_8_Chapter/463519_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    Lock compatibility with more than two sessions: READ COMMITTED


    As you can see in Figure [8-6](#463519_1_En_8_Chapter.xhtml#Fig6), the third session
    (`SPID=53)` did not even try to acquire a shared (S) lock on the row. There is
    already a shared (S) lock on the row held by the first session (`SPID=55)`, which
    guarantees that the row has not been modified by uncommitted transactions. In
    the `READ COMMITTED` isolation level, a shared (S) lock releases immediately after
    a row is read. As a result, session 3 (`SPID=53)` does not need to hold its own
    shared (S) lock after reading the row, and it can rely on the lock from session
    1.


    ![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig6_HTML.jpg](images/463519_1_En_8_Chapter/463519_1_En_8_Fig6_HTML.jpg)


    Figure 8-6


    Locks acquired during the operation


    Let’s change our example and see what happens if the third session tries to read
    the row in a `REPEATABLE READ` isolation level, where a shared (S) lock needs
    to be held until the end of the transaction, as shown in Table [8-3](#463519_1_En_8_Chapter.xhtml#Tab3).
    In this case, the third session cannot rely on the shared (S) lock from another
    session, because it would have a different lifetime. The session will need to
    acquire its own shared (S) lock, and it will be blocked due to an incompatible
    exclusive (X) lock from the second session in the queue.


    Table 8-3


    Multiple Sessions and Lock Compatibility (REPEATABLE READ Isolation Level)


    | Session 1 (SPID=55) | Session 2 (SPID=54) | Session 3 (SPID=53) |

    | --- | --- | --- |

    | `begin tran`  `select OrderId, Amount`  `from Delivery.Orders`       `with (repeatableread)`  `where
    OrderId = 1;` |   |   |

    |   | `-- Blockeddelete from Delivery.Orders where OrderId = 1;` | `-- Blockedselect
    OrderId, Amountfrom Delivery.Orders``with (repeatableread)where OrderId = 1;`
    |

    |   `select     l.request_session_id`       `as [SPID],l.resource_description`    `,l.resource_type`    `,l.request_mode`    `,l.request_status,r.blocking_session_id`  `from`     `sys.dm_tran_locks
    l join``sys.dm_exec_requests r`      `on``l.request_session_id =`            `r.session_id`  `where
    l.resource_type = ''KEY'';``rollback` |   |   |


    Figure [8-7](#463519_1_En_8_Chapter.xhtml#Fig7) illustrates the row-level lock
    requests at this point.


    ![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig7_HTML.jpg](images/463519_1_En_8_Chapter/463519_1_En_8_Fig7_HTML.jpg)


    Figure 8-7


    Lock compatibility with more than two sessions


    This leads us to a very important conclusion: *In order to be granted, a lock
    needs to be compatible with all of the lock requests on that resource—granted
    or not*.'
  trans: '

    ## 锁队列与锁兼容性


    到目前为止，我们所讨论的阻塞情况仅涉及两个会话，并且资源上已持有不兼容的锁类型。在实际情况中，问题通常更为复杂。在繁忙的系统中，同时有数十甚至数百个会话访问同一资源（例如一个表）是很常见的。让我们通过几个例子，来分析在多会话场景下的锁兼容性规则。


    ### 多会话与 READ COMMITTED 隔离级别


    首先，让我们看一个多个会话获取行级锁的场景。如表 8-2 所示，第一个会话`(SPID=55)`在该行上持有一个共享锁(`S`)。第二个会话`(SPID=54)`试图在同一行上获取一个排他锁(`X`)，但由于锁不兼容而被阻塞。第三个会话`(SPID=53)`在`READ
    COMMITTED`事务隔离级别下读取同一行。该会话没有被阻塞。


    **表 8-2：多会话与锁兼容性：READ COMMITTED 隔离级别**


    | 会话 1 (SPID=55) | 会话 2 (SPID=54) | 会话 3 (SPID=53) |

    | --- | --- | --- |

    | ```begin tran    select OrderId, Amount    from Delivery.Orders        with
    (repeatableread)    where OrderId = 1;``` | | |

    | | ```-- 被阻塞 delete from Delivery.Orders where OrderId = 1;``` | ```-- 成功 select
    OrderId, Amount from Delivery.Orders    with (readcommitted)where OrderId = 1;```
    |

    | ```    select          l.request_session_id as [SPID]        ,l.resource_description        ,l.resource_type        ,l.request_mode        ,l.request_status        ,r.blocking_session_id    from          sys.dm_tran_locks
    l join    sys.dm_exec_requests r on    l.request_session_id =                r.session_id    where
    l.resource_type = ''KEY''rollback``` | | |


    图 8-5 展示了在`OrderId=1`的行上持有的行级锁。


    ![超过两个会话时的锁兼容性：READ COMMITTED](img/463519_1_En_8_Fig5_HTML.jpg)


    如图 8-6 所示，第三个会话(`SPID=53`)甚至没有尝试在该行上获取共享锁(`S`)。该行上已经有一个由第一个会话(`SPID=55`)持有的共享锁(`S`)，这保证了该行没有被未提交的事务修改过。在`READ
    COMMITTED`隔离级别下，共享锁(`S`)在行被读取后会立即释放。因此，会话 3(`SPID=53`)在读取该行后无需持有自己的共享锁(`S`)，它可以依赖来自会话
    1 的锁。


    ![操作期间获取的锁](img/463519_1_En_8_Fig6_HTML.jpg)


    ### 多会话与 REPEATABLE READ 隔离级别


    让我们修改例子，看看如果第三个会话尝试在`REPEATABLE READ`隔离级别下读取该行会发生什么。在该隔离级别下，共享锁(`S`)需要持有到事务结束，如表
    8-3 所示。这种情况下，第三个会话不能依赖来自其他会话的共享锁(`S`)，因为它的生命周期可能不同。该会话需要获取自己的共享锁(`S`)，但将被队列中第二个会话持有的不兼容排他锁(`X`)所阻塞。


    **表 8-3：多会话与锁兼容性 (REPEATABLE READ 隔离级别)**


    | 会话 1 (SPID=55) | 会话 2 (SPID=54) | 会话 3 (SPID=53) |

    | --- | --- | --- |

    | ```begin tran  select OrderId, Amount  from Delivery.Orders       with (repeatableread)  where
    OrderId = 1;``` | | |

    | | ```-- 被阻塞 delete from Delivery.Orders where OrderId = 1;``` | ```-- 被阻塞 select
    OrderId, Amountfrom Delivery.Orders    with (repeatableread)where OrderId = 1;```
    |

    | ```  select      l.request_session_id       as [SPID],l.resource_description    ,l.resource_type    ,l.request_mode    ,l.request_status,r.blocking_session_id  from      sys.dm_tran_locks
    l join    sys.dm_exec_requests r        on    l.request_session_id =            r.session_id  where
    l.resource_type = ''KEY'';rollback``` | | |


    图 8-7 展示了此时的行级锁请求。


    ![超过两个会话时的锁兼容性](img/463519_1_En_8_Fig7_HTML.jpg)


    ### 重要结论


    这让我们得出一个非常重要的结论：一个锁要被授予，必须与该资源上的**所有**锁请求（无论是否已授予）都兼容。

