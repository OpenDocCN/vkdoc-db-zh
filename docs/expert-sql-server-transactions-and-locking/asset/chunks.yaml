    ### 锁等待：总结


    表 12-1 总结了常见锁相关等待类型的根本原因及故障排除步骤。


    **表 12-1** 最常见的锁相关等待类型


    | 等待类型 | 可能的根本原因 | 故障排除步骤 |

    | --- | --- | --- |

    | `LCK_M_U` | 由于查询优化不佳导致的更新扫描 | 使用查询存储、`sys.dm_exec_query_stats`、xEvent 会话、阻塞监控框架检测并优化优化不佳的查询
    |

    | `LCK_M_X` | 多个会话处理相同数据 | 更改代码 |

    | | 由于查询优化不佳导致的更新扫描 | 使用查询存储、`sys.dm_exec_query_stats`、xEvent 会话、阻塞监控框架检测并优化优化不佳的查询
    |

    | `LCK_M_S` | 由于查询优化不佳导致的扫描 | 使用查询存储、`sys.dm_exec_query_stats`、xEvent 会话、阻塞监控框架检测并优化优化不佳的查询<br>考虑切换到乐观隔离级别
    |

    | `LCK_M_U`, `LCK_M_S`, `LCK_M_X` | 事务管理不正确，长时间运行的事务持有不兼容的锁 | 重新设计事务策略。优化查询 |

    | `LCK_M_SCH_S`, `LCK_M_SCH_M` | 由于数据库架构更改或索引或分区维护导致的阻塞 | 评估部署和维护策略。如果可能，切换到低优先级锁
    |

    | `LCK_M_I*` | 由于数据库架构更改或索引或分区维护导致的阻塞 | 评估部署和维护策略 |

    | | 锁升级 | 分析并在受影响的表上禁用锁升级 |


    正如我已经提到的，系统中的每种锁类型都有对应的等待类型。你可能会遇到本章未涉及的其他锁相关等待类型。尽管如此，了解 SQL Server 并发模型将有助于你进行故障排除。分析可能产生此类锁类型的阻塞状况，并确定阻塞的根本原因。


    ## 数据管理视图


    SQL Server 提供了一组庞大的数据管理视图，用于公开有关系统运行状况和 SQL Server 状态的信息。我想提及几个我们尚未介绍的视图。


    ### sys.dm_exec_requests 视图


    `sys.dm_exec_requests` 视图提供了当前正在执行的请求列表。此视图在故障排除过程中极为有用，它为你提供了服务器上当前运行会话的极高可见性。该视图中最值得注意的列如下：


    *   `session_id` 列提供会话的 ID。系统中的用户会话的 `session_id` 始终大于 50，尽管某些系统会话的 `session_id`
    也可能大于 50。你可以通过将结果与 `sys.dm_exec_sessions` 和 `sys.dm_exec_connections` 视图进行联接来获取有关会话和客户端应用程序的信息。


    *   `start_time`、`total_elapsed_time`、`cpu_time`、`reads`、`logical_reads` 和 `writes`
    列提供了请求的执行统计信息。


    *   `sql_handle`、`statement_start_offset` 和 `statement_end_offset` 列允许你获取有关查询的信息。在
    SQL Server 2016 及更高版本中，你可以将其与函数 `sys.dm_exec_input_buffer` 结合使用，以获取有关当前正在运行的 SQL
    语句的信息。你也可以使用 `sys.dm_exec_sql_text` 函数达到此目的，正如你在本书中已经看到的那样。


    *   `plan_handle` 列允许你使用 `sys.dm_exec_query_plan` 和 `sys.dm_exec_text_query_plan`
    函数获取语句的执行计划。


    *   `status` 列为你提供工作线程的状态。对于处于 `SUSPENDED` 状态的被阻塞会话，你可以使用 `wait_type`、`wait_time`、`wait_resource`
    和 `blocking_session_id` 列来获取有关会话等待和阻塞者的信息。此外，`last_wait_type` 列将显示会话的上一次等待类型。


    有许多场景下 `sys.dm_exec_requests` 视图可能有助于故障排除。其中之一是在分析长时间运行语句的状态时。你可以查看状态和与等待相关的列，以查看请求是正在运行还是被阻塞，并通过
    `blocking_session_id` 列识别阻塞会话。


    **注意**


    你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-requests-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-requests-transact-sql)
    获取有关 `sys.dm_exec_requests` 视图的更多信息。


    ### sys.dm_os_waiting_tasks 视图


    你可以使用 `sys.dm_os_waiting_tasks` 视图获取有关被阻塞会话的更多信息。此视图在任务/工作线程级别返回数据，这在分析具有并行执行计划的查询的阻塞时是有益的。输出包括每个被阻塞工作线程一行，并提供有关等待类型和持续时间、被阻塞资源以及阻塞会话
    ID 的信息。


    **注意**


    你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-os-waiting-tasks-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-os-waiting-tasks-transact-sql)
    获取有关 `sys.dm_os_waiting_tasks` 视图的更多信息。


    ### sys.dm_exec_session_wait_stats 视图和 wait_info xEvent


    在某些情况下，你可能希望在会话级别跟踪等待；例如，当你排查长时间运行查询的性能问题时。详细的等待信息将使你能够理解可能导致延迟的原因，并相应地调整你的优化策略。


    SQL Server 2016 及更高版本通过 `sys.dm_exec_session_wait_stats` 视图为你提供此信息。简而言之，此视图返回与
    `sys.dm_os_wait_stats` 类似的数据，但在会话级别收集。它在会话打开或轮询连接重置时清除信息。


    当你怀疑某个查询遭受大量短期阻塞等待时，`sys.dm_exec_session_wait_stats` 视图非常有用。此类等待可能不会触发*被阻塞进程报告*；但是，它们可能导致累积阻塞时间很长。


    在 SQL Server 2016 之前的版本中，你可以使用 `opcode=1` 谓词（指示等待结束）通过 `wait_info` 扩展事件来跟踪会话级等待。正如你可以猜到的，此会话可能会生成海量信息，从而影响服务器性能。除非你正在进行故障排除，否则不要保持其运行，并且由于它会引入
    I/O 系统延迟，不要使用 `event_file` 目标。


    你可以将谓词设置在 `duration` 字段上，仅捕获长期等待——例如，等待时间超过 50 毫秒。你也可以通过使用 `session_id` 过滤器来减少收集的信息量。不幸的是，`session_id`
    是 `wait_type` 事件的一个操作，这会在数据收集期间增加一些开销。SQL Server 在对扩展事件字段评估谓词后执行操作，因此从处理中移除不必要的等待类型是有益的。


    清单 12-3 提供了与每个等待类型对应的映射值列表，你可以将其用作等待类型的过滤器。


    ```

    select name, map_key, map_value

    from sys.dm_xe_map_values

    where name = ''wait_types''

    order by map_key

    Listing 12-3

    Wait_type 映射值

    ```


    最后，另一个扩展事件 `wait_type_external` 捕获有关抢先式等待（`PREEMPTIVE*` 等待类型）的信息。这些等待与外部 OS 调用相关联；例如，当
    SQL Server 需要将日志文件零初始化或在 Active Directory 中验证用户身份时。在某些情况下，你需要对它们进行故障排除；然而，这些情况与阻塞和并发问题无关。

    '
- fmt: '## Note


    You can get more information about the `sys.dm_exec_session_wait_stats` view at
    [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-session-wait-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-session-wait-stats-transact-sql).
    You can read about Extended Events at [`https://docs.microsoft.com/en-us/sql/relational-databases/extended-events/extended-events`](https://docs.microsoft.com/en-us/sql/relational-databases/extended-events/extended-events).


    ## sys.dm_db_index_operational_stats and sys.dm_db_index_usage_stats Views


    SQL Server tracks index usage statistics with the `sys.dm_db_index_usage_stats`
    and `sys.dm_db_index_operational_stats` views. They provide information about
    index access patterns, such as number of seeks, scans, and lookups; number of
    data modifications in the index; latching and locking statistics; and many other
    useful metrics.


    The `sys.dm_db_index_usage_stats` view focuses mainly on index access patterns,
    counting the number of queries that utilize the index. The `sys.dm_db_index_operational_stats`
    view, on the other hand, tracks operations on a per-row basis. For example, if
    you ran a query that updated ten index rows in a single batch, the `sys.dm_db_index_usage_stats`
    view would count it as one data modification and increment the `user_updates`
    column by one, while the `sys.dm_db_index_operational_stats` view would increment
    the `leaf_update_count` column by ten based on the number of rows affected by
    the operation.


    Both views are extremely useful during index analysis and allow you to detect
    unused and inefficient indexes. Moreover, the `sys.dm_db_index_operational_stats`
    view gives you very useful insight into index operational metrics and helps to
    identify the indexes that suffer from a large amount of blocking, latching, and
    physical disk activity.


    From a locking standpoint, the `sys.dm_db_index_operational_stats` view includes
    three different set of columns:


    *   `row_lock_count`, `row_lock_wait_count`, and `row_lock_wait_ms` indicate the
    number of row-level locks requested in the index along with lock wait statistics.

    *   `page_lock_count`, `page_lock_wait_count`, and `page_lock_wait_ms` show locking
    information on the page level.

    *   `index_lock_promotion_count` and `index_lock_promotion_attempt_count` return
    lock escalation statistics.


    You can correlate this information with other venues during troubleshooting. For
    example, when you analyze the impact of lock escalations in the system, you can
    look at `index_lock_promotion_count` column values and identify the indexes that
    triggered lock escalation most often.


    Listing 12-4 shows a query that returns ten indexes with the highest row- and
    page-level lock wait times, helping you to identify the indexes that suffer the
    most from blocking.


    ```sql

    select top 10

    t.object_id

    ,i.index_id

    ,sch.name + ''.'' + t.name as [table]

    ,i.name as [index]

    ,ius.user_seeks

    ,ius.user_scans

    ,ius.user_lookups

    ,ius.user_seeks + ius.user_scans + ius.user_lookups as reads

    ,ius.user_updates

    ,ius.last_user_seek

    ,ius.last_user_scan

    ,ius.last_user_lookup

    ,ius.last_user_update

    ,ios.*

    from

    sys.tables t with (nolock) join sys.indexes i with (nolock) on

    t.object_id = i.object_id

    join sys.schemas sch with (nolock)  on

    t.schema_id = sch.schema_id

    left join sys.dm_db_index_usage_stats ius with (nolock) on

    i.object_id = ius.object_id and

    i.index_id = ius.index_id

    outer apply

    (

    select

    sum(range_scan_count) as range_scan_count

    ,sum(singleton_lookup_count) as singleton_lookup_count

    ,sum(row_lock_wait_count) as row_lock_wait_count

    ,sum(row_lock_wait_in_ms) as row_lock_wait_in_ms

    ,sum(page_lock_wait_count) as page_lock_wait_count

    ,sum(page_lock_wait_in_ms) as page_lock_wait_in_ms

    ,sum(page_latch_wait_count) as page_latch_wait_count

    ,sum(page_latch_wait_in_ms) as page_latch_wait_in_ms

    ,sum(page_io_latch_wait_count) as page_io_latch_wait_count

    ,sum(page_io_latch_wait_in_ms) as page_io_latch_wait_in_ms

    from sys.dm_db_index_operational_stats(db_id(),i.object_id,i.index_id,null)

    ) ios

    order by

    ios.row_lock_wait_in_ms + ios.page_lock_wait_in_ms desc

    ```


    **Listing 12-4** Indexes with the highest lock wait times


    Figure 12-6 shows the partial output of the query from one of the production servers.
    Note that the first index in the output has a very low number of reads and high
    update overhead and may potentially be removed from the system.


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig6_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig6_HTML.jpg)


    **Figure 12-6** Indexes with the highest lock wait times


    You can detect the queries that utilize a specific index by using the code from
    Listing 12-5. The results are not bulletproof, however; this code analyzes the
    cached execution plans and may miss queries that do not have plans cached for
    some reason. You can adjust it to use Query Store DMVs, if it is enabled in the
    system.


    As a word of caution, this code is CPU intensive. Be careful when you run it on
    CPU-bound production servers with a large number of plans in the cache.


    ```sql

    declare

    @IndexName sysname = quotename(''IDX_CI''); -- Add Index Name here

    ;with xmlnamespaces(default ''http://schemas.microsoft.com/sqlserver/2004/07/showplan'')

    ,CachedData

    as

    (

    select distinct

    obj.value(''@Database'',''sysname'') as [Database]

    ,obj.value(''@Schema'',''sysname'') + ''.'' +

    obj.value(''@Table'',''sysname'') as [Table]

    ,obj.value(''@Index'',''sysname'') as [Index]

    ,obj.value(''@IndexKind'',''varchar(64)'') as [Type]

    ,stmt.value(''@StatementText'', ''nvarchar(max)'') as [Statement]

    ,convert(nvarchar(max),qp.query_plan) as query_plan

    ,cp.plan_handle

    from

    sys.dm_exec_cached_plans cp with (nolock)

    cross apply sys.dm_exec_query_plan(plan_handle) qp

    cross apply query_plan.nodes

    (''/ShowPlanXML/BatchSequence/Batch/Statements/StmtSimple'') batch(stmt)

    cross apply stmt.nodes

    (''.//IndexScan/Object[@Index=sql:variable("@IndexName")]'') idx(obj)

    )

    select

    cd.[Database]

    ,cd.[Table]

    ,cd.[Index]

    ,cd.[Type]

    ,cd.[Statement]

    ,convert(xml,cd.query_plan) as query_plan

    ,qs.execution_count

    ,(qs.total_logical_reads + qs.total_logical_writes) /

    qs.execution_count as [Avg IO]

    ,qs.total_logical_reads

    ,qs.total_logical_writes

    ,qs.total_worker_time

    ,qs.total_worker_time / qs.execution_count /

    1000 as [Avg Worker Time (ms)]

    ,qs.total_rows

    ,qs.creation_time

    ,qs.last_execution_time

    from

    CachedData cd

    outer apply

    (

    select

    sum(qs.execution_count) as execution_count

    ,sum(qs.total_logical_reads) as total_logical_reads

    ,sum(qs.total_logical_writes) as total_logical_writes

    ,sum(qs.total_worker_time) as total_worker_time

    ,sum(qs.total_rows) as total_rows

    ,min(qs.creation_time) as creation_time

    ,max(qs.last_execution_time) as last_execution_time

    from sys.dm_exec_query_stats qs with (nolock)

    where qs.plan_handle = cd.plan_handle

    ) qs

    option (recompile, maxdop 1)

    ```


    **Listing 12-5** Identifying queries that use a specific index


    Both the `sys.dm_db_index_usage_stats` and the `sys.dm_db_index_operational_stats`
    views provide the information, which is very useful during performance troubleshooting.
    The data, however, may be incomplete. The views do not include usage statistics
    from those queries that run on readable secondaries in Availability Groups. Nor
    does SQL Server persist the data in the database to survive SQL Server restart.
    Finally, in SQL Server 2012 RTM-SP3 CU2, SQL Server 2014 RTM and SP1, the views
    clear at the time of index rebuild operations.


    Use the data with care and correlate results with other venues during analysis.'
