    Figure [2-2](#463519_1_En_2_Chapter.xhtml#Fig2) illustrates the output of the
    code in my environment. As you can see, explicit transactions are about two times
    faster and generated three times less log activity than autocommitted ones.


    ![../images/463519_1_En_2_Chapter/463519_1_En_2_Fig2_HTML.jpg](images/463519_1_En_2_Chapter/463519_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Explicit and autocommitted transaction performance


    SQL Server 2014 and above allows you to improve transaction log throughput by
    using *delayed durability*. In this mode, SQL Server does not flush log buffers
    when `COMMIT` log records are generated. This reduces the number of disk writes
    at the cost of potential small data losses in case of disaster.


    ### Note


    You can read more about delayed durability at [`https://docs.microsoft.com/en-us/sql/relational-databases/logs/control-transaction-durability`](https://docs.microsoft.com/en-us/sql/relational-databases/logs/control-transaction-durability)
    or in my *Pro SQL Server Internals* book.


    SQL Server also supports *implicit transactions*, which you can enable with the
    `SET IMPLICIT_TRANSACTION ON` statement. When this option is enabled, SQL Server
    starts the new transaction when there are no active explicit transactions present.
    This transaction stays active until you explicitly issue a `COMMIT` or `ROLLBACK`
    statement.


    From a performance and transaction log throughput standpoint, implicit transactions
    are similar to explicit ones. However, they make transaction management more complicated
    and are rarely used in production. However, there is a caveat—the `SET ANSI_DEFAULT
    ON` option also automatically enables implicit transactions. This behavior may
    lead to unexpected concurrency issues in the system.


    ### Error Handling


    Error handling in SQL Server is a tricky subject, especially with transactions
    involved. SQL Server handles exceptions differently depending on error severity,
    active transaction context, and several other factors.


    Let’s look at how exceptions affect control flow during execution. Listing [2-2](#463519_1_En_2_Chapter.xhtml#PC2)
    creates two tables—`dbo.Customers` and `dbo.Orders`—and populates them with data.
    Note the existence of a foreign key constraint defined in the `dbo.Orders` table.


    ```

    create table dbo.Customers

    (

    CustomerId int not null,

    constraint PK_Customers

    primary key(CustomerId)

    );

    create table dbo.Orders

    (

    OrderId int not null,

    CustomerId int not null,

    constraint FK_Orders_Customerss

    foreign key(CustomerId)

    references dbo.Customers(CustomerId)

    );

    go

    create proc dbo.ResetData

    as

    begin

    begin tran

    delete from dbo.Orders;

    delete from dbo.Customers;

    insert into dbo.Customers(CustomerId) values(1),(2),(3);

    insert into dbo.Orders(OrderId, CustomerId) values(2,2);

    commit

    end;

    go

    exec dbo.ResetData;

    Listing 2-2

    Error handling: Tables creation

    ```


    Let’s run three `DELETE` statements in one batch, as shown in Listing [2-3](#463519_1_En_2_Chapter.xhtml#PC3).
    The second statement will trigger a *foreign key violation* error . The `@@ERROR`
    system variable provides the error number for the last T-SQL statement executed
    (`0` means no errors).


    ```

    delete from  dbo.Customers where CustomerId = 1; -- Success

    select @@ERROR as [@@ERROR: CustomerId = 1];

    delete from  dbo.Customers where CustomerId = 2; -- FK Violation

    select @@ERROR as [@@ERROR: CustomerId = 2];

    delete from  dbo.Customers where CustomerId = 3; -- Success

    select @@ERROR as [@@ERROR: CustomerId = 3];

    go

    select * from dbo.Customers;

    Listing 2-3

    Error handling: Deleting customers

    ```


    Figure [2-3](#463519_1_En_2_Chapter.xhtml#Fig3) illustrates the output of the
    code. As you can see, SQL Server continues execution after the non-critical *foreign
    key violation* error, deleting the row with `CustomerId=3` afterward.


    ![../images/463519_1_En_2_Chapter/463519_1_En_2_Fig3_HTML.jpg](images/463519_1_En_2_Chapter/463519_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Deleting three customers in the batch


    The situation would change if you use a `TRY..CATCH` block , as shown in Listing
    [2-4](#463519_1_En_2_Chapter.xhtml#PC4).


    ```

    exec dbo.ResetData;

    go

    begin try

    delete from  dbo.Customers where CustomerId = 1; -- Success

    delete from  dbo.Customers where CustomerId = 2; -- FK Violation

    delete from  dbo.Customers where CustomerId = 3; -- Not executed

    end try

    begin catch

    select

    ERROR_NUMBER() as [Error Number]

    ,ERROR_LINE() as [Error Line]

    ,ERROR_MESSAGE() as [Error Message];

    end catch

    go

    select * from dbo.Customers;

    Listing 2-4

    Error handling: Deleting customers in TRY..CATCH block

    ```


    As you can see in Figure [2-4](#463519_1_En_2_Chapter.xhtml#Fig4), the error was
    caught in the `CATCH` block, and the third deletion statement has not been executed.


    ![../images/463519_1_En_2_Chapter/463519_1_En_2_Fig4_HTML.jpg](images/463519_1_En_2_Chapter/463519_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Deleting three customers in TRY..CATCH block


    There are several functions that you can use in the `CATCH` block:


    *   `ERROR_NUMBER()` returns the number of the error that caused the `CATCH` block
    to run.


    *   `ERROR_MESSAGE()` provides an error message.


    *   `ERROR_SEVERITY()` and `ERROR_STATE()` indicate the severity and state number
    of the error, respectively.


    *   `ERROR_PROCEDURE()` returns the name of the stored procedure or trigger in
    which the error occurred. This can be useful if the code has nested stored procedure
    calls with `TRY..CATCH` in the outer module.


    *   `ERROR_LINE()` provides the line number at which the error occurred.


    *   Finally, the `THROW` operator allows you to re-throw an error from the `CATCH`
    block.'
