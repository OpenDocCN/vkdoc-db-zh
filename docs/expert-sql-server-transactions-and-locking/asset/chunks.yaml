- fmt: '### Tuple Mover and ALTER INDEX REORGANIZE Locking


    Finally, let’s look at the locking behavior of the tuple mover process and the
    `ALTER INDEX REORGANIZE` operation. Both of them compress closed delta stores
    into compressed row groups and essentially do the same thing; however, their implementation
    is slightly different. Tuple mover is a single-threaded process that works in
    the background, preserving system resources. Alternatively, index reorganizing
    runs in parallel using multiple threads.


    SQL Server acquires and holds a shared (`S`) lock on the delta store during the
    compression process. These locks do not prevent you from selecting the data from
    a table, nor do they block inserts. New data will be inserted into different and
    open delta stores; however, deletions and data modifications on locked delta stores
    would be blocked for the duration of the operation.


    Figure [14-12](#463519_1_En_14_Chapter.xhtml#Fig12) illustrates `lock_acquired`
    and `lock_released` Extended Events taken on delta stores during the `ALTER INDEX
    REORGANIZE` command. You can see the shared (`S`) locks taken during the operation.


    ![../images/463519_1_En_14_Chapter/463519_1_En_14_Fig12_HTML.jpg](images/463519_1_En_14_Chapter/463519_1_En_14_Fig12_HTML.jpg)


    Figure 14-12

    Locking during ALTER INDEX REORGANIZE command


    The `associated_object_id` column indicates delta store `hobt_id`, which we can
    confirm by analysing the `sys.column_store_row_groups` view. Figure [14-13](#463519_1_En_14_Chapter.xhtml#Fig13)
    shows the state of the row groups after `ALTER INDEX REORGANIZE` has been completed.
    The row groups in the `TOMBSTONE` state indicate delta stores that have just been
    compressed and are waiting to be deallocated. As you can see, the `delta_store_hobt_id`
    values of those filegroups match resources on which shared (`S`) locks were taken.


    ![../images/463519_1_En_14_Chapter/463519_1_En_14_Fig13_HTML.jpg](images/463519_1_En_14_Chapter/463519_1_En_14_Fig13_HTML.jpg)


    Figure 14-13

    Row groups after ALTER INDEX REORGANIZE command


    As you can guess, this behavior would not scale well with update and delete workloads
    in OLTP systems.


    ### Wrapping Up


    While it is appealing to use clustered columnstore indexes to store data in OLTP
    environments, this is rarely the best choice. Updateability in these indexes has
    been designed to simplify ETL processes and perform infrequent data modifications.
    While clustered columnstore indexes may handle append-only workloads, they would
    not scale well in generic OLTP workloads with a large number of concurrent transactions
    that modify data in the table.


    You can still benefit from clustered columnstore indexes in OLTP systems. Many
    of the systems need to retain data for a prolonged period of time, and the volatility
    of the data and workload would change as the data becomes older. You can partition
    the data across several tables, combining columnstore, B-Tree, and In-Memory OLTP
    tables together with partitioned views. This will allow you to get the most from
    each technology, thus improving system performance and reducing the size of the
    data in the database.


    ### Note


    I have discussed this architecture in detail, including the methods for data movements
    between tables, in my `Pro SQL Server Internals` book.


    ### Summary


    Columnstore indexes store data in a column-based format, persisting it on a per-column
    rather than per-row basis. This approach may significantly improve the performance
    of Data Warehouse, Operational Analytics, and reporting workloads in the system.


    The data in columnstore indexes are heavily compressed. Clustered columnstore
    indexes may provide significant storage-space reduction as compared to B-Tree
    tables. They, however, do not scale well from a locking standpoint under OLTP
    workloads with multiple concurrent sessions modifying the data in parallel. You
    should not use them as a replacement for OLTP tables in such environments.


    Finally, I would like to thank you again for reading this book! It was a pleasure
    to write for Thank you!


