    |   |   |

    |   | `insert into dbo.HKData``values(10,10)` |   |

    |      `select ID, Col`     `from dbo.HKData`         `with (repeatableread)`
    |   | Does not return new row (10,10) |

    | `commit` |   | Success |


    As you can see, with memory-optimized tables, other sessions were able to modify
    data that was read by the active `REPEATABLE READ` transaction. This led to a
    transaction abort at the time of `COMMIT` when the repeatable read validation
    failed. This is a completely different behavior than that of disk-based tables,
    where other sessions are blocked, unable to modify data until the `REPEATABLE
