- fmt: '### Note


    你可以通过以下链接获取关于`sys.dm_db_index_usage_stats`视图的更多信息：[`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-index-usage-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-index-usage-stats-transact-sql)。关于`sys.dm_db_index_operational_stats`视图的信息可在此处找到：[`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-index-operational-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-index-operational-stats-transact-sql)。


    ## Blocking Chains


    在解决并发问题时，一个常见的挑战是*阻塞链*，它代表了一种多级阻塞的情况。正如你所记得的，锁请求只有在与资源上所有其他请求（无论它们是已授予还是待处理状态）都兼容时，才能被授予。


    图 12-7 说明了这种情况。会话 1 在表上持有意向排他锁，这与请求的模式修改锁不兼容。模式修改锁与所有锁类型都不兼容，因此会阻止其他所有试图访问该表的会话，即使它们的锁请求与会话
    1 持有的意向排他锁兼容。


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig7_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig7_HTML.jpg)


    **图 12-7 阻塞链**


    当这种情况发生时，会话 2 可能成为系统中大量其他会话的*阻塞会话*。在数据管理视图和被阻塞的进程报告中，它将作为*阻塞者*被显示出来。另一方面，会话 1
    只会成为会话 2 的阻塞会话，这在故障排除时可能会产生误导。


    让我们用一个稍微复杂的代码示例来说明这一点。清单 12-6 在 `SPID=53` 的会话中更新了 `Delivery.Customers` 表的一行。


    ```sql

    begin tran

    update Delivery.Customers

    set Phone = ''111-111-1234''

    where CustomerId = 1;

    -- 清单 12-6

    -- 阻塞链：步骤 1（SPID=53）

    ```


    作为下一步，我们在 `SPID=56` 的会话中运行清单 12-7 的代码。第一条语句在 `Delivery.Orders` 表上获取一个意向排他锁。第二条语句扫描
    `Delivery.Customers` 表，并因与第一个 `SPID=53` 的会话存在不兼容的排他锁而被阻塞。


    ```sql

    begin tran

    update Delivery.Orders

    set Pieces += 1

    where OrderId = 1;

    select count(*)

    from Delivery.Customers with (readcommitted);

    -- 清单 12-7

    -- 阻塞链：步骤 2（SPID=56）

    ```


    接下来，我们在 `SPID=57` 的会话中运行清单 12-8 的代码。此代码试图在 `Delivery.Orders` 表上获取一个共享锁，并将被 `SPID=56`
    的会话持有的不兼容的意向排他锁阻塞。


    ```sql

    select count(*)

    from Delivery.Orders with (tablock);

    -- 清单 12-8

    -- 阻塞链：步骤 3（SPID=57）

    ```


    最后，我们在几个 `SPID=60` 及以上的会话（你可以在每个会话中使用不同的 `OrderId`）中运行清单 12-9 的代码。这些会话需要获取 `Delivery.Orders`
    表上的意向排他锁，并将被 `SPID=57` 的会话持有的不兼容的共享锁请求阻塞。


    ```sql

    update Delivery.Orders

    set Pieces += 1

    where OrderId = 5000;

    -- 清单 12-9

    -- 阻塞链：步骤 4（SPID>=60）

    ```


    图 12-8 展示了 `sys.dm_os_waiting_tasks` 和 `sys.dm_exec_requests` DMV 的部分输出。它可能显示
    `SPID=57` 的会话是阻塞源。然而，这是不正确的，你需要在故障排除时将阻塞链展开，直到 `SPID=53` 的会话。


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig8_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig8_HTML.jpg)


    **图 12-8 sys.dm_os_waiting_tasks 和 sys.dm_exec_requests 视图的输出**


    同样值得注意的是，根本阻塞者 `SPID=53` 并未出现在输出中。`sys.dm_os_waiting_tasks` 和 `sys.dm_exec_requests`
    视图分别显示当前挂起和已执行的请求。在我们的例子中，`SPID=53` 的会话处于*睡眠*状态，因此这两个视图都不包含它。


    图 12-9 显示了 `SPID` 为 60、57 或 56 的会话的阻塞进程报告的部分输出。你可以通过阻塞进程的 `suspended` 状态以及与锁定相关的
    `waitresource` 来检测阻塞链状况。


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig9_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig9_HTML.jpg)


    **图 12-9 被阻塞的进程报告**


    尽管阻塞链可能会增加额外的复杂性，但它们不会改变你的故障排除方法。你需要展开阻塞链以识别阻塞的根本原因并解决该问题。


    ## AlwaysOn 可用性组与阻塞


    AlwaysOn 可用性组可能已成为与 SQL Server 一起使用的最常见的高可用性技术。该技术提供数据库组级别的保护，并在每个服务器/节点上存储数据库的单独副本。这消除了
    SQL Server 级别的单点故障；然而，其内部仍然依赖于 Windows 或 Linux 故障转移群集。


    AlwaysOn 可用性组的实现和维护值得单独写一本书来探讨。然而，有几件事可能会影响系统中的阻塞和并发性。'
