  trans: '## 包含列的索引


    正如我们刚才讨论的，当 SQL Server 预计需要大量的键查找或 RID 查找操作时，它很少使用非聚集索引。这些操作通常会导致大量的逻辑读和物理读。


    在进行键查找操作时，SQL Server 每次需要获取单行数据时，都必须从聚集索引访问多个数据页。尽管根节点和中间索引级别通常缓存在缓冲池中，但访问叶级页面会产生随机（且通常是物理）的
    I/O 读取，这很慢，尤其是在磁盘驱动器的情况下。


    对于堆表也是如此。即使非聚集索引中的`row-id`存储了行在表中的物理位置，并且 RID 查找操作不需要遍历聚集索引树，它们仍然会引入随机 I/O。此外，如果行被更新并移动到另一个页面，转发指针可能会导致额外的读取。


    这里的关键因素是键查找或 RID 查找的存在。非聚集索引中的行比聚集索引中的行更小。非聚集索引使用更少的数据页，因此更高效。只要不需要进行键查找或 RID
    查找，即使预计需要选择大量行，SQL Server 也会使用非聚集索引。


    如您所知，非聚集索引存储索引键列的数据和`row-id`。对于具有聚集索引的表，`row-id`就是索引行的聚集键值。所有索引中的值都是相同的：当您更新一行时，SQL
    Server 会同步更新所有索引。


    当查询所需的所有数据都存在于非聚集索引中时，SQL Server 就不需要执行键查找或 RID 查找。这些索引被称为*覆盖索引*，因为它们提供了查询所需的全部信息，本质上是*覆盖*了该查询。


    使非聚集索引成为*覆盖索引*是最常用的查询优化技术之一，它提高了索引效率，并允许您从执行计划中消除昂贵的键查找或 RID 查找。您可以通过在`CREATE
    INDEX`语句的`INCLUDE`子句中包含所需列来实现这一点。这些列的数据仅存储在叶级，不会添加到索引键中，也不影响索引行的排序顺序。


    图 1-18 展示了一个包含列的索引结构，该索引定义如下：


    ```sql

    CREATE INDEX IDX_Customers_Name ON dbo.Customers(Name) INCLUDE(DateOfBirth)

    ```

    作用于我们之前定义的、以`CustomerId`为聚集索引列的表上。


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig18_HTML.jpg](img/463519_1_En_1_Fig18_HTML.jpg)


    图 1-18

    包含列的索引结构


    现在，如果查询引用的所有列都存在于索引中，SQL Server 就可以直接从非聚集索引 B-树的叶级获取所有数据，而无需执行键查找或 RID 查找。无论需要从那里选择多少行，它都可以使用该索引。


    尽管覆盖索引是一个有助于优化查询的强大工具，但它们也是有代价的。索引中的每个列都会增加其行大小以及在磁盘和内存中使用的数据页数量。这会在索引维护期间引入额外开销，并增加数据库大小。此外，在扫描索引的全部或部分内容时，查询需要读取更多的页。当进行小范围扫描时，与键查找相比，多读取几个页的效率要高得多，这不一定会带来明显的性能影响。但是，它可能会对扫描大量数据页或整个索引的查询性能产生负面影响。


    显然，它们也会增加更新开销。通过向非聚集索引添加列，您将数据存储在多个地方。这提高了选择数据查询的性能。然而，在更新期间，SQL Server 需要更改每个包含被更新列的索引中的行。请记住这一点，谨慎地将频繁修改的列包含到索引中。


    ## 总结


    经典的 SQL Server 存储引擎使用基于行的存储将数据存储在基于磁盘的表中。表中的所有列都一起存储在驻留于 8 KB 数据页上的数据行中。


    表中的数据可以以两种不同的方式存储——要么完全无序地存储在堆表中，要么在定义了聚集索引时按照聚集索引键排序存储。在正常工作负载下，带有聚集索引的表通常比堆表性能更好。


    每个表都可以定义一组非聚集索引。每个非聚集索引都是一个独立的数据结构，它存储了表中数据的副本，并按照索引键列排序。非聚集索引可以以引入更新开销为代价来提高查询的性能。


    SQL Server 使用键查找和 RID 查找操作来获取非聚集索引中不存在的列的数据。这些操作代价高昂，如果 SQL Server 预计需要大量此类操作，它就不会使用非聚集索引。您可以将额外的列包含在索引中，使其成为覆盖索引，从而从执行计划中消除键查找和
    RID 查找。


    SQL Server 在使用索引时主要采用两种数据访问模式。索引扫描通过扫描索引中的所有页面来读取整个索引。或者，索引查找操作仅处理索引行和页面的子集。索引查找比索引扫描更高效，当存在索引时，使用可支持索引查找（SARGable）的谓词是有益的。


    # 2. 事务管理与并发模型


    事务是数据管理系统的核心概念；它们保证了数据库中数据的一致性和持久性。没有适当的事务管理，就不可能实现数据库系统。


    本章将阐述事务的重要性，概述悲观和乐观并发模型，并简述事务隔离级别以及它们可能引入的数据一致性现象。最后，本章将讨论与 SQL Server 中事务管理和错误处理相关的几个问题。'
- fmt: '# Transactions


    Microsoft SQL Server has been designed to work in multi-user environments, just
    like any other general-purpose database server. The Database Engine should handle
    simultaneous workloads from multiple users and provide the required level of data
    consistency when users query and modify the same data.


    There is a key concept in database and data management systems called *transactions*.
    Transactions are the single unit of work that reads and modifies data in a database
    and helps to enforce the consistency and durability of the data there. Every transaction
    in a properly implemented transaction management system has four different characteristics:
    *atomicity*, *consistency*, *isolation*, and *durability*, often referenced as
    *ACID*.


    ## ACID Characteristics


    *   **Atomicity** guarantees that each transaction executes as a single unit of
    work using an “all or nothing” approach. All changes done within a transaction
    are either committed or rolled back in full. Consider the classic example of transferring
    money between checking and savings bank accounts. That action consists of two
    separate operations: decreasing the balance of the checking account and increasing
    the balance of the savings account. Transaction atomicity guarantees that both
    operations either succeed or fail together, and a system will never be in an inconsistent
    state where money was deducted from the checking account but never added to the
    savings account.


    *   **Consistency** ensures that any database transaction brings the database
    from one consistent state to another and that none of the defined database rules
    and constraints were violated.


    *   **Isolation** ensures that the changes made in the transaction are isolated
    and invisible to other transactions until the transaction is committed. By the
    book, transaction isolation should guarantee that the concurrent execution of
    multiple transactions brings the system to the same state as if those transactions
    were executed serially. However, in most database systems, such a requirement
    is often relaxed and controlled by *transaction isolation levels*, which we will
    discuss later in the chapter.


    *   **Durability** guarantees that after a transaction is committed, all changes
    done by the transaction stay permanent and will survive a system crash. SQL Server
    achieves durability by using *write-ahead logging* to harden log records in the
    transaction log. A transaction is not considered to be committed until all log
    records generated by the transaction are hardened in the log file.


    The isolation requirements are the most complex to implement in multi-user environments.
    Even though it is possible to completely isolate different transactions from each
    other, this could lead to a high level of blocking and other concurrency issues
    in systems with volatile data. SQL Server addresses this situation by introducing
    several transaction isolation levels that relax isolation requirements at the
    cost of possible concurrency phenomena related to read data consistency:


    *   **Dirty Reads:** A transaction reads uncommitted (dirty) data from other uncommitted
    transactions.

    *   **Non-Repeatable Reads:** Subsequent attempts to read the same data from within
    the same transaction return different results. This data inconsistency issue arises
    when the other transactions modified, or even deleted, data between the reads
    done by the affected transaction.

    *   **Phantom Reads:** This phenomenon occurs when subsequent reads within the
    same transaction return new rows (the ones that the transaction did not read before).
    This happens when another transaction inserted new data in between the reads done
    by the affected transaction.


    # Pessimistic and Optimistic Concurrency


    Transaction isolation levels control another aspect of SQL Server behavior that
    dictates *concurrency models* for the transactions. Conceptually, there are two
    concurrency models used in database systems:


    *   **Pessimistic concurrency** works under the assumption that multiple users
    who access the same data would all eventually like to modify the data and override
    each other’s changes. The Database Engine prevents this from happening by locking
    the data for the duration of the transaction as soon as the first session accesses
    and/or modifies it.

    *   **Optimistic concurrency**, on the other hand, assumes that, while multiple
    users may access the same data, the chance of simultaneous updates is low. The
    data would not be locked; however, multiple updates would trigger write–write
    conflicts and roll back affected transactions.


    Let’s illustrate the difference between those models with an example. Consider,
    again, that we have a transaction that wants to transfer money between checking
    and savings accounts. As you remember, this would lead to two update operations—decreasing
    the balance of checking and increasing the balance of savings. Let’s also assume
    that you have another session that wants to perform a withdrawal from the checking
    account in parallel with the transfer. This operation would decrease the balance
    of the checking account (updating the same row) along with other actions.


    With pessimistic concurrency, the first session that updates (and in some cases
    even reads) the checking account balance would lock this row, preventing other
    sessions from accessing or updating it. The second session would be blocked until
    the first session completed the transaction, and it would read the new checking
    account balance afterward.


    With optimistic concurrency, neither of the sessions would be blocked. However,
    one of the sessions would not be able to commit and would fail with a *write–write
    conflict* error .


    Both concurrency models have benefits and downsides. Pessimistic concurrency may
    introduce blocking in the system. Optimistic concurrency, on the other hand, requires
    proper write-write conflict handling, and it often introduces additional overhead
    during data modifications.


    SQL Server supports both pessimistic and optimistic concurrency models, controlling
    them by transaction isolation levels.'
