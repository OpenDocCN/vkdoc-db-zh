  trans: '

    ## 列存储索引内部结构概述


    在基于列的存储中，每个数据列都单独存储在一组称为 `行组` 的结构中。每个 `行组` 存储最多约一百万行——准确地说，是 `2²⁰=1,048,576` 行——的数据。SQL
    Server 在创建索引时会尽量填满行组，仅最后一个行组可能部分填充。例如，如果一个表有五百万行，SQL Server 将创建四个各包含 1,048,576
    行的行组，以及一个包含 805,696 行的行组。


    在实践中，当多个线程使用并行执行计划创建列存储索引时，可能会出现多个部分填充的行组。每个线程处理自己的数据子集，从而创建独立的行组。此外，对于分区表，每个表分区都将拥有自己的一组行组。


    行组构建完成后，SQL Server 会对每个行组中的列数据进行编码和压缩。如果有助于实现更好的压缩率，行组内的行可以被重新排列。


    行组内的列数据称为一个 `段`。当需要访问列存储数据时，SQL Server 会将整个段加载到内存中。SQL Server 还会保留有关段中数据的元数据信息——例如，段中存储的最小值和最大值——并可以跳过不包含所需数据的段。


    属于同一数据行的行通过段内的 `偏移量` 来识别。例如，表中的第一行由第一个分区上第一个行组中所有段的第一个值组成。第二行由同一行组中所有段的第二个值组成，依此类推。`分区
    _id`、`行组 _id` 和 `偏移量` 的组合唯一标识一行，在列存储索引中称为 `行 ID`。


    列存储索引中的数据经过高度压缩，相比页面压缩可显著节省空间。基于列的存储提供的压缩率通常比基于行的数据高出 10 倍以上。此外，SQL Server 2014
    引入了另一种称为 `归档压缩` 的压缩选项，可进一步减少存储空间。它使用 Xpress 8 压缩库，这是微软对 LZ77 算法的内部实现。此压缩直接作用于行组数据，无需了解底层的
    SQL Server 数据结构。


    可更新的列存储索引有两个额外的元素来支持数据修改。第一个是 `删除位图`，它存储从表中删除的行的 `行 ID`。第二个结构是 `增量存储`，它存储新插入的行。在基于磁盘的列存储索引中，增量存储和删除位图都作为常规的堆表实现。


    ### 注意


    在内存优化表上定义的列存储索引的内部结构在概念上是相同的；但是，增量存储和删除位图的实现方式不同。此类索引支持内存中 OLTP 多版本并发控制，并且不会在内存优化表中引入任何锁。您可以在书
    `《SQL Server 内存中 OLTP 高级编程》` 中阅读有关它们的更多信息；我们本书中不重点讨论它们。


    图 14-2 说明了一个包含两个分区的表中可更新列存储索引的结构。每个分区可以有一个删除位图和多个增量存储。这种结构使每个分区自包含且独立于其他分区，从而允许您对定义了列存储索引的表执行分区切换。


    ![../images/463519_1_En_14_Chapter/463519_1_En_14_Fig2_HTML.jpg](img/463519_1_En_14_Fig2_HTML.jpg)

    图 14-2

    可更新列存储索引结构


    值得注意的是，删除位图和增量存储是 `按需` 创建的。例如，除非行组中的某些行被删除，否则不会创建删除位图。


    每次删除存储在压缩行组（而非增量存储）中的行时，SQL Server 都会将有关该已删除行的信息添加到删除位图中。原始行不会发生任何变化，它仍然存储在行组中。但是，SQL
    Server 在查询执行期间会检查删除位图，将已删除的行排除在处理过程之外。


    如前所述，当您向列存储索引插入数据时，数据会进入增量存储，这是一个堆表。更新存储在行组中的行也不会更改行数据。此类更新会触发一行的删除，实际上就是向删除位图中插入一条记录，将旧版本标记为
    `已删除`，然后将行的新版本插入增量存储。但是，对增量存储中行的任何数据修改都是通过原地更新和删除其中的实际行来完成的，就像在常规堆表中一样。


    每个增量存储可以处于 `打开` 或 `关闭` 状态。打开的增量存储接受新行，并允许对数据进行修改和删除。当增量存储达到 1,048,576 行（即行组可存储的最大行数）时，SQL
    Server 会将其关闭。另一个称为 `元组移动器` 的 SQL Server 进程每五分钟运行一次，将关闭的增量存储转换为以列基存储格式存储数据的行组。


    大量的增量存储和删除位图都可能影响查询性能。SQL Server 必须访问删除位图以检查压缩行是否已被删除，并且在查询执行期间会从增量存储中读取行。如果 ETL
    流程导致产生大量的增量存储和删除位图，请考虑在受影响的分区上重建索引。


    ### 提示


    您可以使用 `sys.column_store_row_groups` 视图检查行组和增量存储的状态。处于 `OPEN` 或 `CLOSED` 状态的行对应于增量存储。处于
    `COMPRESSED` 状态的行对应于以列基存储格式存储数据的行组。最后，`deleted_rows` 列提供了有关存储在删除位图中的已删除行的统计信息。

    '
- fmt: '## Locking Behavior in Columnstore Indexes


    Storage space savings and the updateable nature of clustered columnstore indexes
    make them appealing as a replacement for large transactional tables in OLTP environments.
    Their locking behavior, however, is very different than that of B-Tree indexes,
    and it may not scale well in environments with a large number of concurrent transactions.


    Let’s look at a few examples. As a first step, shown in Listing 14-1, we will
    create a table with a clustered columnstore index and insert about four million
    rows there. After the columnstore index is created, we will try to insert another
    row into the table, rolling back the transaction afterward. This will create an
    empty delta store in the index. Finally, we will analyze the state of the row
    groups using the `sys.column_store_row_groups` view.


    ```sql

    create table dbo.Test

    (

    ID int not null,

    Col int not null

    );

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as T1 cross join N1 as T2) -- 4 rows

    ,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) -- 16 rows

    ,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256 rows

    ,N5(C) as (select 0 from N4 as T1 cross join N4 as T2 ) -- 65,536 rows

    ,N6(C) AS (select 0 from N5 as T1 cross join N3 as T2 cross join N2 as T3)

    -- 4,194,304 rows

    ,IDs(ID) as (select row_number() over (order by (select null)) from N6)

    insert into dbo.Test(ID, Col)

    select ID, ID from IDs;

    create clustered columnstore index CCI_Test

    on dbo.Test

    with (maxdop = 1);

    begin tran

    insert into dbo.Test(ID, Col) values(-1,-1);

    rollback

    go

    select *

    from sys.column_store_row_groups

    where object_id = object_id(N''dbo.Test'');

    ```

    Listing 14-1

    Creating a test table


    Figure 14-3 illustrates the output from the view. Four row groups in a `COMPRESSED`
    state store the data in a column-based format. An empty row group with `row_group_id
    = 4` in the `OPEN` state is in the delta store.


    ![../images/463519_1_En_14_Chapter/463519_1_En_14_Fig3_HTML.jpg](images/463519_1_En_14_Chapter/463519_1_En_14_Fig3_HTML.jpg)

    Figure 14-3

    Row groups after table was created


    Now, let’s run a few tests and analyze the locking behavior of the index.


    ### Inserting Data into Clustered Columnstore Index


    Columnstore indexes support two types of data load. The first, and most efficient,
    method requires you to utilize a `BULK INSERT` API for loading data in large batches.
    In this mode, SQL Server creates a new row group for each batch, compressing data
    into a column-based format on the fly. Since every batch becomes an individual
    row group, multiple inserts would not block each other and could run in parallel.


    The minimum size of the batch that triggers this behavior is about 102,000 rows;
    however, you will get the best results if you use batches that match the maximum
    row group size, which is 1,048,576 rows.


    With smaller batches and single-row inserts, SQL Server uses `trickle inserts`,
    placing data into delta stores. Each table partition will have separate delta
    stores, and in some cases you may have several open delta stores per partition.
    SQL Server closes the delta store and compresses its data into a column-based
    format when it reaches 1,048,576 rows or when you run an index rebuild operation.


    Let’s insert a single row into a table and then analyze what locks get acquired
    during the process. The code is shown in Listing 14-2.


    ```sql

    begin tran

    insert into dbo.Test(ID, Col)

    values(-1,-1);

    select

    resource_type, resource_description

    ,request_mode, request_status

    ,resource_associated_entity_id

    from sys.dm_tran_locks

    where

    request_session_id = @@SPID;

    rollback

    ```

    Listing 14-2

    Inserting data into the table


    As you can see in Figure 14-4, the locking behavior is similar to locking in heap
    tables. SQL Server acquired an exclusive (`X`) lock on the newly inserted row,
    along with intent exclusive (`IX`) locks on the page and HOBT (allocation unit).
    It also acquired an intent exclusive (`IX`) lock on the row group, which is conceptually
    similar to the object-level lock on the table.


    ![../images/463519_1_En_14_Chapter/463519_1_En_14_Fig4_HTML.jpg](images/463519_1_En_14_Chapter/463519_1_En_14_Fig4_HTML.jpg)

    Figure 14-4

    Locks acquired by INSERT operation


    As you can guess, this behavior indicates that you may scale the insert workload
    in a way similar to how you do so with heap tables. Multiple sessions can insert
    data in parallel without blocking each other.'
