    ### About the Author and About the Technical Reviewer


    ### About the Author


    ### About the Technical Reviewer


    # 1. Data Storage and Access Methods


    It is impossible to grasp the SQL Server concurrency model without understanding
    how SQL Server stores and accesses the data. This knowledge helps you to comprehend
    various aspects of locking behavior in the system, and it is also essential when
    troubleshooting concurrency issues.


    Nowadays, SQL Server and Microsoft Azure SQL Databases support three different
    technologies that dictate how data is stored and manipulated in the system. The
    classic Storage Engine implements row-based storage. This technology persists
    the data in disk-based tables, combining all columns from a table together into
    data rows. The data rows, in turn, reside on 8 KB data pages, each of which may
    have one or multiple rows.


    Starting with SQL Server 2012, you can store data in a columnar format using columnstore
    indexes. SQL Server splits the data into *row groups* of up to 1,048,576 rows
    each. The data in the row group is combined and stored on a per-column rather
    than a per-row basis. This format is optimized for reporting and analytics queries.


    Finally, the In-Memory OLTP Engine, introduced in SQL Server 2014, allows you
    to define memory-optimized tables, which keep all data entirely in memory. The
    data rows in memory are linked to the data row chains through the memory pointers.
    This technology is optimized for heavy OLTP workload.


    We will discuss locking behavior in In-Memory OLTP and columnstore indexes later
    in the book, after we cover the concurrency model of the classic Storage Engine.
    This knowledge is a cornerstone of understanding how SQL Server behaves in a multi-user
    environment.


    The goal of this chapter is to give a high-level overview of row-based storage
    in SQL Server. It will explain how SQL Server stores the data in disk-based tables,
    illustrate the structure of B-Tree indexes, and demonstrate how SQL Server accesses
    data from them.


    You should not consider this chapter as a deep dive into the SQL Server Storage
    Engine. It should provide, however, enough information to discuss the concurrency
    model in SQL Server.


    ## Anatomy of a Table


    The internal structure of a disk-based table is rather complex and consists of
    multiple elements and internal objects, as shown in Figure [1-1](#463519_1_En_1_Chapter.xhtml#Fig1).


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig1_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Internal structure of a table


    The data in the tables is stored either completely unsorted (those tables are
    called *heap tables* or *heaps*) or sorted according to the value of a clustered
    index key when a table has such an index defined.


    In addition to a single clustered index, every table may have a set of nonclustered
    indexes. These indexes are separate data structures that store a copy of the data
    from a table sorted according to index key column(s). For example, if a column
    was included in three nonclustered indexes, SQL Server would store that data four
    times—once in a clustered index or heap and in each of the three nonclustered
    indexes.


    You can create either 250 or 999 nonclustered indexes per table, depending on
    SQL Server version. However, it is clearly not a good idea to create a lot of
    them due to the overhead they introduce. In addition to storage overhead, SQL
    Server needs to insert or delete data from each nonclustered index during data
    modifications. Moreover, the update operation requires SQL Server to modify data
    in every index in which updated columns were present.


    Internally, each index (and heap) consists of one or multiple *partitions*. Every
    partition, in a nutshell, is an internal data structure (index or heap) independent
    from other partitions in the object. SQL Server allows the use of a different
    partition strategy for every index in the table; however, in most cases, all indexes
    are partitioned in the same way and aligned with each other.'
