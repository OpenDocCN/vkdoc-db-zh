    SQL Server 2012 及以上版本中，你可以从 Management Studio 的 *管理* 节点访问 `system_health` 会话数据，如图
    5-16 所示。你可以分析 *目标数据*，搜索 `xml_deadlock_report` 事件。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig16_HTML.jpg](img/463519_1_En_5_Fig16_HTML.jpg)


    **图 5-16** 访问 system_health xEvents 会话


    死锁图的 XML 表示包含两个不同的部分，如清单 5-5 所示。`<process-list>` 和 `<resource-list>` 部分分别包含有关死锁中涉及的进程和资源的信息。


    ```

    ...

    ...

    ...

    ...

    ```


    **清单 5-5** 死锁图格式


    让我们使用表 5-1 中所示的代码在系统中触发死锁。你需要并行运行两个会话——先运行 `UPDATE` 语句，然后运行 `SELECT` 语句。


    **表 5-1** 在系统中触发死锁


    | 会话 1 | 会话 2 |

    | --- | --- |

    | `begin tran`        `update Delivery.Orders`        `set OrderStatusId = 1`        `where
    OrderId = 10001;` | `begin tran`        `update Delivery.Orders`        `set OrderStatusId
    = 1`        `where OrderId = 10050;` |

    |         `select count(*) as [Cnt]`        `from Delivery.Orders with (READCOMMITTED)`        `where
    CustomerId = 317;``commit` |         `select count(*) as [Cnt]`        `from Delivery.Orders
    with (READCOMMITTED)`        `where CustomerId = 766;``commit` |


    死锁图中的每个 `<process>` 节点显示特定进程的详细信息，如清单 5-6 所示。为了便于阅读，我移除了一些属性的值。我还特别高亮显示了那些在故障排除过程中我发现特别有用的属性。


    ```

    ...

    ```


    **清单 5-6** 死锁图：`<process>` 节点


    `id` 属性唯一标识进程。`Waitresource` 和 `lockMode` 提供有关锁类型和进程正在等待的资源的信息。在我们的示例中，你可以看到该进程正在等待其中一行（键）上的共享（S）锁。'
- fmt: 'The `Isolationlevel` attribute shows you the current transaction isolation
    level. Finally, `executionStack` and `inputBuf` allow you to find the SQL statement
    that was executed when the deadlock occurred. As the opposite of the `blocked
    process report`, `executionStack` in the deadlock graph usually provides you with
    information about the query and module involved in the deadlock. However, in some
    cases, you would need to use the `sys.dm_exec_sql_text` function to get the SQL
    statements in the same way as we did in Listing 4-5 in the previous chapter.


    The `<resource-list>` section of the deadlock graph contains information about
    the resources involved in the deadlock. It is shown in Listing 5-7.


    #### Listing 5-7

    Deadlock graph: `<resource-list>` node


    The name of the XML element identifies the type of resource. `Keylock`, `pagelock`,
    and `objectlock` stand for the row-level, page, and object locks, respectively.
    You can also see to what objects and indexes those locks belong. Finally, `owner-list`
    and `waiter-list` nodes provide information about the processes that own and wait
    for the locks, along with the types of locks acquired and requested. You can correlate
    this information with the data from the `process-list` section of the graph.


    As you have probably already guessed, the next steps are very similar to the blocked
    process troubleshooting; that is, you need to pinpoint the queries involved in
    the deadlock and find out why the deadlock occurs.


    There is one important factor to consider, however. In most cases, a deadlock
    involves more than one statement per session running in the same transaction.
    The deadlock graph provides you with information about the last statement only—the
    one that triggered the deadlock.


    You can see the `signs` of the other statements in the `<resource-list>` node.
    It shows you the locks held by the transaction, but it does not tell you about
    the statements that acquired them. It is very useful to identify those statements
    while analyzing the root cause of the problem.


    In our example, when you look at the code shown in Table 5-1, you see the two
    statements. The `UPDATE` statement updates a single row—it acquires and holds
    an exclusive (X) lock there. You can see that both processes own those exclusive
    (X) locks in the `<resource-list>` node of the deadlock graph.


    In the next step, you need to understand why `SELECT` queries are trying to obtain
    shared (S) locks on the rows with exclusive (X) locks held. You can look at the
    execution plans for `SELECT` statements from the process nodes by either running
    the queries or using `sys.dm_exec_query_stats` DMV, as was shown in Listing 4-5
    in the previous chapter. As a result, you will get the execution plans shown in
    Figure 5-17. The figure also shows the number of locks acquired during query execution.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig17_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig17_HTML.jpg)


    ##### Figure 5-17

    Execution plan for the query


    ### Tip

    You can obtain cached execution plans for the stored procedures using the `sys.dm_exec_procedure_stats`
    view.


    As you can see, there is a `Clustered Index Scan` in the plan, which gives you
    enough data for analysis. `SELECT` queries scanned the entire table. Because both
    processes were using the `READ COMMITTED` isolation level, the queries tried to
    acquire shared (S) locks on every row from the table and were blocked by the exclusive
    (X) locks held by another session. It did not matter that those rows did not have
    the `CustomerId` that the queries were looking for. In order to evaluate this
    predicate, queries had to read those rows, which required acquiring shared (S)
    locks on them.


    You can solve this deadlock situation by adding a nonclustered index on the `CustomerID`
    column. This would eliminate the `Clustered Index Scan` and replace it with an
    `Index Seek` operator, as shown in Figure 5-18.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig18_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig18_HTML.jpg)


    ##### Figure 5-18

    Execution plan for the query with nonclustered index


    Instead of acquiring a shared (S) lock on every row of the table, the query would
    read only the rows that belong to a specific customer. This would dramatically
    reduce the number of shared (S) locks to be acquired, and it would prevent the
    query from being blocked by exclusive (X) locks on rows that belong to different
    customers.


    Unfortunately, deadlock troubleshooting has the same dependency on the plan cache
    as blocking troubleshooting does. You often need to obtain the text and execution
    plans of the statements involved in deadlocks from there. The data in the plan
    cache changes over time, and the longer you wait, the less likely it is that required
    information will be present.


    You can address this by implementing a monitoring solution based on Event Notifications,
    similar to what we did in the previous chapter. The code is included to companion
    materials of the book as part of Blocking Monitoring Framework code and also available
    for download from my blog at: [`http://aboutsqlserver.com/bmframework`](http://aboutsqlserver.com/bmframework).


    Finally, in some cases you can have intra-query parallelism deadlocks—when a query
    with a parallel execution plan deadlocks itself. Fortunately, such cases are rare
    and are usually introduced by a bug in SQL Server rather than application or database
    issues. You can detect such cases when a deadlock graph has more than two processes
    with the same `SPID` and the `<resource-list>` has `exchangeEvent` and/or `threadPoll`
    listed as the resources, without any lock resources associated with them. When
    it happens, you can work around the problem by reducing or even completely removing
    parallelism for the query with the `MAXDOP` hint. There is also a great chance
    that the issue has already been fixed in the latest service pack or cumulative
    update.'
