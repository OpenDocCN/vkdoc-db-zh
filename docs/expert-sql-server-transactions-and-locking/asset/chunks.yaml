- fmt: "### Important\n\nThe first scenario, when the third session ran in `READ COMMITTED`\
    \ isolation level and did not acquire the lock on the resource, can be considered\
    \ an internal optimization, which you should not rely on. In some cases, SQL Server\
    \ still acquires another shared (S) lock on the resource in `READ COMMITTED` mode,\
    \ even if there is another shared (S) lock held. In such a case, the query would\
    \ be blocked like in the `REPEATABLE READ` isolation level example.\n\nUnfortunately,\
    \ sessions in SQL Server do not reuse locks from other sessions on the table level.\
    \ It is impossible to estimate the time for which any table-level lock-intent,\
    \ full, or schema stability-needs be held. The session will always try to acquire\
    \ an object-level lock, and it will be blocked if any other incompatible lock\
    \ types are present in the locking queue.\n\nThis behavior may introduce serious\
    \ blocking issues in the system. One of the most common cases where it occurs\
    \ is with online index rebuild operations. Even though it holds an intent shared\
    \ (IS) table lock during the rebuild process, it needs to acquire a shared (S)\
    \ table lock at the beginning and a schema modification (Sch-M) lock at the final\
    \ phase of execution. Both locks are held for a very short time; however, they\
    \ can introduce blocking issues in busy OLTP environments.\n\nConsider a situation\
    \ where you start an online index rebuild at a time when you have another active\
    \ transaction modifying data in a table. That transaction will hold an intent\
    \ exclusive (IX) lock on the table, which prevents the online index rebuild from\
    \ acquiring a shared (S) table lock. The lock request will wait in the queue and\
    \ block all other transactions that want to modify data in the table and requesting\
    \ intent exclusive (IX) locks there. Figure [8-8](#463519_1_En_8_Chapter.xhtml#Fig8)\
    \ illustrates this situation.\n\n![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig8_HTML.jpg](images/463519_1_En_8_Chapter/463519_1_En_8_Fig8_HTML.jpg)\n\
    Figure 8-8\nBlocking during the initial stage of an index rebuild\n\nThis blocking\
    \ condition will clear only after the first transaction is completed and the online\
    \ index rebuild acquires and releases a shared (S) table lock. Similarly, more\
    \ severe blocking could occur in the final stage of an online index rebuild when\
    \ it needs to acquire a schema modification (Sch-M) lock to replace an index reference\
    \ in the metadata. Both readers and writers will be blocked while the index rebuild\
    \ waits for the schema modification (Sch-M) lock to be granted.\n\nSimilar blocking\
    \ may occur during partition switch operations, which also acquire schema modification\
    \ (Sch-M) locks. Even though a partition switch is done on the metadata level\
    \ and is very fast, the schema modification (Sch-M) lock would block other sessions\
    \ while waiting in the queue to be granted.\n\nYou need to remember this behavior\
    \ when you design index maintenance and partition management strategies. There\
    \ is very little that can be done in non-Enterprise editions of SQL Server or\
    \ even in Enterprise Edition prior to SQL Server 2014. You can schedule operations\
    \ to run at a time when the system handles the least activity. Alternatively,\
    \ you can write the code terminating the operation using the `LOCK_TIMEOUT` setting.\n\
    \nListing [8-1](#463519_1_En_8_Chapter.xhtml#PC1) illustrates this approach. You\
    \ can use it with offline index rebuild and partition switch operations. You would\
    \ still have blocking during the offline index rebuild while the schema modification\
    \ (Sch-M) lock is held. However, you would eliminate blocking if this lock could\
    \ not be acquired within the `LOCK_TIMEOUT` interval. Remember, with `XACT_ABORT`\
    \ set to `OFF`, the lock timeout error does not roll back the transaction. Use\
    \ proper transaction management and error handling, as we discussed in Chapter\
    \ [2](#463519_1_En_2_Chapter.xhtml).\n\nAlso, as another word of caution, do not\
    \ use `LOCK_TIMEOUT` with online index rebuilds, because it may terminate and\
    \ roll back the operation at its final phase while the session is waiting for\
    \ a schema modification (Sch-M) lock to replace the index definition in the metadata.\n\
    \n```sql\nset xact_abort off\nset lock_timeout 100 -- 100 milliseconds\ngo\ndeclare\n\
    \    @attempt int = 1\n    ,@maxAttempts int = 10\nwhile @attempt <= @maxAttempts\n\
    begin\n    begin try\n        raiserror('Rebuilding index. Attempt %d / %d',0,1,@attempt,@maxAttempts)\
    \ with nowait;\n        alter index PK_Orders\n        on Delivery.Orders rebuild\n\
    \        with (online = off);\n        break;\n    end try\n    begin catch\n\
    \        if ERROR_NUMBER() = 1222 and @attempt < @maxAttempts\n        begin\n\
    \            set @attempt += 1;\n            waitfor delay '00:00:15.000';\n \
    \       end\n        else\n            throw;\n    end catch\nend;\n```\nListing\
    \ 8-1\nReduce blocking during offline index rebuild\n\nFortunately, the Enterprise\
    \ Edition of SQL Server 2014 and above provides a better way to handle this problem.\n\
    \n## Low-Priority Locks\n\nSQL Server 2014 introduced a new feature—low-priority\
    \ locks–that helps to reduce blocking during online index rebuild and partition\
    \ switch operations. Conceptually, you can think of low-priority locks as staying\
    \ in a different locking queue than regular locks.\n\nFigure [8-9](#463519_1_En_8_Chapter.xhtml#Fig9)\
    \ illustrates it.\n\n![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig9_HTML.jpg](images/463519_1_En_8_Chapter/463519_1_En_8_Fig9_HTML.jpg)\n\
    Figure 8-9\nLow-priority locks\n\n### Important\n\nIt is essential to remember\
    \ that, as soon as a low-priority lock is acquired, it will behave the same as\
    \ a regular lock, preventing other sessions from acquiring incompatible locks\
    \ on the resource.\n\nFigure [8-10](#463519_1_En_8_Chapter.xhtml#Fig10) shows\
    \ the output of the query from Listing [3-2](#463519_1_En_3_Chapter.xhtml#Par20)\
    \ in Chapter [3](#463519_1_En_3_Chapter.xhtml). It demonstrates how low-priority\
    \ locks are shown in the `sys.dm_tran_locks` view output. It is worth noting that\
    \ the view does not provide the wait time of those locks.\n\n![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig10_HTML.jpg](images/463519_1_En_8_Chapter/463519_1_En_8_Fig10_HTML.jpg)\n\
    Figure 8-10\nLow-priority locks in the `sys.dm_tran_locks` data management view\n\
    \nYou can specify lock priority with a `WAIT_AT_LOW_PRIORITY` clause in the `ALTER\
    \ INDEX` and `ALTER TABLE` statements, as shown in Listing [8-2](#463519_1_En_8_Chapter.xhtml#PC2).\n\
    \n```sql\nalter index PK_Customers on Delivery.Customers rebuild\nwith\n(\n  \
    \  online=on\n    (\n        wait_at_low_priority(   max_duration=10 minutes \
    \ ,abort_after_wait=blockers )\n    )\n);\nalter table Delivery.Orders\nswitch\
    \ partition 1 to Delivery.OrdersTmp\nwith\n(\n    wait_at_low_priority (   max_duration=60\
    \ minutes  ,abort_after_wait=self )\n)\n```\nListing 8-2\nSpecifying lock priority\n\
    \nAs you can see, `WAIT_AT_LOW_PRIORITY` has two options. The `MAX_DURATION` setting\
    \ specifies the lock wait time in minutes. The `ABORT_AFTER_WAIT` setting defines\
    \ the session behavior if a lock cannot be obtained within the specified time\
    \ limit. The possible values are:\n\n*   `NONE`: The low-priority lock is converted\
    \ to a regular lock. After that, it behaves as a regular lock, blocking other\
    \ sessions that try to acquire incompatible lock types on the resource. The session\
    \ continues to wait until the lock is acquired.\n*   `SELF`: The operation is\
    \ aborted if a lock cannot be granted within the time specified by the `MAX_DURATION`\
    \ setting.\n*   `BLOCKERS`: All sessions that hold locks on the resource are aborted,\
    \ and the session, which is waiting for a low-priority lock, will be able to acquire\
    \ it."
  raw: '### Important


    The first scenario, when the third session ran in `READ COMMITTED` isolation level
    and did not acquire the lock on the resource, can be considered an internal optimization,
    which you should not rely on. In some cases, SQL Server still acquires another
    shared (S) lock on the resource in `READ COMMITTED` mode, even if there is another
    shared (S) lock held. In such a case, the query would be blocked like in the `REPEATABLE
    READ` isolation level example.


    Unfortunately, sessions in SQL Server do not reuse locks from other sessions on
    the table level. It is impossible to estimate the time for which any table-level
    lock-intent, full, or schema stability-needs be held. The session will always
    try to acquire an object-level lock, and it will be blocked if any other incompatible
    lock types are present in the locking queue.


    This behavior may introduce serious blocking issues in the system. One of the
    most common cases where it occurs is with online index rebuild operations . Even
    though it holds an intent shared (IS) table lock during the rebuild process, it
    needs to acquire a shared (S) table lock at the beginning and a schema modification
    (Sch-M) lock at the final phase of execution. Both locks are held for a very short
    time; however, they can introduce blocking issues in busy OLTP environments.


    Consider a situation where you start an online index rebuild at a time when you
    have another active transaction modifying data in a table. That transaction will
    hold an intent exclusive (IX) lock on the table, which prevents the online index
    rebuild from acquiring a shared (S) table lock. The lock request will wait in
    the queue and block all other transactions that want to modify data in the table
    and requesting intent exclusive (IX) locks there. Figure [8-8](#463519_1_En_8_Chapter.xhtml#Fig8)
    illustrates this situation.


    ![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig8_HTML.jpg](images/463519_1_En_8_Chapter/463519_1_En_8_Fig8_HTML.jpg)


    Figure 8-8


    Blocking during the initial stage of an index rebuild


    This blocking condition will clear only after the first transaction is completed
    and the online index rebuild acquires and releases a shared (S) table lock . Similarly,
    more severe blocking could occur in the final stage of an online index rebuild
    when it needs to acquire a schema modification (Sch-M) lock to replace an index
    reference in the metadata. Both readers and writers will be blocked while the
    index rebuild waits for the schema modification (Sch-M) lock to be granted.


    Similar blocking may occur during partition switch operations, which also acquire
    schema modification (Sch-M) locks. Even though a partition switch is done on the
    metadata level and is very fast, the schema modification (Sch-M) lock would block
    other sessions while waiting in the queue to be granted.


    You need to remember this behavior when you design index maintenance and partition
    management strategies. There is very little that can be done in non-Enterprise
    editions of SQL Server or even in Enterprise Edition prior to SQL Server 2014\.
    You can schedule operations to run at a time when the system handles the least
    activity. Alternatively, you can write the code terminating the operation using
    the `LOCK_TIMEOUT` setting.


    Listing [8-1](#463519_1_En_8_Chapter.xhtml#PC1) illustrates this approach. You
    can use it with offline index rebuild and partition switch operations. You would
    still have blocking during the offline index rebuild while the schema modification
    (Sch-M) lock is held. However, you would eliminate blocking if this lock could
    not be acquired within the `LOCK_TIMEOUT` interval. Remember, with `XACT_ABORT`
    set to `OFF`, the lock timeout error does not roll back the transaction. Use proper
    transaction management and error handling, as we discussed in Chapter [2](#463519_1_En_2_Chapter.xhtml).


    Also, as another word of caution , do not use `LOCK_TIMEOUT` with online index
    rebuilds, because it may terminate and roll back the operation at its final phase
    while the session is waiting for a schema modification (Sch-M) lock to replace
    the index definition in the metadata.


    ```

    set xact_abort off

    set lock_timeout 100 -- 100 milliseconds

    go

    declare

    @attempt int = 1

    ,@maxAttempts int = 10

    while @attempt <= @maxAttempts

    begin

    begin try

    raiserror(''Rebuilding index. Attempt %d / %d'',0,1,@attempt,@maxAttempts) with
    nowait;

    alter index PK_Orders

    on Delivery.Orders rebuild

    with (online = off);

    break;

    end try

    begin catch

    if ERROR_NUMBER() = 1222 and @attempt < @maxAttempts

    begin

    set @attempt += 1;

    waitfor delay ''00:00:15.000'';

    end

    else

    throw;

    end catch

    end;

    Listing 8-1

    Reduce blocking during offline index rebuild

    ```


    Fortunately, the Enterprise Edition of SQL Server 2014 and above provides a better
    way to handle this problem .


    ## Low-Priority Locks


    SQL Server 2014 introduced a new feature—*low-priority locks*–that helps to reduce
    blocking during online index rebuild and partition switch operations . Conceptually,
    you can think of low-priority locks as staying in a different locking queue than
    regular locks.


    Figure [8-9](#463519_1_En_8_Chapter.xhtml#Fig9) illustrates it.


    ![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig9_HTML.jpg](images/463519_1_En_8_Chapter/463519_1_En_8_Fig9_HTML.jpg)


    Figure 8-9


    Low-priority locks


    ### Important


    It is essential to remember that, as soon as a low-priority lock is acquired,
    it will behave the same as a regular lock, preventing other sessions from acquiring
    incompatible locks on the resource.


    Figure [8-10](#463519_1_En_8_Chapter.xhtml#Fig10) shows the output of the query
    from Listing [3-2](#463519_1_En_3_Chapter.xhtml#Par20) in Chapter [3](#463519_1_En_3_Chapter.xhtml).
    It demonstrates how low-priority locks are shown in the `sys.dm_tran_locks` view
    output. It is worth noting that the view does not provide the wait time of those
    locks.


    ![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig10_HTML.jpg](images/463519_1_En_8_Chapter/463519_1_En_8_Fig10_HTML.jpg)


    Figure 8-10


    Low-priority locks in the `sys.dm_tran_locks` data management view


    You can specify lock priority with a `WAIT_AT_LOW_PRIORITY` clause in the `ALTER
    INDEX` and `ALTER TABLE` statements, as shown in Listing [8-2](#463519_1_En_8_Chapter.xhtml#PC2).


    ```

    alter index PK_Customers on Delivery.Customers rebuild

    with

    (

    online=on

    (

    wait_at_low_priority(   max_duration=10 minutes  ,abort_after_wait=blockers )

    )

    );

    alter table Delivery.Orders

    switch partition 1 to Delivery.OrdersTmp

    with

    (

    wait_at_low_priority (   max_duration=60 minutes  ,abort_after_wait=self )

    )

    Listing 8-2

    Specifying lock priority

    ```


    As you can see, `WAIT_AT_LOW_PRIORITY` has two options. The `MAX_DURATION` setting
    specifies the lock wait time in minutes. The `ABORT_AFTER_WAIT` setting defines
    the session behavior if a lock cannot be obtained within the specified time limit.
    The possible values are:


    *   `NONE`: The low-priority lock is converted to a regular lock. After that,
    it behaves as a regular lock, blocking other sessions that try to acquire incompatible
    lock types on the resource. The session continues to wait until the lock is acquired.


    *   `SELF`: The operation is aborted if a lock cannot be granted within the time
    specified by the `MAX_DURATION` setting.


    *   `BLOCKERS`: All sessions that hold locks on the resource are aborted, and
    the session, which is waiting for a low-priority lock, will be able to acquire
    it.'
  trans: "\n### 重要提示\n\n第一种场景，当第三个会话在 `READ COMMITTED` 隔离级别下运行且未获取到资源上的锁时，可以被视为一种内部优化，但你不应依赖于此。在某些情况下，SQL\
    \ Server 在 `READ COMMITTED` 模式下仍然会尝试获取资源上的另一个共享 (S) 锁，即使该资源上已经存在另一个共享 (S) 锁。在这种情况下，查询将像在\
    \ `REPEATABLE READ` 隔离级别示例中一样被阻塞。\n\n不幸的是，SQL Server 中的会话不会重用其他会话在表级别的锁。无法估计任何表级锁意图、完全锁或架构稳定性锁需要保持的时间。会话将始终尝试获取对象级锁，如果锁队列中存在任何其他不兼容的锁类型，它将被阻塞。\n\
    \n这种行为可能会在系统中引入严重的阻塞问题。最常见的案例之一是在线索引重建操作。尽管它在重建过程中持有意向共享 (IS) 表锁，但它需要在开始时获取一个共享\
    \ (S) 表锁，并在执行的最后阶段获取一个架构修改 (Sch-M) 锁。这两个锁的持有时间都非常短；然而，它们在繁忙的 OLTP 环境中可能会引发阻塞问题。\n\
    \n考虑这样一种情况：当另一个活动事务正在修改表中的数据时，你启动了在线索引重建。该事务将持有表上的意向排他 (IX) 锁，这会阻止在线索引重建获取共享 (S)\
    \ 表锁。锁请求将在队列中等待，并阻塞所有其他想要修改表中数据并请求意向排他 (IX) 锁的事务。图 8-8 说明了这种情况。\n\n![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig8_HTML.jpg](img/463519_1_En_8_Fig8_HTML.jpg)\n\
    图 8-8\n索引重建初始阶段的阻塞\n\n只有当第一个事务完成，并且在线索引重建获取并释放了共享 (S) 表锁后，这种阻塞状况才会清除。同样，更严重的阻塞可能发生在在线索引重建的最后阶段，此时它需要获取一个架构修改\
    \ (Sch-M) 锁以在元数据中替换索引引用。在索引重建等待架构修改 (Sch-M) 锁被授予期间，读取者和写入者都将被阻塞。\n\n在分区切换操作期间也可能发生类似的阻塞，该操作也会获取架构修改\
    \ (Sch-M) 锁。尽管分区切换是在元数据级别完成且速度非常快，但架构修改 (Sch-M) 锁在队列中等待被授予时会阻塞其他会话。\n\n在设计索引维护和分区管理策略时，你需要记住这一行为。在\
    \ SQL Server 的非企业版，甚至在 SQL Server 2014 之前的企业版中，能做的很少。你可以在系统负载最低的时间段安排操作运行。或者，你可以使用\
    \ `LOCK_TIMEOUT` 设置编写代码来终止操作。\n\n清单 8-1 说明了这种方法。你可以将其用于离线索引重建和分区切换操作。在离线索引重建期间，当架构修改\
    \ (Sch-M) 锁被持有时，你仍然会遇到阻塞。但是，如果在 `LOCK_TIMEOUT` 间隔内无法获取此锁，你将消除阻塞。请记住，当 `XACT_ABORT`\
    \ 设置为 `OFF` 时，锁超时错误不会回滚事务。请使用适当的事务管理和错误处理，正如我们在第 2 章讨论的那样。\n\n另外，作为另一个告诫，不要在在线索引重建中使用\
    \ `LOCK_TIMEOUT`，因为它可能会在会话等待架构修改 (Sch-M) 锁以在元数据中替换索引定义时，在最后阶段终止并回滚操作。\n\n```sql\n\
    set xact_abort off\nset lock_timeout 100 -- 100 milliseconds\ngo\ndeclare\n  \
    \  @attempt int = 1\n    ,@maxAttempts int = 10\nwhile @attempt <= @maxAttempts\n\
    begin\n    begin try\n        raiserror('Rebuilding index. Attempt %d / %d',0,1,@attempt,@maxAttempts)\
    \ with nowait;\n        alter index PK_Orders\n        on Delivery.Orders rebuild\n\
    \        with (online = off);\n        break;\n    end try\n    begin catch\n\
    \        if ERROR_NUMBER() = 1222 and @attempt < @maxAttempts\n        begin\n\
    \            set @attempt += 1;\n            waitfor delay '00:00:15.000';\n \
    \       end\n        else\n            throw;\n    end catch\nend;\n```\n清单 8-1\n\
    减少离线索引重建期间的阻塞\n\n幸运的是，SQL Server 2014 及以上版本的企业版提供了一种更好的方法来处理此问题。\n\n## 低优先级锁\n\
    \nSQL Server 2014 引入了一个新功能——低优先级锁，它有助于减少在线索引重建和分区切换操作期间的阻塞。从概念上讲，你可以将低优先级锁视为驻留在与常规锁不同的锁队列中。\n\
    \n图 8-9 说明了这一点。\n\n![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig9_HTML.jpg](img/463519_1_En_8_Fig9_HTML.jpg)\n\
    图 8-9\n低优先级锁\n\n### 重要提示\n\n必须记住，一旦获取了低优先级锁，其行为将与常规锁相同，阻止其他会话在该资源上获取不兼容的锁。\n\n\
    图 8-10 展示了第 3 章清单 3-2 中查询的输出。它演示了低优先级锁如何在 `sys.dm_tran_locks` 视图输出中显示。值得注意的是，该视图不提供这些锁的等待时间。\n\
    \n![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig10_HTML.jpg](img/463519_1_En_8_Fig10_HTML.jpg)\n\
    图 8-10\n`sys.dm_tran_locks` 数据管理视图中的低优先级锁\n\n你可以在 `ALTER INDEX` 和 `ALTER TABLE`\
    \ 语句中使用 `WAIT_AT_LOW_PRIORITY` 子句来指定锁优先级，如清单 8-2 所示。\n\n```sql\nalter index PK_Customers\
    \ on Delivery.Customers rebuild\nwith\n(\n    online=on\n    (\n        wait_at_low_priority(\
    \   max_duration=10 minutes  ,abort_after_wait=blockers )\n    )\n);\nalter table\
    \ Delivery.Orders\nswitch partition 1 to Delivery.OrdersTmp\nwith\n(\n    wait_at_low_priority\
    \ (   max_duration=60 minutes  ,abort_after_wait=self )\n)\n```\n清单 8-2\n指定锁优先级\n\
    \n如你所见，`WAIT_AT_LOW_PRIORITY` 有两个选项。`MAX_DURATION` 设置指定以分钟为单位的锁等待时间。`ABORT_AFTER_WAIT`\
    \ 设置定义了如果在指定时间限制内无法获取锁时，会话的行为。可能的值为：\n\n*   `NONE`：低优先级锁转换为常规锁。之后，它的行为就像常规锁一样，会阻塞尝试在该资源上获取不兼容锁类型的其他会话。会话继续等待，直到锁被获取。\n\
    *   `SELF`：如果在 `MAX_DURATION` 设置指定的时间内无法授予锁，则操作将中止。\n*   `BLOCKERS`：所有持有该资源锁的会话都将被中止，等待低优先级锁的会话将能够获取它。\n"
- fmt: '### Note


    Omitting the `WAIT_AT_LOW_PRIORITY` option works the same way as specifying `WAIT_AT_LOW_PRIORITY(MAX_DURATION=0
    MINUTES, ABORT_AFTER_WAIT=NONE)`.


    Very active OLTP tables always have a large number of concurrent sessions accessing
    them. Therefore, there is always the possibility that a session will not be able
    to acquire a low-priority lock, even with a prolonged `MAX_DURATION` specified.
    You may consider using the `ABORT_AFTER_WAIT=BLOCKERS` option, which will allow
    the operation to complete, especially when client applications have proper exception
    handling and retry logic implemented.


    Finally, it is worth noting that online index rebuilds are supported only in the
    Enterprise Edition of SQL Server and in Microsoft Azure SQL Databases. You cannot
    use low-priority locks during index rebuilds in other editions. Table partitioning,
    however, is supported in non-Enterprise editions starting with SQL Server 2016
    SP1, and you can use low-priority locks in this scenario in any edition of SQL
    Server.


    ## Summary


    SQL Server uses schema locks to protect metadata from alteration during query
    compilation and execution. There are two types of schema locks in SQL Server:
    schema stability (`Sch-S`) and schema modification (`Sch-M`) locks.


    Schema stability (`Sch-S`) locks are acquired on objects referenced by queries
    during query compilation and execution. In some cases, however, SQL Server can
    replace schema stability (`Sch-S`) locks with intent table locks, which also protect
    the table schema. Schema stability (`Sch-S`) locks are compatible with any other
    lock type, with the exception of schema modification (`Sch-M`) locks.


    Schema modification (`Sch-M`) locks are incompatible with any other lock type.
    SQL Server uses them during DDL operations. If a DDL operation needs to scan or
    modify the data (for example, adding a trusted foreign key constraint to the table
    or altering a partition function on a non-empty partition), the schema modification
    (`Sch-M`) lock would be held for the duration of the operation. This can take
    a long time on large tables and cause severe blocking issues in the system. You
    need to keep this in mind when designing systems with DDL and DML operations running
    in parallel.


    In order to be granted, a lock needs to be compatible with all of the lock requests
    on that resource—granted or not. This may lead to serious blocking in busy systems
    when some session requests schema modification (`Sch-M`) or full object-level
    locks on the table. You need to remember this behavior when you design index or
    partition maintenance strategies in the system.


    SQL Server 2014 and above support low-priority locks, which can be used to reduce
    blocking during online index rebuild and partition switch operations. These locks
    do not block other sessions requesting incompatible lock types at the time when
    an operation is waiting for a low-priority lock to be acquired.


    # 9. Lock Partitioning


    SQL Server, as with other modern database engines, is designed to work on servers
    with a large number of CPUs. It has many optimizations that help the Engine to
    scale and efficiently work in such environments.


    This chapter will discuss one such optimization: lock partitioning, which is automatically
    enabled on servers with 16 or more logical CPUs.


    ## Lock Partitioning Overview


    As all of us are aware, hardware costs are dropping over time, allowing us to
    build more powerful servers. Twenty years ago, database servers used to have just
    one or very few CPUs. Nowadays, it is very common to work with servers that have
    dozens or sometimes even hundreds of cores.


    The majority of multi-CPU servers are built using *Non-Uniform Memory Access (NUMA)*
    architecture. In this architecture, physical CPUs are partitioned into groups,
    called *NUMA nodes*. The memory is also partitioned across the nodes, and each
    node uses a separate system bus to access it. Each processor can access all memory
    in the system; however, access to the *local memory* that belongs to a CPU’s NUMA
    node is faster than access to *foreign memory* from different NUMA nodes.


    ### Note


    You can read more about NUMA architecture at [`https://technet.microsoft.com/en-us/library/ms178144.aspx`](https://technet.microsoft.com/en-us/library/ms178144.aspx).


    SQL Server natively supports NUMA architecture and has several internal optimizations
    to take advantage of it. For example, SQL Server always tries to allocate local
    memory for the thread, and it also has distributed I/O threads on a per-NUMA basis.


    Moreover, various caches and queues are partitioned on a per-NUMA—and sometimes
    per-scheduler—basis, which reduces possible contention when multiple schedulers
    (logical CPUs) access them. This includes lock queues in the system. When a system
    has 16 or more logical processors, SQL Server starts to use a technique called
    *lock partitioning*.


    When lock partitioning is enabled, SQL Server starts to store information about
    locks on a per-scheduler basis. In this mode, object-level intent shared (`IS`),
    intent exclusive (`IX`), and schema stability (`Sch-S`) locks are acquired and
    stored in a single partition on the CPU (scheduler) where the batch is executing.
    All other lock types need to be acquired on all partitions.


    This does not change anything from a lock-compatibility standpoint. When the session
    needs to acquire an exclusive (`X`) table lock, for example, it would go through
    all lock partitions and would be blocked if any of the partitions held an incompatible
    intent lock on the table. This, however, may lead to interesting situations where
    an object-level lock is being granted on a subset of partitions and is being blocked
    on another partition with an incompatible intent (`I*`) or schema stability (`Sch-S`)
    lock held on it.


    Let’s look at an example that demonstrates this. As I already mentioned, lock
    partitioning is enabled automatically on servers with 16 or more logical CPUs.
    You can change the number of schedulers in your test system using undocumented
    startup parameter `-P`. *Do not use this parameter in production!*


    Listing 9-1 shows a query that starts a transaction and selects one row from the
    table in the `REPEATABLE READ` isolation level, which holds a shared (`S`) lock
    until the end of the transaction. As the next step, it obtains information about
    the locks held by the session using the `sys.dm_tran_locks` view. I am running
    this code in my test environment using the `-P16` startup parameter, which creates
    16 schedulers and enables lock partitioning.


    ```

    begin tran

    select *

    from Delivery.Orders with (repeatableread)

    where OrderId = 100;

    select

    request_session_id

    ,resource_type

    ,resource_lock_partition

    ,request_mode

    ,request_status

    from sys.dm_tran_locks

    where request_session_id = @@SPID;

    ```

    **Listing 9-1** Lock partitioning: Updating one row in the table


    Figure 9-1 illustrates the output of the `SELECT` statement. The `resource_lock_partition`
    column indicates the partition (scheduler) where the lock is stored (`NULL` means
    the lock is not partitioned and has been acquired on all partitions). As you can
    see, the table-level intent shared (`IS`) lock is partitioned and stored in partition
    four. Page- and row-level locks are not partitioned and are stored in all partitions.


    ![../images/463519_1_En_9_Chapter/463519_1_En_9_Fig1_HTML.jpg](images/463519_1_En_9_Chapter/463519_1_En_9_Fig1_HTML.jpg)


    **Figure 9-1** Lock requests after update


    Now, let’s run the code in another session that wants to perform an index rebuild
    of the same table, using the `ALTER INDEX PK_Orders on Delivery.Orders REBUILD`
    command. This operation needs to acquire a schema modification (`Sch-M`) lock
    on the table. This lock type is non-partitioned and needs to be acquired across
    all partitions in the system.'
