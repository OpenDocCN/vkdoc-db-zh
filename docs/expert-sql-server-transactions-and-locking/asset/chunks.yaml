    isolation levels and switch to `READ COMMITTED SNAPSHOT` mode , where readers
    do not acquire shared (S) locks.'
  trans: '## 因未优化查询导致的死锁


    经典的死锁通常发生在数据高度易变且多个会话更新相同行时，但死锁还有另一个常见原因。它是由于未优化查询引入的扫描操作所导致的。让我们看一个例子：假设你有一个进程，它更新
    `Delivery.Orders` 表中的一行，然后查询该客户有多少订单。让我们看看当两个这样的会话使用 `READ COMMITTED` 事务隔离级别并行运行时会发生什么。


    第一步，两个会话执行两条 `UPDATE` 语句。这两条语句都能顺利运行，不会涉及阻塞——正如你所记得的，该表在 `OrderId` 列上有聚集索引，因此执行计划中会有
    *聚集索引 seek* 操作符。图 5-3 展示了这一步。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig3_HTML.png](img/463519_1_En_5_Fig3_HTML.png)


    **图 5-3** 由扫描导致的死锁：第一步


    此时，两个会话都在其更新的行上持有排他锁。作为第二步，会话运行基于 `CustomerId` 过滤器的 `SELECT` 语句。该表上没有非聚集索引，因此执行计划中将包含
    *聚集索引扫描* 操作。在 `READ COMMITTED` 隔离级别下，SQL Server 在读取数据时会获取共享锁，结果就是，一旦两个会话尝试读取已被持有排他锁的行，它们就会被阻塞。图
    5-4 展示了这种情况。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig4_HTML.jpg](img/463519_1_En_5_Fig4_HTML.jpg)


    **图 5-4** 由扫描导致的死锁：第二步


    如果在两个会话都被阻塞之后、死锁监视器任务唤醒之前，你运行清单 5-1 所示的查询，你会看到两个会话正在互相阻塞。


    ```sql

    select

    tl.request_session_id as [SPID]

    ,tl.resource_type as [Resouce Type]

    ,tl.resource_description as [Resource]

    ,tl.request_mode as [Mode]

    ,tl.request_status as [Status]

    ,wt.blocking_session_id as [Blocked By]

    from

    sys.dm_tran_locks tl with (nolock) left outer join

    sys.dm_os_waiting_tasks wt with (nolock) on

    tl.lock_owner_address = wt.resource_address and

    tl.request_status = ''WAIT''

    where

    tl.request_session_id <> @@SPID and tl.resource_type = ''KEY''

    order by

    tl.request_session_id

    ```


    **清单 5-1** 两个会话被阻塞时的锁请求


    图 5-5 显示了该查询的输出。如你所见，两个会话正在互相阻塞。即使这些会话并不打算将这些行包含在计数计算中，这也无关紧要。在共享锁被获取且行被读取之前，SQL
    Server 无法评估 `CustomerId` 谓词。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig5_HTML.jpg](img/463519_1_En_5_Fig5_HTML.jpg)


    **图 5-5** 死锁发生时的锁请求


    在任何读者需要获取共享锁的事务隔离级别中，你都会遇到类似的死锁。在 `READ UNCOMMITTED`、`READ COMMITTED SNAPSHOT`
    或 `SNAPSHOT` 这些不使用共享锁的隔离级别下，则不会发生这种死锁。


    尽管如此，在 `READ UNCOMMITTED` 和 `READ COMMITTED SNAPSHOT` 隔离级别下，你仍可能因为写入者冲突而发生死锁。你可以在前面的例子中将
    `SELECT` 语句替换为引入扫描操作的 `UPDATE` 语句来触发它。另一方面，`SNAPSHOT` 隔离级别除非在你更新相同行的情况下，否则不会发生写入者/写入者阻塞，即使使用
    `UPDATE` 语句也不会导致死锁。


    查询优化有助于修复由扫描和未优化查询引起的死锁。在上述案例中，你可以通过在 `CustomerId` 列上添加一个非聚集索引来解决问题。这会改变 `SELECT`
    语句的执行计划，用 *非聚集索引 seek* 替换掉 *聚集索引扫描*。结果，会话将无需读取被另一个会话修改过且持有不兼容锁的行。


    ## 键查找死锁


    在某些情况下，当多个会话尝试同时读取和更新同一行时，可能会发生死锁。


    假设你表上有一个非聚集索引，一个会话想要使用该索引来读取该行。如果该索引不是覆盖索引，并且会话需要从聚集索引中获取一些数据，SQL Server 生成的执行计划可能包含
    `非聚集索引 seek` 和 `键查找` 操作。该会话将首先在非聚集索引行上获取共享锁，然后在聚集索引行上获取共享锁。


    同时，如果你有另一个会话，它使用聚集键值作为查询谓词来更新属于该非聚集索引的一部分的某个列，那么该会话将以相反的顺序获取排他锁；即先在聚集索引行上获取排他锁，然后在非聚集索引行上获取。


    图 5-6 显示了第一步之后发生的情况：两个会话都成功地在聚集索引和非聚集索引的行上获取了锁。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig6_HTML.jpg](img/463519_1_En_5_Fig6_HTML.jpg)


    **图 5-6** 键查找死锁：第一步


    在下一步中，两个会话都尝试在另一个索引的行上获取锁，结果如图 5-7 所示，它们被阻塞了。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig7_HTML.jpg](img/463519_1_En_5_Fig7_HTML.jpg)


    **图 5-7** 键查找死锁：第二步


    如果这恰好同时发生，你就会遇到死锁，并且读取数据的会被选作死锁牺牲品。这是我们之前看到的典型循环死锁的一个例子。尽管两个会话操作的是单表单行，但 SQL Server
    在内部处理的是两行——分别位于聚集索引和非聚集索引中。


    你可以通过将非聚集索引设为覆盖索引并避免 `键查找` 操作来解决这类死锁。不幸的是，这种方案会增加非聚集索引中叶子行的大小，并在数据修改和索引维护期间引入额外开销。或者，你可以使用乐观隔离级别，并切换到
    `READ COMMITTED SNAPSHOT` 模式，在该模式下，读取者不获取共享锁。'
- fmt: '## 死锁：由于同一行的多次更新


    一种与之前类似的死锁模式，可能由于对同一行进行多次更新而引入，特别是当更新访问或更改了不同索引中的列时。这可能导致死锁情况——类似于键查找死锁——即另一个会话在更新之间锁定了非聚集索引行。这种情况的一个常见场景是使用
    `AFTER UPDATE` 触发器更新同一行。


    让我们看一个场景：你有一个包含聚集索引和非聚集索引的表，并定义了 `AFTER UPDATE` 触发器。让会话1更新一个不属于非聚集索引的列。此步骤如图5-8所示。它仅获取聚集索引上该行的排他锁（X锁）。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig8_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig8_HTML.jpg)

    *图 5-8：因同一行多次更新导致的死锁：步骤1*


    更新操作触发了 `AFTER UPDATE` 触发器。同时，假设另一个会话正尝试使用非聚集索引选择同一行。该会话在非聚集索引查找操作期间，成功获取了非聚集索引行上的共享锁（S锁）。然而，在键查找操作期间尝试获取聚集索引行上的共享锁（S锁）时，它将被阻塞，如图5-9所示。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig9_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig9_HTML.jpg)

    *图 5-9：因同一行多次更新导致的死锁：步骤2*


    最后，如果会话1的触发器尝试再次更新同一行，修改存在于非聚集索引中的列，它将被会话2持有的共享锁（S锁）阻塞。图5-10说明了这种情况。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig10_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig10_HTML.jpg)

    *图 5-10：因同一行多次更新导致的死锁*


    让我们通过清单5-2中的代码来验证这一点。


    ```sql

    create table dbo.T1

    (

    CI_Key int not null,

    NCI_Key int not null,

    CI_Col varchar(32),

    NCI_Included_Col int

    );

    create unique clustered index IDX_T1_CI on dbo.T1(CI_Key);

    create nonclustered index IDX_T1_NCI

    on dbo.T1(NCI_Key)

    include (NCI_Included_Col);

    insert into dbo.T1(CI_Key,NCI_Key,CI_Col,NCI_Included_Col)

    values(1,1,''a'',0), (2,2,''b'',0), (3,3,''c'',0), (4,4,''d'',0);

    begin tran

    update dbo.T1 set CI_Col = ''abc'' where CI_Key = 1;

    select

    l.request_session_id as [SPID]

    ,object_name(p.object_id) as [Object]

    ,i.name as [Index]

    ,l.resource_type as [Lock Type]

    ,l.resource_description as [Resource]

    ,l.request_mode as [Mode]

    ,l.request_status as [Status]

    ,wt.blocking_session_id as [Blocked By]

    from

    sys.dm_tran_locks l join sys.partitions p on

    p.hobt_id = l.resource_associated_entity_id

    join sys.indexes i on

    p.object_id = i.object_id and p.index_id = i.index_id

    left outer join sys.dm_os_waiting_tasks wt with (nolock) on

    l.lock_owner_address = wt.resource_address and

    l.request_status = ''WAIT''

    where

    resource_type = ''KEY'' and request_session_id = @@SPID;

    update dbo.T1 set NCI_Included_Col = 1 where NCI_Key = 1

    select

    l.request_session_id as [SPID]

    ,object_name(p.object_id) as [Object]

    ,i.name as [Index]

    ,l.resource_type as [Lock Type]

    ,l.resource_description as [Resource]

    ,l.request_mode as [Mode]

    ,l.request_status as [Status]

    ,wt.blocking_session_id as [Blocked By]

    from

    sys.dm_tran_locks l join sys.partitions p on

    p.hobt_id = l.resource_associated_entity_id

    join sys.indexes i on

    p.object_id = i.object_id and p.index_id = i.index_id

    left outer join sys.dm_os_waiting_tasks wt with (nolock) on

    l.lock_owner_address = wt.resource_address and

    l.request_status = ''WAIT''

    where

    resource_type = ''KEY'' and request_session_id = @@SPID;

    commit

    ```

    *清单 5-2：同一行的多次更新*


    清单5-2中的代码更新了该行两次。如果你查看第一次更新后持有的行级锁，你会看到仅在聚集索引上持有一个锁，如图5-11所示。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig11_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig11_HTML.jpg)

    *图 5-11：第一次更新后的行级锁*


    第二次更新（更新了存在于非聚集索引中的列）在那里放置了另一个排他锁（X锁），如图5-12所示。这证明了，除非实际更新了索引列，否则不会获取非聚集索引行上的锁。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig12_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig12_HTML.jpg)

    *图 5-12：第二次更新后的行级锁*


    现在，让我们看另一个 `SPID = 55` 的会话，在两次更新之间运行清单5-3中所示的 `SELECT` 语句，此时你只有一个行级锁被持有。


    ```sql

    select CI_Key, CI_Col

    from dbo.T1 with (index = IDX_T1_NCI)

    where NCI_Key = 1

    ```

    *清单 5-3：导致死锁的代码*


    如图5-13所示，该查询成功获取了非聚集索引行上的共享锁（S锁），并因尝试获取聚集索引行上的锁而被阻塞。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig13_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig13_HTML.jpg)

    *图 5-13：SELECT 查询被阻塞时的行级锁*


    如果你在原始会话（`SPID = 56`）中运行第二个更新，它将尝试获取非聚集索引上的排他锁（X锁），并会被第二个（`SELECT`）会话阻塞，如图5-14所示。这便导致了死锁条件。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig14_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig14_HTML.jpg)

    *图 5-14：第二次更新运行时的行级锁（死锁）*'
  raw: '## Deadlock Due to Multiple Updates of the Same Row


    A deadlock pattern that is similar to the previous can be introduced by having
    multiple updates of the same row when updates access or change columns in different
    indexes. This could lead to a deadlock situation—similar to the Key Lookup deadlock—where
    another session places a lock on the nonclustered index row in between the updates.
    One of the common scenarios where it happens is with `AFTER UPDATE` triggers that
    update the same row.


    Let’s look at a situation where you have a table with both clustered and nonclustered
    indexes and the `AFTER UPDATE` trigger defined. Let’s have session 1 update a
    column that does not belong to the nonclustered index. This step is shown in Figure
    [5-8](#463519_1_En_5_Chapter.xhtml#Fig8). It acquires an exclusive (X) lock on
    the row from the clustered index only.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig8_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Deadlock due to multiple updates of the same row: Step 1


    The update fires the `AFTER UPDATE` trigger. Meanwhile, let’s assume that another
    session is trying to select the same row using the nonclustered index. This session
    successfully acquires a shared (S) lock on the nonclustered index row during the
    Nonclustered Index Seek operation. However, it would be blocked when trying to
    obtain a shared (S) lock on the clustered index row during the Key Lookup, as
    shown in Figure [5-9](#463519_1_En_5_Chapter.xhtml#Fig9).


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig9_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Deadlock due to the multiple updates of the same row: Step 2


    Finally, if session 1 trigger tries to update the same row again, modifying the
    column that exists in the nonclustered index, it would be blocked by the shared
    (S) lock held by session 2\. Figure [5-10](#463519_1_En_5_Chapter.xhtml#Fig10)
    illustrates this situation.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig10_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig10_HTML.jpg)


    Figure 5-10


    Deadlock due to multiple updates of the same row


    Let’s prove that with the code shown in Listing [5-2](#463519_1_En_5_Chapter.xhtml#PC2).


    ```

    create table dbo.T1

    (

    CI_Key int not null,

    NCI_Key int not null,

    CI_Col varchar(32),

    NCI_Included_Col int

    );

    create unique clustered index IDX_T1_CI on dbo.T1(CI_Key);

    create nonclustered index IDX_T1_NCI

    on dbo.T1(NCI_Key)

    include (NCI_Included_Col);

    insert into dbo.T1(CI_Key,NCI_Key,CI_Col,NCI_Included_Col)

    values(1,1,''a'',0), (2,2,''b'',0), (3,3,''c'',0), (4,4,''d'',0);

    begin tran

    update dbo.T1 set CI_Col = ''abc'' where CI_Key = 1;

    select

    l.request_session_id as [SPID]

    ,object_name(p.object_id) as [Object]

    ,i.name as [Index]

    ,l.resource_type as [Lock Type]

    ,l.resource_description as [Resource]

    ,l.request_mode as [Mode]

    ,l.request_status as [Status]

    ,wt.blocking_session_id as [Blocked By]

    from

    sys.dm_tran_locks l join sys.partitions p on

    p.hobt_id = l.resource_associated_entity_id

    join sys.indexes i on

    p.object_id = i.object_id and p.index_id = i.index_id

    left outer join sys.dm_os_waiting_tasks wt with (nolock) on

    l.lock_owner_address = wt.resource_address and

    l.request_status = ''WAIT''

    where

    resource_type = ''KEY'' and request_session_id = @@SPID;

    update dbo.T1 set NCI_Included_Col = 1 where NCI_Key = 1

    select

    l.request_session_id as [SPID]

    ,object_name(p.object_id) as [Object]

    ,i.name as [Index]

    ,l.resource_type as [Lock Type]

    ,l.resource_description as [Resource]

    ,l.request_mode as [Mode]

    ,l.request_status as [Status]

    ,wt.blocking_session_id as [Blocked By]

    from

    sys.dm_tran_locks l join sys.partitions p on

    p.hobt_id = l.resource_associated_entity_id

    join sys.indexes i on

    p.object_id = i.object_id and p.index_id = i.index_id

    left outer join sys.dm_os_waiting_tasks wt with (nolock) on

    l.lock_owner_address = wt.resource_address and

    l.request_status = ''WAIT''

    where

    resource_type = ''KEY'' and request_session_id = @@SPID;

    commit

    Listing 5-2

    Multiple updates of the same row

    ```


    The code in Listing [5-2](#463519_1_En_5_Chapter.xhtml#PC2) updates the row twice
    . If you look at the row-level locks held after the first update, you see only
    one lock held on the clustered index, as shown in Figure [5-11](#463519_1_En_5_Chapter.xhtml#Fig11).


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig11_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig11_HTML.jpg)


    Figure 5-11


    Row-level locks after the first update


    The second update , which updates the column that exists in the nonclustered index,
    places another exclusive (X) there, as shown in Figure [5-12](#463519_1_En_5_Chapter.xhtml#Fig12).
    This proves that the lock on the nonclustered index row is not acquired unless
    the index columns are actually updated.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig12_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig12_HTML.jpg)


    Figure 5-12


    Row-level locks after the second update


    Now, let’s look at another session with `SPID = 55` running the `SELECT` shown
    in Listing [5-3](#463519_1_En_5_Chapter.xhtml#PC3) in between two updates, at
    a time when you have just one row-level lock held.


    ```

    select CI_Key, CI_Col

    from dbo.T1 with (index = IDX_T1_NCI)

    where NCI_Key = 1

    Listing 5-3

    The code that leads to the deadlock

    ```


    As you can see in Figure [5-13](#463519_1_En_5_Chapter.xhtml#Fig13), the query
    successfully acquires the shared (S) lock on the nonclustered index row and is
    blocked by trying to acquire the lock on the clustered index row.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig13_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig13_HTML.jpg)


    Figure 5-13


    Row-level locks when SELECT query is blocked


    If you ran the second update in the original session with `SPID = 56`, it would
    try to acquire an exclusive (X) lock on the nonclustered index, and it would be
    blocked by the second (`SELECT`) session, as shown in Figure [5-14](#463519_1_En_5_Chapter.xhtml#Fig14).
    That leads to the deadlock condition.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig14_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig14_HTML.jpg)


    Figure 5-14


    Row-level locks when second update is running (deadlock)'
  trans: '## 死锁：因同一行被多次更新而引发


    一种与之前类似的死锁模式，可能会因对同一行进行多次更新而引入，特别是当这些更新访问或修改了位于不同索引中的列时。这可能导致一种死锁情况——类似于键查找死锁——即另一个会话在更新操作之间锁定了非聚集索引行。一个常见的场景是使用
    `AFTER UPDATE` 触发器来更新同一行。


    让我们看一个场景：你有一个同时包含聚集索引和非聚集索引的表，并且定义了 `AFTER UPDATE` 触发器。让会话 1 更新一个不属于非聚集索引的列。此步骤如图
    5-8 所示。它仅获取聚集索引上该行的排他锁（X 锁）。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig8_HTML.jpg](img/463519_1_En_5_Fig8_HTML.jpg)

    *图 5-8：因同一行多次更新导致的死锁：步骤 1*


    更新操作触发了 `AFTER UPDATE` 触发器。同时，假设另一个会话正尝试通过非聚集索引选择同一行。该会话在非聚集索引查找操作期间，成功获取了非聚集索引行上的共享锁（S
    锁）。然而，在尝试键查找操作以获取聚集索引行上的共享锁（S 锁）时，它将被阻塞，如图 5-9 所示。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig9_HTML.jpg](img/463519_1_En_5_Fig9_HTML.jpg)

    *图 5-9：因同一行多次更新导致的死锁：步骤 2*


    最后，如果会话 1 中的触发器尝试再次更新同一行，修改存在于非聚集索引中的列，它将被会话 2 持有的共享锁（S 锁）阻塞。图 5-10 说明了这种情况。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig10_HTML.jpg](img/463519_1_En_5_Fig10_HTML.jpg)

    *图 5-10：因同一行多次更新导致的死锁*


    让我们通过清单 5-2 中的代码来验证这一点。


    ```sql

    create table dbo.T1

    (

    CI_Key int not null,

    NCI_Key int not null,

    CI_Col varchar(32),

    NCI_Included_Col int

    );

    create unique clustered index IDX_T1_CI on dbo.T1(CI_Key);

    create nonclustered index IDX_T1_NCI

    on dbo.T1(NCI_Key)

    include (NCI_Included_Col);

    insert into dbo.T1(CI_Key,NCI_Key,CI_Col,NCI_Included_Col)

    values(1,1,''a'',0), (2,2,''b'',0), (3,3,''c'',0), (4,4,''d'',0);

    begin tran

    update dbo.T1 set CI_Col = ''abc'' where CI_Key = 1;

    select

    l.request_session_id as [SPID]

    ,object_name(p.object_id) as [Object]

    ,i.name as [Index]

    ,l.resource_type as [Lock Type]

    ,l.resource_description as [Resource]

    ,l.request_mode as [Mode]

    ,l.request_status as [Status]

    ,wt.blocking_session_id as [Blocked By]

    from

    sys.dm_tran_locks l join sys.partitions p on

    p.hobt_id = l.resource_associated_entity_id

    join sys.indexes i on

    p.object_id = i.object_id and p.index_id = i.index_id

    left outer join sys.dm_os_waiting_tasks wt with (nolock) on

    l.lock_owner_address = wt.resource_address and

    l.request_status = ''WAIT''

    where

    resource_type = ''KEY'' and request_session_id = @@SPID;

    update dbo.T1 set NCI_Included_Col = 1 where NCI_Key = 1

    select

    l.request_session_id as [SPID]

    ,object_name(p.object_id) as [Object]

    ,i.name as [Index]

    ,l.resource_type as [Lock Type]

    ,l.resource_description as [Resource]

    ,l.request_mode as [Mode]

    ,l.request_status as [Status]

    ,wt.blocking_session_id as [Blocked By]

    from

    sys.dm_tran_locks l join sys.partitions p on

    p.hobt_id = l.resource_associated_entity_id

    join sys.indexes i on

    p.object_id = i.object_id and p.index_id = i.index_id

    left outer join sys.dm_os_waiting_tasks wt with (nolock) on

    l.lock_owner_address = wt.resource_address and

    l.request_status = ''WAIT''

    where

    resource_type = ''KEY'' and request_session_id = @@SPID;

    commit

    ```

    *清单 5-2：同一行的多次更新*


    清单 5-2 中的代码对该行执行了两次更新。如果你查看第一次更新后持有的行级锁，你会看到仅在聚集索引上持有一个锁，如图 5-11 所示。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig11_HTML.jpg](img/463519_1_En_5_Fig11_HTML.jpg)

    *图 5-11：第一次更新后的行级锁*


    第二次更新（修改了存在于非聚集索引中的列）在那里放置了另一个排他锁（X 锁），如图 5-12 所示。这证明了，除非实际更新了索引列，否则不会在非聚集索引行上获取锁。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig12_HTML.jpg](img/463519_1_En_5_Fig12_HTML.jpg)

    *图 5-12：第二次更新后的行级锁*


    现在，让我们看另一个 `SPID = 55` 的会话，在两次更新之间运行清单 5-3 中所示的 `SELECT` 语句，此时你只有一个行级锁被持有。


    ```sql

    select CI_Key, CI_Col

    from dbo.T1 with (index = IDX_T1_NCI)

    where NCI_Key = 1

    ```

    *清单 5-3：导致死锁的代码*


    如图 5-13 所示，该查询成功获取了非聚集索引行上的共享锁（S 锁），并因尝试获取聚集索引行上的锁而被阻塞。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig13_HTML.jpg](img/463519_1_En_5_Fig13_HTML.jpg)

    *图 5-13：SELECT 查询被阻塞时的行级锁*


    如果你在原始会话（`SPID = 56`）中运行第二个更新语句，它将尝试获取非聚集索引上的排他锁（X 锁），并会被第二个（`SELECT`）会话阻塞，如图
    5-14 所示。这便导致了死锁条件。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig14_HTML.jpg](img/463519_1_En_5_Fig14_HTML.jpg)

    *图 5-14：第二次更新运行时的行级锁（死锁）*'
- fmt: '# 避免死锁的方法


    避免此类问题的最佳方法是消除对同一行的多次更新。你可以使用变量或临时表来存储初步数据，并在事务接近结束时运行单一的 `UPDATE` 语句。或者，你可以修改代码，在第一次
    `UPDATE` 语句中为 `NCI_Included_Col` 分配一个临时值，该语句将在两个索引上获取排他（X）锁。来自第二个会话的 `SELECT`
    语句将无法在非聚集索引上获取锁，因此第二个更新可以正常运行。


    作为最后的手段，你可以使用需要两个索引都使用 `(XLOCK)` 锁定提示的计划来读取行，这将同时在两行上放置排他（X）锁，如清单 [5-4](#463519_1_En_5_Chapter.xhtml#PC4)
    和图 [5-15](#463519_1_En_5_Chapter.xhtml#Fig15) 所示。显然，你需要考虑这会带来的开销。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig15_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig15_HTML.jpg)


    **图 5-15** 使用 `(XLOCK)` 提示的 SELECT 语句后的行级锁


    ```

    begin tran

    declare

    @Dummy varchar(32)

    select @Dummy = CI_Col

    from dbo.T1 with (XLOCK index=IDX_T1_NCI)

    where NCI_Key = 1;

    select

    l.request_session_id as [SPID]

    ,object_name(p.object_id) as [Object]

    ,i.name as [Index]

    ,l.resource_type as [Lock Type]

    ,l.resource_description as [Resource]

    ,l.request_mode as [Mode]

    ,l.request_status as [Status]

    ,wt.blocking_session_id as [Blocked By]

    from

    sys.dm_tran_locks l join sys.partitions p on

    p.hobt_id = l.resource_associated_entity_id

    join sys.indexes i on

    p.object_id = i.object_id and p.index_id = i.index_id

    left outer join sys.dm_os_waiting_tasks wt with (nolock) on

    l.lock_owner_address = wt.resource_address and

    l.request_status = ''WAIT''

    where

    resource_type = ''KEY'' and request_session_id = @@SPID;

    update dbo.T1 set CI_Col = ''abc'' where CI_Key = 1;

    /* some code */

    update dbo.T1 set NCI_Included_Col = 1 where NCI_Key = 1;

    commit

    ```


    **清单 5-4** 在两个索引的行上获取排他（X）锁


    ## 死锁排查


    简而言之，死锁排查与上一章讨论的阻塞排查非常相似。你需要分析涉及死锁的进程和查询，识别问题的根本原因，并最终解决它。


    类似于 *阻塞进程报告*，有一个 *死锁图*，它以 XML 格式为你提供有关死锁的信息。获取死锁图的方法有很多：


    *   `xml_deadlock_report` 扩展事件

    *   从 SQL Server 2008 开始，每个系统在默认的 SQL Server 安装中都有一个启用的 `system_health` 扩展事件会话。该会话捕获基本的服务器运行状况信息，包括
    `xml_deadlock_report` 事件。

    *   跟踪标志 1222：此跟踪标志将死锁信息保存到 SQL Server 错误日志中。你可以使用 `DBCC TRACEON(1222,-1)` 命令或使用启动参数
    `T1222` 为所有会话启用它。这在生产环境中是绝对安全的方法；然而，由于 `system_health` 会话的存在，现在它可能是多余的。

    *   `Deadlock graph` SQL 跟踪事件。值得注意的是，SQL Profiler 以图形方式显示死锁。事件上下文菜单（鼠标右键单击）中的“提取事件数据”操作允许你提取
    XML 死锁图。


    使用 `system_health` xEvent 会话时，默认捕获 `xml_deadlock_graph`。即使你没有显式启用任何其他收集方法，你也可能拥有用于故障排除的数据。在
    SQL Server 2012 及以上版本中，你可以从 Management Studio 的 *管理* 节点访问 `system_health` 会话数据，如图
    [5-16](#463519_1_En_5_Chapter.xhtml#Fig16) 所示。你可以分析 *目标数据*，搜索 `xml_deadlock_report`
    事件。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig16_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig16_HTML.jpg)


    **图 5-16** 访问 system_health xEvents 会话


    死锁图的 XML 表示包含两个不同的部分，如清单 [5-5](#463519_1_En_5_Chapter.xhtml#PC5) 所示。`<process-list>`
    和 `<resource-list>` 部分分别包含有关死锁中涉及的进程和资源的信息。


    ```

    ...

    ...

    ...

    ...

    ```


    **清单 5-5** 死锁图格式


    让我们使用表 [5-1](#463519_1_En_5_Chapter.xhtml#Tab1) 中所示的代码在系统中触发死锁。你需要并行运行两个会话——先运行
    `UPDATE` 语句，然后运行 `SELECT` 语句。


    **表 5-1** 在系统中触发死锁


    | 会话 1 | 会话 2 |

    | --- | --- |

    | `begin tran`        `update Delivery.Orders`        `set OrderStatusId = 1`        `where
    OrderId = 10001;` | `begin tran`        `update Delivery.Orders`        `set OrderStatusId
    = 1`        `where OrderId = 10050;` |

    |         `select count(*) as [Cnt]`        `from Delivery.Orders with (READCOMMITTED)`        `where
    CustomerId = 317;``commit` |         `select count(*) as [Cnt]`        `from Delivery.Orders
    with (READCOMMITTED)`        `where CustomerId = 766;``commit` |


    死锁图中的每个 `<process>` 节点显示特定进程的详细信息，如清单 [5-6](#463519_1_En_5_Chapter.xhtml#PC6)
    所示。为了便于阅读，我移除了一些属性的值。我还特别高亮显示了那些在故障排除过程中我发现特别有用的属性。


    ```

    ...

    ```


    **清单 5-6** 死锁图：`<process>` 节点


    `id` 属性唯一标识进程。`Waitresource` 和 `lockMode` 提供有关锁类型和进程正在等待的资源的信息。在我们的示例中，你可以看到该进程正在等待其中一行（键）上的共享（S）锁。'
  raw: 'The best method to avoid such problems is to eliminate multiple updates of
    the same rows. You can use variables or temporary tables to store preliminary
    data and run the single `UPDATE` statement close to the end of the transaction.
    Alternatively, you can change the code and assign some temporary value to `NCI_Included_Col`
    as part of the first `UPDATE` statement, which would acquire exclusive (X) locks
    on both of the indexes. The `SELECT` from the second session would be unable to
    acquire the lock on the nonclustered index, and the second update would run just
    fine.


    As a last resort, you could read the row using a plan that requires both indexes
    to use an `(XLOCK)` locking hint, which would place exclusive (X) locks on both
    rows, as shown in Listing [5-4](#463519_1_En_5_Chapter.xhtml#PC4) and Figure [5-15](#463519_1_En_5_Chapter.xhtml#Fig15).
    Obviously, you need to consider the overhead this would introduce.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig15_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig15_HTML.jpg)


    Figure 5-15


    Row-level locks after SELECT statement with (XLOCK) hint


    ```

    begin tran

    declare

    @Dummy varchar(32)

    select @Dummy = CI_Col

    from dbo.T1 with (XLOCK index=IDX_T1_NCI)

    where NCI_Key = 1;

    select

    l.request_session_id as [SPID]

    ,object_name(p.object_id) as [Object]

    ,i.name as [Index]

    ,l.resource_type as [Lock Type]

    ,l.resource_description as [Resource]

    ,l.request_mode as [Mode]

    ,l.request_status as [Status]

    ,wt.blocking_session_id as [Blocked By]

    from

    sys.dm_tran_locks l join sys.partitions p on

    p.hobt_id = l.resource_associated_entity_id

    join sys.indexes i on

    p.object_id = i.object_id and p.index_id = i.index_id

    left outer join sys.dm_os_waiting_tasks wt with (nolock) on

    l.lock_owner_address = wt.resource_address and

    l.request_status = ''WAIT''

    where

    resource_type = ''KEY'' and request_session_id = @@SPID;

    update dbo.T1 set CI_Col = ''abc'' where CI_Key = 1;

    /* some code */

    update dbo.T1 set NCI_Included_Col = 1 where NCI_Key = 1;

    commit

    Listing 5-4

    Obtaining exclusive (X) locks on the rows in both indexes

    ```


    ## Deadlock Troubleshooting


    In a nutshell, deadlock troubleshooting is very similar to the blocking troubleshooting
    we discussed in the previous chapter. You need to analyze the processes and queries
    involved in the deadlock, identify the root cause of the problem, and, finally,
    fix it.


    Similar to the *blocked process report* , there is the *deadlock graph*, which
    provides you with information about the deadlock in an XML format. There are plenty
    of ways to obtain the deadlock graph:


    *   `xml_deadlock_report` Extended Event


    *   Starting with SQL Server 2008, every system has a `system_health` Extended
    Event session enabled by default in every SQL Server installation. That session
    captures basic server health information, including `xml_deadlock_report` events.


    *   Trace Flag 1222: This trace flag saves deadlock information to the SQL Server
    Error Log. You can enable it for all sessions with the `DBCC TRACEON(1222,-1)`
    command or by using startup parameter `T1222`*.* It is a perfectly safe method
    to use in production; however, nowadays, it may be redundant because of the `system_health`
    session.


    *   `Deadlock graph` SQL Trace event. It is worth noting that SQL Profiler displays
    the graphic representation of the deadlock. The “Extract Event Data” action from
    the event context menu (right mouse click) allows you to extract an XML deadlock
    graph.


    With the `system_health` xEvent session, `xml_deadlock_graph` is captured by default.
    You may have the data for troubleshooting even if you did not explicitly enable
    any other collection methods. In SQL Server 2012 and above, you can access `system_health`
    session data from the *Management* node in Management Studio, as shown in Figure
    [5-16](#463519_1_En_5_Chapter.xhtml#Fig16). You could analyze the *target data*,
    searching for an `xml_deadlock_report` event.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig16_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig16_HTML.jpg)


    Figure 5-16


    Accessing system_health xEvents session


    The XML representation of the deadlock graph contains two different sections,
    as shown in Listing [5-5](#463519_1_En_5_Chapter.xhtml#PC5). The sections `<process-list>`
    and `<resource-list>` contain information about the processes and resources involved
    in the deadlock, respectively.


    ```


    ...


    ...


    ...


    ...


    Listing 5-5

    Deadlock graph format

    ```


    Let’s trigger a deadlock in the system by using the code shown in Table [5-1](#463519_1_En_5_Chapter.xhtml#Tab1).
    You need to run two sessions in parallel—running `UPDATE` statements first and
    then `SELECT` statements .


    Table 5-1


    Triggering Deadlock in the System


    | Session 1 | Session 2 |

    | --- | --- |

    | `begin tran`        `update Delivery.Orders`        `set OrderStatusId = 1`        `where
    OrderId = 10001;` | `begin tran`        `update Delivery.Orders`        `set OrderStatusId
    = 1`        `where OrderId = 10050;` |

    |         `select count(*) as [Cnt]`        `from Delivery.Orders with (READCOMMITTED)`        `where
    CustomerId = 317;``commit` |         `select count(*) as [Cnt]`        `from Delivery.Orders
    with (READCOMMITTED)`        `where CustomerId = 766;``commit` |


    Each `<process>` node in the deadlock graph shows details for a specific process,
    as shown in Listing [5-6](#463519_1_En_5_Chapter.xhtml#PC6). I removed the values
    from some of the attributes to make it easier to read. I also have highlighted
    the ones that I’ve found especially helpful during troubleshooting.


    ```


    SELECT COUNT(*) [Cnt] FROM [Delivery].[Orders] with (REACOMMITTED) WHERE [CustomerId]=@1


    select count(*) as [Cnt]

    from Delivery.Orders with (REACOMMITTED)

    where CustomerId = 766

    commit


    Listing 5-6

    Deadlock graph:  node

    ```


    The `id` attribute uniquely identifies the process. `Waitresource` and `lockMode`
    provide information about the lock type and the resource for which the process
    is waiting. In our example, you can see that the process is waiting for the shared
    (S) lock on one of the rows (keys).'
