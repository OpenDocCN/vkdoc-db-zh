    ## 通用的故障排查方法


    当多个会话争用同一资源时，就会发生阻塞。在某些情况下，这是正确且预期的行为；例如，多个会话无法同时更新同一行。然而，在许多情况下，阻塞是意外发生的，这是因为查询试图获取不必要的锁。


    系统中总是存在一定程度的阻塞，这完全正常。然而，不正常的是过度的阻塞。从最终用户的角度来看，过度阻塞会表现为一般的性能问题。系统运行缓慢、查询超时，并且经常出现死锁。


    除了死锁，系统缓慢并不一定是阻塞问题的迹象——许多其他因素都可能对性能产生负面影响。但是，阻塞问题确实可能导致系统整体变慢。


    在性能故障排查的初始阶段，你应该从系统的全局视角出发，找出需要解决的最关键问题。正如你可能猜到的那样，阻塞和并发问题可能在这个列表中，也可能不在。我们将在第
    12 章讨论如何进行这种全局分析，而本章将重点讨论通用的阻塞故障排查。


    简而言之，要排查阻塞问题，必须遵循以下步骤：

    1.  检测涉及阻塞的查询。

    2.  找出阻塞发生的原因。

    3.  修复问题的根本原因。


    SQL Server 提供了几个可以帮助你完成这些任务的工具。这些工具可以分为两个不同的类别。第一类由动态管理视图组成，你可以使用它们来排查系统当前正在发生的情况。当你在阻塞发生时能够访问系统并希望进行实时故障排查时，这些工具非常有用。


    第二类工具允许你收集有关系统中阻塞问题的信息，并将其保留以供进一步分析。让我们详细看看这两类工具。


    ## 实时排查阻塞问题


    用于实时阻塞排查的关键工具是 `sys.dm_tran_locks` 动态管理视图，它提供有关系统中当前活动锁请求的信息。它会返回一个锁请求列表及其类型、请求状态（`GRANT`
    或 `WAIT`）、有关请求锁的资源的信息以及其他几个有用的属性。


    表 4-1 展示了导致阻塞情况的代码。


    表 4-1

    导致阻塞情况的代码


    | 会话 1 (SPID=52) | 会话 2 (SPID=53) | 注释 |

    | --- | --- | --- |

    | `begin tran`        `delete from Delivery.Orders`        `where OrderId = 95`
    |   | 会话 1 在 OrderId=95 的行上获取了排他 (X) 锁 |

    |   | `select OrderId, Amount``from Delivery.Orders``with (readcommitted)``where
    OrderNum = ''1000''` | 会话 2 被阻塞，试图在 OrderId=95 的行上获取共享 (S) 锁 |

    | `rollback` |   |   |


    图 4-1 显示了阻塞发生时，`sys.dm_tran_locks`、`sys.dm_os_waiting_tasks` 和 `sys.dm_exec_requests`
    视图的部分输出。如你所见，会话 53 正在等待对由会话 52 持有排他 (X) 锁的行获取共享 (S) 锁。输出中的 `LCK_M_S` 等待类型表示共享
    (S) 锁等待。我们将在第 12 章更详细地讨论等待类型。


    ![../images/463519_1_En_4_Chapter/463519_1_En_4_Fig1_HTML.jpg](img/463519_1_En_4_Fig1_HTML.jpg)

    图 4-1

    阻塞发生时系统视图的输出


    ### 注意


    在你的系统中运行此代码时，可能会出现页级阻塞。会话 53 需要扫描页面上的所有行，而 SQL Server 可能决定获取页级共享 (S) 锁，而不是行级锁。尽管如此，由于页级的
    (S) / (IX) 锁不兼容，该会话仍会被阻塞。


    `sys.dm_tran_locks` 视图提供的信息对于故障排查来说有点过于晦涩，你通常需要将其与其他动态管理视图（如 `sys.dm_exec_requests`
    和 `sys.dm_os_waiting_tasks`）进行连接，以获得更清晰的图景。代码清单 4-1 提供了所需的代码。


    ```

    select

    tl.resource_type as [Resource Type]

    ,db_name(tl.resource_database_id) as [DB Name]

    ,case tl.resource_type

    when ''OBJECT'' then

    object_name

    (

    tl.resource_associated_entity_id

    ,tl.resource_database_id

    )

    when ''DATABASE'' then ''DB''

    else

    case when tl.resource_database_id = db_id()

    then

    (  select object_name(object_id, tl.resource_database_id)

    from sys.partitions

    where hobt_id = tl.resource_associated_entity_id )

    else ''(Run under DB context)''

    end

    end as [Object]

    ,tl.resource_description as [Resource]

    ,tl.request_session_id as [Session]

    ,tl.request_mode as [Mode]

    ,tl.request_status as [Status]

    ,wt.wait_duration_ms as [Wait (ms)]

    ,qi.sql

    ,qi.query_plan

    from

    sys.dm_tran_locks tl with (nolock) left outer join

    sys.dm_os_waiting_tasks wt with (nolock) on

    tl.lock_owner_address = wt.resource_address and

    tl.request_status = ''WAIT''

    outer apply

    (

    select

    substring(s.text, (er.statement_start_offset / 2) + 1,

    ((  case er.statement_end_offset

    when -1

    then datalength(s.text)

    else er.statement_end_offset

    end - er.statement_start_offset) / 2) + 1) as sql

    , qp.query_plan

    from

    sys.dm_exec_requests er with (nolock)

    cross apply sys.dm_exec_sql_text(er.sql_handle) s

    cross apply sys.dm_exec_query_plan(er.plan_handle) qp

    where

    tl.request_session_id = er.session_id

    ) qi

    where

    tl.request_session_id  @@spid

    order by

    tl.request_session_id

    option (recompile)

    代码清单 4-1

    获取有关被阻塞和阻塞会话的更多信息

    ```


    图 4-2 显示了该查询的结果。如你所见，它更容易理解，并为你提供了更多有用的信息，包括当前正在运行的批处理及其执行计划。请记住，从 `sys.dm_exec_requests`
    和 `sys.dm_exec_query_stats` DMV 获取的执行计划不包含实际的执行统计指标，例如操作符实际返回的行数及其执行次数。此外，对于锁请求已被授予的会话，SQL
    语句和查询计划表示的是 *当前正在执行的批处理*（如果会话处于休眠状态则为 `NULL`），而不是获取原始锁的批处理。


    ![../images/463519_1_En_4_Chapter/463519_1_En_4_Fig2_HTML.jpg](img/463519_1_En_4_Fig2_HTML.jpg)

    图 4-2

    将 sys.dm_os_tran_locks 与其他 DMV 连接


    你需要在涉及阻塞的数据库上下文中运行查询，才能正确解析对象名称。同样重要的是，代码中使用的 `OBJECT_NAME()` 函数会对对象获取架构稳定性 (Sch-S)
