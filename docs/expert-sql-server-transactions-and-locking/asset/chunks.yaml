- fmt: '# Important


    Many database schema comparison tools use explicit transactions in the alteration
    script. This could introduce serious blocking when you run the script on live
    servers while other users are accessing the system.


    SQL Server also uses schema modification (`Sch-M`) locks while altering the partition
    function. This can seriously affect the availability of the system when such alterations
    introduce data movement or scans. Access to all partitioned tables that use such
    a partition function is then blocked until the operation is completed.


    ## Schema stability (Sch-S) locks


    `Schema stability (Sch-S) locks` are used during DML query compilation and execution.
    SQL Server acquires them regardless of the transaction isolation level, even in
    `READ UNCOMMITTED` mode. The only purpose they serve is to protect the table from
    being altered or dropped while the query accesses it. `Schema stability (Sch-S)
    locks` are compatible with any other lock types, except `schema modification (Sch-M)
    locks`.


    SQL Server can perform some optimizations to reduce the number of locks acquired.
    While a `schema stability (Sch-S) lock` is always used during query compilation,
    SQL Server can replace it with an intent object lock during query execution. Let’s
    look at the example shown in Table 8-1.


    ## Schema locks: Query compilation


    Table 8-1


    | Session 1 (SPID=64) | Session 2 (SPID=65) | Session 3 (SPID=66) |

    | --- | --- | --- |

    | `begin tran`<br>`alter table Delivery.Orders`<br>`add Dummy int;` |  |  |

    |  | `select count(*) from Delivery.Orders with (nolock);` | `delete from Delivery.Orders
    where OrderId = 1;` |

    | `select`<br>`request_session_id, resource_type, request_type, request_mode,
    request_status`<br>`from sys.dm_tran_locks`<br>`where resource_type = ''OBJECT'';`<br>`rollback`
    |  |  |


    The first session starts the transaction and alters the table, acquiring a `schema
    modification (Sch-M) lock` there. In the next step, two other sessions run a `SELECT`
    statement in the `READ UNCOMMITTED` isolation level and a `DELETE` statement,
    respectively.


    As you can see in Figure 8-1, sessions 2 and 3 were blocked while waiting for
    `schema stability (Sch-S) locks` that were required for query compilation.


    ![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig1_HTML.jpg](images/463519_1_En_8_Chapter/463519_1_En_8_Fig1_HTML.jpg)


    Figure 8-1

    Schema locks during query compilation


    ## Schema locks with cached plans


    If you run that example a second time, when queries are compiled and plans are
    in the cache, you would see a slightly different picture, as shown in Figure 8-2.


    ![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig2_HTML.jpg](images/463519_1_En_8_Chapter/463519_1_En_8_Fig2_HTML.jpg)


    Figure 8-2

    Schema locks when execution plans are cached


    The second session would still wait for the `schema stability (Sch-S) lock` to
    be granted. There are no `shared (S) locks` in the `READ UNCOMMITTED` mode, and
    the `schema stability (Sch-S) lock` is the only way to keep a schema stable during
    execution. However, the session with the `DELETE` statement would wait for an
    `intent exclusive (IX) lock` instead. That lock type needs to be acquired anyway,
    and it can replace a `schema stability (Sch-S) lock` because it is also incompatible
    with `schema modification (Sch-M) locks` and prevents the schema from being altered.


    ## Deadlocks with mixed locks


    Mixing `schema modification locks` with other lock types in the same transaction
    increases the possibility of deadlocks. Let’s assume that we have two sessions:
    the first one starts the transaction, and it updates the row in the table. At
    this point, it holds an `exclusive (X) lock` on the row and two `intent exclusive
    (IX) locks` on the page and table. If another session tries to read (or update)
    the same row, it would be blocked. At this point, it would wait for the `shared
    (S) lock` on the row and have `intent shared (IS) locks` held on the page and
    the table. That stage is illustrated in Figure 8-3. (Page-level intent locks are
    omitted.)


    ![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig3_HTML.jpg](images/463519_1_En_8_Chapter/463519_1_En_8_Fig3_HTML.jpg)


    Figure 8-3

    Deadlock due to mixed DDL and DML statements: Steps 1 and 2


    If at this point the first session wanted to alter the table, it would need to
    acquire a `schema modification (Sch-M) lock`. That lock type is incompatible with
    any other lock type, and the session would be blocked by the `intent shared (IS)
    lock` held by the second session, which leads to the deadlock condition, as shown
    in Figure 8-4.


    ![../images/463519_1_En_8_Chapter/463519_1_En_8_Fig4_HTML.jpg](images/463519_1_En_8_Chapter/463519_1_En_8_Fig4_HTML.jpg)


    Figure 8-4

    Deadlock due to mixed DDL and DML statements: Step 3


    It is worth noting that this particular deadlock pattern may occur with any full
    table-level locks. However, `schema modification (Sch-M) locks` increase deadlock
    possibility due to their incompatibility with all other lock types in the system.'
