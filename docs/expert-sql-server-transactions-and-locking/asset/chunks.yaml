    ```

    图 1-13 说明了 SQL Server 可能如何处理它。


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig13_HTML.jpg](img/463519_1_En_1_Fig13_HTML.jpg)

    图 1-13 索引查找


    为了从表中读取行范围，SQL Server 需要找到范围内键的最小值（即 4）。SQL Server 从根页面开始，其中第二行引用了键最小值为 350 的页面。该值大于我们要查找的键值，因此
    SQL Server 读取根页面第一行所引用的中间级别数据页面（1:170）。


    类似地，中间页面将 SQL Server 引导到第一个叶级别页面（1:176）。SQL Server 读取该页面，然后读取`CustomerId`等于 4
    和 5 的行，最后从第二个页面读取剩余的两行。


    从技术上讲，索引查找操作有两种类型。第一种称为`point-lookup`（点查找，有时也称为`singleton lookup`），SQL Server
    查找并返回单个行。可以将`WHERE CustomerId = 2`谓词视为一个例子。


    另一种类型称为`range scan`（范围扫描），它要求 SQL Server 找到键的最低值或最高值，然后（向前或向后）扫描行集，直到达到扫描范围的末尾。谓词`WHERE
    CustomerId BETWEEN 4 AND 7`会导致范围扫描。这两种情况在执行计划中都显示为`Index Seek`运算符。


    如你所猜，索引查找比索引扫描更高效，因为 SQL Server 只处理行和数据页面的子集，而不是扫描整个索引。然而，执行计划中的`Index Seek`运算符可能会产生误导，它可能代表一个扫描大量行甚至整个索引的范围扫描。例如，在我们的表中，`WHERE
    CustomerId > 0`谓词要求 SQL Server 扫描整个索引；但它将在执行计划中表示为`Index Seek`运算符。


    关系数据库中有一个称为`SARGable predicates`（可搜索谓词）的概念，即`Search Argument-able`。如果 SQL Server
    在索引存在时可以利用索引查找操作，则该谓词是`SARGable`的。简而言之，当 SQL Server 在谓词求值期间可以确定要处理的单个或范围的索引键值时，谓词就是`SARGable`的。显然，使用`SARGable`谓词编写查询并尽可能利用索引查找是有益的。


    `SARGable`谓词包括以下运算符：`=`、`>`、`>=`、`<`、`<=`、`IN`、`BETWEEN`和`LIKE`（前缀匹配情况下）。非`SARGable`运算符包括`NOT`、`<>`、`LIKE`（非前缀匹配情况下）和`NOT
    IN`。


    另一种使谓词变为非`SARGable`的情况是对表列使用函数（标准或用户定义）。SQL Server 必须为处理的每一行调用该函数，这阻止了索引查找的使用。


    这同样适用于数据类型转换，此时 SQL Server 使用`CONVERT_IMPLICIT`内部函数。可能发生这种情况的一个常见示例是在谓词中对`varchar`列使用`nvarchar`参数。另一种情况是在连接谓词中参与的列具有不同的数据类型。这两种情况即使谓词运算符看似是`SARGable`，也可能导致索引扫描。

