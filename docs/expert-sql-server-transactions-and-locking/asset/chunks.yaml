- fmt: 'Similarly, session 3 wants to update all rows with `Amount = 29.95`. When
    it reads the version of the row from the version store, it determines that the
    row needs to be updated. Again, it does not matter that session 1 also changes
    the amount for the same row. At this point, a “new version” of the row has not
    been committed and is invisible to the other sessions. Now, session 3 wants to
    update the row in the database, tries to acquire an exclusive (X) lock, and is
    blocked because session 1 already has an exclusive (X) lock there.


    Now, if session 1 commits the transaction, session 3 would be rolled back with
    `Error 3960`, as shown in Figure 6-6, which indicates a write/write conflict.
    This is different behavior than any other isolation level, in which session 3
    would successfully overwrite the changes from session 1 as soon as the session
    1 exclusive (X) lock was released.


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig6_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig6_HTML.jpg)

    Figure 6-6

    `Error 3960`


    A write/write conflict occurs when a `SNAPSHOT` transaction is trying to update
    data that has been modified after the transaction started. In our example, this
    would happen even if session 1 committed before session 3’s `UPDATE` statement,
    as long as this commit occurred after session 3’s transaction started.


    ### Tip

    You can implement retry logic with `TRY..CATCH` statements to handle the `3960`
    errors if business requirements allow that.


    You need to keep this behavior in mind when you are updating data in the `SNAPSHOT`
    isolation level in a system with volatile data. If other sessions update the rows
    that you are modifying after the transaction is started, you would end up with
    `Error 3960`, even if you did not access those rows before the update. One of
    the possible workarounds is using (`READCOMMITTED`) or other non-optimistic isolation
    level table hints as part of the `UPDATE` statement, as shown in Listing 6-1.


    ```

    set transaction isolation level snapshot

    begin tran

    select count(*) from Delivery.Drivers;

    update Delivery.Orders with (readcommitted)

    set Cancelled = 1

    where OrderId = 10;

    commit

    ```

    Listing 6-1

    Using `READCOMMITTED` hint to prevent `3960` error


    `SNAPSHOT` isolation levels can change the behavior of the system. Let’s assume
    there is a table `dbo.Colors` with two rows: `Black` and `White`. The code that
    creates the table is shown in Listing 6-2.


    ```

    create table dbo.Colors

    (

    Id int not null,

    Color char(5) not null

    );

    insert into dbo.Colors(Id, Color) values(1,''Black''),(2,''White'')

    ```

    Listing 6-2

    `SNAPSHOT` isolation level update behavior: Table creation


    Now, let’s run two sessions simultaneously. In the first session, we run the update
    that sets the color to `white` for the rows where the color is currently `black`
    using the `UPDATE dbo.Colors SET Color="White" WHERE Color="Black"` statement.
    In the second session, let’s perform the opposite operation, using the `UPDATE
    dbo.Colors SET Color="Black" WHERE Color="White"` statement.


    Let’s run both sessions simultaneously in `READ COMMITTED` or any other pessimistic
    transaction isolation level. In the first step, as shown in Figure 6-7, we have
    the race condition. One of the sessions places exclusive (X) locks on the row
    it updated, while the other session is blocked when trying to acquire an update
    (U) lock on the same row .


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig7_HTML.png](images/463519_1_En_6_Chapter/463519_1_En_6_Fig7_HTML.png)

    Figure 6-7

    Pessimistic locking behavior: Step 1


    When the first session commits the transaction, the exclusive (X) lock is released.
    At this point, the row has a `Color` value updated by the first session, so the
    second session updates two rows rather than one, as shown in Figure 6-8. In the
    end, both rows in the table will be in either black or white depending on which
    session acquires the lock first.


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig8_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig8_HTML.jpg)

    Figure 6-8

    Pessimistic locking behavior: Step 2


    With the `SNAPSHOT` isolation level, however, this works a bit differently, as
    shown in Figure 6-9. When the session updates the row, it moves the old version
    of the row to the version store. Another session will read the row from there,
    rather than being blocked and vice versa. As a result, the colors will be swapped.


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig9_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig9_HTML.jpg)

    Figure 6-9

    `SNAPSHOT` isolation level locking behavior


    You need to be aware of `RCSI` and `SNAPSHOT` isolation level behavior, especially
    if you have code that relies on blocking. One example is a trigger-based implementation
    of referential integrity. You can have an `ON DELETE` trigger on the referenced
    table where you are running a `SELECT` statement; this trigger will check if there
    are any rows in another table referencing the deleted rows. With an optimistic
    isolation level, the trigger can skip the rows that were inserted after the transaction
    started. The solution here again is a (`READCOMMITTED`) or other pessimistic isolation
    level table hint as part of the `SELECT` in the triggers on both the referenced
    and referencing tables.


    ### Note

    SQL Server uses a `READ COMMITTED` isolation level when validating foreign key
    constraints. This means that you can still have blocking between writers and readers
    even with optimistic isolation levels, especially if there are no indexes on the
    referencing column that leads to a table scan of the referencing table.'
