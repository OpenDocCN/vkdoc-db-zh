- fmt: '### Note


    每个新版本的 SQL Server 都会引入新的等待类型。您可以在[`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-os-wait-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-os-wait-stats-transact-sql)查看等待类型的列表。请确保选择相应版本的
    SQL Server。


    ```sql

    ;with Waits

    as

    (

    select

    wait_type, wait_time_ms, waiting_tasks_count,signal_wait_time_ms

    ,wait_time_ms - signal_wait_time_ms as resource_wait_time_ms

    ,100\. * wait_time_ms / SUM(wait_time_ms) over() as Pct

    ,row_number() over(order by wait_time_ms desc) as RowNum

    from sys.dm_os_wait_stats with (nolock)

    where

    wait_type not in /* Filtering out non-essential system waits */

    (N''BROKER_EVENTHANDLER'',N''BROKER_RECEIVE_WAITFOR''

    ,N''BROKER_TASK_STOP'',N''BROKER_TO_FLUSH''

    ,N''BROKER_TRANSMITTER'',N''CHECKPOINT_QUEUE'',N''CHKPT''

    ,N''CLR_SEMAPHORE'',N''CLR_AUTO_EVENT''

    ,N''CLR_MANUAL_EVENT'',N''DBMIRROR_DBM_EVENT''

    ,N''DBMIRROR_EVENTS_QUEUE'',N''DBMIRROR_WORKER_QUEUE''

    ,N''DBMIRRORING_CMD'',N''DIRTY_PAGE_POLL''

    ,N''DISPATCHER_QUEUE_SEMAPHORE'',N''EXECSYNC''

    ,N''FSAGENT'',N''FT_IFTS_SCHEDULER_IDLE_WAIT''

    ,N''FT_IFTSHC_MUTEX'',N''HADR_CLUSAPI_CALL''

    ,N''HADR_FILESTREAM_IOMGR_IOCOMPLETION''

    ,N''HADR_LOGCAPTURE_WAIT''

    ,N''HADR_NOTIFICATION_DEQUEUE''

    ,N''HADR_TIMER_TASK'',N''HADR_WORK_QUEUE''

    ,N''KSOURCE_WAKEUP'',N''LAZYWRITER_SLEEP''

    ,N''LOGMGR_QUEUE'',N''MEMORY_ALLOCATION_EXT''

    ,N''ONDEMAND_TASK_QUEUE''

    ,N''PARALLEL_REDO_WORKER_WAIT_WORK''

    ,N''PREEMPTIVE_HADR_LEASE_MECHANISM''

    ,N''PREEMPTIVE_SP_SERVER_DIAGNOSTICS''

    ,N''PREEMPTIVE_OS_LIBRARYOPS''

    ,N''PREEMPTIVE_OS_COMOPS''

    ,N''PREEMPTIVE_OS_CRYPTOPS''

    ,N''PREEMPTIVE_OS_PIPEOPS''

    , N''PREEMPTIVE_OS_AUTHENTICATIONOPS''

    ,N''PREEMPTIVE_OS_GENERICOPS''

    ,N''PREEMPTIVE_OS_VERIFYTRUST

    '',N''PREEMPTIVE_OS_FILEOPS''

    ,N''PREEMPTIVE_OS_DEVICEOPS''

    ,N''PREEMPTIVE_OS_QUERYREGISTRY''

    ,N''PREEMPTIVE_OS_WRITEFILE''

    ,N''PREEMPTIVE_XE_CALLBACKEXECUTE''

    ,N''PREEMPTIVE_XE_DISPATCHER''

    ,N''PREEMPTIVE_XE_GETTARGETSTATE''

    ,N''PREEMPTIVE_XE_SESSIONCOMMIT''

    ,N''PREEMPTIVE_XE_TARGETINIT''

    ,N''PREEMPTIVE_XE_TARGETFINALIZE''

    ,N''PWAIT_ALL_COMPONENTS_INITIALIZED''

    ,N''PWAIT_DIRECTLOGCONSUMER_GETNEXT''

    ,N''QDS_PERSIST_TASK_MAIN_LOOP_SLEEP''

    ,N''QDS_ASYNC_QUEUE''

    ,N''QDS_CLEANUP_STALE_QUERIES_TASK_MAIN_LOOP_SLEEP''

    ,N''REQUEST_FOR_DEADLOCK_SEARCH''

    ,N''RESOURCE_QUEUE'',N''SERVER_IDLE_CHECK''

    ,N''SLEEP_BPOOL_FLUSH'',N''SLEEP_DBSTARTUP''

    ,N''SLEEP_DCOMSTARTUP''

    ,N''SLEEP_MASTERDBREADY'',N''SLEEP_MASTERMDREADY''

    ,N''SLEEP_MASTERUPGRADED'',N''SLEEP_MSDBSTARTUP''

    , N''SLEEP_SYSTEMTASK'', N''SLEEP_TASK''

    ,N''SLEEP_TEMPDBSTARTUP'',N''SNI_HTTP_ACCEPT''

    ,N''SP_SERVER_DIAGNOSTICS_SLEEP''

    ,N''SQLTRACE_BUFFER_FLUSH''

    ,N''SQLTRACE_INCREMENTAL_FLUSH_SLEEP''

    ,N''SQLTRACE_WAIT_ENTRIES'',N''WAIT_FOR_RESULTS''

    ,N''WAITFOR'',N''WAITFOR_TASKSHUTDOWN''

    ,N''WAIT_XTP_HOST_WAIT''

    ,N''WAIT_XTP_OFFLINE_CKPT_NEW_LOG''

    ,N''WAIT_XTP_CKPT_CLOSE'',N''WAIT_XTP_RECOVERY''

    ,N''XE_BUFFERMGR_ALLPROCESSED_EVENT''

    , N''XE_DISPATCHER_JOIN'',N''XE_DISPATCHER_WAIT''

    ,N''XE_LIVE_TARGET_TVF'',N''XE_TIMER_EVENT'')

    )

    select

    w1.wait_type as [Wait Type]

    ,w1.waiting_tasks_count as [Wait Count]

    ,convert(decimal(12,3), w1.wait_time_ms / 1000.0)

    as [Wait Time]

    ,convert(decimal(12,1), w1.wait_time_ms / w1.waiting_tasks_count)

    as [Avg Wait Time]

    ,convert(decimal(12,3), w1.signal_wait_time_ms / 1000.0)

    as [Signal Wait Time]

    ,convert(decimal(12,1), w1.signal_wait_time_ms / w1.waiting_tasks_count)

    as [Avg Signal Wait Time]

    ,convert(decimal(12,3), w1.resource_wait_time_ms / 1000.0)

    as [Resource Wait Time]

    ,convert(decimal(12,1), w1.resource_wait_time_ms

    / w1.waiting_tasks_count) as [Avg Resource Wait Time]

    ,convert(decimal(6,3), w1.Pct) as [Percent]

    ,convert(decimal(6,3), w1.Pct + IsNull(w2.Pct,0)) as [Running Percent]

    from

    Waits w1 cross apply

    (

    select sum(w2.Pct) as Pct

    from Waits w2

    where w2.RowNum < w1.RowNum

    ) w2

    where

    w1.RowNum = 1 or w2.Pct <= 99

    order by

    w1.RowNum

    option (recompile);

    ```


    清单 12-1 检测系统中的顶级等待类型


    图 12-3 展示了在故障排除过程开始时，从其中一台生产服务器上运行该脚本得到的输出结果。


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig3_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig3_HTML.jpg)


    图 12-3 从其中一台生产服务器上运行脚本的输出


    分析系统中顶级等待的过程被称为等待统计分析。这是 SQL Server 中最常用的故障排除和性能调优技术之一，它使您能够快速识别系统中的潜在问题。图 12-4
    说明了一个典型的等待统计分析故障排除周期。


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig4_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig4_HTML.jpg)


    图 12-4 等待统计分析故障排除周期


    作为第一步，查看等待统计信息，以检测系统中的顶级等待。这缩小了进一步分析的关注领域。之后，使用其他工具（如 `DMV`、`Windows Performance
    Monitor`、`SQL Traces` 和 `Extended Events`）确认问题，并检测问题的根本原因。当根本原因被确认后，修复它，然后再次分析等待统计信息，选择一个新的分析和改进目标。


    让我们详细地看看与锁相关的等待类型。


    ### Note


    我的 *Pro SQL Server Internals* 一书提供了关于等待统计分析的更深入内容，并解释了如何在系统中排除各种非锁相关的故障。


    您还可以从[`http://download.microsoft.com/download/4/7/a/47a548b9-249e-484c-abd7-29f31282b04d/performance_tuning_waits_queues.doc`](http://download.microsoft.com/download/4/7/a/47a548b9-249e-484c-abd7-29f31282b04d/performance_tuning_waits_queues.doc)下载关于等待统计分析的白皮书。虽然它侧重于
    SQL Server 2005，但其内容对任何版本的 SQL Server 都有效。


    ## Lock Waits


    系统中的每种锁类型都有一个对应的等待类型，其名称以`LCK_M_`开头，后跟锁类型。例如，`LCK_M_U`和`LCK_M_IS`分别表示等待更新（U）锁和意向排他（IX）锁。


    当锁请求在队列中等待时，就会发生锁等待，这发生在阻塞期间。如果请求可以立即被授予且没有发生阻塞，SQL Server 则不会生成锁等待。


    您需要同时关注总等待时间和等待发生的次数。完全有可能出现一种等待类型，其总等待时间很长，但仅由少数几次长时间等待产生。您可以根据您的目标来决定是否对其进行故障排除或忽略。


    您还应该记住，等待统计信息是从上次 SQL Server 重启开始累积的。运行时间较长的服务器的等待统计信息可能无法代表当前负载。在许多情况下，在开始故障排除之前，使用`DBCC
    SQLPERF(''sys.dm_os_wait_stats'', CLEAR)`命令清除等待统计信息，收集近期的等待信息可能是有益的。您显然需要在系统中有代表性的工作负载时执行此操作。


    让我们看看锁等待类型，讨论可能导致此类等待的原因以及我们如何对其进行故障排除。'
  raw: '### Note


    Every new version of SQL Server introduces new wait types. You can see a list
    of wait types at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-os-wait-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-os-wait-stats-transact-sql)
    . Make sure to select the appropriate version of SQL Server.


    ```

    ;with Waits

    as

    (

    select

    wait_type, wait_time_ms, waiting_tasks_count,signal_wait_time_ms

    ,wait_time_ms - signal_wait_time_ms as resource_wait_time_ms

    ,100\. * wait_time_ms / SUM(wait_time_ms) over() as Pct

    ,row_number() over(order by wait_time_ms desc) as RowNum

    from sys.dm_os_wait_stats with (nolock)

    where

    wait_type not in /* Filtering out non-essential system waits */

    (N''BROKER_EVENTHANDLER'',N''BROKER_RECEIVE_WAITFOR''

    ,N''BROKER_TASK_STOP'',N''BROKER_TO_FLUSH''

    ,N''BROKER_TRANSMITTER'',N''CHECKPOINT_QUEUE'',N''CHKPT''

    ,N''CLR_SEMAPHORE'',N''CLR_AUTO_EVENT''

    ,N''CLR_MANUAL_EVENT'',N''DBMIRROR_DBM_EVENT''

    ,N''DBMIRROR_EVENTS_QUEUE'',N''DBMIRROR_WORKER_QUEUE''

    ,N''DBMIRRORING_CMD'',N''DIRTY_PAGE_POLL''

    ,N''DISPATCHER_QUEUE_SEMAPHORE'',N''EXECSYNC''

    ,N''FSAGENT'',N''FT_IFTS_SCHEDULER_IDLE_WAIT''

    ,N''FT_IFTSHC_MUTEX'',N''HADR_CLUSAPI_CALL''

    ,N''HADR_FILESTREAM_IOMGR_IOCOMPLETION''

    ,N''HADR_LOGCAPTURE_WAIT''

    ,N''HADR_NOTIFICATION_DEQUEUE''

    ,N''HADR_TIMER_TASK'',N''HADR_WORK_QUEUE''

    ,N''KSOURCE_WAKEUP'',N''LAZYWRITER_SLEEP''

    ,N''LOGMGR_QUEUE'',N''MEMORY_ALLOCATION_EXT''

    ,N''ONDEMAND_TASK_QUEUE''

    ,N''PARALLEL_REDO_WORKER_WAIT_WORK''

    ,N''PREEMPTIVE_HADR_LEASE_MECHANISM''

    ,N''PREEMPTIVE_SP_SERVER_DIAGNOSTICS''

    ,N''PREEMPTIVE_OS_LIBRARYOPS''

    ,N''PREEMPTIVE_OS_COMOPS''

    ,N''PREEMPTIVE_OS_CRYPTOPS''

    ,N''PREEMPTIVE_OS_PIPEOPS''

    , N''PREEMPTIVE_OS_AUTHENTICATIONOPS''

    ,N''PREEMPTIVE_OS_GENERICOPS''

    ,N''PREEMPTIVE_OS_VERIFYTRUST

    '',N''PREEMPTIVE_OS_FILEOPS''

    ,N''PREEMPTIVE_OS_DEVICEOPS''

    ,N''PREEMPTIVE_OS_QUERYREGISTRY''

    ,N''PREEMPTIVE_OS_WRITEFILE''

    ,N''PREEMPTIVE_XE_CALLBACKEXECUTE''

    ,N''PREEMPTIVE_XE_DISPATCHER''

    ,N''PREEMPTIVE_XE_GETTARGETSTATE''

    ,N''PREEMPTIVE_XE_SESSIONCOMMIT''

    ,N''PREEMPTIVE_XE_TARGETINIT''

    ,N''PREEMPTIVE_XE_TARGETFINALIZE''

    ,N''PWAIT_ALL_COMPONENTS_INITIALIZED''

    ,N''PWAIT_DIRECTLOGCONSUMER_GETNEXT''

    ,N''QDS_PERSIST_TASK_MAIN_LOOP_SLEEP''

    ,N''QDS_ASYNC_QUEUE''

    ,N''QDS_CLEANUP_STALE_QUERIES_TASK_MAIN_LOOP_SLEEP''

    ,N''REQUEST_FOR_DEADLOCK_SEARCH''

    ,N''RESOURCE_QUEUE'',N''SERVER_IDLE_CHECK''

    ,N''SLEEP_BPOOL_FLUSH'',N''SLEEP_DBSTARTUP''

    ,N''SLEEP_DCOMSTARTUP''

    ,N''SLEEP_MASTERDBREADY'',N''SLEEP_MASTERMDREADY''

    ,N''SLEEP_MASTERUPGRADED'',N''SLEEP_MSDBSTARTUP''

    , N''SLEEP_SYSTEMTASK'', N''SLEEP_TASK''

    ,N''SLEEP_TEMPDBSTARTUP'',N''SNI_HTTP_ACCEPT''

    ,N''SP_SERVER_DIAGNOSTICS_SLEEP''

    ,N''SQLTRACE_BUFFER_FLUSH''

    ,N''SQLTRACE_INCREMENTAL_FLUSH_SLEEP''

    ,N''SQLTRACE_WAIT_ENTRIES'',N''WAIT_FOR_RESULTS''

    ,N''WAITFOR'',N''WAITFOR_TASKSHUTDOWN''

    ,N''WAIT_XTP_HOST_WAIT''

    ,N''WAIT_XTP_OFFLINE_CKPT_NEW_LOG''

    ,N''WAIT_XTP_CKPT_CLOSE'',N''WAIT_XTP_RECOVERY''

    ,N''XE_BUFFERMGR_ALLPROCESSED_EVENT''

    , N''XE_DISPATCHER_JOIN'',N''XE_DISPATCHER_WAIT''

    ,N''XE_LIVE_TARGET_TVF'',N''XE_TIMER_EVENT'')

    )

    select

    w1.wait_type as [Wait Type]

    ,w1.waiting_tasks_count as [Wait Count]

    ,convert(decimal(12,3), w1.wait_time_ms / 1000.0)

    as [Wait Time]

    ,convert(decimal(12,1), w1.wait_time_ms / w1.waiting_tasks_count)

    as [Avg Wait Time]

    ,convert(decimal(12,3), w1.signal_wait_time_ms / 1000.0)

    as [Signal Wait Time]

    ,convert(decimal(12,1), w1.signal_wait_time_ms / w1.waiting_tasks_count)

    as [Avg Signal Wait Time]

    ,convert(decimal(12,3), w1.resource_wait_time_ms / 1000.0)

    as [Resource Wait Time]

    ,convert(decimal(12,1), w1.resource_wait_time_ms

    / w1.waiting_tasks_count) as [Avg Resource Wait Time]

    ,convert(decimal(6,3), w1.Pct) as [Percent]

    ,convert(decimal(6,3), w1.Pct + IsNull(w2.Pct,0)) as [Running Percent]

    from

    Waits w1 cross apply

    (

    select sum(w2.Pct) as Pct

    from Waits w2

    where w2.RowNum < w1.RowNum

    ) w2

    where

    w1.RowNum = 1 or w2.Pct <= 99

    order by

    w1.RowNum

    option (recompile);

    Listing 12-1

    Detecting top wait types in the system

    ```


    Figure [12-3](#463519_1_En_12_Chapter.xhtml#Fig3) illustrates the output of the
    script from one of the production servers at the beginning of the troubleshooting
    process.


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig3_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig3_HTML.jpg)


    Figure 12-3


    Output of the script from one of the production servers


    The process of analyzing top waits in the system is called wait statistics analysis.
    This is one of the most frequently used troubleshooting and performance-tuning
    techniques in SQL Server, which allows you to quickly identify potential problems
    in the system. Figure [12-4](#463519_1_En_12_Chapter.xhtml#Fig4) illustrates a
    typical wait statistics analysis troubleshooting cycle.


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig4_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig4_HTML.jpg)


    Figure 12-4


    Wait statistics analysis troubleshooting cycle


    As a first step, look at the wait statistics, which detect the top waits in the
    system. This narrows the area of concern for further analysis. After that, confirm
    the problem using other tools, such as DMVs, Windows Performance Monitor, SQL
    Traces, and Extended Events, and detect the root cause of the problem . When the
    root cause is confirmed, fix it and analyze the wait statistics again, choosing
    a new target for analysis and improvement.


    Let’s look at locking-related wait types in detail.


    ### Note


    My *Pro SQL Server Internals* book provides deeper coverage of wait statistics
    analysis and explains how to troubleshoot various non-locking-related issues in
    the system.


    You can also download a whitepaper on wait statistics analysis from [`http://download.microsoft.com/download/4/7/a/47a548b9-249e-484c-abd7-29f31282b04d/performance_tuning_waits_queues.doc`](http://download.microsoft.com/download/4/7/a/47a548b9-249e-484c-abd7-29f31282b04d/performance_tuning_waits_queues.doc)
    . Even though it focuses on SQL Server 2005, the content is valid for any version
    of SQL Server.


    ## Lock Waits


    Every lock type in the system has a corresponding wait type with the name starting
    with `LCK_M_` followed by the lock type. For example, `LCK_M_U` and `LCK_M_IS`
    indicate waits for update (U) and intent exclusive (IX) locks, respectively.


    Lock waits occur during blocking when lock requests are waiting in the queue.
    SQL Server does not generate lock waits when requests can be granted immediately
    and blocking does not occur.


    You need to pay attention to both total wait time and number of times waits occurred.
    It is entirely possible to have wait types with a large total wait time generated
    by just a handful of long waits. You may decide to troubleshoot or ignore them
    based on your objectives.


    You should also remember that wait statistics are accumulated from the time of
    the last SQL Server restart. Servers with prolonged uptime may have wait statistics
    that are not representative of the current load. In many cases it may be beneficial
    to clear wait statistics with the `DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)`
    command, collecting recent wait information before troubleshooting. You should
    obviously have a representative workload in the system when you do that.


    Let’s look at locking wait types and discuss what may lead to such waits and how
    we can troubleshoot them.'
