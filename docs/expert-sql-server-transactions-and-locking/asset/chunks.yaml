  trans: '# 乐观隔离级别与阻塞减少模式


    然而，乐观隔离级别常常会`掩盖`系统中未优化的查询。尽管这些查询是导致系统性能低下的原因，但它们并未参与阻塞条件，因此常被忽视。常见的情况是，人们通过启用`READ
    COMMITTED SNAPSHOT`来“解决”读写阻塞，但之后并未解决阻塞的根本原因。你应该牢记这一点，并且无论系统中是否存在阻塞，都应进行查询优化。


    对于数据仓库系统，事务策略很大程度上取决于数据的更新方式。对于静态只读数据，任何隔离级别都适用，因为读取者不会阻塞其他读取者。你甚至可以将数据库或文件组切换为只读模式，以减少锁开销。否则，乐观隔离级别是更好的选择。它们为报表查询提供事务级或语句级一致性，并能在
    ETL 过程中减少阻塞。当此方法可行时，你也应考虑在 ETL 过程中利用表分区并使用分区切换。


    ## 减少阻塞的模式


    当多个会话竞争同一组资源时，就会发生阻塞。会话试图在其上获取不兼容的锁，这会导致锁冲突和阻塞。


    正如你所知，SQL Server 在`处理`数据时获取锁。需要修改或返回给客户端的行数并不那么重要。更重要的是 SQL Server 在语句执行期间`访问`了多少行。一个查询可能只选择或更新了一行，但由于执行了过度扫描，它完全可能获取了数千甚至数百万个锁。


    适当的查询优化和索引调优可以减少 SQL Server 在查询执行期间需要访问的行数。这反过来又减少了获取的锁数量以及发生锁冲突的机会。


    ### 提示


    优化查询。这将有助于提高系统中的并发性、性能和用户体验。


    减少锁冲突机会的另一种方法是减少锁的持有时间。排他锁（X 锁）总是持有到事务结束。在`REPEATABLE READ`和`SERIALIZABLE`隔离级别下的共享锁（S
    锁）也是如此。锁持有时间越长，发生锁冲突和阻塞的可能性就越大。


    你需要使事务尽可能短，并避免在事务活动期间执行任何长时间操作以及与用户通过 UI 进行交互。在处理使用 CLR 或链接服务器的外部资源时也需要小心。例如，当链接服务器宕机时，可能需要很长时间才会发生连接超时，而你希望避免锁在此期间一直被保持的情况。


    ### 提示


    使事务尽可能短。


    尽可能在事务接近结束时更新数据。这减少了排他锁（X 锁）的持有时间。在某些情况下，使用临时表作为暂存区是有意义的：先将数据插入其中，然后在事务的最后更新实际表。


    ### 提示


    尽可能在事务接近结束时修改数据。


    这种技术的一个特定变体是，对于一条无法优化或不切实际的`UPDATE`语句。考虑这样一种情况：该语句扫描大量行，但只更新其中一小部分。你可以修改代码，将需要更新的行的聚集索引键值存储在临时表中，然后基于这些收集到的键值运行`UPDATE`。


    清单 11-4 展示了一条在执行时可能导致聚集索引扫描的语句示例。SQL Server 将需要获取表中每一行的更新锁（U 锁）。


    ```

    update dbo.Orders

    set

    Cancelled = 1

    where

    (PendingCancellation = 1) or

    (Paid = 0 and OrderDate < @StockDate)

    Listing 11-4

    使用临时表减少阻塞：原始语句

    ```


    你可以将代码修改为类似于清单 11-5 所示。`SELECT`语句根据隔离级别获取共享锁（S 锁）或根本不获取行级锁。`UPDATE`语句是经过优化的，只获取少量的更新锁（U
    锁）和排他锁（X 锁）。


    ```

    create table #OrdersToBeCancelled

    ( OrderId int not null primary key );

    insert into #OrdersToBeCancelled(OrderId)

    select OrderId

    from dbo.Orders

    where

    (PendingCancellation = 1) or

    (Paid = 0 and OrderDate < @StockDate);

    update dbo.Orders

    set Cancelled = 1

    where OrderId in (select OrderId from #OrdersToBeCancelled);

    Listing 11-5

    使用临时表减少阻塞：利用临时表暂存待更新的键值

    ```


    你需要记住，虽然这种方法有助于减少阻塞，但创建和填充临时表可能会带来显著的 I/O 开销，尤其是在涉及大量数据时。在某些情况下，你可以使用 CTE 来避免这种开销，如清单
    11-6 所示。


    ```

    ;with UpdateIds(OrderId)

    as

    (

    select OrderId

    from dbo.Orders

    where

    (PendingCancellation = 1) or

    (Paid = 0 and OrderDate < @StockDate)

    )

    update o

    set o.Cancelled = 1

    from UpdateIds u inner loop join dbo.Orders o on

    o.OrderId = u.OrderId

    Listing 11-6

    使用 CTE 减少阻塞

    ```


    与前面的例子类似，`SELECT`语句在扫描期间不获取更新锁（U 锁）。`inner loop`连接提示保证排他锁（X 锁）仅保持在需要修改的行上。记住，连接提示强制语句中的连接顺序。在我们的例子中，需要将
    CTE 指定为连接的*左*输入/表，以生成正确的执行计划。


    这两种方法都可能以引入额外开销为代价来减少阻塞。此开销会随着待更新数据量的增加而增加，如果你预计要更新表中的大部分行，则不应使用这些方法。记住，在大多数情况下，创建正确的索引是更好的选择。


    ### 提示


    避免在大表上进行更新扫描。


    当`UPDATE`语句修改不同的非聚集索引中的数据时，应避免在同一事务中多次更新数据行。请记住，SQL Server 在更新索引行时是基于每个索引来获取锁的。多次更新会增加其他会话访问已更新行时发生死锁的机会。


    ### 提示


    不要在单个事务中多次更新数据行。


    你需要了解锁升级是否影响你的系统，尤其是在 OLTP 工作负载的情况下。你可以监视对象级阻塞条件和锁等待，然后将其与 `lock_escalation` 扩展事件和跟踪事件关联起来。记住，锁升级有助于减少内存消耗并提高系统性能。在做出任何决定之前，你应该分析锁升级发生的原因及其对系统的影响。在许多情况下，改变代码和工作流程比禁用锁升级更好。


    ### 提示


    监视系统中的锁升级。


    通常，你应该避免在同一事务中混合使用可能导致行级锁和对象级锁的语句，特别是混合 DML 和 DDL 语句。这种模式可能导致意向锁与完整的对象级锁之间的阻塞，以及死锁情况。当服务器具有
    16 个或更多逻辑 CPU 时（这启用了锁分区），这一点尤其重要。'
- fmt: '# Summary


    不要在单个事务中混合使用DDL和DML语句。


    如果你的系统中出现死锁，你需要分析其根本原因。在大多数情况下，查询优化和代码重构有助于解决它们。你还应该考虑在系统中的关键用例周围实施重试逻辑。


    找到死锁的根本原因。如果查询优化和代码重构无法解决它们，则实施重试逻辑。


    完全消除系统中的所有阻塞是不可能的。幸运的是，理解阻塞的根本原因有助于设计能够缓解该问题的解决方案。


    一致的事务和错误处理策略可以减少阻塞并简化并发问题的故障排除。客户端和服务器端实现的选择取决于数据访问层架构；然而，作为一般规则，你应该使用显式事务而非自动提交事务。


    业务需求应决定系统中的数据一致性和隔离规则。你应该选择满足这些需求的`最小所需`隔离级别。除非绝对必要，否则不要使用`READ UNCOMMITTED`。


    乐观隔离级别是可以接受的，即使是OLTP工作负载，只要系统能够处理额外的`tempdb`开销。除非需要事务级一致性，否则最好使用`READ COMMITTED
    SNAPSHOT`。


    在大多数情况下，适当的查询优化和索引调整有助于提高并发性。经过良好优化的查询获取的锁更少，这降低了锁冲突和系统中阻塞的可能性。你还应尽量缩短事务，并在事务结束前修改数据，以减少持有锁的时间。


    每个系统都是独特的，无法提供普遍适用的通用建议。然而，对SQL Server并发模型的良好理解将帮助你设计正确的事务策略，并解决系统中的任何阻塞和并发问题。


    # 12. 并发问题故障排除


    系统故障排除既是一门艺术，也是一门科学。它也是一个非常庞大和复杂的话题。如果我要写一本涵盖系统故障排除所有方面的书，它的页数会比你正在阅读的这本还要多。


    系统故障排除和性能调优的过程要求你从全局视角审视系统。SQL Server从不孤立存在，问题的根本原因可能不一定在数据库中。硬件不足、操作系统和SQL Server配置不当、数据库和应用程序设计效率低下——所有这些因素都可能导致各种问题和糟糕的系统性能。


    并发性只是这个难题中的一小部分。每个多用户数据库都会遭受一定程度的阻塞。然而，并发问题可能不是问题的主要来源，而且通常通过关注系统中的其他领域，你可以获得更好的投资回报率。


    本章将讨论一种常见的故障排除技术，称为`等待统计信息分析`。尽管我们将重点讨论与锁相关的等待和并发问题，但这种技术在一般的故障排除中非常有用。我建议你多了解这种技术以及系统中可能存在的其他等待类型。


    然而，请记住采取全局视角，在专注于数据库内部问题之前，先分析整个系统——硬件和软件。


    ## SQL Server执行模型


    从高层来看，SQL Server的架构包括六个不同的组件，如图12-1所示。


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig1_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig1_HTML.jpg)


    图 12-1


    高层SQL Server架构


    *   `协议层`处理SQL Server和客户端应用程序之间的通信。数据以称为`表格数据流 (TDS)`的内部格式通过标准网络通信协议（如TCP/IP或命名管道）进行传输。另一种称为`共享内存`的通信协议，可在SQL
    Server和客户端应用程序本地运行在同一服务器上时使用。

    *   `查询处理器`层负责查询优化和执行。

    *   `存储引擎`由与SQL Server中数据访问和数据管理相关的组件组成。它处理磁盘上的数据，处理事务和并发，管理事务日志，并执行其他几个功能。

    *   `内存中OLTP引擎`于SQL Server 2014引入。这种无锁、无闩锁的技术有助于提高OLTP工作负载的性能。它与将所有数据存储在内存中的内存优化表一起工作。我们将在下一章讨论内存中OLTP并发模型。

    *   SQL Server包括一组`实用工具`，它们负责备份和还原操作、数据大容量加载、全文索引管理以及其他几个操作。

    *   最后，SQL Server的关键组件是`SQL Server操作系统 (SQLOS)`。SQLOS是位于SQL Server和操作系统（Windows或Linux）之间的层，负责调度和资源管理、同步、异常处理、死锁检测、CLR托管等。例如，当任何SQL
    Server组件需要分配内存时，它不会直接调用操作系统API函数，而是向SQLOS请求内存，然后SQLOS使用内存分配器组件来满足该请求。


    SQLOS最初在SQL Server 2005中引入，旨在提高SQL Server中调度的效率并最小化上下文和内核模式切换。Windows和SQLOS之间的主要区别在于调度模型。Windows是使用抢占式调度的通用操作系统。它控制当前正在运行的进程，根据需要挂起和恢复它们。相反，除CLR代码外，SQLOS使用协作式调度，进程会定期自愿让出。


    SQL Server 2017中的Linux支持导致了SQLOS的进一步转型，并引入了`平台抽象层 (SQL PAL)`。它作为SQLOS和操作系统之间的网关工作，为操作系统API/内核调用提供抽象。在性能关键代码中极少数例外情况下，SQLOS不会直接调用操作系统API，而是使用PAL。


    SQLOS在启动时创建一组`调度程序`。调度程序的数量等于系统中逻辑CPU的数量，另有一个用于专用管理员连接的额外调度程序。例如，如果一个服务器有两个启用超线程的四核CPU，SQL
    Server将创建17个调度程序。根据处理器关联性设置和基于核心的许可模型，每个调度程序可以处于`在线`或`离线`状态。


    尽管调度程序的数量与系统中的CPU数量相匹配，但除非启用了处理器关联性设置，否则它们之间没有严格的一一对应关系。在某些情况下，在高负载下，有可能出现多个调度程序在同一CPU上运行的情况。或者，当设置了处理器关联性时，调度程序以严格的一一对应关系绑定到CPU。'
  raw: '### Tip


    Do not mix DDL and DML statements in one transaction.


    You need to analyze the root cause of deadlocks if you have them in your system.
    In most cases, query optimization and code refactoring would help to address them.
    You should also consider implementing retry logic around critical use cases in
    the system.


    ### Tip


    Find the root cause of deadlocks. Implement retry logic if query optimization
    and code refactoring do not address them.


    It is impossible to eliminate all blocking in the system . Fortunately, understanding
    the root cause of the blocking helps with designing a solution that mitigates
    the issue.


    ## Summary


    Consistent transaction and error-handling strategies reduce blocking and simplify
    troubleshooting of concurrency issues. The choice between client- and server-side
    implementation depends on the data access tier architecture; however, as a general
    rule, you should use explicit rather than autocommitted transactions.


    Business requirements should dictate the data consistency and isolation rules
    in the system. You should choose the *minimally required* isolation level that
    satisfies them. Do not use `READ UNCOMMITTED` unless it is absolutely necessary.


    Optimistic isolation levels can be acceptable, even with OLTP workload, as long
    as the system can handle additional `tempdb` overhead. It is better to use `READ
    COMMITTED SNAPSHOT` unless transactional-level consistency is required.


    Having proper query optimization and index tuning helps to improve concurrency
    in a majority of cases. Properly optimized queries acquire fewer locks, which
    reduces the chance of lock conflicts and blocking in the system. You should also
    keep transactions as short as possible and modify data close to the end of the
    transactions to reduce the amount of time locks are held.


    Every system is unique, and it is impossible to provide generic advice that can
    be applied everywhere. However, a good understanding of the SQL Server concurrency
    model will help you to design the right transaction strategy and address any blocking
    and concurrency issues in the system.


    # 12. Troubleshooting Concurrency Issues


    System troubleshooting is both an art and a science. It is also a very big and
    complex topic. If I had to write a book covering all aspects of system troubleshooting,
    it would have more pages than the one you are currently reading.


    The processes of system troubleshooting and performance tuning require you to
    take a holistic view of the system. SQL Server never lives in a vacuum, and the
    root cause of a problem may not necessarily reside in the database. Inadequate
    hardware, improper OS and SQL Server configuration, inefficient database and application
    design—all these factors may lead to various issues and bad system performance.


    Concurrency is just a small piece of this puzzle. Every multi-user database will
    suffer from some degree of blocking. Nevertheless, concurrency issues may or may
    not be the main source of the problem, and you can often get a better ROI by focusing
    on other areas in the system.


    This chapter will discuss a common troubleshooting technique called *wait statistics
    analysis*. Even though we will focus on locking-related waits and concurrency
    issues, this technique is extremely useful during general troubleshooting. I would
    suggest you read more about this technique and other wait types that may exist
    in the system.


    Remember, however, about taking a holistic view, and analyze the entire system—hardware
    and software—before focusing on in-database problems.


    ## SQL Server Execution Model


    From a high level, the architecture of SQL Server includes six different components,
    as shown in Figure [12-1](#463519_1_En_12_Chapter.xhtml#Fig1).


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig1_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig1_HTML.jpg)


    Figure 12-1


    High-level SQL Server architecture


    *   The *Protocol layer* handles communications between SQL Server and client
    applications. The data is transmitted in an internal format called *Tabular Data
    Stream (TDS)* using one of the standard network communication protocols, such
    as TCP/IP or Named Pipes. Another communication protocol, called *Shared Memory*
    , can be used when both SQL Server and the client applications run locally on
    the same server.


    *   The *Query Processor* layer is responsible for query optimization and execution.


    *   The *Storage Engine* consists of components related to data access and data
    management in SQL Server. It works with the data on disk, handles transactions
    and concurrency, manages the transaction log, and performs several other functions.


    *   The *In-Memory OLTP Engine* was introduced in SQL Server 2014\. This lock-
    and latch-free technology helps to improve the performance of OLTP workloads.
    It works with memory-optimized tables that store all the data in memory. We will
    talk about the In-Memory OLTP Concurrency Model in the next chapter.


    *   SQL Server includes a set of *utilities* , which are responsible for backup
    and restore operations, bulk loading of data, full-text index management, and
    several other actions.


    *   Finally, the vital component of SQL Server is the *SQL Server Operating System
    (* *SQLOS)* . SQLOS is the layer between SQL Server and the OS (Windows or Linux),
    and it is responsible for scheduling and resource management, synchronization,
    exception handling, deadlock detection, CLR hosting, and more. For example, when
    any SQL Server component needs to allocate memory, it does not call the OS API
    function directly, but rather it requests memory from SQLOS, which in turn uses
    the memory allocator component to fulfill the request.


    SQLOS was initially introduced in SQL Server 2005 to improve the efficiency of
    scheduling in SQL Server and to minimize context and kernel mode switching. The
    major difference between Windows and SQLOS is the scheduling model. Windows is
    a general-purpose operating system that uses preemptive scheduling. It controls
    what processes are currently running, suspending and resuming them as needed.
    Alternatively, with the exception of CLR code, SQLOS uses cooperative scheduling
    when processes yield voluntarily on a regular basis.


    Linux support in SQL Server 2017 led to the further transformation of SQLOS and
    the introduction of the *Platform Abstraction Layer* (SQL PAL) . It works as a
    gateway in between SQLOS and the operating system, providing the abstraction for
    OS API/Kernel calls. With very few exceptions in performance-critical code, SQLOS
    does not call the OS API directly, but rather uses PAL instead.


    SQLOS creates a set of *schedulers* when it starts. The number of schedulers is
    equal to the number of logical CPUs in the system, with one extra scheduler for
    a dedicated admin connection. For example, if a server has two quad-core CPUs
    with hyper-threading enabled, SQL Server creates 17 schedulers. Each scheduler
    can be in either an `ONLINE` or `OFFLINE` state based on the processor affinity
    settings and core-based licensing model.


    Even though the number of schedulers matches the number of CPUs in the system,
    there is no strict one-to-one relationship between them unless the processor affinity
    settings are enabled. In some cases, and under heavy load, it is possible to have
    more than one scheduler running on the same CPU. Alternatively, when processor
    affinity is set, schedulers are bound to CPUs in a strict one-to-one relationship.'
