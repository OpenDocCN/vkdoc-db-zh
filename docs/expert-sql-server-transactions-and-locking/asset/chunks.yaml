  trans: '

    ## 堆表


    堆表是没有聚集索引的表。堆表中的数据是未排序的。SQL Server 既不保证也不维护堆表中数据的排序顺序。


    当向堆表中插入数据时，SQL Server 会尽可能填满数据页，尽管它不会分析页面上实际的可用空闲空间。它使用另一种称为 *页空闲空间 (Page Free
    Space, PFS)* 的分配图页来跟踪页面上的可用空闲空间量。然而，这种跟踪并不精确。SQL Server 使用三个位来指示页面是否为空，或者其填充率是
    1 到 50%、51 到 80%、81 到 95% 还是 95% 以上。完全有可能，即使页面有可用空间，SQL Server 也可能不会在该页上存储新行。


    当从堆表中选择数据时，SQL Server 使用 IAM 页来查找属于该表的页和区，并根据它们在 IAM 页上的顺序而不是数据插入的顺序来处理它们。图 1-6
    说明了这一点。此操作在执行计划中显示为 *表扫描 (Table Scan)*。


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig6_HTML.jpg](img/463519_1_En_1_Fig6_HTML.jpg)


    图 1-6：从堆表中选择数据


    当更新堆表中的行时，SQL Server 会尝试将其保留在同一页上。如果没有可用的空闲空间，SQL Server 会将该行的新版本移动到另一页，并用一个特殊的
    16 字节的行（称为 *转发指针*）替换旧行。该行的新版本称为 *转发行*。图 1-7 说明了这一点。


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig7_HTML.jpg](img/463519_1_En_1_Fig7_HTML.jpg)


    图 1-7：转发指针


    使用转发指针主要有两个原因。首先，它们可以防止更新引用该行的非聚集索引键。我们将在本章后面更详细地讨论非聚集索引。


    此外，转发指针有助于最小化重复读取的次数；即在表扫描期间单个行被读取多次的情况。让我们以图 1-7 为例，并假设 SQL Server 按从左到右的顺序扫描页面。再进一步假设，在
    SQL Server 读取第 4 页时（在第 3 页已被读取之后），第 3 页中的行被修改了。该行的新版本会被移动到尚未处理的第 5 页。如果没有转发指针，SQL
    Server 将不知道该行的旧版本已经被读取过，并会在扫描第 5 页时再次读取它。有了转发指针，SQL Server 会跳过转发行——它们的内部属性中有一个标志指示该状态。


    虽然转发指针有助于最小化重复读取，但它们同时也引入了额外的读取操作。SQL Server 在遇到转发指针时会遵循它并读取行的新版本。当堆表被频繁更新且有大量转发行时，这种行为可能会导致过多的
    I/O 操作。


    ### 注意


    你可以通过检查 `sys.dm_db_index_physical_stats` 视图中的 `forwarded_record_count` 列来分析表中的转发行数量。


    当转发行的大小因另一次更新而减小，并且包含转发指针的数据页有足够空间容纳更新后的行版本时，SQL Server 可能会将其移回其原始数据页并删除转发指针行。然而，消除所有转发指针的唯一可靠方法是重建堆表。你可以使用
    `ALTER TABLE REBUILD` 语句来完成此操作。


    堆表在暂存环境中可能很有用，例如当你需要将大量数据快速导入系统时。向堆表中插入数据通常比向带有聚集索引的表中插入数据更快。然而，在常规工作负载下，由于堆表次优的空间控制以及转发指针引入的额外
    I/O 操作，带有聚集索引的表通常比堆表性能更佳。


    ### 注意


    你可以在本书的配套材料中找到演示转发指针开销和堆表中次优空间控制的脚本。


    ## 聚集索引与 B 树


    聚集索引决定了表中数据的物理顺序，数据根据聚集索引键进行排序。一个表只能定义一个聚集索引。


    假设你想在已有数据的堆表上创建聚集索引。第一步如图 1-8 所示，SQL Server 会创建数据的另一个副本，并根据聚集键的值对其进行排序。数据页在一个双链表中链接，其中每个页都包含指向链中下一个和上一个页的指针。这个列表称为索引的
    *叶级别*，它包含实际的表数据。


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig8_HTML.jpg](img/463519_1_En_1_Fig8_HTML.jpg)


    图 1-8：聚集索引结构：叶级别


    ### 注意


    页面通过页地址相互引用，该地址由两个值组成：数据库中的 `file_id` 和文件中的页序号。


    当叶级别由多个页组成时，SQL Server 开始构建索引的 *中间级别*，如图 1-9 所示。


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig9_HTML.jpg](img/463519_1_En_1_Fig9_HTML.jpg)


    图 1-9：聚集索引结构：中间级别


    中间级别为每个叶级别页存储一行。它存储两条信息：它所引用页的物理地址和该页索引键的最小值。唯一的例外是第一页的第一行，SQL Server 在其中存储 `NULL`
    而不是最小索引键值。通过这种优化，当你在表中插入具有最小键值的行时，SQL Server 无需更新非叶级别行。


    中间级别的页也链接在一个双链表中。SQL Server 会不断增加中间级别，直到出现一个只包含单个页的级别。这个级别称为 *根级别*，它成为索引的入口点，如图
    1-10 所示。

    '
- fmt: '# B-Tree索引结构详解


    ## 注意


    此索引结构称为`B-Tree Index`，即`Balanced Tree`（平衡树）。


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig10_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig10_HTML.jpg)

    图 1-10 聚集索引结构：根级别


    如图所示，索引始终包含一个叶级别、一个根级别以及零个或多个中间级别。唯一的例外是当索引数据可以容纳在单个页面中时。在这种情况下，SQL Server不会创建单独的根级别页面，索引仅由单个叶级别页面组成。


    SQL Server始终维护索引中数据的顺序，将新行插入到它们所属的数据页面中。当数据页面没有足够的空闲空间时，SQL Server会分配一个新页面并将行放置在那里，同时调整双向链表页面列表中的指针以保持索引中的逻辑排序顺序。此操作称为`page
    split`（页面拆分），会导致索引碎片化。


    图 [1-11](#463519_1_En_1_Chapter.xhtml#Fig11) 说明了这种情况。当`Original Page`（原始页面）没有足够空间容纳新行时，SQL
    Server执行页面拆分，将大约一半的数据从`Original Page`移动到`New Page`（新页面），然后调整页面指针。


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig11_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig11_HTML.jpg)

    图 1-11 页面拆分后的叶级别数据页面


    页面拆分也可能在数据修改期间发生。SQL Server在B-Tree索引中不使用转发展指针。相反，当无法就地执行更新时（例如，在数据行增长期间），SQL Server会执行页面拆分，将更新后的行及后续行从页面移动到另一个页面。尽管如此，索引排序顺序通过页面指针得以维持。


    SQL Server可以通过三种不同的方式从索引中读取数据。第一种是`allocation order scan`（分配顺序扫描）。SQL Server通过IAM页面访问表数据，类似于处理堆表的方式。然而，这种方法可能引入数据一致性现象——在页面拆分时，行可能被跳过或重复读取——因此，分配顺序扫描很少使用。我们将在本书后面讨论可能导致分配顺序扫描的情况。


    第二种方法称为`ordered scan`（有序扫描）。假设我们要运行`SELECT Name FROM dbo.Customers`查询。所有数据行都驻留在索引的叶级别，SQL
    Server可以扫描索引并将行返回给客户端。


    SQL Server从索引的根页面开始，并从那里读取第一行。该行引用具有表中最小键值的中间页面。SQL Server读取该页面并重复此过程，直到找到叶级别上的第一个页面。然后，SQL
    Server开始逐行读取行，通过页面的链接列表移动，直到读取所有行。图 [1-12](#463519_1_En_1_Chapter.xhtml#Fig12)
    说明了此过程。


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig12_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig12_HTML.jpg)

    图 1-12 有序索引扫描


    分配顺序扫描和有序扫描在执行计划中都表示为`Index Scan`（索引扫描）运算符。


    ## 注意


    服务器可以向前和向后两个方向导航索引。但是，SQL Server在向后索引扫描期间不使用并行度。


    最后一种索引访问方法称为`index seek`（索引查找）。假设我们要运行以下查询：

    ```

    SELECT Name FROM dbo.Customers WHERE CustomerId BETWEEN 4 AND 7

    ```

    图 [1-13](#463519_1_En_1_Chapter.xhtml#Fig13) 说明了SQL Server可能如何处理它。


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig13_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig13_HTML.jpg)

    图 1-13 索引查找


    为了从表中读取行范围，SQL Server需要找到范围内键的最小值（即4）。SQL Server从根页面开始，其中第二行引用了键最小值为350的页面。该值大于我们要查找的键值，因此SQL
    Server读取根页面第一行所引用的中间级别数据页面（1:170）。


    类似地，中间页面将SQL Server引导到第一个叶级别页面（1:176）。SQL Server读取该页面，然后读取`CustomerId`等于4和5的行，最后从第二个页面读取剩余的两行。


    从技术上讲，索引查找操作有两种类型。第一种称为`point-lookup`（点查找，有时也称为`singleton lookup`），SQL Server查找并返回单个行。可以将`WHERE
    CustomerId = 2`谓词视为一个例子。


    另一种类型称为`range scan`（范围扫描），它要求SQL Server找到键的最低值或最高值，然后（向前或向后）扫描行集，直到达到扫描范围的末尾。谓词`WHERE
    CustomerId BETWEEN 4 AND 7`会导致范围扫描。这两种情况在执行计划中都显示为`Index Seek`运算符。


    如你所猜，索引查找比索引扫描更高效，因为SQL Server只处理行和数据页面的子集，而不是扫描整个索引。然而，执行计划中的`Index Seek`运算符可能会产生误导，它可能代表一个扫描大量行甚至整个索引的范围扫描。例如，在我们的表中，`WHERE
    CustomerId > 0`谓词要求SQL Server扫描整个索引；但它将在执行计划中表示为`Index Seek`运算符。


    关系数据库中有一个称为`SARGable predicates`（可搜索谓词）的概念，即`Search Argument-able`。如果SQL Server在索引存在时可以利用索引查找操作，则该谓词是`SARGable`的。简而言之，当SQL
    Server在谓词求值期间可以确定要处理的单个或范围的索引键值时，谓词就是`SARGable`的。显然，使用`SARGable`谓词编写查询并尽可能利用索引查找是有益的。


    `SARGable`谓词包括以下运算符：`=`、`>`、`>=`、`<`、`<=`、`IN`、`BETWEEN`和`LIKE`（前缀匹配情况下）。非`SARGable`运算符包括`NOT`、`<>`、`LIKE`（非前缀匹配情况下）和`NOT
    IN`。


    另一种使谓词变为非`SARGable`的情况是对表列使用函数（标准或用户定义）。SQL Server必须为处理的每一行调用该函数，这阻止了索引查找的使用。


    这同样适用于数据类型转换，此时SQL Server使用`CONVERT_IMPLICIT`内部函数。可能发生这种情况的一个常见示例是在谓词中对`varchar`列使用`nvarchar`参数。另一种情况是在连接谓词中参与的列具有不同的数据类型。这两种情况即使谓词运算符看似是`SARGable`，也可能导致索引扫描。'
  raw: '### Note


    This index structure is called a *B-Tree Index* *,* which stands for *Balanced
    Tree*.


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig10_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig10_HTML.jpg)


    Figure 1-10


    Clustered index structure: Root level


    As you can see, the index always has one leaf level, one root level, and zero
    or more intermediate levels. The only exception is when the index data fits into
    a single page. In that case, SQL Server does not create the separate root-level
    page, and the index consists of just the single leaf-level page.


    SQL Server always maintains the order of the data in the index, inserting new
    rows on the data pages to which they belong. In cases when a data page does not
    have enough free space, SQL Server allocates a new page and places the row there,
    adjusting pointers in the double-linked page list to maintain a logical sorting
    order in the index. This operation is called *page split* and leads to index fragmentation.


    Figure [1-11](#463519_1_En_1_Chapter.xhtml#Fig11) illustrates this condition.
    When *Original Page* does not have enough space to accommodate the new row, SQL
    Server performs a page split, moving about half of the data from *Original Page*
    to *New Page*, adjusting page pointers afterward.


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig11_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig11_HTML.jpg)


    Figure 1-11


    Leaf-level data pages after page split


    A page split may also occur during data modifications. SQL Server does not use
    forwarding pointers with B-Tree indexes. Instead, when an update cannot be done
    in-place—for example, during data row increase—SQL Server performs a page split
    and moves updated and subsequent rows from the page to another page. Nevertheless,
    the index sorting order is maintained through the page pointers.


    SQL Server may read the data from the index in three different ways. The first
    is an *allocation order scan* . SQL Server accesses the table data through IAM
    pages similar to how it does this with heap tables. This method, however, could
    introduce data consistency phenomena—with page splits, rows may be skipped or
    read more than once—and, therefore, allocation order scan is rarely used. We will
    discuss conditions that may lead to allocation order scans later in the book.


    The second method is called an *ordered scan* *.* Let’s assume that we want to
    run the `SELECT Name FROM dbo.Customers` query. All data rows reside on the leaf
    level of the index, and SQL Server can scan it and return the rows to the client.


    SQL Server starts with the root page of the index and reads the first row from
    there. That row references the intermediate page with the minimum key value from
    the table. SQL Server reads that page and repeats the process until it finds the
    first page on the leaf level. Then, SQL Server starts to read rows one by one,
    moving through the linked list of the pages until all rows have been read. Figure
    [1-12](#463519_1_En_1_Chapter.xhtml#Fig12) illustrates this process.


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig12_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig12_HTML.jpg)


    Figure 1-12


    Ordered index scan


    Both allocation order scan and ordered scan are represented as *Index Scan* operators
    in the execution plans.


    ### Note


    The server can navigate through indexes in both directions, forward and backward.
    However, SQL Server does not use parallelism during backward index scans.


    The last index access method is called *index seek* . Let’s assume we want to
    run the following query: `SELECT Name FROM dbo.Customers WHERE CustomerId BETWEEN
    4 AND 7`. Figure [1-13](#463519_1_En_1_Chapter.xhtml#Fig13) illustrates how SQL
    Server may process it.


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig13_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig13_HTML.jpg)


    Figure 1-13


    Index seek


    In order to read the range of rows from the table, SQL Server needs to find the
    row with the minimum value of the key from the range, which is 4\. SQL Server
    starts with the root page, where the second row references the page with the minimum
    key value of 350\. It is greater than the key value that we are looking for, and
    SQL Server reads the intermediate-level data page (1:170) referenced by the first
    row on the root page.


    Similarly, the intermediate page leads SQL Server to the first leaf-level page
    (1:176). SQL Server reads that page, then it reads the rows with `CustomerId`
    equal to 4 and 5, and, finally, it reads the two remaining rows from the second
    page.


    Technically speaking, there are two kinds of index seek operations. The first
    is called a *point-lookup* (or, sometimes, *singleton lookup*), where SQL Server
    seeks and returns a single row. You can think about the `WHERE CustomerId = 2`
    predicate as an example.


    The other type is called a *range scan* , and it requires SQL Server to find the
    lowest or highest value of the key and scan (either forward or backward) the set
    of rows until it reaches the end of scan range. The predicate `WHERE CustomerId
    BETWEEN 4 AND 7` leads to the range scan. Both cases are shown as *Index Seek*
    operators in the execution plans.


    As you can guess, index seek is more efficient than index scan because SQL Server
    processes just the subset of rows and data pages rather than scanning the entire
    index. However, an *Index Seek* operator in the execution plan may be misleading
    and represent a range scan that scans a large number of rows or even an entire
    index. For example, in our table, the `WHERE CustomerId > 0` predicate requires
    SQL Server to scan the entire index; however, it would be represented as an *Index
    Seek* operator in the plan.


    There is a concept in relational databases called *SARGable predicates*, which
    stands for *Search Argument-able*. The predicate is SARGable if SQL Server can
    utilize an index seek operation if the index exists. In a nutshell, predicates
    are SARGable when SQL Server can determine the single or range of index key values
    to process during predicate evaluation. Obviously, it is beneficial to write queries
    using SARGable predicates and utilize index seek whenever possible.


    SARGable predicates include the following operators: `=`, `>`, `>=`, `<`, `<=`,
    `IN`, `BETWEEN`, and `LIKE` (in case of prefix matching). Non-SARGable operators
    include `NOT`, `<>`, `LIKE` (in case of non-prefix matching), and `NOT IN`.


    Another circumstance for making predicates non-SARGable is using functions (standard
    or user-defined) against the table columns. SQL Server must call the function
    for every row it processes, which prevents an index seek from being used.


    The same applies to data-type conversions where SQL Server uses the `CONVERT_IMPLICIT`
    internal function. One common example of when it may happen is using the unicode
    `nvarchar` parameter in the predicate with a `varchar` column. Another case is
    having different data types for the columns that participate in a join predicate.
    Both of those cases could lead to the index scan even when the predicate operator
    appears to be SARGable.'
