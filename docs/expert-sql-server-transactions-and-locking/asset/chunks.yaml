- fmt: '### LCK_M_U Wait Type


    `LCK_M_U` 等待类型可以说是 OLTP 系统中最常见的与锁相关的等待类型之一，因为它表示正在等待更新（U）锁。


    如你所知，SQL Server 在更新扫描期间使用更新（U）锁来查找需要更新或删除的行。SQL Server 在读取行时获取更新（U）锁，之后释放或将其转换为排他（X）锁。在大多数情况下，大量的
    `LCK_M_U` 等待表明系统中存在优化不佳的写入查询（`UPDATE`、`DELETE`、`MERGE`）。


    你可以将此数据与 `PAGEIOLATCH*` 等待类型关联分析。这些等待发生在 SQL Server 等待从磁盘读取数据页时。大量的此类等待指向高磁盘 I/O，这通常是系统中查询未优化的另一个迹象。除了未优化的查询外，还有其他情况可能导致此类等待，因此不应在未进行额外分析的情况下就得出结论。


    `PAGEIOLATCH*` 等待类型表示系统中的物理 I/O。如今，配备足够内存以在缓冲池中缓存活动数据的服务器很常见。在此类环境中，未优化的查询不会产生物理读取和
    `PAGEIOLATCH*` 等待。然而，它们可能遭遇阻塞，并在更新扫描期间产生 `LCK_M_U` 等待。


    优化不佳的查询需要处理大量数据，这增加了执行计划的成本。在许多情况下，SQL Server 会为它们生成并行执行计划。高的 `CXPACKET` 等待表明大量的并行度，这可能是
    OLTP 系统中查询未优化的另一个迹象。


    然而，你应该记住，并行是完全正常且预期的。`CXPACKET` 等待并不一定表示存在问题，在分析时应考虑系统的工作负载。同样值得注意的是，*Cost Threshold
    for Parallelism* 设置的默认值极低，在如今大多数情况下都需要提高。


    有几种方法可以使用标准 SQL Server 工具检测资源密集型（I/O）的未优化查询。最常见的方法之一是使用 SQL Traces 或 Extended
    Events 捕获系统活动，按读取和/或写入次数过滤数据。然而，这种方法需要你在收集数据后进行额外分析。在确定优化目标时，应检查查询执行的频率。


    ### Important


    在繁忙系统中，捕获查询执行统计信息的 Extended Events 会话和 SQL Traces 可能导致显著开销。请谨慎使用，并且除非正在进行性能故障排除，否则不要保持它们运行。


    另一种非常简单而强大的检测资源密集型查询的方法是 `sys.dm_exec_query_stats` 数据管理视图。SQL Server 跟踪缓存的执行计划的各种统计信息，包括执行次数和
    I/O 操作、经过时间以及 CPU 时间，并通过该视图公开它们。此外，你可以将其与其他数据管理对象联接，获取这些查询的 SQL 文本和执行计划。这简化了分析，并且对系统中各种性能和计划缓存问题的故障排除很有帮助。


    清单 [12-2](#463519_1_En_12_Chapter.xhtml#PC2) 展示了一个查询，它返回截至执行时计划已缓存的 50 个 I/O 最密集的查询。值得注意的是，`sys.dm_exec_query_stats`
    视图在不同版本的 SQL Server 中的结果集列略有不同。清单 [12-2](#463519_1_En_12_Chapter.xhtml#PC2) 中的查询适用于
    SQL Server 2008R2 及以上版本。你可以从 `SELECT` 列表中移除最后四列，以使其兼容 SQL Server 2005-2008。


    ```

    select top 50

    substring(qt.text, (qs.statement_start_offset/2)+1,

    ((

    case qs.statement_end_offset

    when -1 then datalength(qt.text)

    else qs.statement_end_offset

    end - qs.statement_start_offset)/2)+1) as SQL

    ,qp.query_plan as [Query Plan]

    ,qs.execution_count as [Exec Cnt]

    ,(qs.total_logical_reads + qs.total_logical_writes) /

    qs.execution_count as [Avg IO]

    ,qs.total_logical_reads as [Total Reads], qs.last_logical_reads

    as [Last Reads]

    ,qs.total_logical_writes as [Total Writes], qs.last_logical_writes

    as [Last Writes]

    ,qs.total_worker_time as [Total Worker Time], qs.last_worker_time

    as [Last Worker Time]

    ,qs.total_elapsed_time / 1000 as [Total Elapsed Time]

    ,qs.last_elapsed_time / 1000 as [Last Elapsed Time]

    ,qs.creation_time as [Cached Time], qs.last_execution_time

    as [Last Exec Time]

    ,qs.total_rows as [Total Rows], qs.last_rows as [Last Rows]

    ,qs.min_rows as [Min Rows], qs.max_rows as [Max Rows]

    from

    sys.dm_exec_query_stats qs with (nolock)

    cross apply sys.dm_exec_sql_text(qs.sql_handle) qt

    cross apply sys.dm_exec_query_plan(qs.plan_handle) qp

    order by

    [Avg IO] desc

    Listing 12-2

    Using sys.dm_exec_query_stats

    ```


    如图 [12-5](#463519_1_En_12_Chapter.xhtml#Fig5) 所示，它允许你根据资源使用情况和执行次数轻松定义优化目标。例如，结果集中的第二个查询是优化的最佳候选，因为它运行得非常频繁。显然，如果我们的目标是减少系统中的更新锁等待量，我们需要专注于数据修改查询。


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig5_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig5_HTML.jpg)


    Figure 12-5


    Sys.dm_exec_query_stats results


    不幸的是，`sys.dm_exec_query_stats` 视图不返回任何对于没有缓存执行计划的查询的信息。通常这不是问题，因为我们的优化目标不仅是资源密集型，而且是频繁执行的查询。这些查询的计划通常由于频繁重用而保留在缓存中。但是，在发生语句级重新编译的情况下，SQL
    Server 不会缓存计划；因此，`sys.dm_exec_query_stats` 会遗漏它们。你应该使用 Extended Events 和/或 SQL
    Traces 来捕获它们。我通常从 `sys.dm_exec_query_stats` 输出的查询开始，然后使用 Extended Events 交叉检查优化目标。


    在 SQL Server 重新启动、内存压力、由于统计信息更新引起的重新编译以及其他一些情况下，查询计划可能会从缓存中移除，因此不会包含在 `sys.dm_exec_query_stats`
    的结果中。除了执行次数之外，分析 `creation_time` 和 `last_execution_time` 列也是有益的。


    在 SQL Server 2016 及以上版本中，你可以使用 *Query Store* 来收集系统中所有查询的执行统计信息。它提供了丰富的报告和数据管理视图，你可以使用它们快速识别系统中的低效查询。来自
    Query Store 的数据持久存储在数据库中，并且会在 SQL Server 重启后保留。Query Store 是一个极其强大的工具，对故障排除有巨大帮助。


    你也可以使用我们在第 [4](#463519_1_En_4_Chapter.xhtml) 章讨论过的阻塞监控框架。你可以分析更新（U）锁等待的数据，选择优化的目标。我们将在本章后面更详细地讨论这个框架。


    正如我们已经讨论过的，阻塞条件和锁等待也可能由于系统中不正确的事务管理而发生。长事务可能长时间持有锁，阻止其他会话在受影响的行上获取不兼容的锁。请记住这种行为，并将其纳入分析和故障排除中。'
  raw: '### LCK_M_U Wait Type


    The `LCK_M_U` wait type is, perhaps, one of the most common locking-related wait
    types in OLTP systems, as it indicates a wait for update (U) locks.


    As you may remember, SQL Server uses update (U) locks during update scans when
    it looks for the rows that need to be updated or deleted. SQL Server acquires
    an update (U) lock when it reads the row, releasing or converting it to an exclusive
    (X) lock afterward. In the majority of cases, a large number of LCK_M_U waits
    indicates the existence of poorly optimized writer queries (UPDATE, DELETE, MERGE)
    in the system.


    You can correlate the data with `PAGEIOLATCH*` wait types. These waits occur when
    SQL Server is waiting for the data page to be read from disk. A high amount of
    such waits points to high disk I/O, which is often another sign of non-optimized
    queries in the system. There are other conditions besides non-optimized queries
    that may generate such waits, and you should not make the conclusion without performing
    additional analysis.


    The `PAGEIOLATCH*` wait type indicates physical I/O in the system. It is common
    nowadays to have servers with enough memory to cache the active data in the buffer
    pool. Non-optimized queries in such environments would not generate physical reads
    and `PAGEIOLATCH*` waits. Nevertheless, they may suffer from blocking and generate
    `LCK_M_U` waits during update scans.


    Poorly optimized queries need to process a large amount of data, which increases
    the cost of the execution plan. In many cases, SQL Server would generate parallel
    execution plans for them. A high `CXPACKET` wait indicates a large amount of parallelism,
    which may be another sign of poorly optimized queries in OLTP systems.


    You should remember, however, that parallelism is completely normal and expected.
    A `CXPACKET` wait does not necessarily indicate a problem, and you should take
    the system workload into consideration during analysis. It is also worth noting
    that the default value of the *Cost Threshold for Parallelism* setting is extremely
    low and needs to be increased in the majority of cases nowadays.


    There are several ways to detect poorly optimized I/O-intensive queries using
    standard SQL Server tools. One of the most common approaches is by capturing system
    activity using SQL Traces or Extended Events, filtering the data by the number
    of reads and/or writes. This approach, however, requires you to perform additional
    analysis after the data is collected. You should check how frequently queries
    are executed when determining targets for optimization.


    ### Important


    Extended Events sessions and SQL Traces that capture query execution statistics
    may lead to significant overhead in busy systems. Use them with care and do not
    keep them running unless you are doing performance troubleshooting.


    Another very simple and powerful method of detecting resource-intensive queries
    is the `sys.dm_exec_query_stats` data management view. SQL Server tracks various
    statistics for cached execution plans, including the number of executions and
    I/O operations, elapsed times, and CPU times, and exposes them through that view.
    Furthermore, you can join it with other data management objects and obtain the
    SQL text and execution plans for those queries. This simplifies the analysis,
    and it can be helpful during the troubleshooting of various performance and plan-cache
    issues in the system.


    Listing [12-2](#463519_1_En_12_Chapter.xhtml#PC2) shows a query that returns the
    50 most I/O-intensive queries, which have plans cached at the moment of execution.
    It is worth noting that the `sys.dm_exec_query_stats` view has slightly different
    columns in the result set in different versions of SQL Server. The query in Listing
    [12-2](#463519_1_En_12_Chapter.xhtml#PC2) works in SQL Server 2008R2 and above.
    You can remove the last four columns from the `SELECT` list to make it compatible
    with SQL Server 2005-2008.


    ```

    select top 50

    substring(qt.text, (qs.statement_start_offset/2)+1,

    ((

    case qs.statement_end_offset

    when -1 then datalength(qt.text)

    else qs.statement_end_offset

    end - qs.statement_start_offset)/2)+1) as SQL

    ,qp.query_plan as [Query Plan]

    ,qs.execution_count as [Exec Cnt]

    ,(qs.total_logical_reads + qs.total_logical_writes) /

    qs.execution_count as [Avg IO]

    ,qs.total_logical_reads as [Total Reads], qs.last_logical_reads

    as [Last Reads]

    ,qs.total_logical_writes as [Total Writes], qs.last_logical_writes

    as [Last Writes]

    ,qs.total_worker_time as [Total Worker Time], qs.last_worker_time

    as [Last Worker Time]

    ,qs.total_elapsed_time / 1000 as [Total Elapsed Time]

    ,qs.last_elapsed_time / 1000 as [Last Elapsed Time]

    ,qs.creation_time as [Cached Time], qs.last_execution_time

    as [Last Exec Time]

    ,qs.total_rows as [Total Rows], qs.last_rows as [Last Rows]

    ,qs.min_rows as [Min Rows], qs.max_rows as [Max Rows]

    from

    sys.dm_exec_query_stats qs with (nolock)

    cross apply sys.dm_exec_sql_text(qs.sql_handle) qt

    cross apply sys.dm_exec_query_plan(qs.plan_handle) qp

    order by

    [Avg IO] desc

    Listing 12-2

    Using sys.dm_exec_query_stats

    ```


    As you can see in Figure [12-5](#463519_1_En_12_Chapter.xhtml#Fig5), it allows
    you to easily define optimization targets based on resource usage and the number
    of executions. For example, the second query in the result set is the best candidate
    for optimization because of how frequently it runs. Obviously, we need to focus
    on data modification queries if our target is to reduce the amount of update lock
    waits in the system.


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig5_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig5_HTML.jpg)


    Figure 12-5


    Sys.dm_exec_query_stats results


    Unfortunately, the `sys.dm_exec_query_stats` view does not return any information
    for the queries that do not have execution plans cached. Usually, this is not
    an issue, because our optimization targets are not only resource intensive, but
    they are also frequently executed queries. Plans for those queries usually stay
    in the cache due to their frequent reuse. However, SQL Server does not cache plans
    in the case of a statement-level recompile; therefore, `sys.dm_exec_query_stats`
    misses them. You should use Extended Events and/or SQL Traces to capture them.
    I usually start with queries from the `sys.dm_exec_query_stats` output and crosscheck
    the optimization targets with Extended Events later.


    Query plans can be removed from the cache and, therefore, are not included in
    the `sys.dm_exec_query_stats` result in cases of a SQL Server restart , memory
    pressure, recompilations due to a statistics update, and a few other cases. It
    is beneficial to analyze the `creation_time` and `last_execution_time` columns
    in addition to the number of executions.


    In SQL Server 2016 and above, you can use the *Query Store* to collect execution
    statistics for all queries in the system. It provides a rich set of reports and
    data management views, which you can use to quickly identify inefficient queries
    in the system. The data from the Query Store is persisted in the database and
    would survive SQL Server restart. The Query Store is an extremely powerful tool
    that helps dramatically during troubleshooting.


    You can also use the Blocking Monitoring Framework we discussed in Chapter [4](#463519_1_En_4_Chapter.xhtml).
    You can analyze the data for update (U) lock waits, choosing the targets for optimization.
    We will talk about this framework in more detail later in the chapter.


    As we already discussed, it is also possible that blocking conditions and locking
    waits occur due to incorrect transaction management in the system. Long transactions
    may hold locks for a long period of time, blocking other sessions from acquiring
    incompatible locks on affected rows. Remember this behavior and factor it into
    the analysis and troubleshooting.'
