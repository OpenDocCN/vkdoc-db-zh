    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig3_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Data row storage: sys.dm_db_index_physical_stats output after the first INSERT


    Let’s insert another row using the code from Listing [1-3](#463519_1_En_1_Chapter.xhtml#PC3).


    ```

    insert into dbo.DataRows(ID, ADate, VarCol1, VarCol2, VarCol3)

    values(2,''2006-09-29'',''DDDDD'',''EEEEE'',''FFFFF'');

    Listing 1-3

    Data row storage: Inserting the second row

    ```


    All three variable-length columns store five-character strings, and, therefore,
    the row would fit on the already-allocated `IN_ROW_DATA` page. Figure [1-4](#463519_1_En_1_Chapter.xhtml#Fig4)
    illustrates data pages at this phase.


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig4_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Data row storage: Data pages after the second INSERT


    You can confirm it by running the code from Listing [1-2](#463519_1_En_1_Chapter.xhtml#PC2)
    again. Figure [1-5](#463519_1_En_1_Chapter.xhtml#Fig5) illustrates the output
    from the view.


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig5_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Data row storage: sys.dm_db_index_physical_stats output after the second INSERT


    SQL Server logically groups eight pages into 64KB units called *extents*. There
    are two types of extents available: *mixed extents* store data that belongs to
    different objects, while *uniform extents* store the data for the same object.


    By default, when a new object is created, SQL Server stores the first eight object
    pages in mixed extents. After that, all subsequent space allocation for that object
    is done with uniform extents.


    ### Tip


    Disabling mixed extents allocation may help to improve `tempdb` throughput in
    the system. In SQL Server prior to 2016, you can achieve that by enabling server-level
    trace flag `T1118`. This trace flag is not required in SQL Server 2016 and above,
    where `tempdb` does not use mixed extents anymore.


    SQL Server uses a special kind of pages, called *allocation maps*, to track extent
    and page usage in database files. *Index Allocation Maps (IAM)* pages track extents
    that belong to an allocation unit on a per-partition basis. Those pages are, in
    a nutshell, bitmaps, where each bit indicates if the extent belongs to a specific
    allocation unit from the object partition.


    Each IAM page covers about 64,000 extents, or almost 4 GB of data in a data file.
    For larger files, multiple IAM pages are linked together into *IAM chains*.


    ### Note


    There are many other types of allocation maps used for database management. You
    can read about them at [`https://docs.microsoft.com/en-us/sql/relational-databases/pages-and-extents-architecture-guide`](https://docs.microsoft.com/en-us/sql/relational-databases/pages-and-extents-architecture-guide)
    or in my *Pro SQL Server Internals* book.'
  trans: '**注意**


    SQL Server 中的每个表/索引都进行了分区。未分区的表在内部被视为单分区表/索引。


    正如我已经提到的，实际数据存储在 8 KB 的*数据页*上的*数据行*中，用户可用空间为 8,060 字节。存储用户数据的页面根据其存储的数据类型，可能属于三个不同的类别，称为*分配单元*。


    `IN_ROW_DATA` 分配单元页存储*主要的*数据行对象，这些对象由内部属性和固定长度列（如 `int`、`datetime`、`float` 等）的数据组成。数据行的行内部分必须适合单个数据页，因此不能超过
    8,060 字节。当可变长度列（如 `(n)varchar(max)`、`(n)varbinary(max)`、`xml` 等）的数据能够适应该限制时，也可能存储在主要行对象的行内部分。


    当可变长度数据不适合行内存储时，SQL Server 会将其存储在行外的不同数据页上，并通过行内指针引用它们。超过 8,000 字节的可变长度数据存储在 `LOB_DATA`
    分配单元数据页上（`LOB` 代表*大对象*）。否则，数据存储在 `ROW_OVERFLOW_DATA` 分配单元页中。


    让我们看一个例子，创建一个包含几个固定长度和可变长度列的表，并在其中插入一行，如代码清单 1-1 所示。


    ```

    create table dbo.DataRows

    (

    ID int not null,

    ADate datetime not null,

    VarCol1 varchar(max),

    VarCol2 varchar(5000),

    VarCol3 varchar(5000)

    );

    insert into dbo.DataRows(ID, ADate, VarCol1, VarCol2, VarCol3)

    values

    (

    1

    ,''1974-08-22''

    ,replicate(convert(varchar(max),''A''),32000)

    ,replicate(convert(varchar(max),''B''),5000)

    ,replicate(convert(varchar(max),''C''),5000)

    );

    ```

    代码清单 1-1：数据行存储：创建测试表


    来自固定长度列（`ID`、`ADate`）的数据将存储在 `IN_ROW_DATA` 分配单元页的行内。`VarCol1` 列的数据为 32,000 字节，将存储在
    `LOB_DATA` 数据页上。


    `VarCol2` 和 `VarCol3` 列各有 5,000 字节的数据。SQL Server 会将其中一列保留在行内（它将适合 8,060 字节的限制），并将另一列放置在单个
    `ROW_OVERFLOW_DATA` 页上。


    **注意**

    行外列指针在行内使用 16 或 24 字节，这会计入 8,060 的最大行大小。在实践中，这可能会限制表中可以拥有的列数。


    图 1-2 说明了此状态。


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig2_HTML.jpg](img/463519_1_En_1_Fig2_HTML.jpg)

    图 1-2：数据行存储：首次 INSERT 后的数据页


    `sys.dm_db_index_physical_stats` 数据管理函数通常用于分析索引碎片。它还按分配单元显示有关数据页的信息。


    代码清单 1-2 显示了返回有关 `dbo.DataRows` 表信息的查询。


    ```

    select

    index_id, partition_number, alloc_unit_type_desc

    ,page_count, record_count, min_record_size_in_bytes

    ,max_record_size_in_bytes, avg_record_size_in_bytes

    from

    sys.dm_db_index_physical_stats

    (

    db_id()

    ,object_id(N''dbo.DataRows'')

    ,0  /* IndexId = 0 -> Table Heap */

    ,NULL /* All Partitions */

    ,''DETAILED''

    );

    ```

    代码清单 1-2：数据行存储：使用 `sys.dm_db_index_physical_stats` DMO 分析表


    图 1-3 展示了代码的输出。如预期所示，该表有一个 `IN_ROW_DATA` 页、一个 `ROW_OVERFLOW_DATA` 页和四个 `LOB_DATA`
    页。`IN_ROW_DATA` 页有大约 2,900 字节的可用空闲空间。


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig3_HTML.jpg](img/463519_1_En_1_Fig3_HTML.jpg)

    图 1-3：数据行存储：首次 INSERT 后 `sys.dm_db_index_physical_stats` 的输出


    让我们使用代码清单 1-3 中的代码插入另一行。


    ```

    insert into dbo.DataRows(ID, ADate, VarCol1, VarCol2, VarCol3)

    values(2,''2006-09-29'',''DDDDD'',''EEEEE'',''FFFFF'');

    ```

    代码清单 1-3：数据行存储：插入第二行


    所有三个可变长度列都存储五个字符的字符串，因此该行将适合已分配的 `IN_ROW_DATA` 页。图 1-4 说明了此阶段的数据页。


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig4_HTML.jpg](img/463519_1_En_1_Fig4_HTML.jpg)

    图 1-4：数据行存储：第二次 INSERT 后的数据页


    你可以通过再次运行代码清单 1-2 中的代码来确认这一点。图 1-5 展示了该视图的输出。


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig5_HTML.jpg](img/463519_1_En_1_Fig5_HTML.jpg)

    图 1-5：数据行存储：第二次 INSERT 后 `sys.dm_db_index_physical_stats` 的输出


    SQL Server 在逻辑上将八个页面组合成 64KB 的单元，称为*区*。有两种类型的区可用：*混合区*存储属于不同对象的数据，而*统一区*存储同一对象的数据。


    默认情况下，当创建新对象时，SQL Server 将前八个对象页存储在混合区中。此后，该对象的所有后续空间分配都使用统一区完成。


    **提示**

    禁用混合区分配可能有助于提高系统中 `tempdb` 的吞吐量。在 2016 版之前的 SQL Server 中，你可以通过启用服务器级别的跟踪标志 `T1118`
    来实现。在 SQL Server 2016 及更高版本中，`tempdb` 不再使用混合区，因此不需要此跟踪标志。


    SQL Server 使用一种特殊类型的页面，称为*分配映射图*，来跟踪数据库文件中的区和页面使用情况。*索引分配映射图 (IAM)* 页按分区跟踪属于分配单元的区。简而言之，这些页面是位图，其中每个位指示该区是否属于对象分区的特定分配单元。


    每个 IAM 页覆盖大约 64,000 个区，或数据文件中近 4 GB 的数据。对于更大的文件，多个 IAM 页会链接在一起形成 *IAM 链*。


    **注意**

    还有许多其他类型的分配映射图用于数据库管理。你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/pages-and-extents-architecture-guide`](https://docs.microsoft.com/en-us/sql/relational-databases/pages-and-extents-architecture-guide)
    或书籍 *Pro SQL Server Internals* 中阅读相关内容。'
- fmt: '## Heap Tables


    Heap tables are tables without a clustered index. The data in heap tables is unsorted.
    SQL Server does not guarantee, nor does it maintain, a sorting order of the data
    in heap tables.


    When you insert data into heap tables, SQL Server tries to fill pages as much
    as possible, although it does not analyze the actual free space available on a
    page. It uses another type of allocation map page called *Page Free Space (PFS)*,
    which tracks the amount of free space available on the page. This tracking is
    imprecise, however. SQL Server uses three bits, which indicate if the page is
    empty, or if it is 1 to 50, 51 to 80, 81 to 95 or above 95 percent full. It is
    entirely possible that SQL Server would not store a new row on the page even when
    it has available space.


    When you select data from the heap table, SQL Server uses IAM pages to find the
    pages and extents that belong to the table, processing them based on their order
    on the IAM pages rather than on the order in which the data was inserted. Figure
    [1-6](#463519_1_En_1_Chapter.xhtml#Fig6) illustrates this point. This operation
    is shown as *Table Scan* in the execution plan.


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig6_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig6_HTML.jpg)


    Figure 1-6: Selecting data from the heap table


    When you update the row in the heap table, SQL Server tries to accommodate it
    on the same page. If there is no free space available, SQL Server moves the new
    version of the row to another page and replaces the old row with a special 16-byte
    row called a *forwarding pointer*. The new version of the row is called a *forwarded
    row*. Figure [1-7](#463519_1_En_1_Chapter.xhtml#Fig7) illustrates this point.


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig7_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig7_HTML.jpg)


    Figure 1-7: Forwarding pointers


    There are two main reasons why forwarding pointers are used. First, they prevent
    updates of nonclustered index keys, which reference the row. We will talk about
    nonclustered indexes in more detail later in this chapter.


    In addition, forwarding pointers help minimize the number of duplicated reads;
    that is, the situation when a single row is read multiple times during the table
    scan. Let’s look at Figure [1-7](#463519_1_En_1_Chapter.xhtml#Fig7) as an example
    and assume that SQL Server scans the pages in left-to-right order. Let’s further
    assume that the row in page 3 was modified at the time when SQL Server reads page
    4 (after page 3 has already been read). The new version of the row would be moved
    to page 5, which has yet to be processed. Without forwarding pointers, SQL Server
    would not know that the old version of the row had already been read, and it would
    read it again during the page 5 scan. With forwarding pointers, SQL Server skips
    the forwarded rows—they have a flag in their internal attributes indicating that
    condition.


    Although forwarding pointers help minimize duplicated reads, they introduce additional
    read operations at the same time. SQL Server follows the forwarding pointers and
    reads the new versions of the rows at the time it encounters them. That behavior
    can introduce an excessive number of I/O operations when heap tables are frequently
    updated and have a large number of forwarded rows.


    ### Note


    You can analyze the number of forwarded rows in the table by checking the `forwarded_record_count`
    column in the `sys.dm_db_index_physical_stats` view.


    When the size of the forwarded row is reduced by another update, and the data
    page with the forwarding pointer has enough space to accommodate the updated version
    of the row, SQL Server may move it back to its original data page and remove the
    forwarding pointer row. Nevertheless, the only reliable way to get rid of all
    forwarding pointers is by rebuilding the heap table. You can do that by using
    an `ALTER TABLE REBUILD` statement.


    Heap tables can be useful in staging environments where you want to import a large
    amount of data into the system as quickly as possible. Inserting data into heap
    tables can often be faster than inserting it into tables with clustered indexes.
    Nevertheless, during a regular workload, tables with clustered indexes usually
    outperform heap tables as a result of heap tables’ suboptimal space control and
    extra I/O operations introduced by forwarding pointers.


    ### Note


    You can find the scripts that demonstrate forwarding pointers’ overhead and suboptimal
    space control in heap tables in this book’s companion materials.


    ## Clustered Indexes and B-Trees


    A clustered index dictates the physical order of the data in a table, which is
    sorted according to the clustered index key. The table can have only one clustered
    index defined.


    Let’s assume that you want to create a clustered index on the heap table with
    the data. As a first step, which is shown in Figure [1-8](#463519_1_En_1_Chapter.xhtml#Fig8),
    SQL Server creates another copy of the data and sorts it based on the value of
    the clustered key. The data pages are linked in a double-linked list, where every
    page contains pointers to the next and previous pages in the chain. This list
    is called the *leaf level* of the index, and it contains the actual table data.


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig8_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig8_HTML.jpg)


    Figure 1-8: Clustered index structure: Leaf level


    ### Note


    The pages reference each other through page addresses, which consist of two values:
    `file_id` in the database and sequential number of the page in the file.


    When the leaf level consists of multiple pages, SQL Server starts to build an
    *intermediate level* of the index, as shown in Figure [1-9](#463519_1_En_1_Chapter.xhtml#Fig9).


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig9_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig9_HTML.jpg)


    Figure 1-9: Clustered index structure: Intermediate levels


    The intermediate level stores one row per each leaf-level page. It stores two
    pieces of information: the physical address and the minimum value of the index
    key from the page it references. The only exception is the very first row on the
    first page, where SQL Server stores `NULL` rather than the minimum index key value.
    With such optimization, SQL Server does not need to update non-leaf level rows
    when you insert the row with the lowest key value in the table.


    The pages on the intermediate level are also linked in a double-linked list. SQL
    Server adds more and more intermediate levels until there is a level that includes
    just a single page. This level is called the *root level*, and it becomes the
    entry point to the index, as shown in Figure [1-10](#463519_1_En_1_Chapter.xhtml#Fig10).'
