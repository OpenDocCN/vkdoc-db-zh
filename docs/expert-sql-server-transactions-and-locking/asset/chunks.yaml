    # 快照隔离级别详解


    ## 读取提交快照隔离级别


    两种乐观隔离级别都需要在数据库级别启用。你可以使用 `ALTER DATABASE SET READ_COMMITTED_SNAPSHOT ON` 命令来启用
    `读取提交快照 (RCSI)`。该语句会获取一个独占（X）数据库锁来更改数据库选项，如果数据库中还有其他用户连接，则会被阻塞。你可以通过运行 `ALTER
    DATABASE SET READ_COMMITTED_SNAPSHOT ON WITH ROLLBACK AFTER X SECONDS` 命令来解决这个问题。这将回滚所有活动事务并终止现有数据库连接，从而允许更改数据库选项。


    ### 注意


    在 Microsoft Azure SQL 数据库中，`读取提交快照` 默认是启用的。


    如前所述，`RCSI` 改变了 `读取提交` 模式下读取器的行为。然而，它并不影响写入器的行为。


    如图 6-3 所示，读取器不再获取共享（S）锁并被行上持有的任何独占（X）锁阻塞，而是使用版本存储中的旧版本。写入器仍然以与悲观隔离级别相同的方式获取更新（U）和独占（X）锁。再次说明，正如你所看到的，不同会话的写入器之间仍然存在阻塞，尽管写入器不会像
    `读取未提交` 模式那样阻塞读取器。


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig3_HTML.jpg](img/463519_1_En_6_Fig3_HTML.jpg)


    图 6-3 读取提交快照隔离级别的行为


    然而，`读取未提交` 和 `读取提交快照` 隔离级别之间有一个主要区别。`读取未提交` 以牺牲数据一致性为代价消除了阻塞。可能发生许多一致性异常，包括读取未提交数据、重复读取和遗漏行。另一方面，`读取提交快照`
    隔离级别为你提供了完整的*语句级一致性*。在此隔离级别运行的语句既不会访问未提交的数据，也不会访问语句开始后提交的数据。


    一个显而易见的结论是，当启用了 `读取提交快照` 隔离级别时，应避免在查询中使用 `（NOLOCK）` 提示。虽然使用 `（NOLOCK）` 和 `读取未提交`
    本身就是一种糟糕的做法，但当 `读取提交快照` 能在不丢失查询数据一致性的情况下提供类似的非阻塞行为时，使用它就完全没用了。


    ### 提示


    将数据库切换到 `读取提交快照` 隔离级别可以是一个很好的紧急技术，当系统正遭受阻塞问题时。假设读取器运行在 `读取提交` 隔离级别，它可以在不更改任何代码的情况下消除写入器/读取器阻塞。显然，这只是临时解决方案，你需要检测并消除阻塞的根本原因。


    ## 快照隔离级别


    `快照` 是一个独立的事务隔离级别，需要在代码中使用 `SET TRANSACTION ISOLATION LEVEL SNAPSHOT` 语句显式设置。


    默认情况下，禁止使用 `快照` 隔离级别。你必须使用 `ALTER DATABASE SET ALLOW_SNAPSHOT_ISOLATION ON` 语句来启用它。此语句不需要独占数据库锁，并且可以在有其他用户连接到数据库时执行。


    `快照` 隔离级别提供了*事务级一致性*。无论事务活动时间多长以及其他事务在此期间做了多少数据更改，事务都将看到事务开始时数据的*快照*。


    ### 注意


    SQL Server 在第一次访问数据时启动显式事务，而不是在 `BEGIN TRAN` 语句时。


    在图 6-4 所示的示例中，我们有一个会话 1 在时间 *T1* 启动事务并读取行。在时间 *T2*，我们有一个会话 2 在自动提交事务中修改了该行。此时，该行的旧（原始）版本移动到
    `tempdb` 中的版本存储。


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig4_HTML.jpg](img/463519_1_En_6_Fig4_HTML.jpg)


    图 6-4 快照隔离级别和读取器行为


    接下来，我们有一个会话 3 启动另一个事务，并在时间 *T3* 读取同一行。它看到的是会话 2（在时间 *T2*）修改并提交的行版本。在时间 *T4*，我们有一个会话
    4 再次在自动提交事务中修改该行。此时，版本存储中有该行的两个版本——一个存在于 *T2* 到 *T4* 之间，以及在 *T2* 之前存在的原始版本。现在，如果会话
    3 再次运行 `SELECT`，它将使用在 *T2* 到 *T4* 之间存在的版本，因为该版本是在会话 3 事务开始时提交的。同样，会话 1 将使用在 *T2*
    之前存在的原始行版本。在会话 1 和会话 3 提交后的某个时间点，*版本存储清理任务* 将从版本存储中删除这两条记录，当然，前提是其他事务不再需要它们。


    `可序列化` 和 `快照` 隔离级别提供了相同级别的防止数据不一致问题的保护；然而，它们的行为存在细微差别。`快照` 隔离级别事务看到的是事务开始时的数据。使用
    `可序列化` 隔离级别，事务看到的是首次访问数据并获取锁时的数据。考虑一种情况，一个会话在事务中间从表中读取数据。如果另一个会话在事务开始之后但在读取数据之前更改了该表中的数据，那么在
    `可序列化` 隔离级别中的事务将看到这些更改，而 `快照` 事务则不会。


    乐观事务隔离级别通过减少甚至消除阻塞来提供语句级或事务级的数据一致性，尽管它们可能会在 `tempdb` 中生成大量数据。如果有一个会话从表中删除数百万行，即使原始的
    `DELETE` 语句运行在悲观隔离级别，所有这些行也需要复制到版本存储中，只是为了为可能的 `快照` 或 `RCSI` 事务保留数据状态。你将在本章后面看到这样的例子。


    现在，让我们检查写入器的行为。假设会话 1 启动事务并更新其中一行。如图 6-5 所示，该会话在那里持有一个独占（X）锁。


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig5_HTML.jpg](img/463519_1_En_6_Fig5_HTML.jpg)


    图 6-5 快照隔离级别和写入器的行为


    会话 2 想要更新 `Cancelled = 1` 的所有行。它开始扫描表，当需要读取 `OrderId = 10` 的数据时，它从版本存储中读取该行；也就是说，读取会话
    2 事务开始前最后提交的版本。此版本是该行的原始（未更新）版本，其 `Cancelled = 0`，因此会话 2 不需要更新它。会话 2 继续扫描行，而不会被更新（U）和独占（X）锁不兼容性所阻塞。

