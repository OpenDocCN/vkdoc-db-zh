    discuss later in the chapter.


    *   *Durability* guarantees that after a transaction is committed, all changes
    done by the transaction stay permanent and will survive a system crash. SQL Server
    achieves durability by using *write-ahead logging* to harden log records in the
    transaction log. A transaction is not considered to be committed until all log
    records generated by the transaction are hardened in the log file.


    The isolation requirements are the most complex to implement in multi-user environments.
    Even though it is possible to completely isolate different transactions from each
    other, this could lead to a high level of blocking and other concurrency issues
    in systems with volatile data. SQL Server addresses this situation by introducing
    several transaction isolation levels that relax isolation requirements at the
    cost of possible concurrency phenomena related to read data consistency:


    *   **Dirty Reads:** A transaction reads uncommitted (dirty) data from other uncommitted
    transactions.


    *   **Non-Repeatable Reads:** Subsequent attempts to read the same data from within
    the same transaction return different results. This data inconsistency issue arises
    when the other transactions modified, or even deleted, data between the reads
    done by the affected transaction.


    *   **Phantom Reads:** This phenomenon occurs when subsequent reads within the
    same transaction return new rows (the ones that the transaction did not read before).
    This happens when another transaction inserted new data in between the reads done
    by the affected transaction.


    ## Pessimistic and Optimistic Concurrency


    Transaction isolation levels control another aspect of SQL Server behavior that
    dictates *concurrency models* for the transactions. Conceptually, there are two
    concurrency models used in database systems:


    *   *Pessimistic concurrency* works under the assumption that multiple users who
    access the same data would all eventually like to modify the data and override
    each other’s changes. The Database Engine prevents this from happening by locking
    the data for the duration of the transaction as soon as the first session accesses
    and/or modifies it.


    *   *Optimistic concurrency*, on the other hand, assumes that, while multiple
    users may access the same data, the chance of simultaneous updates is low. The
    data would not be locked; however, multiple updates would trigger write–write
    conflicts and roll back affected transactions.


    Let’s illustrate the difference between those models with an example. Consider,
    again, that we have a transaction that wants to transfer money between checking
    and savings accounts. As you remember, this would lead to two update operations—decreasing
    the balance of checking and increasing the balance of savings. Let’s also assume
    that you have another session that wants to perform a withdrawal from the checking
    account in parallel with the transfer. This operation would decrease the balance
    of the checking account (updating the same row) along with other actions.


    With pessimistic concurrency, the first session that updates (and in some cases
    even reads) the checking account balance would lock this row, preventing other
    sessions from accessing or updating it. The second session would be blocked until
    the first session completed the transaction, and it would read the new checking
    account balance afterward.


    With optimistic concurrency, neither of the sessions would be blocked. However,
    one of the sessions would not be able to commit and would fail with a *write–write
    conflict* error .


    Both concurrency models have benefits and downsides. Pessimistic concurrency may
    introduce blocking in the system. Optimistic concurrency, on the other hand, requires
    proper write-write conflict handling, and it often introduces additional overhead
    during data modifications.


    SQL Server supports both pessimistic and optimistic concurrency models, controlling
    them by transaction isolation levels.'
  trans: '# 事务


    Microsoft SQL Server 的设计初衷是与其他通用数据库服务器一样，能在多用户环境中运行。数据库引擎需要处理来自多个用户的并发工作负载，并在用户查询和修改相同数据时，提供所需级别的数据一致性。


    在数据库和数据管理系统中，有一个核心概念称为 *事务*。事务是读取和修改数据库中数据的单一工作单元，有助于确保数据的一致性和持久性。在正确实现的事务管理系统中，每个事务都具有四个不同的特性：*原子性*、*一致性*、*隔离性*和*持久性*，通常统称为
    *ACID*。


    ## ACID 特性


    *   **原子性** 保证每个事务作为一个单一工作单元执行，采用“要么全做，要么全不做”的原则。事务中的所有更改要么全部提交，要么全部回滚。考虑经典的银行活期账户和储蓄账户之间转账的例子。该操作由两个独立的步骤组成：减少活期账户余额和增加储蓄账户余额。事务的原子性保证这两个操作要么同时成功，要么同时失败，系统永远不会出现资金已从活期账户扣除但未存入储蓄账户的不一致状态。


    *   **一致性** 确保任何数据库事务都使数据库从一个一致的状态转换到另一个一致的状态，并且不违反任何已定义的数据库规则和约束。


    *   **隔离性** 确保事务中所做的更改是隔离的，并且在事务提交之前对其他事务不可见。严格来说，事务隔离性应保证多个事务的并发执行使系统达到与这些事务串行执行相同的状态。然而，在大多数数据库系统中，此要求通常被放宽，并通过
    *事务隔离级别* 进行控制，我们将在本章后面讨论。


    *   **持久性** 保证事务提交后，该事务所做的所有更改都是永久性的，并能在系统故障后幸存。SQL Server 通过使用 *预写式日志* 将日志记录硬化到事务日志中来实现持久性。事务只有在由其生成的所有日志记录都硬化到日志文件后，才被视为已提交。


    在多用户环境中，隔离性要求是最难实现的。尽管可以完全隔离不同的事务，但这可能导致在具有易变数据的系统中出现高级别的阻塞和其他并发问题。SQL Server
    通过引入几种事务隔离级别来解决这种情况，这些隔离级别以可能的、与读取数据一致性相关的并发现象为代价放宽了隔离要求：


    *   **脏读：** 一个事务从其他未提交的事务中读取未提交（脏）数据。

    *   **不可重复读：** 在同一个事务中，后续尝试读取相同的数据会返回不同的结果。当受影响的事务在两次读取之间，其他事务修改甚至删除了数据时，就会出现这种数据不一致问题。

    *   **幻读：** 当同一个事务中的后续读取返回了新的行（该事务之前未读取过的行）时，就会发生这种现象。这发生在另一个事务在受影响的事务两次读取之间插入了新数据的情况下。


    # 悲观和乐观并发控制


    事务隔离级别控制着 SQL Server 行为的另一个方面，即决定事务的 *并发模型*。从概念上讲，数据库系统中使用两种并发模型：


    *   **悲观并发** 基于这样的假设：访问相同数据的多个用户最终都可能希望修改数据并覆盖彼此的更改。数据库引擎通过在第一个会话访问和/或修改数据后立即锁定数据，直到事务结束，来防止这种情况发生。

    *   **乐观并发** 则假设，虽然多个用户可能访问相同数据，但同时更新的可能性较低。数据不会被锁定；然而，多个更新操作会触发写-写冲突并回滚受影响的事务。


    让我们通过一个例子来说明这些模型之间的区别。再次假设我们有一个事务想要在活期账户和储蓄账户之间转账。如前所述，这将导致两个更新操作——减少活期账户余额和增加储蓄账户余额。另外假设你还有另一个会话，希望与转账操作并行地从活期账户取款。此操作将减少活期账户余额（更新同一行）并执行其他操作。


    在悲观并发模型下，第一个更新（在某些情况下甚至是读取）活期账户余额的会话将锁定该行，阻止其他会话访问或更新它。第二个会话将被阻塞，直到第一个会话完成事务，之后它才能读取新的活期账户余额。


    在乐观并发模型下，两个会话都不会被阻塞。但是，其中一个会话将无法提交，并会因 *写-写冲突* 错误而失败。


    两种并发模型各有优缺点。悲观并发可能在系统中引入阻塞。而乐观并发则需要妥善处理写-写冲突，并且通常在数据修改期间引入额外的开销。


    SQL Server 同时支持悲观和乐观并发模型，并通过事务隔离级别来控制它们。'
- fmt: '## Transaction Isolation Levels


    With disk-based tables, SQL Server supports six different transaction isolation
    levels, as shown in Table 2-1. The table also demonstrates possible concurrency
    phenomena for each of the transaction isolation levels.


    Table 2-1


    Transaction Isolation Levels and Concurrency Phenomena


    | Isolation Level | Type | Dirty Reads | Non-Repeatable Reads | Phantom Reads
    | Write–Write Conflict |

    | --- | --- | --- | --- | --- | --- |

    | `READ UNCOMMITTED` | Pessimistic | YES | YES | YES | NO |

    | `READ COMMITTED` | Pessimistic | NO | YES | YES | NO |

    | `REPEATABLE READ` | Pessimistic | NO | NO | YES | NO |

    | `SERIALIZABLE` | Pessimistic | NO | NO | NO | NO |

    | `READ COMMITTED SNAPSHOT` | Optimistic for readers. Pessimistic for writers.
    | NO | YES | YES | NO |

    | `SNAPSHOT` | Optimistic | NO | NO | NO | YES |


    With pessimistic isolation levels, SQL Server relies strictly on locking to prevent
    access to the rows that were modified or sometimes even read by other sessions.
    With optimistic isolation levels, SQL Server uses row versioning and copies old
    versions of modified rows to a special area in `tempdb` called the version store.
    The other sessions would read old (already committed) versions of the rows from
    there rather than being blocked.


    It is important to note that SQL Server still acquires locks on updated rows in
    optimistic isolation levels, preventing other sessions from updating the same
    rows simultaneously. We will talk about it in more detail in Chapter 6.


    The `READ COMMITTED SNAPSHOT` isolation level combines both optimistic and pessimistic
    concurrency models. Readers (`SELECT` queries) use row versioning, while writers
    (`INSERT`, `UPDATE`, and `DELETE` queries) rely on locking.


    Strictly speaking, `READ COMMITTED SNAPSHOT` is not a true isolation level but
    rather the database option (`READ_COMMITTED_SNAPSHOT`) that changes the default
    behavior of the readers (`SELECT` queries) in the `READ COMMITTED` isolation level.
    In this book, however, I will treat this option as a separate transaction isolation
    level.


    ### Note


    The `READ_COMMITTED_SNAPSHOT` database option is enabled by default in Microsoft
    Azure SQL Databases and disabled by default in regular versions of SQL Server.


    You can set the transaction level on the session level using a `SET TRANSACTION
    ISOLATION LEVEL` statement. Most client libraries use `READ COMMITTED` (or `READ
    COMMITTED SNAPSHOT` when `READ_COMMITTED_SNAPSHOT` database option is enabled)
    as the default isolation level. You can also control isolation level on a per-table
    basis using a locking hint, which we will discuss in the next chapter.


    ## Working with Transactions


    Let’s look at several aspects of transaction management in the system, starting
    with transaction types.


    ### Transaction Types


    There are three types of transactions in SQL Server—explicit, autocommitted, and
    implicit.


    Explicit transactions are explicitly controlled by the code. You can start them
    by using the `BEGIN TRAN` statement. They will remain active until you explicitly
    call `COMMIT` or `ROLLBACK` in the code.


    In the event there are no active transactions present, SQL Server would use autocommitted
    transactions—starting transactions and committing them for each statement it executes.
    It is very important to remember that autocommitted transactions work on a per-statement
    rather than per-module level. For example, when a stored procedure consists of
    five statements, SQL Server would have five autocommitted transactions executed.
    Moreover, if this procedure failed in the middle of execution, SQL Server would
    not roll back its previously committed autocommitted transactions. This behavior
    may lead to logical data inconsistencies in the system.


    For logic that includes multiple data modification statements, autocommitted transactions
    are less efficient than explicit transactions due to the logging overhead they
    introduce. In this mode, every statement would generate transaction log records
    for implicit `BEGIN TRAN` and `COMMIT` operations, which would lead to a large
    amount of transaction log activity and degrade the performance of the system.


    There is another potential performance hit caused by having an excessive number
    of autocommitted transactions. As I already mentioned, SQL Server implements write-ahead
    logging to support the transaction durability’s hardening the log records on disk
    synchronously with data modifications. Internally, however, SQL Server batches
    log write operations and caches log records in memory in small 60 KB structures
    called log buffers. Committing a log record forces SQL Server to flush log buffers
    to disk, thus introducing a synchronous I/O operation.


    Figure 2-1 illustrates this condition. `INSERT_1`, `UPDATE_1`, and `DELETE_1`
    operations run in autocommitted transactions, generating additional log records
    and forcing the log buffer to flush on each `COMMIT`. Alternatively, `INSERT_2`,
    `UPDATE_2`, and `DELETE_2` operations run in an explicit transaction, which leads
    to more efficient logging.


    ![Transaction logging with autocommitted and explicit transactions](images/463519_1_En_2_Chapter/463519_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Transaction logging with autocommitted and explicit transactions


    The code in Listing 2-1 demonstrates this overhead in action. It performs the
    `INSERT/UPDATE/DELETE` sequence 10,000 times in a loop in autocommitted and explicit
    transactions, measuring execution time and transaction log throughput with the
    `sys.dm_io_virtual_file_stats` view.'
