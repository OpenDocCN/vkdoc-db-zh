    图 13-9

    已完成的事务


    最后，如果一个事务由于显式的 `ROLLBACK` 命令或验证违规而被回滚，内存 OLTP 会将被删除行的 `EndTs` 时间戳重置回 `Infinity`。事务插入行的新版本将被“幽灵化”。它们将由系统中运行的常规垃圾回收过程释放。


    ## 引用完整性强制实施


    在**纯** `SNAPSHOT` 隔离级别中强制实施引用完整性是不可能的，因为事务彼此完全隔离。考虑这样一种情况：一个事务删除了一行，而该行被另一个在原事务之后启动的事务中新插入的行所引用。对于在引用完整性检查期间执行
    `DELETE` 语句的 `SNAPSHOT` 事务来说，这个新插入的行将是不可见的。


    内存 OLTP 通过在 `SNAPSHOT` 隔离级别中为受引用完整性验证影响的表和查询维护读取集和/或扫描集来解决此问题。


    与 `REPEATABLE READ` 和 `SERIALIZABLE` 事务不同，这些读取集和扫描集仅为受影响的表维护，而不是为整个事务维护。然而，它们会包含在引用完整性检查期间读取的所有行以及应用的所有谓词。


    当引用表在外键列上没有索引时，这种行为可能会导致问题。类似于基于磁盘的表，当您在被引用（主）表中删除一行时，SQL Server 将必须扫描整个引用（详细）表。除了性能影响之外，该事务还将维护读取集，该集合包含它在扫描期间读取的所有行，无论这些行是否引用了被删除的行。如果任何其他事务更新或删除了来自读取集的任何行，原始事务将因*重复读取规则违规*错误而失败。


    让我们看一个示例，并使用清单 13-5 中的代码创建两个表。


    ```

    create table dbo.Branches

    (

    BranchId int not null

    constraint PK_Branches

    primary key nonclustered hash with (bucket_count = 4)

    )

    with (memory_optimized = on, durability = schema_only);

    create table dbo.Transactions

    (

    TransactionId int not null

    constraint PK_Transactions

    primary key nonclustered hash with (bucket_count = 4),

    BranchId int not null

    constraint FK_Transactions_Branches

    foreign key references dbo.Branches(BranchId),

    Amount money not null

    )

    with (memory_optimized = on, durability = schema_only);

    insert into dbo.Branches(BranchId) values(1),(10);

    insert into dbo.Transactions(TransactionId,BranchId,Amount)

    values(1,1,10),(2,1,20);

    Listing 13-5

    引用完整性验证：表创建

    ```


    `dbo.Transactions` 表有一个引用 `dbo.Branches` 表的外键约束。然而，没有行引用 `BranchId = 10` 的行。作为下一步，让我们运行清单
    13-6 中所示的代码，从 `dbo.Branches` 表中删除此行并使事务保持活动状态。


    ```

    begin tran

    delete from dbo.Branches with (snapshot) where BranchId = 10;

    Listing 13-6

    引用完整性验证：第一段会话代码

    ```


    `DELETE` 语句将验证外键约束并成功完成。然而，`dbo.Transactions` 表在 `BranchId` 列上没有索引，验证将需要扫描整个表，如图
    13-10 所示。


    ![../images/463519_1_En_13_Chapter/463519_1_En_13_Fig10_HTML.jpg](img/463519_1_En_13_Fig10_HTML.jpg)


    图 13-10

    引用完整性验证：DELETE 语句的执行计划


    此时，`dbo.Transactions` 表中的所有行都将包含在事务读取集中。如果另一个会话使用清单 13-7 中所示的代码更新了读取集中的一行，它将成功，而第一个会话将无法提交，并出现*重复读取规则违规*错误。


    ```

    update dbo.Transactions with (snapshot)

    set Amount = 30

    where TransactionId = 2;

    Listing 13-7

    引用完整性验证：第二段会话代码

    ```


    ### 重要提示


    类似于基于磁盘的表，您应始终在引用表的外键列上创建索引以避免此问题。

    '
- fmt: '## Additional Resources


    In-Memory OLTP is a fascinating technology that may significantly improve the
    performance and scalability of OLTP systems. This chapter focused on only one
    aspect of the technology—the In-Memory OLTP Concurrency Model—and did not even
    scratch the surface of other technology areas.


    I have published another book with Apress, `Expert SQL Server In-Memory OLTP`,
    which provides a deep overview of the technology. You might consider reading it
    if you are planning to utilize In-Memory OLTP in your systems. The first edition
    focuses on SQL Server 2014 implementation. The second edition covers SQL Server
    2016 and 2017’s technology enhancements.


    ## Summary


    In-Memory OLTP supports three transaction isolation levels, `SNAPSHOT`, `REPEATABLE
    READ`, and `SERIALIZABLE`. In contrast to disk-based tables, where non-repeatable
    and phantom reads are addressed by acquiring and holding locks, In-Memory OLTP
    validates data-consistency rules at the transaction commit stage. An exception
    will be raised and the transaction will be rolled back if rules were violated.


    Repeatable read validation and serializable validation add overhead to transaction
    processing. It is recommended to use the `SNAPSHOT` isolation level during a regular
    workload unless `REPEATABLE READ` or `SERIALIZABLE` data consistency is required.


    SQL Server performs repeatable read and serializable validations to enforce referential
    integrity in the system. Always create an index on the foreign key columns in
    the referencing tables to improve performance and avoid validation errors.


    You can use different transaction isolation levels for disk-based and memory-optimized
    tables in cross-container transactions; however, not all combinations are supported.
    The recommended practice is to use the `READ COMMITTED` isolation level for disk-based
    and the `SNAPSHOT` isolation level for memory-optimized tables.


    # 14. Locking in Columnstore Indexes


    Columnstore indexes are a type of index that stores data on a per-column rather
    than per-row basis. This storage format benefits query processing in data warehousing,
    reporting, and analytics environments where, although queries typically read a
    very large number of rows, they work with just a subset of the columns from a
    table.


    This chapter will provide an overview of column-based storage and discuss the
    locking behavior of columnstore indexes and their usage in OLTP systems.


    ### Column-Based Storage Overview


    Even though every database system is unique, there are two generic workloads—OLTP
    and Data Warehouse. OLTP, which stands for `Online Transactional Processing`,
    describes systems that support the operational activity of a business. Such systems
    usually handle a large number of simultaneous requests in short transactions and
    deal with volatile data.


    Data Warehouse systems, on the other hand, support the reporting and analytical
    activities of a business. The data in these systems is relatively static and is
    often updated based on some schedule. The queries are complex, and they usually
    perform aggregations and process large amounts of data.


    For example, consider a company that sells items to customers. A typical OLTP
    query from the company’s `point-of-sale` (POS) system might have the following
    semantic: *Provide a list of orders that were placed by this particular customer
    this month*. Alternatively, a typical query in a Data Warehouse system might read
    as follows: *Provide the total amount of sales year to date, grouping the results
    by item category and customer region*.


    The separation between OLTP and Data Warehouse systems is relatively thin though.
    Almost every OLTP system has some reporting queries. It is also not uncommon to
    see OLTP queries in Data Warehouse systems. Finally, there is another category
    of tasks called `Operational Analytics`, which run analytical queries against
    `hot` OLTP data. Think about a point-of-sale system in which you want to monitor
    up-to-date sales and dynamically adjust items’ sale price based on their popularity.


    Performance tuning a system with a mixed workload is not a trivial task. OLTP
    and Data Warehouse queries would take advantage of different database schema designs
    and indexing strategies, and they may also benefit from different storage technologies.


    In the classic row-based storage format, the data from all columns is stored together
    in a single `data row` object. This approach works great in cases with volatile
    data—the data from all columns is grouped together, and `INSERT`, `UPDATE`, and
    `DELETE` operations may be done as a single action. B-Tree indexes are good for
    OLTP workload, when queries typically deal with one or just a handful of rows
    from large tables.


    Row-based storage, however, is not optimal for Data Warehouse queries that scan
    a large amount of data. Such queries usually work with just a subset of the columns
    from a table, and it is impossible to avoid reading entire data row objects while
    skipping unnecessary columns.


    Data compression may help to reduce the size of the data and I/O overhead. However,
    with row-based storage, `PAGE` compression works on a data-page scope. The data
    from different columns is not similar enough for compression to be effective,
    and `PAGE` compression rarely compresses the data more than 2 or 2.5 times.


    SQL Server 2012 introduced a new type of index—the `columnstore index`—which keeps
    data in a `column-based storage` format. These indexes store data on a per-column
    rather than on a per-row basis. Data in each column is stored together, separate
    from other columns, as shown in Figure 14-1.


    ![../images/463519_1_En_14_Chapter/463519_1_En_14_Fig1_HTML.jpg](images/463519_1_En_14_Chapter/463519_1_En_14_Fig1_HTML.jpg)


    Figure 14-1: Row-based and column-based storage


    Data in columnstore indexes is heavily compressed using algorithms that provide
    significant space savings, even when compared to `PAGE` compression. Moreover,
    SQL Server can skip columns that are not requested by a query, and it does not
    load the data from those columns into memory, significantly reducing the I/O footprint
    of the query.


    Moreover, the new data storage format of columnstore indexes allows SQL Server
    to implement a new `batch mode` execution model. In this model, SQL Server processes
    data in groups of rows, or `batches`, rather than one row at a time. The size
    of the batches varies to fit into the CPU cache, which reduces the number of times
    that the CPU needs to request `external` data from memory, or other components.
    All these enhancements significantly reduce the CPU load and execution time of
    Data Warehouse queries.


    Columnstore indexes are a relatively new feature in SQL Server and have been evolving
    rapidly. Initial implementation in SQL Server 2012 supported just read-only `nonclustered
    columnstore indexes` that stored a copy of the data from a table in a column-based
    storage format. Those indexes essentially made tables read-only, and the only
    way to import data was via `partition switch`. We are not going to discuss those
    indexes; from a locking standpoint, their behavior was straightforward.


    As of SQL Server 2014, you can create tables with clustered columnstore indexes
    and store entire tables in a column-based storage format. These indexes are updatable;
    however, you cannot define any nonclustered indexes on those tables.


    This limitation has been removed in SQL Server 2016, where you can utilize different
    storage technologies for the indexes defined on a table. You can support a mixed
    workload by creating nonclustered B-Tree indexes on the tables with clustered
    columnstore indexes or, alternatively, you can create updateable nonclustered
    columnstore indexes on B-Tree tables. It is worth noting that you can create columnstore
    indexes in memory-optimized tables, thus improving the performance of Operational
    Analytics queries in In-Memory OLTP.'
