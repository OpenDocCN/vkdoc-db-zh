    The Enterprise Edition of SQL Server allows you to configure read-only access
    to the secondary nodes in AlwaysOn Availability Groups, thus scaling the read-only
    workload in the system. This, however, may lead to unexpected side effects on
    the primary node in the group.


    When you run queries against secondary nodes, SQL Server always uses the `SNAPSHOT`
    isolation level, ignoring the `SET TRANSACTION ISOLATION LEVEL` statement and
    locking hints. It allows it to eliminate possible readers/writers blocking, and
    it happens even if you did not enable the `ALLOW_SNAPSHOT_ISOLATION` database
    option.


    It also means that SQL Server will use row versioning on the primary node. You
    may not be able to use optimistic isolation levels *programmatically* when they
    are not enabled; nevertheless, SQL Server would use row versioning internally.
    The databases on the primary and secondary nodes are exactly the same, and it
    is impossible to use row versioning only on the secondary nodes.


    As you will remember from Chapter [6](#463519_1_En_6_Chapter.xhtml), this behavior
    will introduce additional `tempdb` load to support the version store. It may also
    increase index fragmentation due to the 14-byte pointers appended to the data
    rows during data modifications. However, it also leads to another phenomenon.
    Long-running `SNAPSHOT` transactions on *secondary* nodes may defer ghost and
    version-store cleanup on the *primary* node. SQL Server cannot remove deleted
    rows and reuse the space, because of the possibility that a `SNAPSHOT` transaction
    on the secondary node will need to access the old versions of the rows.


    Let’s look at an example and create two tables in the database, as shown in Listing
    [12-11](#463519_1_En_12_Chapter.xhtml#PC11). The table `dbo.T1` will have 65,536
    rows and will use 65,536 pages—one row per data page.


    ```

    create table dbo.T1

    (

    ID int not null,

    Placeholder char(8000) null,

    constraint PK_T1

    primary key clustered(ID)

    );

    create table dbo.T2

    (

    Col int

    );

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as T1 cross join N1 as T2) -- 4 rows

    ,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) -- 16 rows

    ,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256 rows

    ,N5(C) as (select 0 from N4 as T1 cross join N4 as T2 ) -- 65,536 rows

    ,IDs(ID) as (select row_number() over (order by (select null)) from N5)

    insert into dbo.T1(ID)

    select ID from IDs;

    Listing 12-11

    Readable secondaries: Tables creation

    ```


    As the next step, let’s start a transaction on the *secondary* node and run the
    query against the `dbo.T2` table, as shown in Listing [12-12](#463519_1_En_12_Chapter.xhtml#PC12).
    Even though we are using explicit transactions, the same behavior will occur with
    long-running statements in autocommitted transactions.


    ```

    begin tran

    select * from dbo.T2;

    Listing 12-12

    Readable secondaries: Starting transaction on secondary node

    ```


    Next, let’s delete all data from the `dbo.T1` table and then run a query that
    will do a *Clustered Index Scan* on the primary node. The code is shown in Listing
    [12-13](#463519_1_En_12_Chapter.xhtml#PC13).


    ```

    delete from dbo.T1;

    go

    -- Waiting 1 minute

    waitfor delay ''00:01:00.000'';

    set statistics io on

    select count(*) from dbo.T1;

    set statistics io off

    --Output: Table ''T1''. Scan count 1, logical reads 65781

    Listing 12-13

    Readable secondaries: Deleting data and performing CI Scan

    ```


    As you can see, despite the fact that the table is empty, the data pages have
    not been deallocated. This leads to significant I/O overhead on the primary node.


    Finally, let’s look at the index statistics using the code from Listing [12-14](#463519_1_En_12_Chapter.xhtml#PC14).


    ```

    select index_id, index_level, page_count, record_count, version_ghost_record_count

    from sys.dm_db_index_physical_stats(db_id(),object_id(N''dbo.T1''),1,NULL,''DETAILED'');

    Listing 12-14

    Readable secondaries: Analyzing index statistics

    ```


    Figure [12-12](#463519_1_En_12_Chapter.xhtml#Fig12) shows the output of the query.
    As you can see, the leaf index level shows 65,536 rows in the `version_ghost_record_count`
    column. This column contains the number of ghosted rows that cannot be removed
    due to the active transactions in the system that rely on row versioning. In our
    case, this transaction runs on a different (secondary) node.


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig12_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig12_HTML.jpg)


    Figure 12-12


    Index statistics


    There is nothing special about this behavior. The ghost and version store cleanup
    tasks would behave the same way if `SNAPSHOT` transactions were running on the
    primary node. It is very common, however, to see systems in which people offload
    non-optimized reporting queries to secondary nodes without understanding the potential
    impact it may have on the primary node.


    Remember this behavior when you plan to use readable secondaries, and apply the
    same considerations as when you enable optimistic isolation levels in the system.
    On the flip side, there is absolutely no reason to avoid using optimistic isolation
    levels when you have readable secondaries enabled. SQL Server already uses row
    versioning internally, even if you do not enable it in the database.'
  trans: '### 可读辅助副本与行版本控制


    SQL Server 企业版允许你配置 AlwaysOn 可用性组中辅助节点的只读访问，从而扩展系统中的只读工作负载。然而，这可能会对可用性组中的主节点产生意外副作用。


    当针对辅助节点运行查询时，SQL Server 总是使用 `SNAPSHOT` 隔离级别，忽略 `SET TRANSACTION ISOLATION LEVEL`
    语句和锁定提示。这使得它能够消除可能的读写阻塞，即使你没有启用 `ALLOW_SNAPSHOT_ISOLATION` 数据库选项，此行为也会发生。


    这也意味着 SQL Server 将在主节点上使用行版本控制。当乐观隔离级别未在数据库中启用时，你可能无法在程序中使用它们；但尽管如此，SQL Server
    仍会在内部使用行版本控制。主节点和辅助节点上的数据库是完全相同的，因此不可能只在辅助节点上使用行版本控制。


    正如你在第 6 章所了解到的，此行为将引入额外的 `tempdb` 负载以支持版本存储。由于数据修改时附加到数据行的 14 字节指针，它还可能增加索引碎片。然而，这还会导致另一种现象：辅助节点上长时间运行的
    `SNAPSHOT` 事务可能会延迟主节点上的幽灵记录和版本存储清理。SQL Server 无法删除已删除的行并重用空间，因为辅助节点上的 `SNAPSHOT`
    事务可能需要访问这些行的旧版本。


    让我们看一个例子，并在数据库中创建两个表，如代码清单 12-11 所示。表 `dbo.T1` 将有 65,536 行，并占用 65,536 个页面——每个数据页面一行。


    ```sql

    create table dbo.T1

    (

    ID int not null,

    Placeholder char(8000) null,

    constraint PK_T1

    primary key clustered(ID)

    );

    create table dbo.T2

    (

    Col int

    );

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as T1 cross join N1 as T2) -- 4 rows

    ,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) -- 16 rows

    ,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256 rows

    ,N5(C) as (select 0 from N4 as T1 cross join N4 as T2 ) -- 65,536 rows

    ,IDs(ID) as (select row_number() over (order by (select null)) from N5)

    insert into dbo.T1(ID)

    select ID from IDs;

    ```

    代码清单 12-11: 可读辅助副本：创建表


    下一步，让我们在辅助节点上启动一个事务，并针对 `dbo.T2` 表运行查询，如代码清单 12-12 所示。即使我们使用显式事务，在自动提交事务中长时间运行的语句也会发生相同的行为。


    ```sql

    begin tran

    select * from dbo.T2;

    ```

    代码清单 12-12: 可读辅助副本：在辅助节点上启动事务


    接下来，让我们从 `dbo.T1` 表中删除所有数据，然后在主节点上运行一个将进行聚集索引扫描的查询。代码如代码清单 12-13 所示。


    ```sql

    delete from dbo.T1;

    go

    -- 等待 1 分钟

    waitfor delay ''00:01:00.000'';

    set statistics io on

    select count(*) from dbo.T1;

    set statistics io off

    --输出：Table ''T1''. Scan count 1, logical reads 65781

    ```

    代码清单 12-13: 可读辅助副本：删除数据并执行聚集索引扫描


    如你所见，尽管表是空的，但数据页并未被释放。这导致主节点上显著的 I/O 开销。


    最后，让我们使用代码清单 12-14 中的代码查看索引统计信息。


    ```sql

    select index_id, index_level, page_count, record_count, version_ghost_record_count

    from sys.dm_db_index_physical_stats(db_id(),object_id(N''dbo.T1''),1,NULL,''DETAILED'');

    ```

    代码清单 12-14: 可读辅助副本：分析索引统计信息


    图 12-12 显示了查询的输出。如你所见，索引叶子级在 `version_ghost_record_count` 列中显示了 65,536 行。此列包含由于系统中依赖行版本控制的活动事务而无法删除的幽灵记录数量。在我们的例子中，此事务运行在另一个（辅助）节点上。


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig12_HTML.jpg](img/463519_1_En_12_Fig12_HTML.jpg)


    图 12-12: 索引统计信息


    这种行为本身并不特殊。如果 `SNAPSHOT` 事务在主节点上运行，幽灵记录和版本存储清理任务的行为方式也会相同。然而，常见的情况是，人们在没有理解其可能对主节点产生影响的情况下，将未优化的报表查询卸载到辅助节点上。


    在计划使用可读辅助副本时请记住此行为，并应用与在系统中启用乐观隔离级别时相同的考虑因素。另一方面，在启用可读辅助副本时，完全没有理由避免使用乐观隔离级别。即使你未在数据库中启用它，SQL
    Server 也已经在内部使用行版本控制。'
- fmt: '## Working with the Blocking Monitoring Framework


    Wait statistics analysis provides a holistic picture of system health and may
    help to identify bottlenecks in all areas of the system, including locking and
    blocking. You may be able to evaluate how badly a system suffers from concurrency
    issues; however, in the end, you will need to detect and address individual blocking
    and deadlock cases to solve the problems.


    As we have already discussed in Chapters [4](#463519_1_En_4_Chapter.xhtml) and
    [5](#463519_1_En_5_Chapter.xhtml) of this book, troubleshooting is relatively
    straightforward. You need to understand the root cause of the issue by reverse
    engineering the blocking or deadlock condition. You need to identify the resources,
    lock types, and processes involved and analyze why the processes acquired, held,
    and competed for locks on the same resources. In the majority of cases, it requires
    you to analyze the queries and their execution plans.


    Both blocked process reports and deadlock graphs contain required information.
    They, however, have dependencies on the SQL Server state at the time of the event.
    In many cases, you need to query the `plan cache` and other `data management views`
    to obtain the text and plan of the queries. The longer you wait, the less likely
    it will be that the information will be available.


    There are plenty of monitoring tools present on the market, and many of them will
    capture and provide you the data. As another option, you can install the Blocking
    Monitoring Framework, which I have already mentioned in this book. This framework
    uses `Event Notifications`, and it parses the blocked process report and deadlock
    graph, persisting the data in a set of tables. The parsing happens at the time
    the event occurred, while the information is still available through `data management
    views`.


    At the time of writing this book, the framework consists of three main tables:


    *   The `dbo.BlockedProcessesInfo` table stores information about blocking occurrences
    based on blocked process reports. It includes duration of the blocking, resources
    and lock types involved, and blocking and blocked sessions details, along with
    queries and their execution plans.


    *   The `dbo.Deadlocks` table stores information about deadlock events in the
    system.


    *   The `dbo.DeadlockProcesses` table provides information about the processes
    involved in the deadlock, including text and execution plans of the statements
    that triggered it.


    You can use the captured data to troubleshoot individual blocking occurrences.
    Moreover, you can aggregate it to identify the queries most commonly involved
    in blocking or deadlock cases.


    Listing [12-15](#463519_1_En_12_Chapter.xhtml#PC15) shows code that returns ten
    queries that have been blocked the most in the last three days. It groups the
    data by `plan_hash`, which combines queries with similar execution plans. Consider
    ad-hoc queries that have different parameter values but end up with similar execution
    plans, as in the example.


    The code returns the first query and execution plan that matches the `plan_hash`
    value, along with blocking statistics. Alternatively, in SQL Server 2016 and above,
    you can join the data with Query Store data management views to correlate information
    from multiple sources.


    ### Note


    You can use the `dbo.DeadlockProcesses` table instead of the `dbo.BlockedProcessesInfo`
    table to obtain information about queries most frequently involved in deadlocks.


    ```sql

    ;with Data

    as

    (

    select top 10

    i.BlockedPlanHash

    ,count(*) as [Blocking Counts]

    ,sum(WaitTime) as [Total Wait Time (ms)]

    from

    dbo.BlockedProcessesInfo i

    group by

    i.BlockedPlanHash

    order by

    sum(WaitTime) desc

    )

    select

    d.*, q.BlockedSql

    from

    Data d

    cross apply

    (

    select top 1 BlockedSql

    from dbo.BlockedProcessesInfo i2

    where i2.BlockedPlanHash = d.BlockedPlanHash

    order by EventDate desc

    ) q;

    ```

    Listing 12-15

    Getting top 10 queries that were blocked the most


    Listing [12-16](#463519_1_En_12_Chapter.xhtml#PC16) shows code that returns a
    list of tables most frequently involved in blocking resulting from waiting for
    object-level intent (I*) locks. This blocking may occur due to lock escalation
    , and you may benefit from disabling it on affected tables.


    Do not forget that schema modification (Sch-M) locks will also block all other
    object-level lock requests—factor it into your analysis.


    ```sql

    ;with Objects(DBID,ObjID,WaitTime)

    as

    (

    select

    ltrim(rtrim(substring(b.Resource,8,o.DBSeparator - 8)))

    ,substring(b.Resource, o.DBSeparator + 1, o.ObjectLen)

    ,b.WaitTime

    from

    dbo.BlockedProcessesInfo b

    cross apply

    (

    select

    charindex('':'',Resource,8) as DBSeparator

    ,charindex('':'',Resource, charindex('':'',Resource,8) + 1) -

    charindex('':'',Resource,8) - 1 as ObjectLen

    ) o

    where

    left(b.Resource,6) = ''OBJECT'' and

    left(b.BlockedLockMode,1) = ''I''

    )

    select

    db_name(DBID) as [database]

    ,object_name(ObjID, DBID) as [table]

    ,count(*) as [# of events]

    ,sum(WaitTime) / 1000 as [Wait Time(Sec)]

    from Objects

    group by

    db_name(DBID), object_name(ObjID, DBID);

    ```

    Listing 12-16

    Identifying the tables that may suffer from lock escalation–related blocking


    The Blocking Monitoring Framework is an extremely useful tool for the analysis
    and troubleshooting of concurrency issues. I would recommend installing it on
    your servers.


    ### Note


    The current (August 2018) version of the framework is included in the companion
    materials for this book. You can download the latest version from my blog: [`http://aboutsqlserver.com/bmframework/`](http://aboutsqlserver.com/bmframework/)
    .


    ## Summary


    Databases do not live in a vacuum. They are part of a large ecosystem that includes
    various hardware and software components. Slowness and unresponsiveness of client
    applications are not necessarily database- or SQL Server–related issues. The root
    cause of the problem can be found anywhere in the system, from hardware misconfiguration
    to incorrect application code.


    It is important to check the entire system infrastructure as an initial step in
    the troubleshooting process. This includes the performance characteristics of
    the hardware, network topology and throughput, operating system and SQL Server
    configuration, and the processes and databases running on the server.


    SQL Server consists of several major components, including the protocol layer,
    query processor, storage engine, utilities, and SQL Server Operating System (`SQLOS`).
    `SQLOS` is the layer between the OS and all other SQL Server components, and it
    is responsible for scheduling, resource management, and several other low-level
    tasks.


    `SQLOS` creates a number of schedulers equal to the number of logical processors
    in the system. Every scheduler is responsible for managing a set of workers that
    perform a job. Every task is assigned to one or more workers for the duration
    of the execution.


    Tasks stay in one of three major states during execution: `RUNNING` (currently
    executing on scheduler), `RUNNABLE` (waiting for scheduler to execute), and `SUSPENDED`
    (waiting for the resource). SQL Server tracks the cumulative waiting time for
    the different types of waits and exposes this information to the users. Wait statistics
    analysis is a common performance troubleshooting technique that analyzes top system
    wait types and eliminates the root causes of waits.


    Every lock type has a corresponding wait type, which helps you to identify what
    type of blocking happens the most in the system. Nevertheless, you need to analyze
    individual blocking and deadlock cases, understand the root causes of the events,
    and address them during troubleshooting.'
