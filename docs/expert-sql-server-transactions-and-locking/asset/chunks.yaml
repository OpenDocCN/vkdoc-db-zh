    than at the time of the `BEGIN TRAN` statement. Therefore, the session 1 transaction
    starts at the time when the first `SELECT` operator executes.


    Table 13-1


    Concurrency in the `REPEATABLE READ` Transaction Isolation Level


    | Session 1 | Session 2 | Results |

    | --- | --- | --- |

    | `begin tran`     `select ID, Col`     `from dbo.HKData`         `with (repeatableread)`
    |   |   |

    |   | `update dbo.HKData``set Col = -2``where ID = 2` |   |

    |      `select ID, Col`     `from dbo.HKData`         `with (repeatableread)`
