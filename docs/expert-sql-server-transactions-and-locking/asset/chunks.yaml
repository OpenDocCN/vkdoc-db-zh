    dynamic management view, which provides information about currently active lock
    requests in the system. It returns you a list of lock requests and their type,
    status of request (`GRANT` or `WAIT`), information about the resources on which
    the locks were requested, and several other useful attributes.


    Table [4-1](#463519_1_En_4_Chapter.xhtml#Tab1) shows you the code that leads to
    the blocking condition.


    Table 4-1


    Code That Leads to the Blocking Condition


    | Session 1 (SPID=52) | Session 2 (SPID=53) | Comments |

    | --- | --- | --- |

    | `begin tran`        `delete from Delivery.Orders`        `where OrderId = 95`
    |   | Session 1 acquires exclusive (X) lock on the row with OrderId=95 |

    |   | `select OrderId, Amount``from Delivery.Orders``with (readcommitted)``where
    OrderNum = ''1000''` | Session 2 is blocked trying to acquire shared (S) lock
    on the row with OrderId=95 |

    | `rollback` |   |   |


    Figure [4-1](#463519_1_En_4_Chapter.xhtml#Fig1) shows the partial output from
    the `sys.dm_tran_locks`, `sys.dm_os_waiting_tasks`, and `sys.dm_exec_requests`
    views at the time the blocking occurred. As you can see, Session 53 is waiting
    for a shared (S) lock on the row with the exclusive (X) lock held by Session 52\.
    The `LCK_M_S` wait type in the outputs indicates the shared (S) lock wait. We
    will discuss wait types in more detail in Chapter [12](#463519_1_En_12_Chapter.xhtml).


    ![../images/463519_1_En_4_Chapter/463519_1_En_4_Fig1_HTML.jpg](images/463519_1_En_4_Chapter/463519_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Output from the system views at time of blocking


    ### Note


    It is possible that you will get page-level blocking when you run the code in
    your system. Session 53 needs to scan all rows from the page, and SQL Server may
    decide to obtain a page-level shared (S) lock instead of row-level locks. Nevertheless,
    the session will be blocked due to (S) / (IX) lock incompatibility at the page
    level.


    The information provided by the `sys.dm_tran_locks` view is a bit too cryptic
    to troubleshoot, and you often need to join it with other dynamic management views,
    such as `sys.dm_exec_requests` and `sys.dm_os_waiting_tasks`, to gain a clearer
    picture. Listing [4-1](#463519_1_En_4_Chapter.xhtml#PC1) provides the required
    code.


    ```

    select

    tl.resource_type as [Resource Type]

    ,db_name(tl.resource_database_id) as [DB Name]

    ,case tl.resource_type

    when ''OBJECT'' then

    object_name

    (

    tl.resource_associated_entity_id

    ,tl.resource_database_id

    )

    when ''DATABASE'' then ''DB''

    else

    case when tl.resource_database_id = db_id()

    then

    (  select object_name(object_id, tl.resource_database_id)

    from sys.partitions

    where hobt_id = tl.resource_associated_entity_id )

    else ''(Run under DB context)''

    end

    end as [Object]

    ,tl.resource_description as [Resource]

    ,tl.request_session_id as [Session]

    ,tl.request_mode as [Mode]

    ,tl.request_status as [Status]

    ,wt.wait_duration_ms as [Wait (ms)]

    ,qi.sql

    ,qi.query_plan

    from

    sys.dm_tran_locks tl with (nolock) left outer join

    sys.dm_os_waiting_tasks wt with (nolock) on

    tl.lock_owner_address = wt.resource_address and

    tl.request_status = ''WAIT''

    outer apply

    (

    select

    substring(s.text, (er.statement_start_offset / 2) + 1,

    ((  case er.statement_end_offset

    when -1

    then datalength(s.text)

    else er.statement_end_offset

    end - er.statement_start_offset) / 2) + 1) as sql

    , qp.query_plan

    from

    sys.dm_exec_requests er with (nolock)

    cross apply sys.dm_exec_sql_text(er.sql_handle) s

    cross apply sys.dm_exec_query_plan(er.plan_handle) qp

    where

    tl.request_session_id = er.session_id

    ) qi

    where

    tl.request_session_id  @@spid

    order by

    tl.request_session_id

    option (recompile)

    Listing 4-1

    Getting more information about blocked and blocking sessions

    ```


    Figure [4-2](#463519_1_En_4_Chapter.xhtml#Fig2) shows the results of the query.
    As you can see, it is much easier to understand, and it provides you with more
    useful information, including currently running batches and their execution plans.
    Keep in mind that the execution plans obtained from the `sys.dm_exec_requests`
    and `sys.dm_exec_query_stats` DMVs do not include the actual execution statistics
    metrics, such as the actual number of rows returned by operators and the number
    of their executions. Also, for the sessions in which lock requests were granted,
    the SQL statement and query plan represent the *currently executing batch* (`NULL`
    if session is sleeping), rather than the batch that acquired the original lock.


    ![../images/463519_1_En_4_Chapter/463519_1_En_4_Fig2_HTML.jpg](images/463519_1_En_4_Chapter/463519_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Joining sys.dm_os_tran_locks with other DMVs


    You need to run the query in the context of the database involved in the blocking
    to correctly resolve the object names. Also of importance, the `OBJECT_NAME()`
    function used in the code obtains a schema stability (Sch-S) lock on the object,
    and the statement would be blocked if you tried to resolve the name of the object
    with an active schema modification (Sch-M) lock held. SQL Server obtains those
    locks during schema alteration; we will discuss them in depth in Chapter [8](#463519_1_En_8_Chapter.xhtml).'
