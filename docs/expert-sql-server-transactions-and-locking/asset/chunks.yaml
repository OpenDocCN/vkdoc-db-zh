    所示。


    ![../images/463519_1_En_4_Chapter/463519_1_En_4_Fig8_HTML.jpg](img/463519_1_En_4_Fig8_HTML.jpg)


    图 4-8


    捕获的阻塞信息


    使用事件通知设置阻塞监控在并发问题故障排除期间极其有用。我通常将其作为常规监控框架的一部分，在所有服务器上启用。


    ## 注意


    源代码包含在本书的配套资料中。最新版本也可以从我的博客 [`http://aboutsqlserver.com/bmframework`](http://aboutsqlserver.com/bmframework)
    下载。


    ## 总结


    当多个会话使用不兼容的锁类型竞争相同资源时，就会发生阻塞。故障排除过程需要您检测涉及阻塞的查询，找到问题的根本原因并解决它。


    `sys.dm_tran_locks` 数据管理视图为您提供有关系统中所有活动锁请求的信息。它可以帮助您实时检测阻塞条件。您可以将此视图与其他 DMV（如
    `sys.dm_exec_requests`、`sys.dm_exec_query_stats`、`sys.dm_exec_sessions` 和 `sys.dm_os_waiting_tasks`）联接，以获取有关涉及阻塞条件的会话和查询的更多信息。


    SQL Server 可以生成阻塞进程报告，为您提供有关阻塞的信息，您可以收集并保留以供进一步分析。您可以使用 SQL 跟踪、扩展事件和事件通知来捕获它。


    在大量情况下，阻塞是由非优化查询引入的过度扫描引起的。您应该分析阻塞和被阻塞查询的执行计划，以检测和优化低效之处。


    另一个导致阻塞的常见问题是代码中不正确的事务管理，包括失控的事务以及在打开事务期间与用户交互等。


    # 5. 死锁


    死锁是一种特殊的阻塞情况，当多个会话（有时是单个会话内的多个执行线程）相互阻塞时发生。当它发生时，SQL Server 会终止其中一个会话，允许其他会话继续。


    本章将演示为什么系统中会发生死锁，并解释如何对它们进行故障排除和解决。


    ## 经典死锁


    经典死锁发生在两个或更多会话竞争同一组资源时。让我们看一个典型的例子，假设您有两个会话以相反的顺序更新表中的两行。


    作为第一步，会话 1 更新行 *R1*，会话 2 更新行 *R2*。您知道此时两个会话都在行上获取并保持排他 (X) 锁。您可以在图 5-1 中看到这种情况。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig1_HTML.png](img/463519_1_En_5_Fig1_HTML.png)


    图 5-1


    经典死锁：步骤 1


    接下来，我们假设会话 1 想要更新行 *R2*。它将尝试获取 *R2* 上的排他 (X) 锁，但由于会话 2 已经持有的排他 (X) 锁而被阻塞。如果会话
    2 想要更新 R1，同样的事情会发生——它将被会话 1 持有的排他 (X) 锁阻塞。正如您所看到的，此时两个会话都在等待对方，无法继续执行。这代表了*经典*或*循环*死锁，如图
    5-2 所示。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig2_HTML.jpg](img/463519_1_En_5_Fig2_HTML.jpg)


    图 5-2


    经典死锁：步骤 2


    系统任务 *Deadlock Monitor* 每五秒唤醒一次，检查系统中是否有任何死锁。检测到死锁时，SQL Server 会回滚其中一个事务并显示错误
    1205。这会释放该事务中持有的所有锁，并允许其他会话继续。


    ## 注意


    如果系统中存在死锁，死锁监视器唤醒间隔会缩短。在某些情况下，它可能每秒唤醒多达十次。


    选择哪个会话作为死锁受害者的决定取决于几个因素。默认情况下，SQL Server 会回滚使用较少日志空间进行事务的会话。您可以通过使用 `SET DEADLOCK_PRIORITY`
    选项为会话设置死锁优先级来在一定程度上控制它。'
- fmt: '## Deadlock Due to Non-Optimized Queries


    While the classic deadlock often happens when the data is highly volatile and
    the same rows are updated by multiple sessions, there is another common reason
    for deadlocks. They happen as a result of the scans introduced by non-optimized
    queries. Let’s look at an example and assume that you have a process that updates
    an order row in the `Delivery.Orders` table and, as a next step, queries how many
    orders the customer has. Let’s see what happens when two such sessions are running
    in parallel using the `READ COMMITTED` transaction isolation level.


    As the first step, two sessions run two `UPDATE` statements. Both statements run
    fine without blocking involved—as you remember, the table has the clustered index
    on the `OrderId` column, so you will have *Clustered Index Seek* operators in
    the execution plan. Figure 5-3 illustrates this step.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig3_HTML.png](images/463519_1_En_5_Chapter/463519_1_En_5_Fig3_HTML.png)


    **Figure 5-3** Deadlock due to the scans: Step 1


    At this point, both sessions hold exclusive (X) locks on the updated rows. As
    the second step, sessions run the `SELECT` statements based on the `CustomerId`
    filter. There are no nonclustered indexes on the table, and the execution plan
    will have the *Clustered Index Scan* operation. In the `READ COMMITTED` isolation
    level, SQL Server acquires shared (S) locks when reading the data, and as a result
    both sessions are blocked as soon as they try to read the row with exclusive (X)
    locks held on it. Figure 5-4 illustrates that.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig4_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig4_HTML.jpg)


    **Figure 5-4** Deadlock due to the scans: Step 2


    If you ran the query shown in Listing 5-1 at the time when both sessions were
    blocked and before the Deadlock Monitor task woke up, you would see that both
    sessions block each other.


    ```sql

    select

    tl.request_session_id as [SPID]

    ,tl.resource_type as [Resouce Type]

    ,tl.resource_description as [Resource]

    ,tl.request_mode as [Mode]

    ,tl.request_status as [Status]

    ,wt.blocking_session_id as [Blocked By]

    from

    sys.dm_tran_locks tl with (nolock) left outer join

    sys.dm_os_waiting_tasks wt with (nolock) on

    tl.lock_owner_address = wt.resource_address and

    tl.request_status = ''WAIT''

    where

    tl.request_session_id <> @@SPID and tl.resource_type = ''KEY''

    order by

    tl.request_session_id

    ```


    **Listing 5-1** Lock requests at the time when both sessions were blocked


    Figure 5-5 shows the output of the query. As you can see, both sessions block
    each other. It does not matter that the sessions were not going to include those
    rows in the count calculation. SQL Server is unable to evaluate the `CustomerId`
    predicate until the shared (S) locks are acquired and rows are read.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig5_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig5_HTML.jpg)


    **Figure 5-5** Lock requests at the time of the deadlock


    You will have deadlocks like these in any transaction isolation level where readers
    acquire shared (S) locks. It would not deadlock in the `READ UNCOMMITTED`, `READ
    COMMITTED SNAPSHOT`, or `SNAPSHOT` isolation levels, where shared (S) locks are
    not used.


    Nevertheless, you can still have deadlocks in the `READ UNCOMMITTED` and `READ
    COMMITTED SNAPSHOT` isolation levels as a result of the writers’ collision. You
    can trigger it by replacing the `SELECT` statement with the `UPDATE` that introduces
    the scan operation in the previous example. The `SNAPSHOT` isolation level, on
    the other hand, does not have writer/writer blocking unless you are updating the
    same rows, and it would not deadlock, even with `UPDATE` statements.


    Query optimization helps to fix deadlocks caused by scans and non-optimized queries.
    In the preceding case, you can solve the problem by adding a nonclustered index
    on the `CustomerId` column. This would change the execution plan of the `SELECT`
    statement replacing *Clustered Index Scan* with *Nonclustered Index Seek*. As
    a result, the session would not need to read the rows that were modified by another
    session and have incompatible locks held.


    ## Key Lookup Deadlock


    In some cases, you can have a deadlock when multiple sessions are trying to read
    and update the same row simultaneously.


    Let’s assume that you have a nonclustered index on the table, and one session
    wants to read the row using this index. If the index is not covering and the session
    needs some data from the clustered index, SQL Server may generate the execution
    plan with the `Nonclustered Index Seek` and `Key Lookup` operations. The session
    would acquire a shared (S) lock on the nonclustered index row first, and then
    on the clustered index row.


    Meanwhile, if you have another session that updates one of the columns that is
    part of the nonclustered index using the clustered key value as the query predicate,
    that session would acquire exclusive (X) locks in the opposite order; that is,
    on the clustered index row first and on the nonclustered index row after that.


    Figure 5-6 shows what happens after the first step, when both sessions successfully
    acquire locks on the rows in the clustered and nonclustered indexes.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig6_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig6_HTML.jpg)


    **Figure 5-6** Key Lookup deadlock: Step 1


    In the next step, both sessions try to acquire locks on the rows in the other
    indexes, and they are blocked, as shown in Figure 5-7.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig7_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig7_HTML.jpg)


    **Figure 5-7** Key Lookup deadlock: Step 2


    If it happens in the same moment, you would have a deadlock, and the session that
    reads the data would be chosen as the deadlock victim. This is an example of the
    classic cycle deadlock we saw earlier. Despite the fact that both sessions are
    working with a single table row, SQL Server internally deals with two rows—one
    each in the clustered and nonclustered indexes.


    You can address this type of deadlock by making nonclustered indexes covering
    and avoiding the `Key Lookup` operation. Unfortunately, that solution would increase
    the size of the leaf rows in the nonclustered index and introduce additional overhead
    during data modification and index maintenance. Alternatively, you can use optimistic
    isolation levels and switch to `READ COMMITTED SNAPSHOT` mode, where readers do
    not acquire shared (S) locks.'
