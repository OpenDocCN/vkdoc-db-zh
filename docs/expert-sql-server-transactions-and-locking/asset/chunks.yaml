    清单 4-5

    通过 SQL 句柄获取查询文本和执行计划


    图 4-7 展示了查询输出。


    ![../images/463519_1_En_4_Chapter/463519_1_En_4_Fig7_HTML.jpg](img/463519_1_En_4_Fig7_HTML.jpg)


    图 4-7

    从 `sys.dm_exec_query_stats` 获取信息


    使用 `sys.dm_exec_query_stats` 视图时，有几个潜在问题需要注意。首先，该视图依赖于执行计划缓存。如果计划不在缓存中，您将无法获取执行计划；例如，如果查询使用了带有
    `option (recompile)` 子句的语句级重编译。

    其次，有可能会返回多个缓存计划。在某些情况下，即使发生重编译，SQL Server 也会保留执行统计信息，这可能导致结果集中出现多行数据。此外，当会话使用不同的
    `SET` 选项时，您也可能会有多个缓存计划。有两个列——`creation_time` 和 `last_execution_time`——可以帮助确定正确的计划。

    在故障排除过程中对计划缓存的这种依赖，是阻塞进程报告的最大缺点。在查询被重编译和/或计划不再被重用后，SQL Server 最终会从计划缓存中移除旧计划。因此，等待进行故障排除的时间越长，计划仍然存在于缓存中的可能性就越小。

    Microsoft Azure SQL 数据库和 SQL Server 2016 及以上版本允许您在 *查询存储* 中收集并持久化有关正在运行的查询及其执行计划和统计信息。查询存储不依赖于计划缓存，在系统故障排除期间非常有用。


    #### 注意

    您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store)
    阅读关于查询存储的文档。


    ## 使用事件通知进行阻塞监控

    尽管阻塞进程报告允许您收集并持久化阻塞信息以供进一步分析，但您通常需要访问计划缓存以获取涉及阻塞的查询的文本和执行计划。不幸的是，计划缓存会随时间变化，等待时间越长，您所需数据存在于其中的可能性就越小。

    您可以通过构建基于 SQL Server 事件通知的监控解决方案来解决此问题。事件通知是一项基于 Service Broker 的技术，允许您捕获有关特定
    SQL Server 和 DDL 事件的信息，并将有关它们的消息发布到 Service Broker 队列中。此外，您可以在队列上定义激活过程，并近乎实时地对事件做出反应——在我们的例子中，即解析阻塞进程报告。


    #### 注意

    您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/service-broker/event-notifications`](https://docs.microsoft.com/en-us/sql/relational-databases/service-broker/event-notifications)
    阅读关于事件通知的文档。


    让我们看看实现。在我的环境中，我更喜欢将阻塞信息持久化到一个单独的数据库中。清单 4-6 创建了数据库及相应的 Service Broker 和事件通知对象。请记住：您需要设置阻塞进程阈值才能触发事件。

    ```

    use master

    go

    create database DBA;

    exec sp_executesql

    N''alter database DBA set enable_broker;

    alter database DBA set recovery simple;'';

    go

    use DBA

    go

    create queue dbo.BlockedProcessNotificationQueue

    with status = on;

    go

    create service BlockedProcessNotificationService

    on queue dbo.BlockedProcessNotificationQueue

    ([http://schemas.microsoft.com/SQL/Notifications/PostEventNotification]);

    go

    create event notification BlockedProcessNotificationEvent

    on server

    for BLOCKED_PROCESS_REPORT

    to service

    ''BlockedProcessNotificationService'',

    ''current database'';

    ```

    清单 4-6

    设置事件通知对象


    下一步，如清单 4-7 所示，我们需要创建一个激活存储过程来解析阻塞进程报告，以及一个表来持久化阻塞信息。

    您可以通过在存储过程中设置 `@collectPlan` 变量来启用或禁用执行计划的收集。虽然执行计划在故障排除期间非常有用，但 `sys.dm_exec_query_plan`
    调用是 CPU 密集型的，并且可能在系统中引入显著的 CPU 开销，同时伴随大量的阻塞。您需要考虑这一点，并在服务器 CPU 负载过高时禁用计划收集。'
- fmt: '## 创建表和激活存储过程


    ```sql

    create table dbo.BlockedProcessesInfo

    (

    ID int not null identity(1,1),

    EventDate datetime not null,

    -- ID of the database where locking occurs

    DatabaseID smallint not null,

    -- Blocking resource

    [Resource] varchar(64) null,

    -- Wait time in MS

    WaitTime int not null,

    -- Raw blocked process report

    BlockedProcessReport xml not null,

    -- SPID of the blocked process

    BlockedSPID smallint not null,

    -- XACTID of the blocked process

    BlockedXactId bigint null,

    -- Blocked Lock Request Mode

    BlockedLockMode varchar(16) null,

    -- Transaction isolation level for blocked session

    BlockedIsolationLevel varchar(32) null,

    -- Top SQL Handle from execution stack

    BlockedSQLHandle varbinary(64) null,

    -- Blocked SQL Statement Start offset

    BlockedStmtStart int null,

    -- Blocked SQL Statement End offset

    BlockedStmtEnd int null,

    -- Blocked Query Hash

    BlockedQueryHash binary(8) null,

    -- Blocked Query Plan Hash

    BlockedPlanHash binary(8) null,

    -- Blocked SQL based on SQL Handle

    BlockedSql nvarchar(max) null,

    -- Blocked InputBuf from the report

    BlockedInputBuf nvarchar(max) null,

    -- Blocked Plan based on SQL Handle

    BlockedQueryPlan xml null,

    -- SPID of the blocking process

    BlockingSPID smallint null,

    -- Blocking Process status

    BlockingStatus varchar(16) null,

    -- Blocking Process Transaction Count

    BlockingTranCount int null,

    -- Blocking InputBuf from the report

    BlockingInputBuf nvarchar(max) null,

    -- Blocked SQL based on SQL Handle

    BlockingSql nvarchar(max) null,

    -- Blocking Plan based on SQL Handle

    BlockingQueryPlan xml null

    );

    create unique clustered index IDX_BlockedProcessInfo_EventDate_ID

    on dbo.BlockedProcessesInfo(EventDate, ID);

    go

    create function dbo.fnGetSqlText

    (

    @SqlHandle varbinary(64)

    , @StmtStart int

    ,@StmtEnd int

    )

    returns table

    /**********************************************************************

    Function: dbo.fnGetSqlText

    Author: Dmitri V. Korotkevitch

    Purpose:

    Returns sql text based on sql_handle and statement start/end offsets

    Includes several safeguards to avoid exceptions

    Returns: 1-column table with SQL text

    *********************************************************************/

    as

    return

    (

    select

    substring(

    t.text

    ,@StmtStart / 2 + 1

    ,((

    case

    when @StmtEnd = -1

    then datalength(t.text)

    else @StmtEnd

    end - @StmtStart) / 2) + 1

    ) as [SQL]

    from sys.dm_exec_sql_text(nullif(@SqlHandle,0x)) t

    where

    isnulL(@SqlHandle,0x)  0x and

    -- In some rare cases, SQL Server may return empty or

    -- incorrect sql text

    isnull(t.text,'''')  '''' and

    (

    case when @StmtEnd = -1

    then datalength(t.text)

    else @StmtEnd

    end > @StmtStart

    )

    )

    go

    create function dbo.fnGetQueryInfoFromExecRequests

    (

    @collectPlan bit

    ,@SPID smallint

    ,@SqlHandle varbinary(64)

    ,@StmtStart int

    ,@StmtEnd int

    )

    /**********************************************************************

    Function: dbo. fnGetQueryInfoFromExecRequests

    Author: Dmitri V. Korotkevitch

    Purpose:

    Returns Returns query and plan hashes, and optional query plan

    from sys.dm_exec_requests based on @@spid, sql_handle and

    statement start/end offsets

    *********************************************************************/

    returns table

    as

    return

    (

    select

    1 as DataExists

    ,er.query_plan_hash as plan_hash

    ,er.query_hash

    ,case

    when @collectPlan = 1

    then

    (

    select qp.query_plan

    from sys.dm_exec_query_plan(er.plan_handle) qp

    )

    else null

    end as query_plan

    from

    sys.dm_exec_requests er

    where

    er.session_id = @SPID and

