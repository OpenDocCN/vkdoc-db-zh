    ## 总结


    当多个会话使用不兼容的锁类型竞争相同资源时，就会发生阻塞。故障排除过程需要您检测涉及阻塞的查询，找到问题的根本原因并解决它。


    `sys.dm_tran_locks` 数据管理视图为您提供有关系统中所有活动锁请求的信息。它可以帮助您实时检测阻塞条件。您可以将此视图与其他 DMV（如
    `sys.dm_exec_requests`、`sys.dm_exec_query_stats`、`sys.dm_exec_sessions` 和 `sys.dm_os_waiting_tasks`）联接，以获取有关涉及阻塞条件的会话和查询的更多信息。


    SQL Server 可以生成阻塞进程报告，为您提供有关阻塞的信息，您可以收集并保留以供进一步分析。您可以使用 SQL 跟踪、扩展事件和事件通知来捕获它。


    在大量情况下，阻塞是由非优化查询引入的过度扫描引起的。您应该分析阻塞和被阻塞查询的执行计划，以检测和优化低效之处。


    另一个导致阻塞的常见问题是代码中不正确的事务管理，包括失控的事务以及在打开事务期间与用户交互等。


    # 5. 死锁


    死锁是一种特殊的阻塞情况，当多个会话（有时是单个会话内的多个执行线程）相互阻塞时发生。当它发生时，SQL Server 会终止其中一个会话，允许其他会话继续。


    本章将演示为什么系统中会发生死锁，并解释如何对它们进行故障排除和解决。


    ## 经典死锁


    经典死锁发生在两个或更多会话竞争同一组资源时。让我们看一个典型的例子，假设您有两个会话以相反的顺序更新表中的两行。


    作为第一步，会话 1 更新行 *R1*，会话 2 更新行 *R2*。您知道此时两个会话都在行上获取并保持排他 (X) 锁。您可以在图 [5-1](#463519_1_En_5_Chapter.xhtml#Fig1)
    中看到这种情况。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig1_HTML.png](images/463519_1_En_5_Chapter/463519_1_En_5_Fig1_HTML.png)


    图 5-1


    经典死锁：步骤 1


    接下来，我们假设会话 1 想要更新行 *R2*。它将尝试获取 *R2* 上的排他 (X) 锁，但由于会话 2 已经持有的排他 (X) 锁而被阻塞。如果会话
    2 想要更新 R1，同样的事情会发生——它将被会话 1 持有的排他 (X) 锁阻塞。正如您所看到的，此时两个会话都在等待对方，无法继续执行。这代表了*经典*或*循环*死锁，如图
    [5-2](#463519_1_En_5_Chapter.xhtml#Fig2) 所示。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig2_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig2_HTML.jpg)


    图 5-2


    经典死锁：步骤 2


    系统任务 *Deadlock Monitor* 每五秒唤醒一次，检查系统中是否有任何死锁。检测到死锁时，SQL Server 会回滚其中一个事务并显示错误
    1205。这会释放该事务中持有的所有锁，并允许其他会话继续。


    ### 注意


    如果系统中存在死锁，死锁监视器唤醒间隔会缩短。在某些情况下，它可能每秒唤醒多达十次。


    选择哪个会话作为死锁受害者的决定取决于几个因素。默认情况下，SQL Server 会回滚使用较少日志空间进行事务的会话。您可以通过使用 `SET DEADLOCK_PRIORITY`
    选项为会话设置死锁优先级来在一定程度上控制它。'
  raw: 'As the next step, we need to grant enough permissions to the stored procedure
