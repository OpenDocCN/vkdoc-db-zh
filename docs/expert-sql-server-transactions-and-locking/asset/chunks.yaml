  trans: '

    ### 注意事项


    你可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/database-console-commands/dbcc-traceon-trace-flags-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/database-console-commands/dbcc-traceon-trace-flags-transact-sql)
    阅读更多关于跟踪标志 `T1211` 和 `T1224` 的信息。


    与其他阻塞问题一样，你应该找到锁升级的根本原因。你还应该考虑在系统中的特定表上禁用锁升级的利弊。虽然这可能会减少系统中的阻塞，但 SQL Server 将使用更多内存来存储锁信息。当然，你也可以将代码重构视为另一种选择。


    如果锁升级是由写入者触发的，你可以减少批处理的大小，直到每个对象获取的行级和页级锁少于 5,000 个。你仍然可以在同一个事务中处理多个批处理——5,000
    个锁的阈值是每个语句的。同时，你应该记住，较小的批处理通常比较大的批处理效率低。你需要微调批处理大小并找到最优值。如果对象级锁没有被保持过长时间和/或其他会话没有受到影响，触发锁升级是正常的。


    至于由读取者触发的锁升级，你应该避免持有许多共享 (S) 锁的情况。一个例子是由于未优化的查询或报表查询在 `REPEATABLE READ` 或 `SERIALIZABLE`
    事务隔离级别下进行扫描，这些查询会持有共享 (S) 锁直到事务结束。清单 7-5 中显示的示例使用 `SERIALIZABLE` 隔离级别从 `Delivery.Orders`
    表运行 `SELECT`。


    ```

    set transaction isolation level serializable

    begin tran

    select OrderId, OrderDate, Amount

    from Delivery.Orders with (rowlock)

    where OrderNum = ''1'';

    select

    resource_type as [Resource Type]

    ,case resource_type

    when ''OBJECT'' then

    object_name

    (

    resource_associated_entity_id

    ,resource_database_id

    )

    when ''DATABASE'' then ''DB''

    else

    (

    select object_name(object_id, resource_database_id)

    from sys.partitions

    where hobt_id = resource_associated_entity_id

    )

    end as [Object]

    ,request_mode as [Mode]

    ,request_status as [Status]

    from sys.dm_tran_locks

    where request_session_id = @@SPID;

    commit

    Listing 7-5

    由未优化查询触发的锁升级

    ```


    图 7-8 显示了来自 `sys.dm_tran_locks` 视图的第二个查询的输出。


    ![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig8_HTML.jpg](img/463519_1_En_7_Fig8_HTML.jpg)


    图 7-8


    在 SERIALIZABLE 隔离级别中选择数据


    即使查询只返回一行，你也会看到共享 (S) 锁已升级到表级别。和往常一样，我们需要查看执行计划（如图 7-9 所示）来对其进行故障排除。


    ![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig9_HTML.jpg](img/463519_1_En_7_Fig9_HTML.jpg)


    图 7-9


    查询的执行计划


    `OrderNum` 列上没有索引，SQL Server 使用了 `Clustered Index Scan` 运算符。尽管查询只返回一行，但由于 `SERIALIZABLE`
    隔离级别，它获取并保持了它读取的所有行的共享 (S) 范围锁。结果，触发了锁升级。如果你在 `OrderNum` 列上添加索引，它会将执行计划更改为 `Nonclustered
    Index Seek`。只读取一行，获取并保持的行级和页级锁非常少，因此不需要锁升级。


    在某些情况下，你可以考虑对表进行分区，并使用 `ALTER TABLE SET (LOCK_ESCALATION=AUTO)` 语句将锁升级选项设置为使用分区级升级，而不是表级。在必须使用
    `DELETE` 语句清除旧数据或在 `REPEATABLE READ` 或 `SERIALIZABLE` 隔离级别下对旧数据运行报表查询的情况下，这可能会有所帮助。在这些情况下，语句会将锁升级到分区，而不是表，而不访问这些分区的查询将不会被阻塞。


    在其他情况下，你可以切换到乐观隔离级别。最后，在 `READ UNCOMMITTED` 事务隔离级别下，你不会有任何与读取者相关的阻塞问题，因为不会获取共享
    (S) 锁，但由于它带来的所有其他数据一致性问题，不推荐使用此方法。


    ## 总结


    在语句获取并保持大约 5,000 个行级和页级锁后，SQL Server 会将锁升级到对象或分区级别。当升级成功时，SQL Server 保留单个对象级锁，阻止具有不兼容锁类型的其他会话访问表。如果升级失败，SQL
    Server 会在大约每获取 1,250 个新锁后重复升级尝试。


    锁升级完全符合“视情况而定”的类别。它减少了 SQL Server 锁管理器的内存使用和维护大量锁的开销。同时，由于持有的对象或分区级锁，它可能会增加系统中的阻塞。


    你应该保持锁升级启用，除非你发现它在系统中引入了明显的阻塞问题。即使在这些情况下，你也应该进行根本原因分析，以了解为何会发生由锁升级引起的阻塞，并评估禁用它的利弊。你还应该查看其他可用选项，例如代码和数据库模式重构、查询调优以及切换到乐观事务隔离级别。这些选项中的任何一个都可能是比禁用锁升级更好的选择，以解决你的阻塞问题。


    # 8. 模式锁和低优先级锁


    SQL Server 使用两种额外的锁类型，称为模式锁，以防止在查询执行期间更改表和元数据。本章将深入讨论模式锁以及低优先级锁，后者在 SQL Server
    2014 中引入，旨在减少在线索引重建和分区切换操作期间的阻塞。


    ## 模式锁


    SQL Server 需要保护数据库元数据，以防止在查询执行过程中更改表结构的情况。这个问题比看起来更复杂。虽然理论上独占 (X) 表锁可以在 `ALTER
    TABLE` 操作期间阻止对表的访问，但它们在 `READ UNCOMMITTED`、`READ COMMITTED SNAPSHOT` 和 `SNAPSHOT`
    隔离级别中不起作用，因为在这些级别下读取者不获取意向共享 (IS) 表锁。


    SQL Server 使用两种额外的锁类型来解决这个问题：模式稳定性 (Sch-S) 锁和模式修改 (Sch-M) 锁。模式修改 (Sch-M) 锁在发生任何元数据更改时以及执行
    `TRUNCATE TABLE` 语句期间获取。你可以将这种锁类型视为“超级锁”。它与任何其他锁类型都不兼容，并且完全阻止对对象的访问。


    像独占 (X) 锁一样，模式修改 (Sch-M) 锁会一直保持到事务结束。在显式事务中运行 DDL 语句时，你需要记住这一点。虽然这允许你在发生错误时回滚所有模式更改，但它也会阻止对受影响对象的任何访问，直到事务提交。

