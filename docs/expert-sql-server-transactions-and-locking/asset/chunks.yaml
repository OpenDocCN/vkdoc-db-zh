  trans: '

    同样地，会话 3 希望更新所有 `Amount = 29.95` 的行。当它从版本存储中读取该行的版本时，它判定该行需要被更新。同样地，会话 1 也修改了同一行的金额，但这并不重要。此时，该行的“新版本”尚未提交，对其他会话不可见。现在，会话
    3 想要更新数据库中的该行，试图获取一个排他锁（X），但被阻塞，因为会话 1 已经在该行上持有了一个排他锁（X）。


    现在，如果会话 1 提交了事务，会话 3 将会回滚，并出现 `Error 3960`，如图 6-6 所示，这指示了一个写/写冲突。这与任何其他隔离级别下的行为都不同，在其他隔离级别下，一旦会话
    1 的排他锁（X）被释放，会话 3 就能成功覆盖会话 1 所做的更改。


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig6_HTML.jpg](img/463519_1_En_6_Fig6_HTML.jpg)

    图 6-6

    `Error 3960`


    当一个 `SNAPSHOT` 事务试图更新在该事务启动后已被修改的数据时，就会发生写/写冲突。在我们的示例中，即使会话 1 在会话 3 的 `UPDATE`
    语句之前提交，只要这次提交发生在会话 3 的事务启动之后，冲突仍然会发生。


    ### 提示

    如果业务逻辑允许，你可以使用 `TRY..CATCH` 语句实现重试逻辑来处理 `3960` 错误。


    在数据易变的系统中使用 `SNAPSHOT` 隔离级别更新数据时，你需要牢记这种行为。如果在事务启动后，其他会话更新了你正在修改的行，你最终会遇到 `Error
    3960`，即使你在更新前并未访问这些行。一种可能的解决方法是在 `UPDATE` 语句中使用（`READCOMMITTED`）或其他非乐观隔离级别的表提示，如清单
    6-1 所示。


    ```

    set transaction isolation level snapshot

    begin tran

    select count(*) from Delivery.Drivers;

    update Delivery.Orders with (readcommitted)

    set Cancelled = 1

    where OrderId = 10;

    commit

    ```

    清单 6-1

    使用 `READCOMMITTED` 提示来防止 `3960` 错误


    `SNAPSHOT` 隔离级别可以改变系统的行为。假设有一个表 `dbo.Colors`，包含两行数据：`Black` 和 `White`。创建该表的代码如清单
    6-2 所示。


    ```

    create table dbo.Colors

    (

    Id int not null,

    Color char(5) not null

    );

    insert into dbo.Colors(Id, Color) values(1,''Black''),(2,''White'')

    ```

    清单 6-2

    `SNAPSHOT` 隔离级别更新行为：表创建


    现在，让我们同时运行两个会话。在第一个会话中，我们运行更新语句，将颜色当前为 `black` 的行设置为 `white`，使用的语句是 `UPDATE dbo.Colors
    SET Color="White" WHERE Color="Black"`。在第二个会话中，我们执行相反的操作，使用语句 `UPDATE dbo.Colors
    SET Color="Black" WHERE Color="White"`。


    让我们在 `READ COMMITTED` 或任何其他悲观的事务隔离级别下同时运行这两个会话。如图 6-7 所示，在第一步中，我们遇到了竞争条件。一个会话在它更新的行上放置了排他锁（X），而另一个会话在尝试获取同一行的更新锁（U）时被阻塞。


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig7_HTML.png](img/463519_1_En_6_Fig7_HTML.png)

    图 6-7

    悲观锁行为：步骤 1


    当第一个会话提交事务时，排他锁（X）被释放。此时，该行的 `Color` 值已被第一个会话更新，因此第二个会话更新了两行而不是一行，如图 6-8 所示。最终，表中的两行都将变为黑色或白色，具体取决于哪个会话先获取到锁。


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig8_HTML.jpg](img/463519_1_En_6_Fig8_HTML.jpg)

    图 6-8

    悲观锁行为：步骤 2


    然而，在 `SNAPSHOT` 隔离级别下，这个过程的工作方式有所不同，如图 6-9 所示。当一个会话更新行时，它会将该行的旧版本移动到版本存储中。另一个会话将从那里读取该行，而不是被阻塞，反之亦然。结果是，颜色将被互换。


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig9_HTML.jpg](img/463519_1_En_6_Fig9_HTML.jpg)

    图 6-9

    `SNAPSHOT` 隔离级别锁行为


    你需要了解 `RCSI` 和 `SNAPSHOT` 隔离级别的行为，特别是当你的代码依赖于阻塞时。一个例子是基于触发器的参照完整性实现。你可以在被引用表上有一个
    `ON DELETE` 触发器，其中运行一个 `SELECT` 语句；这个触发器将检查是否有其他表中的行引用了被删除的行。在乐观隔离级别下，该触发器可能会跳过在事务启动后插入的行。这里的解决方案同样是在被引用表和引用表上的触发器中，将（`READCOMMITTED`）或其他悲观隔离级别的表提示作为
    `SELECT` 语句的一部分。


    ### 注意

    SQL Server 在验证外键约束时使用 `READ COMMITTED` 隔离级别。这意味着即使使用乐观隔离级别，写入者和读取者之间仍然可能发生阻塞，特别是在引用列上没有索引导致对引用表进行表扫描的情况下。

    '
- fmt: '# Version Store Behavior and Monitoring


    As already mentioned, you need to monitor how optimistic isolation levels affect
    `tempdb` in your system. For example, let’s run the code from Listing 6-3, which
    deletes all rows from the `Delivery.Orders` table using the `READ UNCOMMITTED`
    transaction isolation level.


    ```

    set transaction isolation level read uncommitted

    begin tran

    delete from Delivery.Orders;

    commit

    Listing 6-3

    Deleting data from Delivery.Orders table

    ```


    Even if there are no other transactions using optimistic isolation levels at the
    time when `DELETE` statement started, there is still a possibility that one might
    start before the transaction commits. As a result, SQL Server needs to maintain
    the version store, regardless of whether there are any active transactions that
    use optimistic isolation levels.


    Figure 6-10 shows `tempdb` free space and version store size. As you can see,
    as soon as the deletion starts, the version store grows and takes up all of the
    free space in `tempdb`.


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig10_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig10_HTML.jpg)


    Figure 6-10

    tempdb free space and version store size


    In Figure 6-11, you can see the version store generation and cleanup rate. The
    generation rate remains more or less the same during execution, while the cleanup
    task cleans the version store after the transaction is committed. By default,
    the cleanup task runs once per minute as well as before any auto-growth event,
    in case `tempdb` is full.


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig11_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig11_HTML.jpg)


    Figure 6-11

    Version generation and cleanup rates


    As you can see, the version store adds overhead to the system. Do not enable optimistic
    isolation levels in the database unless you are planning to use them. This is
    especially true for `SNAPSHOT` isolation, which requires you to explicitly set
    it in the code. While many systems could benefit from `READ COMMITTED SNAPSHOT`
    without any code changes, this would not happen with the `SNAPSHOT` isolation
    level.


    There are three other performance counters related to optimistic isolation levels
    that may be helpful during version store monitoring:


    1.  `Snapshot Transactions` . This shows the total number of active snapshot transactions.
    You can analyze this counter to determine if applications use the `SNAPSHOT` isolation
    level when it is enabled in the system.

    2.  `Update Conflict Ratio` . This shows the ratio of the number of update conflicts
    to the total number of update snapshot transactions.

    3.  `Longest Transaction Running Time` . This shows the duration in seconds of
    the oldest active transaction that is using row versioning. A high value for this
    counter may explain the large version store size in the system.


    There are also a few dynamic management views (DMVs) that can be useful in troubleshooting
    various issues related to the version store and transactions in general.


    The `sys.dm_db_file_space_usage` view returns space usage information for every
    file in the database. One of the columns in the view, `version_store_reserved_page_count`,
    returns the number of pages used by the version store. Listing 6-4 illustrates
    this view in action.


    ```

    select

    sum(user_object_reserved_page_count) * 8

    as [User Objects (KB)]

    ,sum(internal_object_reserved_page_count) * 8

    as [Internal Objects (KB)]

    ,sum(version_store_reserved_page_count) * 8

    as [Version Store (KB)]

    ,sum(unallocated_extent_page_count) * 8

    as [Free Space (KB)]

    from

    tempdb.sys.dm_db_file_space_usage;

    Listing 6-4

    Using sys.dm_db_file_space_usage view

    ```


    You can track version store usage on a per-database basis using the `sys.dm_tran_version_store`
    view, as shown in Listing 6-5. This view returns information about every row from
    the version store, and it can be extremely inefficient when the version store
    is large. It also does not include information about reserved but not used space.


    ```

    select

    db_name(database_id) as [database]

    ,database_id

    ,sum(record_length_first_part_in_bytes + record_length_second_part_in_bytes) /
    1024

    as [version store (KB)]

    from

    sys.dm_tran_version_store

    group by

    database_id

    Listing 6-5

    Using sys.dm_tran_version_store view

    ```


    In SQL Server 2017, you can obtain the same information with the `sys.dm_tran_version_store_space_usage`
    view. This view is more efficient than `sys.dm_tran_version_store`, and it also
    returns information about reserved space, as shown in Listing 6-6.


    ```

    select

    db_name(database_id) as [database]

    ,database_id

    ,reserved_page_count

    ,reserved_space_kb

    from

    sys.dm_tran_version_store_space_usage

    Listing 6-6

    Using sys.dm_tran_version_store_space_usage view

    ```


    When the version store becomes very large, you need to identify active transactions
    that prevent its cleanup. Remember: When optimistic isolation levels are enabled,
    row versioning is used regardless of the isolation level of the transaction that
    performed the data modification.


    Listing 6-7 shows how to identify the five oldest user transactions in the system.
    Long-running transactions are the most common reason why the version store is
    not cleaning up. They may also introduce other issues in the system; for example,
    preventing the truncation of the transaction log.


    ### Important


    Some SQL Server features, such as Online Index Rebuild, `AFTER UPDATE` and `AFTER
    DELETE` triggers, and MARS, use the version store regardless if optimistic isolation
    levels are enabled. Moreover, the row versioning is also used in the systems that
    have AlwaysOn Availability Groups with readable secondaries enabled. We will discuss
    it in greater details in chapter 12.


    ```

    select top 5

    at.transaction_id

    ,at.elapsed_time_seconds

    ,at.session_id

    ,s.login_time

    ,s.login_name

    ,s.host_name

    ,s.program_name

    ,s.last_request_start_time

    ,s.last_request_end_time

    ,er.status

    ,er.wait_type

    ,er.blocking_session_id

    ,er.wait_type

    ,substring(

    st.text,

    (er.statement_start_offset / 2) + 1,

    (case

    er.statement_end_offset

    when -1

    then datalength(st.text)

    else er.statement_end_offset

    end - er.statement_start_offset) / 2 + 1

    ) as [SQL]

    from

    sys.dm_tran_active_snapshot_database_transactions at

    join sys.dm_exec_sessions s on

    at.session_id = s.session_id

    left join sys.dm_exec_requests er on

    at.session_id = er.session_id

    outer apply

    sys.dm_exec_sql_text(er.sql_handle) st

    order by

    at.elapsed_time_seconds desc

    Listing 6-7

    Identifying oldest active transactions in the system

    ```


    ### Note


    There are several other useful transaction-related dynamic management views. You
    can read about them at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/transaction-related-dynamic-management-views-and-functions-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/transaction-related-dynamic-management-views-and-functions-transact-sql).


    Finally, it is worth noting that SQL Server exposes the information if `READ COMMITTED
    SNAPSHOT` and `SNAPSHOT` isolation levels are enabled in `sys.databases` view.
    The `is_read_committed_snapshot` column indicates if RCSI is enabled. The `snapshot_isolation_state`
    and `snapshot_isolation_state_desc` columns indicate whether `SNAPSHOT` transactions
    are allowed and/or if the database is in a transition state after you run the
    `ALTER DATABASE SET ALLOW_SNAPSHOT_ISOLATION` statement, respectively.'
