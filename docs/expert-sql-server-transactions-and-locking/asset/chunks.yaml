    illustrates the locks that were acquired and released along with the total number
    of locks processed.


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig3_HTML.jpg](images/463519_1_En_3_Chapter/463519_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Locks during query execution


    There are no indexes on the `OrderNum` column, so SQL Server needs to perform
    a *clustered index scan*, acquiring an update (U) lock on every row in the table.
    More than one million locks have been acquired even though the statement updated
    just a single row.


    That behavior illustrates one of the typical blocking scenarios. Consider a situation
    where one of the sessions holds an exclusive (X) lock on a single row. If another
    session were to update a different row by running a non-optimized `UPDATE` statement,
    SQL Server would acquire an update (U) lock on every row it was scanning, and
    eventually it would be blocked trying to read the row with the exclusive (X) lock
    held on it. It does not matter that the second session does not need to update
    that row after all—SQL Server still needs to acquire an update (U) lock to evaluate
    if that row needs to be updated.


    ### Shared (S) locks


    Shared (S) locks are acquired by the readers—`SELECT` queries—in the system. As
    you can guess by the name, shared (S) locks are compatible with each other, and
    multiple sessions can hold shared (S) locks on the same resource.


    Let’s run the code from Table [3-1](#463519_1_En_3_Chapter.xhtml#Tab1) to illustrate
    that.


    Table 3-1


    Shared (S) Locks


    | Session 1 (SPID=53) | Session 2 (SPID=55) |

    | --- | --- |

    | `set transaction isolation level``repeatable read``begin tran`       `select
    OrderNum`       `from Delivery.Orders`       `where OrderId = 500;` | `set transaction
    isolation level``repeatable read``begin tran``select OrderNum``from Delivery.Orders``where
    OrderId = 500;` |

    |        `select`              `request_session_id`              `,resource_type`              `,resource_description`              `,request_type`              `,request_mode`              `,request_status`       `from
    sys.dm_tran_locks;` |   |

    | `commit;` | `commit` |


    Figure [3-4](#463519_1_En_3_Chapter.xhtml#Fig4) illustrates the output from the
    `sys.dm_tran_locks` view. As you can see, both sessions acquired shared (S) locks
    on the database, intent shared (IS) locks on the table and page (1:955), and shared
    (S) locks on the row, all without blocking each other.


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig4_HTML.jpg](images/463519_1_En_3_Chapter/463519_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Locks acquired by the sessions


    ## Lock Compatibility, Behavior, and Lifetime


    Table [3-2](#463519_1_En_3_Chapter.xhtml#Tab2) shows the lock compatibility matrix
    that shows compatibility between lock types.


    Table 3-2


    Lock Compatibility Matrix (I*, S, U, X Locks)


    |   | (IS) | (S) | (IU) | (U) | (IX) | (X) |

    | --- | --- | --- | --- | --- | --- | --- |

    | (IS) | Yes | Yes | Yes | Yes | Yes | No |

    | (S) | Yes | **Yes** | Yes | **Yes** | No | **No** |

    | (IU) | Yes | Yes | Yes | No | Yes | No |

    | (U) | Yes | **Yes** | No | **No** | No | **No** |

    | (IX) | Yes | No | Yes | No | Yes | No |

    | (X) | No | **No** | No | **No** | No | **No** |


    The most important lock compatibility rules are:


    1.  Intent (IS/IU/IX) locks are compatible with each other. Intent locks indicate
    the existence of locks on the child objects, and multiple sessions can hold intent
    locks on the object and page levels simultaneously.


    2.  Exclusive (X) locks are incompatible with each other and any other lock types.
    Multiple sessions cannot update the same row simultaneously. Moreover, readers
    that acquire shared (S) locks cannot read uncommitted rows with exclusive (X)
    locks held.


    3.  Update (U) locks are incompatible with each other as well as with exclusive
    (X) locks. Writers cannot evaluate if the row needs to be updated simultaneously
    nor access a row that has an exclusive (X) lock held.


    4.  Update (U) locks are compatible with shared (S) locks. Writers can evaluate
    if the row needs to be updated without blocking or being blocked by the readers.
    It is worth noting that (S)/(U) lock compatibility is the main reason why SQL
    Server uses update (U) locks internally. They reduce the blocking between readers
    and writers.


    As you already know, exclusive (X) lock behavior does not depend on transaction
    isolation level. Writers always acquire exclusive (X) locks and hold them until
    the end of the transaction. With the exception of the `SNAPSHOT` isolation level,
    the same is true for update (U) locks—writers acquire them on every row they scan
    while evaluating if the rows need to be updated.


    The shared (S) locks’ behavior, on the other hand, depends on transaction isolation
    level.'
  trans: '

    ## 更新(U)锁


    SQL Server 在数据修改过程中使用另一种锁类型——更新(U)锁，在搜索需要更新的行时获取它们。获取更新(U)锁后，SQL Server 会读取行并通过对照查询谓词检查行数据来评估是否需要更新该行。如果是这种情况，SQL
    Server 会将更新(U)锁转换为排他(X)锁并执行数据修改。否则，更新(U)锁将被释放。


    让我们看一个例子，并运行代码清单 3-2 中的代码。


    ```

    begin tran

    update Delivery.Orders

    set Reference = ''New Reference''

    where OrderId in (1000, 5000);

    commit

    代码清单 3-2

    使用聚集索引键作为谓词更新多行

    ```


    图 3-2 展示了捕获 `lock_acquired` 和 `lock_released` 事件的扩展事件会话的输出。SQL Server 在页上获取了意向更新(IU)锁，在行上获取了更新(U)锁，随后将它们转换为意向排他(IX)锁和排他(X)锁。这些锁一直保持到事务结束，并在
    `COMMIT` 时释放。


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig2_HTML.jpg](img/463519_1_En_3_Fig2_HTML.jpg)

    *图 3-2：更新(U)锁和排他(X)锁*


    更新(U)锁的行为取决于执行计划。在某些情况下，SQL Server 首先在所有行上获取更新(U)锁，随后将它们转换为排他(X)锁。在其他情况下——例如，当你基于聚集索引键值仅更新一行时——SQL
    Server 可以直接获取排他(X)锁，而完全不使用更新(U)锁。


    要获取的锁数量也很大程度上取决于执行计划。让我们运行 `UPDATE Delivery.Orders SET Reference = ''Ref'' WHERE
    OrderNum="1000"` 语句，基于 `OrderNum` 列过滤数据。图 3-3 展示了获取和释放的锁以及处理的锁总数。


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig3_HTML.jpg](img/463519_1_En_3_Fig3_HTML.jpg)

    *图 3-3：查询执行期间的锁*


    `OrderNum` 列上没有索引，因此 SQL Server 需要执行*聚集索引扫描*，在表中的每一行上获取更新(U)锁。尽管该语句只更新了一行，却获取了超过一百万个锁。


    这种行为说明了一个典型的阻塞场景。假设其中一个会话在单个行上持有一个排他(X)锁。如果另一个会话通过运行未优化的 `UPDATE` 语句来更新不同的行，SQL
    Server 将在其扫描的每一行上获取一个更新(U)锁，并最终在尝试读取持有排他(X)锁的行时被阻塞。即使第二个会话最终并不需要更新该行——SQL Server
    仍然需要获取一个更新(U)锁来评估该行是否需要更新。


    ## 共享(S)锁


    共享(S)锁由系统中的读取者——`SELECT` 查询——获取。顾名思义，共享(S)锁彼此兼容，多个会话可以在同一资源上持有共享(S)锁。


    让我们运行表 3-1 中的代码来说明这一点。


    *表 3-1：共享(S)锁*


    | 会话 1 (SPID=53) | 会话 2 (SPID=55) |

    | --- | --- |

    | `set transaction isolation level repeatable read`<br>`begin tran`<br>`select
    OrderNum`<br>`from Delivery.Orders`<br>`where OrderId = 500;` | `set transaction
    isolation level repeatable read`<br>`begin tran`<br>`select OrderNum`<br>`from
    Delivery.Orders`<br>`where OrderId = 500;` |

    | `select`<br>`request_session_id`<br>`,resource_type`<br>`,resource_description`<br>`,request_type`<br>`,request_mode`<br>`,request_status`<br>`from
    sys.dm_tran_locks;` |  |

    | `commit;` | `commit` |


    图 3-4 展示了 `sys.dm_tran_locks` 视图的输出。如你所见，两个会话都在数据库上获取了共享(S)锁，在表和页(1:955)上获取了意向共享(IS)锁，并在行上获取了共享(S)锁，所有这些都没有相互阻塞。


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig4_HTML.jpg](img/463519_1_En_3_Fig4_HTML.jpg)

    *图 3-4：会话获取的锁*


    ## 锁兼容性、行为和生命周期


    表 3-2 显示了锁兼容性矩阵，展示了锁类型之间的兼容性。


    *表 3-2：锁兼容性矩阵 (IS, S, U, X 锁)*


    | | (IS) | (S) | (IU) | (U) | (IX) | (X) |

    | --- | --- | --- | --- | --- | --- | --- |

    | (IS) | 是 | 是 | 是 | 是 | 是 | 否 |

    | (S) | 是 | 是 | 是 | 是 | 否 | 否 |

    | (IU) | 是 | 是 | 是 | 否 | 是 | 否 |

    | (U) | 是 | 是 | 否 | 否 | 否 | 否 |

    | (IX) | 是 | 否 | 是 | 否 | 是 | 否 |

    | (X) | 否 | 否 | 否 | 否 | 否 | 否 |


    最重要的锁兼容性规则是：


    1.  意向(IS/IU/IX)锁彼此兼容。意向锁表示在子对象上存在锁，多个会话可以同时在对象和页级别持有意向锁。

    2.  排他(X)锁彼此不兼容，也与任何其他锁类型不兼容。多个会话不能同时更新同一行。此外，获取共享(S)锁的读取者无法读取持有排他(X)锁的未提交行。

    3.  更新(U)锁彼此不兼容，也与排他(X)锁不兼容。写入者不能同时评估行是否需要更新，也不能访问持有排他(X)锁的行。

    4.  更新(U)锁与共享(S)锁兼容。写入者可以评估行是否需要更新，而不会被读取者阻塞或阻塞读取者。值得注意的是，(S)/(U) 锁兼容性是 SQL Server
    在内部使用更新(U)锁的主要原因。它们减少了读取者和写入者之间的阻塞。


    正如你已经知道的，排他(X)锁的行为不依赖于事务隔离级别。写入者总是获取排他(X)锁并将其保持到事务结束。除了 `SNAPSHOT` 隔离级别外，更新(U)锁也是如此——写入者在扫描每一行时都会获取更新(U)锁，同时评估这些行是否需要更新。


    另一方面，共享(S)锁的行为取决于事务隔离级别。

    '
- fmt: '### SQL Server 中的事务隔离级别与锁


    SQL Server 始终在事务上下文中处理数据。在这种情况下，当应用程序未使用 `BEGIN TRAN` / `COMMIT` 语句启动显式事务时，SQL
    Server 会为语句的持续时间使用自动提交事务。即使是 `SELECT` 语句也在其自己的轻量级事务中运行。SQL Server 不会将它们写入事务日志，尽管所有锁定和并发规则仍然适用。


    ### READ UNCOMMITTED 隔离级别


    使用 `READ UNCOMMITTED` 隔离级别时，不会获取共享（S）锁。因此，读取器可以读取其他会话已修改并持有排他（X）锁的行。此隔离级别通过消除读取器和写入器之间的冲突来减少系统中的阻塞，代价是数据一致性。无论接下来发生什么（例如更改被回滚或一行被多次修改），读取器都会读取行的当前（已修改）版本。这解释了为什么此隔离级别通常被称为
    `dirty read`。


    表 3-3 中的代码说明了这一点。第一个会话运行 `DELETE` 语句，在行上获取排他（X）锁。第二个会话在 `READ UNCOMMITTED` 模式下运行
    `SELECT` 语句。


    **表 3-3：READ UNCOMMITTED 隔离级别一致性**


    | 会话 1 | 会话 2 |

    | --- | --- |

    | `begin tran`       `delete from Delivery.Orders`       `where OrderId = 95;`
    |   |

    |   | `-- Success / No Blocking``set transaction isolation level read uncommitted;``select
    OrderId, Amount``from Delivery.Orders``where OrderId between 94 and 96;` |

    | `rollback;` |   |


    在 `READ UNCOMMITTED` 隔离级别中，读取器不获取共享（S）锁。会话 2 不会被阻塞，并将返回如图 3-5 所示的结果集。它不包含 `OrderId=95`
    的行，该行在第一个会话的未提交事务中已被删除，即使该事务随后被回滚。


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig5_HTML.jpg](images/463519_1_En_3_Chapter/463519_1_En_3_Fig5_HTML.jpg)


    **图 3-5：READ UNCOMMITTED 和共享（S）锁行为**


    值得再次注意的是，排他（X）锁和更新（U）锁的行为不受事务隔离级别影响。即使在 `READ UNCOMMITTED` 模式下，你仍然会遇到写入器/写入器阻塞。


    ### READ COMMITTED 隔离级别


    在 `READ COMMITTED` 隔离级别中，SQL Server 在读取行后立即获取并释放共享（S）锁。这保证了事务无法读取其他会话的未提交数据。让我们运行清单
    3-3 中的代码。


    ```sql

    set transaction isolation level read committed;

    select OrderId, Amount

    from Delivery.Orders

    where OrderId in (90,91);

    -- Listing 3-3：在 READ COMMITTED 隔离级别中读取数据

    ```


    图 3-6 说明了 SQL Server 如何获取和释放锁。如你所见，行级锁被获取并立即释放。


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig6_HTML.jpg](images/463519_1_En_3_Chapter/463519_1_En_3_Fig6_HTML.jpg)


    **图 3-6：READ COMMITTED 模式下的共享（S）锁行为**


    值得注意的是，在某些情况下，在 `READ COMMITTED` 模式下，SQL Server 可能会在 `SELECT` 语句的持续时间内持有共享（S）锁，仅在完成后才释放锁。一个这样的例子是从表中读取
    LOB 列数据的查询。


    ### 提示


    不要在代码中选择不必要的列或使用 `SELECT *` 模式。这可能会引入性能开销并增加系统中的锁定。


    ### REPEATABLE READ 隔离级别


    在 `REPEATABLE READ` 隔离级别中，SQL Server 获取共享（S）锁并一直持有到事务结束。这保证了其他会话在数据被读取后无法修改它。你可以通过运行清单
    3-3 的代码（将隔离级别更改为 `REPEATABLE READ`）来查看此行为。


    图 3-7 说明了 SQL Server 如何获取和释放锁。如你所见，SQL Server 首先获取两个共享（S）锁，并在事务结束时释放它们。


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig7_HTML.jpg](images/463519_1_En_3_Chapter/463519_1_En_3_Fig7_HTML.jpg)


    **图 3-7：REPEATABLE READ 模式下的共享（S）锁行为**


    ### SERIALIZABLE 隔离级别


    在 `SERIALIZABLE` 隔离级别中，共享（S）锁也会一直持有到事务结束。但是，SQL Server 使用另一种称为 `range locks` 的锁变体。范围锁（共享和排他）保护索引键范围，而不是单个行。


    考虑一个 `Delivery.Orders` 表只有两行，`OrderId` 分别为 1 和 10 的情况。在 `REPEATABLE READ` 隔离级别中，`SELECT`
    语句将获取两个行级锁。其他会话将无法修改这些行，但仍然可以插入 `OrderId` 值介于两者之间的新行。在 `SERIALIZABLE` 隔离级别中，`SELECT`
    语句将获取一个范围共享（RangeS-S）锁，阻止其他会话在 `OrderId` 1 到 10 之间插入任何行。


    图 3-8 说明了 SQL Server 在 `SERIALIZABLE` 隔离级别中如何获取和释放锁。


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig8_HTML.jpg](images/463519_1_En_3_Chapter/463519_1_En_3_Fig8_HTML.jpg)


    **图 3-8：SERIALIZABLE 隔离级别下的共享（S）锁行为**


    ### 乐观隔离级别


    乐观隔离级别——`READ COMMITTED SNAPSHOT` 和 `SNAPSHOT`——不获取共享（S）锁。当读取器（`SELECT` 查询）遇到一个持有排他（X）锁的行时，它们从
    `tempdb` 中的版本存储读取该行的旧（先前提交的）版本。写入器和未提交的数据修改不会在系统中阻塞读取器。


    从阻塞和并发的角度来看，`READ COMMITTED SNAPSHOT` 与 `READ UNCOMMITTED` 具有相同的行为。这两个隔离级别都消除了系统中读取器/写入器阻塞的问题。然而，`READ
    COMMITTED SNAPSHOT` 通过消除对未提交数据的访问和脏读，提供了更好的数据一致性。在绝大多数情况下，你不应该使用 `READ UNCOMMITTED`，而应改用
    `READ COMMITTED SNAPSHOT`。


    ### 注意


    我们将在第 6 章中更深入地讨论乐观隔离级别。


    表 3-4 总结了 SQL Server 如何根据事务隔离级别处理共享（S）锁。


    **表 3-4：事务隔离级别和共享（S）锁行为**


    | 事务隔离级别 | 表提示 | 共享锁行为 |

    | --- | --- | --- |

    | `READ UNCOMMITTED` | `(NOLOCK)` | 不获取 (S) 锁 |

    | `READ COMMITTED` (默认) | `(READCOMMITTED)` | 获取 (S) 锁并立即释放 |

    | `REPEATABLE READ` | `(REPEATABLEREAD)` | 获取 (S) 锁并持有到事务结束 |

    | `SERIALIZABLE` | `(SERIALIZABLE)` 或 `(HOLDLOCK)` | 获取范围锁并持有到事务结束 |

    | `READ COMMITTED SNAPSHOT` | `N/A` | 不获取 (S) 锁 |

    | `SNAPSHOT` | `N/A` | 不获取 (S) 锁 |


    你可以使用 `SET TRANSACTION ISOLATION LEVEL` 语句在事务级别控制隔离级别和锁定行为，或者使用表锁定提示在表级别进行控制。


    可以在同一个查询中针对不同的表使用不同的隔离级别，如清单 3-4 所示。


    ```sql

    select c.CustomerName, sum(o.Total) as [Total]

    from

    dbo.Customers c with (READCOMMITTED) join

    dbo.Orders o with (SERIALIZABLE) on

    o.CustomerId = c.CustomerId

    group by

    c.CustomerName;

    -- Listing 3-4：使用表提示控制锁定行为

    ```'
  raw: '### Note


    SQL Server always works with data in the transaction context. In this case, when
    applications do not start explicit transactions with `BEGIN TRAN` / `COMMIT` statements,
    SQL Server uses autocommitted transactions for the duration of the statements.
    Even `SELECT` statements run within their own lightweight transactions. SQL Server
    does not write them to the transaction log, although all locking and concurrency
    rules still apply.


    With the `READ UNCOMMITTED` isolation level, shared (S) locks are not acquired.
    Therefore, readers can read the rows that have been modified by other sessions
    and have exclusive (X) locks held. This isolation level reduces blocking in the
    system by eliminating conflicts between readers and writers at the cost of data
    consistency. Readers would read the current (modified) version of the row regardless
    of what happens next, such as if changes were rolled back or if a row were modified
    multiple times. This explains why this isolation level is often called a *dirty
    read* *.*


    The code in Table [3-3](#463519_1_En_3_Chapter.xhtml#Tab3) illustrates that. The
    first session runs a `DELETE` statement, acquiring an exclusive (X) lock on the
    row. The second session runs a `SELECT` statement in `READ UNCOMMITTED` mode.


    Table 3-3


    READ UNCOMMITTED Isolation Level Consistency


    | Session 1 | Session 2 |

    | --- | --- |

    | `begin tran`       `delete from Delivery.Orders`       `where OrderId = 95;`
    |   |

    |   | `-- Success / No Blocking``set transaction isolation level read uncommitted;``select
    OrderId, Amount``from Delivery.Orders``where OrderId between 94 and 96;` |

    | `rollback;` |   |


    In the `READ UNCOMMITTED` isolation level, readers do not acquire shared (S) locks.
    Session 2 would not be blocked and would return the result set shown in Figure
    [3-5](#463519_1_En_3_Chapter.xhtml#Fig5). It does not include the row with `OrderId=95`,
    which has been deleted in the uncommitted transaction in the first session even
    though the transaction is rolled back afterward.


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig5_HTML.jpg](images/463519_1_En_3_Chapter/463519_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    READ UNCOMMITTED and shared (S) lock behavior


    It is worth noting again that exclusive (X) and update (U) locks’ behavior is
    not affected by transaction isolation level. You will have writers/writers blocking
    even in `READ UNCOMMITTED` mode.


    In the `READ COMMITTED` isolation level, SQL Server acquires and releases shared
    (S) locks immediately after the row has been read. This guarantees that transactions
    cannot read uncommitted data from other sessions. Let’s run the code from Listing
    [3-3](#463519_1_En_3_Chapter.xhtml#PC4).


    ```

    set transaction isolation level read committed;

    select OrderId, Amount

    from Delivery.Orders

    where OrderId in (90,91);

    Listing 3-3

    Reading data in READ COMMITTED isolation level

    ```


    Figure [3-6](#463519_1_En_3_Chapter.xhtml#Fig6) illustrates how SQL Server acquires
    and releases the locks. As you can see, row-level locks are acquired and released
    immediately.


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig6_HTML.jpg](images/463519_1_En_3_Chapter/463519_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Shared (S) locks’ behavior in READ COMMITTED mode


    It is worth noting that in some cases, in `READ COMMITTED` mode, SQL Server can
    hold shared (S) locks for the duration of the `SELECT` statement, releasing the
    locks only after it is completed. One such example is a query that reads the data
    from LOB columns from the table.


    ### Tip


    Do not select unnecessary columns or use the `SELECT *` pattern in the code. This
    may introduce performance overhead and increase locking in the system.


    In the `REPEATABLE READ` isolation level, SQL Server acquires shared (S) locks
    and holds them until the end of the transaction. This guarantees that other sessions
    cannot modify the data after it is read. You can see this behavior if you run
    the code from Listing [3-3](#463519_1_En_3_Chapter.xhtml#PC4), changing the isolation
    level to `REPEATABLE READ`.


    Figure [3-7](#463519_1_En_3_Chapter.xhtml#Fig7) illustrates how SQL Server acquires
    and releases the locks. As you can see, SQL Server acquires both shared (S) locks
    first, releasing them at the end of the transaction.


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig7_HTML.jpg](images/463519_1_En_3_Chapter/463519_1_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Shared (S) locks’ behavior in REPEATABLE READ mode


    In the `SERIALIZABLE` isolation level, shared (S) locks are also held until the
    end of the transaction. However, SQL Server uses another variation of the locks
    called *range locks* . Range locks (both shared and exclusive) protect index-key
    ranges rather than individual rows.


    Consider a situation where a `Delivery.Orders` table has just two rows with `OrderId`
    of 1 and 10. In the `REPEATABLE READ` isolation level, the `SELECT` statement
    would acquire two row-level locks. Other sessions would not be able to modify
    those rows, but they could still insert the new row with `OrderId` in between
    those values. In the `SERIALIZABLE` isolation level, the `SELECT` statement would
    acquire a range shared (RangeS-S) lock, preventing other sessions from inserting
    any rows in between `OrderId` of 1 and 10.


    Figure [3-8](#463519_1_En_3_Chapter.xhtml#Fig8) illustrates how SQL Server acquires
    and releases locks in the `SERIALIZABLE` isolation level.


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig8_HTML.jpg](images/463519_1_En_3_Chapter/463519_1_En_3_Fig8_HTML.jpg)


    Figure 3-8


    Shared (S) locks’ behavior in SERIALIZABLE isolation level


    Optimistic isolation levels—`READ COMMITTED SNAPSHOT` and `SNAPSHOT`—do not acquire
    shared (S) locks. When readers (`SELECT` queries) encounter a row with an exclusive
    (X) lock held, they read the old (previously committed) version of this row from
    the version store in `tempdb`. Writers and uncommitted data modifications do not
    block readers in the system.


    From the blocking and concurrency standpoints, `READ COMMITTED SNAPSHOT` has the
    same behavior as `READ UNCOMMITTED`. Both isolation levels remove the issue of
    readers/writers’ blocking in the system. `READ COMMITTED SNAPSHOT`, however, provides
    better data consistency by eliminating access to uncommitted data and dirty reads.
    In the vast majority of cases, you should not use `READ UNCOMMITTED`, and should
    switch to using `READ COMMITTED SNAPSHOT` instead.


    ### Note


    We will discuss optimistic isolation levels in greater depth in Chapter [6](#463519_1_En_6_Chapter.xhtml).


    Table [3-4](#463519_1_En_3_Chapter.xhtml#Tab4) summarizes how SQL Server works
    with shared (S) locks based on transaction isolation levels.


    Table 3-4


    Transaction Isolation Levels and Shared (S) Locks’ Behavior


    | Transaction Isolation Level | Table Hint | Shared Lock Behavior |

    | --- | --- | --- |

    | `READ UNCOMMITTED` | `(NOLOCK)` | (S) locks not acquired |

    | `READ COMMITTED` (default) | `(READCOMMITTED)` | (S) locks acquired and released
    immediately |

    | `REPEATABLE READ` | `(REPEATABLEREAD)` | (S) locks acquired and held till end
    of transaction |

    | `SERIALIZABLE` | `(SERIALIZABLE)` or `(HOLDLOCK)` | Range locks acquired and
    held till end of transaction |

    | `READ COMMITTED SNAPSHOT` | `N/A` | (S) locks not acquired |

    | `SNAPSHOT` | `N/A` | (S) locks not acquired |


    You can control isolation levels and locking behavior on the transaction level
    by using a `SET TRANSACTION ISOLATION LEVEL` statement or on the table level with
    a table locking hint.


    It is possible to use different isolation levels in the same query on a per-table
    basis, as is shown in Listing [3-4](#463519_1_En_3_Chapter.xhtml#PC5).


    ```

    select c.CustomerName, sum(o.Total) as [Total]

    from

    dbo.Customers c with (READCOMMITTED) join

    dbo.Orders o with (SERIALIZABLE) on

    o.CustomerId = c.CustomerId

    group by

    c.CustomerName;

    Listing 3-4

    Controlling locking behavior with table hints

    ```'
