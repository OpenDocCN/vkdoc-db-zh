- fmt: '## Conversion Locks


    `Conversion locks` are another group of lock types you can encounter in production.
    They are a combination of full and intent locks and may be acquired on page and
    object levels. SQL Server uses them when it needs to *extend* already acquired
    full locks with an additional intent lock or, alternatively, already acquired
    intent locks with a full lock of a different type. You can think about them as
    internal optimization, which allows the session to avoid holding multiple locks
    on the same resource.


    Let’s look at the example and run the code from Listing [3-7](#463519_1_En_3_Chapter.xhtml#PC8).
    As the first step, we will run a `SELECT` statement in the active transaction
    using `(REPEATABLEREAD TABLOCK)` hints. These hints will force the statement to
    acquire an object-level lock and hold it for the duration of the transaction.


    ```

    begin tran

    select top 10 OrderId, Amount

    from Delivery.Orders with (REPEATABLEREAD TABLOCK)

    order by OrderId;

    select

    l.resource_type

    ,case

    when l.resource_type = ''OBJECT''

    then

    object_name

    (

    l.resource_associated_entity_id

    ,l.resource_database_id

    )

    else ''''

    end as [table]

    ,l.resource_description

    ,l.request_type

    ,l.request_mode

    ,l.request_status

    from

    sys.dm_tran_locks l

    where

    l.request_session_id = @@spid;

    Listing 3-7

    Conversion locks: Running SELECT statement

    ```


    Figure [3-9](#463519_1_En_3_Chapter.xhtml#Fig9) illustrates the locks acquired
    by the statement. You can see the object-level shared (S) lock in place.


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig9_HTML.jpg](images/463519_1_En_3_Chapter/463519_1_En_3_Fig9_HTML.jpg)


    Figure 3-9: Conversion locks: Locks held by SELECT statement


    Now, let’s run another query that updates one of the rows in the same active transaction,
    as shown in Listing [3-8](#463519_1_En_3_Chapter.xhtml#PC9).


    ```

    update Delivery.Orders

    set Amount *= 0.95

    where OrderId = 100;

    Listing 3-8

    Conversion locks: Running UPDATE statement

    ```


    This operation requires SQL Server to obtain an exclusive (X) lock on the row
    and intent exclusive (IX) locks on the page and object levels. The table, however,
    already has a full shared (S) lock held, and SQL Server replaces it with a `shared
    intent exclusive (SIX)` lock, as shown in Figure [3-10](#463519_1_En_3_Chapter.xhtml#Fig10).


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig10_HTML.jpg](images/463519_1_En_3_Chapter/463519_1_En_3_Fig10_HTML.jpg)


    Figure 3-10: Conversion locks: Locks held after UPDATE statement


    There are two other types of conversion locks besides `SIX`:


    *   `Shared intent update (SIU)` locks are acquired during update scans when SQL
    Server needs to acquire an intent update (IU) lock on the same resource on which
    the shared (S) lock is held.

    *   `Update intent exclusive (UIX)` locks may be acquired when SQL Server needs
    to acquire an intent exclusive (IX) lock on a resource that already has an update
    (U) lock held on it. This lock type is usually used on data pages during update
    scans when SQL Server uses page-level rather than row-level locking. In this mode,
    SQL Server acquires a page-level update (U) lock first, changing it to an update
    intent exclusive (UIX) lock if some of the rows on the page need to be updated.
    It is worth noting that SQL Server does not replace page-level (UIX) locks with
    intent exclusive (IX) locks afterward, keeping (UIX) locks until the end of transaction.


    Conversion locks, in a nutshell, consist of two different lock types. Other locks
    need to be compatible with both of them in order to be granted. For example, intent
    shared (IS) locks are compatible with shared intent exclusive (SIX) locks because
    (IS) locks are compatible with both (S) and (IX) locks. Intent exclusive (IX)
    locks, on the other hand, are incompatible with (SIX) due to (IX) and (S) locks’
    incompatibility.


    ### Note


    Table [3-2](#463519_1_En_3_Chapter.xhtml#Tab2) in this chapter shows the lock
    compatibility matrix for regular locks.


    ## Summary


    SQL Server uses locking to support data isolation and consistency rules, using
    row-level locking as the highest degree of granularity.


    Exclusive (X) locks are acquired by writers when data is modified. Exclusive (X)
    locks are always acquired and held until the end of the transaction regardless
    of the isolation level. Update (U) locks are acquired when writers evaluate if
    data needs to be modified. Those locks are converted into exclusive (X) locks
    if data needs to be updated and are released otherwise. Intent (I*) locks are
    acquired on the object and page levels and indicate the existence of child row-level
    locks of the same type.


    With the exception of the `READ UNCOMMITED` isolation level, SQL Server acquires
    shared (S) locks while reading data in pessimistic isolation levels. Transaction
    isolation level controls when shared (S) locks are released. In the `READ COMMITTED`
    isolation level, these locks are released immediately after the row has been read.
    In `REPEATABLE READ` and `SERIALIZABLE` isolation levels, shared (S) locks are
    held until the end of the transaction. Moreover, in the `SERIALIZABLE` isolation
    level, SQL Server uses range locks to lock the ranges of the index keys rather
    than individual rows.


    Optimistic isolation levels rely on row versioning and read old (previously committed)
    versions of the rows from the version store in `tempdb`. `READ COMMMITTED SNAPSHOT`
    has the same blocking behavior as `READ UNCOMMITTED`; however, it provides better
    data consistency by preventing access to dirty uncommitted data. You should use
    `READ COMMITTED SNAPSHOT` instead of `READ UNCOMMITTED`.


    You can control transaction isolation levels with the `SET TRANSACTION ISOLATION
    LEVEL` statement on the transaction level or with table locking hints on the table
    level in the individual queries.


    # 4. Blocking in the System


    Blocking is, perhaps, one of the most common concurrency problems encountered
    in the systems. When blocking occurs, multiple queries block each other, which
    increases the execution time of queries and introduces timeouts. All of that negatively
    affects the user experience with the system.


    This chapter will show how you can troubleshoot blocking issues in a system. It
    will illustrate how you can analyze blocking conditions in real time and collect
    information for further analysis.'
  raw: '## Conversion Locks


    *Conversion locks* are another group of lock types you can encounter in production.
    They are a combination of full and intent locks and may be acquired on page and
    object levels. SQL Server uses them when it needs to *extend* already acquired
    full locks with an additional intent lock or, alternatively, already acquired
    intent locks with a full lock of a different type. You can think about them as
    internal optimization, which allows the session to avoid holding multiple locks
    on the same resource.


    Let’s look at the example and run the code from Listing [3-7](#463519_1_En_3_Chapter.xhtml#PC8).
    As the first step, we will run a `SELECT` statement in the active transaction
    using `(REPEATABLEREAD TABLOCK)` hints. These hints will force the statement to
    acquire an object-level lock and hold it for the duration of the transaction.


    ```

    begin tran

    select top 10 OrderId, Amount

    from Delivery.Orders with (REPEATABLEREAD TABLOCK)

    order by OrderId;

    select

    l.resource_type

    ,case

    when l.resource_type = ''OBJECT''

    then

    object_name

    (

    l.resource_associated_entity_id

    ,l.resource_database_id

    )

    else ''''

    end as [table]

    ,l.resource_description

    ,l.request_type

    ,l.request_mode

    ,l.request_status

    from

    sys.dm_tran_locks l

    where

    l.request_session_id = @@spid;

    Listing 3-7

    Conversion locks: Running SELECT statement

    ```


    Figure [3-9](#463519_1_En_3_Chapter.xhtml#Fig9) illustrates the locks acquired
    by the statement. You can see the object-level shared (S) lock in place.


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig9_HTML.jpg](images/463519_1_En_3_Chapter/463519_1_En_3_Fig9_HTML.jpg)


    Figure 3-9


    Conversion locks: Locks held by SELECT statement


    Now, let’s run another query that updates one of the rows in the same active transaction,
    as shown in Listing [3-8](#463519_1_En_3_Chapter.xhtml#PC9).


    ```

    update Delivery.Orders

    set Amount *= 0.95

    where OrderId = 100;

    Listing 3-8

    Conversion locks: Running UPDATE statement

    ```


    This operation requires SQL Server to obtain an exclusive (X) lock on the row
    and intent exclusive (IX) locks on the page and object levels. The table, however,
    already has a full shared (S) lock held, and SQL Server replaces it with a *shared
    intent exclusive (SIX* *)* lock, as shown in Figure [3-10](#463519_1_En_3_Chapter.xhtml#Fig10).


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig10_HTML.jpg](images/463519_1_En_3_Chapter/463519_1_En_3_Fig10_HTML.jpg)


    Figure 3-10


    Conversion locks: Locks held after UPDATE statement


    There are two other types of conversion locks besides (SIX):


    *   *Shared intent update (SIU)* locks are acquired during update scans when SQL
    Server needs to acquire an intent update (IU) lock on the same resource on which
    the shared (S) lock is held.


    *   *Update intent exclusive (UIX)* locks may be acquired when SQL Server needs
    to acquire an intent exclusive (IX) lock on a resource that already has an update
    (U) lock held on it. This lock type is usually used on data pages during update
    scans when SQL Server uses page-level rather than row-level locking. In this mode,
    SQL Server acquires a page-level update (U) lock first, changing it to an update
    intent exclusive (UIX) lock if some of the rows on the page need to be updated.
    It is worth noting that SQL Server does not replace page-level (UIX) locks with
    intent exclusive (IX) locks afterward, keeping (UIX) locks until the end of transaction.


    Conversion locks, in a nutshell, consist of two different lock types. Other locks
    need to be compatible with both of them in order to be granted. For example, intent
    shared (IS) locks are compatible with shared intent exclusive (SIX) locks because
    (IS) locks are compatible with both (S) and (IX) locks. Intent exclusive (IX)
    locks, on the other hand, are incompatible with (SIX) due to (IX) and (S) locks’
    incompatibility.


    ### Note


    Table [3-2](#463519_1_En_3_Chapter.xhtml#Tab2) in this chapter shows the lock
    compatibility matrix for regular locks.


    ## Summary


    SQL Server uses locking to support data isolation and consistency rules, using
    row-level locking as the highest degree of granularity.


    Exclusive (X) locks are acquired by writers when data is modified. Exclusive (X)
    locks are always acquired and held until the end of the transaction regardless
    of the isolation level. Update (U) locks are acquired when writers evaluate if
    data needs to be modified. Those locks are converted into exclusive (X) locks
    if data needs to be updated and are released otherwise. Intent (I*) locks are
    acquired on the object and page levels and indicate the existence of child row-level
    locks of the same type.


    With the exception of the `READ UNCOMMITED` isolation level, SQL Server acquires
    shared (S) locks while reading data in pessimistic isolation levels. Transaction
    isolation level controls when shared (S) locks are released. In the `READ COMMITTED`
    isolation level, these locks are released immediately after the row has been read.
    In `REPEATABLE READ` and `SERIALIZABLE` isolation levels, shared (S) locks are
    held until the end of the transaction. Moreover, in the `SERIALIZABLE` isolation
    level, SQL Server uses range locks to lock the ranges of the index keys rather
    than individual rows.


    Optimistic isolation levels rely on row versioning and read old (previously committed)
    versions of the rows from the version store in `tempdb`. `READ COMMMITTED SNAPSHOT`
    has the same blocking behavior as `READ UNCOMMITTED`; however, it provides better
    data consistency by preventing access to dirty uncommitted data. You should use
    `READ COMMITTED SNAPSHOT` instead of `READ UNCOMMITTED`.


    You can control transaction isolation levels with the `SET TRANSACTION ISOLATION
    LEVEL` statement on the transaction level or with table locking hints on the table
    level in the individual queries.


    # 4. Blocking in the System


    Blocking is, perhaps, one of the most common concurrency problems encountered
    in the systems. When blocking occurs, multiple queries block each other, which
    increases the execution time of queries and introduces timeouts. All of that negatively
    affects the user experience with the system.


    This chapter will show how you can troubleshoot blocking issues in a system. It
    will illustrate how you can analyze blocking conditions in real time and collect
    information for further analysis.'
  trans: '

    ## 转换锁


    `转换锁`是你在生产环境中可能遇到的另一组锁类型。它们是完全锁和意向锁的组合，可以在页和对象级别获取。当 SQL Server 需要*扩展*已获取的完全锁（附加一个意向锁），或者用另一种不同类型的完全锁来扩展已获取的意向锁时，就会使用它们。你可以将它们视为一种内部优化，使得会话能够避免在同一个资源上持有多个锁。


    让我们看一个例子，并运行代码清单 3-7 中的代码。第一步，我们将在活动事务中使用 `(REPEATABLEREAD TABLOCK)` 提示运行一个 `SELECT`
    语句。这些提示将强制该语句获取对象级锁并在事务持续期间持有它。


    ```

    begin tran

    select top 10 OrderId, Amount

    from Delivery.Orders with (REPEATABLEREAD TABLOCK)

    order by OrderId;

    select

    l.resource_type

    ,case

    when l.resource_type = ''OBJECT''

    then

    object_name

    (

    l.resource_associated_entity_id

    ,l.resource_database_id

    )

    else ''''

    end as [table]

    ,l.resource_description

    ,l.request_type

    ,l.request_mode

    ,l.request_status

    from

    sys.dm_tran_locks l

    where

    l.request_session_id = @@spid;

    代码清单 3-7

    转换锁：运行 SELECT 语句

    ```


    图 3-9 说明了该语句获取的锁。你可以看到对象级别的共享 (S) 锁已就位。


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig9_HTML.jpg](img/463519_1_En_3_Fig9_HTML.jpg)


    图 3-9：转换锁：由 SELECT 语句持有的锁


    现在，让我们在同一个活动事务中运行另一个更新其中一行的查询，如代码清单 3-8 所示。


    ```

    update Delivery.Orders

    set Amount *= 0.95

    where OrderId = 100;

    代码清单 3-8

    转换锁：运行 UPDATE 语句

    ```


    此操作要求 SQL Server 在行上获取排他 (X) 锁，并在页和对象级别获取意向排他 (IX) 锁。然而，该表已经持有一个完全共享 (S) 锁，SQL
    Server 将其替换为 `共享意向排他 (SIX)` 锁，如图 3-10 所示。


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig10_HTML.jpg](img/463519_1_En_3_Fig10_HTML.jpg)


    图 3-10：转换锁：UPDATE 语句之后持有的锁


    除了 `SIX` 之外，还有另外两种转换锁：


    *   `共享意向更新 (SIU)` 锁在更新扫描期间获取，此时 SQL Server 需要在已持有共享 (S) 锁的同一资源上获取意向更新 (IU) 锁。

    *   `更新意向排他 (UIX)` 锁可能在 SQL Server 需要在已持有更新 (U) 锁的资源上获取意向排他 (IX) 锁时获取。此锁类型通常在更新扫描期间用于数据页，此时
    SQL Server 使用页级而不是行级锁定。在此模式下，SQL Server 首先获取页级更新 (U) 锁，如果该页上的某些行需要更新，则将其更改为更新意向排他
    (UIX) 锁。值得注意的是，SQL Server 之后不会将页级 (UIX) 锁替换为意向排他 (IX) 锁，而是会保持 (UIX) 锁直到事务结束。


    简而言之，转换锁由两种不同的锁类型组成。其他锁需要与两者都兼容才能被授予。例如，意向共享 (IS) 锁与共享意向排他 (SIX) 锁兼容，因为 (IS) 锁与
    (S) 和 (IX) 锁都兼容。另一方面，意向排他 (IX) 锁由于与 (S) 锁不兼容，因此与 (SIX) 锁不兼容。


    ### 注意


    本章中的表 3-2 展示了常规锁的锁兼容性矩阵。


    ## 总结


    SQL Server 使用锁来支持数据隔离和一致性规则，并使用行级锁作为最高的粒度级别。


    排他 (X) 锁在修改数据时由写入者获取。无论隔离级别如何，排他 (X) 锁总是被获取并持有到事务结束。更新 (U) 锁在写入者评估是否需要修改数据时获取。如果数据需要更新，这些锁将转换为排他
    (X) 锁，否则将被释放。意向 (I*) 锁在对象和页级别获取，表示存在相同类型的子行级锁。


    除了 `READ UNCOMMITED` 隔离级别外，SQL Server 在悲观隔离级别下读取数据时会获取共享 (S) 锁。事务隔离级别控制何时释放共享
    (S) 锁。在 `READ COMMITTED` 隔离级别中，这些锁在行被读取后立即释放。在 `REPEATABLE READ` 和 `SERIALIZABLE`
    隔离级别中，共享 (S) 锁将持有到事务结束。此外，在 `SERIALIZABLE` 隔离级别中，SQL Server 使用范围锁来锁定索引键的范围，而不是锁定单个行。


    乐观隔离级别依赖于行版本控制，并从 `tempdb` 中的版本存储区读取行的旧（先前提交的）版本。`READ COMMMITTED SNAPSHOT` 具有与
    `READ UNCOMMITTED` 相同的阻塞行为；然而，它通过防止访问未提交的脏数据提供了更好的数据一致性。你应该使用 `READ COMMITTED
    SNAPSHOT` 而不是 `READ UNCOMMITTED`。


    你可以使用 `SET TRANSACTION ISOLATION LEVEL` 语句在事务级别控制事务隔离级别，或者在单个查询中使用表锁定提示在表级别控制。


    # 4. 系统中的阻塞


    阻塞可能是系统中遇到的最常见的并发问题之一。当阻塞发生时，多个查询相互阻塞，这增加了查询的执行时间并导致超时。所有这些都会对用户体验系统产生负面影响。


    本章将展示如何对系统中的阻塞问题进行故障排除。它将说明如何实时分析阻塞情况并收集信息以供进一步分析。

