    mentioned, the *blocking* session data would show the queries that are currently
    executing rather than those that caused the blocking.


    As an example, consider a situation where the session runs several data modification
    statements in a single transaction . As you remember, SQL Server would acquire
    and hold exclusive (X) locks on the updated rows until the end of the transaction.
    The blocking may occur over any of the previously updated rows with exclusive
    (X) locks held, which may or may not be acquired by the currently executing statement
    from the session.


    The second challenge is related to the *blocking chains* when the blocking session
    is also blocked by another session. This usually happens in busy OLTP systems
    and is often related to object-level locks acquired during schema alteration,
    index maintenance, or in a few other cases.


    Consider a situation where you have a Session 1 that holds an intent lock on the
    table. This intent lock would block Session 2, which may want to obtain a full
    table lock; for example, during an offline index rebuild. The blocked Session
    2, in turn, will block all other sessions that may try to obtain intent locks
    on the table.


    ### Note


    We will discuss this and other situations that may lead to blocking chains later
    in the book. For now, however, remember that you need to rewind the blocking chains
    and include the root blocking session in your analysis when you encounter such
    a condition.


    These challenges may lead to the situation where it is easier to start troubleshooting
    by looking at the *blocked* session, where you have the blocked statement and
    its execution plan available. In many cases, you can identify the root cause of
    the blocking by analyzing its execution plan, which you can obtain from the dynamic
    management views (as was demonstrated earlier) or by rerunning the query.


    Figure [4-4](#463519_1_En_4_Chapter.xhtml#Fig4) shows the execution plan of the
    blocked query from our example.


    ![../images/463519_1_En_4_Chapter/463519_1_En_4_Fig4_HTML.jpg](images/463519_1_En_4_Chapter/463519_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Execution plan for the blocked query


    As you can see from the execution plan, the blocked query is scanning the entire
    table looking for orders with the predicate on the `OrderNum` column. The query
    uses a `READ COMMITTED` transaction isolation level, and it acquires a shared
    (S) lock on every row in the table. As a result, at some point the query is blocked
    by the first `DELETE` query, which holds an exclusive (X) lock on one of the rows.
    It is worth noting that the query would be blocked even if the row with the exclusive
    (X) lock held did not have `OrderNum=''1000''`. SQL Server cannot evaluate the
    predicate until the shared (S) lock is acquired and the row is read.


    You can resolve this problem by optimizing the query and adding the index on the
    `OrderNum` column, which will replace the *Clustered Index Scan* with the *Nonclustered
    Index Seek* operator in the execution plan. This will significantly reduce the
    number of locks the statement acquires and eliminate lock collision and blocking
    as long as the queries do not delete and select the same rows.


    Even though in many instances you can detect and resolve the root cause of the
    blocking by analyzing and optimizing the *blocked* query, this is not always the
    case. Consider the situation where you have a session that is updating a large
    number of rows in a table and thus acquires and holds a large number of exclusive
    (X) locks on those rows. Other sessions that need to access those rows would be
    blocked, even in the case of efficient execution plans that do not perform unnecessary
    scans. The root cause of the blocking in this case is the *blocking* rather than
    *blocked* session.


    As we have already discussed, you cannot always rely on the blocked statements
    returned by data management views. In many cases, you need to analyze what code
    in the blocking session has caused the blocking. You can use the `sys.dm_exec_sessions`
    view to obtain information about the host and application of the blocking session.
    When you know which statement the blocking session is currently executing, you
    can analyze the client and T-SQL code to locate the transaction to which this
    statement belongs. One of the previously executed statements in that transaction
    would be the one that caused the blocking condition .


    The *blocked process report*, which we are about to discuss, can also help during
    such troubleshooting.'
  trans: '

    `sys.dm_tran_locks` 视图为系统中的每个活动锁请求返回一行，当在繁忙的服务器上运行时，可能导致结果集非常庞大。你可以通过基于 `resource_description`
    和 `resource_associated_entity_id` 列对此视图进行自联接来减少信息量，并识别竞争相同资源的会话，如代码清单 4-2 所示。这种方法允许你筛选结果，仅查看涉及活动阻塞条件的会话。


    ```sql

    select

    tl1.resource_type as [Resource Type]

    ,db_name(tl1.resource_database_id) as [DB Name]

    ,case tl1.resource_type

    when ''OBJECT'' then

    object_name

    (

    tl1.resource_associated_entity_id

    ,tl1.resource_database_id

    )

    when ''DATABASE'' then ''DB''

    else

    case when tl1.resource_database_id = db_id()

    then

    (

    select

    object_name(object_id, tl1.resource_database_id)

    from sys.partitions

    where hobt_id = tl1.resource_associated_entity_id

    )

    else ''(Run under DB context)''

    end

    end as [Object]

    ,tl1.resource_description as [Resource]

    ,tl1.request_session_id as [Session]

    ,tl1.request_mode as [Mode]

    ,tl1.request_status as [Status]

    ,wt.wait_duration_ms as [Wait (ms)]

    ,qi.sql

    ,qi.query_plan

    from

    sys.dm_tran_locks tl1 with (nolock) join

    sys.dm_tran_locks tl2 with (nolock) on

    tl1.resource_associated_entity_id = tl2.resource_associated_entity_id

    left outer join sys.dm_os_waiting_tasks wt with (nolock) on

    tl1.lock_owner_address = wt.resource_address and

    tl1.request_status = ''WAIT''

    outer apply

    (

    select

    substring(s.text, (er.statement_start_offset / 2) + 1,

    ((  case er.statement_end_offset

    when -1

    then datalength(s.text)

    else er.statement_end_offset

    end - er.statement_start_offset) / 2) + 1) as sql

    , qp.query_plan

    from

    sys.dm_exec_requests er with (nolock)

    cross apply sys.dm_exec_sql_text(er.sql_handle) s

    cross apply sys.dm_exec_query_plan(er.plan_handle) qp

    where

    tl1.request_session_id = er.session_id

    ) qi

    where

    tl1.request_status <> tl2.request_status and

    (

    tl1.resource_description = tl2.resource_description or

    (

    tl1.resource_description is null and

    tl2.resource_description is null

    )

    )

    option (recompile)

    ```


    代码清单 4-2

    筛选被阻塞和阻塞会话信息


    图 4-3 展示了此代码的输出。如你所见，这种方法显著减少了输出大小并简化了分析。


    ![../images/463519_1_En_4_Chapter/463519_1_En_4_Fig3_HTML.jpg](img/463519_1_En_4_Fig3_HTML.jpg)


    图 4-3

    阻塞和被阻塞的会话


    ## 阻塞排查


    正如你已经知道的，当两个或多个会话竞争同一资源时，就会发生阻塞。在排查过程中，你需要回答两个问题：


    1.  为什么 `阻塞` 会话持有该资源上的锁？

    2.  为什么 `被阻塞` 会话需要获取该资源上的锁？


    这两个问题同等重要；然而，在分析 `阻塞` 会话数据时，你可能会遇到几个挑战。首先，正如我已经提到的，`阻塞` 会话数据会显示当前正在执行的查询，而不是导致阻塞的查询。


    例如，考虑一种情况，一个会话在单个事务中运行了多个数据修改语句。你记得，SQL Server 会在更新的行上获取并保持排他锁，直到事务结束。阻塞可能发生在任何先前更新过的、持有排他锁的行上，而这些锁可能是或可能不是该会话当前正在执行的语句所获取的。


    第二个挑战与 `阻塞链` 相关，即阻塞会话本身也被另一个会话阻塞。这在繁忙的 OLTP 系统中很常见，通常与在架构更改、索引维护或其他少数情况下获取的对象级锁有关。


    考虑一种情况：你有一个会话 1，它在表上持有意向锁。这个意向锁会阻塞会话 2，会话 2 可能想要获取一个完整的表锁；例如，在离线索引重建期间。被阻塞的会话
    2 进而又会阻塞所有其他可能尝试在该表上获取意向锁的会话。


    ### 注意


    我们将在本书后面讨论此情况以及其他可能导致阻塞链的情况。但现在，请记住，当你遇到这种情况时，你需要回溯阻塞链，并将根阻塞会话纳入分析中。


    这些挑战可能导致这样一种情况：通过查看 `被阻塞` 会话开始排查会更容易，在那里你可以获得被阻塞的语句及其执行计划。在许多情况下，通过分析其执行计划（你可以从动态管理视图获取，如前面演示的，或者通过重新运行查询来获取），你可以确定阻塞的根本原因。


    图 4-4 展示了我们示例中被阻塞查询的执行计划。


    ![../images/463519_1_En_4_Chapter/463519_1_En_4_Fig4_HTML.jpg](img/463519_1_En_4_Fig4_HTML.jpg)


    图 4-4

    被阻塞查询的执行计划


    从执行计划中可以看出，被阻塞的查询正在扫描整个表以查找 `OrderNum` 列上带有谓词的订单。该查询使用 `READ COMMITTED` 事务隔离级别，并在表中的每一行上获取共享锁。结果，在某个时刻，该查询被第一个
    `DELETE` 查询阻塞，后者在其中一行上持有排他锁。值得注意的是，即使持有排他锁的行其 `OrderNum` 不等于 `''1000''`，该查询也会被阻塞。在获取共享锁并读取该行之前，SQL
    Server 无法计算该谓词。


    你可以通过优化查询并在 `OrderNum` 列上添加索引来解决此问题，这将在执行计划中将 `聚集索引扫描` 替换为 `非聚集索引查找` 操作符。只要查询不删除和选择相同的行，这将显著减少该语句获取的锁的数量，并消除锁冲突和阻塞。


    尽管在许多情况下，你可以通过分析和优化 `被阻塞` 查询来检测和解决阻塞的根本原因，但情况并非总是如此。考虑这样一种情况：你有一个会话正在更新表中的大量行，从而在这些行上获取并持有大量的排他锁。其他需要访问这些行的会话将被阻塞，即使是在执行计划高效、不执行不必要扫描的情况下。这种情况下，阻塞的根本原因是
    `阻塞` 会话，而不是 `被阻塞` 会话。


    正如我们已经讨论过的，你不能总是依赖数据管理视图返回的被阻塞语句。在许多情况下，你需要分析阻塞会话中的什么代码导致了阻塞。你可以使用 `sys.dm_exec_sessions`
    视图来获取关于阻塞会话的主机和应用程序的信息。当你知道阻塞会话当前正在执行哪个语句时，你可以分析客户端和 T-SQL 代码以定位该语句所属的事务。该事务中先前执行的某个语句将是导致阻塞情况的语句。


    我们即将讨论的 `阻塞进程报告` 也可以在此类排查中提供帮助。

    '
- fmt: '## Collecting Blocking Information for Further Analysis


    Although DMVs can be very useful in providing information about the current state
    of the system, they are only helpful if you run them at the exact same time the
    blocking occurs. Fortunately, SQL Server helps capture blocking information automatically
    via the `blocked process report`. This report provides information about the blocking
    condition, which you may retain for further analysis. It is also incredibly useful
    when you need to deal with blocking chains and complex blocking cases.


    There is a configuration setting called `blocked process threshold`, which specifies
    how often SQL Server checks for blocking in the system and generates a report
    (it is disabled by default). Listing 4-3 shows the code that sets the threshold
    to ten seconds.


    ```

    sp_configure ''show advanced options'', 1;

    go

    reconfigure;

    go

    sp_configure ''blocked process threshold'', 10; -- in seconds

    go

    reconfigure;

    go

    Listing 4-3

    Specifying blocking process threshold

    ```


    You need to fine-tune the value of the `blocked process threshold` in production.
    It is important to avoid false positives and, at the same time, capture the problems.
    Microsoft suggests not going below five seconds as the minimum value, and you
    obviously need to set the value to less than the query timeout. I usually use
    either five or ten seconds, depending on the amount of blocking in the system
    and phase of the troubleshooting.


    There are a few ways to capture that report in the system. You can use SQL Trace;
    there is a “Blocked process report” event in the “Errors and Warnings” section,
    as shown in Figure 4-5.


    ![../images/463519_1_En_4_Chapter/463519_1_En_4_Fig5_HTML.jpg](images/463519_1_En_4_Chapter/463519_1_En_4_Fig5_HTML.jpg)


    Figure 4-5

    “Blocked process report” event in SQL Trace


    Alternatively, you can create an Extended Event session using a `blocked_process_report`
    event, as shown in Figure 4-6. This session will provide you with several additional
    attributes than those offered in SQL Trace.


    ![../images/463519_1_En_4_Chapter/463519_1_En_4_Fig6_HTML.jpg](images/463519_1_En_4_Chapter/463519_1_En_4_Fig6_HTML.jpg)


    Figure 4-6

    Capturing blocked process report with Extended Events


    ### Note


    Extended Events are more efficient and provide less overhead than SQL Traces.


    The blocked process report contains XML that shows information about blocking
    and blocked processes in the system (the most important of which are highlighted
    in boldface within Listing 4-4).


    ```

    set transaction isolation level read committed

    select OrderId, Amount

    from Delivery.Orders

    where OrderNum = ''1000''


    set transaction isolation level read uncommitted

    begin tran

    delete from Delivery.Orders

    where OrderId = 95


    Listing 4-4

    Blocked process report XML

    ```


    As with real-time troubleshooting, you should analyze both blocking and blocked
    processes and find the root cause of the problem. From the blocked process standpoint,
    the most important information is the following:


    *   `waittime`: The length of time the query is waiting, in milliseconds

    *   `lockMode` : The type of lock being waited for

    *   `isolationlevel` : The transaction isolation level

    *   `executionStack` and `inputBuf`: The query and/or the execution stack. You
    will see how to obtain the actual SQL statement involved in blocking in Listing
    4-5.


    From the blocking process standpoint, you must look at the following:


    *   `status` : It indicates whether the process is `running`, `sleeping`, or `suspended`.
    When the process is sleeping, there is an uncommitted transaction. When the process
    is suspended, that process either waits for the non-locking related resource (for
    example, a page from the disk) or is also blocked by the other session and so
    there is a blocking chain condition.

    *   `trancount` : A value greater than 1 indicates nested transactions. If the
    process status is `sleeping` at the same time, then there is a chance that the
    client did not commit the nested transactions correctly (for example, the number
    of `commit` statements is less than the number of `begin tran` statements in the
    code).

    *   `executionStack` and `inputBuf` : As we already discussed, in some cases you
    need to analyze what happens in the blocking process. Some common issues include
    runaway transactions (for example, missing `commit` statements in the nested transactions);
    long-running transactions with perhaps some UI involved; and excessive scans (for
    example, a missing index on the referencing column in the detail table leads to
    scans during a referential integrity check). Information about queries from the
    blocking session could be useful here. Remember that in the case of a blocked
    process, `executionStack` and `inputBuf` would correspond to the queries that
    were running at the moment when the blocked process report was generated rather
    than to the time of the blocking.


    In many cases, blocking occurs because of unnecessary scans resulting from nonoptimized
    queries. Those queries acquire an unnecessarily large number of locks, which lead
    to lock collision and blocking. You can detect such cases by looking at the blocked
    queries’ execution plans and seeing the inefficiencies there.


    You can either run the query and check the execution plan, or use DMVs and obtain
    an execution plan from `sys.dm_exec_query_stats` based on the `sql_handle`, `stmtStart`,
    and `stmtEnd` elements from the execution stack. Listing 4-5 shows the code that
    achieves that.'
