  trans: '## 锁升级概述


    SQL Server 尝试通过一种称为锁升级的简单技术来减少内存消耗和锁管理开销。一旦某个语句在同一个对象上获取了至少 5,000 个行级和页级锁，SQL
    Server 就会尝试将这些锁升级——或者更准确地说，替换为单个表级锁，或者如果启用了分区，则替换为分区级锁。如果其他会话没有在该对象或分区上持有不兼容的锁，则此操作成功。


    当操作成功时，SQL Server 会释放事务在该对象（或分区）上持有的所有行级和页级锁，仅保留对象级（或分区级）锁。如果操作失败，SQL Server 将继续使用行级锁，并在大约每获取
    1,250 个新锁后重复升级尝试。除了响应已获取的锁数量外，当实例中的锁总数超过内存或配置阈值时，SQL Server 也可以进行锁升级。


    ### 注意


    5,000/1,250 的锁数量阈值是一个近似值。触发锁升级的实际获取锁数量可能有所不同，通常略大于该阈值。


    让我们看一个例子，在一个使用 `REPEATABLE READ` 隔离级别的事务中运行一个 `SELECT` 语句，该语句统计 `Delivery.Orders`
    表中的行数。你会记得，在这种隔离级别下，SQL Server 会一直持有共享（S）锁直到事务结束。


    让我们使用 `ALTER TABLE SET (LOCK_ESCALATION=DISABLE)` 命令（稍后会详细介绍）为该表禁用锁升级，并观察 SQL
    Server 获取的锁数量以及存储它们所需的内存。我们将使用 `(ROWLOCK)` 提示来防止 SQL Server `优化` 锁定，即获取页级共享（S）锁而不是行级锁。此外，在事务仍处于活动状态时，让我们从另一个会话插入另一行，以演示锁升级如何影响系统并发性。


    ### 表 7-1


    禁用锁升级的测试代码


    | 会话 1 | 会话 2 |

    | --- | --- |

    | `alter table Delivery.Orders``set (lock_escalation=disable);``set transaction
    isolation level repeatable read``begin tran`       `select count(*)`       `from
    Delivery.Orders`           `with (rowlock);` |   |

    |   | `-- 成功``insert into Delivery.Orders``(OrderDate,OrderNum,CustomerId)``values(getUTCDate(),''99999'',100);`
    |

    |        `-- 结果: 10,212,326`       `select count(*) as [Lock Count]`       `from
    sys.dm_tran_locks;`       `-- 结果: 1,940,272 KB`       `select sum(pages_kb) as
    [Memory, KB]`       `from sys.dm_os_memory_clerks`       `where type =`           `''OBJECTSTORE_LOCK_MANAGER'';``commit`
    |   |


    图 7-1 显示了事务活动期间的 *锁内存（KB）* 系统性能计数器。


    ![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig1_HTML.jpg](img/463519_1_En_7_Fig1_HTML.jpg)


    如你所见，从并发角度来看，行级锁定是完美的。只要会话不争夺相同的行，它们就不会相互阻塞。同时，维护大量锁是内存密集型的，而内存是 SQL Server 中最宝贵的资源之一。在我们的示例中，SQL
    Server 需要维护数百万个锁结构，占用了近 2 GB 的 RAM。这个数字包括行级共享（S）锁以及页级意向共享（IS）锁。此外，维护锁定信息和系统中的大量锁结构也有开销。


    让我们看看，如果我们使用 `ALTER TABLE SET (LOCK_ESCALATION=TABLE)` 命令启用默认的锁升进行为，并运行表 7-2 中所示的代码，会发生什么情况。


    ### 表 7-2


    启用锁升级的测试代码


    | 会话 1 (SPID=57) | 会话 2 (SPID=58) |

    | --- | --- |

    | `alter table Delivery.Orders``set (lock_escalation=table);``set transaction
    isolation level repeatable read``begin tran`       `select count(*)`       `from
    Delivery.Orders`           `with (rowlock);` |   |

    |   | `-- 该会话被阻塞``insert into Delivery.Orders``(OrderDate,OrderNum,CustomerId)``values(getUTCDate(),''100000'',100);`
    |

    |        `select`           `request_session_id as [SPID]`           `,resource_type
    as [Resource]`           `,request_mode as [Lock Mode]`           `,request_status
    as [Status]`       `from sys.dm_tran_locks;``commit` |   |


    图 7-2 显示了从 `sys.dm_tran_locks` 视图输出的查询结果。


    ![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig2_HTML.jpg](img/463519_1_En_7_Fig2_HTML.jpg)'
- fmt: '# Sys.dm_tran_locks output with lock escalation enabled


    SQL Server replaces the row- and page-level locks with the object shared (S) lock.
    Although it is great from a memory-usage standpoint—there is just a single lock
    to maintain—it affects concurrency. As you can see, the second session is blocked—it
    cannot acquire an intent exclusive (IX) lock on the table because it is incompatible
    with the full shared (S) lock held by the first session.


    The locking granularity hints, such as `(ROWLOCK)` and `(PAGLOCK)`, do not affect
    lock-escalation behavior. For example, with the `(PAGLOCK)` hint, SQL Server uses
    full page-level rather than row-level locks. This, however, may still trigger
    lock escalation after the number of acquired locks exceeds the threshold.


    Lock escalation is enabled by default and could introduce blocking issues, which
    can be confusing for developers and database administrators. Let’s talk about
    a few typical cases.


    The first case occurs when reporting queries use `REPEATABLE READ` or `SERIALIZABLE`
    isolation levels for data consistency purposes. If reporting queries are reading
    large amounts of data when there are no sessions updating the data, those queries
    could escalate shared (S) locks to the table level. Afterward, all writers would
    be blocked, even when trying to insert new data or modify the data not read by
    the reporting queries, as you saw earlier in this chapter. One of the ways to
    address this issue is by switching to optimistic transaction isolation levels,
    which we discussed in the previous chapter.


    The second case is the implementation of the purge process. Let’s assume that
    you need to purge a large amount of old data using a `DELETE` statement. If the
    implementation deletes a large number of rows at once, you could have exclusive
    (X) locks escalated to the table level. This would block access to the table for
    all writers, as well as for the readers in `READ COMMITTED`, `REPEATABLE READ`,
    or `SERIALIZABLE` isolation levels, even when those queries are working with a
    completely different set of data than what you are purging.


    Finally, you can think about a process that inserts a large batch of rows with
    a single `INSERT` statement. Like the purge process, it could escalate exclusive
    (X) locks to the table level and block other sessions from accessing it.


    All these patterns have one thing in common—they acquire and hold a large number
    of row- and page-level locks as part of a single statement. That triggers lock
    escalation, which will succeed if there are no other sessions holding incompatible
    locks on the table (or partition) level. This will block other sessions from acquiring
    incompatible intent or full locks on the table (or partition) until the first
    session has completed the transaction, regardless of whether the blocked sessions
    are trying to access the data affected by the first session.


    It is worth repeating that lock escalation is triggered by the number of locks
    acquired by the statement, rather than by the transaction. If the separate statements
    acquire less than 5,000 row- and page-level locks each, lock escalation is not
    triggered, regardless of the total number of locks the transaction holds. Listing
    [7-1](#463519_1_En_7_Chapter.xhtml#PC1) shows an example in which multiple `UPDATE`
    statements run in a loop within a single transaction.


    ```sql

    declare

    @id int = 1

    begin tran

    while @id < 100000

    begin

    update Delivery.Orders

    set OrderStatusId = 1

    where OrderId between @id and @id + 4998;

    select @id += 4999;

    end

    select count(*) as [Lock Count]

    from sys.dm_tran_locks

    where request_session_id = @@SPID;

    commit

    ```

    Listing 7-1: Lock escalation and multiple statements


    ![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig3_HTML.jpg](images/463519_1_En_7_Chapter/463519_1_En_7_Fig3_HTML.jpg)


    Figure 7-3: Number of locks held by the transaction


    ## Lock Escalation Troubleshooting


    Lock escalation is completely normal. It helps to reduce locking-management overhead
    and memory usage, which improves system performance. You should keep it enabled
    unless it starts to introduce noticeable blocking issues in the system. Unfortunately,
    it is not always easy to detect if lock escalation contributes to blocking, and
    you need to analyze individual blocking cases to understand it.


    One sign of potential lock escalation blocking is a high percentage of intent-lock
    waits `(LCK_M_I*)` in the wait statistics. Lock escalation, however, is not the
    only reason for such waits, and you need to look at other metrics during analysis.'
  raw: 'Sys.dm_tran_locks output with lock escalation enabled


    SQL Server replaces the row- and page-level locks with the object shared (S) lock.
    Although it is great from a memory-usage standpoint—there is just a single lock
    to maintain—it affects concurrency. As you can see, the second session is blocked—it
    cannot acquire an intent exclusive (IX) lock on the table because it is incompatible
    with the full shared (S) lock held by the first session.


    The locking granularity hints, such as `(ROWLOCK)` and `(PAGLOCK)`, do not affect
    lock-escalation behavior. For example, with the `(PAGLOCK)` hint, SQL Server uses
    full page-level rather than row-level locks. This, however, may still trigger
    lock escalation after the number of acquired locks exceeds the threshold.


    Lock escalation is enabled by default and could introduce blocking issues, which
    can be confusing for developers and database administrators. Let’s talk about
    a few typical cases.


    The first case occurs when reporting queries use `REPEATABLE READ` or `SERIALIZABLE`
    isolation levels for data consistency purposes. If reporting queries are reading
    large amounts of data when there are no sessions updating the data, those queries
    could escalate shared (S) locks to the table level. Afterward, all writers would
    be blocked, even when trying to insert new data or modify the data not read by
    the reporting queries, as you saw earlier in this chapter. One of the ways to
    address this issue is by switching to optimistic transaction isolation levels,
    which we discussed in the previous chapter.


    The second case is the implementation of the purge process. Let’s assume that
    you need to purge a large amount of old data using a `DELETE` statement. If the
    implementation deletes a large number of rows at once, you could have exclusive
    (X) locks escalated to the table level. This would block access to the table for
    all writers, as well as for the readers in `READ COMMITTED`, `REPEATABLE READ`,
    or `SERIALIZABLE` isolation levels, even when those queries are working with a
    completely different set of data than what you are purging.


    Finally, you can think about a process that inserts a large batch of rows with
    a single `INSERT` statement. Like the purge process, it could escalate exclusive
    (X) locks to the table level and block other sessions from accessing it.


    All these patterns have one thing in common—they acquire and hold a large number
    of row- and page-level locks as part of a single statement. That triggers lock
    escalation, which will succeed if there are no other sessions holding incompatible
    locks on the table (or partition) level. This will block other sessions from acquiring
    incompatible intent or full locks on the table (or partition) until the first
    session has completed the transaction, regardless of whether the blocked sessions
    are trying to access the data affected by the first session.


    It is worth repeating that lock escalation is triggered by the number of locks
    acquired by the statement, rather than by the transaction. If the separate statements
    acquire less than 5,000 row- and page-level locks each, lock escalation is not
    triggered, regardless of the total number of locks the transaction holds. Listing
    [7-1](#463519_1_En_7_Chapter.xhtml#PC1) shows an example in which multiple `UPDATE`
    statements run in a loop within a single transaction.


    ```

    declare

    @id int = 1

    begin tran

    while @id < 100000

    begin

    update Delivery.Orders

    set OrderStatusId = 1

    where OrderId between @id and @id + 4998;

    select @id += 4999;

    end

    select count(*) as [Lock Count]

    from sys.dm_tran_locks

    where request_session_id = @@SPID;

    commit

    Listing 7-1

    Lock escalation and multiple statements

    ```


    Figure [7-3](#463519_1_En_7_Chapter.xhtml#Fig3) shows the output of the `SELECT`
    statement from Listing [7-1](#463519_1_En_7_Chapter.xhtml#PC1). Even when the
    total number of locks the transaction holds is far more than the threshold, lock
    escalation is not triggered.


    ![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig3_HTML.jpg](images/463519_1_En_7_Chapter/463519_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Number of locks held by the transaction


    ## Lock Escalation Troubleshooting


    Lock escalation is completely normal. It helps to reduce locking-management overhead
    and memory usage, which improves system performance. You should keep it enabled
    unless it starts to introduce noticeable blocking issues in the system. Unfortunately,
    it is not always easy to detect if lock escalation contributes to blocking, and
    you need to analyze individual blocking cases to understand it.


    One sign of potential lock escalation blocking is a high percentage of intent-lock
    waits `(LCK_M_I*)`  in the wait statistics. Lock escalation, however, is not the
    only reason for such waits, and you need to look at other metrics during analysis.'
  trans: '

    # 启用锁升级时的 Sys.dm_tran_locks 输出


    SQL Server 会用对象共享（S）锁替换行级和页级锁。尽管从内存使用角度看这很棒——只需要维护一个锁——但它会影响并发性。正如你所见，第二个会话被阻塞了——它无法在表上获取意向排他（IX）锁，因为它与第一个会话持有的完整共享（S）锁不兼容。


    锁粒度提示，例如 `(ROWLOCK)` 和 `(PAGLOCK)`，不会影响锁升级行为。例如，使用 `(PAGLOCK)` 提示时，SQL Server
    使用完整的页级锁而非行级锁。然而，如果获取的锁数量超过阈值，这仍然可能触发锁升级。


    锁升级默认启用，并且可能引发阻塞问题，这对开发人员和数据库管理员来说可能令人困惑。我们来讨论几种典型情况。


    第一种情况是报表查询为了数据一致性目的而使用 `REPEATABLE READ` 或 `SERIALIZABLE` 隔离级别。如果报表查询在没有会话更新数据的情况下读取大量数据，这些查询可能会将共享（S）锁升级到表级。随后，所有写入者都会被阻塞，即使它们试图插入新数据或修改报表查询未读取的数据，正如你在本章前面所见。解决此问题的方法之一是切换到乐观事务隔离级别，我们在前一章中讨论过。


    第二种情况是清理过程的实现。假设你需要使用 `DELETE` 语句清理大量旧数据。如果实现方式是一次性删除大量行，你可能会将排他（X）锁升级到表级。这将阻塞所有写入者访问该表，以及处于
    `READ COMMITTED`、`REPEATABLE READ` 或 `SERIALIZABLE` 隔离级别的读取者，即使这些查询操作的数据集与你正在清理的数据完全不同。


    最后，你可以想象一个使用单个 `INSERT` 语句插入大批量行的过程。与清理过程类似，它可能将排他（X）锁升级到表级，并阻止其他会话访问该表。


    所有这些模式都有一个共同点——它们作为单个语句的一部分获取并持有大量行级和页级锁。这会触发锁升级，如果当时没有其他会话在表（或分区）级别持有不兼容的锁，升级就会成功。这将阻止其他会话在第一个会话完成事务之前获取不兼容的意向锁或完整锁（在表或分区上），无论被阻塞的会话是否试图访问受第一个会话影响的数据。


    值得再次强调的是，锁升级是由语句获取的锁数量触发的，而不是由整个事务触发的。如果各个语句各自获取的行级和页级锁少于 5,000 个，则不会触发锁升级，无论该事务持有的锁总数是多少。清单
    7-1 展示了一个在单个事务中循环运行多个 `UPDATE` 语句的例子。


    ```sql

    declare

    @id int = 1

    begin tran

    while @id < 100000

    begin

    update Delivery.Orders

    set OrderStatusId = 1

    where OrderId between @id and @id + 4998;

    select @id += 4999;

    end

    select count(*) as [Lock Count]

    from sys.dm_tran_locks

    where request_session_id = @@SPID;

    commit

    ```

    清单 7-1：锁升级与多条语句


    ![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig3_HTML.jpg](img/463519_1_En_7_Fig3_HTML.jpg)


    图 7-3：事务持有的锁数量


    ## 锁升级故障排除


    锁升级是完全正常的。它有助于减少锁管理开销和内存使用，从而提高系统性能。除非它开始在系统中引起明显的阻塞问题，否则你应该保持其启用状态。不幸的是，检测锁升级是否导致阻塞并不总是那么容易，你需要分析具体的阻塞案例来理解它。


    潜在的由锁升级引起的阻塞的一个迹象是，在等待统计中，意向锁等待 `(LCK_M_I*)` 占比很高。然而，锁升级并非此类等待的唯一原因，你在分析时还需要查看其他指标。

