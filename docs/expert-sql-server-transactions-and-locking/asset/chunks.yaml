- fmt: "### Note\n\nWe will talk about wait statistics analysis in Chapter [12](#463519_1_En_12_Chapter.xhtml).\n\
    \nThe lock escalation event leads to a full table-level lock. You would see this\
    \ in the `sys.dm_tran_locks` view output and in the blocked process report. Figure\
    \ [7-4](#463519_1_En_7_Chapter.xhtml#Fig4) illustrates the output of Listing [3-2](#463519_1_En_3_Chapter.xhtml#Par20)\
    \ from Chapter [3](#463519_1_En_3_Chapter.xhtml) if you were to run it at a time\
    \ when blocking is occurring. As you can see, the blocked session is trying to\
    \ acquire an intent lock on the object, while the blocking session—the one that\
    \ triggered lock escalation—holds an incompatible full lock.\n\n![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig4_HTML.jpg](images/463519_1_En_7_Chapter/463519_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4. Listing [3-2](#463519_1_En_3_Chapter.xhtml#Par20) output (`sys.dm_tran_locks`\
    \ view) during lock escalation\n\nIf you look at the blocked process report, you\
    \ will see that the blocked process is waiting on the intent lock on the object,\
    \ as shown in Listing [7-2](#463519_1_En_7_Chapter.xhtml#PC2).\n\n```\nListing\
    \ 7-2\nBlocked process report (partial)\n```\n\nAgain, keep in mind that there\
    \ could be other reasons for sessions to acquire full object locks or be blocked\
    \ while waiting for an intent lock on the table. You must correlate information\
    \ from other venues to confirm that the blocking occurred because of lock escalation.\n\
    \nYou can capture lock escalation events with SQL Traces. Figure [7-5](#463519_1_En_7_Chapter.xhtml#Fig5)\
    \ illustrates the output in the `Profiler` application.\n\n![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig5_HTML.jpg](images/463519_1_En_7_Chapter/463519_1_En_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5. Lock escalation event shown in SQL Server Profiler\n\nSQL Traces\
    \ provide the following attributes:\n\n*   `EventSubClass` indicates what triggered\
    \ lock escalation—number of locks or memory threshold.\n*   `IntegerData` and\
    \ `IntegerData2` show the number of locks that existed at the time of the escalation\
    \ and how many locks were converted during the escalation process. It is worth\
    \ noting that in our example lock escalation occurred when the statement acquired\
    \ 6,248 rather than 5,000 locks.\n*   `Mode` tells what kind of lock was escalated.\n\
    *   `ObjectID` is the `object_id` of the table for which lock escalation was triggered.\n\
    *   `ObjectID2` is the `HoBT` ID for which lock escalation was triggered.\n* \
    \  `Type` represents lock escalation granularity.\n*   `TextData`, `LineNumber`,\
    \ and `Offset` provide information on the batch and statement that triggered lock\
    \ escalation.\n\nAnother, and better, way of capturing lock escalation occurences\
    \ is by using Extended Events. Figure [7-6](#463519_1_En_7_Chapter.xhtml#Fig6)\
    \ illustrates a `lock_escalation` event and some of the available event fields.\
    \ This event is available in SQL Server 2012 and above.\n\n![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig6_HTML.jpg](images/463519_1_En_7_Chapter/463519_1_En_7_Fig6_HTML.jpg)\n\
    \nFigure 7-6. `lock_escalation` Extended Event\n\nThe Extended Event is useful\
    \ to understand which objects triggered lock escalation most often. You can query\
    \ and aggregate the raw captured data or, alternatively, do the aggregation in\
    \ an Extended Event session using a `histogram` target.\n\nListing [7-3](#463519_1_En_7_Chapter.xhtml#PC3)\
    \ shows the latter approach, grouping the data by `object_id` field. This code\
    \ would work in SQL Server 2012 and above.\n\n```sql\ncreate event session LockEscalationInfo\n\
    on server\nadd event\n    sqlserver.lock_escalation\n    (\n        where\n  \
    \          database_id = 5  -- DB_ID()\n    )\nadd target\n    package0.histogram\n\
    \    (\n        set\n            slots = 1024 -- Based on # of tables in the database\n\
    \            ,filtering_event_name = 'sqlserver.lock_escalation'\n           \
    \ ,source_type = 0 -- event data column\n            ,source = 'object_id' --\
    \ grouping column\n    )\nwith\n    (\n        event_retention_mode=allow_single_event_loss\n\
    \        ,max_dispatch_latency=10 seconds\n    );\nalter event session LockEscalationInfo\n\
    on server\nstate=start;\n```\nListing 7-3. Capturing number of lock escalation\
    \ occurences with xEvents\n\nThe code from Listing [7-4](#463519_1_En_7_Chapter.xhtml#PC4)\
    \ queries a session target and returns the number of lock escalations on a per-table\
    \ basis.\n\n```sql\n;with TargetData(Data)\nas\n(\n    select convert(xml,st.target_data)\
    \ as Data\n    from sys.dm_xe_sessions s join sys.dm_xe_session_targets st on\n\
    \        s.address = st.event_session_address\n    where s.name = 'LockEscalationInfo'\
    \ and st.target_name = 'histogram'\n)\n,EventInfo([count],object_id)\nas\n(\n\
    \    select\n        t.e.value('@count','int')\n        ,t.e.value('((./value)/text())[1]','int')\n\
    \    from\n        TargetData cross apply\n        TargetData.Data.nodes('/HistogramTarget/Slot')\
    \ as t(e)\n)\nselect\n    e.object_id\n    ,s.name + '.' + t.name as [table]\n\
    \    ,e.[count]\nfrom\n    EventInfo e join sys.tables t on\n        e.object_id\
    \ = t.object_id\n    join sys.schemas s on\n        t.schema_id = s.schema_id\n\
    order by\n    e.count desc;\n```\nListing 7-4. Analyzing captured results\n\n\
    You should not use this data just for the purpose of disabling lock escalation.\
    \ It is very useful, however, when you are analyzing blocking cases with object-level\
    \ blocking involved.\n\nI would like to reiterate that lock escalation is completely\
    \ normal and is a very useful feature in SQL Server. Even though it can introduce\
    \ blocking issues, it helps to preserve SQL Server memory. The large number of\
    \ locks held by the instance reduces the size of the buffer pool. As a result,\
    \ you have fewer data pages in the cache, which could lead to a higher number\
    \ of physical I/O operations and degrade the performance of queries.\n\nIn addition,\
    \ SQL Server could terminate the queries with Error 1204 when there is no available\
    \ memory to store the lock information. Figure [7-7](#463519_1_En_7_Chapter.xhtml#Fig7)\
    \ shows just such an error message.\n\n![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig7_HTML.jpg](images/463519_1_En_7_Chapter/463519_1_En_7_Fig7_HTML.jpg)\n\
    \nFigure 7-7. Error 1204\n\nIn SQL Server 2008 and above, you can control escalation\
    \ behavior at the table level by using the `ALTER TABLE SET LOCK_ESCALATION` statement.\
    \ This option affects lock escalation behavior for all indexes—both clustered\
    \ and nonclustered—defined on the table. Three options are available:\n\n*   `DISABLE:`\
    \ This option disables lock escalation for a specific table.\n*   `TABLE:` SQL\
    \ Server escalates locks to the table level. This is the default option.\n*  \
    \ `AUTO:` SQL Server escalates locks to the partition level when the table is\
    \ partitioned or to the table level when the table is not partitioned. Use this\
    \ option with large partitioned tables, especially when there are large reporting\
    \ or purge queries running on the old data.\n\n### Note\n\nThe `sys.tables` catalog\
    \ view provides information about the table lock escalation mode in the `lock_escalation`\
    \ and `lock_escalation_desc` columns.\n\nUnfortunately, SQL Server 2005 does not\
    \ support this option, and the only way to disable lock escalation in this version\
    \ is by using documented trace flags `T1211` or `T1224` at the instance or session\
    \ level. Keep in mind that you need to have `sysadmin` rights to call the `DBCC\
    \ TRACEON` command and set trace flags at the session level.\n\n*   `T1211` disables\
    \ lock escalation, regardless of the memory conditions.\n*   `T1224` disables\
    \ lock escalation based on the number-of-locks threshold, although lock escalation\
    \ can still be triggered in the case of memory pressure."
  raw: '### Note


    We will talk about wait statistics analysis in Chapter [12](#463519_1_En_12_Chapter.xhtml).


    The lock escalation event leads to a full table-level lock. You would see this
    in the `sys.dm_tran_locks` view output and in the blocked process report. Figure
    [7-4](#463519_1_En_7_Chapter.xhtml#Fig4) illustrates the output of Listing [3-2](#463519_1_En_3_Chapter.xhtml#Par20)
    from Chapter [3](#463519_1_En_3_Chapter.xhtml) if you were to run it at a time
    when blocking is occurring. As you can see, the blocked session is trying to acquire
    an intent lock on the object, while the blocking session—the one that triggered
    lock escalation—holds an incompatible full lock.


    ![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig4_HTML.jpg](images/463519_1_En_7_Chapter/463519_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Listing [3-2](#463519_1_En_3_Chapter.xhtml#Par20) output (sys.dm_tran_locks view)
    during lock escalation


    If you look at the blocked process report, you will see that the blocked process
    is waiting on the intent lock on the object, as shown in Listing [7-2](#463519_1_En_7_Chapter.xhtml#PC2).


    ```


    Listing 7-2

    Blocked process report (partial)

    ```


    Again, keep in mind that there could be other reasons for sessions to acquire
    full object locks or be blocked while waiting for an intent lock on the table.
    You must correlate information from other venues to confirm that the blocking
    occurred because of lock escalation.


    You can capture lock escalation events with SQL Traces. Figure [7-5](#463519_1_En_7_Chapter.xhtml#Fig5)
    illustrates the output in the *Profiler* application.


    ![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig5_HTML.jpg](images/463519_1_En_7_Chapter/463519_1_En_7_Fig5_HTML.jpg)


    Figure 7-5


    Lock escalation event shown in SQL Server Profiler


    SQL Traces provide the following attributes:


    *   `EventSubClass` indicates what triggered lock escalation—number of locks or
    memory threshold.


    *   `IntegerData` and `IntegerData2` show the number of locks that existed at
    the time of the escalation and how many locks were converted during the escalation
    process. It is worth noting that in our example lock escalation occurred when
    the statement acquired 6,248 rather than 5,000 locks.


    *   `Mode` tells what kind of lock was escalated.


    *   `ObjectID` is the `object_id` of the table for which lock escalation was triggered.


    *   `ObjectID2` is the *HoBT* ID for which lock escalation was triggered.


    *   `Type` represents lock escalation granularity.


    *   `TextData`, `LineNumber`*,* and `Offset` provide information on the batch
    and statement that triggered lock escalation .


    Another, and better, way of capturing lock escalation occurences is by using Extended
    Events. Figure [7-6](#463519_1_En_7_Chapter.xhtml#Fig6) illustrates a `lock_escalation`
    event and some of the available event fields. This event is available in SQL Server
    2012 and above.


    ![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig6_HTML.jpg](images/463519_1_En_7_Chapter/463519_1_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Lock_escalation Extended Event


    The Extended Event is useful to understand which objects triggered lock escalation
    most often. You can query and aggregate the raw captured data or, alternatively,
    do the aggregation in an Extended Event session using a `histogram` target.


    Listing [7-3](#463519_1_En_7_Chapter.xhtml#PC3) shows the latter approach, grouping
    the data by `object_id` field. This code would work in SQL Server 2012 and above.


    ```

    create event session LockEscalationInfo

    on server

    add event

    sqlserver.lock_escalation

    (

    where

    database_id = 5  -- DB_ID()

    )

    add target

    package0.histogram

    (

    set

    slots = 1024 -- Based on # of tables in the database

    ,filtering_event_name = ''sqlserver.lock_escalation''

    ,source_type = 0 -- event data column

    ,source = ''object_id'' -- grouping column

    )

    with

    (

    event_retention_mode=allow_single_event_loss

    ,max_dispatch_latency=10 seconds

    );

    alter event session LockEscalationInfo

    on server

    state=start;

    Listing 7-3

    Capturing number of lock escalation occurences with xEvents

    ```


    The code from Listing [7-4](#463519_1_En_7_Chapter.xhtml#PC4) queries a session
    target and returns the number of lock escalations on a per-table basis.


    ```

    ;with TargetData(Data)

    as

    (

    select convert(xml,st.target_data) as Data

    from sys.dm_xe_sessions s join sys.dm_xe_session_targets st on

    s.address = st.event_session_address

    where s.name = ''LockEscalationInfo'' and st.target_name = ''histogram''

    )

    ,EventInfo([count],object_id)

    as

    (

    select

    t.e.value(''@count'',''int'')

    ,t.e.value(''((./value)/text())[1]'',''int'')

    from

    TargetData cross apply

    TargetData.Data.nodes(''/HistogramTarget/Slot'') as t(e)

    )

    select

    e.object_id

    ,s.name + ''.'' + t.name as [table]

    ,e.[count]

    from

    EventInfo e join sys.tables t on

    e.object_id = t.object_id

    join sys.schemas s on

    t.schema_id = s.schema_id

    order by

    e.count desc;

    Listing 7-4

    Analyzing captured results

    ```


    You should not use this data just for the purpose of disabling lock escalation.
    It is very useful, however, when you are analyzing blocking cases with object-level
    blocking involved.


    I would like to reiterate that lock escalation is completely normal and is a very
    useful feature in SQL Server. Even though it can introduce blocking issues, it
    helps to preserve SQL Server memory. The large number of locks held by the instance
    reduces the size of the buffer pool*.* As a result, you have fewer data pages
    in the cache, which could lead to a higher number of physical I/O operations and
    degrade the performance of queries.


    In addition, SQL Server could terminate the queries with Error 1204 when there
    is no available memory to store the lock information. Figure [7-7](#463519_1_En_7_Chapter.xhtml#Fig7)
    shows just such an error message.


    ![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig7_HTML.jpg](images/463519_1_En_7_Chapter/463519_1_En_7_Fig7_HTML.jpg)


    Figure 7-7


    Error 1204


    In SQL Server 2008 and above, you can control escalation behavior at the table
    level by using the `ALTER TABLE SET LOCK_ESCALATION` statement. This option affects
    lock escalation behavior for all indexes—both clustered and nonclustered—defined
    on the table. Three options are available:


    *   `DISABLE:` This option disables lock escalation for a specific table.


    *   `TABLE:` SQL Server escalates locks to the table level. This is the default
    option.


    *   `AUTO:` SQL Server escalates locks to the partition level when the table is
    partitioned or to the table level when the table is not partitioned. Use this
    option with large partitioned tables, especially when there are large reporting
    or purge queries running on the old data.


    ### Note


    The `sys.tables` catalog view provides information about the table lock escalation
    mode in the `lock_escalation` and `lock_escalation_desc` columns.


    Unfortunately, SQL Server 2005 does not support this option, and the only way
    to disable lock escalation in this version is by using documented trace flags
    `T1211` or `T1224` at the instance or session level. Keep in mind that you need
    to have `sysadmin` rights to call the `DBCC TRACEON` command and set trace flags
    at the session level.


    *   `T1211` disables lock escalation, regardless of the memory conditions.


    *   `T1224` disables lock escalation based on the number-of-locks threshold, although
    lock escalation can still be triggered in the case of memory pressure.'
  trans: "### 注意\n\n我们将在第 12 章中讨论等待统计分析。\n\n锁升级事件会导致完全的表级锁。你可以在 `sys.dm_tran_locks`\
    \ 视图输出和被阻塞进程报告中看到这一点。图 7-4 展示了如果你在阻塞发生时运行第 3 章中的清单 3-2 所得到的输出。如你所见，被阻塞的会话正试图在对象上获取一个意向锁，而阻塞会话——即触发锁升级的那个会话——持有一个不兼容的完全锁。\n\
    \n![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig4_HTML.jpg](img/463519_1_En_7_Fig4_HTML.jpg)\n\
    \n图 7-4. 锁升级期间的清单 3-2 输出 (`sys.dm_tran_locks` 视图)\n\n如果你查看被阻塞进程报告，你会看到被阻塞的进程正在等待对象上的意向锁，如清单\
    \ 7-2 所示。\n\n```\n清单 7-2\n被阻塞进程报告（部分）\n```\n\n再次提醒，请记住，会话获取完全对象锁或在等待表上的意向锁时被阻塞，可能有其他原因。你必须关联来自其他来源的信息，以确认阻塞是由于锁升级造成的。\n\
    \n你可以使用 SQL 跟踪捕获锁升级事件。图 7-5 展示了 `Profiler` 应用程序中的输出。\n\n![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig5_HTML.jpg](img/463519_1_En_7_Fig5_HTML.jpg)\n\
    \n图 7-5. SQL Server Profiler 中显示的锁升级事件\n\nSQL 跟踪提供以下属性：\n\n*   `EventSubClass`\
    \ 指示是什么触发了锁升级——锁的数量或内存阈值。\n*   `IntegerData` 和 `IntegerData2` 显示升级发生时存在的锁数量以及在升级过程中转换了多少个锁。值得注意的是，在我们的示例中，当语句获取了\
    \ 6,248 个锁而非 5,000 个时，发生了锁升级。\n*   `Mode` 告知哪种类型的锁被升级。\n*   `ObjectID` 是触发锁升级的表的\
    \ `object_id`。\n*   `ObjectID2` 是触发锁升级的 `HoBT` ID。\n*   `Type` 代表锁升级的粒度。\n*  \
    \ `TextData`、`LineNumber` 和 `Offset` 提供有关触发锁升级的批处理和语句的信息。\n\n另一种也是更好的捕获锁升级发生的方法是使用扩展事件。图\
    \ 7-6 展示了一个 `lock_escalation` 事件及一些可用的事件字段。此事件在 SQL Server 2012 及更高版本中可用。\n\n\
    ![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig6_HTML.jpg](img/463519_1_En_7_Fig6_HTML.jpg)\n\
    \n图 7-6. `lock_escalation` 扩展事件\n\n该扩展事件有助于了解哪些对象最常触发锁升级。你可以查询和聚合原始捕获的数据，或者，也可以使用\
    \ `histogram` 目标在扩展事件会话中进行聚合。\n\n清单 7-3 展示了后一种方法，按 `object_id` 字段对数据进行分组。此代码适用于\
    \ SQL Server 2012 及更高版本。\n\n```sql\ncreate event session LockEscalationInfo\n\
    on server\nadd event\n    sqlserver.lock_escalation\n    (\n        where\n  \
    \          database_id = 5  -- DB_ID()\n    )\nadd target\n    package0.histogram\n\
    \    (\n        set\n            slots = 1024 -- 基于数据库中的表数量\n            ,filtering_event_name\
    \ = 'sqlserver.lock_escalation'\n            ,source_type = 0 -- 事件数据列\n     \
    \       ,source = 'object_id' -- 分组列\n    )\nwith\n    (\n        event_retention_mode=allow_single_event_loss\n\
    \        ,max_dispatch_latency=10 seconds\n    );\nalter event session LockEscalationInfo\n\
    on server\nstate=start;\n```\n清单 7-3. 使用 xEvents 捕获锁升级事件的发生次数\n\n清单 7-4 中的代码查询会话目标并返回基于每个表的锁升级次数。\n\
    \n```sql\n;with TargetData(Data)\nas\n(\n    select convert(xml,st.target_data)\
    \ as Data\n    from sys.dm_xe_sessions s join sys.dm_xe_session_targets st on\n\
    \        s.address = st.event_session_address\n    where s.name = 'LockEscalationInfo'\
    \ and st.target_name = 'histogram'\n)\n,EventInfo([count],object_id)\nas\n(\n\
    \    select\n        t.e.value('@count','int')\n        ,t.e.value('((./value)/text())[1]','int')\n\
    \    from\n        TargetData cross apply\n        TargetData.Data.nodes('/HistogramTarget/Slot')\
    \ as t(e)\n)\nselect\n    e.object_id\n    ,s.name + '.' + t.name as [table]\n\
    \    ,e.[count]\nfrom\n    EventInfo e join sys.tables t on\n        e.object_id\
    \ = t.object_id\n    join sys.schemas s on\n        t.schema_id = s.schema_id\n\
    order by\n    e.count desc;\n```\n清单 7-4. 分析捕获的结果\n\n你不应仅仅为了禁用锁升级而使用此数据。然而，当分析涉及对象级阻塞的阻塞案例时，它非常有用。\n\
    \n我想重申，锁升级是完全正常的，并且是 SQL Server 中一个非常有用的功能。尽管它可能引起阻塞问题，但它有助于保留 SQL Server 内存。实例持有的大量锁会减少缓冲池的大小。因此，缓存中的数据页会减少，这可能导致更多的物理\
    \ I/O 操作并降低查询性能。\n\n此外，当没有可用内存来存储锁信息时，SQL Server 可能会终止查询并返回错误 1204。图 7-7 显示了这样一个错误消息。\n\
    \n![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig7_HTML.jpg](img/463519_1_En_7_Fig7_HTML.jpg)\n\
    \n图 7-7. 错误 1204\n\n在 SQL Server 2008 及更高版本中，你可以使用 `ALTER TABLE SET LOCK_ESCALATION`\
    \ 语句在表级别控制升级行为。此选项影响为表定义的所有索引（包括聚集索引和非聚集索引）的锁升级行为。提供三个选项：\n\n*   `DISABLE:` 此选项禁用特定表的锁升级。\n\
    *   `TABLE:` SQL Server 将锁升级到表级别。这是默认选项。\n*   `AUTO:` 当表已分区时，SQL Server 将锁升级到分区级别；当表未分区时，升级到表级别。对于大型分区表，尤其是当有大型报告或清理查询在旧数据上运行时，请使用此选项。\n\
    \n### 注意\n\n`sys.tables` 目录视图在 `lock_escalation` 和 `lock_escalation_desc` 列中提供了有关表锁升级模式的信息。\n\
    \n不幸的是，SQL Server 2005 不支持此选项，在该版本中禁用锁升级的唯一方法是使用有记录的跟踪标志 `T1211` 或 `T1224`，在实例或会话级别进行设置。请记住，你需要拥有\
    \ `sysadmin` 权限才能调用 `DBCC TRACEON` 命令并在会话级别设置跟踪标志。\n\n*   `T1211` 禁用锁升级，无论内存条件如何。\n\
    *   `T1224` 基于锁数量阈值禁用锁升级，尽管在内存压力下仍可能触发锁升级。"
- fmt: '### Note


    You can read more about trace flags `T1211` and `T1224` at [`https://docs.microsoft.com/en-us/sql/t-sql/database-console-commands/dbcc-traceon-trace-flags-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/database-console-commands/dbcc-traceon-trace-flags-transact-sql).


    As with the other blocking issues, you should find the root cause of the lock
    escalation. You should also think about the pros and cons of disabling lock escalation
    on particular tables in the system. Although it could reduce blocking in the system,
    SQL Server would use more memory to store lock information. And, of course, you
    can consider code refactoring as another option.


    If lock escalation is triggered by the writers, you can reduce the batches to
    the point where they are acquiring fewer than 5,000 row- and page-level locks
    per object. You can still process multiple batches in the same transaction—the
    5,000 locks threshold is per statement. At the same time, you should remember
    that smaller batches are usually less effective than larger ones. You need to
    fine-tune the batch sizes and find the optimal values. It is normal to have lock
    escalation triggered if object-level locks are not held for an excessive period
    of time and/or do not affect the other sessions.


    As for lock escalation triggered by the readers, you should avoid situations in
    which many shared (S) locks are held. One example is scans due to non-optimized
    or reporting queries in the `REPEATABLE READ` or `SERIALIZABLE` transaction isolation
    levels, where queries hold shared (S) locks until the end of the transaction.
    The example shown in Listing [7-5](#463519_1_En_7_Chapter.xhtml#PC5) runs the
    `SELECT` from the `Delivery.Orders` table using the `SERIALIZABLE` isolation level.


    ```

    set transaction isolation level serializable

    begin tran

    select OrderId, OrderDate, Amount

    from Delivery.Orders with (rowlock)

    where OrderNum = ''1'';

    select

    resource_type as [Resource Type]

    ,case resource_type

    when ''OBJECT'' then

    object_name

    (

    resource_associated_entity_id

    ,resource_database_id

    )

    when ''DATABASE'' then ''DB''

    else

    (

    select object_name(object_id, resource_database_id)

    from sys.partitions

    where hobt_id = resource_associated_entity_id

    )

    end as [Object]

    ,request_mode as [Mode]

    ,request_status as [Status]

    from sys.dm_tran_locks

    where request_session_id = @@SPID;

    commit

    Listing 7-5

    Lock escalation triggered by non-optimized query

    ```


    Figure [7-8](#463519_1_En_7_Chapter.xhtml#Fig8) shows the output of the second
    query from the `sys.dm_tran_locks` view.


    ![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig8_HTML.jpg](images/463519_1_En_7_Chapter/463519_1_En_7_Fig8_HTML.jpg)


    Figure 7-8


    Selecting data in the SERIALIZABLE isolation level


    Even if the query returned just a single row, you see that shared (S) locks have
    been escalated to the table level. As usual, we need to look at the execution
    plan, shown in Figure [7-9](#463519_1_En_7_Chapter.xhtml#Fig9), to troubleshoot
    it.


    ![../images/463519_1_En_7_Chapter/463519_1_En_7_Fig9_HTML.jpg](images/463519_1_En_7_Chapter/463519_1_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Execution plan of the query


    There are no indexes on the `OrderNum` column, and SQL Server uses the `Clustered
    Index Scan` operator. Even though the query returned just a single row, it acquired
    and held shared (S) range locks on all the rows it read due to the `SERIALIZABLE`
    isolation level. As a result, lock escalation was triggered. If you add the index
    on the `OrderNum` column, it changes the execution plan to `Nonclustered Index
    Seek`. Only one row is read, very few row- and page-level locks are acquired and
    held, and lock escalation is not needed.


    In some cases, you may consider partitioning the tables and setting the lock escalation
    option to use partition-level escalation, rather than table level, using the `ALTER
    TABLE SET (LOCK_ESCALATION=AUTO)` statement. This could help in scenarios in which
    you must purge old data using the `DELETE` statement or run reporting queries
    against old data in the `REPEATABLE READ` or `SERIALIZABLE` isolation levels.
    In those cases, statements would escalate the locks to partitions, rather than
    tables, and queries that are not accessing those partitions would not be blocked.


    In other cases, you can switch to optimistic isolation levels. Finally, you would
    not have any reader-related blocking issues in the `READ UNCOMMITTED` transaction
    isolation level, where shared (S) locks are not acquired, although this method
    is not recommended because of all the other data consistency issues it introduces.


    ## Summary


    SQL Server escalates locks to the object or partition levels after the statement
    acquires and holds about 5,000 row- and page-level locks. When escalation succeeds,
    SQL Server keeps the single object-level lock, blocking other sessions with incompatible
    lock types from accessing the table. If escalation fails, SQL Server repeats escalation
    attempts after about every 1,250 new locks are acquired.


    Lock escalation fits perfectly into the “it depends” category. It reduces the
    SQL Server Lock Manager memory usage and the overhead of maintaining a large number
    of locks. At the same time, it could increase blocking in the system because of
    the object- or partition-level locks held.


    You should keep lock escalation enabled, unless you find that it introduces noticeable
    blocking issues in the system. Even in those cases, however, you should perform
    a root-cause analysis as to why blocking resulting from lock escalation occurs
    and evaluate the pros and cons of disabling it. You should also look at the other
    options available, such as code and database schema refactoring, query tuning,
    and switching to optimistic transaction isolation levels. Any of these options
    might be a better choice to solve your blocking problems than disabling lock escalation.


    # 8. Schema and Low-Priority Locks


    SQL Server uses two additional lock types called schema locks to prevent table
    and metadata alterations during query execution. This chapter will discuss schema
    locks in depth along with low-priority locks, which were introduced in SQL Server
    2014 to reduce blocking during online index rebuilds and partition switch operations.


    ## Schema Locks


    SQL Server needs to protect database metadata in order to prevent situations where
    a table’s structure is changed in the middle of query execution. The problem is
    more complicated than it seems. Even though exclusive (X) table locks can, in
    theory, block access to the table during `ALTER TABLE` operations, they would
    not work in `READ UNCOMMITTED`, `READ COMMITTED SNAPSHOT`, and `SNAPSHOT` isolation
    levels, where readers do not acquire intent shared (IS) table locks.


    SQL Server uses two additional lock types to address the problem: schema stability
    (Sch-S) and schema modification (Sch-M) locks. Schema modification (Sch-M) locks
    are acquired when any metadata changes occur and during the execution of a `TRUNCATE
    TABLE` statement. You can think of this lock type as a “super-lock.” It is incompatible
    with any other lock types, and it completely blocks access to the object.


    Like exclusive (X) locks, schema modification (Sch-M) locks are held until the
    end of the transaction. You need to keep this in mind when you run DDL statements
    within explicit transactions. While that allows you to roll back all of the schema
    changes in case of an error, it also prevents any access to the affected objects
    until the transaction is committed.'
