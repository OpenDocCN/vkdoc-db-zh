  trans: '

    ## 事务隔离级别


    对于基于磁盘的表，SQL Server 支持六种不同的事务隔离级别，如表 2-1 所示。该表还展示了每种事务隔离级别下可能发生的并发现象。


    表 2-1


    事务隔离级别与并发现象


    | 隔离级别 | 类型 | 脏读 | 不可重复读 | 幻读 | 写-写冲突 |

    | --- | --- | --- | --- | --- | --- |

    | `READ UNCOMMITTED` | 悲观 | 是 | 是 | 是 | 否 |

    | `READ COMMITTED` | 悲观 | 否 | 是 | 是 | 否 |

    | `REPEATABLE READ` | 悲观 | 否 | 否 | 是 | 否 |

    | `SERIALIZABLE` | 悲观 | 否 | 否 | 否 | 否 |

    | `READ COMMITTED SNAPSHOT` | 对读操作是乐观的。对写操作是悲观的。 | 否 | 是 | 是 | 否 |

    | `SNAPSHOT` | 乐观 | 否 | 否 | 否 | 是 |


    对于悲观隔离级别，SQL Server 严格依赖锁来防止访问被其他会话修改（有时甚至是读取）的行。对于乐观隔离级别，SQL Server 使用行版本控制，并将修改行的旧版本复制到
    `tempdb` 中一个称为版本存储区的特殊区域。其他会话将从那里读取行的旧（已提交的）版本，而不是被阻塞。


    需要注意的是，在乐观隔离级别下，SQL Server 仍然会对更新的行获取锁，以防止其他会话同时更新相同的行。我们将在第 6 章更详细地讨论这一点。


    `READ COMMITTED SNAPSHOT` 隔离级别结合了乐观和悲观并发模型。读操作（`SELECT` 查询）使用行版本控制，而写操作（`INSERT`、`UPDATE`
    和 `DELETE` 查询）则依赖锁。


    严格来说，`READ COMMITTED SNAPSHOT` 并不是一个真正的隔离级别，而是一个数据库选项（`READ_COMMITTED_SNAPSHOT`），它改变了
    `READ COMMITTED` 隔离级别下读操作（`SELECT` 查询）的默认行为。然而，在本书中，我将把此选项视为一个独立的事务隔离级别。


    ### 注意


    `READ_COMMITTED_SNAPSHOT` 数据库选项在 Microsoft Azure SQL 数据库中默认启用，而在常规版本的 SQL Server
    中默认禁用。


    你可以使用 `SET TRANSACTION ISOLATION LEVEL` 语句在会话级别设置事务隔离级别。大多数客户端库使用 `READ COMMITTED`（或者在启用
    `READ_COMMITTED_SNAPSHOT` 数据库选项时使用 `READ COMMITTED SNAPSHOT`）作为默认隔离级别。你也可以使用锁提示在每表基础上控制隔离级别，我们将在下一章讨论。


    ## 处理事务


    让我们看看系统中事务管理的几个方面，从事务类型开始。


    ### 事务类型


    SQL Server 中有三种类型的事务：显式事务、自动提交事务和隐式事务。


    显式事务由代码显式控制。你可以使用 `BEGIN TRAN` 语句启动它们。它们将保持活动状态，直到你在代码中显式调用 `COMMIT` 或 `ROLLBACK`。


    如果没有活动的事务存在，SQL Server 将使用自动提交事务——为它执行的每个语句启动并提交事务。需要特别记住的是，自动提交事务是按语句而非按模块工作的。例如，当一个存储过程由五个语句组成时，SQL
    Server 将执行五个自动提交事务。此外，如果此过程在执行过程中失败，SQL Server 不会回滚其先前已提交的自动提交事务。这种行为可能导致系统中的逻辑数据不一致。


    对于包含多个数据修改语句的逻辑，由于它们引入的日志记录开销，自动提交事务的效率低于显式事务。在这种模式下，每个语句都会为隐式的 `BEGIN TRAN` 和
    `COMMIT` 操作生成事务日志记录，这将导致大量的事务日志活动并降低系统性能。


    过多的自动提交事务还可能引起另一个潜在的性能问题。正如我已经提到的，SQL Server 实现了预写日志以支持事务持久性，通过同步地将日志记录硬化到磁盘来与数据修改保持一致。然而，在内部，SQL
    Server 会批量处理日志写入操作，并将日志记录缓存在称为日志缓冲区的小型 60 KB 内存结构中。提交日志记录会强制 SQL Server 将日志缓冲区刷新到磁盘，从而引入同步
    I/O 操作。


    图 2-1 说明了这种情况。`INSERT_1`、`UPDATE_1` 和 `DELETE_1` 操作在自动提交事务中运行，生成额外的日志记录，并在每次 `COMMIT`
    时强制日志缓冲区刷新。相比之下，`INSERT_2`、`UPDATE_2` 和 `DELETE_2` 操作在一个显式事务中运行，从而实现了更高效的日志记录。


    ![使用自动提交和显式事务的事务日志记录](img/463519_1_En_2_Fig1_HTML.jpg)


    图 2-1


    使用自动提交和显式事务的事务日志记录


