    **图 9-4**

    由于锁分区导致的死锁：步骤 1


    现在假设会话 1 需要更新同一表中的另一行，并且该批处理已被分配到另一个调度器——0 或 1。该会话需要在新的锁分区中获取另一个意向表锁，但它将被那里的架构修改（Sch-M）锁阻塞，这将导致死锁，如图
    9-5 所示。


    ![../images/463519_1_En_9_Chapter/463519_1_En_9_Fig5_HTML.jpg](img/463519_1_En_9_Fig5_HTML.jpg)

    **图 9-5**

    由于锁分区导致的死锁：步骤 2


    正如你可以猜到的，这个死锁的发生是因为同一事务的第二个批处理运行在与第一个批处理不同的调度器上。发生这种情况的一个例子是客户端应用程序在多个单独的批处理中逐行执行数据修改。你可以通过将所有更新批处理在一起（例如，使用表值参数）来减少可能的死锁机会。这也有助于提高操作的性能。


    幸运的是，在许多情况下，SQL Server 能够从不同的锁分区中*重用*意向锁并避免这种死锁。然而，这种行为没有文档记录或保证。此外，如果第二个批处理需要获取全表锁，它将无法工作；在这种情况下会发生死锁。


    让我们看一个例子，并运行清单 9-2 中的代码。在我的案例中，该批处理在 `SPID=67` 的会话中运行在调度器 13 上。


    ```

    begin tran

    select *

    from Delivery.Orders with (repeatableread)

    where OrderId = 100;

    ```

    *清单 9-2*

    锁分区死锁：步骤 1


    作为下一步，让我们在 `SPID=68` 的会话中运行 `ALTER INDEX PK_Orders ON Delivery.Orders REBUILD`
    语句。此会话成功获取了分区 0-12 上的架构修改（Sch-M）锁，并在分区 13 上被阻塞。图 9-6 说明了此时锁请求的状态。


    ![../images/463519_1_En_9_Chapter/463519_1_En_9_Fig6_HTML.jpg](img/463519_1_En_9_Fig6_HTML.jpg)

    **图 9-6**

    之前步骤后的锁请求


    作为下一步，让我们在第一个会话中运行一个 `UPDATE` 语句，如清单 9-3 所示。此时，该批处理在我的系统上运行在调度器 10 上。


    ```

    update Delivery.Orders

    set Pieces += 1

    where OrderId = 10;

    ```

    *清单 9-3*

    锁分区死锁：步骤 2'
- fmt: 'Even though the batch executed on a different scheduler, `SQL Server` was
    able to reuse the intent lock from `partition 13`, and so a deadlock did not occur.
    Figure [9-7](#463519_1_En_9_Chapter.xhtml#Fig7) illustrates the status of the
    lock requests at this point. Note that `SQL Server` converted a table-level lock
    type from intent shared (`IS`) to intent exclusive (`IX`), and there is no more
    intent shared (`IS`) lock on the table despite the existence of a row-level shared
    (`S`) lock.


    ![../images/463519_1_En_9_Chapter/463519_1_En_9_Fig7_HTML.jpg](images/463519_1_En_9_Chapter/463519_1_En_9_Fig7_HTML.jpg)


    Figure 9-7

    Lock requests after UPDATE statement


    Finally, let’s trigger an operation that will need to acquire a full table-level
    lock with the code from Listing [9-4](#463519_1_En_9_Chapter.xhtml#PC4) running
    it in the first session with `SPID = 67`.


    ```

    select count(*)

    from Delivery.Orders with (tablock)

    Listing 9-4

    Lock partitioning deadlock: Step 3

    ```


    `SQL Server` is trying to acquire a shared intent exclusive (`SIX`) lock on all
    partitions, and it is blocked by an incompatible schema modification (`Sch-M`)
    lock held on `partition 0`. This leads to deadlock.


    Listing [9-5](#463519_1_En_9_Chapter.xhtml#PC5) illustrates a partial `resource-list`
    section of the deadlock graph. The `lockPartition` attribute provides information
    about the lock partition on which the conflicts occurred.


    ```

    Listing 9-5

    Deadlock graph (partial)

    ```


    Lock partitioning–related deadlocks are rare, although they may happen, especially
    when you mix intent and full table-level locks in the same transaction. It is
    better to avoid such code patterns when possible.


    For online index rebuilds and partition switches, you can utilize low-priority
    locks if they are available. Alternatively, you can implement retry logic using
    `TRY..CATCH` around `DDL` statements when you run them from the code. A `SET DEADLOCK_PRIORITY`
    boost could also help reduce the chance that a `DDL` session will be chosen as
    the deadlock victim. You can also implement `mutex` logic based on application
    locks, which we will discuss in the next chapter.


    Lock partitioning is enabled by design in systems with 16 or more logical CPUs,
    and it cannot be disabled through documented approaches. There is the undocumented
    trace flag `T1229` that disables it; however, using undocumented trace flags is
    not recommended in production. Moreover, in systems with a large number of logical
    CPUs, disabling lock partitioning can lead to performance issues resulting from
    excessive serialization during lock-structure management. It is better to keep
    lock partitioning enabled.


    ## Summary


    Lock partitioning is automatically enabled on servers with 16 or more logical
    CPUs. When lock partitioning is enabled, `SQL Server` uses the separate locking
    queues on a per-scheduler basis. Intent shared (`IS`), intent exclusive (`IX`)
    and schema stability (`Sch-S`) locks are acquired and stored in a single partition.
    All other lock types need to be acquired across all partitions.


    `SQL Server` acquires non-partitioned lock types across all partitions in a sequential
    manner. This may lead to the situation where lock requests were granted on some
    partitions and blocked on partitions that held incompatible intent (`I*`) or schema
    stability (`Sch-S`) locks. This condition may increase the blocking during online
    schema alterations and may also lead to deadlocks in some cases.


    # 10. Application Locks


    This chapter will discuss another `SQL Server` locking feature called application
    locks, which place locks on an application resource identified by name. Application
    locks allow you to serialize access to `T-SQL` code, similar to critical sections
    and mutexes in client applications.


    ## Application Locks Overview


    `Application locks` allow an application to place a lock on an `application resource`
    that is not related to database objects and is identified by name only. The lock
    follows the regular rules in terms of lock compatibility, and it can be one of
    the following types: shared (`S`), update (`U`), exclusive (`X`), intent shared
    (`IS`), and intent exclusive (`IX`).


    An application needs to call the `sp_getapplock` stored procedure to acquire the
    lock using the following parameters:


    *   `@Resource:` specifies the name of the application lock. It is case sensitive
    regardless of the database and server collations.

    *   `@LockMode:` specifies the lock type. You need to use one of the following
    values to specify the type: `Shared`, `Update`, `IntentShared`, `IntentExclusive`,
    or `Exclusive`.

    *   `@LockOwner:` should be one of two values—`Transaction` or `Session`—and controls
    the owner (and scope) of the lock.

    *   `@LockTimeout:` specifies the timeout in milliseconds. If a stored procedure
    cannot acquire the lock within this interval, it would return an error.

    *   `@DbPrincipal:` specifies security context (The caller needs to be a member
    of the `database_principal`, `dbo`, or `db_owner` roles.)


    This procedure returns a value greater than or equal to zero in the case of success,
    and a negative value in the case of failure. As with regular locks, there is the
    possibility of deadlocks, although this would not roll back the transaction of
    the session that is chosen as the victim, but rather would return the error code
    that indicates the deadlock condition.


    An application needs to call the `sp_releaseapplock` stored procedure to release
    an application lock. Alternatively, in case the `@LockOwner` of the lock is `transaction`,
    it would be automatically released when the transaction commits or rolls back.
    This behavior is similar to that of regular locks.'
