    # 13. 内存 OLTP 并发模型


    内存 OLTP 技术于 SQL Server 2014 中引入，能显著提升 OLTP 系统的性能和吞吐量。其关键技术组件——内存优化表——将数据存储在内存中，采用无锁无闩的多版本并发控制。


    本章将概述内存 OLTP 并发模型，并解释引擎内部如何处理事务。


    ## 内存 OLTP 概述


    回溯到 SQL Server 及其他主流数据库最初设计的年代，硬件非常昂贵。那时的服务器仅有单个或极少几个 CPU，以及少量已安装内存。数据库服务器必须处理驻留在磁盘上的数据，按需将其加载到内存。


    自那时起，情况已发生翻天覆地的变化。过去 30 年间，内存价格每五年就下降十倍，硬件也变得更加经济实惠。虽然数据库确实变得更大了，但通常*活跃的*运营数据已能装入内存。


    显然，将数据缓存在缓冲池中是有益的。它减轻了 I/O 子系统的负载并提升了系统性能。然而，当系统处于高并发负载下时，仅靠此往往不足以获得所需的吞吐量。SQL
    Server 管理和保护内存中的页结构，这引入了巨大的开销，且扩展性不佳。即使采用行级锁，多个会话也无法同时修改同一数据页上的数据；它们必须彼此等待。


    或许最后一句话需要澄清。显然，多个会话可以修改同一数据页上的数据行，同时持有不同行上的排他锁（`X`）。然而，它们无法同时更新*物理*数据页和行对象，因为这可能破坏内存中的页结构。SQL
    Server 通过*闩锁*保护页来解决此问题。闩锁的工作方式类似于锁，在物理级别保护内部 SQL Server 数据结构，通过串行化对它们的写访问，使得在任何给定时间点只有一个线程能更新内存中数据页上的数据。


    最终，这限制了当前数据库引擎架构所能实现的性能提升。尽管你可以通过添加更多 CPU 和核心来扩展硬件，但那种串行化迅速成为瓶颈，并限制了系统可扩展性的提升。


    ### 注意


    你可以监控用户数据库中资源的`PAGELATCH*`等待，以理解系统中闩锁争用的影响。


    于 SQL Server 2014 引入的内存 OLTP 引擎解决了该问题。该引擎的核心组件——内存优化表——完全在内存中存储和管理所有数据，仅出于持久化目的将其持久化到磁盘。简而言之，数据行是独立的内存对象。它们不存储在数据页上；行通过内存指针链链接在一起——每个索引一条链。同样值得注意的是，内存优化表不与基于磁盘的表共享内存，它们存在于缓冲池之外。


    让我们通过一个例子来说明这一点，并创建一个内存优化表，如代码清单 13-1 所示。


    ### 注意


    该技术要求你在数据库中创建另一个文件组来存储内存 OLTP 数据。数据库创建脚本包含在本书的配套材料中。


    ```sql

    create table dbo.People

    (

    Name varchar(64) not null

    constraint PK_People

    primary key nonclustered

    hash with (bucket_count = 1024),

    City varchar(64) not null,

    index IDX_City nonclustered hash(City)

    with (bucket_count = 1024),

    )

    with (memory_optimized = on, durability = schema_and_data);

    ```

    代码清单 13-1

    创建内存优化表


    该表在`Name`和`City`列上定义了两个哈希索引。哈希索引是内存 OLTP 支持的一种新型索引。本书不会深入讨论它们，但概括而言，它们由一个哈希表（哈希桶数组，每个桶包含一个指向数据行的内存指针）组成。SQL
    Server 对索引键列应用哈希函数，函数的结果决定一行属于哪个桶。所有具有相同哈希值并属于同一桶的行链接在一个行链中；每一行都有一个指向链中下一行的指针。


    ### 注意


    正确设定哈希索引中的哈希表大小极为重要。你应该将`bucket_count`定义为索引中唯一键值数量的约 1.5 到 2 倍。


    内存 OLTP 也支持非聚集索引，其结构与基于磁盘的表中的 B-Tree 索引相对相似。当索引选择性无法估计时，它们是不错的选择。


    图 13-1 对此进行了说明。实线箭头代表`Name`列索引中的指针。虚线箭头代表`City`列索引中的指针。为简便起见，我们假设哈希函数根据字符串的首字母生成哈希值。每行中显示的两个数字表示行生存期，我稍后会解释。


    ![图 13-1](img/463519_1_En_13_Fig1_HTML.jpg)


    图 13-1

    具有两个哈希索引的内存优化表

    '
- fmt: '## Multi-Version Concurrency Control


    ### 行版本与时间戳


    正如我刚才提到的，内存优化表中的每一行都有两个值，称为 `BeginTs` 和 `EndTs`，它们定义了该行的生命周期。SQL Server 实例维护一个
    `Global Transaction Timestamp` 值，该值在事务提交时自动递增，且对于每个已提交的事务都是唯一的。`BeginTs` 存储插入该行事务的
    `Global Transaction Timestamp`，而 `EndTs` 存储删除该行事务的时间戳。对于尚未删除的行，使用一个称为 `Infinity`
    的特殊值作为其 `EndTs`。


    内存优化表中的行永远不会被更新。更新操作会创建该行的一个新版本，并将新的 `Global Transaction Timestamp` 设置为该版本的 `BeginTs`，然后通过将旧版本行的
    `EndTs` 时间戳设置为相同的值来将其标记为已删除。


    ### 事务可见性规则


    当一个新事务开始时，内存 OLTP 会为其分配一个 `logical start time`，该值代表事务开始时的 `Global Transaction
    Timestamp`。这决定了哪些版本的行对该事务可见。一个事务只有在其 `logical start time`（即事务开始时的全局时间戳）介于某行的 `BeginTs`
    和 `EndTs` 之间时，才能看到该行。


    为了说明这一点，假设我们运行了清单 [13-2] 所示的语句，并在 `Global Transaction Timestamp` 值为 100 时提交了该事务。


    ```sql

    update dbo.People

    set City = ''Cincinnati''

    where Name = ''Ann''

    ```


    > Listing 13-2

    > 在 `dbo.People` 表中更新数据


    图 [13-2] 展示了此更新事务提交后表中的数据。如你所见，我们现在有两行 `Name=''Ann''` 但生命周期不同的数据。新行被追加到由 `Name`
    列索引的哈希桶 `A` 所引用的行链中。`City` 列上的哈希索引的 `C` 桶之前没有引用任何行；因此，新行成为从该桶引用的行链中的第一行。


    ![图 13-2](images/463519_1_En_13_Chapter/463519_1_En_13_Fig2_HTML.jpg)


    > Figure 13-2

    > 更新后表中的数据


    假设你需要在一个 `logical start time`（事务开始时的 `Global Transaction Timestamp`）为 110 的事务中运行一个查询，该查询选择所有
    `Name=''Ann''` 的行。SQL Server 会计算 `Ann` 的哈希值（即 `A`），然后在 `Name` 列的哈希索引中找到对应的桶。它跟随从该桶发出的指针，该指针引用了一个
    `Name=''Adam''` 的行。此行的 `BeginTs` 为 10，`EndTs` 为 `Infinity`，因此它对事务可见。然而，`Name`
    值不匹配谓词，因此该行被忽略。


    接下来，SQL Server 跟随从 `Adam` 索引指针数组发出的指针，该指针引用了第一个 `Ann` 行。此行的 `BeginTs` 为 100，`EndTs`
    为 `Infinity`，因此它对事务可见并需要被选中。


    作为最后一步，SQL Server 跟随索引中的下一个指针。尽管最后一行也有 `Name=''Ann''`，但它的 `EndTs` 为 100，因此对该事务不可见。


    ### 垃圾回收


    SQL Server 会跟踪系统中的活动事务，并检测那些 `EndTs` 时间戳早于系统中 `oldest active transaction` 的 `logical
    start time` 的过时行。这些过时行对系统中的活动事务不可见，并最终由 `garbage collection` 进程从索引行链中移除并释放。


    ### 与隔离级别的关系


    正如你可能已经注意到的，这种并发行为和数据一致性对应于 `SNAPSHOT` 事务隔离级别，即每个事务看到的数据都是其开始时的状态。`SNAPSHOT` 是内存
    OLTP 引擎的默认事务隔离级别，该引擎也支持 `REPEATABLE READ` 和 `SERIALIZABLE` 隔离级别。然而，内存 OLTP 中的
    `REPEATABLE READ` 和 `SERIALIZABLE` 事务的行为与基于磁盘的表不同。如果违反了 `REPEATABLE READ` 或 `SERIALIZABLE`
    数据一致性规则，内存 OLTP 会引发异常并回滚事务，而不是像基于磁盘的表那样阻塞事务。


    内存 OLTP 文档还指出，自动提交的（单条语句）事务可以在 `READ COMMITTED` 隔离级别下运行。但这有点误导性。SQL Server 会在
    `SNAPSHOT` 隔离级别下提升并执行此类事务，而不需要你在代码中显式指定隔离级别。与 `SNAPSHOT` 事务类似，自动提交的 `READ COMMITTED`
    事务不会看到在其开始之后提交的更改，这与针对基于磁盘的表执行的 `READ COMMITTED` 事务的行为不同。


    让我们更详细地研究事务隔离级别和内存 OLTP 并发模型。'
  raw: '## Multi-Version Concurrency Control


    As I just mentioned, every row in a memory-optimized table has two values, called
    `BeginTs` and `EndTs`, which define the lifetime of the row. A SQL Server instance
    maintains the *Global Transaction Timestamp* value, which is auto-incremented
    when the transaction commits and is unique for every committed transaction. `BeginTs`
    stores the Global Transaction Timestamp of transactions that insert a row, and
    `EndTs` stores the timestamp of transactions that delete a row. A special value
    called `Infinity` is used as the `EndTs` for rows that have not been deleted.


    The rows in memory-optimized tables are never updated. The update operation creates
    a new version of the row, with a new Global Transaction Timestamp set as `BeginTs`,
    and marks the old version of the row as deleted by populating the `EndTs` timestamp
    with the same value.


    At the time when a new transaction starts, In-Memory OLTP assigns the *logical
    start time* for the transaction, which represents the Global Transaction Timestamp
    value at the time when the transaction starts. It dictates what version of the
    rows is visible to the transaction. A transaction can see a row only when its
    logical start time (Global Transaction Timestamp value at time when the transaction
    starts) is between the `BeginTs` and `EndTs` timestamps of the row.


    To illustrate that, let’s assume that we ran the statement shown in Listing [13-2](#463519_1_En_13_Chapter.xhtml#PC2)
    and committed the transaction when the Global Transaction Timestamp value was
    100.


    ```

    update dbo.People

    set City = ''Cincinnati''

    where Name = ''Ann''

    Listing 13-2

    Updating data in the dbo.People table

    ```


    Figure [13-2](#463519_1_En_13_Chapter.xhtml#Fig2) illustrates the data in the
    table after this update transaction has been committed. As you can see, we now
    have two rows with `Name=''Ann''` and different lifetimes. The new row has been
    appended to the row chain referenced by the hash bucket for the value of `A` in
    the index on the `Name` column. The hash index on the `City` column did not have
    any rows referenced by the `C` bucket; therefore, the new row becomes the first
    in the row chain referenced from that bucket.


    ![../images/463519_1_En_13_Chapter/463519_1_En_13_Fig2_HTML.jpg](images/463519_1_En_13_Chapter/463519_1_En_13_Fig2_HTML.jpg)


    Figure 13-2


    Data in the table after update


    Let’s assume that you need to run a query that selects all rows with `Name=''Ann''`
    in the transaction with the logical start time (Global Transaction Timestamp at
    time when transaction started) of 110\. SQL Server calculates the hash value for
    `Ann`, which is `A`*,* and finds the corresponding bucket in the hash index on
    the `Name` column. It follows the pointer from that bucket, which references a
    row with `Name=''Adam''`. This row has a `BeginTs` of 10 and an `EndTs` of `Infinity`;
    therefore, it is visible to the transaction. However, the `Name` value does not
    match the predicate, and the row is ignored.


    In the next step, SQL Server follows the pointer from the `Adam` index pointer
    array, which references the first `Ann` row. This row has a `BeginTs` of 100 and
    an `EndTs` of `Infinity`; therefore, it is visible to the transaction and needs
    to be selected.


    As a final step, SQL Server follows the next pointer in the index. Even though
    the last row also has `Name=''Ann''`, it has an `EndTs` of 100 and is invisible
    to the transaction.


    SQL Server keeps track of the active transactions in the system and detects stale
    rows with an `EndTs` timestamp older than the logical start time of the *oldest
    active transaction* in the system . Stale rows are invisible for active transactions
    in the system, and eventually they are removed from the index row chains and deallocated
    by the *garbage collection* process.


    As you should have already noticed, this concurrency behavior and data consistency
    corresponds to the `SNAPSHOT` transaction isolation level when every transaction
    *sees* the data as of the time the transaction started. `SNAPSHOT` is the default
    transaction isolation level in the In-Memory OLTP Engine, which also supports
    the `REPEATABLE READ` and `SERIALIZABLE` isolation levels. However, `REPEATABLE
    READ` and `SERIALIZABLE` transactions in the In-Memory OLTP behave differently
    than they do with disk-based tables. In-Memory OLTP raises an exception and rolls
    back a transaction if `REPEATABLE READ` or `SERIALIZABLE` data-consistency rules
    were violated rather than blocking a transaction, as with disk-based tables.


    In-Memory OLTP documentation also indicates that autocommitted (single statement)
    transactions can run in the `READ COMMITTED` isolation level. However, this is
    a bit misleading. SQL Server promotes and executes such transactions in the `SNAPSHOT`
    isolation level and does not require you to explicitly specify the isolation level
    in your code. Similar to `SNAPSHOT` transactions, the autocommitted `READ COMMITTED`
    transaction would not see the changes committed after the transaction started,
    which is a different behavior compared to `READ COMMITTED` transactions performed
    against disk-based tables.


    Let’s look at transaction isolation levels and the In-Memory OLTP Concurrency
    Model in more detail.'
  trans: '## 多版本并发控制


    ### 行版本与时间戳


    正如我刚才提到的，内存优化表中的每一行都有两个值，称为 `BeginTs` 和 `EndTs`，它们定义了该行的生命周期。SQL Server 实例维护一个
    `Global Transaction Timestamp` 值，该值在事务提交时自动递增，且对于每个已提交的事务都是唯一的。`BeginTs` 存储插入该行事务的
    `Global Transaction Timestamp`，而 `EndTs` 存储删除该行事务的时间戳。对于尚未删除的行，使用一个称为 `Infinity`
    的特殊值作为其 `EndTs`。


