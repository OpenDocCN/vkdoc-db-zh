    You can download the code used in this book from the “Source Code” section of
    the Apress website ([`www.apress.com`](http://www.apress.com)) or from the “Publications”
    section of my blog ([`http://aboutsqlserver.com`](http://aboutsqlserver.com)).
    The source code consists of the SQL Server Management Studio solution, which includes
    a set of projects (one per chapter). There is also a separate solution with the
    Blocking Monitoring Framework code.


    I am planning to update and enhance the Blocking Monitoring Framework on a regular
    basis in the future. You can always download the latest version from [`http://aboutsqlserver.com/bmframework`](http://aboutsqlserver.com/bmframework).


