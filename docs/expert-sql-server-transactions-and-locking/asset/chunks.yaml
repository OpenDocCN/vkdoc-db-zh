  trans: '

    ## 使用阻塞监控框架


    等待统计分析提供了系统健康的整体视图，有助于识别系统所有区域（包括锁和阻塞）的瓶颈。你可能能够评估系统受并发问题影响的严重程度；然而，最终你仍需要检测并处理个别的阻塞和死锁案例来解决问题。


    正如我们已经在本书第 4 章和第 5 章中讨论过的，故障排除相对直接。你需要通过反向工程阻塞或死锁状况来理解问题的根本原因。你需要识别涉及的资源、锁类型和进程，并分析为什么这些进程获取、持有并竞争相同资源上的锁。在大多数情况下，这需要你分析查询及其执行计划。


    被阻塞进程报告和死锁图都包含所需的信息。然而，它们依赖于事件发生时的 SQL Server 状态。在许多情况下，你需要查询 `计划缓存` 和其他 `数据管理视图`
    来获取查询的文本和计划。等待的时间越长，信息可用的可能性就越低。


    市场上有大量的监控工具，其中许多会捕获并为你提供数据。作为另一种选择，你可以安装本书前面提到过的阻塞监控框架。该框架使用 `事件通知`，它解析被阻塞进程报告和死锁图，并将数据持久化在一组表中。解析发生在事件发生时，此时信息仍可通过
    `数据管理视图` 获取。


    在撰写本书时，该框架包含三个主要表：


    *   `dbo.BlockedProcessesInfo` 表根据被阻塞进程报告存储有关阻塞发生的信息。它包括阻塞的持续时间、涉及的资源和锁类型、阻塞会话和被阻塞会话的详细信息，以及查询及其执行计划。


    *   `dbo.Deadlocks` 表存储有关系统中死锁事件的信息。


    *   `dbo.DeadlockProcesses` 表提供有关涉及死锁的进程的信息，包括触发死锁的语句的文本和执行计划。


    你可以使用捕获的数据来排除个别的阻塞事件。此外，你还可以对其进行聚合，以识别最常涉及阻塞或死锁情况的查询。


    代码清单 12-15 展示了返回过去三天内被阻塞次数最多的十个查询的代码。它按 `plan_hash` 对数据进行分组，该字段将具有相似执行计划的查询组合在一起。考虑那些参数值不同但最终执行计划相似的即席查询，如示例所示。


    该代码返回与 `plan_hash` 值匹配的第一个查询和执行计划，以及阻塞统计信息。或者，在 SQL Server 2016 及以上版本中，你可以将数据与查询存储数据管理视图连接，以关联来自多个来源的信息。


    ### 注意


    你可以使用 `dbo.DeadlockProcesses` 表代替 `dbo.BlockedProcessesInfo` 表，来获取最常涉及死锁的查询的信息。


    ```sql

    ;with Data

    as

    (

    select top 10

    i.BlockedPlanHash

    ,count(*) as [Blocking Counts]

    ,sum(WaitTime) as [Total Wait Time (ms)]

    from

    dbo.BlockedProcessesInfo i

    group by

    i.BlockedPlanHash

    order by

    sum(WaitTime) desc

    )

    select

    d.*, q.BlockedSql

    from

    Data d

    cross apply

    (

    select top 1 BlockedSql

    from dbo.BlockedProcessesInfo i2

    where i2.BlockedPlanHash = d.BlockedPlanHash

    order by EventDate desc

    ) q;

    ```

    代码清单 12-15

    获取被阻塞次数最多的前 10 个查询


    代码清单 12-16 展示了返回最常因等待对象级意向（I*）锁而导致阻塞的表列表的代码。这种阻塞可能由于锁升级而发生，你可以在受影响的表上禁用它来获益。


    别忘了，架构修改（Sch-M）锁也会阻塞所有其他对象级锁请求——在分析时请将其考虑在内。


    ```sql

    ;with Objects(DBID,ObjID,WaitTime)

    as

    (

    select

    ltrim(rtrim(substring(b.Resource,8,o.DBSeparator - 8)))

    ,substring(b.Resource, o.DBSeparator + 1, o.ObjectLen)

    ,b.WaitTime

    from

    dbo.BlockedProcessesInfo b

    cross apply

    (

    select

    charindex('':'',Resource,8) as DBSeparator

    ,charindex('':'',Resource, charindex('':'',Resource,8) + 1) -

    charindex('':'',Resource,8) - 1 as ObjectLen

    ) o

    where

    left(b.Resource,6) = ''OBJECT'' and

    left(b.BlockedLockMode,1) = ''I''

    )

    select

    db_name(DBID) as [database]

    ,object_name(ObjID, DBID) as [table]

    ,count(*) as [# of events]

    ,sum(WaitTime) / 1000 as [Wait Time(Sec)]

    from Objects

    group by

    db_name(DBID), object_name(ObjID, DBID);

    ```

    代码清单 12-16

    识别可能因锁升级相关阻塞而受影响的表


    阻塞监控框架是分析和排除并发问题的极其有用的工具。我建议你在服务器上安装它。


    ### 注意


    该框架的当前（2018 年 8 月）版本包含在本书的配套材料中。你可以从我的博客下载最新版本： [`http://aboutsqlserver.com/bmframework/`](http://aboutsqlserver.com/bmframework/)
    。


    ## 总结


    数据库并非存在于真空中。它们是一个庞大生态系统的一部分，该系统包括各种硬件和软件组件。客户端应用程序的缓慢和无响应不一定是数据库或 SQL Server 相关的问题。问题的根本原因可能存在于系统中的任何地方，从硬件配置错误到不正确的应用程序代码。


    在故障排除过程中，将检查整个系统基础设施作为初始步骤非常重要。这包括硬件的性能特性、网络拓扑和吞吐量、操作系统和 SQL Server 配置，以及在服务器上运行的进程和数据库。


    SQL Server 由几个主要组件组成，包括协议层、查询处理器、存储引擎、实用工具和 SQL Server 操作系统（`SQLOS`）。`SQLOS` 是操作系统和所有其他
    SQL Server 组件之间的层，它负责调度、资源管理和其他一些低级任务。


    `SQLOS` 创建的调度器数量等于系统中逻辑处理器的数量。每个调度器负责管理一组执行工作的工作者。每个任务在执行期间被分配给一个或多个工作者。


    任务在执行期间保持三种主要状态之一：`运行中`（当前在调度器上执行）、`可运行`（等待调度器执行）和`已挂起`（等待资源）。SQL Server 追踪不同类型等待的累计等待时间，并将此信息暴露给用户。等待统计分析是一种常见的性能故障排除技术，它分析系统主要的等待类型，并消除等待的根本原因。


    每种锁类型都有对应的等待类型，这有助于你识别系统中发生最多的阻塞类型。尽管如此，你仍然需要分析个别的阻塞和死锁案例，理解事件的根本原因，并在故障排除过程中解决它们。

    '
- fmt: '# 13. In-Memory OLTP Concurrency Model


    The In-Memory OLTP technology, introduced in SQL Server 2014, can significantly
    improve the performance and throughput of OLTP systems. The key technology component—memory-optimized
    tables—stores the data in-memory, utilizing lock- and latch-free multi-versioning
    concurrency control.


    This chapter will provide an overview of the In-Memory OLTP Concurrency Model
    and explain how the Engine handles transactions internally.


    ## In-Memory OLTP Overview


    Way back when SQL Server and other major databases were originally designed, hardware
    was very expensive. Servers at that time had just one or very few CPUs and a small
    amount of installed memory. Database servers had to work with data that resided
    on disk, loading it into memory on demand.


    The situation has changed dramatically since then. During the last 30 years, memory
    prices have dropped by a factor of ten every five years, and hardware has become
    more affordable. While it is also true that databases have become larger, it is
    often possible for *active* operational data to fit into memory.


    Obviously, it is beneficial to have data cached in the buffer pool. It reduces
    the load on the I/O subsystem and improves system performance. However, when systems
    work under a heavy concurrent load, it is often not enough to obtain required
    throughput. SQL Server manages and protects page structures in memory, which introduces
    large overhead and does not scale well. Even with row-level locking, multiple
    sessions cannot modify data on the same data page simultaneously; they must wait
    for each other.


    Perhaps the last sentence needs to be clarified. Obviously, multiple sessions
    can modify data rows on the same data page, holding exclusive (`X`) locks on different
    rows simultaneously. However, they cannot update *physical* data-page and row
    objects simultaneously because it could corrupt the in-memory page structure.
    SQL Server addresses this problem by protecting pages with *latches*. Latches
    work in a similar manner to locks, protecting internal SQL Server data structures
    on the physical level by serializing write access to them so only one thread can
    update data on the data page in memory at any given point in time.


    In the end, this limits the improvements that can be achieved with the current
    database engine’s architecture. Although you can scale hardware by adding more
    CPUs and cores, that serialization quickly becomes a bottleneck and a limiting
    factor in improving system scalability.


    ### Note


    You can monitor `PAGELATCH*` waits for the resources in users’ databases to understand
    the impact of latch contention in the system.


    The In-Memory OLTP Engine, introduced in SQL Server 2014, addresses that issue.
    The core component of the Engine—memory-optimized tables—stores and manages all
    data completely in-memory, persisting it on disk only for durability purposes.
    The data rows are, in a nutshell, individual in-memory objects. They are not stored
    on the data pages; the rows are linked together through chains of memory pointers—one
    chain per index. It is also worth noting that memory-optimized tables do not share
    memory with disk-based tables and live outside of the buffer pool.


    Let’s illustrate this with an example and create a memory-optimized table, as
    shown in Listing 13-1.


    ### Note


    This technology requires you to create another filegroup in the database to store
    In-Memory OLTP data. The database-creation script is included in the companion
    material for this book.


    ```sql

    create table dbo.People

    (

    Name varchar(64) not null

    constraint PK_People

    primary key nonclustered

    hash with (bucket_count = 1024),

    City varchar(64) not null,

    index IDX_City nonclustered hash(City)

    with (bucket_count = 1024),

    )

    with (memory_optimized = on, durability = schema_and_data);

    ```

    Listing 13-1

    Creating the memory-optimized table


    This table has two hash indexes defined on the `Name` and `City` columns. Hash
    indexes are the new type of index supported by In-Memory OLTP. We are not going
    to discuss them in depth in this book, but as a general overview, they consist
    of a hash table (an array of hash buckets, each of which contains a memory pointer
    to the data row). SQL Server applies a hash function to the index-key columns,
    and the result of the function determines to which bucket a row belongs. All rows
    that have the same hash value and belong to the same bucket are linked together
    in a row chain; every row has a pointer to the next row in the chain.


    ### Note


    It is extremely important to properly size a hash table in the hash index. You
    should define `bucket_count` to be about 1.5–2 times bigger than the number of
    unique key values in the index.


    In-Memory OLTP also supports nonclustered indexes, which have a relatively similar
    structure to B-Tree indexes in disk-based tables. They are a good choice when
    index selectivity cannot be estimated.


    Figure 13-1 illustrates this. Solid arrows represent pointers in the index on
    the `Name` column. Dotted arrows represent pointers in the index on the `City`
    column. For simplicity’s sake, let’s assume that the hash function generates a
    hash value based on the first letter of the string. Two numbers, displayed in
    each row, indicate row lifetime, which I will explain shortly.


    ![Figure 13-1](images/463519_1_En_13_Chapter/463519_1_En_13_Fig1_HTML.jpg)


    Figure 13-1

    Memory-optimized table with two hash indexes'
