- fmt: 'The `sys.dm_tran_locks` view returns one row for each active lock request
    in the system, which can lead to very large result sets when you run it on busy
    servers. You can reduce the amount of information and perform a self-join of this
    view based on the `resource_description` and `resource_associated_entity_id` columns,
    and you can identify the sessions that compete for the same resources, as shown
    in Listing 4-2. Such an approach allows you to filter out the results and only
    see the sessions that are involved in the active blocking conditions.


    ```sql

    select

    tl1.resource_type as [Resource Type]

    ,db_name(tl1.resource_database_id) as [DB Name]

    ,case tl1.resource_type

    when ''OBJECT'' then

    object_name

    (

    tl1.resource_associated_entity_id

    ,tl1.resource_database_id

    )

    when ''DATABASE'' then ''DB''

    else

    case when tl1.resource_database_id = db_id()

    then

    (

    select

    object_name(object_id, tl1.resource_database_id)

    from sys.partitions

    where hobt_id = tl1.resource_associated_entity_id

    )

    else ''(Run under DB context)''

    end

    end as [Object]

    ,tl1.resource_description as [Resource]

    ,tl1.request_session_id as [Session]

    ,tl1.request_mode as [Mode]

    ,tl1.request_status as [Status]

    ,wt.wait_duration_ms as [Wait (ms)]

    ,qi.sql

    ,qi.query_plan

    from

    sys.dm_tran_locks tl1 with (nolock) join

    sys.dm_tran_locks tl2 with (nolock) on

    tl1.resource_associated_entity_id = tl2.resource_associated_entity_id

    left outer join sys.dm_os_waiting_tasks wt with (nolock) on

    tl1.lock_owner_address = wt.resource_address and

    tl1.request_status = ''WAIT''

    outer apply

    (

    select

    substring(s.text, (er.statement_start_offset / 2) + 1,

    ((  case er.statement_end_offset

    when -1

    then datalength(s.text)

    else er.statement_end_offset

    end - er.statement_start_offset) / 2) + 1) as sql

    , qp.query_plan

    from

    sys.dm_exec_requests er with (nolock)

    cross apply sys.dm_exec_sql_text(er.sql_handle) s

    cross apply sys.dm_exec_query_plan(er.plan_handle) qp

    where

    tl1.request_session_id = er.session_id

    ) qi

    where

    tl1.request_status <> tl2.request_status and

    (

    tl1.resource_description = tl2.resource_description or

    (

    tl1.resource_description is null and

    tl2.resource_description is null

    )

    )

    option (recompile)

    ```


    Listing 4-2

    Filtering out blocked and blocking session information


    Figure 4-3 illustrates the output of this code. As you can see, this approach
    significantly reduces the size of the output and simplifies analysis.


    ![../images/463519_1_En_4_Chapter/463519_1_En_4_Fig3_HTML.jpg](images/463519_1_En_4_Chapter/463519_1_En_4_Fig3_HTML.jpg)


    Figure 4-3

    Blocked and blocking sessions


    ## Blocking Troubleshooting


    As you already know, blocking occurs when two or more sessions are competing for
    the same resource. You need to answer two questions during troubleshooting:


    1.  Why does the `blocking` session hold the lock on the resource?

    2.  Why does the `blocked` session acquire the lock on the resource?


    Both questions are equally important; however, there are a couple of challenges
    you may encounter when analyzing the `blocking` session data. First, as I already
    mentioned, the `blocking` session data would show the queries that are currently
    executing rather than those that caused the blocking.


    As an example, consider a situation where the session runs several data modification
    statements in a single transaction. As you remember, SQL Server would acquire
    and hold exclusive (X) locks on the updated rows until the end of the transaction.
    The blocking may occur over any of the previously updated rows with exclusive
    (X) locks held, which may or may not be acquired by the currently executing statement
    from the session.


    The second challenge is related to the `blocking chains` when the blocking session
    is also blocked by another session. This usually happens in busy OLTP systems
    and is often related to object-level locks acquired during schema alteration,
    index maintenance, or in a few other cases.


    Consider a situation where you have a Session 1 that holds an intent lock on the
    table. This intent lock would block Session 2, which may want to obtain a full
    table lock; for example, during an offline index rebuild. The blocked Session
    2, in turn, will block all other sessions that may try to obtain intent locks
    on the table.


    ### Note


    We will discuss this and other situations that may lead to blocking chains later
    in the book. For now, however, remember that you need to rewind the blocking chains
    and include the root blocking session in your analysis when you encounter such
    a condition.


    These challenges may lead to the situation where it is easier to start troubleshooting
    by looking at the `blocked` session, where you have the blocked statement and
    its execution plan available. In many cases, you can identify the root cause of
    the blocking by analyzing its execution plan, which you can obtain from the dynamic
    management views (as was demonstrated earlier) or by rerunning the query.


    Figure 4-4 shows the execution plan of the blocked query from our example.


    ![../images/463519_1_En_4_Chapter/463519_1_En_4_Fig4_HTML.jpg](images/463519_1_En_4_Chapter/463519_1_En_4_Fig4_HTML.jpg)


    Figure 4-4

    Execution plan for the blocked query


    As you can see from the execution plan, the blocked query is scanning the entire
    table looking for orders with the predicate on the `OrderNum` column. The query
    uses a `READ COMMITTED` transaction isolation level, and it acquires a shared
    (S) lock on every row in the table. As a result, at some point the query is blocked
    by the first `DELETE` query, which holds an exclusive (X) lock on one of the rows.
    It is worth noting that the query would be blocked even if the row with the exclusive
    (X) lock held did not have `OrderNum=''1000''`. SQL Server cannot evaluate the
    predicate until the shared (S) lock is acquired and the row is read.


    You can resolve this problem by optimizing the query and adding the index on the
    `OrderNum` column, which will replace the `Clustered Index Scan` with the `Nonclustered
    Index Seek` operator in the execution plan. This will significantly reduce the
    number of locks the statement acquires and eliminate lock collision and blocking
    as long as the queries do not delete and select the same rows.


    Even though in many instances you can detect and resolve the root cause of the
    blocking by analyzing and optimizing the `blocked` query, this is not always the
    case. Consider the situation where you have a session that is updating a large
    number of rows in a table and thus acquires and holds a large number of exclusive
    (X) locks on those rows. Other sessions that need to access those rows would be
    blocked, even in the case of efficient execution plans that do not perform unnecessary
    scans. The root cause of the blocking in this case is the `blocking` rather than
    `blocked` session.


    As we have already discussed, you cannot always rely on the blocked statements
    returned by data management views. In many cases, you need to analyze what code
    in the blocking session has caused the blocking. You can use the `sys.dm_exec_sessions`
    view to obtain information about the host and application of the blocking session.
    When you know which statement the blocking session is currently executing, you
    can analyze the client and T-SQL code to locate the transaction to which this
    statement belongs. One of the previously executed statements in that transaction
    would be the one that caused the blocking condition.


    The `blocked process report`, which we are about to discuss, can also help during
    such troubleshooting.'
