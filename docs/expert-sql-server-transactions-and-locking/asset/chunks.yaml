  trans: '

    `Isolationlevel` 属性向您展示当前的事务隔离级别。最后，`executionStack` 和 `inputBuf` 允许您找到死锁发生时执行的
    SQL 语句。与 `blocked process report` 相反，死锁图中的 `executionStack` 通常为您提供有关涉及死锁的查询和模块的信息。然而，在某些情况下，您需要像前一章的清单
    4-5 中所做的那样，使用 `sys.dm_exec_sql_text` 函数来获取 SQL 语句。


    死锁图的 `<resource-list>` 部分包含了有关涉及死锁的资源的信息。如清单 5-7 所示。


    #### 清单 5-7

    死锁图：`<resource-list>` 节点


    XML 元素的名称标识了资源的类型。`Keylock`、`pagelock` 和 `objectlock` 分别代表行级锁、页锁和对象锁。您还可以看到这些锁属于哪些对象和索引。最后，`owner-list`
    和 `waiter-list` 节点提供了有关拥有锁和等待锁的进程的信息，以及已获取和请求的锁的类型。您可以将这些信息与图中 `process-list`
    部分的数据关联起来。


    您可能已经猜到了，接下来的步骤与阻塞故障排除非常相似；即，您需要精确定位涉及死锁的查询，并找出死锁发生的原因。


    然而，有一个重要因素需要考虑。在大多数情况下，一个死锁涉及同一事务中每个会话的多个语句。死锁图仅为您提供最后一个语句的信息——即触发死锁的那个语句。


    您可以在 `<resource-list>` 节点中看到其他语句的 `迹象`。它显示了事务持有的锁，但没有告诉您获取这些锁的语句。在分析问题的根本原因时，识别这些语句非常有用。


    在我们的示例中，当您查看表 5-1 中显示的代码时，您会看到两个语句。`UPDATE` 语句更新单行——它在那里获取并持有一个排他 (X) 锁。您可以在死锁图的
    `<resource-list>` 节点中看到，两个进程都拥有那些排他 (X) 锁。


    接下来，您需要理解为什么 `SELECT` 查询试图在已持有排他 (X) 锁的行上获取共享 (S) 锁。您可以通过运行查询或使用 `sys.dm_exec_query_stats`
    DMV（如前一章清单 4-5 所示）从进程节点查看 `SELECT` 语句的执行计划。结果，您将得到如图 5-17 所示的执行计划。该图还显示了查询执行期间获取的锁的数量。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig17_HTML.jpg](img/463519_1_En_5_Fig17_HTML.jpg)


    ##### 图 5-17

    查询的执行计划


    ### 提示

    您可以使用 `sys.dm_exec_procedure_stats` 视图获取存储过程的缓存执行计划。


    如您所见，计划中有一个 `Clustered Index Scan`，这为您提供了足够的分析数据。`SELECT` 查询扫描了整个表。因为两个进程都使用 `READ
    COMMITTED` 隔离级别，查询试图获取表中每一行的共享 (S) 锁，并被另一个会话持有的排他 (X) 锁所阻塞。即使那些行没有查询正在寻找的 `CustomerId`
    也无所谓。为了评估这个谓词，查询必须读取这些行，这需要获取它们的共享 (S) 锁。


    您可以通过在 `CustomerID` 列上添加一个非聚集索引来解决这种死锁情况。这将消除 `Clustered Index Scan` 并用 `Index
    Seek` 运算符替代，如图 5-18 所示。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig18_HTML.jpg](img/463519_1_En_5_Fig18_HTML.jpg)


    ##### 图 5-18

    带有非聚集索引的查询执行计划


    查询将只读取属于特定客户的行，而不是获取表中每一行的共享 (S) 锁。这将大大减少需要获取的共享 (S) 锁的数量，并防止查询被属于不同客户的行上的排他 (X)
    锁所阻塞。


    不幸的是，死锁故障排除对计划缓存的依赖性与阻塞故障排除相同。您通常需要从那里获取涉及死锁的语句的文本和执行计划。计划缓存中的数据会随时间变化，等待时间越长，所需信息存在的可能性就越小。


    您可以通过实施基于事件通知的监控解决方案来解决此问题，类似于我们在前一章所做的。该代码作为阻塞监控框架代码的一部分包含在本书的配套材料中，也可以从我的博客下载：[`http://aboutsqlserver.com/bmframework`](http://aboutsqlserver.com/bmframework)。


    最后，在某些情况下，您可能会遇到查询内并行死锁——当一个具有并行执行计划的查询自身发生死锁时。幸运的是，这种情况很少见，通常是由 SQL Server 中的错误而不是应用程序或数据库问题引起的。当死锁图中有两个以上具有相同
    `SPID` 的进程，并且 `<resource-list>` 中列出了 `exchangeEvent` 和/或 `threadPoll` 作为资源，而没有任何关联的锁资源时，您可以检测到这种情况。当这种情况发生时，您可以通过使用
    `MAXDOP` 提示减少甚至完全移除查询的并行度来解决问题。此问题也很可能已在最新的服务包或累积更新中得到修复。

    '
- fmt: '## Deadlock Due to `IGNORE_DUP_KEY` Index Option


    There is one very particular type of deadlock that is extremely confusing and
    hard to explain. At first glance, it seems that this deadlock violates the SQL
    Server Concurrency Model by using range locks in non-`SERIALIZABLE` isolation
    levels. However, there is a simple explanation.


    As you remember, SQL Server uses range locks to protect a range of the index keys,
    thus avoiding phantom and non-repeatable reads phenomena. Such locks guarantee
    that queries executed in a transaction will always work with the same set of data
    and would be unaffected by any modifications from the other sessions.


    There is another case, however, when SQL Server uses the range locks. They are
    used during data modification of nonclustered indexes that have the `IGNORE_DUP_KEY`
    option set to `ON`. When this is the case, SQL Server ignores the rows with duplicated
    values of the key rather than raising an exception.


    Let’s look at the example and create a table, as shown in Listing 5-8.


    ```sql

    create table dbo.IgnoreDupKeysDeadlock

    (

    CICol int not null,

    NCICol int not null

    );

    create unique clustered index IDX_IgnoreDupKeysDeadlock_CICol

    on dbo.IgnoreDupKeysDeadlock(CICol);

    create unique nonclustered index IDX_IgnoreDupKeysDeadlock_NCICol

    on dbo.IgnoreDupKeysDeadlock(NCICol)

    with (ignore_dup_key = on);

    insert into dbo.IgnoreDupKeysDeadlock(CICol, NCICol)

    values(0,0),(5,5),(10,10),(20,20);

    ```

    **Listing 5-8** `IGNORE_DUP_KEY` deadlock: Table creation


    Now, let’s start the transaction by using the `READ UNCOMMITTED` isolation level
    and then insert a row into the table, checking the locks acquired by the session.
    The code is shown in Listing 5-9.


    ```sql

    set transaction isolation level read uncommitted

    begin tran

    insert into dbo.IgnoreDupKeysDeadlock(CICol,NCICol)

    values(1,1);

    select request_session_id, resource_type, resource_description

    ,resource_associated_entity_id, request_mode, request_type, request_status

    from sys.dm_tran_locks

    where request_session_id = @@SPID;

    ```

    **Listing 5-9** `IGNORE_DUP_KEY` deadlock: Inserting a row into the table


    Figure 5-19 illustrates the output from the `sys.dm_tran_locks` view. As you can
    see, the session acquired two exclusive (X) locks on the rows in the clustered
    and nonclustered indexes. It also acquired a range (RangeS-U) lock on the nonclustered
    index. This lock type means that the existing keys are protected with shared (S)
    locks, and the interval itself is protected with an update (U) lock.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig19_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig19_HTML.jpg)

    **Figure 5-19** Locks acquired by the first session


    In this scenario, the range lock is required because of the way SQL Server handles
    data modifications. As we have already discussed, the data is modified in the
    clustered index first, followed by nonclustered indexes. With `IGNORE_DUP_KEY=ON`,
    SQL Server needs to prevent the situation where duplicated keys are inserted into
    nonclustered indexes simultaneously after the clustered index inserts, and therefore
    some inserts need to be rolled back. Thus, it locks the range of the keys in the
    nonclustered index, preventing other sessions from inserting any rows there.


    We can confirm it by looking at the `lock_acquired` Extended Event as shown in
    Figure 5-20. As you can see, the range lock was acquired before exclusive (X)
    locks in both indexes.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig20_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig20_HTML.jpg)

    **Figure 5-20** `lock_acquired` Extended Events


    The key problem here, however, is that range locks behave the same way as they
    do in the `SERIALIZABLE` isolation level. They are held until the end of the transaction
    regardless of the isolation level in use. This behavior greatly increases the
    chance of deadlocks.


    Let’s run the code from Listing 5-10 in another session. The first statement would
    succeed, while the second would be blocked.


    ```sql

    set transaction isolation level read uncommitted

    begin tran

    -- Success

    insert into dbo.IgnoreDupKeysDeadlock(CICol,NCICol)

    values(12,12);

    -- Statement is blocked

    insert into dbo.IgnoreDupKeysDeadlock(CICol,NCICol)

    values(2,2);

    commit;

    ```

    **Listing 5-10** `IGNORE_DUP_KEY` deadlock: Second session code


    Now, if we look at the locks held by both sessions, we would see the picture shown
    in Figure 5-21. The range (RangeS-U) lock from the first session protects the
    interval of `0..5` and blocks the second session, which is trying to acquire a
    range lock in the same interval.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig21_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig21_HTML.jpg)

    **Figure 5-21** Lock requests at time of blocking


    The second session, in turn, is holding a range lock (RangeS-U) on the interval
    of `10..20`. If the first session tries to insert another row into that interval
    with the code from Listing 5-11, it would be blocked, which would lead to the
    classic deadlock situation.


    ```sql

    insert into dbo.IgnoreDupKeysDeadlock(CICol,NCICol)

    values(11,11);

    ```

    **Listing 5-11** `IGNORE_DUP_KEY` deadlock: Second insert from the first session


    Figure 5-22 shows the partial output from the deadlock graph. As you can see,
    this particular pattern is clearly identifiable by the presence of range locks
    in non-`SERIALIZABLE` isolation levels.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig22_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig22_HTML.jpg)

    **Figure 5-22** Deadlock graph


    There is very little you can do about this problem besides removing the `IGNORE_DUP_KEY`
    index option. Fortunately, this option is rarely required, and in many cases the
    issue can be solved by using the `NOT EXISTS` predicate and/or with staging tables.


    Finally, it is important to note that SQL Server does not use range locks to enforce
    the `IGNORE_DUP_KEY=ON` setting in clustered indexes. The data is inserted or
    modified in the clustered indexes first, and SQL Server does not need to use range
    locks to avoid race conditions.'
  raw: '## Deadlock Due to IGNORE_DUP_KEY Index Option


    There is one very particular type of deadlock that is extremely confusing and
    hard to explain. At first glance, it seems that this deadlock violates the SQL
    Server Concurrency Model by using range locks in non-`SERIALIZABLE` isolation
    levels. However, there is a simple explanation.


    As you remember, SQL Server uses range locks to protect a range of the index keys,
    thus avoiding phantom and non-repeatable reads phenomena. Such locks guarantee
    that queries executed in a transaction will always work with the same set of data
    and would be unaffected by any modifications from the other sessions.


    There is another case, however, when SQL Server uses the range locks. They are
    used during data modification of nonclustered indexes that have the `IGNORE_DUP_KEY`
    option set to `ON`. When this is the case, SQL Server ignores the rows with duplicated
    values of the key rather than raising an exception.


    Let’s look at the example and create a table, as shown in Listing [5-8](#463519_1_En_5_Chapter.xhtml#PC8).


    ```

    create table dbo.IgnoreDupKeysDeadlock

    (

    CICol int not null,

    NCICol int not null

    );

    create unique clustered index IDX_IgnoreDupKeysDeadlock_CICol

    on dbo.IgnoreDupKeysDeadlock(CICol);

    create unique nonclustered index IDX_IgnoreDupKeysDeadlock_NCICol

    on dbo.IgnoreDupKeysDeadlock(NCICol)

    with (ignore_dup_key = on);

    insert into dbo.IgnoreDupKeysDeadlock(CICol, NCICol)

    values(0,0),(5,5),(10,10),(20,20);

    Listing 5-8

    IGNORE_DUP_KEY deadlock: Table creation

    ```


    Now, let’s start the transaction by using the `READ UNCOMMITTED` isolation level
    and then insert a row into the table, checking the locks acquired by the session.
    The code is shown in Listing [5-9](#463519_1_En_5_Chapter.xhtml#PC9).


    ```

    set transaction isolation level read uncommitted

    begin tran

    insert into dbo.IgnoreDupKeysDeadlock(CICol,NCICol)

    values(1,1);

    select request_session_id, resource_type, resource_description

    ,resource_associated_entity_id, request_mode, request_type, request_status

    from sys.dm_tran_locks

    where request_session_id = @@SPID;

    Listing 5-9

    IGNORE_DUP_KEY deadlock: Inserting a row into the table

    ```


    Figure [5-19](#463519_1_En_5_Chapter.xhtml#Fig19) illustrates the output from
    the `sys.dm_tran_locks` view. As you can see, the session acquired two exclusive
    (X) locks on the rows in the clustered and nonclustered indexes. It also acquired
    a range (RangeS-U) lock on the nonclustered index. This lock type means that the
    existing keys are protected with shared (S) locks, and the interval itself is
    protected with an update (U) lock.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig19_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig19_HTML.jpg)


    Figure 5-19


    Locks acquired by the first session


    In this scenario, the range lock is required because of the way SQL Server handles
    data modifications. As we have already discussed, the data is modified in the
    clustered index first, followed by nonclustered indexes. With `IGNORE_DUP_KEY=ON`,
    SQL Server needs to prevent the situation where duplicated keys are inserted into
    nonclustered indexes simultaneously after the clustered index inserts, and therefore
    some inserts need to be rolled back. Thus, it locks the range of the keys in the
    nonclustered index, preventing other sessions from inserting any rows there.


    We can confirm it by looking at the `lock_acquired` Extended Event as shown in
    Figure [5-20](#463519_1_En_5_Chapter.xhtml#Fig20). As you can see, the range lock
    was acquired before exclusive (X) locks in both indexes.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig20_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig20_HTML.jpg)


    Figure 5-20


    lock_acquired Extended Events


    The key problem here, however, is that range locks behave the same way as they
    do in the `SERIALIZABLE` isolation level. They are held until the end of the transaction
    regardless of the isolation level in use. This behavior greatly increases the
    chance of deadlocks.


    Let’s run the code from Listing [5-10](#463519_1_En_5_Chapter.xhtml#PC10) in another
    session. The first statement would succeed, while the second would be blocked.


    ```

    set transaction isolation level read uncommitted

    begin tran

    -- Success

    insert into dbo.IgnoreDupKeysDeadlock(CICol,NCICol)

    values(12,12);

    -- Statement is blocked

    insert into dbo.IgnoreDupKeysDeadlock(CICol,NCICol)

    values(2,2);

    commit;

    Listing 5-10

    IGNORE_DUP_KEY deadlock: Second session code

    ```


    Now, if we look at the locks held by both sessions, we would see the picture shown
    in Figure [5-21](#463519_1_En_5_Chapter.xhtml#Fig21). The range (RangeS-U) lock
    from the first session protects the interval of `0..5` and blocks the second session,
    which is trying to acquire a range lock in the same interval.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig21_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig21_HTML.jpg)


    Figure 5-21


    Lock requests at time of blocking


    The second session, in turn, is holding a range lock (RangeS-U) on the interval
    of `10..20`. If the first session tries to insert another row into that interval
    with the code from Listing [5-11](#463519_1_En_5_Chapter.xhtml#PC11), it would
    be blocked, which would lead to the classic deadlock situation.


    ```

    insert into dbo.IgnoreDupKeysDeadlock(CICol,NCICol)

    values(11,11);

    Listing 5-11

    IGNORE_DUP_KEY deadlock: Second insert from the first session

    ```


    Figure [5-22](#463519_1_En_5_Chapter.xhtml#Fig22) shows the partial output from
    the deadlock graph . As you can see, this particular pattern is clearly identifiable
    by the presence of range locks in non-`SERIALIZABLE` isolation levels.


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig22_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig22_HTML.jpg)


    Figure 5-22


    Deadlock graph


    There is very little you can do about this problem besides removing the `IGNORE_DUP_KEY`
    index option. Fortunately, this option is rarely required, and in many cases the
    issue can be solved by using the `NOT EXISTS` predicate and/or with staging tables.


    Finally, it is important to note that SQL Server does not use range locks to enforce
    the `IGNORE_DUP_KEY=ON` setting in clustered indexes . The data is inserted or
    modified in the clustered indexes first, and SQL Server does not need to use range
    locks to avoid race conditions.'
  trans: '## 由于 `IGNORE_DUP_KEY` 索引选项导致的死锁


    存在一种非常特殊且令人困惑、难以解释的死锁类型。乍看之下，这种死锁似乎通过在非 `SERIALIZABLE` 隔离级别使用范围锁，违反了 SQL Server
    的并发模型。然而，其解释其实很简单。


    如你所知，SQL Server 使用范围锁来保护索引键的范围，从而避免幻读和不可重复读现象。此类锁保证在事务中执行的查询始终处理同一组数据，并且不受其他会话修改的影响。


    但是，还有另一种情况 SQL Server 会使用范围锁：在对设置了 `IGNORE_DUP_KEY` 选项为 `ON` 的非聚集索引进行数据修改时。在这种情况下，SQL
    Server 会忽略具有重复键值的行，而不是引发异常。


    让我们看一个例子，创建一个表，如清单 5-8 所示。


    ```sql

    create table dbo.IgnoreDupKeysDeadlock

    (

    CICol int not null,

    NCICol int not null

    );

    create unique clustered index IDX_IgnoreDupKeysDeadlock_CICol

    on dbo.IgnoreDupKeysDeadlock(CICol);

    create unique nonclustered index IDX_IgnoreDupKeysDeadlock_NCICol

    on dbo.IgnoreDupKeysDeadlock(NCICol)

    with (ignore_dup_key = on);

    insert into dbo.IgnoreDupKeysDeadlock(CICol, NCICol)

    values(0,0),(5,5),(10,10),(20,20);

    ```

    **清单 5-8** `IGNORE_DUP_KEY` 死锁：表创建


    现在，让我们使用 `READ UNCOMMITTED` 隔离级别启动事务，然后向表中插入一行，并检查会话获取的锁。代码如清单 5-9 所示。


    ```sql

    set transaction isolation level read uncommitted

    begin tran

    insert into dbo.IgnoreDupKeysDeadlock(CICol,NCICol)

    values(1,1);

    select request_session_id, resource_type, resource_description

    ,resource_associated_entity_id, request_mode, request_type, request_status

    from sys.dm_tran_locks

    where request_session_id = @@SPID;

    ```

    **清单 5-9** `IGNORE_DUP_KEY` 死锁：向表中插入一行


    图 5-19 展示了 `sys.dm_tran_locks` 视图的输出。如你所见，会话在聚集索引和非聚集索引的行上获取了两个排他锁。它还在非聚集索引上获取了一个范围锁。此锁类型表示现有键受共享锁保护，而区间本身受更新锁保护。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig19_HTML.jpg](img/463519_1_En_5_Fig19_HTML.jpg)

    **图 5-19** 第一个会话获取的锁


    在此场景中，由于 SQL Server 处理数据修改的方式，需要范围锁。正如我们已经讨论过的，数据首先在聚集索引中修改，然后是非聚集索引。当 `IGNORE_DUP_KEY=ON`
    时，SQL Server 需要防止在聚集索引插入后，重复键同时插入到非聚集索引中的情况，从而导致某些插入需要回滚。因此，它锁定非聚集索引中的键范围，阻止其他会话在那里插入任何行。


    我们可以通过查看图 5-20 所示的 `lock_acquired` 扩展事件来确认这一点。如你所见，范围锁是在两个索引中获取排他锁之前获取的。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig20_HTML.jpg](img/463519_1_En_5_Fig20_HTML.jpg)

    **图 5-20** `lock_acquired` 扩展事件


    然而，这里的关键问题是，范围锁的行为与在 `SERIALIZABLE` 隔离级别中的行为相同。无论使用何种隔离级别，它们都会一直持有直到事务结束。这种行为大大增加了死锁的可能性。


    让我们在另一个会话中运行清单 5-10 中的代码。第一条语句会成功，而第二条语句将被阻塞。


    ```sql

    set transaction isolation level read uncommitted

    begin tran

    -- Success

    insert into dbo.IgnoreDupKeysDeadlock(CICol,NCICol)

    values(12,12);

    -- Statement is blocked

    insert into dbo.IgnoreDupKeysDeadlock(CICol,NCICol)

    values(2,2);

    commit;

    ```

    **清单 5-10** `IGNORE_DUP_KEY` 死锁：第二个会话代码


    现在，如果我们查看两个会话持有的锁，将会看到图 5-21 所示的情况。来自第一个会话的范围锁保护了 `0..5` 区间，并阻塞了试图在同一区间获取范围锁的第二个会话。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig21_HTML.jpg](img/463519_1_En_5_Fig21_HTML.jpg)

    **图 5-21** 阻塞发生时的锁请求


    反过来，第二个会话持有 `10..20` 区间上的范围锁。如果第一个会话尝试使用清单 5-11 中的代码向该区间插入另一行，它将被阻塞，从而导致经典的死锁情况。


    ```sql

    insert into dbo.IgnoreDupKeysDeadlock(CICol,NCICol)

    values(11,11);

    ```

    **清单 5-11** `IGNORE_DUP_KEY` 死锁：第一个会话的第二次插入


    图 5-22 显示了死锁图的部分输出。如你所见，通过存在非 `SERIALIZABLE` 隔离级别中的范围锁，可以清晰地识别出这种特定模式。


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig22_HTML.jpg](img/463519_1_En_5_Fig22_HTML.jpg)

    **图 5-22** 死锁图


    除了移除 `IGNORE_DUP_KEY` 索引选项外，你对此问题几乎无能为力。幸运的是，这个选项很少需要，并且在许多情况下，可以通过使用 `NOT EXISTS`
    谓词和/或暂存表来解决。


    最后，需要注意的是，SQL Server 不会使用范围锁来强制在聚集索引中设置 `IGNORE_DUP_KEY=ON`。数据首先在聚集索引中插入或修改，SQL
    Server 不需要使用范围锁来避免竞争条件。'
- fmt: "## Reducing the Chance of Deadlocks\n\nFinally, there are several practical\
    \ bits of advice I can provide toward helping to reduce the chance of deadlocks\
    \ in the system:\n\n1.  Optimize the queries. Scans introduced by non-optimized\
    \ queries are the most common causes of deadlocks. The right indexes not only\
    \ improve the performance of the queries, but also reduce the number of rows that\
    \ need to be read and locks that need to be acquired, thus reducing the chance\
    \ of lock collisions with the other sessions.\n\n2.  Keep locks as short as possible.\
    \ As you will recall, all exclusive (`X`) locks are held until the end of the\
    \ transaction. Make transactions short and try to update data as close to the\
    \ end of the transaction as possible to reduce the chance of lock collision. In\
    \ our example from Table [5-1](#463519_1_En_5_Chapter.xhtml#Tab1), you can change\
    \ the code and swap around the `SELECT` and `UPDATE` statements. This would solve\
    \ the particular deadlock problem because the transactions do not have any statements\
    \ that can be blocked after exclusive (`X`) locks are acquired.\n\n3.  Consider\
    \ using optimistic isolation levels such as `READ COMMITTED SNAPSHOT` or `SNAPSHOT`.\
    \ When it is impossible, use the lowest transaction isolation level that provides\
    \ the required data consistency. This reduces the time shared (`S`) locks are\
    \ held. Even if you swapped the `SELECT` and `UPDATE` statements in the previous\
    \ example, you would still have the deadlock in the `REPEATABLE READ` or `SERIALIZABLE`\
    \ isolation levels. With those isolation levels, shared (`S`) locks are held until\
    \ the end of the transaction, and they would block `UPDATE` statements. In `READ\
    \ COMMITTED` mode, shared (`S`) locks are released after a row is read, and `UPDATE`\
    \ statements would not be blocked.\n\n4.  Avoid updating a row multiple times\
    \ within the same transaction when multiple indexes are involved. As you saw earlier\
    \ in this chapter, SQL Server does not place exclusive (`X`) locks on nonclustered\
    \ index rows when index columns are not updated. Other sessions can place incompatible\
    \ locks there and block subsequent updates, which would lead to deadlocks.\n\n\
    5.  Use retry logic. Wrap critical code into `TRY..CATCH` blocks and retry the\
    \ action if deadlock occurs. The error number for the exception caused by the\
    \ deadlock is `1205`. The code in Listing [5-12](#463519_1_En_5_Chapter.xhtml#PC12)\
    \ shows how you can implement that.\n\n```sql\n-- Declare and set variable to\
    \ track number of retries to try before exiting.\ndeclare\n    @retry tinyint\
    \ = 5\n-- Keep trying to update table if this task is selected as the deadlock\
    \ victim.\nwhile (@retry > 0)\nbegin\n    begin try\n        begin tran\n    \
    \        -- some code that can lead to the deadlock\n        commit\n    end try\n\
    \    begin catch\n        -- Check error number. If deadlock victim error, then\
    \ reduce retry count\n        -- for next update retry. If some other error occurred,\
    \ then exit WHILE loop.\n        if (error_number() = 1205)\n            set @retry\
    \ = @retry - 1;\n        else\n            set @retry = 0;\n        if @@trancount\
    \ > 0\n            rollback;\n    end catch\nend\n```\nListing 5-12\nUsing `TRY..CATCH`\
    \ block to retry the operation in case of deadlock\n\n## Summary\n\nWith the exception\
    \ of intra-query parallelism deadlocks, which are considered to be a bug in the\
    \ SQL Server code, deadlocks occur when multiple sessions compete for the same\
    \ set of resources.\n\nThe key element in deadlock troubleshooting is the deadlock\
    \ graph, which provides information about the processes and resources involved\
    \ in the deadlock. You can collect the deadlock graph by enabling trace flag `T1222`,\
    \ capturing `xml_deadlock_report` Extended Event and `Deadlock graph` SQL Trace\
    \ event, or setting up a deadlock event notification in the system. In SQL Server\
    \ 2008 and above, the `xml_deadlock_report` event is included in the `system_health`\
    \ Extended Event session, which is enabled by default on every SQL Server installation.\n\
    \nThe deadlock graph will provide you with information about the queries that\
    \ triggered the deadlock. You should remember, however, that in the majority of\
    \ cases, a deadlock involves multiple statements that acquired and held the locks\
    \ within the same transaction and you may need to analyze all of them to address\
    \ the problem.\n\nEven though deadlocks can happen for many reasons, more often\
    \ than not they happen because of excessive locking during scans in non-optimized\
    \ queries. Query optimization can help to address them.\n\n# 6. Optimistic Isolation\
    \ Levels\n\nOptimistic transaction isolation levels were introduced in SQL Server\
    \ 2005 as a new way to deal with blocking problems and address concurrency phenomena\
    \ in a system. With optimistic transaction isolation levels, queries read “old”\
    \ committed versions of rows while accessing data modified by the other sessions,\
    \ rather than being blocked by the incompatibility of shared (`S`) and exclusive\
    \ (`X`) locks.\n\nThis chapter will explain how optimistic isolation levels are\
    \ implemented and how they affect the locking behavior of the system.\n\n## Row\
    \ Versioning Overview\n\nWith optimistic transaction isolation levels, when updates\
    \ occur, SQL Server stores the old versions of the rows in a special part of `tempdb`\
    \ called the `version store`. The original rows in the database reference them\
    \ with 14-byte version pointers, which SQL Server adds to modified (updated and\
    \ deleted) rows. Depending on the situation, you can have more than one version\
    \ record stored in the version store for the row. Figure [6-1](#463519_1_En_6_Chapter.xhtml#Fig1)\
    \ illustrates this behavior.\n\n![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig1_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1\nVersion store\n\nNow, when readers (and sometimes writers) access\
    \ a row that holds an exclusive (`X`) lock, they read the old version from the\
    \ version store rather than being blocked, as shown in Figure [6-2](#463519_1_En_6_Chapter.xhtml#Fig2).\n\
    \n![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig2_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2\nReaders and version store\n\nAs you can guess, while optimistic\
    \ isolation levels help reduce blocking, there are some tradeoffs. Most significant\
    \ among these is that they contribute to `tempdb` load. Using optimistic isolation\
    \ levels on highly volatile systems can lead to very heavy `tempdb` activity and\
    \ can significantly increase `tempdb` size. We will look at this issue in greater\
    \ detail later in this chapter.\n\nThere is overhead during data modification\
    \ and retrieval. SQL Server needs to copy the data to `tempdb` as well as maintain\
    \ a linked list of the version records. Similarly, it needs to traverse that list\
    \ when reading data. This adds additional CPU, memory, and I/O load. You need\
    \ to remember these tradeoffs, especially when you host the system in the cloud,\
    \ where I/O performance is often less efficient than that of modern high-end disk\
    \ arrays you can find on-premises.\n\nFinally, optimistic isolation levels contribute\
    \ to index fragmentation. When a row is modified, SQL Server increases the row\
    \ size by 14 bytes due to the version pointer. If a page is tightly packed and\
    \ a new version of the row does not fit into the page, it will lead to a page\
    \ split and further fragmentation. We will look at this behavior in more depth\
    \ later in the chapter.\n\n## Optimistic Transaction Isolation Levels\n\nThere\
    \ are two optimistic transaction isolation levels: `READ COMMITTED SNAPSHOT` and\
    \ `SNAPSHOT`. To be precise, `SNAPSHOT` is a separate transaction isolation level,\
    \ while `READ COMMITTED SNAPSHOT` is a database option that changes the behavior\
    \ of the readers in the `READ COMMITTED` transaction isolation level.\n\nLet's\
    \ examine these levels in depth."
  raw: '## Reducing the Chance of Deadlocks


    Finally, there are several practical bits of advice I can provide toward helping
    to reduce the chance of deadlocks in the system:


    1.  Optimize the queries. Scans introduced by non-optimized queries are the most
    common causes of deadlocks. The right indexes not only improve the performance
    of the queries, but also reduce the number of rows that need to be read and locks
    that need to be acquired, thus reducing the chance of lock collisions with the
    other sessions.


    2.  Keep locks as short as possible. As you will recall, all exclusive (X) locks
    are held until the end of the transaction. Make transactions short and try to
    update data as close to the end of the transaction as possible to reduce the chance
    of lock collision. In our example from Table [5-1](#463519_1_En_5_Chapter.xhtml#Tab1),
    you can change the code and swap around the `SELECT` and `UPDATE` statements.
    This would solve the particular deadlock problem because the transactions do not
    have any statements that can be blocked after exclusive (X) locks are acquired.


    3.  Consider using optimistic isolation levels such as `READ COMMITTED SNAPSHOT`
    or `SNAPSHOT`. When it is impossible, use the lowest transaction isolation level
    that provides the required data consistency. This reduces the time shared (S)
    locks are held. Even if you swapped the `SELECT` and `UPDATE` statements in the
    previous example, you would still have the deadlock in the `REPEATABLE READ` or
    `SERIALIZABLE` isolation levels. With those isolation levels, shared (S) locks
    are held until the end of the transaction, and they would block `UPDATE` statements.
    In `READ COMMITTED` mode, shared (S) locks are released after a row is read, and
    `UPDATE` statements would not be blocked.


    4.  Avoid updating a row multiple times within the same transaction when multiple
    indexes are involved. As you saw earlier in this chapter, SQL Server does not
    place exclusive (X) locks on nonclustered index rows when index columns are not
    updated. Other sessions can place incompatible locks there and block subsequent
    updates, which would lead to deadlocks.


    5.  Use retry logic. Wrap critical code into `TRY..CATCH` blocks and retry the
    action if deadlock occurs. The error number for the exception caused by the deadlock
    is 1205\. The code in Listing [5-12](#463519_1_En_5_Chapter.xhtml#PC12) shows
    how you can implement that.


    ```

    -- Declare and set variable to track number of retries to try before exiting.

    declare

    @retry tinyint = 5

    -- Keep trying to update table if this task is selected as the deadlock victim.

    while (@retry > 0)

    begin

    begin try

    begin tran

    -- some code that can lead to the deadlock

    commit

    end try

    begin catch

    -- Check error number. If deadlock victim error, then reduce retry count

    -- for next update retry. If some other error occurred, then exit WHILE loop.

    if (error_number() = 1205)

    set @retry = @retry - 1;

    else

    set @retry = 0;

    if @@trancount > 0

    rollback;

    end catch

    end

    Listing 5-12

    Using TRY..CATCH block to retry the operation in case of deadlock

    ```


    ## Summary


    With the exception of intra-query parallelism deadlocks, which are considered
    to be a bug in the SQL Server code, deadlocks occur when multiple sessions compete
    for the same set of resources.


    The key element in deadlock troubleshooting is the deadlock graph, which provides
    information about the processes and resources involved in the deadlock. You can
    collect the deadlock graph by enabling trace flag `T1222`, capturing `xml_deadlock_report`
    Extended Event and `Deadlock graph` SQL Trace event, or setting up a deadlock
    event notification in the system. In SQL Server 2008 and above, the `xml_deadlock_report`
    event is included in the `system_health` Extended Event session, which is enabled
    by default on every SQL Server installation.


    The deadlock graph will provide you with information about the queries that triggered
    the deadlock. You should remember, however, that in the majority of cases, a deadlock
    involves multiple statements that acquired and held the locks within the same
    transaction and you may need to analyze all of them to address the problem.


    Even though deadlocks can happen for many reasons, more often than not they happen
    because of excessive locking during scans in non-optimized queries. Query optimization
    can help to address them.


    # 6. Optimistic Isolation Levels


    Optimistic transaction isolation levels were introduced in SQL Server 2005 as
    a new way to deal with blocking problems and address concurrency phenomena in
    a system. With optimistic transaction isolation levels, queries read “old” committed
    versions of rows while accessing data modified by the other sessions, rather than
    being blocked by the incompatibility of shared (S) and exclusive (X) locks.


    This chapter will explain how optimistic isolation levels are implemented and
    how they affect the locking behavior of the system.


    ## Row Versioning Overview


    With optimistic transaction isolation levels, when updates occur, SQL Server stores
    the old versions of the rows in a special part of `tempdb` called the *version
    store* . The original rows in the database reference them with 14-byte version
    pointers, which SQL Server adds to modified (updated and deleted) rows. Depending
    on the situation, you can have more than one version record stored in the version
    store for the row. Figure [6-1](#463519_1_En_6_Chapter.xhtml#Fig1) illustrates
    this behavior.


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig1_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Version store


    Now, when readers (and sometimes writers) access a row that holds an exclusive
    (X) lock, they read the old version from the version store rather than being blocked,
    as shown in Figure [6-2](#463519_1_En_6_Chapter.xhtml#Fig2).


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig2_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Readers and version store


    As you can guess, while optimistic isolation levels help reduce blocking, there
    are some tradeoffs. Most significant among these is that they contribute to `tempdb`
    load. Using optimistic isolation levels on highly volatile systems can lead to
    very heavy `tempdb` activity and can significantly increase `tempdb` size. We
    will look at this issue in greater detail later in this chapter.


    There is overhead during data modification and retrieval. SQL Server needs to
    copy the data to `tempdb` as well as maintain a linked list of the version records.
    Similarly, it needs to traverse that list when reading data. This adds additional
    CPU, memory, and I/O load. You need to remember these tradeoffs, especially when
    you host the system in the cloud, where I/O performance is often less efficient
    than that of modern high-end disk arrays you can find on-premises.


    Finally, optimistic isolation levels contribute to index fragmentation. When a
    row is modified, SQL Server increases the row size by 14 bytes due to the version
    pointer. If a page is tightly packed and a new version of the row does not fit
    into the page, it will lead to a page split and further fragmentation. We will
    look at this behavior in more depth later in the chapter.


    ## Optimistic Transaction Isolation Levels


    There are two optimistic transaction isolation levels: `READ COMMITTED SNAPSHOT`
    and `SNAPSHOT`. To be precise, `SNAPSHOT` is a separate transaction isolation
    level, while `READ COMMITTED SNAPSHOT` is a database option that changes the behavior
    of the readers in the `READ COMMITTED` transaction isolation level.


    Let''s examine these levels in depth.'
  trans: "\n## 降低死锁发生的可能性\n\n最后，我可以提供几点实用的建议，以帮助降低系统中死锁发生的可能性：\n\n1.  **优化查询**。由未优化的查询引起的扫描是死锁最常见的原因。合适的索引不仅能提升查询性能，还能减少需要读取的行数和需要获取的锁，从而降低与其他会话发生锁冲突的可能性。\n\
    \n2.  **尽可能缩短锁的持有时间**。回想一下，所有的排他（`X`）锁都会一直持有到事务结束。应使事务保持简短，并尝试在尽可能接近事务结束时更新数据，以减少锁冲突的机会。在我们表\
    \ 5-1 的示例中，你可以修改代码，交换`SELECT`和`UPDATE`语句的顺序。这将解决那个特定的死锁问题，因为事务在获取排他（`X`）锁之后，没有任何可能被阻塞的语句了。\n\
    \n3.  **考虑使用乐观隔离级别，例如 `READ COMMITTED SNAPSHOT` 或 `SNAPSHOT`**。如果不可行，则使用能提供所需数据一致性的最低事务隔离级别。这可以减少共享（`S`）锁的持有时间。即使你在之前的例子中交换了`SELECT`和`UPDATE`语句的顺序，在`REPEATABLE\
    \ READ`或`SERIALIZABLE`隔离级别下，你仍然会遇到死锁。在这些隔离级别下，共享（`S`）锁会一直持有到事务结束，从而会阻塞`UPDATE`语句。而在`READ\
    \ COMMITTED`模式下，共享（`S`）锁在读取一行后就会释放，`UPDATE`语句就不会被阻塞。\n\n4.  **当涉及多个索引时，避免在同一事务内多次更新同一行**。正如本章前面所见，当索引列未被更新时，SQL\
    \ Server 不会在非聚集索引行上放置排他（`X`）锁。其他会话可以在那里放置不兼容的锁并阻塞后续的更新，从而导致死锁。\n\n5.  **使用重试逻辑**。将关键代码包裹在`TRY..CATCH`块中，如果发生死锁则重试该操作。由死锁引起的异常错误号是`1205`。代码清单\
    \ 5-12 展示了如何实现这一点。\n\n```sql\n-- 声明并设置变量，用于跟踪在退出前尝试重试的次数。\ndeclare\n    @retry\
    \ tinyint = 5\n-- 如果此任务被选为死锁牺牲品，则持续尝试更新表。\nwhile (@retry > 0)\nbegin\n    begin\
    \ try\n        begin tran\n            -- 可能导致死锁的一些代码\n        commit\n    end\
    \ try\n    begin catch\n        -- 检查错误号。如果是死锁牺牲品错误，则减少下次重试的计数。\n        -- 如果发生其他错误，则退出\
    \ WHILE 循环。\n        if (error_number() = 1205)\n            set @retry = @retry\
    \ - 1;\n        else\n            set @retry = 0;\n        if @@trancount > 0\n\
    \            rollback;\n    end catch\nend\n```\n代码清单 5-12\n使用`TRY..CATCH`块在发生死锁时重试操作\n\
    \n## 小结\n\n除了被认为属于 SQL Server 代码错误的查询内并行死锁外，死锁发生在多个会话竞争同一组资源时。\n\n死锁疑难解答中的关键元素是死锁图，它提供了关于死锁中涉及的进程和资源的信息。你可以通过启用跟踪标志`T1222`、捕获`xml_deadlock_report`扩展事件和`Deadlock\
    \ graph` SQL 跟踪事件，或者在系统中设置死锁事件通知来收集死锁图。在 SQL Server 2008 及更高版本中，`xml_deadlock_report`事件包含在默认情况下每个\
    \ SQL Server 安装都启用的`system_health`扩展事件会话中。\n\n死锁图会为你提供有关触发死锁的查询的信息。然而，你应该记住，在大多数情况下，死锁涉及在同一事务内获取并持有锁的多个语句，你可能需要分析所有这些语句才能解决问题。\n\
    \n尽管死锁可能由多种原因引起，但通常是因为未优化的查询在扫描过程中产生了过多的锁。查询优化可以帮助解决这些问题。\n\n# 6. 乐观隔离级别\n\n乐观事务隔离级别在\
    \ SQL Server 2005 中被引入，作为一种处理阻塞问题和解决系统中并发现象的新方法。使用乐观事务隔离级别，查询在访问被其他会话修改的数据时，会读取行的“旧”已提交版本，而不是被共享（`S`）锁和排他（`X`）锁的不兼容性所阻塞。\n\
    \n本章将解释乐观隔离级别是如何实现的，以及它们如何影响系统的锁行为。\n\n## 行版本控制概述\n\n使用乐观事务隔离级别时，当发生更新时，SQL Server\
    \ 将行的旧版本存储在`tempdb`中一个称为`版本存储区`的特殊部分。数据库中的原始行通过一个 14 字节的版本指针引用它们，SQL Server 会将这个指针添加到被修改（更新和删除）的行中。根据情况，一行在版本存储区中可能存储多个版本记录。图\
    \ 6-1 说明了此行为。\n\n![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig1_HTML.jpg](img/463519_1_En_6_Fig1_HTML.jpg)\n\
    \n图 6-1\n版本存储区\n\n现在，当读取器（有时是写入器）访问持有排他（`X`）锁的行时，它们会从版本存储区读取旧版本，而不是被阻塞，如图 6-2\
    \ 所示。\n\n![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig2_HTML.jpg](img/463519_1_En_6_Fig2_HTML.jpg)\n\
    \n图 6-2\n读取器与版本存储区\n\n正如你所猜想的，虽然乐观隔离级别有助于减少阻塞，但也存在一些权衡。其中最显著的是它们增加了`tempdb`的负载。在高度易变的系统上使用乐观隔离级别可能导致非常繁重的`tempdb`活动，并显著增加`tempdb`的大小。我们将在本章后面更详细地探讨这个问题。\n\
    \n数据修改和检索过程中存在开销。SQL Server 需要将数据复制到`tempdb`，并维护版本记录的链表。同样，在读取数据时需要遍历该链表。这增加了额外的\
    \ CPU、内存和 I/O 负载。你需要记住这些权衡，尤其是在云端托管系统时，那里的 I/O 性能通常不如本地现代高端磁盘阵列高效。\n\n最后，乐观隔离级别会导致索引碎片。当一行被修改时，SQL\
    \ Server 会因为版本指针而使行大小增加 14 字节。如果一个页面被紧密填充，并且行的新版本无法容纳在该页面中，它将导致页面拆分和进一步的碎片。我们将在本章后面更深入地研究这种行为。\n\
    \n## 乐观事务隔离级别\n\n有两种乐观事务隔离级别：`READ COMMITTED SNAPSHOT` 和 `SNAPSHOT`。准确来说，`SNAPSHOT`是一个独立的事务隔离级别，而`READ\
    \ COMMITTED SNAPSHOT`是一个数据库选项，它改变了`READ COMMITTED`事务隔离级别中读取器的行为。\n\n让我们深入研究这些级别。\n"
- fmt: '# 快照隔离级别详解


    ## READ COMMITTED SNAPSHOT 隔离级别


    两种乐观隔离级别都需要在数据库级别启用。你可以使用 `ALTER DATABASE SET READ_COMMITTED_SNAPSHOT ON` 命令来启用
    `READ COMMITTED SNAPSHOT (RCSI)`。该语句会获取一个独占（X）数据库锁来更改数据库选项，如果数据库中还有其他用户连接，则会被阻塞。你可以通过运行
    `ALTER DATABASE SET READ_COMMITTED_SNAPSHOT ON WITH ROLLBACK AFTER X SECONDS`
    命令来解决这个问题。这将回滚所有活动事务并终止现有数据库连接，从而允许更改数据库选项。


    ### 注意


    在 Microsoft Azure SQL 数据库中，`READ COMMITTED SNAPSHOT` 默认是启用的。


    如前所述，`RCSI` 改变了 `READ COMMITTED` 模式下读取器的行为。然而，它并不影响写入器的行为。


    如图 6-3 所示，读取器不再获取共享（S）锁并被行上持有的任何独占（X）锁阻塞，而是使用版本存储中的旧版本。写入器仍然以与悲观隔离级别相同的方式获取更新（U）和独占（X）锁。再次说明，正如你所看到的，不同会话的写入器之间仍然存在阻塞，尽管写入器不会像
    `READ UNCOMMITTED` 模式那样阻塞读取器。


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig3_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig3_HTML.jpg)


    图 6-3 READ COMMITTED SNAPSHOT 隔离级别的行为


    然而，`READ UNCOMMITTED` 和 `READ COMMITTED SNAPSHOT` 隔离级别之间有一个主要区别。`READ UNCOMMITTED`
    以牺牲数据一致性为代价消除了阻塞。可能发生许多一致性异常，包括读取未提交数据、重复读取和遗漏行。另一方面，`READ COMMITTED SNAPSHOT`
    隔离级别为你提供了完整的*语句级一致性*。在此隔离级别运行的语句既不会访问未提交的数据，也不会访问语句开始后提交的数据。


    一个显而易见的结论是，当启用了 `READ COMMITTED SNAPSHOT` 隔离级别时，应避免在查询中使用 `（NOLOCK）` 提示。虽然使用 `（NOLOCK）`
    和 `READ UNCOMMITTED` 本身就是一种糟糕的做法，但当 `READ COMMITTED SNAPSHOT` 能在不丢失查询数据一致性的情况下提供类似的非阻塞行为时，使用它就完全没用了。


    ### 提示


    将数据库切换到 `READ COMMITTED SNAPSHOT` 隔离级别可以是一个很好的紧急技术，当系统正遭受阻塞问题时。假设读取器运行在 `READ
    COMMITTED` 隔离级别，它可以在不更改任何代码的情况下消除写入器/读取器阻塞。显然，这只是临时解决方案，你需要检测并消除阻塞的根本原因。


    ## SNAPSHOT 隔离级别


    `SNAPSHOT` 是一个独立的事务隔离级别，需要在代码中使用 `SET TRANSACTION ISOLATION LEVEL SNAPSHOT` 语句显式设置。


    默认情况下，禁止使用 `SNAPSHOT` 隔离级别。你必须使用 `ALTER DATABASE SET ALLOW_SNAPSHOT_ISOLATION
    ON` 语句来启用它。此语句不需要独占数据库锁，并且可以在有其他用户连接到数据库时执行。


    `SNAPSHOT` 隔离级别提供了*事务级一致性*。无论事务活动时间多长以及其他事务在此期间做了多少数据更改，事务都将看到事务开始时数据的*快照*。


    ### 注意


    SQL Server 在第一次访问数据时启动显式事务，而不是在 `BEGIN TRAN` 语句时。


    在图 6-4 所示的示例中，我们有一个会话 1 在时间 *T1* 启动事务并读取行。在时间 *T2*，我们有一个会话 2 在自动提交事务中修改了该行。此时，该行的旧（原始）版本移动到
    `tempdb` 中的版本存储。


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig4_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig4_HTML.jpg)


    图 6-4 快照隔离级别和读取器行为


    接下来，我们有一个会话 3 启动另一个事务，并在时间 *T3* 读取同一行。它看到的是会话 2（在时间 *T2*）修改并提交的行版本。在时间 *T4*，我们有一个会话
    4 再次在自动提交事务中修改该行。此时，版本存储中有该行的两个版本——一个存在于 *T2* 到 *T4* 之间，以及在 *T2* 之前存在的原始版本。现在，如果会话
    3 再次运行 `SELECT`，它将使用在 *T2* 到 *T4* 之间存在的版本，因为该版本是在会话 3 事务开始时提交的。同样，会话 1 将使用在 *T2*
    之前存在的原始行版本。在会话 1 和会话 3 提交后的某个时间点，*版本存储清理任务* 将从版本存储中删除这两条记录，当然，前提是其他事务不再需要它们。


    `SERIALIZABLE` 和 `SNAPSHOT` 隔离级别提供了相同级别的防止数据不一致问题的保护；然而，它们的行为存在细微差别。`SNAPSHOT`
    隔离级别事务看到的是事务开始时的数据。使用 `SERIALIZABLE` 隔离级别，事务看到的是首次访问数据并获取锁时的数据。考虑一种情况，一个会话在事务中间从表中读取数据。如果另一个会话在事务开始之后但在读取数据之前更改了该表中的数据，那么在
    `SERIALIZABLE` 隔离级别中的事务将看到这些更改，而 `SNAPSHOT` 事务则不会。


    乐观事务隔离级别通过减少甚至消除阻塞来提供语句级或事务级的数据一致性，尽管它们可能会在 `tempdb` 中生成大量数据。如果有一个会话从表中删除数百万行，即使原始的
    `DELETE` 语句运行在悲观隔离级别，所有这些行也需要复制到版本存储中，只是为了为可能的 `SNAPSHOT` 或 `RCSI` 事务保留数据状态。你将在本章后面看到这样的例子。


    现在，让我们检查写入器的行为。假设会话 1 启动事务并更新其中一行。如图 6-5 所示，该会话在那里持有一个独占（X）锁。


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig5_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig5_HTML.jpg)


    图 6-5 快照隔离级别和写入器的行为


    会话 2 想要更新 `Cancelled = 1` 的所有行。它开始扫描表，当需要读取 `OrderId = 10` 的数据时，它从版本存储中读取该行；也就是说，读取会话
    2 事务开始前最后提交的版本。此版本是该行的原始（未更新）版本，其 `Cancelled = 0`，因此会话 2 不需要更新它。会话 2 继续扫描行，而不会被更新（U）和独占（X）锁不兼容性所阻塞。'
  raw: '### READ COMMITTED SNAPSHOT Isolation Level


    Both optimistic isolation levels need to be enabled on the database level. You
    can enable `READ COMMITTED SNAPSHOT (RCSI)` with the `ALTER DATABASE SET READ_COMMITTED_SNAPSHOT
    ON` command. That statement acquires an exclusive (X) database lock to change
    the database option, and it will be blocked if there are other users connected
    to the database. You can address that by running the `ALTER DATABASE SET READ_COMMITTED_SNAPSHOT
    ON WITH ROLLBACK AFTER X SECONDS` command. This will roll back all active transactions
    and terminate existing database connections, which allows the changing of the
    database option.


    ### Note


    `READ COMMITTED SNAPSHOT` is enabled by default in Microsoft Azure SQL Databases.


    As already mentioned, `RCSI` changes the behavior of the readers in `READ COMMITTED`
    mode. It does not affect the behavior of the writers, however.


    As you can see in Figure [6-3](#463519_1_En_6_Chapter.xhtml#Fig3), instead of
    acquiring shared (S) locks and being blocked by any exclusive (X) locks held on
    the row, readers use the old version from the version store. Writers still acquire
    update (U) and exclusive (X) locks in the same way as in pessimistic isolation
    levels. Again, as you can see, blocking between writers from different sessions
    still exists, although writers do not block readers similar to `READ UNCOMMITTED`
    mode.


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig3_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    READ COMMITTED SNAPSHOT isolation level behavior


    There is a major difference between the `READ UNCOMMITTED` and `READ COMMITTED
    SNAPSHOT` isolation levels, however. `READ UNCOMMITTED` removes the blocking at
    the expense of data consistency. Many consistency anomalies are possible, including
    reading uncommitted data, duplicated reads, and missed rows. On the other hand,
    the `READ COMMITTED SNAPSHOT` isolation level provides you with full *statement-level
    consistency*. Statements running in this isolation level do not access uncommitted
    data nor data committed after the statement started.


    As the obvious conclusion, you should avoid using the (`NOLOCK)` hint in the queries
    when `READ COMMITTED SNAPSHOT` isolation level is enabled. While using (`NOLOCK)`
    and `READ UNCOMMITTED` is a bad practice by itself, it is completely useless when
    `READ COMMITTED SNAPSHOT` provides you with similar non-blocking behavior without
    losing data consistency for the queries.


    ### Tip


    Switching a database to the `READ COMMITTED SNAPSHOT` isolation level can be a
    great emergency technique when the system is suffering from blocking issues. It
    removes writers/readers blocking without any code changes, assuming that readers
    are running in the `READ COMMITTED` isolation level. Obviously, this is only a
    temporary solution, and you need to detect and eliminate the root cause of the
    blocking.


    ### SNAPSHOT Isolation Level


    `SNAPSHOT` is a separate transaction isolation level, and it needs to be set explicitly
    in the code with a `SET TRANSACTION ISOLATION LEVEL SNAPSHOT` statement.


    By default, using the `SNAPSHOT` isolation level is prohibited. You must enable
    it with an `ALTER DATABASE SET ALLOW_SNAPSHOT_ISOLATION ON` statement. This statement
    does not require an exclusive database lock, and it can be executed with other
    users connected to the database.


    The `SNAPSHOT` isolation level provides *transaction-level consistency*. Transactions
    will see a *snapshot* of the data at the moment when the transaction started regardless
    of how long the transaction is active and how many data changes were made in other
    transactions during that time.


    ### Note


    SQL Server starts an explicit transaction at the time when it accesses the data
    for the first time rather than at the time of the `BEGIN TRAN` statement.


    In the example shown in Figure [6-4](#463519_1_En_6_Chapter.xhtml#Fig4), we have
    a session 1 that starts the transaction and reads the row at time *T1*. At time
    *T2*, we have a session 2 that modifies the row in an autocommitted transaction.
    At this moment, the old (original) version of the row moved to the version store
    in `tempdb`.


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig4_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    Snapshot isolation level and readers behavior


    In the next step, we have a session 3 that starts another transaction and reads
    the same row at time *T3*. It sees the version of the row as modified and committed
    by session 2 (at time *T2*). At time *T4*, we have a session 4 that modifies the
    row in the autocommitted transaction again. At this time, we have two versions
    of the rows in the version store—one that existed between *T2* and *T4*, and the
    original version that existed before *T2*. Now, if session 3 runs the `SELECT`
    again, it would use the version that existed between *T2* and *T4* because this
    version was committed at the time that the session 3 transaction started. Similarly,
    session 1 would use the original version of the row that existed before *T2*.
    At some point, after session 1 and session 3 are committed, the *version store
    clean-up task* would remove both records from the version store, assuming, of
    course, that there are no other transactions that need them.


    The `SERIALIZABLE` and `SNAPSHOT` isolation levels provide the same level of protection
    against data inconsistency issues; however, there is a subtle difference in their
    behavior. A `SNAPSHOT` isolation level transaction sees data as of the beginning
    of a transaction. With the `SERIALIZABLE` isolation level, the transaction sees
    data as of the time when the data was accessed for the first time and locks were
    acquired. Consider a situation where a session is reading data from a table in
    the middle of a transaction. If another session changed the data in that table
    after the transaction started but before data was read, the transaction in the
    `SERIALIZABLE` isolation level would see the changes while the `SNAPSHOT` transaction
    would not.


    Optimistic transaction isolation levels provide statement- or transaction-level
    data consistency reducing or even eliminating the blocking, although they could
    generate an enormous amount of data in the `tempdb`. If you have a session that
    deletes millions of rows from the table, all of those rows would need to be copied
    to the version store, even if the original `DELETE` statement were running in
    a pessimistic isolation level, just to preserve the state of the data for possible
    `SNAPSHOT` or `RCSI` transactions. You will see such an example later in the chapter.


    Now, let’s examine the writers’ behavior. Let’s assume that session 1 starts the
    transaction and updates one of the rows. That session holds an exclusive (X) lock
    there, as shown in Figure [6-5](#463519_1_En_6_Chapter.xhtml#Fig5).


    ![../images/463519_1_En_6_Chapter/463519_1_En_6_Fig5_HTML.jpg](images/463519_1_En_6_Chapter/463519_1_En_6_Fig5_HTML.jpg)


    Figure 6-5


    SNAPSHOT isolation level and writers’ behavior


    Session 2 wants to update all rows where `Cancelled = 1`. It starts to scan the
    table, and when it needs to read the data for `OrderId = 10`, it reads the row
    from the version store; that is, the last committed version before the session
    2 transaction started. This version is the original (non-updated) version of the
    row, and it has `Cancelled = 0`, so session 2 does not need to update it. Session
    2 continues scanning the rows without being blocked by update (U) and exclusive
    (X) lock incompatibility.'
