    ### SQL Server 中的事务隔离级别与锁


    SQL Server 始终在事务上下文中处理数据。在这种情况下，当应用程序未使用 `BEGIN TRAN` / `COMMIT` 语句启动显式事务时，SQL
    Server 会为语句的持续时间使用自动提交事务。即使是 `SELECT` 语句也在其自己的轻量级事务中运行。SQL Server 不会将它们写入事务日志，尽管所有锁定和并发规则仍然适用。


    ### READ UNCOMMITTED 隔离级别


    使用 `READ UNCOMMITTED` 隔离级别时，不会获取共享（S）锁。因此，读取器可以读取其他会话已修改并持有排他（X）锁的行。此隔离级别通过消除读取器和写入器之间的冲突来减少系统中的阻塞，代价是数据一致性。无论接下来发生什么（例如更改被回滚或一行被多次修改），读取器都会读取行的当前（已修改）版本。这解释了为什么此隔离级别通常被称为
    `脏读`。


    表 3-3 中的代码说明了这一点。第一个会话运行 `DELETE` 语句，在行上获取排他（X）锁。第二个会话在 `READ UNCOMMITTED` 模式下运行
    `SELECT` 语句。


    **表 3-3：READ UNCOMMITTED 隔离级别一致性**


    | 会话 1 | 会话 2 |

    | --- | --- |

    | `begin tran`       `delete from Delivery.Orders`       `where OrderId = 95;`
    |   |

    |   | `-- 成功 / 无阻塞``set transaction isolation level read uncommitted;``select
    OrderId, Amount``from Delivery.Orders``where OrderId between 94 and 96;` |

    | `rollback;` |   |


    在 `READ UNCOMMITTED` 隔离级别中，读取器不获取共享（S）锁。会话 2 不会被阻塞，并将返回如图 3-5 所示的结果集。它不包含 `OrderId=95`
    的行，该行在第一个会话的未提交事务中已被删除，即使该事务随后被回滚。


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig5_HTML.jpg](img/463519_1_En_3_Fig5_HTML.jpg)


    **图 3-5：READ UNCOMMITTED 和共享（S）锁行为**


    值得再次注意的是，排他（X）锁和更新（U）锁的行为不受事务隔离级别影响。即使在 `READ UNCOMMITTED` 模式下，你仍然会遇到写入器/写入器阻塞。


    ### READ COMMITTED 隔离级别


    在 `READ COMMITTED` 隔离级别中，SQL Server 在读取行后立即获取并释放共享（S）锁。这保证了事务无法读取其他会话的未提交数据。让我们运行清单
    3-3 中的代码。


    ```sql

    set transaction isolation level read committed;

    select OrderId, Amount

    from Delivery.Orders

    where OrderId in (90,91);

    -- 清单 3-3：在 READ COMMITTED 隔离级别中读取数据

    ```


    图 3-6 说明了 SQL Server 如何获取和释放锁。如你所见，行级锁被获取并立即释放。


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig6_HTML.jpg](img/463519_1_En_3_Fig6_HTML.jpg)


    **图 3-6：READ COMMITTED 模式下的共享（S）锁行为**


    值得注意的是，在某些情况下，在 `READ COMMITTED` 模式下，SQL Server 可能在 `SELECT` 语句的持续时间内持有共享（S）锁，仅在完成后才释放锁。一个这样的例子是从表中读取
    LOB 列数据的查询。


    ### 提示


    不要在代码中选择不必要的列或使用 `SELECT *` 模式。这可能会引入性能开销并增加系统中的锁定。


    ### REPEATABLE READ 隔离级别


    在 `REPEATABLE READ` 隔离级别中，SQL Server 获取共享（S）锁并一直持有到事务结束。这保证了其他会话在数据被读取后无法修改它。你可以通过运行清单
    3-3 的代码（将隔离级别更改为 `REPEATABLE READ`）来查看此行为。


    图 3-7 说明了 SQL Server 如何获取和释放锁。如你所见，SQL Server 首先获取两个共享（S）锁，并在事务结束时释放它们。


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig7_HTML.jpg](img/463519_1_En_3_Fig7_HTML.jpg)


    **图 3-7：REPEATABLE READ 模式下的共享（S）锁行为**


    ### SERIALIZABLE 隔离级别


    在 `SERIALIZABLE` 隔离级别中，共享（S）锁也会一直持有到事务结束。但是，SQL Server 使用另一种称为 `范围锁` 的锁变体。范围锁（共享和排他）保护索引键范围，而不是单个行。


    考虑一个 `Delivery.Orders` 表只有两行，`OrderId` 分别为 1 和 10 的情况。在 `REPEATABLE READ` 隔离级别中，`SELECT`
    语句将获取两个行级锁。其他会话将无法修改这些行，但仍然可以插入 `OrderId` 值介于两者之间的新行。在 `SERIALIZABLE` 隔离级别中，`SELECT`
    语句将获取一个范围共享（RangeS-S）锁，阻止其他会话在 `OrderId` 1 到 10 之间插入任何行。


    图 3-8 说明了 SQL Server 在 `SERIALIZABLE` 隔离级别中如何获取和释放锁。


    ![../images/463519_1_En_3_Chapter/463519_1_En_3_Fig8_HTML.jpg](img/463519_1_En_3_Fig8_HTML.jpg)


    **图 3-8：SERIALIZABLE 隔离级别下的共享（S）锁行为**


    ### 乐观隔离级别


    乐观隔离级别——`READ COMMITTED SNAPSHOT` 和 `SNAPSHOT`——不获取共享（S）锁。当读取器（`SELECT` 查询）遇到一个持有排他（X）锁的行时，它们从
    `tempdb` 中的版本存储读取该行的旧（先前提交的）版本。写入器和未提交的数据修改不会在系统中阻塞读取器。


    从阻塞和并发的角度来看，`READ COMMITTED SNAPSHOT` 与 `READ UNCOMMITTED` 具有相同的行为。这两个隔离级别都消除了系统中读取器/写入器阻塞的问题。然而，`READ
    COMMITTED SNAPSHOT` 通过消除对未提交数据的访问和脏读，提供了更好的数据一致性。在绝大多数情况下，你不应该使用 `READ UNCOMMITTED`，而应改用
    `READ COMMITTED SNAPSHOT`。


    ### 注意


    我们将在第 6 章中更深入地讨论乐观隔离级别。


    表 3-4 总结了 SQL Server 如何根据事务隔离级别处理共享（S）锁。


    **表 3-4：事务隔离级别和共享（S）锁行为**


    | 事务隔离级别 | 表提示 | 共享锁行为 |

    | --- | --- | --- |

    | `READ UNCOMMITTED` | `(NOLOCK)` | 不获取 (S) 锁 |

    | `READ COMMITTED` (默认) | `(READCOMMITTED)` | 获取 (S) 锁并立即释放 |

    | `REPEATABLE READ` | `(REPEATABLEREAD)` | 获取 (S) 锁并持有到事务结束 |

    | `SERIALIZABLE` | `(SERIALIZABLE)` 或 `(HOLDLOCK)` | 获取范围锁并持有到事务结束 |

    | `READ COMMITTED SNAPSHOT` | `N/A` | 不获取 (S) 锁 |

    | `SNAPSHOT` | `N/A` | 不获取 (S) 锁 |


    你可以使用 `SET TRANSACTION ISOLATION LEVEL` 语句在事务级别控制隔离级别和锁定行为，或者使用表锁定提示在表级别进行控制。


    可以在同一个查询中针对不同的表使用不同的隔离级别，如清单 3-4 所示。


    ```sql

    select c.CustomerName, sum(o.Total) as [Total]

    from

    dbo.Customers c with (READCOMMITTED) join

    dbo.Orders o with (SERIALIZABLE) on

    o.CustomerId = c.CustomerId

    group by

    c.CustomerName;

    -- 清单 3-4：使用表提示控制锁定行为

    ```

