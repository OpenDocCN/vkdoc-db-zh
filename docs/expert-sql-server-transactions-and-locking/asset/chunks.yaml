    ### 关于作者和关于技术审阅者


    ### 关于作者


    ### 关于技术审阅者


    # 1. 数据存储与访问方法


    如果不理解 SQL Server 如何存储和访问数据，就不可能掌握其并发模型。这些知识有助于你理解系统中锁行为的各个方面，对于排查并发问题也至关重要。


    如今，SQL Server 和 Microsoft Azure SQL 数据库支持三种不同的技术，这些技术决定了系统中数据的存储和操作方式。经典的**存储引擎**实现基于行的存储。该技术将表中的所有列组合成数据行，持久化在基于磁盘的表中。数据行则驻留在
    8 KB 的数据页上，每页可以包含一行或多行数据。


    从 SQL Server 2012 开始，你可以使用**列存储索引**以列式格式存储数据。SQL Server 将数据拆分成最多包含 1,048,576 行的
    `行组`。行组内的数据是按列而非按行组合和存储的。这种格式针对报表和分析查询进行了优化。


    最后，在 SQL Server 2014 中引入的**内存 OLTP 引擎**，允许你定义内存优化表，这些表将所有数据完全保存在内存中。内存中的数据行通过内存指针链接到数据行链。该技术针对高负载的
    OLTP 工作进行了优化。


    在介绍完经典存储引擎的并发模型后，我们将在本书后面讨论内存 OLTP 和列存储索引中的锁行为。这些知识是理解 SQL Server 在多用户环境下行为方式的基石。


    本章的目标是高层概述 SQL Server 中基于行的存储。它将解释 SQL Server 如何在基于磁盘的表中存储数据，阐述 B-Tree 索引的结构，并演示
    SQL Server 如何从中访问数据。


    你不应将本章视为对 SQL Server 存储引擎的深入探讨。然而，它应提供足够的信息来讨论 SQL Server 中的并发模型。


    ## 表的剖析


    基于磁盘的表的内部结构相当复杂，由多个元素和内部对象组成，如图 1-1 所示。


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig1_HTML.jpg](img/463519_1_En_1_Fig1_HTML.jpg)


    图 1-1：表的内部结构


    表中的数据要么是完全未排序的（这些表称为 `堆表` 或 `堆`），要么在表定义了聚集索引时，根据聚集索引键的值进行排序。


    除了单个聚集索引之外，每个表还可以有一组非聚集索引。这些索引是独立的数据结构，它们存储表中数据的副本，并根据索引键列进行排序。例如，如果一个列被包含在三个非聚集索引中，SQL
    Server 将存储该数据四次——一次在聚集索引或堆中，另外三次分别在三个非聚集索引中。


    根据 SQL Server 版本的不同，你可以为每个表创建 250 或 999 个非聚集索引。然而，由于它们带来的开销，创建大量索引显然不是一个好主意。除了存储开销，SQL
    Server 在数据修改时还需要在每个非聚集索引中插入或删除数据。此外，更新操作要求 SQL Server 修改包含被更新列的所有索引中的数据。


    在内部，每个索引（和堆）由一个或多个 `分区` 组成。简而言之，每个分区都是一个独立于对象中其他分区的内部数据结构（索引或堆）。SQL Server 允许为表中的每个索引使用不同的分区策略；然而，在大多数情况下，所有索引的分区方式相同并且相互对齐。

