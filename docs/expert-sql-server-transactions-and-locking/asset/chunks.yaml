- fmt: '### LCK_M_S Wait Type


    `LCK_M_S` 等待类型表示对共享 (S) 锁的等待。此锁类型由 `SELECT` 查询在 `READ COMMITTED`、`REPEATABLE READ`
    和 `SERIALIZABLE` 隔离级别中获取。


    在许多情况下，`LCK_M_S` 等待的根本原因与 `LCK_M_U` 等待类似。优化不佳的 `SELECT` 查询可能扫描大量数据，并可能被其他会话持有的排他
    (X) 阻塞。你可以使用与刚才讨论的相同的故障排除技术来识别此类查询。


    对于在 `READ COMMITTED` 隔离级别下运行的查询，你可以考虑启用 `READ_COMMITTED_SNAPSHOT` 数据库选项来消除读写阻塞。在此模式下，SQL
    Server 在 `READ COMMITTED` 隔离级别下不再获取共享 (S) 锁，而是依赖行版本控制。请记住，这种方法并不能解决问题的根本原因，只是掩盖了由优化不佳的查询引入的问题。同时也要记住它带来的额外开销。


    ### Note


    除非不需要数据一致性，否则不要使用 `(NOLOCK)` 提示或 `READ UNCOMMITTED` 隔离级别。


    在某些情况下，`LCK_M_S` 等待可能由 SQL Server 在某些操作期间获取的表级锁等待引起，或者由于代码中的 `(TABLOCK)` 提示导致。一个例子是在线索引重建过程，它在执行开始时获取一个短期的共享
    (S) 表级锁。在繁忙的 OLTP 系统中，数据的易变性可能导致阻塞，尤其是在涉及锁分区的情况下。


    此类情况在等待统计信息中可能表现为发生次数相对较少但平均等待时间较长的等待类型。然而，你不应仅依赖等待统计信息得出结论。分析单个阻塞案例是有益的，在这种情况下，阻塞监控框架可能非常有用。


    ### LCK_M_X Wait Type


    `LCK_M_X` 等待类型表示对排他 (X) 锁的等待。听起来很奇怪，但在数据易变的 OLTP 系统中，`LCK_M_X` 等待可能比 `LCK_M_U`
    等待发生得更少。


    正如你已经知道的，SQL Server 通常在更新扫描期间使用更新 (U) 锁。然而，这种行为并不能保证。在某些情况下，SQL Server 可能决定省略更新
    (U) 锁，而直接使用排他 (X) 锁。一个例子是点查找搜索，当查询使用索引列上的谓词更新单行时。在这种情况下，SQL Server 可能会立即获取排他 (X)
    锁，而不使用更新 (U) 锁。在此条件下的阻塞将导致 `LCK_M_X` 等待。


    在从更新 (U) 锁转换为排他 (X) 锁时，你也可能遇到 `LCK_M_X` 等待。更新 (U) 和共享 (S) 锁彼此兼容，因此查询可能在持有共享 (S)
    锁的行上获取更新 (U) 锁。但是，如果该行需要更新，SQL Server 将无法将其转换为排他 (X) 锁。


    这种情况发生在 `SELECT` 查询使用 `REPEATABLE READ` 或 `SERIALIZABLE` 隔离级别时，共享 (S) 锁会一直保持到事务结束。它也可能发生在
    `READ COMMITTED` 级别，当 `SELECT` 查询有时会在整个语句期间持有共享 (S) 锁时；例如，当它读取 LOB 列时。


    当多个会话处理相同的数据时，可能会发生 `LCK_M_X` 等待。常见场景之一是 *计数器表* 实现，多个会话尝试同时递增同一个计数器，或者使用 `(TABLOCKX)`
    提示。你可以通过切换到 `SEQUENCE` 对象或标识列来解决此冲突。


    与往常一样，当你在系统中看到大量 `LCK_M_X` 等待时，应分析单个阻塞案例并理解阻塞的根本原因。


    ### LCK_M_SCH_S and LCK_M_SCH_M Wait Types


    `LCK_M_SCH_S` 和 `LCK_M_SCH_M` 等待类型表示对架构稳定性 (Sch-S) 和架构修改 (Sch-M) 锁的等待。这些等待不应在系统中大规模发生。


    SQL Server 在架构更改期间获取架构修改 (Sch-M) 锁。此锁要求对表进行独占访问，在所有其他会话断开与表的连接之前，请求将被阻塞，从而产生等待。


    有几种常见情况可能导致此类阻塞：


    *   在有其他用户连接到系统的情况下在线进行数据库架构更改。请记住，在这种情况下，架构修改 (Sch-M) 锁会一直保持到事务结束。

    *   离线索引重建。

    *   分区切换或在线索引重建的最后阶段。需要架构修改 (Sch-M) 锁来修改数据库中的元数据。如果支持，可以通过使用低优先级锁来减少阻塞。


    架构稳定性 (Sch-S) 锁用于避免在表使用时进行表更改。SQL Server 在查询编译期间以及在未使用意向锁的隔离级别（如 `READ UNCOMMITTED`、`READ
    COMMITTED SNAPSHOT` 和 `SNAPSHOT`）中执行 `SELECT` 查询期间获取它们。


    架构稳定性 (Sch-S) 锁与除架构修改 (Sch-M) 锁之外的任何其他锁类型都兼容。`LCK_M_SCH_S` 等待的存在总是表明存在由架构修改引起的阻塞。


    如果你在系统中遇到大量的架构锁等待，你应该识别是什么导致了这种阻塞。在大多数情况下，你可以通过更改系统中的部署或数据库维护策略，或者切换到低优先级锁来解决它们。


    ### Intent LCK_M_I* Wait Types


    意向锁等待类型表示系统中对意向锁的等待。每种意向锁类型都有对应的等待类型。例如，`LCK_M_IS` 表示意向共享 (IS) 锁等待，`LCK_M_IX`
    表示意向排他 (IX) 锁等待。


    SQL Server 在对象（表）和页级别获取意向锁。在表级别，阻塞可能在两种条件下发生。首先，由于对象上持有不兼容的架构修改 (Sch-M) 锁，会话无法获取意向锁。通常，在这种情况下你还会看到一些架构锁等待，你需要排查它们在系统中发生的原因。


    另一种情况是表上存在不兼容的完全锁。例如，当表上持有完全排他 (X) 锁时，任何意向锁都无法获取。


    在某些情况下，这可能是由于代码中的表级锁提示（如 `(TABLOCK)` 或 `(TABLOCKX)`）导致的。然而，这种状况也可能由大规模批处理修改期间成功的锁升级触发。你可以通过监控
    `lock_escalation` 扩展事件来确认这一点，并通过在某些关键表上禁用锁升级来解决。我还将在本章后面演示如何使用阻塞监控框架识别涉及对象级阻塞的表。


    当会话请求对持有不兼容完全锁的页获取意向锁时，也可能发生意向锁阻塞。考虑一种情况，SQL Server 需要运行一个扫描整个表的 `SELECT` 语句。在此场景中，SQL
    Server 可能选择使用页级而不是行级锁，在页上获取完全共享 (S) 锁。如果另一个会话尝试通过获取页上的意向排他 (IX) 锁来修改行，这将引入阻塞。


    与往常一样，当你遇到此类问题时，你需要识别并解决阻塞的根本原因。'
  raw: '### LCK_M_S Wait Type


    The `LCK_M_S` wait type indicates waits for shared (S) locks. This lock type is
    acquired by `SELECT` queries in the `READ COMMITTED`, `REPEATABLE READ`, and `SERIALIZABLE`
    isolation levels.


    In many cases, the root cause of `LCK_M_S` waits are similar to those for `LCK_M_U`
    waits. Poorly optimized `SELECT` queries may scan a large amount of data and may
    be blocked by exclusive (X) locks held by other sessions. You can use the same
    troubleshooting techniques as we just discussed to identify such queries.


    In cases where queries are running in the `READ COMMITTED` isolation level, you
    can consider enabling the `READ_COMMITTED_SNAPSHOT` database option to eliminate
    readers/writers blocking. In this mode, SQL Server does not acquire shared (S)
    locks in the `READ COMMITTED` isolation level, relying on row versioning instead.
    Remember that this approach does not address the root cause of the issue, instead
    masking problems introduced by poorly optimized queries. Also remember the additional
    overhead it introduces.


    ### Note


    Do not use a `(NOLOCK)` hint or the `READ UNCOMMITTED` isolation level unless
    data consistency is not required.


    In some cases, `LCK_M_S` waits may be generated by waits for table-level locks
    acquired by SQL Server during some operations or because of a `(TABLOCK)` hint
    in the code. One such example is an online index rebuild process, which acquires
    a short-term shared (S) table-level lock at the beginning of execution. The volatility
    of the data in busy OLTP systems may lead to a blocking condition in such a scenario,
    especially with lock partitioning involved.


    Such cases may present themselves in wait statistics as wait types with a relatively
    low number of occurrences and high average wait time. Nevertheless, you should
    not rely only on wait statistics to drive the conclusion. It is beneficial to
    analyze individual blocking cases, and the Blocking Monitoring Framework may be
    very useful in such scenarios.


    ### LCK_M_X Wait Type


    The `LCK_M_X` wait type indicates the waits for exclusive (X) locks. As strange
    as it sounds, in OLTP systems with volatile data, `LCK_M_X` waits may occur less
    frequently than `LCK_M_U` waits.


    As you already know, SQL Server usually uses update (U) locks during update scans.
    This behavior, however, is not guaranteed. In some cases, SQL Server may decide
    to omit update (U) locks, using exclusive (X) locks instead. One such example
    is point-lookup searches, when a query updates a single row using a predicate
    on the indexed column. In that case, SQL Server may acquire an exclusive (X) lock
    immediately without using an update (U) lock. Blocking in this condition would
    lead to an `LCK_M_X` wait.


    You may also have `LCK_M_X` waits during the conversion from an update (U) to
    an exclusive (X) lock. Update (U) and shared (S) locks are compatible with each
    other, and, therefore, a query may acquire an update (U) lock on a row with a
    shared (S) lock held. SQL Server, however, would be unable to convert it to an
    exclusive (X) lock if the row needed to be updated.


    This condition happens when a `SELECT` query uses a `REPEATABLE READ` or `SERIALIZABLE`
    isolation level and shared (S) locks are held until the end of the transaction.
    It may also occur in the `READ COMMITTED` level when a `SELECT` query sometimes
    holds shared (S) locks for the duration of the statement; for example, when it
    reads LOB columns.


    `LCK_M_X` waits may occur when multiple sessions work with the same data. One
    of the common scenarios is a *counters table* implementation, when multiple sessions
    are trying to increment the same counter simultaneously or even to use a `(TABLOCKX)`
    hint. You can address this collision by switching to `SEQUENCE` objects or identity
    columns.


    As usual, you should analyze individual blocking cases and understand the root
    cause of the blocking when you see a large amount of `LCK_M_X` waits in the system.


    ### LCK_M_SCH_S and LCK_M_SCH_M Wait Types


    `LCK_M_SCH_S` and `LCK_M_SCH_M` wait types indicate waits for schema stability
    (Sch-S) and schema modification (Sch-M) locks. These waits should not occur in
    the system on a large scale.


    SQL Server acquires schema modification (Sch-M) locks during schema alterations.
    This lock requires exclusive access to the table, and requests would be blocked,
    generating the wait, until all other sessions disconnected from the table.


    There are several common cases when such blocking may occur:


    *   Database schema changes that are done online, with other users connected to
    the system. Remember, in this case the schema modification (Sch-M) lock is held
    until the end of the transaction.


    *   Offline index rebuild.


    *   Partition switch or final phase of online index rebuild. A schema modification
    (Sch-M) lock is required to modify metadata in the database. You can reduce blocking
    by using low-priority locks if they are supported.


    Schema stability (Sch-S) locks are used to avoid table alterations when tables
    are in use. SQL Server acquires them during query compilation and during the execution
    of `SELECT` queries in isolation levels that do not use intent locks, such as
    in `READ UNCOMMITTED`, `READ COMMITTED SNAPSHOT`, and `SNAPSHOT`.


    Schema stability (Sch-S) locks are compatible with any other lock type except
    schema modification (Sch-M) locks. The existence of `LCK_M_SCH_S` waits always
    indicates blocking introduced by schema modifications.


    If you encounter a significant amount of schema lock waits in the system, you
    should identify what caused this blocking. In the majority of cases, you could
    address them by changing deployment or database maintenance strategies in the
    system or by switching to low-priority locks.


    ### Intent LCK_M_I* Wait Types


    Intent lock wait types indicate waits for intent locks in the system. Each intent
    lock type has a corresponding wait type. For example, `LCK_M_IS` indicates intent
    shared (IS) lock waits, and `LCK_M_IX` indicates intent exclusive (IX) lock waits.


    SQL Server acquires intent locks on the object (table) and page levels. On the
    table level, blocking may occur in two conditions. First, the session cannot acquire
    an intent lock due to an incompatible schema modification (Sch-M) lock held on
    the object. Usually, in this case you would also see some schema lock waits, and
    you would need to troubleshoot the reason why they occurred in the system.


    Another case is the existence of an incompatible full lock on the table. For example,
    neither of the intent locks can be acquired while the table has a full exclusive
    (X) lock held.


    In some cases, this may occur due to table-level locking hints in the code, such
    as `(TABLOCK)` or `(TABLOCKX)`. However, this condition may also be triggered
    by successful lock escalation during large batch modifications. You can confirm
    this by monitoring `lock_escalation` Extended Events and address this by disabling
    lock escalation on some of the critical tables. I will also demonstrate later
    in the chapter how to identify tables involved in object-level blocking using
    the Blocking Monitoring Framework.


    It is also possible to have intent-lock blocking when a session requests an intent
    lock on a page with an incompatible full lock held. Consider a situation where
    SQL Server needs to run a `SELECT` statement that scans the entire table. In this
    scenario, SQL Server may choose to use page-level instead of row-level locking,
    acquiring full shared (S) locks on the pages. This would introduce blocking if
    another session tried to modify a row by acquiring an intent exclusive (IX) lock
    on the page.


    As usual, you need to identify and address the root cause of the blocking when
    you encounter such issues.'
