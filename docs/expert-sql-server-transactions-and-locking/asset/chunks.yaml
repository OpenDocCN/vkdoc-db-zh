    Figure 14-3


    Row groups after table was created


    Now, let’s run a few tests and analyze the locking behavior of the index.


    ### Inserting Data into Clustered Columnstore Index


    Columnstore indexes support two types of data load. The first, and most efficient,
    method requires you to utilize a `BULK INSERT` API for loading data in large batches.
    In this mode, SQL Server creates a new row group for each batch, compressing data
    into a column-based format on the fly. Since every batch becomes an individual
    row group, multiple inserts would not block each other and could run in parallel.


    The minimum size of the batch that triggers this behavior is about 102,000 rows;
    however, you will get the best results if you use batches that match the maximum
    row group size, which is 1,048,576 rows.


    With smaller batches and single-row inserts, SQL Server uses *trickle inserts*,
    placing data into delta stores. Each table partition will have separate delta
    stores, and in some cases you may have several open delta stores per partition.
    SQL Server closes the delta store and compresses its data into a column-based
    format when it reaches 1,048,576 rows or when you run an index rebuild operation.


    Let’s insert a single row into a table and then analyze what locks get acquired
    during the process. The code is shown in Listing [14-2](#463519_1_En_14_Chapter.xhtml#PC2).


    ```

    begin tran

    insert into dbo.Test(ID, Col)

    values(-1,-1);

    select

    resource_type, resource_description

    ,request_mode, request_status

    ,resource_associated_entity_id

    from sys.dm_tran_locks

    where

    request_session_id = @@SPID;

    rollback

    Listing 14-2

    Inserting data into the table

    ```


    As you can see in Figure [14-4](#463519_1_En_14_Chapter.xhtml#Fig4) , the locking
    behavior is similar to locking in heap tables. SQL Server acquired an exclusive
    (X) lock on the newly inserted row, along with intent exclusive (IX) locks on
    the page and HOBT (allocation unit). It also acquired an intent exclusive (IX)
    lock on the row group, which is conceptually similar to the object-level lock
    on the table.


    ![../images/463519_1_En_14_Chapter/463519_1_En_14_Fig4_HTML.jpg](images/463519_1_En_14_Chapter/463519_1_En_14_Fig4_HTML.jpg)


    Figure 14-4


    Locks acquired by INSERT operation


    As you can guess, this behavior indicates that you may scale the insert workload
    in a way similar to how you do so with heap tables. Multiple sessions can insert
    data in parallel without blocking each other.'
  trans: '## 列存储索引中的锁定行为


    存储空间的节省以及聚集列存储索引的可更新特性，使其在 OLTP 环境中作为大型事务表的替代品颇具吸引力。然而，它们的锁定行为与 B-Tree 索引截然不同，在并发事务数量庞大的环境中可能无法良好扩展。


    让我们看几个例子。第一步，如清单 14-1 所示，我们将创建一个带有聚集列存储索引的表，并向其中插入约四百万行数据。创建列存储索引后，我们将尝试向该表插入另一行，随后回滚事务。这将在索引中创建一个空的增量存储。最后，我们将使用
    `sys.column_store_row_groups` 视图分析行组的状态。


    ```sql

    create table dbo.Test

    (

    ID int not null,

    Col int not null

    );

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as T1 cross join N1 as T2) -- 4 rows

    ,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) -- 16 rows

    ,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256 rows

    ,N5(C) as (select 0 from N4 as T1 cross join N4 as T2 ) -- 65,536 rows

    ,N6(C) AS (select 0 from N5 as T1 cross join N3 as T2 cross join N2 as T3)

    -- 4,194,304 rows

    ,IDs(ID) as (select row_number() over (order by (select null)) from N6)

    insert into dbo.Test(ID, Col)

    select ID, ID from IDs;

    create clustered columnstore index CCI_Test

    on dbo.Test

    with (maxdop = 1);

    begin tran

    insert into dbo.Test(ID, Col) values(-1,-1);

    rollback

    go

    select *

    from sys.column_store_row_groups

    where object_id = object_id(N''dbo.Test'');

    ```

    清单 14-1

    创建测试表


    图 14-3 展示了该视图的输出结果。四个处于 `COMPRESSED` 状态的行组以基于列的格式存储数据。一个 `row_group_id = 4`、处于
    `OPEN` 状态的空行组位于增量存储中。


    ![../images/463519_1_En_14_Chapter/463519_1_En_14_Fig3_HTML.jpg](img/463519_1_En_14_Fig3_HTML.jpg)

    图 14-3

    表创建后的行组


    现在，让我们运行一些测试并分析索引的锁定行为。


    ### 向聚集列存储索引插入数据


    列存储索引支持两种数据加载类型。第一种也是最高效的方法，需要您利用 `BULK INSERT` API 来大批量加载数据。在此模式下，SQL Server
    为每个批处理创建一个新的行组，并实时将数据压缩为基于列的格式。由于每个批处理都成为一个单独的行组，因此多个插入操作不会相互阻塞，并且可以并行运行。


    触发此行为所需的最小批处理大小约为 102,000 行；但是，如果您使用与最大行组大小（即 1,048,576 行）匹配的批处理，将会获得最佳效果。


    对于较小的批处理和单行插入，SQL Server 使用 `trickle inserts`，将数据放入增量存储。每个表分区将有单独的增量存储，在某些情况下，您可能每个分区有多个打开的增量存储。当增量存储达到
    1,048,576 行或您运行索引重新生成操作时，SQL Server 会关闭该增量存储并将其数据压缩为基于列的格式。


    让我们向表中插入一行，然后分析在此过程中获取了哪些锁。代码如清单 14-2 所示。


    ```sql

    begin tran

    insert into dbo.Test(ID, Col)

    values(-1,-1);

    select

    resource_type, resource_description

    ,request_mode, request_status

    ,resource_associated_entity_id

    from sys.dm_tran_locks

    where

    request_session_id = @@SPID;

    rollback

    ```

    清单 14-2

    向表中插入数据


    如图 14-4 所示，其锁定行为类似于堆表中的锁定。SQL Server 对新插入的行获取了排他 (`X`) 锁，同时对页和 HOBT（分配单元）获取了意向排他
    (`IX`) 锁。它还对行组获取了意向排他 (`IX`) 锁，这在概念上类似于表上的对象级锁。


    ![../images/463519_1_En_14_Chapter/463519_1_En_14_Fig4_HTML.jpg](img/463519_1_En_14_Fig4_HTML.jpg)

    图 14-4

    INSERT 操作获取的锁


    正如您所猜测的，这种行为表明您可以按照与处理堆表类似的方式扩展插入工作负载。多个会话可以并行插入数据而不会相互阻塞。'
- fmt: '# Updating and Deleting Data from Clustered Columnstore Indexes


    The situation changes when you update or delete data in the table. Unfortunately,
    this workload does not scale as well as inserts do.


    Let’s update one row in the table using the code from Listing 14-3. As you may
    remember, when a row is stored in a delta store, this operation is done *in-place*.
    Updating an already compressed row, on the other hand, will lead to two operations—marking
    a row as *deleted* by inserting the `row-id` into the delete bitmap and inserting
    a new version of the row into a delta store.


    ```sql

    begin tran

    update dbo.Test

    set Col += 1

    where ID=1;

    select

    resource_type, resource_description

    ,request_mode, request_status

    ,resource_associated_entity_id

    from sys.dm_tran_locks

    where

    request_session_id = @@SPID

    rollback

    -- Listing 14-3

    -- Updating data in the table

    ```


    Figure 14-5 shows the locks that are held after the operation. You can see exclusive
    (X) and intent exclusive (IX) locks acquired on the delta store and delete bitmap
    objects (both are heap tables). However, the row groups and HOBT of the delta
    store are protected with update intent exclusive (UIX) rather than intent exclusive
    (IX) locks.


    ![../images/463519_1_En_14_Chapter/463519_1_En_14_Fig5_HTML.jpg](images/463519_1_En_14_Chapter/463519_1_En_14_Fig5_HTML.jpg)


    Figure 14-5: Locks acquired by UPDATE operation


    The same pattern would occur if you deleted a compressed row from a table. Listing
    14-4 shows the code that performs that.


    ```sql

    begin tran

    delete from dbo.Test where ID=1;

    select

    resource_type, resource_description

    ,request_mode, request_status

    ,resource_associated_entity_id

    from sys.dm_tran_locks

    where

    request_session_id = @@SPID

    rollback

    -- Listing 14-4

    -- Deleting data from the table

    ```


    Figure 14-6 shows the locks held after the `DELETE` statement. This operation
    does not touch the delta store, and only the delete bitmap is affected. Nevertheless,
    there is still an update intent exclusive (UIX) lock on the row group from which
    we deleted the row.


    ![../images/463519_1_En_14_Chapter/463519_1_En_14_Fig6_HTML.jpg](images/463519_1_En_14_Chapter/463519_1_En_14_Fig6_HTML.jpg)


    Figure 14-6: Locks acquired by DELETE operation


    The reason why SQL Server uses update intent exclusive (UIX) locks is simple.
    The data in columnstore indexes is not sorted, and SQL Server has to scan it during
    query execution. Partition and segment elimination may allow SQL Server to skip
    some row groups; however, when a row group is scanned, SQL Server acquires an
    update intent exclusive (UIX) lock on it and runs an update scan, reading all
    rows from there.


    Figure 14-7 proves that by showing the execution plan of the `UPDATE` statement
    from Listing 14-3. You can see the *Columnstore Index Scan* operator there.


    ![../images/463519_1_En_14_Chapter/463519_1_En_14_Fig7_HTML.jpg](images/463519_1_En_14_Chapter/463519_1_En_14_Fig7_HTML.jpg)


    Figure 14-7: Execution plan of UPDATE statement


    Unfortunately, update intent exclusive (UIX) locks are incompatible with each
    other. Moreover, they are held until the end of the transaction. This means that
    concurrent update and delete workloads could introduce a large amount of blocking
    and would not scale well in OLTP systems.


    SQL Server 2016 and above allow you to create nonclustered B-Tree indexes on clustered
    columnstore index tables. Those indexes can eliminate update scans of column-based
    data by using *Nonclustered Index Seek* and *Key Lookup* operations.


    ## Note


    The key lookup operations on clustered columnstore and B-Tree indexes are conceptually
    similar. SQL Server locates a row in a clustered columnstore index based on `partition_id`,
    `row_group_id`, and `offset` from the `row-id`.


    Let’s create the index using the `CREATE NONCLUSTERED INDEX Idx_Test_ID ON dbo.Test(ID)`
    statement and run the code from Listing 14-3 again. Figure 14-8 illustrates an
    execution plan of the `UPDATE` statement with *Nonclustered Index Seek* and *Key
    Lookup* operations.


    ![../images/463519_1_En_14_Chapter/463519_1_En_14_Fig8_HTML.jpg](images/463519_1_En_14_Chapter/463519_1_En_14_Fig8_HTML.jpg)


    Figure 14-8: Execution plan of UPDATE statement with nonclustered index


    Figure 14-9 shows the locks that were held after this `UPDATE` statement. As you
    can see, SQL Server did not acquire update intent exclusive (UIX) locks on the
    row groups, using intent exclusive (IX) locks instead. This lock type is compatible
    with intent locks from other sessions.


    ![../images/463519_1_En_14_Chapter/463519_1_En_14_Fig9_HTML.jpg](images/463519_1_En_14_Chapter/463519_1_En_14_Fig9_HTML.jpg)


    Figure 14-9: Locks held by UPDATE statement with nonclustered index


    Even though you can *technically* scale update and delete workloads with nonclustered
    B-Tree indexes, this approach is dangerous. The choice of using a nonclustered
    index would depend on index selectivity and the query. SQL Server may decide to
    scan a columnstore index if it expects that a large number of `Key Lookups` is
    required, which will lead to blocking in the system.


    ## Nonclustered Columnstore Indexes


    SQL Server 2016 and above allow you to create nonclustered columnstore indexes
    on B-Tree tables. These indexes persist a copy of the data in column-based format,
    thus helping to optimize Operational Analytics and reporting workloads in OLTP
    systems. In contrast to SQL Server 2012 implementation, these indexes are updatable
    and do not make a table read-only.


    Listing 14-5 shows the code that drops a clustered columnstore index on the `dbo.Test`
    table, creating clustered B-Tree and nonclustered columnstore indexes after that.
    As before, we are running an `INSERT` statement and rolling back the transaction
    to create an empty delta store in the index.


    ```sql

    drop index IDX_Test_ID on dbo.Test;

    drop index CCI_Test on dbo.Test;

    create unique clustered index CI_Test_ID

    on dbo.Test(ID);

    create nonclustered columnstore index NCCI_Test

    on dbo.Test(ID,Col)

    with (maxdop=1);

    begin tran

    insert into dbo.Test(ID, Col) values(-1,-1);

    rollback

    -- Listing 14-5

    -- Creating nonclustered columnstore index on table

    ```


    Figure 14-10 shows the output of the `sys.column_store_row_groups` view for the
    `NCCI_TestData` index. The data in the table remain the same, and the index consists
    of four compressed row groups and an empty delta store.


    ![../images/463519_1_En_14_Chapter/463519_1_En_14_Fig10_HTML.jpg](images/463519_1_En_14_Chapter/463519_1_En_14_Fig10_HTML.jpg)


    Figure 14-10: Row groups in nonclustered columnstore index


    Figure 14-11 shows the locks held when you run the code from Listing 14-3 with
    the `UPDATE` statement again. SQL Server tracks the row locations in the nonclustered
    columnstore index through another internal structure called a *delete buffer*,
    which maps the values of clustered index keys and columnstore `row-id`s. This
    allows SQL Server to avoid update scans on column-based storage and to use intent
    exclusive (IX) rather than update intent exclusive (UIX) locks.


    ![../images/463519_1_En_14_Chapter/463519_1_En_14_Fig11_HTML.jpg](images/463519_1_En_14_Chapter/463519_1_En_14_Fig11_HTML.jpg)


    Figure 14-11: Locks held after UPDATE statement


    Nonclustered columnstore indexes have been designed to work in OLTP workloads,
    and they would scale well without introducing additional concurrency issues in
    the system.'
