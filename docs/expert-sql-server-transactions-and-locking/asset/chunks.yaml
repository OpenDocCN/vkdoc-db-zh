    option (recompile, maxdop 1)

    ```


    **代码清单 12-5** 识别使用特定索引的查询


    `sys.dm_db_index_usage_stats` 和 `sys.dm_db_index_operational_stats` 这两个视图都提供了在性能故障排除期间非常有用的信息。然而，数据可能不完整。这些视图不包含在可用组的可读辅助副本上运行的查询的使用统计信息。SQL
    Server 也不会持久化数据库中的数据以使其在 SQL Server 重启后保留。最后，在 SQL Server 2012 RTM-SP3 CU2、SQL
    Server 2014 RTM 和 SP1 中，这些视图在索引重建操作时会被清除。


    请谨慎使用数据，并在分析时将结果与其他来源关联起来。

