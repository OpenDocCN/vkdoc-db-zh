  trans: '

    ## 复合索引


    具有多个键列的索引被称为 *复合（或组合）索引*。复合索引中的数据按照从左到右的列，逐列进行排序。图 1-14 展示了在表的 `LastName` 和 `FirstName`
    列上定义的复合索引结构。数据首先基于 `LastName`（最左列）排序，然后在每个 `LastName` 值内，再基于 `FirstName` 排序。


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig14_HTML.jpg](img/463519_1_En_1_Fig14_HTML.jpg)


    图 1-14

    复合索引结构


    复合索引的 SARGable（搜索参数可用性）取决于最左侧索引列上谓词的 SARGable，这使 SQL Server 能够确定要处理的索引键的范围。


    表 1-1 以图 1-14 中的索引为例，展示了 SARGable 和非 SARGable 谓词的示例。


    表 1-1

    复合索引上的 SARGable 和非 SARGable 谓词


    | SARGable 谓词 | 非 SARGable 谓词 |

    | --- | --- |

    | `LastName = ''Clark'' and FirstName = ''Steve''` | `LastName <> ''Clark'' and
    FirstName = ''Steve''` |

    | `LastName = ''Clark'' and FirstName <> ''Steve''` | `LastName LIKE ''%ar%''
    and FirstName = ''Steve''` |

    | `LastName = ''Clark''` | `FirstName = ''Steve''` |

    | `LastName LIKE ''Cl%''` |   |


    ## 非聚集索引


    聚集索引指定了表中数据行的排序方式，而非聚集索引则为一列或多列定义了独立的排序顺序，并将它们作为独立的数据结构持久化存储。


    你可以以一本书为例。页码代表了这本书的 *聚集索引*。书末的索引按字母顺序列出了书中出现的术语列表。每个术语引用了该术语被提及的页码。这代表了术语的 *非聚集索引*。


    当你需要在书中查找一个术语时，你可以在术语索引中查找它。这是一个快速且高效的操作，因为术语是按字母顺序排序的。接下来，你可以使用那里指定的页码快速找到该术语被提及的页面。如果没有术语索引，唯一的选择就是一页一页地阅读整本书，直到找到该术语的所有提及之处。


    非聚集索引结构与聚集索引结构非常相似。让我们使用 `CREATE NONCLUSTERED INDEX IDX_NCI ON dbo.Customers(Name)`
    语句，在 `dbo.Customers` 表的 `Name` 列上创建一个非聚集索引。图 1-15 展示了两种索引的结构。


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig15_HTML.jpg](img/463519_1_En_1_Fig15_HTML.jpg)


    图 1-15

    聚集和非聚集索引结构


    非聚集索引的叶子级别根据索引键的值（本例中是 `Name`）排序。叶子级别的每一行都包含键值和 `row-id` 值。对于堆表，`row-id` 是行的物理位置，定义为
    `file:page:slot` 地址，其中 `slot` 标识了行在数据页上的位置。


    对于具有聚集索引的表，`row-id` 代表该行聚集索引键的值。这是需要记住的一个非常重要的点。*当表定义了聚集索引时，非聚集索引不会存储关于物理行位置的信息；相反，它们存储聚集索引键的值。*


    与聚集索引类似，非聚集索引的中间级别和根级别为它们所引用的每个页面存储一行。该行由物理地址和该页面上键的最小值组成。此外，对于非唯一索引，它还会存储该行的
    `row-id`。


    让我们看看 SQL Server 如何使用非聚集索引，假设你运行以下查询：

    ```sql

    SELECT * FROM dbo.Customers WHERE Name = ''Boris''

    ```

    如图 1-16 中的第一步所示，SQL Server 从非聚集索引的根页面开始。键值 *Boris* 小于 *Dan*，因此 SQL Server 转到根级别页面第一行引用的中间页面。


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig16_HTML.jpg](img/463519_1_En_1_Fig16_HTML.jpg)


    图 1-16

    非聚集索引使用：步骤 1


    该中间页面的第二行表明，页面上的最小键值是 *Boris*，尽管索引未定义为唯一，SQL Server 不知道第一页上是否存储了其他 *Boris* 行。因此，它转到索引的第一个叶子页面，在那里找到键值为
    *Boris* 且 `row-id` 等于 7 的行。


    在我们的例子中，非聚集索引除了 `CustomerId` 和 `Name` 之外不存储任何其他数据，因此 SQL Server 需要遍历聚集索引树，从表中获取其他列的数据，并将其返回给客户端。此操作称为
    *键查找*。在不存在聚集索引的堆表中，SQL Server 使用 `row-id` 访问数据行，`row-id` 存储行在数据库中的物理位置。此操作称为 *RID
    查找*。


    在图 1-17 所示的下一步中，SQL Server 回到非聚集索引，读取叶子级别的第二个页面。它找到另一个键值为 *Boris*、`row-id` 为 93712
    的行，并再次执行键查找。


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig17_HTML.jpg](img/463519_1_En_1_Fig17_HTML.jpg)


    图 1-17

    非聚集索引使用：步骤 2


    如你所见，即使查询只返回了两行数据，SQL Server 也不得不读取数据页 10 次。I/O 操作的次数可以根据以下公式计算：

    ```

    (非聚集索引的级别数) + (从非聚集索引叶子级别读取的页数) + (找到的行数) * (聚集索引的级别数)

    ```

    正如你可以猜到的，大的 `找到的行数`（键查找操作）会导致大量的 I/O 操作，这使得非聚集索引的使用效率低下。


    这也适用于堆表。从堆中读取主要数据行（RID 查找操作）不需要 SQL Server 遍历聚集索引 B-Tree 的根级别和中间级别。然而，这仍然是一项昂贵的操作，尤其是在使用转发指针时。当堆表行被移动到另一页并创建转发指针时，SQL
    Server 不会更新非聚集索引中的 `row-id`。非聚集索引仍然引用旧行的位置，这可能在 SQL Server 读取转发行时导致额外的 I/O 操作。


    因此，当 SQL Server 预计需要大量键或 RID 查找操作时，它在选择非聚集索引方面非常保守。SQL Server 选择扫描另一个索引或表而非执行键查找的阈值各不相同；然而，这个阈值非常低。


    最后，值得重申的是，非聚集索引存储了索引列数据的副本，这引入了更新开销。当列被更新时，SQL Server 需要在该列出现的每个索引中更新它们。同样，每个插入或删除操作都要求
    SQL Server 在每个非聚集索引 B-Tree 上执行该操作。


    请记住这个开销，避免在系统中创建不必要的非聚集索引。

    '
- fmt: '## Indexes with Included Columns


    As we just discussed, SQL Server rarely uses nonclustered indexes when it expects
    that a large number of key or RID lookups is required. Those operations usually
    lead to a large number of reads, both logical and physical.


    With key lookup operations, SQL Server accesses multiple data pages from a clustered
    index every time it needs to obtain a single row. Even though root and intermediate
    index levels are usually cached in the buffer pool, access to leaf-level pages
    produces random, and often physical, I/O reads, which are slow, especially in
    the case of magnetic disk drives.


    This is also true for heap tables. Even though the `row-id` in a nonclustered
    index stores the physical location of the row in a table, and RID lookup operations
    do not need to traverse the clustered index tree, they still introduce random
    I/O. Moreover, forwarding pointers can lead to extra reads if a row has been updated
    and moved to another page.


    The existence of key or RID lookups is the crucial factor here. Rows in a nonclustered
    index are smaller than those in a clustered index. Nonclustered indexes use fewer
    data pages and, therefore, are more efficient. SQL Server uses nonclustered indexes
    even when it expects that a large number of rows need to be selected, as long
    as key or RID lookups are not required.


    As you will recall, nonclustered indexes store data from the index key columns
    and `row-id`. For tables with clustered indexes, the `row-id` is the clustered
    key value of the index row. The values in all indexes are the same: when you update
    the row, SQL Server synchronously updates all indexes.


    SQL Server does not need to perform key or RID lookups when all of the data a
    query needs exists in a nonclustered index. Those indexes are called *covering
    indexes* because they provide all of the information that a query needs, and they
    are essentially *covering* the query.


    Making nonclustered indexes *covering* is one of the most commonly used query-optimization
    techniques, which improves index efficiency and allows you to eliminate expensive
    key or RID lookups from execution plans. You can achieve it by including required
    columns in the index using the `INCLUDE` clause of the `CREATE INDEX` statement.
    The data from these columns are stored on the leaf level only, without being added
    to the index key and without affecting the sorting order of the index rows.


    Figure [1-18](#463519_1_En_1_Chapter.xhtml#Fig18) illustrates the structure of
    an index with included columns, defined as


    ```sql

    CREATE INDEX IDX_Customers_Name ON dbo.Customers(Name) INCLUDE(DateOfBirth)

    ```


    on the table we defined earlier, which has `CustomerId` as the clustered index
    column.


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig18_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig18_HTML.jpg)


    Figure 1-18


    Structure of an index with included column


    Now, if all columns, which query references are present in the index, SQL Server
    may obtain all data from the leaf level of the nonclustered index B-Tree without
    performing key or RID lookups. It could use the index regardless of how many rows
    would be selected from there.


    Although covering indexes are a great tool that can help optimize queries, they
    come at a cost. Every column in the index increases its row size and the number
    of data pages it uses on disk and in memory. That introduces additional overhead
    during index maintenance and increases the database size. Moreover, queries need
    to read more pages when scanning all or part of the index. It does not necessarily
    introduce a noticeable performance impact during small range scans when reading
    a few extra pages is far more efficient as compared to key lookups. However, it
    could negatively affect the performance of queries that scan a large number of
    data pages or the entire index.


    Obviously, they also add update overhead. By adding a column to nonclustered indexes,
    you store the data in multiple places. This improves the performance of queries
    that select the data. However, during updates, SQL Server needs to change the
    rows in every index where updated columns are present. Remember this and be careful
    with including frequently modified columns to the indexes.


    ## Summary


    The classic SQL Server Storage Engine stores data in disk-based tables using row-based
    storage. All columns from the table are stored together in the data rows, which
    reside on 8 KB data pages.


    The data in the tables may be stored in two different ways—either completely unsorted
    in heap tables or sorted according to a clustered index key when such an index
    is defined. The tables with clustered indexes usually outperform heap tables during
    normal workload.


    Every table may have a set of nonclustered indexes defined. Each nonclustered
    index is a separate data structure, which stores a copy of the data from a table
    sorted according to index key columns. Nonclustered indexes may improve performance
    of the queries at the cost of the update overhead they introduce.


    SQL Server uses key lookup and RID lookup operations to obtain data from columns
    that are not present in nonclustered indexes. These operations are expensive,
    and SQL Server does not use nonclustered indexes if it expects that a large number
    of such operations is required. You can include additional columns in the indexes,
    making them covering and eliminating key and RID lookups from execution plans.


    There are two main data access patterns SQL Server uses when working with indexes.
    Index scans read the entire index by scanning all pages from there. Alternatively,
    index seek processes read just a subset of the index rows and pages. Index seek
    is more efficient than index scan, and it is beneficial to use SARGable predicates
    that may utilize index seek when an index exists.


    # 2. Transaction Management and Concurrency Models


    Transactions are the key concept in data management systems; they guarantee the
    consistency and durability of the data in the database. It is impossible to implement
    a database system without proper transaction management in place.


    This chapter will explain the importance of transactions, provide an overview
    of both pessimistic and optimistic concurrency models, and outline transaction
    isolation levels and the possible data consistency phenomena they may introduce.
    Finally, the chapter will discuss several questions related to transaction management
    and error handling in SQL Server.'
