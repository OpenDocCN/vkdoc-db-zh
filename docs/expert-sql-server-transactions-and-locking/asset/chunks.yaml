    The famous `NOLOCK` hint is just a synonym for `READ UNCOMMITTED` table access.


    Finally, I would like to reiterate that all transaction isolation levels except
    `SNAPSHOT` behave in the same way and use update (U) locks during update scans
    and exclusive (X) locks during data modifications. This leads to writers/writers
    blocking in the system.


    The `SNAPSHOT` isolation level also uses exclusive (X) locks during data modifications.
    However, it does not use update (U) locks during update scans, reading the old
    versions of the rows from the version store in `tempdb`. This eliminates writers/writers
    blocking unless multiple sessions are trying to update the same rows simultaneously.


    ## Transaction Isolation Levels and Data Consistency


    As already mentioned in the previous chapter, we may experience several concurrency
    phenomena in the system. Let’s analyze why those phenomena are possible based
    on the locking behavior of transaction isolation levels.


    *   **Dirty Reads**: This issue arises when transaction reads uncommitted (dirty)
    data from other uncommitted transactions. It is unknown if those active transactions
    will be committed or rolled back or if the data is logically consistent.


    *   From the locking perspective, this phenomenon could occur in the `READ UNCOMMITTED`
    isolation level when sessions do not acquire shared (S) locks and ignore exclusive
    (X) locks from the other sessions. All other isolation levels are immune from
    dirty reads. Pessimistic isolation levels use shared (S) locks and are blocked
    when trying to access uncommitted rows with exclusive (X) locks held on them.
    Optimistic isolation levels, on the other hand, read old (previously) committed
    versions of the rows from the version store.


    *   **Non-Repeatable Reads**: Subsequent attempts to read the same data from within
    the same transaction return different results. This data inconsistency issue arises
    when the other transactions modified or even deleted data between reads. Consider
    a situation where you render a report that displays a list of the orders for a
    specific customer along with some aggregated information (for example, total amount
    spent by customer on a monthly basis). If another session modifies or perhaps
    deletes the orders in between those queries, the result sets will be inconsistent.


    *   From the locking standpoint, such a phenomenon could occur when sessions don’t
    protect/lock the data in between reads. This could happen in the `READ UNCOMMITTED`
    and `READ COMMITTED SNAPSHOT` isolation levels, which do not use shared (S) locks,
    as well as in the `READ COMMITTED` isolation level when sessions acquire and release
    shared (S) locks immediately. `REPEATABLE READ` and `SERIALIZABLE` isolation levels
    hold the shared (S) locks until the end of the transaction, which prevents data
    modifications once data is read.


    *   The `SNAPSHOT` isolation level is also immune from this phenomenon as it works
    with a *snapshot* of the data at the time when the transaction started. We will
    discuss it in depth in Chapter [6](#463519_1_En_6_Chapter.xhtml).


    *   **Phantom Reads**: This phenomenon occurs when subsequent reads within the
    same transaction return new rows (ones that the transaction did not read before).
    Think about the previous example when another session inserted a new order in
    between queries’ execution. Only the `SERIALIZABLE` and `SNAPSHOT` isolation levels
    are free from such phenomenon. `SERIALIZABLE` uses range locks while `SNAPSHOT`
    accesses a snapshot of the data at the time when the transaction starts.


    Two other phenomena are related to data movement due to the change of the index-key
    value. Neither of them occur with optimistic isolation levels.


    *   **Duplicated Reads**: This issue occurs when a query returns the same row
    multiple times. Think about a query that returns a list of orders for a specific
    time interval, scanning the index on the `OrderDate` column during execution.
    If another query changes the `OrderDate` value, moving the row from the processed
    (scanned) to non-processed part of the index, such a row will be read twice.


    *   This condition is similar to non-repeatable reads and can occur when readers
    do not hold shared (S) locks after rows are read in `READ UNCOMMITTED` and `READ
    COMMITTED` isolation levels.


    *   **Skipped Rows**: This phenomenon occurs when queries do not return some of
    the rows. It could occur in a similar condition with duplicated reads as just
    described if rows have been moved from the non-processed to the processed part
    of the index. The `SERIALIZABLE` isolation level, which locks the index-key range
    interval, and optimistic isolation levels—`READ COMMITTED SNAPSHOT` and `SNAPSHOT`—are
    free from such phenomenon.


    Table [3-5](#463519_1_En_3_Chapter.xhtml#Tab5) summarizes data inconsistency issues
    within the different transaction isolation levels.


    Table 3-5


    Transaction Isolation Levels and Data Inconsistency Anomalies


    |   | Dirty Reads | Non-Repeatable Reads | Duplicated Reads | Phantom Reads |
    Skipped Rows |

    | --- | --- | --- | --- | --- | --- |

    | `READ UNCOMMITTED` | Yes | Yes | Yes | Yes | Yes |

    | `READ COMMITTED` | No | Yes | Yes | Yes | Yes |

    | `REPEATABLE READ` | No | No | No | Yes | Yes |

    | `SERIALIZABLE` | No | No | No | No | No |

    | `READ COMMITTED SNAPSHOT` | No | Yes | No | Yes | No |

    | `SNAPSHOT` | No | No | No | No | No |


    `SERIALIZABLE` and `SNAPSHOT` are the only transaction isolation levels that protect
    you from data inconsistency issues. Both of them have downsides, however. `SERIALIZABLE`
    may introduce major blocking issues and deadlocks due to excessive locking in
    systems with volatile data. `SNAPSHOT`, on the other hand, may lead to significant
    `tempdb` load along with the write/write conflict errors. Use them with care!


    ## Locking-Related Table Hints


    There are several other locking-related table hints in addition to the isolation
    level–related hints we have already covered.


    You can control the type of lock acquired by readers with `(` `UPDLOCK` `)` and
    `(` `XLOCK` `)` table hints. These hints force `SELECT` queries to use update
    (U) and exclusive (X) locks, respectively, rather than shared (S) locks. This
    can be useful when you need to prevent multiple `SELECT` queries from reading
    the same rows simultaneously.


    Listing [3-5](#463519_1_En_3_Chapter.xhtml#PC6) demonstrates one such example,
    implementing custom counters in the system. The `SELECT` statement uses an update
    (U) lock, which will block other sessions from reading the same counter row until
    the transaction is committed.'
  trans: "\n### 注意事项\n\n著名的 `NOLOCK` 提示只是 `READ UNCOMMITTED` 表访问方式的同义词。\n\n最后，我想重申一点：除了\
    \ `SNAPSHOT` 以外，所有事务隔离级别行为方式相同，都会在更新扫描期间使用更新 (`U`) 锁，并在数据修改期间使用排他 (`X`) 锁。这会导致系统中出现写入器/写入器阻塞。\n\
    \n`SNAPSHOT` 隔离级别在数据修改期间同样使用排他 (`X`) 锁。然而，它在更新扫描期间不使用更新 (`U`) 锁，而是从 `tempdb` 中的版本存储区读取行的旧版本。除非多个会话同时尝试更新相同的行，否则这消除了写入器/写入器阻塞。\n\
    \n### 事务隔离级别与数据一致性\n\n正如前一章已经提到的，我们可能会在系统中遇到几种并发现象。现在，让我们基于事务隔离级别的锁行为，来分析为什么这些现象是可能发生的。\n\
    \n*   **脏读**：当一个事务从其他未提交的事务中读取到未提交的（脏）数据时，就会出现此问题。尚不清楚这些活动事务是会提交还是回滚，或者数据在逻辑上是否一致。\n\
    \    从锁的角度看，在 `READ UNCOMMITTED` 隔离级别中，当会话不获取共享 (`S`) 锁并忽略其他会话的排他 (`X`) 锁时，就可能发生此现象。所有其他隔离级别都能避免脏读。悲观隔离级别使用共享\
    \ (`S`) 锁，当尝试访问持有排他 (`X`) 锁的未提交行时会被阻塞。而乐观隔离级别则从版本存储区读取行的旧的（先前提交的）版本。\n\n*   **不可重复读**：在同一个事务中，后续尝试读取相同的数据返回不同的结果。当其他事务在读取之间修改甚至删除数据时，就会出现这种数据不一致问题。设想一个情况：您正在生成一份报告，显示特定客户的订单列表以及一些汇总信息（例如，客户每月消费总额）。如果另一个会话在这些查询之间修改或删除了订单，结果集就会不一致。\n\
    \    从锁的角度来看，当会话在读取之间不保护/锁定数据时，就可能发生这种现象。在 `READ UNCOMMITTED` 和 `READ COMMITTED\
    \ SNAPSHOT` 隔离级别中（它们不使用共享 (`S`) 锁）以及在 `READ COMMITTED` 隔离级别中（当会话立即获取并释放共享 (`S`)\
    \ 锁时），都可能发生这种情况。`REPEATABLE READ` 和 `SERIALIZABLE` 隔离级别会持有共享 (`S)` 锁直到事务结束，这可以防止数据在被读取后遭到修改。\n\
    \    `SNAPSHOT` 隔离级别也能避免此现象，因为它处理的是事务开始时数据的快照。我们将在第 6 章深入讨论它。\n\n*   **幻读**：此现象发生在同一个事务中的后续读取返回新行（即该事务之前未读取过的行）时。回想一下前面的例子，如果在查询执行期间，另一个会话插入了一个新订单。只有\
    \ `SERIALIZABLE` 和 `SNAPSHOT` 隔离级别能避免此现象。`SERIALIZABLE` 使用范围锁，而 `SNAPSHOT` 访问事务开始时数据的快照。\n\
    \n另外两种现象与因索引键值更改导致的数据移动有关。这两种现象都不会在乐观隔离级别中发生。\n\n*   **重复读**：当一个查询多次返回相同的行时，就会出现此问题。考虑一个查询，它返回特定时间间隔内的订单列表，在执行期间扫描\
    \ `OrderDate` 列上的索引。如果另一个查询更改了 `OrderDate` 值，将行从已处理（扫描过）的索引部分移动到未处理部分，那么该行将被读取两次。\n\
    \    这种情况类似于不可重复读，当读取器在 `READ UNCOMMITTED` 和 `READ COMMITTED` 隔离级别中读取行后不持有共享 (`S`)\
    \ 锁时，就可能发生。\n\n*   **跳过的行**：当查询没有返回某些行时，就会发生此现象。在类似重复读描述的条件下，如果行从索引的未处理部分移动到已处理部分，就可能发生这种情况。`SERIALIZABLE`\
    \ 隔离级别（锁定索引键范围区间）以及乐观隔离级别——`READ COMMITTED SNAPSHOT` 和 `SNAPSHOT`——都能避免此现象。\n\n\
    表 3-5 总结了不同事务隔离级别下的数据不一致问题。\n\n表 3-5：事务隔离级别与数据不一致异常\n\n| | 脏读 | 不可重复读 | 重复读 |\
    \ 幻读 | 跳过的行 |\n| :--- | :--- | :--- | :--- | :--- | :--- |\n| `READ UNCOMMITTED`\
    \ | 是 | 是 | 是 | 是 | 是 |\n| `READ COMMITTED` | 否 | 是 | 是 | 是 | 是 |\n| `REPEATABLE\
    \ READ` | 否 | 否 | 否 | 是 | 是 |\n| `SERIALIZABLE` | 否 | 否 | 否 | 否 | 否 |\n| `READ\
    \ COMMITTED SNAPSHOT` | 否 | 是 | 否 | 是 | 否 |\n| `SNAPSHOT` | 否 | 否 | 否 | 否 | 否\
    \ |\n\n`SERIALIZABLE` 和 `SNAPSHOT` 是唯一能保护您免受数据不一致问题影响的事务隔离级别。然而，两者都有缺点。`SERIALIZABLE`\
    \ 在数据易变的系统中可能因过度加锁而引入严重的阻塞问题和死锁。另一方面，`SNAPSHOT` 可能导致显著的 `tempdb` 负载以及写入/写入冲突错误。请谨慎使用它们！\n\
    \n### 与锁相关的表提示\n\n除了我们已经介绍的隔离级别相关提示外，还有其他几个与锁相关的表提示。\n\n您可以使用 `(UPDLOCK)` 和 `(XLOCK)`\
    \ 表提示来控制读取器获取的锁类型。这些提示强制 `SELECT` 查询分别使用更新 (`U`) 锁和排他 (`X`) 锁，而不是共享 (`S`) 锁。当您需要防止多个\
    \ `SELECT` 查询同时读取相同的行时，这会非常有用。\n\n清单 3-5 展示了一个这样的例子，在系统中实现自定义计数器。`SELECT` 语句使用了更新\
    \ (`U`) 锁，这将阻止其他会话读取相同的计数器行，直到事务提交。\n"
- fmt: '### Note


    This code is shown for demonstration purposes only and does not handle situations
    where a specific counter does not exist in the table. It is better to use a `SEQUENCE`
    object instead.


    ```sql

    begin tran

    select @Value = Value

    from dbo.Counters with (UPDLOCK)

    where CounterName = @CounterName;

    update dbo.Counters

    set Value += @ReserveCount

    where CounterName = @CounterName;

    commit

    ```

    Listing 3-5: Counters table management


    There are several hints that can help you to control lock granularity. The `(TABLOCK)`
    and `(TABLOCKX)` hints force SQL Server to acquire shared (S) or exclusive (X)
    table-level locks. With the `(TABLOCK)` hint, the type of the lock depends on
    the statement—readers acquire shared (S) and writers acquire exclusive (X) locks.
    The `(TABLOCKX)` hint, on the other hand, always acquires an exclusive (X) lock
    on the table, even with readers.


    As I already mentioned, SQL Server may decide to use lower-granularity locks in
    some cases. For example, during the scans, SQL Server may decide to use full (non-intent)
    page locks instead of acquiring row-level locks on every row from the page. This
    behavior, however, is not guaranteed, but can be controlled, to a degree, with
    `(PAGLOCK)` and `(ROWLOCK)` hints.


    The `(PAGLOCK)` hint forces SQL Server to use full locks on the page level rather
    than on the row level. Alternatively, the `(ROWLOCK)` hint prevents SQL Server
    from using full page-level locks, forcing it to use row-level locking instead.
    As usual, both approaches have benefits and downsides, and in the vast majority
    of cases it is better to allow SQL Server to choose the proper locking strategy
    rather than using those hints.


    The `(READPAST)` hint allows sessions to skip rows with incompatible locks held
    on them rather than being blocked. You will see one example where such a hint
    is useful in Chapter 10. Alternatively, the `(NOWAIT)` hint triggers an error
    as soon as SQL Server encounters an incompatible row- or page-level lock from
    other sessions.


    You can combine multiple locking hints together as long as they do not conflict
    with each other. Listing 3-6 shows such an example. The first `SELECT` statement
    would use page-level exclusive (X) locks. The second `SELECT` statement would
    use row-level locking, keeping shared (S) locks held until the end of the transaction
    due to the `(REPEATABLEREAD)` hint skipping the rows with incompatible lock types
    held. Finally, the third statement would fail due to a conflicting locking hint
    combination.


    ```sql

    select OrderId, OrderDate

    from Delivery.Orders with (PAGLOCK XLOCK)

    where CustomerId = @CustomerId;

    select OrderId, OrderDate

    from Delivery.Orders with (ROWLOCK REPEATABLEREAD READPAST)

    where CustomerId = @CustomerId;

    select OrderId, OrderDate

    from Delivery.Orders with (NOLOCK TABLOCK)

    where CustomerId = @CustomerId;

    ```

    Listing 3-6: Combining locking hints


    ### Note


    For more information about table hints, go to [`https://docs.microsoft.com/en-us/sql/t-sql/queries/hints-transact-sql-table`](https://docs.microsoft.com/en-us/sql/t-sql/queries/hints-transact-sql-table).


    Finally, there is the `SET LOCK_TIMEOUT` option, which can be used on the session
    level to control how long the session should wait for a lock request to be granted.
    SQL Server generates an error when a request cannot be granted within the specified
    interval. A value of -1 indicates no timeout and a value of 0 indicates immediate
    timeout, similar to the `(NOWAIT)` hint.


    SQL Server treats lock timeout errors similarly to other errors in the system.
    The error would not terminate the batch nor would it make an explicit transaction
    uncommittable unless you have the `XACT_ABORT` option set to `ON`. You need to
    factor this behavior into the error-handling strategy, as we discussed in the
    previous chapter.


    Also, remember that `SET LOCK_TIMEOUT` does not override the SQL Client `CommandTimeout`
    value. The client call would fail when the statement execution time exceeds `CommandTimeout`
    regardless of the root cause of the wait.'
