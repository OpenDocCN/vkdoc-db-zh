    | --- | --- | --- |

    | `begin tran`     `select ID, Col`     `from dbo.HKData`         `with (snapshot)`
    |   |   |

    |   | `update dbo.HKData``set Col = -2``where ID = 2` |   |

    |      `select ID, Col`     `from dbo.HKData`         `with (snapshot)` |   |
    Return old version of a row (Col = 2) |

    | `commit` |   | Success |

    | `begin tran`     `select ID, Col`     `from dbo.HKData`         `with (snapshot)`
    |   |   |

    |   | `insert into dbo.HKData``values(10,10)` |   |

    |      `select ID, Col`     `from dbo.HKData`         `with (snapshot)` |   |
    Does not return new row (10,10) |

    | `commit` |   | Success |


    The `SNAPSHOT` isolation level behaves in a similar manner to disk-based tables,
    and it protects from the non-repeatable reads and phantom reads phenomena. As
    you can guess, it does not need to perform repeatable read and serializable validations
    at the commit stage, and therefore it reduces the load on SQL Server. However,
    there is still snapshot validation, which checks for primary-key violations and
    is done in any transaction isolation level.


