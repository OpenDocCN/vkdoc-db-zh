- fmt: '### Synchronous Commit Latency


    AlwaysOn Availability Groups consist one *primary* and one or more *secondary*
    nodes/servers. All data modifications are done on the primary node, which sends
    a stream of transactional log records to the secondaries. Those log records are
    saved (*hardened*) in transaction logs on the secondary nodes and asynchronously
    reapplied to the data files there by a set of *REDO threads*. Assuming there is
    no latency, each server in the Availability Group would store exact byte-to-byte
    copies of the databases.


    The secondary nodes may be configured using *asynchronous* or *synchronous commit*.
    With asynchronous commit, a transaction is considered to be committed when the
    `COMMIT` log record is hardened on the primary node. SQL Server then sends the
    `COMMIT` record to a secondary node; however, it does not wait for confirmation
    that the record has been hardened in the log there. This process is shown in Figure
    [12-10](#463519_1_En_12_Chapter.xhtml#Fig10).


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig10_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig10_HTML.jpg)


    Figure 12-10 Asynchonous commit


    As you can guess, this behavior will reduce the overhead introduced by Availability
    Groups at the cost of possible data loss in the event of a primary node crash/data
    corruption before some of the log records have been sent to the secondaries.


    This behavior changes when you use synchronous commit, as shown in Figure [12-11](#463519_1_En_12_Chapter.xhtml#Fig11).
    In this mode, SQL Server does not consider a transaction to be committed until
    it receives the confirmation that the `COMMIT` log record is hardened in the log
    on the secondary node. While this approach allows you to avoid data loss, it would
    lead to additional commit latency while the primary node is waiting for acknowledgement
    from the secondary server(s).


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig11_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig11_HTML.jpg)


    Figure 12-11 Synchonous commit


    The high synchronous commit latency may introduce subtle and hard to understand
    concurrency issues in the system. SQL Server keeps the transaction active and
    does not release the locks until commit acknowledgements are received. This would
    increase the chance of competing lock requests and blocking in the system.


    There is another potential problem. Some operations—for example, index maintenance—may
    generate an enormous number of transaction log records and saturate the send queue.
    This may lead to extremely high commit latency and introduce severe blocking in
    the system.


    ### Tip


    You can throttle the log-generation rate of index maintenance operations by reducing
    the `MAXDOP` option for the statement. Remember that this will increase the time
    the operation will take.


    You can monitor synchronous commit latency with the `HADR_SYNC_COMMIT` wait. The
    average wait time from the `sys.dm_os_wait_stats` view would provide you with
    latency information. Remember that latency may seriously deviate during atypical,
    log-intensive workloads; consider clearing wait statistics with the `DBCC SQLPERF(''sys.dm_os_wait_stats'',
    CLEAR)` command when you troubleshoot the latency at a particular time.


    High commit latency troubleshooting requires you to locate the bottleneck and
    identify what consumes the most time during the process. There are three main
    factors that contribute to it:


    1.  The time a log record waits in the send queue. You can analyze this with the
    code in Listing [12-10](#463519_1_En_12_Chapter.xhtml#PC10) using the data from
    the `[Send Queue Size(KB)]` and `[Send Rate KB/Sec]` columns. It is worth noting
    that the queue management process is CPU intensive, which may lead to additional
    latency in systems with high CPU load.

    2.  Network throughput. You can troubleshoot it with network-related performance
    counters. There are also several Availability Group–related performance counters
    that indicate the amount of data sent between the nodes.

    3.  I/O latency on secondary nodes. Synchronous commit requires a `COMMIT` log
    record to be hardened in the transaction log before acknowledgement is sent back
    to the primary node. You can monitor the write latency of transaction log files
    using the `sys.dm_io_virtual_file_stats` view. I am including the script that
    allows you to do this in the companion materials for this book.


    ```

    select

    ag.name as [Availability Group]

    ,ar.replica_server_name as [Server]

    ,db_name(drs.database_id) as [Database]

    ,case when ars.is_local = 1 then ''Local'' else ''Remote'' end

    ,case as [DB Location]

    ,ars.role_desc as [Replica Role]

    ,drs.synchronization_state_desc as [Sync State]

    ,ars.synchronization_health_desc as [Health State]

    ,drs.log_send_queue_size as [Send Queue Size (KB)]

    ,drs.log_send_rate as [Send Rate KB/Sec]

    ,drs.redo_queue_size as [Redo Queue Size (KB)]

    ,drs.redo_rate as [Redo Rate KB/Sec]

    from

    sys.availability_groups ag with (nolock)

    join sys.availability_replicas ar  with (nolock) on

    ag.group_id = ar.group_id

    join sys.dm_hadr_availability_replica_states ars  with (nolock) on

    ar.replica_id = ars.replica_id

    join sys.dm_hadr_database_replica_states drs  with (nolock) on

    ag.group_id = drs.group_id and drs.replica_id = ars.replica_id

    order by

    ag.name, drs.database_id, ar.replica_server_name

    ```


    Listing 12-10 Analyze Availability Group queues


    While network and I/O performance may sometimes be addressed by hardware upgrades,
    it is much harder to deal with the latency introduced by a large number of log
    records in very busy OLTP systems. You can reduce the impact of queue management
    by utilizing CPUs with higher clock speed; however, there are some limits on what
    you can achieve with hardware.


    There are several things you can do when you experience this situation:


    *   Make sure that SQL Server schedulers are evenly balanced across NUMA nodes.
    For example, if SQL Server is using 10 cores on a 2-NUMA-node server with 8 cores
    per node, set the affinity mask to use 5 cores per node. Unevenly balanced schedules
    may introduce various performance issues in the system and affect Availability
    Group throughput.

    *   Reduce the number of log records generated in the system. Some options are
    to redesign the transaction strategy to avoid autocommitted transactions; remove
    unused and redundant indexes; and fine-tune the index `FILLFACTOR` property to
    reduce the page splits in the system.

    *   Rearchitect data tier in the system. It is very common that different data
    in the system may have different RPO (*recovery point objective*) requirements
    and tolerances to the data loss. You may consider moving some data to another
    Availability Group that does not require synchronous commit and/or utilize NoSQL
    technologies for some entities.

    *   Finally, if you are using SQL Server prior to 2016, you should consider upgrading
    to the latest version of the product. SQL Server 2016 has several internal optimizations
    that dramatically increase Availability Group throughput over that of SQL Server
    2012 and 2014. It may be the simplest solution in many cases.


    ### Note


    You may experience the same commit latency problems with synchronous database
    mirroring. You should monitor the `DBMIRROR_SEND` wait type in this case.'
  raw: '### Synchronous Commit Latency


    AlwaysOn Availability Groups consist of one *primary* and one or more *secondary*
    nodes/servers . All data modifications are done on the primary node, which sends
    a stream of transactional log records to the secondaries. Those log records are
    saved (*hardened*) in transaction logs on the secondary nodes and asynchronously
    reapplied to the data files there by a set of *REDO threads*. Assuming there is
    no latency, each server in the Availability Group would store exact byte-to-byte
    copies of the databases.


    The secondary nodes may be configured using *asynchronous* or *synchronous commit*.
    With asynchronous commit, a transaction is considered to be committed when the
    `COMMIT` log record is hardened on the primary node. SQL Server then sends the
    `COMMIT` record to a secondary node; however, it does not wait for confirmation
    that the record has been hardened in the log there. This process is shown in Figure
    [12-10](#463519_1_En_12_Chapter.xhtml#Fig10).


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig10_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig10_HTML.jpg)


    Figure 12-10


    Asynchonous commit


    As you can guess, this behavior will reduce the overhead introduced by Availability
    Groups at the cost of possible data loss in the event of a primary node crash/data
    corruption before some of the log records have been sent to the secondaries.


    This behavior changes when you use synchronous commit , as shown in Figure [12-11](#463519_1_En_12_Chapter.xhtml#Fig11).
    In this mode, SQL Server does not consider a transaction to be committed until
    it receives the confirmation that the `COMMIT` log record is hardened in the log
    on the secondary node. While this approach allows you to avoid data loss, it would
    lead to additional commit latency while the primary node is waiting for acknowledgement
    from the secondary server(s).


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig11_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig11_HTML.jpg)


    Figure 12-11


    Synchonous commit


    The high synchronous commit latency may introduce subtle and hard to understand
    concurrency issues in the system. SQL Server keeps the transaction active and
    does not release the locks until commit acknowledgements are received. This would
    increase the chance of competing lock requests and blocking in the system.


    There is another potential problem. Some operations—for example, index maintenance—may
    generate an enormous number of transaction log records and saturate the send queue.
    This may lead to extremely high commit latency and introduce severe blocking in
    the system.


    ### Tip


    You can throttle the log-generation rate of index maintenance operations by reducing
    the `MAXDOP` option for the statement. Remember that this will increase the time
    the operation will take.


    You can monitor synchronous commit latency with the `HADR_SYNC_COMMIT` wait. The
    average wait time from the `sys.dm_os_wait_stats` view would provide you with
    latency information. Remember that latency may seriously deviate during atypical,
    log-intensive workloads; consider clearing wait statistics with the `DBCC SQLPERF(''sys.dm_os_wait_stats'',
    CLEAR)` command when you troubleshoot the latency at a particular time.


    High commit latency troubleshooting requires you to locate the bottleneck and
    identify what consumes the most time during the process. There are three main
    factors that contribute to it:


    1.  The time a log record waits in the send queue. You can analyze this with the
    code in Listing [12-10](#463519_1_En_12_Chapter.xhtml#PC10) using the data from
    the `[Send Queue Size(KB)]` and `[Send Rate KB/Sec]` columns. It is worth noting
    that the queue management process is CPU intensive, which may lead to additional
    latency in systems with high CPU load.


    2.  Network throughput. You can troubleshoot it with network-related performance
    counters. There are also several Availability Group–related performance counters
    that indicate the amount of data sent between the nodes.


    3.  I/O latency on secondary nodes. Synchronous commit requires a `COMMIT` log
    record to be hardened in the transaction log before acknowledgement is sent back
    to the primary node. You can monitor the write latency of transaction log files
    using the `sys.dm_io_virtual_file_stats` view. I am including the script that
    allows you to do this in the companion materials for this book.


    ```

    select

    ag.name as [Availability Group]

    ,ar.replica_server_name as [Server]

    ,db_name(drs.database_id) as [Database]

    ,case when ars.is_local = 1 then ''Local'' else ''Remote'' end

    ,case as [DB Location]

    ,ars.role_desc as [Replica Role]

    ,drs.synchronization_state_desc as [Sync State]

    ,ars.synchronization_health_desc as [Health State]

    ,drs.log_send_queue_size as [Send Queue Size (KB)]

    ,drs.log_send_rate as [Send Rate KB/Sec]

    ,drs.redo_queue_size as [Redo Queue Size (KB)]

    ,drs.redo_rate as [Redo Rate KB/Sec]

    from

    sys.availability_groups ag with (nolock)

    join sys.availability_replicas ar  with (nolock) on

    ag.group_id = ar.group_id

    join sys.dm_hadr_availability_replica_states ars  with (nolock) on

    ar.replica_id = ars.replica_id

    join sys.dm_hadr_database_replica_states drs  with (nolock) on

    ag.group_id = drs.group_id and drs.replica_id = ars.replica_id

    order by

    ag.name, drs.database_id, ar.replica_server_name

    Listing 12-10

    Analyze Availability Group queues

    ```


    While network and I/O performance may sometimes be addressed by hardware upgrades,
    it is much harder to deal with the latency introduced by a large number of log
    records in very busy OLTP systems. You can reduce the impact of queue management
    by utilizing CPUs with higher clock speed; however, there are some limits on what
    you can achieve with hardware.


    There are several things you can do when you experience this situation:


    *   Make sure that SQL Server schedulers are evenly balanced across NUMA nodes.
    For example, if SQL Server is using 10 cores on a 2-NUMA-node server with 8 cores
    per node, set the affinity mask to use 5 cores per node. Unevenly balanced schedules
    may introduce various performance issues in the system and affect Availability
    Group throughput.


    *   Reduce the number of log records generated in the system. Some options are
    to redesign the transaction strategy to avoid autocommitted transactions; remove
    unused and redundant indexes; and fine-tune the index `FILLFACTOR` property to
    reduce the page splits in the system.


    *   Rearchitect data tier in the system. It is very common that different data
    in the system may have different RPO (*recovery point objective*) requirements
    and tolerances to the data loss. You may consider moving some data to another
    Availability Group that does not require synchronous commit and/or utilize NoSQL
    technologies for some entities.


    Finally, if you are using SQL Server prior to 2016, you should consider upgrading
    to the latest version of the product. SQL Server 2016 has several internal optimizations
    that dramatically increase Availability Group throughput over that of SQL Server
    2012 and 2014\. It may be the simplest solution in many cases.


    ### Note


    You may experience the same commit latency problems with synchronous database
    mirroring. You should monitor the `DBMIRROR_SEND` wait type in this case.'
  trans: '

    ### 同步提交延迟


    AlwaysOn 可用性组由一个*主*节点和一个或多个*辅助*节点/服务器组成。所有数据修改均在主节点上进行，主节点将事务日志记录流发送到辅助节点。这些日志记录在辅助节点上的事务日志中被保存（*固化*），然后由一组*REDO
    线程*异步地重新应用到那里的数据文件中。假设没有延迟，可用性组中的每个服务器都将存储与数据库字节级完全相同的副本。


    辅助节点可以配置为使用*异步*或*同步*提交。在异步提交模式下，当 `COMMIT` 日志记录在主节点上固化后，事务即被视为已提交。然后 SQL Server
    会将该 `COMMIT` 记录发送给辅助节点；但是，它不会等待该记录在辅助节点的日志中固化的确认。此过程如图 12-10 所示。


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig10_HTML.jpg](img/463519_1_En_12_Fig10_HTML.jpg)


    图 12-10 异步提交


    可以想到，这种行为会降低可用性组引入的开销，但代价是，在某些日志记录尚未发送到辅助节点之前，如果主节点发生崩溃/数据损坏，则可能发生数据丢失。


    当您使用同步提交时，这种行为会发生变化，如图 12-11 所示。在此模式下，SQL Server 在收到 `COMMIT` 日志记录已在辅助节点日志中固化的确认之前，不会认为事务已提交。虽然这种方法可以避免数据丢失，但会导致额外的提交延迟，因为主节点正在等待辅助服务器的确认。


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig11_HTML.jpg](img/463519_1_En_12_Fig11_HTML.jpg)


    图 12-11 同步提交


    高同步提交延迟可能会在系统中引入微妙且难以理解的并发问题。SQL Server 会保持事务处于活动状态，并且在收到提交确认之前不会释放锁。这会增加锁请求竞争和系统中阻塞的可能性。


    还有另一个潜在问题。某些操作——例如索引维护——可能会生成大量的事务日志记录并使发送队列饱和。这可能导致极高的提交延迟，并在系统中引入严重的阻塞。


    ### 提示


    您可以通过降低语句的 `MAXDOP` 选项来限制索引维护操作的日志生成速率。请记住，这会增加操作所需的时间。


    您可以使用 `HADR_SYNC_COMMIT` 等待类型来监控同步提交延迟。从 `sys.dm_os_wait_stats` 视图中获取的平均等待时间将为您提供延迟信息。请记住，在非典型的、日志密集型工作负载期间，延迟可能会严重偏离；在对特定时间点的延迟进行故障排除时，可以考虑使用
    `DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)` 命令清除等待统计信息。


    高提交延迟故障排除需要您定位瓶颈并识别在此过程中消耗时间最多的部分。主要有三个因素导致延迟：


    1.  日志记录在发送队列中等待的时间。您可以使用清单 12-10 中的代码，利用 `[Send Queue Size(KB)]` 和 `[Send Rate
    KB/Sec]` 列的数据来分析这一点。值得注意的是，队列管理过程是 CPU 密集型的，在 CPU 负载高的系统中可能会导致额外的延迟。

    2.  网络吞吐量。您可以使用与网络相关的性能计数器对其进行故障排除。还有一些与可用性组相关的性能计数器，它们指示节点之间发送的数据量。

    3.  辅助节点上的 I/O 延迟。同步提交要求 `COMMIT` 日志记录在事务日志中固化后才会向主节点发送确认。您可以使用 `sys.dm_io_virtual_file_stats`
    视图来监控事务日志文件的写入延迟。我在本书的配套材料中包含了允许您执行此操作的脚本。


    ```

    select

    ag.name as [Availability Group]

    ,ar.replica_server_name as [Server]

    ,db_name(drs.database_id) as [Database]

    ,case when ars.is_local = 1 then ''Local'' else ''Remote'' end

    ,case as [DB Location]

    ,ars.role_desc as [Replica Role]

    ,drs.synchronization_state_desc as [Sync State]

    ,ars.synchronization_health_desc as [Health State]

    ,drs.log_send_queue_size as [Send Queue Size (KB)]

    ,drs.log_send_rate as [Send Rate KB/Sec]

    ,drs.redo_queue_size as [Redo Queue Size (KB)]

    ,drs.redo_rate as [Redo Rate KB/Sec]

    from

    sys.availability_groups ag with (nolock)

    join sys.availability_replicas ar  with (nolock) on

    ag.group_id = ar.group_id

    join sys.dm_hadr_availability_replica_states ars  with (nolock) on

    ar.replica_id = ars.replica_id

    join sys.dm_hadr_database_replica_states drs  with (nolock) on

    ag.group_id = drs.group_id and drs.replica_id = ars.replica_id

    order by

    ag.name, drs.database_id, ar.replica_server_name

    ```


    清单 12-10 分析可用性组队列


    虽然网络和 I/O 性能有时可以通过硬件升级来解决，但在非常繁忙的 OLTP 系统中，处理由大量日志记录引起的延迟要困难得多。您可以通过使用更高时钟频率的
    CPU 来减少队列管理的影响；然而，硬件所能达到的效果存在一些限制。


    当您遇到这种情况时，可以采取以下几项措施：


    *   确保 SQL Server 调度程序在 NUMA 节点之间均匀平衡。例如，如果 SQL Server 在一个具有 2 个 NUMA 节点、每个节点
    8 个内核的服务器上使用 10 个内核，则设置关联性掩码以使用每个节点 5 个内核。调度不均衡可能会在系统中引入各种性能问题，并影响可用性组吞吐量。

    *   减少系统中生成的日志记录数量。一些选择是：重新设计事务策略以避免自动提交的事务；删除未使用和冗余的索引；微调索引的 `FILLFACTOR` 属性以减少系统中的页拆分。

    *   重新设计系统中的数据层。系统中的不同数据可能具有不同的 RPO（*恢复点目标*）要求和对数据丢失的容忍度，这种情况非常常见。您可以考虑将某些数据移动到另一个不需要同步提交的可用性组，和/或对某些实体利用
    NoSQL 技术。

    *   最后，如果您使用的是 SQL Server 2016 之前的版本，您应该考虑升级到产品的最新版本。SQL Server 2016 具有若干内部优化，可显著提高可用性组吞吐量，远超
    SQL Server 2012 和 2014。在许多情况下，这可能是最简单的解决方案。


    ### 注意


    在同步数据库镜像中，您也可能会遇到相同的提交延迟问题。在这种情况下，您应该监控 `DBMIRROR_SEND` 等待类型。

    '
- fmt: '### Readable Secondaries and Row Versioning


    The Enterprise Edition of SQL Server allows you to configure read-only access
    to the secondary nodes in AlwaysOn Availability Groups, thus scaling the read-only
    workload in the system. This, however, may lead to unexpected side effects on
    the primary node in the group.


    When you run queries against secondary nodes, SQL Server always uses the `SNAPSHOT`
    isolation level, ignoring the `SET TRANSACTION ISOLATION LEVEL` statement and
    locking hints. It allows it to eliminate possible readers/writers blocking, and
    it happens even if you did not enable the `ALLOW_SNAPSHOT_ISOLATION` database
    option.


    It also means that SQL Server will use row versioning on the primary node. You
    may not be able to use optimistic isolation levels programmatically when they
    are not enabled; nevertheless, SQL Server would use row versioning internally.
    The databases on the primary and secondary nodes are exactly the same, and it
    is impossible to use row versioning only on the secondary nodes.


    As you will remember from Chapter 6, this behavior will introduce additional `tempdb`
    load to support the version store. It may also increase index fragmentation due
    to the 14-byte pointers appended to the data rows during data modifications. However,
    it also leads to another phenomenon. Long-running `SNAPSHOT` transactions on secondary
    nodes may defer ghost and version-store cleanup on the primary node. SQL Server
    cannot remove deleted rows and reuse the space, because of the possibility that
    a `SNAPSHOT` transaction on the secondary node will need to access the old versions
    of the rows.


    Let’s look at an example and create two tables in the database, as shown in Listing
    12-11. The table `dbo.T1` will have 65,536 rows and will use 65,536 pages—one
    row per data page.


    ```sql

    create table dbo.T1

    (

    ID int not null,

    Placeholder char(8000) null,

    constraint PK_T1

    primary key clustered(ID)

    );

    create table dbo.T2

    (

    Col int

    );

    ;with N1(C) as (select 0 union all select 0) -- 2 rows

    ,N2(C) as (select 0 from N1 as T1 cross join N1 as T2) -- 4 rows

    ,N3(C) as (select 0 from N2 as T1 cross join N2 as T2) -- 16 rows

    ,N4(C) as (select 0 from N3 as T1 cross join N3 as T2) -- 256 rows

    ,N5(C) as (select 0 from N4 as T1 cross join N4 as T2 ) -- 65,536 rows

    ,IDs(ID) as (select row_number() over (order by (select null)) from N5)

    insert into dbo.T1(ID)

    select ID from IDs;

    ```

    Listing 12-11: Readable secondaries: Tables creation


    As the next step, let’s start a transaction on the secondary node and run the
    query against the `dbo.T2` table, as shown in Listing 12-12. Even though we are
    using explicit transactions, the same behavior will occur with long-running statements
    in autocommitted transactions.


    ```sql

    begin tran

    select * from dbo.T2;

    ```

    Listing 12-12: Readable secondaries: Starting transaction on secondary node


    Next, let’s delete all data from the `dbo.T1` table and then run a query that
    will do a Clustered Index Scan on the primary node. The code is shown in Listing
    12-13.


    ```sql

    delete from dbo.T1;

    go

    -- Waiting 1 minute

    waitfor delay ''00:01:00.000'';

    set statistics io on

    select count(*) from dbo.T1;

    set statistics io off

    --Output: Table ''T1''. Scan count 1, logical reads 65781

    ```

    Listing 12-13: Readable secondaries: Deleting data and performing CI Scan


    As you can see, despite the fact that the table is empty, the data pages have
    not been deallocated. This leads to significant I/O overhead on the primary node.


    Finally, let’s look at the index statistics using the code from Listing 12-14.


    ```sql

    select index_id, index_level, page_count, record_count, version_ghost_record_count

    from sys.dm_db_index_physical_stats(db_id(),object_id(N''dbo.T1''),1,NULL,''DETAILED'');

    ```

    Listing 12-14: Readable secondaries: Analyzing index statistics


    Figure 12-12 shows the output of the query. As you can see, the leaf index level
    shows 65,536 rows in the `version_ghost_record_count` column. This column contains
    the number of ghosted rows that cannot be removed due to the active transactions
    in the system that rely on row versioning. In our case, this transaction runs
    on a different (secondary) node.


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig12_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig12_HTML.jpg)


    Figure 12-12: Index statistics


    There is nothing special about this behavior. The ghost and version store cleanup
    tasks would behave the same way if `SNAPSHOT` transactions were running on the
    primary node. It is very common, however, to see systems in which people offload
    non-optimized reporting queries to secondary nodes without understanding the potential
    impact it may have on the primary node.


    Remember this behavior when you plan to use readable secondaries, and apply the
    same considerations as when you enable optimistic isolation levels in the system.
    On the flip side, there is absolutely no reason to avoid using optimistic isolation
    levels when you have readable secondaries enabled. SQL Server already uses row
    versioning internally, even if you do not enable it in the database.'
