- fmt: '**Note**


    Every table/index in SQL Server is partitioned. Non-partitioned tables are treated
    as single-partition tables/indexes internally.


    As I already mentioned, the actual data is stored in *data rows* on 8 KB *data
    pages* with 8,060 bytes available to users. The pages that store users’ data may
    belong to three different categories called *allocation units* based on the type
    of data they store.


    The `IN_ROW_DATA` allocation unit pages store the *main* data row objects, which
    consist of internal attributes and the data from fixed-length columns, such as
    `int`, `datetime`, `float`, and others. The in-row part of a data row must fit
    on a single data page and, therefore, cannot exceed 8,060 bytes. The data from
    variable-length columns, such as `(n)varchar(max)`, `(n)varbinary(max)`, `xml`,
    and others, may also be stored in-row in the main row object when it fits into
    this limit.


    In cases when variable-length data does not fit in-row, SQL Server stores it off-row
    on different data pages, referencing them through in-row pointers. Variable-length
    data that exceeds 8,000 bytes is stored on `LOB_DATA` allocation unit data pages
    (`LOB` stands for *large objects*). Otherwise, the data is stored in `ROW_OVERFLOW_DATA`
    allocation unit pages.


    Let’s look at an example and create a table that contains several fixed- and variable-length
    columns and insert one row there, as shown in Listing 1-1.


    ```

    create table dbo.DataRows

    (

    ID int not null,

    ADate datetime not null,

    VarCol1 varchar(max),

    VarCol2 varchar(5000),

    VarCol3 varchar(5000)

    );

    insert into dbo.DataRows(ID, ADate, VarCol1, VarCol2, VarCol3)

    values

    (

    1

    ,''1974-08-22''

    ,replicate(convert(varchar(max),''A''),32000)

    ,replicate(convert(varchar(max),''B''),5000)

    ,replicate(convert(varchar(max),''C''),5000)

    );

    ```

    Listing 1-1: Data row storage: Creating the test table


    The data from fixed-length columns (`ID`, `ADate`) will be stored in-row on an
    `IN_ROW_DATA` allocation unit page. The data from the `VarCol1` column is 32,000
    bytes and will be stored on `LOB_DATA` data pages.


    The `VarCol2` and `VarCol3` columns have 5,000 bytes of data each. SQL Server
    would keep one of them in-row (it would fit into the 8,060-byte limit) and place
    the other one on the single `ROW_OVERFLOW_DATA` page.


    **Note**

    Off-row column pointers use 16 or 24 bytes in-row, which counts toward the 8,060
    maximum row size. In practice, this may limit the number of columns you can have
    in a table.


    Figure 1-2 illustrates this state.


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig2_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig2_HTML.jpg)

    Figure 1-2: Data row storage: Data pages after the first INSERT


    The `sys.dm_db_index_physical_stats` data management function is usually used
    to analyze index fragmentation. It also displays the information about data pages
    on a per–allocation unit basis.


    Listing 1-2 shows the query that returns the information about the `dbo.DataRows`
    table.


    ```

    select

    index_id, partition_number, alloc_unit_type_desc

    ,page_count, record_count, min_record_size_in_bytes

    ,max_record_size_in_bytes, avg_record_size_in_bytes

    from

    sys.dm_db_index_physical_stats

    (

    db_id()

    ,object_id(N''dbo.DataRows'')

    ,0  /* IndexId = 0 -> Table Heap */

    ,NULL /* All Partitions */

    ,''DETAILED''

    );

    ```

    Listing 1-2: Data row storage: Analyzing the table using `sys.dm_db_index_physical_stats`
    DMO


    Figure 1-3 illustrates the output of the code. As expected, the table has one
    `IN_ROW_DATA`, one `ROW_OVERFLOW_DATA`, and four `LOB_DATA` pages. The `IN_ROW_DATA`
    page has about 2,900 free bytes available.


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig3_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig3_HTML.jpg)

    Figure 1-3: Data row storage: `sys.dm_db_index_physical_stats` output after the
    first INSERT


    Let’s insert another row using the code from Listing 1-3.


    ```

    insert into dbo.DataRows(ID, ADate, VarCol1, VarCol2, VarCol3)

    values(2,''2006-09-29'',''DDDDD'',''EEEEE'',''FFFFF'');

    ```

    Listing 1-3: Data row storage: Inserting the second row


    All three variable-length columns store five-character strings, and, therefore,
    the row would fit on the already-allocated `IN_ROW_DATA` page. Figure 1-4 illustrates
    data pages at this phase.


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig4_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig4_HTML.jpg)

    Figure 1-4: Data row storage: Data pages after the second INSERT


    You can confirm it by running the code from Listing 1-2 again. Figure 1-5 illustrates
    the output from the view.


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig5_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig5_HTML.jpg)

    Figure 1-5: Data row storage: `sys.dm_db_index_physical_stats` output after the
    second INSERT


    SQL Server logically groups eight pages into 64KB units called *extents*. There
    are two types of extents available: *mixed extents* store data that belongs to
    different objects, while *uniform extents* store the data for the same object.


    By default, when a new object is created, SQL Server stores the first eight object
    pages in mixed extents. After that, all subsequent space allocation for that object
    is done with uniform extents.


    **Tip**

    Disabling mixed extents allocation may help to improve `tempdb` throughput in
    the system. In SQL Server prior to 2016, you can achieve that by enabling server-level
    trace flag `T1118`. This trace flag is not required in SQL Server 2016 and above,
    where `tempdb` does not use mixed extents anymore.


    SQL Server uses a special kind of pages, called *allocation maps*, to track extent
    and page usage in database files. *Index Allocation Maps (IAM)* pages track extents
    that belong to an allocation unit on a per-partition basis. Those pages are, in
    a nutshell, bitmaps, where each bit indicates if the extent belongs to a specific
    allocation unit from the object partition.


    Each IAM page covers about 64,000 extents, or almost 4 GB of data in a data file.
    For larger files, multiple IAM pages are linked together into *IAM chains*.


    **Note**

    There are many other types of allocation maps used for database management. You
    can read about them at [`https://docs.microsoft.com/en-us/sql/relational-databases/pages-and-extents-architecture-guide`](https://docs.microsoft.com/en-us/sql/relational-databases/pages-and-extents-architecture-guide)
    or in the book *Pro SQL Server Internals*.'
