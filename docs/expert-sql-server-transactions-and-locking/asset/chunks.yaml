- fmt: '## Composite Indexes


    Indexes with multiple key columns are called *composite (or compound) indexes*.
    The data in the composite indexes is sorted on a per-column basis from leftmost
    to rightmost columns. Figure [1-14](#463519_1_En_1_Chapter.xhtml#Fig14) shows
    the structure of a composite index defined on `LastName` and `FirstName` columns
    in the table. The data is sorted based on `LastName` (left-most column) first
    and then on `FirstName` within each `LastName` value .


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig14_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig14_HTML.jpg)


    Figure 1-14


    Composite index structure


    The SARGability of a composite index depends on the SARGability of the predicates
    on the leftmost index columns, which allow SQL Server to determine the range of
    the index keys to process.


    Table [1-1](#463519_1_En_1_Chapter.xhtml#Tab1) shows examples of SARGable and
    non-SARGable predicates, using the index from Figure [1-14](#463519_1_En_1_Chapter.xhtml#Fig14)
    as the example.


    Table 1-1


    SARGable and non-SARGable Predicates on a Composite Index


    | SARGable Predicates | Non-SARGable Predicates |

    | --- | --- |

    | `LastName = ''Clark'' and FirstName = ''Steve''` | `LastName <> ''Clark'' and
    FirstName = ''Steve''` |

    | `LastName = ''Clark'' and FirstName <> ''Steve''` | `LastName LIKE ''%ar%''
    and FirstName = ''Steve''` |

    | `LastName = ''Clark''` | `FirstName = ''Steve''` |

    | `LastName LIKE ''Cl%''` |   |


    ## Nonclustered Indexes


    While a clustered index specifies how data rows are sorted in a table, nonclustered
    indexes define a separate sorting order for a column or set of columns and persist
    them as separate data structures.


    You can think about a book as an example. Page numbers would represent the book’s
    *clustered index*. The index at the end of the book shows the list of terms from
    the book in alphabetical order. Each term references the page numbers where the
    term is mentioned. That represents the *nonclustered index* of the terms.


    When you need to find a term in the book, you can look it up in the term index.
    It is a fast and efficient operation because terms are sorted in alphabetical
    order. Next, you can quickly find the pages on which the terms are mentioned by
    using the page numbers specified there. Without the term index, the only choice
    would be to read all of the pages in the book one by one until all references
    to the term are found.


    The nonclustered index structure is very similar to the clustered index structure.
    Let’s create a nonclustered index on the `Name` column from the `dbo.Customers`
    table with `CREATE NONCLUSTERED INDEX IDX_NCI ON dbo.Customers(Name)` statement.
    Figure [1-15](#463519_1_En_1_Chapter.xhtml#Fig15) shows the structure of both
    indexes.


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig15_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig15_HTML.jpg)


    Figure 1-15


    Clustered and nonclustered index structures


    The leaf level of the nonclustered index is sorted based on the value of the index
    key—`Name` in our case. Every row on the leaf level includes the key value and
    `row-id` value. For heap tables, `row-id` is the physical location of the row
    defined as the `file:page:slot` address, where `slot` identifies location of the
    row on the data page.


    For tables with a clustered index, `row-id` represents the value of the clustered
    index key of the row. This is a very important point to remember. *Nonclustered
    indexes do not store information about physical row location when a table has
    a clustered index defined. They store the value of the clustered index key instead.*


    Like clustered indexes, the intermediate and root levels of nonclustered indexes
    store one row per page from the level they reference. That row consists of the
    physical address and the minimum value of the key from the page. In addition,
    for non-unique indexes, it also stores the `row-id` of such a row.


    Let’s look at how SQL Server uses nonclustered indexes, assuming that you run
    the following query:

    ```sql

    SELECT * FROM dbo.Customers WHERE Name = ''Boris''

    ```

    As shown in the first step in Figure [1-16](#463519_1_En_1_Chapter.xhtml#Fig16),
    SQL Server starts with the root page of the nonclustered index. The key value
    *Boris* is less than *Dan,* and SQL Server goes to the intermediate page referenced
    from the first row in the root-level page.


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig16_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig16_HTML.jpg)


    Figure 1-16


    Nonclustered index usage: Step 1


    The second row of the intermediate page indicates that the minimum key value on
    the page is *Boris* , although the index had not been defined as unique and SQL
    Server does not know if there are other *Boris* rows stored on the first page.
    As a result, it goes to the first leaf page of the index and finds the row with
    the key value *Boris* and `row-id` equal to 7 there.


    In our case, the nonclustered index does not store any data besides `CustomerId`
    and `Name`*,* and SQL Server needs to traverse the clustered index tree and obtain
    the data from other columns from a table, returning them to the client. This operation
    is called *Key Lookup*. In heap tables, where clustered indexes do not exist,
    SQL Server accesses data rows using `row-id`, which stores a physical location
    of the row in the database. This operation is called *RID Lookup* .


    In the next step shown in Figure [1-17](#463519_1_En_1_Chapter.xhtml#Fig17), SQL
    Server comes back to the nonclustered index and reads the second page from the
    leaf level. It finds another row with the key value *Boris* and `row-id` of 93712,
    and it performs a key lookup again.


    ![../images/463519_1_En_1_Chapter/463519_1_En_1_Fig17_HTML.jpg](images/463519_1_En_1_Chapter/463519_1_En_1_Fig17_HTML.jpg)


    Figure 1-17


    Nonclustered index usage: Step 2


    As you can see, SQL Server had to read the data pages 10 times even though the
    query returned just two rows. The number of I/O operations can be calculated based
    on the following formula:

    ```

    (# of levels in nonclustered index) + (number of pages read from the leaf level
    of nonclustered index) + (number of rows found) * (# of levels in clustered index)

    ```

    As you can guess, a large `number of rows found` (key lookup operations) leads
    to a large number of I/O operations, which makes nonclustered index usage inefficient.


    The same applies to heap tables. Reading the main data row from a heap (RID lookup
    operation) does not require SQL Server to traverse root and intermediate levels
    of clustered index B-Tree. Nevertheless, it is an expensive operation, especially
    with forwarding pointers. SQL Server does not update `row-id` in nonclustered
    indexes when a heap table row is moved to another page and forwarding pointer
    is created. Nonclustered indexes still reference the old row location, which may
    lead to additional I/O operation when SQL Server reads the forwarded row.


    As a result, SQL Server is very conservative in choosing nonclustered indexes
    when it expects that a large number of key or RID lookup operations will be required.
    The threshold when SQL Server chooses to scan another index or table over performing
    key lookups varies; however, it is very low.


    Finally, it is worth repeating that nonclustered indexes store a copy of the data
    from the index columns, which introduces update overhead. When columns are updated,
    SQL Server needs to update them in every index in which they are present. Similarly,
    every insert or delete operation requires SQL Server to perform it on each nonclustered
    index B-Tree.


    Remember this overhead and avoid creating unnecessary nonclustered indexes in
    the system.'
