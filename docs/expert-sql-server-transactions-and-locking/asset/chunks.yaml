    Captured blocking information


    Setting up blocking monitoring with Event Notifications is extremely useful during
    concurrency-issue troubleshooting. I usually have it enabled as part of the regular
    monitoring framework on all my servers.


    ### Note


    The source code is included in the companion materials of the book. The latest
    version is also available for download from my blog at [`http://aboutsqlserver.com/bmframework`](http://aboutsqlserver.com/bmframework)
    .


    ## Summary


    Blocking occurs when multiple sessions compete for the same resources using incompatible
    lock types. The process of troubleshooting requires you to detect queries involved
    in the blocking, find the root cause of the problem, and address the issue.


    The `sys.dm_tran_locks` data management view provides you with information about
    all active lock requests in the system. It can help you detect blocking conditions
    in real time. You can join this view with other DMVs, such as `sys.dm_exec_requests`,
    `sys.dm_exec_query_stats`, `sys.dm_exec_sessions`, and `sys.dm_os_waiting_tasks`,
    to obtain more information about the sessions and queries involved in the blocking
    conditions.


    SQL Server can generate a blocked process report that provides you with information
    about blocking, which you can collect and retain for further analysis. You can
    use SQL Traces, Extended Events, and Event Notifications to capture it.


    In a large number of cases, blocking occurs as a result of excessive scans introduced
    by nonoptimized queries. You should analyze the execution plans of both blocking
    and blocked queries to detect and optimize inefficiencies.


    Another common issue that results in blocking is incorrect transaction management
    in the code, which includes runaway transactions and interactions with users in
    the middle of open transactions, among other things.


    # 5. Deadlocks


    A deadlock is a special blocking case that occurs when multiple sessions—or sometimes
    multiple execution threads within a single session—block each other. When it happens,
    SQL Server terminates one of the sessions, allowing the others to continue.


    This chapter will demonstrate why deadlocks occur in the system and explain how
    to troubleshoot and resolve them.


    ## Classic Deadlock


    A classic deadlock occurs when two or more sessions are competing for the same
    set of resources. Let’s look at a by-the-book example and assume that you have
    two sessions updating two rows in the table in the opposite order.


    As the first step, session 1 updates the row *R1* and session 2 updates the row
    *R2*. You know that at this point both sessions acquire and hold exclusive (X)
    locks on the rows. You can see this happening in Figure [5-1](#463519_1_En_5_Chapter.xhtml#Fig1).


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig1_HTML.png](images/463519_1_En_5_Chapter/463519_1_En_5_Fig1_HTML.png)


    Figure 5-1


    Classic deadlock: Step 1


    Next, let’s assume that session 1 wants to update the row *R2*. It will try to
    acquire an exclusive (X) lock on *R2* and would be blocked because of the exclusive
    (X) lock already held by session 2\. If session 2 wanted to update R1, the same
    thing would happen—it would be blocked because of the exclusive (X) lock held
    by session 1\. As you can see, at this point both sessions wait on each other
    and cannot continue the execution. This represents the *classic* or *cycle* deadlock,
    shown in Figure [5-2](#463519_1_En_5_Chapter.xhtml#Fig2).


    ![../images/463519_1_En_5_Chapter/463519_1_En_5_Fig2_HTML.jpg](images/463519_1_En_5_Chapter/463519_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Classic deadlock: Step 2


    The system task *Deadlock Monitor* wakes up every five seconds and checks if there
    are any deadlocks in the system. When a deadlock is detected, SQL Server rolls
    back one of the transactions with the error 1205\. That releases all locks held
    in that transaction and allows the other sessions to continue.


    ### Note


    The Deadlock Monitor wake-up interval goes down if there are deadlocks in the
    system. In some cases, it could wake up as often as ten times per second.


    The decision as to which session is chosen as the deadlock victim depends on a
    few things. By default, SQL Server rolls back the session that uses less log space
    for the transaction. You can control it, up to a degree, by setting a deadlock
    priority for the session with the `SET DEADLOCK_PRIORITY` option.'
