    datediff(millisecond, @StartTime, getDate())

    as [Exec Time ms: Explicit Tran]

    ,s.num_of_writes - @num_of_writes as [Number of writes]

    ,(s.num_of_bytes_written - @num_of_bytes_written) / 1024

    as [Bytes written (KB)]

    ```


    **Listing 2-1** 自动提交与显式事务


    Figure 2-2展示了代码在我的环境中的输出。如你所见，显式事务比自动提交事务快大约两倍，并且产生的日志活动减少了三分之一。


    ![Explicit and autocommitted transaction performance](images/463519_1_En_2_Chapter/463519_1_En_2_Fig2_HTML.jpg)


    **Figure 2-2** 显式与自动提交事务性能


    SQL Server 2014 及以上版本允许你通过使用 `延迟持久性` 来提高事务日志吞吐量。在此模式下，当生成 `COMMIT` 日志记录时，SQL Server
    不会刷新日志缓冲区。这减少了磁盘写入次数，但在发生灾难时可能会造成少量数据丢失。


    ### 注意


    你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/logs/control-transaction-durability`](https://docs.microsoft.com/en-us/sql/relational-databases/logs/control-transaction-durability)
    或我写的 `Pro SQL Server Internals` 一书中阅读更多关于延迟持久性的内容。


    SQL Server 还支持 `隐式事务`，你可以通过 `SET IMPLICIT_TRANSACTION ON` 语句启用它。启用此选项后，当没有活动的显式事务存在时，SQL
    Server 会开始一个新的事务。该事务将保持活动状态，直到你显式发出 `COMMIT` 或 `ROLLBACK` 语句。


    从性能和事务日志吞吐量的角度来看，隐式事务与显式事务类似。然而，它们使事务管理更加复杂，在生产环境中很少使用。但需要注意的是——`SET ANSI_DEFAULT
    ON` 选项也会自动启用隐式事务。这种行为可能会导致系统中出现意外的并发问题。


    ## 错误处理


    SQL Server 中的错误处理是一个棘手的问题，尤其是在涉及事务时。SQL Server 根据错误严重性、活动事务上下文和其他几个因素来不同地处理异常。


    让我们看看异常在执行过程中如何影响控制流。Listing 2-2 创建了两个表——`dbo.Customers` 和 `dbo.Orders`——并向其中填充数据。注意
    `dbo.Orders` 表中定义的外键约束。


    ```sql

    create table dbo.Customers

    (

    CustomerId int not null,

    constraint PK_Customers

    primary key(CustomerId)

    );

    create table dbo.Orders

    (

    OrderId int not null,

    CustomerId int not null,

    constraint FK_Orders_Customerss

    foreign key(CustomerId)

    references dbo.Customers(CustomerId)

    );

    go

    create proc dbo.ResetData

    as

    begin

    begin tran

    delete from dbo.Orders;

    delete from dbo.Customers;

    insert into dbo.Customers(CustomerId) values(1),(2),(3);

    insert into dbo.Orders(OrderId, CustomerId) values(2,2);

    commit

    end;

    go

    exec dbo.ResetData;

    ```


    **Listing 2-2** 错误处理：表创建


    让我们在一个批处理中运行三个 `DELETE` 语句，如 Listing 2-3 所示。第二个语句将触发 *外键违反* 错误。`@@ERROR` 系统变量提供了最后执行的
    T-SQL 语句的错误号（`0` 表示没有错误）。


    ```sql

    delete from  dbo.Customers where CustomerId = 1; -- Success

    select @@ERROR as [@@ERROR: CustomerId = 1];

    delete from  dbo.Customers where CustomerId = 2; -- FK Violation

    select @@ERROR as [@@ERROR: CustomerId = 2];

    delete from  dbo.Customers where CustomerId = 3; -- Success

    select @@ERROR as [@@ERROR: CustomerId = 3];

    go

    select * from dbo.Customers;

    ```


    **Listing 2-3** 错误处理：删除客户


    Figure 2-3 展示了代码的输出。如你所见，SQL Server 在非关键的 *外键违反* 错误后继续执行，随后删除了 `CustomerId=3`
    的行。


    ![Deleting three customers in the batch](images/463519_1_En_2_Chapter/463519_1_En_2_Fig3_HTML.jpg)


    **Figure 2-3** 在批处理中删除三个客户


    如果你使用 `TRY..CATCH` 块，情况会有所不同，如 Listing 2-4 所示。


    ```sql

    exec dbo.ResetData;

    go

    begin try

    delete from  dbo.Customers where CustomerId = 1; -- Success

    delete from  dbo.Customers where CustomerId = 2; -- FK Violation

    delete from  dbo.Customers where CustomerId = 3; -- Not executed

    end try

    begin catch

    select

    ERROR_NUMBER() as [Error Number]

    ,ERROR_LINE() as [Error Line]

    ,ERROR_MESSAGE() as [Error Message];

    end catch

    go

    select * from dbo.Customers;

    ```


    **Listing 2-4** 错误处理：在 TRY..CATCH 块中删除客户


    如 Figure 2-4 所示，错误在 `CATCH` 块中被捕获，第三个删除语句没有被执行。


    ![Deleting three customers in TRY..CATCH block](images/463519_1_En_2_Chapter/463519_1_En_2_Fig4_HTML.jpg)


    **Figure 2-4** 在 TRY..CATCH 块中删除三个客户


    你可以在 `CATCH` 块中使用以下几个函数：


    *   `ERROR_NUMBER()` 返回导致 `CATCH` 块运行的错误编号。

    *   `ERROR_MESSAGE()` 提供错误消息。

    *   `ERROR_SEVERITY()` 和 `ERROR_STATE()` 分别表示错误的严重性和状态号。

    *   `ERROR_PROCEDURE()` 返回发生错误的存储过程或触发器的名称。如果外部模块中有嵌套的存储过程调用并使用了 `TRY..CATCH`，这将非常有用。

    *   `ERROR_LINE()` 提供发生错误的行号。

    *   最后，`THROW` 操作符允许你从 `CATCH` 块中重新抛出错误。'
