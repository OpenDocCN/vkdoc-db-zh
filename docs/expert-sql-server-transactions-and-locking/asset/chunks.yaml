    *   `内存中 OLTP 引擎`于 SQL Server 2014 引入。这种无锁、无闩锁的技术有助于提高 OLTP 工作负载的性能。它与将所有数据存储在内存中的内存优化表一起工作。我们将在下一章讨论内存中
    OLTP 并发模型。

    *   SQL Server 包括一组`实用工具`，它们负责备份和还原操作、数据大容量加载、全文索引管理以及其他几个操作。

    *   最后，SQL Server 的关键组件是`SQL Server 操作系统 (SQLOS)`。SQLOS 是位于 SQL Server 和操作系统（Windows
    或 Linux）之间的层，负责调度和资源管理、同步、异常处理、死锁检测、CLR 托管等。例如，当任何 SQL Server 组件需要分配内存时，它不会直接调用操作系统
    API 函数，而是向 SQLOS 请求内存，然后 SQLOS 使用内存分配器组件来满足该请求。


    SQLOS 最初在 SQL Server 2005 中引入，旨在提高 SQL Server 中调度的效率并最小化上下文和内核模式切换。Windows 和 SQLOS
    之间的主要区别在于调度模型。Windows 是使用抢占式调度的通用操作系统。它控制当前正在运行的进程，根据需要挂起和恢复它们。相反，除 CLR 代码外，SQLOS
    使用协作式调度，进程会定期自愿让出。


    SQL Server 2017 中的 Linux 支持导致了 SQLOS 的进一步转型，并引入了`平台抽象层 (SQL PAL)`。它作为 SQLOS 和操作系统之间的网关工作，为操作系统
    API/内核调用提供抽象。在性能关键代码中极少数例外情况下，SQLOS 不会直接调用操作系统 API，而是使用 PAL。


    SQLOS 在启动时创建一组`调度程序`。调度程序的数量等于系统中逻辑 CPU 的数量，另有一个用于专用管理员连接的额外调度程序。例如，如果一个服务器有两个启用超线程的四核
    CPU，SQL Server 将创建 17 个调度程序。根据处理器关联性设置和基于核心的许可模型，每个调度程序可以处于`在线`或`离线`状态。


    尽管调度程序的数量与系统中的 CPU 数量相匹配，但除非启用了处理器关联性设置，否则它们之间没有严格的一一对应关系。在某些情况下，在高负载下，有可能出现多个调度程序在同一
    CPU 上运行的情况。或者，当设置了处理器关联性时，调度程序以严格的一一对应关系绑定到 CPU。

    '
- fmt: '## SQL Server 执行模型与调度器


    每个调度器负责管理称为 *workers* 的工作线程。系统中的最大工作线程数由 `Max Worker Thread` 配置选项指定。默认值 `zero`
    表示 SQL Server 会根据系统中的调度器数量来计算最大工作线程数。在大多数情况下，您无需更改此默认值。


    每当有任务需要执行时，它会被分配给一个处于空闲状态的 *worker*。如果没有空闲的 *worker*，调度器会创建一个新的。它还会在15分钟不活动后或遇到内存压力时销毁空闲的
    *worker*。值得注意的是，在32位 SQL Server 中，每个 *worker* 的线程堆栈会使用 512 KB 的 RAM，而在64位系统中则使用
    2 MB 的 RAM。


    *Worker* 不会在调度器之间移动。同样，一个任务也绝不会在 *worker* 之间移动。然而，SQLOS 可以创建子任务并将其分配给不同的 *worker*；例如，在并行执行计划的情况下。


    ### 任务状态


    每个任务可能处于以下六种状态之一：


    *   `Pending`：任务正在等待可用的 *worker*。

    *   `Done`：任务已完成。

    *   `Running`：任务当前正在调度器上执行。

    *   `Runnable`：任务正在等待被调度器执行。

    *   `Suspended`：任务正在等待外部事件或资源。

    *   `Spinloop`：任务正在处理自旋锁。自旋锁是保护某些内部对象的同步对象。当 SQL Server 预期能快速获得对对象的访问权限时可能会使用它们，从而避免
    *worker* 的上下文切换。


    每个调度器最多有一个处于 `running` 状态的任务。此外，它有两个不同的队列——一个用于 `runnable` 任务，另一个用于 `suspended`
    任务。当正在运行的任务需要某些资源（例如来自磁盘的数据页）时，它会提交一个 I/O 请求并将状态更改为 `suspended`。它会停留在 `suspended`
    队列中，直到请求完成且页面被读取。当任务准备好恢复执行时，它会被移动到 `runnable` 队列。


    ### 生活中的类比：杂货店


    杂货店或许是 SQL Server 执行模型最贴切的现实类比。将收银员视为调度器，在结账队伍中的顾客视为 `runnable` 队列中的任务。正在结账的顾客类似于
    `running` 状态的任务。


    如果某件商品缺少通用产品代码（UPC），收银员会派一名商店员工去核查价格。收银员会暂停当前顾客的结账过程，请他或她站到一边（进入 `suspended` 队列）。当员工带着价格信息回来后，那位站到一边的顾客会移动到结账队伍的末尾（`runnable`
    队列的末尾）。


    值得一提的是，与现实生活相比，SQL Server 的处理过程要高效得多，因为其他人会在价格核查期间耐心排队等待。然而，一位被迫移动到 `runnable`
    队列末尾的顾客可能不会同意这样的结论。


    ### 任务生命周期与等待统计


    图 12-2 展示了 SQL Server 执行模型中一个典型的任务生命周期。任务的总执行时间可以计算为任务在 `running` 状态（在调度器上运行时）、`runnable`
    状态（等待可用调度器时）和 `suspended` 状态（等待资源或外部事件时）所花费时间的总和。


    ![任务生命周期示意图](images/463519_1_En_12_Chapter/463519_1_En_12_Fig2_HTML.jpg)


    **图 12-2** 任务生命周期


    SQL Server 会跟踪任务因不同类型的等待而处于 `suspended` 状态的累积时间，并通过 `sys.dm_os_wait_tasks` 视图暴露这些信息。该信息自上次
    SQL Server 重启以来或使用 `DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)` 命令清除以来一直被收集。


    代码清单 12-1 展示了如何查找系统中的 *top* 等待类型，即 *worker* 花费等待时间最长的等待类型。它过滤掉了一些非必要的等待类型，主要是那些与
    SQL Server 内部进程相关的类型。尽管在高级性能调优期间分析其中一些类型是有益的，但在系统故障排除的初始阶段，您很少会关注它们。'
  raw: 'Each scheduler is responsible for managing working threads called *workers*
    . The maximum number of workers in a system is specified by the *Max Worker Thread*
    configuration option. The default value of *zero* indicates that SQL Server calculates
    the maximum number of worker threads based on the number of schedulers in the
    system. In a majority of the cases, you do not need to change this default value.


    Each time there is a task to execute, it is assigned to a worker in an idle state.
    When there are no idle workers, the scheduler creates a new one. It also destroys
    idle workers after 15 minutes of inactivity or in the case of memory pressure.
    It is also worth noting that each worker would use 512 KB of RAM in 32-bit and
    2 MB of RAM in 64-bit SQL Server for the thread stack.


    Workers do not move between schedulers. Moreover, a task is never moved between
    workers. SQLOS, however, can create child tasks and assign them to different workers;
    for example, in the case of parallel execution plans.


    Each task can be in one of six different states:


    *   *Pending*: Task is waiting for an available worker.


    *   *Done*: Task is completed.


    *   *Running*: Task is currently executing on the scheduler.


    *   *Runnable*: Task is waiting for the scheduler to be executed.


    *   *Suspended*: Task is waiting for an external event or resource.


    *   *Spinloop*: Task is processing a spinlock. Spinlocks are synchronization objects
    that protect some internal objects. SQL Server may use them when it expects that
    access to the object will be granted very quickly, thus avoiding context switching
    for the workers.


    Each scheduler has at most one task in a *running* state. In addition, it has
    two different queues—one for *runnable* tasks and one for *suspended* tasks. When
    the running task needs some resources—a data page from a disk, for example—it
    submits an I/O request and changes the state to *suspended*. It stays in the *suspended*
    queue until the request is fulfilled and the page is read. The task is moved to
    the *runnable* queue when it is ready to resume execution.


    A grocery store is, perhaps, the closest real-life analogy to the SQL Server Execution
    Model. Think of cashiers as representing schedulers and customers in checkout
    lines as tasks in the runnable queue. A customer who is currently checking out
    is similar to a task in the running state.


    If an item is missing a UPC code, a cashier sends a store worker to do a price
    check. The cashier suspends the checkout process for the current customer, asking
    her or him to step aside (to the suspended queue). When the worker comes back
    with the price information, the customer who had stepped aside moves to the end
    of the checkout line (end of the runnable queue).


    It is worth mentioning that the SQL Server process is much more efficient as compared
    to real life, when others wait patiently in line during a price check. However,
    a customer who is forced to move to the end of the runnable queue would probably
    disagree with such a conclusion.


    Figure [12-2](#463519_1_En_12_Chapter.xhtml#Fig2) illustrates a typical task lifecycle
    in the SQL Server Execution Model. The total task execution time can be calculated
    as a summary of the time the task spent in the running state (when it ran on the
    scheduler), runnable state (when it waited for an available scheduler), and suspended
    state (when it waited for a resource or external event).


    ![../images/463519_1_En_12_Chapter/463519_1_En_12_Fig2_HTML.jpg](images/463519_1_En_12_Chapter/463519_1_En_12_Fig2_HTML.jpg)


    Figure 12-2


    Task lifecycle


    SQL Server tracks the cumulative time tasks spend in a suspended state for different
    types of waits and exposes this through the `sys.dm_os_wait_tasks` view. This
    information is collected as of the time of the last SQL Server restart or since
    it was cleared with the `DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)` command.


    Listing [12-1](#463519_1_En_12_Chapter.xhtml#PC1) shows how to find the *top*
    wait types in the system, which are the wait types for which workers spent the
    most time waiting. It filters out some nonessential wait types, mainly those related
    to internal SQL Server processes. Even though it is beneficial to analyze some
    of them during advanced performance tuning, you rarely focus on them during the
    initial stage of system troubleshooting.'
