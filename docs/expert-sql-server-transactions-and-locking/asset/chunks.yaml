  raw: '### Tip


    Use `SET XACT_ABORT ON` in the code.


    Recall the nested behavior of `BEGIN TRAN/COMMIT` statements . You do not need
    to check the `@@TRANCOUNT` variable and the existence of an active transaction
    if you call `BEGIN TRAN` and `COMMIT` in the same module. Do not forget, however,
    that the `ROLLBACK` statement rolls back the entire transaction regardless of
    the `@@TRANCOUNT` nested level. It is better to check if a transaction is active
    before rolling it back.


    Listing [11-1](#463519_1_En_11_Chapter.xhtml#PC1) shows an example of the code
    that checks if there is an active transaction before starting it. This is completely
    unnecessary due to the nested behavior of `BEGIN TRAN/COMMIT` statements , so
    you can remove `IF` statements from the implementation.


    ```

    create proc dbo.Proc1

    as

    begin

    set xact_abort on

    declare

    @CurrentTranCount = @@TRANCOUNT;

    if @CurrentTranCount = 0 -- IF is not required and can be removed

    begin tran;

    /* Some logic here */

    if @CurrentTranCount = 0  -- IF is not required and can be removed

    commit;

    end

    Listing 11-1

    Implementation with unnecesary check for active transaction

    ```


    Listing [11-2](#463519_1_En_11_Chapter.xhtml#PC2) shows the template of a stored
    procedure that performs server-side transaction management and error handling.
    This approach works regardless of whether this stored procedure is called from
    outside or within the active transaction, assuming, of course, that the calling
    code handles exceptions correctly.


    It is important to note that the `CATCH` block is checking that `@@TRANCOUNT`
    is greater than zero. One of the common errors is using the `IF @@TRANCOUNT =
    1 ROLLBACK` pattern, which does not work with nested `BEGIN TRAN` calls.


    ```

    create proc dbo.MyProc

    as

    begin

    set xact_abort on

    begin try

    begin tran

    /* Some logic here  */

    commit

    end try

    begin catch

    if @@TRANCOUNT > 0 -- Transaction is active

    rollback;

    /* Optional error-handling  code */

    throw;

    end catch;

    end;

    Listing 11-2

    Server-side transaction management

    ```


    The client-side transaction management implementation would depend on the technology
    and architecture of the system. However, it is always beneficial to use a `TRY..CATCH`
    block and explicitly commit or roll back the transaction there. Listing [11-3](#463519_1_En_11_Chapter.xhtml#PC3)
    demonstrates this approach with the classic ADO.Net.


    ```

    using (SqlConnection conn = new SqlConnection(connString))

    {

    conn.Open();

    using (SqlTransaction tran = conn.BeginTransaction(IsolationLevel.ReadCommitted))

    {

    try

    {

    SqlCommand cmd = conn.CreateCommand("exec dbo.MyProc @Param1");

    cmd.Parameters.Add("@Param1",SqlDbType.VarChar,255).Value = "Param Value";

    cmd.Transaction = tran;

    cmd.ExecuteNonQuery();

    tran.Commit();

    }

    catch (Exception ex)

    {

    tran.Rollback();

    throw;

    }

    }

    }

    Listing 11-3

    ADO.Net transaction management

    ```


    Despite the fact that the client code needs to perform several actions in between
    the `BeginTransaction()` and `ExecuteNonQuery()` calls, it would not introduce
    any inefficiencies in the system. SQL Server considers a transaction to be started
    at the time of the first data access operation rather than at the time of the
    `BEGIN TRAN` call. Moreover, it would not log the beginning of the transaction
    (`LOP_BEGIN_XACT`) in the transaction log until the transaction completed the
    first data modification.


    You should remember such behavior with `SNAPSHOT` transactions, which work with
    a “snapshot” of the data at the time when the transaction started. In practice,
    it means that such transactions would see the data as of the time of the first
    data access operation—whether a read or write one.


    ## Choosing Transaction Isolation Level


    Choosing the right transaction isolation level is not a trivial task. You should
    find the right balance between blocking and `tempdb` overhead and the required
    level of data consistency and isolation in the system . The system must provide
    reliable data to the customers, and you should not compromise by choosing an isolation
    level that cannot guarantee it just because you want to reduce blocking.


    You should choose the *minimally required* isolation level that provides the required
    level of data consistency. In many cases the default `READ COMMITTED` isolation
    level is *good enough*, especially if queries are optimized and do not perform
    unnecessary scans. Avoid using `REPEATABLE READ` or `SERIALIZABLE` isolation levels
    in OLTP systems unless you have legitimate reasons to use them. Those isolation
    levels hold shared (S) locks until the end of the transaction, which can lead
    to severe blocking issues with volatile data. They can also trigger shared (S)
    lock escalation during scans.


    It is completely normal to use different isolation levels in a system. For example,
    financial management systems may need to use `REPEATABLE READ` or even `SERIALIZABLE`
    isolation levels when they perform operations that may affect the balances of
    customers’ accounts. However, other use cases, such as changing customer profile
    information, may be completely fine with the `READ COMMITTED` level.


    As a general rule, it is better to avoid the `READ UNCOMMITTED` isolation level.
    Even though many database professionals try to reduce blocking by switching to
    this isolation level, either explicitly or with `(NOLOCK)` hints, this is rarely
    the right choice. First, `READ UNCOMMITTED` does not address the blocking issues
    introduced by writers. They still acquire update (U) locks during scans. Most
    important, however, by using `READ UNCOMMITTED`, you are stating that data consistency
    is not required at all, and it is not only about reading uncommitted data. SQL
    Server can choose execution plans that use an *allocation map scan* on large tables,
    which can lead to missing rows and duplicated reads due to page splits, especially
    in busy systems with volatile data.


    In a majority of the cases, optimistic isolation levels, especially `READ COMMITTED
    SNAPSHOT`, are a better choice than `READ UNCOMMITTED`, `REPEATABLE READ`, or
    `SERIALIZABLE`, even in OLTP systems. It provides statement-level data consistency
    without readers/writers blocking involved. Historically, I have been very cautious
    suggesting `RCSI` in OLTP systems due to its `tempdb` overhead; however, nowadays,
    it becomes a lesser issue because of modern hardware and flash-based disk arrays
    . You should still factor additional index fragmentation and `tempdb` overhead
    into your analysis though. It is also worth repeating that `READ COMMITTED SNAPSHOT`
    is enabled in Azure SQL Databases by default.


    As a general rule, I recommend you do not use the `SNAPSHOT` isolation level in
    OLTP systems due to its excessive `tempdb` usage unless transaction-level consistency
    is absolutely required. It could be a good choice for data warehouse and reporting
    systems where data is static most of the time.


    You should be very careful with transaction management if you enable optimistic
    isolation levels in the database. Bugs in the code that led to uncommitted transactions
    can prevent `tempdb` version store clean-up and lead to excessive growth of `tempdb`
    data files. It can happen even if you do not use optimistic isolation levels in
    the system, as long as `READ_COMMITTED_SNAPSHOT` or `ALLOW_SNAPSHOT_ISOLATION`
    database settings were enabled.'
  trans: "\n## 提示\n\n使用 `SET XACT_ABORT ON`。\n\n回顾 `BEGIN TRAN/COMMIT` 语句的嵌套行为。如果您在同一模块中调用\
    \ `BEGIN TRAN` 和 `COMMIT`，则无需检查 `@@TRANCOUNT` 变量和活动事务的存在。但请记住，`ROLLBACK` 语句会回滚整个事务，而不考虑\
    \ `@@TRANCOUNT` 嵌套级别。在回滚之前，最好检查是否有活动事务。\n\n11-1 清单展示了在启动事务前检查是否存在活动事务的代码示例。由于\
    \ `BEGIN TRAN/COMMIT` 语句的嵌套行为，这完全是不必要的，因此您可以从实现中删除 `IF` 语句。\n\n```sql\ncreate\
    \ proc dbo.Proc1\nas\nbegin\n    set xact_abort on\n    declare @CurrentTranCount\
    \ = @@TRANCOUNT;\n    if @CurrentTranCount = 0 -- IF is not required and can be\
    \ removed\n        begin tran;\n    /* Some logic here */\n    if @CurrentTranCount\
    \ = 0  -- IF is not required and can be removed\n        commit;\nend\n```\n清单\
    \ 11-1\n不必要的活动事务检查实现\n\n11-2 清单展示了执行服务器端事务管理和错误处理的存储过程模板。假设调用代码正确处理了异常，此方法无论该存储过程是从外部调用还是在活动事务中调用都有效。\n\
    \n需要注意的是，`CATCH` 块正在检查 `@@TRANCOUNT` 是否大于零。一个常见的错误是使用 `IF @@TRANCOUNT = 1 ROLLBACK`\
    \ 模式，这与嵌套的 `BEGIN TRAN` 调用不兼容。\n\n```sql\ncreate proc dbo.MyProc\nas\nbegin\n\
    \    set xact_abort on\n    begin try\n        begin tran\n        /* Some logic\
    \ here  */\n        commit\n    end try\n    begin catch\n        if @@TRANCOUNT\
    \ > 0 -- Transaction is active\n            rollback;\n        /* Optional error-handling\
    \  code */\n        throw;\n    end catch;\nend;\n```\n清单 11-2\n服务器端事务管理\n\n客户端事务管理的实现取决于系统的技术和架构。然而，使用\
    \ `TRY..CATCH` 块并在那里显式提交或回滚事务总是有益的。11-3 清单展示了使用经典 ADO.Net 的这种方法。\n\n```csharp\n\
    using (SqlConnection conn = new SqlConnection(connString))\n{\n    conn.Open();\n\
    \    using (SqlTransaction tran = conn.BeginTransaction(IsolationLevel.ReadCommitted))\n\
    \    {\n        try\n        {\n            SqlCommand cmd = conn.CreateCommand(\"\
    exec dbo.MyProc @Param1\");\n            cmd.Parameters.Add(\"@Param1\",SqlDbType.VarChar,255).Value\
    \ = \"Param Value\";\n            cmd.Transaction = tran;\n            cmd.ExecuteNonQuery();\n\
    \            tran.Commit();\n        }\n        catch (Exception ex)\n       \
    \ {\n            tran.Rollback();\n            throw;\n        }\n    }\n}\n```\n\
    清单 11-3\nADO.Net 事务管理\n\n尽管客户端代码需要在 `BeginTransaction()` 和 `ExecuteNonQuery()`\
    \ 调用之间执行若干操作，但它不会在系统中引入任何低效。SQL Server 将事务视为在第一次数据访问操作时开始，而不是在 `BEGIN TRAN` 调用时开始。此外，在事务完成第一次数据修改之前，它不会在事务日志中记录事务的开始\
    \ (`LOP_BEGIN_XACT`)。\n\n您应该记住 `SNAPSHOT` 事务的这种行为，它们处理的是事务开始时的数据“快照”。在实践中，这意味着此类事务将看到第一次数据访问操作（无论是读还是写）时的数据。\n\
    \n## 选择事务隔离级别\n\n选择合适的事务隔离级别并非易事。您需要在阻塞和 `tempdb` 开销与系统所需的数据一致性和隔离级别之间找到适当的平衡。系统必须向客户提供可靠的数据，您不应为了减少阻塞而选择无法保证数据可靠性的隔离级别。\n\
    \n您应选择提供所需数据一致性级别的*最低要求*隔离级别。在许多情况下，默认的 `READ COMMITTED` 隔离级别已经*足够好*，特别是当查询经过优化且不执行不必要的扫描时。除非有正当理由，否则避免在\
    \ OLTP 系统中使用 `REPEATABLE READ` 或 `SERIALIZABLE` 隔离级别。这些隔离级别会持有共享（S）锁直到事务结束，这可能导致易失性数据的严重阻塞问题。它们还会在扫描期间触发共享（S）锁升级。\n\
    \n在系统中使用不同的隔离级别是完全正常的。例如，财务管理系统在执行可能影响客户账户余额的操作时，可能需要使用 `REPEATABLE READ` 甚至 `SERIALIZABLE`\
    \ 隔离级别。然而，其他用例（例如更改客户配置文件信息）可能完全适用于 `READ COMMITTED` 级别。\n\n作为一般规则，最好避免使用 `READ\
    \ UNCOMMITTED` 隔离级别。尽管许多数据库专业人员尝试通过显式切换或使用 `(NOLOCK)` 提示切换到此隔离级别来减少阻塞，但这很少是正确的选择。首先，`READ\
    \ UNCOMMITTED` 不能解决写入者引入的阻塞问题。它们在扫描期间仍然获取更新（U）锁。然而，最重要的是，通过使用 `READ UNCOMMITTED`，您是在声明根本不需要数据一致性，而这不仅仅是读取未提交数据的问题。SQL\
    \ Server 可能选择在大型表上使用*分配映射扫描*的执行计划，这可能导致行丢失和重复读取，尤其是在具有易失性数据的繁忙系统中，这源于页面拆分。\n\n\
    在大多数情况下，乐观隔离级别，特别是 `READ COMMITTED SNAPSHOT`，是比 `READ UNCOMMITTED`、`REPEATABLE\
    \ READ` 或 `SERIALIZABLE` 更好的选择，即使在 OLTP 系统中也是如此。它在不涉及读写器阻塞的情况下提供语句级数据一致性。历史上，由于其\
    \ `tempdb` 开销，我在 OLTP 系统中建议 `RCSI` 时一直非常谨慎；然而，如今，由于现代硬件和基于闪存的磁盘阵列，这已不那么是个问题。尽管如此，您仍应在分析中考虑额外的索引碎片和\
    \ `tempdb` 开销。同样值得重复的是，`READ COMMITTED SNAPSHOT` 在 Azure SQL 数据库中默认启用。\n\n作为一般规则，我建议不要在\
    \ OLTP 系统中使用 `SNAPSHOT` 隔离级别，因为它会过度使用 `tempdb`，除非绝对需要事务级一致性。对于数据大部分时间是静态的数据仓库和报告系统，它可能是一个不错的选择。\n\
    \n如果在数据库中启用了乐观隔离级别，您必须非常小心事务管理。导致未提交事务的代码中的错误会阻止 `tempdb` 版本存储清理，并导致 `tempdb`\
    \ 数据文件过度增长。即使您不在系统中使用乐观隔离级别，只要启用了 `READ_COMMITTED_SNAPSHOT` 或 `ALLOW_SNAPSHOT_ISOLATION`\
    \ 数据库设置，这种情况也可能发生。\n"
- fmt: '# Optimistic Isolation Levels and Blocking Reduction Patterns


    Optimistic isolation levels, however, often `mask` poorly optimized queries in
    the system. Even though those queries contribute to the poor system performance,
    they are not involved in the blocking conditions and thus are often ignored. It
    is not uncommon to see cases where people “solve” the readers/writers blocking
    by enabling `READ COMMITTED SNAPSHOT` and do not address the root cause of the
    blocking afterward. You should remember this and perform query optimization regardless
    of whether you have blocking in the system or not.


    For data warehouse systems, transaction strategy greatly depends on how data is
    updated. For static read-only data, any isolation level will work because readers
    do not block other readers. You can even switch the database or filegroups to
    read-only mode to reduce the locking overhead. Otherwise, optimistic isolation
    levels are the better choice. They provide either transaction- or statement-level
    consistency for report queries, and they reduce the blocking during ETL processes.
    You should also consider utilizing table partitioning and using partition switches
    during ETL processes when this approach is feasible.


    ## Patterns That Reduce Blocking


    Blocking occurs when multiple sessions compete for the same set of resources.
    Sessions try to acquire incompatible locks on them, which leads to lock collision
    and blocking.


    As you already know, SQL Server acquires the locks when it `processes` data. It
    matters less how many rows need to be modified or returned to the client. What
    matters more is how many rows SQL Server `accesses` during statement execution.
    It is entirely possible that a query that selected or updated just a single row
    acquired thousands or even millions of locks due to excessive scans it performed.


    Proper query optimization and index tuning reduce the number of rows SQL Server
    needs to access during query execution. This, in turn, reduces the number of locks
    acquired and the chance that lock conflicts will occur.


    ### Tip


    Optimize the queries. It will help to improve concurrency, performance, and user
    experience in the system.


    Another method to reduce the chance of lock conflicts is to reduce the time locks
    are held. Exclusive (X) locks are always held until the end of the transaction.
    The same is true for the shared (S) locks in `REPEATABLE READ` and `SERIALIZABLE`
    isolation levels. The longer locks are held, the bigger the chance is that lock
    conflicts and blocking will occur.


    You need to make transactions as short as possible and avoid any long-time operations
    and interactions with users through the UI while a transaction is active. You
    also need to be careful when dealing with external resources that use CLR or linked
    servers. For example, when a linked server is down, it can take a long time before
    a connection timeout occurs, and you would like to avoid the situation where locks
    are kept all that time.


    ### Tip


    Make transactions as short as possible.


    Update the data as close to the end of the transaction as possible. This reduces
    the time that exclusive (X) locks are held. In some cases, it might make sense
    to use temporary tables as the staging place, inserting data there and updating
    the actual tables at the very end of the transaction.


    ### Tip


    Modify data as close to the end of the transaction as possible.


    One particular variation of this technique is an `UPDATE` statement that is impossible
    or impractical to optimize. Consider a situation where the statement scans a large
    number of rows, but updates just a handful of them. You can change the code, storing
    the clustered index key values of the rows that need to be updated in a temporary
    table, running an `UPDATE` based on those collected key values afterward.


    Listing 11-4 shows an example of a statement that could lead to a clustered index
    scan during execution. SQL Server will need to acquire an update (U) lock on every
    row of the table.


    ```

    update dbo.Orders

    set

    Cancelled = 1

    where

    (PendingCancellation = 1) or

    (Paid = 0 and OrderDate < @StockDate)

    Listing 11-4

    Reducing blocking with temporary table: Original statement

    ```


    You can change the code to be similar to that shown in Listing 11-5. The `SELECT`
    statement either acquires shared (S) locks or does not acquire row-level locks
    at all, depending on the isolation level. The `UPDATE` statement is optimized,
    and it acquires just a handful of update (U) and exclusive (X) locks .


    ```

    create table #OrdersToBeCancelled

    ( OrderId int not null primary key );

    insert into #OrdersToBeCancelled(OrderId)

    select OrderId

    from dbo.Orders

    where

    (PendingCancellation = 1) or

    (Paid = 0 and OrderDate < @StockDate);

    update dbo.Orders

    set Cancelled = 1

    where OrderId in (select OrderId from #OrdersToBeCancelled);

    Listing 11-5

    Reducing blocking with a temporary table: Using a temporary table to stage key
    values for the update

    ```


    You need to remember that while this approach helps to reduce blocking, creating
    and populating temporary tables can introduce significant I/O overhead, especially
    when a large amount of data involved. In some cases, you can avoid that overhead
    by using a CTE, as shown in Listing 11-6.


    ```

    ;with UpdateIds(OrderId)

    as

    (

    select OrderId

    from dbo.Orders

    where

    (PendingCancellation = 1) or

    (Paid = 0 and OrderDate < @StockDate)

    )

    update o

    set o.Cancelled = 1

    from UpdateIds u inner loop join dbo.Orders o on

    o.OrderId = u.OrderId

    Listing 11-6

    Reducing blocking with a CTE

    ```


    Similar to the previous example, the `SELECT` statement does not acquire update
    (U) locks during the scan. The `inner loop` join hint guarantees that exclusive
    (X) locks are held only on the rows that need to be modified. Remember that join
    hints force the order of joins in the statement. In our case, the CTE needs to
    be specified as the *left* input/table of the join to generate correct execution
    plan.


    Both approaches may reduce blocking at the cost of the additional overhead they
    introduce. This overhead would increase with the amount of data to update, and
    you should not use these approaches if you expect to update a large percentage
    of the rows in the table. Remember that creating the right indexes is the better
    option in the majority of cases.


    ### Tip


    Avoid update scans on large tables.


    You should avoid updating the row multiple times within the same transaction when
    `UPDATE` statements modify data in different nonclustered indexes. Remember that
    SQL Server acquires locks on a per-index basis when index rows are updated. Having
    multiple updates increases the chance of deadlock when other sessions access updated
    rows.


    ### Tip


    Do not update data rows multiple times in a single transaction.


    You need to understand whether lock escalation affects your system, especially
    in the case of OLTP workload. You can monitor object-level blocking conditions
    and locking waits, then correlate it with `lock_escalation` Extended and Trace
    Events. Remember that lock escalation helps to reduce memory consumption and improve
    performance in the system. You should analyze why lock escalation occurs and how
    it affects the system before making any decisions . In many cases, it is better
    to change the code and workflows rather than disabling it.


    ### Tip


    Monitor lock escalation in the system.


    You should avoid mixing statements that can lead to having row- and object-level
    locks in the same transaction in general, and mixing DML and DDL statements in
    particular. This pattern can lead to blocking between intent and full object-level
    locks as well as to deadlock conditions. This is especially important when servers
    have 16 or more logical CPUs, which enables lock partitioning.'
