  trans: '

    ## 收集阻塞信息以供进一步分析


    虽然动态管理视图（DMV）在提供系统当前状态信息方面非常有用，但它们仅在阻塞发生的**确切时刻**运行时才能发挥作用。幸运的是，SQL Server 通过
    `blocked process report`（阻塞进程报告）自动帮助捕获阻塞信息。该报告提供了关于阻塞状况的信息，您可以保留它以供进一步分析。当您需要处理阻塞链和复杂的阻塞案例时，它也极其有用。


    有一个名为 `blocked process threshold`（阻塞进程阈值）的配置设置，它指定 SQL Server 检查系统中阻塞情况并生成报告的频率（默认情况下是禁用的）。代码清单
    4-3 显示了将阈值设置为十秒的代码。


    ```

    sp_configure ''show advanced options'', 1;

    go

    reconfigure;

    go

    sp_configure ''blocked process threshold'', 10; -- 单位：秒

    go

    reconfigure;

    go

    代码清单 4-3

    指定阻塞进程阈值

    ```


    在生产环境中，您需要微调 `blocked process threshold` 的值。重要的是要避免误报，同时又能捕获到问题。微软建议最小值不要低于五秒，并且您显然需要将该值设置得小于查询超时时间。我通常使用五秒或十秒，具体取决于系统中的阻塞量以及故障排除的阶段。


    在系统中捕获该报告有几种方法。您可以使用 SQL 跟踪（SQL Trace）；在“错误和警告”部分有一个“阻塞进程报告”事件，如图 4-5 所示。


    ![../images/463519_1_En_4_Chapter/463519_1_En_4_Fig5_HTML.jpg](img/463519_1_En_4_Fig5_HTML.jpg)


    图 4-5

    SQL 跟踪中的“阻塞进程报告”事件


    或者，您可以使用 `blocked_process_report` 事件创建一个扩展事件（Extended Events）会话，如图 4-6 所示。与 SQL
    跟踪相比，此会话将为您提供几个额外的属性。


    ![../images/463519_1_En_4_Chapter/463519_1_En_4_Fig6_HTML.jpg](img/463519_1_En_4_Fig6_HTML.jpg)


    图 4-6

    使用扩展事件捕获阻塞进程报告


    ### 注意


    扩展事件比 SQL 跟踪效率更高，开销更小。


    阻塞进程报告包含 XML，其中显示了系统中关于阻塞进程和被阻塞进程的信息（其中最重要的部分在代码清单 4-4 中以粗体突出显示）。


    ```

    set transaction isolation level read committed

    select OrderId, Amount

    from Delivery.Orders

    where OrderNum = ''1000''


    set transaction isolation level read uncommitted

    begin tran

    delete from Delivery.Orders

    where OrderId = 95


    代码清单 4-4

    阻塞进程报告 XML

    ```


    与实时故障排除一样，您应该同时分析阻塞进程和被阻塞进程，并找出问题的根本原因。从被阻塞进程的角度来看，最重要的信息是：


    *   `waittime`：查询等待的时间长度，单位为毫秒

    *   `lockMode`：正在等待的锁类型

    *   `isolationlevel`：事务隔离级别

    *   `executionStack` 和 `inputBuf`：查询和/或执行堆栈。您将在代码清单 4-5 中看到如何获取涉及阻塞的实际 SQL 语句。


    从阻塞进程的角度来看，您必须查看以下内容：


    *   `status`：它指示进程是 `running`（运行中）、`sleeping`（睡眠）还是 `suspended`（挂起）。当进程处于睡眠状态时，存在未提交的事务。当进程挂起时，该进程要么在等待非锁相关资源（例如，来自磁盘的页面），要么也被其他会话阻塞，因此存在阻塞链状况。

    *   `trancount`：值大于 1 表示存在嵌套事务。如果同时进程状态是 `sleeping`，则客户端可能未正确提交嵌套事务（例如，代码中 `commit`
    语句的数量少于 `begin tran` 语句的数量）。

    *   `executionStack` 和 `inputBuf`：正如我们已经讨论过的，在某些情况下，您需要分析阻塞进程中发生了什么。一些常见问题包括失控事务（例如，嵌套事务中缺少
    `commit` 语句）；可能涉及某些用户界面（UI）的长时间运行事务；以及过度的扫描（例如，明细表中引用列上缺少索引，导致在引用完整性检查期间进行扫描）。关于阻塞会话的查询信息在这里可能有用。请记住，对于被阻塞进程的情况，`executionStack`
    和 `inputBuf` 将对应于生成阻塞进程报告时刻正在运行的查询，而不是对应于阻塞发生时刻的查询。


    在许多情况下，阻塞的发生是由于非优化查询导致不必要的扫描。这些查询获取了不必要的大量锁，从而导致锁争用和阻塞。您可以通过查看被阻塞查询的执行计划并发现其中的低效之处来检测此类情况。


    您可以运行查询并检查执行计划，或者使用动态管理视图（DMV），根据执行堆栈中的 `sql_handle`、`stmtStart` 和 `stmtEnd` 元素从
    `sys.dm_exec_query_stats` 获取执行计划。代码清单 4-5 显示了实现这一目标的代码。

    '
- fmt: '```

    declare

    @H varbinary(max) = /* Insert sql_handle from the top line of the execution stack
    */

    ,@S int = /* Insert stmtStart from the top line of the execution stack */

    ,@E int = /* Insert stmtEnd from the top line of the execution stack */

    select

    substring(qt.text, (qs.statement_start_offset / 2) + 1,

    (( case qs.statement_end_offset

    when -1 then datalength(qt.text)

    else qs.statement_end_offset

    end - qs.statement_start_offset) / 2) + 1) as sql

    ,qp.query_plan

    ,qs.creation_time

    ,qs.last_execution_time

    from

    sys.dm_exec_query_stats qs with (nolock)

    cross apply sys.dm_exec_sql_text(qs.sql_handle) qt

    cross apply sys.dm_exec_query_plan(qs.plan_handle) qp

    where

    qs.sql_handle = @H and

    qs.statement_start_offset = @S

    and qs.statement_end_offset = @E

    option (recompile)

    ```


    Listing 4-5

    Obtaining query text and execution plan by SQL handle


    Figure [4-7](#463519_1_En_4_Chapter.xhtml#Fig7) shows the query output.


    ![../images/463519_1_En_4_Chapter/463519_1_En_4_Fig7_HTML.jpg](images/463519_1_En_4_Chapter/463519_1_En_4_Fig7_HTML.jpg)


    Figure 4-7

    Getting information from `sys.dm_exec_query_stats`


    There are a couple of potential problems with the `sys.dm_exec_query_stats` view
    of which you should be aware. First, this view relies on the execution plan cache.
    You will not be able to get the execution plan if it is not in the cache; for
    example, if a query used statement-level recompile with an `option (recompile)`
    clause.

    Second, there is a chance that you will have more than one cached plan returned.
    In some cases, SQL Server keeps the execution statistics even after recompilation
    occurs, which could produce multiple rows in the result set. Moreover, you may
    have multiple cached plans when sessions use different `SET` options. There are
    two columns—`creation_time` and `last_execution_time`—that can help pinpoint the
    right plan.

    This dependency on the plan cache during troubleshooting is the biggest downside
    of the blocked process report. SQL Server eventually removes old plans from the
    plan cache after queries are recompiled and/or plans are not reused. Therefore,
    the longer you wait to do the troubleshooting, the less likely it is that the
    plan will be present in the cache.

    Microsoft Azure SQL Databases and SQL Server 2016 and above allow you to collect
    and persist information about running queries and their execution plans and statistics
    in the *Query Store*. The Query Store does not rely on the plan cache and is extremely
    useful during system troubleshooting.


    #### Note

    You can read about the Query Store at [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store).


    ## Blocking Monitoring with Event Notifications

    Even though the blocked process report allows you to collect and persist blocking
    information for further analysis, you often need to access the plan cache to get
    the text and execution plans of the queries involved in the blocking. Unfortunately,
    the plan cache changes over time, and longer you wait, the less likely it is that
    the data you seek will be present there.

    You can address this issue by building a monitoring solution based on SQL Server
    Event Notifications. Event Notifications is a Service Broker–based technology
    that allows you to capture information about specific SQL Server and DDL events
    and post a message about them into the Service Broker queue. Furthermore, you
    can define the activation procedure on the queue and react to an event—in our
    case, parse a blocked process report—nearly in real time.


    #### Note

    You can read about Event Notifications at [`https://docs.microsoft.com/en-us/sql/relational-databases/service-broker/event-notifications`](https://docs.microsoft.com/en-us/sql/relational-databases/service-broker/event-notifications).


    Let’s look at the implementation. In my environments, I prefer to persist the
    blocking information in a separate database. Listing [4-6](#463519_1_En_4_Chapter.xhtml#PC6)
    creates the database and corresponding Service Broker and Event Notifications
    objects. Remember: You need to have the blocked process threshold set for the
    events to be fired.

    ```

    use master

    go

    create database DBA;

    exec sp_executesql

    N''alter database DBA set enable_broker;

    alter database DBA set recovery simple;'';

    go

    use DBA

    go

    create queue dbo.BlockedProcessNotificationQueue

    with status = on;

    go

    create service BlockedProcessNotificationService

    on queue dbo.BlockedProcessNotificationQueue

    ([http://schemas.microsoft.com/SQL/Notifications/PostEventNotification]);

    go

    create event notification BlockedProcessNotificationEvent

    on server

    for BLOCKED_PROCESS_REPORT

    to service

    ''BlockedProcessNotificationService'',

    ''current database'';

    ```

    Listing 4-6

    Setting up event notifications objects


    In the next step, shown in Listing [4-7](#463519_1_En_4_Chapter.xhtml#PC7), we
    need to create an activation stored procedure that would parse the blocked process
    report, as well as a table to persist blocking information.

    You can enable or disable the collection of execution plans by setting the `@collectPlan`
    variable in the stored procedure. While execution plans are extremely useful during
    troubleshooting, `sys.dm_exec_query_plan` calls are CPU-intensive and may introduce
    noticeable CPU overhead in the system, along with a large amount of blocking.
    You need to consider this and disable plan collection when your servers are CPU-bound.'
