  ## 食谱 2-11. 查询嵌入文档数组\n\n在本节中，我们将讨论如何查询嵌入文档的数组。\n\n### 问题\n\n您需要查询一个包含嵌入文档的数组。\n\n\
  ### 解决方案\n\n以下命令用于查询包含嵌入文档的数组。\n\n```\ndb.collection.find()\n```\n\n### 工作原理\n\n\
  让我们按照本节的步骤来查询嵌入文档的数组。\n\n##### 步骤 1：查询数组中的文档\n\n执行以下代码创建 `student` 数据库和 `studentmarks`\
  \ 集合。\n\n```\n> use student\n> db.studentmarks.insertMany([{name:\"John\",marks:[{class:\
  \ \"II\", total: 489},{ class: \"III\", total: 490 }]},{name: \"James\",marks:[{class:\
  \ \"III\", total: 469 },{class: \"IV\", total: 450}]},{name:\"Jack\",marks:[{class:\"\
  II\", total: 489 },{ class: \"III\", total: 390}]},{name:\"Smith\", marks:[{class:\
  \ \"III\", total: 489}, {class: \"IV\", total: 490}]}, {name:\"Joshi\",marks:[{class:\
  \ \"II\", total: 465}, { class: \"III\", total: 470}]}])\n```\n\n此处所示的命令选择 `marks`\
  \ 数组字段中所有匹配指定文档的文档。\n\n```\ndb.studentmarks.find( { \"marks\": {class: \"II\", total:\
  \ 489}})\n```\n\n输出如下，\n\n```\n> db.studentmarks.find( { \"marks\": {class: \"II\"\
  , total: 489}})\n{ \"_id\" : ObjectId(\"5bae10e6f10ab299920f073f\"), \"name\" :\
  \ \"John\", \"marks\" : [ { \"class\" : \"II\", \"total\" : 489 }, { \"class\" :\
  \ \"III\", \"total\" : 490 } ] }\n{ \"_id\" : ObjectId(\"5bae10e6f10ab299920f0741\"\
  ), \"name\" : \"Jack\", \"marks\" : [ { \"class\" : \"II\", \"total\" : 489 }, {\
  \ \"class\" : \"III\", \"total\" : 390 } ] }\n>\n```\n\n##### 注意\n\n对嵌入文档数组进行相等匹配要求指定的文档完全匹配，包括字段顺序。\n\
  \n##### 步骤 2：查询文档数组中嵌入的字段\n\n您可以使用点号表示法来查询文档数组中嵌入的字段。以下命令选择 `marks` 数组中所有至少有一个嵌入文档包含\
  \ `total` 字段且该字段值小于 400 的文档。\n\n```\ndb.studentmarks.find( { 'marks.total': { $lt:\
  \ 400 } } )\n```\n\n输出如下，\n\n```\n> db.studentmarks.find( { 'marks.total': { $lt:\
  \ 400 } } )\n{ \"_id\" : ObjectId(\"5bae10e6f10ab299920f0741\"), \"name\" : \"Jack\"\
  , \"marks\" : [ { \"class\" : \"II\", \"total\" : 489 }, { \"class\" : \"III\",\
  \ \"total\" : 390 } ] }\n>\n```\n\n##### 步骤 3：使用数组索引查询嵌入文档中的字段\n\n此处所示的命令选择 `marks`\
  \ 数组中所有文档的第一个元素包含 `class` 字段且该字段值等于 `\"II\"` 的文档。\n\n```\ndb.studentmarks.find(\
  \ { 'marks.0.class': \"II\" } )\n```\n\n输出如下，\n\n```\n> db.studentmarks.find( {\
  \ 'marks.0.class': \"II\" } )\n{ \"_id\" : ObjectId(\"5bae10e6f10ab299920f073f\"\
  ), \"name\" : \"John\", \"marks\" : [ { \"class\" : \"II\", \"total\" : 489 }, {\
  \ \"class\" : \"III\", \"total\" : 490 } ] }\n{ \"_id\" : ObjectId(\"5bae10e6f10ab299920f0741\"\
  ), \"name\" : \"Jack\", \"marks\" : [ { \"class\" : \"II\", \"total\" : 489 }, {\
  \ \"class\" : \"III\", \"total\" : 390 } ] }\n{ \"_id\" : ObjectId(\"5bae10e6f10ab299920f0743\"\
  ), \"name\" : \"Joshi\", \"marks\" : [ { \"class\" : \"II\", \"total\" : 465 },\
  \ { \"class\" : \"III\", \"total\" : 470 } ] }\n>\n```\n\n## 从查询中投影要返回的字段\n\n默认情况下，MongoDB\
  \ 中的查询会返回匹配文档中的所有字段。您可以使用投影文档来限制要返回的字段。\n\n执行以下代码在 `student` 数据库下创建 `studentdetails`\
  \ 集合。\n\n```\ndb.studentdetails.insertMany( [ {name: \"John\", result: \"pass\"\
