  现在，从集合和会话中查找文档。


  ```

  db.student.find()

  ```


  输出如下，


  ```

  myrs:PRIMARY> db.student.find()

  { "_id" : 1001, "name" : "subhashini" }

  { "_id" : 1002, "name" : "shobana" }

  myrs:PRIMARY>session1.getDatabase("student").student.find()

  myrs:PRIMARY> session1.getDatabase("student").student.find()

  { "_id" : 1001, "name" : "subhashini" }

  { "_id" : 1002, "name" : "shobana" }

  { "_id" : 1003, "name" : "Taanushree" }

  myrs:PRIMARY>

