  \ } )\n{ \"name\" : \"John\", \"marks\" : { \"english\" : 25, \"maths\" : 23, \"\
  science\" : 25 }, \"grade\" : [ { \"class\" : \"A\", \"total\" : 73 } ] }\n>\n```\n\
  \n##### 步骤 4：返回嵌入文档中的特定字段\n\n您可以使用点号表示法来引用嵌入的字段，并在投影文档中将 `<field>` 设置为 `1`。\n\n\
