- '# 配方 2-15\. `limit()` 和 `skip()` 方法


  在本配方中，我们将讨论如何使用 `limit()` 和 `skip()` 方法。


  ### 问题


  你想限制并跳过集合中的文档。


  ### 解决方案


  以下语法用于限制查询结果中的文档数量。


  ```

  db.collection.find().limit(2)

  ```


  以下语法用于跳过查询结果中给定数量的文档。


  ```

  db.collection.find().skip(2)

  ```


  ### 工作原理


  让我们遵循本节中的步骤来操作 `limit()` 和 `skip()` 方法。请参考在配方 2-14 中创建的 `numbers` 集合。


  要显示前两个文档，请使用此代码。


