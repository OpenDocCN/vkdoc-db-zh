- "# 2. MongoDB CRUD 操作\n\n在第 1 章中，我们讨论了 MongoDB 的特性以及如何在 Windows 和 Linux 上安装 MongoDB。我们还讨论了\
  \ MongoDB 中使用的术语以及如何创建数据库。在本章中，我们将讨论如何在 MongoDB 中执行创建、读取、更新和删除 (CRUD) 操作。本章还描述了如何处理嵌入式文档和数组。我们将讨论以下主题：\n\
  \n*   集合。\n*   MongoDB CRUD 操作。\n*   批量写操作。\n*   MongoDB 导入和导出。\n*   嵌入式文档。\n* \
  \  处理数组。\n*   嵌入式文档数组。\n*   投影。\n*   处理 null 和缺失值。\n*   使用 `limit()` 和 `skip()`。\n\
  *   使用 `Node.js` 和 MongoDB。\n\n## 集合\n\nMongoDB 的集合类似于关系型数据库管理系统 (RDBMS) 中的表。在 MongoDB\
  \ 中，当我们通过命令引用集合时，它们会自动创建。例如，考虑以下命令。\n\n```javascript\ndb.person.insert({_id:100001,name:\"\
  Taanushree A S\",age:10})\n```\n\n如果名为 `person` 的集合不存在，此命令将创建它。如果它已存在，则只是将一个文档插入到\
  \ `person` 集合中。\n\n### 配方 2-1. 创建集合\n\n在本配方中，我们将讨论如何创建集合。\n\n### 问题\n\n你想使用 `db.createCollection()`\
  \ 命令创建一个名为 `person` 的集合。\n\n### 解决方案\n\n使用以下语法来创建集合。\n\n```javascript\ndb.createCollection()\n\
  ```\n\n### 工作原理\n\n让我们按照本节的步骤来创建一个名为 `person` 的集合。\n\n##### 步骤 1：创建集合\n\n要创建一个名为\
  \ `person` 的集合，请使用以下命令。\n\n```javascript\ndb.createCollection(\"person\")\n```\n\
  \n输出如下，\n\n```javascript\n> db.createCollection(\"person\")\n{ \"ok\" : 1 }\n>\n\
  ```\n\n要确认集合的存在，请在 `mongo` Shell 中键入以下命令。\n\n```javascript\n> show collections\n\
  person\n>\n```\n\n我们现在可以看到名为 `person` 的集合了。\n\n\n\n### 配方 2-2. 创建固定集合\n\n在本配方中，我们将讨论什么是固定集合以及如何创建一个。固定集合是一种固定大小的集合，我们可以指定集合的最大字节数和允许的文档数量。固定集合的工作方式类似于循环缓冲区：一旦填满其分配的空间，它就会通过覆盖集合中最旧的文档来为新文档腾出空间。\n\
  \n固定集合有一些限制：\n\n-   你无法对固定集合进行**分片**。\n-   你无法使用聚合管道操作符 `$out` 将结果写入固定集合。\n-   你无法从固定集合中删除文档。\n\
  -   创建索引可以让你执行高效的更新操作。\n\n### 问题\n\n你想使用 `db.createCollection()` 方法创建一个名为 `student`\
  \ 的固定集合。\n\n### 解决方案\n\n使用以下语法创建集合。\n\n```\ndb.createCollection(,{capped:,size:,max:})\n\
  ```\n\n### 工作原理\n\n让我们按照本节的步骤创建一个名为 `student` 的固定集合。\n\n##### 步骤 1：创建固定集合\n\n要创建一个名为\
  \ `student` 的固定集合，请使用以下命令。\n\n```\ndb.createCollection(\"student\",{capped: true,size:1000,max:2})\n\
  ```\n\n这里，`size` 表示集合的最大字节数，`max` 表示允许的最大文档数量。\n\n输出如下：\n\n```\n> db.createCollection(\"\
  student\",{capped: true,size:1000,max:2})\n{ \"ok\" : 1 }\n>\n```\n\n要检查一个集合是否是固定的，请在\
  \ `mongo` shell 中输入以下命令。\n\n```\n> db.student.isCapped()\ntrue\n>\n```\n\n我们可以看到\
  \ `student` 集合是固定的。现在，我们将向 `student` 集合中插入一些文档，如下所示。\n\n```\ndb.student.insert([{\
  \ \"_id\" : 10001, \"name\" : \"Taanushree A S\", \"age\" : 10 },{ \"_id\" : 10002,\
  \ \"name\" : \"Aruna M S\", \"age\" : 14 }])\n```\n\n输出如下：\n\n```\n> db.student.insert([{\
  \ \"_id\" : 10001, \"name\" : \"Taanushree A S\", \"age\" : 10 },{ \"_id\" : 10002,\
  \ \"name\" : \"Aruna M S\", \"age\" : 14 }])\nBulkWriteResult({\n\"writeErrors\"\
  \ : [ ],\n\"writeConcernErrors\" : [ ],\n\"nInserted\" : 2,\n\"nUpserted\" : 0,\n\
  \"nMatched\" : 0,\n\"nModified\" : 0,\n\"nRemoved\" : 0,\n\"upserted\" : [ ]\n})\n\
  >\n```\n\n##### 步骤 2：查询固定集合\n\n要查询一个固定集合，请使用以下命令。\n\n```\ndb.student.find()\n```\n\
  \n输出如下：\n\n```\n> db.student.find()\n{ \"_id\" : 10001, \"name\" : \"Taanushree\
  \ A S\", \"age\" : 10 }\n{ \"_id\" : 10002, \"name\" : \"Aruna M S\", \"age\" :\
  \ 14 }\n>\n```\n\n这里，MongoDB 按插入顺序检索结果。要按相反顺序检索文档，请使用 `sort()` 并将 `$natural` 参数设置为\
  \ -1，如下所示。\n\n```\n> db.student.find().sort({$natural:-1})\n{ \"_id\" : 10002, \"\
  name\" : \"Aruna M S\", \"age\" : 14 }\n{ \"_id\" : 10001, \"name\" : \"Taanushree\
  \ A S\", \"age\" : 10 }\n>\n```\n\n我们现在可以看到结果是反向的了。\n\n##### 步骤 3：向已满的固定集合插入文档\n\
  \n让我们看看当我们尝试向一个已经达到容量的固定集合插入文档时会发生什么，使用以下命令。\n\n```\ndb.student.insert({_id:10003,name:\"\
  Anba V M\",age:16})\n```\n\n输出如下：\n\n```\n> db.student.insert({_id:10003,name:\"\
  Anba V M\",age:16})\nWriteResult({ \"nInserted\" : 1 })\n```\n\n要查询 `student` 集合，请使用以下命令。\n\
  \n```\n> db.student.find()\n{ \"_id\" : 10002, \"name\" : \"Aruna M S\", \"age\"\
  \ : 14 }\n{ \"_id\" : 10003, \"name\" : \"Anba V M\", \"age\" : 16 }\n>\n```\n\n\
  注意，第一个文档被第三个文档覆盖了，因为 `student` 固定集合允许的最大文档数量是两个。\n\n## 创建操作\n\n创建操作允许我们将文档插入到集合中。这些插入操作针对单个集合。所有写操作在单个文档级别是原子性的。\n\
  \nMongoDB 提供了几种插入文档的方法，列于表 2-1。\n\n表 2-1 插入方法\n\n| 方法 | 描述 |\n| :--- | :--- |\n\
  | `db.collection.insertOne` | 插入单个文档 |\n| `db.collection.insertMany` | 插入多个文档 |\n\
  | `db.collection.insert` | 插入单个或多个文档 |\n\n### 配方 2-3. 插入文档\n\n在本配方中，我们将讨论向集合插入文档的各种方法。\n\
  \n### 问题\n\n你想向 `person` 集合插入文档。\n\n### 解决方案\n\n使用以下语法插入文档。\n\n```\ndb.collection.insertOne()\n\
  db.collection.insertMany()\n```\n\n### 工作原理\n\n让我们按照本节的步骤向 `person` 集合插入文档。\n\n\
  ##### 步骤 1：插入单个文档\n\n要向 `person` 集合插入单个文档，请使用以下命令。\n\n```\ndb.person.insertOne({_id:1001,name:\"\
  Taanushree AS\",age:10})\n```\n\n输出如下：\n\n```\n> db.person.insertOne({_id:1001,name:\"\
  Taanushree AS\",age:10})\n{ \"acknowledged\" : true, \"insertedId\" : 1001 }\n>\n\
  ```\n\n`insertOne()` 返回一个包含新插入文档 `_id` 的文档。\n\n如果你没有指定 `_id` 字段，MongoDB 会生成一个带有\
  \ `ObjectId` 值的 `_id` 字段。`_id` 字段充当主键。\n\n这里有一个例子：\n\n```\n> db.person.insertOne({name:\"\
  Aruna MS\",age:14})\n{\n\"acknowledged\" : true,\n\"insertedId\" : ObjectId(\"5bac7a5113572c1fb994d2fe\"\
  )\n}\n>\n```\n\n##### 步骤 2：插入多个文档\n\n要向 `person` 集合插入多个文档，请使用以下命令。\n\n```\ndb.person.insertMany([{_id:1003,name:\"\
  Anba V M\",age:16},{_id:1004,name:\"shobana\",age:44}])\n```\n\n向 `insertMany()`\
  \ 方法传递一个文档数组以插入多个文档。\n\n输出如下：\n\n```\n> db.person.insertMany([{_id:1003,name:\"\
  Anba V M\",age:16},{_id:1004,name:\"shobana\",age:44}])\n{ \"acknowledged\" : true,\
  \ \"insertedIds\" : [ 1003, 1004 ] }\n>\n```\n\n## 读操作\n\n读操作允许我们从集合中检索文档。MongoDB\
  \ 提供了 `find()` 方法来查询文档。\n\n`find()` 命令的语法是\n\n```\ndb.collection.find()\n```\n\n\
  你可以在 `find()` 方法内部指定查询过滤器或条件，以基于条件查询文档。\n\n\n\n### 配方 2-4. 查询文档\n\n在本配方中，我们将讨论如何从集合中检索文档。\n\
  \n### 问题\n\n你想从一个集合中检索文档。\n\n### 解决方案\n\n使用以下语法从集合中检索文档。\n\n```\ndb.collection.find()\n\
  ```\n\n### 工作原理\n\n让我们按照本节的步骤来查询集合中的文档。\n\n##### 步骤 1：选择集合中的所有文档\n\n要选择集合中的所有文档，请使用以下命令。\n\
  \n```\ndb.person.find({})\n```\n\n你需要向 `find()` 方法传递一个空的文档作为查询参数。\n\n输出如下：\n\n```\n\
  > db.person.find({})\n{ \"_id\" : 1001, \"name\" : \"Taanushree AS\", \"age\" :\
  \ 10 }\n{ \"_id\" : ObjectId(\"5bac86dc773204ddade95819\"), \"name\" : \"Aruna MS\"\
  , \"age\" : 14 }\n{ \"_id\" : 1003, \"name\" : \"Anba V M\", \"age\" : 16 }\n{ \"\
  _id\" : 1004, \"name\" : \"shobana\", \"age\" : 44 }\n>\n```\n\n##### 步骤 2：指定相等条件\n\
  \n要指定一个相等条件，你需要在查询中使用 `<字段>:<值>` 表达式来过滤文档。\n\n要从 `person` 集合中选择 `name` 等于 `\"shobana\"\
  ` 的文档，命令如下：\n\n```\ndb.person.find({name:\"shobana\"})\n```\n\n输出如下：\n\n```\n> db.person.find({name:\"\
  shobana\"})\n{ \"_id\" : 1004, \"name\" : \"shobana\", \"age\" : 44 }\n>\n```\n\n\
  ##### 步骤 3：使用查询操作符指定条件\n\n要从 `person` 集合中选择所有 `age` 大于 10 的文档，命令如下：\n\n```\ndb.person.find({age:{$gt:10}})\n\
  ```\n\n输出如下：\n\n```\n> db.person.find({age:{$gt:10}})\n{ \"_id\" : ObjectId(\"5bac86dc773204ddade95819\"\
  ), \"name\" : \"Aruna MS\", \"age\" : 14 }\n{ \"_id\" : 1003, \"name\" : \"Anba\
  \ V M\", \"age\" : 16 }\n{ \"_id\" : 1004, \"name\" : \"shobana\", \"age\" : 44\
  \ }\n>\n```\n\n##### 步骤 4：指定 AND 条件\n\n在一个复合查询中，你可以为多个字段指定条件。要从 `person` 集合中选择 `name`\
  \ 等于 `\"shobana\"` **且** `age` 大于 10 的所有文档，命令如下：\n\n```\ndb.person.find({ name:\"\
  shobana\",age:{$gt:10}})\n```\n\n输出如下：\n\n```\n> db.person.find({ name:\"shobana\"\
  ,age:{$gt:10}})\n{ \"_id\" : 1004, \"name\" : \"shobana\", \"age\" : 44 }\n>\n```\n\
  \n##### 步骤 5：指定 OR 条件\n\n你可以在复合查询中使用 `$or` 来通过逻辑或连接每个子句。\n\n操作符 `$or` 从集合中选择至少匹配所选条件之一的文档。\n\
  \n要从 `person` 集合中选择 `name` 等于 `\"shobana\"` **或** `age` 等于 20 的所有文档，命令如下：\n\n```\n\
  db.person.find( { $or: [ { name: \"shobana\" }, { age: { $eq: 20 } } ] } )\n```\n\
  \n输出如下：\n\n```\n> db.person.find( { $or: [ { name: \"shobana\" }, { age: { $eq:\
  \ 20 } } ] } )\n{ \"_id\" : 1004, \"name\" : \"shobana\", \"age\" : 44 }\n>\n```\n\
  \n## 更新操作\n\n更新操作允许我们修改集合中的现有文档。MongoDB 提供了表 2-2 中列出的更新方法。\n\n表 2-2\n更新方法\n\n| `db.collection.updateOne`\
  \ | 修改单个文档 |\n| `db.collection.updateMany` | 修改多个文档 |\n| `db.collection.replaceOne`\
  \ | 替换集合中匹配过滤器的第一个文档 |\n\n在 MongoDB 中，更新操作针对单个集合。\n\n### 配方 2-5. 更新文档\n\n在本配方中，我们将讨论如何更新文档。\n\
  \n### 问题\n\n你想更新集合中的文档。\n\n### 解决方案\n\n以下方法用于更新集合中的文档。\n\n```\ndb.collection.updateOne()\n\
  db.collection.updateMany()\ndb.collection.replaceOne()\n```\n\n在 `mongo` shell 中执行以下代码来创建\
  \ `student` 集合。\n\n```\ndb.student.insertMany([{_id:1001,name:\"John\",marks:{english:35,maths:38},result:\"\
  pass\"},{_id:1002,name:\"Jack\",marks:{english:15,maths:18},result:\"fail\"},{_id:1003,name:\"\
  John\",marks:{english:25,maths:28},result:\"pass\"},{_id:1004,name:\"James\",marks:{english:32,maths:40},result:\"\
  pass\"},{_id:1005,name:\"Joshi\",marks:{english:15,maths:18},result:\"fail\"},{_id:1006,name:\"\
  Jack\",marks:{english:35,maths:36},result:\"pass\"}])\n```\n\n### 工作原理\n\n让我们按照本节的步骤来更新集合中的文档。\n\
  \n##### 步骤 1：更新单个文档\n\nMongoDB 提供了修改操作符（如 `$set`）来修改字段值。\n\n要使用更新操作符，需要向 `update`\
  \ 方法传递一个形式如下的更新文档：\n\n```\n{\n  <更新操作符>: { <字段 1>: <值 1>, ... },\n  <更新操作符>: { <字段\
  \ 2>: <值 2>, ... },\n  ...\n}\n```\n\n要更新 `name` 等于 `joshi` 的第一个文档，请执行以下命令。\n\n\
  ```\ndb.student.updateOne({name: \"Joshi\"},{$set:{\"marks.english\": 20}})\n```\n\
  \n输出如下：\n\n```\n> db.student.updateOne({name: \"Joshi\"},{$set:{\"marks.english\"\
  : 20}})\n{ \"acknowledged\" : true, \"matchedCount\" : 1, \"modifiedCount\" : 1\
  \ }\n>\n```\n\n确认 `student` 集合中的 `marks` 字段已更新：\n\n```\n> db.student.find({name:\"\
  Joshi\"})\n{ \"_id\" : 1005, \"name\" : \"Joshi\", \"marks\" : { \"english\" : 20,\
  \ \"maths\" : 18 }, \"result\" : \"fail\" }\n>\n```\n\n##### 注意\n\n你无法更新 `_id` 字段。\n\
  \n##### 步骤 2：更新多个文档\n\n使用以下代码更新 `student` 集合中所有 `result` 等于 `fail` 的文档。\n\n```\n\
  db.student.updateMany( { \"result\":\"fail\" }, { $set: { \"marks.english\": 20,\
  \ \"marks.maths\": 20 }  })\n```\n\n输出如下：\n\n```\n> db.student.updateMany( { \"\
  result\":\"fail\" }, { $set: {\"marks.english\": 20, \"marks.maths\": 20 }})\n{\
  \ \"acknowledged\" : true, \"matchedCount\" : 2, \"modifiedCount\" : 2 }\n>\n```\n\
  \n这里的 `modifiedCount` 是 2，表明前面的命令修改了 `student` 集合中的两个文档。\n\n##### 步骤 3：替换文档\n\n\
  你可以通过向 `db.collection.replaceOne()` 传递一个全新的文档作为第二个参数，来替换除 `_id` 字段外的整个文档内容，如下所示。\n\
  \n执行以下命令，从 `student` 集合中替换第一个 `name` 等于 `\"John\"` 的文档。\n\n```\ndb.student.replaceOne(\
  \ { name: \"John\" }, {_id:1001,name:\"John\",marks:{english:36,maths:39},result:\"\
  pass\"})\n```\n\n输出如下：\n\n```\n> db.student.replaceOne( { name: \"John\" }, {_id:1001,name:\"\
  John\",marks:{english:36,maths:39},result:\"pass\"})\n{ \"acknowledged\" : true,\
  \ \"matchedCount\" : 1, \"modifiedCount\" : 1 }\n>\n```\n\n##### 注意\n\n不要在替换文档中包含更新操作符。你可以在替换文档中省略\
  \ `_id` 字段，因为 `_id` 字段是不可变的。但是，如果你想包含 `_id` 字段，请使用与当前值相同的值。\n\n## 删除操作\n\n删除操作允许我们从集合中删除文档。MongoDB\
  \ 提供了两种删除方法，如表 2-3 所示。\n\n表 2-3\n删除方法\n\n| `db.collection.deleteOne` | 删除单个文档 |\n\
  | `db.collection.deleteMany` | 删除多个文档 |\n\n在 MongoDB 中，删除操作针对单个集合。\n\n\n\n### 配方\
  \ 2-6. 删除文档\n\n在本配方中，我们将讨论如何删除文档。\n\n### 问题\n\n你想从集合中删除文档。\n\n### 解决方案\n\n以下方法用于从集合中删除文档。\n\
  \n```\ndb.collection.deleteOne()\ndb.collection.deleteMany()\n```\n\n### 工作原理\n\n\
  让我们按照本节的步骤来删除集合中的文档。\n\n##### 步骤 1：删除匹配条件的单个文档\n\n要从 `student` 集合中删除 `name` 为 `\"\
  John\"` 的文档，请使用以下代码。\n\n```\ndb.student.deleteOne({name: \"John\"})\n```\n\n输出如下：\n\
  \n```\n> db.student.deleteOne({name: \"John\"})\n{ \"acknowledged\" : true, \"deletedCount\"\
  \ : 1 }\n>\n```\n\n##### 步骤 2：删除所有匹配条件的文档\n\n要从 `student` 集合中删除所有 `name` 为 `\"Jack\"\
  ` 的文档，请使用以下代码。\n\n```\ndb.student.deleteMany({name: \"Jack\"})\n```\n\n输出如下：\n\n\
  ```\n> db.student.deleteMany({name: \"Jack\"})\n{ \"acknowledged\" : true, \"deletedCount\"\
  \ : 2 }\n>\n```\n\n##### 步骤 3：删除集合中的所有文档\n\n要删除 `student` 集合中的所有文档，请向 `db.student.deleteMany()`\
  \ 方法传递一个空的 `filter` 文档。\n\n```\ndb.student.deleteMany({})\n```\n\n输出如下：\n\n```\n\
  > db.student.deleteMany({})\n{ \"acknowledged\" : true, \"deletedCount\" : 3 }\n\
  >\n```\n\n## MongoDB 导入与导出\n\nMongoDB 导入工具允许我们从 JSON、逗号分隔值 (CSV) 和制表符分隔值 (TSV) 文件中导入内容。MongoDB\
  \ 导入仅支持 UTF-8 编码的文件。\n\nMongoDB 导出工具允许我们将存储在 MongoDB 实例中的数据导出为 JSON 或 CSV 文件。\n\n\
  ### 配方 2-7. 使用 Mongo Import\n\n在本配方中，我们将讨论如何从 CSV 文件导入数据。\n\n### 问题\n\n你想将 `student.csv`\
  \ 文件中的数据导入到 `students` 集合中。\n\n### 解决方案\n\n以下命令用于执行 Mongo 导入。\n\n```\nmongoimport\n\
  ```\n\n##### 注意\n\n要使用 Mongo 导入命令，需要启动 `mongod` 进程，并打开另一个命令提示符来执行 `mongoimport`\
  \ 命令。\n\n### 工作原理\n\n让我们按照本节的步骤来使用 Mongo 导入。\n\n在 `C:\\Sample\\` 目录下，使用以下数据创建一个\
  \ `student.csv` 文件。\n\n```\n_id,name,class\n1,John,II\n2,James,III\n3,Joshi,I\n\
  ```\n\n执行以下命令，将数据从 `student.csv` 文件导入到 `students` 集合。\n\n```\nmongoimport --db student\
  \ --collection students --type csv --headerline --file c:\\Sample\\student.csv\n\
  ```\n\n输出如下：\n\n```\nC:\\Program Files\\MongoDB\\Server\\4.0\\bin>mongoimport --db\
  \ student --collection students --type csv --headerline --file c:\\Sample\\student.csv\n\
  2018-09-28T07:00:20.909+0530    connected to: localhost\n2018-09-28T07:00:20.969+0530\
  \    imported 3 documents\nC:\\Program Files\\MongoDB\\Server\\4.0\\bin>\n```\n\n\
  要确认 `students` 集合已存在，请执行以下命令。\n\n```\n> use student\nswitched to db student\n> show\
  \ collections\nstudents\n> db.students.find()\n{ \"_id\" : 1, \"name\" : \"John\"\
  , \"class\" : \"II\" }\n{ \"_id\" : 3, \"name\" : \"Joshi\", \"class\" : \"I\" }\n\
  { \"_id\" : 2, \"name\" : \"James\", \"class\" : \"III\" }\n>\n```\n\n### 配方 2-8.\
  \ 使用 Mongo Export\n\n在本配方中，我们将讨论如何将 `students` 集合中的数据导出到 `student.json` 文件。\n\n\
  ### 问题\n\n你想将 `students` 集合中的数据导出到 `student.json` 文件。\n\n### 解决方案\n\n以下命令用于执行 Mongo\
  \ 导出。\n\n```\nmongoexport\n```\n\n##### 注意\n\n要使用 Mongo 导出命令，需要启动 `mongod` 进程，并打开另一个命令提示符来执行\
  \ `mongoexport` 命令。\n\n### 工作原理\n\n让我们按照本节的步骤来使用 Mongo 导出。\n\n执行以下命令，将数据从 `students`\
  \ 集合导出到 `student.json` 文件。\n\n```\nmongoexport --db student --collection students\
  \ --out C:\\Sample\\student.json\n```\n\n输出如下：\n\n```\nC:\\Program Files\\MongoDB\\\
  Server\\4.0\\bin>mongoexport --db student --collection students --out C:\\Sample\\\
  student.json\n2018-09-28T07:11:19.446+0530    connected to: localhost\n2018-09-28T07:11:19.459+0530\
  \    exported 3 records\n```\n\n要确认导出成功，请打开 `student.json` 文件。\n\n```\n{\"_id\"\
  :1,\"name\":\"John\",\"class\":\"II\"}\n{\"_id\":2,\"name\":\"James\",\"class\"\
  :\"III\"}\n{\"_id\":3,\"name\":\"Joshi\",\"class\":\"I\"}\n```\n\n## MongoDB 中的嵌入式文档\n\
  \n使用嵌入式文档允许我们将一个文档嵌入到另一个文档中。考虑以下示例。\n\n```\n{_id:1001,name:\"John\",marks:{english:35,maths:38},result:\"\
  pass\"}\n```\n\n这里，`marks` 字段包含一个嵌入式文档。\n\n执行以下代码创建一个 `employee` 数据库和 `employee`\
  \ 集合。\n\n```\nuse employee\ndb.employee.insertMany([{_id:1001,name:\"John\",address:{previous:\"\
  123,1st Main\",current:\"234,2nd Main\"},unit:\"Hadoop\"},{_id:1002,name:\"Jack\"\
  , address:{previous:\"Cresent Street\",current:\"234,Bald Hill Street\"},unit:\"\
  MongoDB\"},{_id:1003,name:\"James\", address:{previous:\"Cresent Street\",current:\"\
  234,Hill Street\"},unit:\"Spark\"}])\n```\n\n### 配方 2-9. 查询嵌入式文档\n\n在本配方中，我们将讨论如何查询嵌入式文档。\n\
  \n### 问题\n\n你想查询嵌入式文档。\n\n### 解决方案\n\n以下命令用于查询嵌入式文档。\n\n```\ndb.collection.find()\n\
  ```\n\n你需要将过滤文档 `{<field>:<value>}` 传递给 `find()` 方法，其中 `<value>` 是要匹配的文档。\n\n###\
  \ 工作原理\n\n让我们按照本节的步骤来查询嵌入式文档。\n\n##### 步骤 1：匹配嵌入式或嵌套文档\n\n要对嵌入式文档执行相等匹配，你需要在 `<value>`\
  \ 文档中指定完全匹配的文档，包括字段顺序。\n\n要选择所有 `address` 字段等于文档 `{previous:\"Cresent Street\",current:\"\
  234,Bald Hill Street\"}` 的文档：\n\n```\ndb.employee.find( { address: { previous:\"\
  Cresent Street\",current:\"234,Bald Hill Street\" }} )\n```\n\n输出如下：\n\n```\n> db.employee.find(\
  \ { address: { previous:\"Cresent Street\",current:\"234,Bald Hill Street\" }} )\n\
  { \"_id\" : 1002, \"name\" : \"Jack\", \"address\" : { \"previous\" : \"Cresent\
  \ Street\", \"current\" : \"234,Bald Hill Street\" }, \"unit\" : \"MongoDB\" }\n\
  >\n```\n\n##### 步骤 2：查询嵌套字段\n\n我们可以使用点表示法来查询嵌入式文档的字段。\n\n要选择所有嵌套在 `address` 字段中的\
  \ `previous` 字段等于 `\"Cresent Street\"` 的文档，\n\n```\ndb.employee.find( { \"address.previous\"\
  : \"Cresent Street\" } )\n```\n\n输出如下：\n\n```\n> db.employee.find( { \"address.previous\"\
  : \"Cresent Street\" } )\n{ \"_id\" : 1002, \"name\" : \"Jack\", \"address\" : {\
  \ \"previous\" : \"Cresent Street\", \"current\" : \"234,Bald Hill Street\" }, \"\
  unit\" : \"MongoDB\" }\n{ \"_id\" : 1003, \"name\" : \"James\", \"address\" : {\
  \ \"previous\" : \"Cresent Street\", \"current\" : \"234,Hill Street\" }, \"unit\"\
  \ : \"Spark\" }\n>\n```\n\n## 处理数组\n\n在 MongoDB 中，我们可以将字段值指定为数组。\n\n### 配方 2-10.\
  \ 处理数组\n\n在本配方中，我们将讨论如何查询数组。\n\n### 问题\n\n你想查询数组。\n\n### 解决方案\n\n以下命令用于查询数组。\n\n\
  ```\ndb.collection.find()\n```\n\n### 工作原理\n\n让我们按照本节的步骤来查询嵌入式文档。\n\n\n\n### MongoDB\
  \ 数组操作指南\n\n#### 步骤 1：匹配数组\n\n执行此处显示的代码，在 `employee` 数据库下创建 `employeedetails` 集合。\n\
  \n```javascript\ndb.employeedetails.insertMany([\n{ name: \"John\", projects: [\"\
  MongoDB\", \"Hadoop\",\"Spark\"], scores:[25,28,29] }, { name: \"James\", projects:\
  \ [ \"Cassandra\",\"Spark\"], scores:[26,24,23]}, { name: \"Smith\", projects: [\
  \ \"Hadoop\",\"MongoDB\"], scores:[22,28,26]} ] )\n```\n\n要在数组上指定相等条件，需要在查询文档 `{<field>:<value>}`\
  \ 的 `<value>` 中指定要匹配的确切数组。\n\n要选择所有 `projects` 值是一个数组，且恰好包含 `\"Hadoop\"` 和 `\"MongoDB\"\
  ` 两个元素（并按指定顺序排列）的文档，请使用以下命令。\n\n```javascript\ndb.employeedetails.find( { projects:\
  \ [\"Hadoop\", \"MongoDB\"] } )\n```\n\n输出结果如下：\n\n```javascript\n> db.employeedetails.find(\
  \ { projects: [\"Hadoop\", \"MongoDB\"] } )\n{ \"_id\" : ObjectId(\"5badcbd5f10ab299920f072a\"\
  ), \"name\" : \"Smith\", \"projects\" : [ \"Hadoop\", \"MongoDB\" ], \"scores\"\
  \ : [ 22, 28, 26 ] }\n>\n```\n\n#### 步骤 2：查询数组中的元素\n\n要查询所有 `projects` 是一个数组且包含字符串\
  \ `\"MongoDB\"` 作为其元素之一的文档，请执行以下命令。\n\n```javascript\ndb.employeedetails.find( {\
  \ projects: \"MongoDB\" } )\n```\n\n输出结果如下：\n\n```javascript\n> db.employeedetails.find(\
  \ { projects: \"MongoDB\" } )\n{ \"_id\" : ObjectId(\"5badcbd5f10ab299920f0728\"\
  ), \"name\" : \"John\", \"projects\" : [ \"MongoDB\", \"Hadoop\", \"Spark\" ], \"\
  scores\" : [ 25, 28, 29 ] }\n{ \"_id\" : ObjectId(\"5badcbd5f10ab299920f072a\"),\
  \ \"name\" : \"Smith\", \"projects\" : [ \"Hadoop\", \"MongoDB\" ], \"scores\" :\
  \ [ 22, 28, 26 ] }\n>\n```\n\n#### 步骤 3：指定查询操作符\n\n要查询所有 `scores` 字段是一个数组，且至少包含一个值大于\
  \ 26 的元素的文档，我们可以使用 `$gt` 操作符。\n\n```javascript\ndb.employeedetails.find( { scores:{$gt:26}\
  \ } )\n```\n\n输出结果如下：\n\n```javascript\n> db.employeedetails.find( { scores:{$gt:26}\
  \ } )\n{ \"_id\" : ObjectId(\"5badcbd5f10ab299920f0728\"), \"name\" : \"John\",\
  \ \"projects\" : [ \"MongoDB\", \"Hadoop\", \"Spark\" ], \"scores\" : [ 25, 28,\
  \ 29 ] }\n{ \"_id\" : ObjectId(\"5badcbd5f10ab299920f072a\"), \"name\" : \"Smith\"\
  , \"projects\" : [ \"Hadoop\", \"MongoDB\" ], \"scores\" : [ 22, 28, 26 ] }\n>\n\
  ```\n\n#### 步骤 4：对数组元素使用复合筛选条件\n\n可以在数组上指定复合筛选条件，如下所示。\n\n```javascript\ndb.employeedetails.find(\
  \ { scores: { $gt: 20, $lt: 24 } } )\n```\n\n输出结果如下：\n\n```javascript\n> db.employeedetails.find(\
  \ { scores: { $gt: 20, $lt: 24 } } )\n{ \"_id\" : ObjectId(\"5badcbd5f10ab299920f0729\"\
  ), \"name\" : \"James\", \"projects\" : [ \"Cassandra\", \"Spark\" ], \"scores\"\
  \ : [ 26, 24, 23 ] }\n{ \"_id\" : ObjectId(\"5badcbd5f10ab299920f072a\"), \"name\"\
  \ : \"Smith\", \"projects\" : [ \"Hadoop\", \"MongoDB\" ], \"scores\" : [ 22, 28,\
  \ 26 ] }\n>\n```\n\n在这里，`scores` 数组中的一个元素可以满足大于 20 的条件，另一个元素可以满足小于 24 的条件，或者单个元素可以同时满足这两个条件。\n\
  \n#### 步骤 5：使用 `$elemMatch` 操作符\n\n`$elemMatch` 操作符允许我们对数组元素指定多个条件，要求至少有一个数组元素满足所有指定条件。\n\
  \n```javascript\ndb.employeedetails.find( { scores: { $elemMatch: { $gt: 23, $lt:\
  \ 27 } } } )\n```\n\n输出结果如下：\n\n```javascript\n> db.employeedetails.find( { scores:\
  \ { $elemMatch: { $gt: 23, $lt: 27 } } } )\n{ \"_id\" : ObjectId(\"5badcbd5f10ab299920f0728\"\
  ), \"name\" : \"John\", \"projects\" : [ \"MongoDB\", \"Hadoop\", \"Spark\" ], \"\
  scores\" : [ 25, 28, 29 ] }\n{ \"_id\" : ObjectId(\"5badcbd5f10ab299920f0729\"),\
  \ \"name\" : \"James\", \"projects\" : [ \"Cassandra\", \"Spark\" ], \"scores\"\
  \ : [ 26, 24, 23 ] }\n{ \"_id\" : ObjectId(\"5badcbd5f10ab299920f072a\"), \"name\"\
  \ : \"Smith\", \"projects\" : [ \"Hadoop\", \"MongoDB\" ], \"scores\" : [ 22, 28,\
  \ 26 ] }\n>\n```\n\n#### 步骤 6：按索引位置查询数组元素\n\n使用点表示法按索引位置查询数组元素。\n\n使用此代码选择所有 `scores`\
  \ 数组中第三个元素大于 26 的文档。\n\n```javascript\ndb.employeedetails.find( { \"scores.2\":\
  \ { $gt: 26 } } )\n```\n\n输出结果如下：\n\n```javascript\n> db.employeedetails.find( {\
  \ \"scores.2\": { $gt: 26 } } )\n{ \"_id\" : ObjectId(\"5badcbd5f10ab299920f0728\"\
  ), \"name\" : \"John\", \"projects\" : [ \"MongoDB\", \"Hadoop\", \"Spark\" ], \"\
  scores\" : [ 25, 28, 29 ] }\n>\n```\n\n#### 步骤 7：使用 `$size` 操作符\n\n您可以使用 `$size`\
  \ 操作符按元素数量查询数组。\n\n要选择所有 `projects` 数组有两个元素的文档，请使用此代码。\n\n```javascript\ndb.employeedetails.find(\
  \ { \"projects\": { $size: 2 } } )\n```\n\n输出结果如下：\n\n```javascript\n> db.employeedetails.find(\
  \ { \"projects\": { $size: 2 } } )\n{ \"_id\" : ObjectId(\"5badcbd5f10ab299920f0729\"\
  ), \"name\" : \"James\", \"projects\" : [ \"Cassandra\", \"Spark\" ], \"scores\"\
  \ : [ 26, 24, 23 ] }\n{ \"_id\" : ObjectId(\"5badcbd5f10ab299920f072a\"), \"name\"\
  \ : \"Smith\", \"projects\" : [ \"Hadoop\", \"MongoDB\" ], \"scores\" : [ 22, 28,\
  \ 26 ] }\n```\n\n#### 步骤 8：使用 `$push` 操作符\n\n您可以使用 `$push` 操作符向数组中添加一个值。\n\n要添加工作地点详情，请使用此代码。\n\
  \n```javascript\ndb.employeedetails.update({name:\"James\"},{$push:{Location: \"\
  US\"}})\n```\n\n以下是用于检查结果的查询：\n\n```javascript\n> db.employeedetails.find({name:\"\
  James\"})\n{ \"_id\" : ObjectId(\"5c04bef3540e90478dd92f4e\"), \"name\" : \"James\"\
  , \"projects\" : [ \"Cassandra\", \"Spark\" ], \"scores\" : [ 26, 24, 23 ], \"Location\"\
  \ : [ \"US\" ] }\n```\n\n要向数组追加多个值，请使用 `$each` 操作符。\n\n```javascript\ndb.employeedetails.update({name:\
  \ \"Smith\"},{$push:{Location:{$each:[\"US\",\"UK\"]}}})\n```\n\n以下是用于检查结果的查询：\n\
  \n```javascript\n> db.employeedetails.find({name:\"Smith\"})\n{ \"_id\" : ObjectId(\"\
  5c04bef3540e90478dd92f4f\"), \"name\" : \"Smith\", \"projects\" : [ \"Hadoop\",\
  \ \"MongoDB\" ], \"scores\" : [ 22, 28, 26 ], \"Location\" : [ \"US\", \"UK\" ]\
  \ }\n>\n```\n\n#### 步骤 9：使用 `$addToSet` 操作符\n\n您可以使用 `$addToSet` 操作符向数组中添加一个值。`$addToSet`\
  \ 仅当值不存在时才将其添加到数组。如果值已存在，则不执行任何操作。\n\n要向 `employeedetails` 集合添加 `hobbies`，请使用此代码。\n\
  \n```javascript\ndb.employeedetails.update( {name: \"James\"},  { $addToSet: {hobbies:\
  \ [ \"drawing\", \"dancing\"]} })\n```\n\n以下是用于检查结果的查询：\n\n```javascript\n> db.employeedetails.find({name:\"\
  James\"})\n{ \"_id\" : ObjectId(\"5c04bef3540e90478dd92f4e\"), \"name\" : \"James\"\
  , \"projects\" : [ \"Cassandra\", \"Spark\" ], \"scores\" : [ 26, 24, 23 ], \"Location\"\
  \ : [ \"US\" ], \"hobbies\" : [ [ \"drawing\", \"dancing\" ] ] }\n>\n```\n\n####\
  \ 步骤 10：使用 `$pop` 操作符\n\n您可以使用 `$pop` 操作符删除数组的第一个或最后一个元素。\n\n要删除 `scores` 数组中的第一个元素，请使用此代码。\n\
  \n```javascript\ndb.employeedetails.update( {name: \"James\"},{ $pop: {scores:-1}})\n\
  ```\n\n以下是用于检查结果的查询：\n\n```javascript\n> db.employeedetails.find({name:\"James\"\
  })\n{ \"_id\" : ObjectId(\"5c04bef3540e90478dd92f4e\"), \"name\" : \"James\", \"\
  projects\" : [ \"Cassandra\", \"Spark\" ], \"scores\" : [ 24, 23 ], \"Location\"\
  \ : [ \"US\" ], \"hobbies\" : [ [ \"drawing\", \"dancing\" ] ] }\n>\n```\n\n要删除\
  \ `scores` 数组中的最后一个元素，请使用此代码。\n\n```javascript\ndb.employeedetails.update( {name:\
  \ \"James\"},{ $pop: {scores:1}})\n```\n\n以下是用于检查结果的查询：\n\n```javascript\n> db.employeedetails.find({name:\"\
  James\"})\n{ \"_id\" : ObjectId(\"5c04bef3540e90478dd92f4e\"), \"name\" : \"James\"\
