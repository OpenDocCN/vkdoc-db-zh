  \ name: null }, { _id: 2 }])\n```\n\n\n\n## 食谱 2-13. 如何查询 Null 或缺失字段\n\n在本食谱中，我们将讨论如何在\
  \ MongoDB 中查询 null 或缺失值。\n\n### 问题\n\n你希望查询 null 或缺失值。\n\n### 解决方案\n\n以下命令用于查询 null\
  \ 或缺失值。\n```\ndb.collection.find()\n```\n\n### 工作原理\n\n让我们按照本节的步骤来查询 null 或缺失值。\n\
  \n##### 步骤 1：相等过滤器\n\n`{name:null}` 查询会匹配那些包含值为 `null` 的 `name` 字段，或者不包含 `name`\
  \ 字段的文档。\n```\ndb.sample.find( { name: null } )\n```\n输出如下：\n```\n> db.sample.insertMany([{\
  \ _id: 1, name: null }, { _id: 2 }])\n{ \"acknowledged\" : true, \"insertedIds\"\
  \ : [ 1, 2 ] }\n>\n```\n这里，它返回了两个文档。\n\n##### 步骤 2：类型检查\n\n此处显示的查询仅返回那些包含值为 `null`\
  \ 的 `name` 字段的文档。在 BSON 中，将 `null` 值设置为 `10`。\n```\ndb.sample.find( { name: { $type:\
  \ 10 } } )\n```\n输出如下：\n```\n> db.sample.find( { name: { $type: 10 } } )\n{ \"_id\"\
  \ : 1, \"name\" : null }\n>\n```\n\n##### 步骤 3：存在性检查\n\n你可以使用 `$exists` 操作符来检查字段是否存在。\n\
  \n以下查询返回不包含 `name` 字段的文档。\n```\ndb.sample.find( { name: { $exists: false } } )\n\
  ```\n输出如下：\n```\n> db.sample.find( { name: { $exists: false } } )\n{ \"_id\" : 2\
  \ }\n>\n```\n\n## 食谱 2-14. 如何迭代游标\n\n在本食谱中，我们将讨论如何在 `mongo` shell 中迭代游标。\n\n###\
