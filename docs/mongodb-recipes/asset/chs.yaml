  C\", total: 40 } ] }])\n```\n\n## 食谱 2-12. 限制查询返回的字段\n\n在本节中，我们将讨论如何限制查询返回的字段。\n\
  \n### 问题\n\n您需要限制查询返回的字段。\n\n### 解决方案\n\n以下命令用于限制查询返回的字段。\n\n```\ndb.collection.find()\n\
  ```\n\n### 工作原理\n\n让我们按照本节的步骤来限制查询返回的字段。\n\n##### 步骤 1：仅返回指定字段和 `_id` 字段\n\n您可以通过在投影文档中将\
  \ `<field>` 值设置为 `1` 来投影所需的字段。\n\n此处所示的命令仅返回结果集中 `name` 等于 `\"John\"` 的文档的 `_id`、`marks`\
  \ 和 `result` 字段。\n\n```\ndb.studentdetails.find( { name: \"John\" }, { marks: 1,\
