- '# 1. MongoDB 特性与安装


  本章介绍 `NoSQL` 数据库、`MongoDB` 的各种特性以及如何与 `MongoDB` 进行交互。我们将重点讨论以下主题：


  *   为什么需要 `NoSQL`？

  *   什么是 `NoSQL` 数据库？

  *   `CAP` 定理。

  *   `BASE` 方法。

  *   `NoSQL` 数据库的类型。

  *   `MongoDB` 特性。

  *   在 Windows 上安装 `MongoDB`。

  *   在 Linux 上安装 `MongoDB`。

  *   在 Windows 上安装 `MongoDB Compass`。

  *   `MongoDB` 中使用的术语。

  *   `MongoDB` 中的数据类型。

  *   数据库命令。


  ## 对 NoSQL 数据库的需求


  现代应用程序面临多种数据库挑战，包括以下几点。


  *   现代应用程序的存储容量超出了传统关系数据库管理系统（`RDBMS`）的存储能力。

  *   现代应用程序需要未知级别的可扩展性。

  *   现代应用程序应能 24/7 全天候可用。

  *   数据需要在全球范围内分布式存储。

  *   用户应能在任何地方读写数据。

  *   用户总是寻求降低软硬件成本。


  所有这些挑战催生了 `NoSQL` 数据库。


  ## 什么是 NoSQL 数据库？


  `NoSQL` 数据库是开源、非关系型、分布式的数据库，允许组织分析海量数据。


  以下是 `NoSQL` 数据库的一些关键优势：


  *   可用性。

  *   容错性。

  *   可扩展性。


  `NoSQL` 数据库具有以下特征：


  *   它们不使用 `SQL` 作为查询语言。

  *   大多数 `NoSQL` 数据库设计为在集群上运行。

  *   它们在无模式下运行，可以自由地向数据库添加字段，而无需首先定义任何结构变更。

  *   它们是多语言持久化的，意味着可以根据需求以不同方式存储数据。

  *   它们的设计方式使其能够横向扩展。






  ### CAP 定理


  CAP 定理指出，任何分布式系统都只能满足以下三个属性中的两个：


  *   **一致性** 意味着每次读取都能获取到最后一次写入的数据。

  *   **可用性** 意味着读写操作总是能够成功。换句话说，每个未发生故障的节点都将在合理的时间内返回响应。

  *   **分区容错性** 意味着即使发生数据丢失或系统故障，系统仍能继续运行。


  图 1-1 是 CAP 定理的图形化表示。


  ![../images/475461_1_En_1_Chapter/475461_1_En_1_Fig1_HTML.jpg](img/475461_1_En_1_Fig1_HTML.jpg)


  图 1-1：CAP 定理


  CAP 定理根据三个类别对系统进行分类：


  1.  一致性和可用性。

  2.  一致性和分区容错性。

  3.  可用性和分区容错性。


  ##### 注意


  分区容错性是 NoSQL 数据库的必备属性。


  ### BASE 方法


  NoSQL 数据库基于 BASE 方法。BASE 代表：


  *   **基本可用：** 数据库应在大部分时间内保持可用。

  *   **软状态：** 允许临时的不一致。

  *   **最终一致性：** 系统在一段时间后将达到一致状态。


  ### NoSQL 数据库的类型


  NoSQL 数据库通常分为四种类型，如表 1-1 所示。


  表 1-1：NoSQL 数据库类型


  | **数据模型** | **示例** | **描述** |

  | --- | --- | --- |

  | 键/值存储 | Dynamo DB, Riak | •    最简单的 NoSQL 选项。•    一个键和一个值。 |

  | 列存储 | HBase, Big Table | •    也称为宽列存储。•    将数据表存储为数据列的片段。 |

  | 文档存储 | MongoDB, CouchDB | •    扩展了键/值的概念。•    将数据存储为文档。•    复杂的 NoSQL 选项。•    每个文档包含一个用于检索该文档的唯一键。
  |

  | 图数据库 | Neo4j | •    基于图论。•    将数据存储为节点、边和属性。 |


  ## MongoDB 特性


  MongoDB 是一个用 C++ 编写的开源、面向文档的 NoSQL 数据库。MongoDB 提供高可用性、自动扩展和高性能。以下部分介绍 MongoDB 的特性。


  ### 文档数据库


  在 MongoDB 中，一条记录表示为一个文档。文档是字段和值对的组合。MongoDB 文档类似于 JavaScript 对象表示法（JSON）文档。图 1-2
  展示了一个文档。


  ![../images/475461_1_En_1_Chapter/475461_1_En_1_Fig2_HTML.jpg](img/475461_1_En_1_Fig2_HTML.jpg)


  图 1-2：一个文档


  以下是使用文档的优势。


  *   在许多编程语言中，文档对应于原生数据类型。

  *   嵌入式文档有助于减少昂贵的连接操作。


  ### MongoDB 是无模式的


  MongoDB 是一个无模式数据库，这意味着一个集合（类似于关系数据库管理系统中的表）可以包含不同的文档（类似于关系数据库管理系统中的记录）。这样，MongoDB
  在处理数据库模式方面提供了灵活性。参考下面的 `Person` 集合。


  ```

  {name:"Aruna M S", age:12 } //包含两个字段的文档。

  {ssn:100023412, name:"Anbu M S",groups:["sports","news"]} //包含三个字段的文档。

  ```


  这里，`Person` 集合有两个文档，每个文档都有不同的字段、内容和大小。


  ### MongoDB 使用 BSON


  JSON 是一种用于数据交换的开源标准格式。文档数据库使用 JSON 格式存储记录。以下是一个 JSON 文档的示例。


  ```

  {

  name:"John",

  addresses:[

  {

  address:"123,River Road",

  status:"office"

  },

  {

  address:"345,Mount Road",

  status:"personal"

  }

  ]

  }

  ```


  MongoDB 在后台以二进制编码格式——二进制 JSON（BSON）来表示 JSON 文档。BSON 扩展了 JSON 模型，以提供 JSON 不支持的其他数据类型，例如日期。BSON
  使用名为 `ObjectId` 的 `_id` 字段作为主键。`_id` 字段的值由 MongoDB 服务或应用程序生成。以下是 `ObjectId` 的一个示例：


  ```

  "_id": ObjectId("12e6789f4b01d67d71da3211")

  ```


  ### 丰富的查询语言


  MongoDB 提供了一种丰富的查询语言来支持增、查、改、删（CRUD）操作、数据聚合和文本搜索。让我们通过一个示例来了解如何查询 MongoDB 中的集合。考虑下面的
  `Employee` 集合。


  ```

  {_id: 10001, name:"Subhashini",unit:"Hadoop"}

  {_id: 10002, name:"Shobana", unit:"Spark"}

  ```


  要显示员工详情，MongoDB 查询语句为：


  ```

  db.Employee.find();

  ```


  我们将在第 2 章详细讨论 MongoDB 查询语言。


  ### 聚合框架


  MongoDB 提供了一个聚合框架来执行聚合操作。该聚合框架可以对来自多个文档的数据进行分组，并对分组后的数据执行各种操作。MongoDB 提供了聚合管道、`map-reduce`
  函数和单一用途聚合方法来执行聚合操作。我们将在第 3 章详细讨论聚合框架。


  '
- '# 索引


  索引提高了查询执行的性能。MongoDB 使用索引来限制需要扫描的文档数量。我们将在第 4 章讨论各种索引。


  ### GridFS


  GridFS 是一个用于存储和检索大文件的规范。GridFS 可用于存储超过 BSON 最大文档大小 16 MB 的文件。GridFS 将文件分成称为块的部分，并将它们作为单独的文档存储。GridFS
  将文件分成大小为 255 KB 的块，除了最后一块，其大小基于文件大小而定。


  ## 复制


  复制是将数据库实例复制到不同数据库服务器以提供冗余和高可用性的过程。复制提供了针对单个数据库服务器故障的容错能力。在 MongoDB 中，副本集是一组维护相同数据集的
  `mongod` 进程。我们将在第 5 章讨论如何创建副本集。


  ## 分片


  当需要处理大型数据集和高吞吐量应用程序时，单个服务器在中央处理器（CPU）和输入/输出（I/O）容量方面可能面临挑战。MongoDB 使用分片来支持大型数据集和高吞吐量操作。分片是一种将数据分布在多个系统上的方法，将在第
  5 章详细讨论。


  ### mongo Shell


  `mongo` shell 是 MongoDB 的一个交互式 JavaScript 接口。`mongo` shell 用于查询、更新数据以及执行管理操作。`mongo`
  shell 是 MongoDB 发行版的一个组件。当你启动 `mongod` 进程时，`mongo` shell 将连接到一个 MongoDB 实例。


  ## MongoDB 中使用的术语


  让我们了解 MongoDB 中使用的术语，如表 1-2 所示。


  表 1-2：MongoDB 术语


  | 术语 | MongoDB |

  | --- | --- |

  | MongoDB 服务器 | mongod |

  | MongoDB 客户端 | mongo |


  表 1-3 显示了关系数据库管理系统（RDBMS）和 MongoDB 中使用的等效术语。


  表 1-3：RDBMS 和 MongoDB 的等效术语


  | RDBMS | MongoDB |

  | --- | --- |

  | 数据库 | 数据库 |

  | 表 | 集合 |

  | 记录 | 文档 |

  | 列 | 字段或键/值对 |

  | ACID 事务 | ACID 事务 |

  | 二级索引 | 二级索引 |

  | 连接 | 嵌入文档，`$lookup` |

  | GROUP_BY | 聚合管道 |





  ## MongoDB 中的数据类型


  表 1-4 提供了 MongoDB 数据类型的描述。


  表 1-4


  MongoDB 数据类型


  | 数据类型 | 描述 |

  | --- | --- |

  | String | 字符串采用 UTF-8 编码 |

  | Integer | 可以是 32 位或 64 位 |

  | Double | 用于存储浮点值 |

  | Arrays | 将值列表存储在一个键中 |

  | Timestamps | 供 MongoDB 内部使用；值为 64 位，记录文档何时被修改或添加 |

  | Date | 一个 64 位整数，表示自 Unix 纪元（1970 年 1 月 1 日）以来的毫秒数 |

  | ObjectId | 小巧、唯一、生成速度快且有序。由 12 个字节组成，前四个字节是反映 `ObjectId` 创建时间的时间戳 |

  | Binary data | 用于存储二进制数据（图像、二进制文件等） |

  | Null | 用于存储 `NULL` 值 |


  ##### 注意


  有关 MongoDB 数据类型的更多信息，请参考以下链接：[`https://docs.mongodb.com/manual/reference/bson-types/`](https://docs.mongodb.com/manual/reference/bson-types/)


  ## MongoDB 安装


  接下来，我们将学习如何安装 MongoDB。


  ### 教程 1-1. 在 Windows 上安装 MongoDB


  在本教程中，我们将讨论如何在 Windows 上安装 MongoDB。


  ### 问题


  你想在 Windows 上安装 MongoDB。


  ### 解决方案


  从 [`https://www.mongodb.com/download-center#enterprise`](https://www.mongodb.com/download-center%2523enterprise)
  下载 MongoDB `msi` 安装程序。


  ### 工作原理


  让我们按照本节的步骤在 Windows 上安装 MongoDB。


  ##### 步骤 1：安装 `msi` 安装程序


  右键单击 Windows 安装程序，选择“以管理员身份运行”，然后按照说明安装 MongoDB。


  ##### 步骤 2：创建数据目录


  在 `C:\` 下创建 `\data\db` 目录来存储 MongoDB 数据。目录结构类似 “`C:\data\db`”。


  ##### 步骤 3：启动 MongoDB 服务器


  打开命令提示符并导航到 MongoDB 安装文件夹。执行以下命令以启动 MongoDB 服务器，如图 1-3 所示。


  ![../images/475461_1_En_1_Chapter/475461_1_En_1_Fig3_HTML.jpg](img/475461_1_En_1_Fig3_HTML.jpg)


  图 1-3


  启动 MongoDB 服务器


  ```

  mongod.exe

  ```


  你应该会看到一条消息，显示“Waiting for connection on port 27017.”


  ##### 步骤 4：启动 MongoDB 客户端


  打开另一个命令提示符并导航到 MongoDB 安装文件夹。执行以下命令以启动 MongoDB 客户端，如图 1-4 所示。


  ![../images/475461_1_En_1_Chapter/475461_1_En_1_Fig4_HTML.jpg](img/475461_1_En_1_Fig4_HTML.jpg)


  图 1-4


  启动 MongoDB 客户端


  ```

  mongo.exe

  ```


  我们可以看到 `mongo` shell。


  这证实我们已在 Windows 上安装了 MongoDB。


  ### 教程 1-2. 在 Ubuntu 上安装 MongoDB


  在本教程中，我们将讨论如何在 Ubuntu 上安装 MongoDB。


  ### 问题


  你想在 Ubuntu 上安装 MongoDB。


  ### 解决方案


  从 [`https://www.mongodb.com/download-center/community`](https://www.mongodb.com/download-center/community)
  下载 MongoDB tarball。


  ### 工作原理


  让我们按照本节的步骤在 Ubuntu 上安装 MongoDB。


  ##### 步骤 1：解压 tarball


  执行以下命令解压 tarball：


  ```

  tar -xzf mongodb-linux-x86_64-ubuntu1604-4.0.8.tgz

  ```


  ##### 步骤 2：创建数据目录


  如教程 1-1 所示，创建一个 `/data/db` 目录。


  ##### 步骤 3：启动 MongoDB 服务器


  打开终端，导航到 MongoDB 安装文件夹，并执行以下命令以启动 MongoDB 服务器。


  ```

  ./mongod --dbpath

  ```


  ##### 步骤 4：启动 MongoDB 客户端


  打开另一个终端，导航到 MongoDB 安装文件夹，并执行以下命令以启动 MongoDB 客户端。


  ```

  ./mongo.exe

  ```


  ### 教程 1-3. 在 Windows 上安装 MongoDB Compass


  在本教程中，我们将讨论如何在 Windows 上安装 MongoDB Compass。MongoDB Compass 是一个简单易用的图形用户界面（GUI），用于与
  MongoDB 交互。


  ### 问题


  你想在 Windows 上安装 MongoDB Compass。


  ### 解决方案


  从 [`https://www.mongodb.com/download-center#compass`](https://www.mongodb.com/download-center%2523compass)
  下载 MongoDB Compass `msi` 安装程序。


  ### 工作原理


  让我们按照本节的步骤在 Windows 上安装 MongoDB Compass。


  ##### 步骤 1：安装 MongoDB Compass `msi` 安装程序


  右键单击 MongoDB Compass Windows 安装程序，选择“以管理员身份运行”，然后按照说明安装 MongoDB Compass。图 1-5 显示了
  MongoDB Compass GUI。


  ![../images/475461_1_En_1_Chapter/475461_1_En_1_Fig5_HTML.jpg](img/475461_1_En_1_Fig5_HTML.jpg)


  图 1-5


  MongoDB Compass GUI


  ##### 步骤 2：启动 MongoDB 服务器


  打开命令提示符，导航到 MongoDB 安装文件夹，并执行以下命令以启动 MongoDB 服务器。


  ```

  mongod.exe

  ```


  你应该会看到一条消息，显示“Waiting for connection on port 27017.”


  ##### 注意


  MongoDB 的默认端口号是 `27017`。


  ##### 步骤 3：将 MongoDB Compass 连接到 MongoDB 服务器


