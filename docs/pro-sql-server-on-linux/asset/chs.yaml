  \ 的 systemd 服务。\n\n示例语法中用于 `yum` 的 `-y` 参数代表“assume yes”（假设为是），这意味着您自动要求 `yum` 对任何提示都回答“是”。对于我们的安装，唯一的提示是是否要继续下载。\n\
