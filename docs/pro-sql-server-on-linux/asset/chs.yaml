  ### 预写式日志


  当 SQL Server 需要修改缓冲池中数据页上的数据时，如果 SQL Server 必须等待每个数据库页的所有更改都写入磁盘（对于需要更改的 T-SQL 语句，例如
  `INSERT` 语句），性能将不是最优的。


  由于每个数据库都包含一个事务日志，如果 SQL Server 确保所有更改都写入事务日志文件，它就不必立即写入数据库页。此概念称为预写式日志（此概念也称为 WAL
  协议）。只要 SQL Server 确保已提交事务的所有修改都写入磁盘上的事务日志，即使 SQL Server 或 Linux 服务器意外终止，对数据库页的更改未写入磁盘，所有事务也将保持
  `一致性`。


  此架构允许修改数据的 T-SQL 语句以更改能被 `固化` 到事务日志的速度运行。这意味着对于依赖数据库修改性能的应用程序（例如 OLTP 密集型应用程序），将事务日志文件放置在极快的存储系统上非常重要。


  SQL Server 确实提供了一个名为 `延迟持久性` 的功能，它允许事务在完成时无需等待事务日志更改写入磁盘。然而，性能的代价是可能的数据丢失。你可以在我们的文档中阅读更多关于
  SQL Server 事务持久性选项的信息：[`docs.microsoft.com/sql/relational-databases/logs/control-transaction-durability`](https://docs.microsoft.com/sql/relational-databases/logs/control-transaction-durability)。


  事务日志写入由名为 `LOG WRITER` 的后台任务执行（你可以通过查找 `dm_exec_requests` 中 `command = LOG WRITER`
  的行来查看此后台任务）。出于可扩展性目的，我们在 SQL Server 2016 中进行了增强，使每个 NUMA 节点使用多个 `LOG WRITER` 任务。你可以在此博文中阅读更多关于此概念的信息：[`blogs.msdn.microsoft.com/bobsql/2016/06/03/sql-2016-it-just-runs-faster-multiple-log-writer-workers/`](https://blogs.msdn.microsoft.com/bobsql/2016/06/03/sql-2016-it-just-runs-faster-multiple-log-writer-workers/)。


  ###### 检查点、延迟写入和急切写入


  如果 SQL Server 从不将修改过的数据库页（也称为 `脏页`）写入磁盘上的数据库数据文件，事务日志将无限增长并需要大量磁盘空间。此外，如果 SQL Server
  数据库需要恢复，情况会...




  重启过程可能耗时极长，因为所有更改都必须从事务日志中重放。


  SQL Server 采用多种技术将数据库页面写入磁盘。所有这些技术都基于与预读类似的原理，即将连续的数据库页面一起写入，从而实现高效的大规模写入。


  默认情况下，SQL Server 2017 使用一种名为 `间接检查点` 的数据库页面写入方法。间接检查点使用 `目标恢复时间` 来决定何时收集脏页并将其写入相应的数据库数据文件。这一概念旨在可靠地确保：如果数据库必须重启，它可以在一个已知的时间间隔内完成恢复（事务前滚和回滚）。


  目标恢复时间可通过 `ALTER DATABASE` T-SQL 语句中的 `TARGET_RECOVERY_TIME` 选项进行配置。默认值为一分钟。SQL
  Server 还提供了一个 `自动检查点` 选项，这是 SQL Server 2016 之前版本的默认行为。自动检查点使用 `sp_configure` 选项
  `recovery interval`，可能导致 I/O 写入行为不平滑，可能出现峰值。


  间接检查点旨在产生更平滑的 I/O 写入模式，但可能对繁重的 OLTP 类型应用程序产生影响。间接检查点由名为 `RECOVERY WRITER` 的后台任务执行（您可以通过在
  `dm_exec_requests` 中查找 command = `RECOVERY WRITER` 的行来查看此后台任务）。


