  \    1>\n    ```\n\n    如果 SQL Server 未运行，并且您尝试使用 `sqlcmd` 连接，则会收到类似以下的错误：\n\n \
  \   ```\n    Sqlcmd: Error: Microsoft ODBC Driver 17 for SQL Server : Login timeout\
  \ expired.\n    Sqlcmd: Error: Microsoft ODBC Driver 17 for SQL Server : TCP Provider:\
  \ Error code 0x2749.\n    Sqlcmd: Error: Microsoft ODBC Driver 17 for SQL Server\
  \ : A network-related or instance-specific error has occurred while establishing\
  \ a connection to SQL Server. Server is not found or not accessible. Check if instance\
  \ name is correct and if SQL Server is configured to allow remote connections. For\
  \ more information see SQL Server Books Online..\n    ```\n\n我曾遇到客户犯的一个错误是，在执行 `yum\
  \ install` 后忘记运行带 `setup` 选项的 `mssql-conf` 命令。图 2-14 中的错误就是您在此场景下会看到的相同错误。\n\n既然您已成功连接，请运行以下两个“完整性检查”查询：\n\
  \n\n\n### 第 2 章：安装与配置\n\n## 执行查询\n\n执行以下命令来检查 SQL Server 版本：\n```sql\n1> select\
  \ @@version\n2> go\n```\n\n结果将取决于你安装的 SQL Server 版本以及使用的 Linux 发行版。以下是 SQL Server\
  \ 2017 累积更新 7 在 RHEL 7.5 上的结果示例：\n```\nMicrosoft SQL Server 2017 (RTM-CU7) (KB4229789)\
  \ - 14.0.3026.27 (X64)\nMay 10 2018 12:38:11\nCopyright (C) 2017 Microsoft Corporation\n\
  Enterprise Edition: Core-based Licensing (64-bit) on Linux (Red Hat Enterprise Linux)\n\
  (1 rows affected)\n```\n\n现在运行此查询以列出 SQL Server 上安装的数据库：\n```sql\n1> select name,\
  \ state_desc from sys.databases\n2> go\n```\n\n你的结果应类似如下：\n```\nname        state_desc\n\
  ----------- --------------------------------------------------------\nMaster   \
  \   ONLINE\nTempdb      ONLINE\nModel       ONLINE\nMsdb        ONLINE\n```\n\n\
  输入`\"exit\"`退出`sqlcmd`。\n\n###### 远程连接\n\n最后一个基础检查是远程连接到本地 Linux 服务器之外的 SQL Server。这涉及以下步骤：\n\
  \n1.  为 SQL Server 开放防火墙。\n    SQL Server 默认监听 TCP 端口 1433，来自其他客户端的网络流量很可能无法访问该端口。因此，在\
  \ Linux 服务器的防火墙上运行以下命令开放此端口。以下命令在 RHEL 服务器上开放防火墙。\n    ```bash\n    sudo firewall-cmd\
  \ --zone=public --add-port=1433/tcp --permanent\n    sudo firewall-cmd –-reload\n\
  \    ```\n\n2.  连接到 SQL Server。\n    你可以使用任何允许连接到 SQL Server 的有效工具。你可以从[`docs.microsoft.com/sql/tools/overview-sql-tools`](https://docs.microsoft.com/sql/tools/overview-sql-tools)获取完整工具列表。图\
  \ 2-9 展示了使用 Windows 版的`sqlcmd`通过 IP 地址成功连接到 Linux 上的 SQL Server。注意语法包含了端口 1433，因为直接使用了\
  \ IP 地址。\n    ```\n    sqlcmd –Usa -S10.0.0.0,1433\n    ```\n    ![](img/index-72_1.png)\n\
  \n**图 2-9.  到 Linux 上 SQL Server 的远程连接**\n\n## 更多验证 SQL Server 功能的方法\n\n我推荐你完成另外三项测试，以确保获得最佳的\
  \ SQL Server 体验：\n\n*   重启 SQL Server 服务。\n    使用`systemctl`命令重启 SQL Server 服务。\n\
  \    ```bash\n    sudo systemctl restart mssql-server\n    ```\n    此命令执行完成后不会提供任何信息，即使成功也是如此。我建议你在此重启后，按照本节前面的基础验证步骤进行检查。\n\
  \n*   重启 Linux 服务器。\n    我推荐的另一项验证步骤是重启你的 Linux 服务器，并执行我在前一节概述的基础验证步骤。这可以确保所有文件系统都已正确挂载，并且\
  \ SQL Server 可以在 Linux 服务器启动时成功启动。我遇到过这样的例子：客户添加了一个磁盘并在该磁盘上挂载了`/var/opt`文件系统，但没有在`/etc/fstab`文件中添加条目。重启后，文件系统未被挂载，因此\
  \ SQL Server 未能启动。\n\n*   还原数据库。\n    我推荐你测试的另一项能力是还原数据库并进行查询。正如我在本章前面提到的，Microsoft\
  \ 提供了一个用于测试还原的示例数据库，名为`WideWorldImporters`。\n\n要完成还原，请遵循以下步骤：\n\n1.  下载`WideWorldImporters`示例备份文件。\n\
  \    你可以从[`docs.microsoft.com/sql/sample/world-wide-importers/wide-world-importers-documentation`](https://docs.microsoft.com/sql/sample/world-wide-importers/wide-world-importers-documentation)下载示例数据库。如果你的\
  \ Linux 服务器连接到互联网，可以直接下载到服务器上，使用 bash shell 中的以下命令：\n    ```bash\n    wget https://github.com/Microsoft/sql-server-samples/releases/download/\n\
  \    ```\n\n\n\n"
