  ## 数据库内存统计信息


  关于其描述，您可以参考我们文档中的此部分：[`docs.microsoft.com/sql/relational-databases/performance-monitor/use-sql-server-objects`](https://docs.microsoft.com/sql/relational-databases/performance-monitor/use-sql-server-objects)。


  让我在我的 Linux 服务器上展示结果，这样您可以在自己的系统上进行观察。图 6-5 显示了运行此 T-SQL 批处理的结果。


  *图 6-5. 检查 SQL Server 内存统计信息*


  **数据库缓存内存（KB）** 是缓冲池使用的内存量。在此服务器启动时，它仅约为 18MB。


  **目标服务器内存（KB）** 是 SQL Server 可以增长到的潜在内存量。可以将其视为 SQL Server 引擎内使用内存的上限。在此示例中，它约为
  6.2GB。


  **总服务器内存（KB）** 是 SQL Server 引擎内使用的内存量，约为 174MB。


  那么，为什么`top`命令显示`sqlservr`进程占用了 500 多 MB 呢？这是因为总服务器内存（KB）与`top`显示的值之间的差异，是`sqlservr`进程在
  Linux 上分配的一个相当固定量的内存，与 SQL Server 引擎的内存消费者（如缓冲池，包括 SQLPAL）无关。随着 SQL Server 分配内存量的增长，这个差异应保持相当恒定。


  现在，我们继续展示一个 SQL Server 如何通过缓冲池动态增长其内存使用的快速示例：

  *   使用示例脚本 `restorewwi.sh` 还原完整的 WideWorldImporters 示例数据库。

  *   运行以下 T-SQL 命令，这将强制 SQL Server 将 WideWorldImporters 数据库中的所有数据库页面读入缓冲池：

  ```

  USE master

  GO

  DBCC CHECKDB(WideWorldImporters) WITH TABLOCK

  GO

  ```

  *   运行与之前相同的 `top` 命令和前面的 T-SQL 查询，以查看 `dm_os_performance_counters`。


  在我的 Linux 服务器上，`top` 命令显示 SQL Server 的内存增加到约 1.3GB（查看 RES 列）。数据库缓存内存（KB）增加到约 430MB，总服务器内存（KB）增加到约
  720MB，目标服务器内存（KB）略有增加。这些增长与 WideWorldImporters 数据库大约拥有 400MB 数据库页面的事实相符。


  ##### 高效的 I/O 处理


  SQL Server 使用高效的方法读写数据库页面和事务日志记录，以最大化性能并确保持久性和一致性。这包括预读、预写日志记录、检查点处理和数据压缩。


  此外，由于 SQL Server 有自己的缓存机制，引擎在 Linux 上打开数据库和事务日志文件时，通过启用 `O_DIRECT` 标志来使用直接 I/O，以绕过文件系统缓存。您可以在
  [`man7.org/linux/man-pages/man2/open.2.html`](http://man7.org/linux/man-pages/man2/open.2.html)
  阅读更多关于 `O_DIRECT` 的信息。


  ###### 预读


  每个数据库页面大小为 8KB。如果 SQL Server 每次需要从磁盘读取数据时都尝试只读取单个数据库页面，效率会很低。相反，SQL Server 使用一种称为预读的机制将数据库页面拉入缓冲池。其思路是当前执行的查询很可能需要这些页面，因此将它们拉入缓存会更高效，因为较大的读取大小比较大量的较小读取更高效。SQL
  Server 中使用预读的场景是从表或索引中扫描跨越多个页面的若干行时。如何判断 SQL Server 是否正在使用预读来读取数据库页面？有几种方法：




  - 在执行页面读取查询的会话中使用 `SET STATISTICS IO` T-SQL 语句。

  - 使用扩展事件来跟踪 `file_read_completed` 事件。


  你还可以使用 DMV `dm_os_performance_counters` 查看 SQL Server 中预读的整体使用情况，使用 object_name
  = `''SQLServer:Buffer Manager''` 和 counter_name = `''Readahead pages/sec''`。


  SQL Server 只能从数据库文件中读取连续的多个页面，因此预读的大小可能因表或索引中的页面组织方式而异。因此，如果表或聚集索引存在碎片，导致许多包含数据的页面在数据库文件中不连续，预读的效果就会降低。我将在第
  9. T 章讨论索引碎片及其管理方法。预读操作存在一些限制。SQL Server 2017 企业版中预读的最大大小为 1MB。在 SQL Server 的其他版本中，此数值会更低。


  ## 第 6 章 性能功能


  SQL Server 在为缓冲池中尚未存在的页面执行预读时，会尝试异步读取的页面数量也有限制。此最大值在企业版 (5,000) 中比其他版本 (128) 更大。


  以下是一个示例，展示 SQL Server 如何对典型的表数据扫描使用预读。此示例假定你已还原完整的 WideWorldImporters 数据库：


  1.  使用以下 T-SQL 语句集创建并启动一个扩展事件会话。这些语句可在示例脚本 `tracesqlreads.sql` 中找到：


  ```

  CREATE EVENT SESSION [tracesqlreads] ON SERVER

  ADD EVENT sqlserver.file_read_completed(SET collect_path=(1)

  ACTION(sqlserver.database_name,sqlserver.sql_text)

  WHERE ([sqlserver].[database_name]=N''WideWorldImporters''))

  ADD TARGET package0.event_file(SET filename=N''tracesqlreads'')

  WITH (MAX_MEMORY=4096 KB,EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,MAX_DISPATCH_LATENCY=30
  SECONDS,MAX_EVENT_SIZE=0 KB,MEMORY_PARTITION_MODE=NONE,TRACK_CAUSALITY=OFF,STARTUP_STATE=OFF)

  GO


  ALTER EVENT SESSION [tracesqlreads] ON SERVER STATE=START

  GO

