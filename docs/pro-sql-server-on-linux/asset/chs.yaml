- "# 第三章：构建数据库与 T-SQL 基础\n\n在表中，为确保 `LastEditedBy` 列中的任何数据都是有效的 `PersonID`，您可以在表创建后通过修改表来声明外键约束（也可以在创建表时完成）。请查看表定义语句集中的以下语句。（不要执行此操作。我在此展示，以便您能看到约束的详细信息。）\n\
  \n```sql\nALTER TABLE [Application].[People] WITH CHECK ADD CONSTRAINT [FK_Application_People_Application_People]\
  \ FOREIGN KEY([LastEditedBy])\nREFERENCES [Application].[People] ([PersonID])\n\
  ```\n\n解析这条语句，该约束确保 `LastEditedBy` 列中的值始终引用 `People` 表中 `PersonID` 列的行。开头的 `WITH\
  \ CHECK` 选项使语句能够针对该约束验证表中所有现有数据。\n\n另一种约束类型可以是列的*默认值*，用于在插入新行未指定值时使用。默认值可以是任何声明的值，这样当您插入一行时，如果没有指定值，就会使用默认值。请记住，`PersonID`\
  \ 是主键列，这意味着每个值必须是唯一的。`PersonID` 的目的是作为一个没有逻辑含义的键值，用于引用代表一个人的每一行。`PersonID` 将成为在\
  \ `People` 表中物理标识每个人的方式，而无需使用列的组合（如 `FullName`+...）。\n\n现在，我可以使用上一节创建的序列对象来创建一个约束，该约束将为插入到\
  \ `People` 表中的每一行的 `PersonID` 列递增到下一个 `SEQUENCE` 值。使用 `DEFAULT` 关键字允许我将行插入到 `People`\
  \ 表中，每个新的 `PersonID` 将默认由序列对象填充。上一脚本中用于为默认值创建约束的 `ALTER TABLE` 语句如下所示：\n\n```sql\n\
  ALTER TABLE [Application].[People] ADD CONSTRAINT [DF_Application_People_PersonID]\
  \  DEFAULT (NEXT VALUE FOR [Sequences].[PersonID]) FOR [PersonID]\n```\n\n`NEXT\
  \ VALUE FOR` 关键字是标准的 T-SQL 语法，表示任何新行的 `PersonID` 列的默认值将使用序列对象的下一个值（例如，1,2,3...）。\n\
