  \n**执行存储过程**\n\n你可以通过设置一个带有完整 T-SQL `“EXEC <过程名>”` 语法的请求，使用相同的 `execSql()` 方法来执行存储过程。但是，更高效的调用存储过程的方式是通过\
  \ TDS 协议定义的远程过程调用 (RPC) 方法。Tedious 驱动程序通过一个名为 `callProcedure()` 的方法支持这种方式。\n\n使用上一章中的示例\
  \ T-SQL 存储过程 `InsertCustomer`（请记住，在本章开头我指示你执行了 `insertcustomerproc.sql` 脚本），以下是将此过程作为\
  \ RPC 执行的 Node.js 代码。你可以在示例文件 `execinsertcustomer.js` 中找到此代码，其内容如下：\n\n```javascript\n\
  var Connection = require('tedious').Connection;\nvar Request = require('tedious').Request;\n\
  var TYPES = require('tedious').TYPES;\n\n// 创建到数据库的连接\nvar config = {\n    userName:\
  \ 'sqllinux',\n    password: 'Sql2017isfast',\n    server: 'bwsql2017rhel',\n  \
  \  options: {\n        database: 'WideWorldImporters'\n    }\n};\n```\n\n\n# 第四章\
  \ 构建应用程序与高级 T-SQL\n\n```\nconsole.log(\"Connecting to SQL Server\");\n\nvar connection\
  \ = new Connection(config);\n\nconnection.on('connect', function(err) {\n\n// If\
  \ no error, then good to proceed.\n\nconsole.log(\"Connected to SQL Server Successfully\"\
  );\n\nInsertCustomer();\n\n});\n\nfunction InsertCustomer() {\n\nrequest = new Request(\"\
  [Sales].[InsertCustomer]\", function(err) {\n\nif (err) {\n\nconsole.log(err);}\n\
  \nelse\n\nconsole.log('Inserted new Customer');\n\n}\n\n);\n\nrequest.addParameter('PrimaryContactID',\
  \ TYPES.Int, 1);\n\nrequest.addParameter('AlternateContactID', TYPES.Int, 1);\n\n\
  request.on('requestCompleted', ()=>{connection.close();});\n\nconnection.callProcedure(request);\n\
  \n}\n```\n\n要运行此代码，我执行了这条命令：\n`node .\\execinsertcustomer.js`\n\n在 VS Code 的集成终端或你的命令行\
  \ shell 中，结果应如下所示：\n```\nPS C:\\wwi> node .\\execinsertcustomer.js\nConnecting to\
  \ SQL Server\nConnected to SQL Server Successfully\nInserted new Customer\n```\n\
  \n关闭连接的方法使用了 Node.js 应用程序常见的事件编程模型。这行代码会在请求完成时（即查询完成时）关闭连接。\n```\nrequest.on('requestCompleted',\
  \ ()=>{connection.close();});\n```\n\n##### 增强你的应用程序\n\n我只介绍了一些使用 Node.js 和 Tedious\
  \ 连接 SQL Server 并运行查询（包括存储过程）的基本方法。当你构建一个生产级应用程序时，你可能需要增强它，以利用 Node.js 的其他方法。\n\n\
  以下是我的一些建议供你考虑：\n\n*   一种处理频繁打开和关闭连接的更高效方法是称为*连接池*的概念。连接池在 SQL Server 应用程序中非常常见，Tedious\
  \ 通过另一个对象支持此功能：[tediousjs/tedious-connection-pool](https://github.com/tediousjs/tedious-connection-pool)。\n\
  *   你可能希望控制登录和/或查询的超时时间（等待登录或查询的时间长度）。`Connection` 对象在配置中提供了选项来控制这些超时。两者的默认值都是 15\
  \ 秒。你可能还希望有能力手动取消已提交给 SQL Server 的查询，`Connection` 对象通过 `connection.cancel()` 支持这一点。\n\
  *   还有其他许多与 `Connection` 对象相关的选项你可能想使用，例如加密、IP 地址和端口号、可用性组的读取意图（我将在第 8 章稍后讨论）等等。它们都在\
  \ [`tediousjs.github.io/tedious/api-connection.html#function_newConnection`](http://tediousjs.github.io/tedious/api-connection.html#function_newConnection)\
  \ 的 `Connection` 对象文档中有详细说明。\n*   你的应用程序应准备好根据查询和/或存储过程的执行来处理某些事件。请参阅处理 `Request`\
  \ 对象的 `doneProc` 和 `doneInProc` 事件的文档：[`tediousjs.github.io/tedious/api-request.html`](http://tediousjs.github.io/tedious/api-request.html)。\n\
  *   此外，SQL Server 可能为任何查询执行返回错误信息和提示信息。请务必使用 `Connection` 对象的 `infoMessage` 和 `errorMessage`\
  \ 事件来处理它们。详情请参见 `Connection` 对象文档：[`tediousjs.github.io/tedious/api-connection.html`](http://tediousjs.github.io/tedious/api-connection.html)。\n\
  *   虽然你可以在应用程序的批处理中使用 T-SQL `BEGIN TRANSACTION` 命令，但 Tedious 驱动也提供了用于事务的接口。请参阅相关文档了解更多信息。\n\
  \n\n\n详情请参考 [`tediousjs.github.io/tedious/api-connection.`](http://tediousjs.github.io/tedious/api-connection.html#function_beginTransaction)\n\
  \n[html#function_beginTransaction.](http://tediousjs.github.io/tedious/api-connection.html#function_beginTransaction)\n\
  \n# 深入探索 T-SQL\n\n在上一章和那个 Node.js 应用程序中，我向你展示了如何在 Linux 上的 SQL Server 中执行用于创建数据库、表、键、约束以及执行\
  \ CRUD（创建、读取、更新、删除）操作的基本查询。\n\n> **注意：** 如果你到此为止还没听腻我的唠叨，那么需要强调的是，整套 T-SQL 示例和脚本可以无需修改地在\
  \ Windows 和 Linux 上的 SQL Server 中运行，因为核心的 SQL Server 引擎在两种平台上是相同的。\n\n我在构思本书时就决定，它不能成为\
  \ SQL Server 和 T-SQL 的完整指南。仅这一项就可能需要好几本书（而且市面上确实有好几本）。相反，我希望为 SQL Server 的新用户提供足够的信息，让他们能在\
  \ Linux 上快速启动并运行，构建一些能力，并了解还有哪些其他选项可以进一步深入。\n\n在本节中，我想简要谈谈 T-SQL 语言和核心数据库引擎中的其他特性，这些可以增强你的应用程序以及使用\
  \ SQL Server 的体验。\n\n##### 创建和使用临时对象\n\n可能会遇到这样的情况：你想为每个用户创建一个唯一的临时数据空间，而不将数据存储在你的数据库中，也不必设计一个需要跟踪每个用户数据的方案。\n\
  \n# 第四章   构建应用程序与高级 T-SQL\n\nSQL Server 通过一个称为 *临时表* 的概念（也通过 *表变量*）提供了这种能力。所有临时对象都存储在一个名为\
  \ `tempdb` 的特殊系统数据库中。这里的关键词是“临时”。`tempdb` 在每次 SQL Server 启动时都会重建。因此，尽管你可以将用户表存储在这个数据库中，但我不推荐这样做。\n\
  \n###### 临时表与表变量\n\n临时表和表变量具有作用域这一独特属性。当你创建这些对象时，它们会在存储过程完成或用户登录会话断开时自动销毁。\n\n示例是向你展示如何操作的最佳方式。让我们以本章前面创建的\
  \ `InsertCustomers` 存储过程为例，向你展示临时表和表变量的用法。假设你想引入数据集来计算新客户的 `StandardDiscountPercentage`\
  \ 或 `PaymentDays` 列。根据数据的不同，有几种方法可以做到这一点。你可以从存在这些值的源表中查询数据，并将其插入到临时表中。然后在存储过程中使用该临时表来填充这些值。\n\
  \n下面是一个可能的示例。这里假设有一个名为 `CustomerRates` 的源表，它有 `StandardDiscountPercentage`、`PaymentDays`\
  \ 和 `CustomerRegion` 列。另外，有一个区域参数传入该过程，以查找新客户的正确数据。你可以在示例脚本 **`insertcustomerproctemptable.sql`**\
  \ 中找到示例 T-SQL 语句：\n\n```sql\nUSE [WideWorldImporters]\nGO\n\nDROP TABLE IF EXISTS\
  \ CustomerRates\nGO\n\nCREATE TABLE CustomerRates\n(CustomerRegion NVARCHAR(30),\n\
  \ StandardDiscountPercentage decimal,\n PaymentDays INT\n)\n\nINSERT INTO CustomerRates\
  \ VALUES ('Texas', 10.0, 30)\nGO\n\nDROP PROCEDURE IF EXISTS [Sales].[InsertCustomer]\n\
  GO\n\nCREATE PROCEDURE [Sales].[InsertCustomer]\n    @PrimaryContactID INT, @AlternateContactID\
  \ INT, @CustomerRegion NVARCHAR(30)\nAS\n-- 声明局部变量\n--\nDECLARE @StandardDiscountPercentage\
  \ DECIMAL(18,3)\nDECLARE @PaymentDays INT\n\n-- 查找已知的 PersonID = 0 的正常编辑者\n--\n\
  DECLARE @EditedBy INT\nSELECT @EditedBy = PersonID FROM [Application].[People]\n\
  WHERE PersonID = 0\n\n-- 创建一个临时表来存储客户付款信息的结果\n--\nCREATE TABLE #CustomerPayment\n\
  (StandardDiscountPercentage DECIMAL NOT NULL,\n```\n\n\n### 第 4 章：构建应用程序与高级 T-SQL\n\
  \n## 使用临时表\n\n```sql\nPaymentDays INT NOT NULL\n)\n\nINSERT INTO #CustomerPayment\
  \ SELECT StandardDiscountPercentage, PaymentDays\nFROM CustomerRates\nWHERE CustomerRegion\
  \ = @CustomerRegion\n\nSELECT @StandardDiscountPercentage = StandardDiscountPercentage,\n\
  @PaymentDays = PaymentDays FROM #CustomerPayment\n\n-- INSERT into Customers\n--\
  \ Primary and Alternate Contacts are passed in as parameters\nDECLARE @CustomerID\
  \ INT\nSET @CustomerID = NEXT VALUE for [Sequences].[CustomerID]\n\nINSERT INTO\
  \ [Sales].[Customers]\n([CustomerID], [CustomerName], [BillToCustomerID], [CustomerCategoryID],\n\
  [PrimaryContactPersonID],\n[AlternateContactPersonID], [DeliveryMethodID], [DeliveryCityID],\n\
  [PostalCityID],\n[AccountOpenedDate], [StandardDiscountPercentage], [IsStatementSent],\n\
  [IsOnCreditHold],\n[PaymentDays], [PhoneNumber], [FaxNumber], [WebsiteURL],\n[DeliveryAddressLine1],\n\
  [DeliveryPostalCode], [PostalAddressLine1], [PostalPostalCode],\n[LastEditedBy])\n\
  VALUES (@CustomerID, 'WeLoveSQLOnLinuxToo', @CustomerID, 1,\n@PrimaryContactID,\
  \ @AlternateContactID, 1, 1, 1, getdate(),\n@StandardDiscountPercentage, 0, 0, @PaymentDays,\n\
  '817-111-1111', '817-222-2222', 'www.welovesqlonlinux.com', 'Texas',\n'76182', 'Texas',\
  \ '76182', @EditedBy)\nGO\n```\n\n我创建了这个存储过程来插入一个新客户，因此这个示例即使执行本章前面示例中的脚本也能正常工作。\n\
  \n我现在可以使用以下 T-SQL 语句执行此过程，这些语句也包含在示例脚本 `execinsertcustomertemp.sql` 中：\n\n```sql\n\
  USE [WideWorldImporters]\nGO\nEXEC [Sales].InsertCustomer 1, 2, 'Texas'\nGO\n```\n\
  \n可能有更高效的方法来演示此示例的业务逻辑，但这是向您展示如何创建和使用临时表的一种便捷方式。在此示例中，当过程完成时，临时表 `#CustomerPayment`\
  \ 会被销毁。\n\n**注意：** 出于性能优化考虑，SQL Server 默认使用一种称为临时表缓存的技术，但有一些限制。请参阅关于此主题的这篇精彩博客文章：[`sqlperformance.com/2017/05/sql-performance/sql-server-temporary-object-caching`](https://sqlperformance.com/2017/05/sql-performance/sql-server-temporary-object-caching)。\n\
  \n请注意前面示例中使用了 `INSERT..SELECT` 语法在单条语句中插入多行。另一种填充临时表（也可用于用户表）的方法是 `SELECT..INTO`\
  \ 语法。在该示例中，您本可以改用以下语法。`SELECT..INTO` 将根据源表的列定义创建目标表，因此无需使用 `CREATE TABLE`。\n\n```sql\n\
  SELECT StandardDiscountPercentage, PaymentDays INTO #CustomerRates\nFROM CustomerRates\n\
  WHERE CustomerRegion = @CustomerRegion\n```\n\n对于同一个示例，您也可以使用表变量。包含表变量的存储过程片段如下所示：\n\
  \n```sql\nDECLARE @CustomerRates table(\nStandardDiscountPercentage [DECIMAL] (18,3)\
  \ NOT NULL,\nPaymentDays INT NOT NULL\n);\n\nINSERT INTO @CustomerRates SELECT StandardDiscountPercentage,\
  \ PaymentDays\nFROM CustomerRates\nWHERE CustomerRegion = @CustomerRegion\n```\n\
  \n表变量和临时表各有其优缺点。您必须使用表变量来启用一项称为 *表值参数* 的功能。一般来说，表变量在处理小型数据集时表现良好，但在处理较大型数据集时，您应该使用临时表。\n\
  \n请记住，对于您试图在存储过程或批处理中构建的逻辑，您甚至可能根本不需要临时表。许多用户并发使用临时对象会涉及性能考量，我将在第 6 章中进一步讨论这一点。\n\
  \n###### 其他临时对象\n\nSQL Server 提供了创建*临时存储过程*的功能，这些过程...\n\n\n# 第四章   构建应用程序与高级 T-SQL\n\
  \n## tempdb 的内部使用\n\n其作用域和生命周期仅限于一个 SQL Server 会话期间。创建语法与存储过程相同，但有一个不同点：过程名前需使用\
  \ `#` 符号，如下面的 T-SQL 示例所示（我在示例脚本 `tempproc.sql` 中提供了此代码）：\n\n```sql\nCREATE PROCEDURE\
  \ #tempproc\nAS\nSELECT @@VERSION\nGO\n```\n\n执行该过程就像执行任何存储过程一样，只需使用 `#tempproc`\
  \ 名称。与临时表类似，多个用户可以同时创建同名的临时存储过程，因为每个用户都会根据自己的会话拥有该过程的一个私有版本。与临时表一样，临时存储过程的定义也保存在\
  \ `tempdb` 数据库中。使用临时存储过程有一些原因，例如在将其存储到用户数据库之前测试一个新过程，或在长 T-SQL 脚本中用于执行某项任务。\n\n\
  另一种类型的临时对象是全局临时表或存储过程。全局临时表的定义语法与临时表相同，只是名称前多了一个 `#` 字符，如下例所示：\n\n```sql\nCREATE\
  \ TABLE ##globaltemp\n(col1 INT, col2 INT)\nGO\n```\n\n因为是全局的，所以同一时间只能存在一个给定名称的全局临时表，其作用域跨越所有活动用户会话。全局临时表存储在\
  \ `tempdb` 中，但当所有引用过该全局临时表的用户断开连接后，它会自动被销毁。\n\n也可以创建全局临时存储过程。它们在作用域、可见性和生命周期方面具有与全局临时表相同的特性。\n\
  \n当我讲授关于 `tempdb` 的主题时，我常称它为 SQL Server 的“垃圾场”。我知道这个词有负面含义，但这就是 SQL Server 使用 `tempdb`\
  \ 的现实情况。我在本节到目前为止介绍的是 `tempdb` 中的*用户对象*。换句话说，用户决定创建多少对象以及它们消耗多少空间。\n\nSQL Server\
  \ 还有其他功能，需要将数据页存储在 `tempdb` 中，超出正常的用户表范围。这些功能包括用于版本控制的存储、哈希和排序操作溢出时的临时存储，以及工作表。你通常无需担心这些，因为它们是在\
  \ SQL Server 引擎内部实现的。但现实情况是，它们可能会影响你的应用程序，尤其是在正确设置 `tempdb` 大小时（或者更重要的是，影响查询的性能）。\n\
  \nSQL Server 提供了通过动态管理视图（DMV）在文件、会话甚至任务（查询）级别检查 `tempdb` 用户空间和内部空间使用情况的机制，这将在第 5\
  \ 章中讨论。如果你想深入研究 `tempdb` 这个主题，可以在 YouTube 上收听几年前我在一次大型 SQL Server 用户大会上所做的深入讲解，网址是\
  \ `https://youtu.be/SvseGMobe2w`。\n\n##### 触发器\n\n触发器是一种特殊类型的存储过程，当数据库服务器中发生事件时会自动执行。DML\
  \ 触发器在用户尝试通过数据操作语言（DML）事件（如 `INSERT`、`UPDATE` 或 `DELETE` 语句）修改数据时执行。\n\n许多年前，在 SQL\
  \ Server 支持声明性外键约束之前，触发器是强制引用完整性的推荐方法。你可以考虑在以下情况使用触发器：当表中的数据被修改时，你希望执行某种类型的操作，但你可能无法完全控制其他可能修改该表的查询。你可能构建了存储过程来封装对表的所有\
  \ CRUD 操作，但如果你想确保其他未使用你过程的用户也能执行某些操作，触发器可能是一个很好的解决方案。\n\n还有其他类型的触发器。你可以在我们的\n\n\n\
  \n# 第四章 构建应用程序与高级 T-SQL\n\n##### 分析查询\n\n我之前提供的 `SELECT` 语句示例非常简单，包括连接表以及使用 `WHERE`\
  \ 子句来过滤结果。\n\n在许多分析类型的工作负载中，需要对结果进行聚合或排序。与其他流行的数据库引擎一样，SQL Server 提供了 T-SQL 语法，用于通过\
  \ `GROUP BY` 对行进行分组，并使用 `ORDER BY` 确保结果按特定顺序排列。\n\nSQL Server 还提供了丰富的函数来执行聚合操作，包括聚合函数（例如\
  \ `SUM`）和分析函数。你可以在 [`docs.microsoft.com/sql/t-sql/functions/aggregate-functions-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/aggregate-functions-transact-sql)\
  \ 和 [`docs.microsoft.com/sql/t-sql/functions/analytic-functions-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/analytic-functions-transact-sql)\
  \ 阅读更多关于这些函数的信息。\n\n通过使用一个称为 *窗口函数* 的概念，你可以实现更高级的功能，并在复杂的聚合查询上获得出色的性能。请查看 [`docs.microsoft.com/sql/t-sql/queries/select-over-clause-transact-sql`](https://docs.microsoft.com/sql/t-sql/queries/select-over-clause-transact-sql)\
  \ 的文档和示例。\n\n我将在第六章描述列存储索引等功能时，向你展示一些分析查询的示例。\n\n##### 复杂数据类型\n\n在前一章展示的示例表中，我只使用了一些最常见的数据类型，包括整数、字符、`bit`\
  \ 和 `datetime` 值。以下是我们参考用的 `People` 表定义，供你阅读本节和本章其余部分时参考（此定义仅供参考，并非用于执行）。如果你运行过示例脚本，`People`\
  \ 表应该已存在于你的数据库中：\n\n```sql\nCREATE TABLE [Application].People NOT NULL,\n    [PreferredName]\
  \ nvarchar NOT NULL,\n    --      [SearchName]  AS (concat([PreferredName],N' ',[FullName]))\n\
  \        PERSISTED NOT NULL,\n    [IsPermittedToLogon] [bit] NOT NULL,\n    [LogonName]\
  \ nvarchar NULL,\n    [IsExternalLogonProvider] [bit] NOT NULL,\n    [HashedPassword]\
  \ varbinary NULL,\n    [IsSystemUser] [bit] NOT NULL,\n    [IsEmployee] [bit] NOT\
  \ NULL,\n    [IsSalesperson] [bit] NOT NULL,\n    [UserPreferences] nvarchar NULL,\n\
  \    [PhoneNumber] nvarchar NULL,\n    [FaxNumber] nvarchar NULL,\n    [EmailAddress]\
  \ nvarchar NULL,\n    [Photo] varbinary NULL,\n    [CustomFields] nvarchar NULL,\n\
  \    --      [OtherLanguages]  AS (json_query([CustomFields],\n    --          N'$.OtherLanguages')),\n\
  \    [LastEditedBy] [int] NOT NULL,\n    --      [ValidFrom] datetime2 GENERATED\
  \ ALWAYS AS ROW START NOT NULL,\n    --      [ValidTo] datetime2 GENERATED ALWAYS\
  \ AS ROW END NOT NULL\n    CONSTRAINT [PK_Application_People] PRIMARY KEY CLUSTERED\n\
  \    (\n        [PersonID] ASC\n    )\n)\n```\n\n除了这些，SQL Server 还提供了丰富的数据类型，包括\
  \ `numeric`、`bigint`、`unicode`、`money`、`binary`、`special`、`variant`、`XML` 和 `table`（这是一种特殊类型，可与表值参数一起使用。有关更多信息，请参阅我们文档中的\
  \ [`docs.microsoft.com/sql/relational-databases/tables/use-table-valued-parameters-database-engine`](https://docs.microsoft.com/sql/relational-databases/tables/use-table-valued-parameters-database-engine)）。\n\
  \n\n\n### 第 4 章：构建应用程序与高级 T-SQL\n\n## 二进制数据类型\n\n本章的表示例中展示了一个关于二进制数据类型的特殊语法：\n\n\
  ```sql\n[Photo] varbinary NULL,\n```\n\n请注意 `varbinary` 数据类型后的 `(max)` 语法，在通常显示长度的位置上，这里使用了它。SQL\
  \ Server 中一行（或一列）的正常最大大小是 8000 字节，但存在一种机制可以存储大于此值的数据（最大值实际上是 `2³¹-1` 字节）。这被称为 `TEXT/IMAGE`\
  \ 数据，其存储机制与常规行不同（使用与行存储页面分离的一组数据库页面）。这些类型的旧式数据类型名称是 `text`、`image` 和 `ntext`。但你应该对\
  \ `varchar`、`nvarchar` 和 `varbinary` 使用现代语法的 `(max)` 规范。\n\n## 计算列\n\n在第 3 章的**创建表**一节中，我对示例表中的一些列定义进行了注释，其中之一就是这个列：\n\
  \n```sql\n[SearchName]  AS (concat([PreferredName],N' ',[FullName])) PERSISTED NOT\
  \ NULL,\n```\n\n这是一个*计算列*的例子。计算列是一个基于表中其他列的表达式，可以通过列名后的 `AS` 语法识别。通常，计算列会在你用 `SELECT`\
  \ 语句查询该列时进行计算。但如果你使用 `PERSISTED` 关键字，SQL Server 会在插入或更新行时，从引用的列计算并存储该表达式的结果。计算列在某种程度上是一种*服务器端编程*的形式，因为你是基于存储在表中的其他数据来创建数据。计算列使得以声明方式提供此类编程变得更加容易，而无需编写单独的存储过程或触发器代码。\n\
  \n##### 字符串函数\n\n应用程序开发人员经常需要对字符数据执行字符串操作。SQL Server 提供了一套丰富的 T-SQL 函数来查找和操作字符串数据，这对于增强存储过程代码非常有用。在\
  \ `People` 表的计算列示例中使用的 `CONCAT` 操作就是一个 T-SQL 字符串函数的例子。其他函数还包括拆分 (`STRING_SPLIT`)、聚合\
  \ (`STRING_AGG`)、查找子字符串 (`SUBSTRING`)、格式化 (`FORMAT`) 以及修剪 (`LTRIM` 和 `RTRIM`)。\n\
  \n##### 其他 T-SQL 命令\n\n多年来，T-SQL 语言已变得非常强大，具备了超越标准 CRUD 操作的丰富能力。虽然我将在下一节回顾一些令人兴奋的近期新特性，但我鼓励你探索完整的\
  \ T-SQL 参考文档。作为一名开发人员，可能还有其他命令或特性，将对你构建丰富的数据驱动应用程序的旅程有所帮助。完整参考，请参阅我们的文档：[`docs.microsoft.com/sql/t-sql/language-reference`](https://docs.microsoft.com/sql/t-sql/language-reference)。\n\
  \n## 探索 SQL Server 的新能力\n\n多年来，SQL Server 已成为行业中占主导地位的关系数据库引擎，而如今在微软，我们视 SQL Server\
  \ 为一个*现代数据平台*。这是因为我们已经将其能力扩展到了典型关系数据库引擎的标准功能之外。\n\n在本章的最后一节，我将向你展示在 SQL Server 2016\
  \ 和 2017 版本中引入产品的一些新特性。\n\n##### JSON\n\n在 SQL Server 2008 中，我们引入了一个新的 `XML` 数据类型，用于将原生\
  \ XML 数据存储到表列中，并提供了操作非结构化或半结构化数据的运算符。\n\n在 SQL Server 2016 中，我们认识到 JSON 作为一种文本格式在\
  \ Web 应用程序和 NoSQL 数据库系统中的广泛流行。\n\nSQL Server 2016 和 2017 并没有创建像 `XML` 那样的单独类型，而是提供了\
  \ T-SQL 语言命令来操作存储在字符型 SQL Server 列中的 JSON 格式数据。\n\n例如，看一下 `People` 表以及我注释掉的一个列。\n\
  \n\n\n\n# SQL Server JSON 支持与临时表\n\nSQL Server 对 JSON 的支持包括一个 **JSON_QUERY**() T-SQL\
  \ 函数，用于从 JSON 字符串中提取对象或数组。在此示例中，对象是从 `CustomFields` 列（定义为 `nvarchar(max)`，但数据格式为\
  \ JSON）中提取的 `OtherLanguages`。\n\n```\nAS (json_query([CustomFields],N'$.OtherLanguages'))\n\
  ```\n\nSQL Server 对 JSON 的支持还包括 **OPENJSON**() T-SQL 函数，用于将 JSON 格式的数据转换为行和列。此外，我们还为\
  \ T-SQL `SELECT` 语句提供了一个名为 **FOR JSON** 的新扩展，它将获取标准的行列数据集，并以 JSON 格式返回结果。其他 JSON\
  \ T-SQL 函数在我们的文档中有描述：[`docs.microsoft.com/sql/t-sql/functions/json-functions-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/json-functions-transact-sql)。\n\
  \n有关 SQL Server 处理 JSON 数据的所有功能的完整列表，请参阅我们的文档：[`docs.microsoft.com/sql/relational-databases/json/`](https://docs.microsoft.com/sql/relational-databases/json/)。\n\
  \n## 临时表\n\n对于某些开发人员和数据专业人员来说，一个常见的场景是在表中存储行变更的 *版本* 历史记录（这是触发器的另一种可能用途）。从 SQL Server\
  \ 2016 开始，引入了一项名为 *临时表* 的新功能来解决在表中存储变更历史的问题，并提供了内置的、易于使用的方法来检索过去某个时间点的行版本。\n\n**第\
  \ 4 章 构建应用程序与高级 T-SQL**\n\n查看此功能实际应用的一个方法是通过示例。还记得我在 `People` 和 `Customer` 表中注释掉的这两列吗？\n\
  \n```\n[ValidFrom] datetime2 GENERATED ALWAYS AS ROW START NOT NULL,\n[ValidTo]\
  \ datetime2 GENERATED ALWAYS AS ROW END NOT NULL\n```\n\n当你结合这些列的定义并向表定义添加其他语法时，你就定义了一个临时表。我将创建一个新的\
  \ `People` 表定义来展示此功能，以免破坏之前章节示例中现有的表定义。\n\n以下是包含完整临时语法的新 `People` 表定义，包括对应的表（称为\
  \ *历史* 表）。你可以在示例脚本 **`createtemporaltable.sql`** 中找到这些 T-SQL 命令：\n\n```sql\nUSE\
  \ [WideWorldImporters]\nGO\n\n-- 如果已经创建了表，我们需要先关闭系统版本控制\n--\nIF EXISTS (SELECT *\
  \ FROM sys.objects where name = 'NewPeople')\nALTER TABLE [Application].[NewPeople]\
  \ SET (SYSTEM_VERSIONING = OFF)\nGO\n\n-- 如果存在则删除归档表\n--\nDROP TABLE IF EXISTS [Application].[NewPeople_Archive]\n\
  GO\nDROP TABLE IF EXISTS [Application].[NewPeople]\nGO\n\nCREATE TABLE [Application].NewPeople\
  \ NOT NULL,\n    [PreferredName] nvarchar NOT NULL,\n    [SearchName]  AS (concat([PreferredName],N'\
  \ ',[FullName])) PERSISTED NOT NULL,\n    [IsPermittedToLogon] [bit] NOT NULL,\n\
  \    [LogonName] nvarchar NULL,\n    [IsExternalLogonProvider] [bit] NOT NULL,\n\
  \    [HashedPassword] varbinary NULL,\n    [IsSystemUser] [bit] NOT NULL,\n    [IsEmployee]\
  \ [bit] NOT NULL,\n    [IsSalesperson] [bit] NOT NULL,\n    [UserPreferences] nvarchar\
  \ NULL,\n    [PhoneNumber] nvarchar NULL,\n    [FaxNumber] nvarchar NULL,\n    [EmailAddress]\
  \ nvarchar NULL,\n    [Photo] varbinary NULL,\n    [CustomFields] nvarchar NULL,\n\
  \    [OtherLanguages]  AS (json_query([CustomFields],N'$.OtherLanguages')),\n  \
  \  [LastEditedBy] [int] NOT NULL,\n    [ValidFrom] datetime2 GENERATED ALWAYS AS\
  \ ROW START NOT NULL,\n    [ValidTo] datetime2 GENERATED ALWAYS AS ROW END NOT NULL,\n\
  \    PERIOD FOR SYSTEM_TIME ([ValidFrom], [ValidTo])\n)\n```\n\n\n\n\n# 第四章 构建应用程序与高级\
  \ T-SQL\n\n```sql\nWITH (SYSTEM_VERSIONING = ON ( HISTORY_TABLE = [Application].[NewPeople_Archive]))\n\
  GO\n```\n\n完成上述定义后，数据库中将存在两张表：`[Application].[NewPeople]` 表和 `[Application].[NewPeople_Archive]`\
  \ 表。\n\n当向 `[Application].[NewPeople]` 表插入新行时，`ValidFrom` 列将被赋值为插入该行的事务的当前日期时间，而\
  \ `ValidTo` 列将被赋值为 `datetime2` 类型的最大值，即 `9999-12-31`（格式为 `YYYY-MM-DD`）。\n\n当此行被更新时，更新前行的数值将被插入到\
  \ `[Application].[NewPeople_Archive]` 表中，但现在 `ValidTo` 会被设置为更新操作的事务时间。`[Application].[NewPeople]`\
  \ 表中被更新行的 `ValidFrom` 列将被赋值为更新操作的事务时间，`ValidTo` 则被设置为 `9999-12-31`。\n\n现在，这便基于 `datetime2`\
  \ 列代表了该行更改的历史记录。\n\nT-SQL 的 `SELECT` 语句已扩展包含一个新的 `FOR SYSTEM_TIME` 子句，允许您根据各种选项来搜索行的各个版本。\n\
  \nSQL Server 将根据查询自动从历史表或当前表中检索行。您无需知道数据实际存储在哪里。只需查询 `NewPeople` 表并使用 `FOR SYSTEM_TIME`\
  \ 语法即可查找给定时间段内的行。SQL Server 会自动从 `NewPeople` 或 `NewPeople_Archive` 表中检索正确的行。\n\n\
  对表中行的任何 `DELETE` 操作都会导致该行被插入历史表，且 `ValidTo` 设置为删除操作的事务时间。当前表中的行将被删除，但使用 `FOR SYSTEM_TIME`\
  \ 进行的搜索仍能找到历史行。\n\n关于此功能的完整文档集可在此处找到：[`docs.microsoft.com/sql/relational-databases/tables/temporal-tables#why-temporal`](https://docs.microsoft.com/sql/relational-databases/tables/temporal-tables#why-temporal)。在此处也有一些非常实用的使用场景和示例：[`docs.microsoft.com/sql/relational-databases/tables/temporal-table-usage-scenarios`](https://docs.microsoft.com/sql/relational-databases/tables/temporal-table-usage-scenarios)。\n\
  \n##### 图数据库\n\n有些数据模型并不适合传统的关联关系，正如我在本章中给出的示例所示。这些场景包括层次数据、复杂的多对多关系或复杂互连的数据与关系。\n\
  \n在 SQL Server 中存储和查询此类场景的数据始终是可行的，但 SQL Server 2017 引入了一项新功能，使得导航这类数据关系变得容易得多，该功能称为\
  \ `图数据库`。\n\n再举一个例子可能有助于更容易理解此功能。请看图 4-3 中的示意图。\n\n![](img/index-161_1.jpg)\n\n\
  ***图 4-3.  **一个图数据模型*\n\n设计出 SQL Server 表结构以便在此模型上插入数据和进行查询是可行的，但对于 T-SQL 语言来说并不自然。\n\
  \nSQL Server 现在为 T-SQL 语言提供了扩展，使得将模型映射到表并自然地从数据中找到信息的 `匹配项` 成为可能。\n\n基于这个模型，我可以构建定义\
  \ `节点` 和 `边` 的新表。在上图中，圆圈代表节点，它们之间的关系就是边。\n\n以下是示例 T-SQL 语法，用于创建这些表（参见示例脚本 `graphtables.sql`）：\n\
  \n```sql\n-- 创建一个图演示数据库\nDROP DATABASE IF EXISTS graphdemo\nGO\n```\n\n\n\n# 第四章\
  \ 构建应用程序与高级 T-SQL\n\n##### 原生评分\n\n执行以下 T-SQL 语句来创建并使用数据库：\n\n```sql\nCREATE DATABASE\
  \ graphdemo;\nGO\n\nUSE graphdemo;\nGO\n```\n\n### 创建节点和边表\n\n-- 创建节点（NODE）表\n\n\
  ```sql\nCREATE TABLE Person (\n    ID INTEGER PRIMARY KEY,\n    name VARCHAR(100)\n\
  ) AS NODE;\n\nCREATE TABLE Restaurant (\n    ID INTEGER NOT NULL,\n    name VARCHAR(100),\n\
  \    city VARCHAR(100)\n) AS NODE;\n\nCREATE TABLE City (\n    ID INTEGER PRIMARY\
  \ KEY,\n    name VARCHAR(100),\n    stateName VARCHAR(100)\n) AS NODE;\n```\n\n\
  -- 创建边（EDGE）表。\n\n```sql\nCREATE TABLE likes (rating INTEGER) AS EDGE;\nCREATE TABLE\
  \ friendOf AS EDGE;\nCREATE TABLE livesIn AS EDGE;\nCREATE TABLE locatedIn AS EDGE;\n\
  GO\n```\n\n现在，我可以使用特殊的 T-SQL 语法在向边表插入数据时引用节点。请参阅示例脚本`graphinsert.sql`以了解如何使用此语法：\n\
  \n```sql\nUSE graphdemo\nGO\n\nINSERT INTO Person VALUES (1,'John');\nGO\n\nINSERT\
  \ INTO Restaurant VALUES (1, 'WeServeBigSteaks', 'Fort Worth')\nGO\n\nINSERT INTO\
  \ likes VALUES (\n    (SELECT $node_id FROM Person WHERE id = 1),\n    (SELECT $node_id\
  \ FROM Restaurant WHERE id = 1),\n    9\n);\nGO\n```\n\n一旦我插入了所有数据，我就可以使用如下 T-SQL\
  \ 查询语法来找出 John 喜欢的餐馆或他的朋友喜欢的餐馆。我已将这些语句放在示例脚本`graphquery.sql`中：\n\n```sql\nUSE graphdemo\n\
  GO\n\n-- 查找 John 喜欢的餐馆\nSELECT Restaurant.name\nFROM Person, likes, Restaurant\n\
  WHERE MATCH (Person-(likes)->Restaurant)\nAND Person.name = 'John';\nGO\n\n-- 查找\
  \ John 的朋友喜欢的餐馆\nSELECT Restaurant.name\nFROM Person person1, Person person2, likes,\
  \ friendOf, Restaurant\nWHERE MATCH(person1-(friendOf)->person2-(likes)->Restaurant)\n\
  AND person1.name='John';\nGO\n```\n\n第二个查询在您完成完整的示例演示之前不会找到数据，该演示可以在 [`docs.microsoft.com/sql/relational-databases/graphs/sql-graph-sample`](https://docs.microsoft.com/sql/relational-databases/graphs/sql-graph-sample)\
  \ 找到。\n\n在 SQL Server 2016 中，微软在数据库社区和行业中做了一件不可思议的事情。我们不仅创建了将数据科学和机器学习与 SQL Server\
  \ 集成的策略，还将机器学习引入到了 SQL Server 内部。\n\n在 SQL Server 2016 中，我们构建了一个架构，允许 R 脚本在与数据相同的\
  \ SQL Server 上共同定位运行，但该脚本与 SQL Server 进程是隔离的。此外，R 脚本是通过一个名为`sp_execute_external_script`的\
  \ T-SQL 存储过程执行的。数据科学家不再需要将大量数据拉取到可能已过时或不安全的工作站上。数据科学模型就存在于 SQL Server 内部。在生产环境中的性能提升是惊人的。一个展示其可能性的好例子是微软实现每秒\
  \ 100 万次预测的工作：[`blogs.technet.microsoft.com/dataplatforminsider/2016/10/11/1000000-predictions-per-second`](https://blogs.technet.microsoft.com/dataplatforminsider/2016/10/11/1000000-predictions-per-second)。\n\
  \n在 SQL Server 2017 中，我们通过支持 Python 引入了同类型的机器学习支持。\n\n问题是，截至 CU4 版本，Linux 上的 SQL\
  \ Server 2017 不支持此模型。幸运的是，SQL Server 2017 中发布了另一个相关功能，该功能在 Windows 和 Linux 版本上均适用，因为它内置于核心数据库引擎中（请记住，核心数据库引擎在\
  \ Windows 和 Linux 上是相同的）。此功能称为原生评分（Native Scoring）。原生评分通过另一个名为`PREDICT`的 T-SQL 函数公开。\n\
  \n以下是`PREDICT`语法的示例（如果不遵循以下示例教程，此代码将无法执行）：\n\n```sql\nDECLARE @model VARBINARY(MAX)\
  \ = (SELECT TOP(1) native_model FROM dbo.\n```\n\n\n\n# 第四章 构建应用程序与高级 T-SQL\n\n\
  #### 本章小结\n\n在本章中，你学习了如何构建一个示例 node.js 应用程序来访问数据库。此外，你还学习了其他 T-SQL 功能，以增强你的数据库或应用程序。最后，你了解了\
  \ SQL Server 2016 和 2017 中引入的新功能，这些功能可以进一步增强你的数据库和应用程序。在下一章中，我将向你展示一个完整的工具列表，让你能够进一步探索\
  \ SQL Server 的功能，并管理你的 SQL Server 数据库和安装。掌握这些工具知识非常重要，因为本书的剩余章节将全程使用这些工具。\n\n# 第五章\
  \ SQL Server 工具\n\nSQL Server 拥有为数据专业人员提供所需工具的悠久传统。工具赋予任何人使用 SQL Server 开发、交互、优化、管理和排除应用程序及查询故障的能力。SQL\
  \ Server 的工具涵盖范围远不止于程序或实用程序。SQL Server 内置了一套丰富的功能，我将在本章中作为工具主题的一部分进行讨论。\n\n所有 SQL\
  \ Server 工具都有一个共同点。它们使用或通过 T-SQL 语言提供接口。作为独立程序的工具都知道如何通过使用 TDS 协议的驱动程序或提供程序来连接并执行\
  \ T-SQL 查询。在第 2、3 和 4 章中，我向你介绍了两种与 SQL Server 交互的工具：`sqlcmd` 和 Visual Studio Code\
  \ 的 mssql 扩展。\n\n在本章中，我将向你展示用于连接、运行查询和管理 SQL Server 各个方面的图形化和命令行工具。我还将向你介绍 SQL Server\
  \ 引擎的内置功能，这些功能提供了对元数据、执行、性能、资源和跟踪的洞察。我还会展示其他功能，允许你更改 SQL Server、数据库和查询的配置，以影响行为或提供更多洞察。\n\
  \n在本章探索过程中，一个关键点是，现有在 Windows 计算机上运行的工具几乎无需改动即可连接并与 Linux 上的 SQL Server 交互。如果你是\
  \ Windows 用户，可以继续使用像 SQL Server Management Studio (`SSMS`) 这样的工具。但如果你是 macOS 或 Linux\
  \ 用户，你会喜欢我们提供跨平台、开源工具的新策略。我将在本章中涵盖所有这些内容。本章最后，我将讨论使用 `SSIS` 开发、构建和执行 ETL 包的工具。\n\
  \nSQL Server 提供了其他特定于安全或高可用性等功能的工具，例如...\n\n```sql\nrental_models WHERE model_name\
  \ = 'linear_model' AND lang = 'Python');\n\nSELECT d.*, p.* FROM PREDICT(MODEL =\
  \ @model, DATA = dbo.rental_data AS d)\n\nWITH(RentalCount_Pred float) AS p;\n\n\
  GO\n```\n\n为了完全理解此语法，你需要完整了解 Windows 上 SQL Server 的 Python 预测模型教程，网址为 https://microsoft.github.io/sql-ml-tutorials/python/rentalprediction，或者查看我们文档中使用名为\
  \ `iris` 的已知数据集的示例，网址为 https://docs.microsoft.com/sql/advanced-analytics/r/how-to-do-realtime-scoring。\n\
  \n其概念是，许多数据科学家在其工作站上使用测试数据执行一个称为构建 `trained model`（训练模型）的过程。T-SQL 的 `PREDICT` 函数可以将训练模型作为输入，并执行构建在数据库引擎内部的机器学习代码来\
  \ `run`（运行）该训练模型。与使用 R 或 Python 通过 `sp_execute_external_script` 运行模型相比，原生评分在性能上具有巨大的提升优势。\n\
  \n\n\n# 第 5 章 SQL Server 工具\n\n本章旨在通过一些示例向你介绍这些工具的功能。现在向你展示这些工具，将为你阅读本书后续章节时，使用它们探索其他特性和功能做好准备。我将在本章中重点标出我提供的示例脚本文件名称，这些文件是本书的配套资源。\n\
  \n© Bob Ward 2018\n\nB. Ward, *Pro SQL Server on Linux*, `doi.org/10.1007/978-1-4842-4128-8_5`\n\
  \n可用性，我将在第 7 章和第 8 章中更详细地讨论这些内容。\n\n#### 命令行工具\n\n从命令行运行的工具简单但至关重要。我建议你了解`SQL Server`附带的命令行工具，因为它们提供了与`SQL\
  \ Server`交互的最简单、最轻量级的方法。\n\n**提示** 具有图形用户界面的工具，如`SSMS`，提供了强大的功能。但`SSMS`比`sqlcmd`这样的工具具有更多的活动部件。如果有人说他们在`Windows`计算机上使用`SSMS`连接到`Linux`上的`SQL\
  \ Server`时遇到问题，我会问他们是否可以在`Linux`服务器本地使用`sqlcmd`进行连接。这有助于缩小图形工具本身的问题与网络问题之间的范围。\n\
  \nMicrosoft 对命令行工具的策略是确保它们在常见的客户端平台（包括`Windows`、`Linux`和`macOS`）上可用，并且在某些情况下将其作为\
  \ GitHub 上的开源项目。\n\n在本节中，我将讨论以下工具：\n\n- `sqlcmd`（我在第 2 章展示了如何安装和使用此工具的一些基础知识。）\n\
  - `bcp`\n- `mssql-cli`\n- `mssql-scripter`\n- `sqlservr` 命令行选项\n\n本节未列出的一个工具叫做`DBFS`，将在后面关于引擎内置工具的章节中介绍。`SQL\
  \ Server Linux`专家 Anthony Nocentino 撰写的一篇关于`DBFS`的精彩博客文章可以在[www.centinosystems.com/blog/sql/dbfs-command-line-access-to-sql-server-dmvs](http://www.centinosystems.com/blog/sql/dbfs-command-line-access-to-sql-server-dmvs)找到。要跟踪命令行工具的所有未来进展，请参考我们的文档：[`docs.microsoft.com/en-us/sql/tools/overview-sql-tools`](https://docs.microsoft.com/en-us/sql/tools/overview-sql-tools)。\n\
  \n## sqlcmd\n\n`SQL Server`一直提供一个简单的命令行工具，用于向数据库引擎提交`T-SQL`查询。这些工具的演变始于`Windows`平台上的`isql.exe`和`osql.exe`，但近年来我们发布了一个名为`sqlcmd.exe`的工具。该工具针对`Windows`、`Linux`和`macOS`进行原生编译，可用作连接到任何`Windows`或`Linux`上的`SQL\
  \ Server`的客户端（例如，你可以使用`Linux`客户端上的`sqlcmd`连接到`Windows`上的`SQL Server`）。在所有平台上，`sqlcmd`都使用该操作系统原生的`Microsoft\
  \ ODBC driver for SQL Server`。\n\n在`Windows`上安装`SQL Server`时，默认会安装`sqlcmd`。对于`Linux`上的`SQL\
  \ Server`，你必须安装一个单独的名为`mssql-tools`的包（依赖于`ODBC for Linux`），具体文档见[`docs.microsoft.com/sql/linux/sql-server-linux-setup-tools`](https://docs.microsoft.com/sql/linux/sql-server-linux-setup-tools)。对于`macOS`，我们使用[Homebrew](https://brew.sh)来安装工具和`ODBC`驱动程序，具体文档见[`docs.microsoft.com/sql/linux/sql-server-linux-setup-tools#macos`](https://docs.microsoft.com/sql/linux/sql-server-linux-setup-tools#macos)。\n\
  \n`sqlcmd`提供两种执行模式：*交互式*或*脚本执行*。任一模式\n\n\n# SQL Server 工具：sqlcmd\n\n## sqlcmd 基本介绍\n\
  \n`sqlcmd` 允许您连接到任何 SQL Server（包括 Linux 上的 SQL Server）并运行 T-SQL 查询批处理。\n\n像任何优秀的命令行工具一样，它有许多命令行*开关*或选项。\n\
  \n如果在 `sqlcmd` 中执行 T-SQL `SELECT` 语句，结果可以显示在控制台（`stdout`）中，也可以重定向到文件（使用命令行选项或重定向\
  \ `stdout` 的结果）。\n\n## sqlcmd 编辑器与基本执行\n\n以下是在本地 Linux 服务器上执行基本 `sqlcmd` 的示例（因此我不必使用\
  \ `-S` 参数指定 `ServerName`）：\n\n```\nsqlcmd -Usqllinux\n```\n\n图 5-1 显示了结果。请注意 `sqlcmd`\
  \ 工具内提供的提示符。这被称为 *sqlcmd 编辑器*。\n\n![](img/index-169_1.png)\n\n**图 5-1. 在 Linux 上使用\
  \ sqlcmd 编辑器执行查询**\n\n> **注意** 我在第 3 章提到过，`Go` 命令不是 T-SQL 命令。相反，它是像 `sqlcmd` 这样的工具识别的特殊命令，用于执行之前在编辑器中输入的\
  \ SQL 命令批处理。文本 `Go` 不会发送到 SQL Server。\n\n在任何 `sqlcmd` 行编辑器提示符下，您可以输入任何有效的 T-SQL\
  \ 批处理或编辑器识别的命令（例如 `GO`）。`sqlcmd` 编辑器命令的完整列表在我们的文档中列出：[`docs.microsoft.com/sql/tools/sqlcmd-utility#sqlcmd-commands`](https://docs.microsoft.com/sql/tools/sqlcmd-utility#sqlcmd-commands)，或者在\
  \ `sqlcmd` 编辑器提示符下输入 `:HELP`。\n\n例如，输入 `EXIT` 或 `QUIT` 以离开编辑器。`EXIT` 有一个方便的用途，您可以传递一个查询给\
  \ `EXIT(<query>)`，查询的结果将返回给客户端，这通常是操作系统 shell 的一个脚本。\n\n`GO` 命令有一个可选参数 `GO (<n>)`，表示将\
  \ T-SQL 批处理运行 `<n>` 次，一次接一次。\n\n## 使用脚本执行\n\n在上一章中，我创建了几个扩展名为 `.sql` 的脚本（不要求使用任何文件扩展名，但当您使用\
  \ `.sql` 时，几乎所有人都明白其含义），并在 Visual Studio Code 编辑器中执行了它们。我本可以使用 `sqlcmd` 的 `-i` 命令行选项来执行这些脚本中的任何一个。任何有效的\
  \ T-SQL 或 `sqlcmd` 编辑器命令都可以放入脚本中。\n\n我在示例脚本 `getsqlversion.sql` 中提供了以下 T-SQL 命令及语句：\n\
  \n```\nSELECT @@version\nGO\n```\n\n![](img/index-170_1.png)\n\n> **提示** `@@version`\
  \ 是一个系统提供的变量，用于打印 SQL Server 的版本、版本和操作系统详细信息。我认为这是针对 SQL Server 运行的最基本查询，以确保您可以连接并运行查询。您可以在我们的文档中找到由\
  \ SQL Server 引擎支持的完整系统变量列表：[`docs.microsoft.com/en-us/sql/integration-services/system-variables`](https://docs.microsoft.com/en-us/sql/integration-services/system-variables)。\n\
  \n您可以使用以下命令从 bash shell 执行此脚本：\n\n```\nsqlcmd -Usqllinux -igetsqlversion.sql\n```\n\
  \n图 5-2 显示了在 Linux 上使用 `sqlcmd` 执行此脚本的结果。\n\n**图 5-2. 使用脚本与 sqlcmd**\n\n## 使用 -Q\
  \ 选项执行\n\n执行批处理的另一个选项是使用 `-Q` 命令行选项，在命令行中直接执行您指定的批处理，而不是在文件中。这是我创建在示例 shell 脚本 `sqlcmdquery.sh`\
  \ 中的一个示例（注意：在 Linux shell 中执行此操作之前，请确保运行 `chmod u+x sqlcmdquery.sh`）：\n\n```\nsqlcmd\
  \ -Usa -Q\"SELECT @@version\"\n```\n\n> **注意** `-q` 选项与 `-Q` 执行相同的操作，但不会退出 `sqlcmd`。\n\
  \n![](img/index-171_1.png)\n\n![](img/index-171_2.png)\n\n图 5-3 展示了使用 `-Q` 与 `sqlcmd`\
  \ 的示例。\n\n**图 5-3. 使用 -Q 选项执行查询**\n\n\n与使用 `-i` 的脚本类似，任何有效的 T-SQL 批处理和 `sqlcmd`\
  \ 编辑器命令都可以与 `-Q` 或 `-q` 一起使用。\n\n如果您使用 `-i` 运行带有脚本的 `sqlcmd`，则所有命令的结果都会定向到 `stdout`。这允许您运行\
  \ `sqlcmd` 脚本并将结果通过管道传输到其他程序（如 `grep`）。以下是一个使用 `sqlcmd` 和 `grep` 查找 SQL Server 版本的示例（您可以使用示例脚本\
  \ `getsqledition.sh` 来执行此操作，或根据需要修改它）：\n\n```\nsqlcmd -Usa -igetsqlversion.sql -PSql2017isfast\
  \ | grep Edition\n```\n\n图 5-4 展示了使用 `sqlcmd` 和 `grep` 执行脚本来查找 SQL Server 版本的结果。\n\
  \n**图 5-4. 结合使用 `sqlcmd` 与 `grep`**\n\n`sqlcmd` 还提供了一个 `-o` 命令行选项，用于将所有结果和错误写入特定文件。\n\
  \n## 第 5 章 SQL Server 工具\n\n**提示**：一个不错的选项（感谢 Rathijit Sen 提供的此提示）是 `-p` 选项，它会打印出使用\
  \ `sqlcmd` 执行的查询的性能统计信息。这包括 SQL Server 执行查询的总时间以及客户端处理它们的时间。结合本章稍后将讨论的 `SET STATISTICS\
  \ TIME`，这可以成为一个很好的选项，用于确定 SQL Server 执行查询的速度以及客户端通过网络处理结果的速度。\n\n`sqlcmd` 的完整文档（包括所有命令行选项）可在\
  \ [`docs.microsoft.com/sql/tools/sqlcmd-utility`](https://docs.microsoft.com/sql/tools/sqlcmd-utility)\
  \ 找到。\n\n## bcp\n\n我在本书第 3 章演示了如何使用 T-SQL `INSERT` 语句将数据插入 SQL Server。我展示了如何插入一行，或使用\
  \ `INSERT..SELECT` 或 `SELECT..INTO` 插入多行。\n\n您可能需要基于存储在 SQL Server 外部的文件中的数据，插入或*导入*大量行。或者您可能希望将数据从\
  \ SQL Server *导出*到文件中。大容量复制程序 (`bcp`) 就是为这类任务设计的。与 `sqlcmd` 类似，`bcp` 已构建为可在 Windows、Linux\
  \ 和 macOS 上原生运行，并在使用 `mssql-tools` 软件包安装包含 `sqlcmd` 的工具时一并安装。\n\n`bcp` 依赖于 SQL Server\
  \ ODBC 驱动程序扩展来将数据大容量复制进、出 SQL Server（请参阅我们的文档：[`docs.microsoft.com/sql/relational-databases/native-client-odbc-extensions-bulk-copy-functions/sql-server-driver-extensions-bulk-copy-functions`](https://docs.microsoft.com/sql/relational-databases/native-client-odbc-extensions-bulk-copy-functions/sql-server-driver-extensions-bulk-copy-functions)）。因此，您也可以编写一个提供自己大容量复制功能的应用程序。\n\
  \n对于导入，`bcp` 工具将读取您指定的文件并将数据流传送到 SQL Server，以应用到目标表。对于导出，`bcp` 将从表中复制出数据流并将数据写入文件。\n\
  \n使用 `bcp` 的基本方法是从能连接到 SQL Server 的计算机（无论是远程计算机还是服务器本身）运行此命令。您指定如何连接到 SQL Server、要导入到或从中导出的数据库和表，以及用于导入或导出的输入或输出文件的命令行选项。输入和输出文件可以是所有类型的格式，包括能够对文件内的数据类型进行规定。\n\
  \n![](img/index-173_1.png)\n\n## 第 5 章 SQL Server 工具\n\n让我们使用一个简单的例子，针对文件中格式化的文本数据，使用第\
  \ 3 章中的 `[Application].[People]` 表作为示例。这些示例假设您已经使用第 3 章的脚本创建了 `WideWorldImporters`\
  \ 数据库和 `People` 表。\n\n\n# 第 5 章 SQL Server 工具\n\n使用来自第 3 章的 **insertpeople.sql**\
  \ 脚本中的命令插入数据后，由于`People`表中已有数据，让我们使用`bcp`以*本机*格式将数据导出到文件。（本机格式将根据表中的数据类型以二进制形式写出数据。还有命令行选项可以将数据写入文本格式）。以下是在示例脚本\
  \ **bcpout.sh** 中看到的导出表的基本语法（别忘了运行`chmod u+x bcpout.sh`来执行脚本）：\n\n```\nbcp [WideWorldImporters].[Application].[People]\
  \ out people.dat -Usa -S localhost -n\n```\n\n图 5-5 展示了在 Linux 服务器上运行此`bcp`命令的结果。\n\
  \n***图 5-5. 在 Linux 服务器上使用 bcp 导出数据***\n\n你可以从`People`表中删除数据，然后将本机格式化的文件导入到 SQL\
  \ Server 中。但在执行`DELETE`语句之前，你需要先禁用这些表上的所有约束。以下是我从名为 **deletepeoplebeforeimport.sql**\
  \ 的示例脚本中执行的一组 T-SQL 命令示例。此脚本适用于第 3 章中的 WideWorldImporters 示例脚本。你不能将其用于完整的 WideWorldImporters\
  \ 示例备份。\n\n**注意**：我禁用了包括来自`Customers`表的外键约束。如果此表中存在数据，则不建议禁用外键约束，因为在插入新数据时可能违反逻辑引用完整性。此外，除非使用了特定的命令行选项，否则`bcp`程序本身会忽略约束。我在此示例中禁用了约束，以便可以删除现有行。\n\
  \n```\nUSE [WideWorldImporters]\nGO\nALTER TABLE [Sales].[Customers] NOCHECK CONSTRAINT\
  \ ALL\nGO\nALTER TABLE [Application].[People] NOCHECK CONSTRAINT ALL\nGO\nDELETE\
  \ FROM [Application].[People]\nGO\n```\n\n现在你可以使用`bcp`从前面导出示例创建的`people.dat`文件导入数据（我提供了一个名为\
  \ **bcpin.sh** 的示例 bash shell 脚本）：\n\n```\nbcp [WideWorldImporters].[Application].[People]\
  \ in people.dat -Usa -S localhost -n\n```\n\n`bcp`具有丰富的命令行选项，适用于导入和导出场景。这些选项包括但不限于格式文件、导入/导出到文本文件、列和行分隔符，以及用于提示和行批大小的性能选项。有关完整的命令行选项和示例列表，请参阅文档：[`docs.microsoft.com/sql/tools/bcp-utility`](https://docs.microsoft.com/sql/tools/bcp-utility)\n\
  \n如果你有存储空间并且愿意将导入文件复制到与 SQL Server 相同的计算机上（或网络上 SQL Server 可访问的文件共享），则可以使用 T-SQL\
  \ 的`BULK INSERT`来执行高速导入。此命令可以显著提高导入性能，因为 SQL Server 引擎将直接读取文件并将数据导入到目标表中。有关`BULK\
  \ INSERT`的更多信息，请参阅文档：[`docs.microsoft.com/sql/t-sql/statements/bulk-insert-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/bulk-insert-transact-sql)\n\
  \n**注意**：在本书撰写时，SQL Server on Linux 上的`BULK INSERT`命令需要`sysadmin`权限。\n\n## mssql-cli\n\
  \n随着 SQL Server on Linux 的发布，微软为用于 SQL Server 的工具推出了一项新的跨平台（操作系统）策略，这些工具通过一个开源项目制作。其中一个工具的例子就是**mssql-cli**。`mssql-cli`是一个命令行工具，类似于`sqlcmd`，用于针对\
  \ SQL Server 执行查询。`mssql-cli`使用 Python 构建，可在运行 Windows、Linux（包括许多发行版）和 macOS 操作系统的计算机上使用。\n\
  \n\n要安装 `mssql-cli`，请参阅安装指南 [`github.com/dbcli/mssql-cli/blob/master/README.rst#get-mssql-cli`](https://github.com/dbcli/mssql-cli/blob/master/README.rst#get-mssql-cli)。\n\
  \n我们在构建 `mssql-cli` 时，创建了一个 GitHub 项目以接受开源贡献（[`github.com/dbcli/mssql-cli/`](https://github.com/dbcli/mssql-cli/)），并将其注册为\
  \ `dbcli` 倡议的一部分。`dbcli` 是一个致力于为数据库打造更好命令行工具的开源项目社区。\n\n虽然 `sqlcmd` 是一个出色的、简单的 SQL\
  \ Server 命令行工具，但 `mssql-cli` 相较于 `sqlcmd` 提供了一些优势，包括：\n\n*   T-SQL 智能感知\n*   语法高亮\n\
  *   查询结果的垂直格式\n*   多行编辑器\n*   用于自定义 `mssql-cli` 的配置文件\n*   环境变量支持\n\n`mssql-cli`\
  \ 与其他 SQL Server 工具的一个区别在于，它不使用 `GO` 关键字来分隔 T-SQL 批处理。默认情况下，`mssql-cli` 编辑器允许你一次执行一条\
  \ T-SQL 命令。但是，你可以使用多行编辑器来创建多语句 T-SQL 批处理，然后使用 `\";\"` 字符来结束该批处理。\n\n你可以使用以下命令启动\
  \ `mssql-cli`：\n\n```\nmssql-cli -Usqllinux\n```\n\n图 5-6 展示了在 Linux 上使用 `mssql-cli`\
  \ 针对我第 3 章创建的 `WideWorldImporters` 示例表运行多语句 T-SQL 批处理的示例。（注意：此查询的结果假设你已经根据前面章节的内容向这些表中填充了数据。）\n\
  \n![](img/index-176_1.png)\n\n## 第 5 章 SQL Server 工具\n\n**图 5-6.** 在 Linux 上使用 `mssql-cli`\n\
  \n在本书撰写时，配置文件的选项尚未完全记录在案，但你可以查看默认配置文件（名为 `config`），其中包含注释。默认配置文件在 Linux 和 macOS\
  \ 上安装在 `~/.config/mssqlcli` 目录中（`~` 表示登录用户的主目录），在 Windows 上安装在 `c:\\users\\<username>\\\
  AppData\\Local\\dbcli\\mssqlcli` 目录中。\n\n新工具的设计策略之一是提供功能、外观和体验的一致性。因此，`mssql-cli`、`mssql`\
  \ Visual Studio Code 扩展和 SQL Operations Studio 都使用一个名为 SQL Tools Service 的公共组件来进行连接管理、语言支持、查询执行和结果集处理。SQL\
  \ Tools Service 是一个开源项目。你可以在 [`github.com/Microsoft/sqltoolsservice`](https://github.com/Microsoft/sqltoolsservice)\
  \ 找到关于 SQL Tools Service 的更多信息。\n\n`mssql-cli` 于 2017 年 12 月发布预览版。与 `sqlcmd` 相比，填补功能差距以及进行其他改进还有一些工作要做。例如，目前没有办法传入输入文件或查询以进行脚本编写，或者将结果通过管道传输到\
  \ `stdout` 或文件。要查看 `mssql-cli` 的路线图，请参阅此文档：[`github.com/dbcli/mssql-cli/blob/master/doc/roadmap.md`](https://github.com/dbcli/mssql-cli/blob/master/doc/roadmap.md)。\n\
  \n![](img/index-177_1.png)\n\n## 第 5 章 SQL Server 工具\n\n### mssql-scripter\n\n开始使用数据库后，你可能想要做的一个常见任务是*脚本化*一个数据库。我所说的这个术语的意思是，你可能希望获取一个现有数据库，并输出用于创建该数据库以及其中所有对象的\
  \ T-SQL 命令，而无需执行备份和还原。通常，此输出会写入一个文件，该文件现在是一个 T-SQL 脚本，可用于创建数据库及所有对象。非常流行的工具 SSMS\
  \ 有一个选项，可以从现有数据库创建对象的脚本。\n\n由于 SSMS 仅在 Windows 上运行，我们构建了一个用于脚本编写的跨平台开源工具，名为 `mssql-scripter`。与\
  \ `mssql-cli` 一样，`mssql-scripter` 是用 Python 构建的。\n\n\n\n\n在以下网址查找适用于您的操作系统（Windows、Linux\
  \ 或 macOS）的安装指南：\n\n[`github.com/Microsoft/mssql-scripter/blob/dev/doc/installation_guide.md`](https://github.com/Microsoft/mssql-scripter/blob/dev/doc/installation_guide.md)。\n\
  \n`mssql-scripter` 提供了丰富的命令行选项，可以以多种方式创建脚本。\n\n以下是一个针对第 3 章中的 WideWorldImporters\
  \ 数据库执行 `mssql-scripter` 的示例：\n\n```\nmssql-scripter -S localhost -d WideWorldImporters\
  \ -U sqllinux -P Sql2017isfast -f ./wwi.sql –-logins –-check-for-existence –-display-progress\n\
  ```\n\n图 5-7 展示了 `mssql-scripter` 的一个输出示例，该输出用于创建我在第 3 章中创建的 WideWorldImporters\
  \ 数据库及其所有对象的 T-SQL 脚本。\n\n请注意我所使用的一些选项：用于创建登录名、仅在对象不存在时创建对象，以及在执行期间显示进度。\n\n***图\
  \ 5-7. 使用 mssql-scripter 为 WideWorldImporters 数据库中的所有对象创建 T-SQL 脚本***\n\n![](img/index-178_1.png)\n\
  \n**注意** 使用此方法将不允许您先创建一个名为 `sqllinux` 的登录名，然后再使用 `sqllinux` 登录名来创建数据库和对象。您需要创建两个不同的脚本：(1)\
  \ 一个用于以 `sa` 身份执行来创建 `sqllinux` 登录名的脚本，以及 (2) 一个用于以 `sqllinux` 帐户登录来创建数据库和对象的脚本。\n\
  \n现在您可以获取 `wwi.sql` 文件，并使用像 `sqlcmd` 这样的工具（通过 `-i` 选项）将其作为脚本执行。\n\n默认情况下，`mssql-scripter`\
  \ 将其输出写入标准输出。因此，您可以将 `mssql-scripter` 的结果通过管道传输到其他工具。Linux 上的 `sed` 程序提供了“搜索和替换”的功能。图\
  \ 5-8 展示了一个使用 `mssql-scripter` 和 `sed` 来创建 WideWorldImporters 数据库脚本，但将数据库名称更改为 NewWideWorldImporters\
  \ 的示例。\n\n执行此命令以查看结果：\n\n```\nmssql-scripter -S localhost -d WideWorldImporters\
  \ -U sqllinux -P Sql2017isfast --check-for-existence --display-progress | sed -e\
  \ \"s/WideWorldImporters/NewWideWorldImporters/g\" > new_wwi.sql\n```\n\n***图 5-8.\
  \ 将 sed 与 mssql-scripter 结合使用以创建具有新数据库名称的脚本***\n\n要获取 `mssql-scripter` 命令行选项的完整列表，请使用\
  \ `--help` 选项或查阅文档（其中也包含一些显著的示例）：[`github.com/Microsoft/mssql-scripter/tree/dev/doc`](https://github.com/Microsoft/mssql-scripter/tree/dev/doc)。\n\
  \n## sqlservr 命令行选项\n\n在第 2 章中，我向您展示了如何在 Linux 上使用 `systemctl` 程序启动和停止 SQL Server。也可以通过执行\
  \ `sqlservr` 程序直接从命令行启动 SQL Server。在正常情况下，您不应直接从命令行运行 `sqlservr`，但以下是一些可能的原因：\n\n\
  - SQL Server 无法通过 `systemctl` 启动（注意：如果 SQL Server 无法通过 `systemctl` 启动，那么从命令行启动也很可能无法工作，但在某些情况下这可能有所帮助）。\n\
  - 您需要使用一项功能来启动 SQL Server，而该功能无法通过 `mssql-conf` 脚本进行配置。我将在第 9 章向您展示其中一些选项。\n\n要从命令行启动\
  \ SQL Server，您需要使用 `sudo` 命令在 `mssql` Linux 帐户的上下文中运行 `sqlservr`（您必须首先停止 SQL Server\
  \ 才能运行此命令）：\n\n```\nsudo -u mssql /opt/mssql/bin/sqlservr\n```\n\nSQL Server 将启动，并将\
  \ ERRORLOG 的输出转储到标准输出，默认情况下会写入控制台。此时，如果您需要关闭 SQL Server，您\n\n\n\n\n无法使用`systemctl`程序（`systemctl\
  \ stop mssql-server`执行完成且无报错）。\n\n您需要使用以下两种方法之一来关闭 SQL Server：\n\n1.  连接到 SQL Server\
  \ 并执行 T-SQL `SHUTDOWN` 命令。\n2.  在执行`sqlservr`的控制台中，键入`<ctrl>+<c>`。\n\n图 5-9 展示了使用`<ctrl>+<c>`关闭\
  \ SQL Server 后的控制台示例。\n\n![](img/index-180_1.png)\n\n## 第 5 章 SQL Server 工具\n\n\
  ### 图 5-9. 从控制台关闭 sqlservr\n\n#### SQL Operations Studio\n\n虽然 SSMS 是一款极其流行的工具，但它仅适用于\
  \ Windows，因此 Linux 和 macOS 用户需要通过虚拟化程序来安装它。正如本章前面在描述`mssql-cli`时提到的，我们尽可能构建能在多个操作系统上运行的新工具，并使其成为开源项目的一部分。\n\
  \n对于需要图形界面的工具，Visual Studio Code 项目提供了一个很好的平台来构建跨平台系统。结合我们为`SQL Tools Service`所做的工作，一个名为`SQL\
  \ Operations Studio`的新工具应运而生，它 fork 自 Visual Studio Code 开源项目。\n\n`SQL Operations\
  \ Studio` 于 2017 年 11 月作为预览版工具发布，现在继续通过 GitHub 仓库 [`github.com/Microsoft/sqlopsstudio`](https://github.com/Microsoft/sqlopsstudio)\
  \ 接收来自 Microsoft 和社区的月度更新。秉承 GitHub 的风格，私人构建版本会更频繁地提供，整个源代码可供任何人查看或 fork，所有问题都通过\
  \ GitHub [`github.com/Microsoft/sqlopsstudio/issues`](https://github.com/Microsoft/sqlopsstudio/issues)\
  \ 提交。\n\n![](img/index-181_1.jpg)\n\n## 第 5 章 SQL Server 工具\n\n##### 安装\n\n我们遵循了每种操作系统原生的安装体验。Windows\
  \ 提供了`.zip`文件或完整的 Windows 安装程序体验。macOS 用户获得一个 zip 文件，它适用于 macOS 的“下载”体验。Linux 用户可以下载\
  \ Debian 或 RPM 包，或者一个`tar.gz`文件。\n\n图 5-10 展示了在 macOS 上安装后的`SQL Operations Studio`。\n\
  \n### 图 5-10. macOS 上的 SQL Operations Studio\n\n`SQL Operations Studio` 提供以下独特功能：\n\
  \n-   一个内置智能感知（Intellisense）的 T-SQL 代码编辑器，用于执行查询。\n-   智能 T-SQL 代码“片段”。\n-   通过小部件可自定义的仪表板。\n\
  -   用于扩展内置基础功能的扩展。\n-   集成终端（无需离开工具即可运行 shell 命令）。\n\n![](img/index-182_1.jpg)\n\
  \n## 第 5 章 SQL Server 工具\n\n在我的 Windows 笔记本电脑上，我已经安装了`SQL Operations Studio`。为了开始使用这个工具，我想做两件事：(1)\
  \ 添加一个到 Linux 上 SQL Server 的连接，以及 (2) 更改编辑器的背景颜色和默认字体设置。\n\n图 5-11 显示了在我添加到 SQL\
  \ Server 的连接之前，Windows 上的`SQL Ops Studio`。\n\n### 图 5-11. Windows 上的 SQL Operations\
  \ Studio\n\n现在，我将选择标有`Add Connection`的蓝色按钮。弹出一个新窗口，要求输入服务器名称、登录名和密码。图 5-12 显示了`Connection\
  \ profile`窗口。\n\n![](img/index-183_1.jpg)\n\n## 第 5 章 SQL Server 工具\n\n### 图 5-12.\
  \ 使用 SQL Operations Studio 添加连接\n\n我使用了第 3 章示例中创建的 SQL Server Linux 服务器名称 `bwsql2017rhel`\
  \ 和登录名 `sqllinux`。这个窗口上有一些选项我在本例中不会用到，但您可能会觉得有用：\n\n-   您可以指定要连接到的默认数据库（例如，我可以输入`WideWorldImporters`）。\n\
  -   您可以创建`Server Group`的概念，从而将多个 SQL Server 管理并组织为一个单元。\n-   可以使用`Remember password`选项，这样您就不必每次连接时都指定密码。\n\
  -   `Advanced`按钮提供了额外的选项，包括登录\n\n\n\n超时（默认为 15 秒）、可用性组中读取副本的应用程序意向以及加密设置。\n\n![](img/index-184_1.jpg)\n\
  \n# 第 5 章 SQL Server 工具\n\n连接到 Linux 服务器上的 SQL Server 后，左侧会显示一个用于浏览的窗格，主窗口中则是一个带有扩展的服务器仪表板。图\
  \ 5-13 展示了连接到我的 Linux SQL Server 后的默认视图。\n\n*图 5-13. 连接到 Linux 上的 SQL Server 后，SQL\
  \ Operations Studio 中的默认视图*\n\n##### 配置\n\n接下来我要做的是设置一些偏好来自定义工具。我通过选择`File/Preferences/Settings`菜单选项来完成。偏好设置通过一个名为`settings.json`的文件进行自定义。图\
  \ 5-14 展示了在 SQL Operations Studio 中配置我的偏好的界面。\n\n![](img/index-185_1.jpg)\n\n*图\
  \ 5-14. SQL Operations Studio 用户设置*\n\n左侧窗格显示了所有默认设置。右侧窗格将显示我将包含的、用于覆盖默认值的设置。我想更改的两个设置是将默认背景颜色改为黑色，并将\
  \ T-SQL 代码编辑器的默认显示字体改为更大的尺寸。你可以直接编辑用户设置，但 SQL Operations Studio 包含一个可视化的图标，帮助你将默认设置复制到用户设置中并进行更改。图\
  \ 5-15 在左侧窗格中显示了我如何点击铅笔图标并选择`Edit`来复制编辑器字体大小的设置，以便进行更改。\n\n![](img/index-186_1.jpg)\n\
  \n*图 5-15. 在 SQL Operations Studio 中复制默认设置以进行更改*\n\n当我点击`Edit`和`Copy Settings`时，设置将出现在右侧窗格中，我可以更改字体大小的值。然后我将通过从`File`菜单中选择`Save`来保存这些设置。当我保存字体大小时，它会在当前窗口中自动更改（因为字体大小适用于\
  \ SQL Operations Studio 中的任何编辑操作）。\n\n编辑器字体大小在默认的左侧窗格中很容易找到，但背景颜色呢？在设置窗口顶部有一个搜索编辑框。我在搜索编辑框中输入了单词`Color`，它向我展示了更改工作台`colorTheme`的选项。图\
  \ 5-16 展示了这个例子。\n\n![](img/index-187_1.jpg)\n\n*图 5-16. 在 SQL Operations Studio\
  \ 中搜索设置*\n\n现在我可以点击`workbench.colorTheme`字段附近的铅笔图标，然后会出现更改主题的选项。我选择了`Default Dark\
