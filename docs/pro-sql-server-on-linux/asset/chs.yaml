  \ 8:00 的日志备份，执行以下 T-SQL 语句，该语句可在示例脚本 `backupwwilog2.sql` 中找到：\n\n    ```\n    USE\
  \ master\n    GO\n    BACKUP LOG WideWorldImporters TO DISK = '/var/opt/mssql/data/wwi_log2.bak'\n\
  \    WITH INIT, CHECKSUM\n    GO\n    ```\n\n8.  再向表中插入一行，使用以下 T-SQL 语句，该语句可在示例脚本\
  \ `insertdennis.sql` 中找到：\n\n    ```\n    USE WideWorldImporters\n    GO\n    INSERT\
  \ INTO letsgomavs VALUES ('Dennis Smith Jr.', 1)\n    GO\n    ```\n\n9.  现在使用以下\
  \ T-SQL 语句创建差异数据库备份，该语句可在示例脚本 `backupwwidiff.sql` 中找到：\n\n    ```\n    USE master\n\
  \    GO\n    BACKUP DATABASE WideWorldImporters\n    TO DISK = '/var/opt/mssql/data/wwi_diff1.bak'\n\
  \    WITH INIT, DIFFERENTIAL, CHECKSUM\n    GO\n    ```\n\n10. 再向 `letsgomavs` 表中插入一行（我正在积累我的\n\
  \n\n\n# 第 8 章 SQL Server 的高可用性与灾难恢复\n\n## 11. 进行最后一次日志备份\n\n模拟在星期二中午 12:00 进行备份，使用示例脚本\
  \ `backupwwilog3.sql` 中的以下 T-SQL 语句：\n\n```\nUSE WideWorldImporters\nGO\nBACKUP\
  \ LOG WideWorldImporters TO DISK = '/var/opt/mssql/data/wwi_log3.bak'\nWITH INIT,\
  \ CHECKSUM\nGO\n```\n\n## 12. 进行最后一次插入操作\n\n现在让我们进行最后一次插入操作，根据我们的时间线，这发生在星期二下午 1:00\
  \ 之前，使用示例脚本 `insertluka.sql` 中的以下 T-SQL 语句：\n\n```\nUSE WideWorldImporters\nGO\n\
  INSERT INTO letsgomavs VALUES ('Luka Doncic', 77)\nGO\n```\n\n## 13. 数据库不可用与日志尾备份\n\
  \n现在假设在模拟的星期二下午 1:00，数据库变得不可用，但你认为保存事务日志的磁盘是完好的。我们绝对需要这些事务来确保达拉斯小牛队（NBA 球队）的阵容信息是正确的（尤其是我们的首轮选秀卢卡）。第一步是使用以下\
  \ T-SQL 语句备份当前的日志尾部，该语句可在示例脚本 `backupwwitailoflog.sql` 中找到：\n\n```\nUSE master\n\
  GO\nBACKUP LOG WideWorldImporters TO DISK = '/var/opt/mssql/data/wwi_tailoflog.bak'\n\
  WITH INIT, NO_TRUNCATE, CHECKSUM\nGO\n```\n\n## 14. 恢复路径\n\n此时你有几种恢复路径。我们可以从初始备份恢复数据到备份和事务序列中的任何时间点。我不希望有任何数据丢失，并且希望尽快恢复运行。执行示例脚本\
  \ `restorewwiall.sql` 中的以下 T-SQL 语句：\n\n```\nUSE master\nGO\nRESTORE DATABASE WideWorldImporters\
  \ FROM DISK = '/var/opt/mssql/data/wwi.bak'\nWITH REPLACE, NORECOVERY\nGO\nRESTORE\
  \ DATABASE WideWorldImporters FROM DISK = '/var/opt/mssql/data/wwi_diff1.bak'\n\
  WITH NORECOVERY\nGO\nRESTORE LOG WideWorldImporters FROM DISK = '/var/opt/mssql/data/wwi_log3.bak'\n\
  WITH NORECOVERY\nGO\nRESTORE LOG WideWorldImporters FROM DISK = '/var/opt/mssql/data/wwi_tailoflog.bak'\n\
  WITH NORECOVERY\nGO\nRESTORE DATABASE WideWorldImporters WITH RECOVERY\nGO\n```\n\
  \n## 15. 验证\n\n如果一切成功，我期望我的四名球员仍然在我的数据库中。通过执行以下 T-SQL 语句 `mavstothenbafinals.sql`\
  \ 来验证：\n\n```\nUSE WideWorldImporters\nGO\nSELECT * FROM letsgomavs\nGO\n```\n\n\
  ![](img/index-413_1.jpg)\n\n结果应如图 8-8 所示。\n\n**图 8-8.** 在 SQL Server 中使用一系列备份恢复数据\n\
  \n这是一个漫长的序列，但它演示了如何使用一系列备份来满足你的恢复时间目标和恢复点目标。我向你展示的方案有一个问题是，在整个 `RESTORE` 序列期间，直到最后一步之前，数据库都处于离线状态（快速恢复不适用于还原）。还有其他方法可以让你以更联机的方式进行恢复，如下一节所述。\n\
  \n恢复序列的另一个选项是*时间点*恢复。时间点恢复在使用 `RESTORE LOG` T-SQL 语法时可用。当你使用时间点恢复时，可以使用 `WITH STOPAT=<time>`\
  \ 和 `RECOVERY`（因为你将使用此语句恢复数据库）选项来指定。你可以恢复整个数据库和日志备份序列，然后使用时间点恢复作为最后一条 `RESTORE LOG`\
  \ 语句。请查看我们关于时间点恢复的文档和示例：[`docs.microsoft.com/sql/relational-databases/backup-restore/restore-a-sql-server-database-to-a-point-in-time-full-recovery-model`](https://docs.microsoft.com/sql/relational-databases/backup-restore/restore-a-sql-server-database-to-a-point-in-time-full-recovery-model)。\n\
  \n\n# 文件、部分与页面恢复\n\n对于拥有多个文件或文件组的数据库，可能会遇到只需恢复特定文件或文件组，而无需恢复整个数据库的场景——前提是你已创建了文件或文件组的备份。你可以离线或在线恢复文件或文件组（在线恢复仅适用于企业版）。要查看恢复文件或文件组的示例和场景，请参阅文档：https://docs.microsoft.com/sql/relational-databases/backup-restore/file-restores-full-recovery-model。\n\
  \n如果你拥有如前一节所示的完整数据库备份序列，则可以分阶段还原数据库，称为*部分还原*。部分还原允许你按阶段将文件组联机，而不是整个数据库同时联机。这可能是你恢复时间目标策略中一个有趣的部分，因为你现在可以将\
  \ RTO 定义在文件组级别。\n\n例如，对于前一节恢复 WideWorldImporters 数据库的序列，我们可以将其更改为不同的恢复顺序。我们可以先恢复主文件组，稍后再恢复辅助文件组\
  \ `WWI_UserData`。\n\n**注意**：内存优化数据文件组必须与主文件组一起备份和恢复。因此，你需要创建一个包含主文件组和内存优化数据文件组的数据库备份，以及另一个包含辅助文件组的备份。\n\
  \n使用此技术允许用户更快地访问存储在主文件组中的数据，而 `WWI_UserData` 文件组可以在稍后时间联机。在线部分还原仅在企业版上受支持。你可以在我们的文档中了解更多关于完整恢复模型数据库的部分还原信息：https://docs.microsoft.com/sql/relational-databases/backup-restore/example-piecemeal-restore-of-database-full-recovery-model。\n\
  \n更精细恢复选项的最后一个示例是*页面级恢复*。如果数据库中的特定页面损坏，此选项允许你还原这些页面。而此功能最大的优点在于它可以在线完成（仅限企业版）。设想这样一种情况：某个特定页面或一组页面被报告损坏（可能是通过\
  \ `msg 824` 错误——我将在第 9 章详细解释，或者来自 `DBCC CHECKDB` 的检查结果）。\n\n### 第 8 章：SQL Server\
  \ 的高可用性与灾难恢复\n\n你可以使用本章到目前为止描述的方法，从数据库、差异、文件、文件组和/或日志备份中进行恢复。或者，你也可以使用这些备份仅还原所需的页面。在从数据库备份还原页面后，你仍然需要一个有效的日志备份序列来应用这些页面之后发生的所有变更。如果你能将问题定位到仅一组数据库页面，那么这是一个加速恢复时间目标极具吸引力的功能。\n\
  \n事实证明，SQL Server 提供了一些工具来帮助指导你。首先，在 `msdb` 数据库中存在一个名为 `suspect_pages` 的表，其中仅包含\
  \ SQL Server 发现已损坏的页面。其次，SQL Server Management Studio 中有一个名为“数据库恢复顾问”的工具，它基于在 `msdb`\
  \ 中找到的备份历史提供恢复建议，以指导你完成时间点恢复和数据库页面恢复。\n\n\n# 系统数据库恢复\n\n在本章的备份部分中，我提到你可以像用户数据库一样备份\
  \ `master`、`model` 和 `msdb`。现在，让我们逐个讨论恢复这些系统数据库备份的过程。\n\n## msdb\n\n这是三个数据库中最容易恢复的，因为即使此数据库不可访问或已损坏，SQL\
  \ Server 仍然可以启动。因此，在 SQL Server 运行时恢复 `msdb` 的过程与任何用户数据库完全相同。\n\n**提示** 我怎么知道这点？这很容易测试。首先，关闭\
  \ SQL Server。然后简单地重命名 `msdbdata.mdf` 文件并重新启动 SQL Server。你可以使用此方法来测试任何系统数据库不可用时 SQL\
  \ Server 的行为。\n\n## model\n\n如果 `model` 数据库存在问题但仍可访问，那么你应该能够在 SQL Server 在线时恢复该数据库。但是，如果\
  \ `model` 数据库无法启动，SQL Server 将尝试启动但会立即关闭。幸运的是，这里有一个很好的技巧来恢复 `msdb`。使用 `mssql-conf`\
  \ 启用跟踪标志 `3608`（它表示不要打开除 `master` 之外的任何数据库），然后启动 SQL Server。你应该能够进入并恢复 `msdb` 备份。完成此操作后，关闭\
  \ SQL Server，禁用跟踪标志，然后重新启动服务。\n\n## master\n\n与 `model` 类似，如果 `master` 数据库可用，你可以恢复\
  \ `master` 的备份，但必须在以“单用户模式”启动 SQL Server 之后（我们的文档在 [`docs.microsoft.com/sql/linux/sql-server-linux-troubleshooting-guide#start-sql-server-in-minimal-configuration-or-in-single-user-mode`](https://docs.microsoft.com/sql/linux/sql-server-linux-troubleshooting-guide#start-sql-server-in-minimal-configuration-or-in-single-user-mode)\
  \ 告诉了你如何操作）。恢复 `master` 后，SQL Server 默认会关闭。如果 `master` 数据库不可用，SQL Server 将立即无法启动。在某些情况下，如果你以“单用户模式”启动\
  \ SQL Server 并启用跟踪标志 `3607`（此跟踪标志告诉 SQL Server 不要恢复 `master`），你仍然可以恢复 `master` 的备份。\n\
  \n如果这些数据库的任何备份都不可用，而你需要它们正常运行怎么办？有一个选项可以从安装时的原始状态重建系统数据库。系统数据库存储在第 2 章提到的某个 `.sfp`\
  \ 文件中。重建这些数据库的方法记录在 [`docs.microsoft.com/sql/linux/sql-server-linux-troubleshooting-guide#rebuild-system-databases`](https://docs.microsoft.com/sql/linux/sql-server-linux-troubleshooting-guide#rebuild-system-databases)。\n\
  \n你可以在我们的文档中阅读有关此工具的更多信息：[`docs.microsoft.com/sql/relational-databases/backup-restore/restore-and-recovery-overview-sql-server#DRA`](https://docs.microsoft.com/sql/relational-databases/backup-restore/restore-and-recovery-overview-sql-server#DRA)。\n\
  \n你可以在我们的文档中阅读有关恢复页面的完整指南：[`docs.microsoft.com/sql/relational-databases/backup-restore/restore-pages-sql-server`](https://docs.microsoft.com/sql/relational-databases/backup-restore/restore-pages-sql-server)。\n\
  \n\n\n[数据库](https://docs.microsoft.com/sql/linux/sql-server-linux-troubleshooting-guide#rebuild-system-databases)。此过程实际上使用了`sqlservr`的一个名为`--force\
  \ setup`的命令行选项。重建系统数据库的问题在于，所有系统数据库会被一起重建。如果你有部分系统数据库的备份，你完全可以先重建系统数据库，然后再恢复已有的备份。人们很容易忘记，像`msdb`这样的系统数据库确实保存着重要信息，例如备份历史记录和\
  \ SQL Server 代理作业定义。\n\n### 第 8 章：SQL Server 的高可用性与灾难恢复\n\n`model`数据库通常不是问题，除非你对其进行了更改（这提醒我们应当备份任何用于修改`model`的`T-SQL`脚本），但`master`数据库则是个问题。丢失`master`数据库意味着丢失了登录名、链接服务器以及数据库信息。但同样，任何你创建的对象（如登录名）都应该保存在`T-SQL`脚本中并单独备份。并且，所有用户数据库都可以通过附加操作重新识别。你可以在我们的文档中阅读如何附加数据库：[`docs.microsoft.com/sql/relational-databases/databases/attach-a-database`](https://docs.microsoft.com/sql/relational-databases/databases/attach-a-database)。\n\
  \n## Always On 故障转移集群实例\n\n拥有可恢复的备份对于任何高可用性和灾难恢复策略都至关重要。此外，还有一些选项可以作为备份的补充，并提供更好的高可用性。SQL\
  \ Server 在一套名为`Always On`的功能中提供了这些特性（我将在本章中努力使用正确的术语。著名的 MVP 和 HADR 专家 Allan Hirt\
  \ 总是让我在这些术语上保持诚实）。其中一种解决方案通过使用共享存储来为 SQL Server 实例故障提供跨集群的高可用性。数据的保护必须通过非 Microsoft\
  \ 的硬件解决方案来实现共享存储和 SQL Server 备份。使用此解决方案的高可用性被称为`Always On 故障转移集群实例`。`Always On 故障转移集群实例`与`Always\
  \ On 可用性组`（将在下一节描述）有一个共同的主题。这些功能在 Linux 上的功能与在 Windows 上的 SQL Server 基本相同，但`配置有所不同`。这是由于在\
  \ Linux 和 Windows 上使这些技术工作所需的软件组件存在差异。话虽如此，`Always On 故障转移集群`和`Always On 可用性组`在\
  \ Linux 底层的工作方式，可能是我接触 SQL Server on Linux 以来遇到的差异较大的领域之一。SQL Server 引擎功能完全相同，但\
  \ Linux 处理故障转移等概念的方式在某些情况下与 Windows 大不相同。\n\n非常感谢本章及下一节内容来自微软专攻 HADR 的同事们，包括 Sourabh\
  \ Agarwal, Mihaela Blendea, Pradeep M, Brooks Remy 和 Arnav Singh。没有他们，我无法梳理清楚 SQL\
  \ Server on Linux 上`Always On`的复杂性和功能。\n\n##### 工作原理\n\n多年来，SQL Server 一直与 Windows\
  \ Server 故障转移集群（WSFC）协作提供故障转移集群解决方案。SQL Server on Linux 的`Always On 故障转移集群实例`（在本章剩余部分我将简称为`FCI`或`SQL\
  \ FCI`）依赖于一个类似的开源解决方案，名为`Pacemaker`（你可以在[`clusterlabs.org/pacemaker/doc`](http://clusterlabs.org/pacemaker/doc)阅读更多关于`Pacemaker`起源和细节的信息）。`Pacemaker`及其组件（如`Corosync`）由各种\
  \ Linux 发行版通过不同的附加组件来实现。例如，RHEL 支持一个名为`HA Add-On`的组件（`HA Add-On`的详细信息可以在[`access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/pdf/high_availability_add-on_overview/Red_Hat_Enterprise_Linux-7-High_Availability_Add-On_Overview-en-US.pdf`](https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/pdf/high_availability_add-on_overview/Red_Hat_Enterprise_Linux-7-High_Availability_Add-On_Overview-en-US.pdf)找到）。\n\
  \n### 注意\n\n我在与客户合作中得到的一个经验是，`RHEL HA Add-On`可能需要与标准的`RHEL`许可证分开购买。`SLES`对其`HA`扩展有相同的概念。你可以在[`www.suse.com/products/highavailability`](https://www.suse.com/products/highavailability)阅读更多关于`SLES`的信息。\n\
  \n一个`SQL FCI`是一组分布在多台计算机（节点）上的 SQL Server 实例，它们可以参与一个称为集群的故障转移高可用性解决方案。然而，在`FCI`中，只有一个\
  \ SQL Server 实例在节点之间主动使用共享存储上的数据库。\n\n这张来自文档[`docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-concepts#the-clustering-layer`](https://docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-concepts#the-clustering-layer)的示意图，如图\
  \ 8-9 所示，描述了与硬件交互以支持 SQL Server on Linux 上`FCI`的软件层次。\n\n![](img/index-419_1.jpg)\n\
  \n图 8-9. SQL Server on Linux 的`FCI`软件与硬件组件\n\n进一步观察图 8-9，`Corosync`是 Linux 服务器或`节点`之间通信的框架，`Pacemaker`会使用它。为了让`Pacemaker`组件能够根据故障转移条件做出在节点间故障转移资源的决策，需要一个`资源代理`。资源代理类似于\
  \ WSFC 中使用的资源 DLL，用于执行故障转移的健康检查，以协调 Windows 上的 SQL Server `FCI`。Linux 的 SQL Server\
  \ 资源代理随`mssql-server-ha`软件包一起安装。\n\n### 注意\n\n`SQL Server`资源代理现在已在 GitHub 上作为开源项目提供：[`github.com/Microsoft/mssql-server-ha`](https://github.com/Microsoft/mssql-server-ha)。由于我们的资源代理是开源的，其他供应商可以构建与`Linux`上的`SQL\
  \ Server`协同工作的`HADR`解决方案，以提供高可用性功能，作为`Pacemaker`的替代方案。其中一个例子是`HPE Serviceguard`。你可以在[`www.hpe.com/us/en/product-catalog/detail/pip.hpe-serviceguard-for-linux.376220.html`](https://www.hpe.com/us/en/product-catalog/detail/pip.hpe-serviceguard-for-linux.376220.html)阅读更多关于`HPE\
  \ Serviceguard`的信息。\n\n关于`Always On FCI`的详细文档参考可以在这里找到：[`docs.microsoft.com/sql/linux/sql-server-linux-ha-basics#pacemaker-for-always-on-availability-groups-and-failover-cluster-instances-on-linux`](https://docs.microsoft.com/sql/linux/sql-server-linux-ha-basics#pacemaker-for-always-on-availability-groups-and-failover-cluster-instances-on-linux)。\n\
  \n\n### 第 8 章：SQL Server 的高可用性与灾难恢复\n\n[`docs.microsoft.com/sql/linux/sql-server-linux-ha-basics#pacemaker-for-always-on-availability-groups-and-failover-cluster-instances-on-linux`](https://docs.microsoft.com/sql/linux/sql-server-linux-ha-basics#pacemaker-for-always-on-availability-groups-and-failover-cluster-instances-on-linux)\n\
  \nSQL Server 在 Linux 上的故障转移群集实例（FCI）与 Windows 上的版本有一些你需要了解的差异：\n\n*   由于 Windows\
  \ 上的 SQL Server 支持在同一服务器（节点）上运行多个实例，客户的一个常见配置是在集群中跨一系列节点（通常超过两个节点）部署多个 SQL FCI。Linux\
  \ 上的 SQL Server 仅支持在单个服务器上运行一个实例。并且 Pacemaker 仅支持在一个集群中使用 16 个节点。因此，你最多只能在跨节点的 FCI\
  \ 中部署 16 个 SQL Server 实例。\n*   虚拟 IP 地址的工作方式略有不同，并且像 `dm_os_cluster_nodes` 和 `dm_os_cluster_properties`\
  \ 这样的动态管理视图（DMV）在 Linux 上的 SQL Server 中不起作用。你会为 FCI 分配一个 IP 地址和名称，但其工作方式与 Windows\
  \ 上略有不同，如我之前引用的文档所述，其中描述了如何进行设置。\n*   你需要手动将服务主加密密钥从主节点复制到所有节点，因为 SQL Server 在每个节点上以名为\
  \ `mssql` 的本地用户身份运行。\n*   Windows 上的 SQL Server FCI 支持将 `tempdb` 数据库存放在本地磁盘（例如快速的\
  \ SSD 磁盘）上。这在 Linux 上的 SQL Server 中不被支持。所有系统数据库必须位于 `/var/opt/mssql/data` 目录中，该目录将位于\
  \ FCI 的共享存储上。\n*   Pacemaker 集群有一个称为 `fencing` 或 STONITH（“Shoot the Other Node in\
  \ the Head”）的概念。你不得不佩服 Linux！这个概念对于生产环境中的 Pacemaker 集群是必需的，它是集群管理行为异常的节点、防止影响整个集群的方式（因此称为\
  \ fencing，意为隔离节点）。Windows 故障转移群集没有这个概念。我将在关于 Always On 可用性组的部分再次提到 STONITH。\n\n\
  > **注意：** 在撰写本书时，`stonith` 在 Hyper-V 或 Azure 虚拟机上不受支持。你可以禁用它，但没有它，Pacemaker 就不会得到官方支持。Microsoft\
  \ 预计将来会解决此问题，因此请持续关注文档更新。\n\n## 设置与配置\n\n虽然在 Linux 上设置 SQL Server 的体验确实胜过 Windows，但坦率地说，在\
  \ Linux 上为 SQL Server 设置 FCI 颇具挑战性。Windows 故障转移群集提供了图形化向导、验证工具和流程。Linux 上的体验完全由命令行驱动，涉及多个不同的步骤，并且容易出错。\n\
  \n在 Linux 上设置 SQL Server FCI 的整体流程概述如下：\n\n*   至少在两台服务器（节点）上设置和配置你的 Linux 服务器。指定哪些节点将成为\
  \ `主节点` 和 `辅助节点`。\n*   在每个节点上安装 Linux 版 SQL Server，并根据 Linux 发行版安装特定的高可用性“附加组件”。\n\
  *   在主节点上创建你的用户数据库。\n*   在每个节点上准备 SQL Server：\n    *   在辅助节点上停止并禁用 SQL Server（`systemctl`\
  \ 有 `disable` 选项）。\n    *   在主节点上创建一个新的 SQL Server 登录名，并通过将此登录名置于 `sysadmin` 角色中来授予其执行系统存储过程\
  \ `sp_server_diagnostics` 的权限。\n    *   在主节点上停止并禁用 SQL Server。\n*   确保每个节点具有唯一的计算机名，并将所有节点及其\
  \ IP 地址和名称添加到所有节点的 `/etc/hosts` 文件中。\n*   配置供所有节点使用的共享存储，然后将数据库（包括系统数据库）从主节点移动到共享存储。生产场景中的共享存储通常是……\n\
  \n\n## 第 8 章 SQL Server 的高可用性与灾难恢复\n\nSQL Server 支持以下共享存储协议：\n\n*   iSCSI: `https://docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-configure-iscsi`\n\
  *   NFS: `https://docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-configure-nfs`\n\
  *   SMB: `https://docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-configure-smb`\n\
  \n*   在所有节点上安装并配置 Pacemaker。这包括向 Pacemaker 提供有关你先前创建的 SQL Server 登录名的信息。\n*   在所有节点上安装\
  \ SQL Server 资源代理。SQL Server 资源代理利用系统存储过程 `sp_server_diagnostics` 来做出故障转移决策。我将在下一节讨论\
  \ `sp_server_diagnostics`。\n*   为存储（你的共享存储）和网络在资源组中创建 FCI 资源。在此过程中，你将创建一个 FCI IP\
  \ 地址，该地址可作为 FCI 的一部分用于连接到 SQL Server，而不是使用节点 IP 地址。\n*   使用该资源组创建 FCI 资源。\n*   使\
  \ FCI 联机。\n*   现在，你应该能够通过 FCI IP 地址连接到 SQL Server。你可以手动故障转移 SQL Server 以确保连接正常工作。Pacemaker\
  \ 提供了手动故障转移的功能，如我们的文档 `https://docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-operate`\
  \ 中所示。\n\n这不太像提纲；更像是一本书，对吧？每个步骤都在 `https://docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-configure`\
  \ 中有详细记录。Windows 上的 SQL Server 故障转移群集步骤几乎同样多，但有工具可以加速此过程并帮助验证细节。\n\n归根结底，还是要回到本节开头提到的主题。Linux\
  \ 上的 SQL Server FCI 非常稳健，就像在 Windows 上一样，为 Linux 提供了一个出色的实例级高可用性解决方案。只是需要更仔细的准备和更多的时间来进行设置和配置。\n\
  \n**注意** 在安装和配置之后，可以向 `SQL Server FCI` 添加或从中移除节点。有关 RHEL 的步骤，请参阅我们的文档 `https://docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-red-hat-7-operate#add-a-node-to-a-cluster`。\n\
  \n### sp_server_diagnostics 与故障转移\n\nSQL FCI 的主要目的之一是在 SQL Server 实例或承载该实例的节点出现问题时，尽可能保持\
  \ SQL Server 实例的高可用性。那么，Pacemaker（或就此而言 WSFC）如何理解何时应该发生针对 SQL Server 的故障转移呢？我在本章前面描述的资源代理概念定义了该协议。\n\
  \n\n\n而 SQL Server 资源代理（很像 Windows 中的资源 DLL）通过使用系统存储过程 `sp_server_diagnostics` 来实现这一点。这个系统过程是另一个\
  \ `特殊` 系统存储过程的例子，因为其源代码并非 T-SQL，而是内置于引擎中的 C++ 代码。使用此系统存储过程的妙处在于，SQL Server 引擎可以包含关于引擎自身的健康检查（而不仅仅是实例是否在运行），以帮助为故障转移做出决策。`sp_server_diagnostics`\
  \ 是我们为引擎开发的最酷的功能之一。例如，即使未使用 Always On 技术，`sp_server_diagnostics` 也能生成可供用户使用的运行状况状态信息。我将在第\
  \ 9 章讨论如何实现这一点。\n\n## 灵活的故障转移策略\n\n`sp_server_diagnostics` 与故障转移协同工作的架构被称为 `灵活故障转移策略`。其概念是存在从最高级别（级别\
  \ 1 = SQL Server “已关闭”）到最低级别（级别 5 = “查询处理”不健康但 SQL 可能仍在运行）的故障转移决策层级。完整的故障转移策略列表及其配置方法可在\
  \ [`docs.microsoft.com/sql/sql-server/failover-clusters/windows/failover-policy-for-failover-cluster-instances`](https://docs.microsoft.com/sql/sql-server/failover-clusters/windows/failover-policy-for-failover-cluster-instances)\
  \ 找到。`sp_server_diagnostics` 生成的关于 SQL Server 运行状况的信息与这些策略相符。`sp_server_diagnostics`\
  \ 提供的运行状况信息的详细记录在 [`docs.microsoft.com/sql/relational-databases/system-stored-procedures/sp-server-diagnostics-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-stored-procedures/sp-server-diagnostics-transact-sql)。\n\
  \n由于 Linux 上的 SQL Server 与 Pacemaker 的耦合度不如 Windows 上与 WSFC 的耦合度那么紧密；因此并非所有策略都适用，并且配置它们的方法也有所不同。\n\
  \n让我解释一下每种策略（这些策略也适用于 Always On 可用性组）。策略 `编号` 越低，做出集群故障转移决定所需检查的粒度就越粗。随着编号增加，每项策略都包含其之前的所有策略。\n\
  \n**1** – `SERVER_UNRESPONSIVE_OR_DOWN`：如果 SQL Server 实例无响应（无法建立连接）或已关闭（进程未运行），则触发故障转移。\n\
  \n**3** – 策略 1 + `SERVER_CRITICAL_ERROR`：如果 `sp_server_diagnostics` 检测到 `关键系统` 错误，则触发故障转移。**这是默认策略。**\
  \ 关键系统错误包括诸如长时间运行的自旋锁争用问题和无法调度的调度器问题等情况。\n\n**4** – 策略 1, 3 + `SERVER_MODERATE_ERROR`：如果\
  \ `sp_server_diagnostics` 检测到 `资源` 错误，则触发故障转移。资源错误是指诸如 SQL Server 可用内存极低（由引擎管理的内存）等情况。\n\
  \n**5** – 策略 1, 3, 4 + `SERVER_ANY_QUALIFIED_ERROR`：如果 `sp_server_diagnostics` 检测到\
  \ `query_processing` 错误，则触发故障转移。`query_processing` 错误是指妨碍基本查询处理的情况，例如工作线程耗尽。\n\n\
  再次说明，每种策略都建立在之前策略的基础之上，因此策略 5 包含了所有 `sp_server_diagnostics` 错误。注意，这里没有列出策略 2。策略\
  \ 2 仅存在于 Windows 架构中，因为它与资源 DLL 的工作方式有关。对于许多用户来说，默认的 `policy=3` 就足够了。我认为除某些特定场景外，没有太多理由使用策略\
  \ 1，除非……\n\n\n\n\n策略 3 会导致不期望的故障转移发生。值得研究使用策略 4 或 5，因为存在 SQL Server 正在运行但使用默认策略不会发生故障转移的情况，但运行应用程序时存在相当严重的问题（例如工作线程耗尽），因此会出现\
  \ SQL Server “宕机”的表象。在这些情况下，故障转移可能会释放问题并使 SQL Server 具有更高的可用性。\n\n`提示` `sp_server_diagnostics`\
  \ 维护一个健康信息的日志（扩展事件文件），这对于调查故障转移（或未发生故障转移）的原因非常有用。该文件与错误日志文件保存在同一个 “log” 目录中（默认为\
  \ `/var/opt/mssql/log`）。\n\nPacemaker 的灵活故障转移策略称为 `monitoring policies`（监控策略），并通过一个名为\
  \ `pcs` 的程序进行配置（`pcs` 在我概述的设置和配置 SQL FCI 的步骤中使用）。如前所述，默认策略是 3。以下是一个将策略配置为 1 的示例命令：\n\
  \n```\npcs resource update <fci_resource_name> meta monitor_policy=1\n```\n\n当 Pacemaker\
  \ 决定进行故障转移时，它使用一个称为 `quorum`（仲裁）的概念来判断集群是否健康以及应故障转移到哪个节点（除非你手动将其故障转移到特定节点）。其核心思想是超过一半的节点必须保持健康才能维持集群的存活（尽管存在一种方法可以让仅两个节点的集群保持存活）。你可以在\
  \ [`access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/html/high_availability_add-on_overview/ch-operation-haao`](https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/html/high_availability_add-on_overview/ch-operation-haao)\
  \ 阅读更多关于 Pacemaker 和仲裁的信息。（阅读此文档可能需要 Red Hat 订阅）。\n\n## 第 8 章   SQL Server 的高可用性与灾难恢复\n\
  \n作为仲裁概念的一部分，Pacemaker（使用 Corosync）有一种方法来确保节点不会访问相同的共享资源，以避免数据损坏（尽管对于 SQL Server\
  \ 数据库和日志文件来说，这永远不会成为问题，因为 SQL Server 在主机扩展中使用建议性锁定，因此两个 SQL Server 进程无法同时打开相同的数据库和/或日志文件。你可以在\
  \ [`www.quora.com/Linux-What-is-the-difference-between-advisory-lock-and-mandatory-lock`](https://www.quora.com/Linux-What-is-the-difference-between-advisory-lock-and-mandatory-lock)\
  \ 阅读更多关于建议性锁定的信息）。正如本章前面提到的，保持集群健康的方法称为隔离（fencing）。而实现隔离的组件称为 STONITH。STONITH 可以将节点从集群中移除，以确保两个节点不会访问相同的共享资源，或者如果无法保证这一点，则可以停止整个集群。可以配置\
  \ STONITH 通过电源控制来实际关闭计算机。如果你熟悉 WSFC，你应该研读一下 Linux 上 Pacemaker 的仲裁和隔离是如何工作的。\n\n\
  以下是我发现的其他有助于进一步理解 Pacemaker 和 Corosync 的优质资源：\n\n-   [`www.juliosblog.com/pacemaker-101-2/`](http://www.juliosblog.com/pacemaker-101-2/)\n\
  -   [`access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/html/high_availability_add-on_overview/s1-pacemakeroverview-haao`](https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/html/high_availability_add-on_overview/s1-pacemakeroverview-haao)\n\
  \n\n\n[s1-pacemakeroverview-haao](https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/html/high_availability_add-on_overview/s1-pacemakeroverview-haao)\n\
  \n#### Always On 可用性组\n\n虽然 `Always On FCI` 是保护 SQL Server 实例高可用性的一项出色技术，但这种方法有两个缺点：\n\
  \n*   存储成为故障转移的中心点，因此您需要另一个解决方案（可能是硬件）来防止数据存储中断。\n*   集群中的其他 SQL Server 实例不能被主动使用，因为一次只有一个\
  \ SQL Server 可以访问共享存储上的数据库。\n\n### 第 8 章 SQL Server 的高可用性与灾难恢复\n\nSQL Server 提供了另一项功能作为替代方案，称为\
  \ **Always On 可用性组**。在本章的剩余部分，我将经常使用 **AG(s)** 这个术语来指代 Always On 可用性组。`AG` 在数据库级别提供容错能力和高可用性，并提供对数据的更广泛访问。在本章的这一部分，我将讨论该技术的工作原理，并为您提供关于如何设置、配置和测试\
  \ `AG` 的详细演练。\n\n我还将讨论 `AG` 的其他方面，包括数据库运行状况检测、性能注意事项、如何在其他节点上读取数据、自动修复功能以及不需要集群软件的新功能。对于那些在\
  \ Windows 上使用过 SQL Server `AG` 的用户来说，核心功能是相同的，但在 Linux 上存在一些配置、设置以及少数行为差异。在本章的剩余部分，我将尽力区分这些差异。\n\
  \n##### 工作原理\n\n`AG` 的旅程始于 SQL Server 2005 中一项名为 `数据库镜像` 的功能。在 SQL Server 2012 中，我们对原始架构进行了一些相当重大的修订，并推出了\
  \ Always On 系列，包括 `FCI` 和 `可用性组`（我们之前就有 `FCI`，但没有称之为 Always On）。\n\n与 `数据库镜像` 类似，`AG`\
  \ 不需要共享存储架构，而是跟踪事务日志中的更改，并将这些更改传输到其他 SQL Server 实例。\n\n一个 `AG` 由一个或多个数据库组成，这些数据库被复制到一个或多个\
  \ SQL Server，并且是一个故障转移单元。事务开始的原始 SQL Server 称为 **主副本**。接收更改的 SQL Server 称为 **辅助副本**。您将会看到，对于\
  \ Linux 上的 SQL Server，当 `AG` 引入集群时，需要第三种类型的副本，称为 **配置副本**。\n\n事实证明，支持 `AG` 的所有软件组件都在\
  \ SQL Server 本身之中。为了支持 `AG` 自动故障转移的概念，需要用到集群软件。对于 Windows，该软件是 `WSFC`。对于 Linux 上的\
  \ SQL Server，类似于前一节描述的 `FCI`，使用的是 `Pacemaker` 软件栈。\n\n我们的文档提供了一个非常好的可视化展示，向您说明 SQL\
  \ Server 的各个部分如何支持 `AG` 中副本的基本原理。请参考图 8-10。\n\n![](img/index-427_1.jpg)\n\n### 第\
  \ 8 章 SQL Server 的高可用性与灾难恢复\n\n**图 8-10** Always On 可用性组的架构和数据同步流程\n\n如图所示，SQL Server\
  \ 会在主副本上捕获事务日志更改，并通过一个独立的通信通道（称为 `数据库镜像端点`）将这些更改传输到辅助副本。在辅助副本上，更改首先被固化到本地事务日志，然后单独应用任何必要的重做恢复操作。`AG`\
  \ 的一大优势在于，因为它不是共享存储解决方案，所以可以连接到辅助副本，并且在更改应用重做恢复后可以读取数据。您可以读取\n\n\n## 同步选项\n\nAG\
  \ 为辅助副本提供了两种同步选项，也称为 *可用性模式*：\n\n- **同步 (sync)**： (`AVAILABILITY_MODE = SYNCHRONOUS_COMMIT`)\
  \ 事务在主副本上等待，直到该事务在主副本上提交，并且与该事务关联的日志记录在辅助副本上被固化。\n- **异步 (async)**： (`AVAILABILITY_MODE\
  \ = ASYNCHRONOUS_COMMIT`) 事务在主副本上提交时，会等待事务在主副本上提交，但不会等待事务在辅助副本上被固化。\n\n创建 AG 时，你为特定的辅助副本选择特定的可用性模式。这意味着一个\
  \ AG 可以有多个副本以及多种副本组合，包括同步和异步。可用性模式的选择完全取决于你的 RPO 需求。使用同步副本旨在实现几乎零数据丢失，因为副本将与主副本事务日志中所做的更改保持同步。使用同步复制的代价是传输日志记录更改并在辅助副本的事务日志上固化它们所需的时间。异步副本最适用于不需要最新更改但仍希望读取接近主副本的辅助副本数据的应用程序。异步副本的另一个用途是灾难恢复场景，其中副本位于具有延迟的网络上，使其不适合作为同步副本候选。\n\
  \n与 AG 的可用性模式密切相关的是 *故障转移模式*。我将在本章的下一节讨论这一点。\n\n## 集群与可用性组\n\nAG 本身提供了使副本与主副本的更改保持同步的机制。然而，要使\
  \ AG *高度可用*，需要智能判断主副本是否不可用以切换到辅助副本。这种智能由类似 FCI 的集群软件提供。就像 FCI 一样，对于 Linux 上的 SQL\
  \ Server，使用 Pacemaker 软件堆栈来提供集群故障转移功能。\n\n创建 AG 并指定同步副本时，你还可以选择选项 `FAILOVER_MODE=AUTOMATIC`。选择此选项后，SQL\
  \ Server 与 Pacemaker 可以决定故障转移到辅助副本，前提是该副本*已完全同步*主副本事务日志上当前的所有更改。在这里，“同步”意味着主副本上所有已提交的事务都已在辅助副本的事务日志上固化。然后，如果需要发生故障转移，则在辅助副本上运行恢复，以使所有事务保持一致，这样辅助副本现在就可以作为主副本服务。当集群软件与\
  \ SQL Server 资源代理决定故障转移到辅助副本时，该副本将成为新的主副本。\n\n在 SQL Server 2017 之前，如果辅助同步副本脱机或未与主副本同步，SQL\
  \ Server 会允许事务在主副本上继续，但 SQL Server 不允许发生自动故障转移，因为...\n\n\n辅助副本可能未处于同步状态。动态管理视图 `sys.dm_hadr_database_replica_states`\
  \ 可用于确定可用性组（AG）的当前同步状态，相关文档详见 [`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-hadr-database-replica-states-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-hadr-database-replica-states-transact-sql)。\n\
  \nLinux 上的 SQL Server 与 Windows 故障转移群集的集成程度并不相同，因此确保自动故障转移的策略和逻辑可能略有差异。从 SQL Server\
  \ 2017 CU1 开始，SQL Server 引入了一种名为 `配置副本` 的新副本类型，它用于在仅配置了一个主副本和一个同步辅助副本时，帮助做出决策以提供高可用性和数据保护。重要的是要知道，配置副本可以是\
  \ SQL Server Express 版本，这是 SQL Server 的一个免费许可证版本。此外，SQL Server 2017 引入了一个名为 `REQUIRED_SYNCHRONIZED_SECONDARIES_TO_COMMIT`\
  \ 的新 AG 选项。对于 Linux 上的 SQL Server，此选项在您为 AG 配置 Pacemaker 群集时建立。它决定了需要多少个副本来确保正确的数据保护和高可用性。对于\
  \ Linux 上的 SQL Server，此设置在为 AG 设置群集时会自动配置，但可以使用 Pacemaker 命令覆盖。\n\n**注意**：此选项在 Windows\
  \ 上的 SQL Server 2017 的 AG 中同样存在，但默认值为 0，即我之前描述的 SQL Server 2017 之前的行为。这种行为意味着，即使配置的辅助副本不可用，主副本上的事务也会继续，但不允许自动故障转移。您可以将此值设置为\
  \ > 0，以强制主副本上的事务等待，直到一个或多个辅助副本可用且同步。\n\n您可以在 [`docs.microsoft.com/sql/linux/sql-server-linux-availability-group-ha`](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-ha)\
  \ 阅读更多关于如何配置此选项或高可用性和数据保护所需的各种配置组合的信息。对于许多用户来说，一个非常常见的设置是：一个主副本、一个同步副本和一个配置副本（可能还有几个异步副本，它们不参与高可用性和数据保护要求的计算）。这可以提供一个良好的、具有成本效益的高可用性和数据保护选项。但是，如果辅助副本脱机，默认行为很像\
  \ SQL Server 2017 之前：主副本继续运行，但无法进行自动故障转移。如果您在此配置中将 `REQUIRED_SYNCHRONIZED_SECONDARIES_TO_COMMIT`\
  \ 更改为 1，它提供了最佳的数据保护选项，但不是最大的高可用性。在此场景中，主副本上的事务将等待辅助副本同步。此外，在发生自动故障转移到辅助副本的情况下，新的主副本必须等待新的辅助副本联机并同步。一个可用性更高的数据保护方案是：一个主副本和两个同步辅助副本。\n\
  \n群集决策的完成方式类似于 FCI（故障转移群集实例），使用 `sp_server_diagnostics` 和我在本章前一节描述的灵活故障转移策略。我将在本章后面讨论另一个称为数据库运行状况检测的故障转移逻辑选项。\n\
  \n我工程团队的同事 Sourabh Agarwal 向我提供了关于 Linux 上 SQL Server AG 的一些其他提示，这些提示与 Windows 上的\
  \ SQL Server 不同：\n\n\n### 第 8 章：SQL Server 的高可用性与灾难恢复\n\n## 分布式可用性组\n\nSQL Server\
  \ 可用性组（AG）提供了一个独特的概念：分布式可用性组。分布式可用性组是一种特殊类型的可用性组，它横跨两个可用性组。请参考图 8-11，该图可在 Microsoft\
  \ 文档中找到：[`docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups#understand-distributed-availability-groups`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups#understand-distributed-availability-groups)。\n\
  \n其概念是，可用性组 `AG1` 的辅助副本和可用性组 `AG2` 的主副本都从 `AG1` 的主副本接收更新。分布式可用性组为多站点远程配置（例如在远程地点设有数据中心的组织）提供了\
  \ AG 功能。有关在不同场景下使用分布式可用性组的更多信息，请查看我们的文档：[`docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups#distributed-availability-group-usage-scenarios`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups#distributed-availability-group-usage-scenarios)。\n\
  \n## 设置与配置\n\n设置用于高可用性和数据保护的可用性组，其高层步骤如下（请参阅文档：[`docs.microsoft.com/sql/linux/sql-server-linux-availability-group-configure-ha`](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-configure-ha)）。\n\
  \n*   与 Windows 上不同，您无法在安装了 FCI 的 SQL Server 实例上设置 AG。这是我们未来可能考虑支持的一个选项，但对于 SQL\
  \ Server 2017 尚不支持。\n*   由于 `STONITH` 和隔离机制的工作方式，您不应将异步副本包含在 `Pacemaker` 集群中。我将在本章后面部分向您展示如何将\
  \ AG 副本添加到集群中。请勿将异步副本添加到集群，因为当 `STONITH` 启用时，集群会遇到问题。这不会影响集群操作，因为您无法自动故障转移到异步副本。\n\
  *   集群的大多数操作无法通过 `T-SQL` 完成，例如手动故障转移操作。您必须使用 `Pacemaker` 命令，我将在本章后面部分向您展示如何操作。此规则的一个例外是\
  \ `强制故障转移`。对于这种情况，您将使用 `T-SQL`，这在我们的文档中有描述：[`docs.microsoft.com/sql/linux/sql-server-linux-availability-group-failover-ha`](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-failover-ha)。\n\
  \n1.  在每个 `节点` 上安装 Linux 和 Linux 版 SQL Server，这些节点将...\n\n\n参与 AG*副本集*（一个参与 AG 的节点）。在\
  \ Linux 上，为确保数据保护和高可用性所需的最少副本数量为三：一个主副本、一个辅助副本和一个配置副本。\n1.  跨这些 SQL Server 副本创建并配置\
  \ AG。\n2.  使用 Pacemaker 创建集群。\n3.  将 AG 作为资源添加到集群中。\n\n根据您环境的副本架构，有几种选择。确保高可用性所需的最少副本数量是三个，但同样，其中一个是配置副本。\n\
  \n让我们通过一个示例更详细地了解其工作原理和外观。我需要事先说明，完成此示例需要遵循许多步骤。\n\n**注意** 为简化这些步骤，在本示例中请以 `sa`\
  \ 或其他 `sysadmin` 登录身份连接并运行所有 `t-sql` 语句。您可以使用您喜欢的 `SQL Server` 工具来运行这些语句。我在 `linux`\
  \ 服务器上使用了 `sqlcmd`。\n\n## 安装 Linux 和 SQL Server\n1.  我在 Azure 上安装了三台 RHEL 7.5 的虚拟机：`bwsqllinuxag1`、`bwsqllinuxag2`和`sqllinuxcfgag`（为了节省成本，我将这台虚拟机配置为仅两个\
  \ CPU）。我将所有这些虚拟机都放在 Azure 资源组 `bwsqllinuxags` 中，因此它们自动属于同一个虚拟网络（`vnet`）。我将称每台服务器为*节点*和*副本*。`bwsqllinuxag1`\
  \ 是主副本，`bwsqllinuxag2` 是辅助副本，`sqllinuxcfgag` 是配置副本。\n    *   我在所有这些服务器上打开了 22 端口，以便可以从我的笔记本电脑使用\
  \ `ssh` 客户端。\n    *   运行 `sudo yum -y update` 以将所有软件包更新至最新。\n    ![](img/index-433_1.png)\n\
  \    *   在每台服务器上配置 hosts 文件（注意：确保 Linux 服务器在 `/etc/hostname` 中有一个有效的主机名，而不是 `localhost`），使其包含每台服务器的所有\
  \ IP 地址和主机名。对于我的 Azure 虚拟机，由于它们都在 Azure 的同一个虚拟网络中，因此这是每台虚拟机的私有 IP。我的 `/etc/hosts`\
  \ 文件在每台服务器上如图 8-12 所示。\n    ***图 8-12.** `/etc/hosts` 文件示例*\n2.  安装 SQL Server。由于我的服务器使用的是\
  \ RHEL，我遵循了我在第 2 章中记录的步骤。您也可以在文档 [`docs.microsoft.com/sql/linux/quickstart-install-connect-red-hat`](https://docs.microsoft.com/sql/linux/quickstart-install-connect-red-hat)\
  \ 中找到这些说明。请确保安装 SQL Server，打开防火墙端口，并安装 Linux 的命令行工具。`bwsqllinuxag1` 和 `bwsqllinuxag2`\
  \ 都运行企业版，而 `sqllinuxcfgag` 使用的是 `SQL Express Edition`。\n\n## 跨这些 SQL Servers 副本创建并配置\
  \ AG\n**注意** 可以使用 `SQL Server Management Studio (ssMs)` 执行本节中的部分步骤。了解更多请访问 [`docs.microsoft.com/sql/linux/sql-server-linux-create-availability-group#create-the-availability-group`](https://docs.microsoft.com/sql/linux/sql-server-linux-create-availability-group#create-the-availability-group)。我将向您展示使用所有\
  \ bash shell 脚本和 `t-sql` 的完整步骤。\n1.  在每台节点上，使用以下从 bash shell 运行的命令为 Linux 上的 SQL\
  \ Server 启用 AG，如示例脚本 **enableag.sh** 所示（请记住，您必须先执行 `chmod u+x` 才能执行 `.sh` 脚本）：\n\
  \    ```\n    sudo /opt/mssql/bin/mssql-conf set hadr.hadrenabled 1\n    sudo systemctl\
  \ restart mssql-server\n    ```\n\n\n\n# SQL Server 的高可用性与灾难恢复\n\n2. 存在一个扩展事件会话来跟踪\
  \ AG（可用性组）状态。使用以下 T-SQL 语句（可在示例脚本 `enableagxe.sql` 中找到）在每个节点上启动此会话：\n\n```sql\n\
  ALTER EVENT SESSION AlwaysOn_health ON SERVER WITH (STARTUP_STATE=ON);\nGO\n```\n\
  \n3. 使用以下 T-SQL 语句（可在 `dbmloginuser.sql` 中找到）为数据库镜像端点**在每个副本上**创建登录名和用户：\n\n```sql\n\
  CREATE LOGIN dbm_login WITH PASSWORD = 'Sql2017isfast'\nGO\n\nCREATE USER dbm_user\
  \ FOR LOGIN dbm_login\nGO\n```\n\n4. 在第[7]章中，你已经了解了 SQL Server 中的主密钥和证书，这些知识即将派上用场。正如本节开头所述，AG\
  \ 通过*数据库镜像端点*进行通信。这些端点上的身份验证在 SQL Server 中使用证书来实现。因此，第一步是使用以下 T-SQL 语句（可在示例脚本 `primaryagcert.sql`\
  \ 中找到）在**主副本**上（在我的场景中是 `sqllinuxag1`）创建一个证书（替换为你自己的密码）：\n\n```sql\nCREATE MASTER\
  \ KEY ENCRYPTION BY PASSWORD = 'Sql2017isfast'\nGO\n\nCREATE CERTIFICATE dbm_certificate\
  \ WITH SUBJECT = 'dbm'\nGO\n\nBACKUP CERTIFICATE dbm_certificate\nTO FILE = '/var/opt/mssql/data/dbm_certificate.cer'\n\
  WITH PRIVATE KEY (\n    FILE = '/var/opt/mssql/data/dbm_certificate.pvk',\n    ENCRYPTION\
  \ BY PASSWORD = 'Sql2017isfast'\n)\nGO\n```\n\n5. 如果成功，此命令不会返回任何结果。现在，你已在主节点副本上创建了一个证书文件\
  \ (`dbm_certificate.cer`) 和一个私钥文件 (`dbm_certificate.pvk`)。你需要将这些文件复制到所有节点上的相同位置\
  \ (`/var/opt/mssql/data`)。使用由相同密钥保护的相同证书，允许所有节点通过通信端点相互进行身份验证。首先，使用如下命令（可在示例脚本 `copycertkeys.sh`\
  \ 中找到）将文件复制到为 Azure VM 创建的 Linux 用户的主目录：\n\n```bash\nsudo scp /var/opt/mssql/data/dbm_certificate.cer\
  \ thewandog@bwsqllinuxag2:\nsudo scp /var/opt/mssql/data/dbm_certificate.pvk thewandog@bwsqllinuxag2:\n\
  ```\n\n系统将提示你输入密码以复制这些文件。此示例将文件从主副本复制到辅助副本。**请执行相同的操作，但将目标服务器替换为配置副本所在主机的名称**。现在，这些文件应存在于其他副本节点的主目录中。\n\
  \n6. 现在需要将这些文件移动到每个副本节点上的 `/var/opt/mssql/data` 目录，并将权限更改为 `mssql:mssql`，如下列 shell\
  \ 脚本所示（可在示例 `movecertkeys.sh` 中找到）。**此脚本应在辅助副本和配置副本节点的 bash shell 中运行**。\n\n```bash\n\
  sudo mv dbm_certificate.cer /var/opt/mssql/data\nsudo chown mssql:mssql /var/opt/mssql/data/dbm_certificate.cer\n\
  sudo mv dbm_certificate.pvk /var/opt/mssql/data\nsudo chown mssql:mssql /var/opt/mssql/data/dbm_certificate.pvk\n\
  ```\n\n7. 现在，你将使用以下 T-SQL 语句（可在 `secondaryagcert.sql` 中找到）在**辅助**节点和**配置**节点上创建密钥和证书，这些语句引用了复制到每个节点的文件。请注意，对于这些语句，我是从从主副本复制过来的文件创建证书，但使用\
  \ `DECRYPTION` 关键字来解密供 SQL Server 使用的证书。\n\n```sql\nCREATE MASTER KEY ENCRYPTION\
  \ BY PASSWORD = 'Sql2017isfast'\nGO\n\nCREATE CERTIFICATE dbm_certificate\nAUTHORIZATION\
  \ dbm_user\nFROM FILE = '/var/opt/mssql/data/dbm_certificate.cer'\nWITH PRIVATE\
  \ KEY (\n    FILE = '/var/opt/mssql/data/dbm_certificate.pvk',\n    DECRYPTION BY\
  \ PASSWORD = 'Sql2017isfast'\n)\nGO\n```\n\n8. 现在，你需要创建一个用于通信的端点。AG 用于通信的端口与用于登录和\
  \ T-SQL 查询的标准 SQL Server 端口不同。正如我在前面的步骤中所说，\n\n\n\n此端点被称为*数据库镜像端点*。请在主副本和辅助副本上使用\
  \ `endpoint.sql` 文件中提供的以下 T-SQL 语句。由于我们在此配置副本中使用的是 SQL Server Express 版本，我们需要一个略有不同的版本，我将在下一步中展示给你。你不必须使用端口\
  \ 5022，但它是数据库镜像端点常用的端口。\n\n```sql\nCREATE ENDPOINT [Hadr_endpoint]\nAS TCP (LISTENER_IP\
  \ = (0.0.0.0), LISTENER_PORT = 5022)\nFOR DATA_MIRRORING (\n    ROLE = ALL,\n  \
  \  AUTHENTICATION = CERTIFICATE dbm_certificate,\n    ENCRYPTION = REQUIRED ALGORITHM\
  \ AES\n)\nGO\nALTER ENDPOINT [Hadr_endpoint] STATE = STARTED\nGO\nGRANT CONNECT\
  \ ON ENDPOINT::[Hadr_endpoint] TO [dbm_login]\nGO\n```\n\n## 第 8 章 SQL Server 的高可用性与灾难恢复\n\
  \n### 9. 如果配置副本使用的是 SQL Server Express 版本\n那么 ROLE 值只能设置为 WITNESS。请使用示例脚本 `cfgendpoint.sql`\
  \ 中提供的以下 T-SQL 语句：\n\n```sql\nCREATE ENDPOINT [Hadr_endpoint]\nAS TCP (LISTENER_IP\
  \ = (0.0.0.0), LISTENER_PORT = 5022)\nFOR DATA_MIRRORING (\n    ROLE = WITNESS,\n\
  \    AUTHENTICATION = CERTIFICATE dbm_certificate,\n    ENCRYPTION = REQUIRED ALGORITHM\
  \ AES\n)\nGO\nALTER ENDPOINT [Hadr_endpoint] STATE = STARTED\nGO\nGRANT CONNECT\
  \ ON ENDPOINT::[Hadr_endpoint] TO [dbm_login]\nGO\n```\n\n### 10. 我们文档中有一条微妙的注释指出，为数据库镜像连接指定的端口需要在\
  \ Linux 的防火墙中开放。\n我运行了以下命令来查看我各个节点上防火墙开放了哪些端口：\n\n```bash\nsudo firewall-cmd --list-ports\n\
  ```\n\n列出的唯一端口是 1433，这是用于 SQL Server 连接和查询的主要端口。因此，我从 bash shell 中运行了示例脚本 `dbmirrorfirewall.sh`\
  \ 中的以下命令（确保 shell 脚本已使用 `chmod u+x dbmirrorfirewall.sh` 标记为可执行）：\n\n```bash\nsudo\
  \ firewall-cmd --zone=public --add-port=5022/tcp --permanent\nsudo firewall-cmd\
  \ --reload\n```\n\n### 11. 现在是时候使用示例脚本 `createag.sql` 中的以下 T-SQL 语句来创建可用性组了。\n此\
  \ T-SQL 脚本应在 `主副本`（在我的示例中为 `bwsqllinuxag1`）上运行：\n\n```sql\nCREATE AVAILABILITY GROUP\
  \ [footballag]\nWITH (CLUSTER_TYPE = EXTERNAL)\nFOR REPLICA ON\nN'bwsqllinuxag1'\
  \ WITH (\n    ENDPOINT_URL = N'tcp://bwsqllinuxag1:5022',\n    AVAILABILITY_MODE\
  \ = SYNCHRONOUS_COMMIT,\n    FAILOVER_MODE = EXTERNAL,\n    SEEDING_MODE = AUTOMATIC,\n\
  \    SECONDARY_ROLE (ALLOW_CONNECTIONS = ALL)\n),\nN'bwsqllinuxag2' WITH (\n   \
  \ ENDPOINT_URL = N'tcp://bwsqllinuxag2:5022',\n    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,\n\
  \    FAILOVER_MODE = EXTERNAL,\n    SEEDING_MODE = AUTOMATIC,\n    SECONDARY_ROLE\
  \ (ALLOW_CONNECTIONS = ALL)\n),\nN'sqllinuxcfgag' WITH (\n    ENDPOINT_URL = N'tcp://sqllinuxcfgag:5022',\n\
  \    AVAILABILITY_MODE = CONFIGURATION_ONLY\n)\nGO\nALTER AVAILABILITY GROUP [footballag]\
  \ GRANT CREATE ANY DATABASE\nGO\n```\n\n一旦你运行此命令，该可用性组就应该出现在主副本上的 `sys.availability_groups`\
  \ 和 `sys.availability_replicas` 目录视图中。\n\n你可能会注意到的一个问题是，即使辅助副本尚未准备好接受连接，主副本也会立即开始尝试连接它们。因此，你可能会在主副本的\
  \ ERRORLOG 中看到类似以下的消息：\n\n在尝试建立到 ID 为 [D36B7503-2EFB-467C-AD8A-4CE2B9E63958] 的可用性副本\
  \ 'bwsqllinuxag2' 的连接时发生超时。可能存在网络或防火墙问题，或者为副本提供的端点地址不是主机服务器实例的数据库镜像端点。\n\n在尝试建立到\
  \ ID 为 [AC5F02C0-A481-4760-BA44-BF7E9FF83F9D] 的可用性副本 'sqllinuxcfgag' 的连接时发生超时。可能存在网络或防火墙问题，或者为副本提供的端点地址不是主机服务器实例的数据库镜像端点。\n\
  \n\n\n# 第 8 章 SQL Server 的高可用性与灾难恢复\n\n主机服务器实例的端点。这并不意味着 `CREATE AVAILABILITY GROUP`\
  \ 操作失败。它只是意味着辅助副本尚未设置。请按照下一步操作，您将看到具体方法。\n\n## 12. 在辅助副本和配置副本上运行以下 T-SQL 语句来设置可用性组并配置副本，这些语句可在辅助副本和配置副本的\
  \ `joinag.sql` 文件中找到：\n\n注意：配置副本上不允许使用 grant 语句，因此仅在配置副本上运行 `alter availability\
  \ group` 语句。\n\n```\nALTER AVAILABILITY GROUP [footballag] JOIN WITH (CLUSTER_TYPE\
  \ = EXTERNAL)\nGO\n-- 请勿在配置副本上运行此语句\nALTER AVAILABILITY GROUP [footballag] GRANT\
  \ CREATE ANY DATABASE\nGO\n```\n\n当这些语句执行后，主副本、辅助副本和配置副本就“连接”起来了。您将在主副本的 ERRORLOG\
  \ 中看到这些语句：\n\n```\nA connection for availability group 'footballag' from availability\
  \ replica 'bwsqllinuxag1' with id  [B8438077-BA82-4AD1-A5B6-6601ECA82C9E] to 'bwsqllinuxag2'\
  \ with id [D36B7503-2EFB-467C-AD8A-4CE2B9E63958] has been successfully established.\
  \  This is an informational message only. No user action is required.\n```\n\n```\n\
  A connection for availability group 'footballag' from availability replica 'bwsqllinuxag1'\
  \ with id  [B8438077-BA82-4AD1-A5B6-6601ECA82C9E] to 'sqllinuxcfgag' with id [AC5F02C0-A481-4760-BA44-BF7E9FF83F9D]\
  \ has been successfully established.  This is an informational message only. No\
  \ user action is required.\n```\n\n## 13. 即将大功告成！请记住，可用性组的定义是一个或多个数据库复制到另一个节点并作为一个故障转移单元。到目前为止，创建的只是三个知道如何相互通信的\
  \ SQL Server 实例。因此，第一步是为可用性组选择一个或多个数据库并创建完整数据库备份。连接到主副本运行以下 T-SQL 语句，这些语句可在示例 `dbag.sql`\
  \ 中找到：\n\n```\nCREATE DATABASE [cowboysrule]\nGO\nALTER DATABASE [cowboysrule] SET\
  \ RECOVERY FULL\nGO\nBACKUP DATABASE [cowboysrule] TO DISISK = N'/var/opt/mssql/data/cowboysrule.bak'\n\
  GO\n```\n\n## 14. 现在，通过在主副本上运行以下 T-SQL 语句将数据库添加到可用性组，这些语句可在示例脚本 `dbjoinag.sql` 中找到：\n\
  \n```\nALTER AVAILABILITY GROUP [footballag] ADD DATABASE [cowboysrule]\nGO\n```\n\
  \n## 15. 因为我们在创建可用性组时使用了 `SEEDING_MODE = AUTOMATIC` 选项，SQL Server 将自动创建新数据库并将任何数据复制到辅助副本。您可以通过在辅助副本上运行以下\
  \ T-SQL 语句来查看这一点，这些语句可在示例脚本 `listdbs.sql` 中找到：\n\n```\nSELECT name FROM sys.databases\n\
  GO\n```\n\n如果一切顺利，`cowboysrule` 将出现在此列表中。并且因为我们之前在创建可用性组时使用了 `SECONDARY_ROLE` 选项，我们甚至可以在辅助副本上从\
  \ `cowboysrule` 数据库读取数据。\n\n恭喜！您刚刚在 Linux 上的 SQL Server 创建并设置了一个 Always On 可用性组。还剩一件事要向您展示。在这种情况下，故障转移是如何工作的？如果您愿意，请继续阅读下一节，设置\
  \ Pacemaker 集群并将可用性组添加到集群中。\n\n## 使用 Pacemaker 创建集群\n\n注意：要继续完成此示例，您必须拥有 Red Hat\
  \ 的订阅，因为高可用性附加组件是 Pacemaker 在生产环境中工作所必需的。\n\n请按照我展示的步骤操作，为 RHEL 创建 Pacemaker 集群，相关文档位于\
  \ [`docs.microsoft.com/sql/linux/sql-server-linux-availability-group-cluster-rhel`](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-cluster-rhel)。\n\
  \n\n\n# 第 8 章 SQL Server 的高可用性和灾难恢复\n\n## 注意事项\n\n注意：如我们的文档所述，生产环境中的 Pacemaker 集群需要\
  \ stonith，但在这些示例中我将禁用 stonith。这是因为目前 Azure 虚拟机不支持该功能（但在我撰写本章时，相关工作正在进行中！）\n\n1.\
  \  **在每个节点上**，从 bash shell 运行以下命令，并输入您的订阅用户名和密码（对于您自己的 Linux 服务器，您可能已经完成此操作）：\n\
  \    ```\n    sudo subscription-manager register\n    ```\n\n2.  您的包含高可用性附加组件的订阅有一个关联的\
  \ poolid。您可以从 bash shell 使用以下命令找到该 poolid。该功能的名称是“Red Hat Enterprise Linux High\
  \ Availability (for RHEL Server)”：\n    ```\n    sudo subscription-manager list\
  \ --available\n    ```\n\n3.  使用 poolid，从 bash shell 在**每个节点上**运行以下命令以附加正确的订阅。出于隐私原因，我没有列出我的\
  \ poolid，但命令如下所示：\n    ```\n    sudo subscription-manager attach --pool=<pool id>\n\
  \    ```\n\n4.  现在启用仓库以便安装 Pacemaker，在所有节点上从 bash shell 运行以下命令：\n    ```\n    sudo\
  \ subscription-manager repos --enable=rhel-ha-for-rhel-7-server-rpms\n    ```\n\n\
  5.  Pacemaker 需要节点间通信，因此在所有节点上从 bash shell 运行以下命令以打开防火墙端口：\n    ```\n    sudo firewall-cmd\
  \ --permanent --add-service=high-availability\n    sudo firewall-cmd --reload\n\
  \    ```\n\n6.  现在使用以下命令在所有节点上安装 Pacemaker：\n    ```\n    sudo yum install pacemaker\
  \ pcs fence-agents-all resource-agents\n    ```\n\n7.  Pacemaker 在 Linux 上安装了一个需要密码的用户。在所有节点上运行此命令以创建密码。请务必在所有节点上提供相同的密码：\n\
  \    ```\n    sudo passwd hacluster\n    ```\n\n8.  在所有节点上运行以下命令以启用并启动 Pacemaker\
  \ 服务：\n    ```\n    sudo systemctl enable pcsd\n    sudo systemctl start pcsd\n\
  \    sudo systemctl enable pacemaker\n    ```\n\n![](img/index-443_1.png)\n\n9.\
  \  现在是创建集群的时候了。运行如下所示的 bash shell 命令，但请使用您之前在示例中设置的节点以及您在第 7 步为 Pacemaker 设置的密码（您的密码位于脚本中的`-p`参数之后）。我提供了一个名为`createcluster.sh`的示例脚本，您可以将其作为模板使用。在此示例中，`footballcluster`是集群名称，但您可以输入自己的名称。您只需要在**主节点**上运行此命令：\n\
  \    ```\n    sudo pcs cluster auth bwsqllinuxag1 bwsqllinuxag2 sqllinuxcfgag -u\
  \ hacluster -p Sql2017isfast\n    sudo pcs cluster setup --name footballcluster\
  \ bwsqllinuxag1 bwsqllinuxag2 sqllinuxcfgag\n    sudo pcs cluster start --all\n\
  \    ```\n\n    运行此命令的输出应类似于图 8-13。\n\n**图 8-13 在 Linux 上创建 Pacemaker 集群**\n\n##\
  \ 注意事项\n\n注意：`pcs`（Pacemaker 配置系统）是一个用于与 Pacemaker 集群交互的命令行界面。请习惯使用它，因为它在许多场景中都很有用，并且在某些情况下会使用，就像在\
  \ Windows 上的 SQL Server 中使用 AG 的`T-SQL`一样。\n\n10. 您可能还记得我在前面的章节中告诉过您，我们将 SQL Server\
  \ 的安装过程分成了几个包。现在该安装另一个了。这个包是 SQL Server HA 资源代理，它被开发用于与 Pacemaker 交互，也是我在本章前面提到的内容。在所有节点上使用以下命令安装此代理：\n\
  \    ```\n    sudo yum install mssql-server-ha\n    ```\n\n11. 正如我之前提到的，目前 STONITH\
  \ 在 Azure 虚拟机上不受支持，因此我将在主节点上使用以下命令将其禁用：\n\n\n\n# 注意\n`pcs`程序存在于所有集群上，但命令执行可以在节点中的任何集群上进行，因为`pcs`命令适用于整个集群。\n\
  ```\nsudo pcs property set stonith-enabled=false\n```\n# 第八章 SQL Server 的高可用性与灾难恢复\n\
  文档建议设置一些与故障转移超时和刷新检查间隔相关的 Pacemaker 属性。\n我建议您遵循这些建议，从主节点上如示例脚本`clusterproperties.sh`所示，在\
  \ bash shell 中运行以下命令。这些建议及其背后的细节可以在以下网址找到：[`docs.microsoft.com/sql/linux/sql-server-linux-availability-group-cluster-rhel`](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-cluster-rhel)。\n\
  ```\nsudo pcs property set cluster-recheck-interval=2min\nsudo pcs property set\
  \ start-failure-is-fatal=true\n```\n## 在集群中添加 AG 作为资源\n我们已经在 SQL Server 中创建了 AG，并在所有节点上创建了\
  \ Pacemaker 集群。\n为了将系统结合在一起，我们需要在集群中创建一个与 AG 关联的资源。\n\n1.  我们需要一个用于 SQL Server 资源代理的\
  \ SQL Server 登录名。\n    在**所有节点**上执行以下 T-SQL 语句，这些语句出自示例脚本`pacemakerlogin.sql`。此脚本还授予代理执行和访问适当\
  \ SQL Server 资源所需的最低权限：\n    ```\n    USE [master]\n    GO\n    CREATE LOGIN [pacemakerLogin]\
  \ with PASSWORD= N'Sql2017isfast'\n    GO\n    GRANT ALTER, CONTROL, VIEW DEFINITION\
  \ ON AVAILABILITY\n    GROUP::footballag TO pacemakerLogin\n    GO\n    GRANT VIEW\
  \ SERVER STATE TO pacemakerLogin\n    GO\n    ```\n2.  资源代理需要知道要使用的登录名和密码。\n   \
  \ 因此，您需要在**所有节点**上从 bash shell 执行以下命令，如示例`sqlrgagentlogin.sh`所示：\n    ```\n    echo\
  \ 'pacemakerLogin' >> ~/pacemaker-passwd\n    echo 'Sql2017isfast' >> ~/pacemaker-passwd\n\
  \    sudo mv ~/pacemaker-passwd /var/opt/mssql/secrets/passwd\n    sudo chown root:root\
  \ /var/opt/mssql/secrets/passwd\n    sudo chmod 400 /var/opt/mssql/secrets/passwd\
  \ # Only readable by root\n    ```\n3.  在任何节点上从 bash shell 执行以下命令，使用与 SQL Server\
  \ 中 AG 相同的名称在集群中创建 AG 资源：\n    ```\n    sudo pcs resource create ag_cluster ocf:mssql:ag\
  \ ag_name=footballag meta failure-timeout=60s master notify=true\n    ```\n    >\
  \ **注意** 在撰写本书时，文档版本使用的是`failure-timeout`为 30s，但文档前面又说要用 60s，所以我在创建资源时做了修改。\n4.\
  \  Linux 上的 SQL Server 可用性组有一个称为侦听器的概念，因此您可以连接到虚拟 IP 地址，而不是每个节点的 IP 地址。这个概念与 SQL\
  \ Server 和 Windows Server 故障转移集群集成。我们将在 Linux 上使用类似的概念，但虚拟 IP 是 Pacemaker 设计的一部分。因此，选择一个类似于您的\
  \ Azure VM 的 IP 地址，但不是物理 IP 地址。然后在 bash shell 中执行类似以下的命令：\n    ```\n    sudo pcs\
  \ resource create virtualip ocf:heartbeat:IPaddr2 ip=172.17.0.100\n    ```\n   \
  \ > **注意** SQL Server AG 支持侦听器的概念。侦听器将客户端应用程序与知晓主副本的物理名称或 IP 地址抽象开来。这非常强大，尤其是在故障转移场景中，当辅助副本成为新的主副本时。您可以在以下网址阅读有关\
  \ AG 侦听器的更多信息：[`docs.microsoft.com/sql/database-engine/availability-groups/windows/listeners-client-connectivity-application-failover#AGlisteners`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/listeners-client-connectivity-application-failover#AGlisteners)\n\
  \n\n\n第 8 章 SQL Server 的高可用性与灾难恢复\n此外，您可以阅读更多关于 SQL Server on Linux 上 AG 监听器的内容，网址为：[`docs.microsoft.com/sql/linux/sql-server-linux-availability-group-overview#the-listener-under-linux`](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-overview#the-listener-under-linux)。\n\
  \n现在，添加一个同址约束和一个排序约束，以确保主副本和虚拟 IP 在同一节点上运行。在任意节点的 bash shell 中运行以下命令：\n```\nsudo\
  \ pcs constraint colocation add virtualip ag_cluster-master INFINITY with-rsc-role=Master\n\
  sudo pcs constraint order promote ag_cluster-master then start virtualip\n```\n\n\
  至此，您已完成在 Linux 上的 SQL Server 中创建高可用的 Always On 可用性组的练习。不难，对吧？有没有更好的方法呢？答案是肯定的。它被称为\
  \ Ansible Playbook。这让我想起了大学四年级时，我们花了一整个学期在一门课程中为统计模拟模型构建一个 Fortran 程序。在我们提交完所有作业后，学期的最后一周，教授向我们展示了如何用一种叫做\
  \ GPSS 的语言在一天之内构建出相同的程序。我们当然都问他为什么？答案很简单。他想让我们理解创建统计模拟模型的内部原理，但也要明白要寻找更高效的方法来完成同样的任务。这是惨痛的教训。Ansible\
  \ 的核心就在于此。我们提供了一个开源的 Ansible Playbook 来安装 SQL Server、Pacemaker 集群和 AG，地址为：[`github.com/Microsoft/sql-server-samples/tree/master/samples/features/high%20availability/Linux/Ansible%20Playbook`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/high%20availability/Linux/Ansible%20Playbook)。\n\
  \n让我们来测试它\n在本节中，我们将连接到 SQL Server，并测试我们刚刚完成的 AG 与集群的新设置。我想在这个新设置上运行两个测试：(1) 向主副本数据库添加一些数据，并观察它是否显示在辅助副本上；(2)\
  \ 测试故障转移到辅助副本以及回切到主副本的过程。\n\n测试数据复制\n1.  连接到 `<虚拟 IP 地址>,1433`，运行示例 `createandinsert.sql`\
  \ 中的以下 T-SQL 语句，以在主副本上创建表并插入数据：\n    ```\n    USE [cowboysrule]\n    GO\n    DROP\
  \ TABLE IF EXISTS wewillwintheeast\n    GO\n    CREATE TABLE wewillwintheeast (col1\
  \ int)\n    GO\n    INSERT INTO wewillwintheeast VALUES (1)\n    GO\n    ```\n \
  \   **注意** 与其他节点一样，您可以在 `/etc/hosts` 中添加一个条目，将字符串名称与虚拟 IP 地址关联起来，并使用该名称进行连接，而无需指定端口号。\n\
  \n2.  直接连接到辅助副本，运行示例脚本 `querysecondary.sql` 中的以下 T-SQL 语句，以证明您已连接到辅助服务器，并且前述更改已从主副本复制过来：\n\
  \    ```\n    SELECT @@SERVERNAME\n    GO\n    USE [cowboysrule]\n    GO\n    SELECT\
  \ * FROM wewillwintheeast\n    GO\n    ```\n    结果应显示您的辅助副本（我的是 `bwsqllinuxag2`）以及一行数据结果。\n\
  \n![](img/index-449_1.png)\n\n测试故障转移\n\n\n# 手动故障转移与高可用性配置\n\n确保主副本和辅助副本之间能够进行故障转移的最简单方法是执行一次\
  \ *手动故障转移*。\n\n在 Windows 的 SQL Server 中，您可以使用 T-SQL 命令来手动故障转移带有可用性组（AG）的副本。然而，对于\
  \ Linux，您必须使用 Pacemaker 的 `pcs` 程序。您可以在我们的文档中详细了解如何在 Linux 上操作集群：[`docs.microsoft.com/sql/linux/sql-server-linux-availability-group-failover-ha`](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-failover-ha)。让我们开始尝试吧。\n\
  \n1.  首先，我们需要一种从故障转移角度查看副本当前状态的方法。执行以下 T-SQL 语句（在示例脚本 `checkreplicas.sql` 中可以找到）：\n\
  \    ```sql\n    SELECT ar.replica_server_name, hars.role_desc,\n           hars.operational_state_desc\n\
  \    FROM sys.dm_hadr_availability_replica_states hars\n    JOIN sys.availability_replicas\
  \ ar\n      ON hars.replica_id = ar.replica_id\n    GO\n    ```\n    在我的环境中，结果如图\
  \ 8-14 所示。\n\n    **图 8-14.  SQL Server on Linux 上 AG 的副本状态**\n    ![](img/index-450_1.png)\n\
  \n2.  现在是尝试使用 `pcs` 程序进行故障转移的时候了。在任意节点的 bash shell 中运行以下命令，并替换为您辅助节点的名称（我的是 `bwsqllinuxag2`）：\n\
  \    ```bash\n    sudo pcs resource move ag_cluster-master bwsqllinuxag2 --master\n\
  \    ```\n\n3.  文档中指出，Pacemaker 的特性是在执行手动故障转移后会添加一个位置约束，这可能导致问题，因此请在任意节点的 bash shell\
  \ 中执行以下命令：\n    ```bash\n    sudo pcs constraint remove cli-prefer-ag_cluster-master\n\
  \    ```\n\n4.  为确保故障转移正常工作，请在辅助节点上执行相同的 `checkreplicas.sql` 脚本。在我的环境中，结果如图 8-15\
  \ 所示。\n\n    **图 8-15.  故障转移后的副本状态**\n    ![](img/index-451_1.png)\n\n您现在可以看到，辅助副本已变为主副本，而原主副本变为了辅助副本。现在您可以重复上述步骤\
  \ 2 和 3 来故障回复到主副本。使用与上面步骤 2 相同的 `pcs` 命令来移动资源，但这次填入主副本的名称（如下例所示，务必也要运行相同的命令来移除位置约束）：\n\
  ```bash\nsudo pcs resource move ag_cluster-master bwsqllinuxag1 --master\n```\n\n\
  **注意**  我在自己的设置中注意到，故障回复到主副本似乎比故障转移到辅助副本花费的时间稍长，因此当您进行故障回复时，请给予更长的时间来检查状态。\n\n恭喜！如果您已经做到这一步，那么您已经成功为\
  \ SQL Server on Linux 设置了一个高可用的 Always On 可用性组，并测试了其功能。为什么我称其为“高可用”？您将在本章末尾的一节中找到答案。让我们来看看\
  \ AG 的其他方面，以结束本章。\n\n## 数据库运行状况检测\n\n我在关于 FCI 的部分以及前面关于 AG 的部分中提到了如何使用 `sp_server_diagnostics`\
  \ 和灵活的故障转移策略来检测故障转移的概念。您可能已经注意到，这些策略是在 SQL Server *实例* 级别设置的。在 AG 中使用实例级别逻辑的问题在于，AG\
  \ 是数据库级别的故障转移。\n\n因此，SQL Server 有一个称为 *数据库运行状况检测* 的概念。通过使用 `CREATE AVAILABILITY\
  \ GROUP`（或 `ALTER`）中的一个选项 `DB_FAILOVER`，SQL Server 将监控数据库是否脱机并启动故障转移。默认值为 `OFF`，但我建议使用此选项以确保在数据库不可访问时发生故障转移。AG\
  \ 中的所有数据库都作为此功能的一部分受到监控。\n\n该功能有一些细微差别和限制，您可以在以下链接中阅读有关内容。\n\n\n# Always On 可用性组的性能与使用\n\
  \n## 性能考量\n\n关于在可用性组中使用同步副本，客户经常提出的一个问题是：针对主副本运行事务的应用程序性能是否会受到影响。答案是肯定的。但更重要的问题是：性能影响是否可以忽略不计，同时仍能实现高可用性的好处。对于后一个问题，答案绝对是肯定的。\n\
  \n**SQL Server 的高可用性与灾难恢复**\n\n影响可用性组性能的三大主要因素是：\n\n*   针对主副本运行的事务速率\n*   事务在主副本和辅助副本的事务日志文件中被持久化的速度（磁盘\
  \ I/O 通常是最大的影响因素）\n*   主副本和辅助副本之间的网络连接速度\n\n您可以完全控制在磁盘上使用最快的硬件来处理事务日志，也可以控制副本之间网络设备的速度。\n\
  \n因此，最大的担忧可能来自于针对主副本的事务速率。我遇到过两种导致瓶颈的典型场景：\n\n*   大量并发用户执行极高频率的微小单语句事务\n*   大型索引的创建与重建\n\
  \n第一个问题可以通过将语句分组到逻辑事务中来缓解（这是一个独立于可用性组、有助于提升事务性能的良好实践）。\n\n第二个问题更为棘手，可能需要您仔细规划索引创建和重建的时间表，使用分区以较小的块构建索引，并评估是否确实需要创建或重建索引。\n\
  \n请浏览我们文档的这一部分，了解监控可用性组性能以查找同步过程中可能存在的瓶颈的常见方法：[监控 Always On 可用性组的性能](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/monitor-performance-for-always-on-availability-groups#BKMK_SCENARIOS)\n\
  \n您可以确信，微软一直在努力优化处理可用性组的代码。您可以在以下链接中阅读更多关于我们在 SQL Server 2016 中开始的性能优化工作：[SQL Server\
  \ 2016 IT Just Runs Faster: Always On 可用性组性能提升](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2016/09/26/sql-server-2016-it-just-runs-faster-always-on-availability-groups-turbocharged/)\n\
  \n## 可读副本\n\nAlways On 可用性组相对于故障转移群集实例的最大优势之一（除了不需要共享存储之外）在于，其辅助副本可以*被积极利用*。您可以从辅助副本读取数据，也可以在其上执行备份操作。\n\
  \n\n# 第 8 章 SQL Server 的高可用性与灾难恢复\n\n辅助副本上的数据库，甚至可以执行诸如 `DBCC CHECKDB` 的完整性检查。此外，您可以配置客户端应用程序自动路由到可读的辅助副本，从而将工作负载从主副本卸载。\n\
  \n**注意** 可读辅助副本仅在 SQL Server 企业版中可用。标准版提供基本的可用性组，但不允许从辅助副本读取。您可以在 [`docs.microsoft.com/sql/database-engine/availability-groups/windows/basic-availability-groups-always-on-availability-groups`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/basic-availability-groups-always-on-availability-groups)\
  \ 阅读更多关于基本可用性组的信息。\n\n辅助副本上可供读取的数据仅基于已提交、已在辅助事务日志中固化并重做的事务。任何基于活动事务的数据都是不可用的。此外，如果将事务传输到辅助副本存在延迟（在异步副本中可能更常见），您尝试从辅助副本读取的数据可能会存在差异。\n\
  \n使用可读辅助副本时还有其他注意事项，包括统计信息的处理方式、可能的阻塞情况以及 SQL Server 上的整体资源消耗，这些都可能影响辅助副本重做性能。我建议您详细阅读\
  \ [`docs.microsoft.com/sql/database-engine/availability-groups/windows/active-secondaries-readable-secondary-replicas-always-on-availability-groups#bkmk_Performance`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/active-secondaries-readable-secondary-replicas-always-on-availability-groups#bkmk_Performance)\
  \ 上的这些细节。\n\n最后，自 SQL Server 2017 发布以来，我们已经能够确定一些有助于解决并行重做工作线程与可读辅助副本查询之间冲突的性能优化。请在\
  \ [`blogs.msdn.microsoft.com/sql_server_team/sql-server-20162017-availability-group-secondary-replica-redo-model-and-performance/`](https://blogs.msdn.microsoft.com/sql_server_team/sql-server-20162017-availability-group-secondary-replica-redo-model-and-performance/)\
  \ 阅读更多相关信息，并务必关注最新的累积更新以获取更多增强功能。\n\n## 自动页修复\n\n可用性组（AG）的另一个巧妙功能和巨大优势在于，即使主副本上的某个页面损坏，辅助副本也可以保存有效的数据库页面。基于此，如果主副本上的某个数据库页面损坏，为什么不利用辅助副本上的完好页面呢？这正是\
  \ SQL Server 通过一个称为 **自动页修复** 的功能所提供的。\n\n其工作原理如下。如果主副本检测到 AG 中某个数据库的数据库页面损坏（例如页面上的\
  \ `checksum` 错误），它将请求\n\n\n## 自动页面修复\n\n当与页面关联的日志记录在辅助副本上重做时，辅助副本会将有效的页面发送回主副本，主副本会将其恢复上线。此外，无需启用此功能。它与可用性组一起默认工作。好吧，你必须承认这非常酷！\n\
  \n如果辅助副本在重做过程中遇到损坏的页面，它可以向主副本请求该页面的有效副本。这是另一个有助于满足 SQL Server 的`RTO`和`RPO`需求的强大功能，并且它完全内置在\
  \ SQL Server 引擎中（不过，此功能仅在 SQL Server 企业版中可用）。\n\n阅读更多关于自动页面修复的信息：[`docs.microsoft.com/sql/sql-server/failover-clusters/automatic-page-repair-availability-groups-database-mirroring`](https://docs.microsoft.com/sql/sql-server/failover-clusters/automatic-page-repair-availability-groups-database-mirroring)\n\
  \n## 无集群可用性组\n\n在构建 SQL Server 2017 并为 Linux 上的 SQL Server 启用`AG`功能（使用新的`CLUSTER_TYPE=EXTERNAL`）时，我们意识到可以引入在没有集群组件的情况下使用`AG`的功能，无论是`WSFC`还是`Pacemaker`。\n\
  \n我们将这个新概念称为**无集群可用性组**。考虑我在本章前面介绍的架构图。所有软件组件都存在，用于将日志更改传送到副本，而无需任何集群软件。不同之处在于，没有集群软件时，`AG`不是高可用的，因为它没有自动故障转移功能。\n\
  \n但是，在某些场景下，您可能希望设置一个`AG`，因为您希望允许读取器工作负载（例如报告用户）访问一系列辅助副本，但您不需要`AG`是高可用的。我们在 SQL\
  \ Server 2017 中将这个概念称为**读取扩展路由**。\n\n此外，由于核心数据库引擎在`Windows`和`Linux`上是相同的代码，并且`AG`的核心软件组件就在引擎中，您可以跨`Windows`和`Linux`设置一个主副本和一组副本，从而实现跨平台的`AG`。\n\
  \n可以这样想。当您按照上一节中的示例设置`AG`时，一旦您创建了`AG`并加入了辅助副本，SQL Server 就准备将日志块传送到副本。如果您将`CREATE\
  \ AVAILABILITY GROUP`语句更改为使用`CLUSTER_TYPE = NONE`，如下所示：\n\n```sql\nCREATE AVAILABILITY\
  \ GROUP [footballag]\nWITH (CLUSTER_TYPE = NONE)\nFOR REPLICA ON\nN'bwsqllinuxag1'\
  \ WITH (\n    ENDPOINT_URL = N'tcp://bwsqllinuxag1:5022',\n    AVAILABILITY_MODE\
  \ = SYNCHRONOUS_COMMIT,\n    FAILOVER_MODE = EXTERNAL,\n    SEEDING_MODE = AUTOMATIC,\n\
  \    SECONDARY_ROLE (ALLOW_CONNECTIONS = ALL)\n),\nN'bwsqllinuxag2' WITH (\n   \
  \ ENDPOINT_URL = N'tcp://bwsqllinuxag2:5022',\n    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,\n\
  \    FAILOVER_MODE = EXTERNAL,\n    SEEDING_MODE = AUTOMATIC,\n    SECONDARY_ROLE\
  \ (ALLOW_CONNECTIONS = ALL)\n),\nN'sqllinuxcfgag' WITH (\n    ENDPOINT_URL = N'tcp://sqllinuxcfgag:5022',\n\
  \    AVAILABILITY_MODE = CONFIGURATION_ONLY\n)\nGO\n\nALTER AVAILABILITY GROUP [footballag]\
  \ GRANT CREATE ANY DATABASE\nGO\n```\n\n您就是在创建一个无集群可用性组。就这么简单。\n\n#### 总结\n\n在本章中，我讨论了通过备份和恢复实现高可用性和恢复的基础知识，还讨论了更高级但强大的功能，以通过\
  \ Always On 故障转移群集实例和 Always On 可用性组满足您的`RTO`和`RPO`需求。高可用性的一个有趣角度是使用带有 Kubernetes\
  \ 的 Docker 容器。我将在本书的最后一章讨论这一新功能。\n\n\n\n# 第 9 章\n\n## SQL Server 的管理与监控\n\n接下来我们将进入下一章，讨论在\
  \ Linux 上监控和管理 SQL Server 的重要概念。\n\n通过阅读本书的前八章，您已学习了在 Linux 上安装 SQL Server、部署数据库和应用程序所需的基础知识，并通过了解我们的工具、性能、安全性和高可用性的基本原理，为成功奠定了基础。\n\
  \n部署使用 SQL Server 的应用程序是一回事，但管理、维护和监控 SQL Server 的关键方面又是什么呢？这正是本章的主题。\n\n公平地说，我在本书中已经涵盖了管理和监控的一些方面，包括关于工具、性能和高可用性的章节（当然，学习如何备份和还原数据库是管理\
  \ SQL Server 的一个关键方面）。\n\n本章通过涵盖我之前未讨论过的主题——如何管理 SQL Server 实例、您的数据库以及数据库中的对象——来扩展这些知识。\n\
  \n在本章的第二部分，我将讨论监控 SQL Server，包括以下主题：\n\n- 监控 SQL 性能\n- 使用一个强大但鲜为人知的功能——系统运行状况会话——来监控\
  \ SQL Server 运行状况\n- 学习一种监控事务日志备份的创新方法\n- 我喜欢用于监控性能的 Linux 工具回顾\n- 排查 SQL Server\
  \ 问题的独特之处\n\n© Bob Ward 2018\n\nB. Ward, *Pro SQL Server on Linux*, `doi.org/10.1007/978-1-4842-4128-8_9`\n\
  \n第 9 章 SQL Server 的管理与监控\n\n当您开始阅读有关 SQL Server 实例、数据库和对象的管理部分时，请务必记住我从 SQL Server\
  \ 经验中学到的一个重要教训：*测试您的管理策略*。大多数开发人员会专注于测试应用程序，这对于成功部署至关重要，但通常我看到管理任务，比如重建索引，从未经过测试。在您最大的表上重建索引需要多长时间？除非您测试，否则不会知道。除了测试之外，对于对\
  \ SQL Server 实例配置、数据库、对象或 Linux 操作系统进行的任何更改，请务必有一个定义明确的*变更控制和审计流程*。根据我的经验，了解谁以及对生产\
  \ SQL Server 环境做了什么更改非常重要，尤其是在排查问题并试图回答不可避免的问题“发生了什么变更？”时。\n\n我必须承认，编写本章让我感到很有趣，因为它包含了我在微软参与\
  \ SQL Server 项目的有趣历史，以及我与一些我所认识的最聪明的人进行的互动，共同构建了丰富的管理和监控 SQL Server 的功能。\n\n####\
  \ 管理 SQL Server 实例\n\nSQL Server 提供了丰富的功能，用于在部署后管理 SQL Server 实例，使用诸如 `mssql-conf`、T-SQL\
  \ 语句 `ALTER SERVER CONFIGURATION` 以及系统存储过程 `sp_configure` 等工具。我们构建 SQL Server 的初衷是让您在安装后无需花费大量时间配置实例，但大多数生产环境都需要进行一些对其应用程序有意义的配置更改。我在本书前面的章节中已经讨论过这些功能和选项。为了完整性，我在本章此节中再次简要列出了这些功能。\n\
  \n此外，在本节中，我将花时间讨论本书目前尚未提及的 SQL Server 实例配置选项，包括：\n\n- 创建 SQL Server 代理作业\n- 使用资源调控器控制用户的资源使用\n\
  - 在紧急情况下使用专用管理员连接\n- 在特殊场景下使用 `sqlservr` 命令行\n\n## 更改服务器配置选项\n\n\n\n# SQL Server\
  \ 的管理与监控\n\n## 更改 SQL Server 实例配置的方法\n\n我在之前的章节中讨论过三种更改 SQL Server 实例默认配置的方法。我在此列出这个清单纯粹是为了复习，以确保你了解\
  \ SQL Server 实例配置有哪些选项：\n\n### mssql-conf\n\n`mssql-conf` 是一个 bash shell 脚本，用于配置那些无法通过\
  \ T-SQL 连接完成的选项。我在本书中已经展示过几个示例，但完整的选项列表可以在 [`docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf`](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf)\
  \ 找到。我建议你每次使用此功能时，都创建一个脚本并跟踪所有执行情况，以便进行变更控制。\n\n### ALTER SERVER CONFIGURATION\n\
  \n`ALTER SERVER CONFIGURATION` 是一条 T-SQL 语句，用于进行实例级别的配置更改。我在过去的章节中向你展示过该语句的两个例子：`PROCESS\
  \ AFFINITY` 和 `SOFTNUMA`。该语句的完整选项列表可以在 [`docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql)\
  \ 找到。\n\n### sp_configure\n\n`sp_configure` 是一个系统存储过程，用于修改各种类型的实例级别配置选项。我在之前的章节中向你展示过一些与性能、安全性和高可用性相关的更重要的选项。还有其他选项，但我认为到目前为止在书中涵盖的是最重要的。`sp_configure`\
  \ 的完整选项列表可以在 [`docs.microsoft.com/sql/database-engine/configure-windows/server-configuration-options-sql-server`](https://docs.microsoft.com/sql/database-engine/configure-windows/server-configuration-options-sql-server)\
  \ 找到。文档说明了某些配置选项需要重新启动 SQL Server。所有选项都需要执行 T-SQL 语句 `RECONFIGURE` 才能生效。\n\n> **注意：**\
  \ 我在之前的章节中还介绍了 `ALTER DATABASE SCOPED CONFIGURATION` T-SQL 语句，它允许你在数据库级别配置通常需要实例级别修改才能使用的选项。\n\
  \n## 创建 SQL Server 代理作业\n\nSQL Server 代理是一项计划服务，在 Linux 上部署 SQL Server 时会一同安装。SQL\
  \ Server 代理提供了创建*作业*的功能，然后可以使用不同的频率选项来安排作业的执行。作业通过一系列*作业步骤*执行。作业步骤定义了要在作业中执行的一组特定的\
  \ T-SQL 语句。\n\n> **注意：** 在 SQL Server 2017 CU4 之前，SQL Server 代理需要一个单独的软件包。从 2017\
  \ CU4 开始，SQL Server 代理与 `mssql-server` 软件包捆绑在一起。此外，Linux 上的 SQL Server 仅提供包含一组 T-SQL\
  \ 语句的作业步骤。Windows 上的 SQL Server 包含多个支持其他类型作业步骤的*子系统*。\n\n能够使用 SQL Server 代理的第一步是启用此功能，方法是从\
  \ bash shell 运行以下命令，使用 `mssql-conf`：\n\n```bash\nsudo /opt/mssql/bin/mssql-conf\
  \ set sqlagent.enabled true\nsudo systemctl restart mssql-server\n```\n\n此时，你现在可以通过\
  \ T-SQL 系统存储过程（例如 `sp_add_job`）、使用 SQL Operations Studio 的扩展或使用 SQL Server Management\
  \ Studio (SSMS) 来创建 SQL Server 代理作业。\n\n我们的文档中有一个很好的示例，展示了如何通过 T-SQL 系统存储过程创建一个每日备份数据库的作业，网址是\
  \ [`docs.microsoft.com/sql/linux/sql-server-linux-run-sql-server-agent-job#create-a-job-with-transact-sql`](https://docs.microsoft.com/sql/linux/sql-server-linux-run-sql-server-agent-job#create-a-job-with-transact-sql)。\n\
  \n使用 SSMS 创建作业的示例可以在 [`docs.microsoft.com/sql/linux/sql-server-linux-run-sql-server-agent-job#create-a-job-with-ssms`](https://docs.microsoft.com/sql/linux/sql-server-linux-run-sql-server-agent-job#create-a-job-with-ssms)\
  \ 看到。\n\n图 9-1 显示了使用 SQL Operations Studio 中的 SQL 代理扩展创建新作业的示例。\n\n![图 9-1. 使用 SQL\
  \ Operations Studio 创建 SQL 代理作业](img/index-461_1.jpg)\n\n由于 SQL Server 代理支持可以执行任何\
  \ T-SQL 语句或在系列步骤中执行语句集的作业，因此你可以使用 SQL Server 代理来执行任何你想要按计划或临时运行的任务。\n\nLinux 用户可能更喜欢使用\
  \ `cron` 系统 ([`en.wikipedia.org/wiki/Cron`](https://en.wikipedia.org/wiki/Cron))\
  \ 来安排命令，这些命令可以使用像 `sqlcmd` 这样的程序来执行 T-SQL 命令。我的建议是，如果你只需要为任何应用程序需求或任务运行 T-SQL 语句，请使用\
  \ SQL Server 代理。如果你需要将其他 Linux 命令或 shell 脚本与 T-SQL 脚本一起作为一个单元来运行，我会使用 `cron`。\n\n\
  ## 使用资源调控器\n\n可能存在一些场景，你希望控制与 SQL Server 相关的应用程序的用户和查询在 CPU、内存和 I/O 方面的资源。SQL Server\
  \ 提供了一个名为*资源调控器*的功能来控制这些资源。资源调控器由以下对象组成：\n\n### 资源池\n\n资源池定义了在物理资源（如 CPU、内存和 I/O）上指定的约束。SQL\
  \ Server 安装时附带两个池：\n1.  `internal`，用于 SQL Server 的后台和系统任务以及工作线程。\n2.  `default`，这是一个预定义的池，用于用户任务，如果未创建用户定义的池，则它是“默认”池。\n\
  \n你可以通过 T-SQL 创建自己的用户定义资源池。你可以在 [`docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-resource-pool`](https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-resource-pool)\
  \ 阅读更多关于资源池的信息。\n\n> **注意：** 你可以更改默认池的设置，但不能更改内部池的设置。\n\n以下是你可以配置的资源池的一些属性：\n- `CAP_CPU_PERCENT`：与此池关联的工作组用户（稍后描述）的\
  \ CPU 利用率将受到限制，适用于任何 SQL Server 工作线程的使用。\n- `MAX_MEMORY_PERCENT`：与此池关联的工作组用户，在与查询执行相关的内存授予（哈希、排序等）方面将受到限制。此设置不影响为缓冲池或任何其他缓存分配的内存。\n\
  - `AFFINITY`：这是一个有趣的设置。使用此设置可以将 NUMA 节点和 CPU 的亲和性定向到与此池关联的任何工作组用户\n\n\n\n# 第九章：管理与监控\
  \ SQL Server\n\n通过此池，可以将特定应用程序限定在指定的节点或 CPU 上运行。这是一种极佳的技术，用于将特定应用程序定向到特定的 NUMA 节点或\
  \ CPU 上运行。相较于服务器配置选项，这也是一种更精细的\"亲和性\"设置方法（资源组亲和性在 SQL Server 实例亲和性的约束范围内运行）。\n\n\
  ## MAX_IOPS_PER_VOLUME\n此设置控制与此池关联的工作负载组用户，针对每个唯一的磁盘卷，每秒可执行的最大物理 IO 操作数。唯一的磁盘卷是指基于数据库文件的唯一物理磁盘。这个设置最大的\"\
  坑\"在于，它仅适用于在`用户任务`上下文中执行的任何 I/O 操作。这意味着在后台任务（日志写入器、恢复写入器、检查点等）上下文中执行的任何 I/O 操作都不会遵守此设置（并且你无法更改它们所属的内部池设置）。\n\
  \n资源池也支持 CPU、内存和 I/O 的\"最小值\"设置。如果你开始调整最小值和最大值设置，情况可能会变得有点复杂。我们的文档提供了一个很好的表格，描述了有效的设置，以备你决定这样做。更多信息请阅读：[`docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-resource-pool`](https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-resource-pool)。\n\
  \n## 工作负载组\n工作负载组是分配到资源池的用户任务的容器。工作负载组是一种将一组用户分组以限制资源使用的方法。默认安装有两个工作负载组，`internal`和`default`，它们分别映射到同名的相应资源池。你可以通过`T-SQL`创建自己的工作负载组。如果你不创建用户定义的工作负载组，所有登录都将映射到默认工作负载组（该组又映射到默认资源池）。关于工作负载组的更多信息请阅读：[`docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-workload-group`](https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-workload-group)。\n\
  \n工作负载组允许你在比其关联资源池更精细的级别上指定设置。例如，你可以配置`REQUEST_MAX_MEMORY_GRANT_PERCENT`来指定工作负载组用户的最大内存授予量。此设置在已为资源池建立的最大值范围内应用。\n\
  \n**注意**，我们的一位顶级开发人员 Jay Choe 对内存授予有很好的描述：[`blogs.msdn.microsoft.com/sqlqueryprocessing/2010/02/16/understanding-sql-server-memory-grant`](https://blogs.msdn.microsoft.com/sqlqueryprocessing/2010/02/16/understanding-sql-server-memory-grant)。\n\
  \n工作负载组的一个独特设置是`MAXDOP`。我在前面的章节中讨论过并行查询执行，以及如何通过`sp_configure`、`ALTER DATABASE`甚至查询提示来配置应用于查询计划运算符的最大工作线程数。工作负载组允许你为组中的所有用户指定一个`MAXDOP`设置。结合使用这些`MAXDOP`设置可能会让人感到困惑。以下是关于`MAXDOP`优先级应用顺序的指导原则：\n\
  \n```\n• 作为查询提示的 MAX_DOP 会得到遵循，前提是它不超过工作负载组的 MAX_DOP。\n```\n\n\n\n**MAX_DOP** 优先级\n\
  \n*   `MAX_DOP` 作为查询提示，始终会覆盖 `sp_configure 'max degree of parallelism'`。\n*   数据库作用域的\
  \ `MAXDOP` 会覆盖（除非设置为 0）由 `sp_configure` 在服务器级别设置的最大并行度。查询提示仍然可以覆盖数据库作用域的 `MAXDOP`，以便对需要不同设置的特定查询进行调优。所有这些设置都受为工作负载组设置的\
  \ `MAXDOP` 限制。\n*   工作负载组 `MAX_DOP` 覆盖 `sp_configure 'max degree of parallelism'`。\n\
  *   如果查询在编译时被标记为串行（`MAXDOP = 1`），则无论工作负载组或 `sp_configure` 设置如何，在运行时都无法更改回并行。\n\n\
  工作负载组的完整设置列表请参阅文档：[`docs.microsoft.com/sql/t-sql/statements/alter-workload-group-transact-sql#arguments`](https://docs.microsoft.com/sql/t-sql/statements/alter-workload-group-transact-sql#arguments)。\n\
  \n**分类函数**\n\n分类器函数是一种 T-SQL 函数，用于将登录绑定到用户定义的工作负载组。你构建一个具有已知模板的 T-SQL 函数，并将特定登录（或登录组）分配给工作负载组。这使得\
  \ SQL Server 能够知道如何将资源限制映射到特定工作负载组和资源池的登录。你可以在 [`docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-classifier-function`](https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-classifier-function)\
  \ 阅读更多关于分类器函数的信息。\n\n我在 GitHub 上发现了我的同事 Travis Wright 构建的这个简单但易于使用的演示：[`github.com/twright-msft/mssql-test-scripts/blob/master/Administration/resource-governor.sql`](https://github.com/twright-msft/mssql-test-scripts/blob/master/Administration/resource-governor.sql)，用于展示如何将资源调控器用于\
  \ I/O 的基础知识。\n\n**注意**：Linux 有一个与资源调控器类似的操作系统概念，用于控制进程的资源，称为 Linux 控制组（`cgroups`）。`cgroups`\
  \ 独立于 SQL Server，但由于 SQL Server 是一个 Linux 进程，当使用 `cgroups` 来控制 SQL Server 资源（如 CPU\
  \ 或 I/O）时，SQL Server 应该能够运行。你可以在 [`man7.org/linux/man-pages/man7/cgroups.7.html`](http://man7.org/linux/man-pages/man7/cgroups.7.html)\
  \ 阅读更多关于 `cgroups` 的信息。\n\n技术上，默认和内部池的资源调控器是无需用户干预即可启用的。但是，如果你希望对默认池的修改生效，或者要创建自己的池和工作负载组，则必须使用以下\
  \ T-SQL 语句为这些新配置启用资源调控器：\n\n```sql\nALTER RESOURCE GOVERNOR RECONFIGURE;\nGO\n```\n\
  \n**使用专用管理员连接**\n\n多年前，在 SQL Server 2005 之前，我在微软技术支持部门工作时，偶尔会遇到客户遇到严重问题，其中 SQL Server\
  \ 似乎已挂起（不允许任何连接或查询）。大约在这个时期，我支持部门的同事 Robert Dorr 和 Keith Elmore 总会就如何排查复杂问题提出一些令人惊叹的创新想法。事实上，我们三人一起在德克萨斯州欧文市的微软园区午餐后散步时，产生了一些最好的点子。\n\
  \n第 9 章 管理和监控 SQL Server\n\n\n\n\n（注：我们这一传统延续了多年，从 20 世纪 90 年代中期一直保持至今。由于我们三人现在分属不同的团队，这类事情如今已很少发生了。）\n\
  \n其中有一天，Robert Dorr 正在和我们讨论另一起客户事件，其中 SQL Server 似乎卡住了。他说：“肯定有更好的方法来诊断这类问题。” 果然，这次讨论促成了对\
  \ ERRORLOG 中在出现此类状况时可能记录的错误的“可支持性”改进（请参阅 Robert 在 [`blogs.msdn.microsoft.com/psssql/2008/03/28/how-it-works-non-yielding-resource-monitor/`](https://blogs.msdn.microsoft.com/psssql/2008/03/28/how-it-works-non-yielding-resource-monitor/)\
  \ 发布的一篇旧博文）。\n\n在这次讨论中，我们三人一致认为，如果 SQL Server 引擎无法接受新的登录或查询，为什么我们不能有一个特殊的*专用的*连接到\
  \ SQL Server 呢？这个连接功能有限，但可用于连接到 SQL Server 以进行调查，甚至可能修复 SQL Server 挂起的问题。就这样，SQL\
  \ Server 2005 中诞生了一项名为“专用管理员连接”（DAC）的功能。\n\n# SQL Server 的管理与监控\n\n## 专用管理员连接（DAC）\n\
  \nSQL Server 为 DAC 提供了一个独立的 TCP 端口（`1434`），并在一个不同的 SQLOS 调度器上运行。因此，如果 SQL Server\
  \ 由于调度器或标准端口问题而无法响应新请求，或许仍可以通过 DAC 连接，至少可以运行针对动态管理视图（DMV）的查询，以便在重启 SQL Server 之前找出问题的可能原因。此外，甚至可能找到原因并解决问题，无需重启。稍后我将举一个例子。\n\
  \n首先，让我们看看如何连接 DAC。在 Linux 服务器的 bash shell 中使用 `sqlcmd` 运行以下命令：\n\n```\nsqlcmd -Usa\
  \ -Sadmin:localhost\n```\n\n请注意，服务器名称的语法使用了 `admin:` 前缀。\n\n**注意** Windows 上的 `sqlcmd`\
  \ 支持 `-a` 选项，该选项强制使用 DAC，但这在 Linux 上不受支持。不过，你可以在任何 SQL Server 工具上使用 `admin:` 前缀，包括\
  \ `sqlcmd`、SQL Operations Studio 和 SSMS。\n\n现在你进入了 `sqlcmd` 编辑器，但如何确定操作成功并且你已经通过\
  \ DAC 连接了呢？\n\n运行以下 T-SQL 语句，这些语句可以在示例脚本 `amidac.sql` 中找到：\n\n```sql\n-- 我的会话 ID\
  \ 是什么？\nSELECT @@spid\ngo\n\n-- 列出当前连接、其端点和端口\nSELECT dec.session_id, e.name, dec.local_tcp_port\n\
  FROM sys.dm_exec_connections dec\nJOIN sys.endpoints e\nON e.endpoint_id = dec.endpoint_id\n\
  GO\n```\n\n我从 bash shell 使用以下命令运行了此脚本：\n\n```\nsqlcmd -Usa -Sadmin:localhost -iamidac.sql\n\
  ```\n\n结果应类似于以下内容：\n\n```\n(1 rows affected)\nsession_id  name                 \
  \             local_tcp_port\n----------- -------------------------------- --------------\n\
  51          Dedicated Admin Connection        1434\n\n(1 rows affected)\n```\n\n\
  注意那个巧妙的服务器变量 `@@SPID`，它可用于查明你当前的会话 ID。然后你可以在连接列表中找到你的会话（在此示例中，它是唯一的连接）。我在“始终启用可用性组”一章中向你介绍了端点的概念。DAC\
  \ 有自己的端点，它是自动创建的，通常托管在端口 `1434` 上。你可以看到此会话正在使用该端口。\n\n一次只允许有一个活动的 DAC 连接（因此称为“专用”）。你也可以远程使用\
  \ DAC 连接。我个人认为，如果你觉得需要使用 DAC，应该通过 `ssh` 会话在本地使用它。我这样说是因为，如果你的 Linux 服务器存在远程连接问题，你将无法确定\
  \ SQL Server 连接问题是由于网络连接问题，还是服务器本身的问题（而且如果你无法获得 `ssh` 会话，那可能存在比 SQL Server 更大的问题）。\n\
  \n关于 DAC，还有另一个鲜为人知的秘密。我在前一章提到过...\n\n\n\n# 使用 DAC 和直接访问系统表\n\n默认情况下，虽然用户可以看到系统表列表，但无法直接读取这些表的内容。您应当使用系统目录视图。\n\
  \n尝试使用 DAC（专用管理员连接）和非 DAC 连接执行以下 T-SQL 语句：\n\n```sql\nUSE master\nGO\nSELECT * FROM\
  \ sys.sysschobjs\nGO\n```\n\n`sys.sysschobjs` 是支持 `sys.objects` 等目录视图的系统表之一。\n\n\
  如果您在未使用 DAC 的情况下运行此查询，会收到以下错误：\n\n```\nMsg 208, Level 16, State 1, Server bwsql2017rhel,\
  \ Line 1\nInvalid object name 'sys.sysschobjs'.\n```\n\n然而，如果使用 DAC，您将能够直接读取任何系统表。这是一个巧妙的方法，但老实说，在生产环境中我不认为您有太多必要这样做。它对于学习\
  \ SQL Server 内部原理可能很有趣，但我们并未发布系统表的模式定义。\n\n> **提示**：您可以通过 `sys.system_sql_modules`\
  \ 检查系统目录视图的文本，以了解系统表的工作原理。\n\n您不能通过 DAC 随意执行任何操作。我们设计 DAC 是为了在紧急情况下，让您能够可靠地连接到 SQL\
  \ Server 并执行关键但最小的操作集。何时应该使用 DAC？我建议仅在您甚至无法通过 Linux 服务器上的本地 `sqlcmd` 连接到 SQL Server\
  \ 时才使用 DAC。一旦连接成功，可以查询 DMV（动态管理视图）如 `dm_exec_requests`，以获取有关正在运行的连接和查询的基本情况。\n\n\
  使用 DAC 可能解决以下问题场景：\n\n1.  工作线程数已达到最大值。\n2.  所有工作线程都被一个主导阻塞进程（lead blocker）阻塞。\n\
  3.  该主导阻塞进程不释放其资源。例如，您可能有一个会话启动了事务，运行了获取锁的查询，但从未提交。所有工作线程都可能被阻塞，等待此事务和会话完成。\n4.\
  \  由于所有工作线程都处于忙碌状态，SQL Server 无法处理任何新的连接或查询，因为没有可用的工作线程。\n5.  然而，您可以通过 DAC 连接，并使用\
  \ T-SQL `KILL` 语句终止主导阻塞进程，从而释放所有被阻塞的工作线程。T-SQL `KILL` 语句需要比通常更高的权限，这理所当然。您可以在[此处](https://docs.microsoft.com/sql/t-sql/language-elements/kill-transact-sql)阅读更多关于\
  \ T-SQL `KILL` 语句以及何时可能适合用于您服务器的场景的信息。\n\n您可以在[此处](https://docs.microsoft.com/sql/database-engine/configure-windows/diagnostic-connection-for-database-administrators)阅读更多关于\
  \ DAC 的信息，包括其限制以及如何远程连接。\n\n# sqlservr 命令行选项\n\n在第 8 章中，我简要介绍了一种使用 `sqlservr` 程序的命令行选项来重建系统数据库的技术。您通常使用\
  \ `systemctl` 启动 SQL Server，但 `sqlservr` 是一个可以直接从 shell 启动的程序。并且有一系列主要未文档化的命令行选项可以与\
  \ `sqlservr` 一起使用。您可以通过在 bash shell 中运行以下命令来查看列表（如果 SQL Server 正在运行，请务必先停止它）：\n\n\
  ```bash\nsudo -u mssql /opt/mssql/bin/sqlservr --help\n```\n\n您的结果应类似如下：\n\n```\n\
  usage: sqlservr [OPTIONS...]\n\nConfiguration options:\n\n-T<#>                \
  \  Enable a traceflag\n-y<#>                  Enable dump when server encounters\
  \ specified error\n-k<#>                  Checkpoint speed (in MB/sec)\n\nAdministrative\
  \ options:\n\n--accept-eula          Accept the SQL Server EULA\n```\n\n\n### 第\
  \ 9 章：管理与监控 SQL Server\n\n## 命令行选项\n\n*   `--pid <pid>` - 设置服务器产品密钥。\n*   `--reset-sa-password`\
  \ - 重置系统管理员密码。密码应在 `SQLSERVR_SA_PASSWORD` 环境变量中指定。\n*   `-f` - 最小配置模式。\n*   `-m`\
  \ - 单用户管理模式。\n*   `-K` - 强制重新生成服务主密钥。\n*   `--setup` - 设置基本配置设置然后关机。\n*   `--force-setup`\
  \ - 与 `--setup` 相同，但也会重新初始化 `master` 和 `model` 数据库。\n\n## 常规选项\n\n*   `-v` - 显示程序版本。\n\
  *   `--help` - 显示此帮助信息。\n\n许多选项的功能也可以通过其他已记录的方法完成。例如，用于设置跟踪标志的 `-T` 可以通过 `mssql-conf`\
  \ 实现。\n\n有两个选项值得特别指出，它们可用于故障排除和紧急情况：\n\n## `-m`：单用户模式\n\n使用 `-m` 选项启动 SQL Server\
  \ 时，只有单个用户可以连接到 SQL Server。\n\n`-m` 的一个常见用途是需要还原 `master` 数据库的场景。你必须先以 `-m` 模式启动\
  \ SQL Server 才能还原 `master`。一个更有趣、更高级、坦率地说也更危险的场景是修改系统表或访问 `mssqlsystemresource`\
  \ 数据库。如果你以 `-m` 模式启动 SQL Server 并使用 DAC（专用管理员连接）连接到 SQL Server，你将被授予直接修改系统表的权限。在我们发布\
  \ SQL Server 2005 之前，计划是完全锁定对系统表的任何访问。作为技术支持人员，我知道总会有些场景我们需要这种能力。妥协的结果是通过 DAC 提供对系统表的读取访问，以及通过\
  \ `-m` 和 DAC 提供修改访问。事实证明，多年来确实有几次在紧急情况下我需要这个能力。\n\n但是要小心！一旦你修改了系统表，SQL Server 会在数据库结构中标记一个比特位，因此每当你打开数据库时，`ERRORLOG`\
  \ 中都会记录一条警告，说明数据库系统表已被直接修改。此时你完全处于不受支持的状态。然而，微软可能让你这样做来规避某些关键问题，并且他们可以帮助你恢复到受支持的状态。\n\
  \n以下是从 bash shell 以单用户模式启动 SQL Server 的命令示例：\n```bash\nsudo -u mssql /opt/mssql/bin/sqlservr\
  \ -m\n```\n\n单用户模式的一个问题是所谓的“连接竞赛”。当你以单用户模式启动 SQL Server 时，第一个连接的系统管理员“获胜”。因此，你可以使用\
  \ `-m` 参数后的一个选项来限制谁可以通过应用程序名称连接。以下是一个示例，限制只有使用程序 `sqlcmd` 的系统管理员用户才能连接：\n```bash\n\
  sudo -u mssql /opt/mssql/bin/sqlservr -m\"SQLCMD\"\n```\n\n请参阅我们的文档以获取有关以单用户模式启动\
  \ SQL Server 的更多信息：[`docs.microsoft.com/sql/database-engine/configure-windows/start-sql-server-in-single-user-mode`](https://docs.microsoft.com/sql/database-engine/configure-windows/start-sql-server-in-single-user-mode)。\n\
  \n## `-f`：最小配置模式\n\n此选项指示 SQL Server 以最小配置模式启动。最小配置模式包括单用户模式，此外还限制其他 SQL Server\
  \ 功能或以最小方法配置 SQL Server。例如，如果你进行了阻止 SQL Server 运行或启动的服务器配置更改，SQL Server 将使用默认的服务器配置信息来启动服务器。\n\
  \n我能想到的这个选项的最佳示例是服务器配置选项 `max server memory`。如果你将此值设置得太低，在某些情况下，SQL Server 可能没有足够的内存来允许连接或正常启动。以最小配置模式启动\
  \ SQL Server……\n\n\n\n# 第 9 章 管理与监控 SQL Server\n\n配置模式会将 `max server memory` 设置为其默认值，允许您连接并将其更改为正确的值。您可以在\
  \ [`docs.microsoft.com/sql/database-engine/configure-windows/start-sql-server-with-minimal-configuration`](https://docs.microsoft.com/sql/database-engine/configure-windows/start-sql-server-with-minimal-configuration)\
  \ 阅读更多关于以最小配置模式启动 SQL Server 的信息。\n\n**注意：** SQL Server 容器直接使用 `sqlservr` 程序运行 SQL\
  \ Server。\n\n#### 管理数据库\n\n部署数据库后，在某些时候您将需要执行一些数据库管理工作，无论是数据库级别还是文件级别的更改。在本节中，我将回顾这些关键主题，包括移动数据库、管理文件、分离和附加数据库、重要的\
  \ `ALTER DATABASE` 场景，以及一个非常有趣的关于修复数据库的讨论（我想您会喜欢这个包含数据库状态和校验和内部原理的部分）。\n\n## 移动数据库\n\
  \n在创建数据库并使其在生产环境中运行后，您可能需要执行的一项常见操作是将数据库和事务日志文件移动到新的目录或新的磁盘上。您可能需要移动文件的原因有多种，例如磁盘维护或磁盘升级场景。移动一个或多个文件的一种常用方法如下：\n\
  \n1.  通过执行以下 T-SQL 语句将数据库更改为离线状态\n    ```sql\n    ALTER DATABASE <dbname> SET OFFLINE\n\
  \    ```\n    这展示了在不关闭 SQL Server 的情况下控制数据库状态的能力。\n\n2.  将 Linux 服务器上要移动的文件移至您指定的目标目录或磁盘。\n\
  \n3.  告知 SQL Server 文件的新位置。对于每个移动的文件，运行以下 T-SQL 语句：\n    ```sql\n    ALTER DATABASE\
  \ <dbname> MODIFY FILE ( NAME = logical_name, FILENAME = 'new_path\\os_file_name'\
  \ )\n    ```\n\n4.  使用以下 T-SQL 语句将数据库状态更改回在线：\n    ```sql\n    ALTER DATABASE <dbname>\
  \ SET ONLINE\n    ```\n\nSQL Server 将使数据库联机并执行恢复（正如在数据库联机时通常所做的那样）。\n\n您也可能有移动系统数据库的需求。您可以在我们的文档\
  \ [`docs.microsoft.com/sql/relational-databases/databases/move-system-databases`](https://docs.microsoft.com/sql/relational-databases/databases/move-system-databases)\
  \ 中阅读有关此过程的更多信息。对于 Linux 上的 SQL Server，此文档唯一的例外是移动 master 数据库。要在 Linux 上的 SQL Server\
  \ 中移动 master 数据库，您需要使用 `mssql-conf` 脚本，如 [`docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf#masterdatabasedir`](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf#masterdatabasedir)\
  \ 所述。\n\n## 管理文件\n\n管理数据库和/或事务日志文件可能还有其他场景，包括添加新文件、删除现有文件或为现有文件增加更多空间。\n\n在我回顾这些操作的过程之前，关于文件最基本的任务之一可能是了解文件使用的空间。要查看数据库的空间使用情况，请使用系统存储过程\
  \ `sp_spaceused`。要查看事务日志的大小以及事务日志内使用的空间，您可以使用传统方法 T-SQL 语句 `DBCC SQLPERF(LOGSPACE)`，或查询\
  \ SQL Server 2017 的新 DMV `sys.dm_db_log_stats`。\n\n另一个选择是使用 SQL 操作中的新 SERVER REPORTS\
  \ 扩展\n\n\n# 管理与监控 SQL Server\n\n## 使用 Studio 查看空间使用情况\n\nStudio 可用于查看跨数据库的空间使用情况，按数据和事务日志使用情况拆分。\n\
  \n图 9-2 展示了一个示例。\n\n![](img/index-474_1.jpg)\n\n**图 9-2. SQL 操作工作室中的数据库空间使用情况**\n\
  \n## 添加数据库文件\n\n通过 T-SQL `ALTER DATABASE` 语句使用 `ADD FILE` 选项，向数据库添加数据库文件非常简单。你可以在以下网址阅读更多信息：[`docs.microsoft.com/sql/relational-databases/databases/add-data-or-log-files-to-a-database`](https://docs.microsoft.com/sql/relational-databases/databases/add-data-or-log-files-to-a-database)。\n\
  \n尽管可以为数据库添加事务日志文件，但添加第二个事务日志文件几乎没有任何好处，因此我不推荐这样做。\n\n**注意：** 除了 `tempdb`，你应该没有太大必要向系统数据库添加文件。当你需要为\
  \ `tempdb` 添加文件时，应确保你：\n1.  添加的文件大小和自动增长选项与其他所有文件完全相同。\n2.  如果尚未启用，使用 `ALTER DATABASE`\
  \ 为 `tempdb` 启用 `AUTOGROW_ALL_FILES`。\n\n## 删除数据库文件\n\n可能会出现需要从数据库中删除文件的情况，但该文件在通过\
  \ `ALTER DATABASE` 使用 `REMOVE FILE` 选项删除之前必须为空。\n\n你可以了解更多信息：\n*   删除文件：[`docs.microsoft.com/sql/relational-databases/databases/delete-data-or-log-files-from-a-database`](https://docs.microsoft.com/sql/relational-databases/databases/delete-data-or-log-files-from-a-database)。\n\
  *   如何清空文件：[`docs.microsoft.com/sql/relational-databases/databases/shrink-a-file`](https://docs.microsoft.com/sql/relational-databases/databases/shrink-a-file)。\n\
  \n你还可以使用 `ALTER DATABASE` 配合 `MODIFY FILE` 选项来增加数据库文件的大小。在我们的文档中了解更多信息：[`docs.microsoft.com/sql/relational-databases/databases/increase-the-size-of-a-database`](https://docs.microsoft.com/sql/relational-databases/databases/increase-the-size-of-a-database)。\n\
  \n**注意：** 在执行任何影响文件的 `ALTER DATABASE` 时，你可能遇到的一个常见问题是，它会阻塞 `BACKUP` 语句，或被任何活动的 `BACKUP`\
  \ 所阻塞。\n\n## 分离与附加数据库\n\n我之前已经讨论过如何通过移动数据库和事务日志文件来移动数据库。在前面的章节中，我也讨论了如何使用备份和还原来恢复数据库。然而，备份和还原也可用于将数据库*传输*到另一台服务器，并且是首选的传输方法。\n\
  \nSQL Server 还提供了另一种通过分离和附加数据库来传输数据库的方法。分离数据库将关闭该数据库，并移除 `master` 系统数据库中关于该数据库的元数据，但不会删除文件（而\
  \ `DROP DATABASE` 会删除文件）。\n\n**注意：** 出于安全考虑，切勿附加你不信任或不知道来源的数据库。\n\n你可以使用以下 T-SQL\
  \ 语句分离数据库：\n\n**注意：** 以下示例假设你已经按照我之前章节描述的方式，使用 `wget https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak`\
  \ 还原了完整的 `WideWorldImporters` 数据库。\n\n```sql\nEXEC sp_detach_db 'WideWorldImporters',\
  \ 'true'\nGO\n```\n\n\n此时，`WideWorldImporters` 数据库的数据库和日志文件仍保留在磁盘上的当前位置。然后，你可以将这些文件复制到另一台运行\
  \ SQL Server 的 Linux 服务器上并进行附加。运行以下 T-SQL 语句，该语句位于示例脚本 `attachwwi.sql` 中：\n\n```sql\n\
  CREATE DATABASE WideWorldImporters\nON (FILENAME = '/var/opt/mssql/data/WideWorldImporters.mdf'),\n\
  (FILENAME = '/var/opt/mssql/data/WideWorldImporters_UserData.ndf'),\n(FILENAME =\
  \ '/var/opt/mssql/data/WideWorldImporters.ldf'),\n(FILENAME = '/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1')\n\
  FOR ATTACH\nGO\n```\n\n请注意，在此示例中，我提供了 `WideWorldImporters` 数据库的所有文件以及内存优化检查点文件的文件夹。在此示例中，你可以在附加时更改数据库的名称。你也可以将文件放置在不同的路径中，然后从新路径进行附加。\n\
  \n`注意` SQL Server 有一个旧的系统存储过程 `sp_attach_db`，但它已被标记为弃用，因此请使用带有 `FOR ATTACH` 选项的\
  \ `CREATE DATABASE`。\n\n虽然通常需要所有原始文件才能附加数据库，但有一些隐藏的技巧：\n\n1.  如果数据库通过在没有活动事务存在时执行分离而干净地关闭，并且只有一个事务日志文件，那么在附加数据库时可以省略该事务日志文件，SQL\
  \ Server 将自动构建一个新的日志文件。\n2.  如果数据库通过在没有活动事务存在时执行分离而干净地关闭，并且有多个事务日志文件，SQL Server\
  \ 提供了 `FOR ATTACH_REBUILD_LOG` 这个 `CREATE DATABASE` 选项。\n\n第 9 章 管理和监控 SQL Server\n\
  \n你只应分离处于 `ONLINE`（在线）状态且健康的数据库。处于 `SUSPECT`（可疑）状态（由于某种原因恢复失败）的数据库无法被分离。但是，如果你将处于\
  \ `SUSPECT` 状态的数据库设为脱机（offline），然后删除（drop）此数据库，文件将保留。此时，如果你尝试附加此数据库，将会失败。如果你发现自己处于这种情况，可以使用我称之为\
  \ *Paul Randal 附加法* 的方法，这是以我的好朋友 Paul Randal 的名字命名的，他是数据库修复和拯救技巧方面的顶尖专家之一。你可以在 [`www.sqlskills.com/blogs/paul/creating-detaching-re-attaching-and-fixing-a-suspect-database`](https://www.sqlskills.com/blogs/paul/creating-detaching-re-attaching-and-fixing-a-suspect-database)\
  \ 阅读 Paul 针对此情况的技术。\n\n`注意` 我将补充附加选项 `ATTACH_FORCED_REBUILD_LOG` 的隐藏秘密。它是未公开文档记载且完全不受支持的，但仍然有效。在事务日志文件丢失或损坏的绝望情况下，也可以使用它来尝试附加数据库。\n\
  \n`ALTER DATABASE 使用场景`\n\n至此，我在本书中已经描述了使用 `ALTER DATABASE` 的许多不同目的和场景。以下是一些你可能会觉得有用的其他\
  \ `SET` 选项：\n\n*   `EMERGENCY`：我将在下一节关于修复数据库中讨论此选项。如果数据库无法联机，此选项会非常方便。\n*   `[ READ_ONLY\
  \ | READ_WRITE ]`：如果你想防止对数据库进行任何更改，可以将其设置为 `READ_ONLY`（只读）。如果你想向其他用户或开发人员提供数据库副本以便他们可以读取数据，但又希望确保他们不会进行任何更改以维护数据的一致性副本时，这可能很方便。使用\
  \ `READ_WRITE`（读写）则将数据库标记为可进行更改。\n*   `PAGE_VERIFY`：在第 8 章中，我讨论了数据库校验和的概念。我将在下一节关于修复数据库中进一步讨论它。这是更改默认值的选项，默认值是\
  \ `CHECKSUM`（我建议你使用）。其他选项是 `TORN_PAGE_DETECTION`（一种页面验证形式，其可靠性不如\n\n\n\n健壮如`CHECKSUM`）以及`NONE`（关闭所有页面验证）。\n\
  \n- `WITH [ROLLBACK AFTER | ROLLBACK IMMEDIATE | NO_WAIT ]`：\n  某些`ALTER DATABASE`场景需要在数据库上持有排他锁。此选项称为`终止子句`。如果该排他锁被其他用户阻塞，此`SET`选项让你能选择针对那些活动用户应发生何种行为。`ROLLBACK_AFTER\
  \ <time>`会在一段时间后终止并回滚任何活动事务。`ROLLBACK IMMEDIATE`会立即执行此操作。`NO_WAIT`意味着如果`ALTER DATABASE`必须等待活动用户，它将失败。关于哪些选项可使用此子句的列表，请参阅我们的文档：[`https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-set-options?view=sql-server-2017&tabs=sqlserver#SettingOptions`](https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-set-options?view=sql-server-2017&tabs=sqlserver#SettingOptions)。\n\
  \n- `[ SINGLE_USER | RESTRICTED_USER | MULTI_USER ]`：\n  默认情况下，SQL Server 允许多个用户与数据库交互。但是，你可以将访问限制为仅单个用户或受限用户。在使用`SINGLE_USER`或`RESTRICTED_USER`时，通常会使用终止子句。`RESTRICTED_USER`仅允许未来由`db_owner`或`sysadmin`角色的成员访问数据库。\n\
  \n  所有`ALTER DATABASE SET`选项可在我们的文档中找到：[`https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-set-options?view=sql-server-2017&tabs=sqlserver#arguments`](https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-set-options?view=sql-server-2017&tabs=sqlserver#arguments)。\n\
  \n## 修复数据库\n\n在我就职于微软期间，我曾遇到过数据库或数据库中的页面损坏或无法访问的情况。我将使数据库或其部分恢复联机并可用的技术称为`修复`数据库。正如我在第\
  \ 9 章\"管理和监控 SQL Server\"关于附加的文档中所提到的，在修复数据库方面，可能没有人（甚至微软内部）比 Paul Randal 更了解其中的\"\
  来龙去脉\"。这背后是有原因的。\n\n大约在 SQL Server 2000 开发时期，我访问了微软园区和 SQL Server 工程团队。我因在 `DBCC\
  \ CHECKDB`、数据库损坏和修复数据库方面的专业知识和技能而在工程团队中获得声誉。在这次访问中，我被介绍给一位名叫 Paul Randal 的新开发人员。这不仅开启了\
  \ Paul 和我合作开发 SQL Server 产品各种功能的旅程（其中许多功能出现在 SQL Server 2005 中），也缔结了一段伟大的友谊。Paul\
  \ 成为确保 SQL Server 拥有微软支持和客户所需可支持性功能的主要倡导者。Paul 和我，以及他的妻子 Kimberly Tripp（还有他们公司 SQLskills\
  \ 的许多员工）一直保持着深厚的友谊。事实上，我最喜欢的演讲 SQL Server 的活动之一叫做 SQLIntersection，每年举办两次，由 Paul\
  \ 和 Kim 运营。\n\n以下部分带有 Paul 在 SQL 工程团队工作期间留下的鲜明印记。此外，他撰写了一系列关于修复数据库和恢复数据库主题（以及其他几乎所有相关主题）的精彩博客文章。\n\
  \n\n\n### 第 9 章：管理与监控 SQL Server\n\n## 数据库状态\n\n在本书中，我多次提到数据库可以是 `OFFLINE`（离线）或\
  \ `ONLINE`（在线），甚至还存在一种称为 `SUSPECT`（可疑）的状态。\n\n在评估数据库为何无法访问时，`SUSPECT` 状态与 `RECOVERY_PENDING`（恢复挂起）状态之间的区别至关重要。随时可以通过查询主数据库中的\
  \ `sys.databases.state_desc` 列来获取数据库的状态。所有可能状态的列表可在我们的文档中找到：[`docs.microsoft.com/sql/relational-databases/system-catalog-views/sys-databases-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-catalog-views/sys-databases-transact-sql)。\n\
  \n![](img/index-480_1.png)\n\n当数据库首次启动时（无论是通过 SQL Server 启动、`RESTORE`（还原）、附加，还是通过\
  \ `ALTER DATABASE` 命令使其上线），如果没有问题发生，其状态会被设置为 `ONLINE`。然而，达到 `ONLINE` 状态可能需要经过一些中间状态。此外，某些问题可能导致数据库状态走向其他方向，无法变为\
  \ `ONLINE`，并使其变得不可访问。\n\n图 9-3 展示了这些不同状态以及可能导致状态转换的动作的状态图。\n\n### 图 9-3. SQL Server\
  \ 中数据库的状态\n\n让我解释其中一些状态和流程，以便您更好地理解在数据库状态未变为 `ONLINE` 时应如何应对。\n\n*   数据库启动时，总是从\
  \ `RECOVERING`（恢复中）阶段开始。\n*   如果无法打开数据库文件（例如，权限问题或文件缺失），状态会变为 `RECOVERY_PENDING`。您可能通过找到正确的文件或设置正确的权限来轻松解决问题。使用\
  \ `ALTER DATABASE` 将状态设置为 `ONLINE` 会使数据库重新回到 `RECOVERING` 状态。如果恢复成功，状态将变为 `ONLINE`。请检查\
  \ `ERRORLOG` 以获取错误信息，这些信息会明确指出导致 `RECOVERY_PENDING` 状态的原因（是哪个文件以及具体的什么操作系统错误）。\n\
  *   如果恢复不成功（由于多种不同原因），数据库的状态将被设置为 `SUSPECT`。您可以使用一种称为紧急模式修复的技术来尝试修复数据库。我将在本节后面描述该技术。\n\
  \n**注意：** SQL Server 有一个非常实用的技术，可以在恢复过程中发现页面错误时（例如校验和失败，我将在接下来详细介绍）避免数据库进入 `SUSPECT`\
  \ 状态。这被称为延迟事务，您可以通过以下链接了解更多相关信息：[`docs.microsoft.com/sql/relational-databases/backup-restore/deferred-transactions-sql-server`](https://docs.microsoft.com/sql/relational-databases/backup-restore/deferred-transactions-sql-server)。\n\
  \n\n\n[sql-server](https://docs.microsoft.com/sql/relational-databases/backup-restore/deferred-transactions-sql-server)\n\
  \n-   请注意，在执行 `RESTORE DATABASE` 操作期间，数据库的状态为 `RESTORING`，然后在数据库还原的恢复阶段，状态会转变为 `RECOVERING`。\n\
  \n## 关于校验和的更多信息\n\n我在本书中多次提到了数据库校验和的概念。\n\n校验和是 SQL Server 2005 中引入的一个重要概念，用于指示数据库页面在写入磁盘后被修改。如果\
  \ SQL Server 发现数据库页面被修改并导致校验和验证失败，则会向 `ERRORLOG` 写入以下错误：\n\n`Msg 824`，SQL Server\
  \ 检测到基于逻辑一致性的 I/O 错误：校验和不正确（预期值：0xdec71ff7；实际值：0xb0499fcf）。此错误发生在读取页面 (`<pageid>`)\
  \ 时...\n\n![](img/index-482_1.jpg)\n\n# 第 9 章 管理和监控 SQL Server\n\n此外，还会在 `msdb`\
  \ 数据库中的 `suspect_pages` 表里写入一条记录。\n\n请记住，对于 `Always On 可用性组`，这种情况可能触发自动页面修复。多年来，我收到过关于校验和实际工作原理的问题，因此我将在这里进行描述。图\
  \ 9-4 展示了我绘制的示意图，以说明校验和的基本原理。\n\n### 图 9-4. SQL Server 中的校验和工作原理\n\n让我解释一下这个流程。如果为数据库设置了\
  \ `PAGE_VERIFY=CHECKSUM`（这是 SQL Server 的默认设置），当一个页面被写入磁盘时，SQL Server 会计算一个校验和值（基于页面上比特位的数学计算）并将其存储在页面的头部。当\
  \ SQL Server 从磁盘读取该页面时，它会重新计算校验和。如果计算出的校验和与页面头部存储的值不匹配，就遇到了校验和失败。\n\n不过，请注意图中写着“重试读取失败\
  \ 4 次后”。这是因为如果遇到校验和失败，SQL Server 会尝试最多重试四次读取，然后才会发出真正的校验和失败信号。我们的 SQL 工程团队发现，在某些情况下会出现瞬时硬件问题，重试读取可能会成功（但\
  \ 4 次通常是其总会失败的阈值）。如果重试读取成功，尝试读取该页面的查询会成功，但你会在 `ERRORLOG` 中看到 `Msg 825`。\n\n# 第 9\
  \ 章 管理和监控 SQL Server\n\n**请注意**，`Msg 824` 是在读取或写入数据库页面时发生的*逻辑*故障。\n\n除了校验和计算外，还有其他一些逻辑检查。例如，SQL\
  \ Server 总是将页面头部的 `pageid` 值与它认为正在读取的实际页面进行比对。当 SQL Server 在读写页面时遇到物理错误，会引发 `Msg\
  \ 823`。例如，如果在读取页面时发生操作系统错误，则会出现 `Msg 823`，而不是 `Msg 824`。\n\n校验和算法有一个值得注意的缺陷。校验和是根据数据库页面*在写入时*存储的内容计算的。如果数据库页面在内存中已损坏，校验和将基于已损坏的页面计算，因此永远不会引发错误。SQL\
  \ Server 确实有一个算法，由后台进程定期在校验和即使位于内存中时也进行验证。当此进程检测到内存中的页面发生校验和失败时，它会向 `ERRORLOG` 引发\
  \ `Msg 832`。你可以从这篇 Microsoft 知识库文章中阅读有关此验证及其解决方法的更多信息：[`support.microsoft.com/help/2015759/how-to-troubleshoot-msg-832-constant-page-has-changed-in-sql-server`](https://support.microsoft.com/help/2015759/how-to-troubleshoot-msg-832-constant-page-has-changed-in-sql-server)。\n\
  \n修复因校验和错误而失败的页面，可以通过还原备份、从备份中还原该页面，或使用 `DBCC CHECKDB` 进行修复（这将导致\n\n\n\n# 第 9 章\
  \ SQL Server 的管理与监控\n\n## DBCC CHECKDB 修复\n\n我在第 8 章讨论了用于检查数据库一致性的`DBCC CHECKDB`命令。`CHECKDB`包含从磁盘读取页面的操作，因此在执行过程中会对每个页面进行校验和验证。\n\
  \n如果`DBCC CHECKDB`在检查数据库一致性时遇到任何故障，可以使用此 T-SQL 语句来修复数据库。使用`CHECKDB`修复数据库有两个选项：\n\
  \n-   **`REPAIR_REBUILD`**：如果可以通过仅重建或修复索引来修复数据库，`REPAIR_REBUILD`可以纠正执行`CHECKDB`时发现的错误。\n\
  -   **`REPAIR_ALLOW_DATA_LOSS`**：如果 SQL Server 在`CHECKDB`中检测到只能通过释放页面（可能导致数据丢失）来修复的错误，则可以使用此选项。顾名思义，使用此选项时，您需要意识到可能会丢失数据。`CHECKDB`在报告哪些页面将被释放以及释放数量方面非常详细。从良好的备份中恢复（或故障转移到有效的辅助副本）始终是最佳的恢复模式，但在某些情况下，使用`CHECKDB`修复数据库是您唯一的选择，即使可能会遇到一些数据丢失。\n\
  \n官方文档对其中一些场景的描述相当详尽，您可以在[`docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-checkdb-transact-sql`](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-checkdb-transact-sql)阅读。此外，运行`CHECKDB`的输出会指明在完成`CHECKDB`时，解决所有发现错误所需的最小修复选项是什么。\n\
  \n根据多年的经验，我可以告诉您一些关于使用`CHECKDB`修复选项的观察：\n\n-   存在一些无法修复的错误。\n-   我很少遇到客户情况，其中`REPAIR_REBUILD`是一个有效的解决方案。如果您有数据库损坏（通常称为*corruption*。损坏的一个例子是本章前面描述的校验和失败），通常会导致一些数据丢失。并非总是如此，但通常是这样。\n\
  -   我见过一些案例，我不得不多次运行带有修复选项的`CHECKDB`迭代才能解决所有错误。\n-   `CHECKDB`可以在带有修复选项的事务中运行，这样您可以先运行修复，然后在必要时回滚。\n\
  -   如果您在决定是恢复备份还是运行修复，请考虑*已知*和*未知*因素。如果您有一个有效的备份可以恢复，但会丢失一天的工作成果，这可能是一个更好、更快的解决问题的方法，因为这是已知的。尝试修复损坏的数据库并试图弄清楚丢失了哪些与已知业务价值和数据相关的页面，可能需要很长时间。我遇到过一些情况，我同时指导客户进行这两种操作：将备份恢复到另一个不同的数据库，同时尝试修复选项。\n\
  \n建议您查阅 Paul Randal 的博客文章标签“[CHECKDB from every angle](https://www.sqlskills.com/blogs/paul/category/checkdb-from-every-angle)”，其中包含一些关于`DBCC\
  \ CHECKDB`的非常棒的信息。\n\n**注意** 我仍然会收到来自客户和 SQL Server 用户的问题，询问微软是否拥有一些无人知晓的神奇工具集，可以让我们*修补*数据库。透明的事实是，我们曾经有过。在很久很久以前的“另一个星系”，我曾使用过一些程序，可以让我在数据库页面上“修复比特位”。这仍然非常耗时且成本高昂，而且我很少使用它。该工具已不复存在，重新创建它也没有任何益处。您可以阅读\
  \ Paul 的博客了解更多。\n\n\n\n关于未公开的 `dBCC 命令`，它允许进行“位修复”。\n\n但是，请不要依赖于此。我们并未真正测试这个命令（它可能导致服务器崩溃或造成无法修复的损害），它需要大量时间来使用，需要深入了解\
  \ SQL Server 的内部页面结构（这些结构我们未提供文档，且随着时间推移已经并将继续发生变化），并且我们可能随时移除它。\n\n## 紧急模式修复\n\n\
  请考虑前述图示（图 9-3）中名为 SUSPECT 的数据库状态。SQL Server 已尝试运行恢复，但发生了不可恢复的故障（例如，事务日志文件损坏）。在 Paul\
  \ 加入 Microsoft 之前，这是我需要帮助客户处理的最棘手的情况之一。Paul 在 SQL Server 2005 中引入了一个称为 `紧急模式修复`\
  \ 的概念。这个概念是通过 `ALTER DATABASE <dbname> SET EMERGENCY` 将数据库状态更改为 EMERGENCY。\n\n这将允许你访问数据库，然后使用\
  \ `REPAIR_ALLOW_DATA_LOSS` 选项运行 `DBCC CHECKDB`。SQL Server 会识别出事务日志不可访问，并将 `重建事务日志`\
  \ 并运行恢复。Paul 在这篇博文中描述了该过程：https://www.sqlskills.com/blogs/paul/checkdb-from-every-angle-emergency-mode-repair-the-very-very-last-resort。\n\
  \n这听起来相当容易且简单，确实如此。但问题在于。由于事务日志必须被重建，你无从知晓日志中有哪些需要前滚或回滚的事务。因此，即使 `DBCC CHECKDB`\
  \ 显示 `干净`，你的数据库也可能很容易出现逻辑不一致（例如，想象一下意外将 100 万美元贷记到一个银行账户，它可能就在那里但你不知道！）。\n\n这就是为什么它是最后手段，并且绝对不能替代从一个良好备份进行还原。尽管有这些警告，我在\
  \ Microsoft 支持部门工作时经常发现自己使用这种技术，因为这些客户没有有效的备份可以还原。\n\n关于使用数据库的 `EMERGENCY` 状态，我还有另一个评论。虽然你可以使用紧急模式修复选项，但我见过其他情况，将数据库状态设置为\
  \ `EMERGENCY` 允许我访问数据库并复制出（例如使用 `bcp`）关键表给业务部门。请将此记住，作为你数据库挽救工具箱中的一部分。\n\n## 使用\
  \ CONTINUE_AFTER_ERROR 进行还原\n\n我在第 8 章提到过，如果备份是使用 `WITH CHECKSUM` 选项创建的，并且在备份介质本身上发生了校验和错误，那么备份还原将会失败。\n\
  \n在那个神奇的 SQL Server 2005 可支持性发布版本中，我们为 `RESTORE` 增加了一个名为 `CONTINUE_AFTER_ERROR`\
  \ 的选项。在大多数情况下，即使发生错误（如校验和错误），此选项也允许 `RESTORE` 完成。此时，数据库是否能用或可挽救完全就像“抛硬币”一样不确定。然而，有可能只有备份介质的一小部分（甚至单个位）存在问题，因此这个选项可能帮助你恢复数据库的大部分内容。\n\
  \n## 查找损坏原因\n\n多年来，我在 Microsoft 支持部门处理涉及数据库损坏的客户案例时，总是（并且理所当然地）被问到“这是什么原因造成的？”。我从\
  \ 25 年的经验可以告诉你，数据库损坏的首要原因是系统问题，大多数情况下来自 I/O 系统。\n\n这里有一个有趣的技术可以帮助你证明这一点。如果你运行 `DBCC\
  \ CHECKDB` 时遇到校验和错误，并且有一系列跨越问题时间段的数据库和事务日志备份，请将它们还原到不同的系统上进行分析。\n\n\n# 第 9 章 SQL\
  \ Server 的管理与监控\n\n单独的服务器。如果数据库和事务日志备份有效，并且按照跨越错误的时间序列进行恢复，但恢复序列中并未显示该错误，那么问题必然出在原始数据库上，表现为损坏的页面，无论是内存中还是磁盘上。\n\
  \n我实际上曾在多年前遇到过一个客户按照此序列进行操作，恢复序列确实显示了相同的错误。后来发现这是 SQL Server 中的一个漏洞，我们立即找到了并修复了它。\n\
  \n更常见的情况是，恢复序列并未显示问题。一段时间后，客户会告诉我们，通过更新硬件的驱动程序和固件（或更换硬件组件）问题就解决了。\n\n## 对象管理\n\n\
  与数据库类似，一旦创建了表、索引以及存储过程等服务器端代码，你将不可避免地需要管理这些对象。本节涵盖了一些你可能需要执行的管理任务示例，例如修改表、截断表、处理索引碎片以及修改服务器端代码。\n\
  \n## 表的管理\n\n在本节中，我将讨论管理表的两个方面：通过修改列和属性来更改表；以及截断表，这可能是*清空*表的一种非常高效的方法。\n\n### 修改表\n\
  \n为数据库创建表之后，可能会遇到需要修改表的定义或属性的情况。你当然可以选择复制出表的数据，删除当前表，创建新的表定义，然后再导回数据。\n\n然而，SQL\
  \ Server 提供了 `ALTER TABLE` 语句来修改表的定义或属性。修改表最常见的用途之一是更改列。使用 `ALTER TABLE`，你可以在某些限制条件下添加、删除或更改列的定义。不过，对列进行修改会有一些影响。以下是与\
  \ `ALTER TABLE` 一起使用以更改列定义的选项及其影响：\n\n**ADD <column>:** 你可以向表中添加列，这些列将按顺序定义在表的末尾。你添加的任何列都必须允许\
  \ `NULL` 值，或者你必须在添加列时指定一个 `DEFAULT` 约束，以便为新列的每一行提供默认值。在包含大量数据行的表上添加带有默认值的列可能需要一些时间才能完成（因为这类似于对每一行执行一次\
  \ `INSERT` 操作），并会产生大量的日志记录。\n\n**ALTER COLUMN <column>:** 你可以更改列的类型及其大小。更改类型必须遵循\
  \ SQL Server 可能的数据类型转换规则，这些规则可以在 [`docs.microsoft.com//sql/t-sql/data-types/data-type-conversion-database-engine`](https://docs.microsoft.com//sql/t-sql/data-types/data-type-conversion-database-engine)\
  \ 找到。更改列的大小是可能的，前提是新的大小大于当前定义的大小（例如，你可以将 `varchar(100)` 更改为 `varchar(200)`，但不能更改为\
  \ `varchar(10)`）。\n\n**DROP COLUMN <column>:** 你可以删除表中的列，但作为约束（如主键）一部分的列除外。你必须先删除这些约束，这也可以通过\
  \ `ALTER TABLE` 实现。请注意，删除列是完全记录日志的（类似于 `DELETE` 操作），因此在包含大量数据行的表上执行此操作可能需要一些时间，并会产生大量的日志记录。\n\
  \n你还可以使用 `ALTER TABLE` 调整表的其他一系列属性，例如分区、约束、锁升级和触发器。你可以在 [`docs.microsoft.com/sql/t-sql/statements/alter-table-transact-sql#arguments`](https://docs.microsoft.com/sql/t-sql/statements/alter-table-transact-sql#arguments)\
  \ 查看与 `ALTER TABLE` 一起使用的完整选项列表。\n\n\n\n# 第 9 章 SQL Server 的管理与监控\n\n默认情况下，执行 `ALTER\
  \ TABLE` 几乎会阻塞所有其他查询（或被其他查询阻塞）。这是因为 `ALTER TABLE` 默认会获取一个架构修改锁（`Sch-M`）。问题在于，即使是最简单的\
  \ `SELECT` 语句也需要一个架构稳定性锁（`Sch-S`），而此锁与 `Sch-M` 锁不兼容。幸运的是，SQL Server 允许在某些 `ALTER\
  \ TABLE` 场景中避免获取 `Sch-M` 锁，并通过在 `ALTER TABLE` 语法中加入 `WITH (ONLINE=ON)` 选项来允许操作*联机*执行。关于哪些操作允许通过\
  \ `ALTER TABLE` 联机运行，您可以在 `WITH (ONLINE=ON)` 选项的官方文档中了解更多，链接如下：[`docs.microsoft.com/sql/t-sql/statements/alter-table-transact-sql#arguments`](https://docs.microsoft.com/sql/t-sql/statements/alter-table-transact-sql#arguments)。\n\
  \n您可以在我们的文档中阅读 `ALTER TABLE` 语句的所有详细信息：[`docs.microsoft.com/sql/t-sql/statements/alter-table-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/alter-table-transact-sql)。\n\
  \n## 截断表\n\n假设您需要删除现有表中的所有行。也许您正将某个表用作提取、转换和加载（ETL）过程的一部分。此过程的一部分要求您在 SQL Server\
  \ 中*清空*该表，并用新数据刷新它。您可以使用 `DELETE` 语句，但这可能代价高昂，因为 SQL Server 必须记录每一行被删除的变化。SQL Server\
  \ 确实使用一个称为*幽灵记录*的过程来加速删除操作，但如果表中所有行（比如 100 万行）都需要删除，使用 `DELETE` 语句效率并不高。\n\n因此，SQL\
  \ Server 提供了 `TRUNCATE TABLE` 语句，以更高效的方式删除表中的所有行。当您执行 `TRUNCATE TABLE` 语句时，SQL Server\
  \ 将解分配区（由八个连续页组成的集合），并且仅记录这些解分配操作。因此，`TRUNCATE TABLE` 语句速度非常快，并且只使用最少的日志空间（但仍可以在事务上下文中运行，因此可以回滚）。此外，对于像\
  \ `TRUNCATE TABLE` 这样的操作，页的解分配速度更快，因为 SQL Server 使用了*延迟删除*的概念。您可以从 Paul Randal 的博客文章中了解更多关于延迟删除和\
  \ `TRUNCATE TABLE` 日志记录的信息：[`www.sqlskills.com/blogs/paul/a-sql-server-dba-myth-a-day-1930-truncate-table-is-non-logged`](https://www.sqlskills.com/blogs/paul/a-sql-server-dba-myth-a-day-1930-truncate-table-is-non-logged)。\n\
  \n您可以在我们的文档中阅读关于 `TRUNCATE TABLE` 工作原理的更多细节，包括限制和约束：[`docs.microsoft.com/sql/t-sql/statements/truncate-table-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/truncate-table-transact-sql)。\n\
  \n## 管理索引\n\n一旦为表创建了索引，您可能会决定创建其他索引，正如我在第 6 章讨论的那样。在某些情况下，您可能会发现最初选择的某个特定索引不再有意义。在这些情况下，您可以使用\
  \ `DROP INDEX` 语句来删除特定索引。请记住，我在第 6 章建议过，在大多数情况下，您会希望为表创建聚集索引，因此如果您决定删除聚集索引，您会希望用包含不同列集的新聚集索引来替换它。这篇博客文章虽然较早，但仍然非常适用，作者是\n\
  \n\n\n# 第 9 章 管理和监控 SQL Server\n\nKimberly Tripp 关于查看索引使用情况以及是否有必要保留已创建索引的见解，请参阅\
  \ [`www.sqlskills.com/blogs/kimberly/spring-cleaning-your-indexes-part-i`](https://www.sqlskills.com/blogs/kimberly/spring-cleaning-your-indexes-part-i)。\n\
  \n如果你只需为表创建所需索引，然后在数据库和应用程序的整个生命周期内都无需再为此担心，那将是理想的情况。对于主要是只读的数据库，这可能部分成立。然而，几乎每个应用程序都会修改数据，而在大多数情况下，索引必须随着数据一起更新和更改。`SQL\
  \ Server` 会自动处理这类索引修改。但是，由于数据会随时间发生一些变化，你可能需要通过重建或重组来维护索引。在本节中，我将讨论重建和重组索引的过程，并简要介绍修改索引某些属性的功能。在任何这些情况下，`SQL\
  \ Server` 都提供 `ALTER INDEX` `T-SQL` 语句来维护现有索引。不过，首先我需要更详细地讨论索引碎片的概念。\n\n**注意**，`SQL\
  \ Server` 社区最顶尖的专家之一 ola hallengren 提供了一个非常棒的解决方案，其中包含的脚本有助于自动化索引维护，请访问 [`ola.hallengren.com/sql-server-index-and-statistics-maintenance.html`](https://ola.hallengren.com/sql-server-index-and-statistics-maintenance.html)。\n\
  \n## 索引碎片\n\n当你修改数据，尤其是插入和删除新行时，你所创建的索引可能会变得碎片化。我在之前关于索引性能能力的章节中简要提到了碎片的概念。碎片有两种类型：\n\
  \n### 逻辑或区碎片\n逻辑碎片是指逻辑上链接在一起但物理顺序错乱的页面所占的百分比。例如，聚簇索引在叶级有一个代表数据的数据库页面的链接列表。理想情况下，所有这些页面都应按\
  \ pageid 在列表中排序，以便它们在数据库文件中物理有序且连续。如果你还记得第 6 章，我谈到过 `SQL Server` 只有在页面在文件中物理连续时才能一次读取多个页面。如果你运行一个需要在聚簇索引中扫描多个页面的\
  \ `SQL Server` 查询，除非页面是物理有序的，否则 `SQL Server` 高效读取多个页面的能力会受到限制。区碎片是相同的概念，只是它适用于没有聚簇索引的表（堆）以及页面在\
  \ `IAM` 页面内的排序方式。\n\n### 页面紧凑度\n页面紧凑度是我在本书中创造的一个术语，你可能不会看到这个术语作为碎片概念的一部分出现。我之所以将这部分称为碎片，是因为索引（或聚簇索引的数据）的页面中行填充得越稀疏，或者说紧凑度越低，服务一个查询需求可能需要的页面就越多。这可能导致所有查询所需的页面数量超出预期，从而占用缓冲池空间并需要更多的\
  \ `I/O`。然而，这里存在一个平衡。如果页面是 100%填满（紧凑）的，插入新行可能需要进行页面拆分，这可能导致更多的逻辑碎片。因此，理想情况下，在页面上保留一些可用空间是可取的，但不要达到大多数页面都空置的程度。当你创建、重建或重组索引时，可以使用一个名为\
  \ `fillfactor` 的选项，就如何在索引页面中保留空间做出明智的选择。我非常喜欢 Kimberly Tripp 的这篇博客文章。\n\n### 第 9\
  \ 章：管理与监控 SQL Server\n\n要了解更多关于 `fillfactor` 的信息，请参阅 [sqlskills.com 上的这篇文章](https://www.sqlskills.com/blogs/kimberly/database-maintenance-best-practices-part-ii-setting-fillfactor)。\n\
  \n> **注意：** 索引中的碎片可能不会影响应用程序性能，尤其是逻辑碎片。逻辑碎片主要影响涉及页面扫描（而非 seek 到特定页面）的 T-SQL 查询。因此，检测到索引中存在碎片并不意味着你总是需要重建或重新组织索引。话虽如此，根据我的经验，几乎每个生产\
  \ SQL Server 环境都会部署一个计划来防止索引保持碎片化，以确保所有类型的 T-SQL 查询都能获得最佳性能。\n\nSQL Server 提供了一种通过名为\
  \ `sys.dm_db_index_physical_stats` 的 DMV 来查看碎片这两个方面情况的方法。列 `avg_fragmentation_in_percent`\
  \ 追踪逻辑或区碎片，而 `avg_page_space_used_in_percent` 追踪索引中页面的填充程度。\n\n那么问题来了，如何解决与碎片相关的问题？我建议你考虑\
  \ SQL Server 提供的两个用于维护现有索引的选项：*重建索引* 或 *重新组织索引*。\n\n## 重建索引\n\n通过使用 `REBUILD` 选项的\
  \ `ALTER INDEX` 来重建索引，涉及删除现有索引并根据现有索引定义创建新索引，因此需要在数据库中预留额外空间来重建索引。注意：`ALTER INDEX`\
  \ 和 `CREATE INDEX` 有一个名为 `SORT_IN_TEMPDB` 的选项，用于将排序结果作为索引重建的一部分存储在 `tempdb` 中，而不是用户数据库中。重建索引将按物理顺序重新排序页面以消除碎片，并根据指定的\
  \ `fillfactor` 压缩页面。此外，重建索引将为该索引创建一套全新的统计信息。\n\n默认情况下，索引重建是一项*离线*操作，会阻塞现有查询。但是，与\
  \ `ALTER TABLE` 类似，使用 `REBUILD` 的 `ALTER INDEX` 提供了一个选项，可通过 `WITH ONLINE=ON` 选项来*在线*重建索引。这允许查询在索引重建的同时执行。\n\
  \n此外，SQL Server 提供了一个名为*可恢复的*在线索引重建选项，使用 `RESUMABLE=ON` 选项。使用此选项允许你暂停索引重建，并在中断处恢复。以下是一些可能对你有帮助的场景：\n\
  \n*   暂停一个正在消耗大量 SQL Server 资源并影响整体性能的索引重建操作。这允许你在稍后时间点恢复索引重建，而不必取消重建并重新运行整个过程。\n\
  *   分块执行索引重建。例如，你可以随时间分 25% 的增量重建索引。目录视图 `index_resumable_operations` 可用于跟踪可恢复在线索引重建的进度。你可以在\
  \ [sys.index_resumable_operations 的 Microsoft 文档](https://docs.microsoft.com/sql/relational-databases/system-catalog-views/sys-index-resumable-operations)\
  \ 中阅读更多关于此目录视图的信息。\n\n以下是一个使用完整的 WideWorldImporters 示例数据库进行可恢复在线索引重建的简单示例。执行示例 `resumablerebuild.sql`\
  \ 中的以下 T-SQL 语句，以查看在线重建索引的示例：\n\n```sql\n-- （可恢复在线索引重建示例的 T-SQL 代码将放在此处）\n```\n\n\
  \n### 使用可恢复选项时：\n\n```sql\nUSE WideWorldImporters\nGO\nALTER INDEX PK_Purchasing_PurchaseOrders\n\
  ON [Purchasing].[PurchaseOrders]\nREBUILD\nWITH (ONLINE = ON, RESUMABLE = ON);\n\
  GO\n```\n\n使用 `REBUILD` 的 `ALTER INDEX` 可以利用并行处理，并遵循与查询相同的规则来决定 `MAXDOP`。`ALTER\
  \ INDEX` 语句提供了一个 `MAXDOP` 提示。此外，`ALTER INDEX` 还提供了一个名为 `ALL` 的选项，可在单个事务中重建指定表的所有索引。\n\
  \n## 重组索引\n\n除了重建索引，另一种方法是重组索引。索引重组是一项在线操作，它使用现有的索引页来压缩页面并移动页面，使其按物理顺序排列。你可以使用带\
  \ `REORGANIZE` 选项的 `ALTER INDEX` 来重组索引。\n\n重组索引是处理索引碎片的一个很好选择，但不会更新索引的统计信息。此外，带\
  \ `REORGANIZE` 的 `ALTER INDEX` 也提供了使用 `ALL` 来重组表的所有索引的选项，并允许你指定一个填充因子。Paul Randal\
  \ 有一篇精彩的博文描述了重建和重组索引之间的区别：[`www.sqlskills.com/blogs/paul/sqlskills-sql101-rebuild-vs-reorganize`](https://www.sqlskills.com/blogs/paul/sqlskills-sql101-rebuild-vs-reorganize)。\n\
  \n## 自适应索引整理\n\n你可以参考文档中的指导来决定是重建还是重组索引，详见 [`docs.microsoft.com/sql/relational-databases/indexes/reorganize-and-rebuild-indexes`](https://docs.microsoft.com/sql/relational-databases/indexes/reorganize-and-rebuild-indexes)。然而，多亏了\
  \ SQL 工程团队中被称为老虎团队的聪明人，你可以使用一个脚本来创建一个*智能的*存储过程，由它来决定是重建还是重组你的索引。这个脚本及其概念被称为自适应索引整理。你可以在以下链接阅读更多关于此脚本的功能说明，并进行下载：[`github.com/Microsoft/tigertoolbox/tree/master/AdaptiveIndexDefrag`](https://github.com/Microsoft/tigertoolbox/tree/master/AdaptiveIndexDefrag)。\n\
  \n## 修改索引\n\n可以在不要求重建索引的情况下更改索引的某些属性。这包括诸如锁定行为（例如 `ALLOW_PAGE_LOCKS`）和统计信息选项（例如\
  \ `STATISTICS_NORECOMPUTE`）。`ALTER INDEX` 的大多数选项确实需要更改索引结构，正如之前在重建和重组索引的示例中所见。有关\
  \ `ALTER INDEX` 的完整选项列表，请参阅我们的文档：[`docs.microsoft.com/sql/t-sql/statements/alter-index-transact-sql#arguments`](https://docs.microsoft.com/sql/t-sql/statements/alter-index-transact-sql#arguments)。\n\
  \n### 维护列存储索引\n\n我在第 6 章讨论了称为列存储索引这一出色的性能特性。尽管列存储索引的组织方式与行存储索引不同，但它们仍然可能需要维护。以下是一些在决定如何维护列存储索引时可以使用的资源：\n\
  \n- 查阅有关列存储索引碎片整理的文档：[`docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-defragmentation`](https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-defragmentation)。\n\
  - 这里有一篇关于如何整理列存储索引的讨论。\n\n\n# 第 9 章 SQL Server 的管理与监控\n\n## 管理服务器端代码\n\n到目前为止，本书中展示了创建\
  \ T-SQL*服务器端代码*的示例，包括存储过程、视图、函数和触发器。一旦创建了这些对象，你可能需要修改甚至删除它们。每种对象类型都支持相应的 `ALTER`\
  \ 和 `DROP` T-SQL 版本的 `CREATE` 语法。\n\n任何时候，当你 `ALTER` 一个服务器端编程对象（如存储过程）时，该对象将在下次执行时重新编译并存储在缓存中。\n\
  \nSQL Server 2016 SP1 和 SQL Server 2017 引入了一个新语法，你应该考虑在创建这类对象的脚本中使用它。它被称为 `CREATE\
  \ or ALTER`。使用这个新语法，你可以创建一个单一的脚本来创建或修改对象，而不必有一个脚本用于创建，另一个用于修改，或者每次想要更改时都必须先删除再创建。\n\
  \n例如，以下 T-SQL 语句如果名为 `howboutthemcowboys` 的存储过程不存在则创建它，如果已存在则修改它。无需使用 `DROP` 语句。你可以在示例脚本\
  \ `howboutthemcowboys.sql` 中找到此语句：\n\n```sql\nUSE WideWorldImporters\nGO\nCREATE\
  \ or ALTER PROCEDURE howboutthemcowboys\nAS\nBEGIN\n    SELECT 'Back to the Super\
  \ Bowl in 2019'\nEND\nGO\n```\n\n你可以在我们的文档中阅读更多关于如何使用 `CREATE or ALTER` 对象的信息：[`docs.microsoft.com/sql/t-sql/statements/create-procedure-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-procedure-transact-sql)。\n\
  \n使用 `ALTER INDEX REORGANIZE` 在线整理列存储索引的碎片：[`docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-defragmentation#use-alter-index-reorganize-to-defragment-a-columnstore-index-online`](https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-defragmentation#use-alter-index-reorganize-to-defragment-a-columnstore-index-online)。\n\
  \n关于如何重建列存储索引的更多详细信息请见：[`docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-defragmentation#rebuild`](https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-defragmentation#rebuild)。\n\
  \n查看关于重建和重组列存储索引的 T-SQL 示例：[`docs.microsoft.com/sql/t-sql/statements/alter-index-transact-sql#examples-columnstore-indexes`](https://docs.microsoft.com/sql/t-sql/statements/alter-index-transact-sql#examples-columnstore-indexes)。\n\
  \n#### 监控 SQL Server\n\n管理 SQL Server 实例、数据库和对象对于保持 SQL Server 健康并以峰值性能运行至关重要。但在某些情况下，你如何知道是否需要采取一些管理措施呢？你需要能够监控关键的性能信息和\
  \ SQL Server 的各个方面，以做到主动管理并做出明智的决策。\n\n在本章的这一节中，我将讨论使用 SQL Server 功能监控 SQL Server\
  \ 性能的各种方法，如何使用一个极其酷炫的功能——系统运行状况会话，如何监控事务日志备份，以及我对 Linux 的看法。\n\n\n用于监控操作系统与服务器健康状况的工具。\n\
  \n在此我要停顿一下，做一个重要的说明，这对你来说可能显而易见，但坦率地说，却常常被许多人忽视。**为你的 SQL Server 建立一个性能基线至关重要**。你可以每天监控\
  \ SQL Server，但除非你建立并保存了工作负载的基线以便对比，否则你无法判断看到的情况是否可能是问题，尤其是在性能方面。如果你不知道良好的性能是什么样的，你又如何知道自己遇到了性能问题呢？\n\
  \n## 监控 SQL Server 性能\n\n虽然 SQL Server 数据库平台内置了许多强大的功能来支持性能监控，但没有任何整体的监控解决方案能比我们专注于监控的合作伙伴提供的方案更优。你可以在\
  \ [`docs.microsoft.com/sql/sql-server/partner-monitor-sql-server`](https://docs.microsoft.com/sql/sql-server/partner-monitor-sql-server)\
  \ 找到这些合作伙伴的完整列表。\n\n这些合作伙伴使用的许多功能和能力都建立在第五章介绍的大量工具之上，包括数据库引擎的内置功能。在本节中，我将回顾其中一些工具和功能，以及使用它们监控\
  \ SQL Server 性能的基本方法。\n\n### 运行中或等待中\n\n我在本章前面提到了我的一位长期同事兼朋友，基思·埃尔莫尔。与罗伯特·多尔一样，我曾与基思在微软技术支持部门并肩工作多年，基思至今仍是我很好的朋友。每当涉及如何解决\
  \ SQL Server 的性能问题时，我总是会想到基思（直到今天也是如此）。\n\n几年前，基思为技术支持部门构建了一些培训，他用于这些培训的理念简单而卓越。基思创造了一个术语，即\
  \ SQL Server 性能问题可以归类为*运行中*或*等待中*。\n\n第 9 章 管理与监控 SQL Server\n\n**运行中** 等同于 CPU\
  \ 利用率。监控服务器上所有进程的 CPU 利用率非常重要，这有助于了解任何性能问题是否与 SQL Server 进程或其他进程有关。如果 SQL Server\
  \ 的 CPU 利用率看起来过高，以至于可能影响性能，那么你需要深入调查是哪些 T-SQL 查询在执行并消耗了最多的 CPU。如果没有查询消耗大量 CPU，那么问题可能出在后台进程或自旋锁争用问题上（我在第六章讨论内存中\
  \ OLTP 时简要提到过自旋锁）。可以使用诸如 `dm_exec_query_stats` 这样的 DMV 或查询存储来追踪那些可能导致高 CPU 消耗场景的查询。\n\
  \n**等待中** 就 SQL Server 而言，指的是 SQL Server 用户任务可能正在等待特定的*等待类型*，即等待特定资源的情况。由于多个用户可能都在争夺相似的资源，一个等待场景可能涉及多个用户都在等待另一个正在等待资源的用户（就等待类型而言，这通常称为*阻塞链*）。我在第五章讨论\
  \ DMV `dm_exec_requests`、`dm_os_waiting_tasks` 和 `dm_os_wait_stats` 时提到过等待类型的概念。\n\
  \n掌握了这些知识，你不仅可以解决几乎任何 SQL Server 性能问题，还将知道如何通过监控 CPU 利用率以及跨用户和 SQL Server 实例的等待类型，来主动监控\
  \ SQL Server 性能。\n\n### 使用 DMV 监控性能\n\n遵循基思关注 CPU 利用率或等待场景的思路，你首先需要能够监控 Linux 服务器上所有进程（包括\
  \ `sqlservr`）的 CPU 利用率。请在本章后面的章节中查找用于监控所有进程 CPU 的 Linux 工具和包。\n\n假设你关注的是 SQL Server\
  \ 的 CPU 利用率，你可以使用 DMV `dm_exec_query_stats` 来找出基于缓存计划执行并使用了最高 CPU 利用率的查询。此外，你可以使用\
  \ DMV `dm_exec_requests` 和 `dm_os_waiting_tasks` 来找出哪些任务正在等待其他任务或特定资源。DMV `dm_os_wait_stats`\
  \ 则展示了整个 SQL Server 实例中等待资源最高的情况。我在第五章提供了如何使用每个这些 DMV 的示例。另外，不要忘记使用轻量级查询分析功能监控实时查询，包括\
  \ DMV `dm_exec_query_profiles`。我在第五章提到过此功能，但这里有一个链接提醒你阅读更多关于实时监控查询的内容：[`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-profiles-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-profiles-transact-sql)。\n\
  \n我期待着未来我们可以默认开启此功能，这样你就能一直看到实时的查询信息！\n\n你还需要从工作负载和吞吐量的角度监控 SQL Server 的整体性能。我在前面的章节中提到过可用于此目的的\
  \ DMV `dm_os_performance_counters`。此 DMV 在 SQL Server 启动时初始化，然后在 SQL Server 引擎运行时保持更新。请记住，此\
  \ DMV 具有非常规范化的结构，其中行值描述要测量的特定计数器，而不是列名。\n\n以下 T-SQL 语句（在示例 `dm_os_performance_counters.sql`\
  \ 中）返回 SQL Server 实例在任何时间点对象名为 `SQLServer:SQL Statistics` 的所有计数器：\n\n```\nSELECT\
  \ * FROM sys.dm_os_performance_counters\nWHERE object_name = 'SQLServer:SQL Statistics'\n\
  ORDER BY counter_name\nGO\n```\n\n我们为 SQL Server 构建了性能计数器，以与 Windows 性能计数器系统集成（更多信息见\
  \ [`docs.microsoft.com/windows/desktop/perfctrs/performance-counters-reference`](https://docs.microsoft.com/windows/desktop/perfctrs/performance-counters-reference)）。查看这些计数器的常用方法是使用\
  \ Windows 性能监视器工具（通常称为 `perfmon`）。由于 Windows 性能计数器系统在 Linux 操作系统上不起作用，因此你可以通过 `dm_os_performance_counters`\
  \ DMV 查询 SQL Server 性能计数器。所有可能的 SQL Server 性能计数器的描述记录在我们的文档中：[`docs.microsoft.com/sql/relational-databases/performance-monitor/use-sql-server-objects`](https://docs.microsoft.com/sql/relational-databases/performance-monitor/use-sql-server-objects)。\n\
  \n当你在 Windows 上使用 `perfmon` 工具查看 SQL Server 性能计数器时，计数器的速率会自动显示。例如，计数器名称 `Batch Requests/sec`\
  \ 是 SQL Server 工作负载吞吐量的速率。但该速率以累计值形式呈现。为了找出真实的速率，你必须使用 T-SQL 执行计算。请查看以下这篇优秀的博客文章，了解如何使用\
  \ DMV 中的信息来理解如何执行正确的计算：\n\n\n\n\n[`blogs.msdn.microsoft.com/psssql/2013/09/23/interpreting-the-counter-values-from-sys-dm_os_performance_counters`](https://blogs.msdn.microsoft.com/psssql/2013/09/23/interpreting-the-counter-values-from-sys-dm_os_performance_counters)\n\
  \n## 第九章 管理与监控 SQL Server\n\n此外，你可以参考第 6 章自动调优示例中的脚本（位于 `auto_tune` 目录），了解如何为 `Batch\
  \ Requests/sec` 生成正确的比率。\n\nSQL Server 有超过 1600 个性能计数器可供选择。表 9-1 列出了我始终推荐监控的前五大计数器区域（然后你可以根据需要添加其他计数器）。\n\
  \n### 表 9-1. 我推荐优先监控的五大 SQL Server 性能计数器\n\n| object\\_name | counter\\_name | 描述\
  \ |\n| :--- | :--- | :--- |\n| `SQLServer:SQL Statistics` | `Batch requests/Sec`\
  \ | SQL Server 上执行的 T-SQL 批处理速率 |\n| `SQLServer:Memory Manager` | `total Server\
  \ Memory (KB)` | SQL Server 引擎分配的总内存量 |\n| `SQLServer:Wait Statistics` | `all counters`\
  \ | 这使你能够跟踪来自 `dm_os_wait_stats` 的主要类别 |\n| `SQLServer:General Statistics` | `User\
  \ Connections` | 当前连接到 SQL Server 的活动用户数 |\n| `SQLServer:SQL Errors` | `all counters`\
  \ | 我只能选 5 个，所以为什么不监控错误总数呢。急剧增加可能表明存在严重的 SQL Server 或应用程序问题。 |\n\n那么，你如何知道监控指标是好是坏？可能会有一些明显的迹象。例如，如果\
  \ SQL Server 持续消耗 100% 的 CPU，这通常不是好兆头，但最大化利用 CPU 资源也是一个目标。唯一能确定的方法是基于 DMV 信息建立一个基线——通过保存\
  \ DMV 收集的数据（即使在测试期间），然后监控随时间推移的任何重大变化。别忘了，当你对数据库、应用程序甚至 SQL Server 进行更新时，要保存多个基线。\n\
  \n## 使用查询存储监控性能\n\n正如我在第 5 章提到的，如果你启用了 `Query Store`，那么现在编译和执行的查询的历史性能信息就会存储在你的数据库中。这将包括总执行时间、CPU\
  \ 时间以及等待统计信息等。\n\n`Query Store` 最大的好处是，你不需要*轮询* DMV 并保存其输出，因为 `Query Store` 的信息会持久化到你的数据库中（实际上默认保留\
  \ 30 天的性能信息）。`Query Store` 的缺点在于信息是按数据库存储的。如果你的 SQL Server 实例上有多个数据库，你必须整合这些信息才能获得实例范围内的\
  \ SQL Server 性能视图。\n\n正如我在第 5 章提到的，我们的文档中有一些关于如何对 `Query Store` 执行查询的优秀示例。你可以在 [`docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store#Scenarios`](https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store#Scenarios)\
  \ 找到。这里包含了你可以根据需求编辑的查询，这些查询针对 `Query Store` 运行，用于查看基线并监控变化。\n\n但请记住 `Query Store`\
  \ 的优势：你的历史信息是内置的！假设你于 2018 年 8 月 1 日星期一开始了生产工作负载并启用了 `Query Store`。默认情况下，你现在拥有 30\
  \ 天的历史信息（你可以配置历史记录...\n\n\n\n\n[时间线] 在任何时间点，你都可以针对 `查询存储` 运行查询，并将其与包括你的基线日期在内的历史日期进行比较。这是因为\
  \ `查询存储` 中的所有内容都带有时间戳（请记住它是 UTC 日期时间）。\n\n### 使用扩展事件进行性能分析\n\n拥有 `查询存储` 来自动记录性能历史记录是你监控工具包中的一大优势。一旦你开始使用\
  \ `DMV` 或 `查询存储` 进行监控，可能会出现需要跟踪特定查询的确切执行情况以及其他信息（如查询的执行计划）的情况。请记住，`DMV` 和 `查询存储`\
  \ 不会跟踪查询的实际执行计划。而且 `查询存储` 是聚合有关查询和计划的执行信息，而不是跟踪每次执行。\n\n在这些情况下，轻量级查询分析对于获取特定正在运行查询的实际执行计划确实很有帮助。然而，在某些情况下，当你在监控\
  \ SQL Server 时，可能需要*跟踪*查询执行以及可能与性能相关的其他关键事件。这就是 `扩展事件` 作为详细跟踪的绝佳技术发挥作用的地方。我在第 5\
  \ 章讨论了 `扩展事件` 的许多方面，包括如何查找所有可能要跟踪的事件的示例。\n\n想要快速开始使用 `扩展事件` 吗？使用内置于 `SSMS` 中的 `XEProfiler`。你可以在\
  \ [`docs.microsoft.com/sql/relational-databases/extended-events/use-the-ssms-xe-profiler`](https://docs.microsoft.com/sql/relational-databases/extended-events/use-the-ssms-xe-profiler)\
  \ 阅读更多关于使用 `XEProfiler` 的信息。\n\n![](img/index-501_1.jpg)\n\n第 9 章 管理和监控 SQL Server\n\
  \n`XE Profiler` 会创建名为 `QuickSessionStandard` 和 `QuickSessionTSQL` 的 `扩展事件` 会话。使用这些作为基础，来创建包含你想要跟踪的其他事件的你自己的会话。你可以使用\
  \ `SSMS` 右键单击其中一个会话，并将其定义编写为脚本来创建你自己的会话。图 9-5 展示了如何执行此操作的示例。\n\n**图 9-5. 将 `QuickSessionTSQL`\
  \ `扩展事件` 会话编写为脚本**\n\n请注意在此图中有一个名为 `Profiler` 的会话。该会话类似于 `XEProfiler` 的功能，并且来自 `SQL\
  \ Operations Studio` 的一个名为 `SQL Server Profiler` 的新扩展（不要与名为 `SQL Server Profiler`\
  \ 的实际工具混淆）。你可以在 [`docs.microsoft.com/sql/sql-operations-studio/sql-server-profiler-extension`](https://docs.microsoft.com/sql/sql-operations-studio/sql-server-profiler-extension)\
  \ 阅读更多关于此扩展的信息。图 9-6 展示了此扩展针对 Linux 上的 SQL Server 实际运行的示例。\n\n![](img/index-502_1.jpg)\n\
  \n第 9 章 管理和监控 SQL Server\n\n**图 9-6. `SQL Operations Studio` 的 `SQL Server Profiler`\
  \ 扩展**\n\n我喜欢将像 `XEProfiler` 和 `SQL Operations Studio` 的 `SQL Server Profiler` 这样的工具视为在任何时间点快速实时查看\
  \ SQL Server 的方式。这些会话开销不大，可以让你快速查看 SQL Server 的状况。例如，假设你听到使用 SQL Server 的应用程序宕机了，而所有人都将矛头指向\
  \ SQL Server。这些工具可以快速告诉你应用程序是否正在向 SQL Server 发送查询，以及它们是否在合理的时间范围内执行。如果没有查询发送到 SQL\
  \ Server，那么问题可能出在网络或应用程序上。\n\n但是 `扩展事件` 也可以用作详细的跟踪机制来补充你的监控需求，尤其是在你检测到可能的问题时。让我\n\
  \n\n# 第 9 章 管理与监控 SQL Server\n\n这里有一个快速示例。假设你怀疑由于大量的页拆分导致了碎片化。因此，你监控动态管理视图 `dm_os_performance_counters`\
  \ 中名为 `Page Splits/sec` 的计数器，并证实了你的猜测。如果能够追踪在发生页拆分时正在执行哪些查询，岂不是很好？\n\n以下 T-SQL 语句将创建一个扩展事件会话来实现这一点（该会话定义可以在示例脚本\
  \ `tracepagesplits.sql` 中找到）。\n\n```sql\nCREATE EVENT SESSION [tracespagesplits]\
  \ ON SERVER\nADD EVENT sqlserver.page_split(\nACTION (sqlserver.session_id, sqlserver.sql_text,\
  \ sqlserver.client_app_name,\nsqlserver.database_id))\nADD TARGET package0.event_file(SET\
  \ filename=N'pagesplits.xel')\nWITH (MAX_DISPATCH_LATENCY=5 SECONDS,STARTUP_STATE=OFF)\n\
  GO\n```\n\n现在，你可以查看哪些会话、查询、应用程序名称和数据库涉及到了页拆分。`page_split` 事件包含了被拆分的 `pageid`。\n\n\
  ## 使用系统运行状况会话\n\n扩展事件是作为 SQL Server 2008 版本的一部分发布的。那时，我在微软技术支持部门工作，认为我们可以利用扩展事件创建一个默认会话来捕获有关\
  \ SQL Server 的重要运行状况信息。于是，`system_health` 扩展事件会话诞生了。你可以在博文 [Supporting SQL Server\
  \ 2008: The system_health session](https://blogs.msdn.microsoft.com/psssql/2008/07/15/supporting-sql-server-2008-the-system_health-session)\
  \ 中阅读其初始版本的相关信息。这个早期版本的一个局限是，会话将数据写入 `ring_buffer` 目标，因此当 SQL Server 重新启动时，收集的信息就会丢失。\n\
  \n随着 SQL Server 2012 的发布，我们修改了通过 `sp_server_diagnostics` 系统过程在集群中检测故障的方法（我在第 8 章描述过）。我在支持部门的同事\
  \ Robert Dorr 在定义 `sp_server_diagnostics` 的工作方式方面贡献巨大。此外，Bob 还花时间改进了 `system_health`\
  \ 会话，使其包含 `sp_server_diagnostics` 信息，并为该会话添加了文件目标。\n\n这确实是一个重大进步，因为现在任何 SQL Server\
  \ 默认都有一组扩展事件文件，其中包含了有关 SQL Server 的运行状况信息，包括但不限于：\n\n-   `sp_server_diagnostics`\
  \ 输出\n-   内存诊断\n-   死锁\n-   非让出问题\n-   闩锁等待超过 15 秒\n-   某些抢先等待超过五秒\n-   关键错误\n\n\
  ![index-504_1.jpg](img/index-504_1.jpg)\n\nRobert Dorr 在博文 [SQL Server 2012: True\
  \ black box recorder](https://blogs.msdn.microsoft.com/psssql/2012/03/08/sql-server-2012-true-black-box-recorder)\
  \ 中很好地讨论了这个新的 `system_health` 会话。\n\n这些文件默认存储在 `/var/opt/mssql/log` 目录中。查找匹配模式 `system_health*.xel`\
  \ 的文件集。使用示例 `readsystemhealth.sql` 中的以下 T-SQL 语句来读取当前系统运行状况会话中的所有事件。我在查询中包含了到你本地时间的转换，但也保留了原始的\
  \ UTC 时间。\n\n```sql\nSELECT DATEADD(minute, DATEDIFF(minute,getutcdate(),getdate()),\
  \ timestamp_utc)\nas local_datetime, *\nFROM sys.fn_xe_file_target_read_file('/var/opt/mssql/log/system_health*.xel',\n\
  NULL, NULL, NULL)\nORDER BY local_datetime DESC\nGO\n```\n\n在我的 Linux 服务器上，结果如 SQL\
  \ Operations Studio 中的图 9-7 所示。\n\n**图 9-7.** 读取 `system_health` 扩展事件会话的结果\n\n\n\
  # 智能日志备份\n\n在某些情况下，监控活动（例如备份）可能与性能相关。在第 8 章中，我讨论了如何备份事务日志。本章中讨论的示例展示了一个基于时间频率的日志备份计划。这种技术已使用多年，对许多生产工作负载有效。\n\
  \n这种技术的一个问题是，应用程序可能会产生意外的事务日志活动峰值，从而导致事务日志的自动增长。我在本书前面已经描述过，事务日志的自动增长可能会导致阻塞和性能问题。\n\
  \n幸运的是，SQL Server 有一种技术可以执行更智能的日志备份。我在 SQL Server 工程部门的一位同事（他现在仍在微软工作，但职责范围更广了一些）Parikshit\
  \ Savjani 撰写了一篇优秀的博客文章，介绍如何基于 DMV `dm_db_log_stats` 执行智能日志备份。您可以在以下链接阅读详细信息：\n[`blogs.msdn.microsoft.com/sql_server_team/smart-transaction-log-backup-monitoring-and-diagnostics-with-sql-server-2017`](https://blogs.msdn.microsoft.com/sql_server_team/smart-transaction-log-backup-monitoring-and-diagnostics-with-sql-server-2017)\n\
  \n# Linux 监控工具\n\n虽然 SQL Server 提供了丰富的监控工具，但监控托管 SQL Server 的操作系统也很重要。如果您有使用 Linux\
  \ 的经验，您可能有一套一直用来监控 Linux 的工具和程序。\n\n以下是我从使用 Linux 的经验和 SQL Server 工程团队的同事那里发现的、认为有用的一系列工具和命令。\n\
  \n## top\n`top` 是一个核心的 Linux 程序，用于实时显示进程以及 Linux 服务器的整体 CPU 和内存使用情况，我在前面的章节中已经使用过它。`top`\
  \ 应该默认安装在几乎所有 Linux 发行版上。`top` 是交互式的，因为它会不断刷新。您必须键入 `q` 来退出程序。以下是在我的 Linux RHEL\
  \ 服务器上运行 `top` 时部分输出的一瞥，如图 9-8 所示。\n\n![](img/index-506_1.png)\n![](img/index-506_2.png)\n\
  \n**图 9-8.** Linux 上 `top` 程序的输出\n\n## iotop\n`iotop` 是一个类似于 `top` 的程序，但只专注于 I/O。`iotop`\
  \ 可能默认没有安装，因此首先从 bash shell 执行以下命令：\n```\nsudo yum install -y iotop\n```\n运行 `iotop`\
  \ 需要 `sudo` 权限，我建议使用 `-o` 参数，它只显示系统中活跃的 I/O。从 bash shell 运行以下命令：\n```\nsudo iotop\
  \ -o\n```\n图 9-9 显示了在我的 Linux 服务器上运行 `iotop` 的输出。\n\n**图 9-9.** Linux 上 `iotop`\
  \ 程序的输出\n\n## htop\n`htop` 是一个类似于 `top` 的程序，但更具特色。我在 Windows Server 上使用的一个程序是任务管理器。我可以快速直观地查看每个处理器的\
  \ CPU 利用率。`htop` 提供了这种外观和感觉，加上进程资源使用情况的详细信息。我发现 `htop` 在大多数 Linux 系统上默认可能没有安装。因此，要在\
  \ RHEL 上安装它，请从 bash shell 运行以下命令：\n```\nsudo wget dl.fedoraproject.org/pub/epel/7/x86_64/Packages/e/epel-release-7-11.noarch.rpm\n\
  sudo rpm -ihv epel-release-7-11.noarch.rpm\nsudo yum install -y htop\n```\n![](img/index-507_1.png)\n\
  ![](img/index-507_2.png)\n\n要执行 `htop`，只需运行以下命令：\n```\nhtop\n```\n图 9-10 显示了在我的拥有四个\
  \ CPU 的 Linux 服务器上运行 `htop` 的部分输出。\n\n**图 9-10.** Linux 上的 `htop`\n\n## sar\n`sar`（系统活动报告）在\
  \ UNIX 和 Linux 系统上已经存在很长时间了。它使用 `/proc` 文件系统来收集信息并生成报告。因此，`sar` 是一个查看……的好程序（原文在此处中断）\n\
  \n\n\n# SQL Server 的管理与监控\n\n## 使用 `sar` 进行系统监控\n\n**`sar`** 用于随时间推移（甚至跨服务器重启）监控操作系统资源，如\
  \ CPU、内存和 I/O。`sar` 有许多选项，执行以下命令可以查看所有选项：\n\n```bash\nman sar\n```\n\n图 9-11 显示了我\
  \ Linux 服务器上默认 `sar` 输出的一部分。\n\n**图 9-11. Linux 上的默认 `sar` 输出**\n\n![](img/index-508_1.png)\n\
  \n## 使用 `dstat` 进行监控\n\n**`dstat`：** `dstat` 是一个集成了 `vmstat`、`iostat` 和 `ifstat`\
  \ 等多个程序功能的工具。你的 Linux 服务器上可能未安装 `dstat`，可以通过运行以下命令安装：\n\n```bash\nsudo yum install\
  \ -y dstat\n```\n\n执行 `dstat` 时，它会立即开始在你的 SSH 会话屏幕上滚动输出。图 9-12 显示了我 Linux 服务器上 `dstat`\
  \ 输出的一部分。\n\n**图 9-12. Linux 上的 `dstat` 输出**\n\n## 使用 `LinuxKI` 进行深度分析\n\n**`LinuxKI`：**\
  \ Patrick Kilfoyle 在 Helsinki 项目期间加入了我们的 SQL 工程团队，并为我们带来了丰富的 Linux 经验。Patrick 的技能之一是\
  \ Linux 内核性能调优。我询问他用于性能调优的有趣“底层”工具，他立即向我指出了 `LinuxKI`。根据 GitHub 项目站点，`LinuxKI` 是“一个开源的高级任务关键型\
  \ Linux 性能故障排除工具”。我认为它是“底层”工具，因为它使用 Linux 内核跟踪数据来帮助深入分析复杂性能工作负载情况。Patrick 在 Microsoft\
  \ 使用它来深入分析 Linux 内核级别的复杂 SQL Server 性能调优问题。你可以在 GitHub 项目站点 [`github.com/HewlettPackard/LinuxKI`](https://github.com/HewlettPackard/LinuxKI)\
  \ 下载并了解更多关于 `LinuxKI` 的信息。\n\n#### SQL Server 故障排除\n\n到目前为止，在本书中，我已经向你介绍了可用于排除 Linux\
  \ 上 SQL Server 问题的工具、技术和功能。尽管如此，本章还有一些值得涵盖的故障排除主题，我尚未在本书中讨论。这些主题包括转储文件、核心转储文件和 `PSSDiag`。我要特别感谢目前在\
  \ Microsoft 支持部门研究 Linux 上 SQL Server 的两位顶级专家，Pradeep M 和 Suresh Kandoth，他们为本节内容做出了贡献。\n\
  \n## 转储文件\n\n当 SQL Server 发生某些错误条件（如访问冲突）时，数据库引擎将生成一个转储文件并在 `ERRORLOG` 中记录一条条目。该转储文件对于\
  \ Microsoft 技术支持调查问题原因非常有用。在大多数情况下，当生成转储文件时，SQL Server 已 *处理* 该错误或异常，生成了转储文件，并正确终止了工作线程（这类似于严重错误，可能导致连接终止和事务回滚）。\n\
  \n转储文件保存在 `ERRORLOG` 文件所在的同一目录中，默认为 `/var/opt/mssql/log`。你可以通过文件模式 `SQLDump<n>.mdmp`\
  \ 来识别转储文件（通常称为小型转储文件）。这些文件的格式可由 Windows 调试器读取，因为 SQL Server 生成的任何转储文件都使用 Windows\
  \ 的小型转储格式。\n\nMicrosoft 技术支持有时还会使用一种技术来手动生成转储文件，以更深入地了解 SQL Server 进程。你可以通过执行以下\
  \ T-SQL 语句自行完成：\n\n**注意** 除非得到 Microsoft 指示，否则不要在生产服务器上运行此命令。此命令官方不受支持，仅用于高级诊断目的。\n\
  \n```sql\nDBCC STACKDUMP\nGO\n```\n\n运行此命令后，`ERRORLOG` 文件将包含一个类似于以下文本的“堆栈转储标头”：\n\
  \n```\nspid51       Dump thread - spid = 0, EC = 0x000000067EDA1290\nspid51    \
  \   *\nspid51       * User initiated stack dump.  This is not a server exception\
  \ dump.\nspid51       *\n```\n\n\n\n# 第 9 章 SQL Server 的管理与监控\n\n## 核心转储文件\n\nspid51\
  \ **堆栈转储正被发送到 `/var/opt/mssql/log/SQLDump0001.txt`**\n\n```\nspid51       *Stack\
  \ Dump being sent to /var/opt/mssql/log/SQLDump0001.txt\nspid51       * *************************************************************\n\
  *************\nspid51       *\nspid51       * BEGIN STACK DUMP:\nspid51       *\
  \    07/30/18 22:05:25 spid 1\nspid51       *\nspid51       * StackDump (all)\n\
  ```\n\n在 `/var/opt/mssql/log` 目录下将有三个文件：\n\n`SQLDump0001.txt:` 文本文件，包含有关转储原因和重要数据结构的信息。\n\
  \n`SQLDump0001.log:` 转储创建时间点附近的一段 ERRORLOG。\n\n`SQLDump0001.mdmp:` SQL Server 进程的小型转储文件。请记住，此文件是在\
  \ SQL PAL 架构内运行的 SQL Server 生成的，因此它代表 SQL Server.exe Windows 进程的小型转储。\n\n此时，您可以使用\
  \ Windows 调试器（windbg）加载 `SQLDump0001.dmp` 文件。您可以在 [Windows 调试入门](https://docs.microsoft.com/windows-hardware/drivers/debugger/getting-started-with-windows-debugging)\
  \ 了解更多关于 Windows 调试器的信息。使用 Windows 调试器读取转储文件绝对需要高级技能。再次说明，这些文件是为诊断目的生成的，供 Microsoft\
  \ 技术支持和 SQL Server 工程团队使用。但是，可以结合使用 Windows 调试器和 Microsoft 公共符号服务器来查看与转储原因（例如，访问冲突）相关的调用堆栈，并可能确定\
  \ Microsoft 是否已修复该问题，或者大致了解问题发生的代码位置并避免它。\n\n在一些罕见情况下，SQL Server 无法处理异常或关键错误。在 Linux\
  \ 上，当进程崩溃且无法处理异常时，通常会生成一个 **核心转储**。核心转储表示 Linux 进程整个进程内存的转储。（我一直想知道为什么它被称为核心转储，后来发现这个术语来自使用磁芯存储器的旧\
  \ UNIX 系统。）\n\n对于 SQL Server，我们希望提供丰富的诊断信息，并控制核心转储的生成方式，以防 `sqlservr` Linux 进程遇到通常会导致\
  \ Linux 核心转储的情况。\n\n如果您还记得，在 第 1 章 中，我谈到 SQL Server on Linux 有两个进程。其中一个进程是 **看门狗**\
  \ 进程，它派生子进程，即实际的 SQL Server 数据库平台。此外，我还谈到了随 SQL Server 安装在 `/opt/mssql/bin` 目录下的一些文件。此目录包含\
  \ `sqlservr` 二进制文件，但也包含一些其他文件，包括一个名为 `handle-crash.sh` 的 shell 脚本和一个名为 `paldumper`\
  \ 的程序。\n\nSQL Server 的核心转储流程如下所示：\n\n* **看门狗** `sqlservr` 进程监听子进程是否崩溃的信号。\n* 当收到信号时，看门狗进程将调用\
  \ `handle-crash.sh` 脚本。\n* `handle-crash.sh` 调用 `paldumper` 程序来生成核心转储。\n\n除核心转储外，其他信息也会被收集并压缩到一个\
  \ `.tbz2` 文件中。\n\n让我们通过以下示例来实际操作一下：\n\n**注意** 请勿在生产环境中尝试此操作，因为它将意外终止 `sqlservr`\
  \ 进程。\n\n1.  确保 SQL Server 正在运行。\n2.  找到子进程的进程 ID。从 bash shell 使用以下命令：\n    ```\n\
  \    ps -auxf | grep sqlservr\n    ```\n    ![](img/index-512_1.png)\n3.  列出的第二个\
  \ `sqlservr` 进程是实际的 `sqlservr` 引擎或子进程。\n4.  运行以下命令来终止该进程：\n    ```\n    sudo kill\
  \ -s SIGSEGV <pid>\n    ```\n    此命令向 `sqlservr` 进程发送一个它未准备处理的\n\n\n## 图 9-13：Linux\
  \ 上的核心转储\n\n因此，该进程会意外终止。看门狗进程会收到信号，然后前述机制就会启动。如果你在执行 `kill` 命令后的几秒钟内运行以下命令，可以观察到核心转储的生成过程：\n\
  \n```bash\nsudo systemctl status mssql-server\n```\n\n图 9-13 展示了在我的 Linux 服务器上的一个示例。\n\
  \n`图 9-13：为 Linux 上的 SQL Server 生成核心转储`\n\n在 `/var/opt/mssql/log` 目录下会创建三个文件：\n\n\
  *   `core.sqlservr.<datetime>.<pid>.txt` – 包含有关崩溃原因的信息。\n*   `core.sqlservr.<datetime>.<pid>.json`\
  \ – `.txt` 文件的 JSON 版本。\n*   `core.sqlservr.<datetime>.<pid>.tbz2` – 压缩文件，包含核心转储以及其他供微软技术支持和\
  \ SQL 工程团队使用的诊断数据。\n\n### PSSDiag\n\nSQL 2000 发布后不久，SQL Server 社区的支柱之一 Ken Henderson\
  \ 加入了微软的技术支持团队。Ken 热爱创新，他与我支持团队的另一位超级聪明的同事 Bart Duncan 一起，构建了一个名为 `PSSDiag` 的工具，用于自动化收集\
  \ SQL Server 支持案例的诊断信息。这包括性能监视器数据、日志文件、SQL Server DMV 数据以及其他客户支持案例通常所需的文件。\n\n**注意：**\
  \ Ken 已于几年前去世，但他的影响力至今犹在。颇具讽刺意味的是，我在这本书里提到了他。事实上，我曾有幸与他合著了一本书，名为 *SQL Server 2005\
  \ Practical Troubleshooting*。当我构思这本书时，我想起了与 Ken 一起工作的经历，他撰写了许多书籍。Ken 对我开始在诸如 PASS\
  \ Summit 这样的客户活动上发表演讲也产生了巨大影响。当然，我们也是朋友，因为他是一个狂热的达拉斯牛仔队球迷！Bart 目前仍在微软从事工程工作，当我们俩碰巧都访问雷德蒙德时，我偶尔会见到他。\n\
  \n`PSSDiag` 已成为微软技术支持用于 SQL Server 的历史上使用最广泛的工具之一。因此，在支持团队为 SQL Server on Linux\
  \ 的发布做准备时，他们构建了一个可以在 Linux 上运行的 `PSSDiag` 版本。通过与 SQL 客户咨询团队合作，`PSSDiag` 被设计用于收集\
  \ Linux 操作系统信息以及 SQL Server 诊断数据。你可以通过这篇博文自行下载该工具，了解其工作原理以及它收集的详细信息：[`blogs.msdn.microsoft.com/sqlcat/2017/08/11/collecting-performance-data-with-pssdiag-for-sql-server-on-linux`](https://blogs.msdn.microsoft.com/sqlcat/2017/08/11/collecting-performance-data-with-pssdiag-for-sql-server-on-linux)。\n\
  \n#### 总结\n\n本章结束了本书*核心*部分，因为它为你提供了重要信息，帮助你在构建好数据库并部署应用程序后，准备好管理和监控 SQL Server。对于那些希望将旧版本的\
  \ SQL Server 或其他数据库产品（如 ORACLE 或 PostgreSQL）迁移过来的读者，你将需要阅读第 10 章，以获得迁移的见解和指导。或者，你可以直接跳到本书的最后一章，我将描述并讨论\
  \ SQL Server 如何与 Docker 容器协同工作。\n\n## 第 10 章：迁移至 Linux 上的 SQL Server\n\n阅读本书的读者中，有些人正在构建新的数据库，并将使用本书前面的章节来创建新的数据库和应用程序。然而，另一些读者可能已经在\
  \ SQL Server 或其他数据库产品上拥有现成的数据库，并且正在寻求\n\n\n# 第十章：迁移至 Linux 版 SQL Server\n\n如果你正计划迁移至\
  \ Linux 版 SQL Server，那么本章就是为你准备的。然而，即使你并不打算进行迁移，我想你也会有兴趣浏览本章内容，本章分为以下几个小节：\n\n-\
  \   **从 SQL Server 迁移**：在本节中，我将讨论从早期版本的 SQL Server 迁移至 Linux 版 SQL Server 的工具和注意事项。\n\
  -   **从 Oracle 迁移**：在本节中，我将探讨从 Linux 版 Oracle 迁移至 Linux 版 SQL Server 的机制。\n-   **从\
  \ PostgreSQL 迁移**：在本节中，我将就 SQL Server 与 PostgreSQL 的功能比较给出我的看法。同时，我也会提供一些关于如何将数据库从\
  \ PostgreSQL 迁移至 Linux 版 SQL Server 的技巧和资源。\n-   **迁移后注意事项**：一旦你从 SQL Server 或其他数据库产品迁移完成后，你应该考虑几个迁移后的步骤和操作，以确保在\
  \ Linux 版 SQL Server 上获得良好的使用体验。\n\n**提示**：请关注负责 SQL Server 和 Azure 数据服务迁移策略的团队博客，以获取最新信息：[`https://blogs.msdn.microsoft.com/datamigration`](https://blogs.msdn.microsoft.com/datamigration)。\n\
  \n© Bob Ward 2018\nB. Ward, *Pro SQL Server on Linux*, [`https://doi.org/10.1007/978-1-4842-4128-8_10`](https://doi.org/10.1007/978-1-4842-4128-8_10)\n\
  \n![](img/index-515_1.jpg)\n\n#### 从 SQL Server 迁移\n\n自从我们推出 Linux 版 SQL Server\
  \ 以来，我遇到过一些客户，他们当前在 Windows 上使用早期版本的 SQL Server，但正在考虑迁移到 Linux 版 SQL Server。本章就是为你们准备的。我将讨论迁移的整体流程、用于准备迁移的工具，以及执行迁移的工具和技术。\n\
  \n图 10-1 展示了从早期版本的 SQL Server 迁移至 Linux 版 SQL Server 的整体流程图示。\n\n**图 10-1.** 从早期版本\
  \ SQL Server 迁移至 Linux 版 SQL Server 的流程\n\n在本节中，我将介绍可以帮助你从旧版 SQL Server 迁移到 Linux\
  \ 版 SQL Server 的组件。微软提供了用于准备迁移的工具，称为 `数据迁移助手` 和 `数据库实验助手`。我还将讨论如何使用数据库备份、通过批量导入或\
  \ SSIS 包导出导入数据，或使用数据层应用程序文件（称为 BACPAC 文件）来执行数据库迁移。\n\n在你阅读完这些关于迁移准备和执行的小节后，请务必不要错过本章关于“迁移后注意事项”的部分，以了解迁移完成后需要进行的后续步骤。\n\
  \n### 迁移准备\n\n根据图 10-1，准备将一个或多个数据库迁移至 Linux 版 SQL Server 的核心是使用两个工具：\n\n-   **数据迁移助手**：`数据迁移助手`（`DMA`）工具可免费下载，可用于评估\
  \ SQL Server 实例和数据库的配置，指出迁移后可能出现的潜在问题，并提示在你开始使用 Linux 版 SQL Server 时可能有帮助的新功能。此外，该工具还会检查\
  \ SQL Server on Windows 上可能使用了哪些在 Linux 版 SQL Server 上不受支持的功能。\n\n**注意**：`DMA` 可用于迁移你的数据，并且具备迁移到\
  \ Azure SQL 数据库和 Azure 虚拟机中 SQL Server 的功能。你可以在 [`https://docs.microsoft.com/sql/dma/dma-overview`](https://docs.microsoft.com/sql/dma/dma-overview)\
  \ 阅读 `DMA` 功能和特性的完整列表（包括下载该工具的链接）。\n\n-   **数据库实验助手**：评估静态\n\n\n\n了解你的实例或数据库的配置详情，对于确保迁移过程更加顺畅非常有帮助。然而，大多数用户在迁移到新版\
  \ `SQL Server`（例如在 `Linux` 上运行的 `SQL Server 2017`）时，也同样关心查询性能。数据库实验助手 (`DEA`) 工具可以帮助你在两个版本的\
  \ `SQL Server` 之间追踪、执行并比较查询工作负载。\n\n让我们来了解一下这些工具的各项功能，为将数据库迁移到 `Linux` 上的 `SQL Server`\
  \ 做好准备。\n\n## 数据库迁移助理\n\n`DMA` 工具包含的功能可以检查你的 `SQL Server` 配置、数据库以及数据库中的 `T-SQL`\
  \ 对象（例如 `stored procedures`）对于迁移目标版本 `SQL Server` 的兼容性。\n\n**注意** 对于不兼容 `T-SQL`\
  \ 的使用情况，`DMA` 只能检查数据库中的对象，如 `stored procedures`。它不会检查应用程序代码中 `T-SQL` 的兼容性。\n\n此外，`DMA`\
  \ 可以查找你的目标 `SQL Server` 版本中可能有助于改进你使用 `SQL Server` 的新功能，例如 `columnstore indexes`。\n\
  \n最后，如果目标 `SQL Server` 版本是 `Linux`，`DMA` 可以检查你是否使用了 `SQL Server on Linux` 不支持的功能，比如\
  \ `SQL Server Replication`。\n\n目前，支持兼容性、新功能和功能对等性（Feature Parity）的规则并未公开记录。不过，我曾与构建\
  \ `DMA` 的团队成员 Venkata Raj Pochiraju 和 Sreraman Narasimhan 交流过，他们让我深入了解了 `DMA` 所支持的检查范围类型。\n\
  \n**提示** 你可以通过使用像 `xeprofiler` 这样的工具来追踪 `DMA` 所使用的查询，从而深入了解 `DMA` 如何检查兼容性、新功能和功能对等性。我经常使用\
  \ `xeprofiler` 和 `extended events` 来“调试”工具的行为。\n\n# 第 10 章 迁移到 Linux 上的 SQL Server\n\
  \n### 兼容性问题\n\n-   使用旧版 `T-SQL` 语句，如 `COMPUTE`，而不是替代功能，如 `T-SQL ROLLUP`。\n-   使用较旧的\
  \ `DBCC` 命令，如 `DBCC DBREINDEX`，而不是 `ALTER INDEX`。\n-   对使用旧数据类型（如 `TEXT` 或 `IMAGE`）而不是新的\
  \ `varchar(max)` 或 `varbinary(max)` 类型发出警告。\n\n### 新功能建议\n\n-   使用 `columnstore\
  \ indexes` 来加速分析性能。\n-   使用安全功能，如 `Always Encrypted`、`TDE` 和 `dynamic data masking`。\n\
  \n### 功能对等性规则\n\n包括对任何使用以下功能的检查，截至本书撰写时，这些功能在 `SQL Server on Linux` 上尚不支持（参见 `https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes#Unsupported`）。\n\
  \n向你展示此工具的示例较为困难，因为我需要向你展示如何在 `Windows` 上构建一个 `SQL Server` 实例和一个数据库，以触发其中几条规则。事实证明，为\
  \ `SQL Server 2016` 构建的 `WideWorldImporters` 数据库并没有真正遇到值得指出的问题。我甚至回过头去使用我们为 `SQL\
  \ Server 2008` 发布的旧示例数据库 `AdventureWorks`，它也没有真正暴露出任何问题。\n\n不过，我曾与一些客户交流过，他们发现该工具对于评估旧版\
  \ `SQL Server` 并指出迁移到 `Windows` 和 `Linux` 上 `SQL Server` 的可能问题非常有用。\n\n图 10-2 展示了一个示例屏幕，这是你在新建\
  \ `Database Migration Assistant` 项目并选择 `SQL Server 2017 on Linux` 作为目标时会看到的界面。\n\
  \n![](img/index-519_1.jpg)\n\n**图 10-2. 迁移到 SQL Server on Linux 的评估选项**\n\n我强烈建议任何从旧版\
  \ `SQL Server` 迁移到 `SQL Server on Linux` 的用户，在执行迁移之前使用 `DMA` 并仔细研究其结果。\n\n\n\n#\
  \ 迁移至 Linux 上的 SQL Server\n\n## 相关资源\n\n请务必阅读以下与数据迁移助手相关的资源：\n\n*   运行数据迁移助手的最佳实践：[`docs.microsoft.com/sql/dma/dma-bestpractices`](https://docs.microsoft.com/sql/dma/dma-bestpractices)\n\
  *   了解如何使用 PowerShell 分析 DMA 结果：[`docs.microsoft.com/sql/dma/dma-consolidatereports#import-assessment-results-into-a-sql-server-database`](https://docs.microsoft.com/sql/dma/dma-consolidatereports#import-assessment-results-into-a-sql-server-database)\n\
  *   使用 PowerBI 示例报告以获取对大量数据库评估的分析：[`docs.microsoft.com/sql/dma/dma-powerbiassesreport`](https://docs.microsoft.com/sql/dma/dma-powerbiassesreport)\n\
  \n## 提示\n\n**提示** 使用 `dmacmd.exe` 实用工具在无人参与模式下大规模评估数据库。有关如何使用 `dmacmd.exe` 的详细信息，请参阅：[`blogs.msdn.microsoft.com/datamigration/2016/11/08/data-migration-assistant-how-to-run-from-command-line/`](https://blogs.msdn.microsoft.com/datamigration/2016/11/08/data-migration-assistant-how-to-run-from-command-line/)\n\
  \n## 数据库实验助手\n\n尽可能多地测试 SQL Server 应用程序的性能是成功迁移的最关键方面之一。数据库实验助手可以成为帮助您实现该目标的强大工具。其目标是使用\
  \ DEA 告诉您应用程序中的哪些查询在目标新版本 SQL Server 上运行得更好、更差或保持不变。此外，DEA 还可以告诉您哪些查询可能会失败，例如由于兼容性问题。\n\
  \n所有 DEA 文档目前都位于数据迁移博客的以下文章中：[`blogs.msdn.microsoft.com/datamigration/tag/dea/`](https://blogs.msdn.microsoft.com/datamigration/tag/dea/)。\n\
  \n### 使用 DEA 的准备工作\n\n要正确使用 DEA，您可能需要最多四个 SQL Server 实例：\n\n*   捕获工作负荷的**源** SQL\
  \ Server。\n*   两个**目标** SQL Server，用于重放捕获的工作负荷跟踪。\n*   一个用于存储**分析**和运行报告的 SQL Server（您需要一个数据库来存储结果，因此它实际上可以存在于其中一个目标\
  \ SQL Server 实例上）。\n\n### 使用 DEA 的基本流程\n\n1.  备份源 SQL Server 上的数据库。\n2.  使用 DEA\
  \ 工具**捕获**工作负荷的跟踪，该工具可以使用 SQL Server 跟踪或扩展事件。如果您在早于 SQL Server 2012 的 SQL Server\
  \ 版本上捕获工作负荷，则必须使用 SQL Server 跟踪，因为扩展事件在 SQL Server 2008 中没有所需的事件。DEA 支持 SQL Server\
  \ 2005 作为源 SQL Server 版本，而扩展事件在该版本中不存在，因此您必须使用 SQL Server 跟踪。\n\n    为了充分利用 DEA\
  \ 工具，您需要捕获能代表应用程序的工作负荷跟踪。DEA 工具允许捕获五分钟到最长三小时的跟踪。您可能有一个可以在其上捕获应用程序跟踪的测试服务器，或者您可能需要在生产\
  \ SQL Server 上执行此操作。\n\n    ![](img/index-521_1.png)\n\n3.  通过将步骤 #1 中的备份还原到两个目标\
  \ SQL Server 实例来准备重放跟踪：\n    目标服务器 #1 是与捕获步骤 #2 中跟踪的源相同的 SQL Server 版本。通常您不希望使用生产\
  \ SQL Server。\n\n\n\n目标服务器 #2 是你要迁移到的新版 SQL Server，\n\n它可以是 Linux 上的 SQL Server。\n\
  \n你应该将这些 SQL Server 实例设置为非常相似的环境，\n\n包括 CPU、内存、磁盘速度以及 SQL Server 配置。\n\n4. 使用 DEA\
  \ 工具在**两个目标 SQL 服务器上**回放从步骤 #2 捕获的跟踪。DEA 工具会要求指定一个位置来保存回放的跟踪文件。\n\n5. 使用 DEA 工具**分析**两个捕获的回放跟踪，以便你可以比较跟踪中查询的性能或可能出现的错误。\n\
  \nDEA 工具会提示你提供一个 SQL Server 数据库存储分析结果，以及步骤 #4 中回放跟踪的位置。\n\n图 10-3 显示了用于执行所有这些步骤的\
  \ DEA 工具初始屏幕。\n\n**图 10-3. 数据库实验助手 工具**\n\n### 第 10 章 迁移到 Linux 上的 SQL Server\n\n\
  早期的 DEA 版本要求你使用 SQL Server 中一个名为分布式重放的功能。你仍然可以使用那种方法，但从 DEA 版本 2.6 开始，你可以使用 *InBuilt*\
  \ 回放方法。InBuilt 回放方法内部使用一个名为 `ostress.exe` 的工具。也许你记得在上一章我提到了我在微软的一位同事 Keith Elmore？许多年前，当\
  \ Keith 刚加入微软技术支持部门时，他很快发现了使用多个并发线程执行查询或 T-SQL 脚本来对 SQL Server 进行压力测试的需求。Keith 一直是一位出色的程序员，因此他构建了一个使用\
  \ ODBC 的工具 `ostress.exe`。Keith 和 Robert Dorr 进一步合作扩展了 `ostress.exe`，使其能够回放捕获的 SQL\
  \ Server 工作负载跟踪。Keith 和 Robert 将这些工具捆绑在一起，组成了一个名为 RML Utilities 的工具包。RML Utilities\
  \ 可以从 [`www.microsoft.com/download/details.aspx?id=4511`](https://www.microsoft.com/download/details.aspx?id=4511)\
  \ 免费下载。\n\n不幸的是，`ostress.exe` 和 RML Utilities 不能在 Linux 上原生运行（我们有一个内部版本的 `ostress.exe`\
  \ 通过 SQLPAL 运行，但目前尚未准备好发布），但如果你仍有 Windows 客户端可以连接到 Linux 上的 SQL Server，你可能会发现使用\
  \ `ostress.exe` 和 RML Utilities 是一套非常棒的工具。\n\n在 Linux 上的 SQL Server 使用 DEA 需要一些特殊的配置。DEA\
  \ 工具的开发者 Mollee Jain 给了我这些说明，是使 DEA 在 Linux 上工作所必需的（Mollee 的打算是将其写入数据迁移博客）。\n\n\
  你必须设置文件夹权限，以允许回放在 Linux 服务器上创建文件。用户可以通过多种方式设置此权限，但挂载共享文件夹可能是最简单的进展方式，因为它不需要重新配置防火墙。\n\
  \n*   要在 Linux 系统中挂载一个指定了 `uid` 和 `gid` 的共享文件夹，你可以使用如下 CIFS 命令：\n    ```\n    sudo\
  \ mount.cifs //DEA/LinuxShare /var/opt/mssql/LinuxShare -o user=sqladmin,vers=2.0,dir_mode=0777,file_mode=0777,uid=996,gid=994\n\
  \    ```\n    **注意** 有几种方法可以设置你的 Linux 服务器以将文件写入你的 Windows 服务器。一种方法是使用 Samba，你可以在\
  \ [`app.pluralsight.com/library/courses/advanced-network-system-administration-lfce/table-of-contents`](https://app.pluralsight.com/library/courses/advanced-network-system-administration-lfce/table-of-contents)\
  \ 了解更多相关信息。\n\n*   在 DEA 回放步骤中，如果回放到 Linux，他们将需要提供 Linux 路径（即 `/var/opt/mssql/LinuxShare`）。\n\
  \n### 第 10 章 迁移到 Linux 上的 SQL Server\n\n在捕获和回放跟踪以及使用报告进行评估时，DEA 有几个方面需要考虑。DEA 系列博客在练习使用此工具评估性能和执行方面提供了很好的示例和技巧...\n\
  \n\n\n关于您在 Linux 上使用 SQL Server 的工作负载和应用，我推荐以下这些具体的博客文章：\n\n*   [使用数据库实验助手概述](https://blogs.msdn.microsoft.com/datamigration/2017/03/24/dea-2-0-how-to-use-database-experimentation-assistant/)\n\
  *   [DEA 2.6 的最新功能](https://blogs.msdn.microsoft.com/datamigration/2018/08/06/release-database-experimentation-assistant-dea-v2-6/)\n\
  *   [捕获常见问题解答](https://blogs.msdn.microsoft.com/datamigration/2017/03/24/dea-2-0-capture-trace-faq/)\n\
  *   [重放常见问题解答](https://blogs.msdn.microsoft.com/datamigration/2017/03/24/dea-2-0-replay-faq/)\n\
  *   [分析常见问题解答](https://blogs.msdn.microsoft.com/datamigration/2017/03/24/dea-2-0-analysis-faq)\n\
  \n## 执行迁移\n\n既然您已经完成了迁移的准备工作，现在是时候将您的数据库迁移到`Linux 上的 SQL Server`了。您可以选择以下几种方式来执行迁移：\n\
  \n*   还原数据库备份。\n*   使用大容量复制或`SSIS`包复制数据。\n*   使用`BACPAC`导出和导入。\n\n**注意** `SQL Server\
  \ Management Studio`自带一项名为`复制数据库`的功能，该功能不支持从`Windows 上的 SQL Server`复制到`Linux 上的\
  \ SQL Server`。\n\n让我们通过示例更详细地了解每个选项。\n\n### 第 10 章：迁移到 Linux 上的 SQL Server\n\n####\
  \ 还原数据库备份\n\n从`Windows 上的 SQL Server`还原备份是`Linux 上的 SQL Server`兼容性方面的一个亮点。您允许将`SQL\
  \ Server`的备份（最早可追溯到`SQL Server 2005`）还原到`Linux 上的 SQL Server 2017`。您实际上也可以附加数据库，遵循最早可追溯到`SQL\
  \ Server 2005`的附加数据库流程。\n\n**注意** 通过还原备份或附加数据库实现的“无痛”升级路径最早可追溯到`SQL Server 2008`。然而，从技术上讲，您可以还原或附加`SQL\
  \ Server 2005`的备份或数据库文件，但存在一些您应考虑的限制和可能的问题。您可以在[supported-version-and-edition-upgrades-2017#SupportFor2005](https://docs.microsoft.com/sql/database-engine/install-windows/supported-version-and-edition-upgrades-2017#SupportFor2005)阅读更多相关信息。\n\
  \n在本书中，我已经向您展示了如何还原备份的示例，并且您已经看到这个过程非常简单。\n\n1.  将备份文件复制到`Linux 上的 SQL Server`服务器，或放置在\
  \ Linux 服务器可以访问的已挂载目录上。\n2.  确保文件的所有权具有`mssql`组和`mssql`所有者权限。\n\n\n# 在 Linux 上还原\
  \ SQL Server 数据库\n\n你可以通过任何能连接到 SQL Server on Linux 的有效工具，使用 T-SQL `RESTORE` 命令来执行此操作。\n\
  \n**注意**：数据库备份的元数据中存储了文件路径。因此，你必须始终使用 T-SQL `RESTORE` 语句的 `WITH MOVE` 选项，将数据库和事务日志文件移动到它们的新位置。并且，新位置必须设置为允许\
  \ Linux 上的 `mssql` 用户帐户访问。\n\n尽管我在前面的章节中已经展示过这个例子，但让我们再次回顾一下将 `WideWorldImporters`\
  \ 示例数据库还原到 SQL Server on Linux 的过程。\n\n## 第 10 章：迁移到 SQL Server on Linux\n\n1. \
  \ 使用 bash shell 中的以下命令，在 Linux 服务器上复制 `WideWorldImporters` 示例数据库：\n    ```\n   \
  \ wget https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak\n\
  \    ```\n\n2.  运行以下命令，这些命令来自示例脚本 `cpwwi.sh`，用于将备份复制到 `/var/opt/mssql` 目录：\n   \
  \ ```\n    sudo cp WideWorldImporters-Full.bak /var/opt/mssql\n    sudo chown mssql:mssql\
  \ /var/opt/mssql/WideWorldImporters-Full.bak\n    ```\n\n3.  从任何有效的 SQL Server 工具运行以下命令来还原数据库，该命令来自\
  \ `restorewwi_linux.sql`（注意：我提供了一个 bash shell 脚本 `restorewwi.sh` 来使用 `sqlcmd` 在\
  \ Linux 服务器上运行此 SQL 脚本）：\n    ```\n    restore database WideWorldImporters from\
  \ disk = '/var/opt/mssql/WideWorldImporters-Full.bak' with\n    move 'WWI_Primary'\
  \ to '/var/opt/mssql/data/WideWorldImporters.mdf',\n    move 'WWI_UserData' to '/var/opt/mssql/data/WideWorldImporters_UserData.ndf',\n\
  \    move 'WWI_Log' to '/var/opt/mssql/data/WideWorldImporters.ldf',\n    move 'WWI_InMemory_Data_1'\
  \ to '/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1'\n    go\n    ```\n\
  \n还原操作将执行并运行一系列 `upgrade steps`，通常是针对新版本 SQL Server 所需的系统表更改，以完成数据库还原，因为 `WideWorldImporters`\
  \ 示例是使用 Windows 上的 SQL Server 2016 备份的。\n\n`RESTORE` 执行的输出应类似于以下内容：\n\n```\nProcessed\
  \ 1464 pages for database 'WideWorldImporters', file 'WWI_Primary' on file 1.\n\
  Processed 53096 pages for database 'WideWorldImporters', file 'WWI_UserData' on\
  \ file 1.\nProcessed 33 pages for database 'WideWorldImporters', file 'WWI_Log'\
  \ on file 1.\nProcessed 3862 pages for database 'WideWorldImporters', file 'WWI_InMemory_Data_1'\
  \ on file 1.\nConverting database 'WideWorldImporters' from version 852 to the current\
  \ version 869.\nDatabase 'WideWorldImporters' running the upgrade step from version\
  \ 852 to version 853.\nDatabase 'WideWorldImporters' running the upgrade step from\
  \ version 853 to version 854.\nDatabase 'WideWorldImporters' running the upgrade\
  \ step from version 854 to version 855.\nDatabase 'WideWorldImporters' running the\
  \ upgrade step from version 855 to version 856.\nDatabase 'WideWorldImporters' running\
  \ the upgrade step from version 856 to version 857.\nDatabase 'WideWorldImporters'\
  \ running the upgrade step from version 857 to version 858.\nDatabase 'WideWorldImporters'\
  \ running the upgrade step from version 858 to version 859.\nDatabase 'WideWorldImporters'\
  \ running the upgrade step from version 859 to version 860.\nDatabase 'WideWorldImporters'\
  \ running the upgrade step from version 860 to version 861.\nDatabase 'WideWorldImporters'\
  \ running the upgrade step from version 861 to version 862.\nDatabase 'WideWorldImporters'\
  \ running the upgrade step from version 862 to version 863.\nDatabase 'WideWorldImporters'\
  \ running the upgrade step from version 863 to version 864.\nDatabase 'WideWorldImporters'\
  \ running the upgrade step from version 864 to version 865.\nDatabase 'WideWorldImporters'\
  \ running the upgrade step from version 865 to version 866.\nDatabase 'WideWorldImporters'\
  \ running the upgrade step from version 866 to version 867.\nDatabase 'WideWorldImporters'\
  \ running the upgrade step from version 867 to version 868.\n```\n\n\n数据库 `WideWorldImporters`\
  \ 正在执行从版本 868 到版本 869 的升级步骤。\n\nRESTORE DATABASE 在 1.351 秒内成功处理了 58455 页 (338.027\
  \ MB/秒)。\n\n任何从旧版本 SQL Server 还原的备份到新版本，都将保留旧版本的*数据库兼容性*。请参阅“迁移后注意事项”章节，了解有关数据库兼容性的讨论。\n\
  \n对于超大型数据库（100GB 或更大，这里我为了迁移目的定义超大型的标准），还原备份是在 Linux 上迁移到 SQL Server 的最快方法。\n\n\
  ## 使用大容量复制或 SSIS 包复制数据\n\n可能有一些原因导致您不想通过还原数据库备份来迁移到 SQL Server on Linux。也许在迁移过程中，您希望修改数据库中现有对象的定义。您可以在还原备份后执行此操作。或者，您可以创建一个新的数据库（可能带有新的文件定义），创建新对象，然后使用\
  \ SQL Server 工具将数据从现有 SQL Server 数据库导出，并将数据导入到新的数据库结构中。\n\n对于 Windows 上的 SQL Server，您可以使用\
  \ `bcp` 程序导出数据，将文件复制到 Linux 服务器，然后在 Linux 上使用 `bcp` 将数据导入到您的新数据库中。我在前面关于工具的章节中介绍了\
  \ `bcp` 程序，但您也可以在 [`docs.microsoft.com/sql/linux/sql-server-linux-migrate-bcp`](https://docs.microsoft.com/sql/linux/sql-server-linux-migrate-bcp)\
  \ 阅读更多关于 `bcp` 的信息。\n\n您可能有一个更复杂的提取、转换和加载 (ETL) 过程来迁移到 Linux 上的新 SQL Server 数据库。在这种情况下，考虑创建一个\
  \ SQL Server Integration Services (SSIS) 包。虽然您必须使用 Windows 客户端上的工具来创建 SSIS 包，但 Linux\
  \ 上的 SQL Server 支持在 Linux 服务器上执行 SSIS 包。您可以在 [`docs.microsoft.com/sql/linux/sql-server-linux-migrate-ssis`](https://docs.microsoft.com/sql/linux/sql-server-linux-migrate-ssis)\
  \ 阅读更多关于 Linux 上 SSIS 的信息。\n\n## 使用 BACPAC 进行导出和导入\n\n将现有 SQL Server 数据库迁移到 Linux\
  \ 上 SQL Server 的第三种选择是一个称为 *BACPAC* 文件的数据层应用程序包。BACPAC 文件具有高度的可移植性，可用于迁移到其他平台，例如\
  \ Azure。BACPAC 文件是一个包，包含数据库的定义或架构、文件以及对象（如表和索引）。此外，该包还包含从用户表中导出的数据版本。\n\nBACPAC\
  \ 文件可以通过 SQL Server Management Studio 的可视化界面向导或 `sqlpackage` 程序创建。您现在可以从 [`docs.microsoft.com/sql/tools/sqlpackage`](https://docs.microsoft.com/sql/tools/sqlpackage)\
  \ 在 Windows、macOS 或 Linux 上使用 `sqlpackage`。BACPAC 文件是通过这些工具的选项来 *导出* 包而创建的。您可以在\
  \ [`docs.microsoft.com/sql/relational-databases/data-tier-applications/export-a-data-tier-application`](https://docs.microsoft.com/sql/relational-databases/data-tier-applications/export-a-data-tier-application)\
  \ 阅读更多关于导出 BACPAC 文件的信息。同一套工具可用于 *导入* 包。导入包将执行该包，其中包括创建数据库、创建文件、所有对象以及导入所有数据。您可以在\
  \ [`docs.microsoft.com/sql/relational-databases/data-tier-applications/import-a-bacpac-file-to-create-a-new-user-database`](https://docs.microsoft.com/sql/relational-databases/data-tier-applications/import-a-bacpac-file-to-create-a-new-user-database)\
  \ 阅读更多关于导入过程的信息。\n\n\n\n[将 BACPAC 文件导入以创建新的用户数据库](https://docs.microsoft.com/sql/relational-databases/data-tier-applications/import-a-bacpac-file-to-create-a-new-user-database)\n\
  \n以下是一个在 Windows 上的 SQL Server 中从 Powershell 运行`sqlpackage`以导出数据库 BACPAC 文件的示例命令：\n\
  \n```\n.\\sqlpackage /A:Export /ssn:<sql server> /sdn:<database> /tf:c:\\temp\\\
  wwi.bacpac\n```\n\n以下是在同一个 Windows 客户端上执行`sqlpackage`，将包导入到 Linux 上的目标 SQL Server\
  \ 的示例：\n\n```\n.\\sqlpackage /A:Import /tsn:<Linux SQL instance> /tdn:<target db\
  \ name> /sf:c:\\temp\\wwi.bacpac /tu:sa /tp:<sa password>\n```\n\n您无需在 Linux 的 SQL\
  \ Server 实例上预先创建数据库。`sqlpackage`在执行 BACPAC 文件中的所有操作时会完成此创建。\n\n#### 从 Oracle 迁移\n\
  \n您阅读本书，可能正考虑从另一个数据库平台（如 Oracle）迁移到 Linux 上的 SQL Server。在本书的这一部分，我将不涉及 Oracle 与\
  \ SQL Server 之间的功能对比。在本书此前的内容中，我已尽力描述 Linux 上 SQL Server 的所有特性和功能，旨在帮助您了解并熟悉其能力，以备您考虑从\
  \ Oracle 迁移而来。\n\n在本节中，我将假定您已做出迁移的决定，或正在测试迁移，以便评估您的应用在 Linux 上的 SQL Server 上的行为和性能。虽然有多种方法可以从\
  \ Oracle 导出数据，以便您可以在 Linux 上的 SQL Server 上创建自己的数据库并导入数据，但 SQL Server 提供了一个免费工具来协助从\
  \ Oracle 迁移。该工具称为`SQL Server 迁移助手`（`SSMA`）。\n\n`SSMA`支持许多不同的数据平台源，包括 Oracle、DB2、MySQL\
  \ 和 SAP ASE，可迁移至多个不同的 Microsoft 目标数据库平台，包括 Linux 上的 SQL Server。有关`SSMA`支持的源和目标的完整列表，请参阅我们的文档：[`docs.microsoft.com/sql/ssma/sql-server-migration-assistant#supported-sources-and-target-versions`](https://docs.microsoft.com/sql/ssma/sql-server-migration-assistant#supported-sources-and-target-versions)\
  \ 和 [`docs.microsoft.com/sql/linux/sql-server-linux-migrate-ssma`](https://docs.microsoft.com/sql/linux/sql-server-linux-migrate-ssma)。在本章的剩余部分，我将使用`SSMA`来描述从\
  \ Oracle 迁移的准备和执行过程。\n\n有关`SSMA`的完整参考，请参阅我们的文档：[`docs.microsoft.com/sql/ssma/sql-server-migration-assistant`](https://docs.microsoft.com/sql/ssma/sql-server-migration-assistant)。当您阅读完这些关于从\
  \ Oracle 迁移的准备和执行的章节后，请务必查看本章中关于“迁移后注意事项”的部分。\n\n## 迁移准备\n\n由于`SSMA`工具仅在 Windows\
  \ 上运行，您将需要三个能够相互连接的计算环境来完成从 Oracle 到 Linux 上的 SQL Server 的迁移：\n\n•   运行 Oracle 的\
  \ Linux 服务器\n\n•   运行 Linux 版 SQL Server 的新 Linux 服务器\n\n•   运行`SSMA`工具的 Windows\
  \ 客户端\n\n运行`SSMA`的 Windows 客户端必须能够通过 TCP/IP 连接到每个服务器，因此您需要确保打开所有防火墙端口以允许远程连接。使用`SSMA`时，Oracle\
  \ 服务器和 SQL Server 之间不需要能够相互连接。\n\n要使用`SSMA`准备迁移，您需要将`SSMA`工具安装在\n\n\n## 第 10 章 迁移到\
  \ Linux 上的 SQL Server\n\n你首选的 Windows 客户端。请仔细遵循我们文档中的说明，因为存在来自其他组件的依赖关系（例如 Oracle\
  \ 客户端软件），需要它们才能使 SSMA 正常工作。你可以在我们的文档中阅读详细信息：[`docs.microsoft.com/sql/ssma/oracle/installing-ssma-for-oracle-client-oracletosql`](https://docs.microsoft.com/sql/ssma/oracle/installing-ssma-for-oracle-client-oracletosql)。\n\
  \n此外，由于你是迁移到 SQL Server，你需要提前按照我在书中概述的最佳实践和性能建议来创建数据库和文件。\n\n最后一点重要的提示：你需要使用 Oracle\
  \ 的现有工具仔细测量 Oracle 工作负载的性能并进行记录。你需要将这个性能基线与迁移后使用 SQL Server 的应用程序进行比较。\n\n### 执行迁移\n\
  \n`SSMA` 工具基于一个称为“项目”的概念工作。使用项目的迁移过程如下：\n\n1.  创建一个 `SSMA` 项目并配置设置。\n2.  连接到 `Oracle`\
  \ 服务器。\n3.  连接到 `Linux` 上的 `SQL Server`。\n4.  在 `Oracle` 和 `SQL Server` 之间映射架构（或使用默认映射）。\n\
  5.  转换 `Oracle` 架构，包括选择要转换的对象的能力。此文档对可以从 `Oracle` 转换和不能转换的内容有出色的描述：[`docs.microsoft.com/sql/ssma/oracle/converting-oracle-schemas-oracletosql`](https://docs.microsoft.com/sql/ssma/oracle/converting-oracle-schemas-oracletosql)。此时，`SSMA`\
  \ 将项目信息保存为可以转换为 `T-SQL` 语句的形式，以便在 `SQL Server` 上迁移选定的 `Oracle` 架构和对象。\n6.  将转换后的对象加载到\
  \ `SQL Server` 中。你可以让 `SSMA` 执行此操作，或者将信息保存到 `T-SQL` 脚本中，然后使用任何有效的 `SQL Server` 工具运行该脚本（包括根据你的需要对其进行修改）。\n\
  7.  使用 `SSMA` 将数据迁移到 `Linux` 上的 `SQL Server`。\n\n整个过程在以下文档中有详细说明：[`docs.microsoft.com/sql/ssma/oracle/migrating-oracle-databases-to-sql-server-oracletosql`](https://docs.microsoft.com/sql/ssma/oracle/migrating-oracle-databases-to-sql-server-oracletosql)。\n\
  \n你会喜欢这样一个事实：拥有 `SSMA` 的我们的工程团队构建了一个分步教程，指导如何使用 `SSMA` 从 `Oracle` 迁移到 `Linux` 上的\
  \ `SQL Server`。因此，你可以设置自己的环境，并按照我们文档中的每个步骤操作：[`docs.microsoft.com/sql/ssma/oracle/sql-server-linux-convert-from-oracle`](https://docs.microsoft.com/sql/ssma/oracle/sql-server-linux-convert-from-oracle)。本教程使用\
  \ `HR` 示例架构中的对象，该架构随每个 `Oracle` 安装一同提供。\n\n我自己在 `Azure` 中使用三台虚拟机完成了这个教程（一台用于 `Oracle`，一台用于\
  \ `Linux` 上的 `SQL Server`，一台用于运行 `SSMA` 的 `Windows` 机器）。它如宣传的那样有效，有几点需要注意：\n\n*\
  \   教程的前提条件中没有明确指出，如果你要迁移的 `Oracle` 服务器运行在 `Linux` 上，你需要一个运行 `Windows` 的第三方计算环境来运行\
  \ `SSMA`。\n*   如果 `SQL Server Agent` 没有在 `Linux` 上的 `SQL Server` 上运行，你会收到一条警告，提示服务器端迁移不可行。服务器端迁移在\
  \ `Linux` 上的 `SQL Server` 中不支持，因此可以忽略此警告。\n\n## 10 迁移到 Linux 上的 SQL Server\n\n本教程使用\
  \ Oracle 12c，但我使用 Oracle 11 XE（免费版本）也完成了此操作。当我使用 `SSMA` 连接到 Oracle 实例时，由于我使用的是 XE\
  \ 版本，Oracle 实例的名称是 `XE`，登录名是 `SYSTEM`。\n\n教程要求选择 `SQL Server 2017 (Linux) - Preview`\
  \ 作为目标，但最新版本的 `SSMA` 仅将 `SQL Server 2017` 作为选项（对于 Linux 不再处于预览状态）。\n\n由于以 Linux\
  \ 上的 `SQL Server` 为目标的 `SSMA` 不支持服务器端迁移，因此 Oracle 服务器和 Linux 上的 `SQL Server` 不必能够相互通信。`SSMA`\
  \ `Windows` 客户端会分别连接到每个服务器以传输数据。\n\n图 10-4 显示了我使用 `SSMA` 将 `HR` 模式从 Oracle 11 XE\
  \ 迁移到 Linux 上的 `SQL Server` 的最终结果。\n\n![](img/index-532_1.jpg)\n\n**图 10-4** 使用\
  \ `SSMA` 从 Oracle 成功迁移到 Linux 上的 SQL Server\n\n您的迁移项目可能比 `HR` 模式从 Oracle 迁移的示例更复杂。然而，`SSMA`\
  \ 在将 Oracle 对象转换为 `SQL Server` 方面相当稳健。`SSMA` 的首席程序经理 `Shamik Ghosh` 根据他的经验告诉我，`SSMA`\
  \ 应该能够将 90% 以上的 Oracle 对象和数据转换到 `SQL Server`，即使是更复杂的 Oracle 模式也是如此。\n\n`SSMA` 支持从命令行执行迁移，您可以在此处阅读有关此功能的更多信息：`https://docs.microsoft.com/sql/ssma/oracle/command-line-options-in-ssma-console-oracletosql`。命令行选项的完整语法可以在此处查看：`https://docs.microsoft.com/sql/ssma/oracle/appendix-1-oracletosql`。\n\
  \n对于从 Oracle 进行的完整生产迁移，我建议您通读 `SSMA` 文档的所有主要部分：`https://docs.microsoft.com/sql/ssma/oracle/sql-server-migration-assistant-for-oracle-oracletosql`。\n\
  \n#### 从 PostgreSQL 迁移\n\n`PostgreSQL` 已成为用于应用程序的非常流行的开源数据库引擎。但是，一些用户发现 `PostgreSQL`\
  \ 可能无法满足其应用程序的需求，原因可能是缺乏特定功能或需要高性能扩展。\n\n在本节中，我将从功能角度为您提供 `SQL Server` 与 `PostgreSQL`\
  \ 比较的看法。`SSMA` 工具目前不支持从 `PostgreSQL` 到 `SQL Server` 的迁移。我将分享关于如何将数据库架构和数据从 `PostgreSQL`\
  \ 迁移到 Linux 上的 `SQL Server` 的想法。请务必阅读本章关于迁移后注意事项的部分，以完善迁移体验。\n\n> **注意**：如果您是 `PostgreSQL`\
  \ 用户并希望迁移到 Linux 上的 `SQL Server`，我希望本书能为您提供如何执行此操作并成功部署的知识。但是，如果您有一些希望保留在 `PostgreSQL`\
  \ 中的数据库，我强烈建议您查看 Azure 中托管的 `PostgreSQL` 服务：`https://docs.microsoft.com/en-us/azure/postgresql/`。\n\
  \n### PostgreSQL 与 SQL Server 如何比较？\n\n我将本节称为“支持 SQL Server 的理由”。我过去没有使用过 `PostgreSQL`，因此不会声称自己是使用它的专家。为了编写本章，我在\
  \ `RHEL` 上安装了 `PostgreSQL`，并对其功能进行了一些基本测试。此外，我还做了一些……\n\n# 第 10 章：迁移至 Linux 上的 SQL\
  \ Server\n\n我在本书中讨论过的 SQL Server 各项功能和特性，也研究了 PostgreSQL 是否具备同样的能力。坦白说，我使用了以下资源进行这项研究：\n\
  \n*   PostgreSQL 主站点，包含概述：[`www.postgresql.org/about/`](https://www.postgresql.org/about/)\n\
  *   PostgreSQL 10 版本文档：[`www.postgresql.org/files/documentation/pdf/10/postgresql-10-A4.pdf`](https://www.postgresql.org/files/documentation/pdf/10/postgresql-10-A4.pdf)\
  \ （注：我没有选择使用当时处于测试阶段的 11 版本。）\n*   以下 PostgreSQL 教程：[`www.postgresqltutorial.com/`](http://www.postgresqltutorial.com/)\
  \ 和 [`www.tutorialspoint.com/postgresql`](http://www.tutorialspoint.com/postgresql)\n\
  *   面向忙碌人群的 PostgreSQL 入门指南：[`zaiste.net/postgresql_primer_for_busy_people/`](https://zaiste.net/postgresql_primer_for_busy_people/)\n\
  *   PostgreSQL 维基百科页面：[`en.wikipedia.org/wiki/PostgreSQL`](https://en.wikipedia.org/wiki/PostgreSQL)\n\
  *   一个讲解 PostgreSQL 架构的优秀幻灯片：[`people.inf.elte.hu/kiss/14kor/korszeru-ea-01-postgre.pdf`](http://people.inf.elte.hu/kiss/14kor/korszeru-ea-01-postgre.pdf)\n\
  \n**注**：我对`PostgreSQL`的评估是基于上述资料中记录的核心开源版本。由于`PostgreSQL`是开源的，存在由其他组织修改的`PostgreSQL`发行版，例如[EnterpriseDB](https://www.enterprisedb.com/)和[Crunchy\
  \ Data](https://www.crunchydata.com/)。甚至在[`wiki.postgresql.org/wiki/PostgreSQL_derived_databases`](https://wiki.postgresql.org/wiki/PostgreSQL_derived_databases)有一个庞大的`PostgreSQL`衍生发行版和分支列表。我并未使用这些资源来比较\
  \ Linux 上的 SQL Server。\n\n除了这项研究，我还与微软的两位工程师 Michal Primke 和 Harini Gupta（他们负责我们的\
  \ Azure for `PostgreSQL`服务）一起复核了我的对比，他们同意以下比较中的所有观点。\n\n与其尝试进行详尽的比较，我研究的是 SQL Server\
  \ 拥有而`PostgreSQL`没有，或在我看来比`PostgreSQL`更优的功能和特性。在本节中，我将按以下几个领域列出此对比：核心数据库引擎、SQL 语言、工具、性能、安全性、高可用与灾难恢复（HADR）、以及管理与监控。如果你在本书中讨论的某个\
  \ SQL Server 功能未在此部分列出，那是因为`pgsql`具有同等功能，或者我找不到两者之间足够显著的差异来加以强调。我提供这些信息是为了让你了解，在\
  \ Linux 上使用 SQL Server 相比使用`PostgreSQL`能为你的应用带来的独特价值。\n\n**注**：从本章此处开始，我将把`PostgreSQL`称为`pgsql`（如果你每次都需要输入`PostgreSQL`，你也会这么做的）。\n\
  \n## 核心数据库引擎\n\n核心数据库引擎内置的几个方面与`pgsql`不同，其差异显著到值得单独列出：\n\n*   **线程 vs. 进程**\n  \
  \  `pgsql`文档指出，服务器的架构基于一组进程而非线程。所有`pgsql`工作都是通过独立的进程完成的。所有的\n\n\n# 第 10 章 迁移到 SQL\
  \ Server on Linux\n\n后台任务（如检查点进程）是独立的进程。每个到`pgsql`的连接都会催生一个新进程。在我对 RHEL 的测试中，每个为支持新连接而衍生的进程大约需要\
  \ 5MB 内存（这意味着即使是 300 个并发空闲连接也可能需要约 1.5GB 内存）。我了解到，衍生新进程的开销并不大，并且每个连接占用 5MB 内存的代价也不算高。`sqlservr`是\
  \ SQL Server 在 Linux 上的单一进程，它使用线程来支持所有后台任务，并使用线程工作池来支持连接和查询。\n\n我对这种衍生进程的架构感到惊讶，但后来我想起了大学毕业后的早期职业生涯中使用的`Ingres`数据库，它也采用了相同的设计。`pgsql`正是源自最初的`Ingres`数据库引擎。那么哪种架构更好呢？在\
  \ Windows 上，使用线程被证明是比使用多进程更好的方法。我个人认为，我们的 TPC 基准测试性能本身就说明了 SQL Server on Linux 相较于`pgsql`在性能和可扩展性上的优势。您可以在[`www.tpc.org/3331`](http://www.tpc.org/3331)查看\
  \ SQL Server on Linux 最新的 TPC-H #1 基准测试结果。\n\n## CPU 和 NUMA 分配\n\nSQL Server 提供了内置功能来控制其线程将使用哪些\
  \ CPU 和/或 NUMA 节点进行执行。此外，SQL Server 还使用名为“自动软 NUMA”的功能来提升在高密度核心插座系统上的可扩展性。`pgsql`在数据库引擎中不提供任何此类功能。\n\
  \n## 多文件与预写日志文件放置\n\n`pgsql`有一个称为“表空间”的概念。它类似于 SQL Server 的文件组对象，允许您将对象放置在与默认数据库目录不同的磁盘位置。然而，您无法像在\
  \ SQL Server 中那样，为表空间指定多个文件来分散 I/O 负载。`pgsql`有其自身创建支持数据库文件的方法，但您无法控制该过程。一个特定表空间只有一个目录，因此与表空间相关的对象被限制在磁盘上的单个目录中。\n\
  \n此外，在`pgsql`中，无法按数据库分离事务日志（称为预写日志或 WAL）数据的存储位置。SQL Server 允许您为每个数据库精确指定事务日志的位置。`pgsql`在其最佳实践文档中建议通过移动`pg_wal`目录来更改\
  \ WAL 目录的位置，但所有数据库的 WAL 数据都会存入该目录。\n\n## 数据库大小控制\n\n使用`pgsql`创建的数据库没有固定大小，它可以持续增长，直到磁盘空间耗尽或触及任何\
  \ Linux 空间限制。正如您从阅读本书所了解的，SQL Server 允许您对数据库和事务日志文件的大小进行精细控制，包括初始大小、最大大小和自动增长参数。\n\
  \n## 校验和\n\n`pgsql`确实支持数据库页的校验和概念。但是，您必须在首次使用`initdb`初始化`pgsql`时指定是否启用此选项。此外，[其文档](https://www.postgresql.org/docs/current/static/app-initdb.html)指出“...启用校验和可能会带来显著的性能损失”。在`pgsql`中，校验和无法按数据库进行控制。SQL\
  \ Server 默认为数据库启用校验和，我们这样做是因为它不会带来显著的性能损失。此外，我们允许您随时在数据库范围内开启或关闭此功能。\n\n## 缓冲池缓存\n\
  \nSQL Server 和`pgsql`都有缓冲池缓存的概念。然而，`pgsql`也不使用`O_DIRECT`选项（即直接 I/O）打开数据库文件。因此，\n\
  \n\n# 迁移到 Linux 上的 SQL Server\n\n## 缓冲区\nLinux 内核为 PostgreSQL 缓冲所有文件 I/O 到文件系统缓存中，这几乎使数据库页面所需的内存量翻倍（注意：这取决于您如何使用\
  \ `shared_buffers` 设置配置 PostgreSQL 的共享缓冲区缓存）。\n\n## 计划缓存\nSQL Server 可以缓存临时 T-SQL\
  \ 语句，甚至可以自动参数化它们。\nPostgreSQL 只缓存预处理语句和 PL/pgSQL 代码。\n\n##### 时态表\n时态表是 SQL Server\
  \ 的内置功能。标准的 PostgreSQL 发行版不支持此功能。经过研究，我发现 PostgreSQL 可以通过 *自定义扩展* 支持时态表，该扩展位于 [`pgxn.org/dist/temporal_tables/`](https://pgxn.org/dist/temporal_tables/)。问题是，此扩展并非核心\
  \ PostgreSQL 文档 [`www.postgresql.org/docs/current/static/contrib.html`](https://www.postgresql.org/docs/current/static/contrib.html)\
  \ 中记录的标准扩展之一。因此，我不确定该扩展的可靠性或支持情况。您可以在此处阅读有关 SQL Server 时态表的更多信息：[`docs.microsoft.com/sql/relational-databases/tables/temporal-tables`](https://docs.microsoft.com/sql/relational-databases/tables/temporal-tables)。\n\
  \n##### 图数据库\nPostgreSQL 中没有与 SQL Server 图数据库功能等效的功能，后者通过 T-SQL 支持节点和边缘表类型以及新的 `MATCH`\
  \ 语法。我在 PostgreSQL 中看到的大多数示例都讨论了使用递归公用表表达式 (CTE) 查询来实现此功能。然而，这正是我们构建新图数据库功能的实际原因：使使用表设计自然的图数据模型比编写复杂查询更简单。您可以在此处阅读有关\
  \ SQL Server 图数据库的更多信息：[`docs.microsoft.com/sql/relational-databases/graphs/sql-graph-overview`](https://docs.microsoft.com/sql/relational-databases/graphs/sql-graph-overview)。\n\
  \n# 迁移到 Linux 上的 SQL Server（续）\n\n##### 原生评分\nPostgreSQL 支持使用 Python 作为语言编写服务器端代码的功能（使用\
  \ `CREATE FUNCTION`）。正如我在书中提到的，Windows 上的 SQL Server 2017 支持内置的 R 和 Python 代码，但目前\
  \ Linux 上的 SQL Server 不支持（相信我，它即将到来！）。我在前面章节中提到的 SQL Server 引擎内置的一个不错功能称为 *原生评分*。原生评分允许您将持久化的机器学习模型作为输入，并使用新的\
  \ T-SQL `PREDICT` 语句来执行高速、可扩展的预测应用程序。PostgreSQL 不提供原生评分功能。您可以在此处阅读有关 SQL Server\
  \ 原生评分的更多信息：[`docs.microsoft.com/sql/advanced-analytics/sql-native-scoring`](https://docs.microsoft.com/sql/advanced-analytics/sql-native-scoring)。\n\
  \n# SQL 语言\n\n在研究了 PostgreSQL SQL 语言后，我发现它与 T-SQL 有许多相似之处（这可能使迁移到 SQL Server 的过程比我最初想象的要容易），但有一些差异值得注意：\n\
  \n## T-SQL 批处理\n避免 *啰嗦* 应用程序的一种方法是使用 T-SQL 批处理。T-SQL 批处理允许您在一次传输中向 SQL Server 发送多个\
  \ T-SQL 语句，由数据库引擎处理每个 T-SQL 语句。PostgreSQL 不提供此概念。每个 SQL 语句都是单独发送的，即使应用程序尝试执行多个语句。在\
  \ `psql` 工具中，每个 SQL 语句必须用分号分隔。\n\n## 存储过程\nPostgreSQL 中的服务器端编程是使用一种名为 PL/pgSQL 的语言完成的，该语言使用\
  \ SQL 语句（注意：在 SQL Server 中，所有语句都称为 T-SQL，无论它们是\n\n\n## 第十章：迁移至 Linux 上的 SQL Server\n\
  \n它们属于 ANSI SQL 或 SQL Server 特定的语句）。在`pgsql`的第 10 版中，编写服务器端程序的唯一`PL/pgSQL`方式是使用`CREATE\
  \ FUNCTION`创建*函数*（这不支持事务）。透明地讲，我了解到目前处于测试阶段的`pgsql`第 11 版计划支持`CREATE PROCEDURE`\
  \ `PL/pgSQL`语句。在第 10 版中，我见过几个`pgsql`函数返回`VOID`类型来模拟存储过程的例子。\n\n### IDENTITY 列属性\n\
  \n`pgsql`支持`SEQUENCE`对象，就像我在本书中使用 T-SQL 展示过的那样。序列是 SQL 标准（因此这使得`SEQUENCE`对象在迁移到\
  \ SQL Server 时具有很好的可移植性）。然而，`SEQUENCE`对象是独立于列创建的，然后再绑定到一个或多个列。SQL Server 则针对同一概念提供了更简便的方法，即使用特定列的\
  \ IDENTITY 属性。\n\n###### 工具\n\n我想你现在还记得关于工具的那个很长的章节（第五章）。那章之所以长是有原因的。我认为 SQL Server\
  \ 拥有出色的工具体系：既包括引擎内置的功能，也包括引擎外的程序。以下是与`pgsql`相比，我认为 Linux 上的 SQL Server 在工具方面表现出色的几个具体领域：\n\
  \n##### 动态管理视图\n\n`DMVs`是 SQL Server 最强大的功能之一，用于获取有关 SQL Server 数据库引擎执行的实时、动态洞察。`pgsql`具有类似功能，但通过我的研究，我观察到几个对`DMVs`有利的重大差异：\n\
  *   我们的`DMVs`具有详细的内存信息。`pgsql`仅支持通过`pg_buffercache`视图查看缓冲区缓存信息。\n*   与`DMV` `dm_exec_requests`功能相当的`pg_stat_statements`默认并未启用。`pgsql`的文档说启用此功能可能导致性能开销，可以跨重启保存，但不包含执行计划信息，而`dm_exec_query_stats`提供了估计的查询计划（查询存储也如此）。\n\
  *   `pg_stat_activity`等同于`DMV` `dm_exec_requests`，但它不是“实时”的，因为它是基于每个进程的信息刷新的（默认刷新率为\
  \ 500ms，但可以配置）。SQL Server 的`DMVs`是“按需”的。你可以随时查询系统状态，并获得该时刻系统的实时视图。\n*   `pgsql`在`pg_locks`视图中提供了有关进程和锁的阻塞信息。可以在该视图中看到等待锁的进程的`pid`。然而，此信息在`pg_stat_activity`中找不到。SQL\
  \ Server 的`DMV` `dm_exec_requests`提供了阻塞信息（包括阻塞任务），并且你还可以在`DMV` `dm_tran_locks`中看到所有详细的锁。\n\
  *   SQL Server 为所有核心引擎功能以及 SQL Server 包含的几乎每一项功能提供了`DMVs`（实际上，Linux 上的 SQL Server\
  \ 包含约 243 个`DVMs`）。`pgsql`主要通过统计信息收集器提供动态系统活动，并且仅覆盖核心数据库引擎。\n*   SQL Server 通过`dm_db_missing_index_details`提供了一个用于推荐缺失索引的`DMV`。`pgsql`没有在数据库引擎内内置索引推荐功能。\n\
  \n你可以在 [`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/system-dynamic-management-views`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/system-dynamic-management-views)\
  \ 阅读更多关于 SQL Server `DMVs`的信息。\n\n### ERRORLOG\n\n`pgsql`确实有将日志记录到文件的功能，并且高度可配置。然而，默认情况下，SQL\
  \ Server 的`ERRORLOG`包含丰富的信息集（尤其是在...\n\n\n## 第 10 章 迁移至 Linux 上的 SQL Server\n\n\
  启动时）关于 SQL Server、操作系统和数据库的配置信息。在我担任技术支持期间，仅通过读取`ERRORLOG`文件，我就能告知客户关于他们系统的大量信息。而默认的`pgsql`日志只包含错误信息。\n\
  \n##### 查询存储\n\n我非常欣赏`查询存储`的功能，这是 SQL Server 2016 推出时我最喜爱的功能之一。虽然`pgsql`有一个类似的功能，即通过一个名为`pg_stat_statements`的视图来查看查询性能信息，但我认为`查询存储`在以下几个方面更胜一筹。\n\
  \n- `查询存储`随数据库备份一同保存，因为它与数据库绑定。`pgsql`统计信息是服务器范围的，并且可以持久化，但我没有找到方法将其导出或备份以进行单独分析。\n\
  - `pg_stat_statements`包含查询执行统计信息，通过受支持的扩展提供，但需要重启服务器才能启用。而`查询存储`可以通过`ALTER DATABASE`随时按需在线启用。`查询存储`还支持更丰富的配置参数来控制查询的收集，包括`CAPTURE_MODE=AUTO`（仅存储重要的查询）和历史记录（保留数据的天数）。\n\
  - `查询存储`包含每个查询的等待统计信息，但`pgsql`的等待统计信息在`pg_stat_activity`中与整个进程绑定。\n- `pg_stat_statements`可以在服务器重启后保留，但没有查询的时间戳。因此，你无法对查询进行历史分析以找出差异，并执行诸如查询计划回退分析等操作。此外，`查询存储`会为特定查询随时间推移的每个计划保存估算的计划。而`pg_stat_statements`不包含任何查询计划信息。\n\
  - `查询存储`即使在查询失败时也能捕获查询信息。`pgsql`文档中没有提及`pg_stat_statements`是否在查询失败时保存查询信息。\n- `查询存储`捕获有关编译时间和执行时间的信息。`pg_stat_statements`不区分编译与执行的信息。\n\
  \n你可以在以下链接阅读关于 SQL Server 中`查询存储`的所有详细信息：[`docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store`](https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store)。\n\
  \n### 实时查询统计信息\n\n在`pgsql`中，通过`pg_stat_statements`没有方法可以在查询进行中查看当前查询级别的信息。SQL Server\
  \ 则提供了在查询执行过程中查看每个查询计划运算符执行统计信息的能力。你可以在以下链接阅读更多关于 SQL Server 实时查询统计信息的内容：[`docs.microsoft.com/sql/relational-databases/performance/live-query-statistics`](https://docs.microsoft.com/sql/relational-databases/performance/live-query-statistics)。\n\
  \n##### DBCC 命令\n\n最独特的`DBCC`命令，且在`pgsql`中没有等效功能的，是`CHECKDB`。我在研究中读到一些讨论，认为`pgsql`不需要一致性检查器，因为从`pgsql`9.3\
  \ 开始已支持页面校验和。然而，正如我在本书中所言，如果页面在内存中损坏，页面校验和将无法检测到（尽管 SQL Server 甚至对此场景有一些最低限度的检测）。请记住，`DBCC\
  \ CHECKDB`是在线的，因为 SQL Server 支持数据库快照的概念。你可以在以下链接阅读更多关于 SQL Server `DBCC CHECKDB`的信息：[`docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-checkdb-transact-sql`](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-checkdb-transact-sql)。\n\
  \n\n# 第十章：迁移至 Linux 上的 SQL Server\n\n## 性能\n\n本书第六章详细讨论了 SQL Server 的性能能力。我相信 SQL\
  \ Server 拥有悠久且经过验证的性能记录，这既体现在客户证言上，也体现在 TPC 基准测试中。事实上，我们最早的一批 Linux 上 SQL Server\
  \ 生产环境客户中，就有一份证言表明，正是 SQL Server 与 `pgsql` 相比的性能表现说服了他们进行迁移。您可以在 [`https://customers.microsoft.com/doclink/dv01`](https://customers.microsoft.com/doclink/dv01)\
  \ 阅读他们的故事。在本节中，我列出了我对于 SQL Server 相较于 `pgsql` 在性能方面独特能力的看法。\n\n### SSIS\n\nSQL Server\
  \ 在其许可证中包含了一个名为 SQL Server Integration Services (`SSIS`) 的 ETL 系统，我在书中已有概述。`pgsql`\
  \ 并未附带任何像 `SSIS` 这样功能丰富的内置 ETL 系统。您可以在 [`https://docs.microsoft.com/sql/linux/sql-server-linux-migrate-ssis`](https://docs.microsoft.com/sql/linux/sql-server-linux-migrate-ssis)\
  \ 阅读更多关于 Linux 上 `SSIS` 的信息。\n\n### DBCC CLONEDATABASE\n\n虽然 `pgsql` 提供了基于源数据库创建新数据库（即克隆）的方法，但没有一种方法可以基于源数据库创建新数据库*并包含统计信息和性能信息*。SQL\
  \ Server 通过 `DBCC CLONEDATABASE` 提供了这种能力。您可以在 [`https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-clonedatabase-transact-sql`](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-clonedatabase-transact-sql)\
  \ 阅读更多关于 `DBCC CLONEDATABASE` 的信息。\n\n### Intellisense 和用于查询编辑的 mssql 扩展\n\n`pgsql`\
  \ 有一个名为 `pgAdmin` 的免费 GUI 工具，用于执行管理任务和运行 SQL 查询。`SSMS`、`SQL Operations Studio` 和\
  \ `pgAdmin` 之间存在一些差异，但 `pgAdmin` 是一个相当不错的工具。一个对我而言很突出的差异是，`SSMS` 和 `SQL Operations\
  \ Studio` 支持用于 `T-SQL` 查询设计的智能感知，而 `pgAdmin` 仅有自动补全功能。我认为 Microsoft 的智能感知功能在辅助 `T-SQL`\
  \ 语法和对象选择方面，远比 `pgAdmin` 的自动补全功能丰富。`SQL Operations Studio` 和 `mssql-cli` 都通过 `mssql`\
  \ 扩展支持智能感知功能，该扩展也随 Visual Studio Code 编辑器提供。您可以在 [`https://docs.microsoft.com/sql/relational-databases/scripting/intellisense-sql-server-management-studio`](https://docs.microsoft.com/sql/relational-databases/scripting/intellisense-sql-server-management-studio)\
  \ 阅读更多关于 `SSMS` 中智能感知的信息，并在 [`https://docs.microsoft.com/sql/linux/sql-server-linux-develop-use-vscode#install-the-mssql-extension`](https://docs.microsoft.com/sql/linux/sql-server-linux-develop-use-vscode#install-the-mssql-extension)\
  \ 了解 `mssql` 扩展。\n\n### 可扩展性与 TPC 基准测试\n\n我已在书中广泛演示并讨论了 SQL Server 性能的可扩展性。SQL Server\
  \ 的性能和可扩展性最好通过 TPC 基准测试来展示。SQL Server 在 TPC 基准测试中占据主导地位。事实上，Linux 上的 SQL Server\
  \ 拥有顶级的 `1TB TPC-H` 基准测试官方结果 ([`http://www.tpc.org/3331`](http://www.tpc.org/3331))。正如我在书中讨论过的，这些基准测试之所以重要，原因有二：\n\
  \n\n\n# 第 10 章：迁移至 Linux 上的 SQL Server\n\n1.  基准测试衡量的是数据库处理应用程序工作负载的潜在能力。\n2.  根据\
  \ TPC 理事会的规则，微软不能发布自己的基准测试结果。我们的合作伙伴，如 HPE 和联想，负责发布基准测试，以展示我们的数据库平台结合其硬件的性能能力。迄今为止，还没有硬件供应商选择为`pgsql`发布\
  \ TPC 基准测试。\n\n###### 预读\n`SQL Server` 引擎内置了许多提升查询性能的能力。我已经描述了预读如何加速查询扫描性能。`pgsql`\
  \ 不支持预读功能。有一篇关于 `SQL Server` 预读的旧博客（某些细节可能有些过时，但能说明问题），地址是 [`blogs.msdn.microsoft.com/craigfr/2008/09/23/sequential-read-ahead/`](https://blogs.msdn.microsoft.com/craigfr/2008/09/23/sequential-read-ahead/)。\n\
  \n## 并行查询\n`pgsql` 文档中有这样一段陈述：“许多查询无法从并行查询中受益，要么是由于当前实现的限制，要么是因为没有可想象出的查询计划比串行查询计划更快”（[`www.postgresql.org/docs/10/static/parallel-query.html`](https://www.postgresql.org/docs/10/static/parallel-query.html)）。请记住，这些查询是由进程运行的，因此需要进程间通信，而\
  \ `SQL Server` 则是在一个进程内通过线程共享信息。\n\n`SQL Server` 支持并行查询，许多查询可以从此功能中受益（特别是使用聚簇列存储索引等技术的分析查询）。此外，`SQL\
  \ Server` 对 `SELECT INTO` 和 `INSERT SELECT` 等操作也支持并行查询。\n\n## 查询提示与选项\n`pgsql` 不支持查询级别的提示和选项，但\
  \ `SQL Server` 拥有此功能。您可以在 [`docs.microsoft.com/sql/t-sql/queries/hints-transact-sql-query`](https://docs.microsoft.com/sql/t-sql/queries/hints-transact-sql-query)\
  \ 阅读更多关于 `SQL Server` 查询提示的内容。\n\n##### 列存储索引\n我在本书中已经描述了列存储索引对于分析工作负载的惊人性能表现。`pgsql`\
  \ 没有列存储索引功能。我确实在 [`pgxn.org/dist/cstore_fdw/`](https://pgxn.org/dist/cstore_fdw/)\
  \ 找到了 `pgsql` 的这个自定义扩展，但我无法判断其是否被广泛使用或支持。\n\n## 内存中 OLTP\n我还描述了 `SQL Server` 中针对\
  \ OLTP 工作负载的内存优化表的性能能力。`pgsql` 不包含内存中 OLTP 功能。您可以在 [`docs.microsoft.com/sql/relational-databases/in-memory-oltp/in-memory-oltp-in-memory-optimization`](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/in-memory-oltp-in-memory-optimization)\
  \ 阅读更多关于 `SQL Server` 内存中 OLTP 的内容。\n\n## 自适应查询处理与自动调优\n我描述了 `SQL Server` 称为自适应查询处理（`AQP`）和自动调优的新性能功能。根据我的研究，`pgsql`\
  \ 没有这些功能。您可以在 [`docs.microsoft.com/sql/relational-databases/performance/adaptive-query-processing`](https://docs.microsoft.com/sql/relational-databases/performance/adaptive-query-processing)\
  \ 阅读更多关于 `AQP` 的内容。您可以在我的一篇博客文章中阅读更多关于自动调优的内容：[`cloudblogs.microsoft.com/sqlserver/2018/06/11/sql-server-automatic-tuning-around-the-world/`](https://cloudblogs.microsoft.com/sqlserver/2018/06/11/sql-server-automatic-tuning-around-the-world/)。\n\
  \n![](img/index-545_1.jpg)\n\n# 第 10 章：迁移至 Linux 上的 SQL Server\n\n## 安全性\n安全性对于数据平台产品至关重要，我在本书中已经为您论证了\
  \ `SQL Server` 拥有保护数据所需的所有功能。在本节中，我将指出在我认为 `SQL Server` 在安全性方面优于 `pgsql` 的独特之处。\n\
  \n### 安全漏洞最少的数据库产品\n根据美国国家标准与技术研究院（`NIST`）的数据，`SQL Server` 在行业内安全漏洞数量最少。如图 10-5\
  \ 所示，该图表展示了过去八年的趋势。\n\n***图 10-5.** `SQL Server` 是过去八年中安全漏洞最少的数据库。*\n\n我们并非捏造这些统计数据。您可以在\
  \ [`nvd.nist.gov/`](https://nvd.nist.gov/) 阅读更多关于此数据的信息。\n\n### Active Directory\
  \ 认证\n虽然 `pgsql` 支持基于 `GSSAPI` 的认证，但其文档中并未具体提及支持 Active Directory 系统的 `GSSAPI` 认证。Active\
  \ Directory 是行业内最受欢迎的身份系统之一，而 Linux 上的 `SQL Server` 支持它。您可以在 [`docs.microsoft.com/sql/linux/sql-server-linux-active-directory-authentication`](https://docs.microsoft.com/sql/linux/sql-server-linux-active-directory-authentication)\
  \ 阅读更多关于 Linux 上 `SQL Server` 的 Active Directory 认证内容。\n\n### 透明数据加密 (TDE)\n`SQL\
  \ Server` 使用 `TDE` 提供静态数据加密。`pgsql` 不为数据库和 `wal` 日志文件的静态存储提供任何内置加密功能。您可以在 [`docs.microsoft.com/sql/relational-databases/security/encryption/transparent-data-encryption`](https://docs.microsoft.com/sql/relational-databases/security/encryption/transparent-data-encryption)\
  \ 阅读更多关于 `SQL Server` 的 `TDE` 内容。\n\n##### 始终加密\n我在第 7 章描述了名为 `Always Encrypted`\
  \ 的新型端到端安全功能，它将 `SQL Server` 提供程序与数据库引擎集成，以实现端到端加密，同时将密钥的控制权交到应用程序开发人员和用户手中。`pgsql`\
  \ 没有像 `Always Encrypted` 这样的内置端到端加密功能。\n\n### 动态数据屏蔽 (DDM)\n`SQL Server` 的 `DDM`\
  \ 允许管理员使用 `T-SQL` 定义屏蔽规则，而不是将规则编码在应用程序中。该功能之所以称为动态，是因为在 `T-SQL` 语句应用于 `SQL Server`\
  \ 后，应用程序可以获取数据的新屏蔽规则。`pgsql` 目前不支持动态数据屏蔽功能。\n\n### 审计\n`SQL Server` 提供内置的安全审计功能，利用扩展事件作为基础。`pgsql`\
  \ 不提供任何内置的安全审计功能。在我的研究中，我确实在 GitHub 上找到了 `pgsql` 的这个自定义审计扩展 [`github.com/pgaudit/pgaudit`](https://github.com/pgaudit/pgaudit)，但我无法判断其使用或支持的广泛程度。\n\
  \n### 数据分类与漏洞评估\n近期的 `GDPR` 法规使许多用户更仔细地审视其数据平台的数据分类和潜在漏洞。`SQL Server` 提供\n\n\n\n\
  内置的数据分类（更多信息请访问 [`docs.microsoft.com/sql/relational-databases/security/sql-data-discovery-and-classification`](https://docs.microsoft.com/sql/relational-databases/security/sql-data-discovery-and-classification)）和漏洞评估（更多信息请访问\
  \ [`docs.microsoft.com/sql/relational-databases/security/sql-vulnerability-assessment`](https://docs.microsoft.com/sql/relational-databases/security/sql-vulnerability-assessment)）功能及工具。`pgsql`\
  \ 则不提供任何内置的数据分类或漏洞评估功能。\n\n# 第 10 章 迁移至 Linux 上的 SQL Server\n\n## HADR\n\n我在本书中阐述了高可用与灾难恢复特性和流程对于生产数据库平台的重要性。在本节中，我将重点说明\
  \ SQL Server 与 `pgsql` 在 HADR 方面的一些独特差异。\n\n### 备份与还原\n\n*   SQL Server 备份支持校验和，而\
  \ `pgsql` 不支持。`SQL BACKUP WITH CHECKSUM` 会在备份过程中验证校验和。SQL Server 提供了 `RESTORE VERIFYONLY`\
  \ 命令来验证校验和。\n*   `pgsql` 没有备份加密选项，而 SQL Server 支持加密备份。\n*   SQL Server 支持用于将备份流式传输到外部程序的虚拟设备接口（`VDI`），包括对快照备份的支持。`pgsql`\
  \ 的 `pg_dump` 程序确实支持通过 Linux 的 \"管道\" 将输出流式传输到另一个程序，但 `VDI` 是一个完整的协议接口，允许实现丰富的第三方备份解决方案。\n\
  *   SQL Server 支持差异备份，但 `pgsql` 没有这个概念。你可以在 [`docs.microsoft.com/sql/relational-databases/backup-restore/differential-backups-sql-server`](https://docs.microsoft.com/sql/relational-databases/backup-restore/differential-backups-sql-server)\
  \ 阅读更多关于 SQL Server 差异备份的信息。\n*   SQL Server 支持联机进行文件组还原、部分还原和页面还原，而 `pgsql` 不支持这些操作。\n\
  \n### 启动与并行恢复\n\n*   我在书中描述了 SQL Server 在启动时恢复数据库的过程，包括分析、重做和回滚阶段。SQL Server 支持快速恢复的概念，允许数据库用户在重做阶段后访问数据库，同时在回滚执行期间保持对必要资源的锁。`pgsql`\
  \ 不提供此功能。\n*   SQL Server 还在恢复的重做阶段使用并行工作线程，从而加快了整体恢复过程。`pgsql` 不提供数据库的并行重做恢复。\n\
  \n### 灾难恢复\n\n如果你在 `pgsql` 中丢失了一个数据库表空间（例如，你将其放在了一个发生故障的独立磁盘上），整个 `pgsql` 集群可能无法启动。这根据\
  \ [`www.postgresql.org/docs/10/static/manage-ag-tablespaces.html`](https://www.postgresql.org/docs/10/static/manage-ag-tablespaces.html)\
  \ 的 `pgsql` 文档所述。任何 SQL Server 用户数据库因任何原因启动失败，都不会导致实例启动失败。\n\n### 数据库快照\n\n`pgsql`\
  \ 不提供任何类似 SQL Server 数据库快照的功能，后者是原始数据库的一个稀疏副本，并且仅随着对\n\n\n\n# 第 10 章：迁移至 Linux 上的\
  \ SQL Server\n\n原数据库。您可以通过以下链接了解更多关于 SQL Server 数据库快照的信息：[SQL Server 数据库快照](https://docs.microsoft.com/sql/relational-databases/databases/database-snapshots-sql-server)。\n\
  \n## 故障转移集群与可用性组\n\nPostgreSQL (Pgsql) 同时提供基于共享磁盘和事务日志的高可用性与灾难恢复 (HADR) 解决方案，并能与\
  \ `Pacemaker` 等集群系统软件集成。与 `Pacemaker` 配合使用的资源代理需要从另一个位置安装：[ClusterLabs 资源代理项目中的\
  \ pgsql 心跳脚本](https://github.com/ClusterLabs/resource-agents/blob/master/heartbeat/pgsql)。所有关于如何安装资源代理并与\
  \ `Pacemaker` 集成的资源都可以在以下页面找到：[PostgreSQL 生态系统:Pacemaker](https://wiki.postgresql.org/wiki/Ecosystem:Pacemaker)。\n\
  \n在了解了 `pgsql` 的这些功能后，有两个差异点让我印象深刻：\n\n1.  SQL Server 的故障转移检测粒度使用灵活故障转移策略和 `sp_server_diagnostics`\
  \ 系统存储过程。此外，SQL Server 将数据库健康状况作为检测是否需要故障转移的一个组件。我没有看到 `pgsql` 提供这种内置于数据库引擎中、可触发故障转移的故障检测级别。您可以通过以下链接了解更多关于\
  \ SQL Server 灵活故障转移的信息：[可用性组的灵活自动故障转移策略](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/flexible-automatic-failover-policy-availability-group)。\n\
  \n2.  SQL Server 通过可用性组提供了自动页面修复功能，而 `pgsql` 的流复制技术并不提供此特性。\n\n## 管理与监控\n\n我将 SQL\
  \ Server 与 `pgsql` 进行比较的最后一个领域是各种管理与监控功能。以下是我认为 SQL Server 表现突出，并且比 `pgsql` 提供更强大功能的领域。\n\
  \n### SQL Server 代理\n\nSQL Server 提供了一个内置的作业调度引擎，这对于安排数据库维护任务特别方便。`pgsql` 没有提供内置的作业调度系统。您可以通过以下链接了解更多关于如何在\
  \ Linux 上使用 `SQL Server Agent` 的信息：[在 Linux 上运行 SQL Server Agent 作业](https://docs.microsoft.com/sql/linux/sql-server-linux-run-sql-server-agent-job)。\n\
  \n### 资源调控器\n\nSQL Server 提供了一个内置特性，用于控制用户和应用程序的资源，包括 CPU、I/O 和内存。此外，`Resource Governor`\
  \ 允许您在应用程序级别控制 `max degree of parallelism`（最大并行度），并将应用程序关联到 CPU 或 NUMA 节点。`Pgsql`\
  \ 没有与 `Resource Governor` 相媲美的内置功能。大多数 `pgsql` 的用途是使用 Linux `cgroups` 来控制 `pgsql`\
  \ 集群资源，但您无法将此分配与应用程序绑定。您可以通过以下链接了解更多关于 SQL Server `Resource Governor` 的信息：[资源调控器](https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor)。\n\
  \n\n\n[资源调控器/resource-governor。](https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor)\n\
  \n## 专用管理员连接 (`DAC`)\n\n正如我在书中所述，如果 `SQL Server` 因任何原因变得无法访问，但其实例仍在运行，你或许能使用 `DAC`\
  \ 连接、收集诊断信息，并在某些情况下解决问题。而如果 `pgsql` 因任何原因挂起，则没有方法可以在不停止并重启 `pgsql` 的情况下访问引擎。你可以在以下链接中阅读更多关于\
  \ `SQL Server` 的 `DAC` 信息：[`docs.microsoft.com/sql/database-engine/configure-windows/diagnostic-connection-for-database-administrators`](https://docs.microsoft.com/sql/database-engine/configure-windows/diagnostic-connection-for-database-administrators)。\n\
  \n## 数据库的附加与分离\n\n由于 `SQL Server` 允许你为数据库和事务日志控制并建立特定文件，因此你能够分离数据库，将文件复制或移动到另一个\
  \ `SQL Server`，然后附加这些文件以创建新数据库。`pgsql` 不提供任何类似 `SQL Server` 的分离和附加功能。\n\n## 恢复与修复\n\
  \n对于页面校验和失败，`pgsql` 确实提供了通过查询或后台清理进程初始化来清理损坏页面的能力。`SQL Server` 提供了更丰富的修复功能，例如 `DBCC\
  \ CHECKDB REPAIR` 和紧急模式修复以重建事务日志。此外，如果 `SQL Server` 恢复过程中遇到校验和错误，恢复将继续进行，使用延迟事务跳过损坏的页面。\n\
  \n## 联机维护\n\n`SQL Server` 支持联机索引构建的概念，这样在构建（或重建）索引时用户不会被阻塞。`pgsql` 不提供此功能。此外，`SQL\
  \ Server` 支持可恢复索引重建的概念，因此你可以暂停和继续大型索引重建任务。你可以在以下链接中阅读更多关于 `SQL Server` 的联机索引操作：[`docs.microsoft.com/sql/relational-databases/indexes/perform-index-operations-online`](https://docs.microsoft.com/sql/relational-databases/indexes/perform-index-operations-online)。\n\
  \n## 索引重组\n\n`SQL Server` 和 `pgsql` 中的索引都可能变得碎片化。`SQL Server` 和 `pgsql` 都提供了一种通过重建索引来整理索引碎片的方法（只有\
  \ `SQL Server` 可以在线执行此操作）。然而，只有 `SQL Server` 提供了一种不同的、侵入性更小的方法，即通过重组索引来整理碎片。你可以在以下链接中阅读更多关于\
  \ `SQL Server` 的索引重组信息：[`docs.microsoft.com/sql/relational-databases/indexes/reorganize-and-rebuild-indexes`](https://docs.microsoft.com/sql/relational-databases/indexes/reorganize-and-rebuild-indexes)。\n\
  \n## 系统运行状况会话\n\n虽然 `SQL Server` (`扩展事件`) 和 `pgsql` (`dtrace`) 提供了丰富的跟踪功能，但只有 `SQL\
  \ Server` 会自动使用跟踪来保存有关其运行状况关键事件的信息，这称为系统运行状况会话。系统运行状况会话中包含了 `sp_server_diagnostics`\
  \ 存储过程的输出，该存储过程用于为故障转移做出运行状况决策。你可以在以下链接中阅读更多关于 `SQL Server` 的系统运行状况会话信息：[`docs.microsoft.com/sql/relational-databases/extended-events/use-the-system-health-session`](https://docs.microsoft.com/sql/relational-databases/extended-events/use-the-system-health-session)。\n\
  \n\n\n# 第 10 章  迁移至 Linux 上的 SQL Server\n\n## **执行迁移**\n\n与从 Oracle 迁移类似，要从 PostgreSQL\
  \ 迁移，我建议您首先执行以下步骤：\n\n1.  评估并捕获您当前使用 PostgreSQL 的应用程序的性能基线。\n2.  决定是否要在迁移过程中对表、索引或服务器端代码的定义进行任何更改。\n\
  3.  在 Linux 上安装 SQL Server。\n4.  创建一个新的数据库，为数据库和事务日志设置合适的大小，以容纳 PostgreSQL 数据库的当前大小，并为向表中插入数据的事务预留空间。\n\
  \n从 PostgreSQL 迁移通常涉及三个领域：\n\n*   迁移架构或所有对象的定义，例如表、索引、视图和服务器端代码\n*   迁移数据\n*   迁移任何维护脚本或作业\n\
  \n通过我的研究，我发现了一些软件供应商编写的工具，您可以购买它们来帮助您迁移架构和对象定义，但我没有找到任何可以免费下载的工具。\n\n因此，我找到了这两个讨论从\
  \ SQL Server 迁移到 PostgreSQL 的资源。通过研究这些示例，您应该能够识别从 PostgreSQL 迁移到 SQL Server 时可能遇到的问题：\n\
  \n1.  `https://www.devbridge.com/articles/migrating-from-mssql-to-postgresql/` 上的这篇博文讲述了一个用户从\
  \ SQL Server 迁移到 PostgreSQL 的经验。阅读这篇文章非常有用，因为它展示了两个系统之间许多 SQL 语言的差异。您可以在迁移到 SQL\
  \ Server 时利用这些知识。\n2.  GitHub 项目 `https://github.com/lorint/AdventureWorks-for-Postgres`\
  \ 中的 AdventureWorks 是一个极好的资源。该用户将 SQL Server 2014 的示例数据库 AdventureWorks（可在 `https://github.com/Microsoft/sql-server-samples/releases/tag/adventureworks`\
  \ 找到）迁移到了 PostgreSQL。在浏览这个项目后，我有几点评论。\n    *   该项目使用了以下 zip 文件 `https://github.com/Microsoft/sql-server-samples/releases/download/adventureworks/AdventureWorks-oltp-install-script.zip`，其中包含用于创建\
  \ AdventureWorks 数据库的 T-SQL 脚本以及一系列用于为 SQL Server 加载数据的 .csv 文件。\n    *   将 T-SQL\
  \ 脚本与 PostgreSQL GitHub 项目中的 `install.sql` 进行比较，您就能看到在创建表、索引、架构和数据类型方面的根本差异。\n \
  \   *   该用户被迫为 T-SQL 存储过程创建返回 `VOID` 的函数，因为 PostgreSQL 没有存储过程的概念。您应该能够将 PostgreSQL\
  \ 中返回 void 的函数提取出来，并将其更改为 SQL Server 存储过程。\n    *   该项目有一个用 Ruby 编写的程序，用于将 CSV 文件转换为可以在\
  \ PostgreSQL 中加载数据的格式。虽然您可以查看此代码来反向处理由 pgdump 等程序生成的 CSV 文件，但请考虑 SSIS 支持 PostgreSQL\
  \ ODBC 驱动程序。因此，您可以构建一个 SSIS 包来导出数据。\n\n# 第 10 章  迁移至 Linux 上的 SQL Server\n\n\n#\
  \ 第 10 章 迁移至 Linux 上的 SQL Server\n\n## 迁移后考虑事项\n\n一旦你迁移到 `SQL Server`，你将需要考虑为你已迁移的\
  \ `SQL Server` 实例和数据库进行若干变更。迁移后可能有许多任务需要处理，但在本节中，我已将其缩小到我认为最重要的、可能影响你在 `Linux` 上\
  \ `SQL Server` 体验成功与否的任务。\n\n在本节中，我将讨论性能、`HADR`、数据库兼容性和应用程序兼容性。数据库兼容性仅适用于你从早期版本的\
  \ `SQL Server` 迁移而来的情况。所有其他主题都非常适用于你从任何数据库平台迁移到 `Linux` 上的 `SQL Server`。\n\n###\
  \ 迁移后优化性能\n\n本书包含一个关于性能的非常长的章节（第 6 章），这是有充分理由的。对于使用像 `SQL Server` 这样的数据平台的应用程序来说，性能是最关键的方面之一。因此，在你迁移到\
  \ `Linux` 上的 `SQL Server` 后，你需要确保优化性能。我在第 6 章中讨论的所有内容都适用于你在 `Linux` 上使用 `SQL Server`。在本节中，我将指出迁移后需要关注的一些具体领域。\n\
  \n首先，我们的文档在 [`docs.microsoft.com/sql/relational-databases/post-migration-validation-and-optimization-guide`](https://docs.microsoft.com/sql/relational-databases/post-migration-validation-and-optimization-guide)\
  \ 包含一套优秀的与性能相关的迁移后主题。让我首先对这些建议做一些评论：\n\n-   **`CE` 版本变更**：`CE` 代表基数估计，我在关于性能的第 6\
  \ 章提到了这个主题。我将推迟对此主题的评论，留到本章后面关于数据库兼容性的章节。\n-   **基数估计变更**：你需要处理基数估计的变更。有关具体建议，请参阅本章后面的“使用数据库兼容性”。\n\
  -   **参数嗅探**：这是我在关于性能的第 6 章讨论过的另一个主题。此指导更多是为了提高意识以及如何处理 *参数敏感计划* 的情况。如果你还记得，在第 6\
  \ 章我讨论了一项名为自动调优的新功能，用于检测甚至修复在某些情况下由于参数嗅探可能发生的查询计划回退问题。\n-   **缺失索引**：我在关于性能的第 6\
  \ 章讨论了这个主题。务必查看推荐的缺失索引，但一定要调查每条建议，以确保它对你的数据库有意义。\n-   **谓词与数据筛选**：本节讨论了各种 *查询模式*，这些模式会阻止\
  \ `SQL Server` 生成基于 *筛选器* 进行搜索的最优查询计划。筛选器只是使用 `T-SQL` 语句中 `WHERE` 子句的另一种说法。一个筛选器的例子。\n\
  \n从 `pgsql` 迁移到你的 `Linux` 上的 `SQL Server`。`pgsql` 支持 `ODBC` 驱动程序（参见 [`www.postgresql.org/ftp/odbc/versions/`](https://www.postgresql.org/ftp/odbc/versions/msi/)）。然后请参阅此文档了解如何将\
  \ `SSIS` 与 `ODBC` 数据源配合使用：[`docs.microsoft.com/sql/integration-services/data-flow/extract-data-by-using-the-odbc-source`](https://docs.microsoft.com/sql/integration-services/data-flow/extract-data-by-using-the-odbc-source)。\n\
  \n\n# 迁移到 Linux 上的 SQL Server 之后的性能考虑\n\n## 影响索引查找的因素\n影响 SQL Server 使用索引查找行（而非扫描整个索引或表）能力的一个因素是`WHERE`子句，它将一个列与一个变量或值进行比较，而该变量或值的数据类型不同，需要隐式数据转换。\n\
  \n## 表值函数\n这是一个我在书中至今尚未涉及的主题。表值函数(`TVFs`)使你能够创建一个返回表类型的`T-SQL`函数。文档讨论了此概念如何作为视图的替代方案，因为`TVF`可以包含多条语句，而视图只允许一条`T-SQL`语句。使用多语句表值函数(`MSTVF`)时要小心，因为用于查询计划选择的统计信息使用的是固定值。尽管如此，我在第\
  \ 6 章讨论的新`AQP`功能可以帮助为`MSTVF`估算正确的统计信息。\n\n迁移到 Linux 上的 SQL Server 之后，还有其他一些我认为你应该记住的性能考虑事项，包括索引、基线和监控，以及使用新功能。\n\
  \n## 重建现有索引和建立新索引\n我并非一定有证据支持这个说法，但我还是要说出来。任何时候你升级或迁移到新版本的 SQL Server，都**应该**重建所有索引。这能为索引组织和统计信息提供一个`clean\
  \ slate`（干净的起点）。\n\n迁移后，这也是一个很好的机会来研究你是否应该考虑更改当前索引、删除不需要的索引或添加新索引。请参考第 6 章中关于可能缺失索引的指导。如果你是从另一个数据库平台迁移过来的，你绝对需要为你的新表制定合适的索引策略。虽然像`SSMA`这样的工具可以将索引从`Oracle`等平台转换到\
  \ SQL Server，但你应该确保这些索引对于你的工作负载（包括聚集索引和非聚集索引）仍然是正确的。\n\n## 建立新基线和性能监控策略\n在第 6 章中，我谈到了性能基线和监控的重要性。我还在那一章讨论了在迁移前捕获先前系统上性能基线数据的重要性。像`DEA`这样的工具可以让你为\
  \ SQL Server 做到这一点，并在迁移前比较未来的性能。\n\n迁移后是检查应用程序性能与先前基线（无论是 SQL Server 还是其他数据库平台）相比的好时机。此外，正如我在本章开头提到的，将你在\
  \ Linux 上的 SQL Server 的整体系统利用率与之前的系统进行比较。在 Linux 上的 SQL Server 上，整体系统利用率很可能不同，但你应该警惕那些截然不同的观察结果。如果你迁移到\
  \ Linux 上的 SQL Server，而你的应用程序导致 Linux 服务器`100%`的 CPU 利用率（并且`sqlservr`进程消耗了全部），你需要仔细研究你的工作负载是否有足够的\
  \ CPU，或者`T-SQL`查询是否可能没有得到最优调优。\n\n一旦你对迁移后 SQL Server 的新性能感到满意，就是建立新基线的绝佳时机。这时，像`Query\
  \ Store`这样的功能会变得极其有用，因为它能自动捕获有关查询性能的历史信息。\n\n你还需要确保为性能监控制定了正确的策略。如果你是从 Windows 上的\
  \ SQL Server 迁移过来的，许多用于监控查询性能的优秀 SQL Server 功能依然存在，但你需要建立新的方法来观察 Linux 操作系统与 Windows\
  \ 相比的性能。\n\n如果你来自不同的数据库平台，你将需要设置系统以使用 SQL Server 的内置功能来监控查询性能，例如`DMVs`、`Extended\
  \ Events`和`Query Store`。\n\n\n\n# 第 10 章 迁移到 Linux 上的 SQL Server\n\n## 启用新特性以提升性能\n\
  \n当你已经迁移到 Linux 上的 SQL Server，对其性能感到满意，并且建立了新的性能基线后，在正式“启用”生产环境之前，你可能还会考虑使用一些新的性能特性，包括但不限于：\n\
  \n*   列存储索引\n*   内存 OLTP\n*   分区（如果你是从 SQL Server 迁移过来，这不一定是个新特性，但你之前可能并未使用它。来自其他数据平台的用户则肯定需要考虑分区）。\n\
  *   自动调优\n\n请回顾第 6 章，了解更多关于这些特性以及如何、何时最佳使用它们的细节。\n\n## 设计你的安全与高可用性灾难恢复策略\n\n确保迁移后性能满足要求是成功的关键。但正如我在本书其他章节所描述的，安全和高可用性灾难恢复（HADR）同样重要。回顾这些章节，了解你应该使用哪些安全特性，以及应如何设置登录名和用户。或许你可以借此机会使用\
  \ Active Directory 身份验证。\n\n对于 HADR，拥有备份策略是根本要求。但你也可以将此次迁移作为一个机会，设置 Always On 可用性组作为新的\
  \ HADR 策略。\n\n## 使用数据库兼容性级别\n\n每个 SQL Server 数据库都可以在 SQL Server 的每个版本上以特定的**数据库兼容性**级别运行。当在特定版本的\
  \ SQL Server 上创建数据库时，该数据库将采用该 SQL Server 版本的默认数据库兼容性级别。我不得不承认，数据库兼容性级别的编号系统与 SQL\
  \ Server 版本的名称相比，可能会有点令人困惑。例如，SQL Server 2017 的默认数据库兼容性级别是 140。使用 140 是为了匹配 SQL\
  \ Server 的版本号。例如，SQL Server 2017 的版本号以 14 开头，因此兼容性级别与引擎版本**主版本号**相匹配。\n\n> **注意**\
  \ 你可以使用 T-SQL 语句`SELECT @@VERSION`或使用 T-SQL 系统函数`@@ServerpropertY`的选项之一（如`productversion`）来查找完整的引擎版本。完整的产品版本由`major.minor.build.revision`号组成。在大多数情况下，我们不使用次版本号（SQL\
  \ Server 2008r2 除外）。`build`对应于 SQL Server 的主要构建发布，如 RTM、累积更新或 GDR。`revision`是内部机制，用于在接近发布\
  \ RTM、累积更新或 GDR 版本时更新构建。\n\n默认数据库兼容性级别与 SQL Server 版本和发布版本匹配的完整表格记录在以下网址：[`docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-compatibility-level#arguments`](https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-compatibility-level#arguments)。\n\
  \n随着每个新的 SQL Server 主要版本发布，都会建立一个新的默认数据库兼容性级别。从之前版本恢复的任何数据库都将保留其先前版本的默认数据库兼容性级别。你可能没有意识到，但之前章节中每次恢复`WideWorldImporters`示例时，该数据库都保留了\
  \ 130 的数据库兼容性级别。你可以在恢复`WideWorldImporters`后运行以下 T-SQL 语句来查看：\n\n```sql\nSELECT name,\
  \ compatibility_level FROM sys.databases WHERE name = 'WideWorldImporters'\nGO\n\
  ```\n\n结果应如下所示：\n\n```text\nName                         compatibility_level\n----------------------------\
  \ -------------------\nWideWorldImporters           130\n```\n\n你可以使用`ALTER DATABASE`\
  \ T-SQL 语句来更改兼容性级别。\n\n\n# 第 10 章 迁移至 Linux 上的 SQL Server\n\n## 通过数据库兼容性级别启用新功能\n\
  \n某些增强功能（通常与查询处理相关）是在使用特定的数据库兼容性级别时引入的。例如，从数据库兼容性级别 140 开始，当数据库设置为此兼容性级别时，会启用查询处理的新功能。我在第\
  \ 6 章介绍过这项名为**自适应查询处理**的新功能。可以预见，微软未来将继续通过数据库兼容性级别来启用新的查询处理功能。\n\n以下是随数据库兼容性级别引入的其他查询处理增强功能示例：\n\
  \n-   **基数估计**：当数据库使用兼容性级别 120 或更高版本时（于 SQL Server 2014 引入），会启用一个新的基数估计模型。我在第 6\
  \ 章讨论过这个新 CE 模型的影响。本书前面也提到过，如果你使用名为 `LEGACY_CARDINALITY_ESTIMATION` 的 `ALTER DATABASE`\
  \ 选项，可以将兼容性级别设为 120 或更高，以回退到旧的 CE 模型。\n\n-   **查询处理修复程序**：数据库兼容性级别 130 包含了之前仅通过跟踪标志\
  \ `4199` 启用的查询处理修补程序。数据库兼容性级别 140 则包含了在 SQL Server 2016（兼容性级别 130）到 SQL Server 2017（兼容性级别\
  \ 140）之间引入的查询处理修补程序。本书前面讨论过这个概念，但如需回顾，你可以阅读更多关于启用这些修复程序的信息：[`docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-trace-flags-transact-sql#4199`](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-trace-flags-transact-sql#4199)。\n\
  \n-   **并行批量操作**：对于兼容性级别 120 或更高版本的数据库，`SELECT INTO` 查询可以并行运行。对于兼容性级别 130 或更高版本的数据库，`INSERT\
  \ SELECT` 查询可以并行运行。\n\n还有其他示例，你可以从文档的这个位置开始通读：[`docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-compatibility-level#differences-between-compatibility-level-130-and-level-140`](https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-compatibility-level#differences-between-compatibility-level-130-and-level-140)。这里开始有一系列表格，描述了不同兼容性级别之间的行为差异。\n\
  \n## 利用数据库兼容性级别实现向后兼容\n\n数据库兼容性级别可用于对应用程序的查询和功能提供*某种程度*的向后兼容性保护。所有向后兼容性的差异都列在每个兼容性级别的文档中（请参见我之前提供的最后一个文档链接）。让我给你一个例子。\n\
  \n\n如果你正在使用兼容级别 110 或更低的数据库，使用称为公用表表达式（`CTE`）概念的 `T-SQL` 查询允许重复的列名。但是，从数据库兼容级别 120\
  \ 开始，重复的列名将导致错误，查询会失败。\n\n有两个领域，数据库兼容性对可能的破坏性更改没有影响：\n-   已弃用的功能或特性\n-   在 `SQL\
  \ Server` 实例级别、数据库范围之外的更改\n\n数据库兼容性可以提供巨大帮助的领域之一是性能。从数据库兼容级别 130 开始，任何可能导致查询计划更改的变更或特性，都应该只在新的兼容级别下发生。这为升级到\
  \ `SQL Server` 较新版本但保留先前数据库兼容级别的应用程序提供了一种更安全的方法。\n\n我建议你通读我们所有关于使用兼容级别进行向后兼容的文档，网址为\
  \ [`docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-compatibility-level#using-compatibility-level-for-backward-compatibility`](https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-compatibility-level#using-compatibility-level-for-backward-compatibility)。\n\
  \n## 第 10 章   迁移至 Linux 上的 SQL Server\n\n### 迁移 SQL Server 实例对象\n\n如果你正在将数据库从早期版本的\
  \ `SQL Server` 迁移到 Linux 上的 `SQL Server`，你可能需要迁移数据库范围之外的 `对象`，包括：\n-   `登录名`：请记住，只支持\
  \ `SQL Standard security` 和 `Active Directory` 身份验证。如果你有 `Windows` 域登录名，你需要配置 `Active\
  \ Directory` 身份验证以允许它们访问 Linux 上的 `SQL Server`。\n-   `SQL Server Agent 作业`：请记住，在\
  \ Linux 上的 `SQL Server` 中唯一能工作的作业类型是那些具有 `T-SQL` 作业步骤的常规作业。对于其他包含 `T-SQL` 范围之外作业步骤的作业，你将需要寻找替代解决方案。\n\
  -   `链接服务器`：只支持 `SQL Server` 到 `SQL Server` 的链接服务器，但你可以使用 `T-SQL` 系统存储过程来定义它们以添加链接服务器。你可以在文档中阅读更多相关信息：[`docs.microsoft.com/sql/relational-databases/linked-servers/linked-servers-database-engine`](https://docs.microsoft.com/sql/relational-databases/linked-servers/linked-servers-database-engine)。不幸的是，在\
  \ Linux 上的 `SQL Server 2017` 中，你不能使用链接服务器上的分布式事务，并且只支持 `SQL Standard security`。\n\
  \n### 使用新功能\n\n我曾与一些从 `SQL Server` 的一个版本迁移到下一个版本的客户合作，他们这样做只是为了跟上最新的 `SQL Server`\
  \ 版本，或者因为他们当前使用的版本已不再支持。在这些情况下，迁移后容易被忽视的一点是利用新功能。`SQL Server 2016` 和 `2017` 带有一些你可能容易错过的新功能，包括：\n\
  -   `列存储索引`（在 `SQL Server 2012` 中引入，但在 `SQL 2017` 中我认为此功能已达到顶峰）\n-   `内存中 OLTP`（在\
  \ `SQL Server 2014` 中引入，但许多限制在 `SQL Server 2017` 中被移除）\n-   `图形数据库`\n-   `JSON 支持`\n\
  -   `时态表`\n-   `原生评分`\n\n我在本书前面的章节中已经介绍过这些功能，所以我鼓励你回顾一下\n\n\n\n并审阅这些内容，看看它们在迁移后是否符合你的应用需求（或者你可能会选择将这些内容作为迁移的一部分来使用）。\n\
  \n## 在 Linux 上的 SQL Server 上使用现有应用\n\n迁移对象和数据是一回事，但那些为使用 `SQL Server` 而开发的应用程序怎么办？好消息是，无论你是从\
  \ `SQL Server` 还是其他数据库平台迁移过来，我们服务器端的程序（例如存储过程）通常都是本章所描述的迁移过程的一部分。\n\n然而，如果你的应用中嵌入了查询，例如即席查询，或者使用了诸如\
  \ `对象关系映射（ORM）` 这样的编程接口（它通常会生成查询），那么应用程序的迁移可能会更加困难。\n\n非常棒的消息是，`SQL Server` 支持当今市场上几乎所有流行的编程语言接口，包括\
  \ `C#`、`Java`、`Node.js`、`PHP`、`Python`、`Ruby` 和 `C++`。你可以在 `https://docs.microsoft.com/sql/linux/sql-server-linux-develop-connectivity-libraries`\
  \ 查看 `SQL Server` 在 `Windows`、`macOS` 和 `Linux` 上支持的编程接口的完整列表。如果你正在使用的应用程序连接的是旧版本的\
  \ `SQL Server`，那么它有很大几率只需很少的改动就能在 `Linux` 上的 `SQL Server` 中运行。\n\n**注意**：可能影响你的\
  \ `SQL Server` 应用程序的破坏性变更类型，将更多地与数据库兼容性以及 `Linux` 上的 `SQL Server` 不支持的功能差异有关。请通过我们的发布说明\
  \ `https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes` 及时了解 `Linux`\
  \ 上的 `SQL Server` 的功能差异。\n\n# 第十章 迁移到 Linux 上的 SQL Server\n\n如果你正在迁移的应用程序连接的是 `SQL\
  \ Server` 以外的数据库平台，那么挑战在于进行必要的更改以使用该平台的原生编程接口。例如，在第 4 章中，我向你展示了如何使用 `node.js` 和\
  \ `tedious` 驱动程序连接到 `SQL Server`。`tedious` 驱动程序不适用于 `Oracle`。因此，你可能有一个用 `node.js`\
  \ 编写的程序，它使用了类似 `node-oracleb` 的驱动程序（有关此驱动程序的更多信息，请访问 `https://github.com/oracle/node-oracledb`）。`tedious`\
  \ 和 `node-oracleb` 之间的类和方法可能相似，但很可能存在足够的差异，这将需要进行代码更改、测试和设计。别忘了检查同一编程语言中不同驱动程序在连接池、结果处理、游标等概念以及错误条件（例如，死锁在不同的数据库平台中可能处理方式不同）方面的工作方式差异。\n\
  \n#### 本章小结\n\n我希望本章为你提供了正确的信息，以便你做出必要的决策，迁移到 `Linux` 上的 `SQL Server`。本书以谈论一项目前正日益流行、成为部署应用程序和数据库的热门环境的技术来收尾是恰如其分的，这项技术被称为容器。\n\
  \n# 第十一章 SQL Server 与容器\n\n虚拟机的概念已经存在一段时间了，但在我任职于微软期间，直到大约 2006 至 2007 年，我才真正看到客户开始在虚拟机上使用\
  \ `SQL Server` 作为数据库平台。即使在 `Hyper-V` 和 `VMWare` 等虚拟机环境开始流行时，我仍怀疑 `SQL Server` 在客座虚拟机中能否良好运行。如今，`SQL\
  \ Server` 部署在虚拟机中的数量很可能远远超过了部署在裸机计算机上的数量。\n\n\n\n# 第 11 章 SQL Server 与容器\n\n我将容器视为新一代的虚拟机。但容器与`SQL\
  \ Server`等应用程序和数据库平台相结合所带来的兴奋感和采用率，其增长速度比我曾见过的虚拟机普及过程要快得多。\n\n在本章中，我将首先向您介绍容器的概念，然后相当深入地讨论并举例说明如何在`SQL\
  \ Server`中使用容器。最后，我将以一个有趣的示例结束本章：在`macOS`上使用`SQL Server`（`Mac`用户可能认为我在本书中忽略了他们），并讨论如何在名为`Kubernetes`的容器平台中使用`SQL\
  \ Server`。我想您会喜欢本章内容。这是我在本书中最喜欢撰写的章节之一。\n\n#### 容器简介\n\n虚拟机最贴切的定义是`硬件虚拟化`，而容器（或容器化）则被定义为`操作系统虚拟化`。虚拟机由一个在主机（裸机硬件）上运行的完整操作系统（客户机）组成。因此，一台主机承载多个虚拟机是很常见的。每个虚拟机都可以运行不同的客户操作系统。\n\
  \n© Bob Ward 2018\n\nB. Ward, *Pro SQL Server on Linux*, [`https://doi.org/10.1007/978-1-4842-4128-8_11`](https://doi.org/10.1007/978-1-4842-4128-8_11)\n\
  \n![](img/index-564_1.jpg)\n\n容器依赖于一个共享内核资源的单一主机操作系统（该主机操作系统本身可以是一个虚拟机）。这使得容器比虚拟机更轻量级。尽管容器共享单一的操作系统内核，但它们彼此之间是隔离的。我很喜欢下面这个直观的示意图（图\
  \ 11-1），我是在 `https://i.stack.imgur.com/exIhw.png` 找到的，它展示了容器与虚拟机的区别。\n\n### 图 11-1.\
  \ 容器 vs. 虚拟机\n\n此外，这个 `stackoverflow.com` 帖子很好地描述了虚拟机与容器之间的区别：[`https://stackoverflow.com/questions/16047306/how-is-docker-different-from-a-virtual-machine`](https://stackoverflow.com/questions/16047306/how-is-docker-different-from-a-virtual-machine)。关于这个帖子的一点说明：帖中描述了一种称为\
  \ `AuFS` 的联合文件系统 (`UnionFS`) 的使用。`UnionFS` 对于 `Docker` 容器是一个重要概念，因为它支持分层文件系统。当前版本的\
  \ `Docker` 仍然使用联合文件系统，但现在使用的是一个名为 `OverlayFS` 的系统。您可以在 [`https://docs.docker.com/storage/storagedriver/overlayfs-driver/`](https://docs.docker.com/storage/storagedriver/overlayfs-driver/)\
  \ 阅读更多关于 `OverlayFS` 的信息。\n\n`Docker` 容器是使用`镜像`创建的，镜像指定了文件系统的内容以及容器中运行的程序。容器就是一个镜像的实例。您可以基于同一个镜像运行多个容器。一个\
  \ `Dockerfile` 指定了 `Docker` 镜像的内容。`Docker` 提供了从 `Dockerfile` 规范`构建` `Docker` 镜像的功能。此外，`Docker`\
  \ 还支持使用一个名为 `compose` 的工具来构建多容器应用程序的功能。在下一节中，我将以 `SQL Server` 为例，向您展示更多关于 `Docker`\
  \ 镜像、文件和 `compose` 的内容。\n\n`Docker` 容器具有以下特点：\n\n*   **可移植性：** 您构建的任何 `Docker` 镜像都可以在任何支持\
  \ `Docker` 容器的地方运行，包括多种操作系统以及公有云和私有云。我曾在 `Windows`、`Linux`、`macOS` 和 `Azure` 上运行过\
  \ `Docker` 容器。\n*   **轻量级：** 如前所述，`Docker` 容器不像虚拟机那样包含一个完整的操作系统。`Docker` 容器共享内核资源，因此比虚拟机更轻量级。\n\
  \n\n\n# 第 11 章 SQL Server 与容器\n\n## 如何使用容器运行 SQL Server\n\n**一致性：** 容器镜像允许你部署一致的应用程序或数据库系统（如\
  \ SQL Server）版本。本章稍后我将详细讨论这对 SQL Server 的好处。\n\n**高效性：** Docker 容器提供了一种机制，可实现更快的部署、更少的停机时间以及更便捷的更新。我将在下一节解释这对\
  \ SQL Server 的益处。\n\nDocker 使用两个主要组件来帮助你管理 Docker 容器：\n\n*   **Docker 客户端：** 这是一个名为\
  \ `docker` 的程序，你可以配合多种选项来使用它，以构建镜像，并拉取、运行、启动、停止和管理容器。通过本章的示例，你将了解更多关于这些 Docker 概念的知识。\n\
  *   **Docker 守护进程：** Docker 客户端与守护进程程序通信，后者根据客户端的指示完成所有工作，包括构建镜像以及管理和运行容器。\n\nDocker\
  \ 容器使用一个称为*命名空间*的概念来实现容器之间的隔离（你可以在 [`docs.docker.com/engine/docker-overview/#the-underlying-technology`](https://docs.docker.com/engine/docker-overview/#the-underlying-technology)\
  \ 阅读更多关于命名空间使用的信息）。尽管容器是隔离的，它们仍然可以相互通信（例如通过 TCP/IP）。请将 Docker 文档 ([`docs.docker.com`](https://docs.docker.com))\
  \ 作为你关于容器的完整参考。供你参考，我建议你阅读以下我找到的关于容器的其他优质资源：[`theearlybirdtechnology.com/2017/08/12/docker-cheatsheet/`](http://theearlybirdtechnology.com/2017/08/12/docker-cheatsheet/)\
  \ 和 [`www.quora.com/What-exactly-is-a-base-image-in-Docker`](https://www.quora.com/What-exactly-is-a-base-image-in-Docker)。\n\
  \n让我们深入探讨如何将容器与 SQL Server 和数据库应用程序结合使用。\n\n在本书的这一部分，我将通过实际示例向你展示我在开篇介绍的容器基础概念。我将演示如何部署一个装有\
  \ SQL Server 的简单容器，如何使用容器来展示如何在更新时最大程度减少停机时间，如何使用 `Dockerfile` 构建和部署镜像，并最终实现一个包含\
  \ SQL Server 和应用程序的多容器部署。\n\n在阅读本节时请记住一点：`SQL Server on Linux` 不支持在同一服务器上运行多个实例（这在\
  \ Windows 上称为命名实例），因此，如果你想在同一个 Linux 服务器上运行多个 SQL Server 实例，使用容器就是方法。\n\n在我撰写本书期间，我的同事\
  \ Vin Yu 和我在 [`github.com/Microsoft/sqllinuxlabs`](https://github.com/Microsoft/sqllinuxlabs)\
  \ 为 `SQL Server on Linux` 和 Docker 容器构建了一系列免费的、自定进度的实验。Vin 构建了这些实验来探索 Docker 容器（可在\
  \ [`github.com/Microsoft/sqllinuxlabs/tree/master/containers`](https://github.com/Microsoft/sqllinuxlabs/tree/master/containers)\
  \ 找到）。我将在本节中使用这个实验的部分内容，向你展示如何配合容器使用 SQL Server。\n\n（我随书附带了一些脚本作为示例，你可以将它们与这些实验结合使用。）我可能不会严格按照\
  \ Vin 实验的顺序进行，并且我会为你将要运行以查看 SQL Server 容器实际运行的命令解释更多细节。\n\n为了向你展示这些示例，我创建了一个运行 RHEL\
  \ 7.5 的新 Azure 虚拟机。（我的虚拟机规格是 Standard D16s v3 [16 个 vCPU，64 GB 内存]，但你可以在更小规格的虚拟机上完成此操作。只需确保至少有\
  \ 4 个 vCPU 和 16GB 内存即可）。然后，我从 `bash` shell 运行了以下命令来更新虚拟机并安装 `git`。\n\n```\nsudo\
  \ yum update -y\nsudo yum install git -y\n```\n\n\n# 第 11 章 SQL Server 与容器\n\n请先更新软件包，然后克隆\
  \ Github 仓库以获取脚本和说明：\n\n```\nsudo yum -y update\nsudo yum install git\ngit clone\
  \ https://github.com/Microsoft/sqllinuxlabs.git\n```\n\n现在让我们安装 Docker 引擎，以便通过以下\
  \ bash shell 命令完成本章后续的其他示例：\n\n```\nsudo yum install -y yum-utils device-mapper-persistent-data\
  \ lvm2\nsudo yum-config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo\n\
  sudo yum install http://mirror.centos.org/centos/7/extras/x86_64/Packages/pigz-2.3.3-1.el7.centos.x86_64.rpm\n\
  sudo yum install docker-ce\n```\n\n**注意**，RHEL 的标准`docker`软件包是付费的`docker`企业版（详情请访问[`docs.docker.com/install/linux/docker-ee/rhel`](https://docs.docker.com/install/linux/docker-ee/rhel)）。出于本实验及书中示例的目的，我将使用免费的`docker`社区版，它是为\
  \ CentOS 构建的，但也兼容 RHEL。你可以在[`docs.docker.com/install/`](https://docs.docker.com/install/)了解更多关于`docker`社区版的信息。\n\
  \n现在通过 bash shell 中的以下命令启动 Docker 引擎：\n\n```\nsudo systemctl start docker\n```\n\
  \n你也可以使用以下命令设置 Docker 在重启时自动启动：\n\n```\nsudo systemctl enable docker\n```\n\n现在我准备向你展示如何使用容器部署\
  \ SQL Server。\n\n##### 部署并运行 SQL Server 镜像\n\n在本节中，我将向你展示使用容器部署 SQL Server 的基础知识，以及如何利用容器更新\
  \ SQL Server。\n\n###### Docker 容器 SQL Server 基础\n\n让我们首先学习部署带有 SQL Server 的容器并与之交互的基础知识。容器是某个`镜像`的实例。微软已在\
  \ Docker Hub 上发布了一系列镜像，地址为[`hub.docker.com/r/microsoft/mssql-server-linux/`](https://hub.docker.com/r/microsoft/mssql-server-linux/)。\n\
  \nDocker 镜像可以存储在私有`仓库`或像 Docker Hub 这样的公共域中。你甚至可以使用云服务作为私有容器注册表，例如 Azure 容器注册表，详情请访问[`azure.microsoft.com/services/container-registry`](https://azure.microsoft.com/services/container-registry)。\n\
  \n微软在 Docker Hub 上发布的 SQL Server 镜像包括从 RTM 版本一直到最新的 CU 和 GDR 更新的 SQL Server 2017\
  \ 镜像。这些镜像基于带有 SQL Server 开发版的 Linux Ubuntu 16.04 的`基础镜像`。这并不意味着你必须仅在 Ubuntu Linux\
  \ 服务器上部署这些镜像。我们基于 Ubuntu 构建的 Docker 镜像可以在 Docker 支持的任何平台上运行，因为底层的 Linux 内核在各种 Linux\
  \ 发行版中是相同的。但公平地说，如果你需要依赖某个特定的 Linux 发行版功能，我们基于 Ubuntu 的镜像可能不适用。在这种情况下，你可能需要使用`Dockerfile`来构建镜像。\n\
  \n此外，如果你想使用带有其他版本 SQL Server 的 Docker 镜像，请查阅我们的文档[`docs.microsoft.com/sql/linux/sql-server-linux-configure-docker#production`](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-docker#production)。\n\
  \n**注意** 你可以使用`Dockerfile`以 RHEL 为基础镜像，构建你自己的 SQL Server `docker`容器镜像。参见我们的示例[`github.com/Microsoft/mssql-docker/blob/master/linux/preview/RHEL/Dockerfile`](https://github.com/Microsoft/mssql-docker/blob/master/linux/preview/RHEL/Dockerfile)。\n\
  \n\n# 第 11 章 SQL Server 与容器\n\n## 部署 SQL Server 容器镜像\n\n[Dockerfile](https://github.com/Microsoft/mssql-docker/blob/master/linux/preview/RHEL/Dockerfile)。Microsoft\
  \ 正在致力于发布包含 `RHEL` 等 Linux 发行版的 `docker` 镜像。\n\n在本章中，我使用 `sudo` 以 `root` 身份运行所有\
  \ `Docker` 命令。你可以配置 `Docker`，以便以非 `root` 用户身份使用 `Docker` 命令。\n\n有关更多信息，请参阅此文档 ([`docs.docker.com/install/linux/linux-postinstall/#manage-docker-as-a-non-root-user`](https://docs.docker.com/install/linux/linux-postinstall/#manage-docker-as-a-non-root-user))。\n\
  \n部署 `SQL Server Docker Hub` 容器镜像的方法有以下两种：\n\n• 使用 `Docker` 客户端程序配合 `pull` 选项，如下方\
  \ `bash shell` 中的命令所示：\n```\nsudo docker pull microsoft/mssql-server-linux:2017-latest\n\
  ```\n\n• `运行` 一个 `Docker` 容器，指定其中一个 `SQL Server` 镜像。如果该镜像本地不存在，将先拉取镜像再运行容器。\n```\n\
  sudo docker run -e 'ACCEPT_EULA=Y' -e 'SA_PASSWORD=YourStrong!Passw0rd' \\\n-p 1500:1433\
  \ --name sql1 \\\n-d microsoft/mssql-server-linux:2017-latest\n```\n\n如果你先拉取了镜像，那么使用第二种方法运行容器时，将运行你已下载的镜像。这两种方法都要求你的\
  \ `Linux` 服务器能够连接互联网。\n\n**提示**：以下 [stackexchange.com](http://stackexchange.com)\
  \ 帖子（[`serverfault.com/questions/701248/downloading-docker-image-for-transfer-to-non-internet-connected-machine`](https://serverfault.com/questions/701248/downloading-docker-image-for-transfer-to-non-internet-connected-machine)）详细描述了部署容器的\
  \ `离线` 体验。`docker` 提供了一种能力，可以将镜像拉取到一台联网的机器上，保存为 `tar` 文件，将该 `tar` 文件复制到你的 `Linux`\
  \ 服务器，然后使用 `docker load` 将该 `tar` 文件导入为一个镜像，之后就可以用它来运行容器。\n\n让我们使用第二种方法来运行容器，这将自动拉取带有最新\
  \ `CU` 更新的 `SQL Server` 的 `Docker` 镜像。我想设置我的 `sa` 密码，因此我在 `nano` 编辑器中修改了前面的命令，更改了我的\
  \ `sa` 密码字符串，然后将结果粘贴到 `bash shell` 中，如下方命令所示：\n```\nsudo docker run -e 'ACCEPT_EULA=Y'\
  \ -e 'SA_PASSWORD=Sql2017isfast' \\\n-p 1500:1433 --name sql1 \\\n-d microsoft/mssql-server-linux:2017-latest\n\
  ```\n\n如果命令成功，你将看到类似以下的结果（如果这是你第一次尝试运行 `SQL Server` 容器镜像）。你可以看到 `Docker` 镜像在本地找不到，因此它将先从\
  \ `Docker Hub` 拉取，即隐式地运行了一个 `docker pull`。\n```\nUnable to find image 'microsoft/mssql-server-linux:2017-latest'\
  \ locally\n2017-latest: Pulling from microsoft/mssql-server-linux\nf6fa9a861b90:\
  \ Pull complete\nda7318603015: Pull complete\n6a8bd10c9278: Pull complete\nd5a40291440f:\
  \ Pull complete\nbbdd8a83c0f1: Pull complete\n3a52205d40a6: Pull complete\n6192691706e8:\
  \ Pull complete\n1a658a9035fb: Pull complete\n344203922c4b: Pull complete\n5975df51ff07:\
  \ Pull complete\nDigest: sha256:97d2a9cd87ecfab641f24be254e03a45b8d551355e21516c0460da7daf8b526e\n\
  Status: Downloaded newer image for microsoft/mssql-server-linux:2017-latest\n66e7e043e41683af4e1f419df41417e7fb3c19f8013b2d9d3e5c69a5d03ec3f8\n\
  ```\n\n要了解你的容器是否运行成功，最好的方法是运行以下 `bash shell` 命令：\n```\nsudo docker ps\n```\n\n在我的\
  \ `Linux` 服务器上，结果如下所示：\n```\nCONTAINER ID        IMAGE                         \
  \            COMMAND                  CREATED             STATUS              PORTS\
  \                    NAMES\n```\n\n\n\n# 第 11 章 SQL Server 与容器\n\n创建时间         \
  \       状态              端口                   名称\na01c1c991cec           microsoft/mssql-server-linux:2017-latest\n\
  \"/opt/mssql/bin/sqls...\"   约一分钟前  已运行约一分钟\n0.0.0.0:1500->1433/tcp  sql1\n\n让我们分解一下刚才使用的\
  \ `docker run` 命令参数。\n\n`-e` 参数用于设置运行 SQL Server 所必需的环境变量（类似于在 Linux 上部署 SQL Server\
  \ 时运行 `mssql-conf` 脚本所指定的参数），包括接受最终用户许可协议 (EULA) 和指定 `sa` 密码。（注意：这些变量会被传递给 `sqlservr`\
  \ 程序。）\n\n`-p` 参数用于端口映射。SQL Server 默认监听端口 `1433`，但将此端口直接用于容器可能会与主机 Linux 服务器上的 `1433`\
  \ 端口或其他运行 SQL Server 的 Docker 容器发生冲突。因此，此参数将主机的 `1500` 端口映射到容器内的 `1433` 端口。稍后我将展示如何在连接容器内的\
  \ SQL Server 时使用这个映射端口。\n\n`--name` 参数允许你指定一个用户友好的名称，以便使用其他 Docker 命令与该容器进行交互。\n\
  \n`-d` 参数指定在后台（即分离模式）运行容器，因此 `docker run` 命令会返回到 bash shell 提示符，同时在后台启动容器。\n\n##\
  \ 第 11 章 SQL Server 与容器\n\n最后一个参数是 Docker 镜像的名称，在本例中是 `microsoft/mssql-server-linux:2017-latest`。Docker\
  \ 会首先尝试在 Linux 服务器本地查找此镜像。如果不存在，它会尝试先从 Docker Hub 拉取该镜像，正如你之前在 `docker run` 命令的结果中看到的那样。\n\
  \n你可以从 bash shell 运行以下命令，查看 SQL Server 的 Docker 镜像是否已存储在本地：\n\n```\nsudo docker\
  \ images\n```\n\n在我的 Linux 服务器上，结果如下所示：\n\n仓库                      标签          \
  \        镜像 ID\n创建时间             大小\nmicrosoft/mssql-server-linux    2017-latest\
  \          c90c3ab55158\n13 天前         1.44GB\n\n现在 Docker 容器已经运行，你可能想要连接到 SQL Server。让我们使用以下两种方法：\n\
  \n1.  使用 Docker 命令与容器交互，通过以下命令运行一个 bash shell：\n\n    ```\n    sudo docker exec\
  \ -it sql1 bash\n    ```\n\n    你现在应该会看到一个类似下面的 shell 提示符：\n\n    ```\n    root@66e7e043e416:/#\n\
  \    ```\n\n    在此示例中，`66e7e043e416` 是容器 ID，并在 T-SQL 语句 `@@SERVERNAME` 中作为服务器名称出现。\n\
  \n    这是一个 bash shell，允许你在容器内运行命令（很酷，对吧？）。运行以下命令，在容器内使用 `sqlcmd`（SQL Server 镜像包含\
  \ `sqlcmd` 工具）连接到 SQL Server（输入你的 `sa` 密码）：\n\n    ```\n    /opt/mssql-tools/bin/sqlcmd\
  \ -U SA -P 'Sql2017isfast'\n    ```\n\n    **注意** 虽然直接使用 bash shell 与容器交互很有趣，但大多数情况下，你与容器的交互将使用容器*外部*的程序。除非你是在持久化卷上更改数据或文件（我将在本章后面描述），否则请谨慎在容器内部进行任何更改。任何不涉及持久化存储的容器更改，如果在移除容器后都会丢失。在接下来的示例中，我将向你展示如何在容器内部和外部运行\
  \ `sqlcmd`。但在这些示例中，我修改的是位于持久化存储卷上的 SQL Server 数据库。\n\n    在 `sqlcmd` 中输入 `exit`，然后在\
  \ shell 中输入 `exit` 以退出此 shell。\n\n2.  第二种方法是使用容器外部的 SQL Server 工具连接到容器内的 SQL Server。在这台\
  \ Azure 虚拟机上，我根据以下文档（https://docs.microsoft.com/sql/linux/quickstart-install-connect-red-hat#tools）安装了\
  \ SQL Server 工具。\n\n\n# 第 11 章 SQL Server 与容器\n\n## 安装与连接（以 Red Hat 为例）\n\n请参考 [quickstart-install-connect-red-hat#tools](https://docs.microsoft.com/sql/linux/quickstart-install-connect-red-hat#tools)\
  \ 以便使用 `sqlcmd` 连接到容器中的 SQL Server。由于容器映射到端口 1500，并且我是在本地的 Linux 服务器上连接，因此可以在 bash\
  \ shell 中运行如下命令：\n\n```\nsqlcmd -S localhost,1500 -Usa -PSql2017isfast\n```\n\n\
  **注意**：您可以通过使用 Linux 主机服务器的 IP 地址和端口 1500 作为 `-S` 参数，从另一台可以访问该 Linux 主机的计算机连接到容器中的\
  \ SQL Server。此端口必须在防火墙中开放。\n\n现在，从 `sqlcmd` 提示符下，运行以下 T-SQL 语句：\n\n```\nSELECT @@version\n\
  GO\n```\n\n您的结果应如下所示，显示 SQL Server *认为* 自己运行在 Ubuntu 上，但主机实际上是 RHEL：\n\n```\nMicrosoft\
  \ SQL Server 2017 (RTM-CU9-GDR) (KB4293805) - 14.0.3035.2 (X64)\nJul  6 2018 18:24:36\n\
  Copyright (C) 2017 Microsoft Corporation\nDeveloper Edition (64-bit) on Linux (Ubuntu\
  \ 16.04.5 LTS)\n```\n\n输入 `exit` 可以离开 `sqlcmd`。\n\n您可以使用以下 bash shell 命令停止容器：\n\n\
  ```\nsudo docker stop sql1\n```\n\n要查看所有容器，包括未运行的，可以使用以下 bash shell 命令：\n\n```\n\
  sudo docker ps -a\n```\n\n您的结果应类似于以下内容：\n\n```\nCONTAINER ID        IMAGE      \
  \                               COMMAND\nCREATED             STATUS            \
  \          PORTS          NAMES\n66e7e043e416        microsoft/mssql-server-linux:2017-latest\
  \   \"/opt/mssql/bin/sqls...\"   About an hour ago   Exited (0) 2 minutes ago  \
  \ sql1\n```\n\nDocker 容器包含了在运行容器时创建或修改的任何文件或数据。您可以启动和停止容器，您创建的数据将在容器的生命周期内持久保存。但是，如果移除容器，容器中的所有数据都将丢失。不过有一种方法可以持久化容器中的数据，即使容器被移除，数据也能保存。让我们看一个可能对更新\
  \ SQL Server 以最小化停机时间有用的示例。\n\n在继续之前，请使用以下 bash shell 命令移除之前的容器和镜像：\n\n```\nsudo\
  \ docker rm sql1\nsudo docker rmi microsoft/mssql-server-linux:2017-latest\n```\n\
  \n###### 使用容器更新 SQL Server\n\n要在 RHEL 上将 SQL Server 更新到新的累积更新，通常需要运行类似 `sudo yum\
  \ update mssql-server` 的命令。此命令将下载最新的累积更新，关闭 SQL Server，应用新的二进制文件，然后启动 SQL Server。如果更新顺利进行，应该不会花费太多时间，但容器提供了不同的方法。让我用一个例子向您展示如何操作。在本节中，我将使用\
  \ WideWorldImporters 示例数据库，因此在我的新 Azure VM 上，我首先从 bash shell 运行此命令来下载此示例备份：\n\n\
  ```\nwget https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak\n\
  ```\n\n第一步是运行一个基于 SQL Server 2017 for Linux CU8 的容器（这将下载镜像），使用以下 bash shell 命令（如示例脚本\
  \ `dockerruncu8.sh` 中所示），但与上一节相比略有不同：\n\n```\nsudo docker run -e 'ACCEPT_EULA=Y'\
  \ -e 'MSSQL_SA_PASSWORD=Sql2017isfast' -p 1401:1433 -v sqlvolume:/var/opt/mssql\
  \ --name sql1 -d microsoft/mssql-server-linux:2017-CU8\n```\n\n我运行此 Docker 容器的方式与上一节相比有三个不同之处：\n\
  \n1.  我使用了 `-v` 参数将 Linux 主机上的一个卷映射到容器内的 `/var/opt/mssql` 目录。这意味着在容器内 `/var/opt/mssql`\
  \ 中存储的任何数据都将在 Linux 服务器上持久保存。\n\n**提示**：运行以下命令可以找出此数据在 Linux 主机服务器上存储的实际目录：\n\n\
  ```\nsudo docker inspect volume sqlvolume\n```\n\n\n# 第 11 章 SQL Server 与容器\n\n\
  2.  我为 SQL Server 使用了一个不同的镜像：在本例中是 SQL Server 2017 CU8（在我撰写本章节时，这`并非`SQL Server\
  \ 的最新更新）。\n\n3.  我使用端口 1401 而非 1500 来连接到这个 SQL Server。\n\n现在，让我们在新的容器中恢复`WideWorldImporters`备份。第一步是将备份文件从\
  \ Linux 服务器主机上的主目录*复制到容器中*。我将通过`bash` shell 运行以下命令来完成此操作（该命令同样可在示例脚本`dockercopy.sh`中找到）：\n\
  \n```\nsudo docker cp WideWorldImporters-Full.bak sql1:/var/opt/mssql\n```\n\n为了恢复数据库，我将使用`docker\
  \ exec`命令在容器内执行`sqlcmd`并传入一条 T-SQL 语句。在`bash` shell 中运行以下命令（可在示例脚本`docker_restorewwi.sh`中找到）：\n\
  \n```\nsudo docker exec -it sql1 /opt/mssql-tools/bin/sqlcmd  -S localhost -U SA\
  \ -P 'Sql2017isfast' -Q 'RESTORE DATABASE WideWorldImporters FROM DISK = \"/var/opt/mssql/WideWorldImporters-Full.bak\"\
  \ WITH MOVE \"WWI_Primary\" TO \"/var/opt/mssql/data/WideWorldImporters.mdf\", MOVE\
  \ \"WWI_UserData\" TO \"/var/opt/mssql/data/WideWorldImporters_userdata.ndf\", MOVE\
  \ \"WWI_Log\" TO \"/var/opt/mssql/data/WideWorldImporters.ldf\", MOVE \"WWI_InMemory_Data_1\"\
  \ TO \"/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1\"'\n```\n\n现在，让我们运行一个查询，以确保我们能访问该数据库中的数据。这次我将从\
  \ Linux 主机使用`sqlcmd`（我向你展示了访问容器中 SQL Server 的两种方式）。在`bash` shell 中使用以下命令（可在示例脚本`dockerquery.sh`中找到）：\n\
  \n```\nsqlcmd -Usa -Slocalhost,1401 -Q'USE WideWorldImporters;SELECT * FROM [Application].[People];'\n\
  ```\n\n如果一切顺利，你的屏幕上应该会滚动显示来自`People`表的行。\n\n现在，假设你想将 SQL Server 更新到最新的累积更新。对于容器而言，你不需要使用像`apt-get`这样的工具，但这没关系，因为正如本章前面所说，有更好的方法来更新\
  \ SQL Server。\n\n让我们运行一个新的名为`sql2`的 Docker 容器，但这次使用最新的累积更新。我还希望将这个容器指向同一个`sqlvolume`，以访问所有随`sql1`容器保存的数据库。为了最大限度地减少停机时间，我将手动拉取最新的\
  \ SQL Server 镜像，而不是在使用`docker run`时自动拉取。在`bash` shell 中运行以下命令：\n\n```\nsudo docker\
  \ pull microsoft/mssql-server-linux:2017-latest\n```\n\n现在，用以下命令（在`bash` shell 中）停止`sql1`容器：\n\
  \n```\nsudo docker stop sql1\n```\n\n这将执行 SQL Server 的干净关闭。现在，让我们启动一个名为`sql2`的新容器，使用与之前完全相同的参数，包括相同的端口映射和卷名。在`bash`\
  \ shell 中运行以下命令（可在示例脚本`dockerrunlatest.sh`中找到）：\n\n```\nsudo docker run -e 'ACCEPT_EULA=Y'\
  \ -e 'MSSQL_SA_PASSWORD=Sql2017isfast' -p 1401:1433 -v sqlvolume:/var/opt/mssql\
  \ --name sql2 -d microsoft/mssql-server-linux:2017-latest\n```\n\n由于我使用了与`sql1`容器相同的端口号，我现在可以运行与之前完全相同的命令来查询`WideWorldImporters`数据库（该命令可在`dockerquery.sh`中找到）：\n\
  \n```\nsqlcmd -Usa -Slocalhost,1401 -Q'USE WideWorldImporters;SELECT * FROM [Application].[People];'\n\
  ```\n\n这非常酷。我成功地`切换`到了一个运行最新累积更新的容器，最大限度地减少了停机时间，而不是对现有的 SQL Server 进行打补丁。\n\n现在，你将会真正喜欢这一点。由于我没有删除`sql1`容器，如果我遇到最新的\
  \ CU 版本与我的应用程序存在问题，我可以简单地停止`sql2`容器并启动`sql1`容器。瞬间！我就回到了之前的 CU 版本运行。\n\n这是一个很好的场景，展示了即使容器被移除，如何对\
  \ SQL Server 进行更新以及保持数据库持久性。在下一节中，我将向你展示如何构建你的\n\n\n\n# 第 11 章 SQL Server 与容器\n\n\
  ## 使用 Dockerfile 构建自定义容器\n\n到目前为止，我展示的是如何与 Docker Hub 站点上的 SQL Server 镜像的 Docker\
  \ 容器进行交互并添加数据。带有 SQL Server 的 Docker 容器还能帮助你应对另一个有趣的场景。假设你有多个开发人员正在开发一个使用 SQL Server\
  \ 的应用程序。你通常会设置一个开发服务器，让开发人员访问该服务器。这种配置的一个问题在于，如何为所有开发人员设置一个环境，使他们能使用一致的数据库和一致版本的\
  \ SQL Server。\n\n容器为这一场景带来了一种新策略。你可以基于 SQL Server 镜像构建一个 Docker 镜像，并在该镜像中包含你希望所有开发人员使用的标准数据库的备份。然后，任何开发人员都可以拉取该\
  \ Docker 镜像并运行一个容器（就像拥有自己的沙盒一样）。此外，Docker 镜像的一个强大特性是可重用性。你可以通过基于其他镜像创建新镜像来*分层*构建镜像。\n\
  \n让我们按照[microsoft/sqllinuxlabs/tree/master/containers](https://github.com/Microsoft/sqllinuxlabs/tree/master/containers)自定进度实验中的确切步骤来演示一个例子。（我假设你已经运行了本章前面的命令来克隆实验所需的\
  \ GitHub 仓库。）\n\n1.  在 Linux 服务器上，通过在 bash shell 中运行以下命令，切换到`mssql-custom-image-example`文件夹：\n\
  \    ```\n    cd sqllinuxlabs/containers/mssql-custom-image-example\n    ```\n\n\
  2.  通过在 bash shell 中键入以下命令，创建一个包含以下内容的`Dockerfile`（我在本书的示例中提供了`Dockerfile`文件供你比较）（注意：运行`cat`命令时，你会看到一个`>`提示符，用于输入剩余内容）：\n\
  \    ```\n    cat <<EOF>> Dockerfile\n    > FROM microsoft/mssql-server-linux:latest\n\
  \    > COPY ./SampleDB.bak /var/opt/mssql/data/SampleDB.bak\n    > CMD [\"/opt/mssql/bin/sqlservr\"\
  ]\n    > EOF\n    ```\n    当你使用`docker build`命令构建 Docker 镜像时，Docker 默认会查找一个名为`Dockerfile`的文件。让我们解析一下文件中这些命令的含义：\n\
  \n    *   **`FROM microsoft/mssql-server-linux:latest`**：此命令表示拉取最新的 SQL Server Docker\
  \ 镜像作为基础镜像（基于 Ubuntu 基础镜像），用于创建我们的新镜像。如果你希望所有开发人员都在已知的构建版本上测试和开发，你可以选择一个特定的累计更新包（CU），我在上一节中已经展示了如何拉取。请注意，对于\
  \ SQL Server 2017，`microsoft/mssql-server-linux:latest`和`Microsoft/mssql-server-linux:2017-latest`是相同的，但我们为每个名称生成了两个不同的镜像。\n\
  \n    *   **`COPY ./SampleDB.bak /var/opt/mssql/data/SampleDB.bak`**：此命令表示将当前目录中的`SampleDB.bak`文件复制到\
  \ Docker 容器镜像中。\n\n    *   **`CMD [“/opt/mssql/bin/sqlservr”]`**：此命令表示从`/opt/mssql/bin`目录运行`sqlservr`程序。这就是\
  \ SQL Server 在容器中的运行方式。\n\n3.  现在，在 bash shell 中运行以下命令来构建新的 Docker 镜像：\n    ```\n\
  \    sudo docker build . -t mssql-with-backup-example\n    ```\n    `.`是`docker\
  \ build`命令的 PATH 参数，这里指的是当前目录中的所有文件。`-t`参数用于给新镜像*打标签*，名称为`mssql-with-backup-example`。当你从该镜像运行容器时，可以引用此标签名称。\n\
