  \n现在我的设置已经按偏好保存好了，让我向你展示 SQL Operations Studio 的一些基本功能。关于该工具的完整演练，我强烈推荐这篇优秀的社区博客文章：[`www.mssqltips.com/sqlservertip/5339/new-sql-operations-studio-installation-and-overview`](https://www.mssqltips.com/sqlservertip/5339/new-sql-operations-studio-installation-and-overview)\n\
  \n##### 对象资源管理器\n\nSSMS 用户熟悉一个称为`Object Explorer`的概念。`Object Explorer`是与 SQL Server\
  \ 关联的对象的可视化文件夹视图。你可以像浏览典型文件夹一样遍历此视图，通过展开或折叠包含数据库在内的对象的树状视图。图 5-18 显示了我安装环境中的一个例子，其中我展开了资源管理器树中的各种对象。\n\
  \n![](img/index-189_1.jpg)\n\n\n\n## 第五章 SQL Server 工具\n\n![图 5-18. SQL Operations\
  \ Studio 中的对象资源管理器](img/index-190_1.jpg)\n\nSQL Operations Studio 默认不具备 Windows\
  \ 用户在 SSMS 中所见的完整 `Object Explorer`（对象资源管理器）功能，但我预计该功能会随着时间推移而不断增强。\n\n除了能够浏览在 SQL\
  \ Server 实例或数据库中创建的对象外，您还可以右键单击某些对象以使用附加功能。例如，您可以右键单击一个 `Server`（服务器）或 `Database`（数据库）来编写新的\
  \ `T-SQL` 查询，或选择 `Manage`（管理）来查看仪表板。您可以右键单击一个 `Table`（表），在网格视图中查看或编辑数据。图 5-19 显示了一个网格，您可以在其中直接编辑示例中第\
  \ 3 章创建的 `Application.[People]` 表的数据。\n\n![图 5-19. 在 SQL Operations Studio 的网格视图中编辑表数据](img/index-190_1.jpg)\n\
  \n### 仪表板、见解与扩展\n\n默认情况下，SQL Operations Studio 有两个仪表板：`Server`（服务器）和 `Database`（数据库）。这些仪表板由名为\
  \ `widgets`（部件）的对象填充。当您连接到 SQL Server 时，默认会显示 `Server` 仪表板，其中包含 SQL Server 的信息、常用任务的部件、查找数据库的部件以及关于数据库备份的部件。在图\
  \ 5-20 中，您可以看到我的 SQL Server 运行在 Red Hat Enterprise Linux 上的 SQL Server 企业版（基于核心许可）。图\
  \ 5-20 中显示的部件用于任务、数据库列表和数据库备份信息。\n\n![图 5-20. SQL Operations Studio 中的服务器仪表板和部件](img/index-191_1.jpg)\n\
  \n您可以随时通过右键单击服务器名称并选择 `Manage`（管理）来查看 `Server` 仪表板。\n\n您可以通过在 `Object Explorer`（对象资源管理器）树中右键单击某个数据库，或在\
  \ `Server` 仪表板的数据库列表上右键单击，然后选择 `Manage`（管理），来查看关于该数据库的类似仪表板。\n\n图 5-21 显示了我在第 3\
  \ 章创建的示例数据库 `WideWorldImporters` 的仪表板。\n\n![图 5-21. WideWorldImporters 示例数据库的数据库仪表板](img/index-192_1.jpg)\n\
  \n我在图中用红色标出了仪表板的上下文。当您选择一个数据库仪表板时，它是堆叠式的，因此您可以选择服务器名称并返回到 `Server` 仪表板。数据库仪表板显示有关数据库的基本信息，并显示一个任务和表列表部件。我将在本书后面的章节中更详细地描述如何使用\
  \ SQL Operations Studio 来备份和还原数据库。\n\nSQL Operations Studio 的一个强大之处在于能够自定义其功能。您可以创建其他部件以显示在服务器或数据库仪表板上。您可以在我们的文档中了解更多关于如何自定义新部件的信息：`https://docs.microsoft.com/sql/sql-operations-studio/tutorial-build-custom-insight-sql-server`。我们提供了两个内置部件，您可以将它们添加到数据库仪表板中，以获取性能和表使用情况信息。\n\
  \n图 5-22 显示了启用这些部件后，`WideWorldImporters` 示例数据库的数据库仪表板。\n\n![图 5-22. SQL Operations\
  \ Studio 中数据库仪表板内的性能和表空间使用情况部件](img/index-193_1.jpg)\n\n您可以在我们的文档中学习如何启用这些内置部件：`https://docs.microsoft.com/sql/sql-operations-studio/insight-widgets`。\n\
  \n自定义 SQL Operations Studio 的另一种方式是通过……\n\n\n\n## 扩展\n\n可以将扩展视为在定制服务器和数据库仪表板之外添加您自己仪表板的方法。扩展是类似于\
  \ `Visual Studio Code` 中扩展概念的**附加组件**。\n\n扩展由社区或微软构建，可以通过在 `SQL Operations Studio`\
  \ 最左侧窗格中选择 `Extensions` 图标来安装（或查看已安装的内容）。随着时间的推移，我预计扩展列表会变得像 `Visual Studio Code`\
  \ 中的市场一样丰富。\n\n根据您使用的 `SQL Operations Studio` 版本，您可能已经随工具安装了一些扩展。在我的安装中，我有用于 `SQL\
  \ Agent`、`Server Reports` 和 `sp_whoisactive`（`SQL Server` 社区中极其流行的 `T-SQL` 存储过程）的扩展。您可以在用于显示\
  \ `Server` 仪表板的 `Home` 选项旁边找到这些扩展。您可以在我们的文档中找到关于扩展以及如何创建您自己的扩展的更多信息：[`docs.microsoft.com/sql/sql-operations-studio/extensions`](https://docs.microsoft.com/sql/sql-operations-studio/extensions)。\n\
  \n![](img/index-194_1.jpg)\n\n## 第 5 章   SQL Server 工具\n\n##### T-SQL 查询编辑器\n\n\
  您使用 `SQL Operations Studio` 最常见的任务可能就是执行 `T-SQL` 查询。`SQL Operations Studio` 提供了一个功能丰富的\
  \ `T-SQL` 查询编辑器，其功能类似于 `Visual Studio Code` 的 `mssql` 扩展。而创建和执行查询最快捷的方法是右键单击服务器或数据库名称，然后选择\
  \ `New Query` 选项。\n\n由于 `SQL Operations Studio` 与 `Visual Studio Code` 的 `mssql`\
  \ 扩展一样，使用了 `SQL Tools Service`，因此它提供了智能感知和辅助执行 `T-SQL` 查询的功能。我在第 3 章关于 `Visual Studio\
  \ code` 中未谈到的一个功能是称为 `T-SQL` 代码片段的概念。`T-SQL` 代码片段为使用 `T-SQL` 执行常见任务提供了模板，以帮助完成 `T-SQL`\
  \ 语法。\n\n要使用 `T-SQL` 代码片段，请使用 `New Query` 选项或键盘快捷键 `Ctrl+N` 调出 `Query Editor`。然后输入单词\
  \ `sql`，您将看到一个常见 `T-SQL` 任务（如创建表）的列表。图 5-23 显示了选择 `sqlCreateTable` 后用于创建新表的 `T-SQL`\
  \ 代码片段。\n\n**图 5-23.** 在 `SQL Operations Studio` 中使用 `T-SQL` 代码片段\n\n![](img/index-195_1.jpg)\n\
  \n## 第 5 章   SQL Server 工具\n\n`T-SQL` 编辑器中另一个优秀的功能是称为 *速查定义* 的概念。\n\n考虑一下这个场景。您正在使用\
  \ `T-SQL` 编辑器执行一个 `INSERT` 语句，将一行数据插入到 `WideWorldImporters` 数据库的 `[Application].[People]`\
  \ 表中。问题是您不记得所有的列名，因此不确定该列出哪些列名或需要多少个值。*速查定义* 允许您在完成 `INSERT` 语句的同时查看表定义。\n\n要使用\
  \ *速查定义*，请在 `T-SQL 查询编辑器` 中高亮显示表名，右键单击并选择 *速查定义*。图 5-24 显示了使用 *速查定义* 来完成 `INSERT`\
  \ 语句的界面。\n\n**图 5-24.** 在 `SQL Operations Studio` 的 `T-SQL` 编辑器中使用 *速查定义*\n\n#####\
  \ 其他功能\n\n`SQL Operations Studio` 为数据专业人员提供了其他功能。这包括类似于 `Visual Studio Code` 的 `集成终端`、`源代码控制`\
  \ 功能，以及用于记录 `备份` 和 `还原` 等操作历史的 `任务历史`。\n\n像任何有用的工具一样，`SQL Operations Studio` 几乎为每次交互都提供了键盘快捷键，并允许您自定义键盘快捷键。要了解有关\
  \ `SQL Operations Studio` 键盘快捷键的更多信息，请参阅文档：[`docs.microsoft.com/sql/sql-operations-studio/keyboard-shortcuts`](https://docs.microsoft.com/sql/sql-operations-studio/keyboard-shortcuts)。\n\
  \n\n# 第五章 SQL Server 工具\n\n在我撰写本书此章节时，SQL Operations Studio 仍处于预览阶段。考虑到该工具的可扩展性以及社区为其贡献的开放源码能力，我预计随着每月新的主要版本发布，它将在功能和性能上持续快速成长。\n\
  \n#### SQL Server Management Studio\n\n自 2005 年以来，世界上最流行的与 SQL Server 交互的工具是 SQL\
  \ Server Management Studio (SSMS)。在 2005 年之前，SQL Server 提供了一个名为 SQL Enterprise Manager\
  \ 的图形界面工具。SSMS 是一个令人兴奋的新工具，它基于 Visual Studio 的外壳，拥有丰富的能力。自 2005 年起，随着 SQL Server\
  \ 的每次发布，SSMS 都得到了增强，包含了广泛的功能和特性。\n\n从历史上看，SSMS 的问题之一是它总是与 SQL Server 主要版本的安装和发布捆绑在一起。这种方法阻碍了我们频繁对工具进行重大增强的能力。从\
  \ SQL Server 2016 开始，我们决定将 SSMS 与 SQL Server 解耦。我们也特意努力清理了积压的错误、问题和建议。我们于 2016 年\
  \ 6 月通过单独的 SSMS 下载开始了这一旅程，如今 SSMS 17 每月都会进行更新和增强。您始终可以在 [`docs.microsoft.com/sql/ssms/download-sql-server-management-studio-ssms`](https://docs.microsoft.com/sql/ssms/download-sql-server-management-studio-ssms)\
  \ 找到最新版本的 SSMS 进行下载。\n\n对于在 Linux 上使用 SQL Server 的用户来说，SSMS 作为工具的最大缺点是它只能安装在运行 Windows\
  \ 操作系统的计算机上。但对于 Windows 用户而言，它是一个功能强大的工具，具备丰富的能力。SSMS 最大的优势在于，连接到 Linux 上的 SQL Server\
  \ 时，所使用的提供程序和库与 Windows 上使用的相同，因此连接到 Linux 上的 SQL Server 与在 Windows 上连接感觉一样。这是一个很棒的兼容性案例。\n\
  \nSSMS 包含对象资源管理器、丰富的 T-SQL 编辑器、T-SQL 调试器、用于完成特定任务的向导，以及针对各种 SQL Server 和数据库功能的报告。多年来，关于\
  \ SSMS 的文档、培训和信息已经非常多。本章中的一个章节永远无法全面介绍。我将介绍一些您可以用来通过 SSMS 与 Linux 上的 SQL Server\
  \ 交互的主要功能，然后提供更详细涵盖该主题的其他资源。\n\n![](img/index-197_1.jpg)\n\n图 5-25 展示了 SSMS 的默认界面，其中包含对象资源管理器和一个新建查询编辑器窗口。\n\
  \n*图 5-25. SSMS 的默认界面*\n\n##### 对象资源管理器\n\n与 SQL Operations Studio 类似，SSMS 提供了一个可视化界面来导航\
  \ SQL Server 的对象。SSMS 在对象资源管理器中提供了比 SQL Operations Studio 更多的选项，不仅包括对象，还包括 SQL Server\
  \ 的功能，例如 Always On 可用性组和管理功能。此外，在对象资源管理器中右键单击对象和功能时，可用的选项也比在 SQL Operations Studio\
  \ 中更多。\n\n![](img/index-198_1.jpg)\n\n例如，图 5-26 展示了创建 T-SQL 脚本以删除和创建 WideWorldImporters\
  \ 示例数据库的选项。\n\n*图 5-26. 使用 SSMS 创建脚本以删除并重新创建现有数据库*\n\nSSMS 通过对象资源管理器提供的另一个功能是能够创建新对象，如数据库、表、索引和其他对象。如果右键单击对象资源管理器中的“数据库”文件夹，您将有选项可以创建或还原新数据库。图\
  \ 5-27 显示了当您右键单击“数据库”文件夹并选择“新建数据库”时将出现的新窗口。\n\n![](img/index-199_1.jpg)\n\n\n***图\
  \ 5-27.** 在 SSMS 中创建新数据库*\n\n通过右键单击 SSMS 中的其他文件夹、对象或功能，可以访问其他功能。\n\n使用右键菜单时，最强大的选项之一是数据库的“任务”。图\
  \ 5-28 展示了你可以使用 SSMS 对数据库执行的所有任务类型。选择其中任何一个选项都会打开一个新窗口或*向导*，引导你完成其中一项任务。在第九章中，我将结合使用\
  \ SSMS 或一组 T-SQL 命令来执行等效功能，描述其中一些任务。\n\n![](img/index-200_1.jpg)\n\n## ***图 5-28.**\
  \ SSMS 中数据库可用的任务*\n\n### **T-SQL 查询编辑器**\n\n与 SQL Operations Studio 类似，SSMS 提供了一个丰富的编辑器来创建和设计\
  \ T-SQL 查询。其功能包括标识符颜色编码、智能感知以及用于辅助常见 T-SQL 任务的 T-SQL 代码片段。SSMS 还允许你打开脚本文件来执行 T-SQL\
  \ 批处理，并将结果保存到网格视图、文本格式或文件中。你还可以将 T-SQL `SELECT` 语句的结果保存到文本文件或 CSV（逗号分隔）文件中。\n\n\
  ![](img/index-201_1.jpg)\n\n图 5-29 展示了针对默认网格视图结果中 `[Application].[People]` 表执行 `SELECT`\
  \ 语句的默认结果。\n\n***图 5-29.** 在 SSMS 的 T-SQL 编辑器中以网格视图显示的查询结果*\n\n请注意，SSMS 屏幕底部的黄色状态栏会显示上下文信息，例如服务器名称、连接的用户登录名、数据库上下文、上次执行查询的总持续时间和总行数。\n\
  \n### **报表**\n\nSSMS 安装时附带了一系列报表，用于查看 SQL Server 实例的性能、磁盘使用情况、活动和配置。此外，还提供了数据库的报表，可以查看按对象、索引的统计信息和空间使用情况，以及特定于数据库的各种统计信息和性能。\n\
  \n要执行报表，请右键单击服务器或数据库，然后选择 `报表/标准报表` 选项。\n\n![](img/index-202_1.jpg)\n\n图 5-30 显示了自\
  \ Linux 上的 SQL Server 实例启动以来，所有在服务器上运行的批处理的内置性能报表。\n\n***图 5-30.** SSMS 中的标准性能批处理报表*\n\
  \n报表可以是深入了解 SQL Server 和数据库的极其强大的功能。虽然 SSMS 提供了内置报表，但你也可以创建自己的自定义报表并将其集成到 SSMS 中。你可以在我们的文档\
  \ `https://docs.microsoft.com/sql/ssms/object/custom-reports-in-management-studio`\
  \ 中阅读有关如何构建自定义报表的更多信息。\n\n### **引擎内置工具**\n\nSQL Server 的一个惊人之处在于核心数据库引擎中内置了许多*工具*。我称这些为“工具”，因为它们是通用功能，对于管理、监控和排查\
  \ SQL Server 各种场景的诸多方面都很有帮助。并且，由于 Linux 上的 SQL Server 与 Windows 上的核心数据库引擎相同，这些丰富的功能大多在\
  \ Linux 上也可用。\n\n遵循一致性主题，我将在本节介绍的大多数工具都可以通过 T-SQL 语言使用。T-SQL 的开放性提供了一种自然的方式来暴露 SQL\
  \ Server 引擎的丰富工具功能。\n\n#### **系统表和目录视图**\n\n在每个数据库内部，有一系列系统表，用于存储关于数据库以及其他对象（如表、列、索引和用户等）的元数据。从\
  \ SQL Server 2005 开始，我们决定改变用户（即使是系统管理员）直接访问系统表的方式，以避免用户修改\n\n\n\n# SQL Server 中的系统对象与工具\n\
  \n## 系统表与目录视图\n\n这些表的结构和设计可能在任何版本中发生变更。\n\n由于每个用户数据库都基于模型数据库，因此每个用户数据库都具有相同的系统表集合。`master`\
  \ 数据库则拥有额外的系统表，用于存储关于 SQL Server 实例的信息。\n\n由于用户仍然需要访问系统表中包含的元数据，我们构建了一系列称为 **目录视图**\
  \ 的视图，这些视图将用户与系统表的具体细节抽象开来。目录视图可以从任何数据库上下文中使用 `sys` 架构进行访问。目录视图的定义存储在隐藏的 “Resource”\
  \ 数据库中。\n\n> **注意**：在第 9 章中，我将提供一些关于访问系统表的高级技巧，但在正常情况下应该不需要用到。\n\nSQL Server 的许多功能需要将元数据存储在系统表中。截至\
  \ SQL Server 2017，大约有 300 个目录视图，跨越 30 多个类别。您可以在我们的文档中按类别查看完整的目录视图列表：[`docs.microsoft.com/sql/relational-databases/system-catalog-views/catalog-views-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-catalog-views/catalog-views-transact-sql)。我们的文档还包含一个关于常见目录视图场景的详细\
  \ FAQ：[`docs.microsoft.com/sql/relational-databases/system-catalog-views/querying-the-sql-server-system-catalog-faq`](https://docs.microsoft.com/sql/relational-databases/system-catalog-views/querying-the-sql-server-system-catalog-faq)。\n\
  \n我认为您最可能想要深入了解的常见类别包括：\n\n- **对象目录视图**：关于表、列、索引以及数据库中存储的其他对象的视图。\n- **数据库和文件目录视图**：关于数据库和文件的视图（我已在几个示例中使用了\
  \ `sys.databases` 目录视图）。\n- **安全目录视图**：关于登录、角色和用户的视图。\n\n## SQL Server 工具\n\n甚至有一个目录视图可以查找所有目录视图的列表！从任何您喜欢的工具，在任意数据库上下文中执行以下\
  \ T-SQL 命令以获取所有系统对象的列表：\n\n```sql\nSELECT name, type_desc FROM sys.system_objects\n\
  ORDER BY name\nGO\n```\n\n> **提示**：避免构建依赖于从目录视图中 `SELECT *`（所有列）的生产应用程序或脚本，因为我们可能会在未来的\
  \ SQL Server 版本中向目录视图定义中添加列。\n\n此查询结果中，`type_desc = 'VIEW'` 的大多数都是目录视图。我稍后将讨论另一种称为\
  \ **动态管理视图** 的特殊视图。\n\n尽管目录视图存储在隐藏的 Resource 数据库中，但您可以使用目录视图 `sys.system_sql_modules`\
  \ 查看这些视图的 T-SQL 代码。以下 T-SQL 命令可用于查找目录视图 `sys.databases` 的 T-SQL 视图定义：\n\n```sql\n\
  SELECT * FROM sys.system_sql_modules\nWHERE object_id = object_id('sys.databases')\n\
  GO\n```\n\n为了符合 ISO 标准，SQL Server 还提供了一系列称为 **系统信息模式视图** 的目录视图。这些视图很容易识别，因为它们属于一个名为\
  \ `INFORMATION_SCHEMA` 的特殊架构。您可以在我们的文档中获取这些视图的完整列表：[`docs.microsoft.com/sql/relational-databases/system-information-schema-views/system-information-schema-views-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-information-schema-views/system-information-schema-views-transact-sql)。\n\
  \n并非所有用户都能看到系统目录视图中的所有内容。目录视图的权限策略有些复杂。您可以在我们的文档中阅读更多关于这些权限的信息：[`docs.microsoft.com/sql/relational-databases/security/metadata-visibility-configuration`](https://docs.microsoft.com/sql/relational-databases/security/metadata-visibility-configuration)。\n\
  \n##### 系统存储过程\n\nSQL Server 安装时附带了一系列称为系统存储过程的存储过程。与目录视图类似，这些过程的定义和文本也存储在隐藏的 Resource\
  \ 数据库中。\n\n许多系统存储过程用于管理和配置 SQL Server 的特性和方面。我在第 2 章向您介绍了其中一个名为 `sp_configure` 的系统过程，用于配置\
  \ SQL Server 实例设置。\n\n虽然大多数系统存储过程会进行更改，但有一系列通用的系统存储过程提供信息（在某些情况下使用目录视图）。这些过程有一个已知的名称格式，以单词\
  \ `sp_help` 开头。例如，此 T-SQL 命令返回类似于目录视图 `sys.objects` 的信息：\n\n```sql\nEXEC sp_help\n\
  GO\n```\n\n按类别组织的系统存储过程完整列表可以在我们的文档中找到：[`docs.microsoft.com/sql/relational-databases/system-stored-procedures/system-stored-procedures-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-stored-procedures/system-stored-procedures-transact-sql)。\n\
  \n系统存储过程的权限因过程而异。请查阅每个过程的文档以了解所需的权限。\n\n##### 动态管理视图\n\n从我 1993 年开始使用 SQL Server\
  \ 起，就有两个 **虚拟表** 提供有关 SQL Server 内部执行的信息，这些信息基于引擎中的内部数据结构：`sysprocesses` 和 `syslocks`（以及引用它们的存储过程\
  \ `sp_who` 和 `sp_lock`）。这些视图将连接、查询和锁的内部数据结构以行和列的形式呈现出来。\n\n多年来，这是唯一能够基于内存结构提供 SQL\
  \ Server 引擎执行洞察的视图。由于我在技术支持领域工作的这些年，如果我想了解引擎内其他内存结构的情况，我必须捕获 `SQLSERVR.EXE` 进程的用户转储文件，并使用\
  \ Windows 调试器手动检查结构列表。虽然这迫使我深入了解 SQL Server 引擎，但这并非解决问题的有效方式。\n\n后来，SQL Server 团队来了一位名叫\
  \ Slava Oks 的人（你能看出这里有个趋势吗）。Slava 与一组工程师合作构建了 SQLOS 平台，这仍然是核心引擎架构的一部分。Slava 是调试专家，但他有一个目标：看看在不使用调试器的情况下，他能用\
  \ SQLOS 解决多少问题。根据 Slava 的想法，如果您能连接到 SQL Server，您就可以使用 T-SQL 来“实时调试” SQL Server 引擎的细节。\n\
  \n###### 视图\n\nSlava 和他的团队采纳了虚拟表的概念，并将其扩展为一系列视图，这些视图暴露了来自 SQLOS 结构的信息，例如任务、线程、工作线程和内存。这项工作促使引擎团队内的其他小组开始暴露关于其他结构的信息。\n\
  \n在 SQL Server 2005 中，我们将所有这些视图收集到一个称为动态管理视图的新特性中。\n\n\n\n# 第 5 章 SQL Server 工具\n\
  \n## 管理视图（DMV）与动态管理函数（DMF）\n\n您可以像查询任何用户视图或目录视图一样查询 DMV，也可以像使用任何 T-SQL 函数一样使用 DMF。（注：DMF\
  \ 与函数一样，需要参数）\n\n**提示**：当涉及 DMV 和 DMF 时，智能感知是您的好帮手。输入`sys.dm_`会列出 SQL Server 支持的所有\
  \ DMV 和 DMF 的完整列表。\n\n这些自 SQL Server 2005 起就存在的视图，仍然提供着 DMV 的核心功能，例如`sys.dm_exec_requests`、`sys.dm_os_tasks`和`sys.dm_wait_stats`。在\
  \ Linux 和 Windows 上的 SQL Server 2017 中，目前大约有 240 个 DMV 和 DMF，涵盖了 SQL Server 引擎的各个方面。\n\
  \nDMV 和 DMF 证明了 T-SQL 的开放特性，以及将数据作为表公开以深入了解任何数据这一概念的强大——无论是来自用户表、系统表的数据，还是支持数据库引擎的结构列表。\n\
  \nDMV 和 DMF 的完整列表可按类别在我们的文档中找到：[`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/system-dynamic-management-views`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/system-dynamic-management-views)。DMV\
  \ 和 DMF 需要`VIEW SERVER STATE`权限，该权限可由`sysadmin`登录账户授予。\n\n这些 DMV 和 DMF 中有许多是相互关联的，可以连接在一起使用。多年来，SQL\
  \ Server 社区已在各种博客和培训中发布了针对不同场景的示例。DMV 最流行的用途之一来自社区开发的存储过程`sp_whoisactive`，由 SQL\
  \ 社区领袖 Adam Machanic 编写（现已扩展到 SQL Operations Studio 中）。您可以从[`whoisactive.com`](http://whoisactive.com)获取`sp_whoisactive`的详细信息和下载链接。\n\
  \n以下是我个人认为最重要的十个 DMV 和 DMF，以及每个 DMV/DMF 的示例查询：\n\n### dm_exec_requests\n\n活动查询和后台请求的列表。这可能是当今\
  \ SQL Server 用户最常用的 DMV。\n\n以下查询（见示例文件`dm_exec_requests.sql`）显示了活动的用户查询列表及查询详情，包括`session_id`（唯一标识与\
  \ SQL Server 的连接）、`status`（正在运行还是等待）、`command`（正在运行什么查询）、`wait_type`（如果查询在等待，等待的是什么类型的资源）和`wait_time`（已等待了多长时间）。您还会注意到我将此\
  \ DMV 与`sys.dm_exec_sessions`连接，因此只显示活动的“用户”请求。\n\n```sql\n-- 获取活动用户请求的 session_id、状态（RUNNING\
  \ 或 SUSPENDED）、命令（什么查询）、\n-- 等待类型（如果等待，是什么资源？）以及等待时间（等待了多久）\n--\nSELECT er.[session_id],\
  \ er.[status], er.[command], er.[wait_type],\n       er.[wait_time]\nFROM sys.dm_exec_requests\
  \ er\nINNER JOIN sys.dm_exec_sessions es\n    ON es.[session_id] = er.[session_id]\n\
  \    AND es.[is_user_process] = 1\nGO\n```\n\n此 DMV 包含更多列。请在我们的文档中查看完整选项：[`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-requests-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-requests-transact-sql)。您可以在以下链接找到`sys.dm_exec_sessions`的完整选项列表：[`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-sessions-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-sessions-transact-sql)。\n\
  \n\n\n### 第 5 章：SQL Server 工具\n\n[transact-sql](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-sessions-transact-sql)\
  \ 等待类型描述了 SQL Server 请求可能在资源（如锁、I/O、latch 等）上等待的不同场景。关于等待类型及其对应用程序意义的最全面描述，可以在我的朋友兼\
  \ SQL Server 社区领袖 Paul Randal 运行的这篇社区博客中找到：[`www.sqlskills.com/help/waits/`](https://www.sqlskills.com/help/waits/)。\n\
  \n## `dm_exec_query_stats`\n\n一个基于当前缓存查询的性能统计列表。这是用于查询性能分析的极其受欢迎的 DMV。我喜欢我们文档中的示例，我已在示例脚本\
  \ `dm_exec_query_stats.sql` 中提供了它。此查询旨在显示占用最多 CPU 资源的 Top <N> 个查询：\n\n```sql\n--\
  \ 按 CPU 使用率获取前 5 个查询。显示 query_hash、平均 CPU 时间和 T-SQL 文本\n-- query_hash 是一种唯一标识查询的方式，该查询可能以多种方式执行但具有相似的“模式”\n\
  SELECT TOP 5\n    query_stats.query_hash AS \"Query Hash\",\n    SUM(query_stats.total_worker_time)\
  \ / SUM(query_stats.execution_count) AS \"Avg CPU Time\",\n    MIN(query_stats.statement_text)\
  \ AS \"Statement Text\"\nFROM\n    (SELECT QS.*,\n        SUBSTRING(ST.text,\n \
  \           (QS.statement_start_offset/2) + 1,\n            ((CASE statement_end_offset\n\
  \                WHEN -1 THEN DATALENGTH(ST.text)\n                ELSE QS.statement_end_offset\
  \ END\n                - QS.statement_start_offset)/2) + 1) AS statement_text\n\
  \    FROM sys.dm_exec_query_stats AS QS\n        CROSS APPLY sys.dm_exec_sql_text(QS.sql_handle)\
  \ as ST) as query_stats\nGROUP BY query_stats.query_hash\nORDER BY \"Avg CPU Time\"\
  \ DESC\nGO\n```\n\n此 DMV 以哈希值（唯一标识具有相同“模式”的查询）和句柄的形式存储查询信息。请注意这里使用了 DMF `dm_exec_sql_text`\
  \ 来获取 SQL 查询的文本。\n\n您可以在 [`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-stats-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-stats-transact-sql)\
  \ 找到 `dm_exec_query_stats` 的完整文档。`dm_exec_sql_text` 的文档可以在 [`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-sql-text-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-sql-text-transact-sql)\
  \ 找到。\n\n## `dm_os_waiting_tasks`\n\n一个等待资源的任务（查询和后台任务）列表。此 DMV 仅显示正在等待资源的请求。以下来自示例脚本\
  \ `dm_os_waiting_tasks.sql` 的示例显示了所有等待资源的用户请求（注意：如果没有用户任务在等待资源，此查询将返回 0 行）：\n\n\
  ```sql\n-- 显示所有正在等待资源的用户请求\n--\nSELECT wt.session_id, wt.wait_type, wt.wait_duration_ms\n\
  FROM sys.dm_os_waiting_tasks wt\nINNER JOIN sys.dm_exec_sessions es\n    ON es.session_id\
  \ = wt.session_id\n    AND es.is_user_process = 1\nGO\n```\n\n您可以在 [`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-waiting-tasks-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-waiting-tasks-transact-sql)\
  \ 找到此 DMV 的文档。\n\n\n\n[tasks-transact-sql.](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-waiting-tasks-transact-sql)\n\
  \n## dm_os_wait_stats\n\n这是最常用的动态管理视图之一。此视图记录了自 SQL Server 启动以来（或自上次清除该视图统计信息以来），按类型划分的资源等待统计信息。以下示例取自示例脚本\
  \ `dm_os_wait_stats.sql`，用于显示每个 `wait_type` 的平均等待时长，且仅显示存在等待事件的等待类型。\n\n```sql\n\
  -- 按类型显示等待次数及该类型的平均等待时间，按平均等待时间从高到低排序\n-- 注意，某些等待是“正常的”，因为它们是后台任务的一部分，在执行过程中自然会产生等待\n\
  SELECT wait_type, waiting_tasks_count, (wait_time_ms/waiting_tasks_count) as avg_wait_time_ms\n\
  FROM sys.dm_os_wait_stats\nWHERE waiting_tasks_count > 0\nORDER BY avg_wait_time_ms\
  \ DESC\nGO\n```\n\n![](img/index-210_1.jpg)\n\n## 第 5 章 SQL Server 工具\n\n你可以在以下网址找到\
  \ `sys.dm_os_wait_stats` 的文档：[`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-wait-stats-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-wait-stats-transact-sql)。\n\
  \n## dm_io_virtual_file_stats\n\n此动态管理函数对于深入了解哪些数据库和文件经历了最多的 I/O，以及数据库及其关联文件的平均磁盘延迟类型非常有帮助。在\
  \ SQL Operations Studio 中使用动态管理函数可以展示 T-SQL 智能感知功能的强大之处，它能帮助你为函数提供正确的参数。图 5-31 展示了为此动态管理函数填写参数的示例。\n\
  \n**图 5-31.** SQL Operations Studio 中用于执行动态管理函数的 T-SQL 智能感知功能\n\n以下是示例查询（取自示例脚本\
  \ `dm_io_virtual_file_stats.sql`），用于查看按读取操作平均磁盘延迟从高到低排序的数据库文件：\n\n```sql\n-- 查找读取操作平均磁盘延迟最高的文件及其关联的数据库\n\
  -- 使用 DB_NAME() 系统函数从动态管理函数中的 id 获取数据库名称\n-- 与 sys.master_files 目录视图联接，根据动态管理函数中的\
  \ file_id 获取物理文件名\n![](img/index-211_1.jpg)\n\n## 第 5 章 SQL Server 工具\n\nSELECT\
  \ DB_NAME(ivfs.database_id), mf.physical_name, (ivfs.io_stall_read_ms/ivfs.num_of_reads)\
  \ as avg_io_read_latency_ms, ivfs.num_of_reads\nFROM sys.dm_io_virtual_file_stats(null,null)\
  \ ivfs\nINNER JOIN sys.master_files mf\nON ivfs.database_id = mf.database_id\nAND\
  \ ivfs.file_id = mf.file_id\nWHERE num_of_reads > 0\nORDER by avg_io_read_latency_ms\
  \ DESC\nGO\n```\n\n此动态管理函数仅提供 `database_id` 和 `file_id` 而非名称。我使用 `DB_NAME()` 系统函数来获取数据库名称，并与目录视图\
  \ `sys.master_files` 联接以获取物理文件名。\n\n图 5-32 显示了在我的运行于 Linux 服务器上的 SQL Server 中，执行上述查询后的结果。\n\
  \n**图 5-32.** SQL Server on Linux 上具有最高平均磁盘读取延迟的数据库文件\n\n你可以在以下网址找到此动态管理函数的文档：[`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-io-virtual-file-stats-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-io-virtual-file-stats-transact-sql)。\n\
  \n![](img/index-212_1.jpg)\n\n## 第 5 章 SQL Server 工具\n\n**dm_os_memory_clerks**：内存是...\n\
  \n\n\n\nSQL Server。SQL Server 引擎内建了一套复杂而强大的内存管理系统。其内部的各个组件通过`memory clerk`（内存 clerks）这一概念来消耗内存并记录使用情况。此`DMV`（动态管理视图）将展示整个\
  \ SQL Server 引擎中按 clerk 划分的内存使用情况。以下示例基于脚本`dm_os_memory_clerks.sql`，展示了在任何时间点，哪些内存\
  \ clerks 消耗了最多的内存：\n\n```sql\n-- 找出 SQL Server 中哪些组件正在使用最多内存\n--\nSELECT type, name,\
  \ (pages_kb+virtual_memory_committed_kb+awe_allocated_kb) total_memory_kb\nFROM\
  \ sys.dm_os_memory_clerks\nORDER BY total_memory_kb DESC\nGO\n```\n\n图 5-33 展示了在我的\
  \ Linux 上的 SQL Server 中，此查询在启动后立即执行的结果。\n\n**图 5-33. 启动后立即查看的 SQL Server 内存 clerks**\n\
  \n## 第 5 章 SQL Server 工具\n\n目前没有详细的文档将不同的内存 clerk 类型映射到它们所属的 SQL Server 引擎组件。以下是我认为在典型\
  \ SQL Server 上你会看到消耗内存最多的几种常见 clerk：\n\n`MEMORYCLERK_SQLBUFFERPOOL`：缓冲池数据库页。这通常是最大的内存消耗者。\n\
  \n`CACHESTORE_SQLCP`：用于即席（ad-hoc）SQL Server 查询的计划缓存。\n\n`CACHESTORE_OBJCP`：用于 SQL\
  \ Server 对象（如存储过程）的计划缓存。\n\n`CACHESTORE_COLUMNSTOREOBJECTPOOL`：由列存储索引消耗的内存。\n\n\
  `MEMORYCLERK_XTP`：用于内存优化表（In-Memory OLTP）的内存。\n\n你可以在[sys-dm-os-memory-clerks-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-memory-clerks-transact-sql)找到此`DMV`的完整文档。\n\
  \n`dm_tran_locks`：由活动请求持有的当前锁的列表。当你在 SQL Server 中遇到阻塞问题时，此`DMV`可能很有帮助，可用于发现特定会话、请求和查询持有哪些锁。以下是示例脚本`dm_tran_locks.sql`中的一个查询示例：\n\
  \n```sql\n-- 显示活动会话和查询请求或已授予的锁\n--\nSELECT resource_type, request_mode, request_request_id,\
  \ resource_database_id, resource_associated_entity_id, resource_type, resource_description\n\
  FROM sys.dm_tran_locks\nGO\n```\n\n有关此`DMV`的文档，包括一个关于如何将其用于阻塞场景的很好示例，请参阅[sys-dm-tran-locks-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-tran-locks-transact-sql)。\n\
  \n`dm_db_missing_index_details`：我在第 3 章向你展示了如何为构建键创建约束，这些约束是通过索引实现的。索引也可以帮助提升查询性能。在运行\
  \ SQL Server 查询时，引擎可以识别到某些场景下缺少可用的索引，而该索引可能有助于提升性能。这些建议可通过此`DMV`获取。我将在第 6 章介绍此`DMV`及其他性能工具的用法。以下是示例脚本`dm_db_missing_index_details.sql`中的一个查询示例，用于查找\
  \ SQL Server 中所有推荐的缺失索引。\n\n```sql\n-- 查找所有数据库和对象当前推荐的缺失索引\n--\nSELECT index_handle,\
  \ database_id, object_id, equality_columns, statement\nFROM sys.dm_db_missing_index_details\n\
  GO\n```\n\n此`DMV`在 SQL Server 重启后会被清除。完整文档...\n\n\n\n\n## SQL Server 工具\n\n关于此动态管理视图（DMV）的详细信息，请参阅微软官方文档：[`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-db-missing-index-details-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-db-missing-index-details-transact-sql)。\n\
  \n### dm_os_sys_info\n\n`sys.dm_os_sys_info` 是一个著名的 DMV 示例，它使用 T-SQL 接口以表格形式公开关于*系统*（即操作系统、计算机或\
  \ SQL Server 本身）的信息。此 DMV 始终只返回一行数据。\n\n这个 DMV 中包含了大量有用的信息。我提供了一个示例查询，列出其中几个列，并包含一个计算\
  \ SQL Server 已运行时间的计算。你可以在示例脚本 `dm_os_sys_info.sql` 中找到这个查询。\n\n```sql\n-- Retrieve\
  \ information about the computer, the OS, and SQL Server\n--\nSELECT cpu_count,\
  \ hyperthread_ratio, physical_memory_kb, committed_kb,\n    committed_target_kb,\
  \ max_workers_count, datediff(hour, sqlserver_start_time, getdate()) as sql_up_time_hours,\
  \ affinity_type_desc,\n    virtual_machine_type_desc, softnuma_configuration_desc,\
  \ socket_count, cores_per_socket,\n    numa_node_count, container_type_desc\nFROM\
  \ sys.dm_os_sys_info\nGO\n```\n\n此 DMV 中的某些值将是本书后续讨论的主题。关于此示例查询中所有列以及该 DMV 中所有列的完整描述，请参阅我们的官方文档：[`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-sys-info-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-sys-info-transact-sql)。\n\
  \n### dm_os_ring_buffers\n\n有少数几个 DMV 未被官方文档记载，因为它们通常不用于 SQL Server 的常规管理和监控。但其中一个未被记载且在某些高级场景中非常有用的\
  \ DMV 是 `sys.dm_os_ring_buffers`。此 DMV 存储了 SQL Server 引擎某些内部组件的详细信息，这些信息以内存中的*列表*（“环形”表示列表满时会回绕到开头）形式存储。构建此\
  \ DMV 所公开列表的每个组件（环形缓冲区类型）都有其自己的环形缓冲区。\n\n以下示例查询（见于示例脚本 `ring_buffer_types.sql`）展示了可能的环形缓冲区类型（具体类型可能随\
  \ SQL Server 版本变化）：\n\n```sql\n-- Find the distinct ring buffer types\n--\nSELECT\
  \ DISTINCT(ring_buffer_type)\nFROM sys.dm_os_ring_buffers\nGO\n```\n\n其中一个有趣的环形缓冲区类型是\
  \ `RING_BUFFER_EXCEPTION`。每种类型的环形缓冲区以一系列行的形式存储，其中包含一个 `record` 字段。`record` 字段是 XML\
  \ 类型。以下示例查询（见于同一脚本 `dm_os_ring_buffers_exception.sql`）相当复杂。请参考 T-SQL 脚本中的注释，了解每个字段是如何从\
  \ XML 记录中提取或通过与其他系统数据连接而获取的：\n\n```sql\n-- Find all current error messages recorded\
  \ by SQL Server in the ring buffer\n-- [record_timestamp] is calculated by taking\
  \ the current timestamp in the record (which is in clock ticks by milliseconds)\n\
  -- and subtracting this from ms_ticks in sys.dm_os_sys_info which is the number\
  \ of clock ticks in ms when SQL Server was started\n-- and then adding this to the\
  \ current datetime. This gives you the actual datetime of the record\n-- errorno,\
  \ severity, and state are \"shredded\" from the XML record\n-- errorno from the\
  \ XML record is joined with sys.sysmessages to get the error message string\n```\n\
  \n\n\n-- 并非所有错误消息都是“错误”。严重性低于 16 的消息属于“信息性”消息。\n\n```sql\nDECLARE @current_ms_ticks\
  \ INT\n\nSELECT @current_ms_ticks=ms_ticks FROM sys.dm_os_sys_info\n\nSELECT DATEADD(ms,\
  \ (orb.timestamp-@current_ms_ticks), GETDATE()) as\n[record_timestamp],\nCAST(orb.record\
  \ AS XML).value('(//Exception//Error)[1]', 'varchar(10)') as\n[errorno],\nCAST(orb.record\
  \ AS XML).value('(//Exception/Severity)[1]', 'varchar(10)')\nas [severity],\nCAST(orb.record\
  \ AS XML).value('(//Exception/State)[1]', 'varchar(10)') as\n[state],\nmsg.description\n\
  FROM sys.dm_os_ring_buffers orb\nINNER JOIN sys.sysmessages msg\nON msg.error =\
  \ cast(record as xml).value('(//Exception//Error)[1]',\n'varchar(255)')\nAND msg.msglangid\
  \ = 1033 -- 此为美式英语。请根据需要更改为你的语言\nWHERE orb.ring_buffer_type = 'RING_BUFFER_EXCEPTION'\n\
  ORDER BY record_timestamp\nGO\n```\n\n###### DBFS 工具\n\n许多 Linux 用户更习惯使用 Shell 而非图形界面，并且也熟悉浏览\
  \ proc 目录（虚拟）文件系统（你可以在[`en.wikipedia.org/wiki/Procfs`](https://en.wikipedia.org/wiki/Procfs)阅读更多关于`procfs`的信息）。作为\
  \ Helsinki 项目的一部分，我们构建了一个开源工具，其功能类似于针对 SQL Server 目录视图和 DMV 数据的`procfs`，称为`dbfs`。\n\
  \n![index-217_1.png](img/index-217_1.png)\n\n### 第五章 SQL Server 工具\n\n`DBFS`将查询\
  \ Linux 上的 SQL Server 以获取 DMV 数据，并将信息输出到带有文件的目录结构中。每个文件将代表特定目录视图或 DMV 的一个快照。该工具会为每个目录视图和\
  \ DMV 生成文本和 JSON 文件。默认情况下，`dbfs`在后台运行，监控对由目录视图和 DMV 表示的文件的访问。当用户尝试访问文件内容时，`dbfs`会查询\
  \ SQL Server 以获取数据来填充文件。此技术类似于`procfs`在 Linux 操作系统中的工作原理。\n\n要安装`dbfs`，请阅读 GitHub\
  \ 项目站点[`github.com/Microsoft/dbfs`](https://github.com/Microsoft/dbfs)上的说明。我在我的\
  \ RHEL 虚拟机上安装了它，然后遵循 GitHub 站点上的快速入门说明来创建目录和配置文件。\n\n文本文件的格式设计使得可以轻松地使用`awk`、`grep`和`join`等\
  \ Linux 工具来查询目录视图和 DMV 数据。以下是一个使用`awk`的示例命令：\n\n```bash\nawk '{print $1, $2, $3,\
  \ $4, $5}' dm_os_sys_info | column -t\n```\n\n图 5-34 展示了一个使用`awk`从`dm_os_sys_info`的`dbfs`文件中提取列的示例。\n\
  \n**图 5-34** 将 `awk` 与 `DBFS` 结合使用\n\n##### 扩展事件\n\n在 SQL Server 2008 之前，用于跟踪事件和\
  \ SQL Server 引擎代码执行的主要工具是 SQL Server Trace 以及相应的工具 SQL Profiler。虽然 SQL Server Trace\
  \ 和 SQL Server Profiler 至今仍然存在，但此功能和技术工具已被标记为**已弃用**（这意味着它们可能在未来的任何新版本中被移除）。这也意味着我们不再对此功能和工具进行任何增强。\n\
  \n**注意：** 跨版本弃用功能是我们对于不计划增强的功能所采取的措施。在最近的版本中，即使我们将功能标记为已弃用，我们也极少移除它们。请在[`docs.microsoft.com/sql/database-engine/deprecated-database-engine-features-in-sql-server-2017`](https://docs.microsoft.com/sql/database-engine/deprecated-database-engine-features-in-sql-server-2017)阅读更多关于此主题的内容。\n\
  \n### 第五章 SQL Server 工具\n\n在 SQL Server 2008 中，我们启动了一个名为`XEvent`的项目。在 SQL Server\
  \ 2005 发布后，我发现自己再次与 Slava Oks 进行了一场关于可支持性和诊断的对话。尽管 SQL Server Trace 和 Profiler 很受欢迎，但他知道“服务器端跟踪”的架构存在局限性，尤其是在可扩展性方面。\n\
  \n\n# SQL Server 扩展事件 (Extended Events)\n\nSlava 及构建 SQLOS 的团队从头开始设计了 XEvent，并在\
  \ SQL Server 2008 中将此功能命名为 **Extended Events**。Extended Events 既是 SQL Server 引擎开发人员使用的跟踪库，也是供用户使用的跟踪功能。SQL\
  \ Server 引擎的开发人员可以使用 XEvent 库在他们的代码中定义检测点，即 *events*。SQL Server 的用户随后可以定义启用这些事件并消费其相关信息的方法。\n\
  \nSQL Server 2008 发布时包含了一组基础事件，但并非 SQL Server 跟踪的所有检测点都已可用。在 SQL Server 2012 中，我们努力确保扩展事件包含了来自\
  \ SQL Server 跟踪的所有事件以及更多内容。截至 SQL Server 2017，已有超过 1500 个事件可供用户使用，以深入了解查询执行、连接、各种功能或\
  \ SQL Server 引擎内部运作。\n\n虽然动态管理视图 (DMVs) 提供了关于 SQL Server 引擎许多方面的洞察，但大多数 DMVs 提供的是您查询时数据的\
  \ *快照*。扩展事件允许您跟踪细节（包括在 DMVs 中找不到的信息）并随时间收集事件数据。\n\n您可以在以下位置找到关于扩展事件的所有文档：[`docs.microsoft.com/sql/relational-databases/extended-events/extended-events`](https://docs.microsoft.com/sql/relational-databases/extended-events/extended-events)。\n\
  \n## 扩展事件对象 (Extended Event Objects)\n\n扩展事件的基本对象是 **events**（事件）、**targets**（目标）和\
  \ **actions**（操作）。让我更详细地描述每一个：\n\n**Event（事件）**：事件是 SQL Server 引擎中的检测点，由 Microsoft\
  \ 开发人员定义。可以将事件视为代码中跟踪执行的重要位置。事件及其描述的文档可以通过查询名为 `sys.dm_xe_objects`（对象类型 = 'event'）的\
  \ DMV 找到。\n\n事件具有属性或列。这些可以通过查询 `sys.dm_xe_object_columns` 找到。以下示例查询（见于示例脚本 `xe_events.sql`）显示了所有事件及其列，按事件名称排序：\n\
  \n```sql\n-- 列出 XEvent 事件、描述以及每个事件及其描述的列\n--\nSELECT xeo.name, xeo.description,\
  \ xeoc.name, xeoc.description\nFROM sys.dm_xe_objects xeo\nINNER JOIN sys.dm_xe_object_columns\
  \ xeoc\nON xeo.name = xeoc.object_name\nWHERE xeo.object_type = 'event'\nAND (xeo.capabilities\
  \ IS NULL OR xeo.capabilities & 1 = 0) -- 筛选出公共事件\nORDER BY xeo.name, xeoc.name\n\
  GO\n```\n\n注意在上面的查询中，我使用了 DMV 中一个名为 `capabilities` 的列。某些 XEvent 事件、操作和目标被认为是 *private*（私有的）。私有的\
  \ XEvent 对象不能在用户会话中使用，因为它们支持 SQL Server 的某个功能，例如 SQL Server 审核。\n\n**Target（目标）**：目标是一个可以发布和存储事件以供消费的去处。两种基本的目标类型是\
  \ `event_file`（将事件保存到文件）和 `ring_buffer`（将事件保存到服务器重启后不会持久的内存缓冲区）。还有其他目标具有内置的“智能”，例如直方图目标。完整的目标列表可以在我们的文档中找到：[`docs.microsoft.com/sql/relational-databases/extended-events/targets-for-extended-events-in-sql-server`](https://docs.microsoft.com/sql/relational-databases/extended-events/targets-for-extended-events-in-sql-server)。\n\
  \n**Action（操作）**：当一个事件被触发并发布到目标时，该事件中的所有列都是可用的（有些列需要设置才能发布其数据，因为收集该列可能会消耗额外资源）。操作是...\n\
  \n\n数据与可作为事件会话一部分捕获的事件的列正交。操作的一个例子是 `sql_text`，即 T-SQL 查询的文本。`sql_text` 并非每个事件都有对应的列，这意味着在许多情况下，您可以捕获与事件关联的\
  \ T-SQL 查询，而如果没有此操作，则无法做到这一点。\n\n# 第 5 章 SQL Server 工具\n\n关于事件、目标和操作如何协同工作的序列的出色描述，可以在我们的文档中找到：[`docs.microsoft.com/sql/relational-databases/extended-events/sql-server-extended-events-engine`](https://docs.microsoft.com/sql/relational-databases/extended-events/sql-server-extended-events-engine)。\n\
  \n## `用法和场景`\n\n要使用扩展事件，必须创建一个 `session`。会话持久化在存储在 master 数据库中并通过目录视图公开的系统表中。创建会话后，必须启动会话，以便为事件定义的检测点被\
  \ *触发* 并发布到定义的目标。在任何时候，您都可以停止会话，所有事件将不再触发，但事件定义仍持久保存在 master 数据库中。您可以在目录视图 `sys.server_event_sessions`\
  \ 中找到所有扩展事件定义。您可以从 `sys.dm_xe_sessions` DMV 找到所有已启动的扩展事件会话的列表。\n\n以下示例查询（来自示例脚本\
  \ `quicksessionstandard.sql`）展示了如何创建一个扩展事件会话来收集有关 SQL Server 连接和查询的基本信息（此事件定义基于\
  \ SSMS 中的 XEProfiler 功能）：\n\n```sql\n-- Create a XEvent session based on the XEProfiler\
  \ feature in SSMS to collect connections and queries\n--\nCREATE EVENT SESSION [QuickSessionStandardToFile]\
  \ ON SERVER\nADD EVENT sqlserver.attention(\n    ACTION(package0.event_sequence,sqlserver.client_app_name,sqlserver.client_pid,sqlserver.database_id,sqlserver.database_name,sqlserver.nt_username,sqlserver.query_hash,sqlserver.server_principal_name,sqlserver.session_id)\n\
  \    WHERE ([package0].equal_boolean))),\nADD EVENT sqlserver.existing_connection(SET\
  \ collect_options_text=(1)\n    ACTION(package0.event_sequence,sqlserver.client_app_name,sqlserver.client_hostname,sqlserver.client_pid,sqlserver.nt_username,sqlserver.server_principal_name,sqlserver.session_id)),\n\
  ADD EVENT sqlserver.login(SET collect_options_text=(1)\n    ACTION(package0.event_sequence,sqlserver.client_app_name,sqlserver.client_hostname,sqlserver.client_pid,sqlserver.nt_username,sqlserver.server_principal_name,sqlserver.session_id)),\n\
  ADD EVENT sqlserver.logout(\n    ACTION(package0.event_sequence,sqlserver.client_app_name,sqlserver.client_pid,sqlserver.nt_username,sqlserver.server_principal_name,sqlserver.session_id)),\n\
  ADD EVENT sqlserver.rpc_completed(\n    ACTION(package0.event_sequence,sqlserver.client_app_name,sqlserver.client_pid,sqlserver.database_id,sqlserver.database_name,sqlserver.nt_username,sqlserver.query_hash,sqlserver.server_principal_name,sqlserver.session_id)\n\
  \    WHERE ([package0].equal_boolean))),\nADD EVENT sqlserver.sql_batch_completed(\n\
  \    ACTION(package0.event_sequence,sqlserver.client_app_name,sqlserver.client_pid,sqlserver.database_id,sqlserver.database_name,sqlserver.nt_username,sqlserver.query_hash,sqlserver.server_principal_name,sqlserver.session_id)\n\
  \    WHERE ([package0].equal_boolean))),\nADD EVENT sqlserver.sql_batch_starting(\n\
  \    ACTION(package0.event_sequence,sqlserver.client_app_name,sqlserver.client_pid,sqlserver.database_id,sqlserver.database_name,sqlserver.nt_username,sqlserver.query_hash,sqlserver.server_principal_name,sqlserver.session_id)\n\
  \    WHERE ([package0].equal_boolean)))\nADD TARGET package0.event_file(SET filename=N'QuickSessionStandard\n\
  \n\n\n"
- '# 第 5 章 SQL Server 工具


  ## 创建和管理扩展事件会汉


  示例查询`start_xevent_session.sql`展示了如何启动已创建的会话：


  ```sql

  -- Start the XEvent session

  ALTER EVENT SESSION [QuickSessionStandardToFile] ON SERVER STATE = start

  GO

  ```


  默认情况下，扩展事件会话的文件目标存储在`/var/opt/mssql/log`目录中。


  创建扩展事件会话时有多种选项可选，例如控制内存和可扩展性。您可以在我们的文档中找到完整的选项列表：[`docs.microsoft.com/sql/t-sql/statements/create-event-session-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-event-session-transact-sql)。SQL
  Server 还提供了在首次启动 SQL Server 时启动您创建的会话的功能，这需要在创建事件定义时使用`STARTUP_STATE`选项（例如，可以用于跟踪启动时的数据库恢复过程）。


  创建扩展事件会话后，您可以添加事件或修改定义。如何操作可以在我们的文档中找到：[`docs.microsoft.com/sql/relational-databases/extended-events/alter-an-extended-events-session`](https://docs.microsoft.com/sql/relational-databases/extended-events/alter-an-extended-events-session)。


  一个极好的内置扩展事件会话是`system_health`会话。我将在第 9 章讨论如何使用此会话。


  ###### 工具


  扩展事件可以通过 T-SQL 语言进行控制和使用。要查看基于内存的扩展事件目标的数据，您可以查询`dm_xe_session_targets` DMV。如何查看`ring_buffer`目标中
  XML 数据的示例可以在我们的文档中找到：[`docs.microsoft.com/sql/relational-databases/extended-events/targets-for-extended-events-in-sql-server#h2_target_ring_buffer`](https://docs.microsoft.com/sql/relational-databases/extended-events/targets-for-extended-events-in-sql-server#h2_target_ring_buffer)。


  文件目标可以使用 T-SQL 读取，通过系统函数`sys.fn_xe_file_target_read_file`实现，该函数的文档位于：[`docs.microsoft.com/sql/relational-databases/system-functions/sys-fn-xe-file-target-read-file-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-functions/sys-fn-xe-file-target-read-file-transact-sql)。


  应用程序开发人员能够读取 XEvent 目标，包括通过以下对象模型实现“实时”事件流目标：[`msdn.microsoft.com/library/microsoft.sqlserver.management.xevent.aspx`](https://msdn.microsoft.com/library/microsoft.sqlserver.management.xevent.aspx)
  和 [`msdn.microsoft.com/library/microsoft.sqlserver.xevent.linq.aspx`](https://msdn.microsoft.com/library/microsoft.sqlserver.xevent.linq.aspx)。




  ## 第 5 章 SQL Server 工具


  ![](img/index-223_1.jpg)


  `SSMS` 拥有用户界面功能，可通过 `Object Explorer` 创建和管理 `Extended Events`。图 5-35 展示了 `SSMS`
  中 `Extended Events` 的 `Object Explorer` 树。


