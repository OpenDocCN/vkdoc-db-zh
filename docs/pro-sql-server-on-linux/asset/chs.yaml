  \n#### 更新与卸载\n\nLinux 上的 SQL Server 提供了简单的方法来更新到后续版本的 SQL Server，这些更新基于 `CUs` 或新的\
  \ `GDR` 版本。此外，也存在一种简单的方法来卸载和移除 SQL Server。\n\n##### 更新 SQL Server\n\n基于本章前面描述的为\
  \ SQL Server 配置的软件仓库，使用你发行版中包管理器的内置更新功能，即可拉取该仓库中的最新版本并将其应用到 SQL Server 二进制文件。所有数据库文件不受影响。\n\
  \n如果你运行以下命令：\n\n```\nsudo yum update mssql-server\n```\n\n![](img/index-95_1.png)\n\
  \n将根据你配置的软件仓库下载并安装最新的更新构建。如果你已经安装了最新的更新，你将收到一条消息：“没有标记为更新的软件包。”\n\n我建议你保持与 `CU`\
  \ 仓库中 Microsoft 构建版本的同步。这些更新的频率通常为每月一次（尽管随着主要版本的发布，更新频率会降低）。Microsoft 正在通过 `CU`\
  \ 中的修复和更新持续改进 Linux 上的 SQL Server。\n\n让我们看几个关于如何使用更新以及你可以预期什么行为的场景。\n\n如果你在产品发布时安装了\
  \ SQL Server 2017 的原始 `GA` 版本，然后在 SQL Server 2017 `CU4` 可用时使用了更新过程，图 2-19 显示了你可以预期的结果。\n\
  \n**图 2-19. 更新 SQL Server**\n\n更新完成后，系统将提示你使用以下命令重启 SQL Server 以完成更新：\n\n```\nsudo\
  \ systemctl restart mssql-server\n```\n\n如果你想将 SQL Server 更新到特定版本怎么办？虽然 Microsoft\
  \ 建议你应用最新的更新，但如果该版本晚于你当前运行的版本，则可以更新到特定版本。此技术也是你进行离线更新的一种方法，因为使用包管理器更新选项将需要互联网连接。\n\
  \n所以，如果你正在运行 SQL Server 2017 `GA` 版本，并且希望在 `CU4` 是最新更新时更新到 SQL Server 2017 `CU3`，你将遵循此过程：\n\
  \n- 下载 SQL Server 2017 `CU3` 软件包（有关软件包的位置，请参阅此文档页面：[`docs.microsoft.com/sql/linux/sql-server-linux-release-notes`](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes)\n\
  \n[`docs.microsoft.com/sql/linux/sql-server-linux-release-notes.`](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes)\n\
  \n- 将此软件包复制到你的 Linux 服务器。\n\n- 使用离线安装方法安装 SQL Server 2017 `CU3` 软件包。\n\n你不能使用此方法将\
  \ SQL Server 更新到比你当前运行的版本更低的版本。请参阅下一节了解如何更新到更低版本的 SQL Server。\n\n### 回滚到先前的更新\n\n\
  虽然我们相信使用 SQL Server 的最新更新不会遇到问题，\n\n\n\n可能会遇到需要回滚到 SQL Server 先前某个更新版本的情况。回滚到先前更新的过程如下：\n\
  \n1.  在 SQL Server on Linux 发行说明页面 [`docs.microsoft.com/sql/linux/sql-server-linux-release-notes`](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes)\
  \ 中找到你要回滚到的版本的软件包。\n2.  将该软件包复制到你的 Linux 服务器。\n3.  使用以下命令进行回滚：\n\n   ```\n   sudo\
  \ yum downgrade mssql-server-<version_number>.x86_64\n   ```\n\n此降级命令流程的问题在于，它需要互联网连接，因为它会下载你指定的软件包。\n\
  \n![](img/index-97_1.png)\n\n### 第 2 章：安装与配置\n\n因此，如果你需要离线回滚到先前的版本，你需要：\n\n-   使用类似\
  \ `sudo yum remove` 的命令卸载当前版本（不要删除 `/var/opt/mssql` 目录以保留所有数据库）。\n-   复制你要安装的版本的软件包。\n\
  -   对该新软件包执行离线安装。\n\n### 卸载 SQL Server\n\n虽然我们绝不希望你感到需要卸载 SQL Server，但在进行大量演示、执行特殊测试或需要离线回滚到先前版本时，你很可能会发现自己需要移除\
  \ SQL Server。\n\n在 RHEL 上移除 SQL Server 的基本语法是：\n\n```\nsudo yum remove -y mssql-server\n\
  ```\n\n图 2-20 展示了卸载 SQL Server 时的预期行为。\n\n图 2-20. 移除 SQL Server\n\n此时你有两个选择：\n\n\
  1.  你可以通过删除 `/var/opt/mssql` 目录来完全移除 SQL Server，这将删除所有系统数据库以及存储在该目录中的任何用户数据库。运行以下命令来执行此操作：\n\
  \n   ```\n   sudo rm -rf /var/opt/mssql\n   ```\n\n2.  保留 `/var/opt/mssql` 目录完整。任何未来的安装将仅安装\
  \ SQL Server 二进制文件，无需运行 `mssql-conf`，并且会保留所有系统数据库完好无损。\n\n第二个选项在你因某些意外问题而需要干净地重新安装\
  \ SQL Server 二进制文件但同时保留所有数据时可能很有用。\n\n#### 小结\n\n至此，你应该已经安装好了 SQL Server，了解了在哪里可以找到所有已安装的文件，理解了配置\
  \ SQL Server 的方法和选项，并且知道了如何将 SQL Server 更新到最新版本。\n\n让我们开始构建一个使用 Linux 上 SQL Server\
  \ 的数据库和应用程序吧！\n\n### 第 3 章：构建数据库与 T-SQL 基础\n\n既然你已经安装了 SQL Server，接下来在 Linux 上 SQL\
  \ Server 之旅的步骤就是创建一个数据库。然后你需要创建表、插入一些数据，并学习 T-SQL 语言的基础知识。尽管本章涵盖了基本的 T-SQL 功能，但我是从开发者的角度来编写的。对于那些精通\
  \ SQL Server 和 T-SQL 的专家来说，本章可能像是一次复习。但对于 SQL Server 的新手来说，本章至关重要，这样你可以为 T-SQL 语言和\
  \ SQL Server 基本功能的知识打下基础。\n\n为了在本章中演示 SQL Server 功能，我选择了 Visual Studio Code 作为执行查询的开发工具。掌握了这些知识后，你将能够进入下一章构建应用程序，并学习更高级的\
  \ T-SQL 功能以及 SQL Server 2017 的新特性。\n\n本章的 T-SQL 示例可以在随书提供的示例脚本中找到，旨在当你跟随本章内容时按顺序运行。我将在下一章使用本章提供的示例脚本向你展示如何构建应用程序并学习更高级的\
  \ T-SQL 语言功能。\n\n### 设置你的环境\n\n在第 2 章，我向你介绍了创建的 WideWorldImporters 示例数据库\n\n\n\n\
  第 3 章 构建数据库与 T-SQL 基础\n\n微软提供了该示例数据库以帮助你探索 SQL Server 的功能。该数据库以可还原的备份形式提供（我在第 2\
  \ 章中曾以此作为帮助验证 SQL Server 安装的方法）。它也可作为项目提供，因此你可以执行所有命令从头开始构建数据库。你可以在[`docs.microsoft.com/sql/sample/world-wide-importers/wide-world-importers-documentation`](https://docs.microsoft.com/sql/sample/world-wide-importers/wide-world-importers-documentation)找到该示例数据库的文档。该示例数据库的源代码可在以下\
  \ GitHub 仓库中找到：[`github.com/Microsoft/sql-server-samples/tree/master/samples/databases/wide-world-importers`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/databases/wide-world-importers)。\n\
  \n© Bob Ward 2018\nB. Ward, *Pro SQL Server on Linux*, `doi.org/10.1007/978-1-4842-4128-8_3`\n\
  \n在接下来的两章中，我将不使用备份还原，而是使用 WideWorldImporters 数据库和对象的一个子集来从头创建数据库和表。我已经提供了使用此 WideWorldImporters\
  \ 数据库子集所需的所有示例脚本。以此示例为基础，我可以向你展示 T-SQL 语言的基础知识，并在本书后面部分扩展你对其他 SQL Server 功能和 T-SQL\
  \ 语言的理解。\n\n对于本章的所有示例，我选择使用 Visual Studio Code 开发工具，因为它可在 Windows、macOS 和 Linux\
  \ 上运行。准备本章的第一步是从[`code.visualstudio.com`](https://code.visualstudio.com)安装 Visual\
  \ Studio Code。本章的示例将使用 Windows 版本的 Visual Studio Code。然而，由于 Visual Studio Code 也可在\
  \ macOS 和 Linux 上运行，所有示例都将在你偏好的开发平台上运行。\n\n在 Windows 上安装 Visual Studio Code 后，我安装了\
  \ Visual Studio Code 的`mssql`扩展。此扩展提供了丰富的功能，可在 Visual Studio Code 中开发和执行 T-SQL 脚本时提供帮助。\n\
  \n**提示** 在完成本章后，按照[`docs.microsoft.com/sql/linux/sql-server-linux-develop-use-vscode`](https://docs.microsoft.com/sql/linux/sql-server-linux-develop-use-vscode)的文档学习使用\
  \ Visual Studio Code 的 mssql 扩展教程可能会对你有所帮助。\n\n图 3-1 展示了在 Visual Studio Code 中搜索\
  \ mssql 扩展以进行安装。注意左侧栏中高亮显示的图标（从上往下数第五个图标），该图标用于查找和安装扩展。\n\n![](img/index-101_1.jpg)\n\
  \n`图 3-1. 在 Visual Studio Code 中安装 mssql 扩展`\n\n首次安装 Visual Studio Code 时，你可以选择打开一个包含你已创建脚本的现有文件夹。因此，请在你的机器上创建一个新文件夹。在我的\
  \ Windows 笔记本电脑上，我将其命名为`c:\\wwi`。然后将第 3 章的所有示例脚本复制到此文件夹中。现在在 Visual Studio Code\
  \ 中，点击“打开文件夹”。如果你一直在使用 Visual Studio Code，可能已经有一个工作区或其他打开的文件夹。你可以将这个新创建的本地文件夹打开到你的工作区中，或者直接使用文件菜单打开该文件夹，以替换资源管理器区域中可能已打开的现有文件夹。你现在应该准备好创建数据库、创建表并测试一些基础的\
  \ T-SQL 查询了。\n\n\n\n#### 创建数据库\n\nSQL Server 可以在单个 SQL Server 安装（称为一个`实例`）中托管多个数据库。Windows\
  \ 上的 SQL Server 允许每台计算机运行多个实例。对于 Linux 上的 SQL Server，单个 Linux 服务器只允许一个实例（如果你想在 Linux\
  \ 上安装多个 SQL Server 实例，需要使用 Docker 容器。这将在第 11 章讨论）。\n\n## 第三章：构建数据库与 T-SQL 基础\n\n\
  在本章中，我将只创建一个数据库，但随着本书的深入，可能会创建更多数据库以展示其他功能。你可以选择将所有数据库保留在同一个 Linux SQL Server 实例上，或者将它们放在不同的实例上。\n\
  \n##### 系统数据库\n\n在向你展示如何创建数据库之前，我认为让你了解随 SQL Server 安装附带的`系统数据库`的详细信息很重要。以下列表展示了一个全新安装后开箱即用的数据库：\n\
  \n- `master`：顾名思义，这个系统数据库是所有数据库的“根”，必须存在 SQL Server 才能启动。Master 包含适用于所有数据库的、跨 SQL\
  \ Server 实例的各类数据。存储在`master`中的最重要数据集之一是关于该实例创建的所有其他数据库的信息，包括其他系统数据库和你创建的用户数据库。\n\
  \n任何时候，要查看 SQL Server 实例上所有数据库的列表，请运行此 T-SQL 查询。你可以在示例脚本`databases.sql`中找到此查询：\n\
  \n```sql\nSELECT * FROM sys.databases\nGO\n```\n\n**注意**：这里的 `GO` 关键字不是 T-SQL 语句。它是一个被工具识别的特殊关键字，用于分隔`批处理`。批处理是从客户端一起发送到服务器的一系列\
  \ T-SQL 语句，但服务器会逐个执行每个语句。许多用户在一个批处理中只执行一条 T-SQL 语句。\n\n你可以从任何数据库上下文运行此语句，因为它使用了\
  \ `sys` 架构和一个名为 `databases` 的视图。随着你学习接下来的两章，我会解释数据库上下文、架构和视图。关于系统提供的视图（也称为目录视图）和表，我将在第\
  \ 5 章中详细讨论。\n\n- `model`：`model` 系统数据库是一个`模板`。当创建用户数据库时，`model` 数据库的内容被用来构建新的用户数据库。在许多情况下，用户让此数据库保持为空（如安装时那样），这样你的新用户数据库就只包含系统表和对象。一个例子是，如果你希望在任何新创建的用户数据库中建立一套标准的用户对象；你可以将它们放入\
  \ `model` 数据库中。\n\n- `tempdb`：这个系统数据库是 SQL Server 实例所有用户的`共享`数据库。它是共享的，因为无论使用什么数据库上下文，使用特殊语法创建的临时对象都存储在这里。此外，根据查询执行的各种条件，其他内部对象也会被放置在\
  \ `tempdb` 中。在下一章中，我将讨论创建临时对象（并会提及可能出现在 `tempdb` 数据库中的内部对象类型）。此外，`tempdb` 数据库的主题将在后面的章节中讨论，因为它可能是影响性能和管理\
  \ SQL Server 实例的一个重要因素。理论上，你可以在这个系统数据库中创建用户对象，但不推荐这样做。这是因为 `tempdb` 在每次 SQL Server\
  \ 启动时都会被重新创建（使用 `model` 数据库作为模板）。\n\n- `msdb`：这个系统数据库由 SQL Server Agent 用于计划警报和作业，也由其他功能（如\
  \ SQL Server Management Studio、Service Broker 和 Database Mail）使用。可以将其视为 SQL Server\
  \ 功能使用的应用程序数据库。我不建议你在此系统数据库中放入任何用户表。\n\n\n\n### 第 3 章：构建数据库与 T-SQL 基础\n\n**资源数据库**：这并非数据库的实际名称，但它被称为\
  \ `Resource` 数据库。这是一个 `隐藏` 的系统数据库，且为只读。SQL Server 将系统对象（非数据）存储在此数据库中，例如系统存储过程、视图等。当你查询\
  \ `sys.databases` 时，SQL Server 会理解如何从 `Resource` 数据库获取 `sys` 架构的数据库视图定义。\n\n![](img/index-104_1.jpg)\n\
  \n有关系统数据库的更详细介绍，请查阅我们的文档：[`docs.microsoft.com/sql/relational-databases/databases/system-databases`](https://docs.microsoft.com/sql/relational-databases/databases/system-databases)。\n\
  \n## 创建登录名与用户\n\nSQL Server 提供了 `sa` 登录名作为拥有完全控制权的“root”账户。就像 Linux 中的 root 账户一样，通常不建议在所有与\
  \ SQL Server 的交互中都使用 `sa` 登录名。\n\n因此，我将创建一个名为 `sqllinux` 的新登录名，并在本章剩余部分使用它来创建数据库及所有对象。但我必须先以\
  \ `sa` 登录名连接到 SQL Server，才能创建 `sqllinux` 登录名。要在 Visual Studio Code 中完成此操作，我需要为 `sa`\
  \ 登录名创建一个 `连接配置文件`。\n\n如果我按下 F1 键（或在 Visual Studio Code 菜单中选择 View/Command Palette），我会看到\
  \ mssql 扩展提供的各种任务选项。如果我选择名为 `MS SQL: Connect` 的选项，系统会提示我添加一个连接配置文件。在我的场景中，我选择了我的\
  \ Linux 上的 SQL Server 名称（也可以是 `<IP 地址>,1433`），使用系统管理员登录名 `sa`，输入了 `sa` 的密码，但将数据库名称留空，这样当我连接时，会进入\
  \ `master` 数据库的上下文。\n\n我保存了配置文件的名称，以便下次重复使用。如果你按照这些步骤操作，Visual Studio Code 也会连接到指定的\
  \ SQL Server。你可以在工具的右下角看到连接信息。图 3-2 展示了我的 SQL Server 上的示例。`MSSQL` 表示编辑器处于 `MSSQL`\
  \ 模式，这意味着编辑器将协助我完成各种 T-SQL 命令和任务。\n\n**图 3-2.** 处于 MSSQL 模式并已连接到 Linux 上的 SQL Server\
  \ 的 Visual Studio Code 编辑器\n\n使用 `sa` 登录名，通过示例脚本 `createlogin.sql` 中的以下 T-SQL 语句来创建一个登录名。我还将\
  \ `sqllinux` 登录名添加到了 `dbcreator` 角色中，以便该登录名拥有创建数据库的权限。请随意将密码更改为你的选择。\n\n**提示**：与其他\
  \ SQL Server 工具不同，Visual Studio Code 要求你创建一个文件来运行 T-SQL 语句。\n\n```sql\nUSE master\n\
  GO\nIF EXISTS (select * from sys.server_principals where name = 'sqllinux')\n  \
  \  DROP LOGIN [sqllinux]\nGO\nCREATE LOGIN [sqllinux] WITH PASSWORD=N'Sql2017isfast',\
  \ DEFAULT_DATABASE=[master]\nGO\nEXEC sys.sp_addsrvrolemember 'sqllinux', 'dbcreator'\n\
  GO\n```\n\n当我使用 `sqllinux` 登录名创建数据库时，它将自动映射为该数据库中一个称为 `dbo`（数据库所有者）的用户。\n\n要执行本章剩余的示例，我需要在\
  \ Visual Studio Code 中使用刚刚创建的 `sqllinux` 登录名创建一个新的连接配置文件。现在，当我执行任何示例脚本时，我都使用 `sqllinux`\
  \ 登录名的连接配置文件。\n\n**提示**：我应该在此停下来，给你一个关于连接到你的 Linux 上的 SQL Server 的提示。我的 Linux 上的\
  \ SQL Server 运行在 `rhel` 虚拟机中，该虚拟机位于我使用 Windows 10 的 `hyper-V` 的笔记本电脑上。使用 `hyper-V`，我配置了一个内部网络适配器，以便在\
  \ `rhel` 中为该适配器绑定一个静态 `ip` 地址。然后在 Windows 10 上，我编辑了 `/windows/system32/drivers/etc/hosts`\
  \ 文件，输入了静态 `ip` 地址和名称 `bwsql2017rhel`。现在，在 `VM` 之外...\n\n\n\n"
- '# 第三章 构建数据库与 T-SQL 基础


  ##### 创建用户数据库


  创建自己的数据库可以像运行示例脚本 `ilovethedallascowboys.sql` 中的 T-SQL 语句一样简单：


  ```sql

  USE master

  GO

  CREATE DATABASE ilovethedallascowboys

  GO

  ```


  （是的，我是一个超级体育迷，而且来自德克萨斯州的达拉斯/沃斯堡地区，所以我是一个达拉斯牛仔队的忠实粉丝。希望其他 NFL 球迷们会继续阅读本书的剩余部分<g>）。


  `CREATE DATABASE` 的 T-SQL 语法参考有非常多的选项，足以让人眼花缭乱。创建数据库时最重要的选择是文件位置、文件数量和大小。


  正如我在前一节所述，`model` 数据库是一个模板，因此当你运行不带任何选项的 `CREATE DATABASE` 时，SQL Server 将使用 `model`
  的定义和大小来创建数据库。此规则的唯一例外是数据库和事务日志文件的默认位置，正如我在第二章讨论的，可以通过 `mssql-conf` 脚本设置。对于 Linux
  上的 SQL Server，这些文件的默认位置将存储在 `/var/opt/mssql/data` 目录中。


  如果你想更改数据库的定义，SQL Server 还提供了一个 `ALTER DATABASE` T-SQL 命令（这通常在创建数据库后用于设置各种*数据库选项*，本书的其他部分将会用到）。


  让我们看看如何使用 Visual Studio Code 中的 `mssql` 扩展为 WideWorldImporters 示例创建数据库。你可能已经在之前的章节中恢复了
  WideWorldImporters 完整备份。如果已经这样做过，请使用 `sa` 登录名执行 `cleanup.sql` 示例脚本。


  **注意：** 第五章涵盖了 SQL Server 的工具，其中包括创建数据库和管理 SQL Server 的其他选项。我在本章中使用 Visual Studio
  Code 是为了向作为开发者的你展示如何使用此工具来创建数据库、对象和查询，并最终在下一章创建一个应用。


  ![](img/index-107_1.jpg)


  我可以直接点击高亮的图标来创建一个新文件，并将其命名为 `createdb.sql`。图 3-3 显示了我为 `createdb.sql` 打开的编辑器，现在准备使用
  `mssql` 扩展连接到 Linux 上的 SQL Server。（示例文件中不包含 `createdb.sql`，因为你将需要自己输入这些语句）。


  ***图 3-3.** 在 Visual Studio code 中使用 mssql 扩展创建新的 T-SQL 脚本*


  现在，我可以将 Visual Studio Code 工具用作 T-SQL 编辑器来针对 SQL Server 执行语句。在下一章，当我创建应用时，我将把编辑器切换到不同的语言。


  由于我在 Visual Studio Code 中使用了 `mssql` 扩展，我获得了一项名为 Intellisense（智能感知）的功能。Visual Studio
  Code 中的编辑器将帮助我指导 T-SQL 语句和对象的语法。图 3-4 显示了智能感知帮助完成 `CREATE DATABASE` 语法的示例。


  ![](img/index-108_1.jpg)


  ***图 3-4.** mssql 扩展的智能感知功能*


  在编辑器中输入以下 T-SQL 语句完成操作：


  ```sql

  CREATE DATABASE [WideWorldImporters]

  GO

  ```


  **注意：** 在此 T-SQL 语句中，`WideWorldImporters` 被称为一个*标识符*。标识符是名称，而非 T-SQL 语句。T-SQL 允许常规标识符和分隔标识符。在标识符周围加上
  `[]` 被称为分隔标识符。你会发现关于使用常规标识符还是分隔标识符存在许多不同的观点。


  在我的笔记本电脑上，我可以使用 `bwsql2017rhel` 作为服务器名称，而无需输入 IP 地址和端口 1433 来连接到我 Linux 上的 SQL Server。你可能正在使用
  DNS 或其他方法将逻辑名称暴露给你的 Linux 服务器。这种技术允许我在笔记本电脑上连接到我的 Linux 服务器，无论我的 Wi-Fi 或以太网适配器的状态如何。




