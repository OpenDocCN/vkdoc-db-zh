  `sqlcmd -Slocalhost,1500 -Usa`\n\n9. 现在从 `sqlcmd` 提示符，运行以下 T-SQL 语句：\n```\nSELECT\
  \ COUNT(*) FROM ProductCatalog.dbo.Product\nGO\n```\n你应该会得到一个计数结果为 14 行。\n\n让我们通过在\
  \ bash shell 中运行以下命令来停止 `sql2` 和 `sql3` 容器（是的，你可以一次控制多个容器），并切换回你的主目录：\n`sudo docker\
  \ stop sql2 sql3`\n`cd ~`\n\n在下一节中，我将向你展示如何使用一个称为 `compose` 的概念来构建一个包含 SQL Server\
  \ 的多容器应用程序。\n\n### 组合多容器应用程序\n\n\n# Docker Compose 概览与示例\n\n使用 Dockerfile 构建 Docker\
  \ 容器镜像是构建单一容器的好方法。然而，在很多情况下，一个应用会使用多个容器，并且它们之间存在依赖关系，例如一个 Web 应用和一个数据库。因此，Docker\
  \ 提供了一种名为 `compose` 的功能，允许你构建并运行一组容器，包括对 Dockerfile 和依赖项的引用。你可以在 [`docs.docker.com/compose/overview`](https://docs.docker.com/compose/overview)\
  \ 阅读关于 Docker Compose 的完整参考文档。\n\n我们再次使用 [`github.com/Microsoft/sqllinuxlabs/tree/master/containers`](https://github.com/Microsoft/sqllinuxlabs/tree/master/containers)\
  \ 实验室中的示例来向你展示（注意：此示例与你可以在 [`docs.docker.com/compose/aspnet-mssql-compose`](https://docs.docker.com/compose/aspnet-mssql-compose)\
  \ 阅读的 Docker 文档中的一个示例类似）。\n\n在这个示例中，我的应用程序需要两个容器：\n*   一个包含名为 `ProductCatalog` 数据库的\
  \ SQL Server 容器。在这种情况下，我有一个希望运行的 T-SQL 脚本，用于创建数据库、登录名、用户、对象并填充数据。\n*   一个包含基于 .NET\
  \ Core 的 ASP.NET 应用程序的容器，该应用程序将访问 `ProductCatalog` 数据库，连接到 SQL Server 容器并运行查询。你将看到，使用\
  \ Docker 的 compose 过程将允许应用程序连接到映射到 SQL Server 容器的逻辑名称。\n\n## 使用 Docker Compose 部署多容器应用示例\n\
  \n让我们浏览一下使用 Docker 组合应用程序的过程，然后我将解释一些关于这些容器如何工作的细节：\n\n1.  首先，我们需要使用以下命令从 `bash`\
  \ shell 安装 `docker-compose` 包：\n\n    ```bash\n    sudo curl -L https://github.com/docker/compose/releases/download/1.21.2/docker-compose-$(uname\
  \ -s)-$(uname -m) -o /usr/local/bin/docker-compose\n    sudo chmod +x /usr/local/bin/docker-compose\n\
  \    sudo ln -s /usr/local/bin/docker-compose /usr/bin/docker-compose\n    ```\n\
  \n2.  切换到所有文件所在的目录，从 `bash` shell 运行以下命令：\n\n    ```bash\n    cd sqllinuxlabs/containers/mssql-aspcore-example\n\
  \    ```\n\n3.  编辑 `docker-compose.yml` 文件，将环境变量 `SA_PASSWORD` 的值替换为你的 `sa` 密码（我使用\
  \ `nano` 编辑器）。`docker-compose.yml` 文件是一个 YAML 文件（YAML 代表 YAML Ain't Markup Language），用于定义容器镜像、服务和依赖关系。我将在下面更详细地描述这个文件是如何工作的。可以将此文件视为构建\
  \ Docker 镜像和运行容器的起点。\n\n4.  编辑文件 `./mssql-aspcore-example-db/db-init.sh`，将 `sqlcmd`\
  \ 使用的 `-P` 参数的 `sa` 密码填入。\n\n    ![](img/index-583_1.png)\n\n    第 11 章 SQL Server\
  \ 与容器\n\n5.  从 `bash` shell 运行以下命令来组合 Docker 应用程序，这将构建 Docker 镜像并运行容器：\n\n    ```bash\n\
  \    sudo docker-compose up\n    ```\n\n    执行时将会滚动显示大量信息。图 11-2 展示了在我的 Linux `ssh`\
  \ 会话中正在进行的 `docker compose`。\n\n    **图 11-2.** 正在进行中的 Docker compose\n\n    容器并非在后台运行，因此当\
  \ compose 完成时，你的屏幕可能如图 11-3 所示。\n\n    ![](img/index-584_1.jpg)\n\n    ![](img/index-584_2.png)\n\
  \n    第 11 章 SQL Server 与容器\n\n    **图 11-3.** `docker compose` 启动容器后 `ssh` 中的状态\n\
  \n6.  要运行该应用程序，我需要为我的 Azure 虚拟机打开一个端口。ASP.NET 应用程序正在监听端口 `5000`。请参阅 [`github.com/Microsoft/sqllinuxlabs/tree/master/open_azure_vm_port`](https://github.com/Microsoft/sqllinuxlabs/tree/master/open_azure_vm_port)\
  \ 的说明。\n\n\n[GitHub 仓库链接](https://github.com/Microsoft/sqllinuxlabs/tree/master/open_azure_vm_port)\
  \ `sqllinuxlabs/tree/master/open_azure_vm_port` 用于打开端口 5000。\n\n7.  现在，从你的浏览器访问以下\
  \ URL：\n    `http://<public IP address>:5000`\n\n    当应用程序网页呈现时，你应该会看到一个类似图 11-4\
  \ 的页面。\n\n    ### 图 11-4：初始的 ASP.Net 容器应用程序屏幕\n\n    点击页面左上角的`Product Catalog Demo`，你的屏幕现在应该看起来像图\
  \ 11-5。\n\n    ![](img/index-585_1.jpg)\n\n    ## 第 11 章 SQL Server 与容器\n\n    ###\
  \ 图 11-5：来自 ASP.Net Docker 容器应用程序的产品目录数据\n\n    让我们深入了解一下`docker compose`和这些容器是如何工作的。\n\
  \n    从一个独立的 SSH 会话（你不能使用当前的 SSH 会话，因为这些容器没有在后台运行。如果你输入`<ctrl>+<c>`，容器将会结束），从 bash\
  \ shell 运行以下命令以查看正在运行的容器。你也可以使用`<ctrl>+<z>`将容器强制转到后台：\n    ```bash\n    sudo docker\
  \ ps --no-trunc\n    ```\n    你应该会看到类似下面的结果：\n    ```\n    CONTAINER ID IMAGE COMMAND\
  \ CREATED STATUS PORTS NAMES\n    22b900fd8f3ea03ca7a9d923441291a507dc4b3eb07fb3189fea6b3c8a6e0935\
  \ mssql-aspcore-example_web \"dotnet belgrade-product-catalog-demo.dll\" 16 minutes\
  \ ago Up 16 minutes 0.0.0.0:5000->5000/tcp mssql-aspcore-example_web_1\n    549d476ec793d96049a0193aeec78c6f32dc1661d79370c8855d7e50cc9797aa\
  \ mssql-aspcore-example_db \"/bin/sh -c '/bin/bash ./entrypoint.sh'\" 16 minutes\
  \ ago Up 16 minutes 0.0.0.0:1500->1433/tcp mssql-aspcore-example_db_1\n    ```\n\
  \n    ## 第 11 章 SQL Server 与容器\n\n    你可以看到有两个容器在运行。对于第一个容器，在容器内运行的命令使用了程序`dotnet`，它用于执行\
  \ ASP.NET 应用程序，在本例中是由`belgrade-product-catalog-demo.dll`实现的（该文件在创建 Docker 镜像时构建）。除了\
  \ SQL Server 的连接方式外，我不会过多地讲解 ASP.NET 应用程序的机制。你可以查看`Dockerfile`和目录`sqllinuxlabs/containers/mssql-aspcore-example/mssql-aspcore-example-app`中的所有源代码。\n\
  \n    第二个容器有以下命令：\n    ```\n    /bin/sh -c '/bin/bash ./entrypoint.sh'\n    ```\n\
  \    这是 SQL Server 镜像的容器，所以让我们探索一下`entrypoint.sh`是如何用来启动 SQL Server 的。\n\n    1.\
  \  通过在 bash shell 中运行以下命令，切换到指定目录：\n        ```bash\n        cd ~/sqllinuxlabs/containers/mssql-aspcore-example/mssql-aspcore-example-db\n\
  \        ```\n\n    2.  首先，我们通过执行`cat Dockerfile`来查看名为`Dockerfile`的文件。结果应类似如下：\n\
  \        ```\n        FROM microsoft/mssql-server-linux:latest\n        COPY . /\n\
  \        RUN chmod +x /db-init.sh\n        CMD /bin/bash ./entrypoint.sh\n     \
  \   ```\n        因此我们知道，此目录中的 Docker 镜像将从最新的 SQL Server 镜像构建，当前目录中的所有文件将被复制到容器中，然后`db-init.sh`脚本将被修改以便可以执行。最后，启动容器的命令是`entrypoint.sh`脚本。\n\
  \n    3.  我们知道`entrypoint.sh`用于运行容器，所以让我们通过执行`cat entrypoint.sh`查看此文件。结果应类似如下（我从输出中删除了注释）：\n\
  \        ```\n        /db-init.sh & /opt/mssql/bin/sqlservr\n        ```\n     \
  \   这个命令将在后台执行`db-init.sh`，然后在前台启动`sqlservr`。\n\n    ## 第 11 章 SQL Server 与容器\n\n\
  \    4.  现在，让我们通过执行`cat db-init.sh`来查看`db-init.sh`。你的结果应类似如下：\n        ```\n   \
  \     #wait for the SQL Server to come up\n        sleep 15s\n        #run the setup\
  \ script to create the DB and the schema in the DB\n        /opt/mssql-tools/bin/sqlcmd\
  \ -S localhost -U sa -P Sql2017isfast -d master -i db-init.sql\n        ```\n  \
  \      这就是部分奥秘所在。这个脚本将等待 15 秒，让 SQL\n\n\n\n\n# 第 11 章 SQL Server 与容器\n\n服务器启动后，在容器内使用\
  \ `sqlcmd` 执行 `db-init.sql` 脚本。我会让你进一步查看 `db-init.sql`，但它基本上创建了 `ProductCatalog`\
  \ 数据库，创建了登录名和对象，并向数据库填充了一些数据。\n\n现在，你了解了如何启动一个 SQL Server 容器并运行 T-SQL 脚本来创建你的数据库、对象和数据的机制。\n\
  \n让我们看一下 `docker-compose.yml` 文件，了解 Docker Compose 如何知道如何构建每个容器。\n\n1.  通过执行以下命令，切换到\
  \ `docker-compose.yml` 文件所在的原始目录：\n\n    ```\n    cd ~/sqllinuxlabs/containers/mssql-aspcore-example/\n\
  \    ```\n\n2.  现在，通过执行 `cat docker-compose.yml` 来输出 `docker-compose.yml` 文件的内容。你的结果应该如下所示：\n\
  \n    ```\n    version: \"3\"\n    services:\n      web:\n        build: ./mssql-aspcore-example-app\n\
  \        ports:\n          - \"5000:5000\"\n        depends_on:\n          - db\n\
  \      db:\n        build: ./mssql-aspcore-example-db\n        environment:\n  \
  \        SA_PASSWORD: \"Sql2017isfast\"\n          ACCEPT_EULA: \"Y\"\n        ports:\n\
  \          - \"1500:1433\"\n    ```\n\n`services:` 标签允许你定义将作为应用程序一部分运行的特定容器。对于每个服务，你可以定义用于构建镜像的\
  \ `Dockerfile` 的位置、运行容器时要使用的端口（包括映射的端口），以及一个服务是否依赖于另一个服务。在本例中，`web` 服务依赖于 `db` 服务。这意味着在\
  \ `web` 服务的容器启动之前，`db` 服务的容器将被创建并启动。\n\n你还可以指定容器所需的任何环境变量，在本例中，这些变量是 SQL Server\
  \ 容器的 EULA 协议和 sa 密码。并且对于 `db` 服务的容器，端口 1500 被映射到 SQL Server 的端口 1433。\n\n因此，总结一下，当执行\
  \ `docker-compose up` 时，Docker 将使用 `docker-compose.yml` 文件，首先通过 `./mssql-aspcore-example-db`\
  \ 目录中的 `Dockerfile` 构建 `db` 服务的容器。然后，它将使用指定的环境变量，基于该镜像运行一个容器，此时 SQL 服务可通过主机的端口 1500\
  \ 访问。\n\n接着，它将为 `web` 服务运行容器，该容器从 `./mssql-aspcore-example-app` 目录中的 `Dockerfile`\
  \ 创建 Docker 镜像，并使用端口 5000 运行一个基于该镜像的容器。\n\n最后一个重要的观察点：当我第一次看到这些容器时，我无法弄清楚 ASP.NET\
  \ 应用程序如何知道连接到 SQL Server 容器的端口 1500。`docker-compose.yml` 文件中的服务定义是关键。名为 `db` 的服务实际上被映射到\
  \ `localhost,1500`。因此，ASP.NET 应用程序可以在连接字符串中使用 `db` 作为服务器名，来连接与 `db` 服务关联的容器中的 SQL\
  \ Server。\n\n我知道这感觉有点复杂，但这只是因为我深入探讨了幕后细节来描述组合一个多容器应用程序是如何工作的。现在，让我们来点有趣的。继续下一节，看看我如何应对\
  \ SQL Mac 挑战！\n\n#### SQL Mac 挑战\n\n2018 年 2 月，我在伦敦我最喜欢的活动之一 SQLBits 上做演讲。我的其中一个演讲是关于\
  \ Linux 上的 SQL Server。我当时正在用我可靠的 HP Zbook Studio 笔记本电脑运行 Windows 10 进行演讲和演示。一位观众举手说道：“鲍勃，我很高兴微软拥抱了\
  \ Linux，但我是一个 MacBook 用户。你在这些演示中使用的是 PC。但我没有看到微软对 MacBook 社区的承诺。”\n\n尽管我之前没有研究过这个话题，但我对这个回答充满信心。“我们现在拥有的软件和工具，可以让你在你的\
  \ MacBook 上运行并与 SQL Server 交互，而无需虚拟化，也无需 Windows 工具。我相信你可以在 5 分钟内安装并运行它。”我称之为“接受\
  \ SQL Mac 挑战”。观众中的那个人说他们愿意接受这个挑战。\n\n\n\n# 第 11 章 SQL Server 与容器\n\n你可以在他的推文中看到这一挑战的结果：[`https://twitter.com/thofle/status/967437807697448965`](https://twitter.com/thofle/status/967437807697448965)。\n\
  \n其实我当时真的不确定我说的是否 100%准确（尤其是“无需虚拟化”和“五分钟”这两部分），但我之所以敢做出如此大胆的声明，是基于两点认知：(1) 我知道我们的\
  \ `docker` 容器镜像具有可移植性，并且可以轻松地在 `MacBook` 上运行，因为我知道 `Docker` 有适用于 macOS 的版本；(2) 我们的\
  \ `SQL Operations Studio` 工具是跨平台的，因此可以原生运行在 `macOS` 上。\n\n回到德克萨斯州后，我做了一件我以为作为微软员工永远不会做的事。我问我的经理\
  \ Asad Khan，我是否可以买一台 `MacBook`。他说，鉴于我正在从事大量关于 `Linux` 和容器的工作，这完全合情合理。拿到 `MacBook`\
  \ 后，我决定亲自接受这个 SQL Mac 挑战（你知道的，就是身体力行）。而我现在要说的是：我错了。我的错误在于，安装这个软件花了我四分钟，而不是五分钟。\n\
  \n让我带你重温一下整个过程，这样所有正在阅读本书的 `MacBook` 用户都可以自己尝试一下。\n\n## 1. 安装 Docker for Mac\n我做的第一件事是按照\
  \ [`https://store.docker.com/editions/community/docker-ce-desktop-mac`](https://store.docker.com/editions/community/docker-ce-desktop-mac)\
  \ 所述，安装并下载 `Docker for Mac`（社区版）。（我使用了稳定版通道）。下载完成后的界面如图 11-6 所示。\n\n![](img/index-590_1.jpg)\n\
  \n**图 11-6。** 下载 Docker for Mac\n\n坦率地说，`docker` 在 `macOS` 上确实用到了一些虚拟化技术，但这已经比过去好多了。以前\
  \ `docker for Mac` 需要依赖 `virtualBox`，但现在 `macOS` 内置了一个轻量级的 Hypervisor 框架，因此更准确地说，`docker\
  \ for Mac` 不再需要一个独立的、重量级的虚拟化环境。你可以在 [`https://docs.docker.com/docker-for-mac/docker-toolbox/#the-docker-for-mac-environment`](https://docs.docker.com/docker-for-mac/docker-toolbox/#the-docker-for-mac-environment)\
  \ 阅读更多关于 `docker for Mac` 环境的信息。\n\n## 2. 将 Docker 安装为应用程序\n`Docker for Mac` 的下载文件解压后，会弹出一个新窗口，让你通过简单的拖放操作将\
  \ `Docker` 安装为 `Mac` 应用程序，如图 11-7 所示。\n\n**图 11-7。** 安装 Docker for Mac\n\n## 3.\
  \ 启动 Docker\n现在 `Docker` 已作为应用程序安装好了，我从 `MacBook` 的 Launchpad 启动了它。此时，我的屏幕顶部出现了一个\
  \ `Docker` 图标，我可以看到它正在启动，如图 11-8 所示。\n\n![](img/index-592_1.jpg)\n\n**图 11-8。**\
  \ Docker for Mac 正在启动\n\n## 4. 下载 SQL Operations Studio\n现在我想多任务操作，因此在 `Docker`\
  \ 启动的同时，我从 [`https://docs.microsoft.com/sql/sql-operations-studio/download`](https://docs.microsoft.com/sql/sql-operations-studio/download)\
  \ 下载了适用于 `macOS` 的 `SQL Operations Studio`。\n\n## 5. 拉取 SQL Server 镜像\n在下载 `SQL\
  \ Operations Studio` 的时候，`Docker` 已经启动了。于是我通过 `macOS` 的 `Terminal`（本质上是一个 `bash`\
  \ shell）使用 `docker` 命令拉取了 `SQL Server` 镜像。我运行了如下命令：\n\n```bash\ndocker pull microsoft/mssql-server-linux:2017-latest\n\
  ```\n\n## 6. 解压 SQL Operations Studio\n在拉取镜像的同时，我解压了 `SQL Operations Studio` 的下载文件。解压过程应如图\
  \ 11-9 所示。\n\n![](img/index-593_1.jpg)\n\n**图 11-9。** 解压 SQL Operations Studio for\
  \ macOS\n\n# 第 11 章 SQL Server 与容器\n\n在文件解压的同时，`docker pull` 命令已经为我执行完毕，因此现在可以通过\
  \ MacOS 终端运行以下命令来启动容器：\n\n```\ndocker run -e 'ACCEPT_EULA=Y' -e 'MSSQL_SA_PASSWORD=Sql2017isfast'\
  \ -p 1401:1433 --name sql1 -d microsoft/mssql-server-linux:2017-latest\n```\n\n\
  ![](img/index-594_1.jpg)\n\nSQL Operations Studio 已经解压完成，因此可以如图 11-10 所示选择进行安装。\n\
  \n**图 11-10.** 为 macOS 安装 SQL Operations Studio\n\n现在可以从 Launchpad 启动 SQL Operations\
  \ Studio，连接到 `localhost` 的 `1401` 端口，并针对运行 SQL Server 的容器执行查询，如图 11-11 所示。\n\n![](img/index-595_1.jpg)\n\
  \n**图 11-11.** 在 macOS 中针对 SQL Server 容器运行查询\n\n就是这样。如果忽略掉我的所有解说，只按照步骤操作，并且网络连接尚可，你可以在五分钟之内完成所有这些。至此，你已正式完成了\
  \ SQL Mac 挑战。在本章结尾，让我们探讨一种使用名为 Kubernetes 的环境在生产环境中运行 SQL Server 容器的独特方式。\n\n####\
  \ SQL Server 与 Kubernetes\n\n正如 Kubernetes 在其官网 `https://kubernetes.io` 所定义的，它是一个“用于自动化容器化应用的部署、扩缩和管理的开源系统”——也被称为容器编排器。简而言之，Kubernetes\
  \ 是一个用于部署和管理生产环境容器集的系统。在 Linux 服务器上运行多容器应用是一回事，但如果你需要部署数百个容器呢？如何以高效的方式部署和管理这些容器？此外，如何为\
  \ SQL Server 容器建立一个 `HADR` 系统？Kubernetes 提供了所有这些功能。\n\n根据维基百科 (`https://en.wikipedia.org/wiki/Kubernetes`)，Kubernetes\
  \ 由 Google 的工程师于 2014 年创立。在希腊语中，Kubernetes 意为“舵手”或“船长”。我最初接触 Kubernetes 时，记得收到同事\
  \ Travis Wright 的邮件中使用了缩写 `k8s` 来代表 Kubernetes。于是我查阅了一下，果然 `k8s` 是一个缩写，用来替代 Kubernetes\
  \ 一词中“k”和“s”之间的 8 个字母（参见 `https://kubernetes.io/docs/concepts/overview/what-is-kubernetes/#what-does-kubernetes-mean-k8s`）。因此，在本章的剩余部分，我自己也将使用\
  \ `k8s` 来指代 Kubernetes。\n\n`k8s` 的一个美妙之处在于它现在可以在多种平台上运行：物理机、虚拟机以及云解决方案。例如，你可以在笔记本电脑上设置一个\
  \ `Minikube` (`https://kubernetes.io/docs/setup/minikube`) 来了解 `k8s` 与 Docker 容器配合使用的基本原理。或者，你可以使用云解决方案，如\
  \ RedHat 的 `Openshift` (`https://www.openshift.com`) 或 Microsoft Azure Kubernetes\
  \ 服务 (`AKS`) `https://azure.microsoft.com/services/kubernetes-service/`。请浏览 `k8s`\
  \ 的完整已知解决方案列表：`https://kubernetes.io/docs/setup/pick-right-solution/`。你还应该收藏 `k8s`\
  \ 的主要文档页面 `https://kubernetes.io/docs/home` 以备将来参考。\n\n##### 基础知识\n\n关于 `k8s`，你可以学习许多方面，以便开发容器应用或操作整个\
  \ `k8s` 系统。对于 SQL Server 结合 `k8s` 的使用场景，我认为重要的是你\n\n\n# 第 11 章 SQL Server 与容器\n\n\
  了解以下术语：\n\n- 集群\n  一个 k8s 集群是通过一组节点和 Pod 部署的容器集合，这些概念我将在下面定义。\n\n- Pod\n  k8s 中的\
  \ Pod 是一个或多个容器的组，它们可以共享存储、网络以及关于如何运行这些容器的规范。\n\n- 节点\n  我很喜欢 k8s 文档（位于 `https://kubernetes.io/docs/concepts/architecture/nodes/`）对节点的定义。\"\
  节点是 Kubernetes 中的工作机器，以前称为 minion。节点可以是虚拟机或物理机。\" 实际上，可以将节点视为一个或多个 Pod 的宿主机。\n\n\
  - 副本集\n  副本集定义了在任何时间点应运行多少个特定 Pod 的实例，并有助于定义 Pod 的高可用性。副本集对于让 Kubernetes 在 Pod 发生故障时自动启动新\
  \ Pod 非常重要。\n\n- 部署\n  部署是一种声明式方法，用于定义 Pod 和副本集。建议使用部署来定义 Pod 和副本集的配置以实现高可用性。这是我们将在本章中用来演示如何为\
  \ SQL Server 与 k8s 定义和配置 HADR 的方法。\n\n- 持久卷声明\n  K8s 支持通过 PersistentVolume 供 Pod\
  \ 使用的存储概念。这种存储可以在 Pod 间共享（这非常契合 SQL Server 的共享存储 HADR 解决方案）。持久卷声明是用户对 PersistentVolume\
  \ 存储的请求。\n\n- 服务\n  服务是一组可以被抽象的 Pod 的逻辑集合。其中一种服务类型是用于连接的负载均衡器。你可以为负载均衡器服务指定一个 IP\
  \ 地址。每个 Pod 都有一个唯一的 IP 地址，但负载均衡器拥有一个已知的 IP 地址。可以将其视作故障转移集群实例所使用的虚拟 IP 地址概念，或可用性组的侦听器概念。即使在\
  \ k8s 执行\"故障转移\"时，它也能为 SQL Server 提供一个抽象的 IP 地址。\n\n你可以在 `https://kubernetes.io/docs/concepts/`\
  \ 阅读关于 k8s 组件和架构的更完整描述。了解了这些术语后，让我们通过使用 AKS 在 k8s 中部署一个 SQL Server 容器来实际看看它们的应用。\n\
  \n##### SQL Server HADR 与 Kubernetes\n\n既然我已经描述了 k8s 的基础知识，或许你可以看出 k8s 为容器提供了一个支持\
  \ HADR 的平台。只要你以正确的方式构建你的部署和服务，SQL Server 就可以利用这种内置的 HADR 能力。在本节中，我将首先描述 HADR 如何与\
  \ k8s 协同工作，然后介绍一个非常棒的教程，你可以用它来逐步完成使用 k8s 部署 SQL Server 的过程。\n\n###### HADR 如何与 k8s\
  \ 协同工作\n\n我已经描述了节点、Pod 和服务的基本术语。让我用一些可视化内容来展示 HADR 如何与 Pod、这些节点的概念以及服务协同工作。\n\n\
  使用 Pod 和持久卷声明配置 SQL Server 是一种共享存储 HADR 解决方案，其提供的功能类似于 Always On 故障转移集群实例。\n\n首先，如果\
  \ k8s 检测到 Pod 出现问题或发生故障，k8s 将在该 Pod 当前运行的同一节点上自动创建一个新的 Pod，这将启动该 Pod 中的任何容器。此外，如果\
  \ Pod 使用了持久卷声明，新 Pod 中的容器将能够访问存储在该持久卷中的相同数据。另外，如果你设置了与该 Pod 关联的负载均衡器服务（该服务有一个唯一的\
  \ IP 地址），用户可以连接到负载均衡器服务（该服务有一个固定的 IP 地址），从而无需了解 Pod IP 地址的细节。图 11-12 展示了 Pod 故障的概念。\n\
  \n![](img/index-599_1.png)\n\n![](img/index-599_2.png)\n\n图 11-12. 针对 Pod 故障的 k8s\
  \ HADR\n\n\n\n### Kubernetes 故障转移支持\n\nKubernetes（k8s）同样支持在节点因任何原因发生故障时进行故障转移。一个新的\
  \ Pod 会在新节点上启动，负载均衡器服务将被重定向到新节点上的新 Pod。由于 k8s 支持节点故障，任何用于 SQL Server 的生产级 k8s 集群都应至少有三个节点以支持故障转移，这不仅是为了\
  \ SQL Server，也是为了负载均衡器服务。图 11-13 展示了此场景。\n\n*图 11-13. 节点故障的 k8s HADR*\n\nk8s 和故障转移的一个未在这些图中列出的有用特性是，当\
  \ SQL Server 在容器中崩溃或关闭时的情况。在这种情况下，k8s 将在同一节点上的同一 Pod 中启动一个新容器。\n\n> **注意**：当 k8s\
  \ 必须在新节点的新 Pod 中启动 SQL Server 容器时，容器启动可能需要更长时间，因为该 SQL Server 镜像可能未在该新节点上缓存，必须从\
  \ Docker Hub 拉取。一旦镜像被拉取，它将被缓存在该节点上，后续的启动应该会更快。\n\n让我们通过查看 Microsoft 文档中支持的一个教程，来了解\
  \ k8s、SQL Server 和内置 HADR 的实际操作。\n\n## 在 Azure Kubernetes Service 中使用 SQL Server\n\
  \n我的一位才华横溢的同事 Mihaela Blendea 花时间构建了一个非常棒的教程，介绍如何使用 AKS 设置带有 k8s 的 SQL Server。我将让你使用自己的\
  \ Azure 订阅来逐步完成本教程，地址为：`https://docs.microsoft.com/sql/linux/tutorial-sql-server-containers-kubernetes`。我已完成本教程，因此让我补充几点观察：\n\
  \n> **提示**：如果你想在不使用本地 `azure CLI` 的情况下完成本教程，请考虑通过门户使用新的 `azure CloudShell`。你会得到一个\
  \ bash shell（或 PowerShell），因此默认安装了诸如 `sqlcmd` 和 `nano` 编辑器等工具。这非常酷！你可以在 `https://azure.microsoft.com/en-us/features/cloud-shell/`\
  \ 阅读更多关于 `azure CloudShell` 的信息。\n\n- 教程中的先决条件指向此文档页面以首先创建 AKS 集群：`http://docs.microsoft.com/azure/aks/tutorial-kubernetes-deploy-cluster`。我只是使用门户创建了一个\
  \ Kubernetes 服务，并使用大部分默认设置创建了我的集群。但是，我必须首先连接到我创建的 AKS 集群，使用此文档部分中的以下步骤：`https://docs.microsoft.com/azure/aks/tutorial-kubernetes-deploy-cluster#connect-to-cluster-using-kubectl`。\n\
  \n我的 Kubernetes 服务（即我的 k8s 集群）在资源组 `bwk8s` 中名为 `bwsqlk8s`。因此，我从 Azure CloudShell\
  \ 使用了以下命令来连接到我的 AKS 服务：\n```\naz aks get-credentials --resource-group bwk8s --name\
  \ bwsqlk8s\n```\n然后，为了验证我的节点，我从 Azure Cloud Shell 运行了以下命令：\n```\nkubectl get nodes\n\
  ```\n我构建了一个三节点集群，所以我的结果看起来像：\n```\nNAME                       STATUS    ROLES  \
  \   AGE       VERSION\naks-agentpool-38442334-0   Ready     agent     21m      \
  \ v1.11.2\naks-agentpool-38442334-1   Ready     agent     21m       v1.11.2\naks-agentpool-38442334-2\
  \   Ready     agent     21m       v1.11.2\n```\n一旦完成，我就可以继续进行教程的下一步。\n\n- 使用以下命令确保包含\
  \ SQL Server 容器的 Pod 正在运行：\n```\nkubectl get pods\n```\n\n\n### 第 11 章：SQL Server\
  \ 与容器\n\n我的 Pod 大约花了五分钟才显示为 `Running` 状态。你的输出应该类似于：\n\n```text\nNAME           \
  \                       READY   STATUS    RESTARTS   AGE\nmssql-deployment-3813464711-h312s\
  \    1/1     Running   0          17m\n```\n\n*   `sqlcmd`（是的！）已内置在 Azure CloudShell\
  \ 中，因此我能够通过负载均衡器服务的外部 IP 地址连接到我新的 SQL Server 部署。\n*   如果你进行删除 Pod 的练习以查看 HADR（高可用性与灾难恢复）的工作原理，新\
  \ Pod 启动可能需要长达四分钟左右。不幸的是，这是在 k8s 中使用 SQL Server 的弱点之一。SQL Server 宕机四分钟可能是一段很长的时间。我们正在努力为\
  \ SQL Server 和 k8s 带来其他创新，以使其更快、更好。\n\n*   使用以下 `kubectl` 命令查看你的 Pod 运行在哪个节点上：\n\
  \n    ```\n    kubectl get pods -o wide\n    ```\n\n*   K8s 甚至支持在运行 SQL Server 的容器崩溃或\
  \ SQL Server 被关闭时重启该容器。你自己试试看。通过负载均衡器的外部 IP 地址连接到 SQL Server 容器，并执行 T-SQL `SHUTDOWN`\
  \ 命令。如果你随后执行 `kubectl get pods`，你会短暂地看到 `STATUS` 显示为 `Error` 和 `CrashLoopBackOff`，但随后在同一个\
  \ Pod 内，它将恢复为 `Running`。\n*   这是一个进阶测试。尝试*排空*运行 SQL Server 容器的 Pod 所在的节点。排空节点是一种模拟节点故障的方法。`kubectl\
  \ get pods -o wide` 命令会显示运行中 Pod 所在节点的名称。使用该名称，执行以下命令：\n\n    ```\n    kubectl drain\
  \ <节点名称> --ignore-daemonsets\n    ```\n\n    现在使用 `kubectl get pods -o wide` 查看\
  \ SQL Server 容器在一个新节点上以新的 Pod 启动。要使你排空的节点可以再次使用，请运行以下命令：\n\n    ```\n    kubectl\
  \ uncordon <节点名称>\n    ```\n\n你可以看到 k8s 内置 HADR 的强大之处。不需要故障转移集群实例软件，而且坦白说，SQL Server\
  \ 并不知道自己运行在这种 HADR 环境中。与任何 SQL Server 生产环境一样，务必制定可靠的备份策略。\n\n我得承认，这是我写过的比较有趣的一章，因为我相信容器和\
  \ k8s 是令人惊叹的新技术，对于托管像 SQL Server 这样的应用和数据库系统将变得越来越流行。在本章中，我向你介绍了容器的基础知识，展示了如何部署和使用带有\
  \ SQL Server 的容器，甚至挑战了 MacBook 用户“无需 Windows”地使用 SQL Server。最后，我通过介绍一种称为 Kubernetes（k8s）的托管\
  \ SQL Server 和容器的新方式来结束本章。\n\n#### 总结\n\n随着本章结束，我也完成了本书的撰写。这是我在微软 25 年职业生涯中做过的最愉快也最困难的事情之一。我带你开启了一段旅程，从\
  \ SQL Server 在 Linux 上的历史背景开始，到部署过程和细节。然后，我向你展示了如何构建自己的数据库和应用程序。接着，我详细介绍了 SQL Server\
  \ 为你提供的所有满足需求的惊人工具和内置功能。然后，通过了解性能、安全和 HADR 方面的能力，你能够看到 SQL Server 真正有多健壮。之后，我让你深入了解了适用于\
  \ Linux 上 SQL Server 的强大管理和监控功能。在第 10 章，我向你展示了迁移技术，包括 SQL Server 与 PostgreSQL 的比较。然后你刚刚读完了关于容器技术的章节，它为部署和运行\
  \ SQL Server 带来了一系列新场景。我希望你喜欢阅读本书，并能在未来你使用 Linux 上的 SQL Server 和容器的旅程中将其作为参考。\n\n\
  ### 第 12 章：结语\n\nSQL Server 工程团队以*云的速度*前进。这是我的观察。\n\n# SQL Server 的未来：Linux、容器与新功能展望\n\
  \n自两年前加入团队以来，我一直见证着 SQL Server 的快速发展。我的好友兼 SQL Server 产品的架构师 Conor Cunningham 曾告诉我，如果我们想的话，微软如今每个月都能发布一个高质量的\
  \ SQL Server 版本。这与“Yukon”（SQL Server 2005）时代相去甚远，那时发布一个版本需要好几年时间。当然，新版本需要有价值和新特性才能在行业中站稳脚跟，所以每月发布一次可能并不合适。SQL\
  \ Server 2017 紧随 SQL Server 2016 之后发布，其重要的一部分是将 SQL Server on Linux 推向市场。\n\n那么\
  \ SQL Server 的下一步是什么，尤其是对于 SQL Server on Linux 和容器而言？\n\n## SQL Server 2017 的改进亮点\n\
  \n在 2017 年 10 月宣布 SQL Server 2017 的同时，我们的团队已经在着手开发下一版 SQL Server，其中包括专门针对 SQL Server\
  \ on Linux 和容器的改进。到本书出版时，我们很可能已经宣布了关于如何改进 SQL Server on Linux 和容器的消息。这些增强功能包括但不限于：\n\
  \n*   `SQL Server 复制`\n*   `机器学习服务`（包括 R、Python，甚至可能还有其他语言）\n*   分布式事务 (`DTC`) 支持\n\
  *   用于复制和链接服务器的 `Active Directory` 集成\n*   适用于 SQL Server on Linux 的 `Polybase`\n\
  \n© Bob Ward 2018\nB. Ward, *Pro SQL Server on Linux*, `doi.org/10.1007/978-1-4842-4128-8_12`\n\
  \n## 第十二章 后记\n\n我们还想继续让容器拥有出色的体验，因此我们计划进行以下改进：\n\n*   用于 `RHEL` 的容器镜像\n*   将容器注册到\
  \ `Microsoft 容器注册表` (`MCR`；你仍然可以在 `Docker Hub` 上找到它们，但它们将链接到 `MCR`)。你可以在 [`azure.microsoft.com/blog/microsoft-syndicates-container-catalog`](https://azure.microsoft.com/blog/microsoft-syndicates-container-catalog)\
  \ 阅读更多关于 `MCR` 的信息。\n*   `Kubernetes` 对 `Always On 可用性组` 的支持。这一点令人兴奋，因为它为 `k8s`\
  \ 上的 `SQL Server` 提供了比共享存储好得多的 `RTO` 方案。Travis Wright 已经制作了一个视频来预览这一体验：[`youtu.be/Xa1ec4z6XIk?list=PL-_k_UrAvrYsSydSyVeXIXy-vInFEruxr`](https://youtu.be/Xa1ec4z6XIk?list=PL-_k_UrAvrYsSydSyVeXIXy-vInFEruxr)。\n\
  \n你还会看到，微软为下一版 SQL Server（包括 Windows 和 Linux 版本）准备了其他新功能和增强功能。此外，我们正在研究与大数据系统集成的新创新，以及\
  \ `SQL Operations Studio` 的普遍可用版（如果这个工具有了新名字，我也不会感到惊讶）。\n\nSQL Server 的未来是光明的。在\
  \ Linux 上发布 SQL Server 为微软打开了新市场、新客户和新机遇。与此同时，我们仍然坚信 SQL Server on Windows Server\
  \ 是一个绝佳的组合。这一切都是关于选择与兼容性：你的选择。加倍投入容器和 `Kubernetes` 等新技术，使 SQL Server 成为面向所有开发者、应用程序以及私有和公共云环境的数据平台。我期待继续帮助微软，使\
  \ SQL Server 在未来岁月里成为首选的现代数据平台。\n\n`索引`\n\n`A`\n\nintelligence, 408\nLinux 与 Windows\
