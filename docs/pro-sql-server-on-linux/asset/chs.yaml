  ' >> ~/.bashrc\n    source ~/.bashrc\n    ```\n\n3.  使用 `sqlcmd` 连接并运行查询。\n\n  \
  \  ```\n    sqlcmd -Usa\n    ```\n\n    系统将提示您输入在安装过程中指定的 `sa` 密码。如果连接成功，您将看到一个如下所示的\
