  SQL Server 旨在适应并最大化计算资源。内存可能是数据库性能最重要的资源之一。SQL Server 为数据库页（缓冲区）以及缓存的 T-SQL 查询和计划等重要资源提供了一个强大的内存管理系统。SQL
  Server 还管理其他内部需求的内存，并通过内存书记员系统进行跟踪。（我在第 5 章提到的一个动态管理视图是 `dm_os_memory_clerks`）。


