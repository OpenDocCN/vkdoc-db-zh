  图 5-45 展示了我为此数据包向控制流添加一个数据流任务后的屏幕。


  ***图 5-45.** 一个已添加到 SSIS 包控制流中的数据流任务*


  在控制流设计器旁边的选项卡是数据流设计器。通过双击名为“数据流任务”的矩形形状，我可以查看此数据流任务的设计。


  对于数据流任务，我需要添加一个数据源（这将是我运行在 Linux 上的 SQL Server）和一个目标（这将是一个平面文件）。对于数据源，我将需要一个 `ODBC`
  源，因为我将在 Linux 服务器上运行此数据包。首先，我从 SSIS 工具栏的“其他源”类别中找到了 `ODBC 源`，并将其拖放到我的设计器窗口中。图 5-46
