  **Anthony Nocentino** 是 Centino 系统的创始人兼总裁，同时是一位 Pluralsight 作者、微软数据平台 MVP 以及 SQL
  Server 和 Linux 专家。在他的咨询实践中，Anthony 负责设计解决方案、部署技术，并提供有关系统性能、架构和安全性的专业知识。Anthony 拥有计算机科学学士和硕士学位，其研究涉及机器虚拟化、高性能/低延迟数据访问算法以及空间数据库系统，并发表过相关论文。你可以在
