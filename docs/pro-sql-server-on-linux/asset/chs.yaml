  ##### 统计信息


  现在可以并行更新统计信息。更多详情请参见以下博客文章：[`blogs.msdn.microsoft.com/sql_server_team/boosting-update-statistics-performance-with-sql-2014-sp1cu6/`](https://blogs.msdn.microsoft.com/sql_server_team/boosting-update-statistics-performance-with-sql-2014-sp1cu6/)。


  #### 最大性能配置


  尽管 SQL Server “开箱即用”就能满足许多应用程序的性能需求，但针对 SQL Server 实例、数据库以及 Linux 内核的配置选项可以帮助你最大化性能。


  这些选项包括通过 `mssql-conf` 配置 SQL Server 实例、使用 T-SQL 系统存储过程 `sp_configure`，以及 T-SQL 的
  `ALTER SERVER CONFIGURATION` 语句。


  **注意**：与任何配置更改一样，我强烈建议你在对本节讨论的配置选项进行任何更改之前，先测试你的应用程序和工作负载。


  ##### SQL Server 实例配置


  SQL Server 的某些配置设置会影响应用程序的最大性能。这些设置包括内存、并行执行、处理器关联性、跟踪、线程、计划缓存和 `tempdb` 文件。


  **注意**：使用 `sp_configure` 和 `ALTER SERVER CONFIGURATION` 进行的配置设置更改可能需要重启 SQL Server
  才能生效。更多详情请查阅 SQL Server 关于 `sp_configure` 的文档：[`docs.microsoft.com/sql/database-engine/configure-windows/server-configuration-options-sql-server`](https://docs.microsoft.com/sql/database-engine/configure-windows/server-configuration-options-sql-server)，或关于
  `ALTER SERVER CONFIGURATION` 的文档：[`docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql)。


  ### 内存


  Linux 上的 SQL Server 默认只分配其所安装 Linux 服务器上物理内存的 80%，以帮助避免 `sqlservr` 进程发生交换。在 RAM
  较大的系统上，预留 20% 的内存可能被视为一种浪费。因此，可以使用 `mssql-conf` 脚本通过 `memorylimitmb` 选项来更改此设置。将此值设置得过高时需谨慎，否则可能会在
  Linux 上遇到 `oom killer` 的问题。你可以在以下链接阅读更多关于 Linux 上 `oom killer` 工作原理的信息：[`unix.stackexchange.com/questions/153585/how-does-the-oom-killer-decide-which-process-to-kill-first`](https://unix.stackexchange.com/questions/153585/how-does-the-oom-killer-decide-which-process-to-kill-first)。


  SQL Server 引擎也有自己的内存限制配置设置，可通过 `sp_configure` 系统存储过程使用。SQL Server 引擎的上限由 `max server
  memory` 设定。默认值为 0，这等效于 80% 的 `memorylimitmb` 数值。如本章前面所述，SQL Server 会将其内存使用量增长到此上限。虽然在
  Windows 上的 SQL Server 中将 `max server memory` 设置为非零值很常见，但由于 `memorylimitmb`...




  在 Linux 上的配置中，很可能将 `max server memory` 设置为 0。SQL Server 也有一个下限，低于该值 SQL Server 将不会缩小其内存占用。


  您可以使用 `sp_configure` 配置 `min server memory` 设置。我通常只在运行着其他程序的服务器上使用 `min server memory`
  设置，这样可以“锁定” SQL Server，防止其将内存缩减得过低。


  ## 第 6 章 性能能力


  ### 注意


  `memorylimitmb` 值不包括 SQL Server 引擎外部组件所需的内存，例如 `SQL Server agent`、`SQLpaL` 和 `host
  extension`。`SQL paL` 和 `host extension` 不应需要 SQL Server 引擎外部的太多内存。对于 `SQL Server
  agent`，您应执行测试以查看代理作业需要多少内存。


  有关这些服务器内存配置选项的完整详细信息，请参阅我们的文档：[`docs.microsoft.com/sql/database-engine/configure-windows/server-memory-server-configuration-options`](https://docs.microsoft.com/sql/database-engine/configure-windows/server-memory-server-configuration-options)。


  ### 并行执行


  我在本章前一节讨论了 SQL Server 将在哪些场景中并行执行任务。可通过 `sp_configure` 系统过程使用的两个实例配置设置是：`max degree
  of parallelism` 和 `cost threshold for parallelism`。


  `max degree of parallelism` 用于控制查询计划中的操作符、索引构建操作、`DBCC CHECKDB`、并行插入、`联机列修改` 和 `统计信息更新`
  所使用的最大并行任务数。默认值为 0，这意味着 SQL Server 会根据可用 CPU 为特定操作确定最佳的并行任务并发数。


  关于此配置值的理想设置，SQL Server 社区已经争论了很长时间。寻找理想值的一个问题是，不同的工作负载在使用较高的 `max degree of parallelism`
  值时可能效果更好。例如，使用 `列存储索引` 的数据仓库工作负载可能会在更多并行任务下达到最大性能。对于具有高并发用户数的 SQL Server 应用程序，尤其是包含
  `OLTP 工作负载` 的应用程序，可能需要更改 `max degree of parallelism` 的默认值。我的经验和测试表明，仅当 SQL Server
  配置在超过八个 CPU 的服务器上运行时才有必要这样做。当我在微软技术支持部门工作时，我们创建了以下知识库文章，为设置 `max degree of parallelism`
  提供更多指导：[`support.microsoft.com/help/2806535/recommendations-and-guidelines-for-the-max-degree-of-parallelism-confi`](https://support.microsoft.com/help/2806535/recommendations-and-guidelines-for-the-max-degree-of-parallelism-confi)。如果您在设置此值时遇到困难，请放心，有数据库选项和查询级提示可用于覆盖此
  SQL Server 实例设置。有关 `max degree of parallelism` 选项的更多详细信息，请参阅我们的文档：[`docs.microsoft.com/sql/database-engine/configure-windows/configure-the-max-degree-of-parallelism-server-configuration-option`](https://docs.microsoft.com/sql/database-engine/configure-windows/configure-the-max-degree-of-parallelism-server-configuration-option)。


