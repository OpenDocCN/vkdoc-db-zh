  这个表定义的另一个方面是一个称为 *约束* 的概念。SQL Server 提供了在定义（或修改）表时，通过约束来声明各种 *完整性* 检查的功能。


  对于 People 表，我可以添加一个主键来强制特定列（或列组合）的每一行具有唯一值。主键约束通过索引实现，默认情况下是 `聚集索引`。聚集索引的实现方式是，将表数据的页面存储在索引的基层，并按聚集索引中的列进行排序。在此示例中，每行必须包含唯一的
  `PersonID` 值。我们将使用之前创建的序列对象来确保每个 `PersonID` 值都是唯一的。


  在此示例中，约束定义中 `[PersonID]` 列旁边的 `ASC` 关键字表示聚集索引将按 `PersonID` 值的升序键顺序排序。


  还有另一种方法可以在表定义的同时定义主键。对于上面的示例，你可以将 `PersonID` 列声明为：


  ```sql

  [PersonID] [int] NOT NULL PRIMARY KEY CLUSTERED

  ```


  另一种约束类型是 *外键约束*，用于确保表之间或同一表内列之间的关系满足引用完整性。在前面的示例中，`LastEditedBy` 列是另一行的 `PersonID`
  值。





