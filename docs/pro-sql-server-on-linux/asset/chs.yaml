  在此屏幕上，我将使用一个 `ODBC` *连接字符串*。连接字符串是提供连接到运行在 Linux 上的 SQL Server（或任何其他基于 `ODBC` 的数据源）所需全部信息的一种方法。对于本示例，我的连接字符串如下所示：


