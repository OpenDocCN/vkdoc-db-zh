- '# 第 2 章 安装与配置


  许多设置需要重启 `mssql-server` 服务。在大多数情况下，当您设置一个选项时，如果该设置需要重启，系统应会提示您执行重启操作。


  例如，以下是启用 SQL Server 代理（从 SQL Server 2017 CU4 开始）的方法：

  ```

  sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

  ```


  以下是您可能需要考虑的一些设置：


  `filelocation.defaultdatadir`：这是创建数据库时存储数据库文件的默认目录。标准默认值是 `/var/opt/mssql/data`。如果更改此默认目录，必须将所有权更改为
  `mssql` 组和用户。


  `filelocation.defaultlogdir`：这是创建数据库时存储事务日志文件的默认目录。标准默认值是 `/var/opt/mssql/data`。如果更改此默认目录，必须将所有权更改为
  `mssql` 组和用户。


  `filelocation.errorlogfile`：这是存储 `ERRORLOG` 和其他“日志”文件的默认目录。标准默认值是 `/var/opt/mssql/log`。如果更改此默认目录，必须将所有权更改为
  `mssql` 组和用户。


  `network.tcpport`：这将成为 SQL Server 侦听的新 TCP 端口号。端口 1433 是默认值，通常没有其他应用程序使用它，但可能存在冲突，因此此选项允许您更改默认值。如果更改了默认
  TCP 端口，在连接到 SQL Server 时需要指定端口。例如，如果将 TCP 端口更改为 1401，则需要使用 `sqlcmd` 等工具按如下方式连接到本地
  Linux 服务器上的 SQL Server：

  ```

  sqlcmd -Usa -S localhost,1401

  ```


  **注意** 与端口 1433 一样，请确保配置 `firewalld` 以打开 SQL Server 使用的新端口。


  `filelocation.defaultbackupdir`：这是使用 `T-SQL BACKUP` 命令时存储 SQL Server 备份的默认目录。标准默认值是
  `/var/opt/mssql`。如果更改了备份的默认目录，必须将所有权更改为 `mssql` 组和用户。


  `telemetry.customerfeedback`：默认情况下，SQL Server 收集有关 SQL Server 配置和性能的信息。这有助于 Microsoft
  改进当前和未来版本的 SQL Server 开发。此反馈不收集任何客户数据。在付费版本的 SQL Server 上，您可以使用此 `mssql-conf` 设置禁用此信息收集。有关客户反馈的完整透明讨论，请参阅此文档：[`docs.microsoft.com/sql/linux/sql-server-linux-customer-feedback`](https://docs.microsoft.com/sql/linux/sql-server-linux-customer-feedback)。


  我建议您花时间查看所有可能的配置设置，看看其他设置是否适合您对 SQL Server 的使用。


  `unset`：允许您将使用 `set` 选项所做的更改恢复为该设置的默认值。您也可以使用 `set` 参数将值设置回其默认值，但您可能不记得那些默认设置。


  例如，基于前面启用 SQL Server 代理的示例，您可以使用 `set` 参数将 `sqlagent.enabled` 值设置为 `false`，或者您可以执行：

  ```

  sudo /opt/mssql/bin/mssql-conf unset sqlagent.enabled

  ```


  **注意** 许多 `unset` 选项需要重启 `mssql-server` 服务才能生效，但截至 SQL Server 2017 CU4，系统不会提示您执行此操作。经验法则是，如果等效的
  `set` 选项需要重启，则重启 SQL Server。


  `traceflag`：跟踪标志是在许多不同级别影响 SQL Server 行为的“旋钮”。您将在本书中了解到可用于所有类型的



  场景。某些跟踪标志需要在 SQL Server 启动时启用，或启用后使其全局应用于所有 SQL Server 会话。对于这些场景，请使用 `mssql-conf`
  的 `traceflag` 参数。例如，若希望将关于死锁的诊断信息捕获到 SQL Server 错误日志中，您可以这样开启 `traceflag 1222`：


  `sudo /opt/mssql/bin/mssql-conf traceflag 1222 on`


