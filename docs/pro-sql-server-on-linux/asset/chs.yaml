  \n    **注意** 在完整的 `WideWorldImporters` 示例中，`Customers` 表具有对数据库中其他表的外键引用，但在本章中我省略了这些引用，以保持此示例的完整性和简洁性。\n\
  \n## 创建完整数据库\n\n让我们回顾一下在该数据库中创建架构、序列对象、表和约束的整个序列。\n\n通常，当我构建一个包含对象的完整数据库定义时，我会创建一个脚本来驱动所有\
  \ T-SQL 脚本的执行。我提供了两个示例脚本，你可以使用它们一次性创建所有内容：\n\n*   `createwwi.sh` 适用于 macOS 和 Linux\
  \ 用户\n*   `createwwi.cmd` 适用于 Windows 用户。\n\n这些脚本假设你已经安装了 `sqlcmd` 工具，`sqlcmd` 在你的系统路径中，并且需要两个命令行参数：服务器名称和\
  \ sa 密码。`sqllogin` 在 `createlogin.sql` 脚本中使用和创建。该登录名的密码在那个 T-SQL 脚本中，因此如果你修改了我提供的密码，你也需要修改\
  \ shell 或 cmd 脚本。如果你在 Linux 上执行 `createwwi.sh` 脚本，别忘了先执行 `chmod u+x createwwi.sh`\
  \ 以使其可执行。\n\n**注意** 这些脚本假设 `sqlcmd` 在系统路径中。对于 Windows，安装后它通常应该已经在路径中。对于 Linux，如果你尚未添加，请确保使用以下\
  \ bash shell 命令将其添加到你的路径中：\n\n```bash\necho 'export PATH=\"$PATH:/opt/mssql-tools/bin\"\
  ' >> ~/.bash_profile\necho 'export PATH=\"$PATH:/opt/mssql-tools/bin\"' >> ~/.bashrc\n\
  source ~/.bashrc\n```\n\n在 Windows 的 Powershell 命令提示符下，在我的环境中执行 `createwwi.cmd`\
  \ 的样子如下：\n\n```powershell\n.\\createwwi bwsql2017rhel Sql2017isfast\n```\n\n在我的\
  \ Linux shell 中，以下是在我的 Linux 服务器上运行 `createwwi.sh` 的执行示例：\n\n```bash\n./createwwi.sh\
  \ localhost Sql2017isfast\n```\n\n这些 shell 和命令脚本执行以下 T-SQL 脚本来创建登录名、数据库以及数据库中的对象：\n\
  \n\n\n# 第三章 构建数据库与 T-SQL 基础\n\n## 1. **cleanup.sql**：我添加了这个脚本，以便您可以反复运行这些脚本。\n`cleanup.sql`\
  \ 用于删除之前所有执行中创建的数据库。尽管在第 3 步中会删除 `WideWorldImporters` 数据库，但如果您已经在 `sqllinux` 登录名的上下文中创建了它，那么在不先删除数据库的情况下，您将无法再次删除和重新创建该登录名。\n\
  \n## 2. **createlogin.sql**：创建 `sqllinux` 登录名（需以 `sa` 登录名连接执行）。\n\n## 3. **dropandcreatedb.sql**：创建数据库。\n\
  当上下文切换到 `WideWorldImporters` 时，这将使 `sqllinux` 登录名成为 `WideWorldImporters` 数据库中的 `dbo`（数据库所有者）用户。\n\
  \n## 4. **createschemas.sql**：为数据库中的所有对象创建架构。\n\n## 5. **createsequences.sql**：为两个表使用的序列对象。\n\
  \n## 6. **createpeople.sql**：创建带约束的 `People` 表。\n\n## 7. **createcustomers.sql**：创建带约束的\
  \ `Customers` 表。\n\n现在，一切已准备就绪，您可以测试一些 T-SQL 查询来插入数据、查询数据、更新和删除行了。\n\n## 构建与运行查询\n\
  \n我建议通过一个独立的工具来创建和测试您希望在应用程序中使用的 T-SQL 查询，这样可以确保没有语法错误并能按预期运行。在应用程序外部调试 T-SQL 命令要比将其交织在代码中容易得多。因此，在本章的这一部分，我将展示如何使用基本的\
  \ T-SQL 语句来插入、更新、删除和查看数据。本节的示例语句和脚本假设您已经运行了前面所有用于创建数据库和对象的脚本。与本章中创建数据库和对象的脚本一样，我也是使用\
  \ `sqllinux` 登录名执行了以下所有的 T-SQL 语句和脚本。\n\n##### 插入与读取数据\n\n出于本章的目的，我将讨论单行数据的简单插入。您有多种选项可以*批量*插入数据，我将在本书的其他章节中讨论这些方法。\n\
  \n用于插入数据的基本 T-SQL 语句是 `INSERT`。当您向包含外键的表中插入数据时，需要首先向基表中插入行。这意味着您应该首先在 `People` 表中插入任何需要在\
  \ `Customers` 表中作为外键使用的行。\n\n在 `Customers` 表中，这些列被引用回 `People` 表：\n\n- `AlternateContactPersonID`\n\
  - `LastEditedBy`\n- `PrimaryContactPersonID`\n\n当您为一个客户插入单行数据时，需要为这些列提供 `PersonID`\
  \ 值。它们可能是同一个“人”，但更有可能是至少两到三个不同的人。如果您还记得，`People` 表中有一个 `LastEditedBy` 列，它引用了该表中的另一行。因此，我的策略是在\
  \ `People` 表中创建三行：一行作为两个表中任何行的“编辑者”，另外两行作为客户的主联系人和备用联系人 ID。\n\n执行以下 T-SQL 语句或使用示例脚本\
  \ `insertpeople.sql` 来在 `People` 表中插入所有三行：\n\n```sql\nUSE [WideWorldImporters]\n\
  GO\nINSERT INTO [Application].[People]\n([PersonID], [FullName], [PreferredName],\
  \ [IsPermittedToLogon],\n[LogonName], [IsExternalLogonProvider], [IsSystemUser],\n\
  [IsEmployee], [IsSalesPerson], [LastEditedBy])\nVALUES (0, 'Robert Dorr', 'TheKraken',\
  \ 1, 'rdorr', 0, 1, 1, 0, 0)\nGO\nINSERT INTO [Application].[People]\n([FullName],\
  \ [PreferredName], [IsPermittedToLogon],\n[LogonName], [IsExternalLogonProvider],\
  \ [IsSystemUser],\n[IsEmployee], [IsSalesPerson], [LastEditedBy])\nVALUES ('Slava\
  \ Oks', 'thegodfather', 1, 'slavao', 0, 1, 1, 0, 0)\nGO\nINSERT INTO [Application].[People]\n\
  ([FullName], [PreferredName], [IsPermittedToLogon],\n[LogonName], [IsExternalLogonProvider],\
  \ [IsSystemUser],\n[IsEmployee], [IsSalesPerson], [LastEditedBy])\nVALUES ('Tobias\
  \ Ternstrom', 'theswede', 1, 'tobiast', 0, 1, 1, 0, 0)\nGO\n```\n\n\n\n\n### 第 3\
  \ 章：构建数据库与 T-SQL 基础\n\n如果查看我使用的 INSERT 语法，会发现我列出了具体的列名，并且没有为许多定义为允许 NULL 值的列（即可选列）提供值。\n\
  \n要插入单个客户，我必须知道该客户的主要和备选联系人的`PersonID`值是什么。你可以通过使用 T-SQL `SELECT`语句从`People`表中读取行来实现这一点，如脚本`findpeople.sql`所示：\n\
  \n```sql\nUSE [WideWorldImporters]\nGO\nSELECT [PersonID], [FullName] FROM [Application].[People]\n\
  GO\n```\n\nVisual Studio 右侧的结果窗格将显示以下结果：\n\n| PersonID | FullName       |\n|----------|----------------|\n\
  | 0        | Robert Dorr    |\n| 1        | Slava Oks      |\n| 2        | Tobias\
  \ Ternstrom |\n\nSlava Oks 将作为主要客户联系人，Tobias Ternstrom 作为备选客户联系人，而 Robert Dorr（又名“TheKraken”）将继续担任我的“编辑”。\n\
  \n现在我有了插入新客户的基础。因为列`[BillToCustomerID]`引用了一个有效的`[CustomerID]`，所以我使用一种称为变量的功能来获取一个`SEQUENCE`值，然后将其用于这两个列。执行以下\
  \ T-SQL 语句或使用示例脚本`insertcustomer.sql`：\n\n```sql\nUSE [WideWorldImporters]\nGO\n\
  DECLARE @CustomerID INT\nSET @CustomerID = NEXT VALUE for [Sequences].[CustomerID]\n\
  INSERT INTO [Sales].[Customers]\n([CustomerID], [CustomerName], [BillToCustomerID],\
  \ [CustomerCategoryID],\n[PrimaryContactPersonID],\n[AlternateContactPersonID],\
  \ [DeliveryMethodID], [DeliveryCityID],\n[PostalCityID],\n[AccountOpenedDate], [StandardDiscountPercentage],\
  \ [IsStatementSent],\n[IsOnCreditHold],\n[PaymentDays], [PhoneNumber], [FaxNumber],\
  \ [WebsiteURL],\n[DeliveryAddressLine1],\n[DeliveryPostalCode], [PostalAddressLine1],\
  \ [PostalPostalCode],\n[LastEditedBy])\nVALUES (@CustomerID, 'WeLoveSQLOnLinux',\
  \ @CustomerID, 1, 1, 2, 1, 1, 1,\ngetdate(), 0.10, 0, 0, 30,\n'817-111-1111', '817-222-2222',\
  \ 'www.welovesqlonlinux.com', 'Texas',\n'76182', 'Texas', '76182', 0)\nGO\n```\n\
  \n注意，对于`[AccountOpenedDate]`列，我使用了`getdate()`来提供 datetime 值（`getdate()`根据安装 SQL\
  \ Server 的计算机提供本地日期时间）。这是一个可以与 T-SQL 查询一起使用的内置函数示例。有关 SQL Server 函数的更多信息，请参阅我们的文档：[`docs.microsoft.com/sql/t-sql/functions/functions`](https://docs.microsoft.com/sql/t-sql/functions/functions)。\n\
  \n现在我可以从`Customer`表读取并与`People`表联接，以获取客户的名称及其主要联系人姓名，T-SQL 语句如示例脚本`findcustomer.sql`所示：\n\
  \n```sql\nUSE [WideWorldImporters]\nGO\nSELECT c.[CustomerName], c.[WebsiteURL],\
  \ p.[FullName] AS PrimaryContact\nFROM [Sales].[Customers] AS c\nJOIN [Application].[People]\
  \ AS p\nON p.[PersonID] = c.[PrimaryContactPersonID]\nGO\n```\n\n此查询的结果如下行所示：\n\n\
  | CustomerName      | WebsiteURL          | PrimaryContact |\n|-------------------|---------------------|----------------|\n\
  | WeLoveSQLOnt...   | www.welovesql...    | Slava Oks      |\n\n##### 更新与删除数据\n\n\
  既然你已经学习了如何从这些表中插入和检索行的示例，那么任何使用 SQL Server 的应用程序的另外两个关键操作就是更新和删除行的能力。执行这些操作的语法非常简单。\n\
  \n假设你想更新“WeLoveSQLOnLinux”公司，因为他们搬迁了网站，所以要更改他们的网站。执行以下 T-SQL 语句或使用示例脚本`updatecustomer.sql`：\n\
  \n```sql\nUSE [WideWorldImporters]\nGO\nUPDATE [Sales].[Customers]\nSET WebsiteURL\
  \ = 'www.sqlonlinux.com'\nWHERE CustomerName = 'WeLoveSQLOnLinux'\nGO\n```\n\n你可能还想删除一个客户行，像这样使用来自示例脚本`deletecustomer.sql`的\
  \ T-SQL 查询：\n\n```sql\nUSE [WideWorldImporters]\nGO\nBEGIN TRANSACTION\nDELETE FROM\
  \ [Sales].[Customers]\nWHERE CustomerName = 'WeLoveSQLOnLinux'\n```\n\n\n## 回滚事务\n\
  \n```sql\nROLLBACK TRANSACTION\nGO\n```\n\n我额外为你设置了一个难点。请注意 T-SQL 命令 `BEGIN TRANSACTION`\
  \ 和 `ROLLBACK TRANSACTION`。实际上，我之前展示的所有 T-SQL 命令都有一个隐式的事务提交。而使用 `BEGIN TRANSACTION`\
  \ 语法则允许我显式地决定提交或回滚（撤销）我的 T-SQL 命令。在此例中，`DELETE` 语句被执行，但随后的 `ROLLBACK TRANSACTION`\
  \ 撤销了该更改。\n\n关于 SQL Server 事务的详细讨论，请参阅我们的文档页面：`https://docs.microsoft.com/sql/t-sql/language-elements/transactions-transact-sql`。\n\
  \n## 构建视图和存储过程\n\nSQL Server 具有内置功能，可用于创建其他类型的对象，以帮助提供抽象化并封装查询逻辑。其中一种对象称为 `view`（视图），这是许多数据库系统中的常见功能。视图允许你基于来自一个或多个表的\
  \ T-SQL `SELECT` 语句来创建对象。\n\n例如，我可以基于之前展示的 `Customer` 表和 `People` 表之间的连接，通过以下 T-SQL\
  \ 语句创建一个视图，如示例脚本 `createview.sql` 所示：\n\n```sql\nUSE [WideWorldImporters]\nGO\n\
  DROP VIEW IF EXISTS [Sales].[CustomerContacts]\nGO\nCREATE VIEW [Sales].[CustomerContacts]\n\
  AS\nSELECT c.[CustomerName], c.[WebsiteURL], p.[FullName] AS PrimaryContact\nFROM\
  \ [Sales].[Customers] AS c\nJOIN [Application].[People] AS p\nON p.[PersonID] =\
  \ c.[PrimaryContactPersonID]\nGO\n```\n\n现在，我可以针对视图中的所有列执行一条 T-SQL 语句，如示例脚本 `findcustomercontacts.sql`\
  \ 所示：\n\n```sql\nUSE [WideWorldImporters]\nGO\nSELECT * FROM [Sales].[CustomerContacts]\n\
  GO\n```\n\n我得到了与执行连接相同的结果，但我已将“查找客户联系人”的逻辑从用户或应用程序中抽象出来。当你希望向用户隐藏 `base`（基表）的某些列，并只允许他们访问特定列时，视图是非常常见的解决方案。\n\
  \nSQL Server 中另一种非常常见的对象是 `stored procedure`（存储过程）。在 SQL Server 中使用存储过程通常被称为 `server-side\
  \ programming`（服务器端编程）。存储过程可以包含多个 T-SQL 语句（这些语句通常可能又长又复杂）。这免除了应用程序需要在其代码中包含所有 T-SQL\
  \ 语句的麻烦。存储过程还减少了来自客户端应用程序的网络流量，并且在内存中被高效缓存。\n\n我可以采用插入客户行的 `INSERT` 语句，并构建一个存储过程，如下列\
  \ T-SQL 语句所示，如示例脚本 `insertcustomerproc.sql` 所示：\n\n```sql\nUSE [WideWorldImporters]\n\
  GO\nDROP PROCEDURE IF EXISTS [Sales].[InsertCustomer]\nGO\nCREATE PROCEDURE [Sales].[InsertCustomer]\n\
  @PrimaryContactID INT, @AlternateContactID INT\nAS\n-- 查找已知的 PersonID = 0 的普通编辑者\n\
  DECLARE @EditedBy INT\nSELECT @EditedBy = PersonID FROM [Application].[People]\n\
  WHERE PersonID = 0\n-- 插入到 Customers 表\n-- 主联系人和备用联系人作为参数传入\nDECLARE @CustomerID\
  \ INT\nSET @CustomerID = NEXT VALUE for [Sequences].[CustomerID]\nINSERT INTO [Sales].[Customers]\n\
  ([CustomerID], [CustomerName], [BillToCustomerID], [CustomerCategoryID],\n[PrimaryContactPersonID],\n\
  [AlternateContactPersonID], [DeliveryMethodID], [DeliveryCityID],\n[PostalCityID],\n\
  [AccountOpenedDate], [StandardDiscountPercentage], [IsStatementSent],\n[IsOnCreditHold],\n\
  [PaymentDays], [PhoneNumber], [FaxNumber], [WebsiteURL],\n[DeliveryAddressLine1],\n\
  [DeliveryPostalCode], [PostalAddressLine1], [PostalPostalCode],\n[LastEditedBy])\n\
  VALUES (@CustomerID, 'WeAllLoveSQLOnLinux', @CustomerID, 1, @PrimaryContactID,\n\
  @AlternateContactID, 1, 1, 1, getdate(), 0.10, 0, 0, 30,\n'817-111-1111', '817-222-2222',\
  \ 'www.welovesqlonlinux.com', 'Texas', '76182',\n'Texas', '76182', @EditedBy)\n\
  GO\n```\n\n\n此过程内置了查找 `LastEditedBy` 列的逻辑，并接收两个参数作为主要联系人和备用联系人。\n\n要执行此过程，您需要运行一条\
  \ T-SQL 语句，例如示例脚本 `execinsertcustomer.sql` 中所示：\n\n```sql\nUSE [WideWorldImporters]\n\
  GO\nEXEC [Sales].[InsertCustomer] 1, 2\nGO\n```\n\n要了解更多关于存储过程的强大功能，请参阅我们的文档：[`docs.microsoft.com/sql/t-sql/statements/create-procedure-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-procedure-transact-sql)。\n\
  \n### 第 3 章：构建数据库与 T-SQL 基础\n\n#### 小结\n\n在本章中，我介绍了创建数据库以及数据库中对象的基础知识。我使用了流行的开源、跨平台工具\
  \ Visual Studio Code 来展示所有示例，通过 `mssql` 扩展来演示 T-SQL 的基础。\n\n有了这些知识作为基础，我将在下一章中，继续使用同一个\
  \ `WideWorldImporters` 数据库示例，向您展示如何构建一个应用程序、学习更高级的 T-SQL 概念，并探索 SQL Server 2017\
  \ on Linux 带来的新特性。\n\n### 第 4 章：构建应用程序与高级 T-SQL\n\n既然您已经学习了如何创建数据库、表以及执行基本的 T-SQL\
  \ 查询，是时候编写一些代码并构建一个连接到 SQL Server on Linux 的应用程序了。和第 3 章一样，我将使用 Visual Studio Code\
  \ 作为开发环境来构建一个 node.js 应用程序。\n\n该 node.js 应用程序使用的 T-SQL 查询基于我在第 3 章向您展示的知识。因此，在本章的第二部分，我将向您展示更高级的\
  \ T-SQL 功能，以及在 SQL Server 2016 和 2017 中发布的新特性。\n\n我在撰写本章时参考了三种资源，相信您也会觉得它们很有用：\n\
  \n- [`aka.ms/sqldev`](http://aka.ms/sqldev)：关于如何在多种平台上、使用几乎任何语言为 SQL Server 构建应用程序的资源与教程。\n\
  - [`code.visualstudio.com/docs/nodejs/nodejs-tutorial`](https://code.visualstudio.com/docs/nodejs/nodejs-tutorial)：关于如何使用\
  \ Visual Studio Code 构建 node.js 应用程序的教程。\n- [`docs.microsoft.com/sql/linux/sql-server-linux-develop-use-vscode`](https://docs.microsoft.com/sql/linux/sql-server-linux-develop-use-vscode)：关于如何为\
  \ Visual Studio Code 使用 `mssql` 扩展的教程。\n\n© Bob Ward 2018\n\nB. Ward, *《Linux 上的\
  \ SQL Server 专业指南》*, `doi.org/10.1007/978-1-4842-4128-8_4`\n\n### 设置您的环境\n\n在第 3\
  \ 章中，我描述了如何使用 Visual Studio Code 和 `mssql` 扩展来设置运行 T-SQL 查询的环境。如果您跳过第 3 章直接来到本章，您将需要执行以下步骤来安装和配置本章示例所需的内容：\n\
  \n- 从 [`code.visualstudio.com/`](https://code.visualstudio.com/) 安装 Visual Studio\
  \ Code。\n- 按照 [`docs.microsoft.com/sql/linux/sql-server-linux-develop-use-vscode?view=sql-server-linux-2017#install-the-mssql-extension`](https://docs.microsoft.com/sql/linux/sql-server-linux-develop-use-vscode?view=sql-server-linux-2017#install-the-mssql-extension)\
  \ 的说明，为 Visual Studio Code 安装 `mssql` 扩展。\n- 如果您尚未安装 SQL 命令行实用工具。\n\n\n\n### 第 4\
  \ 章：构建应用程序与高级 T-SQL\n\n### 设置与前置条件\n\n包含`sqlcmd`，请从[www.microsoft.com/download/details.aspx?id=53591](http://www.microsoft.com/download/details.aspx?id=53591)下载\
  \ Windows 版本，或从[`docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-tools`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-tools)下载\
  \ Linux/macOS 版本。请确保`sqlcmd`已添加到系统路径中，以便运行示例脚本。\n\n*   将第 3 章和第 4 章的示例脚本和代码复制到将在\
  \ Visual Studio Code 中打开的本地目录。我在 Windows 上的本地目录名为`c:\\wwi`。如果您仍保留着第 3 章的运行环境，只需将所有第\
  \ 4 章代码和脚本复制到`c:\\wwi`或您创建的任何文件夹中。\n*   为`sqllinux`用户设置连接配置文件。关于如何操作，请参阅第 3 章中“创建登录名和用户”一节。\n\
  *   本章中的所有代码和 T-SQL 脚本旨在按顺序运行。为从干净状态开始，请运行第 3 章提供的`createwwi.sh`（macOS 或 Linux）或`createwwi.cmd`（Windows）脚本。这些脚本使用`sqlcmd`，并接受两个参数：服务器和\
  \ sa 密码。\n\n### 填充数据库\n\n执行第 3 章中的 T-SQL 脚本`insertpeople.sql`和`insertcustomer.sql`，以填充`People`和`Customers`表。同时，执行\
  \ T-SQL 脚本`insertcustomerproc.sql`以创建存储过程，该存储过程将在本章后面的 node.js 示例中使用。\n\n### 开发环境\n\
  \n本章示例将使用 Windows 版本的 Visual Studio Code，用于 SQL Server T-SQL 命令以及 Windows 版本的 node.js。但是，由于\
  \ Visual Studio Code 和 node.js 均支持 MacOS 和 Linux，因此所有示例都可在您偏好的开发平台上运行。\n\n因为我正在构建一个\
  \ node.js 应用程序，所以另一项任务是安装必要的组件，以便在我的 Windows 笔记本电脑上运行 node.js。我使用了从[`nodejs.org/en/download`](https://nodejs.org/en/download)找到的\
  \ Windows 安装包（安装时使用了所有默认选项）。\n\n## 为 SQL Server 构建和运行数据应用程序\n\n多年前，为 SQL Server\
  \ 构建的应用程序仅使用 Visual Basic、C 或 C++编写，通过支持 ODBC 或 OLE-DB 等编程接口的驱动程序进行连接。几年前，微软有意识地努力扩展编程接口，以支持更广泛的语言、接口和平台。\n\
  \n如今，几乎可以用您能想到的任何语言编写程序来访问 SQL Server。无论您想用 Java、C#、PHP 还是 Python 开发程序，SQL Server\
  \ 都提供您所需的支持。由于有了[`aka.ms/sqldev`](http://aka.ms/sqldev)这个便捷的网站，我不再尝试记住所有支持的编程语言。\n\
  \n图 4-1 展示了[`aka.ms/sqldev`](http://aka.ms/sqldev)网站提供的选项。\n\n![](img/index-135_1.jpg)\n\
  \n*图 4-1. SQL Server 编程语言选项*\n\n作为对这些编程语言支持的一部分，SQL Server 还支持多种对象关系映射（ORM）框架，包括\
  \ Entity Framework、Hibernate ORM、Sequelize ORM 和 Django。有关驱动程序和 ORM 框架支持的完整列表，请参阅我们的文档：[`docs.microsoft.com/sql/connect/sql-connection-libraries`](https://docs.microsoft.com/sql/connect/sql-connection-libraries)。\n\
  \n## 在 SQL Server 中使用 node.js\n\n\n\n在构建应用程序，尤其是在 Linux 上，较为流行的编程语言之一是基于 Javascript\
