  \ bash shell 中运行以下命令（输入你的 sa 密码）来还原容器镜像中的数据库。这个命令很长，所以我提供了一个名为 `dockerrunmyimage.sh`\
  \ 的示例脚本。\n```\nsudo docker exec -it sql3 /opt/mssql-tools/bin/sqlcmd \\\n-S localhost\
