  \n#### 完整的安装体验\n\n我告诉过你 SQL Server 的安装很简单。本节涵盖与安装相关的主题，我相信你会发现这些主题对于提供完整的安装体验很有用。学习如何安装其他版本的\
  \ SQL Server、验证你的安装、执行无人参与和离线安装、在云端安装以及学习故障排除技巧。\n\n##### 安装其他版本\n\nSQL Server 2017\
  \ 有两个主要的安装源仓库：\n\n- `mssql-server-2017`：基于 SQL Server 2017 的累积更新（CU）的最新发布版本。选择此项以使用\
  \ SQL Server 2017 的最新更新。本章前面以及我们在官方 Microsoft 文档中的教程中展示的步骤都使用此仓库。\n- `mssql-server-2017-gdr`：SQL\
  \ Server 2017 的常规分发版本（GDR）。如果你只想要 SQL Server 2017 的安全性和关键更新，请选择此项。在 SQL Server 某个主要版本的生命周期内，此仓库的更新通常非常少。\n\
  \n未来版本的 SQL Server 可能会有不同的仓库名称。\n\n**注意**，还有一个名为`mssql-server`的预览版仓库。如果你曾使用过此仓库，请务必在安装\
  \ SQL Server 之前移除 SQL Server 并切换到已发布的仓库之一。\n\n通常每月，Microsoft 会发布一个名为累积更新（`CU`）的\
  \ SQL Server 2017 更新。这是产品的修复和增强功能的集合，它们从`CU1`开始连续编号。顾名思义，每个`CU`都包含前一个构建的更改。请参阅我们的发布说明以获取更多信息...\n\
  \n以下是翻译后的中文内容：\n\n\n这些构建版本的完整列表请参阅：[`docs.microsoft.com/sql/linux/sql-server-linux-release-notes`](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes)\n\
  \n## 第 2 章 安装与配置\n\n每当需要解决安全问题或关键故障时，Microsoft 会发布 GDR 构建版本。这样，如果你想运行基于发布到制造（RTM）构建版本并包含安全更新/关键修复的\
  \ SQL Server，你可以选择 GDR 仓库来获取最新构建版本。\n\n**注意** 在 SQL Server 2017 之前，Microsoft 会发布\
  \ GDR、CU 和 Service Pack 版本。从 SQL Server 2017 开始，Microsoft 将不再发布 Service Pack 版本。\n\
  \n本节前面复制仓库文件的说明使用的是 CU 仓库。一旦你复制了仓库文件，以后使用包管理器进行的任何安装或更新命令都将使用该仓库。如果你想更改使用的仓库，必须先删除之前的仓库文件，然后复制新的仓库文件。\n\
  \n例如，如果你之前使用了 `mssql-server-2017.repo` 文件，并希望从 GDR 仓库卸载并重新安装，你需要：\n\n1.  像这样删除之前的仓库文件\n\
  \n    ```\n    sudo rm /etc/yum.repos.d/mssql-server.repo\n    ```\n\n2.  卸载 SQL\
  \ Server\n\n3.  像这样复制新的仓库文件（假设是 RHEL 系统，但如何为 Ubuntu 和 SLES 执行此操作请参阅我们的安装文档）\n\n\
  \    ```\n    sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017-gdr.repo\n\
  \    ```\n\n4.  安装 SQL Server\n\n此外，默认情况下，安装和更新将使用这些仓库中的最新构建版本。要安装特定的包版本，你可以对该版本的包进行离线安装，或者使用以下\
  \ `yum` 语法：\n\n```\nsudo yum install -y mssql-server:<package version>\n```\n\n\
  要查找 SQL Server 的所有包版本，请在 `bash` shell 中运行以下命令：\n\n```\nsudo yum list mssql-server\
  \ --showduplicates\n```\n\n![](img/index-67_1.png)\n\n## 第 2 章 安装与配置\n\n至少，我建议你使用\
  \ GDR 仓库中的最新构建版本来获取任何安全和关键更新。大多数客户使用 CU 仓库，并且没有遇到任何重大问题。\n\nMicrosoft 发布说明页面列出了每次更新，包括指向\
  \ Microsoft 支持文章的参考，其中描述了每次更新中的变更内容。你可以在 [`docs.microsoft.com/sql/linux/sql-server-linux-release-notes`](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes)\
  \ 阅读更多信息。\n\n##### 验证安装\n\n完成 SQL Server 安装后，我建议执行一些基本的验证步骤，以及其他一些操作，以确保安装后的体验更加顺畅。此外，你在此过程中还会了解到一些关于\
  \ SQL Server 的知识。我强烈建议你至少完成基本建议步骤，以避免日后出现问题。\n\n### 检查 mssql-server 服务是否正在运行\n\n\
  随时运行以下命令检查 `mssql-server` 服务状态：\n\n```\nsudo systemctl status mssql-server\n```\n\
  \n如果 SQL Server 正在运行，此命令的输出应类似于图 2-7。\n\n**图 2-7. 正在运行的 mssql-server 服务**\n\n![](img/index-68_1.png)\n\
  \n## 第 2 章 安装与配置\n\n如果你查看此输出，会看到一个主 PID（代表进程 ID），下面列出了两个进程 ID。\n\n回想一下，在第 1 章中，我提到当\
  \ SQL Server 启动时，存在一个父级“看门狗”进程。在你从 `systemctl` 看到的输出中，顶部进程 2548 是“看门狗”进程，第二个进程 2573\
  \ 是实际运行所有 SQL Server 引擎代码的 `SQLSERVR` 进程。在 Linux 上，你总是会看到两个 `SQLSERVR` 进程，因此像这样的命令\n\
  \n```\nps axjf | grep sqlservr\n```\n\n产生的输出类似于图 2-8。\n\n**图 2-8. 查找 sqlservr 的进程**\n\
  \n\n\n## 第二章：安装与配置\n\n由于我使用了 `grep`，输出结果未显示列名。第二列是进程 PID，第一列是父进程 PID。因此，进程 `2548`\
  \ 是“父级”看守进程 `SQLSERVR`，而 `2573` 是其“子级”进程，但也是“主” `SQLSERVR` 进程。\n\n如果 SQL Server\
  \ 运行不正常或安装过程中出现故障，请参阅本章的“安装故障排除”部分。我见过最常见的错误是跳过了使用 `setup` 选项运行 `mssql-conf` 脚本的步骤。\n\
  \n###### 本地连接并运行查询\n\n按照以下说明，在 Linux 服务器上使用基本的命令行工具 `sqlcmd`，以证明您可以连接并运行查询。`sqlcmd`\
  \ 是一个允许您对任何已安装的 SQL Server 执行 T-SQL 命令的工具。\n\n1.  安装适用于 RHEL 的工具包和 ODBC。\n    **注意**，有关在所有发行版上安装命令行工具的完整说明，请[访问\
  \ https://docs.microsoft.com/sql/](https://docs.microsoft.com/sql/linux/sql-server-linux-setup-tools)。\n\
  \n    ```\n    sudo curl -o /etc/yum.repos.d/msprod.repo https://packages.microsoft.com/config/rhel/7/prod.repo\n\
  \    ```\n\n    输出结果与下载 `mssql-server` 的仓库文件非常相似。\n\n    ```\n    sudo yum install\
  \ -y mssql-tools unixODBC-devel\n    ```\n\n    需要安装两个软件包：(1) 命令行工具和 (2) Linux ODBC\
  \ 包（Linux 上的 `sqlcmd` 使用 ODBC）。这正是 `yum` 大显身手的地方，因为它会自动检测到对 `msodbcsql` 包的依赖关系。例如：\n\
  \n    ```\n    Loaded plugins: product-id, search-disabled-repos, subscription-manager\n\
  \    Resolving Dependencies\n    --> Running transaction check\n    ---> Package\
  \ mssql-tools.x86_64 0:14.0.6.0.1 will be installed\n    -->  Processing Dependency:\
  \ msodbcsql < 13.2.0.0 for package: mssql-tools-14.0.6.0-1.x86_64\n    -->  Processing\
  \ Dependency: msodbcsql >= 13.1.0.0 for package: mssql-tools-14.0.6.0.1-x86_64\n\
  \    ---> Package unixODBC-devel.x86_64 0:2.3.1-11.el7 will be installed\n    -->\
  \ Running transaction check\n    ---> Package msodbcsql.x86_64 0:13.1.9.2-1 will\
  \ be installed\n    --> Finished Dependency Resolution\n    ```\n\n    系统会提示您填写\
  \ EULA 许可协议，安装过程应该非常迅速。\n\n2.  将工具路径添加到您的 `PATH` 环境变量中，以便于执行。\n    `PATH` 定义了搜索程序的目录，因此您无需明确指定程序的路径或从其安装目录运行它。以下命令将为命令行工具更新\
  \ `PATH`，并将其写入文件，这些文件将为任何未来的登录会话指定 `PATH`。\n\n    ```\n    echo 'export PATH=\"\
