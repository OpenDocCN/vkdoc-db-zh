  的行来查看此后台任务）。


  SQL Server 也可能为其他类型的内部操作和事件生成检查点。有关数据库检查点的完整说明，请参阅我们的文档：`https://docs.microsoft.com/sql/relational-databases/logs/database-checkpoints-sql-server`。


