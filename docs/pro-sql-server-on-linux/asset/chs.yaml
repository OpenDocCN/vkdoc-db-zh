  `mssql-conf` 脚本，但我们建议您使用脚本以避免任何错误。`mssql-conf` 的 `validate` 参数可用于确保文件格式和条目正确。


  **注意**：`mssql.conf` 文件的一种可能用途是在 Docker 容器中，前提是将此文件存储在持久卷上。


  ## 第 2 章   安装与配置


  ##### SQL Server 实例配置


  让我们花点时间看看 SQL Server 引擎支持的 SQL Server 实例配置还有哪些其他选项。这包括 T-SQL 系统存储过程 `sp_configure`
  和 T-SQL 语句 `ALTER SERVER CONFIGURATION`。这些语句用于控制应用于整个 SQL Server 实例的配置选项。


  #### sp_configure


  `sp_configure` 是一个 T-SQL 系统命令，称为*系统存储过程*，可用于配置 SQL Server 引擎内的各种选项。这些选项持久化在名为 `master`
  的系统数据库中。默认情况下，只有大约 20 个左右的配置选项可供选择。有一些高级选项，只有在您先将 "show advanced options" 选项设置为
  1 后才会可见。


  任何用户都可以运行此命令来查看可能的值，但默认情况下，只有系统管理员（例如 SQL Server 中的 `sa` 登录名）可以更改选项，因为这些更改可能对整个服务器产生影响。在本书的剩余章节中，我将讨论各种配置选项供您考虑。


  所有配置更改都需要执行 T-SQL `RECONFIGURE`。




  为使某些更改生效，即使在执行了 `RECONFIGURE` 后，其中一些仍需要重启 SQL Server 服务。


  要查看完整的选项列表和运行此 T-SQL 命令的语法，请参阅我们文档中的此页面：[sp_configure (Transact-SQL)](https://docs.microsoft.com/sql/relational-databases/system-stored-procedures/sp-configure-transact-sql)。


  ### ALTER SERVER CONFIGURATION


  `sp_configure` 存储过程适用于需要简单数值的单值配置选项。某些服务器范围的配置选项可能需要更复杂的值或选项。因此，专门创建了 `ALTER SERVER
  CONFIGURATION` T-SQL 命令用于此目的。


  一个例子是 `PROCESS AFFINITY`，它可用于控制 SQL Server 将其线程调度到哪些 CPU 或 NUMA 节点上执行。


  ### 第 2 章：安装与配置


  例如，在多节点系统上，要仅将 SQL Server 线程调度到 NUMA 节点 0 上，您可以运行此 T-SQL 命令：


  ```sql

  ALTER SERVER CONFIGURATION SET PROCESS AFFINITY NUMANODE=0

  ```


  与 `sp_configure` 选项一样，我将在本书后续章节中讨论其中的几种。与 `sp_configure` 类似，这些设置大多需要系统管理员才能进行更改。有关完整选项列表、语法和权限，请参阅我们的文档页面：[ALTER
  SERVER CONFIGURATION (Transact-SQL)](https://docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql)。


  ##### Linux 上的 Windows 配置选项


  在 Windows 上安装 SQL Server 时，通常会使用一些配置选项和选择。以下是这些选项的摘要，以及它们如何适用于 Linux 上的 SQL Server。


  #### 锁定页面


  Windows 支持一个概念，即如果应用程序使用地址窗口扩展 (`AWE`) API，则可以避免内存工作集修剪。如果使用企业版或标准版，并且 SQL Server
  服务帐户具有 `内存中锁定页面` 权限，则默认在 SQL Server 上启用此功能。


  Linux 没有 `AWE` 或锁定页面的概念，因此此选项不适用于 Linux 上的 SQL Server。相反，Linux 有根据内存消耗对进程进行分页甚至终止进程的概念。Linux
  上的 SQL Server 提供了选项来防止此类情况。我将在第 6 章讨论这个主题。


  ###### 即时文件初始化


  为加快大文件大小的初始化，Windows 提供了一个名为 `SetFileValidData()` 的 API。如果 SQL Server 服务帐户被授予了 `执行卷维护任务`
  权限，SQL Server 将使用此 API 创建或修改数据库文件。


  Linux 默认执行此类初始化，因为 Host Extension 层中的 SQL Server 使用了 `fallocate()` Linux API。因此，对于
  Linux 上的 SQL Server，无需配置此选项。


  ### 第 2 章：安装与配置


  ###### 大页面


  Windows 上的 SQL Server 在启用跟踪标志 `834` 时，可以使用称为大页面的概念。Linux 上的 SQL Server 依赖于称为透明大页面
  (`THP`) 的概念进行内存分配。虽然跟踪标志 `834` 在 Linux 上的 SQL Server 中仍然存在，但我们仅建议在特定场景的高端系统上使用此标志。此跟踪标志的指导方针包含在
  Microsoft 支持文章中：[在高性能工作负载中运行时 SQL Server 的调优选项](https://support.microsoft.com/help/920093/tuning-options-for-sql-server-when-running-in-high-performance-workloads)。




  [performance-workloa.](https://support.microsoft.com/help/920093/tuning-options-for-sql-server-when-running-in-high-performance-workloa)


