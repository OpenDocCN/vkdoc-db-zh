  |


  实际上，您可以在 `mssql-conf setup` 期间使用其他环境变量指定更多选项，如文档 [`docs.microsoft.com/sql/linux/sql-server-linux-configure-environment-variables`](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-environment-variables)
