  Server 产品当时在业界已取得巨大成功，客户都在 Windows Server 上运行它。


  而这正是我们本书的起点。我将解释我们将 SQL Server 引入 Linux 平台的动机、我们实现这一目标的基本原理以及其核心能力。我在现有的 SQL Server
  社区中以讲解 SQL Server 内部机制而闻名，因此在本章及全书中，我有时会情不自禁地带你“窥探幕后”，了解这项技术如何在 Linux 平台上运作。


  #### 平台选择


  2016 年 5 月，我们发布了 Microsoft SQL Server 2016，这是自 1993 年推出 Windows NT 版 4.2 以来，SQL
  Server 的第 11 个主要版本。这个版本功能强大，受到了 SQL Server 社区的积极评价。


  在大家为发布此版本而努力的同时，工程团队已经在着手开发 SQL Server 2017，其关键核心功能将是 SQL Server 最终能在 Linux 和容器上获得支持。业界和世界已经知道我们将实现这一目标，因为在当年早些时候，微软云与企业事业部执行副总裁斯科特·格思里已在客户活动和我们的官方微软博客上宣布了此消息（参见[`blogs.microsoft.com/blog/2016/03/07/announcing-sql-server-on-linux`](https://blogs.microsoft.com/blog/2016/03/07/announcing-sql-server-on-linux)）。在这篇博客中，斯科特阐明了将
  SQL Server 引入 Linux 的真正原因：“……将 SQL Server 引入 Linux 是我们让产品和创新成果惠及更广泛用户、并在他们所处之地满足其需求的另一种方式。”
