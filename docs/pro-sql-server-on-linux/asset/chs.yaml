- '# 第 1 章 为什么要在 Linux 上运行 SQL Server？


  ## 我们是如何构建它的


  赫尔辛基项目，即 SQL Server on Linux，是我在微软 25 年职业生涯中遇到的最令人惊叹的软件成就之一。在本节中，我将向您展示我们在 Linux
  上构建 SQL Server 并能够将其以高质量和高性能推向市场的惊人背景和历程。我将讨论一个重要的软件组件，它使 SQL Server 能够运行在 Linux
  上，称为 SQL 平台抽象层（`SQLPAL`），它基于一个名为 `Drawbridge` 的微软研究院项目。此外，我还将探讨进程架构以及各个组件如何交互以使
  SQL Server 在 Linux 上运行。


  当时，增长最快的客户选择的操作系统变成了 Linux。我们拥有托管“混合”环境（Linux 和 Windows Server）的客户，他们询问我们是否会考虑推出
  Linux 版本的 SQL Server。这并不是说他们放弃了 Windows Server，而是他们希望在公司内标准化使用 SQL Server，但需要同时支持
  Linux 和 Windows Server 的选项。


  最终，Linux 合作伙伴也开始询问我们是否会考虑移植到 Linux。像 Red Hat 和 SUSE 这样的公司在企业业务中看到了巨大的增长，并认为提供数据平台的选择将有助于客户采用。


  所有这些因素在 2014 年末和 2015 年初萦绕在我们 SQL Server 工程领导层——Shawn Bice、Rohan Kumar 和 Lindsey
  Allen 的脑海中。他们在说服微软执行领导层允许我们为 Linux 构建 SQL Server 方面发挥了关键作用。他们还重新聘用了 Slava Oks 来负责构建，并让
  Tobias Ternstrom 转而领导该项目的项目管理。他们将组建一个出色的团队来启动名为 `Helsinki` 的项目。


  至此，我们已具备了动力、批准和资源来推进项目。现在的问题是，我们如何构建它？以及我们如何快速将其推向市场？


  ##### Drawbridge


  2011 年 3 月，微软研究院的一个团队发表了一篇题为 *自上而下重新思考库操作系统* [`www.microsoft.com/en-us/research/wp-content/uploads/2016/02/asplos2011-drawbridge.pdf`](https://www.microsoft.com/en-us/research/wp-content/uploads/2016/02/asplos2011-drawbridge.pdf)
  的论文。该论文基于一个名为 `Drawbridge` 的项目原型和一个称为 `库操作系统` 的概念。回顾 2011 年，虚拟化是一个非常热门的话题，并且已经变得非常流行。虚拟机是执行整合项目和将应用程序与底层硬件抽象化的常用机制。它们提供隔离性、兼容性，并使您无需依赖特定的主机计算机。因此，它们至今仍然流行，并在
  Azure 虚拟机和 Amazon EC2 等公共云环境中使用。唯一的问题是虚拟机资源“开销大”。也就是说，您需要整个操作系统在客户机中运行以支持您的应用程序，即使您并不需要客户机操作系统附带的所有服务。


  `Drawbridge` 团队寻求一种创建更轻量级解决方案的方法，同时保留虚拟化的优势。此外，他们通过研究发现，Windows 应用程序所需的许多服务和应用程序编程接口（API）调用实际上并不需要在
  Windows 内核中运行。相反，可以在用户模式下运行驱动许多 Windows API 的代码，从而减少对内核的上下文切换。减少上下文切换可以提高性能，并使应用程序和计算机资源的使用更加高效。


  该项目的结果是一个概念，称为在 `库操作系统` 上运行的 `微进程`，有效地创建了一个平台抽象层（`PAL`）。图 1-1 展示了最终的成果



  '
- '# 第 1 章 为什么要在 Linux 上运行 SQL Server？


  ![](img/index-28_1.jpg)


  ## Drawbridge 微进程


  在图 1-1 中，`picoprocess` 代表一个二进制文件，它将应用程序和库操作系统组件合并到一个进程中。这种方法的美妙之处在于，应用程序及其 DLL 保持不变。无需重新编译或修改。


  让 Slava 和团队能够实现这一概念并将其应用到像 Linux 这样的另一个操作系统上的神奇之处在于一个应用二进制接口 (ABI)。许多 Windows API（在此图中由
  Win32 和 NT 调用表示）由进程中的库 OS 实现，而大约有 45 个通过 `PAL` 公开，并映射到 ABI，最终映射到基础操作系统。


  ## Drawbridge 的影响


  当时，Slava 正在微软内部一个名为 `Midori` 的项目工作，那是另一个操作系统项目，他看到了 Drawbridge 团队的工作。他能够在短时间内，利用
  Drawbridge 团队的工作成果，让一个 Windows 应用程序在 `Midori` 上运行。因此，当 Slava 被要求回到 SQL Server 工程团队，并参与一个让
  SQL Server 在 Linux 上运行的项目时，他从 Drawbridge 获得的经验带来了巨大的好处。


  ## 移植的困境


  如果你思考一下 Slava 和团队将 SQL Server 引入 Linux 的选择，最合乎逻辑的是将 SQL Server 代码库移植到 Linux 上以原生方式编译和运行。但正如他所说，整个
  SQL Server 代码库由数百万行代码组成。虽然采取转换和编译 SQL Server 以在 Linux 上运行的路径可能是“最纯粹”的方法，但沿着这条路走，我们不可能在
  2017 年的目标时间内推向市场。事实上，早在 2014 年底，我们的一位首席工程师 `Peter Byrne` 就评估过这条路径，并得出结论：“仅将 SQL
  NT 引擎代码库移植和产品化到 Linux 上，就需要一个庞大的开发/测试/PM 团队进行多年的工作。” 因此，Drawbridge 的概念似乎是一个值得强烈考虑的想法。


  ## SQLOS、SQLPAL 与 Helsinki


  Slava 是构建 SQL Server 一个名为 `SQLOS`（有些人称之为 `SOS`）的组件的团队成员之一，该组件作为 SQL Server 2005
  的一部分发布。其概念是尽可能将 SQL Server 核心引擎与底层操作系统抽象化，以处理 I/O、内存和线程等请求。在 SQL Server 2005 中，引擎的大部分被改为使用
  `SQLOS` API 服务（通过 `sqldk.dll`）。`SQLOS` 还为 `NUMA`、资源治理、资源监控和类似操作系统内核的调度系统等提供了内置支持。团队采取这种方法是因为
  Windows 操作系统并未为数据库引擎等服务完全优化。我记得多年前问过 Slava，为什么他觉得有必要构建 `SQLOS`。他说：“这里的关键观察是，DBMS
  和 OS 调度器必须合作。因此，操作系统必须内置对 DBMS 的支持，或者 DBMS 必须有一个特殊的调度层。”


  当你阅读 `SQLOS` 的描述及其将 SQL 引擎开发者与底层操作系统 API 抽象化的能力时，你可能会想，为什么不直接拿 `SQLOS` 来修改并重新编译那段代码以使用
  Linux 内核 API 呢？这种方法存在几个问题：


  *   并非所有 SQL 引擎都使用 `SQLOS` 来调用 Windows API。例如，引擎直接调用 `WriteFileGather()` 来将数据页刷新到磁盘。这方面的证据以
  SQL Server 等待类型的形式存在。SQL Server 中大约有 88 个 `PREEMPTIVE_OS*` 等待类型，这显示了多少组件不使用 `SQLOS`
  来调用 Windows API。

  *   我们仍然需要用 Linux 编译器重新编译所有 SQL 代码。这将要求我们维护两个代码库。

  *   还有其他可以在引擎内部或外部运行但不使用 `SQLOS` 的组件：例如，我们在引擎中支持 XML 的组件以及像 SQL Server Agent 这样的服务。



  '
- '# 为什么 SQL Server 要运行在 Linux 上？


  当我审视这个版本的目标时，我清楚地意识到可以总结为：


  *我们希望能够在 Linux 上，无需修改应用程序，快速、可靠地运行大部分为 Windows 构建的可执行代码。*


  拥有 `SQLOS` 仍然是一个巨大的优势。它为我们可以在此基础上构建的抽象层提供了基础。当 Slava 和团队试图确定一个设计方案时，他们发现 Drawbridge
  团队已经为其项目构建了一个可以在 Linux 上工作的原型。现在，所有碎片都已就位。采用 Drawbridge 原型的工作成果，进行必要的修改使其产品化，并将其与
  `SQLOS` 的工作和概念结合起来。由此诞生的就是 `SQLPAL`。


  **注意**：我这样说起来似乎很简单，但这确实是我微软职业生涯中见过的最惊人、最具创新性的软件项目之一。


  正如 Slava 所述，在确定这个设计后的一个月内，他们就拥有了一个简单可运行的版本，让 SQL Server 在 Linux 上启动并运行查询。


  Slava 很有远见地拍下了那次首次启动的照片，如图 1-2 所示。


  ![](img/index-31_1.jpg)


  **图 1-2.** SQL Server 在 Slava Oks 的电脑上首次在 Linux 上启动


  不久之后，他、Tobias Ternstrom 和团队的其他成员就有了针对 Linux 上 SQL Server 的项目计划和名称。他们称之为 *赫尔辛基计划*（以
  Linux 创始人 Linus Torvalds 的出生地命名，他也在那里设计并提出了最初的 Linux 项目）。有了架构方向，该项目现在全面启动，朝着在 2017
  年交付 Linux 版 SQL Server 的目标迈进。


  ##### Linux 上的 SQL Server 架构


  当团队快速推进，对原始 Drawbridge 项目进行所有必要的修改，并构建所有用于部署、配置和工具的组件时，业界和 SQL Server 社区中的许多人都很好奇我们是如何构建这个的。虽然已经公开演示了
  Linux 版 SQL Server 的轻松部署和基本查询功能，但没人知道幕后架构、`SQLPAL` 或将 Drawbridge 作为概念的使用情况。


  团队在 2016 年底决定公开该架构。成果是项目的一位开发负责人 Scott Konersmann 撰写了一篇出色的博客，你可以在[这里](https://cloudblogs.microsoft.com/sqlserver/2016/12/16/sql-server-on-linux-how-introduction/)阅读。在他的博客中，Scott
  概述了 Drawbridge 的历史、该项目的主要目标，以及仅仅使用 Drawbridge 项目所提供内容的挑战。项目成功的关键是 `SQLPAL`，他总结了他们将要构建的内容：


  ```

  作为调查的结果，我们决定采用混合策略。我们将合并 SOS 和来自 Drawbridge 的 Library OS 来创建 SQL PAL（SQL 平台抽象层）。对于
  SQL Server 不需要的 Library OS 领域，我们将移除它们。为了合并这些架构，需要在栈的所有层进行更改。


  新架构由一组不经过任何 Win32 或 NT 系统调用的 SOS 直接 API 组成。对于没有 SOS 直接 API 的代码，它们将通过托管的 Windows
  API（如 MSXML）或 NTUM（NT 用户模式 API——这是 1500 多个 Win32 和 NT 系统调用）进行。所有子系统，如存储、网络或资源管理，都将基于
  SOS，并在 SOS 直接和 NTUM API 之间共享。

  ```


  总结来说，最终的设计和方法是将我们现有的 `SQLOS` 代码与 Drawbridge 的 Library OS 合并，以创建最终的 `SQLPAL` 概念。


  Scott 使用图 1-3 中的图表来展示与 `SQLPAL`、`SQLOS`、`Library OS` 以及称为 `Host Extension` 的组件的交互。




  '
- '# 为何选择在 Linux 上运行 SQL Server？


  ![](img/index-33_1.jpg)


  ***图 1-3.** Scott Konersmann 的 Linux 上 SQL Server 架构示意图*


  我是一个非常视觉化的人，所以当我自己开始学习这个架构时，我决定将这个视图修改得更像图 1-4 中的示意图。（注：我是基于赫尔辛基团队构建的更详细架构图进行修改的。）


  ![](img/index-34_1.jpg)


  ***图 1-4.** Linux 上的 SQL Server 架构*


  在我开始描述架构之前，请允许我再提供一个重要的说明。这是截至 SQL Server 2017 正式发布时的架构。与任何内部机制和架构一样，我们保留更改和优化它的权利。我们的目标是让用户无需担心这些内部实现，但理解它很有趣，并且能增强我们产品在
  Linux 上取得成功的可信度。


  我必须告诉您，前面的示意图和我的描述，其实并未能完全展现团队所构建的惊人技术。仅仅深入探讨这个架构，可能就需要一整本书的篇幅。我预见到未来我们会不断演进这个架构，对其进行精简和改进，因此即使将整整一章的篇幅聚焦于此也不太现实。而且我们的目标是，Linux
  上 SQL Server 的使用者本就不该关心这些细节。但因为有太多人对我们如何在 Linux 上构建 SQL Server 感到好奇，我认为我至少应该用一章中的一个章节来探讨这个主题。


  让我们分解每个组件，以及它们如何相互作用以构成这个架构。请注意在这个示意图中，就像在 Drawbridge 中一样，*一个单一的 Linux 进程* 包含了应用程序（`SQLSERVR.EXE`）、库操作系统（LibOS）和平台抽象层（PAL）（在我们的案例中，我们称之为
  `SQLPAL`）。这个进程在 Linux 上的名称是 `sqlservr`。在灰色框中，`SQLSERVR` 代表与 Windows 上相同的二进制文件 `SQLSERVR.EXE`
  及其组件 DLL，包括 `sqlmin.dll`、`sqllang.dll` 等。浅蓝色框中的 LibOS 是支持 Windows API 的 DLL 和 Windows
  服务。这包括诸如 `kernel32.dll`、`advapi32.dll` 等 DLL，以及诸如 `RPCSS.EXE` 等服务。


  浅蓝色框中的 `SQLPAL` 包含两个组件：


  - *SQLOS*：以 Windows 上 `SQLDK.DLL` 的形式提供。

  - *SQLPAL.DLL*：这是关键组件，它将实现 LibOS 所需的任何 Windows 功能，或者将需要 Linux 内核服务的调用重定向到一个称为 *宿主扩展*
  的组件。一个在 `SQLPAL` 中实现的 Windows 功能示例是 Windows 注册表调用。一个需要 Linux 内核的例子是内存分配。


  **注意** 未来版本的 `SQLPAL` 可能会完全包含 `SQLOS` 功能，因此我们可以进一步精简这些代码领域。例如，`SQLPAL.DLL` 将封装目前存在于
  `SQLDK.DLL` 中的所有功能。


  黑色框中的 *宿主扩展* 是一组为 Linux 原生编译的代码，它理解所有必要的 Linux API 调用，用于处理内存（`mmap`）、线程（`pthread`）和
  I/O（`aio`）等事物。


  连接这两个世界的桥梁是应用程序二进制接口（ABI）。这意味着 `SQLPAL.DLL` 不能像在 Windows 上为任何 API 编码那样，直接调用宿主扩展的代码来处理内存、线程、I/O
  和其他服务。这是因为 Windows 和 Linux 在调用代码中的函数时有不同的机制（这被称为*调用约定*）。由于 `SQLPAL.DLL` 是为 Windows
  编译的，而宿主扩展代码是为 Linux 编译的，它们必须通过一种允许 `SQLPAL` 将其调用约定转换为 Linux 约定的机制来*对话*。这是通过一系列巧妙的汇编指令完成的，这也是它被称为应用程序二进制接口的原因。它非常轻量级，进行这种转换不需要任何显著的开销。


  如果你曾经研究过 Windows 或 Linux 等操作系统上的程序执行，你会了解程序在这些系统上的*二进制格式*的概念。




  '
- '# 第 1 章：为什么 SQL Server 可以在 Linux 上运行？


  对于 Windows，其可执行文件格式被称为可移植执行体（PE）格式，而对于 Linux，则被称为可执行与可链接格式（ELF）格式。任何为 Windows 编译和链接的程序都使用
  PE 格式（例如 `SQLSERVR.EXE`），并且只能在 Windows 上运行；同样，Linux 上的 ELF 二进制文件也是如此。因此，我们的宿主扩展代码是
  `SQLSERVR` Linux 进程的一部分，被编译为 ELF 二进制文件。它包含特殊逻辑，知道如何直接加载 `SQLPAL.DLL`（因为它是 PE 格式的二进制文件），并为它提供必要的链接以使用宿主扩展中的
  ABI 接口（换句话说，宿主扩展指示 `SQLPAL` 如何“动态地与之对话”）。


  宿主扩展还知道如何将磁盘上特殊打包文件中的 `SQLSERVR.EXE` 和 LibOS 二进制文件（我们将在第 2 章详细讨论这些）映射到进程地址空间。然后，`SQLPAL.DLL`
  知道如何加载 `SQLSERVR.EXE`，并让正常的 Windows 进程和 DLL 加载过程从此处开始。这里有一个关键点：所有这些代码都是为英特尔兼容处理器编译的，因此，用
  Robert Dorr 的话来说，“它本质上都是汇编代码。” 这也是我们的 `SQLSERVR.EXE` 代码无需更改就能在 Linux 上运行的原因之一。


  所以，总结一下，`SQLSERVR.EXE` 及其依赖的 DLL 被加载和运行的方式与在 Windows 上完全相同。LibOS 组件也是如此。`SQLPAL.DLL`
  是为 Windows 编译的，但其内部建有逻辑来实现 Windows 内核服务，或者在必要时通过调用其他函数（使用 ABI 接口）来实现某些内核服务。但 `SQLPAL.DLL`
  并不知道这些接口是在为 Linux 编译的代码中实现的。宿主扩展处理了所有这些事情。


  架构图中还有两个我尚未谈到的组件：


  *   注意到 `SQLAGENT` 也列在此图中。这是因为在 Linux 上安装 SQL Server 时，你会将 `SQLAGENT.EXE` 与 `SQLSERVR.EXE`
  一起加载到 `SQLSERVR` Linux 进程中。我知道这听起来很奇怪，但它工作得很好。`SQLPAL` 实现了进程隔离，这些进程并没有意识到它们处于同一个
  Linux 进程中。

  *   注意右下角有一个名为 `Parent Watchdog`（父看门狗）的进程。你将在本书后面听到更多相关内容，但实际上，这是一个名为 `SQLSERVR`、原生为
  Linux 编译的进程，是 SQL Server 启动时最先启动的程序。然后我们使用 Linux 的 `fork()` API 调用来创建另一个 `SQLSERVR`
  进程，该进程就是如图中所示的 SQL Server 引擎及其所有组件。它通过信号监控子 `SQLSERVR` 进程以执行转储，并在必要时使用 `systemd`
  服务进行重启，从而提供了一个便捷的目的。你可以阅读这篇博文了解更多关于其工作原理的内容：[`blogs.msdn.microsoft.com/bobsql/2018/07/18/sql-server-on-linux-why-do-i-have-two-sql-server-processes/`](https://blogs.msdn.microsoft.com/bobsql/2018/07/18/sql-server-on-linux-why-do-i-have-two-sql-server-processes/)。随着我在第
  2 章讲述探索 SQL Server on Linux 安装了什么，这种关系将变得更加明显。


  我意识到这看起来非常复杂，事实也确实如此，但它同时也简单而优雅。正是这种架构，让我们能够快速且高质量、高性能地将 SQL Server on Linux 推向市场。


  我在本章中包含这些细节，并不是因为你必须了解它们才能使用 SQL Server on Linux，而是为了澄清其工作原理上的任何困惑，并为该设计和架构提供可信度。


  而最重要的一点是。正如你将在下一节学到的，其核心...




  SQL Server 数据库引擎与我们产品历史上在数千台客户服务器上运行的，是经过验证、可扩展的相同 SQL Server 引擎。


  ## Windows 上的 SQL Server 与 Linux 上的是否相同？


  我记得曾就此话题与 Slava Oks 有过一次对话，他对我说：“Bob，查询处理器依然是同一个查询处理器。” 这句话解释了为何我们能够在 Linux 上的 SQL
  Server 实现与 Windows 上可比的性能。它也解释了为何数据库可以跨平台还原，以及为何如果应用程序原本是为在 Windows Server 上运行针对
  SQL Server 而构建的，它们几乎无需更改即可连接到 Linux 上的 SQL Server。


  ## Linux 上 SQL Server 的功能


  SQL Server 2017 拥有许多专注于性能、安全性和高可用性的功能和特性。以下是 Linux 上 SQL Server 可用的部分功能和特性：


  - 核心的 `SQLOS` 系统，用于调度、内存管理及资源治理与管理，提供内置的可扩展性，并支持重要的服务器架构，如 `NUMA`。

  - 用于缓冲区管理、查询处理、查询执行、存储引擎和访问方法的核心引擎组件。

  - 核心管理操作，如 `BACKUP/RESTORE`、索引管理和 `DBCC` 命令。

  - 我们著名的 `T-SQL` 语言，除了该版本中不支持的任何特性或功能外，其余均可原样工作。

  - 内存中工作负载特性，如 `列存储索引` 和 `内存中 OLTP`。

  - 新的数据库智能特性，如自适应查询处理 (`AQP`) 和 `自动调整`（你将在第 4 章听到更多关于这些特性的内容），这些特性基于 `查询存储` 的遥测数据。

  - `Always On 可用性组`（在本书后续内容中，我将用“可用性组”或 `AG` 来指代此功能）得到完全功能支持。正如你将在第 8 章看到的，可用性组通过一种称为
  `Pacemaker` 的集群技术支持主要的故障转移功能（少数例外）。此外，SQL Server 2017 中的一个新特性提供了对 `无集群` 可用性组的支持，无需集群软件。

  - Linux 上的 `Always On 故障转移群集实例` 使用 `Pacemaker` 得到支持。

  - 安全特性，如 `始终加密`、`动态数据屏蔽`、`行级安全性`、`审核` 和 `透明数据加密 (TDE)`。

  - SQL Server 和 `Active Directory` 身份验证用于登录。

  - 加密连接使用 `传输层安全性 (TLS)` 得到支持。

  - 丰富的编程特性，如 `SQLCLR`（仅限 SAFE 程序集）、`JSON` T-SQL 功能和 `图数据库`。

  - `SQL Server 代理` 调度服务支持 `T-SQL` 命令子系统。

  - `SQL Server 集成服务 (SSIS)` 支持基本的提取、转换和加载 (`ETL`) 操作。

  - 工具可直接用于连接 Linux 上的 SQL Server，包括 `SQL Server Management Studio`（运行于 Windows）、`SQL
  Server Data Tools`（运行于 Windows）以及我们在 `Visual Studio Code` 中的 `mssql` 扩展（跨平台工具）。

  - 我们在 Linux 上支持原生命令行工具，包括 `sqlcmd` 和 `bcp`。

  - 我们构建了新的开源、跨平台工具，可在 Windows、Linux 或 MacOS 上运行，并连接到 Linux 或 Windows 上的 SQL Server：`SQL
  Server Operations Studio` 和 `mssql-cli`。

  - SQL Server 诊断功能，如 `扩展事件`、`动态管理视图`、`目录视图` 和 `查询计划` 诊断能力。


  我可能遗漏了你最喜欢的功能，但这份列表使得 Linux 上的 SQL Server 成为一个非常吸引人的方案。有关 Linux 上 SQL Server 功能的完整列表，请查阅我们的文档：[`docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2017`](https://docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2017)。




  对于阅读本书但不熟悉 SQL Server 版本的读者来说，了解某些功能仅在特定版本中可用这一点非常重要。要获取特定版本可用功能的完整列表，请参阅此文档页面：[`docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2017?view=sql-server-linux-2017#includessnoversionincludesssnoversion-mdmd-editions`](https://docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2017?view=sql-server-linux-2017#includessnoversionincludesssnoversion-mdmd-editions)。


  Linux 上的 SQL Server 2017 提供以下版本：


  *   **企业版**：这是功能最全面的版本。正如其名，它设计用于企业级数据库应用程序。从许可角度来看，企业版有两种变体：企业版和企业核心版。企业核心版具有全部功能，而企业版在使用特定数量的计算核心方面有一些限制。企业版仅适用于与
  Microsoft 有合同协议的特定客户。

  *   **标准版**：此版本旨在为面向较小部门或中等规模工作负载的应用程序提供 SQL Server 的基本功能。我们从 SQL Server 2016 SP1
  开始做出的一个重大改变是，向标准版开放了一些之前仅在企业版中可用的功能。此举的理由是确保开发人员可以构建应用程序，而无需过多担心他们的应用程序针对的是哪个 SQL
  Server 版本。这些功能在标准版上有大小限制，但现在都可以使用了。你可以在此博客文章中阅读有关此更改的更多信息：[`blogs.msdn.microsoft.com/sqlreleaseservices/sql-server-2016-service-pack-1-sp1-released/`](https://blogs.msdn.microsoft.com/sqlreleaseservices/sql-server-2016-service-pack-1-sp1-released/)。

  *   **开发版**：这是一个免费版本，包含企业版的所有功能。但是，此版本的许可限制其不能用于生产环境。你可以使用此版本来构建和测试你的应用程序。

  *   **Web 版**：此版本类似于标准版，但限制更低，并且专门针对 Web 托管商定价。

  *   **速成版**：这是最基本的版本，但免费且可用于生产环境。不过它的限制很大，不应被用于任何类型的应用程序扩展。但如果你作为一名开发人员刚开始接触 SQL
  Server，SQL Server 速成版可能会很有用。它有一个通往标准版和企业版的简易升级路径。对于 Linux，SQL Server 速成版可以作为一个非常实用的、仅用于配置的副本服务器。这将在第
  8 章中更详细地讨论。


  我还应该提到，SQL Server 提供了一个评估版。它包含企业版的所有功能，但未获得生产使用的许可，并且具有基于时间的过期许可。但这是在企业服务器上测试 SQL
  Server 功能的绝佳方式。在第 2 章中，我将描述如何选择你想要使用的 SQL Server 版本。


  ## 哪些功能不可用


  拥有如此强大的功能阵容，也意味着 SQL Server 中有一些领域是不可用的




  2017 年在 Linux 上发布（自普遍可用版本起）。SQL Server 产品包含的某些功能存在依赖项或需要外部程序，这些程序在 Linux 上的 SQL
  Server 中运行并非如此直接。


  `注意` 我们正在积极研究许多此类功能，以便在未来版本或 SQL Server on Linux 的更新中包含。


  '
- '# 第 1 章 为什么要在 Linux 上使用 SQL Server？


  与任何版本发布一样，我们会艰难地决定是否包含某些功能或增强改进——如果时间不是问题，我们很乐意实现它们。因此，以下功能未能包含在 SQL Server 2017
  on Linux 的普遍可用版本中：


  - 事务复制和合并复制

  - 分布式事务（链接服务器查询或通过 `MSDTC` 的应用程序分布式事务）

  - `Stretch Database`

  - `Polybase`

  - `Machine Learning Services`（但支持 `Native Scoring`）

  - 系统扩展存储过程，如 `xp_cmdshell`


  我只列出了未能进入 SQL Server 2017 普遍可用版本的主要功能。还有一些其他功能，您可以在我们的发布说明中阅读完整列表：[`https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes#Unsupported`](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes#Unsupported)。


  关于功能，我再补充一点说明。当前 `Windows Server` 上的 `SQL Server` 产品附带其他服务，如 `SQL Server Analysis
  Services (SSAS)` 和 `SQL Server Reporting Services (SSRS)`。这些通常被称为我们的 `Business Intelligence
  (BI) Services`（这还包括 `Master Data Services (MDS)` 和 `Data Quality Services (DQS)`）。这些服务尚未为
  `SQL Server on Linux` 实现。请注意，这些服务能够连接并查询 `SQL Server on Linux`。


  ##### 我应该使用 Windows 还是 Linux？


  本节最后，我来回答一个常被问到的问题：“我应该在 `Linux` 还是 `Windows Server` 上运行 `SQL Server`？” 答案是 `是`（希望此刻读者们能会心一笑）。关键在于，我们构建
  `SQL Server on Linux` 是为了提供一种选择，而不一定是因为 `SQL Server` 在 `Windows Server` 上比在 `Linux`
  上运行得更快或更好。如果当前 `SQL Server on Linux` 不支持的功能不影响您，请根据哪个操作系统平台最适合您、您的应用程序或您的公司来做出决定。我与之交谈的一些客户正在其组织内制定
  `Linux` 标准，因此他们将为了保持一致性而做出这个选择，而现在 `SQL Server` 给了他们这个机会。对于其他人来说，他们习惯于 `Windows
  Server` 并喜欢那个平台，因此将继续在该操作系统上使用 `SQL Server`。对于一些人来说，`Linux` 是新开发者中非常流行的操作系统，因此他们将在开发阶段享受在
  `SQL Server on Linux` 上构建应用程序的乐趣，然后在生产环境中可以选择使用 `Linux` 或 `Windows` 上的 `SQL Server`。


  我在微软支持部门结识多年的好友 Robert Dorr（您可以在我们的联合博客 [`http://aka.ms/bobsql`](http://aka.ms/bobsql)
  上找到我们俩）于 2016 年初加入了赫尔辛基开发团队。当我和他谈到这本书时，他回忆道，这总结了团队的经验和项目背后的原因。


  “我发现我登上了一艘火箭飞船。整个生态系统中有很多新事物，也有很多事情要做。正如 Scott Konersmann 所描述的那样，我们就像在飞行中更换喷气式飞机的引擎，有时确实感觉如此。我们将
  `Windows` 上数十年经过考验和调优的技术及经验带到 `Linux` 平台，我们不想移除功能。只是想给客户选择运行哪种‘引擎’的权利。”


  #### 容器是新的虚拟机


  我们构建 `SQL Server on Linux` 的另一个主要动机是提供支持




  '
- '# 第一章：为何在 Linux 上运行 SQL Server？


  ## 一种新兴技术：容器


  本书后续章节将详细探讨如何将 SQL Server 与容器结合使用的技术细节。在此，我将概述 SQL Server 与容器的关系及其与 Linux 的关联。


  容器技术领域当前的主要推动力无疑是 Docker。相较于自行定义容器，我更倾向于引用 Docker 官方的解释（[`www.docker.com/what-container`](https://www.docker.com/what-container)）：


  > *“容器镜像是一个轻量级、独立、可执行的软件包，包含运行它所需的一切：代码、运行时、系统工具、系统库和设置。容器化的软件无论环境如何，始终以相同方式运行，适用于基于
  Linux 和 Windows 的应用程序。容器将软件与其周围环境隔离开来，例如开发与测试环境之间的差异，并有助于减少团队在同一基础设施上运行不同软件时的冲突。”*


  阅读之后，你可能会想：为什么我们不直接采用容器，而要基于 SQLPAL 架构呢？


  ## 为什么 SQL Server 要运行在 Linux 上？


  这主要有以下几个原因：


  *   Linux 上的 Docker 引擎仅支持包含 Linux 操作系统的镜像，因为请记住：容器需要与主机操作系统交互。因此，如果我们仅采用容器，将相当于回到起点，需要将所有代码移植到
  Linux 上。

  *   我们希望为 Linux 操作系统提供原生能力，以获得最佳性能。

  *   尽管我们希望通过 Docker 容器及其带来的新场景来全面支持 SQL Server，但我们并不希望依赖它来支持 Linux，尤其是如果容器存在某些在
  Linux 原生环境下不存在的限制。


  我对 Docker 容器的未来，以及 SQL Server 在使容器成为新场景（包括可移植性、一致性和 DevOps 场景）的可行技术方面所扮演的重要角色，感到十分兴奋。


  ##### 数据库容器


  我记得不久前曾问过 Travis Wright（他是将 SQL Server for Linux 推向发布的团队的关键项目经理之一）关于 SQL Server
  对 Windows 容器的支持问题。他最初的回应让我感到惊讶。他说：“Bob，你为什么关心这个？”他的意思是，如果我们能进入一个以包含 SQL Server、数据库以及应用程序任何依赖部分的*数据库*容器为中心的世界，而不是担心容器镜像中的操作系统，难道不是很好吗？我从未那样想过，我们可能尚未准备好，但他的想法非常正确。这正是容器的承诺之一。


  ##### 平台独立性、可移植性与一致性


  这里的“平台”指的是运行容器的宿主机。Docker 提供了这种独立性，因为我可以*编排*（你将在关于容器的章节中学到这个含义）一个包含 SQL Server 的
  Docker 镜像，并将该镜像作为容器运行在 Windows、Linux、MacOS 或其他容器云环境中，例如 Azure 容器服务 (AKS)、亚马逊弹性容器服务
  (ECS)、谷歌云平台、红帽 OpenShift 和 SUSE CaaS。而且由于它是一个容器，在所有环境中运行的是*相同的镜像*。这就是可移植性！它提供了一个可靠的、*一致*的包，包含已知的
  SQL Server 版本以及你的数据库、脚本或任何你放入镜像中的依赖项。


  ##### 持续集成/持续部署


  也许你听说过*DevOps*这个词？这个已存在多年的概念，其核心是将软件开发与运营的角色及任务结合起来。它之所以流行，是因为它提供了一种机制来缩短开发生命周期，并允许更频繁地部署应用程序。


  持续集成与持续部署 (CI/CD) 是实现这一目标的方法……




  一个更高效的 DevOps 生态系统。利用容器，开发者可以持续集成其应用程序变更，并将其部署到测试和生产环境中。开发者已经使用这些技术一段时间了，但像 SQL
  Server 这样的数据库平台通常并未纳入其生命周期。一个典型的 SQL Server 会托管在服务器上，开发者很难将其容器与应用程序一起维护，从而连接到解耦的
  SQL Server 和数据库（以及像 SQL Agent 作业和脚本这样的对象）。现在，SQL Server 已拥抱容器世界，它可以成为包含在 CI/CD 流水线中的容器的一部分。


  ##### Kubernetes


  容器的前景在可移植性、一致性和效率方面具有巨大潜力。但是，如何在 CI/CD 流水线或大规模生产环境中协调许多数据库容器的执行呢？一种名为 Kubernetes
  的技术就是为了解决这个问题而创建的。Kubernetes 是一个开源系统，旨在帮助在一个完整的生态系统中管理、部署和编排众多容器。其优势之一是为容器提供了一种天然的高可用性解决方案，这恰好满足了许多
  SQL Server 用户为生产数据库提供高可用性解决方案的需求。Kubernetes 已成为大规模容器管理和部署的领先解决方案，并已被几乎每一个支持容器执行和部署的公共云供应商所采纳。


  '
- '# 第 1 章：为何在 Linux 上使用 SQL Server？


  本书后面将用整整一章来详细介绍使用 Docker 容器部署 SQL Server 的技术细节，包括在 CI/CD 流水线中使用此方法的示例，以及利用 Kubernetes
  实现高可用性。


  #### 小结


  `部署` 是一个入门的重要术语。这全部是关于在 Linux 上安装和配置 SQL Server。而这正是我们下一章开始在 Linux 上启动并运行 SQL Server
  的旅程起点。


  '
- "# 第 2 章\n\n## 安装与配置\n\n从一开始，我们的团队就希望确保 SQL Server 在 Linux 上的安装体验能很好地契合 Linux 用户已经非常成熟的方法、实践和生态系统。此外，我们不仅仅是声称\
  \ SQL Server 在任何 Linux 发行版上都受支持（市面上有数百种），而是希望确保我们在流行的发行版上提供一个经过充分测试的高质量版本，并为我们的客户提供卓越的支持体验。\n\
  \n我们将安装体验设计得快速而轻量。您可能会对本章中专门讨论此主题的篇幅之多感到惊讶。这是因为安装产品是您遇到的第一个体验，并且可以奠定您对产品看法的基调。如果您只是想直接上手，看看在\
  \ Linux 上安装 SQL Server 有多么容易，请直接跳转到“直接安装！”部分。\n\n我希望本章涵盖安装体验的所有方面，这样您就可以了解预期结果，理解其背后的工作原理，并为您提供所有安装和更新的选项。\n\
  \n本章还将讨论安装要求、如何验证安装是否成功、无人值守安装、离线安装、安装其他软件包、在 Azure 环境中安装、安装问题排查、探索已安装内容以及配置相关主题。所有这些都基于我个人安装该产品的经验，以及与客户、我们的支持和工程团队的交流，他们的目标是使安装和配置体验简单而完整。\n\
  \n#### 安装准备\n\n如果您希望获得像 SQL Server 这样复杂的产品在企业级应用中的卓越体验，仔细的准备是关键的成功标准。在本节中，我将讨论我们官方支持的\
  \ Linux 发行版、为确保流畅且最优的 SQL Server 体验所需的系统要求，以及一些\n\n© Bob Ward 2018\n\n\n\nB. Ward,\
  \  *Linux 上的 SQL 宝典*, `doi.org/10.1007/978-1-4842-4128-8_2`\n\n### 第 2 章：安装与配置\n\
  \n本章将就如何在目标 SQL Server 环境选型过程中，测试其各项功能提供建议。本章最后一部分仅面向 Linux 新手，因此如果您是 Linux 高手，可以选择跳过。我认为，对于从\
  \ Windows 过渡而来的用户，借鉴我在重新适应 Linux 导航过程中所积累的一些技巧，会很有帮助。\n\n##### Linux 发行版\n\nLinux\
  \ 上的 SQL Server 2017 官方支持以下 Linux 发行版（这些是最低版本要求）：\n\n*   红帽企业 Linux (RHEL) 7.3 和\
  \ 7.4\n*   SUSE Linux 企业服务器 (SLES) v12SP2\n*   Ubuntu 16.04 LTS\n\n为便于后续理解，尽管 RHEL\
  \ 和 SLES 在功能上各有差异，但它们都被视为 `RPM-based` 发行版，而 Ubuntu 是 `Debian-based` 发行版（我在查看各种 Linux\
  \ 发行版及其历史时，发现这个资源非常有价值：[`en.wikipedia.org/wiki/Linux_distribution`](https://en.wikipedia.org/wiki/Linux_distribution)）。这种区分之所以重要，主要是因为它影响了我们为每个发行版使用的软件包格式。\n\
  \n我们始终致力于了解应支持这些发行版的哪些新版本，因此请将此页面加入书签，以获取 Linux 上 SQL Server 的“最新消息”：[`docs.microsoft.com/sql/linux/sql-server-linux-setup`](https://docs.microsoft.com/sql/linux/sql-server-linux-setup)。\n\
  \n您对这些发行版的选择可能基于个人偏好或贵公司的标准。需要说明的是，我们已在其他 Linux 发行版（如 CentOS 或 ORACLE 企业 Linux (OEL)）上进行了基础测试，SQL\
  \ Server 可以在这些系统上运行。但是，除了本节列出的发行版外，我们目前尚未准备好正式声明支持在其他 Linux 发行版上运行 SQL Server。\n\
  \n**注意：** 我们完全支持在 Docker 容器上运行 SQL Server，我将在第 11 章全面介绍该主题。\n\n为保持一致性，本书中的所有演示和示例都将使用红帽企业\
  \ Linux。SQL Server 在这三种发行版上运行都非常出色，并且整合了各自熟悉的体验。我们的文档中有清晰的示例，说明如何在 RHEL、SLES 和 Ubuntu\
  \ 上安装 SQL Server。\n\n### 安装建议\n\n我建议在安装 SQL Server 前，查阅您所用 Linux 发行版的文档和安装指南，以确保获得最佳体验。例如，由于\
  \ SQL Server 可能是 I/O 密集型应用，您可能需要查阅 Linux 指南来了解如何为性能和持久性配置磁盘。话虽如此，我将在第 6 章与您一起回顾微软的指导，介绍如何根据我们在微软的经验配置\
  \ Linux 和 SQL Server，以实现最大性能，包括 SQL Server 和 Linux 内核的调优建议。\n\n关于如何安装和与 Linux 交互以使用\
  \ SQL Server，我有几点个人技巧：\n\n*   我从不安装图形界面。Ubuntu 桌面用户可能更喜欢图形界面的 Shell，而 SQL Server\
  \ 开发者版在该环境下运行良好。我发现自己总是使用命令行的 `bash` Shell，或者在连接到 Linux 服务器或虚拟机的 Windows 笔记本电脑上运行图形界面程序。\n\
  *   如果我非常注重性能，我会始终为数据库和事务日志文件单独挂载一个驱动器。为简化操作，我通常将 `/var/opt` 挂载到这个单独的驱动器上，并直接将其用作默认数据库目录（您会发现可以更改此设置）。对于严肃的生产场景，您可能会将\
  \ SQL Server 数据库和日志文件分布在不同的驱动器上，甚至跨驱动器创建多个 SQL Server 文件。关于如何配置 Linux 以\n\n\n\n\
  ## 第二章：安装与配置\n\n### 准备数据磁盘并连接至服务器\n\n开始之前，请确保您已添加一个单独的磁盘（例如添加到您的虚拟机中），具体操作可参考 Azure\
  \ 文档。请阅读“准备数据磁盘”章节，链接为：[`docs.microsoft.com/azure/virtual-machines/linux/tutorial-manage-disks`](https://docs.microsoft.com/azure/virtual-machines/linux/tutorial-manage-disks)。\n\
  \n如果您计划从一台非原生运行 Linux 的笔记本电脑连接到 Linux 服务器或虚拟机，建议您准备一个可靠的安全外壳（`ssh`）程序。对于 MacOS 用户，系统内置了命令行\
  \ `ssh` 客户端，但您也可以安装其他工具。对于 Windows 10 用户，您可以安装 Linux 子系统，该系统自带 `ssh` 命令行界面。更多信息请参阅：[`docs.microsoft.com/windows/wsl/install-win10`](https://docs.microsoft.com/windows/wsl/install-win10)。对我而言（我将在本书中使用它进行演示），我使用的是名为\
  \ `MobaXterm` 的程序，您可以从 [`mobaxterm.mobatek.net/`](https://mobaxterm.mobatek.net/)\
  \ 下载。\n\n![](img/index-49_1.png)\n\n图 2-1 展示了一个连接到 Linux 服务器的 `MobaXterm` `ssh`\
  \ 会话示例。\n\n**图 2-1. 连接到 Linux 服务器的 MobaXterm ssh 会话**\n\n##### 系统要求\n\nSQL Server\
  \ 可在多种不同类型的计算机系统和虚拟机配置上运行。其核心最低要求如下：\n\n-   2GB 内存（从 SQL Server 2017 累积更新 2 开始，最低要求已降至\
  \ 2GB）。\n-   6GB 可用磁盘空间。\n-   2GHz 的处理器速度。\n-   处理器类型为 `x64` 兼容。\n-   两个物理处理器核心。\n\
  \n尽管以上是最低要求，但 SQL Server 可扩展至当前可用的最大型系统。SQL Server 能利用 Linux 上的最大可用内存。目前，理论极限为 64TB，但实际测试极限约为\
  \ 12TB。SQL Server 在 Linux 上支持的核心数量没有限制，最大数据库大小高达 524 PB（拍字节）。\n\nSQL Server 支持 Linux\
  \ 上流行的原生文件系统 `XFS` 和 `EXT4`。默认文件系统类型因发行版而异。对于 RHEL 7.3 和 7.4，默认是 `XFS`；而对于 Ubuntu\
  \ 和 SLES，默认是 `EXT4`。在我们微软的测试中，我们未发现两种文件系统类型之间存在显著的性能差异。然而，与 `EXT4` 相比，`XFS` 在卷大小、最大文件大小和文件数量方面提供了更大的容量。在我所有关于\
  \ RHEL 的工作中，我只使用默认的 `XFS`。我们在 Ubuntu 和 SLES 上的测试表明，`EXT4` 在这些发行版上表现最佳（但 `XFS` 也完全支持）。还有一种名为\
  \ `BTRFS` 的新文件系统类型，目前不支持用于 SQL Server。您还应了解，流行的远程存储系统网络文件系统（`NFS`）在满足一些限制条件的情况下是支持的，这些限制记录在我们的系统要求页面中：[`docs.microsoft.com/sql/linux/sql-server-linux-setup#system`](https://docs.microsoft.com/sql/linux/sql-server-linux-setup#system)。\n\
  \n> **提示：** 为了获得 SQL Server 的最佳性能，您可能需要为计算机调整某些 `BIOS` 设置。有关为 Linux 系统调整 `BIOS`\
  \ 设置的更多详细信息，请参见第 6 章。\n\n### SQL Server 测试资源\n\n在您计划安装并探索 SQL Server 功能时，以下资源可能会对您有所帮助。\n\
  \n#### WideWorldImporters 示例数据库\n\n在 SQL Server 2016 中，我们创建了一个名为 `WideWorldImporters`\
  \ 的新示例数据库，以及一系列脚本和演示。我将在本书中一直使用此示例（以及配套的 `WideWorldImportersDW` 数据库）。您可以通过此文档入口访问此数据库的备份及所有示例。\n\
  \n\n\n### 第 2 章：安装与配置\n\n## 将 HammerDB 应用于 SQL Server\n\n如果你希望测试 SQL Server 在 Linux\
  \ 上处理 OLTP 或数据仓库工作负载的能力，可以考虑使用流行的开源工具 HammerDB。你可以从 `http://www.hammerdb.com` 下载该工具。HammerDB\
  \ 支持运行 TPC 基准测试的衍生版本：TPC-C（OLTP）和 TPC-H（数据仓库）。请注意，HammerDB 需要图形用户界面（GUI），但也提供了一些自动化功能。其基本界面如图\
  \ 2-2 所示。\n\n图 2-2：HammerDB 2.23 界面\n\n## Linux 使用技巧\n\n如果你是 Windows 用户，甚至是 PowerShell\
  \ 的熟练使用者，在使用 Linux Shell 和系统时可能还需要一些指导。本节包含了一些我在 Linux 上安装、演示和展示 SQL Server 过程中学到的命令、脚本和导航技巧。\n\
  \n###### 常用命令\n\n以下是我日常在 bash shell 中最常使用的命令列表：\n\n- `ls` 和 `ll`：列出目录中的文件。`ls`有各种选项可用于列出文件。我喜欢用`ll`，因为它能提供目录或文件的详细信息，包括大小、权限和日期/时间。\n\
  \n- `grep`：从输入流、单个文件或一组文件中搜索给定的文本字符串。\n\n- `man`：是“手册页”的缩写。用它可以查找任何命令的语法和详细信息。例如，运行\
  \ `man sqlservr` 可以查看 SQL Server 的简短描述，包括支持的环境变量列表、文件安装位置以及指向互联网上完整文档的链接。\n\n- `chmod`：更改文件或目录的属性，如读/写/执行权限。例如，当你创建一个要在\
  \ shell 中作为脚本执行的文件时，你必须更改其模式以允许执行，如下所示：`chmod u+x myscript.sh`\n\n- `chown`：更改文件或目录所属的组和/或用户。我使用这个命令来更改我正在还原的\
  \ SQL Server 备份文件的所有权，将其改为 `mssql` 组和 `mssql` 用户，以便 SQL Server 可以读取该文件：`chown mssql:mssql\
  \ mybackup.bak`\n\n- `pwd`：代表“打印工作目录”，用于查看当前工作目录。\n\n- `ps`：代表“进程状态”，是获取 Linux 服务器上正在运行的进程列表及其详细信息的简单方法。\n\
  \n- `systemctl`：此命令用于报告和控制 Linux 上一个称为“服务”的 systemd 单元的运行状态。正如你将在本书中看到的，SQL Server\
  \ 的服务名为 `mssql-server`。以下是使用此命令配合 `mssql-server` 服务的参考（现在不必担心 `sudo`，我将在下一节解释）：\n\
  \    - 显示 SQL Server 是否正在运行：\n        ```\n        sudo systemctl status mssql-server\n\
  \        ```\n    - 停止 SQL Server（SQL Server 会执行正常关闭）。如果 SQL Server 已经停止，则不执行任何操作。\n\
  \        ```\n        sudo systemctl stop mssql-server\n        ```\n    - 启动 SQL\
  \ Server。如果 SQL Server 已启动，则不执行任何操作。\n        ```\n        sudo systemctl start\
  \ mssql-server\n        ```\n    - 重启 SQL Server。如果 SQL Server 正在运行，此命令会将其关闭然后重新启动。如果\
  \ SQL Server 已停止，此命令将启动它。\n        ```\n        sudo systemctl restart mssql-server\n\
  \        ```\n\n\n\n### 第 2 章：安装与配置\n\n**提示**：`systemctl` 会向服务控制提交一个“作业”。只有 `status`\
  \ 选项会显示信息。当你尝试启动、停止或重启服务时，使用 `status` 选项来查看结果。\n\n`scp`：代表安全文件复制（secure file copy），可用于将文件从一个\
  \ Linux 服务器复制到另一个。\n\n**提示**：有一个非常棒的免费工具叫做 `winscp`，我经常用它从 Windows 复制文件到 Linux。Windows\
  \ 的 `ssh` 程序 MobaXterm 也包含一些基本的拖放复制功能。\n\n`df`：显示挂载在驱动器上的文件夹的磁盘空间使用情况。使用 `-h` 选项可以以易读的格式显示哪些目录挂载在特定磁盘及其大小。我发现这对于查看\
  \ `/var/opt/mssql` 目录有多少空间用于默认数据库很有帮助。\n\n`du`：代表磁盘使用情况（disk usage）。一个非常方便的命令，用于显示按目录划分的磁盘空间使用情况。\n\
  \n`tree`：你必须安装一个软件包才能使用此命令（`yum install tree`）。它以层级结构显示一个目录及其所有文件和子目录。\n\n在本书后面的章节中，我将讨论我用于监控性能和系统信息的各种\
  \ Linux 命令。\n\n### sudo\n\n当你安装 Linux 时，通常需要提供一个用于与 Shell 进行常规交互的登录名和密码，以及 root\
  \ 用户的密码。出于安全原因，最好不要以 root 用户（通常称为超级用户）身份直接登录并运行。因此，有一种方法可以在以另一个用户身份登录时，以 root（或另一个用户）的上下文执行命令。\n\
  \n这种方法由一个名为 `sudo` 的命令实现（这代表“substitute user do”，但过去被称为“superuser do”，因为在旧版本中它只用于超级用户命令）。\n\
  \n例如，你的默认账户将没有权限访问 SQL Server 的安装目录，因此你需要运行此命令来列出其中一个目录：\n\n```\nsudo ls /var/opt/mssql\n\
  ```\n\n**注意**：注意这里的目录导航符号 `/` 与 Windows 约定的 `\\` 不同。\n\n通常，在 `ssh` 会话中，当你第一次使用 `sudo`\
  \ 时，系统会提示你输入密码。默认情况下，该认证会缓存一段时间（五分钟，你可以配置此值）。这意味着，实际上，一旦你输入密码，在接下来的五分钟内，所有其他 `sudo`\
  \ 执行都不需要再次输入密码。\n\n与所有 Linux 命令一样，`sudo` 有大量的选项。你可能觉得有用的两个选项是 `-i` 和 `-u`。`-i` 允许你更改\
  \ Shell 会话的上下文，以超级用户身份运行所有后续命令。例如，当你运行 `sudo -i` 时，系统会提示你输入密码，然后你的 Shell 提示符会改变，表明你现在正在以\
  \ root 身份运行：\n\n```\n[root@bwsql2017rhel ~]#\n```\n\n`-u` 选项允许你以 root 之外的另一个用户的身份上下文运行命令。\n\
  \n## 查看和编辑文件与脚本\n\n对于许多用户来说，任何操作系统中的常见任务都是查看和编辑文件以及构建脚本。在以下示例中，只有当文件需要超级用户权限时才需要\
  \ `sudo` 命令。\n\n查看任何文本文件最常用的命令是 `cat` 命令。因此，命令 `sudo cat /var/opt/mssql/log/errorlog`\
  \ 会输出 SQL Server ERRORLOG 的文本内容（我将在本章后面解释此文件的重要性）。\n\n`more` 命令可用于分页查看任何文件。\n\n\
  ```\nsudo more /var/opt/mssql/log/errorlog\n```\n\n**提示**：这个命令“更有”内涵。当文件通过 `more`\
  \ 显示时，按下 `h` 键可以获取选项列表，其中包括搜索功能。\n\n我最喜欢的命令之一是 `tail` 命令，用于查看文件的末尾部分。这对于查看像 SQL\
  \ Server ERRORLOG 这类文件中的最新条目非常方便：\n\n```\nsudo tail /var/opt/mssql/log/errorlog\n\
  ```\n\n![](img/index-56_1.png)\n\n如果你有一个文件会频繁追加内容，你可以使用 `tail` 来“监控”文件的新条目，就像这样：\n\
  \n```\nsudo tail -f /var/opt/mssql/log/errorlog\n```\n\n\n\n编辑文件也是另一项常见任务，包括编写 shell\
  \ 脚本。我记得早年使用 UNIX 时著名的 `vi` 编辑器。我的一位朋友曾建议我学习 vi，因为它默认安装在全世界每一台 UNIX 系统上。至今它仍然可供你使用。但现在我更喜欢流行的\
  \ `nano` 编辑器（正如 Robert Dorr 所建议的）。`nano` 可能没有安装在你的 Linux 服务器上，因此在 RHEL 上，我使用以下命令安装它：\n\
  \n```\nsudo yum install nano\n```\n\n`nano` 是一个全屏编辑器，甚至支持剪切/复制/粘贴。图 2-3 是一个使用 `nano`\
  \ 创建用于安装 SQL Server 的 shell 脚本的示例屏幕。\n\n*图 2-3. 在 Linux 上的 `nano` 编辑体验*\n\n请记住，当你创建一个\
  \ shell 脚本时，你必须将其“模式”更改为可执行才能运行它：\n\n```\nchmod u+x installsql.sh\n```\n\n######\
  \ 系统日志记录\n\n本章后续部分，我将讨论一个名为 ERRORLOG 的日志文件，SQL Server 使用它来提供有关启动、错误、警告和其他执行详情的重要信息。你可能还需要查看\
  \ Linux 内核或其他程序的日志。在较旧的基于 RPM 的发行版和当前的 Debian 系统中，一个常见的文件是 `/var/log/syslog`。在像\
  \ RHEL 这样的当前基于 RPM 的系统版本中，有一个非常棒的程序可以查看大多数系统日志，称为 `journalctl`。并且 SQL Server 会将其\
  \ ERRORLOG 中的信息写入同一个日志记录设施。\n\n默认情况下，`journalctl` 只会保留自你的 Linux 服务器上次启动以来的消息（这是可配置的，以使日志在多次启动间保持持久化），而默认执行\
  \ `journalctl` 会显示自启动以来所有已记录的、从最旧开始的消息：\n\n```\njournalctl\n```\n\n以下是 Linux 上 `journalctl`\
  \ 的一些典型输出：\n\n```\n-- 日志始于 Sat 2018-02-17 09:29:49 CST，止于 Tue 2018-02-20 06:43:04\
  \ CST。 --\n2 月 17 09:29:49 bwsql2017rhel system-journal[106]: Runtime journal is\
  \ using 8.0M (max allowed 390.2M, trying to leave 545.4M f\n2 月 17 09:29:49 bwsql2017rhel\
  \ kernel: Initializing cgroup subsys cpuset\n2 月 17 09:29:49 bwsql2017rhel kernel:\
  \ Initializing cgroup subsys cpu\n...\n```\n\n**提示**：`journalctl` 中显示的 Linux 版本是\
  \ Linux 内核发布的版本。要找出你的发行版发布和版本号的具体详细信息，请使用此命令：\n\n```\ncat /etc/os-release\n```\n\
  \n默认情况下，`journalctl` 会分页显示输出，但你可以使用一个选项来控制这一点。要查看所有 SQL Server 条目，你可以使用如下命令：\n\n\
  ```\njournalctl | grep sqlservr\n```\n\n这仅向你显示 `sqlservr` 的日志输出，但你可能希望看到与其他内核消息交织的输出。在这种情况下，只需运行\
  \ `journalctl` 转储整个日志，因为每个条目都标有时间戳。\n\n## 只管安装它吧！\n\n至此，本章中你已经了解了 SQL Server 的系统要求，探索了一些测试\
  \ Linux 环境和 SQL Server 的基础知识，并且如果你是 Linux 新手，还获得了一些关于如何操作操作系统和 shell 的技巧。或者你可能只是跳到这里，想立即开始安装\
  \ SQL Server。在本节中，我将引导你完成安装过程，并为你提供一些幕后信息。\n\n## 60 秒内部署完成\n\n在我展示在 RHEL 上安装的步骤之前，这里快速提供了在\
  \ Ubuntu（使用 `apt-get`）和 SLES（使用 `zypper`）上安装的指引。这些步骤非常相似但略有不同，以适应这些发行版上的包管理器。\n\n\
  *Ubuntu*：[`docs.microsoft.com/sql/linux/quickstart-install-connect-ubuntu`](https://docs.microsoft.com/sql/linux/quickstart-install-connect-ubuntu)\n\
  \n*SLES*：[`docs.microsoft.com/sql/linux/quickstart-install-connect-suse`](https://docs.microsoft.com/sql/linux/quickstart-install-connect-suse)\n\
  \n\n\n## 在 RHEL 上的安装只需三个简单步骤\n\n请注意，这些步骤要求您的 Linux 服务器具有互联网连接。本章后面将讨论如何进行离线安装。\n\
  \n1.  下载一个名为仓库（repo）配置文件的文本文件到已知目录。\n    ```\n    sudo curl -o /etc/yum.repos.d/mssql-server.repo\
  \ https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo\n    ```\n\
  \n2.  运行安装命令。\n    ```\n    sudo yum install -y mssql-server\n    ```\n    > **提示：**\
  \ 此步骤安装基于累积更新（Cumulative updates，简称 CUs）概念的最新 SQL Server 2017 更新。本章后面将讨论如何应用特定版本。建议使用最新更新，因为我们持续改进\
  \ SQL Server on Linux，包括修复和次要增强。还建议在 Linux 上安装 SQL Server 后，每月保持更新，因为这是典型的更新频率。\n\
  \n3.  运行 bash shell 脚本以 `完成` SQL Server 的安装（回答几个提示）：\n    ```\n    sudo /opt/mssql/bin/mssql-conf\
  \ setup\n    ```\n\n### 第 2 章：安装与配置\n\n就是这样。如果您有良好的互联网连接，这些步骤大约可以在 60 秒内完成。我已经多次看到并做到了这一点。\n\
  \n此时，如果您像我一样，只想快速推进——构建数据库、应用程序和查询。我理解这一点，事实上，我们在 Linux 上构建 SQL Server 就是为了让您能够这样做。但本书旨在全面涵盖该主题，因此本章的其余部分提供了关于完整安装体验的详细信息。如果您计划开始使用\
  \ SQL Server，我建议您停下来浏览以下资源，以避免使用产品时遇到任何问题：\n\n[`docs.microsoft.com/sql/linux/sql-server-linux-release-notes`](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes)\
  \ 和 [`docs.microsoft.com/sql/linux/sql-server-linux-faq`](https://docs.microsoft.com/sql/linux/sql-server-linux-faq)。\n\
  \n如果您对每个步骤背后的更多细节感兴趣，请继续阅读。否则，请转到本章的下一节。\n\n##### 下载仓库配置文件\n\n您只需在 Linux 服务器上下载一次仓库配置文件（除非您想更改要使用的仓库），即使您决定安装和卸载多次。\n\
  ```\nsudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo\n\
  ```\n\n`curl`，也称为 cURL（代表 Client URL Request Library），是一个使用 URL 语法获取或发送文件的命令。默认写入标准输出（stdout），因此\
  \ `-o` 参数后跟一个文件名。在本例中，SQL Server 遵循 `yum` 仓库约定，将文件放在 `/etc/yum/repos.d` 目录中。\n\n\
  仓库文件是一个简单的文本文件，如下所示（基于我们 packages.microsoft.com 服务器上的 `mssql-server-2017.repo`）：\n\
  ```\n[packages-microsoft-com-mssql-server-2017]\nname=packages-microsoft-com-mssql-server-2017\n\
  baseurl=https://packages.microsoft.com/rhel/7/mssql-server-2017/\nenabled=1\ngpgcheck=1\n\
  gpgkey=https://packages.microsoft.com/keys/microsoft.asc\n```\n\n![](img/index-60_1.png)\n\
  \n### 第 2 章：安装与配置\n\n`mssql-server-2017.repo` 是 SQL Server 2017 CU 仓库的配置文件。您可能想使用不同的仓库（例如用于预览构建或通用分发版\
  \ [GDR] 的仓库）。有关更多详情，请参阅本章中名为“安装其他版本”的部分。此仓库文件将控制包管理器用于下载和安装更新包的内容。\n\n其概念是从应用程序供应商提供的位置下载仓库文件，这样当您运行安装时，`yum`\
  \ 包管理器将使用该文件的内容来安装包（以及密钥）。因此，这个 URL（[`packages.microsoft.com/rhel/7/mssql-server-2017/`](https://packages.microsoft.com/rhel/7/mssql-server-2017/)）\n\
  \n\n\n"
- "# 第二章 安装与配置\n\n[microsoft.com/rhel/7/mssql-server-2017/](https://packages.microsoft.com/rhel/7/mssql-server-2017/)\
  \ 是适用于 RHEL 的 SQL Server RPM 软件包的实际位置。以下是一个在我的系统上执行 `curl` 命令的示例：\n\n```\n[thewandog@bwsql2017rhel\
  \ ~]$ sudo curl – o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo\n\
  ```\n\n然后，图 2-4 显示了输出的样子。\n\n**图 2-4. 下载 RHEL 的仓库配置文件的输出示例**\n\n##### 安装 SQL Server\
  \ 引擎\n\n既然仓库文件已复制，是时候在基于 RHEL 的 Linux 上执行 SQL Server 的安装了。\n\n```\nsudo yum install\
  \ -y mssql-server\n```\n\n重新回到 Linux，有一件事让我很享受，那就是了解操作系统各个部分是如何进入发行版的历史。`yum` 代表（YellowDog\
