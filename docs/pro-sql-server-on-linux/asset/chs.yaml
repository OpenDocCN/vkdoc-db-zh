- '# Bob Ward


  拥有 25 年经验，参与过从 OS/2 1.1 到 SQL Server 2017（包括 Linux）的每一个 SQL Server 版本发布。他曾在客户支持部门担任首席升级工程师和首席技术官（CTO），与全球一些规模最大的
  SQL Server 部署项目进行过深度协作。Bob 是知名的 SQL Server 演讲嘉宾，常在 SQL PASS Summit、SQLBits、SQLIntersection、Red
  Hat Summit、Microsoft Inspire 和 Microsoft Ignite 等活动中，就新版本发布、内部机制和性能优化等主题发表演讲。你可以在
  Twitter 上通过`@bobwardms`找到他，阅读他的博客文章：[`aka.ms/bobsql`](http://aka.ms/bobsql) 或 [`aka.ms/sqlblog`](http://aka.ms/sqlblog)，或在`http://aka.ms/sqlchannel`观看他的演示。


