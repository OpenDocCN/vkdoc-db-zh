  \ (player char(50), number int)\n    GO\n    ```\n\n5.  现在备份事务日志以模拟周一中午 12:00 的备份，执行以下\
  \ T-SQL 语句，该语句可在示例脚本 `backupwwilog1.sql` 中找到：\n\n    ```\n    USE master\n    GO\n\
  \    BACKUP LOG WideWorldImporters TO DISK = '/var/opt/mssql/data/wwi_log1.bak'\n\
