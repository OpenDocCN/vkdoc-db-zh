  ## 第 6 章 性能特性


  “并行度的成本阈值”设置用于控制 SQL Server 查询优化器何时根据成本选择在查询计划中使用并行任务。默认值 5 适用于许多工作负载。然而，这个默认值是
  SQL Server 工程团队在 SQL Server 7.0 时代基于测试设定的。因此，几乎所有 SQL Server 专家都认为这个默认值应该高得多。


  事实上，SQL Server 文档在 [`docs.microsoft.com/sql/database-engine/configure-windows/configure-the-cost-threshold-for-parallelism-server-configuration-option`](https://docs.microsoft.com/sql/database-engine/configure-windows/configure-the-cost-threshold-for-parallelism-server-configuration-option)
  中指出：“虽然为了向后兼容保留了默认值 5，但对于当前系统，更高的值可能更合适。许多 SQL Server 专业人士建议以 25 或 30 作为起始点，并使用更高和更低的值进行应用程序测试，以优化应用程序性能。”


  ### 进程亲和性


  如本章前面所述，SQL Server 会自动利用多核和 NUMA 架构。在某些场景下，你可能只想允许 SQL Server 核心引擎及其工作线程在特定的 NUMA
  节点和/或 CPU 上运行。你可以通过使用 `ALTER SERVER CONFIGURATION` T-SQL 命令来实现这一点。一种场景可能是，Linux
  服务器上运行着其他进程，你希望确保它们获得足够的 CPU 资源，因此会将 SQL Server 限制为仅使用某些 NUMA 节点和/或 CPU。


  例如，假设你有一台具有八个 CPU 的 Linux 服务器。以下 T-SQL 命令将只允许 SQL Server 在 CPU 4-7（CPU 从 0 开始计数）上调度工作线程：


  ```

  ALTER SERVER CONFIGURATION SET PROCESS AFFINITY CPU = 4 TO 7

  GO

  ```


  此命令的效果是动态且立即生效的，无需重新启动 SQL Server。此时，若要切换回允许 SQL Server 在所有可用 CPU 上运行，请执行以下 T-SQL
  语句：


  ```

  ALTER SERVER CONFIGURATION SET PROCESS AFFINITY CPU = AUTO

  GO

  ```


  为了获得最佳性能，我们在测试中发现，*如果你计划允许 SQL Server 在所有可用 CPU 上运行*，你应该将亲和性设置为系统上的所有节点或 CPU。例如，如果你有一个
  4 个 NUMA 节点的系统，那么你将亲和性设置为所有节点，如下列 T-SQL 语句所示：


  ```

  ALTER SERVER CONFIGURATION SET PROCESS AFFINITY NUMANODE = 0 TO 3

  GO

  ```


  **注意** 有些线程在 `SQLpal` 或 `host` 扩展的上下文中执行，它们不是已调度的工作线程。它们不会遵守使用 `ALTER SERVER CONFIGURATION`
  的设置，但它们的执行消耗的 CPU 应该不会像 SQL Server 工作线程那么多。


  有关设置进程亲和性的更多示例，请参阅我们的文档：[`docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql)。


  ### 跟踪


  我在本书前面提到过遗留的跟踪功能 SQL Server Trace。在之前的几个版本中，我们加入了一个 *默认跟踪*，当 SQL Server 中的配置选项被更改以及对象修改被跟踪时，它会捕获一些基本信息。


  虽然这些信息中的一些可能对你有用，但我建议你通过 `sp_configure` 关闭这个名为 `default trace enabled` 的配置选项。每一个微小的...


  '
- '# 第 6 章 性能能力


  性能的多少能有所帮助，并且此功能已弃用，因此可能在未来的版本中被移除。请参阅我们的文档了解如何执行此操作：[`docs.microsoft.com/sql/database-engine/configure-windows/default-trace-enabled-server-configuration-option`](https://docs.microsoft.com/sql/database-engine/configure-windows/default-trace-enabled-server-configuration-option)。


  ## 线程


  我已经提到了工作线程的概念，以及 SQL Server 拥有这些线程池来满足诸如登录和查询等任务需求的事实。SQL Server 在启动时初始化此池，并根据需要增加或减少线程数。


  为了避免消耗过多资源，SQL Server 对池中的线程数设置了最大值。默认情况下，SQL Server 根据在 Linux 服务器上检测到的 CPU 数量来计算此最大值。你可以在
  `sys.dm_os_sys_info.max_workers_count` 列中看到此计算值。此值的计算公式可在我们的文档中找到：[`docs.microsoft.com/sql/database-engine/configure-windows/configure-the-max-worker-threads-server-configuration-option`](https://docs.microsoft.com/sql/database-engine/configure-windows/configure-the-max-worker-threads-server-configuration-option)。


  在大多数情况下，如果此工作线程池计算不足以服务应用程序的工作负载，问题通常是并发性问题，例如许多线程在某个资源上被阻塞。然而，在某些情况下，增加默认值可能会提升高并发、多用户工作负载的性能。对于这些情况，请使用
  `sp_configure` 系统过程来更改 `max worker threads` 配置值。你需要重新启动 SQL Server 才能使此更改生效。请使用本节中的文档资源获取完整语法。


  ## 计划缓存


  计划缓存可能是一个宝贵的资源，用于确保缓存最大数量的查询和对象，以避免频繁的查询编译。某些应用程序工作负载不可避免地使用许多 `single-user ad hoc
  queries`。这些是 T-SQL 语句，它们不以存储过程对象的形式存在，没有 `parameterized`，并且通常只执行一次。为了最小化此类查询的内存占用，你可以通过
  `sp_configure` 启用 `optimize for ad hoc workloads` 配置选项。这将最小化这些类型的临时查询对内存的影响。


  你可以在我们的文档中确定你的应用程序工作负载是否符合此选项的需求以及如何配置它：[`docs.microsoft.com/sql/database-engine/configure-windows/optimize-for-ad-hoc-workloads-server-configuration-option`](https://docs.microsoft.com/sql/database-engine/configure-windows/optimize-for-ad-hoc-workloads-server-configuration-option)。


  ## Tempdb 文件


  我在第 4 章讨论临时表的使用时，谈到了 tempdb 的用途。由于 tempdb 的独特用途涉及数据库页面的频繁分配和释放，使用单个 tempdb 数据库文件可能会导致用于跟踪分配信息的系统数据库页面出现并发问题，并且



  任何合理的多用户工作负载。


  为了使这些并发场景更具可扩展性，你可以通过为 `tempdb` 数据库创建多个数据库文件来改进对这些系统数据库页面的访问。Linux 上的 SQL Server
  在安装时默认仅提供单个 `tempdb` 数据库文件。因此，在任何拥有一个以上 CPU 的 Linux 服务器上，你都应该计划创建额外的 `tempdb` 数据库文件。


  '
- "# 第 6 章 性能特性\n\n来自 SQL Server 客户顾问团队的朋友 Denzil Ribero 创建了一个很好的 T-SQL 脚本，你可以用它来为我们的\
  \ Linux 服务器安装添加多个 `tempdb` 文件。你可以在 [`github.com/denzilribeiro/sqlunattended/blob/master/AddTempdb.sql`](https://github.com/denzilribeiro/sqlunattended/blob/master/AddTempdb.sql)\
  \ 找到这个脚本。你可以在我们的文档 [`docs.microsoft.com/sql/relational-databases/databases/tempdb-database`](https://docs.microsoft.com/sql/relational-databases/databases/tempdb-database)\
  \ 和这篇知识库文章 [`support.microsoft.com/help/2154845/recommendations-to-reduce-allocation-contention-in-sql-server-tempdb-d`](https://support.microsoft.com/help/2154845/recommendations-to-reduce-allocation-contention-in-sql-server-tempdb-d)\
  \ 中阅读更多关于如何确定 `tempdb` 文件大小和数量的内容。\n\n##### 数据库选项\n\n虽然上一节介绍了一些影响 SQL Server 实例的、更有趣的重要性能配置选项，但你也可以在数据库级别进行更改，以帮助提升应用程序的性能。所有这些选项都使用\
  \ T-SQL `ALTER DATABASE` 语句进行配置。\n\n-   **PARAMETERIZATION**：我在上一节讨论了如何最小化即席查询的计划缓存占用。即席查询会膨胀计划缓存的一个原因是它们没有被参数化。参数化涉及为那些除了\
  \ T-SQL 语句的 `WHERE` 子句中的参数外几乎完全相同的查询缓存一个单一的查询计划。\n\n    SQL Server 默认包含对即席查询执行*简单*参数化的逻辑。简单参数化涵盖的查询范围不广。因此，你可以使用\
  \ `ALTER DATABASE` 选项 `SET PARAMETERIZATION FORCED`。使用此数据库选项将导致 SQL Server 扩大可能被参数化的查询范围。那么，你如何知道是否应该考虑此数据库选项呢？请考虑以下要点：\n\
  \n    -   提交未参数化查询的应用程序通常以高查询编译率为特征。你可以在 `object_name = 'SQLServer:SQL Statistics'`\
  \ 且 `counter_name = 'SQL Compilations/sec'` 时检查 `dm_os_performance_counters` DMV。\n\
  \n    -   什么是“高”？嗯，可能缺少查询参数化的第二个症状是 SQL Server 的高 CPU 利用率。这是因为查询的高编译率会导致更高的 SQL\
  \ CPU 利用率。\n\n    -   你可以使用 DMV `dm_exec_query_stats` 通过一种称为查询哈希的概念来查找计划缓存中除了字面值外相同的查询。你可以运行如下查询（可以在示例脚本\
  \ `queryhash.sql` 中找到）这样的 T-SQL 批处理：\n\n    ```sql\n    -- 找出哪些查询哈希值相同但在缓存中是不同的\n\
  \    --\n    SELECT dest.text, deqs.query_hash, count (*) query_count\n    FROM\
  \ sys.dm_exec_query_stats deqs\n    CROSS APPLY sys.dm_exec_sql_text(deqs.sql_handle)\
  \ AS dest\n    GROUP BY (query_hash), dest.text\n    ORDER BY query_count DESC\n\
  \    GO\n    ```\n\n\n\n如果运行此查询后发现最高计数值仅为 2 或 3，那么您可能不存在任何问题。但如果这些查询的计数器值明显更高，则可以通过研究查询参数化来提升性能。\n\
  \n*   前述查询使用起来非常快捷，但仅能查找执行计划已缓存至内存中的查询。若因内存压力导致某些可作为参数化候选方案的查询未缓存，此时查询存储（Query Store）将发挥重要作用。请查阅我们文档中的以下示例，了解如何使用查询存储识别即席工作负载：[`docs.microsoft.com/sql/relational-databases/performance/query-store-usage-scenarios`](https://docs.microsoft.com/sql/relational-databases/performance/query-store-usage-scenarios)。\n\
  \n关于此数据库选项需要说明的是：即便发现需要查询参数化，最佳解决方法仍是修正应用程序。但若无法更改应用程序，启用此选项可能带来收益。\n\n如同任何非默认选项一样，请谨慎调整此设置。虽然启用此选项能减少查询编译次数，但也会迫使许多查询共享相同的编译执行计划。这对某些应用程序而言未必是最佳选择。\n\
  \n## 第六章：性能特性\n\n*   **`READ_COMMITTED_SNAPSHOT`**\n\nSQL Server 应用程序常见的性能问题是*阻塞*。虽然我一直建议遇到阻塞问题的用户尝试排查原因并解决问题，但存在一个数据库选项可缓解甚至彻底解决该问题。首先建议您阅读我们文档中关于锁机制和*行版本控制*基础原理的章节：[`docs.microsoft.com/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide`](https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide)。\n\
  \n常见阻塞场景之一涉及读写操作因访问相同数据而相互阻塞，尤其是在涉及长时间运行的事务时。避免此类场景的选项之一是使用`ALTER DATABASE`语句设置`READ_COMMITTED_SNAPSHOT\
  \ ON`。启用此数据库选项后，该数据库上下文中的读取操作将看到 T-SQL `SELECT`语句开始时的数据快照/版本，而非使用锁机制。启用此选项会在数据库页和`tempdb`中产生一定开销。此文档链接详细说明了使用行版本控制的前提条件：[`docs.microsoft.com/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide#Row_versioning`](https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide#Row_versioning)。\n\
  \n应用程序也可使用快照隔离级别，关于快照与行版本控制的更多内容，请参阅我们文档：[`docs.microsoft.com/dotnet/framework/data/adonet/sql/snapshot-isolation-in-sql-server#understanding-snapshot-isolation-and-row-versioning`](https://docs.microsoft.com/dotnet/framework/data/adonet/sql/snapshot-isolation-in-sql-server#understanding-snapshot-isolation-and-row-versioning)。\n\
  \n\n\n[快照隔离与行版本控制](https://docs.microsoft.com/dotnet/framework/data/adonet/sql/snapshot-isolation-in-sql-server#understanding-snapshot-isolation-and-row-versioning)。\n\
  \n"
- '# 作用域配置


  从 SQL Server 2016 开始，新增的一项实用功能是能够在数据库级别设置配置选项，而这些选项以前仅可在实例级别或通过跟踪标志进行设置。


  例如，服务器配置选项 `最大并行度` 可以在数据库级别使用 `ALTER DATABASE SCOPED CONFIGURATION SET MAXDOP =
  <value>` 进行覆盖。（注意：`最大并行度` 也是一个可以通过查询提示在查询级别进行配置的选项。）


  '
- '# 第六章 性能特性


  另一个值得考虑使用的选项是 `查询优化器热修复`。这等同于使用跟踪标志 4199 来启用查询优化器热修复，我在 `第五章` 的“跟踪标志”一节中讨论过这一点。不同之处在于，您可以仅为在设置了此选项为开启的数据库中运行的查询启用优化器热修复。


  可以使用 `ALTER DATABASE SCOPED CONFIGURATION` 设置的完整选项集可在我们的文档中找到：[`docs.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql)。


  ##### Linux 内核配置


  我已经向您展示了 SQL Server 实例和数据库配置选项。这些选项适用于 Windows 和 Linux 上的 SQL Server。对于 Linux 内核，是否有任何我建议您为
  SQL Server 使用的特殊调优？答案是肯定的，但它并不像您想象的那么复杂。


  SQL Server 是一个会最大化利用 CPU、内存和 I/O 资源的应用程序。因此，在我们构建 SQL Server 并与客户在社区技术预览版 (CTP)
  构建期间合作时，我们发现有几个 Linux 内核选项是有帮助的。这些选项的完整列表包含在我们文档的此部分中：《SQL Server 2017 on Linux
  的性能最佳实践和配置指南》，[`docs.microsoft.com/sql/linux/sql-server-linux-performance-best-practices`](https://docs.microsoft.com/sql/linux/sql-server-linux-performance-best-practices)。


  您可以查看这些配置选项并根据您的工作负载决定进行更改。我们发现，在大多数应用程序工作负载下，这些选项有助于 SQL Server 在 Linux 上发挥最佳性能。


  在查阅这些选项时，请参考您的 Linux 发行版的文档以及进行更改的正确方法。在某些 Linux 发行版上，这些选项可能已经设置为推荐值。例如，我发现，在 Red
  Hat Enterprise Linux 上，默认通过 `tuned-adm` 功能启用了 `throughput-performance` 配置文件，其中包含我们推荐的许多设置（注意：在您的
  RHEL 系统上运行 `man tuned-adm` 以了解有关 RHEL 配置文件的更多信息）。


  关于 Linux 和机器配置的另外几个要点：


  • 密切关注与能源和功耗相关的 BIOS 设置。为获得最佳性能，请确保您的 BIOS 设置使用最大可能的功耗。


  • 对于在虚拟机中运行的 SQL Server on Linux，请咨询您的虚拟机提供商，了解虚拟 CPU、NUMA 和其他与机器相关设置的正确配置。SQL Server
  on Linux 唯一不能使用的设置是任何支持 `动态内存` 的虚拟机配置。


  关于操作系统配置的最后一点说明：在 Windows 上，有两个影响 SQL Server 性能的配置设置：`内存中锁定页`（您可以阅读





  更多详情，请参阅[启用内存锁定页选项](https://docs.microsoft.com/sql/database-engine/configure-windows/enable-the-lock-pages-in-memory-option-windows)和**即时文件初始化**（你可以在[数据库即时文件初始化](https://docs.microsoft.com/sql/relational-databases/databases/database-instant-file-initialization)中阅读更多内容）。对于运行于
  Linux 上的 SQL Server，这两种选项都不是必需的。Linux 中不存在 Windows 上那样的**内存锁定页**概念（即，Linux 中没有等效的
  `AWE API`）。使用 `memorylimitmb` 选项可以避免 `sqlservr` 进程出现内存问题和分页。


  此外，SQL Server 在创建文件时使用 Linux API 调用，其即时文件初始化行为是默认行为。注意：与在 Windows 上一样，SQL Server
  仍然需要将事务日志文件清零，以便在恢复期间正确识别事务日志的结尾。更多信息，请参见 Anthony Nocentino 的博客文章 [Linux 上 SQL Server
  的即时文件初始化](http://www.centinosystems.com/blog/sql/instant-file-initialization-in-sql-server-on-linux)。


  ## 调优以取得成功


  你已经见识了 SQL Server 内置的性能能力。我已向你展示了一些重要的 SQL Server、数据库和 Linux 配置选项。掌握了这些知识后，我相信每个使用
  SQL Server 的人都应该了解另外几个重要的主题，以调优你的 SQL Server 数据库、对象和应用程序。这包括数据库和事务日志文件的物理放置、创建正确的索引、保持统计信息准确且最新，以及开发者为确保其应用程序充分发挥
  SQL Server 潜力而应掌握的技巧。


  '
- '# 第六章 性能能力


  ## 文件与文件组


  我在第 3 章中向你展示了如何创建数据库，并简要描述了数据库随附的默认文件：一个数据库文件（通常以 `.mdf` 为文件扩展名）和一个事务日志文件（通常以 `.ldf`
  为文件扩展名）。


  在许多情况下，使用单个数据库文件和单个事务日志文件足以满足 SQL Server 数据库的需求。然而，本章是关于调优的，因此我在本节提供了关于如何通过文件放置、文件组以及规划文件增长来最大化
  I/O 性能的指导。


  我还应该说明，如果你决定在一个 SQL Server 实例上托管多个数据库，你应该考虑将每个数据库的文件分散到多个磁盘上，或者使用配置为跨一系列驱动器条带化 I/O
  的托管磁盘存储系统。我通常将系统数据库放在默认的数据库文件位置，除了 `tempdb` 数据库外，不太担心磁盘性能问题。


  通常的做法是将 `tempdb` 数据库文件与其他系统数据库放在不同的磁盘上。我们的文档有一个很好的示例，说明如何将 `tempdb` 文件移动到其他路径，请参阅[移动系统数据库](https://docs.microsoft.com/sql/relational-databases/databases/move-system-databases#Examples)。


  ###### 分离数据和事务日志文件


  我几乎总是建议使用单个事务日志文件。不存在性能





  拥有多个事务日志文件的好处。如果你决定只使用一个数据库文件，我确实建议你将数据库文件和事务日志文件放置在不同的磁盘上。这是多年来针对 SQL Server 数据库的传统建议。该建议的主要原因之一在于数据库文件和事务日志文件的
  I/O 使用模式特性。对数据库文件的写入被描述为 `随机` I/O。虽然 SQL Server 以连续页的方式写入数据库文件，但它可以写入文件中的任何位置。对事务日志的写入总是顺序的。SQL
  Server 在写入事务日志文件时总是追加日志块。此外，SQL Server 很可能通过检查点任务（例如 `RECOVERY WRITER`）并发地写入数据库文件，并通过
  `LOG WRITER` 任务写入事务日志。因此，通过将数据库文件写入和事务日志写入分离到不同的磁盘上，你几乎总是能获得更好的 I/O 性能。


  '
- '# 第六章 性能能力


  分离数据库和事务日志文件的另一个重要好处是可恢复性。如果数据库文件丢失但当前的事务日志可用（假设你正在使用完整恢复模型；关于完整恢复模型的更多信息请参见 [`docs.microsoft.com/sql/relational-databases/backup-restore/recovery-models-sql-server#RMov`](https://docs.microsoft.com/sql/relational-databases/backup-restore/recovery-models-sql-server#RMov)），反之亦然，则可以执行高级恢复。


  我在前面章节中用于创建数据库的语法没有指定文件名或文件路径。如果你为完整的 WideWorldImporters 示例数据库生成脚本，你将看到以下语法：


  ```

  CREATE DATABASE [WideWorldImporters]

  CONTAINMENT = NONE

  ON  PRIMARY

  ( NAME = N''WWI_Primary'', FILENAME = N''/var/opt/mssql/data/WideWorldImporters.mdf''
  , SIZE = 1048576KB , MAXSIZE = UNLIMITED, FILEGROWTH = 65536KB ),

  FILEGROUP [USERDATA]  DEFAULT

  ( NAME = N''WWI_UserData'', FILENAME = N''/var/opt/mssql/data/WideWorldImporters_UserData.ndf''
  , SIZE = 2097152KB , MAXSIZE = UNLIMITED, FILEGROWTH = 65536KB ),

  FILEGROUP [WWI_InMemory_Data] CONTAINS MEMORY_OPTIMIZED_DATA  DEFAULT

  ( NAME = N''WWI_InMemory_Data_1'', FILENAME = N''/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1''
  , MAXSIZE = UNLIMITED)

  LOG ON

  ( NAME = N''WWI_Log'', FILENAME = N''/var/opt/mssql/data/WideWorldImporters.ldf''
  , SIZE = 102400KB , MAXSIZE = 2048GB , FILEGROWTH = 65536KB )

  GO

  ```


  请注意 `FILENAME` 参数用于指定文件的路径和物理名称。要分离事务日志，你需要从单独的磁盘挂载一个目录，并指定该磁盘上事务日志的路径。我将在下一节中向你展示如何使用文件组来实现这一点的示例。


  '
- "# 第六章 性能能力\n\n###### 使用多个数据库文件和文件组\n\n对于单个数据库，我已经描述了多个并发任务写入数据库的进程和场景，例如检查点、延迟写入和急切写入。然而，更常见的是看到针对数据库页的多个并发读取器。这些读取场景可能是多个用户执行需要从磁盘读取数据库页的查询，或者是执行带有并行运算符的单个查询。\n\
  \n如果你将数据库文件存储在经过条带化且为并发 I/O 优化的存储系统上，你可能只需使用一个数据库文件。然而，许多 SQL Server 的生产数据库使用多个数据库文件和一个称为\
  \ `文件组` 的概念。\n\n文件组是数据库文件的逻辑分组。在你创建一个包含多个数据库文件的文件组的数据库后，SQL Server 将使用 `轮询、按比例填充`\
  \ 算法在这些文件中分配页。轮询意味着 SQL Server 将分配\n\n\n\n### 第 6 章：性能能力\n\n从数据库文件组中分配页面组，然后再分配到文件组中的其他文件。按比例填充意味着\
  \ SQL Server 会尝试执行这些分配，使得使用的空间在数据库文件之间分布得相当均匀。\n\n一旦创建了文件组，你就可以将一个或多个表或索引指定到该命名文件组。默认情况下，每个数据库都有一个名为\
  \ `PRIMARY` 的内置文件组。所有系统表都存储在与 `PRIMARY` 文件组关联的文件中。\n\n生产数据库最常见的配置是为 `PRIMARY` 文件组创建一个较小的数据库文件，并为一组表和/或索引创建一个或多个命名文件组。从管理角度来看，文件组还提供了其他优势。你可以将文件组作为一个单位进行备份、还原、运行一致性检查和管理。\n\
  \n让我们看一个示例，了解如何创建一个数据库，该数据库使用一个独立的文件组将数据分布在多个磁盘的多个文件上，同时将事务日志放在另一个独立的磁盘上。\n\n首先，我需要为我的\
  \ Linux 服务器添加磁盘。之前提到过，我使用的是一个运行在 Windows Hyper-V 上的 Linux 虚拟机。对于 Windows 上的 Hyper-V，你可以按照我们文档中关于如何向虚拟机添加控制器、磁盘等硬件的说明进行操作：[`docs.microsoft.com/azure/virtual-machines/linux/attach-disk-portal`](https://docs.microsoft.com/azure/virtual-machines/linux/attach-disk-portal)。\n\
  \n添加硬件后，我需要在 Linux 操作系统中配置新磁盘，并将目录挂载到这些磁盘上。我的虚拟机已经有两块磁盘：一块用于 Linux 的标准文件，另一块专门挂载到\
  \ `/var/opt` 目录，标准 SQL Server 数据库文件就存放在那里。对于本示例：\n\n![](img/index-284_1.png)\n\n\
  我添加了四块新磁盘：一块用于存放三个新的数据库文件（它们将组成自己的文件组），另一块用于事务日志。如果你之前没有在 Linux 中配置过磁盘，我发现这份关于如何在\
  \ Azure 虚拟机中操作的文档非常有用：[`docs.microsoft.com/azure/virtual-machines/linux/add-disk`](https://docs.microsoft.com/azure/virtual-machines/linux/add-disk)。\n\
  \n对于我的虚拟机，当我完成磁盘配置并将目录挂载到它们之后，最终的配置如图 6-9 所示。\n\n*图 6-9. 在 Linux 中为 SQL Server 使用多块磁盘*\n\
  \n在我的示例中，`/dev/sdb` 磁盘是我为虚拟机创建的第二块磁盘，我将 `/var/opt` 目录挂载到了上面。安装 SQL Server 时，系统数据库被复制到了\
  \ `/var/opt/mssql/data`。这里也将是我存放 `PRIMARY` 文件组数据库文件的地方。\n\n表 6-1 列出了其他磁盘及其挂载目录。出于本示例的目的，我将每个虚拟磁盘的大小都设置为\
  \ 30GB。\n\n*表 6-1. 磁盘及其挂载目录*\n\n| **磁盘** | **挂载目录** | **用途** |\n| :--- | :--- |\
  \ :--- |\n| `/dev/sdc1` | `/data1` | 数据库文件 |\n| `/dev/sdd1` | `/data2` | 数据库文件 |\n\
  | `/dev/sde1` | `/data3` | 数据库文件 |\n| `/dev/sdf1` | `/log` | 事务日志 |\n\n**提示：** 如前面关于向\
  \ Linux 添加磁盘的文档所述，务必在 `/etc/fstab` 文件中更新这些磁盘的信息，以便在任何重启后它们都能被自动挂载。此外，务必通过执行 `sudo\
  \ chown mssql:mssql <directory>` 命令将这些目录的权限更改为 `mssql` 组和用户。\n\n创建好这些磁盘并挂载目录后，我现在可以像示例\
  \ `bigdb.sql` 中的以下 T-SQL 语句那样创建我的数据库了：\n\n```sql\nUSE [master]\nGO\nCREATE DATABASE\
  \ [big dB]\nON  PRIMARY\n( NAME = N'bigdb_Primary', FILENAME = N'/var/opt/mssql/data/bigdb.mdf'\
  \ ,\nSIZE = 5GB , MAXSIZE = 100GB, FILEGROWTH = 65536KB ),\nFILEGROUP [USERDATA]\
  \  DEFAULT\n```\n\n\n```\n( NAME = N'bigdb_UserData_1', FILENAME = N'/data1/bigdb_UserData_1.ndf'\
  \ ,\nSIZE = 10GB , MAXSIZE = 30GB, FILEGROWTH = 65536KB ),\n( NAME = N'bigdb_UserData_2',\
  \ FILENAME = N'/data2/bigdb_UserData_2.ndf' ,\nSIZE = 10GB , MAXSIZE = 30GB, FILEGROWTH\
  \ = 65536KB ),\n( NAME = N'bigdb_UserData_3', FILENAME = N'/data3/bigdb_UserData_3.ndf'\
  \ ,\nSIZE = 10GB , MAXSIZE = 30GB, FILEGROWTH = 65536KB )\nLOG ON\n( NAME = N'big_Log',\
  \ FILENAME = N'/log/bigdb_log.ldf' , SIZE = 10GB ,\nMAXSIZE = 30GB , FILEGROWTH\
  \ = 65536KB )\nGO\n```\n\n查看此 `CREATE DATABASE` 语句，您可以看到我将 `PRIMARY` 文件组放在了默认位置\
  \ `/var/opt/mssql/data`；将三个数据库文件放在了 `USERDATA` 文件组中，位于 `/data1`、`/data2` 和 `/data3`\
  \ 目录；并将事务日志文件放在了 `/log` 目录。我为这些文件选择了任意大小，但当您为生产环境创建数据库时，您需要花时间仔细确定这些文件的初始最佳大小。我将在下一节讨论\
  \ `MAXSIZE` 和 `FILEGROWTH` 参数，但为文件的初始大小做规划对于整体性能至关重要。请参阅我们文档中的指南 [`docs.microsoft.com/sql/relational-databases/databases/estimate-the-size-of-a-database`](https://docs.microsoft.com/sql/relational-databases/databases/estimate-the-size-of-a-database)，了解估算数据、数据库以及事务日志文件大小的最佳实践。\n\
  \n## 第 6 章 性能特性\n\n另请注意 `USERDATA` 文件组的语法 `FILEGROUP [USERDATA] DEFAULT`。关键字 `DEFAULT`\
  \ 意味着此文件组是数据库中创建的所有用户对象的默认位置（系统对象必须放在 `PRIMARY` 文件组中）。\n\n`注意` 如果您不将用户 `fILeGroUp`\
  \ 指定为 `DefaULT`，则所有表和索引默认将放置在 `prImarY fILeGroUp` 中。但是，T-SQL 提供了使用 `on` 关键字显式将表和索引放置在特定用户\
  \ `fILeGroUp` 上的语法。请参阅我们文档中关于文件组的此部分以获取示例和更多信息：[`docs.microsoft.com/sql/relational-databases/databases/database-files-and-filegroups#filegroups`](https://docs.microsoft.com/sql/relational-databases/databases/database-files-and-filegroups#filegroups)。\n\
  \n让我们添加一个表并填充数据，以查看 SQL Server 如何将数据库页分布在 `USERDATA` 文件组中的文件上。从示例 `bigtab.sql` 执行以下\
  \ T-SQL 批处理：\n\n```\nUSE [bigdb]\nGO\nDROP TABLE IF EXISTS [bigtab]\nGO\nCREATE\
  \ TABLE [bigtab] (col1 INT, col2 CHAR (7000) NOT NULL)\nGO\nSET NOCOUNT ON\nGO\n\
  DECLARE @x INT\nSET @x = 0\nWHILE (@x < 100000)\nBEGIN\nINSERT INTO [bigtab] VALUES\
  \ (@x , 'x')\nSET @x = @x + 1\nEND\n```\n\n![](img/index-287_1.jpg)\n\n第 6 章 性能特性\n\
  \n```\nGO\nSET NOCOUNT OFF\nGO\n```\n\n此脚本创建了一个表，该表每页容纳一行。无论向 `col2` 列插入什么值，该列都会填充为\
  \ 7,000 个字符。该脚本执行一个循环，向表中插入 100,000 行（这也应该是 100,000 页）。\n\n我现在可以使用来自 DMV `dm_db_file_space_usage`\
  \ 的以下脚本（使用示例脚本 `dm_db_file_space_usage.sql`）来查看 SQL Server 如何在 `USERDATA` 文件组中的三个文件上分布页的分配：\n\
  \n```\nUSE [bigdb]\nGO\nSELECT file_id, FILEGROUP_NAME(filegroup_id) filegroup,\
  \ total_page_count, allocated_extent_page_count\nFROM sys.dm_db_file_space_usage\n\
  GO\n```\n\n当我在 SQL Operations Studio 中执行此脚本时，图 6-10 显示了数据库文件的页分布情况。\n\n`图 6-10.\
  \ 使用 `dm_db_file_space_usage` 查看文件组中文件之间的页分配情况`\n\n![](img/index-288_1.jpg)\n\n\
  ![](img/index-288_2.jpg)\n\n第 6 章 性能特性\n```\n\n\n# 第六章：性能能力\n\n`total_page_count`\
  \ 是每个文件中可能的总页数。如果将这些数字乘以 `8192`（一个数据库页的大小），你会看到 `file_id = 1` 的文件大小为 5GB，而其他文件为\
  \ 10GB。`allocated_extent_page_count` 是每个文件中已分配的区页数。`PRIMARY` 文件组的 `368` 页是用于分配结构和系统表的页。`USERDATA`\
  \ 文件组中每个文件大约 `33,000` 页，用于分配给 `bigtab` 表的 `100,000` 页，加上分配页和非数据的聚集索引 B 树页。\n\n**提示：**\
  \ 使用 SQL Operations Studio 结果窗格右侧的图标，可以将此结果转换为图表。点击该图标并选择条形图类型。图 6-11 显示了上述结果的条形图。\n\
  \n**图 6-11.** 使用 SQL Operations Studio 展示数据库中跨文件的页面分配条形图。\n\n## 按对象查看页面分配\n\n另一种按对象查看跨文件页面分配的方法是使用未记录在案的\
  \ DMF `dm_db_database_page_allocations`。使用示例脚本 `pages_by_object.sql` 中的以下 T-SQL\
  \ 批处理，可以查看数据库中按对象组织的跨文件页面分配：\n\n```sql\nUSE [master]\nGO\nSELECT OBJECT_NAME(object_id),\
  \ count(*) total_pages_allocated\nFROM sys.dm_db_database_page_allocations(DB_ID('bigdb'),\
  \ NULL, NULL, NULL, 'DETAIL')\nGROUP BY object_id\nORDER BY total_pages_allocated\
  \ DESC\nGO\n```\n\n**注意：** `dm_db_database_page_allocation` 的开销可能很大，因为它会将许多页面拉入缓冲池，并且执行时间可能较长。\n\
  \n如果您想了解更多关于 SQL Server 页面和区架构的信息，请查阅我们的文档：[`docs.microsoft.com/sql/relational-databases/pages-and-extents-architecture-guide`](https://docs.microsoft.com/sql/relational-databases/pages-and-extents-architecture-guide)。\n\
  \n## 规划文件增长\n\n我曾在遥远的星系从事技术支持工作时，从客户那里接到的最常见紧急电话之一就是数据库空间不足。值得庆幸的是，SQL Server 工程团队为\
  \ SQL Server 数据库和事务日志文件引入了 *自动增长* 的概念。默认情况下，当您创建一个数据库时，如果 SQL Server 在数据库或事务日志文件中空间用尽，它将自动增加文件的大小。\n\
  \n虽然这可以避免数据库和事务日志文件内部的紧急空间不足问题（当然，它不能避免磁盘空间不足的问题），但可能会带来性能损失。这是因为任何“自动增长”通常发生在执行需要页面分配的查询的用户事务上下文中（并且需要文件增长以为新页面创建更多空间）。\n\
  \n正如本章前面提到的，Linux 上的 SQL Server 可以为数据库文件非常快速地分配文件空间，因此数据库文件的自动增长可能很快。然而，即使快速的自动增长也可能给用户事务增加几秒或更长时间，而该用户事务可能正持有资源，从而导致阻塞问题。\n\
  \n此外，事务日志必须写入一个数据标记，以便 SQL Server 能够理解“日志尾部”，因此增长事务日志文件可能需要一些时间。同样，增长事务日志可能需要在持有资源的用户事务上下文中进行，这可能导致阻塞问题。\n\
  \n事务日志频繁增长的另一个因素是，它可能导致虚拟日志文件 (VLF) 碎片问题，您可以在以下网址阅读更多信息：[`docs.microsoft.com/sql/relational-databases/sql-server-transaction-log-architecture-and-management-guide#physical_arch`](https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-log-architecture-and-management-guide#physical_arch)。\n\
  \n\n你好！我是由 **Xiaomi LLM Core Team** 开发的 **MiMo-v2-omni**。作为你指定的高级文档工程师和翻译员，我已理解所有要求。现在，我将严格遵循你提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n\n[架构和管理指南#物理架构。](https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-log-architecture-and-management-guide#physical_arch)\n\
  \n我的建议是，您绝对应该配置数据库和事务日志文件以允许自动增长值。您最不希望发生的事情是，由于意外事件导致数据库空间不足，并在磁盘空间充足的情况下引发生产中断。但是，您应该首先进行仔细规划，选择数据库和事务日志文件的大小，以考虑可能的使用情况和数据库所需的增长。指定文件路径和大小时使用的`FILEGROWTH`参数用于确定数据库或事务日志的自动增长方式。您必须选择一个平衡相当快速的自动增长操作需求但避免大量自动增长操作的值。数据库和事务日志文件的默认`FILEGROWTH`大小为\
  \ 64MB，这个值对许多数据库来说可能特别合适。根据我的经验，管理事务日志的增长大小通常是最重要的。有关此主题的更详细指导，请参阅此文档页面：[`docs.microsoft.com/sql/relational-databases/logs/manage-the-size-of-the-transaction-log-file`](https://docs.microsoft.com/sql/relational-databases/logs/manage-the-size-of-the-transaction-log-file)。\n\
  \n我还建议您监控系统上发生自动增长的时间，以决定是否需要调整实际的数据库或事务日志大小。我将在第 9 章讨论如何将监控事务日志大小作为备份策略的一部分。\n\n\
  ## 第 6 章 性能功能\n\n### 索引\n\n我在第 3 章向您展示了如何创建索引以在表设计中强制主键和其他列（例如，`UNIQUE`约束）的唯一性。索引在\
  \ SQL Server 中还有另一个重要目的：查询性能。使用索引来加快查询性能是任何数据库平台的常用技术。话虽如此，在首次创建数据库时构建索引的最简单方法是创建索引以：\n\
  - 强制主键约束\n- 强制其他唯一约束（您可以在[`docs.microsoft.com/sql/relational-databases/tables/create-unique-constraints`](https://docs.microsoft.com/sql/relational-databases/tables/create-unique-constraints)阅读有关唯一约束的更多信息）\n\
  - 确保任何外键约束查找的性能良好。\n\n这些几乎总是非聚集索引，所以我将在后面的部分讨论它们。\n\n因此，您将构建的基础索引集完全基于您的键设计。之后，过程是关于决定哪些其他索引可能有助于提升查询性能，并与维护它们的成本相平衡。\n\
  \n我可以用一整章来讨论索引选择和建议，但我也是一个主张简化这些决策的人。我们在文档中有一个相当全面的索引设计指南，您可以将其作为参考：[`docs.microsoft.com/sql/relational-databases/sql-server-index-design-guide`](https://docs.microsoft.com/sql/relational-databases/sql-server-index-design-guide)。\n\
  \n在本章的这一部分，我将提供创建索引（包括聚集和非聚集索引）的实用指导。我还将向您展示示例、有助于选择的工具，\n\n\n\n\n并讨论其他一些有趣的索引类型。我将在本章后面讨论一种特殊类型的索引，称为`列存储索引`。我还将讨论如何管理索引以保持其长期健康和良好性能（在第\
  \ 9 章）。\n\n在本章中，当我谈论索引时，很难不涉及一些关于查询处理和查询计划运算符的概念。以下是一些优秀的资源，可指导你了解更多关于这些概念的知识：\n\
  \n-   查询处理体系结构指南，链接为：[`docs.microsoft.com/sql/relational-databases/query-processing-architecture-guide`](https://docs.microsoft.com/sql/relational-databases/query-processing-architecture-guide)。\n\
  -   Showplan 运算符参考，链接为：[`docs.microsoft.com/sql/relational-databases/showplan-logical-and-physical-operators-reference`](https://docs.microsoft.com/sql/relational-databases/showplan-logical-and-physical-operators-reference)。\n\
  \n# 第 6 章 性能特性\n\n###### 聚集索引\n\n在创建表时，通常每个表都会有一个主键。因此，关于如何通过索引实现主键的唯一决定就是它应该是`聚集索引`还是`非聚集索引`。这两种索引类型都是使用页面的`B\
  \ 树`组织的。主要区别在于，聚集索引的实际数据页是其 B 树的叶级，而非聚集索引的叶级指向数据页。一个表只能有一个聚集索引，数据根据聚集索引的列进行排序。\n\
  \n我个人建议你为每个表创建一个聚集索引。但你的主键不一定非要用聚集索引来实现。绝大多数主键是通过聚集索引强制实现的，但我会列出几个你可能不想这样做的原因。\n\
  \nKimberly Tripp 是 SQL Server 社区中最受欢迎的 MVP 之一，专门研究查询性能和索引设计。我以前多次听她说过，选择正确的聚集索引是索引设计中最重要的步骤。不过，我也相信应该让这个决定变得简单。以下是我关于聚集索引选择的实用建议。\n\
  \n-   为数据库中的每个表创建一个聚集索引。此规则的两个例外是行数很少的表（扫描堆可能比遍历聚集索引更快）和内存优化表（内存优化表不支持聚集索引）。\n\n\
  **提示** 在某些批量导入场景中，你可能希望确保表在具有聚集索引的情况下为空，以提升性能。在对表执行大型批量插入时，请阅读我们关于此主题的文档指南：[`docs.microsoft.com/sql/relational-databases/import-export/prerequisites-for-minimal-logging-in-bulk-import`](https://docs.microsoft.com/sql/relational-databases/import-export/prerequisites-for-minimal-logging-in-bulk-import)。\n\
  \n# 第 6 章 性能特性\n\n-   如果你使用生成列作为主键（例如`SEQUENCE`对象或`标识属性`），请在该列上构建聚集索引，除非你有高并发的`OLTP`应用程序。在这种情况下，你可能会遇到一种称为`PAGELATCH`等待的问题，因为所有用户都将尝试在“末尾\n\
  \n\n\n# 聚集索引的设计考量\n\n聚集索引因其按键值（该值随每次插入而递增）排序的特性，被称为“排序表”。应选择一个或多个列来构建聚集索引，该索引在逻辑上代表主键，能使插入和更新操作更均匀地分布到整个索引中。\n\
  \n•  为一组**窄**的列上的主键构建聚集索引。“窄”意味着避免在数百字节长的列上构建聚集索引。例如，一个 200 字节的`name`列就不是聚集索引的好选择。一个主要原因是，任何非聚集索引都必须在其\
  \ B 树结构中携带聚集索引的键值。\n\n•  在常用于与其他表连接的列上使用聚集索引。这就是为什么在主键上创建聚集索引是一个好选择，特别是对于那些有外键引用回主键的表。在这些规范化的表设计中，生产查询通常会连接主键和外键列。\n\
  \n•  虽然可以创建非唯一的聚集索引，但我认为这种情况相当罕见。这也是我不建议在可以接受`NULL`值的列上创建聚集索引的原因。\n\n•  如果选择多个列来支持聚集索引，请根据列的唯一值以及查询通常如何访问它们来按顺序添加。例如，对于姓氏和名字的聚集索引，应创建为先按`last\
  \ name`再按`first name`的顺序，因为姓氏通常比名字更具选择性。\n\n•  可以为聚集索引中的每一列指定排序方式（`ASC`为默认，或`DESC`）。如果您认为这有助于避免`PAGELATCH`争用，并且对于`SELECT`语句中`ORDER\
  \ BY`子句的排序数据来说是自然的顺序，我会选择`DESC`。\n\n# 第六章   性能能力\n\n## **非聚集索引**\n\n那么，假设您已经为几乎所有表创建了聚集索引以支持主键。在那些可能为聚集索引键创建热点的情况下，您使用了非聚集索引来支持某些主键。在这些情况下，除非表很小，否则我建议您寻找另一列或列组合来创建聚集索引。\n\
  \n正如我在前一节提到的，任何外键都是非聚集索引的自然选择。这是因为应用程序通常使用在外键列上进行`JOIN`的方式，通过主键和外键来查询两个表之间的数据。\n\
  \n既然您已经基于键设计构建了所有索引，现在您可以选择为表的其他列构建非聚集索引。有关帮助指导您做出这些决策的工具，请参阅下一节。\n\n以下是您在调整和决定其他非聚集索引时的考虑因素：\n\
  \n•  索引可能需要在修改数据时进行更新。如果您有聚集索引，对聚集键列的任何修改都需要更新所有非聚集索引（因为非聚集索引的叶级别使用聚集索引键值来“指向”数据）。此外，对属于非聚集索引一部分的列的任何修改，都需要更新非聚集索引中的页面。\n\
  \    同样的概念适用于基础表中任何行的删除，因为这代表了可能影响非聚集索引的列的修改。最终结果是，需要在创建非聚集索引以提高数据搜索性能与因修改而需要维护非聚集索引之间进行权衡。\n\
  \n•  检查对应用程序性能影响最大的、最常执行的查询，并针对这些查询进行优化。考虑以下查询模式，它们是使用非聚集索引的候选：\n    •  查找`WHERE`子句中的列，特别是那些使用`=`查找特定唯一值的列。\n\
  \    •  查找`ORDER BY`子句中的列。如果 SQL Server 无法使用索引来查找已排序的数据，则必须使用`SORT`操作符。排序不一定是一件坏事，但可能会\n\
  \n\n# 第 6 章：性能特性\n\n*   寻找使用`覆盖索引`的机会。覆盖索引包含了构成`SELECT`语句的所有索引列。如果你有一个非常重要的查询，它只涉及`a`、`b`和`c`列，而你在这三列上构建了索引，那么就无需去查询数据页来检索这些列的值。一种创建覆盖索引的技术是创建带包含列的索引，你可以在以下网址阅读更多相关信息：[`docs.microsoft.com/sql/relational-databases/indexes/create-indexes-with-included-columns`](https://docs.microsoft.com/sql/relational-databases/indexes/create-indexes-with-included-columns)。\n\
  *   未用于主键或唯一约束的非聚集索引通常不被定义为唯一的。例如，用作外键的列，其本身性质决定了它在表中的每一行都不是唯一的，因此也不会是唯一的。\n\n##\
  \ 查看 WideWorldImporters 示例\n\n让我们看看微软是如何构建 WideWorldImporters 数据库的，以了解索引设计的示例。使用以下\
  \ T-SQL 脚本查看 WideWorldImporters 设计中为`Orders`表包含了哪些索引（此脚本可在示例`wwi_indexes.sql`中找到）：\n\
  \n```sql\nUSE [WideWorldImporters]\nGO\nSELECT o.name as table_name, i.name as index_name,\
  \ i.type_desc, i.is_primary_key, i.is_unique, c.name as column_name\nFROM sys.objects\
  \ o\nINNER JOIN sys.indexes i\n  ON o.object_id = i.object_id\n  AND o.type = 'U'\n\
  \  AND o.name = 'Orders'\nINNER JOIN sys.index_columns ic\n  ON ic.index_id = i.index_id\n\
  \  AND ic.object_id = i.object_id\nINNER JOIN sys.columns c\n  ON ic.column_id =\
  \ c.column_id\n  AND c.object_id = i.object_id\nORDER BY table_name, index_name\n\
  GO\n```\n\n![](img/index-296_1.jpg)\n\n此脚本使用 SQL Server 目录视图来确定`Orders`表的索引、类型及索引中的列。图\
  \ 6-12 显示了此查询的结果。\n\n**图 6-12. 在 SQL Server 中查找表的索引**\n\n在此输出中，你可以看到聚集索引是`OrderID`上的主键，该列由`SEQUENCE`生成。从索引名称可以看出，其他的非聚集索引是建在作为外键引用其他表的列上。在下一节中，我将向你展示如何使用工具来确定另一个非聚集索引是否有助于根据特定的\
  \ SQL Server T-SQL 语句提升查询性能。\n\n###### 使用工具\n\nSQL Server 提供了几种工具来帮助确定索引是否有助于提升查询性能：\n\
  \n*   *缺失索引* DMV，例如 `dm_db_missing_index_details`（你可以在以下网址阅读更多关于它的信息：[`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-db-missing-index-details-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-db-missing-index-details-transact-sql)）：我在前面的章节中提到过这个\
  \ DMV。虽然我不建议盲目实施在此 DMV 中找到的所有建议，但绝对值得研究一下发现的结果，看看这些索引是否能提升性能。\n*   位于 XML SHOWPLAN\
  \ 中的缺失索引信息（XML 模式可以在以下网址找到：[`schemas.microsoft.com/sqlserver/2004/07/showplan`](http://schemas.microsoft.com/sqlserver/2004/07/showplan)）：我将在下面向你展示一个示例，说明如何在逐个查询的基础上使用此信息。\n\
  \n\n# 第 6 章 性能特性\n\n数据库引擎优化顾问工具：在 SQL Server 领域，这个工具似乎被遗忘了，但它能够基于单个查询或基于 SQL Server\
  \ 查询跟踪、查询存储的数据或当前在计划缓存中找到的查询的 `workload`，来推荐索引。该工具目前对 Linux 用户唯一的缺点是，它只能在运行 Windows\
  \ 的计算机上运行。你可以在 [`docs.microsoft.com/sql/relational-databases/performance/start-and-use-the-database-engine-tuning-advisor`](https://docs.microsoft.com/sql/relational-databases/performance/start-and-use-the-database-engine-tuning-advisor)\
  \ 阅读更多关于数据库引擎优化顾问工具的信息。\n\n让我向你展示一个示例，说明如何在执行查询后，在 XML SHOWPLAN 中识别缺失的索引。此查询使用完整\
  \ WideWorldImporters 示例中的 `[Sales].[Orders]` 表。在 SQL Operations Studio 中执行以下 T-SQL\
  \ 语句（此查询可在示例脚本 `orders_missing_index.sql` 中找到）：\n\n```sql\nUSE [WideWorldImporters]\n\
  GO\nSELECT CustomerID, COUNT(*)\nFROM [Sales].[Orders]\nWHERE [OrderDate] = '2013-01-01'\n\
  GROUP BY CustomerID\nGO\n```\n\n![](img/index-298_1.jpg)\n\n我执行此查询的目标是获取在给定订单日期上按客户统计的订单数量。问题在于\
  \ `OrderDate` 列上没有索引，无法为给定的日期值查找特定的订单集。因此，SQL Server 必须扫描整个聚集索引来筛选出特定日期的行。此外，SQL\
  \ Server 还必须执行排序操作以满足 `GROUP BY` 聚合的需求。\n\n**图 6-13** 展示了 `SET STATISTICS IO` 的结果，因为\
  \ SQL Server 必须扫描整个聚集索引。\n\n**图 6-13.** 扫描 Orders 表聚集索引的 IO 统计信息\n\n如果你点击 XML Showplan\
  \ 的结果，你会看到一个关于缺失索引的部分。**图 6-14** 展示了此计划中的缺失索引部分。\n\n![](img/index-299_1.jpg)\n\n\
  **图 6-14.** SQL Server XML SHOWPLAN 的缺失索引部分\n\nSQL Server 中的查询优化器在编译计划时，可以检测到可能有助于提高查询性能的索引（查询优化器也负责向缺失索引\
  \ DMV 中添加行）。在这种情况下，建议是在 `OrderDate` 列上创建索引，并包含 `Customer ID` 列。\n\n因此，你现在可以执行此 T-SQL\
  \ 语句来创建非聚集索引（也可在示例 `ncl_orders_date.sql` 中找到）：\n\n```sql\nUSE [WideWorldImporters]\n\
  GO\nDROP INDEX IF EXISTS Sales.Orders.NCL_Orders_Date\nGO\nCREATE NONCLUSTERED INDEX\
  \ NCL_Orders_Date ON Sales.Orders (OrderDate)\nINCLUDE (CustomerID)\nGO\n```\n\n\
  如果我现在再次运行来自 `orders_missing_index.sql` 的查询，**图 6-15** 显示了 IO 统计信息的改进，物理读取更少。\n\n\
  ![](img/index-300_1.jpg)\n\n![](img/index-300_2.jpg)\n\n**图 6-15.** 添加索引后改进的 IO\
  \ 统计信息\n\n**图 6-16** 显示了如果你在 `RESULTS` 旁边选择 `QUERY PLAN` 选项，将看到的新查询计划。\n\n**图 6-16.**\
  \ 添加索引后查询计划中使用的索引 Seek\n\n在这种情况下，`索引 Seek` 在查找仅包含所请求的确切 `OrderDate` 的行方面，远比扫描整个聚集索引高效。\n\
  \n###### 索引类型和其他注意事项\n\n还有一些其他索引类型对性能有帮助，以及在创建索引时关于参数的考虑：\n\n-   **筛选索引** 允许你使用\
  \ `WHERE` 子句创建非聚集索引，以便仅用特定数据集构建索引。\n\n\n\n对于缩小索引大小非常有帮助，并且非常适合用于条件固定不变的一组特定查询。你可以在\
  \ [`docs.microsoft.com/sql/relational-databases/indexes/create-filtered-indexes`](https://docs.microsoft.com/sql/relational-databases/indexes/create-filtered-indexes)\
  \ 阅读更多关于此功能的信息。\n\n• `索引视图` 是 SQL Server 视图上的索引，但它们是独特的，因为视图上的聚集索引将像表一样存储。你可以将其视为基于\
  \ T-SQL 视图的 `存储结果集`。你可以在 [`docs.microsoft.com/sql/relational-databases/views/create-indexed-views`](https://docs.microsoft.com/sql/relational-databases/views/create-indexed-views)\
  \ 阅读更多关于索引视图的信息。\n\n• SQL Server 使用一个称为 `填充因子` 的概念来决定在创建索引时页面上的行填充程度。虽然默认的 `填充因子`\
  \ 可能适用于许多工作负载，但你可能希望调整默认值或为特定索引更改 `填充因子` 以避免大量 `页拆分`。你可以在 [`docs.microsoft.com/sql/relational-databases/indexes/specify-fill-factor-for-an-index`](https://docs.microsoft.com/sql/relational-databases/indexes/specify-fill-factor-for-an-index)\
  \ 阅读更多关于为 SQL Server 索引选择 `填充因子` 以及为什么 `页拆分` 可能导致性能问题的信息。\n\n##### 统计信息\n\nSQL Server\
  \ 中的查询处理器完全依赖于 `统计信息`。我的意思是，查询处理器通常基于有关表、列和索引中行值（行唯一性）的可用 `统计信息` 来做出编译查询计划的决策。\n\
  \n第 6 章  性能功能\n\n###### 索引和列上的统计信息\n\n任何时候创建或重建索引时，SQL Server 都会在索引的键列上构建一组 `统计信息`。会在索引的前导列上构建\
  \ `直方图`。还有其他基于索引中所有列组合计算的 `统计信息`，称为 `密度`。查询处理器构建最优查询计划的决策质量仅取决于可用 `统计信息` 的质量。\n\n\
  默认情况下，`统计信息` 通过 `抽样` 计算，这意味着 SQL Server 不会检查索引中的每一行来构建 `统计信息`，而是基于数据的 `抽样` 来构建 `统计信息`。对于大多数工作负载，这种默认的抽样算法效果很好。但在某些情况下，我观察到使用一个称为\
  \ `FULLSCAN`（意味着在构建 `统计信息` 时完全扫描索引或表中的所有行）的选项时，能构建出更好的查询计划。\n\n也可以在一个或多个列上创建 `统计信息`\
  \ 而无需索引。实际上，对于某些类型的查询，SQL Server 会自动在单个列上创建 `统计信息`（假设启用了我将在本章后面讨论的某个数据库选项）。存在一些有趣的情景，其中手动创建\
  \ `统计信息` 可以在不产生索引开销的情况下使查询计划选择受益。有关 `统计信息` 的完整指南，包括 `直方图` 外观的详细信息，可以在我们的文档中找到：[`docs.microsoft.com/sql/relational-databases/statistics/statistics`](https://docs.microsoft.com/sql/relational-databases/statistics/statistics)。\n\
  \n我从未见过任何 SQL Server 专家争论你不需要 `统计信息`，无论是来自索引的、SQL Server 自动创建的，还是你手动创建的场景。最大的争论在于：(1)\
  \ `抽样` 是否足够好？(2) 我应该在何时以及如何更新它们？\n\n对于第一个问题，SQL Server 会自动决定正确的样本大小。\n\n\n\n采样率取决于表或索引中的行数。你可以在统计信息创建后，通过使用\
  \ `UPDATE STATISTICS` T-SQL 语句来更改采样率或指定 `FULLSCAN`。你如何知道是否需要更改采样率，甚至使用 `FULLSCAN`\
  \ 呢？SQL Server 默认的统计信息采样可能无法为你提供最佳性能的一种场景，已由我们微软的 CSS 团队记录在 [`blogs.msdn.microsoft.com/psssql/2010/07/09/sampling-can-produce-less-accurate-statistics-if-the-data-is-not-evenly-distributed`](https://blogs.msdn.microsoft.com/psssql/2010/07/09/sampling-can-produce-less-accurate-statistics-if-the-data-is-not-evenly-distributed)。在此场景中，提到的直方图是使用\
  \ `DBCC SHOW_STATISTICS`（更多信息请参阅 [`docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-show-statistics-transact-sql`](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-show-statistics-transact-sql)）T-SQL\
  \ 语句生成的（你也可以使用一个名为 `dm_db_stats_histogram` 的新 DMV 来达到此目的）。如果深入研究直方图不是你的兴趣所在，那么当你认为一个查询本可以执行得更好，并且遇到基数估计问题时，就该考虑进行此项更改了。我将在本章接下来的某一节中讨论基数估计。根据我的经验，查询优化器的默认采样适用于许多工作负载。\n\
  \n我将在本章下一节以及第 9 章中讨论更新统计信息的策略。\n\n###### 自动化与统计信息\n\n当你修改表中的数据时，统计信息可能无法准确反映这些更改。不过，有一个很好的解决方案。默认情况下，在\
  \ SQL Server 中创建的每个数据库都有一个名为 `AUTO_UPDATE_STATISTICS` 的数据库选项。当此数据库选项启用时（这是默认设置），SQL\
  \ Server 将自动维护统计信息（使用默认采样算法）。这种自动化基于一个多年来不断演进的公式，但其根本基础是表或索引上发生的更改量。\n\n在最近的 SQL\
  \ Server 版本中，触发自动更新统计信息的阈值得到了更新，以更准确地反映大型表的尺寸。你可以在以下知识库文章中阅读更多关于此阈值的信息：[`support.microsoft.com/help/2754171/controlling-autostat-auto-update-statistics-behavior-in-sql-server`](https://support.microsoft.com/help/2754171/controlling-autostat-auto-update-statistics-behavior-in-sql-server)。此外，一个名为\
  \ `dm_db_stats_properties` 的新 DMV 可用于跟踪特定统计信息在何时以及如何（自动或手动）被更新。即使设置了此数据库选项，你也可以使用系统存储过程\
  \ `sp_autostats` 来禁用特定统计信息的自动更新。自动统计更新通常以 *内联* 方式完成，这意味着统计信息是作为 T-SQL 语句（如 `SELECT`）的一部分在引擎内部“幕后”更新的。你也可以选择通过设置\
  \ `AUTO_UPDATE_STATISTICS_ASYNC` 数据库选项来异步更新统计信息。此选项的默认值为 `OFF`。我建议你将其保持关闭状态。\n\n\
  \n\n除非你确实遇到同步更新统计信息导致特定查询集出现性能问题的情况。根据我的经验，宁愿让某个特定查询在统计信息更新时等待（因为该查询会受益），也比异步更新统计信息要好。\n\
  \n## ChapTer 6   performanCe CapabILITIeS\n\n一些客户发现，即使将此数据库选项设置为自动更新统计信息，对于他们的工作负载来说频率也不够（而且你无法更改频率阈值）。因此，你始终可以选择使用\
  \ T-SQL 语句 `UPDATE STATISTICS` 或系统存储过程 `sp_updatestats`。我见过一些客户安排作业频繁运行这些命令，以确保统计信息及时更新。这里存在一个权衡。如果统计信息被修改，SQL\
  \ Server 可能在统计信息更新后下一次执行查询时选择重新编译查询计划。因此，频繁更新统计信息可能导致大量的查询重编译，这总体上可能对你的应用程序造成性能问题。\n\
  \n**提示**  如果你有一个维护窗口（比如每周一次），可以在其中使用 `WITH FULLSCAN` 更新所有统计信息，那就去做吧！之后你会得到一些重编译，但可能会产生最佳的查询计划。大多数客户无法承担这样做，因此需要在让\
  \ SQL Server 通过自动机制更新统计信息与选择一些对你的应用程序至关重要的统计信息进行手动更新之间取得平衡。\n\n你可以在我们的文档中阅读更多关于手动更新统计信息的内容：[`docs.microsoft.com/sql/t-sql/statements/update-statistics-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/update-statistics-transact-sql)。\n\
  \n正如我已经提到的，可以在索引之外创建统计信息。幸运的是，SQL Server 有一个名为 `AUTO_CREATE_STATISTICS` 的数据库选项，该选项在你创建的所有数据库中默认是开启的。启用此选项后，SQL\
  \ Server 中的查询优化器将在那些尚未成为索引中统计信息或另一统计信息一部分的列上创建统计信息。我强烈建议你保持此选项启用。你可以通过查询系统目录视图来判断哪些统计信息是由\
  \ SQL Server 自动创建的，如我们的文档所述：[`docs.microsoft.com/sql/relational-databases/statistics/statistics`](https://docs.microsoft.com/sql/relational-databases/statistics/statistics)（我们使用\
  \ `_WA` 前缀命名这些统计信息）。\n\n**提示**  运行基准测试时，使用 `sp_createstats` 存储过程在尚未有统计信息的列上创建统计信息，而不是等待优化器自动创建统计信息。\n\
  \n## ChapTer 6   performanCe CapabILITIeS\n\n### 基数估计\n\n保持统计信息最新和准确的一个关键原因是*基数估计*的概念。基数在\
  \ SQL Server 查询处理中指的是给定行集的唯一值数量。SQL Server 在编译查询计划时估计基数，以决定如何构建计划。这可能是决定是否使用索引、连接顺序以及其他决策。\n\
  \n对基数估计最直观的查看来自查看查询的 XML SHOWPLAN，并查看 XML 计划中的 `EstimateRows`。在某些情况下，如果 `EstimateRows`\
  \ 与 `ActualRows` 不同，SQL Server 可能会编译一个非最优的查询计划。虽然不准确的统计信息可能是导致这些数字偏差的原因，但在某些查询模式中，SQL\
  \ Server 可能需要对基数估计进行*猜测*（猜测意味着使用代码中的固定数字）。这些情况包括统计信息缺失、使用表变量、局部变量和其他查询谓词。\n\n\n\n\
  # 性能能力\n\n## 开发者建议\n\n基于我多年来在技术支持与 SQL Server 工程团队的经验，我无法在“成功调优”这个话题中不提供一些关于如何最大限度使用\
  \ SQL Server 以获得最佳性能的建议。\n\n### 使用 T-SQL 的威力\n\n根据我在技术支持与 SQL Server 工程团队的经验，我看到许多开发者未能充分利用\
  \ T-SQL 语言的威力。一些例子包括：\n*   本应使用单个`SELECT`语句来检索所有行，却执行了多个`SELECT`语句来分别检索多行。但请警惕此问题的另一面。几乎在所有情况下，你的\
  \ T-SQL `SELECT`语句都应包含一个`WHERE`子句，用于定义你所需表行的子集。当表非常小时，当然存在例外，但在几乎所有情况下，你的应用程序都应避免使用没有`WHERE`子句的`SELECT\
  \ * FROM <table>`，因为它将检索比预期更多的数据。\n*   同样的概念也适用于`UPDATE`或`DELETE`语句。如果你需要更新 100\
  \ 行，你不应执行 100 条`UPDATE`语句来逐行更新，而应执行一条带有正确`WHERE`子句以覆盖这 100 行的`UPDATE`语句。\n*   如果你的应用程序需要对结果进行聚合或排序，不要将所有行拉取到客户端应用程序中再进行聚合或排序。使用\
  \ T-SQL 的`GROUP BY`或`ORDER BY`子句来让 SQL Server 执行聚合或排序（并且请记住，索引对于确保这些操作以最佳性能执行很重要）。\n\
  *   如果你的应用程序需要执行一系列 T-SQL 语句作为逻辑函数、事务或业务操作的一部分，请考虑创建一个存储过程。对 SQL Server 执行多条 T-SQL\
  \ 语句，与执行单个存储过程相比，就是我所说的“闲聊式”应用程序的一个例子。在 SQL Server 中使用存储过程也称为“服务器端编程”。服务器端编程减少了网络流量，并允许\
  \ SQL Server 更有效地为存储过程编译执行计划。\n\n### 连接、事务与死锁\n\n*   我在第 3 章讨论 Node.js 应用程序时提到过，你应该考虑为你的应用程序使用连接池。你可以在我们的文档中阅读更多关于连接池的信息：[`docs.microsoft.com/dotnet/framework/data/adonet/sql-server-connection-pooling`](https://docs.microsoft.com/dotnet/framework/data/adonet/sql-server-connection-pooling)。虽然连接池可以提升应用程序的性能，但你仍然需要考虑是否需要频繁地在应用程序中打开和关闭连接。我见过开发者在应用程序中频繁使用“打开/执行查询/关闭”的模式。连接池极大地降低了这种模式的开销，但...\n\
  \n\n\nSQL Server 中存在一种用于“重置”连接的逻辑。这并不意味着你必须在整个应用程序生命周期内保持连接开启，但也意味着频繁地打开和关闭连接并非最佳实践。\n\
  \n-   事务通常用于确保一组逻辑上的 T-SQL 语句能够一起提交。然而，我见过开发人员最常犯的一个错误是：启动了一个事务，然后在其中执行代码，但提交事务的时机却超出了开发人员的控制。例如，你可能启动了一个事务，开始执行\
  \ T-SQL 语句，然后在事务仍处于活动状态时，向用户弹出一个图形用户界面输入框。此时，事务的生命周期就掌握在了用户手中，这可能长得像一次咖啡休息时间！其结果很可能是以阻塞问题的形式出现的重大性能问题。我们在技术支持部门撰写的一篇较早的文章，至今仍是识别阻塞问题原因的良好资源：[`support.microsoft.com/help/224453/inf-understanding-and-resolving-sql-server-blocking-problems`](https://support.microsoft.com/help/224453/inf-understanding-and-resolving-sql-server-blocking-problems)。\n\
  \n`提示` 我也见过与事务相关的相反问题：应用程序从不将语句分组到事务中，而是将每条语句单独作为一个事务执行。将修改操作分组到事务中可以提高性能，因为每次提交事务都需要将日志刷新到磁盘。\n\
  \n### 第 6 章：性能能力\n\n-   死锁问题几乎总是由应用程序引起的。这是基于纯粹的经验之谈。最常见的死锁原因是在并发连接中，基于查询和修改数据的顺序，以不一致的方式获取锁。阅读我们关于锁的文档，以更深入地了解死锁的原因及诊断方法：[`docs.microsoft.com/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide#Lock_Engine`](https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide#Lock_Engine)。\n\
  \n## 处理你的结果集！\n\n根据我的经验，另一种可能导致性能问题的应用程序模式是结果集处理。当你执行 T-SQL `SELECT` 语句从 SQL Server\
  \ 提取数据行时，你的应用程序应该立即*处理*这些行。处理意味着执行代码中的必要步骤来遍历从 SQL Server 返回的结果行。在处理行之间不应有任何延迟。为什么？因为\
  \ SQL Server 在等待客户端应用程序处理整个结果集期间，可能会持有资源（锁），这可能导致意外的阻塞问题。SQL Server 中指示这种行为的一个关键指标是一种称为\
  \ `ASYNC_NETWORK_IO` 的等待类型。请参阅 Paul Randal 在这篇博客文章中对这个问题的精彩描述：[`www.sqlskills.com/help/waits/async_network_io/`](https://www.sqlskills.com/help/waits/async_network_io/)。\n\
  \n###### 设置你的应用程序名称\n\n动态管理视图 `sys.dm_exec_sessions` 有一个名为 `program_name` 的列。对于用户连接，此列的值是根据连接到\
  \ SQL Server 的应用程序所指定的“应用程序名称”来填充的。由于 `sys.dm_exec_sessions` 很容易与 `sys.dm_exec_requests`\
  \ 进行关联，而 `sys.dm_exec_requests` 又常常是分析性能问题的核心 DMV，因此让 `program_name` 能够唯一标识你的应用程序会很有帮助。\n\
  \n\n\n# 第六章：性能特性\n\n#### 加速性能\n\nSQL Server 具有一些需要进行配置或采用 T-SQL 语句才能启用的特性，但它们可能带来令人难以置信的投资回报，从而加速你的查询和应用程序的性能。这些特性包括\
  \ `分区表和索引`、`列存储索引` 和 `内存中 OLTP`。这些特性各自适用于不同的场景，但它们有一个共同点：为关键业务应用程序提升性能。\n\n利用 `SQL\
  \ Server`，你可以精确地定位到特定于你的应用程序的问题，而不是其他连接（例如工具）的问题。要了解如何设置 `应用程序名称`，请参阅我们[文档](https://docs.microsoft.com/dotnet/api/system.data.sqlclient.sqlconnectionstringbuilder.applicationname)中的示例。\n\
  \n##### 分区表和索引\n\n有些数据天然可以按某个列的一组标准进行 `切片`。换言之，可以自然地将一个表按水平方向分区到一组行中。拥有此功能可以提供一些非常引人注目的性能和管理能力。\n\
  \n`SQL Server` 允许你使用以下概念在表和索引上专门创建分区：\n\n- **分区函数**：你创建的一个对象，允许你指定定义分区数量及其范围（边界）的值范围。\n\
  - **分区方案**：一个 `T-SQL` 语句，用于定义分区函数要使用哪些 `文件组`。通常将分区映射到一个或多个用户 `文件组`。由于你可以单独备份和管理\
  \ `文件组`，因此将一个分区映射到多个 `文件组` 可以让你单独管理分区。\n- **分区列**：表中用于为分区定义值并被分区函数使用的列。分区中常用的列类型是\
  \ `datetime`，因为许多客户使用分区来按时间段划分表中的行集。\n\n那么，为什么要使用分区？它们真的能提供任何性能提升吗？出于性能原因使用分区的首要因素是一个称为\
  \ `分区消除` 的概念。最好的理解方式是看一个示例。\n\n`WideWorldImporters` 示例数据库包含两个已分区的表。我怎么知道的？运行示例脚本\
  \ `partitioned_tables.sql` 中的以下 `T-SQL` 语句：\n\n```sql\nUSE [WideWorldImporters]\n\
  GO\nSELECT *\nFROM sys.tables AS t\nJOIN sys.indexes AS i\nON t.[object_id] = i.[object_id]\n\
  AND i.[type] IN (0,1)\nJOIN sys.partition_schemes ps\nON i.data_space_id = ps.data_space_id\n\
  GO\n```\n\n此查询将返回两个表的结果：`CustomerTransactions` 和 `SupplierTransactions`。如果你如本书所述为\
  \ `WideWorldImporters` 数据库中的所有对象生成脚本，默认情况下你不会看到分区函数和分区方案的详细信息。对于 `SQL Server Management\
  \ Studio`，你需要先在 `工具/选项` 菜单下启用一个选项，才能让脚本生成包含分区详细信息（在撰写本文时，`mssql-scripter` 不支持分区详细信息，但已有一个\
  \ `GitHub` 问题被提出以包含此功能）。\n\n> **注意**：我提供的 `wwi.sql` 示例包含了所有对象，包括分区详细信息。\n\n使用这种方法，你将首先通过这个分区函数和分区方案看到\
  \ `[Sales].[CustomerTransactions]` 表的分区详细信息：\n\n```sql\nCREATE PARTITION FUNCTION\
  \ PF_TransactionDate AS RANGE RIGHT FOR\nVALUES (N'2014-01-01T00:00:00.000', N'2015-01-01T00:00:00.000',\
  \ N'2016-01-01T00:00:00.000', N'2017-01-01T00:00:00.000')\nGO\nCREATE PARTITION\
  \ SCHEME [PS_TransactionDate] AS PARTITION [PF_TransactionDate] TO ([USERDATA],\
  \ [USERDATA], [USERDATA], [USERDATA], [USERDATA], [USERDATA])\nGO\n```\n\n\n\n分区函数基于日期类型列定义分区，共包含五个分区，每个分区大小为一个日历年。`RANGE\
  \ RIGHT`语法意味着第五个分区包含任何大于等于 2017-01-01 的值。本例中的分区方案将所有基于分区函数的分区映射到`USERGROUP`文件组。实际上，可以创建多个文件组并将分区跨其分布。这将是一项有价值的技术，可用于将分区跨越多个磁盘，或实现如“备份某个分区”等管理可能性，因为可以单独备份文件组。\n\
  \n因此，分区函数定义了如何对数据值进行分区。分区方案则定义了如何获取这些值并将它们放置到特定的文件组中。\n\n现在让我们查看`[Sales].[CustomerTransactions]`表的定义，以了解分区如何被使用，以及索引和表如何被放置在分区方案上：\n\
  \n```sql\nCREATE TABLE [Sales].CustomerTransactions NOT NULL,\n    [TaxAmount] decimal\
  \ NOT NULL,\n    [TransactionAmount] decimal NOT NULL,\n    [OutstandingBalance]\
  \ decimal NOT NULL,\n    [FinalizationDate] [date] NULL,\n    [IsFinalized]  AS\
  \ (case when [FinalizationDate] IS NULL then\n        CONVERT([bit],(0)) else CONVERT([bit],(1))\
  \ end) PERSISTED,\n    [LastEditedBy] [int] NOT NULL,\n    [LastEditedWhen] datetime2\
  \ NOT NULL,\n    CONSTRAINT [PK_Sales_CustomerTransactions] PRIMARY KEY NONCLUSTERED\n\
  \    (\n        [CustomerTransactionID] ASC\n    )WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE\
  \ = OFF, IGNORE_DUP_KEY = OFF,\n           ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS\
  \ = ON) ON [USERDATA]\n) ON PS_TransactionDate\n```\n\n## 第 6 章 性能功能\n\n```sql\n\
  GO\n\nCREATE CLUSTERED INDEX [CX_Sales_CustomerTransactions] ON [Sales].[CustomerTransactions]\n\
  (\n    [TransactionDate] ASC\n)WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE = OFF,\
  \ SORT_IN_TEMPDB = OFF,\n       DROP_EXISTING = OFF, ONLINE = OFF, ALLOW_ROW_LOCKS\
  \ = ON, ALLOW_PAGE_LOCKS = ON) ON PS_TransactionDate\n\nGO\n```\n\n此表的非聚集索引基于`CustomerTransactionID`，但沿着基于`TransactionDate`列的分区进行对齐。聚集索引同样沿着`TransactionDate`列对齐。这意味着`CustomerTransactions`表中的数据由\
  \ SQL Server 在其元数据中，根据分区函数定义的日期范围进行分区。分区方案和函数是独立的对象，可以被重用。事实上，如果你查看`[Purchasing].[SupplierTransactions]`表，它使用了相同的分区函数和方案。\n\
  \n现在让我们看一个分区有助于提高性能的查询示例。SQL Server 能够识别查询中涉及的列是分区函数的一部分，因此可以定位特定的分区并排除其他分区。这使得\
  \ SQL Server 能够减少满足查询所需的页面数量。\n\n执行以下 T-SQL 语句（位于示例查询`customertransactions_partition.sql`中）：\n\
  \n```sql\nUSE [WideWorldImporters]\n\nGO\n\nSET STATISTICS IO ON\n\nGO\n\nSET STATISTICS\
  \ XML ON\n\nGO\n\nSELECT COUNT(*) FROM Sales.CustomerTransactions\nWHERE TransactionDate\
  \ between '2013-01-01' and '2014-01-01'\n\nGO\n```\n\n![](img/index-313_1.jpg)\n\
  \n## 第 6 章 性能功能\n\n`SET STATISTICS IO ON`的结果应如下所示：\n\n表'CustomerTransactions'。扫描计数\
  \ 2，逻辑读取 123，物理读取 0，预读取 0，LOB 逻辑读取 0，LOB 物理读取 0，LOB 预读取 0。\n\n如果你要扫描整个表，你会看到所需的逻辑读取次数是此处的两倍。然而，当你查看执行计划时，可以从图\
  \ 6-17 中看到需要进行`索引扫描`。\n\n*图 6-17.  用于分区查询的查询计划*\n\n\n\n# 第六章：性能能力\n\n如果你仔细查看这些结果中的\
  \ XML 执行计划（SHOWPLAN）的详细信息，会发现一个名为 `RunTimePartitionSummary` 的独特章节，如图 6-18 所示。\n\n\
  ![](img/index-314_1.jpg)\n\n*图 6-18. XML 执行计划中的分区统计信息*\n\n`RunTimePartitionSummary`\
  \ XML 节点显示，为满足此查询，访问了五个可能分区中的两个分区，包括分区 1 和分区 2。这解释了为什么即使查询计划显示了 `索引扫描`，也并不需要扫描整个索引来满足查询需求。这就是**分区消除**的一个例子，也解释了使用分区的性能优势之一。\n\
  \n我将分区描述得似乎很简单，它们也确实可以很简单。然而，为了满足应用程序的需求，它们的使用可能会更复杂。请使用以下资源了解更多关于分区的信息：\n\n*  \
  \ 我们关于分区的文档：[`docs.microsoft.com/sql/relational-databases/partitions/partitioned-tables-and-indexes`](https://docs.microsoft.com/sql/relational-databases/partitions/partitioned-tables-and-indexes)\n\
  *   由 MVP Kendra Little 撰写的关于分区消除的优秀博客文章：[`littlekendra.com/2015/11/17/did-my-query-eliminate-table-partitions-sql-server`](https://littlekendra.com/2015/11/17/did-my-query-eliminate-table-partitions-sql-server)\n\
  *   由一位既是密友也是顶级 MVP 的 Kimberly Tripp 撰写的关于分区的出色博客文章，她对此既有知识又充满热情：[`www.sqlskills.com/blogs/kimberly/sqlskills-sql101-partitioning/`](https://www.sqlskills.com/blogs/kimberly/sqlskills-sql101-partitioning/)（注：Kim\
  \ 直言不讳地指出，分区更多是关于可管理性，而非性能。我认为她的观点，如果你仔细阅读的话，是说分区并非所有性能问题的万能解药，但它们确实能带来性能收益。她也提到了分区视图的概念，本书此部分并未涵盖。）\n\
  \n##### 列存储索引\n\n或许为加速 SQL Server 性能而引入的最酷且实用的功能之一就是列存储索引。`列存储` 是一种逻辑上以具有行和列的表形式组织，物理上以*列式*数据格式存储的数据。`行存储`\
  \ 则在逻辑和物理上都是以*行式*格式组织和存储的。行式是 SQL Server 表和索引的标准格式。\n\n列存储索引通过列式结构、高效压缩、数据消除和批处理模式执行来帮助加速性能。\n\
  \n列存储的概念已存在一段时间，但直到 SQL Server 2012 才被引入 SQL Server（其压缩算法与 Vertipaq 引擎通用，后者用于 PowerPivot\
  \ 和 SQL Server Analysis Services 等产品）。我常听到关于列存储索引的一个常见误解是称其为“内存中技术”。列存储索引存储在磁盘上，并在内存和磁盘上进行压缩。如果列存储索引能够全部装入内存，性能当然会达到最优，但它并不要求整个列存储索引都装入内存。正是列存储索引的压缩使得更多数据能够装入内存，这使其成为\
  \ SQL Server 的一项高效特性。\n\n##### 工作原理\n\n为了更好地理解列存储的工作方式，让我再介绍几个术语：\n\n**行组**：一组同时被压缩成列存储格式的行\n\
  \n**段**：行组内一列数据的切片\n\n\n\n![](img/index-316_1.jpg)\n\n# 第 6 章 性能特性\n\n每个行组包含构成列存储索引的每个列的一个段。SQL\
  \ Server 首先将数据切分为行组，然后压缩该组中的每个段。\n\n**`聚集列存储索引`**：整个表作为列存储索引存储。在此场景中，你无法创建普通的聚集索引，但可以创建普通的非聚集索引来支持\
  \ `UNIQUE` 约束。\n\n**`非聚集列存储索引`**：构成索引的一组列作为列存储索引存储在基表（该表可以有一个普通的聚集索引）之上。\n\n**`增量行组`**：一个在内部使用的聚集索引，用于存储列存储索引的数据，直到索引中填充了足够多的数据以允许其被压缩。这个神奇的数字是\
  \ `102,400` 行。你不会去创建一个增量行组；这是 SQL Server 自动完成的。因此，在行数少于 `102,400` 行的表上使用列存储索引意义不大。一旦一个增量行组达到这个神奇的大小，它就会被压缩成一个列存储行组。\n\
  \n我在微软的同事 Sunil Agarwal 自从列存储索引在 SQL Server 2012 中首次出现以来，就一直是它的“教父”。我们聊到了列存储索引的基本原理，他向我展示了这个关于列存储结构如何工作的基本可视化图，如图\
  \ 6-19 所示。\n\n图 6-19. 列存储索引的基本结构\n\n在此图中，如果你在具有列 `C1`...`C5` 的表上构建聚集列存储索引，这就是聚集列存储索引的结构。\n\
  \n尽管列存储索引需要包含其列的数据副本，但 SQL Server 使用了高效的压缩技术，因此开销比你预期的要小。性能收益可能是巨大的。Sunil 为我总结了列存储的三个基本优势：\n\
  \n- **压缩**：聚集列存储索引是表的主要存储。我们看到一些客户在其基表数据上实现了高达 `10×` 的压缩率。这些压缩率有助于将更多数据放入物理内存中。而且\
  \ SQL Server 只会在你需要时解压缩你所需的数据。此外，按列方式压缩数据时，压缩算法可以更高效。\n- **数据消除**：由于数据以列格式存储，SQL\
  \ Server 可以跳过你的查询未访问的列。此外，SQL Server 有能力理解你的查询需要哪些行组的列段，并且只访问所需的行组。这就是所谓的 `行组消除`\
  \ 概念。\n- **批处理模式执行**：批处理模式执行是查询处理器使用的一种技术，用于与查询处理器运算符一起处理多行，而不是一次处理一行。这种执行方式可以提升查询性能。另外，你将在\
  \ SQL Server 2017 中看到一个名为自适应查询处理的新功能，它可以利用此功能来提供智能查询执行。\n\n## 何时以及应该选择哪种索引？\n\n\
  当我与客户谈论列存储索引时，第一个自然而然出现的问题是：我应该在何时使用列存储索引，而不是传统的聚集或非聚集 B 树索引（也称为行存储索引）？建议比你想的可能要简单一些。\n\
  \n首先，你需要考虑聚集列存储索引是否适合你的工作负载。聚集列存储索引最适用于以读取为主的数据仓库场景。大多数数据仓库都有大量行（`> 100,000` 行），因此聚集列存储索引非常适合\
  \ `事实` 表和至少有 `102,400` 行的 `维度` 表（此资源 `https://en.wikipedia.org/wiki/Data_warehouse`\
  \ 对事实表和维度表有很好的描述）。\n\n想要一些聚集列存储索引性能的证明吗？微软制作的所有 `TPC-H` 基准测试都使用了它们。你也可以观看这个演示，我在其中使用流行的\
  \ `PowerBi` 工具展示了使用聚集列存储索引的性能差异：`https://youtu.be/Y270nS42yL8?list=PL-_k_UrAvrYvJh21uc8xebV18YW8sfpHE`。你可以使用我从\
  \ GitHub (`https://github.com/Microsoft/bobsql/tree/master/demos/rhelsummit2018/columnstore`)\
  \ 下载的脚本来亲自尝试此演示。\n\n假设你没有数据仓库，因此不会使用聚集列存储索引。那么非聚集列存储索引呢？非聚集列存储索引非常适合涉及操作型或 OLTP\
  \ 工作负载的场景，但某些列可能涉及 `范围查询`。范围查询通常是指你知道会涉及查找相当多行（通常是 `100` 行或更多）的查询，而 `寻道查询` 通常针对一行或几行。如果你知道在操作型工作负载中存在需要为特定列请求大量行的查询，请考虑创建非聚集列存储索引。在这种场景下使用非聚集列存储索引通常被称为\
  \ `混合事务分析处理` (`HTAP`)。我也见过它被称为实时操作分析。\n\n文档中有一个出色的表格，总结了如何根据工作负载选择列存储索引以及哪种索引类型最适合你的工作负载，地址在\
  \ `https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-design-guidance#choose-the-best-columnstore-index-for-your-needs`。没有什么比实验和测试更有效，我总是建议你对列存储索引进行这样的操作。\n\
  \n## 列存储索引实战\n\n为了查看聚集列存储索引的实际应用，让我们看一下 `WideWorldImportersDW` 示例数据库。\n\n**注意**：此演示需要\
  \ `WideWorldImportersDW` 示例数据库，可从 `https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak`\
  \ 获取。因此，你可以从另一台机器复制备份文件，或者运行以下命令直接在你的 Linux 服务器上下载备份文件：`wget https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak`。\n\
  \n\n\n### 第 6 章：性能能力\n\n## WideWorldImportersDW 中的聚集列存储索引\n\n您可以下载 [WideWorldImportersDW-Full.bak](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak)\
  \ 文件。我还提供了 `cpwwidw.sh`、`restore_wwidw_linux.sql` 和 `restorewwidw.sh` 脚本，以帮助您复制和还原此示例。\n\
  \n使用示例脚本 `wwidw_cci.sql` 中的以下 T-SQL 语句，找出 WideWorldImportersDW 数据库中哪些表具有聚集列存储索引：\n\
  \n```sql\nUSE [wideworldimportersdw]\nGO\nSELECT OBJECT_NAME(object_id) as table_name,\
  \ name, type_desc\nFROM sys.indexes\n-- type = 5 means clustered columnstore index\n\
  WHERE type = 5\nGO\n```\n\n![图 6-20 展示了使用 SQL Operations Studio 的结果。](img/index-320_1.jpg)\n\
  \n**图 6-20. WideWorldImportersDW 数据库中的聚集列存储索引**\n\n## 行组消除与查询性能\n\n现在，让我们对 `Sales`\
  \ 表（属于 `Fact` 架构）运行一些查询，以了解列消除和行组消除的工作原理。首先，使用以下 T-SQL 语句（位于示例脚本 `fact_sales_count.sql`\
  \ 中）找出整个 `Fact.Sales` 表中的行数：\n\n```sql\nUSE [wideworldimportersdw]\nGO\nSELECT COUNT(*)\
  \ FROM Fact.Sale\nGO\n```\n\n您应该会得到 228,265 行的结果。数据仓库数据库中的许多事实表使用 `datetime` 列，因为按时间存储仓库数据很常见。对于\
  \ `Fact.Sales` 表，有两个 `datetime` 列，但数据是按 `[Delivery Date Key]` 列排序的。这正是聚集列存储索引的行组消除的神奇之处。SQL\
  \ Server 为行组中每个段的值范围存储了元数据。如果数据按特定列排序，SQL Server 就可以根据查询条件跳过某些行组。\n\n尝试运行示例脚本 `fact_sales_all.sql`\
  \ 中的以下 T-SQL 语句：\n\n```sql\nUSE [wideworldimportersdw]\nGO\nSET STATISTICS IO ON\n\
  GO\nSET STATISTICS XML ON\nGO\nSELECT * FROM Fact.Sale\nWHERE [Delivery Date Key]\
  \ >= '2016-01-01'\nGO\n```\n\n如果您查看 `SET STATISTICS IO` 的结果，应该会看到类似这样的内容：\n\n```\n\
  Table 'Sale'. Scan count 1, logical reads 0, physical reads 0, read-ahead reads\
  \ 0, lob logical reads 240, lob physical reads 0, lob read-ahead reads 0.\nTable\
  \ 'Sale'. Segment reads 2, segment skipped 5.\n```\n\n`lob logical reads` 的值是 SQL\
  \ Server 为满足此查询需要从聚集列存储索引的缓存中读取的数据量（注意：如果未指定 `WHERE` 子句，在此情况下 `lob logical reads`\
  \ 大约为 805）。SQL Server 将列存储索引存储为 LOB 数据，这就是使用此计数器来衡量读取量的原因。显示段读取和跳过段的第二组输出具有误导性。这实际上应读取为“读取的行组”和“跳过的行组”。这意味着此聚集列存储索引总共有七个行组，但由于行组消除，SQL\
  \ Server 能够跳过其中五个。\n\n现在执行示例脚本 `fact_sales_query.sql` 中的此 T-SQL 语句：\n\n```sql\n\
  USE [wideworldimportersdw]\nGO\nSET STATISTICS IO ON\nGO\nSET STATISTICS XML ON\n\
  GO\nSELECT [Customer Key], Quantity\nFROM Fact.Sale\nWHERE [Delivery Date Key] >=\
  \ '2016-01-01'\nGO\n```\n\n在此示例中，我只请求两个列（或段）并使用相同的 `WHERE` 子句。`SET STATISTICS IO`\
  \ 结果现在如下所示：\n\n```\nTable 'Sale'. Scan count 1, logical reads 0, physical reads\
  \ 0, read-ahead reads 0, lob logical reads 36, lob physical reads 0, lob read-ahead\
  \ reads 0.\nTable 'Sale'. Segment reads 2, segment skipped 5.\n```\n\n跳过了相同数量的行组，但由于我只使用了两列，需要的段更少，因此所需的读取量显著降低。这就是列存储的威力。在数据仓库场景中，由于列消除和行组消除，SQL\
  \ Server 可以极大地加速对大数据扫描的查询。\n\n\n\nSunil 有一篇出色的博客文章，描述了行组消除以及如何解读`SET STATISTICS\
  \ IO`的输出，请访问`https://blogs.msdn.microsoft.com/sql_server_team/columnstore-index-performance-rowgroup-elimination`。\n\
  \n### 提示\n\n要有效使用列存储索引，有几个主题你需要回顾、理解并实施。\n\n- **数据加载**：通过阅读我们文档的这一部分来正确回顾和规划数据加载：`https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-data-loading-guidance`。\n\
  \n- **碎片整理**：遵循我们文档中关于碎片整理的指南：`https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-defragmentation`。\n\
  \n- **分区**：你可以特别地将分区与列存储索引结合使用，以提高可管理性。请参阅我们文档的指南：`https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-design-guidance#use-table-partitions-for-data-management-and-query-performance`。\n\
  \n## 第六章 性能能力\n\n- **提升性能**：为确保获得最佳性能，请通读我们文档中的这些建议：`https://docs.microsoft.com/en-us/sql/relational-databases/indexes/columnstore-indexes-design-guidance#use-table-partitions-for-data-management-and-query-performance`\
  \ 和 `https://docs.microsoft.com/en-us/sql/relational-databases/indexes/columnstore-indexes-query-performance#columnstore-performance-explained`。\n\
  \n### 客户案例与资源\n\n列存储索引确实能带来显著改变。请查看这些客户案例研究和其他资源：\n\n\n\n• Sunil Agarwal 的客户故事演讲：[`channel9.msdn.com/Events/Ignite/2016/BRK2083`](https://channel9.msdn.com/Events/Ignite/2016/BRK2083)，[`channel9.msdn.com/Events/Ignite/Australia-2017/DA343`](https://channel9.msdn.com/Events/Ignite/Australia-2017/DA343)，以及\
  \ [`groupby.org/conference-session-abstracts/successful-production-deployments-with-columnstore-index-in-sql-server-2016/`](https://groupby.org/conference-session-abstracts/successful-production-deployments-with-columnstore-index-in-sql-server-2016/)\n\
  \n• Niko Neugebauer 在其博客上关于列存储索引的全面研究系列文章：[`www.nikoport.com/columnstore/`](http://www.nikoport.com/columnstore/)\n\
  \n• （主要由 Sunil 撰写的）关于列存储索引的 SQL Server 引擎博客文章：[`blogs.msdn.microsoft.com/sqlserverstorageengine/tag/columnstore-index`](https://blogs.msdn.microsoft.com/sqlserverstorageengine/tag/columnstore-index)\n\
  \n列存储索引是加速 SQL Server 性能的强大功能。令人惊叹的是，它**不需要任何应用程序更改**。\n\n列存储索引并非适用于所有工作负载，但它可能适合您。我总是建议客户研究一下列存储索引如何能够帮助提升\
  \ SQL Server 查询性能。\n\n## 内存中 OLTP\n\n早在 2007 年，SQL Server 工程团队就开始致力于将高速、低延迟的在线事务处理（OLTP）功能构建到\
  \ SQL Server 中。大约在 2010 年，一个名为 **Hekaton** 的项目全面启动。Hekaton 在希腊语中意为 100，其初始目标是在 OLTP\
  \ 事务中实现相比传统 SQL Server 技术 100 倍的性能提升。截至 SQL Server 2017，现实情况是，我们已经看到了该功能带来的惊人性能，最高可达传统\
  \ OLTP 应用程序的约 30 倍。但我们确实见证了一些成功案例，包括一位客户为其高度可扩展的 OLTP 应用程序实现了每秒 120 万批处理请求。您可以在[此处](https://blogs.msdn.microsoft.com/sqlcat/2016/10/26/how-bwin-is-using-sql-server-2016-in-memory-oltp-to-achieve-unprecedented-performance-and-scale/)查看他们的故事以及可能实现的性能。\n\
  \n##### 基础知识\n\n首先，请阅读文档中的[此页面](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/requirements-for-using-memory-optimized-tables)，了解使用内存中\
  \ OLTP 功能的基本要求。\n\n内存中 OLTP 是 SQL Server 的一项功能，在标准版和企业版中均可用（标准版有一些限制）。自首次引入以来，内存中\
  \ OLTP 在功能和限制方面都取得了重大进步。\n\n\n\n作为 SQL Server 2014 中的一项功能。此功能由以下组件构成：\n\n• Hekaton\
  \ 引擎\n• 内存优化文件组\n• 内存优化表\n• 内存优化表的索引——哈希或非聚集索引\n• 本机编译存储过程\n\n###### Hekaton 引擎\n\
  \n在 SQL Server 数据库引擎内部构建了一个用于内存 OLTP 的“引擎中的引擎”。它由一系列实现内存 OLTP 事务逻辑的动态链接库组成。其中包括一个编译组件、一个运行时组件和一个引擎。这些组件与\
  \ SQL Server 引擎的其他部分（如查询处理和事务日志记录）协同工作。然而，也存在一些独立于 SQL Server 引擎的组件，用于处理检查点和垃圾回收等功能。所有\
  \ Hekaton 组件仍然依赖 SQLOS 子系统，并在 Linux 环境下通过主机扩展来调用任何原生的 Linux 内核服务（例如，I/O）。\n\n###\
  \ 第 6 章 性能特性\n\n通常，您看不到 Hekaton 引擎的这些组件，因为其设计理念是完全内置的。但是，当您开始检查 DMV（如 `dm_exec_requests`）的一些细节时，如果您使用\
  \ T-SQL 创建内存优化文件组和内存优化表，就会开始看到新的任务。\n\n例如，`WideWorldImporters` 数据库包含一个内存优化文件组和内存优化表。因此，当您还原该示例数据库时，您会在\
  \ `sys.dm_exec_requests` 中看到一些任务，其 `command` 列的值为 `XTP_CKPT_AGENT` 或 `XTP_THREAD_POOL`\
  \ 等。\n\n> **注意** `XTP` 代表 eXtreme Transaction Processing（极限事务处理），是内存 OLTP 的另一个内部名称。您可能会看到几个以\
  \ `hK`（hekaton）或 `XTP` 开头的诊断对象和消息。这些都与内存 OLTP 组件相关。\n\n内存 OLTP 的两个关键设计原则是：\n\n•\
  \ 所有数据都存储在内存中（但通过事务日志和检查点文件提供了持久化选项），并且**必须能完全装入内存**。\n• 使用一套“无锁无闩锁”的算法和行版本控制来优化数据访问。内存\
  \ OLTP 采用乐观并发方法来避免锁问题，并在内部使用技术来避免内部线程并发问题。对内存优化表的修改使用行版本控制方案，以避免额外的事务冲突（此行版本控制方案与\
  \ SQL Server 快照隔离不同，并且不使用 `tempdb`）。\n\n我在本章前面的章节中简要提到了锁，因为这是确保 SQL Server 应用程序事务一致性的主要机制。我还没有提到\
  \ `latches`（闩锁）的概念，它是 SQL Server 的一种内部机制，用于在多个线程之间保护数据库页面的物理完整性，也用于引擎中的其他线程并发保护方案。内存\
  \ OLTP 为实现低延迟和高速度的一个关键设计原则，就是在“Hekaton 引擎”中避免使用任何锁或闩锁。（`Hekaton` 在其代码中也避免了使用 `spinlocks`，这是另一种内部线程并发机制）。\n\
  \n### 第 6 章 性能特性\n\n内存 OLTP 并非通过一个特定选项来启用的功能。使用此功能的方法是：\n\n1. 创建一个内存优化文件组\n2. 在数据库中创建并使用一个或多个内存优化表（包括索引的选择）\n\
  3. （可选）创建一个或多个本机编译存储过程\n\n让我们更详细地看看每一项。\n\n###### 内存优化文件组\n\n在数据库中使用内存 OLTP 的第一步是为内存优化表创建一个特殊的文件组。让我们以\
  \ `WideWorldImporters` 示例为例来说明。如果您需要根据备份/还原来生成创建数据库的脚本（有关如何执行此操作，请参阅以下文档：`https://docs.microsoft.com/sql/ssms/tutorials/scripting-ssms#script-databases`）。\n\
  \n\n\n[microsoft.com/sql/ssms/tutorials/scripting-ssms#script-databases](https://docs.microsoft.com/sql/ssms/tutorials/scripting-ssms#script-databases)\
  \ 你将会看到这条 T-SQL 语句：\n\n**注意** 如果你没有 SQL Server Management Studio，请记住 `mssql-scripter`\
  \ 工具（你可以在 [`github.com/Microsoft/mssql-scripter`](https://github.com/Microsoft/mssql-scripter)\
  \ 获取此工具）。\n\n在 Linux 上，`mssql-scripter` 可用于为 SQL Server 生成脚本。我还在示例脚本 `wwi.sql` 中提供了\
  \ `WideWorldImporters` 数据库的完整脚本。\n\n```sql\nCREATE DATABASE [WideWorldImporters]\n\
  CONTAINMENT = NONE\nON  PRIMARY\n( NAME = N'WWI_Primary', FILENAME = N'/var/opt/mssql/data/WideWorldImporters.mdf'\
  \ , SIZE = 1048576KB , MAXSIZE = UNLIMITED, FILEGROWTH = 65536KB ),\nFILEGROUP [USERDATA]\
  \  DEFAULT\n( NAME = N'WWI_UserData', FILENAME = N'/var/opt/mssql/data/WideWorldImporters_UserData.ndf'\
  \ , SIZE = 2097152KB , MAXSIZE = UNLIMITED, FILEGROWTH = 65536KB ),\nFILEGROUP [WWI_InMemory_Data]\
  \ CONTAINS MEMORY_OPTIMIZED_DATA  DEFAULT\n( NAME = N'WWI_InMemory_Data_1', FILENAME\
  \ = N'/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1' , MAXSIZE = UNLIMITED)\n\
  LOG ON\n( NAME = N'WWI_Log', FILENAME = N'/var/opt/mssql/data/WideWorldImporters.ldf'\
  \ , SIZE = 102400KB , MAXSIZE = 2048GB , FILEGROWTH = 65536KB )\nGO\n```\n\n注意 `CREATE\
  \ DATABASE` 语句的这一部分：\n\n```sql\nFILEGROUP [WWI_InMemory_Data] CONTAINS MEMORY_OPTIMIZED_DATA\
  \  DEFAULT\n( NAME = N'WWI_InMemory_Data_1', FILENAME = N'/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1'\
  \ , MAXSIZE = UNLIMITED)\n```\n\n这里特殊的语法是 `CONTAINS MEMORY_OPTIMIZED_DATA`。注意 `FILENAME`\
  \ 不是文件的名称，而是目录的路径。此语法告知 SQL Server，该数据库将能够存储内存优化表。SQL Server 使用此特殊 `FILEGROUP` 的路径来创建目录以存储检查点文件。检查点文件是存储未在事务日志中处于活动状态的、持久的内存优化表数据的文件。实际上，内存优化表的持久性是由存储在检查点文件中的内容以及自上次数据库检查点以来的那部分事务日志共同构成的。\n\
  \n你可以在我们的文档中阅读更多关于内存优化 `FILEGROUP` 的信息：[`docs.microsoft.com/sql/relational-databases/in-memory-oltp/the-memory-optimized-filegroup`](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/the-memory-optimized-filegroup)，以及关于内存优化表的检查点文件：[`docs.microsoft.com/sql/relational-databases/in-memory-oltp/durability-for-memory-optimized-tables`](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/durability-for-memory-optimized-tables)。\n\
  \n## 第六章 性能特性\n\n###### 内存优化表\n\n一旦你为数据库创建了内存优化的 `FILEGROUP`，你就可以在该数据库中创建内存优化表。内存优化表的外观和感觉与数据库中的*常规*（通常称为基于磁盘的）表类似，只是你在使用\
  \ `CREATE TABLE` 语句时需要使用 T-SQL 语法的一个扩展。\n\n让我们再次使用 `WideWorldImporters` 示例数据库来看一个例子。使用\
  \ SQL Server Management Studio 中为表生成脚本的功能（参见文档 [`docs.microsoft.com/sql/ssms/tutorials/scripting-ssms#script-tables`](https://docs.microsoft.com/sql/ssms/tutorials/scripting-ssms#script-tables)），为\
  \ `[Warehouse].[VehicleTemperatures]` 表生成脚本：\n\n```sql\nCREATE TABLE [Warehouse].[VehicleTemperatures]\n\
  (\n    [VehicleTemperatureID] [bigint] IDENTITY(1,1) NOT NULL,\n    [VehicleRegistration]\
  \ nvarchar COLLATE Latin1_General_CI_AS NOT NULL,\n    [ChillerSensorNumber] [int]\
  \ NOT NULL,\n```\n\n\n###### 内存优化表\n\n```sql\n[RecordedWhen] datetime2 NOT NULL,\n\
  \n[Temperature] decimal NOT NULL,\n\n[FullSensorData] nvarchar COLLATE Latin1_General_CI_AS\
  \ NULL,\n\n[IsCompressed] [bit] NOT NULL,\n\n[CompressedSensorData] varbinary NULL,\n\
  \nCONSTRAINT [PK_Warehouse_VehicleTemperatures]  PRIMARY KEY NONCLUSTERED\n\n(\n\
  \n[VehicleTemperatureID] ASC\n\n)\n\n)WITH ( MEMORY_OPTIMIZED = ON , DURABILITY\
  \ = SCHEMA_AND_DATA )\n\nGO\n```\n\n注意 `WITH` 选项的扩展语法。`MEMORY_OPTIMIZED = ON` 告诉\
  \ SQL Server 这将是一个内存优化表。\n\n内存优化表有两种类型，你使用 `DURABILITY` 选项来指定具体类型：\n\n`SCHEMA_AND_DATA`：此选项通过检查点文件和事务日志确保架构（表定义）和数据的持久性。\n\
  \n`SCHEMA_ONLY`：此选项仅确保架构的持久性，而不持久化用户数据。这意味着，如果在插入数据后 SQL Server 因任何原因关闭，所有数据都将丢失。这听起来可能非常糟糕，但在某些场景下，你可能需要`cache`数据，并且不在意这些数据是否被持久化。这种类型的内存优化表提供了最快可能的性能，因为更改不会被记录到事务日志中。\n\
  \n## 性能特性\n\n内存优化表有一个特别重要的特性。这类表中的所有数据都必须能放入内存中。SQL Server 会在常规缓冲池之外使用内存资源来存储内存优化数据。这意味着，如果你在\
  \ SQL Server 中使用内存优化表，使用缓冲池的基于磁盘的表和内存优化表之间将存在对内存资源的竞争。SQL Server 对内存优化表允许使用的内存量有限制，但也可以通过资源调控器来限制内存使用。更多详情请参阅我们的文档：`https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/bind-a-database-with-memory-optimized-tables-to-a-resource-pool`。\n\
  \n重要的是要知道，内存优化表可以与数据库中的基于磁盘的表共存。基于磁盘的表将使用标准的 SQL Server 缓冲池和数据库文件进行存储。内存优化表则存储在内存中一个由\
  \ SQL Server 管理的独立内存区域中，并通过检查点文件和事务日志实现持久化（注意：数据库中所有基于磁盘的表和内存优化表的事务都存储在同一个事务日志中）。\n\
  \n内存优化表必须放入内存这一事实本身并非真正的性能优势。即使是基于磁盘的表，也会从磁盘加载到缓冲池中。关键的性能优势在于对内存中数据的`optimized`访问，因此得名。这种优化优势真正体现在并发访问内存优化表时。我不建议你用单用户的例子来衡量内存优化表的真正好处。它的核心在于并发的、优化的数据访问。\n\
  \n### 索引\n\n内存优化表的内部结构与基于磁盘的表不同。它们不使用相同的 8KB 数据库页面和行结构概念。这些内部细节不是你在使用此功能时应该关心的，但了解它们对于理解索引特别有用。\n\
  \n内存优化表没有聚集索引。相反，索引仅用于访问数据。内存优化表有两种索引类型可用：\n\n## 哈希索引\n\n哈希索引是对键列的哈希值建立的索引。\n\n\n\
  ###### 非聚集索引\n\n哈希索引在您几乎总是执行单行查找查询时可能非常高效。哈希索引可以很高效，但也可能难以决定如何配置和维护。\n\n一种类似于基于磁盘表的非聚集索引的\
  \ B 树结构。我建议您将非聚集索引作为默认索引类型，然后进行调优，以查看哈希索引是否更适合您的工作负载。\n\n您可以在内存优化表的多个列上使用许多索引，但必须始终有一个定义为主键的索引（哈希或非聚集）。\n\
  \n当您探索内存优化表的工作原理时，我认为以下两个资源可能很有价值：\n\n- 由 Kalen Delaney 撰写的关于 In-Memory OLTP 内部原理的白皮书：[In-Memory\
  \ OLTP 内部原理](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/sql-server-in-memory-oltp-internals-for-sql-server-2016)\n\
  - 我做过的一次关于 In-Memory OLTP 内部原理的演示，可在 YouTube 上找到：[In-Memory OLTP 内部原理解析](https://www.youtube.com/watch?v=P9DnjQqE0Gc)\n\
  \n### 原生编译存储过程\n\n内存优化表允许使用标准的 T-SQL 语句，但有一些限制（有关限制，请参阅此文档：[In-Memory OLTP 不支持的\
  \ Transact-SQL 构造](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/transact-sql-constructs-not-supported-by-in-memory-oltp)）。这个概念被称为\
  \ `interpreted` T-SQL。\n\n为了进一步提升性能，我们创建了一个称为 `natively compiled` 存储过程的概念。其理念是，您可以使用特殊的\
  \ T-SQL 语法创建存储过程，这样 SQL Server 就会编译并构建一个动态链接库 (DLL) 来表示存储过程中的所有 T-SQL 查询。\n\n所有通常编译成查询计划来执行查询的代码都被内置到\
  \ DLL 中。这使得执行原生编译存储过程时速度极快。\n\n## 第 6 章 性能能力\n\n如果您使用本章前面描述的技术来生成对象的脚本，您可以从这个存储过程\
  \ `Website.RecordColdRoomTemperatures` 的片段中看到原生编译存储过程的语法：\n\n```sql\nCREATE PROCEDURE\
  \ [Website].[RecordColdRoomTemperatures]\n@SensorReadings Website.SensorDataList\
  \ READONLY\nWITH NATIVE_COMPILATION, SCHEMABINDING, EXECUTE AS OWNER\nAS\nBEGIN\
  \ ATOMIC WITH\n(\nTRANSACTION ISOLATION LEVEL = SNAPSHOT,\nLANGUAGE = N'English'\n\
  )\nBEGIN TRY\n.\n.\n.\n```\n\n`WITH NATIVE_COMPILATION` 扩展是创建原生编译存储过程的关键。\n\n内存优化表与原生编译存储过程的结合，提供了\
  \ In-Memory OLTP 最大的可能性能能力。原生编译过程并非适用于所有场景，并且对 T-SQL 语句有一些限制。有关在使用原生编译过程时使用 T-SQL\
  \ 某些方面的任何限制，请参阅此文档：[In-Memory OLTP 不支持的 Transact-SQL 构造](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/transact-sql-constructs-not-supported-by-in-memory-oltp)\n\
  \n\n\n# 第 6 章：性能特性\n\n[by-in-memory-oltp](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/transact-sql-constructs-not-supported-by-in-memory-oltp).\n\
  \n###### 使用场景\n\n如果您有足够的内存来容纳数据，并且需要一个高速、可扩展的 OLTP 解决方案，那么内存优化表可能很适合您。您可以使用我们文档中的这个位置来估算内存优化表的内存需求：[`docs.microsoft.com/sql/relational-databases/in-memory-oltp/estimate-memory-requirements-for-memory-optimized-tables`](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/estimate-memory-requirements-for-memory-optimized-tables).\n\
  \n内存 OLTP 的用途比传统的`INSERT`、`UPDATE`、`DELETE`类型 SQL 应用更广泛。请考虑以下其他示例：\n*   数据摄取应用程序，特别是物联网（`IoT`）场景\n\
  *   缓存和会话状态数据\n*   替代`tempdb`的使用\n*   提取转换加载（`ETL`）场景\n\n请查阅我们的文档，获取有关这些场景的更多指导以及一些客户案例研究示例：[`docs.microsoft.com/sql/relational-databases/in-memory-oltp/overview-and-usage-scenarios`](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/overview-and-usage-scenarios).\n\
  \n## 智能的 SQL Server 引擎\n\n我在本章中介绍了 SQL Server 引擎内置或通过配置设置、以及像`列存储`索引这样的附加功能提供的所有出色性能特性。在\
  \ SQL Server 2017 中，我们决定开始投资于那些能为 SQL Server 引擎提供更多`智能`的功能，以帮助提升应用程序性能并减少解决性能问题的时间。其中一个功能内置于查询处理引擎中，另一个则在启用`查询存储`功能时内置在引擎中。\n\
  \n##### 自适应查询处理\n\n虽然 SQL Server 中的查询处理器是引擎的一个惊人组件，旨在构建最佳查询计划并同时保持较快的编译时间，但在某些情况下，查询处理器的决策能力会受到限制。而许多这些场景都涉及到基于基数估计的限制。\n\
  \n因此，在 SQL Server 2017 中，我们没有总是“徒劳无功”地试图修复这些基数问题，而是构建了使查询处理器能够`适应`查询执行问题并“即时”纠正它们的功能。\n\
  \n这一系列功能被称为`自适应查询处理`（这实际上是 SQL Server 计划中更广泛的功能集`智能查询处理`的一部分）。\n\n在 SQL Server 2017\
  \ 中，我们启用了三种不同的自适应查询处理场景：\n*   批处理模式内存授予反馈\n*   批处理模式自适应连接\n*   交错执行\n\n如果您还记得前面关于`列存储`索引的部分，我曾提到过`批处理模式`处理这个主题。这意味着，对于前两个场景，自适应查询处理仅在查询处理器使用批处理模式时才有效。在\
  \ SQL Server 2017 中，这仅适用于`列存储`索引的场景。\n\n第一个场景，即批处理模式内存授予反馈，其概念是：如果 SQL Server 检测到某个查询已执行并使用了错误的内存授予，它将调整该查询的内存分配。该查询的后续执行将适应新的授予，从而避免性能问题。此检测内置于查询处理器中，不需要重新编译查询。\n\
  \n第二个场景是 SQL Server 通过创建新查询计划进行适应的一个例子。\n\n\n\n##### 自适应查询处理\n\n一个具备`智能`适配能力的运算符。这种新型运算符被称为`自适应联接`运算符。\n\
  \n其核心理念是，SQL Server 可以将特定联接方法的选择推迟到读取数据之后再决定，从而选择最优的联接方式。\n\n第三种场景涉及 SQL Server\
  \ 查询优化器在编译多语句表值函数的查询计划时进行自我调整，这类函数在基数估计方面存在挑战。优化器会暂停优化过程，收集更精确的基数信息，然后恢复优化以适配更优的查询计划。\n\
  \n要查看自适应查询处理的实际运行情况，请从 `` `aqp` `` 目录下载本章的示例文件，并按照 `` `readme.md` `` 文件中的说明进行操作。\n\
  \n**注意** 此演示需要使用 WideWorldImportersDW 示例数据库，可从以下网址获取：[`github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak)。因此，您可以从另一台计算机复制备份文件，或者运行以下命令直接在您的\
  \ Linux 服务器上下载备份文件：\n\n```bash\nwget https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak\n\
  ```\n\n我还提供了 `` `cpwwidw.sh` ``、`` `restore_wwidw_linux.sql` `` 和 `` `restorewwidw.sh`\
  \ `` 脚本，以帮助您复制和还原此示例。\n\n![](img/index-334_1.jpg)\n\n## 第 6 章 性能能力\n\n当您运行自适应联接演示（可在\
  \ `` `aqp_adaptivejoin.sql` `` 示例脚本中找到）时，请显示演示中最终查询的实际执行计划。您的查询计划应与图 6-21 类似。\n\n\
  ***图 6-21.** 作为自适应查询处理一部分的自适应联接*\n\n请注意，`Adaptive Join` 运算符具有一个 `实际联接类型`，在本例中，根据查询执行时的数据值，该类型为\
  \ `嵌套循环`。在演示脚本中，前一个查询的联接类型是 `哈希联接`。\n\n如果您使用的数据库兼容性级别为 `140`，则 SQL Server 查询处理器中会启用自适应查询处理。如果您使用\
  \ SQL Server 2017 创建新数据库，此为默认兼容性级别。我将在本书后面关于迁移的章节中讨论用于升级和迁移场景的数据库兼容性。\n\n负责此产品领域的首席项目经理\
  \ Joe Sack 在 YouTube 上发布了一个非常棒的视频，您可以观看完整的演示，并听取他对该功能各方面的讲解：[`www.youtube.com/watch?v=szTmo6rTUjM`](https://www.youtube.com/watch?v=szTmo6rTUjM)。\n\
  \n##### 自动调优\n\n当我第一次看到 SQL Server 2017 的早期版本时，立即吸引我眼球的功能之一就是 `自动调优`，其中包含一个名为 `自动计划修正`\
  \ 的选项。\n\nSQL Server 2017 于 2017 年 10 月发布，紧随我最喜欢的版本之一 SQL Server 2016 之后。在 SQL Server\
  \ 2016 中，我们为产品引入了一项名为 `` `查询存储` `` 的新功能。当通过 `ALTER DATABASE` 为数据库启用 `查询存储` 后，SQL\
  \ Server 引擎将开始在内存中收集查询性能遥测数据，\n\n\n\n数据库中的系统表。您不再需要去`轮询`动态管理视图并将其存储到您自己的表中。这项性能遥测数据会在查询被编译和执行时，由\
  \ SQL Server 引擎自身收集。\n\n与我们构建到 SQL Server 中的许多功能一样，您可以通过一系列目录视图（可在`https://docs.microsoft.com/sql/relational-databases/system-catalog-views/query-store-catalog-views-transact-sql`找到）使用\
  \ T-SQL 查询来查找性能数据的详细信息。查询存储提供了各种酷炫的性能洞见，我们已经在`https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store#Scenarios`文档中记录了一些关键使用场景。其中一个场景称为`查询计划回归`（也称为`计划选择回归`，您可以在`https://docs.microsoft.com/sql/relational-databases/performance/query-store-usage-scenarios#pinpoint-and-fix-queries-with-plan-choice-regressions`中了解更多）。\n\
  \n想象一下这个场景。您有一个存储过程，它接受一个整型参数。这个整型参数用在该存储过程中一条 SELECT 语句的 WHERE 子句中。当该存储过程第一次被编译时，基于过程首次执行时的参数值，此过程的计划被插入缓存。这个计划对大多数用户来说可能是个好计划。现在，由于某些意外原因，比如内存压力，该计划被从缓存中清除。假设一个用户随后通过应用程序执行该过程，但这次使用了不同的整型参数值。这可能导致产生一个不同的查询计划，从而引发性能问题（例如，新计划可能涉及索引扫描，而这并非对所有执行都是最优的）。根据参数值为存储过程编译计划被称为`参数嗅探`。这个概念在我们文档的`查询处理体系结构指南`中有讨论（该指南本身也值得一读：`https://docs.microsoft.com/sql/relational-databases/query-processing-architecture-guide`）。参数嗅探的设计初衷是好的，但在某些情况下，如果与参数关联的表中的数据分布不均，就可能出现性能问题。\n\
  \n因此，在 SQL Server 2016 中，您可以使用 SQL Server Management Studio 中的报告，或者查询查询存储目录视图，来查看是否是查询计划回归导致了性能问题。现在，SQL\
  \ Server 2017 带来了一些\n\n![](img/index-336_1.jpg)\n\n## 第 6 章 性能特性\n\n\n## 第 6 章\n\
  \n自动化。为何不在引擎中内置一些自动化功能，利用查询存储丰富的遥测数据呢？原来我们工程团队中负责查询存储功能的同事们，已经为 Azure SQL Database\
  \ 在云端开发这类功能了。采用我们云端优先的工程开发模式，我们开始在 Azure 上开发这些功能，测试并验证其有效性，然后将其引入 SQL Server 2017。\n\
  \n我有一个你可以自己尝试的演示（惊喜！它使用了`WideWorldImporters`数据库），演示的是在 Linux 上运行 SQL Server 并使用\
  \ SQL Operations Studio。我建议你完成整个示例，你可以在本章示例的`autotune`目录中找到它，或者访问我的 GitHub 站点：[`github.com/Microsoft/bobsql/tree/master/demos/sqlserver/sqllinux/autotune`](https://github.com/Microsoft/bobsql/tree/master/demos/sqlserver/sqllinux/autotune)。只需按照`readme.md`文件中的说明操作即可。运行此演示时，你会注意到我以一种新的方式使用了本章前面展示的\
  \ SQL Operations Studio 的图表功能。图 6-22 展示了自动调优解决演示中查询计划回归问题后，来自 SQL Operations Studio\
  \ 的图表示例。\n\n**图 6-22. 使用 SQL Operations Studio 演示自动调优功能**\n\n图 6-22 所示的图表测量的是`batch\
  \ requests/sec`（每秒批处理请求数），这是衡量 SQL Server 查询吞吐量的标准方法。请注意图表右侧性能如何下降，但又自动迅速恢复到预期水平。\n\
  \n我向几乎所有人展示过这个演示，他们都感到惊讶。我推荐使用此功能的建议如下：\n\n-   启用查询存储并根据你的需求进行配置。请参阅我们在最佳实践方面的文档：[`docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store`](https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store)。\n\
  -   通过检查动态管理视图`dm_db_tuning_recommendations`来监控我们为你提供的任何建议。\n-   如果你认可我们的建议，可以尝试使用以下\
  \ T-SQL 语法开启自动计划修正：\n```\nALTER DATABASE current\nSET AUTOMATIC_TUNING ( FORCE_LAST_GOOD_PLAN\
  \ = ON );\n```\n-   无论你只是查看建议还是使用自动化功能，我始终建议你找出查询计划回归问题的原因，并采取更长期的纠正措施。\n\n如果你想跟随并观看我在\
  \ Linux 上使用 SQL Server 演示自动调优，请观看我在 SQL Server YouTube 频道上发布的演示视频：[`youtu.be/Sh8W7IFX390`](https://youtu.be/Sh8W7IFX390)。\n\
  \n#### 本章小结\n\n本章中，我的目的是确保你了解 SQL Server 在 Linux 上性能的潜力。我介绍了你可以信赖的 SQL Server 内置性能能力，从笔记本电脑的可扩展性到业内最大的企业级服务器。我向你展示了针对\
  \ SQL Server 和 Linux 的重要配置选择。并且我讨论了如何通过正确平衡索引、维护统计信息以及在你的应用程序中合理使用 T-SQL 来实现性能调优。你还看到了如何利用新技术来加速性能，从列存储索引到诸如自动调优之类的智能性能功能。掌握了这些知识，现在是时候确保你了解如何保护你的\
  \ SQL Server，并学习在 Linux 上运行时重要的安全功能和选项了。\n\n![](img/index-338_1.png)\n\n## 第 7 章\n\
  \n# `SQL Server 中的安全性`\n\nSQL Server 数据平台和引擎的第二大支柱是安全性。SQL Server 2017 不仅提供了一套丰富的功能来满足您的安全需求，而且在过去近十年中，一直被公认为漏洞最少的数据库平台。图\
  \ 7-1 是我用来展示 SQL 安全性功能套件概览（业内许多人称之为*纵深防御*）的标准图表之一，其中还包含了一张对比 SQL Server 与竞争对手在漏洞方面评级的图表。\n\
  \n***图 7-1.** `SQL Server 纵深防御`*\n\n右侧的柱状图并非微软杜撰。它来自美国国家标准与技术研究院综合漏洞数据库 (`https://www.nist.gov/programs-projects/national-vulnerability-database-nvd`)，这也解释了我们对安全性的重视程度。\n\
  \n在本章中，我将向您展示构成纵深防御故事的各种安全功能。安全性不仅仅是一个软件功能，因此我还建议您阅读我们文档中关于如何保护 SQL Server（包括物理安全）的这一部分：`https://docs.microsoft.com/sql/relational-databases/security/securing-sql-server`。\n\
  \n© Bob Ward 2018\nB. Ward, `Pro SQL Server on Linux`, `https://doi.org/10.1007/978-1-4842-4128-8_7`\n\
  \n## 第 7 章：SQL Server 中的安全性\n\n#### 登录名和用户\n\n到目前为止，在本书中我已经向您展示了两个 SQL Server 登录名（`sa`\
  \ 和一个我创建的名为 `sqllinux` 的登录名）的示例，这些是用于连接到 SQL Server 并执行查询的身份标识。这两个登录名都是使用 `SQL Server\
  \ 身份验证`连接到 SQL Server 的例子。SQL Server 身份验证需要一个名称和密码。应用程序使用该名称和密码连接到 SQL Server。这是连接到\
  \ SQL Server 最简单且兼容性最好的方法，无论是在 Windows、Linux 还是 Azure 上。最大的缺点是，您必须维护一组独立于其他身份验证目的（如\
  \ Active Directory）的身份验证对象。我将在本章下一节向您展示如何在 Linux 上设置和使用 `Active Directory 身份验证`。\n\
  \n虽然*登录名*是 SQL Server 实例级别的对象，但数据库也有*用户*。登录名和数据库中的用户之间存在关联。每个使用 SQL Server 创建的登录名都至少映射到\
  \ `master` 数据库中的一个用户。`sa` 登录名映射到一个名为 `dbo`（数据库所有者）的用户。所有其他创建的登录名都映射到 `guest` 用户。所有数据库在创建时，基于\
  \ `model` 数据库的定义，都具有 `dbo` 和 `guest` 用户。除了 `sa` 登录名外，大多数登录名将通过将该登录名映射到您在数据库中创建的用户来获得访问用户数据库的权限。如果您希望某个登录名拥有数据库所有者的权限，您会将该用户映射到\
  \ `dbo` 用户。否则，您会在数据库中创建一个新用户并将登录名映射到该用户。登录名可以映射到同一 SQL Server 实例上不同数据库中的不同用户。\n\n\
  在本书前面的示例中，我向您展示了如何创建一个名为 `sqllinux` 的新用户。我没有将 `sqllinux` 映射到特定用户，而是使用此登录名创建了一个名为\
  \ `WideWorldImporters` 的数据库。使用登录名（如果将该登录名放入 `dbcreator` 角色中）创建数据库会自动将该登录名映射到所创建数据库的\
  \ `dbo` 用户。默认情况下，作为一项安全最佳实践，`guest` 用户的连接访问权限对于用户数据库是被撤销的（对于系统数据库则必须启用）。\n\n\n#\
  \ 第 7 章 SQL Server 中的安全性\n\n## **重要安全说明**\n\n数据库 `msdb`)。这意味着，如果您创建一个新的登录名并尝试访问某个数据库，但该登录名尚未映射到该数据库的用户，则访问将失败，并显示类似以下的错误：\n\
  \n```\nMsg 916, Level 14, State 1, Line 1\nThe server principal \"sqllinux\" is\
  \ not able to access the database \"WideWorldImporters\" under the current security\
  \ context.\n```\n\n## **提示**\n\n对于任何生产系统，您都应考虑密码过期和复杂性要求。请参阅我们的文档以获取相关指导：[`docs.microsoft.com/sql/relational-databases/security/password-policy`](https://docs.microsoft.com/sql/relational-databases/security/password-policy)。\n\
  \n## **步骤 1：创建新登录名**\n\n那么，让我们按照为任何新建数据库创建登录名和用户的步骤进行操作：\n\n• 首先，我强烈建议您不要使用 `sa`\
  \ 登录名为生产环境创建新数据库。如果您只是在开发或试验 SQL Server，那么使用 `sa` 是可以的。\n\n• 因此，要创建您的第一个数据库，请使用\
  \ T-SQL `CREATE LOGIN` 语句创建一个新的登录名。在本书第 3 章中，我向您展示了如何执行此操作并为该登录名授予创建数据库的适当权限，如下所示（此脚本位于第\
  \ 3 章的示例文件 `createlogin.sql` 中）。请以 `sa` 登录名连接并执行此脚本。\n\n```sql\nUSE master\nGO\n\
  IF EXISTS (select * from sys.server_principals where name = 'sqllinux')\nDROP LOGIN\
  \ [sqllinux]\nGO\nCREATE LOGIN [sqllinux] WITH PASSWORD=N'Sql2017isfast', DEFAULT_DATABASE=[master]\n\
  GO\nALTER SERVER ROLE dbcreator ADD MEMBER sqllinux\nGO\n```\n\n在此示例中，我将此登录名添加到了一个服务器角色，以允许其创建数据库。我将在本章后面更详细地讨论角色。此登录名现在将映射到用户\
  \ `dbo`，并拥有该数据库中授予 `dbo` 用户的所有权限。\n\n## **注意**\n\n在第 3 章中，我使用了旧的系统存储过程 `sp_addsrvrolemember`。使用它完全没有问题，但从技术上讲它已弃用。这里我使用了新的\
  \ `ALTER SERVER ROLE` 语法。\n\n## **步骤 2：创建新数据库**\n\n• 使用以下 T-SQL 语句，以 `sqllinux`\
  \ 登录名连接并创建新数据库（该语句位于示例文件 `createdb.sql` 中）：\n\n```sql\nUSE [master]\nGO\nDROP DATABASE\
  \ IF EXISTS [SecureMyDatabase]\nGO\nCREATE DATABASE [SecureMyDatabase]\nGO\n```\n\
  \n## **步骤 3：验证用户映射**\n\n• 作为示例文件 `whichuserami.sql` 中的脚本，运行此 T-SQL 语句，以找出 `sqllinux`\
  \ 登录名映射到的数据库用户：\n\n```sql\nUSE [SecureMyDatabase]\nGO\nSELECT SUSER_NAME() as current_login,\
  \ USER_NAME() as current_database_user\nGO\n```\n\n图 7-2 显示了使用 SQL Operations Studio\
  \ 的结果。\n\n![sqllinux 的登录名和用户](img/index-342_1.jpg)\n\n**图 7-2.** 创建数据库后，`sqllinux`\
  \ 的登录名和用户\n\n在此示例中，我使用了两个内置的 SQL Server 函数来查找当前连接的登录名和数据库用户。由于数据库是由 `sqllinux` 登录名创建的，因此它会自动映射到\
  \ `dbo` 用户。\n\n## **步骤 4：创建另一个用户**\n\n• 现在，让我们在数据库中创建一个不是数据库所有者的用户。第一步是创建一个新的登录名，其默认数据库设为\
  \ `SecureMyDatabase`。以 `sa` 登录名连接，使用以下 T-SQL 批处理（位于示例脚本 `createnewuserlogin.sql`\
  \ 中）（注意：可以向 `sqllinux` 登录名授予创建新登录名的权限）：\n\n```sql\nUSE [MASTER]\nGO\nUSE master\n\
  GO\nIF EXISTS (select * from sys.server_principals where name = 'newuser')\nDROP\
  \ LOGIN [newuser]\nGO\nCREATE LOGIN [newuser] WITH PASSWORD=N'Sql2017isfast', DEFAULT_DATABASE=[SecureMyDatabase]\n\
  GO\n```\n\n此时，如果您尝试以 `newuser` 登录名登录，将收到类似以下的错误：\n\n```\nCannot open user default\
  \ database. Login failed. Login failed for user 'newuser'.\n```\n\n\n这是因为 `newuser`\
  \ 登录名并未映射到 `[SecureMyDatabase]` 数据库中的任何用户。\n\n因此，下一步是以 `dbo` 用户（即 `sqllinux` 登录名）连接到数据库，并在其中创建一个用户。以\
  \ `sqllinux` 身份连接后，执行以下 T-SQL 批处理（可在示例脚本 `createuser.sql` 中找到）：\n\n```sql\nUSE [SecureMyDatabase]\n\
  GO\nCREATE USER newuser FOR LOGIN newuser\nGO\n```\n\n**注意** 你不必将用户映射到与登录名相同的名称，但这确实能使管理和理解更加容易。\n\
  \n现在，让我们以 `newuser` 登录名连接，并使用 SQL Operations Studio 再次运行 `whichuserami.sql` 脚本。图\
  \ 7-3 展示了结果应有的样子。\n\n![](img/index-344_1.jpg)\n\n***图 7-3.** `newuser` 登录名与用户*\n\
  \n如果名为 `newuser` 的用户不是数据库所有者，那么该用户能做什么？此登录名和用户现在拥有什么权限和访问权限？我将在后面的章节中介绍这一点。首先，我想向你展示一种不同的登录身份验证方法，称为\
  \ Active Directory 身份验证。\n\n#### Active Directory 身份验证\n\nSQL Server 身份验证简单易用。然而，任何规模的组织中的大多数用户，其登录账户都属于公司基础设施的一部分，例如\
  \ Active Directory 域。使用单点登录不仅高效，而且更安全，因为你不必管理不同的账户来使用公司资源和 SQL Server。Windows 上的\
  \ SQL Server 多年来一直提供这种方法，称为 Windows 身份验证。\n\nActive Directory 是一种非常流行的基于身份的管理系统，即使对于使用\
  \ Linux 服务器的组织也是如此。Linux 提供了加入 Active Directory 域所需的软件包和软件。SQL Server 可以利用此功能，使用\
  \ Kerberos 对 Active Directory 用户进行身份验证，这与 Windows 身份验证非常相似。用户现在可以登录到 Linux 服务器或任何可以加入域的计算机，并登录到\
  \ SQL Server，而无需使用单独的 SQL 登录名。\n\n##### 工作原理\n\nActive Directory 身份验证涉及以下命令和对象：\n\
  \n- **`realm`**：Linux 上的一个命令，允许你将 Linux 服务器加入 Active Directory 域。`realm` 要求你安装 `realmd`\
  \ 软件包。术语 *realm* 源于 Kerberos 概念，即 Kerberos realm。\n- 票据授权票据 (`TGT`)：一个加密文件，是一个 *票据*，发送给票据授权服务器\
  \ (`TGS`) 以请求访问域中的服务（如 SQL Server）。`TGS` 功能由 Windows 域控制器实现。\n- **`kinit`**：一个 Linux\
  \ 命令，用于获取并缓存域用户的 `TGT`。\n- 服务主体名称 (`SPN`)：Active Directory 中服务（如 SQL Server）的唯一标识符。\n\
  - **`keytab`**：Linux 上的一个文件，用于存储用于验证传入 Kerberos 身份验证请求的加密密钥。\n- 域控制器：为 Active Directory\
  \ 域提供 Active Directory 域服务的 Windows 服务器。\n\n我的同事 Vin Yu，他是 Linux 和容器上 SQL Server\
  \ 的关键产品经理之一，提供了一个出色的图表，如图 7-4 所示，该图展示了 Kerberos 如何工作以支持 SQL Server 的 Active Directory\
  \ 身份验证流程。\n\n![](img/index-346_1.png)\n\n***图 7-4.** Linux 上的 SQL Server Active\
  \ Directory 身份验证流程*\n\n让我解释一下这个流程，以了解 Kerberos 身份验证如何在 Linux 上的 SQL Server 中工作：\n\
  \n1.  用户在 Linux 客户端上登录域，使用域用户账户和密码执行 `kinit`。`kinit` 会将用户名和密码发送给域控制器 (`DC`)。\n2.\
  \  `DC` 在验证这是一个具有正确密码的有效域用户后，会颁发一个 `TGT`。如果你使用域账户登录 Windows 计算机，也会发生同样的过程。\n3. \
  \ 现在，你需要使用像 `sqlcmd` 这样的工具连接到 SQL Server。\n\n\n`-E` 参数指定了使用 Windows 身份验证。当使用像 `sqlcmd.exe`\
  \ 这样的工具通过 AD 身份验证尝试连接到 Linux 上的 SQL Server 时，客户端将使用 TGT 以及 SQL Server 服务的 SPN 发送给\
  \ DC。\n\n4.  然后 DC 会发回一张票证，客户端现在可以使用该票证进行到 SQL Server 的身份验证。\n\n5.  `sqlcmd` 程序现在可以使用\
  \ DC 提供的票证尝试对到 SQL Server 的连接进行身份验证。SQL Server 将使用（表中列出的）密钥来验证该票证对于连接到 SQL Server\
  \ 是否有效，并确保该域账户在 SQL Server 中已创建登录名。\n\n6.  SQL Server 将授予连接到 SQL Server 的请求。\n\n\
  ## **第 7 章 SQL Server 中的安全性**\n\n### **配置**\n\n我事先向您坦白，在 Linux 上为 SQL Server 配置\
  \ Active Directory 身份验证并不简单。这并非难在技术难度。问题在于涉及多个步骤，您只需仔细遵循它们以避免问题。\n\n在 Linux 上为 SQL\
  \ Server 配置 Active Directory 身份验证的完整指南可在我们文档的教程中找到：[`docs.microsoft.com/sql/linux/sql-server-linux-active-directory-authentication`](https://docs.microsoft.com/sql/linux/sql-server-linux-active-directory-authentication)。\n\
  \n在本书中我不会逐步讲解整个教程步骤。相反，我会为您提供一些关于我在文档中可能不明显的遇到问题的提示。\n\n在文档的“先决条件”部分，它说“在您的网络上设置一个\
  \ AD 域控制器（Windows）”。您所在的组织可能已经有一个 Active Directory 系统。如果是这样，您需要将文档的这一部分展示给您的网络管理员，以为\
  \ SQL Server Active Directory 身份验证配置 Active Directory：[`docs.microsoft.com/sql/linux/sql-server-linux-active-directory-authentication?#createuser`](https://docs.microsoft.com/sql/linux/sql-server-linux-active-directory-authentication?#createuser)。\n\
  \n您可能和我一样，希望演示此功能；我在虚拟机中设置了自己的 Windows Server 作为带有自己 Active Directory 的域控制器。设置我自己的\
  \ AD 和域控制器比我想象的要简单，但我得到了帮助。这篇博客文章非常出色，可以指导您完成：[`blogs.technet.microsoft.com/canitpro/2017/02/22/step-by-step-setting-up-active-directory-in-windows-server-2016/`](https://blogs.technet.microsoft.com/canitpro/2017/02/22/step-by-step-setting-up-active-directory-in-windows-server-2016/)。\n\
  \n以下是我遇到的一些其他问题，可能对您在配置 Linux 上的 SQL Server 的 AD 身份验证时有所帮助。\n\n当我尝试使用文档中的这个命令将 SQL\
  \ Server 加入域时：\n\n```\nsudo realm join contoso.com -U 'user@CONTOSO.COM' -v\n```\n\
  \n我遇到了三个问题：\n\n1.  我必须使用类似这样的命令更改我的 Linux 服务器的主机名（从其默认值）：\n\n    ```\n    hostnamectl\
  \ set-hostname bobsqllinux\n    ```\n\n    我本应在 VM 上安装 RHEL 时就完成此操作（实际上 Azure 会自动执行）。结果发现，当我安装\
  \ RHEL 时，输入一个非默认的主机名是可选的。\n\n    ![](img/index-348_1.png)\n\n2.  我必须安装缺少的软件包（文档说您可能需要这样做），如下所示：\n\
  \n    ```\n    sudo yum -y install oddjob oddjob-mkhomedir sssd samba-common-tools\n\
  \    ```\n\n3.  当加入域的命令生效时，我收到了一些\n\n\n\n# 第 7 章：SQL Server 中的安全性\n\n## 使用 AD 认证\n\
  \n我发现一些错误信息可以忽略。成功加入域后的状态如图 7-5 所示。\n\n**图 7-5.** Linux 服务器成功加入域\n\n此外，虽然我可以按照文档描述在\
  \ Linux 服务器上使用 `kinit` 来“登录到域”，但我还想使用我的 AD 域账户通过 `ssh` 登录到我的 Linux 服务器。在运行这个命令之前，我遇到了一个\
  \ `Access Denied` 错误：\n\n`realm permit -all`\n\n**注意：** 你可以使用 `realm permit` 仅允许特定的\
  \ AD 用户登录，而不是所有用户。\n\n## 权限与访问\n\n我已经向你们展示了如何使用 SQL Server 身份验证和 Active Directory\
  \ 身份验证来创建登录名和用户，以访问 SQL Server 实例和数据库。这代表了登录 SQL Server 和连接到数据库的基本功能。但是，对于数据库内部的所有内容（比如表）的访问呢？对于运行适用于\
  \ SQL Server、数据库和对象（称为 *安全对象*）的各种 T-SQL 命令的访问呢？SQL Server 提供了一个系统，可以直接向登录名、用户以及称为角色的概念授予和撤销对安全对象的访问权限。\n\
  \n与许多系统一样，SQL Server 有一个从 `sa` 账户开始的权限层次结构（还记得你在安装时指定了 `sa` 账户）。`sa` 账户（就像 Linux\
  \ 中的 `root`）在权限方面是 *至高无上的*。在安装 SQL Server 后，我将讨论一种技术，通过禁用 `sa` 账户来使你的 SQL Server\
  \ 更加安全（参见“角色和权限”部分）。\n\n如果你想深入了解 SQL Server 的所有安全对象选项，请查看这个 PDF 海报：[`aka.ms/sql-permissions-poster`](https://aka.ms/sql-permissions-poster)。\n\
  \n##### 授予和撤销访问权限\n\nT-SQL 提供了两个语句来授予和撤销对安全对象的访问权限：分别是 `GRANT` 和 `REVOKE`。所有可能的安全对象的完整列表可以在\
  \ T-SQL `GRANT` 语句的文档中找到：[`docs.microsoft.com/sql/t-sql/statements/grant-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/grant-transact-sql)。\n\
  \n默认情况下，登录名和用户会对某些安全对象拥有某种形式的基本访问权限。保护 SQL Server 及其所有安全对象的过程将是：\n\n• 确定特定的登录名和/或用户需要哪些安全对象和访问权限，并使用\
  \ `GRANT` 命令授予这些登录名和用户访问权限。\n\n• 确定你是否想要撤销某些登录名和/或用户对某些安全对象的访问权限。\n\n虽然你可以使用 `GRANT`\
  \ 命令向特定的登录名和/或用户授予对安全对象的访问权限，但更有效的方式可能是先向一个称为 *角色* 的概念授予访问权限，然后根据你的安全需求，再向特定的登录名和/或用户撤销访问权限。\n\
  \n此外，将对象分组到架构中并向架构授予访问权限，而不是向特定对象授予访问权限，可能会更高效。在前面的章节中，我在描述创建表和视图等对象的基础知识时，已经讨论过架构的概念。\n\
  \n##### 角色和权限\n\n角色提供了一种便捷的方法来向一组登录名或用户授予（或撤销）访问权限。例如，你可以创建一个角色，然后将登录名或用户添加到该角色中。接着，你可以向该角色授予权限，角色的所有成员都会继承这些权限。\n\
  \n如果你想使用像 `SQL Server Management Studio` 这样的工具，你需要以你的 AD 域用户身份登录，并使用 Windows 身份验证连接到你的\
  \ Linux 服务器。`SQL Operations Studio` 支持相同类型的身份验证（更多细节请阅读：[`docs.microsoft.com/sql/sql-operations-studio/enable-kerberos`](https://docs.microsoft.com/sql/sql-operations-studio/enable-kerberos)）。\n\
  \n一旦我完成了文档中的步骤并绕过了前面提到的问题，我就能够成功使用类似这样的命令：\n\n```bash\nsqlcmd -E\n```\n\n并且能够以 AD\
  \ 用户身份成功登录到 SQL Server 开始执行查询。\n\n\n# SQL Server 安全：权限与角色\n\n## 权限概述\n\n权限定义了在 SQL\
  \ Server 实例级别或数据库级别，针对给定登录名、用户或角色允许执行哪些操作。完整的权限列表可以在我们的文档中找到：`https://docs.microsoft.com/en-us/sql/relational-databases/security/permissions-database-engine`。\n\
  \n我将展示默认为内置角色定义的权限示例，然后讨论如何根据您的安全需求更改权限。权限也按层次结构组织。我们的文档提供了一个很好的可视化图表来查看此层次结构：`https://docs.microsoft.com/sql/relational-databases/security/permissions-hierarchy-database-engine`。\n\
  \n###### 服务器角色\n\nSQL Server 提供了一组角色，这些角色拥有适用于 SQL Server 实例中登录名的操作权限。您可以在我们的文档中看到这些角色的列表：`https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles`。\n\
  \n以下是几个值得注意的服务器角色：\n\n### `sysadmin`\n该角色的成员登录名可以对 SQL Server 执行任何操作。因此，尽量减少属于此角色的登录名至关重要。默认情况下，`sa`\
  \ 登录名是此角色的成员。但是，作为 `sa` 登录名，您可以创建一个新的登录名，将其添加到 `sysadmin` 角色，然后禁用 `sa` 登录名。这可以提供额外的安全层，防止不怀好意的用户尝试猜测\
  \ `sa` 密码。您可以使用 `ALTER SERVER ROLE` T-SQL 命令（文档见：`https://docs.microsoft.com/sql/t-sql/statements/alter-server-role-transact-sql`）将登录名添加到服务器角色。\n\
  \n### `dbcreator`\n该角色的成员拥有创建、更改和删除数据库的权限。虽然可以分配登录名权限以创建自己的数据库（他们现在会自动成为该数据库的所有者），但此角色的问题在于成员拥有更改或删除任何数据库的权限，而不仅限于他们拥有的数据库。另一种允许登录名拥有自己数据库的技术是：以\
  \ `sysadmin` 角色成员的身份创建数据库，然后将新登录名分配为数据库所有者。我将在下一节“数据库角色”中演示如何操作。\n\n`sysadmin` 和\
  \ `dbcreator` 是 *固定* 服务器角色的例子。这意味着这些角色的权限无法更改。文档 `https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles#permissions-of-fixed-server-roles`\
  \ 中的图表展示了固定服务器角色的权限。\n\n### `public`\n这是为 SQL Server 创建的任何新登录名的默认角色。\n\n\n# 第 7\
  \ 章 SQL Server 中的安全机制\n\n服务器。公共服务器角色不是固定的，因此该角色的权限可以更改。默认情况下，public 角色拥有`CONNECT`权限，这意味着任何登录名都有权连接到\
  \ SQL Server；以及`VIEW ANY DATABASE`权限，这意味着任何登录名都有权查看 SQL Server 实例上存在哪些数据库。你可以使用\
  \ T-SQL 命令`GRANT`为公共服务器角色添加新权限，或使用`REVOKE`撤销任何默认权限。\n\n你的策略可以有所不同，但从服务器角度来看，创建登录名和用户的过程可以如下所示：\n\
  \n1.  使用`CREATE LOGIN`为你的 SQL Server 创建必要的登录名。\n2.  根据你决定它们应能执行的服务器访问类型和操作，将特定登录名分配给服务器角色。我建议将其中一个登录名添加到`sysadmin`角色中，这样你就不会依赖`sa`登录名来执行所有`sysadmin`选项。\n\
  3.  将所有其他用户保留为公共服务器角色的默认权限。\n4.  从`sysadmin`角色成员创建你的数据库。\n\n**注意** 我的示例展示了使用`sqllinux`登录名作为`dbcreator`角色的一部分，因为创建数据库的登录名默认成为数据库所有者。然而，正如我指出的，任何拥有`dbcreator`角色的人都有权影响其他数据库。如果你希望一个登录名创建并拥有所有数据库，那么使用此技术是可以的。如果你有单独的数据库所有者，则不希望使用此技术。\n\
  \n5.  使用`ALTER AUTHORIZATION` T-SQL 命令使你指定的登录名成为数据库所有者。我将在下一节“数据库角色”中进一步讨论这一点。\n\
  \n`ALTER AUTHORIZATION`是更改 SQL Server 中安全对象所有者的一种方法。你可以在[`docs.microsoft.com/sql/t-sql/statements/alter-authorization-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/alter-authorization-transact-sql)阅读有关如何使用此语句的更多信息。\n\
  \n6.  数据库所有者现在有权将其他登录名添加到数据库，将他们分配到特定角色，并根据他们的需要授予特定权限。\n\n也可以创建你自己的服务器角色并向其分配成员和权限。你可以使用\
  \ T-SQL `CREATE SERVER ROLE`命令来创建你自己的服务器角色。\n\n###### 数据库角色\n\n就像服务器角色一样，每个数据库都有内置角色，这些角色定义了在数据库中执行必要操作的某些权限。\n\
  \n正如我在上一节提到的，每个数据库中最重要的角色之一是`db_owner`，用户`dbo`被分配为该角色的成员。固定数据库角色及其权限的列表列在我们的文档中：[`docs.microsoft.com/sql/relational-databases/security/authentication-access/database-level-roles`](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/database-level-roles)。这些角色的存在是为了方便你管理数据库。例如，数据库角色`db_datareader`赋予任何成员读取数据库中所有用户表数据的权限。许多客户会选择将特定架构的特定权限授予特定用户。\n\
  \n另一种方法是为特定的安全需求创建你自己的数据库角色，将用户分配给那个新的数据库角色，然后将特定架构的特定权限分配给该数据库角色。在下一节中你会看到，创建你自己的数据库角色的另一个优势是可以将它们应用于行级安全性和动态数据掩码。\n\
  \n与服务器角色 public 类似，每个数据库也有一个 public 角色。在数据库中创建的每个用户自动成为 public 数据库角色的成员。并且默认情况下，\n\
  \n\n# 第 7 章 SQL Server 中的安全性\n\n默认用户的权限是查看数据库中大多数系统目录视图，但这基本上就是全部了。\n\n让我们通过一个使用\
  \ `WideWorldImporters` 数据库的例子来操作（我建议你先按照我在前面章节提供的说明，从头开始还原 `WideWorldImporters`\
  \ 完整数据库）。\n\n## 1. 将登录名 `sqllinux` 添加为数据库所有者\n\n让我们添加登录名 `sqllinux`，并使用 `ALTER AUTHORIZATION`\
  \ T-SQL 命令使其成为该数据库的所有者。\n\n以 `sa` 身份连接，使用示例脚本 `createdbownerlogin.sql`，如下所示 T-SQL\
  \ 语句：\n\n```sql\nUSE master\nGO\nIF EXISTS (select * from sys.server_principals\
  \ where name = 'sqllinux')\nDROP LOGIN [sqllinux]\nGO\nCREATE LOGIN [sqllinux] WITH\
  \ PASSWORD=N'Sql2017isfast', DEFAULT_DATABASE=[master]\nGO\nALTER AUTHORIZATION\
  \ ON DATABASE::WideWorldImporters to sqllinux\nGO\n```\n\n## 2. 创建 `appuser` 服务器登录名\n\
  \n以 `sa` 身份连接，使用 `createappuserlogin.sql` 为 `appuser` 登录名创建另一个服务器登录名，如下所示 T-SQL\
  \ 语句：\n\n```sql\nUSE [MASTER]\nGO\nUSE master\nGO\nIF EXISTS (select * from sys.server_principals\
  \ where name = 'appuser')\nDROP LOGIN [appuser]\nGO\nCREATE LOGIN [appuser] WITH\
  \ PASSWORD=N'Sql2017isfast', DEFAULT_DATABASE=[WideWorldImporters]\nGO\n```\n\n\
  ## 3. 创建 `appuser` 数据库用户\n\n以 `sqllinux` 登录名身份连接，使用 `createappuser.sql` 创建将绑定到 `appuser`\
  \ 服务器登录名的 `appuser` 用户，如下所示 T-SQL 语句：\n\n```sql\nUSE [WideWorldImporters]\nGO\n\
  DROP USER IF EXISTS appuser\nGO\nCREATE USER appuser FOR LOGIN appuser\nGO\n```\n\
  \n## 4. 创建数据库角色并分配权限\n\n以 `sqllinux` 登录名身份连接，使用 `createdbrole.sql` 创建数据库角色，将 `appuser`\
  \ 数据库用户添加到其中，并为其分配对 Application 架构的 `CONTROL` 权限，如下所示 T-SQL 语句：\n\n```sql\nUSE [WideWorldImporters]\n\
  GO\nIF (SELECT IS_ROLEMEMBER('Application_Users', 'appuser')) IS NOT NULL\nALTER\
  \ ROLE Application_Users DROP MEMBER appuser\nGO\nDROP ROLE IF EXISTS Application_Users\n\
  GO\nCREATE ROLE Application_Users\nGO\nALTER ROLE Application_Users ADD MEMBER appuser\n\
  GO\nGRANT CONTROL ON SCHEMA::Application TO Application_Users\nGO\n```\n\n请注意我在这里使用了带有\
  \ `CONTROL` 选项的 `GRANT` T-SQL 语句。`GRANT` 允许你向包括架构在内的对象授予权限。在此情况下，`GRANT CONTROL`\
  \ 将 `WideWorldImporters` 数据库中 `Application` 架构的所有权授予了 `Application_Users` 角色的任何成员。你可以在文档中阅读更多关于\
  \ `GRANT CONTROL` 的信息：[`docs.microsoft.com/sql/t-sql/statements/grant-database-principal-permissions-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/grant-database-principal-permissions-transact-sql)。\n\
  \n## 5. 测试权限\n\n要查看这些权限如何工作，以 `appuser` 登录名身份连接，执行 `appuserquery.sql` 中的查询，如下所示\
  \ T-SQL 语句：\n\n```sql\nuse [WideWorldImporters]\ngo\nSELECT * from [Application].People\n\
  GO\nSELECT * from [Sales].[Customers]\nGO\n```\n\n![图 7-6](img/index-356_1.jpg)\n\
  \n**图 7-6. `appuser` 登录名有权访问的架构和对象**\n\n你可以看到 `appuser` 有权访问 `Application` 架构中的一个表，但当尝试访问其未被授予权限的架构中的表时，则会出错。\n\
  \n除了针对表等对象的架构和/或用户的基本权限外，你还可以为表和/或视图中的特定列集分配有关权限。有关 `GRANT` T-SQL 语句语法的更多信息，请参阅文档：[`docs.microsoft.com/sql/t-sql/statements/grant-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/grant-transact-sql)。\n\
  \n###### 应用程序角色\n\n一个可能对开发人员有吸引力的有趣安全功能是应用程序角色。应用程序角色允许应用程序使用仅应用程序知道的密码，并设置特定于应用程序的权限，这些权限独立于从应用程序连接时使用的登录名。\n\
  \n\n# 第 7 章 SQL Server 中的安全性\n\n你可以在[`docs.microsoft.com/sql/relational-databases/security/authentication-access/application-roles`](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/application-roles)阅读更多关于应用程序角色的信息。\n\
  \n###### 其他权限\n\n我只向你展示了在表上授予和撤销权限的基础操作。SQL Server 允许你对广泛的对象和特定的 T-SQL 语句分配权限。在某些情况下，这些权限仅在使用\
  \ SQL Server 的特定功能时才适用。例如，只有启用了可用性组功能，你才能为可用性组的各个方面分配权限。有关可能的权限示例完整列表，请参阅我们的文档：[`docs.microsoft.com/sql/t-sql/statements/grant-transact-sql#examples`](https://docs.microsoft.com/sql/t-sql/statements/grant-transact-sql#examples)。\n\
  \n**提示** 想在不以用户身份实际登录的情况下，测试已创建用户的权限？请查阅我们文档中的 `execute as` T-SQL 语句：[`docs.microsoft.com/sql/t-sql/statements/execute-as-clause-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/execute-as-clause-transact-sql)。\n\
  \n##### 行级安全\n\nSQL Server 2016 引入了一个备受期待的功能：行级安全（RLS）。你不再局限于只能对跨表所有行的对象或语句分配权限，现在你可以为特定的数据行分配权限。实际上，之前你可以通过视图来实现这一点，但现在你可以直接将权限分配给表中的一组行。此外，RLS\
  \ 提供了额外的功能，可以在操作执行前或执行后进行阻止。\n\n理解 RLS 的最佳方式是看到它的实际应用。我在 GitHub 上找到了一个来自我们团队关于 RLS\
  \ 的优秀示例，使用了 `WideWorldImporters` 数据库，位于：[`github.com/Microsoft/sql-server-samples/tree/master/samples/databases/wide-world-importers/sample-scripts/row-level-security`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/databases/wide-world-importers/sample-scripts/row-level-security)。我做了一些修改，你可以在\
  \ `rls.sql` 文件中找到。这个示例将基于客户的销售区域数据为用户设置行级安全。其概念是，只有属于特定销售区域的应用程序用户才能看到其区域的销售数据，而不能看到其他区域的销售数据。数据库所有者应能看到所有数据。\n\
  \n让我逐步讲解此脚本中的 T-SQL 语句并解释其工作原理（为简便起见，运行此脚本时请以 `sa` 身份连接）：\n\n1.  为此 RLS 示例创建登录名：\n\
  \n```sql\nUSE master\nGO\nIF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE\
  \ name = N'GreatLakesUser')\nBEGIN\n    CREATE LOGIN GreatLakesUser\n    WITH PASSWORD\
  \ = N'SQLRocks!00',\n    CHECK_POLICY = OFF,\n    CHECK_EXPIRATION = OFF,\n    DEFAULT_DATABASE\
  \ = WideWorldImporters;\nEND\nGO\n```\n\n2.  创建映射到你刚创建的登录名的用户，并将此用户添加到 `WideWorldImporters`\
  \ 中已定义的某个角色：\n\n```sql\nUSE WideWorldImporters;\nGO\nDROP USER IF EXISTS GreatLakesUser\n\
  GO\nCREATE USER GreatLakesUser FOR LOGIN GreatLakesUser\nGO\nALTER ROLE [Great Lakes\
  \ Sales] ADD MEMBER GreatLakesUser\nGO\n```\n\n`WideWorldImporters` 内置了将映射到销售区域的数据库角色。\n\
  \n\n# 第 7 章 SQL Server 中的安全\n\n## 3. 实现行级安全\n\n要应用行级安全，你需要创建一个 SQL Server `函数`，该函数将用于应用到任何查询中，以确定用户可以访问哪些行。然后，你需要创建一个安全策略，映射到你已创建的函数。\n\
  \n```sql\n-- 如果存在则删除安全策略和函数\nDROP SECURITY POLICY IF EXISTS [Application].FilterCustomersBySalesTerritoryRole\n\
  GO\nDROP FUNCTION IF EXISTS [Application].DetermineCustomerAccess\nGO\n\n-- 创建用于行级安全的函数\n\
  CREATE FUNCTION [Application].DetermineCustomerAccess(@CityID int)\nRETURNS TABLE\n\
  WITH SCHEMABINDING\nAS\nRETURN (SELECT 1 AS AccessResult\n    WHERE IS_ROLEMEMBER(N'db_owner')\
  \ <> 0\n    OR IS_ROLEMEMBER((SELECT sp.SalesTerritory\n                      FROM\
  \ [Application].Cities AS c\n                      INNER JOIN [Application].StateProvinces\
  \ AS sp\n                      ON c.StateProvinceID = sp.StateProvinceID\n     \
  \                 WHERE c.CityID = @CityID) + N' Sales') <> 0\n)\nGO\n\n-- 已应用的安全策略如下：\n\
  CREATE SECURITY POLICY [Application].FilterCustomersBySalesTerritoryRole\nADD FILTER\
  \ PREDICATE [Application].DetermineCustomerAccess(DeliveryCityID)\nON Sales.Customers\n\
  GO\n```\n\n让我解释一下这个函数是如何工作的。该函数接收一个 `CityID` 值，并从 `Cities` 和 `StateProvinces` 表中查找该城市所属的\
  \ `SalesTerritory` 名称。函数将字符串 ‘Sales’ 连接到该名称的末尾。因此，任何位于 GreatLakes 地区的 `CityID` 都将返回\
  \ GreatLakesSales。当用户尝试查询 `[Sales].[Customers]` 表时，安全策略会从 `[Sales].[Customers]`\
  \ 表中获取 `DeliveryCityID` 值。这意味着，如果我以 `GreatLakesUser` 的身份登录（该用户是 `GreatLakesSales`\
  \ 角色的成员），则只有 `Customers` 表中 `DeliveryCityID` 映射到 GreatLakes 地区的行才会返回给该用户。\n\n##\
  \ 4. 验证行级安全效果\n\n仍然以 `sa`（数据库所有者）身份连接，查看 `[Sales].[Customers]` 表中有多少行并记录该数量：\n\n\
  ```sql\nSELECT COUNT(*) FROM Sales.Customers; -- 并记录数量\nGO\n```\n\n当我运行此查询时，我得到了\
  \ 663 行。\n\n## 5. 测试用户权限\n\n现在向 `GreatLakesSales` 角色授予查询 `[Sales].[Customers]` 表的权限，然后`模拟`用户\
  \ `GreatLakesUser`，并查看表中有多少行：\n\n```sql\nGRANT SELECT, UPDATE ON Sales.Customers\
  \ TO [Great Lakes Sales];\nGO\n\n-- 模拟用户 GreatLakesUser\nEXECUTE AS USER = 'GreatLakesUser'\n\
  GO\n\n-- 现在记录数量以及返回了哪些行\n-- 即使我们没有更改命令\nSELECT COUNT(*) FROM Sales.Customers;\n\
  GO\n```\n\n当我这次运行查询时，我只看到 77 行。其他行属于其他销售区域，这就是为什么 `GreatLakesSales` 角色成员甚至看不到它们存在的原因。\n\
  \n## 6. 撤销模拟\n\n要撤销模拟，请在 `rls.sql` 脚本中使用以下 T-SQL 语句：\n\n```sql\n-- 切换回登录用户\nREVERT\n\
  GO\n```\n\n行级安全是 SQL Server 安全功能套件中的一项重要特性，完全由独立于应用程序的 T-SQL 语句管理。请在我们的文档 `https://docs.microsoft.com/sql/relational-databases/security/row-level-security`\
  \ 中了解更多关于行级安全及其工作原理的详细信息。\n\n##### 动态数据屏蔽\n\n动态数据屏蔽是另一项出色的安全特性，从 SQL Server 2016\
  \ 开始引入，在 Windows 和 Linux 上的 SQL Server 中工作方式相同。这是另一项不需要任何应用程序更改或逻辑的伟大安全特性。\n\n动态数据屏蔽背后的概念是提供\
  \ T-SQL 命令，允许你为敏感数据提供屏蔽规则，并控制特定用户查看未屏蔽敏感数据的能力。该特性之所以是 `动态` 的，是因为你可以通过\n\n\n## 第\
  \ 7 章 SQL Server 中的安全\n\nT-SQL 和应用查询将看到不同的结果，无需任何更改。\n\n另一个例子是了解其工作原理的好方法。同样，我可以借用并修改\
  \ Microsoft WideWorldImporters 示例脚本中的示例，该脚本位于 [`github.com/Microsoft/sql-server-samples/tree/master/samples/databases/wide-world-importers/sample-scripts/dynamic-data-masking`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/databases/wide-world-importers/sample-scripts/dynamic-data-masking)。\n\
  \n**注意**：如果你已运行前面的行级安全示例，或者你没有做那些示例，这个示例都能正常工作。它确实假设你已经按照我在本书其他示例中展示的那样，恢复了 `WideWorldImporters`\
  \ 完整示例数据库。\n\n我已获取上面的 GitHub 示例，对其进行了修改，并将其放入示例脚本 `ddm.sql` 中。其概念是，*特权*用户（如 `dbo`）可以查看\
  \ `[Purchasing].[Suppliers]` 中的敏感数据，如银行账户信息，但非特权用户将无法看到这些敏感数据。特权用户通常拥有访问数据库（或服务器）中几乎所有内容的权限，而非特权用户通常只有其工作或任务所需的特定权限。\n\
  \n使用我在示例中提供的已生成脚本 `wwi.sql`，你可以看到 `[Purchasing].[Suppliers]` 的定义以及屏蔽是如何定义的：\n\n\
  ```sql\nCREATE TABLE [Purchasing].Suppliers NOT NULL,\n    [SupplierCategoryID]\
  \ [int] NOT NULL,\n    [PrimaryContactPersonID] [int] NOT NULL,\n    [AlternateContactPersonID]\
  \ [int] NOT NULL,\n    [DeliveryMethodID] [int] NULL,\n    [DeliveryCityID] [int]\
  \ NOT NULL,\n    [PostalCityID] [int] NOT NULL,\n    [SupplierReference] nvarchar\
  \ NULL,\n    [BankAccountName] nvarchar MASKED WITH (FUNCTION = 'default()') NULL,\n\
  \    [BankAccountBranch] nvarchar MASKED WITH (FUNCTION = 'default()') NULL,\n \
  \   [BankAccountCode] nvarchar MASKED WITH (FUNCTION = 'default()') NULL,\n    [BankAccountNumber]\
  \ nvarchar MASKED WITH (FUNCTION = 'default()') NULL,\n    [BankInternationalCode]\
  \ nvarchar MASKED WITH (FUNCTION = 'default()') NULL,\n    [PaymentDays] [int] NOT\
  \ NULL,\n    [InternalComments] nvarchar NULL,\n    [PhoneNumber] nvarchar NOT NULL,\n\
  \    [FaxNumber] nvarchar NOT NULL,\n    [WebsiteURL] nvarchar NOT NULL,\n    [DeliveryAddressLine1]\
  \ nvarchar NOT NULL,\n    [DeliveryAddressLine2] nvarchar NULL,\n    [DeliveryPostalCode]\
  \ nvarchar NOT NULL,\n    [DeliveryLocation] [geography] NULL,\n    [PostalAddressLine1]\
  \ nvarchar NOT NULL,\n    [PostalAddressLine2] nvarchar NULL,\n    [PostalPostalCode]\
  \ nvarchar NOT NULL,\n    [LastEditedBy] [int] NOT NULL,\n    [ValidFrom] datetime2\
  \ GENERATED ALWAYS AS ROW START NOT NULL,\n    [ValidTo] datetime2 GENERATED ALWAYS\
  \ AS ROW END NOT NULL,\n    CONSTRAINT [PK_Purchasing_Suppliers] PRIMARY KEY CLUSTERED\n\
  \    (\n        [SupplierID] ASC\n    )WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE\
  \ = OFF, IGNORE_DUP_KEY = OFF,\n    ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON)\
  \ ON [USERDATA],\n    CONSTRAINT [UQ_Purchasing_Suppliers_SupplierName] UNIQUE NONCLUSTERED\n\
  \    (\n        [SupplierName] ASC\n    )WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE\
  \ = OFF, IGNORE_DUP_KEY = OFF,\n    ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON)\
  \ ON [USERDATA],\n    PERIOD FOR SYSTEM_TIME ([ValidFrom], [ValidTo])\n) ON [USERDATA]\
  \ TEXTIMAGE_ON [USERDATA]\nWITH\n(\n    SYSTEM_VERSIONING = ON ( HISTORY_TABLE =\
  \ [Purchasing].[Suppliers_Archive] )\n)\nGO\n```\n\n注意在涉及银行数据的一些列上使用的这种语法：\n\n```sql\n\
  [BankAccountName] nvarchar MASKED WITH (FUNCTION = 'default()') NULL,\n```\n\n`MASKED\
  \ WITH` 语法是用于定义数据屏蔽的 T-SQL 扩展。在 `WITH` 子句后的 `(FUNCTION = )` 中可以定义的屏蔽包括\n\n\n# 第\
  \ 7 章：SQL Server 中的安全\n\n##### 动态数据屏蔽\n\n屏蔽的 `type`。`FUNCTION` 之后的语法定义了屏蔽的类型。默认屏蔽规则根据列的类型来屏蔽特定字符。例如，字符列用字符\
  \ `'X'` 屏蔽，整数则用 `0` 屏蔽。\n\n您可以在我们的文档中查看屏蔽类型的列表：[`docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking#defining-a-dynamic-data-mask`](https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking#defining-a-dynamic-data-mask)（其中包含了定义您自己的自定义屏蔽的能力）。\n\
  \n让我们通过一个示例来实际操作一下，使用 `ddm.sql` 脚本中的一些语句（以下所有步骤请以 `sa` 身份连接）：\n\n1.  以 `sa` 身份连接并创建一个新的登录名。\n\
  \n```sql\n-- 演示动态数据屏蔽\n--\n--  确保使用特权用户（如数据库所有者或系统管理员）连接\nIF NOT EXISTS (SELECT\
  \ 1 FROM sys.server_principals WHERE name\n    = N'GreatLakesUser')\nBEGIN\n   \
  \ CREATE LOGIN GreatLakesUser\n        WITH PASSWORD = N'SQLRocks!00',\n       \
  \ CHECK_POLICY = OFF,\n        CHECK_EXPIRATION = OFF,\n        DEFAULT_DATABASE\
  \ = WideWorldImporters;\nEND\nGO\n```\n\n2.  创建一个用户映射到该登录名，将其添加到数据库中已定义的一个角色，并授予该角色读取权限。\n\
  \n```sql\nUSE WideWorldImporters\nGO\n\nDROP USER IF EXISTS GreatLakesUser\nGO\n\
  \nCREATE USER GreatLakesUser FOR LOGIN GreatLakesUser\nGO\n\nALTER ROLE [Great Lakes\
  \ Sales] ADD MEMBER GreatLakesUser\nGO\n\n-- 授予角色 SELECT 权限\nGRANT SELECT ON Purchasing.Suppliers\
  \ TO [Great Lakes Sales];\nGO\n```\n\n![SQL Operations Studio 截图。](img/index-365_1.jpg)\n\
  \n3.  尝试从 `[Purchasing].[Suppliers]` 表中读取数据。\n\n```sql\n-- 使用当前 UNMASK 权限进行选择（注意行数和数据值），假设您以特权用户身份连接\n\
  SELECT SupplierID, SupplierName, BankAccountName,\n    BankAccountBranch, BankAccountCode,\
  \ BankAccountNumber FROM\n    Purchasing.Suppliers\n```\n\n您将看到所有列的全部数据。\n\n4. \
  \ 模拟 `GreatLakesUser` 用户并再次运行查询。\n\n```sql\n-- 模拟用户 GreatLakesUser\nEXECUTE AS USER\
  \ = 'GreatLakesUser'\nGO\n\n-- 使用模拟的 MASKED 权限进行选择（注意行数和数据值）\nSELECT SupplierID,\
  \ SupplierName, BankAccountName,\n    BankAccountBranch, BankAccountCode, BankAccountNumber\
  \ FROM\n    Purchasing.Suppliers\nGO\n```\n\n现在的结果中，某些列的数据已被屏蔽，尽管您仍然可以看到所有行。图 7-7\
  \ 显示了 SQL Operations Studio 中的结果。\n\n**图 7-7.** Linux 上 SQL Server 的动态数据屏蔽\n\n在我们的文档中了解更多关于动态数据屏蔽的信息：[`docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking`](https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking)。\n\
  \n#### SQL Server 与加密\n\n数据加密对于任何安全方案都可能很重要。然而，并非所有使用 SQL Server 的应用程序都需要使用加密。使用\
  \ SQL Server 的任何加密功能都会产生一些开销（例如额外的 CPU 使用率），因此必须在您的整体安全计划中加以考虑。\n\nSQL Server 支持多项功能，使客户能够保护*静态数据*、*传输中的数据*和*连接*的安全。静态数据是指存储在文件和备份中的\
  \ SQL Server 数据。您希望确保数据被加密，以便攻击者无法在 SQL Server 进程之外读取数据（例如，如果有人偷走了装有 SQL Server\
  \ 数据库文件的硬盘）。此外，一些应用程序希望能够确保从 SQL Server 客户端应用程序到 SQL Server 再返回的所有数据都是端到端加密的。\n\n\
  \n# 第 7 章 SQL Server 的安全性\n\n## 实现加密的架构\n\nWindows 上的 SQL Server 依赖 Crypto API，通过诸如\
  \ `BCryptEncrypt` 之类的例程（更多信息请参见 [`docs.microsoft.com/windows/desktop/api/bcrypt/nf-bcrypt-bcryptencrypt`](https://docs.microsoft.com/windows/desktop/api/bcrypt/nf-bcrypt-bcryptencrypt)）来加密和解密数据。如果你还记得第\
  \ 1 章中关于 SQLPAL 架构的细节，需要 Linux 内核支持的 API 调用将会经过 Host Extension。我与 SQL Server on\
  \ Linux 的安全工程负责人 Mitchell Sternke 进行了交流，以了解我们是如何在 Linux 上支持加密的。为了支持加密 API，我们在 Linux\
  \ 上使用 OpenSSL 库集（更多信息请参见 [`www.openssl.org`](https://www.openssl.org)）。正如 Mitchell\
  \ 所描述的，该架构的一个小变化是，我们为 Windows 上的 SQL Server 2017 部署了一个特殊的 DLL（名为 `secforwarder.dll`），它在\
  \ Windows 上运行时会直接调用 Windows Crypto API 支持。但在运行于 Linux 的 SQLPAL 上，Crypto API 调用会被转发到\
  \ Host Extension，由其调用任何必要的 OpenSSL 例程。我们使用 OpenSSL 来满足所有类型的安全需求，包括支持 TLS（甚至支持 Kerberos）。\n\
  \n## SQL Server 密钥与证书\n\n当使用 SQL Server 技术在 SQL Server 上加密数据时，你需要熟悉以下对象，它们都是使用 `T-SQL`\
  \ 创建的：\n\n### 服务主密钥\n\n`SQL 加密`具有一个层级结构，一切都始于 `服务主密钥`。`服务主密钥`由 `SQL Server` 在安装时自动生成。所有其他密钥和数据的加密都将依赖于该密钥的存在。因此，如果你打算使用\
  \ `SQL Server 加密`，你绝对需要做的第一件事就是将此密钥备份到一个安全的位置。为什么？因为这是加密层级结构的顶端；如果此密钥丢失（例如，安装 `SQL\
  \ Server` 的硬盘损坏），你将无法解密任何已加密的数据。哎呀！此外，备份时你会使用一个密码。你需要保护好这个密码，因为你将需要它来恢复密钥备份。你可以在\
  \ [`docs.microsoft.com/sql/relational-databases/security/encryption/service-master-key`](https://docs.microsoft.com/sql/relational-databases/security/encryption/service-master-key)\
  \ 阅读更多关于如何操作以及 `服务主密钥` 的信息。`服务主密钥`将用于加密其他密钥，例如 `数据库主密钥`和链接服务器密码。\n\n**请注意**，加密连接和一项称为\
  \ `Always Encrypted` 的功能不依赖于此层级结构。\n\n### 数据库主密钥\n\n这是一个受 `服务主密钥` 保护的密钥，用于保护数据库中的证书和其他对象。要使用如\
  \ `透明数据加密` 和 `加密备份` 等功能，你需要在 `master 数据库` 中创建一个 `数据库主密钥`。要加密列数据（非 `Always Encrypted`\
  \ 列），你将在 `用户数据库` 中创建一个 `数据库主密钥`。你可以在 [`docs.microsoft.com/sql/t-sql/statements/create-master-key-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-master-key-transact-sql)\
  \ 阅读更多关于 `数据库主密钥` 的信息。就像 `服务器主密钥` 一样，一旦创建了 `数据库主密钥`，你应该立即备份它。请参阅我们的文档了解如何操作：[`docs.microsoft.com/sql/relational-databases/security/encryption/back-up-a-database-master-key`](https://docs.microsoft.com/sql/relational-databases/security/encryption/back-up-a-database-master-key)。\n\
  \n\n\n[security/encryption/back-up-a-database-master-key](https://docs.microsoft.com/sql/relational-databases/security/encryption/back-up-a-database-master-key)\n\
  \n## SQL Server 证书\n\n加密层次结构的第三层是证书。证书将由数据库主密钥保护，并用于加密其他对象，如数据库加密密钥（用于 TDE）、备份以及其他用于加密列的密钥。您可以使用\
  \ SQL Server 创建自签名证书，或从受信任的机构加载证书。与我讨论过的其他对象一样，您应该备份所有创建的证书，因为您可能需要执行诸如还原加密备份之类的操作。您可以在\
  \ [CREATE CERTIFICATE (Transact-SQL)](https://docs.microsoft.com/sql/t-sql/statements/create-certificate-transact-sql)\
  \ 阅读更多关于 SQL Server 证书的信息。\n\n> **注意**\n> SQL Server on Linux 目前不支持可扩展密钥管理 (eKM)。请务必关注\
  \ [SQL Server on Linux release notes - Unsupported features](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes#Unsupported)\
  \ 的发布说明，以获取有关不支持功能的任何更新。\n\n掌握了这些基础知识后，让我们来看看 SQL Server on Linux 可用的一些加密功能。\n\n\
  ##### 透明数据加密\n\n`TDE` 是 SQL Server 的一项功能，数据和事务日志文件在写入磁盘时会被加密。用于加密和解密这些文件的加密密钥（一个\
  \ `数据库加密密钥`）保存在 master 数据库中。这使得数据库引擎能够完全访问磁盘上的加密数据，但引擎之外的任何程序或用户都将无法访问未加密的数据。\n\n\
  ### 第 7 章 SQL Server 中的安全性\n\n这个功能真正出色的地方在于，所有关于证书和加密的功能都内置于 SQL Server 中。以下是使用\
  \ `TDE` 的基本步骤：\n\n1.  使用 `T-SQL` 在 master 数据库中创建一个数据库主密钥。\n2.  使用 `T-SQL` 创建一个受数据库主密钥保护的证书。\n\
  3.  使用 `T-SQL` 为您要使用 `TDE` 的数据库创建一个受该证书保护的 `数据库加密密钥`。`数据库加密密钥` 是一种仅用于 `TDE` 的特殊密钥。您可以在\
  \ [CREATE DATABASE ENCRYPTION KEY (Transact-SQL)](https://docs.microsoft.com/sql/t-sql/statements/create-database-encryption-key-transact-sql)\
  \ 阅读更多关于数据库加密密钥使用的信息。\n4.  使用 `ALTER DATABASE` 为数据库启用 `TDE`。\n\n然后，SQL Server 将在后台开始加密数据并写入磁盘。后续对磁盘的新写入在写入时即被加密。使用此功能的一个关键点是，您应该备份证书和密钥。如果您需要在另一台服务器上附加此数据库或还原备份，将需要这些内容。对于启用了\
  \ `TDE` 的数据库，其任何备份也都是加密的。\n\n您可以在 [Enable Transparent Data Encryption](https://docs.microsoft.com/sql/linux/sql-server-linux-security-get-started#enable-transparent-data-encryption)\
  \ 阅读更多关于在 SQL Server on Linux 上设置 `TDE` 的信息。您也可以在 [Transparent Data Encryption (TDE)](https://docs.microsoft.com/sql/relational-databases/security/encryption/transparent-data-encryption)\
  \ 了解更多关于 `TDE` 的通用信息。\n\n\n\n[`docs.microsoft.com/sql/relational-databases/security/encryption/`](https://docs.microsoft.com/sql/relational-databases/security/encryption/transparent-data-encryption)\n\
  \n[透明数据加密。](https://docs.microsoft.com/sql/relational-databases/security/encryption/transparent-data-encryption)\n\
  \n# 第 7 章  SQL Server 中的安全性\n\n##### 加密数据库备份\n\n如果你没有对数据库使用 `TDE`，你仍然可以加密你的数据库备份。这个过程与\
  \ `TDE` 大体相同。你需要创建一个数据库主密钥（或使用一个你已创建的），创建一个证书，然后使用 T-SQL 的 `BACKUP` 命令并指定你创建的证书。与\
  \ `TDE` 类似，我们建议你备份数据库主密钥和证书，因为你将需要它们来还原备份。\n\n在 Linux 上为 SQL Server 加密数据库备份的示例和步骤可以在以下网址找到：[`docs.microsoft.com/sql/linux/sql-server-linux-security-get-started#configure-backup-encryption`](https://docs.microsoft.com/sql/linux/sql-server-linux-security-get-started#configure-backup-encryption)。你可以在以下网址找到关于备份加密的完整文档：[`docs.microsoft.com/sql/relational-databases/backup-restore/backup-encryption`](https://docs.microsoft.com/sql/relational-databases/backup-restore/backup-encryption)。\n\
  \n![](img/index-370_1.jpg)\n\n##### 加密连接\n\nSQL Server 还支持加密通过网络连接在客户端和 SQL Server\
  \ 引擎之间传输的数据。Linux 上的 SQL Server 使用传输层安全性（TLS）来加密从 SQL Server 客户端应用程序或从服务器传输的任何数据。Linux\
  \ 上的 SQL Server 目前支持 TLS 1.2。你可以选择强制所有连接由 SQL Server 加密（*服务器发起*）或让特定客户端从其应用程序请求加密（*客户端发起*）。\n\
  \n用于加密连接的证书和对象与在 SQL Server 内部用于加密数据的密钥和服务主密钥（…）是独立的。与我到目前为止描述的其他加密和证书功能一样，SQL Server\
  \ 使用的加密和证书服务由 Linux 操作系统提供。\n\n为了配置 SQL Server 以支持加密连接，你将结合使用 `openssl` 程序（应已安装在你的\
  \ Linux 服务器上）和安装 SQL Server 时附带的 `mssql-conf` 配置脚本。\n\n如果你选择客户端发起的加密连接，微软提供的每个工具都有一个选项来选择加密连接。此外，应用程序可以在其连接字符串中添加\
  \ `Encrypt=True`。\n\n有时，在我们的工具中选择加密连接的选项可能有点隐蔽。图 7-8 显示了 SQL Operations Studio 的连接选项。\n\
  \n*图 7-8. SQL Operations Studio 的连接选项*\n\n![](img/index-371_1.jpg)\n\n如果你点击“高级”按钮，将会看到一个新界面，你可以在其中选择加密连接的选项，如图\
  \ 7-9 所示。\n\n*图 7-9. 选择加密 SQL Server 连接的选项*\n\nSQL Server 在文档中提供了使用 `openssl` 和\
  \ `mssql-conf` 配置 SQL Server 的步骤，以及如何配置需要加密的客户端机器的说明。你可以在以下网址进一步阅读如何设置客户端发起或服务器发起的加密：[`docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections`](https://docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections)。\n\
  \n\n\n# 第 7 章：SQL Server 中的安全性\n\n## 证书要求\n\n此外，此功能所使用的证书还有一些特定要求。有关证书要求，请参阅我们的文档：[`docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#requirements-for-certificates`](https://docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#requirements-for-certificates)。\n\
  \n请仔细阅读有关服务器发起加密（强制所有连接）的说明：[`docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#server-initiated-encryption`](https://docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#server-initiated-encryption)，以及客户端发起加密的说明：[`docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#client-initiated-encryption`](https://docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#client-initiated-encryption)。\n\
  \n如果您阅读这些说明，会发现步骤完全相同，只有这一步不同：\n\n```\nsudo /opt/mssql/bin/mssql-conf set network.forceencryption\
  \ 1\n```\n\n值为 1 用于强制所有连接都加密，而值为 0 则用于客户端发起加密的场景。\n\n我们的文档包含了一些您在使用加密连接时可能遇到的错误说明：[`docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#common-connection-errors`](https://docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#common-connection-errors)。图\
  \ 7-10 显示了当您尝试使用加密连接但尚未在 SQL Server 上设置加密时会遇到的错误示例。\n\n### 图 7-10. 未配置加密时连接到 SQL\
  \ Server 出现的错误\n\n我们文档中的一项指导说明是，您的客户端机器必须支持 TLS 1.2。老实说，我以前从未关心过我的客户端计算机是否支持 TLS\
  \ 1.2，所以我做了一些研究，找到了这个非常方便的网站来测试我的 TLS 版本：[`www.ssllabs.com/ssltest/viewMyClient.html`](https://www.ssllabs.com/ssltest/viewMyClient.html)。图\
  \ 7-11 显示了我在 Windows 笔记本电脑上的测试结果。\n\n### 图 7-11. 使用 ssllabs.com 网站检查客户端上的 TLS 支持\n\
  \n## Always Encrypted（始终加密）\n\n如果您将 SQL Server 连接加密与 TDE（透明数据加密）结合使用，您的数据从客户端到服务器都是加密的，并且存储在磁盘上的数据也是加密的。然而，仅靠这些解决方案存在两个问题：\n\
  \n*   数据在数据库页面的内存中未被加密。\n*   对加密密钥的控制权没有分离，因为 SQL Server 管理员控制着加密密钥和证书。\n\nSQL Server\
  \ 提供了一项功能来填补这些空白并提供端到端加密解决方案，称为 **Always Encrypted**。描述 Always Encrypted 的最好方式是通过图示。图\
  \ 7-12 展示了 Always Encrypted 的整体架构。\n\n### 图 7-12. Linux 上 SQL Server 中的 Always Encrypted\n\
  \n在此图的服务器端是您的数据库，其中包含您认为有必要加密的表中的列。\n\n设置 Always Encrypted 的过程是：首先创建一个 `列主密钥`，您需要从密钥存储提供程序提供该密钥的位置（从而实现密钥管理的分离）。然后为您想要加密的列创建\
  \ `列加密密钥`，并指定列主密钥。虽然 SQL Server 管理员将创建列加密密钥，但列主密钥是由管理独立于 SQL Server 的 `密钥存储` 的其他人提供的。因此，使用此方法读取加密数据的唯一方式是使用支持\
  \ Always Encrypted 且知道列主密钥位置的、包含 SQL Server 库的应用程序。这意味着即使是 SQL Server 管理员也无法解密您选择的列。SQL\
  \ Server 管理员需要设置数据库来加密某些列，但他们没有完全的控制权来解密数据。\n\n应用程序和列主密钥的所有者拥有解密的完全控制权。此外，被加密的列中的数据，在应用程序中、通过连接传输到\
  \ SQL Server 的过程中、以及在数据列中（无论是在内存中还是写入磁盘时）都是加密的。SQL Server 将存储元数据，例如加密的列加密密钥以及列主密钥的密钥存储位置。\n\
  \n支持 Always Encrypted 的 SQL Server 库示例包括：[`docs.microsoft.com/sql/connect/odbc/using-always-encrypted-with-the-odbc-driver`](https://docs.microsoft.com/sql/connect/odbc/using-always-encrypted-with-the-odbc-driver)\
  \ 和 [`docs.microsoft.com/sql/connect/php/using-always-encrypted-php-drivers`](https://docs.microsoft.com/sql/connect/php/using-always-encrypted-php-drivers)。\n\
  \n要完成配置 Always Encrypted 的过程，请按照 SQL Server Management Studio 向导中的文档步骤操作：[`docs.microsoft.com/en-us/azure/sql-database/sql-database-always-encrypted`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-always-encrypted)。\n\
  \n尽管这是提供透明、端到端加密列数据解决方案的非常优雅的方式，但对于在 Linux 上使用 SQL Server 此功能，还需要考虑一些因素：\n\n*  \
  \ 目前创建列加密密钥和指定列主密钥的唯一方法是使用在 Windows 上运行的工具，包括 SQL Server Management Studio 和 Powershell（注意：Powershell\
  \ 现在已支持 Linux，但目前没有其他原生支持 Linux 的方法）。SSMS 附带一个很棒的向导来引导您完成此过程：[`docs.microsoft.com/sql/relational-databases/security/encryption/configure-always-encrypted-using-sql-server-management-studio`](https://docs.microsoft.com/sql/relational-databases/security/encryption/configure-always-encrypted-using-sql-server-management-studio)。\n\
  *   根据您配置 Always Encrypted 的方式，您在执行针对已加密列的查询时（特别是当您搜索某个值或值范围时）可能会受到一些限制。有关此类限制的详细信息，请参阅我们的文档：[`docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine#feature-details`](https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine#feature-details)。\n\
  \n\n\n# 第七章：SQL Server 中的安全性\n\n## 加密功能摘要\n\n[engine#feature-details](https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine#feature-details)\n\
  \n-   有些功能与 `始终加密` 不兼容，例如 `时态表` 和 `内存中 OLTP`。\n-   对于加密的列，可能存在性能损耗以及需要额外的存储空间。\n\
  \n即使存在这些限制和潜在的性能影响，您数据库中的某些数据（如社会安全号码、信用卡数据等）可能过于敏感，以至于承担不起泄露的风险，甚至不能冒险让拥有 SQL Server\
  \ 管理员权限的用户访问这些数据。在这些情况下，`始终加密` 提供了一个完整的端到端解决方案，并在加密和解密数据方面明确了角色分离。\n\n弄清楚如何在 SQL\
  \ Server 中使用加密可能有点让人不知所措。让我总结一下关于如何了解我们的加密功能的建议：\n\n-   无论您决定选择哪种类型的加密功能，务必备份 `服务主密钥`\
  \ 以及与加密相关的所有密钥。\n-   您必须决定您的应用程序是否真正需要加密。我交谈过的许多客户决定不使用加密连接或 `始终加密`，但几乎总是会加密他们的备份。\n\
  -   如果您使用 SQL Server 创建任何密钥或证书，请备份所有这些密钥和证书，并将其存储在与数据备份分开的位置。请将任何密钥或证书视为与您的数据同等重要。\n\
  -   `透明数据加密` 对 I/O 操作有一定的性能开销。但是，如果您担心任何人在 SQL Server 之外访问您的数据文件，则应强烈考虑使用它。笔记本电脑上的\
  \ SQL Server 数据库可能是一个很好的例子（可以作为 `Windows BitLocker` 的第二道防线）。\n-   `始终加密` 是一个很棒的功能，但它并不适用于所有的应用程序和数据库。如果您需要一个完整的端到端加密方案，并希望将密钥的管理与数据库分离，那么\
  \ `始终加密` 可能非常适合您。利用云，使用 `Azure Key Vault` 作为您的密钥存储提供程序。请查看如何执行此操作：[`docs.microsoft.com/azure/sql-database/sql-database-always-encrypted-azure-key-vault`](https://docs.microsoft.com/azure/sql-database/sql-database-always-encrypted-azure-key-vault)。\n\
  \n## 数据分类与审核\n\n欧盟于 2018 年 5 月推出了新的《通用数据保护条例》（GDPR）规则（参见官方网站：[`ec.europa.eu/commission/priorities/justice-and-fundamental-rights/data-protection/2018-reform-eu-data-protection-rules_en`](https://ec.europa.eu/commission/priorities/justice-and-fundamental-rights/data-protection/2018-reform-eu-data-protection-rules_en)），这使得数据分类、漏洞和数据审核等主题受到了新的关注。\n\
  \n![](img/index-377_1.jpg)\n\nMicrosoft SQL Server 工程团队认识到这些需求，并通过以下文档为组织提供了一般性指导，以准备和应对\
  \ GDPR 法规：[`aka.ms/gdprsqlwhitepaper`](http://aka.ms/gdprsqlwhitepaper)。\n\n除了指导之外，SQL\
  \ Server 还提供了工具和功能来协助这些领域的工作，包括 SQL Server Management Studio 和 T-SQL 命令，以帮助进行标记和审核。\n\
  \n##### 数据分类\n\n理解 SQL Server 中存储了哪些数据的一个重要方面是能够\n\n\n# 第 7 章 SQL Server 中的安全性\n\
  \n根据*信息类型*和*敏感级别*对数据进行分类。信息类型的示例包括银行、凭据、健康和社会安全号码。敏感级别的示例有公开、机密和 GDPR 机密。这些类型和敏感级别在\
  \ SQL Server Management Studio 工具中使用`分类数据`功能进行固定设置。这也被称为`SQL 数据发现和分类`功能，其文档位于 [`docs.microsoft.com/sql/relational-databases/security/sql-data-discovery-and-classification`](https://docs.microsoft.com/sql/relational-databases/security/sql-data-discovery-and-classification)。\n\
  \n您可以在 SSMS 中通过右键单击对象资源管理器中的数据库，选择“任务”选项来访问此功能。图 7-13 显示了此功能的示例。\n\n## 图 7-13. Linux\
  \ 上 SQL Server 的 SQL 数据字典和分类\n\n![](img/index-378_1.jpg)\n\n此功能具有一组固定的 T-SQL 语句，用于实现可能匹配信息类型和敏感级别的列名字典。然后，该字典会与当前数据库进行匹配。图\
  \ 7-14 显示了在 WideWorldImporters 示例数据库上 SSMS 中的结果。\n\n## 图 7-14. WideWorldImporters\
  \ 数据库的分类结果\n\n在报告的右上角，显示找到了 92 列匹配字典中可能的分类。让我们深入查看结果，了解原因。如果您点击顶部的灰色栏查看建议，您的结果应如图\
  \ 7-15 所示。\n\n![](img/index-379_1.jpg)\n\n## 图 7-15. WideWorldImporters 数据库的数据分类建议结果\n\
  \n信息类型和敏感度标签的下拉选项是字典的一部分。您现在可以选择左侧的任何复选框，然后单击`接受所选建议`。单击保存图标后，工具将保存您的更改。现在，您可以选择此屏幕顶部的“查看报告”选项，以查看您的分类选择和敏感度标签的报告。\n\
  \n图 7-16 显示了我对 WideWorldImporters 数据库中所有列进行勾选并接受默认建议后的报告。\n\n![](img/index-380_1.jpg)\n\
  \n## 图 7-16. WideWorldImporters 的默认分类报告\n\n目前，此工具仅在 SQL Server Management Studio\
  \ 中有效。并且类型、标签和规则是固定的。但是，此工具背后的所有逻辑都使用了 SQL Server 的功能，其文档位于 [`docs.microsoft.com/sql/relational-databases/security/sql-data-discovery-and-classification`](https://docs.microsoft.com/sql/relational-databases/security/sql-data-discovery-and-classification)。\n\
  \n字典规则是一系列 T-SQL 语句，您可以使用 XEProfiler 捕获（如我在第 5 章所述）。分类类型和标签使用名为`sp_addextendedproperty`的系统存储过程保存（更多信息请访问\
  \ [`docs.microsoft.com/sql/relational-databases/system-stored-procedures/sp-addextendedproperty-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-stored-procedures/sp-addextendedproperty-transact-sql)）。使用此过程会将数据保存在系统表中，以便您以后可以检索它们。关键是，您可以使用此系统存储过程和扩展属性创建自己的分类方案。\n\
  \n\n# 第 7 章 SQL Server 安全\n\n##### 漏洞评估\n\n本章介绍了关于安全的诸多不同概念。你需要在满足应用需求的前提下，确保将 SQL\
  \ Server 及其数据库配置得尽可能安全。因此，确保尽可能减少所有可能的攻击面并遵循最佳实践至关重要。但什么是最佳实践呢？我在本章开头为你指向了一个参考文档：[`docs.microsoft.com/sql/relational-databases/security/securing-sql-server`](https://docs.microsoft.com/sql/relational-databases/security/securing-sql-server)。\n\
  \n不过，如果能运行一个工具来检查你的系统是否符合这些最佳实践，岂不更好？SQL Server Management Studio 中内置了这样一个功能，名为\
  \ `SQL 漏洞评估`。你可以在以下位置找到相关文档：[`docs.microsoft.com/sql/relational-databases/security/sql-vulnerability-assessment`](https://docs.microsoft.com/sql/relational-databases/security/sql-vulnerability-assessment)。\n\
  \n我在 SQL Server on Linux 上针对 WideWorldImporters 示例数据库运行了此工具。图 7-17 展示了在 SQL Server\
  \ Management Studio 中得到的结果。\n\n**图 7-17.** 在 `WideWorldImporters` 数据库上运行的 `SQL Server\
  \ 漏洞评估`\n\n![](img/index-382_1.jpg)\n\n从评估工具中未通过的规则可以看出，该工具内置了审查数据库元数据的功能，涉及诸如列分类、启用\
  \ `TDE`（透明数据加密）、确保对象授权及遵循最佳实践使用角色等领域。\n\n尽管此工具目前仅在 SQL Server Management Studio\
  \ 中可用，但它会为每条规则（无论是通过还是未通过的规则）显示用于检查该安全实践的 `T-SQL` 语句。\n\n图 7-18 展示了一个示例，说明如何查看为\
  \ `WideWorldImporters` 数据库标记为低风险的其中一条规则背后的 `T-SQL` 查询。\n\n**图 7-18.** 漏洞评估 `T-SQL`\
  \ 查询详情\n\n由于漏洞评估工具使用了一系列 `T-SQL` 查询，我使用了 SQL Server Management Studio 中的 `XEProfiler`，并将所有查询保存到了\
  \ `vulnassess.csv` 示例文件中，供你查阅并在自己的系统中使用。\n\n为了查看适用于 SQL Server 实例的评估，请针对系统数据库（如\
  \ `master`）运行此工具。\n\n## SQL Server 审计\n\n保护 SQL Server 安全的最后一块拼图，是对 SQL Server 及其数据访问进行审计的能力。SQL\
  \ Server 提供了内置功能，可以审计对服务器实例及数据库访问的各个方面。SQL Server 审计功能使用第 5 章介绍过的 `扩展事件` 实现。SQL\
  \ Server 审计由以下组件构成：\n\n**审计**：对服务器或数据库级别审计操作的受监控结果。每个 SQL Server 实例可以有多个审计。\n\n\
  **服务器审计规范**：为指定的审计定义要监控的服务器级别审计操作。每个审计可以有一个服务器级别规范。服务器级别规范包含要监控的服务器级别审计操作组列表。\n\n\
  **数据库审计规范**：为指定的审计定义要监控的数据库级别审计操作。每个审计可以包含一个数据库级别规范。数据库审计规范包含要监控的数据库级别审计操作组或特定的审计操作。\n\
  \n**审计操作组**：一个服务器或数据库级别的操作组\n\n\n# 第 7 章：SQL Server 中的安全\n\n## 审计动作与目标\n\n审计将特定类型的事件分组到一个类别中进行监控。此外，还有一组专门用于审计监控的动作。\n\
  \n**审计动作 (Audit action)**：需要审计的具体操作，例如在表上执行`SELECT`语句。\n\n**目标 (Target)**：审计结果保存的位置。对于\
  \ Linux 上的 SQL Server，唯一支持的目标是文件。\n\n## 使用 SQL Server 审计的流程\n\n使用 SQL Server 审计的过程如下：\n\
  \n1.  创建审计并定义目标，使用如下 T-SQL 语句（该语句见于示例脚本`createsqlaudit.sql`，需以`sa`身份连接执行）：\n   \
  \ ```sql\n    USE MASTER\n    GO\n    IF EXISTS (SELECT * FROM sys.server_audits\
  \ WHERE name = 'AuditSQLServer')\n    BEGIN\n        ALTER SERVER AUDIT AuditSQLServer\
  \ WITH (STATE = OFF)\n        DROP SERVER AUDIT AuditSQLServer\n    END\n    GO\n\
  \    CREATE SERVER AUDIT AuditSQLServer\n    TO FILE (FILEPATH ='/var/opt/mssql')\n\
  \    GO\n    ```\n    > **提示 (Tip)** 删除审计时，之前的目标文件不会被自动删除。如果您计划多次运行这些演示，应手动删除目标路径中的旧审计文件。\n\
  \n2.  使用如下 T-SQL 语句添加一个针对成功登录的服务器审计规范（该语句见于示例脚本`addserveraudit.sql`，运行时需以`sa`身份连接）：\n\
  \    ```sql\n    USE MASTER\n    GO\n    IF EXISTS (SELECT * FROM sys.server_audit_specifications\
  \ WHERE name = 'AuditSQLServerSpec')\n    BEGIN\n        ALTER SERVER AUDIT SPECIFICATION\
  \ AuditSQLServerSpec WITH (STATE = OFF)\n        DROP SERVER AUDIT SPECIFICATION\
  \ AuditSQLServerSpec\n    END\n    GO\n    CREATE SERVER AUDIT SPECIFICATION AuditSQLServerSpec\n\
  \    FOR SERVER AUDIT AuditSQLServer\n    ADD (SUCCESSFUL_LOGIN_GROUP)\n    WITH\
  \ (STATE = ON)\n    GO\n    ```\n    `SUCCESSFUL_LOGIN_GROUP`是一个服务器级审计动作组的示例。您可以在我们的文档中找到更多示例：`https://docs.microsoft.com/sql/relational-databases/security/auditing/sql-server-audit-action-groups-and-actions`。\n\
  \n3.  现在，添加一个数据库审计规范来跟踪谁试图读取`WideWorldImporters`数据库中`Sales`架构下的任何表。使用如下 T-SQL 语句（该语句见于示例脚本`adddbaudit.sql`，运行时需以`sa`身份连接）：\n\
  \    ```sql\n    USE [WideWorldImporters]\n    GO\n    IF EXISTS (SELECT * FROM\
  \ sys.database_audit_specifications WHERE name = 'AuditWWISpec')\n    BEGIN\n  \
  \      ALTER DATABASE AUDIT SPECIFICATION AuditWWISpec WITH (STATE = OFF)\n    \
  \    DROP DATABASE AUDIT SPECIFICATION AuditWWISpec\n    END\n    GO\n    CREATE\
  \ DATABASE AUDIT SPECIFICATION AuditWWISpec\n    FOR SERVER AUDIT AuditSQLServer\n\
  \    ADD (SELECT ON SCHEMA::[Sales] BY public)\n    WITH (STATE = ON)\n    GO\n\
  \    ```\n    您可以在我们的文档中阅读关于其他数据库审计动作的介绍：`https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-action-groups-and-actions#database-level-audit-actions`。\n\
  \n4.  现在使用以下 T-SQL 语句开启审计（该语句见于示例脚本`startsqlaudit.sql`，需以`sa`身份连接）：\n    ```sql\n\
  \    USE MASTER\n    GO\n    ALTER SERVER AUDIT AuditSQLServer WITH (STATE = ON)\n\
  \    GO\n    ```\n\n5.  测试审计。以`sa`身份连接到您的 Linux 服务器，并运行以下 T-SQL 语句（该语句见于示例脚本`readsalescustomers.sql`）：\n\
  \    ```sql\n    USE [WideWorldImporters]\n    GO\n    SELECT * FROM [Sales].[Customers]\n\
  \    GO\n    ```\n\n# 7 SQL Server 中的安全性\n\n现在，我们可以通过执行以下 T-SQL 语句（该语句可在脚本 `readauditlogs.sql`\
  \ 中找到）来使用系统存储过程 `sys.fn_get_audit_file` 读取审计跟踪（以 sa 身份连接）：\n\n```sql\nUSE [WideWorldImporters]\n\
  GO\nSELECT event_time, action_id, session_id, object_name, server_principal_name,\
  \ database_principal_name, statement, client_ip, application_name\nFROM sys.fn_get_audit_file\
  \ ('/var/opt/mssql/auditsqlserver*.*', default, default)\nGO\n```\n\n结果应与图 7-19\
  \ 类似。\n\n![SQL Server 审计示例](img/index-387_1.jpg)\n\n**图 7-19. SQL Server 审计示例**\n\
  \n`action_id` 列中的值来自 DMV `sys.dm_audit_actions`。在这个例子中，`AUSC` = `AUDIT SESSION CHANGED`，表示启动审计跟踪的审计事件。`LGIS`\
  \ = `LOGIN SUCCEEDED`，表示 sa 为针对 WideWorldImporters 运行查询而建立的新连接（由于 SQL Operation\
  \ Studio 的连接方式，可能还有另一个登录记录。你可以从 `application_name` 中看到这一点。这也是为你的应用程序设置应用程序名称的另一个好理由！）。`action_id`\
  \ `SL` = `SELECT`，这显示了 dbo 运行 SELECT 语句访问 Customers 表的跟踪记录。请注意，审计还包含客户端 IP 地址等数据。`sys.fn_get_audit_file`\
  \ 的完整列集记录在 [`docs.microsoft.com/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql)。\n\
  \n> **注意**：SQL Server Management Studio 提供了用户界面选项来创建和管理审计以及查看审计日志。在以下资源中阅读更多内容：\n\
  > - [创建服务器审计和服务器审计规范](https://docs.microsoft.com/sql/relational-databases/security/auditing/create-a-server-audit-and-server-audit-specification#SSMSProcedure)\n\
  > - [查看 SQL Server 审计日志](https://docs.microsoft.com/sql/relational-databases/security/auditing/view-a-sql-server-audit-log#SSMSProcedure)\n\
  \n与审计相关的完整 T-SQL 语句、DMV 和目录视图列表可在我们的文档中找到：[`docs.microsoft.com/sql/relational-databases/security/auditing/sql-server-audit-database-engine#creating-and-managing-audits-with-transact-sql`](https://docs.microsoft.com/sql/relational-databases/security/auditing/sql-server-audit-database-engine#creating-and-managing-audits-with-transact-sql)。\n\
  \n鉴于审计的重要性，SQL Server Audit 提供了相关选项，以确保在审计因任何原因失败时，SQL Server 将关闭或无法启动。有关此功能以及 SQL\
  \ Server Audit 的其他注意事项的更多信息，请阅读：[`docs.microsoft.com/sql/relational-databases/security/auditing/sql-server-audit-database-engine#creating-and-managing-audits-with-transact-sql`](https://docs.microsoft.com/sql/relational-databases/security/auditing/sql-server-audit-database-engine#creating-and-managing-audits-with-transact-sql)。\n\
  \n#### 总结\n\n现在你已经完成了对 SQL Server 在 Linux 上的性能和安全性的广泛研究。在本章中，我介绍了登录和用户的基础知识，讨论了使用\
  \ Active Directory 身份验证，向你展示了如何设置权限和访问控制，描述了数据和网络连接加密的不同选项，并通过向你展示数据分类和审计功能结束了本章。构建生产就绪\
  \ SQL Server 的下一个重要主题是高可用性和灾难恢复（HADR）。\n\n# 8 SQL Server 的高可用性和灾难恢复\n\n虽然性能和安全性是任何世界级数据库引擎和平台必须提供的关键特性，但生产工作负载和数据库需要高可用性以及支持健壮灾难恢复计划的功能。SQL\
  \ Server 是一个数据库平台，为高可用性和灾难恢复需求提供了丰富的特性和选项。\n\n在本章中，我将介绍 SQL Server on Linux 中包含的高可用性和灾难恢复的三个最重要的功能领域：\n\
  - 备份和还原\n- 故障转移群集实例 (Always On Failover Cluster Instance)\n- 可用性组 (Always On Availability\
  \ Groups)\n\n我不会在本书中涵盖的另一个解决方案称为 *日志传送 (Log Shipping)*，你可以在 [`docs.microsoft.com/sql/linux/sql-server-linux-use-log-shipping`](https://docs.microsoft.com/sql/linux/sql-server-linux-use-log-shipping)\
  \ 阅读更多内容。与此主题相关的另一个重要资源是 *业务连续性 (Business Continuity)*，你可以在 [`docs.microsoft.com/sql/linux/sql-server-linux-business-continuity-dr`](https://docs.microsoft.com/sql/linux/sql-server-linux-business-continuity-dr)\
  \ 阅读。\n\n© Bob Ward 2018\nB. Ward, *Pro SQL Server on Linux*, `doi.org/10.1007/978-1-4842-4128-8_8`\n\
  \n#### 备份和还原\n\n我很喜欢我们文档中的这句话：“SQL Server 的高可用性功能并不能取代拥有一个健壮、经过充分测试的备份和还原策略的要求，这是任何高可用性解决方案最基本的构建块”（你可以在\
  \ [`docs.microsoft.com/sql/linux/sql-server-linux-business-continuity-dr#sql-server-2017-scenarios-using-the-availability-features`](https://docs.microsoft.com/sql/linux/sql-server-linux-business-continuity-dr#sql-server-2017-scenarios-using-the-availability-features)\
  \ 阅读）。\n\n这很好地总结了备份的重要性。我经常引用的一句话是：“你的数据质量取决于你的备份质量”。在我与 SQL Server 打交道的 25 年经验中，我从未见过比制定可靠的备份策略更被想当然的事情。我曾与一些客户合作过，他们使用\
  \ SQL Server 运行整个生产业务长达 *数月* 而没有良好的备份。当然，第一次遇到需要备份的故障时，你才会真正意识到它的重要性。\n\n那么，让我们来探讨一下在\
  \ SQL Server on Linux 中备份和还原数据库的基础知识和细节，包括一个重要的相关主题：数据库恢复。\n\n##### 数据库备份\n\n\n\
  # 高可用性和灾难恢复\n\n我还没有向你展示过备份的示例，但我们已经使用了 T-SQL `RESTORE` 语句来恢复 `WideWorldImporters`\
  \ 数据库备份（在本书的这个阶段，你可能已经对此感到厌倦了）。此外，我确实在第[7]章中讨论了加密备份。备份数据库的基础知识相当简单。更复杂的是制定一个好的备份策略来满足我们的应用程序和业务需求。\n\
  \n###### 完整数据库备份\n\n让我们从讨论备份开始，使用 `WideWorldImporters` 数据库的一个简单示例。假设你只想备份数据库的当前状态。你可以使用以下\
  \ T-SQL 语句来实现，以 `sa`（或数据库所有者或 `db_backupoperator` 角色的成员）身份连接，使用你最喜欢的 SQL Server\
  \ 工具（或本书示例中你可能使用的任何数据库所有者）。\n\n此语句可以在示例 **`backupwwi.sql`** 中找到：\n\n```\nBACKUP\
  \ DATABASE WideWorldImporters\nTO DISK = '/var/opt/mssql/data/wwi.bak'\nWITH INIT,\
  \ STATS=5, CHECKSUM\nGO\n```\n\n在 SQL Operations Studio 中运行此语句的结果如图[8-1]所示。\n\n\
  **图 8-1.** `WideWorldImporters` 数据库的完整数据库备份\n\n此语句的结果是 `WideWorldImporters` 数据库的一个*完整数据库备份*，写入一个名为\
  \ `/var/opt/mssql/data/wwi.bak` 的文件（文件扩展名没有要求，我使用 `.bak` 作为一种帮助我识别文件类型的方法）。默认情况下，SQL\
  \ Server 会将备份文件写入 `/var/opt/mssql/data` 目录，但你可以使用 `mssql-conf` 更改此目录（请参阅我们的文档：`https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf#backupdir`）。一个完整数据库备份包含数据库文件中所有已分配的页面、活动的事务日志以及有关备份的元数据。SQL\
  \ Server 备份的内部格式由 Microsoft Tape Format (MTF) 协议定义。这不是一个开源协议，你真的不需要知道备份格式的内部结构（但如果你真的、真的感兴趣，这个网站记录了原始协议：`http://laytongraphics.com/mtf/MTF_100a.PDF`）。\n\
  \n> **提示：** 想查看 MTF 的一些细节吗？启用跟踪标志 3216 和 3605，你可以在 `errorlog` 文件中看到这些细节。跟踪标志 3216\
  \ 未被记录或支持，因此我不建议在生产环境中使用。请记住，`mssql-conf` 可用于设置跟踪标志，如我们的文档所述：`https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf#traceflags`。\n\
  \n我在这个 `BACKUP DATABASE` 命令中使用了几个相当常见的选项：\n\n**`TO DISK`**：`DISK` 是一种备份设备类型，也是最常用的。我们技术上支持\
  \ `TAPE`（不幸的是，我职业生涯的很大一部分时间都在处理客户的 SQL Server 磁带备份问题。我知道，这暴露了我的年龄）和一种称为 `URL` 的类型。`URL`\
  \ 是一个很好的功能，允许你将数据库直接备份到 Azure Blob Storage。有关更多信息，请参阅我们的文档：`https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service?view=sql-server-2017`。磁盘备份的路径可以是任何有效的\
  \ Linux 路径，包括来自网络或本地磁盘的挂载点。唯一的要求是 `mssql` 用户必须具有对目标目录的写入权限。\n\n**`WITH INIT`**：默认情况下，SQL\
  \ Server 允许你将多个备份保存到单个文件中。使用 `INIT` 基本上会覆盖当前文件中已有的任何内容（如果文件已存在）。如果你没有指定 `INIT`，默认行为是将当前备份附加到文件的末尾。\n\
  \n> **提示：** 你可能还想考虑同时使用 `FORMAT` 和 `INIT` 来完全启动一个新的格式化备份文件。我遇到过一些情况，我想覆盖磁盘上现有的文件，但该备份文件已损坏。我需要使用\
  \ `FORMAT` 和 `INIT` 来完全启动一个新文件（或者先删除磁盘上的现有文件）。\n\n**`STATS=5`**：`STATS` 是一个按完成百分比显示的“进度指示器”选项。我包含它是为了演示备份是由并行工作线程执行的。在接下来讨论结果时，我会详细解释我的意思。如果你有一个需要按需运行的、异常长的备份，`STATS`\
  \ 也可以很方便地查看其进度。\n\n**`CHECKSUM`**：默认情况下，SQL Server 使用校验和算法来确保数据库页面在写入磁盘后物理上是一致的。我将在本书后面详细讨论这一点。基于相同的概念，备份文件也可以有一个校验和。\n\
  \n使用此选项会做两件事：\n\n1.  如果数据库启用了 `PAGE_VERIFY` 选项的校验和，备份操作将在读取每个页面时验证数据库页面校验和。如果校验和失败，备份将失败（除非使用了\
  \ `CONTINUE_AFTER_ERROR` 选项）。\n2.  为整个备份文件计算一个校验和，并与备份 MTF 格式化文件一起存储。我将在本章后面讨论如何使用\
  \ `RESTORE` 有效地利用这一点来验证备份文件。\n\n你可以通过使用服务器配置选项 `backup checksum default` 为所有备份默认启用校验和，如文档所述：`https://docs.microsoft.com/sql/database-engine/configure-windows/backup-checksum-default`。\n\
  \n除了 `BACKUP` 命令结果中的“stats”消息外，其他消息指示了为数据库的每个文件组和事务日志备份了多少数据库页面。这可以让你了解备份的大小。请记住，只有已分配的页面才会被备份，因此备份通常不比数据库文件本身大。此外，最后一条消息指示了数据库中备份的总页面数、备份执行的总时长以及备份速度。\n\
  \n其他有关备份的元数据和信息记录在 `ERRORLOG` 中，包含如下消息：\n\n```\nDatabase backed up. Database: WideWorldImporters,\
  \ creation date(time):\n2018/06/29(01:36:22), pages dumped: 60981, first LSN: 626:25064:2,\
  \ last\nLSN: 627:18664:1, number of dump devices: 1, device information: (FILE=1,\n\
  TYPE=DISK: {'/var/opt/mssql/data/wwi.bak'}). This is an informational\nmessage only.\
  \ No user action is required.\n```\n\n> **提示：** 一些用户发现每个备份命令都带有这些消息会使 `errorlog`\
  \ 变得嘈杂。因此，你可以使用跟踪标志 3226 来抑制备份消息。\n\n\n\n# 第 8 章 SQL Server 的高可用性与灾难恢复\n\n（以及恢复）信息记录在错误日志中。\n\
  \n除了 ERRORLOG，备份信息也会记录在 `msdb` 数据库的表中，例如 `backupfile`、`backupfilegroup` 和 `backupmediaset`\
  \ 等。\n\n我曾说过备份是使用并行工作线程完成的，图 8-1 的结果也证明了这一点。我这样说是因为显示统计信息的是主备份工作线程，而其他工作线程则负责从数据库文件读取并写入目标设备。这种交错的结果展示了该行为。通常，SQL\
  \ Server 会为数据库所有文件涉及的每个唯一磁盘创建一个用于读取的工作线程，并为数据库备份目标文件的每个唯一磁盘创建一个用于写入的工作线程（你可以通过指定多个文件，甚至跨多个磁盘来对备份进行分区）。\n\
  \n`BACKUP DATABASE` 命令有几个可选参数。你可以在我们的文档中查看所有参数：[`docs.microsoft.com/sql/t-sql/statements/backup-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/backup-transact-sql)。其中有一个可能很有用的选项是\
  \ `COMPRESSION`。SQL Server 会压缩备份文件以帮助减少空间需求。在使用 `COMPRESSION` 和 TDE 时有一些注意事项，前面的文档参考资料中有详细说明。\n\
  \n数据库备份是完全在线进行的，这意味着在备份期间你可以正常使用数据库。\n\n### 注意\n从技术上讲，有些操作可能会阻塞备份，反之亦然。这些操作包括 `alter\
  \ database` 以及其他需要独占数据库锁的操作。\n\n`BACKUP DATABASE` T-SQL 语句还允许你仅备份特定的文件或文件组。对于大型数据库，可能会有这样的场景：创建完整的数据库备份耗时过长，无法满足你的业务需求。因此，如果你有多个文件或使用了辅助文件组，你可以分阶段创建备份。前面提到的\
  \ `BACKUP DATABASE` 命令的文档参考资料描述了如何备份文件或文件组。在将此作为备份策略之前，请仔细阅读备份特定文件或文件组的流程。\n\n######\
  \ 恢复模型\n我在本书中已经描述过，事务日志是数据库更改的记录（很像日志）。在描述备份事务日志的概念之前，我应该先介绍一个称为 *恢复模型* 的概念。恢复模型决定了事务日志空间的管理方式以及可以进行何种\
  \ *介质恢复*。介质恢复确定了当数据库和/或事务日志文件损坏或不可用时，从备份介质恢复数据库的可用选项。这转化为你愿意接受何种程度的数据丢失风险。SQL Server\
  \ 支持以下恢复模型：\n\n-   **简单**：事务日志中的空间会在一段时间后，基于已完成的事务自动回收（也称为 *日志截断*）。使用此模型无法备份事务日志。你的数据丢失风险在于，可能会丢失自上次数据库备份以来所做的更改，因为并非事务日志中的所有事务都会被保存。当然，这只会发生在数据库和事务日志文件损坏或不可用的情况下（例如，存放这些文件的磁盘损坏）。此恢复模型适用于你只计划备份完整数据库的场景，通常用于较小的数据库，且备份间隔内的数据丢失是可以接受的。\n\
  \n-   **完整**：这是默认的恢复模型。使用此模型，所有介质恢复选项都是可行的，因为事务日志空间从不自动回收。所有事务都保存在\n\n\n\n# SQL\
  \ Server 恢复模型与事务日志备份\n\n## 完整恢复模型\n事务日志会不断增长，直到进行事务日志备份为止。实际上，我遇到的最常见问题之一就是，客户抱怨他们的事务日志文件意外增长，原因往往是他们使用了完整恢复模型却从未备份过事务日志。使用完整恢复模型，您可以根据数据库和事务日志备份的序列，恢复到任意时间点。\n\
  \n完整恢复模型还允许您使用诸如 Always On 可用性组之类的功能，而使用简单恢复模型的数据库则不允许使用这些功能。对于希望将数据丢失风险降至最低的生产数据库，建议使用此模型。\n\
  \n## 大容量日志恢复模型\n此恢复模型非常适合经常需要批量插入操作的数据库。它的工作方式与完整恢复模型类似，但允许批量复制操作进行最小日志记录，从而减少事务日志占用的空间。最小日志记录操作可以实现快速高效的批量操作。您可以在以下链接中阅读更多关于最小日志记录操作的信息：`https://docs.microsoft.com/sql/relational-databases/import-export/prerequisites-for-minimal-logging-in-bulk-import`。\n\
  \n不过，此恢复模型对于批量操作确实存在数据丢失风险，风险范围是从上一个事务日志备份之后开始。此模型也不支持时间点恢复等选项，也不能用于 Always On 可用性组。\n\
  \n关于 SQL Server 恢复模型的完整说明，请参阅我们的官方文档：`https://docs.microsoft.com/sql/relational-databases/backup-restore/recovery-models-sql-server`。\n\
  \n#### 事务日志备份\n如果您计划使用完整恢复模型，那么您肯定不希望总是必须备份整个数据库，以此作为从磁盘故障等情况中恢复的唯一方式。此外，正如我前面所述，您不希望事务日志文件一直增长直到磁盘空间耗尽。因此，SQL\
  \ Server 提供了 `BACKUP LOG` T-SQL 语句选项来备份事务日志。要备份事务日志，首先必须至少执行过一次 `BACKUP DATABASE`\
  \ 语句。\n\n`BACKUP LOG` 与 `BACKUP DATABASE` 的大多数选项类似。您可以选择不使用 `WITH INIT` 选项，以便将所有日志备份保存在一个文件中；或者使用\
  \ `WITH INIT` 选项，将它们保存在单独的文件中。\n\n完整的数据库备份包含所有当前已分配的页面和当前活动的事务日志，而事务日志备份则包含自*上一次事务日志备份*（如果是第一次日志备份，则是自上次数据库备份）以来事务日志中的所有更改。因此，事务日志备份通常按照*日志链*的顺序收集。请参考图\
  \ 8-2 中的日志链示例。\n\n**图 8-2. 日志链示例**\n\n星期一中午 12:00 的事务日志备份包含了自早上 8:00 数据库备份以来事务日志中的所有更改。星期一晚上\
  \ 8:00 的事务日志备份包含了自中午 12:00 日志备份以来的所有更改。星期二中午 12:00 的事务日志备份则包含了自星期一晚上 8:00 事务日志备份以来的所有更改。\n\
  \n我将在下一节关于还原的内容中，进一步讲解如何应用日志链备份序列。使用事务日志备份时，您的数据丢失风险在于两次日志备份之间发生的更改。因此，您必须确保在两次备份之间……\n\
  \n\n\n一项基于您的数据丢失暴露需求，关于事务日志备份频率的商业决策（注意：本章后面我们将讨论如何使用其他技术，如 Always On 可用性组，来进一步最小化这种暴露）。\n\
  \n# 第 8 章 SQL Server 的高可用性与灾难恢复\n\n业界中与这些决策相关的常用术语是`恢复时间目标`（`RTO`）和`恢复点目标`（`RPO`）。`RTO`是指在发生中断事件后恢复应用程序的目标时长。`RPO`是指应用程序可接受的、在中断事件后丢失的最大时间段内的数据变化量。因此，例如，如果您的`RTO`是四小时，`RPO`是\
  \ 15 分钟，您就需要确保每 15 分钟创建一次日志备份，并设计一个能在 4 小时内还原数据库备份和一系列日志备份的方案。\n\n在下一节关于还原的讨论中，我将探讨一个有趣的场景：尾日志备份。您可以在我们的文档中阅读更多关于事务日志备份的信息：[`docs.microsoft.com/sql/relational-databases/backup-restore/transaction-log-backups-sql-server`](https://docs.microsoft.com/sql/relational-databases/backup-restore/transaction-log-backups-sql-server)。\n\
  \n## 差异备份与仅复制备份\n\n为了帮助减少完整数据库或事务日志备份的数量，SQL Server 支持`差异备份`。`差异备份`类似于数据库备份，因为它包含数据库页面，但它仅包含自上次完整数据库备份以来发生更改的页面。这可以极大地加快还原过程，因为您可以还原一个完整备份、最后一个`差异备份`，然后应用任何事务日志备份来完全还原数据库。`差异备份`基于最近的完整备份，该备份被称为`差异备份`的`基准`。\n\
  \n所有恢复模式都支持`差异备份`。我将在本章的下一个主要部分中更详细地讨论如何还原`差异备份`。您可以在我们的文档中阅读更多关于`差异备份`的信息：[`docs.microsoft.com/sql/relational-databases/backup-restore/transaction-log-backups-sql-server`](https://docs.microsoft.com/sql/relational-databases/backup-restore/transaction-log-backups-sql-server)。\n\
  \n`仅复制备份`是一种不影响备份序列、日志链或`差异基准`的数据库或日志备份。在某些情况下，您可能希望创建一个独立于已实施备份策略的数据库或日志备份。使用 T-SQL\
  \ `BACKUP`语句的`WITH COPY_ONLY`选项来创建`仅复制备份`。在我们的文档中阅读更多关于`仅复制备份`的信息：[`docs.microsoft.com/sql/relational-databases/backup-restore/copy-only-backups-sql-server`](https://docs.microsoft.com/sql/relational-databases/backup-restore/copy-only-backups-sql-server)。\n\
  \n## 数据库快照\n\n我原本没有在本书中专门介绍数据库快照概念的地方，但将其与备份放在这里似乎合乎逻辑，因为它可以是高可用性解决方案的一部分。`数据库快照`也可以在`还原`操作中使用，因此我将首先在这里介绍这个主题。`数据库快照`是某个时间点数据库的只读静态视图。它们提供了一种很好的方法来查看您的数据或从错误中恢复。\n\
  \n\n\n### 第 8 章：SQL Server 的高可用性与灾难恢复\n\n## 数据库快照\n\n特定时间点的快照，而无需使用时间点恢复功能来还原一系列备份序列。\n\
  \n数据库快照以一种称为 `稀疏文件` 的概念存储为磁盘上的文件。这意味着在首次创建快照时，其体积很小。当你对数据库进行更改时，数据库页面的原始版本会被复制到快照中。这意味着随着时间的推移，发生的更改越多，快照文件就越大。你可以像使用数据库一样使用数据库快照。SQL\
  \ Server 会首先尝试从快照中获取数据库页面。如果快照中不存在这些页面，则意味着这些页面自原始数据库以来未被更改，此时页面将从数据库本身中检索。\n\n\
  快照不能替代你的备份策略，但在某些有趣的情况下非常方便。例如，如果你要为某个项目对数据库进行重大更改，可以先创建一个数据库快照。如果你犯了重大错误，可以使用该快照快速回滚数据库。如果不再需要该快照，你可以轻松地将其删除。\n\
  \n写入快照文件的页面会给 SQL Server 数据库操作带来额外的 I/O 性能开销，因此我建议你将快照文件与 SQL Server 数据库文件和事务日志文件存放在不同的磁盘上。\n\
  \n你可以在我们的文档中阅读有关创建快照、快照的更多好处和限制的详细信息：[`docs.microsoft.com/sql/relational-databases/databases/database-snapshots-sql-server`](https://docs.microsoft.com/sql/relational-databases/databases/database-snapshots-sql-server)。\n\
  \n## VDI 和快照备份\n\nSQL Server 支持一种标准文档中未列出的特殊设备，称为 `虚拟设备`。`VDI` 是一个规范，供开发者构建能够以数据流形式从\
  \ SQL Server 接收备份数据的应用程序。该程序随后可以以多种方式处理此数据流。\n\n你可以在 [`github.com/Microsoft/sql-server-samples/tree/master/samples/features/sqlvdi-linux`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sqlvdi-linux)\
  \ 找到如何构建 VDI 应用程序的示例。\n\n`BACKUP` T-SQL 语句使用 `TO VIRTUAL_DEVICE` 选项来支持 VDI 备份。此外，VDI\
  \ 备份支持一种称为 `快照备份` 的概念。快照备份允许 VDI 程序直接将 SQL Server 数据库和日志文件复制到另一个存储设备，而不是依赖于从 SQL\
  \ Server 获取备份数据流。SQL Server 能识别 `BACKUP` 命令中的 `WITH SNAPSHOT` 选项，并将冻结所有文件上的 I/O\
  \ 操作，直到 VDI 应用程序确认快照（类似文件复制）完成。\n\n有一篇较早但很好的博文解释了 VDI 的工作原理：[`blogs.msdn.microsoft.com/sqlserverfaq/2009/04/28/informational-shedding-light-on-vss-vdi-backups-in-sql-server/`](https://blogs.msdn.microsoft.com/sqlserverfaq/2009/04/28/informational-shedding-light-on-vss-vdi-backups-in-sql-server/)。\n\
  \n在 Linux 上的 SQL Server 中使用 VDI 备份有一些具体注意事项。请在我们的文档中阅读有关这些细节的说明：[`docs.microsoft.com/sql/linux/sql-server-linux-backup-vdi-specification`](https://docs.microsoft.com/sql/linux/sql-server-linux-backup-vdi-specification)。\n\
  \n面向开发者的完整 VDI 规范可以在此处找到：[`www.microsoft.com/download/details.aspx?id=17282`](https://www.microsoft.com/download/details.aspx?id=17282)。\n\
  \n\n[microsoft.com/download/details.aspx?id=17282](https://www.microsoft.com/download/details.aspx?id=17282)。（当你解压后打开这个文件时，请不要惊讶。它名为\
  \ `vbackup.chm`，是一种旧版的 Microsoft 帮助格式，文件内容标注为 SQL Server 2005 规范。但它对 SQL Server\
  \ 2017 仍然有效！）\n\n## 系统数据库备份\n\n除 `tempdb` 外的系统数据库，可以像任何其他用户数据库一样进行备份。问题是，你应该备份系统数据库吗？答案是肯定的，但我建议你实际上只需要对系统数据库进行完整备份，而且可能不需要经常执行。例如，除非你更改了\
  \ `model` 数据库，否则只需在安装后备份一次，之后可能就再也不需要备份它了。\n\n我将在下一节讨论一种在安装后重建系统数据库的方法，但恢复系统数据库备份要简单得多，并且它提供了一种恢复其中所做任何更改的方法。你可以在我们的文档中阅读更多关于系统数据库备份和恢复的信息：[`docs.microsoft.com/sql/relational-databases/backup-restore/back-up-and-restore-of-system-databases-sql-server`](https://docs.microsoft.com/sql/relational-databases/backup-restore/back-up-and-restore-of-system-databases-sql-server)。\n\
  \n![](img/index-401_1.jpg)\n\n### 第 8 章：SQL Server 的高可用性与灾难恢复\n\n### 数据库还原与恢复\n\n\
  SQL Server 提供了多个选项来还原数据库备份、数据库差异备份序列和日志备份，以及还原部分数据库的其他方法，例如分段还原和页面还原。在本节中，我将回顾所有这些选项，以及有关系统数据库还原和恢复的信息。还原的一部分是运行数据库恢复，由于我在书中尚未讨论该主题，现在正是回顾数据库恢复如何工作以及它如何影响还原和数据库启动的好时机。作为参考，我们的文档中对所有恢复选项进行了很好的概述：[`docs.microsoft.com/sql/relational-databases/backup-restore/restore-and-recovery-overview-sql-server`](https://docs.microsoft.com/sql/relational-databases/backup-restore/restore-and-recovery-overview-sql-server)。\n\
  \n### 数据库恢复\n\n为了确保记录在事务日志中的事务与磁盘上的数据库页面保持一致，SQL Server 会在某些情况下对数据库运行恢复。我在书中之前讨论过预写日志\
  \ (`WAL`) 的概念。由于这种持久化方法，在任何时间点，都可能存在已记录在事务日志中但尚未反映在磁盘数据库页面上的事务。此外，也可能存在尚未提交但已反映在磁盘数据库页面上的事务（例如，由于\
  \ `Lazy Write`）。\n\n当 SQL Server 必须还原备份或使数据库联机时，它将检查事务日志，以确定是否需要协调日志与数据库页面之间这些可能的不一致。在这个过程中，事务日志是事实的来源。恢复过程按以下阶段完成，如图\
  \ 8-3 所述。\n\n**图 8-3. 数据库恢复阶段**\n\n#### 分析\n\nSQL Server 将查找自上次检查点以来可能已变脏的页面以及未提交事务的状态。SQL\
  \ Server 使用此分析来正确执行恢复的其他阶段：重做和撤销。\n\n# 第 8 章 SQL Server 的高可用性与灾难恢复\n\n`重做（Redo）`：从事务日志中最旧的活动事务开始，重做所有已提交但尚未反映在事务所列数据库页上的事务（这也称为前滚事务）。SQL\
  \ Server 可以使用多个工作线程并行执行此操作，这是我们在 SQL Server 2016 中为加速恢复性能而进行的一项优化。\n\n`撤销（Undo）`：从事务日志中最旧的活动事务开始，确保所有未提交的事务不会反映在事务所列的数据库页上（这也称为回滚）。\n\
  \nSQL Server 通过查看所谓的 `日志序列号`（`LSN`）来理解如何比较事务日志中的事务以及它是否已反映在数据库页上。每个事务都标记有一个 `LSN`，任何被修改的数据库页都具有修改它的事务的\
  \ `LSN`。`LSN` 值按顺序递增。因此，很容易比较日志中的 `LSN` 和数据库页上的 `LSN`，并了解该更改是否已应用。\n\n在某些情况下，对于企业版，SQL\
  \ Server 可以使用 `快速恢复`，在重做阶段之后，在获取撤销操作锁的同时允许数据库变为联机状态。这种情况不适用于还原，而是适用于数据库被联机的情况，例如\
  \ SQL Server 的崩溃恢复（在意外关闭之后）。\n\n理解恢复的概念对于还原序列很重要，要知道恢复何时应用于包含在数据库或日志备份中的事务。\n\n\
  ![](img/index-403_1.jpg)\n\n## 还原数据库\n\n让我们从还原完整数据库备份的一些基础知识开始来看还原操作。使用本章前面创建的备份（`wwi.bak`），执行以下\
  \ T-SQL 语句，如示例脚本 `restorewwiheaderonly.sql` 中所示：\n\n```\nRESTORE HEADERONLY FROM\
  \ DISAL = '/var/opt/mssql/data/wwi.bak'\nGO\n```\n\n此还原选项将检查备份文件（MTF 格式），并返回备份文件元数据头中包含的信息。这对于了解备份中包含的信息很有帮助（尤其是当您不确定备份中有什么时）。\n\
  \n图 8-4 显示了此命令的结果。\n\n**图 8-4. SQL Server 中的 `RESTORE HEADERONLY`**\n\n![](img/index-404_1.jpg)\n\
  \n数据库备份中的元数据之一是所有数据库文件和日志文件的原始文件路径。当您还原备份时，SQL Server 将尝试在数据库备份时的确切文件路径位置创建这些文件以构建数据库。如果您尝试还原的备份其原始文件路径不存在（并且您无法创建它们），这可能会给您带来问题。因此，您将必须使用\
  \ `RESTORE` T-SQL 语句支持的语法来移动数据库和/或日志文件。但是，您如何知道要移动的文件及其原始路径呢？这就是 `RESTORE` 的一个非常方便的选项\
  \ `FILELISTONLY` 存在的原因。执行以下 T-SQL 语句，如示例 `restorewwifilelistonly.sql` 中所示：\n\n```\n\
  RESTORE FILELISTONLY FROM DISK = '/var/opt/mssql/data/wwi.bak'\nGO\n```\n\n您的结果应该类似于图\
  \ 8-5。\n\n**图 8-5. SQL Server 中的 `RESTORE FILELISTONLY`**\n\n从结果中，您可以看到文件的逻辑名称和物理文件路径。所以，假设您想要还原此备份，但不是将数据库放在其原始文件路径中，而是需要在不同目录中创建它们。\n\
  \n![](img/index-405_1.jpg)\n\n\n# 第 8 章 SQL Server 的高可用性与灾难恢复\n\n以下是一个使用如下 T-SQL\
  \ 语句进行操作的示例，该语句可在示例`restorewwimove.sql`中找到：\n\n```sql\nRESTORE DATABASE WideWorldImporters\n\
  FROM DISK = '/var/opt/mssql/data/wwi.bak'\nWITH MOVE 'WWI_Primary' to '/var/opt/mssql/WideWorldImporters.mdf',\n\
  MOVE 'WWI_UserData' to '/var/opt/mssql/WideWorldImporters_UserData.ndf',\nMOVE 'WWI_Log'\
  \ to '/var/opt/mssql/WideWordImporters.ldf',\nMOVE 'WWI_InMemory_Data_1' to '/var/opt/mssql/WideWordImporters_InMemory_Data_1',\n\
  REPLACE\nGO\n```\n\n此 T-SQL 语句的执行结果应如图 8-6 所示。\n\n图 8-6. 还原数据库时移动文件\n\n在此示例中，我已还原数据库，因此文件被创建在`/var/opt/mssql`目录下，而非`/var/opt/mssql/data`。另请注意`REPLACE`关键字的使用，因为数据库已存在。使用此关键字将导致\
  \ SQL Server 删除现有数据库及文件，并还原新的数据库。\n\n![](img/index-406_1.jpg)\n\n**提示：** 如果您是出于灾难恢复目的而还原数据库，我不建议使用`REPLACE`。相反，应将数据库备份还原到一个新名称，同时保留原始数据库。这是我个人的建议，因为我曾遇到过客户情况：原始数据库存在某些损坏，但备份无效。使用`REPLACE`会使\
  \ SQL Server 在还原备份前先删除原始数据库。如果备份还原失败，您将无法尝试恢复原始数据库中的内容。\n\n本章前文提到了在备份时使用`CHECKSUM`选项。使用此功能的一个显著优势是，您无需使用`RESTORE\
  \ VERIFYONLY`选项还原整个数据库，即可验证备份介质的校验和。如果`RESTORE VERIFYONLY`执行后没有报错，这并不能保证包括恢复在内的整个还原过程会成功（确认备份能否还原的唯一方法就是执行还原操作，即使是在另一台服务器上），但它确实能保证备份介质在创建后未被损坏。\n\
  \n## 完整数据库还原\n\n让我们通过一个示例，基于本章讨论过的备份选项，来考察一个可能的完整还原序列。考虑图 8-7 中的事件序列。\n\n图 8-7.\
  \ 崩溃前的数据库备份序列\n\n周二下午 1:00，发生了数据库文件损坏的事件，但在此示例中，当前的事务日志文件是完好的。如何从该事件中恢复？是否会丢失数据？如果事务日志确实有效，您可能实现零数据丢失。原因和方法如下。\n\
  \n因为我们有数据库备份和一系列日志备份，所以可以执行以下操作：\n\n1.  备份当前的“日志尾部”。您可以使用带有`NO_RECOVERY`选项的`BACKUP`\
  \ T-SQL 语句来完成此操作。\n2.  从备份文件`wwi.bak`还原完整数据库备份。此处与我之前展示的`RESTORE`示例的不同之处在于，您将使用`WITH\
  \ NO_RECOVERY`。SQL Server 实际上会在还原备份后应用重做逻辑，但不执行撤销。还原完成后，数据库尚不可用。\n3.  从备份文件`wwi_diff1.bak`还原差异备份。与步骤#2\
  \ 一样，您需要`WITH NO_RECOVERY`选项。数据库仍不可用。\n4.  从备份文件`wwi_log3.bak`还原事务日志备份。这次使用`RESTORE\
  \ LOG`语句，并使用`WITH NO_RECOVERY`。数据库仍不可用。\n5.  还原您在步骤#1 创建的日志尾部备份。同样，使用`RESTORE LOG\
  \ WITH NO_RECOVERY`。数据库仍不可用。\n6.  执行`RESTORE DATABASE`命令，但仅使用`WITH RECOVERY`选项，以完全恢复数据库并使其\n\
  \n\n\n### 第 8 章：SQL Server 的高可用性与灾难恢复\n\n将其恢复至一致状态。此时数据库应已可用，且无数据丢失。\n\n并且由于我创建了事务日志备份，即使差异备份无效，我仍可以按顺序还原所有日志备份。\n\
  \n让我们通过模拟 `WideWorldImporters` 数据库中的一系列更改（使用日志和差异备份）来实际查看此过程。对于这些示例，请使用 `sa` 或您创建的其他\
  \ `sysadmin` 登录名连接。为确保这些命令正确运行，请使用像 `sqlcmd` 这样的工具一次运行所有命令，或在 SQL Operation Studio\
  \ 等工具中使用同一连接。\n\n1.  首先，按照前面章节所述，将 `WideWorldImporters` 完整示例数据库还原到其原始状态。我已包含前面章节中使用的\
  \ `restorewwi.sh` 和 `restorewwi_linux.sql` 脚本。\n\n2.  事实证明 `WideWorldImporters`\
  \ 数据库被设置为 `SIMPLE` 恢复模型，但我们的示例希望使用 `FULL` 恢复模型。执行以下 T-SQL 语句，将 `WideWorldImporters`\
  \ 的恢复模型更改为 `FULL`，该语句可在示例脚本 `wwisetfull.sql` 中找到：\n\n    ```\n    USE master\n \
  \   GO\n    ALTER DATABASE WideWorldImporters SET RECOVERY FULL\n    GO\n    ```\n\
  \n    注意：使用简单恢复模型的数据库具有除使用事务日志备份之外的所有类型的恢复选项，因为您无法使用简单恢复模型创建事务日志备份。有关简单恢复模型数据库的完整数据库还原的更多信息，请参阅我们的文档：[`docs.microsoft.com/sql/relational-databases/backup-restore/complete-database-restores-simple-recovery-model`](https://docs.microsoft.com/sql/relational-databases/backup-restore/complete-database-restores-simple-recovery-model)。\n\
  \n3.  通过执行本章前面找到的 `backupwwi.sql` 脚本，为 `WideWorldImporters` 创建完整数据库备份：\n\n    ```\n\
  \    USE master\n    GO\n    BACKUP DATABASE WideWorldImporters\n    TO DISK = '/var/opt/mssql/data/wwi.bak'\n\
  \    WITH INIT, STATS=5, CHECKSUM\n    GO\n    ```\n\n4.  执行以下 T-SQL 语句，在 `WideWorldImporters`\
