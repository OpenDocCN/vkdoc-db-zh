  在 SQL Operations Studio 的 `QUERY PLAN` 选项卡旁边是另一个选项 `TOP OPERATORS`。`TOP OPERATORS`
  显示一个查询计划运算符和统计信息的表格，每个运算符按其估计开销排序。


  虽然使用 `SET SHOWPLAN*` T-SQL 语句可以显示估计的查询计划，但你可以在执行查询时使用 T-SQL 来显示实际的执行计划。实际执行计划是在查询执行*之后*生成的，包含关于查询执行以及每个查询计划运算符的重要性能统计信息。你可以通过首先在查询前执行
  T-SQL 命令 `SET STATISTICS XML` 来查看查询的*实际*执行计划。生成的 XML 文档的模式也可在 [`schemas.microsoft.com/sqlserver/2004/07/showplan`](http://schemas.microsoft.com/sqlserver/2004/07/showplan)
  获取。在 SQL Operations Studio 中使用此 T-SQL 命令可提供与估计计划类似的功能，包括计划的图形化视图和顶级运算符统计信息。




  ### 第 5 章：SQL Server 工具


  例如，估计执行计划会显示每个查询运算符的统计信息（如估计行数），而实际执行计划则会显示每个查询运算符的估计行数和实际行数（估计值是编译计划时根据可用统计信息生成的）。这些统计信息可能缺失或过时，这可能导致实际值与估计值不同的情况。这是在调试查询计划时常见的性能问题。


  **提示：** 如果查询计划信息是通过 `SET` 语句生成的，它将以消息的形式返回给应用程序。执行 `SET` 语句以生成查询计划详细信息的应用程序开发人员必须准备好处理和解析这些消息。


  SSMS 通过用户界面中称为 **显示估计执行计划** 和 **包括实际执行计划** 的按钮，提供了与 SQL Operations Studio 类似的功能。


  ###### SET STATISTICS


  您还可以使用 T-SQL 来深入了解批处理中每个语句的性能统计信息，包括 CPU、持续时间和 I/O 性能。这些 T-SQL 命令是：


  `SET STATISTICS TIME`：执行此命令后，SQL Server 将为批处理中的每个语句生成 CPU 和解析/编译与执行所用的时间统计信息。信息以消息形式生成。


  图 5-40 显示了来自示例查询（位于样本 `setstatstime.sql` 中）在 SQL Operations Studio 中的消息输出（注意：在运行以下命令前，请确保先运行
  `SET SHOWPLAN_XML OFF`）：


  ```sql

  SET STATISTICS TIME ON

  GO

  SELECT * FROM sys.databases

  GO

  ```


  ![](img/index-230_1.jpg)


  *图 5-40. SQL Operations Studio 中的 `SET STATISTICS TIME` 输出*


