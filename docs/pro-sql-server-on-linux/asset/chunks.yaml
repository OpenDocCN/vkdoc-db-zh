  trans: "# 第 7 章：SQL Server 中的安全\n\n## 动态数据屏蔽\n\n屏蔽的 `type`。`FUNCTION` 之后的语法定义了屏蔽的类型。默认屏蔽规则根据列的类型来屏蔽特定字符。例如，字符列用字符\
    \ `'X'` 屏蔽，整数则用 `0` 屏蔽。\n\n您可以在我们的文档中查看屏蔽类型的列表：[`docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking#defining-a-dynamic-data-mask`](https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking#defining-a-dynamic-data-mask)（其中包含了定义您自己的自定义屏蔽的能力）。\n\
    \n让我们通过一个示例来实际操作一下，使用 `ddm.sql` 脚本中的一些语句（以下所有步骤请以 `sa` 身份连接）：\n\n1.  以 `sa` 身份连接并创建一个新的登录名。\n\
    \n```sql\n-- 演示动态数据屏蔽\n--\n--  确保使用特权用户（如数据库所有者或系统管理员）连接\nIF NOT EXISTS (SELECT\
    \ 1 FROM sys.server_principals WHERE name\n    = N'GreatLakesUser')\nBEGIN\n \
    \   CREATE LOGIN GreatLakesUser\n        WITH PASSWORD = N'SQLRocks!00',\n   \
    \     CHECK_POLICY = OFF,\n        CHECK_EXPIRATION = OFF,\n        DEFAULT_DATABASE\
    \ = WideWorldImporters;\nEND\nGO\n```\n\n2.  创建一个用户映射到该登录名，将其添加到数据库中已定义的一个角色，并授予该角色读取权限。\n\
    \n```sql\nUSE WideWorldImporters\nGO\n\nDROP USER IF EXISTS GreatLakesUser\nGO\n\
    \nCREATE USER GreatLakesUser FOR LOGIN GreatLakesUser\nGO\n\nALTER ROLE [Great\
    \ Lakes Sales] ADD MEMBER GreatLakesUser\nGO\n\n-- 授予角色 SELECT 权限\nGRANT SELECT\
    \ ON Purchasing.Suppliers TO [Great Lakes Sales];\nGO\n```\n\n![SQL Operations\
    \ Studio 截图。](img/index-365_1.jpg)\n\n3.  尝试从 `[Purchasing].[Suppliers]` 表中读取数据。\n\
    \n```sql\n-- 使用当前 UNMASK 权限进行选择（注意行数和数据值），假设您以特权用户身份连接\nSELECT SupplierID, SupplierName,\
    \ BankAccountName,\n    BankAccountBranch, BankAccountCode, BankAccountNumber\
    \ FROM\n    Purchasing.Suppliers\n```\n\n您将看到所有列的全部数据。\n\n4.  模拟 `GreatLakesUser`\
    \ 用户并再次运行查询。\n\n```sql\n-- 模拟用户 GreatLakesUser\nEXECUTE AS USER = 'GreatLakesUser'\n\
    GO\n\n-- 使用模拟的 MASKED 权限进行选择（注意行数和数据值）\nSELECT SupplierID, SupplierName, BankAccountName,\n\
    \    BankAccountBranch, BankAccountCode, BankAccountNumber FROM\n    Purchasing.Suppliers\n\
    GO\n```\n\n现在的结果中，某些列的数据已被屏蔽，尽管您仍然可以看到所有行。图 7-7 显示了 SQL Operations Studio 中的结果。\n\
    \n**图 7-7.** Linux 上 SQL Server 的动态数据屏蔽\n\n在我们的文档中了解更多关于动态数据屏蔽的信息：[`docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking`](https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking)。\n\
    \n## SQL Server 与加密\n\n数据加密对于任何安全方案都可能很重要。然而，并非所有使用 SQL Server 的应用程序都需要使用加密。使用\
    \ SQL Server 的任何加密功能都会产生一些开销（例如额外的 CPU 使用率），因此必须在您的整体安全计划中加以考虑。\n\nSQL Server\
    \ 支持多项功能，使客户能够保护*静态数据*、*传输中的数据*和*连接*的安全。静态数据是指存储在文件和备份中的 SQL Server 数据。您希望确保数据被加密，以便攻击者无法在\
    \ SQL Server 进程之外读取数据（例如，如果有人偷走了装有 SQL Server 数据库文件的硬盘）。此外，一些应用程序希望能够确保从 SQL Server\
    \ 客户端应用程序到 SQL Server 再返回的所有数据都是端到端加密的。"
- fmt: '# Chapter 7 Security in SQL Server


    ## 实现加密的架构


    SQL Server on Windows relies on Crypto API to encrypt and decrypt data with routines
    like `BCryptEncrypt` (see [https://docs.microsoft.com/windows/desktop/api/bcrypt/nf-bcrypt-bcryptencrypt](https://docs.microsoft.com/windows/desktop/api/bcrypt/nf-bcrypt-bcryptencrypt)
    for more info). If you remember in the details of the SQLPAL architecture in Chapter
    [1](#index_split_000.html#p24), API calls that need Linux Kernel support will
    go through the Host Extension. I spoke with Mitchell Sternke, our engineering
    lead on security for SQL Server on Linux, to understand how we are able to support
    encryption on Linux. In order to support cryptography APIs, we use the OpenSSL
    set of libraries on Linux (see [https://www.openssl.org](https://www.openssl.org)
    for more information). One slight twist to the architecture, as described by Mitchell,
    is that we deploy a special DLL in SQL Server 2017 for SQL Server on Windows (called
    `secforwarder.dll`), which when running on Windows simply calls the Windows Crypto
    API support. But with SQLPAL on Linux, Crypto API calls are forwarded to the Host
    Extension to call any necessary OpenSSL routines. We use OpenSSL for all types
    of security needs, including support for TLS (and even for Kerberos support).


    ## SQL Server Keys and Certificates


    When using techniques with SQL Server to encrypt data on SQL Server, you need
    to become familiar with the following objects, which are all created using `T-SQL`:


    ### Service master key


    `SQL encryption` has a hierarchy, and it all starts with the `service master key`.
    The `service master key` is automatically generated by `SQL Server` at installation.
    All other keys and encryption of data will rely on the existence of this key.
    Therefore, if you are going to use `SQL Server encryption`, one of the very first
    things you absolutely need to do is back up this key to a secured location. Why?
    Because this is the top of the hierarchy of encryption; if this key were lost
    (e.g., the hard drive was damaged where `SQL Server` is installed), you would
    not be able to decrypt any data you encrypted. Ouch! Furthermore, when you back
    this up you use a password. You need to secure that password because you will
    need it to restore a backup of the key. You can read more about how to do this
    and the `service master key` at [https://docs.microsoft.com/sql/relational-databases/security/encryption/service-master-key](https://docs.microsoft.com/sql/relational-databases/security/encryption/service-master-key).
    The `service master key` will be used to encrypt other keys such as the `database
    master keys` and linked server passwords.


    **Note** encrypted connections and a feature called `always encrypted` do not
    rely on this hierarchy.


    ### Database master key


    This is a key protected by the `service master key` that is used to protect certificates
    and other objects in a database. To use functionality like `Transparent Data Encryption
    (TDE)` and `encrypted backups`, you will create a `database master key` in the
    `master database`. To encrypt column data (not `Always Encrypted` columns), you
    will create a `database master key` in a `user database`. You can read more about
    `database master keys` at [https://docs.microsoft.com/sql/t-sql/statements/create-master-key-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/create-master-key-transact-sql).
    Just like the `server master key`, once you create a `database master key` you
    should back it up immediately. See our documentation on how to do this at [https://docs.microsoft.com/sql/relational-databases/security/encryption/back-up-a-database-master-key](https://docs.microsoft.com/sql/relational-databases/security/encryption/back-up-a-database-master-key).'
