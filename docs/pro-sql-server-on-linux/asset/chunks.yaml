- fmt: '# CHAPTER 6


    ## Performance Capabilities


    If you are going to provide a data platform that is competitive in the industry
    and can handle the largest enterprise workloads on the planet, the database engine
    must be fast. The engine must be fast, built-in. It must provide capabilities
    for configuration, and tuning for users and developers to use computing resources
    to their maximum. It must provide features that allow users to accelerate performance
    beyond expectation with little or no application changes. And finally, a world-class
    data platform should come with built-in capabilities to adapt and autotune common
    query performance problems.


    `SQL Server` on `Linux` has all of this and more. If you have read all the chapters
    of the book to this point, I’ve shown the basics of deployment and how to create
    a database and application. I’ve also shown the vast set of tools and features
    for maximizing the investment of `SQL Server`. In this chapter, I want to describe
    the major performance capabilities of the `SQL Server` data platform. My goal
    for this chapter is that anyone reading this will understand how to achieve the
    best performance possible for a database application using `SQL Server` on `Linux`.


    I’ll first describe the built-in capabilities of the `SQL Server` database engine
    that are the foundation required to achieve maximum performance. Then I’ll discuss
    the various configuration choices to achieve the best performance possible including
    configuration of the `SQL Server` instance, database, and `Linux` Operating System.
    I’ll provide a section in this chapter on performance tuning, so you can ensure
    you are using resources for `SQL Server` most efficiently and at maximum capacity.
    I’ll then discuss features in `SQL Server` that allow an application to accelerate
    performance beyond traditional database application functionality. And finally,
    I’ll conclude the chapter by discussing new features in `SQL Server` that provide
    automation to adapt and autotune query performance.


    In 2017 at the Microsoft Ignite Conference, I gave a presentation on `SQL Server`
    Performance capabilities called "Experience Microsoft SQL Server 2017: The fast
    and the furious". I encourage you to watch this presentation as a supplement to
    this chapter. You can find this video at [https://channel9.msdn.com/Events/Ignite/Microsoft-Ignite-Orlando-2017/BRK3109](https://channel9.msdn.com/Events/Ignite/Microsoft-Ignite-Orlando-2017/BRK3109).


    © Bob Ward 2018


    B. Ward, *Pro SQL Server on Linux*, [https://doi.org/10.1007/978-1-4842-4128-8_6](https://doi.org/10.1007/978-1-4842-4128-8_6)


