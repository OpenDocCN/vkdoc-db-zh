- fmt: "# Chapter 9 Managing and Monitoring SQL Server\n\n## Managing Server-Side\
    \ Code\n\nI’ve shown examples in this book so far to create T-SQL *server-side\
    \ code* including procedures, views, functions, and triggers. Once you have created\
    \ these objects you may need to modify or even drop them. Each type of object\
    \ supports a corresponding `ALTER` and `DROP` T-SQL version of the `CREATE` syntax.\n\
    \nAnytime you `ALTER` a server-side programming object such as a stored procedure,\
    \ that object will be recompiled the next time it is executed and stored in cache.\n\
    \nNew to SQL Server 2016 SP1 and SQL Server 2017 is a new syntax you should consider\
    \ using for your scripts to create these types of objects. It is called `CREATE\
    \ or ALTER`. With this new syntax, you can create a single script to create or\
    \ modify your object instead of having one script to create and another to modify,\
    \ or having to drop and create each time you want to make a change.\n\nFor example,\
    \ the following T-SQL statement creates a stored procedure called `howboutthemcowboys`\
    \ if it does not exist, or modifies it if already exists. No need to use a `DROP`\
    \ statement. You can find this statement in the example script `howboutthemcowboys.sql`:\n\
    \n```sql\nUSE WideWorldImporters\nGO\nCREATE or ALTER PROCEDURE howboutthemcowboys\n\
    AS\nBEGIN\n    SELECT 'Back to the Super Bowl in 2019'\nEND\nGO\n```\n\nYou can\
    \ read more about how to use `CREATE or ALTER` object in our documentation at\
    \ [https://docs.microsoft.com/sql/t-sql/statements/create-procedure-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/create-procedure-transact-sql).\n\
    \nUsing `ALTER INDEX REORGANIZE` to defragment a columnstore index online: [https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-defragmentation#use-alter-index-reorganize-to-defragment-a-columnstore-index-online](https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-defragmentation#use-alter-index-reorganize-to-defragment-a-columnstore-index-online).\n\
    \nHere are more details on how to rebuild a Columnstore index at [https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-defragmentation#rebuild](https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-defragmentation#rebuild).\n\
    \nLook at the T-SQL examples on rebuilding and reorganizing Columnstore indexes\
    \ at [https://docs.microsoft.com/sql/t-sql/statements/alter-index-transact-sql#examples-columnstore-indexes](https://docs.microsoft.com/sql/t-sql/statements/alter-index-transact-sql#examples-columnstore-indexes).\n\
    \n## Monitoring SQL Server\n\nManaging the SQL Server instance, database, and\
    \ objects is important to keep your SQL Server healthy and running at peak performance.\
    \ But how do you know in some situations whether some management decisions are\
    \ needed? You need to be able to monitor key performance information and aspects\
    \ of SQL Server to be proactive and make smart management decisions.\n\nIn this\
    \ section of the chapter, I’ll talk about various methods to monitor SQL Server\
    \ performance using SQL Server features, how to use an incredibly cool feature\
    \ called the System Health session, how to monitor Transaction Log Backups, and\
    \ my take on Linux."
