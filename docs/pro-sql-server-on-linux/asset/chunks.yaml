- fmt: "Chapter 3: Building a Database and T-SQL Fundamentals\n\n## Foreign Key Constraints\n\
    \n```sql\nALTER TABLE [Sales].[Customers] WITH CHECK ADD CONSTRAINT [FK_Sales_Customers_AlternateContactPersonID_Application_People]\
    \ FOREIGN KEY([AlternateContactPersonID])\nREFERENCES [Application].[People] ([PersonID])\n\
    GO\n\nALTER TABLE [Sales].[Customers] WITH CHECK ADD CONSTRAINT [FK_Sales_Customers_Application_People]\
    \ FOREIGN KEY([LastEditedBy])\nREFERENCES [Application].[People] ([PersonID])\n\
    GO\n\nALTER TABLE [Sales].[Customers] WITH CHECK ADD CONSTRAINT [FK_Sales_Customers_BillToCustomerID_Sales_Customers]\
    \ FOREIGN KEY([BillToCustomerID])\nREFERENCES [Sales].[Customers] ([CustomerID])\n\
    GO\n\nALTER TABLE [Sales].[Customers] WITH CHECK ADD CONSTRAINT [FK_Sales_Customers_PrimaryContactPersonID_Application_People]\
    \ FOREIGN KEY([PrimaryContactPersonID])\nREFERENCES [Application].[People] ([PersonID])\n\
    GO\n```\n\n## Default Value Constraint\n\n```sql\nALTER TABLE [Sales].[Customers]\
    \ ADD CONSTRAINT [DF_Sales_Customers_CustomerID] DEFAULT (NEXT VALUE FOR [Sequences].[CustomerID])\
    \ FOR [CustomerID]\nGO\n```\n\nThis is like the `People` table, with some comments\
    \ for columns that I will uncomment and showcase in the next chapter.\n\nFor the\
    \ `Customer` table there are similar constraints to add, but with a few differences:\n\
    \n*   I added a `UNIQUE` constraint for the `[CustomerName]` column to ensure\
    \ each customer name is unique. But I’ll still use the `CustomerID` column, associated\
    \ with a `SEQUENCE`, as the `PRIMARY KEY`.\n\n    **Note** Indexes are created\
    \ for the primary key and unique constraints. Indexes help ensure the constraint\
    \ definition is maintained but also can help with performance to look up values\
    \ depending on how much data is loaded into these tables. I will cover more about\
    \ using indexes for performance in Chapter 6.\n\n*   There are several `FOREIGN\
    \ KEY` constraints that reference the `[Application].[People].[PersonID]` column.\n\
    \n    **Note** In the full `WideWorldImporters` sample, the `Customers` table\
    \ has foreign key references to other tables in the database, but I’ve left these\
    \ out in this chapter to keep this example contained and simple.\n\n## Creating\
    \ the Complete Database\n\nLet’s review the entire sequence of creating the schemas,\
    \ sequence objects, tables, and constraints in this database.\n\nWhen I usually\
    \ build out a complete database definition with objects, I create a script to\
    \ drive the entire execution of all T-SQL scripts. I’ve provided two example scripts\
    \ you can use to create everything at once:\n\n*   `createwwi.sh` for macOS and\
    \ Linux users\n*   `createwwi.cmd` for Windows users.\n\nThese scripts assume\
    \ you have installed the `sqlcmd` utilities, `sqlcmd` is in your path, and require\
    \ two command line parameters: server name and sa password. The `sqllogin` is\
    \ used and created in the `createlogin.sql` script. The password for that login\
    \ is in that T-SQL script, so if you change it from what I have provided you will\
    \ need to also change the shell or cmd script. If you are executing the `createwwi.sh`\
    \ script on Linux, don’t forget to execute `chmod u+x createwwi.sh` so you can\
    \ execute the script.\n\n**Note** These scripts assume `sqlcmd` is in the path.\
    \ For Windows, it should already be in the path after installation. For Linux,\
    \ be sure to add this to your path using the following commands from the bash\
    \ shell if you have not already:\n\n```bash\necho 'export PATH=\"$PATH:/opt/mssql-tools/bin\"\
    ' >> ~/.bash_profile\necho 'export PATH=\"$PATH:/opt/mssql-tools/bin\"' >> ~/.bashrc\n\
    source ~/.bashrc\n```\n\nOn Windows at a Powershell command prompt, the execution\
    \ of `createwwi.cmd` looks like this in my environment.\n\n```powershell\n.\\\
    createwwi bwsql2017rhel Sql2017isfast\n```\n\nFrom my Linux shell, here is an\
    \ example execution of `createwwi.sh` run on my Linux server:\n\n```bash\n./createwwi.sh\
    \ localhost Sql2017isfast\n```\n\nThese shell and command scripts execute the\
    \ following T-SQL scripts to create a login, database, and objects in the database:"
