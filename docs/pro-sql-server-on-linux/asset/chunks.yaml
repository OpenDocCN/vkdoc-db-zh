    database corruption, I would always (and rightly so) be asked “What caused this?”
    I can tell you from 25 years of experience that the number one cause of database
    corruption is a system problem, most of the time from the I/O system.


    Here is an interesting technique you can use to help prove it. If you run `DBCC
    CHECKDB` or encounter a checksum failure and have a sequence of database and transaction
    log backups that span the timeframe of the problem, restore them on a different
    system to analyze.'
