    This is because if a checksum failure is encountered, SQL Server will attempt
    to retry the read up to four times before it signals a true checksum failure.
    Our SQL Engineering team found that in some cases transient hardware issues can
    arise where a retry of the read would work (but 4 was typically the threshold
    where it would always fail). If a retry of the read is successful, the query that
    was trying to read the page succeeds, but you will see `Msg 825` in the `ERRORLOG`.


