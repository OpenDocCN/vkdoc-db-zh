    ## Dedicated Admin Connection (`DAC`)


    As I’ve described in the book, should `SQL Server` become inaccessible for any
    reason, but the `SQL Server` instance is still running, you may be able to connect
    with `DAC`, collect diagnostics, and in some cases resolve the problem. Should
    `pgsql` become hung for any reason, there is no method to access the engine without
    stopping and restarting `pgsql`. You can read more about `DAC` for `SQL Server`
    at [https://docs.microsoft.com/sql/database-engine/configure-windows/diagnostic-connection-for-database-administrators](https://docs.microsoft.com/sql/database-engine/configure-windows/diagnostic-connection-for-database-administrators).


    ## Attaching and detaching a database


    Since `SQL Server` allows you to control and establish specific files for your
    database and transaction log, you have the capability to detach a database, copy
    or move your files to another `SQL Server`, and attach these files for a new database.
    `pgsql` does not offer any capabilities like detach and attach for `SQL Server`.


    ## Recovery and repair


    For page checksum failures, `pgsql` does offer the ability to clean up damaged
    pages by initializing them from a query or the background vacuum process. `SQL
    Server` offers richer repair capabilities such as `DBCC CHECKDB REPAIR` and emergency
    mode repair to rebuild the transaction log. In addition, if `SQL Server` recovery
    encounters a checksum error, recovery will continue, skipping the damaged page
    using deferred transactions.


    ## Online maintenance


    `SQL Server` supports the concept of an online index build so that users are not
    blocked while the index is being built (or rebuilt). `pgsql` does not offer this
    functionality. In addition, `SQL Server` supports the concept of a resumable index
    rebuild, so you can pause and continue a large index rebuild task. You can read
    more about online index operations for `SQL Server` at [https://docs.microsoft.com/sql/relational-databases/indexes/perform-index-operations-online](https://docs.microsoft.com/sql/relational-databases/indexes/perform-index-operations-online).


    ## Index reorganization


    Indexes in `SQL Server` and `pgsql` can become fragmented. Both `SQL Server` and
    `pgsql` offer a method to defragment an index by rebuilding the index (only `SQL
    Server` can do this online). However, only `SQL Server` offers a different, less
    intrusive method to defragment an index by reorganizing the index. You can read
    more about index reorganization with `SQL Server` at [https://docs.microsoft.com/sql/relational-databases/indexes/reorganize-and-rebuild-indexes](https://docs.microsoft.com/sql/relational-databases/indexes/reorganize-and-rebuild-indexes).


    ## System health session


    While `SQL Server` (`Extended Events`) and `pgsql` (`dtrace`) offer rich tracing
    capabilities, only `SQL Server` automatically uses tracing to save information
    about key events regarding the health of `SQL Server`, called the system health
    session. Included in the system health session is output of the `sp_server_diagnostics`
    stored procedure, which is used to make health decisions for failover. You can
    read more about the system health session in `SQL Server` at [https://docs.microsoft.com/sql/relational-databases/extended-events/use-the-system-health-session](https://docs.microsoft.com/sql/relational-databases/extended-events/use-the-system-health-session).'
