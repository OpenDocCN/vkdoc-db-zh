  trans: "# 第 6 章：性能特性\n\n*   寻找使用`覆盖索引`的机会。覆盖索引包含了构成`SELECT`语句的所有索引列。如果你有一个非常重要的查询，它只涉及`a`、`b`和`c`列，而你在这三列上构建了索引，那么就无需去查询数据页来检索这些列的值。一种创建覆盖索引的技术是创建带包含列的索引，你可以在以下网址阅读更多相关信息：[`docs.microsoft.com/sql/relational-databases/indexes/create-indexes-with-included-columns`](https://docs.microsoft.com/sql/relational-databases/indexes/create-indexes-with-included-columns)。\n\
    *   未用于主键或唯一约束的非聚集索引通常不被定义为唯一的。例如，用作外键的列，其本身性质决定了它在表中的每一行都不是唯一的，因此也不会是唯一的。\n\n\
    ## 查看 WideWorldImporters 示例\n\n让我们看看微软是如何构建 WideWorldImporters 数据库的，以了解索引设计的示例。使用以下\
    \ T-SQL 脚本查看 WideWorldImporters 设计中为`Orders`表包含了哪些索引（此脚本可在示例`wwi_indexes.sql`中找到）：\n\
    \n```sql\nUSE [WideWorldImporters]\nGO\nSELECT o.name as table_name, i.name as\
    \ index_name, i.type_desc, i.is_primary_key, i.is_unique, c.name as column_name\n\
    FROM sys.objects o\nINNER JOIN sys.indexes i\n  ON o.object_id = i.object_id\n\
    \  AND o.type = 'U'\n  AND o.name = 'Orders'\nINNER JOIN sys.index_columns ic\n\
    \  ON ic.index_id = i.index_id\n  AND ic.object_id = i.object_id\nINNER JOIN sys.columns\
    \ c\n  ON ic.column_id = c.column_id\n  AND c.object_id = i.object_id\nORDER BY\
    \ table_name, index_name\nGO\n```\n\n![](img/index-296_1.jpg)\n\n此脚本使用 SQL Server\
    \ 目录视图来确定`Orders`表的索引、类型及索引中的列。图 6-12 显示了此查询的结果。\n\n**图 6-12. 在 SQL Server 中查找表的索引**\n\
    \n在此输出中，你可以看到聚集索引是`OrderID`上的主键，该列由`SEQUENCE`生成。从索引名称可以看出，其他的非聚集索引是建在作为外键引用其他表的列上。在下一节中，我将向你展示如何使用工具来确定另一个非聚集索引是否有助于根据特定的\
    \ SQL Server T-SQL 语句提升查询性能。\n\n## 使用工具\n\nSQL Server 提供了几种工具来帮助确定索引是否有助于提升查询性能：\n\
    \n*   *缺失索引* DMV，例如 `dm_db_missing_index_details`（你可以在以下网址阅读更多关于它的信息：[`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-db-missing-index-details-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-db-missing-index-details-transact-sql)）：我在前面的章节中提到过这个\
