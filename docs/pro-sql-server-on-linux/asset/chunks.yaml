    # 第 11 章 SQL Server 与容器


    ## 如何使用容器运行 SQL Server


    **一致性：** 容器镜像允许你部署一致的应用程序或数据库系统（如 SQL Server）版本。本章稍后我将详细讨论这对 SQL Server 的好处。


    **高效性：** Docker 容器提供了一种机制，可实现更快的部署、更少的停机时间以及更便捷的更新。我将在下一节解释这对 SQL Server 的益处。


    Docker 使用两个主要组件来帮助你管理 Docker 容器：


    *   **Docker 客户端：** 这是一个名为 `docker` 的程序，你可以配合多种选项来使用它，以构建镜像，并拉取、运行、启动、停止和管理容器。通过本章的示例，你将了解更多关于这些
    Docker 概念的知识。

    *   **Docker 守护进程：** Docker 客户端与守护进程程序通信，后者根据客户端的指示完成所有工作，包括构建镜像以及管理和运行容器。


    Docker 容器使用一个称为*命名空间*的概念来实现容器之间的隔离（你可以在 [`docs.docker.com/engine/docker-overview/#the-underlying-technology`](https://docs.docker.com/engine/docker-overview/#the-underlying-technology)
    阅读更多关于命名空间使用的信息）。尽管容器是隔离的，它们仍然可以相互通信（例如通过 TCP/IP）。请将 Docker 文档 ([`docs.docker.com`](https://docs.docker.com))
    作为你关于容器的完整参考。供你参考，我建议你阅读以下我找到的关于容器的其他优质资源：[`theearlybirdtechnology.com/2017/08/12/docker-cheatsheet/`](http://theearlybirdtechnology.com/2017/08/12/docker-cheatsheet/)
    和 [`www.quora.com/What-exactly-is-a-base-image-in-Docker`](https://www.quora.com/What-exactly-is-a-base-image-in-Docker)。


    让我们深入探讨如何将容器与 SQL Server 和数据库应用程序结合使用。


    在本书的这一部分，我将通过实际示例向你展示我在开篇介绍的容器基础概念。我将演示如何部署一个装有 SQL Server 的简单容器，如何使用容器来展示如何在更新时最大程度减少停机时间，如何使用
    `Dockerfile` 构建和部署镜像，并最终实现一个包含 SQL Server 和应用程序的多容器部署。


    在阅读本节时请记住一点：`SQL Server on Linux` 不支持在同一服务器上运行多个实例（这在 Windows 上称为命名实例），因此，如果你想在同一个
    Linux 服务器上运行多个 SQL Server 实例，使用容器就是方法。


    在我撰写本书期间，我的同事 Vin Yu 和我在 [`github.com/Microsoft/sqllinuxlabs`](https://github.com/Microsoft/sqllinuxlabs)
    为 `SQL Server on Linux` 和 Docker 容器构建了一系列免费的、自定进度的实验。Vin 构建了这些实验来探索 Docker 容器（可在
    [`github.com/Microsoft/sqllinuxlabs/tree/master/containers`](https://github.com/Microsoft/sqllinuxlabs/tree/master/containers)
    找到）。我将在本节中使用这个实验的部分内容，向你展示如何配合容器使用 SQL Server。


    （我随书附带了一些脚本作为示例，你可以将它们与这些实验结合使用。）我可能不会严格按照 Vin 实验的顺序进行，并且我会为你将要运行以查看 SQL Server
    容器实际运行的命令解释更多细节。


    为了向你展示这些示例，我创建了一个运行 RHEL 7.5 的新 Azure 虚拟机。（我的虚拟机规格是 Standard D16s v3 [16 个 vCPU，64
    GB 内存]，但你可以在更小规格的虚拟机上完成此操作。只需确保至少有 4 个 vCPU 和 16GB 内存即可）。然后，我从 `bash` shell 运行了以下命令来更新虚拟机并安装
    `git`。


    ```

