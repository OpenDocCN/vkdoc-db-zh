- fmt: '## 10 迁移到 Linux 上的 SQL Server


    本教程使用 Oracle 12c，但我使用 Oracle 11 XE（免费版本）也完成了此操作。当我使用 `SSMA` 连接到 Oracle 实例时，由于我使用的是
    XE 版本，Oracle 实例的名称是 `XE`，登录名是 `SYSTEM`。


    教程要求选择 `SQL Server 2017 (Linux) - Preview` 作为目标，但最新版本的 `SSMA` 仅将 `SQL Server 2017`
    作为选项（对于 Linux 不再处于预览状态）。


    由于以 Linux 上的 `SQL Server` 为目标的 `SSMA` 不支持服务器端迁移，因此 Oracle 服务器和 Linux 上的 `SQL Server`
    不必能够相互通信。`SSMA` `Windows` 客户端会分别连接到每个服务器以传输数据。


    图 10-4 显示了我使用 `SSMA` 将 `HR` 模式从 Oracle 11 XE 迁移到 Linux 上的 `SQL Server` 的最终结果。


    ![](index-532_1.jpg)


    **图 10-4** 使用 `SSMA` 从 Oracle 成功迁移到 Linux 上的 SQL Server


    您的迁移项目可能比 `HR` 模式从 Oracle 迁移的示例更复杂。然而，`SSMA` 在将 Oracle 对象转换为 `SQL Server` 方面相当稳健。`SSMA`
    的首席程序经理 `Shamik Ghosh` 根据他的经验告诉我，`SSMA` 应该能够将 90% 以上的 Oracle 对象和数据转换到 `SQL Server`，即使是更复杂的
    Oracle 模式也是如此。


    `SSMA` 支持从命令行执行迁移，您可以在此处阅读有关此功能的更多信息：`https://docs.microsoft.com/sql/ssma/oracle/command-line-options-in-ssma-console-oracletosql`。命令行选项的完整语法可以在此处查看：`https://docs.microsoft.com/sql/ssma/oracle/appendix-1-oracletosql`。


    对于从 Oracle 进行的完整生产迁移，我建议您通读 `SSMA` 文档的所有主要部分：`https://docs.microsoft.com/sql/ssma/oracle/sql-server-migration-assistant-for-oracle-oracletosql`。


    ### 从 PostgreSQL 迁移


    `PostgreSQL` 已成为用于应用程序的非常流行的开源数据库引擎。但是，一些用户发现 `PostgreSQL` 可能无法满足其应用程序的需求，原因可能是缺乏特定功能或需要高性能扩展。


    在本节中，我将从功能角度为您提供 `SQL Server` 与 `PostgreSQL` 比较的看法。`SSMA` 工具目前不支持从 `PostgreSQL`
    到 `SQL Server` 的迁移。我将分享关于如何将数据库架构和数据从 `PostgreSQL` 迁移到 Linux 上的 `SQL Server` 的想法。请务必阅读本章关于迁移后注意事项的部分，以完善迁移体验。


    > **注意**：如果您是 `PostgreSQL` 用户并希望迁移到 Linux 上的 `SQL Server`，我希望本书能为您提供如何执行此操作并成功部署的知识。但是，如果您有一些希望保留在
    `PostgreSQL` 中的数据库，我强烈建议您查看 Azure 中托管的 `PostgreSQL` 服务：`https://docs.microsoft.com/en-us/azure/postgresql/`。


    ### PostgreSQL 与 SQL Server 如何比较？


    我将本节称为“支持 SQL Server 的理由”。我过去没有使用过 `PostgreSQL`，因此不会声称自己是使用它的专家。为了编写本章，我在 `RHEL`
    上安装了 `PostgreSQL`，并对其功能进行了一些基本测试。此外，我还做了一些……'
  raw: '•  The tutorial uses Oracle 12c, but I’ve done this with Oracle 11 XE (free


    version) as well. When I connect to the Oracle instance with SSMA,


    since I was using the XE edition, the name of the Oracle instance is


    XE and the login is SYSTEM.


    •  The tutorial says to pick a target of SQL Server 2017 (Linux) – Preview,


    but the latest version of SSMA just has SQL Server 2017 as a choice (it


    is no longer in Preview for Linux).


    •  Since SSMA using SQL Server on Linux as a target does not support


    server-side migration, the Oracle server and the SQL Server on Linux


    don’t have to be able to communicate with each other. The SSMA


    Windows client connects with each server to transmit data.


    Figur[e 10-4 sho](#index_split_007.html#p532)ws the final result of my migration
    of the HR schema from Oracle 11


    XE to SQL Server on Linux using SSMA.


    ![](index-532_1.jpg)


