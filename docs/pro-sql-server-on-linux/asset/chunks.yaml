    # 第 5 章 SQL Server 工具


    连接到 Linux 服务器上的 SQL Server 后，左侧会显示一个用于浏览的窗格，主窗口中则是一个带有扩展的服务器仪表板。图 5-13 展示了连接到我的
    Linux SQL Server 后的默认视图。


    *图 5-13. 连接到 Linux 上的 SQL Server 后，SQL Operations Studio 中的默认视图*


    ## 配置


    接下来我要做的是设置一些偏好来自定义工具。我通过选择`File/Preferences/Settings`菜单选项来完成。偏好设置通过一个名为`settings.json`的文件进行自定义。图
    5-14 展示了在 SQL Operations Studio 中配置我的偏好的界面。


    ![](img/index-185_1.jpg)


    *图 5-14. SQL Operations Studio 用户设置*


    左侧窗格显示了所有默认设置。右侧窗格将显示我将包含的、用于覆盖默认值的设置。我想更改的两个设置是将默认背景颜色改为黑色，并将 T-SQL 代码编辑器的默认显示字体改为更大的尺寸。你可以直接编辑用户设置，但
    SQL Operations Studio 包含一个可视化的图标，帮助你将默认设置复制到用户设置中并进行更改。图 5-15 在左侧窗格中显示了我如何点击铅笔图标并选择`Edit`来复制编辑器字体大小的设置，以便进行更改。


    ![](img/index-186_1.jpg)


    *图 5-15. 在 SQL Operations Studio 中复制默认设置以进行更改*


    当我点击`Edit`和`Copy Settings`时，设置将出现在右侧窗格中，我可以更改字体大小的值。然后我将通过从`File`菜单中选择`Save`来保存这些设置。当我保存字体大小时，它会在当前窗口中自动更改（因为字体大小适用于
    SQL Operations Studio 中的任何编辑操作）。


    编辑器字体大小在默认的左侧窗格中很容易找到，但背景颜色呢？在设置窗口顶部有一个搜索编辑框。我在搜索编辑框中输入了单词`Color`，它向我展示了更改工作台`colorTheme`的选项。图
    5-16 展示了这个例子。


    ![](img/index-187_1.jpg)


    *图 5-16. 在 SQL Operations Studio 中搜索设置*


    现在我可以点击`workbench.colorTheme`字段附近的铅笔图标，然后会出现更改主题的选项。我选择了`Default Dark SQL Operations
    Studio`。颜色立即改变了。图 5-17 显示了我所做的更改出现在用户设置的右侧窗格中。


    ![](img/index-188_1.jpg)


    *图 5-17. 应用了新 colorTheme 的 SQL Operations Studio*


    我通过`File`菜单中的`Save`选项保存了设置，并关闭了用户设置窗口。


    现在我的设置已经按偏好保存好了，让我向你展示 SQL Operations Studio 的一些基本功能。关于该工具的完整演练，我强烈推荐这篇优秀的社区博客文章：[`www.mssqltips.com/sqlservertip/5339/new-sql-operations-studio-installation-and-overview`](https://www.mssqltips.com/sqlservertip/5339/new-sql-operations-studio-installation-and-overview)


    ## 对象资源管理器


    SSMS 用户熟悉一个称为`Object Explorer`的概念。`Object Explorer`是与 SQL Server 关联的对象的可视化文件夹视图。你可以像浏览典型文件夹一样遍历此视图，通过展开或折叠包含数据库在内的对象的树状视图。图
    5-18 显示了我安装环境中的一个例子，其中我展开了资源管理器树中的各种对象。


    ![](img/index-189_1.jpg)

