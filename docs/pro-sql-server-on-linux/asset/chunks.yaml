    # 第四章 构建应用程序与高级 T-SQL


    ## 本章小结


    在本章中，你学习了如何构建一个示例 node.js 应用程序来访问数据库。此外，你还学习了其他 T-SQL 功能，以增强你的数据库或应用程序。最后，你了解了
    SQL Server 2016 和 2017 中引入的新功能，这些功能可以进一步增强你的数据库和应用程序。在下一章中，我将向你展示一个完整的工具列表，让你能够进一步探索
    SQL Server 的功能，并管理你的 SQL Server 数据库和安装。掌握这些工具知识非常重要，因为本书的剩余章节将全程使用这些工具。


    # 第五章 SQL Server 工具


    SQL Server 拥有为数据专业人员提供所需工具的悠久传统。工具赋予任何人使用 SQL Server 开发、交互、优化、管理和排除应用程序及查询故障的能力。SQL
    Server 的工具涵盖范围远不止于程序或实用程序。SQL Server 内置了一套丰富的功能，我将在本章中作为工具主题的一部分进行讨论。


    所有 SQL Server 工具都有一个共同点。它们使用或通过 T-SQL 语言提供接口。作为独立程序的工具都知道如何通过使用 TDS 协议的驱动程序或提供程序来连接并执行
    T-SQL 查询。在第 2、3 和 4 章中，我向你介绍了两种与 SQL Server 交互的工具：`sqlcmd` 和 Visual Studio Code
    的 mssql 扩展。


    在本章中，我将向你展示用于连接、运行查询和管理 SQL Server 各个方面的图形化和命令行工具。我还将向你介绍 SQL Server 引擎的内置功能，这些功能提供了对元数据、执行、性能、资源和跟踪的洞察。我还会展示其他功能，允许你更改
    SQL Server、数据库和查询的配置，以影响行为或提供更多洞察。


    在本章探索过程中，一个关键点是，现有在 Windows 计算机上运行的工具几乎无需改动即可连接并与 Linux 上的 SQL Server 交互。如果你是
    Windows 用户，可以继续使用像 SQL Server Management Studio (`SSMS`) 这样的工具。但如果你是 macOS 或 Linux
    用户，你会喜欢我们提供跨平台、开源工具的新策略。我将在本章中涵盖所有这些内容。本章最后，我将讨论使用 `SSIS` 开发、构建和执行 ETL 包的工具。


    SQL Server 提供了其他特定于安全或高可用性等功能的工具，例如...


    ```sql

    rental_models WHERE model_name = ''linear_model'' AND lang = ''Python'');


    SELECT d.*, p.* FROM PREDICT(MODEL = @model, DATA = dbo.rental_data AS d)


    WITH(RentalCount_Pred float) AS p;


    GO

    ```


    为了完全理解此语法，你需要完整了解 Windows 上 SQL Server 的 Python 预测模型教程，网址为 https://microsoft.github.io/sql-ml-tutorials/python/rentalprediction，或者查看我们文档中使用名为
    `iris` 的已知数据集的示例，网址为 https://docs.microsoft.com/sql/advanced-analytics/r/how-to-do-realtime-scoring。


    其概念是，许多数据科学家在其工作站上使用测试数据执行一个称为构建 `trained model`（训练模型）的过程。T-SQL 的 `PREDICT` 函数可以将训练模型作为输入，并执行构建在数据库引擎内部的机器学习代码来
    `run`（运行）该训练模型。与使用 R 或 Python 通过 `sp_execute_external_script` 运行模型相比，原生评分在性能上具有巨大的提升优势。

