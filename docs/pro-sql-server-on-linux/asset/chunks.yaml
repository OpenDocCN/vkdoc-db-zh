    ### 内置性能


    我们将 SQL Server 数据库引擎构建得快速且可扩展，以满足地球上最大的数据库工作负载需求。我撰写本章的这一部分，并非要求任何操作，而是为了让读者了解使用
    SQL Server *可能*实现什么。Linux 上的 SQL Server 数据库引擎旨在理解如何动态扩展并最大化利用计算机、虚拟机或容器的 CPU、I/O
    和内存资源。读者阅读本书可能是为了了解 SQL Server，并判断它是否是可以依赖来运行业务的数据平台，或者是否可以作为新应用程序的数据源。本节旨在提供必要的信息来回答这些问题。


    要了解 SQL Server 的可能性，只需查看我们的 TPC 基准性能即可。目前，Linux 上的 SQL Server 在衡量分析查询性能的 1TB TPC-H
    基准测试中拥有两个最佳性能结果。（您可以阅读更多关于 TPC 基准测试的信息：[http://www.tpc.org](http://www.tpc.org)，并且可以在这里查看我提到的特定
    TPC-H 基准测试结果：[http://www.tpc.org/3331](http://www.tpc.org/3331) 和 [http://www.tpc.org/3327](http://www.tpc.org/3327)。）


    Linux 上的 SQL Server 2017 基于我们的工程团队在 SQL Server 2016 中完成的出色工作。作为本章这一部分的补充，我鼓励您阅读名为“SQL
    Server 2016 性能飞跃”的博客系列：[https://blogs.msdn.microsoft.com/bobsql/tag/it-just-runs-faster](https://blogs.msdn.microsoft.com/bobsql/tag/it-just-runs-faster)，以及我在
    2016 年 Microsoft Ignite 大会上关于同一主题的演讲：[https://channel9.msdn.com/Events/Ignite/2016/BRK3043-TS](https://channel9.msdn.com/Events/Ignite/2016/BRK3043-TS)。


    ### SQL Server 内置可扩展性


    我在第 1 章（作为 SQL Server 架构的一部分）描述了 SQLOS 组件。`SQLOS`旨在为 SQL Server 引擎提供调度和内存服务。所有
    SQL Server 引擎组件都使用`SQLOS`来创建工作线程池并执行任务。SQL Server 引擎组件必须使用`SQLOS`服务，通过非抢占式系统进行调度。使用这种调度系统可以最小化内核上下文切换，最大化
    CPU 资源使用率和效率。


    为了提供这些服务，`SQLOS`根据检测到的逻辑 CPU 数量创建一个*schedulers*（调度器）列表，并从一个总的线程池中为每个调度器分配一组工作线程。当创建新任务来执行一个工作单元（例如，登录或查询）时，它们会被分配到特定调度器上的工作线程运行。此外，调度系统设计用于通过*nodes*（节点）来检测和利用
    NUMA 计算机架构。节点和 CPU 为`SQLOS`和 SQL Server 提供了天然的扩展单元。`SQLOS`允许工作线程在 NUMA 节点内的任何
    CPU 上运行，但避免跨越节点边界以减少对外部内存的访问。识别 NUMA 节点和 CPU 使得 SQL Server 能够将工作线程分散在各个 CPU 上以提供最大的可扩展性。此外，SQL
    Server 可以按节点和/或 CPU 分区内部数据结构和列表，以确保代码在高并发用户工作负载下不会遇到瓶颈。


    `SQLOS`通过以下这些 DMV（动态管理视图）公开调度器、节点和 CPU 信息：

    - `dm_os_schedulers`：此 DMV 列出了 SQL Server 用于工作线程调度的调度器，包括统计信息……


    （此处原文结束）'
