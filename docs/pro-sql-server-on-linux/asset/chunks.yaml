    \n## Chapter 2: Installation and Configuration\n\nSo, if you need to do a rollback\
    \ to a previous version offline, you would need to:\n\n- Uninstall the current\
    \ version using a command like `sudo yum remove` (Do not remove the `/var/opt/mssql`\
    \ directory to retain all databases).\n- Copy the package of the version you want\
    \ to install.\n- Perform an offline install of that new package.\n\n### Removing\
    \ SQL Server\n\nWhile we never want you to feel the need to uninstall SQL Server,\
    \ you will likely find yourself removing SQL Server especially if you perform\
    \ a lot of demonstrations, are performing special tests, or need to roll back\
    \ to a previous version offline.\n\nThe basic syntax to remove SQL Server on RHEL\
    \ is:\n\n```\nsudo yum remove -y mssql-server\n```\n\nFigure 2-20 shows the expected\
    \ behavior when you uninstall SQL Server.\n\nFigure 2-20. Removing SQL Server\n\
    \nAt this point you have two choices:\n\n1. You can completely remove SQL Server\
    \ by removing the `/var/opt/mssql` directory, which will delete all system databases\
    \ and any user databases stored in that directory. Run the following command to\
    \ do this:\n\n   ```\n   sudo rm -rf /var/opt/mssql\n   ```\n\n2. Leave `/var/opt/mssql`\
    \ intact. Any future installation would then just install the SQL Server binaries,\
    \ not require `mssql-conf`, and leave all system databases intact.\n\nThe second\
    \ option could be useful should you feel a need to cleanly install the SQL Server\
    \ binaries because of some unexpected problem but keep all your data intact.\n\
    \n### Summary\n\nAt this point, you should have SQL Server installed, understand\
