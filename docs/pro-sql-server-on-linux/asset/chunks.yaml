    # Chapter 10 Migrating to SQL Server on Linux


    ## HADR


    I described in this book how important high availability and disaster recovery
    features and processes are for a production database platform. In this section,
    I’ll highlight some of the unique differences between SQL Server and `pgsql` regarding
    HADR.


    ### Backup and Restore


    *   SQL Server backups support checksums but that is not supported with `pgsql`.
    `SQL BACKUP WITH CHECKSUM` verifies the checksum during the backup. SQL Server
    has `RESTORE VERIFYONLY` to verify the checksums.

    *   There is no encryption option for backups for `pgsql` where SQL Server supports
    encrypted backups.

    *   SQL Server supports the Virtual Device Interface (`VDI`) for backup streaming
    to external programs, including the support for snapshot backups. The `pg_dump`
    program for `pgsql` does support streaming the output using a "pipe" with Linux
    to another program, but `VDI` is a complete protocol interface allowing for rich
    third-party backup solutions.

    *   SQL Server supports differential backups but `pgsql` does not have this concept.
    You can read more about differential backups in SQL Server at [https://docs.microsoft.com/sql/relational-databases/backup-restore/differential-backups-sql-server](https://docs.microsoft.com/sql/relational-databases/backup-restore/differential-backups-sql-server).

    *   SQL Server supports restores of filegroups, partial restores, and page restores
    online, which are not supported in `pgsql`.


    ### Startup and Parallel Recovery


    *   I’ve described in the book the process for SQL Server recovery of a database
    at startup including the analysis, redo, and undo phases. SQL Server supports
    the concept of fast recovery to allow database users to access the database after
    the redo phase while maintain locks on the necessary resources as undo executes.
    `pgsql` does not offer this functionality.

    *   SQL Server also uses parallel works for the redo phase of recovery, thereby
    speeding up the overall recovery process. `pgsql` does not offer parallel redo
    recovery of databases.


    ### Disaster Recovery


    If you lose a database tablespace in `pgsql` (for example you put it on a separate
    disk that fails) the entire `pgsql` cluster may not start. This is according to
    the `pgsql` documentation at [https://www.postgresql.org/docs/10/static/manage-ag-tablespaces.html](https://www.postgresql.org/docs/10/static/manage-ag-tablespaces.html).
    Any SQL Server user database failure to start for any reason will not result in
    an instance startup failure.


    ### Database Snapshots


    `pgsql` does not offer any functionality like the SQL Server database snapshot,
    which is a sparse version of the original database and only grows as changes are
    made to the'
