- fmt: '# Chapter 1: Why SQL Server on Linux?


    For Windows, it is called the Portable Execution (PE) format and for Linux it
    is called the Executable and Linkable Format (ELF) format. Any program compiled
    and linked for Windows uses the PE format (for example `SQLSERVR.EXE`) and can
    only be run on Windows; likewise for an ELF binary on Linux. So, our Host Extension
    code is part of the `SQLSERVR` Linux process compiled as an ELF binary. It has
    special logic to know how to load `SQLPAL.DLL` directly, since it is a PE-formatted
    binary, and provide it the necessary links to use the ABI interfaces in the Host
    Extension (in other words the Host Extensions instructs `SQLPAL` how to "talk
    back to it on the fly").


    The Host Extension also knows how to map the binaries for `SQLSERVR.EXE` and LibOS
    from specially packaged files on disk (we will discuss these more in Chapter 2)
    into the process address space. `SQLPAL.DLL` then knows how to load `SQLSERVR.EXE`
    and then let normal Windows process and DLL loading happen from there. One key
    point here: All of this code is compiled for Intel compatible processors and therefore,
    in the words of Robert Dorr, "It''s all just assembly code." This is one reason
    our `SQLSERVR.EXE` code runs unchanged on Linux.


    So, to summarize, `SQLSERVR.EXE` and its dependent DLLs are loaded and run just
    like they do on Windows. The same thing is true for the LibOS components. `SQLPAL.DLL`
    is compiled for Windows but has logic built in to implement Windows kernel services
    or, when necessary, call other functions using ABI interfaces to implement certain
    kernel services. But `SQLPAL.DLL` doesn''t know these interfaces are implemented
    in a piece of code compiled for Linux. The Host Extension takes care of all of
    that.


    There are two other components in the architecture diagram I haven''t talked about
    yet:


    *   Notice `SQLAGENT` is also listed in this diagram. This is because when you
    install SQL Server on Linux, you load the `SQLAGENT.EXE` in the `SQLSERVR` Linux
    Process along with `SQLSERVR.EXE`. Strange I know, but it works just fine. `SQLPAL`
    enables process isolation, and these processes don''t realize they are in the
    same Linux process.

    *   Notice in the bottom right-hand corner something called the `Parent Watchdog`
    process. You will hear more about this later in this book, but effectively this
    is a process called `SQLSERVR` natively compiled for Linux and is the program
    first started when SQL Server starts. We then use the Linux `fork()` API call
    to create another `SQLSERVR` process, which is really the SQL Server engine and
    all its components as you see in the diagram. It provides a handy purpose by monitoring
    the child `SQLSERVR` process via signals to perform dumps and using `systemd`
