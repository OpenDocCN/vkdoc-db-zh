    Linux 上的 SQL Server 与 Windows 故障转移群集的集成程度并不相同，因此确保自动故障转移的策略和逻辑可能略有差异。从 SQL Server
    2017 CU1 开始，SQL Server 引入了一种名为 `配置副本` 的新副本类型，它用于在仅配置了一个主副本和一个同步辅助副本时，帮助做出决策以提供高可用性和数据保护。重要的是要知道，配置副本可以是
    SQL Server Express 版本，这是 SQL Server 的一个免费许可证版本。此外，SQL Server 2017 引入了一个名为 `REQUIRED_SYNCHRONIZED_SECONDARIES_TO_COMMIT`
    的新 AG 选项。对于 Linux 上的 SQL Server，此选项在您为 AG 配置 Pacemaker 群集时建立。它决定了需要多少个副本来确保正确的数据保护和高可用性。对于
    Linux 上的 SQL Server，此设置在为 AG 设置群集时会自动配置，但可以使用 Pacemaker 命令覆盖。


