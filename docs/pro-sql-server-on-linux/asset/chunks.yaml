    ## 第 3 章：构建数据库与 T-SQL 基础


    ### 小结


    在本章中，我介绍了创建数据库以及数据库中对象的基础知识。我使用了流行的开源、跨平台工具 Visual Studio Code 来展示所有示例，通过 `mssql`
    扩展来演示 T-SQL 的基础。


    有了这些知识作为基础，我将在下一章中，继续使用同一个 `WideWorldImporters` 数据库示例，向您展示如何构建一个应用程序、学习更高级的 T-SQL
    概念，并探索 SQL Server 2017 on Linux 带来的新特性。


    ## 第 4 章：构建应用程序与高级 T-SQL


    既然您已经学习了如何创建数据库、表以及执行基本的 T-SQL 查询，是时候编写一些代码并构建一个连接到 SQL Server on Linux 的应用程序了。和第
    3 章一样，我将使用 Visual Studio Code 作为开发环境来构建一个 node.js 应用程序。


    该 node.js 应用程序使用的 T-SQL 查询基于我在第 3 章向您展示的知识。因此，在本章的第二部分，我将向您展示更高级的 T-SQL 功能，以及在
    SQL Server 2016 和 2017 中发布的新特性。


    我在撰写本章时参考了三种资源，相信您也会觉得它们很有用：


    - [`aka.ms/sqldev`](http://aka.ms/sqldev)：关于如何在多种平台上、使用几乎任何语言为 SQL Server 构建应用程序的资源与教程。

    - [`code.visualstudio.com/docs/nodejs/nodejs-tutorial`](https://code.visualstudio.com/docs/nodejs/nodejs-tutorial)：关于如何使用
    Visual Studio Code 构建 node.js 应用程序的教程。

    - [`docs.microsoft.com/sql/linux/sql-server-linux-develop-use-vscode`](https://docs.microsoft.com/sql/linux/sql-server-linux-develop-use-vscode)：关于如何为
    Visual Studio Code 使用 `mssql` 扩展的教程。


    © Bob Ward 2018


    B. Ward, *《Linux 上的 SQL Server 专业指南》*, `doi.org/10.1007/978-1-4842-4128-8_4`


    ### 设置您的环境


    在第 3 章中，我描述了如何使用 Visual Studio Code 和 `mssql` 扩展来设置运行 T-SQL 查询的环境。如果您跳过第 3 章直接来到本章，您将需要执行以下步骤来安装和配置本章示例所需的内容：


