- fmt: 'scenarios. Some trace flags need to be enabled during SQL Server startup or
    enabled so they will be applied globally across all SQL Server sessions. Use the
    `mssql-conf` `traceflag` argument for these scenarios. For example, if you want
    to enable diagnostic information about deadlocks to be captured in the SQL Server
    ERRORLOG, you could turn on `traceflag 1222` like this:


    `sudo /opt/mssql/bin/mssql-conf traceflag 1222 on`


    ## Chapter 2   InStaLL anD ConfIguratIon


    For a complete list of possible SQL Server trace flags, see this documentation:
    [https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-trace-flags-transact-sql](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-trace-flags-transact-sql).


    Here is a brief description of the other arguments:


    - `list`: Dump out the possible options that are valid to use with the `set` or
    `unset` arguments.


    - `set-sa-password`: Use this to reset the `sa` password.


    - `set-collation`: Use this to change the default collation of databases in SQL
    Server. See the full set of instructions on how to use this option in our documentation
    at [https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf#collation](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf#collation).


    - `set-edition`: Use this option to change the edition of SQL Server you specified
    during installation. You will be prompted just as you were to pick the edition
    when using the `setup` option of `mssql-conf`.


    - `validate`: Whenever you make configuration changes with `mssql-conf` using
    any of these options, the values are stored in a file called `/var/opt/mssql/mssql.conf`.
    This is a text file read by SQL Server at startup to use various options other
    than defaults. The full format of this file is described in our documentation
    at [https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf?#mssql-conf-format](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf?#mssql-conf-format).
    You can manually change this file instead of using the `mssql-conf` script, although
    we recommend you use the script to avoid any mistakes. The `validate` argument
    of `mssql-conf` can be used to ensure the file has the correct format and entries.


    **Note**: one possible use of the `mssql.conf` file is with Docker containers,
    provided you store this on a persisted volume.


    ## Chapter 2   InStaLL anD ConfIguratIon


    ### SQL Server Instance Configuration


    Let’s spend a few moments to see what other options there are for SQL Server Instance
    configuration supported by the SQL Server engine. This includes the T-SQL system
    procedure `sp_configure` and the T-SQL statement `ALTER SERVER CONFIGURATION`.
    These statements are used to control configuration options that apply to the entire
    SQL Server instance.


    #### sp_configure


    `sp_configure` is a T-SQL system command called a *system stored procedure* that
    can be used to configure various options within the SQL Server engine. These options
    are persisted within the system database called `master`. By default, there are
    only about 20 or so configuration options to choose from. There are some advanced
    options that can only be visible if you first set the option "show advanced options"
    to 1.


    Any user can run this to see possible values, but by default only system administrators
    such as the `sa` login in SQL Server can change options, given their possible
    impact to the entire server. I will discuss various configuration options for
    you to consider throughout the remaining chapters of this book.


    All configuration changes require an execution of the T-SQL `RECONFIGURE`.'
