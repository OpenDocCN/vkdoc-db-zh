    # 第 7 章 SQL Server 的安全性


    ## 实现加密的架构


    Windows 上的 SQL Server 依赖 Crypto API，通过诸如 `BCryptEncrypt` 之类的例程（更多信息请参见 [`docs.microsoft.com/windows/desktop/api/bcrypt/nf-bcrypt-bcryptencrypt`](https://docs.microsoft.com/windows/desktop/api/bcrypt/nf-bcrypt-bcryptencrypt)）来加密和解密数据。如果你还记得第
    1 章中关于 SQLPAL 架构的细节，需要 Linux 内核支持的 API 调用将会经过 Host Extension。我与 SQL Server on
    Linux 的安全工程负责人 Mitchell Sternke 进行了交流，以了解我们是如何在 Linux 上支持加密的。为了支持加密 API，我们在 Linux
    上使用 OpenSSL 库集（更多信息请参见 [`www.openssl.org`](https://www.openssl.org)）。正如 Mitchell
    所描述的，该架构的一个小变化是，我们为 Windows 上的 SQL Server 2017 部署了一个特殊的 DLL（名为 `secforwarder.dll`），它在
    Windows 上运行时会直接调用 Windows Crypto API 支持。但在运行于 Linux 的 SQLPAL 上，Crypto API 调用会被转发到
    Host Extension，由其调用任何必要的 OpenSSL 例程。我们使用 OpenSSL 来满足所有类型的安全需求，包括支持 TLS（甚至支持 Kerberos）。


    ## SQL Server 密钥与证书


    当使用 SQL Server 技术在 SQL Server 上加密数据时，你需要熟悉以下对象，它们都是使用 `T-SQL` 创建的：


    ### 服务主密钥


    `SQL 加密`具有一个层级结构，一切都始于 `服务主密钥`。`服务主密钥`由 `SQL Server` 在安装时自动生成。所有其他密钥和数据的加密都将依赖于该密钥的存在。因此，如果你打算使用
    `SQL Server 加密`，你绝对需要做的第一件事就是将此密钥备份到一个安全的位置。为什么？因为这是加密层级结构的顶端；如果此密钥丢失（例如，安装 `SQL
    Server` 的硬盘损坏），你将无法解密任何已加密的数据。哎呀！此外，备份时你会使用一个密码。你需要保护好这个密码，因为你将需要它来恢复密钥备份。你可以在
    [`docs.microsoft.com/sql/relational-databases/security/encryption/service-master-key`](https://docs.microsoft.com/sql/relational-databases/security/encryption/service-master-key)
    阅读更多关于如何操作以及 `服务主密钥` 的信息。`服务主密钥`将用于加密其他密钥，例如 `数据库主密钥`和链接服务器密码。


    **请注意**，加密连接和一项称为 `Always Encrypted` 的功能不依赖于此层级结构。


    ### 数据库主密钥


    这是一个受 `服务主密钥` 保护的密钥，用于保护数据库中的证书和其他对象。要使用如 `透明数据加密` 和 `加密备份` 等功能，你需要在 `master 数据库`
    中创建一个 `数据库主密钥`。要加密列数据（非 `Always Encrypted` 列），你将在 `用户数据库` 中创建一个 `数据库主密钥`。你可以在
    [`docs.microsoft.com/sql/t-sql/statements/create-master-key-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-master-key-transact-sql)
    阅读更多关于 `数据库主密钥` 的信息。就像 `服务器主密钥` 一样，一旦创建了 `数据库主密钥`，你应该立即备份它。请参阅我们的文档了解如何操作：[`docs.microsoft.com/sql/relational-databases/security/encryption/back-up-a-database-master-key`](https://docs.microsoft.com/sql/relational-databases/security/encryption/back-up-a-database-master-key)。

    '
