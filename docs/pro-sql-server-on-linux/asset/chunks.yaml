    # 第 8 章：SQL Server 的高可用性与灾难恢复


    `model`数据库通常不是问题，除非你对其进行了更改（这提醒我们应当备份任何用于修改`model`的`T-SQL`脚本），但`master`数据库则是个问题。丢失`master`数据库意味着丢失了登录名、链接服务器以及数据库信息。但同样，任何你创建的对象（如登录名）都应该保存在`T-SQL`脚本中并单独备份。并且，所有用户数据库都可以通过附加操作重新识别。你可以在我们的文档中阅读如何附加数据库：[`docs.microsoft.com/sql/relational-databases/databases/attach-a-database`](https://docs.microsoft.com/sql/relational-databases/databases/attach-a-database)。


    ## Always On 故障转移集群实例


    拥有可恢复的备份对于任何高可用性和灾难恢复策略都至关重要。此外，还有一些选项可以作为备份的补充，并提供更好的高可用性。SQL Server 在一套名为`Always
    On`的功能中提供了这些特性（我将在本章中努力使用正确的术语。著名的 MVP 和 HADR 专家 Allan Hirt 总是让我在这些术语上保持诚实）。其中一种解决方案通过使用共享存储来为
    SQL Server 实例故障提供跨集群的高可用性。数据的保护必须通过非 Microsoft 的硬件解决方案来实现共享存储和 SQL Server 备份。使用此解决方案的高可用性被称为`Always
    On 故障转移集群实例`。`Always On 故障转移集群实例`与`Always On 可用性组`（将在下一节描述）有一个共同的主题。这些功能在 Linux
    上的功能与在 Windows 上的 SQL Server 基本相同，但`配置有所不同`。这是由于在 Linux 和 Windows 上使这些技术工作所需的软件组件存在差异。话虽如此，`Always
    On 故障转移集群`和`Always On 可用性组`在 Linux 底层的工作方式，可能是我接触 SQL Server on Linux 以来遇到的差异较大的领域之一。SQL
    Server 引擎功能完全相同，但 Linux 处理故障转移等概念的方式在某些情况下与 Windows 大不相同。


    非常感谢本章及下一节内容来自微软专攻 HADR 的同事们，包括 Sourabh Agarwal, Mihaela Blendea, Pradeep M, Brooks
    Remy 和 Arnav Singh。没有他们，我无法梳理清楚 SQL Server on Linux 上`Always On`的复杂性和功能。


    ## 工作原理


    多年来，SQL Server 一直与 Windows Server 故障转移集群（WSFC）协作提供故障转移集群解决方案。SQL Server on Linux
    的`Always On 故障转移集群实例`（在本章剩余部分我将简称为`FCI`或`SQL FCI`）依赖于一个类似的开源解决方案，名为`Pacemaker`（你可以在[`clusterlabs.org/pacemaker/doc`](http://clusterlabs.org/pacemaker/doc)阅读更多关于`Pacemaker`起源和细节的信息）。`Pacemaker`及其组件（如`Corosync`）由各种
    Linux 发行版通过不同的附加组件来实现。例如，RHEL 支持一个名为`HA Add-On`的组件（`HA Add-On`的详细信息可以在[`access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/pdf/high_availability_add-on_overview/Red_Hat_Enterprise_Linux-7-High_Availability_Add-On_Overview-en-US.pdf`](https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/pdf/high_availability_add-on_overview/Red_Hat_Enterprise_Linux-7-High_Availability_Add-On_Overview-en-US.pdf)找到）。


    ### 注意


    我在与客户合作中得到的一个经验是，`RHEL HA Add-On`可能需要与标准的`RHEL`许可证分开购买。`SLES`对其`HA`扩展有相同的概念。你可以在[`www.suse.com/products/highavailability`](https://www.suse.com/products/highavailability)阅读更多关于`SLES`的信息。


    一个`SQL FCI`是一组分布在多台计算机（节点）上的 SQL Server 实例，它们可以参与一个称为集群的故障转移高可用性解决方案。然而，在`FCI`中，只有一个
    SQL Server 实例在节点之间主动使用共享存储上的数据库。


    这张来自文档[`docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-concepts#the-clustering-layer`](https://docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-concepts#the-clustering-layer)的示意图，如图
    8-9 所示，描述了与硬件交互以支持 SQL Server on Linux 上`FCI`的软件层次。


    ![](img/index-419_1.jpg)


    图 8-9. SQL Server on Linux 的`FCI`软件与硬件组件


    进一步观察图 8-9，`Corosync`是 Linux 服务器或`节点`之间通信的框架，`Pacemaker`会使用它。为了让`Pacemaker`组件能够根据故障转移条件做出在节点间故障转移资源的决策，需要一个`资源代理`。资源代理类似于
    WSFC 中使用的资源 DLL，用于执行故障转移的健康检查，以协调 Windows 上的 SQL Server `FCI`。Linux 的 SQL Server
    资源代理随`mssql-server-ha`软件包一起安装。


    ### 注意


    `SQL Server`资源代理现在已在 GitHub 上作为开源项目提供：[`github.com/Microsoft/mssql-server-ha`](https://github.com/Microsoft/mssql-server-ha)。由于我们的资源代理是开源的，其他供应商可以构建与`Linux`上的`SQL
    Server`协同工作的`HADR`解决方案，以提供高可用性功能，作为`Pacemaker`的替代方案。其中一个例子是`HPE Serviceguard`。你可以在[`www.hpe.com/us/en/product-catalog/detail/pip.hpe-serviceguard-for-linux.376220.html`](https://www.hpe.com/us/en/product-catalog/detail/pip.hpe-serviceguard-for-linux.376220.html)阅读更多关于`HPE
    Serviceguard`的信息。


    关于`Always On FCI`的详细文档参考可以在这里找到：[`docs.microsoft.com/sql/linux/sql-server-linux-ha-basics#pacemaker-for-always-on-availability-groups-and-failover-cluster-instances-on-linux`](https://docs.microsoft.com/sql/linux/sql-server-linux-ha-basics#pacemaker-for-always-on-availability-groups-and-failover-cluster-instances-on-linux)。

