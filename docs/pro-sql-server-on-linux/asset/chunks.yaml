- fmt: '# Chapter 10: Migrating to SQL Server on Linux


    1.  The benchmarks measure the potential capability of a database to process an
    application workload.

    2.  Microsoft is not allowed to post their own benchmarks, based on the rules
    of the TPC council. Our partners such as HPE and Lenovo are the ones posting the
    benchmarks to show the performance capabilities of our database platform combined
    with their hardware. To this date, no hardware vendor has chosen to post a TPC
    benchmark for `pgsql`.


    ## Read-ahead

    `SQL Server` has many built-in capabilities in the engine to boost query performance.
    I’ve described how read ahead accelerates query scan performance. `pgsql` does
    not support read ahead capabilities. There is an older blog written on `SQL Server`
    read ahead (some details may be a bit out of date but it paints the picture) at
    [https://blogs.msdn.microsoft.com/craigfr/2008/09/23/sequential-read-ahead/](https://blogs.msdn.microsoft.com/craigfr/2008/09/23/sequential-read-ahead/).


    ## Parallel queries

    The `pgsql` documentation makes this statement: “Many queries cannot benefit from
    parallel query, either due to limitations of the current implementation or because
    there is no imaginable query plan which is any faster than the serial query plan”
    ([https://www.postgresql.org/docs/10/static/parallel-query.html](https://www.postgresql.org/docs/10/static/parallel-query.html)).
    Remember, these are run by processes so inter process communication is required
    vs. `SQL Server`, which shares information in a process across threads.


    `SQL Server` supports parallel queries and many queries can benefit from this
    capability (especially analytic queries using technologies like clustered columnstore
    indexes). Furthermore, `SQL Server` supports parallel queries for operations like
    `SELECT INTO` and `INSERT SELECT`.


    ## Query hints and options

    `pgsql` does not support query level hints and options but `SQL Server` has this
    capability. You can read more about query hints for `SQL Server` at [https://docs.microsoft.com/sql/t-sql/queries/hints-transact-sql-query](https://docs.microsoft.com/sql/t-sql/queries/hints-transact-sql-query).


    ## Columnstore indexes

    I’ve described the amazing performance power of columnstore indexes in this book
    for analytic workloads. `pgsql` does not have columnstore index capabilities.
    I did find this custom extension for `pgsql` at [https://pgxn.org/dist/cstore_fdw/](https://pgxn.org/dist/cstore_fdw/)
    but I cannot tell if it is widely used or supported.


    ## In-Memory OLTP

    I’ve also described the performance capabilities of memory optimized tables for
    OLTP workloads with `SQL Server`. `pgsql` does not contain In-Memory OLTP capabilities.
    You can read more about In-Memory OLTP for `SQL Server` at [https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/in-memory-oltp-in-memory-optimization](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/in-memory-oltp-in-memory-optimization).


    ## Adaptive Query Processing and Automatic Tuning

    I described the new performance capabilities of `SQL Server` called Adaptive Query
    Processing (`AQP`) and Automatic Tuning. `pgsql` does not have these capabilities,
    as far as I have seen from my research. You can read more about `AQP` at [https://docs.microsoft.com/sql/relational-databases/performance/adaptive-query-processing](https://docs.microsoft.com/sql/relational-databases/performance/adaptive-query-processing).
    You can read more about Automatic Tuning in a blog post I wrote at [https://cloudblogs.microsoft.com/sqlserver/2018/06/11/sql-server-automatic-tuning-around-the-world/](https://cloudblogs.microsoft.com/sqlserver/2018/06/11/sql-server-automatic-tuning-around-the-world/).


