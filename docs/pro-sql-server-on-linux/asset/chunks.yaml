- fmt: '# Chapter 8: High Availability and Disaster Recovery for SQL Server


    ## Distributed Availability Groups


    A unique concept provided by SQL Server AGs is a distributed availability group.
    A distributed availability group is a special type of availability group that
    spans two availability groups. Consider the diagram in Figure 8-11, which can
    be found in the Microsoft documentation at [https://docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups#understand-distributed-availability-groups](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups#understand-distributed-availability-groups).


    The concept is that both the secondary replica for availability group `AG1` and
    the primary replica for availability group `AG2` receive updates from the `AG1`
    primary replica. Distributed availability groups provide AG functionality for
    multisite remote configurations such as organizations with data centers in remote
    locations. Check out various scenarios to use distributed availability groups
    in our documentation at [https://docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups#distributed-availability-group-usage-scenarios](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups#distributed-availability-group-usage-scenarios).


    ## Setup and Configuration


    The steps to set up an availability group for high availability and data protection
    are at a high level the following (follow along in the documentation at [https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-configure-ha](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-configure-ha)).


    *   You cannot set up an AG on a SQL Server instance with FCI installed as you
    can on Windows. This is an option we may look to support in the future, but it
    is not supported for SQL Server 2017.

    *   Due to the method in which `STONITH` and fencing work, you should not include
    an async replica in the `Pacemaker` cluster. I will show you later in this chapter
    how to add your AG replicas into the cluster. Do not add an async replica into
    the cluster, as the cluster will face issues when `STONITH` is enabled. This will
    not affect cluster operations, since you cannot automatically failover to an async
    replica.

    *   Most operations for the cluster cannot be done via `T-SQL`, such as a manual
    failover operation. You must use `Pacemaker` commands, and I will show you how
    later in this chapter. The one exception to this statement is a `forced failover`.
    You will use `T-SQL` for this situation, which is described in our documentation
    at [https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-failover-ha](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-failover-ha).


