    Chapter 9   Managing and Monitoring SQL Server


    ** SQL Server Troubleshooting**


    Throughout the book so far, I have introduced you to tools, techniques, and features
    that


    could be used for the purposes of troubleshooting problems with SQL Server on
    Linux.


    Having said that, there are a few troubleshooting topics worth covering in this


    chapter that I have not discussed at this point in the book. This includes dump
    files, core


    dump files, and PSSDiag. I want to personally thank two of the top experts currently


    in Microsoft support on SQL Server on Linux, Pradeep M and Suresh Kandoth, for
    the


    content in this section.


    ** Dump  Files**


    When some error conditions occur with SQL Server such as an Access Violation,
    the


    database engine will produce a dump file and entry in the ERRORLOG. The dump file
    is


    useful for Microsoft technical support to investigate the cause of the problem.
    In most


    cases, when a dump file is generated, SQL Server has  *handled* the error or exception,


    produced the dump file, and properly terminated the worker thread (which is like
    a


    severe error causing possibly a connection to be terminated and transactions rolled


    back).


    The dump files are saved in the same directory where the ERRORLOG files reside,


    which is by default /var/opt/mssql/log. You will recognize dump files (often called


    minidump files) by the file pattern SQLDump<n>.mdmp. These files are formatted
    to


    be read by the Windows Debugger, as any dump file generated by SQL Server uses
    the


    minidump format for Windows.


