  raw: 'since joining the team over two years ago. My good friend and architect of
    the SQL


    Server product, Conor Cunningham, once told me that if we wanted to, Microsoft
    could


    ship a quality release of SQL Server every month these days. That is a far cry
    from the


    days of Yukon (SQL Server 2005) when it took several years to ship a release.
    Of course


    we need value and new features to make a new release viable for the industry,
    so once a


    month is probably not the right cadence. SQL Server 2017 came right off the heels
    of SQL


    Server 2016, and a big part of that release was bringing SQL Server on Linux to
    market.


    So what is next for SQL Server, especially for SQL Server on Linux and containers?


    As SQL Server 2017 was announced in October of 2017, our team was already


    working on the next release of SQL Server including improvements specifically
    targeted


    for SQL Server on Linux and containers. By the time this book releases, it is
    very likely we


    will have made announcements regarding how we are improving SQL Server on Linux


    and containers. These enhancements include but are not limited to:


    •  SQL Server Replication


    •  Machine Learning Services including R, Python, and maybe even


    other languages


    •  Distributed Transactions (DTC) support


    •  Active Directory integration for Replication and Linked Servers


    •  Polybase for SQL Server on Linux


    © Bob Ward 2018


    B. Ward,  *Pro SQL Server on Linux*, [https://doi.org/10.1007/978-1-4842-4128-8_12](#index_split_008.html#p604)


    Chapter 12   epilogue


    We also want to continue to make containers a great experience, so we have plans
    for


    these improvements:


    •  Containers images for RHEL


    •  Moving containers to be registered in the Microsoft Container


    Registry (MCR; you can still find them on Docker Hub, but they will


    be linked to MCR). You can read more about MCR at [https://azure.](https://azure.microsoft.com/blog/microsoft-syndicates-container-catalog)


    [microsoft.com/blog/microsoft-syndicates-container-catalog](https://azure.microsoft.com/blog/microsoft-syndicates-container-catalog).


    •  Kubernetes support for Always On Availability Groups. This


    one is exciting because it provides a far better RTO story for k8s


    with SQL Server than shared storage. Travis Wright has built a


    video already to preview the experience at [https://youtu.be/](https://youtu.be/Xa1ec4z6XIk?list=PL-_k_UrAvrYsSydSyVeXIXy-vInFEruxr)


    [Xa1ec4z6XIk?list=PL-_k_UrAvrYsSydSyVeXIXy-vInFEruxr.](https://youtu.be/Xa1ec4z6XIk?list=PL-_k_UrAvrYsSydSyVeXIXy-vInFEruxr)


    You will also see that Microsoft has in store other new features and enhancements


    with the next release of SQL Server for both Windows and Linux. In addition, we
    are


    looking at new innovations for integration with Big Data systems and the General


    Availability of SQL Operations Studio (I wouldn’t be surprised if there is a new
    name for


    this tool).


    The future for SQL Server is bright. Shipping SQL Server on Linux has opened up


    new markets, new customers, and new opportunities for Microsoft. At the same time,
    we


    still strongly believe in SQL Server on Windows Server as a great combination.
    It is all


    about choice with compatibility: your choice. Doubling down on new technologies
    like


    containers and Kubernetes positions SQL Server as a data platform for all developers,


    applications, and private and public cloud environments. I look forward to continuing
    to


    help Microsoft make SQL Server the preferred modern data platform for years to
    come.


    **Index**


