- fmt: "# Chapter 11 SQL Server and Containers\n\n## Build Your Own Container with\
    \ a Dockerfile\n\nWhat I’ve shown you so far is how to interact with and add data\
    \ to a Docker container from the SQL Server image on the Docker Hub site. Docker\
    \ containers with SQL Server could also help you with another interesting scenario.\
    \ Let’s say you have several developers working on an application with SQL Server.\
    \ You typically set up a development server and let the developers access the\
    \ server. One issue with this configuration is setting up an environment so developers\
    \ have a consistent database with a consistent version of SQL Server for all of\
    \ the developers.\n\nContainers bring a new strategy to this scenario. You could\
    \ build a Docker image based on the SQL Server image and include in the image\
    \ a backup of the standard database you want all developers to use. Then any developer\
    \ can pull the Docker image and run a container (like having their own sandbox).\
    \ In addition, one of the great features of Docker images is reusability. You\
    \ can *layer* images by creating images based on other images.\n\nLet’s use the\
    \ exact steps from the self-paced labs at [Microsoft/sqllinuxlabs/tree/master/containers](https://github.com/Microsoft/sqllinuxlabs/tree/master/containers)\
    \ to show an example of this. (I assume you have run the commands previous in\
    \ the chapter to clone the GitHub repo for the labs.)\n\n1.  Change directory\
    \ to the `mssql-custom-image-example` folder on your Linux server by running the\
    \ following command from the bash shell:\n\n    ```\n    cd sqllinuxlabs/containers/mssql-custom-image-example\n\
    \    ```\n\n2.  Create a `Dockerfile` that has the following contents (I have\
    \ provided in the examples for the book the file `Dockerfile` for you to compare)\
    \ by typing in the following commands from the bash shell (Note: when you run\
    \ the `cat` command you will get a `>` prompt to type in the rest):\n\n    ```\n\
    \    cat <<EOF>> Dockerfile\n    > FROM microsoft/mssql-server-linux:latest\n\
    \    > COPY ./SampleDB.bak /var/opt/mssql/data/SampleDB.bak\n    > CMD [\"/opt/mssql/bin/sqlservr\"\
    ]\n    > EOF\n    ```\n\n    When you build the Docker image using the `docker\
    \ build` command, Docker will by default look for a file called `Dockerfile`.\
    \ Let’s unpack what these commands say in the file:\n\n    *   **`FROM microsoft/mssql-server-linux:latest`**:\
    \ This command says to pull down the latest SQL Server Docker image as a base\
    \ image (which is based on the Ubuntu base image) for our new image to be created.\
    \ It is possible you want all developers testing and developing on a known build,\
    \ so you could pick a specific CU, which I’ve shown you how to pull in the previous\
    \ section. Note that for SQL Server 2017, `microsoft/mssql-server-linux:latest`\
    \ and `Microsoft/mssql-server-linux:2017-latest` are the same but we produce two\
    \ different images for each name.\n\n    *   **`COPY ./SampleDB.bak /var/opt/mssql/data/SampleDB.bak`**:\
    \ This command says to copy the `SampleDB.bak` file in the current directory into\
    \ the Docker container image.\n\n    *   **`CMD [“/opt/mssql/bin/sqlservr”]`**:\
    \ This command says to run the `sqlservr` program from the `/opt/mssql/bin` directory.\
    \ This is how SQL Server runs in a container.\n\n3.  Now run the following command\
    \ from the bash shell to build the new Docker image:\n\n    ```\n    sudo docker\
    \ build . -t mssql-with-backup-example\n    ```\n\n    The `.` is the PATH for\
    \ the `docker build` command, which in this case is all the files in the current\
    \ directory. The `-t` parameter is used to *tag* the new image with the name `mssql-with-backup-example`.\
    \ This tag name can be referenced when you run a container from this image.\n\n\
    \    On my Linux server, the results looked like the following:\n\n    Sending\
    \ build context to Docker daemon  3.263MB\n\nTo prove I can run two containers\
    \ with SQL Server at once (not against the same volume), let’s stop the `sql1`\
    \ container if you had `sql1` running but leave the `sql2` container running with\
    \ the following commands:\n\n```\nsudo docker stop sql1\n```"
