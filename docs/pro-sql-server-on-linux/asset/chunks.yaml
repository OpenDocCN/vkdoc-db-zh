    # SQL Server 的管理与监控


    ## 更改 SQL Server 实例配置的方法


    我在之前的章节中讨论过三种更改 SQL Server 实例默认配置的方法。我在此列出这个清单纯粹是为了复习，以确保你了解 SQL Server 实例配置有哪些选项：


    ### mssql-conf


    `mssql-conf` 是一个 bash shell 脚本，用于配置那些无法通过 T-SQL 连接完成的选项。我在本书中已经展示过几个示例，但完整的选项列表可以在
    [`docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf`](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf)
    找到。我建议你每次使用此功能时，都创建一个脚本并跟踪所有执行情况，以便进行变更控制。


    ### ALTER SERVER CONFIGURATION


    `ALTER SERVER CONFIGURATION` 是一条 T-SQL 语句，用于进行实例级别的配置更改。我在过去的章节中向你展示过该语句的两个例子：`PROCESS
    AFFINITY` 和 `SOFTNUMA`。该语句的完整选项列表可以在 [`docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql)
    找到。


    ### sp_configure


    `sp_configure` 是一个系统存储过程，用于修改各种类型的实例级别配置选项。我在之前的章节中向你展示过一些与性能、安全性和高可用性相关的更重要的选项。还有其他选项，但我认为到目前为止在书中涵盖的是最重要的。`sp_configure`
    的完整选项列表可以在 [`docs.microsoft.com/sql/database-engine/configure-windows/server-configuration-options-sql-server`](https://docs.microsoft.com/sql/database-engine/configure-windows/server-configuration-options-sql-server)
    找到。文档说明了某些配置选项需要重新启动 SQL Server。所有选项都需要执行 T-SQL 语句 `RECONFIGURE` 才能生效。


    > **注意：** 我在之前的章节中还介绍了 `ALTER DATABASE SCOPED CONFIGURATION` T-SQL 语句，它允许你在数据库级别配置通常需要实例级别修改才能使用的选项。


    ## 创建 SQL Server 代理作业


    SQL Server 代理是一项计划服务，在 Linux 上部署 SQL Server 时会一同安装。SQL Server 代理提供了创建*作业*的功能，然后可以使用不同的频率选项来安排作业的执行。作业通过一系列*作业步骤*执行。作业步骤定义了要在作业中执行的一组特定的
    T-SQL 语句。


    > **注意：** 在 SQL Server 2017 CU4 之前，SQL Server 代理需要一个单独的软件包。从 2017 CU4 开始，SQL Server
    代理与 `mssql-server` 软件包捆绑在一起。此外，Linux 上的 SQL Server 仅提供包含一组 T-SQL 语句的作业步骤。Windows
    上的 SQL Server 包含多个支持其他类型作业步骤的*子系统*。


    能够使用 SQL Server 代理的第一步是启用此功能，方法是从 bash shell 运行以下命令，使用 `mssql-conf`：


    ```bash

    sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

    sudo systemctl restart mssql-server

    ```


    此时，你现在可以通过 T-SQL 系统存储过程（例如 `sp_add_job`）、使用 SQL Operations Studio 的扩展或使用 SQL Server
    Management Studio (SSMS) 来创建 SQL Server 代理作业。


    我们的文档中有一个很好的示例，展示了如何通过 T-SQL 系统存储过程创建一个每日备份数据库的作业，网址是 [`docs.microsoft.com/sql/linux/sql-server-linux-run-sql-server-agent-job#create-a-job-with-transact-sql`](https://docs.microsoft.com/sql/linux/sql-server-linux-run-sql-server-agent-job#create-a-job-with-transact-sql)。


    使用 SSMS 创建作业的示例可以在 [`docs.microsoft.com/sql/linux/sql-server-linux-run-sql-server-agent-job#create-a-job-with-ssms`](https://docs.microsoft.com/sql/linux/sql-server-linux-run-sql-server-agent-job#create-a-job-with-ssms)
    看到。


    图 9-1 显示了使用 SQL Operations Studio 中的 SQL 代理扩展创建新作业的示例。


    ![图 9-1. 使用 SQL Operations Studio 创建 SQL 代理作业](img/index-461_1.jpg)


    由于 SQL Server 代理支持可以执行任何 T-SQL 语句或在系列步骤中执行语句集的作业，因此你可以使用 SQL Server 代理来执行任何你想要按计划或临时运行的任务。


    Linux 用户可能更喜欢使用 `cron` 系统 ([`en.wikipedia.org/wiki/Cron`](https://en.wikipedia.org/wiki/Cron))
    来安排命令，这些命令可以使用像 `sqlcmd` 这样的程序来执行 T-SQL 命令。我的建议是，如果你只需要为任何应用程序需求或任务运行 T-SQL 语句，请使用
    SQL Server 代理。如果你需要将其他 Linux 命令或 shell 脚本与 T-SQL 脚本一起作为一个单元来运行，我会使用 `cron`。


    ## 使用资源调控器


    可能存在一些场景，你希望控制与 SQL Server 相关的应用程序的用户和查询在 CPU、内存和 I/O 方面的资源。SQL Server 提供了一个名为*资源调控器*的功能来控制这些资源。资源调控器由以下对象组成：


    ### 资源池


    资源池定义了在物理资源（如 CPU、内存和 I/O）上指定的约束。SQL Server 安装时附带两个池：

    1.  `internal`，用于 SQL Server 的后台和系统任务以及工作线程。

    2.  `default`，这是一个预定义的池，用于用户任务，如果未创建用户定义的池，则它是“默认”池。


    你可以通过 T-SQL 创建自己的用户定义资源池。你可以在 [`docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-resource-pool`](https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-resource-pool)
    阅读更多关于资源池的信息。


    > **注意：** 你可以更改默认池的设置，但不能更改内部池的设置。


    以下是你可以配置的资源池的一些属性：

    - `CAP_CPU_PERCENT`：与此池关联的工作组用户（稍后描述）的 CPU 利用率将受到限制，适用于任何 SQL Server 工作线程的使用。

    - `MAX_MEMORY_PERCENT`：与此池关联的工作组用户，在与查询执行相关的内存授予（哈希、排序等）方面将受到限制。此设置不影响为缓冲池或任何其他缓存分配的内存。

    - `AFFINITY`：这是一个有趣的设置。使用此设置可以将 NUMA 节点和 CPU 的亲和性定向到与此池关联的任何工作组用户

    '
- fmt: '# Chapter 9: Managing and Monitoring SQL Server


    with this pool to only run on the designed node(s) or CPU(s). This is an excellent
    technique to direct specific applications to only run on specific NUMA node(s)
    or CPU(s). This is also a more granular method to "affinitize" SQL Server than
    server configuration options (resource group affinity runs within the constraints
    of the affinity of the SQL Server instance).


    ## MAX_IOPS_PER_VOLUME

    This setting controls the maximum physical IO operations per second (IOPS) for
    workload group users associated with this pool per unique disk volume. Unique
    disk volume means unique physical disk based on files for the database. The big
    "gotcha" for this setting is that it only applies to any I/O operation executed
    under the context of a `user task`. That means any I/O under the context of a
    background task (Log Writer, Recovery Writer, Checkpoint, …) will not honor this
    setting (and you cannot change the internal pool setting to which they belong).


    Pools also support "min" settings for CPU, memory, and I/O. Things can get a bit
    interesting if you start to play with minimum and maximum settings. Our documentation
    has a nice table that describes the effective settings, should you decide to do
    this. Read more at [https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-resource-pool](https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-resource-pool).


    ## Workload groups

    A workload group is a container of user tasks that are assigned to a resource
    pool. A workload group is the method to group a set of users together to restrict
    resource usage. Two workload groups are installed by default, `internal` and `default`,
    which are mapped to the corresponding resource pools by the same name. You can
    create your own workload group through `T-SQL`. If you don''t create a user-defined
    workload group, all logins will be mapped to the default workload group (which
    is mapped to the default resource pool). You can read more about workload groups
    at [https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-workload-group](https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-workload-group).


    Workload groups allow you to specify settings at a more granular level than the
    pool they are associated with. For example, you can configure `REQUEST_MAX_MEMORY_GRANT_PERCENT`
    to specify the maximum memory grant for workload group users. This is applied
    within the maximum already established for the pool.


    **Note** there is a good description of memory grants by one of our top developers,
    Jay Choe, at [https://blogs.msdn.microsoft.com/sqlqueryprocessing/2010/02/16/understanding-sql-server-memory-grant](https://blogs.msdn.microsoft.com/sqlqueryprocessing/2010/02/16/understanding-sql-server-memory-grant).


    One unique setting for a workload group is `MAXDOP`. I''ve discussed parallel
    query execution in a previous chapter and how you can configure the maximum workers
    applied to a query plan operator through `sp_configure`, `ALTER DATABASE`, and
    even a query hint. Workload groups allow you to specify a `MAXDOP` setting for
    all users in the group. Using a combination of these `MAXDOP` settings can perhaps
    get confusing. Here is guidance on how the order of precedence is applied for
    `MAXDOP`:


    ```

    • MAX_DOP as a query hint is honored as long as it does not exceed workload group
    MAX_DOP.

    ```'
