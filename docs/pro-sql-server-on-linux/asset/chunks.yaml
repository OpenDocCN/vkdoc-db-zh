    # 第 11 章 SQL Server 与容器


    我将容器视为新一代的虚拟机。但容器与`SQL Server`等应用程序和数据库平台相结合所带来的兴奋感和采用率，其增长速度比我曾见过的虚拟机普及过程要快得多。


    在本章中，我将首先向您介绍容器的概念，然后相当深入地讨论并举例说明如何在`SQL Server`中使用容器。最后，我将以一个有趣的示例结束本章：在`macOS`上使用`SQL
    Server`（`Mac`用户可能认为我在本书中忽略了他们），并讨论如何在名为`Kubernetes`的容器平台中使用`SQL Server`。我想您会喜欢本章内容。这是我在本书中最喜欢撰写的章节之一。


    ## 容器简介


    虚拟机最贴切的定义是`硬件虚拟化`，而容器（或容器化）则被定义为`操作系统虚拟化`。虚拟机由一个在主机（裸机硬件）上运行的完整操作系统（客户机）组成。因此，一台主机承载多个虚拟机是很常见的。每个虚拟机都可以运行不同的客户操作系统。


    © Bob Ward 2018


    B. Ward, *Pro SQL Server on Linux*, [`https://doi.org/10.1007/978-1-4842-4128-8_11`](https://doi.org/10.1007/978-1-4842-4128-8_11)


    ![](img/index-564_1.jpg)


    容器依赖于一个共享内核资源的单一主机操作系统（该主机操作系统本身可以是一个虚拟机）。这使得容器比虚拟机更轻量级。尽管容器共享单一的操作系统内核，但它们彼此之间是隔离的。我很喜欢下面这个直观的示意图（图
    11-1），我是在 `https://i.stack.imgur.com/exIhw.png` 找到的，它展示了容器与虚拟机的区别。


    ### 图 11-1. 容器 vs. 虚拟机


    此外，这个 `stackoverflow.com` 帖子很好地描述了虚拟机与容器之间的区别：[`https://stackoverflow.com/questions/16047306/how-is-docker-different-from-a-virtual-machine`](https://stackoverflow.com/questions/16047306/how-is-docker-different-from-a-virtual-machine)。关于这个帖子的一点说明：帖中描述了一种称为
    `AuFS` 的联合文件系统 (`UnionFS`) 的使用。`UnionFS` 对于 `Docker` 容器是一个重要概念，因为它支持分层文件系统。当前版本的
    `Docker` 仍然使用联合文件系统，但现在使用的是一个名为 `OverlayFS` 的系统。您可以在 [`https://docs.docker.com/storage/storagedriver/overlayfs-driver/`](https://docs.docker.com/storage/storagedriver/overlayfs-driver/)
    阅读更多关于 `OverlayFS` 的信息。


    `Docker` 容器是使用`镜像`创建的，镜像指定了文件系统的内容以及容器中运行的程序。容器就是一个镜像的实例。您可以基于同一个镜像运行多个容器。一个 `Dockerfile`
    指定了 `Docker` 镜像的内容。`Docker` 提供了从 `Dockerfile` 规范`构建` `Docker` 镜像的功能。此外，`Docker`
    还支持使用一个名为 `compose` 的工具来构建多容器应用程序的功能。在下一节中，我将以 `SQL Server` 为例，向您展示更多关于 `Docker`
    镜像、文件和 `compose` 的内容。


    `Docker` 容器具有以下特点：


    *   **可移植性：** 您构建的任何 `Docker` 镜像都可以在任何支持 `Docker` 容器的地方运行，包括多种操作系统以及公有云和私有云。我曾在
    `Windows`、`Linux`、`macOS` 和 `Azure` 上运行过 `Docker` 容器。

    *   **轻量级：** 如前所述，`Docker` 容器不像虚拟机那样包含一个完整的操作系统。`Docker` 容器共享内核资源，因此比虚拟机更轻量级。

    '
- fmt: '# Chapter 11 SQL Server and Containers


    ## How to use SQL Server with Containers


    **Consistent:** Container images allow you to deploy a consistent version of your
    application or database system like SQL Server. I’ll talk more about how this
    benefits SQL Server later in the chapter.


    **Efficient:** Docker containers provide a mechanism for faster deployment, less
    downtime, and easier updates. I’ll explain how this benefits SQL Server in the
    next section.


    Docker uses two main components to help you manage Docker containers:


    *   **Docker client:** This is a program called `docker`, which you will use with
    several options to build images and pull, run, start, stop, and manage containers.
    You will learn more about these Docker concepts through the examples in the chapter.

    *   **Docker daemon:** The Docker client communicates with the daemon program,
    which does all the work as instructed by the client to build images and manage
    and run containers.


    Docker containers use a concept called *namespaces* to isolate one container from
    each other (you can read more about the use of namespaces at [https://docs.docker.com/engine/docker-overview/#the-underlying-technology](https://docs.docker.com/engine/docker-overview/#the-underlying-technology)).
    Even though containers are isolated, they can still communicate with each other
    (over TCP/IP example). Use the Docker documentation as your complete reference
    for containers at [https://docs.docker.com](https://docs.docker.com). For your
    reference, please consider reading these other excellent resources I found on
    containers: [http://theearlybirdtechnology.com/2017/08/12/docker-cheatsheet/](http://theearlybirdtechnology.com/2017/08/12/docker-cheatsheet/)
    and [https://www.quora.com/What-exactly-is-a-base-image-in-Docker](https://www.quora.com/What-exactly-is-a-base-image-in-Docker).


    Let’s dive right in to explain how you can use containers with SQL Server and
    database applications.


    In this section of the book, I’m going to show you practical examples of the fundamental
    concepts of containers I’ve introduced you to in the opening section. I will show
    you how to deploy a simple container with SQL Server, use containers to show how
    to minimize downtime for updates, build and deploy an image using a `Dockerfile`,
    and finally implement a multicontainer deployment with SQL Server and an application.


    One thing to remember as you read this section: `SQL Server on Linux` does not
    support multiple instances (this is called named instances on Windows) on the
    same server, so containers is the method to use should you want to run multiple
    SQL Server instances on the same Linux server.


    During the time I was writing this book, my colleague Vin Yu and I built a series
    of free, self-paced labs for `SQL Server on Linux` and Docker containers at [https://github.com/Microsoft/sqllinuxlabs](https://github.com/Microsoft/sqllinuxlabs).
    Vin built the labs to explorer Docker containers (found at [https://github.com/Microsoft/sqllinuxlabs/tree/master/containers](https://github.com/Microsoft/sqllinuxlabs/tree/master/containers)).
    I will use pieces of this lab in this section to show you how to use SQL Server
    with containers.


    (I’ve added a few scripts as examples with the book that you can use with these
    labs.) I may not go in the exact order of Vin’s labs every time, and I’ll explain
    a few more details behind the commands you will run to see SQL Server containers
    in action.


    To show you these examples, I created a new Azure Virtual Machine running RHEL
    7.5. (My VM size is a Standard D16s v3 [16 vcpus, 64 GB memory] but you can do
    this with a smaller sized VM. Just make sure to have at least 4 vpus and 16GB
    RAM). I then ran the following commands from the `bash` shell to update the VM,
    install the `git`.


    ```

    sudo yum update -y

    sudo yum install git -y

    ```'
