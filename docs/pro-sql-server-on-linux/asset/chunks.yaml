    # Chapter 6 Performance Capabilities


    Each rowgroup contains one segment for each column that makes up the columnstore
    index. SQL Server first slices the data into rowgroups, and then compresses each
    segment within that group.


    **`clustered columnstore index`**: The entire table is stored as a columnstore
    index. In this scenario, you cannot create a normal clustered index, but you can
    create normal nonclustered indexes to support `UNIQUE` constraints.


    **`nonclustered columnstore index`**: A set of columns that make up the index
    is stored as a columnstore index over the base table (which could have a normal
    clustered index).


    **`delta rowgroup`**: A clustered index internally used to store data for a columnstore
    index until enough data is populated in the index to allow it to be compressed.
    Turns out that magic number is `102,400` rows. You don’t create a delta rowgroup;
    SQL Server does this automatically. Therefore, it is not going to make much sense
    to use columnstore indexes on tables that have less than `102,400` rows. Once
    a delta rowgroup reaches this magic size, it is compressed into a columnstore
    rowgroup.


    My colleague at Microsoft, Sunil Agarwal, is the “godfather” of columnstore indexes
    ever since it first appeared in SQL Server 2012. We chatted about the fundamentals
    of columnstore indexes and he showed me this basic visualization of how columnstore
    is structured, as seen in Figure 6-19.


    Figure 6-19. The basic structure of columnstore indexes


    In this diagram, if you build a clustered columnstore index on a table with columns
    `C1`...`C5`, this would be the structure of the clustered columnstore index.


    Even though a columnstore index requires a copy of the data for columns it contains,
    SQL Server uses efficient compression techniques, so the overhead is less than
    you might expect. The performance benefits can be enormous. Sunil summarized for
    me three fundamental benefits of columnstore:


    - **Compression**: Clustered columnstore indexes are the primary storage for the
    table. We have seen some customers achieve up to `10×` compression ratios on their
    base table data. These compression ratios help you fit more of your data in physical
    memory. And SQL Server will only uncompress the data you need when you need it.
    Furthermore, compression algorithms can be more efficient when compressing data
    in a column-wise fashion.

    - **Data elimination**: Since data is stored in a column-wise format, SQL Server
    can skip columns you are not accessing through your query. Furthermore, SQL Server
    has the ability to understand which rowgroups of columns segments are required
    for your query and only access the required rowgroups. This is a concept called
    `rowgroup elimination`.

    - **Batch Mode execution**: Batch mode execution is a technique used by the query
    processor to process rows together with query processor operators vs. one row
    at a time. This style of execution can provide a boost to query performance. In
    addition, you will see a new feature in SQL Server 2017 called adaptive query
    processing that can take advantage of this functionality to provide intelligent
    query execution.


    ## When and Which Should I Choose?


    The first natural question that comes up when I talk to customers about columnstore
    indexes is: when should I use a columnstore index vs. a traditional clustered
    or nonclustered b-tree index (also called a rowstore index)? The advice is a bit
    simpler than you might think.


    First, you need to consider whether a clustered columnstore index is right for
    your workload. Clustered columnstore indexes are best used for data warehouse
    scenarios where the workload is mostly read based. Most data warehouses have a
    large number of rows (`> 100,000` rows) so clustered columnstore indexes fit very
    well for `fact` tables and `dimension` tables with a minimum of `102,400` rows
    (there is a good description of fact and dimension tables at this resource `https://en.wikipedia.org/wiki/Data_warehouse`).


    Want some proof of clustered columnstore index performance? All the `TPC-H` benchmarks
    produced by Microsoft use them. You can also see this demo, where I show you the
    performance differences of using clustered columnstore indexes using the popular
    tool `PowerBi` on YouTube: `https://youtu.be/Y270nS42yL8?list=PL-_k_UrAvrYvJh21uc8xebV18YW8sfpHE`.
    You can try this demo yourself by using my scripts from GitHub at `https://github.com/Microsoft/bobsql/tree/master/demos/rhelsummit2018/columnstore`.


    Let’s say you don’t have a data warehouse so you will not use a clustered columnstore
    index. What about a nonclustered columnstore index? A nonclustered columnstore
    index fits nicely into scenarios that involve operational or OLTP workloads but
    some columns may be involved in queries that are `range queries`. A range query
    is one that typically you know will involve finding a fairly large number of rows
    (typically `100` or more) vs. a `seek query`, which is typically targeting one
    or a few rows. If you know you have queries on operational workloads that will
    require requesting a large number of rows for specific columns, consider creating
    nonclustered columnstore indexes. Using nonclustered columnstore indexes in this
    scenario is often called `Hybrid Transactional Analytical Processing` (`HTAP`).
    I’ve also seen it called real-time operational analytics.


    There is an excellent table in the documentation that summarizes your choice on
    whether a columnstore index may be right for your workload, and which type of
    index may be best for your workload, at `https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-design-guidance#choose-the-best-columnstore-index-for-your-needs`.
    Nothing beats experimentation and testing, and I always recommend you do this
    with columnstore indexes.


    ## Columnstore in Action


    To see a clustered columnstore index in action, let’s look at the `WideWorldImportersDW`
    example database.


    **Note**: This demo requires the `WideWorldImportersDW` sample database as found
    at `https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak`.
    So you can copy the backup from another machine or run the following command to
    download the backup directly in your Linux server: `wget https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak`.'
