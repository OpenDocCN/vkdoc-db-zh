    WHERE xeo.object_type = ''event''

    AND (xeo.capabilities IS NULL OR xeo.capabilities & 1 = 0) -- 筛选出公共事件

    ORDER BY xeo.name, xeoc.name

    GO

    ```


    注意在上面的查询中，我使用了 DMV 中一个名为 `capabilities` 的列。某些 XEvent 事件、操作和目标被认为是 *private*（私有的）。私有的
    XEvent 对象不能在用户会话中使用，因为它们支持 SQL Server 的某个功能，例如 SQL Server 审核。


    **Target（目标）**：目标是一个可以发布和存储事件以供消费的去处。两种基本的目标类型是 `event_file`（将事件保存到文件）和 `ring_buffer`（将事件保存到服务器重启后不会持久的内存缓冲区）。还有其他目标具有内置的“智能”，例如直方图目标。完整的目标列表可以在我们的文档中找到：[`docs.microsoft.com/sql/relational-databases/extended-events/targets-for-extended-events-in-sql-server`](https://docs.microsoft.com/sql/relational-databases/extended-events/targets-for-extended-events-in-sql-server)。


    **Action（操作）**：当一个事件被触发并发布到目标时，该事件中的所有列都是可用的（有些列需要设置才能发布其数据，因为收集该列可能会消耗额外资源）。操作是...'
- fmt: "data orthogonal to the columns for an event that can be captured as part of\
    \ an event session. An example of an action is `sql_text`, which is the text of\
    \ a T-SQL query. `sql_text` is not a column for every event, so this means in\
    \ many cases you can capture the T-SQL query associated with an event, where without\
    \ this action it would not be possible.\n\n# Chapter 5 SQL Server Tools\n\nAn\
    \ excellent description of the sequence of how events, targets, and actions work\
    \ together can be found in our documentation at [https://docs.microsoft.com/sql/relational-databases/extended-events/sql-server-extended-events-engine](https://docs.microsoft.com/sql/relational-databases/extended-events/sql-server-extended-events-engine).\n\
    \n## `Usage and Scenarios`\n\nTo use Extended Events, you must create a `session`.\
    \ Sessions are persisted in system tables stored in the master database and exposed\
    \ through catalog views. Once you create a session, you must start the session\
    \ for the instrumentation points defined for the events to be *fired* and published\
    \ to the defined target(s). At any point in time, you can stop the session and\
    \ all events will no longer be fired, but the event definition is persisted in\
    \ the master database. You can find all Extended Event definitions in the catalog\
    \ view `sys.server_event_sessions`. You can find a list of all started Extended\
    \ Event sessions from the `sys.dm_xe_sessions` DMV.\n\nThe following example query\
    \ as found in the sample script `quicksessionstandard.sql` shows how to create\
    \ an Extended Event session to collect basic information about SQL Server connections\
    \ and queries (this event definition is based on the XEProfiler SQL Server Management\
    \ Tool feature):\n\n```sql\n-- Create a XEvent session based on the XEProfiler\
    \ feature in SSMS to collect connections and queries\n--\nCREATE EVENT SESSION\
    \ [QuickSessionStandardToFile] ON SERVER\nADD EVENT sqlserver.attention(\n   \
    \ ACTION(package0.event_sequence,sqlserver.client_app_name,sqlserver.client_pid,sqlserver.database_id,sqlserver.database_name,sqlserver.nt_username,sqlserver.query_hash,sqlserver.server_principal_name,sqlserver.session_id)\n\
    \    WHERE ([package0].[equal_boolean]([sqlserver].[is_system],(0)))),\nADD EVENT\
    \ sqlserver.existing_connection(SET collect_options_text=(1)\n    ACTION(package0.event_sequence,sqlserver.client_app_name,sqlserver.client_hostname,sqlserver.client_pid,sqlserver.nt_username,sqlserver.server_principal_name,sqlserver.session_id)),\n\
    ADD EVENT sqlserver.login(SET collect_options_text=(1)\n    ACTION(package0.event_sequence,sqlserver.client_app_name,sqlserver.client_hostname,sqlserver.client_pid,sqlserver.nt_username,sqlserver.server_principal_name,sqlserver.session_id)),\n\
    ADD EVENT sqlserver.logout(\n    ACTION(package0.event_sequence,sqlserver.client_app_name,sqlserver.client_pid,sqlserver.nt_username,sqlserver.server_principal_name,sqlserver.session_id)),\n\
    ADD EVENT sqlserver.rpc_completed(\n    ACTION(package0.event_sequence,sqlserver.client_app_name,sqlserver.client_pid,sqlserver.database_id,sqlserver.database_name,sqlserver.nt_username,sqlserver.query_hash,sqlserver.server_principal_name,sqlserver.session_id)\n\
    \    WHERE ([package0].[equal_boolean]([sqlserver].[is_system],(0)))),\nADD EVENT\
    \ sqlserver.sql_batch_completed(\n    ACTION(package0.event_sequence,sqlserver.client_app_name,sqlserver.client_pid,sqlserver.database_id,sqlserver.database_name,sqlserver.nt_username,sqlserver.query_hash,sqlserver.server_principal_name,sqlserver.session_id)\n\
    \    WHERE ([package0].[equal_boolean]([sqlserver].[is_system],(0)))),\nADD EVENT\
    \ sqlserver.sql_batch_starting(\n    ACTION(package0.event_sequence,sqlserver.client_app_name,sqlserver.client_pid,sqlserver.database_id,sqlserver.database_name,sqlserver.nt_username,sqlserver.query_hash,sqlserver.server_principal_name,sqlserver.session_id)\n\
    \    WHERE ([package0].[equal_boolean]([sqlserver].[is_system],(0))))\nADD TARGET\
    \ package0.event_file(SET filename=N'QuickSessionStandard\n```"
