- fmt: '# Chapter 5 SQL Server Tools


    ## Creating and Managing Extended Events Sessions


    This example query as found in the sample `start_xevent_session.sql` shows how
    to start the session created:


    ```sql

    -- Start the XEvent session

    ALTER EVENT SESSION [QuickSessionStandardToFile] ON SERVER STATE = start

    GO

    ```


    By default, a file target for an extended events session is stored in the `/var/opt/mssql/log`
    directory.


    There are several options when you create an Extended Event session, such as controlling
    memory and scalability. You can find the complete list of options in our documentation
    at [https://docs.microsoft.com/sql/t-sql/statements/create-event-session-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/create-event-session-transact-sql).
    SQL Server also provides the capability of starting a session you create when
    SQL Server is first started, using the `STARTUP_STATE` option when you create
    the event definition (An example might be to trace database recovery at startup).


    Once you create an Extended Event session, you can add events or alter the definition.
    You can find how to do this in our documentation at [https://docs.microsoft.com/sql/relational-databases/extended-events/alter-an-extended-events-session](https://docs.microsoft.com/sql/relational-databases/extended-events/alter-an-extended-events-session).


    One of the amazing built-in extended event sessions is the `system_health` session.
    I’ll discuss how to use this session in Chapter 9.


    ## Tools


    Extended Events can be controlled and consumed using the T-SQL language. To view
    data from Extended Events targets that are memory-based, you can query the `dm_xe_session_targets`
    DMV. An example of how to view the XML data in a `ring_buffer` target can be found
    in our documentation at [https://docs.microsoft.com/sql/relational-databases/extended-events/targets-for-extended-events-in-sql-server#h2_target_ring_buffer](https://docs.microsoft.com/sql/relational-databases/extended-events/targets-for-extended-events-in-sql-server#h2_target_ring_buffer).


    File targets can be read with T-SQL, using the system function `sys.fn_xe_file_target_read_file`,
    which is documented at [https://docs.microsoft.com/sql/relational-databases/system-functions/sys-fn-xe-file-target-read-file-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-functions/sys-fn-xe-file-target-read-file-transact-sql).


    Application developers have the ability to read XEvent targets, including a “live”
    event stream target via the following object models: [https://msdn.microsoft.com/library/microsoft.sqlserver.management.xevent.aspx](https://msdn.microsoft.com/library/microsoft.sqlserver.management.xevent.aspx)
    and [https://msdn.microsoft.com/library/microsoft.sqlserver.xevent.linq.aspx](https://msdn.microsoft.com/library/microsoft.sqlserver.xevent.linq.aspx).'
