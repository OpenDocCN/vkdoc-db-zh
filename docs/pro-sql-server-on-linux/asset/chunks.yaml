    \n![](img/index-68_1.png)\n\n## 第 2 章 安装与配置\n\n如果你查看此输出，会看到一个主 PID（代表进程 ID），下面列出了两个进程\
    \ ID。\n\n回想一下，在第 1 章中，我提到当 SQL Server 启动时，存在一个父级“看门狗”进程。在你从 `systemctl` 看到的输出中，顶部进程\
