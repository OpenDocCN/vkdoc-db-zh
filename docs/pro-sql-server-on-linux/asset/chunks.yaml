- fmt: '## 同步选项


    AG 为辅助副本提供了两种同步选项，也称为 *可用性模式*:


    - **同步 (sync)**: (`AVAILABILITY_MODE = SYNCHRONOUS_COMMIT`) 事务在主副本上等待，直到该事务在主副本上提交，并且与该事务关联的日志记录在辅助副本上被固化。

    - **异步 (async)**: (`AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT`) 事务在主副本上提交时，会等待事务在主副本上提交，但不会等待事务在辅助副本上被固化。


    创建 AG 时，你为特定的辅助副本选择特定的可用性模式。这意味着一个 AG 可以有多个副本以及多种副本组合，包括同步和异步。可用性模式的选择完全取决于你的
    RPO 需求。使用同步副本旨在实现几乎零数据丢失，因为副本将与主副本事务日志中所做的更改保持同步。使用同步复制的代价是传输日志记录更改并在辅助副本的事务日志上固化它们所需的时间。异步副本最适用于不需要最新更改但仍希望读取接近主副本的辅助副本数据的应用程序。异步副本的另一个用途是灾难恢复场景，其中副本位于具有延迟的网络上，使其不适合作为同步副本候选。


    与 AG 的可用性模式密切相关的是 *故障转移模式*。我将在本章的下一节讨论这一点。


    ## 集群与可用性组


    AG 本身提供了使副本与主副本的更改保持同步的机制。然而，要使 AG *高度可用*，需要智能判断主副本是否不可用以切换到辅助副本。这种智能由类似 FCI 的集群软件提供。就像
    FCI 一样，对于 Linux 上的 SQL Server，使用 Pacemaker 软件堆栈来提供集群故障转移功能。


    创建 AG 并指定同步副本时，你还可以选择选项 `FAILOVER_MODE=AUTOMATIC`。选择此选项后，SQL Server 与 Pacemaker
    可以决定故障转移到辅助副本，前提是该副本*已完全同步*主副本事务日志上当前的所有更改。在这里，“同步”意味着主副本上所有已提交的事务都已在辅助副本的事务日志上固化。然后，如果需要发生故障转移，则在辅助副本上运行恢复，以使所有事务保持一致，这样辅助副本现在就可以作为主副本服务。当集群软件与
    SQL Server 资源代理决定故障转移到辅助副本时，该副本将成为新的主副本。


    在 SQL Server 2017 之前，如果辅助同步副本脱机或未与主副本同步，SQL Server 会允许事务在主副本上继续，但 SQL Server 不允许发生自动故障转移，因为...'
  raw: 'more about this architecture and detailed data flow in our documentation at [https://](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/monitor-performance-for-always-on-availability-groups#BKMK_DATA_SYNC_PROCESS)


    [docs.microsoft.com/sql/database-engine/availability-groups/windows/monitor-](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/monitor-performance-for-always-on-availability-groups#BKMK_DATA_SYNC_PROCESS)


    [performance-for-always-on-availability-groups#BKMK_DATA_SYNC_PROCESS](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/monitor-performance-for-always-on-availability-groups#BKMK_DATA_SYNC_PROCESS).


    ** Synchronization  Options**


    AGs offer two synchronization options, also called  *availability modes*, for
    secondary


    replicas:


    **Synchronous (sync)**: (AVAILABILITY_MODE = SYNCHRONOUS_


    COMMIT) a transaction on the primary replica wait for the


    transaction to commit on the primary and for log records


    associated with the transaction to be hardened on the secondary


    replica


    Chapter 8   high availability and disaster reCovery for sQl server


    **Asynchronous (async)**: (AVAILABILITY_MODE =


    ASYNCHRONOUS_COMMIT) transaction commits on the


    primary replica wait for the transaction to commit on the primary


    but do not wait for transactions to be hardened on the secondary


    replica


    When you create the AG, you choose the specific availability mode for a specific


    secondary. This means an AG can have multiple replicas and multiple combinations
    of


    replicas, both sync and async. Your choice of an availability mode all depends
    on your


    RPO needs. With a sync replica, you are aiming for almost no data loss, since
    a replica


    will be synchronized with changes made in the transaction log of the primary replica.


    The cost of using sync replication is the time it takes to transmit log records
    changes


    and harden them on the transaction log of the secondary. Async replicas are best
    for


    applications that don’t require the most up to the minute changes but still want
    to read


    data on a secondary replica that is close to the primary. Another use for async
    replicas is


    for disaster recovery scenarios where the replica is on a network with latencies
    that won’t


    make it a candidate for a sync replica.


    Closely associated with the availability mode of an AG is the  *failover mode*.
    I’ll


    discuss this in the next section of the chapter.


    ** Clustering and Availability Groups**


    AGs by themselves provide the mechanism to keep replicas up to date with changes


    from the primary. However, to make the AG  *highly available*, intelligence is
    needed to


    decide if the primary is not available to switch to a secondary replica. This
    intelligence


    is provided by clustering software much like with an FCI. And like a FCI, for
    SQL Server


    on Linux, the Pacemaker software stack is used to provide clustering failover
    capabilities.


    When you create an AG and specify a sync replica, you can also choose the option


    FAILOVER_MODE=AUTOMATIC. When you choose this option, SQL Server together


    with Pacemaker can decide to failover to a secondary replica, provided that replica


    *is completely synchronized* with all changes currently made on the primary replica


    transaction log. In this case, synchronized means that all committed transactions
    on the


    primary are hardened on the transaction log of the secondary. Then, if a failover
    needs


    to occur, recovery is run on the secondary to allow all transactions to be consistent,
    so


    the secondary can now server as a primary. When clustering software combined with


    the SQL Server Resource Agent decides to failover to the secondary replica, this
    replica


    becomes the new primary.


    Chapter 8   high availability and disaster reCovery for sQl server


    Prior to SQL Server 2017, if a secondary sync replica went offline or it was not


    synchronized with the primary, SQL Server would allow transactions to continue
    on


    the primary, but SQL Server would not allow an automatic failover to occur because
