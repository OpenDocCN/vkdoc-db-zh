    # 第 10 章 迁移至 Linux 上的 SQL Server


    ## HADR


    我在本书中阐述了高可用与灾难恢复特性和流程对于生产数据库平台的重要性。在本节中，我将重点说明 SQL Server 与 `pgsql` 在 HADR 方面的一些独特差异。


    ### 备份与还原


    *   SQL Server 备份支持校验和，而 `pgsql` 不支持。`SQL BACKUP WITH CHECKSUM` 会在备份过程中验证校验和。SQL
    Server 提供了 `RESTORE VERIFYONLY` 命令来验证校验和。

    *   `pgsql` 没有备份加密选项，而 SQL Server 支持加密备份。

    *   SQL Server 支持用于将备份流式传输到外部程序的虚拟设备接口（`VDI`），包括对快照备份的支持。`pgsql` 的 `pg_dump` 程序确实支持通过
    Linux 的 "管道" 将输出流式传输到另一个程序，但 `VDI` 是一个完整的协议接口，允许实现丰富的第三方备份解决方案。

    *   SQL Server 支持差异备份，但 `pgsql` 没有这个概念。你可以在 [`docs.microsoft.com/sql/relational-databases/backup-restore/differential-backups-sql-server`](https://docs.microsoft.com/sql/relational-databases/backup-restore/differential-backups-sql-server)
    阅读更多关于 SQL Server 差异备份的信息。

    *   SQL Server 支持联机进行文件组还原、部分还原和页面还原，而 `pgsql` 不支持这些操作。


    ### 启动与并行恢复


    *   我在书中描述了 SQL Server 在启动时恢复数据库的过程，包括分析、重做和回滚阶段。SQL Server 支持快速恢复的概念，允许数据库用户在重做阶段后访问数据库，同时在回滚执行期间保持对必要资源的锁。`pgsql`
    不提供此功能。

    *   SQL Server 还在恢复的重做阶段使用并行工作线程，从而加快了整体恢复过程。`pgsql` 不提供数据库的并行重做恢复。


    ### 灾难恢复


    如果你在 `pgsql` 中丢失了一个数据库表空间（例如，你将其放在了一个发生故障的独立磁盘上），整个 `pgsql` 集群可能无法启动。这根据 [`www.postgresql.org/docs/10/static/manage-ag-tablespaces.html`](https://www.postgresql.org/docs/10/static/manage-ag-tablespaces.html)
    的 `pgsql` 文档所述。任何 SQL Server 用户数据库因任何原因启动失败，都不会导致实例启动失败。


