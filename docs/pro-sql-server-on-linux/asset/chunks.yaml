    # 第 1 章 为什么要在 Linux 上运行 SQL Server？


    ## 我们是如何构建它的


    赫尔辛基项目，即 SQL Server on Linux，是我在微软 25 年职业生涯中遇到的最令人惊叹的软件成就之一。在本节中，我将向您展示我们在 Linux
    上构建 SQL Server 并能够将其以高质量和高性能推向市场的惊人背景和历程。我将讨论一个重要的软件组件，它使 SQL Server 能够运行在 Linux
    上，称为 SQL 平台抽象层（`SQLPAL`），它基于一个名为 `Drawbridge` 的微软研究院项目。此外，我还将探讨进程架构以及各个组件如何交互以使
    SQL Server 在 Linux 上运行。


    当时，增长最快的客户选择的操作系统变成了 Linux。我们拥有托管“混合”环境（Linux 和 Windows Server）的客户，他们询问我们是否会考虑推出
    Linux 版本的 SQL Server。这并不是说他们放弃了 Windows Server，而是他们希望在公司内标准化使用 SQL Server，但需要同时支持
    Linux 和 Windows Server 的选项。


    最终，Linux 合作伙伴也开始询问我们是否会考虑移植到 Linux。像 Red Hat 和 SUSE 这样的公司在企业业务中看到了巨大的增长，并认为提供数据平台的选择将有助于客户采用。


    所有这些因素在 2014 年末和 2015 年初萦绕在我们 SQL Server 工程领导层——Shawn Bice、Rohan Kumar 和 Lindsey
    Allen 的脑海中。他们在说服微软执行领导层允许我们为 Linux 构建 SQL Server 方面发挥了关键作用。他们还重新聘用了 Slava Oks
    来负责构建，并让 Tobias Ternstrom 转而领导该项目的项目管理。他们将组建一个出色的团队来启动名为 `Helsinki` 的项目。


    至此，我们已具备了动力、批准和资源来推进项目。现在的问题是，我们如何构建它？以及我们如何快速将其推向市场？


    ### Drawbridge


    2011 年 3 月，微软研究院的一个团队发表了一篇题为 *自上而下重新思考库操作系统* [`www.microsoft.com/en-us/research/wp-content/uploads/2016/02/asplos2011-drawbridge.pdf`](https://www.microsoft.com/en-us/research/wp-content/uploads/2016/02/asplos2011-drawbridge.pdf)
    的论文。该论文基于一个名为 `Drawbridge` 的项目原型和一个称为 `库操作系统` 的概念。回顾 2011 年，虚拟化是一个非常热门的话题，并且已经变得非常流行。虚拟机是执行整合项目和将应用程序与底层硬件抽象化的常用机制。它们提供隔离性、兼容性，并使您无需依赖特定的主机计算机。因此，它们至今仍然流行，并在
    Azure 虚拟机和 Amazon EC2 等公共云环境中使用。唯一的问题是虚拟机资源“开销大”。也就是说，您需要整个操作系统在客户机中运行以支持您的应用程序，即使您并不需要客户机操作系统附带的所有服务。


    `Drawbridge` 团队寻求一种创建更轻量级解决方案的方法，同时保留虚拟化的优势。此外，他们通过研究发现，Windows 应用程序所需的许多服务和应用程序编程接口（API）调用实际上并不需要在
    Windows 内核中运行。相反，可以在用户模式下运行驱动许多 Windows API 的代码，从而减少对内核的上下文切换。减少上下文切换可以提高性能，并使应用程序和计算机资源的使用更加高效。


    该项目的结果是一个概念，称为在 `库操作系统` 上运行的 `微进程`，有效地创建了一个平台抽象层（`PAL`）。图 1-1 展示了最终的成果

    '
- fmt: '# Chapter 1 Why SQL Server on Linux?


    ![](index-28_1.jpg)


    ## The Drawbridge picoprocess


    在图 1-1 中，`picoprocess` 代表一个二进制文件，它将应用程序和库操作系统组件合并到一个进程中。这种方法的美妙之处在于，应用程序及其 DLL
    保持不变。无需重新编译或修改。


    让 Slava 和团队能够实现这一概念并将其应用到像 Linux 这样的另一个操作系统上的神奇之处在于一个应用二进制接口 (ABI)。许多 Windows
    API（在此图中由 Win32 和 NT 调用表示）由进程中的库 OS 实现，而大约有 45 个通过 `PAL` 公开，并映射到 ABI，最终映射到基础操作系统。


    ## The Drawbridge influence


    当时，Slava 正在微软内部一个名为 `Midori` 的项目工作，那是另一个操作系统项目，他看到了 Drawbridge 团队的工作。他能够在短时间内，利用
    Drawbridge 团队的工作成果，让一个 Windows 应用程序在 `Midori` 上运行。因此，当 Slava 被要求回到 SQL Server
    工程团队，并参与一个让 SQL Server 在 Linux 上运行的项目时，他从 Drawbridge 获得的经验带来了巨大的好处。


    ## The porting dilemma


    如果你思考一下 Slava 和团队将 SQL Server 引入 Linux 的选择，最合乎逻辑的是将 SQL Server 代码库移植到 Linux 上以原生方式编译和运行。但正如他所说，整个
    SQL Server 代码库由数百万行代码组成。虽然采取转换和编译 SQL Server 以在 Linux 上运行的路径可能是“最纯粹”的方法，但沿着这条路走，我们不可能在
    2017 年的目标时间内推向市场。事实上，早在 2014 年底，我们的一位首席工程师 `Peter Byrne` 就评估过这条路径，并得出结论：“仅将 SQL
    NT 引擎代码库移植和产品化到 Linux 上，就需要一个庞大的开发/测试/PM 团队进行多年的工作。” 因此，Drawbridge 的概念似乎是一个值得强烈考虑的想法。


    ## SQLOS, SQLPAL, and Helsinki


    Slava 是构建 SQL Server 一个名为 `SQLOS`（有些人称之为 `SOS`）的组件的团队成员之一，该组件作为 SQL Server 2005
    的一部分发布。其概念是尽可能将 SQL Server 核心引擎与底层操作系统抽象化，以处理 I/O、内存和线程等请求。在 SQL Server 2005 中，引擎的大部分被改为使用
    `SQLOS` API 服务（通过 `sqldk.dll`）。`SQLOS` 还为 `NUMA`、资源治理、资源监控和类似操作系统内核的调度系统等提供了内置支持。团队采取这种方法是因为
    Windows 操作系统并未为数据库引擎等服务完全优化。我记得多年前问过 Slava，为什么他觉得有必要构建 `SQLOS`。他说：“这里的关键观察是，DBMS
    和 OS 调度器必须合作。因此，操作系统必须内置对 DBMS 的支持，或者 DBMS 必须有一个特殊的调度层。”


    当你阅读 `SQLOS` 的描述及其将 SQL 引擎开发者与底层操作系统 API 抽象化的能力时，你可能会想，为什么不直接拿 `SQLOS` 来修改并重新编译那段代码以使用
    Linux 内核 API 呢？这种方法存在几个问题：


    *   并非所有 SQL 引擎都使用 `SQLOS` 来调用 Windows API。例如，引擎直接调用 `WriteFileGather()` 来将数据页刷新到磁盘。这方面的证据以
    SQL Server 等待类型的形式存在。SQL Server 中大约有 88 个 `PREEMPTIVE_OS*` 等待类型，这显示了多少组件不使用 `SQLOS`
    来调用 Windows API。

    *   我们仍然需要用 Linux 编译器重新编译所有 SQL 代码。这将要求我们维护两个代码库。

    *   还有其他可以在引擎内部或外部运行但不使用 `SQLOS` 的组件：例如，我们在引擎中支持 XML 的组件以及像 SQL Server Agent 这样的服务。'
