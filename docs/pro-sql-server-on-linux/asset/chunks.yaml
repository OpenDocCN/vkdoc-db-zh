    尽管以上是最低要求，但 SQL Server 可扩展至当前可用的最大型系统。SQL Server 能利用 Linux 上的最大可用内存。目前，理论极限为 64TB，但实际测试极限约为
    12TB。SQL Server 在 Linux 上支持的核心数量没有限制，最大数据库大小高达 524 PB（拍字节）。


    SQL Server 支持 Linux 上流行的原生文件系统 `XFS` 和 `EXT4`。默认文件系统类型因发行版而异。对于 RHEL 7.3 和 7.4，默认是
    `XFS`；而对于 Ubuntu 和 SLES，默认是 `EXT4`。在我们微软的测试中，我们未发现两种文件系统类型之间存在显著的性能差异。然而，与 `EXT4`
    相比，`XFS` 在卷大小、最大文件大小和文件数量方面提供了更大的容量。在我所有关于 RHEL 的工作中，我只使用默认的 `XFS`。我们在 Ubuntu
    和 SLES 上的测试表明，`EXT4` 在这些发行版上表现最佳（但 `XFS` 也完全支持）。还有一种名为 `BTRFS` 的新文件系统类型，目前不支持用于
    SQL Server。您还应了解，流行的远程存储系统网络文件系统（`NFS`）在满足一些限制条件的情况下是支持的，这些限制记录在我们的系统要求页面中：[`docs.microsoft.com/sql/linux/sql-server-linux-setup#system`](https://docs.microsoft.com/sql/linux/sql-server-linux-setup#system)。


    > **提示：** 为了获得 SQL Server 的最佳性能，您可能需要为计算机调整某些 `BIOS` 设置。有关为 Linux 系统调整 `BIOS`
    设置的更多详细信息，请参见第 6 章。


    ### SQL Server 测试资源


    在您计划安装并探索 SQL Server 功能时，以下资源可能会对您有所帮助。


    #### WideWorldImporters 示例数据库


    在 SQL Server 2016 中，我们创建了一个名为 `WideWorldImporters` 的新示例数据库，以及一系列脚本和演示。我将在本书中一直使用此示例（以及配套的
    `WideWorldImportersDW` 数据库）。您可以通过此文档入口访问此数据库的备份及所有示例。

    '
- fmt: "# Chapter 2: Installation and Configuration\n\n## Putting the Hammer on SQL\
    \ Server\n\nIf you are looking to stress the capabilities of SQL Server on Linux\
    \ for OLTP or Data Warehouse workloads, consider the popular open-source tool\
    \ called HammerDB. You can download the tool from `http://www.hammerdb.com`. HammerDB\
    \ supports running a derivation of the TPC benchmarks TPC-C (OLTP) and TPC-H (Data\
    \ Warehouse). You should know that HammerDB requires a GUI but has some automation\
    \ features. The basic interface is shown in Figure 2-2.\n\nFigure 2-2: The HammerDB\
    \ 2.23 interface\n\n## Linux Tips\n\nIf you are a Windows user and even a strong\
    \ Powershell user, you may need a few tips on navigating the Linux shell and system.\
    \ This section includes a few commands, scripts, and navigation tips I’ve learned\
    \ as I’ve spent time installing, demonstrating, and presenting SQL Server on Linux.\n\
    \n## Common Commands\n\nHere is a list of the most commonly used commands I use\
    \ on a regular basis from the bash shell:\n\n- `ls` and `ll`: List out files in\
    \ a directory. `ls` has all type of options to list out files. I like `ll` because\
    \ it provides a detailed list of a directory or a file(s) including size, permission,\
    \ and date/time.\n\n- `grep`: Search for a given text string from an input stream,\
    \ individual file, or set of files.\n\n- `man`: Short for “manual pages.” Use\
    \ this to find the syntax and details of any command. For example, run `man sqlservr`\
    \ to see a short description of SQL Server including a list of support environment\
    \ variables, where files are installed, and a pointer to the entire documentation\
    \ on the Internet.\n\n- `chmod`: Change attributes of a file or directory. This\
    \ can be read/write/execute. For example, when you create a file to execute as\
    \ a script in the shell, you must change the mode to execute like the following:\
    \ `chmod u+x myscript.sh`\n\n- `chown`: Change ownership of a file or a directory\
    \ for a group and/or user. I use this command to change the ownership of an SQL\
    \ Server backup file I’m restoring to the `mssql` group and `mssql` user, so SQL\
    \ Server can read the file: `chown mssql:mssql mybackup.bak`\n\n- `pwd`: This\
    \ stands for “print working directory” and allows you to see the current working\
    \ directory.\n\n- `ps`: This stands for process status and is a simple way to\
    \ get a list of processes running on the Linux server and details about them.\n\
    \n- `systemctl`: This command is used to report on the status and control the\
    \ execution of a systemd unit called a service on Linux. As you will see in this\
    \ book, the service for SQL Server is called `mssql-server`. Here is a reference\
    \ on how to use this command with the `mssql-server` service (Don’t worry about\
    \ `sudo` for now. I’ll explain that in the next section):\n    - Show if SQL Server\
    \ is running:\n        ```\n        sudo systemctl status mssql-server\n     \
    \   ```\n    - Stop SQL Server (SQL Server does a normal shutdown). It does nothing\
    \ if SQL Server is already stopped.\n        ```\n        sudo systemctl stop\
    \ mssql-server\n        ```\n    - Start SQL Server. It does nothing if SQL Server\
    \ is started.\n        ```\n        sudo systemctl start mssql-server\n      \
    \  ```\n    - Restart SQL Server. If SQL Server is running, this command will\
    \ shut it down and start it again. If SQL Server is stopped, this command will\
    \ start it.\n        ```\n        sudo systemctl restart mssql-server\n      \
    \  ```"
