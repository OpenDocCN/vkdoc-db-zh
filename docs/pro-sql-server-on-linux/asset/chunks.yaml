    [将 BACPAC 文件导入以创建新的用户数据库](https://docs.microsoft.com/sql/relational-databases/data-tier-applications/import-a-bacpac-file-to-create-a-new-user-database)


    以下是一个在 Windows 上的 SQL Server 中从 Powershell 运行`sqlpackage`以导出数据库 BACPAC 文件的示例命令：


    ```

    .\sqlpackage /A:Export /ssn:<sql server> /sdn:<database> /tf:c:\temp\wwi.bacpac

    ```


    以下是在同一个 Windows 客户端上执行`sqlpackage`，将包导入到 Linux 上的目标 SQL Server 的示例：


    ```

    .\sqlpackage /A:Import /tsn:<Linux SQL instance> /tdn:<target db name> /sf:c:\temp\wwi.bacpac
    /tu:sa /tp:<sa password>

    ```


    您无需在 Linux 的 SQL Server 实例上预先创建数据库。`sqlpackage`在执行 BACPAC 文件中的所有操作时会完成此创建。


    ## 从 Oracle 迁移


    您阅读本书，可能正考虑从另一个数据库平台（如 Oracle）迁移到 Linux 上的 SQL Server。在本书的这一部分，我将不涉及 Oracle 与
    SQL Server 之间的功能对比。在本书此前的内容中，我已尽力描述 Linux 上 SQL Server 的所有特性和功能，旨在帮助您了解并熟悉其能力，以备您考虑从
    Oracle 迁移而来。


    在本节中，我将假定您已做出迁移的决定，或正在测试迁移，以便评估您的应用在 Linux 上的 SQL Server 上的行为和性能。虽然有多种方法可以从 Oracle
    导出数据，以便您可以在 Linux 上的 SQL Server 上创建自己的数据库并导入数据，但 SQL Server 提供了一个免费工具来协助从 Oracle
    迁移。该工具称为`SQL Server 迁移助手`（`SSMA`）。


    `SSMA`支持许多不同的数据平台源，包括 Oracle、DB2、MySQL 和 SAP ASE，可迁移至多个不同的 Microsoft 目标数据库平台，包括
    Linux 上的 SQL Server。有关`SSMA`支持的源和目标的完整列表，请参阅我们的文档：[`docs.microsoft.com/sql/ssma/sql-server-migration-assistant#supported-sources-and-target-versions`](https://docs.microsoft.com/sql/ssma/sql-server-migration-assistant#supported-sources-and-target-versions)
    和 [`docs.microsoft.com/sql/linux/sql-server-linux-migrate-ssma`](https://docs.microsoft.com/sql/linux/sql-server-linux-migrate-ssma)。在本章的剩余部分，我将使用`SSMA`来描述从
    Oracle 迁移的准备和执行过程。


    有关`SSMA`的完整参考，请参阅我们的文档：[`docs.microsoft.com/sql/ssma/sql-server-migration-assistant`](https://docs.microsoft.com/sql/ssma/sql-server-migration-assistant)。当您阅读完这些关于从
    Oracle 迁移的准备和执行的章节后，请务必查看本章中关于“迁移后注意事项”的部分。


    ## 迁移准备


    由于`SSMA`工具仅在 Windows 上运行，您将需要三个能够相互连接的计算环境来完成从 Oracle 到 Linux 上的 SQL Server 的迁移：


    •   运行 Oracle 的 Linux 服务器


    •   运行 Linux 版 SQL Server 的新 Linux 服务器


    •   运行`SSMA`工具的 Windows 客户端


    运行`SSMA`的 Windows 客户端必须能够通过 TCP/IP 连接到每个服务器，因此您需要确保打开所有防火墙端口以允许远程连接。使用`SSMA`时，Oracle
    服务器和 SQL Server 之间不需要能够相互连接。


    要使用`SSMA`准备迁移，您需要将`SSMA`工具安装在

    '
- fmt: '## 第10章 迁移到 Linux 上的 SQL Server


    你首选的 Windows 客户端。请仔细遵循我们文档中的说明，


    因为存在来自其他组件的依赖关系（例如 Oracle 客户端软件），需要它们才能使 SSMA 正常工作。你可以在我们的文档中阅读详细信息：[https://docs.microsoft.com/sql/ssma/oracle/installing-ssma-for-oracle-client-oracletosql](https://docs.microsoft.com/sql/ssma/oracle/installing-ssma-for-oracle-client-oracletosql)。


    此外，由于你是迁移到 SQL Server，你需要提前按照我在书中概述的最佳实践和性能建议来创建数据库和文件。


    最后一点重要的提示：你需要使用 Oracle 的现有工具仔细测量 Oracle 工作负载的性能并进行记录。你需要将这个性能基线与迁移后使用 SQL Server
    的应用程序进行比较。


    ### 执行迁移


    `SSMA` 工具基于一个称为“项目”的概念工作。使用项目的迁移过程如下：


    1.  创建一个 `SSMA` 项目并配置设置。

    2.  连接到 `Oracle` 服务器。

    3.  连接到 `Linux` 上的 `SQL Server`。

    4.  在 `Oracle` 和 `SQL Server` 之间映射架构（或使用默认映射）。

    5.  转换 `Oracle` 架构，包括选择要转换的对象的能力。此文档对可以从 `Oracle` 转换和不能转换的内容有出色的描述：[https://docs.microsoft.com/sql/ssma/oracle/converting-oracle-schemas-oracletosql](https://docs.microsoft.com/sql/ssma/oracle/converting-oracle-schemas-oracletosql)。此时，`SSMA`
    将项目信息保存为可以转换为 `T-SQL` 语句的形式，以便在 `SQL Server` 上迁移选定的 `Oracle` 架构和对象。

    6.  将转换后的对象加载到 `SQL Server` 中。你可以让 `SSMA` 执行此操作，或者将信息保存到 `T-SQL` 脚本中，然后使用任何有效的
    `SQL Server` 工具运行该脚本（包括根据你的需要对其进行修改）。

    7.  使用 `SSMA` 将数据迁移到 `Linux` 上的 `SQL Server`。


    整个过程在以下文档中有详细说明：[https://docs.microsoft.com/sql/ssma/oracle/migrating-oracle-databases-to-sql-server-oracletosql](https://docs.microsoft.com/sql/ssma/oracle/migrating-oracle-databases-to-sql-server-oracletosql)。


    你会喜欢这样一个事实：拥有 `SSMA` 的我们的工程团队构建了一个分步教程，指导如何使用 `SSMA` 从 `Oracle` 迁移到 `Linux` 上的
    `SQL Server`。因此，你可以设置自己的环境，并按照我们文档中的每个步骤操作：[https://docs.microsoft.com/sql/ssma/oracle/sql-server-linux-convert-from-oracle](https://docs.microsoft.com/sql/ssma/oracle/sql-server-linux-convert-from-oracle)。本教程使用
    `HR` 示例架构中的对象，该架构随每个 `Oracle` 安装一同提供。


    我自己在 `Azure` 中使用三台虚拟机完成了这个教程（一台用于 `Oracle`，一台用于 `Linux` 上的 `SQL Server`，一台用于运行
    `SSMA` 的 `Windows` 机器）。它如宣传的那样有效，有几点需要注意：


    *   教程的前提条件中没有明确指出，如果你要迁移的 `Oracle` 服务器运行在 `Linux` 上，你需要一个运行 `Windows` 的第三方计算环境来运行
    `SSMA`。

    *   如果 `SQL Server Agent` 没有在 `Linux` 上的 `SQL Server` 上运行，你会收到一条警告，提示服务器端迁移不可行。服务器端迁移在
    `Linux` 上的 `SQL Server` 中不支持，因此可以忽略此警告。'
