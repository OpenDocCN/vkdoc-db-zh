    © Bob Ward 2018


    B. Ward, *Pro SQL Server on Linux*, `doi.org/10.1007/978-1-4842-4128-8_5`


    可用性，我将在第 7 章和第 8 章中更详细地讨论这些内容。


    ## 命令行工具


    从命令行运行的工具简单但至关重要。我建议你了解`SQL Server`附带的命令行工具，因为它们提供了与`SQL Server`交互的最简单、最轻量级的方法。


    **提示** 具有图形用户界面的工具，如`SSMS`，提供了强大的功能。但`SSMS`比`sqlcmd`这样的工具具有更多的活动部件。如果有人说他们在`Windows`计算机上使用`SSMS`连接到`Linux`上的`SQL
    Server`时遇到问题，我会问他们是否可以在`Linux`服务器本地使用`sqlcmd`进行连接。这有助于缩小图形工具本身的问题与网络问题之间的范围。


    Microsoft 对命令行工具的策略是确保它们在常见的客户端平台（包括`Windows`、`Linux`和`macOS`）上可用，并且在某些情况下将其作为
    GitHub 上的开源项目。


    在本节中，我将讨论以下工具：


