- fmt: '## 第6章 性能特性


    “并行度的成本阈值”设置用于控制 SQL Server 查询优化器何时根据成本选择在查询计划中使用并行任务。默认值 5 适用于许多工作负载。然而，这个默认值是
    SQL Server 工程团队在 SQL Server 7.0 时代基于测试设定的。因此，几乎所有 SQL Server 专家都认为这个默认值应该高得多。


    事实上，SQL Server 文档在 [https://docs.microsoft.com/sql/database-engine/configure-windows/configure-the-cost-threshold-for-parallelism-server-configuration-option](https://docs.microsoft.com/sql/database-engine/configure-windows/configure-the-cost-threshold-for-parallelism-server-configuration-option)
    中指出：“虽然为了向后兼容保留了默认值 5，但对于当前系统，更高的值可能更合适。许多 SQL Server 专业人士建议以 25 或 30 作为起始点，并使用更高和更低的值进行应用程序测试，以优化应用程序性能。”


    ### 进程亲和性


    如本章前面所述，SQL Server 会自动利用多核和 NUMA 架构。在某些场景下，你可能只想允许 SQL Server 核心引擎及其工作线程在特定的 NUMA
    节点和/或 CPU 上运行。你可以通过使用 `ALTER SERVER CONFIGURATION` T-SQL 命令来实现这一点。一种场景可能是，Linux
    服务器上运行着其他进程，你希望确保它们获得足够的 CPU 资源，因此会将 SQL Server 限制为仅使用某些 NUMA 节点和/或 CPU。


    例如，假设你有一台具有八个 CPU 的 Linux 服务器。以下 T-SQL 命令将只允许 SQL Server 在 CPU 4-7（CPU 从 0 开始计数）上调度工作线程：


    ```

    ALTER SERVER CONFIGURATION SET PROCESS AFFINITY CPU = 4 TO 7

    GO

    ```


    此命令的效果是动态且立即生效的，无需重新启动 SQL Server。此时，若要切换回允许 SQL Server 在所有可用 CPU 上运行，请执行以下 T-SQL
    语句：


    ```

    ALTER SERVER CONFIGURATION SET PROCESS AFFINITY CPU = AUTO

    GO

    ```


    为了获得最佳性能，我们在测试中发现，*如果你计划允许 SQL Server 在所有可用 CPU 上运行*，你应该将亲和性设置为系统上的所有节点或 CPU。例如，如果你有一个
    4 个 NUMA 节点的系统，那么你将亲和性设置为所有节点，如下列 T-SQL 语句所示：


    ```

    ALTER SERVER CONFIGURATION SET PROCESS AFFINITY NUMANODE = 0 TO 3

    GO

    ```


    **注意** 有些线程在 `SQLpal` 或 `host` 扩展的上下文中执行，它们不是已调度的工作线程。它们不会遵守使用 `ALTER SERVER CONFIGURATION`
    的设置，但它们的执行消耗的 CPU 应该不会像 SQL Server 工作线程那么多。


    有关设置进程亲和性的更多示例，请参阅我们的文档：[https://docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql)。


    ### 跟踪


    我在本书前面提到过遗留的跟踪功能 SQL Server Trace。在之前的几个版本中，我们加入了一个 *默认跟踪*，当 SQL Server 中的配置选项被更改以及对象修改被跟踪时，它会捕获一些基本信息。


    虽然这些信息中的一些可能对你有用，但我建议你通过 `sp_configure` 关闭这个名为 `default trace enabled` 的配置选项。每一个微小的...'
  raw: 'The “cost threshold for parallelism” setting is used to control when the SQL
    Server


    optimizer chooses whether to use parallel tasks in a query plan based on cost.
    The


    default value of 5 can work for many workloads. However, this default was established


    based on testing by the SQL Server engineering team back in the days of SQL Server
    7.0.


    Therefore, almost all SQL Server experts agree this default value should be much
    higher.


    In fact, the SQL Server documentation a[t https://docs.microsoft.com/sql/database-](https://docs.microsoft.com/sql/database-engine/configure-windows/configure-the-cost-threshold-for-parallelism-server-configuration-option)


    [engine/configure-windows/configure-the-cost-threshold-for-parallelism-](https://docs.microsoft.com/sql/database-engine/configure-windows/configure-the-cost-threshold-for-parallelism-server-configuration-option)


    [server-configuration-option s](https://docs.microsoft.com/sql/database-engine/configure-windows/configure-the-cost-threshold-for-parallelism-server-configuration-option)tates:
    “While the default value of 5 is retained for backwards compatibility, it is likely
    that a higher value is appropriate for current


    systems. Many SQL Server professionals suggest a value of 25 or 30 as a starting
    point,


    and to perform application testing with higher and lower values to optimize application


    performance.”


    •  **Process Affinity**


    As described earlier in this chapter, SQL Server automatically takes advantage


    of multicore and NUMA architectures. There could be some scenarios where you


    want to only allow the SQL Server core engine and its worker threads to run on


    specific NUMA nodes and/or CPUs. You can achieve this by using the ALTER SERVER


    CONFIGURATION T-SQL command. One scenario could be that other processes are


    running on the Linux Server that you want to ensure get enough CPU resources,
    so you


    will restrict SQL Server to only certain NUMA nodes and/or CPUs.


    For example, assume you had Linux Server with eight CPUs. The following T-SQL


    command will only allow SQL Server to scheduler worker threads on CPUs 4-7 (CPUs


    start with 0):


    ALTER SERVER CONFIGURATION SET PROCESS AFFINITY CPU = 4 TO 7


    GO


    The effect of this command is dynamic and immediate, and does not require a restart


    of SQL Server. At this point, to switch back to allow SQL Server to run on all
    available


    CPUs, execute the following T-SQL statement:


    ALTER SERVER CONFIGURATION SET PROCESS AFFINITY CPU = AUTO


    GO


    ChapTer 6   performanCe CapabILITIeS


    For maximum performance, we have found during testing that  *if you plan to allow *


    *SQL Server to run on all available CPUs*, you should set the affinity to all
    nodes or CPUs


    on your system. For example, if you had a 4 NUMA node system, then you would set


    affinity to all nodes like the following T-SQL statement:


    ALTER SERVER CONFIGURATION SET PROCESS AFFINITY NUMANODE = 0 TO 3


    GO


    **Note**  Some threads execute in the context of the SQLpaL or the host extension


    that are not scheduled worker threads. They will not adhere to using aLTer


    SerVer ConfIGUraTIon, but their execution should not consume as much CpU as


    SQL Server worker threads.


    For more examples of setting process affinity, see our documentation at [https://](https://docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql)


    [docs.microsoft.com/sql/t-sql/statements/alter-server-configuration- ](https://docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql)


    [transact-sql](https://docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql).


    •  **Tracing**


    I mentioned earlier in the book the legacy tracing feature SQL Server Trace. Several


    releases ago we put in a  *default trace* that captures some basic information
    when


    configuration options are changed in SQL Server and tracing of object modifications.


    While some of this information may be useful to you, I recommend you turn off
    this


    configuration option, called **default trace enabled**, through sp_configure.
