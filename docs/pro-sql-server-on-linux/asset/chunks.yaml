- fmt: "# Chapter 4 Building an Application and Advanced T-SQL\n\n## Analytic Queries\n\
    \nThe examples I provided for `SELECT` statements were very simple, including\
    \ joining tables and using a `WHERE` clause to filter results.\n\nIn many analytic\
    \ type workloads, it is necessary to aggregate results or order them. Like other\
    \ popular database engines, SQL Server provides T-SQL syntax to group rows with\
    \ `GROUP BY` and ensure the results are specifically ordered with `ORDER BY`.\n\
    \nSQL Server also provides rich functions to perform on aggregations including\
    \ aggregate functions (Ex. `SUM`) and analytic functions. You can read more about\
    \ these at [https://docs.microsoft.com/sql/t-sql/functions/aggregate-functions-transact-sql](https://docs.microsoft.com/sql/t-sql/functions/aggregate-functions-transact-sql)\
    \ and [https://docs.microsoft.com/sql/t-sql/functions/analytic-functions-transact-sql](https://docs.microsoft.com/sql/t-sql/functions/analytic-functions-transact-sql).\n\
    \nYou can get more advanced and achieve great performance on complex aggregation\
    \ queries by using a concept called *window functions*. Take a look at the documentation\
    \ and examples at [https://docs.microsoft.com/sql/t-sql/queries/select-over-clause-transact-sql](https://docs.microsoft.com/sql/t-sql/queries/select-over-clause-transact-sql).\n\
    \nI will show you some examples of analytic queries when I describe features like\
    \ columnstore indexes in Chapter 6.\n\n## Complex Datatypes\n\nIn the example\
    \ tables I’ve shown you in the previous chapter, I only used some of the most\
    \ common datatypes including integers, characters, `bit`, and `datetime` values.\
    \ Here is the `People` table definition for our reference as you read through\
    \ this section and the rest of the chapter (this is meant as a reference and not\
    \ to execute). If you have run the example scripts, the `People` table should\
    \ exist in your database:\n\n```sql\nCREATE TABLE [Application].[People](\n  \
    \  [PersonID] [int] NOT NULL,\n    [FullName] [nvarchar](50) NOT NULL,\n    [PreferredName]\
    \ [nvarchar](50) NOT NULL,\n    --      [SearchName]  AS (concat([PreferredName],N'\
    \ ',[FullName]))\n        PERSISTED NOT NULL,\n    [IsPermittedToLogon] [bit]\
    \ NOT NULL,\n    [LogonName] [nvarchar](50) NULL,\n    [IsExternalLogonProvider]\
    \ [bit] NOT NULL,\n    [HashedPassword] [varbinary](max) NULL,\n    [IsSystemUser]\
    \ [bit] NOT NULL,\n    [IsEmployee] [bit] NOT NULL,\n    [IsSalesperson] [bit]\
    \ NOT NULL,\n    [UserPreferences] [nvarchar](max) NULL,\n    [PhoneNumber] [nvarchar](20)\
    \ NULL,\n    [FaxNumber] [nvarchar](20) NULL,\n    [EmailAddress] [nvarchar](256)\
    \ NULL,\n    [Photo] [varbinary](max) NULL,\n    [CustomFields] [nvarchar](max)\
    \ NULL,\n    --      [OtherLanguages]  AS (json_query([CustomFields],\n    --\
    \          N'$.OtherLanguages')),\n    [LastEditedBy] [int] NOT NULL,\n    --\
    \      [ValidFrom] [datetime2](7) GENERATED ALWAYS AS ROW START NOT NULL,\n  \
    \  --      [ValidTo] [datetime2](7) GENERATED ALWAYS AS ROW END NOT NULL\n   \
    \ CONSTRAINT [PK_Application_People] PRIMARY KEY CLUSTERED\n    (\n        [PersonID]\
    \ ASC\n    )\n)\n```\n\nSQL Server provides a rich set of datatypes beyond this\
    \ including `numeric`, `bigint`, `unicode`, `money`, `binary`, `special`, `variant`,\
    \ `XML`, and `table` (a special case that you can use with table-valued parameters.\
    \ See [https://docs.microsoft.com/sql/relational-databases/tables/use-table-valued-parameters-database-engine](https://docs.microsoft.com/sql/relational-databases/tables/use-table-valued-parameters-database-engine)\
    \ in our documentation for more information)."
