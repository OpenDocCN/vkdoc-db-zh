    ## Migrating from SQL Server


    Since we have launched SQL Server on Linux, I’ve encountered some customers who
    are currently using a previous version of SQL Server on Windows but are now considering
    a move to SQL Server on Linux. This chapter is for you. I’ll discuss the overall
    process for migration, tools to use to prepare the migration, and tools and techniques
    to execute the migration.


    Figure 10-1 represents a picture of the overall migration process from a previous
    release of SQL Server to SQL Server on Linux.


    **Figure 10-1.** The migration process from a previous release of SQL Server to
    SQL Server on Linux


    In this section, I will talk about the components that can assist you to migrate
    from older releases of SQL Server to SQL Server on Linux. Microsoft provides tools
    to prepare you to migrate to SQL Server on Linux, called `Data Migration Assistant`
    and `Database Experimentation Assistant`. I’ll also discuss how to execute a migration
    of your database(s) using a database backup, export and import data with bulk
    import or SSIS packages, or a Data-Tier application file (called a BACPAC file).


    When you have completed reading these sections for preparation and execution of
    your migration, be sure to not miss the section of this chapter on Post Migration
    Considerations to learn about next steps once the migration is completed.


    ### Preparing for the Migration


    Based on Figure 10-1, preparation to migrate one or more databases to SQL Server
    on Linux centers on the use of two tools:


    - **Data Migration Assistant**: The `Data Migration Assistant` (`DMA`) tool is
    free to download and can be used to assess the configuration of the SQL Server
    instance and your databases, to point out potential problems that could occur
    after the migration and also point out new features that might help you when you
    start using SQL Server on Linux. In addition, this tool will look to see possible
    features being used on SQL Server on Windows that are not supported on SQL Server
    on Linux.


    **Note**: The `DMA` can be used to migrate your data and also has capabilities
    to migrate to Azure SQL Database and SQL Server in Azure virtual Machine. You
    can read the full list of `DMA` functionality and features, including links to
    download the tool, at [`https://docs.microsoft.com/sql/dma/dma-overview`](https://docs.microsoft.com/sql/dma/dma-overview).


    - **Database Experimentation Assistant**: Assessing static'
