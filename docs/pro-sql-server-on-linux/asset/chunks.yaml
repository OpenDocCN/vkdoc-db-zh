- fmt: "## SQL Server 工具\n\n关于此动态管理视图（DMV）的详细信息，请参阅微软官方文档：[https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-db-missing-index-details-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-db-missing-index-details-transact-sql)。\n\
    \n### dm_os_sys_info\n\n`sys.dm_os_sys_info` 是一个著名的DMV示例，它使用T-SQL接口以表格形式公开关于*系统*（即操作系统、计算机或SQL\
    \ Server本身）的信息。此DMV始终只返回一行数据。\n\n这个DMV中包含了大量有用的信息。我提供了一个示例查询，列出其中几个列，并包含一个计算SQL\
    \ Server已运行时间的计算。你可以在示例脚本 `dm_os_sys_info.sql` 中找到这个查询。\n\n```sql\n-- Retrieve\
    \ information about the computer, the OS, and SQL Server\n--\nSELECT cpu_count,\
    \ hyperthread_ratio, physical_memory_kb, committed_kb,\n    committed_target_kb,\
    \ max_workers_count, datediff(hour, sqlserver_start_time, getdate()) as sql_up_time_hours,\
    \ affinity_type_desc,\n    virtual_machine_type_desc, softnuma_configuration_desc,\
    \ socket_count, cores_per_socket,\n    numa_node_count, container_type_desc\n\
    FROM sys.dm_os_sys_info\nGO\n```\n\n此DMV中的某些值将是本书后续讨论的主题。关于此示例查询中所有列以及该DMV中所有列的完整描述，请参阅我们的官方文档：[https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-sys-info-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-sys-info-transact-sql)。\n\
    \n### dm_os_ring_buffers\n\n有少数几个DMV未被官方文档记载，因为它们通常不用于SQL Server的常规管理和监控。但其中一个未被记载且在某些高级场景中非常有用的DMV是\
    \ `sys.dm_os_ring_buffers`。此DMV存储了SQL Server引擎某些内部组件的详细信息，这些信息以内存中的*列表*（“环形”表示列表满时会回绕到开头）形式存储。构建此DMV所公开列表的每个组件（环形缓冲区类型）都有其自己的环形缓冲区。\n\
    \n以下示例查询（见于示例脚本 `ring_buffer_types.sql`）展示了可能的环形缓冲区类型（具体类型可能随SQL Server版本变化）：\n\
    \n```sql\n-- Find the distinct ring buffer types\n--\nSELECT DISTINCT(ring_buffer_type)\n\
    FROM sys.dm_os_ring_buffers\nGO\n```\n\n其中一个有趣的环形缓冲区类型是 `RING_BUFFER_EXCEPTION`。每种类型的环形缓冲区以一系列行的形式存储，其中包含一个\
    \ `record` 字段。`record` 字段是XML类型。以下示例查询（见于同一脚本 `dm_os_ring_buffers_exception.sql`）相当复杂。请参考T-SQL脚本中的注释，了解每个字段是如何从XML记录中提取或通过与其他系统数据连接而获取的：\n\
    \n```sql\n-- Find all current error messages recorded by SQL Server in the ring\
    \ buffer\n-- [record_timestamp] is calculated by taking the current timestamp\
    \ in the record (which is in clock ticks by milliseconds)\n-- and subtracting\
    \ this from ms_ticks in sys.dm_os_sys_info which is the number of clock ticks\
    \ in ms when SQL Server was started\n-- and then adding this to the current datetime.\
    \ This gives you the actual datetime of the record\n-- errorno, severity, and\
    \ state are \"shredded\" from the XML record\n-- errorno from the XML record is\
    \ joined with sys.sysmessages to get the error message string\n```"
