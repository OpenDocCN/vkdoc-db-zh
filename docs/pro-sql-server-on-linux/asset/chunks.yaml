    # SCOPED CONFIGURATION


    One of the nice feature additions starting in SQL Server 2016 is to set configuration
    options at the database level, which previous were only available at the instance
    level or through a trace flag.


    For example, the server configuration option `max degree of parallelism` can be
    overridden at the database level using `ALTER DATABASE SCOPED CONFIGURATION SET
    MAXDOP = <value>`. (Note: `max degree of parallelism` is also an option that can
    be configured at the query level through query hints.)


    # Chapter 6 Performance Capabilities


    Another option to consider using is `QUERY_OPTIMIZER_HOTFIXES`. This is equivalent
    to using trace flag 4199 to enable query optimizer hotfixes, which I discussed
    in `Chapter 5` in the section “Trace Flags.” The different here is that you can
    enable optimizer hotfixes for only queries that run in the database where you
    set this option ON.


    The full set of options that can be set with `ALTER DATABASE SCOPED CONFIGURATION`
    can be found in our documentation at [https://docs.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql).


    # Linux Kernel Configuration


    I have shown you SQL Server instance and database configuration options. These
    options apply to SQL Server on Windows and Linux. Is there any special tuning
    for the Linux kernel that I would recommend you use for SQL Server? The answer
    is yes, but it is not as complicated as you might think.


    SQL Server is an application that will maximize CPU, memory, and I/O resources.
    Therefore there are several Linux kernel options we found to be helpful as we
    built SQL Server and worked with customers during Community Technology Preview
    (CTP) builds. The full list of these options is included in this section of our
    documentation, Performance best practices and configuration guidelines for SQL
    Server 2017 on Linux, [https://docs.microsoft.com/sql/linux/sql-server-linux-performance-best-practices](https://docs.microsoft.com/sql/linux/sql-server-linux-performance-best-practices).


    You may look at these configuration options and decide to change them based on
    your workload. We found these options to help SQL Server maximize performance
    on Linux across most application workloads.


    As you look through these options, consult the documentation for your Linux distribution
    and the proper method to make changes. It is possible on some Linux distributions
    that these options are already set to recommended settings. For example, I’ve
    found that on Red Hat Enterprise Linux, the `throughput-performance` profile via
    the `tuned-adm` feature is the default, which contains many of our recommended
    settings (Note: run `man tuned-adm` on your RHEL system to learn more about RHEL
    profiles).


    A few other important points about Linux and machine configuration:


    • Pay close attention to BIOS settings related to energy and power consumption.
    For maximum performance, be sure your BIOS settings use the maximum power possible.


    • For SQL Server on Linux running in a virtual machine, consult your virtual machine
    provider on the proper settings for virtual CPUs, NUMA, and other machine related
    settings. The only setting you cannot use with SQL Server on Linux is any configuration
    for a virtual machine that supports `dynamic memory`.


    One last comment about OS configuration: on Windows, there are two configuration
    settings that affect SQL Server performance: `locked pages in memory` (you can
    read'
