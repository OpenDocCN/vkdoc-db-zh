    server memory` 设定。默认值为 0，这等效于 80% 的 `memorylimitmb` 数值。如本章前面所述，SQL Server 会将其内存使用量增长到此上限。虽然在
    Windows 上的 SQL Server 中将 `max server memory` 设置为非零值很常见，但由于 `memorylimitmb`...

