    ## 第 2 章：安装与配置


    本章将就如何在目标 SQL Server 环境选型过程中，测试其各项功能提供建议。本章最后一部分仅面向 Linux 新手，因此如果您是 Linux 高手，可以选择跳过。我认为，对于从
    Windows 过渡而来的用户，借鉴我在重新适应 Linux 导航过程中所积累的一些技巧，会很有帮助。


    ### Linux 发行版


    Linux 上的 SQL Server 2017 官方支持以下 Linux 发行版（这些是最低版本要求）：


    *   红帽企业 Linux (RHEL) 7.3 和 7.4

    *   SUSE Linux 企业服务器 (SLES) v12SP2

    *   Ubuntu 16.04 LTS


    为便于后续理解，尽管 RHEL 和 SLES 在功能上各有差异，但它们都被视为 `RPM-based` 发行版，而 Ubuntu 是 `Debian-based`
    发行版（我在查看各种 Linux 发行版及其历史时，发现这个资源非常有价值：[`en.wikipedia.org/wiki/Linux_distribution`](https://en.wikipedia.org/wiki/Linux_distribution)）。这种区分之所以重要，主要是因为它影响了我们为每个发行版使用的软件包格式。


    我们始终致力于了解应支持这些发行版的哪些新版本，因此请将此页面加入书签，以获取 Linux 上 SQL Server 的“最新消息”：[`docs.microsoft.com/sql/linux/sql-server-linux-setup`](https://docs.microsoft.com/sql/linux/sql-server-linux-setup)。


    您对这些发行版的选择可能基于个人偏好或贵公司的标准。需要说明的是，我们已在其他 Linux 发行版（如 CentOS 或 ORACLE 企业 Linux (OEL)）上进行了基础测试，SQL
    Server 可以在这些系统上运行。但是，除了本节列出的发行版外，我们目前尚未准备好正式声明支持在其他 Linux 发行版上运行 SQL Server。


    **注意：** 我们完全支持在 Docker 容器上运行 SQL Server，我将在第 11 章全面介绍该主题。


    为保持一致性，本书中的所有演示和示例都将使用红帽企业 Linux。SQL Server 在这三种发行版上运行都非常出色，并且整合了各自熟悉的体验。我们的文档中有清晰的示例，说明如何在
    RHEL、SLES 和 Ubuntu 上安装 SQL Server。


    ### 安装建议


    我建议在安装 SQL Server 前，查阅您所用 Linux 发行版的文档和安装指南，以确保获得最佳体验。例如，由于 SQL Server 可能是 I/O
    密集型应用，您可能需要查阅 Linux 指南来了解如何为性能和持久性配置磁盘。话虽如此，我将在第 6 章与您一起回顾微软的指导，介绍如何根据我们在微软的经验配置
    Linux 和 SQL Server，以实现最大性能，包括 SQL Server 和 Linux 内核的调优建议。


    关于如何安装和与 Linux 交互以使用 SQL Server，我有几点个人技巧：


    *   我从不安装图形界面。Ubuntu 桌面用户可能更喜欢图形界面的 Shell，而 SQL Server 开发者版在该环境下运行良好。我发现自己总是使用命令行的
    `bash` Shell，或者在连接到 Linux 服务器或虚拟机的 Windows 笔记本电脑上运行图形界面程序。

    *   如果我非常注重性能，我会始终为数据库和事务日志文件单独挂载一个驱动器。为简化操作，我通常将 `/var/opt` 挂载到这个单独的驱动器上，并直接将其用作默认数据库目录（您会发现可以更改此设置）。对于严肃的生产场景，您可能会将
