    Here is an example of how to do this with the following T-SQL statement, found
    in the example `restorewwimove.sql`:


    ```sql

    RESTORE DATABASE WideWorldImporters

    FROM DISK = ''/var/opt/mssql/data/wwi.bak''

    WITH MOVE ''WWI_Primary'' to ''/var/opt/mssql/WideWorldImporters.mdf'',

    MOVE ''WWI_UserData'' to ''/var/opt/mssql/WideWorldImporters_UserData.ndf'',

    MOVE ''WWI_Log'' to ''/var/opt/mssql/WideWordImporters.ldf'',

    MOVE ''WWI_InMemory_Data_1'' to ''/var/opt/mssql/WideWordImporters_InMemory_Data_1'',

    REPLACE

    GO

    ```


    The results of this T-SQL statement should look like Figure 8-6.


    [Figure 8-6. Moving files while restoring a database](#index_split_005.html#p405)


    In this example I’ve restored the database, so the files are created in the `/var/opt/mssql`
    directory instead of `/var/opt/mssql/data`. Also note the use of the `REPLACE`
    keyword since the database already exists. Using this keyword will cause SQL Server
    to delete the existing database and files and restore the new one.


    ![](index-406_1.jpg)


    **Tip:** If you are restoring a database for disaster recovery purposes, I do
    not recommend using `REPLACE`. Instead, restore the database backup to a new name,
    keeping the original database. This is my own personal recommendation, because
    I’ve seen customer situations where the original database had some damage but
    the backup was invalid. Using `REPLACE` causes SQL Server to delete the original
    database before it restores the backup. If the backup fails, now you have no way
    to try to recover what was in the original database.


    Earlier in this chapter I mentioned the use of the `CHECKSUM` option for backups.
    One nice advantage of using this feature is that you can verify the checksum of
    the backup media without restoring the entire database using the `RESTORE VERIFYONLY`
    option. If `RESTORE VERIFYONLY` comes back without an error, it is not a guarantee
    the restore will be work successfully including recovery (the only way to know
    for sure a backup will restore is to restore it, even on another server), but
    it does guarantee the backup media was not damaged after the backup was created.


    ## Complete Database Restore


    Let’s use an example to look at a possible complete restore sequence based on
    backup options we have discussed in this chapter. Consider the following sequence
    of events in Figure 8-7.


    [Figure 8-7. Database backup sequence before a crash](#index_split_005.html#p406)


    At Tuesday at 1:00pm an event occurs where the database files are damaged, but
    in this example the current transaction log file is intact. How can you recover
    from this event and will you lose data? Provided the transaction log is really
    valid, you could end up with no data loss. Here is how and why.


    Because we have a database backup and a series of log backups, we can do the following:


    1.  Back up the current "tail of the log." You can do this with the `BACKUP` T-SQL
    statement using the `NO_RECOVERY` option.

    2.  Restore the full database backup from the backup file `wwi.bak`. The difference
    here from the `RESTORE` examples I’ve shown you is that you will use the `WITH
    NO_RECOVERY`. SQL Server will actually apply redo logic after restoring the backup
    but not undo. When the restore is finished, the database is not available yet
    to use.

    3.  Restore the differential backup from the backup file `wwi_diff1.bak`. As with
    step #2, you will need the `WITH NO_RECOVERY` option. The database is still not
    available yet for use.

    4.  Restore the transaction log backup from the backup file `wwi_log3.bak`. This
    time use the `RESTORE LOG` statement, using `WITH NO_RECOVERY`. The database is
    still not available yet for use.

    5.  Restore the tail of the log backup you created in Step #1. Again, use `RESTORE
    LOG WITH NO_RECOVERY`. The database is still not available for use.

    6.  Execute the `RESTORE DATABASE` command but only with the `WITH RECOVERY` option
    to fully recover the database and bring'
