    # 第六章：性能特性


    ## 加速性能


    SQL Server 具有一些需要进行配置或采用 T-SQL 语句才能启用的特性，但它们可能带来令人难以置信的投资回报，从而加速你的查询和应用程序的性能。这些特性包括
    `分区表和索引`、`列存储索引` 和 `内存中 OLTP`。这些特性各自适用于不同的场景，但它们有一个共同点：为关键业务应用程序提升性能。


    利用 `SQL Server`，你可以精确地定位到特定于你的应用程序的问题，而不是其他连接（例如工具）的问题。要了解如何设置 `应用程序名称`，请参阅我们[文档](https://docs.microsoft.com/dotnet/api/system.data.sqlclient.sqlconnectionstringbuilder.applicationname)中的示例。


    ## 分区表和索引


    有些数据天然可以按某个列的一组标准进行 `切片`。换言之，可以自然地将一个表按水平方向分区到一组行中。拥有此功能可以提供一些非常引人注目的性能和管理能力。


    `SQL Server` 允许你使用以下概念在表和索引上专门创建分区：


    - **分区函数**：你创建的一个对象，允许你指定定义分区数量及其范围（边界）的值范围。

    - **分区方案**：一个 `T-SQL` 语句，用于定义分区函数要使用哪些 `文件组`。通常将分区映射到一个或多个用户 `文件组`。由于你可以单独备份和管理
    `文件组`，因此将一个分区映射到多个 `文件组` 可以让你单独管理分区。

    - **分区列**：表中用于为分区定义值并被分区函数使用的列。分区中常用的列类型是 `datetime`，因为许多客户使用分区来按时间段划分表中的行集。


    那么，为什么要使用分区？它们真的能提供任何性能提升吗？出于性能原因使用分区的首要因素是一个称为 `分区消除` 的概念。最好的理解方式是看一个示例。


    `WideWorldImporters` 示例数据库包含两个已分区的表。我怎么知道的？运行示例脚本 `partitioned_tables.sql` 中的以下
    `T-SQL` 语句：


    ```sql

    USE [WideWorldImporters]

    GO

    SELECT *

    FROM sys.tables AS t

    JOIN sys.indexes AS i

    ON t.[object_id] = i.[object_id]

    AND i.[type] IN (0,1)

    JOIN sys.partition_schemes ps

    ON i.data_space_id = ps.data_space_id

    GO

    ```


    此查询将返回两个表的结果：`CustomerTransactions` 和 `SupplierTransactions`。如果你如本书所述为 `WideWorldImporters`
    数据库中的所有对象生成脚本，默认情况下你不会看到分区函数和分区方案的详细信息。对于 `SQL Server Management Studio`，你需要先在
    `工具/选项` 菜单下启用一个选项，才能让脚本生成包含分区详细信息（在撰写本文时，`mssql-scripter` 不支持分区详细信息，但已有一个 `GitHub`
    问题被提出以包含此功能）。


    > **注意**：我提供的 `wwi.sql` 示例包含了所有对象，包括分区详细信息。


    使用这种方法，你将首先通过这个分区函数和分区方案看到 `[Sales].[CustomerTransactions]` 表的分区详细信息：


    ```sql

    CREATE PARTITION FUNCTION PF_TransactionDate AS RANGE RIGHT FOR

    VALUES (N''2014-01-01T00:00:00.000'', N''2015-01-01T00:00:00.000'', N''2016-01-01T00:00:00.000'',
    N''2017-01-01T00:00:00.000'')

    GO

    CREATE PARTITION SCHEME [PS_TransactionDate] AS PARTITION [PF_TransactionDate]
    TO ([USERDATA], [USERDATA], [USERDATA], [USERDATA], [USERDATA], [USERDATA])

    GO

    ```

    '
- fmt: "The partition function defines a partition based on a date type column with\
    \ five partitions, each one a calendar year in size. The `RANGE RIGHT` syntax\
    \ means the fifth partition is any value >= 2017-01-01. The partition scheme in\
    \ this case maps all partitions based on the partition function to the `USERGROUP`\
    \ filegroup. It is very possible to create multiple filegroups and map the partition\
    \ across them. That could be a valuable technique to span partitions across multiple\
    \ disks or to allow for management possibilities such as “backup a partition”\
    \ because it is possible to back up a filegroup separately.\n\nSo, the partition\
    \ function defines how to partition the data values. The partition scheme defines\
    \ how to take those values and place them in specific filegorups.\n\nNow let’s\
    \ look at the definition of the `[Sales].[CustomerTransactions]` table to see\
    \ how the partition is used and how indexes and the table are placed on the partition\
    \ scheme:\n\n```sql\nCREATE TABLE [Sales].[CustomerTransactions](\n    [CustomerTransactionID]\
    \ [int] NOT NULL,\n    [CustomerID] [int] NOT NULL,\n    [TransactionTypeID] [int]\
    \ NOT NULL,\n    [InvoiceID] [int] NULL,\n    [PaymentMethodID] [int] NULL,\n\
    \    [TransactionDate] [date] NOT NULL,\n    [AmountExcludingTax] [decimal](18,\
    \ 2) NOT NULL,\n    [TaxAmount] [decimal](18, 2) NOT NULL,\n    [TransactionAmount]\
    \ [decimal](18, 2) NOT NULL,\n    [OutstandingBalance] [decimal](18, 2) NOT NULL,\n\
    \    [FinalizationDate] [date] NULL,\n    [IsFinalized]  AS (case when [FinalizationDate]\
    \ IS NULL then\n        CONVERT([bit],(0)) else CONVERT([bit],(1)) end) PERSISTED,\n\
    \    [LastEditedBy] [int] NOT NULL,\n    [LastEditedWhen] [datetime2](7) NOT NULL,\n\
    \    CONSTRAINT [PK_Sales_CustomerTransactions] PRIMARY KEY NONCLUSTERED\n   \
    \ (\n        [CustomerTransactionID] ASC\n    )WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE\
    \ = OFF, IGNORE_DUP_KEY = OFF,\n           ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS\
    \ = ON) ON [USERDATA]\n) ON [PS_TransactionDate]([TransactionDate])\n```\n\n##\
    \ ChapTer 6   performanCe CapabILITIeS\n\n```sql\nGO\n\nCREATE CLUSTERED INDEX\
    \ [CX_Sales_CustomerTransactions] ON [Sales].[CustomerTransactions]\n(\n    [TransactionDate]\
    \ ASC\n)WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE = OFF, SORT_IN_TEMPDB =\
    \ OFF,\n       DROP_EXISTING = OFF, ONLINE = OFF, ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS\
    \ = ON) ON [PS_TransactionDate]([TransactionDate])\n\nGO\n```\n\nThe nonclustered\
    \ index for this table is based on the `CustomerTransactionID` but is aligned\
    \ on the partition that is based on the `TransactionDate` column. The clustered\
    \ index is also aligned on the `TransactionDate` column. This means the data in\
    \ the `CustomerTransactions` table is partitioned by SQL Server in its metadata,\
    \ based on the date ranges defined in the partition function. Partition schemes\
    \ and functions are independent objects and can be reused. In fact, if you look\
    \ at the `[Purchasing].[SupplierTransactions]` table, it uses the same partition\
    \ functions and schemes.\n\nNow let’s see a query example where partitions help\
    \ with performance. SQL Server has the ability to recognize the column involved\
    \ in a query is part of a partition function and can therefore target specific\
    \ partitions and eliminate others. This allows SQL Server to reduce the number\
    \ of pages required to satisfy a query.\n\nExecute the following T-SQL statement\
    \ found in the example query `customertransactions_partition.sql`:\n\n```sql\n\
    USE [WideWorldImporters]\n\nGO\n\nSET STATISTICS IO ON\n\nGO\n\nSET STATISTICS\
    \ XML ON\n\nGO\n\nSELECT COUNT(*) FROM Sales.CustomerTransactions\nWHERE TransactionDate\
    \ between '2013-01-01' and '2014-01-01'\n\nGO\n```\n\n![](index-313_1.jpg)\n\n\
    ## ChapTer 6   performanCe CapabILITIeS\n\nThe results for `SET STATISTICS IO\
    \ ON` should look like the following:\n\nTable 'CustomerTransactions'. Scan count\
    \ 2, logical reads 123, physical reads 0, read-ahead reads 0, lob logical reads\
    \ 0, lob physical reads 0, lob read-ahead reads 0.\n\nIf you were to scan the\
    \ entire table, you would see the number of logical reads required is twice the\
    \ amount required here. Yet when you look at the execution plan, you can see from\
    \ Figure [6-17](#index_split_004.html#p313) that an `Index Scan` is required.\n\
    \n*Figure 6-17.  The Query Plan used for a query with partitions*"
