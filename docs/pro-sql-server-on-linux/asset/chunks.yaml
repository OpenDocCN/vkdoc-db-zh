- fmt: '# Extensions


    Think of extensions as methods to add your own dashboards outside of customizing
    the server and database dashboard. Extensions are add-ons like the concept of
    extensions in `Visual Studio Code`.


    Extensions are built by the community or Microsoft and can be installed (or view
    what is installed) by selecting the `Extensions` icon in the far-left pane in
    `SQL Operations Studio`. Over time, I expect the list of extensions to become
    as robust as the marketplace found in `Visual Studio Code`.


    Depending on what release of `SQL Operations Studio`, you may have some extensions
    already installed with the tool. For my installation, I have extensions for `SQL
    Agent`, `Server Reports`, and `sp_whoisactive` (an extremely popular `T-SQL` procedure
    used in the `SQL Server` Community). You can find these extensions next to the
    `Home` option, which is used to display the `Server` dashboard. You can find more
    information about extensions and how to create your own in our documentation at
    [https://docs.microsoft.com/sql/sql-operations-studio/extensions](https://docs.microsoft.com/sql/sql-operations-studio/extensions).


    ![](index-194_1.jpg)


    # Chapter 5   SQL Server Tools


    ## T-SQL Query Editor


    Perhaps the most common task you will use `SQL Operations Studio` for is to execute
    `T-SQL` queries. `SQL Operations Studio` provides a rich `T-SQL` query editor
    with similar functionality to the `mssql` extension for `Visual Studio Code`.
    And the quickest way to create and execute a query is to right-click the server
    or a database name and select the option for `New Query`.


    Since `SQL Operations Studio` uses the `SQL Tools Service`, like the `mssql` extension
    for `Visual Studio Code`, it provides intellisense and features to aid in executing
    `T-SQL` queries. One feature I did not talk about in Chapter 3 with `Visual Studio
    code` is a concept called `T-SQL` snippets. `T-SQL` snippets provide templates
    for common tasks using `T-SQL` to aid in help completing `T-SQL` syntax.


    To use `T-SQL` snippets, bring up the `Query Editor` using the `New Query` option
    or the keyboard shortcut `Ctrl+N`. Then type in the word `sql` and you will be
    presented a list of common `T-SQL` tasks such as creating a table. Figure 5-23
    shows the `T-SQL` snippet to create a new table after picking `sqlCreateTable`.


    **Figure 5-23.** Using a `T-SQL` snippet in `SQL Operations Studio`


    ![](index-195_1.jpg)


    # Chapter 5   SQL Server Tools


    Another excellent feature in the `T-SQL` editor is a concept called *Peek Definition*.


    Consider this scenario. You are using the `T-SQL` editor to execute an `INSERT`
    statement to insert a row into the `[Application].[People]` table from the `WideWorldImporters`
    database. The problem is you don’t remember all the columns so are not sure of
    what columns names to list or how many values are required. `Peek Definition`
    allows you to see the table definition while completing the `INSERT` statement.


    To use `Peek Definition`, highlight the table name in the `T-SQL Query Editor`
    and right-click to select `Peek Definition`. Figure 5-24 shows the interface of
    using `Peek Definition` to complete the `INSERT` statement.


    **Figure 5-24.** Using `Peek Definition` with the `T-SQL` editor in `SQL Operations
    Studio`


    ## Other Features


    `SQL Operations Studio` provides other functionality for data professionals. This
    includes an `Integrated Terminal` like `Visual Studio Code`, `Source Code Control`
    functionality, and a `Task History` for history of operations like `Backup` and
    `Restore`.


    Like any useful tool, `SQL Operations Studio` has keyboard shortcuts for almost
    every interaction and allows you to customize the keyboard shortcuts. To learn
    more about keyboard shortcuts for `SQL Operations Studio`, see the documentation
    at [https://docs.microsoft.com/sql/sql-operations-studio/keyboard-shortcuts](https://docs.microsoft.com/sql/sql-operations-studio/keyboard-shortcuts).'
