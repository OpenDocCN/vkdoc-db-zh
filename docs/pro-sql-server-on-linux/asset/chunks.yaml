- fmt: '# Chapter 9 Managing and Monitoring SQL Server


    Here''s a quick example. Let''s say you suspect fragmentation is occurring due
    to a large number of page splits. So you monitor the DMV `dm_os_performance_counters`
    for the counter called `Page Splits/sec` and confirm your suspicion. Wouldn''t
    it be nice to track what queries are executing when a page split occurs?


    The following T-SQL statement will create an Extended Events session to do just
    that (this session definition can be found in the example script `tracepagesplits.sql`).


    ```sql

    CREATE EVENT SESSION [tracespagesplits] ON SERVER

    ADD EVENT sqlserver.page_split(

    ACTION (sqlserver.session_id, sqlserver.sql_text, sqlserver.client_app_name,

    sqlserver.database_id))

    ADD TARGET package0.event_file(SET filename=N''pagesplits.xel'')

    WITH (MAX_DISPATCH_LATENCY=5 SECONDS,STARTUP_STATE=OFF)

    GO

    ```


    You can now see what sessions, queries, application name, and databases are involved
    in the page split. The `page_split` events include the `pageid` that was split.


    ## Using the System Health Session


    Extended Events was launched as part of the SQL Server 2008 release. At that time,
    I worked in Microsoft technical support and thought we could leverage Extended
    Events by creating a default session that would capture important health information
    about SQL Server. Thus was born the `system_health` Extended Events session. You
    can read about the original version of this in this blog post: [Supporting SQL
    Server 2008: The system_health session](https://blogs.msdn.microsoft.com/psssql/2008/07/15/supporting-sql-server-2008-the-system_health-session).
    One of the limitations with this early version is that the session wrote data
    to a `ring_buffer` target so when SQL Server was restarted, the information collected
    was lost.


    With the launch of SQL Server 2012, we revised the method in which failure detection
    worked with clustering via the `sp_server_diagnostics` system procedure, which
    I described in Chapter 8. My colleague in support, Robert Dorr, was a huge part
    of defining how `sp_server_diagnostics` worked. In addition, Bob took the time
    to revamp the `system_health` session to include `sp_server_diagnostics` information
    and to have a file target added to the session.


    This is really a major advancement, as now by default any SQL Server has a set
    of Extended Event files that includes health information about SQL Server, including
    but not limited to:


    - `sp_server_diagnostics` output

    - Memory diagnostics

    - Deadlocks

    - Non-yielding problems

    - Latch waits over 15 seconds

    - Certain preemptive waits over five seconds

    - Critical errors


    ![index-504_1.jpg](index-504_1.jpg)


    Robert Dorr has a good blog post discussing this new `system_health` session at
    [SQL Server 2012: True black box recorder](https://blogs.msdn.microsoft.com/psssql/2012/03/08/sql-server-2012-true-black-box-recorder).


    These files are by default stored in the `/var/opt/mssql/log` directory. Look
    for the set of files that match the pattern `system_health*.xel`. Use the following
    T-SQL statement as found in the example `readsystemhealth.sql` to read all the
    events in the current system health session. I included a conversion to your local
    time but also left in the original UTC time in the query.


    ```sql

    SELECT DATEADD(minute, DATEDIFF(minute,getutcdate(),getdate()), timestamp_utc)

    as local_datetime, *

    FROM sys.fn_xe_file_target_read_file(''/var/opt/mssql/log/system_health*.xel'',

    NULL, NULL, NULL)

    ORDER BY local_datetime DESC

    GO

    ```


    On my Linux Server, the results looked like Figure 9-7 from SQL Operations Studio.


    **Figure 9-7.** Results from reading the `system_health` Extended Events session'
