- fmt: 'a more efficient DevOps ecosystem. Using containers, developers can continuously
    integrate their application changes and deploy them into test and production environments.
    Developers have been using these techniques for some time, but database platforms
    like SQL Server were typically not part of the lifecycle. A typical SQL Server
    would be hosted on a server, and developers would struggle to maintain their containers
    with their applications to a decoupled SQL Server and databases (and objects like
    SQL Agent jobs and scripts). Now that SQL Server embraces the container world,
    it can now be part of a container that is included in the CI/CD pipeline.


    ## Kubernetes


    The promise of containers has a great potential for portability, consistency,
    and efficiency. But how do you coordinate the execution of many database containers
    in a CI/CD pipeline or in a large-scale production environment? A technology called
    Kubernetes was created to solve this problem. Kubernetes is an open-source system
    to help manage, deploy, and orchestrate many containers in a complete ecosystem.
    One of its advantages is to provide a natural high-availability solution for containers,
    which couples nicely with the need of many SQL Server users to provide a high-availability
    solution with production databases. Kubernetes has emerged as the leading solution
    for container management and deployment at scale, and has been adopted by almost
    every public cloud vendor that supports container execution and deployment.


    # Chapter 1: Why SQL Server on Linux?


    Later in this book we will devote an entire chapter to the technical details of
    deploying SQL Server with Docker containers, including examples of using this
    in a CI/CD pipeline and implementing High Availability using Kubernetes.


    ## Summary


    `Deployment` is an important term to get started. This is all about installing
    and configuring SQL Server on Linux. And that is where our journey will begin
    for getting up and running with SQL Server on Linux in the next chapter.


    # CHAPTER 2


    ## Install and Configuration


    From the very beginning, our team wanted to make sure that the installation experience
    for SQL Server on Linux fits well within the already well-established methods,
    practices, and ecosystem for Linux users. Furthermore, rather than just say that
    SQL Server is supported on any Linux distribution (there are hundreds out there),
    we wanted to ensure we provided a quality, well-tested release on popular distributions
    and a superior support experience for our customers.


    We designed the installation experience to be fast and light. You might be surprised
    by seeing the number of pages devoted to the subject in this chapter. That is
    because installing a product is the first experience you encounter and can set
    the tone for your opinion of a product. If you just want to dive in and see how
    easy it is to install SQL Server on Linux, go straight to the "Just Install It!"
    section.


    I wanted this chapter to cover all aspects of the installation experience, so
    you can know what to expect, understand how it works behind the scenes, and provide
    you all the options for installation and updates.


    The chapter will also cover a discussion of requirements, how to verify your installation
    was successful, unattended install, offline install, installing other packages,
    installing in an Azure environment, troubleshooting installation problems, exploring
    what is installed, and topics on configuration. It is all based on my experiences
    installing the product, talking to customers, our support, and our engineering
    teams about our intentions to make the installation and configuration experience
    simple but complete.


    ### Preparing for Install


    If you want a superior experience with a product as complex as SQL Server for
    an enterprise-grade application, careful preparation is a key success criterion.
    In this section, I’m going to talk about what Linux distributions we officially
    support, system requirements to ensure a smooth and optimal SQL Server experience,
    and some


