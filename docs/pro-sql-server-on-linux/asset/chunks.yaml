    ChApter 10   MigrAting to SQL Server on Linux


    as there are dependencies from other components (such as Oracle client software)


    to allow SSMA to work. You can read these details in our documentation at [https://](https://docs.microsoft.com/sql/ssma/oracle/installing-ssma-for-oracle-client-oracletosql)


    [docs.microsoft.com/sql/ssma/oracle/installing-ssma-for-oracle-client-](https://docs.microsoft.com/sql/ssma/oracle/installing-ssma-for-oracle-client-oracletosql)


    [oracletosql.](https://docs.microsoft.com/sql/ssma/oracle/installing-ssma-for-oracle-client-oracletosql)


    In addition, since you are migrating to SQL Server, you will want to create the


    database and files ahead of time following the best practices and performance


    recommendations I’ve outlined in the book.


    One last important comment: you need to measure the performance of your Oracle


    workload carefully with existing tools used with Oracle and document these. You
    will


    want to compare this baseline to your application with SQL Server after doing
    the


    migration.


    ** Executing  the Migration**


    The SSMA tool works on a concept called a project. The migration process using
    a


    project looks like the following:


    1.  Create a SSMA project and configure settings.


    2.  Connect to an Oracle server.


    3.  Connect to SQL Server on Linux.


    4.  Map schemas between Oracle and SQL Server (or use the default.)


    5.  Convert the Oracle schemas, including your ability to choose


    which objects. This documentation has an excellent description


    of what can and cannot be converted from Orac[le: https://docs.](https://docs.microsoft.com/sql/ssma/oracle/converting-oracle-schemas-oracletosql)


    [microsoft.com/sql/ssma/oracle/converting-oracle-schemas-](https://docs.microsoft.com/sql/ssma/oracle/converting-oracle-schemas-oracletosql)


    [oracletosql. A](https://docs.microsoft.com/sql/ssma/oracle/converting-oracle-schemas-oracletosql)t
    this point, SSMA saves the project information in the form that can be converted
    into T-SQL statements to SQL


    Server to migrate the select Oracle schema and objects.


    6.  Load the converted objects into SQL Server. You can let SSMA do


    this or save the information to a T-SQL script and then run the


    script (including modifying it to your needs) against SQL Server


    with any valid SQL Server tool.


    7.  Migrate the data, using SSMA to SQL Server on Linux.


    ChApter 10   MigrAting to SQL Server on Linux


    This complete process is documented a[t https://docs.microsoft.com/sql/ssma/](https://docs.microsoft.com/sql/ssma/oracle/migrating-oracle-databases-to-sql-server-oracletosql)


    [oracle/migrating-oracle-databases-to-sql-server-oracletosql.](https://docs.microsoft.com/sql/ssma/oracle/migrating-oracle-databases-to-sql-server-oracletosql)


    You will love the fact that our engineering team who owns SSMA has built a


    step by step tutorial on how to use SSMA to migrate from Oracle to SQL Server
    on


    Linux. Therefore, you can set up your own environment and follow each step in
    our


    documentation at [https://docs.microsoft.com/sql/ssma/oracle/sql-server-](https://docs.microsoft.com/sql/ssma/oracle/sql-server-linux-convert-from-oracle)


    [linux-convert-from-oracle](https://docs.microsoft.com/sql/ssma/oracle/sql-server-linux-convert-from-oracle).
    This tutorial uses objects from the HR example schema, which comes with every
    Oracle installation.


    I went through the tutorial myself using three virtual machines in Azure (one
    for


    Oracle, one for SQL Server on Linux, and one for the Windows machine running SSMA).


    It worked as advertised, with a few important points to note:


    •  The tutorial does not make it clear in the prerequisites that you need


    a third computing environment running Windows for SSMA if your


    Oracle server to migrate is running Linux.


    •  If SQL Server Agent is not running on SQL Server on Linux, you will


    get a warning that server-side migration is not possible. Server-side


    migrations are not supported on SQL Server on Linux, so this can be


    ignored.'
