- fmt: '# Chapter 3 Building a Database and T-SQL Fundamentals


    ## Creating a User Database


    Creating your own database can be as easy as running the T-SQL statements as found
    in the sample script `ilovethedallascowboys.sql`:


    ```sql

    USE master

    GO

    CREATE DATABASE ilovethedallascowboys

    GO

    ```


    (Yes, I’m a huge sports fan, and being from the Dallas/Ft. Worth area of Texas
    I’m a big Dallas Cowboys fan. Hopefully, other NFL fans will keep reading the
    rest of the book<g>).


    The T-SQL syntax reference for `CREATE DATABASE` has so many options it will make
    your head spin. The most important choices when creating a database are file locations,
    number of files, and size.


    As I stated in the previous section, the model database is a template, so when
    you run `CREATE DATABASE` without any options, SQL Server will use the definition
    and size of model to create the database. The only exceptions to this rule are
    the default locations of database and transaction log files, which I discussed
    in Chapter 2, can be set via the `mssql-conf` script. For SQL Server on Linux,
    the default location of these files will be stored in the `/var/opt/mssql/data`
    directory.


    If you want to make a change to the definition of a database, SQL Server also
    provides an `ALTER DATABASE` T-SQL command (this is often used after creating
    a database to set various *database options*, which will be used in other parts
    of this book).


    Let’s look at how to use the `mssql` extension in Visual Studio Code to create
    the database for the WideWorldImporters sample. You may have restored the WideWorldImporters
    full backup in a previous chapter. If you have done this already, execute the
    `cleanup.sql` sample script using the `sa` login.


    **Note:** Chapter 5 covers the tools for SQL Server, which include other options
    to create databases and manage SQL Server. I’m using Visual Studio Code in this
    chapter to show you as a developer how to use this tool to create databases, objects,
    and queries, and eventually an application in the next chapter.


    ![](index-107_1.jpg)


    I could just click on the highlighted icon to create a new file and call it `createdb.sql`.
    Figure 3-3 shows my editor for `createdb.sql` ready for me to now use the `mssql`
    extension to connect to SQL Server on Linux. (The samples don’t include `createdb.sql`,
    since you will be typing in the statements).


    ***Figure 3-3.** Creating a new T-SQL script with the mssql extension in Visual
    Studio code*


    I can now use the Visual Studio Code tool as a T-SQL editor to execute statements
    against SQL Server. In the next chapter, I’ll switch the editor to a different
    language when I create the application.


    Since I’m using the `mssql` extension in Visual Studio Code, I get a feature called
    Intellisense. The editor in Visual Studio Code will help guide me on the syntax
    of T-SQL statements and objects. Figure 3-4 shows an example of intellisense helping
    complete the syntax for `CREATE DATABASE`.


    ![](index-108_1.jpg)


    ***Figure 3-4.** Intellisense with the mssql extension*


    Finish in the editor by typing in these T-SQL statements:


    ```sql

    CREATE DATABASE [WideWorldImporters]

    GO

    ```


    **Note:** In this T-SQL statement, `WideWorldImporters` is known as an *identifier*.
    Identifiers are names that are not T-SQL statements. T-SQL allows regular and
    delimited identifiers. Putting `[]` around the identifier is known as a delimited
    identifier. You will find many different opinions about using regular vs. delimited.


    On my laptop, I can use `bwsql2017rhel` as a server name instead of having to
    put in an IP address and port 1433 to connect to my SQL Server on Linux. You may
    be using DNS or other methods to expose a logical name to your Linux server. This
    technique allows me to connect to my Linux server on my laptop regardless of the
    state of my Wi-Fi or Ethernet adapter.'
