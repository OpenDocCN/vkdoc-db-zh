    CREATE TABLE locatedIn AS EDGE;


    GO


    Now I can insert some data using special T-SQL syntax to reference nodes when
    I


    insert data into the edge tables. See the sample script **graphinsert.sql** for
    an example to


    use this syntax:


    USE graphdemo


    GO


    INSERT INTO Person VALUES (1,''John'');


    GO


    INSERT INTO Restaurant VALUES (1, ''WeServeBigSteaks'', ''Fort Worth'')


    GO


    INSERT INTO likes VALUES ((SELECT $node_id FROM Person WHERE id = 1),


    (SELECT $node_id FROM Restaurant WHERE id = 1),9);


    GO


    Chapter 4   Building an appliCation and advanCed t-SQl


    Once I’ve inserted all the data, I can use a T-SQL query syntax like the following


    to find out what restaurants John likes or what his friends like. I’ve provided
    these


    statements in the sample script **graphquery.sql**:


    USE graphdemo


    GO


    -- Find Restaurants that John likes


    SELECT Restaurant.name


    FROM Person, likes, Restaurant


    WHERE MATCH (Person-(likes)->Restaurant)


    AND Person.name = ''John'';


    GO


    -- Find Restaurants that John''s friends like


    --


    SELECT Restaurant.name


    FROM Person person1, Person person2, likes, friendOf, Restaurant


    WHERE MATCH(person1-(friendOf)->person2-(likes)->Restaurant)


    AND person1.name=''John'';


    GO


    The second query will not find data until you go through the complete sample demo,


    which can be found a[t https://docs.microsoft.com/sql/relational-databases/](https://docs.microsoft.com/sql/relational-databases/graphs/sql-graph-sample)


    [graphs/sql-graph-sample.](https://docs.microsoft.com/sql/relational-databases/graphs/sql-graph-sample)


    ** Native  Scoring**


    In SQL Server 2016, Microsoft did something unthinkable in the database community


    and industry. Instead of just creating a strategy to integrate data science and
    machine


    learning with SQL Server, we brought machine learning  ***to*** SQL Server.


    In SQL Server 2016, we built an architecture that allows for R scripts to be run


    co- located on the same SQL Server as the data, but the script was isolated from
    the


    SQL Server process. Furthermore, the R scripts were executed via a T-SQL stored


    procedure called **sp_execute_external_script.**  No longer would data scientists


    have to pull huge amounts of data to a workstation that could be stale or unsecured.


    The data science model lives  *inside SQL Server*. The performance ramifications
    in


    Chapter 4   Building an appliCation and advanCed t-SQl


    production were amazing. A great example of what is possible is the work Microsoft


    did to deliver 1 million predictions per second, [https://blogs.technet.microsoft.](https://blogs.technet.microsoft.com/dataplatforminsider/2016/10/11/1000000-predictions-per-second)


    [com/dataplatforminsider/2016/10/11/1000000-predictions-per-second.](https://blogs.technet.microsoft.com/dataplatforminsider/2016/10/11/1000000-predictions-per-second)
     In SQL Server 2017, we brought in the same type of support for machine learning
    with


    support for Python.


    The problem is that SQL Server on Linux does not support this model in SQL Server


    2017 (as of the CU4 release). Fortunately, another related feature was released
    in SQL


    Server 2017 that works on both Windows and Linux releases because it is built
    into the


    core database engine (and remember, the core database engine is the same on Windows


    and Linux). This feature is called  *native scoring*. Native scoring is exposed
    through


    another T-SQL function called PREDICT.


    Here is an example of the PREDICT syntax (This will not execute without going


    through the following sample tutorial):


    DECLARE @model VARBINARY(MAX) = (SELECT TOP(1) native_model FROM dbo.'
