    而 SQL Server 资源代理（很像 Windows 中的资源 DLL）通过使用系统存储过程 `sp_server_diagnostics` 来实现这一点。这个系统过程是另一个
    `特殊` 系统存储过程的例子，因为其源代码并非 T-SQL，而是内置于引擎中的 C++ 代码。使用此系统存储过程的妙处在于，SQL Server 引擎可以包含关于引擎自身的健康检查（而不仅仅是实例是否在运行），以帮助为故障转移做出决策。`sp_server_diagnostics`
    是我们为引擎开发的最酷的功能之一。例如，即使未使用 Always On 技术，`sp_server_diagnostics` 也能生成可供用户使用的运行状况状态信息。我将在第
    9 章讨论如何实现这一点。


    ## 灵活的故障转移策略


    `sp_server_diagnostics` 与故障转移协同工作的架构被称为 `灵活故障转移策略`。其概念是存在从最高级别（级别 1 = SQL Server
    “已关闭”）到最低级别（级别 5 = “查询处理”不健康但 SQL 可能仍在运行）的故障转移决策层级。完整的故障转移策略列表及其配置方法可在 [`docs.microsoft.com/sql/sql-server/failover-clusters/windows/failover-policy-for-failover-cluster-instances`](https://docs.microsoft.com/sql/sql-server/failover-clusters/windows/failover-policy-for-failover-cluster-instances)
    找到。`sp_server_diagnostics` 生成的关于 SQL Server 运行状况的信息与这些策略相符。`sp_server_diagnostics`
    提供的运行状况信息的详细记录在 [`docs.microsoft.com/sql/relational-databases/system-stored-procedures/sp-server-diagnostics-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-stored-procedures/sp-server-diagnostics-transact-sql)。


    由于 Linux 上的 SQL Server 与 Pacemaker 的耦合度不如 Windows 上与 WSFC 的耦合度那么紧密；因此并非所有策略都适用，并且配置它们的方法也有所不同。


    让我解释一下每种策略（这些策略也适用于 Always On 可用性组）。策略 `编号` 越低，做出集群故障转移决定所需检查的粒度就越粗。随着编号增加，每项策略都包含其之前的所有策略。


    **1** – `SERVER_UNRESPONSIVE_OR_DOWN`：如果 SQL Server 实例无响应（无法建立连接）或已关闭（进程未运行），则触发故障转移。


    **3** – 策略 1 + `SERVER_CRITICAL_ERROR`：如果 `sp_server_diagnostics` 检测到 `关键系统` 错误，则触发故障转移。**这是默认策略。**
    关键系统错误包括诸如长时间运行的自旋锁争用问题和无法调度的调度器问题等情况。


    **4** – 策略 1, 3 + `SERVER_MODERATE_ERROR`：如果 `sp_server_diagnostics` 检测到 `资源`
    错误，则触发故障转移。资源错误是指诸如 SQL Server 可用内存极低（由引擎管理的内存）等情况。


    **5** – 策略 1, 3, 4 + `SERVER_ANY_QUALIFIED_ERROR`：如果 `sp_server_diagnostics` 检测到
    `query_processing` 错误，则触发故障转移。`query_processing` 错误是指妨碍基本查询处理的情况，例如工作线程耗尽。


    再次说明，每种策略都建立在之前策略的基础之上，因此策略 5 包含了所有 `sp_server_diagnostics` 错误。注意，这里没有列出策略 2。策略
    2 仅存在于 Windows 架构中，因为它与资源 DLL 的工作方式有关。对于许多用户来说，默认的 `policy=3` 就足够了。我认为除某些特定场景外，没有太多理由使用策略
    1，除非……


    '
- fmt: 'policy 3 is causing an undesirable failover occurrence. Using policy 4 or
    5 is worth investigating because there are situations where SQL Server is running
    and will not failover with the default policy but there is a pretty serious problem
    with running the application (such as worker thread exhaustion), so the appearance
    that SQL Server is “down” occurs. In these situations, a failover might free up
    the problem and make SQL Server more highly available.


    `Tip` `sp_server_diagnostics` maintains a log (an extended events file) of health
    information that can be useful to investigate the cause of a failover (or lack
    of a failover). This file is kept in the “log” directory with the errorlog files
    (default is `/var/opt/mssql/log`).


    The flexible failover policies with Pacemaker are called `monitoring policies`
    and are configured with a program called `pcs` (`pcs` is used in the steps I outlined
    to set up and configure an SQL FCI). As I stated, the default policy is 3. Here
    is an example command to configure the policy to 1:


    ```

    pcs resource update <fci_resource_name> meta monitor_policy=1

    ```


    When a decision to failover is decided by Pacemaker, it uses a concept called
    `quorum` to decide if the cluster is healthy and which node to failover to (unless
    you manually fail it over to a specific node). The idea is that more than half
    of the nodes must be healthy to keep the cluster alive (although there is a way
    to keep a cluster alive with only two nodes). You can read more about Pacemaker
    and quorum at [https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/html/high_availability_add-on_overview/ch-operation-haao](https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/html/high_availability_add-on_overview/ch-operation-haao).
    (You may need a Red Hat subscription to read this documentation).


    ## Chapter 8   high availability and disaster recovery for SQL server


    As part of the concept of quorum, Pacemaker (using Corosync) has a method to ensure
    that nodes don’t access the same shared resource, to avoid data corruption (although
    this would never be a problem with SQL Server database and log files, since SQL
    Server uses advisory locking in the Host Extension so two SQL Server processes
    cannot open the same database and/or log files at the same time. You can read
    more about advisory locking at [https://www.quora.com/Linux-What-is-the-difference-between-advisory-lock-and-mandatory-lock](https://www.quora.com/Linux-What-is-the-difference-between-advisory-lock-and-mandatory-lock)).
    As I mentioned earlier in this chapter, the method to keep the cluster healthy
    is called fencing. And the component to implement fencing is called STONITH. STONITH
    can remove a node from the cluster to ensure two nodes don’t access the same shared
    resource, or stop the entire cluster if that cannot be guaranteed. It is possible
    to configure STONITH with power supplies to literally shut down a computer. If
    you are used to WSFC, you should read up on how quorum and fencing work with Pacemaker
    on Linux.


    The following are other good resources I found to understand Pacemaker and Corosync
    further:


    - [http://www.juliosblog.com/pacemaker-101-2/](http://www.juliosblog.com/pacemaker-101-2/)

    - [https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/html/high_availability_add-on_overview/s1-pacemakeroverview-haao](https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/html/high_availability_add-on_overview/s1-pacemakeroverview-haao)'
