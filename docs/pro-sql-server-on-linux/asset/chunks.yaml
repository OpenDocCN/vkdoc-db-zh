    # 第 2 章：安装与配置


    **提示**：`systemctl` 会向服务控制提交一个“作业”。只有 `status` 选项会显示信息。当你尝试启动、停止或重启服务时，使用 `status`
    选项来查看结果。


    `scp`：代表安全文件复制（secure file copy），可用于将文件从一个 Linux 服务器复制到另一个。


    **提示**：有一个非常棒的免费工具叫做 `winscp`，我经常用它从 Windows 复制文件到 Linux。Windows 的 `ssh` 程序 MobaXterm
    也包含一些基本的拖放复制功能。


    `df`：显示挂载在驱动器上的文件夹的磁盘空间使用情况。使用 `-h` 选项可以以易读的格式显示哪些目录挂载在特定磁盘及其大小。我发现这对于查看 `/var/opt/mssql`
    目录有多少空间用于默认数据库很有帮助。


    `du`：代表磁盘使用情况（disk usage）。一个非常方便的命令，用于显示按目录划分的磁盘空间使用情况。


    `tree`：你必须安装一个软件包才能使用此命令（`yum install tree`）。它以层级结构显示一个目录及其所有文件和子目录。


    在本书后面的章节中，我将讨论我用于监控性能和系统信息的各种 Linux 命令。


    ### sudo


    当你安装 Linux 时，通常需要提供一个用于与 Shell 进行常规交互的登录名和密码，以及 root 用户的密码。出于安全原因，最好不要以 root 用户（通常称为超级用户）身份直接登录并运行。因此，有一种方法可以在以另一个用户身份登录时，以
    root（或另一个用户）的上下文执行命令。


    这种方法由一个名为 `sudo` 的命令实现（这代表“substitute user do”，但过去被称为“superuser do”，因为在旧版本中它只用于超级用户命令）。


    例如，你的默认账户将没有权限访问 SQL Server 的安装目录，因此你需要运行此命令来列出其中一个目录：


    ```

    sudo ls /var/opt/mssql

    ```


    **注意**：注意这里的目录导航符号 `/` 与 Windows 约定的 `\` 不同。


    通常，在 `ssh` 会话中，当你第一次使用 `sudo` 时，系统会提示你输入密码。默认情况下，该认证会缓存一段时间（五分钟，你可以配置此值）。这意味着，实际上，一旦你输入密码，在接下来的五分钟内，所有其他
    `sudo` 执行都不需要再次输入密码。


    与所有 Linux 命令一样，`sudo` 有大量的选项。你可能觉得有用的两个选项是 `-i` 和 `-u`。`-i` 允许你更改 Shell 会话的上下文，以超级用户身份运行所有后续命令。例如，当你运行
    `sudo -i` 时，系统会提示你输入密码，然后你的 Shell 提示符会改变，表明你现在正在以 root 身份运行：


    ```

    [root@bwsql2017rhel ~]#

    ```


    `-u` 选项允许你以 root 之外的另一个用户的身份上下文运行命令。


    ## 查看和编辑文件与脚本


    对于许多用户来说，任何操作系统中的常见任务都是查看和编辑文件以及构建脚本。在以下示例中，只有当文件需要超级用户权限时才需要 `sudo` 命令。


    查看任何文本文件最常用的命令是 `cat` 命令。因此，命令 `sudo cat /var/opt/mssql/log/errorlog` 会输出 SQL
    Server ERRORLOG 的文本内容（我将在本章后面解释此文件的重要性）。


    `more` 命令可用于分页查看任何文件。


    ```

    sudo more /var/opt/mssql/log/errorlog

    ```


    **提示**：这个命令“更有”内涵。当文件通过 `more` 显示时，按下 `h` 键可以获取选项列表，其中包括搜索功能。


    我最喜欢的命令之一是 `tail` 命令，用于查看文件的末尾部分。这对于查看像 SQL Server ERRORLOG 这类文件中的最新条目非常方便：


    ```

    sudo tail /var/opt/mssql/log/errorlog

    ```


    ![](img/index-56_1.png)


    如果你有一个文件会频繁追加内容，你可以使用 `tail` 来“监控”文件的新条目，就像这样：


    ```

    sudo tail -f /var/opt/mssql/log/errorlog

    ```

    '
- fmt: 'Editing files is also another common task including writing shell scripts.
    I remember from my older UNIX days the famous `vi` editor. A friend of mine told
    me to learn vi because it is installed by default on every UNIX system in the
    world. And it is still there today for your use. But now I prefer the popular
    `nano` editor (as suggested by Robert Dorr). `nano` may not be installed on your
    Linux server, so on RHEL I installed it with


    ```

    sudo yum install nano

    ```


    `nano` is a full screen editor and even supports cut/copy/paste. Figure 2-3 is
    an example `nano` screen of creating a shell script to install SQL Server.


    *Figure 2-3. The `nano` editing experience on Linux*


    Just remember that when you create a shell script, you must change the “mode”
    to execute to run it:


    ```

    chmod u+x installsql.sh

    ```


    ## System Logging


    Later in this chapter, I’ll talk about a log file called ERRORLOG that SQL Server
    uses to provide important information about startup, errors, warnings, and other
    execution details. You may have the need to look at logging for other aspects
    of the Linux kernel or other programs. A common file from older RPM-based distributions
    and in current Debian systems is `/var/log/syslog`. In current versions of RPM-based
    systems like RHEL, there is a very nice program to view most system logging called
    `journalctl`. And SQL Server will write information from its ERRORLOG into this
    same logging facility.


    By default, `journalctl` will only keep messages since the last boot of your Linux
    Server (this is configurable to make the log persisted across boots) and the default
    execution of `journalctl` is to show you all logged messages starting with the
    oldest since boot:


    ```

    journalctl

    ```


    Following is some typical output from `journalctl` on Linux:


    ```

    -- Logs begin at Sat 2018-02-17 09:29:49 CST, end at Tue 2018-02-20 06:43:04 CST.
    –

    Feb 17 09:29:49 bwsql2017rhel system-journal[106]: Runtime journal is using 8.0M
    (max allowed 390.2M, trying to leave 545.4M f

    Feb 17 09:29:49 bwsql2017rhel kernel: Initializing cgroup subsys cpuset

    Feb 17 09:29:49 bwsql2017rhel kernel: Initializing cgroup subsys cpu

    ...

    ```


    **Tip**: the Linux version shown in `journalctl` is the version of the Linux kernel
    release. To find out the specific details of your distribution’s release and version
    number, use this command:


    ```

    cat /etc/os-release

    ```


    By default, `journalctl` pages the output, but you can control that with an option.
    To see all the SQL Server entries, you can use a command like this:


    ```

    journalctl | grep sqlservr

    ```


    This only shows you logged output for `sqlservr`, but you may want to see the
    output interleaved with other kernel messages. In this case, dump out the entire
    journal, as each entry is marked with a timestamp, by just running `journalctl`.


    ## Just Install It!


    By this point in the chapter, you have seen SQL Server system requirements, discovered
    a few basics of testing your Linux environment and SQL Server, and if you are
    new to Linux received a few tips on how to work your way around the operating
    system and shell. Or perhaps you just skipped here and want to dive in and install
    SQL Server. In this section, I will walk you through the install process and give
    you some behind the scenes information about it.


    ## Deploy in 60 Seconds


    Before I show you the steps to install on RHEL, here are quick pointers to install
    on Ubuntu (using `apt-get`) and SLES (using `zypper`). The steps are very similar
    but slightly different, to account for package managers on those distributions.


    *Ubuntu*: [https://docs.microsoft.com/sql/linux/quickstart-install-connect-ubuntu](https://docs.microsoft.com/sql/linux/quickstart-install-connect-ubuntu)


    *SLES*: [https://docs.microsoft.com/sql/linux/quickstart-install-connect-suse](https://docs.microsoft.com/sql/linux/quickstart-install-connect-suse)'
