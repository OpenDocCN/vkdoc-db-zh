- fmt: "# Chapter 3   Building a Database and T-SQL Fundamentals\n\nidentifiers in\
    \ the SQL Server community. many of the examples with the WideWorldImporters sample\
    \ database use delimited identifiers, so I will use those in my sample scripts.\n\
    \nTo execute this T-SQL batch, I can use the mssql extension by hitting F1 and\
    \ selecting the `MS SQL: Execute Query` or use the shortcut keys `<Ctrl>+<Shift>+E`.\
    \ Be sure to select the connection profile for sqllinux when executing the sample\
    \ scripts in this chapter unless noted otherwise.\n\nWhen I execute any query,\
    \ Visual Studio Code will bring up another vertical pane in the editor to show\
    \ the results. If any errors occur, they will also show in this pane. The message\
    \ \"`Commands completed successfully`\" means the database was created.\n\nFigure\
    \ 3-5 shows an example after creating the database.\n\n![](index-109_1.jpg)\n\n\
    `Figure 3-5. Results of successful creation of a database using Visual Studio\
    \ Code`\n\nA better method to create this database is to use a set of T-SQL statements\
    \ that looks like the following from the sample script `createdbifexists.sql`:\n\
    \n```\nUSE master\nGO\nIF NOT EXISTS (\n    SELECT name\n    FROM sys.databases\n\
    \    WHERE name = N'WideWorldImporters'\n)\nCREATE DATABASE [WideWorldImporters]\n\
    GO\n```\n\n`Tip` there is no requirement that T-SQL reserved words for the language\
    \ be in upper case. however, it is a good practice to do this because it allows\
    \ you and other readers of your scripts to quickly recognize what is T-SQL keyword\
    \ and what is an identifier.\n\nThis batch will only create the database if it\
    \ does not already exist, thereby avoiding an error if it does exist.\n\nNotice\
    \ also in the preceding code there is another batch with the statement `USE master`.\
    \ I mentioned earlier the concept of database context, which means what database\
    \ you are currently running T-SQL statements against. The `USE` T-SQL keyword\
    \ is a method to switch the database context. When you create an SQL Server login,\
    \ you can define the default database context for the login, and then use the\
    \ `USE` keyword to change to another context (provided the login has permission\
    \ in that database). In this example, changing to the master context is not actually\
    \ required, but it is good practice to be in the context of master when you are\
    \ creating or dropping databases.\n\nAnother option for creating a database if\
    \ you plan to “get a clean slate” is to first drop the database and recreate it.\
    \ Execute the following T-SQL statements as seen in the sample script `dropandcreatedb.sql`:\n\
    \n```\nDROP DATABASE IF EXISTS [WideWorldImporters]\nGO\nCREATE DATABASE [WideWorldImporters]\n\
    GO\n```\n\nWhat do you get when you create a database in SQL Server on Linux?\
    \ As I mentioned, SQL Server uses the model database as a template to create any\
    \ new database. And since no options, file locations, or sizes were specified,\
    \ the above command will create the WideWorldImporters database on SQL Server\
    \ on Linux with two files in the `/var/opt/mssql/data` directory, each 8Mb in\
    \ size:\n\n`WideWorldImporters.mdf`: This is the database file. A common convention,\
    \ although not required, is to name the primary database file with a `.mdf` file\
    \ extension. This file contains all the system tables used to store metadata about\
    \ the database. The file is a collection of 8kb pages that will be used to store\
    \ data about system tables, pages of data for user tables and indexes, and a series\
    \ of pages for internal use by SQL Server to track file and allocation metadata.\
    \ You will find out in later chapters in the book how to create multiple database\
    \ files for a database.\n\n`WideWorldImporters_log.ldf`: This is called the transaction\
    \ log file (commonly used with a `.ldf` file extension). The transaction log is\
    \ used to record changes to user and system data. In other database systems this\
    \ is called a `journal`. Stored in a series of log blocks, the transaction log\
    \ is used to ensure consistency and recovery of the database."
