    ## Tuning for Success


    You have seen the built-in performance capabilities of SQL Server. I’ve shown
    you some of the important SQL Server, database, and Linux configuration options.
    Armed with this knowledge, there are a few other important topics to tune your
    SQL Server database, objects, and applications I believe everyone using SQL Server
    should know. This includes physical placement of database and transaction log
    files, creating the right indexes, keeping statistics accurate and up to date,
    and techniques for developers to ensure their application is using SQL Server
    to its best potential.


