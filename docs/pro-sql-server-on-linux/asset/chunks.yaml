    ## 第 5 章 SQL Server 工具


    ### mssql-scripter


    开始使用数据库后，你可能想要做的一个常见任务是*脚本化*一个数据库。我所说的这个术语的意思是，你可能希望获取一个现有数据库，并输出用于创建该数据库以及其中所有对象的
    T-SQL 命令，而无需执行备份和还原。通常，此输出会写入一个文件，该文件现在是一个 T-SQL 脚本，可用于创建数据库及所有对象。非常流行的工具 SSMS
    有一个选项，可以从现有数据库创建对象的脚本。


    由于 SSMS 仅在 Windows 上运行，我们构建了一个用于脚本编写的跨平台开源工具，名为 `mssql-scripter`。与 `mssql-cli`
    一样，`mssql-scripter` 是用 Python 构建的。

    '
- fmt: '

    find the installation instructions for your operating system (Windows, Linux,
    or macOS) at


    [https://github.com/Microsoft/mssql-scripter/blob/dev/doc/installation_guide.md](https://github.com/Microsoft/mssql-scripter/blob/dev/doc/installation_guide.md).


    `mssql-scripter` has a rich set of command line options to create scripts in many
    ways.


    Here is an example of an execution of `mssql-scripter` against the WideWorldImporters
    database from Chapter 3:


    ```

    mssql-scripter -S localhost -d WideWorldImporters -U sqllinux -P Sql2017isfast
    -f ./wwi.sql –-logins –-check-for-existence –-display-progress

    ```


    Figure 5-7 shows an example of the output from `mssql-scripter` to create a T-SQL
    script of the WideWorldImporters database and all its objects that I created in
    Chapter 3.


    Note some of the options I used to create logins, only create if the object does
    not exist, and to display progress during execution.


    ***Figure 5-7. Using mssql-scripter to create a T-SQL script for all objects in
    the WideWorldImporters database***


    ![](index-178_1.png)


    **Note** Using this method will not allow you to first create a login called `sqllinux`
    and then create the database and objects using the `sqllinux` login. You would
    need to create two different scripts: (1) one to create the `sqllinux` login that
    you would execute as `sa` and (2) one to create the database and objects that
    you would execute logged in as the `sqllinux` account.


    You can now take the `wwi.sql` file and execute this as a script with a tool like
    `sqlcmd` using the `-i` option.


    By default, `mssql-scripter` writes its output to stdout. Therefore, you can pipe
    the results of `mssql-scripter` to other tools. The `sed` program on Linux provides
    the ability to do “search and replace.” Figure 5-8 shows an example of using `mssql-scripter`
    and `sed` to create a script of the WideWorldImporters database but change the
    database name to NewWideWorldImporters.


    Execute this command to see the results:


    ```

    mssql-scripter -S localhost -d WideWorldImporters -U sqllinux -P Sql2017isfast
    --check-for-existence --display-progress | sed -e "s/WideWorldImporters/NewWideWorldImporters/g"
    > new_wwi.sql

    ```


    ***Figure 5-8. Using sed with mssql-scripter to create a script with a new database
    name***


    For a complete list of `mssql-scripter` command line options, use the `--help`
    option or consult the documentation (which also includes some notable examples)
    at [https://github.com/Microsoft/mssql-scripter/tree/dev/doc](https://github.com/Microsoft/mssql-scripter/tree/dev/doc).


    ## sqlservr Command Line Options


    In Chapter 2 I showed you how to start and stop SQL Server using the `systemctl`
    program on Linux. It is also possible to start SQL Server directly from the command
    line by executing the `sqlservr` program. Under normal circumstances you should
    not have to run `sqlservr` from the command line directly, but here are some possible
    reasons:


    - SQL Server will not start with `systemctl` (Note: it is very likely that if
    SQL Server cannot be started with `systemctl`, starting it from the command line
    will not work either, but there could be some circumstances where this could help).

    - You need to start SQL Server with a feature that is not available with configuration
    via the `mssql-conf` script. I will show you some of these options in Chapter
    9.


    To start SQL Server from the command line, you need to use the `sudo` command
    to run `sqlservr` in the context of the `mssql` Linux account (You must first
    stop SQL Server to run this):


    ```

    sudo -u mssql /opt/mssql/bin/sqlservr

    ```


    SQL Server will start and dump out the output of the ERRORLOG to stdout, which
    by default writes to the console. At this point, if you need to shut down SQL
    Server, you

