  trans: "# Docker Compose 概览与示例\n\n使用 Dockerfile 构建 Docker 容器镜像是构建单一容器的好方法。然而，在很多情况下，一个应用会使用多个容器，并且它们之间存在依赖关系，例如一个\
    \ Web 应用和一个数据库。因此，Docker 提供了一种名为 `compose` 的功能，允许你构建并运行一组容器，包括对 Dockerfile 和依赖项的引用。你可以在\
    \ [`docs.docker.com/compose/overview`](https://docs.docker.com/compose/overview)\
    \ 阅读关于 Docker Compose 的完整参考文档。\n\n我们再次使用 [`github.com/Microsoft/sqllinuxlabs/tree/master/containers`](https://github.com/Microsoft/sqllinuxlabs/tree/master/containers)\
    \ 实验室中的示例来向你展示（注意：此示例与你可以在 [`docs.docker.com/compose/aspnet-mssql-compose`](https://docs.docker.com/compose/aspnet-mssql-compose)\
    \ 阅读的 Docker 文档中的一个示例类似）。\n\n在这个示例中，我的应用程序需要两个容器：\n*   一个包含名为 `ProductCatalog`\
    \ 数据库的 SQL Server 容器。在这种情况下，我有一个希望运行的 T-SQL 脚本，用于创建数据库、登录名、用户、对象并填充数据。\n*   一个包含基于\
    \ .NET Core 的 ASP.NET 应用程序的容器，该应用程序将访问 `ProductCatalog` 数据库，连接到 SQL Server 容器并运行查询。你将看到，使用\
    \ Docker 的 compose 过程将允许应用程序连接到映射到 SQL Server 容器的逻辑名称。\n\n## 使用 Docker Compose\
    \ 部署多容器应用示例\n\n让我们浏览一下使用 Docker 组合应用程序的过程，然后我将解释一些关于这些容器如何工作的细节：\n\n1.  首先，我们需要使用以下命令从\
    \ `bash` shell 安装 `docker-compose` 包：\n\n    ```bash\n    sudo curl -L https://github.com/docker/compose/releases/download/1.21.2/docker-compose-$(uname\
    \ -s)-$(uname -m) -o /usr/local/bin/docker-compose\n    sudo chmod +x /usr/local/bin/docker-compose\n\
    \    sudo ln -s /usr/local/bin/docker-compose /usr/bin/docker-compose\n    ```\n\
    \n2.  切换到所有文件所在的目录，从 `bash` shell 运行以下命令：\n\n    ```bash\n    cd sqllinuxlabs/containers/mssql-aspcore-example\n\
    \    ```\n\n3.  编辑 `docker-compose.yml` 文件，将环境变量 `SA_PASSWORD` 的值替换为你的 `sa` 密码（我使用\
    \ `nano` 编辑器）。`docker-compose.yml` 文件是一个 YAML 文件（YAML 代表 YAML Ain't Markup Language），用于定义容器镜像、服务和依赖关系。我将在下面更详细地描述这个文件是如何工作的。可以将此文件视为构建\
    \ Docker 镜像和运行容器的起点。\n\n4.  编辑文件 `./mssql-aspcore-example-db/db-init.sh`，将 `sqlcmd`\
    \ 使用的 `-P` 参数的 `sa` 密码填入。\n\n    ![](img/index-583_1.png)\n\n    第 11 章 SQL Server\
    \ 与容器\n\n5.  从 `bash` shell 运行以下命令来组合 Docker 应用程序，这将构建 Docker 镜像并运行容器：\n\n   \
    \ ```bash\n    sudo docker-compose up\n    ```\n\n    执行时将会滚动显示大量信息。图 11-2 展示了在我的\
    \ Linux `ssh` 会话中正在进行的 `docker compose`。\n\n    **图 11-2.** 正在进行中的 Docker compose\n\
    \n    容器并非在后台运行，因此当 compose 完成时，你的屏幕可能如图 11-3 所示。\n\n    ![](img/index-584_1.jpg)\n\
    \n    ![](img/index-584_2.png)\n\n    第 11 章 SQL Server 与容器\n\n    **图 11-3.**\
    \ `docker compose` 启动容器后 `ssh` 中的状态\n\n6.  要运行该应用程序，我需要为我的 Azure 虚拟机打开一个端口。ASP.NET\
    \ 应用程序正在监听端口 `5000`。请参阅 [`github.com/Microsoft/sqllinuxlabs/tree/master/open_azure_vm_port`](https://github.com/Microsoft/sqllinuxlabs/tree/master/open_azure_vm_port)\
    \ 的说明。"
- fmt: "[GitHub仓库链接](https://github.com/Microsoft/sqllinuxlabs/tree/master/open_azure_vm_port)\
    \ `sqllinuxlabs/tree/master/open_azure_vm_port` 用于打开端口5000。\n\n7.  现在，从你的浏览器访问以下URL：\n\
    \    `http://<public IP address>:5000`\n\n    当应用程序网页呈现时，你应该会看到一个类似图11-4的页面。\n\
    \n    ### 图11-4：初始的ASP.Net容器应用程序屏幕\n\n    点击页面左上角的`Product Catalog Demo`，你的屏幕现在应该看起来像图11-5。\n\
    \n    ![](index-585_1.jpg)\n\n    ## 第11章 SQL Server与容器\n\n    ### 图11-5：来自ASP.Net\
    \ Docker容器应用程序的产品目录数据\n\n    让我们深入了解一下`docker compose`和这些容器是如何工作的。\n\n    从一个独立的SSH会话（你不能使用当前的SSH会话，因为这些容器没有在后台运行。如果你输入`<ctrl>+<c>`，容器将会结束），从bash\
    \ shell运行以下命令以查看正在运行的容器。你也可以使用`<ctrl>+<z>`将容器强制转到后台：\n    ```bash\n    sudo docker\
    \ ps --no-trunc\n    ```\n    你应该会看到类似下面的结果：\n    ```\n    CONTAINER ID IMAGE\
    \ COMMAND CREATED STATUS PORTS NAMES\n    22b900fd8f3ea03ca7a9d923441291a507dc4b3eb07fb3189fea6b3c8a6e0935\
    \ mssql-aspcore-example_web \"dotnet belgrade-product-catalog-demo.dll\" 16 minutes\
    \ ago Up 16 minutes 0.0.0.0:5000->5000/tcp mssql-aspcore-example_web_1\n    549d476ec793d96049a0193aeec78c6f32dc1661d79370c8855d7e50cc9797aa\
    \ mssql-aspcore-example_db \"/bin/sh -c '/bin/bash ./entrypoint.sh'\" 16 minutes\
    \ ago Up 16 minutes 0.0.0.0:1500->1433/tcp mssql-aspcore-example_db_1\n    ```\n\
    \n    ## 第11章 SQL Server与容器\n\n    你可以看到有两个容器在运行。对于第一个容器，在容器内运行的命令使用了程序`dotnet`，它用于执行ASP.NET应用程序，在本例中是由`belgrade-product-catalog-demo.dll`实现的（该文件在创建Docker镜像时构建）。除了SQL\
    \ Server的连接方式外，我不会过多地讲解ASP.NET应用程序的机制。你可以查看`Dockerfile`和目录`sqllinuxlabs/containers/mssql-aspcore-example/mssql-aspcore-example-app`中的所有源代码。\n\
    \n    第二个容器有以下命令：\n    ```\n    /bin/sh -c '/bin/bash ./entrypoint.sh'\n    ```\n\
    \    这是SQL Server镜像的容器，所以让我们探索一下`entrypoint.sh`是如何用来启动SQL Server的。\n\n    1. \
    \ 通过在bash shell中运行以下命令，切换到指定目录：\n        ```bash\n        cd ~/sqllinuxlabs/containers/mssql-aspcore-example/mssql-aspcore-example-db\n\
    \        ```\n\n    2.  首先，我们通过执行`cat Dockerfile`来查看名为`Dockerfile`的文件。结果应类似如下：\n\
    \        ```\n        FROM microsoft/mssql-server-linux:latest\n        COPY .\
    \ /\n        RUN chmod +x /db-init.sh\n        CMD /bin/bash ./entrypoint.sh\n\
    \        ```\n        因此我们知道，此目录中的Docker镜像将从最新的SQL Server镜像构建，当前目录中的所有文件将被复制到容器中，然后`db-init.sh`脚本将被修改以便可以执行。最后，启动容器的命令是`entrypoint.sh`脚本。\n\
    \n    3.  我们知道`entrypoint.sh`用于运行容器，所以让我们通过执行`cat entrypoint.sh`查看此文件。结果应类似如下（我从输出中删除了注释）：\n\
    \        ```\n        /db-init.sh & /opt/mssql/bin/sqlservr\n        ```\n   \
    \     这个命令将在后台执行`db-init.sh`，然后在前台启动`sqlservr`。\n\n    ## 第11章 SQL Server与容器\n\
    \n    4.  现在，让我们通过执行`cat db-init.sh`来查看`db-init.sh`。你的结果应类似如下：\n        ```\n\
    \        #wait for the SQL Server to come up\n        sleep 15s\n        #run\
    \ the setup script to create the DB and the schema in the DB\n        /opt/mssql-tools/bin/sqlcmd\
    \ -S localhost -U sa -P Sql2017isfast -d master -i db-init.sql\n        ```\n\
    \        这就是部分奥秘所在。这个脚本将等待15秒，让SQL"
