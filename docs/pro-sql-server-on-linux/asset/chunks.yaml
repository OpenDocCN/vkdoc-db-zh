- fmt: '# Chapter 10: Migrating to SQL Server on Linux


    This chapter is intended for you if you are planning to migrate to SQL Server
    on Linux. However, even if you are not performing a migration, I think you’ll
    be interested in looking over this chapter, which is broken down into these sections:


    - **Migrating from SQL Server**: In this section I’ll talk about tools and considerations
    for migrating from a previous version of SQL Server to SQL Server on Linux.

    - **Migrating from Oracle**: In this section, I’ll discuss the mechanics of migrating
    from Oracle on Linux to SQL Server on Linux.

    - **Migrating from PostgreSQL**: In this section, I’ll give you my opinions on
    a comparison of features between SQL Server and PostgreSQL. I’ll also give some
    tips and resources on how to migrate your database from PostgreSQL to SQL Server
    on Linux.

    - **Post Migration Considerations**: Once you have migrated from SQL Server or
    another database product, you should take into consideration several post migration
    steps and actions to ensure a great experience with SQL Server on Linux.


    **Tip**: Keep up to date with the team that owns the migration strategy for SQL
    Server and Azure Data Services on their blog at [`https://blogs.msdn.microsoft.com/datamigration`](https://blogs.msdn.microsoft.com/datamigration).


