    ## 安装与连接（以 Red Hat 为例）


    请参考 [quickstart-install-connect-red-hat#tools](https://docs.microsoft.com/sql/linux/quickstart-install-connect-red-hat#tools)
    以便使用 `sqlcmd` 连接到容器中的 SQL Server。由于容器映射到端口 1500，并且我是在本地的 Linux 服务器上连接，因此可以在 bash
    shell 中运行如下命令：


    ```

    sqlcmd -S localhost,1500 -Usa -PSql2017isfast

    ```


    **注意**：您可以通过使用 Linux 主机服务器的 IP 地址和端口 1500 作为 `-S` 参数，从另一台可以访问该 Linux 主机的计算机连接到容器中的
    SQL Server。此端口必须在防火墙中开放。


    现在，从 `sqlcmd` 提示符下，运行以下 T-SQL 语句：


    ```

    SELECT @@version

    GO

    ```


    您的结果应如下所示，显示 SQL Server *认为* 自己运行在 Ubuntu 上，但主机实际上是 RHEL：


    ```

    Microsoft SQL Server 2017 (RTM-CU9-GDR) (KB4293805) - 14.0.3035.2 (X64)

    Jul  6 2018 18:24:36

    Copyright (C) 2017 Microsoft Corporation

    Developer Edition (64-bit) on Linux (Ubuntu 16.04.5 LTS)

    ```


    输入 `exit` 可以离开 `sqlcmd`。


    您可以使用以下 bash shell 命令停止容器：


    ```

    sudo docker stop sql1

    ```


    要查看所有容器，包括未运行的，可以使用以下 bash shell 命令：


    ```

    sudo docker ps -a

    ```


    您的结果应类似于以下内容：


    ```

    CONTAINER ID        IMAGE                                     COMMAND

    CREATED             STATUS                      PORTS          NAMES

    66e7e043e416        microsoft/mssql-server-linux:2017-latest   "/opt/mssql/bin/sqls..."   About
    an hour ago   Exited (0) 2 minutes ago   sql1

    ```


    Docker 容器包含了在运行容器时创建或修改的任何文件或数据。您可以启动和停止容器，您创建的数据将在容器的生命周期内持久保存。但是，如果移除容器，容器中的所有数据都将丢失。不过有一种方法可以持久化容器中的数据，即使容器被移除，数据也能保存。让我们看一个可能对更新
    SQL Server 以最小化停机时间有用的示例。


    在继续之前，请使用以下 bash shell 命令移除之前的容器和镜像：


    ```

    sudo docker rm sql1

    sudo docker rmi microsoft/mssql-server-linux:2017-latest

    ```


    ## 使用容器更新 SQL Server


    要在 RHEL 上将 SQL Server 更新到新的累积更新，通常需要运行类似 `sudo yum update mssql-server` 的命令。此命令将下载最新的累积更新，关闭
    SQL Server，应用新的二进制文件，然后启动 SQL Server。如果更新顺利进行，应该不会花费太多时间，但容器提供了不同的方法。让我用一个例子向您展示如何操作。在本节中，我将使用
    WideWorldImporters 示例数据库，因此在我的新 Azure VM 上，我首先从 bash shell 运行此命令来下载此示例备份：


    ```

    wget https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak

    ```


    第一步是运行一个基于 SQL Server 2017 for Linux CU8 的容器（这将下载镜像），使用以下 bash shell 命令（如示例脚本
    `dockerruncu8.sh` 中所示），但与上一节相比略有不同：


    ```

    sudo docker run -e ''ACCEPT_EULA=Y'' -e ''MSSQL_SA_PASSWORD=Sql2017isfast'' -p
    1401:1433 -v sqlvolume:/var/opt/mssql --name sql1 -d microsoft/mssql-server-linux:2017-CU8

    ```


    我运行此 Docker 容器的方式与上一节相比有三个不同之处：


    1.  我使用了 `-v` 参数将 Linux 主机上的一个卷映射到容器内的 `/var/opt/mssql` 目录。这意味着在容器内 `/var/opt/mssql`
    中存储的任何数据都将在 Linux 服务器上持久保存。


    **提示**：运行以下命令可以找出此数据在 Linux 主机服务器上存储的实际目录：


    ```

    sudo docker inspect volume sqlvolume

    ```'
- fmt: '# Chapter 11 SQL Server and Containers


    2.  I used a different image for SQL Server: in this case, SQL Server 2017 CU8
    (which at the time I wrote this chapter is `not` the latest update of SQL Server).


    3.  I used port 1401 instead of 1500 to connect to this SQL Server.


    Now let’s restore the `WideWorldImporters` backup in the new container. The first
    step is to copy the backup from my home directory on the Linux server host *into
    the container*. I will do this by running the following command from the `bash`
    shell (which is also found in the example script `dockercopy.sh`):


    ```

    sudo docker cp WideWorldImporters-Full.bak sql1:/var/opt/mssql

    ```


    To restore the database, I will use the `docker exec` command to run `sqlcmd`
    inside the container with a T-SQL statement. Run the following command from the
    `bash` shell, as found in the example script `docker_restorewwi.sh`:


    ```

    sudo docker exec -it sql1 /opt/mssql-tools/bin/sqlcmd  -S localhost -U SA -P ''Sql2017isfast''
    -Q ''RESTORE DATABASE WideWorldImporters FROM DISK = "/var/opt/mssql/WideWorldImporters-Full.bak"
    WITH MOVE "WWI_Primary" TO "/var/opt/mssql/data/WideWorldImporters.mdf", MOVE
    "WWI_UserData" TO "/var/opt/mssql/data/WideWorldImporters_userdata.ndf", MOVE
    "WWI_Log" TO "/var/opt/mssql/data/WideWorldImporters.ldf", MOVE "WWI_InMemory_Data_1"
    TO "/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1"''

    ```


    Now let’s run a query to make sure we can access data in this database. This time
    I’ll use `sqlcmd` from the Linux host (I’m showing you both ways of accessing
    SQL Server in the container). Use the following command from the `bash` shell
    as found in the example script `dockerquery.sh`:


    ```

    sqlcmd -Usa -Slocalhost,1401 -Q''USE WideWorldImporters;SELECT * FROM [Application].[People];''

    ```


    If all goes well, your screen should scroll across rows from the `People` table.


    Now let’s say you want to update SQL Server to the latest cumulative update. In
    the case of the container, you don’t use tools like `apt-get`, but that is OK
    because as I’ve said earlier in this chapter, there is a better way to update
    SQL Server.


    Let’s run a new Docker container called `sql2` but this time with the latest cumulative
    update. I also want to point this container to the same `sqlvolume` to access
    all the databases that were saved with the `sql1` container. In order to minimize
    downtime, I’m going to pull down the latest SQL Server image manually instead
    of it being pulled when using `docker run`. Run the following command from the
    `bash` shell:


    ```

    sudo docker pull microsoft/mssql-server-linux:2017-latest

    ```


    Now let’s stop the `sql1` container with the following command from the `bash`
    shell:


    ```

    sudo docker stop sql1

    ```


    This will execute a clean shutdown of SQL Server. Now let’s start a new container
    called `sql2` with the exact same parameters as before, including the same port
    mapping and volume name. Run the following command from the `bash` shell as found
    in the example script `dockerrunlatest.sh`:


    ```

    sudo docker run -e ''ACCEPT_EULA=Y'' -e ''MSSQL_SA_PASSWORD=Sql2017isfast'' -p
    1401:1433 -v sqlvolume:/var/opt/mssql --name sql2 -d microsoft/mssql-server-linux:2017-latest

    ```


    Since I used the same port number as the `sql1` container, I can run the exact
    same command as earlier to run a query against the `WideWorldImporters` database,
    as found in `dockerquery.sh`:


    ```

    sqlcmd -Usa -Slocalhost,1401 -Q''USE WideWorldImporters;SELECT * FROM [Application].[People];''

    ```


    Now that is pretty cool. I was able to `switch` to a container running the latest
    cumulative update, minimizing downtime instead of patching the existing SQL Server.


    Now here is what you are going to really love. Since I did not remove the `sql1`
    container, if I run into some issue with the latest CU build and my application,
    I can simply stop the `sql2` container and start the `sql1` container. Boom! I’m
    now running against the previous CU.


    This is a great scenario to show updates to SQL Server and database persistence
    even if the container is removed. In the next section, I’m going to show you how
    to build your'
