- fmt: 'And the SQL Server resource agent (much like the resource DLL in Windows)
    uses the system stored procedure `sp_server_diagnostics` to make this happen.
    This system procedure is another example of a `special` system stored procedure,
    because the source code for this stored procedure is not T-SQL but C++ code baked
    into the engine. The beauty of using this system stored procedure is that the
    SQL Server engine can include health checks about the engine itself (not just
    whether the instance is running) to help make decisions for a failover. `sp_server_diagnostics`
    is one of the coolest features we have produced for the engine. For example, `sp_server_diagnostics`
    produces health state information that is available to users even if Always On
    technologies are not used. I’ll discuss how in Chapter 9.


    ## Flexible Failover Policy


    The architecture for how `sp_server_diagnostics` works in conjunction with a failover
    is called the `flexible failover policy`. The concept is that there are levels
    of failover decision from the highest (Level 1 = SQL Server is “down”) to the
    lowest (Level 5 = “query processing” is not healthy but SQL may be running). A
    complete list of the failover policies and how to configure them can be found
    at [https://docs.microsoft.com/sql/sql-server/failover-clusters/windows/failover-policy-for-failover-cluster-instances](https://docs.microsoft.com/sql/sql-server/failover-clusters/windows/failover-policy-for-failover-cluster-instances).
    `sp_server_diagnostics` produces information about the health of SQL Server that
    line up with these policies. The details of health information provided by `sp_server_diagnostics`
    are documented at [https://docs.microsoft.com/sql/relational-databases/system-stored-procedures/sp-server-diagnostics-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-stored-procedures/sp-server-diagnostics-transact-sql).


    Since SQL Server on Linux is not as tightly coupled with Pacemaker as it is on
    Windows with WSFC; not all policies apply and the method in which you configure
    them is different.


    Let me explain each of these policies (these policies will also apply to Always
    On Availability Groups). The lower the policy `number`, the less granular the
    check is to decide to failover the cluster. Each policy as you go to higher numbers
    is inclusive of all the policies before it.


    **1** – `SERVER_UNRESPONSIVE_OR_DOWN`: Fail if the SQL Server instance is unresponsive
    (unable to establish a connection) or down (the process is not running)


    **3** – Policy 1 + `SERVER_CRITICAL_ERROR`: Fail if `sp_server_diagnostics` detects
    a `critical system` error. **This is the default policy.** A critical system error
    includes conditions like long-running spinlock contention problems and non-yielding
    scheduler issues.


    **4** – Policy 1, 3 + `SERVER_MODERATE_ERROR`: Fail if `sp_server_diagnostics`
    detects a `resource` error. Resource errors are conditions like extremely low
    available SQL Server memory (memory managed by the engine).


    **5** – Policy 1, 3, 4 + `SERVER_ANY_QUALIFIED_ERROR`: Fail if `sp_server_diagnostics`
    detects a `query_processing` error. A `query_processing` error is a condition
    that prevents basic query processing like an exhaustion of worker threads.


    Again each policy builds on the other, so policy 5 includes all the `sp_server_diagnostics`
    errors. Notice, there is no policy 2 listed. Policy 2 only exists in the Windows
    architecture as it relates to how a resource DLL works. For many users, the default
    `policy=3` is fine. I don’t see many reasons to use policy 1 unless for some scenario
    where'
