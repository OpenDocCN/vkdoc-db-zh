- fmt: '# Creating a Database


    SQL Server can host many databases for a single SQL Server installation (called
    an `instance`). SQL Server on Windows allows multiple instances per computer.
    For SQL Server on Linux, there is only one instance allowed on a single Linux
    server (if you want to install more than one SQL Server instance on Linux, you
    need to use Docker containers. I will discuss in Chapter 11).


    ## Chapter 3: Building a Database and T-SQL Fundamentals


    For this chapter I will create only one database, but as you move through the
    book more databases may be created to show other features. You can choose to keep
    all of these on the same SQL Server on Linux instance or put them on different
    ones.


    ### System Databases


    Before I show you how to create a database, I think it is important for you to
    know the details around what databases come with a SQL Server installation called
    `system databases`. The following list shows databases that come out of the box
    with a fresh install:


    - `master`: By its name, this system database is the "root" of all databases and
    must exist for SQL Server to start. Master contains all types of SQL Server instance
    data that apply across all databases. One of the most important sets of data stored
    in `master` is information about all the other databases created for the instance,
    including the other system databases and user databases you create.


    At any point in time, to see a list of all databases on a SQL Server instance,
    run this T-SQL query. You can find this query in the sample script `databases.sql`:


    ```sql

    SELECT * FROM sys.databases

    GO

    ```


    **Note**: The keyword `GO` here is not a T-SQL statement. It is a special keyword
    recognized by tools to delimit a `batch`. A batch is a sequence of T-SQL statements
    that are sent to the server together from a client, but the server will execute
    each statement one at a time. Many users just execute one T-SQL statement in a
    batch.


    You can run this statement from any database context because it uses the `sys`
    schema and a view called `databases`. I’ll explain database context, schemas,
    and views as you move through the next two chapters. I’ll talk more about system-supplied
    views (also known as catalog views) and tables in Chapter 5.


    - `model`: The `model` system database is a `template`. When a user database is
    created, the contents of the `model` database are used to build the new user database.
    In many cases users leave this empty, as it was installed so your new user database
    would only contain system tables and objects. An example of this is a situation
    where you would like to create a standard set of user objects across any new user
    database that is created; you could place them into the `model` database.


    - `tempdb`: This system database is a `shared` database for all users of the SQL
    Server instance. It is shared because temporary objects that are created with
    a special syntax are stored here no matter what database context is used. In addition,
    other internal objects are placed in `tempdb` based on various conditions of query
    execution. In the next chapter, I’ll talk about creating temporary objects (and
    mention what types of internal objects may appear in the `tempdb` database). In
    addition, the subject of the `tempdb` database will be discussed in later chapters,
    as it can be a significant factor in performance and managing the SQL Server instance.
    You can theoretically create user objects in this system database, but it is not
    recommended. That is because `tempdb` is recreated each time SQL Server starts
    (using the `model` database as a template).


    - `msdb`: This system database is used by SQL Server Agent for scheduling alerts
    and jobs and by other features such as SQL Server Management Studio, Service Broker,
    and Database Mail. Think of this as an application database used by SQL Server
    features. I do not recommend you put any user tables into this system database.'
