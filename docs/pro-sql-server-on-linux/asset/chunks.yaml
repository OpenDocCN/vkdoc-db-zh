  trans: '# 第 9 章 管理与监控 SQL Server


    这里有一个快速示例。假设你怀疑由于大量的页拆分导致了碎片化。因此，你监控动态管理视图 `dm_os_performance_counters` 中名为 `Page
    Splits/sec` 的计数器，并证实了你的猜测。如果能够追踪在发生页拆分时正在执行哪些查询，岂不是很好？


    以下 T-SQL 语句将创建一个扩展事件会话来实现这一点（该会话定义可以在示例脚本 `tracepagesplits.sql` 中找到）。


    ```sql

    CREATE EVENT SESSION [tracespagesplits] ON SERVER

    ADD EVENT sqlserver.page_split(

    ACTION (sqlserver.session_id, sqlserver.sql_text, sqlserver.client_app_name,

    sqlserver.database_id))

    ADD TARGET package0.event_file(SET filename=N''pagesplits.xel'')

    WITH (MAX_DISPATCH_LATENCY=5 SECONDS,STARTUP_STATE=OFF)

    GO

    ```


    现在，你可以查看哪些会话、查询、应用程序名称和数据库涉及到了页拆分。`page_split` 事件包含了被拆分的 `pageid`。


    ## 使用系统运行状况会话


    扩展事件是作为 SQL Server 2008 版本的一部分发布的。那时，我在微软技术支持部门工作，认为我们可以利用扩展事件创建一个默认会话来捕获有关 SQL
    Server 的重要运行状况信息。于是，`system_health` 扩展事件会话诞生了。你可以在博文 [Supporting SQL Server 2008:
    The system_health session](https://blogs.msdn.microsoft.com/psssql/2008/07/15/supporting-sql-server-2008-the-system_health-session)
    中阅读其初始版本的相关信息。这个早期版本的一个局限是，会话将数据写入 `ring_buffer` 目标，因此当 SQL Server 重新启动时，收集的信息就会丢失。


    随着 SQL Server 2012 的发布，我们修改了通过 `sp_server_diagnostics` 系统过程在集群中检测故障的方法（我在第 8 章描述过）。我在支持部门的同事
    Robert Dorr 在定义 `sp_server_diagnostics` 的工作方式方面贡献巨大。此外，Bob 还花时间改进了 `system_health`
    会话，使其包含 `sp_server_diagnostics` 信息，并为该会话添加了文件目标。


    这确实是一个重大进步，因为现在任何 SQL Server 默认都有一组扩展事件文件，其中包含了有关 SQL Server 的运行状况信息，包括但不限于：


    -   `sp_server_diagnostics` 输出

    -   内存诊断

    -   死锁

    -   非让出问题

    -   闩锁等待超过 15 秒

    -   某些抢先等待超过五秒

    -   关键错误


    ![index-504_1.jpg](img/index-504_1.jpg)


    Robert Dorr 在博文 [SQL Server 2012: True black box recorder](https://blogs.msdn.microsoft.com/psssql/2012/03/08/sql-server-2012-true-black-box-recorder)
    中很好地讨论了这个新的 `system_health` 会话。


    这些文件默认存储在 `/var/opt/mssql/log` 目录中。查找匹配模式 `system_health*.xel` 的文件集。使用示例 `readsystemhealth.sql`
    中的以下 T-SQL 语句来读取当前系统运行状况会话中的所有事件。我在查询中包含了到你本地时间的转换，但也保留了原始的 UTC 时间。


    ```sql

    SELECT DATEADD(minute, DATEDIFF(minute,getutcdate(),getdate()), timestamp_utc)

    as local_datetime, *

    FROM sys.fn_xe_file_target_read_file(''/var/opt/mssql/log/system_health*.xel'',

    NULL, NULL, NULL)

    ORDER BY local_datetime DESC

    GO

    ```


    在我的 Linux 服务器上，结果如 SQL Operations Studio 中的图 9-7 所示。


    **图 9-7.** 读取 `system_health` 扩展事件会话的结果'
- fmt: '# Smart Log Backups


    在某些情况下，监控活动（如备份）可能与性能相关。在第 8 章中，我讨论了如何备份事务日志。本章中讨论的示例展示了一个基于时间频率的日志备份计划。这种技术已使用多年，对许多生产工作负载有效。


    这种技术的一个问题是，应用程序可能会产生意外的事务日志活动峰值，从而导致事务日志的自动增长。我在本书前面已经描述过，事务日志的自动增长可能会导致阻塞和性能问题。


    幸运的是，SQL Server 有一种技术可以执行更智能的日志备份。我在 SQL Server 工程部门的一位同事（他现在仍在微软工作，但职责范围更广了一些）Parikshit
    Savjani 撰写了一篇优秀的博客文章，介绍如何基于 DMV `dm_db_log_stats` 执行智能日志备份。您可以在以下链接阅读详细信息：

    [https://blogs.msdn.microsoft.com/sql_server_team/smart-transaction-log-backup-monitoring-and-diagnostics-with-sql-server-2017](https://blogs.msdn.microsoft.com/sql_server_team/smart-transaction-log-backup-monitoring-and-diagnostics-with-sql-server-2017)


    # Linux 监控工具


    虽然 SQL Server 提供了丰富的监控工具，但监控托管 SQL Server 的操作系统也很重要。如果您有使用 Linux 的经验，您可能有一套一直用来监控
    Linux 的工具和程序。


    以下是我从使用 Linux 的经验和 SQL Server 工程团队的同事那里发现的、认为有用的一系列工具和命令。


    ## top

    `top` 是一个核心的 Linux 程序，用于实时显示进程以及 Linux 服务器的整体 CPU 和内存使用情况，我在前面的章节中已经使用过它。`top`
    应该默认安装在几乎所有 Linux 发行版上。`top` 是交互式的，因为它会不断刷新。您必须键入 `q` 来退出程序。以下是在我的 Linux RHEL
    服务器上运行 `top` 时部分输出的一瞥，如图 9-8 所示。


    ![](index-506_1.png)

    ![](index-506_2.png)


    **图 9-8.** Linux 上 `top` 程序的输出


    ## iotop

    `iotop` 是一个类似于 `top` 的程序，但只专注于 I/O。`iotop` 可能默认没有安装，因此首先从 bash shell 执行以下命令：

    ```

    sudo yum install -y iotop

    ```

    运行 `iotop` 需要 `sudo` 权限，我建议使用 `-o` 参数，它只显示系统中活跃的 I/O。从 bash shell 运行以下命令：

    ```

    sudo iotop -o

    ```

    图 9-9 显示了在我的 Linux 服务器上运行 `iotop` 的输出。


    **图 9-9.** Linux 上 `iotop` 程序的输出


    ## htop

    `htop` 是一个类似于 `top` 的程序，但更具特色。我在 Windows Server 上使用的一个程序是任务管理器。我可以快速直观地查看每个处理器的
    CPU 利用率。`htop` 提供了这种外观和感觉，加上进程资源使用情况的详细信息。我发现 `htop` 在大多数 Linux 系统上默认可能没有安装。因此，要在
    RHEL 上安装它，请从 bash shell 运行以下命令：

    ```

    sudo wget dl.fedoraproject.org/pub/epel/7/x86_64/Packages/e/epel-release-7-11.noarch.rpm

    sudo rpm -ihv epel-release-7-11.noarch.rpm

    sudo yum install -y htop

    ```

    ![](index-507_1.png)

    ![](index-507_2.png)


    要执行 `htop`，只需运行以下命令：

    ```

    htop

    ```

    图 9-10 显示了在我的拥有四个 CPU 的 Linux 服务器上运行 `htop` 的部分输出。


    **图 9-10.** Linux 上的 `htop`


    ## sar

    `sar`（系统活动报告）在 UNIX 和 Linux 系统上已经存在很长时间了。它使用 `/proc` 文件系统来收集信息并生成报告。因此，`sar` 是一个查看……的好程序（原文在此处中断）'
  raw: '** Smart Log Backups**


    In some cases, monitoring activities like backups can be linked to performance.
    In


    Chapt[er 8 I talk](#index_split_005.html#p389)ed about how to back up the transaction
    log. The examples I talked


    about in this chapter showed a schedule of log backups based on a time frequency.
    This


    technique has been used for many years and works for many production workloads.


    One problem with this technique is that applications can generate unexpected spikes


    of transaction log activity resulting in possible autogrowth of the transaction
    log. I’ve


    described earlier in the book how autogrowth of the transaction log can possibly
    lead to


    blocking and performance problems.


    Fortunately, SQL Server has a technique to perform a  *smarter log backup*, One
    of


    my colleagues in SQL Server Engineering (who still works for Microsoft but with
    a bit


    broader scope now), Parikshit Savjani, wrote an excellent blog post on how to
    perform


    a smart log backup based on the DMF **dm_db_log_stats**. You can read the details
    at


    [https://blogs.msdn.microsoft.com/sql_server_team/smart-transaction-log-](https://blogs.msdn.microsoft.com/sql_server_team/smart-transaction-log-backup-monitoring-and-diagnostics-with-sql-server-2017)


    [backup-monitoring-and-diagnostics-with-sql-server-2017.](https://blogs.msdn.microsoft.com/sql_server_team/smart-transaction-log-backup-monitoring-and-diagnostics-with-sql-server-2017)


