    ## 第 7 章'
- fmt: '# `Security in SQL Server`


    The second major pillar of the SQL Server data platform and engine is security.
    SQL Server 2017 not only comes with a rich set of features to meet your security
    needs but has been recognized for being the least vulnerable database platform
    over almost the last decade. Figure 7-1 is one of the standard visuals I use to
    show an overview of the SQL Security feature suite (many in the industry call
    this *defense in depth*) and a chart showing the rating of SQL Server vs. the
    competition on vulnerabilities.


    ***Figure 7-1.** `SQL Server Defense in depth`*


    The bar chart on the right isn’t something Microsoft made up. It comes from the
    National Institute of Standards and Technology Comprehensive Vulnerability Database
    (`https://www.nist.gov/programs-projects/national-vulnerability-database-nvd`)
    and it explains how seriously we take security.


    In this chapter I will show you the various security features that make up the
    defense in depth story. Security can be more than just a software feature, so
    I recommend you also read this section in our documentation about how to secure
    your SQL Server including physical security: `https://docs.microsoft.com/sql/relational-databases/security/securing-sql-server`.


    © Bob Ward 2018

    B. Ward, `Pro SQL Server on Linux`, `https://doi.org/10.1007/978-1-4842-4128-8_7`


    ## Chapter 7: Security in SQL Server


    ### Logins and Users


    So far in this book I’ve shown you two examples of SQL Server logins (`sa` and
    a login called `sqllinux` I created), which are identifications used to connect
    to SQL Server and execute queries. Both of these logins are examples of connecting
    to SQL Server using `SQL Server Authentication`. SQL Server authentication requires
    a name and a password. Applications use the name and password to connect to SQL
    Server. It is the simplest and most compatible method to connect to a SQL Server,
    whether it be on Windows, Linux, or even Azure. The biggest downside is that you
    must maintain a separate authentication set of objects from ones you might be
    using for other authentication purposes (such as Active Directory). I’ll show
    you in the next section of this chapter how to set up and use `Active Directory
    Authentication` on Linux.


    While *logins* are objects at the SQL Server instance level, databases also have
    *users*. There is a connection between a login and users in a database. Every
    login created with SQL Server is mapped to at least one user in the `master` database.
    The `sa` login is mapped to a user called `dbo` (database owner). All other created
    logins are mapped to the user `guest`. All databases when created have the `dbo`
    and `guest` users based on the definition out of the `model` database. Aside from
    the `sa` login, most logins will be granted access to a user database by mapping
    that login to a user you create in the database. If you desire a login to have
    rights as the database owner, you would map that user to the `dbo` user. Otherwise,
    you would create a new user in the database and map the login to that user. Logins
    can be mapped to different users in different databases on the same SQL Server
    instance.


    In previous examples in this book, I showed you how to create a new user called
    `sqllinux`. Instead of mapping `sqllinux` to a specific user, I used this login
    to create a database called `WideWorldImporters`. Using a login (if you place
    the login in the `dbcreator` role) to create a database automatically maps that
    login to the `dbo` user of the database that was created. By default, as a security
    best practice, the `guest` user is revoked access to connect for a user database
    (it must be enabled for the system).'
