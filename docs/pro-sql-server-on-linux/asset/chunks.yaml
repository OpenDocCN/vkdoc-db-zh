    `sysadmin` 和 `dbcreator` 是 *固定* 服务器角色的例子。这意味着这些角色的权限无法更改。文档 `https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles#permissions-of-fixed-server-roles`
    中的图表展示了固定服务器角色的权限。


    ### `public`

    这是为 SQL Server 创建的任何新登录名的默认角色。'
- fmt: '# Chapter 7   SeCurity in SQL Server


    Server. The public server role is not fixed, so the permissions for the role can
    be changed. By default, the public role has permissions for `CONNECT`, which means
    any login has the right to connect to SQL Server and `VIEW ANY DATABASE`, which
    means any login has the right to see what databases exist on the SQL Server instance.
    You would use the T-SQL command `GRANT` to add new permissions for the public
    server role or `REVOKE` to take any default permissions away.


    Your strategy can vary, but effectively the process from a server perspective
    to create logins and users can look like the following:


    1.  Create the necessary logins for your SQL Server with `CREATE LOGIN`.

    2.  Assign specific logins to server roles based on your decision on what type
    of server access and operations they should be able to perform. I recommend that
    one of these logins become added to the `sysadmin` role, so you do not rely on
    the `sa` login to perform all `sysadmin` options.

    3.  Leave all other users with the default permission for the public server role.

    4.  Create your database from the `sysadmin` role member.


    **Note** My examples show using the `sqllinux` login as part of the `dbcreator`
    role, because the login that creates the database becomes the database owner by
    default. however, as i’ve indicated, anyone with the `dbcreator` role has authority
    to affect other databases. if you want one login to create and own all databases,
    then using this technique is fine. if you have separate database owners, you will
    not want to use this technique.


    5.  Use the `ALTER AUTHORIZATION` T-SQL command to make your designated login
    become the database owner. I’ll talk more about this in the next section, "Database
    Roles."


    `ALTER AUTHORIZATION` is a method to change the ownership of a securable in SQL
    Server. You can read more about how to use this statement at [https://docs.microsoft.com/sql/t-sql/statements/alter-authorization-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/alter-authorization-transact-sql).


    6.  The database owner now has permissions to add other logins to the database,
    assign them to specific roles, and give them specific permissions based on their
    needs.


    It is also possible to create your own server roles and assign members and permissions
    to them. You can use the T-SQL `CREATE SERVER ROLE` command to create your own
    server roles.


    ## Database Roles


    Just like server roles, each database has built-in roles that define certain permissions
    to perform necessary operations in a database.


    As I mentioned in the previous section, one of the most important roles in each
    database is called `db_owner`, and the user `dbo` is assigned membership to that
    role. A list of fixed database roles and their permissions are listed in our documentation
    at [https://docs.microsoft.com/sql/relational-databases/security/authentication-access/database-level-roles](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/database-level-roles).
    These roles exist for your convenience, to manage a database. For example, the
    database role `db_datareader` gives any member the permission to read data from
    all user tables in the database. Many customers will choose to assign specific
    permissions to schemas to specific users.


    Or another method is to create your own database role for a specific set of security
    needs, assign users to that new database role, and then assign specific permissions
    to certain schemas to that database role. You will see in the next section that
    another advantage of creating your own database roles is to apply them to row
    level security and dynamic data masks.


    Like the server role, public, each database has a public role. Every user created
    in the database is automatically a member of the public database role. And by
    default,'
