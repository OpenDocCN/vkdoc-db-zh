    ## Managing Objects


    Like databases, once you create tables, indexes, and server-side code like stored
    procedures, you will inevitably have to manage these objects. This section covers
    some examples of management tasks you may have to perform, such as altering tables,
    truncating tables, dealing with index fragmentation, and altering server-side
    code.


    ## Managing Tables


    In this section I’ll discuss two aspects of managing tables: altering tables by
    altering columns and properties; and truncating tables, which can be a very efficient
    method to *clear* a table.


    ### Altering Tables


    After you create tables for your database, there could be scenarios where you
    want to modify the definition or properties of a table. You always have the option
    to copy out the data of a table, drop the current table, create a new table definition,
    and import back in your data.


    However, SQL Server provides an `ALTER TABLE` statement to modify the definition
    or properties about the table. One of the most common usages to alter a table
    is to make changes to columns. With `ALTER TABLE` you can add, drop, or change
    the definition of columns within some limits. Making modifications to columns
    though has some implications. The following are options to use with `ALTER TABLE`
    to make changes to column definitions and those implications:


    **ADD <column>:** You can add column(s) to a table that will be defined in order
    at the end of the table. Any column you add must either allow `NULL` values or
    you must specify a `DEFAULT` CONSTRAINT as part of adding the column, to provide
    default values for each row for the new column. Adding a column with a default
    value on a table with a large number of rows can take some time to complete (because
    it is like executing an `INSERT` on each row) and generate a large number of log
    records.


    **ALTER COLUMN <column>:** You can change the type of a column and it size. Changing
    the type must follow the rules of possible data type conversion for SQL Server,
    which can be found at [https://docs.microsoft.com//sql/t-sql/data-types/data-type-conversion-database-engine](https://docs.microsoft.com//sql/t-sql/data-types/data-type-conversion-database-engine).
    Changing the size of a column is possible provided the new size is larger than
    the current size definition (e.g., you can change a `varchar(100)` to `varchar(200)`
    but not to `varchar(10)`).


    **DROP COLUMN <column>:** You are allowed to drop a column in the table except
    for columns that are part of constraints such as primary keys. You must drop these
    constraints first, which is also possible with `ALTER TABLE`. Note that dropping
    a column is fully logged (like a `DELETE`), so this operation on a table with
    large number of rows may take some time and generate a large number of log records.


    There is a range of other properties for the table you can adjust with `ALTER
    TABLE`, such as partitioning, constraints, lock escalation, and triggers. You
    can see the complete list of options to use with `ALTER TABLE` at [https://docs.microsoft.com/sql/t-sql/statements/alter-table-transact-sql#arguments](https://docs.microsoft.com/sql/t-sql/statements/alter-table-transact-sql#arguments)'
