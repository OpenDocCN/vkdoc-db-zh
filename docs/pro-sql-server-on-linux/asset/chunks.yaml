    **Caution**   This is undocumented and could easily change in the future. If you


    enable trace flag 2588, it will enable DBCC heLp to show all DBCC commands in


    the code, even ones that are not supported. again, you should use extreme caution


    with any undocumented DBCC command. They are not intended for production use


    and you could even cause problems for your SQL Server when using them unless


    you are guided by Microsoft.


    ** Trace  Flags**


    Trace flags can be used to enable a specific feature in SQL Server or gain insight
    into


    technical details that could be used for debugging or diagnostics.


    Think of trace flags as  *dynamic* decision points in the code of the SQL Server
    engine


    that can be used to turn on or off a capability or behavior.


    Trace flags have a long history in SQL Server and were originally intended as


    debugging aids for the developers of the SQL Server engine. Developers wanted
    ways to


    turn certain behaviors on and off without rebuilding the code. Today, in the SQL
    Server


    source code there are hundreds of possible trace flags. However, the only official
    trace


    flags that are supported are either listed on this documentation page[, https://docs.](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-trace-flags-transact-sql)


    [microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-trace-flags-](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-trace-flags-transact-sql)


    [transact-sql](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-trace-flags-transact-sql) or
    in an official Microsoft Knowledge Base article.


    Trace flags are enabled for a session or globally for all sessions. Some trace
    flags


    can only be enabled globally and must be turned on at the startup of SQL Server
    to be


    recognized by the code.


    To enable a trace flag for a session, you use the T-SQL command **DBCC TRACEON**.


    To turn off a trace flag, you use the command **DBCC TRACEOFF**. If you use the
    special


    parameter -1 when turning on or off trace flags with DBCC TRACEON, the trace flags


    will be enabled globally for all sessions from that point forward. Trace flags
    can be


    turned on at SQL Server startup, to be enabled globally by using the mssql-conf
    script


    as documented a[t https://docs.microsoft.com/sql/linux/sql-server-linux-](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf#traceflags)


    [configure-mssql-conf#traceflags.](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf#traceflags)


    ChapTer 5   SQL Server TooLS


    **Note**  Like SQL Server for Windows, SQL Server for Linux supports startup trace


    flags with the sqlservr command line parameter -T. For SQL Server on Linux, I


    recommend you always use the mssql-conf script to set or unset startup trace


    flags.


    You can view the status of all enabled trace flags by using the command **DBCC **


    **TRACESTATUS**.


    Many documented trace flags end up in the product to enable a specific performance


    optimization or fix for a problem encountered by users. These changes often require


    trace flags to avoid causing problems for customers who do not need the behavior.
    In


    some cases, we have tried to use other methods to enable these types of enhancements


    such as ALTER DATABASE options or through commands like sp_configure.


    Here are a few of common trace flags I often use that you can find in the


    documentation:


    **1222**: Displays details of deadlock information in the SQL Server


    ERRORLOG in an XML format. You can find a discussion of


    locking and deadlocking topics, including details of the XML


    deadlock information from this traceflag, in our documentation'
