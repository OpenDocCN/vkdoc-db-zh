- fmt: '# Chapter 4 Building an application and advanced T-SQL


    ```

    console.log("Connecting to SQL Server");


    var connection = new Connection(config);


    connection.on(''connect'', function(err) {


    // If no error, then good to proceed.


    console.log("Connected to SQL Server Successfully");


    InsertCustomer();


    });


    function InsertCustomer() {


    request = new Request("[Sales].[InsertCustomer]", function(err) {


    if (err) {


    console.log(err);}


    else


    console.log(''Inserted new Customer'');


    }


    );


    request.addParameter(''PrimaryContactID'', TYPES.Int, 1);


    request.addParameter(''AlternateContactID'', TYPES.Int, 1);


    request.on(''requestCompleted'', ()=>{connection.close();});


    connection.callProcedure(request);


    }

    ```


    To run this code, I ran this command:

    `node .\execinsertcustomer.js`


    The results should look like this from the Integrated Terminal in VS Code or your
    command shell:

    ```

    PS C:\wwi> node .\execinsertcustomer.js

    Connecting to SQL Server

    Connected to SQL Server Successfully

    Inserted new Customer

    ```


    The method to close the connection uses the event programming model common to
    node.js applications. This line of code will close the connection when a request
    is completed (i.e., a query is completed).

    ```

    request.on(''requestCompleted'', ()=>{connection.close();});

    ```


    ## Enhancing Your Application


    I covered just some of the fundamental methods to use node.js with Tedious to
    connect and run queries against SQL Server, including stored procedures. As you
    build up a production application, you will want to enhance it to take advantage
    of other methods with node.js.


    Here are my recommendations to consider:


    *   A more efficient way to handle connections to open and close them frequently
    is a concept called *connection pooling*. Connection pooling is very common for
    SQL Server applications, and Tedious supports this through another object: [tediousjs/tedious-connection-pool](https://github.com/tediousjs/tedious-connection-pool).

    *   You may want the ability to control timeouts for logins and/or queries (the
    length of time to wait for a login or query). The `Connection` object provides
    options in the configuration to control these timeouts. The default is 15 seconds
    for both. You also may want the ability to cancel a query you have submitted to
    SQL Server manually, and the `Connection` object supports this through `connection.cancel()`.

    *   There are a variety of other options you may want to use associated with the
    `Connection` object, such as encryption, IP addresses and port numbers, read intent
    for Availability Groups (which I will discuss later in Chapter 8), and more. They
    are all documented with the `Connection` object at [http://tediousjs.github.io/tedious/api-connection.html#function_newConnection](http://tediousjs.github.io/tedious/api-connection.html#function_newConnection).

    *   Your application should be prepared to handle certain events based on execution
    of a query and/or stored procedure. See the documentation for handling `doneProc`
    and `doneInProc` events from the `Request` object at [http://tediousjs.github.io/tedious/api-request.html](http://tediousjs.github.io/tedious/api-request.html).

    *   In addition, SQL Server may return both error and informational messages for
    any query execution. Be sure to handle these using the `Connection` object `infoMessage`
    and `errorMessage` events. See the `Connection` object details at [http://tediousjs.github.io/tedious/api-connection.html](http://tediousjs.github.io/tedious/api-connection.html).

    *   While you can use the T-SQL `BEGIN TRANSACTION` command as part of a batch
    within your application, the Tedious driver also provides interfaces for transactions.
    See the documentation for more.'
