- fmt: '# ChapTer 6 performanCe CapabILITIeS


    amount of performance can help, and this functionality is deprecated, so could
    be removed in a future release. See our documentation on how to do this at [https://docs.microsoft.com/sql/database-engine/configure-windows/default-trace-enabled-server-configuration-option](https://docs.microsoft.com/sql/database-engine/configure-windows/default-trace-enabled-server-configuration-option).


    ## Threads


    I have touched on the concept of worker threads and the fact that SQL Server has
    a pool of these threads to service the needs of tasks such as logins and queries.
    SQL Server primes this pool at startup and grows and shrinks the number of threads
    as needed.


    In order to avoid consuming too many resources, SQL Server has a maximum on the
    number of threads in the pool. By default, SQL Server calculates this maximum
    based on the number of detected CPUs on the Linux Server. You can see this calculated
    value in the `sys.dm_os_sys_info.max_workers_count` column. The formula for this
    value can be found in our documentation at [https://docs.microsoft.com/sql/database-engine/configure-windows/configure-the-max-worker-threads-server-configuration-option](https://docs.microsoft.com/sql/database-engine/configure-windows/configure-the-max-worker-threads-server-configuration-option).


    In most circumstances where this worker pool calculation is not enough to service
    the workload of the application, the problem is a concurrency issue such as many
    threads blocking on a resource. However, there are some situations where increasing
    the default value could boost a high-volume, multiuser workload. Use the `sp_configure`
    system procedure to change the `max worker threads` configuration value for these
    situations. You will need to restart SQL Server for this to take effect. Use the
    documentation resource in this section for the complete syntax.


    ## Plan Cache


    The plan cache can be a precious resource to ensure a maximum number of queries
    and objects are cached to avoid frequent query compilations. Some application
    workloads unavoidably use many `single-user ad hoc queries`. These are T-SQL statements
    that are not in the form of procedure objects, are not `parameterized`, and typically
    are only executed one time. In order to minimize the amount of memory for these
    type of queries, you can enable the `optimize for ad hoc workloads` configuration
    option with `sp_configure`. This will minimize the memory impact of these types
    of ad hoc queries.


    You can determine whether your application workload matches the need for this
    option and how to configure it in our documentation at [https://docs.microsoft.com/sql/database-engine/configure-windows/optimize-for-ad-hoc-workloads-server-configuration-option](https://docs.microsoft.com/sql/database-engine/configure-windows/optimize-for-ad-hoc-workloads-server-configuration-option).


    ## Tempdb Files


    I discussed the use of tempdb in Chapter 4 as part of a discussion on the use
    of temporary tables. Because the unique usage of tempdb involves a frequent allocation
    and deallocation of database pages, using a single tempdb database file can cause
    concurrency issues with system database pages used to track allocation information
    with'
