  trans: '

    如果你正在使用兼容级别 110 或更低的数据库，使用称为公用表表达式（`CTE`）概念的 `T-SQL` 查询允许重复的列名。但是，从数据库兼容级别 120
    开始，重复的列名将导致错误，查询会失败。


    有两个领域，数据库兼容性对可能的破坏性更改没有影响：

    -   已弃用的功能或特性

    -   在 `SQL Server` 实例级别、数据库范围之外的更改


    数据库兼容性可以提供巨大帮助的领域之一是性能。从数据库兼容级别 130 开始，任何可能导致查询计划更改的变更或特性，都应该只在新的兼容级别下发生。这为升级到
    `SQL Server` 较新版本但保留先前数据库兼容级别的应用程序提供了一种更安全的方法。


    我建议你通读我们所有关于使用兼容级别进行向后兼容的文档，网址为 [`docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-compatibility-level#using-compatibility-level-for-backward-compatibility`](https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-compatibility-level#using-compatibility-level-for-backward-compatibility)。


    ## 第 10 章   迁移至 Linux 上的 SQL Server


    ### 迁移 SQL Server 实例对象


    如果你正在将数据库从早期版本的 `SQL Server` 迁移到 Linux 上的 `SQL Server`，你可能需要迁移数据库范围之外的 `对象`，包括：

    -   `登录名`：请记住，只支持 `SQL Standard security` 和 `Active Directory` 身份验证。如果你有 `Windows`
    域登录名，你需要配置 `Active Directory` 身份验证以允许它们访问 Linux 上的 `SQL Server`。

    -   `SQL Server Agent 作业`：请记住，在 Linux 上的 `SQL Server` 中唯一能工作的作业类型是那些具有 `T-SQL`
    作业步骤的常规作业。对于其他包含 `T-SQL` 范围之外作业步骤的作业，你将需要寻找替代解决方案。

    -   `链接服务器`：只支持 `SQL Server` 到 `SQL Server` 的链接服务器，但你可以使用 `T-SQL` 系统存储过程来定义它们以添加链接服务器。你可以在文档中阅读更多相关信息：[`docs.microsoft.com/sql/relational-databases/linked-servers/linked-servers-database-engine`](https://docs.microsoft.com/sql/relational-databases/linked-servers/linked-servers-database-engine)。不幸的是，在
    Linux 上的 `SQL Server 2017` 中，你不能使用链接服务器上的分布式事务，并且只支持 `SQL Standard security`。


    ### 使用新功能


    我曾与一些从 `SQL Server` 的一个版本迁移到下一个版本的客户合作，他们这样做只是为了跟上最新的 `SQL Server` 版本，或者因为他们当前使用的版本已不再支持。在这些情况下，迁移后容易被忽视的一点是利用新功能。`SQL
    Server 2016` 和 `2017` 带有一些你可能容易错过的新功能，包括：

    -   `列存储索引`（在 `SQL Server 2012` 中引入，但在 `SQL 2017` 中我认为此功能已达到顶峰）

    -   `内存中 OLTP`（在 `SQL Server 2014` 中引入，但许多限制在 `SQL Server 2017` 中被移除）

    -   `图形数据库`

    -   `JSON 支持`

    -   `时态表`

    -   `原生评分`


    我在本书前面的章节中已经介绍过这些功能，所以我鼓励你回顾一下

    '
- fmt: 'and review these to see if they make sense for your application needs after
    the migration (or you may choose to use some of these as part of the migration).


    ## Using an Existing Application Against SQL Server on Linux


    It is one thing to migrate your objects and data, but what about your application
    developed to use `SQL Server`. The good news is that whether you are migrating
    from `SQL Server` or another database platform, our server-side programs such
    as stored procedures are typically part of the migration process I’ve described
    in this chapter.


    However, if you have queries embedded in your application, such as ad hoc queries,
    or use a programming interface such as `Object Relational Mapping (ORM)`, which
    typically generates queries, migration of the application may be more difficult.


    The great news is that `SQL Server` supports just about every popular programming
    language interface on the market today, including `C#`, `Java`, `Node.js`, `PHP`,
    `Python`, `Ruby`, and `C++`. You can see a complete list of programming interfaces
    supported for `SQL Server` on `Windows`, `macOS`, and `Linux` at `https://docs.microsoft.com/sql/linux/sql-server-linux-develop-connectivity-libraries`.
    And if you are using an application against a previous version of `SQL Server`,
    there is a high chance your application will work with `SQL Server` on `Linux`
    with very few changes.


    **Note**: the type of breaking changes that may affect your `SQL Server` application
    will be more related to database compatibility and any differences in features
    not supported by `SQL Server` on `Linux`. Keep up to date with feature differences
    for `SQL Server` on `Linux` in our release notes at `https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes`.


    # Chapter 10 Migrating to SQL Server on Linux


    The challenge if you are migrating an application that connected to a database
    platform other than `SQL Server` is to make the necessary changes to use the programming
    interface native to that platform. For example, in Chapter 4 I showed you how
    to use `node.js` and the `tedious` driver to connect to `SQL Server`. The `tedious`
    driver does not work with `Oracle`. So you may have a program written in `node.js`
    that uses something like the `node-oracleb` driver (see more about this driver
    at `https://github.com/oracle/node-oracledb`). The classes and methods may be
    similar between `tedious` and `node-oracleb`, but likely there are enough differences
    that this will require code changes, testing, and design. Don’t forget to check
    out differences in how the drivers work even in the same programming language
    for concepts like connection pooling, results processing, concepts like cursors,
    and error conditions (e.g., deadlocks may be handled differently across database
    platforms).


    ## Summary


    I hope this chapter gave you the right information to make the necessary decisions
    to migrate to `SQL Server` on `Linux`. It is only appropriate to complete this
    book by talking about a technology that is currently gaining steam as a popular
    environment to deploy applications and databases, called containers.


    # Chapter 11 SQL Server and Containers


    The concept of virtual machines has been around for some time, but at Microsoft
    I really didn’t see customers start to use `SQL Server` as a database platform
    on virtual machines until around the 2006 to 2007 timeframe. Even when virtual
    machine environments such as `Hyper-V` and `VMWare` started to become popular,
    I was skeptical `SQL Server` would run well in a guest virtual machine. Today,
    `SQL Server` is probably deployed in virtual machines far greater than on a bare
    metal computer.'
