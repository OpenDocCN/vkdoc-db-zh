    ** String  Functions**


    Application developers often need to perform operations against character data
    as


    strings. SQL Server provides a rich set of T-SQL functions to find and manipulate


    string data, which can be useful to enhance your stored procedure code. The **CONCAT**


    operation in the computed column example of the People table is an example of
    a T-SQL


    string function. Other functions exist to split (**STRING_SPLIT**), aggregate
    (**STRING_**


    **AGG**), find substring (**SUBSTRING**), format (**FORMAT**), and trim (**LTRIM** and **RTRIM**).


    ** Other T-SQL Commands**


    The T-SQL language has become so powerful over the years, with rich capabilities


    beyond standard CRUD operations. While I will review some of the exciting recent


    new features in the next section, I encourage you to explore the entire T-SQL
    reference


    documentation. As a developer there may be other commands or features that will
    help


    your journey into building a rich data-driven application. For the complete reference,


    see our documentation a[t https://docs.microsoft.com/sql/t-sql/language- ](https://docs.microsoft.com/sql/t-sql/language-reference)


    [reference](https://docs.microsoft.com/sql/t-sql/language-reference).


    ** Exploring New SQL Server Capabilities**


    While SQL Server over the years has become a dominant relational database engine
    in


    the industry, today at Microsoft we think of SQL Server as a  *modern data platform*. That


    is because we have extended the capabilities beyond the standard features of a
    typical


    relational database engine.


    Chapter 4   Building an appliCation and advanCed t-SQl


    In this final section of the chapter, I will show you some of these new capabilities
    that


    have been introduced into the product in SQL Server 2016 and 2017.


    ** JSON**


    In SQL Server 2008, we introduced a new XML datatype to store native XML data
    into a


    table column and provided operators to work against unstructured or semistructured


    data.


    In SQL Server 2016, we recognized the popularity of JSON as a text format widely


    used in web applications and in NoSQL database systems.


    Instead of creating a separate type like XML, SQL Server 2016 and 2017 provide


    T-SQL language commands to operate against JSON-formatted data stored in a character


    SQL Server column.


    For an example, look at the People table and one of the columns I commented out:'
  trans: '

    # 第 4 章：构建应用程序与高级 T-SQL


    ## 二进制数据类型


    本章的表示例中展示了一个关于二进制数据类型的特殊语法：


    ```sql

    [Photo] varbinary NULL,

    ```


    请注意 `varbinary` 数据类型后的 `(max)` 语法，在通常显示长度的位置上，这里使用了它。SQL Server 中一行（或一列）的正常最大大小是
    8000 字节，但存在一种机制可以存储大于此值的数据（最大值实际上是 `2³¹-1` 字节）。这被称为 `TEXT/IMAGE` 数据，其存储机制与常规行不同（使用与行存储页面分离的一组数据库页面）。这些类型的旧式数据类型名称是
    `text`、`image` 和 `ntext`。但你应该对 `varchar`、`nvarchar` 和 `varbinary` 使用现代语法的 `(max)`
    规范。


    ## 计算列


    在第 3 章的**创建表**一节中，我对示例表中的一些列定义进行了注释，其中之一就是这个列：


    ```sql

    [SearchName]  AS (concat([PreferredName],N'' '',[FullName])) PERSISTED NOT NULL,

    ```


    这是一个*计算列*的例子。计算列是一个基于表中其他列的表达式，可以通过列名后的 `AS` 语法识别。通常，计算列会在你用 `SELECT` 语句查询该列时进行计算。但如果你使用
    `PERSISTED` 关键字，SQL Server 会在插入或更新行时，从引用的列计算并存储该表达式的结果。计算列在某种程度上是一种*服务器端编程*的形式，因为你是基于存储在表中的其他数据来创建数据。计算列使得以声明方式提供此类编程变得更加容易，而无需编写单独的存储过程或触发器代码。


    ## 字符串函数


    应用程序开发人员经常需要对字符数据执行字符串操作。SQL Server 提供了一套丰富的 T-SQL 函数来查找和操作字符串数据，这对于增强存储过程代码非常有用。在
    `People` 表的计算列示例中使用的 `CONCAT` 操作就是一个 T-SQL 字符串函数的例子。其他函数还包括拆分 (`STRING_SPLIT`)、聚合
    (`STRING_AGG`)、查找子字符串 (`SUBSTRING`)、格式化 (`FORMAT`) 以及修剪 (`LTRIM` 和 `RTRIM`)。


    ## 其他 T-SQL 命令


    多年来，T-SQL 语言已变得非常强大，具备了超越标准 CRUD 操作的丰富能力。虽然我将在下一节回顾一些令人兴奋的近期新特性，但我鼓励你探索完整的 T-SQL
    参考文档。作为一名开发人员，可能还有其他命令或特性，将对你构建丰富的数据驱动应用程序的旅程有所帮助。完整参考，请参阅我们的文档：[`docs.microsoft.com/sql/t-sql/language-reference`](https://docs.microsoft.com/sql/t-sql/language-reference)。


    ## 探索 SQL Server 的新能力


    多年来，SQL Server 已成为行业中占主导地位的关系数据库引擎，而如今在微软，我们视 SQL Server 为一个*现代数据平台*。这是因为我们已经将其能力扩展到了典型关系数据库引擎的标准功能之外。


    在本章的最后一节，我将向你展示在 SQL Server 2016 和 2017 版本中引入产品的一些新特性。


    ### JSON


    在 SQL Server 2008 中，我们引入了一个新的 `XML` 数据类型，用于将原生 XML 数据存储到表列中，并提供了操作非结构化或半结构化数据的运算符。


    在 SQL Server 2016 中，我们认识到 JSON 作为一种文本格式在 Web 应用程序和 NoSQL 数据库系统中的广泛流行。


    SQL Server 2016 和 2017 并没有创建像 `XML` 那样的单独类型，而是提供了 T-SQL 语言命令来操作存储在字符型 SQL Server
    列中的 JSON 格式数据。


    例如，看一下 `People` 表以及我注释掉的一个列。

    '
- fmt: "\n\n# SQL Server JSON 支持与临时表\n\nSQL Server 对 JSON 的支持包括一个 **JSON_QUERY**()\
    \ T-SQL 函数，用于从 JSON 字符串中提取对象或数组。在此示例中，对象是从 `CustomFields` 列（定义为 `nvarchar(max)`，但数据格式为\
    \ JSON）中提取的 `OtherLanguages`。\n\n```\nAS (json_query([CustomFields],N'$.OtherLanguages'))\n\
    ```\n\nSQL Server 对 JSON 的支持还包括 **OPENJSON**() T-SQL 函数，用于将 JSON 格式的数据转换为行和列。此外，我们还为\
    \ T-SQL `SELECT` 语句提供了一个名为 **FOR JSON** 的新扩展，它将获取标准的行列数据集，并以 JSON 格式返回结果。其他 JSON\
    \ T-SQL 函数在我们的文档中有描述：[https://docs.microsoft.com/sql/t-sql/functions/json-functions-transact-sql](https://docs.microsoft.com/sql/t-sql/functions/json-functions-transact-sql)。\n\
    \n有关 SQL Server 处理 JSON 数据的所有功能的完整列表，请参阅我们的文档：[https://docs.microsoft.com/sql/relational-databases/json/](https://docs.microsoft.com/sql/relational-databases/json/)。\n\
    \n## 临时表\n\n对于某些开发人员和数据专业人员来说，一个常见的场景是在表中存储行变更的 *版本* 历史记录（这是触发器的另一种可能用途）。从 SQL\
    \ Server 2016 开始，引入了一项名为 *临时表* 的新功能来解决在表中存储变更历史的问题，并提供了内置的、易于使用的方法来检索过去某个时间点的行版本。\n\
    \n**第 4 章 构建应用程序与高级 T-SQL**\n\n查看此功能实际应用的一个方法是通过示例。还记得我在 `People` 和 `Customer`\
    \ 表中注释掉的这两列吗？\n\n```\n[ValidFrom] [datetime2](7) GENERATED ALWAYS AS ROW START\
    \ NOT NULL,\n[ValidTo] [datetime2](7) GENERATED ALWAYS AS ROW END NOT NULL\n```\n\
    \n当你结合这些列的定义并向表定义添加其他语法时，你就定义了一个临时表。我将创建一个新的 `People` 表定义来展示此功能，以免破坏之前章节示例中现有的表定义。\n\
    \n以下是包含完整临时语法的新 `People` 表定义，包括对应的表（称为 *历史* 表）。你可以在示例脚本 **`createtemporaltable.sql`**\
    \ 中找到这些 T-SQL 命令：\n\n```sql\nUSE [WideWorldImporters]\nGO\n\n-- 如果已经创建了表，我们需要先关闭系统版本控制\n\
    --\nIF EXISTS (SELECT * FROM sys.objects where name = 'NewPeople')\nALTER TABLE\
    \ [Application].[NewPeople] SET (SYSTEM_VERSIONING = OFF)\nGO\n\n-- 如果存在则删除归档表\n\
    --\nDROP TABLE IF EXISTS [Application].[NewPeople_Archive]\nGO\nDROP TABLE IF\
    \ EXISTS [Application].[NewPeople]\nGO\n\nCREATE TABLE [Application].[NewPeople](\n\
    \    [PersonID] [int] PRIMARY KEY NOT NULL,\n    [FullName] [nvarchar](50) NOT\
    \ NULL,\n    [PreferredName] [nvarchar](50) NOT NULL,\n    [SearchName]  AS (concat([PreferredName],N'\
    \ ',[FullName])) PERSISTED NOT NULL,\n    [IsPermittedToLogon] [bit] NOT NULL,\n\
    \    [LogonName] [nvarchar](50) NULL,\n    [IsExternalLogonProvider] [bit] NOT\
    \ NULL,\n    [HashedPassword] [varbinary](max) NULL,\n    [IsSystemUser] [bit]\
    \ NOT NULL,\n    [IsEmployee] [bit] NOT NULL,\n    [IsSalesperson] [bit] NOT NULL,\n\
    \    [UserPreferences] [nvarchar](max) NULL,\n    [PhoneNumber] [nvarchar](20)\
    \ NULL,\n    [FaxNumber] [nvarchar](20) NULL,\n    [EmailAddress] [nvarchar](256)\
    \ NULL,\n    [Photo] [varbinary](max) NULL,\n    [CustomFields] [nvarchar](max)\
