- fmt: '# Chapter 1 Why SQL Server on Linux?


    enough, for 20+ years I became an expert on SQL Server running on Windows Server,
    thinking I would never see SQL Server run on anything else.


    Then one day in 2015, my colleague Bob Dorr and I receive an email from Slava
    Oks, the lead development engineer for SQL Server, asking what we thought if we
    built SQL Server to run on Linux. Of course I had to read the email a few times
    before it sunk in what he was proposing. I didn’t think about it much for a few
    months until I attended an internal Microsoft event in late 2015. At this event,
    to my amazement, Tobias


    © Bob Ward 2018


    B. Ward, *Pro SQL Server on Linux*, [https://doi.org/10.1007/978-1-4842-4128-8_1](#index_split_000.html#p24)


    Ternstrom, one of the original program managers on the project, showed the audience
    an SQL Server deploying with `apt-get` on Ubuntu and connecting to run queries
    in a manner of minutes.


    After getting back in my chair, I had all kinds of questions. How did we do this
    so quickly? What was the architecture behind taking one of the leading database
    engines and getting it up and running on Linux in such a quick timeframe. But
    also, I wanted to know why. The SQL Server product had been enjoying immense success
    in the industry with customers running on Windows Server.


    And this is how we will start this book. I’ll explain our motivations behind bringing
    SQL Server to the Linux platform, the fundamentals of how we made it happen, and
    its core capabilities. I’ve got a reputation with the existing SQL Server community
    for presenting on internals of SQL Server, so I won’t be able to help myself in
    this chapter and throughout the book. You will see at times a peek “behind the
    scenes” of how this technology works on the Linux Platform.


    ## Platform of Choice


    In May of 2016, we released Microsoft SQL Server 2016, which was the 11th major
    release of SQL Server since we introduced 4.2 for Windows NT in 1993. This release
    was packed with major functionality and was positively received by the SQL Server
    community.


    While the great work was happening to launch this release, the engineering team
    was already working on SQL Server 2017, for which the key headlining feature would
    be SQL Server finally being supported on Linux and containers. The industry and
    the world already knew we were going to make this a reality, as earlier in the
    year Scott Guthrie, Executive Vice President of the Cloud and Enterprise Group
    at Microsoft, had made the announcement at a customer event and on our official
    Microsoft blog (see [https://blogs.microsoft.com/blog/2016/03/07/announcing-sql-server-on-linux](https://blogs.microsoft.com/blog/2016/03/07/announcing-sql-server-on-linux)).
    In this blog, Scott calls out the true reason to bring SQL Server on Linux “…Bringing
    SQL Server to Linux is another way we are making our products and new innovations
    more accessible to a broader set of users and meeting them where they are.” Our
    decision to bring SQL Server on Linux was not about moving away from Windows Server.
    It was about building a great data platform on both Windows and Linux. It was
    about providing a choice of platforms for our customers. And we didn’t just come
    to this conclusion without data and customer evidence.


    First, we knew that in the industry a trend was emerging for several years that
    Linux was becoming very popular. Research today shows approximately 30% of enterprise
    servers are now using some Linux distribution. Research by independent firms such
    as Gartner shows that Linux Server is the fastest growing OS segment (www.gartner.com/doc/3731017/market-share-analysis-server-operating).


    Second, at Microsoft we saw the evidence ourselves. For Microsoft Azure Virtual'
