    [架构和管理指南#物理架构。](https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-log-architecture-and-management-guide#physical_arch)


    我的建议是，您绝对应该配置数据库和事务日志文件以允许自动增长值。您最不希望发生的事情是，由于意外事件导致数据库空间不足，并在磁盘空间充足的情况下引发生产中断。但是，您应该首先进行仔细规划，选择数据库和事务日志文件的大小，以考虑可能的使用情况和数据库所需的增长。指定文件路径和大小时使用的`FILEGROWTH`参数用于确定数据库或事务日志的自动增长方式。您必须选择一个平衡相当快速的自动增长操作需求但避免大量自动增长操作的值。数据库和事务日志文件的默认`FILEGROWTH`大小为64MB，这个值对许多数据库来说可能特别合适。根据我的经验，管理事务日志的增长大小通常是最重要的。有关此主题的更详细指导，请参阅此文档页面：[https://docs.microsoft.com/sql/relational-databases/logs/manage-the-size-of-the-transaction-log-file](https://docs.microsoft.com/sql/relational-databases/logs/manage-the-size-of-the-transaction-log-file)。


    我还建议您监控系统上发生自动增长的时间，以决定是否需要调整实际的数据库或事务日志大小。我将在第9章讨论如何将监控事务日志大小作为备份策略的一部分。


    ## 第6章 性能功能


    ### 索引


    我在第3章向您展示了如何创建索引以在表设计中强制主键和其他列（例如，`UNIQUE`约束）的唯一性。索引在SQL Server中还有另一个重要目的：查询性能。使用索引来加快查询性能是任何数据库平台的常用技术。话虽如此，在首次创建数据库时构建索引的最简单方法是创建索引以：

    - 强制主键约束

    - 强制其他唯一约束（您可以在[https://docs.microsoft.com/sql/relational-databases/tables/create-unique-constraints](https://docs.microsoft.com/sql/relational-databases/tables/create-unique-constraints)阅读有关唯一约束的更多信息）

    - 确保任何外键约束查找的性能良好。


    这些几乎总是非聚集索引，所以我将在后面的部分讨论它们。


    因此，您将构建的基础索引集完全基于您的键设计。之后，过程是关于决定哪些其他索引可能有助于提升查询性能，并与维护它们的成本相平衡。


    我可以用一整章来讨论索引选择和建议，但我也是一个主张简化这些决策的人。我们在文档中有一个相当全面的索引设计指南，您可以将其作为参考：[https://docs.microsoft.com/sql/relational-databases/sql-server-index-design-guide](https://docs.microsoft.com/sql/relational-databases/sql-server-index-design-guide)。


    在本章的这一部分，我将提供创建索引（包括聚集和非聚集索引）的实用指导。我还将向您展示示例、有助于选择的工具，

    '
  raw: '[docs.microsoft.com/sql/relational-databases/sql-server-transaction-log-](https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-log-architecture-and-management-guide#physical_arch)


    [architecture- and-management-guide#physical_arch.](https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-log-architecture-and-management-guide#physical_arch)


    My recommendation is that you absolutely configure your database and


    transaction log files to allow an autogrow value. The last thing you want is for
    the


    database to run out of space because of an unexpected event and cause a production


    outage when plenty of disk space exists. However, you should do careful planning


    first to choose a size of database and transaction log files to account for possible


    usage and required growth of the database. The FILEGROWTH parameter when


    specifying a file path and size is used to determine how autogrow will work for
    a


    database or transaction log. You must choose a value that balances the need for
    a


    fairly fast autogrow operation but avoids a large number of autogrow operations.
    The


    default FILEGROWTH sizes are 64MB for database and transaction log files, and
    that


    value could be a particularly good one for many databases. I have found through
    my


    experience that managing the size of growth for the transaction log is usually
    most


    important. See this documentation page for more detailed guidance on the topic:


    [https://docs.microsoft.com/sql/relational-databases/logs/manage-the-size-](https://docs.microsoft.com/sql/relational-databases/logs/manage-the-size-of-the-transaction-log-file)


    [of-the-transaction-log-file](https://docs.microsoft.com/sql/relational-databases/logs/manage-the-size-of-the-transaction-log-file).


    I also recommend you monitor when an autogrow occurs on your system, to decide


    if you need to resize the actual database or transaction log size. I’ll address
    how to


    monitor the size of the transaction log as part of your backup strategy in Chapt[er 9.](#index_split_006.html#p457)


    ChapTer 6   performanCe CapabILITIeS


    ** Indexes**


    I showed you in Chapt[er 3 ho](#index_split_002.html#p99)w to create indexes to
    enforce uniqueness for primary keys


    and other columns (e.g., a UNIQUE constraint) in a table design. Indexes serve
    another


    important purpose in SQL Server: query performance. Using indexes to speed up
    query


    performance is a common technique with any database platform. Having said that,
    the


    simplest way to build indexes when first creating your database is to create indexes
    to:


    •  Enforce primary key constraints


    •  Enforce other unique constraints (you can read more about unique


    constraints a[t https://docs.microsoft.com/sql/relational- ](https://docs.microsoft.com/sql/relational-databases/tables/create-unique-constraints)


    [databases/tables/create-unique-constraints).](https://docs.microsoft.com/sql/relational-databases/tables/create-unique-constraints)


    •  Ensure proper performance for any foreign key constraint lookups.


    These will almost always be nonclustered indexes, so I’ll discuss


    them later in the section.


    So, the base set of indexes you will build is all based on your key design. After
    that,


    the process is about deciding what other indexes might help boost query performance,


    balanced with the cost to maintain them.


    I could spend an entire chapter on index selection and recommendations, but I’m


    also a believer in making these decisions simple. We do have a fairly thorough
    guide in


    our documentation on index design, which you can use as a reference a[t https://docs.](https://docs.microsoft.com/sql/relational-databases/sql-server-index-design-guide)


    [microsoft.com/sql/relational-databases/sql-server-index-design-guide](https://docs.microsoft.com/sql/relational-databases/sql-server-index-design-guide).


    In this section of the chapter, I will provide practical guidance to creating
    indexes,


    both clustered and nonclustered. I’ll also show you examples, tools to help in
    selection,'
