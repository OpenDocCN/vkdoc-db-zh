    ### Tools


    I think you now remember the very long chapter on tools (Chapter 5). That chapter
    was long for a reason. I believe SQL Server has an amazing tools story: both features
    built into the engine and programs outside the engine. Here are a few specific
    areas for tools where I think SQL Server on Linux shines compared with `pgsql`:


    ### Dynamic Management Views (DMVs)


    `DMVs` are one of the most powerful features of SQL Server to gain live, dynamic
    insight into the execution of the SQL Server database engine. `pgsql` has similar
    capabilities, but I’ve observed through my research several significant differences
    in favor of `DMVs`:

    *   Our `DMVs` have memory information in detail. `Pgsql` only supports looking
    at buffer cache information from a `pg_buffercache` view.

    *   `pg_stat_statements`, which is an equivalent feature to the `DMV` `dm_exec_requests`,
    is not on by default. The docs for `pgsql` say that enabling this feature can
    cause performance overhead, can be saved across restarts, but doesn’t contain
    execution plan information where `dm_exec_query_stats` provides the estimated
    query plan (as does Query Store).

    *   `pg_stat_activity` is equivalent to the `DMV` `dm_exec_requests` except that
    it is not “live” because it is refreshed based on information from each process
    (default refresh rate is 500ms but that can be configured). SQL Server `DMVs`
    are “on-demand.” You can query the state of the system anytime and you get the
    real-time view of the system at that time.

    *   `Pgsql` provides blocking information about processes and locks in the view
    `pg_locks`. The `pid` of the process waiting on a lock can be seen in this view.
    However, this information is not found in `pg_stat_activity`. The SQL Server `DMV`
    `dm_exec_requests` provides blocking information (including the blocking task)
    and you can also see all detailed locks in the `DMV` `dm_tran_locks`.

    *   SQL Server provides `DMVs` for all core engine functionality and for just
    about every feature included in SQL Server (in fact, SQL Server includes ~243
    `DVMs` in SQL Server on Linux). `Pgsql` provides mostly dynamic system activity
    through the statistics collector and covers only the core database engine.

    *   SQL Server provides a `DMV` to recommend missing indexes with `dm_db_missing_index_details`.
    `Pgsql` does not offer an index recommendation feature built into the database
    engine.


