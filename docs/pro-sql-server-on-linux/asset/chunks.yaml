  trans: "\n# 第 5 章：SQL Server 工具\n\n[transact-sql](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-sessions-transact-sql)\
    \ 等待类型描述了 SQL Server 请求可能在资源（如锁、I/O、latch 等）上等待的不同场景。关于等待类型及其对应用程序意义的最全面描述，可以在我的朋友兼\
    \ SQL Server 社区领袖 Paul Randal 运行的这篇社区博客中找到：[`www.sqlskills.com/help/waits/`](https://www.sqlskills.com/help/waits/)。\n\
    \n## `dm_exec_query_stats`\n\n一个基于当前缓存查询的性能统计列表。这是用于查询性能分析的极其受欢迎的 DMV。我喜欢我们文档中的示例，我已在示例脚本\
    \ `dm_exec_query_stats.sql` 中提供了它。此查询旨在显示占用最多 CPU 资源的 Top <N> 个查询：\n\n```sql\n\
    -- 按 CPU 使用率获取前 5 个查询。显示 query_hash、平均 CPU 时间和 T-SQL 文本\n-- query_hash 是一种唯一标识查询的方式，该查询可能以多种方式执行但具有相似的“模式”\n\
    SELECT TOP 5\n    query_stats.query_hash AS \"Query Hash\",\n    SUM(query_stats.total_worker_time)\
    \ / SUM(query_stats.execution_count) AS \"Avg CPU Time\",\n    MIN(query_stats.statement_text)\
    \ AS \"Statement Text\"\nFROM\n    (SELECT QS.*,\n        SUBSTRING(ST.text,\n\
    \            (QS.statement_start_offset/2) + 1,\n            ((CASE statement_end_offset\n\
    \                WHEN -1 THEN DATALENGTH(ST.text)\n                ELSE QS.statement_end_offset\
    \ END\n                - QS.statement_start_offset)/2) + 1) AS statement_text\n\
    \    FROM sys.dm_exec_query_stats AS QS\n        CROSS APPLY sys.dm_exec_sql_text(QS.sql_handle)\
    \ as ST) as query_stats\nGROUP BY query_stats.query_hash\nORDER BY \"Avg CPU Time\"\
    \ DESC\nGO\n```\n\n此 DMV 以哈希值（唯一标识具有相同“模式”的查询）和句柄的形式存储查询信息。请注意这里使用了 DMF `dm_exec_sql_text`\
    \ 来获取 SQL 查询的文本。\n\n您可以在 [`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-stats-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-stats-transact-sql)\
    \ 找到 `dm_exec_query_stats` 的完整文档。`dm_exec_sql_text` 的文档可以在 [`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-sql-text-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-sql-text-transact-sql)\
    \ 找到。\n\n## `dm_os_waiting_tasks`\n\n一个等待资源的任务（查询和后台任务）列表。此 DMV 仅显示正在等待资源的请求。以下来自示例脚本\
    \ `dm_os_waiting_tasks.sql` 的示例显示了所有等待资源的用户请求（注意：如果没有用户任务在等待资源，此查询将返回 0 行）：\n\n\
    ```sql\n-- 显示所有正在等待资源的用户请求\n--\nSELECT wt.session_id, wt.wait_type, wt.wait_duration_ms\n\
    FROM sys.dm_os_waiting_tasks wt\nINNER JOIN sys.dm_exec_sessions es\n    ON es.session_id\
    \ = wt.session_id\n    AND es.is_user_process = 1\nGO\n```\n\n您可以在 [`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-waiting-tasks-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-waiting-tasks-transact-sql)\
    \ 找到此 DMV 的文档。\n"
