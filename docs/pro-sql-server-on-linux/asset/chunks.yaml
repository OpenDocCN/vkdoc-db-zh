- fmt: '## 轻量级查询分析


    启用此跟踪标志后，您现在可以通过 `sys.dm_exec_query_profiles` DMV（以表格形式查看操作符和统计信息）和 `sys.dm_exec_query_statistics_xml`
    DMF（以 XML 文档形式查看计划）查看任何活动查询的实际执行计划信息。我们已进行测试，表明轻量级查询分析对整体查询性能影响极小，因此可以在生产环境中使用。如果您想使用带有轻量级分析的扩展事件来跟踪查询计划信息，可以启用
    `query_thread_profile` 事件，这也会为所有会话启用轻量级查询分析。`query_thread_profile` 事件包含有关操作符（节点）的列，但不包含
    XML 文档形式的计划。


    轻量级分析还有另一个吸引人的特点：DMV 和 DMF 可用于当前正在执行的查询（实时查询分析），因此您不必等待查询完成。


    > **注意** 当启用 `query_post_execution_showplan` 事件时，`dm_exec_query_profiles`、`dm_exec_query_statistics_xml`
    和 `query_thread_profile` 也可用于已完成的查询。但是，使用 `query_post_execution_showplan` 会覆盖跟踪标志
    7412，并且不会使用轻量级查询分析。


    SSMS 允许您通过称为“活动监视器”的功能查看轻量级查询分析的信息。


    > **注意** SSMS 还包含一个按钮，用于查看“实时查询”的查询计划统计信息，称为“包含实时统计信息”。此功能不使用轻量级查询分析。


    ### 查询存储


    在 SQL Server 2008（代号 Katmai）发布之后，我们 SQL Server 的首席架构师之一 Conor Cunningham 找到了我，讨论我们在技术支持中用于性能故障排除的技术以及如何改进它们。


    到 SQL Server 2008 时，DMV 已变得极为流行，我们根据客户反馈和添加到 SQL Server 的功能继续添加了更多 DMV。DMV 最大的缺点是，要捕获更改历史记录，您必须通过查询
    DMV 来*轮询* DMV 数据，并以频繁的基准保存结果（您通常还会在每次查询 DMV 时添加时间戳以记录随时间变化的行历史记录）。例如，要捕获有关缓存中查询的性能信息，您可以查询
    `sys.dm_exec_query_stats` 并每 <n> 秒或分钟保存一次数据。这种技术有效但不够优雅。我们在技术支持中使用了这种技术，并配合 SQLTrace
    和 Extended Events 等工具与客户一起进行性能故障排除。


    Conor 提出了一个名为*查询磁盘存储*的新想法。他的想法是在 SQL Server 引擎中内置将查询的性能信息（包括随时间的变化）直接存储到数据库中的能力。这个想法催生了
    SQL Server 2016 中的一个新功能，称为**查询存储**。


