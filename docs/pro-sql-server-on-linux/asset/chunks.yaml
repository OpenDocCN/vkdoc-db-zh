    \ SQL Server Active Directory 身份验证配置 Active Directory：[`docs.microsoft.com/sql/linux/sql-server-linux-active-directory-authentication?#createuser`](https://docs.microsoft.com/sql/linux/sql-server-linux-active-directory-authentication?#createuser)。\n\
    \n您可能和我一样，希望演示此功能；我在虚拟机中设置了自己的 Windows Server 作为带有自己 Active Directory 的域控制器。设置我自己的\
    \ AD 和域控制器比我想象的要简单，但我得到了帮助。这篇博客文章非常出色，可以指导您完成：[`blogs.technet.microsoft.com/canitpro/2017/02/22/step-by-step-setting-up-active-directory-in-windows-server-2016/`](https://blogs.technet.microsoft.com/canitpro/2017/02/22/step-by-step-setting-up-active-directory-in-windows-server-2016/)。\n\
    \n以下是我遇到的一些其他问题，可能对您在配置 Linux 上的 SQL Server 的 AD 身份验证时有所帮助。\n\n当我尝试使用文档中的这个命令将\
    \ SQL Server 加入域时：\n\n```\nsudo realm join contoso.com -U 'user@CONTOSO.COM' -v\n\
    ```\n\n我遇到了三个问题：\n\n1.  我必须使用类似这样的命令更改我的 Linux 服务器的主机名（从其默认值）：\n\n    ```\n  \
    \  hostnamectl set-hostname bobsqllinux\n    ```\n\n    我本应在 VM 上安装 RHEL 时就完成此操作（实际上\
    \ Azure 会自动执行）。结果发现，当我安装 RHEL 时，输入一个非默认的主机名是可选的。\n\n    ![](img/index-348_1.png)\n\
