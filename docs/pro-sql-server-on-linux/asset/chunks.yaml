    •  Best Practices for running Data Migration Assistant, a[t https://](https://docs.microsoft.com/sql/dma/dma-bestpractices)


    [docs.microsoft.com/sql/dma/dma-bestpractices](https://docs.microsoft.com/sql/dma/dma-bestpractices)


