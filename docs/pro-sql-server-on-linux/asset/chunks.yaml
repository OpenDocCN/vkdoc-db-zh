    ## SQL Server 工具


    窗口，默认称为控制流设计器。


    ![](img/index-243_1.jpg)


    图 5-45 展示了我为此数据包向控制流添加一个数据流任务后的屏幕。


    ***图 5-45.** 一个已添加到 SSIS 包控制流中的数据流任务*


    在控制流设计器旁边的选项卡是数据流设计器。通过双击名为“数据流任务”的矩形形状，我可以查看此数据流任务的设计。


    对于数据流任务，我需要添加一个数据源（这将是我运行在 Linux 上的 SQL Server）和一个目标（这将是一个平面文件）。对于数据源，我将需要一个 `ODBC`
    源，因为我将在 Linux 服务器上运行此数据包。首先，我从 SSIS 工具栏的“其他源”类别中找到了 `ODBC 源`，并将其拖放到我的设计器窗口中。图
    5-46 显示了我向数据流任务添加一个 `ODBC 源`后的屏幕。


    ![](img/index-244_1.jpg)


    ***图 5-46.** 向数据流任务添加 `ODBC 源`*


    现在我需要配置 `ODBC` 源，使其指向我运行在 Linux 服务器上的 SQL Server 及其示例 `WideWorldImporters` 数据库。我将通过右键单击
    `ODBC 源` 并选择 `编辑` 来完成此操作。在下一个 `ODBC 连接管理器`窗口中，我选择了 `新建`。这将打开另一个窗口，我将在其中再次单击 `新建`
    按钮来建立新连接。


    在此屏幕上，我将使用一个 `ODBC` *连接字符串*。连接字符串是提供连接到运行在 Linux 上的 SQL Server（或任何其他基于 `ODBC`
    的数据源）所需全部信息的一种方法。对于本示例，我的连接字符串如下所示：


    ```

    Driver={ODBC Driver 17 for SQL Server};server=bwsql2017rhel;database=WideWorldImporters;uid=sa

    ```


    连接字符串是程序员为 SQL Server 提供连接信息的常用方式。您可以在我们的文档中了解更多关于 `ODBC` 所有连接字符串选项的信息：[`docs.microsoft.com/sql/connect/odbc/dsn-connection-string-attribute`](https://docs.microsoft.com/sql/connect/odbc/dsn-connection-string-attribute)。


    ![](img/index-245_1.jpg)


    在此屏幕上，我还将提供 `sa` 的登录名和 `sa` 密码。图 5-47 显示了我单击 `确定` 创建此新连接之前的屏幕。


    ***图 5-47.** 为 SSIS 包使用连接字符串创建新连接*


    **注意** 要在您的 Windows 计算机上的数据包中使用此连接字符串，您必须在 Windows 计算机上安装 `ODBC Driver 17 for
    SQL Server`。您可以从以下网址下载此包：[`docs.microsoft.com/sql/connect/odbc/download-odbc-driver-for-sql-server`](https://docs.microsoft.com/sql/connect/odbc/download-odbc-driver-for-sql-server)。


    ![](img/index-246_1.jpg)


    一旦您单击 `确定`，就可以在 `ODBC 源`屏幕上的 `表或视图的名称`字段中选择 `表名`。对于本示例，我选择了 `"Application"."People"`
    表。为了简化此示例，我需要从此表中排除那些是 `varbinary(max)` 或 `varchar(max)` 的列，即 `HashedPassword`、`UserPreferences`、`Photo`
    和 `CustomFields` 列。存在一些方法可以通过数据转换任务将这些列包含在提取到文件中。要排除这些列，我需要选择 `ODBC 源窗口`左侧的 `列`选项，并取消选中这些列名，然后单击
    `确定`按钮。


    现在我准备设置 `平面文件目标`。从 SSIS 工具栏中，将 `平面文件目标`图标拖放到存在 `ODBC 源`的画布上。


    现在，您可以将 `ODBC 源`形状的蓝色箭头连接到 `平面文件目标`。右键单击并选择 `编辑`以提供文件信息。

