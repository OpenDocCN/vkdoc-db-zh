- fmt: '# Chapter 8 High Availability and Disaster Recovery for SQL Server


    (and restore) messages in the errorlog.


    In addition to the ERRORLOG, backup information is also recorded in the `msdb`
    database in tables like `backupfile`, `backupfilegroup`, and `backupmediaset`,
    among others.


    I said that backups are done with parallel worker threads and the results from
    Figure 8-1 prove it. I say this because the main backup worker thread is the one
    displaying the stats information, while other workers read from database files
    and write to the target device. The interleaved results demonstrate this behavior.
    Typically, SQL Server will create one worker thread for reading for each unique
    disk across all files for the database and one worker thread for writing for each
    unique disk for target database backup files (you can partition out the backup
    by specifying multiple files even across multiple disks).


    There are several options for the `BACKUP DATABASE` command. You can see all of
    them in our documentation at [https://docs.microsoft.com/sql/t-sql/statements/backup-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/backup-transact-sql).
    One option that may be interesting to use is `COMPRESSION`. SQL Server will compress
    the backup file to help reduce space requirements. There are some considerations
    when using `COMPRESSION` with TDE, and the preceding documentation reference contains
    the details.


    Database backups are completely online, which means that you can actively use
    the database during a backup.


    ### Note

    Technically there are some operations that can block a backup and vice versa.
    these include `alter database` and other operations that need an exclusive database
    lock.


    The `BACKUP DATABASE` T-SQL statement also allows you to only back up specific
    files or filegroups. There could be scenarios for large databases where creating
    a full database backup takes too long for your business needs. Therefore, if you
    have multiple files or use secondary filegroups, you can create your backups in
    stages. The preceding documentation reference for the `BACKUP DATABASE` command
    describes how to back up files or filegroups. Carefully read through the process
    for backing up specific files or filegroups before using this as a backup strategy.


    ## Recovery Models

    I’ve described in the book that the transaction log is a record of changes to
    the database (much like a journal). Before I describe the concept of backing up
    the transaction log, I should first describe a concept called a *recovery model*.
    A recovery model dictates how transaction log space is managed and what kind of
    *media recovery* is possible. Media recovery determines what options exist to
    recover a database from backup media should the database and/or transaction log
    files become damaged or unusable. This translates into what kind of exposure you
    are willing to accept for data loss. SQL Server supports the following recovery
    models:


    - **Simple**: Space in the transaction log is reclaimed automatically after a
    period of time based on transactions that are complete (also called *log truncation*).
    You cannot back up the transaction log with this model. Your data loss exposure
    is that you might lose changes since your last database backup because not all
    transactions in the transaction log are saved. This would of course only occur
    if the database and transaction log files became damaged or unusable (for example,
    the disk holding these files becomes damaged). Use this recovery model for scenarios
    where you only plan to back up the full database, typically for smaller databases
    where data loss for changes in between backups are acceptable.


    - **Full**: This is the default recovery model. With this model, all media recovery
