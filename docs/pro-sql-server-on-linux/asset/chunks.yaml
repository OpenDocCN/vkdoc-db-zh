- fmt: 'as a feature in SQL Server 2014. This feature is made up of these components:


    • The Hekaton engine

    • A Memory Optimized FILEGROUP

    • Memory Optimized Tables

    • Indexes for Memory Optimized Tables—Hash or Nonclustered

    • Natively Compiled Stored Procedures


    ## The Hekaton Engine


    Built inside of the SQL Server database engine is “an engine with an engine” for
    In-Memory OLTP. It is comprised of a series of Dynamic Linked Libraries that implement
    the logic for In-Memory OLTP transactions. There is a component for compilation,
    runtime, and an engine. These components interoperate with the rest of the SQL
    Server engine such as query processing and transaction logging. However, there
    are other components that are independent of the SQL Server engine for things
    like checkpoint and garbage collection. All of the Hekaton components still rely
    on the SQLOS subsystem and on Linux into the Host Extension for any native Linux
    kernel services (e.g., I/O).


    ### ChapTer 6 performanCe CapabILITIeS


    You normally don’t see any of these components of the Hekaton engine because the
    concept is that it is all built-in. However, when you start examining some of
    the details of DMVs like `dm_exec_requests`, you will start to see new tasks when
    you use T-SQL to create a memory optimized FILEGROUP and memory optimized tables.


    For example, the `WideWorldImporters` database has a memory optimized FILEGROUP
    and memory optimized tables. So when you restore that example database, you will
    see tasks in `sys.dm_exec_requests` where the `command` column = `XTP_CKPT_AGENT`
    or `XTP_THREAD_POOL` and others.


    > **Note** `XTP` stands for eXtreme Transaction processing and is another internal
    name for In-memory OLTP. You may see several diagnostic objects and messages that
    start with `hK` (hekaton) or `XTP`. These are all related to the In-memory OLTP
    components.


    Two of the key design principles of In-Memory OLTP are:


    • All data is stored in memory (but has a durable option through the transaction
    log and checkpoint files) and **has to fit into memory**.

    • Access to data is optimized using a “lock and latch free” set of algorithms
    and row versioning. In-Memory OLTP uses an optimistic concurrency methodology
    to prevent locking problems and internally uses techniques to avoid internal thread
    concurrency issues. Modifications to memory optimized tables use a row versioning
    scheme to avoid additional transaction conflicts (this row versioning scheme is
    not the same as SQL Server snapshot isolation and does not use `tempdb`).


    I’ve briefly mentioned locks in previous sections of this chapter as this is the
    primary mechanism to ensure transaction consistency for SQL Server applications.
    I’ve not mentioned the concept of `latches`, which is an internal mechanism of
    SQL Server to protect the physical integrity of database pages between multiple
    threads and is also used for other thread concurrency protection schemes in the
    engine. One of the key design principles for In-Memory OLTP to achieve low latency
    and high speed is to avoid the use of any locks or latches in the “Hekaton Engine”.
    (`Hekaton` also avoids the use of `spinlocks` in its code, which is another internal
    thread concurrency mechanism).


    ### ChapTer 6 performanCe CapabILITIeS


    In-Memory OLTP is not a feature you enable with a specific option. You use this
    feature by:


    1. Creating a Memory Optimized FILEGROUP

    2. Creating and using one or more memory optimized tables in your database (including
    the choice of indexes)

    3. Optionally creating one or more natively compiled stored procedures


    Let’s take a look at each of these in more detail.


    ## Memory Optimized FILEGROUP


    The first step to use In-Memory OLTP in a database is to create a special FILEGROUP
    for memory optimized tables. Let’s look at an example of this using the `WideWorldImporters`
    example. If you generate the script to create the database based on the backup/restore
    (see the following documentation on how to do this: `https://docs.microsoft.com/sql/ssms/tutorials/scripting-ssms#script-databases`).'
