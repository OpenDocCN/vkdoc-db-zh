- fmt: '# Chapter 2 Installation and Configuration


    ## Exploring SQL Server on Linux


    As you develop applications, use, and manage SQL Server, I think it could be useful
    to understand what and where everything is installed. In addition, SQL Server
    has several files that can aid in troubleshooting and monitoring in the LOG directory,
    so I will cover more details about this directory and what is contained in it.


    ## What Is Installed


    Per normal Linux guidelines as an application, SQL Server installs its binary
    files in the `/opt` directory and its “application” files including database files
    in the `/var/opt` directory. In SQL Server 2017, you cannot change the location
    of these directories (but you can change the default location of databases, “log”
    files, and backups).


    ### /opt/mssql


    The `bin` directory contains the main `sqlservr` binary, the `mssql-conf` bash
    script, and a series of shell scripts to support diagnostics for dump files.


    The `lib` directory contains these types of files:


    *   `lib*.so` files, which are shared libraries used by `sqlservr`

    *   A directory called `mssql-conf` that contains python scripts called by the
    main `mssql-conf` bash shell script

    *   A series of files that end in a `.sfp` extension. These files are part of
    the magic of the architecture of SQL Server on Linux. These files are in a binary
    format and contain binary files loaded by the SQLPAL to run `SQLSERVR.EXE`, various
    DLLs, `libOS`, and other binaries. The sfp files also contain the system databases
    such as `master`, `model`, and `msdb`. We will discuss system databases in Chapter
    [3](#index_split_002.html#p99).


    ### /var/opt/mssql


    By default, this directory should have the following files and directories:


    *   The `data` directory contains system database files, user database files,
    and transaction log files (unless you specify a directory when creating a database
    or use `mssql-conf` to change the default directory).

    *   The `log` directory contains “log files” that include the `ERRORLOG` files
    and other files used for diagnostic or troubleshooting purposes.

    *   The `mssql.conf` file is a text file that stores the latest options when using
    the `mssql-conf` script. The `mssql-conf` script writes options into this file.
    When SQL Server starts, it reads this file to change configuration options, which
    is why you often must restart SQL Server for a change with `mssql-conf` to take
    effect.


    ### Other Files


    Other files installed by SQL Server include the following:


    *   Our EULA files (all languages) are stored in `/usr/share/doc/mssql-server`.

    *   Man pages for `sqlservr` and `mssql-conf` are stored in `/usr/share/man/man1`
    directory.


    ![](index-86_1.png)


    ## Using Log Files


    Immediately after installation, the following types of files will be available
    in the LOG directory (which by default is `/var/opt/mssql/log`):


    *   `errorlog*`: This is a text file that has been around as long as SQL Server
    has been a product. It is called an “errorlog” file but has been expanded to include
    more than just errors. When SQL Server is started, there is rich information about
    the configuration and startup progress of SQL Server stored in this file. After
    that, while the file will contain mostly errors and warnings, it can contain other
    types of important information. This is one of the fundamental files to collect
    and analyze when you have issues with SQL Server. By default, when SQL Server
    is started, it copies the previous ERRORLOG file to `ERRORLOG.<n>` and creates
    a new one called `ERRORLOG`. SQL Server will keep six previous versions of the
    ERRORLOG before wrapping. I’ll be talking about the `ERRORLOG` file from time
    to time in this book, but it is important up front that you know what a key file
    this is for SQL Server. Figure [2-17 sho](#index_split_002.html#p86)ws a typical
    top of the SQL ERRORLOG file.


    **Figure 2-17. The SQL Server errorlog file**


    *   `log*.trc`: SQL Server Trace is a legacy tracing system, and by default'
