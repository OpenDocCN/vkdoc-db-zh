- fmt: "# ChApter 10   MigrAting to SQL Server on Linux\n\n## ** Executing  the Migration**\n\
    \nJust like a migration from Oracle, to migrate from PostgreSQL I recommend you\
    \ first perform the following steps:\n\n1. Assess and capture a baseline of performance\
    \ for your current application using PostgreSQL.\n2. Decide if you want to make\
    \ any changes to the definition of tables, indexes, or server-side code as part\
    \ of your migration.\n3. Install SQL Server on Linux.\n4. Create a new database\
    \ with the appropriate sizes of the database and transaction log to accommodate\
    \ the current size of the PostgreSQL database and to account for transactions\
    \ to insert data into tables.\n\nA migration from PostgreSQL will typically involve\
    \ three areas:\n\n* Migrating the schema or definition of all objects such as\
    \ table, indexes, views, and server-side code\n* Migrating data\n* Migrating any\
    \ maintenance scripts or jobs\n\nThrough my research I found a few tools written\
    \ by software vendors you can purchase to help you with migrating the schema and\
    \ object definitions, but nothing I could find is free to download.\n\nSo instead,\
    \ I found these two resources that talk about migrating from SQL Server to pgsql.\
    \ By studying these examples, you should be able identify possible issues you\
    \ will encounter when migrating from pgsql to SQL Server:\n\n1. This blog post\
    \ at `https://www.devbridge.com/articles/migrating-from-mssql-to-postgresql/`\
    \ talks about a user experience migrating from SQL Server to pgsql. This is very\
    \ useful to read because it shows many of the SQL language differences between\
    \ the two systems. You can use this knowledge as you migrate to SQL Server.\n\
    2. The GitHub project `https://github.com/lorint/AdventureWorks-for-Postgres`\
    \ for AdventureWorks is an excellent resource. The user took the SQL Server sample\
    \ database AdventureWorks from SQL Server 2014 as found at `https://github.com/Microsoft/sql-server-samples/releases/tag/adventureworks`\
    \ to migrate it to pgsql. I have a few remarks after looking through this project.\n\
    \    * The project uses the following zip file `https://github.com/Microsoft/sql-server-samples/releases/download/adventureworks/AdventureWorks-oltp-install-script.zip`,\
    \ which has the T-SQL script to create the AdventureWorks database and a series\
    \ of .csv files to load the data for SQL Server.\n    * Compare the T-SQL script\
    \ with the `install.sql` found in the pgsql GitHub project so you see fundamental\
    \ differences on how to create tables, indexes, schemas, and datatypes.\n    *\
    \ The user was forced to create functions returning `VOID` for T-SQL stored procedures,\
    \ since pgsql does not have a stored procedure concept. You should be able to\
    \ take functions from pgsql that return void and change them to SQL Server stored\
    \ procedures.\n    * The project has a program written in Ruby to convert the\
    \ CSV files to be able to load the data in pgsql. While you could look at this\
    \ code to do the reverse with CSV files generated from a program like pgdump,\
    \ consider that SSIS supports a pgsql ODBC driver. Therefore, you would build\
    \ an SSIS package to export data.\n\n# ChApter 10   MigrAting to SQL Server on\
    \ Linux"
