    # Chapter 10: Migrating to SQL Server on Linux


    ## Security

    Security is so important for a data platform product, and I made a case for you
    in this book about how `SQL Server` has all the capabilities you need to secure
    your data. In this section, I’ll point out the unique aspects that make `SQL Server`
    a superior database product in my opinion in the area of security vs `pgsql`.


    ### Least vulnerable database product

    According to the National Institute of Standard and Technology (`NIST`), `SQL
    Server` has the least number of security vulnerabilities in the industry. The
    chart as seen in Figure 10-5 shows the trends over the last eight years.


    ***Figure 10-5.** `SQL Server` is the least vulnerable database over the last
    eight years.*


    We didn’t make up these statistics. You can read more about this data at [https://nvd.nist.gov/](https://nvd.nist.gov/).


    ### Active Directory authentication

    While `pgsql` does support `GSSAPI`-based authentication, there is no specific
    mention in the `pgsql` documentation that it supports `GSSAPI` authentication
    for an Active Directory system. Active Directory is one of the most popular identity
    systems in the industry and `SQL Server` on Linux supports. You can read more
    about Active Directory authentication for `SQL Server` on Linux at [https://docs.microsoft.com/sql/linux/sql-server-linux-active-directory-authentication](https://docs.microsoft.com/sql/linux/sql-server-linux-active-directory-authentication).


    ### Transparent Data Encryption (TDE)

    `SQL Server` provides encryption of data at rest using `TDE`. `pgsql` does not
    provide any built-in encryption for database and `wal` log files at rest. You
    can read more about `TDE` for `SQL Server` at [https://docs.microsoft.com/sql/relational-databases/security/encryption/transparent-data-encryption](https://docs.microsoft.com/sql/relational-databases/security/encryption/transparent-data-encryption).


    ### Always Encrypted

    I described in Chapter 7 the new end-to-end security feature called `Always Encrypted`,
    which integrates `SQL Server` providers with the database engine to encrypt data
    end-to-end but place the control of keys in the hands of application developers
    and users. `pgsql` does not have a built-in end-to-end encryption feature like
    `Always Encrypted`.


    ### Dynamic data masking (DDM)

    `DDM` for `SQL Server` allows a `SQL Server` administrator to define masking rules
    using `T-SQL` vs. encoding the rules in an application. The feature is called
    dynamic because applications can pick up new masks on data after the `T-SQL` statements
    are applied to `SQL Server`. `pgsql` does not currently support a dynamic data
    masking feature.


    ### Auditing

    `SQL Server` provides built-in security auditing uses the foundation of extended
    events. `pgsql` does not provide any built-in security audit capabilities. In
    my research, I did find this custom extension for auditing for `pgsql` on GitHub
    at [https://github.com/pgaudit/pgaudit](https://github.com/pgaudit/pgaudit) but
    I cannot tell how widely this is used or supported.


    ### Data classification and vulnerability assessment

    The recent `GDPR` regulations have many users looking closer at both data classification
    and possible vulnerabilities in their data platform. `SQL Server` provides'
