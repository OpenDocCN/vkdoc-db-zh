    技术 100 倍的性能提升。截至 SQL Server 2017，现实情况是，我们已经看到了该功能带来的惊人性能，最高可达传统 OLTP 应用程序的约 30
    倍。但我们确实见证了一些成功案例，包括一位客户为其高度可扩展的 OLTP 应用程序实现了每秒 120 万批处理请求。您可以在[此处](https://blogs.msdn.microsoft.com/sqlcat/2016/10/26/how-bwin-is-using-sql-server-2016-in-memory-oltp-to-achieve-unprecedented-performance-and-scale/)查看他们的故事以及可能实现的性能。


