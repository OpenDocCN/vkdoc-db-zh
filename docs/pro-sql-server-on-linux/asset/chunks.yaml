    # 第 8 章 SQL Server 的高可用性与灾难恢复


    以下是一个使用如下 T-SQL 语句进行操作的示例，该语句可在示例`restorewwimove.sql`中找到：


    ```sql

    RESTORE DATABASE WideWorldImporters

    FROM DISK = ''/var/opt/mssql/data/wwi.bak''

    WITH MOVE ''WWI_Primary'' to ''/var/opt/mssql/WideWorldImporters.mdf'',

    MOVE ''WWI_UserData'' to ''/var/opt/mssql/WideWorldImporters_UserData.ndf'',

    MOVE ''WWI_Log'' to ''/var/opt/mssql/WideWordImporters.ldf'',

    MOVE ''WWI_InMemory_Data_1'' to ''/var/opt/mssql/WideWordImporters_InMemory_Data_1'',

    REPLACE

    GO

    ```


    此 T-SQL 语句的执行结果应如图 8-6 所示。


    图 8-6. 还原数据库时移动文件


    在此示例中，我已还原数据库，因此文件被创建在`/var/opt/mssql`目录下，而非`/var/opt/mssql/data`。另请注意`REPLACE`关键字的使用，因为数据库已存在。使用此关键字将导致
    SQL Server 删除现有数据库及文件，并还原新的数据库。


    ![](img/index-406_1.jpg)


    **提示：** 如果您是出于灾难恢复目的而还原数据库，我不建议使用`REPLACE`。相反，应将数据库备份还原到一个新名称，同时保留原始数据库。这是我个人的建议，因为我曾遇到过客户情况：原始数据库存在某些损坏，但备份无效。使用`REPLACE`会使
    SQL Server 在还原备份前先删除原始数据库。如果备份还原失败，您将无法尝试恢复原始数据库中的内容。


    本章前文提到了在备份时使用`CHECKSUM`选项。使用此功能的一个显著优势是，您无需使用`RESTORE VERIFYONLY`选项还原整个数据库，即可验证备份介质的校验和。如果`RESTORE
    VERIFYONLY`执行后没有报错，这并不能保证包括恢复在内的整个还原过程会成功（确认备份能否还原的唯一方法就是执行还原操作，即使是在另一台服务器上），但它确实能保证备份介质在创建后未被损坏。


    ## 完整数据库还原


