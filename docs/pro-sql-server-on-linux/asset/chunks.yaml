  trans: '

    # 第九章：管理与监控 SQL Server


    通过此池，可以将特定应用程序限定在指定的节点或 CPU 上运行。这是一种极佳的技术，用于将特定应用程序定向到特定的 NUMA 节点或 CPU 上运行。相较于服务器配置选项，这也是一种更精细的"亲和性"设置方法（资源组亲和性在
    SQL Server 实例亲和性的约束范围内运行）。


    ## MAX_IOPS_PER_VOLUME

    此设置控制与此池关联的工作负载组用户，针对每个唯一的磁盘卷，每秒可执行的最大物理 IO 操作数。唯一的磁盘卷是指基于数据库文件的唯一物理磁盘。这个设置最大的"坑"在于，它仅适用于在`用户任务`上下文中执行的任何
    I/O 操作。这意味着在后台任务（日志写入器、恢复写入器、检查点等）上下文中执行的任何 I/O 操作都不会遵守此设置（并且你无法更改它们所属的内部池设置）。


    资源池也支持 CPU、内存和 I/O 的"最小值"设置。如果你开始调整最小值和最大值设置，情况可能会变得有点复杂。我们的文档提供了一个很好的表格，描述了有效的设置，以备你决定这样做。更多信息请阅读：[`docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-resource-pool`](https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-resource-pool)。


    ## 工作负载组

    工作负载组是分配到资源池的用户任务的容器。工作负载组是一种将一组用户分组以限制资源使用的方法。默认安装有两个工作负载组，`internal`和`default`，它们分别映射到同名的相应资源池。你可以通过`T-SQL`创建自己的工作负载组。如果你不创建用户定义的工作负载组，所有登录都将映射到默认工作负载组（该组又映射到默认资源池）。关于工作负载组的更多信息请阅读：[`docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-workload-group`](https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-workload-group)。


    工作负载组允许你在比其关联资源池更精细的级别上指定设置。例如，你可以配置`REQUEST_MAX_MEMORY_GRANT_PERCENT`来指定工作负载组用户的最大内存授予量。此设置在已为资源池建立的最大值范围内应用。


    **注意**，我们的一位顶级开发人员 Jay Choe 对内存授予有很好的描述：[`blogs.msdn.microsoft.com/sqlqueryprocessing/2010/02/16/understanding-sql-server-memory-grant`](https://blogs.msdn.microsoft.com/sqlqueryprocessing/2010/02/16/understanding-sql-server-memory-grant)。


    工作负载组的一个独特设置是`MAXDOP`。我在前面的章节中讨论过并行查询执行，以及如何通过`sp_configure`、`ALTER DATABASE`甚至查询提示来配置应用于查询计划运算符的最大工作线程数。工作负载组允许你为组中的所有用户指定一个`MAXDOP`设置。结合使用这些`MAXDOP`设置可能会让人感到困惑。以下是关于`MAXDOP`优先级应用顺序的指导原则：


    ```

    • 作为查询提示的 MAX_DOP 会得到遵循，前提是它不超过工作负载组的 MAX_DOP。

    ```

    '
- fmt: 'MAX_DOP 优先级


    *   `MAX_DOP` 作为查询提示始终会覆盖 `sp_configure ''max degree of parallelism''`。

    *   数据库作用域的 `MAXDOP` 会覆盖（除非设置为 0）由 `sp_configure` 在服务器级别设置的最大并行度。查询提示仍然可以覆盖数据库作用域的
    `MAXDOP`，以便对需要不同设置的特定查询进行调优。所有这些设置都受为工作负载组设置的 `MAXDOP` 限制。

    *   工作负载组 `MAX_DOP` 覆盖 `sp_configure ''max degree of parallelism''`。

    *   如果查询在编译时被标记为串行（`MAXDOP = 1`），则无论工作负载组或 `sp_configure` 设置如何，在运行时都无法更改回并行。


    工作负载组的完整设置列表请参阅文档：[https://docs.microsoft.com/sql/t-sql/statements/alter-workload-group-transact-sql#arguments](https://docs.microsoft.com/sql/t-sql/statements/alter-workload-group-transact-sql#arguments)。


    分类函数


    分类器函数是一种 T-SQL 函数，用于将登录绑定到用户定义的工作负载组。你构建一个具有已知模板的 T-SQL 函数，并将特定登录（或登录组）分配给工作负载组。这使得
    SQL Server 能够知道如何将资源限制映射到特定工作负载组和资源池的登录。你可以在 [https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-classifier-function](https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-classifier-function)
    阅读更多关于分类器函数的信息。


    我在 GitHub 上发现了我的同事 Travis Wright 构建的这个简单但易于使用的演示：[https://github.com/twright-msft/mssql-test-scripts/blob/master/Administration/resource-governor.sql](https://github.com/twright-msft/mssql-test-scripts/blob/master/Administration/resource-governor.sql)，用于展示如何将资源调控器用于
    I/O 的基础知识。


    **注意**：Linux 有一个与资源调控器类似的操作系统概念，用于控制进程的资源，称为 Linux 控制组（`cgroups`）。`cgroups` 独立于
    SQL Server，但由于 SQL Server 是一个 Linux 进程，当使用 `cgroups` 来控制 SQL Server 资源（如 CPU 或
    I/O）时，SQL Server 应该能够运行。你可以在 [http://man7.org/linux/man-pages/man7/cgroups.7.html](http://man7.org/linux/man-pages/man7/cgroups.7.html)
    阅读更多关于 `cgroups` 的信息。


    技术上，默认和内部池的资源调控器是无需用户干预即可启用的。但是，如果你希望对默认池的修改生效，或者要创建自己的池和工作负载组，则必须使用以下 T-SQL 语句为这些新配置启用资源调控器：


    ```sql

    ALTER RESOURCE GOVERNOR RECONFIGURE;

    GO

    ```


    使用专用管理员连接


    多年前，在 SQL Server 2005 之前，我在微软技术支持部门工作时，偶尔会遇到客户遇到严重问题，其中 SQL Server 似乎已挂起（不允许任何连接或查询）。大约在这个时期，我支持部门的同事
    Robert Dorr 和 Keith Elmore 总会就如何排查复杂问题提出一些令人惊叹的创新想法。事实上，我们三人一起在德克萨斯州欧文市的微软园区午餐后散步时，产生了一些最好的点子。


    第9章 管理和监控 SQL Server'
  raw: '•  MAX_DOP as a query hint always overrides sp_configure ‘max degree


    of parallelism’.


    •  The MAXDOP at the database scope overrides (unless it is set to 0)


    the max degree of parallelism set at the server level by sp_configure.


    Query hints can still override the database scoped MAXDOP in order


    to tune specific queries that need different setting. All these settings


    are limited by the MAXDOP set for the Workload Group.


    •  Workload group MAX_DOP overrides sp_configure ‘max degree of


    parallelism’.


    •  If the query is marked as serial (MAX_DOP = 1 ) at compile time,


    it cannot be changed back to parallel at run time regardless of the


    workload group or sp_configure setting.


    The documentation has a complete list of workload group settings at [https://](https://docs.microsoft.com/sql/t-sql/statements/alter-workload-group-transact-sql#arguments)


    [docs.microsoft.com/sql/t-sql/statements/alter-workload-group-transact-](https://docs.microsoft.com/sql/t-sql/statements/alter-workload-group-transact-sql#arguments)


    [sql#arguments](https://docs.microsoft.com/sql/t-sql/statements/alter-workload-group-transact-sql#arguments).


    **Classification functions:** A classifier function is a T-SQL function


    that binds a login to a user-defined workload group. You build


    a T-SQL function (with a known template) and assign a specific


    login (or group of logins) to a workload group. This allows SQL


    Chapter 9   Managing and Monitoring SQL Server


    Server to know how to map resource restrictions to a login for a


    specific workload group and resource pool. You can read more


    about classifier functions a[t https://docs.microsoft.com/](https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-classifier-function)


    [sql/relational-databases/resource-governor/resource-](https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-classifier-function)


    [governor-classifier-function](https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-classifier-function).


    I found this simple but easy to use demo built by my colleague Travis Wright on


    GitHub a[t https://github.com/twright-msft/mssql-test-scripts/blob/master/](https://github.com/twright-msft/mssql-test-scripts/blob/master/Administration/resource-governor.sql)


    [Administration/resource-governor.sql](https://github.com/twright-msft/mssql-test-scripts/blob/master/Administration/resource-governor.sql) to
    show the basics of how to use Resource Governor for I/O.


    **Note**  Linux has an operating system concept similar to resource governor for


    control of resources for processes called Linux control groups ( *cgroups*). cgroups


    are independent of SQL Server but since SQL Server is a Linux process, SQL


    Server should be able to run when cgroups are being used to control SQL Server


    resources such as CpU or i/o. You can read more about cgroups at


    [http://man7.org/linux/man-pages/man7/cgroups.7.html.](http://man7.org/linux/man-pages/man7/cgroups.7.html)


    Resource Governor is technically enabled for default and internal pools without


    any user intervention. However, if you want to have modifications to the default
    pool


    take effect or create your own pool and workload groups, you must enable Resource


    Governor for these new configurations using the following T-SQL statement:


    ALTER RESOURCE GOVERNOR RECONFIGURE;


    GO


    ** Using the Dedicated Admin Connection**


    When I worked for Microsoft technical support years ago before SQL Server 2005,
    I


    would occasionally have to help a customer on a critical problem where SQL Server


    appeared to be  *hung* (no connection or query is allowed to SQL Server). It was
    around


    this timeframe that often my colleagues in support, Robert Dorr and Keith Elmore,


    would produce some amazing innovative ideas on how to troubleshoot complex


    problems. In fact, some of the best ideas we produced were done when the three
    of us


    would take a walk after lunch around the Microsoft Texas Campus in Irving, Texas.


    Chapter 9   Managing and Monitoring SQL Server'
  trans: '

    **MAX_DOP** 优先级


    *   `MAX_DOP` 作为查询提示，始终会覆盖 `sp_configure ''max degree of parallelism''`。

    *   数据库作用域的 `MAXDOP` 会覆盖（除非设置为 0）由 `sp_configure` 在服务器级别设置的最大并行度。查询提示仍然可以覆盖数据库作用域的
    `MAXDOP`，以便对需要不同设置的特定查询进行调优。所有这些设置都受为工作负载组设置的 `MAXDOP` 限制。

    *   工作负载组 `MAX_DOP` 覆盖 `sp_configure ''max degree of parallelism''`。

    *   如果查询在编译时被标记为串行（`MAXDOP = 1`），则无论工作负载组或 `sp_configure` 设置如何，在运行时都无法更改回并行。


    工作负载组的完整设置列表请参阅文档：[`docs.microsoft.com/sql/t-sql/statements/alter-workload-group-transact-sql#arguments`](https://docs.microsoft.com/sql/t-sql/statements/alter-workload-group-transact-sql#arguments)。


    **分类函数**


    分类器函数是一种 T-SQL 函数，用于将登录绑定到用户定义的工作负载组。你构建一个具有已知模板的 T-SQL 函数，并将特定登录（或登录组）分配给工作负载组。这使得
    SQL Server 能够知道如何将资源限制映射到特定工作负载组和资源池的登录。你可以在 [`docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-classifier-function`](https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-classifier-function)
    阅读更多关于分类器函数的信息。


    我在 GitHub 上发现了我的同事 Travis Wright 构建的这个简单但易于使用的演示：[`github.com/twright-msft/mssql-test-scripts/blob/master/Administration/resource-governor.sql`](https://github.com/twright-msft/mssql-test-scripts/blob/master/Administration/resource-governor.sql)，用于展示如何将资源调控器用于
    I/O 的基础知识。


    **注意**：Linux 有一个与资源调控器类似的操作系统概念，用于控制进程的资源，称为 Linux 控制组（`cgroups`）。`cgroups` 独立于
    SQL Server，但由于 SQL Server 是一个 Linux 进程，当使用 `cgroups` 来控制 SQL Server 资源（如 CPU 或
    I/O）时，SQL Server 应该能够运行。你可以在 [`man7.org/linux/man-pages/man7/cgroups.7.html`](http://man7.org/linux/man-pages/man7/cgroups.7.html)
    阅读更多关于 `cgroups` 的信息。


    技术上，默认和内部池的资源调控器是无需用户干预即可启用的。但是，如果你希望对默认池的修改生效，或者要创建自己的池和工作负载组，则必须使用以下 T-SQL 语句为这些新配置启用资源调控器：


    ```sql

    ALTER RESOURCE GOVERNOR RECONFIGURE;

    GO

    ```


    **使用专用管理员连接**


    多年前，在 SQL Server 2005 之前，我在微软技术支持部门工作时，偶尔会遇到客户遇到严重问题，其中 SQL Server 似乎已挂起（不允许任何连接或查询）。大约在这个时期，我支持部门的同事
    Robert Dorr 和 Keith Elmore 总会就如何排查复杂问题提出一些令人惊叹的创新想法。事实上，我们三人一起在德克萨斯州欧文市的微软园区午餐后散步时，产生了一些最好的点子。


    第 9 章 管理和监控 SQL Server

