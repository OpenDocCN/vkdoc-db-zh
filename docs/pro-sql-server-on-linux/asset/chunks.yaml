    I’ll pause here to make an important statement that may seem obvious to you but
    is quite frankly neglected by many. **It is critical to establish a performance
    baseline for your SQL Server**. You can monitor SQL Server daily, but you won’t
    know if you are seeing a possible problem, especially with performance, unless
    you establish and save baselines for your workload, so you can compare. How do
    you know you are having a performance problem if you don’t know what good performance
    looks like?


    ## Monitoring SQL Server Performance


    While the SQL Server database platform comes built-in with many great features
    that empower performance monitoring, there is no better substitute for an overall
    monitoring solution than from our partners who specialize in monitoring. You can
    find a complete list of these partners at [https://docs.microsoft.com/sql/sql-server/partner-monitor-sql-server](https://docs.microsoft.com/sql/sql-server/partner-monitor-sql-server).


    Many of the features and capabilities used by these partners are built on a vast
    array of tools I covered in Chapter 5 including features built in the database
    engine. In this section, I will review some of these tools and features and the
    fundamental methods to use them to monitor the performance of SQL Server.


    ### Running or Waiting


    I mentioned earlier in this chapter one of my longtime colleagues and friend,
    Keith Elmore. Like Robert Dorr, I worked side by side with Keith at Microsoft
    technical support for many years and Keith remains a great friend today. I always
    looked to Keith when it came to understanding how to tackle performance problems
    with SQL Server (and I still do today).


    Keith built some training for technical support several years ago and the philosophy
    he used for this training was simple but brilliant. Keith coined the term that
    SQL Server performance problems can be categorized as *Running* or *Waiting*.


    Chapter 9 Managing and Monitoring SQL Server


    **Running** equates to CPU utilization. Monitoring the CPU utilization of all
    processes on the server was important, to know whether any performance problems
    are related to the SQL Server process or some other process. If the CPU utilization
    for SQL Server appears to be high such that it might affect performance, then
    you need to drill into what T-SQL queries are executing that are consuming the
    most CPU. If no queries are consuming the most CPU, then a problem could exist
    with a background process or with a spinlock contention problem (I briefly mentioned
    spinlocks when I discussed In-Memory OLTP in Chapter 6). Tracing the queries that
    might account for a high CPU scenario could be done with DMVs such as `dm_exec_query_stats`
    or Query Store.


    **Waiting** as it relates to SQL Server is a scenario where a SQL Server user
    task may be waiting on a specific *wait type*, which equates to waiting for a
    specific resource. Since multiple users could all be competing for similar resources,
    a waiting scenario could involve multiple users waiting on another user who is
    waiting on a resource (in terms of a wait type known as a lock, this is often
    called a *blocking chain*). I mentioned the concept of a wait type in Chapter
    5 when I discussed the DMVs `dm_exec_requests`, `dm_os_waiting_tasks`, and `dm_os_wait_stats`.


    Armed with this knowledge you could not only tackle almost any SQL Server performance
    problem but would know how to proactively monitor SQL Server performance by monitoring
    CPU utilization and wait types across users and for the SQL Server instance.


    ### Using DMVs to Monitor Performance


    Following Keith’s lead on looking at CPU utilization or waiting scenarios, you
    first need to be able to monitor CPU utilization of all processes on the Linux
    Server including `sqlservr`. Look in a section later in this chapter for tools
    and package for Linux to monitor CPU of all processes.


    Assuming you are focusing on the CPU utilization of SQL Server, you can use the
    DMV `dm_exec_query_stats` to find out which queries based on cached plans have
    used the highest CPU utilization. In addition, you can use the DMVs `dm_exec_requests`
    and `dm_os_waiting_tasks` to find out which tasks are waiting on other tasks or
    specific resources. The DMV `dm_os_wait_stats` gives a picture of what are the
    highest wait resources across the SQL Server instance. I provided examples on
    how to use each of these DMVs in Chapter 5. In addition, don’t forget about monitoring
    queries live using Lightweight Query Profiling including the DMV `dm_exec_query_profiles`.
    I mentioned this feature in Chapter 5, but here is a link as a reminder for you
    to read more about monitoring queries live, at [https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-profiles-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-profiles-transact-sql).


    I look towards a future where we can just turn this on by default, so you can
    always see live query information all the time!


    You also will want to monitor the overall performance of SQL Server from a workload
    and throughput perspective. I’ve mentioned in previous chapters the DMV `dm_os_performance_counters`
    that can be used for this purpose. This DMV is initialized at SQL Server startup
    and then kept up to date by the SQL Server engine as it is running. Remember this
    DMV has a very normalized structure where the row values describe the specific
    counters to measure instead of column names.


    The following T-SQL statement, as found in the example `dm_os_performance_counters.sql`,
    returns all counters for the object called `SQLServer:SQL Statistics` at any point
    in time for the SQL Server instance:


    ```

    SELECT * FROM sys.dm_os_performance_counters

    WHERE object_name = ''SQLServer:SQL Statistics''

    ORDER BY counter_name

    GO

    ```


    We built performance counters for SQL Server to integrate with the Windows Performance
    Counters System (see more information at [https://docs.microsoft.com/windows/desktop/perfctrs/performance-counters-reference](https://docs.microsoft.com/windows/desktop/perfctrs/performance-counters-reference)).
    A common method to view these counters is with the Windows Performance Monitor
    Tool (commonly known as `perfmon`). Since the Windows Performance Counter system
    does not work on Linux Operating Systems, you can query the SQL Server performance
    counters through the `dm_os_performance_counters` DMV. A description of all the
    possible SQL Server performance counters is described in our documentation at
    [https://docs.microsoft.com/sql/relational-databases/performance-monitor/use-sql-server-objects](https://docs.microsoft.com/sql/relational-databases/performance-monitor/use-sql-server-objects).


    When you view SQL Server performance counters with the `perfmon` tool on Windows,
    the rates of counter values are automatically displayed. For example, the counter_name
    `Batch Requests/sec` is a rate of workload throughput for SQL Server. But the
    rate is presented as a cumulative value. In order to find out the true rate, you
    must perform a calculation using T-SQL. Look at the following excellent blog post
    to see how to use information in the DMV to understand how to perform the correct
    calculations:'
