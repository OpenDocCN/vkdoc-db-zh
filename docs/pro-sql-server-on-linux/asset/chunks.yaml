    # 第 11 章 SQL Server 与容器


    ## 部署 SQL Server 容器镜像


    [Dockerfile](https://github.com/Microsoft/mssql-docker/blob/master/linux/preview/RHEL/Dockerfile)。Microsoft
    正在致力于发布包含 `RHEL` 等 Linux 发行版的 `docker` 镜像。


    在本章中，我使用 `sudo` 以 `root` 身份运行所有 `Docker` 命令。你可以配置 `Docker`，以便以非 `root` 用户身份使用
    `Docker` 命令。


    有关更多信息，请参阅此文档 ([`docs.docker.com/install/linux/linux-postinstall/#manage-docker-as-a-non-root-user`](https://docs.docker.com/install/linux/linux-postinstall/#manage-docker-as-a-non-root-user))。


    部署 `SQL Server Docker Hub` 容器镜像的方法有以下两种：


    • 使用 `Docker` 客户端程序配合 `pull` 选项，如下方 `bash shell` 中的命令所示：

    ```

    sudo docker pull microsoft/mssql-server-linux:2017-latest

    ```


    • `运行` 一个 `Docker` 容器，指定其中一个 `SQL Server` 镜像。如果该镜像本地不存在，将先拉取镜像再运行容器。

    ```

    sudo docker run -e ''ACCEPT_EULA=Y'' -e ''SA_PASSWORD=YourStrong!Passw0rd'' \

    -p 1500:1433 --name sql1 \

    -d microsoft/mssql-server-linux:2017-latest

    ```


    如果你先拉取了镜像，那么使用第二种方法运行容器时，将运行你已下载的镜像。这两种方法都要求你的 `Linux` 服务器能够连接互联网。


    **提示**：以下 [stackexchange.com](http://stackexchange.com) 帖子（[`serverfault.com/questions/701248/downloading-docker-image-for-transfer-to-non-internet-connected-machine`](https://serverfault.com/questions/701248/downloading-docker-image-for-transfer-to-non-internet-connected-machine)）详细描述了部署容器的
    `离线` 体验。`docker` 提供了一种能力，可以将镜像拉取到一台联网的机器上，保存为 `tar` 文件，将该 `tar` 文件复制到你的 `Linux`
    服务器，然后使用 `docker load` 将该 `tar` 文件导入为一个镜像，之后就可以用它来运行容器。


    让我们使用第二种方法来运行容器，这将自动拉取带有最新 `CU` 更新的 `SQL Server` 的 `Docker` 镜像。我想设置我的 `sa` 密码，因此我在
    `nano` 编辑器中修改了前面的命令，更改了我的 `sa` 密码字符串，然后将结果粘贴到 `bash shell` 中，如下方命令所示：

    ```

    sudo docker run -e ''ACCEPT_EULA=Y'' -e ''SA_PASSWORD=Sql2017isfast'' \

    -p 1500:1433 --name sql1 \

    -d microsoft/mssql-server-linux:2017-latest

    ```


    如果命令成功，你将看到类似以下的结果（如果这是你第一次尝试运行 `SQL Server` 容器镜像）。你可以看到 `Docker` 镜像在本地找不到，因此它将先从
    `Docker Hub` 拉取，即隐式地运行了一个 `docker pull`。

