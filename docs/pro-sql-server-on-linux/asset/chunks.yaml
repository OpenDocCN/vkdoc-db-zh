- fmt: 'given me the blessed opportunity to evangelize and promote the technical aspects
    of SQL Server including Linux to the world. I also want to thank members of the
    Microsoft Marketing team who have worked with me along the way on building the
    right strategy to get the message out on SQL Server. Thank you John ''JG'' Chirapurath,
    Ramnik Gulati, Debbi Lyons, Anshul Rampal, Marko Hotti, Matthew Burrows, Frederico
    Pravatta Rezende, Jane Gao, and Joe Malesich.


    I also want to thank some of the folks from Microsoft partner companies whom I’ve
    worked with over the last year to talk about SQL Server on Linux, including Wendy
    Harms and Urs Renggli from HPE and Nicholas Gerasimatos from Red Hat.


    Finally, I want to thank the Project Helsinki team. Without their dedication and
    innovation, SQL Server on Linux would still be on a whiteboard somewhere. Instead
    it is one of the truly amazing software products I’ve seen built at Microsoft
    in my career.


    xx


    # Foreword


    Bringing SQL Server to Linux has been an adventurous endeavor. It took us less
    than two years to ship the final product. However, during the first year many
    things had to go right for the project to succeed. In the past the SQL Server
    team had attempted to do the work a few times, but every time the team had hit
    the wall and backed off. Sometime in 2010, Hal Berenson even published a blog
    outlining why bringing SQL Server to Linux is not a good idea after all.


    Nevertheless, in the late 2014 the team decided to look into porting SQL Server
    to Linux one more time. The initial team consisting of two program managers, Joe
    Idziorek and Tobias Ternstrom, focused on business opportunity. Very soon they
    were convinced that not only one, but multiple business opportunities existed.
    However, convincing others within the company turned out to be problematic. To
    be taken seriously, they had to figure out an engineering approach. The engineering
    estimate from the past was overwhelming. It estimated a team of 10 to 20 engineers
    dedicated to the project over a five-year span. The team knew they had neither
    these many engineers nor time. The needed a new engineering plan.


    Right around that time I was considering new opportunities. My friends from the
    SQL Server team connected me to Joe and Tobias and we started the conversation.
    I agreed with the team that doing a direct port wasn’t a good idea. I asked the
    team to give me few days to ponder over the approach. Incidentally, I was familiar
    with Drawbridge research and happened to leverage it as a platform abstraction
    layer, aka PAL, to run a Windows application inside of a different operating system
    in my previous project. So it wasn’t long before I connected the dots and figured
    we could potentially leverage the Drawbridge technology to bring SQL Server to
    Linux. So I bit the bullet and joined the project.


    The Drawbridge technology was the first thing that had to go right for us to succeed.
    Many, including researches and engineers that had been involved with Drawbridge,
    had been skeptical about the approach. They worried about impedance mismatch between
    Linux and Windows runtimes. Moreover, pretty much everyone had been skeptical
    about performance. Personally, I worried more about the former than the later.
    I didn’t know if we could make Windows exception handling work fully and if we
    could make the stack growth semantics work. However I hadn’t worried much about
    the performance. I knew how both SQL and Drawbridge work internally, so I had
    a pretty good idea how to squeeze the performance out of the two.


    After having Drawbridge at our disposal, we had SQL Server running on Linux in
    less than a month. It turned out Andrew Baumann, an engineer from Microsoft research,
    had an early prototype of Drawbridge running on Linux already. He had made the
    port work for his research. Having Drawbridge running on Linux, even in a prototype
    fashion, was the next thing that had to go right for us. I joined the team on
    the second of February


    xxi foreword'
