- fmt: "[Chapter 8 High Availability and Disaster Recovery for SQL Server](failover#AGlisteners)\n\
    Furthermore, you can read more about AG listeners on SQL Server on Linux at [https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-overview#the-listener-under-linux](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-overview#the-listener-under-linux).\n\
    \nNow add a colocation constraint and ordering constraint to ensure the primary\
    \ replica and virtual IP run on the same node by running the following commands\
    \ from the bash shell on any node:\n```\nsudo pcs constraint colocation add virtualip\
    \ ag_cluster-master INFINITY with-rsc-role=Master\nsudo pcs constraint order promote\
    \ ag_cluster-master then start virtualip\n```\n\nYou have now completed the exercise\
    \ to create a highly available Always On Availability Group on SQL Server on Linux.\
    \ No sweat, right? Is there a better way to do this? The answer is yes. It is\
    \ called an Ansible Playbook. It reminds me of my senior year in college when\
    \ we worked all semester in a course to build a Fortran program for a statistical\
    \ simulation model. After we turned in all of our assignments, the very last week\
    \ of the semester the professor showed us how to build the same program in one\
    \ day using a language called GPSS. We of course all asked him why? The answer\
    \ was simple. He wanted us to understand the internals of creating statistic simulation\
    \ models but also to understand to look for efficient methods to do the same task.\
    \ Hard lesson. Ansible is all about that. We have produced an open source Ansible\
    \ Playbook to install SQL Server, a Pacemaker cluster, and an AG at [https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/high%20availability/Linux/Ansible%20Playbook](https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/high%20availability/Linux/Ansible%20Playbook).\n\
    \n[Let’s Test it](** Let’s Test it**)\nIn this section, let’s connect to SQL Server\
    \ and test our new setup we just completed for an AG with a cluster. There are\
    \ two tests I would like to run on this new setup: (1) Add some data to the primary\
    \ replica database and see it show up on the secondary replica and (2) test how\
    \ failover works to the secondary and back to the primary.\n\n[Testing Data Replication](** Testing\
    \ Data Replication**)\n1.  Run the following T-SQL statements as found in the\
    \ example `createandinsert.sql` connected to the `<virtual IP address>,1433` to\
    \ create a table on the primary replica and insert data:\n    ```\n    USE [cowboysrule]\n\
    \    GO\n    DROP TABLE IF EXISTS wewillwintheeast\n    GO\n    CREATE TABLE wewillwintheeast\
    \ (col1 int)\n    GO\n    INSERT INTO wewillwintheeast VALUES (1)\n    GO\n  \
    \  ```\n    **Note** Just like the other nodes, you can add an entry into `/etc/hosts`\
    \ with a string name associated with the virtual IP address and use that to connect\
    \ without having to specify the port number.\n\n2.  Connect directly to the secondary\
    \ replica and run the following T-SQL statements as found in the example script\
    \ `querysecondary.sql`, to prove you are connected to the secondary server and\
    \ the preceding changes were replicated from the primary:\n    ```\n    SELECT\
    \ @@SERVERNAME\n    GO\n    USE [cowboysrule]\n    GO\n    SELECT * FROM wewillwintheeast\n\
    \    GO\n    ```\n    The results should be you secondary replica (mine is `bwsqllinuxag2`)\
    \ and a result of one row.\n\n![](index-449_1.png)\n\n[Testing Failover](** Testing  Failover**)"
