    \ FOREIGN KEY([LastEditedBy])\nREFERENCES [Application].[People] ([PersonID])\n\
    ```\n\n解析这条语句，该约束确保 `LastEditedBy` 列中的值始终引用 `People` 表中 `PersonID` 列的行。开头的 `WITH\
