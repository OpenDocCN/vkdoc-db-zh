    of using the mssql extension for Visual Studio code as documented at [https://docs.microsoft.com/sql/linux/sql-server-linux-develop-use-vscode](https://docs.microsoft.com/sql/linux/sql-server-linux-develop-use-vscode).


    Figure 3-1 shows a search for the mssql extension to install it on Visual Studio
    Code. Notice the highlighted icon in the left-hand bar (the fifth icon down from
    the top), which is used to find and install extensions.


    ![](index-101_1.jpg)


    `Figure 3-1. Installing the mssql extension in Visual Studio Code`


    When you first install Visual Studio Code, you have the choice of opening an existing
    folder for scripts you have created. So, create a new folder on you machine. On
    my Windows laptop I called this `c:\wwi`. Then copy all the example scripts for
    Chapter [3](#index_split_002.html#p99) into this folder. Now in Visual Studio
    Code, click on Open Folder. If you have been using Visual Studio Code, you already
    may have a workspace or other open folders. You can open this new local folder
    you created into your workspace, or just use the File Menu to open the folder
    directly to replace in the explorer area existing folders you may have opened.
    You should now be ready to create a database, create tables, and test out some
    fundamental T-SQL queries.'
