- fmt: 'secondary replica may not be in sync. The DMV `sys.dm_hadr_database_replica_states`
    can be used to determine the current synchronization status of the AG, as documented
    at [https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-hadr-database-replica-states-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-hadr-database-replica-states-transact-sql).


    SQL Server on Linux does not possess the same integration as it does with Windows
    Failover Clustering, so the policies and logic to ensure automatic failover can
    be a bit different. Starting with SQL Server 2017 CU1, SQL Server introduces a
    new replica type called a `configuration replica`, which is used to help make
    decisions to provide high availability and data protection when only a primary
    and only one secondary sync replica are configured. It is important to know that
    the configuration replica can be an SQL Server Express edition, which is a free
    license of SQL Server. In addition, SQL Server 2017 introduced a new AG option
    called `REQUIRED_SYNCHRONIZED_SECONDARIES_TO_COMMIT`. For SQL Server on Linux,
    this option is established when you configure the Pacemaker cluster for the AG.
    It determines how many replicas are required to ensure for proper data protection
    and high availability. For SQL Server on Linux, this setting is automatically
    configured when the cluster is set up for the AG but can be overridden using Pacemaker
    commands.


    **Note**: This same option exists for SQL Server 2017 on Windows for AGs, but
    the default is 0, which is the behavior prior to SQL Server 2017 as I described
    earlier. This behavior means that transactions on the primary replica will continue
    even if configured secondary replicas are not available, but automatic failover
    is not allowed. You can set this to a value > 0 to force transactions on the primary
    to wait until one or more secondary replicas are available and synchronized.


    You can read more about how to configure this option or the various configuration
    combinations required for high availability and data protection at [https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-ha](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-ha).
    A very common setup for many users will be a primary replica, a single sync replica,
    and a configuration replica (and possibly several async replicas that do not factor
    into the equation for requirements for high availability and data protection).
    This can provide a good cost-effective option for high availability and data protection.
    However, the behavior by default is much like prior to SQL Server 2017 if the
    secondary goes offline: the primary continues but automatic failover is not possible.
    If you change the `REQUIRED_SYNCHRONIZED_SECONDARIES_TO_COMMIT` to 1 in this configuration,
    it provides the best data protection option but not maximum high availability.
    In this scenario, transactions on the primary will wait until the secondary is
    synchronized. Furthermore, in a case where an automatic failover occurs to the
    secondary, the new primary must wait until the new secondary is online and synchronized.
    A more highly available data protection scheme would be a single primary replica
    and two sync secondary replicas.


    Cluster decisions are done similar to FCI using `sp_server_diagnostics` and the
    flexible failover policies I described in an earlier section of the chapter. I’ll
    discuss one additional failover logic option called database health detection
    later in this chapter.


    My colleague in the engineering team, Sourabh Agarwal, gave me a few other tips
    on AGs for SQL Server on Linux that are different than SQL Server on Windows:'
