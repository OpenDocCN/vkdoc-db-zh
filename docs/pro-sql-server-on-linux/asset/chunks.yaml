    # 第 6 章 性能特性


    每个行组包含构成列存储索引的每个列的一个段。SQL Server 首先将数据切分为行组，然后压缩该组中的每个段。


    **`聚集列存储索引`**：整个表作为列存储索引存储。在此场景中，你无法创建普通的聚集索引，但可以创建普通的非聚集索引来支持 `UNIQUE` 约束。


    **`非聚集列存储索引`**：构成索引的一组列作为列存储索引存储在基表（该表可以有一个普通的聚集索引）之上。


    **`增量行组`**：一个在内部使用的聚集索引，用于存储列存储索引的数据，直到索引中填充了足够多的数据以允许其被压缩。这个神奇的数字是 `102,400`
    行。你不会去创建一个增量行组；这是 SQL Server 自动完成的。因此，在行数少于 `102,400` 行的表上使用列存储索引意义不大。一旦一个增量行组达到这个神奇的大小，它就会被压缩成一个列存储行组。


    我在微软的同事 Sunil Agarwal 自从列存储索引在 SQL Server 2012 中首次出现以来，就一直是它的“教父”。我们聊到了列存储索引的基本原理，他向我展示了这个关于列存储结构如何工作的基本可视化图，如图
    6-19 所示。


    图 6-19. 列存储索引的基本结构


    在此图中，如果你在具有列 `C1`...`C5` 的表上构建聚集列存储索引，这就是聚集列存储索引的结构。


    尽管列存储索引需要包含其列的数据副本，但 SQL Server 使用了高效的压缩技术，因此开销比你预期的要小。性能收益可能是巨大的。Sunil 为我总结了列存储的三个基本优势：


    - **压缩**：聚集列存储索引是表的主要存储。我们看到一些客户在其基表数据上实现了高达 `10×` 的压缩率。这些压缩率有助于将更多数据放入物理内存中。而且
    SQL Server 只会在你需要时解压缩你所需的数据。此外，按列方式压缩数据时，压缩算法可以更高效。

    - **数据消除**：由于数据以列格式存储，SQL Server 可以跳过你的查询未访问的列。此外，SQL Server 有能力理解你的查询需要哪些行组的列段，并且只访问所需的行组。这就是所谓的
    `行组消除` 概念。

    - **批处理模式执行**：批处理模式执行是查询处理器使用的一种技术，用于与查询处理器运算符一起处理多行，而不是一次处理一行。这种执行方式可以提升查询性能。另外，你将在
    SQL Server 2017 中看到一个名为自适应查询处理的新功能，它可以利用此功能来提供智能查询执行。


    ## 何时以及应该选择哪种索引？


    当我与客户谈论列存储索引时，第一个自然而然出现的问题是：我应该在何时使用列存储索引，而不是传统的聚集或非聚集 B 树索引（也称为行存储索引）？建议比你想的可能要简单一些。


    首先，你需要考虑聚集列存储索引是否适合你的工作负载。聚集列存储索引最适用于以读取为主的数据仓库场景。大多数数据仓库都有大量行（`> 100,000` 行），因此聚集列存储索引非常适合
    `事实` 表和至少有 `102,400` 行的 `维度` 表（此资源 `https://en.wikipedia.org/wiki/Data_warehouse`
    对事实表和维度表有很好的描述）。


    想要一些聚集列存储索引性能的证明吗？微软制作的所有 `TPC-H` 基准测试都使用了它们。你也可以观看这个演示，我在其中使用流行的 `PowerBi` 工具展示了使用聚集列存储索引的性能差异：`https://youtu.be/Y270nS42yL8?list=PL-_k_UrAvrYvJh21uc8xebV18YW8sfpHE`。你可以使用我从
    GitHub (`https://github.com/Microsoft/bobsql/tree/master/demos/rhelsummit2018/columnstore`)
    下载的脚本来亲自尝试此演示。


    假设你没有数据仓库，因此不会使用聚集列存储索引。那么非聚集列存储索引呢？非聚集列存储索引非常适合涉及操作型或 OLTP 工作负载的场景，但某些列可能涉及 `范围查询`。范围查询通常是指你知道会涉及查找相当多行（通常是
    `100` 行或更多）的查询，而 `寻道查询` 通常针对一行或几行。如果你知道在操作型工作负载中存在需要为特定列请求大量行的查询，请考虑创建非聚集列存储索引。在这种场景下使用非聚集列存储索引通常被称为
    `混合事务分析处理` (`HTAP`)。我也见过它被称为实时操作分析。


    文档中有一个出色的表格，总结了如何根据工作负载选择列存储索引以及哪种索引类型最适合你的工作负载，地址在 `https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-design-guidance#choose-the-best-columnstore-index-for-your-needs`。没有什么比实验和测试更有效，我总是建议你对列存储索引进行这样的操作。


    ## 列存储索引实战


    为了查看聚集列存储索引的实际应用，让我们看一下 `WideWorldImportersDW` 示例数据库。


    **注意**：此演示需要 `WideWorldImportersDW` 示例数据库，可从 `https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak`
    获取。因此，你可以从另一台机器复制备份文件，或者运行以下命令直接在你的 Linux 服务器上下载备份文件：`wget https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak`。

    '
- fmt: '# Chapter 6: Performance Capabilities


    ## Clustered Columnstore Indexes in WideWorldImportersDW


    You can download the [WideWorldImportersDW-Full.bak](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak)
    file. I’ve also provided the `cpwwidw.sh`, `restore_wwidw_linux.sql`, and `restorewwidw.sh`
    scripts to help you copy and restore this example.


    Use the following T-SQL statement as found in the example script `wwidw_cci.sql`
    to find out which tables have clustered columnstore indexes in the WideWorldImportersDW
    database:


    ```sql

    USE [wideworldimportersdw]

    GO

    SELECT OBJECT_NAME(object_id) as table_name, name, type_desc

    FROM sys.indexes

    -- type = 5 means clustered columnstore index

    WHERE type = 5

    GO

    ```


    ![Figure 6-20 shows the results using SQL Operations Studio.](index-320_1.jpg)


    **Figure 6-20. Clustered columnstore indexes in the WideWorldImportersDW database**


    ## Rowgroup Elimination and Query Performance


    Now let’s run some queries against the `Sales` table (which is the `Fact` schema)
    to see how column and rowgroup elimination works. First, let’s find out how many
    rows exist in the entire `Fact.Sales` table using the following T-SQL statement
    (found in the example script `fact_sales_count.sql`):


    ```sql

    USE [wideworldimportersdw]

    GO

    SELECT COUNT(*) FROM Fact.Sale

    GO

    ```


    You should get a result of 228,265 rows. Many tables in data warehouse databases
    that are fact tables use `datetime` columns because it is common to store warehouse
    data over time. For the `Fact.Sales` table, there are two `datetime` columns,
    but the data is sorted by the column `[Delivery Date Key]`. Here lies the magic
    of rowgroup elimination for clustered columnstore indexes. SQL Server has metadata
    for the range of values for each segment in the rowgroup. If the data is sorted
    on a specific column, SQL Server can then skip certain rowgroups based on the
    criteria of the query.


    Try running the following T-SQL statement as found in the example script `fact_sales_all.sql`:


    ```sql

    USE [wideworldimportersdw]

    GO

    SET STATISTICS IO ON

    GO

    SET STATISTICS XML ON

    GO

    SELECT * FROM Fact.Sale

    WHERE [Delivery Date Key] >= ''2016-01-01''

    GO

    ```


    If you look at the results of `SET STATISTICS IO`, you should see something like
    this:


    ```

    Table ''Sale''. Scan count 1, logical reads 0, physical reads 0, read-ahead reads
    0, lob logical reads 240, lob physical reads 0, lob read-ahead reads 0.

    Table ''Sale''. Segment reads 2, segment skipped 5.

    ```


    The value of `lob logical reads` is the amount of data in cache SQL Server needs
    to read from the clustered columnstore index to satisfy this query (Note: if you
    didn’t specify a `WHERE` clause, the `lob logical reads` in this case would be
    approximately 805). SQL Server stores columnstore indexes as LOB data, which is
    why this counter is used to measure reads. The second set of output that shows
    segment reads and segments skipped is misleading. This should really read “rowgroups
    read” and “rowgroups skipped.” This means there are seven total rowgroups for
    this clustered columnstore index, but because of rowgroup elimination SQL Server
    was able to skip five of them.


    Now execute this T-SQL statement as found in the example script `fact_sales_query.sql`:


    ```sql

    USE [wideworldimportersdw]

    GO

    SET STATISTICS IO ON

    GO

    SET STATISTICS XML ON

    GO

    SELECT [Customer Key], Quantity

    FROM Fact.Sale

    WHERE [Delivery Date Key] >= ''2016-01-01''

    GO

    ```


    In this example, I only request two columns (or segments) and use the same `WHERE`
    clause. The `SET STATISTICS IO` results now look like the following:


    ```

    Table ''Sale''. Scan count 1, logical reads 0, physical reads 0, read-ahead reads
    0, lob logical reads 36, lob physical reads 0, lob read-ahead reads 0.

    Table ''Sale''. Segment reads 2, segment skipped 5.

    ```


    The same number of rowgroups is skipped but because I only used two columns, I
    need fewer segments, hence the significant lower number of reads required. This
    is the power of columnstore. SQL Server can greatly speed up queries for large
    scans of data in a data warehouse scenario because of both column and rowgroup
    elimination.'
