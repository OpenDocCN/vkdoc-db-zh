  trans: "# 第 10 章：迁移至 Linux 上的 SQL Server\n\n我在本书中讨论过的 SQL Server 各项功能和特性，也研究了 PostgreSQL\
    \ 是否具备同样的能力。坦白说，我使用了以下资源进行这项研究：\n\n*   PostgreSQL 主站点，包含概述：[`www.postgresql.org/about/`](https://www.postgresql.org/about/)\n\
    *   PostgreSQL 10 版本文档：[`www.postgresql.org/files/documentation/pdf/10/postgresql-10-A4.pdf`](https://www.postgresql.org/files/documentation/pdf/10/postgresql-10-A4.pdf)\
    \ （注：我没有选择使用当时处于测试阶段的 11 版本。）\n*   以下 PostgreSQL 教程：[`www.postgresqltutorial.com/`](http://www.postgresqltutorial.com/)\
    \ 和 [`www.tutorialspoint.com/postgresql`](http://www.tutorialspoint.com/postgresql)\n\
    *   面向忙碌人群的 PostgreSQL 入门指南：[`zaiste.net/postgresql_primer_for_busy_people/`](https://zaiste.net/postgresql_primer_for_busy_people/)\n\
    *   PostgreSQL 维基百科页面：[`en.wikipedia.org/wiki/PostgreSQL`](https://en.wikipedia.org/wiki/PostgreSQL)\n\
    *   一个讲解 PostgreSQL 架构的优秀幻灯片：[`people.inf.elte.hu/kiss/14kor/korszeru-ea-01-postgre.pdf`](http://people.inf.elte.hu/kiss/14kor/korszeru-ea-01-postgre.pdf)\n\
    \n**注**：我对`PostgreSQL`的评估是基于上述资料中记录的核心开源版本。由于`PostgreSQL`是开源的，存在由其他组织修改的`PostgreSQL`发行版，例如[EnterpriseDB](https://www.enterprisedb.com/)和[Crunchy\
    \ Data](https://www.crunchydata.com/)。甚至在[`wiki.postgresql.org/wiki/PostgreSQL_derived_databases`](https://wiki.postgresql.org/wiki/PostgreSQL_derived_databases)有一个庞大的`PostgreSQL`衍生发行版和分支列表。我并未使用这些资源来比较\
    \ Linux 上的 SQL Server。\n\n除了这项研究，我还与微软的两位工程师 Michal Primke 和 Harini Gupta（他们负责我们的\
    \ Azure for `PostgreSQL`服务）一起复核了我的对比，他们同意以下比较中的所有观点。\n\n与其尝试进行详尽的比较，我研究的是 SQL\
    \ Server 拥有而`PostgreSQL`没有，或在我看来比`PostgreSQL`更优的功能和特性。在本节中，我将按以下几个领域列出此对比：核心数据库引擎、SQL\
    \ 语言、工具、性能、安全性、高可用与灾难恢复（HADR）、以及管理与监控。如果你在本书中讨论的某个 SQL Server 功能未在此部分列出，那是因为`pgsql`具有同等功能，或者我找不到两者之间足够显著的差异来加以强调。我提供这些信息是为了让你了解，在\
    \ Linux 上使用 SQL Server 相比使用`PostgreSQL`能为你的应用带来的独特价值。\n\n**注**：从本章此处开始，我将把`PostgreSQL`称为`pgsql`（如果你每次都需要输入`PostgreSQL`，你也会这么做的）。\n\
    \n## 核心数据库引擎\n\n核心数据库引擎内置的几个方面与`pgsql`不同，其差异显著到值得单独列出：\n\n*   **线程 vs. 进程**\n\
    \    `pgsql`文档指出，服务器的架构基于一组进程而非线程。所有`pgsql`工作都是通过独立的进程完成的。所有的"
- fmt: '# 第10章 迁移到SQL Server on Linux


    后台任务（如检查点进程）是独立的进程。每个到`pgsql`的连接都会催生一个新进程。在我对RHEL的测试中，每个为支持新连接而衍生的进程大约需要5MB内存（这意味着即使是300个并发空闲连接也可能需要约1.5GB内存）。我了解到，衍生新进程的开销并不大，并且每个连接占用5MB内存的代价也不算高。`sqlservr`是SQL
    Server在Linux上的单一进程，它使用线程来支持所有后台任务，并使用线程工作池来支持连接和查询。


    我对这种衍生进程的架构感到惊讶，但后来我想起了大学毕业后的早期职业生涯中使用的`Ingres`数据库，它也采用了相同的设计。`pgsql`正是源自最初的`Ingres`数据库引擎。那么哪种架构更好呢？在Windows上，使用线程被证明是比使用多进程更好的方法。我个人认为，我们的TPC基准测试性能本身就说明了SQL
    Server on Linux相较于`pgsql`在性能和可扩展性上的优势。您可以在[http://www.tpc.org/3331](http://www.tpc.org/3331)查看SQL
    Server on Linux最新的TPC-H #1基准测试结果。


    ## CPU和NUMA分配


    SQL Server提供了内置功能来控制其线程将使用哪些CPU和/或NUMA节点进行执行。此外，SQL Server还使用名为“自动软NUMA”的功能来提升在高密度核心插座系统上的可扩展性。`pgsql`在数据库引擎中不提供任何此类功能。


    ## 多文件与预写日志文件放置


    `pgsql`有一个称为“表空间”的概念。它类似于SQL Server的文件组对象，允许您将对象放置在与默认数据库目录不同的磁盘位置。然而，您无法像在SQL
    Server中那样，为表空间指定多个文件来分散I/O负载。`pgsql`有其自身创建支持数据库文件的方法，但您无法控制该过程。一个特定表空间只有一个目录，因此与表空间相关的对象被限制在磁盘上的单个目录中。


    此外，在`pgsql`中，无法按数据库分离事务日志（称为预写日志或WAL）数据的存储位置。SQL Server允许您为每个数据库精确指定事务日志的位置。`pgsql`在其最佳实践文档中建议通过移动`pg_wal`目录来更改WAL目录的位置，但所有数据库的WAL数据都会存入该目录。


    ## 数据库大小控制


    使用`pgsql`创建的数据库没有固定大小，它可以持续增长，直到磁盘空间耗尽或触及任何Linux空间限制。正如您从阅读本书所了解的，SQL Server允许您对数据库和事务日志文件的大小进行精细控制，包括初始大小、最大大小和自动增长参数。


    ## 校验和


    `pgsql`确实支持数据库页的校验和概念。但是，您必须在首次使用`initdb`初始化`pgsql`时指定是否启用此选项。此外，[其文档](https://www.postgresql.org/docs/current/static/app-initdb.html)指出“...启用校验和可能会带来显著的性能损失”。在`pgsql`中，校验和无法按数据库进行控制。SQL
    Server默认为数据库启用校验和，我们这样做是因为它不会带来显著的性能损失。此外，我们允许您随时在数据库范围内开启或关闭此功能。


    ## 缓冲池缓存


    SQL Server和`pgsql`都有缓冲池缓存的概念。然而，`pgsql`也不使用`O_DIRECT`选项（即直接I/O）打开数据库文件。因此，'
  raw: 'background tasks (such as the checkpointer process) are processes. Each connection
    to


    pgsql results in the fork of a new process. In my testing on RHEL, each forked
    process


    to support a new connection requires around 5MB (this could mean that even 300


    concurrent idle connections would require ~1.5GB of memory). I’ve read that the


    overhead to fork a new process is not heavy and requiring 5MB per connection in
    a


    process is not expensive. SQL Server is one single Linux process called sqlservr
    and


    uses threads to support all background tasks and a worker pool of threads to support


    connections and queries.


    I was surprised to see the forked process architecture but then I remembered my


    early career out of college using Ingres, which had this same design. Pgsql was
    derived


    from the original Ingres database engine. So which architecture is better? On
    Windows,


    ChApter 10   MigrAting to SQL Server on Linux


    using threads is a proven better method than using multiple processes. I personally
    feel


    our TPC benchmark performance speaks for itself on the performance and scalability
    of


    SQL Server on Linux vs. pgsql. You can see the latest TPC-H #1 benchmark result
    for SQL


    Server on Linux at [http://www.tpc.org/3331](http://www.tpc.org/3331).


    •  **CPU and NUMA assignment**


    SQL Server provides built-in functionality to control what CPUs and/or NUMA nodes


    SQL Server threads will use for execution. In addition, SQL Server uses a capability


    called Auto Soft NUMA to promote scalability on dense core socket systems. Pgsql
    does


    not offer any of these capabilities in the database engine.


    •  **Multiple files and write ahead logging file placement**


    Pgsql has a concept called a  *tablespace*. This is similar to the SQL Server
    filegroup


    object, as it allows you to place objects in a different location on disk than
    the default


    database directory. However, you cannot specify multiple files to spread out the
    I/O


    load for a tablespace as you can with SQL Server. Pgsql has its own method of
    creating


    files that support the database, which you do not have control over. There is
    only one


    directory for a specific tablespace and therefore objects related to a tablespace
    are


    limited to a single directory on disk.


    Furthermore, there is no method to separate the location for transaction log (called


    write ahead logging or wal) data  *per database* in pgsql. SQL Server allows you
    to specify


    the exact location for the transaction log for each database. Pgsql states in
    their best


    practices documentation to move the location of the wal directory by moving the


    directory pg_wal. However, all wal data for all databases goes to this directory.


    •  **Database size control**


    Databases created with pgsql are not created with a fixed size and can grow until
    you


    run out of disk space or hit a limit based on any Linux space restrictions. As
    you have


    seen from reading this book, SQL Server allows you granular control over the size
    of files


    for the database and transaction log including initial size, maximum size, and
    autogrow


    parameters.


    •  **Checksum**


    Pgsql does support the concept of checksum for database pages. However, you


    must specify whether you want this option when you first initialize pgsql with
