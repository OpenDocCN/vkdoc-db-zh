    *   并非所有 SQL 引擎都使用 `SQLOS` 来调用 Windows API。例如，引擎直接调用 `WriteFileGather()` 来将数据页刷新到磁盘。这方面的证据以
    SQL Server 等待类型的形式存在。SQL Server 中大约有 88 个 `PREEMPTIVE_OS*` 等待类型，这显示了多少组件不使用 `SQLOS`
    来调用 Windows API。

    *   我们仍然需要用 Linux 编译器重新编译所有 SQL 代码。这将要求我们维护两个代码库。

    *   还有其他可以在引擎内部或外部运行但不使用 `SQLOS` 的组件：例如，我们在引擎中支持 XML 的组件以及像 SQL Server Agent 这样的服务。'
- fmt: '# 为什么 SQL Server 要运行在 Linux 上？


    当我审视这个版本的目标时，我清楚地意识到可以总结为：


    *我们希望能够在 Linux 上，无需修改应用程序，快速、可靠地运行大部分为 Windows 构建的可执行代码。*


    拥有 `SQLOS` 仍然是一个巨大的优势。它为我们可以在此基础上构建的抽象层提供了基础。当 Slava 和团队试图确定一个设计方案时，他们发现 Drawbridge
    团队已经为其项目构建了一个可以在 Linux 上工作的原型。现在，所有碎片都已就位。采用 Drawbridge 原型的工作成果，进行必要的修改使其产品化，并将其与
    `SQLOS` 的工作和概念结合起来。由此诞生的就是 `SQLPAL`。


    **注意**：我这样说起来似乎很简单，但这确实是我微软职业生涯中见过的最惊人、最具创新性的软件项目之一。


    正如 Slava 所述，在确定这个设计后的一个月内，他们就拥有了一个简单可运行的版本，让 SQL Server 在 Linux 上启动并运行查询。


    Slava 很有远见地拍下了那次首次启动的照片，如图 1-2 所示。


    ![](index-31_1.jpg)


    **图 1-2.** SQL Server 在 Slava Oks 的电脑上首次在 Linux 上启动


    不久之后，他、Tobias Ternstrom 和团队的其他成员就有了针对 Linux 上 SQL Server 的项目计划和名称。他们称之为 *Project
    Helsinki*（以 Linux 创始人 Linus Torvalds 的出生地命名，他也在那里设计并提出了最初的 Linux 项目）。有了架构方向，该项目现在全面启动，朝着在
    2017 年交付 Linux 版 SQL Server 的目标迈进。


    ## Linux 上的 SQL Server 架构


    当团队快速推进，对原始 Drawbridge 项目进行所有必要的修改，并构建所有用于部署、配置和工具的组件时，业界和 SQL Server 社区中的许多人都很好奇我们是如何构建这个的。虽然已经公开演示了
    Linux 版 SQL Server 的轻松部署和基本查询功能，但没人知道幕后架构、`SQLPAL` 或将 Drawbridge 作为概念的使用情况。


    团队在 2016 年底决定公开该架构。成果是项目的一位开发负责人 Scott Konersmann 撰写了一篇出色的博客，你可以在[这里](https://cloudblogs.microsoft.com/sqlserver/2016/12/16/sql-server-on-linux-how-introduction/)阅读。在他的博客中，Scott
    概述了 Drawbridge 的历史、该项目的主要目标，以及仅仅使用 Drawbridge 项目所提供内容的挑战。项目成功的关键是 `SQLPAL`，他总结了他们将要构建的内容：


    ```

    作为调查的结果，我们决定采用混合策略。我们将合并 SOS 和来自 Drawbridge 的 Library OS 来创建 SQL PAL（SQL 平台抽象层）。对于
    SQL Server 不需要的 Library OS 领域，我们将移除它们。为了合并这些架构，需要在栈的所有层进行更改。


    新架构由一组不经过任何 Win32 或 NT 系统调用的 SOS 直接 API 组成。对于没有 SOS 直接 API 的代码，它们将通过托管的 Windows
    API（如 MSXML）或 NTUM（NT 用户模式 API——这是 1500 多个 Win32 和 NT 系统调用）进行。所有子系统，如存储、网络或资源管理，都将基于
    SOS，并在 SOS 直接和 NTUM API 之间共享。

    ```


    总结来说，最终的设计和方法是将我们现有的 `SQLOS` 代码与 Drawbridge 的 Library OS 合并，以创建最终的 `SQLPAL` 概念。


    Scott 使用图 1-3 中的图表来展示与 `SQLPAL`、`SQLOS`、`Library OS` 以及称为 `Host Extension` 的组件的交互。'
  raw: 'As I looked over goals for this release, it become clear to me it could be
    summarized as


    *We want to be able to run much of our executable code we built for Windows *


    *untouched on Linux. Fast and reliable, requiring no application changes.*


    Having SQLOS is still a great advantage. It provides a foundation for an abstraction


    layer that we can build on. As Slava and team tried to land on a design, they
    found out


    the Drawbridge team had built a prototype of their project to work with Linux.
    Now the


    pieces were in place. Take the work of the Drawbridge prototype, make the necessary


    changes to productize it, and couple that with the work and concept of SQLOS. Born


    from this was the SQLPAL.


    **Note**  i make this all sound very simple, when indeed it is one of the most


    amazing and innovative software projects i’ve seen in my career at Microsoft.


    As Slava tells it, within one month of landing on this design, they had a simple


    working version of SQL Server booting up on Linux and running queries.


    Slava was smart enough to capture a photo of that first boot, as seen here in
    Figur[e 1-2](#index_split_000.html#p31).


    ![](index-31_1.jpg)


    Chapter 1   Why SQL Server on Linux?


    ***Figure 1-2.  **First boot of SQL Server on Linux on Slava Oks’s computer*


    It was not long after this that he, Tobias Ternstrom, and the rest of the team
    had a


    project plan and a name for SQL Server on Linux. They called it  *Project Helsinki* (named


    after the birthplace of the founder of Linux, Linus Torvalds, and where he designed
    and


    proposed the original Linux project). With an architecture in mind, the project
    now


    swung into full gear marching down a path to deliver SQL Server on Linux in 2017.


    ** The SQL Server on Linux Architecture**


    As the team was blazing along making all the changes necessary to the original


    Drawbridge project and building out all the components for deployment, configuration,


    and tools, many in the industry and SQL Server community were curious how we were


    building this. Some demos had been done publicly about the easy deployment and


    basic query capabilities of SQL Server on Linux, but no one knew behind the scenes
    the


    architecture, SQLPAL, or the use of Drawbridge as a concept.


    Chapter 1   Why SQL Server on Linux?


    The team decided in late 2016 to go public with the architecture. The result was
    an


    excellent blog from one of the development leads on the project, Scott Konersmann,


    which you can read a[t https://cloudblogs.microsoft.com/sqlserver/2016/12/16/](https://cloudblogs.microsoft.com/sqlserver/2016/12/16/sql-server-on-linux-how-introduction/)


    [sql-server-on-linux-how-introduction/](https://cloudblogs.microsoft.com/sqlserver/2016/12/16/sql-server-on-linux-how-introduction/).
    In his blog, Scott outlined the history of Drawbridge, the main goals of the project,
    and the challenges of just using what the


    Drawbridge project provided. The key to the success of the project was SQLPAL,
    and he


    summarized what they would build:


    *As a result of the investigation, we decided on a hybrid strategy. We would *


    *merge SOS and Library OS from Drawbridge to create the SQL PAL (SQL *


    *Platform Abstraction Layer). For areas of Library OS that SQL Server does *


    *not need, we would remove them. To merge these architectures, changes *


    *were needed in all layers of the stack.*


    *The new architecture consists of a set of SOS direct APIs which don’t go *


    *through any Win32 or NT syscalls. For code without SOS direct APIs they *


    *will either go through a hosted Windows API (like MSXML) or NTUM (NT *


    *User Mode API—this is the 1500+ Win32 and NT syscalls). All the subsys-*


    *tems like storage, network, or resource management will be based on SOS *


    *and will be shared between SOS direct and NTUM APIs.*


    To summarize this, the final design and approach was to merge our existing SQLOS


    code with Library OS from Drawbridge to create the final SQLPAL concept.


    Scott uses the diagram in Figur[e 1-3 t](#index_split_000.html#p33)o show the
    interactions with SQLPAL, SQLOS,


    Library OS, and something called the Host Extension.'
