  trans: '# 第 7 章 SQL Server 中的安全性


    根据*信息类型*和*敏感级别*对数据进行分类。信息类型的示例包括银行、凭据、健康和社会安全号码。敏感级别的示例有公开、机密和 GDPR 机密。这些类型和敏感级别在
    SQL Server Management Studio 工具中使用`分类数据`功能进行固定设置。这也被称为`SQL 数据发现和分类`功能，其文档位于 [`docs.microsoft.com/sql/relational-databases/security/sql-data-discovery-and-classification`](https://docs.microsoft.com/sql/relational-databases/security/sql-data-discovery-and-classification)。


    您可以在 SSMS 中通过右键单击对象资源管理器中的数据库，选择“任务”选项来访问此功能。图 7-13 显示了此功能的示例。


    ## 图 7-13. Linux 上 SQL Server 的 SQL 数据字典和分类


    ![](img/index-378_1.jpg)


    此功能具有一组固定的 T-SQL 语句，用于实现可能匹配信息类型和敏感级别的列名字典。然后，该字典会与当前数据库进行匹配。图 7-14 显示了在 WideWorldImporters
    示例数据库上 SSMS 中的结果。


    ## 图 7-14. WideWorldImporters 数据库的分类结果


    在报告的右上角，显示找到了 92 列匹配字典中可能的分类。让我们深入查看结果，了解原因。如果您点击顶部的灰色栏查看建议，您的结果应如图 7-15 所示。


    ![](img/index-379_1.jpg)


    ## 图 7-15. WideWorldImporters 数据库的数据分类建议结果


    信息类型和敏感度标签的下拉选项是字典的一部分。您现在可以选择左侧的任何复选框，然后单击`接受所选建议`。单击保存图标后，工具将保存您的更改。现在，您可以选择此屏幕顶部的“查看报告”选项，以查看您的分类选择和敏感度标签的报告。


    图 7-16 显示了我对 WideWorldImporters 数据库中所有列进行勾选并接受默认建议后的报告。


    ![](img/index-380_1.jpg)


    ## 图 7-16. WideWorldImporters 的默认分类报告


    目前，此工具仅在 SQL Server Management Studio 中有效。并且类型、标签和规则是固定的。但是，此工具背后的所有逻辑都使用了 SQL
    Server 的功能，其文档位于 [`docs.microsoft.com/sql/relational-databases/security/sql-data-discovery-and-classification`](https://docs.microsoft.com/sql/relational-databases/security/sql-data-discovery-and-classification)。


    字典规则是一系列 T-SQL 语句，您可以使用 XEProfiler 捕获（如我在第 5 章所述）。分类类型和标签使用名为`sp_addextendedproperty`的系统存储过程保存（更多信息请访问
    [`docs.microsoft.com/sql/relational-databases/system-stored-procedures/sp-addextendedproperty-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-stored-procedures/sp-addextendedproperty-transact-sql)）。使用此过程会将数据保存在系统表中，以便您以后可以检索它们。关键是，您可以使用此系统存储过程和扩展属性创建自己的分类方案。'
- fmt: '# Chapter 7 Security in SQL Server


    ## Vulnerability Assessment


    This chapter has presented many different concepts regarding security. You want
    to make sure to configure SQL Server and your database to be as secure as possible
    while meeting the needs of your application. Therefore, it is important to ensure
    any possible surface attack vectors are minimized and best practices followed.
    But what are the best practices? I pointed you to a reference to some of these
    at the beginning of this chapter at [https://docs.microsoft.com/sql/relational-databases/security/securing-sql-server](https://docs.microsoft.com/sql/relational-databases/security/securing-sql-server).


    Wouldn’t it be nice though to run a tool that can check your system for these
    best practices? A feature just like this exists inside SQL Server Management Studio,
    called `SQL Vulnerability Assessment`. You can find the documentation at [https://docs.microsoft.com/sql/relational-databases/security/sql-vulnerability-assessment](https://docs.microsoft.com/sql/relational-databases/security/sql-vulnerability-assessment).


    I ran this tool against the WideWorldImporters sample database on SQL Server on
    Linux. Figure 7-17 shows the results from SQL Server Management Studio.


    **Figure 7-17.** `SQL Server vulnerability assessment` on the `WideWorldImporters`
    database


    ![](index-382_1.jpg)


    As you can see from the rules that Failed, built into the Assessment tool, reviews
    metadata in the database involving areas such as classifying columns, enabling
    `TDE`, and ensuring authorization to objects and using roles follow best practices.


    Even though this tool exists today only in SQL Server Management Studio, the tool
    displays for each rule the `T-SQL` statement used to check the security practice
    both for rules that pass and ones that fail.


    Figure 7-18 shows an example of how to see the `T-SQL` query behind one of the
    rules that is flagged as a Low Risk for the `WideWorldImporters` database.


    **Figure 7-18.** Vulnerability assessment `T-SQL` query details


    Since the Vulnerability Assessment tool uses a series of `T-SQL` queries, I used
    the `XEProfiler` in SQL Server Management Studio and saved all queries in the
    `vulnassess.csv` example file for you to review and use in your own system.


    In order to see assessments that apply to the SQL Server instance, use the tool
    against a system database like `master`.


    ## SQL Server Audit


    The final piece in the puzzle to secure your SQL Server is the ability to audit
    access to SQL Server and your data. SQL Server provides built-in capabilities
    to audit all aspects of access to the server instance and your database. The SQL
    Server Audit feature is implemented using `Extended Events`, which was described
    in Chapter 5. SQL Server Audit is made up of the following components:


    **Audit**: A monitored result of server or database level audit actions. You can
    have multiple audits per SQL Server instance.


    **Server audit specification**: Definition of server-level audit actions to monitor
    for a specified audit. Each audit can have one server level specification. Server-level
    specification includes a list of server-level audit action groups to monitor.


    **Database audit specification**: Definition of database-level audit actions to
    monitor for a specified audit. Each audit can contain one database level specification.
    Database audit specifications include either database-level audit action groups
    or specific audit actions to monitor.


    **Audit action group**: A server or database-level group of actions'
