- fmt: '## Figure 9-13: Core Dump on Linux


    and therefore it will terminate unexpectedly. The watchdog process is signaled
    and the aforementioned process kicks in. You can observe the core dump being generated
    if you run the following command within a few seconds of executing the `kill`
    command:


    ```bash

    sudo systemctl status mssql-server

    ```


    Figure 9-13 shows an example on my Linux Server.


    `Figure 9-13: A core dump being generated for SQL Server on Linux`


    Three files are created in the `/var/opt/mssql/log` directory:


    *   `core.sqlservr.<datetime>.<pid>.txt` – Contains information about the reason
    for the crash.

    *   `core.sqlservr.<datetime>.<pid>.json` – JSON version of the `.txt` file.

    *   `core.sqlservr.<datetime>.<pid>.tbz2` – Compressed file containing the core
    dump and other diagnostic data for Microsoft Technical Support and SQL Engineering.


    ### PSSDiag


    Soon after SQL 2000 released, one of the pillars of the SQL Server community,
    Ken Henderson, joined the Technical Support team at Microsoft. Ken loved innovation
    and along with another super smart colleague of mine in support, Bart Duncan,
    they built a tool called `PSSDiag` to automate the collection of diagnostic information
    for SQL Server support cases. This includes performance monitor data, log files,
    SQL Server DMV data, and other files commonly needed for customer support cases.


