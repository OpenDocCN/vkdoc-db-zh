    ## 在 Linux 上的 SQL Server 上使用现有应用


    迁移对象和数据是一回事，但那些为使用 `SQL Server` 而开发的应用程序怎么办？好消息是，无论你是从 `SQL Server` 还是其他数据库平台迁移过来，我们服务器端的程序（例如存储过程）通常都是本章所描述的迁移过程的一部分。


    然而，如果你的应用中嵌入了查询，例如即席查询，或者使用了诸如 `对象关系映射（ORM）` 这样的编程接口（它通常会生成查询），那么应用程序的迁移可能会更加困难。


    非常棒的消息是，`SQL Server` 支持当今市场上几乎所有流行的编程语言接口，包括 `C#`、`Java`、`Node.js`、`PHP`、`Python`、`Ruby`
    和 `C++`。你可以在 `https://docs.microsoft.com/sql/linux/sql-server-linux-develop-connectivity-libraries`
    查看 `SQL Server` 在 `Windows`、`macOS` 和 `Linux` 上支持的编程接口的完整列表。如果你正在使用的应用程序连接的是旧版本的
    `SQL Server`，那么它有很大几率只需很少的改动就能在 `Linux` 上的 `SQL Server` 中运行。


    **注意**：可能影响你的 `SQL Server` 应用程序的破坏性变更类型，将更多地与数据库兼容性以及 `Linux` 上的 `SQL Server`
    不支持的功能差异有关。请通过我们的发布说明 `https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes`
    及时了解 `Linux` 上的 `SQL Server` 的功能差异。


    # 第十章 迁移到 Linux 上的 SQL Server


    如果你正在迁移的应用程序连接的是 `SQL Server` 以外的数据库平台，那么挑战在于进行必要的更改以使用该平台的原生编程接口。例如，在第 4 章中，我向你展示了如何使用
    `node.js` 和 `tedious` 驱动程序连接到 `SQL Server`。`tedious` 驱动程序不适用于 `Oracle`。因此，你可能有一个用
    `node.js` 编写的程序，它使用了类似 `node-oracleb` 的驱动程序（有关此驱动程序的更多信息，请访问 `https://github.com/oracle/node-oracledb`）。`tedious`
    和 `node-oracleb` 之间的类和方法可能相似，但很可能存在足够的差异，这将需要进行代码更改、测试和设计。别忘了检查同一编程语言中不同驱动程序在连接池、结果处理、游标等概念以及错误条件（例如，死锁在不同的数据库平台中可能处理方式不同）方面的工作方式差异。


    ## 本章小结


    我希望本章为你提供了正确的信息，以便你做出必要的决策，迁移到 `Linux` 上的 `SQL Server`。本书以谈论一项目前正日益流行、成为部署应用程序和数据库的热门环境的技术来收尾是恰如其分的，这项技术被称为容器。


    # 第十一章 SQL Server 与容器


    虚拟机的概念已经存在一段时间了，但在我任职于微软期间，直到大约 2006 至 2007 年，我才真正看到客户开始在虚拟机上使用 `SQL Server` 作为数据库平台。即使在
    `Hyper-V` 和 `VMWare` 等虚拟机环境开始流行时，我仍怀疑 `SQL Server` 在客座虚拟机中能否良好运行。如今，`SQL Server`
    部署在虚拟机中的数量很可能远远超过了部署在裸机计算机上的数量。

