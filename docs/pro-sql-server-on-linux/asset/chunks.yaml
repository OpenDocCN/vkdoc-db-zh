    `restorewwi.sh`: Executes the `restorewwi_linux.sql` script with `sqlcmd`


    Remember that the scripts are available by clicking the Download source code button
    on the Apress.com catalog page for this book. The URL for that page is [www.apress.com/us/book/9781484241271](http://www.apress.com/us/book/9781484241271).


