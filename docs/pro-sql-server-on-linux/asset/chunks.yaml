    内存优化表的内部结构与基于磁盘的表不同。它们不使用相同的 8KB 数据库页面和行结构概念。这些内部细节不是你在使用此功能时应该关心的，但了解它们对于理解索引特别有用。


    内存优化表没有聚集索引。相反，索引仅用于访问数据。内存优化表有两种索引类型可用：


    ## 哈希索引


    哈希索引是对键列的哈希值建立的索引。'
- fmt: '### Nonclustered


    Hash indexes can be very efficient when you are almost always executing queries
    for single row lookups. Hash indexes can be efficient but also can be difficult
    to decide how to configure and maintain.


    A b-tree structure like disk-based table nonclustered indexes. I recommend you
    use a nonclustered index as the default index type and then do tuning to see if
    a hash index is better for your workload.


    You can use many indexes across columns of a memory optimized table, but you must
    always have one index (hash or nonclustered) that is defined as the primary key.


    As you explore how memory optimized tables work, I think these two resources can
    be valuable:


    - A white paper on Internals of In-Memory OLTP written by Kalen Delaney at [Internals
    of In-Memory OLTP](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/sql-server-in-memory-oltp-internals-for-sql-server-2016)

    - An Inside In-Memory OLTP presentation I did that can be found on YouTube at
    [Inside In-Memory OLTP Presentation](https://www.youtube.com/watch?v=P9DnjQqE0Gc)


    ### Natively Compiled Stored Procedures


    Standard T-SQL statements are allowed with memory optimized tables with some restrictions
    (See this documentation for restrictions: [Transact-SQL Constructs Not Supported
    by In-Memory OLTP](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/transact-sql-constructs-not-supported-by-in-memory-oltp)).
    This concept is called `interpreted` T-SQL.


    To accelerate performance even further, we created a concept called a `natively
    compiled` stored procedure. The concept is that you can create a stored procedure
    using a special T-SQL syntax so that SQL Server will compile and build a Dynamic
    Link Library (DLL) to represent all the T-SQL queries in the stored procedure.


    All the code to execute the query normally compiled into query plans is baked
    into the DLL. This allows for incredibly fast speed when executing a natively
    compiled stored procedure.


    ## ChapTer 6   performanCe CapabILITIeS


    If you use the techniques I’ve described previously in this chapter to generate
    the script of an object, you can see from this fragment of the stored procedure
    `Website.RecordColdRoomTemperatures` the syntax of a natively compiled stored
    procedure:


    ```sql

    CREATE PROCEDURE [Website].[RecordColdRoomTemperatures]

    @SensorReadings Website.SensorDataList READONLY

    WITH NATIVE_COMPILATION, SCHEMABINDING, EXECUTE AS OWNER

    AS

    BEGIN ATOMIC WITH

    (

    TRANSACTION ISOLATION LEVEL = SNAPSHOT,

    LANGUAGE = N''English''

    )

    BEGIN TRY

    .

    .

    .

    ```


    The `WITH NATIVE_COMPILATION` extension is the key to creating a natively compiled
    stored procedure.


    The combination of a memory optimized table with natively compiled stored procedures
    provides the maximum possible performance capabilities of In-Memory OLTP. Natively
    compiled procedures are not for every scenario and have some limits on T-SQL statements.
    See this documentation for any limits to using certain aspects of T-SQL with natively
    compiled procedures: [Transact-SQL Constructs Not Supported by In-Memory OLTP](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/transact-sql-constructs-not-supported-by-in-memory-oltp)'
