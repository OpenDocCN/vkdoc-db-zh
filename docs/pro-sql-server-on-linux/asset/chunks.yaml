- fmt: '# Chapter 1: Why SQL Server on Linux?


    ## 一种新兴技术：容器


    本书后面的一章将详细介绍如何将SQL Server与容器一起使用的技术细节。在这里，我将概述SQL Server与容器的关系及其与Linux的关联。


    容器技术领域目前的主要推动力无疑是Docker。与其用自己的话来定义容器，我更喜欢Docker对其的解释（[https://www.docker.com/what-container](https://www.docker.com/what-container)）：


    > *“容器镜像是一个轻量级、独立的、可执行的软件包，包含了运行它所需的一切：代码、运行时、系统工具、系统库和设置。容器化的软件可以始终以相同的方式运行，无论环境如何，适用于基于Linux和Windows的应用程序。容器将软件与其周围环境隔离开来，例如开发和测试环境之间的差异，并有助于减少团队在同一基础设施上运行不同软件时的冲突。”*


    阅读之后，你或许会想：为什么我们不直接使用容器，而要采用基于SQLPAL的架构呢？


    ## 为什么SQL Server要运行在Linux上？


    这主要有以下几个原因：


    *   Linux上的Docker引擎只支持包含Linux操作系统的镜像，因为请记住：容器需要与主机操作系统交互。因此，如果我们只采用容器，我们将回到起点，需要将所有代码移植到Linux上。

    *   我们希望为Linux操作系统提供原生能力以获得最佳性能。

    *   尽管我们希望通过Docker容器以及它提供的新场景来全面支持SQL Server，但我们并不想依赖它来支持Linux，尤其是如果容器存在某些在Linux原生环境下不存在的限制。


    我对Docker容器的未来以及SQL Server在使容器成为新场景（包括可移植性、一致性和DevOps场景）的可行技术方面所扮演的重要角色感到兴奋。


    ## 数据库容器


    我记得不久前曾问过Travis Wright（他是将SQL Server for Linux推向发布的团队的关键项目经理之一）关于SQL Server对Windows容器的支持问题。他最初的回答让我感到惊讶。他说：“Bob，你为什么关心这个？”他的意思是，如果我们能进入一个以包含SQL
    Server、数据库以及应用程序任何依赖部分的*数据库*容器为中心的世界，而不是担心容器镜像中的操作系统，难道不是很好吗？我从未那样想过，我们可能还没准备好，但他的想法非常正确。这正是容器的承诺之一。


    ## 平台独立性、可移植性和一致性


    这里的“平台”指的是运行容器的宿主机。Docker提供了这种独立性，因为我可以*编排*（你将在关于容器的章节中学到这个含义）一个包含SQL Server的Docker镜像，并将该镜像作为容器运行在Windows、Linux、MacOS或其他容器云环境中，例如Azure容器服务（AKS）、亚马逊弹性容器服务（ECS）、谷歌云平台、红帽OpenShift和SUSE
    CaaS。而且由于它是一个容器，在所有环境中运行的是*相同的镜像*。这就是可移植性！它提供了一个可靠的、*一致*的包，包含已知的SQL Server版本以及你的数据库、脚本或任何你放入镜像中的依赖项。


    ## 持续集成/持续部署


    也许你听说过*DevOps*这个词？这个已经存在多年的概念，核心是将软件开发和运营的角色与任务结合起来。它之所以流行，是因为它提供了一种机制来缩短开发生命周期，并允许更频繁地部署应用程序。


    持续集成和持续部署（CI/CD）是实现这一目标的方法……'
  raw: 'for an emerging technology called  *containers*. A later chapter in the book
    will cover


    technical details of how to use SQL Server with containers. Here I will explain
    a summary


    of SQL Server with containers and its relationship to Linux.


    The emerging force in the industry for container technology is by far Docker.
    Rather


    than create a definition of containers in my own words, I absolutely love how
    Docker


    explains it ([https://www.docker.com/what-container](https://www.docker.com/what-container)):


    *“A container image is a lightweight, stand-alone, executable package of a *


    *piece of software that includes everything needed to run it: code, runtime, *


    *system tools, system libraries, settings. Available for both Linux and *


    *Windows based apps, containerized software will always run the same, *


    *regardless of the environment. Containers isolate software from its sur-*


    *roundings, for example differences between development and staging envi-*


    *ronments, and help reduce conflicts between teams running different *


    *software on the same infrastructure.”*


    After reading this, perhaps you are wondering why didn’t we just use containers


    instead of our architecture with SQLPAL?


    Chapter 1   Why SQL Server on Linux?


    There are a few major reasons for this:


    •  The Docker Engine on Linux only supports images that contain a


    Linux operating system because remember: a container interacts


    with the host operating system. Therefore, if we just went with


    containers, we would be back to square one to port all our


    code to Linux.


    •  We wanted to provide native capability directly with the Linux


    operating system for maximum performance.


    •  Even though we want to completely support SQL Server with Docker


    containers and the new scenarios it provides, we didn’t want to


    rely on this to support Linux, especially if any limitations exist for


    containers that would not exist running natively on Linux.


    I’m excited about the future of Docker containers and how SQL Server plays an


    important role in making containers a viable technology for new scenarios, including


    portability, consistency, and DevOps scenarios.


    ** Database  Containers**


    I remember not long ago asking my colleague Travis Wright, one of the key program


    managers who brought SQL Server Linux to release, about SQL Server Support for


    Windows Containers. His initial answer surprised me. He said: “Bob, why do you


    care?” His message was that wouldn’t it be nice to get to a world where the focus
    is a


    *database* container including SQL Server, the database, and any dependent pieces
    of an


    application vs. worrying about the operating system in the container image. I
    had never


    thought about it that way and we may not be ready for that yet, but his idea is
    spot on.


    That is one of the promises of containers.


    ** Platform Independence, Portability, and Consistency**


    “Platform” in this context is the host where containers run. Docker provides this


    independence because I can  *compose* (you will learn what this means in the chapter
    on


    containers) a Docker image with SQL Server and run that image as a container


    on Windows, Linux, MacOS, or other container cloud environments such as


    Chapter 1   Why SQL Server on Linux?


    Azure Container Service (AKS), Amazon Elastic Container Service (ECS), Google


    Cloud Platform, Red Hat OpenShift, and SUSE CaaS. And since this is a container,
    it is


    the  *same image* running in all these environments. Now that is portability!
    It provides


    for a reliable,  *consistent* package of a known SQL Server version along with
    your


    database, scripts, or whatever dependencies you put into the image.


    ** Continuous Integration/Continuous Deployment**


    Perhaps you have heard of the term  *DevOps*? This concept, which has been around


    for several years, is all about combining roles and tasks for software development
    and


    operations. It has become popular because it provides a mechanism to shorten the


    development lifecycle and allow for more frequent application deployment.


    Continuous integration and continuous deployment (CI/CD) are methods to enable'
