    # 第 10 章 迁移到 SQL Server on Linux


    后台任务（如检查点进程）是独立的进程。每个到`pgsql`的连接都会催生一个新进程。在我对 RHEL 的测试中，每个为支持新连接而衍生的进程大约需要 5MB
    内存（这意味着即使是 300 个并发空闲连接也可能需要约 1.5GB 内存）。我了解到，衍生新进程的开销并不大，并且每个连接占用 5MB 内存的代价也不算高。`sqlservr`是
    SQL Server 在 Linux 上的单一进程，它使用线程来支持所有后台任务，并使用线程工作池来支持连接和查询。


    我对这种衍生进程的架构感到惊讶，但后来我想起了大学毕业后的早期职业生涯中使用的`Ingres`数据库，它也采用了相同的设计。`pgsql`正是源自最初的`Ingres`数据库引擎。那么哪种架构更好呢？在
    Windows 上，使用线程被证明是比使用多进程更好的方法。我个人认为，我们的 TPC 基准测试性能本身就说明了 SQL Server on Linux 相较于`pgsql`在性能和可扩展性上的优势。您可以在[`www.tpc.org/3331`](http://www.tpc.org/3331)查看
    SQL Server on Linux 最新的 TPC-H #1 基准测试结果。


    ## CPU 和 NUMA 分配


    SQL Server 提供了内置功能来控制其线程将使用哪些 CPU 和/或 NUMA 节点进行执行。此外，SQL Server 还使用名为“自动软 NUMA”的功能来提升在高密度核心插座系统上的可扩展性。`pgsql`在数据库引擎中不提供任何此类功能。


    ## 多文件与预写日志文件放置


    `pgsql`有一个称为“表空间”的概念。它类似于 SQL Server 的文件组对象，允许您将对象放置在与默认数据库目录不同的磁盘位置。然而，您无法像在
    SQL Server 中那样，为表空间指定多个文件来分散 I/O 负载。`pgsql`有其自身创建支持数据库文件的方法，但您无法控制该过程。一个特定表空间只有一个目录，因此与表空间相关的对象被限制在磁盘上的单个目录中。


    此外，在`pgsql`中，无法按数据库分离事务日志（称为预写日志或 WAL）数据的存储位置。SQL Server 允许您为每个数据库精确指定事务日志的位置。`pgsql`在其最佳实践文档中建议通过移动`pg_wal`目录来更改
    WAL 目录的位置，但所有数据库的 WAL 数据都会存入该目录。


    ## 数据库大小控制


    使用`pgsql`创建的数据库没有固定大小，它可以持续增长，直到磁盘空间耗尽或触及任何 Linux 空间限制。正如您从阅读本书所了解的，SQL Server
    允许您对数据库和事务日志文件的大小进行精细控制，包括初始大小、最大大小和自动增长参数。


