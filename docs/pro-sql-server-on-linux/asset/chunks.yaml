    # 第 10 章：迁移至 Linux 上的 SQL Server


    原数据库。您可以通过以下链接了解更多关于 SQL Server 数据库快照的信息：[SQL Server 数据库快照](https://docs.microsoft.com/sql/relational-databases/databases/database-snapshots-sql-server)。


    ## 故障转移集群与可用性组


    PostgreSQL (Pgsql) 同时提供基于共享磁盘和事务日志的高可用性与灾难恢复 (HADR) 解决方案，并能与 `Pacemaker` 等集群系统软件集成。与
    `Pacemaker` 配合使用的资源代理需要从另一个位置安装：[ClusterLabs 资源代理项目中的 pgsql 心跳脚本](https://github.com/ClusterLabs/resource-agents/blob/master/heartbeat/pgsql)。所有关于如何安装资源代理并与
    `Pacemaker` 集成的资源都可以在以下页面找到：[PostgreSQL 生态系统:Pacemaker](https://wiki.postgresql.org/wiki/Ecosystem:Pacemaker)。


    在了解了 `pgsql` 的这些功能后，有两个差异点让我印象深刻：


    1.  SQL Server 的故障转移检测粒度使用灵活故障转移策略和 `sp_server_diagnostics` 系统存储过程。此外，SQL Server
    将数据库健康状况作为检测是否需要故障转移的一个组件。我没有看到 `pgsql` 提供这种内置于数据库引擎中、可触发故障转移的故障检测级别。您可以通过以下链接了解更多关于
    SQL Server 灵活故障转移的信息：[可用性组的灵活自动故障转移策略](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/flexible-automatic-failover-policy-availability-group)。


    2.  SQL Server 通过可用性组提供了自动页面修复功能，而 `pgsql` 的流复制技术并不提供此特性。


    ## 管理与监控


    我将 SQL Server 与 `pgsql` 进行比较的最后一个领域是各种管理与监控功能。以下是我认为 SQL Server 表现突出，并且比 `pgsql`
    提供更强大功能的领域。


    ### SQL Server 代理


    SQL Server 提供了一个内置的作业调度引擎，这对于安排数据库维护任务特别方便。`pgsql` 没有提供内置的作业调度系统。您可以通过以下链接了解更多关于如何在
    Linux 上使用 `SQL Server Agent` 的信息：[在 Linux 上运行 SQL Server Agent 作业](https://docs.microsoft.com/sql/linux/sql-server-linux-run-sql-server-agent-job)。


    ### 资源调控器


    SQL Server 提供了一个内置特性，用于控制用户和应用程序的资源，包括 CPU、I/O 和内存。此外，`Resource Governor` 允许您在应用程序级别控制
    `max degree of parallelism`（最大并行度），并将应用程序关联到 CPU 或 NUMA 节点。`Pgsql` 没有与 `Resource
    Governor` 相媲美的内置功能。大多数 `pgsql` 的用途是使用 Linux `cgroups` 来控制 `pgsql` 集群资源，但您无法将此分配与应用程序绑定。您可以通过以下链接了解更多关于
    SQL Server `Resource Governor` 的信息：[资源调控器](https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor)。

