    # 第 9 章 SQL Server 的管理与监控


    默认情况下，执行 `ALTER TABLE` 几乎会阻塞所有其他查询（或被其他查询阻塞）。这是因为 `ALTER TABLE` 默认会获取一个架构修改锁（`Sch-M`）。问题在于，即使是最简单的
    `SELECT` 语句也需要一个架构稳定性锁（`Sch-S`），而此锁与 `Sch-M` 锁不兼容。幸运的是，SQL Server 允许在某些 `ALTER
    TABLE` 场景中避免获取 `Sch-M` 锁，并通过在 `ALTER TABLE` 语法中加入 `WITH (ONLINE=ON)` 选项来允许操作*联机*执行。关于哪些操作允许通过
    `ALTER TABLE` 联机运行，您可以在 `WITH (ONLINE=ON)` 选项的官方文档中了解更多，链接如下：[`docs.microsoft.com/sql/t-sql/statements/alter-table-transact-sql#arguments`](https://docs.microsoft.com/sql/t-sql/statements/alter-table-transact-sql#arguments)。


    您可以在我们的文档中阅读 `ALTER TABLE` 语句的所有详细信息：[`docs.microsoft.com/sql/t-sql/statements/alter-table-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/alter-table-transact-sql)。


    ## 截断表


    假设您需要删除现有表中的所有行。也许您正将某个表用作提取、转换和加载（ETL）过程的一部分。此过程的一部分要求您在 SQL Server 中*清空*该表，并用新数据刷新它。您可以使用
    `DELETE` 语句，但这可能代价高昂，因为 SQL Server 必须记录每一行被删除的变化。SQL Server 确实使用一个称为*幽灵记录*的过程来加速删除操作，但如果表中所有行（比如
    100 万行）都需要删除，使用 `DELETE` 语句效率并不高。


    因此，SQL Server 提供了 `TRUNCATE TABLE` 语句，以更高效的方式删除表中的所有行。当您执行 `TRUNCATE TABLE` 语句时，SQL
    Server 将解分配区（由八个连续页组成的集合），并且仅记录这些解分配操作。因此，`TRUNCATE TABLE` 语句速度非常快，并且只使用最少的日志空间（但仍可以在事务上下文中运行，因此可以回滚）。此外，对于像
    `TRUNCATE TABLE` 这样的操作，页的解分配速度更快，因为 SQL Server 使用了*延迟删除*的概念。您可以从 Paul Randal 的博客文章中了解更多关于延迟删除和
    `TRUNCATE TABLE` 日志记录的信息：[`www.sqlskills.com/blogs/paul/a-sql-server-dba-myth-a-day-1930-truncate-table-is-non-logged`](https://www.sqlskills.com/blogs/paul/a-sql-server-dba-myth-a-day-1930-truncate-table-is-non-logged)。


    您可以在我们的文档中阅读关于 `TRUNCATE TABLE` 工作原理的更多细节，包括限制和约束：[`docs.microsoft.com/sql/t-sql/statements/truncate-table-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/truncate-table-transact-sql)。


    ## 管理索引


    一旦为表创建了索引，您可能会决定创建其他索引，正如我在第 6 章讨论的那样。在某些情况下，您可能会发现最初选择的某个特定索引不再有意义。在这些情况下，您可以使用
    `DROP INDEX` 语句来删除特定索引。请记住，我在第 6 章建议过，在大多数情况下，您会希望为表创建聚集索引，因此如果您决定删除聚集索引，您会希望用包含不同列集的新聚集索引来替换它。这篇博客文章虽然较早，但仍然非常适用，作者是


    '
- fmt: '# Chapter 9 Managing and Monitoring SQL Server


    Kimberly Tripp on looking at usages of indexes and whether it makes sense to keep
    ones you have already created, at [https://www.sqlskills.com/blogs/kimberly/spring-cleaning-your-indexes-part-i](https://www.sqlskills.com/blogs/kimberly/spring-cleaning-your-indexes-part-i).


    It would be incredible if you simply built the indexes you needed for a table
    and never had to worry about them again for the life of your database and application.
    And for a database that is mostly read-only, that could be partially true. However,
    almost every application modifies data and indexes must be updated and changed
    along with the data in most cases. `SQL Server` handles that type of modification
    for indexes automatically. However, because of some data changes over time, you
    may need to maintain your indexes either by rebuilding or reorganizing them. In
    this section, I’ll talk about the process to rebuild and reorganize an index,
    along with a small section about the ability to modify some properties of an index.
    In any of these situations, `SQL Server` provides the `ALTER INDEX` `T-SQL` statement
    to maintain existing indexes. However, first I need to discuss in more details
    the concept of index fragmentation.


    **Note** one really cool solution from one of the best experts in the `SQL Server`
    community, ola hallengren, includes scripts to help automate index maintenance
    at [https://ola.hallengren.com/sql-server-index-and-statistics-maintenance.html](https://ola.hallengren.com/sql-server-index-and-statistics-maintenance.html).


    ## Index Fragmentation


    As you modify data, especially inserting and delete new rows, the indexes you
    have created may become fragmented. I briefly mentioned the concept of fragmentation
    in a previous chapter on performance capabilities on indexes. There are two types
    of fragmentation:


    ### Logical or Extent Fragmentation

    Logical fragmentation is the percentage of pages that are logically linked together
    but out of physical order. For example, a clustered index has at the leaf level
    a linked list of database pages representing the data. Ideally, all these pages
    would be ordered in the list by pageid so that they are physically in order and
    contiguous in the database file. If you remember from Chapter 6, I talked about
    how `SQL Server` can only read multiple pages at one time if they are physically
    contiguous in the file. If you run an `SQL Server` query that needs to scan several
    pages in the clustered index, `SQL Server` is limited on its ability to efficiently
    read multiple pages unless they are in physical order. Extent fragmentation is
    the same concept except it applies to tables without clustered indexes (heaps)
    and how pages are ordered within `IAM` pages.


    ### Page Compactness

    Page compactness is a term I created for the book, and you may not see this term
    be represented as part of the concept of fragmentation. I call this part of fragmentation
    because the more pages of an index (or data for a clustered index) are sparsely
    filled with rows, or less compact, the more pages it can take to service the need
    of a query. This can lead to higher than desired level of pages required across
    all queries taking up space in the buffer pool and requiring more `I/O`. However,
    there is a balance here. If pages were 100% full (compacted), inserting new rows
    could require page splits, which could lead to more logical fragmentation. Therefore,
    ideally, leaving some space available on pages is desirable but not to the level
    where most pages are empty. When you create, rebuild, or reorganize an index,
    you can make smart choices about how to leave space in index pages with an option
    called `fillfactor`. I like this blog post by Kimberly Tripp.'
