    ## 构建视图和存储过程


    SQL Server 具有内置功能，可用于创建其他类型的对象，以帮助提供抽象化并包含查询逻辑。其中一种对象称为 `view`（视图），这是许多数据库系统中的常见功能。视图允许你基于来自一个或多个表的
    T-SQL `SELECT` 语句创建对象。


    例如，我可以基于之前展示的 `Customer` 表和 `People` 表之间的连接，通过以下 T-SQL 语句创建一个视图，如示例脚本 `createview.sql`
    所示：


    ```sql

    USE [WideWorldImporters]

    GO

    DROP VIEW IF EXISTS [Sales].[CustomerContacts]

    GO

    CREATE VIEW [Sales].[CustomerContacts]

    AS

    SELECT c.[CustomerName], c.[WebsiteURL], p.[FullName] AS PrimaryContact

    FROM [Sales].[Customers] AS c

    JOIN [Application].[People] AS p

    ON p.[PersonID] = c.[PrimaryContactPersonID]

    GO

    ```


    现在，我可以针对视图中的所有列执行一条 T-SQL 语句，如示例脚本 `findcustomercontacts.sql` 所示：


    ```sql

    USE [WideWorldImporters]

    GO

    SELECT * FROM [Sales].[CustomerContacts]

    GO

    ```


    我得到了与执行连接相同的结果，但我已将“查找客户联系人”的逻辑从用户或应用程序中抽象出来。当你希望向用户隐藏 `base`（基表）的某些列，并只允许他们访问特定列时，视图非常常见。


    SQL Server 中另一种非常常见的对象是 `stored procedure`（存储过程）。在 SQL Server 中使用存储过程通常被称为 `server-side
    programming`（服务器端编程）。存储过程可以包含多个 T-SQL 语句（通常可能很长且复杂）。这免除了应用程序需要在代码中包含所有 T-SQL 语句的麻烦。存储过程还减少了来自客户端应用程序的网络流量，并且在内存中被高效缓存。


    我可以采用插入客户行的 `INSERT` 语句，并构建一个存储过程，如下列 T-SQL 语句所示，如示例脚本 `insertcustomerproc.sql`
