- fmt: '# Chapter 6: Performance Capabilities


    ## Overview


    This section discusses various Performance Capabilities in SQL Server, focusing
    on DMVs (Dynamic Management Views) and system features.


    ## Schedulers and Tasks


    You can use DMVs to see how many workers are running or how many tasks are waiting
    for a worker thread from the pool. Figure 6-1 shows example output from this DMV
    on my SQL Server on Linux on a virtual machine with four logical CPUs: (Note:
    you can use the example script `dm_os_schedulers.sql` to see this output for your
    SQL Server).


    **Figure 6-1.** `dm_os_schedulers` on a four CPU virtual machine running SQL Server
    on Linux


    The four schedulers with a status of `VISIBLE ONLINE` are *normal* schedulers
    used to run SQL Server tasks and workers. `HIDDEN` schedulers are used to schedule
    work for some background and other tasks such as backups. You can find the complete
    documentation of this DMV at [https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-schedulers-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-schedulers-transact-sql).


    ## SQLOS DMVs


    ### `dm_os_nodes`


    This DMV lists out all detected NUMA nodes on the server running SQL Server. Even
    servers that don’t have NUMA nodes will have a `node_id=0`. `Node_id=64` is for
    a special node reserved for the Dedicated Administrator Connection (DAC). I’ll
    talk more about DAC in a later chapter in this book.


    SQLOS exposes tasks, workers, and threads through these DMVs:


    ### `dm_os_workers`


    This DMV lists out all worker threads that are either executing or can execute
    a task for SQL Server. Worker threads for SQL Server are created in a pool grouped
    by scheduler. SQL Server will assign worker threads from the pool to execute an
    incoming task (instead of dedicating a thread for every request). By default,
    the configuration of `max worker threads = 0` (which means *dynamic*). The value
    of 0 means SQL Server creates a maximum pool of worker threads based on formulas
    as documented at [https://docs.microsoft.com/sql/database-engine/configure-windows/configure-the-max-worker-threads-server-configuration-option](https://docs.microsoft.com/sql/database-engine/configure-windows/configure-the-max-worker-threads-server-configuration-option).


    The `sys.dm_os_sys_info` DMV lists the current `max worker threads` calculated
    value. For most scenarios, you should be able to leave the `max worker threads`
    configuration value to 0 and let SQL Server calculate the value. However, in some
    cases, you may want to override the default by using the system procedure `sp_configure`
    to change `max worker threads` to a fixed value. I’ll discuss this choice later
    in the chapter.


    ### `dm_os_tasks`


    Any *unit of work* in SQL Server is a task. Any login, query, or background task
    is a task. Think of a task as a function in the SQL Server to execute code in
    the SQL Server engine. Tasks are run by worker threads. It is possible in some
    situations that a task will need to wait for a worker thread. In these situations,
    the task will be listed in this DMV and the `wait_type` for the task in `dm_os_waiting_tasks`
    will be `THREADPOOL`. A larger list of tasks waiting on `THREADPOOL` could present
    a problem in SQL Server.


    I documented some information on `THREADPOOL` waits many years ago in this blog
    post: [https://blogs.msdn.microsoft.com/psssql/2009/11/24/doctor-this-sql-server-appears-to-be-sick/](https://blogs.msdn.microsoft.com/psssql/2009/11/24/doctor-this-sql-server-appears-to-be-sick/)


    My friend Paul Randal has another great description of how to address `THREADPOOL`
    waits in his blog post [https://www.sqlskills.com/help/waits/threadpool/](https://www.sqlskills.com/help/waits/threadpool/).
    When a task is bound to a worker thread, it becomes a *request* and will appear
    in `sys.dm_exec_requests`.


    ## Auto Soft NUMA


    Because modern NUMA and CPU architectures can support more than eight physical
    cores per CPU, we introduced a feature called **Auto Soft NUMA** in SQL Server
    2016, so SQL Server can logically partition nodes and CPUs within its code to
    provide better scalability.


    To understand how SQL Server detects CPU and NUMA nodes (and uses Auto Soft NUMA),
    let’s look at an example. I have a machine in the labs of Microsoft with four
    NUMA nodes, one CPU socket per node, and 24 cores per socket (hyperthreading is
    not enabled, so a total of 96 CPUs).


    When I install SQL Server on this computer, the `ERRORLOG` file detects the CPU
    and cores with the following entries, as shown in Figure 6-2.


    **Figure 6-2.** The SQL Server `ERRORLOG` entries detecting available CPUs


    Auto Soft NUMA will be enabled if SQL Server detects more than eight physical
    cores per CPU. SQL Server will then attempt to partition NUMA nodes (logical within
    SQL Server) to get as close as possible to eight CPUs per node. Figure 6-3 shows
    how Auto Soft NUMA has partitioned the 96 CPUs across four NUMA nodes on this
    computer logically within SQL Server.


    **Figure 6-3.** `ERRORLOG` entries for NUMA and CPU mapping


    Auto Soft NUMA is enabled by default, but you can disable this for any reason
    (perhaps you suspect it is causing a performance problem) through `ALTER SERVER
    CONFIGURATION`. You can read more about Auto Soft NUMA in our documentation at
    [https://docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql).


    To understand how to read the mappings in the `ERRORLOG` for the “CPU Mask” to
    see which CPUs are mapped to specific NUMA nodes, see this blog post where I talk
    more about Auto Soft NUMA and how to interpret CPU mappings: [https://blogs.msdn.microsoft.com/bobsql/2016/11/29/how-it-works-it-just-runs-faster-auto-soft-numa](https://blogs.msdn.microsoft.com/bobsql/2016/11/29/how-it-works-it-just-runs-faster-auto-soft-numa).


    ## Thread Affinity


    Since SQLOS controls scheduler and thread execution, it is possible to assign
    SQL Server worker threads to specific NUMA nodes and/or CPUs. This process is
    called *affinity*. I’ll discuss more about affinity in later sections of this
    book.


    ## Dynamic Memory and Cache Management


    SQL Server is built to adapt but also maximize computing resources. Memory can
    be one of the most important resources for database performance. SQL Server provides
    a robust memory management system for important resources such as database pages
    (buffers) and cached T-SQL queries and plans. SQL Server also manages memory for
    other internal needs and is tracked through a system of memory clerks. (One of
    the Dynamic Management Views I called out in Chapter 5 was `dm_os_memory_clerks`).


    Another amazing aspect of SQL Server’s memory management is *dynamic memory*.
    SQL Server has built-in capabilities to grow and shrink its memory footprint based
    on demand for memory. You will find that after installing SQL Server without creating
    any'
