  trans: '# 第 7 章 SQL Server 中的安全性


    默认用户的权限是查看数据库中大多数系统目录视图，但这基本上就是全部了。


    让我们通过一个使用 `WideWorldImporters` 数据库的例子来操作（我建议你先按照我在前面章节提供的说明，从头开始还原 `WideWorldImporters`
    完整数据库）。


    ## 1. 将登录名 `sqllinux` 添加为数据库所有者


    让我们添加登录名 `sqllinux`，并使用 `ALTER AUTHORIZATION` T-SQL 命令使其成为该数据库的所有者。


    以 `sa` 身份连接，使用示例脚本 `createdbownerlogin.sql`，如下所示 T-SQL 语句：


    ```sql

    USE master

    GO

    IF EXISTS (select * from sys.server_principals where name = ''sqllinux'')

    DROP LOGIN [sqllinux]

    GO

    CREATE LOGIN [sqllinux] WITH PASSWORD=N''Sql2017isfast'', DEFAULT_DATABASE=[master]

    GO

    ALTER AUTHORIZATION ON DATABASE::WideWorldImporters to sqllinux

    GO

    ```


    ## 2. 创建 `appuser` 服务器登录名


    以 `sa` 身份连接，使用 `createappuserlogin.sql` 为 `appuser` 登录名创建另一个服务器登录名，如下所示 T-SQL
    语句：


    ```sql

    USE [MASTER]

    GO

    USE master

    GO

    IF EXISTS (select * from sys.server_principals where name = ''appuser'')

    DROP LOGIN [appuser]

    GO

    CREATE LOGIN [appuser] WITH PASSWORD=N''Sql2017isfast'', DEFAULT_DATABASE=[WideWorldImporters]

    GO

    ```


    ## 3. 创建 `appuser` 数据库用户


    以 `sqllinux` 登录名身份连接，使用 `createappuser.sql` 创建将绑定到 `appuser` 服务器登录名的 `appuser`
    用户，如下所示 T-SQL 语句：


    ```sql

    USE [WideWorldImporters]

    GO

    DROP USER IF EXISTS appuser

    GO

    CREATE USER appuser FOR LOGIN appuser

    GO

    ```


    ## 4. 创建数据库角色并分配权限


    以 `sqllinux` 登录名身份连接，使用 `createdbrole.sql` 创建数据库角色，将 `appuser` 数据库用户添加到其中，并为其分配对
    Application 架构的 `CONTROL` 权限，如下所示 T-SQL 语句：


    ```sql

    USE [WideWorldImporters]

    GO

    IF (SELECT IS_ROLEMEMBER(''Application_Users'', ''appuser'')) IS NOT NULL

    ALTER ROLE Application_Users DROP MEMBER appuser

    GO

    DROP ROLE IF EXISTS Application_Users

    GO

    CREATE ROLE Application_Users

    GO

    ALTER ROLE Application_Users ADD MEMBER appuser

    GO

    GRANT CONTROL ON SCHEMA::Application TO Application_Users

    GO

    ```


    请注意我在这里使用了带有 `CONTROL` 选项的 `GRANT` T-SQL 语句。`GRANT` 允许你向包括架构在内的对象授予权限。在此情况下，`GRANT
    CONTROL` 将 `WideWorldImporters` 数据库中 `Application` 架构的所有权授予了 `Application_Users`
    角色的任何成员。你可以在文档中阅读更多关于 `GRANT CONTROL` 的信息：[`docs.microsoft.com/sql/t-sql/statements/grant-database-principal-permissions-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/grant-database-principal-permissions-transact-sql)。


    ## 5. 测试权限


    要查看这些权限如何工作，以 `appuser` 登录名身份连接，执行 `appuserquery.sql` 中的查询，如下所示 T-SQL 语句：


    ```sql

    use [WideWorldImporters]

    go

    SELECT * from [Application].People

    GO

    SELECT * from [Sales].[Customers]

    GO

    ```


    ![图 7-6](img/index-356_1.jpg)


    **图 7-6. `appuser` 登录名有权访问的架构和对象**


    你可以看到 `appuser` 有权访问 `Application` 架构中的一个表，但当尝试访问其未被授予权限的架构中的表时，则会出错。


    除了针对表等对象的架构和/或用户的基本权限外，你还可以为表和/或视图中的特定列集分配有关权限。有关 `GRANT` T-SQL 语句语法的更多信息，请参阅文档：[`docs.microsoft.com/sql/t-sql/statements/grant-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/grant-transact-sql)。


    ### 应用程序角色


    一个可能对开发人员有吸引力的有趣安全功能是应用程序角色。应用程序角色允许应用程序使用仅应用程序知道的密码，并设置特定于应用程序的权限，这些权限独立于从应用程序连接时使用的登录名。'
- fmt: "# Chapter 7 SeCurity in SQL Server\n\nYou can read more about application\
    \ roles at [https://docs.microsoft.com/sql/relational-databases/security/authentication-access/application-roles](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/application-roles).\n\
    \n## Other Permissions\n\nI’ve only shown you the basics of granting and revoking\
    \ permissions on tables. SQL Server allows you to assign permissions on a wide\
    \ range of objects and specific T-SQL statements. In some cases, these permissions\
    \ only apply if you are using a specific feature of SQL Server. For example, you\
    \ can assign permissions for aspects of Availability Groups only if you have enabled\
    \ that feature. For a complete list of possible permission examples, see our documentation\
    \ at [https://docs.microsoft.com/sql/t-sql/statements/grant-transact-sql#examples](https://docs.microsoft.com/sql/t-sql/statements/grant-transact-sql#examples).\n\
    \n**Tip** Want to test out permissions for a user you have created without actually\
    \ logging in as the user? Check out the `execute as` T-SQL statement in our documentation\
    \ at [https://docs.microsoft.com/sql/t-sql/statements/execute-as-clause-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/execute-as-clause-transact-sql).\n\
    \n## Row Level Security\n\nOne highly requested feature landed in SQL Server 2016,\
    \ Row Level Security (RLS). Instead of just being able to assign permissions on\
    \ objects or statements that apply across all rows of a table, you can now assign\
    \ permissions for certain rows of data. You actually had a way to achieve this\
    \ before using a view, but now you can assign permissions to a set of rows directly\
    \ to tables. Furthermore, RLS provides additional functionality to block operations\
    \ before or after they execute.\n\nThe best way to understand RLS is to see it\
    \ in action. I found a great example on GitHub from our team on RLS, using the\
    \ `WideWorldImporters` database at [https://github.com/Microsoft/sql-server-samples/tree/master/samples/databases/wide-world-importers/sample-scripts/row-level-security](https://github.com/Microsoft/sql-server-samples/tree/master/samples/databases/wide-world-importers/sample-scripts/row-level-security).\
    \ I made a few modifications, which you can find in `rls.sql`. This example will\
    \ set up row level security for users based on sales territory data for customers.\
    \ The concept is that only application users who are part of a given sales territory\
    \ should be able to see sales for their territory and not sales data for other\
    \ territories. The database owner should see all data.\n\nLet me walk through\
    \ the T-SQL statements in this script and explain how it works (Connect as `sa`\
    \ when running this script to make it simple):\n\n1. Create the login for this\
    \ RLS example:\n\n```sql\nUSE master\nGO\nIF NOT EXISTS (SELECT 1 FROM sys.server_principals\
    \ WHERE name = N'GreatLakesUser')\nBEGIN\n    CREATE LOGIN GreatLakesUser\n  \
    \  WITH PASSWORD = N'SQLRocks!00',\n    CHECK_POLICY = OFF,\n    CHECK_EXPIRATION\
    \ = OFF,\n    DEFAULT_DATABASE = WideWorldImporters;\nEND\nGO\n```\n\n2. Create\
    \ the user to map to the login you just created and add this user to a role already\
    \ defined in `WideWorldImporters`:\n\n```sql\nUSE WideWorldImporters;\nGO\nDROP\
    \ USER IF EXISTS GreatLakesUser\nGO\nCREATE USER GreatLakesUser FOR LOGIN GreatLakesUser\n\
    GO\nALTER ROLE [Great Lakes Sales] ADD MEMBER GreatLakesUser\nGO\n```\n\n`WideWorldImporters`\
    \ comes built-in with database roles that will map to sales territory."
