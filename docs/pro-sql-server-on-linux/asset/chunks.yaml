    # 第5章 SQL Server 工具


    使用来自第3章的 **insertpeople.sql** 脚本中的命令插入数据后，由于`People`表中已有数据，让我们使用`bcp`以*本机*格式将数据导出到文件。（本机格式将根据表中的数据类型以二进制形式写出数据。还有命令行选项可以将数据写入文本格式）。以下是在示例脚本
    **bcpout.sh** 中看到的导出表的基本语法（别忘了运行`chmod u+x bcpout.sh`来执行脚本）：


    ```

    bcp [WideWorldImporters].[Application].[People] out people.dat -Usa -S localhost
    -n

    ```


    图5-5展示了在Linux服务器上运行此`bcp`命令的结果。


    ***图5-5. 在Linux服务器上使用bcp导出数据***


    你可以从`People`表中删除数据，然后将本机格式化的文件导入到SQL Server中。但在执行`DELETE`语句之前，你需要先禁用这些表上的所有约束。以下是我从名为
    **deletepeoplebeforeimport.sql** 的示例脚本中执行的一组T-SQL命令示例。此脚本适用于第3章中的WideWorldImporters示例脚本。你不能将其用于完整的WideWorldImporters示例备份。


    **注意**：我禁用了包括来自`Customers`表的外键约束。如果此表中存在数据，则不建议禁用外键约束，因为在插入新数据时可能违反逻辑引用完整性。此外，除非使用了特定的命令行选项，否则`bcp`程序本身会忽略约束。我在此示例中禁用了约束，以便可以删除现有行。


    ```

    USE [WideWorldImporters]

    GO

    ALTER TABLE [Sales].[Customers] NOCHECK CONSTRAINT ALL

    GO

    ALTER TABLE [Application].[People] NOCHECK CONSTRAINT ALL

    GO

    DELETE FROM [Application].[People]

    GO

    ```


    现在你可以使用`bcp`从前面导出示例创建的`people.dat`文件导入数据（我提供了一个名为 **bcpin.sh** 的示例bash shell脚本）：


    ```

    bcp [WideWorldImporters].[Application].[People] in people.dat -Usa -S localhost
    -n

    ```


    `bcp`具有丰富的命令行选项，适用于导入和导出场景。这些选项包括但不限于格式文件、导入/导出到文本文件、列和行分隔符，以及用于提示和行批大小的性能选项。有关完整的命令行选项和示例列表，请参阅文档：[https://docs.microsoft.com/sql/tools/bcp-utility](https://docs.microsoft.com/sql/tools/bcp-utility)


    如果你有存储空间并且愿意将导入文件复制到与SQL Server相同的计算机上（或网络上SQL Server可访问的文件共享），则可以使用T-SQL的`BULK
    INSERT`来执行高速导入。此命令可以显著提高导入性能，因为SQL Server引擎将直接读取文件并将数据导入到目标表中。有关`BULK INSERT`的更多信息，请参阅文档：[https://docs.microsoft.com/sql/t-sql/statements/bulk-insert-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/bulk-insert-transact-sql)


    **注意**：在本书撰写时，SQL Server on Linux上的`BULK INSERT`命令需要`sysadmin`权限。


