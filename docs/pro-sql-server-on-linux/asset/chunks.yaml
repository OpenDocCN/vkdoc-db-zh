    # Chapter 7   SeCurity in SQL Server


    ## Encrypting Database Backups


    If you don’t use `TDE` for a database, you also have the ability to encrypt your
    database backups. The process to do this is pretty much the same as `TDE`. You
    create a database master key (or use one you have already created), create a certificate,
    and then use the T-SQL `BACKUP` command specifying the certificate you created.
    Like `TDE`, we recommend you backup the database master key and certificate, as
    you will need them to restore the backup.


    The example and steps to encrypt a database backup for SQL Server on Linux can
    be found at [https://docs.microsoft.com/sql/linux/sql-server-linux-security-get-started#configure-backup-encryption](https://docs.microsoft.com/sql/linux/sql-server-linux-security-get-started#configure-backup-encryption).
    And you can find the complete documentation about backup encryption at [https://docs.microsoft.com/sql/relational-databases/backup-restore/backup-encryption](https://docs.microsoft.com/sql/relational-databases/backup-restore/backup-encryption).


    ![](index-370_1.jpg)


    ## Encrypting Connections


    SQL Server also supports encrypting data transferred between clients and the SQL
    Server engine across a network connection. SQL Server on Linux uses Transport
    Layer Security (TLS) to encrypt any data transmitted from a SQL Server client
    application or from the server. SQL Server on Linux currently supports TLS 1.2.
    You have options to force all connections to be encrypted by SQL Server (*server
    initiated*) or specific clients to request encryption from their application (*client
    initiated*).


    The certificates and objects for encrypting connections are independent of the
    keys and certificates used inside SQL Server to encrypt data (i.e., the service
    master key, …). As with other encryption and certificate functionality I’ve described
    to this point, encryption and certificate services used by SQL Server are provided
    by the Linux Operating System.


    In order to configure SQL Server for encrypted connections, you will use a combination
    of the `openssl` program (which should be installed on your Linux server) and
    the `mssql-conf` configuration script that comes when you install SQL Server.


    If you choose a client-initiated encrypted connection, each of the tools provided
    by Microsoft has an option to choose an encrypted connection. In addition, applications
    can add `Encrypt=True` to their connection string.


    Sometimes the option to choose an encrypted connection with our tools is a bit
    hidden. Figure 7-8 shows the connection options for SQL Operations Studio.


    *Figure 7-8. Connection options for SQL Operations Studio*


    ![](index-371_1.jpg)


    If you click the Advanced button, you are presented with a new screen where you
    can pick the option to Encrypt the connection, as seen in Figure 7-9.


    *Figure 7-9. Selecting option to encrypt a SQL Server connection*


    SQL Server provides steps in the documentation on how to configure SQL Server
    with `openssl` and `mssql-conf` as well as instructions on how to configure client
    machines needing encryption. You can read further about how to set up client-
    or server-initiated encryption at [https://docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections](https://docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections).'
