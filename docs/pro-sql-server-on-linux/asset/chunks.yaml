    ### SQL Operations Studio


    While SSMS is an extremely popular tool, it only works on Windows, so Linux and
    macOS users would have to install it with a virtualization program. As I mentioned
    earlier in this chapter when describing `mssql-cli`, when possible, we build new
    tools to run on multiple operating systems and be part of an open-source project.


    For tools that require a graphical interface, the Visual Studio Code project provided
    a nice platform to build a cross-platform system. Coupled with the work we did
    for the `SQL Tools Service`, a new tool called `SQL Operations Studio` was born,
    forked from the Visual Studio Code open-source project.


    Released as a preview tool in November 2017, `SQL Operations Studio` continues
    to receive monthly updates both from Microsoft and the community through a GitHub
    repo at [https://github.com/Microsoft/sqlopsstudio](https://github.com/Microsoft/sqlopsstudio).
    In true GitHub fashion, private builds are available on a more frequent basis,
    the entire source code is available for anyone to see or fork on their own, and
    all issues are filed through GitHub at [https://github.com/Microsoft/sqlopsstudio/issues](https://github.com/Microsoft/sqlopsstudio/issues).


    ![](index-181_1.jpg)


    ## Chapter 5 SQL Server Tools


    ### Installation


    We have embraced the natural installation experience of each operating system.
    Windows comes with a `.zip` file or complete Windows installer experience. macOS
    users are provided a zip file, which works within the macOS Downloads experience,
    and Linux users can download a Debian or RPM package or a `tar.gz` file.


    Figure 5-10 shows `SQL Operations Studio` after installing it on macOS.


    ### Figure 5-10. SQL Operations Studio on macOS


    `SQL Operations Studio` provides these unique features:


    -   A T-SQL code editor built with Intellisense to execute queries.

    -   Smart T-SQL code “snippets”.

    -   Customizable dashboards through widgets.

    -   Extensions to add on to the built-in base functionality.

    -   Integrated Terminal (run shell commands without leaving the tool).


    ![](index-182_1.jpg)


