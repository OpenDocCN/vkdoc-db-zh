  trans: '# 第五章 SQL Server 工具


    在我撰写本书此章节时，SQL Operations Studio 仍处于预览阶段。考虑到该工具的可扩展性以及社区为其贡献的开放源码能力，我预计随着每月新的主要版本发布，它将在功能和性能上持续快速成长。


    ## SQL Server Management Studio


    自 2005 年以来，世界上最流行的与 SQL Server 交互的工具是 SQL Server Management Studio (SSMS)。在 2005
    年之前，SQL Server 提供了一个名为 SQL Enterprise Manager 的图形界面工具。SSMS 是一个令人兴奋的新工具，它基于 Visual
    Studio 的外壳，拥有丰富的能力。自 2005 年起，随着 SQL Server 的每次发布，SSMS 都得到了增强，包含了广泛的功能和特性。


    从历史上看，SSMS 的问题之一是它总是与 SQL Server 主要版本的安装和发布捆绑在一起。这种方法阻碍了我们频繁对工具进行重大增强的能力。从 SQL
    Server 2016 开始，我们决定将 SSMS 与 SQL Server 解耦。我们也特意努力清理了积压的错误、问题和建议。我们于 2016 年 6 月通过单独的
    SSMS 下载开始了这一旅程，如今 SSMS 17 每月都会进行更新和增强。您始终可以在 [`docs.microsoft.com/sql/ssms/download-sql-server-management-studio-ssms`](https://docs.microsoft.com/sql/ssms/download-sql-server-management-studio-ssms)
    找到最新版本的 SSMS 进行下载。


    对于在 Linux 上使用 SQL Server 的用户来说，SSMS 作为工具的最大缺点是它只能安装在运行 Windows 操作系统的计算机上。但对于 Windows
    用户而言，它是一个功能强大的工具，具备丰富的能力。SSMS 最大的优势在于，连接到 Linux 上的 SQL Server 时，所使用的提供程序和库与 Windows
    上使用的相同，因此连接到 Linux 上的 SQL Server 与在 Windows 上连接感觉一样。这是一个很棒的兼容性案例。


    SSMS 包含对象资源管理器、丰富的 T-SQL 编辑器、T-SQL 调试器、用于完成特定任务的向导，以及针对各种 SQL Server 和数据库功能的报告。多年来，关于
    SSMS 的文档、培训和信息已经非常多。本章中的一个章节永远无法全面介绍。我将介绍一些您可以用来通过 SSMS 与 Linux 上的 SQL Server
    交互的主要功能，然后提供更详细涵盖该主题的其他资源。


    ![](img/index-197_1.jpg)


    图 5-25 展示了 SSMS 的默认界面，其中包含对象资源管理器和一个新建查询编辑器窗口。


    *图 5-25. SSMS 的默认界面*


    ## 对象资源管理器


    与 SQL Operations Studio 类似，SSMS 提供了一个可视化界面来导航 SQL Server 的对象。SSMS 在对象资源管理器中提供了比
    SQL Operations Studio 更多的选项，不仅包括对象，还包括 SQL Server 的功能，例如 Always On 可用性组和管理功能。此外，在对象资源管理器中右键单击对象和功能时，可用的选项也比在
    SQL Operations Studio 中更多。


    ![](img/index-198_1.jpg)


    例如，图 5-26 展示了创建 T-SQL 脚本以删除和创建 WideWorldImporters 示例数据库的选项。


    *图 5-26. 使用 SSMS 创建脚本以删除并重新创建现有数据库*


    SSMS 通过对象资源管理器提供的另一个功能是能够创建新对象，如数据库、表、索引和其他对象。如果右键单击对象资源管理器中的“数据库”文件夹，您将有选项可以创建或还原新数据库。图
    5-27 显示了当您右键单击“数据库”文件夹并选择“新建数据库”时将出现的新窗口。


    ![](img/index-199_1.jpg)'
- fmt: '***Figure 5-27.** Creating a new database in SSMS*


    There are other features that are accessible by right-clicking other folders,
    objects, or features in SSMS.


    One of the most powerful options when using right-click is Tasks for a database.
    Figure 5-28 shows all the types of tasks you can perform against a database with
    SSMS. Picking any of these options will present a new window or a *wizard* to
    lead you through performing one of these tasks. I’ll describe some of these tasks
    as part of Chapter 9, either by using SSMS or the set of T-SQL commands to execute
    equivalent functionality.


    ![](index-200_1.jpg)


    ## ***Figure 5-28.** Tasks available for databases in SSMS*


    ### **T-SQL Query Editor**


    Like SQL Operations Studio, SSMS provides a rich editor to create and design T-SQL
    queries. Features include color coding for identifiers, intellisense, and T-SQL
    snippets to aid in common T-SQL tasks. SSMS also allows you to open script files
    to execute T-SQL batches and save results to a grid view, text format, or a file.
    You also take results of a T-SQL `SELECT` statement and save them to a text file
    or a CSV (comma delimited) file.


    ![](index-201_1.jpg)


    Figure 5-29 shows the default results of a `SELECT` statement for the `[Application].[People]`
    table in the default Grid View results.


    ***Figure 5-29.** Results of a query in the T-SQL editor in SSMS in grid view*


    Notice the yellow status bar at the bottom of the SSMS screen shows context such
    as the server name, login of user connected, database context, total duration
    and total number of rows from the last executed query.


    ### **Reports**


    SSMS comes installed with a series of reports to view performance, disk usage,
    activity, and configuration of the SQL Server instance. Additionally, reports
    are available for databases to see space usage by object, indexes, and various
    statistics and performance specific to a database.


    To execute a report, right-click the Server or a database, and select the `Reports/Standard
    Reports` option.


    ![](index-202_1.jpg)


    Figure 5-30 shows the built-in report for Performance for all batches run on SQL
    Server on Linux instance since the server was started.


    ***Figure 5-30.** The standard Performance Batch report in SSMS*


    Reports can be an immensely powerful capability to gain insight into SQL Server
    and databases. While SSMS provides built-in reports, you can build our own custom
    report and integrate it into SSMS. You can read more about how to build custom
    reports in our documentation at `https://docs.microsoft.com/sql/ssms/object/custom-reports-in-management-studio`.


    ### **Tools Built into the Engine**


    One of the amazing stories of SQL Server is the number of *tools* that have been
    built into the core database engine. I call these “tools” because they are general-purpose
    features that are helpful for many various aspects to manage, monitor, and troubleshoot
    various scenarios for SQL Server. And since the core database engine is the same
    for SQL Server on Linux as Windows, most of these rich features work on Linux.


    Keeping with the theme of consistency, most of the tools I will cover in this
    section are available through the T-SQL language. The open nature of T-SQL provides
    a natural method to expose rich tool functionality from the SQL Server engine.


    #### **System Tables and Catalog Views**


    Within each database are a series of system tables that store metadata about the
    database and other objects such as tables, columns, indexes, and users, among
    others. Starting with SQL Server 2005, we decided to change direct access to system
    tables from users (even system administrators) to avoid any problems with users
    modifying'
