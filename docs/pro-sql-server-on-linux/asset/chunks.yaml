    ALTER TABLE [Application].[People] WITH CHECK ADD CONSTRAINT [FK_Application_People_Application_People]\
    \ FOREIGN KEY([LastEditedBy])\nREFERENCES [Application].[People] ([PersonID])\n\
    ```\n\nUnpacking this statement, the constraint ensures values in the `LastEditedBy`\
    \ column always reference a row in the `People` table from the `PersonID` column.\
    \ The `WITH CHECK` option at the beginning causes the statement to validate any\
    \ existing data in the table for the constraint.\n\nAnother type of constraint\
    \ can be a *default value* for a column if no value is specified when inserting\
    \ a new row. A default value can be any value declared so that when you insert\
    \ a row, if a value is not specified, the default one is used. Remember `PersonID`\
    \ is a primary key column, which means every value must be unique. The intention\
    \ of the `PersonID` is to be a key value that has no logical meaning but references\
    \ each row for a person. The `PersonID` will be the way to physically identify\
    \ each person in the `People` table without having to use a combination of columns\
    \ (like `FullName`+….).\n\nI can now use the sequence object I created in the\
    \ previous section to create a constraint that will increment to the next `SEQUENCE`\
    \ value for each row inserted into the `People` table for the `PersonID` column.\
