- fmt: '# Chapter 8 High Availability and Disaster Recovery for SQL Server


    ## 11. One Last Log Backup


    Simulating the backup on Tuesday at 12:00pm, using the following T-SQL statement
    found in the example script `backupwwilog3.sql`:


    ```

    USE WideWorldImporters

    GO

    BACKUP LOG WideWorldImporters TO DISK = ''/var/opt/mssql/data/wwi_log3.bak''

    WITH INIT, CHECKSUM

    GO

    ```


    ## 12. One Last Insert


    Now let’s do one last insert, which according to our timeline is before Tuesday
    at 1:00pm, using the following T-SQL statement found in the example script `insertluka.sql`:


    ```

    USE WideWorldImporters

    GO

    INSERT INTO letsgomavs VALUES (''Luka Doncic'', 77)

    GO

    ```


    ## 13. Database Unavailability and Tail-Log Backup


    Now let’s say at the simulated Tuesday 1:00pm time the database becomes unavailable,
    but you believe the disk holding the transaction log is intact. We definitely
    need these transactions to ensure the Dallas Mavericks NBA roster looks good (especially
    Luka, our #1 pick). The first step is to back up the current tail of the log using
    the following T-SQL statement, as found in the example script `backupwwitailoflog.sql`:


    ```

    USE master

    GO

    BACKUP LOG WideWorldImporters TO DISK = ''/var/opt/mssql/data/wwi_tailoflog.bak''

    WITH INIT, NO_TRUNCATE, CHECKSUM

    GO

    ```


    ## 14. Recovery Path


    You have several recovery paths at this point. We could recover our data from
    the initial backup to any point in time in the sequence of backups and transactions.
    I don’t want any data loss and I want to be up and running as fast as possible.
    Execute the following T-SQL statements as found in the example script `restorewwiall.sql`:


    ```

    USE master

    GO

    RESTORE DATABASE WideWorldImporters FROM DISK = ''/var/opt/mssql/data/wwi.bak''

    WITH REPLACE, NORECOVERY

    GO

    RESTORE DATABASE WideWorldImporters FROM DISK = ''/var/opt/mssql/data/wwi_diff1.bak''

    WITH NORECOVERY

    GO

    RESTORE LOG WideWorldImporters FROM DISK = ''/var/opt/mssql/data/wwi_log3.bak''

    WITH NORECOVERY

    GO

    RESTORE LOG WideWorldImporters FROM DISK = ''/var/opt/mssql/data/wwi_tailoflog.bak''

    WITH NORECOVERY

    GO

    RESTORE DATABASE WideWorldImporters WITH RECOVERY

    GO

    ```


    ## 15. Verification


    If all is successful, I expect my four players still to be in my database. Verify
    this by executing the following T-SQL statement `mavstothenbafinals.sql`:


    ```

    USE WideWorldImporters

    GO

    SELECT * FROM letsgomavs

    GO

    ```


    ![](index-413_1.jpg)


    The results should look like Figure 8-8.


    **Figure 8-8.** Recovering data using a series of backups in SQL Server


    That was a long sequence to go through, but it demonstrates how to use a series
    of backups to meet your RTO and RPO requirements. The one issue with the scheme
    I showed you is that the database is offline during the entire `RESTORE` sequence
    until the very last step (fast recovery doesn’t work with restore). There are
    other methods for you to restore in a more online fashion, as described in the
    next section.


    Another option for a restore sequence is a *point-in-time* restore. Point-in-time
    restores are available when using the `RESTORE LOG` T-SQL syntax. When you use
    a point-in-time restore, you specify with options `WITH STOPAT=<time>`, `RECOVERY`
    (since you will be recovering the database with this statement). You can restore
    an entire database and log backup sequence and then use a point-in-time restore
    as the final `RESTORE LOG` statement. Check out our documentation and examples
    for point-in-time restores at [https://docs.microsoft.com/sql/relational-databases/backup-restore/restore-a-sql-server-database-to-a-point-in-time-full-recovery-model](https://docs.microsoft.com/sql/relational-databases/backup-restore/restore-a-sql-server-database-to-a-point-in-time-full-recovery-model).'
