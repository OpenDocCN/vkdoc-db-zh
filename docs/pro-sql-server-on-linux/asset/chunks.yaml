  trans: "\n参与 AG*副本集*（一个参与 AG 的节点）。在 Linux 上，为确保数据保护和高可用性所需的最少副本数量为三：一个主副本、一个辅助副本和一个配置副本。\n\
    1.  跨这些 SQL Server 副本创建并配置 AG。\n2.  使用 Pacemaker 创建集群。\n3.  将 AG 作为资源添加到集群中。\n\
    \n根据您环境的副本架构，有几种选择。确保高可用性所需的最少副本数量是三个，但同样，其中一个是配置副本。\n\n让我们通过一个示例更详细地了解其工作原理和外观。我需要事先说明，完成此示例需要遵循许多步骤。\n\
    \n**注意** 为简化这些步骤，在本示例中请以 `sa` 或其他 `sysadmin` 登录身份连接并运行所有 `t-sql` 语句。您可以使用您喜欢的\
    \ `SQL Server` 工具来运行这些语句。我在 `linux` 服务器上使用了 `sqlcmd`。\n\n## 安装 Linux 和 SQL Server\n\
    1.  我在 Azure 上安装了三台 RHEL 7.5 的虚拟机：`bwsqllinuxag1`、`bwsqllinuxag2`和`sqllinuxcfgag`（为了节省成本，我将这台虚拟机配置为仅两个\
    \ CPU）。我将所有这些虚拟机都放在 Azure 资源组 `bwsqllinuxags` 中，因此它们自动属于同一个虚拟网络（`vnet`）。我将称每台服务器为*节点*和*副本*。`bwsqllinuxag1`\
    \ 是主副本，`bwsqllinuxag2` 是辅助副本，`sqllinuxcfgag` 是配置副本。\n    *   我在所有这些服务器上打开了 22\
    \ 端口，以便可以从我的笔记本电脑使用 `ssh` 客户端。\n    *   运行 `sudo yum -y update` 以将所有软件包更新至最新。\n\
    \    ![](img/index-433_1.png)\n    *   在每台服务器上配置 hosts 文件（注意：确保 Linux 服务器在 `/etc/hostname`\
    \ 中有一个有效的主机名，而不是 `localhost`），使其包含每台服务器的所有 IP 地址和主机名。对于我的 Azure 虚拟机，由于它们都在 Azure\
    \ 的同一个虚拟网络中，因此这是每台虚拟机的私有 IP。我的 `/etc/hosts` 文件在每台服务器上如图 8-12 所示。\n    ***图 8-12.**\
    \ `/etc/hosts` 文件示例*\n2.  安装 SQL Server。由于我的服务器使用的是 RHEL，我遵循了我在第 2 章中记录的步骤。您也可以在文档\
    \ [`docs.microsoft.com/sql/linux/quickstart-install-connect-red-hat`](https://docs.microsoft.com/sql/linux/quickstart-install-connect-red-hat)\
    \ 中找到这些说明。请确保安装 SQL Server，打开防火墙端口，并安装 Linux 的命令行工具。`bwsqllinuxag1` 和 `bwsqllinuxag2`\
    \ 都运行企业版，而 `sqllinuxcfgag` 使用的是 `SQL Express Edition`。\n\n## 跨这些 SQL Servers 副本创建并配置\
    \ AG\n**注意** 可以使用 `SQL Server Management Studio (ssMs)` 执行本节中的部分步骤。了解更多请访问 [`docs.microsoft.com/sql/linux/sql-server-linux-create-availability-group#create-the-availability-group`](https://docs.microsoft.com/sql/linux/sql-server-linux-create-availability-group#create-the-availability-group)。我将向您展示使用所有\
    \ bash shell 脚本和 `t-sql` 的完整步骤。\n1.  在每台节点上，使用以下从 bash shell 运行的命令为 Linux 上的 SQL\
    \ Server 启用 AG，如示例脚本 **enableag.sh** 所示（请记住，您必须先执行 `chmod u+x` 才能执行 `.sh` 脚本）：\n\
    \    ```\n    sudo /opt/mssql/bin/mssql-conf set hadr.hadrenabled 1\n    sudo\
    \ systemctl restart mssql-server\n    ```\n"
- fmt: "# High Availability and Disaster Recovery for SQL Server\n\n2. An extended\
    \ events session exists to track AG states. Start this session on each node using\
    \ the following T-SQL statement, as found in the example script `enableagxe.sql`:\n\
    \n```sql\nALTER EVENT SESSION AlwaysOn_health ON SERVER WITH (STARTUP_STATE=ON);\n\
    GO\n```\n\n3. Create login and users for the database mirroring endpoint **on\
    \ each replica** using the following T-SQL statements as found in `dbmloginuser.sql`:\n\
    \n```sql\nCREATE LOGIN dbm_login WITH PASSWORD = 'Sql2017isfast'\nGO\n\nCREATE\
    \ USER dbm_user FOR LOGIN dbm_login\nGO\n```\n\n4. In Chapter [7](#index_split_005.html#p338)\
    \ you learned about master keys and certificates in SQL Server and that knowledge\
    \ is about to pay off. As I said at the top of this section, AGs communicate over\
    \ *database mirroring endpoints*. Authentication over these endpoints is achieved\
    \ using certificates in SQL Server. So the first step is to create a certificate\
    \ on the **primary replica** (in my scenario that is `sqllinuxag1`) using the\
    \ following T-SQL statement, as found in the example script `primaryagcert.sql`\
    \ (substitute in your own password):\n\n```sql\nCREATE MASTER KEY ENCRYPTION BY\
    \ PASSWORD = 'Sql2017isfast'\nGO\n\nCREATE CERTIFICATE dbm_certificate WITH SUBJECT\
    \ = 'dbm'\nGO\n\nBACKUP CERTIFICATE dbm_certificate\nTO FILE = '/var/opt/mssql/data/dbm_certificate.cer'\n\
    WITH PRIVATE KEY (\n    FILE = '/var/opt/mssql/data/dbm_certificate.pvk',\n  \
    \  ENCRYPTION BY PASSWORD = 'Sql2017isfast'\n)\nGO\n```\n\n5. When this is successful,\
    \ it will not return any results. Now you have a certificate (`dbm_certificate.cer`)\
    \ file and a private key (`dbm_certificate.pvk`) file created on the primary node\
    \ replica. You will need to copy these files into the same locations (`/var/opt/mssql/data`)\
    \ on all nodes. Using the same certificate protected by the same key allows all\
    \ nodes to authenticate with each other over the communication endpoint. First,\
    \ you will copy the files into the home directory of the Linux user created for\
    \ the Azure VM like the following commands, as found in the example script `copycertkeys.sh`:\n\
    \n```bash\nsudo scp /var/opt/mssql/data/dbm_certificate.cer thewandog@bwsqllinuxag2:\n\
    sudo scp /var/opt/mssql/data/dbm_certificate.pvk thewandog@bwsqllinuxag2:\n```\n\
    \nYou will be prompted for passwords to copy these files. This example copies\
    \ the files from the primary replica to the secondary replica. **Do the same thing\
    \ but replace the target server with the name of the host for the configuration\
    \ replica**. Now these files should exist on the other replica nodes in the home\
    \ directory.\n\n6. These files need to now be moved to the `/var/opt/mssql/data`\
    \ directory on each replica node and have permissions changed to `mssql:mssql`\
    \ like the following shell script, as found in the example `movecertkeys.sh`.\
    \ **This script should be run from the bash shell on the secondary and configuration\
    \ replica nodes**.\n\n```bash\nsudo mv dbm_certificate.cer /var/opt/mssql/data\n\
    sudo chown mssql:mssql /var/opt/mssql/data/dbm_certificate.cer\nsudo mv dbm_certificate.pvk\
    \ /var/opt/mssql/data\nsudo chown mssql:mssql /var/opt/mssql/data/dbm_certificate.pvk\n\
    ```\n\n7. Now you will use the following T-SQL statements as found in `secondaryagcert.sql`\
    \ to create the keys and certificates on the **secondary** and **configuration**\
    \ nodes referencing these files copied to each node. Notice, for these statements\
    \ I create the certificate from the files copied from the primary replica but\
    \ use the `DECRYPTION` keyword to decrypt the certificate to be used by SQL Server.\n\
    \n```sql\nCREATE MASTER KEY ENCRYPTION BY PASSWORD = 'Sql2017isfast'\nGO\n\nCREATE\
    \ CERTIFICATE dbm_certificate\nAUTHORIZATION dbm_user\nFROM FILE = '/var/opt/mssql/data/dbm_certificate.cer'\n\
    WITH PRIVATE KEY (\n    FILE = '/var/opt/mssql/data/dbm_certificate.pvk',\n  \
