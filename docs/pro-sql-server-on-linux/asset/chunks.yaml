    ## SQL Server 证书


    加密层次结构的第三层是证书。证书将由数据库主密钥保护，并用于加密其他对象，如数据库加密密钥（用于 TDE）、备份以及其他用于加密列的密钥。您可以使用 SQL
    Server 创建自签名证书，或从受信任的机构加载证书。与我讨论过的其他对象一样，您应该备份所有创建的证书，因为您可能需要执行诸如还原加密备份之类的操作。您可以在
    [CREATE CERTIFICATE (Transact-SQL)](https://docs.microsoft.com/sql/t-sql/statements/create-certificate-transact-sql)
    阅读更多关于 SQL Server 证书的信息。


    > **注意**

    > SQL Server on Linux 目前不支持可扩展密钥管理 (eKM)。请务必关注 [SQL Server on Linux release notes
    - Unsupported features](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes#Unsupported)
    的发布说明，以获取有关不支持功能的任何更新。


    掌握了这些基础知识后，让我们来看看 SQL Server on Linux 可用的一些加密功能。


    ## 透明数据加密


    `TDE` 是 SQL Server 的一项功能，数据和事务日志文件在写入磁盘时会被加密。用于加密和解密这些文件的加密密钥（一个 `数据库加密密钥`）保存在
    master 数据库中。这使得数据库引擎能够完全访问磁盘上的加密数据，但引擎之外的任何程序或用户都将无法访问未加密的数据。


    ### 第 7 章 SQL Server 中的安全性


    这个功能真正出色的地方在于，所有关于证书和加密的功能都内置于 SQL Server 中。以下是使用 `TDE` 的基本步骤：


    1.  使用 `T-SQL` 在 master 数据库中创建一个数据库主密钥。

    2.  使用 `T-SQL` 创建一个受数据库主密钥保护的证书。

    3.  使用 `T-SQL` 为您要使用 `TDE` 的数据库创建一个受该证书保护的 `数据库加密密钥`。`数据库加密密钥` 是一种仅用于 `TDE` 的特殊密钥。您可以在
    [CREATE DATABASE ENCRYPTION KEY (Transact-SQL)](https://docs.microsoft.com/sql/t-sql/statements/create-database-encryption-key-transact-sql)
    阅读更多关于数据库加密密钥使用的信息。

    4.  使用 `ALTER DATABASE` 为数据库启用 `TDE`。


    然后，SQL Server 将在后台开始加密数据并写入磁盘。后续对磁盘的新写入在写入时即被加密。使用此功能的一个关键点是，您应该备份证书和密钥。如果您需要在另一台服务器上附加此数据库或还原备份，将需要这些内容。对于启用了
    `TDE` 的数据库，其任何备份也都是加密的。


    您可以在 [Enable Transparent Data Encryption](https://docs.microsoft.com/sql/linux/sql-server-linux-security-get-started#enable-transparent-data-encryption)
    阅读更多关于在 SQL Server on Linux 上设置 `TDE` 的信息。您也可以在 [Transparent Data Encryption (TDE)](https://docs.microsoft.com/sql/relational-databases/security/encryption/transparent-data-encryption)
    了解更多关于 `TDE` 的通用信息。

