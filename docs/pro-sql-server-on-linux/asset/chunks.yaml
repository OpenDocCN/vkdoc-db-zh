  trans: '# 第 11 章 SQL Server 与容器


    在文件解压的同时，`docker pull` 命令已经为我执行完毕，因此现在可以通过 MacOS 终端运行以下命令来启动容器：


    ```

    docker run -e ''ACCEPT_EULA=Y'' -e ''MSSQL_SA_PASSWORD=Sql2017isfast'' -p 1401:1433
    --name sql1 -d microsoft/mssql-server-linux:2017-latest

    ```


    ![](img/index-594_1.jpg)


    SQL Operations Studio 已经解压完成，因此可以如图 11-10 所示选择进行安装。


    **图 11-10.** 为 macOS 安装 SQL Operations Studio


    现在可以从 Launchpad 启动 SQL Operations Studio，连接到 `localhost` 的 `1401` 端口，并针对运行 SQL
    Server 的容器执行查询，如图 11-11 所示。


    ![](img/index-595_1.jpg)


    **图 11-11.** 在 macOS 中针对 SQL Server 容器运行查询


    就是这样。如果忽略掉我的所有解说，只按照步骤操作，并且网络连接尚可，你可以在五分钟之内完成所有这些。至此，你已正式完成了 SQL Mac 挑战。在本章结尾，让我们探讨一种使用名为
    Kubernetes 的环境在生产环境中运行 SQL Server 容器的独特方式。


    ## SQL Server 与 Kubernetes


    正如 Kubernetes 在其官网 `https://kubernetes.io` 所定义的，它是一个“用于自动化容器化应用的部署、扩缩和管理的开源系统”——也被称为容器编排器。简而言之，Kubernetes
    是一个用于部署和管理生产环境容器集的系统。在 Linux 服务器上运行多容器应用是一回事，但如果你需要部署数百个容器呢？如何以高效的方式部署和管理这些容器？此外，如何为
    SQL Server 容器建立一个 `HADR` 系统？Kubernetes 提供了所有这些功能。


    根据维基百科 (`https://en.wikipedia.org/wiki/Kubernetes`)，Kubernetes 由 Google 的工程师于
    2014 年创立。在希腊语中，Kubernetes 意为“舵手”或“船长”。我最初接触 Kubernetes 时，记得收到同事 Travis Wright
    的邮件中使用了缩写 `k8s` 来代表 Kubernetes。于是我查阅了一下，果然 `k8s` 是一个缩写，用来替代 Kubernetes 一词中“k”和“s”之间的
    8 个字母（参见 `https://kubernetes.io/docs/concepts/overview/what-is-kubernetes/#what-does-kubernetes-mean-k8s`）。因此，在本章的剩余部分，我自己也将使用
    `k8s` 来指代 Kubernetes。


    `k8s` 的一个美妙之处在于它现在可以在多种平台上运行：物理机、虚拟机以及云解决方案。例如，你可以在笔记本电脑上设置一个 `Minikube` (`https://kubernetes.io/docs/setup/minikube`)
    来了解 `k8s` 与 Docker 容器配合使用的基本原理。或者，你可以使用云解决方案，如 RedHat 的 `Openshift` (`https://www.openshift.com`)
    或 Microsoft Azure Kubernetes 服务 (`AKS`) `https://azure.microsoft.com/services/kubernetes-service/`。请浏览
    `k8s` 的完整已知解决方案列表：`https://kubernetes.io/docs/setup/pick-right-solution/`。你还应该收藏
    `k8s` 的主要文档页面 `https://kubernetes.io/docs/home` 以备将来参考。


    ### 基础知识


    关于 `k8s`，你可以学习许多方面，以便开发容器应用或操作整个 `k8s` 系统。对于 SQL Server 结合 `k8s` 的使用场景，我认为重要的是你'
- fmt: "# Chapter 11 SQL Server and ContainerS\n\nknow these following terms:\n\n\
    - Cluster\n  A k8s cluster is a deployment of containers through a set of nodes\
    \ and pods, which I define next.\n\n- Pod\n  A pod in k8s is a group of one or\
    \ more containers that can share storage, networking, and a specification on how\
    \ to run the containers.\n\n- Node\n  I love the definition of a node from the\
    \ k8s docs (at `https://kubernetes.io/docs/concepts/architecture/nodes/`). \"\
    A node is a worker machine in Kubernetes, previously known as minion. A node may\
    \ be a VM or physical machine.\" Effectively, think of nodes as a host for a set\
    \ of one or more pods.\n\n- Replica set\n  A replica set defines how many instances\
    \ of a specific pod should be running at any point time and helps define the high\
    \ availability of pods. Replica sets are important to allow Kubernetes to automatically\
    \ start new pods should a pod fail.\n\n- Deployment\n  A deployment is a declarative\
    \ method to define pods and replica sets. It is recommended to use deployments\
    \ to define the configuration of pods and replica sets for high availability.\
    \ This is the method we will use to show how to define and configure HADR for\
    \ SQL Server with k8s.\n\n- Persistent volume claim\n  K8s supports the concept\
    \ of storage that can be used by pods through a PersistentVolume. This storage\
    \ can be shared across pods (which lines up very well for a shared storage HADR\
    \ solution for SQL Server). A Persistent volume claim is a request by a user for\
    \ a PersistentVolume storage.\n\n- Service\n  A service is a logical set of pods\
    \ that can be abstracted. One type of service is a load balancer for connectivity.\
    \ You can specify an IP address for the load balancer service. Each pod has a\
    \ unique IP address, but a load balancer is a known IP address. Think of this\
    \ like the virtual IP address concept used by Failover Cluster Instance or the\
    \ listener for Availability Groups. It will provide SQL Server with an abstracted\
    \ IP address even when a k8s \"failover\" is executed.\n\nYou can read a more\
    \ complete description of k8s components and architecture at `https://kubernetes.io/docs/concepts/`.\
    \ With the knowledge of these terms, let’s see them all in action by deploying\
    \ an SQL Server container in k8s using AKS.\n\n## SQL Server HADR and Kubernetes\n\
    \nAs I’ve described the fundamentals of k8s, perhaps you can see that k8s provides\
    \ a platform that supports HADR for containers. SQL Server can take advantage\
    \ of this built-in HADR capability, provided you structure your deployment and\
    \ service in the correct way. In this section, I’ll first describe how HADR works\
    \ with k8s and then talk about a very nice tutorial you can use to walk through\
    \ the process of deploying SQL Server with k8s.\n\n## How HADR Works with k8s\n\
    \nI’ve described the fundamental terms of nodes, pods, and services. Let me use\
    \ some visualization to show how HADR work with pods, these concepts nodes, and\
    \ services.\n\nConfiguring SQL Server with pods and persistent volume claims is\
    \ a shared storage HADR solution and provides similar functionality to an Always\
    \ On Failover Cluster Instance.\n\nFirst, if k8s detects a pod has an issue or\
    \ fails, k8s will automatically create a new pod on the same node the pod currently\
    \ runs on, which will start up any containers in that pod. Furthermore, if the\
    \ pod is using a persistent volume claim, the container in the new pod will be\
    \ able to access the same data stored in that persistent volume. Also, if you\
    \ set up a load balancer service associated with the pod (which has a unique IP\
    \ address), users can connect to the load balancer service, which has a fixed\
    \ IP address, to avoid having to know the details of the pod IP address. Figures\
    \ 11-12 shows the concept of a Pod failure.\n\n![](index-599_1.png)\n\n![](index-599_2.png)\n\
    \nFigure 11-12. k8s HADR for a POD failure"
