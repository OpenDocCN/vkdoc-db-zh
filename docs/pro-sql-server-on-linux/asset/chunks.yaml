    \n此时，如果您像我一样，只想快速推进——构建数据库、应用程序和查询。我理解这一点，事实上，我们在 Linux 上构建 SQL Server 就是为了让您能够这样做。但本书旨在全面涵盖该主题，因此本章的其余部分提供了关于完整安装体验的详细信息。如果您计划开始使用\
    \ SQL Server，我建议您停下来浏览以下资源，以避免使用产品时遇到任何问题：\n\n[`docs.microsoft.com/sql/linux/sql-server-linux-release-notes`](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes)\
    \ 和 [`docs.microsoft.com/sql/linux/sql-server-linux-faq`](https://docs.microsoft.com/sql/linux/sql-server-linux-faq)。\n\
    \n如果您对每个步骤背后的更多细节感兴趣，请继续阅读。否则，请转到本章的下一节。\n\n### 下载仓库配置文件\n\n您只需在 Linux 服务器上下载一次仓库配置文件（除非您想更改要使用的仓库），即使您决定安装和卸载多次。\n\
    ```\nsudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo\n\
    ```\n\n`curl`，也称为 cURL（代表 Client URL Request Library），是一个使用 URL 语法获取或发送文件的命令。默认写入标准输出（stdout），因此\
    \ `-o` 参数后跟一个文件名。在本例中，SQL Server 遵循 `yum` 仓库约定，将文件放在 `/etc/yum/repos.d` 目录中。\n\
    \n仓库文件是一个简单的文本文件，如下所示（基于我们 packages.microsoft.com 服务器上的 `mssql-server-2017.repo`）：\n\
    ```\n[packages-microsoft-com-mssql-server-2017]\nname=packages-microsoft-com-mssql-server-2017\n\
    baseurl=https://packages.microsoft.com/rhel/7/mssql-server-2017/\nenabled=1\n\
    gpgcheck=1\ngpgkey=https://packages.microsoft.com/keys/microsoft.asc\n```\n\n\
    ![](img/index-60_1.png)\n\n## 第 2 章：安装与配置\n\n`mssql-server-2017.repo` 是 SQL Server\
    \ 2017 CU 仓库的配置文件。您可能想使用不同的仓库（例如用于预览构建或通用分发版 [GDR] 的仓库）。有关更多详情，请参阅本章中名为“安装其他版本”的部分。此仓库文件将控制包管理器用于下载和安装更新包的内容。\n\
    \n其概念是从应用程序供应商提供的位置下载仓库文件，这样当您运行安装时，`yum` 包管理器将使用该文件的内容来安装包（以及密钥）。因此，这个 URL（[`packages.microsoft.com/rhel/7/mssql-server-2017/`](https://packages.microsoft.com/rhel/7/mssql-server-2017/)）\n"
