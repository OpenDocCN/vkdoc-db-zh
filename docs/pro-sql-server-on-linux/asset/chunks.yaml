- fmt: '# Chapter 6 Performance Capabilities


    The Database Tuning Advisor tool: This tool seems forgotten in the SQL Server
    world but has the capability of recommending indexes based on an individual query
    or a `workload` based on a trace of SQL Server queries, data from the Query Store,
    or queries currently found in plan cache. The only downside of this tool for Linux
    users is that the tool is only available today to run on a computer running Windows.
    You can read more about the Database Tuning Advisor tool at [https://docs.microsoft.com/sql/relational-databases/performance/start-and-use-the-database-engine-tuning-advisor](https://docs.microsoft.com/sql/relational-databases/performance/start-and-use-the-database-engine-tuning-advisor).


    Let me show you an example of how to spot a missing index in a XML SHOWPLAN after
    executing a query using the `[Sales].[Orders]` table from the full WideWorldImporters
    sample. Execute the following T-SQL statement in SQL Operations Studio (this query
    can be found in the example script `orders_missing_index.sql`):


    ```sql

    USE [WideWorldImporters]

    GO

    SELECT CustomerID, COUNT(*)

    FROM [Sales].[Orders]

    WHERE [OrderDate] = ''2013-01-01''

    GROUP BY CustomerID

    GO

    ```


    ![](index-298_1.jpg)


    My goal for this query was to get a count of customer orders by customer on a
    given order date. The problem is there is no index on `OrderDate` to find a specific
    set of orders for a given date value. Therefore, SQL Server must scan the entire
    clustered index to filter out the rows for a specific date. Furthermore, SQL Server
    has to perform a sort to satisfy the aggregation for a `GROUP BY`.


    **Figure 6-13** shows the results of `SET STATISTICS IO`, because SQL Server must
    scan the entire clustered index.


    **Figure 6-13.** IO statistics to scan the clustered index of the Orders table


    If you click the results of the XML Showplan, you will see a section on Missing
    Indexes. **Figure 6-14** shows the Missing Indexes section of this plan.


    ![](index-299_1.jpg)


    **Figure 6-14.** The Missing Indexes section of an SQL Server XML SHOWPLAN


    The query optimizer in SQL Server when compiling the plan can detect a possible
    index that would help query performance (the query optimizer also is responsible
    for adding rows to the missing index DMVs). In this case, the recommendation is
    to create an index on the `OrderDate` columns but also including the `Customer
    ID` column.


    Therefore, you can now execute this T-SQL statement to create the nonclustered
    index (also found in the example `ncl_orders_date.sql`):


    ```sql

    USE [WideWorldImporters]

    GO

    DROP INDEX IF EXISTS Sales.Orders.NCL_Orders_Date

    GO

    CREATE NONCLUSTERED INDEX NCL_Orders_Date ON Sales.Orders (OrderDate)

    INCLUDE (CustomerID)

    GO

    ```


    If I now run the query from `orders_missing_index.sql` again, **Figure 6-15**
    shows the improvement in IO statistics with fewer physical reads.


    ![](index-300_1.jpg)


    ![](index-300_2.jpg)


    **Figure 6-15.** Improved IO statistics after adding an index


    **Figure 6-16** shows the new query plan if you select the `QUERY PLAN` option
    next to `RESULTS`.


    **Figure 6-16.** An Index Seek used in the query plan after adding an index


    An `Index Seek` is far more efficient in this case to find only the rows with
    the exact `OrderDate` requested vs. scanning the entire clustered index.


    ## Index Types and Other Considerations


    There are a few other index types that can be helpful for performance and consideration
    about parameters when creating indexes:


    - **Filtered indexes** allow you to create a nonclustered index using a `WHERE`
    clause to build the index with only a specific set of data.'
