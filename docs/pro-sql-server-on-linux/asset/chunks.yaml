  trans: "# 第三章 - 构建数据库与 T-SQL 基础\n\n创建架构的语法可以在示例脚本 `` createschemas.sql `` 中找到。\n\
    \n执行此脚本或以下 T-SQL 语句来创建所有架构：\n\n```sql\nUSE [WideWorldImporters]\nGO\n\nIF EXISTS\
    \ (select * from sys.schemas where name = 'Application')\nDROP SCHEMA [Application]\n\
    GO\n\nCREATE SCHEMA [Application]\nGO\n\nIF EXISTS (select * from sys.schemas\
    \ where name = 'Sales')\nDROP SCHEMA [Sales]\nGO\n\nCREATE SCHEMA [Sales]\nGO\n\
    \nIF EXISTS (select * from sys.schemas where name = 'Sequences')\nDROP SCHEMA\
    \ [Sequences]\nGO\n\nCREATE SCHEMA [Sequences]\nGO\n```\n\n## 创建序列\n\n序列对象提供了一种能力，可以在表中的数据每次需要时生成唯一的键值。SQL\
    \ Server 中另一个类似的功能称为标识列。序列对象独立于表创建，并且具有一些有益于性能的缓存特性。序列对象也用于其他数据库引擎，使它们成为一个很好的可移植特性。\n\
    \n虽然序列对象可以跨表共享，但我会为将要在此数据库中创建的两个表分别专用一个序列对象（一个用于 People 表，一个用于 Customers 表）。执行\
    \ `` createsequences.sql `` 示例脚本或以下 T-SQL 代码来创建序列对象：\n\n```sql\nUSE [WideWorldImporters]\n\
    GO\n\nDROP SEQUENCE IF EXISTS [Sequences].[PersonID]\nGO\n\nCREATE SEQUENCE [Sequences].[PersonID]\n\
    AS [int]\nSTART WITH 1\nINCREMENT BY 1\nMINVALUE 0\nMAXVALUE 2147483647\nCACHE\n\
    GO\n\nDROP SEQUENCE IF EXISTS [Sequences].[CustomerID]\nGO\n\nCREATE SEQUENCE\
    \ [Sequences].[CustomerID]\nAS [int]\nSTART WITH 0\nINCREMENT BY 1\nMINVALUE 0\n\
    MAXVALUE 2147483647\nCACHE\nGO\n```\n\n`[PersonID]` 的 `SEQUENCE` 对象定义表明从值 1 开始，并允许最大值为\
    \ `int` 数据类型的最大值。`CACHE` 关键字有助于提高 `SEQUENCE` 值的性能。你可以在我们的文档中阅读更多关于 `SEQUENCE`\
    \ 对象的信息：[`docs.microsoft.com/sql/t-sql/statements/create-sequence-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-sequence-transact-sql)。注意最小值是\
    \ 0，但序列从 1 开始。这使我能够为 PersonID 列使用值 0，而无需使用 `SEQUENCE` 对象。`[CustomerID]` 的定义从值\
    \ 0 开始。\n\n在创建表的语句中，我将向你展示序列对象如何在向这两个表中的任何一个插入行时用于提供唯一的键值。\n\n## 最终创建表\n\n现在我已经创建了架构和序列，我准备好创建我的两个表了。执行以下\
    \ T-SQL 语句或示例脚本 `` createpeople.sql `` 来创建 People 表：\n\n```sql\nUSE [WideWorldImporters]\n\
    GO\n\n-- [Application].[People] 表的表定义\n--\nDROP TABLE IF EXISTS [Application].[People]\n\
    GO\n\nCREATE TABLE [Application].People NOT NULL,\n    [PreferredName] nvarchar\
    \ NOT NULL,\n    --     [SearchName]  AS (concat([PreferredName],N' ',[FullName]))\
    \ PERSISTED NOT NULL,\n    [IsPermittedToLogon] [bit] NOT NULL,\n    [LogonName]\
    \ nvarchar NULL,\n    [IsExternalLogonProvider] [bit] NOT NULL,\n    [HashedPassword]\
    \ varbinary NULL,\n    [IsSystemUser] [bit] NOT NULL,\n    [IsEmployee] [bit]\
    \ NOT NULL,\n    [IsSalesperson] [bit] NOT NULL,\n    [UserPreferences] nvarchar\
    \ NULL,\n    [PhoneNumber] nvarchar NULL,\n    [FaxNumber] nvarchar NULL,\n  \
    \  [EmailAddress] nvarchar NULL,\n    [Photo] varbinary NULL,\n    [CustomFields]\
    \ nvarchar NULL,\n    --    [OtherLanguages]  AS (json_query([CustomFields],N'$.OtherLanguages')),\n\
    \    [LastEditedBy] [int] NOT NULL,\n    --    [ValidFrom] datetime2 GENERATED\
    \ ALWAYS AS ROW START NOT NULL,\n    --    [ValidTo] datetime2 GENERATED ALWAYS\
    \ AS ROW END NOT NULL\n    CONSTRAINT [PK_Application_People] PRIMARY KEY CLUSTERED\n\
    \    (\n        [PersonID] ASC\n    )\n)\nGO\n```"
- fmt: '# Chapter 3: Building a Database and T-SQL Fundamentals


    ```sql

    -- Foreign key for a column within the People table referenced to the primary
    key

    ALTER TABLE [Application].[People] WITH CHECK ADD CONSTRAINT [FK_Application_People_Application_People]
    FOREIGN KEY([LastEditedBy])

    REFERENCES [Application].[People] ([PersonID])

    ```


    ```sql

    GO

    ```


    ```sql

    -- The default value for PersonID is a SEQUENCE value

    ALTER TABLE [Application].[People] ADD CONSTRAINT [DF_Application_People_PersonID]
    DEFAULT (NEXT VALUE FOR [Sequences].[PersonID]) FOR [PersonID]

    ```


    ```sql

    GO

    ```


    I realize this is a lot to consume, so let’s unpack this. Look at the first column
    definition to understand how to read each column definition.


    `[PersonID] [int] NOT NULL`


    `PersonID` is the name of the column followed by the data type (integer) and then
    NULLability of the column (determines if the column can accept a NULL value or
    an explicit value required). The rest of the columns follow the same pattern with
    other data types and NULL designations.


    For a complete (beware: there are so many options this is a long read) reference
    to the `CREATE TABLE` T-SQL command, see the documentation at [https://docs.microsoft.com/sql/t-sql/statements/create-table-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/create-table-transact-sql).
    Some of these datatypes are interesting, including `bit` and the `nvarchar` and
    `varbinary (max)` column definitions. For a complete read on SQL Server data types,
    see our documentation at [https://docs.microsoft.com/sql/t-sql/data-types/data-types-transact-sql](https://docs.microsoft.com/sql/t-sql/data-types/data-types-transact-sql).


    There are four column definitions that do not appear very simple and are prefaced
    by the characters `--`. These characters are used for comments in any T-SQL code
    (You can also use `/* <T-SQL code> */`). I put comments here because in the next
    chapter I will uncomment these column definitions to show you other features and
    capabilities.


    One of the great features of tools like the mssql extension in Visual Studio Code
    (or other tools to be discussed in Chapter 5) is to use color coding to distinguish
    keywords vs identifiers and comments. Figure 3-6 shows an example of the T-SQL
    command to create the People table in Visual Studio Code using the mssql extension.


    ![](index-117_1.jpg)


    **Figure 3-6.** T-SQL syntax color coding with the mssql extension in Visual Studio
    Code


    Another aspect to this table definition is a concept called *constraints*. SQL
    Server provides the capability to declare various *integrity* checks when the
    table is defined (or altered) through a constraint.


    For the People table, I can add a primary key to enforce unique values for each
    row for a specific column(s) through a constraint. A primary key constraint is
    implemented via an index, which by default is a `clustered index`. A clustered
    index is implemented by storing the pages for the data for the table at the base
    level of the index sorted by the columns in the clustered index. In this example,
    each row must contain a unique `PersonID` value. We will use the sequence object
    created earlier to ensure each `PersonID` value is unique.


    In this example, the keyword `ASC` next to the `[PersonID]` column in the constraint
    definition indicates the clustered index will be sorted on the `PersonID` values
    in ascending key order.


    There is another method to define a primary key in line with the table definition.
    For the above example, you could have declared the `PersonID` column as:


    ```sql

    [PersonID] [int] NOT NULL PRIMARY KEY CLUSTERED

    ```


    Another type of constraint is a *foreign key constraint* to ensure referential
    integrity for relationships between tables or between columns within the same
    table. In the preceding example, the `LastEditedBy` column is the `PersonID` value
    of another row.'
