    用于监控操作系统与服务器健康状况的工具。


    在此我要停顿一下，做一个重要的说明，这对你来说可能显而易见，但坦率地说，却常常被许多人忽视。**为你的 SQL Server 建立一个性能基线至关重要**。你可以每天监控
    SQL Server，但除非你建立并保存了工作负载的基线以便对比，否则你无法判断看到的情况是否可能是问题，尤其是在性能方面。如果你不知道良好的性能是什么样的，你又如何知道自己遇到了性能问题呢？


    ## 监控 SQL Server 性能


    虽然 SQL Server 数据库平台内置了许多强大的功能来支持性能监控，但没有任何整体的监控解决方案能比我们专注于监控的合作伙伴提供的方案更优。你可以在
    [`docs.microsoft.com/sql/sql-server/partner-monitor-sql-server`](https://docs.microsoft.com/sql/sql-server/partner-monitor-sql-server)
    找到这些合作伙伴的完整列表。


    这些合作伙伴使用的许多功能和能力都建立在第五章介绍的大量工具之上，包括数据库引擎的内置功能。在本节中，我将回顾其中一些工具和功能，以及使用它们监控 SQL
    Server 性能的基本方法。


    ### 运行中或等待中


    我在本章前面提到了我的一位长期同事兼朋友，基思·埃尔莫尔。与罗伯特·多尔一样，我曾与基思在微软技术支持部门并肩工作多年，基思至今仍是我很好的朋友。每当涉及如何解决
    SQL Server 的性能问题时，我总是会想到基思（直到今天也是如此）。


    几年前，基思为技术支持部门构建了一些培训，他用于这些培训的理念简单而卓越。基思创造了一个术语，即 SQL Server 性能问题可以归类为*运行中*或*等待中*。


    第 9 章 管理与监控 SQL Server


    **运行中** 等同于 CPU 利用率。监控服务器上所有进程的 CPU 利用率非常重要，这有助于了解任何性能问题是否与 SQL Server 进程或其他进程有关。如果
    SQL Server 的 CPU 利用率看起来过高，以至于可能影响性能，那么你需要深入调查是哪些 T-SQL 查询在执行并消耗了最多的 CPU。如果没有查询消耗大量
    CPU，那么问题可能出在后台进程或自旋锁争用问题上（我在第六章讨论内存中 OLTP 时简要提到过自旋锁）。可以使用诸如 `dm_exec_query_stats`
    这样的 DMV 或查询存储来追踪那些可能导致高 CPU 消耗场景的查询。


    **等待中** 就 SQL Server 而言，指的是 SQL Server 用户任务可能正在等待特定的*等待类型*，即等待特定资源的情况。由于多个用户可能都在争夺相似的资源，一个等待场景可能涉及多个用户都在等待另一个正在等待资源的用户（就等待类型而言，这通常称为*阻塞链*）。我在第五章讨论
    DMV `dm_exec_requests`、`dm_os_waiting_tasks` 和 `dm_os_wait_stats` 时提到过等待类型的概念。


    掌握了这些知识，你不仅可以解决几乎任何 SQL Server 性能问题，还将知道如何通过监控 CPU 利用率以及跨用户和 SQL Server 实例的等待类型，来主动监控
    SQL Server 性能。


    ### 使用 DMV 监控性能


    遵循基思关注 CPU 利用率或等待场景的思路，你首先需要能够监控 Linux 服务器上所有进程（包括 `sqlservr`）的 CPU 利用率。请在本章后面的章节中查找用于监控所有进程
    CPU 的 Linux 工具和包。


    假设你关注的是 SQL Server 的 CPU 利用率，你可以使用 DMV `dm_exec_query_stats` 来找出基于缓存计划执行并使用了最高
    CPU 利用率的查询。此外，你可以使用 DMV `dm_exec_requests` 和 `dm_os_waiting_tasks` 来找出哪些任务正在等待其他任务或特定资源。DMV
    `dm_os_wait_stats` 则展示了整个 SQL Server 实例中等待资源最高的情况。我在第五章提供了如何使用每个这些 DMV 的示例。另外，不要忘记使用轻量级查询分析功能监控实时查询，包括
    DMV `dm_exec_query_profiles`。我在第五章提到过此功能，但这里有一个链接提醒你阅读更多关于实时监控查询的内容：[`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-profiles-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-profiles-transact-sql)。


    我期待着未来我们可以默认开启此功能，这样你就能一直看到实时的查询信息！


    你还需要从工作负载和吞吐量的角度监控 SQL Server 的整体性能。我在前面的章节中提到过可用于此目的的 DMV `dm_os_performance_counters`。此
    DMV 在 SQL Server 启动时初始化，然后在 SQL Server 引擎运行时保持更新。请记住，此 DMV 具有非常规范化的结构，其中行值描述要测量的特定计数器，而不是列名。


    以下 T-SQL 语句（在示例 `dm_os_performance_counters.sql` 中）返回 SQL Server 实例在任何时间点对象名为
    `SQLServer:SQL Statistics` 的所有计数器：


    ```

    SELECT * FROM sys.dm_os_performance_counters

    WHERE object_name = ''SQLServer:SQL Statistics''

    ORDER BY counter_name

    GO

    ```


    我们为 SQL Server 构建了性能计数器，以与 Windows 性能计数器系统集成（更多信息见 [`docs.microsoft.com/windows/desktop/perfctrs/performance-counters-reference`](https://docs.microsoft.com/windows/desktop/perfctrs/performance-counters-reference)）。查看这些计数器的常用方法是使用
    Windows 性能监视器工具（通常称为 `perfmon`）。由于 Windows 性能计数器系统在 Linux 操作系统上不起作用，因此你可以通过 `dm_os_performance_counters`
    DMV 查询 SQL Server 性能计数器。所有可能的 SQL Server 性能计数器的描述记录在我们的文档中：[`docs.microsoft.com/sql/relational-databases/performance-monitor/use-sql-server-objects`](https://docs.microsoft.com/sql/relational-databases/performance-monitor/use-sql-server-objects)。


    当你在 Windows 上使用 `perfmon` 工具查看 SQL Server 性能计数器时，计数器的速率会自动显示。例如，计数器名称 `Batch Requests/sec`
    是 SQL Server 工作负载吞吐量的速率。但该速率以累计值形式呈现。为了找出真实的速率，你必须使用 T-SQL 执行计算。请查看以下这篇优秀的博客文章，了解如何使用
    DMV 中的信息来理解如何执行正确的计算：

    '
- fmt: '

    [https://blogs.msdn.microsoft.com/psssql/2013/09/23/interpreting-the-counter-values-from-sys-dm_os_performance_counters](https://blogs.msdn.microsoft.com/psssql/2013/09/23/interpreting-the-counter-values-from-sys-dm_os_performance_counters)


    ## Chapter 9 Managing and Monitoring SQL Server


    In addition, you can look at 478 the example scripts from the Automatic Tuning
    example from Chapter 6 (found in the `auto_tune` directory) on how to generate
    a correct rate for `Batch Requests/sec`.


    There are 1600+ SQL Server performance counters to choose from. The following
    in Table 9-1 are the top five counter areas I recommend you always monitor (and
    then add from there other ones that suit your needs).


    ### Table 9-1. My top 5 SQL Server Performance Counters to Monitor


    | object\_name | counter\_name | description |

    | :--- | :--- | :--- |

    | `SQLServer:SQL Statistics` | `Batch requests/Sec` | rate of T-SQL batches executed
    on SQL Server |

    | `SQLServer:Memory Manager` | `total Server Memory (KB)` | the total amount of
    memory allocated by the SQL Server engine |

    | `SQLServer:Wait Statistics` | `all counters` | this allows you to track the
    major categories from `dm_os_wait_stats` |

    | `SQLServer:General Statistics` | `User Connections` | the current number of
    active users connected to SQL Server |

    | `SQLServer:SQL Errors` | `all counters` | i had to choose only 5, so why not
    monitor the total number of errors. a huge spike may indicate a severe SQL Server
    or application problem. |


    So how will you know what you are monitoring is good or bad? There could be some
    obvious signs. For example, if SQL Server is consuming 100% CPU constantly, that
    is usually not a good sign but maximizing your CPU resource is a goal. The only
    way to know for sure is to set a baseline based on DMV information by saving the
    DMV collection (even during testing) and then monitoring any major changes over
    time. Don’t forget to keep multiple baselines as you make changes to your database,
    application, or even updates to SQL Server.


    ## Using the Query Store to Monitor Performance


    As I mentioned in Chapter 5, if you enable `Query Store` you now have historical
    performance information for queries compiled and executed stored in your database.
    This will include information about total execution time, CPU time, and information
    about wait statistics.


    The largest benefit to `Query Store` is that you don’t have to *poll* DMVs and
    save their output, as `Query Store` information is persisted to your database
    (in fact the default is to keep 30 days of performance information). The drawback
    to `Query Store` is that the information is stored per database. If you have multiple
    databases on your SQL Server instance, you would have to consolidate this information
    to get an instance-wide view of performance of SQL Server.


