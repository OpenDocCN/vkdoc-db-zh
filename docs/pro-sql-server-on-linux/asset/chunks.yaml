    此外，使用`setup`选项运行`mssql-conf`会将`/var/opt/mssql`目录（及其子目录）的所有者更改为用户`mssql`和组`mssql`。这是此目录的默认位置和所有者，在
    Linux 上的 SQL Server 2017 中，你无法更改此设置。


    在“无人参与安装”部分，我将向你展示如何使用环境变量自动化这些步骤，以避免需要手动提供用户输入。


    ## 完整的安装体验


    我告诉过你 SQL Server 的安装很简单。本节涵盖与安装相关的主题，我相信你会发现这些主题对于提供完整的安装体验很有用。学习如何安装其他版本的 SQL
    Server、验证你的安装、执行无人参与和离线安装、在云端安装以及学习故障排除技巧。


    ### 安装其他版本


    SQL Server 2017 有两个主要的安装源仓库：


    - `mssql-server-2017`：基于 SQL Server 2017 的累积更新（CU）的最新发布版本。选择此项以使用 SQL Server 2017
    的最新更新。本章前面以及我们在官方 Microsoft 文档中的教程中展示的步骤都使用此仓库。

    - `mssql-server-2017-gdr`：SQL Server 2017 的常规分发版本（GDR）。如果你只想要 SQL Server 2017
    的安全性和关键更新，请选择此项。在 SQL Server 某个主要版本的生命周期内，此仓库的更新通常非常少。


    未来版本的 SQL Server 可能会有不同的仓库名称。


    **注意**，还有一个名为`mssql-server`的预览版仓库。如果你曾使用过此仓库，请务必在安装 SQL Server 之前移除 SQL Server
    并切换到已发布的仓库之一。


    通常每月，Microsoft 会发布一个名为累积更新（`CU`）的 SQL Server 2017 更新。这是产品的修复和增强功能的集合，它们从`CU1`开始连续编号。顾名思义，每个`CU`都包含前一个构建的更改。请参阅我们的发布说明以获取更多信息...'
- fmt: "a complete list of these builds: [https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes)\n\
    \n## Chapter 2   InStaLL anD ConfIguratIon\n\nWhenever a security problem or critical\
    \ issue needs to be addressed, Microsoft will publish a GDR build. This way if\
    \ you want to run SQL Server based on the release to manufacturing (RTM) build\
    \ AND security updates/critical fixes, you can choose the GDR repository to get\
    \ the latest build.\n\n**Note** prior to SQL Server 2017, Microsoft would publish\
    \ gDr, Cu, and Service pack releases. Starting with SQL Server 2017, Microsoft\
    \ will no longer publish Service pack releases.\n\nThe instructions to copy a\
    \ repository file earlier in this section use the CU repository. Once you copy\
    \ a repo file, any future install or update commands with your package manager\
    \ will use that repository. If you want to change what repository to use, you\
    \ must delete the previous repo file and copy down the new one.\n\nFor example,\
    \ if you had previously used the `mssql-server-2017.repo` file and wanted to uninstall\
    \ and install from the GDR repository, you would need to:\n\n1. Delete the previous\
    \ repo file like this\n\n   ```\n   sudo rm /etc/yum.repos.d/mssql-server.repo\n\
    \   ```\n\n2. Uninstall SQL Server\n\n3. Copy down the new repo like this (assumes\
    \ RHEL, but look at our install docs for how to do this for Ubuntu and SLES)\n\
    \n   ```\n   sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017-gdr.repo\n\
    \   ```\n\n4. Install SQL Server\n\nIn addition, by default, install and update\
    \ will use the latest build from these repositories. To install a specific package\
    \ version, you can perform an offline install of a version of the package or use\
    \ the following syntax with `yum`:\n\n```\nsudo yum install -y mssql-server:<package\
    \ version>\n```\n\nTo find all the package versions for SQL Server, run the following\
    \ command from the `bash` shell:\n\n```\nsudo yum list mssql-server --showduplicates\n\
    ```\n\n![](index-67_1.png)\n\n## Chapter 2   InStaLL anD ConfIguratIon\n\nAt minimum,\
    \ I recommend you use the latest builds from the GDR repository for any security\
    \ and critical updates. Most customers use the CU repository and do not experience\
    \ any major issues.\n\nThe Microsoft release notes page has a list of each update,\
    \ including a reference to a Microsoft support article that describes what changes\
    \ are in each update. You can read more at [https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes).\n\
    \n### Verifying Install\n\nOnce you have completed the installation of SQL Server,\
    \ I have recommendations to do some basic verification steps and others you can\
    \ do to ensure a smoother experience after installing SQL Server. Plus, you will\
    \ learn a few things about SQL Server along the way. I highly recommend you go\
    \ through at least the basic recommendations to avoid problems later.\n\n### Check\
    \ the mssql-server Service Is Running\n\nRun the following command to check the\
    \ `mssql-server` service status at any time:\n\n```\nsudo systemctl status mssql-server\n\
    ```\n\nThe output of this command should look something like Figure 2-7 if SQL\
    \ Server is running.\n\n**Figure 2-7. A running mssql-server service**\n\n![](index-68_1.png)\n\
    \n## Chapter 2   InStaLL anD ConfIguratIon\n\nIf you look at this output, you\
    \ see a Main PID (stands for process ID) and then two process IDs listed below\
    \ it.\n\nIf you recall, in Chapter 1, I mentioned that a parent “watchdog” process\
    \ exists when SQL Server is started. In the output you see from `systemctl`, the\
    \ top process, 2548, is the “watchdog” process and the second process, 2573, is\
    \ the actual `SQLSERVR` process running all the SQL Server engine code. You will\
    \ always see two `SQLSERVR` processes on Linux, so a command like\n\n```\nps axjf\
    \ | grep sqlservr\n```\n\nyields output that looks like Figure 2-8.\n\n**Figure\
    \ 2-8. Finding the processes of sqlservr**"
