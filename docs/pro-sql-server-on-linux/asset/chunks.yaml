    # Chapter 8 High Availability and Disaster Recovery for SQL Server


    The common terms in the industry related to these decisions are called `Recovery
    Time Objective` (`RTO`) and `Recovery Point Objective` (`RPO`). `RTO` is a targeted
    duration of time to restore an application after a disruptive event. `RPO` is
    the maximum amount of changes lost for a time interval the application can accept
    after a disruptive event. So, for example if your `RTO` is four hours and `RPO`
    is 15 minutes, you will need to ensure you create log backups every 15 minutes
    and devise a scheme where you can restore a database backup and a series of log
    backups in 4 hours.


    One interesting scenario I’ll discuss during the next section on restore is a
    Tail-Log Backup. You can read more information about Transaction Log Backups in
    our documentation at [https://docs.microsoft.com/sql/relational-databases/backup-restore/transaction-log-backups-sql-server](https://docs.microsoft.com/sql/relational-databases/backup-restore/transaction-log-backups-sql-server).


    ## Differential and Copy-Only Backup


    To help reduce the amount of full database or transaction log backups, SQL Server
    supports a `differential backup`. A `differential backup` is like a database backup,
    since it contains database pages, but it only contains pages that have changed
    since the last full database backup. This can greatly speed up the restore process,
    since you can restore a full backup, the last `differential backup`, and then
    any transaction log backups to completely restore a database. `Differential backups`
    are based on the most recent full backup, which is called the `base` of the `differential
    backup`.


    `Differential backups` are supported for all recovery models. I’ll discuss more
    about how to restore `differential backups` in the next major section of the chapter.
    You can read more about `differential backups` in our documentation at [https://docs.microsoft.com/sql/relational-databases/backup-restore/transaction-log-backups-sql-server](https://docs.microsoft.com/sql/relational-databases/backup-restore/transaction-log-backups-sql-server).


    A `copy-only backup` is a database or log backup that does not affect the sequence
    of backups, the log chain, or `differential base`. There could be situations where
    you want to create a database or log backup independent of a backup strategy already
    in place. Use the `WITH COPY_ONLY` option of the T-SQL `BACKUP` statement to create
    a `copy-only backup`. Read more about `copy-only backups` in our documentation
    at [https://docs.microsoft.com/sql/relational-databases/backup-restore/copy-only-backups-sql-server](https://docs.microsoft.com/sql/relational-databases/backup-restore/copy-only-backups-sql-server).


    ## Database Snapshots


    I had no great place in this book to add in the concept of a database snapshot,
    but adding it here with backups seems logical because it can be part of a high-availability
    solution. `Database snapshots` also can be used during `RESTORE`, so I’ll introduce
    the topic first here. `Database Snapshots` are a read-only, static view of a database
    at a point in time. They provide a great method to have a view of your data or
    revert from a mistake based on a'
