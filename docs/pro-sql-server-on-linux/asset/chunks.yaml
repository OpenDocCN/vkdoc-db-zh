    these specific blog posts:


    *   [Overview of using DEA](https://blogs.msdn.microsoft.com/datamigration/2017/03/24/dea-2-0-how-to-use-database-experimentation-assistant/)

    *   [The latest features of DEA 2.6](https://blogs.msdn.microsoft.com/datamigration/2018/08/06/release-database-experimentation-assistant-dea-v2-6/)

    *   [FAQ for Capture](https://blogs.msdn.microsoft.com/datamigration/2017/03/24/dea-2-0-capture-trace-faq/)

    *   [FAQ for Replay](https://blogs.msdn.microsoft.com/datamigration/2017/03/24/dea-2-0-replay-faq/)

    *   [FAQ for Analysis](https://blogs.msdn.microsoft.com/datamigration/2017/03/24/dea-2-0-analysis-faq)


    ## Executing the Migration


    Now that you have done preparation work for the migration, it is time to migrate
    your database(s) to `SQL Server on Linux`. You have the following options to perform
    a migration:


    *   Restore a database backup.

    *   Copy data with bulk copy or `SSIS` package.

    *   Export and Import with `BACPAC`.


    **Note** `SQL Server Management Studio` comes with a feature called `Copy Database`,
    which is not supported to copy from `SQL Server on Windows` to `SQL Server on
    Linux`.


    Let''s look at each option in more detail with examples.


    ### Chapter 10: Migrating to SQL Server on Linux


    #### Restore a Database Backup


    Restoring a backup from `SQL Server on Windows` is one of the beautiful stories
    of compatibility on `SQL Server on Linux`. You are allowed to restore a backup
    of `SQL Server`, all the way back to `SQL Server 2005`, to `SQL Server 2017 on
    Linux`. You can actually attach a database as well, following the process for
    attaching database as far back as `SQL Server 2005`.


    **Note** The "pain-free" upgrade path to restore a backup or attach a database
    can go as far back as `SQL Server 2008`. However, technically you can restore
    or attach an `SQL Server 2005` backup or database file but there are some limitations
    and possible issues you should consider. You can read more about this at [supported-version-and-edition-upgrades-2017#SupportFor2005](https://docs.microsoft.com/sql/database-engine/install-windows/supported-version-and-edition-upgrades-2017#SupportFor2005).


    I''ve shown you examples of how to restore a backup throughout the book, and you
    have seen the process is very simple.


    1.  Copy the backup file to the `SQL Server on Linux` sever or place on a mounted
    directory that can be accessed by the Linux Server.

    2.  Ensure the ownership of the file has the `mssql` group and `mssql` owner permissions.'
