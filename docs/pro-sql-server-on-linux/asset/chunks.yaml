  trans: "\n# Linux 上的 SQL Server\n\n## 安装与配置\n\n### 快速入门\n- 直接安装！\n- 60 秒内完成部署\n\
    - 下载仓库配置文件\n\n### 安装过程\n- 执行 SQL Server 引擎的安装\n- 完成 SQL Server 的设置\n- 完整的安装体验\n\
    \n### 高级安装主题\n- 安装其他版本\n- 验证安装\n- 无人参与安装\n- 离线安装\n- 安装其他软件包\n- 在 Azure 中安装\n-\
    \ 安装故障排除\n\n### 安装后探索\n- 探索 Linux 上的 SQL Server\n  - 已安装的内容\n  - 使用日志文件\n- 安装后配置\n\
    \  - 使用 `mssql-conf`\n  - SQL Server 实例配置\n  - Linux 上的 Windows 配置选项\n\n### 更新与卸载\n\
    - 更新与卸载\n  - 更新 SQL Server\n  - 回滚到之前的更新\n  - 移除 SQL Server\n\n### 总结\n- 总结\n\n\
    ## 第三章：构建数据库与 T-SQL 基础\n\n### 环境设置\n- 设置你的环境\n\n### 数据库创建\n- 创建数据库\n  - 系统数据库\n\
    - 创建登录名和用户\n- 创建用户数据库\n\n### 对象创建\n- 创建表\n- 创建架构\n- 创建序列\n- 最终创建表\n\n### 完整数据库构建\n\
    - 创建完整的数据库\n\n### 查询构建与运行\n- 构建并运行查询\n  - 插入和读取数据\n  - 更新和删除数据\n\n### 视图与存储过程\n\
    - 构建视图和存储过程\n\n### 总结\n- 总结\n\n## 第四章：构建应用程序与高级 T-SQL\n\n### 环境设置\n- 设置你的环境\n\n\
    ### 应用程序开发\n- 为 SQL Server 构建并运行数据应用程序\n  - 将 `node.js` 与 SQL Server 配合使用\n  -\
    \ 使用 `node.js` 连接到 SQL Server\n  - 插入和读取数据\n  - 执行存储过程\n"
