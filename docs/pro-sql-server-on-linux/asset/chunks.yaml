- fmt: '# Chapter 8 High Availability and Disaster Recovery for SQL Server


    The databases on a secondary replica, and even perform integrity checks like `DBCC
    CHECKDB`. Furthermore, you can configure client applications to be routed automatically
    to a readable secondary replica, thereby offloading workloads from the primary.


    **Note** readable secondaries are only available with SQL Server Enterprise Edition.
    The Standard Edition provides for basic availability groups but does not allow
    you to read from the secondary replica. You can read more about basic availability
    groups at [https://docs.microsoft.com/sql/database-engine/availability-groups/windows/basic-availability-groups-always-on-availability-groups](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/basic-availability-groups-always-on-availability-groups).


    The data available to read on the secondary replica is only based on committed
    transactions that have been hardened and redone in the secondary transaction log.
    Any data based on active transactions is not available. Furthermore, if there
    is latency in moving transactions to a secondary (which you may see more with
    asynchronous replicas), there could be a difference in data you are trying to
    read from the secondary replica.


    There are other considerations when using readable secondary replicas, including
    how statistics are handled, possible blocking situations, and overall consuming
    of resources on the SQL Server, which can affect secondary replication redo performance.
    I encourage you to read through these details at [https://docs.microsoft.com/sql/database-engine/availability-groups/windows/active-secondaries-readable-secondary-replicas-always-on-availability-groups#bkmk_Performance](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/active-secondaries-readable-secondary-replicas-always-on-availability-groups#bkmk_Performance).


    Last, since we have shipped SQL Server 2017 we have been able to pinpoint a few
    performance optimizations that can help with conflicts between parallel redo worker
    threads and readable secondary queries. Read more about this at [https://blogs.msdn.microsoft.com/sql_server_team/sql-server-20162017-availability-group-secondary-replica-redo-model-and-performance/](https://blogs.msdn.microsoft.com/sql_server_team/sql-server-20162017-availability-group-secondary-replica-redo-model-and-performance/)
    and be sure to keep up to date on the latest cumulative updates for further enhancements.


