    To understand how to read the mappings in the ERRORLOG for the “CPU


    Mask” to see which CPUs are mapped to specific NUMA nodes, see this blog post
    where


    I talk more about Auto Soft NUMA and how to interpret CPU mappings: [https://blogs.](https://blogs.msdn.microsoft.com/bobsql/2016/11/29/how-it-works-it-just-runs-faster-auto-soft-numa)


    [msdn.microsoft.com/bobsql/2016/11/29/how-it-works-it-just-runs-faster-auto- ](https://blogs.msdn.microsoft.com/bobsql/2016/11/29/how-it-works-it-just-runs-faster-auto-soft-numa)


