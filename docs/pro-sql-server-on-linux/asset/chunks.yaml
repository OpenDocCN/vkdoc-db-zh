- fmt: '# Chapter 9: Managing and Monitoring SQL Server


    ## Database States


    I’ve referenced a few times in the book the fact that a database can be `OFFLINE`
    or `ONLINE` and even a state called `SUSPECT`.


    The difference between the state of `SUSPECT` and one called `RECOVERY_PENDING`
    is important when evaluating why a database cannot be accessed. The state of a
    database can be found at any time by querying the `sys.databases.state_desc` column
    in the master database. A list of all possible states can be found in our documentation
    at [https://docs.microsoft.com/sql/relational-databases/system-catalog-views/sys-databases-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-catalog-views/sys-databases-transact-sql).


    ![](index-480_1.png)


    When a database is first started, either through SQL Server startup, a `RESTORE`,
    attach, or bringing it online via `ALTER DATABASE`, the state of the database
    is set to `ONLINE` if no issues occur. However, there can be some intermediate
    states to get `ONLINE`. Furthermore, some issues can cause the state of the database
    to go a different direction, not go `ONLINE`, and cause it to become inaccessible.


    Figure 9-3 shows a state diagram of these various states and actions that can
    cause a state to occur.


    ### Figure 9-3. States of a database in SQL Server


    Let me explain some of the states and flow to gain a better understanding of how
    you can act in scenarios where the state of the database does not go to `ONLINE`.


    *   Anytime the database is started, it always starts at the `RECOVERING` phase.

    *   If the files for the database cannot be opened (e.g., a permission problem
    or a file is missing), the state goes to `RECOVERY_PENDING`. You may be able to
    easily fix the problem by finding the right file or setting the correct permission.
    Using `ALTER DATABASE` to set the state to `ONLINE` will cause it to go back to
    `RECOVERING`. If recovery is successful, the state will go to `ONLINE`. Check
    the `ERRORLOG` for error messages that pinpoint the cause of the `RECOVERY_PENDING`
    state (which file and what operating system error).

    *   If recovery is not successful (for several different reasons), the state of
    the database will be set to `SUSPECT`. You can use a technique called emergency
    mode repair to potentially repair the database. I’ll describe that technique later
    in this section.


    **Note:** SQL Server has a really cool technique that can avoid a `SUSPECT` state
    should it find it encounter an error on a page during recovery (like a checksum
    failure, which I’ll describe more next). This is called deferred transactions,
    which you can read more about at [https://docs.microsoft.com/sql/relational-databases/backup-restore/deferred-transactions-sql-server](https://docs.microsoft.com/sql/relational-databases/backup-restore/deferred-transactions-sql-server).'
