    With the release of SQL Server on Linux, Microsoft launched a new strategy for
    tools


    used with SQL Server that is cross-platform (operating system) and produced through


    an open-source project. An example of one of these tools is **mssql-cli**. mssql-cli
    is a


    command line tool, like sqlcmd, to execute queries against SQL Server. mssql-cli
    is built


    using Python and is available on computers running Windows, Linux (including many


    distributions), and macOS operating systems.


