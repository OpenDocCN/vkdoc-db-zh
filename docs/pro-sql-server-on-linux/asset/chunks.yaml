    Linux 和 Windows 的应用程序。容器将软件与其周围环境隔离开来，例如开发与测试环境之间的差异，并有助于减少团队在同一基础设施上运行不同软件时的冲突。”*


    阅读之后，你可能会想：为什么我们不直接采用容器，而要基于 SQLPAL 架构呢？


    ## 为什么 SQL Server 要运行在 Linux 上？


    这主要有以下几个原因：


    *   Linux 上的 Docker 引擎仅支持包含 Linux 操作系统的镜像，因为请记住：容器需要与主机操作系统交互。因此，如果我们仅采用容器，将相当于回到起点，需要将所有代码移植到
    Linux 上。

    *   我们希望为 Linux 操作系统提供原生能力，以获得最佳性能。

    *   尽管我们希望通过 Docker 容器及其带来的新场景来全面支持 SQL Server，但我们并不希望依赖它来支持 Linux，尤其是如果容器存在某些在
