- fmt: 'system tables in the database. No longer do you need to `poll` DMVs and store
    them into your own tables. This performance telemetry is collected by the SQL
    Server engine itself when queries are compiled and executed.


    Like many features we build into SQL Server, you can use T-SQL queries to find
    out the details of performance data through a series of catalog views (you can
    find these at `https://docs.microsoft.com/sql/relational-databases/system-catalog-views/query-store-catalog-views-transact-sql`).
    Query store opens up all types of cool performance insights, and we have documented
    some of the key usage scenarios you can read at `https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store#Scenarios`.
    One of these scenarios is called a `query plan regression` (also known as `plan
    choice regressions`, which you can read more about at `https://docs.microsoft.com/sql/relational-databases/performance/query-store-usage-scenarios#pinpoint-and-fix-queries-with-plan-choice-regressions`).


    Imagine this scenario. You have a stored procedure that takes a single integer
    parameter. This integer parameter is used in the WHERE clause of a SELECT statement
    in the stored procedure. The first time the stored procedure is compiled, the
    plan for this procedure is inserted into cache based on the value of the parameter
    from the first execution of the procedure. And this plan may be a good plan for
    most users. Now for unexpected reasons, perhaps memory pressure, the plan is evicted
    from cache. Let’s say a user then executes the procedure through an application
    but this time with a different integer parameter value. This could result in a
    different query plan that leads to poor performance (for example, the new plan
    could involve an index scan that is not optimal for all executions). Compiling
    a plan for a stored procedure based on the parameter value is called `parameter
    sniffing`. This concept is discussed in our `Query Processing Architecture Guide`
    in the documentation (which in itself is a cool read at `https://docs.microsoft.com/sql/relational-databases/query-processing-architecture-guide`).
    Parameter sniffing is designed to be a good thing, but in some situations where
    the data in the table associated with the parameter is skewed, a performance problem
    could occur.


    So, in SQL Server 2016, you can use our reports in SQL Server Management Studio
    or run queries against Query Store catalog views to see whether a query plan regression
    has caused a performance problem. Now SQL Server 2017 comes along with some


