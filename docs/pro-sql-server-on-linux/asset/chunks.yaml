- fmt: 'posts about an undocumented `dBCC command` that allows for “bit fixing.”


    however, don’t rely on this. We don’t really test this (it could crash the server
    or cause irreparable damage), it requires tons of time to use, requires an extensive
    knowledge of the internal page structures of SQL Server (which we don’t document
    and have changed over time and will continue to change), and we may remove it
    at any time.


    ## Emergency Mode Repair


    Consider the database state in the preceding diagram (Figure 9-3) called SUSPECT.
    SQL Server has attempted to run recovery, but a failure has occurred that is not
    recoverable (e.g., the transaction log file is damaged). Prior to Paul coming
    to Microsoft, this was one of the uglier scenarios for me to help customers with.
    Paul invented in SQL Server 2005 a concept called `emergency mode repair`. The
    concept is to change the database state to EMEGENCY using `ALTER DATABASE <dbname>
    SET EMERGENCY`.


    This will give you access to the database to then run `DBCC CHECKDB` using the
    `REPAIR_ALLOW_DATA_LOSS` option. SQL Server will recognize the transaction log
    is not accessible and will `rebuild the transaction log` and run recovery. Paul
    describes the process in this blog post at https://www.sqlskills.com/blogs/paul/checkdb-from-every-angle-emergency-mode-repair-the-very-very-last-resort.


    It sounds pretty easy and simple, which it is. Here is the problem. Since the
    transaction log must be rebuilt, you have no idea what transactions were in the
    log that needed to be rolled forward or undone. So even though `DBCC CHECKDB`
    is `clean`, you could easily have logical inconsistency in your database (e.g.,
    imagine the accidental credit of 1 million dollars into a bank account, which
    may be there but you don’t know it!).


    This is why it is a last resort and definitely not a replacement for a restore
    of a good backup. Despite these warnings, I would find myself in Microsoft support
    using this technique frequently because these customers did not have a valid backup
    to restore.


    I have one other comment about the use of the `EMERGENCY` state of a database.
    While you can use the emergency mode repair option, I’ve seen other situations
    where setting the state of a database to `EMERGENCY` allowed me to access the
    database and copy out (for example with `bcp`) critical tables to a business.
    Keep this in mind as part of your toolkit for database salvage operations.


    ## RESTORE with CONTINUE_AFTER_ERROR


    I mentioned in Chapter 8 that a backup would fail to restore if it was created
    using the `WITH CHECKSUM` option and a checksum failure occurred on the backup
    media itself.


    In that magical supportability release of SQL Server 2005, we added an option
    to `RESTORE` called `CONTINUE_AFTER_ERROR`. In most cases, this option will allow
    the `RESTORE` to complete even if an error (like a checksum) occurs. At this point,
    it is completely a “toss of the coin” whether the database can be used or salvaged.
    However, it is possible only a small portion of the backup (even a single bit)
    media has a problem, so this option could help you recover much of your database.


