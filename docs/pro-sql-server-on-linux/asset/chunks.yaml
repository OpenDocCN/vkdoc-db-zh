    除 `tempdb` 外的系统数据库，可以像任何其他用户数据库一样进行备份。问题是，你应该备份系统数据库吗？答案是肯定的，但我建议你实际上只需要对系统数据库进行完整备份，而且可能不需要经常执行。例如，除非你更改了
    `model` 数据库，否则只需在安装后备份一次，之后可能就再也不需要备份它了。


    我将在下一节讨论一种在安装后重建系统数据库的方法，但恢复系统数据库备份要简单得多，并且它提供了一种恢复其中所做任何更改的方法。你可以在我们的文档中阅读更多关于系统数据库备份和恢复的信息：[`docs.microsoft.com/sql/relational-databases/backup-restore/back-up-and-restore-of-system-databases-sql-server`](https://docs.microsoft.com/sql/relational-databases/backup-restore/back-up-and-restore-of-system-databases-sql-server)。


    ![](img/index-401_1.jpg)


    ## 第 8 章：SQL Server 的高可用性与灾难恢复


    ### 数据库还原与恢复


    SQL Server 提供了多个选项来还原数据库备份、数据库差异备份序列和日志备份，以及还原部分数据库的其他方法，例如分段还原和页面还原。在本节中，我将回顾所有这些选项，以及有关系统数据库还原和恢复的信息。还原的一部分是运行数据库恢复，由于我在书中尚未讨论该主题，现在正是回顾数据库恢复如何工作以及它如何影响还原和数据库启动的好时机。作为参考，我们的文档中对所有恢复选项进行了很好的概述：[`docs.microsoft.com/sql/relational-databases/backup-restore/restore-and-recovery-overview-sql-server`](https://docs.microsoft.com/sql/relational-databases/backup-restore/restore-and-recovery-overview-sql-server)。


    ### 数据库恢复


    为了确保记录在事务日志中的事务与磁盘上的数据库页面保持一致，SQL Server 会在某些情况下对数据库运行恢复。我在书中之前讨论过预写日志 (`WAL`)
    的概念。由于这种持久化方法，在任何时间点，都可能存在已记录在事务日志中但尚未反映在磁盘数据库页面上的事务。此外，也可能存在尚未提交但已反映在磁盘数据库页面上的事务（例如，由于
    `Lazy Write`）。


    当 SQL Server 必须还原备份或使数据库联机时，它将检查事务日志，以确定是否需要协调日志与数据库页面之间这些可能的不一致。在这个过程中，事务日志是事实的来源。恢复过程按以下阶段完成，如图
    8-3 所述。


    **图 8-3. 数据库恢复阶段**


    #### 分析


    SQL Server 将查找自上次检查点以来可能已变脏的页面以及未提交事务的状态。SQL Server 使用此分析来正确执行恢复的其他阶段：重做和撤销。'
- fmt: '# Chapter 8 High Availability and Disaster Recovery for SQL Server


    `Redo`: Start at the oldest active transaction and redo any committed transactions
    in the transaction log that are not reflected on databases pages listed in the
    transactions (this is also called rolling forward transactions). SQL Server can
    perform this operation in parallel with multiple worker threads, which is an optimization
    we made in SQL Server 2016 to accelerate recovery performance.


    `Undo`: Start with the oldest active transactions in the log and make sure that
    any transactions that are not committed are not reflected in database pages listed
    in the transactions (this is also called rolling back).


    SQL Server understands how to compare a transaction in the transaction log and
    whether it is reflected on a database page by looking at something called a `log
    sequence number` (`LSN`). Each transaction is stamped with an `LSN`, and any database
    page that is modified has the `LSN` of the transaction that modified it. `LSN`
    values are incremented sequentially. Therefore, it is easy to compare an `LSN`
    in the log and a database page and know whether that change was applied or not.


    In some situations for Enterprise Edition, SQL Server can use `fast recovery`,
    where it can allow the database to become online after the redo phase as locks
    are obtained for undo operations. That situation does not apply to restore but
    for situations where the database is brought online, like crash recovery of SQL
    Server (after an unexpected shutdown).


    Understanding the concept of recovery is important for restore sequences to know
    when recovery is applied to transactions that are contained in database or log
    backups.


    ![](index-403_1.jpg)


    ## Restoring a Database


    Let’s start looking at restore with some basics of restoring a full database backup.
    Using the backup you created earlier in the chapter (`wwi.bak`), execute the following
    T-SQL statement as found in the example script `restorewwiheaderonly.sql`:


    ```

    RESTORE HEADERONLY FROM DISK = ''/var/opt/mssql/data/wwi.bak''

    GO

    ```


    This option for restore will examine the backup file (the MTF format) and return
    information that is contained in the metadata header of the backup file. This
    is helpful to find out information about what is contained in a backup (especially
    if you are not sure what is in the backup).


    Figur[e 8-4 sho](#index_split_005.html#p403)ws the results of this command.


    **Figure 8-4. `RESTORE HEADERONLY` in SQL Server**


    ![](index-404_1.jpg)


    One of the pieces of metadata in a database backup is the original file path of
    all the database and log files. When you restore a backup, SQL Server will attempt
    to create these files to build the database in the exact file path location when
    the database was backed up. This might create a problem for you if you are attempting
    to restore a backup where the original file paths don’t exist (and you cannot
    create them). Therefore, you will have to use syntax supported by the `RESTORE`
    T-SQL statement to move the database and/or log files. But how do you know what
    the files and original paths are to move? This is where the following very handy
    option for `RESTORE` exists, called `FILELISTONLY`. Execute the following T-SQL
    statement as found in the example `restorewwifilelistonly.sql`:


    ```

    RESTORE FILELISTONLY FROM DISK = ''/var/opt/mssql/data/wwi.bak''

    GO

    ```


    You results should look something like Figur[e 8-5.](#index_split_005.html#p404)


    **Figure 8-5. `RESTORE FILELISTONLY` in SQL Server**


    You can see from the results the logical names of the files and the physical file
    paths. So, let’s say you wanted to restore this backup, but instead of putting
    the database in their original file paths you needed them to be created in a different
    directory.


    ![](index-405_1.jpg)'
