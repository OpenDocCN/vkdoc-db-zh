    ### Using Extended Events for Performance


    Having the `Query Store` for automatic history of performance is a great asset
    to your monitoring toolkit. Once you start monitoring with `DMV`s or the `Query
    Store`, it could be possible that you need to track the exact execution of specific
    queries and other information like the execution plan of the query. Remember,
    the `DMV`s and the `Query Store` will not track the actual execution plan of a
    query. And `Query Store` aggregates execution information about queries and plans
    rather than tracking each execution.


    Lightweight Query Profiling could really be a benefit for these situations to
    get the actual execution plan of specific running queries. However, there may
    be situations where you need to *trace* query execution and possibly other key
    events related to performance as you monitor SQL Server. There is where `Extended
    Events` comes into play as a great technology for detailed tracing. I discussed
    many aspects of `Extended Events` in Chapter 5, including examples of how to find
    all the possible events to trace.


    Want a way to get started quickly with `Extended Events`? Use the `XEProfiler`
    that comes built into `SSMS`. You can read more about using `XEProfiler` at [https://docs.microsoft.com/sql/relational-databases/extended-events/use-the-ssms-xe-profiler](https://docs.microsoft.com/sql/relational-databases/extended-events/use-the-ssms-xe-profiler).


    ![](index-501_1.jpg)


    Chapter 9 Managing and Monitoring SQL Server


    `XE Profiler` creates `Extended Event` sessions called `QuickSessionStandard`
    and `QuickSessionTSQL`. Use these as a base to create your own sessions that have
    other events you want to trace. You can use `SSMS` to right-click one of these
    sessions and script out the definition of it to create your own. Figure 9-5 shows
    an example of how to do this.


    **Figure 9-5. Scripting the `QuickSessionTSQL` `Extended Events` session**


    Notice in this figure a session called `Profiler`. That session is similar to
    the functionality of `XEProfiler` and comes from a new extension to `SQL Operations
    Studio` called `SQL Server Profiler` (not to be confused with the actual tool
    called `SQL Server Profiler`). You can read more about this extension at [https://docs.microsoft.com/sql/sql-operations-studio/sql-server-profiler-extension](https://docs.microsoft.com/sql/sql-operations-studio/sql-server-profiler-extension).
    Figure 9-6 shows an example of this extension in action against an SQL Server
    instance on Linux.


    ![](index-502_1.jpg)


    Chapter 9 Managing and Monitoring SQL Server


    **Figure 9-6. The `SQL Server Profiler` extension of `SQL Operations Studio`**


    I like to think of tools like `XEProfiler` and `SQL Server Profiler` for `SQL
    Operations Studio` as a quick live look at SQL Server at any point in time. These
    sessions will not be expensive and could give you a quick look at SQL Server.
    For example, let’s say you hear the application that uses SQL Server is down and
    everyone is pointing the finger at SQL Server. These tools could quickly tell
    you whether the application is sending queries to SQL Server and are they executing
    within a reasonable timeframe. If no queries are coming to SQL Server, then the
    problem could be networking or an application issue.


    But `Extended Events` can also be used as a detailed tracing mechanism to supplement
    your monitoring needs, especially if you detect a possible problem. Let me'
