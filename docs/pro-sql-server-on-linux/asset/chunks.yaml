    ## 12. Setup the availability groups on the secondary and configuration replica
    by running the following T-SQL statements, as found in `joinag.sql` on both the
    secondary and configuration replicas:


    Note: the grant statement is not allowed on the configuration replica, so only
    run the `alter availability group` statement on a configuration replica.


    ```

    ALTER AVAILABILITY GROUP [footballag] JOIN WITH (CLUSTER_TYPE = EXTERNAL)

    GO

    -- Do not run this statement on the configuration replica

    ALTER AVAILABILITY GROUP [footballag] GRANT CREATE ANY DATABASE

    GO

    ```


    When these statements are executed, the primary, secondary, and configuration
    replica are “connected.” You will see these statements in the ERRORLOG on the
    primary replica:


    ```

    A connection for availability group ''footballag'' from availability replica ''bwsqllinuxag1''
    with id  [B8438077-BA82-4AD1-A5B6-6601ECA82C9E] to ''bwsqllinuxag2'' with id [D36B7503-2EFB-467C-AD8A-4CE2B9E63958]
    has been successfully established.  This is an informational message only. No
    user action is required.

    ```


    ```

    A connection for availability group ''footballag'' from availability replica ''bwsqllinuxag1''
    with id  [B8438077-BA82-4AD1-A5B6-6601ECA82C9E] to ''sqllinuxcfgag'' with id [AC5F02C0-A481-4760-BA44-BF7E9FF83F9D]
    has been successfully established.  This is an informational message only. No
    user action is required.

    ```


    ## 13. You are almost there! Remember the definition of an availability group
    is one or more databases that are replicated to another node and a unit of failover.
    So far, all that has been created is three SQL Server instances that know how
    to communicate with each other. So the first step is to choose a database(s) for
    the AG and create a full database backup. Run the following T-SQL statements connected
    to the primary replica, as found in the example `dbag.sql`:


    ```

    CREATE DATABASE [cowboysrule]

    GO

    ALTER DATABASE [cowboysrule] SET RECOVERY FULL

    GO

    BACKUP DATABASE [cowboysrule] TO DISK = N''/var/opt/mssql/data/cowboysrule.bak''

    GO

    ```


    ## 14. Now add the database to the availability group by running the following
    T-SQL statement on the primary replica, as found in the example script `dbjoinag.sql`:


    ```

    ALTER AVAILABILITY GROUP [footballag] ADD DATABASE [cowboysrule]

    GO

    ```


    ## 15. Because we created the availability group with an option called `SEEDING_MODE
    = AUTOMATIC`, SQL Server will automatically create the new database and copy over
    any data to secondary replicas. You can see this by running the following T-SQL
    statement on the secondary replica, as found in the example script `listdbs.sql`:


    ```

    SELECT name FROM sys.databases

    GO

    ```


    If all works well, `cowboysrule` will show up in this list. And because we used
    the option `SECONDARY_ROLE` previously when creating the availability group, we
    can even read from the `cowboysrule` database on the secondary replica.


    Congratulations! You have just created and set up an Always On Availability Group
    for SQL Server on Linux. There is only one thing left to show you. How does a
    failover work in this situation? If you dare, go to the next sections to set up
    a Pacemaker cluster and add the AG to the cluster.


    ## Create the Cluster Using Pacemaker


    Note: to go further with this example you must have a subscription with Red Hat,
    because the high availability add-on is required to allow Pacemaker to work in
    production.


    Follow along with the steps I’ll show to create a Pacemaker cluster for RHEL in
    our documentation at [https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-cluster-rhel](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-cluster-rhel).'
