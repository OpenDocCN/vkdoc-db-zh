    get


    a bash shell (or a powerShell) so tools like sqlcmd and the nano editor are installed


    by default. it is incredibly cool! You can read more about the azure CloudShell
    at


    [https://azure.microsoft.com/en-us/features/cloud-shell/.](https://azure.microsoft.com/en-us/features/cloud-shell/)


    •  The prerequisites in the tutorial point to this documentation page


    to first create an AKS cluster[: http://docs.microsoft.com/azure/](http://docs.microsoft.com/azure/aks/tutorial-kubernetes-deploy-cluster)


    [aks/tutorial-kubernetes-deploy-cluster. I j](http://docs.microsoft.com/azure/aks/tutorial-kubernetes-deploy-cluster)ust
    used the portal to create a Kubernetes Service and used most of the defaults to
    create


    my cluster. However, I had to connect to the AKS cluster I created


    first, using the following steps in this part of the documentation:


    [https://docs.microsoft.com/azure/aks/tutorial-kubernetes-](https://docs.microsoft.com/azure/aks/tutorial-kubernetes-deploy-cluster#connect-to-cluster-using-kubectl)


    Chapter 11   SQL Server and ContainerS


    [deploy-cluster#connect-to-cluster-using-kubectl. M](https://docs.microsoft.com/azure/aks/tutorial-kubernetes-deploy-cluster#connect-to-cluster-using-kubectl)y
    Kubernetes service (aka my k8s cluster) is called **bwsqlk8s** in the


    resource group **bwk8s**. So I used the following command from the


