- fmt: 'When you install SSIS on Linux, we do not create a systemd service. Rather,
    a Linux program called `dtexec` is installed in the `/opt/ssis` directory. `dtexec`
    is the program used to execute SSIS packages on a Linux server. Like SQL Server,
    `dtexec` uses the SQLPAL architecture to allow the same code that runs SSIS on
    Windows to run on Linux.


    ## Creating a Package


    SSIS on Linux requires a package to execute an ETL scenario. Packages are created
    and saved into a file format that is based on XML, called the Data Transformation
    Services Package (`DTSX`) file format. The complete format is documented at [https://msdn.microsoft.com/library/gg587140.aspx](https://msdn.microsoft.com/library/gg587140.aspx).


    Creating a package by editing a `DTSX` formatted file directly is complex. Therefore,
    there are methods to create SSIS packages with a tool using SQL Server Data Tools
    (`SSDT`) on Windows or developing a program using the .Net package `Microsoft.SqlServer.Dts.Runtime`.
    For more information about building programs to create and run packages, see our
    documentation at [https://docs.microsoft.com/sql/integration-services/integration-services-programming-overview](https://docs.microsoft.com/sql/integration-services/integration-services-programming-overview).


    ## SQL Server Data Tools


    `SSDT` works within the Visual Studio IDE development experience. `SSDT` installs
    within an existing Visual Studio installation. If you don’t have Visual Studio,
    when you install `SSDT` a minimal version of the Visual Studio environment is
    installed. Therefore, `SSDT` is completely free to use to create SSIS packages
    on a Windows computer. You can find the complete instructions to download and
    install `SSDT` in our documentation at [https://docs.microsoft.com/sql/ssdt/download-sql-server-data-tools-ssdt](https://docs.microsoft.com/sql/ssdt/download-sql-server-data-tools-ssdt).


    ![](index-241_1.jpg)


    ## Building the Package


    `SSDT` comes with a project type called an Integration Services project. When
    you create a new Integration Services project, you are presented with a visual
    designer to build a package. Figure 5-43 shows an example of the Package Designer
    in a new Integration Services Project.


    ***Figure 5-43.** The Package Designer with an Integrated Services project in
    `SSDT`*


    SSIS Packages have many options and features to connect to data sources to extract
    and load data. In addition, packages can contain a wide variety of data flow tasks
    that allow for rich transformations.


    I’ll create a simple example to show how to build a package and execute it on
    the Linux Server using `dtexec`. In this example, I’m going to build a package
    that will extract all data from the `People` table from the `WideWorldImporters`
    example I showed you in Chapter 3 and write out the data to a text file on the
    Linux Server.


    ![](index-242_1.jpg)


    Using `SSDT`, I created a new Project called an Integration Services project (I
    selected Project from the New Menu of the tool and found this project type under
    Installed/Business Intelligence). Figure 5-44 shows the interface to start a new
    Integration Services project.


    ***Figure 5-44.** A new Integration Services project in `SSDT`*


    After selecting this project type, I’m presented with the Package Designer screen
    as shown in Figure 5-43. To perform the simple example of extracting data and
    writing this data to a file, the first step on the main Package Designer screen
    is to create a new Data Flow task. I can do this by selecting the Data Flow Task
    in the SSIS toolbar on the left-hand side of the Designer and dragging and dropping
    the icon into the main designer.'
