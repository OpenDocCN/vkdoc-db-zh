- fmt: '

    (Note: We carried on this tradition for many years dating from the mid-1990s all
    the way to the present day. As the three of us are on different teams, this now
    happens far less often.)


    One of those days, Robert Dorr was talking to us about another customer incident
    where SQL Server appeared to be hung. He said, “there has to be a better way to
    figure these out.” And indeed this discussion led to supportability improvements
    for errors in the ERRORLOG when these conditions can occur (see this older blog
    post by Robert at [https://blogs.msdn.microsoft.com/psssql/2008/03/28/how-it-works-non-yielding-resource-monitor/](https://blogs.msdn.microsoft.com/psssql/2008/03/28/how-it-works-non-yielding-resource-monitor/)).


    As part of this conversation, we all three agreed that if the SQL Server engine
    cannot accept new logins or queries, why can’t we have a special *dedicated* connection
    to SQL Server that has limited capabilities but can be used to connect to SQL
    Server to investigate and possibly even fix a SQL Server hang. Thus was born a
    feature in SQL Server 2005 called Dedicated Admin Connection (DAC).


    # Managing and Monitoring SQL Server


    ## Dedicated Admin Connection (DAC)


    DAC is supported by a separate TCP port (`1434`) for SQL Server and operates on
    a different SQLOS scheduler. Therefore, if SQL Server cannot respond to new requests
    due to a scheduler or standard port issue, it may be possible to connect with
    DAC, and at minimum run queries against DMVs to find out a possible cause of the
    problem before you need to restart SQL Server. In addition, it may even be possible
    to find the cause and free up the problem without having to restart. I’ll talk
    about an example shortly.


    First, let’s see how to connect with DAC. Run the following command with `sqlcmd`
    from the bash shell on the Linux Server:


    ```

    sqlcmd -Usa -Sadmin:localhost

    ```


    Notice the syntax for the Servername uses the prefix `admin`.


    **Note** `sqlcmd` on Windows supports the `-a` option, which forces the use of
    DAC but that is not supported on Linux. However, you can use the `admin:` prefix
    on any SQL Server tool, including `sqlcmd`, SQL Operations Studio, and SSMS.


    You are now presented with the `sqlcmd` editor, but how do you know if this worked
    and you connected with DAC?


    Run the following T-SQL statements as found in the example script `amidac.sql`:


    ```sql

    -- What is my session id?

    SELECT @@spid

    go


    -- List out the current connections, their endpoint, and port

    SELECT dec.session_id, e.name, dec.local_tcp_port

    FROM sys.dm_exec_connections dec

    JOIN sys.endpoints e

    ON e.endpoint_id = dec.endpoint_id

    GO

    ```


    I ran this script with the following command from the bash shell:


    ```

    sqlcmd -Usa -Sadmin:localhost -iamidac.sql

    ```


    The results should look similar to the following:


    ```

    (1 rows affected)

    session_id  name                              local_tcp_port

    ----------- -------------------------------- --------------

    51          Dedicated Admin Connection        1434


    (1 rows affected)

    ```


    Notice the nifty server variable `@@SPID` to find out your current session id.
    Then you can find your session in the list of connections (in this example it
    is the only connection). I introduced you to the concept of an endpoint with Always
    On Availability Groups. DAC has its own endpoint automatically created, typically
    hosted on port `1434`. You can see this session is using that port.


    There is only one active DAC connection allowed at a time (hence the term Dedicated).
    And you can connect with DAC remotely. I personally believe if you feel the need
    to use DAC you should use it locally with an `ssh` session. I say this because
    if there are remote connectivity issues to your Linux Server, you won’t know if
    the SQL Server connectivity problem is a result of a connectivity issue over the
    network or with the server itself (and if you can’t get an `ssh` session, there
    is likely a larger problem than SQL Server).


    Here is another rarely known secret about DAC. I mentioned in a previous chapter...

