    [`aka.ms/sqlblog`](http://aka.ms/sqlblog)，或在`http://aka.ms/sqlchannel`观看他的演示。


    xv


    ![](img/index-15_1.jpg)


    ## 关于技术审校者


    **Anthony Nocentino** 是 Centino 系统的创始人兼总裁，同时是一位 Pluralsight 作者、微软数据平台 MVP 以及 SQL
    Server 和 Linux 专家。在他的咨询实践中，Anthony 负责设计解决方案、部署技术，并提供有关系统性能、架构和安全性的专业知识。Anthony
    拥有计算机科学学士和硕士学位，其研究涉及机器虚拟化、高性能/低延迟数据访问算法以及空间数据库系统，并发表过相关论文。你可以在 Twitter 上通过`@nocentino`找到他，他的博客位于：`www.centinosystems.com/blog/`。


    xvii


    ## 致谢


    在我撰写本书的旅程中，有太多需要感谢的人。首先，我要将感谢与荣耀归于我的主和救主耶稣基督。我的信仰是我生命的基石，我坚信上帝赋予了我们所有人能力。其次，我必须感谢我非凡的妻子
    Ginger Ward，她在我的整个写作过程中表现出极大的耐心和鼓励。她倾听我所有的抱怨、恐惧和喜悦，并容忍我为撰写本书而熬过的每一个深夜。在我们一起的旅行中，她在她的路虎揽胜副驾驶座上让我完成书稿的各个部分，自己则在长途驾驶中承担了许多。我还要感谢我的两个儿子
    Troy 和 Ryan Ward，他们每天激励我成为一个有信念、负责任、正直的丈夫、父亲和男人。


    如果没有 Apress 的 Jonathan Gennick，我根本不可能完成这本书。Jonathan，感谢你当时在没有任何其他出版商愿意接受的情况下，对本书和我给予了机会。说到让这本书成为可能的人，我必须提到我的技术审校者
    Anthony Nocentino 所做的出色工作。Anthony 带来了丰富的 Linux 和 SQL Server 知识，没有这些，这本书可能远非最终版本。Anthony
    在审校过程中周转迅速，即使在我们面临紧迫的截稿期限时也是如此。我最喜欢 Anthony 作为审校者的风格是，他不仅透明地指出他喜欢书中哪些部分，也同样坦诚、真实地提出他认为需要修改的地方。Anthony，感谢你在这整个旅程中给予我的鼓励。我还要亲自感谢
    Apress 的 Jill Balzano，在本书写作期间，她帮助我保持清醒和条理，协调我的写作与 Anthony 和 Jonnathan 的审校工作。Jill
    不仅友善，而且是一位出色的专业人士！


    我还要感谢微软的几位人士，他们帮助审阅了本书的部分内容，并非常友善和专业地回答了我的问题，包括 Slava Oks、Robert Dorr、Scott Konersmann、Pradeep
    M M、Jason Roth、Travis Wright、Prasad Tammana、Mihaela Blendea、Vin Yu、Rathijit Sen、Brian
    Gianforcaro、Jamie Reding、Patrick Kilfoyle、Mitchell Sternke、Dylan Gray、Suresh Kandoth、Parikshit
    Savjani、Pedro Lopes、Sourabh Agarwal、Sunil Agarwal、Brooks Remy、Arnav Singh、Denzil
    Ribero、Tejas Shah、Michal Primke 和 Harini Gupta。


