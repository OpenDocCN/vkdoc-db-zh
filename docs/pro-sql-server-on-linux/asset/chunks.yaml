    ## dm_os_wait_stats


    Another one of the most commonly used DMVs. This DMV records statistics about
    resource waits by type since SQL Server has started (or since the DMV stats have
    been cleared). Here is an example from the sample script `dm_os_wait_stats.sql`
    to show the average wait duration by `wait_type` for only wait types that have
    had any waits.


    ```sql

    -- Show the number of waits by type and the avg wait time of that type sorted
    by the highest avg wait types

    -- Note that some waits are "normal" because they are part of background tasks
    that naturally waits as part of its execution

    SELECT wait_type, waiting_tasks_count, (wait_time_ms/waiting_tasks_count) as avg_wait_time_ms

    FROM sys.dm_os_wait_stats

    WHERE waiting_tasks_count > 0

    ORDER BY avg_wait_time_ms DESC

    GO

    ```


    ![](index-210_1.jpg)


    ## ChapTer 5   SQL Server TooLS


    You can find the documentation for `sys.dm_os_wait_stats` at [https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-wait-stats-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-wait-stats-transact-sql).


    ## dm_io_virtual_file_stats


    This DMF is extremely helpful to gain insight into which database and files are
    seeing the most I/O and what type of average disk latency is occurring for a database
    and files associated with the database. Using a DMF in SQL Operations Studio shows
    the power of T-SQL Intellisense to help you provide the proper parameters for
    the function. Figure 5-31 shows an example of filling out the parameters for this
    DMF.


    **Figure 5-31.** T-SQL Intellisense in SQL Operations Studio to execute a DMF


    Here is an example query as found in the sample script `dm_io_virtual_file_stats.sql`
    to see the database files by the highest average disk latency for reads:


    ```sql

    -- Find the files and associated database that have the highest avg disk latency
    for read operations

    -- Use the DB_NAME() system function to find the database name from the id in
    the DMF

    -- Join with the sys.master_files catalog view to find the physical file name
    from the file_id in the DMF

    ![](index-211_1.jpg)


    ## ChapTer 5   SQL Server TooLS


    SELECT DB_NAME(ivfs.database_id), mf.physical_name, (ivfs.io_stall_read_ms/ivfs.num_of_reads)
    as avg_io_read_latency_ms, ivfs.num_of_reads

    FROM sys.dm_io_virtual_file_stats(null,null) ivfs

    INNER JOIN sys.master_files mf

    ON ivfs.database_id = mf.database_id

    AND ivfs.file_id = mf.file_id

    WHERE num_of_reads > 0

    ORDER by avg_io_read_latency_ms DESC

    GO

    ```


    This DMF only provides the `database_id` and the `file_id` instead of names. I
    use the `DB_NAME()` system function to get the database name and the join with
    the catalog view `sys.master_files` to get the physical file name.


    Figure 5-32 shows the results from the preceding query in SQL Operations Studio
    on my SQL Server on Linux server.


    **Figure 5-32.** Database files with highest average disk read latency on SQL
    Server on Linux


