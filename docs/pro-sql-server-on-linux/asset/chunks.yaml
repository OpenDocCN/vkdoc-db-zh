- fmt: "One of the more popular programming languages to build applications, especially\
    \ on Linux, is node.js based on Javascript. Node.js supports connecting to any\
    \ SQL Server through the Tabular Data Stream (TDS) protocol, the “data” language\
    \ for SQL Server, from a component called `Tedious` (Microsoft is a major contributor\
    \ to Tedious. You can find the open source at `https://github.com/tediousjs/tedious`,\
    \ which is the node.js driver for SQL Server. The TDS protocol is supported by\
    \ SQL Server and Azure SQL Server Database. The entire protocol is open and published\
    \ at `https://msdn.microsoft.com/library/dd304523.aspx`.\n\nNode.js supports programs\
    \ to run on Windows, Linux, and MacOS. You can download the node.js platform of\
    \ your choice at `https://nodejs.org`.\n\n## Chapter 4   Building an appliCation\
    \ and advanCed t-SQl\n\nI will show you an example application using node.js (this\
    \ is a simple example that displays output to the console. It doesn’t display\
    \ a web page) based on the samples provided by Microsoft at `http://www.microsoft.com/sql-server/developer-get-started/node/windows`.\n\
    \nPer the instructions in our documentation at `http://www.microsoft.com/sql-server/developer-get-started/node/windows/step/2.html`,\
    \ I ran these programs to install the Tedious driver and prepare my environment\
    \ to use node.js with SQL Server (you can execute these in the Integrated Terminal\
    \ in Visual Studio Code) in the folder where I will save my program:\n\n```\n\
    npm init -y\nnpm install tedious\nnpm install async\n```\n\nFor a set of documentation\
    \ references for using the Tedious driver to write programs for node.js with SQL\
    \ Server, see the API documentation at `http://tediousjs.github.io/tedious/index.html`.\
    \ Another source of examples can be found at `https://github.com/tediousjs/tedious/tree/master/examples`.\n\
    \n### Connecting to SQL Server with node.js\n\nConnecting to SQL Server with node.js\
    \ relies on the `Connection` object from the Tedious driver. Get the full details\
    \ of the object at `http://tediousjs.github.io/tedious/api-connection.html`. Following\
    \ is the code I built to connect to SQL Server on Linux with the default database\
    \ of WideWorldImporters, using the sqllinux login I created earlier in this chapter.\
    \ Using the Visual Studio Code Editor, you can open the sample file `customerappconnect.js`\
    \ to see this code. Using this file extension switches the editor to recognize\
    \ JavaScript code:\n\n```\nvar Connection = require('tedious').Connection;\nvar\
    \ Request = require('tedious').Request;\nvar TYPES = require('tedious').TYPES;\n\
    // Create connection to database\nvar config = {\n    userName: 'sqllinux',\n\
    \    password: 'Sql2017isfast',\n    server: 'bwsql2017rhel',\n    options: {\n\
    \        database: 'WideWorldImporters'\n    }\n}\nconsole.log(\"Connecting to\
    \ SQL Server\");\nvar connection = new Connection(config);\n// Attempt to connect\
    \ to the SQL Server on Linux\nconnection.on('connect', function(err) {\n    if\
    \ (err) {\n        console.log(err);\n    } else {\n        console.log('Connected\
    \ to SQL Server successfully');\n        connection.close();\n    }\n});\n```\n\
    \nI can run this code in the Integrated Terminal (you can open the Integrated\
    \ Terminal using the View Menu in Visual Studio Code) using the command: `node\
    \ .\\customerappconnect.js`"
