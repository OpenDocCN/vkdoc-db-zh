    使用来自第 3 章的 **insertpeople.sql** 脚本中的命令插入数据后，由于`People`表中已有数据，让我们使用`bcp`以*本机*格式将数据导出到文件。（本机格式将根据表中的数据类型以二进制形式写出数据。还有命令行选项可以将数据写入文本格式）。以下是在示例脚本
    **bcpout.sh** 中看到的导出表的基本语法（别忘了运行`chmod u+x bcpout.sh`来执行脚本）：


    ```

    bcp [WideWorldImporters].[Application].[People] out people.dat -Usa -S localhost
    -n

    ```


    图 5-5 展示了在 Linux 服务器上运行此`bcp`命令的结果。


    ***图 5-5. 在 Linux 服务器上使用 bcp 导出数据***


    你可以从`People`表中删除数据，然后将本机格式化的文件导入到 SQL Server 中。但在执行`DELETE`语句之前，你需要先禁用这些表上的所有约束。以下是我从名为
    **deletepeoplebeforeimport.sql** 的示例脚本中执行的一组 T-SQL 命令示例。此脚本适用于第 3 章中的 WideWorldImporters
    示例脚本。你不能将其用于完整的 WideWorldImporters 示例备份。


    **注意**：我禁用了包括来自`Customers`表的外键约束。如果此表中存在数据，则不建议禁用外键约束，因为在插入新数据时可能违反逻辑引用完整性。此外，除非使用了特定的命令行选项，否则`bcp`程序本身会忽略约束。我在此示例中禁用了约束，以便可以删除现有行。


    ```

    USE [WideWorldImporters]

    GO

    ALTER TABLE [Sales].[Customers] NOCHECK CONSTRAINT ALL

    GO

    ALTER TABLE [Application].[People] NOCHECK CONSTRAINT ALL

    GO

    DELETE FROM [Application].[People]

    GO

    ```


    现在你可以使用`bcp`从前面导出示例创建的`people.dat`文件导入数据（我提供了一个名为 **bcpin.sh** 的示例 bash shell
    脚本）：


    ```

    bcp [WideWorldImporters].[Application].[People] in people.dat -Usa -S localhost
    -n

    ```


    `bcp`具有丰富的命令行选项，适用于导入和导出场景。这些选项包括但不限于格式文件、导入/导出到文本文件、列和行分隔符，以及用于提示和行批大小的性能选项。有关完整的命令行选项和示例列表，请参阅文档：[`docs.microsoft.com/sql/tools/bcp-utility`](https://docs.microsoft.com/sql/tools/bcp-utility)


    如果你有存储空间并且愿意将导入文件复制到与 SQL Server 相同的计算机上（或网络上 SQL Server 可访问的文件共享），则可以使用 T-SQL
    的`BULK INSERT`来执行高速导入。此命令可以显著提高导入性能，因为 SQL Server 引擎将直接读取文件并将数据导入到目标表中。有关`BULK
    INSERT`的更多信息，请参阅文档：[`docs.microsoft.com/sql/t-sql/statements/bulk-insert-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/bulk-insert-transact-sql)


    **注意**：在本书撰写时，SQL Server on Linux 上的`BULK INSERT`命令需要`sysadmin`权限。


    ## mssql-cli


    随着 SQL Server on Linux 的发布，微软为用于 SQL Server 的工具推出了一项新的跨平台（操作系统）策略，这些工具通过一个开源项目制作。其中一个工具的例子就是**mssql-cli**。`mssql-cli`是一个命令行工具，类似于`sqlcmd`，用于针对
    SQL Server 执行查询。`mssql-cli`使用 Python 构建，可在运行 Windows、Linux（包括许多发行版）和 macOS 操作系统的计算机上使用。'
- fmt: 'To install `mssql-cli`, see the installation guide [https://github.com/dbcli/mssql-cli/blob/master/README.rst#get-mssql-cli](https://github.com/dbcli/mssql-cli/blob/master/README.rst#get-mssql-cli).


    When we built `mssql-cli`, we created a GitHub project to allow open-source contributions
    ([https://github.com/dbcli/mssql-cli/](https://github.com/dbcli/mssql-cli/)) and
    registered it as part of the `dbcli` initiative, which is a community of open-source
    projects towards better command line tools for databases.


    While `sqlcmd` is a great simple command line tool for SQL Server, `mssql-cli`
    offers some advantages over `sqlcmd`, including:


    *   T-SQL intellisense

    *   Syntax highlighting

    *   Vertical format for query results

    *   Multi-line editor

    *   Configuration file to customize `mssql-cli`

    *   Environment variable support


    One of the differences with `mssql-cli` from other SQL Server tools is that the
    `GO` keyword is not used to delimit a T-SQL batch. The `mssql-cli` editor allows
    you to execute one T-SQL command at a time by default. However, you use the multiline
    editor to create a multistatement T-SQL batch and then use the `";"` character
    to end the batch.


    You can launch `mssql-cli` with the following command:


    ```

    mssql-cli -Usqllinux

    ```


    Figure 5-6 shows an example of using `mssql-cli` on Linux to run a multi-statement
    T-SQL batch against the `WideWorldImporters` sample table I created in Chapter
    3. (Note: results from this query assume you have populated data into these tables
    from previous chapters.)


    ![](index-176_1.png)


    ## Chapter 5 SQL Server Tools


    **Figure 5-6.** Using `mssql-cli` on Linux


    While the options for the configuration file have not been completely documented
    at the time of the writing of this book, you can see the default configuration
    file (called `config`), which has comments inside it. The default configuration
    file is installed in the `~/.config/mssqlcli` directory (`~` means the home directory
    of the user logged in) on Linux and macOS and the `c:\users\<username>\AppData\Local\dbcli\mssqlcli`
    directory on Windows.


    One of the strategies for new tools is to provide consistency in functionality
    and look and feel. Therefore, `mssql-cli`, the `mssql` Visual Studio Code extension,
    and SQL Operations Studio all use a common component called the SQL Tools Service
    for connection management, language support, query execution and result set processing.
    The SQL Tools Service is an open-source project. You can find out more information
    about the SQL Tools Service at [https://github.com/Microsoft/sqltoolsservice](https://github.com/Microsoft/sqltoolsservice).


    `mssql-cli` was released in preview in December of 2017. There is some work to
    be done to fill in feature gaps compared with `sqlcmd` and other improvements.
    For example, there is no method today to pass in an input file or query for scripting
    or to pipe the results to `stdout` or a file. To view the roadmap for `mssql-cli`,
    see this documentation at [https://github.com/dbcli/mssql-cli/blob/master/doc/roadmap.md](https://github.com/dbcli/mssql-cli/blob/master/doc/roadmap.md).


    ![](index-177_1.png)


    ## Chapter 5 SQL Server Tools


    ### mssql-scripter


    After you start working with databases, a common task you may want to do is *script
    out* a database. What I mean by this term is that you may want to take an existing
    database and generate output to create the T-SQL commands to create the database
    and all the objects in the database without executing a backup and restore. Typically,
    this output is written to a file that is now a T-SQL script, to be used to create
    the database and all objects. The very popular tool, SSMS, has an option to create
    a script of objects from an existing database.


    Since SSMS only runs on Windows, we built a cross-platform, open-source tool for
    scripting called `mssql-scripter`. Like `mssql-cli`, `mssql-scripter` is built
    with Python.'
