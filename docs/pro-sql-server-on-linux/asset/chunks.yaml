- fmt: '## Chapter 2: Installation and Configuration


    ### Preparing Data Disks and Connecting to the Server


    Before you begin, ensure you have a separate disk you have added (to your VM for
    example), as described in the Azure documentation. Read the section on “Prepare
    Data Disks” at [https://docs.microsoft.com/azure/virtual-machines/linux/tutorial-manage-disks](https://docs.microsoft.com/azure/virtual-machines/linux/tutorial-manage-disks).


    If you plan to connect to your Linux Server or VM on a laptop not running Linux
    natively, get yourself a good secured shell (`ssh`) program. For MacOS users,
    it comes built-in with a command line `ssh` client, but you can install other
    utilities as well. For Windows 10 users, you can install a Linux subsystem that
    comes with an `ssh` command line interface. See [https://docs.microsoft.com/windows/wsl/install-win10](https://docs.microsoft.com/windows/wsl/install-win10)
    for more information. For me (and I’ll use this for demonstrations in the book),
    I use a program called `MobaXterm`, which you can download from [https://mobaxterm.mobatek.net/](https://mobaxterm.mobatek.net/).


    ![](index-49_1.png)


    Figure 2-1 shows an example of a `MobaXterm` `ssh` session for a Linux server.


    **Figure 2-1. A MobaXterm ssh session to a Linux server**


    ### System Requirements


    SQL Server runs on many different types of computer systems and virtual machine
    footprints. The core minimum requirements are:


    - 2GB of memory (The minimum was reduced to 2GB starting with SQL Server 2017
    Cumulative Update 2).

    - 6GB of free disk space.

    - Processor speed of 2GHz.

    - Processor type is `x64` compatible.

    - Two physical processor cores.


    While those are the minimum requirements, SQL Server can scale to the largest
    systems available. SQL Server can address the maximum memory possible on Linux.
    Currently, that is a theoretical limit of 64TB, but practically the tested limit
    is around 12TB. There is no limit on the number of cores SQL Server can support
    on Linux and the maximum database size is a whopping 524 Petabytes (PB).


    SQL Server is supported on the popular native filesystems of Linux `XFS` and `EXT4`.
    The default filesystem type varies by distribution. It is now `XFS` for RHEL 7.3
    and 7.4, but `EXT4` for Ubuntu and SLES. In our testing at Microsoft, we have
    not seen a significant performance difference with one filesystem type vs. the
    other. However, `XFS` provides larger size capabilities for volume, maximum file
    size, and number of files than `EXT4`. For all my work on RHEL, I just use the
    default of `XFS`. Our testing with Ubuntu and SLES indicates the `EXT4` works
    best with those distributions (but `XFS` is completely supported). There is a
    new filesystem type called `BTRFS`, which is not supported for SQL Server. You
    should also know that the popular remote storage system Network File System (`NFS`)
    is supported with a few restrictions, which are documented in our page on system
    requirements at [https://docs.microsoft.com/sql/linux/sql-server-linux-setup#system](https://docs.microsoft.com/sql/linux/sql-server-linux-setup#system).


    > **Tip:** For maximum performance of SQL Server, you may need to adjust certain
    `BIOS` settings for your computer. See Chapter 6 for more details on `BIOS` settings
    for your Linux system.


    ### Testing for SQL Server


    As you plan to install and explore the capabilities of SQL Server, there are some
    resources that can be helpful for you.


    #### The WideWorldImporters Sample


    In SQL Server 2016, we built a new sample database called `WideWorldImporters`
    along with a series of scripts and demos. I will use this sample throughout the
    book (along with the companion `WideWorldImportersDW` database). You can access
    a backup of this database and all the samples by starting with this documentation.'
