- fmt: 'is some logic in SQL Server to "reset" a connection. This doesn’t mean you
    have to keep a connection open for the lifetime of your application, but it also
    means that frequently opening and closing connections is not a best practice.


    - Transactions are common to ensure a logical group of T-SQL statements are committed
    together. However, one of the most common mistakes I’ve seen by developers is
    to begin a transaction and then execute code where a delay in committing the transactions
    is out of the control of the developer. For example, you may begin a transaction,
    start executing T-SQL statements, but then provide a graphical user interface
    input to the user while the transaction is active. The life of the transaction
    is now in the hands of the user, which could be the length of a coffee break!
    The result is most likely a major performance problem in the form of a blocking
    problem. There is an older article we built in Technical Support that can still
    be a good resource to identify the cause of blocking problems at [https://support.microsoft.com/help/224453/inf-understanding-and-resolving-sql-server-blocking-problems](https://support.microsoft.com/help/224453/inf-understanding-and-resolving-sql-server-blocking-problems).


    `Tip` I’ve also seen the opposite problems with transactions, where applications
    never group statements in a transaction but execute each statement as a transaction.
    Grouping modifications in a transaction can improve performance because each commit
    of a transaction requires a flush to the transaction log.


    ## Chapter 6: Performance Capabilities


    - Deadlocks are problems that are almost always caused by the application. I say
    this from pure experience. And the most common deadlock cause is acquiring locks
    in an inconsistent manner based on the order of how you query and modify data
    in concurrent connections. Read our documentation on locking to gain more insight
    on the cause of deadlocks and how to diagnose them at [https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide#Lock_Engine](https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide#Lock_Engine).


    ## Process Your Results!


    Another application pattern I’ve seen from experience that can cause performance
    problem is result set processing. When you execute a T-SQL `SELECT` statement
    to extract rows from SQL Server, your application should be *processing* the rows
    immediately. Processing means executing the necessary steps in your code to iterate
    through the rows returned from SQL Server. There should not be any delay in between
    processing rows. Why? Because SQL Server can potentially hold resources (locks)
    while it is waiting for the client application to process the entire result set,
    which can lead to unexpected blocking problems. One of the key indicators in SQL
    Server of this behavior is a wait type called `ASYNC_NETWORK_IO`. See a great
    description of this problem from Paul Randal on this blog post: [https://www.sqlskills.com/help/waits/async_network_io/](https://www.sqlskills.com/help/waits/async_network_io/).


    ## Set Your Application Name


    The DMV `sys.dm_exec_sessions` has a column called `program_name`. The value of
    this column for user connections is filled in based on the Application Name specified
    by the application connecting to SQL Server. Since `sys.dm_exec_sessions` is easily
    joined with `sys.dm_exec_requests`, and `sys.dm_exec_requests` is often a central
    DMV to analyze performance problems, having the `program_name` uniquely identify
    your application can help.'
