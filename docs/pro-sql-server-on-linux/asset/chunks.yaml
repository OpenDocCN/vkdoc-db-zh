    Server 这样的数据库平台通常并未纳入其生命周期。一个典型的 SQL Server 会托管在服务器上，开发者很难将其容器与应用程序一起维护，从而连接到解耦的
    SQL Server 和数据库（以及像 SQL Agent 作业和脚本这样的对象）。现在，SQL Server 已拥抱容器世界，它可以成为包含在 CI/CD
    流水线中的容器的一部分。


    ## Kubernetes


    容器的前景在可移植性、一致性和效率方面具有巨大潜力。但是，如何在 CI/CD 流水线或大规模生产环境中协调许多数据库容器的执行呢？一种名为 Kubernetes
    的技术就是为了解决这个问题而创建的。Kubernetes 是一个开源系统，旨在帮助在一个完整的生态系统中管理、部署和编排众多容器。其优势之一是为容器提供了一种天然的高可用性解决方案，这恰好满足了许多
    SQL Server 用户为生产数据库提供高可用性解决方案的需求。Kubernetes 已成为大规模容器管理和部署的领先解决方案，并已被几乎每一个支持容器执行和部署的公共云供应商所采纳。


    # 第 1 章：为何在 Linux 上使用 SQL Server？


    本书后面将用整整一章来详细介绍使用 Docker 容器部署 SQL Server 的技术细节，包括在 CI/CD 流水线中使用此方法的示例，以及利用 Kubernetes
    实现高可用性。


    ## 小结


    `部署` 是一个入门的重要术语。这全部是关于在 Linux 上安装和配置 SQL Server。而这正是我们下一章开始在 Linux 上启动并运行 SQL
    Server 的旅程起点。


    # 第 2 章


    ## 安装与配置


    从一开始，我们的团队就希望确保 SQL Server 在 Linux 上的安装体验能很好地契合 Linux 用户已经非常成熟的方法、实践和生态系统。此外，我们不仅仅是声称
    SQL Server 在任何 Linux 发行版上都受支持（市面上有数百种），而是希望确保我们在流行的发行版上提供一个经过充分测试的高质量版本，并为我们的客户提供卓越的支持体验。


    我们将安装体验设计得快速而轻量。您可能会对本章中专门讨论此主题的篇幅之多感到惊讶。这是因为安装产品是您遇到的第一个体验，并且可以奠定您对产品看法的基调。如果您只是想直接上手，看看在
    Linux 上安装 SQL Server 有多么容易，请直接跳转到“直接安装！”部分。


    我希望本章涵盖安装体验的所有方面，这样您就可以了解预期结果，理解其背后的工作原理，并为您提供所有安装和更新的选项。


    本章还将讨论安装要求、如何验证安装是否成功、无人值守安装、离线安装、安装其他软件包、在 Azure 环境中安装、安装问题排查、探索已安装内容以及配置相关主题。所有这些都基于我个人安装该产品的经验，以及与客户、我们的支持和工程团队的交流，他们的目标是使安装和配置体验简单而完整。


    ### 安装准备


    如果您希望获得像 SQL Server 这样复杂的产品在企业级应用中的卓越体验，仔细的准备是关键的成功标准。在本节中，我将讨论我们官方支持的 Linux 发行版、为确保流畅且最优的
    SQL Server 体验所需的系统要求，以及一些


