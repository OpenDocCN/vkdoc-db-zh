    ### Write-Ahead Logging


    When SQL Server needs to modify data on pages in the buffer pool, performance
    would not be optimal if SQL Server had to wait for all changes for each database
    page to be written to disk for the T-SQL statement that required the change (such
    as an `INSERT` statement).


    Since each database includes a transaction log, if SQL Server ensures all changes
    are written to the transaction log file, it does not have to write database pages
    immediately. This concept is called write-ahead logging (this concept is also
    known as the WAL protocol). Provided SQL Server ensures all modifications for
    a committed transaction are written to the transaction log on disk, all transactions
    will be `consistent` even if the changes to the database page are not written
    to disk should SQL Server or the Linux server terminate unexpectedly.


    This architecture allows for T-SQL statements that modify data to operate as fast
    as changes can be `hardened` to the transaction log. This means for applications
    that rely on performance of database modifications (such as OLTP heavy applications),
    placing the transaction log file on an extremely fast storage system is important.


    SQL Server does offer a feature called `delayed durability`, which allows transactions
    to complete without waiting for the transaction log changes to be written to disk.
    However, the tradeoff for performance is possible data loss. You can read more
    about SQL Server transaction durability options in our documentation at [https://docs.microsoft.com/sql/relational-databases/logs/control-transaction-durability](https://docs.microsoft.com/sql/relational-databases/logs/control-transaction-durability).


