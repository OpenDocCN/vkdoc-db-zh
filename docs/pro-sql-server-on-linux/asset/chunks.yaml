  trans: '# `SQL Server 中的安全性`


    SQL Server 数据平台和引擎的第二大支柱是安全性。SQL Server 2017 不仅提供了一套丰富的功能来满足您的安全需求，而且在过去近十年中，一直被公认为漏洞最少的数据库平台。图
    7-1 是我用来展示 SQL 安全性功能套件概览（业内许多人称之为*纵深防御*）的标准图表之一，其中还包含了一张对比 SQL Server 与竞争对手在漏洞方面评级的图表。


    ***图 7-1.** `SQL Server 纵深防御`*


    右侧的柱状图并非微软杜撰。它来自美国国家标准与技术研究院综合漏洞数据库 (`https://www.nist.gov/programs-projects/national-vulnerability-database-nvd`)，这也解释了我们对安全性的重视程度。


    在本章中，我将向您展示构成纵深防御故事的各种安全功能。安全性不仅仅是一个软件功能，因此我还建议您阅读我们文档中关于如何保护 SQL Server（包括物理安全）的这一部分：`https://docs.microsoft.com/sql/relational-databases/security/securing-sql-server`。


    © Bob Ward 2018

    B. Ward, `Pro SQL Server on Linux`, `https://doi.org/10.1007/978-1-4842-4128-8_7`


    ## 第 7 章：SQL Server 中的安全性


    ### 登录名和用户


    到目前为止，在本书中我已经向您展示了两个 SQL Server 登录名（`sa` 和一个我创建的名为 `sqllinux` 的登录名）的示例，这些是用于连接到
    SQL Server 并执行查询的身份标识。这两个登录名都是使用 `SQL Server 身份验证`连接到 SQL Server 的例子。SQL Server
    身份验证需要一个名称和密码。应用程序使用该名称和密码连接到 SQL Server。这是连接到 SQL Server 最简单且兼容性最好的方法，无论是在 Windows、Linux
    还是 Azure 上。最大的缺点是，您必须维护一组独立于其他身份验证目的（如 Active Directory）的身份验证对象。我将在本章下一节向您展示如何在
    Linux 上设置和使用 `Active Directory 身份验证`。


    虽然*登录名*是 SQL Server 实例级别的对象，但数据库也有*用户*。登录名和数据库中的用户之间存在关联。每个使用 SQL Server 创建的登录名都至少映射到
    `master` 数据库中的一个用户。`sa` 登录名映射到一个名为 `dbo`（数据库所有者）的用户。所有其他创建的登录名都映射到 `guest` 用户。所有数据库在创建时，基于
    `model` 数据库的定义，都具有 `dbo` 和 `guest` 用户。除了 `sa` 登录名外，大多数登录名将通过将该登录名映射到您在数据库中创建的用户来获得访问用户数据库的权限。如果您希望某个登录名拥有数据库所有者的权限，您会将该用户映射到
    `dbo` 用户。否则，您会在数据库中创建一个新用户并将登录名映射到该用户。登录名可以映射到同一 SQL Server 实例上不同数据库中的不同用户。


    在本书前面的示例中，我向您展示了如何创建一个名为 `sqllinux` 的新用户。我没有将 `sqllinux` 映射到特定用户，而是使用此登录名创建了一个名为
    `WideWorldImporters` 的数据库。使用登录名（如果将该登录名放入 `dbcreator` 角色中）创建数据库会自动将该登录名映射到所创建数据库的
    `dbo` 用户。默认情况下，作为一项安全最佳实践，`guest` 用户的连接访问权限对于用户数据库是被撤销的（对于系统数据库则必须启用）。'
- fmt: '# Chapter 7 Security in SQL Server


    ## **Important Security Note**


    database `msdb`). What this means is that if you create a new login and try to
    access a database where your login has not been mapped to a user, then your access
    will fail with an error like the following:


    ```

    Msg 916, Level 14, State 1, Line 1

    The server principal “sqllinux” is not able to access the database “WideWorldImporters”
    under the current security context.

    ```


    ## **Tip**


    For any production system you should consider password expiration and complexity.
    Read our documentation for guidance on these topics at [https://docs.microsoft.com/sql/relational-databases/security/password-policy](https://docs.microsoft.com/sql/relational-databases/security/password-policy).


    ## **Step 1: Create a New Login**


    So let’s follow the steps you would use to create logins and users for any database
    you create:


    • First, I highly recommend you not use the `sa` login to create new databases
    for production. If you are just developing or experimenting with SQL Server, then
    using `sa` is fine.


    • So, to create your first database, create a new login using the T-SQL `CREATE
    LOGIN` statement. I showed you an example of how to do this and give proper permissions
    to this login to create a database in Chapter 3 of the book like this (this script
    is found in the examples with Chapter 3 called `createlogin.sql`). Execute this
    script connected as the `sa` login.


    ```sql

    USE master

    GO

    IF EXISTS (select * from sys.server_principals where name = ''sqllinux'')

    DROP LOGIN [sqllinux]

    GO

    CREATE LOGIN [sqllinux] WITH PASSWORD=N''Sql2017isfast'', DEFAULT_DATABASE=[master]

    GO

    ALTER SERVER ROLE dbcreator ADD MEMBER sqllinux

    GO

    ```


    In this example, I added this login to a server role to allow it to create databases.
    I’ll discuss more details about roles later in this chapter. This login will now
    be mapped to the user `dbo` and will have all the privileges given to the `dbo`
    user in that database.


    ## **Note**


    In Chapter 3 I used the legacy system procedure `sp_addsrvrolemember`. This is
    perfectly fine to use but technically it is deprecated. Here I use the new `ALTER
    SERVER ROLE` syntax.


    ## **Step 2: Create a New Database**


    • Create a new database connected as the `sqllinux` login using the following
    T-SQL statement as found in the example `createdb.sql`:


    ```sql

    USE [master]

    GO

    DROP DATABASE IF EXISTS [SecureMyDatabase]

    GO

    CREATE DATABASE [SecureMyDatabase]

    GO

    ```


    ## **Step 3: Verify the User Mapping**


    • Run this T-SQL statement as found in the example `whichuserami.sql` to find
    out what database user the `sqllinux` login is mapped to:


    ```sql

    USE [SecureMyDatabase]

    GO

    SELECT SUSER_NAME() as current_login, USER_NAME() as current_database_user

    GO

    ```


    Figure 7-2 shows the results with SQL Operations Studio.


    ![Login and user for sqllinux](index-342_1.jpg)


    **Figure 7-2.** Login and user for `sqllinux` after creating the database


    For this example I used two built-in SQL Server functions to find out the current
    connected login and database user. Since the `sqllinux` login created the database,
    it is automatically mapped to the `dbo` user.


    ## **Step 4: Create Another User**


    • Now let’s create a user in the database that will not be the database owner.
    The first step is to create a new login that will have a default database of `SecureMyDatabase`.
    Use the following T-SQL batch as found in the example script `createnewuserlogin.sql`
    connected as the `sa` login (Note: it is possible to grant permissions to the
    `sqllinux` login to create new logins):


    ```sql

    USE [MASTER]

    GO

    USE master

    GO

    IF EXISTS (select * from sys.server_principals where name = ''newuser'')

    DROP LOGIN [newuser]

    GO

    CREATE LOGIN [newuser] WITH PASSWORD=N''Sql2017isfast'', DEFAULT_DATABASE=[SecureMyDatabase]

    GO

    ```


    At this point if you tried to log in as the `newuser` login, you would get an
    error like this:


    ```

    Cannot open user default database. Login failed. Login failed for user ''newuser''.

    ```'
