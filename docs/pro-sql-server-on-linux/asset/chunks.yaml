    \       ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON) ON [USERDATA]\n) ON PS_TransactionDate\n\
    ```\n\n## 第 6 章 性能功能\n\n```sql\nGO\n\nCREATE CLUSTERED INDEX [CX_Sales_CustomerTransactions]\
    \ ON [Sales].[CustomerTransactions]\n(\n    [TransactionDate] ASC\n)WITH (PAD_INDEX\
    \ = OFF, STATISTICS_NORECOMPUTE = OFF, SORT_IN_TEMPDB = OFF,\n       DROP_EXISTING\
    \ = OFF, ONLINE = OFF, ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON) ON PS_TransactionDate\n\
    \nGO\n```\n\n此表的非聚集索引基于`CustomerTransactionID`，但沿着基于`TransactionDate`列的分区进行对齐。聚集索引同样沿着`TransactionDate`列对齐。这意味着`CustomerTransactions`表中的数据由\
    \ SQL Server 在其元数据中，根据分区函数定义的日期范围进行分区。分区方案和函数是独立的对象，可以被重用。事实上，如果你查看`[Purchasing].[SupplierTransactions]`表，它使用了相同的分区函数和方案。\n\
    \n现在让我们看一个分区有助于提高性能的查询示例。SQL Server 能够识别查询中涉及的列是分区函数的一部分，因此可以定位特定的分区并排除其他分区。这使得\
    \ SQL Server 能够减少满足查询所需的页面数量。\n\n执行以下 T-SQL 语句（位于示例查询`customertransactions_partition.sql`中）：\n\
    \n```sql\nUSE [WideWorldImporters]\n\nGO\n\nSET STATISTICS IO ON\n\nGO\n\nSET\
    \ STATISTICS XML ON\n\nGO\n\nSELECT COUNT(*) FROM Sales.CustomerTransactions\n\
    WHERE TransactionDate between '2013-01-01' and '2014-01-01'\n\nGO\n```\n\n![](img/index-313_1.jpg)\n\
    \n## 第 6 章 性能功能\n\n`SET STATISTICS IO ON`的结果应如下所示：\n\n表'CustomerTransactions'。扫描计数\
    \ 2，逻辑读取 123，物理读取 0，预读取 0，LOB 逻辑读取 0，LOB 物理读取 0，LOB 预读取 0。\n\n如果你要扫描整个表，你会看到所需的逻辑读取次数是此处的两倍。然而，当你查看执行计划时，可以从图\
    \ 6-17 中看到需要进行`索引扫描`。\n\n*图 6-17.  用于分区查询的查询计划*\n"
- fmt: '# Chapter 6: Performance Capabilities


    If you drill into the details of the XML SHOWPLAN from these results, you will
    find this unique section called `RunTimePartitionSummary`, as seen in Figure 6-18.


    ![](index-314_1.jpg)


    *Figure 6-18. Partition statistics in an XML SHOWPLAN*


    The `RunTimePartitionSummary` XML node shows that two partitions out of the five
    possible were accessed to satisfy this query, including partitions 1 and 2. This
    explains why even though the query plan showed an `Index Scan`, the entire index
    was not needed to satisfy the requirements of the query. That is an example of
    partition elimination and explains one of the performance benefits of using partitions.


    I made partitions sound simple, and they can be. However, they may be more complex
    to use to fit the needs of your application. Use the following resources to learn
    more about partitions:


    *   Our documentation on partitions at [https://docs.microsoft.com/sql/relational-databases/partitions/partitioned-tables-and-indexes](https://docs.microsoft.com/sql/relational-databases/partitions/partitioned-tables-and-indexes)

    *   A very nice blog post on partition elimination by MVP Kendra Little: [https://littlekendra.com/2015/11/17/did-my-query-eliminate-table-partitions-sql-server](https://littlekendra.com/2015/11/17/did-my-query-eliminate-table-partitions-sql-server)

    *   An excellent blog post by a close friend and top MVP who is both knowledgeable
    and passionate about partitions, Kimberly Tripp: [https://www.sqlskills.com/blogs/kimberly/sqlskills-sql101-partitioning/](https://www.sqlskills.com/blogs/kimberly/sqlskills-sql101-partitioning/)
    (Note: Kim says outright that partitions are not about performance but more about
    manageability. I think her point, if you read this closely, is that partitions
    are not the answer to all performance problems, but they can provide performance
    benefits. She also mentions the concept of partitioned views, which I didn’t cover
    in this section of the book.)


    ## Columnstore Indexes


    Perhaps one of the coolest, but also practical, features to be introduced into
    SQL Server to accelerate performance is columnstore indexes. A `Columnstore` is
    data that is logically organized as a table with rows and columns, and physically
    stored in a *column-wise* data format. A `Rowstore` is both logically and physical
    organized and stored in a *row-wise* format. Row-wise is the standard format for
    SQL Server tables and indexes.


    Columnstore indexes help accelerate performance through column-wise structure,
    efficient compression, data elimination, and batch mode execution.


    The concept of columnstore has been around a bit, but it did not make its way
    into SQL Server until SQL Server 2012 (the compression algorithms are common to
    the Vertipaq engine used for products like PowerPivot and SQL Server Analysis
    Services). One common misnomer I’ve heard about columnstore indexes is that it
    is an “in-memory technology.” A columnstore index is stored on disk and is compressed
    in-memory and on disk. If the columnstore index can all fit in memory, then of
    course performance will be optimal, but it is not required that the entire columnstore
    index fit on disk. It is the compression of columnstore indexes that allows more
    of the data to fit into memory that makes it an efficient feature of SQL Server.


    ## How it Works


    To better understand how columnstore works, let me introduce you to a few additional
    terms:


    **rowgroup**: A group of rows that are compressed together into a columnstore
    format at the same time


    **segment**: A slice of a column of data within the rowgroup'
