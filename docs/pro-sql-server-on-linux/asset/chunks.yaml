- fmt: '# Chapter 5 SQL Server Tools


    ## Executing a Package


    Select the New button, keep the default of Delimited for format, and hit OK. You
    will be presented with a window to put in a File Name (this will be the name of
    the new file created on the Linux Server, which by default will be the directory
    where you execute `dtexec`).


    I put in a File Name of `people.txt` and selected the Unicode checkbox.


    Now select the Mappings option on the Flat File Destination Editor page. The Editor
    will automatically map column names to field names for the file. Hit OK on this
    screen. When you have completed this, the screen looks like Figure 5-48.


    *Figure 5-48. A Data Flow Task with source and destination*


    I have one last step before I copy the package to my Linux server. By default,
    the package is encrypted for sensitive information in the package like passwords
    and usernames. For purposes of this example, I’m going to change the properties
    of the Package to protect it via a password.


    When you click in the canvas of the designer, there should be a pane at the lower
    right-hand corner of the tool for Properties. It may be currently on a Data Flow
    Task. If so, I clicked on the down arrow button next to that task and selected
    Package. I scrolled down the list of properties and changed the `ProtectionLevel`
    to `EncryptSensitiveWithPassword`, and supplied a password in the `PackagePassword`
    field. I will need this password any time I want to open the package or execute
    it, including when I execute it on Linux.


    ## Executing a Package


    To execute this package, I need to copy it from my Windows computer to the Linux
    Server. I can conveniently use MobaXterm to do this or a program like `scp` or
    `winscp`.


    Package files from SSDT are stored by default in the `<user>\Projects` directory,
    so I used the tool to save the package (`.dtsx` file) to a location like `c:\temp`
    on my computer. I then copied the file (`Package.dtsx`) to my home directory on
    my Linux Server.


    Now I’m ready to execute the package using the `dtexec` program that is installed
    when you install the `mssql-server-is` package on Linux.


    **Note:** You must first install the Microsoft ODBC Driver 17 for SQL Server on
    Linux to execute this package. If you followed the steps to install the SQL Server
    tools (`sqlcmd`, …), this will already be installed.


    Here is the command to run `dtexec` to execute the package file called `Package.dtsx`:


    ```

    dtexec /F Package.dtsx /DE <package password>

    ```


    *Figure 5-49. Executing dtexec on Linux*


    The file `people.txt` was created in my home directory. You can also examine the
    XML details of the `Package.dtsx` file created for this package.


