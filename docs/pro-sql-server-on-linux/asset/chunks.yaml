    ## Chapter 3: Building a Database and T-SQL Fundamentals


    ### Summary


    In this chapter, I have shown the basics of creating a database and objects to
    go in the database. I’ve used the popular open-source, cross-platform tool Visual
    Studio Code for all the examples to show the fundamentals of T-SQL using the `mssql`
    extension.


    With this foundation of knowledge, I’ll show you in the next chapter, using the
    same `WideWorldImporters` database example, how to build an application, learn
    more advanced T-SQL concepts, and explore new features that come with SQL Server
    2017 on Linux.


    ## Chapter 4: Building an Application and Advanced T-SQL


    Now that you have learned how to create a database, tables, and execute basic
    T-SQL queries, it’s time to write some code and build an application that connects
    to SQL Server on Linux. As in Chapter 3, I’ll use Visual Studio Code as the development
    environment to build a node.js application.


    The node.js application uses basic T-SQL queries based on the knowledge I showed
    you in Chapter 3. So, in the second part of this chapter, I’ll show you more advanced
    T-SQL capabilities as well as new features that were shipped in SQL Server 2016
    and 2017.


    There are three resources I used as I wrote this chapter that I think you will
    also find useful:


    - [http://aka.ms/sqldev](http://aka.ms/sqldev): Resources and tutorials on how
    to build applications for SQL Server in almost any language on multiple platforms.

    - [https://code.visualstudio.com/docs/nodejs/nodejs-tutorial](https://code.visualstudio.com/docs/nodejs/nodejs-tutorial):
    Tutorials on how to build node.js applications using Visual Studio Code.

    - [https://docs.microsoft.com/sql/linux/sql-server-linux-develop-use-vscode](https://docs.microsoft.com/sql/linux/sql-server-linux-develop-use-vscode):
