    # SQL Server 的管理与监控


    ## 使用 `sar` 进行系统监控


    **`sar`** 用于随时间推移（甚至跨服务器重启）监控操作系统资源，如 CPU、内存和 I/O。`sar` 有许多选项，执行以下命令可以查看所有选项：


    ```bash

    man sar

    ```


    图 9-11 显示了我 Linux 服务器上默认 `sar` 输出的一部分。


    **图 9-11. Linux 上的默认 `sar` 输出**


    ![](img/index-508_1.png)


    ## 使用 `dstat` 进行监控


    **`dstat`：** `dstat` 是一个集成了 `vmstat`、`iostat` 和 `ifstat` 等多个程序功能的工具。你的 Linux 服务器上可能未安装
    `dstat`，可以通过运行以下命令安装：


    ```bash

    sudo yum install -y dstat

    ```


    执行 `dstat` 时，它会立即开始在你的 SSH 会话屏幕上滚动输出。图 9-12 显示了我 Linux 服务器上 `dstat` 输出的一部分。


    **图 9-12. Linux 上的 `dstat` 输出**


    ## 使用 `LinuxKI` 进行深度分析


    **`LinuxKI`：** Patrick Kilfoyle 在 Helsinki 项目期间加入了我们的 SQL 工程团队，并为我们带来了丰富的 Linux
    经验。Patrick 的技能之一是 Linux 内核性能调优。我询问他用于性能调优的有趣“底层”工具，他立即向我指出了 `LinuxKI`。根据 GitHub
    项目站点，`LinuxKI` 是“一个开源的高级任务关键型 Linux 性能故障排除工具”。我认为它是“底层”工具，因为它使用 Linux 内核跟踪数据来帮助深入分析复杂性能工作负载情况。Patrick
    在 Microsoft 使用它来深入分析 Linux 内核级别的复杂 SQL Server 性能调优问题。你可以在 GitHub 项目站点 [`github.com/HewlettPackard/LinuxKI`](https://github.com/HewlettPackard/LinuxKI)
    下载并了解更多关于 `LinuxKI` 的信息。


    ## SQL Server 故障排除


    到目前为止，在本书中，我已经向你介绍了可用于排除 Linux 上 SQL Server 问题的工具、技术和功能。尽管如此，本章还有一些值得涵盖的故障排除主题，我尚未在本书中讨论。这些主题包括转储文件、核心转储文件和
    `PSSDiag`。我要特别感谢目前在 Microsoft 支持部门研究 Linux 上 SQL Server 的两位顶级专家，Pradeep M 和 Suresh
    Kandoth，他们为本节内容做出了贡献。


    ## 转储文件


    当 SQL Server 发生某些错误条件（如访问冲突）时，数据库引擎将生成一个转储文件并在 `ERRORLOG` 中记录一条条目。该转储文件对于 Microsoft
    技术支持调查问题原因非常有用。在大多数情况下，当生成转储文件时，SQL Server 已 *处理* 该错误或异常，生成了转储文件，并正确终止了工作线程（这类似于严重错误，可能导致连接终止和事务回滚）。


    转储文件保存在 `ERRORLOG` 文件所在的同一目录中，默认为 `/var/opt/mssql/log`。你可以通过文件模式 `SQLDump<n>.mdmp`
    来识别转储文件（通常称为小型转储文件）。这些文件的格式可由 Windows 调试器读取，因为 SQL Server 生成的任何转储文件都使用 Windows
    的小型转储格式。


    Microsoft 技术支持有时还会使用一种技术来手动生成转储文件，以更深入地了解 SQL Server 进程。你可以通过执行以下 T-SQL 语句自行完成：


    **注意** 除非得到 Microsoft 指示，否则不要在生产服务器上运行此命令。此命令官方不受支持，仅用于高级诊断目的。


    ```sql

    DBCC STACKDUMP

    GO

    ```


    运行此命令后，`ERRORLOG` 文件将包含一个类似于以下文本的“堆栈转储标头”：


    ```

    spid51       Dump thread - spid = 0, EC = 0x000000067EDA1290

    spid51       *

    spid51       * User initiated stack dump.  This is not a server exception dump.

    spid51       *

    ```

