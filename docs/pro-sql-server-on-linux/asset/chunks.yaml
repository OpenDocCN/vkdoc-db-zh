    ring_buffer


    target so when SQL Server was restarted, the information collected was lost.


    With the launch of SQL Server 2012, we revised the method in which failure


    detection worked with clustering via the sp_server_diagnostics system procedure,


    which I described in Chapt[er 8. M](#index_split_005.html#p389)y colleague in
    support, Robert Dorr, was a huge part


    of defining how sp_server_diagnostics worked. In addition, Bob took the time to
    revamp


    the system_health session to include sp_server_diagnostics information and to
    have a


    file target added to the session.


    This is really a major advancement, as now by default any SQL Server has a set
    of


    Extended Event files that includes health information about SQL Server, including
    but


    not limited to:


    •  sp_server_diagnostics output


    •  Memory diagnostics


    •  Deadlocks


    •  Non-yielding problems


    •  Latch waits over 15 seconds


    •  Certain preemptive waits over five seconds


    •  Critical errors


    ![](index-504_1.jpg)


    Chapter 9   Managing and Monitoring SQL Server


    Robert Dorr has a good blog post discussing this new system_health session at


    [https://blogs.msdn.microsoft.com/psssql/2012/03/08/sql-server-2012-true-](https://blogs.msdn.microsoft.com/psssql/2012/03/08/sql-server-2012-true-black-box-recorder)


    [black-box-recorder.](https://blogs.msdn.microsoft.com/psssql/2012/03/08/sql-server-2012-true-black-box-recorder)


    These files are by default stored in the /var/opt/mssql/log directory. Look for
    the set


    of files that match the pattern system_health*.xel. Use the following T-SQL statement
    as


    found in the example **readsystemhealth.sql** to read all the events in the current
    system


    health session. I included a conversion to your local time but also left in the
    original UTC


    time in the query.


    SELECT DATEADD(minute, DATEDIFF(minute,getutcdate(),getdate()), timestamp_utc)


    as local_datetime, *


    FROM sys.fn_xe_file_target_read_file(''/var/opt/mssql/log/system_health*.xel'',


    NULL, NULL, NULL)


    ORDER BY local_datetime DESC


    GO


    On my Linux Server, the results looked like Figur[e 9-7 fr](#index_split_007.html#p504)om
    SQL Operations Studio.


    ***Figure 9-7.  **Results from reading the system_health Extended Events session*


