    [microsoft.com/rhel/7/mssql-server-2017/](https://packages.microsoft.com/rhel/7/mssql-server-2017/)
    is the actual location of the RPM packages for SQL Server for RHEL. Following
    is an example showing how I execute the `curl` command on my system:


    ```

    [thewandog@bwsql2017rhel ~]$ sudo curl – o /etc/yum.repos.d/mssql-server.repo
    https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

    ```


    Then Figure 2-4 shows what the output looks like.


    **Figure 2-4. Example output of downloading the repository configuration file
    for RHEL**


    ## Do the Install of the SQL Server Engine


    Now that the repo file is copied, it is time to perform the installation of SQL
    Server on Linux on RHEL.


    ```

    sudo yum install -y mssql-server

    ```


    One thing I’ve enjoyed about getting back into Linux is the history of how various
    part of the operating system made its way into the distributions. `yum` stands
    for (YellowDog Updater Modifier). Its origins trace back to a free distribution
    called Yellow Dog Linux and is the primary RPM-based package manager for RHEL,
    Fedora, and CentOS.


    ![](index-61_1.png)


    The installation process for the SQL Server RPM package does the following:


    1.  Downloads the binary RPM package file.

    2.  Creates a Linux user and group called `mssql` (this will be the non-interactive
    login and group assigned to SQL Server non-binary files). You cannot change this.

    3.  Extracts out SQL Server binaries and installation files (We will explore all
    these files in a later section of this chapter.).

    4.  Registers SQL Server as a systemd service called `mssql-server`.


    The `-y` parameter used for `yum` in the example syntax stands for “assume yes”
    which means you are automatically asking `yum` to respond “yes” to any prompts.
    For our installation, the only prompt is whether you want to proceed with the
    download.


    Figure 2-5 is a snapshot of the SQL Server installation process in progress when
    using `yum` on RHEL.


    **Figure 2-5. A `yum install` of SQL Server on RHEL in progress**


    ![](index-62_1.png)


    And Figure 2-6 is an example of what a successful installation looks like.


    **Figure 2-6. A completed `yum install` of SQL Server on RHEL**


    ## Complete the Setup of SQL Server


    If you look carefully at this screenshot, the installation provides instructions
    on how to complete the setup of SQL Server:


    **Please run `sudo /opt/mssql/bin/mssql-conf setup` to complete the setup of Microsoft
    SQL Server.**


    Therefore, the command to run is:


    ```

    sudo /opt/mssql/bin/mssql-conf setup

    ```


    This step is necessary so that we can extract out the system databases from the
    downloaded installation files and run `sqlservr` to do a few post install steps.
    `mssql-conf` is a bash shell script copied as part of the installation and executes
    other supporting python scripts to perform various configuration tasks. This script
    takes several options and one of these is called `setup`. You will only use this
    option once after installing SQL Server, but `mssql-conf` supports other options,
    which we will cover later in this chapter.


    The `setup` option of `mssql-conf` does the following:


    1.  Prompts you for the Edition of SQL Server.

    2.  Asks you to accept the end user licensing agreement (EULA). You can read the
    agreement from `/usr/share/doc/mssql-server`.

    3.  Prompts for the password of the SQL Server system administrator account called
    `sa`.


    **Tip**: The SQL Server account `sa` is the default system administrator account.
    In a later chapter in the book, I will talk about how to add other login accounts
    to SQL Server. It is very important that you remember the password for the `sa`
    account. `mssql-conf` does provide an option to reset the `sa` password. Also
    note the `sa` password must be a “complex” password (as do all passwords for logins
    for SQL Server on Linux). The requirements are: at least eight characters long
    and contain'
