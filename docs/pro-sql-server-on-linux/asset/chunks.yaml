    **数据库缓存内存（KB）** 是缓冲池使用的内存量。在此服务器启动时，它仅约为 18MB。


    **目标服务器内存（KB）** 是 SQL Server 可以增长到的潜在内存量。可以将其视为 SQL Server 引擎内使用内存的上限。在此示例中，它约为
