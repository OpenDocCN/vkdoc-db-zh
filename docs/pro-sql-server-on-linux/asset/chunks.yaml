    Base article a[t https://](https://support.microsoft.com/help/2154845/recommendations-to-reduce-allocation-contention-in-sql-server-tempdb-d)


    [support.microsoft.com/help/2154845/recommendations-to-reduce-allocation-](https://support.microsoft.com/help/2154845/recommendations-to-reduce-allocation-contention-in-sql-server-tempdb-d)


    [contention- in-sql-server-tempdb-d](https://support.microsoft.com/help/2154845/recommendations-to-reduce-allocation-contention-in-sql-server-tempdb-d).


    ** Database  Options**


    While the previous section covered some of the more interesting performance


    configuration choices that affect the SQL Server instance, you can also make changes
    at


    the database level to help the performance of your application. All of these options
    are


    configured using the T-SQL ALTER DATABASE statement.


    •  **PARAMETERIZATION**: I discussed in the previous section how


    to minimize the plan cache footprint for ad hoc queries. One


    reason why ad hoc queries can bloat the plan cache is that they


    are not parameterized. Parameterization involves caching a single


    query plan for queries that are almost exactly the same except for


    parameters in the WHERE clause of a T-SQL statement.


    SQL Server by default contains logic to perform  *simple*


    parameterization on ad hoc queries. Simple parameterization


    does not cover a wide range of queries. Therefore, it is possible


    to use the ALTER DATABASE option SET PARAMETERIZATION


    FORCED. Using this database option will cause SQL Server to


    cast a wider net on possible queries to parameterize. So, how


    would you know whether this database option is one to consider?


    Consider these important points:


    •  Applications that submit queries that are not parameterized


    are characterized typically by a high query compile rate. You


    can examine the dm_os_performance_counters DMV where


    object_name = SQLServer:SQL Statistics and counter_name =


    SQL Compilations/sec.


    ChapTer 6   performanCe CapabILITIeS


    •  What is “high”? Well, the second symptom of a possible lack of


    query parameterization is a high CPU utilization for SQL Server.


    This is because a high compilation rate for queries results in a


    higher rate of SQL CPU utilization.


    •  You can use the DMV dm_exec_query_stats to find which


    queries are in plan cache that are the same except for literal


    values using a concept called query hash. You can run a query


    like the following (which can be found in the example script


    **queryhash.sql**) T-SQL batch:


    -- Find out what queries hash to the same value but are


    different in cache


    --


    SELECT dest.text, deqs.query_hash, count (*) query_count


    FROM sys.dm_exec_query_stats deqs


    CROSS APPLY sys.dm_exec_sql_text(deqs.sql_handle) AS dest


    GROUP BY (query_hash), dest.text


    ORDER BY query_count DESC


    GO'
  trans: "\n任何合理的多用户工作负载。\n\n为了使这些并发场景更具可扩展性，你可以通过为 `tempdb` 数据库创建多个数据库文件来改进对这些系统数据库页面的访问。Linux\
    \ 上的 SQL Server 在安装时默认仅提供单个 `tempdb` 数据库文件。因此，在任何拥有一个以上 CPU 的 Linux 服务器上，你都应该计划创建额外的\
    \ `tempdb` 数据库文件。\n\n# 第 6 章 性能特性\n\n来自 SQL Server 客户顾问团队的朋友 Denzil Ribero 创建了一个很好的\
    \ T-SQL 脚本，你可以用它来为我们的 Linux 服务器安装添加多个 `tempdb` 文件。你可以在 [`github.com/denzilribeiro/sqlunattended/blob/master/AddTempdb.sql`](https://github.com/denzilribeiro/sqlunattended/blob/master/AddTempdb.sql)\
    \ 找到这个脚本。你可以在我们的文档 [`docs.microsoft.com/sql/relational-databases/databases/tempdb-database`](https://docs.microsoft.com/sql/relational-databases/databases/tempdb-database)\
    \ 和这篇知识库文章 [`support.microsoft.com/help/2154845/recommendations-to-reduce-allocation-contention-in-sql-server-tempdb-d`](https://support.microsoft.com/help/2154845/recommendations-to-reduce-allocation-contention-in-sql-server-tempdb-d)\
    \ 中阅读更多关于如何确定 `tempdb` 文件大小和数量的内容。\n\n## 数据库选项\n\n虽然上一节介绍了一些影响 SQL Server 实例的、更有趣的重要性能配置选项，但你也可以在数据库级别进行更改，以帮助提升应用程序的性能。所有这些选项都使用\
    \ T-SQL `ALTER DATABASE` 语句进行配置。\n\n-   **PARAMETERIZATION**：我在上一节讨论了如何最小化即席查询的计划缓存占用。即席查询会膨胀计划缓存的一个原因是它们没有被参数化。参数化涉及为那些除了\
    \ T-SQL 语句的 `WHERE` 子句中的参数外几乎完全相同的查询缓存一个单一的查询计划。\n\n    SQL Server 默认包含对即席查询执行*简单*参数化的逻辑。简单参数化涵盖的查询范围不广。因此，你可以使用\
    \ `ALTER DATABASE` 选项 `SET PARAMETERIZATION FORCED`。使用此数据库选项将导致 SQL Server 扩大可能被参数化的查询范围。那么，你如何知道是否应该考虑此数据库选项呢？请考虑以下要点：\n\
    \n    -   提交未参数化查询的应用程序通常以高查询编译率为特征。你可以在 `object_name = 'SQLServer:SQL Statistics'`\
    \ 且 `counter_name = 'SQL Compilations/sec'` 时检查 `dm_os_performance_counters` DMV。\n\
    \n    -   什么是“高”？嗯，可能缺少查询参数化的第二个症状是 SQL Server 的高 CPU 利用率。这是因为查询的高编译率会导致更高的 SQL\
    \ CPU 利用率。\n\n    -   你可以使用 DMV `dm_exec_query_stats` 通过一种称为查询哈希的概念来查找计划缓存中除了字面值外相同的查询。你可以运行如下查询（可以在示例脚本\
    \ `queryhash.sql` 中找到）这样的 T-SQL 批处理：\n\n    ```sql\n    -- 找出哪些查询哈希值相同但在缓存中是不同的\n\
    \    --\n    SELECT dest.text, deqs.query_hash, count (*) query_count\n    FROM\
    \ sys.dm_exec_query_stats deqs\n    CROSS APPLY sys.dm_exec_sql_text(deqs.sql_handle)\
    \ AS dest\n    GROUP BY (query_hash), dest.text\n    ORDER BY query_count DESC\n\
    \    GO\n    ```\n"
- fmt: 'If you run this query and only find the highest counts to be 2 or 3, then
    you probably don’t have any issues. But if the counters for these queries are
    much higher, then you could boost your performance by investigating parameterization
    of queries.


    *   The preceding query is very quick to use but only finds queries whose plans
    are in cache. What if, due to memory pressure, there are plans that could be candidates
    for parameterization but are not in cache. This is where Query Store can be valuable.
    Check out this example in our documentation on how to use Query Store to identify
    ad hoc workloads: [https://docs.microsoft.com/sql/relational-databases/performance/query-store-usage-scenarios](https://docs.microsoft.com/sql/relational-databases/performance/query-store-usage-scenarios).


    One comment about this database option: even if you find the need for query parameterization,
    the best method to resolve the problem is to fix the application. However, if
    you cannot change the application, using this option could prove beneficial.


    As with any option that is not the default, be careful arbitrarily changing this.
    While using this option can reduce query compilations, using this option will
    force many queries to now have the same compiled plan. That may not be the best
    option for some applications.


    ## Chapter 6: Performance Capabilities


    *   **`READ_COMMITTED_SNAPSHOT`**


    A common performance problem for SQL Server application is *blocking*. While I
    always recommend anyone encountering a blocking problem attempt to investigate
    the cause and resolve the issue, there is a database option that can provide relief
    and possibly even be a solution. First, I recommend you read this section in our
    documentation to understand the fundamentals of locking and *row versioning*:
    [https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide](https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide).


    One of the common blocking scenarios involves readers and writers blocking each
    other for common data, especially when these readers and writers are involved
    in long running transactions. One option to avoid these scenarios is to use `ALTER
    DATABASE` and set `READ_COMMITTED_SNAPSHOT ON`. When you use this database option,
    readers in the context of this database will see a snapshot or version of the
    data as of the start of the T-SQL `SELECT` statement, as opposed to using locks.
    There is some overhead required to use this database option within the database
    page and in `tempdb`. This specific documentation link discusses more the requirements
    to use row versioning: [https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide#Row_versioning](https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide#Row_versioning).


    Applications can also use snapshots, and you can read more on snapshots and row
    versions in our documentation at [https://docs.microsoft.com/dotnet/framework/data/adonet/sql/snapshot-isolation-in-sql-server#understanding-snapshot-isolation-and-row-versioning](https://docs.microsoft.com/dotnet/framework/data/adonet/sql/snapshot-isolation-in-sql-server#understanding-snapshot-isolation-and-row-versioning).'
