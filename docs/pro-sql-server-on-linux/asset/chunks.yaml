- fmt: "# Chapter 3: Building a Database and T-SQL Fundamentals\n\n**Resource**: This\
    \ is not the actual name of the database, but it is called the `Resource` database.\
    \ This is a `hidden` system database that is read-only. SQL Server stores system\
    \ objects (not data) in this database, such as system stored procedures, views,\
    \ etc. When you query `sys.databases`, SQL Server understands how to get the databases\
    \ view definition for the `sys` schema from the `Resource` database.\n\n![](index-104_1.jpg)\n\
    \nFor a more detailed look at system databases, check out our documentation at:\
    \ [https://docs.microsoft.com/sql/relational-databases/databases/system-databases](https://docs.microsoft.com/sql/relational-databases/databases/system-databases).\n\
    \n## Creating a Login and User\n\nThe `sa` login is provided with SQL Server as\
    \ the “root” account for complete control. Just like the root account in Linux,\
    \ it is typically not a good practice to use the `sa` login for all your interaction\
    \ with SQL Server.\n\nSo, I will create a new login called `sqllinux`, which I\
    \ will use as the login to create the database and all objects for the rest of\
    \ the chapter. But I first must connect to SQL Server as the `sa` login to create\
    \ the `sqllinux` login. To do this with Visual Studio Code, I need to create a\
    \ `connection profile` for the `sa` login.\n\nIf I hit the F1 key (or use the\
    \ View/Command Palette from the menu in Visual Studio Code), I am presented with\
    \ choices from the mssql extension for various tasks. If I choose the option called\
    \ `MS SQL: Connect`, I’m presented with choices to Add a Connection Profile. In\
    \ my scenario, I picked the name of my SQL Server on Linux (it could be an `<IP\
    \ address>,1433`), used the system administrator login `sa`, put in the password\
    \ for `sa`, but left the database name blank so when I connect I’ll be put in\
    \ the database context of `master`.\n\nI saved the name of the profile, so I can\
    \ reuse it another time. If you go through these steps, Visual Studio Code will\
    \ also connect to the specified SQL Server. You can see the connection information\
    \ in the bottom right-hand corner of the tool. Figure 3-2 shows the example on\
    \ my SQL Server. The `MSSQL` means the editor is in `MSSQL` mode, which means\
    \ the editor will assist me with various T-SQL commands and tasks.\n\n**Figure\
    \ 3-2.** Visual Studio Code editor in MSSQL mode and connected to SQL Server on\
    \ Linux\n\nUse the `sa` login to create a login by using the following T-SQL statements\
    \ as found in the example script `createlogin.sql`. I also add the `sqllinux`\
    \ login to the `dbcreator` role so the `sqllinux` login has permissions to create\
    \ databases. Feel free to change the password to one of your choice.\n\n**Tip**:\
    \ Unlike other SQL Server tools, Visual Studio Code requires you to create a file\
    \ to run T-SQL statements.\n\n```sql\nUSE master\nGO\nIF EXISTS (select * from\
    \ sys.server_principals where name = 'sqllinux')\n    DROP LOGIN [sqllinux]\n\
    GO\nCREATE LOGIN [sqllinux] WITH PASSWORD=N'Sql2017isfast', DEFAULT_DATABASE=[master]\n\
    GO\nEXEC sys.sp_addsrvrolemember 'sqllinux', 'dbcreator'\nGO\n```\n\nWhen I use\
    \ the `sqllinux` login to create the database, it will automatically be mapped\
    \ to a user in the database known as `dbo` (database owner).\n\nTo execute the\
    \ remaining examples in this chapter, I need to create a new connection profile\
    \ in Visual Studio Code with the `sqllinux` login I just created. And now when\
    \ I execute any example script, I use the connection profile for the `sqllinux`\
    \ login.\n\n**Tip**: I should stop at this point and give you a tip on connecting\
    \ to your SQL Server on Linux. My SQL Server on Linux is running `rhel` in a virtual\
    \ machine on my laptop using `hyper-V` for Windows 10. Using `hyper-V`, I configured\
    \ an internal network adapter, so I could bind a static `ip` address to that adapter\
    \ in `rhel`. Then on Windows 10, I edited the `/windows/system32/drivers/etc/hosts`\
    \ file to put in the static `ip` address and the name `bwsql2017rhel`. Now from\
    \ outside of the `VM`."
