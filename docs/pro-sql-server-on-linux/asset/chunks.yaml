- fmt: "Target Server #2 是你要迁移到的新版 SQL Server，\n\n它可以是 Linux 上的 SQL Server。\n\n你应该将这些\
    \ SQL Server 实例设置为非常相似的环境，\n\n包括 CPU、内存、磁盘速度以及 SQL Server 配置。\n\n4. 使用 DEA 工具在**两个目标\
    \ SQL 服务器上**回放从步骤 #2 捕获的跟踪。DEA 工具会要求指定一个位置来保存回放的跟踪文件。\n\n5. 使用 DEA 工具**分析**两个捕获的回放跟踪，以便你可以比较跟踪中查询的性能或可能出现的错误。\n\
    \nDEA 工具会提示你提供一个 SQL Server 数据库存储分析结果，以及步骤 #4 中回放跟踪的位置。\n\n[图 10-3](#index_split_007.html#p521)\
    \ 显示了用于执行所有这些步骤的 DEA 工具初始屏幕。\n\n**图 10-3. Database Experimentation Assistant 工具**\n\
    \n### 第 10 章 迁移到 Linux 上的 SQL Server\n\n早期的 DEA 版本要求你使用 SQL Server 中一个名为 Distributed\
    \ Replay 的功能。你仍然可以使用那种方法，但从 DEA 版本 2.6 开始，你可以使用 *InBuilt* 回放方法。InBuilt 回放方法内部使用一个名为\
    \ `ostress.exe` 的工具。也许你记得在上一章我提到了我在微软的一位同事 Keith Elmore？许多年前，当 Keith 刚加入微软技术支持部门时，他很快发现了使用多个并发线程执行查询或\
    \ T-SQL 脚本来对 SQL Server 进行压力测试的需求。Keith 一直是一位出色的程序员，因此他构建了一个使用 ODBC 的工具 `ostress.exe`。Keith\
    \ 和 Robert Dorr 进一步合作扩展了 `ostress.exe`，使其能够回放捕获的 SQL Server 工作负载跟踪。Keith 和 Robert\
    \ 将这些工具捆绑在一起，组成了一个名为 RML Utilities 的工具包。RML Utilities 可以从 [https://www.microsoft.com/download/details.aspx?id=4511](https://www.microsoft.com/download/details.aspx?id=4511)\
    \ 免费下载。\n\n不幸的是，`ostress.exe` 和 RML Utilities 不能在 Linux 上原生运行（我们有一个内部版本的 `ostress.exe`\
    \ 通过 SQLPAL 运行，但目前尚未准备好发布），但如果你仍有 Windows 客户端可以连接到 Linux 上的 SQL Server，你可能会发现使用\
    \ `ostress.exe` 和 RML Utilities 是一套非常棒的工具。\n\n在 Linux 上的 SQL Server 使用 DEA 需要一些特殊的配置。DEA\
    \ 工具的开发者 Mollee Jain 给了我这些说明，是使 DEA 在 Linux 上工作所必需的（Mollee 的打算是将其写入 Data Migration\
    \ 博客）。\n\n你必须设置文件夹权限，以允许回放在 Linux 服务器上创建文件。用户可以通过多种方式设置此权限，但挂载共享文件夹可能是最简单的进展方式，因为它不需要重新配置防火墙。\n\
    \n*   要在 Linux 系统中挂载一个指定了 `uid` 和 `gid` 的共享文件夹，你可以使用如下 CIFS 命令：\n    ```\n   \
    \ sudo mount.cifs //DEA/LinuxShare /var/opt/mssql/LinuxShare -o user=sqladmin,vers=2.0,dir_mode=0777,file_mode=0777,uid=996,gid=994\n\
    \    ```\n    **注意** 有几种方法可以设置你的 Linux 服务器以将文件写入你的 Windows 服务器。一种方法是使用 Samba，你可以在\
    \ [https://app.pluralsight.com/library/courses/advanced-network-system-administration-lfce/table-of-contents](https://app.pluralsight.com/library/courses/advanced-network-system-administration-lfce/table-of-contents)\
    \ 了解更多相关信息。\n\n*   在 DEA 回放步骤中，如果回放到 Linux，他们将需要提供 Linux 路径（即 `/var/opt/mssql/LinuxShare`）。\n\
    \n### 第 10 章 迁移到 Linux 上的 SQL Server\n\n在捕获和回放跟踪以及使用报告进行评估时，DEA 有几个方面需要考虑。DEA\
    \ 系列博客在练习使用此工具评估性能和执行方面提供了很好的示例和技巧..."
  raw: 'Target Server #2 is the new version of SQL Server you are migrating towards,


    which can be SQL Server on Linux.


    You should set up these SQL Server instances with very identical environments


    in terms of CPU, memory, disk speeds, and SQL Server configurations.


    4.  Use the DEA tool to **replay** the captured trace from Step #2 on


    both target SQL Servers. The DEA tool will ask for a location to


    save a trace of the replay.


    5.  Use the DEA tool to **analyze** the two captured replay traces so you can


    compare performance or possible errors from queries in the trace.


    The DEA tool will prompt you for an SQL Server database to store the


    analysis results and the location of the replayed traces from Step #4.


    Figur[e 10-3 sho](#index_split_007.html#p521)ws the DEA tool initial screen to
    perform all of these steps.


    ***Figure 10-3.  **The Database Experimentation Assistant tool*


    ChApter 10   MigrAting to SQL Server on Linux


    Earlier versions of DEA required you to use a feature in SQL Server called Distributed


    Replay. You can still use that method but as of DEA version 2.6, you can use the 
    *InBuilt*


    replay method. The InBuilt replay method internally uses a tool called **ostress.exe**.
    Perhaps


    you remember in the last chapter I mentioned a colleague of mine at Microsoft
    named


    Keith Elmore? Many years ago, when Keith first joined Microsoft in Technical Support,


    he quickly saw the need to stress SQL Server with multiple concurrent threads
    executing


    queries or a T-SQL script. Keith has always been a brilliant programmer, so he
    built a


    tool called ostress.exe, which uses ODBC. Keith and Robert Dorr collaborated further
    to


    expand ostress.exe to be able to replay captured traces of SQL Server workloads.
    Keith


    and Robert bundled these tools together into a toolkit called RML Utilities. RML
    Utilities


    is free to download a[t https://www.microsoft.com/download/details.aspx?id=4511. ](https://www.microsoft.com/download/details.aspx?id=4511)


    Unfortunately, ostress.exe and RML Utilities do not run natively on Linux (we
    have an


    internal version of ostress.exe running using SQLPAL but it is not something ready
    to


    release at this time) but if you still have Windows clients that can connect to
    SQL Server on


    Linux, you may find the use of ostress.exe and RML Utilities to be a very nice
    set of tools.


    Using DEA with SQL Server on Linux requires some special configuration. Mollee


    Jain, a developer for the DEA tool, gave me these instructions that are required
    to make


    DEA work for Linux (Mollee’s intention is to get this into the Data Migration
    blog).


    You have to set up folder permissions to allow for replay to create files on the
    Linux


    Server. The user can set this up in many different ways, but mounting a shared
    folder


    may be the easiest way to progress because it doesn’t require firewall reconfiguration.


    •  To mount a shared folder in the Linux system with uid + gid specified,


    you can use a command like the following using CIFS:


    sudo mount.cifs //DEA/LinuxShare /var/opt/mssql/


    LinuxShare -o user=sqladmin,vers=2.0,dir_mode=0777,


    file_mode=0777,uid=996,gid=994


    **Note**  there are several methods to set up your Linux Server to write files
    to your


    Windows Server. one method is to use Samba, which you can learn more about at


    [https://app.pluralsight.com/library/courses/advanced-network-](https://app.pluralsight.com/library/courses/advanced-network-system-administration-lfce/table-of-contents)


    [system-administration-lfce/table-of-contents.](https://app.pluralsight.com/library/courses/advanced-network-system-administration-lfce/table-of-contents)


    •  Within the DEA replay step, they will need to provide the Linux path


    if they are replaying to Linux (i.e., /var/opt/mssql/LinuxShare).


    ChApter 10   MigrAting to SQL Server on Linux


    There are several aspects of DEA to consider when capturing and replaying traces


    and using reports for assessments. The DEA set of blogs have good examples and
    tips as


    you go through the exercise of using this tool to assess the performance and execution'
  trans: "\n目标服务器 #2 是你要迁移到的新版 SQL Server，\n\n它可以是 Linux 上的 SQL Server。\n\n你应该将这些\
    \ SQL Server 实例设置为非常相似的环境，\n\n包括 CPU、内存、磁盘速度以及 SQL Server 配置。\n\n4. 使用 DEA 工具在**两个目标\
    \ SQL 服务器上**回放从步骤 #2 捕获的跟踪。DEA 工具会要求指定一个位置来保存回放的跟踪文件。\n\n5. 使用 DEA 工具**分析**两个捕获的回放跟踪，以便你可以比较跟踪中查询的性能或可能出现的错误。\n\
    \nDEA 工具会提示你提供一个 SQL Server 数据库存储分析结果，以及步骤 #4 中回放跟踪的位置。\n\n图 10-3 显示了用于执行所有这些步骤的\
    \ DEA 工具初始屏幕。\n\n**图 10-3. 数据库实验助手 工具**\n\n### 第 10 章 迁移到 Linux 上的 SQL Server\n\
    \n早期的 DEA 版本要求你使用 SQL Server 中一个名为分布式重放的功能。你仍然可以使用那种方法，但从 DEA 版本 2.6 开始，你可以使用\
    \ *InBuilt* 回放方法。InBuilt 回放方法内部使用一个名为 `ostress.exe` 的工具。也许你记得在上一章我提到了我在微软的一位同事\
    \ Keith Elmore？许多年前，当 Keith 刚加入微软技术支持部门时，他很快发现了使用多个并发线程执行查询或 T-SQL 脚本来对 SQL Server\
    \ 进行压力测试的需求。Keith 一直是一位出色的程序员，因此他构建了一个使用 ODBC 的工具 `ostress.exe`。Keith 和 Robert\
    \ Dorr 进一步合作扩展了 `ostress.exe`，使其能够回放捕获的 SQL Server 工作负载跟踪。Keith 和 Robert 将这些工具捆绑在一起，组成了一个名为\
    \ RML Utilities 的工具包。RML Utilities 可以从 [`www.microsoft.com/download/details.aspx?id=4511`](https://www.microsoft.com/download/details.aspx?id=4511)\
    \ 免费下载。\n\n不幸的是，`ostress.exe` 和 RML Utilities 不能在 Linux 上原生运行（我们有一个内部版本的 `ostress.exe`\
    \ 通过 SQLPAL 运行，但目前尚未准备好发布），但如果你仍有 Windows 客户端可以连接到 Linux 上的 SQL Server，你可能会发现使用\
    \ `ostress.exe` 和 RML Utilities 是一套非常棒的工具。\n\n在 Linux 上的 SQL Server 使用 DEA 需要一些特殊的配置。DEA\
    \ 工具的开发者 Mollee Jain 给了我这些说明，是使 DEA 在 Linux 上工作所必需的（Mollee 的打算是将其写入数据迁移博客）。\n\n\
    你必须设置文件夹权限，以允许回放在 Linux 服务器上创建文件。用户可以通过多种方式设置此权限，但挂载共享文件夹可能是最简单的进展方式，因为它不需要重新配置防火墙。\n\
    \n*   要在 Linux 系统中挂载一个指定了 `uid` 和 `gid` 的共享文件夹，你可以使用如下 CIFS 命令：\n    ```\n   \
    \ sudo mount.cifs //DEA/LinuxShare /var/opt/mssql/LinuxShare -o user=sqladmin,vers=2.0,dir_mode=0777,file_mode=0777,uid=996,gid=994\n\
    \    ```\n    **注意** 有几种方法可以设置你的 Linux 服务器以将文件写入你的 Windows 服务器。一种方法是使用 Samba，你可以在\
    \ [`app.pluralsight.com/library/courses/advanced-network-system-administration-lfce/table-of-contents`](https://app.pluralsight.com/library/courses/advanced-network-system-administration-lfce/table-of-contents)\
    \ 了解更多相关信息。\n\n*   在 DEA 回放步骤中，如果回放到 Linux，他们将需要提供 Linux 路径（即 `/var/opt/mssql/LinuxShare`）。\n\
    \n### 第 10 章 迁移到 Linux 上的 SQL Server\n\n在捕获和回放跟踪以及使用报告进行评估时，DEA 有几个方面需要考虑。DEA\
    \ 系列博客在练习使用此工具评估性能和执行方面提供了很好的示例和技巧...\n"
