- fmt: 'query plan includes all the details of query operators that are used to execute
    the query.


    You can view the estimated query plan for any query by first executing the T-SQL
    commands:


    `SET SHOWPLAN_ALL ON`: Return all the operators in the estimated query plan in
    the form of a table result set but do not execute the query.


    `SET SHOWPLAN_TEXT ON`: Return all the operators in the estimated query plan in
    the form of a text result but do not execute the query.


    `SET SHOWPLAN_XML ON`: Return all the operators in the estimated query plan in
    the form of an XML document. The format of the XML schema for SHOWPLAN is documented
    at [http://schemas.microsoft.com/sqlserver/2004/07/showplan/](http://schemas.microsoft.com/sqlserver/2004/07/showplan/).


    **Note**  T-SQL `SET` commands are used to turn on and off a *setting*. If you
    use `SET` to turn on a setting, that setting will be enabled for the lifetime
    of the session until you execute the same `SET` command to turn it off. Multiple
    settings can be enabled for a single SQL Server session. For a complete list of
    all T-SQL `SET` commands, see our documentation at [https://docs.microsoft.com/sql/t-sql/statements/set-statements-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/set-statements-transact-sql).


    ![](index-226_1.jpg)


    Chapter 5   SQL Server Tools


    Figure 5-37 shows the example output when I use `SET SHOWPLAN_XML ON` with the
    query `SELECT * FROM sys.databases`:


    ```

    SET SHOWPLAN_XML ON

    GO

    SELECT * FROM sys.databases

    GO

    ```


    **Figure 5-37.  `SET SHOWPLAN_XML` in SQL Operations Studio**


    If you click the XML results, SQL Operations Studio will open the XML document.
    SQL Operations Studio automatically recognizes when you run `SET SHOWPLAN_XML`
    and will generate a graphical version of the estimated plan in the `QUERY PLAN`
    tab next to `RESULTS`. Figure 5-38 shows the graphical query plan for `SELECT
    * FROM sys.databases`.


    ![](index-227_1.jpg)


    Chapter 5   SQL Server Tools


    **Figure 5-38.  Graphical Query Plan in SQL Operations Studio**


    When you use a `SET SHOWPLAN*` command, it remains in effect for that session
    until you turn it off by using `SET SHOWPLAN* OFF`. SQL Operations Studio has
    another method to show the estimated query plan without using a `SET` command
    called *Explain*. If I execute `SET SHOWPLAN_XML OFF` and then type in `SELECT
    * FROM sys.databases` in the Query Editor, I can click `Explain` at the top of
    the Query Editor to get `SHOWPLAN_XML` details.


    In addition, if I hover my cursor over any operator I can get further query operator
    details. Figure 5-39 shows the details of a query plan operator from the previous
    example.


    ![](index-228_1.jpg)


    Chapter 5   SQL Server Tools


    **Figure 5-39.  Query Plan operator details in SQL Operations Studio**


    Next to the `QUERY PLAN` tab in SQL Operations Studio is another option called
    `TOP OPERATORS`. `TOP OPERATORS` shows a table of query plan operators and statistics
    with each operator sorted by estimated cost of each operator.


    While using the `SET SHOWPLAN*` T-SQL statements show the estimated query plan,
    you can use T-SQL to show the actual execution plan while executing the query.
    The actual execution plan is produced *after* the query is executed and includes
    important performance statistics about the execution of the query and each query
