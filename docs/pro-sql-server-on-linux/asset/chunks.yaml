    # DBCC Commands


    When I joined Microsoft in 1993, I already knew the SQL language well, based on
    the `ANSI SQL Standard`. I learned quickly that `T-SQL` was based on the `ANSI`
    standard but like other database engines had extended the command set for various
    purposes. One of the first unique `T-SQL` commands I learned was `DBCC` (Database
    Console Commands).


    The basic syntax of `DBCC` is:

    ```

    DBCC <command>(command parameters)

    ```

    You can find the complete list of documented `DBCC` commands (there are still
    many undocumented ones, but you should not rely on their behavior or existence)
    in our documentation at [https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-transact-sql](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-transact-sql).


    By the time I was working on `SQL Server 7.0`, the command set for `DBCC` had
    exploded. Since that time, we have made a conscious effort to reduce the need
    for `DBCC` commands other than `CHECKDB`. But there are plenty of commands that
    remain. Here are the top five `DBCC` commands I use on a regular basis:


    ## DBCC CHECKDB

    Use this command to check the logical and physical consistency of the database.
    It is the most often used `DBCC` command. Our documentation covers syntax, options,
    best practices, and details of how `CHECKDB` works at [https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-checkdb-transact-sql](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-checkdb-transact-sql).
    You can also find a lot of information about `CHECKDB` and opinions about how
    often it needs to be run from the SQL Server community.


    ChapTer 5   SQL Server TooLS


    ## DBCC DROPCLEANBUFFERS

    This command is extremely useful for testing disk `I/O` with `SQL Server`. This
    `DBCC` command will free up any database pages in memory so that any future `SELECT`
    statements must force pages to be read from disk. I use this command in demos
    and testing all the time to see how fast I can read database pages in from disk
    for a table or set of objects.


    ## DBCC SHRINKDATABASE

    Let’s say you created a database of `100GB` but you are only using `50GB` of space
    within the files. Now you want to reduce the size of the database files on disk
    to `60GB` without creating a new database and copying over data. `DBCC SHRINKDATABASE`
    can provide that functionality. You can find the syntax and options of this command
    in our documentation at [https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-shrinkdatabase-transact-sql](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-shrinkdatabase-transact-sql).


    ## DBCC TRACEON

    The next section in this chapter is about trace flags, although I’ve mentioned
    trace flags a few times already in this book. I’ll discuss the details of how
    to use this `DBCC` command to turn on and off trace flags in the next section.
    You can find the documentation of `DBCC TRACEON` at [https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-transact-sql](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-transact-sql).


