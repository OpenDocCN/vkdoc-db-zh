    # 第 6 章：性能能力


    ## WideWorldImportersDW 中的聚集列存储索引


    您可以下载 [WideWorldImportersDW-Full.bak](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak)
    文件。我还提供了 `cpwwidw.sh`、`restore_wwidw_linux.sql` 和 `restorewwidw.sh` 脚本，以帮助您复制和还原此示例。


    使用示例脚本 `wwidw_cci.sql` 中的以下 T-SQL 语句，找出 WideWorldImportersDW 数据库中哪些表具有聚集列存储索引：


    ```sql

    USE [wideworldimportersdw]

    GO

    SELECT OBJECT_NAME(object_id) as table_name, name, type_desc

    FROM sys.indexes

    -- type = 5 means clustered columnstore index

    WHERE type = 5

    GO

    ```


    ![图 6-20 展示了使用 SQL Operations Studio 的结果。](img/index-320_1.jpg)


    **图 6-20. WideWorldImportersDW 数据库中的聚集列存储索引**


    ## 行组消除与查询性能


    现在，让我们对 `Sales` 表（属于 `Fact` 架构）运行一些查询，以了解列消除和行组消除的工作原理。首先，使用以下 T-SQL 语句（位于示例脚本
    `fact_sales_count.sql` 中）找出整个 `Fact.Sales` 表中的行数：


    ```sql

    USE [wideworldimportersdw]

    GO

    SELECT COUNT(*) FROM Fact.Sale

    GO

    ```


    您应该会得到 228,265 行的结果。数据仓库数据库中的许多事实表使用 `datetime` 列，因为按时间存储仓库数据很常见。对于 `Fact.Sales`
    表，有两个 `datetime` 列，但数据是按 `[Delivery Date Key]` 列排序的。这正是聚集列存储索引的行组消除的神奇之处。SQL Server
    为行组中每个段的值范围存储了元数据。如果数据按特定列排序，SQL Server 就可以根据查询条件跳过某些行组。


    尝试运行示例脚本 `fact_sales_all.sql` 中的以下 T-SQL 语句：


    ```sql

    USE [wideworldimportersdw]

    GO

    SET STATISTICS IO ON

    GO

    SET STATISTICS XML ON

    GO

    SELECT * FROM Fact.Sale

    WHERE [Delivery Date Key] >= ''2016-01-01''

    GO

    ```


    如果您查看 `SET STATISTICS IO` 的结果，应该会看到类似这样的内容：


    ```

    Table ''Sale''. Scan count 1, logical reads 0, physical reads 0, read-ahead reads
    0, lob logical reads 240, lob physical reads 0, lob read-ahead reads 0.

    Table ''Sale''. Segment reads 2, segment skipped 5.

    ```


    `lob logical reads` 的值是 SQL Server 为满足此查询需要从聚集列存储索引的缓存中读取的数据量（注意：如果未指定 `WHERE`
    子句，在此情况下 `lob logical reads` 大约为 805）。SQL Server 将列存储索引存储为 LOB 数据，这就是使用此计数器来衡量读取量的原因。显示段读取和跳过段的第二组输出具有误导性。这实际上应读取为“读取的行组”和“跳过的行组”。这意味着此聚集列存储索引总共有七个行组，但由于行组消除，SQL
    Server 能够跳过其中五个。


    现在执行示例脚本 `fact_sales_query.sql` 中的此 T-SQL 语句：


    ```sql

    USE [wideworldimportersdw]

    GO

    SET STATISTICS IO ON

    GO

    SET STATISTICS XML ON

    GO

    SELECT [Customer Key], Quantity

    FROM Fact.Sale

    WHERE [Delivery Date Key] >= ''2016-01-01''

    GO

    ```


    在此示例中，我只请求两个列（或段）并使用相同的 `WHERE` 子句。`SET STATISTICS IO` 结果现在如下所示：


    ```

    Table ''Sale''. Scan count 1, logical reads 0, physical reads 0, read-ahead reads
    0, lob logical reads 36, lob physical reads 0, lob read-ahead reads 0.

    Table ''Sale''. Segment reads 2, segment skipped 5.

    ```


    跳过了相同数量的行组，但由于我只使用了两列，需要的段更少，因此所需的读取量显著降低。这就是列存储的威力。在数据仓库场景中，由于列消除和行组消除，SQL Server
    可以极大地加速对大数据扫描的查询。

    '
