- fmt: '# Chapter 7: Security in SQL Server


    ## Using AD Authentication


    error messages that I found out can be ignored. A successful join of the domain
    looked like Figure 7-5.


    **Figure 7-5.** A successful join to the domain of Linux Server


    In addition, while I can use `kinit` on the Linux server to “login to the domain”
    as described in the documentation, I wanted to login through `ssh` to my Linux
    Server using my AD domain account. I encountered an `Access Denied` error until
    I ran this command:


    `realm permit -all`


    **Note:** you can use `realm permit` to only allow logins to specific AD users
    instead of all users.


    ## Permissions and Access


    I’ve shown you how to create logins and users to access the SQL Server instance
    and database with both SQL Server Authentication and Active Directory Authentication.
    This represents the basic functionality to log in to SQL Server and connect to
    a database. But what about access to everything inside the database, like tables?
    What about access to run all the various T-SQL commands that apply to SQL Server,
    databases, and objects (called *securables*)? SQL Server provides a system to
    grant and revoke access for access to securables directly to logins, users, and
    a concept called roles.


    Like many systems, SQL Server has a hierarchy of permissions starting with the
    `sa` account (remember you specified the `sa` account during install). The `sa`
    account (like `root` in Linux) is *supreme* when it comes to permissions. I’ll
    discuss a technique where you can disable the `sa` account to make your SQL Server
    more secure once you have installed SQL Server (see the section on Roles and Permissions).


    If you want a deep dive into all the securable options for SQL Server, take a
    look at this PDF poster at [https://aka.ms/sql-permissions-poster](https://aka.ms/sql-permissions-poster).


    ## Grant and Revoking Access


    T-SQL provides two statements to grant and revoke access to securables: respectively,
    `GRANT` and `REVOKE`. A complete list of possible securables can be found in the
    documentation of the T-SQL `GRANT` statement at [https://docs.microsoft.com/sql/t-sql/statements/grant-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/grant-transact-sql).


    By default, logins and users will have some form of basic access to a certain
    set of securables. The process of securing SQL Server and all of your securables
    will be:


    • Decide what securables and access a specific login and/or user needs and use
    the `GRANT` command to grant these logins and users access.


    • Decide if you want to revoke access to some securables for some logins and/or
    users.


    While you can use the `GRANT` command to grant access to securables to specific
    logins and/or users, it may be more effective to grant access to a concept called
    *roles* and then revoke access to specific logins and/or users based on your security
    needs.


    In addition, instead of granting access to roles to specific objects, it can be
    more efficient to group objects into schemas and grant access to the schema. I’ve
    discussed the concept of schemas in previous chapters of the book while describing
    the fundamentals of creating objects like tables and views.


    ## Roles and Permissions


    Roles provide a convenient method to grant (or revoke) access to a group of logins
    or users. For example, you can create a role and then add logins or users to that
    role. You can then grant permissions to the role, and all members of the role
    inherit those permissions.


    If you want to use a tool like `SQL Server Management Studio`, you would log in
    as your AD Domain user and use Windows Authentication to connect to your Linux
    Server. `SQL Operations Studio` supports the same type of authentication (read
    more details at [https://docs.microsoft.com/sql/sql-operations-studio/enable-kerberos](https://docs.microsoft.com/sql/sql-operations-studio/enable-kerberos)).


    Once I went through the steps in the documentation and maneuvered around the preceding
    issues, I was able to successfully use a command like this:


    ```bash

    sqlcmd -E

    ```


    and was able to successfully start executing queries logged in as an AD user to
    SQL Server.'
