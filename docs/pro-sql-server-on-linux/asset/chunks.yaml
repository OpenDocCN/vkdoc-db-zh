    | **磁盘** | **挂载目录** | **用途** |

    | :--- | :--- | :--- |

    | `/dev/sdc1` | `/data1` | 数据库文件 |

    | `/dev/sdd1` | `/data2` | 数据库文件 |

    | `/dev/sde1` | `/data3` | 数据库文件 |

