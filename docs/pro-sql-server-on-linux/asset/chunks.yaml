- fmt: '# Chapter 7: Security in SQL Server


    ## Certificate Requirements


    Furthermore, there are specific requirements for certificates to be used with
    this feature. See our documentation for certificate requirements at [https://docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#requirements-for-certificates](https://docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#requirements-for-certificates).


    Read through the instruction carefully for server-initiated encryption (force
    all connections) at [https://docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#server-initiated-encryption](https://docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#server-initiated-encryption)
    and client-initiated encryption at [https://docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#client-initiated-encryption](https://docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#client-initiated-encryption).


    If you read through these instructions you will notice that the steps are absolutely
    identical except for this one step:


    ```

    sudo /opt/mssql/bin/mssql-conf set network.forceencryption 1

    ```


    A value of 1 is used to force all connections to be encrypted, while a value of
    0 is for client-initiated encryption scenarios.


    Our documentation includes a few errors you might encounter using encrypted connections
    at [https://docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#common-connection-errors](https://docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#common-connection-errors).
    Figure 7-10 shows an example of the error you will get when you try to use an
    encrypted connection but you have not set up encryption on SQL Server.


    ### Figure 7-10. An error connecting to SQL Server when encryption is not configured


    One note of guidance in our documentation is that your client machine has to support
    TLS 1.2. I honestly have never even concerned myself with whether my client computers
    support TLS 1.2, so I did a bit of research and found this very handy website
    to test my version of TLS: [https://www.ssllabs.com/ssltest/viewMyClient.html](https://www.ssllabs.com/ssltest/viewMyClient.html).
    Figure 7-11 shows the results on my Windows laptop.


    ### Figure 7-11. Using the ssllabs.com website to check TLS support on client


    ## Always Encrypted


    If you combine SQL Server connection encryption with TDE, your data is encrypted
    from the client to the server and also for data stored on disk. However, there
    are two issues with just these solutions:


    *   Data is not encrypted in memory in database pages.

    *   There is no separation of control over the keys for encryption, since the
    SQL Server Administrators control the encryption keys and certificates.


    SQL Server has a feature to fill some of these gaps and provide an end-to-end
    encryption solution called **Always Encrypted**. The best way to describe Always
    Encrypted is with a diagram. Figure 7-12 shows the overall architecture of Always
    Encrypted.


    ### Figure 7-12. Always encrypted in SQL Server on Linux


    On the Server side of this diagram is your database, with columns in tables you
    deem necessary to encrypt.


    The process to set up Always Encrypted is to create a `column master key` where
    you supply the location of the key from a key store provider (hence separate of
    key administration). Then you create a `column encryption key` for column(s) you
    want to encrypt, specifying the column master key. While SQL Server administrators
    will create the column encryption key, the column master key is provided by someone
    else who manages a `key store` separate from SQL Server. So the only way to read
    encrypted data with this method is to use an application that has an SQL Server
    library that supports Always Encrypted and the location of the column master key.
    This means that even SQL Server administrators would not be able to decrypt the
    columns you choose. SQL Server administrators are needed to set up the database
    to encrypt certain columns, but they don’t have full control to decrypt the data.


    The application and the owners of the column master key have complete control
    over decryption. Furthermore, the data in the columns that are encrypted are encrypted
    in the application, across the connection to SQL Server, and in the data columns,
    whether they are in memory or written to disk. SQL Server will store metadata
    such as the encrypted column encrypted keys and only the location of the key store
    for the column master key.


    Examples of SQL Server libraries that support Always Encrypted are [https://docs.microsoft.com/sql/connect/odbc/using-always-encrypted-with-the-odbc-driver](https://docs.microsoft.com/sql/connect/odbc/using-always-encrypted-with-the-odbc-driver)
    and [https://docs.microsoft.com/sql/connect/php/using-always-encrypted-php-drivers](https://docs.microsoft.com/sql/connect/php/using-always-encrypted-php-drivers).


    To go through the process of configuring Always Encrypted, follow the steps in
    the documentation with the SQL Server Managed Studio Wizard at [https://docs.microsoft.com/en-us/azure/sql-database/sql-database-always-encrypted](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-always-encrypted).


    Even though this is a very elegant solution to provide a transparent, end-to-end
    solution to encrypt column data, there are some considerations for using this
    feature for SQL Server on Linux:


    *   The only method today to create column encryption keys and specify column
    master keys uses tools that run on Windows, including SQL Server Management Studio
    and Powershell (Note: Powershell is supported now on Linux but there are no other
    methods supported currently native to Linux). SSMS comes with a cool wizard to
    walk you through the process at [https://docs.microsoft.com/sql/relational-databases/security/encryption/configure-always-encrypted-using-sql-server-management-studio](https://docs.microsoft.com/sql/relational-databases/security/encryption/configure-always-encrypted-using-sql-server-management-studio).

    *   Depending on how you configure Always Encrypted, there could be some limitations
    on how you are able to execute queries on columns that are encrypted (especially
    when you are searching for a value or range of values). See these types of restrictions
    in our documentation at [https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine#feature-details](https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine#feature-details).'
