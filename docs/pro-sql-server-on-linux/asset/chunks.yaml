    not take advantage of the good page on the secondary? That is exactly what SQL
    Server provides with a feature called **Automatic Page Repair**.


    Here is how it works. If the primary replica detects that a database page from
    a database in the AG is damaged (for example a `checksum` error on a page), it
    will request'
