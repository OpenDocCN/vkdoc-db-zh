    setup`的命令行选项。重建系统数据库的问题在于，所有系统数据库会被一起重建。如果你有部分系统数据库的备份，你完全可以先重建系统数据库，然后再恢复已有的备份。人们很容易忘记，像`msdb`这样的系统数据库确实保存着重要信息，例如备份历史记录和
