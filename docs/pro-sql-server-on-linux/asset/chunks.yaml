- fmt: '## Chapter 6


    automation. Why not bake into the engine some automation behind the rich telemetry
    of Query Store? Turns out the folks in our engineering team that own the Query
    Store feature were already working on these kinds of features in the cloud for
    Azure SQL Database. Using our cloud-first approach for engineering, we started
    working on these features in Azure, tested and verified their functionality, and
    then brought them to SQL Server 2017.


    I have a demo you can try yourself (surprise! It uses the `WideWorldImporters`
    database) for SQL Server on Linux using SQL Operations Studio. I encourage you
    to go through the entire example, which can be found in the `autotune` directory
    for the examples for this chapter or on my GitHub site at [https://github.com/Microsoft/bobsql/tree/master/demos/sqlserver/sqllinux/autotune](https://github.com/Microsoft/bobsql/tree/master/demos/sqlserver/sqllinux/autotune).
    Just follow the instructions in the `readme.md` file. When you run this demo you
    will notice I used the charting feature for SQL Operations Studio I showed you
    earlier in this chapter in a new way. Figure 6-22 shows an example of the chart
    from SQL Operations Studio after Automatic Tuning corrected a query plan regression
    problem from the demo.


    **Figure 6-22. Automatic Tuning demonstrated with SQL Operations Studio**


    The chart shown in Figure 6-22 measures `batch requests/sec`, which is a standard
    method to measure SQL Server query throughput. Note how performance goes down
    on the right-hand side of the chart but automatically picks back up to expected
    levels quickly.


    Almost everyone I’ve shown this demo to has been amazed. My recommendation to
    use this feature is the following:


    - Enable Query Store and configure it to your needs. See our documentation on
    best practices at [https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store](https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store).

    - Monitor any recommendations we have for you by examining the DMV, `dm_db_tuning_recommendations`.

    - If you are comfortable with our recommendations, experiment with turning on
    Automatic Plan Correction using this T-SQL syntax:

    ```

    ALTER DATABASE current

    SET AUTOMATIC_TUNING ( FORCE_LAST_GOOD_PLAN = ON );

    ```

    - Whether you just look at recommendations or use automation, I always recommend
    you find the cause of the query plan regression problem and take a more long-term
    corrective action.


    If you want to follow along and watch me demonstrate Automatic Tuning with SQL
    Server on Linux, catch this demo video I posted on the SQL Server YouTube Channel,
    [https://youtu.be/Sh8W7IFX390](https://youtu.be/Sh8W7IFX390).


    ## Summary


    My intent in this chapter was to make sure you understand what is possible for
    performance for SQL Server on Linux. I’ve covered the built-in capabilities of
    performance that you can trust from SQL Server, from scalability on your laptop
    to the largest enterprise servers in the industry. I’ve shown you important configuration
    choices both for SQL Server and Linux. And I’ve talked about how tuning can be
    achieved using the right balance of indexes, maintaining statistics, and taking
    advantage of the right T-SQL usage in your application. You have also seen how
    to take advantage of new technology to accelerate performance from columnstore
    indexes to intelligent performance capabilities such as Automatic Tuning. Armed
    with this knowledge, it’s time to ensure you understand how to secure your SQL
    Server and learn important security features and options when running on Linux.


