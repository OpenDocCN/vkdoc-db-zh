    by Microsoft to help you explore the features of SQL Server. This sample database
    is provided in the form of a backup you can restore (which I showed you in Chapter
    [2](#index_split_001.html#p46) as a method to help verify your SQL Server installation).
    It is also available as a project, so you can execute all the commands to build
    the database from scratch. You can find the documentation for this sample database
