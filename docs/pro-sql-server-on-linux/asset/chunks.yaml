- fmt: '# Chapter 3 Building a Database and T-SQL Fundamentals


    ## 1. **cleanup.sql**: I added this script, so you could run these scripts over
    and over.

    `cleanup.sql` is required to drop all databases from any previous executions.
    Even though the `WideWorldImporters` is dropped in step 3, if you have already
    created it in the context of the `sqllinux` login, you will not be allowed to
    drop and create the login again without dropping the database first.


    ## 2. **createlogin.sql**: Create the `sqllinux` login (while connected as the
    `sa` login).


    ## 3. **dropandcreatedb.sql**: Create the database.

    This will now make the `sqllinux` login the user `dbo` (database owner) in the
    `WideWorldImporters` databases when the context is changed to `WideWorldImporters`.


    ## 4. **createschemas.sql**: Create the schemas for all objects in the database.


    ## 5. **createsequences.sql**: Create the sequence objects to be used by the two
    tables.


    ## 6. **createpeople.sql**: Create the `People` table with constraints.


    ## 7. **createcustomers.sql**: Create the `Customers` table with constraints.


    Now everything is ready for you to test out some T-SQL queries to insert data,
    query data, update and delete rows.


    ## Building and Running Queries


    I recommend creating and testing T-SQL queries you want to use for an application
    through a separate tool, so you can ensure there are no syntax errors and run
    as expected. It is far easier to debug your T-SQL commands outside of your application
    then weaved throughout the code. So, in this section of the chapter, I’ll show
    you how to insert, update, delete, and view data using basic T-SQL statements.
    The example statements and scripts in this section assume you have run all the
    preceding scripts to create the database and objects. As with the scripts to create
    the database and objects in this chapter, I executed all the following T-SQL statements
    and scripts with the `sqllinux` login.


    ### Inserting and Reading Data


    For purposes of this chapter, I will talk about simple insert of data of single
    rows. You have several options to insert data in *bulk*, and I’ll talk about those
    in other chapters of the book.


    The basic T-SQL statement to insert data is `INSERT`. When you insert data into
    a table with foreign keys, you need to first insert rows into the base table.
    This means you should first insert any rows in the `People` table that are needed
    as foreign keys in the `Customers` table.


    In the `Customers` table these columns are referenced back to the `People` table:


    - `AlternateContactPersonID`

    - `LastEditedBy`

    - `PrimaryContactPersonID`


    When you insert a single row for a customer, you need to provide `PersonID` values
    for these columns. It could be all the same “person” but more likely it will be
    at least two or three different people. And if you remember in the `People` table,
    there is a `LastEditedBy` column that references another row in the `People` table.
    My strategy then is to create three rows in the `People` table, one is the “editor”
    of any rows in both tables, and then a primary and alternate contact ID for the
    customer.


    Execute the following T-SQL statements or use the sample script `insertpeople.sql`
    to insert all three rows in the `People` table:


    ```sql

    USE [WideWorldImporters]

    GO

    INSERT INTO [Application].[People]

    ([PersonID], [FullName], [PreferredName], [IsPermittedToLogon],

    [LogonName], [IsExternalLogonProvider], [IsSystemUser],

    [IsEmployee], [IsSalesPerson], [LastEditedBy])

    VALUES (0, ''Robert Dorr'', ''TheKraken'', 1, ''rdorr'', 0, 1, 1, 0, 0)

    GO

    INSERT INTO [Application].[People]

    ([FullName], [PreferredName], [IsPermittedToLogon],

    [LogonName], [IsExternalLogonProvider], [IsSystemUser],

    [IsEmployee], [IsSalesPerson], [LastEditedBy])

    VALUES (''Slava Oks'', ''thegodfather'', 1, ''slavao'', 0, 1, 1, 0, 0)

    GO

    INSERT INTO [Application].[People]

    ([FullName], [PreferredName], [IsPermittedToLogon],

    [LogonName], [IsExternalLogonProvider], [IsSystemUser],

    [IsEmployee], [IsSalesPerson], [LastEditedBy])

    VALUES (''Tobias Ternstrom'', ''theswede'', 1, ''tobiast'', 0, 1, 1, 0, 0)

    GO

    ```'
