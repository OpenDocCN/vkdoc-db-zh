  trans: '# 第 8 章 SQL Server 的高可用性与灾难恢复


    `重做（Redo）`：从事务日志中最旧的活动事务开始，重做所有已提交但尚未反映在事务所列数据库页上的事务（这也称为前滚事务）。SQL Server 可以使用多个工作线程并行执行此操作，这是我们在
    SQL Server 2016 中为加速恢复性能而进行的一项优化。


    `撤销（Undo）`：从事务日志中最旧的活动事务开始，确保所有未提交的事务不会反映在事务所列的数据库页上（这也称为回滚）。


    SQL Server 通过查看所谓的 `日志序列号`（`LSN`）来理解如何比较事务日志中的事务以及它是否已反映在数据库页上。每个事务都标记有一个 `LSN`，任何被修改的数据库页都具有修改它的事务的
    `LSN`。`LSN` 值按顺序递增。因此，很容易比较日志中的 `LSN` 和数据库页上的 `LSN`，并了解该更改是否已应用。


    在某些情况下，对于企业版，SQL Server 可以使用 `快速恢复`，在重做阶段之后，在获取撤销操作锁的同时允许数据库变为联机状态。这种情况不适用于还原，而是适用于数据库被联机的情况，例如
    SQL Server 的崩溃恢复（在意外关闭之后）。


    理解恢复的概念对于还原序列很重要，要知道恢复何时应用于包含在数据库或日志备份中的事务。


    ![](img/index-403_1.jpg)


    ## 还原数据库


    让我们从还原完整数据库备份的一些基础知识开始来看还原操作。使用本章前面创建的备份（`wwi.bak`），执行以下 T-SQL 语句，如示例脚本 `restorewwiheaderonly.sql`
    中所示：


    ```

    RESTORE HEADERONLY FROM DISAL = ''/var/opt/mssql/data/wwi.bak''

    GO

    ```


    此还原选项将检查备份文件（MTF 格式），并返回备份文件元数据头中包含的信息。这对于了解备份中包含的信息很有帮助（尤其是当您不确定备份中有什么时）。


    图 8-4 显示了此命令的结果。


    **图 8-4. SQL Server 中的 `RESTORE HEADERONLY`**


    ![](img/index-404_1.jpg)


    数据库备份中的元数据之一是所有数据库文件和日志文件的原始文件路径。当您还原备份时，SQL Server 将尝试在数据库备份时的确切文件路径位置创建这些文件以构建数据库。如果您尝试还原的备份其原始文件路径不存在（并且您无法创建它们），这可能会给您带来问题。因此，您将必须使用
    `RESTORE` T-SQL 语句支持的语法来移动数据库和/或日志文件。但是，您如何知道要移动的文件及其原始路径呢？这就是 `RESTORE` 的一个非常方便的选项
    `FILELISTONLY` 存在的原因。执行以下 T-SQL 语句，如示例 `restorewwifilelistonly.sql` 中所示：


    ```

    RESTORE FILELISTONLY FROM DISK = ''/var/opt/mssql/data/wwi.bak''

    GO

    ```


    您的结果应该类似于图 8-5。


    **图 8-5. SQL Server 中的 `RESTORE FILELISTONLY`**


    从结果中，您可以看到文件的逻辑名称和物理文件路径。所以，假设您想要还原此备份，但不是将数据库放在其原始文件路径中，而是需要在不同目录中创建它们。


