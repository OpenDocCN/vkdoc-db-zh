    \n## 创建登录名与用户\n\nSQL Server 提供了 `sa` 登录名作为拥有完全控制权的“root”账户。就像 Linux 中的 root 账户一样，通常不建议在所有与\
    \ SQL Server 的交互中都使用 `sa` 登录名。\n\n因此，我将创建一个名为 `sqllinux` 的新登录名，并在本章剩余部分使用它来创建数据库及所有对象。但我必须先以\
    \ `sa` 登录名连接到 SQL Server，才能创建 `sqllinux` 登录名。要在 Visual Studio Code 中完成此操作，我需要为\
