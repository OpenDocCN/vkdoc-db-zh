- fmt: "# Docker Compose 概览与示例\n\nBuilding a Docker container image using a Dockerfile\
    \ is a great concept to build a single container. However, in many situations\
    \ an application will use multiple containers with a dependency between them such\
    \ as a web application and a database. Therefore, Docker provides a capability\
    \ called `compose` that allows you to build and run a set of containers including\
    \ references to Dockerfiles and dependencies. You can read the complete reference\
    \ on docker compose at [https://docs.docker.com/compose/overview](https://docs.docker.com/compose/overview).\n\
    \nAgain, let’s use the example from [https://github.com/Microsoft/sqllinuxlabs/tree/master/containers](https://github.com/Microsoft/sqllinuxlabs/tree/master/containers)\
    \ lab to show you an example (Note: this example is similar to an example in the\
    \ Docker documentation you can read at [https://docs.docker.com/compose/aspnet-mssql-compose](https://docs.docker.com/compose/aspnet-mssql-compose)).\n\
    \nFor this example, I have two containers I need for my application:\n*   An SQL\
    \ Server container that includes a database called `ProductCatalog`. In this case,\
    \ I have a T-SQL script I’d like to run that creates the databases, logins, users,\
    \ objects, and populates data.\n*   A container that contains an ASP.NET application\
    \ based on .NET Core that will access the `ProductCatalog` database connecting\
    \ and running queries against the SQL Server container. You will see that using\
    \ the compose process with Docker will allow the application to connect to a logical\
    \ name that maps to the SQL Server container.\n\n## 使用 Docker Compose 部署多容器应用示例\n\
    \nLet’s go through the process of composing the application using Docker and then\
    \ I’ll explain a few details on how these containers work:\n\n1.  First, we need\
    \ to install the `docker-compose` package using the following commands from the\
    \ `bash` shell:\n\n    ```bash\n    sudo curl -L https://github.com/docker/compose/releases/download/1.21.2/docker-compose-$(uname\
    \ -s)-$(uname -m) -o /usr/local/bin/docker-compose\n    sudo chmod +x /usr/local/bin/docker-compose\n\
    \    sudo ln -s /usr/local/bin/docker-compose /usr/bin/docker-compose\n    ```\n\
    \n2.  Change directory to the directory where all the files are located, running\
    \ the following command from the `bash` shell:\n\n    ```bash\n    cd sqllinuxlabs/containers/mssql-aspcore-example\n\
    \    ```\n\n3.  Edit the `docker-compose.yml` file and put in your `sa` password\
    \ in place of the value of the environment variable `SA_PASSWORD` (I use the `nano`\
    \ editor). A `docker-compose.yml` file is a YAML file (YAML stands for YAML Ain’t\
    \ Markup Language), which is used to define container images, services, and dependencies.\
    \ I’ll describe below more about how this file works. Think of this file as the\
    \ launching point to build the Docker images and run the containers.\n\n4.  Edit\
    \ the file `./mssql-aspcore-example-db/db-init.sh` and put in the `sa` password\
    \ for the `-P` parameter that is used for `sqlcmd`.\n\n    ![](index-583_1.png)\n\
    \n    Chapter 11 SQL Server and Containers\n\n5.  Run the following command from\
    \ the `bash` shell to compose the Docker application, which will build the Docker\
    \ images and run the containers:\n\n    ```bash\n    sudo docker-compose up\n\
    \    ```\n\n    A lot of information is going to scroll by as this executes. Figure\
    \ 11-2 shows the `docker compose` in progress in my Linux `ssh` session.\n\n \
    \   **Figure 11-2.** Docker compose in progress\n\n    The containers are not\
    \ run in the background, so when the compose is finished your screen may look\
    \ like Figure 11-3.\n\n    ![](index-584_1.jpg)\n\n    ![](index-584_2.png)\n\n\
    \    Chapter 11 SQL Server and Containers\n\n    **Figure 11-3.** Status in `ssh`\
    \ after `docker compose` starts containers\n\n6.  To run the application I need\
    \ to open up a port for my Azure Virtual machine. The ASP.NET application is listening\
    \ on port `5000`. See the instructions at [https://github.com/Microsoft/sqllinuxlabs/tree/master/open_azure_vm_port](https://github.com/Microsoft/sqllinuxlabs/tree/master/open_azure_vm_port)."
  raw: 'Building a Docker container image using a Dockerfile is a great concept to
    build a single


    container. However, in many situations an application will use multiple containers
    with a


    dependency between them such as a web application and a database. Therefore, Docker


    provides a capability called  *compose* that allows you to build and run a set
    of containers


    including references to Dockerfiles and dependencies. You can read the complete


    reference on docker compose a[t https://docs.docker.com/compose/overview](https://docs.docker.com/compose/overview).


    Again, let’s use the example fr[om https://github.com/Microsoft/sqllinuxlabs/](https://github.com/Microsoft/sqllinuxlabs/tree/master/containers)


    [tree/master/containers l](https://github.com/Microsoft/sqllinuxlabs/tree/master/containers)ab
    to show you an example (Note: this example is similar to an example in the Docker
    documentation you can read a[t https://docs.docker.com/](https://docs.docker.com/compose/aspnet-mssql-compose)


    [compose/aspnet-mssql-compose](https://docs.docker.com/compose/aspnet-mssql-compose)).
    For this example, I have two containers I need for my application:


    •  An SQL Server container that includes a database called


    ProductCatalog. In this case, I have a T-SQL script I’d like to run that


    creates the databases, logins, users, objects, and populates data.


    Chapter 11   SQL Server and ContainerS


    •  A container that contains an ASP.NET application based on .NET


    Core that will access the ProductCatalog database connecting and


    running queries against the SQL Server container. You will see that


    using the compose process with Docker will allow the application to


    connect to a logical name that maps to the SQL Server container.


    Let’s go through the process of composing the application using Docker and then
    I’ll


    explain a few details on how these containers work:


    1.  First, we need to install the docker-compose package using the


    following commands from the bash shell:


    sudo curl -L https://github.com/docker/compose/releases/


    download/1.21.2/docker-compose-$(uname -s)-$(uname -m) -o /usr/


    local/bin/docker-compose


    sudo chmod +x /usr/local/bin/docker-compose


    sudo ln -s /usr/local/bin/docker-compose /usr/bin/docker-compose


    2.  Change directory to the directory where all the files are located,


    running the following command from the bash shell:


    cd sqllinuxlabs/containers/mssql-aspcore-example


    3.  Edit the **docker-compose.yml** file and put in your sa password


    in place of the value of the environment variable SA_PASSWORD


    (I use the nano editor). A docker-compose.yml file is a YAML


    file (YAML stands for YAML Ain’t Markup Language), which is


    used to define container images, services, and dependencies. I’ll


    describe below more about how this file works. Think of this file


    as the launching point to build the Docker images and run the


    containers.


    4.  Edit the file **./mssql-aspcore-example-db/db-init.sh** and put in


    the sa password for the -P parameter that is used for sqlcmd.


    ![](index-583_1.png)


    Chapter 11   SQL Server and ContainerS


    5.  Run the following command from the bash shell to compose the


    Docker application, which will build the Docker images and run


    the containers:


    sudo docker-compose up


    A lot of information is going to scroll by as this executes. Figur[e 11-2](#index_split_008.html#p583) shows
    the


    docker compose in progress in my Linux ssh session.


    ***Figure 11-2.  **Docker compose in progress*


    The containers are not run in the background, so when the compose is finished
    your


    screen may look like Figure [11-3](#index_split_008.html#p584).


