    从我 1993 年开始使用 SQL Server 起，就有两个 **虚拟表** 提供有关 SQL Server 内部执行的信息，这些信息基于引擎中的内部数据结构：`sysprocesses`
    和 `syslocks`（以及引用它们的存储过程 `sp_who` 和 `sp_lock`）。这些视图将连接、查询和锁的内部数据结构以行和列的形式呈现出来。


    多年来，这是唯一能够基于内存结构提供 SQL Server 引擎执行洞察的视图。由于我在技术支持领域工作的这些年，如果我想了解引擎内其他内存结构的情况，我必须捕获
    `SQLSERVR.EXE` 进程的用户转储文件，并使用 Windows 调试器手动检查结构列表。虽然这迫使我深入了解 SQL Server 引擎，但这并非解决问题的有效方式。


    后来，SQL Server 团队来了一位名叫 Slava Oks 的人（你能看出这里有个趋势吗）。Slava 与一组工程师合作构建了 SQLOS 平台，这仍然是核心引擎架构的一部分。Slava
    是调试专家，但他有一个目标：看看在不使用调试器的情况下，他能用 SQLOS 解决多少问题。根据 Slava 的想法，如果您能连接到 SQL Server，您就可以使用
    T-SQL 来“实时调试” SQL Server 引擎的细节。


    ### 视图


    Slava 和他的团队采纳了虚拟表的概念，并将其扩展为一系列视图，这些视图暴露了来自 SQLOS 结构的信息，例如任务、线程、工作线程和内存。这项工作促使引擎团队内的其他小组开始暴露关于其他结构的信息。


    在 SQL Server 2005 中，我们将所有这些视图收集到一个称为动态管理视图的新特性中。

    '
- fmt: "# Chapter 5   SQL Server Tools\n\n## Management Views (DMV) and Dynamic Management\
    \ Functions (DMF)\n\nYou can query DMVs like any user or catalog view and you\
    \ use DMFs as you would with any T-SQL function. (Note: DMFs, like functions,\
    \ require parameters)\n\n**Tip** Intellisense is your friend when it comes to\
    \ DMVs and DMFs. Typing in `sys.dm_` will bring up a complete list of DMVs and\
    \ DMFs supported in SQL Server.\n\nThese views from SQL Server 2005 still provide\
    \ the core functionality of DMVs such as `sys.dm_exec_requests`, `sys.dm_os_tasks`,\
    \ and `sys.dm_wait_stats`. In SQL Server 2017 on Linux and Windows, there are\
    \ now approximately 240 DMVs and DMFs covering all aspects of the SQL Server engine.\n\
    \nDMVs and DMFs prove the open nature of T-SQL and the concept of exposing data\
    \ as a table as a powerful tool to gain insight into any data, whether it be data\
    \ from a user table, system table, or a list of structures that support the database\
    \ engine.\n\nA complete list of DMVs and DMFs can be found listed by category\
    \ in our documentation at [https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/system-dynamic-management-views](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/system-dynamic-management-views).\
    \ DMVs and DMFs require the `VIEW SERVER STATE` permission, which can be assigned\
    \ by `sysadmin` logins.\n\nMany of these DMVs and DMFs are related and can be\
    \ joined together. The SQL Server community over the years has published examples\
    \ for different scenarios in various blogs and trainings. One of the most popular\
    \ uses of DMVs comes from the community-developed stored procedure, `sp_whoisactive`,\
    \ written by SQL Community Leader Adam Machanic (and is now extended into SQL\
    \ Operations Studio). You can find details and downloads for `sp_whoisactive`\
    \ from [http://whoisactive.com](http://whoisactive.com).\n\nHere is a list of\
    \ my top ten DMVs and DMFs and example queries for each DMV/DMF:\n\n### dm_exec_requests\n\
    \nA list of active queries and background requests. It is probably the most common\
    \ DMV used today by SQL Server users.\n\nThe following query, found in the sample\
    \ `dm_exec_requests.sql` file, shows a list of active user queries and details\
    \ about the query including `session_id` (uniquely identifies a connection to\
    \ SQL Server), `status` (is it running or waiting), `command` (what query is running),\
    \ `wait_type` (if the query is waiting, what kind of resource), and `wait_time`\
    \ (how long has it been waiting on a resource). You will also notice I join this\
    \ DMV with `sys.dm_exec_sessions` so I only show the active “user” requests.\n\
    \n```sql\n-- Get the session_id, status (RUNNING or SUSPENDED), command (what\
    \ query),\n-- wait_type (if waiting what resource?), and wait_time (how long waiting)\
    \ for\n-- active user requests\n--\nSELECT er.[session_id], er.[status], er.[command],\
    \ er.[wait_type],\n       er.[wait_time]\nFROM sys.dm_exec_requests er\nINNER\
    \ JOIN sys.dm_exec_sessions es\n    ON es.[session_id] = er.[session_id]\n   \
    \ AND es.[is_user_process] = 1\nGO\n```\n\nThere are more columns in this DMV.\
    \ Check out the complete options in our documentation at [https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-requests-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-requests-transact-sql).\
    \ You can find a complete set of options for `sys.dm_exec_sessions` at [https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-sessions-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-sessions-transact-sql)."
