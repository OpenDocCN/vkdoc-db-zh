  trans: '

    # 系统数据库恢复


    在本章的备份部分中，我提到你可以像用户数据库一样备份 `master`、`model` 和 `msdb`。现在，让我们逐个讨论恢复这些系统数据库备份的过程。


    ## msdb


    这是三个数据库中最容易恢复的，因为即使此数据库不可访问或已损坏，SQL Server 仍然可以启动。因此，在 SQL Server 运行时恢复 `msdb`
    的过程与任何用户数据库完全相同。


    **提示** 我怎么知道这点？这很容易测试。首先，关闭 SQL Server。然后简单地重命名 `msdbdata.mdf` 文件并重新启动 SQL Server。你可以使用此方法来测试任何系统数据库不可用时
    SQL Server 的行为。


    ## model


    如果 `model` 数据库存在问题但仍可访问，那么你应该能够在 SQL Server 在线时恢复该数据库。但是，如果 `model` 数据库无法启动，SQL
    Server 将尝试启动但会立即关闭。幸运的是，这里有一个很好的技巧来恢复 `msdb`。使用 `mssql-conf` 启用跟踪标志 `3608`（它表示不要打开除
    `master` 之外的任何数据库），然后启动 SQL Server。你应该能够进入并恢复 `msdb` 备份。完成此操作后，关闭 SQL Server，禁用跟踪标志，然后重新启动服务。


    ## master


    与 `model` 类似，如果 `master` 数据库可用，你可以恢复 `master` 的备份，但必须在以“单用户模式”启动 SQL Server 之后（我们的文档在
    [`docs.microsoft.com/sql/linux/sql-server-linux-troubleshooting-guide#start-sql-server-in-minimal-configuration-or-in-single-user-mode`](https://docs.microsoft.com/sql/linux/sql-server-linux-troubleshooting-guide#start-sql-server-in-minimal-configuration-or-in-single-user-mode)
    告诉了你如何操作）。恢复 `master` 后，SQL Server 默认会关闭。如果 `master` 数据库不可用，SQL Server 将立即无法启动。在某些情况下，如果你以“单用户模式”启动
    SQL Server 并启用跟踪标志 `3607`（此跟踪标志告诉 SQL Server 不要恢复 `master`），你仍然可以恢复 `master` 的备份。


    如果这些数据库的任何备份都不可用，而你需要它们正常运行怎么办？有一个选项可以从安装时的原始状态重建系统数据库。系统数据库存储在第 2 章提到的某个 `.sfp`
    文件中。重建这些数据库的方法记录在 [`docs.microsoft.com/sql/linux/sql-server-linux-troubleshooting-guide#rebuild-system-databases`](https://docs.microsoft.com/sql/linux/sql-server-linux-troubleshooting-guide#rebuild-system-databases)。


    你可以在我们的文档中阅读有关此工具的更多信息：[`docs.microsoft.com/sql/relational-databases/backup-restore/restore-and-recovery-overview-sql-server#DRA`](https://docs.microsoft.com/sql/relational-databases/backup-restore/restore-and-recovery-overview-sql-server#DRA)。


