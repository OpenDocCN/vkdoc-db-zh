    那么，让我们来探讨一下在 SQL Server on Linux 中备份和还原数据库的基础知识和细节，包括一个重要的相关主题：数据库恢复。


    ### 数据库备份'
- fmt: '# 高可用性和灾难恢复


    我还没有向你展示过备份的示例，但我们已经使用了 T-SQL `RESTORE` 语句来恢复 `WideWorldImporters` 数据库备份（在本书的这个阶段，你可能已经对此感到厌倦了）。此外，我确实在第[7]章中讨论了加密备份。备份数据库的基础知识相当简单。更复杂的是制定一个好的备份策略来满足我们的应用程序和业务需求。


    ## 完整数据库备份


    让我们从讨论备份开始，使用 `WideWorldImporters` 数据库的一个简单示例。假设你只想备份数据库的当前状态。你可以使用以下 T-SQL 语句来实现，以
    `sa`（或数据库所有者或 `db_backupoperator` 角色的成员）身份连接，使用你最喜欢的 SQL Server 工具（或本书示例中你可能使用的任何数据库所有者）。


    此语句可以在示例 **`backupwwi.sql`** 中找到：


    ```

    BACKUP DATABASE WideWorldImporters

    TO DISK = ''/var/opt/mssql/data/wwi.bak''

    WITH INIT, STATS=5, CHECKSUM

    GO

    ```


    在 SQL Operations Studio 中运行此语句的结果如图[8-1]所示。


    **图 8-1.** `WideWorldImporters` 数据库的完整数据库备份


    此语句的结果是 `WideWorldImporters` 数据库的一个*完整数据库备份*，写入一个名为 `/var/opt/mssql/data/wwi.bak`
    的文件（文件扩展名没有要求，我使用 `.bak` 作为一种帮助我识别文件类型的方法）。默认情况下，SQL Server 会将备份文件写入 `/var/opt/mssql/data`
    目录，但你可以使用 `mssql-conf` 更改此目录（请参阅我们的文档：`https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf#backupdir`）。一个完整数据库备份包含数据库文件中所有已分配的页面、活动的事务日志以及有关备份的元数据。SQL
    Server 备份的内部格式由 Microsoft Tape Format (MTF) 协议定义。这不是一个开源协议，你真的不需要知道备份格式的内部结构（但如果你真的、真的感兴趣，这个网站记录了原始协议：`http://laytongraphics.com/mtf/MTF_100a.PDF`）。


    > **提示：** 想查看 MTF 的一些细节吗？启用跟踪标志 3216 和 3605，你可以在 `errorlog` 文件中看到这些细节。跟踪标志 3216
    未被记录或支持，因此我不建议在生产环境中使用。请记住，`mssql-conf` 可用于设置跟踪标志，如我们的文档所述：`https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf#traceflags`。


    我在这个 `BACKUP DATABASE` 命令中使用了几个相当常见的选项：


    **`TO DISK`**：`DISK` 是一种备份设备类型，也是最常用的。我们技术上支持 `TAPE`（不幸的是，我职业生涯的很大一部分时间都在处理客户的
    SQL Server 磁带备份问题。我知道，这暴露了我的年龄）和一种称为 `URL` 的类型。`URL` 是一个很好的功能，允许你将数据库直接备份到 Azure
    Blob Storage。有关更多信息，请参阅我们的文档：`https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service?view=sql-server-2017`。磁盘备份的路径可以是任何有效的
    Linux 路径，包括来自网络或本地磁盘的挂载点。唯一的要求是 `mssql` 用户必须具有对目标目录的写入权限。


    **`WITH INIT`**：默认情况下，SQL Server 允许你将多个备份保存到单个文件中。使用 `INIT` 基本上会覆盖当前文件中已有的任何内容（如果文件已存在）。如果你没有指定
    `INIT`，默认行为是将当前备份附加到文件的末尾。


    > **提示：** 你可能还想考虑同时使用 `FORMAT` 和 `INIT` 来完全启动一个新的格式化备份文件。我遇到过一些情况，我想覆盖磁盘上现有的文件，但该备份文件已损坏。我需要使用
    `FORMAT` 和 `INIT` 来完全启动一个新文件（或者先删除磁盘上的现有文件）。


    **`STATS=5`**：`STATS` 是一个按完成百分比显示的“进度指示器”选项。我包含它是为了演示备份是由并行工作线程执行的。在接下来讨论结果时，我会详细解释我的意思。如果你有一个需要按需运行的、异常长的备份，`STATS`
    也可以很方便地查看其进度。


    **`CHECKSUM`**：默认情况下，SQL Server 使用校验和算法来确保数据库页面在写入磁盘后物理上是一致的。我将在本书后面详细讨论这一点。基于相同的概念，备份文件也可以有一个校验和。


    使用此选项会做两件事：


    1.  如果数据库启用了 `PAGE_VERIFY` 选项的校验和，备份操作将在读取每个页面时验证数据库页面校验和。如果校验和失败，备份将失败（除非使用了
    `CONTINUE_AFTER_ERROR` 选项）。

    2.  为整个备份文件计算一个校验和，并与备份 MTF 格式化文件一起存储。我将在本章后面讨论如何使用 `RESTORE` 有效地利用这一点来验证备份文件。


    你可以通过使用服务器配置选项 `backup checksum default` 为所有备份默认启用校验和，如文档所述：`https://docs.microsoft.com/sql/database-engine/configure-windows/backup-checksum-default`。


    除了 `BACKUP` 命令结果中的“stats”消息外，其他消息指示了为数据库的每个文件组和事务日志备份了多少数据库页面。这可以让你了解备份的大小。请记住，只有已分配的页面才会被备份，因此备份通常不比数据库文件本身大。此外，最后一条消息指示了数据库中备份的总页面数、备份执行的总时长以及备份速度。


    其他有关备份的元数据和信息记录在 `ERRORLOG` 中，包含如下消息：


    ```

    Database backed up. Database: WideWorldImporters, creation date(time):

    2018/06/29(01:36:22), pages dumped: 60981, first LSN: 626:25064:2, last

    LSN: 627:18664:1, number of dump devices: 1, device information: (FILE=1,

    TYPE=DISK: {''/var/opt/mssql/data/wwi.bak''}). This is an informational

    message only. No user action is required.

    ```


    > **提示：** 一些用户发现每个备份命令都带有这些消息会使 `errorlog` 变得嘈杂。因此，你可以使用跟踪标志 3226 来抑制备份消息。'
  raw: 'I’ve not shown you an example of a backup yet, but we have used the T-SQL
    RESTORE


    statement to restore the WideWorldImporters database backup (you may be tired
    of


    doing that at this point in the book). Furthermore, I did talk about encrypting
    backups


    in Chapter [7](#index_split_005.html#p338). The fundamentals of backing up your
    database are quite simple. It is the


    mechanics of developing a good backup strategy to meet the needs of our application


    and business that is more complex.


    ** Full Database Backup**


    Let’s start the discussion of backups with an easy example using the


    WideWorldImporters database. Let’s say you just want to take a backup of the current


    state of the database. You could do that with this T-SQL statement connected as
    sa (or


    a database owner or a member of the db_backupoperator role) with your favorite
    SQL


    Server tool (or whatever database owner you may be using from examples in the
    book).


    This statement is found in the example **backupwwi.sql:**


    ![](index-391_1.jpg)


    Chapter 8   high availability and disaster reCovery for sQl server


    BACKUP DATABASE WideWorldImporters


    TO DISK = ''/var/opt/mssql/data/wwi.bak''


    WITH INIT, STATS=5, CHECKSUM


    GO


    The results of running this in SQL Operations Studio look like Figure [8-1](#index_split_005.html#p391).


    ***Figure 8-1.  **A full database backup of the WideWorldImporters database*


    The result of this statement is a  *full database backup* of the WideWorldImporters


    database written to a file called /var/opt/mssql/data/wwi.bak (there is no requirement


    on the file extension. I use .bak as a method to help me know the type of file).
    By default,


    SQL Server will write backup files to the /var/opt/mssql/data directory, but you
    can


    change this with mssql-conf (see our documentation at [https://docs.microsoft.com/](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf#backupdir)


    [sql/linux/sql-server-linux-configure-mssql-conf#backupdir](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf#backupdir)).
    A full database backup contains all the allocated pages from database files, the
    active transaction log,


    and metadata about the backup. The internal format of an SQL Server backup is
    defined


    by the Microsoft Tape Format (MTF) protocol. This is not an open source protocol,
    and


    you really don’t need to know the internals of what is in the backup format (but
    if you are


    really, really interested, this website has the original protocol documented a[t http://](http://laytongraphics.com/mtf/MTF_100a.PDF)


    [laytongraphics.com/mtf/MTF_100a.PDF).](http://laytongraphics.com/mtf/MTF_100a.PDF)


    Chapter 8   high availability and disaster reCovery for sQl server


    **Tip**  Want to see some of the details of Mtf? enable trace flags 3216 and


    3605 and you can see these details in the errorlog file. trace flag 3216 is


    not documented or supported, so i do not recommend using this in production.


    remember mssql-conf can be used to set trace flags, as discussed in our


    documentation a[t https://docs.microsoft.com/sql/linux/sql-server-](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf#traceflags)


    [linux-configure-mssql-conf#traceflags](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf#traceflags).


    I used a few options with this BACKUP DATABASE command that are fairly


    common:


    **TO DISK**: DISK is a type of backup device and is the most


    common one used. We technically support TAPE (unfortunately,


    I spent a great deal of my career dealing with SQL Server tape


    backup problems for customers. I know, showing my age) and


    a type called **URL**. URL is a nice feature that allows you to back


    up a database directly to Azure Blob Storage. Se[e https://docs.](https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service?view=sql-server-2017)


    [microsoft.com/sql/relational-databases/tutorial-sql-](https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service?view=sql-server-2017)


    [server-backup-and-restore-to-azure-blob-storage-service ](https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service?view=sql-server-2017)


    in our documentation for more information. The path for a disk


    backup can be any valid Linux path, including mounted drives


    from networks or local disks. The only requirement is that the


    mssql user must have permissions to write to the target directory.


    **WITH INIT**: SQL Server by default allows you to save multiple


    backups into a single file. Using INIT basically overwrites


    anything in the current file if it already exists. If you didn’t


    specify INIT, the default would be to append the current backup


    to the end of the file.


    **Tip**  you may also want to consider using forMat as well with init to


    completely start a new formatted backup file. i’ve seen situations where i wanted


    to back up over an existing file on disk, but the backup file was damaged. i


    needed to use forMat and init to completely start a new file (or remove the


    existing file on disk first).


    Chapter 8   high availability and disaster reCovery for sQl server


    **STATS=5**: STATS is a “progress indicator” option by percent


    compete. I included this to demonstrate backups are executed


    by parallel workers. I’ll discuss what I mean by this when talking


    more about the results just following this. STATS can also be


    handy if you have an exceptionally long backup to run on-demand


    to see its progress.


    **CHECKSUM**: By default, SQL Server uses a checksum algorithm


    to ensure database pages are physically consistent after being


    written to disk. I’ll talk more about this later in the book. Based on


    this same concept, backup files can also have a checksum.


    Using this option does two things:


    1.  If the database is enabled for a checksum with the PAGE_VERIFY


    option, the backup operation will verify database page checksums


    as it reads each page. If the checksum fails, the backup will fail


    (unless the CONTINUE_AFTER_ERROR option is used).


    2.  A checksum is computed for the entire backup file and stored


    with the backup MTF formatted file. I’ll talk about how this can be


    effectively used to verify backup files using RESTORE later in the


    chapter.


    You can enable checksum for all backups by default by using the **backup checksum **


    **default** server configuration option, as documented a[t https://docs.microsoft.com/](https://docs.microsoft.com/sql/database-engine/configure-windows/backup-checksum-default)


    [sql/database-engine/configure-windows/backup-checksum-default](https://docs.microsoft.com/sql/database-engine/configure-windows/backup-checksum-default).


    Besides the “stats” messages in the result of the BACKUP command, the other


    messages indicate how many database pages were backed up for each filegroup and


    transaction log of the database. This can give you a feel for the size of the
    backup.


    Remember only allocated pages are backed up, so backups are generally not as large
    as


    the database files themselves. In addition, the last message indicates how many
    total


    pages were backed up in the database, the total duration for the backup to execute,
    and a


    rate of backup speed.


    Chapter 8   high availability and disaster reCovery for sQl server


    Other metadata and information about the backup are recorded in the ERRORLOG


    with a message like this:


    Database backed up. Database: WideWorldImporters, creation date(time):


    2018/06/29(01:36:22), pages dumped: 60981, first LSN: 626:25064:2, last


    LSN: 627:18664:1, number of dump devices: 1, device information: (FILE=1,


    TYPE=DISK: {''/var/opt/mssql/data/wwi.bak''}). This is an informational


    message only. No user action is required.


    **Tip**  some users find having these messages with every backup command makes


    for a noisy errorlog. therefore, you can use trace flag 3226 to suppress backup'
