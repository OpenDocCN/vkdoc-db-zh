- fmt: '# Chapter 4   Building an Application and Advanced T-SQL


    ## Internal Usage of tempdb


    a scope and lifetime only for the duration of a SQL Server session. The syntax
    is the same for creating a stored procedure but with a twist of using the `#`
    symbol in front of the procedure name, as in this T-SQL example, which I provided
    in the sample script `tempproc.sql`:


    ```sql

    CREATE PROCEDURE #tempproc

    AS

    SELECT @@VERSION

    GO

    ```


    Executing the procedure would be like any stored procedure using the `#tempproc`
    name. Like temporary tables, a temporary stored procedure of the same name can
    be created by multiple users concurrently, since each user would have a private
    version of the procedure per their session. And like temporary tables, the definition
    of a temporary stored procedure is kept in the `tempdb` database. There are a
    few reasons to use temporary stored procedures, such as testing out a new procedure
    without storing it in a user database or using it in a long T-SQL script to perform
    a task.


    The other type of temporary object is a global temporary table or stored procedure.
    Global temporary tables are defined by using the same syntax as temporary tables
    except with an extra `#` character in front of the name, as in the following example:


    ```sql

    CREATE TABLE ##globaltemp

    (col1 INT, col2 INT)

    GO

    ```


    Because they are global, only one global temporary table of a given name can exist
    at a time and their scope is across all active user sessions. A global temporary
    table is stored in `tempdb` but is automatically destroyed when all users who
    have referenced the global temporary table have disconnected.


    It is also possible to create global temporary stored procedures. The have the
    same characteristics in scope, visibility, and lifetime as global temporary tables.


    When I’ve presented on the topic of `tempdb`, I’ve often called it the “garbage
    dump” of SQL Server. I know the term has a negative meaning, but it is the reality
    for how `tempdb` is used by SQL Server. What I’ve presented so far in this section
    are *user objects* in `tempdb`. In other words, users decide now many objects
    and how much space they consume.


    SQL Server has other capabilities that require it to store pages of data in `tempdb`
    outside normal user tables. These include storage for versioning, spills for hash
    and sorts, and worktables. You normally don’t worry about these because they are
    implemented within the SQL Server engine. The reality is that they can affect
    your application, especially when it comes to sizing `tempdb` correctly (or more
    importantly the performance of a query).


    SQL Server provides mechanisms to examine the usage of `tempdb` between user and
    internal space at the file, session, and even task (query) level through Dynamic
    Management Views, which will be discussed in Chapter [5](#index_split_003.html#p166).
    If you are up for a detailed study on the topic of `tempdb`, you can listen into
    an in-depth talk I did at a major SQL Server user conference a few years back
    on YouTube at `https://youtu.be/SvseGMobe2w`.


    ## Triggers


    A trigger is a special kind of stored procedure that automatically executes when
    an event occurs in the database server. DML triggers execute when a user tries
    to modify data through a data manipulation language (DML) event such as `INSERT`,
    `UPDATE`, or `DELETE` statements.


    Many years ago, before SQL Server supported declarative foreign key constraints,
    triggers were the recommended method to enforce referential integrity. Think of
    using a trigger in situations where you want some type of action to take place
    when data in a table is modified but you may not have complete control of what
    other queries could be modifying the table. You may build stored procedures to
    wrap all CRUD operations against your tables, but if you want to make sure some
    action takes place for other users not using your procedure, triggers could be
