    \  sql1\n\nLet’s break down the `docker run` command parameters I just used.\n\
    \nThe parameters for `-e` are used for environment variables that are required\
    \ to run SQL Server (similar to what you specify when you run the `mssql-conf`\
    \ script as part of deploying SQL Server on Linux), including accepting the EULA\
    \ and specifying a `sa` password. (Note: These variables are passed to the `sqlservr`\
    \ program.)\n\nThe `-p` parameter is used for port mapping. SQL Server listens\
    \ on port `1433`, but using that port for the container could conflict with port\
    \ `1433` on the host Linux server or other Docker containers for SQL Server. So,\
    \ this parameter maps port `1500` to port `1433` in the container. I’ll show you\
    \ how to use the mapped port when connecting to SQL Server in the container.\n\
    \nThe `--name` parameter allows you to specify a user-friendly name to interact\
    \ with the container with other Docker commands.\n\nThe `-d` parameter says to\
    \ run the container in the background (i.e., detached) so the `docker run` command\
    \ will come back to the bash shell prompt but start the container in the background.\n\
    \n## Chapter 11 SQL Server and Containers\n\nThe final parameter is the name of\
    \ the Docker image, which in this case is `microsoft/mssql-server-linux:2017-latest`.\
    \ Docker will try to find this image locally on the Linux server. If it does not\
    \ exist, it will attempt to first pull that image from the Docker Hub as you saw\
    \ in the results of the `docker run` command previously.\n\nYou can run the following\
    \ command from the bash shell to see the Docker image for SQL Server is now stored\
    \ locally:\n\n```\nsudo docker images\n```\n\nThe results on my Linux server look\
    \ like the following:\n\nREPOSITORY                      TAG                 \
    \ IMAGE ID\nCREATED             SIZE\nmicrosoft/mssql-server-linux    2017-latest\
    \          c90c3ab55158\n13 days ago         1.44GB\n\nNow that the Docker container\
    \ is running, you will want to connect to SQL Server. Let’s use the following\
    \ two methods:\n\n1.  Interact with the container using a Docker command to run\
    \ a bash shell with the following command:\n\n    ```\n    sudo docker exec -it\
    \ sql1 bash\n    ```\n\n    You should now have a shell prompt that looks something\
    \ like this:\n\n    ```\n    root@66e7e043e416:/#\n    ```\n\n    In this example,\
    \ `66e7e043e416` is the container ID and becomes the server name as found in the\
    \ T-SQL statement `@@SERVERNAME`.\n\n    This is a bash shell that allows you\
    \ to run commands within the container (pretty cool, right?). Run the following\
    \ command to use `sqlcmd` (The SQL Server images include the `sqlcmd` tool) within\
    \ the container to connect to SQL Server (put in your `sa` password):\n\n    ```\n\
    \    /opt/mssql-tools/bin/sqlcmd -U SA -P 'Sql2017isfast'\n    ```\n\n    **Note**\
    \ While it is interesting to interact directly with the container using the bash\
    \ shell, most of the interactions you will have with a container will be using\
    \ programs *outside* the container. Be careful making any changes inside the container\
    \ itself unless you are making changes to data or files on a persisted volume\
    \ (which I will describe later in this chapter). Any changes to the container\
    \ not on persisted storage will be lost should you remove the container. You will\
    \ see in the following examples I show you how to run `sqlcmd` both inside the\
    \ container and outside the container. But in these examples I’m making changes\
    \ to an SQL Server database that is on a persisted storage volume.\n\n    Type\
    \ `exit` in `sqlcmd` and type in `exit` to leave this shell.\n\n2.  The second\
    \ method is to use an SQL Server tool outside the container to connect with the\
    \ SQL Server in the container. On this Azure VM, I installed the SQL Server tools\
    \ per the following documentation (https://docs.microsoft.com/sql/linux/quickstart-install-connect-red-hat#tools)."
