    Chapter 11   SQL Server and ContainerS


    ** Build Your Own Container with a Dockerfile**


    What I’ve shown you so far is how to interact with and add data to a Docker container


    from the SQL Server image on the Docker Hub site. Docker containers with SQL


    Server could also help you with another interesting scenario. Let’s say you have


    several developers working on an application with SQL Server. You typically set
    up


    a development server and let the developers access the server. One issue with
    this


    configuration is setting up an environment so developers have a consistent database


    with a consistent version of SQL Server for all of the developers.


    Containers bring a new strategy to this scenario. You could build a Docker image


    based on the SQL Server image and include in the image a backup of the standard


    database you want all developers to use. Then any developer can pull the Docker
    image


    and run a container (like having their own sandbox). In addition, one of the great


    features of Docker images is reusability. You can  *layer* images by creating
    images based


    on other images.


    Let’s use the exact steps from the self-paced labs a[t https://github.com/](https://github.com/Microsoft/sqllinuxlabs/tree/master/containers)


    [Microsoft/sqllinuxlabs/tree/master/containers](https://github.com/Microsoft/sqllinuxlabs/tree/master/containers) to
    show an example of this. (I assume you have run the commands previous in the chapter
    to clone the GitHub repo


    for the labs.)


    1.  Change directory to the **mssql-custom-image-example** folder


    on your Linux server by running the following command from the


    bash shell:


    cd sqllinuxlabs/containers/mssql-custom-image-example


    2.  Create a Dockerfile that has the following contents (I have


    provided in the examples for the book the file **Dockerfile** for


    you to compare) by typing in the following commands from the


    bash shell (Note: when you run the cat command you will get a >


    prompt to type in the rest):


    cat <<EOF>> Dockerfile


    > FROM microsoft/mssql-server-linux:latest


    > COPY ./SampleDB.bak /var/opt/mssql/data/SampleDB.bak


    > CMD ["/opt/mssql/bin/sqlservr"]


    > EOF


    Chapter 11   SQL Server and ContainerS


    When you build the Docker image using the **docker build** command, Docker will
    by


    default look for a file called Dockerfile. Let’s unpack what these commands say
    in the file:


    **FROM microsoft/mssql-server-linux:latest:** This command says to


    pull down the latest SQL Server Docker image as a base image (which is


    based on the Ubuntu base image) for our new image to be created. It is


    possible you want all developers testing and developing on a known


    build, so you could pick a specific CU, which I’ve shown you how to pull


    in the previous section. Note that for SQL Server 2017, microsoft/


    mssql-server-linux:latest and Microsoft/mssql-server-linux:2017-latest


    are the same but we produce two different images for each name.


    **COPY ./SampleDB.bak /var/opt/mssql/data/SampleDB.bak:**


    This command says to copy the SampleDB.bak file in the current


    directory into the Docker container image.


    **CMD [“/opt/mssql/bin/sqlservr”]:** This command says to run


    the sqlservr program from the /opt/mssql/bin directory. This is


    how SQL Server runs in a container.


    3.  Now run the following command from the bash shell to build the


    new Docker image:


    sudo docker build . -t mssql-with-backup-example


    The “.” is the PATH for the docker build command, which in this case


    is all the files in the current directory. The -t parameter is used to  *tag*


    the new image with the name mssql-with-backup-example. This tag


    name can be referenced when you run a container from this image.


    On my Linux server, the results looked like the following:


    Sending build context to Docker daemon  3.263MB'
  trans: "\n# 第 11 章 SQL Server 与容器\n\n## 使用 Dockerfile 构建自定义容器\n\n到目前为止，我展示的是如何与\
    \ Docker Hub 站点上的 SQL Server 镜像的 Docker 容器进行交互并添加数据。带有 SQL Server 的 Docker 容器还能帮助你应对另一个有趣的场景。假设你有多个开发人员正在开发一个使用\
    \ SQL Server 的应用程序。你通常会设置一个开发服务器，让开发人员访问该服务器。这种配置的一个问题在于，如何为所有开发人员设置一个环境，使他们能使用一致的数据库和一致版本的\
    \ SQL Server。\n\n容器为这一场景带来了一种新策略。你可以基于 SQL Server 镜像构建一个 Docker 镜像，并在该镜像中包含你希望所有开发人员使用的标准数据库的备份。然后，任何开发人员都可以拉取该\
    \ Docker 镜像并运行一个容器（就像拥有自己的沙盒一样）。此外，Docker 镜像的一个强大特性是可重用性。你可以通过基于其他镜像创建新镜像来*分层*构建镜像。\n\
    \n让我们按照[microsoft/sqllinuxlabs/tree/master/containers](https://github.com/Microsoft/sqllinuxlabs/tree/master/containers)自定进度实验中的确切步骤来演示一个例子。（我假设你已经运行了本章前面的命令来克隆实验所需的\
    \ GitHub 仓库。）\n\n1.  在 Linux 服务器上，通过在 bash shell 中运行以下命令，切换到`mssql-custom-image-example`文件夹：\n\
    \    ```\n    cd sqllinuxlabs/containers/mssql-custom-image-example\n    ```\n\
    \n2.  通过在 bash shell 中键入以下命令，创建一个包含以下内容的`Dockerfile`（我在本书的示例中提供了`Dockerfile`文件供你比较）（注意：运行`cat`命令时，你会看到一个`>`提示符，用于输入剩余内容）：\n\
    \    ```\n    cat <<EOF>> Dockerfile\n    > FROM microsoft/mssql-server-linux:latest\n\
    \    > COPY ./SampleDB.bak /var/opt/mssql/data/SampleDB.bak\n    > CMD [\"/opt/mssql/bin/sqlservr\"\
    ]\n    > EOF\n    ```\n    当你使用`docker build`命令构建 Docker 镜像时，Docker 默认会查找一个名为`Dockerfile`的文件。让我们解析一下文件中这些命令的含义：\n\
    \n    *   **`FROM microsoft/mssql-server-linux:latest`**：此命令表示拉取最新的 SQL Server\
    \ Docker 镜像作为基础镜像（基于 Ubuntu 基础镜像），用于创建我们的新镜像。如果你希望所有开发人员都在已知的构建版本上测试和开发，你可以选择一个特定的累计更新包（CU），我在上一节中已经展示了如何拉取。请注意，对于\
    \ SQL Server 2017，`microsoft/mssql-server-linux:latest`和`Microsoft/mssql-server-linux:2017-latest`是相同的，但我们为每个名称生成了两个不同的镜像。\n\
    \n    *   **`COPY ./SampleDB.bak /var/opt/mssql/data/SampleDB.bak`**：此命令表示将当前目录中的`SampleDB.bak`文件复制到\
    \ Docker 容器镜像中。\n\n    *   **`CMD [“/opt/mssql/bin/sqlservr”]`**：此命令表示从`/opt/mssql/bin`目录运行`sqlservr`程序。这就是\
    \ SQL Server 在容器中的运行方式。\n\n3.  现在，在 bash shell 中运行以下命令来构建新的 Docker 镜像：\n    ```\n\
    \    sudo docker build . -t mssql-with-backup-example\n    ```\n    `.`是`docker\
    \ build`命令的 PATH 参数，这里指的是当前目录中的所有文件。`-t`参数用于给新镜像*打标签*，名称为`mssql-with-backup-example`。当你从该镜像运行容器时，可以引用此标签名称。\n\
    \n    在我的 Linux 服务器上，结果如下所示：\n    Sending build context to Docker daemon  3.263MB\n\
    \n为了证明我可以同时运行两个带有 SQL Server 的容器（不使用同一个卷），让我们通过以下命令停止`sql1`容器（如果你有`sql1`在运行的话），但让`sql2`容器保持运行：\n\
    ```\nsudo docker stop sql1\n```\n"
