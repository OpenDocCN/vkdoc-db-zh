- fmt: '# CHAPTER 9


    ## Managing and Monitoring SQL Server


    Move on to the next chapter to talk about the important concepts of Monitoring
    and Managing your SQL Server on Linux.


    After reading through the first eight chapters of this book you have learned the
    necessary fundamentals to install SQL Server on Linux, deploy a database and application,
    and set yourself up for success by understanding the fundamentals of our tools,
    performance, security, and high availability.


    It is one thing to get an application deployed that uses SQL Server, but what
    are the key aspects to managing, maintaining, and monitoring SQL Server? That
    is what this chapter is about.


    In fairness, I’ve covered some of the aspects of managing and monitoring throughout
    the book, including chapters on tools, performance, and high availability (certainly
    learning how to back up and restore a database is a key aspect to managing SQL
    Server).


    This chapter extends that knowledge by covering topics that I have not discussed
    before on how to manage the SQL Server instance, your database, and objects within
    the database.


    In the second part of the chapter, I’ll talk about monitoring SQL Server including
    these topics:


    - Monitoring SQL performance

    - Using an amazing but little known feature called the System Health Session to
    monitor SQL Server health

    - Learning a new and creative way to monitor transaction log backups

    - A review of Linux tools I like to use to monitor performance

    - Unique aspects to troubleshooting SQL Server problems


    © Bob Ward 2018


    B. Ward, *Pro SQL Server on Linux*, [https://doi.org/10.1007/978-1-4842-4128-8_9](#index_split_006.html#p457)


    Chapter 9 Managing and Monitoring SQL Server


    As you start reading through the sections on Management of the SQL Server instance,
    database, and objects, be sure to keep in mind an important lesson I’ve learned
    from my experience with SQL Server: *test your management strategy*. Most developers
    will focus on testing the application, which is vital to a successful deployment,
    but typically I see management tasks, like rebuilding an index, never get tested.
    How long will an index rebuild take on your largest table? You won’t know unless
    you test it. In addition to testing, be sure to have a well-defined *change control
    and auditing process* for any changes made to the SQL Server instance configuration,
    database, objects, or the Linux operating system. Understanding what and who makes
    changes to a production SQL Server environment is important in my experience,
    especially when it comes to troubleshooting a problem and trying to answer the
    inevitable question “What changed?”


    I have to admit I had fun writing this chapter because it contains some interesting
    history of my journey at Microsoft with SQL Server and my interactions with some
    of the smartest people I’ve ever known to build rich features for managing and
    monitoring SQL Server.


    ## Managing the SQL Server Instance


    SQL Server provides rich capabilities to manage the SQL Server instance after
    deployment, using tools like `mssql-conf`, the T-SQL statement `ALTER SERVER CONFIGURATION`,
    and the system stored procedure `sp_configure`. We honestly built SQL Server so
    that you should not have to spend a great deal of time configuring the instance
    after installation, but most production environments have some configuration changes
    that makes sense for their application. I’ve discussed these capabilities and
    options in previous chapters of the book. I’ve briefly listed these capabilities
    again in this section of the chapter for completeness.


    In addition, in this section I’ll spend time talking about SQL Server instance
    configuration options I have not mentioned at this point in the book, including:


    - Creating SQL Server Agent jobs

    - Using Resource Governor to control resource usage for users

    - Using the Dedicated Admin Connection for emergency situations

    - Using the `sqlservr` command line for special scenarios


    ## Changing Server Configuration Options'
