    数据库 `WideWorldImporters` 正在执行从版本 868 到版本 869 的升级步骤。


    RESTORE DATABASE 在 1.351 秒内成功处理了 58455 页 (338.027 MB/秒)。


    任何从旧版本 SQL Server 还原的备份到新版本，都将保留旧版本的*数据库兼容性*。请参阅“迁移后注意事项”章节，了解有关数据库兼容性的讨论。


    对于超大型数据库（100GB 或更大，这里我为了迁移目的定义超大型的标准），还原备份是在 Linux 上迁移到 SQL Server 的最快方法。


    ## 使用大容量复制或 SSIS 包复制数据


    可能有一些原因导致您不想通过还原数据库备份来迁移到 SQL Server on Linux。也许在迁移过程中，您希望修改数据库中现有对象的定义。您可以在还原备份后执行此操作。或者，您可以创建一个新的数据库（可能带有新的文件定义），创建新对象，然后使用
    SQL Server 工具将数据从现有 SQL Server 数据库导出，并将数据导入到新的数据库结构中。


    对于 Windows 上的 SQL Server，您可以使用 `bcp` 程序导出数据，将文件复制到 Linux 服务器，然后在 Linux 上使用 `bcp`
    将数据导入到您的新数据库中。我在前面关于工具的章节中介绍了 `bcp` 程序，但您也可以在 [`docs.microsoft.com/sql/linux/sql-server-linux-migrate-bcp`](https://docs.microsoft.com/sql/linux/sql-server-linux-migrate-bcp)
    阅读更多关于 `bcp` 的信息。


    您可能有一个更复杂的提取、转换和加载 (ETL) 过程来迁移到 Linux 上的新 SQL Server 数据库。在这种情况下，考虑创建一个 SQL Server
    Integration Services (SSIS) 包。虽然您必须使用 Windows 客户端上的工具来创建 SSIS 包，但 Linux 上的 SQL
    Server 支持在 Linux 服务器上执行 SSIS 包。您可以在 [`docs.microsoft.com/sql/linux/sql-server-linux-migrate-ssis`](https://docs.microsoft.com/sql/linux/sql-server-linux-migrate-ssis)
    阅读更多关于 Linux 上 SSIS 的信息。


    ## 使用 BACPAC 进行导出和导入


    将现有 SQL Server 数据库迁移到 Linux 上 SQL Server 的第三种选择是一个称为 *BACPAC* 文件的数据层应用程序包。BACPAC
    文件具有高度的可移植性，可用于迁移到其他平台，例如 Azure。BACPAC 文件是一个包，包含数据库的定义或架构、文件以及对象（如表和索引）。此外，该包还包含从用户表中导出的数据版本。


    BACPAC 文件可以通过 SQL Server Management Studio 的可视化界面向导或 `sqlpackage` 程序创建。您现在可以从
    [`docs.microsoft.com/sql/tools/sqlpackage`](https://docs.microsoft.com/sql/tools/sqlpackage)
    在 Windows、macOS 或 Linux 上使用 `sqlpackage`。BACPAC 文件是通过这些工具的选项来 *导出* 包而创建的。您可以在
    [`docs.microsoft.com/sql/relational-databases/data-tier-applications/export-a-data-tier-application`](https://docs.microsoft.com/sql/relational-databases/data-tier-applications/export-a-data-tier-application)
    阅读更多关于导出 BACPAC 文件的信息。同一套工具可用于 *导入* 包。导入包将执行该包，其中包括创建数据库、创建文件、所有对象以及导入所有数据。您可以在
    [`docs.microsoft.com/sql/relational-databases/data-tier-applications/import-a-bacpac-file-to-create-a-new-user-database`](https://docs.microsoft.com/sql/relational-databases/data-tier-applications/import-a-bacpac-file-to-create-a-new-user-database)
    阅读更多关于导入过程的信息。

    '
- fmt: '[import-a-bacpac-file-to-create-a-new-user-database](https://docs.microsoft.com/sql/relational-databases/data-tier-applications/import-a-bacpac-file-to-create-a-new-user-database)


    The following is an example command to run `sqlpackage` on SQL Server on Windows
    from Powershell to export a BACPAC file for a database:


    ```

    .\sqlpackage /A:Export /ssn:<sql server> /sdn:<database> /tf:c:\temp\wwi.bacpac

    ```


    Here is an example of executing `sqlpackage` on the same Windows client to import
    the package into the SQL Server on Linux target:


    ```

    .\sqlpackage /A:Import /tsn:<Linux SQL instance> /tdn:<target db name> /sf:c:\temp\wwi.bacpac
    /tu:sa /tp:<sa password>

    ```


    You don’t need to create the database on the SQL Server on Linux instance. `sqlpackage`
    will do that when executing everything in the bacpac file.


    ## Migrating from Oracle


    You may be reading this book looking to migrate from another database platform,
    like Oracle, to SQL Server on Linux. In this section of the book, I will not cover
    a comparison of features between Oracle and SQL Server. I’ve done my best up until
    this point in the book to describe all the features and functionality of SQL Server
    on Linux to educate you and prepare you for its capabilities, should you be looking
    to migrate from Oracle.


    In this section, I’m going to assume you have made this decision to migrate or
    are looking to test a migration, so you can evaluate how your application will
    behave and perform with SQL Server on Linux. While there could be several methods
    to export data from Oracle allowing you to create your own database on SQL Server
    on Linux and import your data, SQL Server provides a free tool to assist in migrating
    from Oracle. This tool is called the `SQL Server Migration Assistant` (`SSMA`).


    `SSMA` supports many different data platform sources, including Oracle, DB2, MySQL,
    and SAP ASE, to migrate to several different target Microsoft database platforms
    including SQL Server on Linux. To get a complete list of sources and targets for
    `SSMA`, see our documentation at [https://docs.microsoft.com/sql/ssma/sql-server-migration-assistant#supported-sources-and-target-versions](https://docs.microsoft.com/sql/ssma/sql-server-migration-assistant#supported-sources-and-target-versions)
    and [https://docs.microsoft.com/sql/linux/sql-server-linux-migrate-ssma](https://docs.microsoft.com/sql/linux/sql-server-linux-migrate-ssma).
    I will use `SSMA` for the rest of this chapter describing the preparation and
    execution of migration from Oracle.


    For a complete reference on `SSMA`, see our documentation at [https://docs.microsoft.com/sql/ssma/sql-server-migration-assistant](https://docs.microsoft.com/sql/ssma/sql-server-migration-assistant).
    When you have completed reading these sections for preparation and execution of
    your migration from Oracle, be sure to see the section of this chapter on Post
    Migration Considerations.


    ## Preparing for the Migration


    Because the `SSMA` tool only runs on Windows, you will need three computing environments
    capable of being connected together to migrate from Oracle to SQL Server on Linux:


    • Your Linux server running Oracle


    • A new Linux server running SQL Server on Linux


    • A Windows client to run the `SSMA` tool


    The Windows client running `SSMA` must be capable of connecting to each server
    over TCP/IP, so you need to be sure to open up any firewall ports to allow remote
    connectivity. To use `SSMA`, the Oracle server and the SQL Server do not have
    to be able to connect to each other.


    To prepare for the migration using `SSMA`, you will need to install the `SSMA`
    tool on'
