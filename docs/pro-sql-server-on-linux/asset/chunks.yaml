- fmt: '# Chapter 4: Building an Application and Advanced T-SQL


    ## Binary Data Types


    One special syntax on binary datatypes is in the table examples in this chapter:


    ```sql

    [Photo] [varbinary](max) NULL,

    ```


    Note the `(max)` syntax after the `varbinary` datatype where you would normally
    see a length. The normal maximum size of a row (or a column) in SQL Server is
    8000 bytes, but a capability exists to store a value greater than this (the max
    is actually `2^31-1` bytes). This is called `TEXT/IMAGE` data and has a different
    storage mechanism than normal rows (a separate set of database pages than the
    pages where rows are stored). The legacy datatype names for these are `text`,
    `image`, and `ntext`. But you should use the modern syntax of the `(max)` specification
    with `varchar`, `nvarchar`, and `varbinary`.


    ## Computed Columns


    In Chapter 3 in the section **Creating Tables**, I had comments on a few column
    definitions in the example tables, and one of them was this column:


    ```sql

    [SearchName]  AS (concat([PreferredName],N'' '',[FullName])) PERSISTED NOT NULL,

    ```


    This is an example of a *computed column*. A computed column has an expression
    based on other columns in the table and can be recognized by the `AS` syntax after
    the column name. Normally, computed columns are calculated any time you query
    the column with a `SELECT` statement. But if you use the `PERSISTED` keyword,
    SQL Server will store the computed expression as rows are inserted or updated
    from the referenced columns. Computed columns are in a way a form of *server-side
    programming* because you are creating data based on other data stored in the table.
    Computed columns make it easier to provide this type of programming in a declarative
    manner without writing separate procedures or trigger code.


    ## String Functions


    Application developers often need to perform operations against character data
    as strings. SQL Server provides a rich set of T-SQL functions to find and manipulate
    string data, which can be useful to enhance your stored procedure code. The `CONCAT`
    operation in the computed column example of the `People` table is an example of
    a T-SQL string function. Other functions exist to split (`STRING_SPLIT`), aggregate
    (`STRING_AGG`), find substring (`SUBSTRING`), format (`FORMAT`), and trim (`LTRIM`
    and `RTRIM`).


    ## Other T-SQL Commands


    The T-SQL language has become so powerful over the years, with rich capabilities
    beyond standard CRUD operations. While I will review some of the exciting recent
    new features in the next section, I encourage you to explore the entire T-SQL
    reference documentation. As a developer there may be other commands or features
    that will help your journey into building a rich data-driven application. For
    the complete reference, see our documentation at [https://docs.microsoft.com/sql/t-sql/language-reference](https://docs.microsoft.com/sql/t-sql/language-reference).


    ## Exploring New SQL Server Capabilities


    While SQL Server over the years has become a dominant relational database engine
    in the industry, today at Microsoft we think of SQL Server as a *modern data platform*.
    That is because we have extended the capabilities beyond the standard features
    of a typical relational database engine.


    In this final section of the chapter, I will show you some of these new capabilities
    that have been introduced into the product in SQL Server 2016 and 2017.


    ### JSON


    In SQL Server 2008, we introduced a new `XML` datatype to store native XML data
    into a table column and provided operators to work against unstructured or semistructured
    data.


    In SQL Server 2016, we recognized the popularity of JSON as a text format widely
    used in web applications and in NoSQL database systems.


    Instead of creating a separate type like `XML`, SQL Server 2016 and 2017 provide
    T-SQL language commands to operate against JSON-formatted data stored in a character
    SQL Server column.


    For an example, look at the `People` table and one of the columns I commented
    out.'
