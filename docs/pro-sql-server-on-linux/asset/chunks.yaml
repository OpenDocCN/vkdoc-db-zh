    ## The Complete Installation Experience


    I told you the install was easy for SQL Server. This section covers installation-related
    topics I believe you will find useful to provide the complete installation experience.
    Learn how to install other builds of SQL Server, verify your install, perform
    unattended and offline installations, install in the cloud, and learn troubleshooting
    tips.


    ### Installing Other Versions


    SQL Server 2017 has two major repositories from which to install from:


    - `mssql-server-2017`: Latest released builds based on CUs for SQL Server 2017.
    Choose this to use the latest updates for SQL Server 2017. The steps previously
    shown in this chapter and in our tutorials in the official Microsoft documentation
    use this repository.

    - `mssql-server-2017-gdr`: General Distribution Release (GDR) for SQL Server 2017.
    Choose this if you only want security and critical updates to SQL Server 2017.
    There are typically very few updates to this repository over the lifetime of a
    major release of SQL Server.


    Future versions of SQL Server could have different repository names.


    **Note** there is also a preview repository called `mssql-server`. If you have
    used this repository, be sure to remove SQL Server and change to one of the released
    repositories before installing SQL Server.


    On a regular basis, typically monthly, Microsoft releases an update to SQL Server
    2017 called a Cumulative Update (`CU`). This is a collection of fixes and enhancements
    to the product, and they are numbered consecutively starting with `CU1`. By the
    nature of its name, each `CU` contains changes from the previous build. Refer
    to our release notes for'
