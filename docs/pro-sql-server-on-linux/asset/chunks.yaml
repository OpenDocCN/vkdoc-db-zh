  trans: '# SQL Server 工具：sqlcmd


    ## sqlcmd 基本介绍


    `sqlcmd` 允许您连接到任何 SQL Server（包括 Linux 上的 SQL Server）并运行 T-SQL 查询批处理。


    像任何优秀的命令行工具一样，它有许多命令行*开关*或选项。


    如果在 `sqlcmd` 中执行 T-SQL `SELECT` 语句，结果可以显示在控制台（`stdout`）中，也可以重定向到文件（使用命令行选项或重定向
    `stdout` 的结果）。


    ## sqlcmd 编辑器与基本执行


    以下是在本地 Linux 服务器上执行基本 `sqlcmd` 的示例（因此我不必使用 `-S` 参数指定 `ServerName`）：


    ```

    sqlcmd -Usqllinux

    ```


    图 5-1 显示了结果。请注意 `sqlcmd` 工具内提供的提示符。这被称为 *sqlcmd 编辑器*。


    ![](img/index-169_1.png)


    **图 5-1. 在 Linux 上使用 sqlcmd 编辑器执行查询**


    > **注意** 我在第 3 章提到过，`Go` 命令不是 T-SQL 命令。相反，它是像 `sqlcmd` 这样的工具识别的特殊命令，用于执行之前在编辑器中输入的
    SQL 命令批处理。文本 `Go` 不会发送到 SQL Server。


    在任何 `sqlcmd` 行编辑器提示符下，您可以输入任何有效的 T-SQL 批处理或编辑器识别的命令（例如 `GO`）。`sqlcmd` 编辑器命令的完整列表在我们的文档中列出：[`docs.microsoft.com/sql/tools/sqlcmd-utility#sqlcmd-commands`](https://docs.microsoft.com/sql/tools/sqlcmd-utility#sqlcmd-commands)，或者在
    `sqlcmd` 编辑器提示符下输入 `:HELP`。


    例如，输入 `EXIT` 或 `QUIT` 以离开编辑器。`EXIT` 有一个方便的用途，您可以传递一个查询给 `EXIT(<query>)`，查询的结果将返回给客户端，这通常是操作系统
    shell 的一个脚本。


    `GO` 命令有一个可选参数 `GO (<n>)`，表示将 T-SQL 批处理运行 `<n>` 次，一次接一次。


    ## 使用脚本执行


    在上一章中，我创建了几个扩展名为 `.sql` 的脚本（不要求使用任何文件扩展名，但当您使用 `.sql` 时，几乎所有人都明白其含义），并在 Visual
    Studio Code 编辑器中执行了它们。我本可以使用 `sqlcmd` 的 `-i` 命令行选项来执行这些脚本中的任何一个。任何有效的 T-SQL 或
    `sqlcmd` 编辑器命令都可以放入脚本中。


    我在示例脚本 `getsqlversion.sql` 中提供了以下 T-SQL 命令及语句：


    ```

    SELECT @@version

    GO

    ```


    ![](img/index-170_1.png)


    > **提示** `@@version` 是一个系统提供的变量，用于打印 SQL Server 的版本、版本和操作系统详细信息。我认为这是针对 SQL Server
    运行的最基本查询，以确保您可以连接并运行查询。您可以在我们的文档中找到由 SQL Server 引擎支持的完整系统变量列表：[`docs.microsoft.com/en-us/sql/integration-services/system-variables`](https://docs.microsoft.com/en-us/sql/integration-services/system-variables)。


    您可以使用以下命令从 bash shell 执行此脚本：


    ```

    sqlcmd -Usqllinux -igetsqlversion.sql

    ```


    图 5-2 显示了在 Linux 上使用 `sqlcmd` 执行此脚本的结果。


    **图 5-2. 使用脚本与 sqlcmd**


    ## 使用 -Q 选项执行


    执行批处理的另一个选项是使用 `-Q` 命令行选项，在命令行中直接执行您指定的批处理，而不是在文件中。这是我创建在示例 shell 脚本 `sqlcmdquery.sh`
    中的一个示例（注意：在 Linux shell 中执行此操作之前，请确保运行 `chmod u+x sqlcmdquery.sh`）：


    ```

    sqlcmd -Usa -Q"SELECT @@version"

    ```


    > **注意** `-q` 选项与 `-Q` 执行相同的操作，但不会退出 `sqlcmd`。


    ![](img/index-171_1.png)


