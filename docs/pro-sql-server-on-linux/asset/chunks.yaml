    \ 是主键列，这意味着每个值必须是唯一的。`PersonID` 的目的是作为一个没有逻辑含义的键值，用于引用代表一个人的每一行。`PersonID` 将成为在\
    \ `People` 表中物理标识每个人的方式，而无需使用列的组合（如 `FullName`+...）。\n\n现在，我可以使用上一节创建的序列对象来创建一个约束，该约束将为插入到\
