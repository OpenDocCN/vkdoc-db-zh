    # 第 8 章 SQL Server 的高可用性与灾难恢复


    ## 11. 进行最后一次日志备份


    模拟在星期二中午 12:00 进行备份，使用示例脚本 `backupwwilog3.sql` 中的以下 T-SQL 语句：


    ```

    USE WideWorldImporters

    GO

    BACKUP LOG WideWorldImporters TO DISK = ''/var/opt/mssql/data/wwi_log3.bak''

    WITH INIT, CHECKSUM

    GO

    ```


    ## 12. 进行最后一次插入操作


    现在让我们进行最后一次插入操作，根据我们的时间线，这发生在星期二下午 1:00 之前，使用示例脚本 `insertluka.sql` 中的以下 T-SQL
    语句：


    ```

    USE WideWorldImporters

    GO

    INSERT INTO letsgomavs VALUES (''Luka Doncic'', 77)

    GO

    ```


    ## 13. 数据库不可用与日志尾备份


    现在假设在模拟的星期二下午 1:00，数据库变得不可用，但你认为保存事务日志的磁盘是完好的。我们绝对需要这些事务来确保达拉斯小牛队（NBA 球队）的阵容信息是正确的（尤其是我们的首轮选秀卢卡）。第一步是使用以下
    T-SQL 语句备份当前的日志尾部，该语句可在示例脚本 `backupwwitailoflog.sql` 中找到：


    ```

    USE master

    GO

    BACKUP LOG WideWorldImporters TO DISK = ''/var/opt/mssql/data/wwi_tailoflog.bak''

    WITH INIT, NO_TRUNCATE, CHECKSUM

    GO

    ```


    ## 14. 恢复路径


    此时你有几种恢复路径。我们可以从初始备份恢复数据到备份和事务序列中的任何时间点。我不希望有任何数据丢失，并且希望尽快恢复运行。执行示例脚本 `restorewwiall.sql`
    中的以下 T-SQL 语句：


    ```

    USE master

    GO

    RESTORE DATABASE WideWorldImporters FROM DISK = ''/var/opt/mssql/data/wwi.bak''

    WITH REPLACE, NORECOVERY

    GO

    RESTORE DATABASE WideWorldImporters FROM DISK = ''/var/opt/mssql/data/wwi_diff1.bak''

    WITH NORECOVERY

    GO

    RESTORE LOG WideWorldImporters FROM DISK = ''/var/opt/mssql/data/wwi_log3.bak''

    WITH NORECOVERY

    GO

    RESTORE LOG WideWorldImporters FROM DISK = ''/var/opt/mssql/data/wwi_tailoflog.bak''

    WITH NORECOVERY

    GO

    RESTORE DATABASE WideWorldImporters WITH RECOVERY

    GO

    ```


    ## 15. 验证


    如果一切成功，我期望我的四名球员仍然在我的数据库中。通过执行以下 T-SQL 语句 `mavstothenbafinals.sql` 来验证：


    ```

    USE WideWorldImporters

    GO

    SELECT * FROM letsgomavs

    GO

    ```


    ![](img/index-413_1.jpg)


    结果应如图 8-8 所示。


    **图 8-8.** 在 SQL Server 中使用一系列备份恢复数据


    这是一个漫长的序列，但它演示了如何使用一系列备份来满足你的恢复时间目标和恢复点目标。我向你展示的方案有一个问题是，在整个 `RESTORE` 序列期间，直到最后一步之前，数据库都处于离线状态（快速恢复不适用于还原）。还有其他方法可以让你以更联机的方式进行恢复，如下一节所述。


    恢复序列的另一个选项是*时间点*恢复。时间点恢复在使用 `RESTORE LOG` T-SQL 语法时可用。当你使用时间点恢复时，可以使用 `WITH STOPAT=<time>`
    和 `RECOVERY`（因为你将使用此语句恢复数据库）选项来指定。你可以恢复整个数据库和日志备份序列，然后使用时间点恢复作为最后一条 `RESTORE LOG`
    语句。请查看我们关于时间点恢复的文档和示例：[`docs.microsoft.com/sql/relational-databases/backup-restore/restore-a-sql-server-database-to-a-point-in-time-full-recovery-model`](https://docs.microsoft.com/sql/relational-databases/backup-restore/restore-a-sql-server-database-to-a-point-in-time-full-recovery-model)。

    '
- fmt: '# File, Piecemeal, and Page Restore


    There could be scenarios for databases with multiple files or filegroups where
    you need to only restore a specific file or filegroup without having to restore
    the entire database, provided you have a file or filegroup backup you have created.
    You can restore files or filegroups offline or online (online is available for
    Enterprise Edition only). To see examples and scenarios to restore files or filegroups
    see the documentation at https://docs.microsoft.com/sql/relational-databases/backup-restore/file-restores-full-recovery-model.


    If you have full database backups like the sequence I showed you in the previous
    section, it is possible to restore a database in phases called a *piecemeal restore*.
    A piecemeal restore allows you to bring filegroups online in phases vs. the entire
    database. This could be an interesting part of your RTO strategy because it is
    possible you can define RTO now at the filegroup level.


    For example, for the sequence in the previous section for restoring the WideWorldImporters
    database, we could have changed up the restore sequence to something different.
    We could restore the primary filegroup first and then the secondary filegroup
    `WWI_UserData` later.


    **Note**: A memory optimized data filegroup must be backed up and restored with
    the primary filegroup. Therefore, you need to create a database backup including
    the primary and memory optimized data filegroup and another backup including your
    secondary filegroups.


    Using this technique allows users to access the data that’s stored in primary
    filegroup faster, while the `WWI_UserData` filegroup can come online at a later
    time. Online piecemeal restores are only supported on the Enterprise edition.
    You can read more about piecemeal restores for a full recovery model database
    in our documentation at https://docs.microsoft.com/sql/relational-databases/backup-restore/example-piecemeal-restore-of-database-full-recovery-model.


    The final example of a more granular restore option is a *page level restore*.
    This option allows you to restore specific pages in the database, should they
    become damaged. And the great part of this feature is that it can be done online
    (Enterprise edition only). Consider a scenario where a specific page or set of
    pages is reported to be damaged (either through an `msg 824` error, which I’ll
    explain more in Chapter 9, or from `DBCC CHECKDB`).


    ## Chapter 8: High Availability and Disaster Recovery for SQL Server


    You could use the methods I’ve described so far in this chapter to restore from
    a database, differential, file, filegroup, and/or log backups. Or you could use
    these backups to restore only the pages you need from them. You still need a valid
    log backup sequence to apply any changes to the pages after they are restored
    from a database backup. This is an extremely attractive feature to speed up your
    RTO if you can identify the problem to only a set of database pages.


    It turns out SQL Server has some tools to help guide you. First, in the `msdb`
    database a table exists called `suspect_pages` that contains only pages that were
    found by SQL Server to be damaged. Second, SQL Server Management Studio has a
    tool called the Database Recovery Advisor, which provides recommendations based
    on the backup history found in `msdb` to guide you through point-in-time restores
    and database page.'
