    # Chapter 5 SQL Server Tools


    SQL Server has a rich tradition of providing the tools any data professional needs.
    Tools give anyone the power to develop, interact, tune, manage, and troubleshoot
    applications and queries with SQL Server. Tools for SQL Server encompass far more
    than programs or utilities. SQL Server comes built-in with a rich set of capabilities
    that I will discuss in this chapter as part of the topic of tools.


    All tools for SQL Server have a common bond. They use or provide interfaces through
    the T-SQL language. Tools that are separate programs all know how to connect and
    execute T-SQL queries through a driver or provider that uses the TDS protocol.
    In Chapters 2, 3, and 4, I introduced you to two tools to interact with SQL Server,
    `sqlcmd` and the mssql extension with Visual Studio Code.


    In this chapter, I will show you graphical and command line tools to connect,
    run queries, and manage aspects of SQL Server. I’ll also show you the built-in
    features of the SQL Server engine that provide insight into metadata, execution,
    performance, resources, and tracing. I’ll show you other features that allow you
    to make configuration changes to SQL Server and databases and queries to affect
    behavior or provide more insight.


    One crucial point as you explore this chapter is that existing tools that run
    on Windows computers work virtually unchanged to connect and interact with SQL
    Server on Linux. If you are a Windows user, you can continue to use tools like
    SQL Server Management Studio (`SSMS`). But if you are a macOS or Linux user, you
    will love our new strategy of providing cross-platform, open-source tools. I’ll
    cover all of these in this chapter. I’ll conclude the chapter by talking about
    tools to develop, build, and execute ETL packages with `SSIS`.


    SQL Server provides other tools that are specific to features like security or
    high


