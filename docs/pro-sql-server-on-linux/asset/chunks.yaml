    [https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide#Lock_Engine](https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide#Lock_Engine)


    # Chapter 5 SQL Server Tools


    ## 3226


    By default, SQL Server writes out every successful backup operation to the `ERRORLOG`.
    For some customers, this is too much noise in the `ERRORLOG`. This trace flag
    will disable writing successful backup information to the `ERRORLOG`.


    ## 3608


    This trace flag can only be used at startup. If trace flag is turned on, SQL Server
    will only recover the `master` database. It will not create `tempdb` unless you
    attempt to access a feature that requires `tempdb` (such as creating a temporary
    table). This command could be useful for advanced recovery scenarios and SQL Server
    startup troubleshooting.


    ## 4199


    This trace flag is used to enable Query Optimizer fixes in cumulative updates.
    You can read more about how to use this trace flag in this Microsoft Knowledge
    Base article: [https://support.microsoft.com/help/974006/sql-server-query-optimizer-hotfix-trace-flag-4199-servicing-model](https://support.microsoft.com/help/974006/sql-server-query-optimizer-hotfix-trace-flag-4199-servicing-model).


    ## 7752


    Enables asynchronous loading of the Query Store. I recommend you turn this on
    when using Query Store in production to avoid any issues for users getting blocked
    when Query Store data is loaded into memory at the startup of a database.


    ## 3604


    This one is not documented. It enables the output of some `DBCC` commands to be
    displayed as messages back to the client application. You should not need this
    for documented `DBCC` commands, but some that are undocumented require it to work
    (The prime example is `DBCC PAGE`).


    **Note**: Another trace flag feature exists at the query level called `QUERYTRACEON`.
    This option only applies to a specific list of trace flags. You can read more
    about this trace flag option at [https://support.microsoft.com/help/2801413/enable-plan-affecting-sql-server-query-optimizer-behavior-that-can-be](https://support.microsoft.com/help/2801413/enable-plan-affecting-sql-server-query-optimizer-behavior-that-can-be).


    ## SSIS for ETL


    While `bcp` provides fundamental import/export capabilities, there are scenarios
    where you may need more complex functionality to extract, transform, and load
    (ETL) data. SQL Server comes with a feature to provide rich ETL capabilities in
    the form of SQL Server Integration Services (SSIS).


    The first step to using SSIS is to install the SSIS package for Linux on either
    RHEL or Ubuntu (SQL Server 2017 does not provide an SSIS package for SUSE at the
    time of writing of this book). The installation process is like SQL Server and
    integrates with the package managers for RHEL (`yum`) and Ubuntu (`apt-get`).
    The SSIS installation process also requires a script called `ssis-conf` to complete
    the setup process.


    You can follow the installation process and other aspects to deployment such as
    update and unattended install with our documentation at [https://docs.microsoft.com/sql/linux/sql-server-linux-setup-ssis](https://docs.microsoft.com/sql/linux/sql-server-linux-setup-ssis).

    '
