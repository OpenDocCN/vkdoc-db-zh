  trans: "\n# 第 7 章 SQL Server 中的安全性\n\n你可以在[`docs.microsoft.com/sql/relational-databases/security/authentication-access/application-roles`](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/application-roles)阅读更多关于应用程序角色的信息。\n\
    \n## 其他权限\n\n我只向你展示了在表上授予和撤销权限的基础操作。SQL Server 允许你对广泛的对象和特定的 T-SQL 语句分配权限。在某些情况下，这些权限仅在使用\
    \ SQL Server 的特定功能时才适用。例如，只有启用了可用性组功能，你才能为可用性组的各个方面分配权限。有关可能的权限示例完整列表，请参阅我们的文档：[`docs.microsoft.com/sql/t-sql/statements/grant-transact-sql#examples`](https://docs.microsoft.com/sql/t-sql/statements/grant-transact-sql#examples)。\n\
    \n**提示** 想在不以用户身份实际登录的情况下，测试已创建用户的权限？请查阅我们文档中的 `execute as` T-SQL 语句：[`docs.microsoft.com/sql/t-sql/statements/execute-as-clause-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/execute-as-clause-transact-sql)。\n\
    \n## 行级安全\n\nSQL Server 2016 引入了一个备受期待的功能：行级安全（RLS）。你不再局限于只能对跨表所有行的对象或语句分配权限，现在你可以为特定的数据行分配权限。实际上，之前你可以通过视图来实现这一点，但现在你可以直接将权限分配给表中的一组行。此外，RLS\
    \ 提供了额外的功能，可以在操作执行前或执行后进行阻止。\n\n理解 RLS 的最佳方式是看到它的实际应用。我在 GitHub 上找到了一个来自我们团队关于\
    \ RLS 的优秀示例，使用了 `WideWorldImporters` 数据库，位于：[`github.com/Microsoft/sql-server-samples/tree/master/samples/databases/wide-world-importers/sample-scripts/row-level-security`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/databases/wide-world-importers/sample-scripts/row-level-security)。我做了一些修改，你可以在\
    \ `rls.sql` 文件中找到。这个示例将基于客户的销售区域数据为用户设置行级安全。其概念是，只有属于特定销售区域的应用程序用户才能看到其区域的销售数据，而不能看到其他区域的销售数据。数据库所有者应能看到所有数据。\n\
    \n让我逐步讲解此脚本中的 T-SQL 语句并解释其工作原理（为简便起见，运行此脚本时请以 `sa` 身份连接）：\n\n1.  为此 RLS 示例创建登录名：\n\
    \n```sql\nUSE master\nGO\nIF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE\
    \ name = N'GreatLakesUser')\nBEGIN\n    CREATE LOGIN GreatLakesUser\n    WITH\
    \ PASSWORD = N'SQLRocks!00',\n    CHECK_POLICY = OFF,\n    CHECK_EXPIRATION =\
    \ OFF,\n    DEFAULT_DATABASE = WideWorldImporters;\nEND\nGO\n```\n\n2.  创建映射到你刚创建的登录名的用户，并将此用户添加到\
    \ `WideWorldImporters` 中已定义的某个角色：\n\n```sql\nUSE WideWorldImporters;\nGO\nDROP\
    \ USER IF EXISTS GreatLakesUser\nGO\nCREATE USER GreatLakesUser FOR LOGIN GreatLakesUser\n\
    GO\nALTER ROLE [Great Lakes Sales] ADD MEMBER GreatLakesUser\nGO\n```\n\n`WideWorldImporters`\
    \ 内置了将映射到销售区域的数据库角色。\n"
- fmt: "# Chapter 7 Security in SQL Server\n\n## 3. Implementing Row-Level Security\
    \ (RLS)\n\nIn order to apply RLS, you need to create a SQL Server `function`,\
    \ which will be used to apply to any query to determine what rows the user can\
    \ access. Then you have to create a security policy that maps to the function\
    \ you have created.\n\n```sql\n-- Drop the security policy and function if they\
    \ exist\nDROP SECURITY POLICY IF EXISTS [Application].FilterCustomersBySalesTerritoryRole\n\
    GO\nDROP FUNCTION IF EXISTS [Application].DetermineCustomerAccess\nGO\n\n-- Create\
    \ the function to apply for RLS\nCREATE FUNCTION [Application].DetermineCustomerAccess(@CityID\
    \ int)\nRETURNS TABLE\nWITH SCHEMABINDING\nAS\nRETURN (SELECT 1 AS AccessResult\n\
    \    WHERE IS_ROLEMEMBER(N'db_owner') <> 0\n    OR IS_ROLEMEMBER((SELECT sp.SalesTerritory\n\
    \                      FROM [Application].Cities AS c\n                      INNER\
    \ JOIN [Application].StateProvinces AS sp\n                      ON c.StateProvinceID\
    \ = sp.StateProvinceID\n                      WHERE c.CityID = @CityID) + N' Sales')\
    \ <> 0\n)\nGO\n\n-- The security policy that has been applied is as follows:\n\
    CREATE SECURITY POLICY [Application].FilterCustomersBySalesTerritoryRole\nADD\
    \ FILTER PREDICATE [Application].DetermineCustomerAccess(DeliveryCityID)\nON Sales.Customers\n\
    GO\n```\n\nLet me explain how the function works. The function takes in a `CityID`\
    \ value and finds the `SalesTerritory` name of the city from the `Cities` and\
    \ `StateProvinces` table. The function concatenates the word ‘Sales’ to the end\
    \ of the name. So any `CityID` that falls in the GreatLakes territory would return\
    \ GreatLakesSales. The security policy takes the `DeliveryCityID` values from\
    \ the `[Sales].[Customers]` when a user tries to query the `[Sales].[Customers]`\
    \ table. This means if I’m logged in as the `GreatLakesUser`, which is a member\
    \ of the `GreatLakesSales` role, only rows with the `DeliveryCityID` from the\
    \ `Customers` table that map to the GreatLakes region will be returned to the\
    \ user.\n\n## 4. Verifying RLS Effect\n\nConnected still as `sa` (which is a database\
    \ owner), find out how many rows are in the `[Sales].[Customers]` table and note\
    \ the count:\n\n```sql\nSELECT COUNT(*) FROM Sales.Customers; -- and note count\n\
    GO\n```\n\nWhen I run this, I get 663 rows.\n\n## 5. Testing User Permissions\n\
    \nNow grant permissions to the `GreatLakesSales` role to query the `[Sales].[Customers]`\
    \ table, `impersonate` the `GreatLakesUser`, and see how many rows are in the\
    \ table:\n\n```sql\nGRANT SELECT, UPDATE ON Sales.Customers TO [Great Lakes Sales];\n\
    GO\n\n-- impersonate the user GreatLakesUser\nEXECUTE AS USER = 'GreatLakesUser'\n\
    GO\n\n-- Now note the count and which rows are returned\n-- even though we have\
    \ not changed the command\nSELECT COUNT(*) FROM Sales.Customers;\nGO\n```\n\n\
    When I run the query this time, I only see 77 rows. The other rows are part of\
    \ other sales territories, which is why the `GreatLakesSales` role member cannot\
    \ even see they exist.\n\n## 6. Reverting Impersonation\n\nTo revert the impersonation,\
    \ use the following T-SQL statement in the `rls.sql` script:\n\n```sql\n-- Revert\
    \ back to logged in user\nREVERT\nGO\n```\n\nRow Level Security is a great feature\
    \ in the suite of security capabilities for SQL Server and is fully managed by\
    \ T-SQL statements independent of the application. Find out more of the details\
    \ of RLS and how it works in our documentation at `https://docs.microsoft.com/sql/relational-databases/security/row-level-security`.\n\
    \n## Dynamic Data Masking\n\nDynamic data masking is another great security feature\
    \ that landed starting in SQL Server 2016 and works the same for SQL Server on\
    \ both Windows and Linux. It is another great security feature that doesn’t require\
    \ any application changes or logic.\n\nThe concept behind dynamic data masking\
    \ is to provide T-SQL commands that allow you to supply masking rules to sensitive\
    \ data and control the ability to see sensitive data unmasked to specific users.\
    \ The feature is `dynamic` because you can make changes via"
