    # 第十章：迁移至 Linux 版 SQL Server


    如果你正计划迁移至 Linux 版 SQL Server，那么本章就是为你准备的。然而，即使你并不打算进行迁移，我想你也会有兴趣浏览本章内容，本章分为以下几个小节：


    -   **从 SQL Server 迁移**：在本节中，我将讨论从早期版本的 SQL Server 迁移至 Linux 版 SQL Server 的工具和注意事项。

    -   **从 Oracle 迁移**：在本节中，我将探讨从 Linux 版 Oracle 迁移至 Linux 版 SQL Server 的机制。

    -   **从 PostgreSQL 迁移**：在本节中，我将就 SQL Server 与 PostgreSQL 的功能比较给出我的看法。同时，我也会提供一些关于如何将数据库从
    PostgreSQL 迁移至 Linux 版 SQL Server 的技巧和资源。

    -   **迁移后注意事项**：一旦你从 SQL Server 或其他数据库产品迁移完成后，你应该考虑几个迁移后的步骤和操作，以确保在 Linux 版 SQL
    Server 上获得良好的使用体验。


    **提示**：请关注负责 SQL Server 和 Azure 数据服务迁移策略的团队博客，以获取最新信息：[`https://blogs.msdn.microsoft.com/datamigration`](https://blogs.msdn.microsoft.com/datamigration)。


    © Bob Ward 2018

    B. Ward, *Pro SQL Server on Linux*, [`https://doi.org/10.1007/978-1-4842-4128-8_10`](https://doi.org/10.1007/978-1-4842-4128-8_10)


    ![](img/index-515_1.jpg)


    ## 从 SQL Server 迁移


    自从我们推出 Linux 版 SQL Server 以来，我遇到过一些客户，他们当前在 Windows 上使用早期版本的 SQL Server，但正在考虑迁移到
    Linux 版 SQL Server。本章就是为你们准备的。我将讨论迁移的整体流程、用于准备迁移的工具，以及执行迁移的工具和技术。


    图 10-1 展示了从早期版本的 SQL Server 迁移至 Linux 版 SQL Server 的整体流程图示。


    **图 10-1.** 从早期版本 SQL Server 迁移至 Linux 版 SQL Server 的流程


    在本节中，我将介绍可以帮助你从旧版 SQL Server 迁移到 Linux 版 SQL Server 的组件。微软提供了用于准备迁移的工具，称为 `数据迁移助手`
    和 `数据库实验助手`。我还将讨论如何使用数据库备份、通过批量导入或 SSIS 包导出导入数据，或使用数据层应用程序文件（称为 BACPAC 文件）来执行数据库迁移。


    在你阅读完这些关于迁移准备和执行的小节后，请务必不要错过本章关于“迁移后注意事项”的部分，以了解迁移完成后需要进行的后续步骤。


    ### 迁移准备


    根据图 10-1，准备将一个或多个数据库迁移至 Linux 版 SQL Server 的核心是使用两个工具：


    -   **数据迁移助手**：`数据迁移助手`（`DMA`）工具可免费下载，可用于评估 SQL Server 实例和数据库的配置，指出迁移后可能出现的潜在问题，并提示在你开始使用
    Linux 版 SQL Server 时可能有帮助的新功能。此外，该工具还会检查 SQL Server on Windows 上可能使用了哪些在 Linux
    版 SQL Server 上不受支持的功能。


    **注意**：`DMA` 可用于迁移你的数据，并且具备迁移到 Azure SQL 数据库和 Azure 虚拟机中 SQL Server 的功能。你可以在 [`https://docs.microsoft.com/sql/dma/dma-overview`](https://docs.microsoft.com/sql/dma/dma-overview)
    阅读 `DMA` 功能和特性的完整列表（包括下载该工具的链接）。


    -   **数据库实验助手**：评估静态

