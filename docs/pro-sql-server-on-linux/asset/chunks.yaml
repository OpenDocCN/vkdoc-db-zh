    ** Query  Store**


    After we had shipped SQL Server 2008 (codename Katmai), I was approached by one


    of our chief architects for SQL Server, Conor Cunningham, about our techniques
    for


    performance troubleshooting in Technical Support and how we could improve them.


    ChapTer 5   SQL Server TooLS


    DMVs had become extremely popular by SQL Server 2008, and we continued to add


    more based on customer feedback and features we added to SQL Server. The biggest


    drawback to DMVs is that to capture a history of changes, you must  *poll* DMV
    data by


    querying the DMV and save the results on a frequent basis (you also usually added
    a


    timestamp with each query against the DMV to note the history of rows over time).
    For


    example, to capture performance information about queries in cache, you could
    query sys.


    dm_exec_query_stats and save off the data every <n> seconds or minutes. This technique


    works but it is not elegant. We used this technique in technical support, along
    with tools


    like SQLTrace and Extended Events for performance troubleshooting with customers.


    Conor came along with a new idea called  *Query Disk Store*. His idea was to build


    into the SQL Server engine the ability to store performance information about
    queries,


    including changes over time directly into the database. This idea led to a new
    feature in


    SQL Server 2016 called **Query Store**.


    Query Store is a database option that, when enabled, turns on code in the SQL
    Server


    engine to store information any time a new query is compiled, including the estimated


    query plan. In addition, when a query is executed, aggregate performance information


    is accumulated for the query. All this data is stored in a series of system tables
    in the


    database where Query Store is enabled. You can see query store data by querying
    a series


    of catalog views built on top of any data stored in memory or in the system tables.


    Since the performance data is stored in the user database, this data is available
    after


    backing up and restoring the database.


    **Tip**  Use the T-SQL command **DBCC CLONEDATABASE** to make a copy of the


    schema of a database without user data. This command captures all system table


    data, so it includes Query Store. This allows you to evaluate query store data
    offline


    without having to back up the entire user database. See more details about DBCC


    CLoNeDaTaBaSe a[t https://support.microsoft.com/help/3177838/](https://support.microsoft.com/help/3177838/how-to-use-dbcc-clonedatabase-to-generate-a-schema-and-statistics-only)


