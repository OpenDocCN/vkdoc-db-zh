    via an index, which by default is a **clustered index**. A clustered index is
    implemented


    by storing the pages for the data for the table at the base level of the index
    sorted by


    Chapter 3   Building a dataBaSe and t-SQl FundamentalS


    the columns in the clustered index. In this example, each row must contain a unique


    PersonID value. We will use the sequence object created earlier to ensure each
    PersonID


    value is unique.


    In this example, the keyword ASC next to the [PersonID] column in the constraint


    definition indicates the clustered index will be sorted on the PersonID values
    in


    ascending key order.


    There is another method to define a primary key in line with the table definition.
    For


    the above example, you could have declared the PersonID column as:


    [PersonID] [int] NOT NULL PRIMARY KEY CLUSTERED


    Another type of constraint is a  *foreign key constraint* to ensure referential


    integrity for relationships between tables or between columns within the same
    table. In


    the preceding example, the LastEditedBy column is the PersonID value of another
    row'
