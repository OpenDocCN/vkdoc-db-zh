    ## Always On 可用性组


    虽然 `Always On FCI` 是保护 SQL Server 实例高可用性的一项出色技术，但这种方法有两个缺点：


    *   存储成为故障转移的中心点，因此您需要另一个解决方案（可能是硬件）来防止数据存储中断。

    *   集群中的其他 SQL Server 实例不能被主动使用，因为一次只有一个 SQL Server 可以访问共享存储上的数据库。


    ### 第 8 章 SQL Server 的高可用性与灾难恢复


    SQL Server 提供了另一项功能作为替代方案，称为 **Always On 可用性组**。在本章的剩余部分，我将经常使用 **AG(s)** 这个术语来指代
    Always On 可用性组。`AG` 在数据库级别提供容错能力和高可用性，并提供对数据的更广泛访问。在本章的这一部分，我将讨论该技术的工作原理，并为您提供关于如何设置、配置和测试
    `AG` 的详细演练。


    我还将讨论 `AG` 的其他方面，包括数据库运行状况检测、性能注意事项、如何在其他节点上读取数据、自动修复功能以及不需要集群软件的新功能。对于那些在 Windows
    上使用过 SQL Server `AG` 的用户来说，核心功能是相同的，但在 Linux 上存在一些配置、设置以及少数行为差异。在本章的剩余部分，我将尽力区分这些差异。


    ## 工作原理


    `AG` 的旅程始于 SQL Server 2005 中一项名为 `数据库镜像` 的功能。在 SQL Server 2012 中，我们对原始架构进行了一些相当重大的修订，并推出了
    Always On 系列，包括 `FCI` 和 `可用性组`（我们之前就有 `FCI`，但没有称之为 Always On）。


    与 `数据库镜像` 类似，`AG` 不需要共享存储架构，而是跟踪事务日志中的更改，并将这些更改传输到其他 SQL Server 实例。


    一个 `AG` 由一个或多个数据库组成，这些数据库被复制到一个或多个 SQL Server，并且是一个故障转移单元。事务开始的原始 SQL Server 称为
    **主副本**。接收更改的 SQL Server 称为 **辅助副本**。您将会看到，对于 Linux 上的 SQL Server，当 `AG` 引入集群时，需要第三种类型的副本，称为
    **配置副本**。


    事实证明，支持 `AG` 的所有软件组件都在 SQL Server 本身之中。为了支持 `AG` 自动故障转移的概念，需要用到集群软件。对于 Windows，该软件是
    `WSFC`。对于 Linux 上的 SQL Server，类似于前一节描述的 `FCI`，使用的是 `Pacemaker` 软件栈。


    我们的文档提供了一个非常好的可视化展示，向您说明 SQL Server 的各个部分如何支持 `AG` 中副本的基本原理。请参考图 8-10。


    ![](img/index-427_1.jpg)


    ### 第 8 章 SQL Server 的高可用性与灾难恢复


    **图 8-10** Always On 可用性组的架构和数据同步流程


    如图所示，SQL Server 会在主副本上捕获事务日志更改，并通过一个独立的通信通道（称为 `数据库镜像端点`）将这些更改传输到辅助副本。在辅助副本上，更改首先被固化到本地事务日志，然后单独应用任何必要的重做恢复操作。`AG`
    的一大优势在于，因为它不是共享存储解决方案，所以可以连接到辅助副本，并且在更改应用重做恢复后可以读取数据。您可以读取

