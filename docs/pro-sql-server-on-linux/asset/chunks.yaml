    ### Linux 上的 Windows 配置选项


    在 Windows 上安装 SQL Server 时，通常会使用一些配置选项和选择。以下是这些选项的摘要，以及它们如何适用于 Linux 上的 SQL Server。


    #### 锁定页面


    Windows 支持一个概念，即如果应用程序使用地址窗口扩展 (`AWE`) API，则可以避免内存工作集修剪。如果使用企业版或标准版，并且 SQL Server
    服务帐户具有 `内存中锁定页面` 权限，则默认在 SQL Server 上启用此功能。


    Linux 没有 `AWE` 或锁定页面的概念，因此此选项不适用于 Linux 上的 SQL Server。相反，Linux 有根据内存消耗对进程进行分页甚至终止进程的概念。Linux
    上的 SQL Server 提供了选项来防止此类情况。我将在第 6 章讨论这个主题。


    #### 即时文件初始化


    为加快大文件大小的初始化，Windows 提供了一个名为 `SetFileValidData()` 的 API。如果 SQL Server 服务帐户被授予了
    `执行卷维护任务` 权限，SQL Server 将使用此 API 创建或修改数据库文件。


    Linux 默认执行此类初始化，因为 Host Extension 层中的 SQL Server 使用了 `fallocate()` Linux API。因此，对于
    Linux 上的 SQL Server，无需配置此选项。


