- fmt: '# Chapter 1 Why SQL Server on Linux?


    ## How We Built It


    Project Helsinki, SQL Server on Linux, is one of the most amazing software accomplishments
    I’ve encountered in my 25 years at Microsoft. In this section, I’ll show you the
    amazing background and history of how we built SQL Server on Linux and were able
    to bring it to market with quality and performance. In this section, I’ll talk
    about an important software component that allows SQL Server to run on Linux,
    called the SQL Platform Abstraction Layer (`SQLPAL`) based on a Microsoft Research
    project called `Drawbridge`. In addition, I’ll discuss the process architecture
    and how the various components interact to make SQL Server run on Linux.


    Machine, the fastest growing guest operating system of choice had become Linux.
    We had customers who hosted “mixed” environments (Linux and Windows Server) come
    to us asking whether we would ever consider making SQL Server on Linux available.
    It was not that they were giving up on Windows Server, but rather they wanted
    to standardize on SQL Server in their companies but needed options for both Linux
    and Windows Server.


    Finally, Linux partners started asking us whether we would consider moving to
    Linux. Companies like Red Hat and SUSE were seeing immense growth in their enterprise
    business and felt that offering a choice of data platforms would help customer
    adoption.


    All these factors were on the minds of our SQL Server Engineering leadership in
    late 2014 and early 2015: Shawn Bice, Rohan Kumar, and Lindsey Allen. They were
    instrumental in convincing our executive leadership at Microsoft to allow us to
    build SQL Server for Linux. And they hired back none other than Slava Oks to build
    it and shift Tobias Ternstrom to lead the program management of the project. They
    would build an amazing team of people to start the project known as `Helsinki`.


    We now had the motivation, the approval, and the resources to move forward. Now
    the question was how do we build it? And how do we deliver it quickly to the market?


    ### Drawbridge


    In March of 2011, a team at Microsoft Research published a paper called *Rethinking
    the Library OS from the Top Down* [`www.microsoft.com/en-us/research/wp-content/uploads/2016/02/asplos2011-drawbridge.pdf`](https://www.microsoft.com/en-us/research/wp-content/uploads/2016/02/asplos2011-drawbridge.pdf).
    The paper was based on a project prototype called `Drawbridge` and a concept called
    `library OS`. If you think about the year 2011, virtualization was a very hot
    topic and had become very popular. Virtual machines were a common mechanism to
    perform consolidation projects and abstract applications for the underlying hardware.
    They provide isolation, compatibility, and the ability to free you from relying
    on a specific host computer. Therefore, they are still popular and are still used
    today in public cloud environments such as Azure Virtual Machine and Amazon EC2.
    The only issue is that virtual machines are resource `heavy`. That is, you need
    the entire operating system to run in the guest to support your application, even
    if you don’t need all the services that come with the guest operating system.


    The `Drawbridge` team sought a way to create something lighter but retain the
    advantages of virtualization. Furthermore, they discovered through their research
    that many services and Application Programming Interface (API) calls required
    by Windows applications did not really need to be run within the Windows kernel.
    Rather, it is possible to run the code that powers many Windows APIs in user mode,
    thus reducing context switches to the kernel. Reducing context switches improves
    performance and results in a more efficient application and use of computer resources.


    The result of this project was a concept called a `picoprocess` running on a `library
    OS`, effectively creating a Platform Abstraction Layer (`PAL`). Figure 1-1 shows
    the resulting'
