  trans: '# 管理与监控 SQL Server


    ## 使用 Studio 查看空间使用情况


    Studio 可用于查看跨数据库的空间使用情况，按数据和事务日志使用情况拆分。


    图 9-2 展示了一个示例。


    ![](img/index-474_1.jpg)


    **图 9-2. SQL 操作工作室中的数据库空间使用情况**


    ## 添加数据库文件


    通过 T-SQL `ALTER DATABASE` 语句使用 `ADD FILE` 选项，向数据库添加数据库文件非常简单。你可以在以下网址阅读更多信息：[`docs.microsoft.com/sql/relational-databases/databases/add-data-or-log-files-to-a-database`](https://docs.microsoft.com/sql/relational-databases/databases/add-data-or-log-files-to-a-database)。


    尽管可以为数据库添加事务日志文件，但添加第二个事务日志文件几乎没有任何好处，因此我不推荐这样做。


    **注意：** 除了 `tempdb`，你应该没有太大必要向系统数据库添加文件。当你需要为 `tempdb` 添加文件时，应确保你：

    1.  添加的文件大小和自动增长选项与其他所有文件完全相同。

    2.  如果尚未启用，使用 `ALTER DATABASE` 为 `tempdb` 启用 `AUTOGROW_ALL_FILES`。


    ## 删除数据库文件


    可能会出现需要从数据库中删除文件的情况，但该文件在通过 `ALTER DATABASE` 使用 `REMOVE FILE` 选项删除之前必须为空。


    你可以了解更多信息：

    *   删除文件：[`docs.microsoft.com/sql/relational-databases/databases/delete-data-or-log-files-from-a-database`](https://docs.microsoft.com/sql/relational-databases/databases/delete-data-or-log-files-from-a-database)。

    *   如何清空文件：[`docs.microsoft.com/sql/relational-databases/databases/shrink-a-file`](https://docs.microsoft.com/sql/relational-databases/databases/shrink-a-file)。


    你还可以使用 `ALTER DATABASE` 配合 `MODIFY FILE` 选项来增加数据库文件的大小。在我们的文档中了解更多信息：[`docs.microsoft.com/sql/relational-databases/databases/increase-the-size-of-a-database`](https://docs.microsoft.com/sql/relational-databases/databases/increase-the-size-of-a-database)。


    **注意：** 在执行任何影响文件的 `ALTER DATABASE` 时，你可能遇到的一个常见问题是，它会阻塞 `BACKUP` 语句，或被任何活动的 `BACKUP`
    所阻塞。


    ## 分离与附加数据库


    我之前已经讨论过如何通过移动数据库和事务日志文件来移动数据库。在前面的章节中，我也讨论了如何使用备份和还原来恢复数据库。然而，备份和还原也可用于将数据库*传输*到另一台服务器，并且是首选的传输方法。


    SQL Server 还提供了另一种通过分离和附加数据库来传输数据库的方法。分离数据库将关闭该数据库，并移除 `master` 系统数据库中关于该数据库的元数据，但不会删除文件（而
    `DROP DATABASE` 会删除文件）。


    **注意：** 出于安全考虑，切勿附加你不信任或不知道来源的数据库。


    你可以使用以下 T-SQL 语句分离数据库：


    **注意：** 以下示例假设你已经按照我之前章节描述的方式，使用 `wget https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak`
    还原了完整的 `WideWorldImporters` 数据库。


    ```sql

    EXEC sp_detach_db ''WideWorldImporters'', ''true''

    GO

    ```'
- fmt: 'At this point the database and log files for the `WideWorldImporters` database
    remain in their current location on disk. You could then copy these files to another
    Linux Server running SQL Server and attach them. Run the following T-SQL statement,
    which is found in the example script `attachwwi.sql`:


    ```sql

    CREATE DATABASE WideWorldImporters

    ON (FILENAME = ''/var/opt/mssql/data/WideWorldImporters.mdf''),

    (FILENAME = ''/var/opt/mssql/data/WideWorldImporters_UserData.ndf''),

    (FILENAME = ''/var/opt/mssql/data/WideWorldImporters.ldf''),

    (FILENAME = ''/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1'')

    FOR ATTACH

    GO

    ```


    Note in this example I provided all the files for the `WideWorldImporters` database
    and the folder for the Memory Optimized checkpoint files. In this example, you
    could have changed the name of the database when you attach. You could have also
    placed the files in different paths and attach from the new paths.


    `Note`  SQL Server has a legacy system procedure called `sp_attach_db` but it
    is marked deprecated, so use the `CREATE DATABASE` using the `FOR ATTACH` option.


    While you normally need all of the original files to attach the database, there
    a few hidden tricks


    1.  If the database was cleanly shut down by doing a detach when no active transactions
    exist and there is only one transaction log file, it is possible to leave out
    the transaction log file when you attach the database and SQL Server will build
    a new one automatically.

    2.  If the database was cleanly shut down by doing a detach when no active transactions
    exist and there are multiple transaction log files, SQL Server offers the `CREATE
    DATABASE` option `FOR ATTACH_REBUILD_LOG`.


    Chapter 9   Managing and Monitoring SQL Server


    You should only detach a database that is `ONLINE` and healthy. A database that
    is in a state called `SUSPECT` (because recovery failed for someone reason) cannot
    be detached. However, if you take a database offline that is `SUSPECT` and then
    drop this database, the files remain. Then if you try to attach this database,
    it will fail. If you ever find yourself in this situation, you can use what I
    call the *Paul Randal attach method*, named after my good friend Paul Randal,
    who is one of the top experts when it comes to tips and tricks for salvaging and
    repairing databases. You can read Paul’s technique for this situation at [https://www.sqlskills.com/blogs/paul/creating-detaching-re-attaching-and-fixing-a-suspect-database](https://www.sqlskills.com/blogs/paul/creating-detaching-re-attaching-and-fixing-a-suspect-database).


    `Note`  I’ll add in the hidden secret of the attach option `ATTACH_FORCED_REBUILD_LOG`.
    It is undocumented and completely unsupported but still works. It could also be
    used in a desperate situation to attach a database when the transaction log files
    are missing or damaged.


    `ALTER DATABASE Usage Scenarios`


    To this point I’ve described in this book many different purposes and scenarios
    to use `ALTER DATABASE`. The following are a few more `SET` options you might
    find useful:


    *   `EMERGENCY`: I’ll discuss this option in the next section on Repairing Databases.
    This comes in handy if the database cannot come online.

    *   `[ READ_ONLY | READ_WRITE ]`: If you would like to prevent any changes to
    a database, you can set it to `READ_ONLY`. This might come in handy if you want
    to provide a copy of a database to another user or developer so can they read
    the data, but you want to make sure they don’t make any changes to ensure a consistent
    copy of the data. Using `READ_WRITE` marks the database available for changes.

    *   `PAGE_VERIFY`: In Chapter 8, I discussed the concept of a database checksum.
    I’ll talk more about it in the next section on Repairing Databases. This is the
    option to change the default, which is `CHECKSUM` (which I recommend you use).
    The other options are `TORN_PAGE_DETECTION` (a form of page verification that
    is not as'
