- fmt: '# Chapter 8: High Availability and Disaster Recovery for SQL Server


    ## Database Snapshots


    Specific point in time, rather than having to restore a sequence of backups using
    point-in-time restore.


    Database snapshots are stored as a file on disk using a concept called `sparse
    files`. This means that when you first create a snapshot, it is small in size.
    As you make changes to the database, the original version of database pages is
    copied to the snapshot. This means the more changes that occur over time, the
    larger the snapshot. You use database snapshots just like databases. SQL Server
    will attempt to obtain database pages from the snapshot first. If they don’t exist
    in the snapshot, it means the pages were not changed from the original database
    and the page is retrieved from the database itself.


    Snapshots are not a substitute for your backup strategy but are very convenient
    for interesting situations. For example, if you are going to make major changes
    to a database for a project, create a database snapshot. If you make a major mistake,
    you can quickly revert the database with the snapshot. If you don’t need it, you
    can easily just drop the snapshot.


    Pages written to the snapshot file can add an I/O performance cost to SQL Server
    database operations, so I recommend you keep snapshot files on separate disks
    from SQL Server database and transaction log files.


    You can read more about creating snapshots, further benefits, and limitations
    of snapshots in our documentation at [https://docs.microsoft.com/sql/relational-databases/databases/database-snapshots-sql-server](https://docs.microsoft.com/sql/relational-databases/databases/database-snapshots-sql-server).


    ## VDI and Snapshot Backup


    SQL Server supports a special device not listed in the standard documentation,
    called a `virtual device`. The `VDI` is a specification for developers to build
    applications that can accept a backup as a stream of data from SQL Server to a
    program. The program can then process the stream of data in any number of ways.


    You can find an example of how to build a VDI application at [https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sqlvdi-linux](https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sqlvdi-linux).


    The `BACKUP` T-SQL statement supports VDI backups using a `TO VIRTUAL_DEVICE`
    option. In addition, VDI backups support a concept called `snapshot backups`.
    Snapshot backups allow a VDI program to copy the SQL Server database and log files
    directly to another storage device instead of relying on a stream of data from
    the backup from SQL Server. SQL Server recognizes the `WITH SNAPSHOT` option for
    `BACKUP` and will freeze I/O on all files until the VDI application acknowledges
    the snapshot (like a file copy) is complete.


    An older blog post but a good one explaining how VDI works can be found at [https://blogs.msdn.microsoft.com/sqlserverfaq/2009/04/28/informational-shedding-light-on-vss-vdi-backups-in-sql-server/](https://blogs.msdn.microsoft.com/sqlserverfaq/2009/04/28/informational-shedding-light-on-vss-vdi-backups-in-sql-server/).


    There are a few specifics to using VDI backups on SQL Server on Linux. Read about
    these details in our documentation at [https://docs.microsoft.com/sql/linux/sql-server-linux-backup-vdi-specification](https://docs.microsoft.com/sql/linux/sql-server-linux-backup-vdi-specification).


    The complete VDI specification for developers can be found at [https://www.microsoft.com/download/details.aspx?id=17282](https://www.microsoft.com/download/details.aspx?id=17282).'
