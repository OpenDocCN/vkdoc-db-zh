  trans: '# 第 9 章 管理和监控 SQL Server


    Kimberly Tripp 关于查看索引使用情况以及是否有必要保留已创建索引的见解，请参阅 [`www.sqlskills.com/blogs/kimberly/spring-cleaning-your-indexes-part-i`](https://www.sqlskills.com/blogs/kimberly/spring-cleaning-your-indexes-part-i)。


    如果你只需为表创建所需索引，然后在数据库和应用程序的整个生命周期内都无需再为此担心，那将是理想的情况。对于主要是只读的数据库，这可能部分成立。然而，几乎每个应用程序都会修改数据，而在大多数情况下，索引必须随着数据一起更新和更改。`SQL
    Server` 会自动处理这类索引修改。但是，由于数据会随时间发生一些变化，你可能需要通过重建或重组来维护索引。在本节中，我将讨论重建和重组索引的过程，并简要介绍修改索引某些属性的功能。在任何这些情况下，`SQL
    Server` 都提供 `ALTER INDEX` `T-SQL` 语句来维护现有索引。不过，首先我需要更详细地讨论索引碎片的概念。


    **注意**，`SQL Server` 社区最顶尖的专家之一 ola hallengren 提供了一个非常棒的解决方案，其中包含的脚本有助于自动化索引维护，请访问
    [`ola.hallengren.com/sql-server-index-and-statistics-maintenance.html`](https://ola.hallengren.com/sql-server-index-and-statistics-maintenance.html)。


    ## 索引碎片


    当你修改数据，尤其是插入和删除新行时，你所创建的索引可能会变得碎片化。我在之前关于索引性能能力的章节中简要提到了碎片的概念。碎片有两种类型：


    ### 逻辑或区碎片

    逻辑碎片是指逻辑上链接在一起但物理顺序错乱的页面所占的百分比。例如，聚簇索引在叶级有一个代表数据的数据库页面的链接列表。理想情况下，所有这些页面都应按 pageid
    在列表中排序，以便它们在数据库文件中物理有序且连续。如果你还记得第 6 章，我谈到过 `SQL Server` 只有在页面在文件中物理连续时才能一次读取多个页面。如果你运行一个需要在聚簇索引中扫描多个页面的
    `SQL Server` 查询，除非页面是物理有序的，否则 `SQL Server` 高效读取多个页面的能力会受到限制。区碎片是相同的概念，只是它适用于没有聚簇索引的表（堆）以及页面在
    `IAM` 页面内的排序方式。


    ### 页面紧凑度

    页面紧凑度是我在本书中创造的一个术语，你可能不会看到这个术语作为碎片概念的一部分出现。我之所以将这部分称为碎片，是因为索引（或聚簇索引的数据）的页面中行填充得越稀疏，或者说紧凑度越低，服务一个查询需求可能需要的页面就越多。这可能导致所有查询所需的页面数量超出预期，从而占用缓冲池空间并需要更多的
    `I/O`。然而，这里存在一个平衡。如果页面是 100%填满（紧凑）的，插入新行可能需要进行页面拆分，这可能导致更多的逻辑碎片。因此，理想情况下，在页面上保留一些可用空间是可取的，但不要达到大多数页面都空置的程度。当你创建、重建或重组索引时，可以使用一个名为
    `fillfactor` 的选项，就如何在索引页面中保留空间做出明智的选择。我非常喜欢 Kimberly Tripp 的这篇博客文章。'
- fmt: '# Chapter 9: Managing and Monitoring SQL Server


    To learn more about `fillfactor`, see [this article at sqlskills.com](https://www.sqlskills.com/blogs/kimberly/database-maintenance-best-practices-part-ii-setting-fillfactor).


    > **Note:** Fragmentation in an index may not affect application performance,
    especially Logical Fragmentation. Logical fragmentation mostly affects T-SQL queries
    involving scans of pages vs. a seek to a specific page. Therefore, just because
    you detect fragmentation in an index does not mean you have to always rebuild
    or reorganize the index. Having said that, in my experience almost every production
    SQL Server environment deploys a plan to keep indexes from staying fragmented,
    to ensure the maximum possible performance of all types of T-SQL queries.


    SQL Server provides a method to look at both aspects of fragmentation through
    a DMV called `sys.dm_db_index_physical_stats`. The column `avg_fragmentation_in_percent`
    tracks Logical or Extent fragmentation and `avg_page_space_used_in_percent` tracks
    how full pages are across the index.


    So the question comes up, how to resolve issues related to fragmentation? I recommend
    you look at two options provided by SQL Server to maintain an existing index:
    *Rebuild an index* or *Reorganize an index*.


    ## Rebuilding an Index


    Rebuilding an index through `ALTER INDEX` using the `REBUILD` option involves
    dropping the existing index and creating a new index based on the existing index
    definition, so it will require extra space in the database to rebuild the index.
    Note: `ALTER INDEX` and `CREATE INDEX` have an option called `SORT_IN_TEMPDB`
    to store sort results as part of the index rebuild in `tempdb` vs. the user database.
    Rebuilding the index will reorder pages in physical order to remove fragmentation
    and compact pages based on the specified `fillfactor`. In addition, rebuilding
    the index will create a new set of fresh statistics for the index.


    By default, an index rebuild is an *offline* operation that will block existing
    queries. However, like `ALTER TABLE`, `ALTER INDEX` using `REBUILD` provides an
    option to rebuild an index *online* using the `WITH ONLINE=ON` option. This allows
    queries to execute at the same time the index is being rebuilt.


    In addition, SQL Server provides an option called a *resumable* online index rebuild
    option with the `RESUMABLE=ON` option. Using this option allows you to pause an
    index rebuild and resume it where it left off. Some possible scenarios this can
    be helpful to you are:


    *   Pause an index rebuild that is consuming many resources for SQL Server affecting
    overall performance. This allows you to resume the index rebuild at a later point
    in time as opposed to having to cancel the index rebuild and run the entire process.

    *   Execute the index rebuild in chunks. For example, you could rebuild the index
    in 25% increments over time. The catalog view `index_resumable_operations` can
    be used to track the progress of resumable online index rebuilds. You can read
    more about this catalog view at [the Microsoft documentation for sys.index_resumable_operations](https://docs.microsoft.com/sql/relational-databases/system-catalog-views/sys-index-resumable-operations).


    Here is a simple example of a resumable online index rebuild using the full WideWorldImporters
    sample database. Execute the following T-SQL statement as found in the example
    `resumablerebuild.sql` to see an example of rebuilding an index online:


    ```sql

    -- (The T-SQL code for the resumable online index rebuild example would be placed
    here)

    ```'
