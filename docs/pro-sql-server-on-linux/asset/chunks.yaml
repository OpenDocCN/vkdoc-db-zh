    ```


    然而，如果使用 DAC，您将能够直接读取任何系统表。这是一个巧妙的方法，但老实说，在生产环境中我不认为您有太多必要这样做。它对于学习 SQL Server
    内部原理可能很有趣，但我们并未发布系统表的模式定义。


    > **提示**：您可以通过 `sys.system_sql_modules` 检查系统目录视图的文本，以了解系统表的工作原理。


    您不能通过 DAC 随意执行任何操作。我们设计 DAC 是为了在紧急情况下，让您能够可靠地连接到 SQL Server 并执行关键但最小的操作集。何时应该使用
    DAC？我建议仅在您甚至无法通过 Linux 服务器上的本地 `sqlcmd` 连接到 SQL Server 时才使用 DAC。一旦连接成功，可以查询 DMV（动态管理视图）如
    `dm_exec_requests`，以获取有关正在运行的连接和查询的基本情况。


    使用 DAC 可能解决以下问题场景：


    1.  工作线程数已达到最大值。

    2.  所有工作线程都被一个主导阻塞进程（lead blocker）阻塞。

    3.  该主导阻塞进程不释放其资源。例如，您可能有一个会话启动了事务，运行了获取锁的查询，但从未提交。所有工作线程都可能被阻塞，等待此事务和会话完成。

    4.  由于所有工作线程都处于忙碌状态，SQL Server 无法处理任何新的连接或查询，因为没有可用的工作线程。

    5.  然而，您可以通过 DAC 连接，并使用 T-SQL `KILL` 语句终止主导阻塞进程，从而释放所有被阻塞的工作线程。T-SQL `KILL` 语句需要比通常更高的权限，这理所当然。您可以在[此处](https://docs.microsoft.com/sql/t-sql/language-elements/kill-transact-sql)阅读更多关于
    T-SQL `KILL` 语句以及何时可能适合用于您服务器的场景的信息。


    您可以在[此处](https://docs.microsoft.com/sql/database-engine/configure-windows/diagnostic-connection-for-database-administrators)阅读更多关于
    DAC 的信息，包括其限制以及如何远程连接。


    # sqlservr 命令行选项


    在第 8 章中，我简要介绍了一种使用 `sqlservr` 程序的命令行选项来重建系统数据库的技术。您通常使用 `systemctl` 启动 SQL Server，但
    `sqlservr` 是一个可以直接从 shell 启动的程序。并且有一系列主要未文档化的命令行选项可以与 `sqlservr` 一起使用。您可以通过在 bash
    shell 中运行以下命令来查看列表（如果 SQL Server 正在运行，请务必先停止它）：


    ```bash

    sudo -u mssql /opt/mssql/bin/sqlservr --help

    ```


    您的结果应类似如下：


    ```

    usage: sqlservr [OPTIONS...]


    Configuration options:


    -T<#>                  Enable a traceflag

    -y<#>                  Enable dump when server encounters specified error

    -k<#>                  Checkpoint speed (in MB/sec)


    Administrative options:


    --accept-eula          Accept the SQL Server EULA

    ```'
- fmt: '# Chapter 9: Managing and Monitoring SQL Server


    ## 命令行选项


    *   `--pid <pid>` - 设置服务器产品密钥。

    *   `--reset-sa-password` - 重置系统管理员密码。密码应在 `SQLSERVR_SA_PASSWORD` 环境变量中指定。

    *   `-f` - 最小配置模式。

    *   `-m` - 单用户管理模式。

    *   `-K` - 强制重新生成服务主密钥。

    *   `--setup` - 设置基本配置设置然后关机。

    *   `--force-setup` - 与 `--setup` 相同，但也会重新初始化 `master` 和 `model` 数据库。


    ## 常规选项


    *   `-v` - 显示程序版本。

    *   `--help` - 显示此帮助信息。


    许多选项的功能也可以通过其他已记录的方法完成。例如，用于设置跟踪标志的 `-T` 可以通过 `mssql-conf` 实现。


    有两个选项值得特别指出，它们可用于故障排除和紧急情况：


    ## `-m`: 单用户模式


    使用 `-m` 选项启动 SQL Server 时，只有单个用户可以连接到 SQL Server。


    `-m` 的一个常见用途是需要还原 `master` 数据库的场景。你必须先以 `-m` 模式启动 SQL Server 才能还原 `master`。一个更有趣、更高级、坦率地说也更危险的场景是修改系统表或访问
    `mssqlsystemresource` 数据库。如果你以 `-m` 模式启动 SQL Server 并使用 DAC（专用管理员连接）连接到 SQL Server，你将被授予直接修改系统表的权限。在我们发布
    SQL Server 2005 之前，计划是完全锁定对系统表的任何访问。作为技术支持人员，我知道总会有些场景我们需要这种能力。妥协的结果是通过 DAC 提供对系统表的读取访问，以及通过
    `-m` 和 DAC 提供修改访问。事实证明，多年来确实有几次在紧急情况下我需要这个能力。


    但是要小心！一旦你修改了系统表，SQL Server 会在数据库结构中标记一个比特位，因此每当你打开数据库时，`ERRORLOG` 中都会记录一条警告，说明数据库系统表已被直接修改。此时你完全处于不受支持的状态。然而，微软可能让你这样做来规避某些关键问题，并且他们可以帮助你恢复到受支持的状态。


    以下是从 bash shell 以单用户模式启动 SQL Server 的命令示例：

    ```bash

    sudo -u mssql /opt/mssql/bin/sqlservr -m

    ```


    单用户模式的一个问题是所谓的“连接竞赛”。当你以单用户模式启动 SQL Server 时，第一个连接的 sysadmin“获胜”。因此，你可以使用 `-m`
    参数后的一个选项来限制谁可以通过应用程序名称连接。以下是一个示例，限制只有使用程序 `sqlcmd` 的 sysadmin 用户才能连接：

    ```bash

    sudo -u mssql /opt/mssql/bin/sqlservr -m"SQLCMD"

    ```


    请参阅我们的文档以获取有关以单用户模式启动 SQL Server 的更多信息：[https://docs.microsoft.com/sql/database-engine/configure-windows/start-sql-server-in-single-user-mode](https://docs.microsoft.com/sql/database-engine/configure-windows/start-sql-server-in-single-user-mode)。


    ## `-f`: 最小配置模式


    此选项指示 SQL Server 以最小配置模式启动。最小配置模式包括单用户模式，此外还限制其他 SQL Server 功能或以最小方法配置 SQL Server。例如，如果你进行了阻止
    SQL Server 运行或启动的服务器配置更改，SQL Server 将使用默认的服务器配置信息来启动服务器。


    我能想到的这个选项的最佳示例是服务器配置选项 `max server memory`。如果你将此值设置得太低，在某些情况下，SQL Server 可能没有足够的内存来允许连接或正常启动。以最小配置模式启动
    SQL Server……'
