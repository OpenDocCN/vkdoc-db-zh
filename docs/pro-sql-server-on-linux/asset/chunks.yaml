- fmt: "# Chapter 4 Building an Application and Advanced T-SQL\n\n## Native Scoring\n\
    \n执行以下 T-SQL 语句来创建并使用数据库：\n\n```sql\nCREATE DATABASE graphdemo;\nGO\n\nUSE graphdemo;\n\
    GO\n```\n\n### 创建节点和边表\n\n-- 创建节点（NODE）表\n\n```sql\nCREATE TABLE Person (\n  \
    \  ID INTEGER PRIMARY KEY,\n    name VARCHAR(100)\n) AS NODE;\n\nCREATE TABLE\
    \ Restaurant (\n    ID INTEGER NOT NULL,\n    name VARCHAR(100),\n    city VARCHAR(100)\n\
    ) AS NODE;\n\nCREATE TABLE City (\n    ID INTEGER PRIMARY KEY,\n    name VARCHAR(100),\n\
    \    stateName VARCHAR(100)\n) AS NODE;\n```\n\n-- 创建边（EDGE）表。\n\n```sql\nCREATE\
    \ TABLE likes (rating INTEGER) AS EDGE;\nCREATE TABLE friendOf AS EDGE;\nCREATE\
    \ TABLE livesIn AS EDGE;\nCREATE TABLE locatedIn AS EDGE;\nGO\n```\n\n现在，我可以使用特殊的\
    \ T-SQL 语法在向边表插入数据时引用节点。请参阅示例脚本`graphinsert.sql`以了解如何使用此语法：\n\n```sql\nUSE graphdemo\n\
    GO\n\nINSERT INTO Person VALUES (1,'John');\nGO\n\nINSERT INTO Restaurant VALUES\
    \ (1, 'WeServeBigSteaks', 'Fort Worth')\nGO\n\nINSERT INTO likes VALUES (\n  \
    \  (SELECT $node_id FROM Person WHERE id = 1),\n    (SELECT $node_id FROM Restaurant\
    \ WHERE id = 1),\n    9\n);\nGO\n```\n\n一旦我插入了所有数据，我就可以使用如下 T-SQL 查询语法来找出 John\
    \ 喜欢的餐馆或他的朋友喜欢的餐馆。我已将这些语句放在示例脚本`graphquery.sql`中：\n\n```sql\nUSE graphdemo\nGO\n\
    \n-- 查找 John 喜欢的餐馆\nSELECT Restaurant.name\nFROM Person, likes, Restaurant\nWHERE\
    \ MATCH (Person-(likes)->Restaurant)\nAND Person.name = 'John';\nGO\n\n-- 查找 John\
    \ 的朋友喜欢的餐馆\nSELECT Restaurant.name\nFROM Person person1, Person person2, likes,\
    \ friendOf, Restaurant\nWHERE MATCH(person1-(friendOf)->person2-(likes)->Restaurant)\n\
    AND person1.name='John';\nGO\n```\n\n第二个查询在您完成完整的示例演示之前不会找到数据，该演示可以在 [https://docs.microsoft.com/sql/relational-databases/graphs/sql-graph-sample](https://docs.microsoft.com/sql/relational-databases/graphs/sql-graph-sample)\
    \ 找到。\n\n在 SQL Server 2016 中，微软在数据库社区和行业中做了一件不可思议的事情。我们不仅创建了将数据科学和机器学习与 SQL Server\
    \ 集成的策略，还将机器学习引入到了 SQL Server 内部。\n\n在 SQL Server 2016 中，我们构建了一个架构，允许 R 脚本在与数据相同的\
    \ SQL Server 上共同定位运行，但该脚本与 SQL Server 进程是隔离的。此外，R 脚本是通过一个名为`sp_execute_external_script`的\
    \ T-SQL 存储过程执行的。数据科学家不再需要将大量数据拉取到可能已过时或不安全的工作站上。数据科学模型就存在于 SQL Server 内部。在生产环境中的性能提升是惊人的。一个展示其可能性的好例子是微软实现每秒\
    \ 100 万次预测的工作：[https://blogs.technet.microsoft.com/dataplatforminsider/2016/10/11/1000000-predictions-per-second](https://blogs.technet.microsoft.com/dataplatforminsider/2016/10/11/1000000-predictions-per-second)。\n\
    \n在 SQL Server 2017 中，我们通过支持 Python 引入了同类型的机器学习支持。\n\n问题是，截至 CU4 版本，Linux 上的 SQL\
    \ Server 2017 不支持此模型。幸运的是，SQL Server 2017 中发布了另一个相关功能，该功能在 Windows 和 Linux 版本上均适用，因为它内置于核心数据库引擎中（请记住，核心数据库引擎在\
    \ Windows 和 Linux 上是相同的）。此功能称为原生评分（Native Scoring）。原生评分通过另一个名为`PREDICT`的 T-SQL\
    \ 函数公开。\n\n以下是`PREDICT`语法的示例（如果不遵循以下示例教程，此代码将无法执行）：\n\n```sql\nDECLARE @model\
    \ VARBINARY(MAX) = (SELECT TOP(1) native_model FROM dbo.\n```"
