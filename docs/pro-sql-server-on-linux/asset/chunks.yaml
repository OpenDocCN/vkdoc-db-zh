  trans: '

    # 第七章：SQL Server 中的安全性


    ## 加密功能摘要


    [engine#feature-details](https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine#feature-details)


    -   有些功能与 `始终加密` 不兼容，例如 `时态表` 和 `内存中 OLTP`。

    -   对于加密的列，可能存在性能损耗以及需要额外的存储空间。


    即使存在这些限制和潜在的性能影响，您数据库中的某些数据（如社会安全号码、信用卡数据等）可能过于敏感，以至于承担不起泄露的风险，甚至不能冒险让拥有 SQL Server
    管理员权限的用户访问这些数据。在这些情况下，`始终加密` 提供了一个完整的端到端解决方案，并在加密和解密数据方面明确了角色分离。


    弄清楚如何在 SQL Server 中使用加密可能有点让人不知所措。让我总结一下关于如何了解我们的加密功能的建议：


    -   无论您决定选择哪种类型的加密功能，务必备份 `服务主密钥` 以及与加密相关的所有密钥。

    -   您必须决定您的应用程序是否真正需要加密。我交谈过的许多客户决定不使用加密连接或 `始终加密`，但几乎总是会加密他们的备份。

    -   如果您使用 SQL Server 创建任何密钥或证书，请备份所有这些密钥和证书，并将其存储在与数据备份分开的位置。请将任何密钥或证书视为与您的数据同等重要。

    -   `透明数据加密` 对 I/O 操作有一定的性能开销。但是，如果您担心任何人在 SQL Server 之外访问您的数据文件，则应强烈考虑使用它。笔记本电脑上的
    SQL Server 数据库可能是一个很好的例子（可以作为 `Windows BitLocker` 的第二道防线）。

    -   `始终加密` 是一个很棒的功能，但它并不适用于所有的应用程序和数据库。如果您需要一个完整的端到端加密方案，并希望将密钥的管理与数据库分离，那么 `始终加密`
    可能非常适合您。利用云，使用 `Azure Key Vault` 作为您的密钥存储提供程序。请查看如何执行此操作：[`docs.microsoft.com/azure/sql-database/sql-database-always-encrypted-azure-key-vault`](https://docs.microsoft.com/azure/sql-database/sql-database-always-encrypted-azure-key-vault)。


    ## 数据分类与审核


    欧盟于 2018 年 5 月推出了新的《通用数据保护条例》（GDPR）规则（参见官方网站：[`ec.europa.eu/commission/priorities/justice-and-fundamental-rights/data-protection/2018-reform-eu-data-protection-rules_en`](https://ec.europa.eu/commission/priorities/justice-and-fundamental-rights/data-protection/2018-reform-eu-data-protection-rules_en)），这使得数据分类、漏洞和数据审核等主题受到了新的关注。


    ![](img/index-377_1.jpg)


    Microsoft SQL Server 工程团队认识到这些需求，并通过以下文档为组织提供了一般性指导，以准备和应对 GDPR 法规：[`aka.ms/gdprsqlwhitepaper`](http://aka.ms/gdprsqlwhitepaper)。


    除了指导之外，SQL Server 还提供了工具和功能来协助这些领域的工作，包括 SQL Server Management Studio 和 T-SQL
    命令，以帮助进行标记和审核。


    ## 数据分类


    理解 SQL Server 中存储了哪些数据的一个重要方面是能够

    '
- fmt: '# Chapter 7 SeCurity in SQL Server


    to classify data according to an *information type* and *sensitivity level*. Examples
    of information types include Banking, Credentials, Health, and SSN. Examples of
    sensitivity levels are Public, Confidential, and Confidential GDPR. These types
    and sensitivity levels are fixed within the SQL Server Management Studio tool
    using the `Classify Data` functionality. This is also known as the `SQL Data Discovery
    and Classification` feature, as documented at [https://docs.microsoft.com/sql/relational-databases/security/sql-data-discovery-and-classification](https://docs.microsoft.com/sql/relational-databases/security/sql-data-discovery-and-classification).


    You can access this feature in SSMS through the Tasks option when you right-click
    a database in Object Explorer in SSMS. Here is an example of this, as seen in
    Figure 7-13.


    ## Figure 7-13. SQL data dictionary and classification for SQL Server on Linux


    ![](index-378_1.jpg)


    This feature has a fixed set of T-SQL statements that implement a dictionary of
    column names that might match information types and sensitivity levels. This dictionary
    is then matched against the current database. Figure 7-14 shows the results on
    SSMS for the WideWorldImporters Sample database.


    ## Figure 7-14. Classification results for the WideWorldImporters database


    At the top of the report on the right-hand side, it shows 92 columns were found
    that match the dictionary for possible classification. Let’s drill into the results
    and see why. If you click that gray bar at the top to see recommendations, your
    results should look like Figure 7-15.


    ![](index-379_1.jpg)


    ## Figure 7-15. Results of data classification recommendations for the WideWorldImporters
    database


    The dropdown choices for Information Type and Sensitivity Label are part of the
    dictionary. You can now select any of the checkboxes on the left and click `Accept
    selected recommendations`. The tool will save your changes once you click the
    Save icon. Now you can select the View Report option at the top of this screen
    to view a report of your classification choices and Sensitivity Labels.


    Figure 7-16 shows a report from my WideWorldImporters database when I checked
    all columns and accepted the default recommendations.


    ![](index-380_1.jpg)


    ## Figure 7-16. Default classification report for WideWorldImporters


    Currently, this tool only works in SQL Server Management Studio. And the types,
    labels, and rules are fixed. However, all the logic behind this tool uses features
    of SQL Server as described in the documentation at [https://docs.microsoft.com/sql/relational-databases/security/sql-data-discovery-and-classification](https://docs.microsoft.com/sql/relational-databases/security/sql-data-discovery-and-classification).


    The dictionary rules are a series of T-SQL statements you can capture using XEProfiler
    (as I described in Chapter 5). The classification types and labels are saved using
    a system stored procedure called `sp_addextendedproperty` (read more at [https://docs.microsoft.com/sql/relational-databases/system-stored-procedures/sp-addextendedproperty-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-stored-procedures/sp-addextendedproperty-transact-sql)).
    Using this procedure will save the data in system tables so you can retrieve them
    later. The point is, you can create our own classification scheme using this system
    stored procedure and the Extended.'
