    一旦创建了文件组，你就可以将一个或多个表或索引指定到该命名文件组。默认情况下，每个数据库都有一个名为 `PRIMARY` 的内置文件组。所有系统表都存储在与
    `PRIMARY` 文件组关联的文件中。


    生产数据库最常见的配置是为 `PRIMARY` 文件组创建一个较小的数据库文件，并为一组表和/或索引创建一个或多个命名文件组。从管理角度来看，文件组还提供了其他优势。你可以将文件组作为一个单位进行备份、还原、运行一致性检查和管理。


    让我们看一个示例，了解如何创建一个数据库，该数据库使用一个独立的文件组将数据分布在多个磁盘的多个文件上，同时将事务日志放在另一个独立的磁盘上。


    首先，我需要为我的 Linux 服务器添加磁盘。之前提到过，我使用的是一个运行在 Windows Hyper-V 上的 Linux 虚拟机。对于 Windows
    上的 Hyper-V，你可以按照我们文档中关于如何向虚拟机添加控制器、磁盘等硬件的说明进行操作：[`docs.microsoft.com/azure/virtual-machines/linux/attach-disk-portal`](https://docs.microsoft.com/azure/virtual-machines/linux/attach-disk-portal)。


    添加硬件后，我需要在 Linux 操作系统中配置新磁盘，并将目录挂载到这些磁盘上。我的虚拟机已经有两块磁盘：一块用于 Linux 的标准文件，另一块专门挂载到
    `/var/opt` 目录，标准 SQL Server 数据库文件就存放在那里。对于本示例：


    ![](img/index-284_1.png)


    我添加了四块新磁盘：一块用于存放三个新的数据库文件（它们将组成自己的文件组），另一块用于事务日志。如果你之前没有在 Linux 中配置过磁盘，我发现这份关于如何在
    Azure 虚拟机中操作的文档非常有用：[`docs.microsoft.com/azure/virtual-machines/linux/add-disk`](https://docs.microsoft.com/azure/virtual-machines/linux/add-disk)。


    对于我的虚拟机，当我完成磁盘配置并将目录挂载到它们之后，最终的配置如图 6-9 所示。


    *图 6-9. 在 Linux 中为 SQL Server 使用多块磁盘*


    在我的示例中，`/dev/sdb` 磁盘是我为虚拟机创建的第二块磁盘，我将 `/var/opt` 目录挂载到了上面。安装 SQL Server 时，系统数据库被复制到了
