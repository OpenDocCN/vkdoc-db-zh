  trans: '# 第 9 章：管理与监控 SQL Server


    要了解更多关于 `fillfactor` 的信息，请参阅 [sqlskills.com 上的这篇文章](https://www.sqlskills.com/blogs/kimberly/database-maintenance-best-practices-part-ii-setting-fillfactor)。


    > **注意：** 索引中的碎片可能不会影响应用程序性能，尤其是逻辑碎片。逻辑碎片主要影响涉及页面扫描（而非 seek 到特定页面）的 T-SQL 查询。因此，检测到索引中存在碎片并不意味着你总是需要重建或重新组织索引。话虽如此，根据我的经验，几乎每个生产
    SQL Server 环境都会部署一个计划来防止索引保持碎片化，以确保所有类型的 T-SQL 查询都能获得最佳性能。


    SQL Server 提供了一种通过名为 `sys.dm_db_index_physical_stats` 的 DMV 来查看碎片这两个方面情况的方法。列
    `avg_fragmentation_in_percent` 追踪逻辑或区碎片，而 `avg_page_space_used_in_percent` 追踪索引中页面的填充程度。


    那么问题来了，如何解决与碎片相关的问题？我建议你考虑 SQL Server 提供的两个用于维护现有索引的选项：*重建索引* 或 *重新组织索引*。


    ## 重建索引


    通过使用 `REBUILD` 选项的 `ALTER INDEX` 来重建索引，涉及删除现有索引并根据现有索引定义创建新索引，因此需要在数据库中预留额外空间来重建索引。注意：`ALTER
    INDEX` 和 `CREATE INDEX` 有一个名为 `SORT_IN_TEMPDB` 的选项，用于将排序结果作为索引重建的一部分存储在 `tempdb`
    中，而不是用户数据库中。重建索引将按物理顺序重新排序页面以消除碎片，并根据指定的 `fillfactor` 压缩页面。此外，重建索引将为该索引创建一套全新的统计信息。


    默认情况下，索引重建是一项*离线*操作，会阻塞现有查询。但是，与 `ALTER TABLE` 类似，使用 `REBUILD` 的 `ALTER INDEX`
    提供了一个选项，可通过 `WITH ONLINE=ON` 选项来*在线*重建索引。这允许查询在索引重建的同时执行。


    此外，SQL Server 提供了一个名为*可恢复的*在线索引重建选项，使用 `RESUMABLE=ON` 选项。使用此选项允许你暂停索引重建，并在中断处恢复。以下是一些可能对你有帮助的场景：


    *   暂停一个正在消耗大量 SQL Server 资源并影响整体性能的索引重建操作。这允许你在稍后时间点恢复索引重建，而不必取消重建并重新运行整个过程。

    *   分块执行索引重建。例如，你可以随时间分 25% 的增量重建索引。目录视图 `index_resumable_operations` 可用于跟踪可恢复在线索引重建的进度。你可以在
    [sys.index_resumable_operations 的 Microsoft 文档](https://docs.microsoft.com/sql/relational-databases/system-catalog-views/sys-index-resumable-operations)
    中阅读更多关于此目录视图的信息。


    以下是一个使用完整的 WideWorldImporters 示例数据库进行可恢复在线索引重建的简单示例。执行示例 `resumablerebuild.sql`
    中的以下 T-SQL 语句，以查看在线重建索引的示例：


    ```sql

    -- （可恢复在线索引重建示例的 T-SQL 代码将放在此处）

    ```'
- fmt: '### with the resumable option:


    ```sql

    USE WideWorldImporters

    GO

    ALTER INDEX PK_Purchasing_PurchaseOrders

    ON [Purchasing].[PurchaseOrders]

    REBUILD

    WITH (ONLINE = ON, RESUMABLE = ON);

    GO

    ```


    `ALTER INDEX` using `REBUILD` can take advantage of parallelism, and follows the
    rules as with queries to decide `MAXDOP`. The `ALTER INDEX` statement offers a
    `MAXDOP` hint. In addition, `ALTER INDEX` offers an option called `ALL` to rebuild
    all indexes for the specified table in a single transaction.


    ## Reorganizing an Index


    An alternative to rebuilding the index is reorganizing the index. An index reorganization
    is an online operation and uses existing index pages to compact pages and shuffle
    pages to move them into physical order. You use the `ALTER INDEX` with the `REORGANIZE`
    option to reorganize an index.


    Reorganizing an index provides a great option to help with index fragmentation
    but does not update statistics for the index. In addition, `ALTER INDEX` with
    `REORGANIZE` has options to use `ALL` to reorganize all indexes for the table
    and also allows you to specify a fillfactor. Paul Randal has a great blog post
    to describe the difference between rebuilding and reorganizing an index at [https://www.sqlskills.com/blogs/paul/sqlskills-sql101-rebuild-vs-reorganize](https://www.sqlskills.com/blogs/paul/sqlskills-sql101-rebuild-vs-reorganize).


    ## Adaptive Index Defragmentation


    You can use the guidance from the documentation to decide to rebuild or reorganize
    an index, as described at [https://docs.microsoft.com/sql/relational-databases/indexes/reorganize-and-rebuild-indexes](https://docs.microsoft.com/sql/relational-databases/indexes/reorganize-and-rebuild-indexes).
    However, thanks to the smart folks in SQL Engineering known as the Tiger Team,
    you can use a script to create a stored procedure that is *intelligent* to decide
    whether to rebuild or reorganize your indexes. This script and its concept are
    called Adaptive Index Defragmentation. You can read more about this script, its
    features, and download it at [https://github.com/Microsoft/tigertoolbox/tree/master/AdaptiveIndexDefrag](https://github.com/Microsoft/tigertoolbox/tree/master/AdaptiveIndexDefrag).


    ## Modifying an Index


    It is possible to change some of the properties of an index without requiring
    the index to be rebuilt. This includes options like locking behavior (e.g., `ALLOW_PAGE_LOCKS`)
    and statistics options (e.g., `STATISTICS_NORECOMPUTE`). Most options for `ALTER
    INDEX` do require changes to the index structure as seen previously in the examples
    for rebuilding and reorganizing an index. For a full list of options for `ALTER
    INDEX`, see our documentation at [https://docs.microsoft.com/sql/t-sql/statements/alter-index-transact-sql#arguments](https://docs.microsoft.com/sql/t-sql/statements/alter-index-transact-sql#arguments).


    ### Maintaining Columnstore Indexes


    I discussed the amazing performance feature called Columnstore indexes in Chapter
    6. Even though Columnstore indexes are organized differently than rowstore indexes,
    they still can require maintenance. Here are some resources to use when deciding
    how to maintain Columnstore indexes:


    - Check out the documentation on defragmentation of Columnstore indexes at [https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-defragmentation](https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-defragmentation).

    - Here is a discussion on how to defragment a Columnstore index.'
