    major SQL


    Server user conference a few years back on YouTube a[t https://youtu.be/SvseGMobe2w.](https://youtu.be/SvseGMobe2w)


    ** Triggers**


    A trigger is a special kind of stored procedure that automatically executes when
    an


    event occurs in the database server. DML triggers execute when a user tries to
    modify


    data through a data manipulation language (DML) event such as INSERT, UPDATE,
    or


