    # 第 2 章 安装与配置


    ## 探索 Linux 上的 SQL Server


    在开发应用程序、使用和管理 SQL Server 的过程中，我认为了解所有组件的安装位置和内容会非常有帮助。此外，SQL Server 在 LOG 目录中提供了多个可用于故障排除和监控的文件，因此我将更详细地介绍该目录及其包含的内容。


    ## 已安装内容


    根据 Linux 应用程序的常规准则，SQL Server 将其二进制文件安装在 `/opt` 目录中，而其“应用程序”文件（包括数据库文件）则安装在 `/var/opt`
    目录中。在 SQL Server 2017 中，您无法更改这些目录的位置（但可以更改数据库、“日志”文件和备份的默认位置）。


    ### /opt/mssql


    `bin` 目录包含主要的 `sqlservr` 二进制文件、`mssql-conf` bash 脚本以及一系列用于支持转储文件诊断的 shell 脚本。


    `lib` 目录包含以下类型的文件：


    *   `lib*.so` 文件，这些是 `sqlservr` 使用的共享库

    *   一个名为 `mssql-conf` 的目录，其中包含被主 `mssql-conf` bash shell 脚本调用的 python 脚本

    *   一系列扩展名为 `.sfp` 的文件。这些文件是 Linux 上 SQL Server 架构魔力的一部分。它们采用二进制格式，包含由 SQLPAL
    加载以运行 `SQLSERVR.EXE`、各种 DLL、`libOS` 和其他二进制文件的二进制文件。sfp 文件还包含系统数据库，例如 `master`、`model`
    和 `msdb`。我们将在第 3 章讨论系统数据库。


    ### /var/opt/mssql


    默认情况下，此目录应包含以下文件和目录：


    *   `data` 目录包含系统数据库文件、用户数据库文件和事务日志文件（除非您在创建数据库时指定了目录，或者使用 `mssql-conf` 更改了默认目录）。

    *   `log` 目录包含“日志文件”，其中包括 `ERRORLOG` 文件和其他用于诊断或故障排除目的的文件。

    *   `mssql.conf` 文件是一个文本文件，用于存储使用 `mssql-conf` 脚本时的最新选项。`mssql-conf` 脚本将选项写入此文件。当
    SQL Server 启动时，它会读取此文件以更改配置选项，这就是为什么通常必须重启 SQL Server 才能使通过 `mssql-conf` 所做的更改生效的原因。


    ### 其他文件


    SQL Server 安装的其他文件包括：


    *   我们的最终用户许可协议文件（所有语言版本）存储在 `/usr/share/doc/mssql-server` 中。

    *   `sqlservr` 和 `mssql-conf` 的帮助手册页存储在 `/usr/share/man/man1` 目录中。


    ![](img/index-86_1.png)


    ## 使用日志文件


    安装完成后，LOG 目录（默认为 `/var/opt/mssql/log`）中将立即包含以下类型的文件：


    *   `errorlog*`：这是一个自 SQL Server 成为产品以来就一直存在的文本文件。它被称为“错误日志”文件，但已扩展到不仅仅包含错误。当
    SQL Server 启动时，有关 SQL Server 配置和启动进度的丰富信息会存储在此文件中。此后，该文件主要包含错误和警告，但也可能包含其他类型的重要信息。当您遇到
    SQL Server 问题时，这是需要收集和分析的基本文件之一。默认情况下，当 SQL Server 启动时，它会将先前的 ERRORLOG 文件复制为 `ERRORLOG.<n>`，并创建一个名为
    `ERRORLOG` 的新文件。SQL Server 在轮换之前会保留六个先前的 ERRORLOG 版本。我将在本书中不时讨论 `ERRORLOG` 文件，但首先让您了解这是
    SQL Server 的一个关键文件至关重要。图 2-17 显示了 SQL ERRORLOG 文件的典型开头部分。


    **图 2-17. SQL Server 错误日志文件**


    *   `log*.trc`：SQL Server 跟踪是一个传统的跟踪系统，默认情况下

