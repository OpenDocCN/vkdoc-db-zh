    你看过电影*飞机、火车和汽车*吗？这是一部经典喜剧，它几乎概括了本书的写作历程。本书的部分内容是在飞往世界各地的航班上、伦敦的地铁里，以及今年春天我和妻子开车往返于俄克拉荷马州埃德蒙和德克萨斯州，去看我儿子打大学生涯最后一年棒球比赛的旅途中写就的。书中的这些篇章曾随我走遍美国和欧洲各地，包括西雅图、华盛顿特区、奥兰多、森尼韦尔、伦敦、苏格兰的圣安德鲁斯、拉斯维加斯、德克萨斯州的韦科、俄克拉荷马州的埃德蒙、旧金山、我在德克萨斯州欧文的办公室，以及我位于德克萨斯州北里奇兰山的家。在旅行中撰写这本书，使其成为一段更愉快的经历，并为本书增添了价值。例如，在
    2018 年 5 月于旧金山参加`Red Hat 峰会`时，我学到了一些关于`Red Hat Enterprise Linux`的具体知识。


    本书面向有兴趣了解在`Linux`上运行的`SQL Server`的开发人员、数据库管理员和 IT 专业人士。在起草书籍大纲并向`Apress`提交提案时，我做了一个重大决定：我决定不仅为熟悉`Windows`上`SQL
    Server`的`SQL Server`专业人士撰写本书，也为熟悉`Linux`但不了解`SQL Server`的开发人员或`IT`专业人士而写。这不是一个轻松的选择，因为当其他书籍都只写`SQL
    Server`的某一方面时，该如何用一本书来涵盖`SQL Server`呢？我决定基于自己 25 年来使用该产品的经验，专注于使用、开发和管理`SQL Server`最重要的方面，同时包含`Windows`和`Linux`上`SQL
    Server`的关键差异。


    本书也给了我一个机会，分享我个人在 25 年间支持和从事`SQL Server`工作过程中的一些有趣故事，包括提及过去和现在的`Microsoft`同事。颇具讽刺意味的是，我最终选择在`SQL
    Server`运行于`Windows NT`平台 25 周年之际来撰写这本书，但却是写关于`Linux`上的`SQL Server`。我在加入`Microsoft`之前是一名`UNIX`开发人员，所以对我来说，能够重新认识`Linux`内核和`Shell`是一件很特别的事。


    # 引言


    无论你决定如何阅读本书，我确实建议你从第 1 章开始。在该章中，我讲述了将`SQL Server`引入`Linux`的历史，以及我们在`Microsoft`做出这一选择的原因。在第
    1 章中，我还为你提供了一些关于架构的有趣见解，这是我在`Microsoft`职业生涯中见过的最具创新性的项目之一。之后，你可以选择你想重点阅读的章节。我想说明的是，我在撰写本书时，本意是让你按顺序阅读每一章，因为我在某些章节中引用了前面章节的内容。然而，将每一章作为独立的主题来阅读也是完全可行的。有些章节比其他章节长，因为我觉得某些主题值得更多细节（或者我就是忍不住多写了一些）。虽然本书共有十一章，但可以分为三个部分：


