    # 第六章：性能能力


    如果你仔细查看这些结果中的 XML 执行计划（SHOWPLAN）的详细信息，会发现一个名为 `RunTimePartitionSummary` 的独特章节，如图
    6-18 所示。


    ![](img/index-314_1.jpg)


    *图 6-18. XML 执行计划中的分区统计信息*


    `RunTimePartitionSummary` XML 节点显示，为满足此查询，访问了五个可能分区中的两个分区，包括分区 1 和分区 2。这解释了为什么即使查询计划显示了
    `索引扫描`，也并不需要扫描整个索引来满足查询需求。这就是**分区消除**的一个例子，也解释了使用分区的性能优势之一。


    我将分区描述得似乎很简单，它们也确实可以很简单。然而，为了满足应用程序的需求，它们的使用可能会更复杂。请使用以下资源了解更多关于分区的信息：


    *   我们关于分区的文档：[`docs.microsoft.com/sql/relational-databases/partitions/partitioned-tables-and-indexes`](https://docs.microsoft.com/sql/relational-databases/partitions/partitioned-tables-and-indexes)

    *   由 MVP Kendra Little 撰写的关于分区消除的优秀博客文章：[`littlekendra.com/2015/11/17/did-my-query-eliminate-table-partitions-sql-server`](https://littlekendra.com/2015/11/17/did-my-query-eliminate-table-partitions-sql-server)

    *   由一位既是密友也是顶级 MVP 的 Kimberly Tripp 撰写的关于分区的出色博客文章，她对此既有知识又充满热情：[`www.sqlskills.com/blogs/kimberly/sqlskills-sql101-partitioning/`](https://www.sqlskills.com/blogs/kimberly/sqlskills-sql101-partitioning/)（注：Kim
    直言不讳地指出，分区更多是关于可管理性，而非性能。我认为她的观点，如果你仔细阅读的话，是说分区并非所有性能问题的万能解药，但它们确实能带来性能收益。她也提到了分区视图的概念，本书此部分并未涵盖。）


    ## 列存储索引


    或许为加速 SQL Server 性能而引入的最酷且实用的功能之一就是列存储索引。`列存储` 是一种逻辑上以具有行和列的表形式组织，物理上以*列式*数据格式存储的数据。`行存储`
    则在逻辑和物理上都是以*行式*格式组织和存储的。行式是 SQL Server 表和索引的标准格式。


    列存储索引通过列式结构、高效压缩、数据消除和批处理模式执行来帮助加速性能。


    列存储的概念已存在一段时间，但直到 SQL Server 2012 才被引入 SQL Server（其压缩算法与 Vertipaq 引擎通用，后者用于 PowerPivot
    和 SQL Server Analysis Services 等产品）。我常听到关于列存储索引的一个常见误解是称其为“内存中技术”。列存储索引存储在磁盘上，并在内存和磁盘上进行压缩。如果列存储索引能够全部装入内存，性能当然会达到最优，但它并不要求整个列存储索引都装入内存。正是列存储索引的压缩使得更多数据能够装入内存，这使其成为
    SQL Server 的一项高效特性。


    ## 工作原理


    为了更好地理解列存储的工作方式，让我再介绍几个术语：


    **行组**：一组同时被压缩成列存储格式的行


    **段**：行组内一列数据的切片

