  trans: "\n## 第二章：安装与配置\n\n由于我使用了 `grep`，输出结果未显示列名。第二列是进程 PID，第一列是父进程 PID。因此，进程 `2548`\
    \ 是“父级”看守进程 `SQLSERVR`，而 `2573` 是其“子级”进程，但也是“主” `SQLSERVR` 进程。\n\n如果 SQL Server\
    \ 运行不正常或安装过程中出现故障，请参阅本章的“安装故障排除”部分。我见过最常见的错误是跳过了使用 `setup` 选项运行 `mssql-conf` 脚本的步骤。\n\
    \n### 本地连接并运行查询\n\n按照以下说明，在 Linux 服务器上使用基本的命令行工具 `sqlcmd`，以证明您可以连接并运行查询。`sqlcmd`\
    \ 是一个允许您对任何已安装的 SQL Server 执行 T-SQL 命令的工具。\n\n1.  安装适用于 RHEL 的工具包和 ODBC。\n   \
    \ **注意**，有关在所有发行版上安装命令行工具的完整说明，请[访问 https://docs.microsoft.com/sql/](https://docs.microsoft.com/sql/linux/sql-server-linux-setup-tools)。\n\
    \n    ```\n    sudo curl -o /etc/yum.repos.d/msprod.repo https://packages.microsoft.com/config/rhel/7/prod.repo\n\
    \    ```\n\n    输出结果与下载 `mssql-server` 的仓库文件非常相似。\n\n    ```\n    sudo yum install\
    \ -y mssql-tools unixODBC-devel\n    ```\n\n    需要安装两个软件包：(1) 命令行工具和 (2) Linux\
    \ ODBC 包（Linux 上的 `sqlcmd` 使用 ODBC）。这正是 `yum` 大显身手的地方，因为它会自动检测到对 `msodbcsql` 包的依赖关系。例如：\n\
    \n    ```\n    Loaded plugins: product-id, search-disabled-repos, subscription-manager\n\
    \    Resolving Dependencies\n    --> Running transaction check\n    ---> Package\
    \ mssql-tools.x86_64 0:14.0.6.0.1 will be installed\n    -->  Processing Dependency:\
    \ msodbcsql < 13.2.0.0 for package: mssql-tools-14.0.6.0-1.x86_64\n    -->  Processing\
    \ Dependency: msodbcsql >= 13.1.0.0 for package: mssql-tools-14.0.6.0.1-x86_64\n\
    \    ---> Package unixODBC-devel.x86_64 0:2.3.1-11.el7 will be installed\n   \
    \ --> Running transaction check\n    ---> Package msodbcsql.x86_64 0:13.1.9.2-1\
    \ will be installed\n    --> Finished Dependency Resolution\n    ```\n\n    系统会提示您填写\
    \ EULA 许可协议，安装过程应该非常迅速。\n\n2.  将工具路径添加到您的 `PATH` 环境变量中，以便于执行。\n    `PATH` 定义了搜索程序的目录，因此您无需明确指定程序的路径或从其安装目录运行它。以下命令将为命令行工具更新\
    \ `PATH`，并将其写入文件，这些文件将为任何未来的登录会话指定 `PATH`。\n\n    ```\n    echo 'export PATH=\"\
    $PATH:/opt/mssql-tools/bin\"' >> ~/.bash_profile\n    echo 'export PATH=\"$PATH:/opt/mssql-tools/bin\"\
    ' >> ~/.bashrc\n    source ~/.bashrc\n    ```\n\n3.  使用 `sqlcmd` 连接并运行查询。\n\n\
    \    ```\n    sqlcmd -Usa\n    ```\n\n    系统将提示您输入在安装过程中指定的 `sa` 密码。如果连接成功，您将看到一个如下所示的\
    \ `sqlcmd` 提示符：\n\n    ```\n    [thewandog@bwsql2017rhel ~]$ sqlcmd -Usa\n   \
    \ Password:\n    1>\n    ```\n\n    如果 SQL Server 未运行，并且您尝试使用 `sqlcmd` 连接，则会收到类似以下的错误：\n\
    \n    ```\n    Sqlcmd: Error: Microsoft ODBC Driver 17 for SQL Server : Login\
    \ timeout expired.\n    Sqlcmd: Error: Microsoft ODBC Driver 17 for SQL Server\
    \ : TCP Provider: Error code 0x2749.\n    Sqlcmd: Error: Microsoft ODBC Driver\
    \ 17 for SQL Server : A network-related or instance-specific error has occurred\
    \ while establishing a connection to SQL Server. Server is not found or not accessible.\
    \ Check if instance name is correct and if SQL Server is configured to allow remote\
    \ connections. For more information see SQL Server Books Online..\n    ```\n\n\
    我曾遇到客户犯的一个错误是，在执行 `yum install` 后忘记运行带 `setup` 选项的 `mssql-conf` 命令。图 2-14 中的错误就是您在此场景下会看到的相同错误。\n\
    \n既然您已成功连接，请运行以下两个“完整性检查”查询：\n"
- fmt: "# 第2章：安装与配置\n\n## 执行查询\n\n执行以下命令来检查SQL Server版本：\n```sql\n1> select @@version\n\
    2> go\n```\n\n结果将取决于你安装的SQL Server版本以及使用的Linux发行版。以下是SQL Server 2017累积更新7在RHEL\
    \ 7.5上的结果示例：\n```\nMicrosoft SQL Server 2017 (RTM-CU7) (KB4229789) - 14.0.3026.27\
    \ (X64)\nMay 10 2018 12:38:11\nCopyright (C) 2017 Microsoft Corporation\nEnterprise\
    \ Edition: Core-based Licensing (64-bit) on Linux (Red Hat Enterprise Linux)\n\
    (1 rows affected)\n```\n\n现在运行此查询以列出SQL Server上安装的数据库：\n```sql\n1> select name,\
    \ state_desc from sys.databases\n2> go\n```\n\n你的结果应类似如下：\n```\nname        state_desc\n\
    ----------- --------------------------------------------------------\nMaster \
    \     ONLINE\nTempdb      ONLINE\nModel       ONLINE\nMsdb        ONLINE\n```\n\
    \n输入`\"exit\"`退出`sqlcmd`。\n\n## 远程连接\n\n最后一个基础检查是远程连接到本地Linux服务器之外的SQL Server。这涉及以下步骤：\n\
    \n1.  为SQL Server开放防火墙。\n    SQL Server默认监听TCP端口1433，来自其他客户端的网络流量很可能无法访问该端口。因此，在Linux服务器的防火墙上运行以下命令开放此端口。以下命令在RHEL服务器上开放防火墙。\n\
    \    ```bash\n    sudo firewall-cmd --zone=public --add-port=1433/tcp --permanent\n\
    \    sudo firewall-cmd –-reload\n    ```\n\n2.  连接到SQL Server。\n    你可以使用任何允许连接到SQL\
    \ Server的有效工具。你可以从[https://docs.microsoft.com/sql/tools/overview-sql-tools](https://docs.microsoft.com/sql/tools/overview-sql-tools)获取完整工具列表。图2-9展示了使用Windows版的`sqlcmd`通过IP地址成功连接到Linux上的SQL\
    \ Server。注意语法包含了端口1433，因为直接使用了IP地址。\n    ```\n    sqlcmd –Usa -S10.0.0.0,1433\n\
    \    ```\n    ![](index-72_1.png)\n\n**图2-9.  到Linux上SQL Server的远程连接**\n\n## 更多验证SQL\
    \ Server功能的方法\n\n我推荐你完成另外三项测试，以确保获得最佳的SQL Server体验：\n\n*   重启SQL Server服务。\n \
    \   使用`systemctl`命令重启SQL Server服务。\n    ```bash\n    sudo systemctl restart mssql-server\n\
    \    ```\n    此命令执行完成后不会提供任何信息，即使成功也是如此。我建议你在此重启后，按照本节前面的基础验证步骤进行检查。\n\n*   重启Linux服务器。\n\
    \    我推荐的另一项验证步骤是重启你的Linux服务器，并执行我在前一节概述的基础验证步骤。这可以确保所有文件系统都已正确挂载，并且SQL Server可以在Linux服务器启动时成功启动。我遇到过这样的例子：客户添加了一个磁盘并在该磁盘上挂载了`/var/opt`文件系统，但没有在`/etc/fstab`文件中添加条目。重启后，文件系统未被挂载，因此SQL\
    \ Server未能启动。\n\n*   还原数据库。\n    我推荐你测试的另一项能力是还原数据库并进行查询。正如我在本章前面提到的，Microsoft提供了一个用于测试还原的示例数据库，名为`WideWorldImporters`。\n\
    \n要完成还原，请遵循以下步骤：\n\n1.  下载`WideWorldImporters`示例备份文件。\n    你可以从[https://docs.microsoft.com/sql/sample/world-wide-importers/wide-world-importers-documentation](https://docs.microsoft.com/sql/sample/world-wide-importers/wide-world-importers-documentation)下载示例数据库。如果你的Linux服务器连接到互联网，可以直接下载到服务器上，使用bash\
    \ shell中的以下命令：\n    ```bash\n    wget https://github.com/Microsoft/sql-server-samples/releases/download/\n\
    \    ```"
  raw: '1> select @@version


    2> go


    The results will depend on what version of SQL Server you install and what Linux


    distribution you use. The following show the results of SQL Server 2017 Cumulative


    Update 7 on RHEL 7.5.


    Microsoft SQL Server 2017 (RTM-CU7) (KB4229789) - 14.0.3026.27 (X64)


    May 10 2018 12:38:11


    Copyright (C) 2017 Microsoft Corporation


    Enterprise Edition: Core-based Licensing (64-bit) on Linux (Red Hat


    Enterprise Linux)


    Chapter 2   InStaLL anD ConfIguratIon


    (1 rows affected)


    Now run this query to list out the databases installed on SQL Server:


    1> select name, state_desc from sys.databases


    2> go


    Your results should look like the following:


    name        state_desc


    ----------- --------------------------------------------------------


    Master      ONLINE


    Tempdb      ONLINE


    Model       ONLINE


    Msdb        ONLINE


    Type in “exit” to quit sqlcmd.


    ** Connect  Remotely**


    One last basic check is to remotely connect to SQL Server outside of the local
    Linux


    server. This involves these steps:


    1.  Open the firewall for SQL Server.


    SQL Server by default listens on TCP port 1433 and it is unlikely that network
    traffic


    would be allowed to that port from other clients. Therefore, run the following
    commands


    to open this port from the firewall of the Linux server. These commands open the
    firewall


    on a RHEL server.


    sudo firewall-cmd --zone=public --add-port=1433/tcp --permanent


    sudo firewall-cmd –-reload


    2.  Connect to SQL Server.


    You can use any valid tool that allows a connection to SQL Server. You can get
    a


    complete list of tools of your choice fr[om https://docs.microsoft.com/sql/tools/](https://docs.microsoft.com/sql/tools/overview-sql-tools)


    [overview-sql-tools. F](https://docs.microsoft.com/sql/tools/overview-sql-tools)igur[e 2-9 sho](#index_split_001.html#p72)ws
    a successful connection to SQL Server on Linux using the Windows version of sqlcmd
    based on its IP address. Notice the syntax includes


    port 1433, since I’m using the IP address directly.


    sqlcmd –Usa -S10.0.0.0,1433


    ![](index-72_1.png)


    Chapter 2   InStaLL anD ConfIguratIon


    ***Figure 2-9.  **A remote connection to SQL Server on Linux*


    ** More Ways to Verify SQL Server Functionality**


    There are three other tests I recommend you go through to ensure the best SQL
    Server


    experience:


    •  Restart the SQL Server service.


    Restart the SQL Server service using the **systemctl** command


    sudo systemctl restart mssql-server


    When this completes, there is no information provided, even


    when it is successful. I recommend you go through the basic


    verification steps earlier in this section after this restart.


    •  Restart the Linux Server.


    Another verification step I recommend is to restart your Linux


    server and perform the basic verification steps I’ve outlined in


    the previous section. This ensures all filesystems are mounted


    properly and SQL Server can successfully start when the Linux


    server starts. I’ve seen examples where a customer added a disk


    and mounted the /var/opt filesystem on that disk but did not put


    the entry in the /etc/fstab file. On restart, the filesystem was not


    mounted and therefore SQL Server did not start.


    •  Restore a database.


    The other step I recommend you test out is your ability to restore


    a database and query it. As I’ve mentioned earlier in this chapter,


    Microsoft has a sample database so you can test a restore, called


    WideWorldImporters.


    Chapter 2   InStaLL anD ConfIguratIon


    To complete the restore, follow these steps:


    1.  Download the WideWorldImporters sample backup.


    You can download the sample database from [https://docs.microsoft.com/sql/](https://docs.microsoft.com/sql/sample/world-wide-importers/wide-world-importers-documentation)


    [sample/world-wide-importers/wide-world- importers-documentation. Y](https://docs.microsoft.com/sql/sample/world-wide-importers/wide-world-importers-documentation)ou
    can download this directly to your Linux Server if it is connected to the Internet,
    using the


    following command from the bash shell:


    wget https://github.com/Microsoft/sql-server-samples/releases/download/'
