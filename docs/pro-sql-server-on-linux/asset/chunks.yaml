  trans: '

    对于阅读本书但不熟悉 SQL Server 版本的读者来说，了解某些功能仅在特定版本中可用这一点非常重要。要获取特定版本可用功能的完整列表，请参阅此文档页面：[`docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2017?view=sql-server-linux-2017#includessnoversionincludesssnoversion-mdmd-editions`](https://docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2017?view=sql-server-linux-2017#includessnoversionincludesssnoversion-mdmd-editions)。


    Linux 上的 SQL Server 2017 提供以下版本：


    *   **企业版**：这是功能最全面的版本。正如其名，它设计用于企业级数据库应用程序。从许可角度来看，企业版有两种变体：企业版和企业核心版。企业核心版具有全部功能，而企业版在使用特定数量的计算核心方面有一些限制。企业版仅适用于与
    Microsoft 有合同协议的特定客户。

    *   **标准版**：此版本旨在为面向较小部门或中等规模工作负载的应用程序提供 SQL Server 的基本功能。我们从 SQL Server 2016
    SP1 开始做出的一个重大改变是，向标准版开放了一些之前仅在企业版中可用的功能。此举的理由是确保开发人员可以构建应用程序，而无需过多担心他们的应用程序针对的是哪个
    SQL Server 版本。这些功能在标准版上有大小限制，但现在都可以使用了。你可以在此博客文章中阅读有关此更改的更多信息：[`blogs.msdn.microsoft.com/sqlreleaseservices/sql-server-2016-service-pack-1-sp1-released/`](https://blogs.msdn.microsoft.com/sqlreleaseservices/sql-server-2016-service-pack-1-sp1-released/)。

    *   **开发版**：这是一个免费版本，包含企业版的所有功能。但是，此版本的许可限制其不能用于生产环境。你可以使用此版本来构建和测试你的应用程序。

    *   **Web 版**：此版本类似于标准版，但限制更低，并且专门针对 Web 托管商定价。

    *   **速成版**：这是最基本的版本，但免费且可用于生产环境。不过它的限制很大，不应被用于任何类型的应用程序扩展。但如果你作为一名开发人员刚开始接触 SQL
    Server，SQL Server 速成版可能会很有用。它有一个通往标准版和企业版的简易升级路径。对于 Linux，SQL Server 速成版可以作为一个非常实用的、仅用于配置的副本服务器。这将在第
    8 章中更详细地讨论。


    我还应该提到，SQL Server 提供了一个评估版。它包含企业版的所有功能，但未获得生产使用的许可，并且具有基于时间的过期许可。但这是在企业服务器上测试
    SQL Server 功能的绝佳方式。在第 2 章中，我将描述如何选择你想要使用的 SQL Server 版本。


    ## 哪些功能不可用


    拥有如此强大的功能阵容，也意味着 SQL Server 中有一些领域是不可用的

