    # 第 7 章 SQL Server 安全


    ## 漏洞评估


    本章介绍了关于安全的诸多不同概念。你需要在满足应用需求的前提下，确保将 SQL Server 及其数据库配置得尽可能安全。因此，确保尽可能减少所有可能的攻击面并遵循最佳实践至关重要。但什么是最佳实践呢？我在本章开头为你指向了一个参考文档：[`docs.microsoft.com/sql/relational-databases/security/securing-sql-server`](https://docs.microsoft.com/sql/relational-databases/security/securing-sql-server)。


    不过，如果能运行一个工具来检查你的系统是否符合这些最佳实践，岂不更好？SQL Server Management Studio 中内置了这样一个功能，名为
    `SQL 漏洞评估`。你可以在以下位置找到相关文档：[`docs.microsoft.com/sql/relational-databases/security/sql-vulnerability-assessment`](https://docs.microsoft.com/sql/relational-databases/security/sql-vulnerability-assessment)。


    我在 SQL Server on Linux 上针对 WideWorldImporters 示例数据库运行了此工具。图 7-17 展示了在 SQL Server
    Management Studio 中得到的结果。


    **图 7-17.** 在 `WideWorldImporters` 数据库上运行的 `SQL Server 漏洞评估`


    ![](img/index-382_1.jpg)


    从评估工具中未通过的规则可以看出，该工具内置了审查数据库元数据的功能，涉及诸如列分类、启用 `TDE`（透明数据加密）、确保对象授权及遵循最佳实践使用角色等领域。


    尽管此工具目前仅在 SQL Server Management Studio 中可用，但它会为每条规则（无论是通过还是未通过的规则）显示用于检查该安全实践的
    `T-SQL` 语句。


    图 7-18 展示了一个示例，说明如何查看为 `WideWorldImporters` 数据库标记为低风险的其中一条规则背后的 `T-SQL` 查询。


    **图 7-18.** 漏洞评估 `T-SQL` 查询详情


    由于漏洞评估工具使用了一系列 `T-SQL` 查询，我使用了 SQL Server Management Studio 中的 `XEProfiler`，并将所有查询保存到了
    `vulnassess.csv` 示例文件中，供你查阅并在自己的系统中使用。


    为了查看适用于 SQL Server 实例的评估，请针对系统数据库（如 `master`）运行此工具。


    ## SQL Server 审计


    保护 SQL Server 安全的最后一块拼图，是对 SQL Server 及其数据访问进行审计的能力。SQL Server 提供了内置功能，可以审计对服务器实例及数据库访问的各个方面。SQL
    Server 审计功能使用第 5 章介绍过的 `扩展事件` 实现。SQL Server 审计由以下组件构成：


    **审计**：对服务器或数据库级别审计操作的受监控结果。每个 SQL Server 实例可以有多个审计。


    **服务器审计规范**：为指定的审计定义要监控的服务器级别审计操作。每个审计可以有一个服务器级别规范。服务器级别规范包含要监控的服务器级别审计操作组列表。


    **数据库审计规范**：为指定的审计定义要监控的数据库级别审计操作。每个审计可以包含一个数据库级别规范。数据库审计规范包含要监控的数据库级别审计操作组或特定的审计操作。


    **审计操作组**：一个服务器或数据库级别的操作组

    '
- fmt: "# Chapter 7: Security in SQL Server\n\n## 审计动作与目标\n\n审计将特定类型的事件分组到一个类别中进行监控。此外，还有一组专门用于审计监控的动作。\n\
    \n**审计动作 (Audit action)**：需要审计的具体操作，例如在表上执行`SELECT`语句。\n\n**目标 (Target)**：审计结果保存的位置。对于Linux上的SQL\
    \ Server，唯一支持的目标是文件。\n\n## 使用 SQL Server 审计的流程\n\n使用SQL Server审计的过程如下：\n\n1. \
    \ 创建审计并定义目标，使用如下T-SQL语句（该语句见于示例脚本`createsqlaudit.sql`，需以`sa`身份连接执行）：\n    ```sql\n\
    \    USE MASTER\n    GO\n    IF EXISTS (SELECT * FROM sys.server_audits WHERE\
    \ name = 'AuditSQLServer')\n    BEGIN\n        ALTER SERVER AUDIT AuditSQLServer\
    \ WITH (STATE = OFF)\n        DROP SERVER AUDIT AuditSQLServer\n    END\n    GO\n\
    \    CREATE SERVER AUDIT AuditSQLServer\n    TO FILE (FILEPATH ='/var/opt/mssql')\n\
    \    GO\n    ```\n    > **提示 (Tip)** 删除审计时，之前的目标文件不会被自动删除。如果您计划多次运行这些演示，应手动删除目标路径中的旧审计文件。\n\
    \n2.  使用如下T-SQL语句添加一个针对成功登录的服务器审计规范（该语句见于示例脚本`addserveraudit.sql`，运行时需以`sa`身份连接）：\n\
    \    ```sql\n    USE MASTER\n    GO\n    IF EXISTS (SELECT * FROM sys.server_audit_specifications\
    \ WHERE name = 'AuditSQLServerSpec')\n    BEGIN\n        ALTER SERVER AUDIT SPECIFICATION\
    \ AuditSQLServerSpec WITH (STATE = OFF)\n        DROP SERVER AUDIT SPECIFICATION\
    \ AuditSQLServerSpec\n    END\n    GO\n    CREATE SERVER AUDIT SPECIFICATION AuditSQLServerSpec\n\
    \    FOR SERVER AUDIT AuditSQLServer\n    ADD (SUCCESSFUL_LOGIN_GROUP)\n    WITH\
    \ (STATE = ON)\n    GO\n    ```\n    `SUCCESSFUL_LOGIN_GROUP`是一个服务器级审计动作组的示例。您可以在我们的文档中找到更多示例：`https://docs.microsoft.com/sql/relational-databases/security/auditing/sql-server-audit-action-groups-and-actions`。\n\
    \n3.  现在，添加一个数据库审计规范来跟踪谁试图读取`WideWorldImporters`数据库中`Sales`架构下的任何表。使用如下T-SQL语句（该语句见于示例脚本`adddbaudit.sql`，运行时需以`sa`身份连接）：\n\
    \    ```sql\n    USE [WideWorldImporters]\n    GO\n    IF EXISTS (SELECT * FROM\
    \ sys.database_audit_specifications WHERE name = 'AuditWWISpec')\n    BEGIN\n\
    \        ALTER DATABASE AUDIT SPECIFICATION AuditWWISpec WITH (STATE = OFF)\n\
    \        DROP DATABASE AUDIT SPECIFICATION AuditWWISpec\n    END\n    GO\n   \
    \ CREATE DATABASE AUDIT SPECIFICATION AuditWWISpec\n    FOR SERVER AUDIT AuditSQLServer\n\
    \    ADD (SELECT ON SCHEMA::[Sales] BY public)\n    WITH (STATE = ON)\n    GO\n\
    \    ```\n    您可以在我们的文档中阅读关于其他数据库审计动作的介绍：`https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-action-groups-and-actions#database-level-audit-actions`。\n\
    \n4.  现在使用以下T-SQL语句开启审计（该语句见于示例脚本`startsqlaudit.sql`，需以`sa`身份连接）：\n    ```sql\n\
    \    USE MASTER\n    GO\n    ALTER SERVER AUDIT AuditSQLServer WITH (STATE = ON)\n\
    \    GO\n    ```\n\n5.  测试审计。以`sa`身份连接到您的Linux服务器，并运行以下T-SQL语句（该语句见于示例脚本`readsalescustomers.sql`）：\n\
    \    ```sql\n    USE [WideWorldImporters]\n    GO\n    SELECT * FROM [Sales].[Customers]\n\
    \    GO\n    ```"
