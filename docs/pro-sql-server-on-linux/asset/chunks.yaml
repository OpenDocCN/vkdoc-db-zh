    ## Efficient I/O Processing


    SQL Server uses efficient methods to read and write database pages and transaction
    log records to maximize performance and ensure durability and consistency. This
    includes read-ahead reading, write-ahead logging, checkpoint processing, and data
    compression.


    In addition, since SQL Server has its own caching mechanisms, the engine uses
    Direct I/O by enabling the `O_DIRECT` flag when opening database and transaction
    log files on Linux to bypass file system caches. You can read more about `O_DIRECT`
    at [http://man7.org/linux/man-pages/man2/open.2.html](http://man7.org/linux/man-pages/man2/open.2.html).


    ### Read-Ahead


    Each database page is 8KB in size. It would be inefficient if SQL Server tried
    to only read a single database page from a database file each time it needed to
    read data from disk. Instead, SQL Server uses a mechanism called read-ahead to
    pull in database pages to the buffer pool. The thinking is that these pages will
    likely be needed by the query currently executing, so it would be more efficient
    to pull them into cache because a larger read size is more efficient than a larger
    number of smaller reads. Scenarios where read-ahead is used in SQL Server are
    situations where several rows spanning multiple pages are scanned from a table
    or index. How can you tell if SQL Server is using read-ahead to read database
    pages? There are several methods:'
