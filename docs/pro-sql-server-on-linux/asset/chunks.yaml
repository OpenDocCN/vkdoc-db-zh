- fmt: '2017 on Linux (as of general availability). Some features included with the
    SQL Server product have dependencies or require external programs that are not
    so straightforward to work on SQL Server on Linux.


    `Note` We are actively investigating many of these features to include in future
    versions or updates of SQL Server on Linux.


    # Chapter 1 Why SQL Server on Linux?


    As with any release, we make tough decisions to include or not include features
    or enhancements that we would love to do if time were not a factor. Therefore,
    the following features did not make it into SQL Server 2017 on Linux for general
    availability:


    - Transaction and Merge Replication

    - Distributed Transactions (linked server queries or application distributed transactions
    via `MSDTC`)

    - `Stretch Database`

    - `Polybase`

    - `Machine Learning Services` (but `Native Scoring` is supported)

    - System extended procedures such as `xp_cmdshell`


    I’ve only listed the major features that did not make it into SQL Server 2017
    general availability. There are a few others, and you can read the complete list
    in our Release Notes at [`https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes#Unsupported`](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes#Unsupported).


    I’ll add one other comment on features. The `SQL Server` product on `Windows Server`
    today comes with other services such as `SQL Server Analysis Services (SSAS)`
    and `SQL Server Reporting Services (SSRS)`. These are commonly known as our `Business
    Intelligence (BI) Services` (this also includes `Master Data Services (MDS)` and
    `Data Quality Services (DQS)`). These services were not implemented for `SQL Server
    on Linux`. Note that these services have the capability to connect and query `SQL
    Server on Linux`.


    ## Should I Use Windows or Linux?


    I’ll conclude this section with an answer to a common question I get: “Should
    I run `SQL Server on Linux` or `Windows Server`?” The answer is `Yes` (hoping
    for some bit of laughter at this point from my readers). The point is that we
    built `SQL Server on Linux` to give a choice, not necessarily because `SQL Server`
    runs faster or better on `Windows Server` vs. `Linux`. If the features that are
    not supported today for `SQL Server on Linux` don’t affect you, make your decision
    on which operating system platform is best for you, your application, or your
    company. Some customers I talk to are creating a standard for `Linux` within their
    organization, so they will make the choice for consistency and now `SQL Server`
    gives them that opportunity. For others, they are comfortable with `Windows Server`
    and like that platform so will stay with `SQL Server` on that operating system.
    For some, `Linux` is a very popular operating system for new developers, so they
    will enjoy building applications against `SQL Server on Linux` in development
    phases and production can then be used for `SQL Server` against `Linux` or `Windows`.


    My great friend of many years in Microsoft Support Robert Dorr (you can find us
    both on our joint blog [`http://aka.ms/bobsql`](http://aka.ms/bobsql)) joined
    the Helsinki development team in early 2016. When I was talking to him about this
    book he had this recollection, which sums up the experience of the team and reason
    behind the project.


    “What I found is that I stepped onto a rocket ship. Lots of new things and lots
    of things to be done across the eco-system. It was best described by Scott Konersmann
    as we are changing out the engine of a jet plane in midflight and some days it
    really feels like that. We are bringing decades of tried and tuned technology
    and experience on `Windows` to the `Linux` platform and we don’t want to remove
    features. Simply give the customer the choice of which ‘engine’ they want to run.”


    ## Containers Are the New Virtual Machine


    One other major motivation for us to build `SQL Server on Linux` was to provide
    support'
