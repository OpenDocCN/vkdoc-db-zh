    For the next two chapters, instead of restoring the backup, I will use a subset
    of the WideWorldImporters database and objects to create a database and tables
    from scratch. I have provided all the example scripts you need to use this subset
    of the WideWorldImporters database. Using this sample as a foundation allows me
    to show you the fundamentals of the T-SQL language, but also later in the book
    to expand your knowledge of other SQL Server features and the T-SQL language.


    For all the examples in this chapter, I’ve chosen to use the Visual Studio Code
    development tool because it works on Windows, macOS, and Linux. Your first step
