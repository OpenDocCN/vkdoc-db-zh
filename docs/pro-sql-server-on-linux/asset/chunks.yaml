  trans: '# 第 11 章 SQL Server 与容器


    你可以在他的推文中看到这一挑战的结果：[`https://twitter.com/thofle/status/967437807697448965`](https://twitter.com/thofle/status/967437807697448965)。


    其实我当时真的不确定我说的是否 100%准确（尤其是“无需虚拟化”和“五分钟”这两部分），但我之所以敢做出如此大胆的声明，是基于两点认知：(1) 我知道我们的
    `docker` 容器镜像具有可移植性，并且可以轻松地在 `MacBook` 上运行，因为我知道 `Docker` 有适用于 macOS 的版本；(2) 我们的
    `SQL Operations Studio` 工具是跨平台的，因此可以原生运行在 `macOS` 上。


    回到德克萨斯州后，我做了一件我以为作为微软员工永远不会做的事。我问我的经理 Asad Khan，我是否可以买一台 `MacBook`。他说，鉴于我正在从事大量关于
    `Linux` 和容器的工作，这完全合情合理。拿到 `MacBook` 后，我决定亲自接受这个 SQL Mac 挑战（你知道的，就是身体力行）。而我现在要说的是：我错了。我的错误在于，安装这个软件花了我四分钟，而不是五分钟。


    让我带你重温一下整个过程，这样所有正在阅读本书的 `MacBook` 用户都可以自己尝试一下。


    ## 1. 安装 Docker for Mac

    我做的第一件事是按照 [`https://store.docker.com/editions/community/docker-ce-desktop-mac`](https://store.docker.com/editions/community/docker-ce-desktop-mac)
    所述，安装并下载 `Docker for Mac`（社区版）。（我使用了稳定版通道）。下载完成后的界面如图 11-6 所示。


    ![](img/index-590_1.jpg)


    **图 11-6。** 下载 Docker for Mac


    坦率地说，`docker` 在 `macOS` 上确实用到了一些虚拟化技术，但这已经比过去好多了。以前 `docker for Mac` 需要依赖 `virtualBox`，但现在
    `macOS` 内置了一个轻量级的 Hypervisor 框架，因此更准确地说，`docker for Mac` 不再需要一个独立的、重量级的虚拟化环境。你可以在
    [`https://docs.docker.com/docker-for-mac/docker-toolbox/#the-docker-for-mac-environment`](https://docs.docker.com/docker-for-mac/docker-toolbox/#the-docker-for-mac-environment)
    阅读更多关于 `docker for Mac` 环境的信息。


    ## 2. 将 Docker 安装为应用程序

    `Docker for Mac` 的下载文件解压后，会弹出一个新窗口，让你通过简单的拖放操作将 `Docker` 安装为 `Mac` 应用程序，如图 11-7
    所示。


    **图 11-7。** 安装 Docker for Mac


    ## 3. 启动 Docker

    现在 `Docker` 已作为应用程序安装好了，我从 `MacBook` 的 Launchpad 启动了它。此时，我的屏幕顶部出现了一个 `Docker`
    图标，我可以看到它正在启动，如图 11-8 所示。


    ![](img/index-592_1.jpg)


    **图 11-8。** Docker for Mac 正在启动


    ## 4. 下载 SQL Operations Studio

    现在我想多任务操作，因此在 `Docker` 启动的同时，我从 [`https://docs.microsoft.com/sql/sql-operations-studio/download`](https://docs.microsoft.com/sql/sql-operations-studio/download)
    下载了适用于 `macOS` 的 `SQL Operations Studio`。


    ## 5. 拉取 SQL Server 镜像

    在下载 `SQL Operations Studio` 的时候，`Docker` 已经启动了。于是我通过 `macOS` 的 `Terminal`（本质上是一个
    `bash` shell）使用 `docker` 命令拉取了 `SQL Server` 镜像。我运行了如下命令：


    ```bash

    docker pull microsoft/mssql-server-linux:2017-latest

    ```


    ## 6. 解压 SQL Operations Studio

    在拉取镜像的同时，我解压了 `SQL Operations Studio` 的下载文件。解压过程应如图 11-9 所示。


    ![](img/index-593_1.jpg)


    **图 11-9。** 解压 SQL Operations Studio for macOS'
