  trans: "\n# 第 5 章 SQL Server 工具\n\n## 管理视图（DMV）与动态管理函数（DMF）\n\n您可以像查询任何用户视图或目录视图一样查询\
    \ DMV，也可以像使用任何 T-SQL 函数一样使用 DMF。（注：DMF 与函数一样，需要参数）\n\n**提示**：当涉及 DMV 和 DMF 时，智能感知是您的好帮手。输入`sys.dm_`会列出\
    \ SQL Server 支持的所有 DMV 和 DMF 的完整列表。\n\n这些自 SQL Server 2005 起就存在的视图，仍然提供着 DMV 的核心功能，例如`sys.dm_exec_requests`、`sys.dm_os_tasks`和`sys.dm_wait_stats`。在\
    \ Linux 和 Windows 上的 SQL Server 2017 中，目前大约有 240 个 DMV 和 DMF，涵盖了 SQL Server 引擎的各个方面。\n\
    \nDMV 和 DMF 证明了 T-SQL 的开放特性，以及将数据作为表公开以深入了解任何数据这一概念的强大——无论是来自用户表、系统表的数据，还是支持数据库引擎的结构列表。\n\
    \nDMV 和 DMF 的完整列表可按类别在我们的文档中找到：[`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/system-dynamic-management-views`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/system-dynamic-management-views)。DMV\
    \ 和 DMF 需要`VIEW SERVER STATE`权限，该权限可由`sysadmin`登录账户授予。\n\n这些 DMV 和 DMF 中有许多是相互关联的，可以连接在一起使用。多年来，SQL\
    \ Server 社区已在各种博客和培训中发布了针对不同场景的示例。DMV 最流行的用途之一来自社区开发的存储过程`sp_whoisactive`，由 SQL\
    \ 社区领袖 Adam Machanic 编写（现已扩展到 SQL Operations Studio 中）。您可以从[`whoisactive.com`](http://whoisactive.com)获取`sp_whoisactive`的详细信息和下载链接。\n\
    \n以下是我个人认为最重要的十个 DMV 和 DMF，以及每个 DMV/DMF 的示例查询：\n\n### dm_exec_requests\n\n活动查询和后台请求的列表。这可能是当今\
    \ SQL Server 用户最常用的 DMV。\n\n以下查询（见示例文件`dm_exec_requests.sql`）显示了活动的用户查询列表及查询详情，包括`session_id`（唯一标识与\
    \ SQL Server 的连接）、`status`（正在运行还是等待）、`command`（正在运行什么查询）、`wait_type`（如果查询在等待，等待的是什么类型的资源）和`wait_time`（已等待了多长时间）。您还会注意到我将此\
    \ DMV 与`sys.dm_exec_sessions`连接，因此只显示活动的“用户”请求。\n\n```sql\n-- 获取活动用户请求的 session_id、状态（RUNNING\
    \ 或 SUSPENDED）、命令（什么查询）、\n-- 等待类型（如果等待，是什么资源？）以及等待时间（等待了多久）\n--\nSELECT er.[session_id],\
    \ er.[status], er.[command], er.[wait_type],\n       er.[wait_time]\nFROM sys.dm_exec_requests\
    \ er\nINNER JOIN sys.dm_exec_sessions es\n    ON es.[session_id] = er.[session_id]\n\
    \    AND es.[is_user_process] = 1\nGO\n```\n\n此 DMV 包含更多列。请在我们的文档中查看完整选项：[`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-requests-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-requests-transact-sql)。您可以在以下链接找到`sys.dm_exec_sessions`的完整选项列表：[`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-sessions-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-sessions-transact-sql)。\n"
- fmt: "# Chapter 5: SQL Server Tools\n\n[transact-sql](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-sessions-transact-sql)\
    \ Wait types describe different scenarios where SQL Server requests can wait on\
    \ a resource such as a lock, I/O, latch, and many others. The most comprehensive\
    \ description of wait types and what they mean for your application can be found\
    \ in this community blog run by my friend and SQL Server Community Leader Paul\
    \ Randal [https://www.sqlskills.com/help/waits/](https://www.sqlskills.com/help/waits/).\n\
    \n## `dm_exec_query_stats`\n\nA list of performance statistics based on queries\
    \ currently cached. This is an extremely popular DMV for query performance. I\
    \ like the example we have in our documentation, which I have provided in the\
    \ sample script `dm_exec_query_stats.sql`. This query is designed to show the\
    \ Top <N> queries that account for the most CPU resource usage:\n\n```sql\n--\
    \ Get the top 5 queries by CPU usage. Show the query_hash, avg CPU time, and T-SQL\
    \ text\n-- query_hash is a way to uniquely identify a query that could be executed\
    \ in more than one way but has a similar \"pattern\"\nSELECT TOP 5\n    query_stats.query_hash\
    \ AS \"Query Hash\",\n    SUM(query_stats.total_worker_time) / SUM(query_stats.execution_count)\
    \ AS \"Avg CPU Time\",\n    MIN(query_stats.statement_text) AS \"Statement Text\"\
    \nFROM\n    (SELECT QS.*,\n        SUBSTRING(ST.text,\n            (QS.statement_start_offset/2)\
    \ + 1,\n            ((CASE statement_end_offset\n                WHEN -1 THEN\
    \ DATALENGTH(ST.text)\n                ELSE QS.statement_end_offset END\n    \
    \            - QS.statement_start_offset)/2) + 1) AS statement_text\n    FROM\
    \ sys.dm_exec_query_stats AS QS\n        CROSS APPLY sys.dm_exec_sql_text(QS.sql_handle)\
    \ as ST) as query_stats\nGROUP BY query_stats.query_hash\nORDER BY \"Avg CPU Time\"\
    \ DESC\nGO\n```\n\nThis DMV stores query information in the form of hashes (uniquely\
    \ identifies a query that is the same “pattern”) and handles. Notice the use of\
    \ the DMF `dm_exec_sql_text` to get the text of the SQL query.\n\nYou can find\
    \ the complete documentation of `dm_exec_query_stats` at [https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-stats-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-stats-transact-sql).\
    \ The documentation for `dm_exec_sql_text` can be found at [https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-sql-text-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-sql-text-transact-sql).\n\
    \n## `dm_os_waiting_tasks`\n\nA list of tasks (queries and background tasks) that\
    \ are waiting on a resource. The DMV only shows requests that are waiting on a\
    \ resource. Here is an example from the sample script `dm_os_waiting_tasks.sql`\
    \ to show all user requests that are waiting on a resource (Note: If there are\
    \ no user tasks waiting on a resource, this query will return 0 rows.):\n\n```sql\n\
    -- Show all user requests that are waiting on a resource\n--\nSELECT wt.session_id,\
    \ wt.wait_type, wt.wait_duration_ms\nFROM sys.dm_os_waiting_tasks wt\nINNER JOIN\
    \ sys.dm_exec_sessions es\n    ON es.session_id = wt.session_id\n    AND es.is_user_process\
    \ = 1\nGO\n```\n\nYou can find the documentation for this DMV at [https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-waiting-tasks-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-waiting-tasks-transact-sql)."
