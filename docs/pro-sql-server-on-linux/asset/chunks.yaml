  trans: "\n# 第三章 构建数据库与 T-SQL 基础\n\n在 SQL Server 社区中，分隔标识符被广泛使用。许多使用 WideWorldImporters\
    \ 示例数据库的示例都采用了分隔标识符，因此我将在我的示例脚本中使用它们。\n\n要执行此 T-SQL 批处理，我可以按 F1 并选择 `MS SQL: Execute\
    \ Query` 来使用 mssql 扩展，或使用快捷键 `<Ctrl>+<Shift>+E`。除非另有说明，在执行本章的示例脚本时，请务必选择 sqllinux\
    \ 的连接配置文件。\n\n当我执行任何查询时，Visual Studio Code 会在编辑器中打开另一个垂直窗格来显示结果。如果发生任何错误，它们也会在此窗格中显示。消息\
    \ \"**Commands completed successfully**\" 表示数据库已成功创建。\n\n图 3-5 展示了创建数据库后的示例。\n\
    \n![](img/index-109_1.jpg)\n\n`图 3-5. 使用 Visual Studio Code 成功创建数据库的结果`\n\n创建此数据库的一个更好方法是使用一组\
    \ T-SQL 语句，如下所示（取自示例脚本 `createdbifexists.sql`）：\n\n```\nUSE master\nGO\nIF NOT\
    \ EXISTS (\n    SELECT name\n    FROM sys.databases\n    WHERE name = N'WideWorldImporters'\n\
    )\nCREATE DATABASE [WideWorldImporters]\nGO\n```\n\n`提示` T-SQL 语言的保留字没有必须使用大写的要求。然而，这样做是良好实践，因为它允许你和其他脚本阅读者快速识别哪些是\
    \ T-SQL 关键字，哪些是标识符。\n\n此批处理仅在数据库尚不存在时才创建它，从而避免了如果数据库已存在时会发生的错误。\n\n另请注意，在前面的代码中，有另一个包含\
    \ `USE master` 语句的批处理。我之前提到了数据库上下文的概念，即你当前正在针对哪个数据库运行 T-SQL 语句。`USE` T-SQL 关键字是切换数据库上下文的一种方法。当你创建一个\
    \ SQL Server 登录名时，可以为该登录名定义默认的数据库上下文，然后使用 `USE` 关键字切换到另一个上下文（前提是该登录名在该数据库中具有权限）。在此示例中，切换到\
    \ master 上下文实际上并非必需，但在创建或删除数据库时处于 master 上下文中是良好实践。\n\n如果你计划“重新开始”，创建数据库的另一个选项是先删除数据库然后重新创建它。执行以下\
    \ T-SQL 语句（参见示例脚本 `dropandcreatedb.sql`）：\n\n```\nDROP DATABASE IF EXISTS [WideWorldImporters]\n\
    GO\nCREATE DATABASE [WideWorldImporters]\nGO\n```\n\n在 Linux 上的 SQL Server 中创建数据库时，你会得到什么？如前所述，SQL\
    \ Server 使用 model 数据库作为模板来创建任何新数据库。由于未指定任何选项、文件位置或大小，上述命令将在 Linux 上的 SQL Server\
    \ 中创建 WideWorldImporters 数据库，包含位于 `/var/opt/mssql/data` 目录中的两个文件，每个文件大小为 8MB：\n\
    \n`WideWorldImporters.mdf`：这是数据库文件。常见的惯例（尽管不是必需的）是将主数据库文件的文件扩展名命名为 `.mdf`。此文件包含用于存储数据库元数据的所有系统表。该文件是\
    \ 8KB 页面的集合，将用于存储关于系统表的数据、用户表和索引的数据页面，以及一系列供 SQL Server 内部用于跟踪文件和分配元数据的页面。你将在本书后面的章节中了解如何为数据库创建多个数据库文件。\n\
    \n`WideWorldImporters_log.ldf`：这称为事务日志文件（通常使用 `.ldf` 文件扩展名）。事务日志用于记录对用户和系统数据的更改。在其他数据库系统中，这被称为\
    \ `journal`（日志）。事务日志存储在一系列日志块中，用于确保数据库的一致性和恢复。\n"
- fmt: '> **Tip** linux is case sensitive for filenames. `SQL Server` will create
    file names, if you don’t specify the file name, using the database name exactly
    specified by case. in linux, navigating and finding these filenames is case sensitive.


    Another thing you will love about `SQL Server` databases is that they are contained
    and portable. You will be able to back up a database and restore it to another
    `SQL Server` of the same major release or higher. And you can do this across Linux
    and Windows computers, since `SQL Server` is the same core database engine on
    both platforms. I’ll cover more aspects to moving databases in Chapter 9.


    If you want to first spend time understanding all the options when you create
    a database, visit the `T-SQL` reference documentation for the `CREATE DATABASE`
    command:

    [https://docs.microsoft.com/sql/t-sql/statements/create-database-sql-server-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/create-database-sql-server-transact-sql).


    You can read more details about the `ALTER DATABASE` command and how to make changes
    to database options or metadata from this documentation page:

    [https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql).


    ## Creating Tables


    Creating a database provides the “shell” to contain your data. Within this shell
    are tables to store user data and indexes to help speed up access to the data
    or enforce integrity checks. Both tables and indexes require storage in the database
    in the form of pages, which are 8KB in size. These 8KB pages are comprised of
    rows and internal structures to physically describe the rows (and a page header
    on each page).


    ## Chapter 3 Building a Database and T-SQL Fundamentals


    The logical format of rows in the pages for tables is defined by the definition
    of the table in terms of columns and types. This is also known as the *schema*
    of a table. That term can get somewhat confusing because there is also an object
    called a schema in `SQL Server`. A schema object is a namespace to uniquely define
    a collection of objects in a database, which can be tables and other objects such
    as indexes and stored procedures. Schemas provide a convenient method to decouple
    the ownership of objects by allowing permissions to be set on a schema that applies
    to all objects in the schema.


    The options to create a table in `SQL Server` have grown over the years to include
    rich capabilities. I will start simple in this chapter. I will use two tables
    in the `WideWorldImporters` database sample in this chapter. I will show you how
    to create schemas, objects called sequences, and tables with objects called constraints.
    Later in the chapter, I’ll show you to create other objects such as stored procedures
    and views. Then in the next chapter, I will take these sample definitions and
    show you how to use more advanced `T-SQL` capabilities.


    ## Creating Schemas


    In the `WideWorldImporters` database there are several schemas and several tables
    within each schema. Two tables that can be used to show fundamental capabilities
    of `SQL Server` are the `[Application].[People]` and the `[Sales].[Customers]`
    tables. The `Application` schema is used to store *reference* data. This is data
    that is typically infrequently modified but referenced by other tables that are
    more frequently modified. This is in line with normalized table designs. In this
    case, the `People` table is used to store information about a person, while other
    tables will reference these people in several ways. The `Customers` table contains
    information in columns that reference people who are customers for the `WideWorldImporters`
    company, and is part of the `Sales` schema.


    In addition, in the next section I will show you how to build an object called
    a sequence, so I will create a schema for those objects as well.'
