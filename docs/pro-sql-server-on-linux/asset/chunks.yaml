    ## 第 6 章 性能能力


    ### 注意


    `memorylimitmb` 值不包括 SQL Server 引擎外部组件所需的内存，例如 `SQL Server agent`、`SQLpaL` 和 `host
    extension`。`SQL paL` 和 `host extension` 不应需要 SQL Server 引擎外部的太多内存。对于 `SQL Server
    agent`，您应执行测试以查看代理作业需要多少内存。


    有关这些服务器内存配置选项的完整详细信息，请参阅我们的文档：[`docs.microsoft.com/sql/database-engine/configure-windows/server-memory-server-configuration-options`](https://docs.microsoft.com/sql/database-engine/configure-windows/server-memory-server-configuration-options)。


    ### 并行执行


    我在本章前一节讨论了 SQL Server 将在哪些场景中并行执行任务。可通过 `sp_configure` 系统过程使用的两个实例配置设置是：`max degree
    of parallelism` 和 `cost threshold for parallelism`。


    `max degree of parallelism` 用于控制查询计划中的操作符、索引构建操作、`DBCC CHECKDB`、并行插入、`联机列修改` 和
    `统计信息更新` 所使用的最大并行任务数。默认值为 0，这意味着 SQL Server 会根据可用 CPU 为特定操作确定最佳的并行任务并发数。


    关于此配置值的理想设置，SQL Server 社区已经争论了很长时间。寻找理想值的一个问题是，不同的工作负载在使用较高的 `max degree of parallelism`
    值时可能效果更好。例如，使用 `列存储索引` 的数据仓库工作负载可能会在更多并行任务下达到最大性能。对于具有高并发用户数的 SQL Server 应用程序，尤其是包含
    `OLTP 工作负载` 的应用程序，可能需要更改 `max degree of parallelism` 的默认值。我的经验和测试表明，仅当 SQL Server
    配置在超过八个 CPU 的服务器上运行时才有必要这样做。当我在微软技术支持部门工作时，我们创建了以下知识库文章，为设置 `max degree of parallelism`
    提供更多指导：[`support.microsoft.com/help/2806535/recommendations-and-guidelines-for-the-max-degree-of-parallelism-confi`](https://support.microsoft.com/help/2806535/recommendations-and-guidelines-for-the-max-degree-of-parallelism-confi)。如果您在设置此值时遇到困难，请放心，有数据库选项和查询级提示可用于覆盖此
    SQL Server 实例设置。有关 `max degree of parallelism` 选项的更多详细信息，请参阅我们的文档：[`docs.microsoft.com/sql/database-engine/configure-windows/configure-the-max-degree-of-parallelism-server-configuration-option`](https://docs.microsoft.com/sql/database-engine/configure-windows/configure-the-max-degree-of-parallelism-server-configuration-option)。


