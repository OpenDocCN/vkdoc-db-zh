    \n    第二个容器有以下命令：\n    ```\n    /bin/sh -c '/bin/bash ./entrypoint.sh'\n    ```\n\
    \    这是 SQL Server 镜像的容器，所以让我们探索一下`entrypoint.sh`是如何用来启动 SQL Server 的。\n\n   \
    \ 1.  通过在 bash shell 中运行以下命令，切换到指定目录：\n        ```bash\n        cd ~/sqllinuxlabs/containers/mssql-aspcore-example/mssql-aspcore-example-db\n\
    \        ```\n\n    2.  首先，我们通过执行`cat Dockerfile`来查看名为`Dockerfile`的文件。结果应类似如下：\n\
    \        ```\n        FROM microsoft/mssql-server-linux:latest\n        COPY .\
    \ /\n        RUN chmod +x /db-init.sh\n        CMD /bin/bash ./entrypoint.sh\n\
    \        ```\n        因此我们知道，此目录中的 Docker 镜像将从最新的 SQL Server 镜像构建，当前目录中的所有文件将被复制到容器中，然后`db-init.sh`脚本将被修改以便可以执行。最后，启动容器的命令是`entrypoint.sh`脚本。\n\
    \n    3.  我们知道`entrypoint.sh`用于运行容器，所以让我们通过执行`cat entrypoint.sh`查看此文件。结果应类似如下（我从输出中删除了注释）：\n\
    \        ```\n        /db-init.sh & /opt/mssql/bin/sqlservr\n        ```\n   \
    \     这个命令将在后台执行`db-init.sh`，然后在前台启动`sqlservr`。\n\n    ## 第 11 章 SQL Server 与容器\n\
    \n    4.  现在，让我们通过执行`cat db-init.sh`来查看`db-init.sh`。你的结果应类似如下：\n        ```\n\
    \        #wait for the SQL Server to come up\n        sleep 15s\n        #run\
    \ the setup script to create the DB and the schema in the DB\n        /opt/mssql-tools/bin/sqlcmd\
    \ -S localhost -U sa -P Sql2017isfast -d master -i db-init.sql\n        ```\n\
    \        这就是部分奥秘所在。这个脚本将等待 15 秒，让 SQL\n"
- fmt: "# Chapter 11 SQL Server and Containers\n\nServer start up and then execute\
    \ the `db-init.sql` script using `sqlcmd` in the container. I’ll let you look\
    \ at `db-init.sql` further, but it basically creates the `ProductCatalog` database,\
    \ creates logins and objects, and populates some data into the database.\n\nNow\
    \ you see the mechanics of how you can start an SQL Server container and launch\
    \ a T-SQL script to create your database, objects, and data.\n\nLet’s look at\
    \ the `docker-compose.yml` file to see how docker compose knows how to build each\
    \ container.\n\n1. Change to the original directory where the `docker-compose.yml`\
    \ exists by executing the following command in the bash shell:\n\n    ```\n  \
    \  cd ~/sqllinuxlabs/containers/mssql-aspcore-example/\n    ```\n\n2. Now dump\
    \ out the contents of the `docker-compose.yml` file by executing `cat docker-compose.yml`.\
    \ Your results should look like the following:\n\n    ```\n    version: \"3\"\n\
    \    services:\n      web:\n        build: ./mssql-aspcore-example-app\n     \
    \   ports:\n          - \"5000:5000\"\n        depends_on:\n          - db\n \
    \     db:\n        build: ./mssql-aspcore-example-db\n        environment:\n \
    \         SA_PASSWORD: \"Sql2017isfast\"\n          ACCEPT_EULA: \"Y\"\n     \
    \   ports:\n          - \"1500:1433\"\n    ```\n\nThe `services:` tag allows you\
    \ to define specific containers that will be run as part of the application. For\
    \ each service, you can define the location of the `Dockerfile` to build the image,\
    \ the ports to use when running the container including the mapped port, and if\
    \ one of the services depends on the other. In this case, the `web` service depends\
    \ on the `db` service. This means the container for the `db` service will be created\
    \ and started before the container for the `web` service.\n\nYou can also specify\
    \ any environment variables needed for the container, which in this case are the\
    \ EULA agreement and sa password for the SQL Server container. And for the container\
    \ for the `db` service, port 1500 is mapped for SQL Server port 1433.\n\nSo in\
    \ summary, when `docker-compose up` is executed, docker will use the `docker-compose.yml`\
    \ file to build the container for the `db` service first by using the `Dockerfile`\
    \ in the `./mssql-aspcore-example-db` directory. It will then run the container\
    \ based on this image using the environment variables specified, and the SQL Service\
    \ is available on the host’s port 1500.\n\nThen it will run the container for\
    \ the `web` service that is to create the Docker image from the `Dockerfile` in\
    \ the `./mssql-aspcore-example-app` directory and run a container based on that\
    \ image using port 5000.\n\nOne last important observation: When I first looked\
    \ at these containers I couldn’t figure out how the ASP.NET application knows\
    \ how to connect to port 1500 for the SQL Server container. The service definition\
    \ in the `docker-compose.yml` file is the key. The service named `db` is effectively\
    \ mapped to `localhost,1500`. So the ASP.NET application can use a servername\
    \ of `db` in the connection string to connect to SQL Server in the container associated\
    \ with the `db` service.\n\nI know this feels a bit complex but only because I\
    \ dove into the details behind the scenes to describe how composing a multicontainer\
    \ application works. Now for some fun. Move on to the next section to see me take\
    \ the SQL Mac challenge!\n\n## The SQL Mac Challenge\n\nIn February of 2018 I\
    \ was speaking at one of my favorite events, SQLBits in London. One of my presentations\
    \ was on SQL Server on Linux. I was using my trusty HP Zbook Studio laptop running\
    \ Windows 10 to do the presentation and demos. Someone from the audience raised\
    \ their hand and said “Bob, I love that Microsoft has adopted Linux, but I’m a\
    \ MacBook user. You are using a PC here in these demos. But I don’t see the commitment\
    \ from Microsoft for the MacBook community.”\n\nEven though I had not researched\
    \ the topic, I was confident in this reply. “We now have the software and tools\
    \ where you can run and interact with SQL Server with no virtualization and no\
    \ Windows tools on your MacBook. And I believe you can get this installed and\
    \ up and running in 5 minutes.” I called it “Take the SQL Mac challenge.” The\
    \ person in the audience said they would take me up on this challenge."
