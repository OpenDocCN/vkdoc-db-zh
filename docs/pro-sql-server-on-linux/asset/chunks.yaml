    \ Windows 上的 SQL Server 中使用 AG 的`T-SQL`一样。\n\n10. 您可能还记得我在前面的章节中告诉过您，我们将 SQL Server\
    \ 的安装过程分成了几个包。现在该安装另一个了。这个包是 SQL Server HA 资源代理，它被开发用于与 Pacemaker 交互，也是我在本章前面提到的内容。在所有节点上使用以下命令安装此代理：\n\
    \    ```\n    sudo yum install mssql-server-ha\n    ```\n\n11. 正如我之前提到的，目前 STONITH\
    \ 在 Azure 虚拟机上不受支持，因此我将在主节点上使用以下命令将其禁用：\n"
- fmt: "# Note\n`pcs`程序存在于所有集群上，但命令执行可以在节点中的任何集群上进行，因为`pcs`命令适用于整个集群。\n```\nsudo pcs\
    \ property set stonith-enabled=false\n```\n# Chapter 8 High Availability and Disaster\
    \ Recovery for SQL Server\n文档建议设置一些与故障转移超时和刷新检查间隔相关的Pacemaker属性。\n我建议您遵循这些建议，从主节点上如示例脚本`clusterproperties.sh`所示，在bash\
    \ shell中运行以下命令。这些建议及其背后的细节可以在以下网址找到：[https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-cluster-rhel](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-cluster-rhel)。\n\
    ```\nsudo pcs property set cluster-recheck-interval=2min\nsudo pcs property set\
    \ start-failure-is-fatal=true\n```\n## 在集群中添加AG作为资源\n我们已经在SQL Server中创建了AG，并在所有节点上创建了Pacemaker集群。\n\
    为了将系统结合在一起，我们需要在集群中创建一个与AG关联的资源。\n\n1.  我们需要一个用于SQL Server资源代理的SQL Server登录名。\n\
    \    在**所有节点**上执行以下T-SQL语句，这些语句出自示例脚本`pacemakerlogin.sql`。此脚本还授予代理执行和访问适当SQL Server资源所需的最低权限：\n\
    \    ```\n    USE [master]\n    GO\n    CREATE LOGIN [pacemakerLogin] with PASSWORD=\
    \ N'Sql2017isfast'\n    GO\n    GRANT ALTER, CONTROL, VIEW DEFINITION ON AVAILABILITY\n\
    \    GROUP::footballag TO pacemakerLogin\n    GO\n    GRANT VIEW SERVER STATE\
    \ TO pacemakerLogin\n    GO\n    ```\n2.  资源代理需要知道要使用的登录名和密码。\n    因此，您需要在**所有节点**上从bash\
    \ shell执行以下命令，如示例`sqlrgagentlogin.sh`所示：\n    ```\n    echo 'pacemakerLogin' >>\
    \ ~/pacemaker-passwd\n    echo 'Sql2017isfast' >> ~/pacemaker-passwd\n    sudo\
    \ mv ~/pacemaker-passwd /var/opt/mssql/secrets/passwd\n    sudo chown root:root\
    \ /var/opt/mssql/secrets/passwd\n    sudo chmod 400 /var/opt/mssql/secrets/passwd\
    \ # Only readable by root\n    ```\n3.  在任何节点上从bash shell执行以下命令，使用与SQL Server中AG相同的名称在集群中创建AG资源：\n\
    \    ```\n    sudo pcs resource create ag_cluster ocf:mssql:ag ag_name=footballag\
    \ meta failure-timeout=60s master notify=true\n    ```\n    > **Note** 在撰写本书时，文档版本使用的是`failure-timeout`为30s，但文档前面又说要用60s，所以我在创建资源时做了修改。\n\
    4.  Linux上的SQL Server可用性组有一个称为侦听器的概念，因此您可以连接到虚拟IP地址，而不是每个节点的IP地址。这个概念与SQL Server和Windows\
    \ Server故障转移集群集成。我们将在Linux上使用类似的概念，但虚拟IP是Pacemaker设计的一部分。因此，选择一个类似于您的Azure VM的IP地址，但不是物理IP地址。然后在bash\
    \ shell中执行类似以下的命令：\n    ```\n    sudo pcs resource create virtualip ocf:heartbeat:IPaddr2\
    \ ip=172.17.0.100\n    ```\n    > **Note** SQL Server AG支持侦听器的概念。侦听器将客户端应用程序与知晓主副本的物理名称或IP地址抽象开来。这非常强大，尤其是在故障转移场景中，当辅助副本成为新的主副本时。您可以在以下网址阅读有关AG侦听器的更多信息：[https://docs.microsoft.com/sql/database-engine/availability-groups/windows/listeners-client-connectivity-application-failover#AGlisteners](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/listeners-client-connectivity-application-failover#AGlisteners)"
  raw: '**Note**  the pcs program exists on all clusters, but command execution can
    be


    done on any cluster in the node because pcs commands apply to the entire cluster.


    sudo pcs property set stonith-enabled=false


    12.  The documentation recommends setting a few pacemaker


    properties-related failover timeouts and refresh check intervals.


    I recommend you adhere to these recommendations, running


    the following commands from the bash shell as found in the


    example script **clusterproperties.sh** on the primary node. These


    recommendations and details behind them can be found at


    [https://docs.microsoft.com/sql/linux/sql-server-linux-](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-cluster-rhel)


    [availability-group-cluster-rhel.](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-cluster-rhel)


    sudo pcs property set cluster-recheck-interval=2min


    sudo pcs property set start-failure-is-fatal=true


    Chapter 8   high availability and disaster reCovery for sQl server


    ** Add the AG as a Resource in the Cluster**


    We have the AG created in SQL Server and the Pacemaker cluster created on all
    nodes.


    To tie the systems together, we need to create a resource in the cluster associated
    with


    the AG.


    1.  We need an SQL Server login for the SQL Server resource agent.


    Execute the following T-SQL statements **on all nodes**, found in the


    example script **pacemakerlogin.sql**. This script also grants the


    minimum permissions for the agent to execute and access proper


    SQL Server resources:


    USE [master]


    GO


    CREATE LOGIN [pacemakerLogin] with PASSWORD= N''Sql2017isfast''


    GO


    GRANT ALTER, CONTROL, VIEW DEFINITION ON AVAILABILITY


    GROUP::footballag TO pacemakerLogin


    GO


    GRANT VIEW SERVER STATE TO pacemakerLogin


    GO


    2.  The resource agent needs to know what login and password to use.


    Therefore, you need to execute the following commands from the


    bash shell **on all nodes**, as found in the example **sqlrgagentlogin.sh**:


    echo ''pacemakerLogin'' >> ~/pacemaker-passwd


    echo ''Sql2017isfast'' >> ~/pacemaker-passwd


    sudo mv ~/pacemaker-passwd /var/opt/mssql/secrets/passwd


    sudo chown root:root /var/opt/mssql/secrets/passwd


    sudo chmod 400 /var/opt/mssql/secrets/passwd # Only readable


    by root


    Chapter 8   high availability and disaster reCovery for sQl server


    3.  Create the AG resource with the cluster using the same name as


    the AG in SQL Server by executing the following commands from


    the bash shell on any node:


    sudo pcs resource create ag_cluster ocf:mssql:ag ag_


    name=footballag meta failure-timeout=60s master notify=true


    **Note**  the version of the documentation at the time of the writing of this
    book


    uses a failure-timeout of 30s but then earlier in the documentation it says to
    use


    60s, so i made the change here when creating the resource.


    4.  SQL Server Availability Groups on Linux have a concept called


    a listener, so you can connect to a virtual IP address vs. the IP


    address of each node. This concept is integrated with SQL Server


    and Windows Server Failover Cluster. We will use a similar


    concept on Linux, but the virtual IP is part of the Pacemaker


    design. Therefore, choose an IP address similar to your Azure VMs


    but not a physical IP address. Then execute a command from the


    bash shell like the following:


    sudo pcs resource create virtualip ocf:heartbeat:IPaddr2


    ip=172.17.0.100


    **Note**  sQl server ags support the concept of a listener. a listener abstracts
    a


    client application from knowing the physical name or ip address of the primary


    replica. this is very powerful, especially in a failover scenario when a secondary


    replica becomes the new primary. you can read more about ag listeners at


    [https://docs.microsoft.com/sql/database-engine/availability-](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/listeners-client-connectivity-application-failover#AGlisteners)


    [groups/windows/listeners-client-connectivity-application-](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/listeners-client-connectivity-application-failover#AGlisteners)'
