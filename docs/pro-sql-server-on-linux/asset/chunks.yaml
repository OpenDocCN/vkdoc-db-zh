    There it is. If you just follow the steps without all of my commentary and you
    have a reasonable Internet connection, you can do all of this in less than five
    minutes. And you will have officially taken the SQL Mac challenge. Let’s conclude
    the chapter by looking at a unique way to run containers with SQL Server in production
    using an environment called Kubernetes.


    ## SQL Server and Kubernetes


    Kubernetes as defined on their website at `https://kubernetes.io` is “an open-source
    system for automating deployment, scaling, and management of containerized applications”—also
    referred to as a container orchestrator. In a nutshell, Kubernetes is a system
    for deploying and managing a production set of containers. It is one thing to
    run a multicontainer application on your Linux server, but what if you want to
    deploy hundreds of containers. How do you deploy and manage these in an efficient
    manner? Furthermore, how can you set up an `HADR` system for your SQL Server containers?
    Kubernetes provides all of that.


    According to Wikipedia (`https://en.wikipedia.org/wiki/Kubernetes`), Kubernetes
    was founded by engineers at Google in 2014. Kubernetes means “governor” or “captain”
    in Greek. When I first started working with Kubernetes, I remember seeing emails
    from my colleague Travis Wright with the abbreviation `k8s` to mean Kubernetes.
    So I looked it up and sure enough `k8s` is an abbreviation to replace the 8 letters
    between the “k” and “s” in the word Kubernetes (see `https://kubernetes.io/docs/concepts/overview/what-is-kubernetes/#what-does-kubernetes-mean-k8s`).
    So I’ll use `k8s` myself for the rest of the chapter to refer to Kubernetes.


    One of the beautiful aspects to `k8s` is that it now runs on many platforms: on
    bare metal machines, virtual machines, and cloud solutions. For example, you could
    on your laptop set up a `Minikube` (`https://kubernetes.io/docs/setup/minikube`)
    to see the basics of `k8s` in action with Docker containers. Or you can use a
    cloud solution like RedHat’s `Openshift` (`https://www.openshift.com`) or Microsoft
    Azure Kubernetes Service (`AKS`) at `https://azure.microsoft.com/services/kubernetes-service/`.
    Take a look through the complete set of known solutions for `k8s` at `https://kubernetes.io/docs/setup/pick-right-solution/`.
    You should also bookmark the main `k8s` documentation page at `https://kubernetes.io/docs/home`
    for future reference.


    ### The Basics


    There are many aspects of `k8s` you can learn to develop container applications
    or operate the entire `k8s` system. For the purposes of SQL Server with `k8s`,
    I think it is important you'
