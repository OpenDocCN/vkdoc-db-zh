    ** Executing  the Migration**


    Now that you have done preparation work for the migration, it is time to migrate
    your


    database(s) to SQL Server on Linux. You have the following options to perform
    a


    migration:


    •  Restore a database backup.


    •  Copy data with bulk copy or SSIS package.


    •  Export and Import with BACPAC.


    **Note**  SQL Server Management Studio comes with a feature called Copy


    Database, which is not supported to copy from SQL Server on Windows to SQL


    Server on Linux.


    Let’s look at each option in more detail with examples.


    ChApter 10   MigrAting to SQL Server on Linux


    ** Restore a Database Backup**


    Restoring a backup from SQL Server on Windows is one of the beautiful stories
    of


    compatibility on SQL Server on Linux. You are allowed to restore a backup of SQL
    Server,


    all the way back to SQL Server 2005, to SQL Server 2017 on Linux. You can actually
    attach


    a database as well, following the process for attaching database as far back as


    SQL Server 2005.


    **Note**  the “pain-free” upgrade path to restore a backup or attach a database
    can


    go as far back as SQL Server 2008. however, technically you can restore or attach


    an SQL Server 2005 backup or database file but there are some limitations and


    possible issues you should consider. You can read more about this at [https://](https://docs.microsoft.com/sql/database-engine/install-windows/supported-version-and-edition-upgrades-2017#SupportFor2005)


    [docs.microsoft.com/sql/database-engine/install-windows/](https://docs.microsoft.com/sql/database-engine/install-windows/supported-version-and-edition-upgrades-2017#SupportFor2005)


    [supported-version-and-edition-upgrades-2017#SupportFor2005](https://docs.microsoft.com/sql/database-engine/install-windows/supported-version-and-edition-upgrades-2017#SupportFor2005).


    I’ve shown you examples of how to restore a backup throughout the book, and you


    have seen the process is very simple.


    1.  Copy the backup file to the SQL Server on Linux sever or place on


    a mounted directory that can be accessed by the Linux Server.


    2.  Ensure the ownership of the file has the mssql group and mssql


    owner permissions.'
  trans: '

    关于您在 Linux 上使用 SQL Server 的工作负载和应用，我推荐以下这些具体的博客文章：


    *   [使用数据库实验助手概述](https://blogs.msdn.microsoft.com/datamigration/2017/03/24/dea-2-0-how-to-use-database-experimentation-assistant/)

    *   [DEA 2.6 的最新功能](https://blogs.msdn.microsoft.com/datamigration/2018/08/06/release-database-experimentation-assistant-dea-v2-6/)

    *   [捕获常见问题解答](https://blogs.msdn.microsoft.com/datamigration/2017/03/24/dea-2-0-capture-trace-faq/)

    *   [重放常见问题解答](https://blogs.msdn.microsoft.com/datamigration/2017/03/24/dea-2-0-replay-faq/)

    *   [分析常见问题解答](https://blogs.msdn.microsoft.com/datamigration/2017/03/24/dea-2-0-analysis-faq)


    ## 执行迁移


    既然您已经完成了迁移的准备工作，现在是时候将您的数据库迁移到`Linux 上的 SQL Server`了。您可以选择以下几种方式来执行迁移：


    *   还原数据库备份。

    *   使用大容量复制或`SSIS`包复制数据。

    *   使用`BACPAC`导出和导入。


    **注意** `SQL Server Management Studio`自带一项名为`复制数据库`的功能，该功能不支持从`Windows 上的 SQL Server`复制到`Linux
    上的 SQL Server`。


    让我们通过示例更详细地了解每个选项。


    ### 第 10 章：迁移到 Linux 上的 SQL Server


    #### 还原数据库备份


    从`Windows 上的 SQL Server`还原备份是`Linux 上的 SQL Server`兼容性方面的一个亮点。您允许将`SQL Server`的备份（最早可追溯到`SQL
    Server 2005`）还原到`Linux 上的 SQL Server 2017`。您实际上也可以附加数据库，遵循最早可追溯到`SQL Server 2005`的附加数据库流程。


    **注意** 通过还原备份或附加数据库实现的“无痛”升级路径最早可追溯到`SQL Server 2008`。然而，从技术上讲，您可以还原或附加`SQL Server
    2005`的备份或数据库文件，但存在一些您应考虑的限制和可能的问题。您可以在[supported-version-and-edition-upgrades-2017#SupportFor2005](https://docs.microsoft.com/sql/database-engine/install-windows/supported-version-and-edition-upgrades-2017#SupportFor2005)阅读更多相关信息。


    在本书中，我已经向您展示了如何还原备份的示例，并且您已经看到这个过程非常简单。


    1.  将备份文件复制到`Linux 上的 SQL Server`服务器，或放置在 Linux 服务器可以访问的已挂载目录上。

    2.  确保文件的所有权具有`mssql`组和`mssql`所有者权限。

