    # 第 10 章：迁移至 Linux 上的 SQL Server


    1.  基准测试衡量的是数据库处理应用程序工作负载的潜在能力。

    2.  根据 TPC 理事会的规则，微软不能发布自己的基准测试结果。我们的合作伙伴，如 HPE 和联想，负责发布基准测试，以展示我们的数据库平台结合其硬件的性能能力。迄今为止，还没有硬件供应商选择为`pgsql`发布
    TPC 基准测试。


    ## 预读

    `SQL Server` 引擎内置了许多提升查询性能的能力。我已经描述了预读如何加速查询扫描性能。`pgsql` 不支持预读功能。有一篇关于 `SQL Server`
    预读的旧博客（某些细节可能有些过时，但能说明问题），地址是 [`blogs.msdn.microsoft.com/craigfr/2008/09/23/sequential-read-ahead/`](https://blogs.msdn.microsoft.com/craigfr/2008/09/23/sequential-read-ahead/)。


    ## 并行查询

    `pgsql` 文档中有这样一段陈述：“许多查询无法从并行查询中受益，要么是由于当前实现的限制，要么是因为没有可想象出的查询计划比串行查询计划更快”（[`www.postgresql.org/docs/10/static/parallel-query.html`](https://www.postgresql.org/docs/10/static/parallel-query.html)）。请记住，这些查询是由进程运行的，因此需要进程间通信，而
    `SQL Server` 则是在一个进程内通过线程共享信息。


    `SQL Server` 支持并行查询，许多查询可以从此功能中受益（特别是使用聚簇列存储索引等技术的分析查询）。此外，`SQL Server` 对 `SELECT
    INTO` 和 `INSERT SELECT` 等操作也支持并行查询。


    ## 查询提示与选项

    `pgsql` 不支持查询级别的提示和选项，但 `SQL Server` 拥有此功能。您可以在 [`docs.microsoft.com/sql/t-sql/queries/hints-transact-sql-query`](https://docs.microsoft.com/sql/t-sql/queries/hints-transact-sql-query)
    阅读更多关于 `SQL Server` 查询提示的内容。


    ## 列存储索引

    我在本书中已经描述了列存储索引对于分析工作负载的惊人性能表现。`pgsql` 没有列存储索引功能。我确实在 [`pgxn.org/dist/cstore_fdw/`](https://pgxn.org/dist/cstore_fdw/)
    找到了 `pgsql` 的这个自定义扩展，但我无法判断其是否被广泛使用或支持。


    ## 内存中 OLTP

    我还描述了 `SQL Server` 中针对 OLTP 工作负载的内存优化表的性能能力。`pgsql` 不包含内存中 OLTP 功能。您可以在 [`docs.microsoft.com/sql/relational-databases/in-memory-oltp/in-memory-oltp-in-memory-optimization`](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/in-memory-oltp-in-memory-optimization)
    阅读更多关于 `SQL Server` 内存中 OLTP 的内容。


    ## 自适应查询处理与自动调优

    我描述了 `SQL Server` 称为自适应查询处理（`AQP`）和自动调优的新性能功能。根据我的研究，`pgsql` 没有这些功能。您可以在 [`docs.microsoft.com/sql/relational-databases/performance/adaptive-query-processing`](https://docs.microsoft.com/sql/relational-databases/performance/adaptive-query-processing)
    阅读更多关于 `AQP` 的内容。您可以在我的一篇博客文章中阅读更多关于自动调优的内容：[`cloudblogs.microsoft.com/sqlserver/2018/06/11/sql-server-automatic-tuning-around-the-world/`](https://cloudblogs.microsoft.com/sqlserver/2018/06/11/sql-server-automatic-tuning-around-the-world/)。


    ![](img/index-545_1.jpg)


    # 第 10 章：迁移至 Linux 上的 SQL Server


    ## 安全性

    安全性对于数据平台产品至关重要，我在本书中已经为您论证了 `SQL Server` 拥有保护数据所需的所有功能。在本节中，我将指出在我认为 `SQL Server`
    在安全性方面优于 `pgsql` 的独特之处。


    ### 安全漏洞最少的数据库产品

    根据美国国家标准与技术研究院（`NIST`）的数据，`SQL Server` 在行业内安全漏洞数量最少。如图 10-5 所示，该图表展示了过去八年的趋势。


    ***图 10-5.** `SQL Server` 是过去八年中安全漏洞最少的数据库。*


    我们并非捏造这些统计数据。您可以在 [`nvd.nist.gov/`](https://nvd.nist.gov/) 阅读更多关于此数据的信息。


    ### Active Directory 认证

    虽然 `pgsql` 支持基于 `GSSAPI` 的认证，但其文档中并未具体提及支持 Active Directory 系统的 `GSSAPI` 认证。Active
    Directory 是行业内最受欢迎的身份系统之一，而 Linux 上的 `SQL Server` 支持它。您可以在 [`docs.microsoft.com/sql/linux/sql-server-linux-active-directory-authentication`](https://docs.microsoft.com/sql/linux/sql-server-linux-active-directory-authentication)
    阅读更多关于 Linux 上 `SQL Server` 的 Active Directory 认证内容。


    ### 透明数据加密 (TDE)

    `SQL Server` 使用 `TDE` 提供静态数据加密。`pgsql` 不为数据库和 `wal` 日志文件的静态存储提供任何内置加密功能。您可以在 [`docs.microsoft.com/sql/relational-databases/security/encryption/transparent-data-encryption`](https://docs.microsoft.com/sql/relational-databases/security/encryption/transparent-data-encryption)
    阅读更多关于 `SQL Server` 的 `TDE` 内容。


    ### 始终加密

    我在第 7 章描述了名为 `Always Encrypted` 的新型端到端安全功能，它将 `SQL Server` 提供程序与数据库引擎集成，以实现端到端加密，同时将密钥的控制权交到应用程序开发人员和用户手中。`pgsql`
    没有像 `Always Encrypted` 这样的内置端到端加密功能。


    ### 动态数据屏蔽 (DDM)

    `SQL Server` 的 `DDM` 允许管理员使用 `T-SQL` 定义屏蔽规则，而不是将规则编码在应用程序中。该功能之所以称为动态，是因为在 `T-SQL`
    语句应用于 `SQL Server` 后，应用程序可以获取数据的新屏蔽规则。`pgsql` 目前不支持动态数据屏蔽功能。


    ### 审计

    `SQL Server` 提供内置的安全审计功能，利用扩展事件作为基础。`pgsql` 不提供任何内置的安全审计功能。在我的研究中，我确实在 GitHub
    上找到了 `pgsql` 的这个自定义审计扩展 [`github.com/pgaudit/pgaudit`](https://github.com/pgaudit/pgaudit)，但我无法判断其使用或支持的广泛程度。


    ### 数据分类与漏洞评估

    近期的 `GDPR` 法规使许多用户更仔细地审视其数据平台的数据分类和潜在漏洞。`SQL Server` 提供

    '
