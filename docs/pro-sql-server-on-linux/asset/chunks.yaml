    # Chapter 8: High Availability and Disaster Recovery for SQL Server


    `Model` is typically not a problem unless you have made changes to it (which is
    a good reminder to back up any `T-SQL` scripts you have used to modify `model`),
    but `master` is an issue. Losing the `master` database means you have lost logins,
    linked servers, and information about databases. But again, any object like a
    login you have created should be saved in a `T-SQL` script and backed up separately.
    And all user databases can be recognizable again by attaching them. You can read
    about how to attach a database in our documentation at [https://docs.microsoft.com/sql/relational-databases/databases/attach-a-database](https://docs.microsoft.com/sql/relational-databases/databases/attach-a-database).


    ## Always On Failover Cluster Instance


    Having backups to restore is essential for any high availability and disaster
    recovery strategy, there are other options that compliment backups but also provide
    better high availability. SQL Server provides features in a suite called `Always
    On` (I’m going to try and use the right terms for this chapter. Allan Hirt, a
    prominent MVP and HADR expert, always keeps me honest on these terms). One solution
    provides high availability for SQL Server instance failures across a cluster using
    a shared storage for data. Protection of the data must be done through a non-Microsoft
    hardware solution for the shared storage and SQL Server backups. High availability
    using this solution is called `Always On Failover Cluster Instance`. `Always On
    Failover Cluster Instance` and `Always On Availability Groups` (described in the
    next section) have one theme in common. The functionality of these features on
    Linux is pretty much the same as SQL Server on Windows, but the `configuration
    is different`. This is due to the differences in software components required
    to make these technologies work in Linux vs. Windows. Having said this, the way
    `Always On Failover Clustering` and `Always On Availability Groups` work under
    the covers with Linux is perhaps one of the areas that is more different than
    I’ve encountered in my journey with SQL Server on Linux. SQL Server engine functionality
    is exactly the same, but the manner in which Linux handles concepts like failover
    is in some cases quite different than Windows.


    Many thanks for this and the next section of the chapter from my colleagues at
    Microsoft who specialize in HADR, including Sourabh Agarwal, Mihaela Blendea,
    Pradeep M, Brooks Remy, and Arnav Singh. Without them, I could not have navigated
    the complexity and functionality of `Always On` for SQL Server on Linux.


    ## How It Works


    For many years SQL Server has provided a failover cluster solution in conjunction
    with Windows Server Failover Clustering (WSFC). `Always On Failover Cluster Instance`
    (I’m going to call this `FCI` or `SQL FCI` for the rest of this chapter) for SQL
    Server on Linux relies on a similar solution that is open source, called `Pacemaker`
    (you can read more about the origins and details of `Pacemaker` at [http://clusterlabs.org/pacemaker/doc](http://clusterlabs.org/pacemaker/doc)).
    `Pacemaker` and its components such as `Corosync` are implemented by the various
    Linux distributions in various add-ons. For example, RHEL supports a component
    called `HA Add-On` (the details of the `HA Add-On` can be found at [https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/pdf/high_availability_add-on_overview/Red_Hat_Enterprise_Linux-7-High_Availability_Add-On_Overview-en-US.pdf](https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/pdf/high_availability_add-on_overview/Red_Hat_Enterprise_Linux-7-High_Availability_Add-On_Overview-en-US.pdf)).


    ### Note


    One learning for me as part of working with customers is that the `RHEL HA Add-On`
    can require a separate purchase from the standard `RHEL` license. `SLES` has the
    same concept for their `HA` extension. You can read more about `SLES` at [https://www.suse.com/products/highavailability](https://www.suse.com/products/highavailability).


    An `SQL FCI` is a set of SQL Server instances across a number of computers (nodes)
    that can participate in a failover high-availability solution called a cluster.
    However, with `FCI`, only one SQL Server instance is actively using the databases
    on shared storage among the nodes.


    This diagram from the documentation at [https://docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-concepts#the-clustering-layer](https://docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-concepts#the-clustering-layer),
    as seen in Figure 8-9, describes the layers of software interacting with hardware
    to support an `FCI` for SQL Server on Linux.


    ![](index-419_1.jpg)


    Figure 8-9. `FCI` software and hardware components for SQL Server on Linux


    Looking more at Figure 8-9, `Corosync` is a framework for communications between
    Linux Servers or `nodes` that `Pacemaker` uses. In order for `Pacemaker` components
    to make decisions to failover resources across nodes based on a failover condition,
    a `resource agent` is required. A resource agent is similar to a resource DLL
    used in WSFC, which is used for health checks for failover, to handle the coordination
    of SQL Server `FCI` on Windows. The SQL Server resource agent for Linux is installed
    with the `mssql-server-ha` package.


    ### Note


    The `SQL Server` resource agent is now available on GitHub as an open-source project
    at [https://github.com/Microsoft/mssql-server-ha](https://github.com/Microsoft/mssql-server-ha).
    Since our resource agent is open-source, other vendors can build `HADR` solutions
    that work with `SQL Server` on `Linux` to provide high-availability functionality
    as an alternative to `Pacemaker`. One such example is `HPE Serviceguard`. You
    can read more about `HPE Serviceguard` at [https://www.hpe.com/us/en/product-catalog/detail/pip.hpe-serviceguard-for-linux.376220.html](https://www.hpe.com/us/en/product-catalog/detail/pip.hpe-serviceguard-for-linux.376220.html).


    A great documentation reference for `Always On FCI` can be found at [https://docs.microsoft.com/sql/linux/sql-server-linux-ha-basics#pacemaker-for-always-on-availability-groups-and-failover-cluster-instances-on-linux](https://docs.microsoft.com/sql/linux/sql-server-linux-ha-basics#pacemaker-for-always-on-availability-groups-and-failover-cluster-instances-on-linux).'
