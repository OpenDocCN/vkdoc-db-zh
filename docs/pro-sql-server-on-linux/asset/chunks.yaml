    data extract and load capabilities. this book


    will cover the basics of SSIS capabilities in


    Cha[pter 5](#index_split_003.html#p166).


    **mssql- server- ha**


    SQL Server resource agent


    You are required to install this to use high


    availability features with pacemaker.


    Chapter 2   InStaLL anD ConfIguratIon


    **Note**  prior to SQL Server 2017 Cu4, SQL Server agent was a separate package


    called mssql-server-agent. We made a decision that starting with SQL Server


    2017 Cu4, SQL Server agent would be installed with the mssql-server package


    and enabled through mssql-conf. [ See https://docs.microsoft.com/sql/](https://docs.microsoft.com/sql/linux/sql-server-linux-setup-sql-agent)


    [linux/sql-server-linux-setup-sql-agent](https://docs.microsoft.com/sql/linux/sql-server-linux-setup-sql-agent) for
    more information. We will cover the basics of using SQL Server agent in Cha[pter 9.](#index_split_006.html#p457)


    The release notes contain the location for the above packages (except for mssql- tools)


    if you need to perform an offline installation of thes[e: https://docs.microsoft.com/](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes)


    [sql/linux/sql-server-linux-release-notes](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes).


    The mssql-tools packages for offline installation can be found at[: https://docs.](https://docs.microsoft.com/sql/linux/sql-server-linux-setup-tools#offline-installation)


    [microsoft.com/sql/linux/sql-server-linux-setup-tools#offline-installation](https://docs.microsoft.com/sql/linux/sql-server-linux-setup-tools#offline-installation).


    ** Installing  in Azure**


    Azure Virtual Machine is a cloud Infrastructure as a Service (IAAS) platform for
    hosting


    Virtual Machines to run all type of applications and workloads. SQL Server is
    well


    embraced and a very popular workload in this environment.


    **Note**  SQL Server on Linux can be run in other environments such as VMWare,


    VirtualBox, and other Cloud providers. for more information, see this documentation


    page:[ https://docs.microsoft.com/sql/linux/quickstart-install-](https://docs.microsoft.com/sql/linux/quickstart-install-connect-clouds)


    [connect-clouds.](https://docs.microsoft.com/sql/linux/quickstart-install-connect-clouds)


    You have two fundamental choices to install SQL Server on Linux in Azure Virtual


    Machine:


    •  Choose your favorite Linux Distribution (RHEL, SLES, or Ubuntu)


    from the Azure Marketplace. Then perform an installation of SQL


    Server like the instructions I have provided in this chapter.


    •  Choose a preconfigured SQL Server on Linux option from the Azure


    Marketplace. As part of the provisioning of the virtual machine, SQL


    Server will be installed and configured automatically.


    Chapter 2   InStaLL anD ConfIguratIon


    **Note**  When you use a preconfigured SQL Server Linux VM, you will have to


    complete the installation once you first connect to the Linux VM with sudo /opt/


    mssql/bin/mssql-conf set-sa-password to establish the sa password.


    You also have two methods to provision one of these choices with Azure Virtual


    Machine:


    •  Use the Azure Portal through a user interface


    [(http://portal.azure.com).](http://portal.azure.com)'
  trans: '# 第 2 章：安装与配置


    我建议您在任何 SQL Server Linux 安装上安装以下组件，以在 Linux 服务器上提供基本的查询和数据加载功能：

    `sqlcmd` 和 `bcp`。


    ## `mssql-server-fts`

    全文搜索功能。

    仅当您希望使用 SQL Server 全文搜索功能时才安装此组件。本书不会涵盖全文搜索内容。更多信息，请参阅 Microsoft 文档：[`docs.microsoft.com/sql/relational-databases/search/full-text-search`](https://docs.microsoft.com/sql/relational-databases/search/full-text-search)。


    ## `mssql-server-is`

    集成服务（也称为 SSIS）。

    这是一个独立的 Linux 进程，用于 ETL 操作。为更复杂的数据提取和加载功能安装此组件。本书将在第 5 章介绍 SSIS 功能的基础知识。


    ## `mssql-server-ha`

    SQL Server 资源代理。

    要使用 Pacemaker 实现高可用性功能，必须安装此组件。


    **注意：** 在 SQL Server 2017 CU4 之前，SQL Server 代理是一个名为 `mssql-server-agent` 的独立软件包。我们决定从
    SQL Server 2017 CU4 开始，SQL Server 代理将随 `mssql-server` 软件包一起安装，并通过 `mssql-conf`
    启用。更多信息，请参阅：[`docs.microsoft.com/sql/linux/sql-server-linux-setup-sql-agent`](https://docs.microsoft.com/sql/linux/sql-server-linux-setup-sql-agent)。我们将在第
    9 章介绍使用 SQL Server 代理的基础知识。


    如果您需要离线安装上述软件包（`mssql-tools` 除外），发布说明包含了它们的位置：[`docs.microsoft.com/sql/linux/sql-server-linux-release-notes`](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes)。


    离线安装的 `mssql-tools` 软件包可在此处找到：[`docs.microsoft.com/sql/linux/sql-server-linux-setup-tools#offline-installation`](https://docs.microsoft.com/sql/linux/sql-server-linux-setup-tools#offline-installation)。


    ## 在 Azure 中安装

    Azure 虚拟机是一个云基础设施即服务（IaaS）平台，用于托管虚拟机以运行各种类型的应用程序和工作负载。SQL Server 在此环境中得到了很好的支持，并且是一个非常流行的工作负载。


    **注意：** SQL Server on Linux 可以在其他环境中运行，例如 VMWare、VirtualBox 和其他云提供商。更多信息，请参阅此文档页面：[`docs.microsoft.com/sql/linux/quickstart-install-connect-clouds`](https://docs.microsoft.com/sql/linux/quickstart-install-connect-clouds)。


    在 Azure 虚拟机中安装 SQL Server on Linux 有两个基本选择：

    - 从 Azure 市场选择您喜欢的 Linux 发行版（RHEL、SLES 或 Ubuntu）。然后按照我在本章中提供的说明进行 SQL Server 的安装。

    - 从 Azure 市场选择一个预配置的 SQL Server on Linux 选项。作为虚拟机配置过程的一部分，SQL Server 将自动安装和配置。


    **注意：** 当您使用预配置的 SQL Server Linux 虚拟机时，首次连接到 Linux 虚拟机后，必须完成安装步骤：使用 `sudo /opt/mssql/bin/mssql-conf
    set-sa-password` 来设置 `sa` 密码。


    您还可以通过两种方法在 Azure 虚拟机中配置这些选项之一：

    - 通过用户界面使用 Azure 门户（`http://portal.azure.com`）。'
- fmt: '# Chapter 2: Installation and Configuration


    Use the command line `Azure cli` to provision a virtual machine.


    Read more at [`https://docs.microsoft.com/cli/azure/vm?view=azure-cli-latest`](https://docs.microsoft.com/cli/azure/vm?view=azure-cli-latest).


    No matter what method or choice you pick to install `SQL Server` on `Linux` in
    an `Azure Virtual Machine`, there are a few unique aspects to setting up connectivity
    and providing access via `ssh`. For a walkthrough of this experience using the
    `Azure Portal`, see this documentation: [`https://docs.microsoft.com/azure/virtual-machines/linux/sql/provision-sql-server-linux-virtual-machine`](https://docs.microsoft.com/azure/virtual-machines/linux/sql/provision-sql-server-linux-virtual-machine).


    To achieve maximum performance for `SQL Server` on `Azure Virtual Machine`, consult
    our best practice guide at [`https://docs.microsoft.com/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-performance`](https://docs.microsoft.com/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-performance).
    Some of the recommendations here are for `Windows`, but several of these apply
    to `SQL Server` on `Linux`.


    In addition, our very talented documentation lead, Jason Roth, has written up
    this excellent FAQ on running `SQL Server` on `Linux` in `Azure Virtual Machine`:
    [`https://docs.microsoft.com/azure/virtual-machines/linux/sql/sql-server-linux-faq`](https://docs.microsoft.com/azure/virtual-machines/linux/sql/sql-server-linux-faq).
    Read this over carefully for a discussion about licensing and a few restrictions.


    `Azure Virtual Machine` provides many different sizes and options for capacity
    including `CPU`, memory, and storage. The virtual machine size will be a choice
    you make when provisioning a virtual machine in `Azure`. For a complete list of
    current sizes, see this documentation: [`https://docs.microsoft.com/azure/virtual-machines/linux/sizes`](https://docs.microsoft.com/azure/virtual-machines/linux/sizes).


    One of the benefits of using `Azure Virtual Machine` is a flexible subscription
    model and a “pay as you go” model. For pricing options for `Linux Azure Virtual
    Machines`, see this documentation: [`https://azure.microsoft.com/pricing/details/virtual-machines/linux`](https://azure.microsoft.com/pricing/details/virtual-machines/linux).


    ## Security Considerations


    [`https://docs.microsoft.com/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-security`](https://docs.microsoft.com/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-security).


    ## Migration


    [`https://docs.microsoft.com/azure/virtual-machines/windows/sql/virtual-machines-windows-migrate-sql`](https://docs.microsoft.com/azure/virtual-machines/windows/sql/virtual-machines-windows-migrate-sql).


    ## High Availability and Disaster Recovery


    [`https://docs.microsoft.com/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-high-availability-dr`](https://docs.microsoft.com/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-high-availability-dr).'
