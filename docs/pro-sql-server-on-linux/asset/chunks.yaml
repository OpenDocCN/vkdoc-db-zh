  trans: '

    编辑文件也是另一项常见任务，包括编写 shell 脚本。我记得早年使用 UNIX 时著名的 `vi` 编辑器。我的一位朋友曾建议我学习 vi，因为它默认安装在全世界每一台
    UNIX 系统上。至今它仍然可供你使用。但现在我更喜欢流行的 `nano` 编辑器（正如 Robert Dorr 所建议的）。`nano` 可能没有安装在你的
    Linux 服务器上，因此在 RHEL 上，我使用以下命令安装它：


    ```

    sudo yum install nano

    ```


    `nano` 是一个全屏编辑器，甚至支持剪切/复制/粘贴。图 2-3 是一个使用 `nano` 创建用于安装 SQL Server 的 shell 脚本的示例屏幕。


    *图 2-3. 在 Linux 上的 `nano` 编辑体验*


    请记住，当你创建一个 shell 脚本时，你必须将其“模式”更改为可执行才能运行它：


    ```

    chmod u+x installsql.sh

    ```


    ## 系统日志记录


    本章后续部分，我将讨论一个名为 ERRORLOG 的日志文件，SQL Server 使用它来提供有关启动、错误、警告和其他执行详情的重要信息。你可能还需要查看
    Linux 内核或其他程序的日志。在较旧的基于 RPM 的发行版和当前的 Debian 系统中，一个常见的文件是 `/var/log/syslog`。在像
    RHEL 这样的当前基于 RPM 的系统版本中，有一个非常棒的程序可以查看大多数系统日志，称为 `journalctl`。并且 SQL Server 会将其
    ERRORLOG 中的信息写入同一个日志记录设施。


    默认情况下，`journalctl` 只会保留自你的 Linux 服务器上次启动以来的消息（这是可配置的，以使日志在多次启动间保持持久化），而默认执行 `journalctl`
    会显示自启动以来所有已记录的、从最旧开始的消息：


    ```

    journalctl

    ```


    以下是 Linux 上 `journalctl` 的一些典型输出：


    ```

    -- 日志始于 Sat 2018-02-17 09:29:49 CST，止于 Tue 2018-02-20 06:43:04 CST。 --

    2 月 17 09:29:49 bwsql2017rhel system-journal[106]: Runtime journal is using 8.0M
    (max allowed 390.2M, trying to leave 545.4M f

    2 月 17 09:29:49 bwsql2017rhel kernel: Initializing cgroup subsys cpuset

    2 月 17 09:29:49 bwsql2017rhel kernel: Initializing cgroup subsys cpu

    ...

    ```


    **提示**：`journalctl` 中显示的 Linux 版本是 Linux 内核发布的版本。要找出你的发行版发布和版本号的具体详细信息，请使用此命令：


    ```

    cat /etc/os-release

    ```


    默认情况下，`journalctl` 会分页显示输出，但你可以使用一个选项来控制这一点。要查看所有 SQL Server 条目，你可以使用如下命令：


    ```

    journalctl | grep sqlservr

    ```


    这仅向你显示 `sqlservr` 的日志输出，但你可能希望看到与其他内核消息交织的输出。在这种情况下，只需运行 `journalctl` 转储整个日志，因为每个条目都标有时间戳。


    ## 只管安装它吧！


    至此，本章中你已经了解了 SQL Server 的系统要求，探索了一些测试 Linux 环境和 SQL Server 的基础知识，并且如果你是 Linux
    新手，还获得了一些关于如何操作操作系统和 shell 的技巧。或者你可能只是跳到这里，想立即开始安装 SQL Server。在本节中，我将引导你完成安装过程，并为你提供一些幕后信息。


    ## 60 秒内部署完成


    在我展示在 RHEL 上安装的步骤之前，这里快速提供了在 Ubuntu（使用 `apt-get`）和 SLES（使用 `zypper`）上安装的指引。这些步骤非常相似但略有不同，以适应这些发行版上的包管理器。


    *Ubuntu*：[`docs.microsoft.com/sql/linux/quickstart-install-connect-ubuntu`](https://docs.microsoft.com/sql/linux/quickstart-install-connect-ubuntu)


    *SLES*：[`docs.microsoft.com/sql/linux/quickstart-install-connect-suse`](https://docs.microsoft.com/sql/linux/quickstart-install-connect-suse)

    '
- fmt: "## 在 RHEL 上的安装只需三个简单步骤\n\n请注意，这些步骤要求您的 Linux 服务器具有互联网连接。本章后面将讨论如何进行离线安装。\n\
    \n1.  下载一个名为仓库（repo）配置文件的文本文件到已知目录。\n    ```\n    sudo curl -o /etc/yum.repos.d/mssql-server.repo\
    \ https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo\n    ```\n\
    \n2.  运行安装命令。\n    ```\n    sudo yum install -y mssql-server\n    ```\n    > **提示：**\
    \ 此步骤安装基于累积更新（Cumulative updates，简称 CUs）概念的最新 SQL Server 2017 更新。本章后面将讨论如何应用特定版本。建议使用最新更新，因为我们持续改进\
    \ SQL Server on Linux，包括修复和次要增强。还建议在 Linux 上安装 SQL Server 后，每月保持更新，因为这是典型的更新频率。\n\
    \n3.  运行 bash shell 脚本以 `完成` SQL Server 的安装（回答几个提示）：\n    ```\n    sudo /opt/mssql/bin/mssql-conf\
    \ setup\n    ```\n\n## 第2章：安装与配置\n\n就是这样。如果您有良好的互联网连接，这些步骤大约可以在 60 秒内完成。我已经多次看到并做到了这一点。\n\
    \n此时，如果您像我一样，只想快速推进——构建数据库、应用程序和查询。我理解这一点，事实上，我们在 Linux 上构建 SQL Server 就是为了让您能够这样做。但本书旨在全面涵盖该主题，因此本章的其余部分提供了关于完整安装体验的详细信息。如果您计划开始使用\
    \ SQL Server，我建议您停下来浏览以下资源，以避免使用产品时遇到任何问题：\n\n[https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes)\
    \ 和 [https://docs.microsoft.com/sql/linux/sql-server-linux-faq](https://docs.microsoft.com/sql/linux/sql-server-linux-faq)。\n\
    \n如果您对每个步骤背后的更多细节感兴趣，请继续阅读。否则，请转到本章的下一节。\n\n### 下载仓库配置文件\n\n您只需在 Linux 服务器上下载一次仓库配置文件（除非您想更改要使用的仓库），即使您决定安装和卸载多次。\n\
    ```\nsudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo\n\
    ```\n\n`curl`，也称为 cURL（代表 Client URL Request Library），是一个使用 URL 语法获取或发送文件的命令。默认写入标准输出（stdout），因此\
    \ `-o` 参数后跟一个文件名。在本例中，SQL Server 遵循 `yum` 仓库约定，将文件放在 `/etc/yum/repos.d` 目录中。\n\
    \n仓库文件是一个简单的文本文件，如下所示（基于我们 packages.microsoft.com 服务器上的 `mssql-server-2017.repo`）：\n\
    ```\n[packages-microsoft-com-mssql-server-2017]\nname=packages-microsoft-com-mssql-server-2017\n\
    baseurl=https://packages.microsoft.com/rhel/7/mssql-server-2017/\nenabled=1\n\
    gpgcheck=1\ngpgkey=https://packages.microsoft.com/keys/microsoft.asc\n```\n\n\
    ![](index-60_1.png)\n\n## 第2章：安装与配置\n\n`mssql-server-2017.repo` 是 SQL Server 2017\
    \ CU 仓库的配置文件。您可能想使用不同的仓库（例如用于预览构建或通用分发版 [GDR] 的仓库）。有关更多详情，请参阅本章中名为“安装其他版本”的部分。此仓库文件将控制包管理器用于下载和安装更新包的内容。\n\
    \n其概念是从应用程序供应商提供的位置下载仓库文件，这样当您运行安装时，`yum` 包管理器将使用该文件的内容来安装包（以及密钥）。因此，这个 URL（[https://packages.microsoft.com/rhel/7/mssql-server-2017/](https://packages.microsoft.com/rhel/7/mssql-server-2017/)）"
  raw: 'Installation for RHEL requires these three easy steps:


    **Note**  these steps require your Linux server to have an Internet connection. I
    will


    discuss how to do an offline installation later in this chapter.


    1.  Download a text file called a repository (repo) configuration file to


    a known directory.


    sudo curl -o /etc/yum.repos.d/mssql-server.repo https://


    packages.microsoft.com/config/rhel/7/mssql-server-2017.repo


    2.  Run a command to do the install.


    sudo yum install -y mssql-server


    **Tip**  this step installs the latest update of SQL Server 2017 based on a concept


    called Cumulative updates (Cus). I will talk later in this chapter about how to


    apply specific versions. I recommend you use the latest update, as we continually


    improve SQL Server on Linux including fixes and minor enhancements. I also


    recommend that once you install SQL Server on Linux, you keep up to date


    monthly because this is the typical update frequency.


    3.  Run a bash shell script to  *complete* the installation of SQL Server


    (answer a few prompts):


    sudo /opt/mssql/bin/mssql-conf setup


    Chapter 2   InStaLL anD ConfIguratIon


    That’s it. And if you have a decent Internet connection, it is possible that these
    steps


    can be done in about 60 seconds. I’ve seen and done it many times.


    At this point, if you are like me, you just want to move rapidly—build database,


    applications, and queries. I get that, and in fact we built SQL Server on Linux
    so you


    could do that. But this is a book to cover the subject thoroughly which is why
    the rest of


    the chapter has detailed information about the complete install experience. If
    you plan


    to just start using SQL Server, I recommend you stop and scan over these resources
    to


    avoid any gotchas when you use the product:


    [https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes and ](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes)


    [https://docs.microsoft.com/sql/linux/sql-server-linux-faq](https://docs.microsoft.com/sql/linux/sql-server-linux-faq).


    If you are interested in more details behind each step, read on. Otherwise, go
    to the


    next section in the chapter.


    ** Download a Repository Config File**


    You only must download a repository config file once on your Linux server (unless
    you


    want to change the repository to use), even if you decide to install and uninstall
    several


    times.


    sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.


    com/config/rhel/7/mssql-server-2017.repo


    **curl**, also known as cURL (which stands for Client URL Request Library), is
    a


    command to get or send files using a URL syntax. The default is to write to stdout
    so


    the -o parameter is followed by a filename. In this case, SQL Server follows the
    yum


    repository convention by placing the file in the /etc/yum/repos.d directory.


    The repo file is a simple text file that looks like this (based on mssql-server-2017.repo


    from the our packages.microsoft.com server):


    [packages-microsoft-com-mssql-server-2017]


    name=packages-microsoft-com-mssql-server-2017


    baseurl=https://packages.microsoft.com/rhel/7/mssql-server-2017/


    enabled=1


    gpgcheck=1


    gpgkey=https://packages.microsoft.com/keys/microsoft.asc


    ![](index-60_1.png)


    Chapter 2   InStaLL anD ConfIguratIon


    The mssql-server-2017.repo is the configuration file for the SQL Server 2017 CU


    repository. You may want to use a different repository (such as one for preview
    builds


    or General Distribution Release [GDR]). Refer to the section in this chapter called


    “Installing Other Versions” for more details. This repo file will control what
    package


    managers use to download and install packages for install and update.


    The concept is to download a repo file from a location provided by the application


    vendor so that when you run install, the yum package manager will use the contents


    of the file to install the packages (as well as a key). So this URL ([https://packages.](https://packages.microsoft.com/rhel/7/mssql-server-2017/)'
