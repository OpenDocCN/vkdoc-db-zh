    ## Automation and Statistics


    As you modify data in your tables, statistics may not accurately reflect your
    changes. There is a nice solution for you though. By default, every database created
    in SQL Server has a database option called `AUTO_UPDATE_STATISTICS`. When this
    database option is enabled (which is the default), SQL Server will maintain statistics
    (using the default sampling algorithm) automatically. The automation is based
    on a formula that has evolved over the years but is fundamentally based on the
    amount of changes made to a table and/or index.


    The threshold for kicking in the automation to update statistics was updated in
    recent releases of SQL Server to more accurately reflect large table sizes. You
    can read more about this threshold in this Knowledge Base Article: [https://support.microsoft.com/help/2754171/controlling-autostat-auto-update-statistics-behavior-in-sql-server](https://support.microsoft.com/help/2754171/controlling-autostat-auto-update-statistics-behavior-in-sql-server).
    In addition, a new DMV called `dm_db_stats_properties` can be used to track when
    and how statistics are updated (automatically or manually) for a specific statistic.
    Even when this database option is set, you can disable automatic updating of a
    specific statistic using the system procedure `sp_autostats`. Automatic statistics
    are typically done *inline*, which means statistics are updated as part of a T-SQL
    statement “behind the scenes” in the engine (like a `SELECT`). You also have the
    option to have statistics updated asynchronously by setting the `AUTO_UPDATE_STATISTICS_ASYNC`
    database option. The default for this option is `OFF`. I recommend you leave this
    off.'
