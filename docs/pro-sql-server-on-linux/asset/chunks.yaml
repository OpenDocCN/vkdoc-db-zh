- fmt: 'This is because the `newuser` login is not mapped to any user in the `[SecureMyDatabase]`
    database.


    So, the next step is to create a user in the database connected as the `dbo` user,
    which is the `sqllinux` login. Connected as `sqllinux` executes the following
    T-SQL batch, which can be found in the example script `createuser.sql`:


    ```sql

    USE [SecureMyDatabase]

    GO

    CREATE USER newuser FOR LOGIN newuser

    GO

    ```


    **Note** you don’t have to map users to the same name as a login, but it does
    make it easier to manage and understand.


    Now let’s connect as the `newuser` login and run the `whichuserami.sql` script
    again using SQL Operations Studio. Figure 7-3 shows what the results should look
    like.


    ![](index-344_1.jpg)


    ***Figure 7-3.** The `newuser` login and user*


    If the user called `newuser` is not a database owner, what can this user do? What
    permission and access do this login and user have now? I’ll cover that in a later
    section. First, I want to show you a different method for login authentication
    called Active Directory Authentication.


    ### Active Directory Authentication


    SQL Server authentication is simple and easy to use. However, most users in an
    organization of any size have login accounts that are part of a company infrastructure
    such as an Active Directory domain. Using a single sign-on is not only efficient
    but more secure, as you don’t have to manage different accounts to use corporate
    resources and SQL Server. SQL Server on Windows has provided this method for many
    years called Windows Authentication.


    Active Directory is an extremely popular identity-based management system even
    for organizations that use Linux Servers. Linux provides the necessary packages
    and software to join an Active Directory domain. SQL Server can take advantage
    of this functionality using Kerberos to authenticate an Active Directory user,
    much like Windows Authentication. Users can now login to the Linux Server or any
    computer that can join the domain and log in to SQL Server without using a separate
    SQL login.


    ### How it Works


    Active Directory Authentication involves the following commands and objects:


    - **`realm`**: A command on Linux that allows you to join a Linux server to an
    Active Directory domain. `realm` requires you to install the `realmd` package.
    The term *realm* comes from the Kerberos concept, Kerberos realm.

    - **Ticket Granting Ticket (`TGT`)**: an encrypted file that is a *ticket* sent
    to a Ticket Granting Server (`TGS`) to request access to services in the domain
    (such as SQL Server). The `TGS` functionality is implemented by a Windows Domain
    Controller.

    - **`kinit`**: a Linux command used to obtain and cache a `TGT` for a domain user.

    - **Service Principal Name (`SPN`)**: a unique identifier for a service (such
    as SQL Server) in the Active Directory.

    - **`keytab`**: A file on Linux used to store encrypted keys used to validate
    incoming Kerberos authentication requests.

    - **Domain Controller**: A Windows Server that provides Active Directory Domain
    Services for an Active Directory Domain.


    My colleague Vin Yu, one of the key program managers for SQL Server on Linux and
    containers, has an excellent diagram, as seen in Figure 7-4, which shows the flow
    how Kerberos works to support Active Directory Authentication with SQL Server.


    ![](index-346_1.png)


    ***Figure 7-4.** SQL Server Active Directory Authentication flow on Linux*


    Let me explain this flow to understand how Kerberos authentication works with
    SQL Server on Linux:


    1.  The user logs into the domain on a Linux client executing `kinit` with the
    domain user account and password. `kinit` will send the user and password to the
    Domain Controller (`DC`).

    2.  The `DC` will issue a `TGT` after it verifies this is a valid domain user
    with correct password. This same process would happen if you logged into your
    Windows computer with your domain account.

    3.  Now you need to connect to SQL Server with a tool like `sqlcmd`.'
