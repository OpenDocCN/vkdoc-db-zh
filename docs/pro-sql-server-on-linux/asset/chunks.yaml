    # 8 SQL Server 的高可用性和灾难恢复


    虽然性能和安全性是任何世界级数据库引擎和平台必须提供的关键特性，但生产工作负载和数据库需要高可用性以及支持健壮灾难恢复计划的功能。SQL Server 是一个数据库平台，为高可用性和灾难恢复需求提供了丰富的特性和选项。


    在本章中，我将介绍 SQL Server on Linux 中包含的高可用性和灾难恢复的三个最重要的功能领域：

    - 备份和还原

    - 故障转移群集实例 (Always On Failover Cluster Instance)

    - 可用性组 (Always On Availability Groups)


    我不会在本书中涵盖的另一个解决方案称为 *日志传送 (Log Shipping)*，你可以在 [https://docs.microsoft.com/sql/linux/sql-server-linux-use-log-shipping](https://docs.microsoft.com/sql/linux/sql-server-linux-use-log-shipping)
    阅读更多内容。与此主题相关的另一个重要资源是 *业务连续性 (Business Continuity)*，你可以在 [https://docs.microsoft.com/sql/linux/sql-server-linux-business-continuity-dr](https://docs.microsoft.com/sql/linux/sql-server-linux-business-continuity-dr)
    阅读。


    © Bob Ward 2018

    B. Ward, *Pro SQL Server on Linux*, [https://doi.org/10.1007/978-1-4842-4128-8_8](#index_split_005.html#p389)


    ## 备份和还原


    我很喜欢我们文档中的这句话：“SQL Server 的高可用性功能并不能取代拥有一个健壮、经过充分测试的备份和还原策略的要求，这是任何高可用性解决方案最基本的构建块”（你可以在
    [https://docs.microsoft.com/sql/linux/sql-server-linux-business-continuity-dr#sql-server-2017-scenarios-using-the-availability-features](https://docs.microsoft.com/sql/linux/sql-server-linux-business-continuity-dr#sql-server-2017-scenarios-using-the-availability-features)
    阅读）。


    这很好地总结了备份的重要性。我经常引用的一句话是：“你的数据质量取决于你的备份质量”。在我与 SQL Server 打交道的 25 年经验中，我从未见过比制定可靠的备份策略更被想当然的事情。我曾与一些客户合作过，他们使用
    SQL Server 运行整个生产业务长达 *数月* 而没有良好的备份。当然，第一次遇到需要备份的故障时，你才会真正意识到它的重要性。


    那么，让我们来探讨一下在 SQL Server on Linux 中备份和还原数据库的基础知识和细节，包括一个重要的相关主题：数据库恢复。


    ### 数据库备份'
