    database workloads on the planet. I wrote this section of the chapter, not to
    require any


    action, but to give the reader the understanding of what is  *possible* with SQL
    Server. The


    SQL Server on Linux database engine is built to understand how to dynamically
    scale


    and maximize CPU, I/O, and memory resources of a computer, virtual machine, or


    ChapTer 6   performanCe CapabILITIeS


    container. Users may be reading this book to learn about SQL Server and decide
    whether


    it’s a data platform they can rely on to run their business or be the data source
    for a


    new application. This section is intended to help provide the information necessary
    to


    answer those questions.


    You don’t have to go any further to understand what is possible with SQL Server
    then


    to just look at our TPC benchmark performance. SQL Server on Linux currently has
    the


    two best performance results for a 1TB TPC-H benchmark, which measures analytic


    query performance. (You can read more about TPC benchmarks a[t http://www.tpc.org ](http://www.tpc.org)


    and you can see the specific benchmarks results I mention for TPC-H a[t http://www.](http://www.tpc.org/3331)


