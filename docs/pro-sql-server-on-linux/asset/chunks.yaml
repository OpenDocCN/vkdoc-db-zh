    Chapter 11   SQL Server and ContainerS


    ** The SQL Mac Challenge**


    In February of 2018 I was speaking at one of my favorite events, SQLBits in London.


    One of my presentations was on SQL Server on Linux. I was using my trusty HP Zbook


    Studio laptop running Windows 10 to do the presentation and demos. Someone from


    the audience raised their hand and said “Bob, I love that Microsoft has adopted
    Linux,


    but I’m a MacBook user. You are using a PC here in these demos. But I don’t see
    the


    commitment from Microsoft for the MacBook community.”


    Even though I had not researched the topic, I was confident in this reply. “We


    now have the software and tools where you can run and interact with SQL Server


    with no virtualization and no Windows tools on your MacBook. And I believe you


    can get this installed and up and running in 5 minutes.” I called it “Take the
    SQL Mac


    challenge.” The person in the audience said they would take me up on this challenge'
  trans: "\n\n# 第 11 章 SQL Server 与容器\n\n服务器启动后，在容器内使用 `sqlcmd` 执行 `db-init.sql` 脚本。我会让你进一步查看\
    \ `db-init.sql`，但它基本上创建了 `ProductCatalog` 数据库，创建了登录名和对象，并向数据库填充了一些数据。\n\n现在，你了解了如何启动一个\
    \ SQL Server 容器并运行 T-SQL 脚本来创建你的数据库、对象和数据的机制。\n\n让我们看一下 `docker-compose.yml` 文件，了解\
    \ Docker Compose 如何知道如何构建每个容器。\n\n1.  通过执行以下命令，切换到 `docker-compose.yml` 文件所在的原始目录：\n\
    \n    ```\n    cd ~/sqllinuxlabs/containers/mssql-aspcore-example/\n    ```\n\n\
    2.  现在，通过执行 `cat docker-compose.yml` 来输出 `docker-compose.yml` 文件的内容。你的结果应该如下所示：\n\
    \n    ```\n    version: \"3\"\n    services:\n      web:\n        build: ./mssql-aspcore-example-app\n\
    \        ports:\n          - \"5000:5000\"\n        depends_on:\n          - db\n\
    \      db:\n        build: ./mssql-aspcore-example-db\n        environment:\n\
    \          SA_PASSWORD: \"Sql2017isfast\"\n          ACCEPT_EULA: \"Y\"\n    \
    \    ports:\n          - \"1500:1433\"\n    ```\n\n`services:` 标签允许你定义将作为应用程序一部分运行的特定容器。对于每个服务，你可以定义用于构建镜像的\
    \ `Dockerfile` 的位置、运行容器时要使用的端口（包括映射的端口），以及一个服务是否依赖于另一个服务。在本例中，`web` 服务依赖于 `db`\
    \ 服务。这意味着在 `web` 服务的容器启动之前，`db` 服务的容器将被创建并启动。\n\n你还可以指定容器所需的任何环境变量，在本例中，这些变量是\
    \ SQL Server 容器的 EULA 协议和 sa 密码。并且对于 `db` 服务的容器，端口 1500 被映射到 SQL Server 的端口 1433。\n\
    \n因此，总结一下，当执行 `docker-compose up` 时，Docker 将使用 `docker-compose.yml` 文件，首先通过 `./mssql-aspcore-example-db`\
    \ 目录中的 `Dockerfile` 构建 `db` 服务的容器。然后，它将使用指定的环境变量，基于该镜像运行一个容器，此时 SQL 服务可通过主机的端口\
    \ 1500 访问。\n\n接着，它将为 `web` 服务运行容器，该容器从 `./mssql-aspcore-example-app` 目录中的 `Dockerfile`\
    \ 创建 Docker 镜像，并使用端口 5000 运行一个基于该镜像的容器。\n\n最后一个重要的观察点：当我第一次看到这些容器时，我无法弄清楚 ASP.NET\
    \ 应用程序如何知道连接到 SQL Server 容器的端口 1500。`docker-compose.yml` 文件中的服务定义是关键。名为 `db` 的服务实际上被映射到\
    \ `localhost,1500`。因此，ASP.NET 应用程序可以在连接字符串中使用 `db` 作为服务器名，来连接与 `db` 服务关联的容器中的\
    \ SQL Server。\n\n我知道这感觉有点复杂，但这只是因为我深入探讨了幕后细节来描述组合一个多容器应用程序是如何工作的。现在，让我们来点有趣的。继续下一节，看看我如何应对\
    \ SQL Mac 挑战！\n\n## SQL Mac 挑战\n\n2018 年 2 月，我在伦敦我最喜欢的活动之一 SQLBits 上做演讲。我的其中一个演讲是关于\
    \ Linux 上的 SQL Server。我当时正在用我可靠的 HP Zbook Studio 笔记本电脑运行 Windows 10 进行演讲和演示。一位观众举手说道：“鲍勃，我很高兴微软拥抱了\
    \ Linux，但我是一个 MacBook 用户。你在这些演示中使用的是 PC。但我没有看到微软对 MacBook 社区的承诺。”\n\n尽管我之前没有研究过这个话题，但我对这个回答充满信心。“我们现在拥有的软件和工具，可以让你在你的\
    \ MacBook 上运行并与 SQL Server 交互，而无需虚拟化，也无需 Windows 工具。我相信你可以在 5 分钟内安装并运行它。”我称之为“接受\
    \ SQL Mac 挑战”。观众中的那个人说他们愿意接受这个挑战。\n\n"
- fmt: '# Chapter 11 SQL Server and Containers


    You can see the result of this challenge on his tweet at [`https://twitter.com/thofle/status/967437807697448965`](https://twitter.com/thofle/status/967437807697448965).


    I actually really didn’t know if what I said was 100% accurate (especially the
    no virtualization and the five-minute part) but I knew two things to make this
    bold statement: (1) I knew our `docker` container image was portable and would
    run easily on a `MacBook`, since I knew `Docker` exists for macOS; and (2) our
    `SQL Operations Studio` tool is cross-platform so natively runs on `macOS`.


    When I got back to Texas, I did something I thought I would never do as an employee
    at Microsoft. I asked my manager, Asad Khan, if I could buy a `MacBook`. He said
    with all the work I’m doing on `Linux` and containers that this made perfect sense.
    Once I got the `MacBook`, I decided myself to take the SQL Mac challenge (you
    know, put your money where your mouth is). And I’m here to say I was wrong. I
    was wrong in the sense that it took me four minutes, not five minutes, to get
    this software installed.


    Let me walk you through the experience so all of you who are reading this book
    who are `MacBook` users can try this yourself.


    ## 1. Install Docker for Mac

    The first thing I did was install and download `Docker` for `Mac` (Community Edition),
    as described at [`https://store.docker.com/editions/community/docker-ce-desktop-mac`](https://store.docker.com/editions/community/docker-ce-desktop-mac).
    (I used the Stable channel). Figure 11-6 shows this experience after the download.


    ![](index-590_1.jpg)


    **Figure 11-6.** Downloading Docker for Mac


    In all transparency, there is some virtualization for `macOS` for `docker`, but
    it is far better than before. `docker` for `Mac` used to require `virtualBox`,
    but now `macOS` has a built-in light hypervisor framework, so it is more accurate
    to say `docker` for `Mac` does not require a separate heavy virtualization environment.
    You can read more about the `docker` for `Mac` environment at [`https://docs.docker.com/docker-for-mac/docker-toolbox/#the-docker-for-mac-environment`](https://docs.docker.com/docker-for-mac/docker-toolbox/#the-docker-for-mac-environment).


    ## 2. Install Docker as an Application

    After the download for `Docker` for `Mac` is extracted, a new window pops up for
    you to install `Docker` as a `Mac` application by a simple drag and drop, as seen
    in Figure 11-7.


    **Figure 11-7.** Installing Docker for Mac


    ## 3. Launch Docker

    Now that `Docker` is installed as an application, I launched it from the Launchpad
    application on my `MacBook`. Now at the top of my screen I get an icon for `Docker`
    and I can see it is starting, as seen in Figure 11-8.


    ![](index-592_1.jpg)


    **Figure 11-8.** Docker for Mac starting up


    ## 4. Download SQL Operations Studio

    Now I wanted to multitask, so while `Docker` was starting up I downloaded `SQL
    Operations Studio` for `macOS` from [`https://docs.microsoft.com/sql/sql-operations-studio/download`](https://docs.microsoft.com/sql/sql-operations-studio/download).


    ## 5. Pull SQL Server Image

    While this was downloading, `Docker` had started up. So I pulled down the `SQL
    Server` image using `docker` from the `macOS` `Terminal`, which is effectively
    a `bash` shell. I ran a command like the following:


    ```bash

    docker pull microsoft/mssql-server-linux:2017-latest

    ```


    ## 6. Extract SQL Operations Studio

    While the pull was running, I then extracted the download from `SQL Operations
    Studio`. This extraction should look like Figure 11-9.


    ![](index-593_1.jpg)


    **Figure 11-9.** Extracting SQL Operations Studio for macOS'
