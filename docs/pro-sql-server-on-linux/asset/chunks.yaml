- fmt: '# Chapter 4   Building an appliCation and advanCed t-SQl


    ```sql

    WITH (SYSTEM_VERSIONING = ON ( HISTORY_TABLE = [Application].[NewPeople_Archive]))

    GO

    ```


    With this defined, two tables exist in the database, the `[Application].[NewPeople]`
    table and the `[Application].[NewPeople_Archive]` table.


    When a new row is inserted into the `[Application].[NewPeople]` table, the `ValidFrom`
    column will be assigned the current datetime for the transaction that inserted
    the row and the `ValidTo` column will be assigned the maximum value of a `datetime2`
    type, which is `9999-12-31` (format of `YYYY-MM-DD`).


    When this row is updated, the values of the row before the update are inserted
    into the `[Application].[NewPeople_Archive]` table but now with `ValidTo` set
    to the transaction time of the update. The updated row in `[Application].[NewPeople]`
    in the `ValidFrom` column will be assigned the transaction time of the update
    and `ValidTo` set to `9999-12-31`.


    This now represents a history of the changes to this row based on the `datetime2`
    columns.


    The T-SQL `SELECT` statement has been extended to include a new `FOR SYSTEM_TIME`
    clause to allow you to search for versions of the row based on a variety of options.


    SQL Server will automatically retrieve rows from the history table or current
    table based on the query. You don’t have to know where your data exists. Just
    query the `NewPeople` table and use the `FOR SYSTEM_TIME` syntax to find a row
    for a given period. SQL Server will automatically retrieve the correct row from
    either the `NewPeople` or the `NewPeople_Archive` table.


    Any `DELETE` for a row in the table will cause the row to be inserted into the
    history table with the `ValidTo` set to the transaction time of the delete. The
    row in the current table will be deleted, but searches using the `FOR SYSTEM_TIME`
    will find historical rows.


    A complete set of documentation on this feature can be found at [https://docs.microsoft.com/sql/relational-databases/tables/temporal-tables#why-temporal](https://docs.microsoft.com/sql/relational-databases/tables/temporal-tables#why-temporal).
    There are also some very nice usage scenarios and examples at [https://docs.microsoft.com/sql/relational-databases/tables/temporal-table-usage-scenarios](https://docs.microsoft.com/sql/relational-databases/tables/temporal-table-usage-scenarios).


    ## Graph  Database


    Some data models do not fit the traditional relationships, as seen by the example
    I’ve provided in this chapter. These scenarios include hierarchical data, complex
    many-to-many relationships, or complex interconnected data and relationships.


    It is always possible to store and query data for these types of scenarios in
    SQL Server, but SQL Server 2017 introduces a new feature that makes it far easier
    to navigate these types of data relationships, called `graph database`.


    Another example may help make it easier to understand this capability. Consider
    the diagram in Figure [4-3](#index_split_002.html#p161).


    ![](index-161_1.jpg)


    ***Figure 4-3.  **A graph data model*


    Designing out SQL Server tables to insert data and query on this model is possible
    but not natural for the T-SQL language.


    SQL Server now provides extensions to the T-SQL language to make it possible to
    map models to tables and naturally find `matches` of information from the data.


    Taking this model, I can build new tables that define `nodes` and `edges`. In
    the preceding diagram, the circles represent nodes and the relationships between
    them are edges.


    Here is example T-SQL syntax to create these tables as seen in the sample script
    `graphtables.sql`:


    ```sql

    -- Create a graph demo database

    DROP DATABASE IF EXISTS graphdemo

    GO

    ```'
