  trans: '# 第 9 章 SQL Server 的管理与监控


    单独的服务器。如果数据库和事务日志备份有效，并且按照跨越错误的时间序列进行恢复，但恢复序列中并未显示该错误，那么问题必然出在原始数据库上，表现为损坏的页面，无论是内存中还是磁盘上。


    我实际上曾在多年前遇到过一个客户按照此序列进行操作，恢复序列确实显示了相同的错误。后来发现这是 SQL Server 中的一个漏洞，我们立即找到了并修复了它。


    更常见的情况是，恢复序列并未显示问题。一段时间后，客户会告诉我们，通过更新硬件的驱动程序和固件（或更换硬件组件）问题就解决了。


    ## 对象管理


    与数据库类似，一旦创建了表、索引以及存储过程等服务器端代码，你将不可避免地需要管理这些对象。本节涵盖了一些你可能需要执行的管理任务示例，例如修改表、截断表、处理索引碎片以及修改服务器端代码。


    ## 表的管理


    在本节中，我将讨论管理表的两个方面：通过修改列和属性来更改表；以及截断表，这可能是*清空*表的一种非常高效的方法。


    ### 修改表


    为数据库创建表之后，可能会遇到需要修改表的定义或属性的情况。你当然可以选择复制出表的数据，删除当前表，创建新的表定义，然后再导回数据。


    然而，SQL Server 提供了 `ALTER TABLE` 语句来修改表的定义或属性。修改表最常见的用途之一是更改列。使用 `ALTER TABLE`，你可以在某些限制条件下添加、删除或更改列的定义。不过，对列进行修改会有一些影响。以下是与
    `ALTER TABLE` 一起使用以更改列定义的选项及其影响：


    **ADD <column>:** 你可以向表中添加列，这些列将按顺序定义在表的末尾。你添加的任何列都必须允许 `NULL` 值，或者你必须在添加列时指定一个
    `DEFAULT` 约束，以便为新列的每一行提供默认值。在包含大量数据行的表上添加带有默认值的列可能需要一些时间才能完成（因为这类似于对每一行执行一次 `INSERT`
    操作），并会产生大量的日志记录。


    **ALTER COLUMN <column>:** 你可以更改列的类型及其大小。更改类型必须遵循 SQL Server 可能的数据类型转换规则，这些规则可以在
    [`docs.microsoft.com//sql/t-sql/data-types/data-type-conversion-database-engine`](https://docs.microsoft.com//sql/t-sql/data-types/data-type-conversion-database-engine)
    找到。更改列的大小是可能的，前提是新的大小大于当前定义的大小（例如，你可以将 `varchar(100)` 更改为 `varchar(200)`，但不能更改为
    `varchar(10)`）。


    **DROP COLUMN <column>:** 你可以删除表中的列，但作为约束（如主键）一部分的列除外。你必须先删除这些约束，这也可以通过 `ALTER
    TABLE` 实现。请注意，删除列是完全记录日志的（类似于 `DELETE` 操作），因此在包含大量数据行的表上执行此操作可能需要一些时间，并会产生大量的日志记录。


    你还可以使用 `ALTER TABLE` 调整表的其他一系列属性，例如分区、约束、锁升级和触发器。你可以在 [`docs.microsoft.com/sql/t-sql/statements/alter-table-transact-sql#arguments`](https://docs.microsoft.com/sql/t-sql/statements/alter-table-transact-sql#arguments)
    查看与 `ALTER TABLE` 一起使用的完整选项列表。'
- fmt: '

    # Chapter 9 Managing and Monitoring SQL Server


    By default, an `ALTER TABLE` execution blocks just about every other query (or
    is blocked by other queries). This is because an `ALTER TABLE` by default obtains
    a Schema Modification lock (`Sch-M`). The problem is that even the simplest `SELECT`
    statement requires a Schema Stability Lock (`Sch-S`), which is not compatible
    with a `Sch-M` lock. Fortunately, SQL Server allows some scenarios with `ALTER
    TABLE` to avoid a `Sch-M` lock and allow operations to execute *online* with an
    option called `WITH (ONLINE=ON)` as part of the `ALTER TABLE` syntax. You can
    read more about which operations are allowed to run online with `ALTER TABLE`
    as part of the documentation of the `WITH (ONLINE=ON)` option at [https://docs.microsoft.com/sql/t-sql/statements/alter-table-transact-sql#arguments](https://docs.microsoft.com/sql/t-sql/statements/alter-table-transact-sql#arguments).


    You can read all the details of the `ALTER TABLE` statement in our documentation
    at [https://docs.microsoft.com/sql/t-sql/statements/alter-table-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/alter-table-transact-sql).


    ## Truncating Tables


    Consider a situation where you need to delete all the rows in an existing table.
    Perhaps you are using a table as part of an Extract, Transform, and Load (ETL)
    process. Part of this process requires you to *clear* the table in SQL Server
    and refresh it with new data. You could use the `DELETE` statement, but this can
    be expensive because SQL Server has to log the change of the delete of every row.
    SQL Server does use a process called *ghosted records* to speed up deletes, but
    using a `DELETE` to remove 1 million rows from a table when that is all the rows
    in the table is not efficient.


    Therefore, SQL Server provides the `TRUNCATE TABLE` statement to remove all the
    rows in a table in a much more efficient manner. When you execute a `TRUNCATE
    TABLE` statement, SQL Server will deallocate extents (a collection of eight consecutive
    pages) and only log these deallocations. Therefore a `TRUNCATE TABLE` statement
    is very fast and uses a minimal amount of log space (but can still be run in the
    context of a transaction and therefore be rolled back). In addition, deallocation
    of pages for operations like `TRUNCATE TABLE` are faster because SQL Server uses
    a concept called *deferred drop*. You can read more about deferred drop and logging
    of `TRUNCATE TABLE` from a blog post by Paul Randal at [https://www.sqlskills.com/blogs/paul/a-sql-server-dba-myth-a-day-1930-truncate-table-is-non-logged](https://www.sqlskills.com/blogs/paul/a-sql-server-dba-myth-a-day-1930-truncate-table-is-non-logged).


    You can read more details about how `TRUNCATE TABLE` works, including limits and
    restrictions, in our documentation at [https://docs.microsoft.com/sql/t-sql/statements/truncate-table-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/truncate-table-transact-sql).


    ## Managing Indexes


    Once you have created indexes for your tables, you may decide to create other
    indexes, as I discussed in Chapter 6. In some situations, you may decide a specific
    index choice you originally made doesn’t make sense anymore. In these cases, you
    can use the `DROP INDEX` statement to drop a specific index. Just keep in mind
    that I did recommend in Chapter 6 that in most cases you want a clustered index
    for a table, so if you decide to drop a clustered index you will want to replace
    it with a new clustered index with a different set of columns. This blog post
    is an older but still very appropriate one by

    '
