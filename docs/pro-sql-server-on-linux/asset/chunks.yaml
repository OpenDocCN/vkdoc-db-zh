    对于 HADR，拥有备份策略是根本要求。但你也可以将此次迁移作为一个机会，设置 Always On 可用性组作为新的 HADR 策略。


    ## 使用数据库兼容性级别


    每个 SQL Server 数据库都可以在 SQL Server 的每个版本上以特定的**数据库兼容性**级别运行。当在特定版本的 SQL Server 上创建数据库时，该数据库将采用该
    SQL Server 版本的默认数据库兼容性级别。我不得不承认，数据库兼容性级别的编号系统与 SQL Server 版本的名称相比，可能会有点令人困惑。例如，SQL
    Server 2017 的默认数据库兼容性级别是 140。使用 140 是为了匹配 SQL Server 的版本号。例如，SQL Server 2017 的版本号以
    14 开头，因此兼容性级别与引擎版本**主版本号**相匹配。


    > **注意** 你可以使用 T-SQL 语句`SELECT @@VERSION`或使用 T-SQL 系统函数`@@ServerpropertY`的选项之一（如`productversion`）来查找完整的引擎版本。完整的产品版本由`major.minor.build.revision`号组成。在大多数情况下，我们不使用次版本号（SQL
    Server 2008r2 除外）。`build`对应于 SQL Server 的主要构建发布，如 RTM、累积更新或 GDR。`revision`是内部机制，用于在接近发布
    RTM、累积更新或 GDR 版本时更新构建。


    默认数据库兼容性级别与 SQL Server 版本和发布版本匹配的完整表格记录在以下网址：[`docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-compatibility-level#arguments`](https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-compatibility-level#arguments)。


    随着每个新的 SQL Server 主要版本发布，都会建立一个新的默认数据库兼容性级别。从之前版本恢复的任何数据库都将保留其先前版本的默认数据库兼容性级别。你可能没有意识到，但之前章节中每次恢复`WideWorldImporters`示例时，该数据库都保留了
    130 的数据库兼容性级别。你可以在恢复`WideWorldImporters`后运行以下 T-SQL 语句来查看：


    ```sql

    SELECT name, compatibility_level FROM sys.databases WHERE name = ''WideWorldImporters''

    GO

    ```


    结果应如下所示：


    ```text

    Name                         compatibility_level

    ---------------------------- -------------------

    WideWorldImporters           130

    ```


    你可以使用`ALTER DATABASE` T-SQL 语句来更改兼容性级别。

    '
- fmt: '# Chapter 10 Migrating to SQL Server on Linux


    ## Enabling New Functionality with Database Compatibility


    Some enhancements, typically around query processing, are introduced when using
    a database compatibility level. For example, starting with database compatibility
    level 140, new functionality for query processing is enabled when a database is
    set to this compatibility level. I described this new functionality, called Adaptive
    Query Processing, in Chapter 6. You can expect Microsoft in the future to enable
    new query processing functionality using database compatibility.


    Here are other examples of query processing enhancements introduced with database
    compatibility:


    - **Cardinality estimation**: A new cardinality estimation (CE) model is enabled
    when the database is using compatibility level 120 or later (introduced in SQL
    Server 2014). I discussed the impact of the new CE model in Chapter 6. I’ve also
    mentioned previously in this book that you can revert to the older CE model with
    a database compatibility level of 120 or later if you use the `ALTER DATABASE`
    option called `LEGACY_CARDINALITY_ESTIMATION`.


    - **Query processing fixes**: Database compatibility level 130 includes query
    processing hotfixes that were previously only enabled with trace flag `4199`.
    Database compatibility level 140 includes query processing hotfixes introduced
    in the timeframe between SQL Server 2016 (compatibility level 130) and SQL Server
    2017 (compatibility level 140). I discussed this concept previously in the book,
    but for review you can read more about enabling these fixes at [https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-trace-flags-transact-sql#4199](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-trace-flags-transact-sql#4199).


    - **Parallel bulk operations**: `SELECT INTO` queries for databases under compatibility
    level 120 or higher can run in parallel. `INSERT SELECT` queries for databases
    under compatibility level 130 or higher can run in parallel.


    There are other examples, and you can read through them starting at this place
    in the documentation: [https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-compatibility-level#differences-between-compatibility-level-130-and-level-140](https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-compatibility-level#differences-between-compatibility-level-130-and-level-140).
    This starts a series of tables that describes the differences in behavior between
    compatibility levels.


    ## Using Database Compatibility for Backward Compatibility


    Database compatibility can be used to perform *some* level of protection of backward
    compatibility for queries and functionality of your application. All of the backward
    compatibility differences are listed in the documentation for each compatibility
    level (see the last documentation link I provided previously). Let me give you
    an example.'
