- fmt: "## Chapter 2: Installation and Configuration\n\nSince I used `grep`, the column\
    \ names of the output are not shown. The second column is the process PID and\
    \ the first column is the parent PID. So, process `2548` is the “parent” watchdog\
    \ `SQLSERVR` and `2573` is its “child” process but is the “main” `SQLSERVR`.\n\
    \nIf SQL Server is not running correctly or something failed during the installation,\
    \ consult the “Troubleshooting Install” section in this chapter. The most common\
    \ mistake I see is skipping the step to run the `mssql-conf` script with the `setup`\
    \ option.\n\n### Connect Locally and Run a Query\n\nFollow these instructions\
    \ to use the basic command line tool `sqlcmd` on your Linux server to demonstrate\
    \ you can connect and run a query. `sqlcmd` is a tool that allows you to execute\
    \ T-SQL commands against any installed SQL Server.\n\n1.  Install the packages\
    \ for tools and ODBC for RHEL.\n    **Note** for the full set of instructions\
    \ in our documentation to install our command line tools on all distributions,\
    \ [visit https://docs.microsoft.com/sql/](https://docs.microsoft.com/sql/linux/sql-server-linux-setup-tools).\n\
    \n    ```\n    sudo curl -o /etc/yum.repos.d/msprod.repo https://packages.microsoft.com/config/rhel/7/prod.repo\n\
    \    ```\n\n    The output looks very similar to downloading the repo file for\
    \ `mssql-server`.\n\n    ```\n    sudo yum install -y mssql-tools unixODBC-devel\n\
    \    ```\n\n    There are two packages to install: (1) The command line tools\
    \ and (2) The Linux ODBC package (`sqlcmd` on Linux uses ODBC). This is where\
    \ `yum` really comes in handy, as it will automatically detect the dependency\
    \ upon the `msodbcsql` package. For example:\n\n    ```\n    Loaded plugins: product-id,\
    \ search-disabled-repos, subscription-manager\n    Resolving Dependencies\n  \
    \  --> Running transaction check\n    ---> Package mssql-tools.x86_64 0:14.0.6.0.1\
    \ will be installed\n    -->  Processing Dependency: msodbcsql < 13.2.0.0 for\
    \ package: mssql-tools-14.0.6.0-1.x86_64\n    -->  Processing Dependency: msodbcsql\
    \ >= 13.1.0.0 for package: mssql-tools-14.0.6.0.1-x86_64\n    ---> Package unixODBC-devel.x86_64\
    \ 0:2.3.1-11.el7 will be installed\n    --> Running transaction check\n    --->\
    \ Package msodbcsql.x86_64 0:13.1.9.2-1 will be installed\n    --> Finished Dependency\
    \ Resolution\n    ```\n\n    You will fill out a few prompts for the EULA license\
    \ and the install should be very quick.\n\n2.  Put the tools in your `PATH` to\
    \ make execution easier.\n    Your `PATH` defines directories to search for programs,\
    \ so you don’t have to explicitly put in the path of a program or run it from\
    \ its installed directory. These commands will update the `PATH` for the command\
    \ line tools and write them into files that will specify the `PATH` for any future\
    \ login session.\n\n    ```\n    echo 'export PATH=\"$PATH:/opt/mssql-tools/bin\"\
    ' >> ~/.bash_profile\n    echo 'export PATH=\"$PATH:/opt/mssql-tools/bin\"' >>\
    \ ~/.bashrc\n    source ~/.bashrc\n    ```\n\n3.  Connect using `sqlcmd` and run\
    \ a query.\n\n    ```\n    sqlcmd -Usa\n    ```\n\n    You will be prompted for\
    \ the `sa` password you specified during installation. If you connect successfully,\
    \ you will get a `sqlcmd` prompt that looks as follows:\n\n    ```\n    [thewandog@bwsql2017rhel\
    \ ~]$ sqlcmd -Usa\n    Password:\n    1>\n    ```\n\n    If SQL Server was not\
    \ running, and you tried to connect with `sqlcmd`, you would get an error like\
    \ the following:\n\n    ```\n    Sqlcmd: Error: Microsoft ODBC Driver 17 for SQL\
    \ Server : Login timeout expired.\n    Sqlcmd: Error: Microsoft ODBC Driver 17\
    \ for SQL Server : TCP Provider: Error code 0x2749.\n    Sqlcmd: Error: Microsoft\
    \ ODBC Driver 17 for SQL Server : A network-related or instance-specific error\
    \ has occurred while establishing a connection to SQL Server. Server is not found\
    \ or not accessible. Check if instance name is correct and if SQL Server is configured\
    \ to allow remote connections. For more information see SQL Server Books Online..\n\
    \    ```\n\nOne mistake I’ve seen made by customers is to forget to run `mssql-conf`\
    \ with the `setup` option after executing a `yum install`. The error in Figure\
    \ 2-14 is the same error you will see in this scenario.\n\nNow that you have connected,\
    \ run these two “sanity check” queries:"
