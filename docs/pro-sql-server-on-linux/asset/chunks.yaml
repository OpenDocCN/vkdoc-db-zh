    called  *ghosted records* to speed up deletes, but using a DELETE to remove 1
    million rows


    from a table when that is all the rows in the table is not efficient.


    Therefore, SQL Server provides the **TRUNCATE TABLE** statement to remove all


    the rows in a table in a much more efficient manner. When you execute a TRUNCATE


    TABLE statement, SQL Server will deallocate extents (a collection of eight consecutive


    pages) and only log these deallocations. Therefore a TRUNCATE TABLE statement
    is


    very fast and uses a minimal amount of log space (but can still be run in the
    context


    of a transaction and therefore be rolled back). In addition, deallocation of pages
    for


    operations like TRUNCATE TABLE are faster because SQL Server uses a concept called


    *deferred drop*. You can read more about deferred drop and logging of TRUNCATE
    TABLE


    from a blog post by Paul Randal a[t https://www.sqlskills.com/blogs/paul/a-sql-](https://www.sqlskills.com/blogs/paul/a-sql-server-dba-myth-a-day-1930-truncate-table-is-non-logged)


    [server-dba-myth-a-day-1930-truncate-table-is-non-logged.](https://www.sqlskills.com/blogs/paul/a-sql-server-dba-myth-a-day-1930-truncate-table-is-non-logged)


    You can read more details about how TRUNCATE TABLE works, including limits


    and restrictions, in our documentation a[t https://docs.microsoft.com/sql/t-sql/](https://docs.microsoft.com/sql/t-sql/statements/truncate-table-transact-sql)


    [statements/truncate-table-transact-sql.](https://docs.microsoft.com/sql/t-sql/statements/truncate-table-transact-sql)


    ** Managing  Indexes**


    Once you have created indexes for your tables, you may decide to create other
    indexes,


    as I discussed in Chapter [6. I](#index_split_003.html#p250)n some situations,
    you may decide a specific index choice


    you originally made doesn’t make sense anymore. In these cases, you can use the **DROP **


    **INDEX** statement to drop a specific index. Just keep in mind that I did recommend


    in Chapter [6](#index_split_003.html#p250) that in most cases you want a clustered
    index for a table, so if you decide


    to drop a clustered index you will want to replace it with a new clustered index
    with


    a different set of columns. This blog post is an older but still very appropriate
    one by'
