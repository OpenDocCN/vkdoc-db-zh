- fmt: '# 使用 DAC 和直接访问系统表


    默认情况下，虽然用户可以看到系统表列表，但无法直接读取这些表的内容。您应当使用系统目录视图。


    尝试使用 DAC（专用管理员连接）和非 DAC 连接执行以下 T-SQL 语句：


    ```sql

    USE master

    GO

    SELECT * FROM sys.sysschobjs

    GO

    ```


    `sys.sysschobjs` 是支持 `sys.objects` 等目录视图的系统表之一。


    如果您在未使用 DAC 的情况下运行此查询，会收到以下错误：


    ```

    Msg 208, Level 16, State 1, Server bwsql2017rhel, Line 1

    Invalid object name ''sys.sysschobjs''.

    ```


    然而，如果使用 DAC，您将能够直接读取任何系统表。这是一个巧妙的方法，但老实说，在生产环境中我不认为您有太多必要这样做。它对于学习 SQL Server
    内部原理可能很有趣，但我们并未发布系统表的模式定义。


    > **提示**：您可以通过 `sys.system_sql_modules` 检查系统目录视图的文本，以了解系统表的工作原理。


    您不能通过 DAC 随意执行任何操作。我们设计 DAC 是为了在紧急情况下，让您能够可靠地连接到 SQL Server 并执行关键但最小的操作集。何时应该使用
    DAC？我建议仅在您甚至无法通过 Linux 服务器上的本地 `sqlcmd` 连接到 SQL Server 时才使用 DAC。一旦连接成功，可以查询 DMV（动态管理视图）如
    `dm_exec_requests`，以获取有关正在运行的连接和查询的基本情况。


    使用 DAC 可能解决以下问题场景：


    1.  工作线程数已达到最大值。

    2.  所有工作线程都被一个主导阻塞进程（lead blocker）阻塞。

    3.  该主导阻塞进程不释放其资源。例如，您可能有一个会话启动了事务，运行了获取锁的查询，但从未提交。所有工作线程都可能被阻塞，等待此事务和会话完成。

    4.  由于所有工作线程都处于忙碌状态，SQL Server 无法处理任何新的连接或查询，因为没有可用的工作线程。

    5.  然而，您可以通过 DAC 连接，并使用 T-SQL `KILL` 语句终止主导阻塞进程，从而释放所有被阻塞的工作线程。T-SQL `KILL` 语句需要比通常更高的权限，这理所当然。您可以在[此处](https://docs.microsoft.com/sql/t-sql/language-elements/kill-transact-sql)阅读更多关于
    T-SQL `KILL` 语句以及何时可能适合用于您服务器的场景的信息。


    您可以在[此处](https://docs.microsoft.com/sql/database-engine/configure-windows/diagnostic-connection-for-database-administrators)阅读更多关于
    DAC 的信息，包括其限制以及如何远程连接。


    # sqlservr 命令行选项


    在第 8 章中，我简要介绍了一种使用 `sqlservr` 程序的命令行选项来重建系统数据库的技术。您通常使用 `systemctl` 启动 SQL Server，但
    `sqlservr` 是一个可以直接从 shell 启动的程序。并且有一系列主要未文档化的命令行选项可以与 `sqlservr` 一起使用。您可以通过在 bash
    shell 中运行以下命令来查看列表（如果 SQL Server 正在运行，请务必先停止它）：


    ```bash

    sudo -u mssql /opt/mssql/bin/sqlservr --help

    ```


    您的结果应类似如下：


    ```

    usage: sqlservr [OPTIONS...]


    Configuration options:


    -T<#>                  Enable a traceflag

    -y<#>                  Enable dump when server encounters specified error

    -k<#>                  Checkpoint speed (in MB/sec)


    Administrative options:


    --accept-eula          Accept the SQL Server EULA

    ```'
  raw: 'that while you can see a list of system tables as a user, you cannot by default
    read directly


    from these tables. You should be using system catalog views.


    Try the following T-SQL statements using DAC and with a connection without DAC:


    USE master


    GO


    SELECT * FROM sys.sysschobjs


    GO


    sys.sysschobjs is one of the system tables that powers catalog views like sys.objects.


    When you run this query when not using DAC, you get this error


    Msg 208, Level 16, State 1, Server bwsql2017rhel, Line 1


    Invalid object name ''sys.sysschobjs''.


    However, if you use DAC, you will be able to read any system table directly. It
    is a


    neat trick, but to be honest I don’t see much of a need for you to do this in
    production. It


    can be interesting to use to learn more about SQL Server internals, but we don’t
    publish


    the schema definition for system tables.


    **Tip**  You can examine the text of system catalog views through **sys.system_sql_**


    **modules** to figure out how system tables work.


    You can’t run anything you want over DAC. We built DAC to only have a certain


    set of resources that should reliably allow you to connect to SQL Server in emergency


    situations and perform critical, but minimal operations. When should you use DAC?
    I


    recommend only using DAC when you cannot connect to SQL Server even with a local


    sqlcmd connection on the Linux Server. Once you connect, query DMVs like dm_exec_


    requests to get a basic sense of the connections and queries are running.


    One scenario where you may be able to resolve a problem with DAC is the following:


    1.  The maximum number of worker threads is being used.


    2.  All worker threads are blocked on a lead blocker.


    Chapter 9   Managing and Monitoring SQL Server


    3.  The lead blocker is not giving up its resources. For example, you


    could have a session that starts a transaction, runs queries that


    obtain locks, but never commits. All workers may be blocked


    waiting for this transaction and session to complete.


    4.  Since all worker threads are busy, SQL Server cannot service any new


    connections or queries because there are no worker threads available.


    5.  However, you could connect with DAC and terminate the leader


    blocker using the T-SQL KILL statement, thus freeing up all the


    blocked workers. The T-SQL KILL statement requires higher than


    usual privileges, and rightly so. You can read more about the


    T-SQL KILL statement and scenarios it may make sense to use


    for your server a[t https://docs.microsoft.com/sql/t-sql/](https://docs.microsoft.com/sql/t-sql/language-elements/kill-transact-sql)


    [language-elements/kill-transact-sql.](https://docs.microsoft.com/sql/t-sql/language-elements/kill-transact-sql)


    You can read about more about DAC, including limits and how to connect remotely,


    at [https://docs.microsoft.com/sql/database-engine/configure-windows/](https://docs.microsoft.com/sql/database-engine/configure-windows/diagnostic-connection-for-database-administrators)


    [diagnostic-connection-for-database-administrators](https://docs.microsoft.com/sql/database-engine/configure-windows/diagnostic-connection-for-database-administrators).


    ** sqlservr Command Line Options**


    In Chapter [8](#index_split_005.html#p389) I briefly talked about a technique
    to rebuild system databases that use


    a command line option for the sqlservr program. You typically start SQL Server
    with


    systemctl, but sqlservr is a program that can be launched from the shell directly.
    And


    there are a range of command line options, mostly undocumented, that can be used
    with


    sqlservr. You can see the list by running this command from the bash shell (be
    sure to


    stop SQL Server first if it is already running):


    sudo -u mssql /opt/mssql/bin/sqlservr --help


    Your results should look like the following:


    usage: sqlservr [OPTIONS...]


    Configuration options:


    -T<#>                  Enable a traceflag


    -y<#>                  Enable dump when server encounters specified error


    -k<#>                  Checkpoint speed (in MB/sec)


    Chapter 9   Managing and Monitoring SQL Server


    Administrative options:


    --accept-eula          Accept the SQL Server EULA'
