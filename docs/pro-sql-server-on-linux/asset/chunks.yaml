    ## SQL Server certificate


    The third layer in the encryption hierarchy is a certificate. A certificate will
    be protected by the database master key and is used to encrypt other objects such
    as database encryption keys (used for TDE), backups, and other keys used to encrypt
    columns. You can use SQL Server to create a self-signed certificate or load a
    certificate from a trusted authority. And like the other objects I’ve discussed,
    you should back up any created certificates because you will need to perform operations
    like restoring an encrypted backup. You can read more about SQL Server certificates
    at [CREATE CERTIFICATE (Transact-SQL)](https://docs.microsoft.com/sql/t-sql/statements/create-certificate-transact-sql).


    > **Note**

    > Extensible Key Management (eKM) is not currently supported on SQL Server on
    Linux. Be sure to stay up to date with the release notes for any updates to unsupported
    features at [SQL Server on Linux release notes - Unsupported features](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes#Unsupported).


    Armed with this fundamental knowledge, let’s look at some of the encryption features
    available for SQL Server on Linux.


    ## Transparent Data Encryption


    `TDE` is a feature for SQL Server where data and transaction log files are encrypted
    as they are written to disk. The encryption key (a `database encryption key`)
    to encrypt and decrypt these files is maintained with the master database. This
    allows the database engine to completely access the encrypted data on disk, but
    any program or user outside the engine would not be able to get access to unencrypted
    data.


    ### Chapter 7 Security in SQL Server


    What is really nice about this feature is all the functionality for certificates
    and encryption is built into SQL Server. Here are the basic steps for using `TDE`:


    1.  Create a database master key in the master database using `T-SQL`.

    2.  Create a certificate protected by the database master key using `T-SQL`.

    3.  Create a `database encryption key` for the database you are using `TDE` for,
    protected by the certificate using `T-SQL`. A `database encryption key` is a special
    key used only for `TDE`. You can read more about the use of database encryption
    keys at [CREATE DATABASE ENCRYPTION KEY (Transact-SQL)](https://docs.microsoft.com/sql/t-sql/statements/create-database-encryption-key-transact-sql).

    4.  Use `ALTER DATABASE` to enable `TDE` for the database.


    SQL Server will then start encrypting data in the background to disk. Subsequent
    new writes to disk are encrypted as they are written. One key aspect to using
    this feature is that you should back up the certificate and keys. You will need
    these if you need to attach this database on another server or restore a backup.
    Any backup of the database is also encrypted for a database that has `TDE` enabled.


    You can read more about setting up `TDE` on SQL Server on Linux at [Enable Transparent
    Data Encryption](https://docs.microsoft.com/sql/linux/sql-server-linux-security-get-started#enable-transparent-data-encryption).
    You can also read more about `TDE` in general at [Transparent Data Encryption
    (TDE)](https://docs.microsoft.com/sql/relational-databases/security/encryption/transparent-data-encryption).'
