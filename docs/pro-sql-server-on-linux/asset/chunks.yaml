- fmt: 'configuration details of your instance or databases is very helpful to make
    your migration smoother. However, most users are also concerned about performance
    of queries when migrating to a new version of `SQL Server`, such as `SQL Server
    2017` on `Linux`. The Database Experimentation Assistant (`DEA`) tool can help
    you trace, execute, and compare query workloads between two versions of `SQL Server`.


    Let’s take a look at the capabilities of each of these tools to prepare you for
    migrating your databases to `SQL Server` on `Linux`.


    ## Data Migration Assistant


    The `DMA` tool includes capabilities to check for the compatibility of your configuration
    of `SQL Server`, your database, and `T-SQL` objects such as `stored procedures`
    in your database matched to the target version of `SQL Server` for your migration.


    **Note** For checks on the use of incompatible `t-SQL`, `DMA` can only check objects
    in your database like `stored procedures`. it does not check `t-SQL` compatibility
    of the code in your application.


    In addition, `DMA` can look for possible new features in your target `SQL Server`
    version that you could improve your use of `SQL Server` such as `columnstore indexes`.


    Finally, if the target version of `SQL Server` is `Linux`, `DMA` can check to
    see if you are using a feature that is not supported for `SQL Server` on `Linux`,
    like `SQL Server Replication`.


    Currently, the rules that support compatibility, new features, and feature parity
    are not publicly documented. However, I talked to Venkata Raj Pochiraju and Sreraman
    Narasimhan from the team that built `DMA` and they gave me insight into the type
    of coverage that is supported by `DMA`.


    **Tip** You can gain some insight into how `DMA` checks for compatibility, new
    features, and feature parity by using a tool like `xeprofiler` to trace the queries
    used by `DMA`. i often use `xeprofiler` and `extended events` to “debug” what
    tools do.


    # ChApter 10   MigrAting to SQL Server on Linux


    ### Compatibility Issues


    - Using legacy `T-SQL` statements like `COMPUTE` instead of replacement functionality
    like `T-SQL ROLLUP`

    - The use of older `DBCC` commands like `DBCC DBREINDEX` instead of `ALTER INDEX`.

    - Warnings for the use of older data types like `TEXT` or `IMAGE` instead of using
    the new `varchar(max)` or `varbinary(max)` types.


    ### New Features recommendations


    - Using `columnstore indexes` to accelerate analytic performance

    - Using security features like `Always Encrypted`, `TDE`, and `dynamic data masking`


    ### Feature parity rules


    include a check for any use of the following features, which as of the writing
    of this book are not supported for `SQL Server` on `Linux` (see `https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes#Unsupported`).


    Showing you an example for this tool is more difficult, since I would need to
    show you how to build an `SQL Server` instance on `Windows` and database that
    causes several of these rules to fire. It turns out the `WideWorldImporters` database,
    which was built for `SQL Server 2016`, doesn’t really hit any problems worth calling
    out. I even went back to use the older example database we published for `SQL
    Server 2008`, `AdventureWorks`, and it didn’t really uncover any issues either.


    However, I’ve talked to customers who have found the tool very helpful to assess
    a legacy `SQL Server` and point out possible issues to migrate to `SQL Server`
    on both `Windows` and `Linux`.


    Figure 10-2 shows an example screen you are presented when you build a new `Database
    Migration Assistant` project and choose `SQL Server 2017` on `Linux` as your target.


    ![](index-519_1.jpg)


    **Figure 10-2. Assessment choices for migration to SQL Server on Linux**


    I highly encourage anyone migrating from older versions of `SQL Server` to `SQL
    Server` on `Linux` to use `DMA` and study the results carefully before executing
    the migration. Be'
