    作为选项（对于 Linux 不再处于预览状态）。


    由于以 Linux 上的 `SQL Server` 为目标的 `SSMA` 不支持服务器端迁移，因此 Oracle 服务器和 Linux 上的 `SQL Server`
    不必能够相互通信。`SSMA` `Windows` 客户端会分别连接到每个服务器以传输数据。


