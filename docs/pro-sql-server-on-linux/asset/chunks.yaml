    SQL Server uses several techniques to write database pages to disk. All these
    techniques are based on a similar principal to read-ahead so that databases pages
    that are contiguous are written together, resulting in efficient, larger writes.


    By default, SQL Server 2017 uses a method of writing database pages called `indirect
    checkpoint.` Indirect checkpoint uses a `target recovery time` to make decisions
    on when to collect dirty database pages and write them to the corresponding database
    data file. This concept is to reliably ensure that if the database must be restarted,
    the database can be recovered (transactions rolled forward and rolled back) in
    a known interval of time.


    The target recovery time is configured using the `ALTER DATABASE` T-SQL statement
    using the `TARGET_RECOVERY_TIME` option. The default is one minute. SQL Server
    also offers an option for `automatic checkpoints`, which was the default behavior
    prior to SQL Server 2016. Automatic checkpoints use the `sp_configure` option
    `recovery interval` and can result in I/O write behaviors that are not smooth
    but can have spikes.


    Indirect checkpoints are designed to result in a smoother I/O pattern for writes
    but could have an impact on heavy OLTP type applications. Indirect checkpoints
    are performed by a background task called `RECOVERY WRITER` (you can see this
    background task by looking for the row in `dm_exec_requests` where command = `RECOVERY
    WRITER`).


