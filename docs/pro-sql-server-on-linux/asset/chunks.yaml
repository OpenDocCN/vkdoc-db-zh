    ## Chapter 2: Installation and Configuration


    This chapter provides suggestions on how to test SQL Server capabilities as you
    make decisions on your target SQL Server environment. The last part of this section
    is only for those new to Linux, so you may want to skip the last part if you are
    a Linux guru. I thought it would be helpful for those making a transition from
    Windows to learn from some of the tips I’ve picked up as I made my own transition
    to get comfortable again with navigating Linux.


    ### Linux Distributions


    SQL Server 2017 on Linux is officially supported on the following Linux Distributions
    (these are minimum versions):


    *   Red Hat Enterprise Linux (RHEL) 7.3 and 7.4

    *   SUSE Linux Enterprise Server (SLES) v12SP2

    *   Ubuntu 16.04 LTS


    For future context, RHEL and SLES are considered `RPM-based` distributions although
    each has differences in functionality, and Ubuntu is a `Debian-based` distribution
    (I find this resource to be very valuable when looking at various Linux distributions
    and their history: [https://en.wikipedia.org/wiki/Linux_distribution](https://en.wikipedia.org/wiki/Linux_distribution)).
    This distinction is significant mostly because it affects the package format we
    use for each distribution.


    We are always looking to check on what new versions of these distributions we
    should support, so bookmark this page for the “latest news” on SQL Server for
    Linux: [https://docs.microsoft.com/sql/linux/sql-server-linux-setup](https://docs.microsoft.com/sql/linux/sql-server-linux-setup).


    Your choice of these distributions may be based on your preference or perhaps
    a standard within your company. You should know we have done basic testing on
    other Linux distributions such as CentOS or ORACLE Enterprise Linux (OEL) and
    SQL Server can run on these. However, we are not prepared to say we officially
    support SQL Server on Linux for distributions other than the ones I’ve listed
    here in this section.


    **Note:** We fully support SQL Server on Docker containers, and I’ll cover that
    topic completely in Chapter 11.


    For the sake of consistency, I’m going to do all the demos and examples in this
    book using Red Hat Enterprise Linux. SQL Server runs very well on all three distributions
    and integrates the familiar experience of each. Our documentation has clear examples
    of how to install SQL Server on RHEL, SLES, and Ubuntu.


    ### Installation Recommendations


    I recommend you consult with the documentation and installation guidance of your
    Linux distribution before installing SQL Server, to ensure an optimal experience.
    For example, since SQL Server can be an intensive I/O application, you may want
    to consult with your Linux guide on how to configure your disk for performance
    and durability. Having said that, in Chapter 6, I’ll review with you the Microsoft
    guidance on how to configure Linux and SQL Server for maximum performance with
    both SQL Server and Linux Kernel tuning recommendations based on our experiences
    at Microsoft.


    I do have a few tips on how I install and interact with Linux to use SQL Server:


    *   I never install the GUI. Ubuntu desktop users may prefer the GUI shell and
    SQL Server for developers runs just fine in that environment. I always find myself
    just using the command line `bash` shell or running GUI programs on my Windows
    laptop connected to my Linux Server or VM.

    *   If I’m going to get serious about performance, I always mount a separate drive
    for my database and transaction log files. To make it easier, I usually mount
    `/var/opt` on this separate drive and just use this for the default database directory
    (you will find out you can change this). For serious production scenarios, you
    likely will spread SQL Server database and log files on separate drives and even
    create multiple SQL Server files across drives. There is some very easy to follow
    documentation on how to configure Linux to'
