  trans: '# 第 8 章：SQL Server 的高可用性与灾难恢复


    ## 分布式可用性组


    SQL Server 可用性组（AG）提供了一个独特的概念：分布式可用性组。分布式可用性组是一种特殊类型的可用性组，它横跨两个可用性组。请参考图 8-11，该图可在
    Microsoft 文档中找到：[`docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups#understand-distributed-availability-groups`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups#understand-distributed-availability-groups)。


    其概念是，可用性组 `AG1` 的辅助副本和可用性组 `AG2` 的主副本都从 `AG1` 的主副本接收更新。分布式可用性组为多站点远程配置（例如在远程地点设有数据中心的组织）提供了
    AG 功能。有关在不同场景下使用分布式可用性组的更多信息，请查看我们的文档：[`docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups#distributed-availability-group-usage-scenarios`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups#distributed-availability-group-usage-scenarios)。


    ## 设置与配置


    设置用于高可用性和数据保护的可用性组，其高层步骤如下（请参阅文档：[`docs.microsoft.com/sql/linux/sql-server-linux-availability-group-configure-ha`](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-configure-ha)）。


    *   与 Windows 上不同，您无法在安装了 FCI 的 SQL Server 实例上设置 AG。这是我们未来可能考虑支持的一个选项，但对于 SQL
    Server 2017 尚不支持。

    *   由于 `STONITH` 和隔离机制的工作方式，您不应将异步副本包含在 `Pacemaker` 集群中。我将在本章后面部分向您展示如何将 AG 副本添加到集群中。请勿将异步副本添加到集群，因为当
    `STONITH` 启用时，集群会遇到问题。这不会影响集群操作，因为您无法自动故障转移到异步副本。

    *   集群的大多数操作无法通过 `T-SQL` 完成，例如手动故障转移操作。您必须使用 `Pacemaker` 命令，我将在本章后面部分向您展示如何操作。此规则的一个例外是
    `强制故障转移`。对于这种情况，您将使用 `T-SQL`，这在我们的文档中有描述：[`docs.microsoft.com/sql/linux/sql-server-linux-availability-group-failover-ha`](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-failover-ha)。


