    关于未公开的 `dBCC 命令`，它允许进行“位修复”。


    但是，请不要依赖于此。我们并未真正测试这个命令（它可能导致服务器崩溃或造成无法修复的损害），它需要大量时间来使用，需要深入了解 SQL Server 的内部页面结构（这些结构我们未提供文档，且随着时间推移已经并将继续发生变化），并且我们可能随时移除它。


    ## 紧急模式修复


    请考虑前述图示（图 9-3）中名为 SUSPECT 的数据库状态。SQL Server 已尝试运行恢复，但发生了不可恢复的故障（例如，事务日志文件损坏）。在
    Paul 加入 Microsoft 之前，这是我需要帮助客户处理的最棘手的情况之一。Paul 在 SQL Server 2005 中引入了一个称为 `紧急模式修复`
    的概念。这个概念是通过 `ALTER DATABASE <dbname> SET EMERGENCY` 将数据库状态更改为 EMERGENCY。


    这将允许你访问数据库，然后使用 `REPAIR_ALLOW_DATA_LOSS` 选项运行 `DBCC CHECKDB`。SQL Server 会识别出事务日志不可访问，并将
    `重建事务日志` 并运行恢复。Paul 在这篇博文中描述了该过程：https://www.sqlskills.com/blogs/paul/checkdb-from-every-angle-emergency-mode-repair-the-very-very-last-resort。


    这听起来相当容易且简单，确实如此。但问题在于。由于事务日志必须被重建，你无从知晓日志中有哪些需要前滚或回滚的事务。因此，即使 `DBCC CHECKDB`
    显示 `干净`，你的数据库也可能很容易出现逻辑不一致（例如，想象一下意外将 100 万美元贷记到一个银行账户，它可能就在那里但你不知道！）。


    这就是为什么它是最后手段，并且绝对不能替代从一个良好备份进行还原。尽管有这些警告，我在 Microsoft 支持部门工作时经常发现自己使用这种技术，因为这些客户没有有效的备份可以还原。


    关于使用数据库的 `EMERGENCY` 状态，我还有另一个评论。虽然你可以使用紧急模式修复选项，但我见过其他情况，将数据库状态设置为 `EMERGENCY`
    允许我访问数据库并复制出（例如使用 `bcp`）关键表给业务部门。请将此记住，作为你数据库挽救工具箱中的一部分。


    ## 使用 CONTINUE_AFTER_ERROR 进行还原


    我在第 8 章提到过，如果备份是使用 `WITH CHECKSUM` 选项创建的，并且在备份介质本身上发生了校验和错误，那么备份还原将会失败。


    在那个神奇的 SQL Server 2005 可支持性发布版本中，我们为 `RESTORE` 增加了一个名为 `CONTINUE_AFTER_ERROR`
    的选项。在大多数情况下，即使发生错误（如校验和错误），此选项也允许 `RESTORE` 完成。此时，数据库是否能用或可挽救完全就像“抛硬币”一样不确定。然而，有可能只有备份介质的一小部分（甚至单个位）存在问题，因此这个选项可能帮助你恢复数据库的大部分内容。


    ## 查找损坏原因


    多年来，我在 Microsoft 支持部门处理涉及数据库损坏的客户案例时，总是（并且理所当然地）被问到“这是什么原因造成的？”。我从 25 年的经验可以告诉你，数据库损坏的首要原因是系统问题，大多数情况下来自
    I/O 系统。


    这里有一个有趣的技术可以帮助你证明这一点。如果你运行 `DBCC CHECKDB` 时遇到校验和错误，并且有一系列跨越问题时间段的数据库和事务日志备份，请将它们还原到不同的系统上进行分析。

