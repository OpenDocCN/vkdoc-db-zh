    availability, and I’ll discuss those in more detail in Chapters 7 and 8.


    ## Command Line Tools


    Tools that are run from the command line are simple but essential. I recommend
    you understand the command line tools that are available with `SQL Server`, because
    they provide the simplest, lightest method to interact with `SQL Server`.


    **Tip** Tools with graphical user interfaces such as `SSMS` provide powerful capabilities.
    But `SSMS` has more moving parts than a tool like `sqlcmd`. If someone said they
    were having problems connecting with `SSMS` on a `Windows` computer to `SQL Server`
    on `Linux`, I would ask whether they could connect with `sqlcmd` on the `Linux`
    server locally. This narrows down any problems with the graphical tool and networking
    issues.


    The Microsoft strategy for command line tools is to ensure they are available
    on common client platforms including `Windows`, `Linux`, and `macOS` and in some
    cases make them an open-source project on GitHub.


    In this section I’ll talk about the following tools:


    - `sqlcmd` (I showed you how to install and use some basics for this tool in Chapter
    2.)

    - `bcp`

    - `mssql-cli`

    - `mssql-scripter`

    - `sqlservr` command line options


    One tool not listed in this section is called `DBFS`, which will be covered in
    a later section on tools built inside the engine. A nice blog post written by
    `SQL Server Linux` expert Anthony Nocentino on `DBFS` can be found at [www.centinosystems.com/blog/sql/dbfs-command-line-access-to-sql-server-dmvs](http://www.centinosystems.com/blog/sql/dbfs-command-line-access-to-sql-server-dmvs).
    To keep track of all future advances in command line tools, refer to our documentation
    at [https://docs.microsoft.com/en-us/sql/tools/overview-sql-tools](https://docs.microsoft.com/en-us/sql/tools/overview-sql-tools).


    ## sqlcmd


    `SQL Server` has always provided a simple command line tool to submit `T-SQL`
    queries against the database engine. The evolution of these tools started with
    `isql.exe` and `osql.exe` for `Windows`, but in recent years we released a tool
    called `sqlcmd.exe`. This tool is compiled natively for `Windows`, `Linux`, and
    `macOS` and can be used as a client against any `SQL Server` for `Windows` or
    `Linux` (for example, you could connect with `sqlcmd` on a `Linux` client to a
    `SQL Server` on `Windows`). On all platforms, `sqlcmd` uses the `Microsoft ODBC
    driver for SQL Server` native to that operating system.


    `sqlcmd` is installed by default when you install `SQL Server` on `Windows`. For
    `SQL Server` on `Linux`, you must install a separate package called `mssql-tools`
    (with a dependency on `ODBC for Linux`) as documented at [https://docs.microsoft.com/sql/linux/sql-server-linux-setup-tools](https://docs.microsoft.com/sql/linux/sql-server-linux-setup-tools).
    For `macOS`, we use [Homebrew](https://brew.sh) to install the tools and `ODBC`
    drivers, as documented at [https://docs.microsoft.com/sql/linux/sql-server-linux-setup-tools#macos](https://docs.microsoft.com/sql/linux/sql-server-linux-setup-tools#macos).


    `sqlcmd` offers two modes of execution: *interactive* or *script execution*. Either
    mode'
