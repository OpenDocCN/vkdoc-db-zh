    除非你确实遇到同步更新统计信息导致特定查询集出现性能问题的情况。根据我的经验，宁愿让某个特定查询在统计信息更新时等待（因为该查询会受益），也比异步更新统计信息要好。


    ## ChapTer 6   performanCe CapabILITIeS


    一些客户发现，即使将此数据库选项设置为自动更新统计信息，对于他们的工作负载来说频率也不够（而且你无法更改频率阈值）。因此，你始终可以选择使用 T-SQL 语句
    `UPDATE STATISTICS` 或系统存储过程 `sp_updatestats`。我见过一些客户安排作业频繁运行这些命令，以确保统计信息及时更新。这里存在一个权衡。如果统计信息被修改，SQL
    Server 可能在统计信息更新后下一次执行查询时选择重新编译查询计划。因此，频繁更新统计信息可能导致大量的查询重编译，这总体上可能对你的应用程序造成性能问题。


    **提示**  如果你有一个维护窗口（比如每周一次），可以在其中使用 `WITH FULLSCAN` 更新所有统计信息，那就去做吧！之后你会得到一些重编译，但可能会产生最佳的查询计划。大多数客户无法承担这样做，因此需要在让
    SQL Server 通过自动机制更新统计信息与选择一些对你的应用程序至关重要的统计信息进行手动更新之间取得平衡。


    你可以在我们的文档中阅读更多关于手动更新统计信息的内容：[`docs.microsoft.com/sql/t-sql/statements/update-statistics-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/update-statistics-transact-sql)。


    正如我已经提到的，可以在索引之外创建统计信息。幸运的是，SQL Server 有一个名为 `AUTO_CREATE_STATISTICS` 的数据库选项，该选项在你创建的所有数据库中默认是开启的。启用此选项后，SQL
    Server 中的查询优化器将在那些尚未成为索引中统计信息或另一统计信息一部分的列上创建统计信息。我强烈建议你保持此选项启用。你可以通过查询系统目录视图来判断哪些统计信息是由
    SQL Server 自动创建的，如我们的文档所述：[`docs.microsoft.com/sql/relational-databases/statistics/statistics`](https://docs.microsoft.com/sql/relational-databases/statistics/statistics)（我们使用
    `_WA` 前缀命名这些统计信息）。


    **提示**  运行基准测试时，使用 `sp_createstats` 存储过程在尚未有统计信息的列上创建统计信息，而不是等待优化器自动创建统计信息。


    ## ChapTer 6   performanCe CapabILITIeS


    ### 基数估计


    保持统计信息最新和准确的一个关键原因是*基数估计*的概念。基数在 SQL Server 查询处理中指的是给定行集的唯一值数量。SQL Server 在编译查询计划时估计基数，以决定如何构建计划。这可能是决定是否使用索引、连接顺序以及其他决策。


    对基数估计最直观的查看来自查看查询的 XML SHOWPLAN，并查看 XML 计划中的 `EstimateRows`。在某些情况下，如果 `EstimateRows`
    与 `ActualRows` 不同，SQL Server 可能会编译一个非最优的查询计划。虽然不准确的统计信息可能是导致这些数字偏差的原因，但在某些查询模式中，SQL
    Server 可能需要对基数估计进行*猜测*（猜测意味着使用代码中的固定数字）。这些情况包括统计信息缺失、使用表变量、局部变量和其他查询谓词。

