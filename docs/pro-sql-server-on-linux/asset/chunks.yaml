- fmt: 'configuration exists on Linux, it is very possible to leave `max server memory`
    to 0. SQL Server also has a floor, under which SQL Server will not shrink its
    memory footprint.


    You can configure this setting with the `min server memory` setting with `sp_configure`.
    I typically only use the `min server memory` setting on servers where I have other
    programs running so I can “lock in” SQL Server from shrinking its memory too low.


    ## ChapTer 6   performanCe CapabILITIeS


    ### Note


    The `memorylimitmb` value does not account for memory needed by components outside
    the SQL Server engine, such `SQL Server agent`, the `SQLpaL`, and `host extension`.
    `SQL paL` and `host extension` should not require that much memory outside the
    SQL Server engine. for `SQL Server agent`, you should perform testing to see how
    much memory agent jobs require.


    For complete details on these server memory configuration options, see our documentation
    at [https://docs.microsoft.com/sql/database-engine/configure-windows/server-memory-server-configuration-options](https://docs.microsoft.com/sql/database-engine/configure-windows/server-memory-server-configuration-options).


    ### Parallel Execution


    I discussed in the previous section of this chapter the various scenarios where
    SQL Server will execute tasks in parallel. Two instance configuration settings
    that are available through the `sp_configure` system procedure are: `max degree
    of parallelism` and `cost threshold for parallelism`.


    `max degree of parallelism` is used to control the maximum number of parallel
    tasks that will be used for operators in a query plan, index build operations,
    `DBCC CHECKDB`, parallel inserts, `online column modifications`, and `statistics
    updates`. The default value is 0, which means SQL Server determines the best number
    of concurrent parallel tasks to use for a specific operation based on available
    CPUs to SQL Server.


    The ideal setting for this configuration value has been a long debate in the SQL
    Server community. One of the problems with finding an ideal value is that different
    workloads may work better with higher values of `max degree of parallelism`. For
    example, data warehouse workloads using `columnstore indexes` may achieve maximum
    performance with a higher number of parallel tasks. For SQL Server applications
    with a high number of concurrent users, especially ones that include `OLTP workloads`,
    it may be necessary to change the default of `max degree of parallelism`. My experience
    and testing shows this is only necessary when SQL Server is configured to run
    on servers with greater than eight CPUs. When I was in technical support at Microsoft,
    we created the following Knowledge Base Article to give more guidance on setting
    `max degree of parallelism`: [https://support.microsoft.com/help/2806535/recommendations-and-guidelines-for-the-max-degree-of-parallelism-confi](https://support.microsoft.com/help/2806535/recommendations-and-guidelines-for-the-max-degree-of-parallelism-confi).
    If you struggle with setting this value, take heart that there are database options
    and query level hints available to override this SQL Server instance setting.
    For more details on the `max degree of parallelism` option, see our documentation
    at [https://docs.microsoft.com/sql/database-engine/configure-windows/configure-the-max-degree-of-parallelism-server-configuration-option](https://docs.microsoft.com/sql/database-engine/configure-windows/configure-the-max-degree-of-parallelism-server-configuration-option).


