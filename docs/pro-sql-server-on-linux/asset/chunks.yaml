    # 第 9 章


    ## SQL Server 的管理与监控


    接下来我们将进入下一章，讨论在 Linux 上监控和管理 SQL Server 的重要概念。


    通过阅读本书的前八章，您已学习了在 Linux 上安装 SQL Server、部署数据库和应用程序所需的基础知识，并通过了解我们的工具、性能、安全性和高可用性的基本原理，为成功奠定了基础。


    部署使用 SQL Server 的应用程序是一回事，但管理、维护和监控 SQL Server 的关键方面又是什么呢？这正是本章的主题。


    公平地说，我在本书中已经涵盖了管理和监控的一些方面，包括关于工具、性能和高可用性的章节（当然，学习如何备份和还原数据库是管理 SQL Server 的一个关键方面）。


    本章通过涵盖我之前未讨论过的主题——如何管理 SQL Server 实例、您的数据库以及数据库中的对象——来扩展这些知识。


    在本章的第二部分，我将讨论监控 SQL Server，包括以下主题：


    - 监控 SQL 性能

    - 使用一个强大但鲜为人知的功能——系统运行状况会话——来监控 SQL Server 运行状况

    - 学习一种监控事务日志备份的创新方法

    - 我喜欢用于监控性能的 Linux 工具回顾

    - 排查 SQL Server 问题的独特之处


    © Bob Ward 2018


    B. Ward, *Pro SQL Server on Linux*, `doi.org/10.1007/978-1-4842-4128-8_9`


    第 9 章 SQL Server 的管理与监控


    当您开始阅读有关 SQL Server 实例、数据库和对象的管理部分时，请务必记住我从 SQL Server 经验中学到的一个重要教训：*测试您的管理策略*。大多数开发人员会专注于测试应用程序，这对于成功部署至关重要，但通常我看到管理任务，比如重建索引，从未经过测试。在您最大的表上重建索引需要多长时间？除非您测试，否则不会知道。除了测试之外，对于对
    SQL Server 实例配置、数据库、对象或 Linux 操作系统进行的任何更改，请务必有一个定义明确的*变更控制和审计流程*。根据我的经验，了解谁以及对生产
    SQL Server 环境做了什么更改非常重要，尤其是在排查问题并试图回答不可避免的问题“发生了什么变更？”时。


    我必须承认，编写本章让我感到很有趣，因为它包含了我在微软参与 SQL Server 项目的有趣历史，以及我与一些我所认识的最聪明的人进行的互动，共同构建了丰富的管理和监控
    SQL Server 的功能。


    ## 管理 SQL Server 实例


    SQL Server 提供了丰富的功能，用于在部署后管理 SQL Server 实例，使用诸如 `mssql-conf`、T-SQL 语句 `ALTER SERVER
    CONFIGURATION` 以及系统存储过程 `sp_configure` 等工具。我们构建 SQL Server 的初衷是让您在安装后无需花费大量时间配置实例，但大多数生产环境都需要进行一些对其应用程序有意义的配置更改。我在本书前面的章节中已经讨论过这些功能和选项。为了完整性，我在本章此节中再次简要列出了这些功能。


    此外，在本节中，我将花时间讨论本书目前尚未提及的 SQL Server 实例配置选项，包括：


    - 创建 SQL Server 代理作业

    - 使用资源调控器控制用户的资源使用

    - 在紧急情况下使用专用管理员连接

    - 在特殊场景下使用 `sqlservr` 命令行


    ## 更改服务器配置选项

    '
- fmt: '# Managing and Monitoring SQL Server


    ## Methods to Change SQL Server Instance Configuration


    I’ve discussed in previous chapters three methods to change the default configuration
    of the SQL Server instance. I’ve included this list purely as a review to ensure
    you know what options exist for SQL Server instance configuration:


    ### mssql-conf


    `mssql-conf` is a bash shell script used for configuration options that cannot
    be done through a T-SQL connection. I’ve shown you several examples in the book,
    but the full list of options can be found at [https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf).
    I recommend anytime you use this feature, you create a script and track all executions
    for change control.


    ### ALTER SERVER CONFIGURATION


    `ALTER SERVER CONFIGURATION` is a T-SQL statement used to make instance level
    configuration changes. I’ve shown you in past chapters two examples for this statement:
    `PROCESS AFFINITY` and `SOFTNUMA`. A complete list of options for this statement
    can be found at [https://docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql).


    ### sp_configure


    `sp_configure` is a system stored procedure used to modify various types of instance
    level configuration options. I showed you in previous chapters some of the more
    important options related to performance, security, and high availability. There
    are other options, but the ones I’ve covered so far in the book I consider the
    most important. The complete list of options for `sp_configure` can be found at
    [https://docs.microsoft.com/sql/database-engine/configure-windows/server-configuration-options-sql-server](https://docs.microsoft.com/sql/database-engine/configure-windows/server-configuration-options-sql-server).
    The documentation talks about how some configuration options require a restart
    of SQL Server. All options require the T-SQL statement `RECONFIGURE` to take effect.


    > **Note:** I also covered in previous chapters the `ALTER DATABASE SCOPED CONFIGURATION`
    T-SQL statement that allows you to configure options at the database level that
    are normally reserved for an instance level modification.


    ## Creating an SQL Server Agent Job


    SQL Server Agent is a scheduling service that is installed when you deploy SQL
    Server on Linux. SQL Server Agent provides the capabilities to create *jobs* and
    then schedule the execution of jobs with various frequency options. Jobs execute
    via a series of *job steps*. A job step defines a specific set of T-SQL statements
    to execute in the job.


    > **Note:** SQL Server agent before SQL Server 2017 CU4 required a separate package.
    Starting with 2017 CU4, SQL Server agent is bundled with the `mssql-server` package.
    In addition, SQL Server on Linux only offers a job step that includes a set of
    T-SQL statements. SQL Server on Windows includes several *subsystems* that support
    other types of job steps.


    The first step to be able to use SQL Server Agent is to enable this as a feature,
    using `mssql-conf` by running the following commands from the bash shell:


    ```bash

    sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

    sudo systemctl restart mssql-server

    ```


    At this point, you can now create SQL Server Agent jobs via T-SQL system stored
    procedures (e.g., `sp_add_job`), with an extension to SQL Operations Studio, or
    with SQL Server Management Studio (SSMS).


    Our documentation has a very nice example of creating a job via the T-SQL system
    stored procedures to back up a database on a daily basis, at [https://docs.microsoft.com/sql/linux/sql-server-linux-run-sql-server-agent-job#create-a-job-with-transact-sql](https://docs.microsoft.com/sql/linux/sql-server-linux-run-sql-server-agent-job#create-a-job-with-transact-sql).


    An example of using SSMS to create a job can be seen at [https://docs.microsoft.com/sql/linux/sql-server-linux-run-sql-server-agent-job#create-a-job-with-ssms](https://docs.microsoft.com/sql/linux/sql-server-linux-run-sql-server-agent-job#create-a-job-with-ssms).


    Figure 9-1 shows an example of using the SQL Agent extension in SQL Operations
    Studio to create a new job.


    ![Figure 9-1. Using SQL Operations Studio to create an SQL Agent job](index-461_1.jpg)


    Since SQL Server Agent supports jobs that can execute any T-SQL statement or set
    of statements in a series of steps, you can use SQL Server Agent to perform any
    task you want to run on a schedule or ad hoc basis.


    Linux users may just prefer to use the `cron` system ([https://en.wikipedia.org/wiki/Cron](https://en.wikipedia.org/wiki/Cron))
    to schedule commands that can execute T-SQL commands using a program like `sqlcmd`
    to execute T-SQL scripts. My recommendation is that if you just need to run T-SQL
    statements for any application need or task, use SQL Server Agent. If you need
    to run other Linux commands or shell scripts with T-SQL scripts together as a
    unit, I would use `cron`.


    ## Using Resource Governor


    There could be scenarios where you want to control the resources of users and
    queries for applications for SQL Server related to CPU, memory, and I/O. SQL Server
    provides a feature to control these resources called *Resource Governor*. Resource
    Governor consists of the following objects:


    ### Resource Pool


    A resource pool defines the constraint specified on physical resources such as
    CPU, memory, and I/O. Two pools come with SQL Server installed:

    1.  `internal`, which is used for background and system tasks and worker threads
    for SQL Server.

    2.  `default`, which is a predefined pool for user tasks that is the “default”
    if no user-defined pools are created.


    You can create your own user-defined resources pools through T-SQL. You can read
    more about resource pools at [https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-resource-pool](https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor-resource-pool).


    > **Note:** You can change the settings for the default pool, but you cannot change
    the settings for the internal pool.


    Here are some of the properties for a resource pool you can configure:

    - `CAP_CPU_PERCENT`: Workload group users (described later) associated with this
    pool will be capped for CPU utilization for any SQL Server worker thread usage.

    - `MAX_MEMORY_PERCENT`: Workload group users associated with this pool will be
    capped on memory grants (hashes, sorts, …) related to query execution. This setting
    does not affect memory allocated for buffer pool or any other cache.

    - `AFFINITY`: This is an interesting setting. Using this setting for NUMA node(s)
    and CPU(s) will direct any workload group user associated'
