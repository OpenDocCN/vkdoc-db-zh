- fmt: "# 在 Linux 上还原 SQL Server 数据库\n\n使用 T-SQL RESTORE 命令可以从任何能连接到 SQL Server on\
    \ Linux 的有效工具中执行。\n\n`Note`：数据库备份的元数据中存储了文件的路径。因此，你必须始终使用 T-SQL `RESTORE` 语句的\
    \ `WITH MOVE` 选项，将数据库和事务日志文件移动到它们的新位置。并且，新位置必须设置为允许 Linux 上的 `mssql` 用户帐户访问。\n\
    \n尽管我在前面的章节中已经展示过这个例子，但让我们再次回顾一下将 `WideWorldImporters` 示例数据库还原到 SQL Server on\
    \ Linux 的过程。\n\n## 第 10 章：迁移到 SQL Server on Linux\n\n1.  使用 bash shell 中的以下命令，在\
    \ Linux 服务器上复制 `WideWorldImporters` 示例数据库：\n    ```\n    wget https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak\n\
    \    ```\n\n2.  运行以下命令，这些命令来自示例脚本 `cpwwi.sh`，用于将备份复制到 `/var/opt/mssql` 目录：\n \
    \   ```\n    sudo cp WideWorldImporters-Full.bak /var/opt/mssql\n    sudo chown\
    \ mssql:mssql /var/opt/mssql/WideWorldImporters-Full.bak\n    ```\n\n3.  从任何有效的\
    \ SQL Server 工具运行以下命令来还原数据库，该命令来自 `restorewwi_linux.sql`（注意：我提供了一个 bash shell\
    \ 脚本 `restorewwi.sh` 来使用 `sqlcmd` 在 Linux 服务器上运行此 SQL 脚本）：\n    ```\n    restore\
    \ database WideWorldImporters from disk = '/var/opt/mssql/WideWorldImporters-Full.bak'\
    \ with\n    move 'WWI_Primary' to '/var/opt/mssql/data/WideWorldImporters.mdf',\n\
    \    move 'WWI_UserData' to '/var/opt/mssql/data/WideWorldImporters_UserData.ndf',\n\
    \    move 'WWI_Log' to '/var/opt/mssql/data/WideWorldImporters.ldf',\n    move\
    \ 'WWI_InMemory_Data_1' to '/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1'\n\
    \    go\n    ```\n\n还原操作将执行并运行一系列 `upgrade steps`，通常是针对新版本 SQL Server 所需的系统表更改，以完成数据库还原，因为\
    \ `WideWorldImporters` 示例是使用 Windows 上的 SQL Server 2016 备份的。\n\n`RESTORE` 执行的输出应类似于以下内容：\n\
