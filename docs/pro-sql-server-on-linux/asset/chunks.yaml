- fmt: '# Bob Ward


    25 years on every version of SQL Server shipped from OS/2 1.1 to SQL Server 2017
    including Linux. He has worked in customer support as a principal escalation engineer
    and Chief Technology Officer (CTO), interacting with some of the largest SQL Server
    deployments in the world. Bob is a well-known speaker on SQL Server, often presenting
    talks on new releases, internals, and performance at events such as SQL PASS Summit,
    SQLBits, SQLIntersection, Red Hat Summit, Microsoft Inspire, and Microsoft Ignite.
    You can find him on twitter at `@bobwardms`, read his blog posts at [http://aka.ms/bobsql](http://aka.ms/bobsql)
    or [http://aka.ms/sqlblog](http://aka.ms/sqlblog), or see his demos on `http://aka.ms/sqlchannel`.


    xv


    ![](index-15_1.jpg)


    ## About the Technical Reviewer


    **Anthony Nocentino** is the Founder and President of Centino Systems as well
    as a Pluralsight Author, a Microsoft Data Platform MVP, and SQL Server and Linux
    Expert. In his consulting practice, Anthony designs solutions, deploys the technology,
    and provides expertise on system performance, architecture, and security. Anthony
    has a Bachelors and Masters in Computer Science, with research publications in
    machine virtualization, high performance/low latency data access algorithms, and
    spatial database systems. You can find Anthony on Twitter at `@nocentino` and
    his blog at `www.centinosystems.com/blog/`.


    xvii


    ## Acknowledgments


    There are so many I want to thank as part of my journey authoring this book. I
    would like to first give thanks and glory to my Lord and Savior Jesus Christ.
    My faith is the foundation of my life and I strongly believe God gives all of
    us our abilities. Next, I must call out my incredible wife, Ginger Ward, who has
    been so patient and encouraging throughout my authoring experience. She has listened
    to all of my complaints, fears, joys, and put up with all of my late nights authoring
    this book. She made many long drives in the car on trips we made together, letting
    me work on pieces of the book in the passenger seat of her Land Rover. I also
    want to thank my two sons, Troy and Ryan Ward, who give me inspiration every day
    to be a husband, father, and man of conviction, responsibility, and integrity.


    There is no way I would have ever produced this book without Jonathan Gennick
    from Apress. Jonathan, thank you for taking a chance on this book and me when
    no other publisher would accept it. Speaking of people who made this book possible.
    I have to call out the incredible job of Anthony Nocentino, my technical reviewer.
    Anthony brought to the table a vast knowledge of Linux and SQL Server, and without
    that I’m not sure the book would be anything like the final version. Anthony also
    did an amazing job of turning around reviews quickly, even as we were meeting
    tight deadlines. What I loved the most about Anthony’s style as a reviewer is
    that he was just as transparent calling out what he loved about the book as he
    did with pointed, truthful statements on what changes he thought needed to be
    made. Anthony, thanks for encouraging me throughout the entire journey. I also
    want to personally think Jill Balzano from Apress who kept me sane and organized
    during writing of the book, coordinating my writing with Anthony and Jonathan’s
    reviews. Jill is not only nice but an amazing professional!


    I also want to thank several people at Microsoft who helped review parts of the
    book and were so kind and professional to answer my questions, including Slava
    Oks, Robert Dorr, Scott Konersmann, Pradeep M M, Jason Roth, Travis Wright, Prasad
    Tammana, Mihaela Blendea, Vin Yu, Rathijit Sen, Brian Gianforcaro, Jamie Reding,
