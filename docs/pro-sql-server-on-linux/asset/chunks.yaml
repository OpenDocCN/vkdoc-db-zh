    ## Always On Availability Groups


    While `Always On FCI` is a great technology to protect the high availability of
    the SQL Server instance, there are two shortcomings to this approach:


    *   Storage becomes a central point of failover, so you need to have another solution
    (perhaps hardware) to protect from data storage outages.

    *   Other SQL Server instances in the cluster cannot actively be used, since only
    one SQL Server can access databases on the shared storage at one time.


    ### Chapter 8 High Availability and Disaster Recovery for SQL Server


    SQL Server offers another feature as an alternative called **Always On Availability
    Groups**. I’ll often use the term **AG(s)** for Always On Availability Groups
    for the rest of the chapter. An `AG` provides fault tolerance and high availability
    at the database level and provides for greater access to data. In this section
    of the chapter, I’ll discuss how the technology works and provide you a detailed
    walkthrough on how to setup, configure, and test an `AG`.


    I’ll also discuss other aspects to `AGs`, which include database health detection,
    performance considerations, how data can be read on other nodes, automatic repair
    capabilities, and new functionality that does not require cluster software. For
    those of you who have used SQL Server `AGs` on Windows, the core functionality
    is the same, but the configuration and setup and a few behavior differences exist
    on Linux. I’ll do my best to distinguish those during the rest of the chapter.


    ## How it Works


    The journey for `AGs` started back in SQL Server 2005 with a feature called `Database
    Mirroring`. In SQL Server 2012 we made some fairly major revisions to that original
    architecture and launched the Always On family, including `FCI` and `Availability
    Groups` (we had `FCI` before but did not call it Always On).


    Like `Database Mirroring`, an `AG` does not require a shared storage architecture
    and instead tracks changes in the transaction log and transmit these changes to
    other SQL Server instances.


    An `AG` consists of one or more databases that are replicated to one more of SQL
    Servers and is a unit of failover. The original SQL Server where transactions
    begin is called a **primary replica**. A SQL Server receiving changes is called
    a **secondary replica**. You will see that for SQL Server on Linux, a third type
    of replica is required when clustering is introduced with the `AG`, called a **configuration
    replica**.


    As it turns out all the software components to support an `AG` are in SQL Server
    itself. In order to support the concept of an automatic failover with an `AG`,
    clustering software comes into play. For Windows, that software is `WSFC`. For
    SQL Server on Linux, similar to an `FCI` as described in the previous section,
    the `Pacemaker` software stack is used.


    Our documentation has a very good visualization to show you how the various pieces
    of SQL Server support the fundamentals of replicas in an `AG`. Consider the diagram
    in Figure [8-10](#index_split_006.html#p427).


    ![](index-427_1.jpg)


    ### Chapter 8 High Availability and Disaster Recovery for SQL Server


    **Figure 8-10** The architecture and data synchronization flow of an Always On
    Availability Group


    As you can see in this diagram, SQL Server will capture transaction log changes
    on a Primary and transmit them over a separate communication channel (called a
    `Database Mirroring endpoint`) to the Secondary replica. On the Secondary replica,
    the changes are first hardened to the local transaction log and then separately
    any necessary redo recovery operations are applied. And one of the great advantages
    of an `AG` because this is not a shared storage solution, is that connections
    can be made to the secondary replica and data can be read after redo recovery
    is applied to the changes. You can read'
