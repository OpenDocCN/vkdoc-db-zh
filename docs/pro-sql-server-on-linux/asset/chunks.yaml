    如果名为 `newuser` 的用户不是数据库所有者，那么该用户能做什么？此登录名和用户现在拥有什么权限和访问权限？我将在后面的章节中介绍这一点。首先，我想向你展示一种不同的登录身份验证方法，称为
    Active Directory 身份验证。


    ### Active Directory 身份验证


    SQL Server 身份验证简单易用。然而，任何规模的组织中的大多数用户，其登录账户都属于公司基础设施的一部分，例如 Active Directory 域。使用单点登录不仅高效，而且更安全，因为你不必管理不同的账户来使用公司资源和
    SQL Server。Windows 上的 SQL Server 多年来一直提供这种方法，称为 Windows 身份验证。


    Active Directory 是一种非常流行的基于身份的管理系统，即使对于使用 Linux 服务器的组织也是如此。Linux 提供了加入 Active
    Directory 域所需的软件包和软件。SQL Server 可以利用此功能，使用 Kerberos 对 Active Directory 用户进行身份验证，这与
    Windows 身份验证非常相似。用户现在可以登录到 Linux 服务器或任何可以加入域的计算机，并登录到 SQL Server，而无需使用单独的 SQL
    登录名。


    ### 工作原理


    Active Directory 身份验证涉及以下命令和对象：


    - **`realm`**：Linux 上的一个命令，允许你将 Linux 服务器加入 Active Directory 域。`realm` 要求你安装 `realmd`
    软件包。术语 *realm* 源于 Kerberos 概念，即 Kerberos realm。

    - 票据授权票据 (`TGT`)：一个加密文件，是一个 *票据*，发送给票据授权服务器 (`TGS`) 以请求访问域中的服务（如 SQL Server）。`TGS`
    功能由 Windows 域控制器实现。

    - **`kinit`**：一个 Linux 命令，用于获取并缓存域用户的 `TGT`。

    - 服务主体名称 (`SPN`)：Active Directory 中服务（如 SQL Server）的唯一标识符。

    - **`keytab`**：Linux 上的一个文件，用于存储用于验证传入 Kerberos 身份验证请求的加密密钥。

    - 域控制器：为 Active Directory 域提供 Active Directory 域服务的 Windows 服务器。


    我的同事 Vin Yu，他是 Linux 和容器上 SQL Server 的关键产品经理之一，提供了一个出色的图表，如图 7-4 所示，该图展示了 Kerberos
    如何工作以支持 SQL Server 的 Active Directory 身份验证流程。


    ![](img/index-346_1.png)


    ***图 7-4.** Linux 上的 SQL Server Active Directory 身份验证流程*


    让我解释一下这个流程，以了解 Kerberos 身份验证如何在 Linux 上的 SQL Server 中工作：


    1.  用户在 Linux 客户端上登录域，使用域用户账户和密码执行 `kinit`。`kinit` 会将用户名和密码发送给域控制器 (`DC`)。

    2.  `DC` 在验证这是一个具有正确密码的有效域用户后，会颁发一个 `TGT`。如果你使用域账户登录 Windows 计算机，也会发生同样的过程。

    3.  现在，你需要使用像 `sqlcmd` 这样的工具连接到 SQL Server。'
