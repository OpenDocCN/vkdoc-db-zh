    If you run `sqlcmd` with `-i` with a script, all results for any command are directed
    to `stdout`. This allows you to run a script with `sqlcmd` and pipe the results
    into other programs such as `grep`. Here is an example to find out the edition
    of SQL Server using `sqlcmd` and `grep` (you can use the sample script `getsqledition.sh`
    to execute this or modify this to your needs):


    ```

    sqlcmd -Usa -igetsqlversion.sql -PSql2017isfast | grep Edition

    ```


    Figure 5-4 shows the results of executing a script with `sqlcmd` and `grep` to
