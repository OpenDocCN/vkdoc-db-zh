- fmt: '# Chapter 6: Performance Capabilities


    The `total_page_count` is the total possible pages in each file. If you multiply
    these numbers by `8192` (the size of a database page) you will see `file_id =
    1` is 5GB, while the other files are 10GB. The `allocated_extent_page_count` is
    the number of pages allocated in each file. The `368` pages for the `PRIMARY`
    file group are pages for allocation structures and system table pages. The approximately
    `33,000` pages in each file of the `USERDATA` filegroup are for the `100,000`
    pages allocated for the `bigtab` table plus allocation pages and pages for the
    clustered index b-tree that are not data.


    **Tip:** Use the icons to the right in the results pane of SQL Operations Studio
    to turn this result into a chart. Click the icon and pick the chart type of bar.
    Figure 6-11 shows the bar chart of the preceding results.


    **Figure 6-11.** Using SQL Operations Studio to show a bar chart of page allocations
    across files in the database.


    ## Viewing Page Allocations by Object


    Another way to view page allocations across files by objects is with the undocumented
    DMF `dm_db_database_page_allocations`. Use the following T-SQL batch found in
    the example script `pages_by_object.sql` to see the allocation of pages across
    files in the database, organized by object:


    ```sql

    USE [master]

    GO

    SELECT OBJECT_NAME(object_id), count(*) total_pages_allocated

    FROM sys.dm_db_database_page_allocations(DB_ID(''bigdb''), NULL, NULL, NULL, ''DETAIL'')

    GROUP BY object_id

    ORDER BY total_pages_allocated DESC

    GO

    ```


    **Note:** `dm_db_database_page_allocation` can be expensive, as it pulls in many
    pages into the buffer pool and can take a long time to execute.


    If you want to learn more about the architecture of pages and extents for SQL
    Server, check out our documentation at [https://docs.microsoft.com/sql/relational-databases/pages-and-extents-architecture-guide](https://docs.microsoft.com/sql/relational-databases/pages-and-extents-architecture-guide).


    ## Planning for File Growth


    When I worked in Technical Support in a galaxy far, far away, one of the most
    common emergency calls I received from customers was running out of space in the
    database. Thankfully, the SQL Server Engineering team introduced the concept of
    *autogrow* for SQL Server database and transaction log files. By default, when
    you create a database, if SQL Server runs out of space in either the database
    or transaction log file, it will automatically grow the size of the file.


    While this can avoid emergency out of space problems (it doesn’t of course avoid
    out of disk space problems) within the database and transaction log files, there
    can be a performance penalty. This is because any “autogrow” typically occurs
    within the context of a user transaction executing a query that requires page
    allocations (and a file growth is required to create more space for a new page).


    As I’ve mentioned previously in this chapter, SQL Server on Linux can allocate
    file space very quickly for database files so an autogrow for a database file
    can be fast. However, even a fast autogrow can add seconds or longer to a user
    transaction, and that user transaction could be holding on to resources that can
    lead to a blocking problem.


    Furthermore, the transaction log must be written with a stamp of data so SQL Server
    can understand the “tail of the log,” so growing the transaction log file may
    take some time. Again, growing the transaction log may need to take place in the
    context of a user transaction, which may be holding resources that can lead to
    a blocking problem.


    One other factor of frequent growth of the transaction log is that it can lead
    to an issue with virtual log file (VLF) fragmentation, which you can read more
    about at [https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-log-architecture-and-management-guide#physical_arch](https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-log-architecture-and-management-guide#physical_arch).'
