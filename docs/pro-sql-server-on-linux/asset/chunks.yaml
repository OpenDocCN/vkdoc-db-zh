    ## 平台独立性、可移植性与一致性


    这里的“平台”指的是运行容器的宿主机。Docker 提供了这种独立性，因为我可以*编排*（你将在关于容器的章节中学到这个含义）一个包含 SQL Server
    的 Docker 镜像，并将该镜像作为容器运行在 Windows、Linux、MacOS 或其他容器云环境中，例如 Azure 容器服务 (AKS)、亚马逊弹性容器服务
