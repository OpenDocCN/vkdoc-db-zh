- fmt: 'benefit in having more than one transaction log file. If you decide to stay
    with just one database file, I do recommend you place the database file and transaction
    log file on different disks. That has been a traditional recommendation for SQL
    Server databases for many years. One of the primary reasons for this recommendation
    is the nature of I/O usage patterns between the database file and transaction
    log file. Writes to the database file are characterized as `random` I/O. While
    SQL Server writes in contiguous pages to the database file, it could write to
    pages anywhere in the file. Writes to the transaction log are always sequential.
    SQL Server always appends log blocks when writing to the transaction log file.
    Furthermore, it is very possible for SQL Server to concurrently write to database
    files through checkpoint tasks (such as `RECOVERY WRITER`) and the transaction
    log through the `LOG WRITER` task. Therefore, you will almost always achieve better
    I/O performance by separating database file writes from transaction log writes
    on different disks.


    # ChapTer 6   performanCe CapabILITIeS


    Another important benefit in separating database and transaction log files is
    recoverability. It is possible to perform advanced recovery if the database file
    is lost but the current transaction log is available (assuming you are using a
    full recovery model; find more about the full recovery model at [https://docs.microsoft.com/sql/relational-databases/backup-restore/recovery-models-sql-server#RMov](https://docs.microsoft.com/sql/relational-databases/backup-restore/recovery-models-sql-server#RMov)
    and vice versa.


    The syntax I used in earlier chapters to create the database did not specify file
    names or file paths. If you generate the script for the full WideWorldImporters
    sample database, you will see this syntax:


    ```

    CREATE DATABASE [WideWorldImporters]

    CONTAINMENT = NONE

    ON  PRIMARY

    ( NAME = N''WWI_Primary'', FILENAME = N''/var/opt/mssql/data/WideWorldImporters.mdf''
    , SIZE = 1048576KB , MAXSIZE = UNLIMITED, FILEGROWTH = 65536KB ),

    FILEGROUP [USERDATA]  DEFAULT

    ( NAME = N''WWI_UserData'', FILENAME = N''/var/opt/mssql/data/WideWorldImporters_UserData.ndf''
    , SIZE = 2097152KB , MAXSIZE = UNLIMITED, FILEGROWTH = 65536KB ),

    FILEGROUP [WWI_InMemory_Data] CONTAINS MEMORY_OPTIMIZED_DATA  DEFAULT

    ( NAME = N''WWI_InMemory_Data_1'', FILENAME = N''/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1''
    , MAXSIZE = UNLIMITED)

    LOG ON

    ( NAME = N''WWI_Log'', FILENAME = N''/var/opt/mssql/data/WideWorldImporters.ldf''
    , SIZE = 102400KB , MAXSIZE = 2048GB , FILEGROWTH = 65536KB )

    GO

    ```


    Note the `FILENAME` parameter is used to specific the path and physical name of
    the file. To separate the transaction log, you would mount a directory from a
    separate disk and specify a path to the transaction log on that disk. I’ll show
    you an example of how to do this using filegroups in the next section.


