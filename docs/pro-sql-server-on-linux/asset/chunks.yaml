  trans: "\n# 第 10 章  迁移至 Linux 上的 SQL Server\n\n## **执行迁移**\n\n与从 Oracle 迁移类似，要从\
    \ PostgreSQL 迁移，我建议您首先执行以下步骤：\n\n1.  评估并捕获您当前使用 PostgreSQL 的应用程序的性能基线。\n2.  决定是否要在迁移过程中对表、索引或服务器端代码的定义进行任何更改。\n\
    3.  在 Linux 上安装 SQL Server。\n4.  创建一个新的数据库，为数据库和事务日志设置合适的大小，以容纳 PostgreSQL 数据库的当前大小，并为向表中插入数据的事务预留空间。\n\
    \n从 PostgreSQL 迁移通常涉及三个领域：\n\n*   迁移架构或所有对象的定义，例如表、索引、视图和服务器端代码\n*   迁移数据\n* \
    \  迁移任何维护脚本或作业\n\n通过我的研究，我发现了一些软件供应商编写的工具，您可以购买它们来帮助您迁移架构和对象定义，但我没有找到任何可以免费下载的工具。\n\
    \n因此，我找到了这两个讨论从 SQL Server 迁移到 PostgreSQL 的资源。通过研究这些示例，您应该能够识别从 PostgreSQL 迁移到\
    \ SQL Server 时可能遇到的问题：\n\n1.  `https://www.devbridge.com/articles/migrating-from-mssql-to-postgresql/`\
    \ 上的这篇博文讲述了一个用户从 SQL Server 迁移到 PostgreSQL 的经验。阅读这篇文章非常有用，因为它展示了两个系统之间许多 SQL 语言的差异。您可以在迁移到\
    \ SQL Server 时利用这些知识。\n2.  GitHub 项目 `https://github.com/lorint/AdventureWorks-for-Postgres`\
    \ 中的 AdventureWorks 是一个极好的资源。该用户将 SQL Server 2014 的示例数据库 AdventureWorks（可在 `https://github.com/Microsoft/sql-server-samples/releases/tag/adventureworks`\
    \ 找到）迁移到了 PostgreSQL。在浏览这个项目后，我有几点评论。\n    *   该项目使用了以下 zip 文件 `https://github.com/Microsoft/sql-server-samples/releases/download/adventureworks/AdventureWorks-oltp-install-script.zip`，其中包含用于创建\
    \ AdventureWorks 数据库的 T-SQL 脚本以及一系列用于为 SQL Server 加载数据的 .csv 文件。\n    *   将 T-SQL\
    \ 脚本与 PostgreSQL GitHub 项目中的 `install.sql` 进行比较，您就能看到在创建表、索引、架构和数据类型方面的根本差异。\n\
    \    *   该用户被迫为 T-SQL 存储过程创建返回 `VOID` 的函数，因为 PostgreSQL 没有存储过程的概念。您应该能够将 PostgreSQL\
    \ 中返回 void 的函数提取出来，并将其更改为 SQL Server 存储过程。\n    *   该项目有一个用 Ruby 编写的程序，用于将 CSV\
    \ 文件转换为可以在 PostgreSQL 中加载数据的格式。虽然您可以查看此代码来反向处理由 pgdump 等程序生成的 CSV 文件，但请考虑 SSIS\
    \ 支持 PostgreSQL ODBC 驱动程序。因此，您可以构建一个 SSIS 包来导出数据。\n\n# 第 10 章  迁移至 Linux 上的 SQL\
    \ Server\n"
- fmt: '# Chapter 10 Migrating to SQL Server on Linux


    ## Post Migration Considerations


    Once you have migrated to `SQL Server`, you will want to consider several changes
    for the `SQL Server` instance and databases you have migrated. There could be
    many tasks you need to work on post migration, but in this section I’ve narrowed
    it to ones I feel most important that can affect the success of your experience
    on `SQL Server` on `Linux`.


    In this section, I’ll discuss performance, `HADR`, database compatibility, and
    application compatibility. Database compatibility only applies if you have migrated
    from an earlier version of `SQL Server`. All other topics are very applicable
    to your migration from any database platform to `SQL Server` on `Linux`.


    ### Optimizing Performance Post Migration


    This book contains a very lengthy chapter on performance (Chapter [6](#index_split_003.html#p250))
    for a good reason. Performance is one of the most critical aspects to a successful
    application using a data platform like `SQL Server`. Therefore, after you have
    migrated to `SQL Server` on `Linux`, you want to be sure to optimize performance.
    Everything I discussed in Chapter [6](#index_split_003.html#p250) applies to your
    use of `SQL Server` on `Linux`. In this section, I’ll call out some specific areas
    you want to look at after you have migrated.


    First, our documentation contains an excellent set of performance-related post
    migration topics at [https://docs.microsoft.com/sql/relational-databases/post-migration-validation-and-optimization-guide](https://docs.microsoft.com/sql/relational-databases/post-migration-validation-and-optimization-guide).
    Let me start by making some comments on these recommendations:


    - **Change in `CE` version**: `CE` stands for cardinality estimation, and I mentioned
    this topic in Chapter [6](#index_split_003.html#p250) on performance. I’ll defer
    commenting on this topic until the section later in this chapter on database compatibility.

    - **Change in cardinality estimation**: You’ll want to address changes in cardinality
    estimation. See “Using Database Compatibility” later in this chapter for specific
    advice.

    - **Parameter sniffing**: This is another topic I talked about in Chapter [6](#index_split_003.html#p250)
    on performance. This guidance is more for awareness and how to deal with situations
    for *parameter sensitive plans*. If you remember, in Chapter [6](#index_split_003.html#p250)
    I talked about the new feature called Automatic Tuning to detect and even fix
    query plan regression problems that can occur in some situations because of parameter
    sniffing.

    - **Missing indexes**: I discussed this topic in Chapter [6](#index_split_003.html#p250)
    on performance. Always take a look at recommended missing indexes but always investigate
    each recommendation to make sure it makes sense for your database.

    - **Predicates and filter of data**: This section talks about various *query patterns*
    that would prevent `SQL Server` from generating an optimal query plan to search
    based on *filters*. A filter is just another word for using a `WHERE` clause in
    a `T-SQL` statement. An example of a filter.


