    阅读更多关于此功能的信息。


    • `索引视图` 是 SQL Server 视图上的索引，但它们是独特的，因为视图上的聚集索引将像表一样存储。你可以将其视为基于 T-SQL 视图的 `存储结果集`。你可以在
    [`docs.microsoft.com/sql/relational-databases/views/create-indexed-views`](https://docs.microsoft.com/sql/relational-databases/views/create-indexed-views)
    阅读更多关于索引视图的信息。


    • SQL Server 使用一个称为 `填充因子` 的概念来决定在创建索引时页面上的行填充程度。虽然默认的 `填充因子` 可能适用于许多工作负载，但你可能希望调整默认值或为特定索引更改
    `填充因子` 以避免大量 `页拆分`。你可以在 [`docs.microsoft.com/sql/relational-databases/indexes/specify-fill-factor-for-an-index`](https://docs.microsoft.com/sql/relational-databases/indexes/specify-fill-factor-for-an-index)
    阅读更多关于为 SQL Server 索引选择 `填充因子` 以及为什么 `页拆分` 可能导致性能问题的信息。


    ## 统计信息


    SQL Server 中的查询处理器完全依赖于 `统计信息`。我的意思是，查询处理器通常基于有关表、列和索引中行值（行唯一性）的可用 `统计信息` 来做出编译查询计划的决策。


    第 6 章  性能功能


    ## 索引和列上的统计信息


    任何时候创建或重建索引时，SQL Server 都会在索引的键列上构建一组 `统计信息`。会在索引的前导列上构建 `直方图`。还有其他基于索引中所有列组合计算的
    `统计信息`，称为 `密度`。查询处理器构建最优查询计划的决策质量仅取决于可用 `统计信息` 的质量。


    默认情况下，`统计信息` 通过 `抽样` 计算，这意味着 SQL Server 不会检查索引中的每一行来构建 `统计信息`，而是基于数据的 `抽样` 来构建
    `统计信息`。对于大多数工作负载，这种默认的抽样算法效果很好。但在某些情况下，我观察到使用一个称为 `FULLSCAN`（意味着在构建 `统计信息` 时完全扫描索引或表中的所有行）的选项时，能构建出更好的查询计划。


    也可以在一个或多个列上创建 `统计信息` 而无需索引。实际上，对于某些类型的查询，SQL Server 会自动在单个列上创建 `统计信息`（假设启用了我将在本章后面讨论的某个数据库选项）。存在一些有趣的情景，其中手动创建
    `统计信息` 可以在不产生索引开销的情况下使查询计划选择受益。有关 `统计信息` 的完整指南，包括 `直方图` 外观的详细信息，可以在我们的文档中找到：[`docs.microsoft.com/sql/relational-databases/statistics/statistics`](https://docs.microsoft.com/sql/relational-databases/statistics/statistics)。


    我从未见过任何 SQL Server 专家争论你不需要 `统计信息`，无论是来自索引的、SQL Server 自动创建的，还是你手动创建的场景。最大的争论在于：(1)
    `抽样` 是否足够好？(2) 我应该在何时以及如何更新它们？


    对于第一个问题，SQL Server 会自动决定正确的样本大小。

