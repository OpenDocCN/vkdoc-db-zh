    ### 预写式日志


    当 SQL Server 需要修改缓冲池中数据页上的数据时，如果 SQL Server 必须等待每个数据库页的所有更改都写入磁盘（对于需要更改的 T-SQL
    语句，例如 `INSERT` 语句），性能将不是最优的。


    由于每个数据库都包含一个事务日志，如果 SQL Server 确保所有更改都写入事务日志文件，它就不必立即写入数据库页。此概念称为预写式日志（此概念也称为
    WAL 协议）。只要 SQL Server 确保已提交事务的所有修改都写入磁盘上的事务日志，即使 SQL Server 或 Linux 服务器意外终止，对数据库页的更改未写入磁盘，所有事务也将保持
    `一致性`。


    此架构允许修改数据的 T-SQL 语句以更改能被 `固化` 到事务日志的速度运行。这意味着对于依赖数据库修改性能的应用程序（例如 OLTP 密集型应用程序），将事务日志文件放置在极快的存储系统上非常重要。


    SQL Server 确实提供了一个名为 `延迟持久性` 的功能，它允许事务在完成时无需等待事务日志更改写入磁盘。然而，性能的代价是可能的数据丢失。你可以在我们的文档中阅读更多关于
    SQL Server 事务持久性选项的信息：[`docs.microsoft.com/sql/relational-databases/logs/control-transaction-durability`](https://docs.microsoft.com/sql/relational-databases/logs/control-transaction-durability)。


    事务日志写入由名为 `LOG WRITER` 的后台任务执行（你可以通过查找 `dm_exec_requests` 中 `command = LOG WRITER`
    的行来查看此后台任务）。出于可扩展性目的，我们在 SQL Server 2016 中进行了增强，使每个 NUMA 节点使用多个 `LOG WRITER` 任务。你可以在此博文中阅读更多关于此概念的信息：[`blogs.msdn.microsoft.com/bobsql/2016/06/03/sql-2016-it-just-runs-faster-multiple-log-writer-workers/`](https://blogs.msdn.microsoft.com/bobsql/2016/06/03/sql-2016-it-just-runs-faster-multiple-log-writer-workers/)。


