- fmt: '# Chapter 5: SQL Server Tools


    For example, while the estimated plan will show statistics like estimated rows
    for each query operator, the actual execution plan will show estimated and actual
    rows per query operator (estimates are produced when compiling the plan based
    on available statistics). Those statistics could be missing or out of date, which
    could result in scenarios where the actual values are different than estimates.
    This is a common performance problem when debugging query plans.


    **Tip:** If query plan information is generated with a `SET` statement, it is
    returned to the application in the form of messages. Application developers who
    execute a `SET` statement to generate query plan details must be prepared to handle
    and process these messages.


    SSMS provides similar functionality to SQL Operations Studio through buttons in
    the user interface called **Display Estimated Execution Plan** and **Include Actual
    Execution Plan**.


    ## SET STATISTICS


    You can also use T-SQL to gain insight into performance statistics including CPU,
    duration, and I/O performance for each statement in a batch. These T-SQL commands
    are:


    `SET STATISTICS TIME`: SQL Server will produce CPU and elapsed parse/compile and
    execution timings for each statement in batches after executing this command.
    Information is produced in the form of messages.


    Figure 5-40 shows the message output in SQL Operations Studio from the following
    example query found in the sample `setstatstime.sql` (Note: Be sure to run `SET
    SHOWPLAN_XML OFF` before running the following command):


    ```sql

    SET STATISTICS TIME ON

    GO

    SELECT * FROM sys.databases

    GO

    ```


    ![](index-230_1.jpg)


    *Figure 5-40. `SET STATISTICS TIME` output in SQL Operations Studio*


    `SET STATISTICS IO`: SQL Server will produce information about logical (number
    of database pages read from cache) and physical reads (number of database pages
    read from disk) for objects referenced in each statement in batches after executing
    this command. Information is produced in the form of messages.


    Figure 5-41 shows the message output in SQL Operations Studio from the following
    example query found in the sample `setstatsio.sql` (Note: For the following output,
    I had first run `SET STATISTICS TIME OFF` to clear that setting.):


    ```sql

    SET STATISTICS IO ON

    GO

    SELECT * FROM sys.databases

    GO

    ```


    ![](index-231_1.jpg)


    *Figure 5-41. `SET STATISTICS IO` output in SQL Operations Studio*


    **Note:** Read-ahead reads are also physical reads of database pages from disk.


    ## Lightweight Query Profiling


    It is possible to trace showplan information for each query by using Extend Events.
    The events `query_post_compilation_showplan` (estimated) and `query_post_execution_showplan`
    (actual) can be used to trace plans for queries in SQL Server. There are several
    columns available for these events as properties to the plan, including the XML
    document representation of the query plan.


    While this information can be useful when investigating query performance problems,
    there can be substantial overhead to use these events on a production SQL Server.


    Fortunately, we have a team at Microsoft called the Tiger Team (follow their work
    at [https://twitter.com/mssqltiger](https://twitter.com/mssqltiger)). They built
    a new infrastructure and capability called lightweight query profiling, enabled
    with the global trace flag 7412 (remember with SQL Server on Linux, you can use
    the `mssql-conf` script to enable a trace flag).


    An example of how to set this trace flag on Linux would be the following command:


    ```bash

    sudo /opt/mssql/bin/mssql-conf traceflag 7412 on

    ```


    See the documentation on how to set trace flags at [https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf#traceflags](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf#traceflags).'
