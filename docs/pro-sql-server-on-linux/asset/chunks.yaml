- fmt: '# Chapter 5 SQL Server Tools


    At the time I wrote the chapter in this book, SQL Operations Studio was still
    in preview. Given the ability to extend this tool and the open-source capabilities
    for the community to contribute to the tool, I expect it will continue to grow
    in functionality and capability very rapidly as new major builds come out each
    month.


    ## SQL Server Management Studio


    Since 2005, the most popular tool in the world to interact with SQL Server is
    SQL Server Management Studio (SSMS). Prior to 2005, SQL Server provided a graphical
    interface tool called SQL Enterprise Manager. SSMS was an exciting new tool with
    rich capabilities based on a shell from Visual Studio. Since 2005, with each release
    of SQL Server, SSMS was enhanced to include a wide range of features and capabilities.


    Historically, one of the issues with SSMS was that it was always bundled with
    the installation and release of a major version of SQL Server. This approach hampered
    our ability to make major enhancements to the tool on a frequent basis. Starting
    with SQL Server 2016, we made the decision to decouple SSMS from SQL Server. We
    also made a conscious effort to clean up a backlog of bugs, issues, and suggestions.
    We began this journey with a separate SSMS download in June of 2016, and now SSMS
    17 is updated and enhanced monthly. You can always find the latest release of
    SSMS to download at [https://docs.microsoft.com/sql/ssms/download-sql-server-management-studio-ssms](https://docs.microsoft.com/sql/ssms/download-sql-server-management-studio-ssms).


    The biggest downside to SSMS as a tool for SQL Server on Linux users is that it
    can only be installed on computers with the Windows operating system. But for
    users of Windows, it is a powerful tool with rich capabilities. The great upside
    to SSMS is that connecting to SQL Server on Linux uses the same providers and
    libraries as is used for Windows, so connecting to SQL Server on Linux will feel
    the same as on Windows. It is a great compatibility story.


    SSMS includes an Object Explorer, rich T-SQL editor, a T-SQL debugger, wizards
    to complete specific tasks, and reports for a range of SQL Server and database
    capabilities. There has been a great deal of documentation, training, and information
    about SSMS that has been written over the years. A section in this chapter will
    never do it justice. I will cover some of the major features that you can use
    to interact with SQL Server on Linux with SSMS, and then provide other resources
    that cover the topic in more detail.


    ![](index-197_1.jpg)


    Figure 5-25 shows the default interface for SSMS with Object Explorer and a New
    Query editor window.


    *Figure 5-25. The default SSMS interface*


    ## Object Explorer


    Like SQL Operations Studio, SSMS provides a visual interface to navigate objects
    for SQL Server. SSMS provides more options than SQL Operations Studio in Object
    Explorer, to include not just objects but features of SQL Server including Always
    On Availability Groups and Management Features. In addition, there are more options
    than in SQL Operations Studio when you right-click Object Explorer objects and
    features.


    ![](index-198_1.jpg)


    For example, Figure 5-26 shows options to create a T-SQL script to drop and create
    the WideWorldImporters example database.


    *Figure 5-26. Using SSMS to create a script to drop and create an existing database*


    Another feature in SSMS through Object Explorer is the ability to create new objects
    like databases, tables, indexes, and other objects. If you right-click the Databases
    folder in Object Explorer, you have options to create or restore a new database.
    Figure 5-27 shows a new window that will appear when you right-click the Databases
    folder and select New Database.


    ![](index-199_1.jpg)'
