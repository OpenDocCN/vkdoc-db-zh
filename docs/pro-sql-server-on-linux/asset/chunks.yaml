- fmt: '# Why SQL Server on Linux?


    ![](index-33_1.jpg)


    ***Figure 1-3.** Scott Konersmann’s SQL Server on Linux architecture*


    I’m a very visual person, so as I started to learn the architecture myself, I
    decided to revise this view to something more like the diagram in Figure [1-4](#index_split_000.html#p34).
    (Note: I based this on a more detailed architecture diagram built by the Helsinki
    team.)


    ![](index-34_1.jpg)


    ***Figure 1-4.** The SQL Server on Linux architecture*


    As I begin to describe the architecture, let me provide one more important comment.
    This is the architecture as of SQL Server 2017 at general availability. As with
