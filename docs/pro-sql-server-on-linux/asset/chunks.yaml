    [资源调控器/resource-governor。](https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor)


    ## 专用管理员连接 (`DAC`)


    正如我在书中所述，如果 `SQL Server` 因任何原因变得无法访问，但其实例仍在运行，你或许能使用 `DAC` 连接、收集诊断信息，并在某些情况下解决问题。而如果
    `pgsql` 因任何原因挂起，则没有方法可以在不停止并重启 `pgsql` 的情况下访问引擎。你可以在以下链接中阅读更多关于 `SQL Server` 的
    `DAC` 信息：[`docs.microsoft.com/sql/database-engine/configure-windows/diagnostic-connection-for-database-administrators`](https://docs.microsoft.com/sql/database-engine/configure-windows/diagnostic-connection-for-database-administrators)。


    ## 数据库的附加与分离


    由于 `SQL Server` 允许你为数据库和事务日志控制并建立特定文件，因此你能够分离数据库，将文件复制或移动到另一个 `SQL Server`，然后附加这些文件以创建新数据库。`pgsql`
    不提供任何类似 `SQL Server` 的分离和附加功能。


    ## 恢复与修复


    对于页面校验和失败，`pgsql` 确实提供了通过查询或后台清理进程初始化来清理损坏页面的能力。`SQL Server` 提供了更丰富的修复功能，例如 `DBCC
    CHECKDB REPAIR` 和紧急模式修复以重建事务日志。此外，如果 `SQL Server` 恢复过程中遇到校验和错误，恢复将继续进行，使用延迟事务跳过损坏的页面。


    ## 联机维护


    `SQL Server` 支持联机索引构建的概念，这样在构建（或重建）索引时用户不会被阻塞。`pgsql` 不提供此功能。此外，`SQL Server` 支持可恢复索引重建的概念，因此你可以暂停和继续大型索引重建任务。你可以在以下链接中阅读更多关于
    `SQL Server` 的联机索引操作：[`docs.microsoft.com/sql/relational-databases/indexes/perform-index-operations-online`](https://docs.microsoft.com/sql/relational-databases/indexes/perform-index-operations-online)。


    ## 索引重组


    `SQL Server` 和 `pgsql` 中的索引都可能变得碎片化。`SQL Server` 和 `pgsql` 都提供了一种通过重建索引来整理索引碎片的方法（只有
    `SQL Server` 可以在线执行此操作）。然而，只有 `SQL Server` 提供了一种不同的、侵入性更小的方法，即通过重组索引来整理碎片。你可以在以下链接中阅读更多关于
    `SQL Server` 的索引重组信息：[`docs.microsoft.com/sql/relational-databases/indexes/reorganize-and-rebuild-indexes`](https://docs.microsoft.com/sql/relational-databases/indexes/reorganize-and-rebuild-indexes)。


    ## 系统运行状况会话


    虽然 `SQL Server` (`扩展事件`) 和 `pgsql` (`dtrace`) 提供了丰富的跟踪功能，但只有 `SQL Server` 会自动使用跟踪来保存有关其运行状况关键事件的信息，这称为系统运行状况会话。系统运行状况会话中包含了
    `sp_server_diagnostics` 存储过程的输出，该存储过程用于为故障转移做出运行状况决策。你可以在以下链接中阅读更多关于 `SQL Server`
    的系统运行状况会话信息：[`docs.microsoft.com/sql/relational-databases/extended-events/use-the-system-health-session`](https://docs.microsoft.com/sql/relational-databases/extended-events/use-the-system-health-session)。

