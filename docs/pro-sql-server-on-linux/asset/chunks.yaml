    ## Chapter 11 SQL Server and Containers


    5. 现在，让我们通过在bash shell中运行以下命令来使用我们构建的新镜像运行一个容器（需要输入你的sa密码：先复制到编辑器中修改密码，然后再粘贴回shell）。注意：在这个例子中我使用了`sql3`，因为我已经有一个名为`sql2`的容器在运行。

    ```

    sudo docker run -e ''ACCEPT_EULA=Y'' -e ''SA_PASSWORD=Sql2017isfast'' \

    -p 1500:1433 --name sql3 \

    -d mssql-with-backup-example

    ```


    6. 现在通过在bash shell中执行以下命令来查看正在运行的容器：

    `sudo docker ps`

    你的结果应该如下所示：

    ```

    CONTAINER ID   IMAGE                             COMMAND                  CREATED         STATUS         PORTS                    NAMES

    c4740bfdafa9   mssql-with-backup-example         "/opt/mssql/bin/sqls…"   3 seconds
    ago   Up 2 seconds   0.0.0.0:1500->1433/tcp   sql3

    38850dc61aa6   microsoft/mssql-server-linux:2017-latest   "/opt/mssql/bin/sqls…"   6
    hours ago     Up 6 hours     0.0.0.0:1401->1433/tcp   sql2

    ```

    这是一个很好的例子，展示了如何使用容器在同一个Linux主机服务器上运行两个SQL Server实例（因为Linux版SQL Server不支持命名实例）。


    7. 现在，让我们通过在bash shell中运行以下命令来恢复容器镜像中的数据库（输入你的sa密码）。这个命令很长，所以我包含了一个名为`dockerrunmyimage.sh`的示例脚本。

    ```

    sudo docker exec -it sql3 /opt/mssql-tools/bin/sqlcmd \

    -S localhost -U SA -P Sql2017isfast \

    -Q ''RESTORE DATABASE ProductCatalog FROM DISK = "/var/opt/mssql/data/SampleDB.bak"
    WITH MOVE "ProductCatalog" TO "/var/opt/mssql/data/ProductCatalog.mdf", MOVE "ProductCatalog_log"
    TO "/var/opt/mssql/data/ProductCatalog.ldf"''

    ```


    8. 现在我将使用Linux主机服务器上的`sqlcmd`连接到新容器，并对镜像中包含的数据库运行查询。从bash shell运行以下命令：

    `sqlcmd -Slocalhost,1500 -Usa`


    9. 现在从`sqlcmd`提示符，运行以下T-SQL语句：

    ```

    SELECT COUNT(*) FROM ProductCatalog.dbo.Product

    GO

    ```

    你应该会得到一个14行的计数结果。


    让我们通过在bash shell中运行以下命令来停止`sql2`和`sql3`容器（是的，你可以一次控制多个容器），并切换回你的主目录：

    `sudo docker stop sql2 sql3`

    `cd ~`


    在下一节中，我将向你展示如何使用称为`compose`的概念来构建一个包含SQL Server的多容器应用程序。


    ### Compose a Multicontainer Application'
