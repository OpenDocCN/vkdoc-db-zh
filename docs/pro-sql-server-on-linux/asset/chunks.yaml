- fmt: '# Chapter 10: Migrating to SQL Server on Linux


    original database. You can read more about SQL Server database snapshots at [https://docs.microsoft.com/sql/relational-databases/databases/database-snapshots-sql-server](https://docs.microsoft.com/sql/relational-databases/databases/database-snapshots-sql-server).


    ## Failover clustering and Availability Groups


    Pgsql offers both shared disk and transaction log based HADR solutions and integrates
    with clustering system software such as `Pacemaker`. The resource agent to use
    with `Pacemaker` must be installed from a different location at [https://github.com/ClusterLabs/resource-agents/blob/master/heartbeat/pgsql](https://github.com/ClusterLabs/resource-agents/blob/master/heartbeat/pgsql).
    All resources on how to install the resource agent and integrate with `Pacemaker`
    can be found at [https://wiki.postgresql.org/wiki/Ecosystem:Pacemaker](https://wiki.postgresql.org/wiki/Ecosystem:Pacemaker).


    After looking through this functionality of `pgsql`, two differences stood out
    for me:


    1.  The granularity of failover detection for SQL Server uses flexible failover
    policies and the `sp_server_diagnostics` system procedure. In addition, SQL Server
    supports database health as a component to detect the need for a failover. I did
    not see `pgsql` offer this level of failure detection to trigger a failover built
    inside the database engine. You can read more about flexible failover for SQL
    Server at [https://docs.microsoft.com/sql/database-engine/availability-groups/windows/flexible-automatic-failover-policy-availability-group](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/flexible-automatic-failover-policy-availability-group).


    2.  SQL Server provides a capability for automatic page repair with Availability
    Groups, where `pgsql` does not offer this feature with their streaming replication
    technology.


    ## Management and Monitoring


    The final area where I’ve compared SQL Server with `pgsql` is various management
    and monitoring features. The following are areas I feel SQL Server shines and
    provides more robust functionality than `pgsql`.


    ### SQL Server Agent


    SQL Server provides a built-in job scheduling engine, which can be especially
    handy to schedule database maintenance tasks. `pgsql` does not offer a built-in
    job scheduler system. You can read more about how to use `SQL Server Agent` on
    Linux at [https://docs.microsoft.com/sql/linux/sql-server-linux-run-sql-server-agent-job](https://docs.microsoft.com/sql/linux/sql-server-linux-run-sql-server-agent-job).


    ### Resource Governor


    SQL Server provides a built-in feature to control resources for users and applications
    including CPU, I/O, and memory. In addition, `Resource Governor` allows you to
    control the `max degree of parallelism` at an application level and affinitize
    applications to CPUs or NUMA nodes. `Pgsql` does not have built-in features that
    compare with `Resource Governor`. Most uses of `pgsql` use Linux `cgroups` to
    control the `pgsql` cluster resources but you cannot tie this assignment to applications.
    You can read more about SQL Server `Resource Governor` at [https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor](https://docs.microsoft.com/sql/relational-databases/resource-governor/resource-governor).'
