  trans: '

    ### 使用可恢复选项时：


    ```sql

    USE WideWorldImporters

    GO

    ALTER INDEX PK_Purchasing_PurchaseOrders

    ON [Purchasing].[PurchaseOrders]

    REBUILD

    WITH (ONLINE = ON, RESUMABLE = ON);

    GO

    ```


    使用 `REBUILD` 的 `ALTER INDEX` 可以利用并行处理，并遵循与查询相同的规则来决定 `MAXDOP`。`ALTER INDEX` 语句提供了一个
    `MAXDOP` 提示。此外，`ALTER INDEX` 还提供了一个名为 `ALL` 的选项，可在单个事务中重建指定表的所有索引。


    ## 重组索引


    除了重建索引，另一种方法是重组索引。索引重组是一项在线操作，它使用现有的索引页来压缩页面并移动页面，使其按物理顺序排列。你可以使用带 `REORGANIZE`
    选项的 `ALTER INDEX` 来重组索引。


    重组索引是处理索引碎片的一个很好选择，但不会更新索引的统计信息。此外，带 `REORGANIZE` 的 `ALTER INDEX` 也提供了使用 `ALL`
    来重组表的所有索引的选项，并允许你指定一个填充因子。Paul Randal 有一篇精彩的博文描述了重建和重组索引之间的区别：[`www.sqlskills.com/blogs/paul/sqlskills-sql101-rebuild-vs-reorganize`](https://www.sqlskills.com/blogs/paul/sqlskills-sql101-rebuild-vs-reorganize)。


    ## 自适应索引整理


    你可以参考文档中的指导来决定是重建还是重组索引，详见 [`docs.microsoft.com/sql/relational-databases/indexes/reorganize-and-rebuild-indexes`](https://docs.microsoft.com/sql/relational-databases/indexes/reorganize-and-rebuild-indexes)。然而，多亏了
    SQL 工程团队中被称为老虎团队的聪明人，你可以使用一个脚本来创建一个*智能的*存储过程，由它来决定是重建还是重组你的索引。这个脚本及其概念被称为自适应索引整理。你可以在以下链接阅读更多关于此脚本的功能说明，并进行下载：[`github.com/Microsoft/tigertoolbox/tree/master/AdaptiveIndexDefrag`](https://github.com/Microsoft/tigertoolbox/tree/master/AdaptiveIndexDefrag)。


    ## 修改索引


    可以在不要求重建索引的情况下更改索引的某些属性。这包括诸如锁定行为（例如 `ALLOW_PAGE_LOCKS`）和统计信息选项（例如 `STATISTICS_NORECOMPUTE`）。`ALTER
    INDEX` 的大多数选项确实需要更改索引结构，正如之前在重建和重组索引的示例中所见。有关 `ALTER INDEX` 的完整选项列表，请参阅我们的文档：[`docs.microsoft.com/sql/t-sql/statements/alter-index-transact-sql#arguments`](https://docs.microsoft.com/sql/t-sql/statements/alter-index-transact-sql#arguments)。


    ### 维护列存储索引


    我在第 6 章讨论了称为列存储索引这一出色的性能特性。尽管列存储索引的组织方式与行存储索引不同，但它们仍然可能需要维护。以下是一些在决定如何维护列存储索引时可以使用的资源：


    - 查阅有关列存储索引碎片整理的文档：[`docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-defragmentation`](https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-defragmentation)。

    - 这里有一篇关于如何整理列存储索引的讨论。

