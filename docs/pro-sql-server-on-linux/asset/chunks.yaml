- fmt: '## SQL Server Tools


    window, which by default is called the Control Flow designer.


    ![](index-243_1.jpg)


    Figure 5-45 shows my screen after adding a Data Flow Task to my Control Flow for
    this package.


    ***Figure 5-45.** A Data Flow Task added to the Control Flow of the SSIS Package*


    In the tab next to the Control Flow Designer is the Data Flow Designer. I can
    see the design for this Data Flow Task by double-clicking the rectangle shape
    called Data Flow Task.


    For the Data Flow Task, I need to add in a source of the data, which will be my
    SQL Server on Linux, and a destination, which will be a flat file. For the source
    of the data, I will need an `ODBC` source, since I’m going to run the package
    on the Linux Server. First, I found the `ODBC Source` from the Other Sources category
    in the SSIS Toolbar and drag/dropped this into my designer window. Figure 5-46
    shows my screen after adding an `ODBC Source` to the Data Flow Task.


    ![](index-244_1.jpg)


    ***Figure 5-46.** Adding an `ODBC Source` to the Data Flow Task*


    Now I need to configure the `ODBC` source to point to my SQL Server on Linux server
    and my example `WideWorldImporters` database. I’ll do this by right-clicking the
    `ODBC Source` and selecting `Edit`. I selected `New` on the next window for the
    `ODBC Connection Manager`. This brings up another window, where I will pick the
    `New` button again to build a new connection.


    On this screen, I will use an `ODBC` *connection string*. Connection strings are
    a method to provide all the necessary information to connect to SQL Server on
    Linux (or any other `ODBC` based data source). For this example, my connection
    string looks like this:


    ```

    Driver={ODBC Driver 17 for SQL Server};server=bwsql2017rhel;database=WideWorldImporters;uid=sa

    ```


    Connection strings are common ways for programmers to supply connection information
    for SQL Server. You can learn more about all the connection strings options for
    `ODBC` in our documentation at [https://docs.microsoft.com/sql/connect/odbc/dsn-connection-string-attribute](https://docs.microsoft.com/sql/connect/odbc/dsn-connection-string-attribute).


    ![](index-245_1.jpg)


    On this screen I’ll also supply the login of `sa` and the `sa` password. Figure
    5-47 shows my screen before I hit `OK` to create this new connection.


    ***Figure 5-47.** Creating a new connection with a connection string for the SSIS
    package*


    **Note** To use this connection string on your windows computer within your package,
    you must install the `ODBC Driver 17 for SQL Server` on your Windows computer.
    You can download this package from [https://docs.microsoft.com/sql/connect/odbc/download-odbc-driver-for-sql-server](https://docs.microsoft.com/sql/connect/odbc/download-odbc-driver-for-sql-server).


    ![](index-246_1.jpg)


    Once you hit `OK`, you can select the `Table Name` in the `Name of the table of
    the view` field on the `ODBC Source` screen. I selected the `"Application"."People"`
    table for this example. To simply this example, I need to exclude columns from
    this table that are `varbinary(max)` or `varchar(max)`, which are the `HashedPassword`,
    `UserPreferences`, `Photo`, and `CustomFields` columns. There are methods to include
    these columns for extraction to a file using Data Conversion tasks. To exclude
    these columns, I need to pick the `Columns` option on the left-hand side of the
    `ODBC Source Window` and uncheck these column names, then hit the `OK` button.


    Now I’m ready to set up the `Flat File Destination`. From the SSIS Toolbar, drag
    the `Flat File Destination` icon on the canvas where the `ODBC Source` exists.


    You can now take the blue arrow from the `ODBC Source` shape and connect it to
    the `Flat File Destination`. Right-click and select `Edit` to provide the File
    information.'
