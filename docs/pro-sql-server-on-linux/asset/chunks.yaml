    # 第 1 章：为什么 SQL Server 可以在 Linux 上运行？


    对于 Windows，其可执行文件格式被称为可移植执行体（PE）格式，而对于 Linux，则被称为可执行与可链接格式（ELF）格式。任何为 Windows
    编译和链接的程序都使用 PE 格式（例如 `SQLSERVR.EXE`），并且只能在 Windows 上运行；同样，Linux 上的 ELF 二进制文件也是如此。因此，我们的宿主扩展代码是
    `SQLSERVR` Linux 进程的一部分，被编译为 ELF 二进制文件。它包含特殊逻辑，知道如何直接加载 `SQLPAL.DLL`（因为它是 PE 格式的二进制文件），并为它提供必要的链接以使用宿主扩展中的
    ABI 接口（换句话说，宿主扩展指示 `SQLPAL` 如何“动态地与之对话”）。


    宿主扩展还知道如何将磁盘上特殊打包文件中的 `SQLSERVR.EXE` 和 LibOS 二进制文件（我们将在第 2 章详细讨论这些）映射到进程地址空间。然后，`SQLPAL.DLL`
    知道如何加载 `SQLSERVR.EXE`，并让正常的 Windows 进程和 DLL 加载过程从此处开始。这里有一个关键点：所有这些代码都是为英特尔兼容处理器编译的，因此，用
    Robert Dorr 的话来说，“它本质上都是汇编代码。” 这也是我们的 `SQLSERVR.EXE` 代码无需更改就能在 Linux 上运行的原因之一。


    所以，总结一下，`SQLSERVR.EXE` 及其依赖的 DLL 被加载和运行的方式与在 Windows 上完全相同。LibOS 组件也是如此。`SQLPAL.DLL`
    是为 Windows 编译的，但其内部建有逻辑来实现 Windows 内核服务，或者在必要时通过调用其他函数（使用 ABI 接口）来实现某些内核服务。但 `SQLPAL.DLL`
    并不知道这些接口是在为 Linux 编译的代码中实现的。宿主扩展处理了所有这些事情。


    架构图中还有两个我尚未谈到的组件：


    *   注意到 `SQLAGENT` 也列在此图中。这是因为在 Linux 上安装 SQL Server 时，你会将 `SQLAGENT.EXE` 与 `SQLSERVR.EXE`
    一起加载到 `SQLSERVR` Linux 进程中。我知道这听起来很奇怪，但它工作得很好。`SQLPAL` 实现了进程隔离，这些进程并没有意识到它们处于同一个
    Linux 进程中。

    *   注意右下角有一个名为 `Parent Watchdog`（父看门狗）的进程。你将在本书后面听到更多相关内容，但实际上，这是一个名为 `SQLSERVR`、原生为
    Linux 编译的进程，是 SQL Server 启动时最先启动的程序。然后我们使用 Linux 的 `fork()` API 调用来创建另一个 `SQLSERVR`
    进程，该进程就是如图中所示的 SQL Server 引擎及其所有组件。它通过信号监控子 `SQLSERVR` 进程以执行转储，并在必要时使用 `systemd`
    服务进行重启，从而提供了一个便捷的目的。你可以阅读这篇博文了解更多关于其工作原理的内容：[`blogs.msdn.microsoft.com/bobsql/2018/07/18/sql-server-on-linux-why-do-i-have-two-sql-server-processes/`](https://blogs.msdn.microsoft.com/bobsql/2018/07/18/sql-server-on-linux-why-do-i-have-two-sql-server-processes/)。随着我在第
    2 章讲述探索 SQL Server on Linux 安装了什么，这种关系将变得更加明显。


    我意识到这看起来非常复杂，事实也确实如此，但它同时也简单而优雅。正是这种架构，让我们能够快速且高质量、高性能地将 SQL Server on Linux 推向市场。


    我在本章中包含这些细节，并不是因为你必须了解它们才能使用 SQL Server on Linux，而是为了澄清其工作原理上的任何困惑，并为该设计和架构提供可信度。


    而最重要的一点是。正如你将在下一节学到的，其核心...

