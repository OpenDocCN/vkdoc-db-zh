    normalized table designs. In this case, the People table is used to store information
    about


    a person, while other tables will reference these people in several ways. The
    Customers


    table contains information in columns that reference people who are customers
    for the


    WideWorldImporters company, and is part of the Sales schema.


    In addition, in the next section I will show you how to build an object called
    a


    sequence, so I will create a schema for those objects as well.'
  trans: '

    > **提示** Linux 的文件名区分大小写。如果你没有明确指定文件名，`SQL Server` 会严格按照你指定的大小写来创建文件名。在 Linux
    系统中，浏览和查找这些文件名时，大小写是敏感的。


    你还会喜欢 `SQL Server` 数据库的另一个特点是它们是**包含的**和**可移植的**。你能够备份一个数据库，并将其恢复到另一个相同或更高主版本的
    `SQL Server` 实例上。而且，你可以在 Linux 和 Windows 计算机之间进行这种操作，因为 `SQL Server` 在这两个平台上的核心数据库引擎是相同的。关于移动数据库的更多方面，我将在第
    9 章中介绍。


    如果你想首先花时间了解创建数据库时的所有选项，请参阅 `CREATE DATABASE` 命令的 `T-SQL` 参考文档：

    [`docs.microsoft.com/sql/t-sql/statements/create-database-sql-server-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-database-sql-server-transact-sql)。


    你可以从这个文档页面阅读关于 `ALTER DATABASE` 命令的更多详细信息，以及如何更改数据库选项或元数据：

    [`docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql)。


    ## 创建表


    创建一个数据库提供了容纳你数据的“外壳”。在这个外壳内部，有表来存储用户数据，以及索引来帮助加速数据访问或强制执行完整性检查。表和索引都需要以“页”为单位在数据库中存储，每页大小为
    8KB。这些 8KB 的页由行和用于物理描述这些行的内部结构组成（每页还有一个页头）。


    ## 第三章 构建数据库与 T-SQL 基础


    表中页内行的逻辑格式是由表的定义（包括列和数据类型）决定的。这也被称为表的 *schema*（架构）。这个术语可能会有些令人困惑，因为在 `SQL Server`
    中还有一种叫做 schema 的对象。Schema 对象是一个命名空间，用于在数据库中唯一地定义一个对象集合，这些对象可以是表以及其他对象，如索引和存储过程。Schema
    提供了一种便捷的方法来解耦对象所有权，允许在 schema 上设置权限，该权限适用于 schema 中的所有对象。


    多年来，在 `SQL Server` 中创建表的选项已经发展得非常丰富。在本章中，我将从简单开始。我将在本章中使用 `WideWorldImporters`
    数据库示例中的两个表。我将向你展示如何创建 schemas（架构）、称为“序列”的对象，以及包含称为“约束”对象的表。在本章后面，我将展示如何创建其他对象，如存储过程和视图。然后在下一章，我将利用这些示例定义，向你展示如何使用更高级的
    `T-SQL` 功能。


    ## 创建 Schemas（架构）


    在 `WideWorldImporters` 数据库中，有多个 schema，每个 schema 中又有多个表。可以用作展示 `SQL Server` 基本功能的两个表是
    `[Application].[People]` 表和 `[Sales].[Customers]` 表。`Application` schema 用于存储*参考*数据。这种数据通常很少修改，但会被其他更频繁修改的表引用。这符合规范化表设计的原则。在这个例子中，`People`
    表用于存储关于人员的信息，而其他表会以多种方式引用这些人员。`Customers` 表的列中包含有关 `WideWorldImporters` 公司客户的信息，它属于
    `Sales` schema。


    此外，在下一节中，我将向你展示如何构建一个称为“序列”的对象，因此我也将为这些对象创建一个 schema。

    '
- fmt: "# Chapter 3 - Building a Database and T-SQL Fundamentals\n\nThe syntax to\
    \ create schemas can be found in the sample script `` createschemas.sql ``.\n\n\
    Execute this script or the following T-SQL statements to create all schemas:\n\
    \n```sql\nUSE [WideWorldImporters]\nGO\n\nIF EXISTS (select * from sys.schemas\
    \ where name = 'Application')\nDROP SCHEMA [Application]\nGO\n\nCREATE SCHEMA\
    \ [Application]\nGO\n\nIF EXISTS (select * from sys.schemas where name = 'Sales')\n\
    DROP SCHEMA [Sales]\nGO\n\nCREATE SCHEMA [Sales]\nGO\n\nIF EXISTS (select * from\
    \ sys.schemas where name = 'Sequences')\nDROP SCHEMA [Sequences]\nGO\n\nCREATE\
    \ SCHEMA [Sequences]\nGO\n```\n\n## Creating Sequences\n\nSequence objects provide\
    \ a capability to generate unique key values each time they are needed for data\
    \ in a table. Another similar capability is called an identity column in SQL Server.\
    \ Sequence objects are created independent of the table and have some desirable\
    \ caching properties for performance. Sequence objects also are used in other\
    \ database engines and make them a nice portable feature.\n\nWhile Sequence objects\
    \ can be shared across tables, I’ll dedicate one sequence object for the two tables\
    \ I’ll be creating in this database (one for the People table and one for the\
    \ Customers table). Execute the `` createsequences.sql `` sample script or the\
    \ following T-SQL code to create the sequence objects:\n\n```sql\nUSE [WideWorldImporters]\n\
    GO\n\nDROP SEQUENCE IF EXISTS [Sequences].[PersonID]\nGO\n\nCREATE SEQUENCE [Sequences].[PersonID]\n\
    AS [int]\nSTART WITH 1\nINCREMENT BY 1\nMINVALUE 0\nMAXVALUE 2147483647\nCACHE\n\
    GO\n\nDROP SEQUENCE IF EXISTS [Sequences].[CustomerID]\nGO\n\nCREATE SEQUENCE\
    \ [Sequences].[CustomerID]\nAS [int]\nSTART WITH 0\nINCREMENT BY 1\nMINVALUE 0\n\
    MAXVALUE 2147483647\nCACHE\nGO\n```\n\nThe definition of the `SEQUENCE` object\
    \ for `[PersonID]` says to start with a value of 1 and allow a maximum value to\
    \ be the maximum number for an `int` datatype. The `CACHE` keyword helps improve\
    \ performance of `SEQUENCE` values. You can read more about `SEQUENCE` objects\
    \ in our documentation at [https://docs.microsoft.com/sql/t-sql/statements/create-sequence-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/create-sequence-transact-sql).\
    \ Notice the min value is 0 but the sequence starts with 1. This allows me to\
    \ use a value of 0 for the PersonID column without using the `SEQUENCE` object.\
    \ The definition of the `[CustomerID]` starts with a value of 0.\n\nI’ll show\
    \ you in the statements to create the tables how the sequence objects are used\
    \ to supply unique key values anytime a row is inserted into either of the two\
    \ tables.\n\n## Finally Creating the Tables\n\nNow that I have created the schemas\
    \ and sequences, I’m ready to create my two tables. Execute the following T-SQL\
    \ statement or the sample script `` createpeople.sql `` to create the People table:\n\
    \n```sql\nUSE [WideWorldImporters]\nGO\n\n-- The table definition for the [Application].[People]\
    \ table\n--\nDROP TABLE IF EXISTS [Application].[People]\nGO\n\nCREATE TABLE [Application].[People](\n\
    \    [PersonID] [int] NOT NULL,\n    [FullName] [nvarchar](50) NOT NULL,\n   \
    \ [PreferredName] [nvarchar](50) NOT NULL,\n    --     [SearchName]  AS (concat([PreferredName],N'\
    \ ',[FullName])) PERSISTED NOT NULL,\n    [IsPermittedToLogon] [bit] NOT NULL,\n\
    \    [LogonName] [nvarchar](50) NULL,\n    [IsExternalLogonProvider] [bit] NOT\
    \ NULL,\n    [HashedPassword] [varbinary](max) NULL,\n    [IsSystemUser] [bit]\
    \ NOT NULL,\n    [IsEmployee] [bit] NOT NULL,\n    [IsSalesperson] [bit] NOT NULL,\n\
    \    [UserPreferences] [nvarchar](max) NULL,\n    [PhoneNumber] [nvarchar](20)\
    \ NULL,\n    [FaxNumber] [nvarchar](20) NULL,\n    [EmailAddress] [nvarchar](256)\
    \ NULL,\n    [Photo] [varbinary](max) NULL,\n    [CustomFields] [nvarchar](max)\
    \ NULL,\n    --    [OtherLanguages]  AS (json_query([CustomFields],N'$.OtherLanguages')),\n\
    \    [LastEditedBy] [int] NOT NULL,\n    --    [ValidFrom] [datetime2](7) GENERATED\
    \ ALWAYS AS ROW START NOT NULL,\n    --    [ValidTo] [datetime2](7) GENERATED\
    \ ALWAYS AS ROW END NOT NULL\n    CONSTRAINT [PK_Application_People] PRIMARY KEY\
    \ CLUSTERED\n    (\n        [PersonID] ASC\n    )\n)\nGO\n```"
