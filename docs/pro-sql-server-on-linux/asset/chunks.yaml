    # 第三章：构建数据库与 T-SQL 基础


    ```sql

    -- 为 People 表中引用主键的列添加外键

    ALTER TABLE [Application].[People] WITH CHECK ADD CONSTRAINT [FK_Application_People_Application_People]
    FOREIGN KEY([LastEditedBy])

    REFERENCES [Application].[People] ([PersonID])

