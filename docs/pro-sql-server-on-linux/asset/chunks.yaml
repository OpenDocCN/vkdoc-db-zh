    SQL Server. SQL Server has a complex and powerful memory management system built
    into the engine. Various components within SQL Server consume memory and record
    memory usage through the concept of a `memory clerk`. This `DMV` will show memory
    usage by clerk across the SQL Server engine. The following example based on the
    sample script `dm_os_memory_clerks.sql` shows which memory clerks use the most
    memory at any point in time:


    ```sql

    -- Find out which components in SQL Server are using the most memory

    --

    SELECT type, name, (pages_kb+virtual_memory_committed_kb+awe_allocated_kb) total_memory_kb

    FROM sys.dm_os_memory_clerks

    ORDER BY total_memory_kb DESC

    GO

    ```


    Figure 5-33 shows the results of this query on my SQL Server on Linux immediately
    after startup.


    **Figure 5-33. SQL Server memory clerks immediately after startup**


    ## ChapTer 5 SQL Server TooLS


    There is no detailed documentation on mapping different memory clerk types and
    what component of the SQL Server engine they belong to. Here are the most common
    ones I believe you will see consume the most memory on a typical SQL Server:


    `MEMORYCLERK_SQLBUFFERPOOL`: Buffer pool database pages. This is typically the
    largest consumer of memory.


    `CACHESTORE_SQLCP`: Plan cache for ad-hoc SQL Server queries.


    `CACHESTORE_OBJCP`: Plan cache for SQL Server objects such as stored procedures.


    `CACHESTORE_COLUMNSTOREOBJECTPOOL`: Memory consumed by columnstore indexes.


    `MEMORYCLERK_XTP`: Memory for In-Memory OLTP memory optimized tables.


    You can find the complete documentation for this `DMV` at [sys-dm-os-memory-clerks-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-memory-clerks-transact-sql).


    `dm_tran_locks`: A list of current locks held by active requests. This `DMV` could
    be helpful when you experience a blocking problem in SQL Server, to discover what
    locks are being held by a specific session, request, and query. Here is an example
    query as found in the sample script `dm_tran_locks.sql`:


    ```sql

    -- Show locks are that requested or granted by active sessions and queries

    --

    SELECT resource_type, request_mode, request_request_id, resource_database_id,
    resource_associated_entity_id, resource_type, resource_description

    FROM sys.dm_tran_locks

    GO

    ```


    See the documentation for this `DMV`, including a good example about how to use
    this for a blocking scenario, at [sys-dm-tran-locks-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-tran-locks-transact-sql).


    `dm_db_missing_index_details`: I showed you in Chapter [3 ho](#index_split_002.html#p99)w
    to create constraints for building keys, which are implemented via indexes. Indexes
    can also help boost query performance. As you run SQL Server queries, the engine
    can recognize scenarios where an index is not available and could help with performance.
    These recommendations are available via this `DMV`. I will cover the usage of
    this `DMV` and other performance tools in Chapter [6 . H](#index_split_003.html#p250)ere
    is an example query found in the sample script `dm_db_missing_index_details.sql`
    to find all recommended missing indexes in SQL Server.


    ```sql

    -- Find the current recommended missing indexes for all databases and objects

    --

    SELECT index_handle, database_id, object_id, equality_columns, statement

    FROM sys.dm_db_missing_index_details

    GO

    ```


    This `DMV` is cleared after SQL Server is restarted. The complete documentation

