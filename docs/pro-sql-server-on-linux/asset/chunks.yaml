    \ uncordon <节点名称>\n    ```\n\n你可以看到 k8s 内置 HADR 的强大之处。不需要故障转移集群实例软件，而且坦白说，SQL\
    \ Server 并不知道自己运行在这种 HADR 环境中。与任何 SQL Server 生产环境一样，务必制定可靠的备份策略。\n\n我得承认，这是我写过的比较有趣的一章，因为我相信容器和\
    \ k8s 是令人惊叹的新技术，对于托管像 SQL Server 这样的应用和数据库系统将变得越来越流行。在本章中，我向你介绍了容器的基础知识，展示了如何部署和使用带有\
    \ SQL Server 的容器，甚至挑战了 MacBook 用户“无需 Windows”地使用 SQL Server。最后，我通过介绍一种称为 Kubernetes（k8s）的托管\
    \ SQL Server 和容器的新方式来结束本章。\n\n## 总结\n\n随着本章结束，我也完成了本书的撰写。这是我在微软 25 年职业生涯中做过的最愉快也最困难的事情之一。我带你开启了一段旅程，从\
    \ SQL Server 在 Linux 上的历史背景开始，到部署过程和细节。然后，我向你展示了如何构建自己的数据库和应用程序。接着，我详细介绍了 SQL\
    \ Server 为你提供的所有满足需求的惊人工具和内置功能。然后，通过了解性能、安全和 HADR 方面的能力，你能够看到 SQL Server 真正有多健壮。之后，我让你深入了解了适用于\
    \ Linux 上 SQL Server 的强大管理和监控功能。在第 10 章，我向你展示了迁移技术，包括 SQL Server 与 PostgreSQL\
    \ 的比较。然后你刚刚读完了关于容器技术的章节，它为部署和运行 SQL Server 带来了一系列新场景。我希望你喜欢阅读本书，并能在未来你使用 Linux\
    \ 上的 SQL Server 和容器的旅程中将其作为参考。\n\n## 第 12 章：结语\n\nSQL Server 工程团队以*云的速度*前进。这是我的观察。"
- fmt: '# SQL Server 的未来：Linux、容器与新功能展望


    自两年前加入团队以来，我一直见证着 SQL Server 的快速发展。我的好友兼 SQL Server 产品的架构师 Conor Cunningham 曾告诉我，如果我们想的话，微软如今每个月都能发布一个高质量的
    SQL Server 版本。这与“Yukon”（SQL Server 2005）时代相去甚远，那时发布一个版本需要好几年时间。当然，新版本需要有价值和新特性才能在行业中站稳脚跟，所以每月发布一次可能并不合适。SQL
    Server 2017 紧随 SQL Server 2016 之后发布，其重要的一部分是将 SQL Server on Linux 推向市场。


    那么 SQL Server 的下一步是什么，尤其是对于 SQL Server on Linux 和容器而言？


    ## SQL Server 2017 的改进亮点


    在 2017 年 10 月宣布 SQL Server 2017 的同时，我们的团队已经在着手开发下一版 SQL Server，其中包括专门针对 SQL Server
    on Linux 和容器的改进。到本书出版时，我们很可能已经宣布了关于如何改进 SQL Server on Linux 和容器的消息。这些增强功能包括但不限于：


    *   `SQL Server Replication`

    *   `Machine Learning Services`（包括 R、Python，甚至可能还有其他语言）

    *   分布式事务 (`DTC`) 支持

    *   用于复制和链接服务器的 `Active Directory` 集成

    *   适用于 SQL Server on Linux 的 `Polybase`


    © Bob Ward 2018

    B. Ward, *Pro SQL Server on Linux*, [https://doi.org/10.1007/978-1-4842-4128-8_12](#index_split_008.html#p604)


    ## 第十二章 后记


    我们还想继续让容器拥有出色的体验，因此我们计划进行以下改进：


    *   用于 `RHEL` 的容器镜像

    *   将容器注册到 `Microsoft Container Registry` (`MCR`；你仍然可以在 `Docker Hub` 上找到它们，但它们将链接到
    `MCR`)。你可以在 [https://azure.microsoft.com/blog/microsoft-syndicates-container-catalog](https://azure.microsoft.com/blog/microsoft-syndicates-container-catalog)
    阅读更多关于 `MCR` 的信息。

    *   `Kubernetes` 对 `Always On Availability Groups` 的支持。这一点令人兴奋，因为它为 `k8s` 上的 `SQL
    Server` 提供了比共享存储好得多的 `RTO` 方案。Travis Wright 已经制作了一个视频来预览这一体验：[https://youtu.be/Xa1ec4z6XIk?list=PL-_k_UrAvrYsSydSyVeXIXy-vInFEruxr](https://youtu.be/Xa1ec4z6XIk?list=PL-_k_UrAvrYsSydSyVeXIXy-vInFEruxr)。


    你还会看到，微软为下一版 SQL Server（包括 Windows 和 Linux 版本）准备了其他新功能和增强功能。此外，我们正在研究与大数据系统集成的新创新，以及
    `SQL Operations Studio` 的普遍可用版（如果这个工具有了新名字，我也不会感到惊讶）。


    SQL Server 的未来是光明的。在 Linux 上发布 SQL Server 为微软打开了新市场、新客户和新机遇。与此同时，我们仍然坚信 SQL Server
    on Windows Server 是一个绝佳的组合。这一切都是关于选择与兼容性：你的选择。加倍投入容器和 `Kubernetes` 等新技术，使 SQL
    Server 成为面向所有开发者、应用程序以及私有和公共云环境的数据平台。我期待继续帮助微软，使 SQL Server 在未来岁月里成为首选的现代数据平台。


    `Index`


