    spid51      * *************************************************************


    *************


    spid51      *


    spid51      * BEGIN STACK DUMP:


    spid51      *   07/30/18 22:05:25 spid 1


    spid51      *


    spid51      * StackDump (all)


    In the /var/opt/mssql/log directory will be three files:


    **SQLDump0001.txt:** Text file with information about the reason


    for the dump and important data structures


    **SQLDump0001.log:** A portion of the ERRORLOG near when the


    dump was created


    **SQLDump0001.mdmp:** The minidump file of the SQL Server


    process. Remember, this file is generated by SQL Server running


    within the SQLPAL architecture, so it’s a representation of a


    minidump for SQLSERVR.EXE Windows process.


    At this point, you can load the SQLDump0001.dmp file with the Windows Debugger


    (windbg). You can learn more about the Windows Debugger at [https://docs.](https://docs.microsoft.com/windows-hardware/drivers/debugger/getting-started-with-windows-debugging)


    [microsoft.com/windows-hardware/drivers/debugger/getting-started-with-](https://docs.microsoft.com/windows-hardware/drivers/debugger/getting-started-with-windows-debugging)


    [windows-debugging](https://docs.microsoft.com/windows-hardware/drivers/debugger/getting-started-with-windows-debugging).
    Reading dump files with the Windows Debugger definitely requires advanced skills.
    Again, these files are generated for diagnostics purposes to be used by


    Microsoft technical support and SQL Server Engineering. However, it is possible
    to use


    the Windows Debugger along with the Microsoft public symbol server to look at
    call


    stacks associated with the reason for the dump (e.g., Access Violation) and possibly


    determine if the problem may be fixed already by Microsoft or a general idea of
    where in


    the code the problem is occurring and avoid it.


    Chapter 9   Managing and Monitoring SQL Server


    ** Core Dump Files**


    In some rare situations, SQL Server cannot handle an exception or critical error.
    On


    Linux, when a process crashes and cannot handle the exception, a  *core dump* is
    typically


    generated. A core dump represents a dump of the entire process memory of a Linux


    process. (I always wanted to know why it is called core dump and found out that
    the term


    comes from older UNIX systems that used magnetic core memory.)


    For SQL Server, we wanted to provide rich diagnostics and control how a core dump


    is generated, should the sqlservr Linux process encounter what normally would
    result in


    a Linux core dump.


    If you remember, in Chapt[er 1](#index_split_000.html#p24) I talked about how
    SQL Server on Linux has two


    processes. One of the processes is the  *watchdog* process that forks the child
    process,


    the actual SQL Server database platform. In addition, I talked about some of the
    files


    installed with SQL Server in the /opt/mssql/bin directory. This directory contains
    the


    sqlservr binary but also some other files including a shell script called **handle-crash.sh**


    and a program called **paldumper**.


    The flow of a core dump for SQL Server then looks like the following:


    •  The  *watchdog* sqlservr process listens on a signal if the child process


    crashes.


    •  When signaled, the watchdog process will invoke the handle-crash.sh


    script.


    •  handle-crash.sh invokes the paldumper program to generate the core


    dump.


    Other information is collected in addition to the core dump and compressed into
    a


    .tbz2 file.


    Let’s see this in action using the following example:


    **Note**  do not try this in production, as it will terminate the sqlservr process


    unexpectedly.


    1.  Make sure SQL Server is running.


    2.  Find the process ID of the child process. Use the following


    command from the bash shell:


    ps -auxf | grep sqlservr


    ![](index-512_1.png)


    Chapter 9   Managing and Monitoring SQL Server


    3.  The second process listed for sqlservr is the actual sqlservr engine


    or child process.


    4.  Run the following command to kill the process:


    sudo kill -s SIGSEGV <pid>


    This command sends a signal to the sqlservr process that it is not prepared to
    handle'
