    `pgsql`确实支持数据库页的校验和概念。但是，您必须在首次使用`initdb`初始化`pgsql`时指定是否启用此选项。此外，[其文档](https://www.postgresql.org/docs/current/static/app-initdb.html)指出“...启用校验和可能会带来显著的性能损失”。在`pgsql`中，校验和无法按数据库进行控制。SQL
    Server 默认为数据库启用校验和，我们这样做是因为它不会带来显著的性能损失。此外，我们允许您随时在数据库范围内开启或关闭此功能。


