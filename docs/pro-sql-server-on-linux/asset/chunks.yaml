    - Note that during a `RESTORE DATABASE`, the state of the database is `RESTORING`
    and then the state moves to `RECOVERING` during the recovery phase of the database
    restore.


    ## More About Checksum


    I’ve mentioned the concept of a database checksum several times in the book.


    Checksum is an important concept added in SQL Server 2005 to indicate a database
    page has been altered after it has been written to disk. If SQL Server finds a
    database page has been altered and fails a checksum, the following error will
    be written to the `ERRORLOG`:


    `Msg 824`, SQL Server detected a logical consistency-based I/O error: incorrect
    checksum (expected: 0xdec71ff7; actual: 0xb0499fcf). It occurred during a read
    of page (`<pageid>`)...


    ![](index-482_1.jpg)


    # Chapter 9 Managing and Monitoring SQL Server


    In addition, an entry is written into the `suspect_pages` found in the `msdb`
    database.


    Remember, this is a condition that can trigger an automatic page repair for `Always
    On Availability Groups`. Over the years, I’ve had questions about how a checksum
    really works, so I’ll describe it here. Figure [9-4](#index_split_006.html#p482)
    shows a diagram I’ve created to give a sense for the basics of a checksum.


    ### Figure 9-4. How a checksum works in SQL Server


    Let me explain the flow. If the `PAGE_VERIFY=CHECKSUM` is set for a database (the
