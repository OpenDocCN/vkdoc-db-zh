    # 第 5 章 SQL Server 工具


    ## 创建和管理扩展事件会汉


    示例查询`start_xevent_session.sql`展示了如何启动已创建的会话：


    ```sql

    -- Start the XEvent session

    ALTER EVENT SESSION [QuickSessionStandardToFile] ON SERVER STATE = start

    GO

    ```


    默认情况下，扩展事件会话的文件目标存储在`/var/opt/mssql/log`目录中。


    创建扩展事件会话时有多种选项可选，例如控制内存和可扩展性。您可以在我们的文档中找到完整的选项列表：[`docs.microsoft.com/sql/t-sql/statements/create-event-session-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-event-session-transact-sql)。SQL
    Server 还提供了在首次启动 SQL Server 时启动您创建的会话的功能，这需要在创建事件定义时使用`STARTUP_STATE`选项（例如，可以用于跟踪启动时的数据库恢复过程）。


    创建扩展事件会话后，您可以添加事件或修改定义。如何操作可以在我们的文档中找到：[`docs.microsoft.com/sql/relational-databases/extended-events/alter-an-extended-events-session`](https://docs.microsoft.com/sql/relational-databases/extended-events/alter-an-extended-events-session)。


    一个极好的内置扩展事件会话是`system_health`会话。我将在第 9 章讨论如何使用此会话。


    ## 工具


    扩展事件可以通过 T-SQL 语言进行控制和使用。要查看基于内存的扩展事件目标的数据，您可以查询`dm_xe_session_targets` DMV。如何查看`ring_buffer`目标中
    XML 数据的示例可以在我们的文档中找到：[`docs.microsoft.com/sql/relational-databases/extended-events/targets-for-extended-events-in-sql-server#h2_target_ring_buffer`](https://docs.microsoft.com/sql/relational-databases/extended-events/targets-for-extended-events-in-sql-server#h2_target_ring_buffer)。


    文件目标可以使用 T-SQL 读取，通过系统函数`sys.fn_xe_file_target_read_file`实现，该函数的文档位于：[`docs.microsoft.com/sql/relational-databases/system-functions/sys-fn-xe-file-target-read-file-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-functions/sys-fn-xe-file-target-read-file-transact-sql)。


    应用程序开发人员能够读取 XEvent 目标，包括通过以下对象模型实现“实时”事件流目标：[`msdn.microsoft.com/library/microsoft.sqlserver.management.xevent.aspx`](https://msdn.microsoft.com/library/microsoft.sqlserver.management.xevent.aspx)
    和 [`msdn.microsoft.com/library/microsoft.sqlserver.xevent.linq.aspx`](https://msdn.microsoft.com/library/microsoft.sqlserver.xevent.linq.aspx)。

