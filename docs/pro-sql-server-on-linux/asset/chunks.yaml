  trans: '

    # 第 6 章：性能特性


    [by-in-memory-oltp](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/transact-sql-constructs-not-supported-by-in-memory-oltp).


    ## 使用场景


    如果您有足够的内存来容纳数据，并且需要一个高速、可扩展的 OLTP 解决方案，那么内存优化表可能很适合您。您可以使用我们文档中的这个位置来估算内存优化表的内存需求：[`docs.microsoft.com/sql/relational-databases/in-memory-oltp/estimate-memory-requirements-for-memory-optimized-tables`](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/estimate-memory-requirements-for-memory-optimized-tables).


    内存 OLTP 的用途比传统的`INSERT`、`UPDATE`、`DELETE`类型 SQL 应用更广泛。请考虑以下其他示例：

    *   数据摄取应用程序，特别是物联网（`IoT`）场景

    *   缓存和会话状态数据

    *   替代`tempdb`的使用

    *   提取转换加载（`ETL`）场景


    请查阅我们的文档，获取有关这些场景的更多指导以及一些客户案例研究示例：[`docs.microsoft.com/sql/relational-databases/in-memory-oltp/overview-and-usage-scenarios`](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/overview-and-usage-scenarios).


    ## 智能的 SQL Server 引擎


    我在本章中介绍了 SQL Server 引擎内置或通过配置设置、以及像`列存储`索引这样的附加功能提供的所有出色性能特性。在 SQL Server 2017
    中，我们决定开始投资于那些能为 SQL Server 引擎提供更多`智能`的功能，以帮助提升应用程序性能并减少解决性能问题的时间。其中一个功能内置于查询处理引擎中，另一个则在启用`查询存储`功能时内置在引擎中。


    ## 自适应查询处理


    虽然 SQL Server 中的查询处理器是引擎的一个惊人组件，旨在构建最佳查询计划并同时保持较快的编译时间，但在某些情况下，查询处理器的决策能力会受到限制。而许多这些场景都涉及到基于基数估计的限制。


    因此，在 SQL Server 2017 中，我们没有总是“徒劳无功”地试图修复这些基数问题，而是构建了使查询处理器能够`适应`查询执行问题并“即时”纠正它们的功能。


    这一系列功能被称为`自适应查询处理`（这实际上是 SQL Server 计划中更广泛的功能集`智能查询处理`的一部分）。


    在 SQL Server 2017 中，我们启用了三种不同的自适应查询处理场景：

    *   批处理模式内存授予反馈

    *   批处理模式自适应连接

    *   交错执行


    如果您还记得前面关于`列存储`索引的部分，我曾提到过`批处理模式`处理这个主题。这意味着，对于前两个场景，自适应查询处理仅在查询处理器使用批处理模式时才有效。在
    SQL Server 2017 中，这仅适用于`列存储`索引的场景。


    第一个场景，即批处理模式内存授予反馈，其概念是：如果 SQL Server 检测到某个查询已执行并使用了错误的内存授予，它将调整该查询的内存分配。该查询的后续执行将适应新的授予，从而避免性能问题。此检测内置于查询处理器中，不需要重新编译查询。


    第二个场景是 SQL Server 通过创建新查询计划进行适应的一个例子。

    '
- fmt: '# Adaptive Query Processing


    operator that is `intelligent` to adapt. The new operator is called an `Adaptive
    Join` operator.


    The concept is that SQL Server can defer deciding a particular type of join method
    to use when joining tables until after it has read data to decide which join method
    is best.


    The third scenario involves the SQL Server query optimizer adapting itself during
    the compilation of a query plan for a multistatement table valued function, which
    has challenges for cardinality estimation. The optimizer will pause optimization,
    gather more accurate cardinality information, and resume optimization to adapt
    to a better query plan.


    To see adaptive query processing in action, download the examples files for this
    chapter from the `` `aqp` `` directory and follow the instructions in the `` `readme.md`
    `` file.


    **Note** This demo requires the WideWorldImportersDW sample database as found
    at [https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak).
    So you can copy the backup from another machine or run the following command to
    download the backup directly in your Linux server:


    ```bash

    wget https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak

    ```


    I’ve also provided the `` `cpwwidw.sh` ``, `` `restore_wwidw_linux.sql` ``, and
    `` `restorewwidw.sh` `` scripts to help you copy and restore this example.


    ![](index-334_1.jpg)


    ## Chapter 6 Performance Capabilities


    When you go through the demo for adaptive joins, as found in the `` `aqp_adaptivejoin.sql`
    `` example script, display the actual execution plan for the final query of the
    demo. Your query plan should look something similar to Figure 6-21.


    ***Figure 6-21.** An adaptive join as part of adaptive query processing*


    Note the `Adaptive Join` operator has an `Actual Join Type`, which in this case
    is `Nested Loops` based on the values of data at the time of the query execution.
    In the demo script, the previous query had a join type of `Hash Join`.


    Adaptive query processing is enabled in the SQL Server query processor if you
    are using database compatibility `140`. This is the default compatibility level
    if you create a new database with SQL Server 2017. I’ll talk about database compatibility
    for upgrade and migration scenarios in a later chapter in the book on migration.


    The lead Program Manager for this area of the product, Joe Sack, has a really
