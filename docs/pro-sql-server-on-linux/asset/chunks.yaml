- fmt: "## Chapter 11: SQL Server and Containers\n\nIt took about five minutes for\
    \ my pod to show a status of `Running`. Your output should look something like:\n\
    \n```text\nNAME                                  READY   STATUS    RESTARTS  \
    \ AGE\nmssql-deployment-3813464711-h312s    1/1     Running   0          17m\n\
    ```\n\n*   `sqlcmd` (Yes!) is built into the Azure CloudShell, so I was able to\
    \ connect to my new SQL Server deployment by using the external IP address of\
    \ the Load Balancer service.\n*   If you go through the exercise of deleting a\
    \ pod to see how HADR works, it could take up to four minutes or so for the new\
    \ pod to start up. This is unfortunately one of the weaknesses of using SQL Server\
    \ with k8s. Four minutes can be a long time for SQL Server to be down. We are\
    \ working to bring other innovations in the future to SQL Server and k8s to make\
    \ this faster and better.\n\n*   Use the following command with `kubectl` to see\
    \ which node your pod is running on:\n\n    ```\n    kubectl get pods -o wide\n\
    \    ```\n\n*   K8s even supports restarting the container running SQL Server\
    \ should it crash, or if SQL Server is shutdown. Try it yourself. Connect to the\
    \ SQL Server container via the external IP address of the load balancer and execute\
    \ the T-SQL `SHUTDOWN` command. If you then execute `kubectl get pods`, you will\
    \ briefly see the `STATUS` of `Error` and `CrashLoopBackOff`, but then within\
    \ the same pod it will be back to `Running`.\n*   Here is an advanced test. Try\
    \ *draining* the node where the pod is running with the SQL Server container.\
    \ Draining a node is a way to simulate a node failure. The `kubectl get pods -o\
    \ wide` command shows the name of the node for the running pod. Using that name,\
    \ execute the following command:\n\n    ```\n    kubectl drain <node name> --ignore-daemonsets\n\
    \    ```\n\n    Now use `kubectl get pods -o wide` to see the SQL Server container\
    \ get started with a new pod on a new node. To allow the node you drained to be\
    \ used again, run the following command:\n\n    ```\n    kubectl uncordon <node\
    \ name>\n    ```\n\nYou can see the power of built-in HADR with k8s. No failover\
    \ cluster instance software is required, and SQL Server is quite frankly unaware\
    \ it is running in this HADR environment. As with any SQL Server production environment,\
    \ always include a solid backup strategy.\n\nI have to admit this was one of the\
    \ more fun chapters to write, as I believe containers and k8s are amazing new\
    \ technologies that will become more and more popular for hosting application\
    \ and database systems like SQL Server. In this chapter, I introduced you to the\
    \ basics of containers, showed you how to deploy and use containers with SQL Server,\
    \ and even challenged MacBook users to use SQL Server \"Windows free.\" Then I\
    \ concluded the chapter with a look at the new way to host SQL Server and containers\
    \ called Kubernetes (k8s).\n\n## Summary\n\nAnd with this chapter I have concluded\
    \ the book, one of the most enjoyable yet difficult things I’ve done in my 25-year\
    \ career at Microsoft. I have taken you on a journey starting with the history\
    \ behind SQL Server on Linux and the deployment process and details. I then showed\
    \ you how to build your own database and application. I then detailed out all\
    \ the amazing tools and built-in features SQL Server provides for all of your\
    \ needs. Then you were able to see how robust SQL Server truly is by seeing the\
    \ capabilities of performance, security, and HADR. I then gave you insight into\
    \ powerful management and monitoring features for SQL Server on Linux. In Chapter\
    \ 10 I showed you migration techniques including a comparison of SQL Server with\
    \ PostgreSQL. And then you just completed reading the chapter on the technology\
    \ of containers bringing a new set of scenarios to deploy and run SQL Server.\
    \ I hope you have enjoyed reading through the book and will be able to use it\
    \ for your reference in the future for your journey with SQL Server on Linux and\
    \ containers.\n\n## CHAPTER 12: Epilogue\n\nThe SQL Server Engineering team moves\
    \ at the *speed of the cloud*. That is my observation."
