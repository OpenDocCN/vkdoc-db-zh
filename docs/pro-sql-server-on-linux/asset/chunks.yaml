- fmt: '# troubleshooting install


    To complete this section, I consulted with our expert at Microsoft in Technical
    Support, Pradeep M.M., on the most common issues he has seen for installation
    failures and how to remedy them. What I found was interesting. It turns out that
    because of the way we have made our installation lightweight and built into the
    native Linux distribution package management systems, Microsoft has seen very
    few problems for customers trying to install SQL Server on Linux to this point.


    Having said that, the following are a few possible scenarios and how you can address
    them.


    ## poor or no internet connectivity


    I’ve seen the problem of poor or no Internet connectivity myself while installing
    SQL Server on Linux using standard installation techniques, which requires Internet
    connectivity to pull down the packages.


    Figure 2-13 shows an example of a failure when trying to install SQL Server on
    RHEL when the Linux server does not have Internet connectivity.


    ![](index-82_1.png)


    ![](index-82_2.png)


    *Figure 2-13. A failed SQL Server installation due to no Internet connectivity*


    It is possible to have problems like this even when your Linux server has connectivity,
    but the connection is so poor a consistent package cannot be downloaded.


    ## install not completed with mssql-conf


    This is perhaps the most common problem support has seen, and I’ve seen this myself
    with some customers I talk to. We might have made the installation with package
    managers look so easy; it could be that many people don’t see the message that
    they must run `mssql-conf` to complete the installation.


    If you use a package manger like `yum` to install `mssql-server` but don’t complete
    the installation with the command:


    ```

    sudo /opt/mssql/bin/mssql-conf setup

    ```


    and then try to connect to SQL Server with a tool like `sqlcmd`, you will get
    a failure like in Figure 2-14.


    *Figure 2-14. A failed connection due to SQL Server installation not complete*


    ![](index-83_1.png)


    ![](index-83_2.png)


    One of the clues to this problem can be seen by looking at the status of the `mssql-server`
    service with the command:


    ```

    sudo systemctl status mssql-server

    ```


    Figure 2-15 shows the service is enabled but not running.


    *Figure 2-15. The mssql-service before a completed mssql-conf setup*


    ## the yum lock


    Another problem you may see can happen with other package managers. Basically,
    we have seen an installation failure occur when more than one installation of
    `mssql-server` was attempted at the same time. We call this a “yum lock” problem.
    Figure 2-16 shows an example of what you will see when this occurs.


    *Figure 2-16. A failed SQL Server installation when another install is in progress*


    ## changing permissions or ownership of sql server directories


    The SQL Server directories for `/opt/mssql` and `/var/opt/mssql` have specific
    permissions and ownership assigned. Do not change these or you may have issues
    with installation, starting SQL Server, using the product, or properly creating
    databases.


    ## debugging installation


    The various package management systems have log files and methods to provide more
    insights about the installation.


    The following commands on RHEL can provide more information about a history of
    installs:


    ```

    sudo yum history list

    sudo yum history info

    ```


    The `yum` package manager also provides options to dump out more details of the
    installation process. Here is an example command to dump out details of the `mssql-server`
    installation. Some of the details from these options may give you enough information
    to debug an install problem.


    ```

    sudo yum install mssql-server --errorlevel 10 --debuglevel 10 --rpmverbosity debug
    --verbose

    ```'
