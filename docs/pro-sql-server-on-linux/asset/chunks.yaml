    # 第 6 章：性能能力


    ## 概述


    本节将讨论 SQL Server 中的各种性能能力，重点关注 DMV（动态管理视图）和系统特性。


    ## 调度器与任务


    你可以使用 DMV 来查看有多少工作线程正在运行，或者有多少任务正在等待从池中获取工作线程。图 6-1 展示了在我的一台配置有四个逻辑 CPU 的虚拟机上运行的
    Linux 版 SQL Server 中，此 DMV 的输出示例：（注：你可以使用示例脚本 `dm_os_schedulers.sql` 来查看你的 SQL
    Server 的此输出）。


    **图 6-1.** 在运行于 Linux 上、拥有四个 CPU 的虚拟机中的 `dm_os_schedulers`


    四个状态为 `VISIBLE ONLINE` 的调度器是用于运行 SQL Server 任务和工作线程的*正常*调度器。`HIDDEN` 调度器则用于安排一些后台任务和其他任务（如备份）的工作。你可以在
    [`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-schedulers-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-os-schedulers-transact-sql)
    找到此 DMV 的完整文档。


    ## SQLOS DMV


    ### `dm_os_nodes`


    此 DMV 列出了运行 SQL Server 的服务器上检测到的所有 NUMA 节点。即使是不具备 NUMA 节点的服务器也会有一个 `node_id=0`。`Node_id=64`
    是为专用管理员连接（DAC）保留的一个特殊节点。我将在本书后面的章节中详细讨论 DAC。


    SQLOS 通过这些 DMV 暴露任务、工作线程和线程：


    ### `dm_os_workers`


    此 DMV 列出了所有正在执行或能够为 SQL Server 执行任务的工作线程。SQL Server 的工作线程是在调度器分组中的池中创建的。SQL Server
    将从池中分配工作线程来执行到达的任务（而不是为每个请求专门分配一个线程）。默认情况下，`max worker threads = 0` 的配置（这意味着*动态*）。值为
    0 表示 SQL Server 根据 [`docs.microsoft.com/sql/database-engine/configure-windows/configure-the-max-worker-threads-server-configuration-option`](https://docs.microsoft.com/sql/database-engine/configure-windows/configure-the-max-worker-threads-server-configuration-option)
    中记录的公式创建一个最大工作线程池。


    `sys.dm_os_sys_info` DMV 列出了当前计算出的 `max worker threads` 值。对于大多数场景，你应该能够将 `max
    worker threads` 配置值保留为 0，让 SQL Server 计算该值。然而，在某些情况下，你可能希望使用系统存储过程 `sp_configure`
    覆盖默认值，将 `max worker threads` 更改为固定值。我将在本章后面讨论这个选择。


    ### `dm_os_tasks`


    SQL Server 中的任何*工作单元*都是一个任务。任何登录、查询或后台任务都是一个任务。可以将任务视为 SQL Server 中用于在 SQL Server
    引擎中执行代码的函数。任务由工作线程运行。在某些情况下，任务可能需要等待工作线程。在这些情况下，该任务将在此 DMV 中列出，并且在 `dm_os_waiting_tasks`
    中该任务的 `wait_type` 将是 `THREADPOOL`。大量任务等待 `THREADPOOL` 可能表明 SQL Server 存在问题。


    我多年前在这篇博客文章中记录了一些关于 `THREADPOOL` 等待的信息：[`blogs.msdn.microsoft.com/psssql/2009/11/24/doctor-this-sql-server-appears-to-be-sick/`](https://blogs.msdn.microsoft.com/psssql/2009/11/24/doctor-this-sql-server-appears-to-be-sick/)


    我的朋友 Paul Randal 在他的博客文章 [`www.sqlskills.com/help/waits/threadpool/`](https://www.sqlskills.com/help/waits/threadpool/)
    中对如何处理 `THREADPOOL` 等待有另一段精彩的描述。当一个任务绑定到工作线程时，它就变成了一个*请求*，并将出现在 `sys.dm_exec_requests`
    中。


    ## 自动软 NUMA


    由于现代 NUMA 和 CPU 架构可以支持每个 CPU 超过八个物理核心，我们在 SQL Server 2016 中引入了一个名为**自动软 NUMA**
    的特性，这样 SQL Server 可以在代码中对节点和 CPU 进行逻辑分区，以提供更好的可扩展性。


    为了理解 SQL Server 如何检测 CPU 和 NUMA 节点（以及使用自动软 NUMA），让我们看一个例子。我在微软的实验室中有一台机器，拥有四个
    NUMA 节点，每个节点一个 CPU 插槽，每个插槽 24 个核心（未启用超线程，因此总共 96 个 CPU）。


    当我在该计算机上安装 SQL Server 时，`ERRORLOG` 文件通过以下条目检测 CPU 和核心，如图 6-2 所示。


    **图 6-2.** SQL Server `ERRORLOG` 中检测到可用 CPU 的条目


    如果 SQL Server 检测到每个 CPU 的物理核心数超过八个，则将启用自动软 NUMA。然后 SQL Server 将尝试对 NUMA 节点（在 SQL
    Server 内部是逻辑的）进行分区，以尽可能接近每个节点八个 CPU。图 6-3 显示了自动软 NUMA 如何在此计算机上跨四个 NUMA 节点在 SQL
    Server 内部逻辑地分区了这 96 个 CPU。


    **图 6-3.** NUMA 和 CPU 映射的 `ERRORLOG` 条目


    自动软 NUMA 默认启用，但你可以通过 `ALTER SERVER CONFIGURATION` 禁用它（也许你怀疑它导致了性能问题）。你可以在我们的文档
    [`docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql)
    中阅读更多关于自动软 NUMA 的信息。


    要了解如何读取 `ERRORLOG` 中关于“CPU 掩码”的映射，以查看哪些 CPU 映射到特定的 NUMA 节点，请参阅这篇我详细讨论自动软 NUMA
    以及如何解读 CPU 映射的博客文章：[`blogs.msdn.microsoft.com/bobsql/2016/11/29/how-it-works-it-just-runs-faster-auto-soft-numa`](https://blogs.msdn.microsoft.com/bobsql/2016/11/29/how-it-works-it-just-runs-faster-auto-soft-numa)。


    ## 线程亲和性


    由于 SQLOS 控制调度器和线程执行，因此可以将 SQL Server 工作线程分配给特定的 NUMA 节点和/或 CPU。此过程称为*亲和性*。我将在本书后面的章节中进一步讨论亲和性。


    ## 动态内存与缓存管理


    SQL Server 旨在适应并最大化计算资源。内存可能是数据库性能最重要的资源之一。SQL Server 为数据库页（缓冲区）以及缓存的 T-SQL 查询和计划等重要资源提供了一个强大的内存管理系统。SQL
    Server 还管理其他内部需求的内存，并通过内存书记员系统进行跟踪。（我在第 5 章提到的一个动态管理视图是 `dm_os_memory_clerks`）。


    SQL Server 内存管理的另一个惊人方面是*动态内存*。SQL Server 具有内置功能，可以根据内存需求增长或缩减其内存占用。你会发现，在安装 SQL
    Server 后而不创建任何

    '
- fmt: "# Performance Capabilities\n\n## SQL Server Memory Consumption Overview\n\n\
    On a new database, the engine will consume approximately 600MB of memory on Linux.\n\
    \nThen as you create databases, load data, and execute queries, SQL Server will\
    \ grow its memory consumption until it reaches designed limits. For many years\
    \ when I was in technical support for SQL Server on Windows, I would often hear\
    \ complaints from my Windows colleagues that SQL Server is \"leaking\" memory.\
    \ What they were observing was the natural dynamic growth of SQL Server's memory\
    \ consumption. SQL Server will not grow its memory consumption forever, causing\
    \ possible memory problems on Linux. SQL Server is gated by two memory limits\
    \ that are configurable. I'll discuss these settings in a later section in this\
    \ chapter.\n\n## Memory Shrinkage Mechanisms\n\nOne of the methods in which SQL\
    \ Server can shrink its memory footprint is that the largest memory consumers\
    \ within the SQL Server engine are caches. These cache consumers are the `Buffer\
    \ Pool` and `Plan Cache`.\n\nThe `Buffer Pool` is a cache of database pages including\
    \ data, index, and system pages. Since all database pages are backed by database\
    \ files, it is possible at any point in time to either free up a database page\
    \ that is clean (not modified) or write a dirty database page to disk to free\
    \ it up for another page.\n\nThe `Plan Cache` is a separate set of memory cache\
    \ for queries including their query plans. SQL Server will cache query plans for\
    \ ad hoc queries and objects like stored procedures so that they will not have\
    \ to be compiled for each execution. Not all query execution plans are cached.\
    \ For more details on this topic, read our documentation at [https://docs.microsoft.com/sql/relational-databases/query-processing-architecture-guide#execution-plan-caching-and-reuse](https://docs.microsoft.com/sql/relational-databases/query-processing-architecture-guide#execution-plan-caching-and-reuse).\n\
    \n## Observing Dynamic Memory Growth\n\nHere is an easy test to see how SQL Server\
    \ will grow its memory usage dynamically through the buffer pool. Note: If you\
    \ have already restored the `WideWorldImporters` backup or created it from previous\
    \ chapters, the following steps will drop the database and restore the full sample\
    \ backup.\n\n1.  If you have not done so already, drop the `WideWorldImporters`\
    \ sample with these T-SQL commands from any SQL tool:\n\n    ```\n    USE [master]\n\
    \    GO\n    DROP DATABASE IF EXISTS [WideWorldImporters]\n    GO\n    ```\n\n\
    \    ![](index-258_1.png)\n\n2.  Restart SQL Server on Linux with this command\
    \ from the Linux shell:\n\n    ```\n    sudo systemctl restart mssql-server\n\
    \    ```\n\n3.  Let's observe the amount of memory consumed by the `sqlservr`\
    \ process and the memory used within the SQL Server Engine. Run the `top` command\
    \ from the Linux shell.\n\n    ```\n    top\n    ```\n\n    Look for memory consumed\
    \ by the `sqlservr` process under the `RES` column. Figure 6-4 shows that on my\
    \ Linux VM the `sqlservr` process consumes approximately 570MB.\n\n    **Figure\
    \ 6-4.** Memory consumed by `sqlservr` after initial startup\n\n4.  Now run the\
    \ following T-SQL command to see how much total memory the SQL Server engine consumes\
    \ within its own memory management. This T-SQL batch is provided in the example\
    \ script `sqlmem.sql`:\n\n    ```\n    -- Find the total memory used within the\
    \ SQL Server Engine, the total amount of buffer pool usage,\n    -- and the target\
    \ that SQL Server believes it can grow to\n    --\n    SELECT counter_name, cntr_value\
    \ FROM sys.dm_os_performance_counters\n    WHERE object_name = 'SQLServer:Memory\
    \ Manager'\n    AND counter_name IN ('Database Cache Memory (KB)', 'Total Server\
    \ Memory (KB)', 'Target Server Memory (KB)')\n    GO\n    ```\n\n`sys.dm_os_performance_counters`\
    \ is a Dynamic Management View (DMV) used to query certain performance statistics\
    \ across the SQL Server Engine. On Windows, these values are also exposed by a\
    \ tool called Performance Monitor. For Linux, I can just query the data directly\
    \ with T-SQL.\n\n**Tip:** To find out the complete list of SQL Server performance\
    \ counter objects and..."
