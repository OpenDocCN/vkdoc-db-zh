    concerned about performance of queries when migrating to a


    new version of SQL Server, such as SQL Server 2017 on Linux.


    The Database Experimentation Assistant (DEA) tool can help


    you trace, execute, and compare query workloads between two


    versions of SQL Server.


    Let’s take a look at the capabilities of each of these tools to prepare you for
    migrating


    your databases to SQL Server on Linux.


    ** Data Migration Assistant**


    The DMA tool includes capabilities to check for the compatibility of your configuration


    of SQL Server, your database, and T-SQL objects such as stored procedures in your


    database matched to the target version of SQL Server for your migration.


    **Note**  For checks on the use of incompatible t-SQL, DMA can only check objects


    in your database like stored procedures. it does not check t-SQL compatibility
    of


    the code in your application.


    In addition, DMA can look for possible new features in your target SQL Server


    version that you could improve your use of SQL Server such as columnstore indexes.


    Finally, if the target version of SQL Server is Linux, DMA can check to see if
    you are using


    a feature that is not supported for SQL Server on Linux, like SQL Server Replication.


    Currently, the rules that support compatibility, new features, and feature parity
    are


    not publicly documented. However, I talked to Venkata Raj Pochiraju and Sreraman


    Narasimhan from the team that built DMA and they gave me insight into the type
    of


    coverage that is supported by DMA.


    **Tip**  You can gain some insight into how DMA checks for compatibility, new


    features, and feature parity by using a tool like xeprofiler to trace the queries
    used


    by DMA. i often use xeprofiler and extended events to “debug” what tools do.


    ChApter 10   MigrAting to SQL Server on Linux


    **Compatibility Issues** include rules like:


    •  Using legacy T-SQL statements like COMPUTE instead of


    replacement functionality like T-SQL ROLLUP


    •  The use of older DBCC commands like DBCC DBREINDEX instead of


    ALTER INDEX.


    •  Warnings for the use of older data types like TEXT or IMAGE instead


    of using the new varchar(max) or varbinary(max) types.


    **New Features recommendations** include suggestions for use of features like:


    •  Using columnstore indexes to accelerate analytic performance


    •  Using security features like Always Encrypted, TDE, and dynamic


    data masking


    **Feature parity rules** include a check for any use of the following features,
    which as


    of the writing of this book are not supported for SQL Server on Linux (se[e https://docs.](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes#Unsupported)


    [microsoft.com/sql/linux/sql-server-linux-release-notes#Unsupported).](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes#Unsupported)


    Showing you an example for this tool is more difficult, since I would need to
    show


    you how to build an SQL Server instance on Windows and database that causes several


    of these rules to fire. It turns out the WideWorldImporters database, which was
    built for


    SQL Server 2016, doesn’t really hit any problems worth calling out. I even went
    back to


    use the older example database we published for SQL Server 2008, AdventureWorks,
    and


    it didn’t really uncover any issues either.


    However, I’ve talked to customers who have found the tool very helpful to assess


    a legacy SQL Server and point out possible issues to migrate to SQL Server on
    both


    Windows and Linux.


    Figur[e 10-2 sho](#index_split_007.html#p519)ws an example screen you are presented
    when you build a new


    Database Migration Assistant project and choose SQL Server 2017 on Linux as your


    target.


    ![](index-519_1.jpg)


    ChApter 10   MigrAting to SQL Server on Linux


    ***Figure 10-2.  **Assessment choices for migration to SQL Server on Linux*


    I highly encourage anyone migrating from older versions of SQL Server to SQL Server


    on Linux to use DMA and study the results carefully before executing the migration.
    Be'
  trans: '

    了解你的实例或数据库的配置详情，对于确保迁移过程更加顺畅非常有帮助。然而，大多数用户在迁移到新版 `SQL Server`（例如在 `Linux` 上运行的
    `SQL Server 2017`）时，也同样关心查询性能。数据库实验助手 (`DEA`) 工具可以帮助你在两个版本的 `SQL Server` 之间追踪、执行并比较查询工作负载。


    让我们来了解一下这些工具的各项功能，为将数据库迁移到 `Linux` 上的 `SQL Server` 做好准备。


    ## 数据库迁移助理


    `DMA` 工具包含的功能可以检查你的 `SQL Server` 配置、数据库以及数据库中的 `T-SQL` 对象（例如 `stored procedures`）对于迁移目标版本
    `SQL Server` 的兼容性。


    **注意** 对于不兼容 `T-SQL` 的使用情况，`DMA` 只能检查数据库中的对象，如 `stored procedures`。它不会检查应用程序代码中
    `T-SQL` 的兼容性。


    此外，`DMA` 可以查找你的目标 `SQL Server` 版本中可能有助于改进你使用 `SQL Server` 的新功能，例如 `columnstore
    indexes`。


    最后，如果目标 `SQL Server` 版本是 `Linux`，`DMA` 可以检查你是否使用了 `SQL Server on Linux` 不支持的功能，比如
    `SQL Server Replication`。


    目前，支持兼容性、新功能和功能对等性（Feature Parity）的规则并未公开记录。不过，我曾与构建 `DMA` 的团队成员 Venkata Raj Pochiraju
    和 Sreraman Narasimhan 交流过，他们让我深入了解了 `DMA` 所支持的检查范围类型。


    **提示** 你可以通过使用像 `xeprofiler` 这样的工具来追踪 `DMA` 所使用的查询，从而深入了解 `DMA` 如何检查兼容性、新功能和功能对等性。我经常使用
    `xeprofiler` 和 `extended events` 来“调试”工具的行为。


    # 第 10 章 迁移到 Linux 上的 SQL Server


    ### 兼容性问题


    -   使用旧版 `T-SQL` 语句，如 `COMPUTE`，而不是替代功能，如 `T-SQL ROLLUP`。

    -   使用较旧的 `DBCC` 命令，如 `DBCC DBREINDEX`，而不是 `ALTER INDEX`。

    -   对使用旧数据类型（如 `TEXT` 或 `IMAGE`）而不是新的 `varchar(max)` 或 `varbinary(max)` 类型发出警告。


    ### 新功能建议


    -   使用 `columnstore indexes` 来加速分析性能。

    -   使用安全功能，如 `Always Encrypted`、`TDE` 和 `dynamic data masking`。


    ### 功能对等性规则


    包括对任何使用以下功能的检查，截至本书撰写时，这些功能在 `SQL Server on Linux` 上尚不支持（参见 `https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes#Unsupported`）。


    向你展示此工具的示例较为困难，因为我需要向你展示如何在 `Windows` 上构建一个 `SQL Server` 实例和一个数据库，以触发其中几条规则。事实证明，为
    `SQL Server 2016` 构建的 `WideWorldImporters` 数据库并没有真正遇到值得指出的问题。我甚至回过头去使用我们为 `SQL
    Server 2008` 发布的旧示例数据库 `AdventureWorks`，它也没有真正暴露出任何问题。


    不过，我曾与一些客户交流过，他们发现该工具对于评估旧版 `SQL Server` 并指出迁移到 `Windows` 和 `Linux` 上 `SQL Server`
    的可能问题非常有用。


    图 10-2 展示了一个示例屏幕，这是你在新建 `Database Migration Assistant` 项目并选择 `SQL Server 2017
    on Linux` 作为目标时会看到的界面。


    ![](img/index-519_1.jpg)


    **图 10-2. 迁移到 SQL Server on Linux 的评估选项**


    我强烈建议任何从旧版 `SQL Server` 迁移到 `SQL Server on Linux` 的用户，在执行迁移之前使用 `DMA` 并仔细研究其结果。

    '
- fmt: "# 迁移至 Linux 上的 SQL Server\n\n## 相关资源\n\n请务必阅读以下与数据迁移助手相关的资源：\n\n*   运行数据迁移助手的最佳实践：[https://docs.microsoft.com/sql/dma/dma-bestpractices](https://docs.microsoft.com/sql/dma/dma-bestpractices)\n\
    *   了解如何使用 PowerShell 分析 DMA 结果：[https://docs.microsoft.com/sql/dma/dma-consolidatereports#import-assessment-results-into-a-sql-server-database](https://docs.microsoft.com/sql/dma/dma-consolidatereports#import-assessment-results-into-a-sql-server-database)\n\
    *   使用 PowerBI 示例报告以获取对大量数据库评估的分析：[https://docs.microsoft.com/sql/dma/dma-powerbiassesreport](https://docs.microsoft.com/sql/dma/dma-powerbiassesreport)\n\
    \n## 提示\n\n**提示** 使用 `dmacmd.exe` 实用工具在无人参与模式下大规模评估数据库。有关如何使用 `dmacmd.exe` 的详细信息，请参阅：[https://blogs.msdn.microsoft.com/datamigration/2016/11/08/data-migration-assistant-how-to-run-from-command-line/](https://blogs.msdn.microsoft.com/datamigration/2016/11/08/data-migration-assistant-how-to-run-from-command-line/)\n\
    \n## 数据库实验助手\n\n尽可能多地测试 SQL Server 应用程序的性能是成功迁移的最关键方面之一。数据库实验助手可以成为帮助您实现该目标的强大工具。其目标是使用\
    \ DEA 告诉您应用程序中的哪些查询在目标新版本 SQL Server 上运行得更好、更差或保持不变。此外，DEA 还可以告诉您哪些查询可能会失败，例如由于兼容性问题。\n\
    \n所有 DEA 文档目前都位于数据迁移博客的以下文章中：[https://blogs.msdn.microsoft.com/datamigration/tag/dea/](https://blogs.msdn.microsoft.com/datamigration/tag/dea/)。\n\
    \n### 使用 DEA 的准备工作\n\n要正确使用 DEA，您可能需要最多四个 SQL Server 实例：\n\n*   捕获工作负荷的**源** SQL\
    \ Server。\n*   两个**目标** SQL Server，用于重放捕获的工作负荷跟踪。\n*   一个用于存储**分析**和运行报告的 SQL\
    \ Server（您需要一个数据库来存储结果，因此它实际上可以存在于其中一个目标 SQL Server 实例上）。\n\n### 使用 DEA 的基本流程\n\
    \n1.  备份源 SQL Server 上的数据库。\n2.  使用 DEA 工具**捕获**工作负荷的跟踪，该工具可以使用 SQL Server 跟踪或扩展事件。如果您在早于\
    \ SQL Server 2012 的 SQL Server 版本上捕获工作负荷，则必须使用 SQL Server 跟踪，因为扩展事件在 SQL Server\
    \ 2008 中没有所需的事件。DEA 支持 SQL Server 2005 作为源 SQL Server 版本，而扩展事件在该版本中不存在，因此您必须使用\
    \ SQL Server 跟踪。\n\n    为了充分利用 DEA 工具，您需要捕获能代表应用程序的工作负荷跟踪。DEA 工具允许捕获五分钟到最长三小时的跟踪。您可能有一个可以在其上捕获应用程序跟踪的测试服务器，或者您可能需要在生产\
    \ SQL Server 上执行此操作。\n\n    ![](index-521_1.png)\n\n3.  通过将步骤 #1 中的备份还原到两个目标 SQL\
    \ Server 实例来准备重放跟踪：\n    目标服务器 #1 是与捕获步骤 #2 中跟踪的源相同的 SQL Server 版本。通常您不希望使用生产\
    \ SQL Server。"
