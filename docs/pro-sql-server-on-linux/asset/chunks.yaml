  trans: '# 第 10 章 迁移至 Linux 上的 SQL Server


    ## 迁移后考虑事项


    一旦你迁移到 `SQL Server`，你将需要考虑为你已迁移的 `SQL Server` 实例和数据库进行若干变更。迁移后可能有许多任务需要处理，但在本节中，我已将其缩小到我认为最重要的、可能影响你在
    `Linux` 上 `SQL Server` 体验成功与否的任务。


    在本节中，我将讨论性能、`HADR`、数据库兼容性和应用程序兼容性。数据库兼容性仅适用于你从早期版本的 `SQL Server` 迁移而来的情况。所有其他主题都非常适用于你从任何数据库平台迁移到
    `Linux` 上的 `SQL Server`。


    ### 迁移后优化性能


    本书包含一个关于性能的非常长的章节（第 6 章），这是有充分理由的。对于使用像 `SQL Server` 这样的数据平台的应用程序来说，性能是最关键的方面之一。因此，在你迁移到
    `Linux` 上的 `SQL Server` 后，你需要确保优化性能。我在第 6 章中讨论的所有内容都适用于你在 `Linux` 上使用 `SQL Server`。在本节中，我将指出迁移后需要关注的一些具体领域。


    首先，我们的文档在 [`docs.microsoft.com/sql/relational-databases/post-migration-validation-and-optimization-guide`](https://docs.microsoft.com/sql/relational-databases/post-migration-validation-and-optimization-guide)
    包含一套优秀的与性能相关的迁移后主题。让我首先对这些建议做一些评论：


    -   **`CE` 版本变更**：`CE` 代表基数估计，我在关于性能的第 6 章提到了这个主题。我将推迟对此主题的评论，留到本章后面关于数据库兼容性的章节。

    -   **基数估计变更**：你需要处理基数估计的变更。有关具体建议，请参阅本章后面的“使用数据库兼容性”。

    -   **参数嗅探**：这是我在关于性能的第 6 章讨论过的另一个主题。此指导更多是为了提高意识以及如何处理 *参数敏感计划* 的情况。如果你还记得，在第
    6 章我讨论了一项名为自动调优的新功能，用于检测甚至修复在某些情况下由于参数嗅探可能发生的查询计划回退问题。

    -   **缺失索引**：我在关于性能的第 6 章讨论了这个主题。务必查看推荐的缺失索引，但一定要调查每条建议，以确保它对你的数据库有意义。

    -   **谓词与数据筛选**：本节讨论了各种 *查询模式*，这些模式会阻止 `SQL Server` 生成基于 *筛选器* 进行搜索的最优查询计划。筛选器只是使用
    `T-SQL` 语句中 `WHERE` 子句的另一种说法。一个筛选器的例子。


    从 `pgsql` 迁移到你的 `Linux` 上的 `SQL Server`。`pgsql` 支持 `ODBC` 驱动程序（参见 [`www.postgresql.org/ftp/odbc/versions/`](https://www.postgresql.org/ftp/odbc/versions/msi/)）。然后请参阅此文档了解如何将
    `SSIS` 与 `ODBC` 数据源配合使用：[`docs.microsoft.com/sql/integration-services/data-flow/extract-data-by-using-the-odbc-source`](https://docs.microsoft.com/sql/integration-services/data-flow/extract-data-by-using-the-odbc-source)。'
- fmt: '# 迁移到Linux上的SQL Server之后的性能考虑


    ## 影响索引查找的因素

    影响SQL Server使用索引查找行（而非扫描整个索引或表）能力的一个因素是`WHERE`子句，它将一个列与一个变量或值进行比较，而该变量或值的数据类型不同，需要隐式数据转换。


    ## 表值函数

    这是一个我在书中至今尚未涉及的主题。表值函数(`TVFs`)使你能够创建一个返回表类型的`T-SQL`函数。文档讨论了此概念如何作为视图的替代方案，因为`TVF`可以包含多条语句，而视图只允许一条`T-SQL`语句。使用多语句表值函数(`MSTVF`)时要小心，因为用于查询计划选择的统计信息使用的是固定值。尽管如此，我在第[6章](#index_split_003.html#p250)讨论的新`AQP`功能可以帮助为`MSTVF`估算正确的统计信息。


    迁移到Linux上的SQL Server之后，还有其他一些我认为你应该记住的性能考虑事项，包括索引、基线和监控，以及使用新功能。


    ## 重建现有索引和建立新索引

    我并非一定有证据支持这个说法，但我还是要说出来。任何时候你升级或迁移到新版本的SQL Server，都**应该**重建所有索引。这能为索引组织和统计信息提供一个`clean
    slate`（干净的起点）。


    迁移后，这也是一个很好的机会来研究你是否应该考虑更改当前索引、删除不需要的索引或添加新索引。请参考第[6章](#index_split_003.html#p250)中关于可能缺失索引的指导。如果你是从另一个数据库平台迁移过来的，你绝对需要为你的新表制定合适的索引策略。虽然像`SSMA`这样的工具可以将索引从`Oracle`等平台转换到SQL
    Server，但你应该确保这些索引对于你的工作负载（包括聚集索引和非聚集索引）仍然是正确的。


    ## 建立新基线和性能监控策略

    在第[6章](#index_split_003.html#p250)中，我谈到了性能基线和监控的重要性。我还在那一章讨论了在迁移前捕获先前系统上性能基线数据的重要性。像`DEA`这样的工具可以让你为SQL
    Server做到这一点，并在迁移前比较未来的性能。


    迁移后是检查应用程序性能与先前基线（无论是SQL Server还是其他数据库平台）相比的好时机。此外，正如我在本章开头提到的，将你在Linux上的SQL Server的整体系统利用率与之前的系统进行比较。在Linux上的SQL
    Server上，整体系统利用率很可能不同，但你应该警惕那些截然不同的观察结果。如果你迁移到Linux上的SQL Server，而你的应用程序导致Linux服务器`100%`的CPU利用率（并且`sqlservr`进程消耗了全部），你需要仔细研究你的工作负载是否有足够的CPU，或者`T-SQL`查询是否可能没有得到最优调优。


    一旦你对迁移后SQL Server的新性能感到满意，就是建立新基线的绝佳时机。这时，像`Query Store`这样的功能会变得极其有用，因为它能自动捕获有关查询性能的历史信息。


    你还需要确保为性能监控制定了正确的策略。如果你是从Windows上的SQL Server迁移过来的，许多用于监控查询性能的优秀SQL Server功能依然存在，但你需要建立新的方法来观察Linux操作系统与Windows相比的性能。


    如果你来自不同的数据库平台，你将需要设置系统以使用SQL Server的内置功能来监控查询性能，例如`DMVs`、`Extended Events`和`Query
    Store`。'
  raw: 'that could prevent the ability of SQL Server to seek for rows using


    an index (vs. scanning the entire index or table) is a WHERE clause


    comparing a column with a variable or value that is not the same data


    type and requires an implicit data conversion.


    •  **Table valued functions**: This is a topic I did not cover in the book


    to this point. Table valued functions (TVFs) give you the ability to


    create a T-SQL function that returns a table type. The documentation


    discusses how this concept could be an alternative to a view, since a


    TVF can have multiple statements but a view only allows one T-SQL


    statement. Be careful using a Multi-Statement TVF (MSTVF), since


    statistics used for query plan choices use a fixed value. Having said


    this, the new AQP feature I discussed in Chapter [6 c](#index_split_003.html#p250)an
    help with


    estimating the correct statistics for a MSTVF.


    There are other considerations for performance I think you should keep in mind


    after a migration to SQL Server on Linux, including indexes, baselines and monitoring,


    and using new features.


    ** Rebuild Existing Indexes and Build New Indexes**


    I don’t necessarily have the evidence to back up this statement, but I’ll say
    it anyway. Any


    time you upgrade or migrate to a newer version of SQL Server, always rebuild all
    of your


    indexes. It just gives you a  *clean slate* on index organization and statistics.


    ChApter 10   MigrAting to SQL Server on Linux


    After you migrate, it is also a good opportunity to investigate whether you should


    consider changing your current indexes, removing unneeded indexes, or adding new


    indexes. Use the guidance from Chapt[er 6](#index_split_003.html#p250) on possible
    missing indexes. If you are


    migrating from another database platform, you definitely want to take a look at
    the right


    index strategy for your new tables. While tools like SSMA can convert indexes
    from a


    platform like Oracle to SQL Server, you should ensure these indexes are still
    the right


    ones for your workload, including clustered indexes and nonclustered indexes.


    ** Establish New Baselines and Performance Monitoring Strategy**


    In Chapter [6](#index_split_003.html#p250), I talked about the important of performance
    baselines and monitoring. I


    also discussed in that chapter the importance of capturing performance baseline
    data on


    your previous system before the migration. A tool like DEA allows you to do this
    for SQL


    Server and compare future performance before the migration.


    After the migration is a good time to check on the performance of your application


    compared with previous baselines, whether it is SQL Server or another database


    platform. In addition, as I mentioned at the top of the chapter, compare your
    overall


    system utilization on SQL Server on Linux with your previous system. It is very
    possible


    the overall system utilization may be different on SQL Server on Linux, but you
    should be


    on the lookout for radically different observations. If you migrate to SQL Server
    on Linux


    and your application results in a 100% CPU utilization of the Linux server (and
    sqlservr


    consumes all of this), you need to carefully study whether you have enough CPUs
    for


    your workload or whether T-SQL queries may not be optimally tuned.


    Once you are satisfied with the new performance of SQL Server after the migration,


    it is a great time to establish new baselines. This is where a feature like Query
    Store can


    become extremely useful, since it automatically captures historical information
    about


    query performance.


    You also need to ensure you have the right monitoring strategy in place for


    performance. If you are migrating from SQL Server on Windows, many of the great


    SQL Server features exist to monitor query performance, but you will need to establish


    new methods to observe performance of the Linux operating system compared with


    Windows.


    If you are coming from a different database platform, you will need to set up
    your


    system for using built-in SQL Server features to monitor query performance such
    as


    DMVs, Extended Events, and Query Store.'
