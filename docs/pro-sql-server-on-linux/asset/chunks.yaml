- fmt: '## Chapter 4: Building an Application and Advanced T-SQL


    ### Setup and Prerequisites


    Including `sqlcmd`, download them for Windows from [www.microsoft.com/download/details.aspx?id=53591](http://www.microsoft.com/download/details.aspx?id=53591)
    or for Linux/macOS from [https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-tools](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-tools).
    Be sure that `sqlcmd` is in your path to run example scripts.


    *   Copy the sample scripts and code for Chapter 3 and Chapter 4 into a local
    directory you will open in Visual Studio Code. I called my local directory on
    Windows `c:\wwi`. If you have left your Chapter 3 environment available, then
    just copy all the Chapter 4 code and scripts into `c:\wwi` or whatever folder
    you created.

    *   Set up a connection profile for the `sqllinux` user. See the section titled
    “Creating a Login and User” in Chapter 3 for steps on how to do this.

    *   All the code and T-SQL scripts were intended to run in a sequence in this
    chapter as you follow along. To start clean, run the `createwwi.sh` (macOS or
    Linux) or `createwwi.cmd` (Windows) scripts that were provided in Chapter 3. These
    scripts use `sqlcmd` and have two arguments: server and sa password.


    ### Populate the Database


    Execute the T-SQL script `insertpeople.sql` and `insertcustomer.sql` from Chapter
    3 to populate the `People` and `Customers` table. Also, execute the T-SQL script
    `insertcustomerproc.sql` to create a stored procedure that will be used in a node.js
    example later in the chapter.


    ### Development Environment


    The examples in this chapter will use the Windows version of Visual Studio Code
    both for SQL Server T-SQL commands as well as the Windows version of node.js.
    However, all the examples will work on your preferred development platform, since
    Visual Studio Code and node.js exist on MacOS and Linux.


    Because I’m building a node.js application, the other task I need to do is to
    install the necessary components to run node.js on my Windows laptop. I used the
    Windows installer package found at [https://nodejs.org/en/download](https://nodejs.org/en/download)
    (I used all the defaults for the installation).


    ## Building and Running a Data Application for SQL Server


    There was a time years ago that the applications being built for SQL Server were
    written only in Visual Basic, C, or C++ using drivers that supported programming
    interfaces such as ODBC or OLE-DB. A few years ago, Microsoft made a conscious
    effort to expand programming interfaces to support a much wider variety of languages,
    interfaces, and platforms.


    Today, it is possible to write a program to access SQL Server in almost every
    language you can think of. Whether you want to develop a program in Java, C#,
    PHP, or Python, SQL Server has the support you need. I don’t try to remember all
    the programming language support anymore because of this nifty website called
    [http://aka.ms/sqldev](http://aka.ms/sqldev).


    Figure 4-1 shows the options as presented by the [http://aka.ms/sqldev](http://aka.ms/sqldev)
    site.


    ![](index-135_1.jpg)


    *Figure 4-1. SQL Server programming language options*


    As part of supporting these programming languages, SQL Server also supports several
    Object Relational Mapping (ORM) frameworks including Entity Framework, Hibernate
    ORM, Sequelize ORM, and Django. For a complete list of drivers and ORM framework
    support, see our documentation at [https://docs.microsoft.com/sql/connect/sql-connection-libraries](https://docs.microsoft.com/sql/connect/sql-connection-libraries).


    ## Using node.js with SQL Server'
