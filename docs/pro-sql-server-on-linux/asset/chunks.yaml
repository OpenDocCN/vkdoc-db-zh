    package, and then clone the Github repo to get scripts and instructions:


    ```

    sudo yum -y update

    sudo yum install git

    git clone https://github.com/Microsoft/sqllinuxlabs.git

    ```


    Now let’s install the Docker engine so we can go through other examples in the
    rest of the chapter by running the following commands from the bash shell:


    ```

    sudo yum install -y yum-utils device-mapper-persistent-data lvm2

    sudo yum-config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo

    sudo yum install http://mirror.centos.org/centos/7/extras/x86_64/Packages/pigz-2.3.3-1.el7.centos.x86_64.rpm

    sudo yum install docker-ce

    ```


    **Note** the standard `docker` package for RHEL is a paid version called `docker`
    enterprise edition (you can read more at [https://docs.docker.com/install/linux/docker-ee/rhel](https://docs.docker.com/install/linux/docker-ee/rhel)).
    For the purposes of this lab and the examples in the book, I am going use the
    free `docker` Community edition, which is built for CentOS but is compatible to
    work on RHEL. You can read more about the `docker` Community edition at [https://docs.docker.com/install/](https://docs.docker.com/install/).


    Now start the Docker engine with the following command from the bash shell:


    ```

    sudo systemctl start docker

    ```


    You can use the following command as well to have Docker start on a reboot:


    ```

    sudo systemctl enable docker

    ```


    Now I am ready to show you how to deploy SQL Server with a container.


    ## Deploy and Run the SQL Server Image


    In this section, I’ll show you the basics of deploying containers with SQL Server
    and how to update SQL Server using containers.


    ### Docker Container SQL Server Basics


    Let’s learn first the basics of deploying a container with SQL Server and interacting
    with it. Containers are instances of an `image`. Microsoft has published a series
    of images on the Docker Hub at [https://hub.docker.com/r/microsoft/mssql-server-linux/](https://hub.docker.com/r/microsoft/mssql-server-linux/).


    Docker images can be stored in a private `registry` or in a public domain like
    Docker Hub. You can even use the cloud for a private container registry such as
    the Azure Container Registry, which you can read more about at [https://azure.microsoft.com/services/container-registry](https://azure.microsoft.com/services/container-registry).


    The Microsoft-published images for SQL Server on Docker Hub include images for
    SQL Server 2017 from RTM all the way to the latest CU and GDR updates. These images
    are based on a `base image` of Linux Ubuntu 16.04 with SQL Server Developer edition.
    This does not mean you have to deploy these images only on an Ubuntu Linux server.
    The Docker image we have built using Ubuntu can run on any platform Docker supports,
    because the base Linux kernel is the same across Linux distributions. In fairness,
    if you need to rely on a Linux-specific distribution functionality, our image
    based on Ubuntu may not work for you. In this case, you may need to build an image
    with a `Dockerfile`.


    Furthermore, if you want to use a Docker image with another edition of SQL Server,
    look through our documentation at [https://docs.microsoft.com/sql/linux/sql-server-linux-configure-docker#production](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-docker#production).


    **Note** You can build your own `docker` container image for SQL Server with RHEL
    as the base image, using a `Dockerfile`. See our example at [https://github.com/Microsoft/mssql-docker/blob/master/linux/preview/RHEL/Dockerfile](https://github.com/Microsoft/mssql-docker/blob/master/linux/preview/RHEL/Dockerfile).'
