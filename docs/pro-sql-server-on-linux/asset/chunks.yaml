    [availability-groups-and-failover-cluster-instances-on-linux.](https://docs.microsoft.com/sql/linux/sql-server-linux-ha-basics#pacemaker-for-always-on-availability-groups-and-failover-cluster-instances-on-linux)


    Chapter 8   high availability and disaster reCovery for sQl server


    There are a few differences for SQL FCI on Linux from Windows you need to know:


    •  Since SQL Server on Windows supports multiple instances on the


    same server (node), a common configuration for customers is to


    have multiple SQL FCIs across a series of nodes in a cluster (often


    more than two nodes). SQL Server on Linux only supports a single


    instance on a server. And Pacemaker only supports 16 nodes in a


    cluster. Therefore, you are limited to 16 SQL Server instances in an


    FCI across nodes.


    •  Virtual IP addresses work a bit differently, and DMVs such dm_


    os_cluster_nodes and dm_os_cluster_properties do not work on


    SQL Server on Linux. You will assign an IP address and name to


    the FCI, but it works slightly different than on Windows and our


    documentation as I referenced earlier describes how to set this up.


    •  You need to copy the service master encryption key manually from


    the primary node to all nodes, as SQL Server runs on each node as a


    local user called mssql.


    •  SQL Server FCI on Windows supports the tempdb database on a local


    disk (such as a fast SSD disk). This is not supported on SQL Server


    on Linux. All system databases must be in the /var/opt/mssql/data


    directory, which will be on the shared storage for the FCI.


    •  Pacemaker clusters have a concept called  *fencing* or STONITH (Shoot


    the Other Node in the Head). You have to love Linux! This concept is


    required for Pacemaker clusters in production and is how the cluster


    manages poorly behaved nodes to not affect the entire cluster (hence


    the term fencing to fence off a node). Window Failover Clusters do


    not have this concept. I’ll mention STONITH again in the section on


    Always On Availability Groups.


    **Note**  at the time of writing of this book, stonith is not supported with hyper-v


    or azure virtual Machine. you can disable this, but pacemaker is not officially


    supported without it. Microsoft expects to resolve this issue in the future so
    stay


    tuned to the documentation for updates.


    Chapter 8   high availability and disaster reCovery for sQl server


    ** Setup  and Configuration**


    While the setup of SQL Server on Linux simply just beats the experience on Windows,


    setting up an FCI with SQL Server on Linux is quite frankly challenging. Windows
    Clustering


    provides graphical wizards and validation tools and processes. The experience
    on Linux is


    all command line driven, involves several different steps, and can be error prone.


    The overall outline of the setup process for SQL Server FCI on Linux is as follows:


    •  Set up and configure your Linux server on at least two servers


    (nodes). Designate which ones will be  *primary* and  *secondaries*.


    •  Install SQL Server on Linux on each node and specific “add-ons” for


    HA depending on the Linux distribution.


    •  Create your user database(s) on the primary node.


    •  Prepare SQL Server on each node:


    •  Stop and disable SQL Server on secondary nodes (systemctl has a


    disable option).


    •  Create a new SQL Server login on the primary node and grant


    permissions to execute the system procedure sp_server_


    diagnostics by placing this login in the sysadmin role.


    •  Stop and disable SQL Server on the primary node.


    •  Make sure each node has a unique computer name and add all nodes


    with IP addresses and names to the /etc/hosts file on all nodes.


    •  Configure shared storage to be used across all nodes and then move


    the databases from the primary node, including system databases, to


    shared storage. Shared storage for production scenarios is typically'
  trans: "# 第 8 章：SQL Server 的高可用性与灾难恢复\n\n[`docs.microsoft.com/sql/linux/sql-server-linux-ha-basics#pacemaker-for-always-on-availability-groups-and-failover-cluster-instances-on-linux`](https://docs.microsoft.com/sql/linux/sql-server-linux-ha-basics#pacemaker-for-always-on-availability-groups-and-failover-cluster-instances-on-linux)\n\
    \nSQL Server 在 Linux 上的故障转移群集实例（FCI）与 Windows 上的版本有一些你需要了解的差异：\n\n*   由于 Windows\
    \ 上的 SQL Server 支持在同一服务器（节点）上运行多个实例，客户的一个常见配置是在集群中跨一系列节点（通常超过两个节点）部署多个 SQL FCI。Linux\
    \ 上的 SQL Server 仅支持在单个服务器上运行一个实例。并且 Pacemaker 仅支持在一个集群中使用 16 个节点。因此，你最多只能在跨节点的\
    \ FCI 中部署 16 个 SQL Server 实例。\n*   虚拟 IP 地址的工作方式略有不同，并且像 `dm_os_cluster_nodes`\
    \ 和 `dm_os_cluster_properties` 这样的动态管理视图（DMV）在 Linux 上的 SQL Server 中不起作用。你会为 FCI\
    \ 分配一个 IP 地址和名称，但其工作方式与 Windows 上略有不同，如我之前引用的文档所述，其中描述了如何进行设置。\n*   你需要手动将服务主加密密钥从主节点复制到所有节点，因为\
    \ SQL Server 在每个节点上以名为 `mssql` 的本地用户身份运行。\n*   Windows 上的 SQL Server FCI 支持将 `tempdb`\
    \ 数据库存放在本地磁盘（例如快速的 SSD 磁盘）上。这在 Linux 上的 SQL Server 中不被支持。所有系统数据库必须位于 `/var/opt/mssql/data`\
    \ 目录中，该目录将位于 FCI 的共享存储上。\n*   Pacemaker 集群有一个称为 `fencing` 或 STONITH（“Shoot the\
    \ Other Node in the Head”）的概念。你不得不佩服 Linux！这个概念对于生产环境中的 Pacemaker 集群是必需的，它是集群管理行为异常的节点、防止影响整个集群的方式（因此称为\
    \ fencing，意为隔离节点）。Windows 故障转移群集没有这个概念。我将在关于 Always On 可用性组的部分再次提到 STONITH。\n\n\
    > **注意：** 在撰写本书时，`stonith` 在 Hyper-V 或 Azure 虚拟机上不受支持。你可以禁用它，但没有它，Pacemaker 就不会得到官方支持。Microsoft\
    \ 预计将来会解决此问题，因此请持续关注文档更新。\n\n## 设置与配置\n\n虽然在 Linux 上设置 SQL Server 的体验确实胜过 Windows，但坦率地说，在\
    \ Linux 上为 SQL Server 设置 FCI 颇具挑战性。Windows 故障转移群集提供了图形化向导、验证工具和流程。Linux 上的体验完全由命令行驱动，涉及多个不同的步骤，并且容易出错。\n\
    \n在 Linux 上设置 SQL Server FCI 的整体流程概述如下：\n\n*   至少在两台服务器（节点）上设置和配置你的 Linux 服务器。指定哪些节点将成为\
    \ `主节点` 和 `辅助节点`。\n*   在每个节点上安装 Linux 版 SQL Server，并根据 Linux 发行版安装特定的高可用性“附加组件”。\n\
    *   在主节点上创建你的用户数据库。\n*   在每个节点上准备 SQL Server：\n    *   在辅助节点上停止并禁用 SQL Server（`systemctl`\
    \ 有 `disable` 选项）。\n    *   在主节点上创建一个新的 SQL Server 登录名，并通过将此登录名置于 `sysadmin` 角色中来授予其执行系统存储过程\
    \ `sp_server_diagnostics` 的权限。\n    *   在主节点上停止并禁用 SQL Server。\n*   确保每个节点具有唯一的计算机名，并将所有节点及其\
    \ IP 地址和名称添加到所有节点的 `/etc/hosts` 文件中。\n*   配置供所有节点使用的共享存储，然后将数据库（包括系统数据库）从主节点移动到共享存储。生产场景中的共享存储通常是……"
- fmt: '## Chapter 8 High Availability and Disaster Recovery for SQL Server


    SQL Server supports the following shared storage protocols:


    *   iSCSI: `https://docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-configure-iscsi`

    *   NFS: `https://docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-configure-nfs`

    *   SMB: `https://docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-configure-smb`


    *   Install and configure Pacemaker on all nodes. This will include providing
    Pacemaker with information about the SQL Server login you created earlier.

    *   Install the SQL Server resource agent on all nodes. The SQL Server resource
    agent utilizes the system procedure `sp_server_diagnostics` for failover decisions.
    I’ll discuss `sp_server_diagnostics` in the next section.

    *   Create FCI resources in a resource group for storage (your shared storage)
    and networking. As part of this, you will be creating an FCI IP address that can
    be used to connect to SQL Server as part of the FCI instead of the node IP address.

    *   Create the FCI resource using the resource group.

    *   Bring the FCI online.

    *   You should now be able to connect to the FCI IP address for SQL Server. You
    can manually failover SQL Server to ensure connectivity works. Pacemaker provides
    the functionality to manually failover, as seen in our documentation at `https://docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-operate`.


    Not much of an outline; more like a book, right? Each step is carefully documented
    at `https://docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-configure`.
    SQL Server on Windows Failover Clustering has almost as many steps, but there
    are tools to make this faster and help validate the details.


    The bottom line is back to the theme I mentioned at the top of this section. SQL
    Server FCI on Linux is robust and provides a great instance high-availability
    solution on Linux just as it does on Windows. It just takes a bit more careful
    preparation and time to set up and configure.


    **Note** It is possible to add or remove a node from the `SQL Server FCI` after
    you have installed and configured. See our documentation on the steps for RHEL
    at `https://docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-red-hat-7-operate#add-a-node-to-a-cluster`.


    ### sp_server_diagnostics and Failover


    One of the main purposes for an SQL FCI is to keep the SQL Server instance as
    highly available as possible should a problem occur with the SQL Server instance
    or node hosting the instance. So how does Pacemaker (or WSFC for that matter)
    understand when a failover should occur, specific to SQL Server? The concept of
    a resource agent as I described earlier in this chapter defines that protocol.'
