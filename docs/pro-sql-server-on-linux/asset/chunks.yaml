  raw: 'there may be a situation that comes up where you need to revert to a previous
    update of


    SQL Server. The process to roll back to a previous update is:


    1.  Find the package of the version you want to rollback in the SQL


    Server on Linux Release Notes a[t https://docs.microsoft.com/](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes)


    [sql/linux/sql-server-linux- release-notes](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes).


    2.  Copy the package to your Linux Server.


    3.  Use the following command to rollback:


    sudo yum downgrade mssql-server-<version_number>.x86_64


    The problem with this process of using the downgrade command is that it requires


    an Internet connection as it downloads the package you specify.


    ![](index-97_1.png)


    Chapter 2   InStaLL anD ConfIguratIon


    So, if you need to do a rollback to a previous version offline, you would need
    to:


    •  Uninstall the current version using a command like sudo yum


    remove (Do not remove the /var/opt/mssql directory to retain all


    databases).


    •  Copy the package of the version you want to install.


    •  Perform an offline install of that new package.


    ** Removing SQL Server**


    While we never want you to feel the need to uninstall SQL Server, you will likely
    find


    yourself removing SQL Server especially if you perform a lot of demonstrations,
    are


    performing special tests, or need to roll back to a previous version offline.


    The basic syntax to remove SQL Server on RHEL is:


    sudo yum remove -y mssql-server


    Figur[e 2-20 sho](#index_split_002.html#p97)ws the expected behavior when you
    uninstall SQL Server.


    ***Figure 2-20.  **Removing SQL Server*


    Chapter 2   InStaLL anD ConfIguratIon


    At this point you have two choices:


    1.  You can completely remove SQL Server by removing the /var/


    opt/mssql directory, which will delete all system databases and


    any user databases stored in that directory. Run the following


    command to do this:


    sudo rm -rf /var/opt/mssql


    2.  Leave /var/opt/mssql intact. Any future installation would then


    just install the SQL Server binaries, not require mssql-conf, and


    leave all system databases intact.


    The second option could be useful should you feel a need to cleanly install the
    SQL


    Server binaries because of some unexpected problem but keep all your data intact.


    ** Summary**


    At this point, you should have SQL Server installed, understand where to find
    all the files


    that were installed, understand the methods and options to configure SQL Server,
    and


    know how to update SQL Server to the latest builds.


    Let’s go build a database and application that uses SQL Server on Linux!


    **CHAPTER 3**


    **Building a Database **


    **and T-SQL Fundamentals**


    Now that you have installed SQL Server, the next step in your journey with SQL
    Server


    on Linux is to create a database. Then you will want to create tables, insert
    some data,


    and learn the fundamentals of the T-SQL language. Although this chapter covers
    basic


    T-SQL functionality, I’ve written the chapter from the perspective of a developer.
    For


    those of you who are experts with SQL Server and T-SQL, this chapter may seem
    like


    a review. But for those new to SQL Server, this chapter is essential, so you can
    build a


    foundation of knowledge about the T-SQL language and basic capabilities of SQL
    Server.


    To demonstrate SQL Server features in this chapter, I’ve chosen Visual Studio
    Code as


    the development tool to execute queries. Armed with this knowledge, you will be
    able


    to move to the next chapter to build an application, and learn more advanced T-SQL


    capabilities and new features of SQL Server 2017.


    The T-SQL examples in this chapter can be found in the sample scripts provided
    with


    the book and are intended to be run in the sequence as you follow the chapter.
    I will use


    the sample scripts provided in this chapter in the next chapter to show you how
    to build


    an application and learn more advanced T-SQL language capabilities.


    ** Setting Up Your Environment**


    In Chapter [2](#index_split_001.html#p46), I introduced you to the WideWorldImporters
    sample database created'
