    Have you ever seen the movie *Planes, Trains, and Automobiles*? It is a classic
    comedy and pretty much sums up the journey of authoring this book. Pieces of this
    book have been written on airplane trips across the world, subways in London,
    and car trips back and forth between Edmond, Oklahoma and Texas as my wife and
    I drove this spring to watch my son play his final year of college baseball. These
    pages in the book have traveled all over the United States and Europe, including
    Seattle, Washington D.C., Orlando, Sunnyvale, London, St. Andrews Scotland, Las
    Vegas, Waco, Texas, Edmond, Oklahoma, San Francisco, my office in Irving, Texas,
    and the confines of my home in North Richland Hills, Texas. Authoring the book
    while travelling made it a more enjoyable experience and added value to the book.
    For example, I learned a few specifics for `Red Hat Enterprise Linux` while attending
    the `Red Hat Summit` in May 2018 in San Francisco.


    This book is intended for developers, DBAs, and IT Professionals who have an interest
    in learning about `SQL Server` on `Linux`. I made a big decision when drafting
    the outline and proposal to `Apress` for the book: I decided to author this book
    not only for the `SQL Server` professional who knows `SQL Server` on `Windows`,
    but also for the developer or `IT` Pro who knows `Linux` but does not know `SQL
    Server`. It was not an easy choice, because how does one author a single book
    about `SQL Server` when there have been other books that only write about one
