  trans: "\n# SQL Server 的高可用性与灾难恢复\n\n2. 存在一个扩展事件会话来跟踪 AG（可用性组）状态。使用以下 T-SQL 语句（可在示例脚本\
    \ `enableagxe.sql` 中找到）在每个节点上启动此会话：\n\n```sql\nALTER EVENT SESSION AlwaysOn_health\
    \ ON SERVER WITH (STARTUP_STATE=ON);\nGO\n```\n\n3. 使用以下 T-SQL 语句（可在 `dbmloginuser.sql`\
    \ 中找到）为数据库镜像端点**在每个副本上**创建登录名和用户：\n\n```sql\nCREATE LOGIN dbm_login WITH PASSWORD\
    \ = 'Sql2017isfast'\nGO\n\nCREATE USER dbm_user FOR LOGIN dbm_login\nGO\n```\n\
    \n4. 在第[7]章中，你已经了解了 SQL Server 中的主密钥和证书，这些知识即将派上用场。正如本节开头所述，AG 通过*数据库镜像端点*进行通信。这些端点上的身份验证在\
    \ SQL Server 中使用证书来实现。因此，第一步是使用以下 T-SQL 语句（可在示例脚本 `primaryagcert.sql` 中找到）在**主副本**上（在我的场景中是\
    \ `sqllinuxag1`）创建一个证书（替换为你自己的密码）：\n\n```sql\nCREATE MASTER KEY ENCRYPTION BY\
    \ PASSWORD = 'Sql2017isfast'\nGO\n\nCREATE CERTIFICATE dbm_certificate WITH SUBJECT\
    \ = 'dbm'\nGO\n\nBACKUP CERTIFICATE dbm_certificate\nTO FILE = '/var/opt/mssql/data/dbm_certificate.cer'\n\
    WITH PRIVATE KEY (\n    FILE = '/var/opt/mssql/data/dbm_certificate.pvk',\n  \
    \  ENCRYPTION BY PASSWORD = 'Sql2017isfast'\n)\nGO\n```\n\n5. 如果成功，此命令不会返回任何结果。现在，你已在主节点副本上创建了一个证书文件\
    \ (`dbm_certificate.cer`) 和一个私钥文件 (`dbm_certificate.pvk`)。你需要将这些文件复制到所有节点上的相同位置\
    \ (`/var/opt/mssql/data`)。使用由相同密钥保护的相同证书，允许所有节点通过通信端点相互进行身份验证。首先，使用如下命令（可在示例脚本\
    \ `copycertkeys.sh` 中找到）将文件复制到为 Azure VM 创建的 Linux 用户的主目录：\n\n```bash\nsudo scp\
    \ /var/opt/mssql/data/dbm_certificate.cer thewandog@bwsqllinuxag2:\nsudo scp /var/opt/mssql/data/dbm_certificate.pvk\
    \ thewandog@bwsqllinuxag2:\n```\n\n系统将提示你输入密码以复制这些文件。此示例将文件从主副本复制到辅助副本。**请执行相同的操作，但将目标服务器替换为配置副本所在主机的名称**。现在，这些文件应存在于其他副本节点的主目录中。\n\
    \n6. 现在需要将这些文件移动到每个副本节点上的 `/var/opt/mssql/data` 目录，并将权限更改为 `mssql:mssql`，如下列 shell\
    \ 脚本所示（可在示例 `movecertkeys.sh` 中找到）。**此脚本应在辅助副本和配置副本节点的 bash shell 中运行**。\n\n```bash\n\
    sudo mv dbm_certificate.cer /var/opt/mssql/data\nsudo chown mssql:mssql /var/opt/mssql/data/dbm_certificate.cer\n\
    sudo mv dbm_certificate.pvk /var/opt/mssql/data\nsudo chown mssql:mssql /var/opt/mssql/data/dbm_certificate.pvk\n\
    ```\n\n7. 现在，你将使用以下 T-SQL 语句（可在 `secondaryagcert.sql` 中找到）在**辅助**节点和**配置**节点上创建密钥和证书，这些语句引用了复制到每个节点的文件。请注意，对于这些语句，我是从从主副本复制过来的文件创建证书，但使用\
    \ `DECRYPTION` 关键字来解密供 SQL Server 使用的证书。\n\n```sql\nCREATE MASTER KEY ENCRYPTION\
    \ BY PASSWORD = 'Sql2017isfast'\nGO\n\nCREATE CERTIFICATE dbm_certificate\nAUTHORIZATION\
    \ dbm_user\nFROM FILE = '/var/opt/mssql/data/dbm_certificate.cer'\nWITH PRIVATE\
    \ KEY (\n    FILE = '/var/opt/mssql/data/dbm_certificate.pvk',\n    DECRYPTION\
    \ BY PASSWORD = 'Sql2017isfast'\n)\nGO\n```\n\n8. 现在，你需要创建一个用于通信的端点。AG 用于通信的端口与用于登录和\
    \ T-SQL 查询的标准 SQL Server 端口不同。正如我在前面的步骤中所说，\n"
- fmt: "This endpoint is called a *database mirroring endpoint.* Use the following\
    \ T-SQL statements as found in `endpoint.sql` on the primary and secondary replicas.\
    \ Because we are using SQL Server Express for the configuration replica, we will\
    \ need a slightly different version, which I’ll show you in the next step. You\
    \ don’t have to use port 5022, but it is a common port to use for database mirroring\
    \ endpoints.\n\n```sql\nCREATE ENDPOINT [Hadr_endpoint]\nAS TCP (LISTENER_IP =\
    \ (0.0.0.0), LISTENER_PORT = 5022)\nFOR DATA_MIRRORING (\n    ROLE = ALL,\n  \
    \  AUTHENTICATION = CERTIFICATE dbm_certificate,\n    ENCRYPTION = REQUIRED ALGORITHM\
    \ AES\n)\nGO\nALTER ENDPOINT [Hadr_endpoint] STATE = STARTED\nGO\nGRANT CONNECT\
    \ ON ENDPOINT::[Hadr_endpoint] TO [dbm_login]\nGO\n```\n\n## Chapter 8 High Availability\
    \ and Disaster Recovery for SQL Server\n\n### 9. If the configuration replica\
    \ is using the SQL Server Express edition\nThen the ROLE value can only be a WITNESS.\
    \ Use the following T-SQL statement as found in the example script `cfgendpoint.sql`:\n\
    \n```sql\nCREATE ENDPOINT [Hadr_endpoint]\nAS TCP (LISTENER_IP = (0.0.0.0), LISTENER_PORT\
    \ = 5022)\nFOR DATA_MIRRORING (\n    ROLE = WITNESS,\n    AUTHENTICATION = CERTIFICATE\
    \ dbm_certificate,\n    ENCRYPTION = REQUIRED ALGORITHM AES\n)\nGO\nALTER ENDPOINT\
    \ [Hadr_endpoint] STATE = STARTED\nGO\nGRANT CONNECT ON ENDPOINT::[Hadr_endpoint]\
    \ TO [dbm_login]\nGO\n```\n\n### 10. A subtle comment in our documentation states\
    \ the port specified for the database mirroring connection needs to be open in\
    \ the firewall on Linux.\nI ran the following command to see what ports were open\
    \ with the firewall on each of my nodes:\n\n```bash\nsudo firewall-cmd --list-ports\n\
    ```\n\nThe only port listed was 1433, which is the main port for SQL Server connections\
    \ and queries. So I ran the following commands from the bash shell as found in\
    \ the example script `dbmirrorfirewall.sh` (make sure the shell script is marked\
    \ for execute with `chmod u+x dbmirrorfirewall.sh`):\n\n```bash\nsudo firewall-cmd\
    \ --zone=public --add-port=5022/tcp --permanent\nsudo firewall-cmd --reload\n\
    ```\n\n### 11. Now it’s time to create the availability group using the following\
    \ T-SQL statements found in the example script `createag.sql`.\nThis T-SQL script\
    \ should be run on the `primary replica` (which in my example is `bwsqllinuxag1`):\n\
    \n```sql\nCREATE AVAILABILITY GROUP [footballag]\nWITH (CLUSTER_TYPE = EXTERNAL)\n\
    FOR REPLICA ON\nN'bwsqllinuxag1' WITH (\n    ENDPOINT_URL = N'tcp://bwsqllinuxag1:5022',\n\
    \    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,\n    FAILOVER_MODE = EXTERNAL,\n\
    \    SEEDING_MODE = AUTOMATIC,\n    SECONDARY_ROLE (ALLOW_CONNECTIONS = ALL)\n\
    ),\nN'bwsqllinuxag2' WITH (\n    ENDPOINT_URL = N'tcp://bwsqllinuxag2:5022',\n\
    \    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,\n    FAILOVER_MODE = EXTERNAL,\n\
    \    SEEDING_MODE = AUTOMATIC,\n    SECONDARY_ROLE (ALLOW_CONNECTIONS = ALL)\n\
    ),\nN'sqllinuxcfgag' WITH (\n    ENDPOINT_URL = N'tcp://sqllinuxcfgag:5022',\n\
    \    AVAILABILITY_MODE = CONFIGURATION_ONLY\n)\nGO\nALTER AVAILABILITY GROUP [footballag]\
    \ GRANT CREATE ANY DATABASE\nGO\n```\n\nOnce you run this command, the availability\
    \ group should appear in the `sys.availability_groups` and `sys.availability_replicas`\
    \ catalog views on the primary replica.\n\nOne problem you may notice is that\
    \ the primary replica immediately starts connecting to the secondary replicas\
    \ even when they are not ready to accept these connections. Therefore, you might\
    \ see messages like the following in the ERRORLOG on the primary replica:\n\n\
    A connection timeout has occurred while attempting to establish a connection to\
    \ availability replica 'bwsqllinuxag2' with id [D36B7503-2EFB-467C-AD8A-4CE2B9E63958].\
    \ Either a networking or firewall issue exists, or the endpoint address provided\
    \ for the replica is not the database mirroring endpoint of the host server instance.\n\
    \nA connection timeout has occurred while attempting to establish a connection\
    \ to availability replica 'sqllinuxcfgag' with id [AC5F02C0-A481-4760-BA44-BF7E9FF83F9D].\
    \ Either a networking or firewall issue exists, or the endpoint address provided\
    \ for the replica is not the database mirroring endpoint of the host server instance."
