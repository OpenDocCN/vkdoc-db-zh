    sudo systemctl restart mssql-server'
  trans: "\n# 第 2 章：安装与配置\n\n## 将 HammerDB 应用于 SQL Server\n\n如果你希望测试 SQL Server 在\
    \ Linux 上处理 OLTP 或数据仓库工作负载的能力，可以考虑使用流行的开源工具 HammerDB。你可以从 `http://www.hammerdb.com`\
    \ 下载该工具。HammerDB 支持运行 TPC 基准测试的衍生版本：TPC-C（OLTP）和 TPC-H（数据仓库）。请注意，HammerDB 需要图形用户界面（GUI），但也提供了一些自动化功能。其基本界面如图\
    \ 2-2 所示。\n\n图 2-2：HammerDB 2.23 界面\n\n## Linux 使用技巧\n\n如果你是 Windows 用户，甚至是 PowerShell\
    \ 的熟练使用者，在使用 Linux Shell 和系统时可能还需要一些指导。本节包含了一些我在 Linux 上安装、演示和展示 SQL Server 过程中学到的命令、脚本和导航技巧。\n\
    \n## 常用命令\n\n以下是我日常在 bash shell 中最常使用的命令列表：\n\n- `ls` 和 `ll`：列出目录中的文件。`ls`有各种选项可用于列出文件。我喜欢用`ll`，因为它能提供目录或文件的详细信息，包括大小、权限和日期/时间。\n\
    \n- `grep`：从输入流、单个文件或一组文件中搜索给定的文本字符串。\n\n- `man`：是“手册页”的缩写。用它可以查找任何命令的语法和详细信息。例如，运行\
    \ `man sqlservr` 可以查看 SQL Server 的简短描述，包括支持的环境变量列表、文件安装位置以及指向互联网上完整文档的链接。\n\n\
    - `chmod`：更改文件或目录的属性，如读/写/执行权限。例如，当你创建一个要在 shell 中作为脚本执行的文件时，你必须更改其模式以允许执行，如下所示：`chmod\
    \ u+x myscript.sh`\n\n- `chown`：更改文件或目录所属的组和/或用户。我使用这个命令来更改我正在还原的 SQL Server 备份文件的所有权，将其改为\
    \ `mssql` 组和 `mssql` 用户，以便 SQL Server 可以读取该文件：`chown mssql:mssql mybackup.bak`\n\
    \n- `pwd`：代表“打印工作目录”，用于查看当前工作目录。\n\n- `ps`：代表“进程状态”，是获取 Linux 服务器上正在运行的进程列表及其详细信息的简单方法。\n\
    \n- `systemctl`：此命令用于报告和控制 Linux 上一个称为“服务”的 systemd 单元的运行状态。正如你将在本书中看到的，SQL Server\
    \ 的服务名为 `mssql-server`。以下是使用此命令配合 `mssql-server` 服务的参考（现在不必担心 `sudo`，我将在下一节解释）：\n\
    \    - 显示 SQL Server 是否正在运行：\n        ```\n        sudo systemctl status mssql-server\n\
    \        ```\n    - 停止 SQL Server（SQL Server 会执行正常关闭）。如果 SQL Server 已经停止，则不执行任何操作。\n\
    \        ```\n        sudo systemctl stop mssql-server\n        ```\n    - 启动\
    \ SQL Server。如果 SQL Server 已启动，则不执行任何操作。\n        ```\n        sudo systemctl\
    \ start mssql-server\n        ```\n    - 重启 SQL Server。如果 SQL Server 正在运行，此命令会将其关闭然后重新启动。如果\
    \ SQL Server 已停止，此命令将启动它。\n        ```\n        sudo systemctl restart mssql-server\n\
    \        ```\n"
- fmt: '# Chapter 2: Installation and Configuration


    **Tip**: `systemctl` submits a "job" to control the service. Only the `status`
    option displays anything. When you try to start, stop, or restart the service,
    use the `status` option to see the result.


    `scp`: This stands for secure file copy and can be used to copy files from one
    Linux server to the other.


    **Tip**: There is a very nice free tool called `winscp`, which I use often to
    copy files from Windows to Linux. The Windows `ssh` program, MobaXterm, also includes
    some basic drag and drop copy capabilities.


    `df`: Shows file system disk space usage for folders mounted on drives. Use the
    `-h` option to show a readable format of what directories are mounted on specific
    disk and their sizes. I find this helpful to see how much space the `/var/opt/mssql`
    directory has for default databases.


    `du`: Stands for disk usage. A very handy command to show you the disk space usage
    by directory.


    `tree`: You must install a package to get this one (`yum install tree`). This
    displays a directory and all its files and directories in a hierarchy.


    In a later chapter in the book, I’ll discuss the various Linux commands I use
    to monitor performance and system information.


    ### sudo


    When you install Linux you typically will provide a login and password to use
    for normal interaction with the shell and the root user password. For security
    reasons, it is best not to login and run directly as the root (often called superuser).
    Therefore, there is a method to execute commands as the context of root (or another
    user) while logged in as another user.


    This method is implemented by a command called `sudo` (this stands for "substitute
    user do" but used to be called "superuser do" because for older versions it was
    only for superuser commands).


    For example, your default account will not have access to installation directories
    for SQL Server, so you would need to run this command to list out one of the directories:


    ```

    sudo ls /var/opt/mssql

    ```


    **Note**: Notice the directory navigation notation of the `/` vs. the Windows
    convention of `\`.


    Typically, in an `ssh` session, when you first use `sudo`, you are prompted for
    your password. By default, that authentication is cached for a period of five
    minutes (you can configure this value). That means, effectively, once you enter
    in your password, for the next five minutes all other executions of `sudo` will
    not require the password again.


    As with all Linux commands, there are tons of options. Two that you might find
    useful are the `-i` and `-u` options. `-i` allows you to change context in your
    shell session to now run everything as superuser. For example, when you run `sudo
    -i` you will get prompted for your password and your shell prompt will change
    to indicate you are now running as root:


    ```

    [root@bwsql2017rhel ~]#

    ```


    The `-u` option allows you to run commands in the context of another user other
    than root.


    ## Viewing and Editing Files and Scripts


    Common tasks in any operating system for many users are viewing and editing files
    and building scripts. The `sudo` command in these examples is only required if
    the file requires superuser access.


    The most common command to view any text file is the `cat` command. So, this command
    `sudo cat /var/opt/mssql/log/errorlog` dumps out the text of the SQL Server ERRORLOG
    (I’ll explain later in this chapter the importance of this file).


    The `more` command can be used to page any file.


    ```

    sudo more /var/opt/mssql/log/errorlog

    ```


    **Tip**: There is "more" to this command. When the file is displayed with `more`,
    hit the `h` key to get a list of options, which includes search capabilities.


    And one of my favorite commands is the `tail` command to view the end of a file.
    It is very handy to see the latest entries in a file like the SQL Server ERRORLOG:


    ```

    sudo tail /var/opt/mssql/log/errorlog

    ```


    ![](index-56_1.png)


    And if you have a file that is frequently appended to, you can "monitor" new entries
    to a file using `tail` like this:


    ```

    sudo tail -f /var/opt/mssql/log/errorlog

    ```'
