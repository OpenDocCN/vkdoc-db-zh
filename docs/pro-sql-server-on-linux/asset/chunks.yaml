  trans: '# 第 8 章 SQL Server 的高可用性与灾难恢复


    辅助副本上的数据库，甚至可以执行诸如 `DBCC CHECKDB` 的完整性检查。此外，您可以配置客户端应用程序自动路由到可读的辅助副本，从而将工作负载从主副本卸载。


    **注意** 可读辅助副本仅在 SQL Server 企业版中可用。标准版提供基本的可用性组，但不允许从辅助副本读取。您可以在 [`docs.microsoft.com/sql/database-engine/availability-groups/windows/basic-availability-groups-always-on-availability-groups`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/basic-availability-groups-always-on-availability-groups)
    阅读更多关于基本可用性组的信息。


    辅助副本上可供读取的数据仅基于已提交、已在辅助事务日志中固化并重做的事务。任何基于活动事务的数据都是不可用的。此外，如果将事务传输到辅助副本存在延迟（在异步副本中可能更常见），您尝试从辅助副本读取的数据可能会存在差异。


    使用可读辅助副本时还有其他注意事项，包括统计信息的处理方式、可能的阻塞情况以及 SQL Server 上的整体资源消耗，这些都可能影响辅助副本重做性能。我建议您详细阅读
    [`docs.microsoft.com/sql/database-engine/availability-groups/windows/active-secondaries-readable-secondary-replicas-always-on-availability-groups#bkmk_Performance`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/active-secondaries-readable-secondary-replicas-always-on-availability-groups#bkmk_Performance)
    上的这些细节。


    最后，自 SQL Server 2017 发布以来，我们已经能够确定一些有助于解决并行重做工作线程与可读辅助副本查询之间冲突的性能优化。请在 [`blogs.msdn.microsoft.com/sql_server_team/sql-server-20162017-availability-group-secondary-replica-redo-model-and-performance/`](https://blogs.msdn.microsoft.com/sql_server_team/sql-server-20162017-availability-group-secondary-replica-redo-model-and-performance/)
    阅读更多相关信息，并务必关注最新的累积更新以获取更多增强功能。


    ## 自动页修复


    可用性组（AG）的另一个巧妙功能和巨大优势在于，即使主副本上的某个页面损坏，辅助副本也可以保存有效的数据库页面。基于此，如果主副本上的某个数据库页面损坏，为什么不利用辅助副本上的完好页面呢？这正是
    SQL Server 通过一个称为 **自动页修复** 的功能所提供的。


    其工作原理如下。如果主副本检测到 AG 中某个数据库的数据库页面损坏（例如页面上的 `checksum` 错误），它将请求'
- fmt: "## 自动页面修复\n\n当与页面关联的日志记录在辅助副本上重做时，辅助副本会将有效的页面发送回主副本，主副本会将其恢复上线。此外，无需启用此功能。它与可用性组一起默认工作。好吧，你必须承认这非常酷！\n\
    \n如果辅助副本在重做过程中遇到损坏的页面，它可以向主副本请求该页面的有效副本。这是另一个有助于满足 SQL Server 的`RTO`和`RPO`需求的强大功能，并且它完全内置在\
    \ SQL Server 引擎中（不过，此功能仅在 SQL Server 企业版中可用）。\n\n阅读更多关于自动页面修复的信息：[https://docs.microsoft.com/sql/sql-server/failover-clusters/automatic-page-repair-availability-groups-database-mirroring](https://docs.microsoft.com/sql/sql-server/failover-clusters/automatic-page-repair-availability-groups-database-mirroring)\n\
    \n## 无集群可用性组\n\n在构建 SQL Server 2017 并为 Linux 上的 SQL Server 启用`AG`功能（使用新的`CLUSTER_TYPE=EXTERNAL`）时，我们意识到可以引入在没有集群组件的情况下使用`AG`的功能，无论是`WSFC`还是`Pacemaker`。\n\
    \n我们将这个新概念称为**无集群可用性组**。考虑我在本章前面介绍的架构图。所有软件组件都存在，用于将日志更改传送到副本，而无需任何集群软件。不同之处在于，没有集群软件时，`AG`不是高可用的，因为它没有自动故障转移功能。\n\
    \n但是，在某些场景下，您可能希望设置一个`AG`，因为您希望允许读取器工作负载（例如报告用户）访问一系列辅助副本，但您不需要`AG`是高可用的。我们在 SQL\
    \ Server 2017 中将这个概念称为**读取扩展路由**。\n\n此外，由于核心数据库引擎在`Windows`和`Linux`上是相同的代码，并且`AG`的核心软件组件就在引擎中，您可以跨`Windows`和`Linux`设置一个主副本和一组副本，从而实现跨平台的`AG`。\n\
    \n可以这样想。当您按照上一节中的示例设置`AG`时，一旦您创建了`AG`并加入了辅助副本，SQL Server 就准备将日志块传送到副本。如果您将`CREATE\
    \ AVAILABILITY GROUP`语句更改为使用`CLUSTER_TYPE = NONE`，如下所示：\n\n```sql\nCREATE AVAILABILITY\
    \ GROUP [footballag]\nWITH (CLUSTER_TYPE = NONE)\nFOR REPLICA ON\nN'bwsqllinuxag1'\
    \ WITH (\n    ENDPOINT_URL = N'tcp://bwsqllinuxag1:5022',\n    AVAILABILITY_MODE\
    \ = SYNCHRONOUS_COMMIT,\n    FAILOVER_MODE = EXTERNAL,\n    SEEDING_MODE = AUTOMATIC,\n\
    \    SECONDARY_ROLE (ALLOW_CONNECTIONS = ALL)\n),\nN'bwsqllinuxag2' WITH (\n \
    \   ENDPOINT_URL = N'tcp://bwsqllinuxag2:5022',\n    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,\n\
    \    FAILOVER_MODE = EXTERNAL,\n    SEEDING_MODE = AUTOMATIC,\n    SECONDARY_ROLE\
    \ (ALLOW_CONNECTIONS = ALL)\n),\nN'sqllinuxcfgag' WITH (\n    ENDPOINT_URL = N'tcp://sqllinuxcfgag:5022',\n\
    \    AVAILABILITY_MODE = CONFIGURATION_ONLY\n)\nGO\n\nALTER AVAILABILITY GROUP\
    \ [footballag] GRANT CREATE ANY DATABASE\nGO\n```\n\n您就是在创建一个无集群可用性组。就这么简单。\n\n\
    ## 总结\n\n在本章中，我讨论了通过备份和恢复实现高可用性和恢复的基础知识，还讨论了更高级但强大的功能，以通过 Always On 故障转移群集实例和\
    \ Always On 可用性组满足您的`RTO`和`RPO`需求。高可用性的一个有趣角度是使用带有 Kubernetes 的 Docker 容器。我将在本书的最后一章讨论这一新功能。"
  raw: 'to all secondaries for a valid copy of the page. When the transaction log
    records associated


    with the page are redone on the secondary, the secondary will send the valid page
    back


    to the primary, which will restore it online. Furthermore, there is no need to
    enable the


    feature. It works by default with AGs. OK, you have to admit that is incredibly
    cool!


    Furthermore, if a secondary replica encounters a damaged page during redo, it
    can


    request a valid copy of the page from the primary. This is another great feature
    to help


    with your RTO and RPO needs of SQL Server and it is all built into the SQL Server
    engine


    (however, this feature is only available with SQL Server Enterprise edition).


    Read more about Automatic Page Repair a[t https://docs.microsoft.com/sql/](https://docs.microsoft.com/sql/sql-server/failover-clusters/automatic-page-repair-availability-groups-database-mirroring)


    [sql-server/failover-clusters/automatic-page-repair-availability-groups-](https://docs.microsoft.com/sql/sql-server/failover-clusters/automatic-page-repair-availability-groups-database-mirroring)


    [database-mirroring.](https://docs.microsoft.com/sql/sql-server/failover-clusters/automatic-page-repair-availability-groups-database-mirroring)


    ** Clusterless Availability Groups**


    As we built SQL Server 2017 and enabled AG capabilities for SQL Server on Linux
    (with


    the new CLUSTER_TYPE=EXTERNAL), we realized we could introduce the capabilities


    of using AGs without a cluster component, either with WSFC or Pacemaker.


    We call this new concept a  *Clusterless Availability Group*. Consider the architecture


    diagram I introduced earlier in this chapter. All the software components exist
    to ship


    log changes to replicas without any clustering software required. The difference
    is that


    without clustering software, the AG is not highly available, because there is
    no automatic


    failover capability.


    However, you may have a scenario where you would like to set up an AG because
    you


    want to allow workloads for readers (say reporting users) to access a series of
    secondary


    replicas but you don’t need the AG to be highly available. We call this concept
    in SQL


    Server 2017  *read-scale routing*.


    Chapter 8   high availability and disaster reCovery for sQl server


    Furthermore, because the core database engine is the same code on Windows and


    Linux, and the core software components for AGs are in the engine, you can set
    up a


    primary and set of replicas  *across Windows and Linux,*  hence a cross-platform
    AG.


    Think of it this way. When you went through the example in the previous section


    to set up an AG, once you created the AG and joined the secondaries, SQL Server
    was


    ready to ship log blocks to replicas. If you changed the CREATE AVAILABILITY GROUP


    statement to use CLUSTER_TYPE = NONE like this


    CREATE AVAILABILITY GROUP [footballag]


    WITH (CLUSTER_TYPE = NONE)


    FOR REPLICA ON


    N''bwsqllinuxag1'' WITH (


    ENDPOINT_URL = N''tcp://bwsqllinuxag1:5022'',


    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,


    FAILOVER_MODE = EXTERNAL,


    SEEDING_MODE = AUTOMATIC,


    SECONDARY_ROLE (ALLOW_CONNECTIONS = ALL)


    ),


    N''bwsqllinuxag2'' WITH (


    ENDPOINT_URL = N''tcp://bwsqllinuxag2:5022'',


    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,


    FAILOVER_MODE = EXTERNAL,


    SEEDING_MODE = AUTOMATIC,


    SECONDARY_ROLE (ALLOW_CONNECTIONS = ALL)


    ),


    N''sqllinuxcfgag'' WITH (


    ENDPOINT_URL = N''tcp://sqllinuxcfgag:5022'',


    AVAILABILITY_MODE = CONFIGURATION_ONLY


    )


    GO


    ALTER AVAILABILITY GROUP [footballag] GRANT CREATE ANY DATABASE


    GO


    you would be creating a clusterless availability group. It is that simple.


    Chapter 8   high availability and disaster reCovery for sQl server


    ** Summary**


    In this chapter, I have talked about the fundamentals of high availability and
    recovery


    through backup and restore, but also discussed the more advanced yet powerful
    features


    to meet the needs of your RTO and RPO requirements through Always On Failover


    Cluster Instance and Always On Availability Groups. One interesting angle for
    high


    availability is using Docker containers with Kubernetes. I discuss this new capability
    in


    the last chapter of the book.'
