  trans: '

    # 第十章：迁移至 Linux 上的 SQL Server


    ## 性能


    本书第六章详细讨论了 SQL Server 的性能能力。我相信 SQL Server 拥有悠久且经过验证的性能记录，这既体现在客户证言上，也体现在 TPC
    基准测试中。事实上，我们最早的一批 Linux 上 SQL Server 生产环境客户中，就有一份证言表明，正是 SQL Server 与 `pgsql`
    相比的性能表现说服了他们进行迁移。您可以在 [`https://customers.microsoft.com/doclink/dv01`](https://customers.microsoft.com/doclink/dv01)
    阅读他们的故事。在本节中，我列出了我对于 SQL Server 相较于 `pgsql` 在性能方面独特能力的看法。


    ### SSIS


    SQL Server 在其许可证中包含了一个名为 SQL Server Integration Services (`SSIS`) 的 ETL 系统，我在书中已有概述。`pgsql`
    并未附带任何像 `SSIS` 这样功能丰富的内置 ETL 系统。您可以在 [`https://docs.microsoft.com/sql/linux/sql-server-linux-migrate-ssis`](https://docs.microsoft.com/sql/linux/sql-server-linux-migrate-ssis)
    阅读更多关于 Linux 上 `SSIS` 的信息。


    ### DBCC CLONEDATABASE


    虽然 `pgsql` 提供了基于源数据库创建新数据库（即克隆）的方法，但没有一种方法可以基于源数据库创建新数据库*并包含统计信息和性能信息*。SQL Server
    通过 `DBCC CLONEDATABASE` 提供了这种能力。您可以在 [`https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-clonedatabase-transact-sql`](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-clonedatabase-transact-sql)
    阅读更多关于 `DBCC CLONEDATABASE` 的信息。


    ### Intellisense 和用于查询编辑的 mssql 扩展


    `pgsql` 有一个名为 `pgAdmin` 的免费 GUI 工具，用于执行管理任务和运行 SQL 查询。`SSMS`、`SQL Operations Studio`
    和 `pgAdmin` 之间存在一些差异，但 `pgAdmin` 是一个相当不错的工具。一个对我而言很突出的差异是，`SSMS` 和 `SQL Operations
    Studio` 支持用于 `T-SQL` 查询设计的智能感知，而 `pgAdmin` 仅有自动补全功能。我认为 Microsoft 的智能感知功能在辅助 `T-SQL`
    语法和对象选择方面，远比 `pgAdmin` 的自动补全功能丰富。`SQL Operations Studio` 和 `mssql-cli` 都通过 `mssql`
    扩展支持智能感知功能，该扩展也随 Visual Studio Code 编辑器提供。您可以在 [`https://docs.microsoft.com/sql/relational-databases/scripting/intellisense-sql-server-management-studio`](https://docs.microsoft.com/sql/relational-databases/scripting/intellisense-sql-server-management-studio)
    阅读更多关于 `SSMS` 中智能感知的信息，并在 [`https://docs.microsoft.com/sql/linux/sql-server-linux-develop-use-vscode#install-the-mssql-extension`](https://docs.microsoft.com/sql/linux/sql-server-linux-develop-use-vscode#install-the-mssql-extension)
    了解 `mssql` 扩展。


    ### 可扩展性与 TPC 基准测试


    我已在书中广泛演示并讨论了 SQL Server 性能的可扩展性。SQL Server 的性能和可扩展性最好通过 TPC 基准测试来展示。SQL Server
    在 TPC 基准测试中占据主导地位。事实上，Linux 上的 SQL Server 拥有顶级的 `1TB TPC-H` 基准测试官方结果 ([`http://www.tpc.org/3331`](http://www.tpc.org/3331))。正如我在书中讨论过的，这些基准测试之所以重要，原因有二：

