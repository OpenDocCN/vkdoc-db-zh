- fmt: '2015 and with help from Andrew’s prototype had SQL Server running on Linux
    at the end of the month. At the end of February 2015 we not only had both business
    case and engineering plan in place, but we also had SQL Server actually running
    on Linux.


    Having SQL Server running on Linux made the project real. Joe, Tobias, and I launched
    what we called a “dog and pony show” campaign. We would go around the company
    and talk to influential execs to gather their feedback about the business case
    and other details. The fun part was that many execs wouldn’t take the entire project
    seriously till the very end of our conversation when, after presenting and discussing
    the business, we would show SQL Server running on Linux. Jaws would drop then.
    One of the funniest stories was us talking to our fellow data execs: when we launched
    SQL Server on Linux, one of the Technical Fellows fell of his chair. Seeing SQL
    Server running on Linux, he and everyone else in the room were very much blown
    away.


    To our surprise, hiring the team into the project hadn’t been easy. What we found
    out is that many engineers happened to be purist by nature. Many folks that we
    tried to convince to join the project would have preferred a pure port approach
    to ours. It had taken a nontrivial amount of effort to convince the key engineers
    that the approach was sound. It had taken us about six months to assemble the
    core team consisting of six engineers: Eugene Birukov, George Reynya, Michael
    Nelson, Scott Konersmann, Brian Gianforcaro, and Robert Dorr. Hiring these engineers
    into the project had proved to be the crucial moment in the history of the project.
    If any of these core folks wouldn’t have joined or left the team, we had almost
    zero chance of succeeding. Even now I still believe we had gotten lucky, very
    lucky, because all of these engineers joined at just the right time for the project.


    Next, much of our luck came from engineers, execs, program managers, and others
    who had been implicitly or explicitly related to the project. In many cases people
    even hadn’t realized the support they provided. Sometime at the end 2015 we had
    a new Corporate Vice President who had become a huge proponent of the project
    and helped


    xxii


    ## foreword


    us to expediate the approval process so that we could make a public announcement
    rather early at a Data Driven event in March of 2016. We had folks trying out
    the solution and becoming our evangelists within the company. Running the project
    openly had helped significantly. By the time of public announcement, we had about
    three hundred people throughout the company subscribed to our engineering distribution
    list. As one can guess, the project was under strict NDA. Needless to say we had
    zero leaks.


    They say it is the way of traveling not the destination that counts. I think I
    agree. It has been a fun journey. Personally, I am a bit sad that it is over.
    At the same time, whenever I look back I get scared about how many things could
    have gone wrong. We had gotten really lucky during the journey. We also had fun
    on way to our destination.


    Now SQL Server DBAs, developers, and enthusiasts are the lucky ones. We have expanded
    your world. You have gotten real SQL Server on Linux that you all love. We, the
    engineering team, believe you will love and enjoy it as much as we have.


    In this book, Bob Ward gives you an inside look into how we built SQL Server on
    Linux and the core features of setup, T-SQL, development, performance, security,
    and high availability. Bob has done something very unique. He has authored a book
    that will appeal to both the SQL Server user and the Linux developer looking for
    a new database platform. And you will also love the behind-the-scenes stories
    as Bob tells them that span the 25 year history of this product. This book also
    talks about some of the great tools we have built inside and outside SQL Server
    over the years and many that I have personally worked on. And I love that Bob
    was able to cover how to migrate to SQL'
