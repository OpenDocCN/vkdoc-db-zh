- fmt: '-- Not all error messages are "errors". Anything less than severity 16 is

    "informational"


    ```sql

    DECLARE @current_ms_ticks INT


    SELECT @current_ms_ticks=ms_ticks FROM sys.dm_os_sys_info


    SELECT DATEADD(ms, (orb.timestamp-@current_ms_ticks), GETDATE()) as

    [record_timestamp],

    CAST(orb.record AS XML).value(''(//Exception//Error)[1]'', ''varchar(10)'') as

    [errorno],

    CAST(orb.record AS XML).value(''(//Exception/Severity)[1]'', ''varchar(10)'')

    as [severity],

    CAST(orb.record AS XML).value(''(//Exception/State)[1]'', ''varchar(10)'') as

    [state],

    msg.description

    FROM sys.dm_os_ring_buffers orb

    INNER JOIN sys.sysmessages msg

    ON msg.error = cast(record as xml).value(''(//Exception//Error)[1]'',

    ''varchar(255)'')

    AND msg.msglangid = 1033 -- This is for US English. Change this to your

    language as needed

    WHERE orb.ring_buffer_type = ''RING_BUFFER_EXCEPTION''

    ORDER BY record_timestamp

    GO

    ```


    ## DBFS Tool


    Many Linux users are more comfortable with the shell than a user interface and
    are also familiar with navigating the proc directory (virtual) filesystem (You
    can read more about `procfs` at [https://en.wikipedia.org/wiki/Procfs](https://en.wikipedia.org/wiki/Procfs)).
    As part of Project Helsinki, we built an open-source tool that works like `procfs`
    for SQL Server catalog view and DMV data, called `dbfs`.


    ![index-217_1.png](index-217_1.png)


    ### ChapTer 5 SQL Server TooLS


    `DBFS` will query SQL Server on Linux for DMV data and produce the information
    into a directory structure with files. Each file will represent a snapshot of
    a specific catalog view or DMV. The tool will produce a text and JSON file for
    each catalog view and DMV. By default, `dbfs` runs in the background monitoring
    access to the files represented by catalog views and DMVs. When a user tries to
    access the content of the files, `dbfs` queries SQL Server to obtain the data
    to populate the file. This technique is like how `procfs` works for the Linux
    operating system.


    To install `dbfs`, read the instructions on the GitHub project site at [https://github.com/Microsoft/dbfs](https://github.com/Microsoft/dbfs).
    I installed this on my RHEL VM and then followed the Quick Start instructions
    on the GitHub site to create a directory and configuration file.


    The text files are formatted so Linux tools like `awk`, `grep`, and `join` can
    be used to query catalog view and DMV data very easily. Here is an example command
    using `awk`:


    ```bash

    awk ''{print $1, $2, $3, $4, $5}'' dm_os_sys_info | column -t

    ```


    Figure 5-34 shows an example of using `awk` to extract columns from the `dm_os_sys_info`
    `dbfs` file.


    **Figure 5-34** Using `awk` with `DBFS`


    ## Extended Events


    Prior to SQL Server 2008, the primary tool to trace events and the code execution
    of the SQL Server Engine was SQL Server Trace and the corresponding tool called
    SQL Profiler. While SQL Server Trace and SQL Server Profiler still exist today,
    this feature and tool are technically marked as deprecated (which means they may
    be removed at any point for a new release). It also means we are no longer making
    any enhancements to this feature and tool.


    **Note:** Deprecation of features is something we do across releases for features
    that we do not plan to enhance. In recent releases, even though we have marked
    features deprecated, we rarely remove them. Read more on this topic at [https://docs.microsoft.com/sql/database-engine/deprecated-database-engine-features-in-sql-server-2017](https://docs.microsoft.com/sql/database-engine/deprecated-database-engine-features-in-sql-server-2017).


    ### ChapTer 5 SQL Server TooLS


    In SQL Server 2008, we embarked on a project called `XEvent`. Once again, I found
    myself after we shipped SQL Server 2005 in a conversation with Slava Oks about
    supportability and diagnostics. While SQL Server Trace and Profiler were popular,
    he knew the architecture of “server-side trace” had limitations, especially around
    scalability.'
