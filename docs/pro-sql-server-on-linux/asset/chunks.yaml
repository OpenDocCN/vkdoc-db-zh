    ## 第 2 章   安装与配置


    ### SQL Server 实例配置


    让我们花点时间看看 SQL Server 引擎支持的 SQL Server 实例配置还有哪些其他选项。这包括 T-SQL 系统存储过程 `sp_configure`
    和 T-SQL 语句 `ALTER SERVER CONFIGURATION`。这些语句用于控制应用于整个 SQL Server 实例的配置选项。


    #### sp_configure


    `sp_configure` 是一个 T-SQL 系统命令，称为*系统存储过程*，可用于配置 SQL Server 引擎内的各种选项。这些选项持久化在名为
    `master` 的系统数据库中。默认情况下，只有大约 20 个左右的配置选项可供选择。有一些高级选项，只有在您先将 "show advanced options"
    选项设置为 1 后才会可见。


    任何用户都可以运行此命令来查看可能的值，但默认情况下，只有系统管理员（例如 SQL Server 中的 `sa` 登录名）可以更改选项，因为这些更改可能对整个服务器产生影响。在本书的剩余章节中，我将讨论各种配置选项供您考虑。


    所有配置更改都需要执行 T-SQL `RECONFIGURE`。

    '
- fmt: 'To confirm the changes, some of them require a restart of the SQL Server service
    even after executing `RECONFIGURE`.


    To see the complete list and syntax to run this T-SQL command, see this page in
    our documentation: [sp_configure (Transact-SQL)](https://docs.microsoft.com/sql/relational-databases/system-stored-procedures/sp-configure-transact-sql).


    ### ALTER SERVER CONFIGURATION


    The `sp_configure` procedure is good for single-value configuration options that
    require a simple number. Some server-wide configuration options may need more
    complex values or options. Therefore, the `ALTER SERVER CONFIGURATION` T-SQL command
    was created for this purpose.


    An example is `PROCESS AFFINITY`, which can be used to control what CPUs or NUMA
    nodes SQL Server will schedule its threads to execute on.


    ### Chapter 2: Installation and Configuration


    For example, to schedule SQL Server threads only on NUMA node 0 on a multinode
    system, you would run this T-SQL command:


    ```sql

    ALTER SERVER CONFIGURATION SET PROCESS AFFINITY NUMANODE=0

    ```


    As with `sp_configure` options, I will discuss several of these throughout the
    remaining chapters of the book. Like `sp_configure`, most of these settings require
    a system administrator to make changes. For a complete list of the options, syntax,
    and permissions, see our documentation page: [ALTER SERVER CONFIGURATION (Transact-SQL)](https://docs.microsoft.com/sql/t-sql/statements/alter-server-configuration-transact-sql).


    ### Windows Configuration Options on Linux


    When you install SQL Server on Windows, there are a few configuration options
    and choices that are typically used. Following is a summary of these options and
    how they apply to SQL Server on Linux.


    #### Locked Pages


    Windows supports a concept where applications can avoid a working set trim of
    memory if they use the Address Windowing Extensions (`AWE`) APIs. This is enabled
    on SQL Server by default if you use the Enterprise or Standard edition and the
    SQL Server Service account has the `Lock Pages in Memory` privilege.


    Linux does not have the concept of `AWE` or locked pages, so this option doesn’t
    apply to SQL Server on Linux. Rather, Linux has concepts to page its processes
    or even terminate the process based on its memory consumption. SQL Server on Linux
    has options to prevent these types of scenarios. I will address this topic in
    Chapter 6.


    #### Instant File Initialization


    To speed up the initialization of a file for large sizes, Windows provides an
    API called `SetFileValidData()`. SQL Server uses this API to create or alter database
    files if the `Perform Volume Maintenance Tasks` privilege is assigned to the SQL
    Server service account.


    Linux performs this type of initialization by default, since SQL Server in the
    Host Extension layer uses the `fallocate()` Linux API. Therefore, there is no
    need to configure this option for SQL Server on Linux.


    ### Chapter 2: Installation and Configuration


    #### Large Pages


    SQL Server on Windows can use a concept called Large Pages when you enable trace
    flag `834`. SQL Server on Linux relies on a concept called Transparent Huge Pages
    (`THP`) for memory allocation. While trace flag `834` still exists on SQL Server
    on Linux, we only recommend using this on high-end systems in specific scenarios.
    This is a trace flag whose guidance falls under the Microsoft Support article:
    [Tuning options for SQL Server when running in high performance workloads](https://support.microsoft.com/help/920093/tuning-options-for-sql-server-when-running-in-high-performance-workloads).'
