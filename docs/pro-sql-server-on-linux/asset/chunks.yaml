    detects a  *query_processing* error. A query_processing error is a condition that
    prevents


    basic query processing like an exhaustion of worker threads.


    Again each policy builds on the other, so policy 5 includes all the sp_server_


    diagnostics errors. Notice, there is no policy 2 listed. Policy 2 only exists
    in the Windows


    architecture as it relates to how a resource DLL works. For many users, the default


    policy=3 is fine. I don’t see many reasons to use policy 1 unless for some scenario
