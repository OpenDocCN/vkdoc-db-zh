    采样率取决于表或索引中的行数。你可以在统计信息创建后，通过使用 `UPDATE STATISTICS` T-SQL 语句来更改采样率或指定 `FULLSCAN`。你如何知道是否需要更改采样率，甚至使用
    `FULLSCAN` 呢？SQL Server 默认的统计信息采样可能无法为你提供最佳性能的一种场景，已由我们微软的 CSS 团队记录在 [`blogs.msdn.microsoft.com/psssql/2010/07/09/sampling-can-produce-less-accurate-statistics-if-the-data-is-not-evenly-distributed`](https://blogs.msdn.microsoft.com/psssql/2010/07/09/sampling-can-produce-less-accurate-statistics-if-the-data-is-not-evenly-distributed)。在此场景中，提到的直方图是使用
    `DBCC SHOW_STATISTICS`（更多信息请参阅 [`docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-show-statistics-transact-sql`](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-show-statistics-transact-sql)）T-SQL
    语句生成的（你也可以使用一个名为 `dm_db_stats_histogram` 的新 DMV 来达到此目的）。如果深入研究直方图不是你的兴趣所在，那么当你认为一个查询本可以执行得更好，并且遇到基数估计问题时，就该考虑进行此项更改了。我将在本章接下来的某一节中讨论基数估计。根据我的经验，查询优化器的默认采样适用于许多工作负载。


    我将在本章下一节以及第 9 章中讨论更新统计信息的策略。


    ## 自动化与统计信息


    当你修改表中的数据时，统计信息可能无法准确反映这些更改。不过，有一个很好的解决方案。默认情况下，在 SQL Server 中创建的每个数据库都有一个名为 `AUTO_UPDATE_STATISTICS`
    的数据库选项。当此数据库选项启用时（这是默认设置），SQL Server 将自动维护统计信息（使用默认采样算法）。这种自动化基于一个多年来不断演进的公式，但其根本基础是表或索引上发生的更改量。


    在最近的 SQL Server 版本中，触发自动更新统计信息的阈值得到了更新，以更准确地反映大型表的尺寸。你可以在以下知识库文章中阅读更多关于此阈值的信息：[`support.microsoft.com/help/2754171/controlling-autostat-auto-update-statistics-behavior-in-sql-server`](https://support.microsoft.com/help/2754171/controlling-autostat-auto-update-statistics-behavior-in-sql-server)。此外，一个名为
    `dm_db_stats_properties` 的新 DMV 可用于跟踪特定统计信息在何时以及如何（自动或手动）被更新。即使设置了此数据库选项，你也可以使用系统存储过程
    `sp_autostats` 来禁用特定统计信息的自动更新。自动统计更新通常以 *内联* 方式完成，这意味着统计信息是作为 T-SQL 语句（如 `SELECT`）的一部分在引擎内部“幕后”更新的。你也可以选择通过设置
    `AUTO_UPDATE_STATISTICS_ASYNC` 数据库选项来异步更新统计信息。此选项的默认值为 `OFF`。我建议你将其保持关闭状态。

    '
- fmt: '除非你确实遇到同步更新统计信息导致特定查询集出现性能问题的情况。根据我的经验，宁愿让某个特定查询在统计信息更新时等待（因为该查询会受益），也比异步更新统计信息要好。


    ## ChapTer 6   performanCe CapabILITIeS


    一些客户发现，即使将此数据库选项设置为自动更新统计信息，对于他们的工作负载来说频率也不够（而且你无法更改频率阈值）。因此，你始终可以选择使用 T-SQL 语句
    `UPDATE STATISTICS` 或系统存储过程 `sp_updatestats`。我见过一些客户安排作业频繁运行这些命令，以确保统计信息及时更新。这里存在一个权衡。如果统计信息被修改，SQL
    Server 可能在统计信息更新后下一次执行查询时选择重新编译查询计划。因此，频繁更新统计信息可能导致大量的查询重编译，这总体上可能对你的应用程序造成性能问题。


    **提示**  如果你有一个维护窗口（比如每周一次），可以在其中使用 `WITH FULLSCAN` 更新所有统计信息，那就去做吧！之后你会得到一些重编译，但可能会产生最佳的查询计划。大多数客户无法承担这样做，因此需要在让
    SQL Server 通过自动机制更新统计信息与选择一些对你的应用程序至关重要的统计信息进行手动更新之间取得平衡。


    你可以在我们的文档中阅读更多关于手动更新统计信息的内容：[https://docs.microsoft.com/sql/t-sql/statements/update-statistics-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/update-statistics-transact-sql)。


    正如我已经提到的，可以在索引之外创建统计信息。幸运的是，SQL Server 有一个名为 `AUTO_CREATE_STATISTICS` 的数据库选项，该选项在你创建的所有数据库中默认是开启的。启用此选项后，SQL
    Server 中的查询优化器将在那些尚未成为索引中统计信息或另一统计信息一部分的列上创建统计信息。我强烈建议你保持此选项启用。你可以通过查询系统目录视图来判断哪些统计信息是由
    SQL Server 自动创建的，如我们的文档所述：[https://docs.microsoft.com/sql/relational-databases/statistics/statistics](https://docs.microsoft.com/sql/relational-databases/statistics/statistics)（我们使用
    `_WA` 前缀命名这些统计信息）。


    **提示**  运行基准测试时，使用 `sp_createstats` 存储过程在尚未有统计信息的列上创建统计信息，而不是等待优化器自动创建统计信息。


    ## ChapTer 6   performanCe CapabILITIeS


    ### 基数估计


    保持统计信息最新和准确的一个关键原因是*基数估计*的概念。基数在 SQL Server 查询处理中指的是给定行集的唯一值数量。SQL Server 在编译查询计划时估计基数，以决定如何构建计划。这可能是决定是否使用索引、连接顺序以及其他决策。


    对基数估计最直观的查看来自查看查询的 XML SHOWPLAN，并查看 XML 计划中的 `EstimateRows`。在某些情况下，如果 `EstimateRows`
    与 `ActualRows` 不同，SQL Server 可能会编译一个非最优的查询计划。虽然不准确的统计信息可能是导致这些数字偏差的原因，但在某些查询模式中，SQL
    Server 可能需要对基数估计进行*猜测*（猜测意味着使用代码中的固定数字）。这些情况包括统计信息缺失、使用表变量、局部变量和其他查询谓词。'
  raw: 'unless you specifically have situations where synchronous update statistics
    are causing


    performance problems for a given set of queries. In my experience it is better
    to pay the


    penalty of a specific query having to wait while stats are updated (because that
    query will


    benefit) than having statistics updated asynchronously.


    ChapTer 6   performanCe CapabILITIeS


    Some customers have found that even with this database option set to automatically


    update statistics, it is not frequent enough for their workload (and you cannot
    change the


    frequency threshold). Therefore, you always have the option to use the T-SQL statement


    **UPDATE STATISTICS**, or the system procedure **sp_updatestats**. I’ve seen some


    customers schedule jobs to run these commands on a frequent basis to ensure statistics


    are frequently up to date. Here is the tradeoff. If statistics are modified, SQL
    Server may


    choose to recompile a query plan the next time a query is executed after the statistics
    are


    updated. Therefore, frequent updates to statistics could cause a large number
    of query


    recompilations, which overall may be a performance problem for your application.


    **Tip**  If you have a maintenance window (say weekly) where you can afford to


    update statistics WITh fULLSCan on all statistics, then go for it! You will get


    some recompiles afterward but probably will have the best possible query plans


    produced. most customers can’t afford to do this, so there is a balance between


    where you let SQL Server update statistics using automation and picking some


    statistics critical to your application to update manually.


    You can read more about updating statistics manually in our documentation at


    [https://docs.microsoft.com/sql/t-sql/statements/update-statistics-transact- sql.](https://docs.microsoft.com/sql/t-sql/statements/update-statistics-transact-sql)


    As I’ve mentioned already, it is possible to create statistics outside of indexes.
    And


    fortunately, SQL Server has a database option, called AUTO_CREATE_STATISTICS,


    which is on by default for all databases you create. With this option enabled,
    the query


    optimizer in SQL Server will create statistics on columns that are not already
    part of


    a statistic in an index or another statistic. I highly recommend you leave this
    option


    enabled. You can tell which statistics were automatically created by SQL Server
    using


    a query against system catalog views, as described in our documentation at [https://](https://docs.microsoft.com/sql/relational-databases/statistics/statistics)


    [docs.microsoft.com/sql/relational-databases/statistics/statistics](https://docs.microsoft.com/sql/relational-databases/statistics/statistics) (we
    name these statistics with a _WA prefix).


    **Tip**  When running benchmark tests, use the **sp_createstats** stored procedure
    to


    create statistics on columns not already in a statistic vs. waiting for the optimizer


    to automatically create statistics.


    ChapTer 6   performanCe CapabILITIeS


    ** Cardinality  Estimation**


    One of the key reasons for keeping statistics up to date and accurate is the concept
    of


    *cardinality estimation*. Cardinality in terms of SQL Server query processing
    is the unique


    number of values for a given set of rows. SQL Server estimates the cardinality
    when


    compiling a query plan to make decisions on how to build the plan. This could
    be a


    decision to use an index or not, join order, and other decisions.


    The most visible view of cardinality estimation comes from looking at the XML


    SHOWPLAN for a query and looking at **EstimateRows** in the XML plan. In some
    cases,


    SQL Server may compile a query plan that is not optimal if the EstimateRows are


    different than the **ActualRows**. Although inaccurate statistics can be a cause
    for these


    numbers to be off, there are some query patterns where SQL Server may need to
    make


    a  *guess* on cardinality estimation (guess means use a fixed number from the
    code).


    These include missing statistics, use of table variables, local variables, and
    other query


    predicates.'
