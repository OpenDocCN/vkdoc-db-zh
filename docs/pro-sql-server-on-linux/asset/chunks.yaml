    interpret the `SET STATISTICS IO` output at `https://blogs.msdn.microsoft.com/sql_server_team/columnstore-index-performance-rowgroup-elimination`.


    ### Tips


    To effectively use columnstore indexes, there a few topics you need to review,
    understand, and implement.


    - **Data loading**: Review and plan for data loading properly by reading this
    section of our documentation: `https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-data-loading-guidance`.


    - **Fragmentation**: Follow this guidance in our documentation for defragmentation:
    `https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-defragmentation`.


    - **Partitions**: You can combine partitions with columnstore indexes specially
    to help with manageability. See our documentation guidance at `https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-design-guidance#use-table-partitions-for-data-management-and-query-performance`.


    ## ChapTer 6 performanCe CapabILITIes


    - **Improving performance**: To ensure maximum performance, read through these
    recommendations in our documentation: `https://docs.microsoft.com/en-us/sql/relational-databases/indexes/columnstore-indexes-design-guidance#use-table-partitions-for-data-management-and-query-performance`
    and `https://docs.microsoft.com/en-us/sql/relational-databases/indexes/columnstore-indexes-query-performance#columnstore-performance-explained`.


    ### Customer Stories and Resources


    Columnstore really makes a difference. Check out these customer case studies and
    other resources:'
