    ## 自动调优


    当我第一次看到 SQL Server 2017 的早期版本时，立即吸引我眼球的功能之一就是 `自动调优`，其中包含一个名为 `自动计划修正` 的选项。


    SQL Server 2017 于 2017 年 10 月发布，紧随我最喜欢的版本之一 SQL Server 2016 之后。在 SQL Server 2016
    中，我们为产品引入了一项名为 `` `查询存储` `` 的新功能。当通过 `ALTER DATABASE` 为数据库启用 `查询存储` 后，SQL Server
    引擎将开始在内存中收集查询性能遥测数据，

