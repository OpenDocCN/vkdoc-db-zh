  trans: '# 第 10 章 迁移至 Linux 上的 SQL Server


    ## 通过数据库兼容性级别启用新功能


    某些增强功能（通常与查询处理相关）是在使用特定的数据库兼容性级别时引入的。例如，从数据库兼容性级别 140 开始，当数据库设置为此兼容性级别时，会启用查询处理的新功能。我在第
    6 章介绍过这项名为**自适应查询处理**的新功能。可以预见，微软未来将继续通过数据库兼容性级别来启用新的查询处理功能。


    以下是随数据库兼容性级别引入的其他查询处理增强功能示例：


    -   **基数估计**：当数据库使用兼容性级别 120 或更高版本时（于 SQL Server 2014 引入），会启用一个新的基数估计模型。我在第 6
    章讨论过这个新 CE 模型的影响。本书前面也提到过，如果你使用名为 `LEGACY_CARDINALITY_ESTIMATION` 的 `ALTER DATABASE`
    选项，可以将兼容性级别设为 120 或更高，以回退到旧的 CE 模型。


    -   **查询处理修复程序**：数据库兼容性级别 130 包含了之前仅通过跟踪标志 `4199` 启用的查询处理修补程序。数据库兼容性级别 140 则包含了在
    SQL Server 2016（兼容性级别 130）到 SQL Server 2017（兼容性级别 140）之间引入的查询处理修补程序。本书前面讨论过这个概念，但如需回顾，你可以阅读更多关于启用这些修复程序的信息：[`docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-trace-flags-transact-sql#4199`](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-traceon-trace-flags-transact-sql#4199)。


    -   **并行批量操作**：对于兼容性级别 120 或更高版本的数据库，`SELECT INTO` 查询可以并行运行。对于兼容性级别 130 或更高版本的数据库，`INSERT
    SELECT` 查询可以并行运行。


    还有其他示例，你可以从文档的这个位置开始通读：[`docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-compatibility-level#differences-between-compatibility-level-130-and-level-140`](https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-compatibility-level#differences-between-compatibility-level-130-and-level-140)。这里开始有一系列表格，描述了不同兼容性级别之间的行为差异。


    ## 利用数据库兼容性级别实现向后兼容


    数据库兼容性级别可用于对应用程序的查询和功能提供*某种程度*的向后兼容性保护。所有向后兼容性的差异都列在每个兼容性级别的文档中（请参见我之前提供的最后一个文档链接）。让我给你一个例子。'
- fmt: 'If you are using database compatibility level 110 or lower, a `T-SQL` query
    using a concept called common table expression (`CTE`) allows duplicate column
    names. However, starting with database compatibility level 120, duplicate column
    names would result in an error and the query would fail.


    There are two areas where database compatibility has no effect on possible breaking
    changes:

    - Discounted features or functionality

    - Changes outside the scope of a database at the `SQL Server` instance level


    One of the areas that database compatibility can be of great help is performance.
    Starting with database compatibility level 130, any changes or features that could
    result in a change to a query plan should only happen with the new compatibility
    level. This provides a safer approach for applications that upgrade to a newer
    release of `SQL Server` but retain the previous database compatibility level.


    I recommend you read through all of our documentation on using compatibility level
    for backward compatibly at [https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-compatibility-level#using-compatibility-level-for-backward-compatibility](https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-compatibility-level#using-compatibility-level-for-backward-compatibility).


    ## ChApter 10   MigrAting to SQL Server on Linux


    ### Migrate SQL Server Instance Objects


    If you are migrating a database from a previous version of `SQL Server` to `SQL
    Server` on Linux, you may have to migrate `objects` outside the scope of the database,
    including:

    - `Logins`: Remember, only `SQL Standard security` and `Active Directory` authentication
    is supported. If you have `Windows` domain logins, you will need to configure
    `Active Directory` authentication to allow them access to `SQL Server` on Linux.

    - `SQL Server Agent jobs`: Remember, the only type of jobs that work with `SQL
    Server` on Linux are general jobs that have `T-SQL` job steps. You will have to
    find alternate solutions for other jobs with job steps that are outside the scope
    of `T-SQL`.

    - `Linked servers`: Only `SQL Server` to `SQL Server` linked servers are supported,
    but you can define those using `T-SQL` system procedures to add linked servers.
    You can read more about this in the documentation at [https://docs.microsoft.com/sql/relational-databases/linked-servers/linked-servers-database-engine](https://docs.microsoft.com/sql/relational-databases/linked-servers/linked-servers-database-engine).
    Unfortunately, with `SQL Server 2017` on Linux, you cannot use distributed transactions
    over linked servers and only `SQL Standard security` is supported.


    ### Using New Features


    I’ve worked with customers who have migrated from one version of `SQL Server`
    to the next who are doing this just to keep up to date with the latest `SQL Server`
    version or because the version they are currently using is out of support. In
    these situations, what can get lost after the migration is to take advantage of
    new features. `SQL Server 2016` and `2017` come with new features you might easily
    miss, including:

    - `Columnstore indexes` (introduced in `SQL Server 2012` but in `SQL 2017` I consider
    this feature at its peak)

    - `In-Memory OLTP` (introduced in `SQL Server 2014` but many restrictions are
    removed by `SQL Server 2017`)

    - `Graph database`

    - `JSON support`

    - `Temporal tables`

    - `Native scoring`


    I’ve covered these in previous chapters of the book, so I encourage you to go
    back'
