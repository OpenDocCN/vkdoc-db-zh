    \n本节前面复制仓库文件的说明使用的是 CU 仓库。一旦你复制了仓库文件，以后使用包管理器进行的任何安装或更新命令都将使用该仓库。如果你想更改使用的仓库，必须先删除之前的仓库文件，然后复制新的仓库文件。\n\
    \n例如，如果你之前使用了 `mssql-server-2017.repo` 文件，并希望从 GDR 仓库卸载并重新安装，你需要：\n\n1.  像这样删除之前的仓库文件\n\
    \n    ```\n    sudo rm /etc/yum.repos.d/mssql-server.repo\n    ```\n\n2.  卸载 SQL\
    \ Server\n\n3.  像这样复制新的仓库文件（假设是 RHEL 系统，但如何为 Ubuntu 和 SLES 执行此操作请参阅我们的安装文档）\n\n\
    \    ```\n    sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017-gdr.repo\n\
    \    ```\n\n4.  安装 SQL Server\n\n此外，默认情况下，安装和更新将使用这些仓库中的最新构建版本。要安装特定的包版本，你可以对该版本的包进行离线安装，或者使用以下\
    \ `yum` 语法：\n\n```\nsudo yum install -y mssql-server:<package version>\n```\n\n\
    要查找 SQL Server 的所有包版本，请在 `bash` shell 中运行以下命令：\n\n```\nsudo yum list mssql-server\
    \ --showduplicates\n```\n\n![](img/index-67_1.png)\n\n## 第 2 章 安装与配置\n\n至少，我建议你使用\
    \ GDR 仓库中的最新构建版本来获取任何安全和关键更新。大多数客户使用 CU 仓库，并且没有遇到任何重大问题。\n\nMicrosoft 发布说明页面列出了每次更新，包括指向\
    \ Microsoft 支持文章的参考，其中描述了每次更新中的变更内容。你可以在 [`docs.microsoft.com/sql/linux/sql-server-linux-release-notes`](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes)\
    \ 阅读更多信息。\n\n### 验证安装\n\n完成 SQL Server 安装后，我建议执行一些基本的验证步骤，以及其他一些操作，以确保安装后的体验更加顺畅。此外，你在此过程中还会了解到一些关于\
    \ SQL Server 的知识。我强烈建议你至少完成基本建议步骤，以避免日后出现问题。\n\n### 检查 mssql-server 服务是否正在运行\n\
    \n随时运行以下命令检查 `mssql-server` 服务状态：\n\n```\nsudo systemctl status mssql-server\n\
