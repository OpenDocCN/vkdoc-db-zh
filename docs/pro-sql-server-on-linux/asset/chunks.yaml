    ** Backup  and Restore**


    I love this quote from our documentation: “The SQL Server availability features
    do


    not replace the requirement to have a robust, well tested backup and restore strategy,


    the most fundamental building block of any availability solution” (you can read
    this at


    [https://docs.microsoft.com/sql/linux/sql-server-linux-business-continuity-](https://docs.microsoft.com/sql/linux/sql-server-linux-business-continuity-dr#sql-server-2017-scenarios-using-the-availability-features)


    [dr#sql-server-2017-scenarios-using-the-availability-features](https://docs.microsoft.com/sql/linux/sql-server-linux-business-continuity-dr#sql-server-2017-scenarios-using-the-availability-features)).


    That pretty much sums up the importance of backups. Here is a quote I’ve


    always used: “Your data is only as good as your backups.” In 25 years of experience


    working with SQL Server, I’ve never seen anything else taken more for granted
    then


    having a solid backup strategy. I’ve worked with customers who have run their
    entire


    production business with SQL Server for  *months* without a good backup. And of


    course, it just takes the first time you have a failure where you need a backup
    to realize


    how important it truly is.


    Let’s explore then the fundamentals and details of backing up and restoring databases


    in SQL Server on Linux, including an important related topic, database recovery.


