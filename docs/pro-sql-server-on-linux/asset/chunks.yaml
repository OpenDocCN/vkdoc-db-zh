    [sqlcmd-utility#sqlcmd-commands or t](https://docs.microsoft.com/sql/tools/sqlcmd-utility#sqlcmd-commands)ype
    in :HELP at the sqlcmd editor prompt.


    For example, type in EXIT or QUIT to leave the editor. EXIT has a handy purpose


    where you can pass a query to EXIT(<query>) and the results of the query will
    be


    returned to the client, which is typically a script from the operating system
    shell.


    The GO command has an optional parameter of GO (<n>), which indicates to run


    the T-SQL batch <n> times, one after the other.


    In the last chapter, I created several scripts with a file extension of .sql (you
    are not


    required to use any file extension, but when you use .sql almost everyone understands


    what that means) and executed them within the Visual Studio Code Editor. I could
    have


    executed any of these with sqlcmd using the -i command line option. Any valid
    T-SQL or


    sqlcmd editor command can be put into the script.


    I’ve provided the following T-SQL command in the sample script **getsqlversion.sql**


    with these statements:


    SELECT @@version


    GO


    ![](index-170_1.png)


