    **Figure 5-4. Using `sqlcmd` with `grep`**


    `sqlcmd` also provides a `-o` command line option to write all results and errors
    to a specific file.


    ## Chapter 5 SQL Server Tools


    **Tip**: One nice option (thank you Rathijit Sen for this tip) is the `-p` option,
    which prints out performance statistics from queries executed with `sqlcmd`. This
    includes the total time for SQL Server to execute queries and for the client to
    process them. Combined with `SET STATISTICS TIME`, which I will discuss later
    in this chapter, this can provide a nice option to determine how fast SQL Server
    can execute queries and how fast a client can process results over a network.


    The full documentation for `sqlcmd` including all command line options can be
    found at [https://docs.microsoft.com/sql/tools/sqlcmd-utility](https://docs.microsoft.com/sql/tools/sqlcmd-utility).


    ## bcp


    I demonstrated in Chapter 3 of this book how to insert data into SQL Server using
    the T-SQL `INSERT` statement. I showed you how to insert one row or use `INSERT..SELECT`
    or `SELECT..INTO` to insert multiple rows.


    You might want to insert or *import* a very large number of rows based on data
    in a file stored outside of SQL Server. Or you may want to *export* data from
    SQL Server into a file. The bulk copy program (`bcp`) was designed for these types
    of tasks. Like `sqlcmd`, `bcp` has been built to run natively on Windows, Linux,
    and macOS and is installed when you install the tools that include `sqlcmd` using
    the `mssql-tools` package.


    `bcp` relies on SQL Server ODBC driver extensions to bulk copy data in and out
    of SQL Server (see our documentation at [https://docs.microsoft.com/sql/relational-databases/native-client-odbc-extensions-bulk-copy-functions/sql-server-driver-extensions-bulk-copy-functions](https://docs.microsoft.com/sql/relational-databases/native-client-odbc-extensions-bulk-copy-functions/sql-server-driver-extensions-bulk-copy-functions)).
    Therefore, you could also write an application that provides your own bulk copy
    functionality.


    For import, the `bcp` tool will read a file you specify and transmit streams of
    data to SQL Server to be applied to a target table. For export, `bcp` will copy
    out streams of data from a table and write the data into a file.


    The basic method to use `bcp` is to run this from a computer that can connect
    to SQL Server, either a remote computer or on the server itself. You specify command
    line options on how to connect to SQL Server, what database and tables you want
    to import into or export from, and an input or output file for the import or export.
    Input and output files can be all types of formats including the ability to be
    prescriptive on the datatypes within the file.


    ![](index-173_1.png)


