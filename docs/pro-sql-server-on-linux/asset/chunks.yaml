  trans: "\n# 第 11 章 SQL Server 与容器\n\n了解以下术语：\n\n- 集群\n  一个 k8s 集群是通过一组节点和 Pod 部署的容器集合，这些概念我将在下面定义。\n\
    \n- Pod\n  k8s 中的 Pod 是一个或多个容器的组，它们可以共享存储、网络以及关于如何运行这些容器的规范。\n\n- 节点\n  我很喜欢 k8s\
    \ 文档（位于 `https://kubernetes.io/docs/concepts/architecture/nodes/`）对节点的定义。\"节点是\
    \ Kubernetes 中的工作机器，以前称为 minion。节点可以是虚拟机或物理机。\" 实际上，可以将节点视为一个或多个 Pod 的宿主机。\n\n\
    - 副本集\n  副本集定义了在任何时间点应运行多少个特定 Pod 的实例，并有助于定义 Pod 的高可用性。副本集对于让 Kubernetes 在 Pod\
    \ 发生故障时自动启动新 Pod 非常重要。\n\n- 部署\n  部署是一种声明式方法，用于定义 Pod 和副本集。建议使用部署来定义 Pod 和副本集的配置以实现高可用性。这是我们将在本章中用来演示如何为\
    \ SQL Server 与 k8s 定义和配置 HADR 的方法。\n\n- 持久卷声明\n  K8s 支持通过 PersistentVolume 供 Pod\
    \ 使用的存储概念。这种存储可以在 Pod 间共享（这非常契合 SQL Server 的共享存储 HADR 解决方案）。持久卷声明是用户对 PersistentVolume\
    \ 存储的请求。\n\n- 服务\n  服务是一组可以被抽象的 Pod 的逻辑集合。其中一种服务类型是用于连接的负载均衡器。你可以为负载均衡器服务指定一个\
    \ IP 地址。每个 Pod 都有一个唯一的 IP 地址，但负载均衡器拥有一个已知的 IP 地址。可以将其视作故障转移集群实例所使用的虚拟 IP 地址概念，或可用性组的侦听器概念。即使在\
    \ k8s 执行\"故障转移\"时，它也能为 SQL Server 提供一个抽象的 IP 地址。\n\n你可以在 `https://kubernetes.io/docs/concepts/`\
    \ 阅读关于 k8s 组件和架构的更完整描述。了解了这些术语后，让我们通过使用 AKS 在 k8s 中部署一个 SQL Server 容器来实际看看它们的应用。\n\
    \n## SQL Server HADR 与 Kubernetes\n\n既然我已经描述了 k8s 的基础知识，或许你可以看出 k8s 为容器提供了一个支持\
    \ HADR 的平台。只要你以正确的方式构建你的部署和服务，SQL Server 就可以利用这种内置的 HADR 能力。在本节中，我将首先描述 HADR 如何与\
    \ k8s 协同工作，然后介绍一个非常棒的教程，你可以用它来逐步完成使用 k8s 部署 SQL Server 的过程。\n\n## HADR 如何与 k8s\
    \ 协同工作\n\n我已经描述了节点、Pod 和服务的基本术语。让我用一些可视化内容来展示 HADR 如何与 Pod、这些节点的概念以及服务协同工作。\n\n\
    使用 Pod 和持久卷声明配置 SQL Server 是一种共享存储 HADR 解决方案，其提供的功能类似于 Always On 故障转移集群实例。\n\n\
    首先，如果 k8s 检测到 Pod 出现问题或发生故障，k8s 将在该 Pod 当前运行的同一节点上自动创建一个新的 Pod，这将启动该 Pod 中的任何容器。此外，如果\
    \ Pod 使用了持久卷声明，新 Pod 中的容器将能够访问存储在该持久卷中的相同数据。另外，如果你设置了与该 Pod 关联的负载均衡器服务（该服务有一个唯一的\
    \ IP 地址），用户可以连接到负载均衡器服务（该服务有一个固定的 IP 地址），从而无需了解 Pod IP 地址的细节。图 11-12 展示了 Pod 故障的概念。\n\
    \n![](img/index-599_1.png)\n\n![](img/index-599_2.png)\n\n图 11-12. 针对 Pod 故障的\
    \ k8s HADR\n"
- fmt: '### Kubernetes 故障转移支持


    Kubernetes（k8s）同样支持在节点因任何原因发生故障时进行故障转移。一个新的 Pod 会在新节点上启动，负载均衡器服务将被重定向到新节点上的新 Pod。由于
    k8s 支持节点故障，任何用于 SQL Server 的生产级 k8s 集群都应至少有三个节点以支持故障转移，这不仅是为了 SQL Server，也是为了负载均衡器服务。图
    11-13 展示了此场景。


    *图 11-13. 节点故障的 k8s HADR*


    k8s 和故障转移的一个未在这些图中列出的有用特性是，当 SQL Server 在容器中崩溃或关闭时的情况。在这种情况下，k8s 将在同一节点上的同一 Pod
    中启动一个新容器。


    > **注意**：当 k8s 必须在新节点的新 Pod 中启动 SQL Server 容器时，容器启动可能需要更长时间，因为该 SQL Server 镜像可能未在该新节点上缓存，必须从
    Docker Hub 拉取。一旦镜像被拉取，它将被缓存在该节点上，后续的启动应该会更快。


    让我们通过查看 Microsoft 文档中支持的一个教程，来了解 k8s、SQL Server 和内置 HADR 的实际操作。


    ## 在 Azure Kubernetes Service 中使用 SQL Server


    我的一位才华横溢的同事 Mihaela Blendea 花时间构建了一个非常棒的教程，介绍如何使用 AKS 设置带有 k8s 的 SQL Server。我将让你使用自己的
    Azure 订阅来逐步完成本教程，地址为：`https://docs.microsoft.com/sql/linux/tutorial-sql-server-containers-kubernetes`。我已完成本教程，因此让我补充几点观察：


    > **提示**：如果你想在不使用本地 `azure CLI` 的情况下完成本教程，请考虑通过门户使用新的 `azure CloudShell`。你会得到一个
    bash shell（或 PowerShell），因此默认安装了诸如 `sqlcmd` 和 `nano` 编辑器等工具。这非常酷！你可以在 `https://azure.microsoft.com/en-us/features/cloud-shell/`
    阅读更多关于 `azure CloudShell` 的信息。


    - 教程中的先决条件指向此文档页面以首先创建 AKS 集群：`http://docs.microsoft.com/azure/aks/tutorial-kubernetes-deploy-cluster`。我只是使用门户创建了一个
    Kubernetes 服务，并使用大部分默认设置创建了我的集群。但是，我必须首先连接到我创建的 AKS 集群，使用此文档部分中的以下步骤：`https://docs.microsoft.com/azure/aks/tutorial-kubernetes-deploy-cluster#connect-to-cluster-using-kubectl`。


    我的 Kubernetes 服务（即我的 k8s 集群）在资源组 `bwk8s` 中名为 `bwsqlk8s`。因此，我从 Azure CloudShell
    使用了以下命令来连接到我的 AKS 服务：

    ```

    az aks get-credentials --resource-group bwk8s --name bwsqlk8s

    ```

    然后，为了验证我的节点，我从 Azure Cloud Shell 运行了以下命令：

    ```

    kubectl get nodes

    ```

    我构建了一个三节点集群，所以我的结果看起来像：

    ```

    NAME                       STATUS    ROLES     AGE       VERSION

    aks-agentpool-38442334-0   Ready     agent     21m       v1.11.2

    aks-agentpool-38442334-1   Ready     agent     21m       v1.11.2

    aks-agentpool-38442334-2   Ready     agent     21m       v1.11.2

    ```

    一旦完成，我就可以继续进行教程的下一步。


    - 使用以下命令确保包含 SQL Server 容器的 Pod 正在运行：

    ```

    kubectl get pods

    ```'
