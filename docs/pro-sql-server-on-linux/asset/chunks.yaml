- fmt: "# Chapter 8: High Availability and Disaster Recovery for SQL Server\n\n[https://docs.microsoft.com/sql/linux/sql-server-linux-ha-basics#pacemaker-for-always-on-availability-groups-and-failover-cluster-instances-on-linux](https://docs.microsoft.com/sql/linux/sql-server-linux-ha-basics#pacemaker-for-always-on-availability-groups-and-failover-cluster-instances-on-linux)\n\
    \nThere are a few differences for SQL FCI on Linux from Windows you need to know:\n\
    \n*   Since SQL Server on Windows supports multiple instances on the same server\
    \ (node), a common configuration for customers is to have multiple SQL FCIs across\
    \ a series of nodes in a cluster (often more than two nodes). SQL Server on Linux\
    \ only supports a single instance on a server. And Pacemaker only supports 16\
    \ nodes in a cluster. Therefore, you are limited to 16 SQL Server instances in\
    \ an FCI across nodes.\n*   Virtual IP addresses work a bit differently, and DMVs\
    \ such `dm_os_cluster_nodes` and `dm_os_cluster_properties` do not work on SQL\
    \ Server on Linux. You will assign an IP address and name to the FCI, but it works\
    \ slightly different than on Windows and our documentation as I referenced earlier\
    \ describes how to set this up.\n*   You need to copy the service master encryption\
    \ key manually from the primary node to all nodes, as SQL Server runs on each\
    \ node as a local user called `mssql`.\n*   SQL Server FCI on Windows supports\
    \ the `tempdb` database on a local disk (such as a fast SSD disk). This is not\
    \ supported on SQL Server on Linux. All system databases must be in the `/var/opt/mssql/data`\
    \ directory, which will be on the shared storage for the FCI.\n*   Pacemaker clusters\
    \ have a concept called `fencing` or STONITH (\"Shoot the Other Node in the Head\"\
    ). You have to love Linux! This concept is required for Pacemaker clusters in\
    \ production and is how the cluster manages poorly behaved nodes to not affect\
    \ the entire cluster (hence the term fencing to fence off a node). Windows Failover\
    \ Clusters do not have this concept. I’ll mention STONITH again in the section\
    \ on Always On Availability Groups.\n\n> **Note:** At the time of writing of this\
    \ book, `stonith` is not supported with Hyper-V or Azure Virtual Machine. You\
    \ can disable this, but Pacemaker is not officially supported without it. Microsoft\
    \ expects to resolve this issue in the future so stay tuned to the documentation\
    \ for updates.\n\n## Setup and Configuration\n\nWhile the setup of SQL Server\
    \ on Linux simply just beats the experience on Windows, setting up an FCI with\
    \ SQL Server on Linux is quite frankly challenging. Windows Clustering provides\
    \ graphical wizards and validation tools and processes. The experience on Linux\
    \ is all command line driven, involves several different steps, and can be error\
