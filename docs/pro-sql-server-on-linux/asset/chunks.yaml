    \ SQL Server。\n\n## 管理数据库\n\n部署数据库后，在某些时候您将需要执行一些数据库管理工作，无论是数据库级别还是文件级别的更改。在本节中，我将回顾这些关键主题，包括移动数据库、管理文件、分离和附加数据库、重要的\
    \ `ALTER DATABASE` 场景，以及一个非常有趣的关于修复数据库的讨论（我想您会喜欢这个包含数据库状态和校验和内部原理的部分）。\n\n## 移动数据库\n\
    \n在创建数据库并使其在生产环境中运行后，您可能需要执行的一项常见操作是将数据库和事务日志文件移动到新的目录或新的磁盘上。您可能需要移动文件的原因有多种，例如磁盘维护或磁盘升级场景。移动一个或多个文件的一种常用方法如下：\n\
    \n1.  通过执行以下 T-SQL 语句将数据库更改为离线状态\n    ```sql\n    ALTER DATABASE <dbname> SET\
    \ OFFLINE\n    ```\n    这展示了在不关闭 SQL Server 的情况下控制数据库状态的能力。\n\n2.  将 Linux 服务器上要移动的文件移至您指定的目标目录或磁盘。\n\
    \n3.  告知 SQL Server 文件的新位置。对于每个移动的文件，运行以下 T-SQL 语句：\n    ```sql\n    ALTER DATABASE\
    \ <dbname> MODIFY FILE ( NAME = logical_name, FILENAME = 'new_path\\os_file_name'\
    \ )\n    ```\n\n4.  使用以下 T-SQL 语句将数据库状态更改回在线：\n    ```sql\n    ALTER DATABASE\
    \ <dbname> SET ONLINE\n    ```\n\nSQL Server 将使数据库联机并执行恢复（正如在数据库联机时通常所做的那样）。\n\
    \n您也可能有移动系统数据库的需求。您可以在我们的文档 [`docs.microsoft.com/sql/relational-databases/databases/move-system-databases`](https://docs.microsoft.com/sql/relational-databases/databases/move-system-databases)\
    \ 中阅读有关此过程的更多信息。对于 Linux 上的 SQL Server，此文档唯一的例外是移动 master 数据库。要在 Linux 上的 SQL\
    \ Server 中移动 master 数据库，您需要使用 `mssql-conf` 脚本，如 [`docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf#masterdatabasedir`](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf#masterdatabasedir)\
    \ 所述。\n\n## 管理文件\n\n管理数据库和/或事务日志文件可能还有其他场景，包括添加新文件、删除现有文件或为现有文件增加更多空间。\n\n在我回顾这些操作的过程之前，关于文件最基本的任务之一可能是了解文件使用的空间。要查看数据库的空间使用情况，请使用系统存储过程\
    \ `sp_spaceused`。要查看事务日志的大小以及事务日志内使用的空间，您可以使用传统方法 T-SQL 语句 `DBCC SQLPERF(LOGSPACE)`，或查询\
    \ SQL Server 2017 的新 DMV `sys.dm_db_log_stats`。\n\n另一个选择是使用 SQL 操作中的新 SERVER REPORTS\
    \ 扩展\n"
- fmt: '# Managing and Monitoring SQL Server


    ## Using Studio to View Space Usage


    Studio can be used to view space usage across databases, split by data and transaction
    log usage.


    Figure 9-2 shows an example.


    ![](index-474_1.jpg)


    **Figure 9-2. Database space usage in SQL Operations Studio**


    ## Adding Database Files


    Adding a database file to a database is pretty simple via the T-SQL `ALTER DATABASE`
    statement using the `ADD FILE` option. You can read more about this at [https://docs.microsoft.com/sql/relational-databases/databases/add-data-or-log-files-to-a-database](https://docs.microsoft.com/sql/relational-databases/databases/add-data-or-log-files-to-a-database).


    Even though adding transaction log files is possible for a database, there is
    almost no benefit to adding a second transaction log file, so I don’t recommend
    it.


    **Note:** You shouldn’t have much of a need to add a database file to a system
    database, except for `tempdb`. When you need to add a file for `tempdb`, you should
    ensure you:

    1.  Add the file with the exact same size and autogrow options as all other files.

    2.  Enable the `AUTOGROW_ALL_FILES` for `tempdb` using `ALTER DATABASE` if it
    is not enabled already.


    ## Removing Database Files


    There could be situations where you need to remove a file from a database, but
    that file must be empty before it can be removed via `ALTER DATABASE` using the
    `REMOVE FILE` option.


    You can learn more about:

    *   Removing files at [https://docs.microsoft.com/sql/relational-databases/databases/delete-data-or-log-files-from-a-database](https://docs.microsoft.com/sql/relational-databases/databases/delete-data-or-log-files-from-a-database).

    *   How to empty a file at [https://docs.microsoft.com/sql/relational-databases/databases/shrink-a-file](https://docs.microsoft.com/sql/relational-databases/databases/shrink-a-file).


    You can also use `ALTER DATABASE` with the `MODIFY FILE` option to increase the
    size of a file for a database. Learn more in our documentation at [https://docs.microsoft.com/sql/relational-databases/databases/increase-the-size-of-a-database](https://docs.microsoft.com/sql/relational-databases/databases/increase-the-size-of-a-database).


    **Note:** One common issue you may encounter with any execution of `ALTER DATABASE`
    that affects files is that it will block `BACKUP` statements or be blocked by
    any active `BACKUP`.


    ## Detaching and Attaching Databases


    I’ve talked about how to move a database by moving the database and transaction
    log files. I’ve also talked about how to recover a database using backup and restore
    in earlier chapters. However, backup and restore can also be used to *transport*
    a database to another server and is the preferred method to do that.


    SQL Server also offers an alternative to transport a database by detaching and
    attaching the database. Detaching a database will shut down the database and remove
    the metadata about the database in the `master` system database but does NOT remove
    the files (which a `DROP DATABASE` would do).


    **Note:** For security purposes, never attach a database you do not trust or know
    the source.


    You can detach a database using the following T-SQL statement:


    **Note:** The following examples assume you have restored the full `WideWorldImporters`
    database, as I’ve described in previous chapters using `wget https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak`.


    ```sql

    EXEC sp_detach_db ''WideWorldImporters'', ''true''

    GO

    ```'
