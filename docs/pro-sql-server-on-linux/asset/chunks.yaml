  trans: "\n在构建应用程序，尤其是在 Linux 上，较为流行的编程语言之一是基于 Javascript 的 node.js。Node.js 支持通过一个名为\
    \ `Tedious` 的组件（Microsoft 是 Tedious 的主要贡献者。你可以在 `https://github.com/tediousjs/tedious`\
    \ 找到其开源代码，这是用于 SQL Server 的 node.js 驱动程序）连接到任何 SQL Server，使用的是表格数据流协议，即 SQL Server\
    \ 的“数据”语言。TDS 协议受 SQL Server 和 Azure SQL Server Database 支持。整个协议是开放的，并发布在 `https://msdn.microsoft.com/library/dd304523.aspx`。\n\
    \nNode.js 支持程序在 Windows、Linux 和 MacOS 上运行。你可以在 `https://nodejs.org` 下载你选择的 node.js\
    \ 平台。\n\n## 第 4 章   构建应用程序和高级 T-SQL\n\n我将展示一个使用 node.js 的示例应用程序（这是一个简单的示例，将输出显示到控制台。它不会显示网页），该示例基于\
    \ Microsoft 在 `http://www.microsoft.com/sql-server/developer-get-started/node/windows`\
    \ 提供的示例。\n\n根据我们文档 `http://www.microsoft.com/sql-server/developer-get-started/node/windows/step/2.html`\
    \ 中的说明，我运行了这些程序来安装 Tedious 驱动程序并准备我的环境，以便将 node.js 与 SQL Server 一起使用（你可以在 Visual\
    \ Studio Code 的集成终端中执行这些命令），命令是在我将要保存程序的文件夹中执行的：\n\n```\nnpm init -y\nnpm install\
    \ tedious\nnpm install async\n```\n\n关于使用 Tedious 驱动程序为 node.js 与 SQL Server 编写程序的文档参考集，请参阅\
    \ API 文档 `http://tediousjs.github.io/tedious/index.html`。另一组示例可以在 `https://github.com/tediousjs/tedious/tree/master/examples`\
    \ 找到。\n\n### 使用 node.js 连接到 SQL Server\n\n使用 node.js 连接到 SQL Server 依赖于 Tedious\
    \ 驱动程序的 `Connection` 对象。在 `http://tediousjs.github.io/tedious/api-connection.html`\
    \ 获取该对象的完整详细信息。以下是我构建的代码，用于连接到 Linux 上的 SQL Server，使用 WideWorldImporters 作为默认数据库，并使用我在本章前面创建的\
    \ sqllinux 登录名。使用 Visual Studio Code 编辑器，你可以打开示例文件 `customerappconnect.js` 查看此代码。使用此文件扩展名会使编辑器切换为识别\
    \ JavaScript 代码：\n\n```\nvar Connection = require('tedious').Connection;\nvar\
    \ Request = require('tedious').Request;\nvar TYPES = require('tedious').TYPES;\n\
    // 创建到数据库的连接\nvar config = {\n    userName: 'sqllinux',\n    password: 'Sql2017isfast',\n\
    \    server: 'bwsql2017rhel',\n    options: {\n        database: 'WideWorldImporters'\n\
    \    }\n}\nconsole.log(\"正在连接到 SQL Server\");\nvar connection = new Connection(config);\n\
    // 尝试连接到 Linux 上的 SQL Server\nconnection.on('connect', function(err) {\n    if\
    \ (err) {\n        console.log(err);\n    } else {\n        console.log('已成功连接到\
    \ SQL Server');\n        connection.close();\n    }\n});\n```\n\n我可以在集成终端中运行此代码（你可以使用\
    \ Visual Studio Code 的视图菜单打开集成终端），命令是：`node .\\customerappconnect.js`\n"
- fmt: "# Chapter 4 Building an Application and Advanced T-SQL\n\n## Inserting and\
    \ Reading Data\n\nNow that you have learned to connect to SQL Server using node.js,\
    \ let’s add in code to insert a row to the `[Application].[People]` table (a new\
    \ row other than the ones used in the examples from Chapter 3) and another piece\
    \ of code to get contacts from the Customer table.\n\nExecuting queries in node.js\
    \ with Tedious requires the `Request` object. You can find the full details of\
    \ the `Request` object at [http://tediousjs.github.io/tedious/api-request.html](http://tediousjs.github.io/tedious/api-request.html).\n\
    \nThis is a long piece of code to read, so I’ll explain a few details at the end\
    \ of the code fragment. This set of node.js code can be found in the sample file\
    \ `customerappinssel.js`, and it appears as follows:\n\n```javascript\nvar Connection\
    \ = require('tedious').Connection;\nvar Request = require('tedious').Request;\n\
    var TYPES = require('tedious').TYPES;\nvar async = require('async');\n\n// Create\
    \ connection to database\nvar config = {\n    userName: 'sqllinux',\n    password:\
    \ 'Sql2017isfast',\n    server: 'bwsql2017rhel',\n    options: {\n        database:\
    \ 'WideWorldImporters'\n    }\n}\n\nconsole.log(\"Connecting to SQL Server\");\n\
    var connection = new Connection(config);\n\nfunction Start(callback) {\n    console.log('Starting...');\n\
    \    callback(null, 'Travis Wright', 'radtravis', 'twright');\n}\n\nfunction Insert(FullName,\
    \ PreferredName, Logon, callback) {\n    console.log(\"Inserting '\" + FullName\
    \ + \"' into Table...\");\n    request = new Request(\n        `INSERT INTO [Application].[People]\
    \ ([FullName], [PreferredName],\n        [IsPermittedToLogon], [LogonName], [IsExternalLogonProvider],\n\
    \        [IsSystemUser], [IsEmployee], [IsSalesPerson], [LastEditedBy]) VALUES\n\
    \        (@FullName, @PreferredName, 1, @Logon, 0, 1, 1, 0, 0);`,\n        function(err,\
    \ rowCount, rows) {\n            if (err) {\n                console.log(err);\n\
    \                callback(err);\n            } else {\n                console.log(rowCount\
    \ + ' row(s) inserted');\n                callback(null);\n            }\n   \
    \     });\n\n    request.addParameter('FullName', TYPES.NVarChar, FullName);\n\
    \    request.addParameter('PreferredName', TYPES.NVarChar, PreferredName);\n \
    \   request.addParameter('Logon', TYPES.NVarChar, Logon);\n\n    // Execute SQL\
    \ statement\n    connection.execSql(request);\n}\n\nfunction Read(callback) {\n\
    \    console.log('Reading Customer Contacts...');\n\n    // Read all rows from\
    \ table\n    request = new Request(\n        `SELECT c.[CustomerName], c.[WebsiteURL],\
    \ p.[FullName] AS PrimaryContact\n         FROM [Sales].[Customers] AS c JOIN\
    \ [Application].[People] AS p ON\n         p.[PersonID] = c.[PrimaryContactPersonID];`,\n\
    \        function(err, rowCount, rows) {\n            if (err) {\n           \
    \     console.log(err);\n                callback(err);\n            } else {\n\
    \                console.log(rowCount + ' row(s) returned');\n               \
    \ callback(null);\n            }\n        });\n\n    // Print the rows read\n\
    \    var result = \"\";\n    request.on('row', function(columns) {\n        columns.forEach(function(column)\
    \ {\n            if (column.value === null) {\n                console.log('NULL');\n\
    \            } else {\n                result += column.value + \" \";\n     \
    \       }\n        });\n        console.log(result);\n        result = \"\";\n\
    \    });\n\n    // Execute SQL statement\n    connection.execSql(request);\n}\n\
    \nfunction Complete(err, result) {\n    if (err) {\n        console.log(err);\n\
    \    } else {\n        console.log(\"Done!\");\n        connection.close();\n\
    \    }\n}\n\n// Attempt to connect to the SQL Server on Linux\nconnection.on('connect',\
    \ function(err) {\n    if (err) {\n        console.log(err);\n        process.exit(1);\n\
    \    } else {\n        console.log('Connected to SQL Server successfully');\n\
    \        // Execute all functions in the array serially\n    }\n});\n```\n\nFigure\
    \ 4-2 shows the overall shape of things in Visual Studio.\n\n![Visual Studio Code\
    \ interface showing a node.js program connected to SQL Server](index-138_1.jpg)\n\
    \n**Figure 4-2.** Connecting to SQL Server on Linux with a node.js program in\
    \ Visual Studio Code\n\nThe results of running the code are shown in the bottom\
    \ pane in Figure 4-2, and are as follows:\n\n```\nPS C:\\wwi> node .\\customerappconnect.js\n\
    Connecting to SQL Server\nConnected to SQL Server successfully\n```\n\nIn future\
    \ examples, I’ll often just show the results as text, without also showing the\
    \ Visual Studio screenshot."
