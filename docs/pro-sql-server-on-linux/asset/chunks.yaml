- fmt: 'Database `WideWorldImporters` running the upgrade step from version 868 to
    version 869.


    RESTORE DATABASE successfully processed 58455 pages in 1.351 seconds (338.027
    MB/sec).


    Any backup from a previous version of SQL Server restored to a newer version will
    retain the *database compatibility* of the previous version. See the section on
    Post Migration Considerations for a discussion on database compatibility.


    For very large databases (100GB or more, which is my definition of very large
    for the purposes of migration), restoring a backup is the fastest method to migrate
    to SQL Server on Linux.


    ## Copy Data with Bulk Copy or SSIS Package


    There could be some reasons why you do not want to restore the database backup
    to migrate to SQL Server on Linux. Perhaps for the migration process you want
    to make changes to existing object definitions in the database. You could do this
    after you restore a backup. Or you could create a new database perhaps with new
    file definitions, create new objects, and then use SQL Server tools to export
    data out of the existing SQL Server database and import the data into the new
    database structures.


    For SQL Server on Windows, you can use the `bcp` program to export the data, copy
    the files to the Linux Server, and use `bcp` on Linux to import the data into
    your new databases. I introduced the `bcp` program in a previous chapter on tools,
    but you can also read more about `bcp` at [https://docs.microsoft.com/sql/linux/sql-server-linux-migrate-bcp](https://docs.microsoft.com/sql/linux/sql-server-linux-migrate-bcp).


    You might have a more complex Extract, Transform, and Load (ETL) process to migrate
    to a new SQL Server database on Linux. In this case, consider creating a SQL Server
    Integration Services (SSIS) package. While you must use tools on a Windows client
    to create an SSIS package, SQL Server on Linux supports executing SSIS packages
    on the Linux server. You can read more about SSIS on Linux at [https://docs.microsoft.com/sql/linux/sql-server-linux-migrate-ssis](https://docs.microsoft.com/sql/linux/sql-server-linux-migrate-ssis).


    ## Export and Import with BACPAC


    A third option to migrate an existing SQL Server database to SQL Server on Linux
    is a Data-Tier package file called a *BACPAC* file. BACPAC files are very portable
    and can be used to migrate to other platforms such as Azure. A BACPAC file is
    a package and contains the definition or schema of the database, files, and the
    objects (such as tables and indexes). In addition, the package contains exported
    versions of the data contained in user tables.


    BACPAC files are created using either SQL Server Management Studio via a visual
    interface wizard or the program `sqlpackage`. You can now use `sqlpackage` on
    Windows, macOS, or Linux from [https://docs.microsoft.com/sql/tools/sqlpackage](https://docs.microsoft.com/sql/tools/sqlpackage).
    BACPAC files are created by using options via these tools to *export* the package.
    You can read more about exporting a BACPAC file at [https://docs.microsoft.com/sql/relational-databases/data-tier-applications/export-a-data-tier-application](https://docs.microsoft.com/sql/relational-databases/data-tier-applications/export-a-data-tier-application).
    The same set of tools can be used to *import* the package. Importing the package
    will execute the package, which includes creating the database, creating files,
    all objects, and importing all data. You can read more about the import process
    at [https://docs.microsoft.com/sql/relational-databases/data-tier-applications/import-a-bacpac-file-to-create-a-new-user-database](https://docs.microsoft.com/sql/relational-databases/data-tier-applications/import-a-bacpac-file-to-create-a-new-user-database).'
