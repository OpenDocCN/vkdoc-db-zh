- fmt: "# Chapter 7: Security in SQL Server\n\n## Dynamic Data Masking\n\nThe `type`\
    \ of mask. The syntax after `FUNCTION` defines the type of mask. The default mask\
    \ has rules of how to mask certain characters depending on the column type. For\
    \ example, character column gets masked with the character `'X'` and integers\
    \ get masked with a `0`.\n\nYou can see the list of mask types in our documentation\
    \ at [https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking#defining-a-dynamic-data-mask](https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking#defining-a-dynamic-data-mask)\
    \ (which includes the ability to define your own custom mask).\n\nLet’s go through\
    \ an example to see this in action using some of the statements in the `ddm.sql`\
    \ script (connect as `sa` for all of these steps):\n\n1.  Connect as `sa` and\
    \ create a new login.\n\n```sql\n-- Demonstrate Dynamic Data Masking\n--\n-- \
    \ Make sure to connect using a privileged user such as the\n--  database owner\
    \ or sysadmin\nIF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE name\n\
    \    = N'GreatLakesUser')\nBEGIN\n    CREATE LOGIN GreatLakesUser\n        WITH\
    \ PASSWORD = N'SQLRocks!00',\n        CHECK_POLICY = OFF,\n        CHECK_EXPIRATION\
    \ = OFF,\n        DEFAULT_DATABASE = WideWorldImporters;\nEND\nGO\n```\n\n2. \
    \ Create a user to map to the login, add them to one of the defined roles in the\
    \ database, and grant read permissions to the role.\n\n```sql\nUSE WideWorldImporters\n\
    GO\n\nDROP USER IF EXISTS GreatLakesUser\nGO\n\nCREATE USER GreatLakesUser FOR\
    \ LOGIN GreatLakesUser\nGO\n\nALTER ROLE [Great Lakes Sales] ADD MEMBER GreatLakesUser\n\
    GO\n\n-- grant SELECT rights to role\nGRANT SELECT ON Purchasing.Suppliers TO\
    \ [Great Lakes Sales];\nGO\n```\n\n![Screenshot of SQL Operations Studio.](index-365_1.jpg)\n\
    \n3.  Try to read data from the `[Purchasing].[Suppliers]` table.\n\n```sql\n\
    -- select with current UNMASK rights (NOTE row count and data\n-- values), assuming\
    \ you are connected using a privileged user\nSELECT SupplierID, SupplierName,\
    \ BankAccountName,\n    BankAccountBranch, BankAccountCode, BankAccountNumber\
    \ FROM\n    Purchasing.Suppliers\n```\n\nYou will see all the data for all the\
    \ columns.\n\n4.  Impersonate the `GreakLakesUser` user and run the query again.\n\
    \n```sql\n-- impersonate the user GreatLakesUser\nEXECUTE AS USER = 'GreatLakesUser'\n\
    GO\n\n-- select with impersonated MASKED rights (NOTE row count and\n-- data values)\n\
    SELECT SupplierID, SupplierName, BankAccountName,\n    BankAccountBranch, BankAccountCode,\
    \ BankAccountNumber FROM\n    Purchasing.Suppliers\nGO\n```\n\nThe results now\
    \ are masked for certain columns even though you can see all rows. Figure 7-7\
    \ shows the results from SQL Operations Studio.\n\n**Figure 7-7.** Dynamic data\
    \ masking with SQL Server on Linux\n\nLearn more about dynamic data masking in\
    \ our documentation at [https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking](https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking).\n\
    \n## SQL Server and Encryption\n\nEncryption of data can be important to any security\
    \ scheme. However, not all applications using SQL Server need to use encryption.\
    \ Using any of the features for encryption with SQL Server will require some overhead\
    \ (such as additional CPU usage), so that has to be considered in your overall\
    \ security plan.\n\nSQL Server supports several features that enable customers\
    \ to secure *data at rest*, *data in transit*, and *connections*. Data at rest\
    \ is SQL Server data stored in files and backups. You want to ensure data is encrypted\
    \ so that attackers cannot read data outside of the SQL Server process (for example,\
    \ if someone stole the hard drive with SQL Server database files on it). In addition,\
    \ some applications would like the ability to ensure all data, end-to-end, is\
    \ encrypted from an SQL Server client application to SQL Server and back."
