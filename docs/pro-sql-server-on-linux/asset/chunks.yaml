    \ options to configure SQL Server, and know how to update SQL Server to the latest\
    \ builds.\n\nLet’s go build a database and application that uses SQL Server on\
    \ Linux!\n\n## CHAPTER 3: Building a Database and T-SQL Fundamentals\n\nNow that\
