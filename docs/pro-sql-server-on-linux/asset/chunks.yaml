  trans: '# 文件、部分与页面恢复


    对于拥有多个文件或文件组的数据库，可能会遇到只需恢复特定文件或文件组，而无需恢复整个数据库的场景——前提是你已创建了文件或文件组的备份。你可以离线或在线恢复文件或文件组（在线恢复仅适用于企业版）。要查看恢复文件或文件组的示例和场景，请参阅文档：https://docs.microsoft.com/sql/relational-databases/backup-restore/file-restores-full-recovery-model。


    如果你拥有如前一节所示的完整数据库备份序列，则可以分阶段还原数据库，称为*部分还原*。部分还原允许你按阶段将文件组联机，而不是整个数据库同时联机。这可能是你恢复时间目标策略中一个有趣的部分，因为你现在可以将
    RTO 定义在文件组级别。


    例如，对于前一节恢复 WideWorldImporters 数据库的序列，我们可以将其更改为不同的恢复顺序。我们可以先恢复主文件组，稍后再恢复辅助文件组 `WWI_UserData`。


    **注意**：内存优化数据文件组必须与主文件组一起备份和恢复。因此，你需要创建一个包含主文件组和内存优化数据文件组的数据库备份，以及另一个包含辅助文件组的备份。


    使用此技术允许用户更快地访问存储在主文件组中的数据，而 `WWI_UserData` 文件组可以在稍后时间联机。在线部分还原仅在企业版上受支持。你可以在我们的文档中了解更多关于完整恢复模型数据库的部分还原信息：https://docs.microsoft.com/sql/relational-databases/backup-restore/example-piecemeal-restore-of-database-full-recovery-model。


    更精细恢复选项的最后一个示例是*页面级恢复*。如果数据库中的特定页面损坏，此选项允许你还原这些页面。而此功能最大的优点在于它可以在线完成（仅限企业版）。设想这样一种情况：某个特定页面或一组页面被报告损坏（可能是通过
    `msg 824` 错误——我将在第 9 章详细解释，或者来自 `DBCC CHECKDB` 的检查结果）。


    ## 第 8 章：SQL Server 的高可用性与灾难恢复


    你可以使用本章到目前为止描述的方法，从数据库、差异、文件、文件组和/或日志备份中进行恢复。或者，你也可以使用这些备份仅还原所需的页面。在从数据库备份还原页面后，你仍然需要一个有效的日志备份序列来应用这些页面之后发生的所有变更。如果你能将问题定位到仅一组数据库页面，那么这是一个加速恢复时间目标极具吸引力的功能。


    事实证明，SQL Server 提供了一些工具来帮助指导你。首先，在 `msdb` 数据库中存在一个名为 `suspect_pages` 的表，其中仅包含
    SQL Server 发现已损坏的页面。其次，SQL Server Management Studio 中有一个名为“数据库恢复顾问”的工具，它基于在 `msdb`
    中找到的备份历史提供恢复建议，以指导你完成时间点恢复和数据库页面恢复。'
- fmt: '# System Database Restore


    I mentioned in the section on Backups in this chapter that you can backup `master`,
    `model`, and `msdb` like user databases. Let’s take each system database and talk
    about the process to restore them from backups.


    ## msdb


    This is the easiest of the three to restore, since SQL Server can start up even
    if this database is not accessible or is damaged. So, the process to restore `msdb`
    is just like any user database while SQL Server is running.


    **Tip** how do I know this? It is easy to test. First, shut down SQL Server. Then
    simply rename the `msdbdata.mdf` file and restart SQL Server. You can use this
    method to test out how SQL Server behaves if any system database is not available.


    ## model


    If a problem exists with the `model` database where it is still accessible, then
    you should be able to restore the database while SQL Server is online. However,
    if the `model` database cannot be started, SQL Server will attempt to start but
    immediately shutdown. Fortunately, there is a nice trick here to restore `msdb`
    in this situation. Enable trace flag `3608` (which says don’t open any databases
    except for `master`) with `mssql-conf` and then start SQL Server. You should be
    able to go in and restore an `msdb` backup. After you do this, shut down SQL Server,
    disable the trace flag, and restart the service.


    ## master


    Like `model`, if the `master` database is available, you can restore a backup
    of `master` but only after starting SQL Server in "single user mode" (our documentation
    tells you how to do this at [https://docs.microsoft.com/sql/linux/sql-server-linux-troubleshooting-guide#start-sql-server-in-minimal-configuration-or-in-single-user-mode](https://docs.microsoft.com/sql/linux/sql-server-linux-troubleshooting-guide#start-sql-server-in-minimal-configuration-or-in-single-user-mode)).
    SQL Server will shut down by default after a restore of `master`. If the `master`
    database is not available, SQL Server fails to start immediately. In some cases,
    you can still restore a backup of `master` if you start SQL Server in "single
    user mode" and enable trace flag `3607` (this trace flag tells SQL Server to not
    recover `master`).


    What if a backup is not available for any of these databases and you need them
    to function properly? There is an option to rebuild system databases from their
    original state at installation. The system databases are stored in one of the
    `.sfp` files I mentioned in Chapter 2. The method to rebuild these is documented
    at [https://docs.microsoft.com/sql/linux/sql-server-linux-troubleshooting-guide#rebuild-system-databases](https://docs.microsoft.com/sql/linux/sql-server-linux-troubleshooting-guide#rebuild-system-databases).


    You can read more about this tool in our documentation at [https://docs.microsoft.com/sql/relational-databases/backup-restore/restore-and-recovery-overview-sql-server#DRA](https://docs.microsoft.com/sql/relational-databases/backup-restore/restore-and-recovery-overview-sql-server#DRA).


    You can read the complete guide to restoring pages in our documentation at [https://docs.microsoft.com/sql/relational-databases/backup-restore/restore-pages-sql-server](https://docs.microsoft.com/sql/relational-databases/backup-restore/restore-pages-sql-server).'
