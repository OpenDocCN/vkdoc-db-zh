    # Chapter 2 InStaLL anD ConfIguratIon


    ## Windows Server Failover Clustering


    SQL Server on Windows relies on Windows Server Failover Clustering (`WSFC`) for
    Always On Failover Cluster Instance and Always On Availability Groups for High
    Availability.


    `WSFC` of course does not exist on Linux and therefore SQL Server uses other software,
    `Pacemaker`, to partner together to provide high-availability options. I will
    discuss this further in Chapter [8. If y](#index_split_005.html#p389)ou want to
    jump right into the details of how this works, start with this documentation pag[e:  https://docs.microsoft.com/sql/linux/sql-server-](https://docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-concepts)


    [linux-shared-disk-cluster-concepts.](https://docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-concepts)


    ## Updates and Uninstall


    SQL Server on Linux provides simple methods to update to later versions of SQL
    Server, based on `CUs` or new `GDR` versions. In addition, a simple method exists
    to uninstall and remove SQL Server.


    ### Updating SQL Server


    Based on your configured repository for SQL Server as described previously in
    this chapter, using the built-in update functionality of the package manager of
    your distribution pulls down the latest version in that repository and applies
    the update to the SQL Server binaries. All database files are unaffected.


    If you run the following command:


    ```

    sudo yum update mssql-server

    ```


    ![](index-95_1.png)


    the latest updated build based on your configured repository will be downloaded
    and installed. If you have already installed the latest update, you will get a
    message that says, “No packages marked for update.”


    I recommend you keep up to date with Microsoft builds from the `CU` repository.
    The frequency of these updates is typically monthly (although this will become
    less frequent as a major release ages). Microsoft is continually improving SQL
    Server on Linux through fixes and updates in `CUs`.


    Let’s look at a few scenarios of how to use an update and what behavior you can
    expect.


    If you have installed the original `GA` version of SQL Server 2017 at the time
    we released the product and then used the update process when SQL Server 2017
    2017 `CU4` was available, Figur[e 2-19](#index_split_002.html#p95) shows what
    you can expect.


    **Figure 2-19. Updating SQL Server**


    When the update completes, you will be prompted to restart SQL Server using this
    command to complete the update:


    ```

    sudo systemctl restart mssql-server

    ```


    What if you would like to update SQL Server to a specific version? While Microsoft
    believes you should apply the latest updates, it is possible to update to a specific
    version if that version is later than the version you are currently running. This
    technique also is a method for you to update offline, as using the package manager
    update option will require an Internet connection.


    So, if you were running the SQL Server 2017 `GA` version and wanted to update
    to SQL Server 2017 `CU3` when `CU4` is the latest update, you would follow this
    process:


    - Download the SQL Server 2017 `CU3` package (See this documentation page for
    a location of packages: [https://docs.](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes)


    [microsoft.com/sql/linux/sql-server-linux-release-notes.)](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes)


    - Copy this package to your Linux server.


    - Use the offline install method to install the SQL Server 2017 `CU3` package.


    What you cannot do is use this method to update SQL Server to a lower version
    than the version you are currently running. See the next section to learn how
    to update to a lower version of SQL Server.


    ### Rolling Back to a Previous Update


    While we believe you should not have issues using the latest updates for SQL Server,'
