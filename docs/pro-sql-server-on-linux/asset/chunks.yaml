- fmt: '# Always On可用性组性能与使用


    ## 性能考虑


    关于在可用性组中使用同步副本，客户常问的一个问题是：针对主副本运行事务的应用程序性能是否会受到影响。答案是肯定的。更重要的问题是：性能影响是否可以忽略不计，同时仍能实现高可用性的好处。这个答案绝对是肯定的。


    **SQL Server的高可用性与灾难恢复**


    影响可用性组性能的三个最大因素是：


    *   针对主副本运行的事务速率

    *   事务在主副本和辅助副本的事务日志文件中被持久化的速度（磁盘I/O通常是最大的因素）

    *   主副本和辅助副本之间连接的速度


    您可以完全控制在磁盘上使用最快的硬件处理事务日志，并控制副本之间网络设备的速度。


    因此，最大的担忧可能是针对主副本的事务速率。我遇到过一些瓶颈问题的两种场景是：


    *   大量并发用户执行极高频率的微小单语句事务

    *   大型索引的创建和重建


    第一个问题可以通过将语句分组到逻辑事务中来缓解（这是独立于可用性组、提升事务性能的良好实践）。


    第二个问题更棘手，可能需要您仔细安排索引创建和重建的时间表，使用分区以较小的块构建索引，并评估是否确实需要创建或重建索引。


    请浏览我们文档的这一部分，了解监控可用性组性能以查找同步过程中可能存在的瓶颈的常见方法：[https://docs.microsoft.com/sql/database-engine/availability-groups/windows/monitor-performance-for-always-on-availability-groups#BKMK_SCENARIOS](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/monitor-performance-for-always-on-availability-groups#BKMK_SCENARIOS)


    您可以确信的是，微软一直在努力优化处理可用性组的代码。您可以在以下链接中阅读更多关于我们在SQL Server 2016中开始的性能优化工作：[https://blogs.msdn.microsoft.com/sqlserverstorageengine/2016/09/26/sql-server-2016-it-just-runs-faster-always-on-availability-groups-turbocharged/](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2016/09/26/sql-server-2016-it-just-runs-faster-always-on-availability-groups-turbocharged/)


    ## 可读副本


    Always On可用性组相对于故障转移群集实例的最大优势之一（除了不需要共享存储之外）是可用性组的辅助副本可以*被积极使用*。您可以从辅助副本数据中读取，也可以在其上执行备份。'
  raw: '[https://docs.microsoft.com/sql/database-engine/availability-groups/windows/](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/sql-server-always-on-database-health-detection-failover-option)


    [sql-server-always-on-database-health-detection-failover-option.](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/sql-server-always-on-database-health-detection-failover-option)


    ** Performance  Considerations**


    One common question I hear from customers about the use of a synchronous replica


    with AGs is whether performance of the application running transactions against


    the primary will be affected. And the answer is yes. The more important question
    is


    whether the performance impact can be negligible and still achieve the benefit
    of high


    availability. That answer is definitely yes.


    Chapter 8   high availability and disaster reCovery for sQl server


    The three biggest factors in performance for AGs are:


    •  The rate of transactions run against the primary replica


    •  The speed in which transactions can be hardened on the primary and


    secondary replica transaction log files (disk I/O is usually the biggest


    factor)


    •  The speed of connectivity between the primary and secondary


    replicas


    You have complete control over using the fastest hardware for disks on both the


    primary and secondary for transaction log and the speed of network devices between


    replicas.


    Therefore, the biggest concern may be transaction rates to the primary. The two


    scenarios where I’ve seen some bottleneck issues are:


    •  A high rate of exceedingly small single statement transactions by a


    large number of concurrent users


    •  Large index builds and rebuilds


    The first issue can be mitigated by grouping statements together into logical


    transactions (this is a good practice for transaction performance independent
    of AGs).


    The second issue is trickier and may require you to carefully schedule index builds
    and


    rebuilds, use partitioning to build indexes in smaller chunks, and also evaluate
    whether


    you need to build or rebuild an index.


    Take a look through this part of our documentation to see common methods to


    monitor the performance of availability groups to look for possible bottlenecks
    in the


    synchronization process[: https://docs.microsoft.com/sql/database-engine/](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/monitor-performance-for-always-on-availability-groups#BKMK_SCENARIOS)


    [availability-groups/windows/monitor-performance-for-always-on-availability-](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/monitor-performance-for-always-on-availability-groups#BKMK_SCENARIOS)


    [groups#BKMK_SCENARIOS](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/monitor-performance-for-always-on-availability-groups#BKMK_SCENARIOS).


    One thing you can count on is that Microsoft has worked to streamline the


    code that handles AGs. You can read more about the performance optimization


    work we did starting in SQL Server 2016 at [https://blogs.msdn.microsoft.com/](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2016/09/26/sql-server-2016-it-just-runs-faster-always-on-availability-groups-turbocharged/)


    [sqlserverstorageengine/2016/09/26/sql-server-2016-it-just-runs-faster-](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2016/09/26/sql-server-2016-it-just-runs-faster-always-on-availability-groups-turbocharged/)


    [always-on-availability-groups-turbocharged/.](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2016/09/26/sql-server-2016-it-just-runs-faster-always-on-availability-groups-turbocharged/)


    Chapter 8   high availability and disaster reCovery for sQl server


    ** Readable  Secondaries**


    One of the biggest advantages of Always On Availability Groups over an FCI, besides


    the fact that you don’t need shared storage, is that the secondary replicas for
    the


    AG can be  *actively used*. You can read from secondary replica data, run backups
    on'
  trans: '

    # Always On 可用性组的性能与使用


    ## 性能考量


    关于在可用性组中使用同步副本，客户经常提出的一个问题是：针对主副本运行事务的应用程序性能是否会受到影响。答案是肯定的。但更重要的问题是：性能影响是否可以忽略不计，同时仍能实现高可用性的好处。对于后一个问题，答案绝对是肯定的。


    **SQL Server 的高可用性与灾难恢复**


    影响可用性组性能的三大主要因素是：


    *   针对主副本运行的事务速率

    *   事务在主副本和辅助副本的事务日志文件中被持久化的速度（磁盘 I/O 通常是最大的影响因素）

    *   主副本和辅助副本之间的网络连接速度


    您可以完全控制在磁盘上使用最快的硬件来处理事务日志，也可以控制副本之间网络设备的速度。


    因此，最大的担忧可能来自于针对主副本的事务速率。我遇到过两种导致瓶颈的典型场景：


    *   大量并发用户执行极高频率的微小单语句事务

    *   大型索引的创建与重建


    第一个问题可以通过将语句分组到逻辑事务中来缓解（这是一个独立于可用性组、有助于提升事务性能的良好实践）。


    第二个问题更为棘手，可能需要您仔细规划索引创建和重建的时间表，使用分区以较小的块构建索引，并评估是否确实需要创建或重建索引。


    请浏览我们文档的这一部分，了解监控可用性组性能以查找同步过程中可能存在的瓶颈的常见方法：[监控 Always On 可用性组的性能](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/monitor-performance-for-always-on-availability-groups#BKMK_SCENARIOS)


    您可以确信，微软一直在努力优化处理可用性组的代码。您可以在以下链接中阅读更多关于我们在 SQL Server 2016 中开始的性能优化工作：[SQL Server
    2016 IT Just Runs Faster: Always On 可用性组性能提升](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2016/09/26/sql-server-2016-it-just-runs-faster-always-on-availability-groups-turbocharged/)


    ## 可读副本


    Always On 可用性组相对于故障转移群集实例的最大优势之一（除了不需要共享存储之外）在于，其辅助副本可以*被积极利用*。您可以从辅助副本读取数据，也可以在其上执行备份操作。

