    此时，`WideWorldImporters` 数据库的数据库和日志文件仍保留在磁盘上的当前位置。然后，你可以将这些文件复制到另一台运行 SQL Server
    的 Linux 服务器上并进行附加。运行以下 T-SQL 语句，该语句位于示例脚本 `attachwwi.sql` 中：


    ```sql

    CREATE DATABASE WideWorldImporters

    ON (FILENAME = ''/var/opt/mssql/data/WideWorldImporters.mdf''),

    (FILENAME = ''/var/opt/mssql/data/WideWorldImporters_UserData.ndf''),

    (FILENAME = ''/var/opt/mssql/data/WideWorldImporters.ldf''),

    (FILENAME = ''/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1'')

    FOR ATTACH

    GO

    ```


    请注意，在此示例中，我提供了 `WideWorldImporters` 数据库的所有文件以及内存优化检查点文件的文件夹。在此示例中，你可以在附加时更改数据库的名称。你也可以将文件放置在不同的路径中，然后从新路径进行附加。


    `注意` SQL Server 有一个旧的系统存储过程 `sp_attach_db`，但它已被标记为弃用，因此请使用带有 `FOR ATTACH` 选项的
    `CREATE DATABASE`。


    虽然通常需要所有原始文件才能附加数据库，但有一些隐藏的技巧：


    1.  如果数据库通过在没有活动事务存在时执行分离而干净地关闭，并且只有一个事务日志文件，那么在附加数据库时可以省略该事务日志文件，SQL Server 将自动构建一个新的日志文件。

    2.  如果数据库通过在没有活动事务存在时执行分离而干净地关闭，并且有多个事务日志文件，SQL Server 提供了 `FOR ATTACH_REBUILD_LOG`
    这个 `CREATE DATABASE` 选项。


    第 9 章 管理和监控 SQL Server


    你只应分离处于 `ONLINE`（在线）状态且健康的数据库。处于 `SUSPECT`（可疑）状态（由于某种原因恢复失败）的数据库无法被分离。但是，如果你将处于
    `SUSPECT` 状态的数据库设为脱机（offline），然后删除（drop）此数据库，文件将保留。此时，如果你尝试附加此数据库，将会失败。如果你发现自己处于这种情况，可以使用我称之为
    *Paul Randal 附加法* 的方法，这是以我的好朋友 Paul Randal 的名字命名的，他是数据库修复和拯救技巧方面的顶尖专家之一。你可以在 [`www.sqlskills.com/blogs/paul/creating-detaching-re-attaching-and-fixing-a-suspect-database`](https://www.sqlskills.com/blogs/paul/creating-detaching-re-attaching-and-fixing-a-suspect-database)
