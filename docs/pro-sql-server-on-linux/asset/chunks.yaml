    ## Post-Install Configuration


    Once you have installed SQL Server, there are several choices for configuration
    for the SQL Server instance. Many of these are related to optimize and provide
    maximum database performance. I will cover those topics in Chapter [6](#index_split_003.html#p250)
    in more detail. You will also see in that chapter that some configuration choices
    are at the database or even query level. This section is intended to get your
    familiar with your options and methods to make configuration choices that affect
    the overall SQL Server instance across all databases. Some of these methods require
    external tools and some are built into the SQL Server engine through the `T-SQL`
    language. If you are installing SQL Server for a production enterprise-grade workload,
    then please review Chapter [6](#index_split_003.html#p250) to understand our recommendations
    to maximize performance.


    ## Using mssql-conf


    For Windows users, SQL Server provides a graphical application called the SQL
    Server Configuration Manager. The intent was to provide a method to make configuration
    choices that could not be implemented or did not make sense to implement through
    the `T-SQL` language.


    ![](index-88_1.png)


    Chapter 2 Install and Configuration


    For SQL Server on Linux, we provide comparable capabilities through the `mssql-conf`
    bash shell script. You have seen the use of this script to complete the setup
    process. The script supports other options to configure SQL Server after the initial
    setup. If you look at the help for `mssql-conf` you can see all the arguments
    it supports for configuration choices.


    ```

    sudo /opt/mssql/bin/mssql-conf --help

    ```


    Figure 2-18 shows these options.


    Figure 2-18: mssql-conf options


    The main arguments you will use to make configuration changes are `set`, `unset`,
    and `traceflag`.


    `set`: Allows you to set the value of a configuration setting. The list of possible
    settings and their values can be found by using the `list` argument, or look them
    up in our documentation at [https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf).'
