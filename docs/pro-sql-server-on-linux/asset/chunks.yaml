    \ `WHERE` 子句来过滤结果。\n\n在许多分析类型的工作负载中，需要对结果进行聚合或排序。与其他流行的数据库引擎一样，SQL Server 提供了\
    \ T-SQL 语法，用于通过 `GROUP BY` 对行进行分组，并使用 `ORDER BY` 确保结果按特定顺序排列。\n\nSQL Server 还提供了丰富的函数来执行聚合操作，包括聚合函数（例如\
