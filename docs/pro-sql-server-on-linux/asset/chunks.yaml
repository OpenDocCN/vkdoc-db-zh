- fmt: '# Chapter 6: Performance Capabilities


    [by-in-memory-oltp](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/transact-sql-constructs-not-supported-by-in-memory-oltp).


    ## Usage Scenarios


    If you have enough memory to fit the data and need a high-speed, scalable, OLTP
    solution, memory optimized tables may be a good fit for you. Use this place in
    our documentation to estimate the memory needs of your memory optimized tables:
    [https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/estimate-memory-requirements-for-memory-optimized-tables](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/estimate-memory-requirements-for-memory-optimized-tables).


    In-Memory OLTP has more uses than your traditional `INSERT`, `UPDATE`, `DELETE`
    type of SQL application. Consider these other examples:

    *   Data ingestion applications, especially internet of things (`IoT`) scenarios

    *   Caching and session state data

    *   Replacing `tempdb` usage

    *   Extract Transform Load (`ETL`) scenarios


    Check out our documentation for more guidance on these scenarios and some customer
    case study examples: [https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/overview-and-usage-scenarios](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/overview-and-usage-scenarios).


    ## The Intelligent SQL Server Engine


    I’ve presented in this chapter all the amazing performance capabilities either
    built into the SQL Server Engine or available through configuration settings or
    additional features like `Columnstore` indexes. In SQL Server 2017, we made decisions
    to start investing in features that provide more `intelligence` into the SQL Server
    engine, to help boost performance for applications and reduce the time to resolve
    performance problems. One of these features is built into the Query Processing
    Engine and another is built into the engine when the `Query Store` feature is
    enabled.


    ## Adaptive Query Processing


    While the query processor in SQL Server is an amazing component of the engine
    and is designed to build the best possible query plans balanced with keeping compile
    times quick, patterns exist where the query processor is limited in decisions
    it can make. And many of these scenarios involve limitations based on cardinality
    estimation.


    So, in SQL Server 2017, instead of always “chasing our tails” and trying to fix
    these cardinality issues, we built functionality to have the query processor `adapt`
    to query execution issues and correct them “on the fly.”


    This family of features is called `adaptive query processing` (which is actually
    part of a wider set of functionalities planned for SQL Server called `intelligent
    query processing`).


    In SQL Server 2017, we have enabled three different scenarios for adaptive query
    processing:

    *   Batch mode memory grant feedback

    *   Batch mode adaptive join

    *   Interleaved execution


    If you remember in the earlier section on `Columnstore` indexes, I touched on
    the topic of `batch mode` processing. This means that for the first two scenarios,
    adaptive query processing will only work when the query processor uses batch mode.
    In SQL Server 2017, this means only for scenarios for `Columnstore` indexes.


    The concept for the first scenario, batch mode memory grant feedback, is that
    SQL Server will adapt its memory allocation for memory grants if it detects a
    query has executed and used an incorrect memory grant. Subsequent executions of
    the query will adapt to a new grant, thereby avoiding a performance problem. This
    detection is built into the query processor and does not require a recompilation
    of the query.


    The second scenario is an example of SQL Server adapting by creating a new query
    plan.'
