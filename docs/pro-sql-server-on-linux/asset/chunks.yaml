- fmt: '# Chapter 6 Performance Capabilities


    ## Data Compression


    To support maximizing your memory footprint, SQL Server supports data compression
    for database pages and rows. Compression by its nature allows you to fit more
    data from database pages into the buffer pool cache, offset with the cost of uncompressing
    data when you need to read data. Another more interesting form of compression
    is used when you create columnstore indexes, which I will discuss later in this
    chapter. For more information about data and row compression, see our documentation
    at [https://docs.microsoft.com/sql/relational-databases/data-compression/data-compression](https://docs.microsoft.com/sql/relational-databases/data-compression/data-compression).


    ## Parallel Processing


    Why use one thread when two can do it faster? That is the philosophy of parallel
    processing in SQL Server. SQL Server has parallel processing capabilities across
    the engine and for many different purposes and scenarios.


    The most common scenario is *parallel query processing*. When compiling a query
    to build a query plan, SQL Server can decide that a specific type of operation
    (e.g., Index Scan) could be run faster if run by multiple tasks (worker threads).
    Parallel query processing traditionally gets a “bum rap” by many in the SQL Server
    community because queries that use parallel processing can consume more CPU resources.
    While it is true that any time SQL Server chooses to use operators for parallel
    query processing, there is likely a tuning opportunity, there are several scenarios
    where using parallel queries is a preferable option. Most of these scenarios are
    related to data warehouse applications.


    I will discuss configuration options for controlling the number of tasks involved
    in parallel query processing and other parallel operations later in this chapter.


    Let’s look at an example of how to observe parallel query processing using a T-SQL
    `SELECT` statement that has to scan a clustered index to retrieve a larger number
    of rows. This example assumes you have already restored the full `WideWorldImporters`
    sample as mentioned at the start of this chapter.


    Use SQL Operations Studio with the following T-SQL batch, which can be found in
    the sample script `sqlqpparallel.sql`:


    ```sql

    USE [WideWorldImporters]

    GO

    SET STATISTICS XML ON

    GO

    SELECT COUNT(*) FROM Sales.Invoices WITH (INDEX=1)

    GO

    ```


    ![](index-269_1.jpg)


    Figure 6-8 shows the results, including a visual representation of the query plan.


    **Figure 6-8.** A parallel query plan on SQL Server on Linux


    In this figure, notice two indicators of a parallel query plan:


    - The `Parallelism` operator

    - The Number of Executions for the Clustered Index Scan is 4. Since the Clustered
    Index Scan is the first execution in the query, a Number of Executions = 4 indicates
    4 worker threads are used to scan the clustered index.


    Parallel execution is used in other areas of SQL Server, including but not limited
    to:


    - **Creating Databases**: SQL Server will create one worker thread for each unique
    disk volume for creating database and transaction log files.

    - **Backup/Restore**: SQL Server will create multiple worker threads to read or
    write to database files, and multiple worker threads to read or write to the database
    backup.

    - **DBCC CHECKDB**: By default, `DBCC CHECKDB` will use multiple worker threads
    to check the consistency of the database. Trace flag 2528 can be used to disable
    the use of parallel worker threads to execute `CHECKDB`.

    - **Building Indexes**: Creating or rebuilding indexes uses multiple worker threads.

    - **SELECT..INTO/INSERT..SELECT**: These “bulk” T-SQL statements can use multiple
    worker threads to read source tables and populate target tables.

    - **Recovery**: SQL Server can use multiple worker threads to roll forward...'
