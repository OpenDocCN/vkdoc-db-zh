- fmt: '# Chapter 6: Performance Capabilities


    groups of pages from a database file and then to other files in the filegroup.
    Proportional fill means SQL Server attempts to perform these allocations so that
    the spaces used across the database files are fairly evenly spread.


    Once you create a filegroup, you can then designate one or more tables or indexes
    to the named filegroup. By default, each database has a built-in filegroup called
    `PRIMARY`. All system tables are stored in the files associated with the `PRIMARY`
    filegroup.


    The most common configuration for production databases is to create one database
    file of smaller size for the `PRIMARY` filegroup and one or more named filegroups
    for a collection of tables and/or indexes. Filegroups provide other advantages
    from a management point of view. You can backup, restore, run consistency checks,
    and manage the filegroup as a unit.


    Let’s look at an example of how to create a database with a separate filegroup
    for data across multiple files on multiple disks, along with a transaction log
    on a separate disk.


    First, I need to add disks to my Linux Server. I’ve mentioned before that I’m
    using a Linux Virtual Machine with Hyper-V for Windows. For Hyper-V on Windows,
    you can follow the instructions on how to add hardware such as controllers and
    disks to our virtual machine in our documentation at [https://docs.microsoft.com/azure/virtual-machines/linux/attach-disk-portal](https://docs.microsoft.com/azure/virtual-machines/linux/attach-disk-portal).


    Once I’ve added my hardware, I need to configure my new disks in the Linux Operating
    System and mount directories on these disks. My virtual machine already had two
    disks: one for the standard files for Linux and one specifically mounted for the
    `/var/opt` directory where the standard SQL Server database files exist. For this
    example:


    ![](index-284_1.png)


    I’ve added four new disks: one to hold three new database files, which will be
    in their own filegroup, and one for the transaction log. If you have not configured
    disks within Linux before, I found this documentation on how to do this in an
    Azure Virtual Machine invaluable: [https://docs.microsoft.com/azure/virtual-machines/linux/add-disk](https://docs.microsoft.com/azure/virtual-machines/linux/add-disk).


    For my virtual machine, when I was finished configuring disks and mounting the
    directories to them, the final configuration looked like Figure 6-9.


    *Figure 6-9. Using multiple disks in Linux for SQL Server*


    In my example, the `/dev/sdb` disk is the second disk I created for my virtual
    machine where I mounted the `/var/opt` directory. When I installed SQL Server,
    the system databases were copied to `/var/opt/mssql/data`. This is also where
    I’ll put my `PRIMARY` filegroup database file.


    Table 6-1 provides a list of the other disks and their mounted directories. I
    created each of these virtual disks to be 30GB in size for purposes of this example.


    *Table 6-1. Disks and Their Mounted Directories*


    | **Disk** | **Mounted Directory** | **Purpose** |

    | :--- | :--- | :--- |

    | `/dev/sdc1` | `/data1` | Database file |

    | `/dev/sdd1` | `/data2` | Database file |

    | `/dev/sde1` | `/data3` | Database file |

    | `/dev/sdf1` | `/log` | Transaction Log |


    **Tip:** As described in the preceding documentation on adding disks to Linux,
    it is important to update the `/etc/fstab` file with these disks, so they are
    mounted after any reboot. In addition, be sure to change the permissions for these
    directories to the `mssql` group and user by executing `sudo chown mssql:mssql
    <directory>`.


    With these disks created and directories mounted, I can now create my database
    like the following T-SQL statement found in the example `bigdb.sql`:


    ```sql

    USE [master]

    GO

    CREATE DATABASE [big dB]

    ON  PRIMARY

    ( NAME = N''bigdb_Primary'', FILENAME = N''/var/opt/mssql/data/bigdb.mdf'' ,

    SIZE = 5GB , MAXSIZE = 100GB, FILEGROWTH = 65536KB ),

    FILEGROUP [USERDATA]  DEFAULT

    ```'
