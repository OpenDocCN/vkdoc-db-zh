    \ = require('tedious').Request;\nvar TYPES = require('tedious').TYPES;\nvar async\
    \ = require('async');\n\n// 创建到数据库的连接\nvar config = {\n    userName: 'sqllinux',\n\
    \    password: 'Sql2017isfast',\n    server: 'bwsql2017rhel',\n    options: {\n\
    \        database: 'WideWorldImporters'\n    }\n}\n\nconsole.log(\"正在连接到 SQL Server\"\
    );\nvar connection = new Connection(config);\n\nfunction Start(callback) {\n \
    \   console.log('开始...');\n    callback(null, 'Travis Wright', 'radtravis', 'twright');\n\
    }\n\nfunction Insert(FullName, PreferredName, Logon, callback) {\n    console.log(\"\
    正在将 '\" + FullName + \"' 插入表...\");\n    request = new Request(\n        `INSERT\
    \ INTO [Application].[People] ([FullName], [PreferredName],\n        [IsPermittedToLogon],\
    \ [LogonName], [IsExternalLogonProvider],\n        [IsSystemUser], [IsEmployee],\
    \ [IsSalesPerson], [LastEditedBy]) VALUES\n        (@FullName, @PreferredName,\
    \ 1, @Logon, 0, 1, 1, 0, 0);`,\n        function(err, rowCount, rows) {\n    \
    \        if (err) {\n                console.log(err);\n                callback(err);\n\
    \            } else {\n                console.log(rowCount + ' 行已插入');\n    \
    \            callback(null);\n            }\n        });\n\n    request.addParameter('FullName',\
    \ TYPES.NVarChar, FullName);\n    request.addParameter('PreferredName', TYPES.NVarChar,\
    \ PreferredName);\n    request.addParameter('Logon', TYPES.NVarChar, Logon);\n\
    \n    // 执行 SQL 语句\n    connection.execSql(request);\n}\n\nfunction Read(callback)\
