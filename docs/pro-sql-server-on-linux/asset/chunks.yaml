  trans: "\n第 8 章 SQL Server 的高可用性与灾难恢复\n此外，您可以阅读更多关于 SQL Server on Linux 上 AG 监听器的内容，网址为：[`docs.microsoft.com/sql/linux/sql-server-linux-availability-group-overview#the-listener-under-linux`](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-overview#the-listener-under-linux)。\n\
    \n现在，添加一个同址约束和一个排序约束，以确保主副本和虚拟 IP 在同一节点上运行。在任意节点的 bash shell 中运行以下命令：\n```\nsudo\
    \ pcs constraint colocation add virtualip ag_cluster-master INFINITY with-rsc-role=Master\n\
    sudo pcs constraint order promote ag_cluster-master then start virtualip\n```\n\
    \n至此，您已完成在 Linux 上的 SQL Server 中创建高可用的 Always On 可用性组的练习。不难，对吧？有没有更好的方法呢？答案是肯定的。它被称为\
    \ Ansible Playbook。这让我想起了大学四年级时，我们花了一整个学期在一门课程中为统计模拟模型构建一个 Fortran 程序。在我们提交完所有作业后，学期的最后一周，教授向我们展示了如何用一种叫做\
    \ GPSS 的语言在一天之内构建出相同的程序。我们当然都问他为什么？答案很简单。他想让我们理解创建统计模拟模型的内部原理，但也要明白要寻找更高效的方法来完成同样的任务。这是惨痛的教训。Ansible\
    \ 的核心就在于此。我们提供了一个开源的 Ansible Playbook 来安装 SQL Server、Pacemaker 集群和 AG，地址为：[`github.com/Microsoft/sql-server-samples/tree/master/samples/features/high%20availability/Linux/Ansible%20Playbook`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/high%20availability/Linux/Ansible%20Playbook)。\n\
    \n让我们来测试它\n在本节中，我们将连接到 SQL Server，并测试我们刚刚完成的 AG 与集群的新设置。我想在这个新设置上运行两个测试：(1) 向主副本数据库添加一些数据，并观察它是否显示在辅助副本上；(2)\
    \ 测试故障转移到辅助副本以及回切到主副本的过程。\n\n测试数据复制\n1.  连接到 `<虚拟 IP 地址>,1433`，运行示例 `createandinsert.sql`\
    \ 中的以下 T-SQL 语句，以在主副本上创建表并插入数据：\n    ```\n    USE [cowboysrule]\n    GO\n    DROP\
    \ TABLE IF EXISTS wewillwintheeast\n    GO\n    CREATE TABLE wewillwintheeast\
    \ (col1 int)\n    GO\n    INSERT INTO wewillwintheeast VALUES (1)\n    GO\n  \
    \  ```\n    **注意** 与其他节点一样，您可以在 `/etc/hosts` 中添加一个条目，将字符串名称与虚拟 IP 地址关联起来，并使用该名称进行连接，而无需指定端口号。\n\
    \n2.  直接连接到辅助副本，运行示例脚本 `querysecondary.sql` 中的以下 T-SQL 语句，以证明您已连接到辅助服务器，并且前述更改已从主副本复制过来：\n\
    \    ```\n    SELECT @@SERVERNAME\n    GO\n    USE [cowboysrule]\n    GO\n   \
    \ SELECT * FROM wewillwintheeast\n    GO\n    ```\n    结果应显示您的辅助副本（我的是 `bwsqllinuxag2`）以及一行数据结果。\n\
    \n![](img/index-449_1.png)\n\n测试故障转移\n"
- fmt: "# 手动故障转移与高可用性配置\n\n确保主副本和辅助副本之间能够进行故障转移的最简单方法是执行一次 *手动故障转移*。\n\n在 Windows\
    \ 的 SQL Server 中，您可以使用 T-SQL 命令来手动故障转移带有可用性组（AG）的副本。然而，对于 Linux，您必须使用 Pacemaker\
    \ 的 `pcs` 程序。您可以在我们的文档中详细了解如何在 Linux 上操作集群：[https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-failover-ha](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-failover-ha)。让我们开始尝试吧。\n\
    \n1.  首先，我们需要一种从故障转移角度查看副本当前状态的方法。执行以下 T-SQL 语句（在示例脚本 `checkreplicas.sql` 中可以找到）：\n\
    \    ```sql\n    SELECT ar.replica_server_name, hars.role_desc,\n           hars.operational_state_desc\n\
    \    FROM sys.dm_hadr_availability_replica_states hars\n    JOIN sys.availability_replicas\
    \ ar\n      ON hars.replica_id = ar.replica_id\n    GO\n    ```\n    在我的环境中，结果如图\
    \ 8-14 所示。\n\n    **图 8-14.  SQL Server on Linux 上 AG 的副本状态**\n    ![](index-450_1.png)\n\
    \n2.  现在是尝试使用 `pcs` 程序进行故障转移的时候了。在任意节点的 bash shell 中运行以下命令，并替换为您辅助节点的名称（我的是 `bwsqllinuxag2`）：\n\
    \    ```bash\n    sudo pcs resource move ag_cluster-master bwsqllinuxag2 --master\n\
    \    ```\n\n3.  文档中指出，Pacemaker 的特性是在执行手动故障转移后会添加一个位置约束，这可能导致问题，因此请在任意节点的 bash\
    \ shell 中执行以下命令：\n    ```bash\n    sudo pcs constraint remove cli-prefer-ag_cluster-master\n\
    \    ```\n\n4.  为确保故障转移正常工作，请在辅助节点上执行相同的 `checkreplicas.sql` 脚本。在我的环境中，结果如图 8-15\
    \ 所示。\n\n    **图 8-15.  故障转移后的副本状态**\n    ![](index-451_1.png)\n\n您现在可以看到，辅助副本已变为主副本，而原主副本变为了辅助副本。现在您可以重复上述步骤\
    \ 2 和 3 来故障回复到主副本。使用与上面步骤 2 相同的 `pcs` 命令来移动资源，但这次填入主副本的名称（如下例所示，务必也要运行相同的命令来移除位置约束）：\n\
    ```bash\nsudo pcs resource move ag_cluster-master bwsqllinuxag1 --master\n```\n\
    \n**注意**  我在自己的设置中注意到，故障回复到主副本似乎比故障转移到辅助副本花费的时间稍长，因此当您进行故障回复时，请给予更长的时间来检查状态。\n\
    \n恭喜！如果您已经做到这一步，那么您已经成功为 SQL Server on Linux 设置了一个高可用的 Always On 可用性组，并测试了其功能。为什么我称其为“高可用”？您将在本章末尾的一节中找到答案。让我们来看看\
    \ AG 的其他方面，以结束本章。\n\n## 数据库运行状况检测\n\n我在关于 FCI 的部分以及前面关于 AG 的部分中提到了如何使用 `sp_server_diagnostics`\
    \ 和灵活的故障转移策略来检测故障转移的概念。您可能已经注意到，这些策略是在 SQL Server *实例* 级别设置的。在 AG 中使用实例级别逻辑的问题在于，AG\
    \ 是数据库级别的故障转移。\n\n因此，SQL Server 有一个称为 *数据库运行状况检测* 的概念。通过使用 `CREATE AVAILABILITY\
    \ GROUP`（或 `ALTER`）中的一个选项 `DB_FAILOVER`，SQL Server 将监控数据库是否脱机并启动故障转移。默认值为 `OFF`，但我建议使用此选项以确保在数据库不可访问时发生故障转移。AG\
    \ 中的所有数据库都作为此功能的一部分受到监控。\n\n该功能有一些细微差别和限制，您可以在以下链接中阅读有关内容。"
  raw: 'The simplest method to ensure that failover will work between the primary
    and


    secondary replica is to execute a  *manual failover*.


    In SQL Server on Windows, you can use T-SQL commands to manually failover a


    replica with AGs. However, for Linux, you must use the pcs program with Pacemaker.


    You can read all about operating the cluster on Linux in our documentation at


    [https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-failover-ha)


    [failover-ha](https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-failover-ha).
    Let’s give it a try.


    1.  First, we need a way to see the current state of replicas from a


    failover perspective. Execute the following T-SQL statement, as


    found in the example script **checkreplicas.sql**:


    SELECT ar.replica_server_name, hars.role_desc,


    hars.operational_state_desc


    FROM sys.dm_hadr_availability_replica_states hars


    JOIN sys.availability_replicas ar


    ON hars.replica_id = ar.replica_id


    GO


    In my environment, the results look like Figur[e 8-14.](#index_split_006.html#p449)


    ***Figure 8-14.  **Replica states for AGs on SQL Server on Linux*


    ![](index-450_1.png)


    Chapter 8   high availability and disaster reCovery for sQl server


    2.  Now it’s time to try a failover using the pcs program. Run the


    following command from the bash shell on any node, putting in


    the name of your secondary node (mine is bwsqllinuxag2):


    sudo pcs resource move ag_cluster-master bwsqllinuxag2 --master


    3.  The documentation calls out that the nature of Pacemaker is to


    add a colocation constraint after performing a manual failover


    that can cause issues, so execute the following command from the


    bash shell on any node:


    sudo pcs constraint remove cli-prefer-ag_cluster-master


    4.  To make sure the failover worked properly, execute the same


    **checkreplicas.sql** script but this time on the secondary node. The


    results in my environment look like Figur[e 8-15](#index_split_006.html#p450).


    ***Figure 8-15.  **Replica states after a failover*


    You can see now the secondary has become the primary and the primary the


    secondary. You can repeat the steps 2 and 3 above now to fail back to the primary
    replica.


    Use the same pcs command as above in step 2 to move the resource but this time
    put in


    the name of the primary like the following code example (be sure to also run the
    same


    command to remove the colocation constraint):


    sudo pcs resource move ag_cluster-master bwsqllinuxag1 --master


    Chapter 8   high availability and disaster reCovery for sQl server


    **Note**  i’ve noticed on my setup it seems to take a bit longer to fail back
    to the


    primary then failing over the secondary, so when you fail back give it a longer
    time


    to check on states.


    Congratulations! If you have made it this far you successfully have set up a


    Highly Available Always On Availability Group for SQL Server on Linux and tested
    its


    functionality. Why do I call it Highly Available? You will find out in a section
    towards the


    end of this chapter. Let’s look at other aspects of AGs to conclude this chapter.


    ** Database Health Detection**


    I mentioned in the section on FCI as well as an earlier section on AGs the concept
    of how


    failover is detected using sp_server_diagnostics and flexible failover policies.
    You may


    have noticed that those policies are at an SQL Server  *instance* level. The problem
    with


    using instance level logic for AGs is that AGs are a database level of failover.


    Therefore, SQL Server has a concept called  *Database Health Detection*. By using


    an option for CREATE AVAILABILITY GROUP (or ALTER) called DB_FAILOVER, SQL


    Server will monitor if a database goes offline and start a failover. The default
    is OFF, but I


    recommend using this option to ensure a failover occurs if the database is not
    accessible.


    All databases in the AG are monitored as part of this feature.


    There are a few nuances and limits to the feature, which you can read about at'
