    This relationship will become more apparent in Chapter 2 as I talk about exploring
    what is installed for SQL Server on Linux.


    I realize this looks very complicated, and it is, but it is also simple and elegant.
    And this is the architecture that has allowed us to move so quickly yet with great
    quality and performance to bring SQL Server on Linux to the market.


    I included the details in this chapter not because you must know them to use SQL
    Server on Linux, but to clear up any confusion about how it works and to lend
    credibility to the design and architecture.


    And here is the most important point. As you will learn in the next section, the
