    报表可以是深入了解 SQL Server 和数据库的极其强大的功能。虽然 SSMS 提供了内置报表，但你也可以创建自己的自定义报表并将其集成到 SSMS 中。你可以在我们的文档
    `https://docs.microsoft.com/sql/ssms/object/custom-reports-in-management-studio`
    中阅读有关如何构建自定义报表的更多信息。


    ### **引擎内置工具**


    SQL Server 的一个惊人之处在于核心数据库引擎中内置了许多*工具*。我称这些为“工具”，因为它们是通用功能，对于管理、监控和排查 SQL Server
    各种场景的诸多方面都很有帮助。并且，由于 Linux 上的 SQL Server 与 Windows 上的核心数据库引擎相同，这些丰富的功能大多在 Linux
    上也可用。


    遵循一致性主题，我将在本节介绍的大多数工具都可以通过 T-SQL 语言使用。T-SQL 的开放性提供了一种自然的方式来暴露 SQL Server 引擎的丰富工具功能。


