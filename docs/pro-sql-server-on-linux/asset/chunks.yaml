    SQL Server 中存在一种用于“重置”连接的逻辑。这并不意味着你必须在整个应用程序生命周期内保持连接开启，但也意味着频繁地打开和关闭连接并非最佳实践。


    -   事务通常用于确保一组逻辑上的 T-SQL 语句能够一起提交。然而，我见过开发人员最常犯的一个错误是：启动了一个事务，然后在其中执行代码，但提交事务的时机却超出了开发人员的控制。例如，你可能启动了一个事务，开始执行
    T-SQL 语句，然后在事务仍处于活动状态时，向用户弹出一个图形用户界面输入框。此时，事务的生命周期就掌握在了用户手中，这可能长得像一次咖啡休息时间！其结果很可能是以阻塞问题的形式出现的重大性能问题。我们在技术支持部门撰写的一篇较早的文章，至今仍是识别阻塞问题原因的良好资源：[`support.microsoft.com/help/224453/inf-understanding-and-resolving-sql-server-blocking-problems`](https://support.microsoft.com/help/224453/inf-understanding-and-resolving-sql-server-blocking-problems)。


    `提示` 我也见过与事务相关的相反问题：应用程序从不将语句分组到事务中，而是将每条语句单独作为一个事务执行。将修改操作分组到事务中可以提高性能，因为每次提交事务都需要将日志刷新到磁盘。


    ## 第 6 章：性能能力


    -   死锁问题几乎总是由应用程序引起的。这是基于纯粹的经验之谈。最常见的死锁原因是在并发连接中，基于查询和修改数据的顺序，以不一致的方式获取锁。阅读我们关于锁的文档，以更深入地了解死锁的原因及诊断方法：[`docs.microsoft.com/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide#Lock_Engine`](https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide#Lock_Engine)。


    ## 处理你的结果集！


    根据我的经验，另一种可能导致性能问题的应用程序模式是结果集处理。当你执行 T-SQL `SELECT` 语句从 SQL Server 提取数据行时，你的应用程序应该立即*处理*这些行。处理意味着执行代码中的必要步骤来遍历从
    SQL Server 返回的结果行。在处理行之间不应有任何延迟。为什么？因为 SQL Server 在等待客户端应用程序处理整个结果集期间，可能会持有资源（锁），这可能导致意外的阻塞问题。SQL
    Server 中指示这种行为的一个关键指标是一种称为 `ASYNC_NETWORK_IO` 的等待类型。请参阅 Paul Randal 在这篇博客文章中对这个问题的精彩描述：[`www.sqlskills.com/help/waits/async_network_io/`](https://www.sqlskills.com/help/waits/async_network_io/)。


    ## 设置你的应用程序名称


    动态管理视图 `sys.dm_exec_sessions` 有一个名为 `program_name` 的列。对于用户连接，此列的值是根据连接到 SQL Server
    的应用程序所指定的“应用程序名称”来填充的。由于 `sys.dm_exec_sessions` 很容易与 `sys.dm_exec_requests` 进行关联，而
    `sys.dm_exec_requests` 又常常是分析性能问题的核心 DMV，因此让 `program_name` 能够唯一标识你的应用程序会很有帮助。

    '
- fmt: '# Chapter 6: Performance Capabilities


    ## Accelerating Performance


    SQL Server has features that require some configuration or T-SQL statements to
    adopt but have some incredible possible returns on investment to accelerate performance
    of your queries and application. These include `Partition Tables and Indexes`,
    `Columnstore Indexes`, and `In-Memory OLTP`. Each of these can be used for various
    scenarios but they all have one thing in common: boosting performance for mission
    critical applications.


    Pinpoint issues specific to your application vs. other connections with `SQL Server`
    such as tools. To learn more about how to set the `Application Name`, see the
    example in our [documentation](https://docs.microsoft.com/dotnet/api/system.data.sqlclient.sqlconnectionstringbuilder.applicationname).


    ## Partitioned Tables and Indexes


    Some data naturally can be `sliced` via a set of criteria for a column. In other
    words, it is possible to naturally partition a table horizontally to a set of
    rows. Having this capability can provide some very compelling performance and
    management capabilities.


    `SQL Server` allows you to specifically create partitions on tables and indexes
    using the following concepts:


    - **Partition function**: An object you create that allows you to specify a range
    of values that define the number of partitions and their range (boundaries).

    - **Partition scheme**: A `T-SQL` statement to define what `FILEGROUPs` are defined
    to be used by the partition function. It is common to map partitions to one or
    more user `FILEGROUPs`. Since you can backup and manage `FILEGROUPs` individually,
    mapping a partition to multiple `FILEGROUPs` allows you to manage partitions individually.

    - **Partition column**: The column in the table used to define values for the
    partition and used by the partition function. A common type of column used in
    partitions is a `datetime`, because many customers use partitions to divide up
    a table based on a set of rows over a period of time.


    So, why use partitions? Do they really provide any performance benefit? The number
    one factor to use partitions for performance reasons is a concept called `partition
    elimination`. The best way to see this is to use look at an example.


    The `WideWorldImporters` sample database contains two tables that are partitioned.
    How do I know? Run the following `T-SQL` statement found in the example script
    `partitioned_tables.sql`:


    ```sql

    USE [WideWorldImporters]

    GO

    SELECT *

    FROM sys.tables AS t

    JOIN sys.indexes AS i

    ON t.[object_id] = i.[object_id]

    AND i.[type] IN (0,1)

    JOIN sys.partition_schemes ps

    ON i.data_space_id = ps.data_space_id

    GO

    ```


    This query will return results for two tables: `CustomerTransactions` and `SupplierTransactions`.
    If you generate the script for all objects in the `WideWorldImporters` database
    as I’ve described in the book, you won’t see the details of partition functions
    and schemes by default. For `SQL Server Management Studio`, you need to enable
    an option first under the `Tools/Options` menu to have script generation pick
    up partition details (as of the time of this writing, `mssql-scripter` does not
    support partition details but there is a `GitHub` issue filed to include this).


    > **Note**: The `wwi.sql` sample I’ve provided includes all the objects including
    partition details.


    Using this method, you will see the details of partitions for the `[Sales].[CustomerTransactions]`
    table first through this partition function and scheme:


    ```sql

    CREATE PARTITION FUNCTION [PF_TransactionDate](date) AS RANGE RIGHT FOR

    VALUES (N''2014-01-01T00:00:00.000'', N''2015-01-01T00:00:00.000'', N''2016-01-01T00:00:00.000'',
    N''2017-01-01T00:00:00.000'')

    GO

    CREATE PARTITION SCHEME [PS_TransactionDate] AS PARTITION [PF_TransactionDate]
    TO ([USERDATA], [USERDATA], [USERDATA], [USERDATA], [USERDATA], [USERDATA])

    GO

    ```'
