    # 第四章   构建应用程序与高级 T-SQL


    ## tempdb 的内部使用


    其作用域和生命周期仅限于一个 SQL Server 会话期间。创建语法与存储过程相同，但有一个不同点：过程名前需使用 `#` 符号，如下面的 T-SQL 示例所示（我在示例脚本
    `tempproc.sql` 中提供了此代码）：


    ```sql

    CREATE PROCEDURE #tempproc

    AS

    SELECT @@VERSION

    GO

    ```


    执行该过程就像执行任何存储过程一样，只需使用 `#tempproc` 名称。与临时表类似，多个用户可以同时创建同名的临时存储过程，因为每个用户都会根据自己的会话拥有该过程的一个私有版本。与临时表一样，临时存储过程的定义也保存在
    `tempdb` 数据库中。使用临时存储过程有一些原因，例如在将其存储到用户数据库之前测试一个新过程，或在长 T-SQL 脚本中用于执行某项任务。


    另一种类型的临时对象是全局临时表或存储过程。全局临时表的定义语法与临时表相同，只是名称前多了一个 `#` 字符，如下例所示：


    ```sql

    CREATE TABLE ##globaltemp

    (col1 INT, col2 INT)

    GO

    ```


    因为是全局的，所以同一时间只能存在一个给定名称的全局临时表，其作用域跨越所有活动用户会话。全局临时表存储在 `tempdb` 中，但当所有引用过该全局临时表的用户断开连接后，它会自动被销毁。


    也可以创建全局临时存储过程。它们在作用域、可见性和生命周期方面具有与全局临时表相同的特性。


    当我讲授关于 `tempdb` 的主题时，我常称它为 SQL Server 的“垃圾场”。我知道这个词有负面含义，但这就是 SQL Server 使用 `tempdb`
    的现实情况。我在本节到目前为止介绍的是 `tempdb` 中的*用户对象*。换句话说，用户决定创建多少对象以及它们消耗多少空间。


    SQL Server 还有其他功能，需要将数据页存储在 `tempdb` 中，超出正常的用户表范围。这些功能包括用于版本控制的存储、哈希和排序操作溢出时的临时存储，以及工作表。你通常无需担心这些，因为它们是在
    SQL Server 引擎内部实现的。但现实情况是，它们可能会影响你的应用程序，尤其是在正确设置 `tempdb` 大小时（或者更重要的是，影响查询的性能）。


    SQL Server 提供了通过动态管理视图（DMV）在文件、会话甚至任务（查询）级别检查 `tempdb` 用户空间和内部空间使用情况的机制，这将在第 5
    章中讨论。如果你想深入研究 `tempdb` 这个主题，可以在 YouTube 上收听几年前我在一次大型 SQL Server 用户大会上所做的深入讲解，网址是
    `https://youtu.be/SvseGMobe2w`。


    ## 触发器


    触发器是一种特殊类型的存储过程，当数据库服务器中发生事件时会自动执行。DML 触发器在用户尝试通过数据操作语言（DML）事件（如 `INSERT`、`UPDATE`
    或 `DELETE` 语句）修改数据时执行。


