- fmt: "# Chapter 9 Managing and Monitoring SQL Server\n\nconfiguration mode will\
    \ set `max server memory` to its default, allowing you to connect and change it\
    \ to a correct value. You can read more about starting SQL Server in minimal configuration\
    \ mode at [https://docs.microsoft.com/sql/database-engine/configure-windows/start-sql-server-with-minimal-configuration](https://docs.microsoft.com/sql/database-engine/configure-windows/start-sql-server-with-minimal-configuration).\n\
    \n**Note:** SQL Server containers run SQL Server by using the `sqlservr` program\
    \ directly.\n\n## Managing Databases\n\nAfter deploying your database you will\
    \ at some point have to perform some management of the database, whether it is\
    \ making changes at the database level or file level. In this section, I’ll review\
    \ those key topics including Moving Databases, Managing Files, Detach and Attaching\
    \ Databases, important `ALTER DATABASE` scenarios, and a very interesting discussion\
    \ on repairing databases (I think you will like this section with some internals\
    \ on database states and checksum).\n\n## Moving Databases\n\nOne common operation\
    \ you may need to perform after you create a database and have it running in production\
    \ is to move the database and transaction log files to a new directory or new\
    \ disks. There may be several reasons you need to move the files, such as disk\
    \ maintenance or disk upgrade scenarios. One common method to move one or more\
    \ files is the following:\n\n1.  Change the database to an offline state by executing\
    \ the following T-SQL statement\n    ```sql\n    ALTER DATABASE <dbname> SET OFFLINE\n\
    \    ```\n    This shows the ability to control database state without shutting\
    \ down SQL Server.\n\n2.  Move the intended files on the Linux Server to your\
    \ intended target directory or disk.\n\n3.  Indicate to SQL Server the new location\
    \ of the file. For each file you move, run the following T-SQL statement:\n  \
    \  ```sql\n    ALTER DATABASE <dbname> MODIFY FILE ( NAME = logical_name, FILENAME\
    \ = 'new_path\\os_file_name' )\n    ```\n\n4.  Change the database state back\
    \ to ONLINE using the following T-SQL statement:\n    ```sql\n    ALTER DATABASE\
    \ <dbname> SET ONLINE\n    ```\n\nSQL Server will bring the database online and\
    \ run recovery (as it always does when a database is brought online).\n\nYou also\
    \ may have a need to move the system databases. You can read more about the procedure\
    \ to do this in our documentation at [https://docs.microsoft.com/sql/relational-databases/databases/move-system-databases](https://docs.microsoft.com/sql/relational-databases/databases/move-system-databases).\
    \ The only exception to this documentation for SQL Server on Linux is to move\
    \ the master database. In order to move the master database on SQL Server on Linux,\
    \ you need to use the `mssql-conf` script as documented at [https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf#masterdatabasedir](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf#masterdatabasedir).\n\
    \n## Managing Files\n\nThere could be other scenarios to manage database and/or\
    \ transaction log files, including adding new files, removing existing files,\
    \ or adding more space to existing files.\n\nBefore I review the process for these\
    \ operations, one of the most fundamental tasks you may need regarding files is\
    \ to understand the space used by files. To see space usage for the database,\
    \ use the system procedure `sp_spaceused`. To view the size of the transaction\
    \ log and space used within the transaction log, you can use the legacy method\
    \ with the T-SQL statement `DBCC SQLPERF(LOGSPACE)` or query the new DMV for SQL\
    \ Server 2017 `sys.dm_db_log_stats`.\n\nAnother alternative is to use the new\
    \ SERVER REPORTS extension in SQL Operations"
