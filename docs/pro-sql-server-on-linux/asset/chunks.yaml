- fmt: '## Chapter 5 SQL Server Tools


    ![](index-223_1.jpg)


    `SSMS` has user interface capability to create and managed `Extended Events` via
    `Object Explorer`. Figure 5-35 shows the `Object Explorer` tree for `Extended
    Events` in `SSMS`.


    **Figure 5-35.** The `Extended Events` `Object Explorer` tree view in `SSMS`


    `SSMS` allows you to create extended events, start event sessions, alter event
    sessions, and view extended event session target data via a grid view.


    Recent builds of `SSMS` include the ability to view `Extended Events` data in
    a live stream like what you can do with `SQL Server Profiler`. This feature is
    called `XEProfiler`.


    To use `XEProfiler`, expand the icon from the `Object Explorer` tree in `SSMS`,
    right-click one of the two choices such as `Standard`, and select `Launch Session`.
    Figure 5-36 shows the result of using this feature to see connections and queries
    run against `SQL Server` on `Linux`.


    ![](index-224_1.jpg)


    **Figure 5-36.** Using `XEProfiler` with `SSMS`


    Whether you build your own `T-SQL` event or use `XEProfiler`, you will find tracing
    `SQL Server` queries extremely useful to debug how applications and tools work.
    For example, I used `XEProfiler` to debug how `DBFS` works to query `SQL Server`
    without having to look at the project source code.


    There is an excellent demo and tutorial of how to use `SSMS` with `Extended Events`
    in our documentation at [https://docs.microsoft.com/sql/relational-databases/extended-events/quick-start-extended-events-in-sql-server](https://docs.microsoft.com/sql/relational-databases/extended-events/quick-start-extended-events-in-sql-server).


    There are several example scenarios in our documentation to use `Extended Events`,
    including:


    *   *Queries Holding Locks*: [https://docs.microsoft.com/sql/relational-databases/extended-events/determine-which-queries-are-holding-locks](https://docs.microsoft.com/sql/relational-databases/extended-events/determine-which-queries-are-holding-locks)

    *   *Objects and Locks Held*: [https://docs.microsoft.com/sql/relational-databases/extended-events/find-the-objects-that-have-the-most-locks-taken-on-them](https://docs.microsoft.com/sql/relational-databases/extended-events/find-the-objects-that-have-the-most-locks-taken-on-them)

    *   *Monitor System Activity*: [https://docs.microsoft.com/sql/relational-databases/extended-events/monitor-system-activity-using-extended-events](https://docs.microsoft.com/sql/relational-databases/extended-events/monitor-system-activity-using-extended-events)


    ### T-SQL Performance Features


    `SQL Server` comes with built-in performance statistics through the `T-SQL` language.
    This includes the ability to view the estimated and executed query plan for queries,
    timing and `I/O` statistics via messages returned as part of executing a query,
    and live query statistics and lightweight query profiling for individual query
    operators.


    ### SHOWPLAN


    Every `T-SQL` command is compiled by the query processor of `SQL Server`, so it
    can then be executed. When the query is compiled, `SQL Server` will build an estimated
    query plan. The estimated query plan is saved for queries that are stored in plan
    cache.'
