- fmt: 'SQL Server database engine is the same proven, scalable SQL Server engine
    as we have run on thousands of customer servers over the history of the product.


    ## SQL Server on Windows vs. Linux. Is it the Same?


    I remember one conversation I had on this topic with Slava Oks, who said to me,
    “Bob, The Query Processor is still the same Query Processor.” This quote explains
    why we were able to achieve comparable performance for SQL Server on Linux. It
    also explains why databases can be restored on different platforms and why applications
    can connect to SQL Server on Linux virtually unchanged if they were built to run
    against SQL Server on Windows Server.


    ## SQL Server on Linux Capabilities


    SQL Server 2017 has many capabilities and features focusing on performance, security,
    and high availability. Consider these capabilities and features that are available
    for SQL Server on Linux:


    - A core `SQLOS` system for scheduling, memory management, and resource governance
    and management that provides built-in scalability and recognizes important server
    architectures such as `NUMA`

    - The core engine components for buffer management, query processing, query execution,
    storage engine, and access methods

    - Core management operations such as `BACKUP/RESTORE`, index management, and `DBCC`
    commands

    - Our famous `T-SQL` language works unchanged except for any features or capabilities
    not supported in the release.

    - In-Memory workload features such as `Columnstore Indexes` and `In-Memory OLTP`

    - New database intelligent features such as adaptive query processing (`AQP`)
    and `Automatic Tuning` (you will hear more about these features in Chapter 4)
    based on the telemetry of `Query Store`.

    - `Always On Availability Groups` (I use the term Availability Groups or `AG`s
    for future references to this capability in the book) are supported with full
    functionality. As you will see in Chapter 8, Availability Groups are supported
    with major failover capabilities (with a few exceptions) using a clustering technology
    called `Pacemaker`. In addition, a new feature in SQL Server 2017 provides support
    for `clusterless` availability groups where no clustering software is required.

    - `Always On Failover Cluster Instance` on Linux is supported using `Pacemaker`.

    - Security features such as `always encrypted`, `dynamic data masking`, `row-level
    security`, `auditing`, and `Transparent Data Encryption (TDE)`

    - SQL Server and `Active Directory` authentication for logins

    - Encrypted connections are supported using `Transport Layer Security (TLS)`.

    - Rich programming features such as `SQLCLR` (SAFE assemblies only), `JSON` T-SQL
    capabilities, and the `Graph database`

    - The `SQL Server Agent` scheduling service supports the `T-SQL` command subsystem.

    - `SQL Server Integration Services (SSIS)` is supported for fundamental extract,
    transform, and load (`ETL`) operations.

    - Tools work “as-is” against SQL Server on Linux, including `SQL Server Management
    Studio` (runs on Windows), `SQL Server Data Tools` (runs on Windows), and our
    `mssql` extension in `Visual Studio Code` (cross-platform tool).

    - We support native command line tools on Linux, including `sqlcmd` and `bcp`.

    - We have built new open-source, cross-platform tools that run on Windows, Linux,
    or MacOS and work against SQL Server on Linux or Windows: `SQL Server Operations
    Studio` and `mssql-cli`.

    - SQL Server diagnostics such as `extended events`, `dynamic management views`,
    `catalog views`, and `query plan` diagnostic capabilities.


    I may have missed your favorite feature, but this list makes SQL Server on Linux
    a very compelling story. For a complete list of features for SQL Server on Linux,
    check out our documentation at [https://docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2017](https://docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2017).'
  raw: 'SQL Server database engine is the same proven, scalable SQL Server engine
    as we have


    run on thousands of customer servers over the history of the product.


    ** SQL Server on Windows vs. Linux. Is it the Same?**


    I remember one conversation I had on this topic with Slava Oks, who said to me,
    “Bob,


    The Query Processor is still the same Query Processor.” This quote explains why
    we were


    able to achieve comparable performance for SQL Server on Linux. It also explains
    why


    databases can be restored on different platforms and why applications can connect
    to


    SQL Server on Linux virtually unchanged if they were built to run against SQL
    Server on


    Windows Server.


    ** SQL Server on Linux Capabilities**


    SQL Server 2017 has many capabilities and features focusing on performance, security,


    and high availability. Consider these capabilities and features that are available
    for SQL


    Server on Linux:


    •  A core SQLOS system for scheduling, memory management, and


    resource governance and management that provides built-in


    scalability and recognizes important server architectures


    such as NUMA


    •  The core engine components for buffer management, query


    processing, query execution, storage engine, and access methods


    •  Core management operations such as BACKUP/RESTORE, index


    management, and DBCC commands


    •  Our famous T-SQL language works unchanged except for any features


    or capabilities not supported in the release.


    Chapter 1   Why SQL Server on Linux?


    •  In-Memory workload features such Columnstore Indexes and


    In-Memory OLTP


    •  New database intelligent features such as adaptive query processing


    (AQP) and Automatic Tuning (you will hear more about these


    features in Chapter[ 4) b](#index_split_002.html#p132)ased on the telemetry of
    Query Store.


    •  Always On Availability Groups (I use the term Availability Groups or


    AGs for future references to this capability in the book) are supported


    with full functionality. As you will see in Chapter [8](#index_split_005.html#p389),
    Availability


    Groups are supported with major failover capabilities (with a


    few exceptions) using a clustering technology called  *Pacemaker*.


    In addition, a new feature in SQL Server 2017 provides support


    for  *clusterless* availability groups where no clustering software is


    required.


    •  Always On Failover Cluster Instance on Linux is supported using


    Pacemaker.


    •  Security features such as always encrypted, dynamic data masking,


    row-level security, auditing, and Transparent Data Encryption (TDE)


    •  SQL Server and Active Directory authentication for logins


    •  Encrypted connections are supported using Transport Layer


    Security (TLS).


    •  Rich programming features such as SQLCLR (SAFE assemblies only),


    JSON T-SQL capabilities, and the Graph database


    •  The SQL Server Agent scheduling service supports the T-SQL


    command subsystem.


    •  SQL Server Integration Services (SSIS) is supported for fundamental


    extract, transform, and load (ETL) operations.


    •  Tools work “as-is” against SQL Server on Linux, including SQL Server


    Management Studio (runs on Windows), SQL Server Data Tools (runs


    on Windows), and our mssql extension in Visual Studio Code (cross-


    platform tool).


    Chapter 1   Why SQL Server on Linux?


    •  We support native command line tools on Linux, including sqlcmd


    and bcp.


    •  We have built new open-source, cross-platform tools that run on


    Windows, Linux, or MacOS and work against SQL Server on Linux or


    Windows: SQL Server Operations Studio and mssql-cli.


    •  SQL Server diagnostics such as extended events, dynamic


    management views, catalog views, and query plan diagnostic


    capabilities.


    I may have missed your favorite feature, but this list makes SQL Server on Linux
    a


    very compelling story. For a complete list of features for SQL Server on Linux,
    check out


    our documentation at [https://docs.microsoft.com/sql/linux/sql-server-linux-](https://docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2017)


    [editions-and-components-2017.](https://docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2017)'
  trans: '

    SQL Server 数据库引擎与我们产品历史上在数千台客户服务器上运行的，是经过验证、可扩展的相同 SQL Server 引擎。


    ## Windows 上的 SQL Server 与 Linux 上的是否相同？


    我记得曾就此话题与 Slava Oks 有过一次对话，他对我说：“Bob，查询处理器依然是同一个查询处理器。” 这句话解释了为何我们能够在 Linux 上的
    SQL Server 实现与 Windows 上可比的性能。它也解释了为何数据库可以跨平台还原，以及为何如果应用程序原本是为在 Windows Server
    上运行针对 SQL Server 而构建的，它们几乎无需更改即可连接到 Linux 上的 SQL Server。


    ## Linux 上 SQL Server 的功能


    SQL Server 2017 拥有许多专注于性能、安全性和高可用性的功能和特性。以下是 Linux 上 SQL Server 可用的部分功能和特性：


    - 核心的 `SQLOS` 系统，用于调度、内存管理及资源治理与管理，提供内置的可扩展性，并支持重要的服务器架构，如 `NUMA`。

    - 用于缓冲区管理、查询处理、查询执行、存储引擎和访问方法的核心引擎组件。

    - 核心管理操作，如 `BACKUP/RESTORE`、索引管理和 `DBCC` 命令。

    - 我们著名的 `T-SQL` 语言，除了该版本中不支持的任何特性或功能外，其余均可原样工作。

    - 内存中工作负载特性，如 `列存储索引` 和 `内存中 OLTP`。

    - 新的数据库智能特性，如自适应查询处理 (`AQP`) 和 `自动调整`（你将在第 4 章听到更多关于这些特性的内容），这些特性基于 `查询存储` 的遥测数据。

    - `Always On 可用性组`（在本书后续内容中，我将用“可用性组”或 `AG` 来指代此功能）得到完全功能支持。正如你将在第 8 章看到的，可用性组通过一种称为
    `Pacemaker` 的集群技术支持主要的故障转移功能（少数例外）。此外，SQL Server 2017 中的一个新特性提供了对 `无集群` 可用性组的支持，无需集群软件。

    - Linux 上的 `Always On 故障转移群集实例` 使用 `Pacemaker` 得到支持。

    - 安全特性，如 `始终加密`、`动态数据屏蔽`、`行级安全性`、`审核` 和 `透明数据加密 (TDE)`。

    - SQL Server 和 `Active Directory` 身份验证用于登录。

    - 加密连接使用 `传输层安全性 (TLS)` 得到支持。

    - 丰富的编程特性，如 `SQLCLR`（仅限 SAFE 程序集）、`JSON` T-SQL 功能和 `图数据库`。

    - `SQL Server 代理` 调度服务支持 `T-SQL` 命令子系统。

    - `SQL Server 集成服务 (SSIS)` 支持基本的提取、转换和加载 (`ETL`) 操作。

    - 工具可直接用于连接 Linux 上的 SQL Server，包括 `SQL Server Management Studio`（运行于 Windows）、`SQL
    Server Data Tools`（运行于 Windows）以及我们在 `Visual Studio Code` 中的 `mssql` 扩展（跨平台工具）。

    - 我们在 Linux 上支持原生命令行工具，包括 `sqlcmd` 和 `bcp`。

    - 我们构建了新的开源、跨平台工具，可在 Windows、Linux 或 MacOS 上运行，并连接到 Linux 或 Windows 上的 SQL Server：`SQL
    Server Operations Studio` 和 `mssql-cli`。

    - SQL Server 诊断功能，如 `扩展事件`、`动态管理视图`、`目录视图` 和 `查询计划` 诊断能力。


    我可能遗漏了你最喜欢的功能，但这份列表使得 Linux 上的 SQL Server 成为一个非常吸引人的方案。有关 Linux 上 SQL Server 功能的完整列表，请查阅我们的文档：[`docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2017`](https://docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2017)。

    '
- fmt: 'For those reading this book who are not familiar with SQL Server editions,
    it is important to know that some capabilities exist only in certain editions.
    To get a complete list of what features are available for specific editions, see
    this documentation page: [https://docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2017?view=sql-server-linux-2017#includessnoversionincludesssnoversion-mdmd-editions](https://docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2017?view=sql-server-linux-2017#includessnoversionincludesssnoversion-mdmd-editions).


    SQL Server 2017 on Linux offers these editions:


    *   **Enterprise**: This is the most full-featured edition. It is designed to
    be used as its name denotes for Enterprise database applications. From a licensing
    point of view, there are two variations of Enterprise: Enterprise and Enterprise
    Core. Enterprise Core has full capabilities, while Enterprise has some restrictions
    on using a certain number of compute cores. Enterprise is only available for certain
    customers who have contract agreements with Microsoft.

    *   **Standard**: This edition is designed to provide the basic functionality
    of SQL Server for applications targeted for smaller departments or midsized workloads.
    One major change we made starting with SQL Server 2016 SP1 was to open some features
    to the Standard edition that were only previously available with the Enterprise
    edition. The rationale was to ensure that developers could build applications
    and not worry as much about what edition of SQL Server their application was targeting.
    There are restrictions on sizes of how these features work for the Standard edition,
    but they are now available. You can read more about this change in this blog post:
    [https://blogs.msdn.microsoft.com/sqlreleaseservices/sql-server-2016-service-pack-1-sp1-released/](https://blogs.msdn.microsoft.com/sqlreleaseservices/sql-server-2016-service-pack-1-sp1-released/).

    *   **Developer**: This is a free edition that includes all features available
    in the Enterprise edition. However, the license for this edition restricts it
    from being used for production purposes. You can use this edition to build and
    test your application.

    *   **Web**: This edition is like Standard with lower limits and is specifically
    priced to target Web hosters.

    *   **Express**: This is the most basic edition but is free and could be used
    in production. It is limited though, enough that it shouldn''t be used for any
    type of scalable application. But if you are just getting started with SQL Server
    as a developer, SQL Server Express can be useful. There is an easy upgrade path
    for this to the Standard and Enterprise editions. For Linux, SQL Server Express
    can serve a very useful purpose as a configuration-only replica server. This will
    be discussed in more detail in [Chapter 8](#index_split_005.html#p389).


    I should also mention that SQL Server offers an Evaluation edition. It contains
    all the features of the Enterprise edition but is not licensed for production
    and has a time-based expiration license. But it is a great way to test out SQL
    Server capabilities on an Enterprise server. In [Chapter 2](#index_split_001.html#p46)
    I''ll described how you choose which edition you want to use with SQL Server.


    ## What Features Are Not Available


    With this great lineup of features come some areas that are not available in SQL
    Server'
