    *   `EMERGENCY`：我将在下一节关于修复数据库中讨论此选项。如果数据库无法联机，此选项会非常方便。

    *   `[ READ_ONLY | READ_WRITE ]`：如果你想防止对数据库进行任何更改，可以将其设置为 `READ_ONLY`（只读）。如果你想向其他用户或开发人员提供数据库副本以便他们可以读取数据，但又希望确保他们不会进行任何更改以维护数据的一致性副本时，这可能很方便。使用
    `READ_WRITE`（读写）则将数据库标记为可进行更改。

    *   `PAGE_VERIFY`：在第 8 章中，我讨论了数据库校验和的概念。我将在下一节关于修复数据库中进一步讨论它。这是更改默认值的选项，默认值是 `CHECKSUM`（我建议你使用）。其他选项是
