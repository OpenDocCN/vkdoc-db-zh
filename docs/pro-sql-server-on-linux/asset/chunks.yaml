    ** Statistics**


    The query processor in SQL Server is  *all about statistics*. What I mean by that
    is the query


    processor often makes decisions on compiling a query plan based on available statistics


    about values of rows (uniqueness of rows) in a table, column(s), and indexes.


    ChapTer 6   performanCe CapabILITIeS


    ** Statistics on Indexes and Columns**


    Any time an index is created or rebuilt, SQL Server builds a set of statistics
    on the key


    columns of the index. A  *histogram* is built on the leading column of an index.
    There


    are other statistics called  *density* that are calculated based on the combination
    of all


    columns in the index. The decisions of the query processor to build an optimal
    query


    plan are only as good as available statistics.


    By default, statistics are calculated through  *sampling*, which means SQL Server
    will


    not examine every row in an index to build statistics but rather build statistics
    based


    on sampling of data. And for most workloads, this default sample algorithm works
    fine.


    But there are situation where I’ve seen better query plans built when using an
    option


    called FULLSCAN (which means to completely scan all rows in the index or table
    when


