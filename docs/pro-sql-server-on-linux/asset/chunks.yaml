    ## 第十章：迁移至 Linux 上的 SQL Server


    它们属于 ANSI SQL 或 SQL Server 特定的语句）。在`pgsql`的第 10 版中，编写服务器端程序的唯一`PL/pgSQL`方式是使用`CREATE
    FUNCTION`创建*函数*（这不支持事务）。透明地讲，我了解到目前处于测试阶段的`pgsql`第 11 版计划支持`CREATE PROCEDURE`
    `PL/pgSQL`语句。在第 10 版中，我见过几个`pgsql`函数返回`VOID`类型来模拟存储过程的例子。


    ### IDENTITY 列属性


    `pgsql`支持`SEQUENCE`对象，就像我在本书中使用 T-SQL 展示过的那样。序列是 SQL 标准（因此这使得`SEQUENCE`对象在迁移到
    SQL Server 时具有很好的可移植性）。然而，`SEQUENCE`对象是独立于列创建的，然后再绑定到一个或多个列。SQL Server 则针对同一概念提供了更简便的方法，即使用特定列的
    IDENTITY 属性。


    ### 工具


    我想你现在还记得关于工具的那个很长的章节（第五章）。那章之所以长是有原因的。我认为 SQL Server 拥有出色的工具体系：既包括引擎内置的功能，也包括引擎外的程序。以下是与`pgsql`相比，我认为
    Linux 上的 SQL Server 在工具方面表现出色的几个具体领域：


    ### 动态管理视图


    `DMVs`是 SQL Server 最强大的功能之一，用于获取有关 SQL Server 数据库引擎执行的实时、动态洞察。`pgsql`具有类似功能，但通过我的研究，我观察到几个对`DMVs`有利的重大差异：

    *   我们的`DMVs`具有详细的内存信息。`pgsql`仅支持通过`pg_buffercache`视图查看缓冲区缓存信息。

    *   与`DMV` `dm_exec_requests`功能相当的`pg_stat_statements`默认并未启用。`pgsql`的文档说启用此功能可能导致性能开销，可以跨重启保存，但不包含执行计划信息，而`dm_exec_query_stats`提供了估计的查询计划（查询存储也如此）。

    *   `pg_stat_activity`等同于`DMV` `dm_exec_requests`，但它不是“实时”的，因为它是基于每个进程的信息刷新的（默认刷新率为
    500ms，但可以配置）。SQL Server 的`DMVs`是“按需”的。你可以随时查询系统状态，并获得该时刻系统的实时视图。

    *   `pgsql`在`pg_locks`视图中提供了有关进程和锁的阻塞信息。可以在该视图中看到等待锁的进程的`pid`。然而，此信息在`pg_stat_activity`中找不到。SQL
    Server 的`DMV` `dm_exec_requests`提供了阻塞信息（包括阻塞任务），并且你还可以在`DMV` `dm_tran_locks`中看到所有详细的锁。

    *   SQL Server 为所有核心引擎功能以及 SQL Server 包含的几乎每一项功能提供了`DMVs`（实际上，Linux 上的 SQL Server
    包含约 243 个`DVMs`）。`pgsql`主要通过统计信息收集器提供动态系统活动，并且仅覆盖核心数据库引擎。

    *   SQL Server 通过`dm_db_missing_index_details`提供了一个用于推荐缺失索引的`DMV`。`pgsql`没有在数据库引擎内内置索引推荐功能。


    你可以在 [`docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/system-dynamic-management-views`](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/system-dynamic-management-views)
    阅读更多关于 SQL Server `DMVs`的信息。


    ### ERRORLOG


    `pgsql`确实有将日志记录到文件的功能，并且高度可配置。然而，默认情况下，SQL Server 的`ERRORLOG`包含丰富的信息集（尤其是在...

    '
- fmt: '## ChApter 10 MigrAting to SQL Server on Linux


    startup) about the configuration of SQL Server, the OS, and databases. When I
    was in technical support, I could tell a customer a lot about their system just
    by reading `ERRORLOG` files. The default `pgsql` log contains only errors.


    ### Query Store


    I simply love the power of the `Query Store`, one of my favorite features launched
    with SQL Server 2016. While `pgsql` has a similar feature to view query performance
    information via a view called `pg_stat_statements`, I believe `Query Store` is
    superior for several reasons.


    - The `Query Store` is saved with a backup of the database, since the `Query Store`
    is tied to a database. `pgsql` statistics are server wide and can be persisted,
    but I found no way to export or back them up for separate analysis.

    - `pg_stat_statements` contains query execution statistics and is available via
    a supported extension but requires a server restart to enable. `Query Store` can
    be enabled online for your needs at any time via `ALTER DATABASE`. `Query Store`
    also supports richer configuration parameters to control the collection of queries,
    including `CAPTURE_MODE=AUTO` (only store the queries that matter) and history
    (number of days to keep data).

    - `Query Store` includes wait statistics per query but `pgsql` statistics for
    waits are tied to the overall process in `pg_stat_activity`.

    - `pg_stat_statements` can be saved across server restarts but there is no date/time
    stamp for queries. So you cannot run a historical analysis of queries over time
    to find out the differences and perform analysis like query plan regressions.
    Furthermore, the estimated plan is saved with `Query Store` for each plan for
    a specific query over time. `pg_stat_statements` does not contain any query plan
    information.

    - `Query Store` captures query information even when a query fails. There is no
    mention in `pgsql` documentation whether `pg_stat_statements` save query information
    if a query fails.

    - `Query Store` captures information about compilation and execution time. `pg_stat_statements`
    does not breakdown information on compilation vs. execution.


    You can read all the details about `Query Store` in SQL Server at [https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store](https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store).


    ### Live query statistics


    There is no method to see the current query level information about a query while
    it is in progress in `pgsql` through `pg_stat_statements`. SQL Server provides
    the ability to see per query plan operator execution statistics as a query is
    executing in progress. You can read more about live query statistics for SQL Server
    at [https://docs.microsoft.com/sql/relational-databases/performance/live-query-statistics](https://docs.microsoft.com/sql/relational-databases/performance/live-query-statistics).


    ### DBCC commands


    The most unique `DBCC` command that does not have an equivalent feature in `pgsql`
    is `CHECKDB`. I’ve read discussions in my research that `pgsql` doesn’t need a
    consistency checker, since page checksum is now supported (as of `pgsql` 9.3).
    However, as I’ve said in this book, if pages become damaged in memory, a page
    checksum will not detect it (although SQL Server even has some minimal detection
    for this scenario). Remember `DBCC CHECKDB` is online because SQL Server supports
    the concept of database snapshots. You can read more about `DBCC CHECKDB` for
    SQL Server at [https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-checkdb-transact-sql](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-checkdb-transact-sql).'
