- fmt: '# Chapter 9 Managing and Monitoring SQL Server


    ## DBCC CHECKDB Repair


    I’ve discussed in Chapter [8](#index_split_005.html#p389) the `DBCC CHECKDB` command
    to check the consistency of a database. `CHECKDB` does include reading pages from
    disk, so checksum verification on every page is part of that execution.


    If `DBCC CHECKDB` encounters any failure when checking the consistency of the
    database, it is possible to repair the database using this T-SQL statement. There
    are two options for repairing a database with `CHECKDB`:


    -   **`REPAIR_REBUILD`**: If it’s possible to repair the database by only rebuilding
    or repairing an index, `REPAIR_REBUILD` can correct errors found when executing
    `CHECKDB`.

    -   **`REPAIR_ALLOW_DATA_LOSS`**: If SQL Server detects errors in `CHECKDB` that
    can only be repaired by deallocating a page(s), which could result in data loss,
    this option can be used. By its name, when you use this option you are doing so
    with the knowledge that you may lose data. `CHECKDB` is very good about reporting
    out details on which pages are being deallocated and how many. Restoring from
    a good backup is always the best mode of recovery (or failing over to a valid
    secondary replica), but in some cases repairing a database with `CHECKDB` is your
    only choice, even though you may encounter some data loss.


    The documentation is fairly good about going through some of these scenarios,
    which you can read at [https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-checkdb-transact-sql](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-checkdb-transact-sql).
    In addition, the output of running `CHECKDB` indicates which repair option is
    the minimal required to resolve all errors found at the completion of `CHECKDB`.


    I can tell you from years of experience a few observations about using repair
    for `CHECKDB`:


    -   There are some errors that cannot be repaired.

    -   I rarely run into customer situations where `REPAIR_REBUILD` was a valid solution.
    If you have database damage (commonly known as *corruption*. An example of corruption
    is a checksum failure I have described earlier in this chapter), it is typically
    going to result in some data loss. Not always, but typically.

    -   I’ve seen some cases where I had to run several iterations of `CHECKDB` with
    repair options to resolve all errors.

    -   `CHECKDB` can be run in a transaction with repair options so you can run repair
    and then rollback if necessary.

    -   If you are deciding whether you should restore a backup or run repair, consider
    what is *known* vs. *unknown*. If you have a valid backup to restore but you lose
    a day of work, that may be far better and a faster method to resolve the situation
    because it is known. Trying to repair a damaged database and trying to figure
    out what pages you lost related to known business value and data can take a very
    long time. I’ve been in situations where I’ve given guidance to a customer to
    do both. Restore the backup to a different database while trying repair options.


    Consider reviewing Paul Randal’s blog post tag he calls “CHECKDB from every angle”
    at [https://www.sqlskills.com/blogs/paul/category/checkdb-from-every-angle](https://www.sqlskills.com/blogs/paul/category/checkdb-from-every-angle)
    for some really great information about `DBCC CHECKDB`.


    **Note** I still get a question from customers and users of SQL Server whether
    Microsoft has some magical set of tools no one knows about that allows us to *patch*
    databases. The transparent truth is we used to. In a galaxy, far, far away, I
    used to use some programs that allowed me to “fix bits” on database pages. It
    was still very time consuming and costly, and I rarely used it. The tool doesn’t
    exist anymore and there is no benefit in recreating it. You can read Paul’s blog.'
