  trans: '

    作为 SQL Server 2014 中的一项功能。此功能由以下组件构成：


    • Hekaton 引擎

    • 内存优化文件组

    • 内存优化表

    • 内存优化表的索引——哈希或非聚集索引

    • 本机编译存储过程


    ## Hekaton 引擎


    在 SQL Server 数据库引擎内部构建了一个用于内存 OLTP 的“引擎中的引擎”。它由一系列实现内存 OLTP 事务逻辑的动态链接库组成。其中包括一个编译组件、一个运行时组件和一个引擎。这些组件与
    SQL Server 引擎的其他部分（如查询处理和事务日志记录）协同工作。然而，也存在一些独立于 SQL Server 引擎的组件，用于处理检查点和垃圾回收等功能。所有
    Hekaton 组件仍然依赖 SQLOS 子系统，并在 Linux 环境下通过主机扩展来调用任何原生的 Linux 内核服务（例如，I/O）。


    ### 第 6 章 性能特性


    通常，您看不到 Hekaton 引擎的这些组件，因为其设计理念是完全内置的。但是，当您开始检查 DMV（如 `dm_exec_requests`）的一些细节时，如果您使用
    T-SQL 创建内存优化文件组和内存优化表，就会开始看到新的任务。


    例如，`WideWorldImporters` 数据库包含一个内存优化文件组和内存优化表。因此，当您还原该示例数据库时，您会在 `sys.dm_exec_requests`
    中看到一些任务，其 `command` 列的值为 `XTP_CKPT_AGENT` 或 `XTP_THREAD_POOL` 等。


    > **注意** `XTP` 代表 eXtreme Transaction Processing（极限事务处理），是内存 OLTP 的另一个内部名称。您可能会看到几个以
    `hK`（hekaton）或 `XTP` 开头的诊断对象和消息。这些都与内存 OLTP 组件相关。


    内存 OLTP 的两个关键设计原则是：


    • 所有数据都存储在内存中（但通过事务日志和检查点文件提供了持久化选项），并且**必须能完全装入内存**。

    • 使用一套“无锁无闩锁”的算法和行版本控制来优化数据访问。内存 OLTP 采用乐观并发方法来避免锁问题，并在内部使用技术来避免内部线程并发问题。对内存优化表的修改使用行版本控制方案，以避免额外的事务冲突（此行版本控制方案与
    SQL Server 快照隔离不同，并且不使用 `tempdb`）。


    我在本章前面的章节中简要提到了锁，因为这是确保 SQL Server 应用程序事务一致性的主要机制。我还没有提到 `latches`（闩锁）的概念，它是 SQL
    Server 的一种内部机制，用于在多个线程之间保护数据库页面的物理完整性，也用于引擎中的其他线程并发保护方案。内存 OLTP 为实现低延迟和高速度的一个关键设计原则，就是在“Hekaton
    引擎”中避免使用任何锁或闩锁。（`Hekaton` 在其代码中也避免了使用 `spinlocks`，这是另一种内部线程并发机制）。


    ### 第 6 章 性能特性


    内存 OLTP 并非通过一个特定选项来启用的功能。使用此功能的方法是：


    1. 创建一个内存优化文件组

    2. 在数据库中创建并使用一个或多个内存优化表（包括索引的选择）

    3. （可选）创建一个或多个本机编译存储过程


    让我们更详细地看看每一项。


    ## 内存优化文件组


