- fmt: "```javascript\nasync.waterfall([\n\n    Start,\n\n    Insert,\n\n    Read\n\
    \n], Complete)\n\n}\n```\n\n});\n\nIf you are not familiar with node.js, the code\
    \ flow can be hard to follow. The key piece of code that “fires off” the rest\
    \ of the functions is found after the logic to connect with the `async` object:\n\
    \n```javascript\nasync.waterfall([\n\n    Start,\n\n    Insert,\n\n    Read\n\n\
    ], Complete)\n```\n\nThis code executes each function, starting with the `Start`\
    \ function, serially allowing each function to pass on information to each other.\
    \ The `Complete` function is the main function to run after the other functions\
    \ have executed (or if an error occurs).\n\nThe syntax of the `INSERT` statement\
    \ is also unique in that you can specify variables you bind from the program into\
    \ the T-SQL statement:\n\n```sql\n'INSERT INTO [Application].[People] ([FullName],\
    \ [PreferredName],\n[IsPermittedToLogon], [LogonName], [IsExternalLogonProvider],\n\
    [IsSystemUser], [IsEmployee], [IsSalesPerson], [LastEditedBy]) VALUES\n(@FullName,\
    \ @PreferredName, 1, @Logon, 0, 1, 1, 0, 0);'\n```\n\nThe parameters to the function\
    \ `Insert` are used as the following bind variables to the `INSERT` statement\
    \ `@FullName`, `@PreferredName`, and `@Logon` and defined using these statements:\n\
    \n```javascript\nrequest.addParameter('FullName', TYPES.NVarChar, FullName);\n\
    request.addParameter('PreferredName', TYPES.NVarChar, PreferredName);\nrequest.addParameter('Logon',\
    \ TYPES.NVarChar, Logon);\n```\n\nHere is the technique in the code to execute\
    \ a T-SQL batch:\n\n```javascript\nconnection.execSql(request);\n```\n\nAnd the\
    \ following code allows you to iterate through each column of each row of a result\
    \ set from a T-SQL `SELECT` statement and bind to a variable, or in this case\
    \ dump out the results to the console:\n\n```javascript\n// Print the rows read\n\
    var result = \"\";\nrequest.on('row', function(columns) {\n    columns.forEach(function(column)\
    \ {\n        if (column.value === null) {\n            console.log('NULL');\n\
    \        } else {\n            result += column.value + \" \";\n        }\n  \
    \  });\n    console.log(result);\n    result = \"\";\n});\n```\n\nYou can also\
    \ see in the `Connection` object, after a successful execution of these functions,\
    \ the connection to SQL Server is closed:\n\n```javascript\nfunction Complete(err,\
    \ result) {\n    if (err) {\n        console.log(err);\n    } else {\n       \
    \ console.log(\"Done!\");\n        connection.close();\n    }\n}\n```\n\nI executed\
    \ this code from the command prompt like this:\n\n```\nnode .\\customerappinssel.js\n\
    ```\n\nThe results are as follows:\n\n```\nPS C:\\wwi> node .\\customerappinssel.js\n\
    Connecting to SQL Server\nConnected to SQL Server successfully\nStarting...\n\
    Inserting 'Travis Wright' into Table...\n1 row(s) inserted\nReading Customer Contacts...\n\
    WeLoveSQLOnLinux www.welovesqlonlinux.com Slava Oks\n1 row(s) returned\nDone!\n\
    ```\n\nExecuting `UPDATE` and `DELETE` commands in node.js operates very similar\
    \ to executing an `INSERT`. You can see these examples in our documentation at\
    \ [www.microsoft.com/sql-server/developer-get-started/node/windows/step/2.html](http://www.microsoft.com/sql-server/developer-get-started/node/windows/step/2.html).\n\
    \n**Executing Stored Procedures**\n\nYou can execute stored procedures using the\
    \ same `execSql()` method by setting up a request with the full T-SQL `“EXEC <procedure\
    \ name>”` syntax. However, a more efficient way to call stored procedures is via\
    \ a remote procedure call (RPC) method as defined by the TDS protocol. The Tedious\
    \ driver supports this via a method called `callProcedure()`.\n\nUsing the example\
