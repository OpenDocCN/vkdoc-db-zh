    ## Clustered Indexes


    When you create tables, you typically are going to have a primary key on every
    table. Therefore, the only decision to make about how to implement the primary
    key with an index is whether it should be `clustered` or `nonclustered`. Both
    index types are organized using a `b-tree` of pages. The primary difference is
    that a clustered index has the actual data pages as its leaf-level of the b-tree,
    while the leaf level of a nonclustered index points to the data pages. A table
    can only have one clustered index and the data is sorted on the columns of the
    clustered index.


    I personally recommend you create a clustered index for each table. But your primary
    key does not have to be implemented with a clustered index. The vast majority
    of primary keys are enforced with clustered indexes, but I’ll list a few reasons
    why you may not want to do that.


    Kimberly Tripp is one of the most popular MVPs in the SQL Server community and
    specializes in query performance and index design. I’ve heard here say many times
    before that choosing the right clustered index is the most important step in index
    design. I also believe though in making this decision simple. Here is my practical
    advice on clustered index choices.


    - Create a clustered index for every table in your database. The two exceptions
    to this rule are tables with a small number of rows (it could be faster to scan
    a heap than traverse a clustered index) and memory optimized tables (memory optimized
    tables do not support a clustered index).


    **Tip**  There are some scenarios for bulk import where you may want to ensure
    the table is empty with a clustered index to boost performance. read our documentation
    guidance on the topic when performing large bulk inserts into tables: [https://docs.microsoft.com/sql/relational-databases/import-export/prerequisites-for-minimal-logging-in-bulk-import](https://docs.microsoft.com/sql/relational-databases/import-export/prerequisites-for-minimal-logging-in-bulk-import).


