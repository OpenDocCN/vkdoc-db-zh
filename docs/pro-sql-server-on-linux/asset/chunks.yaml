- fmt: "# Chapter 6: Performance Capabilities\n\n*   Look for opportunities for `covering\
    \ indexes`. A covering index includes all the columns in the index that make up\
    \ a `SELECT` statement. If you have a particularly important query that only requires\
    \ columns `a`, `b`, and `c` and you build an index on these three columns, there\
    \ is no need to query data pages to retrieve these column values. One technique\
    \ to create a covered index is to create an index with included columns, which\
    \ you can read more about at [https://docs.microsoft.com/sql/relational-databases/indexes/create-indexes-with-included-columns](https://docs.microsoft.com/sql/relational-databases/indexes/create-indexes-with-included-columns).\n\
    *   Nonclustered indexes that are not used for a primary key or unique constraint\
    \ are often not defined as unique. For example, columns used in a foreign key\
    \ by their nature are not unique for each row in a table, so therefore will not\
    \ be unique.\n\n## Looking at WideWorldImporters\n\nLet’s look at how Microsoft\
    \ built the WideWorldImporters database to see an example of index design. Use\
    \ the following T-SQL script to see what indexes are included in the WideWorldImporters\
    \ design for the `Orders` table (this script is found in the example `wwi_indexes.sql`):\n\
    \n```sql\nUSE [WideWorldImporters]\nGO\nSELECT o.name as table_name, i.name as\
    \ index_name, i.type_desc, i.is_primary_key, i.is_unique, c.name as column_name\n\
    FROM sys.objects o\nINNER JOIN sys.indexes i\n  ON o.object_id = i.object_id\n\
    \  AND o.type = 'U'\n  AND o.name = 'Orders'\nINNER JOIN sys.index_columns ic\n\
    \  ON ic.index_id = i.index_id\n  AND ic.object_id = i.object_id\nINNER JOIN sys.columns\
    \ c\n  ON ic.column_id = c.column_id\n  AND c.object_id = i.object_id\nORDER BY\
    \ table_name, index_name\nGO\n```\n\n![](index-296_1.jpg)\n\nThis script uses\
    \ SQL Server catalog views to determine what indexes, the type, and columns in\
    \ the index for the `Orders` table. Figure 6-12 shows the results of this query.\n\
    \n**Figure 6-12. Finding indexes for a table in SQL Server**\n\nIn this output,\
    \ you can see that the clustered index is the primary key on `OrderID`, which\
    \ is a column generated by a `SEQUENCE`. You can see from the index name that\
    \ the other nonclustered indexes are on columns that are foreign keys to other\
    \ tables. I’ll show you in the next section how to use tools to determine if another\
    \ nonclustered index would help query performance based on a specific SQL Server\
    \ T-SQL statement.\n\n## Use the Tools\n\nSQL Server provides several tools to\
    \ assist in determining whether an index will be helpful to boost query performance:\n\
    \n*   *Missing index* DMVs such as `dm_db_missing_index_details` (which you can\
    \ read more about at [https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-db-missing-index-details-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-dynamic-management-views/sys-dm-db-missing-index-details-transact-sql)):\
    \ I mentioned this DMV in an earlier chapter. While I don’t recommend blindly\
    \ implementing all suggestions found in this DMV, it is absolutely worth looking\
    \ into any results found to see if these indexes could help performance.\n*  \
    \ Missing index information located in the XML SHOWPLAN (the XML schema can be\
    \ found at [http://schemas.microsoft.com/sqlserver/2004/07/showplan](http://schemas.microsoft.com/sqlserver/2004/07/showplan)):\
    \ I’ll show you an example below of how to use this information on a query by\
    \ query basis."
