  trans: '## 第 10 章 迁移至 Linux 上的 SQL Server


    启动时）关于 SQL Server、操作系统和数据库的配置信息。在我担任技术支持期间，仅通过读取`ERRORLOG`文件，我就能告知客户关于他们系统的大量信息。而默认的`pgsql`日志只包含错误信息。


    ### 查询存储


    我非常欣赏`查询存储`的功能，这是 SQL Server 2016 推出时我最喜爱的功能之一。虽然`pgsql`有一个类似的功能，即通过一个名为`pg_stat_statements`的视图来查看查询性能信息，但我认为`查询存储`在以下几个方面更胜一筹。


    - `查询存储`随数据库备份一同保存，因为它与数据库绑定。`pgsql`统计信息是服务器范围的，并且可以持久化，但我没有找到方法将其导出或备份以进行单独分析。

    - `pg_stat_statements`包含查询执行统计信息，通过受支持的扩展提供，但需要重启服务器才能启用。而`查询存储`可以通过`ALTER DATABASE`随时按需在线启用。`查询存储`还支持更丰富的配置参数来控制查询的收集，包括`CAPTURE_MODE=AUTO`（仅存储重要的查询）和历史记录（保留数据的天数）。

    - `查询存储`包含每个查询的等待统计信息，但`pgsql`的等待统计信息在`pg_stat_activity`中与整个进程绑定。

    - `pg_stat_statements`可以在服务器重启后保留，但没有查询的时间戳。因此，你无法对查询进行历史分析以找出差异，并执行诸如查询计划回退分析等操作。此外，`查询存储`会为特定查询随时间推移的每个计划保存估算的计划。而`pg_stat_statements`不包含任何查询计划信息。

    - `查询存储`即使在查询失败时也能捕获查询信息。`pgsql`文档中没有提及`pg_stat_statements`是否在查询失败时保存查询信息。

    - `查询存储`捕获有关编译时间和执行时间的信息。`pg_stat_statements`不区分编译与执行的信息。


    你可以在以下链接阅读关于 SQL Server 中`查询存储`的所有详细信息：[`docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store`](https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store)。


    ### 实时查询统计信息


    在`pgsql`中，通过`pg_stat_statements`没有方法可以在查询进行中查看当前查询级别的信息。SQL Server 则提供了在查询执行过程中查看每个查询计划运算符执行统计信息的能力。你可以在以下链接阅读更多关于
    SQL Server 实时查询统计信息的内容：[`docs.microsoft.com/sql/relational-databases/performance/live-query-statistics`](https://docs.microsoft.com/sql/relational-databases/performance/live-query-statistics)。


    ### DBCC 命令


    最独特的`DBCC`命令，且在`pgsql`中没有等效功能的，是`CHECKDB`。我在研究中读到一些讨论，认为`pgsql`不需要一致性检查器，因为从`pgsql`9.3
    开始已支持页面校验和。然而，正如我在本书中所言，如果页面在内存中损坏，页面校验和将无法检测到（尽管 SQL Server 甚至对此场景有一些最低限度的检测）。请记住，`DBCC
    CHECKDB`是在线的，因为 SQL Server 支持数据库快照的概念。你可以在以下链接阅读更多关于 SQL Server `DBCC CHECKDB`的信息：[`docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-checkdb-transact-sql`](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-checkdb-transact-sql)。'
- fmt: '# Chapter 10: Migrating to SQL Server on Linux


    ## Performance


    Chapter 6 of this book discusses in detail the performance capabilities of SQL
    Server. I believe SQL Server has a long, proven track record of performance both
    with customer testimonials and TPC benchmarks. In fact, one of our first SQL Server
    on Linux production customers has a testimonial that performance of SQL Server
    compared with `pgsql` is what convinced them to migrate. You can read their story
    at [`https://customers.microsoft.com/doclink/dv01`](https://customers.microsoft.com/doclink/dv01).
    I’ve listed out in this section my perspective on the unique capabilities of SQL
    Server for performance as compared with `pgsql`.


    ### SSIS


    SQL Server offers as part of the license for SQL Server an ETL system called SQL
    Server Integration Services (`SSIS`), which I’ve outlined in the book. `pgsql`
    does not come with any rich, built-in ETL system like `SSIS`. You can read more
    about `SSIS` on Linux at [`https://docs.microsoft.com/sql/linux/sql-server-linux-migrate-ssis`](https://docs.microsoft.com/sql/linux/sql-server-linux-migrate-ssis).


    ### DBCC CLONEDATABASE


    While `pgsql` offers methods to create a new database based on a source database
    (i.e., clone), there is no method to create a new database based on a source database
    *and include statistics and performance information*. SQL Server offers this capability
    with `DBCC CLONEDATABASE`. You can read more about `DBCC CLONEDATABASE` at [`https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-clonedatabase-transact-sql`](https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-clonedatabase-transact-sql).


    ### Intellisense and mssql extension for query editing


    `pgsql` has a free GUI tool to perform administration tasks and execute SQL queries
    called `pgAdmin`. There are several differences between `SSMS` and `SQL Operations
    Studio` and `pgAdmin`, but `pgAdmin` is a reasonably good tool. One difference
    that stood out to me was `SSMS` and `SQL Operations Studio` support for intellisense
    for `T-SQL` query design vs. the autocomplete feature for `pgAdmin`. I believe
    the Microsoft Intellisense feature is far richer to aid with the syntax and object
    selection for `T-SQL` vs. autocomplete for `pgAdmin`. `SQL Operations Studio`
    and `mssql-cli` both support intellisense functionality via the `mssql` extension
    that also is provided with the Visual Studio Code editor. You can read more about
    intellisense in `SSMS` at [`https://docs.microsoft.com/sql/relational-databases/scripting/intellisense-sql-server-management-studio`](https://docs.microsoft.com/sql/relational-databases/scripting/intellisense-sql-server-management-studio)
    and the `mssql` extension at [`https://docs.microsoft.com/sql/linux/sql-server-linux-develop-use-vscode#install-the-mssql-extension`](https://docs.microsoft.com/sql/linux/sql-server-linux-develop-use-vscode#install-the-mssql-extension).


    ### Scalability and TPC benchmarks


    I’ve demonstrated and talked extensively about scalability for performance for
    SQL Server. Performance for SQL Server and scalability are best demonstrated with
    TPC benchmarks. SQL Server dominates TPC benchmarks. In fact, SQL Server on Linux
    has the top `1TB TPC-H` benchmark official results ([`http://www.tpc.org/3331`](http://www.tpc.org/3331)).
    As I’ve discussed in the book these benchmarks matter for two reasons:'
