  trans: '

    # 第三章 构建数据库与 T-SQL 基础


    ## 1. **cleanup.sql**：我添加了这个脚本，以便您可以反复运行这些脚本。

    `cleanup.sql` 用于删除之前所有执行中创建的数据库。尽管在第 3 步中会删除 `WideWorldImporters` 数据库，但如果您已经在
    `sqllinux` 登录名的上下文中创建了它，那么在不先删除数据库的情况下，您将无法再次删除和重新创建该登录名。


    ## 2. **createlogin.sql**：创建 `sqllinux` 登录名（需以 `sa` 登录名连接执行）。


    ## 3. **dropandcreatedb.sql**：创建数据库。

    当上下文切换到 `WideWorldImporters` 时，这将使 `sqllinux` 登录名成为 `WideWorldImporters` 数据库中的
    `dbo`（数据库所有者）用户。


    ## 4. **createschemas.sql**：为数据库中的所有对象创建架构。


    ## 5. **createsequences.sql**：为两个表使用的序列对象。


    ## 6. **createpeople.sql**：创建带约束的 `People` 表。


    ## 7. **createcustomers.sql**：创建带约束的 `Customers` 表。


    现在，一切已准备就绪，您可以测试一些 T-SQL 查询来插入数据、查询数据、更新和删除行了。


    ## 构建与运行查询


    我建议通过一个独立的工具来创建和测试您希望在应用程序中使用的 T-SQL 查询，这样可以确保没有语法错误并能按预期运行。在应用程序外部调试 T-SQL 命令要比将其交织在代码中容易得多。因此，在本章的这一部分，我将展示如何使用基本的
    T-SQL 语句来插入、更新、删除和查看数据。本节的示例语句和脚本假设您已经运行了前面所有用于创建数据库和对象的脚本。与本章中创建数据库和对象的脚本一样，我也是使用
    `sqllinux` 登录名执行了以下所有的 T-SQL 语句和脚本。


    ### 插入与读取数据


    出于本章的目的，我将讨论单行数据的简单插入。您有多种选项可以*批量*插入数据，我将在本书的其他章节中讨论这些方法。


    用于插入数据的基本 T-SQL 语句是 `INSERT`。当您向包含外键的表中插入数据时，需要首先向基表中插入行。这意味着您应该首先在 `People` 表中插入任何需要在
    `Customers` 表中作为外键使用的行。


    在 `Customers` 表中，这些列被引用回 `People` 表：


    - `AlternateContactPersonID`

    - `LastEditedBy`

    - `PrimaryContactPersonID`


    当您为一个客户插入单行数据时，需要为这些列提供 `PersonID` 值。它们可能是同一个“人”，但更有可能是至少两到三个不同的人。如果您还记得，`People`
    表中有一个 `LastEditedBy` 列，它引用了该表中的另一行。因此，我的策略是在 `People` 表中创建三行：一行作为两个表中任何行的“编辑者”，另外两行作为客户的主联系人和备用联系人
    ID。


    执行以下 T-SQL 语句或使用示例脚本 `insertpeople.sql` 来在 `People` 表中插入所有三行：


    ```sql

    USE [WideWorldImporters]

    GO

    INSERT INTO [Application].[People]

    ([PersonID], [FullName], [PreferredName], [IsPermittedToLogon],

    [LogonName], [IsExternalLogonProvider], [IsSystemUser],

    [IsEmployee], [IsSalesPerson], [LastEditedBy])

    VALUES (0, ''Robert Dorr'', ''TheKraken'', 1, ''rdorr'', 0, 1, 1, 0, 0)

    GO

    INSERT INTO [Application].[People]

    ([FullName], [PreferredName], [IsPermittedToLogon],

    [LogonName], [IsExternalLogonProvider], [IsSystemUser],

    [IsEmployee], [IsSalesPerson], [LastEditedBy])

    VALUES (''Slava Oks'', ''thegodfather'', 1, ''slavao'', 0, 1, 1, 0, 0)

    GO

    INSERT INTO [Application].[People]

    ([FullName], [PreferredName], [IsPermittedToLogon],

    [LogonName], [IsExternalLogonProvider], [IsSystemUser],

    [IsEmployee], [IsSalesPerson], [LastEditedBy])

    VALUES (''Tobias Ternstrom'', ''theswede'', 1, ''tobiast'', 0, 1, 1, 0, 0)

    GO

    ```

    '
- fmt: '# Chapter 3: Building a Database and T-SQL Fundamentals


    If you look at the syntax I used for the INSERT, I listed out specific columns
    and did not supply values for many of the columns defined to accept NULL values
    (i.e., optional columns).


    To insert a single customer, I must know what the `PersonID` values are for my
    primary and alternate contacts for the customer. You can do this by reading rows
    from the `People` table using the T-SQL `SELECT` statement as seen in the script
    `findpeople.sql`:


    ```sql

    USE [WideWorldImporters]

    GO

    SELECT [PersonID], [FullName] FROM [Application].[People]

    GO

    ```


    The result pane on the right side of Visual Studio will show the following result:


    | PersonID | FullName       |

    |----------|----------------|

    | 0        | Robert Dorr    |

    | 1        | Slava Oks      |

    | 2        | Tobias Ternstrom |


    Slava Oks will be the Primary Customer Contact, while Tobias Ternstrom is the
    Alternate Customer Contact, and Robert Dorr (aka “TheKraken”) will continue to
    be my “editor.”


    Now I have the foundation to insert a new customer. Because the column `[BillToCustomerID]`
    references a valid `[CustomerID]`, I use a feature called a variable to grab a
    `SEQUENCE` value, and then use it for both columns. Execute the following T-SQL
    statements or use the sample script `insertcustomer.sql`:


    ```sql

    USE [WideWorldImporters]

    GO

    DECLARE @CustomerID INT

    SET @CustomerID = NEXT VALUE for [Sequences].[CustomerID]

    INSERT INTO [Sales].[Customers]

    ([CustomerID], [CustomerName], [BillToCustomerID], [CustomerCategoryID],

    [PrimaryContactPersonID],

    [AlternateContactPersonID], [DeliveryMethodID], [DeliveryCityID],

    [PostalCityID],

    [AccountOpenedDate], [StandardDiscountPercentage], [IsStatementSent],

    [IsOnCreditHold],

    [PaymentDays], [PhoneNumber], [FaxNumber], [WebsiteURL],

    [DeliveryAddressLine1],

    [DeliveryPostalCode], [PostalAddressLine1], [PostalPostalCode],

    [LastEditedBy])

    VALUES (@CustomerID, ''WeLoveSQLOnLinux'', @CustomerID, 1, 1, 2, 1, 1, 1,

    getdate(), 0.10, 0, 0, 30,

    ''817-111-1111'', ''817-222-2222'', ''www.welovesqlonlinux.com'', ''Texas'',

    ''76182'', ''Texas'', ''76182'', 0)

    GO

    ```


    Notice for the `[AccountOpenedDate]` column I used `getdate()` to supply a value
    for datetime (`getdate()` provides the local datetime based on the computer where
    SQL Server is installed). This is an example of a built-in function that can be
    used with T-SQL queries. For more information about SQL Server functions, see
    our documentation at [https://docs.microsoft.com/sql/t-sql/functions/functions](https://docs.microsoft.com/sql/t-sql/functions/functions).


    Now I can read from the `Customer` table and join with the `People` table to get
    the name of a customer and their primary contact name from the T-SQL statements
    as seen in the sample script `findcustomer.sql`:


    ```sql

    USE [WideWorldImporters]

    GO

    SELECT c.[CustomerName], c.[WebsiteURL], p.[FullName] AS PrimaryContact

    FROM [Sales].[Customers] AS c

    JOIN [Application].[People] AS p

    ON p.[PersonID] = c.[PrimaryContactPersonID]

    GO

    ```


    The result of this query is as the following row:


    | CustomerName      | WebsiteURL          | PrimaryContact |

    |-------------------|---------------------|----------------|

    | WeLoveSQLOnt...   | www.welovesql...    | Slava Oks      |


    ## Updating and Deleting data


    Now that you have learned examples of how to insert and retrieve rows from these
    tables, two other key operations of any application with SQL Server are the ability
    to update and delete rows. The syntax to perform this is amazingly simple.


    Let’s say you wanted to update the “WeLoveSQLOnLinux” company and change their
    website because they moved their site. Execute the following T-SQL statements
    or use the example script `updatecustomer.sql`:


    ```sql

    USE [WideWorldImporters]

    GO

    UPDATE [Sales].[Customers]

    SET WebsiteURL = ''www.sqlonlinux.com''

    WHERE CustomerName = ''WeLoveSQLOnLinux''

    GO

    ```


    You may also want to delete a customer row with a T-SQL query like this from the
    sample script `deletecustomer.sql`:


    ```sql

    USE [WideWorldImporters]

    GO

    BEGIN TRANSACTION

    DELETE FROM [Sales].[Customers]

    WHERE CustomerName = ''WeLoveSQLOnLinux''

    ```'
