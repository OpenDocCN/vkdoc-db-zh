    # 第四章 构建应用程序与高级 T-SQL


    ```

    console.log("Connecting to SQL Server");


    var connection = new Connection(config);


    connection.on(''connect'', function(err) {


    // If no error, then good to proceed.


    console.log("Connected to SQL Server Successfully");


    InsertCustomer();


    });


    function InsertCustomer() {


    request = new Request("[Sales].[InsertCustomer]", function(err) {


    if (err) {


    console.log(err);}


    else


    console.log(''Inserted new Customer'');


    }


    );


    request.addParameter(''PrimaryContactID'', TYPES.Int, 1);


    request.addParameter(''AlternateContactID'', TYPES.Int, 1);


    request.on(''requestCompleted'', ()=>{connection.close();});


    connection.callProcedure(request);


    }

    ```


    要运行此代码，我执行了这条命令：

    `node .\execinsertcustomer.js`


    在 VS Code 的集成终端或你的命令行 shell 中，结果应如下所示：

    ```

    PS C:\wwi> node .\execinsertcustomer.js

    Connecting to SQL Server

    Connected to SQL Server Successfully

    Inserted new Customer

    ```


    关闭连接的方法使用了 Node.js 应用程序常见的事件编程模型。这行代码会在请求完成时（即查询完成时）关闭连接。

    ```

    request.on(''requestCompleted'', ()=>{connection.close();});

    ```


    ## 增强你的应用程序


    我只介绍了一些使用 Node.js 和 Tedious 连接 SQL Server 并运行查询（包括存储过程）的基本方法。当你构建一个生产级应用程序时，你可能需要增强它，以利用
    Node.js 的其他方法。


    以下是我的一些建议供你考虑：


    *   一种处理频繁打开和关闭连接的更高效方法是称为*连接池*的概念。连接池在 SQL Server 应用程序中非常常见，Tedious 通过另一个对象支持此功能：[tediousjs/tedious-connection-pool](https://github.com/tediousjs/tedious-connection-pool)。

    *   你可能希望控制登录和/或查询的超时时间（等待登录或查询的时间长度）。`Connection` 对象在配置中提供了选项来控制这些超时。两者的默认值都是
    15 秒。你可能还希望有能力手动取消已提交给 SQL Server 的查询，`Connection` 对象通过 `connection.cancel()`
    支持这一点。

    *   还有其他许多与 `Connection` 对象相关的选项你可能想使用，例如加密、IP 地址和端口号、可用性组的读取意图（我将在第 8 章稍后讨论）等等。它们都在
    [`tediousjs.github.io/tedious/api-connection.html#function_newConnection`](http://tediousjs.github.io/tedious/api-connection.html#function_newConnection)
    的 `Connection` 对象文档中有详细说明。

    *   你的应用程序应准备好根据查询和/或存储过程的执行来处理某些事件。请参阅处理 `Request` 对象的 `doneProc` 和 `doneInProc`
    事件的文档：[`tediousjs.github.io/tedious/api-request.html`](http://tediousjs.github.io/tedious/api-request.html)。

    *   此外，SQL Server 可能为任何查询执行返回错误信息和提示信息。请务必使用 `Connection` 对象的 `infoMessage` 和
    `errorMessage` 事件来处理它们。详情请参见 `Connection` 对象文档：[`tediousjs.github.io/tedious/api-connection.html`](http://tediousjs.github.io/tedious/api-connection.html)。

    *   虽然你可以在应用程序的批处理中使用 T-SQL `BEGIN TRANSACTION` 命令，但 Tedious 驱动也提供了用于事务的接口。请参阅相关文档了解更多信息。

    '
- fmt: "详情请参考 [http://tediousjs.github.io/tedious/api-connection.](http://tediousjs.github.io/tedious/api-connection.html#function_beginTransaction)\n\
    \n[html#function_beginTransaction.](http://tediousjs.github.io/tedious/api-connection.html#function_beginTransaction)\n\
    \n# Go Big on T-SQL\n\n在上一章和那个 Node.js 应用程序中，我向你展示了在 Linux 上的 SQL Server 中执行的基本查询，用于创建数据库、表、键、约束，以及执行\
    \ CRUD（创建、读取、更新、删除）操作。\n\n> **注意：** 如果你到此为止还没听腻我的唠叨，那么需要强调的是，整套 T-SQL 示例和脚本可以无需修改地在\
    \ Windows 和 Linux 上的 SQL Server 中运行，因为核心的 SQL Server 引擎在两种平台上是相同的。\n\n我在构思本书时就决定，它不能成为\
    \ SQL Server 和 T-SQL 的完整指南。仅这一项就可能需要好几本书（而且市面上确实有好几本）。相反，我希望为 SQL Server 的新用户提供足够的信息，让他们能在\
    \ Linux 上快速启动并运行，构建一些能力，并了解还有哪些其他选项可以进一步深入。\n\n在本节中，我想简要谈谈 T-SQL 语言和核心数据库引擎中的其他特性，这些可以增强你的应用程序以及使用\
    \ SQL Server 的体验。\n\n# Creating and Using Temporary Objects\n\n可能会遇到这样的情况：你想为每个用户创建一个唯一的临时数据空间，而不将数据存储在你的数据库中，也不必设计一个需要跟踪每个用户数据的方案。\n\
    \n# Chapter 4   Building an application and advanced t-sql\n\nSQL Server 通过一个称为\
    \ *临时表* 的概念（也通过 *表变量*）提供了这种能力。所有临时对象都存储在一个名为 `tempdb` 的特殊系统数据库中。这里的关键词是“临时”。`tempdb`\
    \ 在每次 SQL Server 启动时都会重建。因此，尽管你可以将用户表存储在这个数据库中，但我不推荐这样做。\n\n# Temporary Tables\
    \ and Table Variables\n\n临时表和表变量具有作用域这一独特属性。当你创建这些对象时，它们会在存储过程完成或用户登录会话断开时自动销毁。\n\
    \n示例是向你展示如何操作的最佳方式。让我们以本章前面创建的 `InsertCustomers` 存储过程为例，向你展示临时表和表变量的用法。假设你想引入数据集来计算新客户的\
    \ `StandardDiscountPercentage` 或 `PaymentDays` 列。根据数据的不同，有几种方法可以做到这一点。你可以从存在这些值的源表中查询数据，并将其插入到临时表中。然后在存储过程中使用该临时表来填充这些值。\n\
    \n下面是一个可能的示例。这里假设有一个名为 `CustomerRates` 的源表，它有 `StandardDiscountPercentage`、`PaymentDays`\
