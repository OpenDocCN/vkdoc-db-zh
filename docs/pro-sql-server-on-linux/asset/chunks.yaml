    # 第 7 章：SQL Server 中的安全性


    ## 证书要求


    此外，此功能所使用的证书还有一些特定要求。有关证书要求，请参阅我们的文档：[`docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#requirements-for-certificates`](https://docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#requirements-for-certificates)。


    请仔细阅读有关服务器发起加密（强制所有连接）的说明：[`docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#server-initiated-encryption`](https://docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#server-initiated-encryption)，以及客户端发起加密的说明：[`docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#client-initiated-encryption`](https://docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#client-initiated-encryption)。


    如果您阅读这些说明，会发现步骤完全相同，只有这一步不同：


    ```

    sudo /opt/mssql/bin/mssql-conf set network.forceencryption 1

    ```


    值为 1 用于强制所有连接都加密，而值为 0 则用于客户端发起加密的场景。


    我们的文档包含了一些您在使用加密连接时可能遇到的错误说明：[`docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#common-connection-errors`](https://docs.microsoft.com/sql/linux/sql-server-linux-encrypted-connections#common-connection-errors)。图
    7-10 显示了当您尝试使用加密连接但尚未在 SQL Server 上设置加密时会遇到的错误示例。


    ### 图 7-10. 未配置加密时连接到 SQL Server 出现的错误


    我们文档中的一项指导说明是，您的客户端机器必须支持 TLS 1.2。老实说，我以前从未关心过我的客户端计算机是否支持 TLS 1.2，所以我做了一些研究，找到了这个非常方便的网站来测试我的
    TLS 版本：[`www.ssllabs.com/ssltest/viewMyClient.html`](https://www.ssllabs.com/ssltest/viewMyClient.html)。图
    7-11 显示了我在 Windows 笔记本电脑上的测试结果。


    ### 图 7-11. 使用 ssllabs.com 网站检查客户端上的 TLS 支持


    ## Always Encrypted（始终加密）


    如果您将 SQL Server 连接加密与 TDE（透明数据加密）结合使用，您的数据从客户端到服务器都是加密的，并且存储在磁盘上的数据也是加密的。然而，仅靠这些解决方案存在两个问题：


    *   数据在数据库页面的内存中未被加密。

    *   对加密密钥的控制权没有分离，因为 SQL Server 管理员控制着加密密钥和证书。


    SQL Server 提供了一项功能来填补这些空白并提供端到端加密解决方案，称为 **Always Encrypted**。描述 Always Encrypted
    的最好方式是通过图示。图 7-12 展示了 Always Encrypted 的整体架构。


    ### 图 7-12. Linux 上 SQL Server 中的 Always Encrypted


    在此图的服务器端是您的数据库，其中包含您认为有必要加密的表中的列。


    设置 Always Encrypted 的过程是：首先创建一个 `列主密钥`，您需要从密钥存储提供程序提供该密钥的位置（从而实现密钥管理的分离）。然后为您想要加密的列创建
    `列加密密钥`，并指定列主密钥。虽然 SQL Server 管理员将创建列加密密钥，但列主密钥是由管理独立于 SQL Server 的 `密钥存储` 的其他人提供的。因此，使用此方法读取加密数据的唯一方式是使用支持
    Always Encrypted 且知道列主密钥位置的、包含 SQL Server 库的应用程序。这意味着即使是 SQL Server 管理员也无法解密您选择的列。SQL
    Server 管理员需要设置数据库来加密某些列，但他们没有完全的控制权来解密数据。


    应用程序和列主密钥的所有者拥有解密的完全控制权。此外，被加密的列中的数据，在应用程序中、通过连接传输到 SQL Server 的过程中、以及在数据列中（无论是在内存中还是写入磁盘时）都是加密的。SQL
    Server 将存储元数据，例如加密的列加密密钥以及列主密钥的密钥存储位置。


    支持 Always Encrypted 的 SQL Server 库示例包括：[`docs.microsoft.com/sql/connect/odbc/using-always-encrypted-with-the-odbc-driver`](https://docs.microsoft.com/sql/connect/odbc/using-always-encrypted-with-the-odbc-driver)
    和 [`docs.microsoft.com/sql/connect/php/using-always-encrypted-php-drivers`](https://docs.microsoft.com/sql/connect/php/using-always-encrypted-php-drivers)。


    要完成配置 Always Encrypted 的过程，请按照 SQL Server Management Studio 向导中的文档步骤操作：[`docs.microsoft.com/en-us/azure/sql-database/sql-database-always-encrypted`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-always-encrypted)。


    尽管这是提供透明、端到端加密列数据解决方案的非常优雅的方式，但对于在 Linux 上使用 SQL Server 此功能，还需要考虑一些因素：


    *   目前创建列加密密钥和指定列主密钥的唯一方法是使用在 Windows 上运行的工具，包括 SQL Server Management Studio 和
    Powershell（注意：Powershell 现在已支持 Linux，但目前没有其他原生支持 Linux 的方法）。SSMS 附带一个很棒的向导来引导您完成此过程：[`docs.microsoft.com/sql/relational-databases/security/encryption/configure-always-encrypted-using-sql-server-management-studio`](https://docs.microsoft.com/sql/relational-databases/security/encryption/configure-always-encrypted-using-sql-server-management-studio)。

    *   根据您配置 Always Encrypted 的方式，您在执行针对已加密列的查询时（特别是当您搜索某个值或值范围时）可能会受到一些限制。有关此类限制的详细信息，请参阅我们的文档：[`docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine#feature-details`](https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine#feature-details)。

    '
- fmt: '# Chapter 7: Security in SQL Server


    ## Encryption Summary


    [engine#feature-details](https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine#feature-details)


    - There are some features that do not work with `Always Encrypted`, such as `temporal
    tables` and `In-Memory OLTP`.

    - There could be some penalty in performance and extra storage required for columns
    that are encrypted.


    Even with these limitations and potential performance penalty, you could have
    some data in your database (social security numbers, credit card data, ..) that
    is too sensitive to risk a breach or even risk users with SQL Server administrator
    access having access to this data. In these situations, `Always Encrypted` provides
    a complete end-to-end solution along with a clear separation of roles on encrypting
    and decrypting the data.


    Figuring out how to use encryption with SQL Server can be a bit overwhelming.
    Let me summarize my recommendations on how to traverse our encryption features:


    - No matter what type of encryption feature you decide to choose, always back
    up the `service master key` and all of your keys associated with encryption.

    - You have to decide whether you actually really need encryption for your application.
    Many customers I’ve talked with decide not to use encrypted connections or `Always
    Encrypted` but almost always encrypt their backups.

    - If you use SQL Server to create any keys or certificates, back them all up and
    store them in a separate location from your data backups. Consider any key or
    certificate as valuable as your data.

    - `TDE` has some overhead on performance for I/O operations. However, if you have
    any concerns about anyone being able to access your data files outside of SQL
    Server, you should strongly consider using it. SQL Server databases on a laptop
    could be a good example (could be a second line of defense from `Windows BitLocker`).

    - `Always Encrypted` is a great feature but it is not for all applications and
    databases. If you need a complete end-to-end encryption scheme and want to separate
    management of keys from the database, then `Always Encrypted` could be the right
    fit for you. Take advantage of the cloud by using `Azure Key Vault` as your key
    store provider. Check out how to do this at [https://docs.microsoft.com/azure/sql-database/sql-database-always-encrypted-azure-key-vault](https://docs.microsoft.com/azure/sql-database/sql-database-always-encrypted-azure-key-vault).


    ## Data Classification and Auditing


    The introduction in May of 2018 of new rules for General Data Protection and Regulation
    (GDPR) in the European Union (see the official website at [https://ec.europa.eu/commission/priorities/justice-and-fundamental-rights/data-protection/2018-reform-eu-data-protection-rules_en](https://ec.europa.eu/commission/priorities/justice-and-fundamental-rights/data-protection/2018-reform-eu-data-protection-rules_en))
    has brought new attention to the topics of data classification, vulnerability,
    and data auditing.


    ![](index-377_1.jpg)


    The Microsoft SQL Server Engineering team recognizes these needs and has provided
    general guidance for organizations to prepare and handle GDPR regulations through
    the following document: [http://aka.ms/gdprsqlwhitepaper](http://aka.ms/gdprsqlwhitepaper).


    In addition to guidance, SQL Server provides tools and features to assist in these
    areas, including SQL Server Management Studio and T-SQL commands to help with
    tagging and auditing.


    ## Data Classification


    An important aspect to understanding what data is stored in SQL Server is to be
    able'
