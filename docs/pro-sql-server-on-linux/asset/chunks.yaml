  trans: "# 第 7 章 SQL Server 中的安全\n\n## 3. 实现行级安全\n\n要应用行级安全，你需要创建一个 SQL Server `函数`，该函数将用于应用到任何查询中，以确定用户可以访问哪些行。然后，你需要创建一个安全策略，映射到你已创建的函数。\n\
    \n```sql\n-- 如果存在则删除安全策略和函数\nDROP SECURITY POLICY IF EXISTS [Application].FilterCustomersBySalesTerritoryRole\n\
    GO\nDROP FUNCTION IF EXISTS [Application].DetermineCustomerAccess\nGO\n\n-- 创建用于行级安全的函数\n\
    CREATE FUNCTION [Application].DetermineCustomerAccess(@CityID int)\nRETURNS TABLE\n\
    WITH SCHEMABINDING\nAS\nRETURN (SELECT 1 AS AccessResult\n    WHERE IS_ROLEMEMBER(N'db_owner')\
    \ <> 0\n    OR IS_ROLEMEMBER((SELECT sp.SalesTerritory\n                     \
    \ FROM [Application].Cities AS c\n                      INNER JOIN [Application].StateProvinces\
    \ AS sp\n                      ON c.StateProvinceID = sp.StateProvinceID\n   \
    \                   WHERE c.CityID = @CityID) + N' Sales') <> 0\n)\nGO\n\n-- 已应用的安全策略如下：\n\
    CREATE SECURITY POLICY [Application].FilterCustomersBySalesTerritoryRole\nADD\
    \ FILTER PREDICATE [Application].DetermineCustomerAccess(DeliveryCityID)\nON Sales.Customers\n\
    GO\n```\n\n让我解释一下这个函数是如何工作的。该函数接收一个 `CityID` 值，并从 `Cities` 和 `StateProvinces`\
    \ 表中查找该城市所属的 `SalesTerritory` 名称。函数将字符串 ‘Sales’ 连接到该名称的末尾。因此，任何位于 GreatLakes 地区的\
    \ `CityID` 都将返回 GreatLakesSales。当用户尝试查询 `[Sales].[Customers]` 表时，安全策略会从 `[Sales].[Customers]`\
    \ 表中获取 `DeliveryCityID` 值。这意味着，如果我以 `GreatLakesUser` 的身份登录（该用户是 `GreatLakesSales`\
    \ 角色的成员），则只有 `Customers` 表中 `DeliveryCityID` 映射到 GreatLakes 地区的行才会返回给该用户。\n\n\
    ## 4. 验证行级安全效果\n\n仍然以 `sa`（数据库所有者）身份连接，查看 `[Sales].[Customers]` 表中有多少行并记录该数量：\n\
    \n```sql\nSELECT COUNT(*) FROM Sales.Customers; -- 并记录数量\nGO\n```\n\n当我运行此查询时，我得到了\
    \ 663 行。\n\n## 5. 测试用户权限\n\n现在向 `GreatLakesSales` 角色授予查询 `[Sales].[Customers]`\
    \ 表的权限，然后`模拟`用户 `GreatLakesUser`，并查看表中有多少行：\n\n```sql\nGRANT SELECT, UPDATE ON\
    \ Sales.Customers TO [Great Lakes Sales];\nGO\n\n-- 模拟用户 GreatLakesUser\nEXECUTE\
    \ AS USER = 'GreatLakesUser'\nGO\n\n-- 现在记录数量以及返回了哪些行\n-- 即使我们没有更改命令\nSELECT COUNT(*)\
    \ FROM Sales.Customers;\nGO\n```\n\n当我这次运行查询时，我只看到 77 行。其他行属于其他销售区域，这就是为什么 `GreatLakesSales`\
    \ 角色成员甚至看不到它们存在的原因。\n\n## 6. 撤销模拟\n\n要撤销模拟，请在 `rls.sql` 脚本中使用以下 T-SQL 语句：\n\n\
    ```sql\n-- 切换回登录用户\nREVERT\nGO\n```\n\n行级安全是 SQL Server 安全功能套件中的一项重要特性，完全由独立于应用程序的\
    \ T-SQL 语句管理。请在我们的文档 `https://docs.microsoft.com/sql/relational-databases/security/row-level-security`\
    \ 中了解更多关于行级安全及其工作原理的详细信息。\n\n## 动态数据屏蔽\n\n动态数据屏蔽是另一项出色的安全特性，从 SQL Server 2016\
