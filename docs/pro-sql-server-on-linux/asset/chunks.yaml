    # 第 7 章：SQL Server 中的安全性


    ## 使用 AD 认证


    我发现一些错误信息可以忽略。成功加入域后的状态如图 7-5 所示。


    **图 7-5.** Linux 服务器成功加入域


    此外，虽然我可以按照文档描述在 Linux 服务器上使用 `kinit` 来“登录到域”，但我还想使用我的 AD 域账户通过 `ssh` 登录到我的 Linux
    服务器。在运行这个命令之前，我遇到了一个 `Access Denied` 错误：


    `realm permit -all`


    **注意：** 你可以使用 `realm permit` 仅允许特定的 AD 用户登录，而不是所有用户。


    ## 权限与访问


    我已经向你们展示了如何使用 SQL Server 身份验证和 Active Directory 身份验证来创建登录名和用户，以访问 SQL Server 实例和数据库。这代表了登录
    SQL Server 和连接到数据库的基本功能。但是，对于数据库内部的所有内容（比如表）的访问呢？对于运行适用于 SQL Server、数据库和对象（称为
    *安全对象*）的各种 T-SQL 命令的访问呢？SQL Server 提供了一个系统，可以直接向登录名、用户以及称为角色的概念授予和撤销对安全对象的访问权限。


    与许多系统一样，SQL Server 有一个从 `sa` 账户开始的权限层次结构（还记得你在安装时指定了 `sa` 账户）。`sa` 账户（就像 Linux
    中的 `root`）在权限方面是 *至高无上的*。在安装 SQL Server 后，我将讨论一种技术，通过禁用 `sa` 账户来使你的 SQL Server
    更加安全（参见“角色和权限”部分）。


    如果你想深入了解 SQL Server 的所有安全对象选项，请查看这个 PDF 海报：[`aka.ms/sql-permissions-poster`](https://aka.ms/sql-permissions-poster)。


    ## 授予和撤销访问权限


    T-SQL 提供了两个语句来授予和撤销对安全对象的访问权限：分别是 `GRANT` 和 `REVOKE`。所有可能的安全对象的完整列表可以在 T-SQL `GRANT`
    语句的文档中找到：[`docs.microsoft.com/sql/t-sql/statements/grant-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/grant-transact-sql)。


    默认情况下，登录名和用户会对某些安全对象拥有某种形式的基本访问权限。保护 SQL Server 及其所有安全对象的过程将是：


    • 确定特定的登录名和/或用户需要哪些安全对象和访问权限，并使用 `GRANT` 命令授予这些登录名和用户访问权限。


    • 确定你是否想要撤销某些登录名和/或用户对某些安全对象的访问权限。


    虽然你可以使用 `GRANT` 命令向特定的登录名和/或用户授予对安全对象的访问权限，但更有效的方式可能是先向一个称为 *角色* 的概念授予访问权限，然后根据你的安全需求，再向特定的登录名和/或用户撤销访问权限。


    此外，将对象分组到架构中并向架构授予访问权限，而不是向特定对象授予访问权限，可能会更高效。在前面的章节中，我在描述创建表和视图等对象的基础知识时，已经讨论过架构的概念。


    ## 角色和权限


    角色提供了一种便捷的方法来向一组登录名或用户授予（或撤销）访问权限。例如，你可以创建一个角色，然后将登录名或用户添加到该角色中。接着，你可以向该角色授予权限，角色的所有成员都会继承这些权限。


    如果你想使用像 `SQL Server Management Studio` 这样的工具，你需要以你的 AD 域用户身份登录，并使用 Windows 身份验证连接到你的
    Linux 服务器。`SQL Operations Studio` 支持相同类型的身份验证（更多细节请阅读：[`docs.microsoft.com/sql/sql-operations-studio/enable-kerberos`](https://docs.microsoft.com/sql/sql-operations-studio/enable-kerberos)）。


    一旦我完成了文档中的步骤并绕过了前面提到的问题，我就能够成功使用类似这样的命令：


    ```bash

    sqlcmd -E

    ```


    并且能够以 AD 用户身份成功登录到 SQL Server 开始执行查询。

    '
- fmt: '# SQL Server 安全：权限与角色


    ## 权限概述


    权限定义了在 SQL Server 实例级别或数据库级别，针对给定登录名、用户或角色允许执行哪些操作。完整的权限列表可以在我们的文档中找到：`https://docs.microsoft.com/en-us/sql/relational-databases/security/permissions-database-engine`。


    我将展示默认为内置角色定义的权限示例，然后讨论如何根据您的安全需求更改权限。权限也按层次结构组织。我们的文档提供了一个很好的可视化图表来查看此层次结构：`https://docs.microsoft.com/sql/relational-databases/security/permissions-hierarchy-database-engine`。


    ## 服务器角色


    SQL Server 提供了一组角色，这些角色拥有适用于 SQL Server 实例中登录名的操作权限。您可以在我们的文档中看到这些角色的列表：`https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles`。


    以下是几个值得注意的服务器角色：


    ### `sysadmin`

    该角色的成员登录名可以对 SQL Server 执行任何操作。因此，尽量减少属于此角色的登录名至关重要。默认情况下，`sa` 登录名是此角色的成员。但是，作为
    `sa` 登录名，您可以创建一个新的登录名，将其添加到 `sysadmin` 角色，然后禁用 `sa` 登录名。这可以提供额外的安全层，防止不怀好意的用户尝试猜测
    `sa` 密码。您可以使用 `ALTER SERVER ROLE` T-SQL 命令（文档见：`https://docs.microsoft.com/sql/t-sql/statements/alter-server-role-transact-sql`）将登录名添加到服务器角色。


    ### `dbcreator`

    该角色的成员拥有创建、更改和删除数据库的权限。虽然可以分配登录名权限以创建自己的数据库（他们现在会自动成为该数据库的所有者），但此角色的问题在于成员拥有更改或删除任何数据库的权限，而不仅限于他们拥有的数据库。另一种允许登录名拥有自己数据库的技术是：以
    `sysadmin` 角色成员的身份创建数据库，然后将新登录名分配为数据库所有者。我将在下一节“数据库角色”中演示如何操作。


    `sysadmin` 和 `dbcreator` 是 *固定* 服务器角色的例子。这意味着这些角色的权限无法更改。文档 `https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles#permissions-of-fixed-server-roles`
    中的图表展示了固定服务器角色的权限。


    ### `public`

    这是为 SQL Server 创建的任何新登录名的默认角色。'
  raw: 'users. SQL Server comes with a series of built-in roles that have already
    been granted


    certain permissions.


    Permissions define what operations are allowed for a given login, user, or role
    at


    the SQL Server instance level or database level. A complete list of possible permissions


    can be found in our documentation a[t https://docs.microsoft.com/en-us/sql/](https://docs.microsoft.com/en-us/sql/relational-databases/security/permissions-database-engine)


    [relational-databases/security/permissions-database-engine](https://docs.microsoft.com/en-us/sql/relational-databases/security/permissions-database-engine).
    I’ll show you examples of permissions that are defined by default for built-in
    roles and then talk about


    how you can make changes for permission per your security needs. Permissions also


    are organized into a hierarchy. Our documentation has a very good visual diagram
    to


    view this at [https://docs.microsoft.com/sql/relational-databases/security/](https://docs.microsoft.com/sql/relational-databases/security/permissions-hierarchy-database-engine)


    [permissions-hierarchy-database-engine](https://docs.microsoft.com/sql/relational-databases/security/permissions-hierarchy-database-engine).


    ** Server  Roles**


    SQL Server provides a set of roles that have permission for operations that apply
    across


    the SQL Server instance for logins. You can see a list of these roles in our documentation


    at [https://docs.microsoft.com/sql/relational-databases/security/](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles)


    [authentication-access/server-level-roles](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles).


    Chapter 7   SeCurity in SQL Server


    Let me call out a few of these server roles worth noting:


    **sysadmin:** Logins that are members of this role can perform any


    operation for SQL Server. Therefore, it is critical to minimize


    which logins are members of this role. By default, the sa login is


    a member of this role. However, as the sa login, you can create


    a new login, add it to the sysadmin role, and then disable the


    sa login. This could provide an extra layer of security to avoid


    unwanted users from trying to guess the sa password. You can


    use the ALTER SERVER ROLE T-SQL command as documented at


    [https://docs.microsoft.com/sql/t-sql/statements/alter- ](https://docs.microsoft.com/sql/t-sql/statements/alter-server-role-transact-sql)


    [server- role-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/alter-server-role-transact-sql) to
    add logins to server roles.


    **dbcreator**: Members of this role have permissions to create, alter,


    and drop databases. While it is possible to assign login rights to


    create their own database (and they would now automatically


    become the database owner), the problem with this role is that


    members have permissions to alter or drop  *any database*, not just


    ones they own. Another technique to allow a login to own their own


    database is to create the database as a member of the sysadmin


    role, and then assign a new login the rights as database owner. I’ll


    show you how to do this in the next section, “Database Roles.”


    Sysadmin and dbcreator are examples of  *fixed* server roles.


    This means the permissions for these roles cannot be changed.


    The documentation a[t https://docs.microsoft.com/sql/](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles#permissions-of-fixed-server-roles)


    [relational-databases/security/authentication-access/](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles#permissions-of-fixed-server-roles)


    [server-level-roles#permissions-of-fixed-server-roles h](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles#permissions-of-fixed-server-roles)as
    a diagram that shows the permissions for fixed server roles.


    **public**: This is the default role for any new login created for SQL'
