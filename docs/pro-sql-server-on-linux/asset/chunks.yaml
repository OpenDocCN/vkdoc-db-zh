    ## 系统表与目录视图


    这些表的结构和设计可能在任何版本中发生变更。


    由于每个用户数据库都基于模型数据库，因此每个用户数据库都具有相同的系统表集合。`master` 数据库则拥有额外的系统表，用于存储关于 SQL Server
    实例的信息。


    由于用户仍然需要访问系统表中包含的元数据，我们构建了一系列称为 **目录视图** 的视图，这些视图将用户与系统表的具体细节抽象开来。目录视图可以从任何数据库上下文中使用
    `sys` 架构进行访问。目录视图的定义存储在隐藏的 “Resource” 数据库中。


    > **注意**：在第 9 章中，我将提供一些关于访问系统表的高级技巧，但在正常情况下应该不需要用到。


    SQL Server 的许多功能需要将元数据存储在系统表中。截至 SQL Server 2017，大约有 300 个目录视图，跨越 30 多个类别。您可以在我们的文档中按类别查看完整的目录视图列表：[https://docs.microsoft.com/sql/relational-databases/system-catalog-views/catalog-views-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-catalog-views/catalog-views-transact-sql)。我们的文档还包含一个关于常见目录视图场景的详细
    FAQ：[https://docs.microsoft.com/sql/relational-databases/system-catalog-views/querying-the-sql-server-system-catalog-faq](https://docs.microsoft.com/sql/relational-databases/system-catalog-views/querying-the-sql-server-system-catalog-faq)。


    我认为您最可能想要深入了解的常见类别包括：


    - **对象目录视图**：关于表、列、索引以及数据库中存储的其他对象的视图。

    - **数据库和文件目录视图**：关于数据库和文件的视图（我已在几个示例中使用了 `sys.databases` 目录视图）。

    - **安全目录视图**：关于登录、角色和用户的视图。


    ## SQL Server 工具


    甚至有一个目录视图可以查找所有目录视图的列表！从任何您喜欢的工具，在任意数据库上下文中执行以下 T-SQL 命令以获取所有系统对象的列表：


    ```sql

    SELECT name, type_desc FROM sys.system_objects

    ORDER BY name

    GO

    ```


    > **提示**：避免构建依赖于从目录视图中 `SELECT *`（所有列）的生产应用程序或脚本，因为我们可能会在未来的 SQL Server 版本中向目录视图定义中添加列。


    此查询结果中，`type_desc = ''VIEW''` 的大多数都是目录视图。我稍后将讨论另一种称为 **动态管理视图** 的特殊视图。


    尽管目录视图存储在隐藏的 Resource 数据库中，但您可以使用目录视图 `sys.system_sql_modules` 查看这些视图的 T-SQL 代码。以下
    T-SQL 命令可用于查找目录视图 `sys.databases` 的 T-SQL 视图定义：


    ```sql

    SELECT * FROM sys.system_sql_modules

    WHERE object_id = object_id(''sys.databases'')

    GO

    ```


    为了符合 ISO 标准，SQL Server 还提供了一系列称为 **系统信息模式视图** 的目录视图。这些视图很容易识别，因为它们属于一个名为 `INFORMATION_SCHEMA`
    的特殊架构。您可以在我们的文档中获取这些视图的完整列表：[https://docs.microsoft.com/sql/relational-databases/system-information-schema-views/system-information-schema-views-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-information-schema-views/system-information-schema-views-transact-sql)。


    并非所有用户都能看到系统目录视图中的所有内容。目录视图的权限策略有些复杂。您可以在我们的文档中阅读更多关于这些权限的信息：[https://docs.microsoft.com/sql/relational-databases/security/metadata-visibility-configuration](https://docs.microsoft.com/sql/relational-databases/security/metadata-visibility-configuration)。


    ## 系统存储过程


    SQL Server 安装时附带了一系列称为系统存储过程的存储过程。与目录视图类似，这些过程的定义和文本也存储在隐藏的 Resource 数据库中。


    许多系统存储过程用于管理和配置 SQL Server 的特性和方面。我在第 2 章向您介绍了其中一个名为 `sp_configure` 的系统过程，用于配置
    SQL Server 实例设置。


    虽然大多数系统存储过程会进行更改，但有一系列通用的系统存储过程提供信息（在某些情况下使用目录视图）。这些过程有一个已知的名称格式，以单词 `sp_help`
    开头。例如，此 T-SQL 命令返回类似于目录视图 `sys.objects` 的信息：


    ```sql

    EXEC sp_help

    GO

    ```


    按类别组织的系统存储过程完整列表可以在我们的文档中找到：[https://docs.microsoft.com/sql/relational-databases/system-stored-procedures/system-stored-procedures-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-stored-procedures/system-stored-procedures-transact-sql)。


    系统存储过程的权限因过程而异。请查阅每个过程的文档以了解所需的权限。


    ## 动态管理视图


    从我 1993 年开始使用 SQL Server 起，就有两个 **虚拟表** 提供有关 SQL Server 内部执行的信息，这些信息基于引擎中的内部数据结构：`sysprocesses`
    和 `syslocks`（以及引用它们的存储过程 `sp_who` 和 `sp_lock`）。这些视图将连接、查询和锁的内部数据结构以行和列的形式呈现出来。


    多年来，这是唯一能够基于内存结构提供 SQL Server 引擎执行洞察的视图。由于我在技术支持领域工作的这些年，如果我想了解引擎内其他内存结构的情况，我必须捕获
    `SQLSERVR.EXE` 进程的用户转储文件，并使用 Windows 调试器手动检查结构列表。虽然这迫使我深入了解 SQL Server 引擎，但这并非解决问题的有效方式。


    后来，SQL Server 团队来了一位名叫 Slava Oks 的人（你能看出这里有个趋势吗）。Slava 与一组工程师合作构建了 SQLOS 平台，这仍然是核心引擎架构的一部分。Slava
    是调试专家，但他有一个目标：看看在不使用调试器的情况下，他能用 SQLOS 解决多少问题。根据 Slava 的想法，如果您能连接到 SQL Server，您就可以使用
    T-SQL 来“实时调试” SQL Server 引擎的细节。


    ### 视图


    Slava 和他的团队采纳了虚拟表的概念，并将其扩展为一系列视图，这些视图暴露了来自 SQLOS 结构的信息，例如任务、线程、工作线程和内存。这项工作促使引擎团队内的其他小组开始暴露关于其他结构的信息。


    在 SQL Server 2005 中，我们将所有这些视图收集到一个称为动态管理视图的新特性中。'
