    在云端开发这类功能了。采用我们云端优先的工程开发模式，我们开始在 Azure 上开发这些功能，测试并验证其有效性，然后将其引入 SQL Server 2017。


    我有一个你可以自己尝试的演示（惊喜！它使用了`WideWorldImporters`数据库），演示的是在 Linux 上运行 SQL Server 并使用
    SQL Operations Studio。我建议你完成整个示例，你可以在本章示例的`autotune`目录中找到它，或者访问我的 GitHub 站点：[`github.com/Microsoft/bobsql/tree/master/demos/sqlserver/sqllinux/autotune`](https://github.com/Microsoft/bobsql/tree/master/demos/sqlserver/sqllinux/autotune)。只需按照`readme.md`文件中的说明操作即可。运行此演示时，你会注意到我以一种新的方式使用了本章前面展示的
    SQL Operations Studio 的图表功能。图 6-22 展示了自动调优解决演示中查询计划回归问题后，来自 SQL Operations Studio
    的图表示例。


    **图 6-22. 使用 SQL Operations Studio 演示自动调优功能**


    图 6-22 所示的图表测量的是`batch requests/sec`（每秒批处理请求数），这是衡量 SQL Server 查询吞吐量的标准方法。请注意图表右侧性能如何下降，但又自动迅速恢复到预期水平。


    我向几乎所有人展示过这个演示，他们都感到惊讶。我推荐使用此功能的建议如下：


    -   启用查询存储并根据你的需求进行配置。请参阅我们在最佳实践方面的文档：[`docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store`](https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store)。

    -   通过检查动态管理视图`dm_db_tuning_recommendations`来监控我们为你提供的任何建议。

    -   如果你认可我们的建议，可以尝试使用以下 T-SQL 语法开启自动计划修正：

    ```

    ALTER DATABASE current

    SET AUTOMATIC_TUNING ( FORCE_LAST_GOOD_PLAN = ON );

    ```

    -   无论你只是查看建议还是使用自动化功能，我始终建议你找出查询计划回归问题的原因，并采取更长期的纠正措施。


    如果你想跟随并观看我在 Linux 上使用 SQL Server 演示自动调优，请观看我在 SQL Server YouTube 频道上发布的演示视频：[`youtu.be/Sh8W7IFX390`](https://youtu.be/Sh8W7IFX390)。


    ## 本章小结


    本章中，我的目的是确保你了解 SQL Server 在 Linux 上性能的潜力。我介绍了你可以信赖的 SQL Server 内置性能能力，从笔记本电脑的可扩展性到业内最大的企业级服务器。我向你展示了针对
    SQL Server 和 Linux 的重要配置选择。并且我讨论了如何通过正确平衡索引、维护统计信息以及在你的应用程序中合理使用 T-SQL 来实现性能调优。你还看到了如何利用新技术来加速性能，从列存储索引到诸如自动调优之类的智能性能功能。掌握了这些知识，现在是时候确保你了解如何保护你的
    SQL Server，并学习在 Linux 上运行时重要的安全功能和选项了。


