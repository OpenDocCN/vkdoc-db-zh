    one execution of `mssql-conf` like the following:


    ```

    sudo MSSQL_PID=Developer ACCEPT_EULA=Y MSSQL_SA_PASSWORD=''<YourStrong!Passw0rd>''
    /opt/mssql/bin/mssql-conf -n setup

    ```


    Figure 2-12 shows the output of an unattended execution of `mssql-conf`.


    *Figure 2-12. Using `mssql-conf` for an unattended setup*


    You can configure other setup tasks to be part of an entire script that installs
    SQL Server, installs command line tools, other packages, performs other configuration
    tasks, and opens the firewall for remote connectivity. For an example of a more
    robust unattended script, see the example for RHEL at [https://docs.microsoft.com/sql/linux/sample-unattended-install-redhat](https://docs.microsoft.com/sql/linux/sample-unattended-install-redhat).


    Our Customer Advisory Team at Microsoft have also created a GitHub repo to show
    a possible complete unattended installation based on their customer experiences,
    which you can find at [https://github.com/denzilribeiro/sqlunattended](https://github.com/denzilribeiro/sqlunattended).
    (Credits to Denzil Ribero from Microsoft for creating this great set of scripts).


    ## Offline Install


    There may be situations where your Linux server is not connected or often disconnected
    from the Internet. Therefore, you need a process to be able to install the `mssql-server`
    package when your Linux server is offline.


    **Tip:** If you are doing demonstrations of the SQL Server install experience,
    I highly recommend you download a package to your Linux server as a backup should
    you be in a place where there is poor Internet connectivity.


    The various package management systems all support this technique, provided you
    can download the appropriate package in a manner that you can copy to your Linux
    server.


    Our packages for `mssql-server` can be found by navigating our release notes documentation
    page at [https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes).


    Copy down the package from the desired build, copy it into your Linux server in
    your home directory, and use your package manager program with an option that
    supports a local install. For RHEL, it looks like the following:


    ```

    sudo yum localinstall mssql-server_versionnumber.x86_64.rpm

    ```


    The only issue with this approach is that the package manager will look for dependent
    packages to install but if you are not connected to the Internet, it cannot download
    them.


    An alternate approach for RHEL and SLES (RPM-based systems) is to use the `rpm`
    command like the following:


    ```

    rpm -ivh mssql-server_versionnumber.x86_64.rpm

    ```


    This command will not look for dependent packages and will not try to connect
    to the Internet. If you get errors, because a dependent package is not available,
    you can use this command to find these dependencies:


    ```

    rpm -qpR mssql-server_versionnumber.x86_64.rpm

    ```


    **Tip:** The `rpm` package contains all the metadata to detect dependencies, so
    you do not need to be connected to the Internet to run this command. This command
    also only requires you have permission to read the `.rpm` file.


    You could then locate the dependent packages, download, copy, and install them
    locally to meet the needs of the `mssql-server` package.


    Once you complete the local installation, you would then execute `sudo /opt/mssql/bin/mssql-conf
    setup` just as you did for an online installation.


    ## Installing Other Packages


    One of the ways we have been able to keep the `mssql-server` installation light
    and fast is to separate other functionality into packages. The packages in Table
    2-2, therefore, can be installed after `mssql-server` to use other features.


    *Table 2-2. Optional Packages*


    | Package | Description | Comments |

    |---------|-------------|----------|

    | `mssql-tools` | Command line tools such as |  |'
