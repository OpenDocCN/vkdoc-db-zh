    with a file extension of `.mdf`), and a transaction log file (usually ending with
    a file extension of `.ldf`).


    In many situations, using a single database file and a single transaction log
    file adequately serves the needs of an SQL Server database. However, this chapter
    is about tuning, so I’ve provided in this section guidance on how to maximize
    I/O performance using file placement, filegroups, and planning for file growth.


    I should also comment that if you decide to host multiple databases on an SQL
    Server instance, you should consider spreading out the files from each database
