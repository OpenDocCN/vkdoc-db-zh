- fmt: '# 第10章 迁移到Linux上的SQL Server


    ## 启用新特性以提升性能


    当你已经迁移到Linux上的SQL Server，对其性能感到满意，并且建立了新的性能基线后，在正式“启用”生产环境之前，你可能还会考虑使用一些新的性能特性，包括但不限于：


    *   列存储索引

    *   内存OLTP

    *   分区（如果你是从SQL Server迁移过来，这不一定是个新特性，但你之前可能并未使用它。来自其他数据平台的用户则肯定需要考虑分区）。

    *   自动调优


    请回顾第6章，了解更多关于这些特性以及如何、何时最佳使用它们的细节。


    ## 设计你的安全与高可用性灾难恢复策略


    确保迁移后性能满足要求是成功的关键。但正如我在本书其他章节所描述的，安全和高可用性灾难恢复（HADR）同样重要。回顾这些章节，了解你应该使用哪些安全特性，以及应如何设置登录名和用户。或许你可以借此机会使用Active
    Directory身份验证。


    对于HADR，拥有备份策略是根本要求。但你也可以将此次迁移作为一个机会，设置Always On可用性组作为新的HADR策略。


    ## 使用数据库兼容性级别


    每个SQL Server数据库都可以在SQL Server的每个版本上以特定的**数据库兼容性**级别运行。当在特定版本的SQL Server上创建数据库时，该数据库将采用该SQL
    Server版本的默认数据库兼容性级别。我不得不承认，数据库兼容性级别的编号系统与SQL Server版本的名称相比，可能会有点令人困惑。例如，SQL Server
    2017的默认数据库兼容性级别是140。使用140是为了匹配SQL Server的版本号。例如，SQL Server 2017的版本号以14开头，因此兼容性级别与引擎版本**主版本号**相匹配。


    > **注意** 你可以使用T-SQL语句`SELECT @@VERSION`或使用T-SQL系统函数`@@ServerpropertY`的选项之一（如`productversion`）来查找完整的引擎版本。完整的产品版本由`major.minor.build.revision`号组成。在大多数情况下，我们不使用次版本号（SQL
    Server 2008r2除外）。`build`对应于SQL Server的主要构建发布，如RTM、累积更新或GDR。`revision`是内部机制，用于在接近发布RTM、累积更新或GDR版本时更新构建。


    默认数据库兼容性级别与SQL Server版本和发布版本匹配的完整表格记录在以下网址：[https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-compatibility-level#arguments](https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-compatibility-level#arguments)。


    随着每个新的SQL Server主要版本发布，都会建立一个新的默认数据库兼容性级别。从之前版本恢复的任何数据库都将保留其先前版本的默认数据库兼容性级别。你可能没有意识到，但之前章节中每次恢复`WideWorldImporters`示例时，该数据库都保留了130的数据库兼容性级别。你可以在恢复`WideWorldImporters`后运行以下T-SQL语句来查看：


    ```sql

    SELECT name, compatibility_level FROM sys.databases WHERE name = ''WideWorldImporters''

    GO

    ```


    结果应如下所示：


    ```text

    Name                         compatibility_level

    ---------------------------- -------------------

    WideWorldImporters           130

    ```


    你可以使用`ALTER DATABASE` T-SQL语句来更改兼容性级别。'
  raw: 'ChApter 10   MigrAting to SQL Server on Linux


    ** Enable New Features for Performance**


    Once you have migrated to SQL Server on Linux, are comfortable with performance,
    and


    have new baselines established, before you “turn on” production you may consider
    also


    looking at using new features for performance, including but not limited to:


    •  Columnstore indexes


    •  In-Memory OLTP


    •  Partitions (this is not necessarily a new feature if you are migrating


    from SQL Server, but you may not have been using this. Users from


    other data platforms will definitely want to consider partitions).


    •  Automatic Tuning


    Review back to Chapt[er 6 for mor](#index_split_003.html#p250)e details on these
    features and how and when to


    best use them.


    ** Design Your Security and HADR Strategy**


    Ensuring performance meets your needs after the migration is critical to success.


    But as I’ve described in other chapters in the book, security and HADR can be
    just as


    important. Review these chapters to see what security features you should use
    and how


    you should set up logins and users. Perhaps you can take this opportunity to use
    Active


    Directory authentication.


    For HADR, having a backup strategy is fundamentally required. But you also may
    use


    the migration as an opportunity to set up Always On Availability Groups as a new
    HADR


    strategy.


    ** Using Database Compatibility**


    Each SQL Server database can operate at a  *database compatibility* level on each


    version of SQL Server. When a database is created on a specific version of SQL
    Server,


    that database takes on the default database compatibility level for that SQL Server


    version. I have to admit, it can get a bit confusing on the numbering system for
    database


    compatibility levels compared with the name of the SQL Server version. For example,


    the default database compatibility level for SQL Server 2017 is 140. The reason
    for 140


    ChApter 10   MigrAting to SQL Server on Linux


    is to match the version number of SQL Server. For example, the version number
    of SQL


    Server 2017 starts with 14, so the compatibility levels match the engine version 
    *major *


    *number*.


    **Note**  You can find the full engine version using the t-SQL statement SELECT


    @@VERSION or using one of the options for the t-SQL @@ServerpropertY


    system function like productversion. the full product version is made up of a
    major.


    minor.build.revision number. in most cases, we do not use the minor number


    (exception SQL Server 2008r2). the build equates to a major build release of


    SQL Server like rtM, Cumulative update, or gDr. the revision is an internal


    mechanism to update builds once we are close to releasing a build as part of a


    rtM, Cumulative update, or gDr release.


    The full table of the default database compatibility level that matches the SQL


    Server release and version are documented at [https://docs.microsoft.com/sql/t-](https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-compatibility-level#arguments)


    [sql/statements/alter-database-transact-sql-compatibility-level#arguments](https://docs.microsoft.com/sql/t-sql/statements/alter-database-transact-sql-compatibility-level#arguments).


    As each new major release of SQL Server comes to market, a new default database


    compatibility is established. Any database restored from a previous release will
    retain


    the default database compatibility level of that previous release. You didn’t
    realize it, but


    every time you restored the WideWorldImporters sample in previous chapters of
    this


    book, this database retained the database compatibility level of 130. You can
    see this by


    running the following T-SQL statement after restoring WideWorldImporters:


    SELECT name, compatibility_level FROM sys.databases WHERE name =


    ''WideWorldImporters''


    GO


    The results should look like


    Name                          compatibility_level


    ----------------------------- -------------------


    WideWorldImporters            130


    You can use the ALTER DATABASE T-SQL statement to change the compatibility'
