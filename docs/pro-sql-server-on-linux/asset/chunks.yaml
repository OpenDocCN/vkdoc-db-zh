  trans: "\n# 第 4 章 构建应用程序与高级 T-SQL\n\n## 插入和读取数据\n\n既然你已经学会了使用 node.js 连接到 SQL Server，现在让我们加入代码，向`[Application].[People]`表插入一行（一个不同于第\
    \ 3 章示例中使用的新行），以及另一段代码来从 Customer 表获取联系人信息。\n\n在 node.js 中使用 Tedious 执行查询需要`Request`对象。你可以在\
    \ [`tediousjs.github.io/tedious/api-request.html`](http://tediousjs.github.io/tedious/api-request.html)\
