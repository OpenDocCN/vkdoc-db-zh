- fmt: "participates in the AG set of *replicas* (a node that participates in the\
    \ AG). The minimum number on Linux replicas to ensure data protection and high\
    \ availability is three: a primary replica, a secondary replica, and a configuration\
    \ replica.\n1.  Create and Configure the AG across these SQL Servers replicas.\n\
    2.  Create the cluster using Pacemaker.\n3.  Add the AG as a resource to the cluster.\n\
    \nThere are several choices based on the architecture of replicas for your environment.\
    \ The minimum number of replicas to ensure high availability is three, but again\
    \ one of these can be a configuration replica.\n\nLet’s look in more detail at\
    \ how this works and looks using an example. I should be honest up front that\
    \ there are many steps to follow to complete this example.\n\n**Note** to make\
    \ these steps simple, run all `t-sql` statements in this example connected as\
    \ `sa` or another `sysadmin` login. you can use your favorite `SQL Server` tool\
    \ to run the statements. i used `sqlcmd` on the `linux` server.\n\n## Install\
    \ Linux and SQL Server\n1.  I installed three VMs on Azure with RHEL 7.5: `bwsqllinuxag1`,\
    \ `bwsqllinuxag2`, and `sqllinuxcfgag` (I made this VM only a two CPU to save\
    \ costs). I put all of these VMs in the Azure Resource Group `bwsqllinuxags`,\
    \ so they are automatically part of the same virtual network (`vnet`). I’ll call\
    \ each of these servers *nodes* and *replicas*. `bwsqllinuxag1` is the primary\
    \ replica, `bwsqllinuxag2` is the secondary replica, and `sqllinuxcfgag` is the\
    \ configuration replica.\n    *   I opened up port 22 on all of these so I could\
    \ use `ssh` clients from my laptop.\n    *   Run `sudo yum -y update` to get all\
    \ packages up to date.\n    ![](index-433_1.png)\n    *   Configure the hosts\
    \ file on each server (Note: be sure the Linux Server has a valid hostname in\
    \ `/etc/hostname` other than `localhost`) to contain all the IP addresses and\
    \ hostnames of each server. For my Azure Virtual Machines, this is the Private\
    \ IP of each VM, since they are all on the same virtual network in Azure. My `/etc/hosts`\
    \ file looks like this on each server, as in Figure 8-12.\n    ***Figure 8-12.**\
    \ Example `/etc/hosts` file*\n2.  Install SQL Server. Since I’ve used RHEL for\
    \ my servers, I’ve followed the instructions as I documented in Chapter 2. You\
    \ can also find these in the documentation at [https://docs.microsoft.com/sql/linux/quickstart-install-connect-red-hat](https://docs.microsoft.com/sql/linux/quickstart-install-connect-red-hat).\
    \ Be sure to install SQL Server, open up firewall ports, and install the command\
    \ line tools for Linux. Both `bwsqllinuxag1` and `bwsqllinuxag2` are running the\
    \ Enterprise edition, while `sqllinuxcfgag` is using `SQL Express Edition`.\n\n\
    ## Create and Configure the AG across these SQL Servers Replicas\n**Note** it\
    \ is possible to perform some of steps in this section using `SQL Server Management\
    \ studio (ssMs)`. learn more at [https://docs.microsoft.com/sql/linux/sql-server-linux-create-availability-group#create-the-availability-group](https://docs.microsoft.com/sql/linux/sql-server-linux-create-availability-group#create-the-availability-group).\
    \ i’m going to show you the complete set of steps using all bash shell scripts\
    \ and `t-sql`.\n1.  Enable the AG for SQL Server on Linux on each node with the\
    \ following command run from the bash shell, as found in the example script **enableag.sh**\
    \ (remember, you must execute `chmod u+x` to execute an `.sh` script):\n    ```\n\
    \    sudo /opt/mssql/bin/mssql-conf set hadr.hadrenabled 1\n    sudo systemctl\
    \ restart mssql-server\n    ```"
