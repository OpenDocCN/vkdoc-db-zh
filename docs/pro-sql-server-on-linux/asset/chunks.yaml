    keyboard shortcuts for SQL Operations Studio, see the documentation a[t https://docs.](https://docs.microsoft.com/sql/sql-operations-studio/keyboard-shortcuts)


    [microsoft.com/sql/sql-operations-studio/keyboard-shortcuts.](https://docs.microsoft.com/sql/sql-operations-studio/keyboard-shortcuts)'
  trans: '

    ## 扩展


    可以将扩展视为在定制服务器和数据库仪表板之外添加您自己仪表板的方法。扩展是类似于 `Visual Studio Code` 中扩展概念的**附加组件**。


    扩展由社区或微软构建，可以通过在 `SQL Operations Studio` 最左侧窗格中选择 `Extensions` 图标来安装（或查看已安装的内容）。随着时间的推移，我预计扩展列表会变得像
    `Visual Studio Code` 中的市场一样丰富。


    根据您使用的 `SQL Operations Studio` 版本，您可能已经随工具安装了一些扩展。在我的安装中，我有用于 `SQL Agent`、`Server
    Reports` 和 `sp_whoisactive`（`SQL Server` 社区中极其流行的 `T-SQL` 存储过程）的扩展。您可以在用于显示 `Server`
    仪表板的 `Home` 选项旁边找到这些扩展。您可以在我们的文档中找到关于扩展以及如何创建您自己的扩展的更多信息：[`docs.microsoft.com/sql/sql-operations-studio/extensions`](https://docs.microsoft.com/sql/sql-operations-studio/extensions)。


    ![](img/index-194_1.jpg)


    ## 第 5 章   SQL Server 工具


    ### T-SQL 查询编辑器


    您使用 `SQL Operations Studio` 最常见的任务可能就是执行 `T-SQL` 查询。`SQL Operations Studio` 提供了一个功能丰富的
    `T-SQL` 查询编辑器，其功能类似于 `Visual Studio Code` 的 `mssql` 扩展。而创建和执行查询最快捷的方法是右键单击服务器或数据库名称，然后选择
    `New Query` 选项。


    由于 `SQL Operations Studio` 与 `Visual Studio Code` 的 `mssql` 扩展一样，使用了 `SQL Tools
    Service`，因此它提供了智能感知和辅助执行 `T-SQL` 查询的功能。我在第 3 章关于 `Visual Studio code` 中未谈到的一个功能是称为
    `T-SQL` 代码片段的概念。`T-SQL` 代码片段为使用 `T-SQL` 执行常见任务提供了模板，以帮助完成 `T-SQL` 语法。


    要使用 `T-SQL` 代码片段，请使用 `New Query` 选项或键盘快捷键 `Ctrl+N` 调出 `Query Editor`。然后输入单词 `sql`，您将看到一个常见
    `T-SQL` 任务（如创建表）的列表。图 5-23 显示了选择 `sqlCreateTable` 后用于创建新表的 `T-SQL` 代码片段。


    **图 5-23.** 在 `SQL Operations Studio` 中使用 `T-SQL` 代码片段


    ![](img/index-195_1.jpg)


    ## 第 5 章   SQL Server 工具


    `T-SQL` 编辑器中另一个优秀的功能是称为 *速查定义* 的概念。


    考虑一下这个场景。您正在使用 `T-SQL` 编辑器执行一个 `INSERT` 语句，将一行数据插入到 `WideWorldImporters` 数据库的
    `[Application].[People]` 表中。问题是您不记得所有的列名，因此不确定该列出哪些列名或需要多少个值。*速查定义* 允许您在完成 `INSERT`
    语句的同时查看表定义。


    要使用 *速查定义*，请在 `T-SQL 查询编辑器` 中高亮显示表名，右键单击并选择 *速查定义*。图 5-24 显示了使用 *速查定义* 来完成 `INSERT`
    语句的界面。


    **图 5-24.** 在 `SQL Operations Studio` 的 `T-SQL` 编辑器中使用 *速查定义*


    ### 其他功能


    `SQL Operations Studio` 为数据专业人员提供了其他功能。这包括类似于 `Visual Studio Code` 的 `集成终端`、`源代码控制`
    功能，以及用于记录 `备份` 和 `还原` 等操作历史的 `任务历史`。


    像任何有用的工具一样，`SQL Operations Studio` 几乎为每次交互都提供了键盘快捷键，并允许您自定义键盘快捷键。要了解有关 `SQL Operations
    Studio` 键盘快捷键的更多信息，请参阅文档：[`docs.microsoft.com/sql/sql-operations-studio/keyboard-shortcuts`](https://docs.microsoft.com/sql/sql-operations-studio/keyboard-shortcuts)。

