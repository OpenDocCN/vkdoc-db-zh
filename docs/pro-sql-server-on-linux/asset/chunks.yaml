    提供了使用 `on` 关键字显式将表和索引放置在特定用户 `fILeGroUp` 上的语法。请参阅我们文档中关于文件组的此部分以获取示例和更多信息：[`docs.microsoft.com/sql/relational-databases/databases/database-files-and-filegroups#filegroups`](https://docs.microsoft.com/sql/relational-databases/databases/database-files-and-filegroups#filegroups)。


    让我们添加一个表并填充数据，以查看 SQL Server 如何将数据库页分布在 `USERDATA` 文件组中的文件上。从示例 `bigtab.sql` 执行以下
    T-SQL 批处理：


