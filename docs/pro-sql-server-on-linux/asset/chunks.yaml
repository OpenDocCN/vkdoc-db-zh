    ```sql

    DECLARE @current_ms_ticks INT


    SELECT @current_ms_ticks=ms_ticks FROM sys.dm_os_sys_info


    SELECT DATEADD(ms, (orb.timestamp-@current_ms_ticks), GETDATE()) as

    [record_timestamp],

    CAST(orb.record AS XML).value(''(//Exception//Error)[1]'', ''varchar(10)'') as

    [errorno],

    CAST(orb.record AS XML).value(''(//Exception/Severity)[1]'', ''varchar(10)'')

    as [severity],

    CAST(orb.record AS XML).value(''(//Exception/State)[1]'', ''varchar(10)'') as

    [state],

    msg.description

    FROM sys.dm_os_ring_buffers orb

    INNER JOIN sys.sysmessages msg

    ON msg.error = cast(record as xml).value(''(//Exception//Error)[1]'',

    ''varchar(255)'')

    AND msg.msglangid = 1033 -- 此为美式英语。请根据需要更改为你的语言

    WHERE orb.ring_buffer_type = ''RING_BUFFER_EXCEPTION''

    ORDER BY record_timestamp

    GO

    ```


    ## DBFS 工具


    许多 Linux 用户更习惯使用 Shell 而非图形界面，并且也熟悉浏览 proc 目录（虚拟）文件系统（你可以在[`en.wikipedia.org/wiki/Procfs`](https://en.wikipedia.org/wiki/Procfs)阅读更多关于`procfs`的信息）。作为
    Helsinki 项目的一部分，我们构建了一个开源工具，其功能类似于针对 SQL Server 目录视图和 DMV 数据的`procfs`，称为`dbfs`。


    ![index-217_1.png](img/index-217_1.png)


    ### 第五章 SQL Server 工具


    `DBFS`将查询 Linux 上的 SQL Server 以获取 DMV 数据，并将信息输出到带有文件的目录结构中。每个文件将代表特定目录视图或 DMV
    的一个快照。该工具会为每个目录视图和 DMV 生成文本和 JSON 文件。默认情况下，`dbfs`在后台运行，监控对由目录视图和 DMV 表示的文件的访问。当用户尝试访问文件内容时，`dbfs`会查询
    SQL Server 以获取数据来填充文件。此技术类似于`procfs`在 Linux 操作系统中的工作原理。


    要安装`dbfs`，请阅读 GitHub 项目站点[`github.com/Microsoft/dbfs`](https://github.com/Microsoft/dbfs)上的说明。我在我的
    RHEL 虚拟机上安装了它，然后遵循 GitHub 站点上的快速入门说明来创建目录和配置文件。


    文本文件的格式设计使得可以轻松地使用`awk`、`grep`和`join`等 Linux 工具来查询目录视图和 DMV 数据。以下是一个使用`awk`的示例命令：


    ```bash

    awk ''{print $1, $2, $3, $4, $5}'' dm_os_sys_info | column -t

    ```


    图 5-34 展示了一个使用`awk`从`dm_os_sys_info`的`dbfs`文件中提取列的示例。


    **图 5-34** 将 `awk` 与 `DBFS` 结合使用


    ## 扩展事件


    在 SQL Server 2008 之前，用于跟踪事件和 SQL Server 引擎代码执行的主要工具是 SQL Server Trace 以及相应的工具
    SQL Profiler。虽然 SQL Server Trace 和 SQL Server Profiler 至今仍然存在，但此功能和技术工具已被标记为**已弃用**（这意味着它们可能在未来的任何新版本中被移除）。这也意味着我们不再对此功能和工具进行任何增强。


    **注意：** 跨版本弃用功能是我们对于不计划增强的功能所采取的措施。在最近的版本中，即使我们将功能标记为已弃用，我们也极少移除它们。请在[`docs.microsoft.com/sql/database-engine/deprecated-database-engine-features-in-sql-server-2017`](https://docs.microsoft.com/sql/database-engine/deprecated-database-engine-features-in-sql-server-2017)阅读更多关于此主题的内容。


    ### 第五章 SQL Server 工具


    在 SQL Server 2008 中，我们启动了一个名为`XEvent`的项目。在 SQL Server 2005 发布后，我发现自己再次与 Slava
    Oks 进行了一场关于可支持性和诊断的对话。尽管 SQL Server Trace 和 Profiler 很受欢迎，但他知道“服务器端跟踪”的架构存在局限性，尤其是在可扩展性方面。

    '
- fmt: '# SQL Server 扩展事件 (Extended Events)


    Slava 及构建 SQLOS 的团队从头开始设计了 XEvent，并在 SQL Server 2008 中将此功能命名为 **Extended Events**。Extended
    Events 既是 SQL Server 引擎开发人员使用的跟踪库，也是供用户使用的跟踪功能。SQL Server 引擎的开发人员可以使用 XEvent 库在他们的代码中定义检测点，即
    *events*。SQL Server 的用户随后可以定义启用这些事件并消费其相关信息的方法。


    SQL Server 2008 发布时包含了一组基础事件，但并非 SQL Server 跟踪的所有检测点都已可用。在 SQL Server 2012 中，我们努力确保扩展事件包含了来自
    SQL Server 跟踪的所有事件以及更多内容。截至 SQL Server 2017，已有超过 1500 个事件可供用户使用，以深入了解查询执行、连接、各种功能或
    SQL Server 引擎内部运作。


    虽然动态管理视图 (DMVs) 提供了关于 SQL Server 引擎许多方面的洞察，但大多数 DMVs 提供的是您查询时数据的 *快照*。扩展事件允许您跟踪细节（包括在
    DMVs 中找不到的信息）并随时间收集事件数据。


    您可以在以下位置找到关于扩展事件的所有文档：[https://docs.microsoft.com/sql/relational-databases/extended-events/extended-events](https://docs.microsoft.com/sql/relational-databases/extended-events/extended-events)。


    ## 扩展事件对象 (Extended Event Objects)


    扩展事件的基本对象是 **events**（事件）、**targets**（目标）和 **actions**（操作）。让我更详细地描述每一个：


    **Event（事件）**：事件是 SQL Server 引擎中的检测点，由 Microsoft 开发人员定义。可以将事件视为代码中跟踪执行的重要位置。事件及其描述的文档可以通过查询名为
    `sys.dm_xe_objects`（对象类型 = ''event''）的 DMV 找到。


    事件具有属性或列。这些可以通过查询 `sys.dm_xe_object_columns` 找到。以下示例查询（见于示例脚本 `xe_events.sql`）显示了所有事件及其列，按事件名称排序：


    ```sql

    -- List the XEvent events, description, and columns for each event and

    description

    --

    SELECT xeo.name, xeo.description, xeoc.name, xeoc.description

    FROM sys.dm_xe_objects xeo

    INNER JOIN sys.dm_xe_object_columns xeoc

    ON xeo.name = xeoc.object_name

    WHERE xeo.object_type = ''event''

    AND (xeo.capabilities IS NULL OR xeo.capabilities & 1 = 0) -- Filter out

    private events

    ORDER BY xeo.name, xeoc.name

    GO

    ```


    注意在上面的查询中，我使用了 DMV 中一个名为 `capabilities` 的列。某些 XEvent 事件、操作和目标被认为是 *private*（私有的）。私有的
    XEvent 对象不能在用户会话中使用，因为它们支持 SQL Server 的某个功能，例如 SQL Server 审核。


    **Target（目标）**：目标是一个可以发布和存储事件以供消费的去处。两种基本的目标类型是 `event_file`（将事件保存到文件）和 `ring_buffer`（将事件保存到服务器重启后不会持久的内存缓冲区）。还有其他目标具有内置的“智能”，例如直方图目标。完整的目标列表可以在我们的文档中找到：[https://docs.microsoft.com/sql/relational-databases/extended-events/targets-for-extended-events-in-sql-server](https://docs.microsoft.com/sql/relational-databases/extended-events/targets-for-extended-events-in-sql-server)。


    **Action（操作）**：当一个事件被触发并发布到目标时，该事件中的所有列都是可用的（有些列需要设置才能发布其数据，因为收集该列可能会消耗额外资源）。操作是...'
  raw: 'Slava and the team that built SQLOS designed XEvent from the ground up and
    named


    the feature in SQL Server 2008, **Extended Events**. Extended Events is both a
    tracing


    library for developers of the SQL Server engine and a user feature for tracing.
    Developers


    of the SQL Server Engine can use the XEvent library to define instrumentation
    points,


    *events*, in their code. Users of SQL Server can then define ways to enable these
    events


    and consume information about them.


    SQL Server 2008 was released with a base level of events, but not all the


    instrumentation points of SQL Server trace were available. In SQL Server 2012,
    we tried


    to ensure Extended Events included all the events from SQL Server trace and more.
    As


    of SQL Server 2017, there are 1,500+ events for users to consume to gain insight
    into


    the execution of queries, connections, various features, or internals of the SQL
    Server


    engine.


    While DMVs provide insight into many aspects of the SQL Server engine, most of
    the


    DMVs provide a  *snapshot* of data when you query them. Extended events allow
    you to trace


    details (including more than you can find in DMVs) and collect event data over
    time.


    You can find all the documentation about Extended Events at [https://docs.](https://docs.microsoft.com/sql/relational-databases/extended-events/extended-events)


    [microsoft.com/sql/relational-databases/extended-events/extended-events.](https://docs.microsoft.com/sql/relational-databases/extended-events/extended-events)


    ** Extended Event Objects**


    The fundamental objects for Extended Events are **events**, **targets**, and **actions**.
    Let me


    describe each of these in more detail:


    **Event**: Events are the instrumentation points in the SQL


    Server engine, as defined by developers of Microsoft. Think of


    events as important places in the code to trace execution. The


    documentation of events and their descriptions can be found by


    querying a DMV called **sys.dm_xe_objects** (object type = ‘event’).


    Events have properties or columns. These are found by querying


    **sys.dm_xe_object_columns**. The following example query as


    found in the sample script **xe_events.sql** shows all the events and


    their columns sorted by event name:


    ChapTer 5   SQL Server TooLS


    -- List the XEvent events, description, and columns for each event and


    description


    --


    SELECT xeo.name, xeo.description, xeoc.name, xeoc.description


    FROM sys.dm_xe_objects xeo


    INNER JOIN sys.dm_xe_object_columns xeoc


    ON xeo.name = xeoc.object_name


    WHERE xeo.object_type = ''event''


    AND (xeo.capabilities IS NULL OR xeo.capabilities & 1 = 0) -- Filter out


    private events


    ORDER BY xeo.name, xeoc.name


    GO


    Notice in the preceding query I use a column from the DMV called capabilities.


    Some XEvent events, actions, and targets are considered  *private*. Private XEvent
    objects


    cannot be used in user sessions because they support a feature of SQL Server,
    like SQL


    Server Auditing.


    **Target**: A target is a destination where events can be published


    and stored for consumption. Two fundamental target types


    are **event_file** (saving events to a file) and **ring_buffer** (saving


    events to a memory buffer that is not persisted after a server


    restart). There are other targets that have built-in “intelligence”


    such as a histogram target. A complete list of targets can be


    found in our documentation at [https://docs.microsoft.com/](https://docs.microsoft.com/sql/relational-databases/extended-events/targets-for-extended-events-in-sql-server)


    [sql/relational-databases/extended-events/targets-for-](https://docs.microsoft.com/sql/relational-databases/extended-events/targets-for-extended-events-in-sql-server)


    [extended-events-in-sql-server](https://docs.microsoft.com/sql/relational-databases/extended-events/targets-for-extended-events-in-sql-server).


    **Action**: When an event is fired and published to a target, all the


    columns in the event are available (there are some columns that


    require a setting to have their data published because collecting


    the column could consume additional resources). Actions are'
