    和 Extended Events 等工具与客户一起进行性能故障排除。


    Conor 提出了一个名为*查询磁盘存储*的新想法。他的想法是在 SQL Server 引擎中内置将查询的性能信息（包括随时间的变化）直接存储到数据库中的能力。这个想法催生了
    SQL Server 2016 中的一个新功能，称为**查询存储**。


    查询存储是一个数据库选项，启用后，它会打开 SQL Server 引擎中的代码，以在每次编译新查询时存储信息，包括估计的查询计划。此外，当查询执行时，会为查询累积聚合性能信息。所有这些数据都存储在启用查询存储的数据库中的一系列表中。您可以通过查询构建在内存或系统表中存储的任何数据之上的一系列目录视图来查看查询存储数据。


    由于性能数据存储在用户数据库中，因此在备份和还原数据库后，这些数据仍然可用。


    > **提示** 使用 T-SQL 命令 `DBCC CLONEDATABASE` 来创建不含用户数据的数据库架构副本。此命令捕获所有系统表数据，因此包含查询存储。这允许您在无需备份整个用户数据库的情况下离线评估查询存储数据。有关
    `DBCC CLONEDATABASE` 的更多详细信息，请参阅 [`support.microsoft.com/help/3177838/how-to-use-dbcc-clonedatabase-to-generate-a-schema-and-statistics-only`](https://support.microsoft.com/help/3177838/how-to-use-dbcc-clonedatabase-to-generate-a-schema-and-statistics-only)。


