  trans: '

    # 第 6 章 性能特性


    数据库引擎优化顾问工具：在 SQL Server 领域，这个工具似乎被遗忘了，但它能够基于单个查询或基于 SQL Server 查询跟踪、查询存储的数据或当前在计划缓存中找到的查询的
    `workload`，来推荐索引。该工具目前对 Linux 用户唯一的缺点是，它只能在运行 Windows 的计算机上运行。你可以在 [`docs.microsoft.com/sql/relational-databases/performance/start-and-use-the-database-engine-tuning-advisor`](https://docs.microsoft.com/sql/relational-databases/performance/start-and-use-the-database-engine-tuning-advisor)
    阅读更多关于数据库引擎优化顾问工具的信息。


    让我向你展示一个示例，说明如何在执行查询后，在 XML SHOWPLAN 中识别缺失的索引。此查询使用完整 WideWorldImporters 示例中的
    `[Sales].[Orders]` 表。在 SQL Operations Studio 中执行以下 T-SQL 语句（此查询可在示例脚本 `orders_missing_index.sql`
    中找到）：


    ```sql

    USE [WideWorldImporters]

    GO

    SELECT CustomerID, COUNT(*)

    FROM [Sales].[Orders]

    WHERE [OrderDate] = ''2013-01-01''

    GROUP BY CustomerID

    GO

    ```


    ![](img/index-298_1.jpg)


    我执行此查询的目标是获取在给定订单日期上按客户统计的订单数量。问题在于 `OrderDate` 列上没有索引，无法为给定的日期值查找特定的订单集。因此，SQL
    Server 必须扫描整个聚集索引来筛选出特定日期的行。此外，SQL Server 还必须执行排序操作以满足 `GROUP BY` 聚合的需求。


    **图 6-13** 展示了 `SET STATISTICS IO` 的结果，因为 SQL Server 必须扫描整个聚集索引。


    **图 6-13.** 扫描 Orders 表聚集索引的 IO 统计信息


    如果你点击 XML Showplan 的结果，你会看到一个关于缺失索引的部分。**图 6-14** 展示了此计划中的缺失索引部分。


    ![](img/index-299_1.jpg)


    **图 6-14.** SQL Server XML SHOWPLAN 的缺失索引部分


    SQL Server 中的查询优化器在编译计划时，可以检测到可能有助于提高查询性能的索引（查询优化器也负责向缺失索引 DMV 中添加行）。在这种情况下，建议是在
    `OrderDate` 列上创建索引，并包含 `Customer ID` 列。


    因此，你现在可以执行此 T-SQL 语句来创建非聚集索引（也可在示例 `ncl_orders_date.sql` 中找到）：


    ```sql

    USE [WideWorldImporters]

    GO

    DROP INDEX IF EXISTS Sales.Orders.NCL_Orders_Date

    GO

    CREATE NONCLUSTERED INDEX NCL_Orders_Date ON Sales.Orders (OrderDate)

    INCLUDE (CustomerID)

    GO

    ```


    如果我现在再次运行来自 `orders_missing_index.sql` 的查询，**图 6-15** 显示了 IO 统计信息的改进，物理读取更少。


    ![](img/index-300_1.jpg)


    ![](img/index-300_2.jpg)


    **图 6-15.** 添加索引后改进的 IO 统计信息


    **图 6-16** 显示了如果你在 `RESULTS` 旁边选择 `QUERY PLAN` 选项，将看到的新查询计划。


    **图 6-16.** 添加索引后查询计划中使用的索引 Seek


    在这种情况下，`索引 Seek` 在查找仅包含所请求的确切 `OrderDate` 的行方面，远比扫描整个聚集索引高效。


    ## 索引类型和其他注意事项


    还有一些其他索引类型对性能有帮助，以及在创建索引时关于参数的考虑：


    -   **筛选索引** 允许你使用 `WHERE` 子句创建非聚集索引，以便仅用特定数据集构建索引。

    '
- fmt: 'can be extremely helpful to reduce the size of an index and fits well for
    sets of queries with specific criteria that don’t change. You can read more about
    this feature at [https://docs.microsoft.com/sql/relational-databases/indexes/create-filtered-indexes](https://docs.microsoft.com/sql/relational-databases/indexes/create-filtered-indexes).


    • `Indexed Views` are indexes on an SQL Server view but are unique because a clustered
    index on a view will be stored just like a table. Think of this like a `stored
    result set` based on a T-SQL view. You can read more about indexed views at [https://docs.microsoft.com/sql/relational-databases/views/create-indexed-views](https://docs.microsoft.com/sql/relational-databases/views/create-indexed-views).


    • SQL Server uses a concept called `fill factor` to decide how full to build rows
    on pages when creating an index. While the default `fill factor` may be fine for
    many workloads, it is possible that you may want to adjust the default or change
    the `fill factor` for a specific index to avoid a lot of `page splits`. You can
    read more about choosing a `fill factor` for an index for SQL Server and why `page
    splits` may cause performance problems at [https://docs.microsoft.com/sql/relational-databases/indexes/specify-fill-factor-for-an-index](https://docs.microsoft.com/sql/relational-databases/indexes/specify-fill-factor-for-an-index).


    ## Statistics


    The query processor in SQL Server is all about `statistics`. What I mean by that
    is the query processor often makes decisions on compiling a query plan based on
    available `statistics` about values of rows (uniqueness of rows) in a table, column(s),
    and indexes.


    ChapTer 6   performanCe CapabILITIeS


    ## Statistics on Indexes and Columns


    Any time an index is created or rebuilt, SQL Server builds a set of `statistics`
    on the key columns of the index. A `histogram` is built on the leading column
    of an index. There are other `statistics` called `density` that are calculated
    based on the combination of all columns in the index. The decisions of the query
    processor to build an optimal query plan are only as good as available `statistics`.


    By default, `statistics` are calculated through `sampling`, which means SQL Server
    will not examine every row in an index to build `statistics` but rather build
    `statistics` based on `sampling` of data. And for most workloads, this default
    sample algorithm works fine. But there are situation where I’ve seen better query
    plans built when using an option called `FULLSCAN` (which means to completely
    scan all rows in the index or table when building `statistics`).


    It is also possible to create `statistics` on one or more columns without an index.
    In fact, SQL Server will automatically create `statistics` on single columns for
    certain types of queries (assuming a database option is enabled which I’ll discuss
    later in this section of the chapter). There are some interesting scenarios where
    manually creating `statistics` can benefit query plan selection without incurring
    the overhead of an index. The complete guide to `statistics` including details
