- fmt: '# Chapter 7 Security in SQL Server


    Permissions for default users are to view most system catalog views in the database
    but that is just about it.


    Let’s go through an example using the `WideWorldImporters` database (I recommend
    you restore the `WideWorldImporters` full database “from scratch” per instructions
    I’ve provided in previous chapters first).


    ## 1. Add the login `sqllinux` as database owner


    Let’s add the login `sqllinux`, and this time make it the owner of the database
    using the `ALTER AUTHORIZATION` T-SQL command.


    Use the example script `createdbownerlogin.sql` connected as `sa`, like the following
    T-SQL statements:


    ```sql

    USE master

    GO

    IF EXISTS (select * from sys.server_principals where name = ''sqllinux'')

    DROP LOGIN [sqllinux]

    GO

    CREATE LOGIN [sqllinux] WITH PASSWORD=N''Sql2017isfast'', DEFAULT_DATABASE=[master]

    GO

    ALTER AUTHORIZATION ON DATABASE::WideWorldImporters to sqllinux

    GO

    ```


    ## 2. Create the `appuser` server login


    Create the other server login for the `appuser` login using `createappuserlogin.sql`
    connected as `sa`, like the following T-SQL statements:


    ```sql

    USE [MASTER]

    GO

    USE master

    GO

    IF EXISTS (select * from sys.server_principals where name = ''appuser'')

    DROP LOGIN [appuser]

    GO

    CREATE LOGIN [appuser] WITH PASSWORD=N''Sql2017isfast'', DEFAULT_DATABASE=[WideWorldImporters]

    GO

    ```


    ## 3. Create the `appuser` database user


    Create the `appuser` user, which will be bound to the `appuser` server login,
    using `createappuser.sql` connected as the `sqllinux` login, like the following
    T-SQL statements:


    ```sql

    USE [WideWorldImporters]

    GO

    DROP USER IF EXISTS appuser

    GO

    CREATE USER appuser FOR LOGIN appuser

    GO

    ```


    ## 4. Create the database role and assign privileges


    Create the db role, add the `appuser` database user to it, and assign it `CONTROL`
    privileges to the Application Schema using `createdbrole.sql` connected as the
    `sqllinux` login, like the following T-SQL statements:


    ```sql

    USE [WideWorldImporters]

    GO

    IF (SELECT IS_ROLEMEMBER(''Application_Users'', ''appuser'')) IS NOT NULL

    ALTER ROLE Application_Users DROP MEMBER appuser

    GO

    DROP ROLE IF EXISTS Application_Users

    GO

    CREATE ROLE Application_Users

    GO

    ALTER ROLE Application_Users ADD MEMBER appuser

    GO

    GRANT CONTROL ON SCHEMA::Application TO Application_Users

    GO

    ```


    Notice how I used the `GRANT` T-SQL statement here with the option `CONTROL`.
    `GRANT` allows you to grant permissions to objects including schemas. In this
    case, `GRANT CONTROL` gives ownership of the `Application` schema in the `WideWorldImporters`
    database to any member of the `Application_Users` role. You can read more about
    `GRANT CONTROL` in the documentation at [https://docs.microsoft.com/sql/t-sql/statements/grant-database-principal-permissions-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/grant-database-principal-permissions-transact-sql).


    ## 5. Test the permissions


    To see how these permissions work, execute the queries in `appuserquery.sql` connected
    as the `appuser` login, like the following T-SQL statements:


    ```sql

    use [WideWorldImporters]

    go

    SELECT * from [Application].People

    GO

    SELECT * from [Sales].[Customers]

    GO

    ```


    ![图 7-6](index-356_1.jpg)


    **Figure 7-6. Schemas and objects the `appuser` login has access to**


    You can see that the `appuser` has access to a table in the `Application` Schema
    but gets an error when trying to access a table in a schema it is not granted
    to.


    Besides the basic permissions for a schema and/or user to an object like a table,
    you can also assign permissions to a specific set of columns in a table and/or
    view. See the syntax for the `GRANT` T-SQL statement in the documentation for
    more information: [https://docs.microsoft.com/sql/t-sql/statements/grant-transact-sql](https://docs.microsoft.com/sql/t-sql/statements/grant-transact-sql).


    ### Application Roles


    One interesting security feature that may appeal to developers is application
    roles. Application roles allow applications to use a password only known to the
    application and set permissions specific to the application independent of the
    login used to connect from the application.'
