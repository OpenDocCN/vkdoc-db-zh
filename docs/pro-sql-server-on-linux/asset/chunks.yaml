- fmt: '# Chapter 2: Installation and Configuration


    I recommend you install these on any SQL Server Linux installation to provide
    basic query and data load capabilities on the Linux Server:

    `sqlcmd` and `bcp`.


    ## `mssql-server-fts`

    Full-text Search capabilities.

    Only install this if you want to use SQL Server full-text Search features. This
    book will not cover full-text Search. For more information, see the Microsoft
    documentation at [https://docs.microsoft.com/sql/relational-databases/search/full-text-search](https://docs.microsoft.com/sql/relational-databases/search/full-text-search).


    ## `mssql-server-is`

    Integration Services (also known as SSIS).

    This is a separate Linux process used for ETL operations. Install this for more
    complex data extract and load capabilities. This book will cover the basics of
    SSIS capabilities in [Chapter 5](#index_split_003.html#p166).


    ## `mssql-server-ha`

    SQL Server resource agent.

    You are required to install this to use high availability features with Pacemaker.


    **Note:** Prior to SQL Server 2017 CU4, SQL Server agent was a separate package
    called `mssql-server-agent`. We made a decision that starting with SQL Server
    2017 CU4, SQL Server agent would be installed with the `mssql-server` package
    and enabled through `mssql-conf`. See [https://docs.microsoft.com/sql/linux/sql-server-linux-setup-sql-agent](https://docs.microsoft.com/sql/linux/sql-server-linux-setup-sql-agent)
    for more information. We will cover the basics of using SQL Server agent in [Chapter
    9](#index_split_006.html#p457).


    The release notes contain the location for the above packages (except for `mssql-tools`)
    if you need to perform an offline installation of these: [https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes).


    The `mssql-tools` packages for offline installation can be found at: [https://docs.microsoft.com/sql/linux/sql-server-linux-setup-tools#offline-installation](https://docs.microsoft.com/sql/linux/sql-server-linux-setup-tools#offline-installation).


    ## Installing in Azure

    Azure Virtual Machine is a cloud Infrastructure as a Service (IaaS) platform for
    hosting Virtual Machines to run all types of applications and workloads. SQL Server
    is well embraced and a very popular workload in this environment.


    **Note:** SQL Server on Linux can be run in other environments such as VMWare,
    VirtualBox, and other Cloud providers. For more information, see this documentation
    page: [https://docs.microsoft.com/sql/linux/quickstart-install-connect-clouds](https://docs.microsoft.com/sql/linux/quickstart-install-connect-clouds).


    You have two fundamental choices to install SQL Server on Linux in Azure Virtual
    Machine:

    - Choose your favorite Linux Distribution (RHEL, SLES, or Ubuntu) from the Azure
    Marketplace. Then perform an installation of SQL Server like the instructions
    I have provided in this chapter.

    - Choose a preconfigured SQL Server on Linux option from the Azure Marketplace.
    As part of the provisioning of the virtual machine, SQL Server will be installed
    and configured automatically.


    **Note:** When you use a preconfigured SQL Server Linux VM, you will have to complete
    the installation once you first connect to the Linux VM with `sudo /opt/mssql/bin/mssql-conf
    set-sa-password` to establish the `sa` password.


    You also have two methods to provision one of these choices with Azure Virtual
    Machine:

    - Use the Azure Portal through a user interface (`http://portal.azure.com`).'
