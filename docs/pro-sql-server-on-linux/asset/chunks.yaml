    ## System Database Backup


    System databases, except for `tempdb`, can be backed up like any other user database.
    The question is should you backup system databases? The answer is yes, but I recommend
    you really only need a full database backup of system databases and you may not
    need to do them often. For example, unless you change the `model` database, just
    back it up after installation and you may never need to back it up again.


    I will discuss in the next section a method to rebuild system databases as they
    were after installation, but it is far simpler to restore a system database backup,
    and it provides a method to restore any changes made within them. You can read
    more about backup and restore of system databases in our documentation at [https://docs.microsoft.com/sql/relational-databases/backup-restore/back-up-and-restore-of-system-databases-sql-server](https://docs.microsoft.com/sql/relational-databases/backup-restore/back-up-and-restore-of-system-databases-sql-server).


    ![](index-401_1.jpg)


    ## Chapter 8: High Availability and Disaster Recovery for SQL Server


    ### Database Restore and Recovery


    SQL Server provides several options to restore database backups, sequence of database
    differential, and log backups, and other methods to restore portions of a database
    such as piecemeal and page restore. In this section, I’ll review all of these
    options plus information about restoring and recover of system databases. Part
    of restore is running recovery of the database, and since I’ve not addressed that
    topic in the book, this is a good time to review how database recovery works and
    how it affects both restore and database startup. As a reference point, a great
    overview of all the restore options is in our documentation at [https://docs.microsoft.com/sql/relational-databases/backup-restore/restore-and-recovery-overview-sql-server](https://docs.microsoft.com/sql/relational-databases/backup-restore/restore-and-recovery-overview-sql-server).


    ### Database Recovery


    In order to ensure transactions are consistent between what is recorded in the
    transaction log and database pages on disk, SQL Server will run recovery against
    a database in certain situations. I discussed before in the book the concept of
    Write Ahead Logging (`WAL`). Because of this method of durability, at any point
    in time there could be transactions that are in the transaction log that are not
    reflected on database pages on disk. Furthermore, there could be transactions
    in the transaction log that are not committed but are reflected on database pages
    on disk (because of, e.g., a `Lazy Write`).


    When SQL Server has to restore a backup or bring a database online, it will examine
    the transaction log to see whether it should reconcile these possible inconsistencies
    between the log and database pages. The transaction log is the source of truth
    in this process. This process of recovery is done in the following phases, as
    described in Figure 8-3.


    **Figure 8-3. Phases of database recovery**


    #### Analysis


    SQL Server will find which pages may have been dirty since the last checkpoint
    and the state of uncommitted transactions. SQL Server uses this analysis to properly
    execute the other phases of recovery, redo and undo.'
