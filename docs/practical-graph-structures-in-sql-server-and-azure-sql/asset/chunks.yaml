- fmt: '# Graphs In Computing/Directed Graphs


    Now that I have introduced a subset of the terminology and shapes of graphs, it
    is time move towards the mechanics of graphs you will be building and using with
    SQL Server’s SQL Graph feature (or really any mainstream graph product). All the
    aforementioned concepts still hold, but there is one major difference. Edges in
    computing terms are generally one way only. An edge that points in one direction
    only is referred to as a `directed edge` and the whole graph as a `directed graph`.
    I will not redefine all the previously introduced concepts in terms of directed
    graphs, as the goal of covering the topics was to get you thinking about graph
    structures and how they fit together. I will discuss how they are applicable as
    it makes sense.


    Relationships in a directed graph are in the form shown in Figure [1-11](#508094_1_En_1_Chapter.xhtml#Fig11).


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig11_HTML.jpg)


    A representation of nodes `N1` and `N2` connected with a forward link `E1`.


    **Figure 1-11** `Directed edge`


    Whereas in previous graph examples an edge between `N1` and `N2` represented that
    `N1` was connected to `N2` and `N2` connected to `N1`, now edge `E1` represents
    only that `N1` is connected to `N2`, not the reciprocal. All the concepts covered
    previously hold, with the obvious complication that one must consider the direction
    of the edge when determining if two graphs are equal or isometric and what walks
    may be present. For example, consider the graphs in Figure [1-12](#508094_1_En_1_Chapter.xhtml#Fig12).


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig12_HTML.jpg)


    4 diagrammatic illustrations of 2 connected nodes. A. `N1` and `N2` with a forward
    link `E1`. B. `N1` and `N2` with a backward link `E1`. C. `R1` and `R2` with a
    forward link `E5`. D. `R1` and `R2` with a forward link `E5`.


    **Figure 1-12** Graph examples to demonstrate equality and isomorphism with a
    directed graph


    1-12A and 1-12B are not equal, but 1-12B is isometric because the edge is in a
    different direction, but the basic structure is two nodes connected by a directed
    edge.


    1-12A and 1-12D are also not equal because the nodes are different, but they are
    isometric because structurally they are the same. 1-12C and 1-12D are exactly
    alike so they are equal.


    When specifying a directed graph, you still can use the same set notation, except
    that you need to denote an ordering to the nodes. So, Figure [1-12A](#508094_1_En_1_Chapter.xhtml#Fig12)
    could be expressed as


    ```

    Nodes: {N1,N2}; Directed Edges: {E1:{N1,N2}}

    ```


    You can simulate the bidirectional qualities of a non-directed graph by always
    having two edges between each node:


    ```

    Nodes: {N1,N2}; Directed Edges: {E1:{N1,N2}, E2:{N2,N1}}

    ```


    ## Cyclic and Acyclic Graphs


    With directed graphs comes a very important concept that will play a major part
    in of all our uses of graphs in practice: `cycles`. A graph cycle refers to a
    directional graph having a walk from a given node that can pass through the same
    node twice. It is similar to the concept of a Euler Walk, but in this case you
    can only traverse the graph based on the direction of the edges.


    For examples, the simplest cyclical graph is a single node with a relationship
    to the same node, and the next simplest is two nodes and two edges going from
    and to each edge, as in Figure [1-13](#508094_1_En_1_Chapter.xhtml#Fig13).


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig13_HTML.png)


    2 diagrammatic representation. A. Node `N1` is self-arrowed. B. Nodes `N1` and
    `N2` are connected with bent links `E1` and `E2` in cyclic form.


    **Figure 1-13** Cyclic graph examples


    This concept of cyclical graphs is important for a couple of reasons. First, let’s
    consider the programming concerns. Some algorithms will work great on acyclic
    graphs but will not work on cyclic graphs. The biggest issue is in processing.
    Consider the two graphs in Figure [1-14](#508094_1_En_1_Chapter.xhtml#Fig14).


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig14_HTML.jpg)


    Two structures. A, Nodes `N1` to `N4` are linked with arrows in a Z shape. B,
    nodes `N1` to `N4` are linked in a Z shape, and also with an additional link from
    `N3` to `N1`.


    **Figure 1-14** Graph examples to demonstrate processing acyclic and cyclic directed
    graph


    In Figure [1-14A](#508094_1_En_1_Chapter.xhtml#Fig14), an acyclic graph, you can
    walk the graph from `N1->N2->N3->N4` directly using a simple algorithm of going
    node to node, touching all the nodes with no problem. But in Figure [1-14B](#508094_1_En_1_Chapter.xhtml#Fig14),
    the algorithm of going from node to node is made difficult by `N1->N2->N3->N1`,
    because what to do next? Cycle through the nodes again? Or stop processing? All
    the results from starting at `N1` would be repeated, but what does this mean for
    the graph that you are modeling? You can remember this mentally when manually
    tracing through, but the programming gets more complex if you look at millions
    or billions of nodes (the programming is not impossible, just more complicated).


    This ability to be able to find a simple connection/walk from two nodes in a graph
    is referred to as `transitive closure`. Once you have hold of this power, you
    can do all forms of interesting things with graphs, such as determining if you
    are connected to Kevin Bacon and what is the shortest path through the people
    you are connected to that you will need to bug to get tickets to see The Bacon
    Brothers in concert when they come to your town.


    In a more database design-oriented concern, consider what can be modeled with
    an acyclic graph versus a cyclic one. More will be covered in Chapter [2](#508094_1_En_2_Chapter.xhtml),
    but if you are modeling containership, like a bill of materials (a data structure
    used in packaging/assembling items, where products that are a part of other products
    are modeled using a graph), a cycle in the graph could give you odd results. Consider
    the graph in Figure [1-15](#508094_1_En_1_Chapter.xhtml#Fig15).


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig15_HTML.png)


    A representation of a tire and wheel assembly linked with tire, and wheel assembly.
    Wheel assembly links to lug nut pack and back to tire and wheel assembly.


    **Figure 1-15** Illogically modelled bill of materials


    If the tire and wheel assembly contains a wheel assembly, and it in turn contains
    lug nuts, and then the lug nuts contain a tire and wheel assembly… you can see
    the inherent problem here. If you are modeling something like a social network,
    cycles not only make sense, but you can find important information from them (starting
    with a simple reciprocal relationship showing that two people are connected.)
    In Chapter [2](#508094_1_En_2_Chapter.xhtml), I will be discussing some of the
    different constructs you can model using graph structures.


    Acyclic graphs such as this are generally referred to as a class of data structures
    known as a hierarchy. In the case of the bill of materials structure, it is known
    as a `polyhierarchy`. A node in a polyhierarchy may be the “to” partner in more
    than one edge, but the graph must be acyclic. In this manner, one can think of
    the lug nut pack as a separate item or as a part of the wheel (and in the real
    world, the lug nut would be its own individual part!) but a lug nut pack cannot
    have the wheel or wheel assembly as part of its part list for obvious reasons.


    ## Summary


    In this chapter, the goal was to introduce some of the core concepts that are
    used when discussing graph topics. Many of these topics may show up all over the
    book, but also some may not. The goal of this chapter was to briefly introduce
    concepts that will help you to envision what a graph is and how a graph might
    be used as you start to solve complex problems with graphs.'
