- fmt: "#### Aggregation Along the Path\n\nNow you have the basic concept down. (Trust\
    \ me; it may take you a few times and a lot of tries to really get it to gel!)\
    \ So let’s look at some of the other functionality you can add to the output.\
    \ You can do aggregates such as `COUNT`. `COUNT` is the standard way to get the\
    \ number of hops between nodes. For example:\n\n```sql\nSELECT Person.Name AS\
    \ Person,\nLAST_VALUE(FollowedPerson.Name) WITHIN GROUP\n(GRAPH PATH) as ConnectedPerson,\n\
    COUNT(FollowedPerson.PersonId) WITHIN GROUP\n(GRAPH PATH) as Level\nFROM   ...\
    \ \n```\n\nWhen this is the `SELECT` clause, the `COUNT` aggregate counts each\
    \ time there is a hop between a node. In the output, you can see that `Val` and\
    \ `Saa` are directly connected to `Lou`, so one hop. `Fred`, `Joe`, and `Lee`\
    \ are two. And it is three hops to get back to `Lou`.\n\n```\nPerson        ConnectedPerson\
    \   Level\n------------- ----------------- -----------\nLou Iss       Val Erry\
    \          1\nLou Iss       Saa Lee           1\nLou Iss       Fred Rick     \
    \    2\nLou Iss       Lee Roy           2\nLou Iss       Joe Seph          2\n\
    Lou Iss       Lou Iss           3\n```\n\nThe next thing to add is the path that\
    \ was actually taken to reach the `LAST_VALUE` value that is output. It is one\
    \ of the most useful tools you have when debugging this code and displaying output\
    \ to a user. The node labels of each node in the walk represented in the shortest\
    \ path output.\n\nThis is done using `STRING_AGG`, and it demonstrates in the\
    \ clearest manner how this algorithm is a breadth-first query. For each iteration,\
    \ the `FollowedPerson.Name` value is added to the list (and only when there is\
    \ another iteration does it include the `'->'` value because in the `STRING_AGG`\
    \ function, the second parameter is the delimiter).\n\n```sql\nSELECT Person.Name,\n\
    STRING_AGG(FollowedPerson.Name, '->') WITHIN GROUP\n(GRAPH PATH) AS Path\nFROM...\n\
    ```\n\nThe output from this query is\n\n```\nName        Path\n----------- ---------------------------------\n\
    Lou Iss     Val Erry\nLou Iss     Saa Lee\nLou Iss     Saa Lee->Fred Rick\nLou\
    \ Iss     Val Erry->Lee Roy\nLou Iss     Val Erry->Joe Seph\nLou Iss     Saa Lee->Fred\
    \ Rick->Lou Iss\n```\n\nNote that the walk from `Lou` to `Lee` goes through `Val`\
    \ only. On the diagram, it also goes through `Saa`. Later in in the chapter I\
    \ will demonstrate how to include all walks in your output. (It will not be nearly\
    \ as neat and tidy as these queries!)\n\nIn many cases, it shouldn’t make much\
    \ difference to your output what nodes are included in the chosen walk. That is,\
    \ unless you start doing aggregates on the nodes in the path or want to choose\
    \ among multiple paths. Then it gets a bit more complicated.\n\nWhen I created\
    \ the graph, I included value columns on each edge and node to let us see how\
    \ they compare to the `COUNT` output since each value is `1`.\n\n```sql\nSELECT\
    \ STRING_AGG(FollowedPerson.Name, '->')WITHIN GROUP\n(GRAPH PATH) AS PATH,\nCOUNT(FollowedPerson.PersonId)\
    \ WITHIN GROUP (GRAPH PATH)\nAS Level,\nSUM(FollowedPerson.Value) WITHIN GROUP\
    \ (GRAPH PATH)\nAS SumNodeValues,\nSUM(Follows.Value) WITHIN GROUP (GRAPH PATH)\n\
    AS SumEdgeValues\nFROM ...\n```\n\nThe output of this query has two new columns\
    \ that each have the same value as the level. You can see in the following output,\
    \ where I added the extra values, that the sum doesn’t include the base node:\n\
    \n```\nPath                      Level       SumNodeValues SumEdgeValues\n-------------------------\
    \ ----------- ------------- -------------\nVal Erry                  1       \
    \    1             1\nSaa Lee                   1           1             1\n\
    Saa Lee->Fred Rick        2           2             2\nVal Erry->Lee Roy     \
    \    2           2             2\nVal Erry->Joe Seph        2           2    \
    \         2\nSaa Lee->Fred Rick->Lou.. 3           3             3\n```\n\nThis\
    \ is consistent with what you see in the path. You only see the nodes that are\
    \ linked. And think about the edges to get to this location, for example `Saa\
    \ Lee->Fred Rick`. There are two edges between `Lou Iss` and `Fred Rick`, so summing\
    \ those values you get 2, as you see in the results. And there are two nodes in\
    \ the chain after the base node. Again, be careful aggregating edges and intermediate\
    \ nodes because the sum is based on the path taken, and other paths could have\
    \ different values. It only makes sense if you are happy with the value of the\
    \ random path chosen, which may be tricky to remember when looking at results.\n\
    \nFor example, consider the subgraph in Figure 3-10. The direct path from `Fred\
    \ Rick` to `Saa Lee` has the highest magnitude, but it is the only path you can\
    \ choose using the `SHORTEST_PATH` syntax.\n\n![](images/508094_1_En_3_Chapter/508094_1_En_3_Fig10_HTML.jpg)\n\
    \nA graph structure. Fred Rick links to Joe Seph and Lou Iss with magnitude value\
    \ 100, and both link to Saa Lee with 100. Fred Rick links to Saa Lee with 1000000.\n\
    \nFigure 3-10\n\nExample subgraph with magnitude values on the edges\n\nLater\
    \ in the chapter I will demonstrate how you can get the path in a different manner\
    \ that is a lot more complex but will allow you to get every path between two\
    \ nodes and compare them if desired.\n\n#### Controlling Depth of Processing\n\
    \nIn a very large graph, you probably don’t want to traverse every level of the\
    \ graph. For this reason, you sometimes need to limit the distance you will process.\
    \ You control the number of levels to search in the `SHORTEST_PATH` syntax. In\
    \ the previous examples, you used the following `MATCH` expression:\n\n```sql\n\
    MATCH(SHORTEST_PATH(Person(-(Follows)->FollowedPerson)+))\n```\n\nThe plus sign\
    \ (`+`) in the syntax is where you control the iterations the processing will\
    \ go. Change the `+` to `{1,Depth}` to control the depth. The 1 indicates the\
    \ level you start at, but you can’t start deeper in the hierarchy. If the first\
    \ number is anything other than 1, you get the following error:\n\n```\nMsg 13942,\
    \ Level 15, State 2, Line 556\nThe initial recursive quantifier must be 1: {1,\
    \ ... }.\n```\n\nTo show everyone linked at level 1 or 2, along with their path,\
    \ you can use the following:\n\n```sql\nSELECT STRING_AGG(FollowedPerson.Name,\
    \ '->') WITHIN GROUP\n(GRAPH PATH) AS Path,\nCOUNT(FollowedPerson.PersonId) WITHIN\
    \ GROUP (GRAPH PATH)\nAS LEVEL\nFROM   Network.Person AS Person,\nNetwork.Follows\
    \ FOR PATH AS Follows,\nNetwork.Person FOR PATH AS FollowedPerson\nWHERE  Person.FirstName\
    \ = 'Lou'\nAND Person.LastName = 'Iss'\nAND MATCH(\nSHORTEST_PATH(Person(-(Follows)->FollowedPerson){1,2}));\n\
    ```\n\nThe output of this query is\n\n```\nPath                     Level\n------------------------\
    \ -----------\nVal Erry                 1\nSaa Lee                  1\nSaa Lee->Fred\
    \ Rick       2\nVal Erry->Lee Roy        2\nVal Erry->Joe Seph       2\n```\n\n\
    You can see all the Level values are between 1 and 2. Re-execute the query with\
    \ a `+` or even `{1,3}` and the difference you will see is one extra line with\
    \ a Path of `Saa Lee->Fred Rick->Lou Iss` and a Level value of 3.\n\nIf you want\
    \ to limit the levels on the lower end, like if you want to see levels 2 and 3,\
    \ you need to use a CTE. With the grouping and such, you might think a `HAVING`\
    \ clause would work, but it is not available.\n\n```sql\nWITH BaseRows AS (\n\
    SELECT STRING_AGG(FollowedPerson.Name, '->') WITHIN GROUP\n(GRAPH PATH) AS Path,\n\
    COUNT(FollowedPerson.PersonId) WITHIN GROUP (GRAPH PATH)\nAS LEVEL\nFROM   Network.Person\
    \ AS Person,\nNetwork.Follows FOR PATH AS Follows,\nNetwork.Person FOR PATH AS\
    \ FollowedPerson\nWHERE  Person.FirstName = 'Lou'\nAND Person.LastName = 'Iss'\n\
    AND MATCH(\nSHORTEST_PATH(Person(-(Follows)->FollowedPerson){1,3}))\n)\nSELECT\
    \ *\nFROM   BaseRows\nWHERE  Level BETWEEN 2 AND 3;\n```\n\nThe output of this\
    \ query is the same as using +, but now the two rows with just one hop between\
    \ your anchor node and the match have been filtered out."
  raw: "#### Aggregation Along the Path\n\nNow you have the basic concept down. (Trust\
    \ me; it may take you a few times and a lot of tries to really get it to gel!)\
    \ So let’s look at some of the other functionality you can add to the output.\
    \ You can do aggregates such as `COUNT`. `COUNT` is the standard way to get the\
    \ number of hops between nodes. For example:\n\n```\nSELECT Person.Name AS Person,\n\
    LAST_VALUE(FollowedPerson.Name) WITHIN GROUP\n(GRAPH PATH) as ConnectedPerson,\n\
    COUNT(FollowedPerson.PersonId) WITHIN GROUP\n(GRAPH PATH) as Level\nFROM   ...\
    \ \n```\n\nWhen this is the `SELECT` clause, the `COUNT` aggregate counts each\
    \ time there is a hop between a node. In the output, you can see that `Val` and\
    \ `Saa` are directly connected to `Lou`, so one hop. `Fred`, `Joe`, and `Lee`\
    \ are two. And it is three hops to get back to `Lou`.\n\n```\nPerson        ConnectedPerson\
    \   Level\n------------- ----------------- -----------\nLou Iss       Val Erry\
    \          1\nLou Iss       Saa Lee           1\nLou Iss       Fred Rick     \
    \    2\nLou Iss       Lee Roy           2\nLou Iss       Joe Seph          2\n\
    Lou Iss       Lou Iss           3\n```\n\nThe next thing to add is the path that\
    \ was actually taken to reach the `LAST_VALUE` value that is output. It is one\
    \ of the most useful tools you have when debugging this code and displaying output\
    \ to a user. The node labels of each node in the walk represented in the shortest\
    \ path output.\n\nThis is done using `STRING_AGG`, and it demonstrates in the\
    \ clearest manner how this algorithm is a breadth-first query. For each iteration,\
    \ the `FollowedPerson.Name` value is added to the list (and only when there is\
    \ another iteration does it include the `'->'` value because in the `STRING_AGG`\
    \ function, the second parameter is the delimiter).\n\n```\nSELECT Person.Name,\n\
    STRING_AGG(FollowedPerson.Name, '->') WITHIN GROUP\n(GRAPH PATH) AS Path\nFROM...\n\
    ```\n\nThe output from this query is\n\n```\nName        Path\n----------- ---------------------------------\n\
    Lou Iss     Val Erry\nLou Iss     Saa Lee\nLou Iss     Saa Lee->Fred Rick\nLou\
    \ Iss     Val Erry->Lee Roy\nLou Iss     Val Erry->Joe Seph\nLou Iss     Saa Lee->Fred\
    \ Rick->Lou Iss\n```\n\nNote that the walk from `Lou` to `Lee` goes through `Val`\
    \ only. On the diagram, it also goes through `Saa`. Later in in the chapter I\
    \ will demonstrate how to include all walks in your output. (It will not be nearly\
    \ as neat and tidy as these queries!)\n\nIn many cases, it shouldn’t make much\
    \ difference to your output what nodes are included in the chosen walk. That is,\
    \ unless you start doing aggregates on the nodes in the path or want to choose\
    \ among multiple paths. Then it gets a bit more complicated.\n\nWhen I created\
    \ the graph, I included value columns on each edge and node to let us see how\
    \ they compare to the `COUNT` output since each value is `1`.\n\n```\nSELECT STRING_AGG(FollowedPerson.Name,\
    \ '->')WITHIN GROUP\n(GRAPH PATH) AS PATH,\nCOUNT(FollowedPerson.PersonId) WITHIN\
    \ GROUP (GRAPH PATH)\nAS Level,\nSUM(FollowedPerson.Value) WITHIN GROUP (GRAPH\
    \ PATH)\nAS SumNodeValues,\nSUM(Follows.Value) WITHIN GROUP (GRAPH PATH)\nAS SumEdgeValues\n\
    FROM ...\n```\n\nThe output of this query has two new columns that each have the\
    \ same value as the level. You can see in the following output, where I added\
    \ the extra values, that the sum doesn’t include the base node:\n\n```\nPath \
    \                     Level       SumNodeValues SumEdgeValues\n-------------------------\
    \ ----------- ------------- -------------\nVal Erry                  1       \
    \    1             1\nSaa Lee                   1           1             1\n\
    Saa Lee->Fred Rick        2           2             2\nVal Erry->Lee Roy     \
    \    2           2             2\nVal Erry->Joe Seph        2           2    \
    \         2\nSaa Lee->Fred Rick->Lou.. 3           3             3\n```\n\nThis\
    \ is consistent with what you see in the path. You only see the nodes that are\
    \ linked. And think about the edges to get to this location, for example `Saa\
    \ Lee->Fred Rick`. There are two edges between `Lou Iss` and `Fred Rick`, so summing\
    \ those values you get 2, as you see in the results. And there are two nodes in\
    \ the chain after the base node. Again, be careful aggregating edges and intermediate\
    \ nodes because the sum is based on the path taken, and other paths could have\
    \ different values. It only makes sense if you are happy with the value of the\
    \ random path chosen, which may be tricky to remember when looking at results.\n\
    \nFor example, consider the subgraph in Figure [3-10](#508094_1_En_3_Chapter.xhtml#Fig10).\
    \ The direct path from `Fred Rick` to `Saa Lee` has the highest magnitude, but\
    \ it is the only path you can choose using the `SHORTEST_PATH` syntax.\n\n![](images/508094_1_En_3_Chapter/508094_1_En_3_Fig10_HTML.jpg)\n\
    \nA graph structure. Fred Rick links to Joe Seph and Lou Iss with magnitude value\
    \ 100, and both link to Saa Lee with 100\\. Fred Rick links to Saa Lee with 1000000.\n\
    \nFigure 3-10\n\nExample subgraph with magnitude values on the edges\n\nLater\
    \ in the chapter I will demonstrate how you can get the path in a different manner\
    \ that is a lot more complex but will allow you to get every path between two\
    \ nodes and compare them if desired.\n\n#### Controlling Depth of Processing\n\
    \nIn a very large graph, you probably don’t want to traverse every level of the\
    \ graph. For this reason, you sometimes need to limit the distance you will process.\
    \ You control the number of levels to search in the `SHORTEST_PATH` syntax. In\
    \ the previous examples, you used the following `MATCH` expression:\n\n```\nMATCH(SHORTEST_PATH(Person(-(Follows)->FollowedPerson)+))\n\
    ```\n\nThe plus sign (`+`) in the syntax is where you control the iterations the\
    \ processing will go. Change the `+` to `{1,Depth}` to control the depth. The\
