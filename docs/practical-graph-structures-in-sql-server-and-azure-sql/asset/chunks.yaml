  trans: '

    ### 查找在任一层级与用户存在特定共同兴趣的连接用户


    下一个查询与此非常相似，但也存在很大差异。这次，`LAST_NODE` 表达式要求节点共享一个兴趣：


    ```sql

    WHERE  MATCH(SHORTEST_PATH(Account1(-(Follows)->Account2)+)

    --Both Accounts interested in the same thing

    AND LAST_NODE(Account2)-(InterestedIn)->Interest

    <-(InterestedIn2)-Account1)

    AND  Account1.AccountHandle = ''@Cassandra_Villegas''

    ```


    `MATCH` 表达式是相同的，因此你正在寻找在任何层级上相互关注的账户。现在，你取出最后一个节点，并通过 `Interest` 从最后一个节点账户连接到作为锚点的账户：


    ```sql

    --8 in test rig

    --any level connection and shared common interest

    WITH BaseRows AS (

    SELECT Account1.AccountHandle + ''->'' +

    STRING_AGG(Account2.AccountHandle, ''->'')

    WITHIN GROUP (GRAPH PATH) AS ConnectedPath,

    LAST_VALUE(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS ConnectedToAccountHandle,

    COUNT(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS LEVEL,

    Interest.InterestName AS InterestName

    FROM   SocialGraph.Account AS Account1

    ,SocialGraph.Account FOR PATH AS Account2

    ,SocialGraph.Follows FOR PATH AS Follows

    ,SocialGraph.InterestedIn

    ,SocialGraph.InterestedIn AS InterestedIn2

    ,SocialGraph.Interest

    WHERE  MATCH(SHORTEST_PATH(Account1(-(Follows)->Account2)+)

    --Both Accounts interested in the same thing

    AND LAST_NODE(Account2)-(InterestedIn)->Interest

    <-(InterestedIn2)-Account1)

    AND  Account1.AccountHandle = ''@Cassandra_Villegas''

    )

    SELECT InterestName, ConnectedPath

    FROM   BaseRows

    WHERE  ConnectedToAccountHandle = ''@Tonia_Mueller''

    ORDER BY ConnectedPath

    OPTION (MAXDOP 1);

    ```


    对输出进行筛选以过滤出 `@Tonia_Mueller`，结果仅返回：


    ```sql

    InterestName  ConnectedPath

    ------------- ---------------------------------------------

    Airsofting    @Cassandra_Villegas->@Tonia_Mueller

    ```


    这告诉我们，他们是通过关注连接的，并且共享一个兴趣。你可以在图 8-2 中清晰地看到这一点。


    如果你想筛选 `InterestName` 值，并查看为某个兴趣在任何层级上关注了哪些账户，你只需在 `WHERE` 子句中进行过滤即可，这是可行的，因为在
    `LAST_NODE` 表达式中找到的边并未被声明为 `FOR PATH`。以下代码片段来自前一个查询的 CTE：


    ```sql

    WHERE  MATCH(SHORTEST_PATH(Account1(-(Follows)->Account2)+)

    AND LAST_NODE(Account2)-(InterestedIn)->Interest

    <-(InterestedIn2)-Account1)

    AND  Account1.AccountHandle = ''@Cassandra_Villegas''

    AND  Interest.InterestName =  ''Airsofting''

    ```


    完整查询执行时，与上一个查询输出相同：两行。如果移除外部查询的 `WHERE` 子句，不再将输出限制为 `@Tonia_Mueller`，那么你会看到 `@Willie_Charles`
    也共享相同的兴趣。（请注意，此示例在测试框架和示例查询中编号为 9。）


    ```sql

    ConnectedPath


    @Cassandra_Villegas->@Tonia_Mueller

    @Cassandra_Villegas->@Willie_Charles

    ```


    ### 通过其他节点建立连接


    在最后一组查询示例中，你将进行一种使用图数据库时最有趣类型的查询之一：即通过不同节点的关系来连接节点。


    例如，在图中，我们不考虑通过 `Follows` 边建立的连接，而是考虑当他们共享一个兴趣时即连接起来。第一个查询通过 Airsofting 给出你一级连接：


    ```sql

    --10 in test rig

    SELECT Account1.AccountHandle,

    Interest.InterestName,

    Account2.AccountHandle

    FROM   SocialGraph.Account AS Account1

    ,SocialGraph.Account AS Account2

    ,SocialGraph.InterestedIn AS InterestedIn1

    ,SocialGraph.InterestedIn  AS InterestedIn2

    ,SocialGraph.Interest AS Interest

    WHERE  MATCH(Account1-(InterestedIn1)->Interest

    <-(InterestedIn2)-Account2)

    AND  Account1.AccountHandle = ''@Cassandra_Villegas''

    AND  Interest.InterestName = ''Airsofting''

    OPTION (MAXDOP 1);

    ```


    这会通过连接到 Airsofting 的边给出一级连接。这个结果并不令人惊讶，你之前在相隔一级时已经做过同样的事。


    ```sql

    AccountHandle        InterestName   AccountHandle

    -------------------- -------------- -----------------------

    @Cassandra_Villegas  Airsofting     @Tonia_Mueller

    @Cassandra_Villegas  Airsofting     @Willie_Charles

    ```


    Cassandra 通过共同对 Airsofting 的兴趣与 Tonia 和 Willie 连接。但现在，Tonia 和 Willie 与其他人共享什么兴趣呢？嗯，事实上，你也可以在这些更复杂的
    `MATCH` 表达式上使用 `SHORTEST_PATH`：


    ```sql

    --11 in test rig

    SELECT Account1.AccountHandle

    + ''->'' +

    STRING_AGG(CONCAT(''('',Interest.InterestName,'')->'',

    Account2.AccountHandle) , ''->'')

    WITHIN GROUP (GRAPH PATH) AS ConnectedPath,

    LAST_VALUE(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS ConnectedToAccountHandle,

    COUNT(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS Level

    FROM   SocialGraph.Account AS Account1

    ,SocialGraph.Account FOR PATH AS Account2

    ,SocialGraph.InterestedIn FOR PATH AS InterestedIn1

    ,SocialGraph.InterestedIn FOR PATH AS InterestedIn2

    ,SocialGraph.Interest FOR PATH AS Interest

    --only fetching 2 levels for testing reasons. This

    --is where tests can get bogged down, so keeping it to

    --only what you want/need is important

    WHERE  MATCH(SHORTEST_PATH(Account1(-(InterestedIn1)->Interest

    <-(InterestedIn2)-Account2){1,2}))

    AND  Account1.AccountHandle = ''@Cassandra_Villegas''

    OPTION (MAXDOP 1);

    GO

    ```


    这将返回以下路径：


    ```sql

    ConnectedPath


    @Cassandra_Villegas->(Airsofting)->@Tonia_Mueller

    @Cassandra_Villegas->(Airsofting)->@Cassandra_Villegas

    @Cassandra_Villegas->(Airsofting)->@Willie_Charles

    @Cassandra_Villegas->(Airsofting)->@Tonia_Mueller->(3D printing)

    ->@Gerald_Scott

    @Cassandra_Villegas->(Airsofting)->@Tonia_Mueller->(Air sports)

    ->@Lynn_Escobar

    ```


    在这种模型中，这种解决方案意义不大。同一兴趣的一级连接是有意义的，但二级连接的价值开始减弱，除非兴趣具有你在模型中未包含的共同点。你可能希望筛选到某个兴趣类别。为此，你需要在这里使用
    CTE/派生表：


    ```sql

    ,SocialGraph.Interest FOR PATH AS Interest

    ```


    并使用：


    ```sql

    (SELECT *

    FROM SocialGraph.Interest

    WHERE InterestType IN (''Something'',''SomethingElse'') as Interest

    ```


    这种方法在你拥有像 IMDB 数据库这样的数据库时可能很有用。如果你想查看谁与谁合作过，你可能需要经过一条或多条边，这些边显示一个人以某种身份参与了一部作品（并且你可能希望将连接限制在作品类型，如电视剧、电影，甚至是恐怖、喜剧等流派）。你没有从人到人的直接连接，但你有这种指示共同经历的间接连接。


    然而，需要注意的是，当你进行此类查询时，你正在处理一种创建的无向图，因为如果节点 1 与节点 2 共享一个兴趣，则节点 2 也必然与节点 1 共享该兴趣。这将导致广度优先处理迅速膨胀，因此，如果你的节点和边数量很大，最好将此输出限制在合理的跳数内。

    '
- fmt: '## Performance Tuning Results


    在下载文件中，我包含了名为 `0010 Load Large Random Data Set.sql` 和 `0011 - Test Rig (Queries
    With Timing Capture.sql` 的文件。假设您一直在跟进并构建表，并且已经加载了暂存表，这两个文件将加载一个相当大的测试数据集，并针对该数据集运行一组查询。（如果您没有跟进，同一章节目录中也有用于创建和加载对象的文件。）


    正如我在之前进行树性能测试时所述，我的测试服务器购自亚马逊，描述为 Intel NUC 9 NUC9i7QNX（Intel 6核 i7-9750H，64GB
    RAM，2TB PCIe SSD，2 x Thunderbolt，WiFi 6，HDMI，Win 10 Pro）Ghost Skull Canyon Extreme
    Gaming Box Elite）。它不是服务器级的机器，但对于测试来说是一台可靠的设备。


    在测试装置中，配置了一些参数值，允许您运行相同的查询。表 8-1 显示了该批处理的输出。如您所见，大多数查询都非常快，但有一个主要的例外。请注意，每行对应于本章中的查询和部分。所选账户是随机选择的，但在测试装置下载中已记录/可更改。


    ### Test Results


    | TestSetName | TimeDifferenceSeconds | RowsAffectedCount |

    | --- | --- | --- |

    | **1. Simple find all descendants** | 3 | 94162 |

    | **2. Simple find specific descendant using where clause** | 1 | 1 |

    | **3. Simple find specific descendant using temptable** | 2 | 1 |

    | **4. Find two level connections just using MATCH** | 0 | 1 |

    | **5. Find all paths between descendants using Follows, recursive** | 9 | 5 |

    | **6. Any level follow and followers have specific interest** | 2 | 1518 |

    | **7. Any level follow and followers have specific interest, temptable** | 6
    | 1518 |

    | **8. Any level follow and shared interest, CTE** | 1 | 1 |

    | **9. Any level connection and shared specific interest** | 4 | 1489 |

    | **10. Finding users that a person is connected to directly through specific
    interest** | 0 | 1582 |

    | **11. Connection path through interest, starting with low cardinality, two levels**
    | 1163 | 93325 |

    | **11a. Connection path through interest, a bit higher cardinality, 10 levels**
    | 2284 | 93325 |


    即使返回了 93,000 行并且深度达到 12 层，查找锚定账户相关的所有行的查询也只用了 3 秒。几乎所有查询的表现都足够好，让我可以将此解决方案投入生产（理想情况下，测试时的行数大约是现在的一半！）。


    唯一的例外是通过 `Interest` 关系而不是 `Follows` 关系进行连接。通过另一个节点执行 `SHORTEST_PATH` 绝对是昂贵的，这并不是因为结构本身太差，而是正如之前指出的，更有可能大幅增加处理的行数。在高基数关系上执行此操作成本很高。


    该查询真正有趣的是，当我将其从 2 层增加到 10 层时，执行时间增加了一倍，但返回的行数完全相同，因此它实际上没有找到任何第三层的行。（如果真的有 10
    层，并且匹配数量持续增长，可能需要几个月才能完成。）我尝试以多种方式重写它，每次执行时间都很长。我选择的参数大约有 18,000 个一级行。初始的第一级获取非常快。当我尝试单独进行第二次遍历（这基本上相当于同时处理所有
    18,000 行）时，花费的时间太长，以至于不值得包含在内。


    当然，在这个非常随机的数据集中，中间集合可能类似于 18000 X 18000 行，这是一个很大的数量，考虑到我的 CPU 只是移动级 CPU，我对所经历的一切大多感到满意。


    虽然下载文件的官方更新将发布在 Apress GitHub 仓库 [`https://github.com/Apress/practical-graph-structures`](https://github.com/Apress/practical-graph-structures)
    上，但非官方更新将发布在我对应的 GitHub 仓库中：[`https://github.com/drsqlgithub/GraphBook1`](https://github.com/drsqlgithub/GraphBook1)。我还将通过我的博客分享新的图技术：[`www.red-gate.com/simple-talk/author/louis-davidson/`](http://www.red-gate.com/simple-talk/author/louis-davidson/)。


    ## Performance Tuning Roundup


    本书穿插了许多关于在 SQL Server 2022（以及 SQL Server 2019，因为它们在内部非常相似，语法也相同）中使用 SQL Graph
    对象时调优查询的技巧。在本节中，我想在本书结束之前，最后一次回顾我分享的所有技巧。


    ### Test


    我能分享的最明显的技巧是在投入生产之前进行测试、测试、再测试。对于合理少量的数据，SQL Graph 对象上的查询速度极快。正如我在上一节所展示的，即使在有限的服务器上，大多数典型查询也非常快，即使返回大量行也是如此。使用
    100,000 个账户，仅需几秒钟就能将几乎所有这些账户连接 12 层深。但有一些不易识别的陷阱（即使您遵循了这些部分的其他建议）。


    通过加载比用户实际使用的多得多的数据到您的表中，并运行用户可能运行的所有查询，您可以避免一些可能对性能造成毁灭性影响的情况。


    ### Index the Internal Columns


    尽管关于索引的一般建议是谨慎添加过多索引，但对于 SQL Graph 对象，在某种程度上不要吝啬使用它们（例如不要多次应用相同的索引！）。虽然伪列起初看起来有些神秘，但它们默认并未针对您可能执行的最常见操作进行索引。提醒一下，它们代表一个
    4 字节整数（表的 `object_id`）和一个 8 字节整数值（内部图代理键值）。


    创建节点和边对象时，对象上会有一些内部索引，但这通常是不够的。没有任何内部索引是聚集索引，因此在测试查询时，请考虑您常用的路径并相应地建立索引。


    当您无法对索引进行聚类时，考虑在使用伪列的一些索引上使用 `INCLUDE`，以避免书签查找。我没有花时间在查询计划上，因为与关系对象上的查询计划相比，它们目前难以解读（计划看起来是线性的，但正如我所介绍的，算法实际上是迭代/递归的，并不很好地映射到当前的查询计划格式）。但是，在
    `$to_id`（以及非树对象的 `$from_id`）上建立索引对于充分利用查询至关重要。


    您还可以在节点对象上索引 `$node_id`，甚至可以根据数据的访问方式对其进行聚类。关键是要考虑您如何使用对象并相应地调整（当然，还要进行测试）。


    ### Employ a Maximum Degree of Parallelism of One


    优化 SQL Graph 查询所需的最奇怪的事情之一是，当涉及大量数据时，需要消除并行性。我不太确定为什么在 SQL Server 2022 中没有将其设置为
    SQL Graph 查询的默认值。但在我的测试中，我经常遇到查询运行 24 小时后除了让我的测试电脑风扇狂转外没有明显进展的情况。设置 `OPTION (MAXDOP
    1)` 后，查询可能需要 20 秒或 20 分钟，但会在值得等待的时间内完成。这不是一个完美的解决方案，因为有时您仍然会遇到需要许多小时并且似乎无法完成的查询。'
  raw: '## Performance Tuning Results


    In the downloads, I included files named `0010 Load Large Random Data Set.sql`
    and `0011 - Test Rig (Queries With Timing Capture.sql`. Assuming you have been
    following along and building the tables and have loaded the staging tables, these
    two files will load a pretty large test data set and run a bank of queries against
    that same data set. (If you haven’t been following along, there are files to create
    and load the objects in the same chapter directory.)


    As I stated back when I did the tree performance testing, my test server was bought
    from Amazon with the description Intel NUC 9 NUC9i7QNX (Intel 6-Core i7-9750H,
    64GB RAM, 2TB PCIe SSD, 2 x Thunderbolt, WiFi 6, HDMI, Win 10 Pro) Ghost Skull
    Canyon Extreme Gaming Box Elite). It’s not a server class machine, but it is a
    solid machine for testing.


    In the test rig, there are parameter values configured that will allow you to
    run the same queries. Table [8-1](#508094_1_En_8_Chapter.xhtml#Tab1) shows the
    output of that batch. As you can see, most of the queries are very fast, but there
    is a major exception. Note that each row corresponds to the queries and sections
    in this chapter. The accounts chosen were just randomly chosen but are documented/changeable
    in the test rig download.


    Table 8-1


    Test Results


    | TestSetName | TimeDifferenceSeconds | RowsAffectedCount |

    | --- | --- | --- |

    | **1. Simple find all descendants** | 3 | 94162 |

    | **2. Simple find specific descendant using where clause** | 1 | 1 |

    | **3. Simple find specific descendant using temptable** | 2 | 1 |

    | **4. Find two level connections just using MATCH** | 0 | 1 |

    | **5. Find all paths between descendants using Follows, recursive** | 9 | 5 |

    | **6. Any level follow and followers have specific interest** | 2 | 1518 |

    | **7. Any level follow and followers have specific interest, temptable** | 6
    | 1518 |

    | **8. Any level follow and shared interest, CTE** | 1 | 1 |

    | **9. Any level connection and shared specific interest** | 4 | 1489 |

    | **10. Finding users that a person is connected to directly through specific
    interest** | 0 | 1582 |

    | **11. Connection path through interest, starting with low cardinality, two levels**
    | 1163 | 93325 |

    | **11a. Connection path through interest, a bit higher cardinality, 10 levels**
    | 2284 | 93325 |


    Even returning 93 thousand rows and 12 levels deep, the query to find every rows
    that the anchor account was related to took only 3 seconds. Pretty much all of
    the queries performed adequately enough for me to take this solution to production
    (ideally with about half as many rows as I am testing with!).


    The only outlier is the connecting though interest instead of the `Follows` relationship.
    Doing the `SHORTEST_PATH` through another node is definitely costly, not because
    the construct itself is so bad but, as previously noted, will be more likely to
    really blow up the number of rows processed. Doing this operation with a high
    cardinality relationship is costly.


    What was really interesting in that query is that when I cranked it from 2 levels
    to 10, it took twice as long and returned exactly the same number of rows, so
    it didn’t actually find any level three rows. (If there were actually 10 levels
    and the number of matches continued to grow, it could take a few months to complete.)
    I attempted to rewrite this in multiple ways, and each time it took a long time
    to execute. There were about 18,000 level-one rows with the parameters I chose.
    That initial first level fetch was very fast. When I tried to do the second pass
    on its own (which is basically to do all 18,000 rows at once), it took a long
    enough time that it wasn’t worth including.


    Of course, the intermediate set would likely be something like 18000 X 18000 in
    this very random data set, which is a lot of rows, and considering my CPUs are
    just mobile class CPUs, I have been mostly impressed with all I have experienced.


    While official updates to the downloads will be on the Apress GitHub repo at [`https://github.com/Apress/practical-graph-structures`](https://github.com/Apress/practical-graph-structures),
    unofficial updates will be made in my corresponding GitHub repository here: [`https://github.com/drsqlgithub/GraphBook1`](https://github.com/drsqlgithub/GraphBook1).
    I will also share new graph techniques via my blog: [`www.red-gate.com/simple-talk/author/louis-davidson/`](http://www.red-gate.com/simple-talk/author/louis-davidson/).


    ## Performance Tuning Roundup


    The book has been peppered with tips about tuning your queries when using SQL
    Graph objects in SQL Server 2022 (and SQL Server 2019, since they are very similar
    internally, and the same syntactically). In this section, I want to review all
    of the tips I shared one last time before getting to the end of the book.


    ### Test


    The most obvious tip I can share is to test, test, test, before you get to production.
    With reasonably small amounts of data, queries on the SQL Graph objects are extremely
    fast. As I showed in the previous section, even on a limited server, most typical
    queries are very fast, even when they return a lot of rows. With 100,000 accounts,
    it took just seconds to connect nearly all those accounts 12 levels deep. But
    there are a few gotchas that are not easy to identify (even when you follow the
    rest of the advice in these sections).


    By loading your tables with a lot more data that your users ever will, and running
    all the queries that users might, you can avoid some situations that can be devastating
    for performance.


    ### Index the Internal Columns


    Though the general advice with indexes is to be careful about adding too many,
    for the SQL Graph objects, don’t be shy with them to a certain level (like don’t
    apply the same index multiple times or anything!) While the pseudocolumns seem
    kind of mysterious, at least initially, they are not indexed by default to handle
    the most common operations you may execute. As a reminder, they represent a 4-byte
    integer (the `object_id` of the table) and an 8-byte integer value (the internal
    graph surrogate key value).


    There are a few internal indexes on the objects when you create your node and
    edge objects, but they are not usually enough. None of the internal indexes are
    clustered indexes, so as you are testing your queries, consider what path you
    use commonly and index accordingly.


    Consider using `INCLUDE` on some of your indexes that use the pseudocolumns when
    you can’t cluster the indexes to avoid bookmark lookups. I didn’t spend any time
    on the query plans because they are currently indecipherable in comparison to
    query plans on relational objects (the plans look linear, but as I have covered,
    the algorithms are actually iterative/recursive and do not map well to the current
    query plan format). But indexes on the `$to_id` (and `$from_id` for non-tree objects)
    are essential for getting the most out of your queries.


    You can also index the `$node_id` on node objects, and even cluster on it depending
    on how your data is being accessed. The key is to think about how you are using
    your objects and adjust accordingly (and test it out, of course).


    ### Employ a Maximum Degree of Parallelism of One


    One of the strangest things that is required to optimize SQL Graph queries is
    to eliminate parallelism when a lot of data is involved. Why this wasn’t just
    set as a default for SQL Graph queries in SQL Server 2022, I am not sure. But
    in my testing, I often had queries running 24 hours later and making no notable
    progress other than making my test computer’s fans sweat. With `OPTION (MAXDOP
    1)` set, the query might take 20 seconds or 20 minutes but finish in a time worth
    waiting for. It isn’t a perfect solution, because on occasion you may still run
    into queries that take many, many hours and not seem to finish.'
