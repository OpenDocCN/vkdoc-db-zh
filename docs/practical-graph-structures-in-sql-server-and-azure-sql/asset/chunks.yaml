- fmt: 'What is interesting, though, is what happens if you add `,*` to the `SELECT`
    clause. This should return all the columns, right? And since you were clearly
    able to join on the graph key values through the `MATCH` expression, you expect
    to see the values, right?


    Turns out not. The only graph details you get are the `$node_id` from the `Network.Person`
    object. When your objects are encapsulated into derived tables or view objects,
    you only get access to the columns you output, even though the columns are in
    fact available for graph queries using `MATCH`.


    The graph identifiers may not even be exposed in the same manner in all uses like
    this. For example,


    ```

    SELECT Person.Name, Nodes.ObjectName, Nodes.Name,

    Nodes.$node_id

    FROM   Network.Person, Network.Follows,

    (SELECT ''Location'' as ObjectName, Name, $node_id

    FROM   Network.Person) as Nodes

    WHERE MATCH(Person-(Follows)->Nodes)

    AND Person.Name = ''Lou Iss'';

    ```


    will throw this error:


    ```

    Msg 207, Level 16, State 1, Line 243

    Invalid column name ''$node_id''.

    ```


    even though it is clearly being used in the `MATCH` expression. If you want the
    graph identifier values to be part of the output, you must name them and use the
    name:


    ```

    SELECT Nodes.ObjectName, Nodes.Name,

    Nodes.NodeId

    FROM   Network.Person, Network.Follows,

    (SELECT ''Location'' AS ObjectName, Name,

    $node_id AS NodeId

    FROM   Network.Person) AS Nodes

    WHERE MATCH(Person-(Follows)->Nodes)

    AND Person.Name = ''Lou Iss'';

    ```


    This returns


    ```

    ObjectName Name       NodeId

    ---------- ---------- ------------------------------------------

    Location   Saa Lee    {"type":"node","schema":"Network","tab...

    Location   Val Erry   {"type":"node","schema","Network","tab...

    ```


    Likewise, you need to include the implementation columns you need in your view
    definition if you need them for some reason.


    ## Integrity Constraints and Indexes


    One of my favorite things to say about building a typical relational database
    system is that the first, last, and only thing that truly matters is that your
    data is correct. Fast and wrong is worse than slow and right. In this section,
    you will learn some of the ways that you can ensure correct data. Of course, correct
    and fast is clearly desirable, so you will also see some of the indexes that you
    need to add to your objects for performance enhancements.


    ### Edge Constraint


    So far in Chapters [3](#508094_1_En_3_Chapter.xhtml) and [4](#508094_1_En_4_Chapter.xhtml),
    I have been careful with the data we have put into the edge tables. As any software
    developer knows, flexibility is a pro and a con. Sometimes as a designer you think
    that flexibility will be used for good only, but then data starts creeping in
    that is meaningless and starts to have ill effects on the user experience (and
    confidence).


    In my example tables, the design didn’t consider the concept that someone could
    try to put illogical data into the tables. For example, right now it is perfectly
    acceptable to the structures to say that `Lou Iss-ProgramsWith-> Here` or `T-SQL-ProgramsWith->C++`.
    Both are illogical statements.


    The classic integrity constraints you should know already (`foreign key`, `check`,
    `unique`, `primary key`, `default`) all generally work with graph tables just
    like they do with normal relational tables. (There are limitations like not using
    graph key values in check constraints.) However, because an edge table can have
    more than one source of data for the `$from_id` and `$end_id`, there needed to
    be a new type of constraint. It’s called the **edge constraint**.


    The edge constraint limits what data can be put into an edge by node objects,
    both to and from. For example, when you built the relationship for the homogenous
    section of this chapter, you created data, effectively implementing the relationship
    `Person->Follows->Location`. Since you are defining where a person is located,
    this relationship makes no sense semantically, so you want to change that to have
    its own edge: `LivesAt`, or `Person-LivesAt->Location`. After you make this change,
    you are going to make sure that you cannot say that a person lives at a programming
    language or follows a location. Along the way of moving the rows to this new edge,
    you can see the things that can happen with an edge object and how to constrain
    the data to a proper set.


    You can define multiple paths through the data in a single edge constraint. As
    an initial example, let’s add a constraint to the `Network.Follows` edge that
    will accept the data that is currently in the table to show how to do multiple
    tables. For the `Network.Follows` edge, you are going to allow `Network.Person`
    to `Network.Person` and then the `Network.Person` to `Network.Location` (which
    you will work to remove):


    ```

    ALTER TABLE Network.Follows

    ADD CONSTRAINT EC_Follows CONNECTION

    (Network.Person TO Network.Location,

    Network.Person TO Network.Person) ON DELETE NO ACTION;

    ```


    The `NO ACTION` setting on the `DELETE` operation means you cannot delete a related
    node in either connected table without deleting all edges that are connected.
    If you use `CASCADE` instead of `NO ACTION`, a delete of a node in either table
    would cause the edge row to be removed. (I won’t demonstrate it, but you could
    easily construct an after-trigger object that could delete an edge row only when
    the from member node (or to, if that is your requirement) was deleted and fail
    for the other item if you need very customized relationships.)


    One of the stranger things about edge constraints is that while you can have more
    than one at a time, their conditions are `AND`ed together. So, you can’t add conditions
    with a new edge constraint without including any data that is currently in the
    edge. And the error message you get when you try will have you scratching your
    head the first time you encounter it.


    For example, if you add this additional constraint along with the `EC_Follows`
    constraint added earlier


    ```

    ALTER TABLE Network.Follows

    ADD CONSTRAINT EC_Follows2 CONNECTION

    (Network.Person TO Network.ProgrammingLanguage)

    ON DELETE NO ACTION;

    ```


    this will return the following error message. Instinctively, this error message
    doesn’t feel true.


    ```

    Msg 547, Level 16, State 0, Line 383

    The ALTER TABLE statement conflicted with the EDGE constraint "EC_Follows2". The
    conflict occurred in database "TestGraph", table "Network.Follows".

    ```'
