    Graphs are based on two primary data structures: **nodes** (or in math terms,
    vertices), and **edges**. Nodes represent a *thing* that one might care about,
    much like a table in a relational database. Edges establish a connection between
    exactly one or two nodes (when the node count is one, it means the node is related
    to itself.) A graph is defined as being a set of nodes and a set of edges.


    In a graph database, a node is like most any table with attributes describing
    what the node represents. The edge is analogous to a many-to-many relationship
    table with at least attributes to represent the node that the relationship is
    **from** and which it is **to**. You will see that two major things set these
    new concepts apart from a relational implementation.


    First, the from and the to in an edge generally can be from any node object. Whereas
    a relational table column used to reference another table value communicates that
    it is a foreign key from Table X and nothing else, the from and to attributes
    of an edge can be from multiple different node types if you so desire.


    Tip


    I am fully aware that you *can* put any value into a column, so every foreign
    key value in a column needn’t come from the same table. But that is not how it
    *should* be done because data where a column can mean multiple things is very
    confusing in a relational table. Graph structures work very similar to how relational
    tables work. Still, they have special properties that allow two rows to contain
    data from multiple sources without confusing the user/engine.


    Second, to make use of these flexible structures, a special set of operations
    is enabled in a graph engine, allowing easier access to the meaning of the relationships
    than we can get using SQL. More detail on these operations and the basic algorithms
    are in Chapters [2](#508094_1_En_2_Chapter.xhtml) and [3](#508094_1_En_3_Chapter.xhtml).


    For the first example, consider the simple graph represented in Figure [1-1](#508094_1_En_1_Chapter.xhtml#Fig1)—two
    nodes connected by a single edge. If the type of node is important, it will be
    indicated using different shapes.


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig1_HTML.png)


    A representation of circular nodes N 1 and N 2 connected to each other by an edge,
    which is a line.


    Figure 1-1


    Simple graph


    When diagraming a graph, edges may also have a property of direction. The direction
    indicates that the relationship is not reciprocal. For example, consider Figure
    [1-2](#508094_1_En_1_Chapter.xhtml#Fig2).


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig2_HTML.png)


    A representation of circular nodes N 1 and N 2 connected with a forward link.


    Figure 1-2


    Simple directed graph


    In this graph, N1 connects to N2, but N2 is not connected to N1\. This is analogous
    to a social media relationship such as when I follow Paul McCartney, but Paul
    McCartney doesn’t follow me! It will often be very important to understand the
    value of the direction because of the unbalanced nature of some relationships.
    Mr. McCartney doesn’t all of the sudden wish to get any communication about where
    I am speaking at a conference, but I wish to be informed of his concerts and new
    music being released.


    In SQL Graph, and other graph products, edges are almost always directed. This
    will become important later but will only complicate our discussion of graphs
    concepts in general, so to start with, let’s ignore the directedness of the edges.


    In my first example graph in Figure [1-1](#508094_1_En_1_Chapter.xhtml#Fig1),
    I have two nodes and a single edge. This is a very simple graph, but it is not
    the simplest graph. The simplest graph is a graph with 0 edges and 0 nodes, otherwise
    referred to as the **NULL graph**. You can also have a graph with a single node
    and no edges, and a single node with a single edge, and so on. (You can’t have
    an edge without a node.)


    Just like modeling a relational database, there is an inherent danger in thinking
    of a graph as a drawing and not a complex data structure. Consider a graph with
    the nodes and edges seen in Figure [1-3](#508094_1_En_1_Chapter.xhtml#Fig3).


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig3_HTML.png)


    A square representation of 4 connected nodes with edges. N 1 via E 1 to N 2, N
    2 via E 2 to N 4, N 4 via E 3 to N 3, and N 3 via E 4 to N 1.


    Figure 1-3


    Graph with four edges and four nodes


    This graph could be expressed as sets of nodes and edges in the following manner:


    Nodes: {N1,N2,N3,N4}; Edges: {E1:{N1,N2}; E2:{N2,N4}; E3:{N3,N4}; E4:{N1,N3}}


    By definition, all nodes and edges must be distinct, much like a table requires
    distinct rows. And just like a table, the order of the items in the sets has no
    importance. The following graph is the same as diagrammed and as defined prior
    to this paragraph:


    Nodes: {N2,N3,N1,N4}; Edges: {E2:{N2,N4}; E1:{N1,N2}; E4:{N1,N3}; E3:{N3,N4}}


    When drawing a graph as an image, there is a very similar consideration. Every
    programmer with any skill has frequented a white board to draw a diagram of a
    structure. If you were to draw a shape of a circle, a triangle, and a square on
    the white board, instinctively you would believe them to be different things.
    Even if you drew a rectangle, square, and a rhombus (all shapes with four sides)
    you would not think they were the same.


    But, in graph terms (just like when diagramming tables), the two graphs in Figure
    [1-4](#508094_1_En_1_Chapter.xhtml#Fig4) are the same as each other and the graph
    in Figure [1-3](#508094_1_En_1_Chapter.xhtml#Fig3), in which they are considered
    “equal.”


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig4_HTML.jpg)


    Two irregular polygonal representations of 4 connected nodes with edges. N 1 via
    E 1 to N 2 via E 2 to N 4, N 4 via E 3 to N 3, and N 3 via E 4 to N 1\. Edge E
    4 has an oblique bend in A, edges E 1, E 2, and E 3 have bends in B.


    Figure 1-4


    Two identical graph structures


    The two graph diagrams in Figure [1-4](#508094_1_En_1_Chapter.xhtml#Fig4) are
    copies of the same graph. The next concept is related, in that we will look at
    graphs with the same shape but different nodes. When a graph has the same node
    and edge shape (meaning the same nodes and edges, not diagram shape,) the graphs
    are referred to as being **isomorphic graphs**. For example, the two graphs in
    Figure [1-5](#508094_1_En_1_Chapter.xhtml#Fig5) are not equal but they are isomorphic
    because they have the same shape in their set of data (regardless of whether you
    draw them as a square or not).


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig5_HTML.png)


    Two square representations of 4 connected nodes with edges. a. N 1 via E 1 to
    N 2, N 2 via E 2 to N 4, N 4 via E 3 to N 3, and N 3 via E 4 to N 1\. b. S 3 via
    E 8 to R 1, R 1 via E 14 to T 2, T 2 via E 22 to T 1, and T 1 via E 9 to S 3.


    Figure 1-5


    Two isomorphic graph structures


    This concept of isomorphism will be, if not actually referred to using the exact
    term, interesting in your usage of graphs on occasion. Consider the set of nodes
    in Figure [1-6](#508094_1_En_1_Chapter.xhtml#Fig6).


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig6_HTML.png)


    Two graph structures with edges. A. Node Larry branches to, The Who and, The Beatles,
    and both join at, The Rolling Stones. Larry connects The Rolling stones, and The
    who with The Beatles. B. Larry is replaced with Fred. Fred and The Beatles are
    not connected.


    Figure 1-6


    Sample graphs for comparison'
  trans: '

    ### 定义


    图基于两种主要数据结构：`节点`（或在数学术语中，顶点）和`边`。节点代表一个可能值得关注的“事物”，类似于关系数据库中的表。边在恰好一个或两个节点之间建立连接（当节点数为一时，意味着该节点与自身相关）。图被定义为一组节点和一组边的集合。


    在图数据库中，节点类似于大多数带有属性的表，这些属性描述了节点所代表的内容。边则类似于一个多对多关系表，至少包含表示关系“来自”哪个节点以及“指向”哪个节点的属性。你会看到，有两个主要方面使这些新概念有别于关系型实现。


    首先，边中的`来自`和`指向`通常可以来自任何节点对象。而关系型表中用于引用另一个表值的列，传达的信息是它来自表 X 的外键，仅此而已；边的`来自`和`指向`属性，如果你需要，可以来自多个不同的节点类型。


    提示


    我完全清楚你*可以*在列中放入任何值，因此一个列中的外键值不一定都来自同一个表。但这*不应该*是常规做法，因为列可以代表多种含义的数据在关系型表中会非常混乱。图结构的工作方式与关系表非常相似，但它们具有特殊属性，允许两行包含来自多个来源的数据而不会让用户/引擎感到困惑。


    其次，为了利用这些灵活的结构，图引擎启用了一套特殊操作，使我们能比使用`SQL`更轻松地访问关系的含义。关于这些操作和基本算法的更多细节请见第 2 章和第
    3 章。


    来看第一个例子，考虑图 1-1 所表示的简单图——两个节点由一条边连接。如果节点的类型很重要，将使用不同的形状来表示。


    ![](img/508094_1_En_1_Fig1_HTML.png)


    圆形节点 `N1` 和 `N2` 的表示，它们通过一条边（一条线）相互连接。


    **图 1-1**


    简单图


    在绘制图时，边也可能具有方向性属性。方向表示关系不是互惠的。例如，考虑图 1-2。


    ![](img/508094_1_En_1_Fig2_HTML.png)


    圆形节点 `N1` 和 `N2` 通过一个前向链接连接的表示。


    **图 1-2**


    简单有向图


    在这个图中，`N1` 连接到 `N2`，但 `N2` 并未连接到 `N1`。这类似于社交媒体关系，比如我关注了保罗·麦卡特尼，但保罗·麦卡特尼没有关注我！由于某些关系的非对称性，理解方向的价值通常非常重要。麦卡特尼先生不会突然希望收到关于我在哪里进行会议演讲的任何通知，但我希望了解他的音乐会和新音乐发布信息。


    在 `SQL Graph` 和其他图产品中，边几乎总是有向的。这一点稍后会变得重要，但现在讨论只会使我们对图概念的讨论复杂化，所以首先，让我们忽略边的有向性。


    在我第一个例子图 1-1 中，我有两个节点和一条边。这是一个非常简单的图，但还不是最简单的图。最简单的图是具有 0 条边和 0 个节点的图，也称为`空图`。你还可以有一个只有一个节点且没有边的图，以及只有一个节点和一条边的图，等等。（你不可能有没有节点的边。）


    就像为关系数据库建模一样，将图仅仅视为一幅图画而不是一个复杂的数据结构，存在固有的危险。考虑一个具有图 1-3 中所示节点和边的图。


    ![](img/508094_1_En_1_Fig3_HTML.png)


    四个相连节点及边的方形表示。`N1` 通过 `E1` 到 `N2`，`N2` 通过 `E2` 到 `N4`，`N4` 通过 `E3` 到 `N3`，`N3`
    通过 `E4` 到 `N1`。


    **图 1-3**


    有四个边和四个节点的图


    这个图可以用以下方式表示为节点和边的集合：


    `节点: {N1,N2,N3,N4}; 边: {E1:{N1,N2}; E2:{N2,N4}; E3:{N3,N4}; E4:{N1,N3}}`


    根据定义，所有节点和边必须是唯一的，就像表需要唯一的行一样。而且就像表一样，集合中元素的顺序并不重要。下面的图与本段之前图示和定义的图是相同的：


    `节点: {N2,N3,N1,N4}; 边: {E2:{N2,N4}; E1:{N1,N2}; E4:{N1,N3}; E3:{N3,N4}}`


    当将图绘制为图像时，有一个非常相似的考虑因素。任何有技能的程序员都经常在白板上画结构图。如果你在白板上画一个圆形、一个三角形和一个正方形，本能地你会认为它们是不同的东西。即使你画一个矩形、一个正方形和一个菱形（都是四边形），你也不会认为它们是相同的。


    但是，在图术语中（就像在绘制表时一样），图 1-4 中的两个图彼此相同，并且与图 1-3 中的图相同，它们被认为是“相等的”。


    ![](img/508094_1_En_1_Fig4_HTML.jpg)


    两个不规则多边形表示的四个相连节点及边。在 A 中，`N1` 通过 `E1` 到 `N2` 通过 `E2` 到 `N4`，`N4` 通过 `E3` 到 `N3`，`N3`
    通过 `E4` 到 `N1`。边 `E4` 有一个倾斜的弯曲。在 B 中，边 `E1`、`E2` 和 `E3` 有弯曲。


    **图 1-4**


    两个相同的图结构


    图 1-4 中的两个图是同一图的副本。下一个概念与此相关，我们将研究具有相同形状但不同节点的图。当一个图具有相同的节点和边形状（指相同的节点和边，而不是绘图形状）时，这些图被称为`同构图`。例如，图
    1-5 中的两个图并不相等，但它们是同构的，因为它们的数据集具有相同的形状（无论你是否将它们画成正方形）。


    ![](img/508094_1_En_1_Fig5_HTML.png)


    两个正方形表示的四个相连节点及边。a. `N1` 通过 `E1` 到 `N2`，`N2` 通过 `E2` 到 `N4`，`N4` 通过 `E3` 到 `N3`，`N3`
    通过 `E4` 到 `N1`。b. `S3` 通过 `E8` 到 `R1`，`R1` 通过 `E14` 到 `T2`，`T2` 通过 `E22` 到 `T1`，`T1`
    通过 `E9` 到 `S3`。


    **图 1-5**


    两个同构的图结构


    这个同构的概念，即使不确切使用这个术语，在你偶尔使用图时也会很有趣。考虑图 1-6 中的节点集合。


    ![](img/508094_1_En_1_Fig6_HTML.png)


    两个带有边的图结构。A. 节点 Larry 分支到 The Who 和 The Beatles，它们都汇聚到 The Rolling Stones。Larry
    连接了 The Rolling Stones 和 The Who 以及 The Beatles。B. Larry 被 Fred 取代。Fred 和 The
    Beatles 没有连接。


    **图 1-6**


    用于比较的示例图

    '
- fmt: '# 图论核心概念：子图、行走与连通性


    ## 子图


    现在，考虑节点集合 `{Larry, The Who, Rolling Stones}`，它构成了更完整图的一个 **子图**（即图的一部分，包含节点和边），并且与
    `{Fred, The Who, Rolling Stones}` 是同构的。不难看出，既然 Fred 和 Larry 都连接到两个相似的节点，那么为 Fred
    添加一条边 `{Fred, Beatles}` 可能是合理的。因此，公司可能希望推荐：“你听过披头士乐队吗（或者你住在石头底下吗）？” 当然，Fred 可能不喜欢
    John, Paul, George 和 Ringo；但许多图的目标是寻找共同特征，然后建议使它们变得更普遍的方法。进一步延伸，你可能会发现来自完全不同子图的模式，这些模式可能表明一种可重复的模式。


    ## 行走与路径


    子图中的一个重要概念是图中的 **行走**。它指的是你如何从一个节点遍历到另一个节点。例如，在图 [1-6](#508094_1_En_1_Chapter.xhtml#Fig6)
    的第一个图中，从 Larry 出发，你可以找到一条行走路径：`Larry -> TheWho -> Rolling Stones -> Beatles ->
    Larry`。你还可以在这个示例图中找到从任何节点到任何节点的许多其他行走路径，因为图中的每个节点都与其他每个节点相连。行走的另一个术语是 **路径**，这个术语可能更常见，因为你将在
    SQL Server 2019 及更高版本中使用的用于查找路径的操作符被命名为 `SHORTEST_PATH`。


    你经常会使用行走的概念来确定一个节点距离另一个节点有多近。例如，在图的第二个变体中，从 Fred 到 The Who 和 Rolling Stones 的距离是
    1，到 Beatles 的距离是 2。如果你是 LinkedIn 的用户，当你看到你是一级连接或二级及以上连接时，你就看到了这个概念。二级连接意味着你通过一个中间节点连接。


    ## 欧拉行走


    一个有趣但在编程典型图结构时可能并非特别必要的概念是 **欧拉行走**。一个欧拉行走要求起始节点被触及两次，图中的每条边恰好被触及一次。例如，考虑图 [1-7](#508094_1_En_1_Chapter.xhtml#Fig7)
    中的图。


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig7_HTML.png)


    图 1-7：演示行走的图示


    > **注意**

    > 这在文本中有点难以表达！


    在图 [1-7A](#508094_1_En_1_Chapter.xhtml#Fig7) 中，你可以从 `N1` 遍历并回到 `N1`，路径为：`E1->N2->E2->N4->E3->N3->E4`。在
    1-7B 中，你可以从 `N1` 开始并结束，路径为：`E1->N2->E5->N1->E4->N3->E6->E3->N3->E7->N2->E2->N4->E8`。然而，在
    1-7C 中，这是不可能的，因为如果你从 `N1` 开始一条行走，例如 `N1->E1->N2->E5->N1->E4`，你将永远无法返回到 `N1`。事实证明，一个图要存在欧拉行走，所有节点的
    **度** 必须是偶数（节点的度表示连接到该节点的边的数量）。


    > **注意**

    > 像 1-7B 和 1-7C 这样的图是一个 **多重图**。多重图允许我们在相同的两个节点之间有多条边。随着复杂度增加，我们看到边通常表示节点在关系中扮演的角色。有些边没有意义，比如在相同节点之间有多条边；而另一些则可能完全合理。请记住我之前说过节点之间的边必须是唯一的。这些边可能不相等，而是描述节点之间关系的两种不同情况，就像图
    [1-7b](#508094_1_En_1_Chapter.xhtml#Fig7) 中 `N1->N2` 有 `E1` 和 `E5`。一条边可能代表家庭关系，另一条代表社交网络连接，你可能不希望因为需要遍历特定类型的边而将它们视为同一条边。


    实际上，限制将归结于所有建模决策的最终因素：**语义**。这个关系意味着什么？它将如何被用来表示一种或多种关系？例如，你可能只在逻辑上设定一个人与另一个人之间有一条边，表示该人是另一个人的生物学父母；另一方面，人与电影之间的多条边可能是有意义的：一条表示演员，一条表示制片人，一条表示导演，等等。


    ## 连通图与桥边


    我想介绍的最后一个图论概念是 **连通** 图。在连通图中，图中的每个节点到其他每个节点都存在一条行走路径。在 **非连通图** 中，图将分成一个或多个部分。在图
    [1-8](#508094_1_En_1_Chapter.xhtml#Fig8) 中，1-8A 展示了最简单的多节点连通图，1-8B 展示了最简单的非连通图。1-8A
    中的图被称为在一个块中，而 1-8B 中的图在两个块中。


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig8_HTML.jpg)


    图 1-8：简单连通图与非连通图


    在图 [1-9](#508094_1_En_1_Chapter.xhtml#Fig9) 中，我们有一个更复杂的图，它分成了三个 **块**。


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig9_HTML.jpg)


    图 1-9：分成三个块的单一图


    当你有一个连通图，并且移除一条边会导致它分裂成更多块时，这条边被称为 **桥边**。考虑图 [1-10](#508094_1_En_1_Chapter.xhtml#Fig10)
    中的图。


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig10_HTML.jpg)


    图 1-10：演示桥边的图


    这个图中有两条桥边。最明显的是 `E28`。如果你移除它，你将剩下两个多节点块。那条不太明显的边是 `E9`。移除 `E9` 会使 `S3` 孤立，从而给图增加一个块。当一个节点的度为
    2 时，移除任何一条边都会使剩余的边成为一条桥边。'
  raw: 'Now, consider that the nodes {Larry, The Who, Rolling Stones}, which form
    what is known as a **subgraph** (a set of nodes and edges that is a part of a
    graph) of the more complete graph, are isomorphic to {Fred, The Who, Rolling Stones}.
    It isn’t a difficult leap to see that since Fred and Larry are both connected
    to two similar nodes, that an additional edge {Fred, Beatles} might be a possibility
    for Fred. So, the company may then wish to suggest “Have you heard of The Beatles
    (or do you live under a rock)?” Of course, Fred may not be a fan of John, Paul,
    George, and Ringo; but the goal of many graphs may be to look for common traits
    and then suggest ways to make them more common. Take this further and you may
    see patterns occurring from completely different subgraphs that may indicate a
    repeatable pattern.


    An important concept in subgraphs is a **walk** in a graph. This refers to how
    you can traverse from node to node. For example, in the first graph in Figure
    [1-6](#508094_1_En_1_Chapter.xhtml#Fig6), starting at Larry you can find a walk
    from Larry -> TheWho -> Rolling Stones -> Beatles -> Larry. You can also find
    many other walks from any node to any node in this sample graph, since every node
    in the graph is connected to every other node. Another term for a walk is a **path**,
    which may be a bit more common since the operator you will use in SQL Server 2019
    and later to find a walk is named `SHORTEST_PATH`.


    You will often use this concept of a walk to determine the closest one node is
    to another. For example, in the second variant of the graph, the distance from
    Fred to The Who and Rolling Stones is 1 and to the Beatles is 2\. If you are a
    user of LinkedIn, you have seen this concept when you see that you are a first-level
    connection or second or more to other people. A second-level connection means
    you are connected through one intermediate node.


    A concept that is interesting if likely not particularly necessary in programming
    typical graph structures is a Euler (pronounced Oiler) Walk. An Euler Walk consists
    of the starting node being touched twice and every edge in the graph touched exactly
    once. For example, consider the graphs in Figure [1-7](#508094_1_En_1_Chapter.xhtml#Fig7).


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig7_HTML.png)


    3 structures. Nodes N 1 to N 4 in each graph with edges E 1 to E 4, with a square
    in A. Added bent edges E 5 between N 1 and N 2, and E 6 between N 3 and N 4, diagonals
    E 7 between N 2 and N 3, and E 8 between N 2 and N 4 in B. With no diagonals in
    C.


    Figure 1-7


    Graph diagrams to demonstrate walks


    Note


    This gets a little hard to express in text!


    In Figure [1-7A](#508094_1_En_1_Chapter.xhtml#Fig7), you can traverse from N1
    back to N1 through E1->N2->E2->N4->E3->N3->E4\. And in 1-7B, you can go starting
    and ending at N1, through E1->N2->E5->N1->E4->N3->E6->E3->N3->E7->N2->E2->N4->E8.
    However, in 1-7C, it is impossible to do this, because if you start at N1 and
    start a walk such as N1->E1->N2->E5->N1->E4, you will never be able to return
    to N1\. It turns out that for a graph to have a Euler Walk, all the nodes must
    be of an even **degree** (the degree of a node indicates the number of edges connected
    to the node).


    Note


    A graph such as 1-7B and 1-7C is a **multigraph**. A multigraph allows that we
    have more than one edge between the same two nodes. As we get more complex, we
    can see that an edge often indicates a role that the nodes play in a relationship.
    Some edges don’t make sense, having multiple edges between the same node; others
    may make perfect sense. Remember I said earlier that edges between nodes must
    be unique. These edges may not be equal, but instead say two things about the
    relationship between to nodes, like in Figure [1-7b](#508094_1_En_1_Chapter.xhtml#Fig7),
    N1->N2 has E1 and E5\. One may be a familial relationship, the other a social
    network connection, which you probably would not want to be the same edge for
    the reason of traversing a specific type of edge.


    Realistically the limitation will come down to the thing that all modeling decisions
    come to: *semantics*. What does the relationship mean and how will it be used
    to mean one or more relationships? For example, you might only logically have
    one edge between persons indicating that person is a biological parent to a person;
    on the other hand, multiple edges between person and movie could make sense: one
    for actor, one for producer, one for director, and so on.


    One last bit of graph theory I want to cover is that of a **connected** graph.
    In a connected graph, there is a walk from every node in the graph to every other
    node. The graph will be in one or more pieces in a **disconnected graph**. In
    Figure [1-8](#508094_1_En_1_Chapter.xhtml#Fig8), we have the simplest connected
    graph with more than one node in 1-8A and the simplest disconnected graph in 1-8B.
    The graph in 1-8A is said to be in one piece, and the graph in 1-8B is in two
    pieces.


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig8_HTML.jpg)


    Two diagrammatic representations of nodes N 1 and N 2 connected by E 1 edge. In
    the B diagram nodes N 1 and N 2 are not connected with each other.


    Figure 1-8


    Simple connected and disconnected graphs


    In Figure [1-9](#508094_1_En_1_Chapter.xhtml#Fig9), we have a more complex graph
    in three **pieces**.


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig9_HTML.jpg)


    Two square representations of 4 connected nodes with edges. a. N 1 via E 1 to
    N 2, N 2 via E 2 to N 4, N 4 via E 3 to N 3, and N 3 via E 4 to N 1\. b. S 3 via
    E 8 to R 1, R 1 via E 14 to T 2, T 2 via E 22 to T 1, and T 1 via E 9 to S 3\.
    Node T 3 is away from other nodes.


    Figure 1-9


    Single graph in three pieces


    When you have a connected graphs and removing an edge will cause it to be broken
    into more pieces, the edge is referred to as a **bridge edge**. Consider the graph
    in Figure [1-10](#508094_1_En_1_Chapter.xhtml#Fig10).


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig10_HTML.jpg)


    Two connected graph structures. A square with N 1 via E 1 to N 2, N 2 via E 2
    to N 4, N 4 via E 3 to N 3, and N 3 via E 4 to N 1, where N 4 via E 28 connects
    to T 1 in another square where R 1 via E 14 to T 2, T 2 via E 22 to T 1, and T
    1 via E 9 to S 3\. R 1 connects to T 1 with a forward link.


    Figure 1-10


    Graph to demonstrate bridge edges


    There are two bridge edges in this graph. The most obvious is E28\. If you remove
    it, you will have two multi-node pieces remaining. The one that is perhaps less
    obvious is E9\. Removing E9 would leave S3 alone and hence one more piece to the
    graph. When the degree of a node is 2, removing any edge will leave the remaining
    edge a bridge edge.'
