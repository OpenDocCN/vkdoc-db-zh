  trans: '# 1. 图论简介


    *能力越大，责任就越大。*——伏尔泰（以及蜘蛛侠的本叔叔）


    从本质上讲，图数据结构只是一个模型，用于表示一个事物与另一个事物之间的连接，然后这些事物再与更多的其他事物相连。从根本上说，图数据库是将基于多对多关系的数据库形式化，并将其作为核心关系。


    每一个曾经为关系数据库建模的人，要么是有意地、要么是无意地建模过一个图，因为当你向数据模型中添加更多概念时，多对多关系就开始出现。你将看到的一个巨大差异是，关系型数据库的实现（在理想情况下）是严格建模的。


    在决定是为关系数据库还是图结构建模多对多关系时，经常使用的术语是数据是否**高度关联**。使用图数据库结构，你可以将许多表连接到许多其他表，并以与查询关系数据库不同（但非常相似）的方式查询该结构。


    图的例子有很多，但你可能听说过的一些最常见的例子包括：


    *   社交网络，你在其中记录从一个人到另一个人的关系。

    *   建议处理系统，例如在线零售商用来记录一个人与他们查看和订购的产品之间的关系，以及该关系如何与其他有相似兴趣的人相匹配。

    *   经理-员工关系，其中员工有一位经理，该经理又有一位经理，而这位经理很可能又被另一个人管理。


    有了这些信息，你就可以根据一个对象的关系及其与其他实体关系的相似性，发现关于该对象的有趣事情。


    大多数人听说过的最著名的图，可能是“凯文·贝肯六度空间”这个客厅游戏的基础。这个游戏表明，每个人（包括凯文·贝 bacon——而不仅仅是指你最喜欢的早餐肉是培根）与任何其他人之间的联系都不会超过六层。


    图是非常自然的数据结构，这一事实并不意味着它们易于使用。因为它们是比关系表更不僵化的数据结构，这种灵活性使得处理它们变得相当复杂（尤其是在数据库引擎中）。图对象可以表示一个非常混乱的现实，你建模的数据越复杂，处理起来就越复杂。当然，这种复杂性的回报是，你创建的解决方案往往非常强大。


    和许多计算机科学主题一样，图也是一个基本的数学概念。一旦我们开始分析数据，从图的数学原理中获得的一些见解将会有所帮助。因此，在本书关于图的开篇，我将提供一些非常粗略的数学概念概述，同时定义什么是图以及它如何在软件中使用。


    请注意，本章中的概念来自许多资源，并且通常是常识。然而，当我寻找关于图概念介绍的资料时，包括这些概念的数学证明（本书中都不会涉及，所以不用担心！），其中之一是理查德·J·特鲁多（Richard
    J. Trudeau）于 1993 年由多佛出版社出版的*《图论导论》*。它远比本章深入，绝对超出了你学习使用 SQL Server 图数据库扩展进行编码所需，并且数学证明一直是我的“氪石”（软肋）！不过，我强烈推荐这本书，作为超越我将在本书中展示的内容、达到更高水平的起点。


    本章将是对你在本书和许多其他资源中会发现的众多主题的一个快速、高层次的概述，此外还有一些想法，你可能希望在开始构建图表对象后，在我将介绍的图对象中使用这些想法。本书本身将主要侧重于非常实际的应用以及如何编写特定类型的代码，但我发现了解一些图的基础知识确实帮助我构想出我试图实现的目标。


    ## 图的基础知识


    虽然大多数读者的明确目标是将图应用于他们试图解决的特定问题，但最好从头开始，讨论纯粹意义上的图是什么。（如果你不关心，可以跳到第 3 章，那里开始讲 T-SQL
    代码！）学习基础知识将有助于你摆脱先入为主的观念。也许更重要的是，你可以忽略你可能希望解决的工具和特定问题集的限制，而只是思考整个问题集。


    在数学中，有“纯”数学和“应用”数学的概念。纯数学是数学本身的数学。它的存在是为了问“用一个结构能做什么？”而不问“这是解决我问题的有用代码吗，或者更重要的是，能解决任何问题吗？”这种限制性问题。应用数学或多或少是我们这些典型的计算机架构师/程序员通常感兴趣的那种东西，因为我们有一个问题，并想找到能帮助我们解决这个问题的东西（并且是立即找到）。大多数时候，解决方案只有在能解决我们当前已知的具体问题，并且有经理在背后督促时，才会引起兴趣。


    然而，我总是更喜欢先尝试看看用一个新工具能完成什么，然后再实际动手（当然是比喻性的；作为一名程序员，除非当天的零食包括巧克力，否则我的手在工作中永远不会弄脏）。


    我将讨论的一些内容，会帮助你理解在数据中寻找模式并最终转化为算法时，我们可能会做什么。由于 SQL Server（或任何图数据库平台）当前的计算限制，或者在
    2023 年写作时合理的硬件限制，某些设计可能无法实际实现。自从我在 2000 年写了我的第一本书以来，23 年后坐在这里，面前桌上的计算机拥有比我第一次编写
    T-SQL 时中大型公司运行的计算机更强大的能力，这句话给我的感觉是多么不同，这让我感到震惊。


    在我可以下载的一个示例数据库中，仅一个表中就有数百万行数据，而我可以在我的台式计算机上用几分钟时间处理合理的查询。限制总是存在的，但随着每一代计算机架构的过去，限制越来越少。


    我在第一章（在很大程度上也包括第二章）的目标是简单地介绍一些围绕图的术语和概念，以帮助你理解图是如何构建并最终被处理的。


    ## 关于作者


    我在 Redgate 的新同事们。我与 Redgate 是多年的朋友（同时也是 Friends of Redgate 的成员），为他们写作。我的新经理和团队成员都非常棒。


    ## 关于技术审校


    感谢 Amber Davis 给了我成为多莱坞（Dollywood）内部人士的机会。显然，成为多莱坞内部人士与本书关系不大，但我只是想再说一遍（她可能永远也看不到！）因为我在多莱坞
    Dreammore 大厅里写致谢。我从她身上学到了很多，这对撰写本书的某些部分以及我在 Redgate 担任 Simple-Talk 编辑的新工作都很有用。'
- fmt: '### Definition


    Graphs are based on two primary data structures: `nodes` (or in math terms, vertices),
    and `edges`. Nodes represent a `thing` that one might care about, much like a
    table in a relational database. Edges establish a connection between exactly one
    or two nodes (when the node count is one, it means the node is related to itself.)
    A graph is defined as being a set of nodes and a set of edges.


    In a graph database, a node is like most any table with attributes describing
    what the node represents. The edge is analogous to a many-to-many relationship
    table with at least attributes to represent the node that the relationship is
    `from` and which it is `to`. You will see that two major things set these new
    concepts apart from a relational implementation.


    First, the `from` and the `to` in an edge generally can be from any node object.
    Whereas a relational table column used to reference another table value communicates
    that it is a foreign key from Table X and nothing else, the `from` and `to` attributes
    of an edge can be from multiple different node types if you so desire.


    Tip


    I am fully aware that you *can* put any value into a column, so every foreign
    key value in a column needn’t come from the same table. But that is not how it
    *should* be done because data where a column can mean multiple things is very
    confusing in a relational table. Graph structures work very similar to how relational
    tables work. Still, they have special properties that allow two rows to contain
    data from multiple sources without confusing the user/engine.


    Second, to make use of these flexible structures, a special set of operations
    is enabled in a graph engine, allowing easier access to the meaning of the relationships
    than we can get using `SQL`. More detail on these operations and the basic algorithms
    are in Chapters [2](#508094_1_En_2_Chapter.xhtml) and [3](#508094_1_En_3_Chapter.xhtml).


    For the first example, consider the simple graph represented in Figure [1-1](#508094_1_En_1_Chapter.xhtml#Fig1)—two
    nodes connected by a single edge. If the type of node is important, it will be
    indicated using different shapes.


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig1_HTML.png)


    A representation of circular nodes `N1` and `N2` connected to each other by an
    edge, which is a line.


    **Figure 1-1**


    Simple graph


    When diagraming a graph, edges may also have a property of direction. The direction
    indicates that the relationship is not reciprocal. For example, consider Figure
    [1-2](#508094_1_En_1_Chapter.xhtml#Fig2).


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig2_HTML.png)


    A representation of circular nodes `N1` and `N2` connected with a forward link.


    **Figure 1-2**


    Simple directed graph


    In this graph, `N1` connects to `N2`, but `N2` is not connected to `N1`. This
    is analogous to a social media relationship such as when I follow Paul McCartney,
    but Paul McCartney doesn’t follow me! It will often be very important to understand
    the value of the direction because of the unbalanced nature of some relationships.
    Mr. McCartney doesn’t all of the sudden wish to get any communication about where
    I am speaking at a conference, but I wish to be informed of his concerts and new
    music being released.


    In `SQL Graph`, and other graph products, edges are almost always directed. This
    will become important later but will only complicate our discussion of graphs
    concepts in general, so to start with, let’s ignore the directedness of the edges.


    In my first example graph in Figure [1-1](#508094_1_En_1_Chapter.xhtml#Fig1),
    I have two nodes and a single edge. This is a very simple graph, but it is not
    the simplest graph. The simplest graph is a graph with 0 edges and 0 nodes, otherwise
    referred to as the `NULL graph`. You can also have a graph with a single node
    and no edges, and a single node with a single edge, and so on. (You can’t have
    an edge without a node.)


    Just like modeling a relational database, there is an inherent danger in thinking
    of a graph as a drawing and not a complex data structure. Consider a graph with
    the nodes and edges seen in Figure [1-3](#508094_1_En_1_Chapter.xhtml#Fig3).


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig3_HTML.png)


    A square representation of 4 connected nodes with edges. `N1` via `E1` to `N2`,
    `N2` via `E2` to `N4`, `N4` via `E3` to `N3`, and `N3` via `E4` to `N1`.


    **Figure 1-3**


    Graph with four edges and four nodes


    This graph could be expressed as sets of nodes and edges in the following manner:


    `Nodes: {N1,N2,N3,N4}; Edges: {E1:{N1,N2}; E2:{N2,N4}; E3:{N3,N4}; E4:{N1,N3}}`


    By definition, all nodes and edges must be distinct, much like a table requires
    distinct rows. And just like a table, the order of the items in the sets has no
    importance. The following graph is the same as diagrammed and as defined prior
    to this paragraph:


    `Nodes: {N2,N3,N1,N4}; Edges: {E2:{N2,N4}; E1:{N1,N2}; E4:{N1,N3}; E3:{N3,N4}}`


    When drawing a graph as an image, there is a very similar consideration. Every
    programmer with any skill has frequented a white board to draw a diagram of a
    structure. If you were to draw a shape of a circle, a triangle, and a square on
    the white board, instinctively you would believe them to be different things.
    Even if you drew a rectangle, square, and a rhombus (all shapes with four sides)
    you would not think they were the same.


    But, in graph terms (just like when diagramming tables), the two graphs in Figure
    [1-4](#508094_1_En_1_Chapter.xhtml#Fig4) are the same as each other and the graph
    in Figure [1-3](#508094_1_En_1_Chapter.xhtml#Fig3), in which they are considered
    “equal.”


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig4_HTML.jpg)


    Two irregular polygonal representations of 4 connected nodes with edges. `N1`
    via `E1` to `N2` via `E2` to `N4`, `N4` via `E3` to `N3`, and `N3` via `E4` to
    `N1`. Edge `E4` has an oblique bend in A, edges `E1`, `E2`, and `E3` have bends
    in B.


    **Figure 1-4**


    Two identical graph structures


    The two graph diagrams in Figure [1-4](#508094_1_En_1_Chapter.xhtml#Fig4) are
    copies of the same graph. The next concept is related, in that we will look at
    graphs with the same shape but different nodes. When a graph has the same node
    and edge shape (meaning the same nodes and edges, not diagram shape,) the graphs
    are referred to as being `isomorphic graphs`. For example, the two graphs in Figure
    [1-5](#508094_1_En_1_Chapter.xhtml#Fig5) are not equal but they are isomorphic
    because they have the same shape in their set of data (regardless of whether you
    draw them as a square or not).


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig5_HTML.png)


    Two square representations of 4 connected nodes with edges. a. `N1` via `E1` to
    `N2`, `N2` via `E2` to `N4`, `N4` via `E3` to `N3`, and `N3` via `E4` to `N1`.
    b. `S3` via `E8` to `R1`, `R1` via `E14` to `T2`, `T2` via `E22` to `T1`, and
    `T1` via `E9` to `S3`.


    **Figure 1-5**


    Two isomorphic graph structures


    This concept of isomorphism will be, if not actually referred to using the exact
    term, interesting in your usage of graphs on occasion. Consider the set of nodes
    in Figure [1-6](#508094_1_En_1_Chapter.xhtml#Fig6).


    ![](images/508094_1_En_1_Chapter/508094_1_En_1_Fig6_HTML.png)


    Two graph structures with edges. A. Node Larry branches to, The Who and, The Beatles,
    and both join at, The Rolling Stones. Larry connects The Rolling stones, and The
    who with The Beatles. B. Larry is replaced with Fred. Fred and The Beatles are
    not connected.


    **Figure 1-6**


    Sample graphs for comparison'
