  trans: '

    ## 对象创建


    在下载文件中，你从一个未指定任何参数创建的数据库开始（因此它基本上与你模型数据库中的状态一致）。你在此数据库中进行的任何操作都完全不需要进行性能调优。


    ```

    CREATE DATABASE TestGraph

    GO

    USE TestGraph

    GO

    ```


    你将开始使用的图具有图 3-1 所示的形状。每个节点代表一个你将实现的“关注”关系。稍后，你将通过示例向该图中添加几种其他类型的节点和边。（图中“人物”的命名是为了让名字易于记忆，并非指代现实世界中的任何个人。）


    ![](img/508094_1_En_3_Fig1_HTML.jpg)


    一个由人名组成的图形结构。Val Erry 连接 Lee Roy 和 Joe Seph，Fred Rick 连接 Joe Seph、Val Erry 和 Lou
    Iss。Joe Seph、Lou Iss 和 Day Vid 连接 Saa Lee。Saa Lee 连接 Fred Rick 和 Lee Roy。


    图 3-1


    由“关注”边连接“人物”节点的图


    在 SQL Server 中创建你的节点和边对象与创建任何其他表完全相同。语法基本相同，只有一点不同：你需要告诉每个对象它是一个节点还是一个边。在下面的脚本中，你将创建实现此图所需的对象。


    首先，创建一个架构，因为你通常不希望将任何对象放在 `dbo` 架构中。为你的对象使用特定的架构有利于对象分段，并且绝不会意外地在你的 `master` 数据库中创建一堆对象。


    ```

    IF SCHEMA_ID(''Network'') IS NULL

    EXEC (''CREATE SCHEMA Network'');

    ```


    对于人员表，你给一个人赋予 `FirstName` 和 `LastName` 属性，以及一个用于保存两个名字连接的计算列。我经常在示例中使用 `Name`
    属性，但我确实想展示一些在 Transact-SQL 代码中需要获取多个属性的情况。前两个对象还有一个 `Value` 列，我将用它来演示数学聚合。


    ```

    CREATE TABLE Network.Person

    (

    PersonId  int IDENTITY CONSTRAINT PKPerson PRIMARY KEY,

    FirstName nvarchar(100) NULL,

    LastName  nvarchar(100) NOT NULL,

    Name      AS (CONCAT(FirstName + '' '', LastName))PERSISTED,

    Value     int NOT NULL

    CONSTRAINT DFLTPerson_Value DEFAULT(1),

    CONSTRAINT AKPerson UNIQUE(FirstName,LastName)

    ) AS NODE;

    ```


    只需在典型的表声明中添加 `AS NODE`，这现在就是一个 `NODE` 对象。几页之后，你将探讨这在内部到底意味着什么。接下来，创建你将开始使用的 `EDGE`
    对象：


    ```

    CREATE TABLE Network.Follows

    (Value INT NOT NULL

    CONSTRAINT DFLTFollows_Value DEFAULT(1)

    ) AS EDGE;

    ```


    请注意，你完全不需要任何列，因此下面也是一个可接受的表声明：


    ```

    CREATE TABLE Network.Follows

    AS EDGE;

    ```


    你可以在 `sys.tables` 系统视图中列出 `NODE` 和 `EDGE` 对象：


    ```

    SELECT OBJECT_SCHEMA_NAME(tables.object_id) AS schema_name,

    tables.name AS table_name,

    tables.is_edge,

    tables.is_node

    FROM   sys.tables

    WHERE  tables.is_edge = 1

    OR tables.is_node = 1;

    ```


    执行这些脚本后（这些脚本也可在本书的官方 GitHub 仓库 [`https://github.com/Apress/practical-graph-structures`](https://github.com/Apress/practical-graph-structures)
    找到），此语句的输出是


    ```

    schema_name       table_name     is_edge is_node

    ----------------- -------------- ------- -------

    Network           Person         0       1

    Network           Follows        1       0

    ```


    此时，你已准备好对象，可以进行下一步：添加一些数据。请注意，本书中的示例仅用 T-SQL 代码完成，但你可以在 Management Studio 的对象资源管理器中找到这些对象，如图
    3-2 所示。


    ![](img/508094_1_En_3_Fig2_HTML.jpg)


    TEST S Q L SERVER TESTER 2019、数据库、系统数据库、Test Graph 的文件夹和文件列表截图，其中高亮显示了包含数据库关系图和表的文件夹。一些子文件夹是系统表和图表，包含
    network.follows 和 network.person 文件。


    图 3-2


    Management Studio 中“图表格”文件夹的位置


    如果你使用的是 Azure Data Studio，图表格会像关系表一样显示在列表中。

    '
- fmt: '## Creating Data


    When you get to adding rows to your tables, adding rows to a `NODE` object is
    exactly like adding rows to any table. You can use any of the syntaxes you use
    to create data in basic relational tables. All of the internal graph columns will
    be automatically managed (unless you directly manage their values, which will
    be covered in Chapter [4](#508094_1_En_4_Chapter.xhtml)).


    Let’s create some data in the `Network.Person` object:

    ```sql

    INSERT INTO Network.Person(FirstName, LastName)

    VALUES(''Fred'', ''Rick''),

    (''Lou'', ''Iss''),

    (''Val'', ''Erry''),

    (''Lee'', ''Roy''),

    (''Saa'', ''Lee''),

    (''Joe'', ''Seph''),

    (''Day'', ''Vid'');

    ```


    Next, let’s look at some data from the table using `SELECT *` to get all the columns:

    ```sql

    SELECT *

    FROM   Network.Person

    WHERE  Person.FirstName = ''Fred''

    AND Person.LastName = ''Rick'';

    ```


    The results are interesting. You not only see some extra columns, but they also
    have really hard-to-work-with names. The first outputted column looks something
    like this:

    ```

    $node_id_C580185613BB42EF81F4A68F6FA539DC


    {"type":"node","schema":"Network","table":"Person","id":0}

    ```


    The value is an encoding of a few internal columns (which I will cover later),
    but you can see from the `JSON` view that this is a node, the schema and table
    names, and then an internal id value. That internal id is part of the graph database
    engine. It is not the same as the identity column in your table, but it is very
    similar. (Although, as you will see later, it is a lot easier to insert your own
    values into!)


    The rest of the table is what you expect to be:

    ```

    PersonId    FirstName    LastName       Name             Value

    ----------- ------------ -------------- ---------------- --------

    1           Fred         Rick           Fred Rick        1

    ```


    You can use the complex column name in a query (surrounded by square brackets,
    because `$` as the lead character tells SQL Server that a column name is a pseudocolumn):

    ```sql

    SELECT [$node_id_C580185613BB42EF81F4A68F6FA539DC]

    FROM   Network.Person

    WHERE [$node_id_C580185613BB42EF81F4A68F6FA539DC]  =

    ''{"type":"node","schema":"Network","table":"Person","id":0}'';

    ```


    This code returns the same JSON as before. Leave off the square brackets and you
    get the following error:

    ```

    Msg 126, Level 15, State 2, Line 69

    Invalid pseudocolumn "$node_id_3949CAAFE93D496C9A4CF1F33767B666".

    ```


    A pseudocolumn is a SQL Server construct that lets you use a value without knowing
    its exact name. There are others, particularly in partitioning. Here, you use
    `$node_id` instead of this value (which will change when you create this table
    on your machine in all probability):

    ```sql

    --not in square brackets, because this is not a column name

    SELECT Person.$node_id

    FROM   Network.Person

    WHERE  Person.$node_id = ''{"type":"node","schema":"Network","table":"Person","id":0}'';

    ```


    For the edge you created, there are several more complex column names that you
    will use pseudocolumns to work with, as you can see after executing the following
    code:

    ```sql

    SELECT *

    FROM   Network.Follows;

    ```


    This returns the following output (you haven’t loaded any data yet, so you are
    just looking at the structure):

    ```

    $edge_id_3E64B3D47C09432595C25D1FB2146A35


    $from_id_AA09B7FBEA714F918B3C0D19A8B24A0A


    $to_id_4E49D534C24E4F4D8E0E0D207237A425


    ```


    There is also a `Value` column added on the edge for later usage.


    These are all abbreviated as `$edge_id`, `$from_id`, `$to_id`. The latter two
    take as input a `$node_id` from a node to identify the from and to nodes in the
    relationship. When doing the input of data, the basic pattern is something like
    the following (in the next chapter, I will show some other data creation patterns).
    The basic format is that you need to look up the `$from_id` and the `$to_id` values
    in a subquery:

    ```sql

    INSERT INTO Network.Follows($from_id, $to_id)

    SELECT (   SELECT Person.$node_id

    FROM   Network.Person

    WHERE  Person.FirstName = ''Fred''

    AND Person.LastName = ''Rick'') AS from_id,

    (   SELECT Person.$node_id

    FROM   Network.Person

    WHERE  Person.FirstName = ''Joe''

    AND Person.LastName = ''Seph'') AS to_id;

    --from_id and to_id just names to make it easier to see when

    --debugging. It can be whatever.

    ```


    Looking at that data now, you can see

    ```sql

    SELECT *

    FROM   Network.Follows;

    ```


    The output has four columns. Note that your column names will almost certainly
    differ, and you may have different id values too.

    ```

    $edge_id_3E64B3D47C09432595C25D1FB2146A35


    {"type":"edge","schema":"Network","table":"Follows","id":0}

    $from_id_AA09B7FBEA714F918B3C0D19A8B24A0A


    {"type":"node","schema":"Network","table":"Person","id":0}

    $to_id_4E49D534C24E4F4D8E0E0D207237A425


    {"type":"node","schema":"Network","table":"Person","id":5}

    ```


    You can also do this using the textual values just like any other table. (First,
    clear the table, as you have not protected against duplication yet, which I will
    show in the next chapter.)

    ```sql

    TRUNCATE TABLE Network.Follows;

    --using truncate so the id values are reset, just for clarity

    --in my examples. No need to do this in real use, and in this

    --case it doesn’t matter that much.

    ```


    Now you can just insert the row again using the textual values:

    ```sql

    INSERT INTO Network.Follows($from_id, $to_id) VALUES (''{"type":"node","schema":"Network","table":"Person","id":0}'',

    ''{"type":"node","schema":"Network","table":"Person","id":5}'');

    ```


    Note that these items are values you can directly enter, but they are not the
    actual values that are stored in the SQL Server. Internally there are a couple
    of `bigint` columns that are represented. (In the next chapter, I will show you
    more about how data is formatted internally and how you can use this textual format
    to your advantage when loading data from an outside source.)


    In the downloads, the rest of the rows will be inserted using the first lookup-based
    format, with the `SELECT` statements separated by `UNION ALL` operators. Next,
    let’s show the data that has been created.


    The following query is something you rarely want to do, as the goal will be to
    rarely if ever get internal values directly. In the next few pages, I will start
    to introduce how to query this data using the SQL graph operators. However, this
    query is directly analogous to what our simplest graph query will do, and it is
    useful to know how to do this because there is nothing like an `OUTER JOIN` using
    the SQL graph operators.

    ```sql

    SELECT Person.Name AS PersonName,

    FollowedPerson.Name AS FollowedPersonName

    FROM   Network.Person

    JOIN Network.Follows

    ON Person.$node_id = Follows.$from_id

    JOIN Network.Person AS FollowedPerson

    ON FollowedPerson.$node_id = Follows.$to_id;

    ```


    The output of this query is every edge you created, displaying the name of the
    person and the name of the person they follow:

    ```

    PersonName     FollowedPersonName

    -------------- ----------------------

    Fred Rick      Joe Seph

    Fred Rick      Lou Iss

    Joe Seph       Saa Lee

    Saa Lee        Lee Roy

    Val Erry       Joe Seph

    Val Erry       Lee Roy

    Lou Iss        Saa Lee

    Lou Iss        Val Erry

    Saa Lee        Fred Rick

    Fred Rick      Val Erry

    Day Vid        Saa Lee

    ```


    If you go back to Figure [3-1](#508094_1_En_3_Chapter.xhtml#Fig1), you can trace
    every line from the end with no arrow to the end with an arrow in that list.


    ## Querying Data


    Querying data using the SQL Graph operators is a bit complex, but the code it
    replaces is also complex. In the previous section, you queried the data using
    `JOIN` operators, but in the next sections that code will be expressed in a much
    more compact manner. This compactness comes with a modicum of complexity.


    You will look at two levels of querying data. First, you will look at straightforward
    node-to-node queries where you know how far along the path you want to look for
    a match. Second, you will look at traversing all the possible paths, looking for
    a way to connect nodes that are a variable length apart.'
