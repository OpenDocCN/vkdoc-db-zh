- fmt: '## Object Creation


    In the downloads, you start with a database created with no parameters (so it
    will be basically as it is in your model database). Nothing you will do in this
    database will require any performance tuning at all.


    ```

    CREATE DATABASE TestGraph

    GO

    USE TestGraph

    GO

    ```


    The graph you are going to start with has the shape shown in Figure [3-1](#508094_1_En_3_Chapter.xhtml#Fig1).
    Each of the nodes represents a "follow" relationship that you will implement.
    Later you will add several other types of nodes and edges to the graph via the
    examples. (The naming of the "people" in the graph is done to make the names memorable
    and in no way references any people in the world.)


    ![](images/508094_1_En_3_Chapter/508094_1_En_3_Fig1_HTML.jpg)


    A graphical structure of names of persons. Val Erry links Lee Roy and Joe Seph,
    Fred Rick links Joe Seph, Val Erry, and Lou Iss. Joe Seph, Lou Iss, and Day Vid
    link Saa Lee. Saa Lee links Fred Rick and Lee Roy.


    Figure 3-1


    Graph with Person nodes connected by Follows edges


    Creating your node and edge objects in SQL Server is exactly like creating any
    other table. The syntax is basically the same with only one thing different. You
    need to tell each object that it is a node or an edge. In the following script,
    you will create the objects needed to implement this graph.


    First, you create a schema, as you typically never want to put any objects in
    the `dbo` schema. Using a specific schema for your objects is great for segmenting
    objects and never accidentally creating a bunch of objects in your `master` database.


    ```

    IF SCHEMA_ID(''Network'') IS NULL

    EXEC (''CREATE SCHEMA Network'');

    ```


    For the person table, you give a person `FirstName` and `LastName` attributes,
    as well as a computed column to hold a concatenation of the two names. I often
    use the `Name` attribute in examples, but I did want to show some cases where
    you need to get multiple attributes in the Transact-SQL code. These first two
    objects also have a `Value` column that I will use for demonstrating mathematical
    aggregates.


    ```

    CREATE TABLE Network.Person

    (

    PersonId  int IDENTITY CONSTRAINT PKPerson PRIMARY KEY,

    FirstName nvarchar(100) NULL,

    LastName  nvarchar(100) NOT NULL,

    Name      AS (CONCAT(FirstName + '' '', LastName))PERSISTED,

    Value     int NOT NULL

    CONSTRAINT DFLTPerson_Value DEFAULT(1),

    CONSTRAINT AKPerson UNIQUE(FirstName,LastName)

    ) AS NODE;

    ```


    Just by adding the `AS NODE` to the typical table declaration, this is now a `NODE`
    object. In a few pages you will explore what that actually means internally. Next,
    create the `EDGE` object that you will start with:


    ```

    CREATE TABLE Network.Follows

    (Value INT NOT NULL

    CONSTRAINT DFLTFollows_Value DEFAULT(1)

    ) AS EDGE;

    ```


    Note that you don''t need any columns at all, so this would also be an acceptable
    table declaration:


    ```

    CREATE TABLE Network.Follows

    AS EDGE;

    ```


    You can list the `NODE` and `EDGE` objects in the `sys.tables` system view:


    ```

    SELECT OBJECT_SCHEMA_NAME(tables.object_id) AS schema_name,

    tables.name AS table_name,

    tables.is_edge,

    tables.is_node

    FROM   sys.tables

    WHERE  tables.is_edge = 1

    OR tables.is_node = 1;

    ```


    After executing these scripts (which are also available at the book''s official
    GitHub repository at [`https://github.com/Apress/practical-graph-structures`](https://github.com/Apress/practical-graph-structures)),
    the output of this statement is


    ```

    schema_name       table_name     is_edge is_node

    ----------------- -------------- ------- -------

    Network           Person         0       1

    Network           Follows        1       0

    ```


    At this point you have the objects ready for the next step of adding some data.
    Note that the examples in the book are done in T-SQL code only but you can find
    the objects in Management Studio in the Object Explorer, as you can see in Figure
    [3-2](#508094_1_En_3_Chapter.xhtml#Fig2).


    ![](images/508094_1_En_3_Chapter/508094_1_En_3_Fig2_HTML.jpg)


    A screenshot of a list of folders and files for TEST S Q L SERVER TESTER 2019,
    Databases, System Databases, Test Graph with folders of Database Diagrams and
    Tables that is highlighted. Some sub-folders are System Tables, and Graph Tables
    with network dot follows and network dot person files.


    Figure 3-2


    Management Studio location of Graph Tables folder


    If you are using Azure Data studio, the graph tables show up in the list like
    relational tables.'
