  trans: '

    ## 判断某零件是否用于构建


    这是使用 `SHORTEST_PATH` 查询可以轻松完成的任务之一。由于你只是想了解哪些零件被使用了，只需要它们在列表中出现一次即可。因此，你可以执行以下简单使用
    `SHORTEST_PATH` 的查询：


    ```sql

    --被连接到的项。结果将是唯一的

    SELECT LAST_VALUE(IncludesPart.PartName)

    WITHIN GROUP (GRAPH PATH) AS ConnectedItem,

    --显示我们得到此连接的路径

    STRING_AGG(IncludesPart.PartName, ''->'') WITHIN GROUP

    (GRAPH PATH) AS Path

    FROM   PartsSystem.Part AS Part,

    PartsSystem.Includes FOR PATH AS Includes,

    PartsSystem.Part FOR PATH AS IncludesPart

    WHERE  Part.PartName = ''Shelvii''

    AND   MATCH(SHORTEST_PATH(Part(-(Includes)->IncludesPart)+))

    ORDER BY ConnectedItem;

    ```


    我将其包含在输出中以显示选择的路径，纯粹是出于好奇。实际上，你并不真正需要输出中的这个路径，因为你想要的是组成 Shelvii 系统的零件。


    ```text

    ConnectedItem            Path

    ------------------------ -------------------------------------

    Flat Shelf               Flat Shelf

    Shelf Set                Shelf Set

    Shelvii Shelf Enhancer   Shelf Set->Shelvii Shelf Enhancer

    Shelvii Side             Shelvii Side

    Small Screw              Small Screw Pack->Small Screw

    Small Screw Pack         Small Screw Pack

    Small Wooden Dowel Pack  Small Wooden Dowel Pack

    Wooden Dowel             Small Wooden Dowel Pack->Wooden Dowel

    ```


    需要注意的一点是，你只是部分回答了问题。这个查询为你提供了完整的列表，包括容器。Shelf Set 实际上不是一个物理实体；它是一组你必须收集的物理实体（加上一个纸箱，但如前所述，在此示例中我们忽略它）。这是否重要取决于你的观点。


    ```sql

    WITH BaseRows AS

    (

    SELECT LAST_VALUE(IncludesPart.PartName)

    WITHIN GROUP (GRAPH PATH) AS ConnectedItem,

    STRING_AGG(IncludesPart.PartName, ''->'')

    WITHIN GROUP (GRAPH PATH) AS Path,

    --捕获 node_id 以便我们可以排除非叶节点

    LAST_VALUE(IncludesPart.$node_id)

    WITHIN GROUP (GRAPH PATH) AS ConnectedItemNodeId

    FROM   PartsSystem.Part AS Part,

    PartsSystem.Includes FOR PATH AS Includes,

    PartsSystem.Part FOR PATH AS IncludesPart

    WHERE  Part.PartName = ''Shelvii''

    AND MATCH(SHORTEST_PATH(Part(-(Includes)->IncludesPart)+))

    )

    --筛选掉在结构中作为父节点的行

    SELECT ConnectedItem, Path

    FROM BaseRows

    WHERE NOT EXISTS (SELECT *

    FROM   PartsSystem.Includes

    WHERE  $from_id = ConnectedItemNodeId)

    ORDER BY ConnectedItem;

    ```


    现在只返回


    ```text

    ConnectedItem            Path

    ------------------------ --------------------------------------

    Flat Shelf               Flat Shelf

    Shelvii Shelf Enhancer   Shelf Set->Shelvii Shelf Enhancer

    Shelvii Side             Shelvii Side

    Small Screw              Small Screw Pack->Small Screw

    Wooden Dowel             Small Wooden Dowel Pack->Wooden Dowel

    ```


    回顾图 7-5，你会看到叶节点确实在此查询中显示出来了，这应该代表你需要组装一个 Shelvii 套件所需的原材料类型。


    你也可以从对象中的任何层级开始处理。通过将过滤条件从 Shelvii 改为 Shelf Set 来开始：


    ```sql

    WHERE  Part.PartName = ''Shelf Set'':

    ```


    现在你将看到它只返回三行：


    ```text

    ConnectedItem       Path

    ------------------- ----------------------------------

    Flat Shelf          Flat Shelf

    Shelf Enchancer     Shelf Enchancer

    Small Screw         Small Screw Pack->Small Screw

    ```


    ## 为构建选取物品


    现在让我们反向操作。你不再关心每个零件在物理上由什么组成；你想要组装或包装一个架子。你被给予一定数量的给定包来构建，而某个地方有一个拣货清单（它告诉你应该从架子上取什么）。


    拣货清单查询**应该**相当简单，因为你只需要向下遍历树一级来获取要输出的数据。因此，如果你要收集零件来组装一个 Shelvii，你只需要获取组成它的零件（捆绑的或原材料）：


    ```sql

    SELECT IncludesPart.PartName, Includes.IncludeCount

    FROM   PartsSystem.Part AS Part,

    PartsSystem.Includes AS Includes,

    PartsSystem.Part AS IncludesPart

    WHERE  Part.PartName = ''Shelvii''

    AND MATCH(Part-(Includes)->IncludesPart);

    ```


    这返回


    ```text

    PartName                  IncludeCount

    ------------------------  ------------

    Shelf Set                 3

    Flat Shelf                2

    Small Wooden Dowl Pack    5

    Shelvii Side              2

    Small Screw Pack          2

    ```


    这种构建的思路是，架子套件和紧固件包已经在另一个流程中预先包装好（以简化包装过程）。显然，这是一项繁琐的工作，但它比必须在组装整个包装之前先组合每个包装要快。如果你有多个订单都需要
    Small Screw Packs，理想情况下，你应该制作相应数量的 Small Screw Packs。然后你继续处理 Shelf Sets（它包含了 Small
    Screw Packs），依此类推。


    因此，你拿着这个清单（以及本章未包含的货位和其他你可能需要的数据片段），去拿取你需要的部件，并将它们放入你正在构建的包装中，就像之前有人处理 Small Screw
    Pack 时那样：


    ```sql

    SELECT IncludesPart.PartName, Includes.IncludeCount

    FROM   PartsSystem.Part AS Part,

    PartsSystem.Includes AS Includes,

    PartsSystem.Part AS IncludesPart

    WHERE  Part.PartName = ''Small Screw Pack''

    AND MATCH(Part-(Includes)->IncludesPart);

    ```


    这返回以下内容：


    ```text

    PartName                       IncludeCount

    ------------------------------ ------------

    Small Screw                    3

    ```


    在下一节中，你将使用那个 `IncludeCount` 列来确定组装整个架子需要多少螺丝。

    '
- fmt: "## Printing Out the Parts List for a Build\n\nLooking at the breakdown of\
    \ all the parts that go into a product probably isn’t needed too much by the assemblers,\
    \ but it is very important for the people ordering future products. How many do\
    \ we need? How and in what products are they used?\n\nHere is where we get into\
    \ trouble with the base syntax. `SHORTEST_PATH` fails us because it only gives\
    \ us a single path from root (of the subgraph or graph) to the child. So, if you\
    \ want to print out the list of things you need for the entire build, you are\
    \ going to have to use a different method. To make your BOM query lossless, you\
    \ need to basically go to each node and see what items they include, then see\
    \ what their child rows include, until you are down to the base items (the leaf\
    \ nodes).\n\n### The Solution: Recursive CTE\n\nThe solution is to take control\
    \ of the breadth-first search. To do this, you use a recursive CTE. On each level\
    \ of the query, you simply use a `MATCH` expression to fetch the items that make\
    \ up one build and then fetch the items that make up the next build, over and\
    \ over. For example, to see all the parts that make up the `Shelvii`, where they\
    \ go, and how many parts you need, you can use the following query. How the query\
    \ works is documented in the code.\n\n```sql\nWITH BaseRows\nAS (\n    --the CTE\
    \ anchor is just the starting node that\n    --you want to see\n    --the breakdown\n\
    \    SELECT Part.$node_id AS PartNodeId,\n           Part.$node_id  AS RelatedToPartNodeId,\n\
    \           Part.PartName,\n           1 AS IncludeCount,\n           --the path\
    \ that contains the readable path we have\n           --built in all examples\n\
    \           CAST('' AS NVARCHAR(4000)) AS Path,\n           0 AS level --the level\n\
    \    FROM PartsSystem.Part\n    WHERE Part.Partname = 'Shelvii'\n    UNION ALL\n\
    \    --pretty typical 1 level graph query:\n    SELECT Part.$node_id AS ItemId,\n\
    \           IncludesPart.$node_id AS RelatedToItemId,\n           IncludesPart.PartName,\n\
    \           Includes.IncludeCount,\n           BaseRows.Path + ' > ' + IncludesPart.PartName,\n\
    \           BaseRows.level + 1\n    FROM PartsSystem.Part,\n         PartsSystem.Includes,\n\
    \         PartsSystem.Part AS IncludesPart,\n         BaseRows --this is what\
    \ makes it recursive. Joining\n                 --back the the set named BaseRows.\n\
    \    WHERE MATCH(Part-(Includes)->IncludesPart)\n      --this joins the anchor\
    \ to the recursive part of the query\n      AND BaseRows.RelatedToPartNodeId =\
    \ Part.$node_id\n)\nSELECT PartName, IncludeCount as IncCt, BaseRows.Path\nFROM\
    \ BaseRows\nWHERE BaseRows.PartName <> 'Shelvii'\nORDER BY Path\nGO\n```\n\n###\
    \ Initial Results and Interpretation\n\nThis returns the following, unaggregated\
    \ results:\n\n```\nPartName                 IncCt Path\n------------------------\
    \ ----- ----------------------------------\nFlat Shelf               2      >\
    \ Flat Shelf\nShelf Set                3      > Shelf Set\nFlat Shelf        \
    \       1      > Shelf Set > Flat Shelf\nShelvii Shelf Enhancer   2      > Shelf\
    \ Set > Shelvii Shelf ...\nSmall Screw Pack         3      > Shelf Set > Small\
    \ Screw Pack\nSmall Screw              3      > Shelf Set > Small Screw Pac...\n\
    Shelvii Side             2      > Shelvii Side\nSmall Screw Pack         2   \
    \   > Small Screw Pack\nSmall Screw              3      > Small Screw Pack > Small\
    \ Screw\nSmall Wooden Dowel Pack  5      > Small Wooden Dowel Pack\nWooden Dowel\
    \             3      > Small Wooden Dowel Pack > ...\n```\n\nThis gives you a\
    \ breakdown of parts, what they are connected to, and the number at each level.\
    \ You can see that `Flat Shelf` shows up a couple of times, so the next step is\
    \ to aggregate the raw materials counts needed for your `Shelvii`. But while you\
    \ `do` have three `Small Screw`s in a pack, the number you need is actually based\
    \ on the number per pack, along with the number in each edge along the way to\
    \ the anchor row of the query.\n\nConsider the subgraph displayed in Figure [7-6](#508094_1_En_7_Chapter.xhtml#Fig6).\
    \ `Shelvii` needs three `Shelf Set`s that use two `Small Screw Pack`s, which in\
    \ turn use three `Small Screw`s. The `Shelvii` system itself use two packs directly.\
    \ You need to calculate the entire `IncludeCount` to be not just be the count\
    \ in a pack but to be the cumulative of all levels, and for that you use multiplication.\n\
    \n![](images/508094_1_En_7_Chapter/508094_1_En_7_Fig6_HTML.jpg)\nA structure diagram\
    \ presents the components of Shelvii, including 3 shelf set and 2 Small Screw\
    \ Pack. Shelf set has 3 small screw pack. Small screw pack has 3 small screws.\n\
    \n**Figure 7-6**\nSubgraph to show Small Screw Pack and Small Screw utilization\n\
    \n### Adjusting for Cumulative Counts\n\nTo adjust the query used, in the recursive\
    \ part of the CTE, instead of this line\n\n```sql\nIncludes.IncludeCount,\n```\n\
    \nchange it to\n\n```sql\nBaseRows.IncludeCount * Includes.IncludeCount,\n```\n\
    \nThis changes the query so that at every level, it will multiple the number of\
    \ items in each level with the next level. So, if you have 3 packs of 3 screws,\
    \ you will be using (`3 * 3`) = 9 screws.\n\nNow the output looks like this:\n\
    \n```\nPartName                 IncCt Path\n------------------------ ----- ----------------------------------\n\
    Flat Shelf               2      > Flat Shelf\nFlat Shelf               3     \
    \ > Shelf Set > Flat Shelf\nShelf Set                3      > Shelf Set\nShelvii\
    \ Shelf Enhancer   6      > Shelf Set > Shelvii Shel...\nShelvii Side        \
    \     2      > Shelvii Side\nSmall Screw              6      > Small Screw Pack\
    \ > Small Screw\nSmall Screw              27     > Shelf Set > Small Screw Pac...\n\
    Small Screw Pack         9      > Shelf Set > Small Screw Pack\nSmall Screw Pack\
    \         2      > Small Screw Pack\nSmall Wooden Dowel Pack  5      > Small Wooden\
    \ Dowel Pack\nWooden Dowel             15     > Small Wooden Dowel Pack > ...\n\
    ```\n\nThinking of the shelves, you need two for the top and bottom and three\
    \ for the inside shelves. You can see that in the output.\n\nFor the screws, you\
    \ need (`3 * 3 * 3`) for the three `Shelf Set`s in `Shelvii` and (`2 * 3`) for\
    \ the base `Shelvii` build, which you can see in the output is 27 and 6. Finally,\
    \ you filter out the non-leaf nodes so the output makes sense to a reader.\n\n\
    ### Final Aggregated Query\n\n```sql\nWITH BaseRows\nAS (\n    --the CTE anchor\
    \ is just the starting node that you want to\n    --see --the breakdown\n    SELECT\
    \ Part.$node_id AS PartNodeId,\n           Part.$node_id  AS RelatedToPartNodeId,\n\
    \           Part.PartName,\n           1 as IncludeCount,\n           --the path\
    \ that contains the readable path we have\n           --built in all examples\n\
    \           CAST('' AS NVARCHAR(4000)) AS Path,\n           0 AS level --the level\n\
    \    FROM PartsSystem.Part\n    WHERE Part.Partname = 'Shelvii'\n    UNION ALL\n\
    \    --pretty typical 1 level graph query:\n    SELECT Part.$node_id AS ItemId,\n\
    \           IncludesPart.$node_id AS RelatedToPartNodeId,\n           IncludesPart.PartName,\n\
    \           BaseRows.IncludeCount * Includes.IncludeCount,\n           BaseRows.Path\
    \ + ' > ' + IncludesPart.PartName,\n           BaseRows.level + 1\n    FROM PartsSystem.Part,\n\
    \         PartsSystem.Includes,\n         PartsSystem.Part AS IncludesPart,\n\
    \         BaseRows --this is what makes it recursive\n    WHERE MATCH(Part-(Includes)->IncludesPart)\n\
    \      --this joins the anchor to the recursive\n      --part of the query\n \
    \     AND BaseRows.RelatedToPartNodeId = Part.$node_id\n)\nSELECT PartName, SUM(IncludeCount)\
    \ AS IncludeCountTotal\nFROM BaseRows\nWHERE BaseRows.PartName <> 'Shelvii'\n\
    \    --filter out nonleaf nodes\n    AND RelatedToPartNodeId NOT IN (SELECT $from_id\n\
    \                                    FROM   PartsSystem.Includes)\nGROUP BY PartName\n\
    ORDER BY PartName;\n```\n\nThis returns\n\n```\nPartName                     \
    \  IncludeCountTotal\n------------------------------ -----------------\nFlat Shelf\
    \                     5\nShelvii Shelf Enhancer         6\nShelvii Side      \
    \             2\nSmall Screw                    33\nWooden Dowel             \
    \      15\n```\n\nIf you refer back to Figure [7-5](#508094_1_En_7_Chapter.xhtml#Fig5),\
    \ you will be able to reconcile to the number of items you expected."
  raw: '## Printing Out the Parts List for a Build


    Looking at the breakdown of all the parts that go into a product probably isn’t
    needed too much by the assemblers, but it is very important for the people ordering
    future products. How many do we need? How and in what products are they used?


    Here is where we get into trouble with the base syntax. `SHORTEST_PATH` fails
    us because it only gives us a single path from root (of the subgraph or graph)
    to the child. So, if you want to print out the list of things you need for the
    entire build, you are going to have to use a different method. To make your BOM
    query lossless, you need to basically go to each node and see what items they
    include, then see what their child rows include, until you are down to the base
    items (the leaf nodes).


    The solution is to take control of the breadth-first search. To do this, you use
    a recursive CTE. On each level of the query, you simply use a `MATCH` expression
    to fetch the items that make up one build and then fetch the items that make up
    the next build, over and over. For example, to see all the parts that make up
    the Shelvii, where they go, and how many parts you need, you can use the following
    query. How the query works is documented in the code.


    ```

    WITH BaseRows

    AS (

    --the CTE anchor is just the starting node that

    --you want to see

    --the breakdown

    SELECT Part.$node_id AS PartNodeId,

    Part.$node_id  AS RelatedToPartNodeId,

    Part.PartName,

    1 AS IncludeCount,

    --the path that contains the readable path we have

    --built in all examples

    CAST('''' AS NVARCHAR(4000)) AS Path,

    0 AS level --the level

    FROM PartsSystem.Part

    WHERE Part.Partname = ''Shelvii''

    UNION ALL

    --pretty typical 1 level graph query:

    SELECT Part.$node_id AS ItemId,

    IncludesPart.$node_id AS RelatedToItemId,

    IncludesPart.PartName,

    Includes.IncludeCount,

    BaseRows.Path + '' > '' + IncludesPart.PartName,

    BaseRows.level + 1

    FROM PartsSystem.Part,

    PartsSystem.Includes,

    PartsSystem.Part AS IncludesPart,

    BaseRows --this is what makes it recursive. Joining

    --back the the set named BaseRows.

    WHERE MATCH(Part-(Includes)->IncludesPart)

    --this joins the anchor to the recursive part of the query

    AND BaseRows.RelatedToPartNodeId = Part.$node_id

    )

    SELECT PartName, IncludeCount as IncCt, BaseRows.Path

    FROM BaseRows

    WHERE BaseRows.PartName  ''Shelvii''

    ORDER BY Path

    GO

    ```


    This returns the following, unaggregated results:


    ```

    PartName                 IncCt Path

    ------------------------ ----- ----------------------------------

    Flat Shelf               2      > Flat Shelf

    Shelf Set                3      > Shelf Set

    Flat Shelf               1      > Shelf Set > Flat Shelf

    Shelvii Shelf Enhancer   2      > Shelf Set > Shelvii Shelf ...

    Small Screw Pack         3      > Shelf Set > Small Screw Pack

    Small Screw              3      > Shelf Set > Small Screw Pac...

    Shelvii Side             2      > Shelvii Side

    Small Screw Pack         2      > Small Screw Pack

    Small Screw              3      > Small Screw Pack > Small Screw

    Small Wooden Dowel Pack  5      > Small Wooden Dowel Pack

    Wooden Dowel             3      > Small Wooden Dowel Pack > ...

    ```


    This gives you a breakdown of parts, what they are connected to, and the number
    at each level. You can see that Flat Shelf shows up a couple of times, so the
    next step is to aggregate the raw materials counts needed for your Shelvii. But
    while you **do** have three Small Screws in a pack, the number you need is actually
    based on the number per pack, along with the number in each edge along the way
    to the anchor row of the query.


    Consider the subgraph displayed in Figure [7-6](#508094_1_En_7_Chapter.xhtml#Fig6).
    Shelvii needs three Shelf Sets that use two Small Screw Packs, which in turn use
    three Small Screws. The Shelvii system itself use two packs directly. You need
    to calculate the entire `IncludeCount` to be not just be the count in a pack but
    to be the cumulative of all levels, and for that you use multiplication.


    ![](images/508094_1_En_7_Chapter/508094_1_En_7_Fig6_HTML.jpg)


    A structure diagram presents the components of Shelvii, including 3 shelf set
    and 2 Small Screw Pack. Shelf set has 3 small screw pack. Small screw pack has
    3 small screws.


    Figure 7-6


    Subgraph to show Small Screw Pack and Small Screw utilization


    To adjust the query used, in the recursive part of the CTE, instead of this line


    ```

    Includes.IncludeCount,

    ```


    change it to


    ```

    BaseRows.IncludeCount * Includes.IncludeCount,

    ```


    This changes the query so that at every level, it will multiple the number of
    items in each level with the next level. So, if you have 3 packs of 3 screws,
    you will be using (3 * 3) = 9 screws.


    Now the output looks like this:


    ```

    PartName                 IncCt Path

    ------------------------ ----- ----------------------------------

    Flat Shelf               2      > Flat Shelf

    Flat Shelf               3      > Shelf Set > Flat Shelf

    Shelf Set                3      > Shelf Set

    Shelvii Shelf Enhancer   6      > Shelf Set > Shelvii Shel...

    Shelvii Side             2      > Shelvii Side

    Small Screw              6      > Small Screw Pack > Small Screw

    Small Screw              27     > Shelf Set > Small Screw Pac...

    Small Screw Pack         9      > Shelf Set > Small Screw Pack

    Small Screw Pack         2      > Small Screw Pack

    Small Wooden Dowel Pack  5      > Small Wooden Dowel Pack

    Wooden Dowel             15     > Small Wooden Dowel Pack > ...

    ```


    Thinking of the shelves, you need two for the top and bottom and three for the
    inside shelves. You can see that in the output.


    For the screws, you need (3 * 3 * 3) for the three Shelf Sets in Shelvii and (2
    * 3) for the base Shelvii build, which you can see in the output is 27 and 6\.
    Finally, you filter out the non-leaf nodes so the output makes sense to a reader.


    ```

    WITH BaseRows

    AS (

    --the CTE anchor is just the starting node that you want to

    --see --the breakdown

    SELECT Part.$node_id AS PartNodeId,

    Part.$node_id  AS RelatedToPartNodeId,

    Part.PartName,

    1 as IncludeCount,

    --the path that contains the readable path we have

    --built in all examples

    CAST('''' AS NVARCHAR(4000)) AS Path,

    0 AS level --the level

    FROM PartsSystem.Part

    WHERE Part.Partname = ''Shelvii''

    UNION ALL

    --pretty typical 1 level graph query:

    SELECT Part.$node_id AS ItemId,

    IncludesPart.$node_id AS RelatedToPartNodeId,

    IncludesPart.PartName,

    BaseRows.IncludeCount * Includes.IncludeCount,

    BaseRows.Path + '' > '' + IncludesPart.PartName,

    BaseRows.level + 1

    FROM PartsSystem.Part,

    PartsSystem.Includes,

    PartsSystem.Part AS IncludesPart,

    BaseRows --this is what makes it recursive

    WHERE MATCH(Part-(Includes)->IncludesPart)

    --this joins the anchor to the recursive

    --part of the query

    AND BaseRows.RelatedToPartNodeId = Part.$node_id

    )

    SELECT PartName, SUM(IncludeCount) AS IncludeCountTotal

    FROM BaseRows

    WHERE BaseRows.PartName  ''Shelvii''

    --filter out nonleaf nodes

    AND RelatedToPartNodeId NOT IN (SELECT $from_id

    FROM   PartsSystem.Includes)

    GROUP BY PartName

    ORDER BY PartName;

    ```


    This returns


    ```

    PartName                       IncludeCountTotal

    ------------------------------ -----------------

    Flat Shelf                     5

    Shelvii Shelf Enhancer         6

    Shelvii Side                   2

    Small Screw                    33

    Wooden Dowel                   15

    ```


    If you refer back to Figure [7-5](#508094_1_En_7_Chapter.xhtml#Fig5), you will
    be able to reconcile to the number of items you expected.'
  trans: "\n## 打印构建的部件列表\n\n查看构成产品的所有部件明细可能不太为组装人员所需，但对于订购未来产品的人来说却非常重要。我们需要多少？它们在哪些产品中以及如何使用？\n\
    \n这就是我们在基础语法上遇到问题的地方。`SHORTEST_PATH`无法满足需求，因为它只给出从根节点（子图或图的根）到子节点的单条路径。因此，如果你想打印整个构建所需的部件清单，你必须使用不同的方法。为了使你的物料清单查询无损，你基本上需要访问每个节点，查看它们包含哪些项目，然后查看它们的子行包含什么，直到你到达基础项目（即叶节点）。\n\
    \n### 解决方案：递归 CTE\n\n解决方案是掌握广度优先搜索。为此，你使用一个递归 CTE。在查询的每一层，你只需使用一个`MATCH`表达式来获取构成一个构建的项目，然后获取构成下一个构建的项目，如此反复。例如，要查看构成`Shelvii`的所有部件、它们的用途以及所需数量，你可以使用以下查询。查询的工作方式记录在代码中。\n\
    \n```sql\nWITH BaseRows\nAS (\n    --CTE 锚点只是你想要查看其明细的\n    --起始节点\n    SELECT\
    \ Part.$node_id AS PartNodeId,\n           Part.$node_id  AS RelatedToPartNodeId,\n\
    \           Part.PartName,\n           1 AS IncludeCount,\n           --包含我们在所有示例中构建的可读路径的路径\n\
    \           CAST('' AS NVARCHAR(4000)) AS Path,\n           0 AS level --层级\n\
    \    FROM PartsSystem.Part\n    WHERE Part.Partname = 'Shelvii'\n    UNION ALL\n\
    \    --非常典型的单层图查询：\n    SELECT Part.$node_id AS ItemId,\n           IncludesPart.$node_id\
    \ AS RelatedToItemId,\n           IncludesPart.PartName,\n           Includes.IncludeCount,\n\
    \           BaseRows.Path + ' > ' + IncludesPart.PartName,\n           BaseRows.level\
    \ + 1\n    FROM PartsSystem.Part,\n         PartsSystem.Includes,\n         PartsSystem.Part\
    \ AS IncludesPart,\n         BaseRows --这正是使其递归的原因。与名为 BaseRows 的集合进行连接。\n   \
    \ WHERE MATCH(Part-(Includes)->IncludesPart)\n      --这将锚点与查询的递归部分连接起来\n     \
    \ AND BaseRows.RelatedToPartNodeId = Part.$node_id\n)\nSELECT PartName, IncludeCount\
    \ as IncCt, BaseRows.Path\nFROM BaseRows\nWHERE BaseRows.PartName <> 'Shelvii'\n\
    ORDER BY Path\nGO\n```\n\n### 初始结果与解读\n\n这返回以下未聚合的结果：\n\n```\nPartName       \
    \          IncCt Path\n------------------------ ----- ----------------------------------\n\
    Flat Shelf               2      > Flat Shelf\nShelf Set                3     \
    \ > Shelf Set\nFlat Shelf               1      > Shelf Set > Flat Shelf\nShelvii\
    \ Shelf Enhancer   2      > Shelf Set > Shelvii Shelf ...\nSmall Screw Pack  \
    \       3      > Shelf Set > Small Screw Pack\nSmall Screw              3    \
    \  > Shelf Set > Small Screw Pac...\nShelvii Side             2      > Shelvii\
    \ Side\nSmall Screw Pack         2      > Small Screw Pack\nSmall Screw      \
    \        3      > Small Screw Pack > Small Screw\nSmall Wooden Dowel Pack  5 \
    \     > Small Wooden Dowel Pack\nWooden Dowel             3      > Small Wooden\
    \ Dowel Pack > ...\n```\n\n这为你提供了部件的细分、它们与什么相连以及每一层级的数量。你可以看到`Flat Shelf`出现了几次，因此下一步是汇总你的`Shelvii`所需的原材料数量。但虽然你`确实`在一包中有三个`Small\
    \ Screw`，实际需要的数量是基于每包的数量，以及沿着查询锚点行的每条边上的数量来确定的。\n\n考虑图 7-6 中展示的子图。`Shelvii`需要三个`Shelf\
    \ Set`，每个使用两个`Small Screw Pack`，而每个`Small Screw Pack`又包含三个`Small Screw`。`Shelvii`系统本身直接使用两包。你需要计算的整个`IncludeCount`不应仅仅是一包中的数量，而应是所有层级的累积值，为此你需要使用乘法。\n\
    \n![](img/508094_1_En_7_Fig6_HTML.jpg)\n该结构图展示了 Shelvii 的组件，包括 3 个货架套件和 2 个小螺丝包。一个货架套件包含\
    \ 3 个小螺丝包。一个小螺丝包包含 3 个小螺丝。\n\n**图 7-6**\n展示小螺丝包和小螺丝使用情况的子图\n\n### 调整累计计数\n\n要调整所使用的查询，在\
    \ CTE 的递归部分，将这行代码\n\n```sql\nIncludes.IncludeCount,\n```\n\n改为\n\n```sql\nBaseRows.IncludeCount\
    \ * Includes.IncludeCount,\n```\n\n这样修改查询后，在每一层，它都会将该层级的物品数量与下一层级的数量相乘。所以，如果你有\
    \ 3 包，每包 3 个螺丝，你将使用 (`3 * 3`) = 9 个螺丝。\n\n现在的输出如下所示：\n\n```\nPartName        \
    \         IncCt Path\n------------------------ ----- ----------------------------------\n\
    Flat Shelf               2      > Flat Shelf\nFlat Shelf               3     \
    \ > Shelf Set > Flat Shelf\nShelf Set                3      > Shelf Set\nShelvii\
    \ Shelf Enhancer   6      > Shelf Set > Shelvii Shel...\nShelvii Side        \
    \     2      > Shelvii Side\nSmall Screw              6      > Small Screw Pack\
    \ > Small Screw\nSmall Screw              27     > Shelf Set > Small Screw Pac...\n\
    Small Screw Pack         9      > Shelf Set > Small Screw Pack\nSmall Screw Pack\
    \         2      > Small Screw Pack\nSmall Wooden Dowel Pack  5      > Small Wooden\
    \ Dowel Pack\nWooden Dowel             15     > Small Wooden Dowel Pack > ...\n\
    ```\n\n考虑到货架，你顶部和底部需要两个，内部搁板需要三个。你可以在输出中看到这一点。\n\n对于螺丝，`Shelvii`中的三个`Shelf Set`需要(`3\
    \ * 3 * 3`)个，基础的`Shelvii`构建需要(`2 * 3`)个，你可以在输出中看到分别是 27 和 6。最后，你过滤掉非叶节点，以便输出对读者来说更清晰易懂。\n\
    \n### 最终聚合查询\n\n```sql\nWITH BaseRows\nAS (\n    --CTE 锚点只是你想要查看明细的\n    --起始节点\n\
    \    SELECT Part.$node_id AS PartNodeId,\n           Part.$node_id  AS RelatedToPartNodeId,\n\
    \           Part.PartName,\n           1 as IncludeCount,\n           --包含我们在所有示例中构建的可读路径的路径\n\
    \           CAST('' AS NVARCHAR(4000)) AS Path,\n           0 AS level --层级\n\
    \    FROM PartsSystem.Part\n    WHERE Part.Partname = 'Shelvii'\n    UNION ALL\n\
    \    --非常典型的单层图查询：\n    SELECT Part.$node_id AS ItemId,\n           IncludesPart.$node_id\
    \ AS RelatedToPartNodeId,\n           IncludesPart.PartName,\n           BaseRows.IncludeCount\
    \ * Includes.IncludeCount,\n           BaseRows.Path + ' > ' + IncludesPart.PartName,\n\
    \           BaseRows.level + 1\n    FROM PartsSystem.Part,\n         PartsSystem.Includes,\n\
    \         PartsSystem.Part AS IncludesPart,\n         BaseRows --这正是使其递归的原因\n\
    \    WHERE MATCH(Part-(Includes)->IncludesPart)\n      --这将锚点与查询的递归部分连接起来\n  \
    \    AND BaseRows.RelatedToPartNodeId = Part.$node_id\n)\nSELECT PartName, SUM(IncludeCount)\
    \ AS IncludeCountTotal\nFROM BaseRows\nWHERE BaseRows.PartName <> 'Shelvii'\n\
    \    --过滤掉非叶节点\n    AND RelatedToPartNodeId NOT IN (SELECT $from_id\n        \
    \                            FROM   PartsSystem.Includes)\nGROUP BY PartName\n\
    ORDER BY PartName;\n```\n\n这返回\n\n```\nPartName                       IncludeCountTotal\n\
    ------------------------------ -----------------\nFlat Shelf                 \
    \    5\nShelvii Shelf Enhancer         6\nShelvii Side                   2\nSmall\
    \ Screw                    33\nWooden Dowel                   15\n```\n\n如果你回头参考图\
    \ 7-5，你将能够核对预期的项目数量。\n"
- fmt: '## Summary


    In this chapter, you learned about some of the common types of issues you may
    have when building a directed acyclic graph that is not a tree. The code is very
    much the same base code as you have used over and over in the book, and for good
    reason. All the graph data structures based on the adjacency list structures behave
    similarly.


    DAGs are very similar to tree structures because you typically work from parent
    to child in a structure to find data. In some ways, all DAGs work similarly, but
    in some uses where you need to see or calculate all row values, they behave quite
    different. Using `SHORTEST_PATH` can do some things (like interrogate what is
    in the DAG), but if you are not careful, queries can be lossy in ways that aren’t
    completely obvious.


    ## 8. A Graph For Testing


    This is the final chapter. In it, you are going to see a reasonably simple, but
    common, graph example that you can use to explore how to query a cyclic graph.
    In the downloads, there is a code generator that will let you tune an example
    to your precise size needs and see what happens when the data amounts are tremendous.


    This tool will let you dial in a graph size that you want to test on typical consumer
    hardware or a supercomputer. The example can be easily adapted for as large of
    a row set as you want to have.


    Pretty much all of the techniques in this chapter were introduced in earlier chapters
    (especially Chapter [3](#508094_1_En_3_Chapter.xhtml)), so none of it should be
    exactly new, but it should serve as both a refresher and a way to build your own
    test rig for testing performance.


    ### The Example


    For this model, I decided to keep it very simple. Just `Account, Follows`, `InterestedIn,`
    and `Interests`. Figure [8-1](#508094_1_En_8_Chapter.xhtml#Fig1) shows the conceptual
    data mode for the model.


    ![](images/508094_1_En_8_Chapter/508094_1_En_8_Fig1_HTML.jpg)


    A representation of data mode flow. Nodes of account and interest connect to,
    interested in edge. Account node and follows edge are cyclical.


    Figure 8-1


    Example conceptual model


    ### Creating the Tables


    The table design continues the minimalist approach, with only a single text column
    in each node to serve as the natural key value for you to work with. For account,
    it is the `AccountHandle` (which in the data is formatted as `@ + Name`.)


    ```sql

    CREATE SCHEMA SocialGraph;

    GO

    CREATE TABLE SocialGraph.Account (

    AccountHandle nvarchar(30)

    CONSTRAINT AKAccount_Handle UNIQUE,

    --clusters on Node_id columns. Most fetches

    --will be on node_id, Handle usually only

    --when getting first row(s)

    CONSTRAINT PKAccount PRIMARY KEY ($node_id)

    ) AS NODE;

    ```


    Note the `PRIMARY KEY` constraint on the `$node_id` pseudocolumn for this example.
    This is so that any lookups on the graph’s internal keys will bring all the other
    columns along for the ride. There is a `UNIQUE` constraint on the `AccountHandle`
    column because 1, it needs to be unique and 2, you will be using it to lookup
    a row or two in almost every example.


    Since the table is clustered on `$node_id`, the columns that make up that key
    will be in every row in that index as well, essentially making them both covering
    indexes for any query that uses the indexes.


    The `Follows` edge contains just `FollowTime`. I don’t display that in any of
    my queries (for space reasons), but you can filter rows based on the edge table
    columns too.


    ```sql

    CREATE TABLE SocialGraph.Follows (

    FollowTime datetime2(0)

    CONSTRAINT DFLTFollows_FollowTime DEFAULT SYSDATETIME(),

    --cannot add a PRIMARY KEY to the $from_id and $to_id

    --columns because they allow NULL values. SO the UNIQUE

    --CLUSTERED index

    CONSTRAINT AKFollows_UniqueNodes UNIQUE CLUSTERED

    ( $to_id, $from_id),

    --same columns, in reverse for when you are fetching

    --by $to_id

    --like for fetching follower, not who you follow

    CONSTRAINT AKFollows_FromTO UNIQUE ( $from_id, $to_id),

    --just allow connections from Account to Account

    CONSTRAINT ECFollows_AccountToAccount

    CONNECTION (SocialGraph.Account TO

    SocialGraph.Account) ON DELETE NO Action

    ) AS EDGE;

    ```


    Next up is a trigger on the `Follows` edge to make sure you don’t have any self-relationships.
    One of the times it is most important to have good constraints is when you are
    generating data for a test. I personally advocate for using them in all cases,
    but random data has a tendency to be slightly dirtier than user-generated data.
    (It is not always the case that self-relationships are bad, but in a follows relationship
    it is generally non-sensical.)


    ```sql

    CREATE TRIGGER SocialGraph.Follows_IU_Trigger ON SocialGraph.Follows

    AFTER INSERT, UPDATE

    AS

    BEGIN

    IF EXISTS (SELECT *

    FROM   inserted

    WHERE  $from_id = $to_id)

    BEGIN

    ROLLBACK;

    THROW 50000,''Modified data introduces a self reference'',1;

    END;

    END;

    GO

    ```


    Next, create the `Interest` and `InterestedIn` edges. They are configured very
    much like the other two objects (except when implementing a relationship between
    two nodes in different objects, you don’t have to worry about that self-relationship):


    ```sql

    CREATE TABLE SocialGraph.Interest (

    InterestName nvarchar(30)

    CONSTRAINT AKInterest_InterestName UNIQUE,

    CONSTRAINT PKInterest PRIMARY KEY ($node_id)

    ) AS NODE;

    CREATE TABLE SocialGraph.InterestedIn

    (

    CONSTRAINT AKInterestedIn_UniqueNodes

    UNIQUE CLUSTERED ($from_id, $to_id),

    CONSTRAINT AKInterestedIn_ToFrom UNIQUE ($to_id, $from_id),

    CONSTRAINT ECInterestedIn_AccountToInterestBoth

    CONNECTION (SocialGraph.Account TO SocialGraph.Interest)

    ON DELETE NO ACTION

    )

    AS EDGE;

    ```


    In the Chapter [8](#508094_1_En_8_Chapter.xhtml) downloads, in the `0001 - Create
    Tables.sql` file, there are also a staging tables for accounts and interests.
    Then there are .SQL files to stage that data (100000 `Accounts` and 434 `Interests`.)
    Using these rows, you can tailor the size of your dataset to be pretty large,
    and you can easily add more accounts to the staging table and ramp the numbers
    way up. The loading files have `:SETVAR` commands that let you tailor the size
    of the dataset. You can get the same dataset for every execution if you use the
    same seed. (For more details on generating repeatable data set, this blog post
    I wrote covers it: [`www.red-gate.com/simple-talk/blogs/generating-repeatable-sets-of-test-rows/`](http://www.red-gate.com/simple-talk/blogs/generating-repeatable-sets-of-test-rows/)).


    In the downloads at [`https://github.com/drsqlgithub/GraphBook1`](https://github.com/drsqlgithub/GraphBook1),
    sometime after publication, there will be tools to implement several other test
    datasets, including one that is based on the data from IMDB, if you want a truly
    large and real dataset. With millions and millions of nodes and connections, it
    can be a challenge to manage because of its size, but it is a fun dataset.'
