- fmt: '### Finding a Specific User Who a User Connects To at Any Level Where They
    Share a Specific Interest


    This next query is very similar but also very different. This time the `LAST_NODE`
    expression requires that the nodes share an interest:


    ```sql

    WHERE  MATCH(SHORTEST_PATH(Account1(-(Follows)->Account2)+)

    --Both Accounts interested in the same thing

    AND LAST_NODE(Account2)-(InterestedIn)->Interest

    <-(InterestedIn2)-Account1)

    AND  Account1.AccountHandle = ''@Cassandra_Villegas''

    ```


    The `MATCH` expression is the same, so you are looking for accounts that follow
    each other on any level. Now you take the last node and do a connection from the
    last node account to the account that is the anchor through `Interest`:


    ```sql

    --8 in test rig

    --any level connection and shared common interest

    WITH BaseRows AS (

    SELECT Account1.AccountHandle + ''->'' +

    STRING_AGG(Account2.AccountHandle, ''->'')

    WITHIN GROUP (GRAPH PATH) AS ConnectedPath,

    LAST_VALUE(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS ConnectedToAccountHandle,

    COUNT(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS LEVEL,

    Interest.InterestName AS InterestName

    FROM   SocialGraph.Account AS Account1

    ,SocialGraph.Account FOR PATH AS Account2

    ,SocialGraph.Follows FOR PATH AS Follows

    ,SocialGraph.InterestedIn

    ,SocialGraph.InterestedIn AS InterestedIn2

    ,SocialGraph.Interest

    WHERE  MATCH(SHORTEST_PATH(Account1(-(Follows)->Account2)+)

    --Both Accounts interested in the same thing

    AND LAST_NODE(Account2)-(InterestedIn)->Interest

    <-(InterestedIn2)-Account1)

    AND  Account1.AccountHandle = ''@Cassandra_Villegas''

    )

    SELECT InterestName, ConnectedPath

    FROM   BaseRows

    WHERE  ConnectedToAccountHandle = ''@Tonia_Mueller''

    ORDER BY ConnectedPath

    OPTION (MAXDOP 1);

    ```


    Filtering the output for `@Tonia_Mueller`, this returns only:


    ```sql

    InterestName  ConnectedPath

    ------------- ---------------------------------------------

    Airsofting    @Cassandra_Villegas->@Tonia_Mueller

    ```


    which tells us that they are connected by following and share an interest. You
    can see this clearly in Figure [8-2](#508094_1_En_8_Chapter.xhtml#Fig2).


    If you want to filter the `InterestName` value and see what accounts are followed
    on any level for an interest, you just need to filter that in the `WHERE` clause,
    which you can do because the edge found in the `LAST_NODE` expression is not declared
    as being `FOR PATH`. The following snippet comes from the CTE in the previous
    query:


    ```sql

    WHERE  MATCH(SHORTEST_PATH(Account1(-(Follows)->Account2)+)

    AND LAST_NODE(Account2)-(InterestedIn)->Interest

    <-(InterestedIn2)-Account1)

    AND  Account1.AccountHandle = ''@Cassandra_Villegas''

    AND  Interest.InterestName =  ''Airsofting''

    ```


    The full query, when executed, has the same output for the previous query: two
    rows. If you remove the `WHERE` clause from the outer query, no longer limiting
    the output to `@Tonia_Mueller`, then you will see that `@Willie_Charles` also
    shares the same interest. (Note that example is number 9 in the test rig and example
    queries.)


    ```sql

    ConnectedPath


    @Cassandra_Villegas->@Tonia_Mueller

    @Cassandra_Villegas->@Willie_Charles

    ```


    ### Finding Connections Through Other Nodes


    In these last set of query examples, you are going to do one of the more interesting
    types of queries you will want to do with your graphs, that of connecting nodes
    though relationships with different nodes.


    For example, in the graph, instead of following connections through the `Follows`
    edge, let’s consider them connected when they share an interest. This first query
    gives you first-level connections through Airsofting:


    ```sql

    --10 in test rig

    SELECT Account1.AccountHandle,

    Interest.InterestName,

    Account2.AccountHandle

    FROM   SocialGraph.Account AS Account1

    ,SocialGraph.Account AS Account2

    ,SocialGraph.InterestedIn AS InterestedIn1

    ,SocialGraph.InterestedIn  AS InterestedIn2

    ,SocialGraph.Interest AS Interest

    WHERE  MATCH(Account1-(InterestedIn1)->Interest

    <-(InterestedIn2)-Account2)

    AND  Account1.AccountHandle = ''@Cassandra_Villegas''

    AND  Interest.InterestName = ''Airsofting''

    OPTION (MAXDOP 1);

    ```


    This gives you the first-level connections through edges connecting to Airsofting.
    This result isn’t surprising, and you have done this same before one level away.


    ```sql

    AccountHandle        InterestName   AccountHandle

    -------------------- -------------- -----------------------

    @Cassandra_Villegas  Airsofting     @Tonia_Mueller

    @Cassandra_Villegas  Airsofting     @Willie_Charles

    ```


    Cassandra connects to Tonia and Willie through a shared interest in Airsofting.
    But now what interests do Tonia and Willie share with others? Well, it turns out
    that you can use `SHORTEST_PATH` over these more complex `MATCH` expressions as
    well:


    ```sql

    --11 in test rig

    SELECT Account1.AccountHandle

    + ''->'' +

    STRING_AGG(CONCAT(''('',Interest.InterestName,'')->'',

    Account2.AccountHandle) , ''->'')

    WITHIN GROUP (GRAPH PATH) AS ConnectedPath,

    LAST_VALUE(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS ConnectedToAccountHandle,

    COUNT(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS Level

    FROM   SocialGraph.Account AS Account1

    ,SocialGraph.Account FOR PATH AS Account2

    ,SocialGraph.InterestedIn FOR PATH AS InterestedIn1

    ,SocialGraph.InterestedIn FOR PATH AS InterestedIn2

    ,SocialGraph.Interest FOR PATH AS Interest

    --only fetching 2 levels for testing reasons. This

    --is where tests can get bogged down, so keeping it to

    --only what you want/need is important

    WHERE  MATCH(SHORTEST_PATH(Account1(-(InterestedIn1)->Interest

    <-(InterestedIn2)-Account2){1,2}))

    AND  Account1.AccountHandle = ''@Cassandra_Villegas''

    OPTION (MAXDOP 1);

    GO

    ```


    This returns the following paths:


    ```sql

    ConnectedPath


    @Cassandra_Villegas->(Airsofting)->@Tonia_Mueller

    @Cassandra_Villegas->(Airsofting)->@Cassandra_Villegas

    @Cassandra_Villegas->(Airsofting)->@Willie_Charles

    @Cassandra_Villegas->(Airsofting)->@Tonia_Mueller->(3D printing)

    ->@Gerald_Scott

    @Cassandra_Villegas->(Airsofting)->@Tonia_Mueller->(Air sports)

    ->@Lynn_Escobar

    ```


    This type of solution doesn’t make as much sense in a model like this. One-level
    connection on the same interest does, but the second-level value starts to fade
    unless the interests share a commonality that you did not include in the model.
    You probably want to filter to a category of interest. To do that, you need to
    use a CTE/derived table here:


    ```sql

    ,SocialGraph.Interest FOR PATH AS Interest

    ```


    And use:


    ```sql

    (SELECT *

    FROM SocialGraph.Interest

    WHERE InterestType IN (''Something'',''SomethingElse'') as Interest

    ```


    Where this can be useful is if you have a database like the IMDB database. If
    you want to see who worked with whom, you may have to go one or more edges that
    show that one person worked on a piece of work in some capacity (and you might
    want to limit the connection to type of work, like TV, Movie, or even Genre of
    Horror, Comedy, etc.). You don’t have a direct connection from person to person,
    but you do have this indirect connection indicating a shared experience.


    Beware, however, that when you do this type of query, you are creating a type
    of non-directed graph that you are processing, because if Node1 shares an interest
    with Node2, it follows that Node2 shares an interest with Node1. This will make
    the breadth-first processing blow up quickly so it is best to limit this output
    to a reasonable number of hops if your node and edge counts are high.'
