    ```


    ## 树形输出代码


    在本节中，您将学习一些在处理树结构时很方便的额外技术。每种技术都将被编码到一个对象中，并且（并非巧合地）将成为下一章性能测试代码的基础，届时您将使用比此处所用大得多的数据集。


    这些过程将执行以下操作：


    *   **返回部分树**：这将扩展本章前面创建的 `CompanyHierarchyDisplay` 视图的功能，让您选择起始节点，然后返回位于其下方的节点。

    *   **确定子节点是否存在**：这是在构建安全应用程序时通常需要的一段代码。您需要知道某个节点是否存在于树的任何层级。

    *   **聚合每一级别的子活动**：从根到叶，汇总树中每个节点的所有子节点的销售活动总和。


    ### 返回部分树


    这个返回表的用户定义函数是本章前面创建的视图的扩展。不同之处在于，它允许您从特定节点开始，而不是总是返回整棵树。


    ```sql

    CREATE OR ALTER FUNCTION SqlGraph.Company$ReturnHierarchy

    (

    @CompanyName varchar(20)

    )

    RETURNS @Output TABLE (CompanyId INT, Name VARCHAR(20),

    Level INT, Hierarchy NVARCHAR(4000),

    IdHierarchy NVARCHAR(4000),

    HierarchyDisplay NVARCHAR(4000))

    AS

    BEGIN

    --get the identifier for the node you want to start with

    DECLARE @CompanyId int, @NodeName nvarchar(max)

    SELECT  @CompanyId = CompanyId,

    @Nodename = Name

    FROM   SqlGraph.Company

    WHERE  Name = @CompanyName;

    ;WITH baseRows as

    (

    --include node that you are looking for

    SELECT @companyId as CompanyId, @NodeName as Name,

    1 as Level,

    ''\'' + Cast(@companyId as nvarchar(10)) + ''\'' as

    IdHierarchy, --\ delimited but with id num

    ''\'' + @NodeName AS Hieararchy

    UNION ALL

    SELECT

    LAST_VALUE(ToCompany.CompanyId)

    WITHIN GROUP (GRAPH PATH) AS CompanyId,

    LAST_VALUE(ToCompany.Name)

    WITHIN GROUP (GRAPH PATH) AS NodeName,

    1+COUNT(ToCompany.Name)

    WITHIN GROUP (GRAPH PATH) AS levels,

    ''\'' + CAST(FromCompany.CompanyId as NVARCHAR(10))+

    ''\'' + STRING_AGG(cast(ToCompany.CompanyId as

    nvarchar(10)), ''\'')

    WITHIN GROUP (GRAPH PATH) + ''\'' AS Idhierarchy,

    ''\'' +  FromCompany.NAME + ''\'' +

    STRING_AGG(ToCompany.Name, ''\'')

    WITHIN GROUP (GRAPH PATH) + ''\'' AS hierarchy

    FROM

    SqlGraph.Company AS FromCompany,

    SqlGraph.ReportsTo FOR PATH AS ReportsTo,

    SqlGraph.Company FOR PATH AS ToCompany

    WHERE

    MATCH(SHORTEST_PATH(FromCompany(-(ReportsTo)

    ->ToCompany)+))

    --start the processing from the parameter''s companyId

    AND FromCompany.CompanyId = @companyId

    )

    INSERT INTO @Output

    SELECT *, REPLICATE(''--> '',LEVEL - 1) + Name

    AS HierarchyDisplay

    FROM  BaseRows

    RETURN;

    END;

    ```


    如果您只想查看 `Tennessee HQ` 的数据树，可以使用


    ```sql

    SELECT *

    FROM   SqlGraph.Company$ReturnHierarchy(''Tennessee HQ'');

    ```


    这将返回三行，其输出与仅显示子树的视图相同。'
- fmt: '## Determining If a Child Node Exists


    The following procedure will let you ask, for one company, if this is a child
    of another company row. This is useful in many cases, for example in security
    when you start to have inherited group rights. Then you can see if a user is a
    member of a group at any level of inheritance.


    ```sql

    CREATE OR ALTER FUNCTION SqlGraph.Company$CheckForChild

    (

    @CompanyName varchar(20),

    @CheckForChildOfCompanyName varchar(20)

    )

    RETURNS bit

    AS

    BEGIN

    --get the id value of the company to check for

    DECLARE @CompanyId INT, @ChildFlag BIT = 0;

    SELECT @CompanyId = CompanyId

    FROM   SqlGraph.Company

    WHERE  Name = @CompanyName;

    --get the id of the company to see if it is a child of

    DECLARE @CheckForChildOfCompanyId int;

    SELECT  @CheckForChildOfCompanyId = CompanyId

    FROM   SqlGraph.Company

    WHERE  Name = @CheckForChildOfCompanyName;

    --query the structure

    ;WITH baseRows AS

    (

    --gets the relations to @checkForChildOfCompanyId

    SELECT LAST_VALUE(ToCompany.CompanyId) WITHIN GROUP

    (GRAPH PATH) AS ChildCompanyId

    FROM

    SqlGraph.Company AS FromCompany,

    SqlGraph.ReportsTo FOR PATH AS ReportsTo,

    SqlGraph.Company FOR PATH AS ToCompany

    WHERE  MATCH(SHORTEST_PATH(FromCompany(-(ReportsTo)

    ->ToCompany)+))

    AND FromCompany.CompanyId = @CheckForChildOfCompanyId

    )

    --then filter to see if the passed in row matches

    SELECT @ChildFlag = 1

    FROM  BaseRows

    WHERE childCompanyId = @CompanyId;

    RETURN @ChildFlag;

    END;

    ```


    Knowing the data, you now have (using the new function from the last section)


    ```sql

    SELECT HierarchyDisplay

    FROM   SqlGraph.Company$ReturnHierarchy(''Company HQ'' )

    ORDER BY Hierarchy;

    ```


    that returns


    ```

    HierarchyDisplay


    Company HQ

    --> Maine HQ

    --> --> Portland Branch

    --> --> Camden Branch

    --> Tennessee HQ

    --> --> Nashville Branch

    --> --> Knoxville Branch

    --> --> Memphis Branch

    ```


    You can test the function this way. Check several scenarios with `Camden Branch`
    as the basis:


    ```sql

    SELECT (CASE SqlGraph.Company$CheckForChild

    (''Camden Branch'',''Company HQ'')

    WHEN 1 THEN ''Yes'' ELSE ''No'' END)

    AS Camden_to_Company,

    (CASE SqlGraph.Company$CheckForChild

    (''Camden Branch'',''Maine HQ'')

    WHEN 1 THEN ''Yes'' ELSE ''No'' END) AS Camden_to_Maine,

    (CASE SqlGraph.Company$CheckForChild

    (''Camden Branch'',''Tennessee HQ'')

    WHEN 1 THEN ''Yes'' ELSE ''No'' END)

    AS Camden_to_Tennessee;

    ```


    This returns


    ```

    Camden_to_Company Camden_to_Maine Camden_to_Tennessee

    ----------------- --------------- -------------------

    Yes               Yes             No

    ```


    As you can see, `Camden Branch` is a child to `Company HQ` and `Maine HQ`, but
    not `Tennessee Branch`. In the next chapter, you will use this function on a few
    different implementations of trees to compare how much time each takes in much
    larger trees.


    ## Aggregating Child Activity at Every Level


    The next code to be implement is the ability to aggregate over the tree. For example,
    say you have the following sales figures:


    ```

    Company HQ

    --> Maine HQ

    --> --> Portland Branch  $1

    --> --> Camden Branch    $1

    --> Tennessee HQ

    --> --> Nashville Branch $1

    --> --> Knoxville Branch $1

    --> --> Memphis Branch   $1

    ```


    You need to be able to not only say that the leaf nodes had $1 each sales; you
    also need to say that `Tennessee HQ` had $3 in sales, `Maine` $2, and the overall
    organization had $5 in sales. Looking at the hierarchy in the text above, you
    might think this is a pretty simple operation (and it is, relatively, but it is
    a decent bit of code that needs explanation).


    Just fetch the hierarchy’s lower level, then get the parents and sum up, and then
    the next parents and sum up. The problem is, hierarchies are rarely so balanced
    in the real world and probably not that shallow (most likely, your real scenario
    is going to add in sales staff and their sales, too, which will make for a bit
    more challenging implementation).


    The way to process this is to take a recursive operation and then flip it into
    a relational process.


    The basis of this operation is what I have coined an `expanded hierarchy` (I learned
    the foundational technique in Ralph Kimball’s Data Warehousing course. More about
    the Kimball helper table method in the next chapter.) This is basically taking
    every node that is a parent in the hierarchy and fetching their entire hierarchy.
    It uses code you used before to get all of the children of a row, but instead
    of filtering to one node, you return the hierarchy for *every* node. Then every
    node will have all of their child rows added to the output/table.


    For example, take the following subgraph of the tree:


    ```

    --> Tennessee HQ

    --> --> Nashville Branch $1

    --> --> Knoxville Branch $1

    --> --> Memphis Branch   $1

    ```


    The code is going to output this expanded hierarchy that looks like this:


    ```

    CompanyName           IncludesCompanyName

    --------------------- --------------------

    Tennessee HQ          Tennessee HQ

    Tennessee HQ          Nashville Branch

    Tennessee HQ          Knoxville Branch

    Tennessee HQ          Memphis Branch

    Nashville Branch      Nashville Branch

    Knoxville Branch      Knoxville Branch

    Memphis Branch        Memphis Branch

    ```


    With this set of data, you can join to the activity using the `IncludesCompanyName`
    to get the activity sum, and then you can group by the `CompanyName` column to
    get the sales of the different nodes. The number of rows output by this can be
    considerable, but as you will see in the next chapter, even with 200,000+ nodes,
    it is not too much for even my desktop computer to handle.'
