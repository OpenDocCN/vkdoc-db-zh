    | **11a. 通过兴趣的连接路径（稍高基数，10 级）** | 2284 | 93325 |


    即使返回了 93,000 行并且深度达到 12 层，查找锚定账户相关的所有行的查询也只用了 3 秒。几乎所有查询的表现都足够好，让我可以将此解决方案投入生产（理想情况下，测试时的行数大约是现在的一半！）。


    唯一的例外是通过 `Interest` 关系而不是 `Follows` 关系进行连接。通过另一个节点执行 `SHORTEST_PATH` 绝对是昂贵的，这并不是因为结构本身太差，而是正如之前指出的，更有可能大幅增加处理的行数。在高基数关系上执行此操作成本很高。


    该查询真正有趣的是，当我将其从 2 层增加到 10 层时，执行时间增加了一倍，但返回的行数完全相同，因此它实际上没有找到任何第三层的行。（如果真的有 10
    层，并且匹配数量持续增长，可能需要几个月才能完成。）我尝试以多种方式重写它，每次执行时间都很长。我选择的参数大约有 18,000 个一级行。初始的第一级获取非常快。当我尝试单独进行第二次遍历（这基本上相当于同时处理所有
    18,000 行）时，花费的时间太长，以至于不值得包含在内。


    当然，在这个非常随机的数据集中，中间集合可能类似于 18000 X 18000 行，这是一个很大的数量，考虑到我的 CPU 只是移动级 CPU，我对所经历的一切大多感到满意。


    虽然下载文件的官方更新将发布在 Apress GitHub 仓库 [`https://github.com/Apress/practical-graph-structures`](https://github.com/Apress/practical-graph-structures)
    上，但非官方更新将发布在我对应的 GitHub 仓库中：[`https://github.com/drsqlgithub/GraphBook1`](https://github.com/drsqlgithub/GraphBook1)。我还将通过我的博客分享新的图技术：[`www.red-gate.com/simple-talk/author/louis-davidson/`](http://www.red-gate.com/simple-talk/author/louis-davidson/)。


    ## 性能调优总结


    本书穿插了许多关于在 SQL Server 2022（以及 SQL Server 2019，因为它们在内部非常相似，语法也相同）中使用 SQL Graph
    对象时调优查询的技巧。在本节中，我想在本书结束之前，最后一次回顾我分享的所有技巧。


    ### 测试


    我能分享的最明显的技巧是在投入生产之前进行测试、测试、再测试。对于合理少量的数据，SQL Graph 对象上的查询速度极快。正如我在上一节所展示的，即使在有限的服务器上，大多数典型查询也非常快，即使返回大量行也是如此。使用
    100,000 个账户，仅需几秒钟就能将几乎所有这些账户连接 12 层深。但有一些不易识别的陷阱（即使您遵循了这些部分的其他建议）。


    通过加载比用户实际使用的多得多的数据到您的表中，并运行用户可能运行的所有查询，您可以避免一些可能对性能造成毁灭性影响的情况。


    ### 为内部列创建索引


    尽管关于索引的一般建议是谨慎添加过多索引，但对于 SQL Graph 对象，在某种程度上不要吝啬使用它们（例如不要多次应用相同的索引！）。虽然伪列起初看起来有些神秘，但它们默认并未针对您可能执行的最常见操作进行索引。提醒一下，它们代表一个
    4 字节整数（表的 `object_id`）和一个 8 字节整数值（内部图代理键值）。


    创建节点和边对象时，对象上会有一些内部索引，但这通常是不够的。没有任何内部索引是聚集索引，因此在测试查询时，请考虑您常用的路径并相应地建立索引。


    当您无法对索引进行聚类时，考虑在使用伪列的一些索引上使用 `INCLUDE`，以避免书签查找。我没有花时间在查询计划上，因为与关系对象上的查询计划相比，它们目前难以解读（计划看起来是线性的，但正如我所介绍的，算法实际上是迭代/递归的，并不很好地映射到当前的查询计划格式）。但是，在
    `$to_id`（以及非树对象的 `$from_id`）上建立索引对于充分利用查询至关重要。


    您还可以在节点对象上索引 `$node_id`，甚至可以根据数据的访问方式对其进行聚类。关键是要考虑您如何使用对象并相应地调整（当然，还要进行测试）。


    ### 采用最大并行度为 1


    优化 SQL Graph 查询所需的最奇怪的事情之一是，当涉及大量数据时，需要消除并行性。我不太确定为什么在 SQL Server 2022 中没有将其设置为
    SQL Graph 查询的默认值。但在我的测试中，我经常遇到查询运行 24 小时后除了让我的测试电脑风扇狂转外没有明显进展的情况。设置 `OPTION (MAXDOP
    1)` 后，查询可能需要 20 秒或 20 分钟，但会在值得等待的时间内完成。这不是一个完美的解决方案，因为有时您仍然会遇到需要许多小时并且似乎无法完成的查询。

    '
- fmt: '### Consider Breaking Up Some Queries


    A piece of general SQL Server tuning advice is that when queries take a long time
    and you can’t figure out why, try rewriting them some way to make them work as
    you wish. This will help you find your performance issues, and on slightly rare
    occasions, it will be the best solution anyhow.


    Find sections of the code that you can get to execute quickly and save results
    into a temporary table. Sometimes you may need to save off millions of rows over
    and over, but once you get data saved off into a temp table, you may find that
    the query is much faster. Sometimes it might seem like a lot of data to save off,
    but SQL Server’s engine may actually be doing the same thing anyhow.


    Earlier in this chapter, I included examples when I moved filtering from the main
    query to a temp table. In my most recent examples, it hasn’t really changed the
    performance much; in fact, it was a tiny bit slower in some of these examples.
    But if the base query starts to fail in performance, you can break it down into
    sections and try to optimize the query.


    Writing a query optimizer is a very complex thing and optimizing for every case
    that a user may think of can be complex. On the good side, though, most of the
    queries you would use in a typical OLTP system will not require traversing many
    levels of the structure. The less data you need to access, the more complex the
    queries can be without it being complicated.


    And most queries in a data warehouse can be either waited on, or you can use something
    like the helper objects introduced in Chapter [6](#508094_1_En_6_Chapter.xhtml).


    ## The End (or Is It the Beginning?)


    While I may not have covered everything you will want to do with a graph, as there
    are many different uses you will have for a graph that I could not imagine, it
    is all I will cover in this edition of the book.


    Microsoft SQL Server has had a graph implementation for five years now, and it
    is improving incrementally each edition. SQL Server 2022 had no outward indication
    of differences, but I understand there were some internal changes (though no indication
    of what they might be, or if there will be more in the future.)


    There are many limitations to the product right now. There are still things like
    having to use `MAXDOP 1` when using very large data sets that do plague the implementation
    today. There are a lot of limitations to the syntax, which I have mentioned, and
    if you don’t remember them now, you will once you start coding.


    SQL Server’s graph implementation is not ready to be a replacement for purely
    graph databases, but it is a very nice extension to one of the best relational
    engines to help you extend your databases with graph elements, for example when
    a simple many-to-many relationship won’t do, or if you want to look at all the
    many connections between your data, often by transforming relational tables into
    graph tables for analysts.


