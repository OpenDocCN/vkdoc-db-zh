  trans: '### 加载数据


    在本节中，我将简要说明如何加载随机数据。在第 8 章的下载文件中，有两个用于加载随机数据集的文件。每个文件都包含多个`:SETVAR`命令，用于创建`SQLCMD`变量。第一个文件将数据加载到表中，以实现如图
    8-2 所示的数据。


    ![](img/508094_1_En_8_Fig2_HTML.jpg)


    一张网络图，显示了通过共同兴趣和社交联系连接起来的具有不同兴趣的人们。兴趣包括：软气枪、软气枪运动、表演、3D 打印、飞机观测、喷笔绘画、航空模型和航空运动，这些兴趣连接到
    5 个账户。


    图 8-2


    本章示例查询的图表


    颜色较深的节点（如果是电子书则为黄色）是`Account`（账户）节点，未着色的是`Interest`（兴趣）节点（在电子书中仍未着色！）。我使用以下参数生成了这些数据：


    ```

    :SETVAR SeedValue 259906607

    --最大值 100000

    :SETVAR AccountCount 5

    --最大值 434

    :SETVAR InterestCount 8

    :SETVAR FollowsCount 20

    :SETVAR MaxInterestPerAccount 8

    ```


    如果使用相同的`SeedValue`和参数，每次运行该文件中的查询，你都会得到相同的输出。如果更改这些值，结果会不同。我建议，通常如果要更改值，最好也更改种子值。否则，你的数据可能在多次测试中包含相似之处，从而造成混淆。


    关于关注和兴趣，`AccountCount`和`InterestCount`值用于调整节点数量。`FollowsCount`告诉你会创建多少行`Follows`边，而`MaxInterestPerAccount`则调整每个账户可能具有的`Interests`数量。如果该值为
    10，那么每个账户将有 0 到 10 个兴趣。


    如果你直接执行随机数据脚本中的整个批处理，有几处输出有助于你感受数据集。例如，其中一个输出如下（为清晰起见，我从输出中删除了`$node_id`列）：


    ```

    AccountHandle                  Froms       Tos

    ------------------------------ ----------- -----------

    @Cassandra_Villegas            3           0

    @Tonia_Mueller                 2           1

    @Gerald_Scott                  2           2

    @Lynn_Escobar                  1           3

    @Willie_Charles                1           3

    ```


    这让你可以看到，有三个账户，其中`@Cassandra_Villegas`正在关注其他账户（这使它成为许多查询的一个很好的锚点节点）。当我加载大型随机集后执行此查询时，前五行（共
    100,000 行）如下所示：


    ```

    AccountHandle                  Froms        Tos

    ------------------------------ ------------ ------

    @Bryant_Huber                  10           10

    @Sheila_Sherman                9            11

    @Stacy_Charles                 13           7

    @Angelica_O''Neill              7            12

    @Armando_Swanson               9            10

    ```


    这构成了一个相当有趣的图来进行处理。下载文件中包含一组我用于本章非性能测试部分的参数，这些参数只有与图 8-1 匹配的几个账户。


    ### 查询


    在接下来的章节中，我将介绍一系列你可能希望在循环图中对高度连接的数据执行的查询。这些也是测试框架中执行的查询，用于测试具有大量数据的数据结构。


    #### 查找与特定节点相连的所有节点


    在图 8-1 中，你可以看到一些有趣的关系。`@Cassandra_Villegas`直接连接到另外三个账户，并通过所有其他路径连接到另一个存在的账户节点。在下面的查询中，你可以看到这一点：


    ```

    --1 在测试框架中（对应于测试框架文件中的查询，

    --可用于使用你想要尝试的参数运行所有查询

    --被搜索项所连接到的项

    SELECT LAST_VALUE(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS ConnectedToAccountHandle,

    --在结构中的距离

    COUNT(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS LEVEL,

    --所采取的路径

    STRING_AGG(Account2.AccountHandle, ''->'')

    WITHIN GROUP (GRAPH PATH) AS ConnectedPath

    FROM   SocialGraph.Account AS Account1

    ,SocialGraph.Account FOR PATH AS Account2

    ,SocialGraph.Follows FOR PATH AS Follows

    WHERE  MATCH(SHORTEST_PATH(Account1(-(Follows)->Account2)+))

    AND  Account1.AccountHandle = ''@Cassandra_Villegas''

    ORDER BY ConnectedPath

    OPTION (MAXDOP 1); --较大的数据集可能导致使用 MATCH（尤其是 SHORTEST_PATH）的查询

    --在并行处理发生时持续旋转。

    ```


    正如你在本书到目前为止的许多结果中所见，`@Lynn_Escobar`只出现一次，因为`SHORTEST_PATH`只给你一条路径。查看图 8-2，节点之间存在多条连接。


    ```

    ConnectedToAccountHandle  LEVEL  ConnectedPath

    ------------------------- ------ -------------------------------

    @Gerald_Scott             1      @Gerald_Scott

    @Tonia_Mueller            1      @Tonia_Mueller

    @Lynn_Escobar             2      @Tonia_Mueller->@Lynn_Escobar

    @Willie_Charles           1      @Willie_Charles

    ```


    在本章后面，我将演示如何获取所有路径，这与第 7 章中的方法类似，但对于循环数据结构略有不同。然而，这种方法通常更适用于当你已知两个节点是相连的，并且现在想查看它们有哪些连接方式的情况。


    例如，假设`@Cassandra_Villegas`正试图向`Lynn_Escobar`出售某物。如果出于某种原因他们不想通过`Tonia_Mueller`，那么查看所有路径可能有用。对于非常大的图（尤其是当你不只是想测试系统处理能力时），最好将`MATCH(SHORTEST_PATH)`条件中的`+`改为比“所有”更小的范围。在高度连接的图中，你可能很容易与几乎所有人相连。（例如，在
    LinkedIn 上查看每个人是否都与其他人相连会很有趣，当然即使是在 100 层之外。）


    在我能想到的几乎所有场景中，即使在学术上，知道一个用户通过二十或五十个节点的路径与另一个用户相连，也没有任何实际价值。


    请注意，我在查询中添加了`OPTION (MAXDOP 1)`。这是在使用 SQL Server 图功能调整查询时可能需要做的主要事项之一。即使在 SQL
    Server 2022 中，当`SHORTEST_PATH`查询访问大量行时，性能也可能出现问题。显然，在本章前半部分，数据规模较小，但当你尝试访问更多行的查询时（下载中包含一个用于加载此架构并包含大量数据的脚本），如果不设置`MAXDOP
    1`，某些查询可能运行 24 小时也没有进展。


    在本书提供的所有建议中，如果你使用的是 SQL Server 2022 之后的版本，这个提示是需要检查的一点。'
- fmt: '## Seeing If One Node is Connected to Another


    In the next query, let’s first explore that question of filtering your query to
    see if two nodes connect. The most typical way is to use a CTE to represent all
    connections to the account and then filter it in the CTE:


    ```sql

    --2 in test rig

    WITH BaseRows AS (

    SELECT Account1.AccountHandle + ''->'' +

    STRING_AGG(Account2.AccountHandle, ''->'')

    WITHIN GROUP (GRAPH PATH) AS ConnectedPath,

    LAST_VALUE(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS ConnectedToAccountHandle,

    COUNT(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS Level

    FROM   SocialGraph.Account AS Account1

    ,SocialGraph.Account FOR PATH AS Account2

    ,SocialGraph.Follows FOR PATH AS Follows

    WHERE  MATCH(SHORTEST_PATH(Account1(-(Follows)->Account2)+))

    --starting point

    AND  Account1.AccountHandle = ''@Cassandra_Villegas''

    )

    SELECT *

    FROM   BaseRows

    --is the starting point connected to:

    WHERE  ConnectedToAccountHandle = ''@Lynn_Escobar''

    OPTION (MAXDOP 1);

    ```


    This returns the following. (I only output the `ConnectedPath` in the book, even
    when there are more columns just for formatting sake. Everything in the rest of
    the output can be visually extrapolated from the path.)


    ```text

    ConnectedPath


    @Cassandra_Villegas->@Tonia_Mueller->@Lynn_Escobar

    ```


    In some cases, I have found that filtering in the query itself can be troublesome.
    So, it can be useful to just save off the contents of the baserows into a temp
    table like this:


    ```sql

    DROP TABLE IF EXISTS #hold

    --3 in test rig

    SELECT Account1.AccountHandle + ''->'' +

    STRING_AGG(Account2.AccountHandle, ''->'')

    WITHIN GROUP (GRAPH PATH) AS ConnectedPath,

    LAST_VALUE(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS ConnectedToAccountHandle,

    COUNT(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS Level

    INTO #hold

    FROM   SocialGraph.Account AS Account1

    ,SocialGraph.Account FOR PATH AS Account2

    ,SocialGraph.Follows FOR PATH AS Follows

    WHERE  MATCH(SHORTEST_PATH(Account1(-(Follows)->Account2)+))

    AND  Account1.AccountHandle = ''@Cassandra_Villegas''

    ORDER BY ConnectedPath

    OPTION (MAXDOP 1);

    SELECT *

    FROM   #hold

    WHERE  ConnectedToAccountHandle = ''@Lynn_Escobar'';

    ```


    This has the same output and may have the same performance as the CTE. But like
    any SQL queries, when the data sizes get very large, it can help to give the optimizer
    a hand and split the queries up.


    Both versions of this query appear in the test rig to compare the performance
    of them both.


    ## Returning All Paths Between Two Nodes


    While it is often useful just to know that you are connected to a person, it may
    also be interesting to know the multiple ways you are connected. There are a few
    ways of doing this.


    For example, for the first two levels, you can write two `SELECT` statements.
    One is for the direct connections. The other is for second level connections.
    `UNION` them together and you can see two levels of connection.


    ```sql

    --4

    SELECT  1 AS Level, '''' AS ConnectedThrough, Account2.AccountHandle

    FROM    SocialGraph.Account AS Account1,

    SocialGraph.Follows,

    SocialGraph.Account AS Account2

    WHERE   MATCH(Account1-(Follows)->Account2)

    AND   Account1.AccountHandle = ''@Cassandra_Villegas''

    AND   Account2.AccountHandle = ''@Lynn_Escobar''

    UNION ALL

    SELECT  2 AS Level, Account2.AccountHandle AS ConnectedThrough, Account3.AccountHandle

    FROM    SocialGraph.Account AS Account1,

    SocialGraph.Follows,

    SocialGraph.Account AS Account2,

    SocialGraph.Follows AS Follows2,

    SocialGraph.Account AS Account3

    WHERE   MATCH(Account1-(Follows)->Account2-(Follows2)->Account3)

    AND   Account1.AccountHandle = ''@Cassandra_Villegas''

    AND   Account3.AccountHandle = ''@Lynn_Escobar''

    ORDER BY AccountHandle;

    ```


    This returns


    ```text

    Level       ConnectedThrough               AccountHandle

    ----------- ------------------------------ ---------------

    2           @Tonia_Mueller                 @Lynn_Escobar

    2           @Willie_Charles                @Lynn_Escobar

    2           @Gerald_Scott                  @Lynn_Escobar

    ```


    There are no one-level connections between `@Cassandra_Villegas` and `@Lynn_Escobar`,
    but there are three two-level connections.


    On the one hand, this is quite tedious to write, particularly if you need to do
    this many more levels. On the other hand, this probably will perform quite nicely
    because it really is just a few joins through the edge. I didn’t opt to test for
    10-20 level paths because it is so tedious to write.


    If you want to see all paths for all levels, you need to use a recursive CTE.
    It is a fairly essential skill because generally you may need to see all the paths
    between two nodes, which was something you also needed in the previous chapter
    with the DAG implementation of a bill of materials.


    The biggest difference between earlier examples is that you are dealing with a
    cyclical structure. The thing you must add to the recursive query is to stop the
    recursion when you hit any cycles in the output. Back in Figure [8-1](#508094_1_En_8_Chapter.xhtml#Fig1),
    you can see that `@Willie_Charles` and `@Lynn_Escobar` follow each other.


    Note that this was also covered back in Chapter [3](#508094_1_En_3_Chapter.xhtml),
    but I am including here again because it fits and you will want to test it with
    this dataset.


    You can write the following query, filtering for the one account where you want
    to see how they connect. I also limited the output to five levels:'
  raw: '#### Seeing If One Node is Connected to Another


    In the next query, let’s first explore that question of filtering your query to
    see if two nodes connect. The most typical way is to use a CTE to represent all
    connections to the account and then filter it in the CTE:


    ```

    --2 in test rig

    WITH BaseRows AS (

    SELECT Account1.AccountHandle + ''->'' +

    STRING_AGG(Account2.AccountHandle, ''->'')

    WITHIN GROUP (GRAPH PATH) AS ConnectedPath,

    LAST_VALUE(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS ConnectedToAccountHandle,

    COUNT(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS Level

    FROM   SocialGraph.Account AS Account1

    ,SocialGraph.Account FOR PATH AS Account2

    ,SocialGraph.Follows FOR PATH AS Follows

    WHERE  MATCH(SHORTEST_PATH(Account1(-(Follows)->Account2)+))

    --starting point

    AND  Account1.AccountHandle = ''@Cassandra_Villegas''

    )

    SELECT *

    FROM   BaseRows

    --is the starting point connected to:

    WHERE  ConnectedToAccountHandle = ''@Lynn_Escobar''

    OPTION (MAXDOP 1);

    ```


    This returns the following. (I only output the `ConnectedPath` in the book, even
    when there are more columns just for formatting sake. Everything in the rest of
    the output can be visually extrapolated from the path.)


    ```

    ConnectedPath


    @Cassandra_Villegas->@Tonia_Mueller->@Lynn_Escobar

    ```


    In some cases, I have found that filtering in the query itself can be troublesome.
    So, it can be useful to just save off the contents of the baserows into a temp
    table like this:


    ```

    DROP TABLE IF EXISTS #hold

    --3 in test rig

    SELECT Account1.AccountHandle + ''->'' +

    STRING_AGG(Account2.AccountHandle, ''->'')

    WITHIN GROUP (GRAPH PATH) AS ConnectedPath,

    LAST_VALUE(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS ConnectedToAccountHandle,

    COUNT(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS Level

    INTO #hold

    FROM   SocialGraph.Account AS Account1

    ,SocialGraph.Account FOR PATH AS Account2

    ,SocialGraph.Follows FOR PATH AS Follows

    WHERE  MATCH(SHORTEST_PATH(Account1(-(Follows)->Account2)+))

    AND  Account1.AccountHandle = ''@Cassandra_Villegas''

    ORDER BY ConnectedPath

    OPTION (MAXDOP 1);

    SELECT *

    FROM   #hold

    WHERE  ConnectedToAccountHandle = ''@Lynn_Escobar'';

    ```


    This has the same output and may have the same performance as the CTE. But like
    any SQL queries, when the data sizes get very large, it can help to give the optimizer
    a hand and split the queries up.


    Both versions of this query appear in the test rig to compare the performance
    of them both.


    #### Returning All Paths Between Two Nodes


    While it is often useful just to know that you are connected to a person, it may
    also be interesting to know the multiple ways you are connected. There are a few
    ways of doing this.


    For example, for the first two levels, you can write two `SELECT` statements.
    One is for the direct connections. The other is for second level connections.
    `UNION` them together and you can see two levels of connection.


    ```

    --4

    SELECT  1 AS Level, '''' AS ConnectedThrough, Account2.AccountHandle

    FROM    SocialGraph.Account AS Account1,

    SocialGraph.Follows,

    SocialGraph.Account AS Account2

    WHERE   MATCH(Account1-(Follows)->Account2)

    AND   Account1.AccountHandle = ''@Cassandra_Villegas''

    AND   Account2.AccountHandle = ''@Lynn_Escobar''

    UNION ALL

    SELECT  2 AS Level, Account2.AccountHandle AS ConnectedThrough, Account3.AccountHandle

    FROM    SocialGraph.Account AS Account1,

    SocialGraph.Follows,

    SocialGraph.Account AS Account2,

    SocialGraph.Follows AS Follows2,

    SocialGraph.Account AS Account3

    WHERE   MATCH(Account1-(Follows)->Account2-(Follows2)->Account3)

    AND   Account1.AccountHandle = ''@Cassandra_Villegas''

    AND   Account3.AccountHandle = ''@Lynn_Escobar''

    ORDER BY AccountHandle;

    ```


    This returns


    ```

    Level       ConnectedThrough               AccountHandle

    ----------- ------------------------------ ---------------

    2           @Tonia_Mueller                 @Lynn_Escobar

    2           @Willie_Charles                @Lynn_Escobar

    2           @Gerald_Scott                  @Lynn_Escobar

    ```


    There are no one-level connections between `@Cassandra_Villegas` and `@Lynn_Escobar`,
    but there are three two-level connections.


    On the one hand, this is quite tedious to write, particularly if you need to do
    this many more levels. On the other hand, this probably will perform quite nicely
    because it really is just a few joins through the edge. I didn’t opt to test for
    10-20 level paths because it is so tedious to write.


    If you want to see **all** paths for **all** levels, you need to use a recursive
    CTE. It is a fairly essential skill because generally you may need to see all
    the paths between two nodes, which was something you also needed in the previous
    chapter with the DAG implementation of a bill of materials.


    The biggest difference between earlier examples is that you are dealing with a
    cyclical structure. The thing you must add to the recursive query is to stop the
    recursion when you hit any cycles in the output. Back in Figure [8-1](#508094_1_En_8_Chapter.xhtml#Fig1),
    you can see that `@Willie_Charles` and `@Lynn_Escobar` follow each other.


    Note that this was also covered back in Chapter [3](#508094_1_En_3_Chapter.xhtml),
    but I am including here again because it fits and you will want to test it with
    this dataset.


    You can write the following query, filtering for the one account where you want
    to see how they connect. I also limited the output to five levels:'
  trans: '## 检查一个节点是否与另一个节点相连


    在接下来的查询中，我们首先探索一下如何过滤你的查询，以查看两个节点是否相连。最典型的方式是使用一个 CTE 来表示到某个账户的所有连接，然后在 CTE 中对其进行过滤：


    ```sql

    --2 测试框架中

    WITH BaseRows AS (

    SELECT Account1.AccountHandle + ''->'' +

    STRING_AGG(Account2.AccountHandle, ''->'')

    WITHIN GROUP (GRAPH PATH) AS ConnectedPath,

    LAST_VALUE(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS ConnectedToAccountHandle,

    COUNT(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS Level

    FROM   SocialGraph.Account AS Account1

    ,SocialGraph.Account FOR PATH AS Account2

    ,SocialGraph.Follows FOR PATH AS Follows

    WHERE  MATCH(SHORTEST_PATH(Account1(-(Follows)->Account2)+))

    --起始点

    AND  Account1.AccountHandle = ''@Cassandra_Villegas''

    )

    SELECT *

    FROM   BaseRows

    --起始点是否连接到：

    WHERE  ConnectedToAccountHandle = ''@Lynn_Escobar''

    OPTION (MAXDOP 1);

    ```


    这将返回以下结果。（为了排版整洁，即使有更多列，在书中我只输出了 `ConnectedPath`。输出结果中的其余信息都可以从这个路径中直观地推断出来。）


    ```text

    ConnectedPath


    @Cassandra_Villegas->@Tonia_Mueller->@Lynn_Escobar

    ```


    在某些情况下，我发现直接在查询中进行过滤可能会很麻烦。因此，像这样将 basrows 的内容保存到一个临时表中会很有用：


    ```sql

    DROP TABLE IF EXISTS #hold

    --3 测试框架中

    SELECT Account1.AccountHandle + ''->'' +

    STRING_AGG(Account2.AccountHandle, ''->'')

    WITHIN GROUP (GRAPH PATH) AS ConnectedPath,

    LAST_VALUE(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS ConnectedToAccountHandle,

    COUNT(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS Level

    INTO #hold

    FROM   SocialGraph.Account AS Account1

    ,SocialGraph.Account FOR PATH AS Account2

    ,SocialGraph.Follows FOR PATH AS Follows

    WHERE  MATCH(SHORTEST_PATH(Account1(-(Follows)->Account2)+))

    AND  Account1.AccountHandle = ''@Cassandra_Villegas''

    ORDER BY ConnectedPath

    OPTION (MAXDOP 1);

    SELECT *

    FROM   #hold

    WHERE  ConnectedToAccountHandle = ''@Lynn_Escobar'';

    ```


    它的输出结果与 CTE 版本相同，并且性能也可能一样。但就像任何 SQL 查询一样，当数据规模变得非常大时，帮助优化器一把，将查询拆分开可能会有所帮助。


    测试框架中包含了这个查询的两个版本，以便比较它们的性能。


    ## 返回两个节点之间的所有路径


    虽然通常知道你与某个人是连接的就很有用，但了解你们之间有哪些多种连接方式可能也很有趣。有几种方法可以实现这一点。


    例如，对于前两级，你可以编写两个 `SELECT` 语句。一个是直接连接，另一个是第二级连接。用 `UNION` 将它们组合在一起，你就可以看到两级连接。


    ```sql

    --4

    SELECT  1 AS Level, '''' AS ConnectedThrough, Account2.AccountHandle

    FROM    SocialGraph.Account AS Account1,

    SocialGraph.Follows,

    SocialGraph.Account AS Account2

    WHERE   MATCH(Account1-(Follows)->Account2)

    AND   Account1.AccountHandle = ''@Cassandra_Villegas''

    AND   Account2.AccountHandle = ''@Lynn_Escobar''

    UNION ALL

    SELECT  2 AS Level, Account2.AccountHandle AS ConnectedThrough, Account3.AccountHandle

    FROM    SocialGraph.Account AS Account1,

    SocialGraph.Follows,

    SocialGraph.Account AS Account2,

    SocialGraph.Follows AS Follows2,

    SocialGraph.Account AS Account3

    WHERE   MATCH(Account1-(Follows)->Account2-(Follows2)->Account3)

    AND   Account1.AccountHandle = ''@Cassandra_Villegas''

    AND   Account3.AccountHandle = ''@Lynn_Escobar''

    ORDER BY AccountHandle;

    ```


    这将返回


    ```text

    Level       ConnectedThrough               AccountHandle

    ----------- ------------------------------ ---------------

    2           @Tonia_Mueller                 @Lynn_Escobar

    2           @Willie_Charles                @Lynn_Escobar

    2           @Gerald_Scott                  @Lynn_Escobar

    ```


    `@Cassandra_Villegas` 和 `@Lynn_Escobar` 之间没有一级连接，但有三个二级连接。


    一方面，这种写法相当繁琐，特别是如果你需要这样做更多级的时候。另一方面，它的性能可能相当好，因为它实际上只是几个通过边进行的连接。我没有选择测试 10-20
    级的路径，因为写起来太繁琐了。


    如果你想查看所有级别的所有路径，你需要使用一个递归 CTE。这是一项相当重要的技能，因为通常你可能需要查看两个节点之间的所有路径，这在上一章使用有向无环图实现物料清单时也是需要的。


    与前面例子最大的区别在于你正在处理一个循环结构。你必须在递归查询中添加的是，当在输出中遇到任何环时停止递归。回到图 8-1，你可以看到 `@Willie_Charles`
    和 `@Lynn_Escobar` 互相关注。


    请注意，这在第 3 章中已经介绍过，但我在这里再次提及是因为它很贴合，你会想用这个数据集来测试它。


    你可以编写以下查询，筛选出你想查看其连接方式的那个特定账户。我还把输出限制在了五级：'
- fmt: '## 优化查询与递归停止条件


    执行以下代码：


    ```sql

    --Getting the same answer as the last example

    --5 in test rig

    DECLARE @MaxLevel int =5,

    @AccountHandle nvarchar(30) = ''@Cassandra_Villegas'',

    @DetermineHowConnected nvarchar(30) =

    ''@Lynn_Escobar'';

    WITH BaseRows

    AS (

    --the CTE anchor is just the starting node

    SELECT Account.AccountHandle AS AccountHandle,

    Account.AccountHandle AS FollowsAccountHandle,

    --the path that contains the readable path we have

    --built in all examples with the anchor included

    CAST(''\'' + Account.AccountHandle + ''\''

    AS nvarchar(4000)) AS Path,

    0 AS level –the level

    FROM SocialGraph.Account

    WHERE Account.AccountHandle = @AccountHandle

    UNION ALL

    --pretty typical 1 level graph query:

    SELECT  Account.AccountHandle,

    FollowedAccount.AccountHandle

    AS FollowsAccountHandle,

    BaseRows.Path + FollowedAccount.AccountHandle + ''\'',

    BaseRows.level + 1

    FROM SocialGraph.Account,

    SocialGraph.Follows,

    SocialGraph.Account AS FollowedAccount,

    BaseRows

    WHERE MATCH(Account-(Follows)->FollowedAccount)

    --this joins the anchor to the recursive

    --part of the query

    AND BaseRows.FollowsAccountHandle =

    Account.AccountHandle

    --this is the part that stops recursion, treating the

    --string value like an array

    AND NOT BaseRows.Path LIKE CONCAT(''%\'',

    FollowedAccount.AccountHandle, ''\%'')

    AND BaseRows.level < @MaxLevel

    )

    SELECT Path –for space reasons only

    FROM BaseRows

    WHERE FollowsAccountHandle = @DetermineHowConnected

    ORDER BY Path;

    ```


    执行此代码将返回以下结果：


    ```

    Path

    \@Cassandra_Villegas\@Gerald_Scott\@Lynn_Escobar\

    \@Cassandra_Villegas\@Gerald_Scott\@Willie_Charles\@Lynn_Escobar\

    \@Cassandra_Villegas\@Tonia_Mueller\@Gerald_Scott\@Lynn_Escobar\

    \@Cassandra_Villegas\@Tonia_Mueller\@Gerald_Scott\@Willie_Charles

    \@Lynn_Escobar\

    \@Cassandra_Villegas\@Tonia_Mueller\@Lynn_Escobar\

    \@Cassandra_Villegas\@Willie_Charles\@Lynn_Escobar\

    ```


    可以看到，在结果中有三行是两跳远，这与之前`UNION`查询的结果一致，但还有更多的路径从你搜索的行连接到你正在匹配的行。


    从那里，你可以使用`level`或`path`对输出进行过滤/排序。例如，将上一个查询的`where`子句更改为包含


    ```sql

    AND Path like ''_%\@Tonia_Mueller\%_''

    ```


    现在，查询只获取经过`@Tonia_Mueller`的路径。


    停止递归的代码部分是


    ```sql

    AND NOT BaseRows.Path LIKE CONCAT(''%\'',

    FollowedAccount.AccountHandle, ''\%'')

    ```


    它通过将循环中的当前路径与`LIKE`表达式进行比较来实现这一点。该`LIKE`表达式获取查询中的当前节点，并在其周围添加字符，以便如果它在路径中，你就可以停止处理。因此，如果路径是`''\1\2\''`，下一个节点是3，你会得到`''\1\2\3\''
    LIKE ''%\3\%''`。这是关系数据库的局限性之一：没有数组（这是我唯一几次认为数组会有用的情况之一）。我知道其他关系数据库管理系统（RDBMS）有数组，但我预计它们在大多数使用中都会有问题。


    缺乏数组意味着你将使用字符串中的数据作为分隔列表，并查看当前节点是否已存在于该路径中。


    ## Finding All People That a User Connects To At Any Level Where They Share an
    Interest


    图查询语法真正开始大放异彩的地方是通过更多的节点发现更多的连接。在这种情况下，你希望找到在任何层级上相互连接、并且都对`Aircraft Spotting`感兴趣的用户。Cassandra目前没有记录这个兴趣，但在这个特定示例中，他们是否有此兴趣并不重要。这里的想法可能是Cassandra有兴趣开始从事`Aircraft
    Spotting`，并想看看是否有任何联系人已经对此感兴趣。


    要实现这一点，使用`LAST_NODE`获取链中的最后一个节点，然后将这些节点与他们的兴趣进行匹配，以查看是否包含`Aircraft Spotting`：


    ```sql

    --6 in test rig

    ----any level connection and connections have a specific interest

    SELECT Account1.AccountHandle + ''->'' +

    STRING_AGG(Account2.AccountHandle, ''->'')

    WITHIN GROUP (GRAPH PATH) AS ConnectedPath,

    LAST_VALUE(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS ConnectedToAccountHandle,

    COUNT(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS LEVEL,

    Interest.InterestName

    FROM   SocialGraph.Account AS Account1

    ,SocialGraph.Account FOR PATH AS Account2

    ,SocialGraph.Follows FOR PATH AS Follows

    ,SocialGraph.InterestedIn

    ,SocialGraph.Interest

    --This finds people that the searched for person follows

    WHERE  MATCH(SHORTEST_PATH(Account1(-(Follows)->Account2)+)

    --and this takes every matched node (the last node in the chain

    --and sees if they are connected to Interest

    AND LAST_NODE(Account2)-(InterestedIn)->Interest)

    --The next two lines filter the results;

    AND  Account1.AccountHandle = ''@Cassandra_Villegas''

    AND  Interest.InterestName = ''Aircraft Spotting''

    ORDER BY ConnectedPath

    OPTION (MAXDOP 1);

    ```


    这将返回（出于空间原因仅包含路径）


    ```

    ConnectedPath

    @Cassandra_Villegas->@Tonia_Mueller

    @Cassandra_Villegas->@Tonia_Mueller->@Lynn_Escobar

    @Cassandra_Villegas->@Willie_Charles

    ```


    在图[8-2](#508094_1_En_8_Chapter.xhtml#Fig2)上追踪这些连接，你会发现这三个人都喜欢`Aircraft Spotting`，并且都关注了`@Cassandra_Villegas`。这类查询正是像营销人员这样的人可以开始精确定位目标群体的方式，通过与你相似的人、或你喜欢的人、以及共享兴趣或购买记录的人来吸引你，甚至可能匹配你搜索过的内容。


    这类查询通常不会深入到结构的太深处，因为离锚节点越远，建议的吸引力就越小。（谁没有在亚马逊上收到过“与你相似的人”购买的、让你摸不着头脑的产品建议呢？）'
