    Finding ways to output the hierarchy in a readable format is a large part of the
    battle of working with graph functionality, since there are really no easy ways
    to output the data graphically. `SHORTEST_PATH` works perfectly for tree structures
    because every node can appear exactly once in the output. In the last two chapters
    of the book, I cover the limitations of `SHORTEST_PATH` that we have to deal with
    in cyclic graphs, but for trees it is perfect because the shortest path from one
    node to another is, by definition, always one path.


