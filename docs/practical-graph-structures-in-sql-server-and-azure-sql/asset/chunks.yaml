    and [2-15](#508094_1_En_2_Chapter.xhtml#Fig15).


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig15_HTML.jpg)


    A graphic structure. A cyclic link between nodes, Fred, Larry, Felicity, Linda,
    and Cindy, with a short broad arrow over the links. Felicity links to Cindy, Cindy
    to Geoff, and Geoff to Linda.


    Figure 2-15


    Cycle from Fred -> Larry -> Felicity -> Linda -> Cindy -> Fred


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig14_HTML.jpg)


    A cyclic link between nodes, Fred, Larry, Felicity, and Cindy. There are short
    broad arrows over the links.


    Figure 2-14


    Cycle from Fred -> Larry -> Felicity -> Cindy -> Fred


    Each of these cycles back to Fred, so you have an obvious stopping point.


    You have also now touched the Cindy node twice. This isn’t necessarily a cycle
    because you have hit the same node twice. However, it does mean that you will
    begin repeating results because the subsequent tree traversal is always the same after
    repeated nodes. Generally, you want to terminate one of the processing paths because
    it will yield repeated results and wasted processing time.


    Note


    I won’t delve into it in this chapter, but in a diagram like this, the edges could
    be defined differently. Fred -> Larry could be Likes, and Larry -> Felicity could
    be Dislikes. Whether this is a cycle or not can be up to how you need to traverse
    the structure.


    But in Figure [2-16](#508094_1_En_2_Chapter.xhtml#Fig16), this cycle is more of
    a challenge.


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig16_HTML.jpg)


    A graphic structure. A cyclic link between nodes, Fred, Larry, Felicity, and Cindy,
    and Felicity links to Linda. A cyclic link between Linda, Cindy, and Geoff with
    a short broad arrow over the links.


    Figure 2-16


    Cycle from Cindy -> Geoff -> Linda -> Cindy, not back to the starting node


    Now not only do you need to make sure to stop processing when you cycle back to
    the starting node, but also anywhere in the graph. (Note that this was not an
    issue when you were looking for cycles in the directed graph because you were
    only dealing with adding an edge.) If you start to add many edges at a time, you
    may also need to be aware of these kinds of eternal loops that could arise in
    processing.


    This all leads to the most common operation with a network like this, that of
    finding a **shortest path** from any two nodes, which is Fred to Geoff in the
    last example. There are two paths to get from Fred to Geoff:


    *   Fred -> Larry -> Felicity -> Cindy -> Geoff


    *   Fred -> Larry -> Felicity -> Linda -> Cindy -> Geoff


    The first is clearly the path between the two nodes that is shortest, with a length
    of 4\. You may also want to see the longest path (the scenic route) in some cases.


    In some cases, you may want to have **weighted nodes**. For example, consider
    the case when you are building a map type solution. Say you have the graph in
