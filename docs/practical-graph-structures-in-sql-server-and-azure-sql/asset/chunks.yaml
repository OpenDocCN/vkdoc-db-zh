  trans: "\n### 表创建脚本\n\n该表的结构与前面示例中介绍的结构一致：\n\n```\n--this table gives us the expanded\
    \ hierarchy we used earlier to\n--make aggregation and lookup easier\nCREATE SCHEMA\
    \ Helper;\nGO\nCREATE TABLE Helper.CompanyHierarchyHelper\n(\nParentCompanyId\
    \    int,\nChildCompanyId     int,\nDistance           int,\nParentRootNodeFlag\
    \ bit\nCONSTRAINT DFLTCompanyHierarchyHelper_ParentRootNodeFlag\nDEFAULT 0,\n\
    ChildLeafNodeFlag  bit\nCONSTRAINT DFLTCompanyHierarchyHelper_ChildLeafNodeFlag\n\
    DEFAULT 0,\n--The primary key is from parent to child.\nCONSTRAINT PKCompanyHierarchyHelper\
    \ PRIMARY KEY(\nParentCompanyId,\nChildCompanyId),\n--this index assists when\
    \ looking for parent rows.\nINDEX ChlldToParent UNIQUE (\nChildCompanyId,\nParentCompanyId\n\
    ),\n);\n```\n\n请注意，主键建立在 `ParentCompanyId` 和 `ChildCompanyId` 上。你不希望相同的组合出现多次。以下代码片段用于维护数据：\n\
    \n```\nCREATE OR ALTER PROCEDURE Helper.CompanyHierarchyHelper$Rebuild\nAS\nBEGIN\n\
    SET NOCOUNT ON;\n--delete all the data in the fastest way possible\nTRUNCATE TABLE\
    \ Helper.CompanyHierarchyHelper;\nWITH ExpandedHierarchy (ParentCompanyId,\nChildCompanyId,\
    \ Distance)\nAS (\n--gets all of the nodes of the hierarchy because the\n--MATCH\
    \ doesnt include the self relationship\nSELECT Company.CompanyId AS ParentCompanyId,\n\
    Company.CompanyId AS ChildCompanyId,\n0 as Distance\nFROM SqlGraph.Company\nUNION\
    \ ALL --Not recursive. Just need both sets\n--get the parent and child rows, along\
    \ with the distance\n--from the root\nSELECT FromCompany.CompanyId AS ParentCompanyId,\n\
    LAST_VALUE(ToCompany.CompanyId)\nWITHIN GROUP (GRAPH PATH) ,\nCOUNT(ToCompany.Name)\n\
    WITHIN GROUP (GRAPH PATH) AS Distance\nFROM SqlGraph.Company AS FromCompany,\n\
    SqlGraph.ReportsTo FOR PATH as ReportsTo,\nSqlGraph.Company FOR PATH AS ToCompany\n\
    WHERE MATCH(SHORTEST_PATH(FromCompany(-(ReportsTo)\n->ToCompany)+))\n)\nINSERT\
    \ INTO  Helper.CompanyHierarchyHelper(ParentCompanyId,\nChildCompanyId, Distance)\n\
    SELECT ParentCompanyId, ChildCompanyId, Distance\nFROM   ExpandedHierarchy\nOPTION\
    \ (MAXDOP 1);\n--set the special flags\n--root nodes are never children\nUPDATE\
    \  Helper.CompanyHierarchyHelper\nSET    ParentRootNodeFlag = 1\nWHERE  ParentCompanyId\
    \ NOT IN (SELECT ChildCompanyId\nFROM Helper.CompanyHierarchyHelper\nWHERE  parentCompanyId\
    \ \nChildCompanyId)\n--LEAF nodes are never parents\nUPDATE  Helper.CompanyHierarchyHelper\n\
    SET    ChildLeafNodeFlag = 1\nWHERE  ChildCompanyId NOT IN (SELECT ParentCompanyId\n\
    FROM Helper.CompanyHierarchyHelper\nWHERE parentCompanyId \nChildCompanyId)\n\
    END;\nGO\n```\n\n需要刷新数据的用户只需执行此对象，表就会被清空并重新加载。请确保在加载数据时，用户没有并发查询该对象。\n\n### 检查子节点\n\
    \n此辅助表的一个有用场景是在检查子节点时。一旦你拥有两个 ID 值，只需查看是否存在包含父 ID 和子 ID 值的行即可。例如，如果你正在构建一个安全系统，除非用户变更非常频繁，否则可以使用辅助表使安全检查变得非常快速。\n\
    \n```\nCREATE OR ALTER FUNCTION Helper.Company$CheckForChild\n(\n@CompanyName\
    \ varchar(20),\n@CheckForChildOfCompanyName varchar(20)\n)\nRETURNS bit\nAS\n\
    BEGIN\nDECLARE @output BIT = 0,@CompanyId int,\n@CheckForChildOfCompanyId int\n\
    --translate the child companyId from parameter\nSELECT  @CompanyId = CompanyId\n\
    FROM   SQLGraph.Company\nWHERE  Company.Name = @CompanyName;\n--translate the\
    \ potential parentId from parameter\nSELECT  @CheckForChildOfCompanyId = CompanyId\n\
    FROM  SQLGraph.Company\nWHERE  Company.Name = @CheckForChildOfCompanyName;\n--look\
    \ for a row with the corresponding id values.\nSELECT @Output = 1\nFROM   Helper.CompanyHierarchyHelper\n\
    WHERE  ParentCompanyId = @CheckForChildOfCompanyId\nAND  ChildCompanyId = @CompanyId\n\
    RETURN @OutPut\nEND;\n```\n\n### 层级显示辅助表\n\n在本章中，当使用 `SqlGraph.Company$ReportSales`\
    \ 对象时，你使用 `SqlGraph.CompanyHierarchyDisplay` 视图来为你的输出数据集添加文本数据以丰富内容。在本节中，你将简单地获取该视图所表示的数据，并将其存储在一个表中。\n\
    \n### 代码\n\n此辅助表只是你通过使用在第 5 章实现的 `CompanyHierarchyDisplay` 视图对象执行 `SELECT INTO`\
    \ 查询所获得的结构的副本，并添加了一些索引（真实情况）。\n\n### 表创建脚本\n\n```\nCREATE TABLE Helper.HierarchyDisplayHelper(\n\
    --one row per company\nCompanyId int NOT NULL\nCONSTRAINT PKHerarchyDisplayHelper\
    \ PRIMARY KEY,\nHierarchyDisplay varchar(8000) NULL,\nLevel int NOT NULL,\nName\
    \ varchar(20) NOT NULL\nCONSTRAINT AKHierarchyDisplayHelper UNIQUE,\nHierarchy\
    \ varchar(8000) NOT NULL\n) ON [PRIMARY]\nGO\n```\n\n现在创建以下过程来加载数据。你基本上只是按原样查询视图并插入到表中。我在末尾包含了一个\
    \ `OPTION(MAXDOP 1)`，因为并行处理 SQL Graph 对象可能会有问题，并且对于较大的数据集，单线程处理表现更好。（截至本文撰写时，基于\
    \ SQL Server 2022，通常最好在与 SQL Graph 表处理大量数据的编码对象中添加此选项，你将在接下来的两章处理大型数据集时用到。）\n\n\
    ```\nCREATE PROCEDURE Helper.HierarchyDisplayHelper$Rebuild\nAS\nBEGIN\nTRUNCATE\
    \ TABLE [Helper].[HierarchyDisplayHelper];\nINSERT INTO Helper.HierarchyDisplayHelper\n\
    (CompanyId, HierarchyDisplay, Level, Name, Hierarchy)\nSELECT CompanyId, HierarchyDisplay,\
    \ Level, Name, Hierarchy\nFROM   SqlGraph.CompanyHierarchyDisplay\nOPTION(MAXDOP\
    \ 1); --when queries get complex, it is often\n--better to use single threaded\
    \ processing\n--with sql graph\nEND;\n```\n\n### 使用辅助对象\n\n最后，让我们将这些结合起来，通过使用新创建的表替换扩展层级和筛选、丰富数据的代码，在\
    \ `Company$ReportSales` 存储过程中使用这些辅助表。\n"
- fmt: '## Report Sales


    ```sql

    CREATE OR ALTER PROCEDURE Helper.Company$ReportSales

    @DisplayFromNodeName varchar(20)

    AS

    BEGIN

    SET NOCOUNT ON;

    --fetch the hierarchy for the node you are looking for by name

    --we will use this just like using the path method ojbect

    DECLARE @NodeHierarchy varchar(8000) = (

    SELECT Hierarchy

    FROM Helper.HierarchyDisplayHelper

    WHERE Name = @DisplayFromNodeName);

    --expanded hierarchy is now a table

    --as is the display version.

    WITH FilterAndSweeten AS

    (

    SELECT ExpandedHierarchy.*,

    HierarchyDisplayHelper.Hierarchy,

    HierarchyDisplayHelper.HierarchyDisplay

    FROM  Helper.CompanyHierarchyHelper AS ExpandedHierarchy

    JOIN Helper.HierarchyDisplayHelper

    ON ExpandedHierarchy.ParentCompanyId =

    HierarchyDisplayHelper.CompanyId

    --filters the search to start with the path we sent in

    --the stuff after + makes sure the filter gets everything

    --like the node we fetched, as long as it doesn''t have a

    --following digit.

    WHERE  HierarchyDisplayHelper.Hierarchy

    LIKE @NodeHierarchy + ''[^0-9]%''

    --include the root of the query, not character.

    OR   HierarchyDisplayHelper.Hierarchy = @NodeHierarchy

    )

    ,--get totals for each Company for the aggregate

    CompanyTotals

    AS (SELECT CompanyId,

    SUM(CAST(Amount AS decimal(20,2))) AS TotalAmount

    FROM SqlGraph.Sale

    GROUP BY CompanyId),

    --aggregate each Company for the Company

    Aggregations AS

    (SELECT FilterAndSweeten.ParentCompanyId,

    SUM(CompanyTotals.TotalAmount) AS TotalSalesAmount,

    MAX(Hierarchy) AS hierarchy,

    MAX(HierarchyDisplay) AS HierarchyDisplay

    FROM FilterAndSweeten

    JOIN CompanyTotals

    ON CompanyTotals.CompanyId =

    FilterAndSweeten.ChildCompanyId

    GROUP BY FilterAndSweeten.ParentCompanyId)

    --display the data...

    SELECT Aggregations.ParentCompanyId,

    Aggregations.hierarchyDisplay,

    Aggregations.TotalSalesAmount

    FROM Aggregations

    ORDER BY Aggregations.hierarchy;

    END;

    ```


    Now you can use the hierarchy using the follow code. First, you refresh your two
    objects. (In a real system, if you are using both, you probably would make another
    procedure to call both, but no real need for our purposes.)


    ```sql

