  trans: '### 唯一性约束（及索引）


    正如你可能知道的，处理数据集时比较棘手的情况之一就是出现非预期的重复数据。在处理图结构时也不例外；事实上，由于实际列在`大多数`时候对你来说是封装隐藏的，情况可能更糟。我强调`大多数`是因为物理实现细节并未完全对你隐藏，并且会在一些你可能意想不到的地方显现出来。


    举个例子，你将要插入与上一节第二组数据相同的行（通过使用完全相同的 SQL 语句）：

    ```sql

    WITH Here

    AS (SELECT Person.$node_id AS node_id

    FROM Network.Person

    WHERE Person.NAME IN ( ''Saa Lee'', ''Lee Roy'', ''Day Vid'' ))

    INSERT INTO Network.LivesAt

    (

    $from_id,

    $to_id

    )

    SELECT Here.node_id,

    Location.$node_id

    FROM Here

    CROSS JOIN Network.Location

    WHERE Location.NAME = ''There'';

    ```

    注意，现在你有了重复的数据：

    ```sql

    SELECT Person.Name,

    Location.Name

    FROM Network.Person,

    Network.LivesAt,

    Network.Location

    WHERE MATCH(Person-(LivesAt)->Location)

    AND Location.NAME = ''There''

    ORDER BY Person.Name;

    ```

    此查询的输出是

    ```

    NAME          NAME

    ------------- --------------------

    Day Vid       There

    Day Vid       There

    Lee Roy       There

    Lee Roy       There

    Saa Lee       There

    Saa Lee       There

    ```

    为了防止这种情况，你可以使用引用伪列的唯一约束。例如，在删除了重复的 `There` 位置值的行之后

    ```sql

    DELETE LivesAt

    FROM Network.Person,Network.LivesAt,Network.Location

    WHERE MATCH(Person-(LivesAt)->Location)

    AND Location.NAME = ''There'';

    ```

    现在在 `$from_id` 和 `$to_id` 上创建以下唯一性约束。这可以防止用户反复创建相同的关系，这通常是不可取的。

    ```sql

    ALTER TABLE Network.LivesAt

    ADD CONSTRAINT AKLivesAt_FromIdToId UNIQUE ($from_id, $to_id);

    ```

    唯一性约束在 SQL Server 中是通过索引实现的，而且这个索引无论如何对广度优先算法也会很有价值。现在，尝试多次插入位置为 `There` 的行。


    在第二次运行时，你会得到一条类似以下数值的错误消息：

    ```

    Msg 2627, Level 14, State 1, Line 454 Violation of UNIQUE KEY constraint

    ''AKLivesAt_FromIdToId''. Cannot insert duplicate key in object ''Network.LivesAt''.
    The duplicate key value is (581577110, 3, 933578364, 3).

    ```

    错误信息中的这些数字到底是什么？它们是底层图对象中的键。虽然你通常看到的值看起来像是一长段 JSON 格式的 `nvarchar(1000)` 值，但实际上实现是将所有那些内容转换成了整数值。


    这些键值对应于源表的 `object_id` 和图的内部 id。要翻译这些值，请实现以下工具函数来查找：

    ```sql

    IF SCHEMA_ID(''Tools'') IS NULL

    EXEC (''CREATE SCHEMA Tools'')

    GO

    CREATE OR ALTER PROCEDURE Tools.GraphDB$LookupItem

    @ObjectId int,

    @Id int

    AS

    BEGIN

    SET NOCOUNT ON;

    DECLARE @SchemaName sysname =

    OBJECT_SCHEMA_NAME(@ObjectId),

    @TableName sysname = OBJECT_NAME(@ObjectId),

    @SQLStatement nvarchar(MAX)

    SET @SQLStatement = CONCAT(''SELECT * FROM '',

    QUOTENAME(@SchemaName),''.'',QUOTENAME(@TableName),

    WHERE GRAPH_ID_FROM_NODE_ID($node_id)  = '',@Id)

    EXECUTE (@SQLStatement)

    END;

    ```

    现在你可以轻松查找项目了：

    ```sql

    EXEC Tools.GraphDB$LookupItem 581577110, 3;

    EXEC Tools.GraphDB$LookupItem 933578364, 3;

    ```

    这将返回包含被复制数据的行（如果你在同一事务中插入了两行并回滚了，则此数据可能不存在）。


    除了唯一性约束（你可以将其放在一个或两个 `_id` 列上，也可以在你的边表中包含其他列），你可能还想为图边添加索引以帮助提升性能。


    你的对象上已经有一些索引了，例如你刚刚创建的 `Network.LivesAt` 边表上就有。使用 `sys.indexes` 目录视图，你可以看到默认情况下对象上有什么：

    ```sql

    SELECT indexes.name,

    indexes.type_desc

    FROM sys.indexes

    WHERE indexes.OBJECT_ID = OBJECT_ID(''Network.LivesAt'');

    ```

    返回三行。一行表明你的对象是堆。另一行是 `AKLivesAt_FromIdToId` 唯一约束。然后还有一个索引，看起来像 `GRAPH_UNIQUE_INDEX_AD2E365DF5144A62BEBC7C7260258E2A`。这是在内部图列上的索引，但没有聚集索引。你实际上可以将引用内部列的
    AK 索引更改为聚集索引，甚至可以将其设为 `PRIMARY KEY` 约束（默认是聚集的）：

    ```sql

    ALTER TABLE Network.LivesAt

    DROP CONSTRAINT AKLivesAt_FromIdToId;

    ALTER TABLE Network.LivesAt

    ADD CONSTRAINT AKLivesAt_FromIdToId  UNIQUE CLUSTERED

    ($from_id, $to_id);

    ```

    再看一下对 `sys.indexes` 的查询。现在它是聚集的了。对于主要通过 `$from_id` 值（或 `$to_id` 值，取决于你如何构建索引以符合你的常规使用模式）获取数据的某些类型的工作负载来说，这可能会非常有帮助，你从重复键错误中知道这是两个列。你可以在
    `sys.index_columns` 目录视图中看到这一点：

    ```sql

    SELECT indexes.name,

    indexes.type_desc,

    index_columns.key_ordinal,

    columns.name

    FROM sys.index_columns

    JOIN sys.indexes

    ON indexes.object_id = index_columns.object_id

    AND indexes.index_id = index_columns.index_id

    JOIN sys.columns

    ON indexes.object_id = columns.object_id

    AND columns.column_id = index_columns.column_id

    WHERE indexes.object_id = OBJECT_ID(''Network.LivesAt'');

    ```'
- fmt: "### Additional Constraints\n\nDepending on what your requirements are for\
    \ your graph, you may need to add more constraints to your data. Unfortunately,\
    \ you are not allowed to use a `CHECK` constraint object on the pseudocolumns.\n\
    \nOne of the most frequent needs is to disallow self-relationships. Having a node\
    \ follow itself makes no semantic sense in most models. My first inclination was\
    \ to just create a constraint:\n\n```sql\nALTER TABLE Network.Follows\nADD CONSTRAINT\
    \ CHKFollows_NoSelfReference\nCHECK ($to_id <> $from_id);\n```\n\nBut this failed,\
    \ hard:\n\n```\nMsg 13918, Level 16, State 1, Line 656\nAdding constraint to column\
    \ '$from_id' of a node or edge table is not allowed.\n```\n\nTrying to use the\
    \ full column name without square brackets treats the column names as different\
    \ pseudocolumns:\n\n```sql\nALTER TABLE Network.Follows\nADD CONSTRAINT CHKFollows_NoSelfReference\
    \ CHECK\n($from_id_86757ACD89174977A9D8380F484416AE \n<> $to_id_EF1AB6E3676C45CDABD558C4D40746B4)\n\
    ```\n\nThis returns\n\n```\nMsg 126, Level 15, State 2, Line 663\nInvalid pseudocolumn\
    \ \"$from_id_86757ACD89174977A9D8380F484416AE\".\n```\n\nPutting square brackets\
    \ around the column names (since that is how they show up in `sys.columns`)\n\n\
    ```sql\nALTER TABLE Network.Follows\nADD CONSTRAINT CHKFollows_NoSelfReference\
    \ CHECK\n([$from_id_86757ACD89174977A9D8380F484416AE] \n<> [$to_id_EF1AB6E3676C45CDABD558C4D40746B4])\n\
    ```\n\njust takes you back to the first error message (and you really don’t want\
    \ to reference these column names in code anyhow, because even recreating the\
    \ table on the same server will give you different names, much less the pain of\
    \ managing code on multiple environments):\n\n```\nMsg 13918, Level 16, State\
    \ 1, Line 662\nAdding constraint to column '$from_id' of a node or edge table\
    \ is not allowed.\n```\n\nSo, if you want to constrain data in your edge tables\
    \ as it pertains to the pseudocolumns, you need to use a trigger. Before building\
    \ that trigger, let’s insert a row where `$from_id` and `$to_id` are the same:\n\
    \n```sql\nINSERT INTO Network.Follows\n(\n$from_id,\n$to_id,\nValue\n)\nSELECT\
    \ (SELECT Person.$node_id FROM Network.Person WHERE Person.FirstName = 'Fred'\
    \ AND Person.LastName = 'Rick'),\n       (SELECT Person.$node_id FROM Network.Person\
    \ WHERE Person.FirstName = 'Fred' AND Person.LastName = 'Rick'),\n       NULL;\n\
    ```\n\nAs an aside, a row like this where the person row is related to the same\
    \ person row is actually the only possible way for the following query to return\
    \ data:\n\n```sql\nSELECT Person.Name\nFROM    Network.Person, Network.Follows\n\
    WHERE MATCH(Person-(Follows)->Person);\n```\n\nReusing an edge isn’t allowed,\
    \ but reusing a node is. However, when you reuse a node, it is exactly the same\
    \ set of data filtered by itself. So, the `MATCH` expression ends up just being\
    \ logically translated to\n\n```sql\nWHERE Person.$node_id = Follows.$from_id\n\
    \  AND Person.$node_id = Follows.$to_id\n```\n\nSince the `$node_id` is not an\
    \ array (you are, of course, still in a relational database) there could never\
    \ be rows returned. The only row that could be returned is one where `Fred Follows\
    \ Fred`.\n\nSo, you have to do it the hard way, by using an after trigger object.\
    \ Note that in the first section of this chapter, you used an `INSTEAD OF` trigger\
    \ on a view object. `INSTEAD OF` triggers are typically used to alter DML operations.\
    \ But now you just want to check to see if things are correct after the operation\
    \ has completed.\n\nTo code this trigger, you are going to use a slightly modified\
    \ trigger template from my *Database Design* book (removing the error logging\
    \ capabilities) because error handling from a trigger is better if you control\
    \ how errors are raised and dealt with.\n\nNote: This trigger template can be\
    \ found here: [`https://github.com/drsqlgithub/dbdesignbook6/tree/master/Appendix%20B`](https://github.com/drsqlgithub/dbdesignbook6/tree/master/Appendix%2520B).\n\
    \n```sql\nCREATE TRIGGER Network.Follows$InsertUpdateTrigger\nON Network.Follows\n\
    AFTER INSERT,UPDATE AS --make 2 triggers if you need\n--them to do anything different\n\
    BEGIN\n    SET NOCOUNT ON; --to avoid the rowcount messages\n    SET ROWCOUNT\
    \ 0; --in case the client has modified the rowcount\n    DECLARE @msg varchar(2000),\
    \ --used to hold the error message\n            @rowsAffected int = (SELECT COUNT(*)\
    \ FROM inserted);\n    --no need to continue on if no rows affected\n    IF @rowsAffected\
    \ = 0 RETURN;\n    BEGIN TRY\n        --[validation section]\n        IF EXISTS\
    \ (SELECT *\n                   FROM Inserted\n                   WHERE $from_id\
    \ = $to_id)\n        BEGIN\n            SET @msg = '$from_id must not equal' +\n\
    \                       ' $to_id when modifying edge';\n            THROW 50000,\
    \ @msg, 1;\n        END;\n        --[modification section]\n    END TRY\n    BEGIN\
    \ CATCH\n        IF @@trancount > 0\n            ROLLBACK TRANSACTION;\n     \
    \   THROW; --will halt the batch or be caught\n               --by the caller's\
    \ catch block\n               --with the transaction aborted.\n    END CATCH;\n\
    END;\n```\n\nThe duplicate row can be removed by executing the following statement:\n\
    \n```sql\nDELETE\nFROM    Network.Follows\nWHERE   Follows.$from_id = Follows.$to_id;\n\
    ```\n\nNow trying to do the following insert:\n\n```sql\nINSERT INTO Network.Follows\n\
    (\n$from_id,\n$to_id,\nValue\n)\nSELECT (SELECT Person.$node_id FROM Network.Person\n\
    \        WHERE Person.FirstName = 'Fred'\n          AND Person.LastName = 'Rick'),\n\
    \       (SELECT Person.$node_id FROM Network.Person\n        WHERE Person.FirstName\
    \ = 'Fred'\n          AND Person.LastName = 'Rick'),\n       1;\n```\n\nYou get\
    \ this as a return:\n\n```\nMsg 50000, Level 16, State 1, Procedure Follows$InsertUpdateTrigger,\
    \ Line 21\n$from_id must not equal $to_id when modifying edge\n```\n\nOne thing\
    \ to note is that the `$from_id` and `$to_id` are exposed in the trigger with\
    \ the inserted and deleted objects, so you can do pretty much anything you want\
    \ with that JSON for validating the data.\n\n## Metadata Roundup\n\nTo end the\
    \ introductory segment of the book, I want to show/review some of the metadata\
    \ you can use to find the details of your graph objects.\n\n### List Graph Objects\
    \ in the Database\n\n```sql\nSELECT OBJECT_SCHEMA_NAME(tables.object_id) AS schema_name,\n\
    \       tables.name,\n       CASE\n           WHEN tables.is_node = 1 THEN\n \
    \              'Node'\n           WHEN tables.is_edge = 1 THEN\n             \
    \  'Edge'\n           ELSE\n               'Bad code!'\n       END as object_type\n\
    FROM sys.tables\nWHERE tables.is_node = 1\n   OR tables.is_edge = 1\nORDER BY\
    \ schema_name, tables.name;\n```\n\nThe output of this query shows you the objects\
    \ you worked with in the main example in the last two chapters."
  raw: "### Additional Constraints\n\nDepending on what your requirements are for\
    \ your graph, you may need to add more constraints to your data. Unfortunately,\
    \ you are not allowed to use a `CHECK` constraint object on the pseudocolumns.\n\
    \nOne of the most frequent needs is to disallow self-relationships. Having a node\
    \ follow itself makes no semantic sense in most models. My first inclination was\
    \ to just create a constraint:\n\n```\nALTER TABLE Network.Follows\nADD CONSTRAINT\
    \ CHKFollows_NoSelfReference\nCHECK ($to_id  $from_id);\n```\n\nBut this failed,\
    \ hard:\n\n```\nMsg 13918, Level 16, State 1, Line 656\nAdding constraint to column\
    \ '$from_id' of a node or edge table is not allowed.\n```\n\nTrying to use the\
    \ full column name without square brackets treats the column names as different\
    \ pseudocolumns:\n\n```\nALTER TABLE Network.Follows\nADD CONSTRAINT CHKFollows_NoSelfReference\
    \ CHECK\n($from_id_86757ACD89174977A9D8380F484416AE \n$to_id_EF1AB6E3676C45CDABD558C4D40746B4)\n\
    ```\n\nThis returns\n\n```\nMsg 126, Level 15, State 2, Line 663\nInvalid pseudocolumn\
    \ \"$from_id_86757ACD89174977A9D8380F484416AE\".\n```\n\nPutting square brackets\
    \ around the column names (since that is how they show up in `sys.columns`)\n\n\
    ```\nALTER TABLE Network.Follows\nADD CONSTRAINT CHKFollows_NoSelfReference CHECK\n\
    ([$from_id_86757ACD89174977A9D8380F484416AE] \n[$to_id_EF1AB6E3676C45CDABD558C4D40746B4])\n\
    ```\n\njust takes you back to the first error message (and you really don’t want\
    \ to reference these column names in code anyhow, because even recreating the\
    \ table on the same server will give you different names, much less the pain of\
    \ managing code on multiple environments):\n\n```\nMsg 13918, Level 16, State\
    \ 1, Line 662\nAdding constraint to column '$from_id' of a node or edge table\
    \ is not allowed.\n```\n\nSo, if you want to constrain data in your edge tables\
    \ as it pertains to the pseudocolumns, you need to use a trigger. Before building\
    \ that trigger, let’s insert a row where `$from_id` and `$to_id` are the same:\n\
    \n```\nINSERT INTO Network.Follows\n(\n$from_id,\n$to_id,\nValue\n)\nSELECT (SELECT\
    \ Person.$node_id FROM Network.Person WHERE Person.FirstName = 'Fred' AND Person.LastName\
    \ = 'Rick'),\n(SELECT Person.$node_id FROM Network.Person WHERE Person.FirstName\
    \ = 'Fred' AND Person.LastName = 'Rick'),\n\n```\n\nAs an aside, a row like this\
    \ where the person row is related to the same person row is actually the only\
    \ possible way for the following query to return data:\n\n```\nSELECT Person.Name\n\
    FROM.   Network.Person, Network.Follows\nWHERE MATCH(Person-(Follows)->Person);\n\
    ```\n\nReusing an edge isn’t allowed, but reusing a node is. However, when you\
    \ reuse a node, it is exactly the same set of data filtered by itself. So, the\
    \ `MATCH` expression ends up just being logically translated to\n\n```\nWHERE\
    \ Person.$node_id = Follows.$from_id\nAND Person.$node_id = Follows.$to_id\n```\n\
    \nSince the `$node_id` is not an array (you are, of course, still in a relational\
    \ database) there could never be rows returned. The only row that could be returned\
    \ is one where `Fred Follows Fred`.\n\nSo, you have to do it the hard way, by\
    \ using an after trigger object. Note that in the first section of this chapter,\
    \ you used an `INSTEAD OF` trigger on a view object. `INSTEAD OF` triggers are\
    \ typically used to alter DML operations. But now you just want to check to see\
    \ if things are correct after the operation has completed.\n\nTo code this trigger,\
    \ you are going to use a slightly modified trigger template from my *Database\
    \ Design* book (removing the error logging capabilities) because error handling\
    \ from a trigger is better if you control how errors are raised and dealt with.\n\
    \nNote\n\nThis trigger template can be found here: [`https://github.com/drsqlgithub/dbdesignbook6/tree/master/Appendix%20B`](https://github.com/drsqlgithub/dbdesignbook6/tree/master/Appendix%2520B).\n\
    \n```\nCREATE TRIGGER Network.Follows$InsertUpdateTrigger\nON Network.Follows\n\
    AFTER INSERT,UPDATE AS --make 2 triggers if you need\n--them to do anything different\n\
    BEGIN\nSET NOCOUNT ON; --to avoid the rowcount messages\nSET ROWCOUNT 0; --in\
    \ case the client has modified the rowcount\nDECLARE @msg varchar(2000), --used\
    \ to hold the error message\n@rowsAffected int = (SELECT COUNT(*) FROM inserted);\n\
    --no need to continue on if no rows affected\nIF @rowsAffected = 0 RETURN;\nBEGIN\
    \ TRY\n--[validation section]\nIF EXISTS (SELECT *\nFROM Inserted\nWHERE $from_id\
    \ = $to_id)\nBEGIN\nSET @msg = '$from_id must not equal' +\n' $to_id when modifying\
    \ edge';\nTHROW 50000, @msg, 1;\nEND;\n--[modification section]\nEND TRY\nBEGIN\
    \ CATCH\nIF @@trancount > 0\nROLLBACK TRANSACTION;\nTHROW; --will halt the batch\
    \ or be caught\n--by the caller's catch block\n--with the transaction aborted.\n\
    END CATCH;\nEND;\n```\n\nThe duplicate row can be removed by executing the following\
    \ statement:\n\n```\nDELETE\nFROM   Network.Follows\nWHERE  Follows.$from_id =\
    \ Follows.$to_id;\n```\n\nNow trying to do the following insert:\n\n```\nINSERT\
    \ INTO Network.Follows\n(\n$from_id,\n$to_id,\nValue\n)\nSELECT (SELECT Person.$node_id\
    \ FROM Network.Person\nWHERE Person.FirstName = 'Fred'\nAND Person.LastName =\
    \ 'Rick'),\n(SELECT Person.$node_id FROM Network.Person\nWHERE Person.FirstName\
    \ = 'Fred'\nAND Person.LastName = 'Rick'),\n1;\n```\n\nYou get this as a return:\n\
    \n```\nMsg 50000, Level 16, State 1, Procedure Follows$InsertUpdateTrigger, Line\
    \ 21\n$from_id must not equal $to_id when modifying edge\n```\n\nOne thing to\
    \ note is that the `$from_id` and `$to_id` are exposed in the trigger with the\
    \ inserted and deleted objects, so you can do pretty much anything you want with\
    \ that JSON for validating the data.\n\n## Metadata Roundup\n\nTo end the introductory\
    \ segment of the book, I want to show/review some of the metadata you can use\
    \ to find the details of your graph objects.\n\n### List Graph Objects in the\
    \ Database\n\n```\nSELECT OBJECT_SCHEMA_NAME(tables.object_id) AS schema_name,\n\
    tables.name,\nCASE\nWHEN tables.is_node = 1 THEN\n'Node'\nWHEN tables.is_edge\
    \ = 1 THEN\n'Edge'\nELSE\n'Bad code!'\nEND as object_type\nFROM sys.tables\nWHERE\
    \ tables.is_node = 1\nOR tables.is_edge = 1\nORDER BY schema_name, tables.name;\n\
    ```\n\nThe output of this query shows you the objects you worked with in the main\
    \ example in the last two chapters."
  trans: "\n### 附加约束\n\n根据你对图的要求，可能需要向数据中添加更多约束。遗憾的是，你不能在伪列上使用 `CHECK` 约束对象。\n\n最常见的需求之一是禁止自引用关系。在大多数模型中，一个节点跟随自身没有语义意义。我最初的想法是直接创建一个约束：\n\
    \n```sql\nALTER TABLE Network.Follows\nADD CONSTRAINT CHKFollows_NoSelfReference\n\
    CHECK ($to_id <> $from_id);\n```\n\n但这彻底失败了：\n\n```\nMsg 13918, Level 16, State\
    \ 1, Line 656\nAdding constraint to column '$from_id' of a node or edge table\
    \ is not allowed.\n```\n\n尝试使用不带方括号的完整列名会将列名视为不同的伪列：\n\n```sql\nALTER TABLE Network.Follows\n\
    ADD CONSTRAINT CHKFollows_NoSelfReference CHECK\n($from_id_86757ACD89174977A9D8380F484416AE\
    \ \n<> $to_id_EF1AB6E3676C45CDABD558C4D40746B4)\n```\n\n这会返回：\n\n```\nMsg 126,\
    \ Level 15, State 2, Line 663\nInvalid pseudocolumn \"$from_id_86757ACD89174977A9D8380F484416AE\"\
    .\n```\n\n在列名周围加上方括号（因为它们在 `sys.columns` 中就是这样显示的）\n\n```sql\nALTER TABLE Network.Follows\n\
    ADD CONSTRAINT CHKFollows_NoSelfReference CHECK\n([$from_id_86757ACD89174977A9D8380F484416AE]\
    \ \n<> [$to_id_EF1AB6E3676C45CDABD558C4D40746B4])\n```\n\n只会让你回到第一个错误消息（而且你真的不想在代码中引用这些列名，因为即使在同一台服务器上重建表也会得到不同的名称，更不用说在多个环境中管理代码的痛苦了）：\n\
    \n```\nMsg 13918, Level 16, State 1, Line 662\nAdding constraint to column '$from_id'\
    \ of a node or edge table is not allowed.\n```\n\n因此，如果你想约束边表中的数据（特别是与伪列相关的部分），你需要使用触发器。在构建该触发器之前，让我们先插入一行\
    \ `$from_id` 和 `$to_id` 相同的数据：\n\n```sql\nINSERT INTO Network.Follows\n(\n$from_id,\n\
    $to_id,\nValue\n)\nSELECT (SELECT Person.$node_id FROM Network.Person WHERE Person.FirstName\
    \ = 'Fred' AND Person.LastName = 'Rick'),\n       (SELECT Person.$node_id FROM\
    \ Network.Person WHERE Person.FirstName = 'Fred' AND Person.LastName = 'Rick'),\n\
    \       NULL;\n```\n\n顺便说一下，像这样一行中个人行与同一个个人行相关的情况，实际上是以下查询能返回数据的唯一可能方式：\n\n```sql\n\
    SELECT Person.Name\nFROM    Network.Person, Network.Follows\nWHERE MATCH(Person-(Follows)->Person);\n\
    ```\n\n重用一条边是不允许的，但重用一个节点是可以的。然而，当你重用一个节点时，它正是被自身过滤的同一组数据。因此，`MATCH` 表达式最终在逻辑上被转换为：\n\
    \n```sql\nWHERE Person.$node_id = Follows.$from_id\n  AND Person.$node_id = Follows.$to_id\n\
    ```\n\n由于 `$node_id` 不是一个数组（你当然仍然处于关系数据库中），所以永远不可能返回任何行。唯一可能返回的行是“Fred 关注 Fred”这一行。\n\
    \n所以，你必须采取更困难的方法，使用一个 `AFTER` 触发器对象。请注意，在本章的第一部分，你曾对视图对象使用了 `INSTEAD OF` 触发器。`INSTEAD\
    \ OF` 触发器通常用于修改 DML 操作。但现在你只想在操作完成后检查是否一切正确。\n\n为了编写这个触发器，你将使用我《数据库设计》书中一个稍加修改的触发器模板（移除了错误日志记录功能），因为从触发器中进行错误处理，如果由你控制错误的引发和处理方式，效果会更好。\n\
    \n注意：此触发器模板可以在这里找到：[`https://github.com/drsqlgithub/dbdesignbook6/tree/master/Appendix%20B`](https://github.com/drsqlgithub/dbdesignbook6/tree/master/Appendix%2520B)。\n\
    \n```sql\nCREATE TRIGGER Network.Follows$InsertUpdateTrigger\nON Network.Follows\n\
    AFTER INSERT,UPDATE AS --如果需要它们做任何不同的操作，\n--请创建 2 个触发器\nBEGIN\n    SET NOCOUNT\
    \ ON; --以避免行数消息\n    SET ROWCOUNT 0; --以防客户端修改了行数\n    DECLARE @msg varchar(2000),\
    \ --用于保存错误消息\n            @rowsAffected int = (SELECT COUNT(*) FROM inserted);\n\
    \    --如果没有影响行，则无需继续\n    IF @rowsAffected = 0 RETURN;\n    BEGIN TRY\n      \
    \  --[验证部分]\n        IF EXISTS (SELECT *\n                   FROM Inserted\n \
    \                  WHERE $from_id = $to_id)\n        BEGIN\n            SET @msg\
    \ = '$from_id must not equal' +\n                       ' $to_id when modifying\
    \ edge';\n            THROW 50000, @msg, 1;\n        END;\n        --[修改部分]\n\
    \    END TRY\n    BEGIN CATCH\n        IF @@trancount > 0\n            ROLLBACK\
    \ TRANSACTION;\n        THROW; --将停止批处理，或者被调用方的\n               --CATCH 块捕获，并中止事务。\n\
    \    END CATCH;\nEND;\n```\n\n可以通过执行以下语句删除重复行：\n\n```sql\nDELETE\nFROM    Network.Follows\n\
    WHERE   Follows.$from_id = Follows.$to_id;\n```\n\n现在尝试执行以下插入操作：\n\n```sql\nINSERT\
    \ INTO Network.Follows\n(\n$from_id,\n$to_id,\nValue\n)\nSELECT (SELECT Person.$node_id\
    \ FROM Network.Person\n        WHERE Person.FirstName = 'Fred'\n          AND\
    \ Person.LastName = 'Rick'),\n       (SELECT Person.$node_id FROM Network.Person\n\
    \        WHERE Person.FirstName = 'Fred'\n          AND Person.LastName = 'Rick'),\n\
    \       1;\n```\n\n你会得到这样的返回结果：\n\n```\nMsg 50000, Level 16, State 1, Procedure\
    \ Follows$InsertUpdateTrigger, Line 21\n$from_id must not equal $to_id when modifying\
    \ edge\n```\n\n需要注意的一点是，在触发器中，`inserted` 和 `deleted` 对象会暴露 `$from_id` 和 `$to_id`，因此你可以利用该\
    \ JSON 数据做几乎任何你想要的数据验证。\n\n## 元数据总结\n\n为了结束本书的介绍部分，我想展示/回顾一些可用于查找图对象详细信息的元数据。\n\
    \n### 列出数据库中的图对象\n\n```sql\nSELECT OBJECT_SCHEMA_NAME(tables.object_id) AS schema_name,\n\
    \       tables.name,\n       CASE\n           WHEN tables.is_node = 1 THEN\n \
    \              'Node'\n           WHEN tables.is_edge = 1 THEN\n             \
    \  'Edge'\n           ELSE\n               'Bad code!'\n       END as object_type\n\
    FROM sys.tables\nWHERE tables.is_node = 1\n   OR tables.is_edge = 1\nORDER BY\
    \ schema_name, tables.name;\n```\n\n此查询的输出显示了你在最后两章的主示例中使用的对象。\n"
- fmt: '### Types of Graph Columns


    Sometimes you need to see the physical column names for your graph db objects.
    The following two queries show the columns from a node and an edge:


    ```sql

    SELECT columns.name,

    columns.column_id,

    CASE

    WHEN columns.name LIKE ''$%'' THEN


    ELSE


    END AS has_pseudocolumn,

    columns.graph_type_desc

    FROM sys.COLUMNS

    WHERE OBJECT_ID(''Network.Person'') = COLUMNS.OBJECT_ID

    AND columns.graph_type_desc IS NOT NULL;

    SELECT columns.name,

    columns.column_id,

    CASE

    WHEN columns.name LIKE ''$%'' THEN


    ELSE


    END AS has_pseudocolumn,

    columns.graph_type_desc

    FROM sys.columns

    WHERE OBJECT_ID(''Network.Follows'') = COLUMNS.OBJECT_ID

    AND columns.graph_type_desc IS NOT NULL;

    ```


    Executing these queries, you get the following:


    ```

    NAME             column_id has_pseudocolumn graph_type_desc

    ---------------- --------- ---------------- --------------------

    graph_id_F8B...  1         0                GRAPH_ID

    $node_id_C01...  2         1                GRAPH_ID_COMPUTED

    NAME            column_id has_pseudocolumn graph_type_desc

    --------------- --------- ---------------- ----------------------

    graph_id_240... 1         0                GRAPH_ID

    $edge_id_EF2... 2         1                GRAPH_ID_COMPUTED

    from_obj_iA6... 3         0                GRAPH_FROM_OBJ_ID

    from_id_4E69... 4         0                GRAPH_FROM_ID

    $from_id_857... 5         1                GRAPH_FROM_ID_COMPUTED

    to_obj_id_08... 6         0                GRAPH_TO_OBJ_ID

    to_id_C0A723... 7         0                GRAPH_TO_ID

    $to_id_EF16E... 8         1                GRAPH_TO_ID_COMPUTED

    ```


    The column name has been greatly shrunken (for example, the first query’s `$node_dc59...`
    column is actually `$node_id_C580185613BB42EF81F4A68F6FA539DC`). But the interesting
    parts here are that you can see there is a computed column that corresponds to
    the `$from_id`, but there are two columns for each `$node_id` value. Plus, there
    is a `GRAPH_ID` column that each table has but you don’t have access to.


    Currently the value of this will be the same for all objects. You only have one
    graph structure per database (much like you can only have one in-memory structure
    per database as well).


    ### Tools for Fetching Graph Information


    I won’t even pretend I can put the contents of this next query into the text of
    this chapter, but the basic idea is to show you all of the functions and how you
    pull apart the graph internal values if you need to do so from time to time:


    ```sql

    SELECT OBJECT_ID_FROM_EDGE_ID(Follows.$edge_id) AS

    FollowsObjectId,

    GRAPH_ID_FROM_EDGE_ID(Follows.$edge_id) AS FollowsEdgeId,

    OBJECT_ID_FROM_NODE_ID(Follows.$from_id) AS FromObjectId,

    OBJECT_SCHEMA_NAME(OBJECT_ID_FROM_NODE_ID

    (Follows.$from_id)) AS FromObjectSchemaName,

    OBJECT_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$from_id))

    AS FromObjectName,

    GRAPH_ID_FROM_NODE_ID(Follows.$from_id) AS FromGraphId,

    OBJECT_ID_FROM_NODE_ID(Follows.$to_id) AS ToObjectId,

    GRAPH_ID_FROM_NODE_ID(Follows.$to_id) AS ToGraphId,

    OBJECT_SCHEMA_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$to_id))

    AS ToObjectSchemaName,

    OBJECT_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$from_id))

    AS ToObjectName

    FROM Network.Follows;

    ```


    You can look at a row using the following function if you happen to have the `object_id`
    and the graph id value. You just randomly picked out a row from the output, but
    often you have these values, as I showed earlier in the error message:


    ```sql

    SELECT Person.$node_id,

    Person.PersonId,

    Person.FirstName,

    Person.LastName,

    Person.NAME,

    Person.Value

    FROM Network.Person

    WHERE Person.$node_id = NODE_ID_FROM_PARTS(581577110, 5);

    ```


    ## Summary


    In this chapter, you finished out the introductory topics, with the goal of learning
    most of the syntax and techniques that you will be using in the rest of the book.


    You learned a few techniques for loading data into graph tables easier than coding
    the look-up for the `$node_id` values. The first was building a data interface
    that lets you insert data into a table in a manner that feels like a normal table
    by letting you ignore the graph columns while still getting the value of the graph
    data structures. The second was pushing data directly into the graph values from
    other existing data.


    Then you covered heterogenous queries, where you can treat multiple edges and
    nodes as one in certain situations (for example, a customer database where you
    want to see everything you know about the customer in one straightforward query.)
    The biggest downside for doing this with SQL Server objects is that you are still
    bound by the concepts of a relational database’s rows and column rigidness. So,
    you must forge the various tables into something that has the same row/column
    shape for such queries, but it is quite useful once you do.


    From there you moved onto protecting your data with integrity constraints include
    edge and uniqueness constraints, plus triggers for cases where you can’t use declarative
    constraints. I briefly mention indexes for performance, but that is something
    that will be situationally based.


    Finally, you learned some of the metadata you can find in SQL Server and how you
    can use it for multiple reasons.


    This ends the discussion of how you do basic graph operations. In the following
    chapters, you will build example databases to see how create and optimize real
    solutions.'
