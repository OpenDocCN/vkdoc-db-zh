  trans: '## 创建新节点的代码


    ### 创建新节点至关重要


    创建新节点是实现树结构（或任何面向数据的系统）所需的基本代码片段。在本书前几章中，我主要讨论了批量加载数据的技术。这些技术仍然适用于加载树，但在本章中，我想构建一个更贴近现实的例子，模拟用户创建数据。（如果你的对象中用户每小时创建
    20,000 个节点，那么你将很快需要比我正在使用的服务器大得多的服务器！）


    在树中，由于典型的要求是每棵树只有一个根节点，因此插入过程将包括将新节点链接到树中另一个节点的方法。


    一次插入一行数据更接近你在现实世界中看到的情况，因为数据会随时间变化。了解生成数千行数据需要多长时间，可能是决定在构建树结构时使用哪种算法的重要因素。这实际上取决于你的个人需求。图形节点，尤其是树结构中那些以自然的、逐个方式存在的节点，添加到数据结构中的速度未必像独立于其他行的普通行那样快。


    ```sql

    CREATE OR ALTER PROCEDURE SqlGraph.Company$Insert

    (

    @Name VARCHAR(20),

    --使用自然键值使其更自然一些

    @ParentCompanyName VARCHAR(20)

    --并且确保在演示代码中代理值不必总是相同的

    )

    AS

    BEGIN

    SET NOCOUNT ON;

    BEGIN TRY

    BEGIN TRANSACTION

    --获取节点的父节点

    DECLARE @ParentNode NVARCHAR(1000) =

    (SELECT $node_id

    FROM SqlGraph.Company

    WHERE name = @ParentCompanyName);

    IF @ParentCompanyName IS NOT NULL

    AND @ParentNode IS NULL

    THROW 50000, ''Invalid ParentCompanyName'', 1;

    ELSE

    BEGIN

    --插入操作仅通过使用父节点的名称

    --来获取父节点的键...

    IF @ParentNode IS NULL

    BEGIN

    --在某些情况下，知道哪个节点是根节点是有利的，

    --特别是因为我们通常只想要一个根节点。

    INSERT INTO SqlGraph.Company

    (Name, RootNodeFlag)

    SELECT @Name,1;

    END

    ELSE

    BEGIN

    INSERT INTO SqlGraph.Company(Name)

    SELECT @Name;

    DECLARE @ChildNode nvarchar(1000) =

    (SELECT $node_id

    FROM SqlGraph.Company

    WHERE name = @Name);

    INSERT INTO SqlGraph.ReportsTo

    ($from_id, $to_id)

    VALUES (@ParentNode, @ChildNode);

    END;

    END

    COMMIT TRANSACTION

    END TRY

    BEGIN CATCH

    IF XACT_STATE() <> 0

    ROLLBACK TRANSACTION;

    THROW; --重新抛出错误

    END CATCH;

    END;

    GO

    ```


    ### 插入初始数据


    在以下脚本中，你将插入第一组节点以实现图 5-2 所示的子图。


    ![](img/508094_1_En_5_Fig2_HTML.jpg)


    一个数据结构。公司总部划分为缅因州总部和田纳西州总部。


    图 5-2


    首次插入后的结构


    ```sql

    EXEC SqlGraph.Company$Insert @Name = ''Company HQ'',

    @ParentCompanyName = NULL;

    EXEC SqlGraph.Company$Insert @Name = ''Maine HQ'',

    @ParentCompanyName = ''Company HQ'';

    EXEC SqlGraph.Company$Insert @Name = ''Tennessee HQ'',

    @ParentCompanyName = ''Company HQ'';

    ```


    ### 查看插入的数据


    查看刚刚插入的数据：


    ```sql

    SELECT CAST($node_id AS VARCHAR(64)) AS [$node_id],

    CompanyId,

    Name

    FROM SqlGraph.Company;

    SELECT CAST($edge_id as varchar(64)) as [$edge_id],

    CAST($from_id as varchar(64)) as [$from_id],

    CAST($to_id as varchar(64)) as [$to_id]

    FROM   SqlGraph.ReportsTo;

    ```


    你将看到数据在书中很难显示（实际上在你处理时也不那么容易查看！在这个例子中我只是让它自动换行）。


    ```

    $node_id                                                     CompanyId   Name

    ------------------------------------------------------------ ---------- -----------

    {"type":"node","schema":"SqlGraph","table":"Company","id":0}  1         Company
    HQ

    {"type":"node","schema":"SqlGraph","table":"Company","id":1}  2         Maine
    HQ

    {"type":"node","schema":"SqlGraph","table":"Company","id":2}      3          Tennessee
    HQ

    ```


    以及边：'
- fmt: '```

    $edge_id                                                         $from_id                                                                 $to_id


    {"type":"edge","schema":"SqlGraph","table":"ReportsTo","id":0}   {"type":"node","schema":"SqlGraph","table":"Company","id":0}     {"type":"node","schema":"SqlGraph","table":"Company","id":1}

    {"type":"edge","schema":"SqlGraph","table":"ReportsTo","id":1}   {"type":"node","schema":"SqlGraph","table":"Company","id":0}     {"type":"node","schema":"SqlGraph","table":"Company","id":2}

    ```


    Rather than even try to output data and try to format it in its natural style,
    for most of the book, when I need to show the internals, I will use the following
    functions that are available in a tools file in the downloads for this chapter:


    ```sql

    SELECT Tools.Graph$NodeIdFormat($node_id,0) AS [$node_id],

    CompanyId,

    Name

    FROM SqlGraph.Company;

    SELECT Tools.Graph$EdgeIdFormat($edge_id,0) AS [$edge_id],

    Tools.Graph$NodeIdFormat($from_id,0) AS [$from_id],

    Tools.Graph$NodeIdFormat($to_id,0) AS [$to_id]

    FROM SqlGraph.ReportsTo;

    ```


    This returns the same details in a more compact manner, due to the limited real
    estate on the page. I set the second parameter in the function call to `0` to
    not include schemas in this example to save space since all tables involved will
    be in the same schema.


    ```text

    $node_id        CompanyId   Name

    --------------- ----------- --------------------

    Company id:0    1           Company HQ

    Company id:1    2           Maine HQ

    Company id:2    3           Tennessee HQ

    $edge_id         $from_id        $to_id

    ---------------- --------------- --------------

    ReportsTo id:0   Company id:0    Company id:1

    ReportsTo id:1   Company id:0    Company id:2

    ```


    You will see that you have three nodes and two edges. `CompanyHQ`’s internal id
    value is `0` assuming you don’t have any error/retries along the way (I did many
    times and started over so I could get the ideal output). The internal values are
    not that important even to my examples, so it is not imperative that these are
    the internal values you see when you execute this code.


    Next, you are going to add your first leaf node. To make the whole example simpler,
    I only put sale data on root nodes. This is also a very reasonable expectation
    to have in the real world for many situations. It does not really affect the outcome
    if sale data was appended to the non-root nodes either, but it would be very typical
    for the stores or salespersons to have sales, but the region to only have sales
    based on the stores or salespersons.


    ```sql

    EXEC SqlGraph.Company$Insert @Name = ''Nashville Branch'',

    @ParentCompanyName = ''Tennessee HQ'';

    EXEC SqlGraph.Sale$InsertTestData @Name = ''Nashville Branch'';

    ```


    After executing that code, you can see the sale data inserted here:


    ```sql

    SELECT *

    FROM   SqlGraph.Sale;

    ```


    This returns


    ```text

    SalesId  TransactionNumber Amount    CompanyId

    -------- ----------------- --------- -----------

    1        1                 0.25      4

    2        2                 0.50      4

    3        3                 0.75      4

    4        4                 1.00      4

    5        5                 1.25      4

    ```


    The goal is that every time you generate this set (and later when you build other
    versions of this test database), `Nashville Branch` will always have the same
    `$3.75` worth of sales. Obviously, this is not a very real amount of money (and
    every new node will have five new sales that are always increasing), but keeping
    values and row counts the same is helpful for a performance and correctness test.


    The fact that values match in examples has saved me many times when testing the
    tree algorithms (which, as you will see in the next chapter, can occasionally
    be kind of hairy). I use this set of data as my unit test for all these algorithms.
    Using this query, you can see the values in the table:


    ```sql

    SELECT Name, SUM(amount)

    FROM   SqlGraph.Sale

    JOIN SqlGraph.Company

    ON Company.CompanyId = Sale.CompanyId

    GROUP BY Name;

    ```


    This shows you just the one row:


    ```text

    Name

    -------------------- ---------------------------------------

    Nashville Branch     3.75

    ```


    Now insert the rest of the data for the graph, adding sales for all of the leaf
    nodes:


    ```sql

    EXEC SqlGraph.Company$Insert @Name = ''Knoxville Branch'',

    @ParentCompanyName = ''Tennessee HQ'';

    EXEC SqlGraph.Sale$InsertTestData @Name = ''Knoxville Branch'';

    EXEC SqlGraph.Company$Insert @Name = ''Memphis Branch'',

    @ParentCompanyName = ''Tennessee HQ'';

    EXEC SqlGraph.Sale$InsertTestData @Name = ''Memphis Branch'';

    EXEC SqlGraph.Company$Insert @Name = ''Portland Branch'',

    @ParentCompanyName = ''Maine HQ'';

    EXEC SqlGraph.Sale$InsertTestData @Name = ''Portland Branch'';

    EXEC SqlGraph.Company$Insert @Name = ''Camden Branch'',

    @ParentCompanyName = ''Maine HQ'';

    EXEC SqlGraph.Sale$InsertTestData @Name = ''Camden Branch'';

    GO

    ```


    Now let’s look at the data in a very human-readable form. One of the interesting
    things about SQL graph queries is that there is no easy way to do an `OUTER` style
    join/connection with the syntax. So, if you want to list all the data in the tree,
    you need to do a little bit more than just the `MATCH` query to get the root node
    in the output. The root node(s) in the table turn out to be the ones where the
    `$node_id` doesn’t appear as a `$to_id` in an edge.


    It is something you will also need to do in any graph, but it is very much a part
    of the process when building a tree. Avoiding that query is why I added the `RootNodeFlag`
    column to my objects.


    The following query will give you the nodes in the tree including the root:


    ```sql

    --get the root

    SELECT Company.CompanyId, Company.Name, NULL AS ParentCompanyId

    FROM  SqlGraph.Company

    WHERE  RootNodeFlag = 1

    UNION ALL

    --get all the children of the root. Our tree can only have the one root since
    we have a UNIQUE constraint on the $to_id column

    SELECT Company.CompanyId, Company.Name, ParentCompany.CompanyId AS ParentCompanyId

    FROM   SqlGraph.Company,

    SqlGraph.ReportsTo,

    SqlGraph.Company AS ParentCompany

    WHERE MATCH(Company<-(ReportsTo)-ParentCompany);

    ```


    This returns


    ```text

    CompanyId   Name                 ParentCompanyId

    ----------- -------------------- ---------------

    1           Company HQ           NULL

    2           Maine HQ             1

    3           Tennessee HQ         1

    4           Nashville Branch     3

    5           Knoxville Branch     3

    6           Memphis Branch       3

    7           Portland Branch      2

    8           Camden Branch        2

    ```


    In the downloads, I compiled this to a view named `SqlGraph.CompanyClean` to make
    continuing queries to these structures easier to work with.


    Next up are few operations for how to look at the data in a semi-graphical manner.
    In the following query, you output the data as a hierarchy, showing the path through
    the tree (I commented out the `Name` column, as it is also represented at the
    last value in the hierarchy):


    ```sql

    --the first node in a query will typically not show up in

    --the output, so we have to include it seperately

    SELECT 0 AS Level, Company.Name AS Hierarchy --,Company.Name

    FROM  SqlGraph.Company

    WHERE  RootNodeFlag = 1

    UNION ALL

    SELECT    COUNT(ReportsToCompany.CompanyId)

    WITHIN GROUP (GRAPH PATH) ,

    Company.NAME + ''->'' +

    STRING_AGG(ReportsToCompany.name, ''->'')

    WITHIN GROUP (GRAPH PATH) AS Friends

    --,LAST_VALUE(ReportsToCompany.name)

    --       WITHIN GROUP (GRAPH PATH) AS LastNode

    FROM    SqlGraph.Company AS Company,

    SqlGraph.ReportsTo FOR PATH AS ReportsTo,

    SqlGraph.Company FOR PATH AS ReportsToCompany

    WHERE MATCH(SHORTEST_PATH(Company(-(ReportsTo)

    ->ReportsToCompany)+))

    AND  Company.RootNodeFlag = 1

    ```


    The output of this query gives the following:'
  raw: '```

    $edge_id                                                         $from_id                                                                 $to_id


    {"type":"edge","schema":"SqlGraph","table":"ReportsTo","id":0}   {"type":"node","schema":"SqlGraph","table":"Company","id":0}     {"type":"node","schema":"SqlGraph","table":"Company","id":1}

    {"type":"edge","schema":"SqlGraph","table":"ReportsTo","id":1}   {"type":"node","schema":"SqlGraph","table":"Company","id":0}     {"type":"node","schema":"SqlGraph","table":"Company","id":2}

    ```


    Rather than even try to output data and try to format it in its natural style,
