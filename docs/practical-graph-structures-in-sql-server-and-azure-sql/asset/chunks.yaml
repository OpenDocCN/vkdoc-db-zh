    in each of the major sections.'
  trans: '

    # 2. 数据结构与算法


    在本章中，我将介绍你可以使用 SQL Server 中的对象创建的常见图配置。我将从定义几乎所有图结构在关系型（或实际上任何）数据库中的存储基础知识开始。创建用于保存图结构的表相当直接；复杂之处在于处理数据时。


    对于我将介绍的每一种数据结构配置，我都会包含一个关于处理它们所用算法的高级解释。这将使后续章节可以专注于构建代码来处理数据结构中的数据。


    ## 基本实现


    如前一章所讨论的，图的基本构建块是节点和边。节点基本上与任何表示特定概念的数据库关系表相同。边表示这些表中两行之间的链接，非常像关系型数据库中典型的多对多解析表。


    所以，假设你有如图 2-1 所示的图。


    ![](img/508094_1_En_2_Fig1_HTML.png)


    一幅插图，左侧和右侧分别是两个节点 `N1` 和 `N2`，由 `E1` 连接。


    **图 2-1**


    简单图


    你需要一个表来保存 `N1` 和 `N2` 节点。这些节点可以是相同类型，也可以是不同类型。例如，他们可以是互为朋友或家人的两个人，或者一个人是某个足球队的球迷。在这个例子中，我们假设它们是相同类型（将来，如果我想要它们是两种不同类型的对象，我会相应地标记节点）。


    对于我的示例，我将使用在大多数关系表中都很常见的数据，因为你通常会这样思考数据。在接下来的两章中，我将阐述 SQL Server 如何实现图结构，但现在，你可以认为数据结构基本上就像你以前在
    SQL Server 表中构建的那样。为了实现图 2-1 的结构，假设你有如下行在表中表示两个节点：


    ```

    Node

    ----

    N1

    N2

    ```


    现在你需要一个表示边的数据结构，像这样：


    ```

    FromNode  ToNode

    --------  -------

    N1        N2

    ```


    这种数据结构的一个常见术语是 `adjacency list`（邻接表）。其目标是存储图中彼此相邻的节点列表。除了一种非常特殊（且相当常见）的图数据结构（树，我将在本章后面定义）外，这就是在数据库中实现图的方式。即使是
    Microsoft SQL Server 的图对象，`internally`（在内部）也是这样实现的。通常使用术语 `neighbor`（邻居）或 `parent/child`（父/子）来描述节点之间的关系。父和子在非循环关系中非常常见，而邻居用于记录两个节点彼此相邻且关系允许循环的情况。关系中的子/邻居节点是在
    `ToNode` 列中表示的那个。


    在实践中，除了键值，你的节点表中总是会有额外的列，边表中通常也如此。利用边数据结构的 `from` 和 `to` 列，再加上其他列，你可以通过对不同列应用一个或多个唯一索引，以及使用其他方法来限制可放入列的数据类型，从而创建许多不同形状的图。这就是我在本章剩余部分将要介绍的内容。


    我将讨论两种主要的图配置类型：`acyclic`（无环）和 `cyclic`（有环）。从第一章来看，希望清楚它们之间的主要区别在于一个允许边中存在环，而另一个不允许。当然，另一个区别是这些数据结构适用的情况类型。


    无环图通常用于定义结构非常规整的东西，而有环图则适用于更有机的场景。在每个主要部分中，这一点将变得更加清晰。

    '
- fmt: '## Acyclic Graphs


    The easiest graphs to work with in a relational database are acyclic. The reason
    comes down to the method used to process graphs in a relational setting, the `breadth-first
    algorithm` (or `relational recursion`). This algorithm was created for relational
    processing, because the typical recursion used to process these data structures
    did not fit well with the set-based nature of a relational database.


    For example, consider the graph in Figure [2-2](#508094_1_En_2_Chapter.xhtml#Fig2).


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig2_HTML.png)


    A graphical structure. N 1 divides into N 11, N 12, and N 13\. N 11 splits into
    N 111, N 112, and N 113, while N 12 splits into N 121, N 122, and N 123\. N 13
    is subdivided into N 133, N 132, and N 131.


    ### Figure 2-2


    Sample graph structure


    Processing this using a typical recursive manner, you choose your starting point
    as N1 and then see if this node has one unprocessed child. It does, so fetch N11\.
    See if N11 has unprocessed children. Yes, N111\. N111 has no unprocessed child
    nodes, so whatever you are doing with the data of the node, you add that to an
    output data structure. Then step back up to N11 and get the next child node. And
    keep going. This is referred to as a `depth-first algorithm`.


    Common operations are counting nodes, summing sales from that node, and so on.
    For your example, let’s just say you are counting child nodes. So, you recurse
    back to N11 and add 1 to the child count. Then you check for more child nodes,
    and you have more. Over and over. You stop when every node has been processed
    in the subgraph that started with your starting point.


    This works great for certain kinds of programming languages but terrible for relational
    ones where set-based processing is the clearly desired method of programming.
    It works with sets of data, so that is the kind of processing that has been devised
    for working with graphs in the manner that relations engines work.


    For a `breadth-first algorithm`, instead of digging down in the structure, you
    take a starting point and then get all of the children of that node. Then the
    children of those nodes, all at once. Taking that same diagram, let’s break this
    down into a series of three queries on the data, as seen in Figure [2-3](#508094_1_En_2_Chapter.xhtml#Fig3).


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig3_HTML.png)


    A graphical structure illustrates the levels fetched in a breadth-first query.
    Level 1\. N 1 branches into, N 11, N 12, and N 13 in Level 2, with their respective
    branches of N 111, N 112, and N 113, N 121, N 122, and N 123, N 133, N 132, and
    N 131 in Level 3.


    ### Figure 2-3


    Sample graph indicating the different levels that will be fetched in a breadth-first
    query


    You query for the starting point. In this case, it’s one node, but it could be
    any number of nodes (in fact, that is the basis of some of the code in this book
    to do things like starting at every node simultaneously!). Your breadth-first
    algorithm is to query:


    ```sql

    SELECT GraphId

    FROM   GraphObject

    WHERE GraphId = @startingPoint --starting point = N1

    ```


    The next step is to take that set of data and query:


    ```sql

    SELECT GraphId

    FROM  GraphObject

    WHERE GraphId in (GraphId values from previous query)

    ```


    From the diagram, this gives you a set with N11, N12, N13\. The next query does
    the same join, but the `GraphId` from the previous query is now these three nodes.
    You can sum/count/etc. during each loop through the data. There is more to it,
    clearly, which will become clearer when I implement the non-pseudo-code, but this
    is the gist of the algorithm.


    This process is pretty easy for an acyclic graph, but you can probably already
    start to see the difficulties when working with cyclic graph structures, in that
    if you have the graph in Figure [2-4](#508094_1_En_2_Chapter.xhtml#Fig4), it will
    loop eternally.


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig4_HTML.png)


    A cyclic graph structure. N 1 node is linked to N 2, N 2 is linked to N 3, and
    N 3 is linked to N 1.


    ### Figure 2-4


    Sample graph with a cycle


    Many operations stop making sense because you have an eternal loop when processing
    this with a naïve nested loop algorithm.


    One thing to note: If you have been taught repeatedly that relational processes
    should avoid iterative code, this may shock you a little. Practically all graph
    processing is iterative. Any code you write, and any code that Microsoft uses
    to implement its graph structures, is iterative. The trick will be to make sure
    the amount you iterate is the least possible and is as efficient as possible.
    There are some alternative methods of processing when dealing with tree algorithms,
    one of which will be covered in Chapter [6](#508094_1_En_6_Chapter.xhtml).'
  raw: '## Acyclic Graphs


    The easiest graphs to work with in a relational database are acyclic. The reason
    comes down to the method used to process graphs in a relational setting, the **breadth-first
    algorithm** (or **relational recursion**). This algorithm was created for relational
    processing, because the typical recursion used to process these data structures
    did not fit well with the set-based nature of a relational database.


    For example, consider the graph in Figure [2-2](#508094_1_En_2_Chapter.xhtml#Fig2).


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig2_HTML.png)


    A graphical structure. N 1 divides into N 11, N 12, and N 13\. N 11 splits into
    N 111, N 112, and N 113, while N 12 splits into N 121, N 122, and N 123\. N 13
    is subdivided into N 133, N 132, and N 131.


    Figure 2-2


    Sample graph structure


    Processing this using a typical recursive manner, you choose your starting point
    as N1 and then see if this node has one unprocessed child. It does, so fetch N11\.
    See if N11 has unprocessed children. Yes, N111\. N111 has no unprocessed child
    nodes, so whatever you are doing with the data of the node, you add that to an
    output data structure. Then step back up to N11 and get the next child node. And
    keep going. This is referred to as a **depth-first algorithm**.


    Common operations are counting nodes, summing sales from that node, and so on.
    For your example, let’s just say you are counting child nodes. So, you recurse
    back to N11 and add 1 to the child count. Then you check for more child nodes,
    and you have more. Over and over. You stop when every node has been processed
    in the subgraph that started with your starting point.


    This works great for certain kinds of programming languages but terrible for relational
    ones where set-based processing is the clearly desired method of programming.
    It works with sets of data, so that is the kind of processing that has been devised
    for working with graphs in the manner that relations engines work.


    For a breadth-first algorithm, instead of digging down in the structure, you take
    a starting point and then get all of the children of that node. Then the children
    of those nodes, all at once. Taking that same diagram, let’s break this down into
    a series of three queries on the data, as seen in Figure [2-3](#508094_1_En_2_Chapter.xhtml#Fig3).


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig3_HTML.png)


    A graphical structure illustrates the levels fetched in a breadth-first query.
    Level 1\. N 1 branches into, N 11, N 12, and N 13 in Level 2, with their respective
    branches of N 111, N 112, and N 113, N 121, N 122, and N 123, N 133, N 132, and
    N 131 in Level 3.


    Figure 2-3


    Sample graph indicating the different levels that will be fetched in a breadth-first
    query


    You query for the starting point. In this case, it’s one node, but it could be
    any number of nodes (in fact, that is the basis of some of the code in this book
    to do things like starting at every node simultaneously!). Your breadth-first
    algorithm is to query:


    ```

    SELECT GraphId

    FROM   GraphObject

    WHERE GraphId = @startingPoint --starting point = N1

    ```


    The next step is to take that set of data and query:


    ```

    SELECT GraphId

    FROM  GraphObject

    WHERE GraphId in (GraphId values from previous query)

    ```


    From the diagram, this gives you a set with N11, N12, N13\. The next query does
    the same join, but the `GraphId` from the previous query is now these three nodes.
    You can sum/count/etc. during each loop through the data. There is more to it,
    clearly, which will become clearer when I implement the non-pseudo-code, but this
    is the gist of the algorithm.


    This process is pretty easy for an acyclic graph, but you can probably already
    start to see the difficulties when working with cyclic graph structures, in that
    if you have the graph in Figure [2-4](#508094_1_En_2_Chapter.xhtml#Fig4), it will
    loop eternally.


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig4_HTML.png)


    A cyclic graph structure. N 1 node is linked to N 2, N 2 is linked to N 3, and
    N 3 is linked to N 1.


    Figure 2-4


    Sample graph with a cycle


    Many operations stop making sense because you have an eternal loop when processing
    this with a naïve nested loop algorithm.


    One thing to note: If you have been taught repeatedly that relational processes
    should avoid iterative code, this may shock you a little. Practically all graph
    processing is iterative. Any code you write, and any code that Microsoft uses
    to implement its graph structures, is iterative. The trick will be to make sure
    the amount you iterate is the least possible and is as efficient as possible.
    There are some alternative methods of processing when dealing with tree algorithms,
    one of which will be covered in Chapter [6](#508094_1_En_6_Chapter.xhtml).'
  trans: '## 无环图


    在关系型数据库中处理起来最简单的图是无环图。原因在于在关系型环境中处理图所采用的方法，即 `广度优先算法`（或 `关系递归`）。该算法是为关系型处理而创建的，因为用于处理这些数据结构的典型递归方式与关系型数据库基于集合的本质不太契合。


    例如，考虑图 2-2 中的图。


    ![](img/508094_1_En_2_Fig2_HTML.png)


    一个图形结构。N1 分支出 N11、N12 和 N13。N11 分支出 N111、N112 和 N113，而 N12 分支出 N121、N122 和 N123。N13
    被细分为 N133、N132 和 N131。


    ### 图 2-2


    示例图结构


    使用典型的递归方式处理此图时，你选择 N1 作为起点，然后检查该节点是否有一个未处理的子节点。它确实有，于是获取 N11。检查 N11 是否有未处理的子节点。是的，N111。N111
    没有未处理的子节点，因此无论你对该节点的数据执行什么操作，你都会将其添加到一个输出数据结构中。然后退回到 N11 并获取下一个子节点。如此继续。这被称为 `深度优先算法`。


    常见的操作包括计算节点数、汇总该节点的销售额等。对于你的例子，假设你只是在计算子节点数量。因此，你递归回到 N11，并将子节点计数加 1。然后你检查是否还有更多子节点，确实还有。一遍又一遍。直到以起点开始的子图中的每个节点都被处理完毕，你才停止。


    这对于某些编程语言来说效果很好，但对于关系型语言来说就很糟糕，因为关系型语言明显期望的处理方式是基于集合的处理。它处理的是数据集合，因此针对关系引擎工作方式而设计的图处理方法就是这种类型。


    对于 `广度优先算法`，你不是深入结构内部，而是取一个起点，然后获取该节点的所有子节点。接着一次性获取这些节点的子节点。还是用同一张图，让我们将其分解为数据上的三个连续查询，如图
    2-3 所示。


    ![](img/508094_1_En_2_Fig3_HTML.png)


    一个图形结构展示了在广度优先查询中获取的层级。第 1 层。N1 在第 2 层分支为 N11、N12 和 N13，它们在第 3 层分别拥有自己的分支：N111、N112、N113；N121、N122、N123；以及
    N133、N132、N131。


    ### 图 2-3


    指示在广度优先查询中将获取的不同层级的示例图


    你查询起点。在此例中，它是一个节点，但它可以是任意数量的节点（实际上，本书中一些代码的基础就是做类似从每个节点同时开始的事情！）。你的广度优先算法是进行查询：


    ```sql

    SELECT GraphId

    FROM   GraphObject

    WHERE GraphId = @startingPoint --起点 = N1

    ```


    下一步是获取该数据集并查询：


    ```sql

    SELECT GraphId

    FROM  GraphObject

    WHERE GraphId in (上一次查询得到的 GraphId 值)

    ```


    从图中看，这会给你一个包含 N11、N12、N13 的集合。下一次查询执行相同的连接，但上一次查询的 `GraphId` 现在是这三个节点。你可以在每次循环数据时进行求和/计数等操作。显然，这里面还有更多内容，当我实现非伪代码时会变得更清晰，但这就是该算法的要点。


    这个过程对于无环图来说相当简单，但你可能已经开始看到在处理有环图结构时的困难了，因为如果你有图 2-4 中的图，它将会无限循环。


    ![](img/508094_1_En_2_Fig4_HTML.png)


    一个有环的图结构。节点 N1 链接到 N2，N2 链接到 N3，N3 又链接回 N1。


    ### 图 2-4


    带有环的示例图


    许多操作变得没有意义，因为使用简单的嵌套循环算法处理时，你会陷入无限循环。


    需要注意的一点是：如果你被反复教导关系型处理应该避免迭代代码，这可能会让你有点惊讶。几乎所有的图处理都是迭代的。你编写的任何代码，以及微软用于实现其图结构的任何代码，都是迭代的。诀窍在于确保迭代的次数尽可能少，并尽可能高效。在处理树算法时，有一些替代的处理方法，其中一种将在第
    6 章中介绍。'
- fmt: '### Trees


    多年来在关系型数据库中实现的最常见的图就是**树**。树是一种结构，要求每个节点要么有零个父节点，要么有一个父节点，不能更多。想象一棵真实的树（或者如图[2-5](#508094_1_En_2_Chapter.xhtml#Fig5)所示，迪士尼动物王国主题公园中一棵宏伟的树的复制品）。


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig5_HTML.png)


    一棵有着粗壮树干和多片树叶的树枝的树的照片。


    图 2-5

    一棵并非完全鲜活的树，作为树结构的类比


    它有一个插入地面的树干。无论朝哪个方向出去（向下到根部或向上到树枝），你都可以看到这个类比。任何树枝都可以来自树干或其他树枝，但它只能是其中之一。树枝不会一起生长并重新合并成一个。（至少通常不会，而且这不是植物学课！）没有任何子节点的节点被称为叶节点，就像树枝上的叶子是独立的一样。


    我的广度优先示例结构是一棵树，重新包含为图[2-6](#508094_1_En_2_Chapter.xhtml#Fig6)。


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig6_HTML.png)


    一个图形结构。`N 1` 分裂为 `N 11`、`N 12` 和 `N 13`。`N 11` 分裂为 `N 111`、`N 112` 和 `N 113`，而
    `N 12` 分裂为 `N 121`、`N 122` 和 `N 123`。`N 13` 被细分为 `N 133`、`N 132` 和 `N 131`。


    图 2-6

    重复的示例树


    要在邻接表结构中表示这一点，你需要类似这样的行：


    ```

    From   To

    ———-   ———-

    N1     N11

    N11    N111

    N11    N112

    N11    N113

    N1     N12

    ```


    以此类推。为了确保该结构始终是一棵树，你需要保护一个主要条件：唯一的 `to` 值。因为在树中一个子行只能有一个父行，所以在邻接表的该列上设置唯一性约束可以确保它是一棵树。


    你通常还需要做的另一件事是包含某种约束，以确保 `from` 值不等于 `to` 值。这是唯一性约束无法阻止的循环（尽管重复的 `to` 和 `from`
    值基本上会使该行成为根和叶，并且很可能被迅速发现……但我的座右铭之一是 *如果坏数据根本不发生，它就不会发生*）。


    虽然所有树结构都需要单个根，但这样的表结构可以包含多个树结构。在某些情况下，一个值为 `NULL, N1` 的行可以在创建树时作为起点包含在结构中。你可以使用唯一索引来确保只有一个根节点，唯一索引只允许一个
    `NULL` 值。（SQL Server 在索引中将 `NULL` 值视为不同的值，不像在比较中，因此这将确保你只有一个根节点。）。你可以通过使用忽略 `NULL`
    值的过滤 `UNIQUE` 索引来允许多于一个根节点。如果你想确保 `NULL` 行永远不会被删除，可以使用触发器对象，如果你的用户可以即兴删除行，这尤其有用。


    如果你需要为多个树结构建模，只需创建多个边对象，每个对象都有不同的用途。例如，考虑一个公司的汇报结构。有多个项目正在进行，其中某人处于项目管理层次结构中，通常还有一个处理人力资源类事情的层次结构。所以，你可以创建：


    ```

    ManagementEdge (FromEmployee, ToEmployee)

    ```


    你也可以为每个项目再次创建相同的表。


    ```

    Project1 (FromEmployee, ToEmployee)

    Project2 (FromEmployee, ToEmployee)

    ```


    或者，你可以将其建模为一个允许许多树共存于同一结构中的结构。


    ```

    ReportingHierarchy (FromEmployee, ToEmployee, HierarchyName)

    ```


    为通用树结构讨论的所有索引仍然有意义，但你会在对象中包含 `HierarchyName`，因为如果一个员工可以参与多个项目，那么唯一性仅针对一个项目成立。


    也许将 `ManagementEdge` 按上述方式建模，然后让项目层次结构位于其自己的 `ProjectManagementEdge` 中是合理的，因为它们服务于不同的目的。如何为你的图建模与任何数据库的挑战基本相同：使结构与你的需求相匹配，既要严格到可以防止坏数据，又要灵活到能做客户想做的事情。


    最后，请注意，你可以实现父节点基数的变体来实现严格的树类型。例如，**二叉树**或**简单树**被定义为每个节点只能有两个子节点的树。考虑图[2-7](#508094_1_En_2_Chapter.xhtml#Fig7)。


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig7_HTML.png)


    一棵二叉树从 `N 1` 开始，分支为 `N 11` 和 `N 12`。进一步地，它分别分支为 `N 111` 和 `N 112`，以及 `N 121` 和
    `N 122`。


    图 2-7

    示例二叉树


    为创建二叉树（或实际上任何有限的子行基数）必须考虑的一个问题是，如何确保不会创建违反结构子节点的节点。有几种有效的方法。使用触发器来计算节点数量是一种方法，另一种是添加节点编号并使用检查约束只允许值
    1 和 2，并在 `from` 项上设置唯一索引。


    所以：


    ```

    BinaryTree (FromNode, ToNode, NodeNumber (Values IN 1, 2), UNIQUE (From, NodeNumber);

    ```


    缺点是，你有了一个似乎指示节点顺序很重要的列。（在某些系统中，你可能需要这种排序，也许是引导用户的方向或对节点进行排序。）


    也可以认为，某种数据完整性可以延迟检查，你只是在进行更改后检查并在之后修复问题，特别是当你的需求变得更加复杂时。无论你*如何*确保完整性得到实施，它都需要被实施。


    处理树时的另一个重要概念是树的**平衡**程度。例如，考虑图[2-8](#508094_1_En_2_Chapter.xhtml#Fig8)。


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig8_HTML.png)


    一个不平衡结构的示意图。`N 1` 被划分为 `N 11` 和 `N 12`。`N 11` 被细分为 `N 111`、`N 112` 和 `N 113`。`N
    112` 链接到 `N 1121`，然后又被细分为 `N 11211`、`N 11213` 和 `N 11212`。`N 12` 链接到 `N 121`。


    图 2-8

    一棵不平衡的树


    当使用广度优先算法时，一个非常平衡的、**浅**（即从根到叶节点的跳跃次数较少）的结构处理速度更快，因为你需要进行的迭代次数更少。如果你正在创建一个树来搜索索引到某些数据，或者仅仅是表示现实世界中本身就如此的事物时，这可能非常重要。


    > 注意

    > 在第[6]章中，我将介绍并演示一种实现树结构的替代方法，这种方法得益于其结构的刚性。'
  raw: '### Trees


    By far the most common graph that has been implemented in relational databases
    for many years is a **tree**. A tree is a structure that requires that every node
    have either zero or one parent, and no more. Consider a real tree (or in the case
    of Figure [2-5](#508094_1_En_2_Chapter.xhtml#Fig5), a glorious reproduction of
    a tree from Disney’s Animal Kingdom theme park).


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig5_HTML.png)


    A photo of a tree with a large trunk and multiple branches with leaves.


    Figure 2-5


    A not-exactly-live tree as an analogy for a tree structure


    It has one trunk that goes into the ground. Either direction out (down to the
    roots or up to the branches), you can see the analogy. Any branch can be from
    the trunk or another branch, but it can only be one of these. Branches don’t grow
    together and reform as one. (At least not typically, and this isn’t botany class!)
    Nodes that do not have any child nodes are referred to as leaf nodes, much like
    the leaves on the branches stand alone.


    My breadth-first example structure was a tree, reincluded as Figure [2-6](#508094_1_En_2_Chapter.xhtml#Fig6).


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig6_HTML.png)


    A graphical structure. N 1 divides into N 11, N 12, and N 13\. N 11 splits into
    N 111, N 112, and N 113, while N 12 splits into N 121, N 122, and N 123\. N 13
    is subdivided into N 133, N 132, and N 131.


    Figure 2-6


    Example tree repeated


    To represent this in an adjacency list structure, you have rows like


    ```

    From   To

    ———-   ———-

    N1     N11

    N11    N111

    N11    N112

    N11    N113

    N1     N12

    ```


    And so on. In order to make sure that the tree is always a tree, you need to protect
    one main condition: unique **to** values. Since a child row can only have one
    parent in a tree, having a uniqueness constraint on that column of the adjacency
    list ensures it is a tree.


    The other thing you typically need to do is include a constraint of some sort
    to make sure that the `from` value does not equal the `to` value. This is the
    only cycle that the uniqueness constraint will not stop (though a duplicated `to`
    and `from` value basically makes the row a root and a leaf and would likely be
    discovered quickly…but one of my mottos is that *bad data doesn’t happen if you
    don’t let it occur at all*).


    While all tree structures require a single root, a table structure such as this
    could contain multiple tree structures. In some cases, a row with `NULL, N1` could
    be included in the structure as the starting point when you create the tree. You
    can make sure there is only one using a unique index, which only allows one `NULL`
    value. (SQL Server treats a `NULL` value as distinct in indexes, unlike in comparisons,
    so that would make sure that you had only one root node.). You could allow greater
    than one root node by using a filtered `UNIQUE` index that ignores `NULL` values.
    If you want to make sure the `NULL` row is never deleted, a trigger object can
    be used, which is especially useful if you have users that can delete rows in
    an ad-hoc manner.


    If you need to model multiple tree structures, it is possible to just create multiple
    edge objects, each with a distinct purpose. For example, consider a company reporting
    structure. There are multiple projects going on where a person is in the project
    management hierarchy, and typically there is a hierarchy for dealing with HR type
    things. So, you could create


    ```

    ManagementEdge (FromEmployee, ToEmployee)

    ```


    And you could also create the same table again for every project.


    ```

    Project1 (FromEmployee, ToEmployee)

    Project2 (FromEmployee, ToEmployee)

    ```


    Alternatively, you could model this as one structure that allows for many trees
    to coincide in the same structure.


    ```

    ReportingHierarchy (FromEmployee, ToEmployee, HierarchyName)

    ```


    All the indexes discussed for the general tree structures would still make sense,
    but you would include the `HierarchyName` in the object because the uniqueness
    stands only for one project if an employee can be on multiple projects.


    It might just make sense to have the `ManagementEdge` as modeled, but then have
    the project hierarchy be in its own `ProjectManagementEdge` since they serve different
    purposes. Determining how to model your graph is pretty much the same challenge
    as with any database: making the structures match your requirements with the tightness
    to prevent bad data and the flexibility to do what the customer wants to do.


    Finally, note that you can implement variations of parent cardinalities to implement
    strict types of trees. For example, a **binary** or **simple tree** is defined
    as a tree where you can only have two children for each node. Consider Figure
    [2-7](#508094_1_En_2_Chapter.xhtml#Fig7).


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig7_HTML.png)


    A binary tree starts with N 1 and branches into N 11 and N 12. Further, it branches
    into N 111 and N 112, and N 121 and N 122 respectively.


    Figure 2-7


    Sample binary tree


    One consideration you must have for creating a binary tree (or really any limited
    cardinality of child row) is how to make sure a node that violates the structure
    child is not created. There are a few methods that work. Using triggers to count
    the number of nodes is one, as is adding a node number and using a check constraint
    to only allow values of 1 and 2, along with a unique index on the from item.


    So


    ```

    BinaryTree (FromNode, ToNode, NodeNumber (Values IN 1, 2), UNIQUE (From, NodeNumber);

    ```


    The downside is that you have this column that seems to indicate an order to the
    nodes that is important. (In some systems you may desire that ordering, perhaps
    to guide the user in a direction or to sort the nodes.)


    It can also be argued that some data integrity of this sort could be deferred,
    and you simply check after changes have been made and fix issues later, especially
    if your requirements get more complicated. Regardless of *how* you make sure integrity
    is enforced, it needs to be enforced.


    Another important concept when working with trees is how **balanced** the tree
    is. For example, consider Figure [2-8](#508094_1_En_2_Chapter.xhtml#Fig8).


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig8_HTML.png)


    A diagram of the unbalanced structure. N 1 is divided into N 11 and N 12\. N 11
    is subdivided into N 111, N 112, and N 113\. N 112 links to N 1121, which is then
    subdivided into N 11211, N 11213, and N 11212\. N 12 links to N 121.


    Figure 2-8


    An unbalanced tree


    When using a breadth-first algorithm, a very balanced, **shallow** (that is, less
    hops from root to leaf nodes) structure is quicker to process since you will have
    less iterations to go through. This can be very important if you are making a
    tree to search with an index to some data or just a fact of life if you are representing
    something in the real world that is what it is.


    Note


    In Chapter [6](#508094_1_En_6_Chapter.xhtml), I will introduce and demonstrate
    an alternative method of implementing tree structures made possible by the rigid
    nature of their structures.'
  trans: '

    ### 树


    多年来，在关系型数据库中实现的最常见图形就是**树**。树是一种结构，它要求每个节点要么有零个父节点，要么有一个父节点，不能更多。想象一棵真实的树（或者如图
    2-5 所示，迪士尼动物王国主题公园中一棵宏伟的树的复制品）。


    ![](img/508094_1_En_2_Fig5_HTML.png)


    一张拥有粗壮树干和多片树叶的树枝的树的照片。


    图 2-5

    一棵并非完全鲜活的树，作为树结构的类比


    它有一个插入地面的树干。无论朝哪个方向出去（向下到根部或向上到树枝），你都可以看到这个类比。任何树枝都可以来自树干或其他树枝，但它只能是其中之一。树枝不会一起生长并重新合并成一个。（至少通常不会，而且这不是植物学课！）没有任何子节点的节点被称为叶节点，就像树枝上的叶子是独立的一样。


    我的广度优先示例结构是一棵树，重新包含为图 2-6。


    ![](img/508094_1_En_2_Fig6_HTML.png)


    一个图形结构。`N 1` 分裂为 `N 11`、`N 12` 和 `N 13`。`N 11` 分裂为 `N 111`、`N 112` 和 `N 113`，而
    `N 12` 分裂为 `N 121`、`N 122` 和 `N 123`。`N 13` 被细分为 `N 133`、`N 132` 和 `N 131`。


    图 2-6

    重复的示例树


    要在邻接表结构中表示这一点，你需要类似这样的行：


    ```

    From   To

    ———-   ———-

    N1     N11

    N11    N111

    N11    N112

    N11    N113

    N1     N12

    ```


    以此类推。为了确保该结构始终是一棵树，你需要保护一个主要条件：唯一的 `to` 值。因为在树中一个子行只能有一个父行，所以在邻接表的该列上设置唯一性约束可以确保它是一棵树。


    你通常还需要做的另一件事是包含某种约束，以确保 `from` 值不等于 `to` 值。这是唯一性约束无法阻止的循环（尽管重复的 `to` 和 `from`
    值基本上会使该行成为根和叶，并且很可能被迅速发现……但我的座右铭之一是 *如果坏数据根本不发生，它就不会发生*）。


    虽然所有树结构都需要单个根，但这样的表结构可以包含多个树结构。在某些情况下，一个值为 `NULL, N1` 的行可以在创建树时作为起点包含在结构中。你可以使用唯一索引来确保只有一个根节点，唯一索引只允许一个
    `NULL` 值。（SQL Server 在索引中将 `NULL` 值视为不同的值，不像在比较中，因此这将确保你只有一个根节点。）。你可以通过使用忽略 `NULL`
    值的过滤 `UNIQUE` 索引来允许多于一个根节点。如果你想确保 `NULL` 行永远不会被删除，可以使用触发器对象，如果你的用户可以即兴删除行，这尤其有用。


    如果你需要为多个树结构建模，只需创建多个边对象，每个对象都有不同的用途。例如，考虑一个公司的汇报结构。有多个项目正在进行，其中某人处于项目管理层次结构中，通常还有一个处理人力资源类事情的层次结构。所以，你可以创建：


    ```

    ManagementEdge (FromEmployee, ToEmployee)

    ```


    你也可以为每个项目再次创建相同的表。


    ```

    Project1 (FromEmployee, ToEmployee)

    Project2 (FromEmployee, ToEmployee)

    ```


    或者，你可以将其建模为一个允许许多树共存于同一结构中的结构。


    ```

    ReportingHierarchy (FromEmployee, ToEmployee, HierarchyName)

    ```


    为通用树结构讨论的所有索引仍然有意义，但你会在对象中包含 `HierarchyName`，因为如果一个员工可以参与多个项目，那么唯一性仅针对一个项目成立。


    也许将 `ManagementEdge` 按上述方式建模，然后让项目层次结构位于其自己的 `ProjectManagementEdge` 中是合理的，因为它们服务于不同的目的。如何为你的图建模与任何数据库的挑战基本相同：使结构与你的需求相匹配，既要严格到可以防止坏数据，又要灵活到能做客户想做的事情。


    最后，请注意，你可以实现父节点基数的变体来实现严格的树类型。例如，**二叉树**或**简单树**被定义为每个节点只能有两个子节点的树。考虑图 2-7。


    ![](img/508094_1_En_2_Fig7_HTML.png)


    一棵二叉树从 `N 1` 开始，分支为 `N 11` 和 `N 12`。进一步地，它分别分支为 `N 111` 和 `N 112`，以及 `N 121` 和
    `N 122`。


    图 2-7

    示例二叉树


    为创建二叉树（或实际上任何有限的子行基数）必须考虑的一个问题是，如何确保不会创建违反结构子节点的节点。有几种有效的方法。使用触发器来计算节点数量是一种方法，另一种是添加节点编号并使用检查约束只允许值
    1 和 2，并在 `from` 项上设置唯一索引。


    所以：


    ```

    BinaryTree (FromNode, ToNode, NodeNumber (Values IN 1, 2), UNIQUE (From, NodeNumber);

    ```


    缺点是，你有了一个似乎指示节点顺序很重要的列。（在某些系统中，你可能需要这种排序，也许是引导用户的方向或对节点进行排序。）


    也可以认为，某种数据完整性可以延迟检查，你只是在进行更改后检查并在之后修复问题，特别是当你的需求变得更加复杂时。无论你*如何*确保完整性得到实施，它都需要被实施。


    处理树时的另一个重要概念是树的**平衡**程度。例如，考虑图 2-8。


    ![](img/508094_1_En_2_Fig8_HTML.png)


    一个不平衡结构的示意图。`N 1` 被划分为 `N 11` 和 `N 12`。`N 11` 被细分为 `N 111`、`N 112` 和 `N 113`。`N
    112` 链接到 `N 1121`，然后又被细分为 `N 11211`、`N 11213` 和 `N 11212`。`N 12` 链接到 `N 121`。


    图 2-8

    一棵不平衡的树


    当使用广度优先算法时，一个非常平衡的、**浅**（即从根到叶节点的跳跃次数较少）的结构处理速度更快，因为你需要进行的迭代次数更少。如果你正在创建一个树来搜索索引到某些数据，或者仅仅是表示现实世界中本身就如此的事物时，这可能非常重要。


    > 注意

    > 在第[6]章中，我将介绍并演示一种实现树结构的替代方法，这种方法得益于其结构的刚性。

    '
- fmt: '# Other Acyclic Graphs


    While trees are straightforward enough to implement using a basic adjacency list
    format (including making sure that the data actually fits the strict requirements
    of only one parent and no cycles), other acyclic graph types are not quite so
    simple because they are more flexible in structure.


    Common acyclic graph examples that we all generally encounter are `bills of materials`,
    `geographies`, and `classifications`. Geographies are useful in many ways. For
    example, you could model the world as the root, then continent, region, and so
    on. Or perhaps country, then state, province, and down to city or postal code.


    One of the more universal examples of an acyclic graph that isn’t a tree is that
    of a `bill of materials`. This data structure is a very simple, straightforward
    example that we should all be able to visualize. A `bill of materials` is a breakdown
    of all the pieces and parts that make up some product. In Chapter [7](#508094_1_En_7_Chapter.xhtml),
    I will implement a `bill of materials` that contains the parts of a fictional
    shelf product.


    For example, when you buy a car, it is a single item you purchase. But that car
    has many parts that make up that single unit of purchase. For simplicity, let’s
    just start with the engine. The engine is a menagerie of parts that contains other
    parts. And those parts are often made up of other parts, generally right down
    to screws, washers, bolts, and nuts. Many of the parts that make up that car are
    also sold individually as well.


    The car’s breakdown is, in and of itself, be a tree. But many of the parts and
    assemblies can be in more than one vehicle type.


    For a very simple example, consider a company that makes frames. They have an
    11-inch frame and a 10-inch frame, and they both use the same hanging kit. See
    Figure [2-9](#508094_1_En_2_Chapter.xhtml#Fig9).


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig9_HTML.png)


    A tree diagram. 10-inch picture frame assembly and 11-inch picture frame assembly
    link respectively to 10-inch picture frame and 11-inch picture frame, and together
    to hanging kit. The nail pack and hanger are separate components of the hanging
    kit. Nail pack divides into nail and nail.


    Figure 2-9. Simple bill of materials


    While items can have more than one predecessor in the graph (in Figure [2-9](#508094_1_En_2_Chapter.xhtml#Fig9),
    you can see that the Hanging Kit has two predecessors), every starting node you
    pick can be treated as if it was the root node of a tree. Start at the Hanging
    Kit, and you get a tree where the next level nodes are Hanger and Nail Pack. The
    Nail Pack contains two Nails (in your actual implementation, you will use a magnitude
    on the Nail Pack to Nail edge to represent multiples. I will discuss more about
    edge magnitudes in Chapter [3](#508094_1_En_3_Chapter.xhtml) because this is important
    to some designs).


    Hence, when you traverse/process a `bill of materials` (or any acyclic graph),
    you often can treat it like a tree when fetching the child rows, not having to
    worry about cycles. When you load the `bill of materials` structure, this is when
    you must make sure to not introduce a cycle. Unlike trees where you can limit
    a node to exist in only one parent row with an index, in this case you cannot
    protect against cycles with a simple constraint.


    Note that, depending on the tools you are using, the idea of treating parts of
    a `bill of materials` like a tree may fall apart if you need to see the entire
    structure due to how some graph code works. This will be clearer in Chapters [3](#508094_1_En_3_Chapter.xhtml)
    and [7](#508094_1_En_7_Chapter.xhtml).


    As you are adding nodes to a polyhierarchy, you need to do a query to search for
    cycles. Like the example back in Figure [2-4](#508094_1_En_2_Chapter.xhtml#Fig4)
    (repeated as Figure [2-10](#508094_1_En_2_Chapter.xhtml#Fig10)), consider this
    graph before the edge between N3 and N1 was added.


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig10_HTML.jpg)


    A cyclic graph structure. N 1 node is linked to N 2, N 2 is linked to N 3, and
    N 3 is linked to N 1.


    Figure 2-10. Graph with a cycle


    All would have been fine. But that new edge from N3 to N1 creates a cycle. Finding
    the cycle condition will basically use the breadth-first algorithm discussed previously,
    but in this case, your query is looking for a match to the node where you start.
    So, for each iteration, you are looking for `FirstNodeId = CurrentNodeId;` if
    found, then this is no longer an acyclic graph (and you will have to take the
    appropriate action, like rolling back the insert of that edge).


    This can be done in a stored procedure or even a trigger if you want to keep the
    cycle from happening at all. Of course, if you need optimum performance, you might
    have to defer cycle checking (especially for very large graphs), although this
    also has downsides if the data is also actively queried.


    As I go through the examples in the book, I will frequently use a stored procedure
    to manage and query new nodes because rarely are the user key values the internal
    values you use for surrogate keys. Hence, the user need only know that Fred and
    Bob are friends, not any internal details. It is also very useful because some
    of the code you write may need to be tuned as you start to get to very large graphs.'
  raw: '### Other Acyclic Graphs


    While trees are straightforward enough to implement using a basic adjacency list
    format (including making sure that the data actually fits the strict requirements
    of only one parent and no cycles), other acyclic graph types are not quite so
    simple because they are more flexible in structure.


    Common acyclic graph examples that we all generally encounter are bills of materials,
    geographies, and classifications. Geographies are useful in many ways. For example,
    you could model the world as the root, then continent, region, and so on. Or perhaps
    country, then state, province, and down to city or postal code.


    One of the more universal examples of an acyclic graph that isn’t a tree is that
    of a bill of materials. This data structure is a very simple, straightforward
    example that we should all be able to visualize. A bill of materials is a breakdown
    of all the pieces and parts that make up some product. In Chapter [7](#508094_1_En_7_Chapter.xhtml),
    I will implement a bill of materials that contains the parts of a fictional shelf
    product.


    For example, when you buy a car, it is a single item you purchase. But that car
    has many parts that make up that single unit of purchase. For simplicity, let’s
    just start with the engine. The engine is a menagerie of parts that contains other
    parts. And those parts are often made up of other parts, generally right down
    to screws, washers, bolts, and nuts. Many of the parts that make up that car are
    also sold individually as well.


    The car’s breakdown is, in and of itself, be a tree. But many of the parts and
    assemblies can be in more than one vehicle type.


    For a very simple example, consider a company that makes frames. They have an
    11-inch frame and a 10-inch frame, and they both use the same hanging kit. See
    Figure [2-9](#508094_1_En_2_Chapter.xhtml#Fig9).


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig9_HTML.png)


    A tree diagram. 10-inch picture frame assembly and 11-inch picture frame assembly
    link respectively to 10-inch picture frame and 11-inch picture frame, and together
    to hanging kit. The nail pack and hanger are separate components of the hanging
    kit. Nail pack divides into nail and nail.


    Figure 2-9


    Simple bill of materials


    While items can have more than one predecessor in the graph (in Figure [2-9](#508094_1_En_2_Chapter.xhtml#Fig9),
    you can see that the Hanging Kit has two predecessors), every starting node you
    pick can be treated as if it was the root node of a tree. Start at the Hanging
    Kit, and you get a tree where the next level nodes are Hanger and Nail Pack. The
    Nail Pack contains two Nails (in your actual implementation, you will use a magnitude
    on the Nail Pack to Nail edge to represent multiples. I will discuss more about
    edge magnitudes in Chapter [3](#508094_1_En_3_Chapter.xhtml) because this is important
    to some designs).


    Hence, when you traverse/process a bill of materials (or any acyclic graph), you
    often can treat it like a tree when fetching the child rows, not having to worry
    about cycles. When you load the bill of materials structure, this is when you
    must make sure to not introduce a cycle. Unlike trees where you can limit a node
    to exist in only one parent row with an index, in this case you cannot protect
    against cycles with a simple constraint.


    Note that, depending on the tools you are using, the idea of treating parts of
    a bill of materials like a tree may fall apart if you need to see the entire structure
    due to how some graph code works. This will be clearer in Chapters [3](#508094_1_En_3_Chapter.xhtml)
    and [7](#508094_1_En_7_Chapter.xhtml).


    As you are adding nodes to a polyhierarchy, you need to do a query to search for
    cycles. Like the example back in Figure [2-4](#508094_1_En_2_Chapter.xhtml#Fig4)
    (repeated as Figure [2-10](#508094_1_En_2_Chapter.xhtml#Fig10)), consider this
    graph before the edge between N3 and N1 was added.


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig10_HTML.jpg)


    A cyclic graph structure. N 1 node is linked to N 2, N 2 is linked to N 3, and
    N 3 is linked to N 1.


    Figure 2-10


    Graph with a cycle


    All would have been fine. But that new edge from N3 to N1 creates a cycle. Finding
    the cycle condition will basically use the breadth-first algorithm discussed previously,
    but in this case, your query is looking for a match to the node where you start.
    So, for each iteration, you are looking for `FirstNodeId = CurrentNodeId;` if
    found, then this is no longer an acyclic graph (and you will have to take the
    appropriate action, like rolling back the insert of that edge).


    This can be done in a stored procedure or even a trigger if you want to keep the
    cycle from happening at all. Of course, if you need optimum performance, you might
    have to defer cycle checking (especially for very large graphs), although this
    also has downsides if the data is also actively queried.


    As I go through the examples in the book, I will frequently use a stored procedure
    to manage and query new nodes because rarely are the user key values the internal
    values you use for surrogate keys. Hence, the user need only know that Fred and
    Bob are friends, not any internal details. It is also very useful because some
    of the code you write may need to be tuned as you start to get to very large graphs.'
  trans: '# 其他类型的非循环图


    尽管树结构使用基本的邻接表格式实现起来相当直接（包括确保数据严格符合仅有一个父节点且无循环的要求），但其他类型的非循环图则不那么简单，因为它们的结构更加灵活。


    我们通常会遇到的常见非循环图示例包括 `bills of materials`（物料清单）、`geographies`（地理结构）和 `classifications`（分类体系）。地理结构在许多方面都很有用。例如，你可以将世界建模为根节点，然后是大洲、地区等等。或者从国家开始，再到州、省，最后到城市或邮政编码。


    非树结构的非循环图中，一个更为普遍的例子是 `bill of materials`（物料清单）。这种数据结构是一个非常简单、直观的例子，我们都能想象得到。`bill
    of materials` 是构成某个产品的所有零部件的分解清单。在第 7 章，我将实现一个包含虚构的架子产品零部件的 `bill of materials`。


    例如，当你购买一辆汽车时，你购买的是一个单独的物品。但这辆汽车由许多零件组成，共同构成了这个单一的购买单元。为简单起见，让我们从发动机开始。发动机是由包含其他零件的众多零件组成的集合体。而这些零件通常又由其他零件构成，通常一直细分到螺钉、垫圈、螺栓和螺母。组成这辆汽车的许多零件也作为单独的备件出售。


    汽车的分解结构本身可以是一棵树。但许多零件和组件可以存在于不止一种车辆类型中。


    举一个非常简单的例子，考虑一家制造相框的公司。他们有一个 11 英寸的相框和一个 10 英寸的相框，它们都使用相同的挂装套件。见图 2-9。


    ![](img/508094_1_En_2_Fig9_HTML.png)


    一个树状图。10 英寸相框组件和 11 英寸相框组件分别链接到 10 英寸相框和 11 英寸相框，并共同链接到挂装套件。钉包和挂钩是挂装套件的独立组件。钉包又分解为钉子和钉子。


    图 2-9. 简单的物料清单


    虽然图中的项目可以有多个前驱节点（在图 2-9 中，你可以看到“挂装套件”有两个前驱节点），但你选取的任何一个起始节点都可以被视为一棵树的根节点。从“挂装套件”开始，你会得到一棵树，其下一层级的节点是“挂钩”和“钉包”。“钉包”包含两个“钉子”（在你的实际实现中，你会在“钉包”到“钉子”的边上使用一个数量（magnitude）来表示倍数。关于边的数量，我将在第
    3 章中进一步讨论，因为这对某些设计很重要）。


    因此，当你遍历/处理一个 `bill of materials`（或任何非循环图）时，在获取子行数据时，你通常可以将其视为一棵树，而无需担心循环问题。而在加载
    `bill of materials` 结构时，你才必须确保不引入循环。与树结构可以通过索引限制一个节点仅存在于一个父行中不同，在这种情况下，你无法通过一个简单的约束来防止循环。


    请注意，根据你所使用的工具，如果你需要查看整个结构，将 `bill of materials` 的部分结构视为树的想法可能会失效，这取决于某些图代码的工作方式。这在第
    3 章和第 7 章中会更加清晰。


    当你向多重继承结构（polyhierarchy）中添加节点时，你需要执行一个查询来搜索循环。就像之前在图 2-4 中的例子（重复为图 2-10），考虑在添加
    N3 和 N1 之间的边之前的这个图。


    ![](img/508094_1_En_2_Fig10_HTML.jpg)


    一个循环图结构。节点 N1 链接到 N2，N2 链接到 N3，N3 链接到 N1。


    图 2-10. 存在循环的图


    一切本来都没问题。但是那条从 N3 到 N1 的新边创建了一个循环。查找循环条件基本上会使用之前讨论的广度优先算法，但在这里，你的查询是寻找与起始节点匹配的节点。因此，在每次迭代中，你都在查找
    `FirstNodeId = CurrentNodeId;`，如果找到，那么这就不再是一个非循环图（并且你将不得不采取适当的措施，比如回滚那条边的插入操作）。


    这可以在存储过程甚至触发器中完成，如果你想完全防止循环发生的话。当然，如果你需要最佳性能，可能不得不延迟进行循环检查（特别是对于非常大的图），尽管如果数据也被频繁查询，这样做也有缺点。


    在本书的示例中，我将经常使用存储过程来管理和查询新节点，因为用户键值很少是你用于代理键的内部值。因此，用户只需要知道 Fred 和 Bob 是朋友，而不需要知道任何内部细节。这也很有用，因为你编写的一些代码可能需要在你开始处理非常大的图时进行调优。'
- fmt: '## Cyclic Graphs


    Cyclic graphs, as the name implies, allow cycles to show up in the graph. The
    allowance of cycles generally means that you won’t do as much math with the nodes,
    like summing sales of subordinate nodes; rather, it will be more likely be exploring
    the relationships between nodes.


    There are a few memorable uses of graphs that you use every day such as on websites
    where you order products. They capture your buying history in a graph structure
    and use your similarity to other users to see if they can make you even more like
    them by telling you what others like you have also ordered.


    The most famous graph that you probably have heard of is the basis of the movie/play
    *Six Degrees of Separation*. The theory is that everyone is no more than six friend
    connections from anyone else on earth. The most famous of this is with Kevin Bacon.


    One thing you will start noticing about many of the designs housed in your relational
    databases is that a lot of the relationships you find can be modeled as a node-to-node
    relationships. For example, think of a typical sales order system as shown in
    the conceptual model in Figure 2-11.


    ![A conceptual model diagram begins with the product and progresses to the sales
    order line item. The customer node is linked to the sales order, which links to
    sales order line item.](images/508094_1_En_2_Chapter/508094_1_En_2_Fig11_HTML.jpg)

    **Figure 2-11** Conceptual model of a sales system


    When you are analyzing customer’s interest, knowing what products they have ordered,
    returned, looked at, and such is very useful. You can take this product order
    relationship and put it into a couple of nodes, as shown in Figure 2-12.


    ![A graph segment consists of two nodes. The product node is linked to the customer
    node.](images/508094_1_En_2_Chapter/508094_1_En_2_Fig12_HTML.png)

    **Figure 2-12** Segment of a graph relating product to customer


    You can put the relationship either from customer to product or product to customer
    (or both, as we will discuss). Software can generally traverse the relationship
    in both directions, though typically not simultaneously. (We will discuss that
    concept in the non-directed graph section). The trick is to always carefully name
    the edge in a way that indicates what the relationship is, such as `Product-Purchased->Customer`
    or `Customer-Ordered (or Was Interested In)->Product`.


    I mentioned that when implementing a directed graph, you simply need to look for
    the newly inserted (or updated) node in the same path and you were sure there
    were no cycles. Consider the graph in Figure 2-13, which has multiple cycles.


    ![A graphic structure. A cyclic link between nodes, Fred, Larry, Felicity, and
    Cindy, and between Cindy, Geoff, and Linda. Felicity links to Linda.](images/508094_1_En_2_Chapter/508094_1_En_2_Fig13_HTML.png)

    **Figure 2-13** Sample graph with cycles


    When writing the code to process this graph to find connections to Fred, you will
    see that every node is connected, and there are several cycles in the graph, two
    that lead back to Fred, as shown in Figures 2-14 and 2-15.


    ![A graphic structure. A cyclic link between nodes, Fred, Larry, Felicity, Linda,
    and Cindy, with a short broad arrow over the links. Felicity links to Cindy, Cindy
    to Geoff, and Geoff to Linda.](images/508094_1_En_2_Chapter/508094_1_En_2_Fig15_HTML.jpg)

    **Figure 2-15** Cycle from Fred -> Larry -> Felicity -> Linda -> Cindy -> Fred


    ![A cyclic link between nodes, Fred, Larry, Felicity, and Cindy. There are short
    broad arrows over the links.](images/508094_1_En_2_Chapter/508094_1_En_2_Fig14_HTML.jpg)

    **Figure 2-14** Cycle from Fred -> Larry -> Felicity -> Cindy -> Fred


    Each of these cycles back to Fred, so you have an obvious stopping point.


    You have also now touched the Cindy node twice. This isn’t necessarily a cycle
    because you have hit the same node twice. However, it does mean that you will
    begin repeating results because the subsequent tree traversal is always the same
    after repeated nodes. Generally, you want to terminate one of the processing paths
    because it will yield repeated results and wasted processing time.


    Note: I won’t delve into it in this chapter, but in a diagram like this, the edges
    could be defined differently. `Fred -> Larry` could be `Likes`, and `Larry ->
    Felicity` could be `Dislikes`. Whether this is a cycle or not can be up to how
    you need to traverse the structure.


    But in Figure 2-16, this cycle is more of a challenge.


    ![A graphic structure. A cyclic link between nodes, Fred, Larry, Felicity, and
    Cindy, and Felicity links to Linda. A cyclic link between Linda, Cindy, and Geoff
    with a short broad arrow over the links.](images/508094_1_En_2_Chapter/508094_1_En_2_Fig16_HTML.jpg)

    **Figure 2-16** Cycle from Cindy -> Geoff -> Linda -> Cindy, not back to the starting
    node


    Now not only do you need to make sure to stop processing when you cycle back to
    the starting node, but also anywhere in the graph. (Note that this was not an
    issue when you were looking for cycles in the directed graph because you were
    only dealing with adding an edge.) If you start to add many edges at a time, you
    may also need to be aware of these kinds of eternal loops that could arise in
    processing.


    This all leads to the most common operation with a network like this, that of
    finding a `shortest path` from any two nodes, which is `Fred` to `Geoff` in the
    last example. There are two paths to get from `Fred` to `Geoff`:


    *   `Fred -> Larry -> Felicity -> Cindy -> Geoff`

    *   `Fred -> Larry -> Felicity -> Linda -> Cindy -> Geoff`


    The first is clearly the path between the two nodes that is shortest, with a length
    of 4. You may also want to see the longest path (the scenic route) in some cases.


    ## Weighted Edges


    In some cases, you may want to have `weighted nodes`. For example, consider the
    case when you are building a map type solution. Say you have the graph in Figure
    2-17, which implements a kind of map from an entrance node to a destination node.


    ![A graph structure. Node Entrance with weight 1 links location 1, and with weight
    10 location 2. Location with weight 30 links destination. Location 2 with weight
    1 links location 3, which with weight 3 links destination.](images/508094_1_En_2_Chapter/508094_1_En_2_Fig17_HTML.jpg)

    **Figure 2-17** Graph with weighted edges


    When you have weighted edges, like distances, the shortest path based on hops
    may not always be the shortest or cheapest path to traverse the graph. You can’t
    start eliminating non-crossing paths either, because as you see in this example,
    `Entrance` to `Location 1` is 1 unit, but it is 10 to get to `Location 2`. But
    the next hop from `Location 1` is 30 units, whereas from `Location 2` to `Destination`
    through `3`, this is only 4. So, the shortest weighted path is the longer path
    in hops.'
  raw: '## Cyclic Graphs


    Cyclic graphs, as the name implies, allow cycles to show up in the graph. The
    allowance of cycles generally means that you won’t do as much math with the nodes,
    like summing sales of subordinate nodes; rather, it will be more likely be exploring
    the relationships between nodes.


    There are a few memorable uses of graphs that you use every day such as on websites
    where you order products. They capture your buying history in a graph structure
    and use your similarity to other users to see if they can make you even more like
    them by telling you what others like you have also ordered.


    The most famous graph that you probably have heard of is the basis of the movie/play
    *Six Degrees of Separation*. The theory is that everyone is no more than six friend
    connections from anyone else on earth. The most famous of this is with Kevin Bacon.


    One thing you will start noticing about many of the designs housed in your relational
    databases is that a lot of the relationships you find can be modeled as a node-to-node
    relationships. For example, think of a typical sales order system as shown in
    the conceptual model in Figure [2-11](#508094_1_En_2_Chapter.xhtml#Fig11).


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig11_HTML.jpg)


