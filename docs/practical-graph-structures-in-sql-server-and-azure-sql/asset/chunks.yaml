  trans: '

    #### 路径聚合


    现在，你已经掌握了基本概念。（请相信我；你可能需要反复尝试很多次才能真正消化吸收！）那么，让我们看看可以为输出添加的其他功能。你可以执行诸如 `COUNT`
    之类的聚合操作。`COUNT` 是获取节点间跳数（hops）的标准方法。例如：


    ```sql

    SELECT Person.Name AS Person,

    LAST_VALUE(FollowedPerson.Name) WITHIN GROUP

    (GRAPH PATH) as ConnectedPerson,

    COUNT(FollowedPerson.PersonId) WITHIN GROUP

    (GRAPH PATH) as Level

    FROM   ...

    ```


    当使用这个 `SELECT` 子句时，`COUNT` 聚合会计算每次节点之间发生跳跃的次数。在输出中，你可以看到 `Val` 和 `Saa` 直接连接到 `Lou`，所以是一跳。`Fred`、`Joe`
    和 `Lee` 是两跳。而返回到 `Lou` 则需要三跳。


    ```

    Person        ConnectedPerson   Level

    ------------- ----------------- -----------

    Lou Iss       Val Erry          1

    Lou Iss       Saa Lee           1

    Lou Iss       Fred Rick         2

    Lou Iss       Lee Roy           2

    Lou Iss       Joe Seph          2

    Lou Iss       Lou Iss           3

    ```


    接下来要添加的是实际遍历以达到输出的 `LAST_VALUE` 值的路径。这是在调试此代码并向用户显示输出时最有用的工具之一。最短路径输出中表示的每个节点的节点标签。


    这是使用 `STRING_AGG` 完成的，它最清晰地展示了此算法如何执行广度优先查询。对于每次迭代，`FollowedPerson.Name` 的值都会被添加到列表中（并且只有在存在另一次迭代时，它才会包含
    `''->''` 值，因为在 `STRING_AGG` 函数中，第二个参数是分隔符）。


    ```sql

    SELECT Person.Name,

    STRING_AGG(FollowedPerson.Name, ''->'') WITHIN GROUP

    (GRAPH PATH) AS Path

    FROM...

    ```


    此查询的输出是


    ```

    Name        Path

    ----------- ---------------------------------

    Lou Iss     Val Erry

    Lou Iss     Saa Lee

    Lou Iss     Saa Lee->Fred Rick

    Lou Iss     Val Erry->Lee Roy

    Lou Iss     Val Erry->Joe Seph

    Lou Iss     Saa Lee->Fred Rick->Lou Iss

    ```


    请注意，从 `Lou` 到 `Lee` 的路径只经过了 `Val`。在图表上，它还经过了 `Saa`。本章后面，我将演示如何在输出中包含所有路径。（它不会像这些查询那样整洁有序！）


    在许多情况下，所选路径包含哪些节点对你的输出应该没有太大影响。也就是说，除非你开始对路径中的节点进行聚合操作，或者想从多条路径中进行选择。那样就会变得稍微复杂一些。


    我在创建图时，在每个边和节点上都包含了值列，以便我们将其与 `COUNT` 输出进行比较，因为每个值都是 `1`。


    ```sql

    SELECT STRING_AGG(FollowedPerson.Name, ''->'')WITHIN GROUP

    (GRAPH PATH) AS PATH,

    COUNT(FollowedPerson.PersonId) WITHIN GROUP (GRAPH PATH)

    AS Level,

    SUM(FollowedPerson.Value) WITHIN GROUP (GRAPH PATH)

    AS SumNodeValues,

    SUM(Follows.Value) WITHIN GROUP (GRAPH PATH)

    AS SumEdgeValues

    FROM ...

    ```


    此查询的输出有两个新列，其值各自与层级（Level）相同。在下面的输出中，我添加了额外的值，你可以看到总和不包括基础节点：


    ```

    Path                      Level       SumNodeValues SumEdgeValues

    ------------------------- ----------- ------------- -------------

    Val Erry                  1           1             1

    Saa Lee                   1           1             1

    Saa Lee->Fred Rick        2           2             2

    Val Erry->Lee Roy         2           2             2

    Val Erry->Joe Seph        2           2             2

    Saa Lee->Fred Rick->Lou.. 3           3             3

    ```


    这与你在路径中看到的一致。你只看到被链接的节点。再想想到达此位置所经过的边，例如 `Saa Lee->Fred Rick`。在 `Lou Iss` 和 `Fred
    Rick` 之间有两条边，因此对这些值求和得到 2，正如你在结果中看到的。而且，在基础节点之后的链中有两个节点。再次提醒，在聚合边和中间节点时要小心，因为总和是基于所采取的路径，而其他路径可能有不同的值。只有当你对随机选择的路径值感到满意时，这才有意义，这在查看结果时可能很难记住。


    例如，考虑图 3-10 中的子图。从 `Fred Rick` 到 `Saa Lee` 的直接路径具有最高的量级值，但使用 `SHORTEST_PATH` 语法，这是你能选择的唯一路径。


    ![](img/508094_1_En_3_Fig10_HTML.jpg)


    一个图结构。Fred Rick 以量级值 100 链接到 Joe Seph 和 Lou Iss，两者又以 100 链接到 Saa Lee。Fred Rick
    以 1000000 链接到 Saa Lee。


    图 3-10


    边上带有量级值的示例子图


    本章后面，我将演示如何以不同的方式获取路径，这种方式会复杂得多，但将允许你获取两个节点之间的每条路径，并在需要时进行比较。


    #### 控制处理深度


    在一个非常大的图中，你可能不希望遍历图的每一层。因此，有时你需要限制要处理的距离。你可以在 `SHORTEST_PATH` 语法中控制要搜索的层数。在之前的例子中，你使用了以下
    `MATCH` 表达式：


    ```sql

    MATCH(SHORTEST_PATH(Person(-(Follows)->FollowedPerson)+))

    ```


    语法中的加号 (`+`) 是你控制处理迭代次数的地方。将 `+` 改为 `{1,Depth}` 来控制深度。数字 1 表示你开始的层级，但你不能从更深的层级开始。如果第一个数字不是
    1，你会得到以下错误：


    ```

    Msg 13942, Level 15, State 2, Line 556

    The initial recursive quantifier must be 1: {1, ... }.

    ```


    要显示层级 1 或 2 上的所有连接人员及其路径，你可以使用以下查询：


    ```sql

    SELECT STRING_AGG(FollowedPerson.Name, ''->'') WITHIN GROUP

    (GRAPH PATH) AS Path,

    COUNT(FollowedPerson.PersonId) WITHIN GROUP (GRAPH PATH)

    AS LEVEL

    FROM   Network.Person AS Person,

    Network.Follows FOR PATH AS Follows,

    Network.Person FOR PATH AS FollowedPerson

    WHERE  Person.FirstName = ''Lou''

    AND Person.LastName = ''Iss''

    AND MATCH(

    SHORTEST_PATH(Person(-(Follows)->FollowedPerson){1,2}));

    ```


    此查询的输出是


    ```

    Path                     Level

    ------------------------ -----------

    Val Erry                 1

    Saa Lee                  1

    Saa Lee->Fred Rick       2

    Val Erry->Lee Roy        2

    Val Erry->Joe Seph       2

    ```


    你可以看到所有层级值都在 1 和 2 之间。使用 `+` 或甚至 `{1,3}` 重新执行查询，你将看到的区别是多了一行，其路径为 `Saa Lee->Fred
    Rick->Lou Iss`，层级值为 3。


    如果你想在低端限制层级，例如想查看层级 2 和 3，你需要使用一个 CTE。考虑到分组等因素，你可能认为 `HAVING` 子句会起作用，但它不可用。


    ```sql

    WITH BaseRows AS (

    SELECT STRING_AGG(FollowedPerson.Name, ''->'') WITHIN GROUP

    (GRAPH PATH) AS Path,

    COUNT(FollowedPerson.PersonId) WITHIN GROUP (GRAPH PATH)

    AS LEVEL

    FROM   Network.Person AS Person,

    Network.Follows FOR PATH AS Follows,

    Network.Person FOR PATH AS FollowedPerson

    WHERE  Person.FirstName = ''Lou''

    AND Person.LastName = ''Iss''

    AND MATCH(

    SHORTEST_PATH(Person(-(Follows)->FollowedPerson){1,3}))

    )

    SELECT *

    FROM   BaseRows

    WHERE  Level BETWEEN 2 AND 3;

    ```


    此查询的输出与使用 + 时相同，但现在，锚定节点与匹配项之间只有一跳的两行已经被过滤掉了。

    '
- fmt: '#### Filtering for One Path


    Several filters need to be handled in a common table expression (`CTE`). One that
    you will probably regularly use is filtering for the one path you are looking
    for. For example, say you want to see path `Lou Iss` to `Lee Roy`. You can filter
    the anchor node table to just one row, that of `Lou Iss`. The base query is put
    into a non-recursive `CTE` and then you filter the starting point in the query
    inside the `CTE` and the rows you want to see the match to in the outer query:


    ```sql

    WITH BaseRows AS (

    SELECT LAST_VALUE(FollowedPerson.Name) WITHIN GROUP (GRAPH PATH)

    AS ConnectedPerson,

    STRING_AGG(FollowedPerson.Name, ''->'') WITHIN GROUP

    (GRAPH PATH) AS Path

    FROM   Network.Person AS Person,

    Network.Follows FOR PATH AS Follows,

    Network.Person FOR PATH AS FollowedPerson

    WHERE  Person.FirstName = ''Lou''

    AND Person.LastName = ''Iss''

    AND MATCH(

    SHORTEST_PATH(Person(-(Follows)->FollowedPerson){1,3}))

    )

    SELECT Path

    FROM   BaseRows

    WHERE ConnectedPerson = ''Lee Roy'';

    --probably ought to use a surrogate or name parts

    --here in production code

    ```


    The output of this query is just the path from `Lou Iss` to `Lee Roy`, which goes
    through `Saa Lee`:


    ```sql

    Path


    Saa Lee->Lee Roy

    ```


    #### Finding All Paths Between Nodes


    The following code is about as messy as it gets in this book. The basic query
    pattern will be repeated a few times in later chapters because it is an essential
    skill. But it absolutely is messy to do.


    The idea is that you implement the basic query that Microsoft has built using
    `SHORTEST_PATH`, but with a twist. You don’t stop processing for anything except
    a cycle in the structure.


    Using the current graph, if you want to find all the paths between two nodes,
    you can use the following code. I include comments in the code where useful to
    point out how the code works. But the idea is that using a recursive `CTE`, you
    keep iterating on the set using a breadth-first algorithm, but you keep every
    branch of the output, even when you find the node in the query. You filter the
    output later in the process.


    ```sql

    --fetch the starting point

    DECLARE @FirstName NVARCHAR(100) = N''Lou'';

    DECLARE @LastName NVARCHAR(100) = N''Iss'';

    --filter for the ending point

    DECLARE @ToFirstName NVARCHAR(100) = N''Lee'';

    DECLARE @ToLastName NVARCHAR(100) = N''Roy'';

    --for larger graphs, this may be need to

    --stop excessive recursion

    DECLARE @MaxLevel INT =10;

    WITH BaseRows

    AS (

    --the CTE anchor is just the starting node

    SELECT Person.PersonId,

    Person.PersonId AS FollowsPersonId,

    Person.Name,

    --the path that contains the readable path we have

    --built in all examples with the anchor included

    CAST(Person.Name AS NVARCHAR(4000)) AS Path,

    --this path is use to stop loops. If the personId is

    --found in the path already, then the recursion

    --will stop

    CAST(CONCAT(''\'', Person.PersonId, ''\'')

    AS VARCHAR(8000)) AS IdPath,

    0 AS level --the level

    FROM Network.Person

    WHERE Person.FirstName = @FirstName --Here’s where you filter

    AND Person.LastName = @LastName --the anchor

    UNION ALL

    --pretty typical 1 level graph query:

    SELECT Person.PersonId AS PersonId,

    FollowedPerson.PersonId AS FollowsPersonId,

    FollowedPerson.Name,

    BaseRows.Path + ''>'' + FollowedPerson.Name,

    BaseRows.IdPath +

    CAST(FollowedPerson.PersonId AS VARCHAR(10)) + ''\'',

    BaseRows.level + 1

    FROM Network.Person,

    Network.Follows,

    Network.Person AS FollowedPerson,

    BaseRows

    WHERE MATCH(Person-(Follows)->FollowedPerson)

    --this joins the anchor to the recursive part of the query

    AND BaseRows.FollowsPersonId = Person.PersonId

    --this is the part that stops recursion, treating the

    --string value like an array

    AND NOT BaseRows.IdPath LIKE CONCAT(''%\'',

    FollowedPerson.PersonId, ''\%'')

    AND BaseRows.level <= @MaxLevel)

    SELECT BaseRows.Path

    FROM BaseRows

    WHERE BaseRows.Name = ''Lee Roy'';

    ```


    The output of this query is (I manually added a number to correspond to Figure
    [3-11](#508094_1_En_3_Chapter.xhtml#Fig11))


    ![](images/508094_1_En_3_Chapter/508094_1_En_3_Fig11_HTML.jpg)


    A graphical structure. `Val Erry` links `Lee Roy` and `Joe Seph`, `Fred Rick`
    links `Joe Seph`, `Val Erry`, and `Lou Iss`. `Joe Seph`, `Lou Iss`, and `Day Vid`
    link `Saa Lee`. `Saa Lee` links `Fred Rick` and `Lee Roy`. All paths have additional
    numbered arrows, except `Day Vid` to `Saa Lee`, and `Fred Rick` to `Joe Seph`
    and `Lou Iss`.


    Figure 3-11


    Tracing the paths from `Lou Iss` to `Lee Roy` in the sample graph


    ```sql

    Path


    1 Lou Iss>Val Erry>Lee Roy

    2 Lou Iss>Val Erry>Joe Seph>Saa Lee>Lee Roy

    3 Lou Iss>Saa Lee>Lee Roy

    4 Lou Iss>Saa Lee>Fred Rick>Val Erry>Lee Roy

    ```


    You can trace the various paths on Figure [3-11](#508094_1_En_3_Chapter.xhtml#Fig11).


    Even in this fairly small example, you can see that what would be one result found
    in two iteration steps has expanded to four, with an extra step.


    This sort of solution will be necessary if your user wants to answer questions
    like, is there a path between `Lou Iss` and `Lee Roy` that also includes `Fred
    Rick`? There is no trivial way to answer this question in most cyclic graphs because
    the structure is entirely unpredictable. For a directed graph, it could be easier
    (and far easier for a tree), but if you need to be very specific in your path,
    expect that processing is going to be more complicated.'
