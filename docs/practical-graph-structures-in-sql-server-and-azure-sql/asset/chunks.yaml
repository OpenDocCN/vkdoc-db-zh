    *To Val, what a life we have had so far… here’s to more of it.*


    Preface


    I started working on my first book 23 years ago. It was on relational database
    design. I had learned a little about graphs at that point from a class I took
    by Dr. David Rozenshtein (his 1997 book *The Essence of SQL : A Guide to Learning
    Most of SQL in the Least Amount of Time* was essential). His class was very influential
    and taught me a lot about how to think about SQL problems. This was a really long
    time ago (clearly), but in that same class, one of the sections was on trees in
    SQL Server. I was hooked on the subject.


    In my 2012 edition of my database design book, I started to include hierarchies
    as one of the topics. In my latest book, that came out after SQL Server 2019 arrived,
    I promised a book of SQL Graph. This book in your hands is the answer to that
    challenge.


    This is my first programming-based book in many years. Usually I am more interested
    in helping you shape a design, but in this case, I want to show you the mechanics
    of building a graph database solution using SQL Server and leave it more to you
    to decide what to do with it from there. Part of this is due to the newness and
    relative complexity of the topic, but also because graphs are meant to be very
    flexible structures…way more flexible than the standard relational databases.


    The chapters of the book are as follows:


    *   Chapter [1](#508094_1_En_1_Chapter.xhtml): What a graph is and ways graphs
    can be used. I touch on some of the underpinnings of what makes a graph a graph
    and a taste of the theory that mathematicians use to describe and work with graph
    data structures.


    *   Chapter [2](#508094_1_En_2_Chapter.xhtml): How graphs are implemented and
    the algorithms that are used to process them. While the basic structure of the
    graph is really simple, there is some value to understanding how graph structures
    are built in coding and having some idea of what you will see in the rest of the
    book.


    *   Chapter [3](#508094_1_En_3_Chapter.xhtml): The syntax that Microsoft has implemented
    for use with graph data stored in SQL Server tables is similar to what you probably
    already know from working with relational tables, but it is so much more. In this
    chapter, I teach you how to use the syntax provided by Microsoft to query graph
    tables in interesting ways.


    *   Chapter [4](#508094_1_En_4_Chapter.xhtml): Whereas in Chapter [3](#508094_1_En_3_Chapter.xhtml)
    I showed basic query techniques, in this chapter I show methods that can help
    you load and protect the integrity of the data in your SQL Graph tables.


    *   Chapter [5](#508094_1_En_5_Chapter.xhtml): A tree structure built using SQL
    Graph objects, including code to load and manipulate those nodes in ways that
    you will need when building production systems. In this chapter, you explore the
    code to create and manage a tree in SQL Server, along with an example of how it
    all works.


    *   Chapter [6](#508094_1_En_6_Chapter.xhtml): In this chapter, I dig into performance.
    You’ll examine a new method of implementing a tree for comparison to the SQL Graph
    objects and build some objects you can use to write queries to report on data
    in your trees that operate faster. You will then build some large, random data
    sets and compare how these methods perform with certain larger sized data sets.


    *   Chapter [7](#508094_1_En_7_Chapter.xhtml): The goal of this chapter is to
    build a data structure that can show some of the concerns with working with directed
    graphs that are not trees. You will build a fairly simple bill of materials data
    structure to demonstrate the techniques you will need when you are working with
    these structures, which are similar to trees but still quite different.


    *   Chapter [8](#508094_1_En_8_Chapter.xhtml): In this chapter, you will do some
    querying of larger data sets in SQL Server’s graph objects. To do this, you will
    implement a graph structure and data generation tools to try on large sets of
    data to match your expected needs. Finally, you will explore a set of performance
    tips for handling graph objects.


    SQL Server’s relational engine may never be acceptable as a complete replacement
    for a specific graph database system like CosmosDB, but even in its relative infancy
    with just a few iterations complete in the SQL Server lifecycle, it has become
    a nice way to extend your data structures inside existing relational data structures
    quickly and easily.


    You can find the downloads in the book in two locations. First, on Apress’s website
    you will find the original code for this book and any errata that is reported:
    [`https://github.com/Apress/practical-graph-structures`](https://github.com/Apress/practical-graph-structures).
    Second, at [`https://github.com/drsqlgithub/GraphBook1`](https://github.com/drsqlgithub/GraphBook1)
    you will find that code plus any new code and projects I create that pertain to
    learning graphs until I start working on a second edition of this book someday.


    If you have any direct questions about the content, send email to `louis@drsql.org`
    and I will do what I can.


    Acknowledgments


    My wife, for suffering through yet another long and painful book writing process.


    The Microsoft MVP Program for all the connections it has provided me to meet wonderful,
    bizarrely smart people for 18 years. And my lead, Rie Merritt, for all she has
    done for me through the years; amazing how we met so many years ago. Just meeting
    Bob Ward and Conor Cunningham is thrill enough, and there have been hundreds besides
    them.


    Shreya Verma and Arvind Shyamsundar for their help over the past few years as
    I attempted to do crazy things with the graph objects on my local personal computer.


    Dr. David Rosenstein, who first got me interested in graphs in relational structures
    so many years ago. Paul Nielsen for the talks we had on graph structures.


    Kathi Kellenberger for tech editing this book. I appreciate the hard work!


    All the doctors/medical professionals who kept me alive and kicking these past
    few years. (If you want to know more, just ask, if you have a while to talk. There
    is a reason this book took me over two years to write.)


    My coworkers at CBN whom I left during the writing of this book. I hope the graph
    objects I left you with are serving you nicely.'
