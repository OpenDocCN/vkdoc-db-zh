    I will discuss two major types of graph configurations, **acyclic** and **cyclic**.
    From Chapter [1](#508094_1_En_1_Chapter.xhtml), it is hopefully clear that the
    primary differentiator between them is that one allows cycles in the edges and
    the other doesn’t. Of course, the other differentiator is the type of situations
    where these data structures are useful.


    An acyclic graph is often useful to define something very structured, whereas
