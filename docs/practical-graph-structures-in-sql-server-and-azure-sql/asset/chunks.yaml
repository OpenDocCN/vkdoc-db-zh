  trans: '### 辅助表


    迄今为止所讨论的技术（使用 SQL Graph、路径和嵌套集）的一个共同点是，当你使用它们时，通常是以迭代方式处理行或进行基于非相等的比较。这有时处理成本很高，尤其是在处理非常大的数据集时。在本节中，你将探索几种有助于优化这些过程的辅助表，特别是当数据集变得非常大，并且你可以容忍一定程度的处理延迟时。


    公平地说，这些技术的核心思想是我在写作和家庭聚会中经常抱怨的（尽管没人在吃火鸡和填料时听），那就是`反规范化`。其理念是将迄今为止我们动态计算的一些内容进行持久化和预计算。


    主要需要理解的是，与任何涉及数据复制的反规范化一样，当基础数据发生变化时，你也必须确保数据的副本与之匹配，才能为查询提供正确的答案。在我的示例中，我假设你可以离线重建数据集，并对这些副本表进行完全重建。（在某些情况下，进行更有针对性的刷新可能是有利的。）


    这种刷新过程可能使并发执行变得困难，因此很多因素取决于你的数据修改频率以及实际使用中遇到的性能问题。修改以下代码并不困难，可以将数据保存在临时表中，并在需要时将其与实时表合并。


    我将演示构建两张这样的表：


    -   `Kimball 辅助表`：此表将扩展层级的概念具象化为一个表。这显然使聚合更快，但它也有助于其他过程（对于新手 SQL 程序员来说也明显更容易理解）。正如本章前面提到的，此方法以
    Ralph Kimball 命名，他多年来为数据仓库社区做出了许多杰出贡献。

    -   `层次结构显示辅助表`：在你作为销售汇总代码一部分构建的 `FilterAndSweeten` CTE 中，你使用了一个函数来获取数据。你将创建的表会预先构建那个显示表。在很多方面，你所做的只是复制邻接表中的路径方法表，让你可以使用更简单的
    SQL Graph 表来管理层次结构，然后生成一个在查询时更易于使用的表，特别是如果你需要对这些对象进行任何报表处理的话。


    #### Kimball 辅助表


    这种方法实现起来相对简单，因为你之前或多或少已经创建了代码。该方法旨在处理数据仓库/读取密集型设置中，处理大量数据的报表系统中的层次结构。尽管它是为静态数据设计的（通常是每日刷新），但如果层次结构不经常变化，并且与该表的物理资源没有太多争用，它在
    OLTP 环境中也可能是有用的。


    回到邻接表的实现，图 6-4 展示了邻接表实现的一个子图。


    ![](img/508094_1_En_6_Fig4_HTML.png)


    一个层次化的组织结构，其中公司总部 `Company H Q Company l d = 1, Reports To = NULL` 位于顶部，有 1 个子公司
    `Maine H Q Company l d = 2, Reports To = 1`，该子公司有 2 个分支机构：波特兰和卡姆登分支，公司 ID 分别为
    3 和 4，`Reports To = 2`。


    图 6-4


    用于邻接表示例的子图，其值在 Kimball 辅助表方法中重复使用


    要实现此方法，你将使用一个描述层次结构的数据表，其中对于层次结构的每个级别，每个父子关系占一行。因此，会有 `Company HQ` 到 `Maine HQ`、`Company
    HQ` 到 `Portland Branch`、`Maine HQ` 到 `Portland Branch` 的行，甚至每个节点自身也有行，比如 `Portland
    Branch` 到 `Portland Branch` 和 `Company HQ` 到 `CompanyHQ`。辅助表提供了从父到子的距离详细信息，以及其他有用的信息，例如它是否是根节点或叶节点。因此，对于树中最左边的四个项（`1`、`2`、`4`、`5`），你将得到如下表所示的行：


    | `ParentId` | `ChildId` | `Distance` | `RootNodeFlag` | `LeafRowFlag` |

    | --- | --- | --- | --- | --- |

    | `1` | `1` | `0` | `1` | `0` |

    | `1` | `2` | `1` | `0` | `0` |

    | `1` | `3` | `2` | `0` | `0` |

    | `1` | `3` | `2` | `0` | `0` |

    | `2` | `2` | `0` | `0` | `0` |

    | `2` | `3` | `1` | `0` | `1` |

    | `2` | `4` | `1` | `0` | `1` |

    | `3` | `3` | `0` | `0` | `1` |

    | `4` | `4` | `0` | `0` | `1` |


    这项技术的强大之处在于，现在你可以简单地通过查找 `WHERE ParentId = 1` 来请求 `1` 的所有子节点，或者通过 `WHERE ParentId
    = 2 and Distance = 1` 来查找 `2` 的直系后代。你可以通过查询 `WHERE ParentId = 1 and ChildLeafNode
    = 1` 来查找父节点的所有叶节点。


    这种方法的明显缺点是它必须被维护，如果结构修改频繁，它可能不是一个合理的通用解决方案。老实说，Kimball 提出该方法是为了优化数据仓库中层次结构的关联关系使用，这些层次结构通常由
    ETL 维护并每天刷新。对于此类用途，此方法应该是最快的，因为所有查询几乎完全基于简单的关系查询。


    在所有方法中，这种方法应该对用户来说最自然。我知道一些公司就使用类似的解决方案来处理公司层次结构，例如用于行级安全性，因为这类数据变化极少，并且用户对延迟极为敏感。（关于
    Kimball 方法的讨论摘自我写的 `Pro SQL Server 2012 Relational Database Design and Implementation`
    一书（Apress, 2012）。）


    注意


    你可以将此方法扩展到任何图结构，甚至是循环图，但它会变得非常庞大和复杂。然而，根据结构的大小和利用率，它可能仍然有价值。


    ##### 代码


    本节包含可用于使用 Kimball 辅助表的代码。'
- fmt: "### Table Create Script\n\nThe table mirrors the structure introduced in the\
    \ earlier examples:\n\n```\n--this table gives us the expanded hierarchy we used\
    \ earlier to\n--make aggregation and lookup easier\nCREATE SCHEMA Helper;\nGO\n\
    CREATE TABLE Helper.CompanyHierarchyHelper\n(\nParentCompanyId    int,\nChildCompanyId\
    \     int,\nDistance           int,\nParentRootNodeFlag bit\nCONSTRAINT DFLTCompanyHierarchyHelper_ParentRootNodeFlag\n\
    DEFAULT 0,\nChildLeafNodeFlag  bit\nCONSTRAINT DFLTCompanyHierarchyHelper_ChildLeafNodeFlag\n\
    DEFAULT 0,\n--The primary key is from parent to child.\nCONSTRAINT PKCompanyHierarchyHelper\
    \ PRIMARY KEY(\nParentCompanyId,\nChildCompanyId),\n--this index assists when\
    \ looking for parent rows.\nINDEX ChlldToParent UNIQUE (\nChildCompanyId,\nParentCompanyId\n\
    ),\n);\n```\n\nNote that the primary key is on the `ParentCompanyId` and `ChildCompanyId`.\
    \ You don’t want the same combination to show up more than once. The following\
    \ piece of code is used to maintain the data:\n\n```\nCREATE OR ALTER PROCEDURE\
    \ Helper.CompanyHierarchyHelper$Rebuild\nAS\nBEGIN\nSET NOCOUNT ON;\n--delete\
    \ all the data in the fastest way possible\nTRUNCATE TABLE Helper.CompanyHierarchyHelper;\n\
    WITH ExpandedHierarchy (ParentCompanyId,\nChildCompanyId, Distance)\nAS (\n--gets\
    \ all of the nodes of the hierarchy because the\n--MATCH doesnt include the self\
    \ relationship\nSELECT Company.CompanyId AS ParentCompanyId,\nCompany.CompanyId\
    \ AS ChildCompanyId,\n0 as Distance\nFROM SqlGraph.Company\nUNION ALL --Not recursive.\
    \ Just need both sets\n--get the parent and child rows, along with the distance\n\
    --from the root\nSELECT FromCompany.CompanyId AS ParentCompanyId,\nLAST_VALUE(ToCompany.CompanyId)\n\
    WITHIN GROUP (GRAPH PATH) ,\nCOUNT(ToCompany.Name)\nWITHIN GROUP (GRAPH PATH)\
    \ AS Distance\nFROM SqlGraph.Company AS FromCompany,\nSqlGraph.ReportsTo FOR PATH\
    \ as ReportsTo,\nSqlGraph.Company FOR PATH AS ToCompany\nWHERE MATCH(SHORTEST_PATH(FromCompany(-(ReportsTo)\n\
    ->ToCompany)+))\n)\nINSERT INTO  Helper.CompanyHierarchyHelper(ParentCompanyId,\n\
    ChildCompanyId, Distance)\nSELECT ParentCompanyId, ChildCompanyId, Distance\n\
    FROM   ExpandedHierarchy\nOPTION (MAXDOP 1);\n--set the special flags\n--root\
    \ nodes are never children\nUPDATE  Helper.CompanyHierarchyHelper\nSET    ParentRootNodeFlag\
    \ = 1\nWHERE  ParentCompanyId NOT IN (SELECT ChildCompanyId\nFROM Helper.CompanyHierarchyHelper\n\
    WHERE  parentCompanyId \nChildCompanyId)\n--LEAF nodes are never parents\nUPDATE\
    \  Helper.CompanyHierarchyHelper\nSET    ChildLeafNodeFlag = 1\nWHERE  ChildCompanyId\
    \ NOT IN (SELECT ParentCompanyId\nFROM Helper.CompanyHierarchyHelper\nWHERE parentCompanyId\
    \ \nChildCompanyId)\nEND;\nGO\n```\n\nThe user who needs to refresh the data will\
    \ simply execute this object and the table will be emptied and reloaded. Make\
    \ sure users are not concurrently querying the object while you are loading it.\n\
    \n### Check For Child\n\nOne place where this helper table can be useful is when\
    \ checking for a child. Once you have the two id values, you can simply see if\
    \ there is a row that has the parent and child id values. For example, if you\
    \ are doing a security system, unless you have constant user changes, you could\
    \ use a helper table to make security checks very fast.\n\n```\nCREATE OR ALTER\
    \ FUNCTION Helper.Company$CheckForChild\n(\n@CompanyName varchar(20),\n@CheckForChildOfCompanyName\
    \ varchar(20)\n)\nRETURNS bit\nAS\nBEGIN\nDECLARE @output BIT = 0,@CompanyId int,\n\
    @CheckForChildOfCompanyId int\n--translate the child companyId from parameter\n\
    SELECT  @CompanyId = CompanyId\nFROM   SQLGraph.Company\nWHERE  Company.Name =\
    \ @CompanyName;\n--translate the potential parentId from parameter\nSELECT  @CheckForChildOfCompanyId\
    \ = CompanyId\nFROM  SQLGraph.Company\nWHERE  Company.Name = @CheckForChildOfCompanyName;\n\
    --look for a row with the corresponding id values.\nSELECT @Output = 1\nFROM \
    \  Helper.CompanyHierarchyHelper\nWHERE  ParentCompanyId = @CheckForChildOfCompanyId\n\
    AND  ChildCompanyId = @CompanyId\nRETURN @OutPut\nEND;\n```\n\n### Hierarchy Display\
    \ Helper\n\nIn this chapter, when using the `SqlGraph.Company$ReportSales` object,\
    \ you use the `SqlGraph.CompanyHierarchyDisplay` view to sweeten your dataset\
    \ with textual data for output. In this section, you are simply going to take\
    \ the data that is represented by that view and store it in a table.\n\n### Code\n\
    \nThis helper table is just a duplicate of the structure that you would get executing\
    \ a `SELECT INTO` query using the `CompanyHierarchyDisplay` view object implemented\
    \ in Chapter [5](#508094_1_En_5_Chapter.xhtml) and adding a few indexes (true\
    \ story).\n\n### Table Create Script\n\n```\nCREATE TABLE Helper.HierarchyDisplayHelper(\n\
    --one row per company\nCompanyId int NOT NULL\nCONSTRAINT PKHerarchyDisplayHelper\
    \ PRIMARY KEY,\nHierarchyDisplay varchar(8000) NULL,\nLevel int NOT NULL,\nName\
    \ varchar(20) NOT NULL\nCONSTRAINT AKHierarchyDisplayHelper UNIQUE,\nHierarchy\
    \ varchar(8000) NOT NULL\n) ON [PRIMARY]\nGO\n```\n\nNow create the following\
    \ procedure to load the data. You are basically just querying the view as is and\
    \ inserting into the table. I did include an `OPTION(MAXDOP 1)` at the end, as\
    \ there can be issues with parallelism and the SQL Graph objects and for larger\
    \ sets it behaves better single threaded. (As of this writing, based on SQL Server\
    \ 2022, it is generally better to just add that to your coded objects that work\
    \ with larger amounts of data with SQL Graph tables, which you will in the next\
    \ two chapters when working with large data sets.)\n\n```\nCREATE PROCEDURE Helper.HierarchyDisplayHelper$Rebuild\n\
    AS\nBEGIN\nTRUNCATE TABLE [Helper].[HierarchyDisplayHelper];\nINSERT INTO Helper.HierarchyDisplayHelper\n\
    (CompanyId, HierarchyDisplay, Level, Name, Hierarchy)\nSELECT CompanyId, HierarchyDisplay,\
    \ Level, Name, Hierarchy\nFROM   SqlGraph.CompanyHierarchyDisplay\nOPTION(MAXDOP\
    \ 1); --when queries get complex, it is often\n--better to use single threaded\
    \ processing\n--with sql graph\nEND;\n```\n\n### Using the Helper Objects\n\n\
    Finally, let’s pull this together and use the helper tables in the `Company$ReportSales`\
    \ stored procedure by replacing the expanded hierarchy and filtering and sweeting\
    \ code with the freshly created tables."
