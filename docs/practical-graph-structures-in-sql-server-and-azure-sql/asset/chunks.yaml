- fmt: "## Multiple MATCH Expressions\n\nYou started out with a simple `MATCH` expression,\
    \ but you can do more than one `MATCH` expression in the same query. To make this\
    \ easier to demonstrate, let’s add new node type to the graph for programming\
    \ language, as shown in Figure 3-5. The three new items are those with the lighter\
    \ shade suffixed with `ProgrammingLanguage`. The edge, `ProgramsWith`, records\
    \ when a person programs with a programming language. (I didn’t name the edges\
    \ on the diagram for clarity reasons.)\n\n![](images/508094_1_En_3_Chapter/508094_1_En_3_Fig5_HTML.jpg)\n\
    \nA graphical representation of persons names Val Erry, Lee Roy, Day Vid, Joe\
    \ Seph, Lou Iss, Fred Rick, and Saa Lee interlinked with each other. Joe Seph\
    \ links to C + +, Val Erry, Saa Lee, and Lee Roy to Fortran, and Val Erry, Lou\
    \ Iss, Lee Roy, and Day Vid to T S Q L programming language.\n\nFigure 3-5: Introducing\
    \ `ProgrammingLanguage` to the example graph\n\n```sql\nCREATE TABLE Network.ProgrammingLanguage\n\
    (\n    Name nvarchar(30) NOT NULL\n) AS NODE;\n--load the node values\nINSERT\
    \ INTO Network.ProgrammingLanguage(Name)\nVALUES('C++'),\n      ('T-SQL'),\n \
    \     ('Fortran');\n```\n\nNext, create the `EDGE` object. In this case, you won’t\
    \ add any columns, so the only columns in this object will be the ones from the\
    \ graph database.\n\n```sql\nCREATE TABLE Network.ProgramsWith AS EDGE;\n```\n\
    \nJust like before, add rows using two queries to the two different objects:\n\
    \n```sql\nINSERT INTO Network.ProgramsWith($from_id, $to_id)\nSELECT (SELECT $node_id\n\
    \        FROM   Network.Person\n        WHERE  FirstName = 'Lou'\n        AND\
    \    LastName = 'Iss') AS from_id,\n       (SELECT $node_id\n        FROM  Network.ProgrammingLanguage\n\
    \        WHERE Name = 'T-SQL') as to_id;\n```\n\nThe rest of the data loading\
    \ statements are available in the download.\n\nTo start out, let’s see people\
    \ who program with a programming language:\n\n```sql\nSELECT      Person.Name\
    \ AS Person,\n            ProgrammingLanguage.Name AS ProgrammingLanguage\nFROM\
    \        Network.Person AS Person,\n            Network.ProgramsWith AS ProgramsWith,\n\
    \            Network.ProgrammingLanguage AS ProgrammingLanguage\nWHERE MATCH(Person-(ProgramsWith)->ProgrammingLanguage)\n\
    ORDER BY    Person.Name;\n```\n\nThis returns:\n\n```text\nPerson          ProgrammingLanguage\n\
    --------------- -------------------\nDay Vid         T-SQL\nJoe Seph        C++\n\
    Lee Roy         Fortran\nLee Roy         T-SQL\nLou Iss         T-SQL\nSaa Lee\
    \         Fortran\nVal Erry        Fortran\nVal Erry        T-SQL\n```\n\nIn Figure\
    \ 3-5, you can see `Val` and `Lee` both have multiples, so they have multiple\
    \ rows in the output. Fred does not have any languages linked, so he doesn’t show\
    \ up in the list. There is no way to make Fred show up in this list without adding\
    \ a “not a programmer” node and link to it, or `UNION ALL` a query like:\n\n```sql\n\
    SELECT Person.Name AS PersonName,\n       NULL AS ProgrammingLanguage\nFROM  \
    \ Network.Person\nWHERE  $node_id NOT IN (SELECT $from_id\n                  \
    \      FROM   Network.ProgramsWith);\n```\n\nThis returns the row that has no\
    \ programming language:\n\n```text\nPersonName      ProgrammingLanguage\n---------------\
    \ -------------------\nFred Rick       NULL\n```\n\nNow you can find the people\
    \ who share a programming language ability by using a `MATCH` expressions. To\
    \ do this, use two virtual copies of `Person` and two virtual copies of the edge\
    \ (edges cannot be used more than one time in `MATCH` expressions, but tables\
    \ can be reused if it makes sense.) Figure 3-6 shows the subgraph of `ProgrammingLanguage`\
    \ nodes that `Lou Iss` is connected to and the other `Person` nodes that are connected\
    \ to that language.\n\n![](images/508094_1_En_3_Chapter/508094_1_En_3_Fig6_HTML.jpg)\n\
    \nA graphical representation of persons names Val Erry, Lee Roy, Day Vid, and\
    \ Lou Iss pointing to T, S Q L programming language, with a tick mark over the\
    \ links. Lou Iss links to Val Erry, and Val Erry to Lee Roy.\n\nFigure 3-6: Diagram\
    \ showing the intersection of people who share a programming language skill with\
    \ Lou Iss\n\nThe following query implements this by essentially joining this set\
    \ to itself with two filters. You join them together to get four output rows.\
    \ You then filter out the row where `Lou Iss` matches `Lou Iss`, and you get three\
    \ matches.\n\n```sql\nSELECT      Person.Name AS Person,\n            Person2.Name\
    \ AS Person2,\n            ProgrammingLanguage.Name AS ProgrammingLanguage\nFROM\
    \        Network.Person AS Person,\n            Network.Person AS Person2,\n \
    \           Network.ProgramsWith AS ProgramsWith,\n            Network.ProgrammingLanguage\
    \ AS ProgrammingLanguage,\n            Network.ProgramsWith AS ProgramsWith2\n\
    WHERE MATCH(Person-(ProgramsWith)->ProgrammingLanguage)\n  AND MATCH(Person2-(ProgramsWith2)->ProgrammingLanguage)\n\
    --every person will match themselves\n  AND Person2.PersonId <> Person.PersonId\n\
    \  AND Person.Name = 'Lou Iss'\nORDER BY    Person.Name, Person2.Name;\n```\n\n\
    The output of this query is as described (three rows):\n\n```text\nPerson    \
    \    Person2     ProgrammingLanguage\n------------- ----------- -------------------\n\
    Lou Iss       Day Vid     T-SQL\nLou Iss       Lee Roy     T-SQL\nLou Iss    \
    \   Val Erry    T-SQL\n```\n\nThere are other formats of this `MATCH` expression\
    \ you can use. In fact, you can express the two `MATCH` expressions for `Person`\
    \ to `ProgrammingLanguage` in one `ASCII` art version of the query, like this:\n\
    \n```sql\nWHERE MATCH(Person-(ProgramsWith)->ProgrammingLanguage<-(ProgramsWith2)-Person2)\n\
    ```\n\nAnother variation is that in the one `MATCH` expression, it expresses both\
    \ sides of the equation. Finally, since you may not be able to combine everything\
    \ into one `MATCH` expression like that, you can `AND` right in the `MATCH` expression:\n\
    \n```sql\nWHERE  MATCH(Person-(ProgramsWith)->ProgrammingLanguage\n        AND\
    \ Person2-(ProgramsWith2)->ProgrammingLanguage)\n```\n\nAnd you can even pull\
    \ in the `Person` to `Person2` into the `MATCH` expression!\n\n```sql\nWHERE MATCH(Person-(ProgramsWith)->ProgrammingLanguage<-(ProgramsWith2)-Person2)\n\
    ```\n\nWhether you want to cram everything into the one long `ASCII` art expression\
    \ or not is a different discussion, as this can be a lot to handle (especially\
    \ when troubleshooting a query that does not provide expected results).\n\nIn\
    \ this next query, let’s look for people who follow each other and share a programming\
    \ language. These types of queries, with the generic many-to-many tables, are\
    \ part of the great power of SQL graph objects.\n\n```sql\nSELECT      Person.Name\
    \ AS Person,\n            Person2.Name AS Person2,\n            ProgrammingLanguage.Name\n\
    FROM        Network.Person AS Person,\n            Network.Person AS Person2,\n\
    \            Network.ProgramsWith AS ProgramsWith,\n            Network.ProgrammingLanguage\
    \ AS ProgrammingLanguage,\n            Network.ProgramsWith AS ProgramsWith2,\n\
    \            Network.Follows AS Follows\nWHERE MATCH(Person-(ProgramsWith)->ProgrammingLanguage)\n\
    \  AND MATCH(Person2-(ProgramsWith2)->ProgrammingLanguage)\n  AND MATCH(Person-(Follows)->Person2)\n\
    \  AND Person2.PersonId <> Person.PersonId\n  AND Person.Name = 'Lou Iss'\nORDER\
    \ BY    Person, Person2, Name;\n```\n\nThis filters the set down one more level,\
    \ as you can see in Figure 3-7. `Lou Iss` only follows `Val Erry` among people\
    \ in the subset of people that program with programming languages that `Lou Iss`\
    \ also does.\n\n![](images/508094_1_En_3_Chapter/508094_1_En_3_Fig7_HTML.jpg)\n\
    \nA graphical representation of persons names. Tick marks are over the links of\
    \ Lou Iss to Val Erry, and Val Erry and Lou Iss to T, S Q L programming language.\
    \ Lee Roy and Day Vid link to T, S Q L programming language, and Val Erry to Lee\
    \ Roy.\n\nFigure 3-7: Adding the extra follows relationship to your previous query\n\
    \nThe query returns the one person that Lou Iss follows who also programs with\
    \ T-SQL:\n\n```text\nPerson       Person2       ProgrammingLanguage\n------------\
    \ ------------- ------------------------------\nLou Iss      Val Erry      T-SQL\n\
    ```\n\nYou can use the multiple layers of `MATCH` expressions to tie your edges\
    \ and nodes together to create rich queries to find how nodes are alike in multiple\
    \ ways."
  raw: '#### Multiple MATCH Expressions


    You started out with a simple `MATCH` expression, but you can do more than one
    `MATCH` expression in the same query. To make this easier to demonstrate, let’s
    add new node type to the graph for programming language, as shown in Figure [3-5](#508094_1_En_3_Chapter.xhtml#Fig5).
    The three new items are those with the lighter shade suffixed with `ProgrammingLanguage`.
    The edge, `ProgramsWith`, records when a person programs with a programming language.
    (I didn’t name the edges on the diagram for clarity reasons.)


    ![](images/508094_1_En_3_Chapter/508094_1_En_3_Fig5_HTML.jpg)


    A graphical representation of persons names Val Erry, Lee Roy, Day Vid, Joe Seph,
    Lou Iss, Fred Rick, and Saa Lee interlinked with each other. Joe Seph links to
    C + +, Val Erry, Saa Lee, and Lee Roy to Fortran, and Val Erry, Lou Iss, Lee Roy,
    and Day Vid to T S Q L programming language.


    Figure 3-5


    Introducing ProgrammingLanguage to the example graph


    ```

    CREATE TABLE Network.ProgrammingLanguage

    (

    Name nvarchar(30) NOT NULL

    ) AS NODE;

    --load the node values

    INSERT INTO Network.ProgrammingLanguage(Name)

    VALUES(''C++''),

    (''T-SQL''),

    (''Fortran'');

    ```


    Next, create the `EDGE` object. In this case, you won’t add any columns, so the
    only columns in this object will be the ones from the graph database.


    ```

    CREATE TABLE Network.ProgramsWith AS EDGE;

    ```


    Just like before, add rows using two queries to the two different objects:


    ```

    INSERT INTO Network.ProgramsWith($from_id, $to_id)

    SELECT (SELECT $node_id

    FROM   Network.Person

    WHERE  FirstName = ''Lou''

    AND LastName = ''Iss'') AS from_id,

    (SELECT $node_id

    FROM  Network.ProgrammingLanguage

    WHERE Name = ''T-SQL'') as to_id;

    ```


    The rest of the data loading statements are available in the download.


    To start out, let’s see people who program with a programming language:


    ```

    SELECT      Person.Name AS Person,

    ProgrammingLanguage.Name AS ProgrammingLanguage

    FROM        Network.Person AS Person,

    Network.ProgramsWith AS ProgramsWith,

    Network.ProgrammingLanguage AS ProgrammingLanguage

    WHERE MATCH(Person-(ProgramsWith)->ProgrammingLanguage)

    ORDER BY    Person.Name;

    ```


    This returns


    ```

    Person          ProgrammingLanguage

    --------------- -------------------

    Day Vid         T-SQL

    Joe Seph        C++

    Lee Roy         Fortran

    Lee Roy         T-SQL

    Lou Iss         T-SQL

    Saa Lee         Fortran

    Val Erry        Fortran

    Val Erry        T-SQL

    ```


    In Figure [3-5](#508094_1_En_3_Chapter.xhtml#Fig5), you can see `Val` and `Lee`
    both have multiples, so they have multiple rows in the output. Fred does not have
    any languages linked, so he doesn’t show up in the list. There is no way to make
    Fred show up in this list without adding a “not a programmer” node and link to
    it, or `UNION ALL` a query like


    ```

    SELECT Person.Name AS PersonName,

    NULL AS ProgrammingLanguage

    FROM   Network.Person

    WHERE $node_id NOT IN (SELECT $from_id

    FROM   Network.ProgramsWith);

    ```


    This returns the row that has no programming language:


    ```

    PersonName      ProgrammingLanguage

    --------------- -------------------

    Fred Rick       NULL

    ```


    Now you can find the people who share a programming language ability by using
    a `MATCH` expressions. To do this, use two virtual copies of Person and two virtual
    copies of the edge (edges cannot be used more than one time in `MATCH` expressions,
    but tables can be reused if it makes sense.) Figure [3-6](#508094_1_En_3_Chapter.xhtml#Fig6)
    shows the subgraph of `ProgrammingLanguage` nodes that `Lou Iss` is connected
    to and the other `Person` nodes that are connected to that language.


    ![](images/508094_1_En_3_Chapter/508094_1_En_3_Fig6_HTML.jpg)


    A graphical representation of persons names Val Erry, Lee Roy, Day Vid, and Lou
    Iss pointing to T, S Q L programming language, with a tick mark over the links.
    Lou Iss links to Val Erry, and Val Erry to Lee Roy.


    Figure 3-6


    Diagram showing the intersection of people who share a programming language skill
    with Lou Iss


    The following query implements this by essentially joining this set to itself
    with two filters. You join them together to get four output rows. You then filter
    out the row where `Lou Iss` matches `Lou Iss`, and you get three matches.


    ```

    SELECT      Person.Name AS Person,

    Person2.Name AS Person2,

    ProgrammingLanguage.Name AS ProgrammingLanguage

    FROM        Network.Person AS Person,

    Network.Person AS Person2,

    Network.ProgramsWith AS ProgramsWith,

    Network.ProgrammingLanguage AS ProgrammingLanguage,

    Network.ProgramsWith AS ProgramsWith2

    WHERE MATCH(Person-(ProgramsWith)->ProgrammingLanguage)

    AND MATCH(Person2-(ProgramsWith2)->ProgrammingLanguage)

    --every person will match themselves

    AND Person2.PersonId  Person.PersonId

    AND Person.Name = ''Lou Iss''

    ORDER BY    Person.Name, Person2.Name;

    ```


    The output of this query is as described (three rows):


    ```

    Person        Person2     ProgrammingLanguage

    ------------- ----------- -------------------

    Lou Iss       Day Vid     T-SQL

    Lou Iss       Lee Roy     T-SQL

    Lou Iss       Val Erry    T-SQL

    ```


    There are other formats of this `MATCH` expression you can use. In fact, you can
    express the two `MATCH` expressions for `Person to ProgrammingLanguage` in one
    `ASCII` art version of the query, like this:


    ```

    WHERE MATCH(Person-(ProgramsWith)->ProgrammingLanguage<-  (ProgramsWith2)-Person2)

    ```


    Another variation is that in the one `MATCH` expression, it expresses both sides
    of the equation. Finally, since you may not be able to combine everything into
    one `MATCH` expression like that, you can `AND` right in the `MATCH` expression:


    ```

    WHERE  MATCH(Person-(ProgramsWith)->ProgrammingLanguage

    AND Person2-(ProgramsWith2)->ProgrammingLanguage)

    ```


    And you can even pull in the `Person` to `Person2` into the `MATCH` expression!


    ```

    WHERE MATCH(Person2ProgrammingLanguage<-(ProgramsWith2)-Person2)

    ```


    Whether you want to cram everything into the one long `ASCII` art expression or
    not is a different discussion, as this can be a lot to handle (especially when
    troubleshooting a query that does not provide expected results).


    In this next query, let’s look for people who follow each other and share a programming
    language. These types of queries, with the generic many-to-many tables, are part
    of the great power of SQL graph objects.


    ```

    SELECT      Person.Name AS Person,

    Person2.Name AS Person2,

    ProgrammingLanguage.Name

    FROM        Network.Person AS Person,

    Network.Person AS Person2,

    Network.ProgramsWith AS ProgramsWith,

    Network.ProgrammingLanguage AS ProgrammingLanguage,

    Network.ProgramsWith AS ProgramsWith2,

    Network.Follows AS Follows

    WHERE MATCH(Person-(ProgramsWith)->ProgrammingLanguage)

    AND MATCH(Person2-(ProgramsWith2)->ProgrammingLanguage)

    AND MATCH(Person-(Follows)->Person2)

    AND Person2.PersonId  Person.PersonId

    AND Person.Name = ''Lou Iss''

    ORDER BY    Person, Person2, Name;

    ```


    This filters the set down one more level, as you can see in Figure [3-7](#508094_1_En_3_Chapter.xhtml#Fig7).
    `Lou Iss` only follows `Val Erry` among people in the subset of people that program
    with programming languages that `Lou Iss` also does.


    ![](images/508094_1_En_3_Chapter/508094_1_En_3_Fig7_HTML.jpg)


    A graphical representation of persons names. Tick marks are over the links of
    Lou Iss to Val Erry, and Val Erry and Lou Iss to T, S Q L programming language.
    Lee Roy and Day Vid link to T, S Q L programming language, and Val Erry to Lee
    Roy.


    Figure 3-7


    Adding the extra follows relationship to your previous query


    The query returns the one person that Lou Iss follows who also programs with T-SQL:


    ```

    Person       Person2       ProgrammingLanguage

    ------------ ------------- ------------------------------

    Lou Iss      Val Erry      T-SQL

    ```


    You can use the multiple layers of `MATCH` expressions to tie your edges and nodes
    together to create rich queries to find how nodes are alike in multiple ways.'
  trans: "## 多个 MATCH 表达式\n\n你最初使用的是一个简单的 `MATCH` 表达式，但在同一个查询中，你可以执行多个 `MATCH` 表达式。为了更方便地演示这一点，让我们向图中添加一种新的节点类型——编程语言，如图\
    \ 3-5 所示。三个颜色较浅、后缀为 `ProgrammingLanguage` 的节点就是新增加的。边 `ProgramsWith` 记录了一个人使用某种编程语言进行编程的时机。（为了清晰起见，我未在图上标注边的名称。）\n\
    \n![](img/508094_1_En_3_Fig5_HTML.jpg)\n\n一个图形化表示，显示名为 Val Erry、Lee Roy、Day Vid、Joe\
    \ Seph、Lou Iss、Fred Rick 和 Saa Lee 的人物彼此链接。Joe Seph 链接到 C++，Val Erry、Saa Lee 和\
    \ Lee Roy 链接到 Fortran，而 Val Erry、Lou Iss、Lee Roy 和 Day Vid 链接到 T-SQL 编程语言。\n\n\
    图 3-5：在示例图中引入 `ProgrammingLanguage`\n\n```sql\nCREATE TABLE Network.ProgrammingLanguage\n\
    (\n    Name nvarchar(30) NOT NULL\n) AS NODE;\n--加载节点值\nINSERT INTO Network.ProgrammingLanguage(Name)\n\
    VALUES('C++'),\n      ('T-SQL'),\n      ('Fortran');\n```\n\n接下来，创建 `EDGE` 对象。在这种情况下，你不会添加任何列，因此该对象中唯一的列将来自图数据库。\n\
    \n```sql\nCREATE TABLE Network.ProgramsWith AS EDGE;\n```\n\n和之前一样，使用两个查询向两个不同的对象添加行：\n\
    \n```sql\nINSERT INTO Network.ProgramsWith($from_id, $to_id)\nSELECT (SELECT $node_id\n\
    \        FROM   Network.Person\n        WHERE  FirstName = 'Lou'\n        AND\
    \    LastName = 'Iss') AS from_id,\n       (SELECT $node_id\n        FROM  Network.ProgrammingLanguage\n\
    \        WHERE Name = 'T-SQL') as to_id;\n```\n\n其余的数据加载语句可在下载内容中找到。\n\n首先，让我们查看使用编程语言进行编程的人：\n\
    \n```sql\nSELECT      Person.Name AS Person,\n            ProgrammingLanguage.Name\
    \ AS ProgrammingLanguage\nFROM        Network.Person AS Person,\n            Network.ProgramsWith\
    \ AS ProgramsWith,\n            Network.ProgrammingLanguage AS ProgrammingLanguage\n\
    WHERE MATCH(Person-(ProgramsWith)->ProgrammingLanguage)\nORDER BY    Person.Name;\n\
    ```\n\n返回结果：\n\n```text\nPerson          ProgrammingLanguage\n---------------\
    \ -------------------\nDay Vid         T-SQL\nJoe Seph        C++\nLee Roy   \
    \      Fortran\nLee Roy         T-SQL\nLou Iss         T-SQL\nSaa Lee        \
    \ Fortran\nVal Erry        Fortran\nVal Erry        T-SQL\n```\n\n在图 3-5 中，你可以看到\
    \ `Val` 和 `Lee` 都有多条链接，因此它们在输出中有多个行。Fred 没有链接任何语言，因此他不会出现在列表中。如果不添加一个“不是程序员”的节点并链接到他，或者不使用\
    \ `UNION ALL` 结合类似以下的查询，就无法让 Fred 出现在此列表中：\n\n```sql\nSELECT Person.Name AS PersonName,\n\
    \       NULL AS ProgrammingLanguage\nFROM   Network.Person\nWHERE  $node_id NOT\
    \ IN (SELECT $from_id\n                        FROM   Network.ProgramsWith);\n\
    ```\n\n这将返回没有编程语言的行：\n\n```text\nPersonName      ProgrammingLanguage\n---------------\
    \ -------------------\nFred Rick       NULL\n```\n\n现在，你可以使用 `MATCH` 表达式来查找共享编程语言技能的人。为此，使用\
    \ `Person` 的两个虚拟副本和边的两个虚拟副本（在 `MATCH` 表达式中，一条边不能被多次使用，但表可以重复使用，如果合理的话。）。图 3-6\
    \ 显示了与 `Lou Iss` 相连的 `ProgrammingLanguage` 节点以及连接到该语言的其他 `Person` 节点的子图。\n\n![](img/508094_1_En_3_Fig6_HTML.jpg)\n\
    \n一个图形化表示，显示名为 Val Erry、Lee Roy、Day Vid 和 Lou Iss 的人物指向 T-SQL 编程语言，链接上有勾号标记。Lou\
    \ Iss 链接到 Val Erry，而 Val Erry 链接到 Lee Roy。\n\n图 3-6：展示与 Lou Iss 共享编程语言技能的交集人员的图示\n\
    \n以下查询通过本质上将此集合与自身连接并使用两个过滤器来实现这一点。你将它们连接起来得到四个输出行。然后过滤掉 `Lou Iss` 与自身匹配的那一行，得到三个匹配项。\n\
    \n```sql\nSELECT      Person.Name AS Person,\n            Person2.Name AS Person2,\n\
    \            ProgrammingLanguage.Name AS ProgrammingLanguage\nFROM        Network.Person\
    \ AS Person,\n            Network.Person AS Person2,\n            Network.ProgramsWith\
    \ AS ProgramsWith,\n            Network.ProgrammingLanguage AS ProgrammingLanguage,\n\
    \            Network.ProgramsWith AS ProgramsWith2\nWHERE MATCH(Person-(ProgramsWith)->ProgrammingLanguage)\n\
    \  AND MATCH(Person2-(ProgramsWith2)->ProgrammingLanguage)\n--每个人都会匹配自身\n  AND\
    \ Person2.PersonId <> Person.PersonId\n  AND Person.Name = 'Lou Iss'\nORDER BY\
    \    Person.Name, Person2.Name;\n```\n\n此查询的输出如描述所示（三行）：\n\n```text\nPerson  \
    \      Person2     ProgrammingLanguage\n------------- ----------- -------------------\n\
    Lou Iss       Day Vid     T-SQL\nLou Iss       Lee Roy     T-SQL\nLou Iss    \
    \   Val Erry    T-SQL\n```\n\n你可以使用这种 `MATCH` 表达式的其他格式。事实上，你可以将 `Person` 到 `ProgrammingLanguage`\
    \ 的两个 `MATCH` 表达式在一个 `ASCII` 艺术版本的查询中表达，像这样：\n\n```sql\nWHERE MATCH(Person-(ProgramsWith)->ProgrammingLanguage<-(ProgramsWith2)-Person2)\n\
    ```\n\n另一种变体是，在单个 `MATCH` 表达式中表达了等式的两侧。最后，既然你可能无法像那样将所有内容组合到一个 `MATCH` 表达式中，你可以在\
    \ `MATCH` 表达式中直接使用 `AND`：\n\n```sql\nWHERE  MATCH(Person-(ProgramsWith)->ProgrammingLanguage\n\
    \        AND Person2-(ProgramsWith2)->ProgrammingLanguage)\n```\n\n你甚至可以将 `Person`\
    \ 到 `Person2` 的关系也纳入 `MATCH` 表达式中！\n\n```sql\nWHERE MATCH(Person-(ProgramsWith)->ProgrammingLanguage<-(ProgramsWith2)-Person2)\n\
    ```\n\n是否要将所有内容塞进一个长长的 `ASCII` 艺术表达式是另一个讨论话题，因为这可能难以处理（尤其是在对一个未提供预期结果的查询进行故障排除时）。\n\
    \n在下一个查询中，让我们寻找彼此关注（follow）并且共享编程语言的人。这类查询，结合通用的多对多表，是 SQL 图对象强大功能的一部分。\n\n```sql\n\
    SELECT      Person.Name AS Person,\n            Person2.Name AS Person2,\n   \
    \         ProgrammingLanguage.Name\nFROM        Network.Person AS Person,\n  \
    \          Network.Person AS Person2,\n            Network.ProgramsWith AS ProgramsWith,\n\
    \            Network.ProgrammingLanguage AS ProgrammingLanguage,\n           \
    \ Network.ProgramsWith AS ProgramsWith2,\n            Network.Follows AS Follows\n\
    WHERE MATCH(Person-(ProgramsWith)->ProgrammingLanguage)\n  AND MATCH(Person2-(ProgramsWith2)->ProgrammingLanguage)\n\
    \  AND MATCH(Person-(Follows)->Person2)\n  AND Person2.PersonId <> Person.PersonId\n\
    \  AND Person.Name = 'Lou Iss'\nORDER BY    Person, Person2, Name;\n```\n\n这将集合进一步向下过滤，如图\
    \ 3-7 所示。在那些也使用 Lou Iss 所用编程语言进行编程的人的子集中，`Lou Iss` 只关注了 `Val Erry`。\n\n![](img/508094_1_En_3_Fig7_HTML.jpg)\n\
    \n一个图形化表示，显示人物名称。勾号标记位于 Lou Iss 到 Val Erry 的链接上，以及 Val Erry 和 Lou Iss 到 T-SQL\
    \ 编程语言的链接上。Lee Roy 和 Day Vid 链接到 T-SQL 编程语言，而 Val Erry 链接到 Lee Roy。\n\n图 3-7：在之前的查询中添加额外的关注关系\n\
    \n查询返回 Lou Iss 所关注的、同时也使用 T-SQL 编程的那一个人：\n\n```text\nPerson       Person2    \
    \   ProgrammingLanguage\n------------ ------------- ------------------------------\n\
    Lou Iss      Val Erry      T-SQL\n```\n\n你可以利用多层的 `MATCH` 表达式将边和节点绑定在一起，从而创建丰富的查询，以多种方式查找节点之间的相似之处。"
- fmt: '# Traversing Variable Level Paths


    So far, I have covered how to take one hop in the data structure. While the `MATCH`
    clause makes it easier to code the multiple connections, the power of a graph
    structure is quite often in querying longer paths to see how nodes are connected.


    For example, say you want to find all the people in your graph subset that `Day
    Vid` is connected to on any level walk. There is only one direct connection from
    `Day Vid` to `Saa Lee`, but `Saa` is connected to several people, and in a third
    pass through the graph, `Fred Rick` is connected to three more people, as you
    can see in Figure 3-8.


    ![](images/508094_1_En_3_Chapter/508094_1_En_3_Fig8_HTML.jpg)


    Figure 3-8: Connections to all the people from Day Vid


    I stopped when every node had been touched. For example, I didn’t continue from
    `Val Erry` to `Joe Seph` because `Joe` had already been reached. This is because
    we have the shortest walk/path from `Day Vid` to the `Joe Seph` already. And there
    is a path from `Joe Seph` to `Saa Lee` that would be a cycle. No cycle can ever
    go through our starting node, but there are always very likely to be cycles in
    the graph when the degree of the nodes is quite high (for example, `Saa Lee` has
    five connections, three incoming and two outgoing).


    When you need to process your graph like this, SQL Server implements a `SHORTEST_PATH`
    clause in the `MATCH` expression which is used to find (not surprisingly) a path
    from two nodes that is the shortest possible. It is a random (as far as we can
    tell) path because if there are multiple paths through the tree, it will pick
    just one. (This will be demonstrated again when I discuss how to process a weighted
    graph, which SQL Server does not implement in syntax as of SQL Server 2022.)


    The syntax gets a little gnarly using `SHORTEST_PATH`, and some parts of the syntax
    took me quite a bit of work to learn. (I still have to look up the exact details
    every time I write a shortest path query and I am not ashamed to admit that!)


    ## Displaying the Last Node in the Path


    In this next query, you will do a minimal query to get the shortest path between
    the `Lou Iss` node to any other nodes that connect. After the query and results,
    I will break down the syntax.


    ```sql

    SELECT Person.Name,

    LAST_VALUE(FollowedPerson.Name) WITHIN GROUP (GRAPH PATH)

    AS ConnectedPerson

    FROM   Network.Person AS Person,

    Network.Follows FOR PATH AS Follows,

    Network.Person FOR PATH AS FollowedPerson

    WHERE  Person.FirstName = ''Lou''

    AND Person.LastName = ''Iss''

    AND MATCH(SHORTEST_PATH(Person(-(Follows)->FollowedPerson)+));

    ```


    The output of this query is every node other than `Day Vid`:


    ```text

    Person        ConnectedPerson

    ------------- ---------------

    Lou Iss       Val Erry

    Lou Iss       Saa Lee

    Lou Iss       Fred Rick

    Lou Iss       Lee Roy

    Lou Iss       Joe Seph

    Lou Iss       Lou Iss

    ```


    You can see in Figure 3-9 the different paths that are followed to get each value
    in the `ConnectedPerson` output. For example, `Joe Seph` is included because you
    can follow the path from `Lou Iss` to `Val Erry` and then `Joe Seph`.


    To get that output, just walk through the graph and add each node that you find.
    On the first pass, you add `Val Erry` and `Saa Lee`. On the second, `Lee Roy`
    and `Fred Rick`, and so on. The output doesn’t include any additional details,
    so just the node that you reach is all you need. There won’t be any duplicates
    because you are finding the shortest path between nodes, and it only returns one
    of the paths if there are multiples.


    ![](images/508094_1_En_3_Chapter/508094_1_En_3_Fig9_HTML.jpg)


    Figure 3-9: Finding the shortest paths between Lou Iss and other nodes


    Note that `Lou Iss`’ node is in the output, because on the third iteration of
    the breadth first algorithm it is reached.


    In the query, a few new things are included. The first thing to look at is the
    `FROM` clause where you add `FOR PATH` to the edge and node objects that are used
    to calculate the path. The anchor object, in this case one of the copies of `Network.Person`,
    can be used in the query output directly, as with `Person.Name` in the output
    of the query. Objects with `FOR PATH` can only be used in graph aggregate functions,
    like the `LAST_VALUE` function.


    ```sql

    FROM   Network.Person AS Person,

    Network.Follows FOR PATH AS Follows,

    Network.Person FOR PATH AS FollowedPerson

    ```


    The `MATCH` expression has a bit more to it as well:


    ```sql

    AND MATCH(SHORTEST_PATH(Person(-(Follows)->FollowedPerson)+));

    ```


    You can see `SHORTEST_PATH` is inside the `MATCH` expression, and it in turn has
    an input of the anchor object and then the same sort of syntax for the objects
    in the path as before. The `+` indicates that you want all levels. You can specify
    how many levels to process with `{1-N}`. You always start with the first level,
    but then you can specify how far down the path to process. This can be essential
    when you have a huge graph to process and don’t necessarily need to see items
    1,000 hops away from your anchor node. The `SHORTEST_PATH` expression can be more
    complex (as I will demonstrate!) and you can include other `MATCH` criteria as
    well.


    ```sql

    LAST_VALUE(FollowedPerson.Name) WITHIN GROUP (GRAPH PATH)

    AS ConnectedPerson

    ```


    `LAST_VALUE` is probably the most important of the graph functions you can use
    when doing a `SHORTEST_PATH` because the output is a value from the connected
    node. It is typically going to be the value you use to either display the piece
    of information to the user or fetch a key value to join to other objects.


    You can use the `LAST_VALUE` function (and most others) in queries just as any
    column (though a lot more complex to display in the text of a book!). For example,
    if you didn’t have the concatenated name column, you could output the name using
    this syntax:


    ```sql

    CONCAT(

    LAST_VALUE(FollowedPerson.Firstname) WITHIN GROUP (GRAPH PATH),

    '' '',

    LAST_VALUE(FollowedPerson.LastName) WITHIN GROUP (GRAPH PATH))

    AS Name

    ```'
