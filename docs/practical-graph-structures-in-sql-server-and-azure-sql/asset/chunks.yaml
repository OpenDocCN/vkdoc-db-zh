    Executing this code returns the following results:


    ```

    Path

    \@Cassandra_Villegas\@Gerald_Scott\@Lynn_Escobar\

    \@Cassandra_Villegas\@Gerald_Scott\@Willie_Charles\@Lynn_Escobar\

    \@Cassandra_Villegas\@Tonia_Mueller\@Gerald_Scott\@Lynn_Escobar\

    \@Cassandra_Villegas\@Tonia_Mueller\@Gerald_Scott\@Willie_Charles

    \@Lynn_Escobar\

    \@Cassandra_Villegas\@Tonia_Mueller\@Lynn_Escobar\

    \@Cassandra_Villegas\@Willie_Charles\@Lynn_Escobar\

    ```


    You can see that in the results, there are three rows that are two hops away,
    which matches the previous result in the `UNION` query, but there are also a few
    more walks from the row you searched for and the row you are matching to.


    From there you could filter/sort the output using the level or the path. For example,
    change the previous query’s where clause to include


    ```

    AND Path like ''_%\@Tonia_Mueller\%_''

    ```


    Now the query gets only paths that pass through `@Tonia_Mueller`.


    The part of the code that stops the recursion is


    ```

    AND NOT BaseRows.Path LIKE CONCAT(''%\'',

    FollowedAccount.AccountHandle, ''\%'')

    ```


    It does this by comparing the current path in the loop to a `LIKE` expression.
    That `LIKE` expression takes the current node in the query and surrounds it with
    characters so that if it is in the path, you can stop processing. So, if the path
    is `''\1\2\''` and the next node is 3, you get `''\1\2\3\'' LIKE ''%\3\%''`. This
    is one of the limitations of a relational database: no arrays (and this is one
    of the only places I have ever thought that an array would be useful). I know
    other RDBMSs have them, but I expect they are problematic in most of their usage.


    The lack of the array means you will use the data in the string as a delimited
    list and see if the current node is in that path already.


    #### Finding All People That a User Connects To At Any Level Where They Share
    an Interest


    Where the graph syntax really starts to shine is finding even more connections
    though even more nodes. In this case, you want to find users connected to each
    other at any level that have an interest in Aircraft Spotting. Cassandra does
    not currently have this interest noted, but it doesn’t matter if they do in this
    particular example. The idea here might be that Cassandra is interested in taking
    up Aircraft Spotting and wants to see if any connections already do this.


    To implement this, use `LAST_NODE` to get the last node in the chain and then
    match these nodes to their interests to see if Aircraft Spotting is included:


    ```

    --6 in test rig

    ----any level connection and connections have a specific interest

    SELECT Account1.AccountHandle + ''->'' +

    STRING_AGG(Account2.AccountHandle, ''->'')

    WITHIN GROUP (GRAPH PATH) AS ConnectedPath,

    LAST_VALUE(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS ConnectedToAccountHandle,

    COUNT(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS LEVEL,

    Interest.InterestName

    FROM   SocialGraph.Account AS Account1

    ,SocialGraph.Account FOR PATH AS Account2

    ,SocialGraph.Follows FOR PATH AS Follows

    ,SocialGraph.InterestedIn

    ,SocialGraph.Interest

    --This finds people that the searched for person follows

    WHERE  MATCH(SHORTEST_PATH(Account1(-(Follows)->Account2)+)

    --and this takes every matched node (the last node in the chain

    --and sees if they are connected to Interest

    AND LAST_NODE(Account2)-(InterestedIn)->Interest)

    --The next two lines filter the results;

    AND  Account1.AccountHandle = ''@Cassandra_Villegas''

    AND  Interest.InterestName = ''Aircraft Spotting''

    ORDER BY ConnectedPath

    OPTION (MAXDOP 1);

    ```


    This returns (including only the path for space reasons)


    ```

    ConnectedPath


    @Cassandra_Villegas->@Tonia_Mueller

    @Cassandra_Villegas->@Tonia_Mueller->@Lynn_Escobar

    @Cassandra_Villegas->@Willie_Charles

    ```


    Trace the connections on Figure [8-2](#508094_1_En_8_Chapter.xhtml#Fig2) and you
    will see these three people share an affinity for Aircraft Spotting and are all
    followed by `@Cassandra_Villegas`. These kind of queries are where people like
    marketers can start to hone the types of sets that let them entice you with products
    from people like you, or that you like, and share interests or purchases, maybe
    matching what you have searched for.


    These kinds of queries won’t typically go very deep into the structure because
    the farther away from the anchor node, the less interesting the suggestions would
    be. (Who hasn’t gotten a suggestion on Amazon for a product that “people like
    you” purchased that caused you to scratch your head.)'
