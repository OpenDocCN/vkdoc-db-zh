  trans: '## 总结


    在本章中，你了解了在构建非树状的有向无环图时可能遇到的一些常见问题类型。其代码与你在本书中反复使用的基础代码非常相似，这是有充分理由的。所有基于邻接表结构的图数据结构行为都相似。


    DAG 与树结构非常相似，因为你通常在结构中从父节点到子节点来查找数据。在某些方面，所有 DAG 的工作方式都类似，但在需要查看或计算所有行值的某些用例中，它们的行为差异很大。使用
    `SHORTEST_PATH` 可以做一些事情（例如查询 DAG 中的内容），但如果你不小心，查询可能会以不太明显的方式丢失信息。


    ## 8. 一个用于测试的图


    这是最后一章。在本章中，你将看到一个相当简单但常见的图示例，你可以用它来探索如何查询循环图。在下载资源中，有一个代码生成器，它能让你根据精确的尺寸需求调整示例，并查看当数据量非常大时会发生什么。


    这个工具能让你设定一个想要在典型消费级硬件或超级计算机上测试的图尺寸。该示例可以轻松适应你想要的任何大型行集。


    本章中的几乎所有技术都在前面的章节中介绍过（尤其是第 3 章），所以其中应该没有什么全新的内容，但它应该既能作为复习，也能作为构建你自己的性能测试装置的一种方式。


    ### 示例


    对于这个模型，我决定保持其非常简单。只有 `Account`, `Follows`, `InterestedIn` 和 `Interests`。图 8-1
    展示了该模型的概念数据模型。


    ![](img/508094_1_En_8_Fig1_HTML.jpg)


    数据模型流程的表示。账户和兴趣节点通过“感兴趣于”边连接。账户节点和“关注”边是循环的。


    图 8-1


    示例概念模型


    ### 创建表


    表设计延续了极简主义方法，每个节点只有一个文本列作为你将使用的自然键值。对于账户，它是 `AccountHandle`（在数据中格式为 `@ + 名称`。）


    ```sql

    CREATE SCHEMA SocialGraph;

    GO

    CREATE TABLE SocialGraph.Account (

    AccountHandle nvarchar(30)

    CONSTRAINT AKAccount_Handle UNIQUE,

    --在 Node_id 列上集群。大多数获取操作

    --将基于 node_id 进行，而 Handle 通常只在

    --获取第一行时使用

    CONSTRAINT PKAccount PRIMARY KEY ($node_id)

    ) AS NODE;

    ```


    请注意，本示例中 `$node_id` 伪列上有 `PRIMARY KEY` 约束。这是为了确保对图内部键的任何查找都会一并带出所有其他列。`AccountHandle`
    列上有一个 `UNIQUE` 约束，因为 1）它需要是唯一的，2）你几乎在每个示例中都会用它来查找一行或几行。


    由于表在 `$node_id` 上集群，组成该键的列也会出现在该索引的每一行中，这实质上使它们对于使用这些索引的任何查询都成为覆盖索引。


    `Follows` 边只包含 `FollowTime`。我没有在任何查询中显示它（出于空间原因），但你也可以基于边表列来筛选行。


    ```sql

    CREATE TABLE SocialGraph.Follows (

    FollowTime datetime2(0)

    CONSTRAINT DFLTFollows_FollowTime DEFAULT SYSDATETIME(),

    --不能为 $from_id 和 $to_id 列添加 PRIMARY KEY，

    --因为它们允许 NULL 值。因此使用 UNIQUE

    --CLUSTERED 索引

    CONSTRAINT AKFollows_UniqueNodes UNIQUE CLUSTERED

    ( $to_id, $from_id),

    --相同的列，顺序相反，用于当你根据 $to_id 获取时

    --例如获取关注你的人，而不是你关注的人

    CONSTRAINT AKFollows_FromTO UNIQUE ( $from_id, $to_id),

    --仅允许从账户到账户的连接

    CONSTRAINT ECFollows_AccountToAccount

    CONNECTION (SocialGraph.Account TO

    SocialGraph.Account) ON DELETE NO Action

    ) AS EDGE;

    ```


    接下来是 `Follows` 边上的一个触发器，用于确保你没有任何自引用关系。当你为测试生成数据时，拥有良好的约束是最重要的时刻之一。我个人主张在所有情况下都使用它们，但随机数据往往比用户生成的数据稍微“脏”一些。（自引用关系并不总是坏的，但在关注关系中通常是没有意义的。）


    ```sql

    CREATE TRIGGER SocialGraph.Follows_IU_Trigger ON SocialGraph.Follows

    AFTER INSERT, UPDATE

    AS

    BEGIN

    IF EXISTS (SELECT *

    FROM   inserted

    WHERE  $from_id = $to_id)

    BEGIN

    ROLLBACK;

    THROW 50000,''修改后的数据引入了自引用'',1;

    END;

    END;

    GO

    ```


    接下来，创建 `Interest` 和 `InterestedIn` 边。它们的配置与前两个对象非常相似（除了在不同对象的两个节点之间实现关系时，你不必担心自引用关系）：


    ```sql

    CREATE TABLE SocialGraph.Interest (

    InterestName nvarchar(30)

    CONSTRAINT AKInterest_InterestName UNIQUE,

    CONSTRAINT PKInterest PRIMARY KEY ($node_id)

    ) AS NODE;

    CREATE TABLE SocialGraph.InterestedIn

    (

    CONSTRAINT AKInterestedIn_UniqueNodes

    UNIQUE CLUSTERED ($from_id, $to_id),

    CONSTRAINT AKInterestedIn_ToFrom UNIQUE ($to_id, $from_id),

    CONSTRAINT ECInterestedIn_AccountToInterestBoth

    CONNECTION (SocialGraph.Account TO SocialGraph.Interest)

    ON DELETE NO ACTION

    )

    AS EDGE;

    ```


    在第 8 章的下载资源中，`0001 - Create Tables.sql` 文件里还有用于账户和兴趣的暂存表。然后有用于暂存数据的 .SQL 文件（100000
    个 `账户` 和 434 个 `兴趣`。）使用这些行，你可以将数据集的大小定制得相当大，并且你可以轻松地向暂存表中添加更多账户，从而大幅提升数量。加载文件包含
    `:SETVAR` 命令，可让你定制数据集的大小。如果你使用相同的种子，每次执行都可以得到相同的数据集。（关于生成可重复数据集的更多细节，我写的这篇博文对此进行了介绍：[`www.red-gate.com/simple-talk/blogs/generating-repeatable-sets-of-test-rows/`](http://www.red-gate.com/simple-talk/blogs/generating-repeatable-sets-of-test-rows/)）。


    在下载地址 [`https://github.com/drsqlgithub/GraphBook1`](https://github.com/drsqlgithub/GraphBook1)
    中，出版后的一段时间，将会提供实现其他几种测试数据集的工具，包括一个基于 IMDB 数据的数据集，如果你想要一个真正庞大且真实的数据集的话。拥有数百万个节点和连接，其规模可能带来管理挑战，但这是一个有趣的数据集。'
- fmt: '### Loading the Data


    In this section, I want to briefly explain how to load the random data. In the
    Chapter [8](#508094_1_En_8_Chapter.xhtml) downloads, there are two files that
    are used to load random data sets. Each of them has a number of `:SETVAR` commands
    to create `SQLCMD` variables. The first one loads the data into the table to implement
    the data like you see in Figure [8-2](#508094_1_En_8_Chapter.xhtml#Fig2).


    ![](images/508094_1_En_8_Chapter/508094_1_En_8_Fig2_HTML.jpg)


    A network diagram with people of diverse interests connected through shared interests
    and social connections. Interests are, Airsoft, Airsofting, Acting, 3 D printing,
    Aircraft Spotting, Airbrushing, Aeromodeling, and Air sports connected to 5 accounts.


    Figure 8-2


    Graph diagram for chapter’s sample queries


    The darker shaded (or yellow if you have the eBook) nodes are the `Account` nodes,
    and the unshaded are `Interest` nodes (still unshaded in the eBook!). I generated
    this data using the following parameters:


    ```

    :SETVAR SeedValue 259906607

    --Max 100000

    :SETVAR AccountCount 5

    --Max 434

    :SETVAR InterestCount 8

    :SETVAR FollowsCount 20

    :SETVAR MaxInterestPerAccount 8

    ```


    If you use the same `SeedValue` and the same parameters, every time you run the
    queries in that file, you get the same output. If you change the values, you get
    different outcomes. I suggest that generally, if you are going to change values,
    change the seed value also. Otherwise, your data may include similarities that
    confuse you test to test.


    In terms of follows and interests, the `AccountCount` and `InterestCount` values
    tune the number of nodes. The `FollowsCount` tells you how many `Follows` edge
    rows will be created, and `MaxInterestPerAccount` tunes how many `Interests` are
    possible per account. If that value is 10, then every account will have between
    0 and 10 interests.


    If you just execute the entire batch in the random data scripts, there are several
    bits of output that are useful to get a feel for the dataset. For example, one
    output is the following (I removed the `$node_id` column from the output for clarity):


    ```

    AccountHandle                  Froms       Tos

    ------------------------------ ----------- -----------

    @Cassandra_Villegas            3           0

    @Tonia_Mueller                 2           1

    @Gerald_Scott                  2           2

    @Lynn_Escobar                  1           3

    @Willie_Charles                1           3

    ```


    This lets you see that there are three accounts where `@Cassandra_Villegas` is
    following other accounts (which makes it a nice anchor node for many of your queries).
    When I execute this query after loading the large random set, this is what the
    first five rows (of 100,000) looks like:


    ```

    AccountHandle                  Froms        Tos

    ------------------------------ ------------ ------

    @Bryant_Huber                  10           10

    @Sheila_Sherman                9            11

    @Stacy_Charles                 13           7

    @Angelica_O''Neill              7            12

    @Armando_Swanson               9            10

    ```


    This makes for quite an interesting graph to process. The downloads include a
    set of parameters that I used for the non-performance testing sections of this
    chapter that have only the few accounts that match Figure [8-1](#508094_1_En_8_Chapter.xhtml#Fig1).


    ### The Queries


    In the following sections, I go through a procession of queries that you will
    likely want to do on highly connected data in a cyclic graph. These are also the
    queries in the test rig that get executed to test the data structures with considerably
    larger amounts of data.


    #### Find Every Node That Is Connected to a Specific Node


    In Figure [8-1](#508094_1_En_8_Chapter.xhtml#Fig1), you can see a couple of interesting
    relationships. `@Cassandra_Villegas` is connected directly to three other accounts
    and the other account node that exists through all the other paths. In the following
    query, you can see this:


    ```

    --1 In Test Rig (corresponds to query in the test rig file that

    --can be used to run all the queries using parameters you

    --want to try out

    --item that the searched for item is connected to

    SELECT LAST_VALUE(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS ConnectedToAccountHandle,

    --how far away in structure

    COUNT(Account2.AccountHandle)

    WITHIN GROUP (GRAPH PATH) AS LEVEL,

    --what path was taken

    STRING_AGG(Account2.AccountHandle, ''->'')

    WITHIN GROUP (GRAPH PATH) AS ConnectedPath

    FROM   SocialGraph.Account AS Account1

    ,SocialGraph.Account FOR PATH AS Account2

    ,SocialGraph.Follows FOR PATH AS Follows

    WHERE  MATCH(SHORTEST_PATH(Account1(-(Follows)->Account2)+))

    AND  Account1.AccountHandle = ''@Cassandra_Villegas''

    ORDER BY ConnectedPath

    OPTION (MAXDOP 1); --larger datasets can cause queries using

    --MATCH and especially SHORTEST_PATH to spin constantly

    --when parallellism occurs.

    ```


    As you have seen in many results in the book so far, `@Lynn_Escobar` only shows
    up once because `SHORTEST_PATH` only gives you one path. Looking at Figure [8-2](#508094_1_En_8_Chapter.xhtml#Fig2),
    there is more than one connection between the nodes.


    ```

    ConnectedToAccountHandle  LEVEL  ConnectedPath

    ------------------------- ------ -------------------------------

    @Gerald_Scott             1      @Gerald_Scott

    @Tonia_Mueller            1      @Tonia_Mueller

    @Lynn_Escobar             2      @Tonia_Mueller->@Lynn_Escobar

    @Willie_Charles           1      @Willie_Charles

    ```


    Later in the chapter I will demonstrate how to fetch all the paths, which is similar
    to how it was done in Chapter [7](#508094_1_En_7_Chapter.xhtml), but slightly
    different for a cyclical data structure. However, this will typically be useful
    more when you have two nodes you already know connect and now want to see what
    ways they connect.


    For example, say `@Cassandra_Villegas` is trying to sell something to `@Lynn_Escobar`.
    If they don’t want to go through `@Tonia_Mueller` for some reason, looking at
    all the paths might be useful. For very large graphs (especially when you aren’t
    trying to see what your system can handle), it is a good idea to change the `+`
    in the `MATCH(SHORTEST_PATH)` condition to something smaller than everything.
    In a highly connected graph, you could easily be connected to almost everyone.
    (It would be interesting to see if everyone is connected to everyone else on LinkedIn,
    for example, certainly at 100 levels away.)


    In almost every case, knowing that one user is connected to another by twenty
    or fifty node walks is of no realistic value in any scenario I can think of, even
    academically.


    Note that I added `OPTION (MAXDOP 1)` to the query. This is one of the primary
    things you may need to do when tuning queries using SQL Server graph. Even in
    SQL Server 2022 there can be issues with performance when `SHORTEST_PATH` queries
    access a lot of rows. Obviously, in the first half of this chapter, the data sizes
    are small, but when you try queries that access larger numbers of rows (a script
    to load this schema with considerable amounts of data is included in the download),
    some queries can run for 24 hours and not make progress without `MAXDOP 1`.


    Of all the advice provided in the book, this tip is something to check on if you
    are using a version later than SQL Server 2022.'
  raw: '### Loading the Data


    In this section, I want to briefly explain how to load the random data. In the
