    the internal values you see when you execute this code.


    Next, you are going to add your first leaf node. To make the whole example simpler,
    I only put sale data on root nodes. This is also a very reasonable expectation
    to have in the real world for many situations. It does not really affect the outcome
    if sale data was appended to the non-root nodes either, but it would be very typical
    for the stores or salespersons to have sales, but the region to only have sales
    based on the stores or salespersons.


    ```

    EXEC SqlGraph.Company$Insert @Name = ''Nashville Branch'',

    @ParentCompanyName = ''Tennessee HQ'';

    EXEC SqlGraph.Sale$InsertTestData @Name = ''Nashville Branch'';

    ```


    After executing that code, you can see the sale data inserted here:


    ```

    SELECT *

    FROM   SqlGraph.Sale;

    ```


