    in the Chapter [7](#508094_1_En_7_Chapter.xhtml) file named `0001-CreateObjects.sql`.
    The data is loaded using the `0002-LoadData.sql` file.


    This query shows the data in the system after executing the queries in the aforementioned
    files:


    ```

    SELECT *

    FROM   PartsSystem_UI.Part_Includes_Part;

    ```


    This returns the following data (which matches Figure [7-5](#508094_1_En_7_Chapter.xhtml#Fig5)):


    ```

    PartName                 IncludeCount IncludesPartName

    ------------------------ ------------ -------------------------

    Shelvii                  3            Shelf Set

    Shelvii                  2            Flat Shelf

    Shelvii                  5            Small Wooden Dowel Pack

    Shelvii                  2            Shelvii Side

    Shelvii                  2            Small Screw Pack

    Shelf Set                2            Shelvii Shelf Enhancer

    Shelf Set                1            Flat Shelf

    Shelf Set                3            Small Screw Pack

    Small Screw Pack         3            Small Screw

    Small Wooden Dowel Pack  3            Wooden Dowel

    ```


    In the rest of the chapter, you will implement several of the types of queries
    you will typically want to do with a bill of materials:


    *   Determining if a part is used in a build


    *   Picking items for a certain build like the screws for the Screw Pack or shelves
    for the Shelf Set


    *   Printing and summing out the parts list for a build'
  trans: '

    ## 示例


    在本章中，你将实现一个非常简单的物料清单（重复出现时缩写为 BOM）。此示例展示了一个你可能从最喜爱的肉丸供应商（这个参考对示例本身没有意义，但如果你知道，你就知道）购买的简单货架系统。


    一个看起来巨大的整体货架，实际上是由大约 1000 个零件包装而成。其中一些零件在货架的多个区域被重复使用。从螺丝、木钉到货架板和玻璃板，所包含的零件中存在重复是非常普遍的。任何可以在产品之间重复使用的部件都会被重复使用。


    ![](img/508094_1_En_7_Fig3_HTML.jpg)


    一张树状图展示了“谢尔维”货架系统的组件和组装过程，其中包括一个货架套件、一个平板货架、一个带木螺丝的木钉包以及一个谢尔维侧板。货架套件包含一个货架增强器、一个小螺丝包和平板货架。每个小螺丝包包含小螺丝。


    ### 图 7-3 虚构的谢尔维货架系统分解图


    在图 7-3 中，我绘制了我称之为“谢尔维”的树状表示图。请注意，结构中找到的名称存在一些重复，因为`小螺丝包`和`小螺丝`节点出现了不止一次。存在一些作为整个产品系统关键值的标识符，因为像`木钉包`这样的东西很可能也出现在其他产品中，比如“塔布里”系统，并且可能包含不同尺寸的钉包。这个例子的复杂程度仅够展示基本问题。将其推广到多个产品、产品线等并不困难。


    主系统中还有一个重复的`平板货架`。思路是相同的`平板货架`用于顶部和底部，只是不需要货架增强器，所以它是独立的。同时请注意，在此讨论中我完全忽略了包装。只包括了构成货架的部件，我忽略了诸如该部件是否也可以单独销售等细节。


    在不将此变成模块化家具设计文章的前提下，我希望能包含一个相对现实的示例，因为有一些你几乎肯定想对此数据执行的操作，它们不像树结构那样简单。在图 7-4 中，我重新建模了这个图，并将相同的节点合并成一个有向无环图。在第一张图中，有两个`小螺丝包`节点；现在只有一个节点，但有两个关系连接到那个节点。


    ![](img/508094_1_En_7_Fig4_HTML.jpg)


    一张结构图展示了谢尔维的组件，包括货架套件、平板货架、小螺丝包、木钉包和谢尔维侧板。货架套件包含货架增强器、平板货架和小螺丝包。小螺丝包包含小螺丝，木钉包包含木钉。


    ### 图 7-4 表示结构中物品重用的有向无环图


    现在这个图显示，`谢尔维`节点和`货架套件`节点都是`小螺丝包`节点的父节点。这告诉需要取用这些物品的人员，如果他们一次性组装整个产品，需要取（至少）两个`小螺丝包`袋子。


    我看到有流程为每个节点创建匹配的包装。因此，有存放`货架增强器`、`平板货架`、`小螺丝`、`木钉`和`谢尔维侧板`的料箱。向上查看列表，还有流程来包装`货架套件`、`小螺丝包`和`木钉包`，并且还有更多的料箱来存放它们。其中一些包装可能用于不同的货架系统，有些则不。如果一个系统需要
    20 个小螺丝，另一个需要 2 个，那么就会有不止一种`小螺丝包`规格。为了简洁起见，请在我的示例中给我一定的余地以保持其简单。


    最后，为了完成设置，我们需要数量。在图 7-5 中，我添加了每个货架系统所需每种物品的数量。


    ![](img/508094_1_En_7_Fig5_HTML.jpg)


    一张结构图展示了谢尔维的组件，包括 3 个货架套件、2 个平板货架、2 个小螺丝包、5 个木钉包和 2 个谢尔维侧板。货架套件包含 2 个货架增强器、1 个平板货架和
    3 个小螺丝包。小螺丝包包含 3 个小螺丝，木钉包包含 3 个木钉。


    ### 图 7-5 谢尔维项目的完整图示


    在本章的下载资料中，我包含了此结构的典型对象以及用于构建节点表和边表的查询。我只保留了表示有向无环图所需的必要数据。有一个`PartsSystem.Part`节点表（带有一个防止循环的触发器）和一个`PartsSystem.Includes`边表。我还包含了一个接口视图，这样你就可以使用简单的`INSERT`、`UPDATE`和`DELETE`语句来操作数据。


    这个边有一个`IncludeCount`列。我还构建了一个`PartsSystem_UI`模式，使我们能够非常容易地插入新的`Parts`关系（如第 4 章所述）。所有这些代码都在下载资料中，位于第
    7 章的名为`0001-CreateObjects.sql`的文件中。数据使用`0002-LoadData.sql`文件加载。


    以下查询显示了在执行上述文件中的查询后系统中的数据：


    ```

    SELECT *

    FROM   PartsSystem_UI.Part_Includes_Part;

    ```


    这返回以下数据（与图 7-5 匹配）：


    ```

    PartName                 IncludeCount IncludesPartName

    ------------------------ ------------ -------------------------

    Shelvii                  3            Shelf Set

    Shelvii                  2            Flat Shelf

    Shelvii                  5            Small Wooden Dowel Pack

    Shelvii                  2            Shelvii Side

    Shelvii                  2            Small Screw Pack

    Shelf Set                2            Shelvii Shelf Enhancer

    Shelf Set                1            Flat Shelf

    Shelf Set                3            Small Screw Pack

    Small Screw Pack         3            Small Screw

    Small Wooden Dowel Pack  3            Wooden Dowel

    ```


    在本章的剩余部分，你将实现几种通常需要对物料清单执行的查询类型：


    *   确定某个部件是否用于构建中


    *   为某个构建挑选物品，例如螺丝包的螺丝或货架套件的货架板


    *   打印并汇总构建的零件清单

    '
- fmt: '## Determining If a Part Is Used in a Build


    This one of the tasks that is straightforward to do using a `SHORTEST_PATH` query.
    Since all you are trying to do is see what parts are used, you only need them
    to show up once in the list. So, you can do the following query that simply uses
    `SHORTEST_PATH`:


    ```sql

    --the item that is connected. Will be unique

    SELECT LAST_VALUE(IncludesPart.PartName)

    WITHIN GROUP (GRAPH PATH) AS ConnectedItem,

    --show us the path that got us this connection

    STRING_AGG(IncludesPart.PartName, ''->'') WITHIN GROUP

    (GRAPH PATH) AS Path

    FROM   PartsSystem.Part AS Part,

    PartsSystem.Includes FOR PATH AS Includes,

    PartsSystem.Part FOR PATH AS IncludesPart

    WHERE  Part.PartName = ''Shelvii''

    AND   MATCH(SHORTEST_PATH(Part(-(Includes)->IncludesPart)+))

    ORDER BY ConnectedItem;

    ```


    I include it in the output to show which path was chosen for curiosity only. Realistically,
    you don''t really need the path in this output because what you want are the parts
    that made up the Shelvii system.


    ```text

    ConnectedItem            Path

    ------------------------ -------------------------------------

    Flat Shelf               Flat Shelf

    Shelf Set                Shelf Set

    Shelvii Shelf Enhancer   Shelf Set->Shelvii Shelf Enhancer

    Shelvii Side             Shelvii Side

    Small Screw              Small Screw Pack->Small Screw

    Small Screw Pack         Small Screw Pack

    Small Wooden Dowel Pack  Small Wooden Dowel Pack

    Wooden Dowel             Small Wooden Dowel Pack->Wooden Dowel

    ```


    One thing to note is that you have only sort of answered the question. This query
    provides you with the entire list, including containers. The Shelf Set is actually
    not a physical thing; it is a set of physical things that you must gather (plus
    a carton, but as previously noted, we''re ignoring that in this example). Whether
    this matters is based on your point of view.


    ```sql

    WITH BaseRows AS

    (

    SELECT LAST_VALUE(IncludesPart.PartName)

    WITHIN GROUP (GRAPH PATH) AS ConnectedItem,

    STRING_AGG(IncludesPart.PartName, ''->'')

    WITHIN GROUP (GRAPH PATH) AS Path,

    --capture the node_id so we can eliminate the non-leafs

    LAST_VALUE(IncludesPart.$node_id)

    WITHIN GROUP (GRAPH PATH) AS ConnectedItemNodeId

    FROM   PartsSystem.Part AS Part,

    PartsSystem.Includes FOR PATH AS Includes,

    PartsSystem.Part FOR PATH AS IncludesPart

    WHERE  Part.PartName = ''Shelvii''

    AND MATCH(SHORTEST_PATH(Part(-(Includes)->IncludesPart)+))

    )

    --filter rows where the node is parent in the structure

    SELECT ConnectedItem, Path

    FROM BaseRows

    WHERE NOT EXISTS (SELECT *

    FROM   PartsSystem.Includes

    WHERE  $from_id = ConnectedItemNodeId)

    ORDER BY ConnectedItem;

    ```


    This now only returns


    ```text

    ConnectedItem            Path

    ------------------------ --------------------------------------

    Flat Shelf               Flat Shelf

    Shelvii Shelf Enhancer   Shelf Set->Shelvii Shelf Enhancer

    Shelvii Side             Shelvii Side

    Small Screw              Small Screw Pack->Small Screw

    Wooden Dowel             Small Wooden Dowel Pack->Wooden Dowel

    ```


    Look back at Figure [7-5](#508094_1_En_7_Chapter.xhtml#Fig5) and you will see
    that the leaf nodes do in fact show up in this query and this should represent
    the raw materials types you need to put together a Shelvii kit.


    You can start the processing at any level in the object too. Start at the Shelf
    Set by changing the line to filter the Shelf Set instead of Shelvii:


    ```sql

    WHERE  Part.PartName = ''Shelf Set'':

    ```


    Now you will see that it just has the three rows:


    ```text

    ConnectedItem       Path

    ------------------- ----------------------------------

    Flat Shelf          Flat Shelf

    Shelf Enchancer     Shelf Enchancer

    Small Screw         Small Screw Pack->Small Screw

    ```


    ## Picking Items for a Build


    Now let''s go the other direction. You now don''t care what makes up each part
    physically; you want to assemble or package a shelf. You are given some number
    of a given packages to build, and somewhere there is a picklist (which tells you
    what to go pick from the shelves).


    The picklist query **should** be quite simple because you need only go one level
    down the tree to get the data to output. So, if you are grabbing the parts to
    put together a Shelvii, you just need to go fetch the parts (bundled or raw) that
    make it up:


    ```sql

    SELECT IncludesPart.PartName, Includes.IncludeCount

    FROM   PartsSystem.Part AS Part,

    PartsSystem.Includes AS Includes,

    PartsSystem.Part AS IncludesPart

    WHERE  Part.PartName = ''Shelvii''

    AND MATCH(Part-(Includes)->IncludesPart);

    ```


    This returns


    ```text

    PartName                  IncludeCount

    ------------------------  ------------

    Shelf Set                 3

    Flat Shelf                2

    Small Wooden Dowl Pack    5

    Shelvii Side              2

    Small Screw Pack          2

    ```


    The idea of a build like this is that the Shelf Set and packs of fasteners are
    already packaged in another process (to streamline the packaging process). Obviously,
    this is tedious job, but it''s faster than having to put together each package
    before assembling the entire package. If you have multiple orders that all need
    Small Screw Packs, ideally you make up that many Small Screw Packs. The you move
    on to Shelf Sets (which include the Small Screw Packs) and so on.


    So, you take this list (with the bin locations and other bits of data you might
    need that I did not include for this chapter), go grab the pieces you need, and
    put them in the package you are building, just like someone did earlier with the
    Small Screw Pack:


    ```sql

    SELECT IncludesPart.PartName, Includes.IncludeCount

    FROM   PartsSystem.Part AS Part,

    PartsSystem.Includes AS Includes,

    PartsSystem.Part AS IncludesPart

    WHERE  Part.PartName = ''Small Screw Pack''

    AND MATCH(Part-(Includes)->IncludesPart);

    ```


    This returns the following:


    ```text

    PartName                       IncludeCount

    ------------------------------ ------------

    Small Screw                    3

    ```


    In the next section, you will use that `IncludeCount` column to determine how
    many screws it take to put together your entire shelf.'
