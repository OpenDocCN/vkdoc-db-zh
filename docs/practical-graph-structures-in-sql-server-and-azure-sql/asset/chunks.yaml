- fmt: "# 层次结构路径方法\n\n## 返回层次结构\n\n使用 `Path` 方法返回层次结构主要涉及格式化输出，因为路径已经存储其中：\n\n```sql\n\
    CREATE OR ALTER FUNCTION PathMethod.Company$ReturnHierarchy\n@CompanyName varchar(20)\n\
    RETURNS @Output TABLE (CompanyId int, Name varchar(20),\nLevel int, Hierarchy\
    \ nvarchar(4000),\nIdHierarchy nvarchar(4000),\nHierarchyDisplay nvarchar(4000))\n\
    AS\nBEGIN\nDECLARE @CompanyId int,\n@CompanyPath varchar(12),\n@CompanyPathReplace\
    \ varchar(12)\n--get the CompanyId and path for the item you want\n--to get the\
    \ child rows of\nSELECT @CompanyId = CompanyId,\n@CompanyPath = CONCAT('\\',CompanyId,'\\\
    '),\n@CompanyPathReplace = Path --used for formatting\n--output without prefix\n\
    FROM   PathMethod.Company\nWHERE  Name = @CompanyName;\nWITH BaseRows AS\n(\n\
    --get the child rows using the simple like expression\n--to get child rows whose\
    \ path startw with the parent\nSELECT CompanyId, Name,\n--make the path look like\
    \ it starts at searched node\nREPLACE(path,@CompanyPathReplace,@CompanyPath)\n\
    AS IdHierarchy\nFROM   PathMethod.Company\nWHERE  Path LIKE @CompanyPathReplace\
    \ + '%'\n)\n--output the rows\nINSERT INTO @Output\n(\nCompanyId,\nName,\nLevel,\n\
    Hierarchy,\nIdHierarchy,\nHierarchyDisplay\n)\nSELECT Baserows.CompanyId, BaseRows.Name,\n\
    LEN(IdHierarchy)\n- LEN(REPLACE(BaseRows.IdHierarchy,'\\',''))-1 AS Level,\n'Not\
    \ feasible', --This can be done with a replace,\n--create this in your insert\
    \ if essential\nBaseRows.IdHierarchy,\n--put in the arrows for the simple output\n\
    REPLICATE('--> ',LEN(IdHierarchy) -\nLEN(REPLACE(BaseRows.IdHierarchy,'\\',''))-2)\
    \ + Name\nAS HierarchyDisplay\nFROM BaseRows;\nRETURN;\nEND;\n```\n\n## 检查子节点\n\
    \n检查一个节点是否是另一个节点的子节点是一个非常清晰的过程。你只需要查看两个项目在同一路径中的位置。因此，要查看公司1是否是公司5的父节点，你只需要找到看起来像\
    \ `'%\\1\\5%'` 或 `'%\\1\\%\\5\\%'` 的行。很酷的一点是，仅凭两个路径值你就可以判断它是否是子节点，因为父节点的路径将是任何子节点行路径的一部分。\n\
    \n```sql\nCREATE OR ALTER FUNCTION PathMethod.Company$CheckForChild\n(\n@CompanyName\
    \ varchar(20),\n@CheckForChildOfCompanyName varchar(20)\n)\nRETURNS Bit\nAS\n\
    BEGIN\nDECLARE @output bit = 0;\n--get the companyId of the item passed in\nDECLARE\
    \ @CompanyPath varchar(1700)\nSELECT  @CompanyPath = Path\nFROM   PathMethod.Company\n\
    WHERE  Name = @CompanyName;\n--get the company id for the child\nDECLARE @CheckForChildOfCompanyPath\
    \ varchar(1700)\nSELECT  @CheckForChildOfCompanyPath = Path\nFROM   PathMethod.Company\n\
    WHERE  Name = @CheckForChildOfCompanyName;\n--IF the item IS A child OF the company\
    \ TO check, the\n--path will include parent company. No need to go back to\n--the\
    \ table.\nIF REPLACE(@CompanyPath,@CheckForChildOfCompanyPath, '') \n<> @CompanyPath\n\
    SET @output = 1;\nRETURN @output;\nEND;\n```\n\n## 报告销售数据\n\n最后是聚合对象。这与 SQL Graph\
    \ 示例的工作原理非常相似，但有一些将在代码中介绍的重要区别。\n\n```sql\nCREATE OR ALTER  PROCEDURE [PathMethod].[Company$ReportSales]\n\
    (\n@DisplayFromNodeName varchar(20)\n)\nAS\nBEGIN\n--take the expanded Hierarchy...\n\
    WITH ExpandedHierarchy\nAS (SELECT Company.CompanyId AS ParentCompanyId,\nChildRows.CompanyId\
    \ AS ChildCompanyId\n--join the table to itself finding rows that match\n--the\
    \ path with the wildcard in a LIKE\nFROM   PathMethod.Company\nJOIN PathMethod.Company\
    \ AS ChildRows\n--note that this being % means the row will\n--match itself in\
    \ the join.\nON ChildRows.Path LIKE Company.Path + '%'\n),\n--add in the formatting\
    \ code and filter\nFilterAndSweeten AS (\nSELECT ExpandedHierarchy.*,\nCompanyHierarchyDisplay.IdHierarchy,\n\
    CompanyHierarchyDisplay.HierarchyDisplay\nFROM  ExpandedHierarchy\n--The return\
    \ hierarchy function gives us the\n--companyId to join with\nJOIN  PathMethod.[Company$ReturnHierarchy]\n\
    (@DisplayFromNodeName) AS CompanyHierarchyDisplay\nON CompanyHierarchyDisplay.CompanyId\
    \ =\nExpandedHierarchy.ParentCompanyId\n)\n,\n--get totals for each Company for\
    \ the aggregate\nCompanyTotals AS\n(\nSELECT CompanyId, SUM(Amount) AS TotalAmount\n\
    FROM   PathMethod.Sale\nGROUP BY CompanyId\n),\n--aggregate each Company for the\
    \ Company\nAggregations AS (\nSELECT FilterAndSweeten.ParentCompanyId,\nSUM(CompanyTotals.TotalAmount)\
    \ AS TotalSalesAmount,\nMAX(FilterAndSweeten.IdHierarchy) AS IdHierarchy,\nMAX(FilterAndSweeten.HierarchyDisplay)\n\
    AS HierarchyDisplay\nFROM   FilterAndSweeten\nLEFT JOIN CompanyTotals\nON CompanyTotals.CompanyId\
    \ =\nFilterAndSweeten.ChildCompanyId\nGROUP  BY FilterAndSweeten.ParentCompanyId)\n\
    --display the data...\nSELECT Company.CompanyId, Company.Name,\nAggregations.TotalSalesAmount,\n\
    Aggregations.HierarchyDisplay\nFROM   PathMethod.Company\nJOIN Aggregations\n\
    ON Company.CompanyID = Aggregations.ParentCompanyID\nORDER BY Aggregations.IdHierarchy\n\
    END;\n```\n\n这段代码与第5章中的 SQL Graph 方法的主要区别在于这个块：\n\n```sql\n--join the table to\
    \ itself finding rows that match\n--the path with the wildcard in a LIKE\nFROM\
    \   PathMethod.Company\nJOIN PathMethod.Company AS ChildRows\n--note that this\
    \ being % means the row will\n--match itself in the join.\nON ChildRows.Path LIKE\
    \ Company.Path + '%'\n```\n\n这非常酷，因为你将第一组行（表中的每一行）与自身基于模式进行连接。\n\n> 注意\n>\n> 在第6章名为\
    \ `1301-PathMethod-Extended.sql` 的文件中，我实现了 `reparent` 和 `delete` 过程。"
  raw: "##### Return Hierarchy\n\nReturning the hierarchy with the path method is\
    \ more or less just a matter of formatting the output since the path is already\
    \ stored:\n\n```\nCREATE OR ALTER FUNCTION PathMethod.Company$ReturnHierarchy\n\
    @CompanyName varchar(20)\nRETURNS @Output TABLE (CompanyId int Name varchar(20),\n\
    Level int, Hierarchy nvarchar(4000),\nIdHierarchy nvarchar(4000),\nHierarchyDisplay\
    \ nvarchar(4000))\nAS\nBEGIN\nDECLARE @CompanyId int,\n@CompanyPath varchar(12),\n\
    @CompanyPathReplace varchar(12)\n--get the CompanyId and path for the item you\
    \ want\n--to get the child rows of\nSELECT @CompanyId = CompanyId,\n@CompanyPath\
    \ = CONCAT('\\',CompanyId,'\\'),\n@CompanyPathReplace = Path --used for formatting\n\
    --output without prefix\nFROM   PathMethod.Company\nWHERE  Name = @CompanyName;\n\
    WITH BaseRows AS\n(\n--get the child rows using the simple like expression\n--to\
    \ get child rows whose path startw with the parent\nSELECT CompanyId, Name,\n\
    --make the path look like it starts at searched node\nREPLACE(path,@CompanyPathReplace,@CompanyPath)\n\
    AS IdHierarchy\nFROM   PathMethod.Company\nWHERE  Path LIKE @CompanyPathReplace\
    \ + '%'\n)\n--output the rows\nINSERT INTO @Output\n(\nCompanyId,\nName,\nLevel,\n\
    Hierarchy,\nIdHierarchy,\nhierarchyDisplay\n)\nSELECT Baserows.CompanyId, BaseRows.Name,\n\
    LEN(IdHierarchy)\n- LEN(REPLACE(BaseRows.IdHierarchy,'\\',''))-1 AS Level,\n'Not\
    \ feasible', --This can be done with a replace,\n--create this in your insert\
    \ if essential\nBaseRows.IdHierarchy,\n--put in the arrows for the simple output\n\
    REPLICATE('--> ',LEN(IdHierarchy) -\nLEN(REPLACE(BaseRows.IdHierarchy,'\\',''))-2)\
    \ + Name\nAS HieararchyDisplay\nFROM BaseRows;\nRETURN;\nEND;\n```\n\n##### Check\
    \ For Child\n\nChecking to see if a node is a child of another is a very clean\
    \ process. You simply have to look to see where the two items are located in the\
    \ same path. So, to see if company 1 is the parent to company 5, you simply need\
    \ to find the row that looks like either ‘`%\\1\\5%`’ or `'%\\1\\%\\5\\%'`. What\
    \ is kind of cool is that you can decide if it is a child with just the two path\
    \ values because the parent’s path will a part of any child row’s path.\n\n```\n\
    CREATE OR ALTER FUNCTION PathMethod.Company$CheckForChild\n(\n@CompanyName varchar(20),\n\
    @CheckForChildOfCompanyName varchar(20)\n)\nRETURNS Bit\nAS\nBEGIN\nDECLARE @output\
    \ bit = 0;\n--get the companyId of the item passed in\nDECLARE @CompanyPath varchar(1700)\n\
    SELECT  @CompanyPath = Path\nFROM   PathMethod.Company\nWHERE  Name = @CompanyName;\n\
    --get the company id for the child\nDECLARE @CheckForChildOfCompanyPath varchar(1700)\n\
    SELECT  @CheckForChildOfCompanyPath = Path\nFROM   PathMethod.Company\nWHERE \
    \ Name = @CheckForChildOfCompanyName;\n--IF the item IS A child OF the company\
    \ TO check, the\n--path will include parent company. No need to go back to\n--the\
    \ table.\nIF REPLACE(@CompanyPath,@CheckForChildOfCompanyPath, '') \n@CompanyPath\n\
    SET @output = 1;\nRETURN @output;\nEND;\n```\n\n##### Report Sales\n\nFinally,\
    \ the aggregation object. This works just like the SQL Graph example with a few\
    \ important differences that will be covered in the code.\n\n```\nCREATE OR ALTER\
    \  PROCEDURE [PathMethod].[Company$ReportSales]\n(\n@DisplayFromNodeName varchar(20)\n\
    )\nAS\nBEGIN\n--take the expanded Hierarchy...\nWITH ExpandedHierarchy\nAS (SELECT\
    \ Company.CompanyId AS ParentCompanyId,\nChildRows.CompanyId AS ChildCompanyId\n\
    --join the table to itself finding rows that match\n--the path with the wildcard\
    \ in a LIKE\nFROM   PathMethod.Company\nJOIN PathMethod.Company AS ChildRows\n\
    --note that this being % means the row will\n--match itself in the join.\nON ChildRows.Path\
    \ LIKE Company.Path + '%'\n),\n--add in the formatting code and filter\nFilterAndSweeten\
    \ AS (\nSELECT ExpandedHierarchy.*,\nCompanyHierarchyDisplay.IdHierarchy,\nCompanyHierarchyDisplay.HierarchyDisplay\n\
    FROM  ExpandedHierarchy\n--The return hierarchy function gives us the\n--companyId\
    \ to join with\nJOIN  PathMethod.[Company$ReturnHierarchy]\n(@DisplayFromNodeName)\
    \ AS CompanyHierarchyDisplay\nON CompanyHierarchyDisplay.CompanyId =\nExpandedHierarchy.ParentCompanyId\n\
    )\n,\n--get totals for each Company for the aggregate\nCompanyTotals AS\n(\nSELECT\
    \ CompanyId, SUM(Amount) AS TotalAmount\nFROM   PathMethod.Sale\nGROUP BY CompanyId\n\
    ),\n--aggregate each Company for the Company\nAggregations AS (\nSELECT FilterAndSweeten.ParentCompanyId,\n\
    SUM(CompanyTotals.TotalAmount) AS TotalSalesAmount,\nMAX(FilterAndSweeten.IdHierarchy)\
    \ AS IdHiearchy,\nMAX(FilterAndSweeten.HierarchyDisplay)\nAS HiearachyDisplay\n\
    FROM   FilterAndSweeten\nLEFT JOIN CompanyTotals\nON CompanyTotals.CompanyId =\n\
    FilterAndSweeten.ChildCompanyId\nGROUP  BY FilterAndSweeten.ParentCompanyId)\n\
    --display the data...\nSELECT Company.CompanyId, Company.Name,\nAggregations.TotalSalesAmount,\n\
    Aggregations.HiearachyDisplay\nFROM   PathMethod.Company\nJOIN Aggregations\n\
    ON Company.CompanyID = Aggregations.ParentCompanyID\nORDER BY Aggregations.IdHiearchy\n\
    END;\n```\n\nThe main difference in this code and the SQL Graph method in Chapter\
    \ [5](#508094_1_En_5_Chapter.xhtml) is this block:\n\n```\n--join the table to\
    \ itself finding rows that match\n--the path with the wildcard in a LIKE\nFROM\
    \   PathMethod.Company\nJOIN PathMethod.Company AS ChildRows\n--note that this\
    \ being % means the row will\n--match itself in the join.\nON ChildRows.Path LIKE\
    \ Company.Path + '%'\n```\n\nThis is quite cool in that you join the first set\
    \ of rows (every row in the table) and join it with itself on the pattern.\n\n\
    Note\n\nIn the Chapter [6](#508094_1_En_6_Chapter.xhtml) file named `1301-PathMethod-Extended.sql`,\
    \ I implement reparent and delete procedures."
  trans: "# 层次结构路径方法\n\n## 返回层次结构\n\n使用 `Path` 方法返回层次结构主要涉及格式化输出，因为路径已经存储其中：\n\n```sql\n\
    CREATE OR ALTER FUNCTION PathMethod.Company$ReturnHierarchy\n@CompanyName varchar(20)\n\
    RETURNS @Output TABLE (CompanyId int, Name varchar(20),\nLevel int, Hierarchy\
    \ nvarchar(4000),\nIdHierarchy nvarchar(4000),\nHierarchyDisplay nvarchar(4000))\n\
    AS\nBEGIN\nDECLARE @CompanyId int,\n@CompanyPath varchar(12),\n@CompanyPathReplace\
    \ varchar(12)\n--获取你想要获取其子行的项目的 CompanyId 和路径\nSELECT @CompanyId = CompanyId,\n\
    @CompanyPath = CONCAT('\\',CompanyId,'\\'),\n@CompanyPathReplace = Path --用于格式化\n\
    --输出时不带前缀\nFROM   PathMethod.Company\nWHERE  Name = @CompanyName;\nWITH BaseRows\
    \ AS\n(\n--使用简单的 like 表达式来获取子行\n--获取路径以父节点开头的子行\nSELECT CompanyId, Name,\n--使路径看起来像是从搜索节点开始的\n\
    REPLACE(path,@CompanyPathReplace,@CompanyPath)\nAS IdHierarchy\nFROM   PathMethod.Company\n\
    WHERE  Path LIKE @CompanyPathReplace + '%'\n)\n--输出行\nINSERT INTO @Output\n(\n\
    CompanyId,\nName,\nLevel,\nHierarchy,\nIdHierarchy,\nHierarchyDisplay\n)\nSELECT\
    \ Baserows.CompanyId, BaseRows.Name,\nLEN(IdHierarchy)\n- LEN(REPLACE(BaseRows.IdHierarchy,'\\\
    ',''))-1 AS Level,\n'不可行', --可以用替换操作实现，\n--如果必需，在插入时创建这个\nBaseRows.IdHierarchy,\n\
    --为简单输出加上箭头\nREPLICATE('--> ',LEN(IdHierarchy) -\nLEN(REPLACE(BaseRows.IdHierarchy,'\\\
    ',''))-2) + Name\nAS HierarchyDisplay\nFROM BaseRows;\nRETURN;\nEND;\n```\n\n\
    ## 检查子节点\n\n检查一个节点是否是另一个节点的子节点是一个非常清晰的过程。你只需要查看两个项目在同一路径中的位置。因此，要查看公司 1 是否是公司\
    \ 5 的父节点，你只需要找到看起来像 `'%\\1\\5%'` 或 `'%\\1\\%\\5\\%'` 的行。很酷的一点是，仅凭两个路径值你就可以判断它是否是子节点，因为父节点的路径将是任何子节点行路径的一部分。\n\
    \n```sql\nCREATE OR ALTER FUNCTION PathMethod.Company$CheckForChild\n(\n@CompanyName\
    \ varchar(20),\n@CheckForChildOfCompanyName varchar(20)\n)\nRETURNS Bit\nAS\n\
    BEGIN\nDECLARE @output bit = 0;\n--获取传入项的 companyId\nDECLARE @CompanyPath varchar(1700)\n\
    SELECT  @CompanyPath = Path\nFROM   PathMethod.Company\nWHERE  Name = @CompanyName;\n\
    --获取子节点的公司 id\nDECLARE @CheckForChildOfCompanyPath varchar(1700)\nSELECT  @CheckForChildOfCompanyPath\
    \ = Path\nFROM   PathMethod.Company\nWHERE  Name = @CheckForChildOfCompanyName;\n\
    --如果该项是待检查公司的子节点，则\n--路径将包含父公司。无需返回表查询。\nIF REPLACE(@CompanyPath,@CheckForChildOfCompanyPath,\
    \ '') \n<> @CompanyPath\nSET @output = 1;\nRETURN @output;\nEND;\n```\n\n## 报告销售数据\n\
    \n最后是聚合对象。这与 SQL Graph 示例的工作原理非常相似，但有一些将在代码中介绍的重要区别。\n\n```sql\nCREATE OR ALTER\
    \  PROCEDURE [PathMethod].[Company$ReportSales]\n(\n@DisplayFromNodeName varchar(20)\n\
    )\nAS\nBEGIN\n--展开层次结构...\nWITH ExpandedHierarchy\nAS (SELECT Company.CompanyId\
    \ AS ParentCompanyId,\nChildRows.CompanyId AS ChildCompanyId\n--将表与自身连接，使用 LIKE\
    \ 中的通配符查找匹配路径的行\nFROM   PathMethod.Company\nJOIN PathMethod.Company AS ChildRows\n\
    --注意这里是 %，意味着该行将在连接中\n--匹配自身。\nON ChildRows.Path LIKE Company.Path + '%'\n),\n\
    --添加格式化代码并筛选\nFilterAndSweeten AS (\nSELECT ExpandedHierarchy.*,\nCompanyHierarchyDisplay.IdHierarchy,\n\
    CompanyHierarchyDisplay.HierarchyDisplay\nFROM  ExpandedHierarchy\n--返回层次结构函数为我们提供了\n\
    --用于连接的 companyId\nJOIN  PathMethod.[Company$ReturnHierarchy]\n(@DisplayFromNodeName)\
    \ AS CompanyHierarchyDisplay\nON CompanyHierarchyDisplay.CompanyId =\nExpandedHierarchy.ParentCompanyId\n\
    )\n,\n--获取每个公司的汇总总计\nCompanyTotals AS\n(\nSELECT CompanyId, SUM(Amount) AS TotalAmount\n\
    FROM   PathMethod.Sale\nGROUP BY CompanyId\n),\n--为公司聚合每个公司的数据\nAggregations AS\
    \ (\nSELECT FilterAndSweeten.ParentCompanyId,\nSUM(CompanyTotals.TotalAmount)\
    \ AS TotalSalesAmount,\nMAX(FilterAndSweeten.IdHierarchy) AS IdHierarchy,\nMAX(FilterAndSweeten.HierarchyDisplay)\n\
    AS HierarchyDisplay\nFROM   FilterAndSweeten\nLEFT JOIN CompanyTotals\nON CompanyTotals.CompanyId\
    \ =\nFilterAndSweeten.ChildCompanyId\nGROUP  BY FilterAndSweeten.ParentCompanyId)\n\
    --显示数据...\nSELECT Company.CompanyId, Company.Name,\nAggregations.TotalSalesAmount,\n\
    Aggregations.HierarchyDisplay\nFROM   PathMethod.Company\nJOIN Aggregations\n\
    ON Company.CompanyID = Aggregations.ParentCompanyID\nORDER BY Aggregations.IdHierarchy\n\
    END;\n```\n\n这段代码与第 5 章中的 SQL Graph 方法的主要区别在于这个块：\n\n```sql\n--将表与自身连接，使用 LIKE\
    \ 中的通配符查找匹配路径的行\nFROM   PathMethod.Company\nJOIN PathMethod.Company AS ChildRows\n\
    --注意这里是 %，意味着该行将在连接中\n--匹配自身。\nON ChildRows.Path LIKE Company.Path + '%'\n```\n\
    \n这非常酷，因为你将第一组行（表中的每一行）与自身基于模式进行连接。\n\n> 注意\n>\n> 在第 6 章名为 `1301-PathMethod-Extended.sql`\
    \ 的文件中，我实现了 `reparent` 和 `delete` 过程。"
- fmt: '### Helper Table


    One of the things that the techniques discussed so far (using SQL Graph, paths,
    and nested sets) all have in common is that when you use them, you are often processing
    rows in an iterative way or doing non-equality-based comparisons. This can sometimes
    be costly to process, especially for very large datasets. In this section, you
    are going to explore a couple of helper tables that can help to optimize the processes,
    especially when the data sets get really large and you can allow some amount of
    latency in your data processing.


    To be fair, the gist of these techniques is something I often complain about in
    my writing and family gatherings (not that anyone listens over the turkey and
    dressing), and that is `denormalization`. The idea is that some of the things
    we have calculated on the fly so far, we persist, precalculated.


    The main thing to understand is that like any denormalization that involves duplication
    of data, when the underlying data changes, you also must make sure the copies
    of the data matches that set to get proper answers to your queries. In my examples,
    I assume that you can rebuild your data set offline and do a complete rebuild
    of these copy tables. (In some cases, it may be advantageous to make your refreshes
    more targeted.)


    This refresh process can make concurrent execution difficult, so a lot will depend
    on how often your data is modified and what performance issues you run into with
    your actual usage. It’s not hard to adapt the following code to save the data
    in a staging table and merge it with the live table if desired.


    I will demonstrate building two such tables:


    -   `Kimball helper table`: This table takes the concept of the expanded hierarchy
    and instantiates it in a table. This obviously makes aggregation faster, but it
    also assists with other processes (and is a lot more obvious to a novice SQL programmer).
    As mentioned earlier in this chapter, this method is named for Ralph Kimball,
    who did a lot of great things for the data warehousing community for years.

    -   `Hierarchy display helper`: In the `FilterAndSweeten` CTEs you built as part
    of the sales summary code, you used a function to fetch the data. This table you
    will be creating will prebuild that display table. In many ways, all you are doing
    is replicating the path method table from the adjacency list, letting you manage
    your hierarchies using the simpler SQL Graph tables, and then producing a table
    that is easier to work with when querying, especially if you do any reporting
    from these objects.


    #### Kimball Helper Table


    This method is going to be relatively simple to implement because you already
    more or less created the code earlier. The method is designed for dealing with
    hierarchies in reporting systems that deal with a lot of data, in a data warehousing/read-intensive
    setting. Even though it is designed for static data (typically refreshed daily),
    it can be useful in an OLTP setting if the hierarchy does not change frequently
    and there isn’t a lot of contention with the physical resources of the table.


    Going back to the adjacency list implementation, a subgraph of the adjacency list
    implementation is shown in Figure [6-4](#508094_1_En_6_Chapter.xhtml#Fig4).


    ![](images/508094_1_En_6_Chapter/508094_1_En_6_Fig4_HTML.png)


    A hierarchical organizational structure where the Company H Q Company l d = 1,
    Reports To = NULL is at the top with 1 child company, Maine H Q Company l d =
    2, Reports To = 1 with 2 child branches Portland and Camden branch, with company
    I ds 3 and 4 respectively, with Reports To = 2.


    Figure 6-4


    Subgraph for example with values for the adjacency list technique repeated for
    the Kimball helper table method


    To implement this method, you will use a table of data that describes the hierarchy
    with one row per parent-to-child relationship for every level of the hierarchy.
    So, there is a row for `Company HQ` to `Maine HQ`, `Company HQ` to `Portland Branch`,
    and `Maine HQ` to `Portland Branch` and even one for each node, like `Portland
    Branch` to `Portland Branch` and `Company HQ` to `CompanyHQ`. The helper table
    provides the details about distance from parent to child, as well as any other
    useful information like if it is a root node or a leaf node. So, for the leftmost
    four items (`1`, `2`, `4`, `5`) in the tree, you get rows like the following table:


    | `ParentId` | `ChildId` | `Distance` | `RootNodeFlag` | `LeafRowFlag` |

    | --- | --- | --- | --- | --- |

    | `1` | `1` | `0` | `1` | `0` |

    | `1` | `2` | `1` | `0` | `0` |

    | `1` | `3` | `2` | `0` | `0` |

    | `1` | `3` | `2` | `0` | `0` |

    | `2` | `2` | `0` | `0` | `0` |

    | `2` | `3` | `1` | `0` | `1` |

    | `2` | `4` | `1` | `0` | `1` |

    | `3` | `3` | `0` | `0` | `1` |

    | `4` | `4` | `0` | `0` | `1` |


    The power of this technique is that now you can simply ask for all children of
    `1` by looking for `WHERE ParentId = 1`, or you can look for direct descendants
    of `2` by saying `WHERE ParentId = 2 and Distance = 1`. You can look for all leaf
    notes of the parent by querying `WHERE ParentId = 1 and ChildLeafNode = 1`.


    The obvious downfall of this method is that it must be maintained, and if the
    structure is modified frequently, it could not be a reasonable general-purpose
    solution. To be honest, Kimball’s purpose for the method was to optimize relational
    usage of hierarchies in the data warehouse, which are typically maintained by
    ETL and refreshed daily. For this sort of purpose, this method should be the quickest,
    because all queries will be almost completely based on simple relational queries.


    Of all the methods, this one should be the most natural for users. I have known
    of companies that used just such a solution for corporate hierarchies, for example
    for row-level security, since that data changes very rarely and latency for the
    users is of utmost importance. (This discussion of the Kimball method is borrowed
    from my `Pro SQL Server 2012 Relational Database Design and Implementation` book
    (Apress, 2012).)


    Note


    You could extend this method to any graph structure, even a cyclic graph, but
    it would get very large and complex really fast. However, depending on the size
    and utilization of the structures, it may still be of value.


    ##### Code


    This section contains the code that can be used for using the Kimball helper table.'
