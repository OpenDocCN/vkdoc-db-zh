    ## 性能比较


    到目前为止，我在本书中没有过多谈论性能，但在这里，我想测试 SQL 图设计，以及路径方法和辅助表。


    为此，我创建了五个测试数据集来生成数据。这些脚本使用了我们前两章一直使用的相同格式。有一个 `SqlGraph.SmallSet` 对象，它将该工作集复制为一个小型基线。每个脚本一次创建一行数据，并为每个叶节点创建五个销售行。这五个脚本为测试目的创建了一组可处理的行：


    | **名称** | **行数** |

    | --- | --- |

    | 小 | 8 |

    | 大 | 3400 |

    | 宽 | 55301 |

    | 深 | 42101 |

    | 巨大 | 298001 |


    如果你需要更大的数据集，下载中提供了数据生成器脚本生成器文件，你可以根据需要自定义数据集的外观。你可以调整每层大约想要的行数和层数。例如，`WideSet`
    设置为提供 5 层层级结构，而 `Deepset` 设置为提供 15 层，但又不会大或深到使脚本运行很长时间。


    我在本地测试机器上运行了这些脚本和测试，这绝不是服务器级设备，而且技术已有几年历史。（我从亚马逊购买的。标题是：*Intel NUC 9 NUC9i7QNX
    (Intel 6-Core i7-9750H, 64GB RAM, 2TB PCIe SSD, 2 x Thunderbolt, WiFi 6, HDMI,
    Win 10 Pro) Ghost Skull Canyon Extreme Gaming Box Elite*）。但它是一台强大的本地测试计算机，只运行着
    SQL Server 2022 的 RTM 版本。


    我运行测试脚本的方式是通过我的 `TestRig` 文件。数据加载完成后，我只需选择包含对象的模式，然后运行三个测试：


    1.  将所有子节点获取到临时表两次，一次从根节点，一次从另一个非根节点。

    2.  在一个语句中运行三个使用固定节点名称的子节点示例检查。

    3.  运行两次 `Report Sales`，一次针对根节点，另一次针对与获取所有子节点相同的硬编码节点值。


    那么，来看性能数字。较小的数据集通常都非常快，没有真正的区别。参见表 6-1。


    **表 6-1：不同图工具的加载时间（秒）**


    | 名称 | 行数 | SQL 图 | 路径 | 辅助表* |

    | --- | --- | --- | --- | --- |

