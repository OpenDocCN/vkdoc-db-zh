    will accept the data that is currently in the table to show how to do multiple
    tables. For the `Network.Follows` edge, you are going to allow `Network.Person`
    to `Network.Person` and then the `Network.Person` to `Network.Location` (which
    you will work to remove):


    ```

    ALTER TABLE Network.Follows

    ADD CONSTRAINT EC_Follows CONNECTION

    (Network.Person TO Network.Location,

    Network.Person TO Network.Person) ON DELETE NO ACTION;

    ```


    The `NO ACTION` setting on the `DELETE` operation means you cannot delete a related
    node in either connected table without deleting all edges that are connected.
    If you use `CASCADE` instead of `NO ACTION`, a delete of a node in either table
    would cause the edge row to be removed. (I won’t demonstrate it, but you could
    easily construct an after-trigger object that could delete an edge row only when
    the from member node (or to, if that is your requirement) was deleted and fail
    for the other item if you need very customized relationships.)


    One of the stranger things about edge constraints is that while you can have more
    than one at a time, their conditions are ANDed together. So, you can’t add conditions
    with a new edge constraint without including any data that is currently in the
    edge. And the error message you get when you try will have you scratching your
    head the first time you encounter it.


    For example, if you add this additional constraint along with the `EC_Follows`
    constraint added earlier


    ```

    ALTER TABLE Network.Follows

    ADD CONSTRAINT EC_Follows2 CONNECTION

    (Network.Person TO Network.ProgrammingLanguage)

    ON DELETE NO ACTION;

    ```


    this will return the following error message. Instinctively, this error message
    doesn’t feel true.


    ```

    Msg 547, Level 16, State 0, Line 383

    The ALTER TABLE statement conflicted with the EDGE constraint "EC_Follows2". The
    conflict occurred in database "TestGraph", table "Network.Follows".

    ```'
  trans: '

    不过，有趣的是，如果你在 `SELECT` 子句中添加 `,*` 会发生什么。这应该会返回所有列，对吧？既然你显然已经通过 `MATCH` 表达式在图键值上进行了连接，你期望能看到这些值，对吧？


    事实并非如此。你得到的唯一图细节是来自 `Network.Person` 对象的 `$node_id`。当你的对象被封装成派生表或视图对象时，你只能访问你输出的列，尽管这些列实际上可以通过
    `MATCH` 用于图查询。


    图标识符甚至可能不会在所有用法中以相同方式暴露。例如，


    ```

    SELECT Person.Name, Nodes.ObjectName, Nodes.Name,

    Nodes.$node_id

    FROM   Network.Person, Network.Follows,

    (SELECT ''Location'' as ObjectName, Name, $node_id

    FROM   Network.Person) as Nodes

    WHERE MATCH(Person-(Follows)->Nodes)

    AND Person.Name = ''Lou Iss'';

    ```


    将会抛出此错误：


    ```

    Msg 207, Level 16, State 1, Line 243

    Invalid column name ''$node_id''.

    ```


    尽管它显然在 `MATCH` 表达式中被使用了。如果你希望图标识符值成为输出的一部分，你必须为它们命名并使用该名称：


    ```

    SELECT Nodes.ObjectName, Nodes.Name,

    Nodes.NodeId

    FROM   Network.Person, Network.Follows,

    (SELECT ''Location'' AS ObjectName, Name,

    $node_id AS NodeId

    FROM   Network.Person) AS Nodes

    WHERE MATCH(Person-(Follows)->Nodes)

    AND Person.Name = ''Lou Iss'';

    ```


    这将返回


    ```

    ObjectName Name       NodeId

    ---------- ---------- ------------------------------------------

    Location   Saa Lee    {"type":"node","schema":"Network","tab...

    Location   Val Erry   {"type":"node","schema","Network","tab...

    ```


    同样，如果出于某种原因你需要，你需要在视图定义中包含所需的实现列。


    ## 完整性约束与索引


    关于构建典型的关系数据库系统，我最喜欢说的一句话是：第一、最后也是唯一真正重要的是你的数据是正确的。**快速但错误的结果比缓慢但正确的结果更糟糕**。在本节中，你将学习一些确保数据正确性的方法。当然，正确且快速显然是理想的，因此你还将看到一些需要为性能增强而添加到对象中的索引。


    ### 边约束


    到目前为止，在第 3 章和第 4 章中，我们一直非常小心地处理放入边表的数据。正如任何软件开发人员所知，灵活性既是优点也是缺点。有时作为设计者，你会认为灵活性只会被善用，但随后开始出现无意义的数据，并对用户体验（和信心）产生不良影响。


    在我的示例表中，设计并未考虑有人可能尝试将不合逻辑的数据放入表中的情况。例如，目前对于这些结构来说，说 `Lou Iss-ProgramsWith-> Here`
    或 `T-SQL-ProgramsWith->C++` 是完全可接受的。两者都是不合逻辑的语句。


    你应该已经了解的经典完整性约束（`foreign key`、`check`、`unique`、`primary key`、`default`）通常与图表配合使用，就像它们与普通关系表配合一样。（存在一些限制，例如不能在检查约束中使用图键值。）然而，由于一个边表可以有多个
    `$from_id` 和 `$end_id` 的数据来源，因此需要一种新的约束类型。它被称为**边约束**。


    边约束限制了哪些数据可以通过节点对象放入边中，包括来源和目标。例如，当你为本节同构部分构建关系时，你创建了数据，实际上是实现了关系 `Person->Follows->Location`。由于你定义的是一个人所在的位置，这种关系在语义上没有意义，因此你希望更改它，使其拥有自己的边：`LivesAt`，或
    `Person-LivesAt->Location`。进行此更改后，你将确保不能说一个人居住在某个编程语言处或关注了一个位置。在将行迁移到这个新边的过程中，你可以看到边对象可能发生的情况，以及如何将数据约束到合适的集合。


    你可以在单个边约束中定义多条数据路径。作为一个初步示例，让我们向 `Network.Follows` 边添加一个约束，该约束将接受当前表中的数据，以展示如何处理多表情况。对于
    `Network.Follows` 边，你将允许 `Network.Person` 到 `Network.Person`，然后是 `Network.Person`
    到 `Network.Location`（你将努力移除后者）：


    ```

    ALTER TABLE Network.Follows

    ADD CONSTRAINT EC_Follows CONNECTION

    (Network.Person TO Network.Location,

    Network.Person TO Network.Person) ON DELETE NO ACTION;

    ```


    `DELETE` 操作上的 `NO ACTION` 设置意味着，在不删除所有连接边的情况下，你无法删除任一连接表中的相关节点。如果你使用 `CASCADE`
    代替 `NO ACTION`，删除任一表中的节点将导致边行被移除。（我不会演示，但你可以轻松构建一个 after-trigger 对象，该对象仅在源成员节点（或目标节点，如果那是你的要求）被删除时删除边行，而对于另一项则失败，如果你需要非常定制化的关系。）


    关于边约束的一个更奇怪的事情是，虽然你可以同时拥有多个边约束，但它们的条件是 `AND` 在一起的。因此，你无法在添加新的边约束时包含条件，而不包括边中当前存在的任何数据。当你第一次遇到因此产生的错误消息时，会让你挠头不已。


    例如，如果你在之前添加的 `EC_Follows` 约束之外，再添加这个额外的约束


    ```

    ALTER TABLE Network.Follows

    ADD CONSTRAINT EC_Follows2 CONNECTION

    (Network.Person TO Network.ProgrammingLanguage)

    ON DELETE NO ACTION;

    ```


    这将返回以下错误消息。直觉上，这个错误消息感觉不真实。


    ```

    Msg 547, Level 16, State 0, Line 383

    The ALTER TABLE statement conflicted with the EDGE constraint "EC_Follows2". The
    conflict occurred in database "TestGraph", table "Network.Follows".

    ```

    '
- fmt: '# 数据库边约束管理


    ## 删除 EC_Follows 约束


    So, usually you need to include all the relationships from the previous constraint
    in the new one (which is useful when you need to make a change to a live table).
    In this demonstration, you are going to delete the `EC_Follows` constraint because
    you have data to clean up:


    ```

    ALTER TABLE Network.Follows DROP EC_Follows;

    ```


    ## 删除位置行并检查数据


    Now let’s delete one of the location rows (not needed for your ultimate goal,
    but you are doing it here to see what happens without a constraint):


    ```

    DELETE Network.Location

    WHERE Location.NAME = ''Here'';

    ```


    Looking at the data in the edge, something is odd now. Check to make sure you
    have deleted the row, and look at the `$node_id` value:


    ```

    SELECT Location.Name,$node_id

    FROM Network.Location;

    ```


    There is only the one location (I shorted the `$node_id` on the left-hand side
    so you could see the `id`, which has a value of `1)`:


    ```

    Name       $node_id_706A69FC56E046AF955F94567D088822

    ---------- ----------------------------------------------------

    There.     ...schema":"Network","table":"Location","id":1}

    ```


    ## 查询数据发现问题


    If you look at the following query


    ```

    SELECT Follows.$to_id,COUNT(*)

    FROM Network.Follows

    WHERE Follows.$to_id LIKE ''%location%''

    GROUP BY Follows.$to_id;

    ```


    instinctively you probably think that you could only have rows from the Location
    table that have an id value of `1`, because that is the only actual `id` value
    that remains.


    ```

    $to_id_EF1AB6E3676C45CDABD558C4D40746B4

    ------------------------------------------------------------- -

    {"type":"node","schema":"Network","table":"Location","id":0}  3

    {"type":"node","schema":"Network","table":"Location","id":1}  3

    ```


    You will see two rows (with `3` for the second column of both, most likely if
    you haven’t added your own data) ... since you haven’t protected against duplicates
    yet, you might have done what I did and added extras.


    You can find the offending row using a bit messier query, assuming you know the
    table you expect the issue to be from. If you have a bunch of tables, it can be
    quite a challenge! (So, use constraints to start and never have these issues!)


    ## 删除问题行


    ```

    SELECT DISTINCT OBJECT_SCHEMA_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$to_id)),

    OBJECT_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$to_id)),

    Follows.$to_id

    FROM Network.Follows

    WHERE Follows.$to_id NOT IN --check to see values that don''t

    --exist in the node tables

    (

    SELECT Person.$node_id

    FROM Network.Person

    UNION ALL

    SELECT ProgrammingLanguage.$node_id

    FROM Network.ProgrammingLanguage

    UNION ALL

    SELECT $node_id

    FROM Network.Location

    );

    ```


    This will tell you the object where the key values come from and the key value
    so you can delete the edge rows where you have an issue, like this one:


    ```

    DELETE Network.Follows

    WHERE  Follows.$to_id = ''{"type":"node","schema":"Network","table":"Location","id":0}'';

    ```


    ## 重新添加约束并使用 CASCADE


    Now let’s put the edge constraint back on with the two tables, but this time with
    `CASCADE`:


    ```

    ALTER TABLE Network.Follows

    ADD CONSTRAINT EC_Follows CONNECTION

    (Network.Person TO Network.Location,

    Network.Person TO Network.Person)

    ON DELETE CASCADE;

    ```


    Using the following query, you will see the number of rows from each table that
    is referenced in the `Network.Follows` edge:


    ```

    SELECT

    OBJECT_SCHEMA_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$to_id)),

    OBJECT_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$to_id)),

    COUNT(*)

    FROM Network.Follows

    GROUP BY OBJECT_SCHEMA_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$to_id)),

    OBJECT_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$to_id));

    ```


    In my version of the table, I have 11 references to `Network.Person` and 3 to
    `Network.Location`. Now just delete the `Network.Location` rows and the rows will
    be gone from the edge:


    ```

    DELETE FROM Network.Location;

    ```


    The output shows 1 row affected, but if you run the previous `SELECT` statement
    again, in my database there are 10 `Network.Person` rows in the `Network.Follows`
    table. So now you can change the constraint:


    ## 改变约束为 NO ACTION


    ```

    ALTER TABLE Network.Follows

    ADD CONSTRAINT EC_Follows CONNECTION

    (Network.Person TO Network.Person)

    ON DELETE CASCADE;

    ```


    I set it to `NO ACTION` because I typically prefer to delete the rows manually
    rather than have them just automatically go away. Many database coding mistakes
    have been exacerbated by using `CASCADE` functionality!


    ## 创建新表 LivesAt 并添加数据


    Next, create a new edge for the `Network.Person` to `Network.Location` relationship
    with an edge constraint to prevent any data other than associating a person to
    a location:


    ```

    CREATE TABLE Network.LivesAt

    (

    CONSTRAINT EC_LivesAt CONNECTION

    (Network.Person TO Network.Location)

    ) AS EDGE;

    ```


    ```

    INSERT INTO Network.Location

    (

    NAME

    )

    VALUES

    (''Here''),

    (''There'');

    ```


    ## 恢复数据以匹配模型


    Finally, add back the data to restore the data to match the model in Figure [4-2](#508094_1_En_4_Chapter.xhtml#Fig2):


    ```

    WITH Here

    AS (SELECT Person.$node_id AS node_id

    FROM Network.Person

    WHERE Person.NAME IN ( ''Fred Rick'', ''Lou Iss'', ''Joe Seph'' ))

    INSERT INTO Network.LivesAt

    (

    $from_id,

    $to_id

    )

    SELECT Here.node_id,

    Location.$node_id

    FROM Here

    CROSS JOIN Network.Location

    WHERE Location.NAME = ''Here'';

    ```


    ```

    WITH Here

    AS (SELECT Person.$node_id AS node_id

    FROM Network.Person

    WHERE Person.NAME IN (''Saa Lee'', ''Lee Roy'', ''Day Vid'' ))

    INSERT INTO Network.LivesAt

    (

    $from_id,

    $to_id

    )

    SELECT Here.node_id,

    Location.$node_id

    FROM Here

    CROSS JOIN Network.Location

    WHERE Location.NAME = ''There'';

    ```


    Now the data matches the diagram.'
