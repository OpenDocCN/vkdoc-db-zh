    ```


    #### Finding All Paths Between Nodes


    The following code is about as messy as it gets in this book. The basic query
    pattern will be repeated a few times in later chapters because it is an essential
    skill. But it absolutely is messy to do.


    The idea is that you implement the basic query that Microsoft has built using
    `SHORTEST_PATH`, but with a twist. You don’t stop processing for anything except
    a cycle in the structure.


    Using the current graph, if you want to find all the paths between two nodes,
    you can use the following code. I include comments in the code where useful to
    point out how the code works. But the idea is that using a recursive CTE, you
    keep iterating on the set using a breadth-first algorithm, but you keep every
    branch of the output, even when you find the node in the query. You filter the
    output later in the process.


    ```

    --fetch the starting point

    DECLARE @FirstName NVARCHAR(100) = N''Lou'';

    DECLARE @LastName NVARCHAR(100) = N''Iss'';

    --filter for the ending point

    DECLARE @ToFirstName NVARCHAR(100) = N''Lee'';

    DECLARE @ToLastName NVARCHAR(100) = N''Roy'';

    --for larger graphs, this may be need to

    --stop excessive recursion

    DECLARE @MaxLevel INT =10;

    WITH BaseRows

    AS (

    --the CTE anchor is just the starting node

    SELECT Person.PersonId,

    Person.PersonId AS FollowsPersonId,

    Person.Name,

    --the path that contains the readable path we have

    --built in all examples with the anchor included

    CAST(Person.Name AS NVARCHAR(4000)) AS Path,

    --this path is use to stop loops. If the personId is

    --found in the path already, then the recursion

    --will stop

    CAST(CONCAT(''\'', Person.PersonId, ''\'')

    AS VARCHAR(8000)) AS IdPath,

    0 AS level --the level

    FROM Network.Person

    WHERE Person.FirstName = @FirstName --Here’s where you filter

    AND Person.LastName = @LastName --the anchor

    UNION ALL

    --pretty typical 1 level graph query:

    SELECT Person.PersonId AS PersonId,

    FollowedPerson.PersonId AS FollowsPersonId,

    FollowedPerson.Name,

    BaseRows.Path + ''>'' + FollowedPerson.Name,

    BaseRows.IdPath +

    CAST(FollowedPerson.PersonId AS VARCHAR(10)) + ''\'',

    BaseRows.level + 1

    FROM Network.Person,

    Network.Follows,

    Network.Person AS FollowedPerson,

    BaseRows

    WHERE MATCH(Person-(Follows)->FollowedPerson)

    --this joins the anchor to the recursive part of the query

    AND BaseRows.FollowsPersonId = Person.PersonId

    --this is the part that stops recursion, treating the

    --string value like an array

    AND NOT BaseRows.IdPath LIKE CONCAT(''%\'',

    FollowedPerson.PersonId, ''\%'')

    AND BaseRows.level <= @MaxLevel)

    SELECT BaseRows.Path

    FROM BaseRows

    WHERE BaseRows.Name = ''Lee Roy'';

    ```


    The output of this query is (I manually added a number to correspond to Figure
    [3-11](#508094_1_En_3_Chapter.xhtml#Fig11))


    ![](images/508094_1_En_3_Chapter/508094_1_En_3_Fig11_HTML.jpg)


    A graphical structure. Val Erry links Lee Roy and Joe Seph, Fred Rick links Joe
    Seph, Val Erry, and Lou Iss. Joe Seph, Lou Iss, and Day Vid link Saa Lee. Saa
    Lee links Fred Rick and Lee Roy. All paths have additional numbered arrows, except
    Day Vid to Saa Lee, and Fred Rick to Joe Seph and Lou Iss.


    Figure 3-11


    Tracing the paths from Lou Iss to Lee Roy in the sample graph


    ```

    Path


    1 Lou Iss>Val Erry>Lee Roy

    2 Lou Iss>Val Erry>Joe Seph>Saa Lee>Lee Roy

    3 Lou Iss>Saa Lee>Lee Roy

    4 Lou Iss>Saa Lee>Fred Rick>Val Erry>Lee Roy

    ```


    You can trace the various paths on Figure [3-11](#508094_1_En_3_Chapter.xhtml#Fig11).


    Even in this fairly small example, you can see that what would be one result found
    in two iteration steps has expanded to four, with an extra step.


    This sort of solution will be necessary if your user wants to answer questions
    like, is there a path between `Lou Iss` and `Lee Roy` that also includes `Fred
    Rick`? There is no trivial way to answer this question in most cyclic graphs because
    the structure is entirely unpredictable. For a directed graph, it could be easier
    (and far easier for a tree), but if you need to be very specific in your path,
    expect that processing is going to be more complicated.'
  trans: '#### 过滤特定路径


    在公共表表达式（`CTE`）中需要处理多个过滤器。其中一个你可能会经常使用的，就是过滤出你正在寻找的那条路径。例如，假设你想查看从 `Lou Iss` 到
    `Lee Roy` 的路径。你可以将锚点节点表过滤到只剩一行，即 `Lou Iss` 那一行。基础查询被放入一个非递归的 `CTE` 中，然后你在 `CTE`
    内部的查询中过滤起始点，在外部查询中过滤你希望看到匹配结果的行：


    ```sql

    WITH BaseRows AS (

    SELECT LAST_VALUE(FollowedPerson.Name) WITHIN GROUP (GRAPH PATH)

    AS ConnectedPerson,

    STRING_AGG(FollowedPerson.Name, ''->'') WITHIN GROUP

    (GRAPH PATH) AS Path

    FROM   Network.Person AS Person,

    Network.Follows FOR PATH AS Follows,

    Network.Person FOR PATH AS FollowedPerson

    WHERE  Person.FirstName = ''Lou''

    AND Person.LastName = ''Iss''

    AND MATCH(

    SHORTEST_PATH(Person(-(Follows)->FollowedPerson){1,3}))

    )

    SELECT Path

    FROM   BaseRows

    WHERE ConnectedPerson = ''Lee Roy'';

    --在生产代码中，这里可能应该使用代理键或名字组成部分

    ```


    此查询的输出仅仅是 `Lou Iss` 到 `Lee Roy` 的路径，该路径经过了 `Saa Lee`：


    ```sql

    Path


    Saa Lee->Lee Roy

    ```


    #### 查找节点间的所有路径


    接下来的代码可能是本书中最复杂的。这种基本的查询模式在后面的章节中会重复出现几次，因为它是一项必备技能。但实现起来确实非常复杂。


    其思路是，你实现 Microsoft 使用 `SHORTEST_PATH` 构建的基本查询模式，但稍作改动。除了结构中出现循环的情况外，你不会因任何其他原因而停止处理。


    使用当前的图，如果你想找出两个节点之间的所有路径，可以使用下面的代码。我在代码中加入了一些有用的注释，来指出代码的工作原理。但核心思想是，使用一个递归的 `CTE`，你通过一种广度优先算法不断迭代集合，但你会保留输出的每一个分支，即使你已经找到了查询中的目标节点。你稍后再对输出进行过滤。


    ```sql

    --获取起始点

    DECLARE @FirstName NVARCHAR(100) = N''Lou'';

    DECLARE @LastName NVARCHAR(100) = N''Iss'';

    --过滤终点

    DECLARE @ToFirstName NVARCHAR(100) = N''Lee'';

    DECLARE @ToLastName NVARCHAR(100) = N''Roy'';

    --对于较大的图，这可能需要设置以防止过度递归

    DECLARE @MaxLevel INT =10;

    WITH BaseRows

    AS (

    --CTE 锚点只是起始节点

    SELECT Person.PersonId,

    Person.PersonId AS FollowsPersonId,

    Person.Name,

    --包含我们已在所有示例中构建的可读路径，锚点包含在内

    CAST(Person.Name AS NVARCHAR(4000)) AS Path,

    --此路径用于阻止循环。如果路径中已经找到该 PersonId，则递归将停止

    CAST(CONCAT(''\'', Person.PersonId, ''\'')

    AS VARCHAR(8000)) AS IdPath,

    0 AS level --层级

    FROM Network.Person

    WHERE Person.FirstName = @FirstName --在这里过滤锚点

    AND Person.LastName = @LastName

    UNION ALL

    --非常典型的一层图查询：

    SELECT Person.PersonId AS PersonId,

    FollowedPerson.PersonId AS FollowsPersonId,

    FollowedPerson.Name,

    BaseRows.Path + ''>'' + FollowedPerson.Name,

    BaseRows.IdPath +

    CAST(FollowedPerson.PersonId AS VARCHAR(10)) + ''\'',

    BaseRows.level + 1

    FROM Network.Person,

    Network.Follows,

    Network.Person AS FollowedPerson,

    BaseRows

    WHERE MATCH(Person-(Follows)->FollowedPerson)

    --这将锚点连接到查询的递归部分

    AND BaseRows.FollowsPersonId = Person.PersonId

    --这是阻止递归的部分，将字符串值视为数组处理

    AND NOT BaseRows.IdPath LIKE CONCAT(''%\'',

    FollowedPerson.PersonId, ''\%'')

    AND BaseRows.level <= @MaxLevel)

    SELECT BaseRows.Path

    FROM BaseRows

    WHERE BaseRows.Name = ''Lee Roy'';

    ```


    此查询的输出如下（我手动添加了编号以对应图 3-11）


    ![](img/508094_1_En_3_Fig11_HTML.jpg)


    一个图形结构。`Val Erry` 链接了 `Lee Roy` 和 `Joe Seph`，`Fred Rick` 链接了 `Joe Seph`、`Val Erry`
    和 `Lou Iss`。`Joe Seph`、`Lou Iss` 和 `Day Vid` 链接了 `Saa Lee`。`Saa Lee` 链接了 `Fred
    Rick` 和 `Lee Roy`。除了 `Day Vid` 到 `Saa Lee`，以及 `Fred Rick` 到 `Joe Seph` 和 `Lou
    Iss` 的路径外，所有路径都有额外的编号箭头。


    图 3-11


    在示例图中追踪从 `Lou Iss` 到 `Lee Roy` 的路径


    ```sql

    Path


    1 Lou Iss>Val Erry>Lee Roy

    2 Lou Iss>Val Erry>Joe Seph>Saa Lee>Lee Roy

    3 Lou Iss>Saa Lee>Lee Roy

    4 Lou Iss>Saa Lee>Fred Rick>Val Erry>Lee Roy

    ```


    你可以在图 3-11 上追踪这些不同的路径。


    即使在这个相当小的例子中，你也能看到，原本可能在两个迭代步骤中找到的一个结果，现在扩展到了四个，还多了一个步骤。


    如果你的用户想要回答诸如“是否存在一条从 `Lou Iss` 到 `Lee Roy` 的路径，同时包含 `Fred Rick`？”这样的问题，这种解决方案将是必要的。在大多数循环图中，没有简单的方法来回答这个问题，因为其结构完全不可预测。对于有向图，可能会更容易一些（对于树结构则容易得多），但如果你需要非常具体地指定路径，那么处理过程预计会更加复杂。'
- fmt: "## Weighted Graph Calculations\n\nIn the previous section, you looked at finding\
    \ all the paths between two nodes. This is essential to the process of doing weighted\
    \ graph calculations. For the example code in this chapter, you simply use the\
    \ graph we created with the values that were established (all the values were\
    \ 1 for simplicity).\n\nIn the following code, I highlight how it differs from\
    \ the query in the previous section, “Finding All Paths Between Nodes:”\n\n```sql\n\
    DECLARE @FirstName NVARCHAR(100) = N'Lou';\nDECLARE @LastName NVARCHAR(100) =\
    \ N'Iss';\nDECLARE @ToFirstName NVARCHAR(100) = N'Lee';\nDECLARE @ToLastName NVARCHAR(100)\
    \ = N'Roy';\nDECLARE @MaxLevel INT = 10;\nWITH BaseRows\nAS (SELECT Person.PersonId,\n\
    \    Person.PersonId AS FollowsPersonId,\n    Person.Name,\n    CAST(Person.Name\
    \ AS NVARCHAR(4000)) AS Path,\n    CAST(CONCAT('\\', Person.PersonId, '\\') AS\
    \ VARCHAR(8000)) AS IdPath,\n    0 AS level,\n    0 AS WeightedCost, --edge sums\n\
    \    Person.Value AS NodeSum --node sums\nFROM Network.Person\nWHERE Person.FirstName\
    \ = @FirstName\nAND Person.LastName = @LastName\nUNION ALL\nSELECT Person.PersonId\
    \ AS PersonId,\n    FollowedPerson.PersonId AS FollowsPersonId,\n    FollowedPerson.Name,\n\
    \    BaseRows.Path + '>' + FollowedPerson.Name,\n    BaseRows.IdPath + CAST(FollowedPerson.PersonId\
    \ AS VARCHAR(10)) + '\\',\n    BaseRows.level + 1,\n    --add the values in each\
    \ iteration\n    --Edge Values (1 less value than nodes)\n    BaseRows.WeightedCost\
    \ + Follows.Value,\n    --Nodes, including anchor\n    BaseRows.NodeSum + FollowedPerson.Value\n\
    FROM Network.Person,\n    Network.Follows,\n    Network.Person AS FollowedPerson,\n\
    \    BaseRows\nWHERE MATCH(Person-(Follows)->FollowedPerson)\nAND BaseRows.FollowsPersonId\
    \ = Person.PersonId\nAND NOT BaseRows.IdPath LIKE CONCAT('%\\', FollowedPerson.PersonId,\
    \ '\\%')\nAND BaseRows.level < 10)\nSELECT BaseRows.Path,\n    BaseRows.WeightedCost,\n\
    \    BaseRows.NodeSum\nFROM BaseRows\nWHERE BaseRows.Name = 'Lee Roy';\n```\n\n\
    The output of this query is\n\n```\nPath                                     \
    \    WeightedCost NodeSum\n-------------------------------------------- ------------\
    \ -------\nLou Iss>Val Erry>Lee Roy                     2            3\nLou Iss>Val\
    \ Erry>Joe Seph>Saa Lee>Lee Roy    4            5\nLou Iss>Saa Lee>Lee Roy   \
    \                   2            3\nLou Iss>Saa Lee>Fred Rick>Val Erry>Lee Roy\
    \   4            5\n```\n\nSince every node and edge had a value of 1, you can\
    \ see the costs and sum are basically the same as a count of nodes and edges that\
    \ were touched processing the path. If you want to do different aggregates, you\
    \ need to create that code yourself. So, for an average, keep the sum and count\
    \ to do the average in the output query. For a `MIN`- or `MAX`-like output, you\
    \ need to compare the value in every iteration.\n\nWith this table, you could\
    \ easily alter the query to get the cheapest or most expensive path using a `TOP\
    \ 1` (or `TOP 1 WITH TIES` if you want to see all the items that tied). So, say\
    \ you want the shortest paths, you can change the query using the CTE to\n\n```sql\n\
    SELECT TOP 1 WITH TIES BaseRows.Path,\n    BaseRows.WeightedCost,\n    BaseRows.NodeSum\n\
    FROM   BaseRows\nWHERE  BaseRows.Name = 'Lee Roy'\nORDER BY BaseRows.WeightedCost\
    \ ASC;\n```\n\nYou results would be just the first two line of the results of\
    \ the previous query.\n\n## Checking Conditions on the Matched Item\n\nFinding\
    \ all the nodes that you can find a path to is just the first step in a lot of\
    \ queries. Sometimes you want to find all the people that you connect with on\
    \ some level that has some characteristic.\n\nAs an example, say `Lou Iss` is\
    \ looking for someone they are connected with who programs in `C++`. You can do\
    \ this in two steps, get everyone that `Lou Iss` is connected to and then take\
    \ those items (maybe in a temp table or CTE) and find their matches in the `ProgramsWith`\
    \ edge. Figure [3-12](#508094_1_En_3_Chapter.xhtml#Fig12) shows this, with boxes\
    \ around the nodes that `Lou Iss` has a connection to on some level, and then\
    \ indicated the one node that has a connection to `C++`.\n\n![](images/508094_1_En_3_Chapter/508094_1_En_3_Fig12_HTML.jpg)\n\
    \nA graph of persons names Val Erry, Lee Roy, Day Vid, Joe Seph, Lou Iss, Fred\
    \ Rick, and Saa Lee interlinked with each other. Joe Seph links with additional\
    \ arrow to C + +, Val Erry, Saa Lee, and Lee Roy to Fortran, and Val Erry, Lou\
    \ Iss, Lee Roy, and Day Vid to T S Q L programming language.\n\nFigure 3-12\n\n\
    Nodes in the graph that have a relationship to Lou Iss and also to C++\n\nUsing\
    \ the `LAST_NODE` extension on the `MATCH` syntax, you can do that in one (relatively)\
    \ simple query. In the following query, I highlighted the syntax that lets us\
    \ take the nodes returned by the shortest path and then connect them to `ProgrammingLanguage`\
    \ nodes:\n\n```sql\nSELECT  LAST_VALUE(FollowedPerson.Name)\n        WITHIN GROUP\
    \ (GRAPH PATH) AS ConnectedPerson,\n        STRING_AGG(FollowedPerson.Name, '->')\n\
    \        WITHIN GROUP (GRAPH PATH) AS Path\nFROM   Network.Person AS Person,\n\
    \       Network.Follows FOR PATH AS Follows,\n       Network.Person FOR PATH AS\
    \ FollowedPerson,\n       Network.ProgramsWith AS ProgramsWith,\n       Network.ProgrammingLanguage\n\
    WHERE  Person.FirstName = 'Lou'\nAND Person.LastName = 'Iss'\nAND MATCH(SHORTEST_PATH(Person(-(Follows)->FollowedPerson)+)\n\
    \       --Note, this is valid syntax. The -> can be on a\n       --different line\n\
    \       AND LAST_NODE(FollowedPerson)-(ProgramsWith)\n       ->ProgrammingLanguage)\n\
    AND ProgrammingLanguage.NAME = 'C++';\n```\n\nThis returns\n\n```\nConnectedPerson\
    \   Path\n----------------- -----------------------\nJoe Seph          Val Erry->Joe\
    \ Seph\n```\n\nNote a few things. First, even though `Network.ProgramsWith` and\
    \ `Network.ProgrammingLanguage` are used in the query with `SHORTEST_PATH` and\
    \ they are not the anchor table, you do not use `FOR PATH` because their part\
    \ of the query does not use the path. Putting `FOR PATH` behind either of the\
    \ programming objects will result in an error such as\n\n```\nMsg 13949, Level\
    \ 16, State 2, Line 929\nThe table name or alias 'ProgramsWith' was marked as\
    \ FOR PATH but was not used in the recursive section of a SHORTEST_PATH clause.\n\
    ```\n\nThe `LAST_NODE` graph function gives you a reference to the graph structures\
    \ in the last node of the `SHORTEST_PATH`. It is similar to `LAST_VALUE`, but\
    \ node gives you a reference instead of a value. From there you can look for matches,\
    \ and you can design some complex queries to answer some very complex questions\
    \ for your users.\n\n## Summary\n\nIn this chapter, you looked at the basics of\
    \ the syntax to create and query data in SQL Server’s graph tables. There are\
    \ many differences and similarities to typical relational tables, but there are\
    \ a lot of differences that you need to know to use these objects.\n\nYou learned\
    \ about creating the objects and then how to load new data in the tables in the\
    \ simplest manner. In the next chapter, I will extend both of these topics, including\
    \ how to protect your objects from bad data and ways to make loading data easier.\n\
    \nAfter creating some data, you looked at most of the syntax needed to query the\
    \ data in your graph tables. The syntax centers on the `MATCH` expression along\
    \ with the `SHORTEST_PATH` extension for querying for data at multiple levels\
    \ in the graph.\n\nAll of these topics are fundamental to most of the graphs you\
    \ will be creating and querying throughout the book."
  raw: '#### Weighted Graph Calculations


    In the previous section, you looked at finding all the paths between two nodes.
    This is essential to the process of doing weighted graph calculations. For the
    example code in this chapter, you simply use the graph we created with the values
    that were established (all the values were 1 for simplicity).


    In the following code, I highlight how it differs from the query in the previous
    section, “Finding All Paths Between Nodes:”


    ```

    DECLARE @FirstName NVARCHAR(100) = N''Lou'';

    DECLARE @LastName NVARCHAR(100) = N''Iss'';

    DECLARE @ToFirstName NVARCHAR(100) = N''Lee'';

    DECLARE @ToLastName NVARCHAR(100) = N''Roy'';

    DECLARE @MaxLevel INT = 10;

    WITH BaseRows

    AS (SELECT Person.PersonId,

    Person.PersonId AS FollowsPersonId,

    Person.Name,

    CAST(Person.Name AS NVARCHAR(4000)) AS Path,

    CAST(CONCAT(''\'', Person.PersonId, ''\'') AS VARCHAR(8000)) AS IdPath,

    0 AS level,

    0 AS WeightedCost, --edge sums

    Person.Value AS NodeSum --node sums

    FROM Network.Person

    WHERE Person.FirstName = @FirstName

    AND Person.LastName = @LastName

    UNION ALL

    SELECT Person.PersonId AS PersonId,

    FollowedPerson.PersonId AS FollowsPersonId,

    FollowedPerson.Name,

    BaseRows.Path + ''>'' + FollowedPerson.Name,

    BaseRows.IdPath + CAST(FollowedPerson.PersonId AS VARCHAR(10)) + ''\'',

    BaseRows.level + 1,

    --add the values in each iteration

    --Edge Values (1 less value than nodes)

    BaseRows.WeightedCost + Follows.Value,

    --Nodes, including anchor

    BaseRows.NodeSum + FollowedPerson.Value

    FROM Network.Person,

    Network.Follows,

    Network.Person AS FollowedPerson,

    BaseRows

    WHERE MATCH(Person-(Follows)->FollowedPerson)

    AND BaseRows.FollowsPersonId = Person.PersonId

    AND NOT BaseRows.IdPath LIKE CONCAT(''%\'', FollowedPerson.PersonId, ''\%'')

    AND BaseRows.level < 10)

    SELECT BaseRows.Path,

    BaseRows.WeightedCost,

    BaseRows.NodeSum

    FROM BaseRows

    WHERE BaseRows.Name = ''Lee Roy'';

    ```


    The output of this query is


    ```

    Path                                         WeightedCost NodeSum

    -------------------------------------------- ------------ -------

    Lou Iss>Val Erry>Lee Roy                     2            3

    Lou Iss>Val Erry>Joe Seph>Saa Lee>Lee Roy    4            5

    Lou Iss>Saa Lee>Lee Roy                      2            3

    Lou Iss>Saa Lee>Fred Rick>Val Erry>Lee Roy   4            5

    ```


    Since every node and edge had a value of 1, you can see the costs and sum are
    basically the same as a count of nodes and edges that were touched processing
    the path. If you want to do different aggregates, you need to create that code
    yourself. So, for an average, keep the sum and count to do the average in the
    output query. For a `MIN-` or `MAX`-like output, you need to compare the value
    in every iteration.


    With this table, you could easily alter the query to get the cheapest or most
    expensive path using a `TOP 1` (or `TOP 1 WITH TIES` if you want to see all the
    items that tied). So, say you want the shortest paths, you can change the query
    using the CTE to


    ```

    SELECT TOP 1 WITH TIES BaseRows.Path,

    BaseRows.WeightedCost,

    BaseRows.NodeSum

    FROM   BaseRows

    WHERE  BaseRows.Name = ''Lee Roy''

    ORDER BY BaseRows.WeightedCost ASC;

    ```


    You results would be just the first two line of the results of the previous query.


    #### Checking Conditions on the Matched Item


    Finding all the nodes that you can find a path to is just the first step in a
    lot of queries. Sometimes you want to find all the people that you connect with
    on some level that has some characteristic.


    As an example, say `Lou Iss` is looking for someone they are connected with who
    programs in `C++`. You can do this in two steps, get everyone that `Lou Iss` is
    connected to and then take those items (maybe in a temp table or CTE) and find
    their matches in the `ProgramsWith` edge. Figure [3-12](#508094_1_En_3_Chapter.xhtml#Fig12)
    shows this, with boxes around the nodes that `Lou Iss` has a connection to on
    some level, and then indicated the one node that has a connection to `C++`.


    ![](images/508094_1_En_3_Chapter/508094_1_En_3_Fig12_HTML.jpg)


    A graph of persons names Val Erry, Lee Roy, Day Vid, Joe Seph, Lou Iss, Fred Rick,
    and Saa Lee interlinked with each other. Joe Seph links with additional arrow
    to C + +, Val Erry, Saa Lee, and Lee Roy to Fortran, and Val Erry, Lou Iss, Lee
    Roy, and Day Vid to T S Q L programming language.


    Figure 3-12


    Nodes in the graph that have a relationship to Lou Iss and also to C++


    Using the `LAST_NODE` extension on the `MATCH` syntax, you can do that in one
    (relatively) simple query. In the following query, I highlighted the syntax that
    lets us take the nodes returned by the shortest path and then connect them to
    ProgrammingLanguage nodes:


    ```

    SELECT  LAST_VALUE(FollowedPerson.Name)

    WITHIN GROUP (GRAPH PATH) AS ConnectedPerson,

    STRING_AGG(FollowedPerson.Name, ''->'')

    WITHIN GROUP (GRAPH PATH) AS Path

    FROM   Network.Person AS Person,

    Network.Follows FOR PATH AS Follows,

    Network.Person FOR PATH AS FollowedPerson,

    Network.ProgramsWith AS ProgramsWith,

    Network.ProgrammingLanguage

    WHERE  Person.FirstName = ''Lou''

    AND Person.LastName = ''Iss''

    AND MATCH(SHORTEST_PATH(Person(-(Follows)->FollowedPerson)+)

    --Note, this is valid syntax. The -> can be on a

    --different line

    AND LAST_NODE(FollowedPerson)-(ProgramsWith)

    ->ProgrammingLanguage)

    AND ProgrammingLanguage.NAME = ''C++'';

    ```


    This returns


    ```

    ConnectedPerson   Path

    ----------------- -----------------------

    Joe Seph          Val Erry->Joe Seph

    ```


    Note a few things. First, even though `Network.ProgramsWith` and `Network.ProgrammingLanguage`
    are used in the query with `SHORTEST_PATH` and they are not the anchor table,
    you do not use `FOR PATH` because their part of the query does not use the path.
    Putting `FOR PATH` behind either of the programming objects will result in an
    error such as


    ```

    Msg 13949, Level 16, State 2, Line 929

    The table name or alias ''ProgramsWith'' was marked as FOR PATH but was not used
    in the recursive section of a SHORTEST_PATH clause.

    ```


    The `LAST_NODE` graph function gives you a reference to the graph structures in
    the last node of the `SHORTEST_PATH`. It is similar to `LAST_VALUE`, but node
    gives you a reference instead of a value. From there you can look for matches,
    and you can design some complex queries to answer some very complex questions
    for your users.


    ## Summary


    In this chapter, you looked at the basics of the syntax to create and query data
    in SQL Server’s graph tables. There are many differences and similarities to typical
    relational tables, but there are a lot of differences that you need to know to
    use these objects.


    You learned about creating the objects and then how to load new data in the tables
    in the simplest manner. In the next chapter, I will extend both of these topics,
    including how to protect your objects from bad data and ways to make loading data
    easier.


    After creating some data, you looked at most of the syntax needed to query the
    data in your graph tables. The syntax centers on the `MATCH` expression along
    with the `SHORTEST_PATH` extension for querying for data at multiple levels in
    the graph.


    All of these topics are fundamental to most of the graphs you will be creating
    and querying throughout the book.'
  trans: "\n## 加权图计算\n\n在上一节中，你学习了查找两个节点之间所有路径的方法。这对于进行加权图计算的过程至关重要。本章的示例代码将直接使用我们已创建的图及其预设值（为简化起见，所有值均为\
    \ 1）。\n\n在以下代码中，我重点展示了它与上一节“查找节点间所有路径”查询的不同之处：\n\n```sql\nDECLARE @FirstName NVARCHAR(100)\
    \ = N'Lou';\nDECLARE @LastName NVARCHAR(100) = N'Iss';\nDECLARE @ToFirstName NVARCHAR(100)\
    \ = N'Lee';\nDECLARE @ToLastName NVARCHAR(100) = N'Roy';\nDECLARE @MaxLevel INT\
    \ = 10;\nWITH BaseRows\nAS (SELECT Person.PersonId,\n    Person.PersonId AS FollowsPersonId,\n\
    \    Person.Name,\n    CAST(Person.Name AS NVARCHAR(4000)) AS Path,\n    CAST(CONCAT('\\\
    ', Person.PersonId, '\\') AS VARCHAR(8000)) AS IdPath,\n    0 AS level,\n    0\
    \ AS WeightedCost, --边的值总和\n    Person.Value AS NodeSum --节点的值总和\nFROM Network.Person\n\
    WHERE Person.FirstName = @FirstName\nAND Person.LastName = @LastName\nUNION ALL\n\
    SELECT Person.PersonId AS PersonId,\n    FollowedPerson.PersonId AS FollowsPersonId,\n\
    \    FollowedPerson.Name,\n    BaseRows.Path + '>' + FollowedPerson.Name,\n  \
    \  BaseRows.IdPath + CAST(FollowedPerson.PersonId AS VARCHAR(10)) + '\\',\n  \
    \  BaseRows.level + 1,\n    --在每次迭代中增加值\n    --边的值（比节点数少一个值）\n    BaseRows.WeightedCost\
    \ + Follows.Value,\n    --节点，包括锚点\n    BaseRows.NodeSum + FollowedPerson.Value\n\
    FROM Network.Person,\n    Network.Follows,\n    Network.Person AS FollowedPerson,\n\
    \    BaseRows\nWHERE MATCH(Person-(Follows)->FollowedPerson)\nAND BaseRows.FollowsPersonId\
    \ = Person.PersonId\nAND NOT BaseRows.IdPath LIKE CONCAT('%\\', FollowedPerson.PersonId,\
    \ '\\%')\nAND BaseRows.level < 10)\nSELECT BaseRows.Path,\n    BaseRows.WeightedCost,\n\
    \    BaseRows.NodeSum\nFROM BaseRows\nWHERE BaseRows.Name = 'Lee Roy';\n```\n\n\
    此查询的输出结果是：\n\n```\nPath                                         WeightedCost NodeSum\n\
    -------------------------------------------- ------------ -------\nLou Iss>Val\
    \ Erry>Lee Roy                     2            3\nLou Iss>Val Erry>Joe Seph>Saa\
    \ Lee>Lee Roy    4            5\nLou Iss>Saa Lee>Lee Roy                     \
    \ 2            3\nLou Iss>Saa Lee>Fred Rick>Val Erry>Lee Roy   4            5\n\
    ```\n\n由于每个节点和边的值都是 1，你可以看到成本和总和基本上等于处理该路径时所触及的节点和边的数量。如果你想进行不同的聚合计算，需要自行编写相应的代码。例如，要计算平均值，需保留总和与计数，以便在输出查询中计算平均值。对于类似\
    \ `MIN` 或 `MAX` 的输出，你需要在每次迭代中比较该值。\n\n利用这个结果表，你可以轻松修改查询，通过 `TOP 1`（或 `TOP 1 WITH\
    \ TIES` 以查看所有并列项）来获取成本最低或最高的路径。假设你想要最短路径，可以使用 CTE 将查询更改为：\n\n```sql\nSELECT TOP\
    \ 1 WITH TIES BaseRows.Path,\n    BaseRows.WeightedCost,\n    BaseRows.NodeSum\n\
    FROM   BaseRows\nWHERE  BaseRows.Name = 'Lee Roy'\nORDER BY BaseRows.WeightedCost\
    \ ASC;\n```\n\n你的结果将只包含上一查询结果的前两行。\n\n## 对匹配项检查条件\n\n找到所有可到达的节点只是许多查询的第一步。有时，你想找到在某个层面上与你有联系、且具备某些特征的所有人。\n\
    \n举例来说，假设 `Lou Iss` 正在寻找一位与他有联系、并且使用 `C++` 编程的人。你可以分两步完成：首先获取 `Lou Iss` 连接到的所有人，然后将这些项目（可能放在临时表或\
    \ CTE 中）与 `ProgramsWith` 边中的匹配项进行查找。图 3-12 展示了这一过程，图中用方框标出了 `Lou Iss` 在某个层面有连接的所有节点，并指出了那个与\
    \ `C++` 有连接的节点。\n\n![](img/508094_1_En_3_Fig12_HTML.jpg)\n\n一个包含人名 Val Erry、Lee\
    \ Roy、Day Vid、Joe Seph、Lou Iss、Fred Rick 和 Saa Lee 的关系图，他们彼此相互连接。Joe Seph 还有一条额外的箭头指向\
    \ C++；Val Erry、Saa Lee 和 Lee Roy 指向 Fortran；Val Erry、Lou Iss、Lee Roy 和 Day Vid\
    \ 指向 TSQL 编程语言。\n\n图 3-12\n\n图中与 Lou Iss 有关系并且也与 C++ 有关系的节点\n\n使用 `MATCH` 语法上的\
    \ `LAST_NODE` 扩展，你可以通过一个（相对）简单的查询来完成此操作。在下面的查询中，我高亮显示了使我们能够获取最短路径返回的节点、然后将它们连接到\
    \ `ProgrammingLanguage` 节点的语法：\n\n```sql\nSELECT  LAST_VALUE(FollowedPerson.Name)\n\
    \        WITHIN GROUP (GRAPH PATH) AS ConnectedPerson,\n        STRING_AGG(FollowedPerson.Name,\
    \ '->')\n        WITHIN GROUP (GRAPH PATH) AS Path\nFROM   Network.Person AS Person,\n\
    \       Network.Follows FOR PATH AS Follows,\n       Network.Person FOR PATH AS\
    \ FollowedPerson,\n       Network.ProgramsWith AS ProgramsWith,\n       Network.ProgrammingLanguage\n\
    WHERE  Person.FirstName = 'Lou'\nAND Person.LastName = 'Iss'\nAND MATCH(SHORTEST_PATH(Person(-(Follows)->FollowedPerson)+)\n\
    \       --注意，这是有效的语法。-> 可以位于不同行\n       AND LAST_NODE(FollowedPerson)-(ProgramsWith)\n\
    \       ->ProgrammingLanguage)\nAND ProgrammingLanguage.NAME = 'C++';\n```\n\n\
    这会返回：\n\n```\nConnectedPerson   Path\n----------------- -----------------------\n\
    Joe Seph          Val Erry->Joe Seph\n```\n\n请注意几点。首先，尽管 `Network.ProgramsWith`\
    \ 和 `Network.ProgrammingLanguage` 在带有 `SHORTEST_PATH` 的查询中被使用，并且它们不是锚点表，但你并不需要使用\
    \ `FOR PATH`，因为它们在查询中不涉及路径部分。如果在任一编程对象后面加上 `FOR PATH`，将会导致错误，例如：\n\n```\nMsg 13949,\
    \ Level 16, State 2, Line 929\nThe table name or alias 'ProgramsWith' was marked\
    \ as FOR PATH but was not used in the recursive section of a SHORTEST_PATH clause.\n\
    ```\n\n`LAST_NODE` 图函数为你提供对 `SHORTEST_PATH` 最后一个节点中图结构的引用。它类似于 `LAST_VALUE`，但\
    \ `node` 给你的是一个引用而不是值。从那里，你可以查找匹配项，并且可以设计一些复杂的查询来为你的用户解答非常复杂的问题。\n\n## 总结\n\n\
    在本章中，你学习了在 SQL Server 的图表中创建和查询数据的基本语法。它们与典型的关系表有许多异同点，但要使用这些对象，你需要了解其中的许多差异。\n\
    \n你学习了如何创建对象，然后以最简单的方式向表中加载新数据。在下一章中，我将扩展这两个主题，包括如何保护你的对象免受不良数据影响，以及使数据加载更简便的方法。\n\
    \n在创建了一些数据之后，你学习了查询图中数据所需的大部分语法。该语法以 `MATCH` 表达式为核心，并包含用于查询图中多层级数据的 `SHORTEST_PATH`\
    \ 扩展。\n\n所有这些主题都是本书中你将要创建和查询的大多数图的基础。\n"
- fmt: '# 4. SQL Graph Tables: Extended Topics


    在第[3](#508094_1_En_3_Chapter.xhtml)章中，我介绍了使用 SQL Server 图表的基本知识。在很多方面，它们类似于典型的具有行和列的
    SQL Server 表，使用`SELECT`语句访问数据等。但有些部分非常不同，特别是内部图数据库的结构方式。使用伪列可能是一个新概念，除非您处理过分区（而且它们在分区中的使用不像使用`$node_id`、`$from_id`等那样面向用户）。


    在本章中，我将超越基础知识，为您提供使用约束、索引和触发器构建接口和保护数据的工具。您还将深入研究元数据，当您获取一个 SQL Server 数据库并想了解存在哪些图表以及它们的详细信息时，您通常需要检查这些元数据。


    本章的目标是完成设置所有技术，您将在本书的后半部分使用这些技术来演示如何使用 SQL Server 图对象构建有用的数据库。


    您将在本章中使用的数据库与第[3](#508094_1_En_3_Chapter.xhtml)章结束时处于相同状态。如果您是从本章开始（为了复习我将在本章中介绍的技能，下载文件中有一个名为
    [`https://github.com/Apress/practical-graph-structures`](https://github.com/Apress/practical-graph-structures)
    的备份文件，它将让您在开始本章时精确创建应有的数据库。）


    ## 高级数据创建技术


    在本节中，我将展示两种超越第[1](#508094_1_En_1_Chapter.xhtml)章所涵盖内容的技术。如果您正在构建一次加载多行数据的接口，这些技术将帮助您以更快的方式将数据加载到图对象中。


    首先，我介绍一个接口层，它允许您使用表中的常规键值将数据插入到视图中。这是通过使用`INSTEAD OF`触发器对象为您完成图数据库转换工作来实现的。


    第二部分向您展示如何使用可组合的 JSON 标签直接将数据插入到图列中。这样，您可以利用已有的`id`值数据，而不是让 SQL Server 决定这些值是什么，然后再去查找它们。


    ### 构建接口层


    在上一章中，所有创建边数据的示例都遵循相同的基本模式：


    ```sql

    INSERT INTO Network.Follows($from_id, $to_id)

    --查找 $from_id

    SELECT (   SELECT Person.$node_id

    FROM   Network.Person

    WHERE  Person.FirstName = ''Fred''

    AND Person.LastName = ''Rick'') AS from_id,

    --仅用于调试时更容易查看的名称

    --查找 to_id

    (   SELECT Person.$node_id

    FROM   Network.Person

    WHERE  Person.FirstName = ''Joe''

    AND Person.LastName = ''Seph'') AS to_id;

    ```


    您在两个子查询中查找两个`$node_id`值，它们共同构成一个`$from_id`、`$to_id`对，然后插入这些值。这是在存储过程中加载单行时可能使用的模式，但如果您想加载数千行，或者想将关系数据库转换为图进行分析而没有整数键可用时，它就显得很笨重。（关于可组合
    JSON 标签的更多信息将在后面的章节中介绍。）


    #### INSERT


    在本节中，您将构建一个接口，允许您使用自然键值插入相同的数据：


    ```sql

    INSERT INTO Network.Follows (FromFirstName, FromLastName,

    ToFirstName, ToLastName)

    VALUES (''Fred'', ''Rick'',''Joe'', ''Seph)

    ```


    此方法使用带有`INSTEAD OF`触发器对象的视图对象来允许在内部完成对`$from_id`和`$to_id`的查找。


    > 注意

    > 在这些示例中，您将使用`Name`列来简化本书的代码。加载大量数据时，请始终尝试使用具有索引以便连接的值。


    对于此示例，创建另一个支持用户数据接口的架构，称为`NetworkUI`：


    ```sql

    IF SCHEMA_ID(''Network_UI'') IS NULL

    EXEC (''CREATE SCHEMA Network_UI'');

    ```


    您创建的视图将仅允许您使用一个特定键（主键或替代键）将数据从一个特定节点表插入到另一个特定节点表。因此，您需要为希望使用此技术的每个关系重复此过程。


    在您的案例中，您将通过`Network.Follows`边实现`Network.Person`与`Network.Person`之间的关系。基本视图很简单。它只是对表的查询，返回您想向用户展示的节点中的两个键值。完全根据您的需求决定是使用自然键还是代理键。唯一的要求是您向用户展示的值能够唯一标识他们可以知道值的两个行之间的关系。


    如果您希望能够使用您知道的键手动键入`INSERT`语句，请使用自然键。在此示例中，使用代理键来匹配源数据中的数据。


    以下是视图的代码：


    ```sql

    CREATE OR ALTER VIEW Network_UI.Person_Follows_Person

    AS

    SELECT Person.PersonId AS PersonId,

    FollowedPerson.PersonId AS FollowsPersonId,

    Follows.Value AS Value

    FROM Network.Person,

    Network.Follows,

    Network.Person AS FollowedPerson

    WHERE MATCH(Person-(Follows)->FollowedPerson);

    ```


    使用该视图执行以下查询：


    ```sql

    SELECT Person_Follows_Person.PersonId,

    Person_Follows_Person.FollowsPersonId,

    Person_Follows_Person.Value

    FROM  Network_UI.Person_Follows_Person;

    ```


    输出如下所示（仅显示 11 行中的前 3 行）：


    ```

    PersonId    FollowsPersonId Value

    ----------- --------------- -----------

    1           6               1

    1           2               1

    6           5               1

    ```


    现在，您将创建一个`INSTEAD OF`触发器对象，它将把这三列作为输入，并将它们转换为内部图标识符值。然后使用图值，将行插入到表中。这使得将大量数据加载到表中变得容易得多，而无需处理所有到图键值的转换。它特别使即席插入变得更容易，因为您永远不需要查找内部值。


    > 注意

    > 本节中的一些示例看起来并没有节省太多工作量，因为您仍然需要像查找图值一样查找常规键。当将常规的多对多关系转换为图边时，此技术将特别有用。


    ```sql

    CREATE OR ALTER TRIGGER Network_UI.Person_FollowsPerson_$InsteadOfInsertTrigger

    ON Network_UI.Person_Follows_Person

    INSTEAD OF INSERT

    AS

    SET NOCOUNT ON;

    --如果您添加更多代码，则应添加错误处理代码。

    BEGIN

    INSERT INTO Network.Follows($from_id, $to_id, Value)

    SELECT Person.$node_id, FollowedPerson.$node_id,

    inserted.Value

    FROM Inserted

    JOIN Network.Person

    ON Person.PersonId = Inserted.PersonId

    JOIN Network.Person AS FollowedPerson

    ON FollowedPerson.PersonId = Inserted.FollowsPersonId;

    END;

    ```


    使用`Network_UI.Person_Follows_Person`视图，您可以使用键值通过常规连接编写快速查询。例如，您可以将视图连接回`Network.Person`以获取名称，如下所示：'
  raw: '# 4. SQL Graph Tables: Extended Topics


    In Chapter [3](#508094_1_En_3_Chapter.xhtml), I presented the basics of using
    SQL Server’s graph tables. In many ways they resemble typical SQL Server tables
    with rows and columns, `SELECT` statements to access data, and such. But some
    parts were way different, especially how the internal graph database is structured.
    Working with pseudo-columns maybe a new concept, unless you have worked with partitioning
    (and their use in partitioning is not as user facing as using `$node_id`, `$from_id`,
    etc.).


    In this chapter, I am going to go beyond the basics and give you tools to build
    interfaces and protect your data using constraints, indexes, and triggers. You
    will also delve into the metadata that you will often need to inspect when you
    get a SQL Server database and want to know what graph tables exist and details
    about them.


    The goal of this chapter is to finish setting up all the techniques you will be
    using in the last half of the book to demonstrate building useful databases with
    SQL Server graph objects.


    The database you will be using for this chapter is the same one in the same state
    as it was left in Chapter [3](#508094_1_En_3_Chapter.xhtml). If you are starting
    with this chapter (to refresh the skills I cover in this chapter, there is a backup
    file in the downloads named [`https://github.com/Apress/practical-graph-structures`](https://github.com/Apress/practical-graph-structures)
    that will let you create the database exactly how it should be when you start
    this chapter.).


    ## Advanced Data Creation Techniques


    In this section, I show two techniques that go beyond what was covered in Chapter [1](#508094_1_En_1_Chapter.xhtml).
    If you are building interfaces where you load more than one row at a time, these
    techniques will help you load data into your graph objects in a quicker manner.


    First, I introduce an interface layer that lets you insert data into a view using
    regular key values from your tables. This is done using an instead of a trigger
    object to do the graph DB translation work for you.


    The second section shows you how to insert data directly into the graph columns
    using composable JSON tags. This way you can use existing data you have for the
    `id` values. rather than letting SQL Server dictate what the values will be and
    then having to look them up again.


    ### Building an Interface Layer


    In the previous chapter, all examples of creating edge data followed the same
    basic pattern:


    ```

    INSERT INTO Network.Follows($from_id, $to_id)

    --look up the $from_id

    SELECT (   SELECT Person.$node_id

    FROM   Network.Person

    WHERE  Person.FirstName = ''Fred''

    AND Person.LastName = ''Rick'') AS from_id,

    --just a name to make it easier to see when debugging

    --look up a to_id

    (   SELECT Person.$node_id

    FROM   Network.Person

    WHERE  Person.FirstName = ''Joe''

    AND Person.LastName = ''Seph'') AS to_id;

    ```


    You look up the two `$node_id` values in two subqueries, which together would
    form a $`from_id`, `$to_id` pair, and then insert the values. This is the pattern
    you will likely use when loading a single row in a procedure, but it is cumbersome
    if you want to load thousands of rows or want to translate one of your relational
    databases into a graph for analysis and you don’t have an integer key to work
    with. (More on that in a later section on composable JSON tags.)


    #### INSERT


    In this section, you are going to build an interface that allows you to insert
    the same data using the natural key values:


    ```

    INSERT INTO Network.Follows (FromFirstName, FromLastName,

    ToFirstName, ToLastName)

    VALUES (''Fred'', ''Rick'',''Joe'', ''Seph)

    ```


    This method uses a view object with an `INSTEAD OF` trigger object to allow the
    looking up of the `$from_id` and `$to_id` to happen internally.


    Note


    For these examples, you will be using the `Name` column to simplify the code for
    the book. When you load lots of data, always try to use a value that has an index
    to join on.


    For this example, create another schema that is there to support user interfaces
    for the data called `NetworkUI`:


    ```

    IF SCHEMA_ID(''Network_UI'') IS NULL

    EXEC (''CREATE SCHEMA Network_UI'');

    ```


    The view you create will only feasibly let you insert data in one specific node
    table to another specific node table using one specific key (primary or alternate).
    So, you need to repeat this process for each relationship you wish to use this
    technique with.


    In your case, you are going to implement the relationship between `Network.Person`
    to `Network.Person` through the `Network.Follows` edge. The basic view is straightforward.
    It’s just a query of the table returning the two key values from your nodes that
    you want to present to the user. It is completely up to your needs if you want
    to use a natural or surrogate key. The only requirement is that you present the
    user with values that will uniquely identify the relationship between two rows
    that they can know the value of.


    If you want to be able to type your `INSERT` statement manually with keys you
    know, use the natural key. For this example, use the surrogate keys to match the
    data in the source data.


    This is the code for the view:


    ```

    CREATE OR ALTER VIEW Network_UI.Person_Follows_Person

    AS

    SELECT Person.PersonId AS PersonId,

    FollowedPerson.PersonId AS FollowsPersonId,

    Follows.Value AS Value

    FROM Network.Person,

    Network.Follows,

    Network.Person AS FollowedPerson

    WHERE MATCH(Person-(Follows)->FollowedPerson);

    ```


    Execute the following query using the view:


    ```

    SELECT Person_Follows_Person.PersonId,

    Person_Follows_Person.FollowsPersonId,

    Person_Follows_Person.Value

    FROM  Network_UI.Person_Follows_Person;

    ```


    The output looks like this (just showing the first 3 rows of 11):


    ```

    PersonId    FollowsPersonId Value

    ----------- --------------- -----------

    1           6               1

    1           2               1

    6           5               1

    ```


    Now you are going to create an `INSTEAD OF` trigger object that will take these
    three columns as input and translate them to the internal graph identifier values.
    Then using the graph values, you insert the rows into the table. This makes it
    a lot easier to load lots of data into a table without dealing with all the translation
    to graph key values. It especially makes ad-hoc inserts easier because you never
    have to find the internal values.


    Note


    Some of the examples in this section don’t look like you are saving all that much
    work, since you are going to have to look up the regular key just like the graph
    values. This technique will become especially useful when taking a regular many-to-many
    relationship and translating it to a graph edge.


    ```

    CREATE OR ALTER TRIGGER Network_UI.Person_FollowsPerson_$InsteadOfInsertTrigger

    ON Network_UI.Person_Follows_Person

    INSTEAD OF INSERT

    AS

    SET NOCOUNT ON;

    --If you add more code, you should add error handling code.

    BEGIN

    INSERT INTO Network.Follows($from_id, $to_id, Value)

    SELECT Person.$node_id, FollowedPerson.$node_id,

    inserted.Value

    FROM Inserted

    JOIN Network.Person

    ON Person.PersonId = Inserted.PersonId

    JOIN Network.Person AS FollowedPerson

    ON FollowedPerson.PersonId = Inserted.FollowsPersonId;

    END;

    ```


    Using the `Network_UI.Person_Follows_Person` view, you can write quick queries
    using regular joins with the key values. For example, you can join the view back
    to the `Network.Person` to get the names like this:'
  trans: '# 4. SQL 图形表：高级主题


    在第 3 章中，我介绍了使用 SQL Server 图表的基本知识。在很多方面，它们类似于典型的具有行和列的 SQL Server 表，使用`SELECT`语句访问数据等。但有些部分非常不同，特别是内部图数据库的结构方式。使用伪列可能是一个新概念，除非您处理过分区（而且它们在分区中的使用不像使用`$node_id`、`$from_id`等那样面向用户）。


    在本章中，我将超越基础知识，为您提供使用约束、索引和触发器构建接口和保护数据的工具。您还将深入研究元数据，当您获取一个 SQL Server 数据库并想了解存在哪些图表以及它们的详细信息时，您通常需要检查这些元数据。


    本章的目标是完成设置所有技术，您将在本书的后半部分使用这些技术来演示如何使用 SQL Server 图对象构建有用的数据库。


    您将在本章中使用的数据库与第 3 章结束时处于相同状态。如果您是从本章开始（为了复习我将在本章中介绍的技能，下载文件中有一个名为 [`https://github.com/Apress/practical-graph-structures`](https://github.com/Apress/practical-graph-structures)
    的备份文件，它将让您在开始本章时精确创建应有的数据库。）


    ## 高级数据创建技术


    在本节中，我将展示两种超越第 1 章所涵盖内容的技术。如果您正在构建一次加载多行数据的接口，这些技术将帮助您以更快的方式将数据加载到图对象中。


    首先，我介绍一个接口层，它允许您使用表中的常规键值将数据插入到视图中。这是通过使用`INSTEAD OF`触发器对象为您完成图数据库转换工作来实现的。


    第二部分向您展示如何使用可组合的 JSON 标签直接将数据插入到图列中。这样，您可以利用已有的`id`值数据，而不是让 SQL Server 决定这些值是什么，然后再去查找它们。


    ### 构建接口层


    在上一章中，所有创建边数据的示例都遵循相同的基本模式：


    ```sql

    INSERT INTO Network.Follows($from_id, $to_id)

    --查找 $from_id

    SELECT (   SELECT Person.$node_id

    FROM   Network.Person

    WHERE  Person.FirstName = ''Fred''

    AND Person.LastName = ''Rick'') AS from_id,

    --仅用于调试时更容易查看的名称

    --查找 to_id

    (   SELECT Person.$node_id

    FROM   Network.Person

    WHERE  Person.FirstName = ''Joe''

    AND Person.LastName = ''Seph'') AS to_id;

    ```


    您在两个子查询中查找两个`$node_id`值，它们共同构成一个`$from_id`、`$to_id`对，然后插入这些值。这是在存储过程中加载单行时可能使用的模式，但如果您想加载数千行，或者想将关系数据库转换为图进行分析而没有整数键可用时，它就显得很笨重。（关于可组合
    JSON 标签的更多信息将在后面的章节中介绍。）


    #### INSERT


    在本节中，您将构建一个接口，允许您使用自然键值插入相同的数据：


    ```sql

    INSERT INTO Network.Follows (FromFirstName, FromLastName,

    ToFirstName, ToLastName)

    VALUES (''Fred'', ''Rick'',''Joe'', ''Seph)

    ```


    此方法使用带有`INSTEAD OF`触发器对象的视图对象来允许在内部完成对`$from_id`和`$to_id`的查找。


    > 注意

    > 在这些示例中，您将使用`Name`列来简化本书的代码。加载大量数据时，请始终尝试使用具有索引以便连接的值。


    对于此示例，创建另一个支持用户数据接口的架构，称为`NetworkUI`：


    ```sql

    IF SCHEMA_ID(''Network_UI'') IS NULL

    EXEC (''CREATE SCHEMA Network_UI'');

    ```


    您创建的视图将仅允许您使用一个特定键（主键或替代键）将数据从一个特定节点表插入到另一个特定节点表。因此，您需要为希望使用此技术的每个关系重复此过程。


    在您的案例中，您将通过`Network.Follows`边实现`Network.Person`与`Network.Person`之间的关系。基本视图很简单。它只是对表的查询，返回您想向用户展示的节点中的两个键值。完全根据您的需求决定是使用自然键还是代理键。唯一的要求是您向用户展示的值能够唯一标识他们可以知道值的两个行之间的关系。


    如果您希望能够使用您知道的键手动键入`INSERT`语句，请使用自然键。在此示例中，使用代理键来匹配源数据中的数据。


    以下是视图的代码：


    ```sql

    CREATE OR ALTER VIEW Network_UI.Person_Follows_Person

    AS

    SELECT Person.PersonId AS PersonId,

    FollowedPerson.PersonId AS FollowsPersonId,

    Follows.Value AS Value

    FROM Network.Person,

    Network.Follows,

    Network.Person AS FollowedPerson

    WHERE MATCH(Person-(Follows)->FollowedPerson);

    ```


    使用该视图执行以下查询：


    ```sql

    SELECT Person_Follows_Person.PersonId,

    Person_Follows_Person.FollowsPersonId,

    Person_Follows_Person.Value

    FROM  Network_UI.Person_Follows_Person;

    ```


    输出如下所示（仅显示 11 行中的前 3 行）：


    ```

    PersonId    FollowsPersonId Value

    ----------- --------------- -----------

    1           6               1

    1           2               1

    6           5               1

    ```


    现在，您将创建一个`INSTEAD OF`触发器对象，它将把这三列作为输入，并将它们转换为内部图标识符值。然后使用图值，将行插入到表中。这使得将大量数据加载到表中变得容易得多，而无需处理所有到图键值的转换。它特别使即席插入变得更容易，因为您永远不需要查找内部值。


    > 注意

    > 本节中的一些示例看起来并没有节省太多工作量，因为您仍然需要像查找图值一样查找常规键。当将常规的多对多关系转换为图边时，此技术将特别有用。


    ```sql

    CREATE OR ALTER TRIGGER Network_UI.Person_FollowsPerson_$InsteadOfInsertTrigger

    ON Network_UI.Person_Follows_Person

    INSTEAD OF INSERT

    AS

    SET NOCOUNT ON;

    --如果您添加更多代码，则应添加错误处理代码。

    BEGIN

    INSERT INTO Network.Follows($from_id, $to_id, Value)

    SELECT Person.$node_id, FollowedPerson.$node_id,

    inserted.Value

    FROM Inserted

    JOIN Network.Person

    ON Person.PersonId = Inserted.PersonId

    JOIN Network.Person AS FollowedPerson

    ON FollowedPerson.PersonId = Inserted.FollowsPersonId;

    END;

    ```


    使用`Network_UI.Person_Follows_Person`视图，您可以使用键值通过常规连接编写快速查询。例如，您可以将视图连接回`Network.Person`以获取名称，如下所示：'
- fmt: '# SQL查询与图数据库操作


    ```sql

    SELECT Person.Name, FollowedPerson.Name AS FollowedPerson

    FROM   Network_UI.Person_Follows_Person as Follows

    JOIN Network.Person

    ON Person.PersonId = Follows.PersonId

    JOIN Network.Person AS FollowedPerson

    ON FollowedPerson.PersonId = Follows.FollowsPersonId

    WHERE  Person.Name = ''Lou Iss'';

    ```


    请注意，虽然这在小数据集上会很快，但您可能需要对查询进行一些调优。尽可能多地使用 `MATCH` 表达式和您的图谱表。执行此查询，您将得到以下结果：


    ```

    Name              FollowedPerson

    ----------------- ----------------------

    Lou Iss           Saa Lee

    Lou Iss           Val Erry

    ```


    如果您在 SSMS 中查看此查询的执行计划，您会看到类似于图 [4-1](#508094_1_En_4_Chapter.xhtml#Fig1) 的内容。


    ![](images/508094_1_En_4_Chapter/508094_1_En_4_Fig1_HTML.jpg)


    一个部分查询计划。聚集索引扫描流向计算标量、到嵌套循环、内部联接，同时与聚集索引查找和哈希匹配、内部联接，同时与表扫描相结合。


    **图 4-1**


    部分查询计划显示您正在将 `Person` 表联接到 `Follows` 表。查询计划的其余部分将显示另一个到 `Person` 的哈希联接。


    查看查询计划，您会注意到带有边对象的查询使用了 `HASH JOIN` 运算符。在本章后面，您将了解如何向节点和边对象添加索引以可能提高性能（请注意，像您现在使用的较小数据集可能会为查询生成非常简单的计划，随着数据集增长，计划会发生变化）。


    虽然处理节点和边对象的方式有很多不同，但也有很多相似之处，您需要根据对象的使用方式对性能调优采取一些控制。如前所述，使用此视图对于查询没有太大价值，但如果您有一个包含
    id 值的表要转换为图，那将非常强大。


    为了演示，请运行以下查询以找到代理键值，然后插入一行：


    ```sql

    SELECT Person.PersonId  AS PersonId

    FROM Network.Person

    WHERE Person.Name = ''Lou iss'';

    SELECT Person.PersonId  AS FollowsPersonId

    FROM Network.Person

    WHERE Person.Name = ''Joe Seph'';

    ```


    获取返回的值并用于以下查询。对于示例集，值是 2 和 6。因此您可以使用以下语句插入新行：


    ```sql

    INSERT INTO Network_UI.Person_Follows_Person

    (PersonId,FollowsPersonId,Value)

    VALUES (2, 6, 10);

    ```


    执行以下查询：


    ```sql

    SELECT Person.Name, FollowsPerson.Name AS FollowedPerson

    FROM  Network.Person, Network.Follows,

    Network.Person AS FollowsPerson

    WHERE MATCH(Person-(Follows)->FollowsPerson)

    AND Person.Name = ''Lou Iss'';

    ```


    您将看到结果集中现在包含一行，其 `FollowedPerson` 为 `Joe Seph`。


    #### UPDATE


    正如我在本书前面所说，边对象的 `$from_id` 或 `$to_id` 值无法更新。这很有道理。但假设您想将值更新为 `1`，以匹配您的所有其他数据。


    ```sql

    UPDATE Network_UI.Person_Follows_Person

    SET Person_Follows_Person.Value = 1

    WHERE PersonId = (SELECT Person.PersonId

    FROM Network.Person

    WHERE Person.Name = ''Lou iss'')

    AND Person_Follows_Person.FollowsPersonId =

    (SELECT Person.PersonId

    FROM Network.Person

    WHERE Person.Name = ''Joe Seph'');

    ```


    这很有效，因为您只在更新语句中更新一个表中的数据。任何尝试同时更改键值和值的操作都将失败，例如


    ```sql

    UPDATE Network_UI.Person_Follows_Person

    SET Person_Follows_Person.Value = 1,

    Person_Follows_Person.PersonId = 0

    ```


    会返回错误：


    ```

    Msg 4405, Level 16, State 1, Line 85

    View or function ''Network_UI.Person_Follows_Person'' is not updatable because
    the modification affects multiple base tables.

    ```


    如果您只尝试更新一个键值（该值只存在于一个表中），像这样


    ```sql

    UPDATE Network_UI.Person_Follows_Person

    SET Person_Follows_Person.PersonId = 0;

    ```


    系统确实会尝试更新，但该值会链接回 `Network.Person` 对象的标识值，因此您会得到此错误：


    ```

    Msg 8102, Level 16, State 1, Line 105

    Cannot update identity column ''PersonId''.

    ```


    如果您希望更新 `$from_id` 和 `$to_id` 值，在 `INSTEAD OF` 触发器对象中是可以实现的（需要删除和插入操作，如果您正在构建生产代码，这肯定需要更复杂的错误处理），但我只建议在您创建用于临时操作的表时使用此方法。直接让您的代码执行删除和插入操作。当您将树实现为重新指定父节点的操作时会用到此操作，这从技术上说会更改关系。


    > **注意**

    >

    > 在第 [4](#508094_1_En_4_Chapter.xhtml) 章的下载文件中，有一个代码生成器可以为您生成视图和 `INSTEAD OF`
    触发器对象。其中包含一个名为 `InterfaceViewCodeGenerator.sql` 的更新生成器。代码有详细文档，虽然需要进行很多设置，但它会生成整个接口的基本框架。'
  raw: '```

    SELECT Person.Name, FollowedPerson.Name AS FollowedPerson

    FROM   Network_UI.Person_Follows_Person as Follows

    JOIN Network.Person

    ON Person.PersonId = Follows.PersonId

    JOIN Network.Person AS FollowedPerson

    ON FollowedPerson.PersonId = Follows.FollowsPersonId

    WHERE  Person.Name = ''Lou Iss'';

    ```


    Take care because while this will be fast on your small data set, you may need
    to do some tuning of your queries. Use the `MATCH` expression and your graph tables
    as often as possible. Execute this query, and you will get the following result:


    ```

    Name              FollowedPerson

    ----------------- ----------------------

    Lou Iss           Saa Lee

    Lou Iss           Val Erry

    ```


    If you look at the query plan for the execution of the query in SSMS, you will
    see something similar to Figure [4-1](#508094_1_En_4_Chapter.xhtml#Fig1).


    ![](images/508094_1_En_4_Chapter/508094_1_En_4_Fig1_HTML.jpg)


    A partial query plan. Clustered index scan flows to compute scalar, to nested
    loops, inner join, together with, clustered index seek, and to hash match, inner
    join, together with table scan, follows.


    Figure 4-1


    Partial query plan showing that you are joining the Person table to the Follows
    table. The rest of the query plan would show another hash join to Person


    Looking at the query plan, you will notice a `HASH JOIN` operator for the query
    with the edge object. Later in the chapter, you will look at adding indexes to
    your node and edge objects to possibly improve performance (note that smaller
    data sets like you are working with now may have very naïve plans generated for
    queries that will change as data sets grow).


    While there is a lot different in how you work with node and edge objects, there
    are a lot of similarities too, and you will need to take some control over performance
    tuning based on how you use your objects. As noted, using this view isn’t a big
    value for querying, but if you had a table of the id values to turn into a graph,
    it would rock.


    To demonstrate, insert a row using the surrogate key values found by running these
    queries:


    ```

    SELECT Person.PersonId  AS PersonId

    FROM Network.Person

    WHERE Person.Name = ''Lou iss'';

    SELECT Person.PersonId  AS FollowsPersonId

    FROM Network.Person

    WHERE Person.Name = ''Joe Seph'';

    ```


    Take the values returned and use them in the following query. For the sample set,
    the values are 2 and 6\. So you could insert the new row using the following statement:


    ```

    INSERT INTO Network_UI.Person_Follows_Person

    (PersonId,FollowsPersonId,Value)

    VALUES (2, 6, 10);

    ```


    Execute the following query:


    ```

    SELECT Person.Name, FollowsPerson.Name AS FollowedPerson

    FROM  Network.Person, Network.Follows,

    Network.Person AS FollowsPerson

    WHERE MATCH(Person-(Follows)->FollowsPerson)

    AND Person.Name = ''Lou Iss'';

    ```


    You will see that a row with `Joe Seph` as the followed person is now in the result
    set.


    #### UPDATE


    As I said earlier in the book, edge objects cannot have their `$from_id` or `$to_id`
    values updated. And this makes good sense. But let’s say you want to update the
    value to be `1`, to match all your other data.


    ```

    UPDATE Network_UI.Person_Follows_Person

    SET Person_Follows_Person.Value = 1

    WHERE PersonId = (SELECT Person.PersonId

    FROM Network.Person

    WHERE Person.Name = ''Lou iss'')

    AND Person_Follows_Person.FollowsPersonId =

    (SELECT Person.PersonId

    FROM Network.Person

    WHERE Person.Name = ''Joe Seph'');

    ```


    This works great because you are only updating data from one table in your update.
    Any attempt to change the key values along with the value will fail as


    ```

    UPDATE Network_UI.Person_Follows_Person

    SET Person_Follows_Person.Value = 1,

    Person_Follows_Person.PersonId = 0

    ```


    returns an error:


    ```

    Msg 4405, Level 16, State 1, Line 85

    View or function ''Network_UI.Person_Follows_Person'' is not updatable because
    the modification affects multiple base tables.

    ```


    If you just try to update one key value, which is in only one table, like this


    ```

    UPDATE Network_UI.Person_Follows_Person

    SET Person_Follows_Person.PersonId = 0;

    ```


    it does try, but the value links back to the identity value of the `Network.Person`
    object, so you get this error:


    ```

    Msg 8102, Level 16, State 1, Line 105

    Cannot update identity column ''PersonId''.

    ```


    If you desire to update the `$from_id` and `$to_id` values, it is doable in an
    instead-of trigger object (requiring a delete and an insert, which should definitely
    have more involved error handling if you are building your production code), but
    I only suggest this when you are creating tables to work with in an ad-hoc manner.
    Just have your code do the delete and insert. This is an operation that will be
    used when you implement a tree as reparenting a node is a common operation, which
    technically changes the relationship.


    Note


    In the downloads for Chapter [4](#508094_1_En_4_Chapter.xhtml), there is a code
    generator to generate a view and `INSTEAD OF` trigger objects for you. It includes
    an update one named `InterfaceViewCodeGenerator.sql`. The code is documented and
    although there are a lot of settings needed, it will generate the basic framework
    for the entire interface.'
