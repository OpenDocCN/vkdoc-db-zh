    ### Reparenting Nodes


    Once you have your data into the tree structure, a common operation you might
    need to do a tree is to move one node to be a child of a different node. This
    is a very typical thing to do in something like a managerial relationship object.


    Reparenting a node in a tree using an adjacency list type of structure (storing
    the edges in a simple from-to object like SQL Graph does) is generally simple.
    Just modify the `$from_id` value from one parent to another.


    This is how it will be accomplished with SQL Graph edges, except you cannot modify
    the edge object’s `$from_id` or `$to_id` values, so you need to delete the original
    edge and create a new one. If you have data stored in the edge object, you need
    to handle that in your code as well (if the data makes sense where you reparent
    the row to, obviously).


    For multi-step processes in T-SQL code, it is always good to use a stored procedure,
    which makes it a lot easier to use a transaction in a safe manner where you know
    it will be committed or rolled back. Doing this in your ad-hoc style code multiple
    times is a lot more cumbersome than a stored procedure and more prone to errors
    like forgetting to commit the transaction and losing work.


    In the next bit of code, you implement the reparent code for the `Company` object.
    Reparenting with an adjacency list type structure can be thought of as an edge
    update operation, but I generally implement it separately from a general update
    procedure because I typically want to update something like the notes about the
    connection of two nodes independently from moving them to a different location
    in the tree. Hence the security on the reparent operation is likely to be different
    than the normal update.


    The following code implements the reparent operation. (If you have any columns
    on your edge object, you need to make sure and copy those attributes in the code
    as well, since a reparent requires you to delete the existing edge and reinsert
    the row.)


    ```

    CREATE OR ALTER PROCEDURE SqlGraph.Company$Reparent

    (

    @Name varchar(20), --again using natural key values

    @NewParentCompanyName varchar(20)

    )

    AS

    BEGIN

    SET NOCOUNT ON;

    BEGIN TRY;

    BEGIN TRANSACTION;

    --get the new location you wish to change to

    --the from is what is changing

    DECLARE @FromId nvarchar(1000),

    @ToId nvarchar(1000) --to id will not change

    --use the natural key values to fetch the $from_id/$to_id

    SELECT @FromId = $node_id

    FROM   SqlGraph.Company

    WHERE  name = @NewParentCompanyName;

    SELECT @ToId = $node_id

    FROM   SqlGraph.Company

    WHERE  name = @Name;

    --Delete the old edge, and since this isn''t changing

    --it will remain the same (note, $to_id is unique, so

    --no need to worry with the old $from_id value

    DELETE SqlGraph.ReportsTo

    WHERE  $to_id = @ToId;

    --create a new edge

    INSERT INTO SqlGraph.ReportsTo($From_id, $to_id)

    VALUES (@FromId, @ToId);

    --finish up

    COMMIT TRANSACTION;

    END TRY

    BEGIN CATCH

    IF XACT_STATE()  0

    ROLLBACK TRANSACTION;

    THROW; --just rethrow the error

    END CATCH;

    END;

    ```


    Now, let’s look at the tree structure as it is currently:


    ```

    SELECT HierarchyDisplay

    FROM SqlGraph.CompanyHierarchyDisplay

    ORDER BY Hierarchy;

    ```


    This returns


    ```

    HierarchyDisplay


    Company HQ

    --> Maine HQ

    --> --> Camden Branch

    --> --> Portland Branch

    --> Tennessee HQ

    --> --> Knoxville Branch

    --> --> Memphis Branch

    --> --> Nashville Branch

    ```


    Now let’s reparent `Maine HQ` to be under `Tennessee HQ`:


    ```

    EXEC SqlGraph.Company$Reparent @Name = ''Maine HQ'',

    @NewParentCompanyName = ''Tennessee HQ'';

    ```


    After execution, looking at the code, you can now see that `Maine HQ` is a child
    of `Tennessee HQ`. This query of the view now returns


    ```

    HierarchyDisplay


    Company HQ

    --> Tennessee HQ

    --> --> Knoxville Branch

    --> --> Maine HQ

    --> --> --> Camden Branch

    --> --> --> Portland Branch

    --> --> Memphis Branch

    --> --> Nashville Branch

    ```


    Note also that all the child rows of `Maine HQ` come along for the ride. I won’t
    implement it here, but you could “somewhat less easily” just remove the node from
    the tree and insert it into the structure. This would require shuffling all the
    child nodes to the parent of the item you are removing. This is a less-likely
    use case and could be done using multiple reparents when desired. (The delete
    code will implement something similar, since it is typical in that scenario, so
    you could adapt that code if needed).


    Now put `Maine HQ` back where it belongs using the following code:


    ```

    EXEC SQLGraph.Company$Reparent @Name = ''Maine HQ'',

    @NewParentCompanyName = ''Company HQ'';

    ```


    Then check for yourself that it is back into the right location.'
