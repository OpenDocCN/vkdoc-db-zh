    in a non-clustered index, which is a pretty deep tree since an integer will always
    fit in 10 characters.


    Looking back at Figure [6-3](#508094_1_En_6_Chapter.xhtml#Fig3), the path for
    the `Knoxville Branch` row is \1\3\6\. The `CompanyId` is 6, which gives you the
    current node’s value. Then 3 is the next parent, and 1 is the root parent.


    With the path formed and stored in this manner, you can find all the children
    of a node using the path in simple `LIKE` expression. For example, to get the
    children of the `Maine HQ` node, you can use a `WHERE` clause such as `WHERE Path
    LIKE ''\1\2\%''` to get the children or `LIKE ''\1\2[^0-9]%''` if you don’t wish
    to include the trailing delimiter in your path values. The `[^` makes sure the
    following character after your string is not a number and the path to the parents
    is directly in the path too. So, the parents of the `Portland Branch`, whose path
    is `''\1\2\4\''`, are `''\1\2\''` and `''\1\''`. Using `STRING_SPLIT(PathValue,''\'')`
    in SQL Server 2016 and later, this is a fairly easy, and more importantly, non-iterative
    process as well to get the parent nodes in a fairly simple query.


    One of the great things about the path method is that it readily uses indexes
    for most of your queries, because most times it will use the left side of a string
    and/or the values from the primary key of the actual row. Even when you query
    the structure, you can get a view (ordered by surrogate key values) of the data
    in a hierarchical fashion quite easily. Your code can also be adjusted to include
    a user-readable hierarchy for ordering the output, and that path can be far larger
    since you ideally would not be searching on that data.


    Bear in mind that you can index really deep paths, since in 1700 bytes you can
    generally achieve a max of around 150-170 levels, knowing any integer fits into
    10 characters and there will be a separator. However, once your paths are in this
    range of length, you could only end up with four keys per page, which is not going
    to give amazing performance in any case.


    Maintaining the structures using the path method is somewhat of a downside in
    comparison to using an adjacency list type method. Any change to the parent of
    a node can mean modifying the children of that row as well, since they will carry
    around your node’s path, too. This is referred to as **reparenting** when working
    with a tree. If your path is \1\2\3\4\, and node with a key value of 2 is reparented
    to be under 6, 2’s path needs to change to \1\6\2\, and every child of 2 as well,
    which in certain cases could be hundreds or even millions of rows.


    It can generally be done with using the `REPLACE` function, but the biggest issue
    isn’t how hard the algorithm is to code but how it will affect performance. The
    more rows you must modify, the more rows need to be locked, since you will want
    to do modifications to your tree structures in an explicit transaction in case
    there is an error.


    Probably the biggest concern with this method is that the data does not protect
    itself very well. With the adjacency list model of SQL Graph, the main concern
    you have with keeping the structure a proper tree is making sure that every node
    is in a relationship, in some way, to the root node. But the path is just a string,
    and there is no easy way to make sure that you don’t update the path to be `''fred''`
    or `''10000''`, or worse yet `''\1\2\30000\432\'',` and there aren’t nodes with
    a key of 30000 or 2\. At that point you might be in a world of hurt if you have
    millions of rows.


    For a reparent or even a delete, what happens to child rows is important. You
    can’t delete path `''\1\2\3\''` without deleting or reparenting `''\1\2\3\4\''`
    or you will leave this orphaned row in the structure and unlike a tree, where
    a parentless node will become a root node by default, using the path method, it
    will just become invalid because not every referenced node in the path exists.


    #### Code


    In this section, you are going to see the code that shows how the insert is done
    with the path method. First up is the table structure. Note that the `CompanyId`
    column is not a column with the identity property. Because the path will use the
    `CompanyId` values, generating the value with a `SEQUENCE` object is far easier.
    As usual, I will comment the code so it is hopefully clear what it is doing.


    ##### Table Create Script


    The create script is quite easy, just the surrogate key, an identifier, and the
    path (which I make the max size a non-clustered index can hold). This code is
    in the Chapter [6](#508094_1_En_6_Chapter.xhtml) downloads as `1300-Path Method-Objects.sql`.


    ```

    CREATE SCHEMA PathMethod;

    CREATE TABLE PathMethod.Company

    (

    CompanyId INT  NOT NULL CONSTRAINT PKCompany PRIMARY KEY,

    Name VARCHAR(20)  NOT NULL CONSTRAINT AKCompany_Name UNIQUE,

    Path VARCHAR(1700) NOT NULL INDEX Path

    );

    --indexes max out at 1700 bytes. Allows for at least a 1600+

    --deep Hierarchy, which is very deep for most uses, but is a

    --limitation. Removing the index could really hurt perf.

    ```


    ##### Insert New Rows


    For the insert, basically the path of the node is acquired for the parent node
    and then used as the prefix for the new node in the data structure:


    ```

    CREATE PROCEDURE PathMethod.Company$Insert

    @Name              varchar(20),

    @ParentCompanyName varchar(20)

    AS

    BEGIN

    --gets Path, which looks like \CompanyId\CompanyId\...

    DECLARE @ParentPath varchar(1700) =

    COALESCE((  SELECT Company.Path

    FROM   PathMethod.Company

    WHERE  Company.Name =

    @ParentCompanyName), ''\'');

    --used a SEQUENCE instead of identity because it made it

    --easier to be able to do the next step in a single statement

    --since the surrogate key is part of the value in the path

    --you could do this with an insert using SCOPE_IDENTITY(),

    --and then update the path if you would rather

    DECLARE @NewCompanyId int = NEXT VALUE FOR

    PathMethod.Company_SEQUENCE;

    --appends the new id to the parents Path

    INSERT INTO PathMethod.Company(CompanyId, Name, Path)

    SELECT @NewCompanyId, @Name,

    @ParentPath + CAST(@NewCompanyId AS varchar(10)) + ''\'';

    END;

    ```


    The download contains the sequence object and the procedure `PathMetho.Sale$InsertTestData`
    to load the sample values, just as in Chapter [5](#508094_1_En_5_Chapter.xhtml).'
