  trans: '## 循环图


    循环图，顾名思义，允许在图中出现环。环的允许通常意味着你不会对节点做太多数学运算，比如汇总子节点的销售额；相反，更可能用于探索节点之间的关系。


    你每天使用的几个令人难忘的图的例子，比如在订购产品的网站上。它们用图结构捕捉你的购买历史，并利用你与其他用户的相似性，看看是否能通过告诉你其他像你一样的人订购了什么，让你变得更像他们。


    你可能听说过的最著名的图是电影/戏剧《*六度分隔*》的基础。该理论认为，地球上的每个人与其他任何人的朋友联系都不超过六层。其中最著名的是凯文·贝肯。


    你会开始注意到许多存储在关系数据库中的设计的一个特点是，你会发现很多关系可以被建模为节点到节点的关系。例如，想一想图 2-11 概念模型中所示的典型销售订单系统。


    ![一个概念模型图从产品开始，进展到销售订单行项目。客户节点链接到销售订单，销售订单再链接到销售订单行项目。](img/508094_1_En_2_Fig11_HTML.jpg)

    **图 2-11** 销售系统的概念模型


    当你分析客户兴趣时，了解他们订购、退回、查看过什么产品等是非常有用的。你可以将这种产品-订单关系放到几个节点中，如图 2-12 所示。


    ![一个图片段包含两个节点。产品节点链接到客户节点。](img/508094_1_En_2_Fig12_HTML.png)

    **图 2-12** 将产品与客户关联的图片段


    你可以将关系定义为从客户到产品，或从产品到客户（或者两者兼有，我们稍后讨论）。软件通常可以在两个方向上遍历关系，尽管通常不能同时进行。（我们将在无向图部分讨论这个概念）。关键是要始终仔细地命名边，以表明关系是什么，例如
    `产品-已购买->客户` 或 `客户-订购（或曾感兴趣）->产品`。


    我提到过，在实现有向图时，你只需在同一路径中查找新插入（或更新）的节点，就能确保没有环。考虑图 2-13，它有多个环。


    ![一个图形结构。节点 Fred, Larry, Felicity, Cindy 之间有一个环形链接，Cindy, Geoff, Linda 之间也有一个环形链接。Felicity
    链接到 Linda。](img/508094_1_En_2_Fig13_HTML.png)

    **图 2-13** 包含环的示例图


    在编写代码处理此图以查找与 Fred 的连接时，你会看到每个节点都是连接的，并且图中有几个环，其中两个环会回到 Fred，如图 2-14 和图 2-15 所示。


    ![一个图形结构。节点 Fred, Larry, Felicity, Linda, Cindy 之间有一个环形链接，连接上有一个短而宽的箭头。Felicity
    链接到 Cindy，Cindy 链接到 Geoff，Geoff 链接到 Linda。](img/508094_1_En_2_Fig15_HTML.jpg)

    **图 2-15** 从 Fred -> Larry -> Felicity -> Linda -> Cindy -> Fred 的环


    ![节点 Fred, Larry, Felicity, Cindy 之间有一个环形链接。连接上有一个短而宽的箭头。](img/508094_1_En_2_Fig14_HTML.jpg)

    **图 2-14** 从 Fred -> Larry -> Felicity -> Cindy -> Fred 的环


    这些回到 Fred 的环，每一个都有一个明显的停止点。


    你也已经两次访问了 Cindy 节点。这不一定是一个环，因为你碰到了同一个节点两次。然而，这确实意味着你将开始重复结果，因为重复节点之后的后续树遍历总是相同的。通常，你希望终止其中一个处理路径，因为它会产生重复结果并浪费处理时间。


    注意：我不会在本章深入探讨这一点，但在这样的图中，边可以有不同的定义。`Fred -> Larry` 可以是 `喜欢`，而 `Larry -> Felicity`
    可以是 `不喜欢`。这是否构成环，取决于你需要如何遍历结构。


    但在图 2-16 中，这个环更具挑战性。


    ![一个图形结构。节点 Fred, Larry, Felicity, Cindy 之间有一个环形链接，Felicity 链接到 Linda。Linda, Cindy,
    Geoff 之间有一个环形链接，连接上有一个短而宽的箭头。](img/508094_1_En_2_Fig16_HTML.jpg)

    **图 2-16** 从 Cindy -> Geoff -> Linda -> Cindy 的环，未回到起始节点


    现在，你不仅需要确保在环回到起始节点时停止处理，还需要确保在图中任何地方出现环时都停止处理。（注意，这在有向图中查找环时不是问题，因为你只处理添加一条边。）如果你开始一次添加多条边，你可能还需要注意在处理中可能产生的这种无限循环。


    这一切都引出了对于此类网络最常见的操作：在任意两个节点之间找到一条 `最短路径`，在最后一个例子中就是 `Fred` 到 `Geoff`。从 `Fred`
    到 `Geoff` 有两条路径：


    *   `Fred -> Larry -> Felicity -> Cindy -> Geoff`

    *   `Fred -> Larry -> Felicity -> Linda -> Cindy -> Geoff`


    第一条显然是两个节点之间最短的路径，长度为 4。在某些情况下，你可能还想看看最长的路径（风景路线）。


    ## 加权边


    在某些情况下，你可能希望有 `加权节点`。例如，考虑构建一个地图类解决方案的情况。假设你有图 2-17 中的图，它实现了一个从入口节点到目的地节点的地图。


    ![一个图形结构。节点 Entrance（权重 1）链接到 Location 1，（权重 10）链接到 Location 2。Location 1（权重 30）链接到
    Destination。Location 2（权重 1）链接到 Location 3，Location 3（权重 3）链接到 Destination。](img/508094_1_En_2_Fig17_HTML.jpg)

    **图 2-17** 具有加权边的图


    当你有加权边（如距离）时，基于跳数的最短路径可能并不总是遍历图的最短或最便宜的路径。你也不能开始消除非交叉路径，因为如你在此例中所见，从 `Entrance`
    到 `Location 1` 是 1 个单位，但到 `Location 2` 是 10 个单位。然而，从 `Location 1` 出发的下一跳是 30 个单位，而从
    `Location 2` 通过 `3` 到 `Destination`，这只有 4 个单位。因此，最短加权路径是跳数更长的那条路径。'
- fmt: '### Non-Directed Graphs


    有向图的边只表示单向关系。Fred -> Follows -> Bob。它确实表示Fred关注了Bob，但并未说明Bob也关注了Fred。而在无向图中，每条边都表示一种双向关系。


    虽然你通常只能真正实现有向图，但有时你希望实现一种表现得像每条边都不是有向的行为，即如果Fred连接到Bob，那么Bob也连接到Fred。在这种情况下，你需要确保每对相关节点之间都有两条有向边。这当然会比普通图引入更多的循环，原因有几个。参考图[2-18](#508094_1_En_2_Chapter.xhtml#Fig18)中的图。


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig18_HTML.png)


    一个图形结构。节点Fred、Larry、Felicity和Cindy之间，Felicity、Linda、Geoff和Cindy之间，以及Linda和Cindy之间，链接都是双向的。


    图 2-18


    来自图[2-13](#508094_1_En_2_Chapter.xhtml#Fig13)的图，具有模拟的无向边


    在有向形式中，你有三个主要循环。而在这个图中，节点之间的每个关系都是一个循环。然后，每条路径又会产生更多循环。


    这看起来似乎是你不想做的事情，但这与“六度分隔”理论的例子将如何体现类似。这是因为你将要处理的主要图是`Person -> Worked With -> Person`（或者更具体地说，`Person
    -> Performed On -> Work <- Performed On <- Person`）。如果John Wayne与Lucille Ball在*I
    Love Lucy*上合作过，那么反过来也是成立的，即Lucille Ball与John Wayne合作过。（或者，如前所述，它将被实现为类似Lucille
    Ball在*I Love Lucy*剧集“Lucy and Harpo Marx”中演出，而Harpo Marx也参演了该集。）


    在设计图解决方案时，认识到这一点很重要，要注意你正在实现的关系是否确实应该表示一种互惠关系（并确保你的软件将插入、删除和更新两个边行作为一个组）。


    ## Summary


    在本章中，你对本书中将要构建示例代码的各种算法进行了高层概览。你首先探索了将定义本书大量代码的算法，无论是内部使用专门的图数据库语法，还是在你需要编写代码以进行专门操作时。（这在下一章讨论如何使用图对象时会更清晰。）


    然后你学习了不同类型图的定义，以及你将如何使用它们对不同场景建模并实现它们的基础知识。无环图适用于像树这样的结构，用于定义像文件系统、管辖区域和家谱这样的刚性结构。另一个例子是物料清单（BOM），其中一行在结构中可能有多个前置项，但在结构中出现循环没有意义（因为BOM定义了构成其他部件和产品的零件，循环会违背物理定律）。


    关系数据库中的循环图实现并不是真正的新事物（大多数多对多关系实际上就是伪装形式的循环图），但它们将这些作为图来处理，并同时使用多个多对多关系（你将在下一章看到）。


    最后，你了解了几种可以用来优化树结构处理速度的优化方法。这可能很有帮助，因为树经常涉及报告或检查层次结构的安全性等场景。


    # 3. SQL Graph Table Basics


    在本章（以及下一章），是时候开始用 Transact-SQL 代码编写图节点表和边表了。我将带你了解本书剩余部分以及构建你自己的图解决方案所需的所有图语法和技术。


    SQL Server 的图扩展语法，甚至图对象创建的内部机制，对你来说可能都显得陌生。对我来说也（现在仍然是）如此。其中一些是基于标准图语法，如果你对 SQL
    Server 之外的图数据库代码并不陌生，你可能已经接触过。在本书中，我将以 SQL Server 引擎作为你在计算机上实现图的唯一且所需引擎的方式来讲解代码。实际情况并非如此，如果你试图实现一个基本上只有图的数据库，你应该阅读纯图数据库并考虑将其作为替代方案。


    我对本书的期望是，你通常了解 T-SQL 语言，知道关系数据库的基础知识，并希望用图数据库的元素来扩展你的关系数据库。


    > 注意

    > 如果你想了解更多关于设计关系数据库的知识，请查看我的书 *Pro SQL Server Relational Database Design and Implementation*，该书同样由
    Apress 出版。


    在本书后面，我将提供额外的工具来实现图和树结构（单父有向无环图 (DAG)，缩写是因为 acyclic 这个词很难拼写！），但这关于 SQL Server
    图语法的两章介绍将作为本书其余部分的起点。


    在本章中，你将实现一个简单的图对象集，加载它们，并学习如何编写代码。下一章将介绍一些使加载和调整对象更容易的技术。本章及所有章节的代码可在 [`https://github.com/Apress/practical-graph-structures`](https://github.com/Apress/practical-graph-structures)
    下载。'
  raw: '### Non-Directed Graphs


    Directed graphs have edges that only state a relationship one way. Fred -> Follows
    -> Bob. It does say that Fred follows Bob, but it doesn’t say that Bob follows
    Fred. In a non-directed graph, every edge states a relationship that goes both
    ways.


    While you can only really implement a directed graph, sometimes you want to implement
    something that behaves like each edge is not directed, and that if Fred is connected
    to Bob, Bob is connected to Fred too. In this case, you need to make sure that
    there are two directed edges between every related node. This, of course, introduces
    far more cycles than in a normal graph for a few reasons. Consider the graph from
    Figure [2-18](#508094_1_En_2_Chapter.xhtml#Fig18).


    ![](images/508094_1_En_2_Chapter/508094_1_En_2_Fig18_HTML.png)


    A graphical structure. Links are both ways between nodes, Fred, Larry, Felicity,
    and Cindy, Felicity, Linda, Geoff, and Cindy, and between Linda and Cindy.


    Figure 2-18


    Graph from Figure [2-13](#508094_1_En_2_Chapter.xhtml#Fig13) with simulated non-directed
    edges


    In the directed form, you had three major cycles. In this graph, every relationship
    between nodes is a cycle. And then every path becomes more cycles.


    This may seem like something you wouldn’t want to do, but this is similar to how
    the six degrees of separation example would be manifested. This is because the
    primary graph you will work with is Person -> Worked With -> Person (or perhaps
    more specifically Person -> Performed On -> Work <- Performed On <- Person). If
    John Wayne worked with Lucille Ball on *I Love Lucy*, the latter would also be
    true that Lucile Ball worked with John Wayne. (Or, as noted, it will be implemented
    as something like Lucile Ball worked on *I Love Lucy* episode “Lucy and Harpo
    Marx” and Harpo Marx worked on that episode too.)


    It is important to realize this when you are designing your graph solutions to
    note if the relationships you are implementing should really indicate a reciprocal
    relationship (and make sure your software inserts, deletes, and updates both edge
    rows as a group).


    ## Summary


    In this chapter, you got a high-level look at the different algorithms you will
    be building example code for in this book. You started out by exploring the algorithm
    that will define a large amount of the code in this book, either internally using
    specialized graph database syntax or in code you need to write to do specialized
    operations. (This will be clearer in the next chapter when I discuss how to use
    the graph objects.)


    You then learned the definitions of different types of graphs and the basics of
    how you will use them to model different scenarios and then implement them. Acyclic
    graphs are for things like trees to define rigid structures like file systems,
    jurisdictions, and genealogies. Another example is a bill of materials, where
    a row might have multiple predecessors in the structure but a cycle in the structure
    wouldn’t make sense (since a bill of materials defines the parts that make up
    other parts and products, and a cycle would defy the laws of physics).


    Cyclic graph implementations in a relational database aren’t really new (most
    many-to-many relationship are actually cyclic graphs in disguise) but they process
    them as graphs and using multiple many-to-many relationships simultaneously (which
    you will see in the next chapter).


    Finally, you looked at several optimizations that you can use to improve the processing
    speed of tree structures. This can be helpful because trees are frequently involved
    in reporting or checking hierarchies for security, as examples.


    # 3. SQL Graph Table Basics


    In this chapter (and the next), it is time to start coding graph node and edge
    tables in Transact-SQL code. I will walk you through all the graph syntax and
    techniques you will need for the rest of the book and to build your own graph
    solutions.


    The syntax of the graph extensions to SQL Server, and even the internals of how
    the graph objects are created, is probably going to be weird to you. It was (and
    still kind of is) to me. Some of it is based on standard graph syntax that you
    may have encountered if you are not new to graph database code outside of SQL
    Server. I will approach the code in this book like SQL Server’s engine is the
    only engine you have and need for graph implementation on a computer. This is
    not really the case, and if you are trying to implement a database that is essentially
    only a graph, you should read about pure graph databases and consider them as
    an alternative.


    My expectation for this book is that you generally know the T-SQL language, know
    the basics of relational databases, and want to extend your relational databases
    with elements of a graph database.


    Note


    If you want to know more about designing relational databases, check out my book
    *Pro SQL Server Relational Database Design and Implementation*, also published
    by Apress.


    Later in the book, I will provide additional tools to implement graphs and tree
    structures (a single parent only DAG (directed acyclic graph), abbreviated because
    the word acyclic is hard to spell!), but this two-chapter introduction to the
    SQL Server graph syntax will serve as a jumping off point for the rest of the
    book.


    In this chapter, you will implement a simple set of graph objects, load them,
    and see how to code them. The next chapter will go into some techniques to make
    loading and tuning your objects easier. The code for this and all chapters can
    be downloaded at [`https://github.com/Apress/practical-graph-structures`](https://github.com/Apress/practical-graph-structures).'
  trans: '

    ### 无向图


    有向图的边只表示单向关系。Fred -> Follows -> Bob。这确实表示 Fred 关注了 Bob，但并未说明 Bob 也关注了 Fred。而在无向图中，每条边都表示一种双向关系。


    虽然在实现层面通常只能处理有向图，但有时你希望其行为表现得如同每条边都不是有向的——即如果 Fred 连接到 Bob，那么 Bob 也连接到 Fred。在这种情况下，你需要确保每对相关节点之间都有两条方向相反的有向边。这当然会比普通图引入更多的循环，原因有几个。请参考图
    2-18 中的示例。


    ![](img/508094_1_En_2_Fig18_HTML.png)


    一个图形结构。节点 Fred、Larry、Felicity 和 Cindy 之间，Felicity、Linda、Geoff 和 Cindy 之间，以及 Linda
    和 Cindy 之间，链接都是双向的。


    图 2-18


    来自图 2-13 的图，具有模拟的无向边


    在有向形式中，你有三个主要循环。而在这个图中，节点之间的每个关系都是一个循环。然后，每条路径又会产生更多循环。


    这看起来似乎是你不想做的事情，但这与“六度分隔”理论的例子将如何体现是类似的。这是因为你将要处理的主要图是`Person -> Worked With ->
    Person`（或者更具体地说，`Person -> Performed On -> Person <- Performed On <- Person`）。如果
    John Wayne 与 Lucille Ball 在*I Love Lucy*上合作过，那么反过来也是成立的，即 Lucille Ball 与 John
    Wayne 合作过。（或者，如前所述，它将被实现为类似 Lucille Ball 在*I Love Lucy*剧集“Lucy and Harpo Marx”中演出，而
    Harpo Marx 也参演了该集。）


    在设计图解决方案时，认识到这一点很重要，要注意你正在实现的关系是否确实应该表示一种互惠关系（并确保你的软件将插入、删除和更新两条边行作为一个组）。


    ## 本章小结


    在本章中，你对本书中将要构建示例代码的各种算法进行了高层概览。你首先探索了将定义本书大量代码的算法，无论是内部使用专门的图数据库语法，还是在你需要编写代码以进行专门操作时。（这在下一章讨论如何使用图对象时会更清晰。）


    然后你学习了不同类型图的定义，以及你将如何使用它们对不同场景建模并实现它们的基础知识。无环图适用于像树这样的结构，用于定义像文件系统、管辖区域和家谱这样的刚性结构。另一个例子是物料清单（BOM），其中一行在结构中可能有多个前置项，但在结构中出现循环没有意义（因为
    BOM 定义了构成其他部件和产品的零件，循环会违背物理定律）。


    关系数据库中的循环图实现并不是真正的新事物（大多数多对多关系实际上就是伪装形式的循环图），但它们将这些作为图来处理，并同时使用多个多对多关系（你将在下一章看到）。


    最后，你了解了几种可以用来优化树结构处理速度的优化方法。这可能很有帮助，因为树经常涉及报告或检查层次结构的安全性等场景。


    # 3. SQL 图表基础


    在本章（以及下一章），是时候开始用 Transact-SQL 代码编写图节点表和边表了。我将带你了解本书剩余部分以及构建你自己的图解决方案所需的所有图语法和技术。


    SQL Server 的图扩展语法，甚至图对象创建的内部机制，对你来说可能都显得陌生。对我来说也（现在仍然是）如此。其中一些是基于标准图语法，如果你对 SQL
    Server 之外的图数据库代码并不陌生，你可能已经接触过。在本书中，我将以 SQL Server 引擎作为你在计算机上实现图的唯一且所需引擎的方式来讲解代码。实际情况并非如此，如果你试图实现一个基本上只有图的数据库，你应该阅读纯图数据库并考虑将其作为替代方案。


    我对本书的期望是，你通常了解 T-SQL 语言，知道关系数据库的基础知识，并希望用图数据库的元素来扩展你的关系数据库。


    > 注意

    > 如果你想了解更多关于设计关系数据库的知识，请查看我的书 *Pro SQL Server Relational Database Design and Implementation*，该书同样由
    Apress 出版。


    在本书后面，我将提供额外的工具来实现图和树结构（单父有向无环图 (DAG)，缩写是因为 acyclic 这个词很难拼写！），但这关于 SQL Server
    图语法的两章介绍将作为本书其余部分的起点。


    在本章中，你将实现一个简单的图对象集，加载它们，并学习如何编写代码。下一章将介绍一些使加载和调整对象更容易的技术。本章及所有章节的代码可在 [`https://github.com/Apress/practical-graph-structures`](https://github.com/Apress/practical-graph-structures)
    下载。

