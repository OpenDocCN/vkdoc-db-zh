- fmt: '# DELETE


    Delete operations using natural keys may make perfect sense depending on your
    application (especially when users manipulate data manually). Deletes using the
    user interface tables also need a trigger to translate the id values to the key
    of the edge rows.


    ```sql

    DELETE FROM Network_UI.Person_Follows_Person

    WHERE PersonId = (SELECT Person.PersonId

    FROM Network.Person

    WHERE Person.Name = ''Lou iss'')

    AND Person_Follows_Person.FollowsPersonId =

    (SELECT Person.PersonId

    FROM Network.Person

    WHERE Person.Name = ''Joe Seph'');

    ```


    Just as with the update before, you get the same `Error 4405`. So, let’s build
    a simple `INSTEAD OF DELETE` trigger object. The weird question here is, what
    will the deleted columns contain? Because unlike the insert trigger, where you
    provide the values, in this next trigger the query will be executed. So, to start
    with, you will just return the rows from the deleted object in a query.


    ```sql

    CREATE OR ALTER TRIGGER Network_UI.Person_Follows_Person$InsteadOfDeleteTrigger

    ON Network_UI.Person_Follows_Person

    INSTEAD OF DELETE

    AS

    SET NOCOUNT ON;

    --If you add more code, you should add error handling code.

    BEGIN

    SELECT *

    FROM Deleted;

    END;

    ```


    Note


    If this doesn''t work for you, check the settings noted in this article: [`https://learn.microsoft.com/sql/database-engine/configure-windows/disallow-results-from-triggers-server-configuration-option`](https://learn.microsoft.com/sql/database-engine/configure-windows/disallow-results-from-triggers-server-configuration-option).
    It is clearly best to not have results from normal triggers, but it is very useful
    in a development case to be able to see what is being output.


    Execute the following statement and you will see that the deleted table contains
    the data from the view, since the trigger’s main code is simply to return the
    contents of the `deleted` virtual table:


    ```sql

    DELETE FROM Network_UI.Person_Follows_Person

    WHERE PersonId = (   SELECT Person.PersonId

    FROM   Network.Person

    WHERE  Person.Name = ''Lou iss'')

    AND Person_Follows_Person.FollowsPersonId =

    (   SELECT Person.PersonId

    FROM   Network.Person

    WHERE  Person.Name = ''Joe Seph'');

    ```


    This returns the following, showing that the deleted table looks just like you
    expect based on the structure of the view:


    ```sql

    PersonId    FollowsPersonId Value

    ----------- --------------- -----------

    2           6               1

    ```


    So, you can write the trigger just like this:


    ```sql

    CREATE OR ALTER TRIGGER Network_UI.Person_Follows_Person$InsteadOfDeleteTrigger

    ON Network_UI.Person_Follows_Person

    INSTEAD OF DELETE

    AS

    SET NOCOUNT ON;

    --If you add more code, you should add error handling code.

    BEGIN

    DELETE FROM Network.Follows --FollowedPerson)

    and  deleted.PersonId = Person.PersonId

    and  deleted.FollowsPersonId = FollowedPerson.PersonId

    END;

    ```


    Now you can delete the data in a straightforward manner as if it was not a table
    that had special columns internally:


    ```sql

    DELETE FROM Network_UI.Person_Follows_Person

    WHERE Person_Follows_Person.PersonId = 2

    AND Person_Follows_Person.FollowsPersonId = 6;

    ```


    After deleting in the rows, you can see the row is gone. Be sure and test with
    creating and deleting multiple rows when you build triggers.


    ```sql

    SELECT Person.Name AS PersonName,

    FollowedPerson.Name AS FollowsPersonName

    FROM   Network.Person,

    Network.Follows,

    Network.Person AS FollowedPerson

    WHERE  MATCH(Person-(Follows)->FollowedPerson)

    AND  Person.Name = ''Lou Iss'';

    ```


    ## Loading Data Using Composable JSON Tags


    For this next section, you are going to change to a different, publicly available
    database called `AdventureWorksLT`. I used the 2019 version available on Microsoft’s
    Learn site here: [`https://learn.microsoft.com/sql/samples/adventureworks-install-configure`](https://learn.microsoft.com/sql/samples/adventureworks-install-configure).
    Use the LT version because it has integer key values which make this process a
    lot easier. If you were loading data from a database with GUID key values, or
    even multi-part key values, you would create staging tables in `tempdb` with an
    identity key value to map to temporarily (and make a table with `sourceKey`, `identityKey`
    to load from the source table). I leave that to you, dear reader, as it isn’t
    terribly hard, but it definitely will make reading the example code harder.


    Ok, once you have that database restored, create a simple graph of `Customer-Purchased->Product`
    from the data. Include a `Label` column for each node and a purchase date on the
    edge. Don’t put a uniqueness constraint on the edge because the goal is primarily
    to show the loading method.


    First, create a new schema to hold your new objects:


    ```sql

    CREATE SCHEMA SalesGraph;

    ```


    Next, you are going to create the node table objects. In these objects you will
    include the surrogate key from the relational table, which is useful for fetching
    additional information after you have fetched a set of data. You can tune the
    amount of data you need in your graph tables to your needs if you are putting
    the graph in the same database with a relational copy of the data.


    ```sql

    CREATE TABLE SalesGraph.Customer

    (

    CustomerId int NOT NULL

    CONSTRAINT PKCustomer PRIMARY KEY,

    Label nvarchar(100) NOT NULL

    CONSTRAINT AKCustomer UNIQUE

    ) AS NODE;

    CREATE TABLE SalesGraph.Product

    (

    ProductId int NOT NULL

    CONSTRAINT PKProduct PRIMARY KEY,

    Label nvarchar(100) NOT NULL

    CONSTRAINT AKProduct UNIQUE

    ) AS NODE;

    ```


    Next, the edge is created. In the edge, the key from the table in the database
    where it came from is included, along with the time the item was purchased, which
    can definitely be useful in your analysis.


    ```sql

    CREATE TABLE SalesGraph.Purchased

    (

    SalesOrderDetailId int NOT NULL

    CONSTRAINT AKPurchased UNIQUE,

    PurchaseTime datetime2(0) NOT NULL

    ) AS EDGE;

    ```


    You could simply just fetch the rows as they exist in the source data, do a little
    bit of transformation, and load the data with a simple insert statement:


    ```sql

    --customerID added to label for uniqueness... why there

    --is duplication is beyond this exercise''s needs

    INSERT INTO SalesGraph.Customer WITH (TABLOCKX)

    (

    CustomerId, Label

    )

    SELECT CustomerID,

    CONCAT(FirstName, '' '', LastName, '' '', CustomerID) AS Label

    FROM SalesLT.Customer

    ORDER BY Label;

    ```


    Looking at a few rows of the output, you see


    ```sql

    SELECT TOP 2

    $node_id,

    CustomerId

    FROM SalesGraph.Customer;

    ```


    The id values are 0 and 1 for the first two rows:


    ```sql

    $node_id_06C54C432DE544E8995B29AFDAD55455


    {"type":"node","schema":"SalesGraph","table":"Customer","id":0}

    {"type":"node","schema":"SalesGraph","table":"Customer","id":1}

    CustomerId


    ```


    The id values don’t match the `CustomerId` column values. In some respects, this
    is a good thing. You almost never want to be using the `$node_id` values for any
    purpose, but when loading edge rows, if you could predict the values, you wouldn’t
    need to look them up, letting you load data far faster.


    Luckily, you can compose the JSON yourself, and Microsoft has provided you the
    tools to do so as part of the graph functionality. Assuming you are loading in
    copies of data (possibly for analysis, possibly for a first-time load), and that
    you don’t use values approaching max `bigint` (a very large number indeed), then
    you can save a lot of processing time using the following technique. I regularly
    use this technique for sample data because I can load a database with different
    datasets very quickly. To show this, start by truncating the data in the `SalesGraph.Customer`
    table.'
