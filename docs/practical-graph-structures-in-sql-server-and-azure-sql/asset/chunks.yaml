    # 1. Introduction to Graphs


    *With great power comes great responsibility.*--Voltaire (and Spider-Man’s Uncle
    Ben)


    At its core, a graph data structure is simply a model representing the connection
    of one thing to one other thing and then those things to even more other things.
    Essentially a graph database formalizes a database based on many-to-many relationships
    as the core relationship.


    Everyone who has ever modeled a relational database will either have modeled a
    graph purposefully or inadvertently because many-to-many relationships begin to
    appear as you add more concepts to your data model. The vast difference you will
    see is that relational implementations, ideally, are rigidly modeled.


    The term frequently used to decide whether to model a many-to-many relationship
    in a relational database or a graph structure is whether the data is **highly
    connected**. With a graph database structure, you can connect many tables to many
    other tables and query that structure in a different (yet quite similar) manner
    to how you query a relational database.


    There are many examples of graphs, but some of the most common examples you probably
    hear about are


    *   Social networks, where you record the relationship from one person to another


    *   Suggestion processing systems like online retailers use to record the relationship
    between a person and the products they have looked at and ordered and how that
    matches up with other people who have similar interests


    *   Manager-employee relationships where the employee has a manager who also has
    a manager who is likely managed by someone else


    With this information, you can discover interesting things about an object based
    on its relationships and similarity to relationships other entities have.


    Possibly the most famous graph that most people will have heard of is the basis
    of the parlor game “Six Degrees of Kevin Bacon.” This game suggests that everyone
    is no more than six connections away from anyone else, including Kevin Bacon (and
    not just that your favorite breakfast meat is bacon.)


    The fact that graphs are very natural data structures does not make them easy
    to work with. Because they are less rigid data structures than relational tables,
    the flexibility makes them quite complex to work with (certainly in the database
    engine). Graph objects can represent a very messy reality, and the more complex
    the data you are modeling, the more complicated it is to work with. Of course,
    the reward for that complexity is the solutions you create are often quite tremendous.


    Like many computer science topics, graphs are also a fundamental mathematical
    concept. Some of the insights you can get from the math of graphs will help once
    we start analyzing data. So, to begin this book on graphs, I will provide a very
    cursory look at some mathematical concepts as I define what a graph is and how
    it can be used in software.


    Note that the concepts in this chapter were gleaned from many resources and are
    generally common knowledge. However, when I was searching for resources to read
    for an introduction to the concepts of graphs, including mathematical proofs (none
    of which will come up in this book, so no worries!) of such concepts, one was
    *Introduction to Graph Theory* by Richard J. Trudeau from Dover Publications in
    1993\. It is far deeper than this chapter and definitely more than you need to
    learn to code with SQL Server’s graph database extensions, and mathematical proofs
    have always been my Kryptonite! However, I highly recommend this as a place to
    ascend to the next level beyond what I will show you.


    This chapter will be a quick, high-level overview of the many topics you will
    find in this book and many other sources, plus ideas you may wish to use in the
    graph table objects I will cover once you start building objects. The book itself
    will be mostly focused on very practical applications and how to write certain
    types of code, but I found that knowing some of the graph fundamentals really
    helped me to envision what I was attempting to accomplish.


