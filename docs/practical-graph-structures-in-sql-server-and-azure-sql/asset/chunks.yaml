    a CPU issue, and I am only using a single CPU due to the `MAXDOP = 1`). The path
    method already contains some of the data formatted as I want it for the processing,
    so it generally is faster.


    Table 6-3


    Approximate Times to Fetch All of the Children of a Node Twice


    | *Fetch All Children Times* | | | |

    | --- | --- | --- | --- |

    | Name | Row Count | SQL Graph | Path |

    | --- | --- | --- | --- |

    | Small | 8 | 0.032 | < .000000 |

    | Large | 3400 | 0.078 | 0.032 |

    | Wide | 55301 | 1.21 | 0.34 |

    | Deep | 42101 | 1.08 | 0.33 |

    | Huge | 298001 | 8.92 | 2.9 |


    The final test that I performed was the test to say if I have `NodeX`, and `NodeY`,
    is `NodeX` a child of `NodeY`.? For every one of these tests, the time that it
    took using every algorithm was negligible and often did not show up in six digits
    of accuracy. Hence, I did not output this as a table, but the takeaway is that
    when you are working with a specific slice of the data, each of the methods can
    be very fast no matter how large the data set.


    Just like almost any query using a relational engine, if indexes can be used to
    limit the data processed, you can have loads of data and work fast. The same is
    true for SQL Graph queries. It is only when large amounts of data get involved
    that the times to process increase (and parallelism becomes an issue, at least
    until SQL Server 2022 RTM).


    ## Summary


    In this second chapter on tree structures, I hope I was able to give you a feeling
    about not only a few techniques you might consider using with your tree structures
    but also how large a dataset can be processed on even a very small computer that
    is by no means server class. I didn’t even try to dig too deep into hardware utilization
    and bandwidth, so your mileage clearly may vary when you start to work with these
    tools in your real systems and with server class hardware.


    Either way, a tree of nearly 300,000 nodes is not a small size at all (nor is
    it amazingly large either), and we were able to process all the rows rather quickly,
    both using the native SQL Graph capabilities and with the alternative path method
    and with building helper tables. While I will admit that taking nearly 5 minutes
    to build the helper tables seemed like a lot of time, it could be worth it depending
    on your needs, especially if you are using graphs for analysis purposes. And if
    you can pay the latency in regenerating the helper tables, they could be put in
    a staging table and then swapped out without any users really noticing.


    # 7. Other Directed Acyclic Graphs


    In this chapter, I want to include a relatively brief example and discussion of
    directed acyclic graphs (DAG) that are not trees. Back in Chapter [1](#508094_1_En_1_Chapter.xhtml),
    I gave them the name of a polyhierarchy, rather than a hierarchy.


    Unlike a tree, in the structure I want to talk about in this chapter, a node in
    a polyhiearchy can have as many to/parent relationships as you want and need.
    This will make validation and programming for the structures a bit more interesting
    because the built-in code SQL Server implements doesn’t cover all the uses of
    the graph.


    ## The Problem Set


    When working with a DAG that is not a tree, much of the common processing will
    be a subset of the algorithms you use to process a tree. In every case, you start
    from some node in the structure and work your way down through the structure,
    often using the same `SHORTEST_PATH` code you used previously.


    There is just one minor snafu with the way `SHORTEST_PATH` works. It only finds
    each node once. For trees, since every node can only have one parent node, you
    are always guaranteed that it will only be found once in the path. Hence, no problem.


    But consider the graph in Figure [7-1](#508094_1_En_7_Chapter.xhtml#Fig1).


    ![](images/508094_1_En_7_Chapter/508094_1_En_7_Fig1_HTML.jpg)


    A graph structure. Product X is divided into part Y, and part Z, and both points
    to, part included.


    Figure 7-1


    Simple polyhierarchy


    If you use `SHORTEST_PATH` to see if Product X includes Part Included, it will
    show up as being related to either Part Y or Part Z, but not both. So, if you
    just want to know that Part Included is *somewhere* in Product X, `SHORTEST_PATH`
    works fine.


    But often in a graph like this (commonly referred to as a bill of materials) you
    want to know all the places where that part is included and likely even how many
    of that part is included in the entire structure.


    Consider next if the graph was actually like this one in Figure [7-2](#508094_1_En_7_Chapter.xhtml#Fig2).


    ![](images/508094_1_En_7_Chapter/508094_1_En_7_Fig2_HTML.png)


    A graph structure. Product X is divided into Part Y via 5 and Part Z via 3. Part
    Z is connected to Part Z 1 via 2. Part Y via 3 and part Z 1 via 1 lead to, part
    included.


    Figure 7-2


    Expanded bill of materials example group


    If you use `SHORTEST_PATH` on this graph to determine where you are using the
    Part Included, it will only show up as being part of Part Y, unless you start
    traversing from Part Z. When you start looking at the code to rectify this issue,
    this thought process kind of indicates what you must do to handle this in code.
    Traverse the tree one level at a time and get all nodes. Luckily, SQL offers the
    CTE construct that makes this relatively easy to do (though not in comparison
    to `SHORTEST_PATH`).


    In a bill of materials, you also commonly will have magnitudes on the edges. Take
    a box of donuts. Say the box contains two Plain, three Chocolate Covered, and
    eight Crème Filled. If you are summing sales from the donut box structure, you
    have four nodes: one for the box and three adjacent nodes for each type of donut.
    The edges have magnitude. And every receipt is a node in the daily sales structure,
    where each receipt is independent but the products they include are the same.


    As demonstrated in the past chapter, summing edge values in a tree is quite simple.
    Here, however, you run into the issues with `SHORTEST_PATH`. Values will be dropped
    off any aggregates as nodes show up in the structure more than one time. So if
    you try to sum the sales of all maple bacon donuts for the day via `SHORTEST_PATH`,
    you might see that only 12 were sold. (They were delicious.)


    So, you need to change the approach to how you process the data somewhat and I
    will show that in this chapter.'
  raw: 'Finally, in Table in [6-3](#508094_1_En_6_Chapter.xhtml#Tab3), you can see
    that even outputting 298 thousand rows into a temp table, formatted for view is
    not that large of a task using any of the methods, especially considering the
    machine being used (I never used all the RAM that I allocated SQL Server, so this
    is basically a CPU issue, and I am only using a single CPU due to the `MAXDOP
    = 1`). The path method already contains some of the data formatted as I want it
    for the processing, so it generally is faster.


    Table 6-3


    Approximate Times to Fetch All of the Children of a Node Twice


    | *Fetch All Children Times* |

    | --- |

    | Name | Row Count | SQL Graph | Path |

    | --- | --- | --- | --- |

    | Small | 8 | 0.032 | < .000000 |

    | Large | 3400 | 0.078 | 0.032 |

    | Wide | 55301 | 1.21 | 0.34 |

    | Deep | 42101 | 1.08 | 0.33 |

    | Huge | 298001 | 8.92 | 2.9 |


    The final test that I performed was the test to say if I have `NodeX`, and `NodeY`,
    is `NodeX` a child of `NodeY`.? For every one of these tests, the time that it
    took using every algorithm was negligible and often did not show up in six digits
    of accuracy. Hence, I did not output this as a table, but the takeaway is that
    when you are working with a specific slice of the data, each of the methods can
    be very fast no matter how large the data set.


    Just like almost any query using a relational engine, if indexes can be used to
    limit the data processed, you can have loads of data and work fast. The same is
    true for SQL Graph queries. It is only when large amounts of data get involved
    that the times to process increase (and parallelism becomes an issue, at least
    until SQL Server 2022 RTM).


    ## Summary


    In this second chapter on tree structures, I hope I was able to give you a feeling
    about not only a few techniques you might consider using with your tree structures
    but also how large a dataset can be processed on even a very small computer that
    is by no means server class. I didn’t even try to dig too deep into hardware utilization
    and bandwidth, so your mileage clearly may vary when you start to work with these
    tools in your real systems and with server class hardware.


    Either way, a tree of nearly 300,000 nodes is not a small size at all (nor is
    it amazingly large either), and we were able to process all the rows rather quickly,
    both using the native SQL Graph capabilities and with the alternative path method
    and with building helper tables. While I will admit that taking nearly 5 minutes
    to build the helper tables seemed like a lot of time, it could be worth it depending
    on your needs, especially if you are using graphs for analysis purposes. And if
    you can pay the latency in regenerating the helper tables, they could be put in
    a staging table and then swapped out without any users really noticing.


    # 7. Other Directed Acyclic Graphs


    In this chapter, I want to include a relatively brief example and discussion of
    directed acyclic graphs (DAG) that are not trees. Back in Chapter [1](#508094_1_En_1_Chapter.xhtml),
    I gave them the name of a polyhierarchy, rather than a hierarchy.


    Unlike a tree, in the structure I want to talk about in this chapter, a node in
    a polyhiearchy can have as many to/parent relationships as you want and need.
    This will make validation and programming for the structures a bit more interesting
    because the built-in code SQL Server implements doesn’t cover all the uses of
    the graph.


    ## The Problem Set


    When working with a DAG that is not a tree, much of the common processing will
    be a subset of the algorithms you use to process a tree. In every case, you start
    from some node in the structure and work your way down through the structure,
    often using the same `SHORTEST_PATH` code you used previously.


    There is just one minor snafu with the way `SHORTEST_PATH` works. It only finds
    each node once. For trees, since every node can only have one parent node, you
    are always guaranteed that it will only be found once in the path. Hence, no problem.


    But consider the graph in Figure [7-1](#508094_1_En_7_Chapter.xhtml#Fig1).


    ![](images/508094_1_En_7_Chapter/508094_1_En_7_Fig1_HTML.jpg)


    A graph structure. Product X is divided into part Y, and part Z, and both points
    to, part included.


    Figure 7-1


    Simple polyhierarchy


    If you use `SHORTEST_PATH` to see if Product X includes Part Included, it will
    show up as being related to either Part Y or Part Z, but not both. So, if you
    just want to know that Part Included is *somewhere* in Product X, `SHORTEST_PATH`
    works fine.


    But often in a graph like this (commonly referred to as a bill of materials) you
    want to know all the places where that part is included and likely even how many
    of that part is included in the entire structure.


    Consider next if the graph was actually like this one in Figure [7-2](#508094_1_En_7_Chapter.xhtml#Fig2).


    ![](images/508094_1_En_7_Chapter/508094_1_En_7_Fig2_HTML.png)


    A graph structure. Product X is divided into Part Y via 5 and Part Z via 3\. Part
    Z is connected to Part Z 1 via 2\. Part Y via 3 and part Z 1 via 1 lead to, part
    included.


    Figure 7-2


    Expanded bill of materials example group


    If you use `SHORTEST_PATH` on this graph to determine where you are using the
    Part Included, it will only show up as being part of Part Y, unless you start
    traversing from Part Z. When you start looking at the code to rectify this issue,
    this thought process kind of indicates what you must do to handle this in code.
    Traverse the tree one level at a time and get all nodes. Luckily, SQL offers the
    CTE construct that makes this relatively easy to do (though not in comparison
    to `SHORTEST_PATH``)`.


    In a bill of materials, you also commonly will have magnitudes on the edges. Take
    a box of donuts. Say the box contains two Plain, three Chocolate Covered, and
    eight Crème Filled. If you are summing sales from the donut box structure, you
    have four nodes: one for the box and three adjacent nodes for each type of donut.
    The edges have magnitude. And every receipt is a node in the daily sales structure,
    where each receipt is independent but the products they include are the same.


    As demonstrated in the past chapter, summing edge values in a tree is quite simple.
    Here, however, you run into the issues with `SHORTEST_PATH`. Values will be dropped
    off any aggregates as nodes show up in the structure more than one time. So if
    you try to sum the sales of all maple bacon donuts for the day via `SHORTEST_PATH`,
    you might see that only 12 were sold. (They were delicious.)


    So, you need to change the approach to how you process the data somewhat and I
    will show that in this chapter.'
  trans: '

    # 7. 其他有向无环图


    最后，在 6-3 节的表中，你可以看到，即使使用任何一种方法将 29.8 万行数据输出到临时表中并进行格式化以供查看，也并非一项繁重的任务，特别是考虑到所使用的机器（我从未用完分配给
    SQL Server 的所有 RAM，因此这基本上是一个 CPU 问题，而且由于 `MAXDOP = 1`，我只使用了单个 CPU）。路径法在处理过程中已经包含了一些按我期望格式化的数据，因此通常速度更快。


    表 6-3


    获取一个节点的所有子节点两次的近似时间


    | *获取所有子节点的时间* | | | |

    | --- | --- | --- | --- |

    | 名称 | 行数 | SQL Graph | 路径 |

    | --- | --- | --- | --- |

    | 小型 | 8 | 0.032 | < .000000 |

    | 大型 | 3400 | 0.078 | 0.032 |

    | 宽型 | 55301 | 1.21 | 0.34 |

    | 深度型 | 42101 | 1.08 | 0.33 |

    | 巨型 | 298001 | 8.92 | 2.9 |


    我执行的最后一项测试是验证：如果我有 `NodeX` 和 `NodeY`，`NodeX` 是否是 `NodeY` 的子节点？对于所有这些测试，使用每种算法所花费的时间都可以忽略不计，甚至在六位精度下通常都显示不出来。因此，我没有将其作为表格输出，但关键在于，当你处理数据的特定切片时，无论数据集有多大，每种方法都可以非常快。


    就像使用关系引擎的几乎任何查询一样，如果可以使用索引来限制处理的数据量，即使数据量巨大，也能快速工作。SQL Graph 查询也是如此。只有当涉及大量数据时，处理时间才会增加（并且并行性成为问题，至少在
    SQL Server 2022 RTM 版本中是如此）。


    ## 总结


    在这篇关于树结构的第二章中，我希望不仅能让你了解一些可用于树结构的技术，还能让你感受到，即使在一台绝非服务器级别的非常小的计算机上，也可以处理多大规模的数据集。我甚至没有深入探讨硬件利用率和带宽问题，因此当你开始在真实系统中使用这些工具并配备服务器级硬件时，效果可能因人而异。


    无论如何，一个拥有近 30 万个节点的树结构绝不算小（当然也并非大得惊人），而我们能够相当快速地处理所有行，无论是使用原生的 SQL Graph 功能，还是使用替代的路径法以及构建辅助表。我承认，花费近
    5 分钟来构建辅助表似乎时间很长，但根据你的需求，这可能是值得的，特别是如果你使用图进行分析目的。而且，如果你能承受重新生成辅助表的延迟，可以将它们放入暂存表中然后交换出去，而不会被用户真正注意到。


    # 7. 其他有向无环图


    在本章中，我想提供一个相对简短的示例和讨论，关于那些不是树的有向无环图（DAG）。早在第 1 章，我就将它们命名为多重层级结构，而非层次结构。


    与树不同，在本章我要讨论的结构中，多重层级结构中的一个节点可以拥有任意多你想要和需要的入边/父关系。这将使结构的验证和编程变得有些更有趣，因为 SQL Server
    实现的内置代码并未涵盖图的所有用途。


    ## 问题集


    当处理不是树的 DAG 时，许多常见处理将是用于处理树的算法的子集。在每种情况下，你都是从结构中的某个节点开始，并沿着结构向下处理，通常使用与之前相同的 `SHORTEST_PATH`
    代码。


    只是 `SHORTEST_PATH` 的工作方式有一个小问题。它只会找到每个节点一次。对于树，由于每个节点只能有一个父节点，因此总是保证它在路径中只被找到一次。所以，没有问题。


    但请看图 7-1 中的图。


    ![](img/508094_1_En_7_Fig1_HTML.jpg)


    图结构。产品 X 分为零件 Y 和零件 Z，两者都指向“included part”。


    图 7-1


    简单的多重层级结构


    如果你使用 `SHORTEST_PATH` 来查看产品 X 是否包含零件“included part”，它将显示为与零件 Y 或零件 Z 相关，但不会同时与两者相关。因此，如果你只想知道零件“included
    part”*在某处*属于产品 X 的一部分，`SHORTEST_PATH` 工作良好。


    但在这种图中（通常称为物料清单），你通常想知道该零件被包含的所有位置，甚至可能想知道在整个结构中包含了该零件的多少数量。


    接下来考虑图如果实际如图 7-2 中的那样。


    ![](img/508094_1_En_7_Fig2_HTML.png)


    图结构。产品 X 通过数量 5 连接到零件 Y，通过数量 3 连接到零件 Z。零件 Z 通过数量 2 连接到零件 Z1。零件 Y 通过数量 3 和零件 Z1
    通过数量 1 都导向“included part”。


    图 7-2


    扩展的物料清单示例组


    如果你在这个图上使用 `SHORTEST_PATH` 来确定零件“included part”被用在何处，它只会显示为是零件 Y 的一部分，除非你从零件 Z
    开始遍历。当你开始研究解决此问题的代码时，这种思路在一定程度上指明了你必须如何在代码中处理此问题：一次遍历树的一层并获取所有节点。幸运的是，SQL 提供了
    CTE（公用表表达式）结构，使得这相对容易实现（尽管与 `SHORTEST_PATH` 相比并不简单）。


    在物料清单中，你通常还会在边上具有数量。以一盒甜甜圈为例。假设盒子里包含两个原味、三个巧克力涂层和八个奶油夹心。如果你要从甜甜圈盒结构中汇总销售额，你有四个节点：一个代表盒子，三个相邻节点代表每种甜甜圈。边上有数量。而每张收据都是日销售结构中的一个节点，每张收据是独立的，但它们包含的产品是相同的。


    正如前一章所演示的，在树中汇总边值相当简单。然而在这里，你会遇到 `SHORTEST_PATH` 的问题。任何聚合值都会被丢弃，因为节点在结构中多次出现。因此，如果你试图通过
    `SHORTEST_PATH` 汇总当天所有枫糖培根甜甜圈的销量，你可能会发现只卖出了 12 个。（它们很美味。）


    因此，你需要稍微改变处理数据的方法，我将在本章中展示这一点。

    '
- fmt: '## The Example


    For this chapter, you are going to implement a very simple bill of materials (shortened
    to BOM when it gets repetitive). This example is of a simple shelf system you
    might purchase from your favorite purveyor of meatballs (the reference is meaningless
    to the example, but if you know, you know).


    What looks like a huge solid shelf is actually packaged in about 1,000 pieces.
    Some of those pieces are used in multiple areas of the shelves. It is very common
    for there to be repetition in the parts included, from screws and dowels to shelves
    and pieces of glass. Anything that can be reused from product to product is reused.


    ![](images/508094_1_En_7_Chapter/508094_1_En_7_Fig3_HTML.jpg)


    A tree diagram presents the components and assembly process for Shelvii, which
    includes a Shelf Set, Flat Shelf, Wooden Dowel Pack with wooden screws, and Shelvii
    side. Shelf Set has Shelf Enhancer, small screw pack, and flat shelf. Each Small
    Screw Pack has Small Screws.


    ### Figure 7-3 Breakdown of the fictional Shelvii shelf system


    In Figure [7-3](#508094_1_En_7_Chapter.xhtml#Fig3), I sketched a tree representation
    of what I call the Shelvii. Note that there are some duplications in the names
    found in the structure, as the `Small Screw Pack` and `Small Screw` nodes are
    in there more than one time. There are identifiers that are key values for the
    overall product system because things like the `Wooden Dowel Pack` probably show
    up in other products like the Tablii system, and there are probably various sized
    packs of dowels that can be included. This example is only as complex as I needed
    to show the basic issues. It would not be hard to extrapolate to multiple products,
    product lines, and so on.


    There is also a `Flat Shelf` that is repeated for the main system. The idea is
    that the same `Flat Shelf` is used for the top and the bottom, but just doesn''t
    need the shelf enhancer, so it is standalone. Note too that I completely ignore
    packaging in this discussion. Only the parts that make up the shelf are included,
    and I ignore details like if the part can be sold individually too.


    Without turning this into a modular furniture design article, I wanted to include
    a reasonably realistic example because there are a few things you will almost
    certainly want to do with this data that is unlike a tree. In Figure [7-4](#508094_1_En_7_Chapter.xhtml#Fig4),
    I remodeled this graph and consolidated the nodes that were the same into a DAG.
    In the first drawing, there were two `Small Screw Pack` nodes; there is now just
    one, but there are two relationships that connect to that one node.


    ![](images/508094_1_En_7_Chapter/508094_1_En_7_Fig4_HTML.jpg)


    A structure diagram presents the components of Shelvii, with Shelf set, Flat shelf,
    Small screw pack, Wooden dowel pack, and Shelvii side. Shelf set has Shelf enhancer,
    Flat shelf, and small screw pack. Small screw pack has small screws and wooden
    dowel pack has wooden dowel.


    ### Figure 7-4 DAG that represents reuse of items in structure


    Now the graph shows that both the `Shelvii` node and the `Shelf Set` node are
    parents to the `Small Screw Pack` nodes. This tells the person fetching these
    items to fetch (at least) two of the `Small Screw Pack` bags if they are assembling
    the entire product all at once.


    I see processes to create packaging to match each of the nodes. So there are bins
    of `Shelf Enhancers`, `Flat Shelves`, `Small Screws`, `Wooden Dowels`, and `Shelvii
    Sides`. Proceed up the list, and there are processes to package a `Shelf Set`,
    `Small Screw Pack`, and `Wooden Dowel Pack` and still more bins to hold them.
    Some of these packs may be used in different shelf systems, some not. If one system
    needs 20 small screws and another 2, then there is more than one `Small Screw
    Pack` size. For sake of brevity, give me a modicum of leeway in my example to
    keep it simple.


    Lastly, to finish up the setup, we need magnitudes. In Figure [7-5](#508094_1_En_7_Chapter.xhtml#Fig5),
    I add the number of each item needed per shelf system.


    ![](images/508094_1_En_7_Chapter/508094_1_En_7_Fig5_HTML.jpg)


    A structure diagram presents the components of Shelvii, with 3 Shelf set, 2 Flat
    shelf, 2 Small screw pack, 5 Wooden dowel pack, and 2 Shelvii side. Shelf set
    has 2 Shelf enhancer, 1 Flat shelf, and 3 small screw pack. Small screw pack has
    3 small screws and wooden dowel pack has 3 wooden dowels.


    ### Figure 7-5 Fleshed-out graph for the Shelvii project


    In the downloads for this chapter, I include the typical objects for this structure
    and queries to build the node and edge table. I keep it to just the necessary
    data needed to represent the DAG. There is a `PartsSystem.Part` node table (with
    a trigger that prevents cycles) and a `PartsSystem.Includes` edge. I also include
    an interface view so you can work with the data using simple `INSERT`, `UPDATE`,
    and `DELETE` statements.


    The edge has an `IncludeCount` column. I also built a `PartsSystem_UI` schema
    that lets us insert new `Parts` relationships very easily (as covered back in
    Chapter [4](#508094_1_En_4_Chapter.xhtml)). All of this code is in the downloads
    in the Chapter [7](#508094_1_En_7_Chapter.xhtml) file named `0001-CreateObjects.sql`.
    The data is loaded using the `0002-LoadData.sql` file.


    This query shows the data in the system after executing the queries in the aforementioned
    files:


    ```

    SELECT *

    FROM   PartsSystem_UI.Part_Includes_Part;

    ```


    This returns the following data (which matches Figure [7-5](#508094_1_En_7_Chapter.xhtml#Fig5)):


    ```

    PartName                 IncludeCount IncludesPartName

    ------------------------ ------------ -------------------------

    Shelvii                  3            Shelf Set

    Shelvii                  2            Flat Shelf

    Shelvii                  5            Small Wooden Dowel Pack

    Shelvii                  2            Shelvii Side

    Shelvii                  2            Small Screw Pack

    Shelf Set                2            Shelvii Shelf Enhancer

    Shelf Set                1            Flat Shelf

    Shelf Set                3            Small Screw Pack

    Small Screw Pack         3            Small Screw

    Small Wooden Dowel Pack  3            Wooden Dowel

    ```


    In the rest of the chapter, you will implement several of the types of queries
    you will typically want to do with a bill of materials:


    *   Determining if a part is used in a build


    *   Picking items for a certain build like the screws for the Screw Pack or shelves
    for the Shelf Set


    *   Printing and summing out the parts list for a build'
