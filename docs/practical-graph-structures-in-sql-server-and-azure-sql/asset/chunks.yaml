    JOIN  [SqlGraph].[Company$ReturnHierarchy]

    (@DisplayFromNodeName) AS CompanyHierarchyDisplay

    ON CompanyHierarchyDisplay.CompanyId =

    ExpandedHierarchy.ParentCompanyId

    )

    ```


    `CompanyTotals` CTE 只是获取每个独立公司的销售数据并进行求和：


    ```sql

    ,--get totals for each Company for the aggregate

    CompanyTotals

    AS (SELECT CompanyId,

    SUM(cast(Amount as decimal(20,2))) AS TotalAmount

    FROM SqlGraph.Sale

    GROUP BY CompanyId),

    --aggregate each Company for the Company

    ```


    然后，您将数据聚合到 `ParentCompany` 值，包括最终显示所需的内容：


    ```sql

    Aggregations AS

    (SELECT FilterAndSweeten.ParentCompanyId,

    SUM(CompanyTotals.TotalAmount) AS TotalSalesAmount,

    MAX(hierarchy) AS hierarchy,

    MAX(hierarchyDisplay) AS hierarchyDisplay

    FROM FilterAndSweeten

    JOIN CompanyTotals

    ON CompanyTotals.CompanyId =

    FilterAndSweeten.ChildCompanyId

    GROUP BY FilterAndSweeten.ParentCompanyId)

    ```


    最后，数据在此额外步骤中显示，只是为了使排序更容易：


    ```sql

    --display the data...

    SELECT Aggregations.ParentCompanyId,

    Aggregations.hierarchyDisplay,

    Aggregations.TotalSalesAmount

    FROM Aggregations

    ORDER BY Aggregations.hierarchy

    END;

    ```


    显然，代码中有很多内容，但像大多数 SQL 代码一样，一旦深入理解它在做什么，就相当直接了，并且它以非常强大的方式使用了关系引擎和图形引擎。


    ## 总结


    在本章中，我展示了您需要实现自己组织树形结构的大部分代码：创建、修改、查询甚至销毁层次结构的方法。


    到目前为止，您使用的是一个非常小的数据集，但在下一章中，您将把数据量增加五个数量级，并探索构建更大数据集的方法（假设您的生产树中节点超过八个）。'
- fmt: '# 6. Tree Structures, Algorithms, and Performance


    One of the most universally useful versions of a graph we have discussed (especially
    in Chapter [5](#508094_1_En_5_Chapter.xhtml)) is a tree. It shows up in sales
    organizations where regions roll up to districts, which in turn roll up to sites
    and then to individual salespersons. Rolling up and comparing sales at each level
    year over year is one of the most important reports many organizations have. Rolling
    up sales by region is also be one of my primary demonstrations for each of the
    tree implementations I include in the individual chapters that will cover these
    methods in greater detail.


    So far I haven’t talked too much about how much data you can process using the
    SQL Graph objects. In this chapter, you are going to be putting not only the SQL
    Graph objects to test, but you are also going to learn a couple of other ways
    you can create tree objects in SQL Server and get some insight into how they perform.


    For the data structure configurations (other than SQL Graph, which was introduced
    in Chapter [5](#508094_1_En_5_Chapter.xhtml)), you will see the basic algorithm
    for how the method works, the code to insert data, and how to replicate the queries
    on the data as built in Chapter [5](#508094_1_En_5_Chapter.xhtml) for SQL Graph.
    (The download contains the entire implementation details to match the SQL Graph
    objects created in the previous chapter, as well as several other implementations.)


    After exploring the algorithms, you will use some test data scripts to load varying
    sized data samples and then you will compare how SQL Graph compares to the other
    algorithms, both in querying lots of rows as well as creating a lot of rows.


    ## Alternative Tree Implementation


    All the graphs we have discussed so far have been variations on the adjacency
    list theme. We have a table to hold the relationships (edge) between two objects
    (nodes) and, depending on the limitations we put on the relationship key values,
    we get a cyclic or acyclic graph. For pretty much any graph configuration other
    than a strict tree structure, this is an optimum implementation.


    Using an adjacency list/breadth-first algorithm in relational tables (and even
    graph structures) can have some performance limitations (each level you must fetch
    adds costs, and for really large trees it can add up pretty quickly due to the
    storage costs). Some uses of trees need extremely low latency access (for example,
    when you log into a computer system, you are probably in multiple security groups
    that are also members of security groups, and you don’t want users waiting even
    seconds to get their security fetched). As such, you will learn a couple of performance-friendly
    methods to increase certain kinds of performance (at slightly higher maintenance
    costs, since magic truly does come at a price).


    Luckily, trees are very specific structures that are rigid compared to other graph
    uses. To help with the performance issues, some very enterprising people defined
    several methods of implementing a tree in a relational database using other methods
    than the adjacency list method we have discussed in this book so far.


    In this chapter, you will use the exact same tree structure as in Chapter [5](#508094_1_En_5_Chapter.xhtml),
    which you can see in Figure [6-1](#508094_1_En_6_Chapter.xhtml#Fig1) (this is
    the same graph as Chapter [5](#508094_1_En_5_Chapter.xhtml)’s Figure 5-1). Keeping
    a steady output from your queries is essential when comparing algorithms, both
    for performance and applicability to your solution. Later in this chapter, I will
    introduce five fixed sets of data that I will use for the performance tests, and
    a big part of refining these algorithms was to make sure they all output the same
    answers when asked the same questions.


    ![](images/508094_1_En_6_Chapter/508094_1_En_6_Fig1_HTML.jpg)


    A tree structure diagram. Company H Q classified as Maine H Q and Tennessee H
    Q. Maine H Q includes Portland Branch and Camden Branch. Tennessee H Q includes
    Nashville Branch, Knoxville Branch and Memphis Branch.


    Figure 6-1: Example tree structure


    Those five sets of data, randomly generated, will help gauge the time to load
    a tree and process a tree. By “process a tree,” you will build code that tests
    common processes you will do with a tree (using the objects introduced in Chapter
    [5](#508094_1_En_5_Chapter.xhtml)), such as summarizing the data for each node
    in the tree. Each root node will be assigned some amount of sales data, and then
    you will present the output of the amount of sales at each branch, local headquarters,
    and company headquarters. Each of the methods of implementing a tree will do this
    differently.


    I have so far talked about the adjacency list, and I include the structure as
    it could be built in Figure [6-2](#508094_1_En_6_Chapter.xhtml#Fig2). You know
    that the internals of the SQL Graph data structures used so far are similar to
    this, where there is a separate table that stores the `Company` and `ReportsTo`
    Company.


    ![](images/508094_1_En_6_Chapter/508094_1_En_6_Fig2_HTML.jpg)


    A hierarchical organizational structure where the Company H Q Company l d = 1,
    Reports To = NULL is at the top with two child companies, Maine H Q Company l
    d = 2, Reports To = 1 and Tennessee H Q Company l d = 3, Reports To = 1, each
    with their own child branches.


    Figure 6-2: Adjacency list example


    In this chapter, you will learn about two additional methods of storing your graph
    data in permanent tables, which have some advantage over, or assistance with,
    the SQL Graph/adjacency list method.


    ### Path technique


    Instead of storing adjacent members in the graph, you store the path from the
    node to the tree root in a formatted text string. This is a very-simple-to-query,
    moderately-hard-to-maintain method that provides amazing performance.


    ### Adding helper tables


    Adding tables that serve as indexes in the structure and precalculating data to
    allow queriers to skip some of the iterative operations that are required when
    processing tree.


    There are a few other methods I want to briefly mention but I won’t fully implement
    for this book. The first is using the `hierarchyid` datatype in SQL Server. While
    not terrible, SQL Graph is a better implementation overall and ought to be the
    way you go when working with graphs.


    The second is really interesting, but the pain is worse than the value for almost
    any implementations I can think of. This is the nested sets, but the limitations
    and costs led me to leave it out of the book. There were two limiting factors
    for me. One is that loading a nested set structure is time-consuming row by row.
    The performance benefits over some other methods are painful. The other is that
    viewing the data is a hierarchical view isn’t natural to the method. It is, however,
    extremely efficient at finding the children and parents of a row in a graph of
    any size.


    Nested sets were introduced in 1992 by Michael J. Kamfonas in an article titled
    “Recursive Hierarchies: The Relational Taboo!” in *The Relational Journal*, October/November
    1992. It is also a favorite method of Joe Celko, who has written a book about
    hierarchies in *Joe Celko’s Trees and Hierarchies in SQL for Smarties* (Morgan
    Kaufmann, 2004); check it out (now in its second edition, 2012) for further reading
    about this and other types of hierarchies.


    (Note: In my `drsqlgithub` repository in the `GraphBook1` project, there is bonus
    code that implements far more than what is included in the book. It is on my GitHub
    repository because it will continue to grow as time passes.)'
  raw: '# 6. Tree Structures, Algorithms, and Performance


    One of the most universally useful versions of a graph we have discussed (especially
    in Chapter [5](#508094_1_En_5_Chapter.xhtml)) is a tree. It shows up in sales
    organizations where regions roll up to districts, which in turn roll up to sites
    and then to individual salespersons. Rolling up and comparing sales at each level
    year over year is one of the most important reports many organizations have. Rolling
    up sales by region is also be one of my primary demonstrations for each of the
    tree implementations I include in the individual chapters that will cover these
    methods in greater detail.


    So far I haven’t talked too much about how much data you can process using the
    SQL Graph objects. In this chapter, you are going to be putting not only the SQL
    Graph objects to test, but you are also going to learn a couple of other ways
    you can create tree objects in SQL Server and get some insight into how they perform.


    For the data structure configurations (other than SQL Graph, which was introduced
    in Chapter [5](#508094_1_En_5_Chapter.xhtml)), you will see the basic algorithm
    for how the method works, the code to insert data, and how to replicate the queries
    on the data as built in Chapter [5](#508094_1_En_5_Chapter.xhtml) for SQL Graph.
    (The download contains the entire implementation details to match the SQL Graph
    objects created in the previous chapter, as well as several other implementations.)


    After exploring the algorithms, you will use some test data scripts to load varying
    sized data samples and then you will compare how SQL Graph compares to the other
    algorithms, both in querying lots of rows as well as creating a lot of rows.


    ## Alternative Tree Implementation


    All the graphs we have discussed so far have been variations on the adjacency
    list theme. We have a table to hold the relationships (edge) between two objects
    (nodes) and, depending on the limitations we put on the relationship key values,
    we get a cyclic or acyclic graph. For pretty much any graph configuration other
    than a strict tree structure, this is an optimum implementation.


    Using an adjacency list/breadth-first algorithm in relational tables (and even
    graph structures) can have some performance limitations (each level you must fetch
    adds costs, and for really large trees it can add up pretty quickly due to the
    storage costs). Some uses of trees need extremely low latency access (for example,
    when you log into a computer system, you are probably in multiple security groups
    that are also members of security groups, and you don’t want users waiting even
    seconds to get their security fetched). As such, you will learn a couple of performance-friendly
    methods to increase certain kinds of performance (at slightly higher maintenance
    costs, since magic truly does come at a price).


    Luckily, trees are very specific structures that are rigid compared to other graph
    uses. To help with the performance issues, some very enterprising people defined
    several methods of implementing a tree in a relational database using other methods
    than the adjacency list method we have discussed in this book so far.


    In this chapter, you will use the exact same tree structure as in Chapter [5](#508094_1_En_5_Chapter.xhtml),
    which you can see in Figure [6-1](#508094_1_En_6_Chapter.xhtml#Fig1) (this is
    the same graph as Chapter [5](#508094_1_En_5_Chapter.xhtml)’s Figure 5-1). Keeping
    a steady output from your queries is essential when comparing algorithms, both
    for performance and applicability to your solution. Later in this chapter, I will
    introduce five fixed sets of data that I will use for the performance tests, and
    a big part of refining these algorithms was to make sure they all output the same
    answers when asked the same questions.


    ![](images/508094_1_En_6_Chapter/508094_1_En_6_Fig1_HTML.jpg)


    A tree structure diagram. Company H Q classified as Maine H Q and Tennessee H
    Q. Maine H Q includes Portland Branch and Camden Branch. Tennessee H Q includes
    Nashville Branch, Knoxville Branch and Memphis Branch.


    Figure 6-1


    Example tree structure


    Those five sets of data, randomly generated, will help gauge the time to load
    a tree and process a tree. By “process a tree,” you will build code that tests
    common processes you will do with a tree (using the objects introduced in Chapter
    [5](#508094_1_En_5_Chapter.xhtml)), such as summarizing the data for each node
    in the tree. Each root node will be assigned some amount of sales data, and then
    you will present the output of the amount of sales at each branch, local headquarters,
    and company headquarters. Each of the methods of implementing a tree will do this
    differently.


    I have so far talked about the adjacency list, and I include the structure as
    it could be built in Figure [6-2](#508094_1_En_6_Chapter.xhtml#Fig2). You know
    that the internals of the SQL Graph data structures used so far are similar to
    this, where there is a separate table that stores the `Company` and `ReportsTo`
    Company.


    ![](images/508094_1_En_6_Chapter/508094_1_En_6_Fig2_HTML.jpg)


    A hierarchical organizational structure where the Company H Q Company l d = 1,
    Reports To = NULL is at the top with two child companies, Maine H Q Company l
    d = 2, Reports To = 1 and Tennessee H Q Company l d = 3, Reports To = 1, each
    with their own child branches.


    Figure 6-2


    Adjacency list example


    In this chapter, you will learn about two additional methods of storing your graph
    data in permanent tables, which have some advantage over, or assistance with,
    the SQL Graph/adjacency list method.


    *   **Path technique:** Instead of storing adjacent members in the graph, you
    store the path from the node to the tree root in a formatted text string. This
    is a very-simple-to-query, moderately-hard-to-maintain method that provides amazing
    performance.


    *   **Adding helper tables:** Adding tables that serve as indexes in the structure
    and precalculating data to allow queriers to skip some of the iterative operations
    that are required when processing tree.


    There are a few other methods I want to briefly mention but I won’t fully implement
    for this book. The first is using the `hierarchyid` datatype in SQL Server. While
    not terrible, SQL Graph is a better implementation overall and ought to be the
    way you go when working with graphs.


    The second is really interesting, but the pain is worse than the value for almost
    any implementations I can think of. This is the nested sets, but the limitations
    and costs led me to leave it out of the book. There were two limiting factors
    for me. One is that loading a nested set structure is time-consuming row by row.
    The performance benefits over some other methods are painful. The other is that
    viewing the data is a hierarchical view isn’t natural to the method. It is, however,
    extremely efficient at finding the children and parents of a row in a graph of
    any size.


    Nested sets were introduced in 1992 by Michael J. Kamfonas in an article titled
    “Recursive Hierarchies: The Relational Taboo!” in *The Relational Journal*, October/November
    1992\. It is also a favorite method of Joe Celko, who has written a book about
    hierarchies in *Joe Celko’s Trees and Hierarchies in SQL for Smarties* (Morgan
    Kaufmann, 2004); check it out (now in its second edition, 2012) for further reading
    about this and other types of hierarchies.


    (Note: In my drsqlgithub repository in the GraphBook1 project, there is bonus
    code that implements far more than what is included in the book. It is on my GitHub
    repository because it will continue to grow as time passes.)'
  trans: '

    # 6. 树结构、算法与性能


    我们讨论过的图（graph）最普遍有用的版本之一（尤其是在第 5 章）是树（tree）。它出现在销售组织中，区域（regions）汇总到地区（districts），地区再汇总到站点（sites），然后到各个销售人员（salespersons）。按年比较每个层级的汇总销售情况是许多组织最重要的报告之一。按区域汇总销售也将是我将在单独章节中介绍的每种树实现方法的主要演示之一，这些章节将更详细地涵盖这些方法。


    到目前为止，我还没有过多讨论使用 SQL 图对象可以处理多少数据。在本章中，你不仅将测试 SQL 图对象，还将学习在 SQL Server 中创建树对象的其他几种方法，并深入了解它们的性能表现。


    对于数据结构配置（除了在第 5 章介绍的 SQL Graph 之外），你将看到该方法工作原理的基本算法、插入数据的代码，以及如何复制在第 5 章为 SQL
    Graph 构建的查询。（下载内容包含与上一章创建的 SQL Graph 对象相匹配的完整实现细节，以及其他几种实现。）


    在探索算法之后，你将使用一些测试数据脚本来加载不同规模的数据样本，然后比较 SQL Graph 与其他算法在查询大量行和创建大量行方面的表现。


    ## 替代的树实现


    到目前为止我们讨论的所有图都是邻接表（adjacency list）主题的变体。我们有一个表来保存两个对象（节点）之间的关系（边），并且根据我们对关系键值设置的限制，我们得到一个循环图或非循环图。对于除了严格树结构之外的几乎所有图配置，这都是一种最优实现。


    在关系表（甚至图结构）中使用邻接表/广度优先算法可能会有一些性能限制（你必须获取的每个层级都会增加成本，对于非常大的树，由于存储成本，这种增加会相当快）。某些树的使用需要极低延迟的访问（例如，当你登录计算机系统时，你可能属于多个安全组，而这些安全组本身也是其他安全组的成员，你肯定不希望用户等待数秒来获取他们的安全权限）。因此，你将学习几种性能友好的方法来提升特定类型的性能（代价是略高的维护成本，因为魔法确实是有代价的）。


    幸运的是，树是非常特定的结构，与其他图的用途相比是刚性的。为了帮助解决性能问题，一些富有进取心的人定义了几种在关系数据库中实现树的方法，这些方法使用了本书迄今为止讨论的邻接表方法之外的其他方法。


    在本章中，你将使用与第 5 章完全相同的树结构，如图 6-1 所示（这与第 5 章的图 5-1 相同）。在比较算法时，保持查询输出的一致性至关重要，无论是对于性能还是解决方案的适用性都是如此。在本章后面，我将介绍五组固定数据用于性能测试，完善这些算法的一个重要部分就是确保它们在回答相同问题时输出相同的答案。


    ![](img/508094_1_En_6_Fig1_HTML.jpg)


    一个树结构图。公司总部（Company H Q）分为缅因州总部（Maine H Q）和田纳西州总部（Tennessee H Q）。缅因州总部包括波特兰分公司（Portland
    Branch）和卡姆登分公司（Camden Branch）。田纳西州总部包括纳什维尔分公司（Nashville Branch）、诺克斯维尔分公司（Knoxville
    Branch）和孟菲斯分公司（Memphis Branch）。


    图 6-1：树结构示例


    这五组随机生成的数据将有助于衡量加载树和处理树所需的时间。“处理树”是指，你将编写代码来测试对树执行的常见操作（使用第 5 章介绍的对象），例如汇总树中每个节点的数据。每个根节点将被分配一定数量的销售数据，然后你将展示每个分公司、地方总部和公司总部的销售额输出。每种实现树的方法执行此操作的方式会有所不同。


    到目前为止我谈到了邻接表，并在图 6-2 中展示了其可能的构建结构。你知道到目前为止使用的 SQL Graph 数据结构的内部与此类似，其中有一个单独的表存储
    `Company` 和 `ReportsTo` Company。


    ![](img/508094_1_En_6_Fig2_HTML.jpg)


    一个层级组织结构图，公司总部（Company H Q）Company l d = 1，Reports To = NULL 位于顶部，有两个子公司：缅因州总部（Maine
    H Q）Company l d = 2，Reports To = 1 和田纳西州总部（Tennessee H Q）Company l d = 3，Reports
    To = 1，它们各自拥有自己的分公司。


    图 6-2：邻接表示例


    在本章中，你将学习另外两种将图数据存储在永久表中的方法，它们相对于 SQL Graph/邻接表方法具有一些优势或辅助作用。


    ### 路径技术


    不是在图中存储相邻成员，而是将从节点到树根的路径以格式化的文本字符串形式存储。这是一种查询非常简单、维护难度中等的方法，能提供惊人的性能。


    ### 添加辅助表


    添加在结构中充当索引的表，并预计算数据，以允许查询者跳过处理树时所需的一些迭代操作。


    还有其他几种方法我想简要提及，但不会在本书中完全实现。第一种是使用 SQL Server 中的 `hierarchyid` 数据类型。虽然不算差，但 SQL
    Graph 总体上是更好的实现，应该是在处理图时的首选方式。


    第二种方法非常有趣，但就我能想到的几乎所有实现而言，其痛点大于价值。这就是嵌套集（nested sets），但其局限性和成本让我决定在本书中省略它。对我来说有两个限制因素。一是逐行加载嵌套集结构非常耗时。它相对于其他一些方法的性能提升令人痛苦。二是以层次化视图查看数据对该方法来说并不自然。然而，它在查找图中任何大小的行的子节点和父节点方面极其高效。


    嵌套集是由 Michael J. Kamfonas 在 1992 年 10/11 月期的 *The Relational Journal* 上一篇题为 "Recursive
    Hierarchies: The Relational Taboo!" 的文章中提出的。它也是 Joe Celko 钟爱的方法，他写了一本关于层次结构的书《*Joe
    Celko’s Trees and Hierarchies in SQL for Smarties*》（Morgan Kaufmann，2004 年）；如需进一步了解此方法及其他类型的层次结构，请参阅该书（现在已有第二版，2012
    年）。


    （注：在我的 `drsqlgithub` 仓库的 `GraphBook1` 项目中，有额外代码实现了远超本书所包含的内容。它在我的 GitHub 仓库上，因为随着时间推移它还会继续增长。）

    '
- fmt: '### Path Technique


    The path technique takes a textual path representation and stores it to make accessing
    data quick. Figure [6-3](#508094_1_En_6_Chapter.xhtml#Fig3) shows the sample graph
    with the path values.


    ![](images/508094_1_En_6_Chapter/508094_1_En_6_Fig3_HTML.png)


    A hierarchical organizational structure where the Company H Q Company l d = 1,
    path= 1 is at the top with two child companies, Maine H Q Company l d = 2, path=
    1, 2 and Tennessee H Q Company l d = 3, path= 1, 3 each with their own child branches.


    Figure 6-3


    Sample graph structure with path indicated


    I don’t really know who originated this method, but I learned it from Paul Nielsen
    many years ago when we were chatting about the nested sets method I had only recently
    heard of. His point was about how easy and fast this method is. It really and
    truly is. Once you store the data, you have this easy-to-query structure that
    can be interrogated with straightforward SQL queries with no looping needed.


    The base of this method is storing every node’s path from root to that node. With
    that information, querying for children or parent nodes is as simple as using
    a `LIKE` expression. Typically, each of the path tags in the hierarchy will use
    the surrogate key for the key values in the path. All that really matters is that
    it is a relatively immutable value (because changing the key value requires changing
    other rows that use it in the path value) and that it is small (this isn’t 100%
    necessary, but the longer the values, the fewer values can fit in the string and
    still be indexable). SQL Server 2016 and later have a limitation of 1700 bytes
    in a non-clustered index, which is a pretty deep tree since an integer will always
    fit in 10 characters.


    Looking back at Figure [6-3](#508094_1_En_6_Chapter.xhtml#Fig3), the path for
    the `Knoxville Branch` row is `\1\3\6\`. The `CompanyId` is 6, which gives you
    the current node’s value. Then 3 is the next parent, and 1 is the root parent.


    With the path formed and stored in this manner, you can find all the children
    of a node using the path in simple `LIKE` expression. For example, to get the
    children of the `Maine HQ` node, you can use a `WHERE` clause such as `WHERE Path
    LIKE ''\1\2\%''` to get the children or `LIKE ''\1\2[^0-9]%''` if you don’t wish
    to include the trailing delimiter in your path values. The `[^` makes sure the
    following character after your string is not a number and the path to the parents
    is directly in the path too. So, the parents of the `Portland Branch`, whose path
    is `''\1\2\4\''`, are `''\1\2\''` and `''\1\''`. Using `STRING_SPLIT(PathValue,''\'')`
    in SQL Server 2016 and later, this is a fairly easy, and more importantly, non-iterative
    process as well to get the parent nodes in a fairly simple query.


    One of the great things about the path method is that it readily uses indexes
    for most of your queries, because most times it will use the left side of a string
    and/or the values from the primary key of the actual row. Even when you query
    the structure, you can get a view (ordered by surrogate key values) of the data
    in a hierarchical fashion quite easily. Your code can also be adjusted to include
    a user-readable hierarchy for ordering the output, and that path can be far larger
    since you ideally would not be searching on that data.


    Bear in mind that you can index really deep paths, since in 1700 bytes you can
    generally achieve a max of around 150-170 levels, knowing any integer fits into
    10 characters and there will be a separator. However, once your paths are in this
    range of length, you could only end up with four keys per page, which is not going
    to give amazing performance in any case.


    Maintaining the structures using the path method is somewhat of a downside in
    comparison to using an adjacency list type method. Any change to the parent of
    a node can mean modifying the children of that row as well, since they will carry
    around your node’s path, too. This is referred to as **reparenting** when working
    with a tree. If your path is `\1\2\3\4\`, and node with a key value of 2 is reparented
    to be under 6, 2’s path needs to change to `\1\6\2\`, and every child of 2 as
    well, which in certain cases could be hundreds or even millions of rows.


    It can generally be done with using the `REPLACE` function, but the biggest issue
    isn’t how hard the algorithm is to code but how it will affect performance. The
    more rows you must modify, the more rows need to be locked, since you will want
    to do modifications to your tree structures in an explicit transaction in case
    there is an error.


    Probably the biggest concern with this method is that the data does not protect
    itself very well. With the adjacency list model of SQL Graph, the main concern
    you have with keeping the structure a proper tree is making sure that every node
    is in a relationship, in some way, to the root node. But the path is just a string,
    and there is no easy way to make sure that you don’t update the path to be `''fred''`
    or `''10000''`, or worse yet `''\1\2\30000\432\''`, and there aren’t nodes with
    a key of 30000 or 2\. At that point you might be in a world of hurt if you have
    millions of rows.


    For a reparent or even a delete, what happens to child rows is important. You
    can’t delete path `''\1\2\3\''` without deleting or reparenting `''\1\2\3\4\''`
    or you will leave this orphaned row in the structure and unlike a tree, where
    a parentless node will become a root node by default, using the path method, it
    will just become invalid because not every referenced node in the path exists.


    ### Code


    In this section, you are going to see the code that shows how the insert is done
    with the path method. First up is the table structure. Note that the `CompanyId`
    column is not a column with the identity property. Because the path will use the
    `CompanyId` values, generating the value with a `SEQUENCE` object is far easier.
    As usual, I will comment the code so it is hopefully clear what it is doing.


    #### Table Create Script


    The create script is quite easy, just the surrogate key, an identifier, and the
    path (which I make the max size a non-clustered index can hold). This code is
    in the Chapter [6](#508094_1_En_6_Chapter.xhtml) downloads as `1300-Path Method-Objects.sql`.


    ```

    CREATE SCHEMA PathMethod;

    CREATE TABLE PathMethod.Company

    (

    CompanyId INT  NOT NULL CONSTRAINT PKCompany PRIMARY KEY,

    Name VARCHAR(20)  NOT NULL CONSTRAINT AKCompany_Name UNIQUE,

    Path VARCHAR(1700) NOT NULL INDEX Path

    );

    --indexes max out at 1700 bytes. Allows for at least a 1600+

    --deep Hierarchy, which is very deep for most uses, but is a

    --limitation. Removing the index could really hurt perf.

    ```


    #### Insert New Rows


    For the insert, basically the path of the node is acquired for the parent node
    and then used as the prefix for the new node in the data structure:


    ```

    CREATE PROCEDURE PathMethod.Company$Insert

    @Name              varchar(20),

    @ParentCompanyName varchar(20)

    AS

    BEGIN

    --gets Path, which looks like \CompanyId\CompanyId\...

    DECLARE @ParentPath varchar(1700) =

    COALESCE((  SELECT Company.Path

    FROM   PathMethod.Company

    WHERE  Company.Name =

    @ParentCompanyName), ''\'');

    --used a SEQUENCE instead of identity because it made it

    --easier to be able to do the next step in a single statement

    --since the surrogate key is part of the value in the path

    --you could do this with an insert using SCOPE_IDENTITY(),

    --and then update the path if you would rather

    DECLARE @NewCompanyId int = NEXT VALUE FOR

    PathMethod.Company_SEQUENCE;

    --appends the new id to the parents Path

    INSERT INTO PathMethod.Company(CompanyId, Name, Path)

    SELECT @NewCompanyId, @Name,

    @ParentPath + CAST(@NewCompanyId AS varchar(10)) + ''\'';

    END;

    ```


    The download contains the sequence object and the procedure `PathMetho.Sale$InsertTestData`
    to load the sample values, just as in Chapter [5](#508094_1_En_5_Chapter.xhtml).'
