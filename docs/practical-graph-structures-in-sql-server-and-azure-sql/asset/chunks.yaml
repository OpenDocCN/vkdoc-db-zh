  trans: '

    ## 创建数据


    当需要向表中添加行时，向 `NODE`（节点）对象添加行与向任何普通表添加行完全一样。你可以使用任何在基础关系表中创建数据所用的语法。所有的内部图形列都将被自动管理（除非你直接管理它们的值，这将在第
    4 章中介绍）。


    让我们在 `Network.Person` 对象中创建一些数据：

    ```sql

    INSERT INTO Network.Person(FirstName, LastName)

    VALUES(''Fred'', ''Rick''),

    (''Lou'', ''Iss''),

    (''Val'', ''Erry''),

    (''Lee'', ''Roy''),

    (''Saa'', ''Lee''),

    (''Joe'', ''Seph''),

    (''Day'', ''Vid'');

    ```


    接下来，让我们使用 `SELECT *` 从表中查看一些数据以获取所有列：

    ```sql

    SELECT *

    FROM   Network.Person

    WHERE  Person.FirstName = ''Fred''

    AND Person.LastName = ''Rick'';

    ```


    结果很有趣。你不仅会看到一些额外的列，而且这些列的名称也确实很难处理。第一个输出的列看起来像这样：

    ```

    $node_id_C580185613BB42EF81F4A68F6FA539DC


    {"type":"node","schema":"Network","table":"Person","id":0}

    ```


    这个值是对几个内部列的编码（我稍后会讲到），但从 `JSON` 视图中你可以看出这是一个节点，包含模式名、表名，以及一个内部 id 值。该内部 id 是图形数据库引擎的一部分。它与你表中的标识列不同，但非常相似。（不过，正如你将看到的，向其中插入你自己的值要容易得多！）


    表的其余部分如你所料：

    ```

    PersonId    FirstName    LastName       Name             Value

    ----------- ------------ -------------- ---------------- --------

    1           Fred         Rick           Fred Rick        1

    ```


    你可以在查询中使用这个复杂的列名（用方括号括起来，因为 `$` 作为首字符告诉 SQL Server 这是一个伪列）：

    ```sql

    SELECT [$node_id_C580185613BB42EF81F4A68F6FA539DC]

    FROM   Network.Person

    WHERE [$node_id_C580185613BB42EF81F4A68F6FA539DC]  =

    ''{"type":"node","schema":"Network","table":"Person","id":0}'';

    ```


    这段代码返回了与之前相同的 JSON。如果去掉方括号，你会得到以下错误：

    ```

    Msg 126, Level 15, State 2, Line 69

    Invalid pseudocolumn "$node_id_3949CAAFE93D496C9A4CF1F33767B666".

    ```


    伪列是 SQL Server 的一个构造，它允许你在不知道确切名称的情况下使用一个值。在其他地方，尤其是在分区中，还有其他的伪列。在这里，你使用 `$node_id`
    来代替这个值（当你在你的机器上创建这个表时，这个值很可能会改变）：

    ```sql

    -- 不在方括号中，因为这不是列名

    SELECT Person.$node_id

    FROM   Network.Person

    WHERE  Person.$node_id = ''{"type":"node","schema":"Network","table":"Person","id":0}'';

    ```


    对于你创建的边，有几个更复杂的列名，你将使用伪列来处理它们，执行以下代码后你就可以看到：

    ```sql

    SELECT *

    FROM   Network.Follows;

    ```


    这将返回以下输出（你还没有加载任何数据，所以只是查看结构）：

    ```

    $edge_id_3E64B3D47C09432595C25D1FB2146A35


    $from_id_AA09B7FBEA714F918B3C0D19A8B24A0A


    $to_id_4E49D534C24E4F4D8E0E0D207237A425


    ```


    此外，边上还添加了一个 `Value` 列供后续使用。


    这些列名分别被简写为 `$edge_id`、`$from_id`、`$to_id`。后两者需要输入来自节点的 `$node_id` 来标识关系中的起始节点和终止节点。在输入数据时，基本模式类似于以下形式（在下一章，我将展示一些其他的数据创建模式）。基本格式是需要在子查询中查找
    `$from_id` 和 `$to_id` 的值：

    ```sql

    INSERT INTO Network.Follows($from_id, $to_id)

    SELECT (   SELECT Person.$node_id

    FROM   Network.Person

    WHERE  Person.FirstName = ''Fred''

    AND Person.LastName = ''Rick'') AS from_id,

    (   SELECT Person.$node_id

    FROM   Network.Person

    WHERE  Person.FirstName = ''Joe''

    AND Person.LastName = ''Seph'') AS to_id;

    -- from_id 和 to_id 只是为了在调试时更容易查看而起的名字。

    -- 可以是任意名称。

    ```


    现在查看这些数据，你可以看到：

    ```sql

    SELECT *

    FROM   Network.Follows;

    ```


    输出有四列。注意你的列名几乎肯定会不同，并且你可能也有不同的 id 值。

    ```

    $edge_id_3E64B3D47C09432595C25D1FB2146A35


    {"type":"edge","schema":"Network","table":"Follows","id":0}

    $from_id_AA09B7FBEA714F918B3C0D19A8B24A0A


    {"type":"node","schema":"Network","table":"Person","id":0}

    $to_id_4E49D534C24E4F4D8E0E0D207237A425


    {"type":"node","schema":"Network","table":"Person","id":5}

    ```


    你也可以像处理任何其他表一样，使用文本值来插入数据。（首先，清空表，因为你还没有防止重复，这将在下一章介绍。）

    ```sql

    TRUNCATE TABLE Network.Follows;

    -- 使用 truncate 是为了让 id 值重置，只是为了在我的示例中更清晰。

    -- 在实际使用中不需要这样做，在这种情况下这也不那么重要。

    ```


    现在你可以直接使用文本值再次插入行：

    ```sql

    INSERT INTO Network.Follows($from_id, $to_id) VALUES (''{"type":"node","schema":"Network","table":"Person","id":0}'',

    ''{"type":"node","schema":"Network","table":"Person","id":5}'');

    ```


    注意，这些项目是可以直接输入的值，但它们并不是存储在 SQL Server 中的实际值。内部有几列 `bigint` 类型被表示出来。（在下一章，我将向你展示更多关于数据在内部如何格式化的信息，以及当从外部源加载数据时，如何利用这种文本格式的优势。）


    在下载文件中，剩余的行将使用第一种基于查找的格式插入，`SELECT` 语句由 `UNION ALL` 运算符分隔。接下来，让我们展示已创建的数据。


    以下查询是你很少想要执行的，因为目标将是尽量不直接获取内部值。在接下来的几页中，我将开始介绍如何使用 SQL 图形运算符来查询这些数据。然而，这个查询与我们最简单的图形查询直接类似，并且了解如何执行此操作是有用的，因为在使用
    SQL 图形运算符时，没有什么像 `OUTER JOIN` 这样的东西。

    ```sql

    SELECT Person.Name AS PersonName,

    FollowedPerson.Name AS FollowedPersonName

    FROM   Network.Person

    JOIN Network.Follows

    ON Person.$node_id = Follows.$from_id

    JOIN Network.Person AS FollowedPerson

    ON FollowedPerson.$node_id = Follows.$to_id;

    ```


    此查询的输出是你创建的每一条边，显示人物的姓名和他们关注的人的姓名：

    ```

    PersonName     FollowedPersonName

    -------------- ----------------------

    Fred Rick      Joe Seph

    Fred Rick      Lou Iss

    Joe Seph       Saa Lee

    Saa Lee        Lee Roy

    Val Erry       Joe Seph

    Val Erry       Lee Roy

    Lou Iss        Saa Lee

    Lou Iss        Val Erry

    Saa Lee        Fred Rick

    Fred Rick      Val Erry

    Day Vid        Saa Lee

    ```


    如果你回头查看图 3-1，你可以追踪列表中从没有箭头的末端到有箭头末端的每一条线。


    ## 查询数据


    使用 SQL 图形运算符查询数据有点复杂，但它所替代的代码也很复杂。在上一节中，你使用 `JOIN` 运算符查询数据，但在接下来的章节中，这些代码将以一种更紧凑的方式表达。这种紧凑性伴随着一定程度的复杂性。


    你将查看两个级别的数据查询。首先，你将查看直接的节点到节点查询，即你知道要在路径上查找多远来匹配。其次，你将查看遍历所有可能的路径，寻找连接相隔可变长度的节点的方法。

    '
- fmt: "### Node-to-Node Querying\n\n使用 SQL 图对象进行编码时，首要任务是理解查询的工作原理。它们有时与你可能写过的常规\
    \ SQL 查询大不相同。最大的区别在于，你将查询图引擎，该引擎是专门为处理单一数据类型而编写的。数据虽然复杂，但由于它遵循特定模式，其语法要通用得多。\n\
    \n你将使用的语法是 `MATCH` 表达式。它基本上在内部返回一个连接（join）或一组连接的布尔值 TRUE 或 FALSE。例如，以下是几页前的查询使用\
    \ `MATCH` 表达式的重写版本：\n\n```sql\nSELECT      Person.Name AS PersonName,\n      \
    \      FollowedPerson.Name AS FollowedPersonName\nFROM        Network.Person,\n\
    \            Network.Follows,\n            Network.Person AS FollowedPerson\n\
    WHERE MATCH(Person-(Follows)->FollowedPerson);\n```\n\n此查询的输出与之前的查询结果相同（可能排序不同，因为没有\
    \ `ORDER BY` 子句）。让我详细解释一下。\n\n```sql\nFROM        Network.Person,\n          \
    \  Network.Follows,\n            Network.Person AS FollowedPerson\n```\n\n图查询语法最奇怪的特点之一是，当你使用\
    \ `MATCH` 表达式时，不能在查询中使用任何 `ANSI-92` 风格的连接，甚至不能使用逗号等效的 `CROSS JOIN`。尝试下面的查询：\n\n\
    ```sql\nSELECT      CAST(Person.Name AS nvarchar(20)) AS PersonName,\n       \
    \     FollowedPerson.Name AS FollowedPersonName\nFROM        Network.Person\n\
    CROSS JOIN  Network.Follows\nCROSS JOIN  Network.Person AS FollowedPerson\nWHERE\
    \ MATCH(Person-(Follows)->FollowedPerson);\n```\n\n你将看到以下错误：\n\n```\nMsg 13920,\
    \ Level 16, State 1, Line 221\nIdentifier 'Follows' in a MATCH clause is used\
    \ with a JOIN clause or APPLY operator. JOIN and APPLY are not supported with\
    \ MATCH clauses.\n```\n\n你还会看到针对 `Person` 和 `FollowedPerson` 的另外两条错误消息。任何用于获取额外数据的其他连接都需要以不同的方式获取（后面会有示例）。\n\
    \n```sql\nFROM        Network.Person,\n            Network.Follows,\n        \
    \    Network.Person AS FollowedPerson\nWHERE MATCH(Person-(Follows)->FollowedPerson);\n\
    ```\n\n现在来看 `MATCH` 子句。使用一种 `ASCII` 艺术来表示，最基本的 `MATCH` 子句具有 `ObjectName-(Edge)->OtherObjectName`\
    \ 形式，大致可翻译为将 `ObjectName` 连接到 `Edge`，再将 `Edge` 连接到 `OtherObjectName`。如果你使用 SQL\
    \ 图的唯一目的是实现单一的多对多关系，那么可能不值得使用这些对象。然而，正如我将在本章及本书后续部分展示的，你可以通过多个边和节点编写一些非常复杂的连接，以一种实际上更易于理解的方式（一旦你理解了\
    \ `MATCH` 表达式相当复杂的本质）来提出复杂的问题。\n\n如前所述，你不能在图表查询中执行任何 `ANSI` 风格的连接，因此你有两种选择。你可以使用一个\
    \ `CTE` 来获取图结果，然后连接你的额外结果，如下所示：\n\n```sql\nWITH GraphPart AS (\n    SELECT   \
    \   Person.Name AS PersonName,\n                FollowedPerson.Name AS FollowedPersonName,\n\
    \                Person.FirstName\n    FROM        Network.Person,\n         \
    \       Network.Follows,\n                Network.Person AS FollowedPerson\n \
    \   WHERE MATCH(Person-(Follows)->FollowedPerson))\nSELECT GraphPart.PersonName,\
    \ GraphPart.FollowedPersonName,\n       Colors.ColorName\nFROM   GraphPart\n--这也可以是一个\
    \ CTE 或一个实际的表\nJOIN (SELECT 'blue' AS ColorName\n      UNION ALL\n      SELECT\
    \ 'red') AS Colors\nON CASE WHEN GraphPart.FirstName = 'Fred'\n         THEN 'blue'\n\
    \         ELSE 'red'\n    END = Colors.ColorName;\n```\n\n或者，你可以在 `FROM` 子句的逗号分隔列表中直接分离出其他表、视图或（如我所使用的）派生表：\n\
    \n```sql\nSELECT      CAST(Person.Name AS nvarchar(20)) AS PersonName,\n     \
    \       FollowedPerson.Name AS FollowedPersonName,\n            Colors.ColorName\n\
    FROM        Network.Person,\n            Network.Follows,\n            Network.Person\
    \ AS FollowedPerson,\n            (   SELECT 'blue' AS ColorName\n           \
    \     UNION ALL\n                SELECT 'red') AS Colors\nWHERE MATCH(Person-(Follows)->FollowedPerson)\n\
    --到派生表的连接子句\nAND CASE WHEN Person.FirstName = 'Fred'\n         THEN 'blue'\n \
    \        ELSE 'red'\n     END = Colors.ColorName;\n```\n\n由于无法使用 `ANSI-92` 连接语法，因此无法执行\
    \ `OUTER JOIN`，所以你需要小心编写连接条件，以避免意外丢失想要返回的数据。\n\n#### Filtering Output\n\n当你想使用基础的\
    \ `MATCH` 表达式过滤查询输出时，可以像在任何查询中一样进行过滤。因此，要只查看 `Lou Iss` 关注的人，\n\n```sql\nSELECT\
    \ Person.Name AS PersonName,\n       FollowedPerson.Name AS FollowedPersonName\n\
    FROM   Network.Person,\n       Network.Follows,\n       Network.Person AS FollowedPerson\n\
    WHERE  Person.FirstName = 'Lou'\n  AND  Person.LastName = 'Iss'\n  AND  MATCH(Person-(Follows)->FollowedPerson);\n\
    ```\n\n这将只返回 `PersonName` 为 `Lou Iss` 的人。在图 [3-3](#508094_1_En_3_Chapter.xhtml#Fig3)\
    \ 中，你可以看到遍历的路径。\n\n![](images/508094_1_En_3_Chapter/508094_1_En_3_Fig3_HTML.jpg)\n\
    \n图 3-3\n\n在 MATCH 子句中从 Lou Iss 到直接相关人物的遍历路径\n\n查询结果如下：\n\n```\nPersonName   \
    \        FollowedPersonName\n-------------------- ---------------------\nLou Iss\
    \              Saa Lee\nLou Iss              Val Erry\n```\n\n第一个查询给出了一个人关注的人。要找到关注某个人的人，请反转\
    \ `MATCH` 操作符中的箭头方向：\n\n```sql\nSELECT FollowedPerson.Name AS Person, Person.Name\
    \ AS Follows\nFROM   Network.Person,\n       Network.Follows,\n       Network.Person\
    \ AS FollowedPerson\nWHERE  Person.FirstName = 'Lou'\n  AND  Person.LastName =\
    \ 'Iss'\n  AND  MATCH(Person<-(Follows)-FollowedPerson);\n```\n\n这将反向遍历图，如你在图\
    \ [3-4](#508094_1_En_3_Chapter.xhtml#Fig4) 中所见。\n\n![](images/508094_1_En_3_Chapter/508094_1_En_3_Fig4_HTML.jpg)\n\
    \n图 3-4\n\n使用 MATCH 子句反向遍历图，获取 Lou Iss 的父行\n\n正如预期，查询返回：\n\n```\nPerson    Follows\n\
    --------- ----------\nFred Rick Lou Iss\n```\n\n从图的任意给定点开始查询，是你在示例代码中会非常频繁使用的操作，特别是用于查找节点的子行，并经常用于计数或求和其数据。在某些情况下，你甚至会从每个节点开始，查找与每个其他节点的关系。"
  raw: '### Node-to-Node Querying


    The first task to learn when coding with SQL graph objects is how the queries
    work. They are very different at times from the normal SQL queries you probably
    have written. The big difference is that you will be querying the graph engine
    that has been written to work with just the one type of data. It is complex data,
    but since it is one specific special pattern, the syntax is a lot more general.


    The syntax you will use is a `MATCH` expression. It returns a Boolean TRUE or
    FALSE for what is basically internally a join or set of joins. As an example,
    the following is the query from a few pages ago rewritten using the `MATCH` expression:


    ```

    SELECT      Person.Name AS PersonName,

    FollowedPerson.Name AS FollowedPersonName

    FROM        Network.Person,

    Network.Follows,

    Network.Person AS FollowedPerson

    WHERE MATCH(Person-(Follows)->FollowedPerson);

    ```


    The output of this query is as from the previous query (perhaps sorted differently
    since there is no `ORDER BY` clause). Let me break this down.


    ```

    FROM        Network.Person,

    Network.Follows,

    Network.Person AS FollowedPerson

    ```


    One of the weirdest quirks with the graph query syntax is that you cannot use
    any `ANSI-92` style joins in the query when you are using a `MATCH` expression,
    not even the equivalent `CROSS JOIN` for the commas. Attempt this following query:


    ```

    SELECT      CAST(Person.Name AS nvarchar(20)) AS PersonName,

    FollowedPerson.Name AS FollowedPersonName

    FROM        Network.Person

    CROSS JOIN Network.Follows

    CROSS JOIN Network.Person AS FollowedPerson

    WHERE MATCH(Person-(Follows)->FollowedPerson);

    ```


    You will be greeting with the following error:


    ```

    Msg 13920, Level 16, State 1, Line 221

    Identifier ''Follows'' in a MATCH clause is used with a JOIN clause or APPLY operator.
    JOIN and APPLY are not supported with MATCH clauses.

    ```


    You will also see two more error messages for `Person` and `FollowedPerson`. Any
    additional joins to fetch additional data will need to be acquired in a different
    manner (example to follow).


    ```

    FROM        Network.Person,

    Network.Follows,

    Network.Person AS FollowedPerson

    WHERE MATCH(Person-(Follows)->FollowedPerson);

    ```


    Now take the `MATCH` clause. Using a kind of `ASCII` art, the most basic `MATCH`
    clause has `ObjectName-(Edge)->OtherObjectName` and loosely translates to joining
    `ObjectName` to `Edge` and `Edge` to `OtherObjectName`. If your only use of SQL
    Graph is to implement a single many-to-many relationship, it may not be worth
    it to use these objects. However, as I will show in this chapter and the rest
    of the book, you can write some very complex connections through multiple edges
    and nodes to ask complex questions in a manner that is actually easier to understand
    (once you understand the fairly complex nature of the `MATCH` expression).


    As noted, you cannot do any `ANSI` style joins in your graph table query, so you
    have two choices. You can either use a `CTE` to fetch the graph results and then
    join your additional results, like the following:


    ```

    WITH GraphPart AS (

    SELECT      Person.Name AS PersonName,

    FollowedPerson.Name AS FollowedPersonName,

    Person.FirstName

    FROM        Network.Person,

    Network.Follows,

    Network.Person AS FollowedPerson

    WHERE MATCH(Person-(Follows)->FollowedPerson))

    SELECT GraphPart.PersonName, GraphPart.FollowedPersonName,

    Colors.ColorName

    FROM   GraphPart

    --This could also be a CTE or a real table

    JOIN (SELECT ''blue'' AS ColorName

    UNION ALL

    SELECT ''red'') AS Colors

    ON CASE WHEN GraphPart.FirstName = ''Fred''

    THEN ''blue''

    ELSE ''red''

    END = Colors.ColorName;

    ```


    Or you can just separate your other tables, views, or (as I have used) derived
    tables in the comma-delimited list in the `FROM` clause:


    ```

    SELECT      CAST(Person.Name AS nvarchar(20)) AS PersonName,

    FollowedPerson.Name AS FollowedPersonName,

    Colors.ColorName

    FROM        Network.Person,

    Network.Follows,

    Network.Person AS FollowedPerson,

    (   SELECT ''blue'' AS ColorName

    UNION ALL

    SELECT ''red'') AS Colors

    WHERE MATCH(Person-(Follows)->FollowedPerson)

    --join clause to the derived table

    AND CASE WHEN Person.FirstName = ''Fred''

    THEN ''blue''

    ELSE ''red''

    END = Colors.ColorName;

    ```


    Because of not being able to do `ANSI-92` join syntax, there is no way to do an
    `OUTER JOIN`, so you need to take care to write your joins safely to not lose
    data accidentally that you wanted to return.


    #### Filtering Output


    When you want to filter the output of a query using the base `MATCH` expression,
    you filter the output the same as in any query. So, to just see the people that
    `Lou Iss` follows,


    ```

    SELECT Person.Name AS PersonName,

    FollowedPerson.Name AS FollowedPersonName

    FROM   Network.Person,

    Network.Follows,

    Network.Person AS FollowedPerson

    WHERE  Person.FirstName = ''Lou''

    AND Person.LastName = ''Iss''

    AND MATCH(Person-(Follows)->FollowedPerson);

    ```


    This returns just people with a `PersonName` of `Lou Iss`. In Figure [3-3](#508094_1_En_3_Chapter.xhtml#Fig3),
    you can see the paths that are traversed.


    ![](images/508094_1_En_3_Chapter/508094_1_En_3_Fig3_HTML.jpg)


    A graphical structure of names of persons. Val Erry links Lee Roy and Joe Seph,
    Fred Rick links Joe Seph, Val Erry, and Lou Iss. Joe Seph, Lou Iss, and Day Vid
    link Saa Lee. Saa Lee links Fred Rick and Lee Roy. Lou Iss has an additional arrow
    to Val Erry and Saa Lee.


    Figure 3-3


    Paths followed in a MATCH clause from Lou Iss to directly related Persons


    The results from the query are


    ```

    PersonName           FollowedPersonName

    -------------------- ---------------------

    Lou Iss              Saa Lee

    Lou Iss              Val Erry

    ```


    The first query gave you people that a person follows. To find people that follow
    a person, reverse the arrow in the `MATCH` operator:


    ```

    SELECT FollowedPerson.Name AS Person, Person.Name AS Follows

    FROM   Network.Person,

    Network.Follows,

    Network.Person AS FollowedPerson

    WHERE  Person.FirstName = ''Lou''

    AND Person.LastName = ''Iss''

    AND MATCH(Person<-(Follows)-FollowedPerson);

    ```


    This traverses the graph backwards, as you see in Figure [3-4](#508094_1_En_3_Chapter.xhtml#Fig4).


    ![](images/508094_1_En_3_Chapter/508094_1_En_3_Fig4_HTML.jpg)


    A graphical structure of names of persons. Val Erry links Lee Roy and Joe Seph,
    Fred Rick links Joe Seph, Val Erry, and Lou Iss. Joe Seph, Lou Iss, and Day Vid
    link Saa Lee. Saa Lee links Fred Rick and Lee Roy. Lou Iss has additional arrow
    to Fred Rick.


    Figure 3-4


    Traversing the graph using a MATCH clause that fetches parent rows to Lou Iss


    As expected, the query returns


    ```

    Person    Follows

    --------- ----------

    Fred Rick Lou Iss

    ```


    Starting at any given point of the graph is something you will use very frequently
    in the example code, particularly to find the child rows of a node and often to
    count or sum their data. In some cases, you will even start at every node and
    find the relationships to every other node.'
