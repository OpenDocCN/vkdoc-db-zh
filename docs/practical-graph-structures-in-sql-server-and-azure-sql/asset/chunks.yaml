- fmt: '## 异构查询


    到目前为止，在本书中，我一直保持设计模式的使用方式，即两个节点之间只存在一种多对多关系。要么是相同的表（`Person-Follows->Person`），要么是不同的表（`Person-ProgramsWith->ProgrammingLanguage`），但始终是通过单一路径从一个节点到另一个节点。在本节中，我将重点介绍通过单条路径导航多个关系的能力，甚至如何通过多条路径遍历关系。


    例如，你将向 `TestGraph` 数据库中的示例图添加另一组名为 `Location` 的节点。然后，你将在 `Follows` 边中创建边值。（尽管这在逻辑上不一定合理，这正是后续示例要说明的一部分）。参见图
    4-2。


    ![图 4-2](images/508094_1_En_4_Chapter/508094_1_En_4_Fig2_HTML.jpg)


    图 4-2 展示了添加新的 `Location` 节点类型。节点 Joe Seph、Fred Rick、Val Erry、Lou Iss、Lee Roy、Will
    Lam 和 Day Vid 相互连接，它们在顶部连接到 C++、Fortran 和 T-SQL，在底部连接到 `Here` 和 `There` 节点。


    **图 4-2**

    向示例图中添加新的 `Location` 节点类型


    以下是创建新表并加载数据的 DDL 和 DML：


    ```sql

    CREATE TABLE Network.Location

    (

    LocationId INT NOT NULL IDENTITY,

    Name NVARCHAR(20) NOT NULL

    CONSTRAINT AKLocation UNIQUE

    ) AS NODE;

    INSERT INTO Network.Location(    Name)

    VALUES (''Here''),(''There'');

    ```


    现在，按照图中所示，将新行与项目关联起来：


    ```sql

    WITH Here

    AS (SELECT Person.$node_id AS node_id

    FROM Network.Person

    WHERE Person.Name IN ( ''Fred Rick'', ''Lou Iss'', ''Joe Seph'' ))

    INSERT INTO Network.Follows

    (  $from_id, $to_id, Value)

    SELECT Here.node_id,

    Location.$node_id,

    ''Value''

    FROM Here

    CROSS JOIN Network.Location

    WHERE Location.Name = ''Here'';

    WITH There

    AS (SELECT Person.$node_id AS node_id

    FROM Network.Person

    WHERE Person.Name IN ( ''Saa Lee'', ''Lee Roy'', ''Day Vid'' ))

    INSERT INTO Network.Follows

    (  $from_id, $to_id, Value)

    SELECT There.node_id,

    Location.$node_id,

    ''Value''

    FROM There

    CROSS JOIN Network.Location

    WHERE Location.Name = ''There'';

    ```


    现在，你可以像这样查看创建的行：


    ```sql

    SELECT Person.Name, Location.Name

    FROM   Network.Person, Network.Follows, Network.Location

    WHERE  Match(Person-(Follows)->Location);

    ```


    这将返回


    ```

    Name            Name

    --------------- --------------------

    Fred Rick       Here

    Lou Iss         Here

    Joe Seph        Here

    Lee Roy         There

    Saa Lee         There

    Day Vid         There

    ```


    因此，现在你有两种不同类型的节点通过 `Network.Follows` 边连接。如果你想一起查看它们，可以使用 CTE 或派生表将对象的数据联合在一起。除非你想输出它们，否则你不必包含任何图结构列。这些列之所以存在，是因为该对象是特定类型的对象。在以下查询中，你可以看到
    `Lou Iss` 通过 `Network.Follows` 边连接到的地点和人物：


    ```sql

    SELECT Person.Name,

    Nodes.ObjectName,

    Nodes.Name

    FROM Network.Person,

    Network.Follows,

    (

    SELECT ''Location'' AS ObjectName,

    Location.Name

    FROM Network.Location

    UNION ALL

    SELECT ''Person'',

    Name

    FROM Network.Person

    ) AS Nodes

    WHERE MATCH(Person-(Follows)->Nodes)

    AND Person.Name = ''Lou Iss'';

    ```


    这将返回


    ```

    Name        ObjectName  Name

    ----------- ----------- ------------

    Lou Iss     Person      Saa Lee

    Lou Iss     Person      Val Erry

    Lou Iss     Location    Here

    ```


    请注意，使用 SQL Server 处理非特定数据的一个主要限制在此显现。一旦将行提取到表格数据流（TDS）中，它们就恢复为强类型和结构化的关系表。由于我们讨论的方法需要派生表、CTE
    或视图对象，你需要将不同的数据集构造成相同的形状。这是该方法的一个很大限制，因为你无法轻松返回如下所示的内容，除非在 `UNION ALL` 中包含所有列，这会变得很繁琐：


    ```

    Name        ObjectName  Name       LocationDetails PersonDetails

    ----------- ----------- ---------- --------------- -------------

    Lou Iss     Person      Saa Lee                    Values

    Lou Iss     Person      Val Erry                   Values

    Lou Iss     Location    Here                       Values

    ```


    尽管存在此限制，它对于查找一个项目与它可能链接到的许多其他事物之间的关系非常有用。


    例如，将 `Network` 模式视为客户关系管理（CRM）系统，你如何能看到与客户连接的所有内容，例如他们的偏好、感兴趣的产品、地点或他们购物过的商店？输出可能会向用户显示人类可读的值（如示例中的
    `Name` 或 `Label`），然后是一个链接以显示更详细的信息。


    例如，


    ```sql

    SELECT OtherThing.ObjectType, OtherThing.Name,MoreDetailLink

    FROM   Network.Person,

    --图列会自动暴露，你不需要任何列，所以这里什么也不返回

    --尽管这显然不是一个关于“无”的子查询

    (SELECT 1 AS nothing

    FROM Network.Follows

    UNION ALL

    SELECT 1

    FROM Network.ProgramsWith) as LinksTo,

    --这个派生表是所有某人可以链接到的事物

    (SELECT ''Person'' as ObjectType, Name,

    CONCAT(''https://getPerson/'',PersonId)

    AS MoreDetailLink

    FROM Network.Person

    UNION ALL

    SELECT ''ProgrammingLanguage'', ProgrammingLanguage.Name,

    CONCAT(''https://getProgramming/'',

    ProgrammingLanguage.Name) AS MoreDetailLink

    FROM Network.ProgrammingLanguage

    UNION ALL

    SELECT ''Location'',

    Location.Name,

    CONCAT(''https://mapLocation/'',LocationId)

    AS MoreDetailLink

    FROM Network.Location) AS OtherThing

    WHERE  MATCH(Person-(LinksTo)->OtherThing)

    AND Person.Name = ''Lou Iss'';

    ```


    这段代码使用了两条边对象和迄今为止定义的所有三个节点，来执行 `Lou Iss` 节点的所有关系查询。


    ```

    ObjectType          Name         MoreDetailLink

    ------------------- ------------ --------------------------------

    Person              Saa Lee      https://getPerson/5

    Person              Val Erry     https://getPerson/3

    Location            Here         https://mapLocation/1

    ProgrammingLanguage T-SQL        https://getProgramming/T-SQL

    ```


    如果这是你经常做的事情，你很可能希望将其做成可重用的视图对象，因为代码有点乱。在下一个代码块中，将前面带有派生表的查询转换为一组可重用的视图对象：


    ```sql

    CREATE VIEW Network.LinksTo

    AS

    SELECT 1 AS nothing FROM network.Follows

    UNION ALL

    SELECT 1 AS nothing FROM network.ProgramsWith;

    GO

    CREATE VIEW Network.Anything

    as

    SELECT ''Person'' as ObjectType,

    Person.Name,

    CONCAT(''https://getPerson/'',PersonId)

    AS MoreDetailLink

    FROM Network.Person

    UNION ALL

    SELECT ''ProgrammingLanguage'',

    ProgrammingLanguage.Name,

    CONCAT(''https://getProgramming/'',

    ProgrammingLanguage.Name) AS MoreDetailLink

    FROM    Network.ProgrammingLanguage

    UNION ALL

    SELECT ''Location'',

    Location.Name,

    CONCAT(''https://mapLocation/'',LocationId)

    AS MoreDetailLink

    FROM    Network.Location;

    ```


    现在，之前的查询可以这样写：


    ```sql

    SELECT AnyThing.ObjectType, AnyThing.Name,

    Anything.MoreDetailLink

    FROM   Network.Person, Network.LinksTo, Network.Anything

    WHERE  MATCH(Person-(LinksTo)->AnyThing)

    AND Person.Name = ''Lou Iss'';

    ```'
  raw: '## Heterogenous Queries


    So far in the book, I have kept the pattern of usage for the designs to be one
    many-to-many relationship between just two nodes. Either the table was the same
    (`Person-Follows-> Person)` or different `(Person-ProgramsWith->ProgrammingLanguage)`
    but it was always one node to one node through a single edge. In this section,
    I want to highlight the ability to navigate multiple relationships through one
    edge, or even how you can traverse relationships through multiple edges.


    As an example, you are going to add another set of nodes to the sample graph in
    the `TestGraph` database called `Location`. Then you will create edge values in
    the `Follows` edge. (Not that this makes logical sense, which is part of the point
    later in the example). See Figure [4-2](#508094_1_En_4_Chapter.xhtml#Fig2).


    ![](images/508094_1_En_4_Chapter/508094_1_En_4_Fig2_HTML.jpg)


    A S Q L server graph illustrates the addition of a new location node type. Nodes
    Joe Seph, Fred Rick, Val Erry, Lou Iss, Lee Roy, Will Lam, and Day Vid are interlinked,
    which connect to C + +, Fortan, and T-S Q L at the top and to nodes, here and
    there at the bottom.


    Figure 4-2


    Adding a new Location node type to the sample diagram


    Here is the DDL to create and DML to load this new table:


    ```

    CREATE TABLE Network.Location

    (

    LocationId INT NOT NULL IDENTITY,

    Name NVARCHAR(20) NOT NULL

    CONSTRAINT AKLocation UNIQUE

    ) AS NODE;

    INSERT INTO Network.Location(    Name)

    VALUES (''Here''),(''There'');

    ```


    Now you associate the new rows with the items as shown on the diagram:


    ```

    WITH Here

    AS (SELECT Person.$node_id AS node_id

    FROM Network.Person

    WHERE Person.Name IN ( ''Fred Rick'', ''Lou Iss'', ''Joe Seph'' ))

    INSERT INTO Network.Follows

    (  $from_id, $to_id, Value)

    SELECT Here.node_id,

    Location.$node_id,


    FROM Here

    CROSS JOIN Network.Location

    WHERE Location.Name = ''Here'';

    WITH There

    AS (SELECT Person.$node_id AS node_id

    FROM Network.Person

    WHERE Person.Name IN ( ''Saa Lee'', ''Lee Roy'', ''Day Vid'' ))

    INSERT INTO Network.Follows

    (  $from_id, $to_id, Value)

    SELECT There.node_id,

    Location.$node_id,


    FROM There

    CROSS JOIN Network.Location

    WHERE Location.Name = ''There'';

    ```


    Now you can see the rows you created like this:


    ```

    SELECT Person.Name, Location.Name

    FROM   Network.Person, Network.Follows, Network.Location

    WHERE  Match(Person-(Follows)->Location);

    ```


    This returns


    ```

    Name            Name

    --------------- --------------------

    Fred Rick       Here

    Lou Iss         Here

    Joe Seph        Here

    Lee Roy         There

    Saa Lee         There

    Day Vid         There

    ```


    So now you have two different kinds of nodes connected through the `Network.Follows`
    edge. If you want to view them together, you can use a CTE or derived table to
    union the object’s data together. You don’t have to include any of the graph structure
    columns unless you want to output them. They are there because the object is a
    specific type of object. In the following query, you see the locations and people
    that `Lou Iss` is connected to through the `Network.Follows` edge:


    ```

    SELECT Person.Name,

    Nodes.ObjectName,

    Nodes.Name

    FROM Network.Person,

    Network.Follows,

    (

    SELECT ''Location'' AS ObjectName,

    Location.Name

    FROM Network.Location

    UNION ALL

    SELECT ''Person'',

    Name

    FROM Network.Person

    ) AS Nodes

    WHERE MATCH(Person-(Follows)->Nodes)

    AND Person.Name = ''Lou Iss'';

    ```


    This returns


    ```

    Name        ObjectName  Name

    ----------- ----------- ------------

    Lou Iss     Person      Saa Lee

    Lou Iss     Person      Val Erry

    Lou Iss     Location    Here

    ```


    Note that one of the main limitations of working with non-specific data in SQL
    Server shows itself here. Once you fetch the rows into a tabular data stream (TDS),
    they go back to being strongly typed and shaped relational tables. And since the
    method we are discussing requires a derived table, CTE, or view object, you need
    to shape the different sets of data to all be the same. This is a big limitation
    of this method in that you can’t easily return something like the following without
    including all the columns in the `UNION ALL`, which gets tedious:


    ```

    Name        ObjectName  Name       LocationDetails PersonDetails

    ----------- ----------- ---------- --------------- -------------

    Lou Iss     Person      Saa Lee                    Values

    Lou Iss     Person      Val Erry                   Values

    Lou Iss     Location    Here                       Values

    ```


    Despite this limitation, it can be very useful for finding the relationship that
    one item has to the many other things it might be linked to.


    For example, thinking of the `Network` schema as if it was a customer relationship
    management (CRM) system, how could you see everything that a customer is connected
    to, such as their preferences, the products they are interested in, locations,
    or stores they have shopped at? The output likely shows the user human-readable
    values (like `Name` or `Label` in my examples) and then a link to display more
    specific details.


    For example,


    ```

    SELECT OtherThing.ObjectType, OtherThing.Name,MoreDetailLink

    FROM   Network.Person,

    --the graph columns are exposed automatically, and no

    --columns do you need, so just returning nothing

    --though this is clearly not a subquery about nothing

    (SELECT 1 AS nothing

    FROM Network.Follows

    UNION ALL

    SELECT 1

    FROM Network.ProgramsWith) as LinksTo,

    --this derived table is all things that someone can be

    --linked to

    (SELECT ''Person'' as ObjectType, Name,

    CONCAT(''https://getPerson/'',PersonId)

    AS MoreDetailLink

    FROM Network.Person

    UNION ALL

    SELECT ''ProgrammingLanguage'', ProgrammingLanguage.Name,

    CONCAT(''https://getProgramming/'',

    ProgrammingLanguage.Name) AS MoreDetailLink

    FROM Network.ProgrammingLanguage

    UNION ALL

    SELECT ''Location'',

    Location.Name,

    CONCAT(''https://mapLocation/'',LocationId)

    AS MoreDetailLink

    FROM Network.Location) AS OtherThing

    WHERE  MATCH(Person-(LinksTo)->OtherThing)

    AND Person.Name = ''Lou Iss'';

    ```


    This code uses both edge objects and all three nodes you have defined so far to
    do all the relationships from the `Lou Iss` node.


    ```

    ObjectType          Name         MoreDetailLink

    ------------------- ------------ --------------------------------

    Person              Saa Lee      https://getPerson/5

    Person              Val Erry     https://getPerson/3

    Location            Here         https://mapLocation/1

    ProgrammingLanguage T-SQL        https://getProgramming/T-SQL

    ```


    If this is something you do regularly, you will most likely want to make this
    into view objects that you can reuse because the code is kind of messy. In the
    next block of code, translate the previous query with derived tables into a set
    of reusable view objects:


    ```

    CREATE VIEW Network.LinksTo

    AS

    SELECT 1 AS nothing FROM network.Follows

    UNION ALL

    SELECT 1 AS nothing FROM network.ProgramsWith;

    GO

    CREATE VIEW Network.Anything

    as

    SELECT ''Person'' as ObjectType,

    Person.Name,

    CONCAT(''https://getPerson/'',PersonId)

    AS MoreDetailLink

    FROM Network.Person

    UNION ALL

    SELECT ''ProgrammingLanguage'',

    ProgrammingLanguage.Name,

    CONCAT(''https://getProgramming/'',

    ProgrammingLanguage.Name) AS MoreDetailLink

    FROM    Network.ProgrammingLanguage

    UNION ALL

    SELECT ''Location'',

    Location.Name,

    CONCAT(''https://mapLocation/'',LocationId)

    AS MoreDetailLink

    FROM    Network.Location;

    ```


    Now the previous query can be written like this:


    ```

    SELECT AnyThing.ObjectType, AnyThing.Name,

    Anything.MoreDetailLink

    FROM   Network.Person, Network.LinksTo, Network.Anything

    WHERE  MATCH(Person-(LinksTo)->AnyThing)

    AND Person.Name = ''Lou Iss'';

    ```'
  trans: '

    ## 异构查询


    到目前为止，在本书中，我一直保持设计模式的使用方式，即两个节点之间只存在一种多对多关系。要么是相同的表（`Person-Follows->Person`），要么是不同的表（`Person-ProgramsWith->ProgrammingLanguage`），但始终是通过单一路径从一个节点到另一个节点。在本节中，我将重点介绍通过单条路径导航多个关系的能力，甚至如何通过多条路径遍历关系。


    例如，你将向 `TestGraph` 数据库中的示例图添加另一组名为 `Location` 的节点。然后，你将在 `Follows` 边中创建边值。（尽管这在逻辑上不一定合理，这正是后续示例要说明的一部分）。参见图
    4-2。


    ![图 4-2](img/508094_1_En_4_Fig2_HTML.jpg)


    图 4-2 展示了添加新的 `Location` 节点类型。节点 Joe Seph、Fred Rick、Val Erry、Lou Iss、Lee Roy、Will
    Lam 和 Day Vid 相互连接，它们在顶部连接到 C++、Fortran 和 T-SQL，在底部连接到 `Here` 和 `There` 节点。


    **图 4-2**

    向示例图中添加新的 `Location` 节点类型


    以下是创建新表并加载数据的 DDL 和 DML：


    ```sql

    CREATE TABLE Network.Location

    (

    LocationId INT NOT NULL IDENTITY,

    Name NVARCHAR(20) NOT NULL

    CONSTRAINT AKLocation UNIQUE

    ) AS NODE;

    INSERT INTO Network.Location(    Name)

    VALUES (''Here''),(''There'');

    ```


    现在，按照图中所示，将新行与项目关联起来：


    ```sql

    WITH Here

    AS (SELECT Person.$node_id AS node_id

    FROM Network.Person

    WHERE Person.Name IN ( ''Fred Rick'', ''Lou Iss'', ''Joe Seph'' ))

    INSERT INTO Network.Follows

    (  $from_id, $to_id, Value)

    SELECT Here.node_id,

    Location.$node_id,

    ''Value''

    FROM Here

    CROSS JOIN Network.Location

    WHERE Location.Name = ''Here'';

    WITH There

    AS (SELECT Person.$node_id AS node_id

    FROM Network.Person

    WHERE Person.Name IN ( ''Saa Lee'', ''Lee Roy'', ''Day Vid'' ))

    INSERT INTO Network.Follows

    (  $from_id, $to_id, Value)

    SELECT There.node_id,

    Location.$node_id,

    ''Value''

    FROM There

    CROSS JOIN Network.Location

    WHERE Location.Name = ''There'';

    ```


    现在，你可以像这样查看创建的行：


    ```sql

    SELECT Person.Name, Location.Name

    FROM   Network.Person, Network.Follows, Network.Location

    WHERE  Match(Person-(Follows)->Location);

    ```


    这将返回


    ```

    Name            Name

    --------------- --------------------

    Fred Rick       Here

    Lou Iss         Here

    Joe Seph        Here

    Lee Roy         There

    Saa Lee         There

    Day Vid         There

    ```


    因此，现在你有两种不同类型的节点通过 `Network.Follows` 边连接。如果你想一起查看它们，可以使用 CTE 或派生表将对象的数据联合在一起。除非你想输出它们，否则你不必包含任何图结构列。这些列之所以存在，是因为该对象是特定类型的对象。在以下查询中，你可以看到
    `Lou Iss` 通过 `Network.Follows` 边连接到的地点和人物：


    ```sql

    SELECT Person.Name,

    Nodes.ObjectName,

    Nodes.Name

    FROM Network.Person,

    Network.Follows,

    (

    SELECT ''Location'' AS ObjectName,

    Location.Name

    FROM Network.Location

    UNION ALL

    SELECT ''Person'',

    Name

    FROM Network.Person

    ) AS Nodes

    WHERE MATCH(Person-(Follows)->Nodes)

    AND Person.Name = ''Lou Iss'';

    ```


    这将返回


    ```

    Name        ObjectName  Name

    ----------- ----------- ------------

    Lou Iss     Person      Saa Lee

    Lou Iss     Person      Val Erry

    Lou Iss     Location    Here

    ```


    请注意，使用 SQL Server 处理非特定数据的一个主要限制在此显现。一旦将行提取到表格数据流（TDS）中，它们就恢复为强类型和结构化的关系表。由于我们讨论的方法需要派生表、CTE
    或视图对象，你需要将不同的数据集构造成相同的形状。这是该方法的一个很大限制，因为你无法轻松返回如下所示的内容，除非在 `UNION ALL` 中包含所有列，这会变得很繁琐：


    ```

    Name        ObjectName  Name       LocationDetails PersonDetails

    ----------- ----------- ---------- --------------- -------------

    Lou Iss     Person      Saa Lee                    Values

    Lou Iss     Person      Val Erry                   Values

    Lou Iss     Location    Here                       Values

    ```


    尽管存在此限制，它对于查找一个项目与它可能链接到的许多其他事物之间的关系非常有用。


    例如，将 `Network` 模式视为客户关系管理（CRM）系统，你如何能看到与客户连接的所有内容，例如他们的偏好、感兴趣的产品、地点或他们购物过的商店？输出可能会向用户显示人类可读的值（如示例中的
    `Name` 或 `Label`），然后是一个链接以显示更详细的信息。


    例如，


    ```sql

    SELECT OtherThing.ObjectType, OtherThing.Name,MoreDetailLink

    FROM   Network.Person,

    --图列会自动暴露，你不需要任何列，所以这里什么也不返回

    --尽管这显然不是一个关于“无”的子查询

    (SELECT 1 AS nothing

    FROM Network.Follows

    UNION ALL

    SELECT 1

    FROM Network.ProgramsWith) as LinksTo,

    --这个派生表是所有某人可以链接到的事物

    (SELECT ''Person'' as ObjectType, Name,

    CONCAT(''https://getPerson/'',PersonId)

    AS MoreDetailLink

    FROM Network.Person

    UNION ALL

    SELECT ''ProgrammingLanguage'', ProgrammingLanguage.Name,

    CONCAT(''https://getProgramming/'',

    ProgrammingLanguage.Name) AS MoreDetailLink

    FROM Network.ProgrammingLanguage

    UNION ALL

    SELECT ''Location'',

    Location.Name,

    CONCAT(''https://mapLocation/'',LocationId)

    AS MoreDetailLink

    FROM Network.Location) AS OtherThing

    WHERE  MATCH(Person-(LinksTo)->OtherThing)

    AND Person.Name = ''Lou Iss'';

    ```


    这段代码使用了两条边对象和迄今为止定义的所有三个节点，来执行 `Lou Iss` 节点的所有关系查询。


    ```

    ObjectType          Name         MoreDetailLink

    ------------------- ------------ --------------------------------

    Person              Saa Lee      https://getPerson/5

    Person              Val Erry     https://getPerson/3

    Location            Here         https://mapLocation/1

    ProgrammingLanguage T-SQL        https://getProgramming/T-SQL

    ```


    如果这是你经常做的事情，你很可能希望将其做成可重用的视图对象，因为代码有点乱。在下一个代码块中，将前面带有派生表的查询转换为一组可重用的视图对象：


    ```sql

    CREATE VIEW Network.LinksTo

    AS

    SELECT 1 AS nothing FROM network.Follows

    UNION ALL

    SELECT 1 AS nothing FROM network.ProgramsWith;

    GO

    CREATE VIEW Network.Anything

    as

    SELECT ''Person'' as ObjectType,

    Person.Name,

    CONCAT(''https://getPerson/'',PersonId)

    AS MoreDetailLink

    FROM Network.Person

    UNION ALL

    SELECT ''ProgrammingLanguage'',

    ProgrammingLanguage.Name,

    CONCAT(''https://getProgramming/'',

    ProgrammingLanguage.Name) AS MoreDetailLink

    FROM    Network.ProgrammingLanguage

    UNION ALL

    SELECT ''Location'',

    Location.Name,

    CONCAT(''https://mapLocation/'',LocationId)

    AS MoreDetailLink

    FROM    Network.Location;

    ```


    现在，之前的查询可以这样写：


    ```sql

    SELECT AnyThing.ObjectType, AnyThing.Name,

    Anything.MoreDetailLink

    FROM   Network.Person, Network.LinksTo, Network.Anything

    WHERE  MATCH(Person-(LinksTo)->AnyThing)

    AND Person.Name = ''Lou Iss'';

    ```

