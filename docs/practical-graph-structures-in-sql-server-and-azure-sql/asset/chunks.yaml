    # 删除（DELETE）


    根据你的应用程序需求，使用自然键进行删除操作可能非常合理（尤其是用户手动操作数据时）。通过用户界面表执行删除操作还需要一个触发器，将 ID 值转换为对应边行的键值。


    ```sql

    DELETE FROM Network_UI.Person_Follows_Person

    WHERE PersonId = (SELECT Person.PersonId

    FROM Network.Person

    WHERE Person.Name = ''Lou iss'')

    AND Person_Follows_Person.FollowsPersonId =

    (SELECT Person.PersonId

    FROM Network.Person

    WHERE Person.Name = ''Joe Seph'');

    ```


    正如之前的更新操作一样，你会遇到相同的 `Error 4405`。因此，让我们来构建一个简单的 `INSTEAD OF DELETE` 触发器对象。这里有个奇怪的问题：被删除的列将包含什么内容？因为与插入触发器（你在其中提供值）不同，接下来的触发器将执行查询。所以，首先，你将在一个查询中直接返回被删除对象中的行。


    ```sql

    CREATE OR ALTER TRIGGER Network_UI.Person_Follows_Person$InsteadOfDeleteTrigger

    ON Network_UI.Person_Follows_Person

    INSTEAD OF DELETE

    AS

    SET NOCOUNT ON;

    --If you add more code, you should add error handling code.

    BEGIN

    SELECT *

    FROM Deleted;

    END;

    ```


    **注意**


    如果这对您不起作用，请检查本文档中提到的设置：[`https://learn.microsoft.com/sql/database-engine/configure-windows/disallow-results-from-triggers-server-configuration-option`](https://learn.microsoft.com/sql/database-engine/configure-windows/disallow-results-from-triggers-server-configuration-option)。显然，最好不要让普通触发器返回结果，但在开发案例中，能够看到输出内容非常有用。


    执行以下语句，你将看到 `deleted` 表包含了来自视图的数据，因为触发器的主体代码仅仅是返回 `deleted` 虚拟表的内容：


    ```sql

    DELETE FROM Network_UI.Person_Follows_Person

    WHERE PersonId = (   SELECT Person.PersonId

    FROM   Network.Person

    WHERE  Person.Name = ''Lou iss'')

    AND Person_Follows_Person.FollowsPersonId =

    (   SELECT Person.PersonId

    FROM   Network.Person

    WHERE  Person.Name = ''Joe Seph'');

    ```


    这将返回以下结果，显示 `deleted` 表的结构与你根据视图结构所预期的完全一致：


    ```sql

    PersonId    FollowsPersonId Value

    ----------- --------------- -----------

    2           6               1

    ```


    因此，你可以这样编写触发器：


    ```sql

    CREATE OR ALTER TRIGGER Network_UI.Person_Follows_Person$InsteadOfDeleteTrigger

    ON Network_UI.Person_Follows_Person

    INSTEAD OF DELETE

    AS

    SET NOCOUNT ON;

    --If you add more code, you should add error handling code.

    BEGIN

    DELETE FROM Network.Follows --FollowedPerson)

    and  deleted.PersonId = Person.PersonId

    and  deleted.FollowsPersonId = FollowedPerson.PersonId

    END;

    ```


    现在，你可以直接地删除数据，就像操作一个内部没有特殊列的表一样：


    ```sql

    DELETE FROM Network_UI.Person_Follows_Person

    WHERE Person_Follows_Person.PersonId = 2

    AND Person_Follows_Person.FollowsPersonId = 6;

    ```


    删除行后，你可以看到该行已消失。在构建触发器时，请务必使用创建和删除多行数据的方式进行测试。


    ```sql

    SELECT Person.Name AS PersonName,

    FollowedPerson.Name AS FollowsPersonName

    FROM   Network.Person,

    Network.Follows,

    Network.Person AS FollowedPerson

    WHERE  MATCH(Person-(Follows)->FollowedPerson)

    AND  Person.Name = ''Lou Iss'';

    ```


    ## 使用可组合 JSON 标签加载数据


    在下一节中，你将切换到另一个名为 `AdventureWorksLT` 的公开可用数据库。我使用了 Microsoft Learn 站点上提供的 2019
    版本：[`https://learn.microsoft.com/sql/samples/adventureworks-install-configure`](https://learn.microsoft.com/sql/samples/adventureworks-install-configure)。请使用
    LT 版本，因为它具有整数键值，这使得此过程容易得多。如果你要从具有 GUID 键值甚至多部分键值的数据库加载数据，你需要在 `tempdb` 中创建临时暂存表，使用标识键值进行临时映射（并创建一个包含
    `sourceKey` 和 `identityKey` 的表来从源表加载）。亲爱的读者，这部分内容就留给你自己完成，它并非难事，但肯定会增加阅读示例代码的难度。


    好的，一旦你恢复了该数据库，请根据数据创建一个简单的 `Customer-Purchased->Product` 图。为每个节点包含一个 `Label` 列，并在边上包含购买日期。不要在边上设置唯一性约束，因为此示例的主要目的是展示加载方法。


    首先，创建一个新架构来容纳你的新对象：


    ```sql

    CREATE SCHEMA SalesGraph;

    ```


    接下来，你将创建节点表对象。在这些对象中，你将包含来自关系表的代理键，这在获取一组数据后用于获取附加信息非常有用。如果你将图形数据与关系数据副本放在同一个数据库中，可以根据需要调整图形表中所需的数据量。


    ```sql

    CREATE TABLE SalesGraph.Customer

    (

    CustomerId int NOT NULL

    CONSTRAINT PKCustomer PRIMARY KEY,

    Label nvarchar(100) NOT NULL

    CONSTRAINT AKCustomer UNIQUE

    ) AS NODE;

    CREATE TABLE SalesGraph.Product

    (

    ProductId int NOT NULL

    CONSTRAINT PKProduct PRIMARY KEY,

    Label nvarchar(100) NOT NULL

    CONSTRAINT AKProduct UNIQUE

    ) AS NODE;

    ```


    接下来是创建边。在边中，包含了源数据表中来源的键，以及商品的购买时间，这在你的分析中肯定很有用。


    ```sql

    CREATE TABLE SalesGraph.Purchased

    (

    SalesOrderDetailId int NOT NULL

    CONSTRAINT AKPurchased UNIQUE,

    PurchaseTime datetime2(0) NOT NULL

    ) AS EDGE;

    ```


    你可以简单地获取源数据中存在的行，进行少量转换，然后使用简单的插入语句加载数据：


    ```sql

    --customerID added to label for uniqueness... why there

    --is duplication is beyond this exercise''s needs

    INSERT INTO SalesGraph.Customer WITH (TABLOCKX)

    (

    CustomerId, Label

    )

    SELECT CustomerID,

    CONCAT(FirstName, '' '', LastName, '' '', CustomerID) AS Label

    FROM SalesLT.Customer

    ORDER BY Label;

    ```


    查看输出的几行，你会看到：


    ```sql

    SELECT TOP 2

    $node_id,

    CustomerId

    FROM SalesGraph.Customer;

    ```


    前两行的 ID 值为 0 和 1：


    ```sql

    $node_id_06C54C432DE544E8995B29AFDAD55455


    {"type":"node","schema":"SalesGraph","table":"Customer","id":0}

    {"type":"node","schema":"SalesGraph","table":"Customer","id":1}

    CustomerId


    ```


    这些 ID 值与 `CustomerId` 列的值并不匹配。从某种程度上说，这是一件好事。你几乎永远不会希望使用 `$node_id` 值进行任何操作，但在加载边行时，如果你能预测这些值，就不需要查找它们，从而可以更快地加载数据。


    幸运的是，你可以自己组合 JSON，并且 Microsoft 作为图形功能的一部分提供了相应的工具。假设你正在加载数据副本（可能用于分析，也可能是首次加载），并且不使用接近
    `bigint` 最大值的值（这确实是一个非常大的数字），那么你可以使用以下技术节省大量处理时间。我经常在示例数据中使用这种技术，因为我可以非常快速地加载具有不同数据集的数据库。为了演示这一点，首先截断
    `SalesGraph.Customer` 表中的数据。

    '
- fmt: '# 使用 `NODE_ID_FROM_PARTS` 函数构建图形数据


    ```

    TRUNCATE TABLE SalesGraph.Customer;

    ```


    `NODE_ID_FROM_PARTS` 函数接受节点表的 `object_id` 和一个将成为图 ID 值的整数。以下查询展示了 `CustomerId`
    现在与图 ID 相匹配。传入的 `object_id` 必须与图表中的 `object_id` 匹配，否则输出将为 `NULL`，因此你无法用此方法制造错误数据：


    ```

    SELECT NODE_ID_FROM_PARTS(OBJECT_ID(''SalesGraph.Customer''),

    CustomerID),

    CustomerID,

    CONCAT(FirstName, '' '', LastName, '' '', CustomerID) AS LABEL

    FROM SalesLT.Customer;

    ```


    查看输出，你会发现数据是代理键对代理键的匹配：


    ```


    {"type":"node","schema":"SalesGraph","table":"Customer","id":1}

    {"type":"node","schema":"SalesGraph","table":"Customer","id":2}

    {"type":"node","schema":"SalesGraph","table":"Customer","id":3}

    CustomerId  Label

    ----------- -----------------------

    1          Orlando Gee 1

    2          Keith Harris 2

    3          Donna Carreras 3

    ```


    现在你可以将值插入到 `$node_id` 列以及其他两个列中：


    ```

    INSERT INTO SalesGraph.Customer

    (

    $Node_id, CustomerId,Label

    )

    SELECT NODE_ID_FROM_PARTS(OBJECT_ID(''SalesGraph.Customer''),

    CustomerID),

    CustomerID,

    CONCAT(FirstName, '' '', LastName, '' '', CustomerID) AS LABEL

    FROM SalesLT.Customer;

    ```


    接下来，对产品执行相同的操作（与客户相同的重复名称问题，因此添加 `ProductId` 作为后缀）：


    ```

    INSERT INTO SalesGraph.Product

    (

    $Node_id, ProductId, Label

    )

    SELECT NODE_ID_FROM_PARTS(OBJECT_ID(''SalesGraph.Product''),

    ProductID),

    ProductID,

    CONCAT(Name, '' '', ProductID) AS LABEL

    FROM SalesLT.Product;

    ```


    现在运行以下查询，通过连接 `SalesLT.SalesOrderHeader` 表来获取购买的客户和产品：


    ```

    SELECT SalesOrderDetail.SalesOrderDetailID,

    OrderDate AS PurchaseTime,

    ProductID,

    CustomerID

    FROM SalesLT.SalesOrderHeader

    JOIN SalesLT.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID =

    SalesOrderDetail.SalesOrderID;

    ```


    现在你可以使用组合的 JSON 值，在 `SalesGraph.Purchased` 边表中创建数据，并引用加载节点数据的表：


    ```

    INSERT INTO SalesGraph.Purchased

    (

    SalesOrderDetailId, PurchaseTime,

    $from_id,$to_id

    )

    SELECT SalesOrderDetail.SalesOrderDetailID,

    OrderDate AS PurchaseTime,

    NODE_ID_FROM_PARTS(OBJECT_ID(''SalesGraph.Customer''),

    CustomerID),

    NODE_ID_FROM_PARTS(OBJECT_ID(''SalesGraph.Product''),

    ProductID)

    FROM SalesLT.SalesOrderHeader

    JOIN SalesLT.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID;

    ```


    最后，执行此 SQL，你就可以看到所有已加载的数据：


    ```

    SELECT Customer.Label, Product.Label

    FROM   SalesGraph.Customer,

    SalesGraph.Purchased,

    SalesGraph.Product

    WHERE MATCH(Customer-(Purchased)->Product)

    ```


    **注意事项**：你创建的用于插入数据的图形查询可以以任何顺序执行（或对于更大的加载量同时执行）。缺少父节点数据会导致令人困惑的查询，但这并非非法操作。例如，清空
    `SalesGraph.Customer` 和 `SalesGraph.Product` 对象：


    ```

    TRUNCATE TABLE SalesGraph.Customer;

    TRUNCATE TABLE SalesGraph.Product;

    ```


    然后重新运行你刚执行的带有 `MATCH` 子句的 `SELECT` 语句。你仍然会得到相同数量的行，但现在所有的标签值都是 `NULL`。在最初使用你自己的键值加载数据后，强烈建议添加边约束来清理/防止悬空引用（这将在本章后面介绍）。


    如果你清空 `SalesGraph.Purchased` 对象中的数据，情况会得到清理。但请注意，你可以只运行创建边行的 `INSERT` 语句，它不会验证
    ID 值是否有效。进行的主要验证是检查 `$node_id` 值中使用的 `object_id` 值是否真实存在。


    虽然你可以在没有相关节点行的情况下创建边行，但节点表必须存在。作为本节的最后一个示例，清空边并删除两个节点表。然后继续删除客户和产品表。


    ```

    TRUNCATE TABLE SalesGraph.Purchased;

    DROP TABLE IF EXISTS SalesGraph.Customer, SalesGraph.Product;

    ```


    现在，如果你尝试将数据插入到边中，如下所示：


    ```

    INSERT INTO SalesGraph.Purchased

    (

    SalesOrderDetailId,

    PurchaseTime,

    $from_id,

    $to_id

    )

    SELECT SalesOrderDetail.SalesOrderDetailID,

    OrderDate AS PurchaseTime,

    NODE_ID_FROM_PARTS(OBJECT_ID(''SalesGraph.Customer''),

    CustomerID),

    NODE_ID_FROM_PARTS(OBJECT_ID(''SalesGraph.Product''),

    ProductID)

    FROM SalesLT.SalesOrderHeader

    JOIN SalesLT.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID =

    SalesOrderDetail.SalesOrderID;

    ```


    你会得到以下错误：


    ```

    Msg 515, Level 16, State 2, Line 125

    Cannot insert the value NULL into column ''from_obj_id_75C28A838F1D4D618BB8C1957919208E'',
    table ''AdventureWorksLT2019.SalesGraph.Purchased''; column does not allow nulls.
    INSERT fails.

    ```


    第一次遇到这个错误可能会有些令人困惑。它仅仅意味着它尝试插入两个值，但提供的对象名没有引用到现有的节点表。


    它必须是一个节点表；随便一张表是不行的，如果你执行以下引用源关系表而非图形对象的语句，就可以看到这一点：


    ```

    SELECT OBJECT_ID(''SalesLT.Customer''),

    NODE_ID_FROM_PARTS(OBJECT_ID(''SalesLT.Customer''), 1)

    ```


    你会看到 `NODE_ID_FROM_PARTS` 调用返回了 `NULL`。'
  raw: '```

    TRUNCATE TABLE SalesGraph.Customer;

    ```


    The `NODE_ID_FROM_PARTS` function takes an `object_id` for the node table and
    an integer that will become the graph id value. The following query shows you
    that the `CustomerId` now matches the graph id. The `object_id` that you pass
    in must match an `object_id` in the graph tables or the output will be null, so
    you cannot manufacture bad data using this method:


    ```

    SELECT NODE_ID_FROM_PARTS(OBJECT_ID(''SalesGraph.Customer''),

    CustomerID),

    CustomerID,

    CONCAT(FirstName, '' '', LastName, '' '', CustomerID) AS LABEL

    FROM SalesLT.Customer;

    ```


    Look at the output and you will see that the data matches surrogate key to surrogate
    key:


    ```


    {"type":"node","schema":"SalesGraph","table":"Customer","id":1}

    {"type":"node","schema":"SalesGraph","table":"Customer","id":2}

    {"type":"node","schema":"SalesGraph","table":"Customer","id":3}

    CustomerId  Label

    ----------- -----------------------

    1          Orlando Gee 1

    2          Keith Harris 2

    3          Donna Carreras 3

    ```


    Now you can insert values into the `$node_id` column along with the other two
    columns:


    ```

    INSERT INTO SalesGraph.Customer

    (

    $Node_id, CustomerId,Label

    )

    SELECT NODE_ID_FROM_PARTS(OBJECT_ID(''SalesGraph.Customer''),

    CustomerID),

    CustomerID,

    CONCAT(FirstName, '' '', LastName, '' '', CustomerID) AS LABEL

    FROM SalesLT.Customer;

    ```


    Next, do the same for the product (same duplicate name concern as for the customer
    so add the `ProductId` as a suffix):


    ```

    INSERT INTO SalesGraph.Product

    (

    $Node_id, ProductId, Label

    )

    SELECT NODE_ID_FROM_PARTS(OBJECT_ID(''SalesGraph.Product''),

    ProductID),

    ProductID,

    CONCAT(Name, '' '', ProductID) AS LABEL

    FROM SalesLT.Product;

    ```


    Now run the following query that gets you the customer and product that was purchased
    by joining through the `SalesLT.SalesOrderHeader` table:


    ```

    SELECT SalesOrderDetail.SalesOrderDetailID,

    OrderDate AS PurchaseTime,

    ProductID,

    CustomerID

    FROM SalesLT.SalesOrderHeader

    JOIN SalesLT.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID =

    SalesOrderDetail.SalesOrderID;

    ```


    Now you can create the data in the `SalesGraph.Purchased` edge table with the
    composed JSON values, referencing the tables where you loaded the node data:


    ```

    INSERT INTO SalesGraph.Purchased

    (

    SalesOrderDetailId, PurchaseTime,

    $from_id,$to_id

    )

    SELECT SalesOrderDetail.SalesOrderDetailID,

    OrderDate AS PurchaseTime,

    NODE_ID_FROM_PARTS(OBJECT_ID(''SalesGraph.Customer''),

    CustomerID),

    NODE_ID_FROM_PARTS(OBJECT_ID(''SalesGraph.Product''),

    ProductID)

    FROM SalesLT.SalesOrderHeader

    JOIN SalesLT.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID;

    ```


    Finally, execute this SQL and you can see all the data you have loaded:


    ```

    SELECT Customer.Label, Product.Label

    FROM   SalesGraph.Customer,

    SalesGraph.Purchased,

    SalesGraph.Product

    WHERE MATCH(Customer-(Purchased)->Product)

    ```


    One note: The graph queries you created to insert data can be executed in any
    order (or simultaneously for larger loads). Missing parent node data causes confusing
    queries, but it is not illegal. For example, clear out the `SalesGraph.Customer`
    and `SalesGraph.Product` objects:


    ```

    TRUNCATE TABLE SalesGraph.Customer;

    TRUNCATE TABLE SalesGraph.Product;

    ```


    Then rerun the `SELECT` statement with the `MATCH` clause you just executed. You
    still get the same number of rows, but now all the label values are `NULL`. After
    initially loading the data with your own key values, it is highly suggested to
    add an edge constraint to clean up/prevent dangling references (this will be covered
    later in this chapter).


    If you truncate the data in the `SalesGraph.Purchased` object, things will be
    cleaned up. But note that you can run the `INSERT` statement that creates the
    edge rows only and it does not validate that the id values are valid. The main
    validation done is to check to see that the `object_id` value used in the `$node_id`
    values are real.


    While you can create edge rows without related node rows, the node table does
    need to exist. As the final example in this section, truncate the edge and drop
    the two node tables. Then go ahead and drop the customer and product tables.


    ```

    TRUNCATE TABLE SalesGraph.Purchased;

    DROP TABLE IF EXISTS SalesGraph.Customer, SalesGraph.Product;

    ```


    Now if you try to insert the data into the edge as


    ```

    INSERT INTO SalesGraph.Purchased

    (

    SalesOrderDetailId,

    PurchaseTime,

    $from_id,

    $to_id

    )

    SELECT SalesOrderDetail.SalesOrderDetailID,

    OrderDate AS PurchaseTime,

    NODE_ID_FROM_PARTS(OBJECT_ID(''SalesGraph.Customer''),

    CustomerID),

    NODE_ID_FROM_PARTS(OBJECT_ID(''SalesGraph.Product''),

    ProductID)

    FROM SalesLT.SalesOrderHeader

    JOIN SalesLT.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID =

    SalesOrderDetail.SalesOrderID;

    ```


    you get the following error:


    ```

    Msg 515, Level 16, State 2, Line 125

    Cannot insert the value NULL into column ''from_obj_id_75C28A838F1D4D618BB8C1957919208E'',
    table ''AdventureWorksLT2019.SalesGraph.Purchased''; column does not allow nulls.
    INSERT fails.

    ```


    The first time you do this might be a little bit confusing. It just means it tried
    to insert the two values and the object name provided did not reference an existing
    node table.


    It has to be a node table, too; just any table will not work, which you can see
