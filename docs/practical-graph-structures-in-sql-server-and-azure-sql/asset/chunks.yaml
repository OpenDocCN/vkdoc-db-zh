- fmt: "### 删除节点\n\n接下来，你将实现删除节点的功能。删除比重新设定父节点更有趣，因为如果你要删除结构中有子节点的节点，该怎么办？是直接尝试删除该节点，还是删除其子行？在本节中，你将实现一个处理三种可能性的过程：\n\
    \n1.  如果节点是叶节点，则直接删除，没有问题。\n2.  如果节点是其他节点的父节点，则执行以下操作之一：\n    1.  删除所有子节点。\n \
    \   2.  将子节点移动到被删除节点的父节点。与重新设定父节点不同，删除节点**确实**感觉需要处理单项删除（例如，如果删除了经理X，其员工会被移动到经理X的经理下，直到找到新的经理）。\n\
    \n> 注意\n>\n> 你也可以轻松设置其他可能性，例如替换节点或将子行移动到参数中另一个变量表示的节点。这可以添加到提供的存储过程中，但为了简洁起见，我不会添加。\n\
    \n这些可能性通过三个参数实现：要删除的节点的名称、一个指定是否尝试删除子节点的参数，以及一个指定是否重新设定任何存在的子节点的父节点的参数。这段代码很长，但有注释解释删除操作是如何完成的。\n\
    \n```sql\nCREATE OR ALTER PROCEDURE SqlGraph.Company$Delete\n@Name   varchar(20),\n\
    @DeleteChildNodesFlag bit = 0,\n@ReparentChildNodesToParentFlag BIT = 0\nAS\n\
    BEGIN\nSET NOCOUNT ON;\nBEGIN TRY;\nIF @DeleteChildNodesFlag = 1 AND\n@ReparentChildNodesToParentFlag\
    \ = 1\nTHROW 50000,'Both @DeleteChildNodesFlag and (wrap)\n@ReparentChildNodesToParentFlag\
    \ cannot be set to 1', 1;\nIF @DeleteChildNodesFlag = 1\nBEGIN\n--use this to\
    \ get all the children of\n--node to be deleted\n--we need not only the direct\
    \ descendants (which we\n--will use for reparenting the\n--child rows), but their\
    \ descendants too so we can\n--delete everything.\nSELECT  LAST_VALUE(ReportsTo.$to_id)\n\
    WITHIN GROUP (GRAPH PATH) AS  CompanyNodeId\nINTO    #deleteThese\nFROM    SqlGraph.Company\
    \ AS Company,\nSqlGraph.ReportsTo FOR PATH AS ReportsTo,\nSqlGraph.Company FOR\
    \ PATH\nAS ReportsToCompany\nWHERE MATCH(SHORTEST_PATH(Company(-(ReportsTo)\n\
    ->ReportsToCompany)+))\nAND Company.Name = @name\n--this is the node that was\
    \ originally requested to\n--be deleted\nINSERT INTO #deleteThese\nSELECT $node_id\n\
    FROM SqlGraph.Company\nWHERE name = @Name;\n--Now remove all traces of the parent\
    \ and children\n--as a from or a to in a relationship, then remove the\n--company\
    \ rows.\nBEGIN TRANSACTION;\nDELETE SqlGraph.ReportsTo\nWHERE  $from_id IN (SELECT\
    \ CompanyNodeId\nFROM #deleteThese);\nDELETE SqlGraph.ReportsTo\nWHERE  $to_id\
    \ IN (SELECT CompanyNodeId\nFROM #deleteThese);\nDELETE SqlGraph.Company\nWHERE\
    \  $Node_id IN (SELECT CompanyNodeId\nFROM  #deleteThese);\nCOMMIT TRANSACTION;\n\
    END;\nELSE IF @ReparentChildNodesToParentFlag = 1\nBEGIN\n--fetch the direct decendents\
    \ of the row to reparent\nSELECT $to_id AS ToId\nINTO   #reparentThese\nFROM \
    \  SqlGraph.ReportsTo\nWHERE  $from_id = (SELECT $node_Id\nFROM  SqlGraph.Company\n\
    WHERE  Name = @Name)\n--this gets the parent row where you will move the child\
    \ rows\n--to. Would not work to remove the root\nDECLARE @NewFromId NVARCHAR(1000)\
    \ = (\nSELECT $from_id\nFROM   SqlGraph.ReportsTo\nWHERE  $to_id= (SELECT $node_Id\n\
    FROM  SqlGraph.Company\nWHERE  Name = @Name));\n--delete the reporting rows for\
    \ the rows to be\n-- reparented\nDELETE FROM SqlGraph.ReportsTo\nWHERE  $to_id\
    \ IN (SELECT ToId FROM #reparentThese)\n--delete reporting rows for the row to\
    \ be deleted\nDELETE FROM SqlGraph.ReportsTo\nWHERE  $to_id IN (SELECT $node_Id\n\
    FROM  SqlGraph.Company\nWHERE  Name = @Name)\n--if the parent is not null, create\
    \ new rows\nIF @NewFromId IS NOT NULL\nINSERT INTO SqlGraph.ReportsTo\n(\n$from_id,\
    \ $to_id\n)\nSELECT @NewFromId, ToId\nFROM   #reparentThese\nELSE\nTHROW 50000,\n\
    'The parent row did not exist, operation fails'\n,1;\n--delete the company\nDELETE\
    \ FROM SqlGraph.Company\nWHERE  $node_id = (SELECT $node_Id\nFROM  SqlGraph.Company\n\
    WHERE  Name = @Name)\nEND\nELSE\nBEGIN\n--we are trusting the edge and foreign\
    \ key constraint\n--to make sure that there are no orphaned rows\nDECLARE @CompanyNodeId\
    \ nvarchar(1000)\n--fetch the node id of the company\nSELECT @CompanyNodeId =\
    \ $node_id\nFROM   SqlGraph.Company\nWHERE  name = @Name\n--try to delete it\n\
    BEGIN TRANSACTION\nDELETE SqlGraph.ReportsTo\nWHERE  $to_id = @CompanyNodeId;\n\
    DELETE SqlGraph.Company\nWHERE $node_id = @CompanyNodeId;\nCOMMIT TRANSACTION\n\
    END;\nEND TRY\nBEGIN CATCH\nIF XACT_STATE()  0\nROLLBACK TRANSACTION;\nTHROW;\
    \ --just rethrow the error\nEND CATCH;\nEND;\n```\n\n### 测试代码\n\n要测试此代码，请在图形结构中添加新节点，如图\
    \ [5-3](#508094_1_En_5_Chapter.xhtml#Fig3) 所示。\n\n![](images/508094_1_En_5_Chapter/508094_1_En_5_Fig3_HTML.jpg)\n\
    \n*一个数据结构。公司总部 (Company H Q) 划分为现有的完整节点：乔治亚总部 (Georgia H Q) 和德克萨斯总部 (Texas H Q)。乔治亚总部包括亚特兰大\
    \ (Atlanta) 和道尔顿 (Dalton) 分支。德克萨斯总部包括达拉斯 (Dallas) 和休斯顿 (Houston) 分支。*\n\n图 5-3\n\
    \n*将添加到数据结构中的新节点*"
  raw: "### Deleting a Node\n\nNext up, you will implement the ability to delete a\
    \ node. Deletes are somewhat more interesting than reparenting because if you\
    \ delete a node that has child nodes in the structure, what do you do? Do you\
    \ just try to delete that node? Or delete the child rows? In this section, you\
    \ will implement a procedure that handles three possibilities:\n\n1.  Delete if\
    \ the node is a leaf node, with no issues.\n\n2.  If the node is a parent to other\
    \ nodes, do one of the following:\n    1.  Delete all of the child nodes.\n\n\
    2.  Move child nodes to the parent of the node being deleted. Unlike reparenting\
    \ a node, deleting a node **does** feel like it is necessary to handle the one\
    \ item delete (for example, if Manager X is removed, their employees are moved\
    \ to Manager X’s manager until a new one is found).\n\nNote\n\nYou could set up\
    \ other possibilities pretty easily, like replacing the node or moving the child\
    \ rows to another node represented by another variable in the parameter. This\
    \ could be added to the stored procedures provided, but I will not add that for\
    \ brevity’s sake.\n\nThese possibilities are implemented with three parameters:\
    \ the name of the node to delete, one to say if you should attempt to delete the\
    \ child nodes, and one to reparent any child nodes that exist. This code is very\
    \ long, but it is commented to explain how the delete operations are being done.\n\
    \n```\nCREATE OR ALTER PROCEDURE SqlGraph.Company$Delete\n@Name   varchar(20),\n\
    @DeleteChildNodesFlag bit = 0,\n@ReparentChildNodesToParentFlag BIT = 0\nAS\n\
    BEGIN\nSET NOCOUNT ON;\nBEGIN TRY;\nIF @DeleteChildNodesFlag = 1 AND\n@ReparentChildNodesToParentFlag\
    \ = 1\nTHROW 50000,'Both @DeleteChildNodesFlag and (wrap)\n@ReparentChildNodesToParentFlag\
    \ cannot be set to 1', 1;\nIF @DeleteChildNodesFlag = 1\nBEGIN\n--use this to\
    \ get all the children of\n--node to be deleted\n--we need not only the direct\
    \ descendants (which we\n--will use for reparenting the\n--child rows), but their\
    \ descendants too so we can\n--delete everything.\nSELECT  LAST_VALUE(ReportsTo.$to_id)\n\
    WITHIN GROUP (GRAPH PATH) AS  CompanyNodeId\nINTO    #deleteThese\nFROM    SqlGraph.Company\
    \ AS Company,\nSqlGraph.ReportsTo FOR PATH AS ReportsTo,\nSqlGraph.Company FOR\
    \ PATH\nAS ReportsToCompany\nWHERE MATCH(SHORTEST_PATH(Company(-(ReportsTo)\n\
    ->ReportsToCompany)+))\nAND Company.Name = @name\n--this is the node that was\
    \ originally requested to\n--be deleted\nINSERT INTO #deleteThese\nSELECT $node_id\n\
    FROM SqlGraph.Company\nWHERE name = @Name;\n--Now remove all traces of the parent\
    \ and children\n--as a from or a to in a relationship, then remove the\n--company\
    \ rows.\nBEGIN TRANSACTION;\nDELETE SqlGraph.ReportsTo\nWHERE  $from_id IN (SELECT\
    \ CompanyNodeId\nFROM #deleteThese);\nDELETE SqlGraph.ReportsTo\nWHERE  $to_id\
    \ IN (SELECT CompanyNodeId\nFROM #deleteThese);\nDELETE SqlGraph.Company\nWHERE\
    \  $Node_id IN (SELECT CompanyNodeId\nFROM  #deleteThese);\nCOMMIT TRANSACTION;\n\
    END;\nELSE IF @ReparentChildNodesToParentFlag = 1\nBEGIN\n--fetch the direct decendents\
    \ of the row to reparent\nSELECT $to_id AS ToId\nINTO   #reparentThese\nFROM \
    \  SqlGraph.ReportsTo\nWHERE  $from_id = (SELECT $node_Id\nFROM  SqlGraph.Company\n\
    WHERE  Name = @Name)\n--this gets the parent row where you will move the child\
    \ rows\n--to. Would not work to remove the root\nDECLARE @NewFromId NVARCHAR(1000)\
    \ = (\nSELECT $from_id\nFROM   SqlGraph.ReportsTo\nWHERE  $to_id= (SELECT $node_Id\n\
    FROM  SqlGraph.Company\nWHERE  Name = @Name));\n--delete the reporting rows for\
    \ the rows to be\n-- reparented\nDELETE FROM SqlGraph.ReportsTo\nWHERE  $to_id\
    \ IN (SELECT ToId FROM #reparentThese)\n--delete reporting rows for the row to\
    \ be deleted\nDELETE FROM SqlGraph.ReportsTo\nWHERE  $to_id IN (SELECT $node_Id\n\
    FROM  SqlGraph.Company\nWHERE  Name = @Name)\n--if the parent is not null, create\
    \ new rows\nIF @NewFromId IS NOT NULL\nINSERT INTO SqlGraph.ReportsTo\n(\n$from_id,\
    \ $to_id\n)\nSELECT @NewFromId, ToId\nFROM   #reparentThese\nELSE\nTHROW 50000,\n\
    'The parent row did not exist, operation fails'\n,1;\n--delete the company\nDELETE\
    \ FROM SqlGraph.Company\nWHERE  $node_id = (SELECT $node_Id\nFROM  SqlGraph.Company\n\
    WHERE  Name = @Name)\nEND\nELSE\nBEGIN\n--we are trusting the edge and foreign\
    \ key constraint\n--to make sure that there are no orphaned rows\nDECLARE @CompanyNodeId\
    \ nvarchar(1000)\n--fetch the node id of the company\nSELECT @CompanyNodeId =\
    \ $node_id\nFROM   SqlGraph.Company\nWHERE  name = @Name\n--try to delete it\n\
    BEGIN TRANSACTION\nDELETE SqlGraph.ReportsTo\nWHERE  $to_id = @CompanyNodeId;\n\
    DELETE SqlGraph.Company\nWHERE $node_id = @CompanyNodeId;\nCOMMIT TRANSACTION\n\
    END;\nEND TRY\nBEGIN CATCH\nIF XACT_STATE()  0\nROLLBACK TRANSACTION;\nTHROW;\
    \ --just rethrow the error\nEND CATCH;\nEND;\n```\n\nTo test this code, add new\
    \ nodes in the graph structures, as seen in Figure [5-3](#508094_1_En_5_Chapter.xhtml#Fig3).\n\
    \n![](images/508094_1_En_5_Chapter/508094_1_En_5_Fig3_HTML.jpg)\n\nA data structure.\
    \ Company H Q divides into existing nodes intact, Georgia H Q, and Texas H Q.\
    \ Georgia H Q includes Atlanta and Dalton branches. Texas H Q includes Dallas\
    \ and Houston branches.\n\nFigure 5-3\n\nNew nodes that will be added to the data\
    \ structures"
  trans: "### 删除节点\n\n接下来，你将实现删除节点的功能。删除比重新设定父节点更有趣，因为如果你要删除结构中有子节点的节点，该怎么办？是直接尝试删除该节点，还是删除其所有子节点？在本节中，你将实现一个处理三种可能性的过程：\n\
    \n1.  如果节点是叶节点，则直接删除，没有问题。\n2.  如果节点是其他节点的父节点，则执行以下操作之一：\n    1.  删除所有子节点。\n \
    \   2.  将子节点移动到被删除节点的父节点。与重新设定父节点不同，删除节点**确实**感觉需要处理单项删除（例如，如果删除了经理 X，其员工会被移动到经理\
    \ X 的经理下，直到找到新的经理）。\n\n> 注意\n>\n> 你也可以轻松设置其他可能性，例如替换节点或将子行移动到参数中另一个变量表示的节点。这可以添加到提供的存储过程中，但为了简洁起见，我不会添加。\n\
    \n这些可能性通过三个参数实现：要删除的节点的名称、一个指定是否尝试删除子节点的参数，以及一个指定是否重新设定任何存在的子节点的父节点的参数。这段代码很长，但有注释解释删除操作是如何完成的。\n\
    \n```sql\nCREATE OR ALTER PROCEDURE SqlGraph.Company$Delete\n@Name   varchar(20),\n\
    @DeleteChildNodesFlag bit = 0,\n@ReparentChildNodesToParentFlag BIT = 0\nAS\n\
    BEGIN\nSET NOCOUNT ON;\nBEGIN TRY;\nIF @DeleteChildNodesFlag = 1 AND\n@ReparentChildNodesToParentFlag\
    \ = 1\nTHROW 50000,'Both @DeleteChildNodesFlag and (wrap)\n@ReparentChildNodesToParentFlag\
    \ cannot be set to 1', 1;\nIF @DeleteChildNodesFlag = 1\nBEGIN\n--use this to\
    \ get all the children of\n--node to be deleted\n--we need not only the direct\
    \ descendants (which we\n--will use for reparenting the\n--child rows), but their\
    \ descendants too so we can\n--delete everything.\nSELECT  LAST_VALUE(ReportsTo.$to_id)\n\
    WITHIN GROUP (GRAPH PATH) AS  CompanyNodeId\nINTO    #deleteThese\nFROM    SqlGraph.Company\
    \ AS Company,\nSqlGraph.ReportsTo FOR PATH AS ReportsTo,\nSqlGraph.Company FOR\
    \ PATH\nAS ReportsToCompany\nWHERE MATCH(SHORTEST_PATH(Company(-(ReportsTo)\n\
    ->ReportsToCompany)+))\nAND Company.Name = @name\n--this is the node that was\
    \ originally requested to\n--be deleted\nINSERT INTO #deleteThese\nSELECT $node_id\n\
    FROM SqlGraph.Company\nWHERE name = @Name;\n--Now remove all traces of the parent\
    \ and children\n--as a from or a to in a relationship, then remove the\n--company\
    \ rows.\nBEGIN TRANSACTION;\nDELETE SqlGraph.ReportsTo\nWHERE  $from_id IN (SELECT\
    \ CompanyNodeId\nFROM #deleteThese);\nDELETE SqlGraph.ReportsTo\nWHERE  $to_id\
    \ IN (SELECT CompanyNodeId\nFROM #deleteThese);\nDELETE SqlGraph.Company\nWHERE\
    \  $Node_id IN (SELECT CompanyNodeId\nFROM  #deleteThese);\nCOMMIT TRANSACTION;\n\
    END;\nELSE IF @ReparentChildNodesToParentFlag = 1\nBEGIN\n--fetch the direct decendents\
    \ of the row to reparent\nSELECT $to_id AS ToId\nINTO   #reparentThese\nFROM \
    \  SqlGraph.ReportsTo\nWHERE  $from_id = (SELECT $node_Id\nFROM  SqlGraph.Company\n\
    WHERE  Name = @Name)\n--this gets the parent row where you will move the child\
    \ rows\n--to. Would not work to remove the root\nDECLARE @NewFromId NVARCHAR(1000)\
    \ = (\nSELECT $from_id\nFROM   SqlGraph.ReportsTo\nWHERE  $to_id= (SELECT $node_Id\n\
    FROM  SqlGraph.Company\nWHERE  Name = @Name));\n--delete the reporting rows for\
    \ the rows to be\n-- reparented\nDELETE FROM SqlGraph.ReportsTo\nWHERE  $to_id\
    \ IN (SELECT ToId FROM #reparentThese)\n--delete reporting rows for the row to\
    \ be deleted\nDELETE FROM SqlGraph.ReportsTo\nWHERE  $to_id IN (SELECT $node_Id\n\
    FROM  SqlGraph.Company\nWHERE  Name = @Name)\n--if the parent is not null, create\
    \ new rows\nIF @NewFromId IS NOT NULL\nINSERT INTO SqlGraph.ReportsTo\n(\n$from_id,\
    \ $to_id\n)\nSELECT @NewFromId, ToId\nFROM   #reparentThese\nELSE\nTHROW 50000,\n\
    'The parent row did not exist, operation fails'\n,1;\n--delete the company\nDELETE\
    \ FROM SqlGraph.Company\nWHERE  $node_id = (SELECT $node_Id\nFROM  SqlGraph.Company\n\
    WHERE  Name = @Name)\nEND\nELSE\nBEGIN\n--we are trusting the edge and foreign\
    \ key constraint\n--to make sure that there are no orphaned rows\nDECLARE @CompanyNodeId\
    \ nvarchar(1000)\n--fetch the node id of the company\nSELECT @CompanyNodeId =\
    \ $node_id\nFROM   SqlGraph.Company\nWHERE  name = @Name\n--try to delete it\n\
    BEGIN TRANSACTION\nDELETE SqlGraph.ReportsTo\nWHERE  $to_id = @CompanyNodeId;\n\
    DELETE SqlGraph.Company\nWHERE $node_id = @CompanyNodeId;\nCOMMIT TRANSACTION\n\
    END;\nEND TRY\nBEGIN CATCH\nIF XACT_STATE()  0\nROLLBACK TRANSACTION;\nTHROW;\
    \ --just rethrow the error\nEND CATCH;\nEND;\n```\n\n### 测试代码\n\n要测试此代码，请在图形结构中添加新节点，如图\
    \ 5-3 所示。\n\n![](img/508094_1_En_5_Fig3_HTML.jpg)\n\n*一个数据结构。公司总部 (Company H Q)\
    \ 划分为现有的完整节点：乔治亚总部 (Georgia H Q) 和德克萨斯总部 (Texas H Q)。乔治亚总部包括亚特兰大 (Atlanta) 和道尔顿\
    \ (Dalton) 分支。德克萨斯总部包括达拉斯 (Dallas) 和休斯顿 (Houston) 分支。*\n\n图 5-3\n\n*将添加到数据结构中的新节点*"
- fmt: '# SQL 图数据操作：插入、删除与层级处理示例


    ## 数据准备与层级展示


    首先，我们插入一些测试数据来演示删除操作。这些行不包括活动行，因为那会以与本示例无关的方式限制删除操作。


    ```sql

    EXEC SqlGraph.Company$Insert @Name = ''Georgia HQ'',

    @ParentCompanyName = ''Company HQ'';

    EXEC SqlGraph.Company$Insert @Name = ''Atlanta Branch'',

    @ParentCompanyName = ''Georgia HQ'';

    EXEC SqlGraph.Company$Insert @Name = ''Dalton Branch'',

    @ParentCompanyName = ''Georgia HQ'';

    EXEC SqlGraph.Company$Insert @Name = ''Texas HQ'',

    @ParentCompanyName = ''Company HQ'';

    EXEC SqlGraph.Company$Insert @Name = ''Dallas Branch'',

    @ParentCompanyName = ''Texas HQ'';

    EXEC SqlGraph.Company$Insert @Name = ''Houston Branch'',

    @ParentCompanyName = ''Texas HQ'';

    ```


    现在，查看树中的节点：


    ```sql

    SELECT HierarchyDisplay

    FROM SqlGraph.CompanyHierarchyDisplay

    ORDER BY Hierarchy;

    ```


    层级结构现在如下所示：


    ```

    HierarchyDisplay


    Company HQ

    --> Georgia HQ

    --> --> Atlanta Branch

    --> --> Dalton Branch

    --> Maine HQ

    --> --> Camden Branch

    --> --> Portland Branch

    --> Tennessee HQ

    --> --> Knoxville Branch

    --> --> Memphis Branch

    --> --> Nashville Branch

    --> Texas HQ

    --> --> Dallas Branch

    --> --> Houston Branch

    ```


    尝试仅使用默认参数（保留子行）删除 `Georgia HQ`，使用以下调用：


    ```sql

    EXEC SqlGraph.Company$Delete @Name = ''Georgia HQ'';

    ```


    因为您将边约束创建为 `NO ACTION`，当您尝试删除父节点时，此操作会失败并显示以下错误消息：


    ```

    Msg 547, Level 16, State 0, Procedure SqlGraph.Company$Delete, Line 60

    The DELETE statement conflicted with the EDGE REFERENCE constraint "EC_ReportsTo$DefinesParentOf".
    The conflict occurred in database "GraphDBTests", table "SqlGraph.ReportsTo".

    ```


    如果您尝试删除叶节点，因为它图中没有依赖项，所以会成功。


    ```sql

    --Delete Atlanta

    EXEC SqlGraph.Company$Delete @Name = ''Atlanta Branch'';

    ```


    检查结构，您会看到 `Atlanta Branch` 行已消失。接下来，尝试在删除指定节点的同时删除其子行：


    ```sql

    EXEC SqlGraph.Company$Delete @Name = ''Georgia HQ'',

    @DeleteChildNodesFlag = 1;

    ```


    现在您会看到 `Georgia HQ` 和 `Dalton Branch` 行都已消失。


    ```

    HierarchyDisplay


    Company HQ

    --> Maine HQ

    --> --> Camden Branch

    --> --> Portland Branch

    --> Tennessee HQ

    --> --> Knoxville Branch

    --> --> Memphis Branch

    --> --> Nashville Branch

    --> Texas HQ

    --> --> Dallas Branch

    --> --> Houston Branch

    ```


    接下来，让我们看看 `@ReparentChildNodesToParentFlag` 的作用。执行以下代码会删除 `Texas HQ` 行，但现在 `Dallas
    Branch` 和 `Houston Branch` 节点将作为 `Company HQ` 节点的子节点上移。


    ```sql

    EXEC SqlGraph.Company$Delete @Name = ''Texas HQ'',

    @ReparentChildNodesToParentFlag = 1;

    ```


    查看数据，您可以看到 `Dallas Branch` 和 `Houston Branch` 节点现在是 `Company HQ` 的子节点：


    ```

    HierarchyDisplay


    Company HQ

    --> Dallas Branch

    --> Houston Branch

    --> Maine HQ

    --> --> Camden Branch

    --> --> Portland Branch

    --> Tennessee HQ

    --> --> Knoxville Branch

    --> --> Memphis Branch

    --> --> Nashville Branch

    ```


    最后，清理此示例中剩余的节点：


    ```sql

    EXEC SqlGraph.Company$Delete @Name = ''Dallas Branch'';

    EXEC Graph.Company$Delete @Name = ''Houston Branch'';

    ```


    ## 树形输出代码


    在本节中，您将学习一些在处理树结构时很方便的额外技术。每种技术都将被编码到一个对象中，并且（并非巧合地）将成为下一章性能测试代码的基础，届时您将使用比此处所用大得多的数据集。


    这些过程将执行以下操作：


    *   **返回部分树**：这将扩展本章前面创建的 `CompanyHierarchyDisplay` 视图的功能，让您选择起始节点，然后返回位于其下方的节点。

    *   **确定子节点是否存在**：这是在构建安全应用程序时通常需要的一段代码。您需要知道某个节点是否存在于树的任何层级。

    *   **聚合每一级别的子活动**：从根到叶，汇总树中每个节点的所有子节点的销售活动总和。


    ### 返回部分树


    这个返回表的用户定义函数是本章前面创建的视图的扩展。不同之处在于，它允许您从特定节点开始，而不是总是返回整棵树。


    ```sql

    CREATE OR ALTER FUNCTION SqlGraph.Company$ReturnHierarchy

    (

    @CompanyName varchar(20)

    )

    RETURNS @Output TABLE (CompanyId INT, Name VARCHAR(20),

    Level INT, Hierarchy NVARCHAR(4000),

    IdHierarchy NVARCHAR(4000),

    HierarchyDisplay NVARCHAR(4000))

    AS

    BEGIN

    --get the identifier for the node you want to start with

    DECLARE @CompanyId int, @NodeName nvarchar(max)

    SELECT  @CompanyId = CompanyId,

    @Nodename = Name

    FROM   SqlGraph.Company

    WHERE  Name = @CompanyName;

    ;WITH baseRows as

    (

    --include node that you are looking for

    SELECT @companyId as CompanyId, @NodeName as Name,

    1 as Level,

    ''\'' + Cast(@companyId as nvarchar(10)) + ''\'' as

    IdHierarchy, --\ delimited but with id num

    ''\'' + @NodeName AS Hieararchy

    UNION ALL

    SELECT

    LAST_VALUE(ToCompany.CompanyId)

    WITHIN GROUP (GRAPH PATH) AS CompanyId,

    LAST_VALUE(ToCompany.Name)

    WITHIN GROUP (GRAPH PATH) AS NodeName,

    1+COUNT(ToCompany.Name)

    WITHIN GROUP (GRAPH PATH) AS levels,

    ''\'' + CAST(FromCompany.CompanyId as NVARCHAR(10))+

    ''\'' + STRING_AGG(cast(ToCompany.CompanyId as

    nvarchar(10)), ''\'')

    WITHIN GROUP (GRAPH PATH) + ''\'' AS Idhierarchy,

    ''\'' +  FromCompany.NAME + ''\'' +

    STRING_AGG(ToCompany.Name, ''\'')

    WITHIN GROUP (GRAPH PATH) + ''\'' AS hierarchy

    FROM

    SqlGraph.Company AS FromCompany,

    SqlGraph.ReportsTo FOR PATH AS ReportsTo,

    SqlGraph.Company FOR PATH AS ToCompany

    WHERE

    MATCH(SHORTEST_PATH(FromCompany(-(ReportsTo)

    ->ToCompany)+))

    --start the processing from the parameter''s companyId

    AND FromCompany.CompanyId = @companyId

    )

    INSERT INTO @Output

    SELECT *, REPLICATE(''--> '',LEVEL - 1) + Name

    AS HierarchyDisplay

    FROM  BaseRows

    RETURN;

    END;

    ```


    如果您只想查看 `Tennessee HQ` 的数据树，可以使用


    ```sql

    SELECT *

    FROM   SqlGraph.Company$ReturnHierarchy(''Tennessee HQ'');

    ```


    这将返回三行，其输出与仅显示子树的视图相同。'
  raw: '```

    --add a few rows to test the delete. No activity rows

    --because that would limit deletes in a way that is

    --immaterial to the example

    EXEC SqlGraph.Company$Insert @Name = ''Georgia HQ'',

    @ParentCompanyName = ''Company HQ'';

    EXEC SqlGraph.Company$Insert @Name = ''Atlanta Branch'',

    @ParentCompanyName = ''Georgia HQ'';

    EXEC SqlGraph.Company$Insert @Name = ''Dalton Branch'',

    @ParentCompanyName = ''Georgia HQ'';

    EXEC SqlGraph.Company$Insert @Name = ''Texas HQ'',

    @ParentCompanyName = ''Company HQ'';

    EXEC SqlGraph.Company$Insert @Name = ''Dallas Branch'',

    @ParentCompanyName = ''Texas HQ'';

    EXEC SqlGraph.Company$Insert @Name = ''Houston Branch'',

    @ParentCompanyName = ''Texas HQ'';

    ```


    Now, look at the nodes in the tree:


    ```

    SELECT HierarchyDisplay

    FROM SqlGraph.CompanyHierarchyDisplay

    ORDER BY Hierarchy;

    ```


    The hierarchy now looks like this:


    ```

    HierarchyDisplay


    Company HQ

    --> Georgia HQ

    --> --> Atlanta Branch

    --> --> Dalton Branch

    --> Maine HQ

    --> --> Camden Branch

    --> --> Portland Branch

    --> Tennessee HQ

    --> --> Knoxville Branch

    --> --> Memphis Branch

    --> --> Nashville Branch

    --> Texas HQ

    --> --> Dallas Branch

    --> --> Houston Branch

    ```


    Try to delete `Georgia HQ` using only the default parameters (leaving children
    rows alone) using the following call:


    ```

    EXEC SqlGraph.Company$Delete @Name = ''Georgia HQ'';

    ```


    Because you created the edge constraint as `NO ACTION`, when you try to delete
    the parent node, this operation fails with the following error message:


    ```

    Msg 547, Level 16, State 0, Procedure SqlGraph.Company$Delete, Line 60

    The DELETE statement conflicted with the EDGE REFERENCE constraint "EC_ReportsTo$DefinesParentOf".
    The conflict occurred in database "GraphDBTests", table "SqlGraph.ReportsTo".

    ```


    If you try to delete a leaf node, it works because it has no dependencies in the
    graph.


    ```

    --Delete Atlanta

    EXEC SqlGraph.Company$Delete @Name = ''Atlanta Branch'';

    ```


    Check the structure and you will see the `Atlanta Branch` row is gone. Next, try
    the deleting child rows along with the node you specifically name:


    ```

    EXEC SqlGraph.Company$Delete @Name = ''Georgia HQ'',

    @DeleteChildNodesFlag = 1;

    ```


    Now you will see that the `Georgia HQ` and `Dalton Branch` rows are both gone.


    ```

    HierarchyDisplay


    Company HQ

    --> Maine HQ

    --> --> Camden Branch

    --> --> Portland Branch

    --> Tennessee HQ

    --> --> Knoxville Branch

    --> --> Memphis Branch

    --> --> Nashville Branch

    --> Texas HQ

    --> --> Dallas Branch

    --> --> Houston Branch

    ```


    Next, let’s see what the `@ReparentChildNodesToParentFlag` does. Executing the
    following code removes the `Texas HQ` row, but now the `Dallas Branch` and `Houston
    Branch` nodes will be moved up as child nodes of the `Company HQ` node.


    ```

    EXEC SqlGraph.Company$Delete @Name = ''Texas HQ'',

    @ReparentChildNodesToParentFlag = 1;

    ```


    Viewing the data, you can see that `Dallas Branch` and `Houston Branch` nodes
    are now child nodes of `Company HQ`:


    ```

    HierarchyDisplay


    Company HQ

    --> Dallas Branch

    --> Houston Branch

    --> Maine HQ

    --> --> Camden Branch

    --> --> Portland Branch

    --> Tennessee HQ

    --> --> Knoxville Branch

    --> --> Memphis Branch

    --> --> Nashville Branch

    ```


    Finally, clean up the nodes that are left over from this example:


    ```

    EXEC SqlGraph.Company$Delete @Name = ''Dallas Branch'';

    EXEC SqlGraph.Company$Delete @Name = ''Houston Branch'';

    ```


    ## Tree Output Code


    In this section, you will learn additional techniques that are handy when working
    with a tree structure. Each will be coded into an object and will (not coincidentally)
    be the basis of the performance testing code that you will use in the next chapter
    with far larger data sets than you have worked with in here.


    The procedures will do the following actions:


    *   **Return part of the tree**: This will extend the functionality of the `CompanyHierarchyDisplay`
    view that was created in the chapter to let you pick the starting node and then
    return the nodes that are below it.


    *   **Determine if a child node exists**: This is a very typical piece of code
    that you will need when building security applications. You want to know if a
    node exists in the tree at any level.


    *   **Aggregate child activity at every level**: Summing up sales activity of
    all the child nodes of every node in the tree, from root to leaf.


    ### Returning Part of the Tree


    This table-valued user defined function is an extension of the view created earlier
    in the chapter. The difference is that it lets you start at a specific node rather
    than always returning the entire tree.


    ```

    CREATE OR ALTER FUNCTION SqlGraph.Company$ReturnHierarchy

    (

    @CompanyName varchar(20)

    )

    RETURNS @Output TABLE (CompanyId INT, Name VARCHAR(20),

    Level INT, Hierarchy NVARCHAR(4000),

    IdHierarchy NVARCHAR(4000),

    HierarchyDisplay NVARCHAR(4000))

    AS

    BEGIN

    --get the identifier for the node you want to start with

    DECLARE @CompanyId int, @NodeName nvarchar(max)

    SELECT  @CompanyId = CompanyId,

    @Nodename = Name

    FROM   SqlGraph.Company

    WHERE  Name = @CompanyName;

    ;WITH baseRows as

    (

    --include node that you are looking for

    SELECT @companyId as CompanyId, @NodeName as Name,

    1 as Level,

    ''\'' + Cast(@companyId as nvarchar(10)) + ''\'' as

    IdHierarchy, --\ delimited but with id num

    ''\'' + @NodeName AS Hieararchy

    UNION ALL

    SELECT

    LAST_VALUE(ToCompany.CompanyId)

    WITHIN GROUP (GRAPH PATH) AS CompanyId,

    LAST_VALUE(ToCompany.Name)

    WITHIN GROUP (GRAPH PATH) AS NodeName,

    1+COUNT(ToCompany.Name)

    WITHIN GROUP (GRAPH PATH) AS levels,

    ''\'' + CAST(FromCompany.CompanyId as NVARCHAR(10))+

    ''\'' + STRING_AGG(cast(ToCompany.CompanyId as

    nvarchar(10)), ''\'')

    WITHIN GROUP (GRAPH PATH) + ''\'' AS Idhierarchy,

    ''\'' +  FromCompany.NAME + ''\'' +

    STRING_AGG(ToCompany.Name, ''\'')

    WITHIN GROUP (GRAPH PATH) + ''\'' AS hierarchy

    FROM

    SqlGraph.Company AS FromCompany,

    SqlGraph.ReportsTo FOR PATH AS ReportsTo,

    SqlGraph.Company FOR PATH AS ToCompany

    WHERE

    MATCH(SHORTEST_PATH(FromCompany(-(ReportsTo)

    ->ToCompany)+))

    --start the processing from the parameter''s companyId

    AND FromCompany.CompanyId = @companyId

    )

    INSERT INTO @Output

    SELECT *, REPLICATE(''--> '',LEVEL - 1) + Name

    AS HierarchyDisplay

    FROM  BaseRows

    RETURN;

    END;

    ```


    If you want to see just the `Tennessee HQ` tree of data, you can use


    ```

    SELECT *

    FROM   SqlGraph.Company$ReturnHierarchy(''Tennessee HQ'');

    ```


    This returns three rows with the same output as the view did just showing the
    subtree.'
