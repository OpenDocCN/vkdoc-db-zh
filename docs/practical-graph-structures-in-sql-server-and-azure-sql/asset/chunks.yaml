    );

    ```


    `SqlGraph.Sale` 表在此处用于当你执行聚合时使情况更“真实”。请注意，代码使用来自 `SEQUENCE` 对象的序列号作为 `Amount`
    乘以 .25。


    这是用于创建测试销售数据的存储过程：


    ```

    CREATE PROCEDURE SqlGraph.Sale$InsertTestData

    @Name     varchar(20),

    --注意：所有过程都使用自然键以方便手动操作。

    --如果你正在为工具实现此功能以进行操作，

    --请尽可能使用代理键。

    @RowCount int = 5

    --如果需要，可以更改销售数量

    AS

    BEGIN

    SET NOCOUNT ON;

    WHILE @RowCount > 0

    BEGIN

    INSERT INTO SqlGraph.Sale(TransactionNumber, Amount,

    CompanyId)

    --两个 NEXT VALUE FOR 语句在同一代码中返回相同的值。

    SELECT CAST(NEXT VALUE FOR

    SqlGraph.CompanyDataGenerator_SEQUENCE

    AS varchar(10)),

    .25 * CAST(NEXT VALUE FOR

    SqlGraph.CompanyDataGenerator_SEQUENCE

    AS numeric(12, 2)),

    --获取代理键

    (   SELECT Company.CompanyId

    FROM   SqlGraph.Company

    WHERE  Company.Name = @Name);

    SET @RowCount = @RowCount - 1;

    END;

    END;

    ```


    在本章后面，你将看到执行此代码的输出。


    ## 树维护核心代码


    在本节中，你将构建一个编码对象，用于在节点表中创建新行。如果你正在构建一个真实系统，此代码对于重用很有意义。请注意，为了演示清晰，我忽略了一些错误处理，但我已尝试在大多数代码中包含事务和
    `TRY CATCH` 块，因此该代码对于即使是生产系统也是最低限度可接受的。


    你在第 4 章中研究的一些技术（例如包含触发器对象以使处理更自然）本章不会使用，因为此代码将模拟更真实的过程，即客户可能在真实客户活动中一次创建一行。树结构通常是在线事务处理
    (OLTP) 系统的一部分，数据在其他人使用时可能会被修改。


    与“真实代码”的一个不同之处在于，在所有呈现的代码中，你对参数使用自然键值，因此脚本不必关心内部实现是什么。如果你正在为应用程序构建存储过程接口，通常应该使用主键，但在构建临时操作的接口时，对用户有意义的自然键要容易处理得多。


    注意


    在生产级代码中，尽可能让你的代码通过聚集键访问数据是最佳做法。它消除了对表的不必要书签查找读取。有关性能调整的更多信息，我建议参考 Grant Fritchey
    的 *《SQL Server 2022 查询性能调优：故障排除和优化查询性能（第六版）》*。

    '
- fmt: '## Code To Create New Nodes


    ### Creating New Nodes is Essential


    Creating new nodes is an essential piece of code needed to implement a tree structure
    (or really any data-oriented system). In earlier chapters of the book, I mostly
    talked about techniques to load data en masse. Those techniques will still work
    to load a tree, but in this chapter, I want to build a slightly more realistic
    example that simulates users creating data. (If your users are creating 20,000
    nodes an hour in your objects, you are going to need a lot bigger server than
    I am working with very quickly!)


    In a tree, since the typical requirement is that every tree have only one root
    node, the insert procedure will include the method to link the new node to another
    node in the tree.


    Doing this process one row at a time is more like you will see in the real world
    because data changes over time. Seeing how long it takes to generate thousands
    of rows may be an important part of determining which algorithm to use when building
    a tree structure. It really depends on your individual needs. Graph nodes, particularly
    those in a tree structure in a natural, one-at-a-time manner, are not necessarily
    as rapidly added to a data structure as normal rows that are independent from
    other rows.


    ```sql

    CREATE OR ALTER PROCEDURE SqlGraph.Company$Insert

    (

    @Name VARCHAR(20),

    --using natural key values to be a bit more natural

    @ParentCompanyName VARCHAR(20)

    --and to make sure surrogate values needn''t always

    --be the same in demo code

    )

    AS

    BEGIN

    SET NOCOUNT ON;

    BEGIN TRY

    BEGIN TRANSACTION

    --fetch the parent of the node

    DECLARE @ParentNode NVARCHAR(1000) =

    (SELECT $node_id

    FROM SqlGraph.Company

    WHERE name = @ParentCompanyName);

    IF @ParentCompanyName IS NOT NULL

    AND @ParentNode IS NULL

    THROW 50000, ''Invalid ParentCompanyName'', 1;

    ELSE

    BEGIN

    --insert done by simply using the Name of the

    --parent to get the key of

    --the parent...

    IF @ParentNode IS NULL

    BEGIN

    --there are places where it is

    --advantageous to know what node is the

    --root node especially since we will

    --generally, just want one.

    INSERT INTO SqlGraph.Company

    (Name, RootNodeFlag)

    SELECT @Name,1;

    END

    ELSE

    BEGIN

    INSERT INTO SqlGraph.Company(Name)

    SELECT @Name;

    DECLARE @ChildNode nvarchar(1000) =

    (SELECT $node_id

    FROM SqlGraph.Company

    WHERE name = @Name);

    INSERT INTO SqlGraph.ReportsTo

    ($from_id, $to_id)

    VALUES (@ParentNode, @ChildNode);

    END;

    END

    COMMIT TRANSACTION

    END TRY

    BEGIN CATCH

    IF XACT_STATE() <> 0

    ROLLBACK TRANSACTION;

    THROW; --just rethrow the error

    END CATCH;

    END;

    GO

    ```


    ### Inserting Initial Data


    In the following script, you will insert the first set of nodes to implement the
    subgraph shown in Figure 5-2.


    ![](images/508094_1_En_5_Chapter/508094_1_En_5_Fig2_HTML.jpg)


    A data structure. Company H Q divides into Maine H Q and Tennessee H Q.


    Figure 5-2


    Structure you will have after the first inserts


    ```sql

    EXEC SqlGraph.Company$Insert @Name = ''Company HQ'',

    @ParentCompanyName = NULL;

    EXEC SqlGraph.Company$Insert @Name = ''Maine HQ'',

    @ParentCompanyName = ''Company HQ'';

    EXEC SqlGraph.Company$Insert @Name = ''Tennessee HQ'',

    @ParentCompanyName = ''Company HQ'';

    ```


    ### Viewing the Inserted Data


    Looking at the data that was just inserted:


    ```sql

    SELECT CAST($node_id AS VARCHAR(64)) AS [$node_id],

    CompanyId,

    Name

    FROM SqlGraph.Company;

    SELECT CAST($edge_id as varchar(64)) as [$edge_id],

    CAST($from_id as varchar(64)) as [$from_id],

    CAST($to_id as varchar(64)) as [$to_id]

    FROM   SqlGraph.ReportsTo;

    ```


    What you will see is that the data is hard to display in a book (it really isn’t
    that easy to look at when you are working with it either! I just let it wrap for
    this example).


    ```

    $node_id                                                     CompanyId   Name

    ------------------------------------------------------------ ---------- -----------

    {"type":"node","schema":"SqlGraph","table":"Company","id":0}  1         Company
    HQ

    {"type":"node","schema":"SqlGraph","table":"Company","id":1}  2         Maine
    HQ

    {"type":"node","schema":"SqlGraph","table":"Company","id":2}      3          Tennessee
    HQ

    ```


    And the edges:'
