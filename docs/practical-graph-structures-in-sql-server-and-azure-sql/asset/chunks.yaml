  trans: '

    # 数据库边约束管理


    ## 删除 EC_Follows 约束


    因此，通常你需要在新约束中包含来自先前约束的所有关系（这在你需要修改在线表时很有用）。在本演示中，你将删除 `EC_Follows` 约束，因为有数据需要清理：


    ```

    ALTER TABLE Network.Follows DROP EC_Follows;

    ```


    ## 删除位置行并检查数据


    现在，让我们删除一个位置行（这并非你最终目标所需，但在此处操作以观察没有约束时会发生什么）：


    ```

    DELETE Network.Location

    WHERE Location.NAME = ''Here'';

    ```


    查看边中的数据，现在有些异常。请确认已删除该行，并查看 `$node_id` 值：


    ```

    SELECT Location.Name,$node_id

    FROM Network.Location;

    ```


    现在只剩下一个位置（我缩短了左侧的 `$node_id`，以便你能看到 `id`，其值为 `1`）：


    ```

    Name       $node_id_706A69FC56E046AF955F94567D088822

    ---------- ----------------------------------------------------

    There.     ...schema":"Network","table":"Location","id":1}

    ```


    ## 查询数据发现问题


    如果你查看以下查询


    ```

    SELECT Follows.$to_id,COUNT(*)

    FROM Network.Follows

    WHERE Follows.$to_id LIKE ''%location%''

    GROUP BY Follows.$to_id;

    ```


    直观上，你可能会认为应该只有来自 Location 表且 id 值为 `1` 的行，因为这是唯一实际存在的 `id` 值。


    ```

    $to_id_EF1AB6E3676C45CDABD558C4D40746B4

    ------------------------------------------------------------- -

    {"type":"node","schema":"Network","table":"Location","id":0}  3

    {"type":"node","schema":"Network","table":"Location","id":1}  3

    ```


    你会看到两行（如果未添加你自己的数据，两行第二列很可能都是 `3`）...由于你尚未防止重复，你可能像我一样添加了额外的数据。


    你可以通过一个稍复杂的查询找到有问题的行，前提是你知道问题应出自哪张表。如果你有很多表，这可能相当具有挑战性！（所以，从一开始就使用约束，避免这些问题！）


    ## 删除问题行


    ```

    SELECT DISTINCT OBJECT_SCHEMA_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$to_id)),

    OBJECT_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$to_id)),

    Follows.$to_id

    FROM Network.Follows

    WHERE Follows.$to_id NOT IN --检查不存在于节点表中的值

    (

    SELECT Person.$node_id

    FROM Network.Person

    UNION ALL

    SELECT ProgrammingLanguage.$node_id

    FROM Network.ProgrammingLanguage

    UNION ALL

    SELECT $node_id

    FROM Network.Location

    );

    ```


    这将告诉你键值来源的对象以及键值，以便你可以删除有问题的边行，例如这一行：


    ```

    DELETE Network.Follows

    WHERE  Follows.$to_id = ''{"type":"node","schema":"Network","table":"Location","id":0}'';

    ```


    ## 重新添加约束并使用 CASCADE


    现在让我们将边约束重新添加到两个表上，但这次使用 `CASCADE`：


    ```

    ALTER TABLE Network.Follows

    ADD CONSTRAINT EC_Follows CONNECTION

    (Network.Person TO Network.Location,

    Network.Person TO Network.Person)

    ON DELETE CASCADE;

    ```


    使用以下查询，你将看到 `Network.Follows` 边中引用的每张表的行数：


    ```

    SELECT

    OBJECT_SCHEMA_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$to_id)),

    OBJECT_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$to_id)),

    COUNT(*)

    FROM Network.Follows

    GROUP BY OBJECT_SCHEMA_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$to_id)),

    OBJECT_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$to_id));

    ```


    在我的表版本中，有 11 个引用指向 `Network.Person`，3 个指向 `Network.Location`。现在只需删除 `Network.Location`
    的行，这些行就会从边中消失：


    ```

    DELETE FROM Network.Location;

    ```


    输出显示影响了 1 行，但如果你再次运行之前的 `SELECT` 语句，在我的数据库中，`Network.Follows` 表中还有 10 个 `Network.Person`
    行。因此，现在你可以更改约束了：


    ## 将约束改为 NO ACTION


    ```

    ALTER TABLE Network.Follows

    ADD CONSTRAINT EC_Follows CONNECTION

    (Network.Person TO Network.Person)

    ON DELETE CASCADE;

    ```


    我将其设置为 `NO ACTION`，因为我通常更喜欢手动删除行，而不是让它们自动消失。许多数据库编码错误因使用 `CASCADE` 功能而加剧！


    ## 创建新表 LivesAt 并添加数据


    接下来，为 `Network.Person` 到 `Network.Location` 的关系创建一个新的边，并添加边约束以防止除将人员关联到位置之外的任何数据：


    ```

    CREATE TABLE Network.LivesAt

    (

    CONSTRAINT EC_LivesAt CONNECTION

    (Network.Person TO Network.Location)

    ) AS EDGE;

    ```


    ```

    INSERT INTO Network.Location

    (

    NAME

    )

    VALUES

    (''Here''),

    (''There'');

    ```


    ## 恢复数据以匹配模型


    最后，添加回数据以将数据恢复为与图 4-2 中的模型匹配：


    ```

    WITH Here

    AS (SELECT Person.$node_id AS node_id

    FROM Network.Person

    WHERE Person.NAME IN ( ''Fred Rick'', ''Lou Iss'', ''Joe Seph'' ))

    INSERT INTO Network.LivesAt

    (

    $from_id,

    $to_id

    )

    SELECT Here.node_id,

    Location.$node_id

    FROM Here

    CROSS JOIN Network.Location

    WHERE Location.NAME = ''Here'';

    ```


    ```

    WITH Here

    AS (SELECT Person.$node_id AS node_id

    FROM Network.Person

    WHERE Person.NAME IN (''Saa Lee'', ''Lee Roy'', ''Day Vid'' ))

    INSERT INTO Network.LivesAt

    (

    $from_id,

    $to_id

    )

    SELECT Here.node_id,

    Location.$node_id

    FROM Here

    CROSS JOIN Network.Location

    WHERE Location.NAME = ''There'';

    ```


    现在数据与图示匹配。

    '
- fmt: '### Uniqueness Constraints (and Indexes)


    As you probably know, one of the more painful parts of working with a set of data
    is when you have undesired duplicated data. This is no different when working
    with graph structures; in fact, because the actual columns are encapsulated away
    from you `most` of the time, it can be worse. I stress `most` because the physical
    implementation details are not completely hidden from you and show up in some
    places you might not expect.


    As an example, you are going to insert rows that are identical to the second set
    of rows in the previous section (by using the exact same SQL statement):

    ```sql

    WITH Here

    AS (SELECT Person.$node_id AS node_id

    FROM Network.Person

    WHERE Person.NAME IN ( ''Saa Lee'', ''Lee Roy'', ''Day Vid'' ))

    INSERT INTO Network.LivesAt

    (

    $from_id,

    $to_id

    )

    SELECT Here.node_id,

    Location.$node_id

    FROM Here

    CROSS JOIN Network.Location

    WHERE Location.NAME = ''There'';

    ```

    Note that now you have duplicated data:

    ```sql

    SELECT Person.Name,

    Location.Name

    FROM Network.Person,

    Network.LivesAt,

    Network.Location

    WHERE MATCH(Person-(LivesAt)->Location)

    AND Location.NAME = ''There''

    ORDER BY Person.Name;

    ```

    The output of this query is

    ```

    NAME          NAME

    ------------- --------------------

    Day Vid       There

    Day Vid       There

    Lee Roy       There

    Lee Roy       There

    Saa Lee       There

    Saa Lee       There

    ```

    To prevent this, you can use unique constraints that reference the pseudocolumns.
    For example, after deleting the rows for the duplicated `There` location values

    ```sql

    DELETE LivesAt

    FROM Network.Person,Network.LivesAt,Network.Location

    WHERE MATCH(Person-(LivesAt)->Location)

    AND Location.NAME = ''There'';

    ```

    now create the following uniqueness constraint on the `$from_id` and `$to_id`.
    This prevents the user from creating the same relationship over and over, something
    that is generally not desirable.

    ```sql

    ALTER TABLE Network.LivesAt

    ADD CONSTRAINT AKLivesAt_FromIdToId UNIQUE ($from_id, $to_id);

    ```

    Unique constraints are implemented in SQL Server as indexes, and this index is
    going to be valuable in breadth-first algorithms anyhow. Now try the insert of
    rows with the location of `There` a couple of times, repeatedly.


    On the second run, you get an error message with values like the following:

    ```

    Msg 2627, Level 14, State 1, Line 454 Violation of UNIQUE KEY constraint

    ''AKLivesAt_FromIdToId''. Cannot insert duplicate key in object ''Network.LivesAt''.
    The duplicate key value is (581577110, 3, 933578364, 3).

    ```

    What the heck are those numbers in the error message? They are the keys in the
    underlying graph objects. While the values you typically see look like a long
    piece of JSON in an `nvarchar(1000)` value, actually the implementation is translating
    all of that into integer values.


    The key values translate to the `object_id` of the source table and graph the
    internal id. To translate these values, implement the following tool function
    to look up the values:

    ```sql

    IF SCHEMA_ID(''Tools'') IS NULL

    EXEC (''CREATE SCHEMA Tools'')

    GO

    CREATE OR ALTER PROCEDURE Tools.GraphDB$LookupItem

    @ObjectId int,

    @Id int

    AS

    BEGIN

    SET NOCOUNT ON;

    DECLARE @SchemaName sysname =

    OBJECT_SCHEMA_NAME(@ObjectId),

    @TableName sysname = OBJECT_NAME(@ObjectId),

    @SQLStatement nvarchar(MAX)

    SET @SQLStatement = CONCAT(''SELECT * FROM '',

    QUOTENAME(@SchemaName),''.'',QUOTENAME(@TableName),

    WHERE GRAPH_ID_FROM_NODE_ID($node_id)  = '',@Id)

    EXECUTE (@SQLStatement)

    END;

    ```

    Now you can look up the items easily:

    ```sql

    EXEC Tools.GraphDB$LookupItem 581577110, 3;

    EXEC Tools.GraphDB$LookupItem 933578364, 3;

    ```

    This returns the row that contains the data that was duplicated (this may not
    exist if you inserted both rows in the same transaction and rolled back).


    Beyond uniqueness constraints (which you can put on one or both of the `_id` columns,
    and you can also include other columns in your edge table), you may want to add
    indexes to your graph edges to help performance.


    There are some indexes already on your object, for example on the `Network.LivesAt`
    edge table you just created. Using the `sys.indexes` catalog view, you can see
    what is on the object by default:

    ```sql

    SELECT indexes.name,

    indexes.type_desc

    FROM sys.indexes

    WHERE indexes.OBJECT_ID = OBJECT_ID(''Network.LivesAt'');

    ```

    Three rows are returned. One indicates your object is heap. Another is for the
    `AKLivesAt_FromIdToId` unique constraint. And then there is an index that will
    look something like `GRAPH_UNIQUE_INDEX_AD2E365DF5144A62BEBC7C7260258E2A`. This
    is an index that is on the internal graph columns, but there is no clustered index.
    You can actually change the AK index that references the internal columns to be
    clustered, or even make it a `PRIMARY KEY` constraint (that is clustered by default):

    ```sql

    ALTER TABLE Network.LivesAt

    DROP CONSTRAINT AKLivesAt_FromIdToId;

    ALTER TABLE Network.LivesAt

    ADD CONSTRAINT AKLivesAt_FromIdToId  UNIQUE CLUSTERED

    ($from_id, $to_id);

    ```

    Take a look at the query of `sys.indexes` again. Now it is clustered. This can
    be very helpful for certain types of workloads that mostly fetch data by the `$from_id`
    value (or `$to_id` value, depending on how you structure the index to meet your
    normal pattern of usage) which you know to be two columns from the duplicate key
    error. You can see that in the `sys.index_columns` catalog view:

    ```sql

    SELECT indexes.name,

    indexes.type_desc,

    index_columns.key_ordinal,

    columns.name

    FROM sys.index_columns

    JOIN sys.indexes

    ON indexes.object_id = index_columns.object_id

    AND indexes.index_id = index_columns.index_id

    JOIN sys.columns

    ON indexes.object_id = columns.object_id

    AND columns.column_id = index_columns.column_id

    WHERE indexes.object_id = OBJECT_ID(''Network.LivesAt'');

    ```'
