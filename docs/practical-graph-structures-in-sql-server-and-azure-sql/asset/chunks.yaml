- fmt: "# 5. Tree Data Structures\n\nA tree is one of the more typical graph structures\
    \ you will implement using a SQL Server database. As covered in Chapter [1](#508094_1_En_1_Chapter.xhtml),\
    \ a tree is a directed acyclic graph (DAG) where every node can only have one\
    \ parent relationship. In other worlds, the node can only participate as the `to`\
    \ in zero or one relationship. In Chapter [7](#508094_1_En_7_Chapter.xhtml), you\
    \ will implement a general DAG structure, but it will share some similarity to\
    \ trees when utilizing the data structures.\n\nThere are two main reasons tree\
    \ structures are common. First, they are data structures that meet a need that\
    \ almost every company has: the ability to roll up activity (sales, for example)\
    \ from the people who do the work to the people who manage or coordinate that\
    \ work and then to the regions where that work is performed. For example, a company\
    \ like Microsoft needs to know its total income for the year. This information\
    \ must also be broken down into business units, individual products, individual\
    \ sales groups for that product, and so on. Microsoft probably also has a tree\
    \ structure that breaks data down into regions, product lines, and colors as well.\
    \ The tree structure inherently prohibits duplication, so it is perfect for rolling\
    \ up monetary attribution.\n\nSecond, due to the relatively fixed shape of a tree,\
    \ implementing a tree has been reasonable for years. It is also possible to performance-tune\
    \ tree queries on even a very large dataset (something that is less reasonable\
    \ on a cyclic graph structure that can grow in many different directions at once).\n\
    \nMy first introduction to the topic was well over 20 years ago when I went to\
    \ a workshop taught by Dr. David Rozenshtein. He wrote one of the most influential\
    \ books of my career (*The Essence of SQL*) and was in the middle of writing a\
    \ book on trees that he gave us after the workshop. I don’t think he actually\
    \ finished that book (*Tree and Graph Processing in SQL*) as even today it is\
    \ listed in Amazon as “Preview Edition.” Sadly, as this was three job changes,\
    \ 25 years, and five houses ago, I don’t have these books anymore, but some of\
    \ the techniques taught in that class are still in use today.\n\nThat class started\
    \ a longstanding fascination with tree structures and the many ways to implement\
    \ them. I will discuss more of this in Chapter [6](#508094_1_En_6_Chapter.xhtml)\
    \ when I introduce an additional method to implement a graph for high performance\
    \ access.\n\nIn this chapter, I provide the base code you need to implement a\
    \ working tree structure using SQL Server’s graph database structures. This includes\
    \ all the code to create the objects, maintain the nodes and edges, and then create\
    \ code that will be very common in most implementations (and in the next chapter,\
    \ I use that code to put the structures through some tests.) The output of this\
    \ chapter is a set of objects and data that implements the data structure introduced\
    \ back in Chapter [2](#508094_1_En_2_Chapter.xhtml) and represented in Figure\
    \ [5-1](#508094_1_En_5_Chapter.xhtml#Fig1).\n\n![](images/508094_1_En_5_Chapter/508094_1_En_5_Fig1_HTML.jpg)\n\
    \nA data structure. Company H Q divides into Maine H Q and Tennessee H Q. Maine\
    \ H Q includes a Portland branch and a Camden branch. Tennessee H Q includes Nashville,\
    \ Knoxville, and Memphis branches.\n\n**Figure 5-1** Small set of data for demonstrating\
    \ graph object\n\nI cover the basic techniques needed to manage this data structure\
    \ in this chapter, such as adding, removing, and moving nodes and then querying\
    \ the nodes to roll up activity from parent to child.\n\n## Creating the Data\
    \ Structures\n\nTo get started, let’s create a database, a schema, and the tables\
    \ needed to hold the data. In the GitHub repo for the book for Chapter [5](#508094_1_En_5_Chapter.xhtml),\
    \ there is a script with fillable parameters to create the database named `0000-Create\
    \ The GraphDBTests Database.sql`. It generated a large enough database to do all\
    \ the examples in Chapter [6](#508094_1_En_6_Chapter.xhtml) as well. The database\
    \ name is `GraphDBTests`.\n\n### Base Table Structures\n\nTo start this process,\
    \ create a schema. The schema name represents the algorithm/pattern for this specific\
    \ example. In later examples where I vary the pattern for different methods of\
    \ implementing a tree, I differentiate the sample code with schema names that\
    \ represent those algorithms. This lets me build the same example structures and\
    \ load scripts with the only difference being the name of the schema.\n\n```sql\n\
    CREATE SCHEMA SqlGraph;\n```\n\nThe `Company` node is a basic object with just\
    \ name and surrogate key value columns. Consider this object to be analogous to\
    \ your typical customer table in any database, only missing many of the other\
    \ attributes you might want in your object when you are building your real databases.\
    \ In some designs, you might have a relational `Company` table and join to the\
    \ `Company` node table when you want to deal with it in comparison/position to\
    \ other `Company` rows.\n\nBoth columns in the `Company` table have uniqueness\
    \ constraints, and the surrogate integer key (`CompanyId`) is the clustering key\
    \ (it is possible to cluster on the `$node_id` pseudocolumn, which may be useful\
    \ if you have many columns you need to fetch by the `$node_id`). Unlike a simple\
    \ adjacency list, which might contain a column named like \"`ParentCompanyId`\"\
    \ to indicate the hierarchy, as you saw using SQL Graph objects in the previous\
    \ chapters, the graph structures are in a separate table that is defined as an\
    \ edge.\n\n```sql\nCREATE TABLE SqlGraph.Company\n(\n    CompanyId INT IDENTITY(1,\
    \ 1) CONSTRAINT PKCompany PRIMARY KEY,\n    Name VARCHAR(20) NOT NULL CONSTRAINT\
    \ AKCompany_Name UNIQUE,\n    RootNodeFlag bit CONSTRAINT DFLTCompany_RootNodeFlag\
    \ DEFAULT(0)\n) AS NODE;\n```\n\nThe `RootNodeFlag` is very useful when processing\
    \ the tree at times because it will give you a starting point that you don’t have\
    \ to calculate (or strictly know the name of the node in queries.) The default\
    \ constraint will make it such that you only have to think about it in your DML\
    \ when creating the one root node. To this, you add the following index to make\
    \ sure that there is only one root node:\n\n```sql\nCREATE UNIQUE INDEX rootNode\
    \ ON SqlGraph.Company (RootNodeFlag)\nWHERE RootNodeFlag = 1;\n```\n\nThere are\
    \ no extra columns in this edge, but you might in a real table want to include\
    \ at least the time when the row was created and maybe a time when the relationship\
    \ was established. They might be the same time but likely should not be the same\
    \ column since the relationship might have been established earlier than the row\
    \ was created.\n\nEven when data is coming in real time (for example, from a web\
    \ interface) you might want data to go through some workflow before being inserted\
    \ into your main database. Keeping this example simple will simply keep the example\
    \ simple (duh!) so it basically covers the one aspect we care about… implementing\
    \ a tree. When I compare other algorithms to this one, the most important thing\
    \ is that we do the same things for the other objects.\n\nCreating the edge for\
    \ a tree (as it will for almost any directed acyclic graph) will all be links\
    \ from a node to a node of the very same type, so I will include the edge constraint\
    \ to make sure. Clearly, in a database like this, with only one node table, this\
    \ is implied, but when you want to test performance and functionality, it is always\
    \ best to make your structures follow as best design practices as possible.\n\n\
    ```sql\nCREATE TABLE SqlGraph.ReportsTo\n(\n    CONSTRAINT EC_ReportsTo$DefinesParentOf\n\
    \    CONNECTION (SqlGraph.Company TO SqlGraph.Company)\n    ON DELETE NO ACTION\n\
    ) AS EDGE;\n```\n\nNext, let’s add a few indexes to support the types of queries\
    \ you will be executing."
  raw: '# 5. Tree Data Structures


    A tree is one of the more typical graph structures you will implement using a
    SQL Server database. As covered in Chapter [1](#508094_1_En_1_Chapter.xhtml),
    a tree is a directed acyclic graph (DAG) where every node can only have one parent
    relationship. In other worlds, the node can only participate as the `to` in zero
    or one relationship. In Chapter [7](#508094_1_En_7_Chapter.xhtml), you will implement
    a general DAG structure, but it will share some similarity to trees when utilizing
    the data structures.


    There are two main reasons tree structures are common. First, they are data structures
    that meet a need that almost every company has: the ability to roll up activity
    (sales, for example) from the people who do the work to the people who manage
    or coordinate that work and then to the regions where that work is performed.
    For example, a company like Microsoft needs to know its total income for the year.
    This information must also be broken down into business units, individual products,
    individual sales groups for that product, and so on. Microsoft probably also has
    a tree structure that breaks data down into regions, product lines, and colors
    as well. The tree structure inherently prohibits duplication, so it is perfect
    for rolling up monetary attribution.


    Second, due to the relatively fixed shape of a tree, implementing a tree has been
    reasonable for years. It is also possible to performance-tune tree queries on
    even a very large dataset (something that is less reasonable on a cyclic graph
    structure that can grow in many different directions at once).


    My first introduction to the topic was well over 20 years ago when I went to a
    workshop taught by Dr. David Rozenshtein. He wrote one of the most influential
    books of my career (*The Essence of SQL*) and was in the middle of writing a book
    on trees that he gave us after the workshop. I don’t think he actually finished
    that book (*Tree and Graph Processing in SQL*) as even today it is listed in Amazon
    as “Preview Edition.” Sadly, as this was three job changes, 25 years, and five
    houses ago, I don’t have these books anymore, but some of the techniques taught
    in that class are still in use today.


    That class started a longstanding fascination with tree structures and the many
    ways to implement them. I will discuss more of this in Chapter [6](#508094_1_En_6_Chapter.xhtml)
    when I introduce an additional method to implement a graph for high performance
    access.


    In this chapter, I provide the base code you need to implement a working tree
    structure using SQL Server’s graph database structures. This includes all the
    code to create the objects, maintain the nodes and edges, and then create code
    that will be very common in most implementations (and in the next chapter, I use
    that code to put the structures through some tests.) The output of this chapter
    is a set of objects and data that implements the data structure introduced back
    in Chapter [2](#508094_1_En_2_Chapter.xhtml) and represented in Figure [5-1](#508094_1_En_5_Chapter.xhtml#Fig1).


    ![](images/508094_1_En_5_Chapter/508094_1_En_5_Fig1_HTML.jpg)


    A data structure. Company H Q divides into Maine H Q and Tennessee H Q. Maine
    H Q includes a Portland branch and a Camden branch. Tennessee H Q includes Nashville,
    Knoxville, and Memphis branches.


    Figure 5-1


    Small set of data for demonstrating graph object


    I cover the basic techniques needed to manage this data structure in this chapter,
    such as adding, removing, and moving nodes and then querying the nodes to roll
    up activity from parent to child.


    ## Creating the Data Structures


    To get started, let’s create a database, a schema, and the tables needed to hold
    the data. In the GitHub repo for the book for Chapter [5](#508094_1_En_5_Chapter.xhtml),
    there is a script with fillable parameters to create the database named `0000-Create
    The GraphDBTests Database.sql`. It generated a large enough database to do all
    the examples in Chapter [6](#508094_1_En_6_Chapter.xhtml) as well. The database
    name is `GraphDBTests`.


    ### Base Table Structures


    To start this process, create a schema. The schema name represents the algorithm/pattern
    for this specific example. In later examples where I vary the pattern for different
    methods of implementing a tree, I differentiate the sample code with schema names
    that represent those algorithms. This lets me build the same example structures
    and load scripts with the only difference being the name of the schema.


    ```

    CREATE SCHEMA SqlGraph;

    ```


    The `Company` node is a basic object with just name and surrogate key value columns.
    Consider this object to be analogous to your typical customer table in any database,
    only missing many of the other attributes you might want in your object when you
    are building your real databases. In some designs, you might have a relational
    `Company` table and join to the `Company` node table when you want to deal with
    it in comparison/position to other `Company` rows.


    Both columns in the `Company` table have uniqueness constraints, and the surrogate
    integer key (`CompanyId`) is the clustering key (it is possible to cluster on
    the `$node_id` pseudocolumn, which may be useful if you have many columns you
    need to fetch by the `$node_id`). Unlike a simple adjacency list, which might
    contain a column named like “`ParentCompanyId`” to indicate the hierarchy, as
    you saw using SQL Graph objects in the previous chapters, the graph structures
    are in a separate table that is defined as an edge.


    ```

    CREATE TABLE SqlGraph.Company

    (

    CompanyId INT IDENTITY(1, 1)

    CONSTRAINT PKCompany PRIMARY KEY,

    Name VARCHAR(20) NOT NULL

    CONSTRAINT AKCompany_Name UNIQUE,

    RootNodeFlag bit

    CONSTRAINT DFLTCompany_RootNodeFlag DEFAULT(0)

    ) AS NODE;

    ```


    The `RootNodeFlag` is very useful when processing the tree at times because it
    will give you a starting point that you don’t have to calculate (or strictly know
    the name of the node in queries.) The default constraint will make it such that
    you only have to think about it in your DML when creating the one root node. To
    this, you add the following index to make sure that there is only one root node:


    ```

    CREATE UNIQUE INDEX rootNode ON SqlGraph.Company (RootNodeFlag)

    WHERE RootNodeFlag = 1;

    ```


    There are no extra columns in this edge, but you might in a real table want to
    include at least the time when the row was created and maybe a time when the relationship
    was established. They might be the same time but likely should not be the same
    column since the relationship might have been established earlier than the row
    was created.


    Even when data is coming in real time (for example, from a web interface) you
    might want data to go through some workflow before being inserted into your main
    database. Keeping this example simple will simply keep the example simple (duh!)
    so it basically covers the one aspect we care about… implementing a tree. When
    I compare other algorithms to this one, the most important thing is that we do
    the same things for the other objects.


    Creating the edge for a tree (as it will for almost any directed acyclic graph)
    will all be links from a node to a node of the very same type, so I will include
    the edge constraint to make sure. Clearly, in a database like this, with only
    one node table, this is implied, but when you want to test performance and functionality,
    it is always best to make your structures follow as best design practices as possible.


    ```

    CREATE TABLE SqlGraph.ReportsTo

    (

    CONSTRAINT EC_ReportsTo$DefinesParentOf

    CONNECTION (SqlGraph.Company TO SqlGraph.Company)

    ON DELETE NO ACTION

    )

    AS EDGE;

    ```


    Next, let’s add a few indexes to support the types of queries you will be executing.'
  trans: "\n# 5. 树数据结构\n\n树是你将使用 SQL Server 数据库实现的较为典型的图形结构之一。正如第 1 章所介绍的，树是一种有向无环图\
    \ (DAG)，其中每个节点只能有一个父关系。换句话说，该节点只能作为 `to` 端参与零个或一个关系。在第 7 章中，你将实现一个通用的 DAG 结构，但在利用这些数据结构时，它将与树有某些相似之处。\n\
    \n树结构之所以常见，主要有两个原因。首先，它们是一种满足几乎所有公司都有的需求的数据结构：能够将活动（例如销售额）从执行工作的人员汇总到管理或协调该工作的人员，然后再汇总到执行该工作的区域。例如，像微软这样的公司需要知道其全年的总收入。该信息还必须按业务部门、单个产品、该产品的单个销售组等进行细分。微软可能还有一个树结构，可以按区域、产品线和颜色等细分数据。树结构固有地禁止重复，因此非常适合汇总货币归属。\n\
    \n其次，由于树的形状相对固定，多年来实现树一直是合理的。即使对于非常庞大的数据集，也有可能对树查询进行性能调优（这在可能同时向许多不同方向增长的循环图结构上则不那么合理）。\n\
    \n我第一次接触这个话题是在 20 多年前，当时我参加了一个由 David Rozenshtein 博士主讲的研讨会。他写了我职业生涯中最具影响力的书籍之一\
    \ (*The Essence of SQL*)，并且当时正在写一本关于树的书，研讨会结束后他把那本书给了我们。我认为他实际上并没有完成那本书 (*Tree\
    \ and Graph Processing in SQL*)，因为即使到今天，它在亚马逊上仍被列为“预览版”。遗憾的是，由于这发生在更换了三份工作、25\
    \ 年和五所房子之前，我已经没有这些书了，但那堂课上教授的一些技术至今仍在使用。\n\n那堂课开启了我对树结构及其多种实现方式的长期着迷。在第 6 章中，当我介绍另一种实现图以实现高性能访问的方法时，我会进一步讨论这一点。\n\
    \n在本章中，我将提供使用 SQL Server 的图形数据库结构实现一个可用的树结构所需的基础代码。这包括创建对象、维护节点和边的所有代码，然后创建在大多数实现中非常常见的代码（在下一章中，我将使用该代码对结构进行一些测试。）本章的输出是一组实现第\
    \ 2 章介绍并在图 5-1 中表示的数据结构的对象和数据。\n\n![](img/508094_1_En_5_Fig1_HTML.jpg)\n\n一种数据结构。公司总部划分为缅因州总部和田纳西州总部。缅因州总部包括波特兰分部和卡姆登分部。田纳西州总部包括纳什维尔、诺克斯维尔和孟菲斯分部。\n\
    \n**图 5-1** 用于演示图形对象的小型数据集\n\n在本章中，我将介绍管理此数据结构所需的基本技术，例如添加、删除和移动节点，然后查询节点以从父节点到子节点汇总活动。\n\
    \n## 创建数据结构\n\n首先，让我们创建一个数据库、一个架构以及保存数据所需的表。在本书的 GitHub 仓库第 5 章中，有一个名为 `0000-Create\
    \ The GraphDBTests Database.sql` 的脚本，其中包含可填充参数，用于创建名为 `GraphDBTests` 的数据库。它生成了一个足够大的数据库，用于执行第\
    \ 6 章中的所有示例。\n\n### 基础表结构\n\n要开始此过程，请创建一个架构。架构名称代表此特定示例的算法/模式。在后面的示例中，当我为树的不同实现方法改变模式时，我会用代表这些算法的架构名称来区分示例代码。这让我可以构建相同的示例结构和加载脚本，唯一的区别是架构的名称。\n\
    \n```sql\nCREATE SCHEMA SqlGraph;\n```\n\n`Company` 节点是一个基本对象，只包含名称和代理键值列。可以将此对象视为任何数据库中典型的客户表，只是在构建真实数据库时可能希望对象具有的许多其他属性方面有所缺失。在某些设计中，你可能有一个关系型的\
    \ `Company` 表，当你希望将其与其他 `Company` 行进行比较/定位时，再连接到 `Company` 节点表。\n\n`Company` 表中的两列都有唯一性约束，代理整数键\
    \ (`CompanyId`) 是聚集键（也可以对 `$node_id` 伪列进行聚集，如果你需要通过 `$node_id` 获取许多列，这可能很有用）。与简单的邻接表（可能包含名为“`ParentCompanyId`”的列来指示层次结构）不同，正如你在前面章节中使用\
    \ SQL Graph 对象所看到的，图形结构位于定义为边的单独表中。\n\n```sql\nCREATE TABLE SqlGraph.Company\n\
    (\n    CompanyId INT IDENTITY(1, 1) CONSTRAINT PKCompany PRIMARY KEY,\n    Name\
    \ VARCHAR(20) NOT NULL CONSTRAINT AKCompany_Name UNIQUE,\n    RootNodeFlag bit\
    \ CONSTRAINT DFLTCompany_RootNodeFlag DEFAULT(0)\n) AS NODE;\n```\n\n`RootNodeFlag`\
    \ 在处理树时有时非常有用，因为它会给你一个无需计算（或在查询中严格知道节点名称）的起始点。默认约束将使你只需在创建那个根节点时在 DML 中考虑它。为此，你添加以下索引以确保只有一个根节点：\n\
    \n```sql\nCREATE UNIQUE INDEX rootNode ON SqlGraph.Company (RootNodeFlag)\nWHERE\
    \ RootNodeFlag = 1;\n```\n\n这条边中没有额外的列，但在真实的表中，你可能希望至少包含行创建时间以及关系建立时间。它们可能是相同的时间，但很可能不应该是相同的列，因为关系可能在行创建之前就已建立。\n\
    \n即使数据是实时传入的（例如，从 Web 界面），你也可能希望数据在插入主数据库之前经过一些工作流处理。保持此示例简单只是为了……保持示例简单（废话！），因此它基本上涵盖了我们关心的一个方面……实现树。当我将其他算法与此进行比较时，最重要的是我们为其他对象做同样的事情。\n\
    \n创建树的边（就像几乎任何有向无环图一样）都将是从一个节点到同一类型节点的链接，因此我将包含边约束以确保。显然，在像这样只有一个节点表的数据库中，这是隐含的，但当你想要测试性能和功能时，最好让你的结构尽可能遵循最佳设计实践。\n\
    \n```sql\nCREATE TABLE SqlGraph.ReportsTo\n(\n    CONSTRAINT EC_ReportsTo$DefinesParentOf\n\
    \    CONNECTION (SqlGraph.Company TO SqlGraph.Company)\n    ON DELETE NO ACTION\n\
    ) AS EDGE;\n```\n\n接下来，让我们添加一些索引来支持你将执行的查询类型。\n"
- fmt: '# 树结构索引与维护


    第一个索引是聚集索引，对于此结构，你将基于 `$to_id` 值对表进行聚集。这是因为最常见（且昂贵）的查询将是基于 `$to_id` 获取行。虽然你不需要为自己编写树的广度优先查询，但在内部这正是将要发生的事情，而
    `$to_id` 所代表的列是所有这些查询的引导。将其设为 `UNIQUE` 约束，因为要使此对象成为严格的树，每个 `$to_id` 在结构中应该只出现一次。


    请注意，你可以通过为特定结构在对象中添加名称并将其包含在唯一索引中，从而在同一对象中实现多个树结构。我不会将其作为具体示例，因为代码基本相同，只是需要过滤你正在处理的树段。


    ```

    ALTER TABLE SqlGraph.ReportsTo

    ADD CONSTRAINT AKReportsTo UNIQUE CLUSTERED ($to_id);

    ```


    第二个索引实际上是在 `$from_id` 列上。当你对节点的父节点执行任何查询时，此索引将很有用。


    ```

    CREATE INDEX FromId ON SqlGraph.ReportsTo($from_id);

    ```


    我将使用一些特定的性能演示来比较算法，这两者都反映了你可能需要用于许多实际树对象的活动。


    其中之一是汇总子对象的活动。这类似于一家公司在多个区域有销售额，你需要查看每个区域的销售额。当然，像通常情况一样，区域可以有子区域，如此类推直到不同的地点。没有要求树具有任何特定的形状。一个区域可以单独存在，另一个可以分解成数百个不同的子区域。


    在简单情况下，你将从一个非常平衡的树开始，但你将看到如何修改它使其不平衡。在下一章中，表将填充相当大的随机生成的数据集，因此它们不会完全平衡，只是为了给示例增加一些现实感。


    ## 销售结构演示


    以下对象实际上不是图本身的一部分，但用于生成一些公司销售数据。你将使用一个直接的算法来生成这些数据，因此相同的销售行总是为测试者生成。


    为此，使用一个 `SEQUENCE` 对象为每个客户分配递增的销售数量（但为了简便，销售数量设置为 5）。`SEQUENCE` 对象使过程比使用列上的标识属性要简单得多，因为你可以将其放在存储过程中，如果你想使用不同的方法，替换起来要容易得多。


    ```

    CREATE SEQUENCE SqlGraph.CompanyDataGenerator_SEQUENCE

    AS INT

    START WITH 1;

    GO

    CREATE TABLE SqlGraph.Sale

    (

    SalesId int NOT NULL IDENTITY(1, 1)

    CONSTRAINT PKSale PRIMARY KEY,

    TransactionNumber varchar(10) NOT NULL

    CONSTRAINT AKSale UNIQUE,

    Amount            numeric(12, 2) NOT NULL,

    CompanyId         int            NOT NULL

    CONSTRAINT FKSale$Ref$Company

    REFERENCES SqlGraph.Company(CompanyId),

    INDEX XCompanyId (CompanyId, Amount)

    );

    ```


    `SqlGraph.Sale` 表在此处用于当你执行聚合时使情况更“真实”。请注意，代码使用来自 `SEQUENCE` 对象的序列号作为 `Amount`
    乘以 .25。


    这是用于创建测试销售数据的存储过程：


    ```

    CREATE PROCEDURE SqlGraph.Sale$InsertTestData

    @Name     varchar(20),

    --注意：所有过程都使用自然键以方便手动操作。

    --如果你正在为工具实现此功能以进行操作，

    --请尽可能使用代理键。

    @RowCount int = 5

    --如果需要，可以更改销售数量

    AS

    BEGIN

    SET NOCOUNT ON;

    WHILE @RowCount > 0

    BEGIN

    INSERT INTO SqlGraph.Sale(TransactionNumber, Amount,

    CompanyId)

    --两个 NEXT VALUE FOR 语句在同一代码中返回相同的值。

    SELECT CAST(NEXT VALUE FOR

    SqlGraph.CompanyDataGenerator_SEQUENCE

    AS varchar(10)),

    .25 * CAST(NEXT VALUE FOR

    SqlGraph.CompanyDataGenerator_SEQUENCE

    AS numeric(12, 2)),

    --获取代理键

    (   SELECT Company.CompanyId

    FROM   SqlGraph.Company

    WHERE  Company.Name = @Name);

    SET @RowCount = @RowCount - 1;

    END;

    END;

    ```


    在本章后面，你将看到执行此代码的输出。


    ## 树维护核心代码


    在本节中，你将构建一个编码对象，用于在节点表中创建新行。如果你正在构建一个真实系统，此代码对于重用很有意义。请注意，为了演示清晰，我忽略了一些错误处理，但我已尝试在大多数代码中包含事务和
    `TRY CATCH` 块，因此该代码对于即使是生产系统也是最低限度可接受的。


    你在第 [4](#508094_1_En_4_Chapter.xhtml) 章中研究的一些技术（例如包含触发器对象以使处理更自然）本章不会使用，因为此代码将模拟更真实的过程，即客户可能在真实客户活动中一次创建一行。树结构通常是在线事务处理
    (OLTP) 系统的一部分，数据在其他人使用时可能会被修改。


    与“真实代码”的一个不同之处在于，在所有呈现的代码中，你对参数使用自然键值，因此脚本不必关心内部实现是什么。如果你正在为应用程序构建存储过程接口，通常应该使用主键，但在构建临时操作的接口时，对用户有意义的自然键要容易处理得多。


    注意


    在生产级代码中，尽可能让你的代码通过聚集键访问数据是最佳做法。它消除了对表的不必要书签查找读取。有关性能调整的更多信息，我建议参考 Grant Fritchey
    的 *《SQL Server 2022 查询性能调优：故障排除和优化查询性能（第六版）》*。'
  raw: 'The first is a clustered index, and for this structure you will cluster the
    table on the `$to_id` value. This is because the most common (and expensive) queries
    will be fetching rows based on the `$to_id`. While you will not have to write
    your own breadth-first queries for trees, internally that is exactly what will
    occur, and the columns the `$to_id` represents is the lead in all of those queries.
    Make it a `UNIQUE` constraint because for this object to be a strict tree, each
    `$to_id` should only show up once in the structure.


    Note that you could implement multiple tree structures in the same object by adding
    a name for the specific structures in the object and including it in the unique
    index. I won’t do that as any specific example because the code is very much the
    same, except for filtering on the tree segment you are working with.


    ```

    ALTER TABLE SqlGraph.ReportsTo

    ADD CONSTRAINT AKReportsTo UNIQUE CLUSTERED ($to_id);

    ```


    The second index is actually on the `$from_id` column. When you do any queries
    for the parent of a node, this index will be useful.


    ```

    CREATE INDEX FromId ON SqlGraph.ReportsTo($from_id);

    ```


    There will be a few specific demonstrations of performance I will be using to
    compare algorithms, both of which mirror activity that you will likely need for
    many of your actual tree objects.


    One of these is summing the activity of child objects. This is analogous to a
    company that has sales in multiple regions, and you need to see the sales for
    each region. Of course, as is typical, regions can have subregions and so on down
    to different locations. There is no requirement that the tree have any shape.
    One region could stand alone, and another could be broken down into hundreds of
    different subregions.


    In the simple case, you will start with a very balanced tree, but you will see
    how to modify it to be unbalanced. In the next chapter, the tables will be populated
    with quite large sets of data randomly generated so they will not be perfectly
    balanced, simply to give the examples a bit more reality.


    ### Demo Sales Structure


    The following object is not actually part of the graph itself but is used to generate
    some Company sales data. You will use a straightforward algorithm to generate
    this data, so the same sales rows are always generated for the tester.


    To do this, use a `SEQUENCE` object to give each customer an increasing amount
    of sales (though for sake of easy, the number of sales is set to 5). The `SEQUENCE`
    object makes the process a lot more straightforward than with an identity property
    on a column because you can put it in the stored procedure and if you want to
    use a different method, it is far easier to replace.


    ```

    CREATE SEQUENCE SqlGraph.CompanyDataGenerator_SEQUENCE

    AS INT

    START WITH 1;

    GO

    CREATE TABLE SqlGraph.Sale

    (

    SalesId int NOT NULL IDENTITY(1, 1)

    CONSTRAINT PKSale PRIMARY KEY,

    TransactionNumber varchar(10) NOT NULL

    CONSTRAINT AKSale UNIQUE,

    Amount            numeric(12, 2) NOT NULL,

    CompanyId         int            NOT NULL

    CONSTRAINT FKSale$Ref$Company

    REFERENCES SqlGraph.Company(CompanyId),

    INDEX XCompanyId (CompanyId, Amount)

    );

    ```


    The `SqlGraph.Sale` table is here for when you do aggregations to make the situation
    more “real.” Note that the code uses a sequential number from the `SEQUENCE` object for
    the `Amount` multiplied by .25.


    This is the stored procedure for creating the test sales data:


    ```

    CREATE PROCEDURE SqlGraph.Sale$InsertTestData

    @Name     varchar(20),

    --Note that all procs use natural keys to make it easier

    --for you to work with manually.

    --If you are implementing this for a tool to manipulate,

    --use surrogate keys where possible

    @RowCount int = 5

    --you can vary the number of sales, if you want

    AS

    BEGIN

    SET NOCOUNT ON;

    WHILE @RowCount > 0

    BEGIN

    INSERT INTO SqlGraph.Sale(TransactionNumber, Amount,

    CompanyId)

    --two NEXT VALUE FOR statements return the same value

    --in the same code.

    SELECT CAST(NEXT VALUE FOR

    SqlGraph.CompanyDataGenerator_SEQUENCE

    AS varchar(10)),

    .25 * CAST(NEXT VALUE FOR

    SqlGraph.CompanyDataGenerator_SEQUENCE

    AS numeric(12, 2)),

    --fetch the surrogate key

    (   SELECT Company.CompanyId

    FROM   SqlGraph.Company

    WHERE  Company.Name = @Name);

    SET @RowCount = @RowCount - 1;

    END;

    END;

    ```


    You will see the output of executing this code later in the chapter.


    ## Essential Tree Maintenance Code


    In this section, you will build a coded object to create new rows in the node
    table. This code is interesting for reuse if you are building a real system. Note
    that I have omitted some error handling for clarity of the demos, but I have tried
    to include transactions and `TRY CATCH` blocks in most code so the code is minimally
    acceptable for even production systems.


    Some of the techniques you looked at in Chapter [4](#508094_1_En_4_Chapter.xhtml)
    (like including a trigger object to make processing more natural) will not be
    used in this chapter because this code is going to simulate the more real process
    of creating rows as the customer might do in real customer activity, one at a
    time. Tree structures are very often a part of an online transaction processing
    system (OLTP) system and the data could be modified while others are using the
    data.


    One variation from “real code” is that in all the code presented, you use natural
    key values for the parameters, so the scripts don’t have to care what the internal
    implementation is. If you are building a stored procedure interface for an application,
    you should generally use the primary key, but when building an interface you work
    with in an ad-hoc manner, natural keys that make sense to the user are far easier
    to deal with.


    Note


    Having your code access data by the clustering key is best, when possible, in
    your production-worthy code. It eliminates a read to the table that incurs an
    unnecessary bookmark lookup. For more information about performance tuning, I
    suggest referring to Grant Fritchey’s *SQL Server 2022 Query Performance Tuning:
    Troubleshoot and Optimize Query Performance Sixth Edition.*'
