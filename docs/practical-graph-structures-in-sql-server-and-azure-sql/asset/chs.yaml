  \n这些列名分别被简写为 `$edge_id`、`$from_id`、`$to_id`。后两者需要输入来自节点的 `$node_id` 来标识关系中的起始节点和终止节点。在输入数据时，基本模式类似于以下形式（在下一章，我将展示一些其他的数据创建模式）。基本格式是需要在子查询中查找\
  \ `$from_id` 和 `$to_id` 的值：\n```sql\nINSERT INTO Network.Follows($from_id, $to_id)\n\
