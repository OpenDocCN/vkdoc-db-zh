- "# 3. SQL 图表基础\n\n在本章（以及下一章），是时候开始用 Transact-SQL 代码编写图节点表和边表了。我将带你了解本书剩余部分以及构建你自己的图解决方案所需的所有图语法和技术。\n\
  \nSQL Server 的图扩展语法，甚至图对象创建的内部机制，对你来说可能都显得陌生。对我来说也（现在仍然是）如此。其中一些是基于标准图语法，如果你对 SQL\
  \ Server 之外的图数据库代码并不陌生，你可能已经接触过。在本书中，我将以 SQL Server 引擎作为你在计算机上实现图的唯一且所需引擎的方式来讲解代码。实际情况并非如此，如果你试图实现一个基本上只有图的数据库，你应该阅读纯图数据库并考虑将其作为替代方案。\n\
  \n我对本书的期望是，你通常了解 T-SQL 语言，知道关系数据库的基础知识，并希望用图数据库的元素来扩展你的关系数据库。\n\n> 注意\n> 如果你想了解更多关于设计关系数据库的知识，请查看我的书\
  \ *Pro SQL Server Relational Database Design and Implementation*，该书同样由 Apress 出版。\n\
  \n在本书后面，我将提供额外的工具来实现图和树结构（单父有向无环图 (DAG)，缩写是因为 acyclic 这个词很难拼写！），但这关于 SQL Server\
  \ 图语法的两章介绍将作为本书其余部分的起点。\n\n在本章中，你将实现一个简单的图对象集，加载它们，并学习如何编写代码。下一章将介绍一些使加载和调整对象更容易的技术。本章及所有章节的代码可在\
  \ [`https://github.com/Apress/practical-graph-structures`](https://github.com/Apress/practical-graph-structures)\
  \ 下载。\n\n\n\n## 对象创建\n\n在下载文件中，你从一个未指定任何参数创建的数据库开始（因此它基本上与你模型数据库中的状态一致）。你在此数据库中进行的任何操作都完全不需要进行性能调优。\n\
  \n```\nCREATE DATABASE TestGraph\nGO\nUSE TestGraph\nGO\n```\n\n你将开始使用的图具有图 3-1\
