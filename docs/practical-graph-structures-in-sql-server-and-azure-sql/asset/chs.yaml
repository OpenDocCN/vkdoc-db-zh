  层级结构现在如下所示：


  ```

  HierarchyDisplay


  Company HQ

  --> Georgia HQ

  --> --> Atlanta Branch

  --> --> Dalton Branch

  --> Maine HQ

  --> --> Camden Branch

  --> --> Portland Branch

  --> Tennessee HQ

  --> --> Knoxville Branch

  --> --> Memphis Branch

  --> --> Nashville Branch

  --> Texas HQ

  --> --> Dallas Branch

  --> --> Houston Branch

