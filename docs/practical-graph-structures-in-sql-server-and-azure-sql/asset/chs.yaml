  \n![](img/508094_1_En_3_Fig1_HTML.jpg)\n\n一个由人名组成的图形结构。Val Erry 连接 Lee Roy 和 Joe\
  \ Seph，Fred Rick 连接 Joe Seph、Val Erry 和 Lou Iss。Joe Seph、Lou Iss 和 Day Vid 连接 Saa\
  \ Lee。Saa Lee 连接 Fred Rick 和 Lee Roy。\n\n图 3-1\n\n由“关注”边连接“人物”节点的图\n\n在 SQL Server\
  \ 中创建你的节点和边对象与创建任何其他表完全相同。语法基本相同，只有一点不同：你需要告诉每个对象它是一个节点还是一个边。在下面的脚本中，你将创建实现此图所需的对象。\n\
  \n首先，创建一个架构，因为你通常不希望将任何对象放在 `dbo` 架构中。为你的对象使用特定的架构有利于对象分段，并且绝不会意外地在你的 `master` 数据库中创建一堆对象。\n\
  \n```\nIF SCHEMA_ID('Network') IS NULL\nEXEC ('CREATE SCHEMA Network');\n```\n\n\
  对于人员表，你给一个人赋予 `FirstName` 和 `LastName` 属性，以及一个用于保存两个名字连接的计算列。我经常在示例中使用 `Name` 属性，但我确实想展示一些在\
  \ Transact-SQL 代码中需要获取多个属性的情况。前两个对象还有一个 `Value` 列，我将用它来演示数学聚合。\n\n```\nCREATE TABLE\
  \ Network.Person\n(\nPersonId  int IDENTITY CONSTRAINT PKPerson PRIMARY KEY,\nFirstName\
  \ nvarchar(100) NULL,\nLastName  nvarchar(100) NOT NULL,\nName      AS (CONCAT(FirstName\
  \ + ' ', LastName))PERSISTED,\nValue     int NOT NULL\nCONSTRAINT DFLTPerson_Value\
