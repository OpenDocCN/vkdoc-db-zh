  \ = 'Fred'\nAND Person.LastName = 'Rick') AS from_id,\n(   SELECT Person.$node_id\n\
  FROM   Network.Person\nWHERE  Person.FirstName = 'Joe'\nAND Person.LastName = 'Seph')\
  \ AS to_id;\n-- from_id 和 to_id 只是为了在调试时更容易查看而起的名字。\n-- 可以是任意名称。\n```\n\n现在查看这些数据，你可以看到：\n\
  ```sql\nSELECT *\nFROM   Network.Follows;\n```\n\n输出有四列。注意你的列名几乎肯定会不同，并且你可能也有不同的\
  \ id 值。\n```\n$edge_id_3E64B3D47C09432595C25D1FB2146A35\n\n{\"type\":\"edge\",\"\
  schema\":\"Network\",\"table\":\"Follows\",\"id\":0}\n$from_id_AA09B7FBEA714F918B3C0D19A8B24A0A\n\
  \n{\"type\":\"node\",\"schema\":\"Network\",\"table\":\"Person\",\"id\":0}\n$to_id_4E49D534C24E4F4D8E0E0D207237A425\n\
  \n{\"type\":\"node\",\"schema\":\"Network\",\"table\":\"Person\",\"id\":5}\n```\n\
  \n你也可以像处理任何其他表一样，使用文本值来插入数据。（首先，清空表，因为你还没有防止重复，这将在下一章介绍。）\n```sql\nTRUNCATE TABLE\
  \ Network.Follows;\n-- 使用 truncate 是为了让 id 值重置，只是为了在我的示例中更清晰。\n-- 在实际使用中不需要这样做，在这种情况下这也不那么重要。\n\
  ```\n\n现在你可以直接使用文本值再次插入行：\n```sql\nINSERT INTO Network.Follows($from_id, $to_id)\
  \ VALUES ('{\"type\":\"node\",\"schema\":\"Network\",\"table\":\"Person\",\"id\"\
  :0}',\n'{\"type\":\"node\",\"schema\":\"Network\",\"table\":\"Person\",\"id\":5}');\n\
  ```\n\n注意，这些项目是可以直接输入的值，但它们并不是存储在 SQL Server 中的实际值。内部有几列 `bigint` 类型被表示出来。（在下一章，我将向你展示更多关于数据在内部如何格式化的信息，以及当从外部源加载数据时，如何利用这种文本格式的优势。）\n\
  \n在下载文件中，剩余的行将使用第一种基于查找的格式插入，`SELECT` 语句由 `UNION ALL` 运算符分隔。接下来，让我们展示已创建的数据。\n\n\
  以下查询是你很少想要执行的，因为目标将是尽量不直接获取内部值。在接下来的几页中，我将开始介绍如何使用 SQL 图形运算符来查询这些数据。然而，这个查询与我们最简单的图形查询直接类似，并且了解如何执行此操作是有用的，因为在使用\
  \ SQL 图形运算符时，没有什么像 `OUTER JOIN` 这样的东西。\n```sql\nSELECT Person.Name AS PersonName,\n\
  FollowedPerson.Name AS FollowedPersonName\nFROM   Network.Person\nJOIN Network.Follows\n\
  ON Person.$node_id = Follows.$from_id\nJOIN Network.Person AS FollowedPerson\nON\
  \ FollowedPerson.$node_id = Follows.$to_id;\n```\n\n此查询的输出是你创建的每一条边，显示人物的姓名和他们关注的人的姓名：\n\
  ```\nPersonName     FollowedPersonName\n-------------- ----------------------\n\
  Fred Rick      Joe Seph\nFred Rick      Lou Iss\nJoe Seph       Saa Lee\nSaa Lee\
  \        Lee Roy\nVal Erry       Joe Seph\nVal Erry       Lee Roy\nLou Iss     \
  \   Saa Lee\nLou Iss        Val Erry\nSaa Lee        Fred Rick\nFred Rick      Val\
  \ Erry\nDay Vid        Saa Lee\n```\n\n如果你回头查看图 3-1，你可以追踪列表中从没有箭头的末端到有箭头末端的每一条线。\n\
  \n## 查询数据\n\n使用 SQL 图形运算符查询数据有点复杂，但它所替代的代码也很复杂。在上一节中，你使用 `JOIN` 运算符查询数据，但在接下来的章节中，这些代码将以一种更紧凑的方式表达。这种紧凑性伴随着一定程度的复杂性。\n\
  \n你将查看两个级别的数据查询。首先，你将查看直接的节点到节点查询，即你知道要在路径上查找多远来匹配。其次，你将查看遍历所有可能的路径，寻找连接相隔可变长度的节点的方法。\n\
  \n\n\n### 节点到节点查询\n\n使用 SQL 图对象进行编码时，首要任务是理解查询的工作原理。它们有时与你可能写过的常规 SQL 查询大不相同。最大的区别在于，你将查询图引擎，该引擎是专门为处理单一数据类型而编写的。数据虽然复杂，但由于它遵循特定模式，其语法要通用得多。\n\
  \n你将使用的语法是 `MATCH` 表达式。它基本上在内部返回一个连接（join）或一组连接的布尔值 TRUE 或 FALSE。例如，以下是几页前的查询使用\
  \ `MATCH` 表达式的重写版本：\n\n```sql\nSELECT      Person.Name AS PersonName,\n        \
  \    FollowedPerson.Name AS FollowedPersonName\nFROM        Network.Person,\n  \
  \          Network.Follows,\n            Network.Person AS FollowedPerson\nWHERE\
  \ MATCH(Person-(Follows)->FollowedPerson);\n```\n\n此查询的输出与之前的查询结果相同（可能排序不同，因为没有\
  \ `ORDER BY` 子句）。让我详细解释一下。\n\n```sql\nFROM        Network.Person,\n            Network.Follows,\n\
  \            Network.Person AS FollowedPerson\n```\n\n图查询语法最奇怪的特点之一是，当你使用 `MATCH`\
  \ 表达式时，不能在查询中使用任何 `ANSI-92` 风格的连接，甚至不能使用逗号等效的 `CROSS JOIN`。尝试下面的查询：\n\n```sql\n\
  SELECT      CAST(Person.Name AS nvarchar(20)) AS PersonName,\n            FollowedPerson.Name\
  \ AS FollowedPersonName\nFROM        Network.Person\nCROSS JOIN  Network.Follows\n\
  CROSS JOIN  Network.Person AS FollowedPerson\nWHERE MATCH(Person-(Follows)->FollowedPerson);\n\
  ```\n\n你将看到以下错误：\n\n```\nMsg 13920, Level 16, State 1, Line 221\nIdentifier 'Follows'\
  \ in a MATCH clause is used with a JOIN clause or APPLY operator. JOIN and APPLY\
  \ are not supported with MATCH clauses.\n```\n\n你还会看到针对 `Person` 和 `FollowedPerson`\
  \ 的另外两条错误消息。任何用于获取额外数据的其他连接都需要以不同的方式获取（后面会有示例）。\n\n```sql\nFROM        Network.Person,\n\
  \            Network.Follows,\n            Network.Person AS FollowedPerson\nWHERE\
  \ MATCH(Person-(Follows)->FollowedPerson);\n```\n\n现在来看 `MATCH` 子句。使用一种 `ASCII`\
  \ 艺术来表示，最基本的 `MATCH` 子句具有 `ObjectName-(Edge)->OtherObjectName` 形式，大致可翻译为将 `ObjectName`\
  \ 连接到 `Edge`，再将 `Edge` 连接到 `OtherObjectName`。如果你使用 SQL 图的唯一目的是实现单一的多对多关系，那么可能不值得使用这些对象。然而，正如我将在本章及本书后续部分展示的，你可以通过多个边和节点编写一些非常复杂的连接，以一种实际上更易于理解的方式（一旦你理解了\
  \ `MATCH` 表达式相当复杂的本质）来提出复杂的问题。\n\n如前所述，你不能在图表查询中执行任何 `ANSI` 风格的连接，因此你有两种选择。你可以使用一个\
  \ `CTE` 来获取图结果，然后连接你的额外结果，如下所示：\n\n```sql\nWITH GraphPart AS (\n    SELECT     \
  \ Person.Name AS PersonName,\n                FollowedPerson.Name AS FollowedPersonName,\n\
  \                Person.FirstName\n    FROM        Network.Person,\n           \
  \     Network.Follows,\n                Network.Person AS FollowedPerson\n    WHERE\
  \ MATCH(Person-(Follows)->FollowedPerson))\nSELECT GraphPart.PersonName, GraphPart.FollowedPersonName,\n\
  \       Colors.ColorName\nFROM   GraphPart\n--这也可以是一个 CTE 或一个实际的表\nJOIN (SELECT\
  \ 'blue' AS ColorName\n      UNION ALL\n      SELECT 'red') AS Colors\nON CASE WHEN\
  \ GraphPart.FirstName = 'Fred'\n         THEN 'blue'\n         ELSE 'red'\n    END\
  \ = Colors.ColorName;\n```\n\n或者，你可以在 `FROM` 子句的逗号分隔列表中直接分离出其他表、视图或（如我所使用的）派生表：\n\
  \n```sql\nSELECT      CAST(Person.Name AS nvarchar(20)) AS PersonName,\n       \
  \     FollowedPerson.Name AS FollowedPersonName,\n            Colors.ColorName\n\
  FROM        Network.Person,\n            Network.Follows,\n            Network.Person\
  \ AS FollowedPerson,\n            (   SELECT 'blue' AS ColorName\n             \
  \   UNION ALL\n                SELECT 'red') AS Colors\nWHERE MATCH(Person-(Follows)->FollowedPerson)\n\
  --到派生表的连接子句\nAND CASE WHEN Person.FirstName = 'Fred'\n         THEN 'blue'\n   \
  \      ELSE 'red'\n     END = Colors.ColorName;\n```\n\n由于无法使用 `ANSI-92` 连接语法，因此无法执行\
  \ `OUTER JOIN`，所以你需要小心编写连接条件，以避免意外丢失想要返回的数据。\n\n#### 过滤输出\n\n当你想使用基础的 `MATCH` 表达式过滤查询输出时，可以像在任何查询中一样进行过滤。因此，要只查看\
  \ `Lou Iss` 关注的人，\n\n```sql\nSELECT Person.Name AS PersonName,\n       FollowedPerson.Name\
  \ AS FollowedPersonName\nFROM   Network.Person,\n       Network.Follows,\n     \
  \  Network.Person AS FollowedPerson\nWHERE  Person.FirstName = 'Lou'\n  AND  Person.LastName\
  \ = 'Iss'\n  AND  MATCH(Person-(Follows)->FollowedPerson);\n```\n\n这将只返回 `PersonName`\
  \ 为 `Lou Iss` 的人。在 图 3-3 中，你可以看到遍历的路径。\n\n![](img/508094_1_En_3_Fig3_HTML.jpg)\n\
  \n图 3-3\n在 MATCH 子句中从 Lou Iss 到直接相关人物的遍历路径\n\n查询结果如下：\n\n```\nPersonName       \
  \    FollowedPersonName\n-------------------- ---------------------\nLou Iss   \
  \           Saa Lee\nLou Iss              Val Erry\n```\n\n第一个查询给出了一个人关注的人。要找到关注某个人的人，请反转\
  \ `MATCH` 操作符中的箭头方向：\n\n```sql\nSELECT FollowedPerson.Name AS Person, Person.Name\
  \ AS Follows\nFROM   Network.Person,\n       Network.Follows,\n       Network.Person\
  \ AS FollowedPerson\nWHERE  Person.FirstName = 'Lou'\n  AND  Person.LastName = 'Iss'\n\
  \  AND  MATCH(Person<-(Follows)-FollowedPerson);\n```\n\n这将反向遍历图，如你在 图 3-4 中所见。\n\
  \n![](img/508094_1_En_3_Fig4_HTML.jpg)\n\n图 3-4\n使用 MATCH 子句反向遍历图，获取 Lou Iss 的父行\n\
  \n正如预期，查询返回：\n\n```\nPerson    Follows\n--------- ----------\nFred Rick Lou Iss\n\
  ```\n\n从图的任意给定点开始查询，是你在示例代码中会非常频繁使用的操作，特别是用于查找节点的子行，并经常用于计数或求和其数据。在某些情况下，你甚至会从每个节点开始，查找与每个其他节点的关系。\n\
  \n\n### 多个 MATCH 表达式\n\n你最初使用的是一个简单的 `MATCH` 表达式，但在同一个查询中，你可以执行多个 `MATCH` 表达式。为了更方便地演示这一点，让我们向图中添加一种新的节点类型——编程语言，如图\
  \ 3-5 所示。三个颜色较浅、后缀为 `ProgrammingLanguage` 的节点就是新增加的。边 `ProgramsWith` 记录了一个人使用某种编程语言进行编程的时机。（为了清晰起见，我未在图上标注边的名称。）\n\
  \n![](img/508094_1_En_3_Fig5_HTML.jpg)\n\n一个图形化表示，显示名为 Val Erry、Lee Roy、Day Vid、Joe\
  \ Seph、Lou Iss、Fred Rick 和 Saa Lee 的人物彼此链接。Joe Seph 链接到 C++，Val Erry、Saa Lee 和 Lee\
  \ Roy 链接到 Fortran，而 Val Erry、Lou Iss、Lee Roy 和 Day Vid 链接到 T-SQL 编程语言。\n\n图 3-5：在示例图中引入\
  \ `ProgrammingLanguage`\n\n```sql\nCREATE TABLE Network.ProgrammingLanguage\n(\n\
  \    Name nvarchar(30) NOT NULL\n) AS NODE;\n--加载节点值\nINSERT INTO Network.ProgrammingLanguage(Name)\n\
  VALUES('C++'),\n      ('T-SQL'),\n      ('Fortran');\n```\n\n接下来，创建 `EDGE` 对象。在这种情况下，你不会添加任何列，因此该对象中唯一的列将来自图数据库。\n\
  \n```sql\nCREATE TABLE Network.ProgramsWith AS EDGE;\n```\n\n和之前一样，使用两个查询向两个不同的对象添加行：\n\
  \n```sql\nINSERT INTO Network.ProgramsWith($from_id, $to_id)\nSELECT (SELECT $node_id\n\
  \        FROM   Network.Person\n        WHERE  FirstName = 'Lou'\n        AND  \
  \  LastName = 'Iss') AS from_id,\n       (SELECT $node_id\n        FROM  Network.ProgrammingLanguage\n\
  \        WHERE Name = 'T-SQL') as to_id;\n```\n\n其余的数据加载语句可在下载内容中找到。\n\n首先，让我们查看使用编程语言进行编程的人：\n\
  \n```sql\nSELECT      Person.Name AS Person,\n            ProgrammingLanguage.Name\
  \ AS ProgrammingLanguage\nFROM        Network.Person AS Person,\n            Network.ProgramsWith\
  \ AS ProgramsWith,\n            Network.ProgrammingLanguage AS ProgrammingLanguage\n\
  WHERE MATCH(Person-(ProgramsWith)->ProgrammingLanguage)\nORDER BY    Person.Name;\n\
  ```\n\n返回结果：\n\n```text\nPerson          ProgrammingLanguage\n--------------- -------------------\n\
  Day Vid         T-SQL\nJoe Seph        C++\nLee Roy         Fortran\nLee Roy   \
  \      T-SQL\nLou Iss         T-SQL\nSaa Lee         Fortran\nVal Erry        Fortran\n\
  Val Erry        T-SQL\n```\n\n在图 3-5 中，你可以看到 `Val` 和 `Lee` 都有多条链接，因此它们在输出中有多个行。Fred\
  \ 没有链接任何语言，因此他不会出现在列表中。如果不添加一个“不是程序员”的节点并链接到他，或者不使用 `UNION ALL` 结合类似以下的查询，就无法让 Fred\
  \ 出现在此列表中：\n\n```sql\nSELECT Person.Name AS PersonName,\n       NULL AS ProgrammingLanguage\n\
  FROM   Network.Person\nWHERE  $node_id NOT IN (SELECT $from_id\n               \
  \         FROM   Network.ProgramsWith);\n```\n\n这将返回没有编程语言的行：\n\n```text\nPersonName\
  \      ProgrammingLanguage\n--------------- -------------------\nFred Rick     \
  \  NULL\n```\n\n现在，你可以使用 `MATCH` 表达式来查找共享编程语言技能的人。为此，使用 `Person` 的两个虚拟副本和边的两个虚拟副本（在\
  \ `MATCH` 表达式中，一条边不能被多次使用，但表可以重复使用，如果合理的话。）。图 3-6 显示了与 `Lou Iss` 相连的 `ProgrammingLanguage`\
  \ 节点以及连接到该语言的其他 `Person` 节点的子图。\n\n![](img/508094_1_En_3_Fig6_HTML.jpg)\n\n一个图形化表示，显示名为\
  \ Val Erry、Lee Roy、Day Vid 和 Lou Iss 的人物指向 T-SQL 编程语言，链接上有勾号标记。Lou Iss 链接到 Val Erry，而\
  \ Val Erry 链接到 Lee Roy。\n\n图 3-6：展示与 Lou Iss 共享编程语言技能的交集人员的图示\n\n以下查询通过本质上将此集合与自身连接并使用两个过滤器来实现这一点。你将它们连接起来得到四个输出行。然后过滤掉\
  \ `Lou Iss` 与自身匹配的那一行，得到三个匹配项。\n\n```sql\nSELECT      Person.Name AS Person,\n \
  \           Person2.Name AS Person2,\n            ProgrammingLanguage.Name AS ProgrammingLanguage\n\
  FROM        Network.Person AS Person,\n            Network.Person AS Person2,\n\
  \            Network.ProgramsWith AS ProgramsWith,\n            Network.ProgrammingLanguage\
  \ AS ProgrammingLanguage,\n            Network.ProgramsWith AS ProgramsWith2\nWHERE\
  \ MATCH(Person-(ProgramsWith)->ProgrammingLanguage)\n  AND MATCH(Person2-(ProgramsWith2)->ProgrammingLanguage)\n\
  --每个人都会匹配自身\n  AND Person2.PersonId <> Person.PersonId\n  AND Person.Name = 'Lou\
  \ Iss'\nORDER BY    Person.Name, Person2.Name;\n```\n\n此查询的输出如描述所示（三行）：\n\n```text\n\
  Person        Person2     ProgrammingLanguage\n------------- ----------- -------------------\n\
  Lou Iss       Day Vid     T-SQL\nLou Iss       Lee Roy     T-SQL\nLou Iss      \
  \ Val Erry    T-SQL\n```\n\n你可以使用这种 `MATCH` 表达式的其他格式。事实上，你可以将 `Person` 到 `ProgrammingLanguage`\
  \ 的两个 `MATCH` 表达式在一个 `ASCII` 艺术版本的查询中表达，像这样：\n\n```sql\nWHERE MATCH(Person-(ProgramsWith)->ProgrammingLanguage<-(ProgramsWith2)-Person2)\n\
  ```\n\n另一种变体是，在单个 `MATCH` 表达式中表达了等式的两侧。最后，既然你可能无法像那样将所有内容组合到一个 `MATCH` 表达式中，你可以在\
  \ `MATCH` 表达式中直接使用 `AND`：\n\n```sql\nWHERE  MATCH(Person-(ProgramsWith)->ProgrammingLanguage\n\
  \        AND Person2-(ProgramsWith2)->ProgrammingLanguage)\n```\n\n你甚至可以将 `Person`\
  \ 到 `Person2` 的关系也纳入 `MATCH` 表达式中！\n\n```sql\nWHERE MATCH(Person-(ProgramsWith)->ProgrammingLanguage<-(ProgramsWith2)-Person2)\n\
  ```\n\n是否要将所有内容塞进一个长长的 `ASCII` 艺术表达式是另一个讨论话题，因为这可能难以处理（尤其是在对一个未提供预期结果的查询进行故障排除时）。\n\
  \n在下一个查询中，让我们寻找彼此关注（follow）并且共享编程语言的人。这类查询，结合通用的多对多表，是 SQL 图对象强大功能的一部分。\n\n```sql\n\
  SELECT      Person.Name AS Person,\n            Person2.Name AS Person2,\n     \
  \       ProgrammingLanguage.Name\nFROM        Network.Person AS Person,\n      \
  \      Network.Person AS Person2,\n            Network.ProgramsWith AS ProgramsWith,\n\
  \            Network.ProgrammingLanguage AS ProgrammingLanguage,\n            Network.ProgramsWith\
  \ AS ProgramsWith2,\n            Network.Follows AS Follows\nWHERE MATCH(Person-(ProgramsWith)->ProgrammingLanguage)\n\
  \  AND MATCH(Person2-(ProgramsWith2)->ProgrammingLanguage)\n  AND MATCH(Person-(Follows)->Person2)\n\
  \  AND Person2.PersonId <> Person.PersonId\n  AND Person.Name = 'Lou Iss'\nORDER\
  \ BY    Person, Person2, Name;\n```\n\n这将集合进一步向下过滤，如图 3-7 所示。在那些也使用 Lou Iss 所用编程语言进行编程的人的子集中，`Lou\
  \ Iss` 只关注了 `Val Erry`。\n\n![](img/508094_1_En_3_Fig7_HTML.jpg)\n\n一个图形化表示，显示人物名称。勾号标记位于\
  \ Lou Iss 到 Val Erry 的链接上，以及 Val Erry 和 Lou Iss 到 T-SQL 编程语言的链接上。Lee Roy 和 Day Vid\
  \ 链接到 T-SQL 编程语言，而 Val Erry 链接到 Lee Roy。\n\n图 3-7：在之前的查询中添加额外的关注关系\n\n查询返回 Lou Iss\
  \ 所关注的、同时也使用 T-SQL 编程的那一个人：\n\n```text\nPerson       Person2       ProgrammingLanguage\n\
  ------------ ------------- ------------------------------\nLou Iss      Val Erry\
  \      T-SQL\n```\n\n你可以利用多层的 `MATCH` 表达式将边和节点绑定在一起，从而创建丰富的查询，以多种方式查找节点之间的相似之处。\n\
  \n\n### 遍历变量层级路径\n\n到目前为止，我已经介绍了如何在数据结构中进行单次跳跃。虽然 `MATCH` 子句使得编写多重连接变得更容易，但图结构的强大之处通常在于查询更长的路径，以了解节点是如何连接的。\n\
  \n例如，假设你想查找图中所有与 `Day Vid` 在任意层级遍历中相连的人。从 `Day Vid` 到 `Saa Lee` 只有一个直接连接，但 `Saa`\
  \ 与几个人相连，并且在图的第三次遍历中，`Fred Rick` 又与另外三个人相连，如图 3-8 所示。\n\n![](img/508094_1_En_3_Fig8_HTML.jpg)\n\
  \n图 3-8：与 Day Vid 相连的所有人\n\n当所有节点都被触达后，我就停止了遍历。例如，我没有从 `Val Erry` 继续到 `Joe Seph`，因为\
  \ `Joe` 已经被到达过了。这是因为我们已经有了从 `Day Vid` 到 `Joe Seph` 的最短行走/路径。而且从 `Joe Seph` 到 `Saa\
  \ Lee` 的路径会形成一个环路。任何环路都不能经过我们的起始节点，但当节点的度数非常高时（例如，`Saa Lee` 有五个连接，三个传入，两个传出），图中总是很可能存在环路。\n\
  \n当你需要以这种方式处理图时，SQL Server 在 `MATCH` 表达式中实现了一个 `SHORTEST_PATH` 子句，用于（毫不奇怪地）找到两个节点之间尽可能最短的路径。它是一条（据我们所知）随机的路径，因为如果通过图有多条路径，它只会选择一条。（当我讨论如何处理加权图时，这一点将再次演示，截至\
  \ SQL Server 2022，SQL Server 在语法中并未实现加权图。）\n\n使用 `SHORTEST_PATH` 的语法有点棘手，有些语法部分我花了相当多功夫才学会。（每次编写最短路径查询时，我仍然需要查阅确切的细节，而且我并不为此感到羞愧！）\n\
  \n#### 显示路径中的最后一个节点\n\n在下一个查询中，你将执行一个最小化的查询，以获取从 `Lou Iss` 节点到任何其他相连节点的最短路径。在展示查询和结果后，我将分解其语法。\n\
  \n```sql\nSELECT Person.Name,\nLAST_VALUE(FollowedPerson.Name) WITHIN GROUP (GRAPH\
  \ PATH)\nAS ConnectedPerson\nFROM   Network.Person AS Person,\nNetwork.Follows FOR\
  \ PATH AS Follows,\nNetwork.Person FOR PATH AS FollowedPerson\nWHERE  Person.FirstName\
  \ = 'Lou'\nAND Person.LastName = 'Iss'\nAND MATCH(SHORTEST_PATH(Person(-(Follows)->FollowedPerson)+));\n\
  ```\n\n此查询的输出是除 `Day Vid` 之外的每个节点：\n\n```text\nPerson        ConnectedPerson\n-------------\
  \ ---------------\nLou Iss       Val Erry\nLou Iss       Saa Lee\nLou Iss      \
  \ Fred Rick\nLou Iss       Lee Roy\nLou Iss       Joe Seph\nLou Iss       Lou Iss\n\
  ```\n\n你可以在图 3-9 中看到为获取 `ConnectedPerson` 输出中的每个值所遵循的不同路径。例如，`Joe Seph` 被包含在内，是因为你可以遵循从\
  \ `Lou Iss` 到 `Val Erry` 再到 `Joe Seph` 的路径。\n\n要获得该输出，只需遍历图并添加找到的每个节点。在第一次遍历时，你添加\
  \ `Val Erry` 和 `Saa Lee`。在第二次遍历时，添加 `Lee Roy` 和 `Fred Rick`，依此类推。输出不包含任何额外细节，因此你只需到达该节点即可。不会有任何重复项，因为你找到的是节点之间的最短路径，如果存在多条路径，它只返回其中一条。\n\
  \n![](img/508094_1_En_3_Fig9_HTML.jpg)\n\n图 3-9：查找 Lou Iss 与其他节点之间的最短路径\n\n请注意，`Lou\
  \ Iss` 的节点出现在输出中，因为在广度优先算法的第三次迭代中它被到达了。\n\n在查询中，包含了一些新内容。首先看 `FROM` 子句，你在用于计算路径的边和节点对象中添加了\
  \ `FOR PATH`。锚对象，在这个例子中是 `Network.Person` 的一个副本，可以直接在查询输出中使用，就像查询输出中的 `Person.Name`\
  \ 一样。带有 `FOR PATH` 的对象只能用于图聚合函数，例如 `LAST_VALUE` 函数。\n\n```sql\nFROM   Network.Person\
  \ AS Person,\nNetwork.Follows FOR PATH AS Follows,\nNetwork.Person FOR PATH AS FollowedPerson\n\
  ```\n\n`MATCH` 表达式也包含更多内容：\n\n```sql\nAND MATCH(SHORTEST_PATH(Person(-(Follows)->FollowedPerson)+));\n\
  ```\n\n你可以看到 `SHORTEST_PATH` 位于 `MATCH` 表达式内部，它本身又接收锚对象作为输入，然后是与之前相同的路径对象语法。`+`\
  \ 号表示你需要所有层级。你可以使用 `{1-N}` 指定要处理多少层级。你总是从第一级开始，但然后可以指定沿路径向下处理多远。当你需要处理一个巨大的图并且不一定需要查看距离锚点\
  \ 1,000 跳之外的项目时，这可能是至关重要的。`SHORTEST_PATH` 表达式可以更复杂（我将演示！），并且你也可以包含其他 `MATCH` 条件。\n\
  \n```sql\nLAST_VALUE(FollowedPerson.Name) WITHIN GROUP (GRAPH PATH)\nAS ConnectedPerson\n\
  ```\n\n在使用 `SHORTEST_PATH` 时，`LAST_VALUE` 可能是你可以使用的图函数中最重要的一个，因为它的输出来自连接节点的一个值。它通常将是你用来向用户显示信息片段或获取键值以连接到其他对象的值。\n\
  \n你可以在查询中使用 `LAST_VALUE` 函数（以及大多数其他函数），就像使用任何列一样（尽管在书籍文本中展示要复杂得多！）。例如，如果你没有连接的名字列，你可以使用以下语法输出名字：\n\
  \n```sql\nCONCAT(\nLAST_VALUE(FollowedPerson.Firstname) WITHIN GROUP (GRAPH PATH),\n\
  ' ',\nLAST_VALUE(FollowedPerson.LastName) WITHIN GROUP (GRAPH PATH))\nAS Name\n\
  ```\n\n\n\n#### 路径聚合\n\n现在，你已经掌握了基本概念。（请相信我；你可能需要反复尝试很多次才能真正消化吸收！）那么，让我们看看可以为输出添加的其他功能。你可以执行诸如\
  \ `COUNT` 之类的聚合操作。`COUNT` 是获取节点间跳数（hops）的标准方法。例如：\n\n```sql\nSELECT Person.Name\
  \ AS Person,\nLAST_VALUE(FollowedPerson.Name) WITHIN GROUP\n(GRAPH PATH) as ConnectedPerson,\n\
  COUNT(FollowedPerson.PersonId) WITHIN GROUP\n(GRAPH PATH) as Level\nFROM   ...\n\
  ```\n\n当使用这个 `SELECT` 子句时，`COUNT` 聚合会计算每次节点之间发生跳跃的次数。在输出中，你可以看到 `Val` 和 `Saa` 直接连接到\
  \ `Lou`，所以是一跳。`Fred`、`Joe` 和 `Lee` 是两跳。而返回到 `Lou` 则需要三跳。\n\n```\nPerson        ConnectedPerson\
  \   Level\n------------- ----------------- -----------\nLou Iss       Val Erry \
  \         1\nLou Iss       Saa Lee           1\nLou Iss       Fred Rick        \
  \ 2\nLou Iss       Lee Roy           2\nLou Iss       Joe Seph          2\nLou Iss\
  \       Lou Iss           3\n```\n\n接下来要添加的是实际遍历以达到输出的 `LAST_VALUE` 值的路径。这是在调试此代码并向用户显示输出时最有用的工具之一。最短路径输出中表示的每个节点的节点标签。\n\
  \n这是使用 `STRING_AGG` 完成的，它最清晰地展示了此算法如何执行广度优先查询。对于每次迭代，`FollowedPerson.Name` 的值都会被添加到列表中（并且只有在存在另一次迭代时，它才会包含\
  \ `'->'` 值，因为在 `STRING_AGG` 函数中，第二个参数是分隔符）。\n\n```sql\nSELECT Person.Name,\nSTRING_AGG(FollowedPerson.Name,\
  \ '->') WITHIN GROUP\n(GRAPH PATH) AS Path\nFROM...\n```\n\n此查询的输出是\n\n```\nName\
  \        Path\n----------- ---------------------------------\nLou Iss     Val Erry\n\
  Lou Iss     Saa Lee\nLou Iss     Saa Lee->Fred Rick\nLou Iss     Val Erry->Lee Roy\n\
  Lou Iss     Val Erry->Joe Seph\nLou Iss     Saa Lee->Fred Rick->Lou Iss\n```\n\n\
  请注意，从 `Lou` 到 `Lee` 的路径只经过了 `Val`。在图表上，它还经过了 `Saa`。本章后面，我将演示如何在输出中包含所有路径。（它不会像这些查询那样整洁有序！）\n\
  \n在许多情况下，所选路径包含哪些节点对你的输出应该没有太大影响。也就是说，除非你开始对路径中的节点进行聚合操作，或者想从多条路径中进行选择。那样就会变得稍微复杂一些。\n\
  \n我在创建图时，在每个边和节点上都包含了值列，以便我们将其与 `COUNT` 输出进行比较，因为每个值都是 `1`。\n\n```sql\nSELECT STRING_AGG(FollowedPerson.Name,\
  \ '->')WITHIN GROUP\n(GRAPH PATH) AS PATH,\nCOUNT(FollowedPerson.PersonId) WITHIN\
  \ GROUP (GRAPH PATH)\nAS Level,\nSUM(FollowedPerson.Value) WITHIN GROUP (GRAPH PATH)\n\
  AS SumNodeValues,\nSUM(Follows.Value) WITHIN GROUP (GRAPH PATH)\nAS SumEdgeValues\n\
  FROM ...\n```\n\n此查询的输出有两个新列，其值各自与层级（Level）相同。在下面的输出中，我添加了额外的值，你可以看到总和不包括基础节点：\n\
  \n```\nPath                      Level       SumNodeValues SumEdgeValues\n-------------------------\
  \ ----------- ------------- -------------\nVal Erry                  1         \
  \  1             1\nSaa Lee                   1           1             1\nSaa Lee->Fred\
  \ Rick        2           2             2\nVal Erry->Lee Roy         2         \
  \  2             2\nVal Erry->Joe Seph        2           2             2\nSaa Lee->Fred\
  \ Rick->Lou.. 3           3             3\n```\n\n这与你在路径中看到的一致。你只看到被链接的节点。再想想到达此位置所经过的边，例如\
  \ `Saa Lee->Fred Rick`。在 `Lou Iss` 和 `Fred Rick` 之间有两条边，因此对这些值求和得到 2，正如你在结果中看到的。而且，在基础节点之后的链中有两个节点。再次提醒，在聚合边和中间节点时要小心，因为总和是基于所采取的路径，而其他路径可能有不同的值。只有当你对随机选择的路径值感到满意时，这才有意义，这在查看结果时可能很难记住。\n\
  \n例如，考虑图 3-10 中的子图。从 `Fred Rick` 到 `Saa Lee` 的直接路径具有最高的量级值，但使用 `SHORTEST_PATH` 语法，这是你能选择的唯一路径。\n\
  \n![](img/508094_1_En_3_Fig10_HTML.jpg)\n\n一个图结构。Fred Rick 以量级值 100 链接到 Joe Seph\
  \ 和 Lou Iss，两者又以 100 链接到 Saa Lee。Fred Rick 以 1000000 链接到 Saa Lee。\n\n图 3-10\n\n\
  边上带有量级值的示例子图\n\n本章后面，我将演示如何以不同的方式获取路径，这种方式会复杂得多，但将允许你获取两个节点之间的每条路径，并在需要时进行比较。\n\n\
  #### 控制处理深度\n\n在一个非常大的图中，你可能不希望遍历图的每一层。因此，有时你需要限制要处理的距离。你可以在 `SHORTEST_PATH` 语法中控制要搜索的层数。在之前的例子中，你使用了以下\
  \ `MATCH` 表达式：\n\n```sql\nMATCH(SHORTEST_PATH(Person(-(Follows)->FollowedPerson)+))\n\
  ```\n\n语法中的加号 (`+`) 是你控制处理迭代次数的地方。将 `+` 改为 `{1,Depth}` 来控制深度。数字 1 表示你开始的层级，但你不能从更深的层级开始。如果第一个数字不是\
  \ 1，你会得到以下错误：\n\n```\nMsg 13942, Level 15, State 2, Line 556\nThe initial recursive\
  \ quantifier must be 1: {1, ... }.\n```\n\n要显示层级 1 或 2 上的所有连接人员及其路径，你可以使用以下查询：\n\
  \n```sql\nSELECT STRING_AGG(FollowedPerson.Name, '->') WITHIN GROUP\n(GRAPH PATH)\
  \ AS Path,\nCOUNT(FollowedPerson.PersonId) WITHIN GROUP (GRAPH PATH)\nAS LEVEL\n\
  FROM   Network.Person AS Person,\nNetwork.Follows FOR PATH AS Follows,\nNetwork.Person\
  \ FOR PATH AS FollowedPerson\nWHERE  Person.FirstName = 'Lou'\nAND Person.LastName\
  \ = 'Iss'\nAND MATCH(\nSHORTEST_PATH(Person(-(Follows)->FollowedPerson){1,2}));\n\
  ```\n\n此查询的输出是\n\n```\nPath                     Level\n------------------------\
  \ -----------\nVal Erry                 1\nSaa Lee                  1\nSaa Lee->Fred\
  \ Rick       2\nVal Erry->Lee Roy        2\nVal Erry->Joe Seph       2\n```\n\n\
  你可以看到所有层级值都在 1 和 2 之间。使用 `+` 或甚至 `{1,3}` 重新执行查询，你将看到的区别是多了一行，其路径为 `Saa Lee->Fred\
  \ Rick->Lou Iss`，层级值为 3。\n\n如果你想在低端限制层级，例如想查看层级 2 和 3，你需要使用一个 CTE。考虑到分组等因素，你可能认为\
  \ `HAVING` 子句会起作用，但它不可用。\n\n```sql\nWITH BaseRows AS (\nSELECT STRING_AGG(FollowedPerson.Name,\
  \ '->') WITHIN GROUP\n(GRAPH PATH) AS Path,\nCOUNT(FollowedPerson.PersonId) WITHIN\
  \ GROUP (GRAPH PATH)\nAS LEVEL\nFROM   Network.Person AS Person,\nNetwork.Follows\
  \ FOR PATH AS Follows,\nNetwork.Person FOR PATH AS FollowedPerson\nWHERE  Person.FirstName\
  \ = 'Lou'\nAND Person.LastName = 'Iss'\nAND MATCH(\nSHORTEST_PATH(Person(-(Follows)->FollowedPerson){1,3}))\n\
  )\nSELECT *\nFROM   BaseRows\nWHERE  Level BETWEEN 2 AND 3;\n```\n\n此查询的输出与使用 +\
  \ 时相同，但现在，锚定节点与匹配项之间只有一跳的两行已经被过滤掉了。\n\n\n#### 过滤特定路径\n\n在公共表表达式（`CTE`）中需要处理多个过滤器。其中一个你可能会经常使用的，就是过滤出你正在寻找的那条路径。例如，假设你想查看从\
  \ `Lou Iss` 到 `Lee Roy` 的路径。你可以将锚点节点表过滤到只剩一行，即 `Lou Iss` 那一行。基础查询被放入一个非递归的 `CTE`\
  \ 中，然后你在 `CTE` 内部的查询中过滤起始点，在外部查询中过滤你希望看到匹配结果的行：\n\n```sql\nWITH BaseRows AS (\n\
  SELECT LAST_VALUE(FollowedPerson.Name) WITHIN GROUP (GRAPH PATH)\nAS ConnectedPerson,\n\
  STRING_AGG(FollowedPerson.Name, '->') WITHIN GROUP\n(GRAPH PATH) AS Path\nFROM \
  \  Network.Person AS Person,\nNetwork.Follows FOR PATH AS Follows,\nNetwork.Person\
  \ FOR PATH AS FollowedPerson\nWHERE  Person.FirstName = 'Lou'\nAND Person.LastName\
  \ = 'Iss'\nAND MATCH(\nSHORTEST_PATH(Person(-(Follows)->FollowedPerson){1,3}))\n\
  )\nSELECT Path\nFROM   BaseRows\nWHERE ConnectedPerson = 'Lee Roy';\n--在生产代码中，这里可能应该使用代理键或名字组成部分\n\
  ```\n\n此查询的输出仅仅是 `Lou Iss` 到 `Lee Roy` 的路径，该路径经过了 `Saa Lee`：\n\n```sql\nPath\n\n\
  Saa Lee->Lee Roy\n```\n\n#### 查找节点间的所有路径\n\n接下来的代码可能是本书中最复杂的。这种基本的查询模式在后面的章节中会重复出现几次，因为它是一项必备技能。但实现起来确实非常复杂。\n\
  \n其思路是，你实现 Microsoft 使用 `SHORTEST_PATH` 构建的基本查询模式，但稍作改动。除了结构中出现循环的情况外，你不会因任何其他原因而停止处理。\n\
  \n使用当前的图，如果你想找出两个节点之间的所有路径，可以使用下面的代码。我在代码中加入了一些有用的注释，来指出代码的工作原理。但核心思想是，使用一个递归的 `CTE`，你通过一种广度优先算法不断迭代集合，但你会保留输出的每一个分支，即使你已经找到了查询中的目标节点。你稍后再对输出进行过滤。\n\
  \n```sql\n--获取起始点\nDECLARE @FirstName NVARCHAR(100) = N'Lou';\nDECLARE @LastName\
  \ NVARCHAR(100) = N'Iss';\n--过滤终点\nDECLARE @ToFirstName NVARCHAR(100) = N'Lee';\n\
  DECLARE @ToLastName NVARCHAR(100) = N'Roy';\n--对于较大的图，这可能需要设置以防止过度递归\nDECLARE @MaxLevel\
  \ INT =10;\nWITH BaseRows\nAS (\n--CTE 锚点只是起始节点\nSELECT Person.PersonId,\nPerson.PersonId\
  \ AS FollowsPersonId,\nPerson.Name,\n--包含我们已在所有示例中构建的可读路径，锚点包含在内\nCAST(Person.Name\
  \ AS NVARCHAR(4000)) AS Path,\n--此路径用于阻止循环。如果路径中已经找到该 PersonId，则递归将停止\nCAST(CONCAT('\\\
  ', Person.PersonId, '\\')\nAS VARCHAR(8000)) AS IdPath,\n0 AS level --层级\nFROM Network.Person\n\
  WHERE Person.FirstName = @FirstName --在这里过滤锚点\nAND Person.LastName = @LastName\n\
  UNION ALL\n--非常典型的一层图查询：\nSELECT Person.PersonId AS PersonId,\nFollowedPerson.PersonId\
  \ AS FollowsPersonId,\nFollowedPerson.Name,\nBaseRows.Path + '>' + FollowedPerson.Name,\n\
  BaseRows.IdPath +\nCAST(FollowedPerson.PersonId AS VARCHAR(10)) + '\\',\nBaseRows.level\
  \ + 1\nFROM Network.Person,\nNetwork.Follows,\nNetwork.Person AS FollowedPerson,\n\
  BaseRows\nWHERE MATCH(Person-(Follows)->FollowedPerson)\n--这将锚点连接到查询的递归部分\nAND BaseRows.FollowsPersonId\
  \ = Person.PersonId\n--这是阻止递归的部分，将字符串值视为数组处理\nAND NOT BaseRows.IdPath LIKE CONCAT('%\\\
  ',\nFollowedPerson.PersonId, '\\%')\nAND BaseRows.level <= @MaxLevel)\nSELECT BaseRows.Path\n\
  FROM BaseRows\nWHERE BaseRows.Name = 'Lee Roy';\n```\n\n此查询的输出如下（我手动添加了编号以对应图 3-11）\n\
  \n![](img/508094_1_En_3_Fig11_HTML.jpg)\n\n一个图形结构。`Val Erry` 链接了 `Lee Roy` 和 `Joe\
  \ Seph`，`Fred Rick` 链接了 `Joe Seph`、`Val Erry` 和 `Lou Iss`。`Joe Seph`、`Lou Iss` 和\
  \ `Day Vid` 链接了 `Saa Lee`。`Saa Lee` 链接了 `Fred Rick` 和 `Lee Roy`。除了 `Day Vid` 到 `Saa\
  \ Lee`，以及 `Fred Rick` 到 `Joe Seph` 和 `Lou Iss` 的路径外，所有路径都有额外的编号箭头。\n\n图 3-11\n\n\
  在示例图中追踪从 `Lou Iss` 到 `Lee Roy` 的路径\n\n```sql\nPath\n\n1 Lou Iss>Val Erry>Lee Roy\n\
  2 Lou Iss>Val Erry>Joe Seph>Saa Lee>Lee Roy\n3 Lou Iss>Saa Lee>Lee Roy\n4 Lou Iss>Saa\
  \ Lee>Fred Rick>Val Erry>Lee Roy\n```\n\n你可以在图 3-11 上追踪这些不同的路径。\n\n即使在这个相当小的例子中，你也能看到，原本可能在两个迭代步骤中找到的一个结果，现在扩展到了四个，还多了一个步骤。\n\
  \n如果你的用户想要回答诸如“是否存在一条从 `Lou Iss` 到 `Lee Roy` 的路径，同时包含 `Fred Rick`？”这样的问题，这种解决方案将是必要的。在大多数循环图中，没有简单的方法来回答这个问题，因为其结构完全不可预测。对于有向图，可能会更容易一些（对于树结构则容易得多），但如果你需要非常具体地指定路径，那么处理过程预计会更加复杂。\n\
  \n\n## 加权图计算\n\n在上一节中，你学习了查找两个节点之间所有路径的方法。这对于进行加权图计算的过程至关重要。本章的示例代码将直接使用我们已创建的图及其预设值（为简化起见，所有值均为\
  \ 1）。\n\n在以下代码中，我重点展示了它与上一节“查找节点间所有路径”查询的不同之处：\n\n```sql\nDECLARE @FirstName NVARCHAR(100)\
  \ = N'Lou';\nDECLARE @LastName NVARCHAR(100) = N'Iss';\nDECLARE @ToFirstName NVARCHAR(100)\
  \ = N'Lee';\nDECLARE @ToLastName NVARCHAR(100) = N'Roy';\nDECLARE @MaxLevel INT\
  \ = 10;\nWITH BaseRows\nAS (SELECT Person.PersonId,\n    Person.PersonId AS FollowsPersonId,\n\
  \    Person.Name,\n    CAST(Person.Name AS NVARCHAR(4000)) AS Path,\n    CAST(CONCAT('\\\
  ', Person.PersonId, '\\') AS VARCHAR(8000)) AS IdPath,\n    0 AS level,\n    0 AS\
  \ WeightedCost, --边的值总和\n    Person.Value AS NodeSum --节点的值总和\nFROM Network.Person\n\
  WHERE Person.FirstName = @FirstName\nAND Person.LastName = @LastName\nUNION ALL\n\
  SELECT Person.PersonId AS PersonId,\n    FollowedPerson.PersonId AS FollowsPersonId,\n\
  \    FollowedPerson.Name,\n    BaseRows.Path + '>' + FollowedPerson.Name,\n    BaseRows.IdPath\
  \ + CAST(FollowedPerson.PersonId AS VARCHAR(10)) + '\\',\n    BaseRows.level + 1,\n\
  \    --在每次迭代中增加值\n    --边的值（比节点数少一个值）\n    BaseRows.WeightedCost + Follows.Value,\n\
  \    --节点，包括锚点\n    BaseRows.NodeSum + FollowedPerson.Value\nFROM Network.Person,\n\
  \    Network.Follows,\n    Network.Person AS FollowedPerson,\n    BaseRows\nWHERE\
  \ MATCH(Person-(Follows)->FollowedPerson)\nAND BaseRows.FollowsPersonId = Person.PersonId\n\
  AND NOT BaseRows.IdPath LIKE CONCAT('%\\', FollowedPerson.PersonId, '\\%')\nAND\
  \ BaseRows.level < 10)\nSELECT BaseRows.Path,\n    BaseRows.WeightedCost,\n    BaseRows.NodeSum\n\
  FROM BaseRows\nWHERE BaseRows.Name = 'Lee Roy';\n```\n\n此查询的输出结果是：\n\n```\nPath\
  \                                         WeightedCost NodeSum\n--------------------------------------------\
  \ ------------ -------\nLou Iss>Val Erry>Lee Roy                     2         \
  \   3\nLou Iss>Val Erry>Joe Seph>Saa Lee>Lee Roy    4            5\nLou Iss>Saa\
  \ Lee>Lee Roy                      2            3\nLou Iss>Saa Lee>Fred Rick>Val\
  \ Erry>Lee Roy   4            5\n```\n\n由于每个节点和边的值都是 1，你可以看到成本和总和基本上等于处理该路径时所触及的节点和边的数量。如果你想进行不同的聚合计算，需要自行编写相应的代码。例如，要计算平均值，需保留总和与计数，以便在输出查询中计算平均值。对于类似\
  \ `MIN` 或 `MAX` 的输出，你需要在每次迭代中比较该值。\n\n利用这个结果表，你可以轻松修改查询，通过 `TOP 1`（或 `TOP 1 WITH\
  \ TIES` 以查看所有并列项）来获取成本最低或最高的路径。假设你想要最短路径，可以使用 CTE 将查询更改为：\n\n```sql\nSELECT TOP\
  \ 1 WITH TIES BaseRows.Path,\n    BaseRows.WeightedCost,\n    BaseRows.NodeSum\n\
  FROM   BaseRows\nWHERE  BaseRows.Name = 'Lee Roy'\nORDER BY BaseRows.WeightedCost\
  \ ASC;\n```\n\n你的结果将只包含上一查询结果的前两行。\n\n## 对匹配项检查条件\n\n找到所有可到达的节点只是许多查询的第一步。有时，你想找到在某个层面上与你有联系、且具备某些特征的所有人。\n\
  \n举例来说，假设 `Lou Iss` 正在寻找一位与他有联系、并且使用 `C++` 编程的人。你可以分两步完成：首先获取 `Lou Iss` 连接到的所有人，然后将这些项目（可能放在临时表或\
  \ CTE 中）与 `ProgramsWith` 边中的匹配项进行查找。图 3-12 展示了这一过程，图中用方框标出了 `Lou Iss` 在某个层面有连接的所有节点，并指出了那个与\
  \ `C++` 有连接的节点。\n\n![](img/508094_1_En_3_Fig12_HTML.jpg)\n\n一个包含人名 Val Erry、Lee\
  \ Roy、Day Vid、Joe Seph、Lou Iss、Fred Rick 和 Saa Lee 的关系图，他们彼此相互连接。Joe Seph 还有一条额外的箭头指向\
  \ C++；Val Erry、Saa Lee 和 Lee Roy 指向 Fortran；Val Erry、Lou Iss、Lee Roy 和 Day Vid 指向\
  \ TSQL 编程语言。\n\n图 3-12\n\n图中与 Lou Iss 有关系并且也与 C++ 有关系的节点\n\n使用 `MATCH` 语法上的 `LAST_NODE`\
  \ 扩展，你可以通过一个（相对）简单的查询来完成此操作。在下面的查询中，我高亮显示了使我们能够获取最短路径返回的节点、然后将它们连接到 `ProgrammingLanguage`\
  \ 节点的语法：\n\n```sql\nSELECT  LAST_VALUE(FollowedPerson.Name)\n        WITHIN GROUP\
  \ (GRAPH PATH) AS ConnectedPerson,\n        STRING_AGG(FollowedPerson.Name, '->')\n\
  \        WITHIN GROUP (GRAPH PATH) AS Path\nFROM   Network.Person AS Person,\n \
  \      Network.Follows FOR PATH AS Follows,\n       Network.Person FOR PATH AS FollowedPerson,\n\
  \       Network.ProgramsWith AS ProgramsWith,\n       Network.ProgrammingLanguage\n\
  WHERE  Person.FirstName = 'Lou'\nAND Person.LastName = 'Iss'\nAND MATCH(SHORTEST_PATH(Person(-(Follows)->FollowedPerson)+)\n\
  \       --注意，这是有效的语法。-> 可以位于不同行\n       AND LAST_NODE(FollowedPerson)-(ProgramsWith)\n\
  \       ->ProgrammingLanguage)\nAND ProgrammingLanguage.NAME = 'C++';\n```\n\n这会返回：\n\
  \n```\nConnectedPerson   Path\n----------------- -----------------------\nJoe Seph\
  \          Val Erry->Joe Seph\n```\n\n请注意几点。首先，尽管 `Network.ProgramsWith` 和 `Network.ProgrammingLanguage`\
  \ 在带有 `SHORTEST_PATH` 的查询中被使用，并且它们不是锚点表，但你并不需要使用 `FOR PATH`，因为它们在查询中不涉及路径部分。如果在任一编程对象后面加上\
  \ `FOR PATH`，将会导致错误，例如：\n\n```\nMsg 13949, Level 16, State 2, Line 929\nThe table\
  \ name or alias 'ProgramsWith' was marked as FOR PATH but was not used in the recursive\
  \ section of a SHORTEST_PATH clause.\n```\n\n`LAST_NODE` 图函数为你提供对 `SHORTEST_PATH`\
  \ 最后一个节点中图结构的引用。它类似于 `LAST_VALUE`，但 `node` 给你的是一个引用而不是值。从那里，你可以查找匹配项，并且可以设计一些复杂的查询来为你的用户解答非常复杂的问题。\n\
  \n## 总结\n\n在本章中，你学习了在 SQL Server 的图表中创建和查询数据的基本语法。它们与典型的关系表有许多异同点，但要使用这些对象，你需要了解其中的许多差异。\n\
  \n你学习了如何创建对象，然后以最简单的方式向表中加载新数据。在下一章中，我将扩展这两个主题，包括如何保护你的对象免受不良数据影响，以及使数据加载更简便的方法。\n\
  \n在创建了一些数据之后，你学习了查询图中数据所需的大部分语法。该语法以 `MATCH` 表达式为核心，并包含用于查询图中多层级数据的 `SHORTEST_PATH`\
  \ 扩展。\n\n所有这些主题都是本书中你将要创建和查询的大多数图的基础。\n\n\n"
- "# 4. SQL 图形表：高级主题\n\n在第 3 章中，我介绍了使用 SQL Server 图表的基本知识。在很多方面，它们类似于典型的具有行和列的 SQL\
  \ Server 表，使用`SELECT`语句访问数据等。但有些部分非常不同，特别是内部图数据库的结构方式。使用伪列可能是一个新概念，除非您处理过分区（而且它们在分区中的使用不像使用`$node_id`、`$from_id`等那样面向用户）。\n\
  \n在本章中，我将超越基础知识，为您提供使用约束、索引和触发器构建接口和保护数据的工具。您还将深入研究元数据，当您获取一个 SQL Server 数据库并想了解存在哪些图表以及它们的详细信息时，您通常需要检查这些元数据。\n\
  \n本章的目标是完成设置所有技术，您将在本书的后半部分使用这些技术来演示如何使用 SQL Server 图对象构建有用的数据库。\n\n您将在本章中使用的数据库与第\
  \ 3 章结束时处于相同状态。如果您是从本章开始（为了复习我将在本章中介绍的技能，下载文件中有一个名为 [`https://github.com/Apress/practical-graph-structures`](https://github.com/Apress/practical-graph-structures)\
  \ 的备份文件，它将让您在开始本章时精确创建应有的数据库。）\n\n## 高级数据创建技术\n\n在本节中，我将展示两种超越第 1 章所涵盖内容的技术。如果您正在构建一次加载多行数据的接口，这些技术将帮助您以更快的方式将数据加载到图对象中。\n\
  \n首先，我介绍一个接口层，它允许您使用表中的常规键值将数据插入到视图中。这是通过使用`INSTEAD OF`触发器对象为您完成图数据库转换工作来实现的。\n\n\
  第二部分向您展示如何使用可组合的 JSON 标签直接将数据插入到图列中。这样，您可以利用已有的`id`值数据，而不是让 SQL Server 决定这些值是什么，然后再去查找它们。\n\
  \n### 构建接口层\n\n在上一章中，所有创建边数据的示例都遵循相同的基本模式：\n\n```sql\nINSERT INTO Network.Follows($from_id,\
  \ $to_id)\n--查找 $from_id\nSELECT (   SELECT Person.$node_id\nFROM   Network.Person\n\
  WHERE  Person.FirstName = 'Fred'\nAND Person.LastName = 'Rick') AS from_id,\n--仅用于调试时更容易查看的名称\n\
  --查找 to_id\n(   SELECT Person.$node_id\nFROM   Network.Person\nWHERE  Person.FirstName\
  \ = 'Joe'\nAND Person.LastName = 'Seph') AS to_id;\n```\n\n您在两个子查询中查找两个`$node_id`值，它们共同构成一个`$from_id`、`$to_id`对，然后插入这些值。这是在存储过程中加载单行时可能使用的模式，但如果您想加载数千行，或者想将关系数据库转换为图进行分析而没有整数键可用时，它就显得很笨重。（关于可组合\
  \ JSON 标签的更多信息将在后面的章节中介绍。）\n\n#### INSERT\n\n在本节中，您将构建一个接口，允许您使用自然键值插入相同的数据：\n\n\
  ```sql\nINSERT INTO Network.Follows (FromFirstName, FromLastName,\nToFirstName,\
  \ ToLastName)\nVALUES ('Fred', 'Rick','Joe', 'Seph)\n```\n\n此方法使用带有`INSTEAD OF`触发器对象的视图对象来允许在内部完成对`$from_id`和`$to_id`的查找。\n\
  \n> 注意\n> 在这些示例中，您将使用`Name`列来简化本书的代码。加载大量数据时，请始终尝试使用具有索引以便连接的值。\n\n对于此示例，创建另一个支持用户数据接口的架构，称为`NetworkUI`：\n\
  \n```sql\nIF SCHEMA_ID('Network_UI') IS NULL\nEXEC ('CREATE SCHEMA Network_UI');\n\
  ```\n\n您创建的视图将仅允许您使用一个特定键（主键或替代键）将数据从一个特定节点表插入到另一个特定节点表。因此，您需要为希望使用此技术的每个关系重复此过程。\n\
  \n在您的案例中，您将通过`Network.Follows`边实现`Network.Person`与`Network.Person`之间的关系。基本视图很简单。它只是对表的查询，返回您想向用户展示的节点中的两个键值。完全根据您的需求决定是使用自然键还是代理键。唯一的要求是您向用户展示的值能够唯一标识他们可以知道值的两个行之间的关系。\n\
  \n如果您希望能够使用您知道的键手动键入`INSERT`语句，请使用自然键。在此示例中，使用代理键来匹配源数据中的数据。\n\n以下是视图的代码：\n\n```sql\n\
  CREATE OR ALTER VIEW Network_UI.Person_Follows_Person\nAS\nSELECT Person.PersonId\
  \ AS PersonId,\nFollowedPerson.PersonId AS FollowsPersonId,\nFollows.Value AS Value\n\
  FROM Network.Person,\nNetwork.Follows,\nNetwork.Person AS FollowedPerson\nWHERE\
  \ MATCH(Person-(Follows)->FollowedPerson);\n```\n\n使用该视图执行以下查询：\n\n```sql\nSELECT\
  \ Person_Follows_Person.PersonId,\nPerson_Follows_Person.FollowsPersonId,\nPerson_Follows_Person.Value\n\
  FROM  Network_UI.Person_Follows_Person;\n```\n\n输出如下所示（仅显示 11 行中的前 3 行）：\n\n```\n\
  PersonId    FollowsPersonId Value\n----------- --------------- -----------\n1  \
  \         6               1\n1           2               1\n6           5      \
  \         1\n```\n\n现在，您将创建一个`INSTEAD OF`触发器对象，它将把这三列作为输入，并将它们转换为内部图标识符值。然后使用图值，将行插入到表中。这使得将大量数据加载到表中变得容易得多，而无需处理所有到图键值的转换。它特别使即席插入变得更容易，因为您永远不需要查找内部值。\n\
  \n> 注意\n> 本节中的一些示例看起来并没有节省太多工作量，因为您仍然需要像查找图值一样查找常规键。当将常规的多对多关系转换为图边时，此技术将特别有用。\n\
  \n```sql\nCREATE OR ALTER TRIGGER Network_UI.Person_FollowsPerson_$InsteadOfInsertTrigger\n\
  ON Network_UI.Person_Follows_Person\nINSTEAD OF INSERT\nAS\nSET NOCOUNT ON;\n--如果您添加更多代码，则应添加错误处理代码。\n\
  BEGIN\nINSERT INTO Network.Follows($from_id, $to_id, Value)\nSELECT Person.$node_id,\
  \ FollowedPerson.$node_id,\ninserted.Value\nFROM Inserted\nJOIN Network.Person\n\
  ON Person.PersonId = Inserted.PersonId\nJOIN Network.Person AS FollowedPerson\n\
  ON FollowedPerson.PersonId = Inserted.FollowsPersonId;\nEND;\n```\n\n使用`Network_UI.Person_Follows_Person`视图，您可以使用键值通过常规连接编写快速查询。例如，您可以将视图连接回`Network.Person`以获取名称，如下所示：\n\
  \n\n#### SQL 查询与图数据库操作\n\n```sql\nSELECT Person.Name, FollowedPerson.Name AS FollowedPerson\n\
  FROM   Network_UI.Person_Follows_Person as Follows\nJOIN Network.Person\nON Person.PersonId\
  \ = Follows.PersonId\nJOIN Network.Person AS FollowedPerson\nON FollowedPerson.PersonId\
  \ = Follows.FollowsPersonId\nWHERE  Person.Name = 'Lou Iss';\n```\n\n请注意，虽然这在小数据集上会很快，但您可能需要对查询进行一些调优。尽可能多地使用\
  \ `MATCH` 表达式和您的图谱表。执行此查询，您将得到以下结果：\n\n```\nName              FollowedPerson\n-----------------\
  \ ----------------------\nLou Iss           Saa Lee\nLou Iss           Val Erry\n\
  ```\n\n如果您在 SSMS 中查看此查询的执行计划，您会看到类似于图 4-1 的内容。\n\n![](img/508094_1_En_4_Fig1_HTML.jpg)\n\
  \n一个部分查询计划。聚集索引扫描流向计算标量、到嵌套循环、内部联接，同时与聚集索引查找和哈希匹配、内部联接，同时与表扫描相结合。\n\n**图 4-1**\n\
  \n部分查询计划显示您正在将 `Person` 表联接到 `Follows` 表。查询计划的其余部分将显示另一个到 `Person` 的哈希联接。\n\n查看查询计划，您会注意到带有边对象的查询使用了\
  \ `HASH JOIN` 运算符。在本章后面，您将了解如何向节点和边对象添加索引以可能提高性能（请注意，像您现在使用的较小数据集可能会为查询生成非常简单的计划，随着数据集增长，计划会发生变化）。\n\
  \n虽然处理节点和边对象的方式有很多不同，但也有很多相似之处，您需要根据对象的使用方式对性能调优采取一些控制。如前所述，使用此视图对于查询没有太大价值，但如果您有一个包含\
  \ id 值的表要转换为图，那将非常强大。\n\n为了演示，请运行以下查询以找到代理键值，然后插入一行：\n\n```sql\nSELECT Person.PersonId\
  \  AS PersonId\nFROM Network.Person\nWHERE Person.Name = 'Lou iss';\nSELECT Person.PersonId\
  \  AS FollowsPersonId\nFROM Network.Person\nWHERE Person.Name = 'Joe Seph';\n```\n\
  \n获取返回的值并用于以下查询。对于示例集，值是 2 和 6。因此您可以使用以下语句插入新行：\n\n```sql\nINSERT INTO Network_UI.Person_Follows_Person\n\
  (PersonId,FollowsPersonId,Value)\nVALUES (2, 6, 10);\n```\n\n执行以下查询：\n\n```sql\n\
  SELECT Person.Name, FollowsPerson.Name AS FollowedPerson\nFROM  Network.Person,\
  \ Network.Follows,\nNetwork.Person AS FollowsPerson\nWHERE MATCH(Person-(Follows)->FollowsPerson)\n\
  AND Person.Name = 'Lou Iss';\n```\n\n您将看到结果集中现在包含一行，其 `FollowedPerson` 为 `Joe Seph`。\n\
  \n#### UPDATE\n\n正如我在本书前面所说，边对象的 `$from_id` 或 `$to_id` 值无法更新。这很有道理。但假设您想将值更新为 `1`，以匹配您的所有其他数据。\n\
  \n```sql\nUPDATE Network_UI.Person_Follows_Person\nSET Person_Follows_Person.Value\
  \ = 1\nWHERE PersonId = (SELECT Person.PersonId\nFROM Network.Person\nWHERE Person.Name\
  \ = 'Lou iss')\nAND Person_Follows_Person.FollowsPersonId =\n(SELECT Person.PersonId\n\
  FROM Network.Person\nWHERE Person.Name = 'Joe Seph');\n```\n\n这很有效，因为您只在更新语句中更新一个表中的数据。任何尝试同时更改键值和值的操作都将失败，例如\n\
  \n```sql\nUPDATE Network_UI.Person_Follows_Person\nSET Person_Follows_Person.Value\
  \ = 1,\nPerson_Follows_Person.PersonId = 0\n```\n\n会返回错误：\n\n```\nMsg 4405, Level\
  \ 16, State 1, Line 85\nView or function 'Network_UI.Person_Follows_Person' is not\
  \ updatable because the modification affects multiple base tables.\n```\n\n如果您只尝试更新一个键值（该值只存在于一个表中），像这样\n\
  \n```sql\nUPDATE Network_UI.Person_Follows_Person\nSET Person_Follows_Person.PersonId\
  \ = 0;\n```\n\n系统确实会尝试更新，但该值会链接回 `Network.Person` 对象的标识值，因此您会得到此错误：\n\n```\nMsg\
  \ 8102, Level 16, State 1, Line 105\nCannot update identity column 'PersonId'.\n\
  ```\n\n如果您希望更新 `$from_id` 和 `$to_id` 值，在 `INSTEAD OF` 触发器对象中是可以实现的（需要删除和插入操作，如果您正在构建生产代码，这肯定需要更复杂的错误处理），但我只建议在您创建用于临时操作的表时使用此方法。直接让您的代码执行删除和插入操作。当您将树实现为重新指定父节点的操作时会用到此操作，这从技术上说会更改关系。\n\
  \n> **注意**\n>\n> 在第 4 章的下载文件中，有一个代码生成器可以为您生成视图和 `INSTEAD OF` 触发器对象。其中包含一个名为 `InterfaceViewCodeGenerator.sql`\
  \ 的更新生成器。代码有详细文档，虽然需要进行很多设置，但它会生成整个接口的基本框架。\n\n\n\n#### 删除（DELETE）\n\n根据你的应用程序需求，使用自然键进行删除操作可能非常合理（尤其是用户手动操作数据时）。通过用户界面表执行删除操作还需要一个触发器，将\
  \ ID 值转换为对应边行的键值。\n\n```sql\nDELETE FROM Network_UI.Person_Follows_Person\nWHERE\
  \ PersonId = (SELECT Person.PersonId\nFROM Network.Person\nWHERE Person.Name = 'Lou\
  \ iss')\nAND Person_Follows_Person.FollowsPersonId =\n(SELECT Person.PersonId\n\
  FROM Network.Person\nWHERE Person.Name = 'Joe Seph');\n```\n\n正如之前的更新操作一样，你会遇到相同的\
  \ `Error 4405`。因此，让我们来构建一个简单的 `INSTEAD OF DELETE` 触发器对象。这里有个奇怪的问题：被删除的列将包含什么内容？因为与插入触发器（你在其中提供值）不同，接下来的触发器将执行查询。所以，首先，你将在一个查询中直接返回被删除对象中的行。\n\
  \n```sql\nCREATE OR ALTER TRIGGER Network_UI.Person_Follows_Person$InsteadOfDeleteTrigger\n\
  ON Network_UI.Person_Follows_Person\nINSTEAD OF DELETE\nAS\nSET NOCOUNT ON;\n--If\
  \ you add more code, you should add error handling code.\nBEGIN\nSELECT *\nFROM\
  \ Deleted;\nEND;\n```\n\n**注意**\n\n如果这对您不起作用，请检查本文档中提到的设置：[`https://learn.microsoft.com/sql/database-engine/configure-windows/disallow-results-from-triggers-server-configuration-option`](https://learn.microsoft.com/sql/database-engine/configure-windows/disallow-results-from-triggers-server-configuration-option)。显然，最好不要让普通触发器返回结果，但在开发案例中，能够看到输出内容非常有用。\n\
  \n执行以下语句，你将看到 `deleted` 表包含了来自视图的数据，因为触发器的主体代码仅仅是返回 `deleted` 虚拟表的内容：\n\n```sql\n\
  DELETE FROM Network_UI.Person_Follows_Person\nWHERE PersonId = (   SELECT Person.PersonId\n\
  FROM   Network.Person\nWHERE  Person.Name = 'Lou iss')\nAND Person_Follows_Person.FollowsPersonId\
  \ =\n(   SELECT Person.PersonId\nFROM   Network.Person\nWHERE  Person.Name = 'Joe\
  \ Seph');\n```\n\n这将返回以下结果，显示 `deleted` 表的结构与你根据视图结构所预期的完全一致：\n\n```sql\nPersonId\
  \    FollowsPersonId Value\n----------- --------------- -----------\n2         \
  \  6               1\n```\n\n因此，你可以这样编写触发器：\n\n```sql\nCREATE OR ALTER TRIGGER Network_UI.Person_Follows_Person$InsteadOfDeleteTrigger\n\
  ON Network_UI.Person_Follows_Person\nINSTEAD OF DELETE\nAS\nSET NOCOUNT ON;\n--If\
  \ you add more code, you should add error handling code.\nBEGIN\nDELETE FROM Network.Follows\
  \ --FollowedPerson)\nand  deleted.PersonId = Person.PersonId\nand  deleted.FollowsPersonId\
  \ = FollowedPerson.PersonId\nEND;\n```\n\n现在，你可以直接地删除数据，就像操作一个内部没有特殊列的表一样：\n\n```sql\n\
  DELETE FROM Network_UI.Person_Follows_Person\nWHERE Person_Follows_Person.PersonId\
  \ = 2\nAND Person_Follows_Person.FollowsPersonId = 6;\n```\n\n删除行后，你可以看到该行已消失。在构建触发器时，请务必使用创建和删除多行数据的方式进行测试。\n\
  \n```sql\nSELECT Person.Name AS PersonName,\nFollowedPerson.Name AS FollowsPersonName\n\
  FROM   Network.Person,\nNetwork.Follows,\nNetwork.Person AS FollowedPerson\nWHERE\
  \  MATCH(Person-(Follows)->FollowedPerson)\nAND  Person.Name = 'Lou Iss';\n```\n\
  \n### 使用可组合 JSON 标签加载数据\n\n在下一节中，你将切换到另一个名为 `AdventureWorksLT` 的公开可用数据库。我使用了 Microsoft\
  \ Learn 站点上提供的 2019 版本：[`https://learn.microsoft.com/sql/samples/adventureworks-install-configure`](https://learn.microsoft.com/sql/samples/adventureworks-install-configure)。请使用\
  \ LT 版本，因为它具有整数键值，这使得此过程容易得多。如果你要从具有 GUID 键值甚至多部分键值的数据库加载数据，你需要在 `tempdb` 中创建临时暂存表，使用标识键值进行临时映射（并创建一个包含\
  \ `sourceKey` 和 `identityKey` 的表来从源表加载）。亲爱的读者，这部分内容就留给你自己完成，它并非难事，但肯定会增加阅读示例代码的难度。\n\
  \n好的，一旦你恢复了该数据库，请根据数据创建一个简单的 `Customer-Purchased->Product` 图。为每个节点包含一个 `Label` 列，并在边上包含购买日期。不要在边上设置唯一性约束，因为此示例的主要目的是展示加载方法。\n\
  \n首先，创建一个新架构来容纳你的新对象：\n\n```sql\nCREATE SCHEMA SalesGraph;\n```\n\n接下来，你将创建节点表对象。在这些对象中，你将包含来自关系表的代理键，这在获取一组数据后用于获取附加信息非常有用。如果你将图形数据与关系数据副本放在同一个数据库中，可以根据需要调整图形表中所需的数据量。\n\
  \n```sql\nCREATE TABLE SalesGraph.Customer\n(\nCustomerId int NOT NULL\nCONSTRAINT\
  \ PKCustomer PRIMARY KEY,\nLabel nvarchar(100) NOT NULL\nCONSTRAINT AKCustomer UNIQUE\n\
  ) AS NODE;\nCREATE TABLE SalesGraph.Product\n(\nProductId int NOT NULL\nCONSTRAINT\
  \ PKProduct PRIMARY KEY,\nLabel nvarchar(100) NOT NULL\nCONSTRAINT AKProduct UNIQUE\n\
  ) AS NODE;\n```\n\n接下来是创建边。在边中，包含了源数据表中来源的键，以及商品的购买时间，这在你的分析中肯定很有用。\n\n```sql\n\
  CREATE TABLE SalesGraph.Purchased\n(\nSalesOrderDetailId int NOT NULL\nCONSTRAINT\
  \ AKPurchased UNIQUE,\nPurchaseTime datetime2(0) NOT NULL\n) AS EDGE;\n```\n\n你可以简单地获取源数据中存在的行，进行少量转换，然后使用简单的插入语句加载数据：\n\
  \n```sql\n--customerID added to label for uniqueness... why there\n--is duplication\
  \ is beyond this exercise's needs\nINSERT INTO SalesGraph.Customer WITH (TABLOCKX)\n\
  (\nCustomerId, Label\n)\nSELECT CustomerID,\nCONCAT(FirstName, ' ', LastName, '\
  \ ', CustomerID) AS Label\nFROM SalesLT.Customer\nORDER BY Label;\n```\n\n查看输出的几行，你会看到：\n\
  \n```sql\nSELECT TOP 2\n$node_id,\nCustomerId\nFROM SalesGraph.Customer;\n```\n\n\
  前两行的 ID 值为 0 和 1：\n\n```sql\n$node_id_06C54C432DE544E8995B29AFDAD55455\n\n{\"type\"\
  :\"node\",\"schema\":\"SalesGraph\",\"table\":\"Customer\",\"id\":0}\n{\"type\"\
  :\"node\",\"schema\":\"SalesGraph\",\"table\":\"Customer\",\"id\":1}\nCustomerId\n\
  \n```\n\n这些 ID 值与 `CustomerId` 列的值并不匹配。从某种程度上说，这是一件好事。你几乎永远不会希望使用 `$node_id` 值进行任何操作，但在加载边行时，如果你能预测这些值，就不需要查找它们，从而可以更快地加载数据。\n\
  \n幸运的是，你可以自己组合 JSON，并且 Microsoft 作为图形功能的一部分提供了相应的工具。假设你正在加载数据副本（可能用于分析，也可能是首次加载），并且不使用接近\
  \ `bigint` 最大值的值（这确实是一个非常大的数字），那么你可以使用以下技术节省大量处理时间。我经常在示例数据中使用这种技术，因为我可以非常快速地加载具有不同数据集的数据库。为了演示这一点，首先截断\
  \ `SalesGraph.Customer` 表中的数据。\n\n\n\n#### 使用 `NODE_ID_FROM_PARTS` 函数构建图形数据\n\n\
  ```\nTRUNCATE TABLE SalesGraph.Customer;\n```\n\n`NODE_ID_FROM_PARTS` 函数接受节点表的 `object_id`\
  \ 和一个将成为图 ID 值的整数。以下查询展示了 `CustomerId` 现在与图 ID 相匹配。传入的 `object_id` 必须与图表中的 `object_id`\
  \ 匹配，否则输出将为 `NULL`，因此你无法用此方法制造错误数据：\n\n```\nSELECT NODE_ID_FROM_PARTS(OBJECT_ID('SalesGraph.Customer'),\n\
  CustomerID),\nCustomerID,\nCONCAT(FirstName, ' ', LastName, ' ', CustomerID) AS\
  \ LABEL\nFROM SalesLT.Customer;\n```\n\n查看输出，你会发现数据是代理键对代理键的匹配：\n\n```\n\n{\"type\"\
  :\"node\",\"schema\":\"SalesGraph\",\"table\":\"Customer\",\"id\":1}\n{\"type\"\
  :\"node\",\"schema\":\"SalesGraph\",\"table\":\"Customer\",\"id\":2}\n{\"type\"\
  :\"node\",\"schema\":\"SalesGraph\",\"table\":\"Customer\",\"id\":3}\nCustomerId\
  \  Label\n----------- -----------------------\n1          Orlando Gee 1\n2     \
  \     Keith Harris 2\n3          Donna Carreras 3\n```\n\n现在你可以将值插入到 `$node_id`\
  \ 列以及其他两个列中：\n\n```\nINSERT INTO SalesGraph.Customer\n(\n$Node_id, CustomerId,Label\n\
  )\nSELECT NODE_ID_FROM_PARTS(OBJECT_ID('SalesGraph.Customer'),\nCustomerID),\nCustomerID,\n\
  CONCAT(FirstName, ' ', LastName, ' ', CustomerID) AS LABEL\nFROM SalesLT.Customer;\n\
  ```\n\n接下来，对产品执行相同的操作（与客户相同的重复名称问题，因此添加 `ProductId` 作为后缀）：\n\n```\nINSERT INTO SalesGraph.Product\n\
  (\n$Node_id, ProductId, Label\n)\nSELECT NODE_ID_FROM_PARTS(OBJECT_ID('SalesGraph.Product'),\n\
  ProductID),\nProductID,\nCONCAT(Name, ' ', ProductID) AS LABEL\nFROM SalesLT.Product;\n\
  ```\n\n现在运行以下查询，通过连接 `SalesLT.SalesOrderHeader` 表来获取购买的客户和产品：\n\n```\nSELECT SalesOrderDetail.SalesOrderDetailID,\n\
  OrderDate AS PurchaseTime,\nProductID,\nCustomerID\nFROM SalesLT.SalesOrderHeader\n\
  JOIN SalesLT.SalesOrderDetail\nON SalesOrderHeader.SalesOrderID =\nSalesOrderDetail.SalesOrderID;\n\
  ```\n\n现在你可以使用组合的 JSON 值，在 `SalesGraph.Purchased` 边表中创建数据，并引用加载节点数据的表：\n\n```\n\
  INSERT INTO SalesGraph.Purchased\n(\nSalesOrderDetailId, PurchaseTime,\n$from_id,$to_id\n\
  )\nSELECT SalesOrderDetail.SalesOrderDetailID,\nOrderDate AS PurchaseTime,\nNODE_ID_FROM_PARTS(OBJECT_ID('SalesGraph.Customer'),\n\
  CustomerID),\nNODE_ID_FROM_PARTS(OBJECT_ID('SalesGraph.Product'),\nProductID)\n\
  FROM SalesLT.SalesOrderHeader\nJOIN SalesLT.SalesOrderDetail\nON SalesOrderHeader.SalesOrderID\
  \ = SalesOrderDetail.SalesOrderID;\n```\n\n最后，执行此 SQL，你就可以看到所有已加载的数据：\n\n```\nSELECT\
  \ Customer.Label, Product.Label\nFROM   SalesGraph.Customer,\nSalesGraph.Purchased,\n\
  SalesGraph.Product\nWHERE MATCH(Customer-(Purchased)->Product)\n```\n\n**注意事项**：你创建的用于插入数据的图形查询可以以任何顺序执行（或对于更大的加载量同时执行）。缺少父节点数据会导致令人困惑的查询，但这并非非法操作。例如，清空\
  \ `SalesGraph.Customer` 和 `SalesGraph.Product` 对象：\n\n```\nTRUNCATE TABLE SalesGraph.Customer;\n\
  TRUNCATE TABLE SalesGraph.Product;\n```\n\n然后重新运行你刚执行的带有 `MATCH` 子句的 `SELECT` 语句。你仍然会得到相同数量的行，但现在所有的标签值都是\
  \ `NULL`。在最初使用你自己的键值加载数据后，强烈建议添加边约束来清理/防止悬空引用（这将在本章后面介绍）。\n\n如果你清空 `SalesGraph.Purchased`\
  \ 对象中的数据，情况会得到清理。但请注意，你可以只运行创建边行的 `INSERT` 语句，它不会验证 ID 值是否有效。进行的主要验证是检查 `$node_id`\
  \ 值中使用的 `object_id` 值是否真实存在。\n\n虽然你可以在没有相关节点行的情况下创建边行，但节点表必须存在。作为本节的最后一个示例，清空边并删除两个节点表。然后继续删除客户和产品表。\n\
  \n```\nTRUNCATE TABLE SalesGraph.Purchased;\nDROP TABLE IF EXISTS SalesGraph.Customer,\
  \ SalesGraph.Product;\n```\n\n现在，如果你尝试将数据插入到边中，如下所示：\n\n```\nINSERT INTO SalesGraph.Purchased\n\
  (\nSalesOrderDetailId,\nPurchaseTime,\n$from_id,\n$to_id\n)\nSELECT SalesOrderDetail.SalesOrderDetailID,\n\
  OrderDate AS PurchaseTime,\nNODE_ID_FROM_PARTS(OBJECT_ID('SalesGraph.Customer'),\n\
  CustomerID),\nNODE_ID_FROM_PARTS(OBJECT_ID('SalesGraph.Product'),\nProductID)\n\
  FROM SalesLT.SalesOrderHeader\nJOIN SalesLT.SalesOrderDetail\nON SalesOrderHeader.SalesOrderID\
  \ =\nSalesOrderDetail.SalesOrderID;\n```\n\n你会得到以下错误：\n\n```\nMsg 515, Level 16,\
  \ State 2, Line 125\nCannot insert the value NULL into column 'from_obj_id_75C28A838F1D4D618BB8C1957919208E',\
  \ table 'AdventureWorksLT2019.SalesGraph.Purchased'; column does not allow nulls.\
  \ INSERT fails.\n```\n\n第一次遇到这个错误可能会有些令人困惑。它仅仅意味着它尝试插入两个值，但提供的对象名没有引用到现有的节点表。\n\n\
  它必须是一个节点表；随便一张表是不行的，如果你执行以下引用源关系表而非图形对象的语句，就可以看到这一点：\n\n```\nSELECT OBJECT_ID('SalesLT.Customer'),\n\
  NODE_ID_FROM_PARTS(OBJECT_ID('SalesLT.Customer'), 1)\n```\n\n你会看到 `NODE_ID_FROM_PARTS`\
  \ 调用返回了 `NULL`。\n\n\n\n## 异构查询\n\n到目前为止，在本书中，我一直保持设计模式的使用方式，即两个节点之间只存在一种多对多关系。要么是相同的表（`Person-Follows->Person`），要么是不同的表（`Person-ProgramsWith->ProgrammingLanguage`），但始终是通过单一路径从一个节点到另一个节点。在本节中，我将重点介绍通过单条路径导航多个关系的能力，甚至如何通过多条路径遍历关系。\n\
  \n例如，你将向 `TestGraph` 数据库中的示例图添加另一组名为 `Location` 的节点。然后，你将在 `Follows` 边中创建边值。（尽管这在逻辑上不一定合理，这正是后续示例要说明的一部分）。参见图\
  \ 4-2。\n\n![图 4-2](img/508094_1_En_4_Fig2_HTML.jpg)\n\n图 4-2 展示了添加新的 `Location`\
  \ 节点类型。节点 Joe Seph、Fred Rick、Val Erry、Lou Iss、Lee Roy、Will Lam 和 Day Vid 相互连接，它们在顶部连接到\
  \ C++、Fortran 和 T-SQL，在底部连接到 `Here` 和 `There` 节点。\n\n**图 4-2**\n向示例图中添加新的 `Location`\
  \ 节点类型\n\n以下是创建新表并加载数据的 DDL 和 DML：\n\n```sql\nCREATE TABLE Network.Location\n(\n\
  LocationId INT NOT NULL IDENTITY,\nName NVARCHAR(20) NOT NULL\nCONSTRAINT AKLocation\
  \ UNIQUE\n) AS NODE;\nINSERT INTO Network.Location(    Name)\nVALUES ('Here'),('There');\n\
  ```\n\n现在，按照图中所示，将新行与项目关联起来：\n\n```sql\nWITH Here\nAS (SELECT Person.$node_id AS\
  \ node_id\nFROM Network.Person\nWHERE Person.Name IN ( 'Fred Rick', 'Lou Iss', 'Joe\
  \ Seph' ))\nINSERT INTO Network.Follows\n(  $from_id, $to_id, Value)\nSELECT Here.node_id,\n\
  Location.$node_id,\n'Value'\nFROM Here\nCROSS JOIN Network.Location\nWHERE Location.Name\
  \ = 'Here';\nWITH There\nAS (SELECT Person.$node_id AS node_id\nFROM Network.Person\n\
  WHERE Person.Name IN ( 'Saa Lee', 'Lee Roy', 'Day Vid' ))\nINSERT INTO Network.Follows\n\
  (  $from_id, $to_id, Value)\nSELECT There.node_id,\nLocation.$node_id,\n'Value'\n\
  FROM There\nCROSS JOIN Network.Location\nWHERE Location.Name = 'There';\n```\n\n\
  现在，你可以像这样查看创建的行：\n\n```sql\nSELECT Person.Name, Location.Name\nFROM   Network.Person,\
  \ Network.Follows, Network.Location\nWHERE  Match(Person-(Follows)->Location);\n\
  ```\n\n这将返回\n\n```\nName            Name\n--------------- --------------------\n\
  Fred Rick       Here\nLou Iss         Here\nJoe Seph        Here\nLee Roy      \
  \   There\nSaa Lee         There\nDay Vid         There\n```\n\n因此，现在你有两种不同类型的节点通过\
  \ `Network.Follows` 边连接。如果你想一起查看它们，可以使用 CTE 或派生表将对象的数据联合在一起。除非你想输出它们，否则你不必包含任何图结构列。这些列之所以存在，是因为该对象是特定类型的对象。在以下查询中，你可以看到\
  \ `Lou Iss` 通过 `Network.Follows` 边连接到的地点和人物：\n\n```sql\nSELECT Person.Name,\nNodes.ObjectName,\n\
  Nodes.Name\nFROM Network.Person,\nNetwork.Follows,\n(\nSELECT 'Location' AS ObjectName,\n\
  Location.Name\nFROM Network.Location\nUNION ALL\nSELECT 'Person',\nName\nFROM Network.Person\n\
  ) AS Nodes\nWHERE MATCH(Person-(Follows)->Nodes)\nAND Person.Name = 'Lou Iss';\n\
  ```\n\n这将返回\n\n```\nName        ObjectName  Name\n----------- ----------- ------------\n\
  Lou Iss     Person      Saa Lee\nLou Iss     Person      Val Erry\nLou Iss     Location\
  \    Here\n```\n\n请注意，使用 SQL Server 处理非特定数据的一个主要限制在此显现。一旦将行提取到表格数据流（TDS）中，它们就恢复为强类型和结构化的关系表。由于我们讨论的方法需要派生表、CTE\
  \ 或视图对象，你需要将不同的数据集构造成相同的形状。这是该方法的一个很大限制，因为你无法轻松返回如下所示的内容，除非在 `UNION ALL` 中包含所有列，这会变得很繁琐：\n\
  \n```\nName        ObjectName  Name       LocationDetails PersonDetails\n-----------\
  \ ----------- ---------- --------------- -------------\nLou Iss     Person     \
  \ Saa Lee                    Values\nLou Iss     Person      Val Erry          \
  \         Values\nLou Iss     Location    Here                       Values\n```\n\
  \n尽管存在此限制，它对于查找一个项目与它可能链接到的许多其他事物之间的关系非常有用。\n\n例如，将 `Network` 模式视为客户关系管理（CRM）系统，你如何能看到与客户连接的所有内容，例如他们的偏好、感兴趣的产品、地点或他们购物过的商店？输出可能会向用户显示人类可读的值（如示例中的\
  \ `Name` 或 `Label`），然后是一个链接以显示更详细的信息。\n\n例如，\n\n```sql\nSELECT OtherThing.ObjectType,\
  \ OtherThing.Name,MoreDetailLink\nFROM   Network.Person,\n--图列会自动暴露，你不需要任何列，所以这里什么也不返回\n\
  --尽管这显然不是一个关于“无”的子查询\n(SELECT 1 AS nothing\nFROM Network.Follows\nUNION ALL\nSELECT\
  \ 1\nFROM Network.ProgramsWith) as LinksTo,\n--这个派生表是所有某人可以链接到的事物\n(SELECT 'Person'\
  \ as ObjectType, Name,\nCONCAT('https://getPerson/',PersonId)\nAS MoreDetailLink\n\
  FROM Network.Person\nUNION ALL\nSELECT 'ProgrammingLanguage', ProgrammingLanguage.Name,\n\
  CONCAT('https://getProgramming/',\nProgrammingLanguage.Name) AS MoreDetailLink\n\
  FROM Network.ProgrammingLanguage\nUNION ALL\nSELECT 'Location',\nLocation.Name,\n\
  CONCAT('https://mapLocation/',LocationId)\nAS MoreDetailLink\nFROM Network.Location)\
  \ AS OtherThing\nWHERE  MATCH(Person-(LinksTo)->OtherThing)\nAND Person.Name = 'Lou\
  \ Iss';\n```\n\n这段代码使用了两条边对象和迄今为止定义的所有三个节点，来执行 `Lou Iss` 节点的所有关系查询。\n\n```\nObjectType\
  \          Name         MoreDetailLink\n------------------- ------------ --------------------------------\n\
  Person              Saa Lee      https://getPerson/5\nPerson              Val Erry\
  \     https://getPerson/3\nLocation            Here         https://mapLocation/1\n\
  ProgrammingLanguage T-SQL        https://getProgramming/T-SQL\n```\n\n如果这是你经常做的事情，你很可能希望将其做成可重用的视图对象，因为代码有点乱。在下一个代码块中，将前面带有派生表的查询转换为一组可重用的视图对象：\n\
  \n```sql\nCREATE VIEW Network.LinksTo\nAS\nSELECT 1 AS nothing FROM network.Follows\n\
  UNION ALL\nSELECT 1 AS nothing FROM network.ProgramsWith;\nGO\nCREATE VIEW Network.Anything\n\
  as\nSELECT 'Person' as ObjectType,\nPerson.Name,\nCONCAT('https://getPerson/',PersonId)\n\
  AS MoreDetailLink\nFROM Network.Person\nUNION ALL\nSELECT 'ProgrammingLanguage',\n\
  ProgrammingLanguage.Name,\nCONCAT('https://getProgramming/',\nProgrammingLanguage.Name)\
  \ AS MoreDetailLink\nFROM    Network.ProgrammingLanguage\nUNION ALL\nSELECT 'Location',\n\
  Location.Name,\nCONCAT('https://mapLocation/',LocationId)\nAS MoreDetailLink\nFROM\
  \    Network.Location;\n```\n\n现在，之前的查询可以这样写：\n\n```sql\nSELECT AnyThing.ObjectType,\
  \ AnyThing.Name,\nAnything.MoreDetailLink\nFROM   Network.Person, Network.LinksTo,\
  \ Network.Anything\nWHERE  MATCH(Person-(LinksTo)->AnyThing)\nAND Person.Name =\
  \ 'Lou Iss';\n```\n\n\n\n不过，有趣的是，如果你在 `SELECT` 子句中添加 `,*` 会发生什么。这应该会返回所有列，对吧？既然你显然已经通过\
  \ `MATCH` 表达式在图键值上进行了连接，你期望能看到这些值，对吧？\n\n事实并非如此。你得到的唯一图细节是来自 `Network.Person` 对象的\
  \ `$node_id`。当你的对象被封装成派生表或视图对象时，你只能访问你输出的列，尽管这些列实际上可以通过 `MATCH` 用于图查询。\n\n图标识符甚至可能不会在所有用法中以相同方式暴露。例如，\n\
  \n```\nSELECT Person.Name, Nodes.ObjectName, Nodes.Name,\nNodes.$node_id\nFROM \
  \  Network.Person, Network.Follows,\n(SELECT 'Location' as ObjectName, Name, $node_id\n\
  FROM   Network.Person) as Nodes\nWHERE MATCH(Person-(Follows)->Nodes)\nAND Person.Name\
  \ = 'Lou Iss';\n```\n\n将会抛出此错误：\n\n```\nMsg 207, Level 16, State 1, Line 243\nInvalid\
  \ column name '$node_id'.\n```\n\n尽管它显然在 `MATCH` 表达式中被使用了。如果你希望图标识符值成为输出的一部分，你必须为它们命名并使用该名称：\n\
  \n```\nSELECT Nodes.ObjectName, Nodes.Name,\nNodes.NodeId\nFROM   Network.Person,\
  \ Network.Follows,\n(SELECT 'Location' AS ObjectName, Name,\n$node_id AS NodeId\n\
  FROM   Network.Person) AS Nodes\nWHERE MATCH(Person-(Follows)->Nodes)\nAND Person.Name\
  \ = 'Lou Iss';\n```\n\n这将返回\n\n```\nObjectName Name       NodeId\n---------- ----------\
  \ ------------------------------------------\nLocation   Saa Lee    {\"type\":\"\
  node\",\"schema\":\"Network\",\"tab...\nLocation   Val Erry   {\"type\":\"node\"\
  ,\"schema\",\"Network\",\"tab...\n```\n\n同样，如果出于某种原因你需要，你需要在视图定义中包含所需的实现列。\n\n##\
  \ 完整性约束与索引\n\n关于构建典型的关系数据库系统，我最喜欢说的一句话是：第一、最后也是唯一真正重要的是你的数据是正确的。**快速但错误的结果比缓慢但正确的结果更糟糕**。在本节中，你将学习一些确保数据正确性的方法。当然，正确且快速显然是理想的，因此你还将看到一些需要为性能增强而添加到对象中的索引。\n\
  \n### 边约束\n\n到目前为止，在第 3 章和第 4 章中，我们一直非常小心地处理放入边表的数据。正如任何软件开发人员所知，灵活性既是优点也是缺点。有时作为设计者，你会认为灵活性只会被善用，但随后开始出现无意义的数据，并对用户体验（和信心）产生不良影响。\n\
  \n在我的示例表中，设计并未考虑有人可能尝试将不合逻辑的数据放入表中的情况。例如，目前对于这些结构来说，说 `Lou Iss-ProgramsWith-> Here`\
  \ 或 `T-SQL-ProgramsWith->C++` 是完全可接受的。两者都是不合逻辑的语句。\n\n你应该已经了解的经典完整性约束（`foreign key`、`check`、`unique`、`primary\
  \ key`、`default`）通常与图表配合使用，就像它们与普通关系表配合一样。（存在一些限制，例如不能在检查约束中使用图键值。）然而，由于一个边表可以有多个\
  \ `$from_id` 和 `$end_id` 的数据来源，因此需要一种新的约束类型。它被称为**边约束**。\n\n边约束限制了哪些数据可以通过节点对象放入边中，包括来源和目标。例如，当你为本节同构部分构建关系时，你创建了数据，实际上是实现了关系\
  \ `Person->Follows->Location`。由于你定义的是一个人所在的位置，这种关系在语义上没有意义，因此你希望更改它，使其拥有自己的边：`LivesAt`，或\
  \ `Person-LivesAt->Location`。进行此更改后，你将确保不能说一个人居住在某个编程语言处或关注了一个位置。在将行迁移到这个新边的过程中，你可以看到边对象可能发生的情况，以及如何将数据约束到合适的集合。\n\
  \n你可以在单个边约束中定义多条数据路径。作为一个初步示例，让我们向 `Network.Follows` 边添加一个约束，该约束将接受当前表中的数据，以展示如何处理多表情况。对于\
  \ `Network.Follows` 边，你将允许 `Network.Person` 到 `Network.Person`，然后是 `Network.Person`\
  \ 到 `Network.Location`（你将努力移除后者）：\n\n```\nALTER TABLE Network.Follows\nADD CONSTRAINT\
  \ EC_Follows CONNECTION\n(Network.Person TO Network.Location,\nNetwork.Person TO\
  \ Network.Person) ON DELETE NO ACTION;\n```\n\n`DELETE` 操作上的 `NO ACTION` 设置意味着，在不删除所有连接边的情况下，你无法删除任一连接表中的相关节点。如果你使用\
  \ `CASCADE` 代替 `NO ACTION`，删除任一表中的节点将导致边行被移除。（我不会演示，但你可以轻松构建一个 after-trigger 对象，该对象仅在源成员节点（或目标节点，如果那是你的要求）被删除时删除边行，而对于另一项则失败，如果你需要非常定制化的关系。）\n\
  \n关于边约束的一个更奇怪的事情是，虽然你可以同时拥有多个边约束，但它们的条件是 `AND` 在一起的。因此，你无法在添加新的边约束时包含条件，而不包括边中当前存在的任何数据。当你第一次遇到因此产生的错误消息时，会让你挠头不已。\n\
  \n例如，如果你在之前添加的 `EC_Follows` 约束之外，再添加这个额外的约束\n\n```\nALTER TABLE Network.Follows\n\
  ADD CONSTRAINT EC_Follows2 CONNECTION\n(Network.Person TO Network.ProgrammingLanguage)\n\
  ON DELETE NO ACTION;\n```\n\n这将返回以下错误消息。直觉上，这个错误消息感觉不真实。\n\n```\nMsg 547, Level\
  \ 16, State 0, Line 383\nThe ALTER TABLE statement conflicted with the EDGE constraint\
  \ \"EC_Follows2\". The conflict occurred in database \"TestGraph\", table \"Network.Follows\"\
  .\n```\n\n\n\n#### 数据库边约束管理\n\n#### 删除 EC_Follows 约束\n\n因此，通常你需要在新约束中包含来自先前约束的所有关系（这在你需要修改在线表时很有用）。在本演示中，你将删除\
  \ `EC_Follows` 约束，因为有数据需要清理：\n\n```\nALTER TABLE Network.Follows DROP EC_Follows;\n\
  ```\n\n#### 删除位置行并检查数据\n\n现在，让我们删除一个位置行（这并非你最终目标所需，但在此处操作以观察没有约束时会发生什么）：\n\n```\n\
  DELETE Network.Location\nWHERE Location.NAME = 'Here';\n```\n\n查看边中的数据，现在有些异常。请确认已删除该行，并查看\
  \ `$node_id` 值：\n\n```\nSELECT Location.Name,$node_id\nFROM Network.Location;\n\
  ```\n\n现在只剩下一个位置（我缩短了左侧的 `$node_id`，以便你能看到 `id`，其值为 `1`）：\n\n```\nName       $node_id_706A69FC56E046AF955F94567D088822\n\
  ---------- ----------------------------------------------------\nThere.     ...schema\"\
  :\"Network\",\"table\":\"Location\",\"id\":1}\n```\n\n#### 查询数据发现问题\n\n如果你查看以下查询\n\
  \n```\nSELECT Follows.$to_id,COUNT(*)\nFROM Network.Follows\nWHERE Follows.$to_id\
  \ LIKE '%location%'\nGROUP BY Follows.$to_id;\n```\n\n直观上，你可能会认为应该只有来自 Location\
  \ 表且 id 值为 `1` 的行，因为这是唯一实际存在的 `id` 值。\n\n```\n$to_id_EF1AB6E3676C45CDABD558C4D40746B4\n\
  ------------------------------------------------------------- -\n{\"type\":\"node\"\
  ,\"schema\":\"Network\",\"table\":\"Location\",\"id\":0}  3\n{\"type\":\"node\"\
  ,\"schema\":\"Network\",\"table\":\"Location\",\"id\":1}  3\n```\n\n你会看到两行（如果未添加你自己的数据，两行第二列很可能都是\
  \ `3`）...由于你尚未防止重复，你可能像我一样添加了额外的数据。\n\n你可以通过一个稍复杂的查询找到有问题的行，前提是你知道问题应出自哪张表。如果你有很多表，这可能相当具有挑战性！（所以，从一开始就使用约束，避免这些问题！）\n\
  \n#### 删除问题行\n\n```\nSELECT DISTINCT OBJECT_SCHEMA_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$to_id)),\n\
  OBJECT_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$to_id)),\nFollows.$to_id\nFROM Network.Follows\n\
  WHERE Follows.$to_id NOT IN --检查不存在于节点表中的值\n(\nSELECT Person.$node_id\nFROM Network.Person\n\
  UNION ALL\nSELECT ProgrammingLanguage.$node_id\nFROM Network.ProgrammingLanguage\n\
  UNION ALL\nSELECT $node_id\nFROM Network.Location\n);\n```\n\n这将告诉你键值来源的对象以及键值，以便你可以删除有问题的边行，例如这一行：\n\
  \n```\nDELETE Network.Follows\nWHERE  Follows.$to_id = '{\"type\":\"node\",\"schema\"\
  :\"Network\",\"table\":\"Location\",\"id\":0}';\n```\n\n#### 重新添加约束并使用 CASCADE\n\
  \n现在让我们将边约束重新添加到两个表上，但这次使用 `CASCADE`：\n\n```\nALTER TABLE Network.Follows\nADD CONSTRAINT\
  \ EC_Follows CONNECTION\n(Network.Person TO Network.Location,\nNetwork.Person TO\
  \ Network.Person)\nON DELETE CASCADE;\n```\n\n使用以下查询，你将看到 `Network.Follows` 边中引用的每张表的行数：\n\
  \n```\nSELECT\nOBJECT_SCHEMA_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$to_id)),\nOBJECT_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$to_id)),\n\
  COUNT(*)\nFROM Network.Follows\nGROUP BY OBJECT_SCHEMA_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$to_id)),\n\
  OBJECT_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$to_id));\n```\n\n在我的表版本中，有 11 个引用指向\
  \ `Network.Person`，3 个指向 `Network.Location`。现在只需删除 `Network.Location` 的行，这些行就会从边中消失：\n\
  \n```\nDELETE FROM Network.Location;\n```\n\n输出显示影响了 1 行，但如果你再次运行之前的 `SELECT` 语句，在我的数据库中，`Network.Follows`\
  \ 表中还有 10 个 `Network.Person` 行。因此，现在你可以更改约束了：\n\n#### 将约束改为 NO ACTION\n\n```\nALTER\
  \ TABLE Network.Follows\nADD CONSTRAINT EC_Follows CONNECTION\n(Network.Person TO\
  \ Network.Person)\nON DELETE CASCADE;\n```\n\n我将其设置为 `NO ACTION`，因为我通常更喜欢手动删除行，而不是让它们自动消失。许多数据库编码错误因使用\
  \ `CASCADE` 功能而加剧！\n\n#### 创建新表 LivesAt 并添加数据\n\n接下来，为 `Network.Person` 到 `Network.Location`\
  \ 的关系创建一个新的边，并添加边约束以防止除将人员关联到位置之外的任何数据：\n\n```\nCREATE TABLE Network.LivesAt\n(\n\
  CONSTRAINT EC_LivesAt CONNECTION\n(Network.Person TO Network.Location)\n) AS EDGE;\n\
  ```\n\n```\nINSERT INTO Network.Location\n(\nNAME\n)\nVALUES\n('Here'),\n('There');\n\
  ```\n\n#### 恢复数据以匹配模型\n\n最后，添加回数据以将数据恢复为与图 4-2 中的模型匹配：\n\n```\nWITH Here\nAS (SELECT\
  \ Person.$node_id AS node_id\nFROM Network.Person\nWHERE Person.NAME IN ( 'Fred\
  \ Rick', 'Lou Iss', 'Joe Seph' ))\nINSERT INTO Network.LivesAt\n(\n$from_id,\n$to_id\n\
  )\nSELECT Here.node_id,\nLocation.$node_id\nFROM Here\nCROSS JOIN Network.Location\n\
  WHERE Location.NAME = 'Here';\n```\n\n```\nWITH Here\nAS (SELECT Person.$node_id\
  \ AS node_id\nFROM Network.Person\nWHERE Person.NAME IN ('Saa Lee', 'Lee Roy', 'Day\
  \ Vid' ))\nINSERT INTO Network.LivesAt\n(\n$from_id,\n$to_id\n)\nSELECT Here.node_id,\n\
  Location.$node_id\nFROM Here\nCROSS JOIN Network.Location\nWHERE Location.NAME =\
  \ 'There';\n```\n\n现在数据与图示匹配。\n\n\n### 唯一性约束（及索引）\n\n正如你可能知道的，处理数据集时比较棘手的情况之一就是出现非预期的重复数据。在处理图结构时也不例外；事实上，由于实际列在`大多数`时候对你来说是封装隐藏的，情况可能更糟。我强调`大多数`是因为物理实现细节并未完全对你隐藏，并且会在一些你可能意想不到的地方显现出来。\n\
  \n举个例子，你将要插入与上一节第二组数据相同的行（通过使用完全相同的 SQL 语句）：\n```sql\nWITH Here\nAS (SELECT Person.$node_id\
  \ AS node_id\nFROM Network.Person\nWHERE Person.NAME IN ( 'Saa Lee', 'Lee Roy',\
  \ 'Day Vid' ))\nINSERT INTO Network.LivesAt\n(\n$from_id,\n$to_id\n)\nSELECT Here.node_id,\n\
  Location.$node_id\nFROM Here\nCROSS JOIN Network.Location\nWHERE Location.NAME =\
  \ 'There';\n```\n注意，现在你有了重复的数据：\n```sql\nSELECT Person.Name,\nLocation.Name\nFROM\
  \ Network.Person,\nNetwork.LivesAt,\nNetwork.Location\nWHERE MATCH(Person-(LivesAt)->Location)\n\
  AND Location.NAME = 'There'\nORDER BY Person.Name;\n```\n此查询的输出是\n```\nNAME    \
  \      NAME\n------------- --------------------\nDay Vid       There\nDay Vid  \
  \     There\nLee Roy       There\nLee Roy       There\nSaa Lee       There\nSaa\
  \ Lee       There\n```\n为了防止这种情况，你可以使用引用伪列的唯一约束。例如，在删除了重复的 `There` 位置值的行之后\n```sql\n\
  DELETE LivesAt\nFROM Network.Person,Network.LivesAt,Network.Location\nWHERE MATCH(Person-(LivesAt)->Location)\n\
  AND Location.NAME = 'There';\n```\n现在在 `$from_id` 和 `$to_id` 上创建以下唯一性约束。这可以防止用户反复创建相同的关系，这通常是不可取的。\n\
  ```sql\nALTER TABLE Network.LivesAt\nADD CONSTRAINT AKLivesAt_FromIdToId UNIQUE\
  \ ($from_id, $to_id);\n```\n唯一性约束在 SQL Server 中是通过索引实现的，而且这个索引无论如何对广度优先算法也会很有价值。现在，尝试多次插入位置为\
  \ `There` 的行。\n\n在第二次运行时，你会得到一条类似以下数值的错误消息：\n```\nMsg 2627, Level 14, State 1, Line\
  \ 454 Violation of UNIQUE KEY constraint\n'AKLivesAt_FromIdToId'. Cannot insert\
  \ duplicate key in object 'Network.LivesAt'. The duplicate key value is (581577110,\
  \ 3, 933578364, 3).\n```\n错误信息中的这些数字到底是什么？它们是底层图对象中的键。虽然你通常看到的值看起来像是一长段 JSON 格式的\
  \ `nvarchar(1000)` 值，但实际上实现是将所有那些内容转换成了整数值。\n\n这些键值对应于源表的 `object_id` 和图的内部 id。要翻译这些值，请实现以下工具函数来查找：\n\
  ```sql\nIF SCHEMA_ID('Tools') IS NULL\nEXEC ('CREATE SCHEMA Tools')\nGO\nCREATE\
  \ OR ALTER PROCEDURE Tools.GraphDB$LookupItem\n@ObjectId int,\n@Id int\nAS\nBEGIN\n\
  SET NOCOUNT ON;\nDECLARE @SchemaName sysname =\nOBJECT_SCHEMA_NAME(@ObjectId),\n\
  @TableName sysname = OBJECT_NAME(@ObjectId),\n@SQLStatement nvarchar(MAX)\nSET @SQLStatement\
  \ = CONCAT('SELECT * FROM ',\nQUOTENAME(@SchemaName),'.',QUOTENAME(@TableName),\n\
  WHERE GRAPH_ID_FROM_NODE_ID($node_id)  = ',@Id)\nEXECUTE (@SQLStatement)\nEND;\n\
  ```\n现在你可以轻松查找项目了：\n```sql\nEXEC Tools.GraphDB$LookupItem 581577110, 3;\nEXEC Tools.GraphDB$LookupItem\
  \ 933578364, 3;\n```\n这将返回包含被复制数据的行（如果你在同一事务中插入了两行并回滚了，则此数据可能不存在）。\n\n除了唯一性约束（你可以将其放在一个或两个\
  \ `_id` 列上，也可以在你的边表中包含其他列），你可能还想为图边添加索引以帮助提升性能。\n\n你的对象上已经有一些索引了，例如你刚刚创建的 `Network.LivesAt`\
  \ 边表上就有。使用 `sys.indexes` 目录视图，你可以看到默认情况下对象上有什么：\n```sql\nSELECT indexes.name,\n\
  indexes.type_desc\nFROM sys.indexes\nWHERE indexes.OBJECT_ID = OBJECT_ID('Network.LivesAt');\n\
  ```\n返回三行。一行表明你的对象是堆。另一行是 `AKLivesAt_FromIdToId` 唯一约束。然后还有一个索引，看起来像 `GRAPH_UNIQUE_INDEX_AD2E365DF5144A62BEBC7C7260258E2A`。这是在内部图列上的索引，但没有聚集索引。你实际上可以将引用内部列的\
  \ AK 索引更改为聚集索引，甚至可以将其设为 `PRIMARY KEY` 约束（默认是聚集的）：\n```sql\nALTER TABLE Network.LivesAt\n\
  DROP CONSTRAINT AKLivesAt_FromIdToId;\nALTER TABLE Network.LivesAt\nADD CONSTRAINT\
  \ AKLivesAt_FromIdToId  UNIQUE CLUSTERED\n($from_id, $to_id);\n```\n再看一下对 `sys.indexes`\
  \ 的查询。现在它是聚集的了。对于主要通过 `$from_id` 值（或 `$to_id` 值，取决于你如何构建索引以符合你的常规使用模式）获取数据的某些类型的工作负载来说，这可能会非常有帮助，你从重复键错误中知道这是两个列。你可以在\
  \ `sys.index_columns` 目录视图中看到这一点：\n```sql\nSELECT indexes.name,\nindexes.type_desc,\n\
  index_columns.key_ordinal,\ncolumns.name\nFROM sys.index_columns\nJOIN sys.indexes\n\
  ON indexes.object_id = index_columns.object_id\nAND indexes.index_id = index_columns.index_id\n\
  JOIN sys.columns\nON indexes.object_id = columns.object_id\nAND columns.column_id\
  \ = index_columns.column_id\nWHERE indexes.object_id = OBJECT_ID('Network.LivesAt');\n\
  ```\n\n\n### 附加约束\n\n根据你对图的要求，可能需要向数据中添加更多约束。遗憾的是，你不能在伪列上使用 `CHECK` 约束对象。\n\n最常见的需求之一是禁止自引用关系。在大多数模型中，一个节点跟随自身没有语义意义。我最初的想法是直接创建一个约束：\n\
  \n```sql\nALTER TABLE Network.Follows\nADD CONSTRAINT CHKFollows_NoSelfReference\n\
  CHECK ($to_id <> $from_id);\n```\n\n但这彻底失败了：\n\n```\nMsg 13918, Level 16, State\
  \ 1, Line 656\nAdding constraint to column '$from_id' of a node or edge table is\
  \ not allowed.\n```\n\n尝试使用不带方括号的完整列名会将列名视为不同的伪列：\n\n```sql\nALTER TABLE Network.Follows\n\
  ADD CONSTRAINT CHKFollows_NoSelfReference CHECK\n($from_id_86757ACD89174977A9D8380F484416AE\
  \ \n<> $to_id_EF1AB6E3676C45CDABD558C4D40746B4)\n```\n\n这会返回：\n\n```\nMsg 126, Level\
  \ 15, State 2, Line 663\nInvalid pseudocolumn \"$from_id_86757ACD89174977A9D8380F484416AE\"\
  .\n```\n\n在列名周围加上方括号（因为它们在 `sys.columns` 中就是这样显示的）\n\n```sql\nALTER TABLE Network.Follows\n\
  ADD CONSTRAINT CHKFollows_NoSelfReference CHECK\n([$from_id_86757ACD89174977A9D8380F484416AE]\
  \ \n<> [$to_id_EF1AB6E3676C45CDABD558C4D40746B4])\n```\n\n只会让你回到第一个错误消息（而且你真的不想在代码中引用这些列名，因为即使在同一台服务器上重建表也会得到不同的名称，更不用说在多个环境中管理代码的痛苦了）：\n\
  \n```\nMsg 13918, Level 16, State 1, Line 662\nAdding constraint to column '$from_id'\
  \ of a node or edge table is not allowed.\n```\n\n因此，如果你想约束边表中的数据（特别是与伪列相关的部分），你需要使用触发器。在构建该触发器之前，让我们先插入一行\
  \ `$from_id` 和 `$to_id` 相同的数据：\n\n```sql\nINSERT INTO Network.Follows\n(\n$from_id,\n\
  $to_id,\nValue\n)\nSELECT (SELECT Person.$node_id FROM Network.Person WHERE Person.FirstName\
  \ = 'Fred' AND Person.LastName = 'Rick'),\n       (SELECT Person.$node_id FROM Network.Person\
  \ WHERE Person.FirstName = 'Fred' AND Person.LastName = 'Rick'),\n       NULL;\n\
  ```\n\n顺便说一下，像这样一行中个人行与同一个个人行相关的情况，实际上是以下查询能返回数据的唯一可能方式：\n\n```sql\nSELECT Person.Name\n\
  FROM    Network.Person, Network.Follows\nWHERE MATCH(Person-(Follows)->Person);\n\
  ```\n\n重用一条边是不允许的，但重用一个节点是可以的。然而，当你重用一个节点时，它正是被自身过滤的同一组数据。因此，`MATCH` 表达式最终在逻辑上被转换为：\n\
  \n```sql\nWHERE Person.$node_id = Follows.$from_id\n  AND Person.$node_id = Follows.$to_id\n\
  ```\n\n由于 `$node_id` 不是一个数组（你当然仍然处于关系数据库中），所以永远不可能返回任何行。唯一可能返回的行是“Fred 关注 Fred”这一行。\n\
  \n所以，你必须采取更困难的方法，使用一个 `AFTER` 触发器对象。请注意，在本章的第一部分，你曾对视图对象使用了 `INSTEAD OF` 触发器。`INSTEAD\
  \ OF` 触发器通常用于修改 DML 操作。但现在你只想在操作完成后检查是否一切正确。\n\n为了编写这个触发器，你将使用我《数据库设计》书中一个稍加修改的触发器模板（移除了错误日志记录功能），因为从触发器中进行错误处理，如果由你控制错误的引发和处理方式，效果会更好。\n\
  \n注意：此触发器模板可以在这里找到：[`https://github.com/drsqlgithub/dbdesignbook6/tree/master/Appendix%20B`](https://github.com/drsqlgithub/dbdesignbook6/tree/master/Appendix%2520B)。\n\
  \n```sql\nCREATE TRIGGER Network.Follows$InsertUpdateTrigger\nON Network.Follows\n\
  AFTER INSERT,UPDATE AS --如果需要它们做任何不同的操作，\n--请创建 2 个触发器\nBEGIN\n    SET NOCOUNT ON;\
  \ --以避免行数消息\n    SET ROWCOUNT 0; --以防客户端修改了行数\n    DECLARE @msg varchar(2000), --用于保存错误消息\n\
  \            @rowsAffected int = (SELECT COUNT(*) FROM inserted);\n    --如果没有影响行，则无需继续\n\
  \    IF @rowsAffected = 0 RETURN;\n    BEGIN TRY\n        --[验证部分]\n        IF EXISTS\
  \ (SELECT *\n                   FROM Inserted\n                   WHERE $from_id\
  \ = $to_id)\n        BEGIN\n            SET @msg = '$from_id must not equal' +\n\
  \                       ' $to_id when modifying edge';\n            THROW 50000,\
  \ @msg, 1;\n        END;\n        --[修改部分]\n    END TRY\n    BEGIN CATCH\n     \
  \   IF @@trancount > 0\n            ROLLBACK TRANSACTION;\n        THROW; --将停止批处理，或者被调用方的\n\
  \               --CATCH 块捕获，并中止事务。\n    END CATCH;\nEND;\n```\n\n可以通过执行以下语句删除重复行：\n\
  \n```sql\nDELETE\nFROM    Network.Follows\nWHERE   Follows.$from_id = Follows.$to_id;\n\
  ```\n\n现在尝试执行以下插入操作：\n\n```sql\nINSERT INTO Network.Follows\n(\n$from_id,\n$to_id,\n\
  Value\n)\nSELECT (SELECT Person.$node_id FROM Network.Person\n        WHERE Person.FirstName\
  \ = 'Fred'\n          AND Person.LastName = 'Rick'),\n       (SELECT Person.$node_id\
  \ FROM Network.Person\n        WHERE Person.FirstName = 'Fred'\n          AND Person.LastName\
  \ = 'Rick'),\n       1;\n```\n\n你会得到这样的返回结果：\n\n```\nMsg 50000, Level 16, State\
  \ 1, Procedure Follows$InsertUpdateTrigger, Line 21\n$from_id must not equal $to_id\
  \ when modifying edge\n```\n\n需要注意的一点是，在触发器中，`inserted` 和 `deleted` 对象会暴露 `$from_id`\
  \ 和 `$to_id`，因此你可以利用该 JSON 数据做几乎任何你想要的数据验证。\n\n## 元数据总结\n\n为了结束本书的介绍部分，我想展示/回顾一些可用于查找图对象详细信息的元数据。\n\
  \n### 列出数据库中的图对象\n\n```sql\nSELECT OBJECT_SCHEMA_NAME(tables.object_id) AS schema_name,\n\
  \       tables.name,\n       CASE\n           WHEN tables.is_node = 1 THEN\n   \
  \            'Node'\n           WHEN tables.is_edge = 1 THEN\n               'Edge'\n\
  \           ELSE\n               'Bad code!'\n       END as object_type\nFROM sys.tables\n\
  WHERE tables.is_node = 1\n   OR tables.is_edge = 1\nORDER BY schema_name, tables.name;\n\
  ```\n\n此查询的输出显示了你在最后两章的主示例中使用的对象。\n\n\n\n\n### 图列的类型\n\n有时你需要查看图数据库对象的物理列名。以下两个查询分别展示了节点和边的列：\n\
  \n```sql\nSELECT columns.name,\ncolumns.column_id,\nCASE\nWHEN columns.name LIKE\
  \ '$%' THEN\n\nELSE\n\nEND AS has_pseudocolumn,\ncolumns.graph_type_desc\nFROM sys.COLUMNS\n\
  WHERE OBJECT_ID('Network.Person') = COLUMNS.OBJECT_ID\nAND columns.graph_type_desc\
  \ IS NOT NULL;\nSELECT columns.name,\ncolumns.column_id,\nCASE\nWHEN columns.name\
  \ LIKE '$%' THEN\n\nELSE\n\nEND AS has_pseudocolumn,\ncolumns.graph_type_desc\n\
  FROM sys.columns\nWHERE OBJECT_ID('Network.Follows') = COLUMNS.OBJECT_ID\nAND columns.graph_type_desc\
  \ IS NOT NULL;\n```\n\n执行这些查询，你将得到：\n\n```\nNAME             column_id has_pseudocolumn\
  \ graph_type_desc\n---------------- --------- ---------------- --------------------\n\
  graph_id_F8B...  1         0                GRAPH_ID\n$node_id_C01...  2       \
  \  1                GRAPH_ID_COMPUTED\nNAME            column_id has_pseudocolumn\
  \ graph_type_desc\n--------------- --------- ---------------- ----------------------\n\
  graph_id_240... 1         0                GRAPH_ID\n$edge_id_EF2... 2         1\
  \                GRAPH_ID_COMPUTED\nfrom_obj_iA6... 3         0                GRAPH_FROM_OBJ_ID\n\
  from_id_4E69... 4         0                GRAPH_FROM_ID\n$from_id_857... 5    \
  \     1                GRAPH_FROM_ID_COMPUTED\nto_obj_id_08... 6         0     \
  \           GRAPH_TO_OBJ_ID\nto_id_C0A723... 7         0                GRAPH_TO_ID\n\
  $to_id_EF16E... 8         1                GRAPH_TO_ID_COMPUTED\n```\n\n列名已被大幅缩短（例如，第一次查询中的\
  \ `$node_dc59...` 列实际上是 `$node_id_C580185613BB42EF81F4A68F6FA539DC`）。但有趣的是，你可以看到有一个对应于\
  \ `$from_id` 的计算列，而每个 `$node_id` 值却有两个列。此外，还有一个每个表都有的 `GRAPH_ID` 列，但你无法直接访问它。\n\n\
  目前，所有对象的这个值都是相同的。每个数据库只能有一个图结构（这很像每个数据库也只能有一个内存中结构一样）。\n\n### 用于获取图信息的工具\n\n我甚至不会假装能把下一个查询的内容全部放进本章的文本里，但基本思想是向你展示所有的函数，以及如何在你偶尔需要时解析图的内部值：\n\
  \n```sql\nSELECT OBJECT_ID_FROM_EDGE_ID(Follows.$edge_id) AS\nFollowsObjectId,\n\
  GRAPH_ID_FROM_EDGE_ID(Follows.$edge_id) AS FollowsEdgeId,\nOBJECT_ID_FROM_NODE_ID(Follows.$from_id)\
  \ AS FromObjectId,\nOBJECT_SCHEMA_NAME(OBJECT_ID_FROM_NODE_ID\n(Follows.$from_id))\
  \ AS FromObjectSchemaName,\nOBJECT_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$from_id))\n\
  AS FromObjectName,\nGRAPH_ID_FROM_NODE_ID(Follows.$from_id) AS FromGraphId,\nOBJECT_ID_FROM_NODE_ID(Follows.$to_id)\
  \ AS ToObjectId,\nGRAPH_ID_FROM_NODE_ID(Follows.$to_id) AS ToGraphId,\nOBJECT_SCHEMA_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$to_id))\n\
  AS ToObjectSchemaName,\nOBJECT_NAME(OBJECT_ID_FROM_NODE_ID(Follows.$from_id))\n\
  AS ToObjectName\nFROM Network.Follows;\n```\n\n如果你碰巧有 `object_id` 和图 ID 值，可以使用以下函数查看某一行。假设你从输出中随机挑选了一行，但通常你确实拥有这些值，正如我之前在错误消息中展示的那样：\n\
  \n```sql\nSELECT Person.$node_id,\nPerson.PersonId,\nPerson.FirstName,\nPerson.LastName,\n\
  Person.NAME,\nPerson.Value\nFROM Network.Person\nWHERE Person.$node_id = NODE_ID_FROM_PARTS(581577110,\
  \ 5);\n```\n\n## 总结\n\n在本章中，你完成了入门主题的学习，目标是掌握本书后续内容将使用的大部分语法和技术。\n\n你学习了几种比手动编写查询\
  \ `$node_id` 值的代码更轻松地将数据加载到图表中的技巧。第一种是构建一个数据接口，让你能够以操作普通表的方式插入数据，从而忽略图列，同时仍能获取图数据结构的值。第二种是直接从其他现有数据中推送到图值中。\n\
  \n接着你学习了异构查询，在某些情况下，你可以将多个边和节点视为一个整体进行查询（例如，在一个客户数据库中，你想通过一个简单的查询查看关于该客户的所有信息）。在\
  \ SQL Server 对象中使用这种方法的最大缺点是，你仍然受限于关系数据库行和列的刚性概念。因此，你必须将各种表整合成具有相同行/列结构的形式以进行此类查询，但一旦完成，这将非常有用。\n\
  \n之后，你学习了如何通过完整性约束（包括边约束和唯一性约束）以及触发器（用于无法使用声明性约束的情况）来保护你的数据。我简要提及了用于提升性能的索引，但这需要根据具体情况来决定。\n\
  \n最后，你了解了 SQL Server 中可以找到的一些元数据，以及如何出于多种目的使用它们。\n\n关于如何执行基本图操作的内容到此结束。在接下来的章节中，你将构建示例数据库，学习如何创建和优化实际的解决方案。\n\
  \n\n\n\n"
- "# 5. 树数据结构\n\n树是你将使用 SQL Server 数据库实现的较为典型的图形结构之一。正如第 1 章所介绍的，树是一种有向无环图 (DAG)，其中每个节点只能有一个父关系。换句话说，该节点只能作为\
  \ `to` 端参与零个或一个关系。在第 7 章中，你将实现一个通用的 DAG 结构，但在利用这些数据结构时，它将与树有某些相似之处。\n\n树结构之所以常见，主要有两个原因。首先，它们是一种满足几乎所有公司都有的需求的数据结构：能够将活动（例如销售额）从执行工作的人员汇总到管理或协调该工作的人员，然后再汇总到执行该工作的区域。例如，像微软这样的公司需要知道其全年的总收入。该信息还必须按业务部门、单个产品、该产品的单个销售组等进行细分。微软可能还有一个树结构，可以按区域、产品线和颜色等细分数据。树结构固有地禁止重复，因此非常适合汇总货币归属。\n\
  \n其次，由于树的形状相对固定，多年来实现树一直是合理的。即使对于非常庞大的数据集，也有可能对树查询进行性能调优（这在可能同时向许多不同方向增长的循环图结构上则不那么合理）。\n\
  \n我第一次接触这个话题是在 20 多年前，当时我参加了一个由 David Rozenshtein 博士主讲的研讨会。他写了我职业生涯中最具影响力的书籍之一 (*The\
  \ Essence of SQL*)，并且当时正在写一本关于树的书，研讨会结束后他把那本书给了我们。我认为他实际上并没有完成那本书 (*Tree and Graph\
  \ Processing in SQL*)，因为即使到今天，它在亚马逊上仍被列为“预览版”。遗憾的是，由于这发生在更换了三份工作、25 年和五所房子之前，我已经没有这些书了，但那堂课上教授的一些技术至今仍在使用。\n\
  \n那堂课开启了我对树结构及其多种实现方式的长期着迷。在第 6 章中，当我介绍另一种实现图以实现高性能访问的方法时，我会进一步讨论这一点。\n\n在本章中，我将提供使用\
  \ SQL Server 的图形数据库结构实现一个可用的树结构所需的基础代码。这包括创建对象、维护节点和边的所有代码，然后创建在大多数实现中非常常见的代码（在下一章中，我将使用该代码对结构进行一些测试。）本章的输出是一组实现第\
  \ 2 章介绍并在图 5-1 中表示的数据结构的对象和数据。\n\n![](img/508094_1_En_5_Fig1_HTML.jpg)\n\n一种数据结构。公司总部划分为缅因州总部和田纳西州总部。缅因州总部包括波特兰分部和卡姆登分部。田纳西州总部包括纳什维尔、诺克斯维尔和孟菲斯分部。\n\
  \n**图 5-1** 用于演示图形对象的小型数据集\n\n在本章中，我将介绍管理此数据结构所需的基本技术，例如添加、删除和移动节点，然后查询节点以从父节点到子节点汇总活动。\n\
  \n## 创建数据结构\n\n首先，让我们创建一个数据库、一个架构以及保存数据所需的表。在本书的 GitHub 仓库第 5 章中，有一个名为 `0000-Create\
  \ The GraphDBTests Database.sql` 的脚本，其中包含可填充参数，用于创建名为 `GraphDBTests` 的数据库。它生成了一个足够大的数据库，用于执行第\
  \ 6 章中的所有示例。\n\n### 基础表结构\n\n要开始此过程，请创建一个架构。架构名称代表此特定示例的算法/模式。在后面的示例中，当我为树的不同实现方法改变模式时，我会用代表这些算法的架构名称来区分示例代码。这让我可以构建相同的示例结构和加载脚本，唯一的区别是架构的名称。\n\
  \n```sql\nCREATE SCHEMA SqlGraph;\n```\n\n`Company` 节点是一个基本对象，只包含名称和代理键值列。可以将此对象视为任何数据库中典型的客户表，只是在构建真实数据库时可能希望对象具有的许多其他属性方面有所缺失。在某些设计中，你可能有一个关系型的\
  \ `Company` 表，当你希望将其与其他 `Company` 行进行比较/定位时，再连接到 `Company` 节点表。\n\n`Company` 表中的两列都有唯一性约束，代理整数键\
  \ (`CompanyId`) 是聚集键（也可以对 `$node_id` 伪列进行聚集，如果你需要通过 `$node_id` 获取许多列，这可能很有用）。与简单的邻接表（可能包含名为“`ParentCompanyId`”的列来指示层次结构）不同，正如你在前面章节中使用\
  \ SQL Graph 对象所看到的，图形结构位于定义为边的单独表中。\n\n```sql\nCREATE TABLE SqlGraph.Company\n(\n\
  \    CompanyId INT IDENTITY(1, 1) CONSTRAINT PKCompany PRIMARY KEY,\n    Name VARCHAR(20)\
  \ NOT NULL CONSTRAINT AKCompany_Name UNIQUE,\n    RootNodeFlag bit CONSTRAINT DFLTCompany_RootNodeFlag\
  \ DEFAULT(0)\n) AS NODE;\n```\n\n`RootNodeFlag` 在处理树时有时非常有用，因为它会给你一个无需计算（或在查询中严格知道节点名称）的起始点。默认约束将使你只需在创建那个根节点时在\
  \ DML 中考虑它。为此，你添加以下索引以确保只有一个根节点：\n\n```sql\nCREATE UNIQUE INDEX rootNode ON SqlGraph.Company\
  \ (RootNodeFlag)\nWHERE RootNodeFlag = 1;\n```\n\n这条边中没有额外的列，但在真实的表中，你可能希望至少包含行创建时间以及关系建立时间。它们可能是相同的时间，但很可能不应该是相同的列，因为关系可能在行创建之前就已建立。\n\
  \n即使数据是实时传入的（例如，从 Web 界面），你也可能希望数据在插入主数据库之前经过一些工作流处理。保持此示例简单只是为了……保持示例简单（废话！），因此它基本上涵盖了我们关心的一个方面……实现树。当我将其他算法与此进行比较时，最重要的是我们为其他对象做同样的事情。\n\
  \n创建树的边（就像几乎任何有向无环图一样）都将是从一个节点到同一类型节点的链接，因此我将包含边约束以确保。显然，在像这样只有一个节点表的数据库中，这是隐含的，但当你想要测试性能和功能时，最好让你的结构尽可能遵循最佳设计实践。\n\
  \n```sql\nCREATE TABLE SqlGraph.ReportsTo\n(\n    CONSTRAINT EC_ReportsTo$DefinesParentOf\n\
  \    CONNECTION (SqlGraph.Company TO SqlGraph.Company)\n    ON DELETE NO ACTION\n\
  ) AS EDGE;\n```\n\n接下来，让我们添加一些索引来支持你将执行的查询类型。\n\n\n\n### 树结构索引与维护\n\n第一个索引是聚集索引，对于此结构，你将基于\
  \ `$to_id` 值对表进行聚集。这是因为最常见（且昂贵）的查询将是基于 `$to_id` 获取行。虽然你不需要为自己编写树的广度优先查询，但在内部这正是将要发生的事情，而\
  \ `$to_id` 所代表的列是所有这些查询的引导。将其设为 `UNIQUE` 约束，因为要使此对象成为严格的树，每个 `$to_id` 在结构中应该只出现一次。\n\
  \n请注意，你可以通过为特定结构在对象中添加名称并将其包含在唯一索引中，从而在同一对象中实现多个树结构。我不会将其作为具体示例，因为代码基本相同，只是需要过滤你正在处理的树段。\n\
  \n```\nALTER TABLE SqlGraph.ReportsTo\nADD CONSTRAINT AKReportsTo UNIQUE CLUSTERED\
  \ ($to_id);\n```\n\n第二个索引实际上是在 `$from_id` 列上。当你对节点的父节点执行任何查询时，此索引将很有用。\n\n```\n\
  CREATE INDEX FromId ON SqlGraph.ReportsTo($from_id);\n```\n\n我将使用一些特定的性能演示来比较算法，这两者都反映了你可能需要用于许多实际树对象的活动。\n\
  \n其中之一是汇总子对象的活动。这类似于一家公司在多个区域有销售额，你需要查看每个区域的销售额。当然，像通常情况一样，区域可以有子区域，如此类推直到不同的地点。没有要求树具有任何特定的形状。一个区域可以单独存在，另一个可以分解成数百个不同的子区域。\n\
  \n在简单情况下，你将从一个非常平衡的树开始，但你将看到如何修改它使其不平衡。在下一章中，表将填充相当大的随机生成的数据集，因此它们不会完全平衡，只是为了给示例增加一些现实感。\n\
  \n## 销售结构演示\n\n以下对象实际上不是图本身的一部分，但用于生成一些公司销售数据。你将使用一个直接的算法来生成这些数据，因此相同的销售行总是为测试者生成。\n\
  \n为此，使用一个 `SEQUENCE` 对象为每个客户分配递增的销售数量（但为了简便，销售数量设置为 5）。`SEQUENCE` 对象使过程比使用列上的标识属性要简单得多，因为你可以将其放在存储过程中，如果你想使用不同的方法，替换起来要容易得多。\n\
  \n```\nCREATE SEQUENCE SqlGraph.CompanyDataGenerator_SEQUENCE\nAS INT\nSTART WITH\
  \ 1;\nGO\nCREATE TABLE SqlGraph.Sale\n(\nSalesId int NOT NULL IDENTITY(1, 1)\nCONSTRAINT\
  \ PKSale PRIMARY KEY,\nTransactionNumber varchar(10) NOT NULL\nCONSTRAINT AKSale\
  \ UNIQUE,\nAmount            numeric(12, 2) NOT NULL,\nCompanyId         int   \
  \         NOT NULL\nCONSTRAINT FKSale$Ref$Company\nREFERENCES SqlGraph.Company(CompanyId),\n\
  INDEX XCompanyId (CompanyId, Amount)\n);\n```\n\n`SqlGraph.Sale` 表在此处用于当你执行聚合时使情况更“真实”。请注意，代码使用来自\
  \ `SEQUENCE` 对象的序列号作为 `Amount` 乘以 .25。\n\n这是用于创建测试销售数据的存储过程：\n\n```\nCREATE PROCEDURE\
  \ SqlGraph.Sale$InsertTestData\n@Name     varchar(20),\n--注意：所有过程都使用自然键以方便手动操作。\n\
  --如果你正在为工具实现此功能以进行操作，\n--请尽可能使用代理键。\n@RowCount int = 5\n--如果需要，可以更改销售数量\nAS\nBEGIN\n\
  SET NOCOUNT ON;\nWHILE @RowCount > 0\nBEGIN\nINSERT INTO SqlGraph.Sale(TransactionNumber,\
  \ Amount,\nCompanyId)\n--两个 NEXT VALUE FOR 语句在同一代码中返回相同的值。\nSELECT CAST(NEXT VALUE\
  \ FOR\nSqlGraph.CompanyDataGenerator_SEQUENCE\nAS varchar(10)),\n.25 * CAST(NEXT\
  \ VALUE FOR\nSqlGraph.CompanyDataGenerator_SEQUENCE\nAS numeric(12, 2)),\n--获取代理键\n\
  (   SELECT Company.CompanyId\nFROM   SqlGraph.Company\nWHERE  Company.Name = @Name);\n\
  SET @RowCount = @RowCount - 1;\nEND;\nEND;\n```\n\n在本章后面，你将看到执行此代码的输出。\n\n## 树维护核心代码\n\
  \n在本节中，你将构建一个编码对象，用于在节点表中创建新行。如果你正在构建一个真实系统，此代码对于重用很有意义。请注意，为了演示清晰，我忽略了一些错误处理，但我已尝试在大多数代码中包含事务和\
  \ `TRY CATCH` 块，因此该代码对于即使是生产系统也是最低限度可接受的。\n\n你在第 4 章中研究的一些技术（例如包含触发器对象以使处理更自然）本章不会使用，因为此代码将模拟更真实的过程，即客户可能在真实客户活动中一次创建一行。树结构通常是在线事务处理\
  \ (OLTP) 系统的一部分，数据在其他人使用时可能会被修改。\n\n与“真实代码”的一个不同之处在于，在所有呈现的代码中，你对参数使用自然键值，因此脚本不必关心内部实现是什么。如果你正在为应用程序构建存储过程接口，通常应该使用主键，但在构建临时操作的接口时，对用户有意义的自然键要容易处理得多。\n\
  \n注意\n\n在生产级代码中，尽可能让你的代码通过聚集键访问数据是最佳做法。它消除了对表的不必要书签查找读取。有关性能调整的更多信息，我建议参考 Grant\
  \ Fritchey 的 *《SQL Server 2022 查询性能调优：故障排除和优化查询性能（第六版）》*。\n\n\n## 创建新节点的代码\n\n###\
  \ 创建新节点至关重要\n\n创建新节点是实现树结构（或任何面向数据的系统）所需的基本代码片段。在本书前几章中，我主要讨论了批量加载数据的技术。这些技术仍然适用于加载树，但在本章中，我想构建一个更贴近现实的例子，模拟用户创建数据。（如果你的对象中用户每小时创建\
  \ 20,000 个节点，那么你将很快需要比我正在使用的服务器大得多的服务器！）\n\n在树中，由于典型的要求是每棵树只有一个根节点，因此插入过程将包括将新节点链接到树中另一个节点的方法。\n\
  \n一次插入一行数据更接近你在现实世界中看到的情况，因为数据会随时间变化。了解生成数千行数据需要多长时间，可能是决定在构建树结构时使用哪种算法的重要因素。这实际上取决于你的个人需求。图形节点，尤其是树结构中那些以自然的、逐个方式存在的节点，添加到数据结构中的速度未必像独立于其他行的普通行那样快。\n\
  \n```sql\nCREATE OR ALTER PROCEDURE SqlGraph.Company$Insert\n(\n@Name VARCHAR(20),\n\
  --使用自然键值使其更自然一些\n@ParentCompanyName VARCHAR(20)\n--并且确保在演示代码中代理值不必总是相同的\n)\nAS\n\
  BEGIN\nSET NOCOUNT ON;\nBEGIN TRY\nBEGIN TRANSACTION\n--获取节点的父节点\nDECLARE @ParentNode\
  \ NVARCHAR(1000) =\n(SELECT $node_id\nFROM SqlGraph.Company\nWHERE name = @ParentCompanyName);\n\
  IF @ParentCompanyName IS NOT NULL\nAND @ParentNode IS NULL\nTHROW 50000, 'Invalid\
  \ ParentCompanyName', 1;\nELSE\nBEGIN\n--插入操作仅通过使用父节点的名称\n--来获取父节点的键...\nIF @ParentNode\
  \ IS NULL\nBEGIN\n--在某些情况下，知道哪个节点是根节点是有利的，\n--特别是因为我们通常只想要一个根节点。\nINSERT INTO SqlGraph.Company\n\
  (Name, RootNodeFlag)\nSELECT @Name,1;\nEND\nELSE\nBEGIN\nINSERT INTO SqlGraph.Company(Name)\n\
  SELECT @Name;\nDECLARE @ChildNode nvarchar(1000) =\n(SELECT $node_id\nFROM SqlGraph.Company\n\
  WHERE name = @Name);\nINSERT INTO SqlGraph.ReportsTo\n($from_id, $to_id)\nVALUES\
  \ (@ParentNode, @ChildNode);\nEND;\nEND\nCOMMIT TRANSACTION\nEND TRY\nBEGIN CATCH\n\
  IF XACT_STATE() <> 0\nROLLBACK TRANSACTION;\nTHROW; --重新抛出错误\nEND CATCH;\nEND;\n\
  GO\n```\n\n### 插入初始数据\n\n在以下脚本中，你将插入第一组节点以实现图 5-2 所示的子图。\n\n![](img/508094_1_En_5_Fig2_HTML.jpg)\n\
  \n一个数据结构。公司总部划分为缅因州总部和田纳西州总部。\n\n图 5-2\n\n首次插入后的结构\n\n```sql\nEXEC SqlGraph.Company$Insert\
  \ @Name = 'Company HQ',\n@ParentCompanyName = NULL;\nEXEC SqlGraph.Company$Insert\
  \ @Name = 'Maine HQ',\n@ParentCompanyName = 'Company HQ';\nEXEC SqlGraph.Company$Insert\
  \ @Name = 'Tennessee HQ',\n@ParentCompanyName = 'Company HQ';\n```\n\n### 查看插入的数据\n\
  \n查看刚刚插入的数据：\n\n```sql\nSELECT CAST($node_id AS VARCHAR(64)) AS [$node_id],\nCompanyId,\n\
  Name\nFROM SqlGraph.Company;\nSELECT CAST($edge_id as varchar(64)) as [$edge_id],\n\
  CAST($from_id as varchar(64)) as [$from_id],\nCAST($to_id as varchar(64)) as [$to_id]\n\
  FROM   SqlGraph.ReportsTo;\n```\n\n你将看到数据在书中很难显示（实际上在你处理时也不那么容易查看！在这个例子中我只是让它自动换行）。\n\
  \n```\n$node_id                                                     CompanyId  \
  \ Name\n------------------------------------------------------------ ----------\
  \ -----------\n{\"type\":\"node\",\"schema\":\"SqlGraph\",\"table\":\"Company\"\
  ,\"id\":0}  1         Company HQ\n{\"type\":\"node\",\"schema\":\"SqlGraph\",\"\
  table\":\"Company\",\"id\":1}  2         Maine HQ\n{\"type\":\"node\",\"schema\"\
  :\"SqlGraph\",\"table\":\"Company\",\"id\":2}      3          Tennessee HQ\n```\n\
  \n以及边：\n\n\n```\n$edge_id                                                      \
  \   $from_id                                                                 $to_id\n\
  \n{\"type\":\"edge\",\"schema\":\"SqlGraph\",\"table\":\"ReportsTo\",\"id\":0} \
  \  {\"type\":\"node\",\"schema\":\"SqlGraph\",\"table\":\"Company\",\"id\":0}  \
  \   {\"type\":\"node\",\"schema\":\"SqlGraph\",\"table\":\"Company\",\"id\":1}\n\
  {\"type\":\"edge\",\"schema\":\"SqlGraph\",\"table\":\"ReportsTo\",\"id\":1}   {\"\
  type\":\"node\",\"schema\":\"SqlGraph\",\"table\":\"Company\",\"id\":0}     {\"\
  type\":\"node\",\"schema\":\"SqlGraph\",\"table\":\"Company\",\"id\":2}\n```\n\n\
  与其尝试输出数据并以其自然风格进行格式化，不如在本书大部分需要展示内部结构的地方，我会使用以下函数，这些函数在本章下载资料的一个工具文件中可用：\n\n```sql\n\
  SELECT Tools.Graph$NodeIdFormat($node_id,0) AS [$node_id],\nCompanyId,\nName\nFROM\
  \ SqlGraph.Company;\nSELECT Tools.Graph$EdgeIdFormat($edge_id,0) AS [$edge_id],\n\
  Tools.Graph$NodeIdFormat($from_id,0) AS [$from_id],\nTools.Graph$NodeIdFormat($to_id,0)\
  \ AS [$to_id]\nFROM SqlGraph.ReportsTo;\n```\n\n由于页面空间有限，这样能以更紧凑的方式返回相同的详细信息。我在函数调用中将第二个参数设为\
  \ `0`，以在此示例中不包含架构（schema）来节省空间，因为涉及的所有表都在同一架构中。\n\n```text\n$node_id        CompanyId\
  \   Name\n--------------- ----------- --------------------\nCompany id:0    1  \
  \         Company HQ\nCompany id:1    2           Maine HQ\nCompany id:2    3  \
  \         Tennessee HQ\n$edge_id         $from_id        $to_id\n----------------\
  \ --------------- --------------\nReportsTo id:0   Company id:0    Company id:1\n\
  ReportsTo id:1   Company id:0    Company id:2\n```\n\n你会看到你有三个节点和两个边。假设在此过程中没有任何错误/重试（我遇到过很多次并重新开始以获得理想输出），`CompanyHQ`\
  \ 的内部 id 值是 `0`。这些内部值即使对我的示例来说也不是那么重要，因此当你执行此代码时看到的内部值不一定是这些，这并非强制要求。\n\n接下来，你将添加你的第一个叶节点。为了使整个示例更简单，我只在根节点上放置了销售数据。在现实世界的许多情况下，这也是一个非常合理的预期。即使将销售数据附加到非根节点也不会真正影响结果，但典型情况是商店或销售人员有销售数据，而区域的销售数据仅基于商店或销售人员。\n\
  \n```sql\nEXEC SqlGraph.Company$Insert @Name = 'Nashville Branch',\n@ParentCompanyName\
  \ = 'Tennessee HQ';\nEXEC SqlGraph.Sale$InsertTestData @Name = 'Nashville Branch';\n\
  ```\n\n执行该代码后，你可以在这里看到插入的销售数据：\n\n```sql\nSELECT *\nFROM   SqlGraph.Sale;\n```\n\
  \n这将返回\n\n```text\nSalesId  TransactionNumber Amount    CompanyId\n-------- -----------------\
  \ --------- -----------\n1        1                 0.25      4\n2        2    \
  \             0.50      4\n3        3                 0.75      4\n4        4  \
  \               1.00      4\n5        5                 1.25      4\n```\n\n目标是每次生成此数据集（以及稍后构建此测试数据库的其他版本时），`Nashville\
  \ Branch` 的销售额始终是相同的 `$3.75`。显然，这不是一个非常实际的金额（并且每个新节点都会有五个始终递增的新销售记录），但保持值和行数相同对于性能和正确性测试很有帮助。\n\
  \n示例中的值相匹配这一事实多次在测试树算法时拯救了我（正如你将在下一章看到的，这些算法有时可能相当棘手）。我将这组数据用作所有这些算法的单元测试。使用此查询，你可以查看表中的值：\n\
  \n```sql\nSELECT Name, SUM(amount)\nFROM   SqlGraph.Sale\nJOIN SqlGraph.Company\n\
  ON Company.CompanyId = Sale.CompanyId\nGROUP BY Name;\n```\n\n这只会显示一行：\n\n```text\n\
  Name\n-------------------- ---------------------------------------\nNashville Branch\
  \     3.75\n```\n\n现在插入图表的其余数据，为所有叶节点添加销售记录：\n\n```sql\nEXEC SqlGraph.Company$Insert\
  \ @Name = 'Knoxville Branch',\n@ParentCompanyName = 'Tennessee HQ';\nEXEC SqlGraph.Sale$InsertTestData\
  \ @Name = 'Knoxville Branch';\nEXEC SqlGraph.Company$Insert @Name = 'Memphis Branch',\n\
  @ParentCompanyName = 'Tennessee HQ';\nEXEC SqlGraph.Sale$InsertTestData @Name =\
  \ 'Memphis Branch';\nEXEC SqlGraph.Company$Insert @Name = 'Portland Branch',\n@ParentCompanyName\
  \ = 'Maine HQ';\nEXEC SqlGraph.Sale$InsertTestData @Name = 'Portland Branch';\n\
  EXEC SqlGraph.Company$Insert @Name = 'Camden Branch',\n@ParentCompanyName = 'Maine\
  \ HQ';\nEXEC SqlGraph.Sale$InsertTestData @Name = 'Camden Branch';\nGO\n```\n\n\
  现在让我们以非常易于人类阅读的形式查看数据。SQL 图查询的一个有趣之处在于，没有简单的方法使用语法进行 `OUTER` 风格的连接/关联。因此，如果你想列出树中的所有数据，你需要做的不仅仅是\
  \ `MATCH` 查询来获取输出中的根节点。表中的根节点是那些 `$node_id` 没有在边中作为 `$to_id` 出现的节点。\n\n这也是你在任何图中都需要做的事情，但在构建树时，它是过程中非常重要的一部分。为了避免该查询，这就是为什么我在我的对象中添加了\
  \ `RootNodeFlag` 列。\n\n以下查询将为你提供包含根节点的树中的节点：\n\n```sql\n--get the root\nSELECT Company.CompanyId,\
  \ Company.Name, NULL AS ParentCompanyId\nFROM  SqlGraph.Company\nWHERE  RootNodeFlag\
  \ = 1\nUNION ALL\n--get all the children of the root. Our tree can only have the\
  \ one root since we have a UNIQUE constraint on the $to_id column\nSELECT Company.CompanyId,\
  \ Company.Name, ParentCompany.CompanyId AS ParentCompanyId\nFROM   SqlGraph.Company,\n\
  SqlGraph.ReportsTo,\nSqlGraph.Company AS ParentCompany\nWHERE MATCH(Company<-(ReportsTo)-ParentCompany);\n\
  ```\n\n这将返回\n\n```text\nCompanyId   Name                 ParentCompanyId\n-----------\
  \ -------------------- ---------------\n1           Company HQ           NULL\n\
  2           Maine HQ             1\n3           Tennessee HQ         1\n4      \
  \     Nashville Branch     3\n5           Knoxville Branch     3\n6           Memphis\
  \ Branch       3\n7           Portland Branch      2\n8           Camden Branch\
  \        2\n```\n\n在下载资料中，我将其编译成一个名为 `SqlGraph.CompanyClean` 的视图，以使对这些结构的后续查询更易于处理。\n\
  \n接下来是一些关于如何以半图形方式查看数据的操作。在以下查询中，你将数据输出为层次结构，显示通过树的路径（我注释掉了 `Name` 列，因为它也作为层次结构中的最后一个值表示）：\n\
  \n```sql\n--the first node in a query will typically not show up in\n--the output,\
  \ so we have to include it seperately\nSELECT 0 AS Level, Company.Name AS Hierarchy\
  \ --,Company.Name\nFROM  SqlGraph.Company\nWHERE  RootNodeFlag = 1\nUNION ALL\n\
  SELECT    COUNT(ReportsToCompany.CompanyId)\nWITHIN GROUP (GRAPH PATH) ,\nCompany.NAME\
  \ + '->' +\nSTRING_AGG(ReportsToCompany.name, '->')\nWITHIN GROUP (GRAPH PATH) AS\
  \ Friends\n--,LAST_VALUE(ReportsToCompany.name)\n--       WITHIN GROUP (GRAPH PATH)\
  \ AS LastNode\nFROM    SqlGraph.Company AS Company,\nSqlGraph.ReportsTo FOR PATH\
  \ AS ReportsTo,\nSqlGraph.Company FOR PATH AS ReportsToCompany\nWHERE MATCH(SHORTEST_PATH(Company(-(ReportsTo)\n\
  ->ReportsToCompany)+))\nAND  Company.RootNodeFlag = 1\n```\n\n此查询的输出给出如下：\n\n\n\n\
  ## 处理层次结构数据\n\n```\nLevel       Hierarchy\n----------- ---------------------------------------------------\n\
  0           公司总部\n1           公司总部->缅因州总部\n1           公司总部->田纳西州总部\n2         \
  \  公司总部->田纳西州总部->纳什维尔分部\n2           公司总部->田纳西州总部->诺克斯维尔分部\n2           公司总部->田纳西州总部->孟菲斯分部\n\
  2           公司总部->缅因州总部->波特兰分部\n2           公司总部->缅因州总部->卡姆登分部;\n```\n\n使用此输出（并包含`Name`列），你可以将其构建为一个公共表表达式（CTE），然后使用`Level`列对每个项进行缩进，并使用`Hierarchy`列进行排序：\n\
  \n```\nWITH BaseRows AS\n(\nSELECT 0 AS Level, Company.Name AS Hierarchy ,Company.Name\n\
  FROM  SqlGraph.Company\nWHERE RootNodeFlag = 1\nUNION ALL\nSELECT  COUNT(ReportsToCompany.CompanyId)\n\
  WITHIN GROUP (GRAPH PATH) ,\nCompany.NAME + '->' +\nSTRING_AGG(ReportsToCompany.name,\
  \ '->')\nWITHIN GROUP (GRAPH PATH) AS Friends\n,LAST_VALUE(ReportsToCompany.name)\n\
  WITHIN GROUP (GRAPH PATH) AS LastNode\nFROM  SqlGraph.Company AS Company,\nSqlGraph.ReportsTo\
  \ FOR PATH AS ReportsTo,\nSqlGraph.Company FOR PATH AS ReportsToCompany\nWHERE MATCH(SHORTEST_PATH(Company(-(ReportsTo)\n\
  ->ReportsToCompany)+))\nAND Company.RootNodeFlag = 1\n)\nSELECT REPLICATE('--> ',Level)\
  \ + Name AS HierarchyDisplay\nFROM   BaseRows\nORDER BY Hierarchy;\n```\n\n该查询返回以下输出：\n\
  \n```\nHierarchyDisplay\n\n公司总部\n--> 缅因州总部\n--> --> 卡姆登分部\n--> --> 波特兰分部\n--> 田纳西州总部\n\
  --> --> 诺克斯维尔分部\n--> --> 孟菲斯分部\n--> --> 纳什维尔分部\n```\n\n寻找以可读格式输出层次结构的方法是处理图功能时的重要部分，因为确实没有简单的方法可以图形化输出数据。`SHORTEST_PATH`对于树结构非常有效，因为每个节点在输出中只能出现一次。在本书的最后两章中，我将讨论在循环图中必须处理的`SHORTEST_PATH`的局限性，但对于树来说它是完美的，因为从一个节点到另一个节点的最短路径，根据定义，始终是一条路径。\n\
  \n在下载文件中，我将其创建为一个名为`SqlGraph.CompanyHierarchyDisplay`的视图，我将在本章的其余部分使用它来输出示例。在其中，我包含了`Hierarchy`、`Level`和`Name`列，以便在有用的地方提供更多信息（`Hierarchy`列也用于对输出进行排序）。\n\
  \n### 重新指定父节点\n\n一旦将数据构建成树结构，一个常见的操作是将一个节点移动成为另一个节点的子节点。这在管理关系对象中是很典型的操作。\n\n使用邻接表类型的结构（如\
  \ SQL Graph 那样在简单的从-到对象中存储边）来重新指定树中节点的父节点通常很简单。只需将`$from_id`值从一个父节点修改为另一个即可。\n\n\
  这与使用 SQL Graph 边实现的方式相同，只是你不能修改边对象的`$from_id`或`$to_id`值，因此你需要删除原始边并创建一个新的。如果你在边对象中存储了数据，你也需要在代码中处理这些数据（当然，如果数据在将行重新父级化后仍然有意义的话）。\n\
  \n对于 T-SQL 代码中的多步操作，使用存储过程总是好的，这使得以安全的方式使用事务变得容易得多，因为你知道它会被提交或回滚。在临时风格的代码中多次执行此操作比使用存储过程要麻烦得多，并且更容易出现忘记提交事务而丢失工作等错误。\n\
  \n在接下来的代码中，你将为`Company`对象实现重新父级化的代码。使用邻接表结构重新父级化可以被视为一种边更新操作，但我通常将其与通用的更新过程分开实现，因为我通常希望独立地更新有关两个节点连接的说明，而不是将它们移动到树中的不同位置。因此，重新父级化操作的安全权限可能与正常更新不同。\n\
  \n以下代码实现了重新父级化的操作。（如果你的边对象上有任何列，你需要确保在代码中也复制那些属性，因为重新父级化需要你删除现有的边并重新插入行。）\n\n```\n\
  CREATE OR ALTER PROCEDURE SqlGraph.Company$Reparent\n(\n@Name varchar(20), --again\
  \ using natural key values\n@NewParentCompanyName varchar(20)\n)\nAS\nBEGIN\nSET\
  \ NOCOUNT ON;\nBEGIN TRY;\nBEGIN TRANSACTION;\n--get the new location you wish to\
  \ change to\n--the from is what is changing\nDECLARE @FromId nvarchar(1000),\n@ToId\
  \ nvarchar(1000) --to id will not change\n--use the natural key values to fetch\
  \ the $from_id/$to_id\nSELECT @FromId = $node_id\nFROM   SqlGraph.Company\nWHERE\
  \  name = @NewParentCompanyName;\nSELECT @ToId = $node_id\nFROM   SqlGraph.Company\n\
  WHERE  name = @Name;\n--Delete the old edge, and since this isn't changing\n--it\
  \ will remain the same (note, $to_id is unique, so\n--no need to worry with the\
  \ old $from_id value\nDELETE SqlGraph.ReportsTo\nWHERE  $to_id = @ToId;\n--create\
  \ a new edge\nINSERT INTO SqlGraph.ReportsTo($From_id, $to_id)\nVALUES (@FromId,\
  \ @ToId);\n--finish up\nCOMMIT TRANSACTION;\nEND TRY\nBEGIN CATCH\nIF XACT_STATE()\
  \ <> 0\nROLLBACK TRANSACTION;\nTHROW; --just rethrow the error\nEND CATCH;\nEND;\n\
  ```\n\n现在，让我们查看当前的树结构：\n\n```\nSELECT HierarchyDisplay\nFROM SqlGraph.CompanyHierarchyDisplay\n\
  ORDER BY Hierarchy;\n```\n\n返回结果：\n\n```\nHierarchyDisplay\n\n公司总部\n--> 缅因州总部\n\
  --> --> 卡姆登分部\n--> --> 波特兰分部\n--> 田纳西州总部\n--> --> 诺克斯维尔分部\n--> --> 孟菲斯分部\n--> -->\
  \ 纳什维尔分部\n```\n\n现在，让我们将`缅因州总部`重新指定为`田纳西州总部`的子节点：\n\n```\nEXEC SqlGraph.Company$Reparent\
  \ @Name = '缅因州总部',\n@NewParentCompanyName = '田纳西州总部';\n```\n\n执行后，查看代码，你现在可以看到`缅因州总部`是`田纳西州总部`的子节点。查询该视图现在返回：\n\
  \n```\nHierarchyDisplay\n\n公司总部\n--> 田纳西州总部\n--> --> 诺克斯维尔分部\n--> --> 缅因州总部\n-->\
  \ --> --> 卡姆登分部\n--> --> --> 波特兰分部\n--> --> 孟菲斯分部\n--> --> 纳什维尔分部\n```\n\n另请注意，`缅因州总部`的所有子行也随之移动。我不会在这里实现，但你可以“相对不那么容易地”只将节点从树中移除并将其插入到结构中。这需要将要移除项的所有子节点都转移到其父节点下。这是一个不太常见的用例，可以在需要时使用多次重新父级化来完成。（删除代码将实现类似的功能，因为在这种场景下很典型，所以如果需要，你可以调整该代码。）\n\
  \n现在使用以下代码将`缅因州总部`放回原处：\n\n```\nEXEC SQLGraph.Company$Reparent @Name = '缅因州总部',\n\
  @NewParentCompanyName = '公司总部';\n```\n\n然后请自行验证它是否已回到正确的位置。\n\n\n### 删除节点\n\n接下来，你将实现删除节点的功能。删除比重新设定父节点更有趣，因为如果你要删除结构中有子节点的节点，该怎么办？是直接尝试删除该节点，还是删除其所有子节点？在本节中，你将实现一个处理三种可能性的过程：\n\
  \n1.  如果节点是叶节点，则直接删除，没有问题。\n2.  如果节点是其他节点的父节点，则执行以下操作之一：\n    1.  删除所有子节点。\n   \
  \ 2.  将子节点移动到被删除节点的父节点。与重新设定父节点不同，删除节点**确实**感觉需要处理单项删除（例如，如果删除了经理 X，其员工会被移动到经理 X\
  \ 的经理下，直到找到新的经理）。\n\n> 注意\n>\n> 你也可以轻松设置其他可能性，例如替换节点或将子行移动到参数中另一个变量表示的节点。这可以添加到提供的存储过程中，但为了简洁起见，我不会添加。\n\
  \n这些可能性通过三个参数实现：要删除的节点的名称、一个指定是否尝试删除子节点的参数，以及一个指定是否重新设定任何存在的子节点的父节点的参数。这段代码很长，但有注释解释删除操作是如何完成的。\n\
  \n```sql\nCREATE OR ALTER PROCEDURE SqlGraph.Company$Delete\n@Name   varchar(20),\n\
  @DeleteChildNodesFlag bit = 0,\n@ReparentChildNodesToParentFlag BIT = 0\nAS\nBEGIN\n\
  SET NOCOUNT ON;\nBEGIN TRY;\nIF @DeleteChildNodesFlag = 1 AND\n@ReparentChildNodesToParentFlag\
  \ = 1\nTHROW 50000,'Both @DeleteChildNodesFlag and (wrap)\n@ReparentChildNodesToParentFlag\
  \ cannot be set to 1', 1;\nIF @DeleteChildNodesFlag = 1\nBEGIN\n--use this to get\
  \ all the children of\n--node to be deleted\n--we need not only the direct descendants\
  \ (which we\n--will use for reparenting the\n--child rows), but their descendants\
  \ too so we can\n--delete everything.\nSELECT  LAST_VALUE(ReportsTo.$to_id)\nWITHIN\
  \ GROUP (GRAPH PATH) AS  CompanyNodeId\nINTO    #deleteThese\nFROM    SqlGraph.Company\
  \ AS Company,\nSqlGraph.ReportsTo FOR PATH AS ReportsTo,\nSqlGraph.Company FOR PATH\n\
  AS ReportsToCompany\nWHERE MATCH(SHORTEST_PATH(Company(-(ReportsTo)\n->ReportsToCompany)+))\n\
  AND Company.Name = @name\n--this is the node that was originally requested to\n\
  --be deleted\nINSERT INTO #deleteThese\nSELECT $node_id\nFROM SqlGraph.Company\n\
  WHERE name = @Name;\n--Now remove all traces of the parent and children\n--as a\
  \ from or a to in a relationship, then remove the\n--company rows.\nBEGIN TRANSACTION;\n\
  DELETE SqlGraph.ReportsTo\nWHERE  $from_id IN (SELECT CompanyNodeId\nFROM #deleteThese);\n\
  DELETE SqlGraph.ReportsTo\nWHERE  $to_id IN (SELECT CompanyNodeId\nFROM #deleteThese);\n\
  DELETE SqlGraph.Company\nWHERE  $Node_id IN (SELECT CompanyNodeId\nFROM  #deleteThese);\n\
  COMMIT TRANSACTION;\nEND;\nELSE IF @ReparentChildNodesToParentFlag = 1\nBEGIN\n\
  --fetch the direct decendents of the row to reparent\nSELECT $to_id AS ToId\nINTO\
  \   #reparentThese\nFROM   SqlGraph.ReportsTo\nWHERE  $from_id = (SELECT $node_Id\n\
  FROM  SqlGraph.Company\nWHERE  Name = @Name)\n--this gets the parent row where you\
  \ will move the child rows\n--to. Would not work to remove the root\nDECLARE @NewFromId\
  \ NVARCHAR(1000) = (\nSELECT $from_id\nFROM   SqlGraph.ReportsTo\nWHERE  $to_id=\
  \ (SELECT $node_Id\nFROM  SqlGraph.Company\nWHERE  Name = @Name));\n--delete the\
  \ reporting rows for the rows to be\n-- reparented\nDELETE FROM SqlGraph.ReportsTo\n\
  WHERE  $to_id IN (SELECT ToId FROM #reparentThese)\n--delete reporting rows for\
  \ the row to be deleted\nDELETE FROM SqlGraph.ReportsTo\nWHERE  $to_id IN (SELECT\
  \ $node_Id\nFROM  SqlGraph.Company\nWHERE  Name = @Name)\n--if the parent is not\
  \ null, create new rows\nIF @NewFromId IS NOT NULL\nINSERT INTO SqlGraph.ReportsTo\n\
  (\n$from_id, $to_id\n)\nSELECT @NewFromId, ToId\nFROM   #reparentThese\nELSE\nTHROW\
  \ 50000,\n'The parent row did not exist, operation fails'\n,1;\n--delete the company\n\
  DELETE FROM SqlGraph.Company\nWHERE  $node_id = (SELECT $node_Id\nFROM  SqlGraph.Company\n\
  WHERE  Name = @Name)\nEND\nELSE\nBEGIN\n--we are trusting the edge and foreign key\
  \ constraint\n--to make sure that there are no orphaned rows\nDECLARE @CompanyNodeId\
  \ nvarchar(1000)\n--fetch the node id of the company\nSELECT @CompanyNodeId = $node_id\n\
  FROM   SqlGraph.Company\nWHERE  name = @Name\n--try to delete it\nBEGIN TRANSACTION\n\
  DELETE SqlGraph.ReportsTo\nWHERE  $to_id = @CompanyNodeId;\nDELETE SqlGraph.Company\n\
  WHERE $node_id = @CompanyNodeId;\nCOMMIT TRANSACTION\nEND;\nEND TRY\nBEGIN CATCH\n\
  IF XACT_STATE()  0\nROLLBACK TRANSACTION;\nTHROW; --just rethrow the error\nEND\
  \ CATCH;\nEND;\n```\n\n### 测试代码\n\n要测试此代码，请在图形结构中添加新节点，如图 5-3 所示。\n\n![](img/508094_1_En_5_Fig3_HTML.jpg)\n\
  \n*一个数据结构。公司总部 (Company H Q) 划分为现有的完整节点：乔治亚总部 (Georgia H Q) 和德克萨斯总部 (Texas H Q)。乔治亚总部包括亚特兰大\
  \ (Atlanta) 和道尔顿 (Dalton) 分支。德克萨斯总部包括达拉斯 (Dallas) 和休斯顿 (Houston) 分支。*\n\n图 5-3\n\
  \n*将添加到数据结构中的新节点*\n\n"
- '# SQL 图数据操作：插入、删除与层级处理示例


  ## 数据准备与层级展示


  首先，我们插入一些测试数据来演示删除操作。这些行不包括活动行，因为那会以与本示例无关的方式限制删除操作。


