- "# 8. 窗口函数\n\n到目前为止，你已经了解了两大类计算：\n\n*   大多数计算都是基于表的`列`：对于每一行，根据一个或多个列计算出一个值。\n*\
  \   聚合查询用于汇总`行`：针对整个表，汇总部分或全部行。\n\n`窗口函数`是一组将行数据作为列添加的函数。我们将研究三组窗口函数：\n\n*   聚合函数：通常，你会将聚合值作为表数据的单独汇总获取，但聚合窗口函数允许你将聚合值与每一行一起包含。除了其他用途，你将看到如何利用它来生成累计总计。\n\
  *   排名函数：这将根据当前行在数据集中的位置生成一个值。使用排序函数，你可以获取行号、相对排名，甚至是像十分位这样的分组。\n*   值函数：你可以获取当前行之前或之后的行中的数据。你还可以获取每组中的第一个和最后一个值。例如，这将帮助你获取当前行与另一行之间的值差。\n\
  \n在本章中，我们将探讨所有这些函数。\n\n窗口函数对于 SQL 来说相对较新，但大多数现代数据库管理系统现在都支持它们。再次落后的是 MariaDB（在 10.2\
  \ 版本引入）和 MySQL（在 8 版本引入）。\n\n在开始之前，部分示例将使用`sales`表。该表包含一些下单日期/时间的`NULL`值。大概这些销售从未结账。到目前为止我们一直比较宽容，时不时将它们过滤掉，但现在是时候处理它们了。我们可以按如下方式删除所有`NULL`销售记录：\n\
  \n```\nDELETE FROM sales WHERE ordered IS NULL;\n```\n\n你会注意到`saleitems`表有一个指向`sales`表的外键，这通常不允许在存在相关项目时删除销售记录。但是，如果你检查生成示例数据库的脚本，你会发现`ON\
  \ DELETE CASCADE`子句，它会自动删除孤立的销售项目。\n\n## 编写窗口函数\n\n窗口函数在一组行上生成一个值。这组行被称为一个`窗口`。\n\
  \n窗口函数的通用语法是：\n\n```\nfn() OVER (PARTITION BY columns |\nORDER BY columns | frame\
  \ clause)\n```\n\n重要部分是`OVER()`子句，它定义了要汇总的窗口。有三个主要的窗口子句：\n\n*   `PARTITION BY`：为定义的组计算函数。它等同于`GROUP\
  \ BY`。默认的分区是整个表。\n*   `ORDER BY`：按定义的顺序累积计算函数。换句话说，它生成累计总计。这个顺序不需要与表的`ORDER BY`子句相同。\n\
  *   还有一个可选的框架子句。这会在分区内创建一个滑动窗口。框架子句需要一个`ORDER BY`窗口子句。默认情况下，框架是从开头到当前行的行，但当我们讲到那里时需要限定说明。\n\
  \n在以下示例中，`SELECT`语句末尾通常有一个`ORDER BY`子句，其内容与`OVER()`子句中的相同。这不是必需的，但它使结果更容易理解。\n\n\
  ### 简单的聚合窗口\n\n如你所知，你不能在非聚合查询中混合使用聚合函数。例如，这是一个无法工作的聚合查询：\n\n```\nSELECT\nid, givenname,\
  \ familyname,\ncount(*)\nFROM customerdetails;\n```\n\n但是，这样可以工作：\n\n```\nSELECT\n\
  id, givenname, familyname,\ncount(*) OVER ()\nFROM customerdetails;\n```\n\n这会给你类似这样的结果：\n\
  \n| **id** | **givenname** | **familyname** | **count** |\n| --- | --- | --- | ---\
  \ |\n| 42 | May | Knott | 303 |\n| 459 | Rick | Shaw | 303 |\n| 597 | Ike | Andy\
  \ | 303 |\n| 186 | Pat | Downe | 303 |\n| 352 | Basil | Isk | 303 |\n| 576 | Pearl\
  \ | Divers | 303 |\n| ~ 303 行 ~ |\n\n`OVER()`子句将聚合函数变成了一个`窗口`函数。现在将为每一列生成这个聚合函数。稍后你会看到，`OVER()`子句定义了任何分组（称为分区）、顺序以及在聚合中考虑的行数。\n\
  \n对于如此简单的情况，你可以使用子查询获得相同的结果：\n\n```\nSELECT\nid, givenname, familyname,\n(SELECT\
  \ count(*) FROM customers)\nFROM customerdetails;\n```\n\n当你应用一个窗口子句时，窗口函数会变得更有趣。例如：\n\
  \n```\nSELECT\nid, givenname, familyname,\ncount(*) OVER (ORDER BY id)\nFROM customerdetails;\n\
  ```\n\n这将按`id`的顺序给出截至当前行（包括当前行）的运行计数。实际表结果可能按行顺序排列，也可能不按行顺序排列，特别是如果你包含其他表达式时，因此最好在末尾添加`ORDER\
  \ BY`：\n\n```\nSELECT\nid, givenname, familyname,\ncount(*) OVER (ORDER BY id) AS\
  \ running_count\nFROM customerdetails\nORDER BY id;\n```\n\n现在你会得到类似这样的结果：\n\n|\
  \ **id** | **Givenname** | **familyname** | **running_count** |\n| --- | --- | ---\
  \ | --- |\n| 1 | Pierce | Dears | 1 |\n| 2 | Arthur | Moore | 2 |\n| 5 | Ray | King\
  \ | 3 |\n| 6 | Gene | Poole | 4 |\n| 9 | Donna | Worry | 5 |\n| 10 | Ned | Duwell\
  \ | 6 |\n| ~ 303 行 ~ |\n\n`running_count`列看起来非常像一个简单的行号。我们稍后会看到，如果`ORDER BY`列不是唯一的，它不一定相同。\n\
  \n\n#### 聚合函数\n\n通常，你无法在常规查询中使用聚合函数，除非将它们嵌入子查询中。然而，它们可以重新用作**窗口函数**。\n\n之前你已经看到，可以使用表达式\
  \ `count(*) OVER ()` 在每一行上给出总计数。你也可以对 `sum()` 或 `avg()` 函数做类似的事情。\n\n例如，假设你想比较销售总额与总体平均值：\n\
  \n```sql\nSELECT\nid, ordered, total,\ntotal-avg(total) OVER () AS difference\n\
  FROM sales;\n```\n\n你会得到类似下面的结果：\n\n| **id** | **Ordered** | **total** | **difference**\
  \ |\n| --- | --- | --- | --- |\n| 39 | 2022-05-15 21:12:07.988741 | 28 | -33.783\
  \ |\n| 40 | 2022-05-16 03:03:16.065969 | 34 | -27.783 |\n| 42 | 2022-05-16 10:09:13.674823\
  \ | 58.5 | -3.283 |\n| 43 | 2022-05-16 15:02:43.285565 | 50 | -11.783 |\n| 45 |\
  \ 2022-05-16 16:48:14.674202 | 17.5 | -44.283 |\n| 518 | [NULL] | 13 | -48.783 |\n\
  | ~ 5549 rows ~ |\n\n在一个更复杂的例子中，假设你想比较每天的销售额与该周其余时间的对比。首先，你可以从 `sales` 表中仅提取星期几和总额。为此，你可以使用星期名称或星期数字，但我们使用星期数字：\n\
  \n```sql\n--  PostgreSQL: Sunday=0\nSELECT\nEXTRACT(dow FROM ordered) AS weekday_number,\n\
  total\nFROM sales;\n\n--  MSSQL: Sunday=1\nSELECT\ndatepart(weekday,ordered) AS\
  \ weekday_number,\ntotal\nFROM sales;\n\n--  Oracle: Sunday=1\nSELECT\nto_char(ordered,'D')+0\
  \ AS weekday_number,\ntotal\nFROM sales;\n\n--  MariaDB/MySQL: Sunday=1\nSELECT\n\
  dayofweek(ordered) AS weekday_number,\ntotal\nFROM sales;\n\n--  SQLite: Sunday=0\n\
  SELECT\nstrftime('%w',ordered) AS weekday_number,\ntotal\nFROM sales;\n```\n\n你会看到它们都有不同的实现方式，甚至对星期数字的定义都无法达成一致。幸运的是，它们对一周的第一天是什么达成了一致：\n\
  \n| **weekday_number** | **Total** |\n| --- | --- |\n| 0 | 28 |\n| 1 | 34 |\n| 1\
  \ | 58.5 |\n| 1 | 50 |\n| 1 | 17.5 |\n| 0 | 13 |\n| ~ 5549 rows ~ |\n\n接下来，将其放入一个\
  \ CTE 中，以便可以进行聚合：\n\n```sql\nWITH\ndata AS (\nSELECT\n... AS weekday,\ntotal\nFROM\
  \ sales\n)\n--  待续\n;\n```\n\n然后，你可以在另一个 CTE 中汇总数据：\n\n```sql\nWITH\ndata AS (\n\
  SELECT\n... AS weekday_number,\ntotal\nFROM sales\n),\nsummary AS (\nSELECT weekday_number,\
  \ sum(total) AS total\nFROM data\nGROUP BY weekday_number\n)\n--  等等\n```\n\n最后，你可以使用窗口聚合将每日总计与总计进行比较：\n\
  \n```sql\nWITH\ndata AS (...),\nsummary AS (...)\nSELECT\nweekday_number, total,\n\
  total/sum(total) OVER() AS proportion\nFROM summary\nORDER BY weekday_number;\n\
  ```\n\n这将给你一个逐日的汇总：\n\n| **weekday_number** | **total** | **?column?** |\n| ---\
  \ | --- | --- |\n| 0 | 48182.22 | 0.147 |\n| 1 | 49304 | 0.151 |\n| 2 | 45156.5\
  \ | 0.138 |\n| 3 | 45959.5 | 0.141 |\n| 4 | 47528 | 0.145 |\n| 5 | 42372.5 | 0.13\
  \ |\n| 6 | 48415.5 | 0.148 |\n\n注意，表达式 `total/sum(total) OVER()` 可能有点令人困惑，因为 `OVER()`\
  \ 子句看起来似乎没什么作用。你可能更愿意将其写成 `total/(sum(total) OVER ())`，以更清楚地表明这实际上是一个单一的表达式。这取决于你的偏好，但通常不这样写。\n\
  \n你可以通过给计算起一个别名、将其显示为百分比并按星期排序来完成：\n\n```sql\nWITH\ndata AS (...),\nsummary AS (...)\n\
  SELECT\nweekday_number, total,\n100*total/sum(total) OVER() AS proportion\nFROM\
  \ summary\n;\n```\n\n如果你想显示百分号，这取决于数据库管理系统（DBMS）。你可以尝试以下几种方法：\n\n```sql\n--  PostgreSQL\n\
  to_char(100*total/sum(total) OVER(),'99.9%')\n\n--  MariaDB/MySQL\nformat(100*total/sum(total)\
  \ OVER(),2) || '%'\n\n--  MSSQL\nformat(100*total/sum(total) OVER(),'0.0%')\n\n\
  --  SQLite: 等同于 printf(...)\nselect format('%.1f%%',100*total/sum(total) OVER())\n\
  \n--  Oracle\nto_char(100*total/sum(total) OVER(),'99.9') || '%'\n```\n\n这看起来更有说服力：\n\
  \n| **weekday_number** | **total** | **proportion** |\n| --- | --- | --- |\n| 0\
  \ | 48182.22 | 14.7% |\n| 1 | 49304 | 15.1% |\n| 2 | 45156.5 | 13.8% |\n| 3 | 45959.5\
  \ | 14.1% |\n| 4 | 47528 | 14.5% |\n| 5 | 42372.5 | 13.0% |\n| 6 | 48415.5 | 14.8%\
  \ |\n\n我们使用 `OVER()` 来计算表的总计。然而，我们也可以使用滑动窗口，这将在下一节中看到。\n\n#### 聚合窗口函数和 ORDER BY\n\
  \n回顾我们的入门示例，其中在 `OVER()` 子句中包含了 `ORDER BY` 子句：\n\n```sql\nSELECT\nid, givenname,\
  \ familyname,\ncount(*) OVER (ORDER BY id) AS running_count\nFROM customerdetails\n\
  ORDER BY id;\n```\n\n在这个例子中，`id` 作为主键是唯一的。这会给我们一个关于其工作原理的错误印象，所以让我们看看使用非唯一的 `height`。我们还将过滤掉\
  \ `NULL` 的身高值，以便更明显：\n\n```sql\nSELECT\nid, givenname, familyname,\nheight,\ncount(*)\
  \ OVER (ORDER BY height) AS running_count\nFROM customerdetails\nWHERE height IS\
  \ NOT NULL\nORDER BY height;\n```\n\n你会看到一些重复的身高值，以及它们如何影响窗口函数：\n\n| **id** | **givenname**\
  \ | **familyname** | **Height** | **running_count** |\n| --- | --- | --- | --- |\
  \ --- |\n| 597 | Ike | Andy | 153 | 2 |\n| 283 | Ethel | Glycol | 153 | 2 |\n| 451\
  \ | Fred | Knott | 153.8 | 3 |\n| 194 | Rod | Fishing | 154.3 | 4 |\n| 534 | Minnie\
  \ | Bus | 156.4 | 6 |\n| 352 | Basil | Isk | 156.4 | 6 |\n| ~ 267 rows ~ |\n\n在\
  \ `OVER` 子句中使用 `ORDER BY` 意味着计算到当前值为止的行数。这可能符合也可能不符合你的预期。\n\n## 帧子句\n\n在这个例子中，存在一个隐含的**帧**子句，它默认为此行为。如果你愿意，可以使其更具体：\n\
  \n```sql\ncount(*) OVER (ORDER BY height\nRANGE BETWEEN UNBOUNDED PRECEDING AND\
  \ CURRENT ROW)\n```\n\n这相当冗长，但这就是 SQL 语言的发展方式：如果能用二十个词说清楚的事，为什么要只用两个词呢？^(⁵) 这里，`RANGE`\
  \ 一词指的是 `height` 的值。例如，在前面的第五行中，该值与下一行相同，因此 `count(*)` 包含了两者。\n\n一个显而易见的替代方案是：\n\
  \n```sql\nSELECT\nid, givenname, familyname,\nheight,\ncount(*) OVER (ORDER BY height\n\
  ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS running_count\nFROM customerdetails\n\
  WHERE height IS NOT NULL\nORDER BY height;\n```\n\n一个细微的变化是从 `RANGE BETWEEN` 变为\
  \ `ROWS BETWEEN`。它现在计算的是到当前*行*为止的行数。\n\n| **id** | **givenname** | **familyname**\
  \ | **Height** | **running_count** |\n| --- | --- | --- | --- | --- |\n| 597 | Ike\
  \ | Andy | 153 | 1 |\n| 283 | Ethel | Glycol | 153 | 2 |\n| 451 | Fred | Knott |\
  \ 153.8 | 3 |\n| 194 | Rod | Fishing | 154.3 | 4 |\n| 534 | Minnie | Bus | 156.4\
  \ | 5 |\n| 352 | Basil | Isk | 156.4 | 6 |\n| ~ 267 rows ~ |\n\n这有点不公平：两个身高相同的客户被任意地排在了彼此之前。我们稍后会看到更多这种不公平性。\n\
  \n帧子句可以采用以下形式：\n\n```sql\n[ROW|RANGE] BETWEEN start AND end\n```\n\n如我们所见，`ROWS`\
  \ 和 `RANGE` 之间的区别在于，`RANGE` 包含所有与当前值匹配的行，而 `ROWS` 则不是。\n\n### 帧边界\n\n`start` 和 `end`\
  \ 表达式，也称为**帧边界**，可以采用以下形式之一：\n\n| Expression | Meaning |\n| --- | --- |\n| `UNBOUND\
  \ PRECEDING` | 开始 |\n| `n PRECEDING` | 当前行*之前*的行数 |\n| `CURRENT ROW` | |\n| `n FOLLOWING`\
  \ | 当前行*之后*的行数 |\n| `UNBOUND FOLLOWING` | 结束 |\n\n还有一个简写形式：\n\n```sql\nROWS|RANGE\
  \ start\n```\n\n这表示介于开始和当前行之间。\n\n\n\n#### 创建每日销售视图\n\n在我们继续之前，我们后续的一些示例需要准备好的销售数据。虽然我们可以在公共表表达式中完成此操作，但准备一个视图会更有意义，可以省去我们之后的一些麻烦。\n\
  \n我们将需要每日销售额以及销售月份。视图看起来会像这样：\n\n```sql\nCREATE VIEW daily_sales AS\nSELECT\nordered_date,\n\
  --  PostgreSQL, Oracle\nto_char(ordered_date,'YYYY-MM') AS ordered_month,\n--  MariaDB/MySQL\n\
  --  date_format(ordered_date,'%Y-%m')\nAS ordered_month,\n--  MSSQL\n--  format(ordered_date,'yyyy-MM')\
  \ AS ordered_month,\n--  SQLite\n--  strftime('%Y-%m',ordered_date) AS ordered_month,\n\
  sum(total) AS daily_total\nFROM sales\nWHERE ordered IS NOT NULL\nGROUP BY ordered_date;\n\
  ```\n\n（对于 MSSQL，别忘了在语句前后用 `GO` 包裹。）\n\n我们可以测试一下：\n\n```sql\nSELECT * FROM daily_sales\
  \ ORDER BY ordered_date;\n```\n\n你应该会看到类似这样的结果：\n\n| **订购日期** | **订购月份** | **日销售总额**\
  \ |\n| --- | --- | --- |\n| 2022-05-04 | 2022-05 | 43 |\n| 2022-05-05 | 2022-05\
  \ | 150.5 |\n| 2022-05-06 | 2022-05 | 110.5 |\n| 2022-05-07 | 2022-05 | 142 |\n\
  | 2022-05-08 | 2022-05 | 214.5 |\n| 2022-05-09 | 2022-05 | 16.5 |\n| ~ 约 389 行 ~\
  \ |\n\n#### 滑动窗口\n\n这是一个使用带框架子句的滑动窗口的示例。假设我们想为每一天以及截至该天的一周生成每日总额。我们可以使用\n\n```sql\n\
  SELECT\nordered_date, daily_total,\nsum(daily_total) OVER(ORDER BY ordered_date\n\
  ROWS 6 PRECEDING) AS week_total,\nsum(daily_total) OVER(ORDER BY ordered_date\n\
  ROWS UNBOUNDED PRECEDING) AS running_total\nFROM daily_sales\nORDER BY ordered_date;\n\
  ```\n\n对于两个框架子句，我们都使用了较短的形式，因为我们希望截至当前行。对于累计总额，我们本可以完全省略框架子句，但我们必须将默认的 `RANGE BETWEEN`\
  \ 改掉，以防两个日销售总额相同。\n\n你会得到类似下面的结果：\n\n| **订购日期** | **日销售总额** | **周总额** | **累计总额**\
  \ |\n| --- | --- | --- | --- |\n| 2022-05-04 | 43 | 43 | 43 |\n| 2022-05-05 | 150.5\
  \ | 193.5 | 193.5 |\n| 2022-05-06 | 110.5 | 304 | 304 |\n| 2022-05-07 | 142 | 446\
  \ | 446 |\n| 2022-05-08 | 214.5 | 660.5 | 660.5 |\n| 2022-05-09 | 16.5 | 677 | 677\
  \ |\n| 2022-05-10 | 160 | 837 | 837 |\n| 2022-05-11 | 115 | 909 | 952 |\n| 2022-05-12\
  \ | 205 | 963.5 | 1157 |\n| 2022-05-13 | 164.5 | 1017.5 | 1321.5 |\n| 2022-05-14\
  \ | 46.5 | 922 | 1368 |\n| 2022-05-15 | 457.5 | 1165 | 1825.5 |\n| ~ 约 389 行 ~ |\n\
  \n注意，对于前七天，周总额和累计总额是相同的，因为之前没有总额数据。然而，从那以后，累计总额持续累加，而周总额则被限制在当前的七天内。\n\n如果你仔细观察，可能还会发现日期中有一些间隔。这意味着那些天没有销售，这也可能给理解数据带来麻烦，因为一行不一定代表一天。我们将在第\
  \ 9 章解决这个问题。\n\n记住，你不仅限于 `count()` 和 `sum()` 函数。例如，你也可以创建滑动平均值：\n\n```sql\nSELECT\n\
  ordered_date, daily_total,\nsum(daily_total) OVER(ORDER BY ordered_date\nROWS 6\
  \ PRECEDING) AS week_total,\navg(daily_total) OVER(ORDER BY ordered_dat\nROWS 6\
  \ PRECEDING) AS week_average,\nsum(daily_total) OVER(ORDER BY ordered_date\nROWS\
  \ UNBOUNDED PRECEDING) AS running_total\nFROM daily_sales\nORDER BY ordered_date;\n\
  ```\n\n周平均值是包含当天的七天内的平均值：\n\n| **订购日期** | **日销售总额** | **周总额** | **周平均值** | **累计总额**\
  \ |\n| --- | --- | --- | --- | --- |\n| 2022-05-04 | 43 | 43 | 43 | 43 |\n| 2022-05-05\
  \ | 150.5 | 193.5 | 96.75 | 193.5 |\n| 2022-05-06 | 110.5 | 304 | 101.333 | 304\
  \ |\n| 2022-05-07 | 142 | 446 | 111.5 | 446 |\n| 2022-05-08 | 214.5 | 660.5 | 132.1\
  \ | 660.5 |\n| 2022-05-09 | 16.5 | 677 | 112.833 | 677 |\n| 2022-05-10 | 160 | 837\
  \ | 119.571 | 837 |\n| 2022-05-11 | 115 | 909 | 129.857 | 952 |\n| 2022-05-12 |\
  \ 205 | 963.5 | 137.643 | 1157 |\n| 2022-05-13 | 164.5 | 1017.5 | 145.357 | 1321.5\
  \ |\n| 2022-05-14 | 46.5 | 922 | 131.714 | 1368 |\n| 2022-05-15 | 457.5 | 1165 |\
  \ 166.429 | 1825.5 |\n| ~ 约 389 行 ~ |\n\n你还可以选择滑动最小值和最大值，或者截至当前的平均值。你需要根据自己的目的来决定其中哪些是有用的。\n\
  \n\n\n#### 窗口函数小计\n\n之前，我们用类似 `sum(total) OVER()` 的表达式创建了总计。`OVER()` 表达式是求和整个表的简写。\n\
  \n也可以按组进行求和（或计数，或其他操作）。你可能会认为语法会是类似 `sum(total) OVER (GROUP BY ...)` 的形式，但这太直白了。实际上，我们使用表达式\
  \ `(PARTITION BY ...)` 来表示分组。\n\n默认的分区是整个表。你可以按任何可以分组的字段进行分区。例如，假设你想用前面的例子获取每月总计，你可以使用\n\
  \n```sql\nSELECT\nordered_date, daily_total,\nsum(daily_total) OVER(ORDER BY ordered_date\n\
  ROWS 6 PRECEDING) AS week_total,\nsum(daily_total) OVER(ORDER BY ordered_date\n\
  ROWS UNBOUNDED PRECEDING) AS running_total,\nsum(daily_total) OVER(PARTITION BY\
  \ ordered_month)\nAS monthly_total\nFROM daily_sales\nORDER BY ordered_date;\n```\n\
  \n现在你会看到类似这样的结果：\n\n| `ordered_date` | `daily_total` | `week_total` | `running_total`\
  \ | `monthly_total` |\n| --- | --- | --- | --- | --- |\n| 2022-05-04 | 43 | 43 |\
  \ 43 | 6966.5 |\n| 2022-05-05 | 150.5 | 193.5 | 193.5 | 6966.5 |\n| 2022-05-06 |\
  \ 110.5 | 304 | 304 | 6966.5 |\n| 2022-05-07 | 142 | 446 | 446 | 6966.5 |\n| 2022-05-08\
  \ | 214.5 | 660.5 | 660.5 | 6966.5 |\n| 2022-05-09 | 16.5 | 677 | 677 | 6966.5 |\n\
  | 2022-05-10 | 160 | 837 | 837 | 6966.5 |\n| 2022-05-11 | 115 | 909 | 952 | 6966.5\
  \ |\n| 2022-05-12 | 205 | 963.5 | 1157 | 6966.5 |\n| 2022-05-13 | 164.5 | 1017.5\
  \ | 1321.5 | 6966.5 |\n| 2022-05-14 | 46.5 | 922 | 1368 | 6966.5 |\n| 2022-05-15\
  \ | 457.5 | 1165 | 1825.5 | 6966.5 |\n| ~ 389 行 ~ |\n\n当然，对于每个月，你都会得到一个新的总计。\n\n\
  现在，棘手的部分来了。你也可以将 `PARTITION BY` 和 `ORDER BY` 结合起来使用：\n\n```sql\nsum(daily_total)\
  \ OVER(\nPARTITION BY ordered_month\nORDER BY ordered_date ROWS UNBOUNDED PRECEDING\n\
  ) AS month_running_total\n```\n\n以下是一些可能组合的示例：\n\n```sql\nSELECT\nordered_date,\
  \ daily_total,\nsum(daily_total) OVER(ORDER BY ordered_date\nROWS UNBOUNDED PRECEDING)\
  \ AS running_total,\nsum(daily_total) OVER(PARTITION BY ordered_month)\nAS month_total,\n\
  sum(daily_total) OVER(ORDER BY ordered_month)\nAS running_month_total,\nsum(daily_total)\
  \ OVER(PARTITION BY ordered_month\nORDER BY ordered_date ROWS UNBOUNDED PRECEDING)\n\
  AS month_running_total\nFROM daily_sales\nORDER BY ordered_date;\n```\n\n你会看到类似这样的结果（列名已缩写以适配页面）：\n\
  \n| `ordered_date` | `daily_total` | `Rt` | `mt` | `rmt` | `mrt` |\n| --- | ---\
  \ | --- | --- | --- | --- |\n| 2022-05-04 | 43 | 43 | 6966.5 | 6966.5 | 43 |\n|\
  \ 2022-05-05 | 150.5 | 193.5 | 6966.5 | 6966.5 | 193.5 |\n| 2022-05-06 | 110.5 |\
  \ 304 | 6966.5 | 6966.5 | 304 |\n| 2022-05-07 | 142 | 446 | 6966.5 | 6966.5 | 446\
  \ |\n| 2022-05-08 | 214.5 | 660.5 | 6966.5 | 6966.5 | 660.5 |\n| 2022-05-09 | 16.5\
  \ | 677 | 6966.5 | 6966.5 | 677 |\n| 2022-05-10 | 160 | 837 | 6966.5 | 6966.5 |\
  \ 837 |\n| 2022-05-11 | 115 | 952 | 6966.5 | 6966.5 | 952 |\n| 2022-05-12 | 205\
  \ | 1157 | 6966.5 | 6966.5 | 1157 |\n| 2022-05-13 | 164.5 | 1321.5 | 6966.5 | 6966.5\
  \ | 1321.5 |\n| 2022-05-14 | 46.5 | 1368 | 6966.5 | 6966.5 | 1368 |\n| 2022-05-15\
  \ | 457.5 | 1825.5 | 6966.5 | 6966.5 | 1825.5 |\n| ~ 389 行 ~ |\n\n这些名字可能有些令人困惑，所以下面的表格解释了具体发生了什么：\n\
  \n| 子句 | 名称 | 发生了什么 |\n| --- | --- | --- |\n| `ORDER BY date ...` | `running_total`\
  \ | 从开头到当前行的累计总计 |\n| `PARTITION BY month` | `month_total` | 当前组的总计 |\n| `ORDER\
  \ BY month` | `running_month_total` | 每个月的累计总计 |\n| `PARTITION BY month ORDER BY\
  \ date ...` | `month_running_total` | 每个月份内的累计总计 |\n\n（同样，列名已缩写以便适配。）\n\n注意我们是如何使用分组列\
  \ `ordered_month` 既进行分区，又进行累计总计的。因为它的默认框架是 `RANGE ...`，它会对到目前为止的所有值进行求和，这实际上就是整个月的总计。如果你按非唯一的列排序，就会出现这种情况。\n\
  \n整个过程中最难的部分是为结果想个好名字。\n\n作为汇总，这些都是很好的保存为视图的候选对象。\n\n但请注意，仅在 SQL Server 中，如果不使用额外的技巧，你无法在视图中包含\
  \ `ORDER BY` 子句。因此，你至少应该确保你的 `SELECT` 语句包含你想要排序的列，并在使用视图时再包含 `ORDER BY` 子句。\n\n\
  或者，你可以在 `ORDER BY` 子句末尾使用 `OFFSET 0 ROWS` 作为变通方法。\n\n\n\n### 按多列进行 `PARTITION BY`\n\
  \n已知 `PARTITION BY` 会生成小计，那么 `PARTITION BY` 多列将会生成子子计——如果这个词真存在的话。\n\n例如，假设你想生成一份按州、城镇和客户划分的销售报告。数据是存在的，但它分布在多个表中，你首先需要对其进行准备。\n\
  \n首先，你需要将包含州和城镇信息的 `customerdetails` 视图与销售数据连接起来。到时候，我们会将其放入一个名为 `customer_sales`\
  \ 的 CTE 中：\n\n```sql\n--  customer_sales\nSELECT c.id AS customerid, c.state, c.town,\
  \ total\nFROM customerdetails AS c JOIN sales AS s\nON c.id=s.customerid\n```\n\n\
  然后，我们希望按州、城镇和客户 ID 进行分组汇总。同样，这会进入另一个 CTE：\n\n```sql\n--  totals\nSELECT state, town,\
  \ customerid, sum(total) AS total\nFROM customer_sales\nGROUP BY state, town, customerid\n\
  ```\n\n我们可以将它们整合在一起并检查结果：\n\n```sql\nWITH\ncustomer_sales AS (\nSELECT c.id AS customerid,\
  \ c.state, c.town, total\nFROM customerdetails AS c JOIN sales AS s\nON c.id=s.customerid\n\
  ),\ntotals AS (\nSELECT state, town, customerid, sum(total) AS total\nFROM customer_sales\n\
  GROUP BY state, town, customerid\n)\nSELECT state, town, customerid, total AS customer_total\n\
  FROM totals\nORDER BY state, customerid;\n```\n\n你会得到类似这样的结果：\n\n| `state` | `Town`\
  \ | `customerid` | `customer_total` |\n| --- | --- | --- | --- |\n| ACT | Kingston\
  \ | 85 | 2469 |\n| ACT | Kingston | 112 | 1387 |\n| ACT | Kingston | 147 | 2439.5\
  \ |\n| ACT | Kingston | 355 | 689.5 |\n| ACT | Gordon | 489 | 199 |\n| NSW | Reedy\
  \ Creek | 10 | 3089 |\n| ~ 约 269 行 ~ |\n\n现在来看窗口函数。首先，要获取按州分组的总计，我们可以使用\n\n```sql\n\
  sum(total) OVER(PARTITION BY state) AS state_total\n```\n\n要获取每个城镇的组总计，请记住，一个城镇名可能出现在多个州中。使用\
  \ `PARTITION BY town` 将是错误的，因为城镇名会被混淆。相反，我们应该使用\n\n```sql\nsum(total) OVER(PARTITION\
  \ BY state, town) AS town_total\n```\n\n将这两个表达式合并，并添加一个 `ORDER BY` 子句以便完整查看，我们得到：\n\
  \n```sql\nWITH\ncustomer_sales AS (\nSELECT c.id AS customerid, c.state, c.town,\
  \ total\nFROM customerdetails AS c JOIN sales AS s\nON c.id=s.customerid\n),\ntotals\
  \ AS (\nSELECT state, town, customerid, sum(total) AS total\nFROM customer_sales\n\
  GROUP BY state, town, customerid\n)\nSELECT\nstate, town, customerid, total AS customer_total,\n\
  sum(total) OVER(PARTITION BY state) AS state_total,\nsum(total) OVER(PARTITION BY\
  \ state, town) AS town_total\nFROM totals\nORDER BY state, customerid;\n```\n\n\
  结果如下所示：\n\n| `state` | `Town` | `customerid` | `customer_total` | `state_total`\
  \ | `town_total` |\n| --- | --- | --- | --- | --- | --- |\n| ACT | Kingston | 85\
  \ | 2469 | 7184 | 6985 |\n| ACT | Kingston | 112 | 1387 | 7184 | 6985 |\n| ACT |\
  \ Kingston | 147 | 2439.5 | 7184 | 6985 |\n| ACT | Kingston | 355 | 689.5 | 7184\
  \ | 6985 |\n| ACT | Gordon | 489 | 199 | 7184 | 199 |\n| NSW | Reedy Creek | 10\
  \ | 3089 | 106389.22 | 12655 |\n| ~ 约 269 行 ~ |\n\n州和城镇之间存在隐含的层级关系：城镇是州的一部分（并且，目前来看，客户位于某个城镇中）。因此，`PARTITION\
  \ BY` 子句必须遵循这个层级：`state,town`。你也可以使用不相关的列，例如州和出生年份，在这种情况下，列的顺序可以任意。\n\n## 排名函数\n\
  \n到目前为止使用的窗口函数基本上是赋予了新上下文的聚合函数。另一组函数是窗口函数所特有的。通常，它们与当前行的位置相关。大体上，我们可以称它们为 **排名函数**。\n\
  \n有一个聚合窗口函数，我们已经见过，它同时也充当排名函数：\n\n```sql\nSELECT\nid, givenname, familyname,\nheight,\n\
  count(*) OVER (ORDER BY height\nROWS UNBOUNDED PRECEDING) AS running_count\nFROM\
  \ customers\nWHERE height IS NOT NULL\nORDER BY height;\n```\n\n只要使用框架子句 `ROWS UNBOUNDED\
  \ PRECEDING`（`ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW` 的简写），`count(*)`\
  \ 就会统计到当前行为止的行数，这基本上就是结果集中的行号。\n\n有一个更简单的替代方法：\n\n```sql\nSELECT\nid, givenname,\
  \ familyname,\nheight,\nrow_number() OVER (ORDER BY height) AS running_count\nFROM\
  \ customers\nWHERE height IS NOT NULL\nORDER BY height;\n```\n\n`row_number()` 函数基本上就是生成这个：为结果集中的每一行生成一个编号。\n\
  \n\n\n### 基本排名函数\n\n主要有四个排名函数：\n\n*   `row_number()`: 计算当前行在当前分区中指定顺序下的行号。\n\n \
  \   如果`ORDER BY`子句中的两个值相同，它们仍会获得不同的行号；无法保证谁排在前面。\n\n*   `rank()`: 在结果集中给出排名。\n\n\
  \    如果`ORDER BY`子句中的两个值相同，它们将获得相同的排名。下一个不同的值不会获得紧接的下一个排名；它会追上一行的行号。\n\n*   `count(*)`:\
  \ 如果你省略窗口框架子句，让它默认为`RANGE`，它的行为将与`rank()`相似，但有一个区别。我们稍后会看这个区别。\n\n*   `dense_rank()`:\
  \ 这也会给出一个排名，类似于之前的`rank()`。然而，下一个不同的值会获得下一个排名，因此它会逐渐落后于行号。\n\n如果未指定分区（即没有`PARTITION\
  \ BY`子句），则上述函数将应用于整个表。否则，它们将给出组内的位置。\n\n`rank()`和`dense_rank()`之间的区别在于，对于相等的值，`rank()`会从下一个`row_number()`开始计数，而`dense_rank()`不会。\n\
  \n如果`ORDER BY`值不是唯一的\n\n*   `row_number()`是任意的。\n\n*   `rank()`给出的是组*开始*处的排名。\n\n\
  *   `count(*)`给出的是组*结束*处的排名。\n\n*   `dense_rank()`给出的是组的排名。\n\n如果`ORDER BY`值是唯一的，这些函数都会给出相同的结果。\n\
  \n我们可以用客户身高来测试这一点，我们知道有些身高是重复的：\n\n```sql\nSELECT\nid, givenname, familyname,\n\
  height,\nrow_number() OVER (ORDER BY height) AS row_number,\ncount(*) OVER (ORDER\
  \ BY height) AS count,\nrank() OVER (ORDER BY height) AS rank,\ndense_rank() OVER\
  \ (ORDER BY height) AS dense_rank\nFROM customers\nWHERE height IS NOT NULL\nORDER\
  \ BY height;\n```\n\n你会得到类似这样的结果：\n\n| `id` | `…` | `height` | `row_number` | `count`\
  \ | `rank` | `dense_rank` |\n| --- | --- | --- | --- | --- | --- | --- |\n| 597\
  \ | … | 153 | 1 | 2 | 1 | 1 |\n| 283 | … | 153 | 2 | 2 | 1 | 1 |\n| 451 | … | 153.8\
  \ | 3 | 3 | 3 | 2 |\n| 194 | … | 154.3 | 4 | 4 | 4 | 3 |\n| 534 | … | 156.4 | 5\
  \ | 6 | 5 | 4 |\n| 352 | … | 156.4 | 6 | 6 | 5 | 4 |\n| ~ 267 行 ~ |\n\n当然，你的实际结果可能不同。然而，在上面的例子中，我们可以看到\n\
  \n*   `row_number()`是唯一的，与实际值无关。\n*   对于相等的值，`rank()`是相同的。*下一个*值与`row_number()`匹配。\n\
  *   对于相等的值，`count(*)`也是相同的。*下一个*值也与`row_number()`匹配。\n*   对于相等的值，`rank()`与*第一个*`row_number()`相同；`count(*)`与*最后一个*`row_number()`相同。\n\
  *   对于相等的值，`dense_rank()`也是相同的。*下一个*值会获得下一个排名。等到结果集结束时，它会与行号相差很大。\n\n对于大多数数据库管理系统，排名函数都需要一个`ORDER\
  \ BY`窗口子句。这是合理的，因为没有顺序，排名就没有意义。\n\n例外包括 PostgreSQL 和 SQLite，它们允许空的窗口子句：\n\n```sql\n\
  --  PostgreSQL, SQLite\nSELECT\nid, givenname, familyname,\nheight,\nrow_number()\
  \ OVER () AS row_number,\ncount(*) OVER () AS count,\nrank() OVER () AS rank,\n\
  dense_rank() OVER () AS dense_rank\nFROM customers\nWHERE height IS NOT NULL\nORDER\
  \ BY height;\n```\n\n然而，结果是没有意义的。`count(*)`、`rank()`和`dense_rank()`表达式都为整个结果集给出一个值，而`row_number()`则以任意顺序给出的行号。\n\
  \n### 使用 PARTITION BY 进行排名\n\n默认情况下，像`row_number()`这样的排名函数会对整个结果集进行排名。你也可以使用`PARTITION\
  \ BY`按组进行排名：\n\n```sql\nSELECT\nid, ordered_date, total,\nrow_number() OVER (PARTITION\
  \ BY ordered_date) AS row_number\nFROM sales\nORDER BY ordered;\n```\n\n结果将是类似这样的：\n\
  \n| `id` | `ordered_date` | `total` | `row_number` |\n| --- | --- | --- | --- |\n\
  | 1 | 2022-05-04 | 43 | 1 |\n| 2 | 2022-05-05 | 54.5 | 1 |\n| 3 | 2022-05-05 | 96\
  \ | 2 |\n| 6 | 2022-05-06 | 18 | 2 |\n| 7 | 2022-05-06 | 92.5 | 1 |\n| 4 | 2022-05-07\
  \ | 17.5 | 1 |\n| ~ 5295 行 ~ |\n\n行号可能不是预期的顺序，因为没有指定排序。为了完成工作，我们还应该包含排序：\n\n```sql\n\
  SELECT\nid, ordered_date, total,\nrow_number() OVER (\nPARTITION BY ordered_date\
  \ ORDER BY ordered\n) AS row_number\nFROM sales\nORDER BY ordered;\n```\n\n现在的行号就是我们所预期的顺序了：\n\
  \n| `id` | `ordered_date` | `total` | `row_number` |\n| --- | --- | --- | --- |\n\
  | 1 | 2022-05-04 | 43 | 1 |\n| 2 | 2022-05-05 | 54.5 | 1 |\n| 3 | 2022-05-05 | 96\
  \ | 2 |\n| 6 | 2022-05-06 | 18 | 1 |\n| 7 | 2022-05-06 | 92.5 | 2 |\n| 4 | 2022-05-07\
  \ | 17.5 | 1 |\n| ~ 5295 行 ~ |\n\n你可以以一种创造性的方式使用分组行号。例如，你可能只想显示每天第一笔销售的日期。你可以使用`CASE\
  \ ... END`表达式有选择地显示日期：\n\n```sql\nCASE\nWHEN row_number() OVER\n(PARTITION BY ordered_date\
  \ ORDER BY ordered)=1\nTHEN CAST(ordered_date AS varchar(16))\nELSE ''\nEND AS ordered_date,\n\
  ```\n\n重新排列并重命名几个列，你会得到\n\n```sql\nSELECT\nid,\nCASE\nWHEN row_number() OVER\n(PARTITION\
  \ BY ordered_date ORDER BY ordered)=1\nTHEN CAST(ordered_date AS varchar(16))\n\
  ELSE ''\nEND AS ordered_date,\nrow_number() OVER (PARTITION BY ordered_date) AS\
  \ item,\ntotal\nFROM sales\nORDER BY ordered;\n```\n\n这会给你一个看起来更简洁的结果：\n\n| `id`\
  \ | `ordered_date` | `item` | `Total` |\n| --- | --- | --- | --- |\n| 1 | 2022-05-04\
  \ | 1 | 43 |\n| 2 | 2022-05-05 | 1 | 54.5 |\n| 3 | | 2 | 96 |\n| 6 | 2022-05-06\
  \ | 1 | 18 |\n| 7 | | 2 | 92.5 |\n| 4 | 2022-05-07 | 1 | 17.5 |\n| 5 | | 2 | 63\
  \ |\n| 9 | | 3 | 61.5 |\n| 10 | 2022-05-08 | 1 | 67.5 |\n| 11 | | 2 | 18.5 |\n|\
  \ 8 | | 3 | 54 |\n| 13 | | 4 | 74.5 |\n| ~ 5295 行 ~ |\n\n当然，你仍然可以包含你的累计总数。\n\n\n\
  \n#### 分页结果\n\n你可能需要知道总行数的一个原因，是希望将结果分成多页。例如，假设你希望每页显示，比如说，二十条记录，而现在你想展示其中的第三页。\n\
  \n我们可以从之前的 `pricelist` 视图开始，并加入 `row_number()` 窗口函数：\n\n```sql\nSELECT\nid, title,\
  \ published, author,\nprice, tax, inc,\nrow_number() OVER(ORDER BY id) AS row_number\n\
  FROM aupricelist;\n```\n\n我们尚未包含 `ORDER BY` 子句，因为后面还有内容。某些数据库管理系统可能会按 `id` 顺序生成结果，但这当然不能保证。\n\
  \n现在，我们可以将其放入一个公用表表达式（CTE）中，并基于行号进行筛选：\n\n```sql\nWITH cte AS (\nSELECT\nid, title,\
  \ published, author,\nprice, tax, inc,\nrow_number() OVER(ORDER BY id) AS row_number\n\
  FROM aupricelist\n)\nSELECT *\nFROM cte\nWHERE row_number BETWEEN 40 AND 59\nORDER\
  \ BY id;\n```\n\n你会得到类似下面的结果：\n\n| **id** | **title** | **…** | **price** | **tax**\
  \ | **inc** | **row_number** |\n| --- | --- | --- | --- | --- | --- | --- |\n| 98\
  \ | 卡米拉 | … | 12 | 1.2 | 13.2 | 40 |\n| 102 | 汉索姆之谜 … | … | 14.5 | 1.45 | 15.95\
  \ | 41 |\n| 103 | 波斯信札 | … | 15.5 | 1.55 | 17.05 | 42 |\n| 104 | 罪人在愤怒上帝手中 … | …\
  \ | 19.5 | 1.95 | 21.45 | 43 |\n| 106 | 特拉法尔加 | … | 16 | 1.6 | 17.6 | 44 |\n| 109\
  \ | 红字与 … | … | 19.5 | 1.95 | 21.45 | 45 |\n| ~ 约 20 行 ~ |\n\nOracle 有一个内置的值叫做 `rownum`。遗憾的是，你仍然需要通过\
  \ CTE 或子查询来使用它。\n\n当然，你不一定要按 `id` 排序。你可以使用 `title` 或 `price`，只要在窗口函数和 `ORDER BY`\
  \ 子句中都包含它就行。当然，你也可以使用 `DESC` 来降序排列。\n\n还有一种替代方法。正式地说，你可以使用 `OFFSET ... FETCH ...`\
  \ 子句：\n\n```sql\n--  PostgreSQL, MSSQL, Oracle\nSELECT\nid, title, published, author,\n\
  price, tax, inc,\nrow_number() OVER(ORDER BY id) AS row_number\nORDER BY id OFFSET\
  \ 40 ROWS FETCH FIRST 20 ROWS ONLY;\n```\n\n这会跳过前 40 行，并获取之后的 20 行。\n\n非正式地，一些数据库管理系统支持\
  \ `LIMIT ... OFFSET`：\n\n```sql\n--  PostgreSQL (再次), MariaDB/MySQL, SQLite\nSELECT\n\
  id, title, published, author,\nprice, tax, inc,\nrow_number() OVER(ORDER BY id)\
  \ AS row_number\nORDER BY id LIMIT 20 OFFSET 40;\n```\n\n这是一种更简单的语法，但不幸的是，它不是官方语法。\n\
  \nMSSQL 也支持简单的 `SELECT TOP` 语法，但它不够灵活。\n\n当然，这两种替代方法比使用窗口函数技术简单得多，但使用窗口函数有一个优势。\n\
  \n假设你正在按某个非唯一字段排序，比如 `price`。普通的分页技术（包括前面的 `row_number()`）的问题在于，页面严格在行数处停止（如果没有更多数据，则可能更少）。\n\
  \n如果你想将相同价格的记录分在一组，可以改用类似下面的方法：\n\n```sql\nWITH cte AS (\nSELECT\nid, title, published,\
  \ author,\nprice, tax, inc,\nrank() OVER(ORDER BY price) AS rank\nFROM aupricelist\n\
  )\nSELECT *\nFROM cte\nWHERE rank BETWEEN 40 AND 59\nORDER BY price;\n```\n\n只要分组不是太大，它应该能给你几乎相同的结果，但同一价格的所有书籍都会被归在一起。\n\
  \n#### 使用 ntile\n\n如果你想将排序后的结果集分成，比如，十个组，我们称这些组为 `十分位数`，源自拉丁语中表示“十”的词。如果你想要五个组，则称为\
  \ `五分位数`，一百个组就是 `百分位数`。如果你懂足够多的拉丁语，你还可以继续分成七组或十三组。\n\n数学家对任何数字都有一个通用名称，称为 `n`，一旦你习惯了，这个名字相当吸引人。如果你将排序后的数据分成组，你就创建了\
  \ `ntiles`，对应的窗口函数是 `ntile(n)`，其中 `n` 是组的数量。\n\n例如，要在客户表中按身高创建十分位数，你可以使用：\n\n```sql\n\
  SELECT\nid, givenname, familyname, height,\nntile(10) OVER (order by height) AS\
  \ decile\nFROM customers\nWHERE height IS NOT NULL;\n```\n\n你会得到类似这样的结果：\n\n| **id**\
  \ | **givenname** | **familyname** | **height** | **decile** |\n| --- | --- | ---\
  \ | --- | --- |\n| 597 | 艾克 | 安迪 | 153 | 1 |\n| 283 | 埃塞尔 | 格利科尔 | 153 | 1 |\n|\
  \ 451 | 弗雷德 | 诺特 | 153.8 | 1 |\n| 194 | 罗德 | 菲什 | 154.3 | 1 |\n| 534 | 明妮 | 巴斯 |\
  \ 156.4 | 1 |\n| 352 | 巴兹尔 | 伊斯克 | 156.4 | 1 |\n| ~ 约 267 行 ~ |\n\n注意我们已经过滤掉了 `NULL`\
  \ 身高值。如果我们没有过滤，那么根据你的数据库管理系统，第一个或最后一个十分位左右的组里会充斥着 `NULL` 身高值。这会创建一个本不应存在的组，但无论如何被包括进来了。\n\
  \n这只是 `ntile()` 的一个陷阱。实际上有两个陷阱，其中一个可能是决定性的障碍。\n\n首先，请注意前面的结果有 267 行，这不能被 10 整除。这没关系，但\
  \ SQL 必须处理这种情况，你会发现前七个组会有 27 行，其余组有 26 行。当然，你自己的结果可能不同，但思路是一样的：余下的行会从前面开始填充。\n\n\
  第二个陷阱可能需要仔细寻找，并且在你自己的示例数据库中可能不明显。如果你仔细查找，可能会发现类似这样的情况：\n\n| **id** | **givenname**\
  \ | **familyname** | **height** | **decile** |\n| --- | --- | --- | --- | --- |\n\
  | … |\n| 388 | 罗恩 | 德莱 | 166.9 | 3 |\n| 546 | 帕特 | 埃拉 | 167.1 | 3 |\n| 106 | 杰伊\
  \ | 沃克 | 167.1 | 3 |\n| 77 | 林恩 | 希德 | 167.1 | 4 |\n| 403 | 威尔 | 诺特 | 167.3 | 4\
  \ |\n| 314 | 杰克 | 波茨 | 167.4 | 4 |\n| … |\n\n在这个例子中，你会看到三位客户身高相同（`167.1`），但其中一位没能挤进前一个十分位数，所以被推到了下一个组。这更多是前面提到的不公平性，是由于\
  \ `ntile` 的计算纯粹基于行号和值。\n\n例如，如果你要根据某些十分位数给客户颁奖或折扣，仅仅因为排序顺序不可预测而遗漏某人，这是不公平的。\n\n\
  如果你依赖 `ntile`，这可能是一个决定性的障碍。不过，有一个解决方法。\n\n\n\n#### 针对 `ntile` 的一个变通方案\n\n正如我们提到的，`ntile`\
  \ 是基于行号的。然而，如果 `ntile` 能基于 `rank()`、`count()` 甚至是 `dense_rank()`，那么具有相同值的行最终就会被分到同一个十分位组中。\n\
  \n在这种情况下，我们将生成二十个组，称为二十分位组。为此，我们必须计算自己的分组。我们从计算每个组的大小开始：\n\n```sql\nSELECT count(*)/20.0\
  \ AS bin\nFROM customers WHERE height IS NOT NULL\n```\n\n我们将这个值称为 `bin`，这是统计学中对分组的常见命名。\n\
  \n我们可以把它放到一个 CTE（公共表表达式）中，然后运行以下查询：\n\n```sql\n--  PostgreSQL, MariaDB/MySQL, MSSQL,\
  \ Oracle\nWITH data AS (\nSELECT count(*)/20.0 AS bin\nFROM customers WHERE height\
  \ IS NOT NULL\n)\nSELECT\nid, givenname, familyname, height,\nrow_number() OVER(ORDER\
  \ BY height) AS row_number,\nntile(20) OVER(ORDER BY height) AS vigintile,\nfloor((row_number()\
  \ OVER(ORDER BY height)-1)/bin)+1\nAS row_vitintile,\nfloor((rank() OVER(ORDER BY\
  \ height)-1)/bin)+1\nAS rank_vigintile,\nfloor((count(*) OVER(ORDER BY height)-1)/bin)+1\n\
  AS count_vigintile,\nbin\nFROM customers, data\nWHERE height IS NOT NULL\nORDER\
  \ BY height;\n```\n\nSQLite 没有 `floor()` 函数，但你可以使用 `cast(... AS int)` 作为替代：\n\n\
  ```sql\ncast((row_number() OVER(ORDER BY height)-1)/bin AS int)+1\nAS row_vigintile,\n\
  cast((rank() OVER(ORDER BY height)-1)/bin AS int)+1\nAS rank_vigintile,\ncast((count(*)\
  \ OVER(ORDER BY height)-1)/bin AS int)+1\nAS count_vigintile,\n```\n\n你将得到以下结果：\n\
  \n| id   | …    | height | rn   | vig  | row_vig | rank_vig | count_vig | bin  \
  \  |\n| :--- | :--- | :----- | :--- | :--- | :------ | :------- | :-------- | :-----\
  \ |\n| 597  | …    | 153    | 1    | 1    | 1       | 1        | 1         | 13.35\
  \  |\n| 283  | …    | 153    | 2    | 1    | 1       | 1        | 1         | 13.35\
  \  |\n| 451  | …    | 153.8  | 3    | 1    | 1       | 1        | 1         | 13.35\
  \  |\n| 194  | …    | 154.3  | 4    | 1    | 1       | 1        | 1         | 13.35\
  \  |\n| 534  | …    | 156.4  | 5    | 1    | 1       | 1        | 1         | 13.35\
  \  |\n| 352  | …    | 156.4  | 6    | 1    | 1       | 1        | 1         | 13.35\
  \  |\n| ~ 共 267 行 ~ |\n\n注意，`vigintile` 和 `row_vigintile` 的值应该是相同的；`row_vigintile`\
  \ 用于展示二十分位组是如何从行号计算出来的。\n\n更重要的是，你会看到 `rank_vigintile` 和 `count_vigintile` 列是根据\
  \ `rank()` 和 `count(*)` 值计算的，它们总是将具有相同身高的行放在同一个组中。选择哪种方式取决于你。\n\n## 处理前后行数据\n\n\
  在处理有序结果集的同时，我们也可以获取前一行和后一行的数据。这些结果分别称为 `lag`（滞后）和 `lead`（超前）。\n\n该函数的通用语法是：\n\n\
  ```sql\nlead(column,number) OVER (...)\nlag(column,number) OVER (...)\n```\n\n在这里，除了\
  \ `OVER` 子句，我们还需要提供两个值。`column` 值指的是你想要获取的另一行中的哪一列数据。`number` 值指的是要向后或向前获取多少行。如果需要，你可以省略它，这种情况下它将默认为\
  \ 1。\n\n例如，假设你想查看每天的销售额，以及前一天和后一天的销售额。你可以这样写：\n\n```sql\nSELECT\nordered_date, daily_total,\n\
  lag(daily_total) OVER (ORDER BY ordered_date)\nAS previous,\nlead(daily_total) OVER\
  \ (ORDER BY ordered_date)\nAS next\nFROM daily_sales\nORDER BY ordered_date;\n```\n\
  \n你会看到：\n\n| ordered_date | daily_total | previous | next   |\n| :----------- |\
  \ :---------- | :------- | :----- |\n| 2022-05-04   | 43          | [NULL]   | 150.5\
  \  |\n| 2022-05-05   | 150.5       | 43       | 110.5  |\n| 2022-05-06   | 110.5\
  \       | 150.5    | 142    |\n| 2022-05-07   | 142         | 110.5    | 214.5 \
  \ |\n| 2022-05-08   | 214.5       | 142      | 16.5   |\n| 2022-05-09   | 16.5 \
  \       | 214.5    | 160    |\n| ~ 共 388 行 ~ |\n\n你会注意到，第一行的 `previous` 是 `NULL`；最后一行的\
  \ `next` 也是 `NULL`。\n\n你可能会认为这有点没意义，因为你只需移动视线就能查看上一行或下一行。然而，你也可以将滞后或超前函数纳入计算中。例如，假设你想将每天的销售额与一周前进行比较。你可以使用：\n\
  \n```sql\nSELECT\nordered_date, daily_total,\nlag(daily_total,7) OVER (ORDER BY\
  \ ordered_date)\nAS last_week,\ndaily_total\n- lag(daily_total,7) OVER (ORDER BY\
  \ ordered_date)\nAS difference\nFROM daily_sales\nORDER BY ordered_date;\n```\n\n\
  结果是：\n\n| ordered_date | daily_total | last_week | difference |\n| :-----------\
  \ | :---------- | :-------- | :--------- |\n| 2022-05-04   | 43          | [NULL]\
  \    | [NULL]     |\n| 2022-05-05   | 150.5       | [NULL]    | [NULL]     |\n|\
  \ 2022-05-06   | 110.5       | [NULL]    | [NULL]     |\n| 2022-05-07   | 142  \
  \       | [NULL]    | [NULL]     |\n| 2022-05-08   | 214.5       | [NULL]    | [NULL]\
  \     |\n| 2022-05-09   | 16.5        | [NULL]    | [NULL]     |\n| 2022-05-10 \
  \  | 160         | [NULL]    | [NULL]     |\n| 2022-05-11   | 115         | 43 \
  \       | 72         |\n| 2022-05-12   | 205         | 150.5     | 54.5       |\n\
  | 2022-05-13   | 164.5       | 110.5     | 54         |\n| 2022-05-14   | 46.5 \
  \       | 142       | -95.5      |\n| 2022-05-15   | 457.5       | 214.5     | 243\
  \        |\n| ~ 共 388 行 ~ |\n\n在这里，表达式 `lag(total,7)` 获取的是前 7 行的值。正如你所料，前 7 行的值为\
  \ `NULL`。\n\n要有效且有意义地使用 `lag` 或 `lead`，有两个重要条件：\n\n*   对于每个你想测试的实例，必须只有一行数据。例如，你不能有两行具有相同的日期。\n\
  *   数据不能有间隔（缺失）。例如，不能有缺失的日期。\n\n这是因为我们将每一行解释为一天。如果你只是处理一个序列或销售数据而不考虑日期，这就无关紧要了。\n\
  \n如果你仔细（且耐心地）浏览数据，会发现有几个缺失的日期。这意味着前一行并不总是“昨天”，前 7 行也不总是“上周”。我们将在第 9 章中看到如何填补这些间隔。\n\
  \n"
- "# 总结\n\n窗口函数是基于一个“窗口”或一组行，逐行计算出值的函数。\n\n窗口函数包括：\n\n*   聚合函数\n    包括所有主要的非窗口聚合函数，如\
  \ `count()` 和 `sum()`。\n*   排名函数和分组\n    包括 `row_number()`、`rank()` 和 `dense_rank()`\
  \ 用于生成位置，以及 `ntile()` 用于生成有序分组。\n*   从其他行获取数据的函数\n    包括 `lag()` 和 `lead()`。\n\n\
  ### 窗口子句\n\n窗口函数具有一个 `OVER()` 子句：\n\n```sql\nfn() OVER (...)\n```\n\n`OVER()` 子句包含以下内容：\n\
  \n*   `ORDER BY`：用于定义数据的行顺序。\n*   `PARTITION BY`：用于定义数据的子组。\n*   一个帧子句：用于确定数据是按行号还是按值定义。它还决定了窗口的起始行和结束行。\n\
  \n## 后续内容\n\n在第 7 章，我们已经讨论了公共表表达式的工作原理。事实上，我们在本书中已经相当广泛地使用了它们。\n\n在下一章，我们将再次审视 CTE，并研究它们一些更复杂的功能。特别是，我们将看看令人头疼的递归\
  \ CTE。\n\n脚注 [1]\n\n"
- "# 9. 关于公共表表达式的更多内容\n\n你已经利用 CTEs 为聚合和其他操作准备了数据。\n\n在这里，我们将进一步探讨 CTEs 一些更强大的功能。\n\
  \n\n\n## 将 CTE 用作变量\n\n在第 4 章中，我们使用一个测试值进行了一些计算：\n\n```sql\nWITH vars AS (\nSELECT\
  \ ' abcdefghijklmnop ' AS string\n--  FROM dual   --  Oracle\n)\nSELECT\nstring,\n\
  --  示例字符串函数\nFROM vars;\n```\n\n在本章后面，当我们探讨表字面量时，会看到这种技术更复杂的版本。现在，我们先看看如何使用它。\n\n\
  一些数据库管理系统以及所有编程语言都有`变量`的概念。变量是一个临时的、有名称的值。在数据库系统支持的情况下，你可以声明一个变量名并赋值，然后在后续步骤中使用。例如，在\
  \ MSSQL 中，你可以这样写：\n\n```sql\n--  MSSQL\nDECLARE @taxrate decimal(4,2);\nSET @taxrate\
  \ = 12.5;\nSELECT\nid, title,\nprice, price/@taxrate/100 AS tax\nFROM books;\n```\n\
  \n要运行这段代码，你需要高亮选中所有语句并一次性执行。\n\n本章不会重点讨论这些变量，关于变量的更多用法将在第 10 章中介绍。相反，我们将看看如何使用通用表表达式（CTE）来完成类似的工作。\n\
  \n严格来说，我们将要使用的不是变量，而是`常量`，这意味着我们只会设置一次它们的值。不过，我们可以使用更宽泛的术语“变量”，因为它更通用。\n\n定义变量有两个主要好处：\n\
  \n*   你可以一次性指定一个任意值，并多次使用它。\n*   你可以将任意值移到准备部分。\n\n在前面的 CTE 示例中，由于我们处理的不是真实数据，我们只是简单地从\
  \ CTE 本身进行选择。在更实际的例子中，我们会将 CTE 与其他表进行交叉连接。\n\n### 设置硬编码常量\n\nCTE 变量的一个简单用途是设置一个任意值供主查询使用。例如，假设我们想使用一个任意税率生成一个简单的价格列表。\n\
  \n我们可以从一个包含税率的 CTE 开始：\n\n```sql\nWITH vars AS (\nSELECT 0.1 AS taxrate\n--  FROM\
  \ dual   --  Oracle\n)\n```\n\n现在，我们可以使用简单的交叉连接将 CTE 与`books`表结合起来：\n\n```sql\n\
  WITH vars AS (\nSELECT 0.1 AS taxrate\n--  FROM dual   --  Oracle\n)\nSELECT * FROM\
  \ books, vars;\n```\n\n结果如下所示：\n\n| **id** | **authorid** | **Truncate** | **published**\
  \ | **price** | **taxrate** |\n| --- | --- | --- | --- | --- | --- |\n| 2078 | 765\
  \ | The Duel | 1811 | 12.5 | 0.1 |\n| 503 | 128 | Uncle Silas | 1864 | 17 | 0.1\
  \ |\n| 2007 | 99 | North and South | 1854 | 17.5 | 0.1 |\n| 702 | 547 | Jane Eyre\
  \ | 1847 | 17.5 | 0.1 |\n| 1530 | 28 | Robin Hood, The ... | 1862 | 12.5 | 0.1 |\n\
  | 1759 | 17 | La Curée | 1872 | 16 | 0.1 |\n| ~ 1201 行 ~ |\n\n交叉连接将一张表的每一行与另一张表的每一行组合在一起。由于`vars`\
  \ CTE 只有一行，交叉连接的效果就是简单地给`books`表添加了另一列。\n\nSQL 有一个更现代的交叉连接语法：`books CROSS JOIN vars`。这里，我们将使用较旧的语法，因为它更简单、更易读。\n\
  \n我们现在可以计算含税价格列表：\n\n```sql\nWITH vars AS (SELECT 0.1 AS taxrate)\nSELECT\nid, title,\n\
  price, price*taxrate AS tax, price*(1+taxrate) AS total\nFROM books, vars;\n```\n\
  \n结果如下：\n\n| **Id** | **Title** | **price** | **tax** | **total** |\n| --- | ---\
  \ | --- | --- | --- |\n| 2078 | The Duel | 12.5 | 1.25 | 13.75 |\n| 503 | Uncle\
  \ Silas | 17 | 1.7 | 18.7 |\n| 2007 | North and South | 17.5 | 1.75 | 19.25 |\n\
  | 702 | Jane Eyre | 17.5 | 1.75 | 19.25 |\n| 1530 | Robin Hood, The Prince of Thieves\
  \ | 12.5 | 1.25 | 13.75 |\n| 1759 | La Curée | 16 | 1.6 | 17.6 |\n| ~ 1201 行 ~ |\n\
  \n当然，我们本可以直接使用`0.1`而不是`taxrate`，并省略 CTE 和交叉连接。然而，CTE 的好处在于，它允许我们在开头设置一次税率，这样便于维护，并且可以在后面多次使用。\n\
  \n### 派生常量\n\n这些值不必是字面值。你也可以从另一个查询中派生这些值。例如，要获取最年长和最年轻的客户，首先在变量中设置最小和最大的出生日期：\n\n\
  ```sql\n--  vars CTE\nSELECT min(dob) AS oldest, max(dob) AS youngest\nFROM customers\n\
  ```\n\n然后你可以将该 CTE 与`customers`表进行交叉连接，以获取匹配的客户：\n\n```sql\nWITH vars AS (\nSELECT\
  \ min(dob) AS oldest, max(dob) AS youngest\nFROM customers\n)\nSELECT *\nFROM customers,\
  \ vars\nWHERE dob IN(oldest, youngest);\n```\n\n你应该会看到类似这样的结果：\n\n| **id** | **givenname**\
  \ | **familyname** | **...** | **dob** | **...** |\n| --- | --- | --- | --- | ---\
  \ | --- |\n| 92 | Nan | Keen | ... | 1943-05-18 | ... |\n| 228 | Cam | Payne | ...\
  \ | 2003-01-27 | ... |\n| 577 | Sybil | Service | ... | 2003-01-27 | ... |\n| 392\
  \ | Daisy | Chain | ... | 1943-05-18 | ... |\n\n要获取个子较矮的客户，你可以将平均身高设置在一个变量中：\n\n\
  ```sql\nWITH vars AS (SELECT avg(height) AS average FROM customers)\nSELECT *\n\
  FROM customers, vars\nWHERE height<average;\n```\n\n这是你用其他方法做不到的事情，因为平均值是一个聚合值。\n\
  \n### 在 CTE 中使用聚合\n\n正如我们多次看到的，你不能将聚合与非聚合查询混合使用。解决方案总是单独计算任何你需要的聚合，然后将结果合并到下一个查询中。\n\
  \n#### 查找每个客户最近的销售记录\n\n例如，假设你想获取每个客户最近一次销售的详细信息。要获取最近的销售记录，你首先需要一个简单的聚合查询：\n\n\
  ```sql\nSELECT customerid, max(ordered) AS last_order\nFROM sales\nGROUP BY customerid;\n\
  ```\n\n你会得到类似这样的结果：\n\n| **Customerid** | **last_order** |\n| --- | --- |\n| 550\
  \ | 2023-04-18 09:18:51.933845 |\n| 272 | 2023-04-28 09:15:17.85286 |\n| 70 | 2023-04-19\
  \ 14:00:44.880376 |\n| 190 | 2023-04-09 10:12:53.416293 |\n| 539 | 2023-04-22 16:14:16.173923\
  \ |\n| 314 | 2023-04-11 03:33:57.825786 |\n| ~ 269 行 ~ |\n\n这里，我们有两个重要数据：客户 ID 以及最近订单的日期和时间。在子查询中使用这个结果，我们可以将其与`customers`和`sales`表连接起来以获取更多详细信息：\n\
  \n```sql\nWITH cte(customerid, last_order) AS (\nSELECT customerid, max(ordered)\
  \ AS last_order\nFROM sales\nGROUP BY customerid\n)\nSELECT\ncustomers.id AS customerid,\n\
  customers.givenname, customers.familyname,\nsales.id AS saleid,\nsales.ordered_date,\
  \ sales.total\nFROM\nsales\nJOIN cte ON sales.customerid=cte.customerid\nAND sales.ordered=cte.last_order\n\
  JOIN customers ON customers.id=cte.customerid\n;\n```\n\n我们会得到类似这样的结果：\n\n| **customer**\
  \ | **Givenname** | **familyname** | **sale** | **ordered_date** | **total** |\n\
  | --- | --- | --- | --- | --- | --- |\n| 287 | Judy | Free | 4209 | 2023-02-04 |\
  \ 50.5 |\n| 26 | Bess | Twishes | 4542 | 2023-02-19 | 11 |\n| 368 | Sharon | Sharalike\
  \ | 4793 | 2023-03-01 | 56 |\n| 282 | Howard | Youknow | 4939 | 2023-03-07 | 39\
  \ |\n| 395 | Holly | Day | 4953 | 2023-03-07 | 75.5 |\n| 474 | Alf | Abet | 5092\
  \ | 2023-03-13 | 94 |\n| ~ 266 行 ~ |\n\n请注意，CTE 被用来连接两个表并充当过滤器。我们实际上不需要它的结果出现在输出中。\n\
  \n\n\n\n#### 查找同名的客户\n\n在第 2 章中，我们了解了如何使用聚合查询查找重复项。我们这样做是为了查找重复的姓名（确实存在）和重复的电话号码（不存在）。\n\
  \n如果我们对重复的客户姓名更加关注，就需要更多关于客户的详细信息。首先，让我们找出重复的姓名：\n\n```\n--  公用表表达式\nSELECT familyname,\
  \ givenname FROM customers\nGROUP BY familyname, givenname HAVING count(*)>1\n```\n\
  \n这里，`customers` 表同时按姓和名进行分组，并筛选出包含多条记录的分组。\n\n将这个查询放入一个 CTE 中，我们就可以将其与 `customers`\
  \ 表进行连接：\n\n```\nWITH names AS (\nSELECT familyname, givenname FROM customers\n\
  GROUP BY familyname, givenname HAVING count(*)>1\n)\nSELECT\nc.id, c.givenname,\
  \ c.familyname,\nc.email, c.phone\n--  等等\nFROM customers AS c\nJOIN names  ON c.givenname=names.givenname\n\
  AND c.familyname=names.familyname\nORDER BY c.familyname, c.givenname;\n```\n\n\
  你会得到类似这样的结果：\n\n| `id` | `givenname` | `familyname` | `email` | `phone` |\n| ---\
  \ | --- | --- | --- | --- |\n| 429 | Corey | Ander | corey.ander429@example.net\
  \ | 0355503360 |\n| 85 | Corey | Ander | corey.ander85@example.net | 0255501923\
  \ |\n| 174 | Paul | Bearer | paul.bearer174@example.com | 0370109921 |\n| 482 |\
  \ Paul | Bearer | paul.bearer482@example.com | 0755502522 |\n| 402 | Terry | Bell\
  \ | terry.bell402@example.com | 0755504982 |\n| 295 | Terry | Bell | terry.bell295@example.com\
  \ | 0355509630 |\n| ~ 约 16 行 ~ |\n\n我们通过两列连接了 CTE 和 `customers` 表，并包含了他们的 `email`\
  \ 地址和 `phone` 号码（如果有），以便后续联系。\n\n## CTE 参数名称\n\n默认情况下，列名源自 CTE，并且你应确保所有计算都有别名，如前所述。如果\
  \ CTE 中的列没有别名（例如当你计算了某些东西时），那么 (a) 你无法引用该数据，(b) 某些数据库管理系统 (DBMS) 不允许你继续操作。\n\n你还可以在\
  \ CTE 名称后指定列名作为参数。例如，当我们查找最早和最晚的出生日期时，我们可以将别名放在 `cte` 表达式中：\n\n```\nWITH vars(oldest,\
  \ youngest) AS (    --  参数名\nSELECT min(dob), max(dob)       --  没有别名\nFROM customers\n\
  )\nSELECT *\nFROM customers, vars\nWHERE dob IN(oldest, youngest);\n```\n\n在大多数情况下，是采用这种方式还是在\
  \ CTE 内部添加别名，更多是个人偏好问题。如果你包含名称，它们将覆盖 CTE 中的任何别名。\n\n你可能更喜欢 CTE 参数名称的一个原因是，如果你认为它更具可读性，因为你将所有名称都放在了一个地方。稍后，我们将编写涉及多个\
  \ CTE 和联合查询的更复杂的 CTE，使用参数名肯定会更容易理解，所以从这里开始，你会更多地看到这种风格。\n\n## 使用多个公用表表达式\n\n我们已经看到，在其最简单的形式中，CTE\
  \ 可以写成一个子查询：\n\n```\nSELECT columns\nFROM (\nSELECT columns FROM table\n) AS sq;\n\
  ```\n\n通过将这个子查询放在开头，CTE 可以使它更易于管理：\n\n```\nWITH cte AS (\nSELECT columns FROM table\n\
  )\nSELECT columns\nFROM cte;\n```\n\n这已经是一个改进，但当子查询本身还包含子查询时，改进变得更加明显：\n\n```\n\
  SELECT columns\nFROM (\nSELECT columns FROM (\nSELECT columns FROM table\n) AS sq1\n\
  ) AS sq2;\n```\n\n这被称为嵌套子查询，如果变得过于复杂，它可能会成为一场噩梦。\n\n幸运的是，CTE 的工作方式要简单得多：\n\n```\n\
  WITH\nsq1 AS (SELECT columns FROM table),\nsq2 AS (SELECT columns FROM sql1)\nSELECT\
  \ columns FROM sq2;\n```\n\n你可以有多个以这种方式链接的 CTE，只要记得用逗号将它们分隔开。正如你在本例中看到的，每个子查询都可以引用链中的前一个。\n\
  \n我们稍后会进一步构建这个例子，并且会看到额外的 CTE 不一定必须引用前面的 CTE。\n\n### 使用多个 CTE 汇总重复姓名\n\n当我们生成重复姓名列表时，每个姓名实例都占一行。在第\
  \ 7 章中，我们生成了一个更精简的列表，但没有使用 CTE 的优势。\n\n在这里，我们将重新生成精简的列表，但使用 CTE 使其更易于操作。\n\n我们从先前查询重复姓名的语句开始：\n\
  \n```\nWITH names AS (\nSELECT familyname, givenname FROM customers\nGROUP BY familyname,\
  \ givenname HAVING count(*)>1\n)\nSELECT\nc.id, c.givenname, c.familyname,\nc.email,\
  \ c.phone\nFROM customers AS c\nJOIN names  ON c.givenname=names.givenname\nAND\
  \ c.familyname=names.familyname\nORDER BY c.familyname, c.givenname;\n```\n\n这次，我们将结果放入第二个\
  \ CTE 中：\n\n```\nWITH\nnames AS (\nSELECT familyname, givenname FROM customers\n\
  GROUP BY familyname, givenname HAVING count(*)>1\n),\nduplicates(givenname, familyname,\
  \ info) AS (\nSELECT\nc.givenname, c.familyname,\ncast(c.id AS varchar(5)) || ':\
  \ ' || c.email\n--  MSSQL: 使用 +\nFROM customers AS c     --  Oracle: 不用 AS\nJOIN\
  \ names ON c.givenname=names.givenname\nAND c.familyname=names.familyname\n)\nSELECT\
  \ * from duplicates\nORDER by familyname, giv1enname;\n```\n\n注意\n\n*   布局已更改，以使多个\
  \ CTE 更易于理解。\n*   `duplicates` CTE 使用了参数名以求简洁。对于 `names` CTE 则没有必要这样做，因为其中没有计算值；不过，为了保持一致性，你可能也想这样做。\n\
  *   我们没有单独列出 `id`，而是将其转换为字符串并与 `email` 地址拼接。这是为后续步骤做准备。\n*   为简单起见，我们忽略了 `phone`\
  \ 号码，因为它可能缺失。\n\n你可以看到目前为止的结果：\n\n| `givenname` | `familyname` | `info` |\n| ---\
  \ | --- | --- |\n| Corey | Ander | 429: corey.ander429@example.net |\n| Corey |\
  \ Ander | 85: corey.ander85@example.net |\n| Paul | Bearer | 174: paul.bearer174@example.com\
  \ |\n| Paul | Bearer | 482: paul.bearer482@example.com |\n| Terry | Bell | 402:\
  \ terry.bell402@example.com |\n| Terry | Bell | 295: terry.bell295@example.com |\n\
  | ~ 约 16 行 ~ |\n\n下一步是通过合并 `info` 列的值来汇总它们：\n\n```\nWITH\nnames AS ( ),\nduplicates(givenname,\
  \ familyname, info) AS ( )\nSELECT\ngivenname, familyname, count(*),\n--  PostgreSQL,\
  \ MSSQL\nstring_agg(info,', ') AS info\n--  MySQL/MariaDB\n--  group_concat(info\
  \ SEPARATOR ', ') AS info\n--  SQLite\n--  group_concat(info,', ') AS info\n-- \
  \ Oracle\n--  listagg(info,', ') AS info\nFROM duplicates\nGROUP BY familyname,\
  \ givenname\nORDER by familyname, givenname;\n```\n\n汇总后的列表如下所示：\n\n| `givenname`\
  \ | `familyname` | `count` | `info` |\n| --- | --- | --- | --- |\n| Corey | Ander\
  \ | 2 | 429: corey.ander ..., 85: corey.ander8 ... |\n| Paul | Bearer | 2 | 174:\
  \ paul.bearer ..., 482: paul.bearer ... |\n| Terry | Bell | 2 | 402: terry.bell4\
  \ ..., 295: terry.bell2 ... |\n| Mary | Christmas | 2 | 465: mary.christ ..., 594:\
  \ mary.christ ... |\n| Ida | Dunnit | 2 | 504: ida.dunnit5 ..., 90: ida.dunnit90\
  \ ... |\n| Judy | Free | 2 | 93: judy.free93@ ..., 287: judy.free28 ... |\n| Annie\
  \ | Mate | 2 | 505: annie.mate5 ..., 357: annie.mate3 ... |\n| Ken | Tuckey | 2\
  \ | 98: ken.tuckey98 ..., 488: ken.tuckey4 ... |\n\n我们将在接下来的章节中看到更多关于多 CTE 的例子。\n\
  \n\n\n### 递归 CTE\n\n如你所见，使用 CTE 的一个特性是，一个 CTE 可以引用之前的 CTE。另一个特性是 CTE 可以引用自身。\n\n\
  任何引用自身的事物都被称为**递归**。如果你是程序员，递归函数就是调用自身的函数，如果不妥善处理，它们的风险很高。同样，一个递归 CTE 如果不小心，也可能非常危险。\n\
  \n一个递归 CTE 有两种形式，具体取决于你的 DBMS：\n\n```\n--  PostgreSQL, MariaDB/MySQL, SQLite\nWITH\
  \ RECURSIVE cte AS (\n--  Anchor\nSELECT ...\nUNION\n--  Recursive Member\nSELECT\
  \ ... FROM cte WHERE ...\n)\n--  MSSQL, Oracle\nWITH cte AS (\n--  Anchor\nSELECT\
  \ ...\nUNION ALL\n--  Recursive Member\nSELECT ... FROM cte WHERE ...\n)\n```\n\n\
  正如你所看到的，PostgreSQL、MariaDB/MySQL 和 SQLite 使用 `RECURSIVE` 关键字。MSSQL 和 Oracle 不使用，但要求使用\
  \ `UNION ALL` 而不是简单的 `UNION`。\n\n在两种情况下，你都会看到递归 CTE 有两个部分：\n\n*   **锚点**定义了起点或第一个成员。\n\
  \    在简单情况下，可能只有一个值，但在其他查询中，可能不止一个。\n*   **递归成员**基于从前一个 CTE 迭代继承的数据定义数据。也就是说，它定义了下一个成员。\n\
  \    同样，如果有多个锚点成员，那么也会有多个递归成员。\n\n请注意，递归 CTE 必须定义何时结束，或者更准确地说，何时可以继续。通常，这是通过一个 `WHERE`\
  \ 子句实现的，正如你之前看到的，但也可以使用任何其他方法，比如连接。\n\n一个简单的递归 CTE 例子是生成一个简单的序列。例如：\n\n```\n-- \
  \ PostgreSQL, MariaDB/MySQL, SQLite\nWITH RECURSIVE cte(n) AS (\n--  Anchor\nSELECT\
  \ 1\nUNION\n--  Recursive Member\nSELECT n+1 FROM cte WHERE n<10\n)\nSELECT * FROM\
  \ cte;\n--  MSSQL, Oracle\nWITH cte(n) AS (\n--  Anchor\nSELECT 1    --  Oracle:\
  \ FROM dual\nUNION ALL\n--  Recursive Member\nSELECT n+1 FROM cte WHERE n<10\n)\n\
  SELECT * FROM cte;\n```\n\n这个 CTE 为了方便包含了一个参数 (`cte(n)`)。否则，你可以把别名放在 `SELECT` 语句中。\n\
  \n单个锚点值，在这个例子中是数字 1。递归（下一个）值是 `n+1`，只要 `n<10`。之后，它就会停止，最终你得到：\n\n| **N** |\n| 1\
  \ |\n| 2 |\n| 3 |\n| ... |\n| 8 |\n| 9 |\n| 10 |\n\n——一个从一到十的数字序列。\n\n递归 CTE 是标准\
  \ SQL 中最接近迭代或循环的东西。^(⁶)\n\n递归 CTE 的两个常见用途是：\n\n*   生成序列\n*   遍历层次结构\n\n我们还将使用递归\
  \ CTE 将字符串拆分成更小的部分，只是为了向你展示可以如何在查询中发挥一点创造力。\n\n### 生成序列\n\n我们已经看到了如何生成一个数字序列：\n\n\
  ```\nWITH cte AS (\n--  Anchor\nSELECT 0 AS n\nUNION ALL\n--  Recursive\nSELECT\
  \ n+1 FROM cte WHERE n<100\n)\nSELECT * FROM cte;\n```\n\n需要记住的是，递归成员有一个 `WHERE`\
  \ 子句来限制序列。没有它，递归查询将试图永远运行下去，而你知道，没有什么是永恒的。\n\nMSSQL 有一个内置的安全限制，即 100 次递归，我们稍后必须绕过它：\n\
  \n```\n--  MSSQL\nWITH cte (\n)\nSELECT ... FROM cte OPTION(MAXRECURSION ...);\n\
  ```\n\n其他数据库没有这个限制，但对于 PostgreSQL、MariaDB 和 MySQL，你可以轻松设置一个时间限制：\n\n```\n--  PostgreSQL\n\
  SET statement_timeout TO '5s';\n--  MariaDB\nSET MAX_STATEMENT_TIME=1;       --\
  \  秒\n--  MySQL\nSET MAX_EXECUTION_TIME=1000;    --  毫秒\n```\n\n如果你确信你的递归会正常终止，就不需要担心这个。然而，在\
  \ MSSQL 中，对于某些查询，你将需要增加或禁用递归限制。\n\n不过，在接下来的内容中包含一个简单的数字序列作为安全保障总是好的。\n\n序列有用的一种情况是获取一系列日期。这将简单地定义一个开始日期，并在递归成员中增加一天。\n\
  \nCTE 的开始足够简单：\n\n```\n--  PostgreSQL, MariaDB / MySQL\nWITH RECURSIVE dates(d,\
  \ n) AS (\nSELECT date'2023-01-01', 1\n)\nSELECT * FROM dates;\n--  MSSQL\nWITH\
  \ dates(d, n) AS (\nSELECT cast('2023-01-01' as date), 1\n)\nSELECT * FROM dates;\n\
  --  Oracle\nWITH dates(d, n) AS (\nSELECT date '2023-01-01', 1 FROM dual\n)\nSELECT\
  \ * FROM dates;\n--  SQLite\nWITH RECURSIVE dates(d, n) AS (\nSELECT '2023-01-01',\
  \ 1\n)\nSELECT * FROM dates;\n```\n\n请注意，第一个值 `d` 被转换为日期类型，SQLite 除外，它没有日期类型。设置为\
  \ `1` 的 `n` 被添加为序列号，但实际上没有必要。这里添加它是为了说明如何用它来防止 CTE 超出范围。\n\n递归部分也足够简单，但增加一天的方式因\
  \ DBMS 而异：\n\n```\n--  PostgreSQL\nWITH RECURSIVE dates(d, n) AS (\nSELECT date'2023-01-01',\
  \ 1\nUNION\nSELECT d+1, n+1 FROM dates\nWHERE d<'2023-05-01' AND n<10000\n)\nSELECT\
  \ * FROM dates;\n--  MariaDB / MySQL\nWITH RECURSIVE dates(d, n) AS (\nSELECT date'2023-01-01',\
  \ 1\nUNION\nSELECT date_add(d, interval 1 day), n+1 FROM dates\nWHERE d<'2023-05-01'\
  \ AND n<10000\n)\nSELECT * FROM dates;\n--  MSSQL\nWITH dates(d, n) AS (\nSELECT\
  \ cast('2023-01-01' as date), 1\nUNION ALL\nSELECT dateadd(day,1,d), n+1 FROM dates\n\
  WHERE d<'2023-05-01' AND n<10000\n)\nSELECT * FROM dates;\n--  SQLite\nWITH RECURSIVE\
  \ dates(d, n) AS (\nSELECT '2023-01-01', 1\nUNION\nSELECT strftime('%Y-%m-%d',d,'+1\
  \ day'), n+1 FROM dates\nWHERE d<'2023-05-01' AND n<10000\n)\nSELECT * FROM dates;\n\
  --  Oracle\nWITH dates(d, n) AS (\nSELECT date '2023-01-01', 1 FROM dual\nUNION\
  \ ALL\nSELECT d+1, n+1 FROM dates\nWHERE d<date'2023-05-01' AND n<10000\n)\nSELECT\
  \ * FROM dates;\n```\n\n你将看到一系列的日期（和数字）：\n\n| **D** | **n** |\n| --- | --- |\n|\
  \ 2023-01-01 | 1 |\n| 2023-01-02 | 2 |\n| 2023-01-03 | 3 |\n| 2023-01-04 | 4 |\n\
  | 2023-01-05 | 5 |\n| 2023-01-06 | 6 |\n| ~ 121 行 ~ |\n\n你会注意到，对于 MSSQL，我们添加了 `OPTION\
  \ (MAXRECURSION 0)`，这基本上禁用了递归限制。\n\n还要注意 `WHERE` 子句中的 `AND n<10000`。这个数字相当大，相当于超过\
  \ 27 年，但它不是无限的。如果你在何时停止 CTE 上犯了错误，这个表达式应该能限制递归次数。\n\n你可能想知道为什么你想要一个介于 `2023-01-01`\
  \ 和 `2023-05-01` 之间的日期序列，答案会是“为什么不呢？”，这并没有说服力。然而，我们将使用这种技术来克服第 8 章中提到的问题：我们的一些日期会从摘要中缺失。\n\
  \n### 连接序列 CTE 以获取缺失值\n\n你可以将生成序列的递归 CTE 与另一个存在序列缺口的表或 CTE 进行`JOIN`，以填充缺失的值。\n\n\
  例如，要获取每年出生的客户数量，某些年份的数据可能会缺失，但你仍然希望将这些缺失的年份也包含在内。\n\n首先，获取年份序列：\n\n```sql\n--  PostgreSQL,\
  \ MariaDB/MySQL, SQLite\nWITH RECURSIVE\nallyears(year) AS (\nSELECT 1940\nUNION\n\
  SELECT year+1 FROM allyears WHERE year<2010\n)\n--  MSSQL, Oracle\nWITH\nallyears(year)\
  \ AS (\nSELECT 1940\nUNION ALL\nSELECT year+1 FROM allyears WHERE year<2010\n)\n\
  ```\n\n接下来，获取客户（`id`）及其出生年份：\n\n```sql\n--  PostgreSQL, MariaDB/MySQL, Oracle\n\
  yobs(yob) AS (\nSELECT id, EXTRACT(year FROM dob)\nFROM customers WHERE dob IS NOT\
  \ NULL\n)\n--  MSSQL\nyobs(yob) AS (\nSELECT id, year(dob)\nFROM customers WHERE\
  \ dob IS NOT NULL\n)\n--  SQLite\nyobs(yob) AS (\nSELECT id, strftime('%Y',dob)\n\
  FROM customers WHERE dob IS NOT NULL\n)\n```\n\n最后，将它们进行`JOIN`并获取聚合结果：\n\n```sql\n\
  WITH RECURSIVE  --  MSSQL, Oracle: 无 RECURSIVE\nallyears(year) AS ( ),\nyobs AS\
  \ ( )\nSELECT allyears.year, count(*) AS nums\nFROM allyears LEFT JOIN yobs ON allyears.year=yobs.yob\n\
  GROUP BY allyears.year\nORDER BY allyears.year;\n```\n\n你需要使用`LEFT JOIN`来包含所有的年份序列，即使某一年没有匹配到客户数据；毕竟，这正是使用它的原因。\n\
  \n| `year` | `nums` |\n| --- | --- |\n| 1940 | 1 |\n| 1941 | 1 |\n| 1942 | 1 |\n\
  | 1943 | 1 |\n| 1944 | 1 |\n| 1945 | 1 |\n| ~ 共 71 行 ~ | |\n\n我们将对销售数据进行同样的处理。\n\
  \n### 包含缺失日期的每日对比\n\n同样的方法也适用于缺失的日期。在第 8 章中，我们生成了每日销售摘要。然后我们创建了一个包含可用每日销售数据的视图。我们可以从该视图中进行选择：\n\
  \n```sql\nSELECT *\nFROM daily_sales\nORDER BY ordered_date;\n```\n\n你会得到类似这样的结果：\n\
  \n| `ordered_date` | `ordered_month` | `daily_total` |\n| --- | --- | --- |\n| 2022-04-08\
  \ | 2022-04 | 97.5 |\n| 2022-04-09 | 2022-04 | 96 |\n| 2022-04-10 | 2022-04 | 191\
  \ |\n| 2022-04-11 | 2022-04 | 201.5 |\n| 2022-04-12 | 2022-04 | 91 |\n| 2022-04-13\
  \ | 2022-04 | 160 |\n| ~ 共 385 行 ~ |   |   |\n\n然而，如果你仔细查看，会发现一些日期缺失了。我们正准备填补这些空缺。\n\
  \n为此，我们需要以下内容：\n*   `daily_sales` 视图\n*   一个包含每日销售首尾日期的 CTE\n*   一个日期序列\n\n你已经知道如何生成日期序列了。这次，我们不在任意日期开始和停止，而是根据`daily_sales`视图的最早和最晚日期来开始和停止。我们可以将这些值放入一个\
  \ CTE 中以便引用：\n\n```sql\nWITH\nvars(first_date, last_date) AS (\nSELECT min(ordered_date),\
  \ max(ordered_date)\nFROM daily_sales\n)\n```\n\n现在我们可以使用这些值来生成日期序列：\n\n```sql\n\
  --  PostgreSQL\nWITH RECURSIVE\nvars(first_date, last_date) AS ( ),\ndates(d) AS\
  \ (\nSELECT first_date FROM vars\nUNION\nSELECT d+1 FROM vars, dates WHERE d<last_date\n\
  )\n--  MariaDB / MySQL\nWITH RECURSIVE\nvars(first_date, last_date) AS ( ),\ndates(d)\
  \ AS (\nSELECT first_date FROM vars\nUNION\nSELECT date_add(d, interval 1 day)\n\
  FROM vars, dates WHERE d<last_date\n)\n--  MSSQL\nWITH\nvars(first_date, last_date)\
  \ AS ( ),\ndates(d) AS (\nSELECT first_date FROM vars\nUNION ALL\nSELECT dateadd(day,1,d)\n\
  FROM vars, dates WHERE d<last_date\n)\n--  SQLite\nWITH RECURSIVE\nvars(first_date,\
  \ last_date) AS ( ),\ndates(d) AS (\nSELECT first_date FROM vars\nUNION\nSELECT\
  \ strftime('%Y-%m-%d',d,'+1 day')\nFROM vars, dates WHERE d<last_date\n)\n--  Oracle\n\
  WITH\nvars(first_date, last_date) AS ( ),\ndates(d) AS (\nSELECT first_date FROM\
  \ vars\nUNION ALL\nSELECT d+1 FROM vars, dates WHERE d<last_date\n)\n```\n\n对于那些使用`RECURSIVE`关键字的\
  \ DBMS，即使某些 CTE 不是递归的，你也只需在开头使用一次该关键字。\n\n注意，我们交叉连接了`vars`和`dates`，这是将变量应用到另一个表的常用技巧。我们本可以写`CROSS\
  \ JOIN`，但没必要这么麻烦。\n\n我们现在可以使用`LEFT JOIN`来完成查询，以获取所有的日期序列：\n\n```sql\nWITH RECURSIVE\
  \  --  MSSQL, Oracle: 无 RECURSIVE\nvars(first_date, last_date) AS (\n--  等等\n),\n\
  dates(d) AS (\n--  等等\n)\nSELECT d AS ordered_date, daily_sales.daily_total\nFROM\
  \ dates LEFT JOIN daily_sales ON dates.d=daily_sales.ordered_date\nORDER BY dates.d;\n\
  ```\n\n现在我们将看到以下结果：\n\n| `ordered_date` | `daily_total` |\n| --- | --- |\n| 2022-04-08\
  \ | 97.5 |\n| 2022-04-09 | 96 |\n| 2022-04-10 | 191 |\n| 2022-04-11 | 201.5 |\n\
  | 2022-04-12 | 91 |\n| 2022-04-13 | 160 |\n| ~ 共 387 行 ~ | |\n\n注意，我们选择了`dates.d\
  \ AS ordered_date`，而不是`daily_sales`视图中的`ordered_date`。这是因为后者存在一些缺失日期，而这正是我们最初要费这番功夫的原因。\n\
  \n当然，生成一个简单的序列并不是递归 CTE 的唯一用途。\n\n### 遍历层次结构\n\n递归 CTE 的另一个用例是遍历层次结构。我们要看的层次结构位于`employees`表中：\n\
  \n```sql\nSELECT * FROM employees;\n```\n\n当然，在一个真实的员工表中，会有更多细节；这里我们只包含足以说明问题的内容。\n\
  \n具体来说，你会看到在`employees`表中有一个`supervisorid`列，它是引用同一张表的外键：\n\n```sql\nemployees.supervisorid\
  \ ➤ employees.id\n```\n\n一种更简单但错误的方法是：要么包含主管的姓名（这与在书籍表中包含作者姓名一样，原因相同，是错误的），要么引用另一个主管表（这出于一个更微妙的原因，也是错误的）。\n\
  \n对于书籍和作者，关键在于作者与书籍不是同一种事物。在一个设计良好的数据库中，每个表只包含一种类型的成员。但对于员工和主管来说，情况并非如此。简单来说，主管就是另一名员工。\n\
  \n我们将遍历`employees`表，以获取员工及其主管的列表。\n\n#### 获取单层层次结构\n\n不使用递归 CTE，你可以通过简单的`OUTER JOIN`到同一张表来获取员工的主管。这通常被称为`自连接`：\n\
  \n```sql\nSELECT\ne.id AS eid,\ne.givenname, e.familyname,\ns.id AS sid,\ns.givenname||'\
  \ '||s.familyname AS supervisor\n--  s.givenname+' '+s.familyname AS supervisor\
  \  --  MSSQL\nFROM employees AS e LEFT JOIN employees AS s\nON e.supervisorid=s.id\
  \                --  Oracle: 不用 AS\nORDER BY e.id;\n```\n\n你会得到类似这样的结果：\n\n| `eid`\
  \ | `givenname` | `familyname` | `sid` | `supervisor` |\n| --- | --- | --- | ---\
  \ | --- |\n| 1 | Marmaduke | Mayhem | 10 | Beryl Bubbles |\n| 2 | Osric | Pureheart\
  \ | 12 | Mildred Thisenthat |\n| 3 | Rubin | Croucher | [NULL] | [NULL] |\n| 4 |\
  \ Gladys | Raggs | 29 | Fred Nurke |\n| 5 | Cynthia | Hyphen-Smythe | 12 | Mildred\
  \ Thisenthat |\n| 6 | Sebastian | Trefether | 5 | Cynthia Hyphen-Smythe |\n| ~ 共\
  \ 34 行 ~ | | | | |\n\n关键在于，当将表与自身连接时，你需要为该表指定两个不同的别名来限定连接。\n\n\n### 使用递归 CTE 实现多级层级结构\n\
  \n我们真正需要的不只是直接上级，而是每位员工的所有上级组成的层级列表。这当然需要使用递归 CTE。\n\n锚定成员将是那些没有上级的员工，通常是位于层级结构顶端的人员：\n\
  \n```sql\nWITH RECURSIVE      --  MSSQL, Oracle: 不用 RECURSIVE\ncte(id, givenname,\
  \ familyname, supervisorid,\nsupervisors, n) AS (\n--  锚定成员\nSELECT\n    id, givenname,\
  \ familyname, supervisorid, '', 1\n    FROM employees WHERE supervisorid IS NULL\n\
  )\n```\n\n这些列包含部分原始详细信息，以及一个上级字符串。显然，对于锚定成员，上级 ID 将是`NULL`，字符串为空。你还会注意到一个从 1 开始的序列号。这是我们稍后会用到的一个技巧。\n\
  \n锚定成员可能有多行。这没关系，处理方式仍然相同。只是会启动多个序列。\n\n递归成员将是那些有上级的员工（即其余员工），其上级列表会逐渐增长：\n\n```sql\n\
  --  目前尚不支持 MSSQL 或 MariaDB/MySQL!\nWITH RECURSIVE  --  MSSQL, Oracle: 不用 RECURSIVE\n\
  cte(id, givenname, familyname, supervisorid,\nsupervisors, n) AS (\n--  锚定成员\n \
  \   SELECT\n        id, givenname, familyname, supervisorid, '', 1\n        FROM\
  \ employees WHERE supervisorid IS NULL\nUNION ALL\n--  递归成员：其他员工（supervisorid 不为\
  \ NULL）\n    SELECT\n        e.id, e.givenname, e.familyname, e.supervisorid,\n\
  \        cte.givenname||' '||cte.familyname||' < '||\n        cte.supervisors, n+1\n\
  \        FROM cte JOIN employees AS e ON cte.id=e.supervisorid\n        --  Oracle:\
  \ 不用 AS\n)\nSELECT * FROM cte\nORDER BY id;\n```\n\n这个连接类似于之前的自连接。当前员工在`e`表别名中引用，这个别名表与\
  \ CTE（代表上级）进行连接。原始数据来自别名表，而上级的详细信息则被拼接为新的`supervisors`参数。\n\n通常，你会希望用`WHERE`子句来限制递归。对于这个例子，连接本身就会完成这项工作，因为当没有更多可以连接的行时，它会自动停止。\n\
  \n关键在于`supervisors`字符串的表达式。在递归成员中，CTE 代表继承的值。\n\n| **id** | **givenname** | **familyname**\
  \ | **sid** | **supervisors** | **n** |\n| --- | --- | --- | --- | --- | --- |\n\
  | 1 | Marmaduke | Mayhem | 10 | Beryl Bubbles < Mildred Thisenth ... < | 3 |\n|\
  \ 2 | Osric | Pureheart | 12 | Mildred Thisenth ... < | 2 |\n| 3 | Rubin | Croucher\
  \ | [NULL] | [NULL] | 1 |\n| 4 | Gladys | Raggs | 29 | Fred Nurke < Murgatroyd Murdo\
  \ ... < Rubin Croucher < | 4 |\n| 5 | Cynthia | Hyphen-Smythe | 12 | Mildred Thisenth\
  \ ... < | 2 |\n| 6 | Sebastian | Trefether | 5 | Cynthia Hyphen-S ... < Mildred\
  \ Thisenth ... < | 3 |\n| ~ 共 34 行 ~ |\n\n这在大多数数据库管理系统中都有效，但目前还不支持 MSSQL 或 MariaDB/MySQL。不过，它已经`接近`能用了。\n\
  \n对于 MariaDB/MySQL，锚定成员中的`''`会导致它推断该字符串长度为零，因此`supervisors`列将为空。\n\n你需要在锚定成员中将空字符串转换（cast）为更长的字符串：\n\
  \n```sql\nSELECT\n    ..., cast('' AS char(255)), 1\n    FROM employees WHERE supervisorid\
  \ IS NULL\n```\n\nMySQL 的一个长期问题是，你不能转换为`varchar`，而是转换为`char`，而这个`char`与常规的`char`不同，它不是固定长度的，所以实际上还是`varchar`。没人知道为什么。在\
  \ MariaDB 中，他们允许使用`varchar`。长度`255`应该足够了。\n\nMSSQL 的情况更糟。自然，锚定成员和递归成员中的列应该在数据类型上匹配，但在\
  \ MSSQL 中，这种匹配需要非常精确。两者都是字符串类型还不够。字符串需要是相同类型和大小。拼接字符串会产生更长的字符串，MSSQL 会判定这些更长的字符串与其它字符串在数据上不兼容。\n\
  \n在这种情况下，你需要将*两个*表达式都转换为相同类型：\n\n```sql\nSELECT\n    ..., cast('' AS nvarchar(255)),\
  \ ...\n    FROM employees WHERE supervisorid IS NULL\nUNION ALL\nSELECT\n    ...,\n\
  \    cast(cte.givenname+' '+cte.familyname\n         +' < '+cte.supervisors as nvarchar(255)),\
  \ ...\n    FROM cte JOIN employees AS e ON cte.id=e.supervisorid\n```\n\n进行这些更改后，查询应该就能工作了。\n\
  \n### 清理列表末尾的多余字符\n\n你会注意到，除了空的`supervisors`字符串外，末尾还有一个`<`。这是因为在递归成员中总是添加了这个字符。\n\
  \n如果你查看`n`列，会发现它代表层级编号。这个字符应该只在已经存在另一个上级时才添加——也就是说，当我们正在添加第二个或后续的上级时。这意味着当`n`达到\
  \ 2 或更高时。\n\n我们可以通过使用`CASE ... END`表达式来修改这部分表达式：\n\n```sql\n--  其他数据库\ncte.givenname||'\
  \ '||cte.familyname\n||  CASE WHEN n>1 THEN ' < ' ELSE '' END\n    || cte.supervisors\n\
  ```\n\n这样会产生更清晰的结果：\n\n| **id** | **givenname** | **familyname** | **Sid** | **supervisors**\
  \ | **n** |\n| --- | --- | --- | --- | --- | --- |\n| 1 | Marmaduke | Mayhem | 10\
  \ | Beryl Bubbles < Mildred Thisenth ... | 3 |\n| 2 | Osric | Pureheart | 12 | Mildred\
  \ Thisenth ... | 2 |\n| 3 | Rubin | Croucher | [NULL] | [NULL] | 1 |\n| 4 | Gladys\
  \ | Raggs | 29 | Fred Nurke < Murgatroyd Murdo ... < Rubin Croucher | 4 |\n| 5 |\
  \ Cynthia | Hyphen-Smythe | 12 | Mildred Thisenth ... | 2 |\n| 6 | Sebastian | Trefether\
  \ | 5 | Cynthia Hyphen-S ... < Mildred Thisenth ... | 3 |\n| ~ 共 34 行 ~ |\n\n当然，我们不再需要最后的`n`列了。\n\
  \n\n## 处理表字面量\n\n在某些时候，您可能想要处理一组尚未保存到任何位置的值——例如一个虚拟表中的数据，该表会存在足够长的时间让您处理数据，然后在您完成后悄然消失。\n\
  \n从原理上讲，SQL 在将字面值插入表时一直都在这样做。例如，像下面这样的语句：\n\n```sql\nINSERT INTO table(columns)\n\
  VALUES ( ... ), ( ... ), ( ... );\n```\n\n就是从一个由 `VALUES` 子句生成的虚拟表中插入数据。这也意味着，从原理上讲，您应该能够将\
  \ `VALUES ...` 作为一个虚拟表来使用，而无需实际插入任何数据。不幸的是，事情并非如此简单。\n\n一个 `表字面量` 是一个表达式，其结果是一组行和列——即一个虚拟表。如果一切按计划进行，它可能看起来像这样：\n\
  \n```sql\nVALUES ('a','apple'), ('b','banana'), ('c','cherry')\n```\n\n并非所有的数据库管理系统（DBMS）都这样看待它。有些\
  \ DBMS 确实允许这样的表达式，但其他的则需要稍微复杂一点的写法。\n\n稍后，我们将需要使用一个虚拟表来进行实验，所以第一步是将其放入一个 `CTE`（公用表表达式）中。使用标准语法，您可以写：\n\
  \n```sql\n--  PostgreSQL, MariaDB (非 MySQL), SQLite\nWITH cte(id,value) AS (\n \
  \ VALUES ('a','apple'), ('b','banana'), ('c','cherry')\n)\nSELECT * FROM cte;\n\
  ```\n\n您将看到以下结果：\n\n| id | value |\n| --- | --- |\n| a | apple |\n| b | banana |\n\
  | c | cherry |\n\n请注意，我们已经将列名包含在了 `CTE` 的名称中。\n\n对于其他的 DBMS，有各种替代写法：\n\n```sql\n\
  --  MSSQL\nWITH cte(id,value) AS (\n  SELECT * FROM\n    (VALUES ('a','apple'),\
  \ ('b','banana'),\n      ('c','cherry')) AS sq(a,b)\n)\nSELECT * FROM cte;\n```\n\
  ```sql\n--  MySQL (非 MariaDB)\nWITH cte(id,value) AS (\n  VALUES ROW('a','apple'),\
  \ ROW('b','banana'),\n    ROW('c','cherry')\n)\nSELECT * FROM cte;\n```\n```sql\n\
  --  Oracle\nWITH cte(id,value) AS (\n  SELECT 'a','apple' FROM dual\n  UNION ALL\
  \ SELECT 'b','banana' FROM dual\n  UNION ALL SELECT 'c','cherry' FROM dual\n)\n\
  SELECT * FROM cte;\n```\n\n如您所见，最笨拙版本的“奖项”属于 Oracle，它还不支持一个恰当的 `表字面量`。显然，这个功能即将推出。\n\
  \n`MSSQL` 确实支持 `表字面量`，但出于某种未知的原因，它必须放在一个子查询内，并且必须有一个虚构的子查询名称和虚构的列名。\n\n`MySQL` 也支持\
  \ `表字面量`，但要求将每一行都放在一个 `ROW()` 构造器中，因为 `MySQL` 有一个非标准的 `values()` 函数，这与其简单地用作 `表字面量`\
  \ 相冲突。这是 `MariaDB` 和 `MySQL` 不同的情况之一。\n\n### 使用表字面量进行测试\n\n您可能想要使用一次性值的一个原因是，当您在测试某些东西，而又没有精力将测试值放入一个真实或临时表中时。\n\
  \n例如，假设您想测试计算日期之间的差值，比如计算年龄。您可以这样做：\n\n```sql\nWITH dates(dob,today) AS (\n  --\
  \  列表：出生日期和今日日期值\n)\nSELECT\n  --  今日日期 - 出生日期 AS 年龄\nFROM dates;\n```\n\n实际的代码被注释掉了，因为各个\
  \ DBMS 都有自己的方法。由于日期字面量的存在，这变得进一步复杂。\n\n我们将尝试使用以下一系列日期：\n\n| `dob` | `today` |\n\
  | --- | --- |\n| 1940-07-07 | 2023-01-01 |\n| 1943-02-25 | 2023-01-01 |\n| 1942-06-18\
  \ | 2023-01-01 |\n| 1940-10-09 | 2023-01-01 |\n| 1940-07-07 | 2022-12-31 |\n| 1943-02-25\
  \ | 2022-12-31 |\n| 1942-06-18 | 2022-12-31 |\n| 1940-10-09 | 2022-12-31 |\n| 1940-07-07\
  \ | 2023-07-07 |\n| 1943-02-25 | 2023-02-25 |\n| 1942-06-18 | 2023-06-18 |\n| 1940-10-09\
  \ | 2023-10-09 |\n\n（如果您认出了这些出生日期，请不要声张。）\n\n首先，您需要设置您的 `dates` `CTE`。这很复杂，因为在 SQL\
  \ 中，日期字面量是用单引号括起来的。然而，如果没有上下文，SQL 会将单引号字面量视为字符串，这无法用于日期计算。例外是 `SQLite`，它本来就只处理日期字符串。\n\
  \n`dates` `CTE` 看起来会像这样：\n\n```sql\n--  PostgreSQL, MariaDB (非 MySQL)\nWITH dates(dob,\
  \ today) AS (\n  VALUES\n    (date'1940-07-07',date'2023-01-01'),\n    ('1943-02-25','2023-01-01'),\n\
  \    ('1942-06-18','2023-01-01')\n    --  等等\n)\n```\n```sql\n--  MySQL (非 MariaDB)\n\
  WITH dates(dob, today) AS (\n  VALUES\n    row(date'1940-07-07',date'2023-01-01'),\n\
  \    row('1943-02-25','2023-01-01'),\n    row('1942-06-18','2023-01-01')\n    --\
  \  等等\n)\n```\n```sql\n--  MSSQL\nWITH dates(dob, today) AS (\n  SELECT * FROM (VALUES\n\
  \    (cast('1940-07-07' as date),\n      cast('2023-01-01' as date)),\n    ('1943-02-25','2023-01-01'),\n\
  \    ('1942-06-18','2023-01-01')\n    --  等等\n  ) AS sq(a,b)\n)\n```\n```sql\n--\
  \  SQLite\nWITH dates(dob, today) AS (\n  VALUES\n    ('1940-07-07','2023-01-01'),\n\
  \    ('1943-02-25','2023-01-01'),\n    ('1942-06-18','2023-01-01')\n    --  等等\n\
  )\n```\n```sql\n--  Oracle\nWITH dates(dob, today) AS (\n  SELECT date'1940-07-07',date'2023-01-01'\
  \ FROM dual\n  UNION ALL SELECT date'1943-02-25',date'2023-01-01'\n    FROM dual\n\
  \  UNION ALL SELECT date'1942-06-18',date'2023-01-01'\n    FROM dual\n    --  等等\n\
  )\n```\n\n请注意\n\n*   对于 `PostgreSQL`、`MariaDB/MySQL` 和 `Oracle`，您可以使用简单的表达式 `date'...'`\
  \ 将字面量解释为日期。\n*   对于 `PostgreSQL`、`MariaDB/MySQL` 和 `MSSQL`，仅需对第一行的字面量进行转换；SQL 会从那里理解您的意图。而\
  \ `Oracle` 则需要所有行都进行转换。\n\n现在您有了一个包含一组测试日期的虚拟表。您可以尝试您的年龄计算了：\n\n```sql\n--  PostgreSQL\n\
  WITH dates(dob, today) AS (\n  --  等等\n)\nSELECT\n  dob, today,\n  extract(year\
  \ from age(today,dob)) AS 年龄\nFROM dates;\n```\n```sql\n--  MariaDB/MySQL\nWITH\
  \ dates(dob, today) AS (\n  --  等等\n)\nSELECT\n  dob, today,\n  timestampdiff(year,dob,current_timestamp)\
  \ AS 年龄\nFROM dates;\n```\n```sql\n--  MSSQL\nWITH dates(dob, today) AS (\n  --\
  \  等等\n)\nSELECT\n  dob, today,\n  datediff(year,dob,today) AS 年龄\nFROM dates;\n\
  ```\n```sql\n--  SQLite\nWITH dates(dob, today) AS (\n  --  等等\n)\nSELECT\n  dob,\
  \ today,\n  cast(\n    strftime('%Y.%m%d', today) - strftime('%Y.%m%d', dob)\n \
  \   as int) AS 年龄\nFROM dates;\n```\n```sql\n--  Oracle\nWITH dates(dob, today)\
  \ AS (\n  --  等等\n)\nSELECT\n  dob, today,\n  trunc(months_between(today,dob)/12)\
  \ AS 年龄\nFROM dates;\n```\n\n我们已经在第 4 章中指出过 `MSSQL` 计算年龄时出错的问题，而这是您可以测试该问题的一种方法。\n\
  \n### 使用表字面量进行排序\n\n在第 5 章中，我们提到了对字符串值排序的问题。简而言之，对于本应按顺序排列的项目，按字母顺序排列很少是最佳方式。\n\n\
  例如，如果你有星期几的名称、月份的名称、彩虹的颜色，甚至是数字的名称（`\"One\"`、`\"Two\"`、`\"Three\"`等），将字符串按字母顺序排序只会让事情变得混乱。\n\
  \n在第 5 章中，我们通过依赖字符串位置取了巧。另一个更具弹性的解决方案是使用一个（虚拟的）值表及其正确位置。\n\n在第 8 章中，我们生成了一个按工作日统计的销售摘要：\n\
  \n```sql\nWITH\ndata AS (...)\nsummary AS (...)\nSELECT\nweekday_number, total,\n\
  100*total/sum(total) OVER()\nFROM weekday_number\nORDER BY weekday_number;\n```\n\
  \n问题是我们必须获取工作日编号才能正确排序。如果能使用工作日名称会更好。然后，我们可以使用一个额外的虚拟表来对名称进行排序。\n\n#### 使用工作日名称重新定义\
  \ data CTE\n\n首先，让我们用日期名称重做 `data` CTE：\n\n```sql\n--  PostgreSQL, Oracle\nWITH\
  \ data AS (\nSELECT to_char(ordered,'FMDay') AS weekday, total\nFROM sales\n)\n\
  --  MSSQL\nWITH data AS (\nSELECT datename(weekday,ordered) AS weekday, total\n\
  FROM sales\n)\n--  MariaDB/MySQL\nWITH data AS (\nSELECT date_format(ordered,'%W'),\
  \ total\nFROM sales\n)\n```\n\n你会注意到列表中没有包含 SQLite。这是因为它没有获取工作日名称的方法。如果你需要，你会想用到下一节的反向技术。\n\
  \n#### 按工作日名称分组\n\n`summary` CTE 现在将按工作日名称分组：\n\n```sql\nWITH\ndata AS (\nSELECT\n\
  ... AS weekday,\ntotal\nFROM sales\n),\nsummary AS (\nSELECT weekday, sum(total)\
  \ AS total\nFROM data\nGROUP BY weekday\n)\n--  等等\n```\n\n#### 创建用于工作日的表字面量\n\n\
  我们现在将需要一个包含星期几以及序列号的表字面量。\n\n| **序号** | **工作日** |\n| --- | --- |\n| 1 | 星期一 |\n\
  | 2 | 星期二 |\n| 3 | 星期三 |\n| 4 | 星期四 |\n| 5 | 星期五 |\n| 6 | 星期六 |\n| 7 | 星期日 |\n\n\
  ```sql\n--  PostgreSQL, MariaDB (非 MySQL), SQLite\nweekdays(sequence,weekday) AS\
  \ (\nVALUES (1,'星期一'),(2,'星期二')           --  等等\n)\n--  MySQL (非 MariaDB)\nweekdays(sequence,weekday)\
  \ AS (\nVALUES row(1,'星期一'), row(2,'星期二')    --  等等\n)\n--  MSSQL\nweekdays(sequence,weekday)\
  \ AS (\nSELECT * FROM (\nVALUES (1,'星期一'),(2,'星期二')       --  等等\n) AS sq(a,b)\n\
  )\n--  Oracle\nweekdays(sequence,weekday) AS (\nSELECT 1,'星期一' FROM dual\nUNION\
  \ ALL SELECT 2,'星期二' FROM dual      --  等等\n)\n```\n\n#### 连接并按序列号排序\n\n最后，要进行排序，你可以将\
  \ `summary` CTE 与 `weekdays` CTE 连接起来，并按序列号排序：\n\n```sql\nWITH\ndata AS ( ),\nsummary\
  \ AS ( ),\nweekdays(dob, today) AS ( )\nSELECT\nsummary.weekday, summary.total,\n\
  100*total/sum(summary.total) OVER()\nFROM summary JOIN weekdays\nON summary.weekday=weekdays.weekday\n\
  ORDER BY weekdays.sequence;\n```\n\n你应该会看到类似这样的结果：\n\n| **工作日** | **总销售额** | **占比**\
  \ |\n| --- | --- | --- |\n| 星期一 | 49304 | 15.081 |\n| 星期二 | 45156.5 | 13.813 |\n\
  | 星期三 | 45959.5 | 14.058 |\n| 星期四 | 47528 | 14.538 |\n| 星期五 | 42372.5 | 12.961 |\n\
  | 星期六 | 48415.5 | 14.81 |\n| 星期日 | 48182.22 | 14.738 |\n\n这项技术的一个优点是，你可以更改表字面量中的序列编号，例如，如果更适合你，可以从星期三开始。\n\
  \n顺便说一下，如果你需要经常按工作日或类似内容排序，最好将数据保存在永久的查找表中。\n\n### 使用表字面量作为查找表\n\n我们已经注意到 SQLite\
  \ 没有获取星期几名称的函数——只有日期编号。无论如何，你可能遇到其他情况，你所拥有的数据并不像你希望的那样友好或易于理解。\n\n一个解决方案是使用表字面量作为查找表。\n\
  \n例如，`vip` 表有一个状态级别，值为 1、2 或 3。你应该意识到它分别代表金卡、银卡和铜卡。在这里，我们将使用表字面量来实现这一点。\n\n####\
  \ 创建包含状态名称的 CTE\n\n首先，我们将开发一个包含状态名称的 CTE：\n\n```sql\n--  PostgreSQL, MariaDB (非\
  \ MySQL), SQLite\nWITH statuses(status,name) AS (\nVALUES (1,'金卡'),(2,'银卡'),(3,'铜卡')\n\
  )\n--  MySQL (非 MariaDB)\nWITH statuses(status,name) AS (\nVALUES row(1,'金卡'),row(2,'银卡'),row(3,'铜卡')\n\
  )\n--  MSSQL\nWITH statuses(status,name) AS (\nSELECT * FROM (\nVALUES (1,'金卡'),(2,'银卡'),(3,'铜卡')\n\
  ) AS sq(a,b)\n)\n--  Oracle\nWITH statuses(status,name) AS (\nSELECT 1,'金卡' FROM\
  \ DUAL\nUNION ALL SELECT 2,'银卡' FROM DUAL\nUNION ALL SELECT 3,'铜卡' FROM DUAL\n)\n\
  ```\n\n#### 将 CTE 连接到 customers 和 vip 表\n\n我们现在可以将 CTE 连接到 `customers` 和 `vip` 表：\n\
  \n```sql\nWITH statuses(status,name) AS (\n--  等等\n)\nSELECT *\nFROM\ncustomers\n\
  LEFT JOIN vip ON customers.id=vip.id\nLEFT JOIN statuses ON vip.status=statuses.status\n\
  ;\n```\n\n同样，好处在于你可以动态地更改状态名称。\n\n你也可以对作者和客户的性别做类似的事情。使用这项技术，你还可以做的一件事是从一组名称翻译到另一组名称。\n\
  \n你可能想知道为什么我们不在表本身中包含性别或贵宾状态的全名。记住，你应该只记录一次数据，并且它应该是尽可能简单的版本。将值存储为单个字符（如性别）或整数（如贵宾状态），可以减少数据错误或差异的可能性，并且你可以在需要时将其拼写出来。\n\
  \n\n## 字符串分割技术详解\n\n### 分割字符串\n\n如果你有勇气去查看生成数据库的脚本，会在末尾找到两个递归 CTE：\n\n```\n--  填充流派表\n\
  INSERT INTO genres(genre)\nWITH split(bookid,genre,rest,genres) AS (\n...\n)\nSELECT\
  \ DISTINCT genre\nFROM split\nWHERE split.genre IS NOT NULL;\n--  填充书籍流派表\nINSERT\
  \ INTO bookgenres(bookid,genreid)\nWITH split(bookid,genre,rest,genres) AS (\n...\n\
  )\nSELECT split.bookid,genres.id\nFROM split JOIN genres ON split.genre=genres.genre\n\
  WHERE split.genre IS NOT NULL;\n```\n\n原因纯粹是出于实用考虑。存在数千个书籍-流派组合，与其直接导出`bookgenres`表，不如将组合的流派编码到一个表中，然后使用递归\
  \ CTE 来拆分，这样更为方便。将流派保持组合状态是错误的，原因正如第 3 章所讨论的那样。\n\n接下来，我们将通过拆分几个示例字符串来了解这个过程是如何工作的。\n\
  \n首先，我们取一个简单的字符串并将其放入表字面量中。目前，它将是一个包含逗号分隔值的简单字符串。稍后，它会变得更复杂。\n\n```\n--  PostgreSQL,\
  \ SQLite, MariaDB (非 MySQL)\nWITH\ncte(fruit) AS (\nVALUES ('Apple,Banana,Cherry,Date,\n\
  Elderberry,Fig')\n),\n--  MySQL (非 MariaDB)\nWITH\ncte(fruit) AS (\nVALUES row('Apple,Banana,Cherry,Date,\n\
  Elderberry,Fig')\n),\n--  MSSQL\nWITH\ncte(fruit) AS (\nSELECT *\nFROM (VALUES ('Apple,Banana,Cherry,Date,\n\
  Elderberry,Fig')) AS sq(a)\n),\n--  Oracle\nWITH\ncte(fruit) AS (\nSELECT 'Apple,Banana,Cherry,Date,\n\
  Elderberry,Fig' FROM dual\n),\n```\n\n为了使代码可读，字符串被拆分在两行上。*在你的实际代码中不要这样做！*\n\n有些\
  \ DBMS 不喜欢内部有换行的字符串字面量。对于那些接受换行的情况，它将成为数据的一部分，而我们并不希望如此。\n\n务必在一行上书写字符串，即使它很长。\n\
  \n对于递归 CTE，我们将构建两个值：单个项目和一个包含原始字符串剩余部分的字符串。该 CTE 可以称为`split`：\n\n```\nWITH\ncte(fruit)\
  \ AS (),\nsplit(fruit, rest) AS (\n)\n```\n\n锚点成员将从字符串中获取第一个项目（直到逗号），以及逗号之后剩余的部分：\n\
  \n```\nWITH\ncte(fruit) AS (),\n--  PostgreSQL\nsplit(fruit, rest) AS (\nSELECT\n\
  substring(fruit,0,position(',' in fruits)),\nsubstring(fruit,position(',' in fruits)+1)||','\n\
  FROM cte\n)\n--  MariaDB, MySQL\nsplit(fruit, rest) AS (\nSELECT\nsubstring(fruit,1,position(','\
  \ in fruits)-1),\nsubstring(fruit,position(',' in fruits)+1)||','\nFROM cte\n)\n\
  --  MSSQL\nsplit(fruit, rest) AS (\nSELECT\ncast(substring(fruit,0,charindex(',',fruits))\
  \ as varchar(255)),\ncast(substring(fruit,charindex(',',fruits)+1,255)+',' as varchar(255))\n\
  FROM cte\n)\n--  SQLite\nsplit(fruit, rest) AS (\nSELECT\nsubstring(fruit,0,instr(fruits,',')),\n\
  substring(fruit,instr(fruits,',')+1)||','\nFROM cte\n)\n--  Oracle\nsplit(fruit,\
  \ rest) AS (\nSELECT\nsubstr(fruit,1,instr(fruits,',')-1),\nsubstr(fruit,instr(fruits,',')+1)||','\n\
  FROM cte\n)\n```\n\n注意，对于`MSSQL`，我们不得不将计算转换为`varchar(255)`，这是由于字符串兼容性方面的一个特性。\n\n\
  对于递归成员，我们使用`rest`值。首先，我们获取到第一个逗号之前的字符串，成为`fruit`值。然后，我们获取从逗号开始的剩余字符串，成为`rest`的新值：\n\
  \n```\nWITH\ncte(fruit) AS (),\n--  PostgreSQL\nsplit(fruit, rest) AS (\nSELECT\
  \ ...\nUNION\nSELECT\nsubstring(rest,0,position(',' in rest)),\nsubstring(rest,position(','\
  \ in rest)+1)\nFROM cte WHERE rest''\n)\n--  MariaDB, MySQL\nsplit(fruit, rest)\
  \ AS (\nSELECT ...\nUNION\nSELECT\nsubstring(rest,1,position(',' in rest)-1),\n\
  substring(rest,position(',' in rest)+1)\nFROM cte WHERE rest''\n)\n--  MSSQL\nsplit(fruit,\
  \ rest) AS (\nSELECT ...\nUNION ALL\nSELECT\nsubstring(rest,0,charindex(',', rest)),\n\
  substring(rest,charindex(',', rest)+1,255)\nFROM cte WHERE rest''\n)\n--  SQLite\n\
  split(fruit, rest) AS (\nSELECT ...\nUNION\nSELECT\nsubstring(rest,0,instr(rest,',')),\n\
  substring(rest,instr(rest,',')+1)\nFROM cte WHERE rest''\n)\n--  Oracle\nsplit(fruit,\
  \ rest) AS (\nSELECT ...\nUNION ALL\nSELECT\nsubstr(rest,1,instr(rest,',')-1),\n\
  substr(rest,instr(rest,',')+1)\nFROM cte WHERE rest''\n)\n```\n\n注意，这次我们没有向`rest`值添加逗号：那只是为了启动递归。\n\
  \n我们还在`FROM`子句中添加了`WHERE rest<>''`。这是因为当字符串没有更多内容可供搜索时，我们需要停止递归。\n\n你现在可以尝试一下：\n\
  \n```\nWITH\ncte(fruit) AS (),\nsplit(fruit,rest) AS ()\nSELECT * FROM split;\n\
  ```\n\n你现在应该看到以下内容：\n\n| **水果** | **剩余部分** |\n| --- | --- |\n| Apple | Banana,Cherry,Date,Elderberry,Fig,\
  \ |\n| Banana | Cherry,Date,Elderberry,Fig, |\n| Cherry | Date,Elderberry,Fig, |\n\
  | Date | Elderberry,Fig, |\n| Elderberry | Fig, |\n| Fig | [NULL] |\n\n当然，我们不需要在输出中看到`rest`值：它只是为了让你看到它的处理过程。\n\
  \n\n\n### 拆分更复杂的数据\n\n到目前为止，我们只拆分了一个简单的字符串。我们可以对更复杂的数据集执行相同的操作。这里，我们将使用一个包含三行两列的\
  \ CTE：\n\n| **名称 (name)** | **列表 (list)** |\n| --- | --- |\n| colours | Red,Orange,Yellow,Green,Blue,Indigo,Violet\
  \ |\n| elements | Hydrogen,Helium,Lithium,Beryllium,Boron,Carbon |\n| numbers |\
  \ One,Two,Three,Four,Five,Six,Seven,Eight,Nine |\n\n好消息是，这个过程几乎相同。\n\n首先，我们将使用表字面量创建一个\
  \ CTE：\n\n```sql\n--  PostgreSQL, SQLite, MariaDB (非 MySQL)\nWITH\ncte(name, items)\
  \ AS (\nVALUES\n('colours','Red,Orange,...,Indigo,Violet'),\n('elements','Hydrogen,Helium,...,Carbon'),\n\
  ('numbers','One,Two,...,Eight,Nine')\n),\n--  MySQL (非 MariaDB)\nWITH\ncte(name,\
  \ items) AS (\nVALUES\nrow('colours','Red,Orange,...,Indigo,Violet'),\nrow('elements','Hydrogen,Helium,...,Carbon'),\n\
  row('numbers','One,Two,...,Eight,Nine')\n),\n--  MSSQL\nWITH\ncte(name, items) AS\
  \ (\nSELECT *\nFROM (\nVALUES\n('colours','Red,Orange,...,Indigo,Violet'),\n('elements','Hydrogen,Helium,...,Carbon'),\n\
  ('numbers','One,Two,...,Eight,Nine')\n) AS sq(a,b)\n),\n--  Oracle\nWITH\ncte(name,\
  \ items) AS (\nSELECT 'colours','Red,Orange,...,Indigo,Violet'\nFROM dual\nUNION\
  \ ALL SELECT 'elements','Hydrogen,...,Carbon'\nFROM dual\nUNION ALL SELECT 'numbers','One,Two,...,Eight,Nine'\n\
  FROM dual\n),\n```\n\n（我们显然为了页面美观而缩写了列表。）\n\n对于锚点成员，我们以与之前相同的方式开始，但会包含列表的 `name`。它不会参与拆分，但对输出很有用。\n\
  \n```sql\nWITH\ncte(name, items) AS (),\n--  PostgreSQL\nsplit(name, item, rest)\
  \ AS (\nSELECT\nname,\nsubstring(items,0,position(',' in items)),\nsubstring(items,position(','\
  \ in items)+1)||','\nFROM cte\n)\n--  MariaDB, MySQL\nsplit(name, list, rest) AS\
  \ (\nSELECT\nname,\nsubstring(items,1,position(',' in items)-1),\nsubstring(items,position(','\
  \ in items)+1)||','\nFROM cte\n)\n--  MSSQL\nsplit(name, list, rest) AS (\nSELECT\n\
  name,\ncast(substring(items,0,charindex(',', items)) as varchar(255)),\nsubstring(items,charindex(',',\
  \ items)+1,255)+','\nFROM cte\n)\n--  SQLite\nsplit(name, list, rest) AS (\nSELECT\n\
  name,\nsubstring(items,0,instr(items,',')),\nsubstring(items,instr(items,',')+1)||','\n\
  FROM cte\n)\n--  Oracle\nsplit(name, list, rest) AS (\nSELECT\nname,\nsubstr(items,1,instr(items,',')-1),\n\
  substr(items,instr(items,',')+1)||','\nFROM cte\n)\n```\n\n至于递归成员，同样遵循相同的思路，并包含了\
  \ `name` 值：\n\n```sql\nWITH\ncte(name, items) AS (),\n--  PostgreSQL\nsplit(name,\
  \ list, rest) AS (\nSELECT ...\nUNION\nSELECT\nname,\nsubstring(rest,0,position(','\
  \ in rest)),\nsubstring(rest,position(',' in rest)+1)\nFROM cte WHERE rest''\n)\n\
  --  MariaDB, MySQL\nsplit(name, list, rest) AS (\nSELECT ...\nUNION\nSELECT\nname,\n\
  substring(rest,1,position(',' in rest)-1),\nsubstring(rest,position(',' in rest)+1)\n\
  FROM cte WHERE rest''\n)\n--  MSSQL\nsplit(name, list, rest) AS (\nSELECT ...\n\
  UNION ALL\nSELECT\nname,\ncast(substring(rest,0,charindex(',', rest)) as varchar(255)),\n\
  substring(rest,charindex(',', rest)+1,255)\nFROM cte WHERE rest''\n)\n--  SQLite\n\
  split(name, list, rest) AS (\nSELECT ...\nUNION\nSELECT\nname,\nsubstring(rest,0,instr(rest,',')),\n\
  substring(rest,instr(rest,',')+1)\nFROM cte WHERE rest''\n)\n--  Oracle\nsplit(name,\
  \ list, rest) AS (\nSELECT ...\nUNION ALL\nSELECT\nname,\nsubstr(rest,1,instr(rest,',')-1),\n\
  substr(rest,instr(rest,',')+1)\nFROM cte WHERE rest''\n)\n```\n\n我们现在可以对此进行测试：\n\
  \n```sql\nWITH\ncte(name, items) AS ()\nsplit(name, item, rest) AS ()\nSELECT *\n\
  FROM split\nORDER BY name, item;\n```\n\n当一切顺利运行时，您应该会看到类似以下的结果：\n\n| **名称 (name)**\
  \ | **项目 (item)** | **剩余 (rest)** |\n| --- | --- | --- |\n| colours | Blue | Indigo,Violet,\
  \ |\n| colours | Green | Blue,Indigo,Violet, |\n| colours | Indigo | Violet, |\n\
  | colours | Orange | Yellow,Green,Blue,Indigo,Violet, |\n| colours | Red | Orange,Yellow,Green,Blue,Indigo,Violet,\
  \ |\n| colours | Violet | [NULL] |\n| colours | Yellow | Green,Blue,Indigo,Violet,\
  \ |\n| elements | Beryllium | Boron,Carbon, |\n| elements | Boron | Carbon, |\n\
  | elements | Carbon | [NULL] |\n| elements | Helium | Lithium,Beryllium,Boron,Carbon,\
  \ |\n| elements | Hydrogen | Helium,Lithium,Beryllium,Boron,Carbon, |\n| elements\
  \ | Lithium | Beryllium,Boron,Carbon, |\n| numbers | Eight | Nine, |\n| numbers\
  \ | Five | Six,Seven,Eight,Nine, |\n| numbers | Four | Five,Six,Seven,Eight,Nine,\
  \ |\n| numbers | Nine | [NULL] |\n| numbers | One | Two,Three,Four,Five,Six,Seven,Eight,Nine,\
  \ |\n| numbers | Seven | Eight,Nine, |\n| numbers | Six | Seven,Eight,Nine, |\n\
  | numbers | Three | Four,Five,Six,Seven,Eight,Nine, |\n| numbers | Two | Three,Four,Five,Six,Seven,Eight,Nine,\
  \ |\n\n如您所见，递归 CTE 能够处理多行数据。\n\n"
- '# 总结


  在本章中，我们仔细研究了如何使用**公共表表达式**。公共表表达式生成一个虚拟表，您可以稍后在主查询中使用它。过去，您会在 `FROM` 子句中使用子查询来应付。


  您会使用 CTE 或 `FROM` 子查询的原因是，您可能需要准备数据，但又不想麻烦地将其保存在视图或临时表中。CTE 比临时表更短暂，因为它们根本不会被保存。


  与 `FROM` 子查询相比，CTE 有一些优势：


  *   您在 CTE 使用前就定义它，使查询更易读、更易于管理。

  *   您可以简单地链接多个相互依赖或独立的 CTE。如果您想使用 `FROM` 子查询来实现这一点，就必须嵌套它们，这很快就会变得难以处理。

  *   CTE 可以是递归的，因此您可以用它们来迭代数据。


  ### 简单的 CTE


  CTE 最简单的用途是为后续处理准备数据。一些用途包括：


  *   定义一组常量值，可以是字面值或计算值。

  *   准备聚合数据，以便与非聚合查询结合使用。


  ### 参数名称


  CTE 期望为每一列提供一个名称或别名。您可以在 CTE 内部定义这些名称，也可以将它们作为 CTE 定义的一部分来定义。


  ### 多个 CTE


  一些查询涉及多个步骤。这些步骤可以通过链接多个 CTE 来实现。


  ### 递归 CTE


  递归 CTE 是指引用自身的 CTE。它可以用于迭代一组数据。


  递归 CTE 的一些用途包括：


  *   生成一系列值。

  *   通过自连接遍历层次结构。

  *   将字符串拆分为更小的部分。


  ## 后续内容


  到目前为止，我们已经处理了多个重要的核心概念。在下一章中，我们将了解一些额外的技术，您可以用它们来更智能地处理数据库：


  *   **触发器 (Triggers)** 允许您在数据发生某些变化时自动执行流程。

  *   **数据透视表 (Pivot tables)** 本质上是二维聚合查询。

  *   **变量 (Variables)** 允许您在操作过于复杂时保存中间值。


