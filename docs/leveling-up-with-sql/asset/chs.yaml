- "# 4. 处理计算数据\n\n毫无疑问，你之前一定见过计算。SQL 允许你在查询中包含计算数据。\n\n在本章中，我们将探讨关于不同类型数据及其计算方式的一些重要概念。\n\
  \n不要过度沉迷于在 SQL 中进行计算。数据库更关心的是维护和访问原始数据。然而，能够将你的原始数据转化为对当前任务更有用的形式，是很有帮助的。\n\n不同的数据库管理系统在执行计算的能力上差异很大。尤其是在函数方面，它们不仅在功能范围上有所不同，甚至在数据库管理系统对它们的称呼上也不一样。\n\
  \n特别是，SQLite 执行计算的能力非常有限，尤其是在函数方面。\n\n在本章中，我们将处理各种类型的数据，包括字符串。如果你使用的是 MariaDB/MySQL，我们强烈建议你会话设置为\
  \ ANSI 模式，这样字符串的行为就能与标准 SQL 保持一致。\n\n你可以用 `SET SESSION sql_mode = 'ANSI';` 来开始你的会话。\n\
  \n## 计算基础\n\n我们稍后会看更多细节，但这里概述一下 SQL 中计算的工作原理。\n\n你可以基于单个列或多个列来计算值。例如：\n\n```sql\n\
  SELECT\n    height/2.54,                       --  单列\n    givenname||' '||familyname\
  \         --  多列\n    --  givenname+' '+familyname       --  MSSQL\nFROM customers;\n\
  ```\n\n这会得到：\n\n| **?column?** | **?column?** |\n| --- | --- |\n| 66.339 | May Knott\
  \ |\n| 67.283 | Rick Shaw |\n| 60.236 | Ike Andy |\n| ~ 303 行 ~ |\n\n你也可以“硬编码”值或从子查询中获取它们：\n\
  \n```sql\nSELECT\n    'active',                   --  硬编码\n    (SELECT name FROM\
  \ towns WHERE id=townid)  --  子查询\nFROM customers;\n```\n\n你会得到：\n\n| **?column?**\
  \ | **?column?** |\n| --- | --- |\n| active | Kings Park |\n| active | Richmond\
  \ |\n| ~ 303 行 ~ |\n\n还有一些内置函数：\n\n```sql\nSELECT\n    upper(familyname)       \
  \   --  大写函数\nFROM customers;\n```\n\n这会得到：\n\n| **?column?** |\n| --- |\n| KNOTT\
  \ |\n| SHAW |\n| ~ 303 行 ~ |\n\n在所有情况下，你会注意到计算值都没有一个合适的名称。\n\n### 使用别名\n\n计算列给 SQL\
  \ 带来了一个小麻烦。通常，每一列都应该有一个唯一的名称，但 SQL 不清楚该如何称呼新生成的列。\n\n有些 SQL 客户端会让计算列保持无名，而有些则会生成一个虚拟名。在尝试简单的\
  \ `SELECT` 语句时，这没问题，但当要认真对待该语句时（例如，你计划稍后使用其结果），你就需要为每一列指定一个更好的名称。\n\n**别名** 是列的新名称，无论它是计算列还是原始列。你使用\
  \ `AS` 关键字来创建别名。例如：\n\n```sql\nSELECT\n    id AS customer,\n    height/2.54 AS height,\n\
  \    givenname||' '||familyname AS fullname,\n    --  givenname+' '+familyname AS\
  \ fullname    --  MSSQL\n    'active' AS status,\n    (SELECT name FROM towns WHERE\
  \ id=townid) AS town,\n    length(email) AS length\n    --  len(email) AS length\
  \           --  MSSQL\nFROM customers;\n```\n\n这样看起来好多了：\n\n| **customer** | **Height**\
  \ | **fullname** | **status** | **town** | **length** |\n| --- | --- | --- | ---\
  \ | --- | --- |\n| 42 | 66.339 | May Knott | active | Kings Park | 23 |\n| 459 |\
  \ 67.283 | Rick Shaw | active | Richmond | 24 |\n| ~ 303 行 ~ |\n\n注意：\n- `id` 列即使没有被计算，也被设置了别名。\n\
  - `height` 计算被别名为 `height`；这没问题，因为它仍然表示相同的意思，只是单位不同。\n\n除了每个计算列必须有唯一名这一事实外，包含别名的其他原因如下：\n\
  - 有时，你只是需要重命名列，以获得更好的含义或适应后续使用。\n- 有时，你需要将列格式化或转换为更合适的形式，但仍希望保留其原始名称。\n\n此时，我们并不关心前面的别名是否是列的最佳名称；我们只是看看它们是如何工作的。\n\
  \n#### 别名名称\n\n总的来说，别名名称的规则与列名的规则相同。这意味着：\n- 别名和原始列名必须是唯一的。\n- 别名不应包含空格，不能以数字开头，也不能包含其他特殊字符。\n\
  - 别名不应是 SQL 关键字。\n\n如果你确实需要绕过上面第二和第三条规则，你可以将别名用双引号括起来。例如：\n\n```sql\nSELECT\n  \
  \  ordered AS \"order\",\n    shipped AS \"shipped date\"\nFROM sales;\n```\n\n\
  这里，名称 `order` 是一个 SQL 关键字，而 `shipped date` 包含一个空格。\n\n| **Order** | **shipped date**\
  \ |\n| --- | --- |\n| 2022-05-15 21:12:07.988741 | 2022-05-23 |\n| 2022-05-16 03:03:16.065969\
  \ | 2022-05-24 |\n| ~ 5549 行 ~ |\n\n你应该克制这样做的冲动。别名，如同列名，是为了技术用途而非美观。`SELECT` 语句实际上不是报表。\n\
  \n有些数据库管理系统为特殊名称提供了双引号的替代方案：\n- Microsoft SQL 提供方括号作为替代：`[shipped date]`。没有理由更倾向于使用它而不是双引号。\n\
  - MySQL/MariaDB 使用“反引号”作为替代：`` `shipped date` ``。在 ANSI 模式下，这是不必要的，但在传统模式下，你只能用这个。\n\
  \n无论你选择什么名称，请记住它们应该是纯粹功能性的。不要试图使用大小写、空格或其他可能看起来更好的东西。那是处理查询输出的软件的事情。在 SQL 中，你只需要一个合适的名称来引用数据。\n\
  \n#### AS 是可选的\n\n你很快就会发现 `AS` 是可选的：\n\n```sql\nSELECT\n    id customer,\n    height/2.54\
  \ height,\n    givenname||' '||familyname fullname,\n    --  givenname+' '+familyname\
  \ fullname   --  MSSQL\n    'active' status,\n    (SELECT name FROM towns WHERE\
  \ id=townid) town,\n    length(email) length\n    --  len(email) length        \
  \ --  MSSQL\nFROM customers;\n```\n\n有些开发者认为省略 `AS` 可以节省时间或让他们看起来更专业。然而，你很快也会犯这种错误：\n\
  \n```sql\nSELECT\n    id,\n    email\n    givenname, familyname,\n    height,\n\
  \    dob\nFROM customers;\n```\n\n这会给你一个令人困惑的结果：\n\n| **id** | **givenname** | **familyname**\
  \ | **height** | **dob** |\n| --- | --- | --- | --- | --- |\n| 42 | may.knott61@example.net\
  \ | Knott | 168.5 | [NULL] |\n| 459 | rick.shaw459@example.net | Shaw | 170.9 |\
  \ 1945-07-03 |\n| ~ 303 行 ~ |\n\n乍一看，这似乎没问题，因为它没有技术错误。然而，仔细检查后，你会发现 `email` 被别名为了\
  \ `givenname`，因为它们之间没有逗号。将一列别名为另一列是合法的，尽管你并不经常真正想这么做。\n\n你无法阻止 SQL 允许这种做法，但如果你养成一个总是用\
  \ `AS` 来指定别名的模式，就能让这类错误更容易被发现。\n\n\n#### 别名在查询后续部分不可用\n\n回顾基础 SQL 子句的处理顺序：\n\n1.\
  \  `FROM`\n2.  `WHERE`\n3.  `GROUP BY`\n4.  `HAVING`\n5.  `SELECT`\n6.  `ORDER BY`\n\
  \n这与你编写 SQL 的方式不同，因为你*先写* `SELECT` 子句。\n\n这在下面这样的语句中会造成主要混淆点：\n\n```sql\nSELECT\
  \ id, title, price, price*0.1 AS tax\nFROM books\nWHERE tax<1.5;\n```\n\n这将导致错误，因为尽管\
  \ `price*0.1 AS tax` 表达式写在第一个子句中，但它实际上在 `WHERE` 子句之后才被处理。因此，`tax` 在 `WHERE` 子句中尚不可用。\n\
  \n如果你将计算结果别名为原始列名，情况会变得更令人困惑：\n\n```sql\nSELECT\nid, title,\nprice*1.1 AS price\
  \  -- 调整以含税\nFROM books\nWHERE price<15;\n```\n\n这将生效。这里，`price` 被增加以包含税，并被别名为原始名称，这是合法的。\n\
  \n| **id** | **书名** | **price** |\n| --- | --- | --- |\n| 2078 | The Duel | 13.75\
  \ |\n| 1530 | Robin Hood, The Prince of Thieves | 13.75 |\n| 982 | Struwwelpeter:\
  \ Fearful Stories and Vile Pictures … | 12.65 |\n| 573 | The Nose | 11 |\n| 1573\
  \ | Rachel Ray | 11 |\n| 532 | Elective Affinities | 12.65 |\n| ~ 521 行 ~ |\n\n\
  然而，`WHERE` 子句将基于*原始* `price` 列进行过滤，*而不是*调整后的版本。\n\n同样，你对此直接能做的并不多，因为你不能选择将 `SELECT`\
  \ 子句写在更靠后的位置，也不能在其他任何子句中创建别名。\n\n稍后，我们将看到使用公共表表达式如何有助于预处理计算列。\n\n如果你计划稍后使用某个计算结果，将其别名为原始列名可能不是一个好主意。\n\
  \nSQL 对如何处理别名有清晰的规定，但人类读者很可能会感到困惑。\n\n### 处理 NULL 值\n\n迟早，你会在计算中遇到可怕的 `NULL`。实际上，`NULL`\
  \ 本身并没有问题，但它会彻底搞乱你的计算。\n\n任何涉及 `NULL` 的计算结果都将是 `NULL`。可以说 `NULL` 对于计算极具破坏性。除非你将数据通过一个或两个能够处理\
  \ `NULL` 的表达式。\n\nOracle 字符串是例外。Oracle 将 `NULL` 字符串视为空字符串。一方面，这很方便；另一方面，有时你确实需要\
  \ `NULL` 的行为像 `NULL`。\n\n如果你正在对包含 `NULL` 的单个列进行计算，结果也是 `NULL` 是合理的。例如：\n\n```sql\n\
  SELECT\nid, givenname, familyname,\nheight/2.54 AS height       -- 有时为 NULL\nFROM\
  \ customers;\n```\n\n有时你会得到 `NULL` 结果：\n\n| **id** | **Givenname** | **familyname**\
  \ | **height** |\n| --- | --- | --- | --- |\n| 101 | Artie | Chokes | 63.858 |\n\
  | 489 | Justin | Case | [NULL] |\n| 59 | Leigh | Don | 66.693 |\n| 593 | Luke |\
  \ Warm | [NULL] |\n| 170 | Dan | Dee | 65.039 |\n| 541 | Neil | Downe | 64.606 |\n\
  | ~ 303 行 ~ |\n\n由于我们所做的只是转换单个值，因此将 `NULL` 保留原样是完全可接受的——如果你不知道身高（厘米），那么你仍然不知道它（英寸）。然而，我们很快会看到，有时你可能用你觉得更好的值替换\
  \ `NULL`。\n\n另一方面，如果你在多个列上进行计算，且其中大多数不是 `NULL`，这种行为会变得更加麻烦：\n\n```sql\nSELECT\n\
  id, givenname, othernames, familyname,\ngivenname||' '||othernames||' '||familyname\
  \ AS fullname\n--  MSSQL:\n--  givenname+' '+othernames+' '+familyname AS fullname\n\
  FROM authors;\n```\n\n除了 Oracle，你会得到很多 `NULL`：\n\n| **id** | **givenname** | **Othernames**\
  \ | **familyname** | **fullname** |\n| --- | --- | --- | --- | --- |\n| 464 | Ambrose\
  \ | [NULL] | Bierce | [NULL] |\n| 858 | Alexander | [NULL] | Ostrovsky | [NULL]\
  \ |\n| 525 | Francis | [NULL] | Beaumont | [NULL] |\n| 479 | C.E. | Van | Koetsveld\
  \ | C.E. van Koetsveld |\n| 703 | Friedrich | [NULL] | Engels | [NULL] |\n| ~ 488\
  \ 行 ~ |\n\n在前面的例子中，大多数作者没有 `othernames` 的值，因此它是 `NULL`。有些甚至没有 `givenname` 值。大多数情况下，`givenname`\
  \ 或 `familyname` 没问题，但 `othernames` 的 `NULL` 毁掉了整个计算。\n\n然而，在 Oracle 中，你不会得到 `NULL`。但是，你会在缺失名字的位置看到额外的空格。\n\
  \n从技术上讲，结果是正确的。如果你不知道某些名字，那么你就不知道全名。然而，这没有帮助。\n\n#### Coalesce\n\nSQL 有一个名为 `coalesce()`\
  \ 的函数，可以用首选的替代值替换 `NULL`。单词 “coalesce” 实际上意味着合并，但它如何成为此操作的名称是那些在古代历史深处丢失的谜团之一。\n\
  \n该函数这样使用：\n\n```sql\ncoalesce(expression,planB)\n```\n\n如果前面的 `expression` 恰好是\
  \ `NULL`，则将使用 `planB`。\n\n你可以有多个替代值：\n\n```sql\ncoalesce(expression,planB,planC,\
  \ ... , planZ)\n```\n\n如果 `planB` 也恰好是 `NULL`，`coalesce()` 将尝试下一个替代值，依此类推，直到找到实际值，或者替代值用尽。\n\
  \n你可以在缺失的电话号码上看到 `coalesce` 的实际应用：\n\n```sql\nSELECT\nid, givenname, familyname,\n\
  phone\nFROM employees;\n```\n\n在 `employees` 表中，有些人缺失电话号码。\n\n| **id** | **Givenname**\
  \ | **familyname** | **phone** |\n| --- | --- | --- | --- |\n| 7 | Ebenezer | Splodge\
  \ | 0491577644 |\n| 4 | Gladys | Raggs | 0491573087 |\n| 28 | Cornelius | Eversoe\
  \ | [NULL] |\n| 32 | Clarisse | Cringinghut | 0491571804 |\n| 33 | Will | Power\
  \ | 0491576398 |\n| 26 | Fred | Kite | 0491572983 |\n| ~ 34 行 ~ |\n\n将这些缺失的电话号码替换为公司的总机号码是合理的：\n\
  \n```sql\nSELECT\nid, givenname, familyname,\ncoalesce(phone,'1300975711')  -- 合并至总机号码\n\
  FROM employees;\n```\n\n这里，缺失的号码已被合并：\n\n| **id** | **Givenname** | **familyname**\
  \ | **coalesce** |\n| --- | --- | --- | --- |\n| 7 | Ebenezer | Splodge | 0491577644\
  \ |\n| 4 | Gladys | Raggs | 0491573087 |\n| 28 | Cornelius | Eversoe | 1300975711\
  \ |\n| 32 | Clarisse | Cringinghut | 0491571804 |\n| 33 | Will | Power | 0491576398\
  \ |\n| 26 | Fred | Kite | 0491572983 |\n| ~ 34 行 ~ |\n\n关于 `coalesce()` 的问题是，你并不总能蒙混过关。你需要确保你的替代有意义，并且你的猜测是个好猜测。有很多时候它没有意义，例如一本书缺失的价格或作者的出生日期；`NULL`\
  \ 通常是你能做的最好的事情。\n\n在第 2 章中，你使用 `coalesce()` 猜测了一个缺失的数量，然后修复了它，使得该数量在未来不能为 `NULL`。有时，那是最好的解决方案。\n\
  \n#### 修复作者姓名\n\n使用 `coalesce()` 函数，你可以用一个替代值来填补缺失的作者姓名。这里需要考虑两点：\n\n*   你不能虚构一个缺失的姓名，因此替代值必须是一个空字符串。\n\
  *   你还应该去掉缺失姓名后面的空格。\n\n对于第二点，我们不会单独对姓名进行 coalesce，而是对姓名和空格的组合进行处理，这个组合也应该为 `NULL`——除了\
  \ Oracle，它的行为方式不同。我们会对 Oracle 采取不同的方法。\n\n要将姓名和空格 coalesce 成为空字符串，我们可以使用\n\n```sql\n\
  --  PostgreSQL, MariaDB/MySQL, SQLite\nSELECT\nid, givenname, othernames, familyname,\n\
  coalesce(givenname||' ','')\n||coalesce(othernames||' ','')\n||familyname AS fullname\n\
  FROM authors;\n\n--  MSSQL\nSELECT\nid, givenname, othernames, familyname,\ncoalesce(givenname+'\
  \ ','')\n+coalesce(othernames+' ','')\n+familyname AS fullname\nFROM authors;\n\
  ```\n\n这会得到\n\n| **id** | **givenname** | **Othernames** | **familyname** | **fullname**\
  \ |\n| --- | --- | --- | --- | --- |\n| 464 | Ambrose | [NULL] | Bierce | Ambrose\
  \ Bierce |\n| 858 | Alexander | [NULL] | Ostrovsky | Alexander Ostrovsky |\n| 525\
  \ | Francis | [NULL] | Beaumont | Francis Beaumont |\n| 479 | C.E. | Van | Koetsveld\
  \ | C.E. van Koetsveld |\n| 703 | Friedrich | [NULL] | Engels | Friedrich Engels\
  \ |\n| ~ 488 rows ~ |\n\n由于 Oracle 会很乐意连接一个 `NULL` 字符串，我们不能使用 `coalesce()`。相反，我们将使用\
  \ `ltrim()` 函数。这个函数会移除字符串的前导空格。因为我们是在字符串的*末尾*添加一个空格，只有当姓名为空时，它才会成为一个前导空格。这会给我们\n\
  \n```sql\n--  Oracle\nSELECT\nid, givenname, othernames, familyname,\nltrim(givenname||'\
  \ ')||ltrim(othernames||' ')\n||familyname AS fullname\nFROM authors;\n```\n\n这应该会给出与之前相同的结果。\n\
  \n### 在其他子句中使用计算\n\n在本章中，我们主要在 `SELECT` 子句中使用计算。当然，任何包含值的子句都可以使用计算出的值。我们在这里看几个例子。\n\
  \n计算的一个明显用途是在 `WHERE` 子句中。例如，你可以查找标题较短的书籍：\n\n```sql\nSELECT *\nFROM books\nWHERE\
  \ length(title)<24;     --  MSSQL: len(title)\n```\n\n给出\n\n| **id** | **authorid**\
  \ | **Title** | **published** | **price** |\n| --- | --- | --- | --- | --- |\n|\
  \ 2078 | 765 | The Duel | 1811 | 12.50 |\n| 503 | 128 | Uncle Silas | 1864 | 17.00\
  \ |\n| 2007 | 99 | North and South | 1854 | 17.50 |\n| 702 | 547 | Jane Eyre | 1847\
  \ | 17.50 |\n| 1759 | 17 | La Curée | 1872 | 16.00 |\n| 205 | 436 | Shadow: A Parable\
  \ | [NULL] | 17.50 |\n| ~ 762 rows ~ |\n\n如果你的数据库区分大小写，并且你需要匹配一个大小写未知的字符串，你可能需要这个：\n\
  \n```sql\nSELECT *\nFROM books\nWHERE lower(title) LIKE '%journey%';\n```\n\n给出\n\
  \n| **id** | **authorid** | **Title** | **published** | **price** |\n| --- | ---\
  \ | --- | --- | --- |\n| 880 | 777 | The Journey of Niels Klim to the Wor … | 1741\
  \ | 12.50 |\n| 946 | 704 | Following the Equator: A Journey Aro … | 1897 | 19.50\
  \ |\n| 1314 | 606 | Mozart’s Journey to Prague | 1856 | 17.00 |\n| 1092 | 295 |\
  \ A Journey to the Western Islands of … | 1775 | 14.50 |\n| 502 | [NULL] | Journey\
  \ to the Center of the Earth | 1864 | 15.50 |\n| 1454 | 914 | A Sentimental Journey\
  \ | 1768 | 13.50 |\n\n你也可以在子查询中计算聚合值：\n\n```sql\nSELECT *\nFROM customers\nWHERE\
  \ height<(SELECT avg(height) FROM customers);\n```\n\n给出\n\n| **id** | **familyname**\
  \ | **Givenname** | **…** | **height** | **…** |\n| --- | --- | --- | --- | ---\
  \ | --- |\n| 42 | Knott | May | … | 168.5 | … |\n| 597 | Andy | Ike | … | 153.0\
  \ | … |\n| 352 | Isk | Basil | … | 156.4 | … |\n| 526 | Coming | Seymour | … | 163.5\
  \ | … |\n| 26 | Twishes | Bess | … | 164.6 | … |\n| 91 | North | June | … | 164.5\
  \ | … |\n| ~ 128 rows ~ |\n\n你也可以在 `ORDER BY` 子句中使用计算，例如当你想按标题长度排序时：\n\n```sql\n\
  SELECT *\nFROM books\nORDER BY length(title);     --  MSSQL: length(title)\n```\n\
  \n这会给出\n\n| **id** | **authorid** | **title** | **published** | **price** |\n| ---\
  \ | --- | --- | --- | --- |\n| 385 | 971 | She | 1887 | 11.00 |\n| 488 | 478 | Mumu\
  \ | 1852 | 18.00 |\n| 728 | 534 | Emma | 1815 | 10.00 |\n| 1625 | 496 | Lenz | 1835\
  \ | 18.50 |\n| 317 | 99 | Ruth | 1853 | 16.50 |\n| 2140 | 17 | Nana | 1880 | 12.50\
  \ |\n| ~ 1200 rows ~ |\n\n然而，你很可能想要选择你排序的依据，因此在 `SELECT` 子句中计算该值并按结果排序会更有意义：\n\n\
  ```sql\nSELECT id, authorid, title, length(title) AS len, published, price\nFROM\
  \ books\nORDER BY len;       --  MSSQL: length(title)\n```\n\n这更具信息性：\n\n| **id**\
  \ | **authorid** | **Title** | **len** | **published** | **price** |\n| --- | ---\
  \ | --- | --- | --- | --- |\n| 385 | 971 | She | 3 | 1887 | 11.00 |\n| 488 | 478\
  \ | Mumu | 4 | 1852 | 18.00 |\n| 728 | 534 | Emma | 4 | 1815 | 10.00 |\n| 1625 |\
  \ 496 | Lenz | 4 | 1835 | 18.50 |\n| 317 | 99 | Ruth | 4 | 1853 | 16.50 |\n| 2140\
  \ | 17 | Nana | 4 | 1880 | 12.50 |\n| ~ 1200 rows ~ |\n\n这里有一个在 `ORDER BY` 子句中使用\
  \ `coalesce` 的有趣用法。一些数据库管理系统支持 `NULLS FIRST` 或 `NULLS LAST` 来决定在排序顺序中放置 `NULL` 的位置。如果你的数据库管理系统不支持，你可以将该列\
  \ coalesce 为一个极值。例如：\n\n```sql\nSELECT *\nFROM customers\nORDER BY coalesce(height,0);\
  \    --  NULLS FIRST\n\nSELECT *\nFROM customers\nORDER BY coalesce(height,1000);\
  \ --  NULLS LAST\n```\n\n通过将所有 `NULL` coalesce 为一个极值，SQL 会相应地将它们排序到一端或另一端。\n\n至于\
  \ `FROM` 子句，你需要一个生成虚拟表的计算。这通常会是一个视图、一个连接，甚至是一个子查询。在这个上下文中，一个公用表表达式就像一个子查询。我们稍后会做更多这类事情。\n\
  \n### 关于计算的更多细节\n\nSQL 数据库通常理解三种主要数据类型：数字、字符串和日期。这些类型有一些变体，例如数字是否包含小数，字符串的长度，或者日期是否包含时间。还有一些其他类型，例如布尔值（仅限于\
  \ `true` 或 `false`）或二进制数据（有时称为二进制大对象，或简称 BLOBs），在不同数据库管理系统中的支持程度各不相同。\n\n在这里，我们将看看使用主要数据类型进行计算的一些细节。\n\
  \n通常，值有三种形式：\n\n*   一个 `存储的` 值可能来自变量或列。\n*   一个值可能是 `计算出的` 或来自内置函数。\n*   一个 `字面`\
  \ 值可以直接在代码中输入。\n\nSQL 和大多数编程语言一样，需要一些帮助来区分某些字面值与其他代码。数字字面值按原样输入（裸量），因为它们显然不可能是其他东西。\n\
  \n而字符串或日期字面值则用单引号（`' ... '`）包裹以标记出来。这是为了让 SQL 能够区分字符串和其他单词，例如 SQL 关键字或表和列名。\n\n\
  字符串或日期字面值的实际值不包括引号。但是，在将它们写入代码时需要引号。\n\n在接下来的大部分内容中，我们将使用字面值作为示例。\n\n\n### 类型转换\n\
  \n`cast()` 函数用于将一个值解释为不同的数据类型。回想一下，SQL 有三种主要数据类型：数字、字符串和日期。你可以使用 `cast` 来做以下两件事之一：\n\
  \n*   你可以尝试将一种主要类型转换为另一种主要类型。\n    *   转换为字符串应该相当容易，但转换为另一种类型需要 SQL 知道如何解释该值。不同的数据库管理系统在转换失败时的反应不同。\n\
  \n*   你可以在同一种主要类型内进行转换。例如，你可以在整数和十进制数之间转换，或者在日期和日期时间之间转换。\n    *   如果你将十进制数转换为整数、将日期时间转换为日期，或者将字符串转换为更短的字符串，你自然会丢失精度。如果你向相反方向转换，额外的精度将用相当于“无”的内容填充。\n\
  \    *   如果你确实转换为更窄的类型，它可能会正常工作，但不要过于冒险。例如，将数字 `123.45` 转换为 `decimal(4,2)` 将会失败，因为你没有允许足够的位数；你会得到一个溢出错误。\n\
  \n对于接下来的内容，请记住 SQLite 没有日期类型，所以你不用担心那种转换。稍后，我们会快速看一下 SQLite 中的等效方法。\n\n以下是一些在类型内进行转换的示例：\n\
  \n```sql\n--  更短的日期和数字\nSELECT\n--  非 SQLite:\ncast(ordered as date) AS ordered_date,\n\
  cast(total AS integer) AS whole_dollars\nFROM sales;\n--  更短的字符串\nSELECT cast(title\
  \ AS varchar(16)) AS short_title\nFROM books;\n--  更宽泛的日期和数字\nSELECT\n--  SQLite:\
  \ 没有日期类型\n--  PostgreSQL, Oracle\ncast(dob as timestamp) as long_dob,\n--  MariaDB\
  \ / MySQL, MSSQL\ncast(dob as datetime) as long_dob,\ncast(height as decimal(5,2))\
  \ as long_height\nFROM customers;\n```\n\n如果你将一个字符串转换为更长的类型，将会发生以下两种情况之一。如果你将其转换为\
  \ `CHAR`（固定长度）类型，额外的长度将用空格填充。如果你将其转换为 `VARCHAR` 类型，字符串将保持不变。但是，该字符串将被允许增长到更长的字符串。\n\
  \n在不同类型之间转换是另一回事。大多数数据库管理系统会在必要时自动转换为字符串。例如：\n\n```sql\n--  非 MSSQL\nSELECT id ||\
  \ ': ' || email\nFROM customers;\n```\n\n你会得到类似这样的结果：\n\n| **?column?** |\n| 42:\
  \ may.knott61@example.net |\n| 459: rick.shaw459@example.net |\n| 597: ike.andy597@example.com\
  \ |\n| 186: pat.downe186@example.net |\n| 352: basil.isk352@example.net |\n| 576:\
  \ pearl.divers576@example.com |\n| ~ 303 rows ~ |\n\n如你所见，MSSQL 不会自动这样做，可能是因为与它们的连接运算符（`+`）混淆。在那里，你必须强制进行：\n\
  \n```sql\n--  MSSQL\nSELECT cast(id as varchar(5)) + ': ' + email\nFROM customers;\n\
  ```\n\n你也可以对日期做同样的事情。我们将对客户的出生日期这样做，但我们会遇到一些出生日期缺失的复杂情况。使用 `coalesce` 应该可以解决这个问题：\n\
  \n```sql\n--  PostgreSQL, MariaDB/MySQL, SQlite\nSELECT\nid || ': ' || email\n||\
  \ coalesce('  Born: ' || dob,'')\nFROM customers;\n--  MSSQL\nSELECT\ncast(id as\
  \ varchar(5)) + ': ' + email\n+ coalesce('  Born: ' + cast(dob as char(10)),'')\n\
  FROM customers;\n--  非 Oracle\n```\n\n对于 SQLite，这并不费力，因为我们无论如何都是将日期存储为字符串。\n\n在这里，我们对整个连接值\
  \ `' Born: ' || dob` 使用了 `coalesce`。这是因为我们希望在 `dob` 缺失时用空字符串替换整个表达式。与 `NULL` 连接应该会导致\
  \ `NULL`。\n\n对于 Oracle，你会再次遇到将 `NULL` 字符串视为空字符串的怪癖，因此它们不会被合并。我们可以使用 `CASE` 来解决这个问题：\n\
  \n```sql\n--  Oracle\nSELECT\nid || ': ' || email\n|| CASE\nWHEN dob IS NOT NULL\
  \ THEN '  Born: ' || dob\nEND\nFROM customers;\n```\n\n基本上，你可以将 `coalesce` 视为简化的\
  \ `CASE` 表达式。对于 Oracle，你需要更明确地写出来。\n\n你可能想要更改数据类型的一个原因是为了将它们与其他值混合，例如连接前面的字符串。当我们想要组合来自多个表或虚拟表（例如连接和联合）的数据时，也会看到使用类型转换。\n\
  \n另一个改变数据类型的原因是排序。所有字符串数据通常按字母顺序排序，但你可能需要将它们转换为非字符串类型以进行排序。例如：\n\n```sql\n--  整数\n\
  SELECT * FROM sorting\nORDER BY numberstring;\nSELECT * FROM sorting\nORDER BY cast(numberstring\
  \ as int);         --  非 MySQL\n--  ORDER BY cast(numberstring as signed);  -- \
  \ MySQL\n--  日期 (非 SQLite)\nSELECT * FROM sorting\nORDER BY datestring;\nSELECT\
  \ * FROM sorting\nORDER BY cast(datestring as date);\n```\n\n在 `sorting` 表中，有一些存储为字符串的值代表数字或日期。对它们进行正确排序的唯一方法是先进行类型转换。\n\
  \n请注意，MySQL 不允许直接转换为整数。你必须使用 `SIGNED`（意思相同）或 `UNSIGNED`。MariaDB 可以接受整数。\n\n并非所有从字符串的转换都会成功，因为字符串可能与正确的类型不相似。例如：\n\
  \n```sql\n--  这个可以：\nSELECT cast('23' as int)    --  MySQL: as signed\n--  FROM\
  \ dual   --  Oracle\n;\n--  这个不行：\nSELECT cast('hello' as int) --  MySQL: as signed\n\
  --  FROM dual   --  Oracle\n;\n```\n\n接下来会发生什么取决于数据库管理系统：\n\n*   MariaDB/MySQL 都会给出一个\
  \ `0`，这比较宽容。\n*   MSSQL 会给出一个错误。\n    *   不过，你可以使用一个名为 `try_cast` 的替代方法，它只会给出一个\
  \ `NULL`。如果你愿意，你可以合并结果。\n*   Oracle 也会给出一个错误。\n    *   不过，在这个形式中有一个可选的默认值：`cast('hello'\
  \ as int DEFAULT 0 ON CONVERSION ERROR)`。它比较冗长，但它允许使用 `0` 或其他你喜欢的值作为替代。\n*   PostgreSQL\
  \ 直接给出错误。\n    *   可以编写一个函数来绕过它。\n\n### 数值计算\n\n数字通常用于计数某些东西——它是对“多少”这个问题的答案。例如，客户身高有多少厘米，或者这件物品支付了多少美元？\n\
  \n数字并不总是那样使用。有时，它们被用作令牌或代码。你可能对数字执行的计算将取决于数字的使用方式。\n\n#### 基本算术\n\n你总是可以对数字执行基本操作：\n\
  \n```sql\nSELECT\n3*5 AS multiplication,\n4+7 AS addition,\n8-11 AS subtraction,\n\
  20/3 AS division,\n20%3 AS remainder,  --  Oracle: mod(20,3),\n24/3*5 AS associativity,\n\
  1+2*3 AS precedence,\n2*(3+4) + 5*(8-5) AS distributive\n--  FROM dual   --  Oracle\n\
  ;\n```\n\n此示例说明了主要操作：\n\n| **mul…** | **add…** | **sub…** | **div…** | **rem…**\
  \ | **ass…** | **pre…** | **dis…** |\n| --- | --- | --- | --- | --- | --- | ---\
  \ | --- |\n| 15 | 11 | -3 | 6 | 2 | 40 | 7 | 29 |\n\n请注意，如果你在 Oracle 中测试这个，需要添加\
  \ `FROM dual`。\n\n另请注意\n*   不同的数据库管理系统对整数除法的态度不同。在某些情况下，`20/3` 会给你一个 `6` 的结果，丢弃小数部分。在其他情况下，你会得到像\
  \ `6.66...7` 这样的十进制数。\n*   `%` 运算符计算整数除法后的 **余数**。Oracle 使用 `mod()` 函数。\n*   当混合操作时，SQL\
  \ 遵循你在学校学到的关于优先级（哪些运算符先计算）和结合性（从左到右计算）的规则。SQL 也允许你使用括号先计算表达式。\n\n如果你认识忘记算术基本规则的人，你可以告诉他们\n\
  1.  先算括号里的。\n2.  先算乘法 | 除法，再算加法 | 减法（优先级）。\n3.  相同优先级的操作从左到右计算（结合性）。\n\n当然，无论值是字面量还是某些存储或计算的值，这些表达式的工作方式都是一样的。\n\
  \n\n## 数学函数\n\n也有一些数学函数。大多数情况下，除非你从事相当专业的工作，否则数学函数不会被大量使用。\n\n```sql\nSELECT\npi()\
  \ AS pi,            --  非 Oracle\nsin(radians(45)) AS sin45,  --  非 Oracle\nsqrt(2)\
  \ AS root2,      --  √2\nlog10(3) AS log3,\nln(10) AS ln10,        --  自然对数\npower(4,3)\
  \ AS four_cubed    --  4³\n--  FROM dual                  --  Oracle\n;\n--  Oracle\
  \ 的三角函数不太方便\nSELECT\nacos(-1) AS pi,\nsin(45*acos(-1)/180) AS sin45\nFROM dual;\n\
  ```\n\n结果大致如下：\n\n| `pi` | `sin45` | `root2` | `log3` | `ln10` | `four_cubed` |\n\
  | --- | --- | --- | --- | --- | --- |\n| 3.142 | 0.707 | 1.414 | 0.477 | 2.303 |\
  \ 64 |\n\n所以，现在你可以用 SQL 来计算靠墙梯子的长度，或者计算海上两艘失联船只之间的距离。\n\n## 近似函数\n\n还有一些函数可以给出一个十进制数的近似值。以下是一个示例，其中展示了不同数据库管理系统之间的差异：\n\
  \n```sql\nSELECT\nceiling(200/7.0) AS ceiling,\n--  SQLite: round(200/7.0 + 0.5),\n\
  --  Oracle: ceil(200/7.0),\nfloor(200/7.0) AS floor,\n--  SQLite: round(200/7.0\
  \ - 0.5),\nround(200/7.0,0) AS rounded_integer,\n--  或者 round(200/7), --  非 MSSQL\n\
  round(200/7.0,2) AS rounded_decimal\n--  FROM DUAL   -- Oracle\n;\n```\n\n如你所见，这些函数都会损失精度：\n\
  \n| `ceiling` | `floor` | `rounded_integer` | `rounded_decimal` |\n| --- | --- |\
  \ --- | --- |\n| 29 | 28 | 29 | 28.57 |\n\n如果你使用 `cast()` 函数转换为另一种更窄的数值类型，你也会损失精度。然而，接下来会发生什么取决于具体的数据库管理系统：\n\
  \n| `DBMS` | `castint` | `castdec` |\n| --- | --- | --- |\n| PostgreSQL | 235 |\
  \ 234.57 |\n| MariaDB/MySQL | 235 | 234.57 |\n| Oracle | 235 | 234.57 |\n| MSSQL\
  \ | 234 | 234.57 |\n| SQLite | 234 | 234.567 |\n\n```sql\nSELECT\ncast(234.567 AS\
  \ int) AS castint,\n--  cast(234.567 AS unsigned),  --  MySQL\ncast(234.567 AS decimal(5,2))\
  \ AS castdec\n--  FROM dual               --  Oracle\n;\n```\n\n*   对于 PostgreSQL、Oracle\
  \ 和 MariaDB/MySQL，转换为整数或更短的小数会对数字进行四舍五入。\n*   对于 MSSQL，转换为更短的小数会四舍五入，但转换为整数则会截断。如果你想要截断为整数，可以使用类似\
  \ `decimal(3,0)` 的方法。\n*   对于 SQLite，转换为整数会截断，而转换为小数则会被忽略并保留原始值。\n\n## 数字格式化\n\n\
  格式化函数改变数字的显示外观。与其他近似函数不同，格式化函数的结果不是数字，而是字符串；这是你改变数字外观的唯一方式。\n\n对于数字，你最常想做的是改变小数位数、显示千位分隔符，以及可能添加货币符号。\n\
  \n同样，不同的数据库管理系统有截然不同的函数。例如，以下是一些将数字格式化为带千位分隔符的货币的方法：\n\n```sql\n--  PostgreSQL,\
  \ Oracle\nSELECT\nto_char(total,'FM999G999G999D00') AS local_number,\nto_char(total,'FML999G999G999D00')\
  \ AS local_currency\nFROM sales;\nSELECT to_char(total,'FM$999,999,999.00') FROM\
  \ sales;\n\n--  MariaDB/MySQL\nSELECT\nformat(total,2) AS local_number,\nformat(total,2,'de_DE')\
  \ AS specific_number\nFROM sales;\n\n--  MSSQL\nSELECT\nformat(total,'n') AS local_number,\n\
  format(total,'c') AS local_currency\nFROM sales;\n\n--  SQLite\nSELECT printf('$%,d.%02d',total,round(total*100)%100)\n\
  FROM sales;\n```\n\n你会得到类似下面这样的结果：\n\n| `local_number` | `local_currency` |\n| ---\
  \ | --- |\n| 28.00 | $28.00 |\n| 34.00 | $34.00 |\n| 58.50 | $58.50 |\n| 50.00 |\
  \ $50.00 |\n| 17.50 | $17.50 |\n| 13.00 | $13.00 |\n| ~ 5549 行 ~ |\n\n注意\n\n*  \
  \ PostgreSQL 和 Oracle 都有灵活的 `to_char()` 函数，该函数也可用于格式化日期。\n*   MariaDB/MySQL 使用 `format()`\
  \ 函数，它添加千位分隔符和小数位；你还可以指定它适应不同的区域设置。\n*   MSSQL 有其自己的 `format()` 函数，具有更直观的格式代码；它也能适应区域设置，并可用于格式化日期。\n\
  *   SQLite 只有一个通用的 `format()` 函数，也称为 `printf()` 函数，这对程序员来说可能更熟悉；SQLite 假定你会在宿主应用程序（如\
  \ PHP 或任何嵌入了 SQLite 的地方）中格式化数据。\n\n请注意，如果你确实对一个数字使用了格式化函数，它就不再是数字了！如果你只是查看它，那没关系。但是，如果你计划进行任何进一步的计算，或者对结果进行排序，那么格式化的数字很可能会适得其反。\n\
  \n说到底，格式化可能是你在 SQL 中不会做太多的事情。SQL 的主要目的是获取数据并为下一步做好准备。格式化是最后一步，通常在其他软件中完成。\n\n###\
  \ 字符串计算\n\n字符串就是字符的序列，因此得名。在 SQL 中，这被称为字符数据。\n\n传统上，SQL 有两种主要的字符串数据类型：\n\n*   字符型：`CHAR(length)`\
  \ 是固定长度的字符串。如果你输入的字符少于指定长度，字符串将在右侧填充空格。这可能解释了为什么标准 SQL 在比较字符串时会忽略尾随空格。\n*   字符可变型：`VARCHAR(length)`\
  \ 是有长度限制的字符串。如果你输入较短的字符串，它不会被填充。\n\n原则上，`CHAR()` 在处理上更高效，因为它总是相同的长度，数据库管理系统不需要担心计算大小并固定内容。`VARCHAR()`\
  \ 理应存储效率更高。\n\n实际上，现代数据库管理系统比它们的前辈聪明得多，这两种类型之间的差异已不再那么重要。例如，PostgreSQL 建议始终使用 `VARCHAR`，因为它实际上能更高效地处理该类型。\n\
  \n大多数数据库管理系统提供第三种类型，`TEXT`，它在原则上长度是无限的。同样，现代数据库管理系统允许的标准字符串长度比过去更长，所以这也不那么重要了。微软已弃用\
  \ `TEXT`，转而使用功能相同的 `VARCHAR(MAX)`。\n\n字符串字面量写在单引号之间：\n\n```sql\nSELECT 'hello';\
  \ --  Oracle: FROM dual;\n```\n\n使用字符串时，你通常只是想保存和获取它们。然而，你也可以处理字符串本身。这通常是以下操作之一：\n\
  \n*   **串联** 意味着将字符串连接在一起。\n    串联是字符串上唯一的直接操作。所有其他操作都使用函数。\n*   一些函数会修改字符串。它们并不实际改变字符串，而是返回一个修改后的字符串版本。\n\
  *   一些函数可用于提取字符串的部分内容。\n*   一些函数更关注字符串的各个字符。\n\n\n#### 大小写敏感性\n\nSQL 会按预期存储大写/小写字符，但你在搜索它们时可能会遇到困难。这是因为某些数据库忽略大小写，而另一些则不忽略。\n\
  \n数据库如何处理大小写是一个**排序规则**的问题。排序规则指的是它如何解释字母的变体。在英语中，唯一需要担心的变体是大写或小写，但其他语言可能有更多的变体，例如法语或德语中的带重音字母。\n\
  \n排序规则会影响字符串的排序和比较方式。在英语中，你主要关心的是大写字符串是否与小写字符串匹配，以及大写和小写字符串是混合排序还是分开排序。在其他一些语言中，同样的问题可能适用于带重音字符和不带重音字符是否匹配，以及它们如何排序。\n\
  \n你可以在创建数据库或表时设置排序规则，但如果你不关心这个，DBMS 会为新数据库分配一个默认的排序规则。\n\n在 PostgreSQL、Oracle 和\
  \ SQLite 中，默认的排序规则是大小写敏感的，因此大写和小写不会匹配。而对于 MySQL/MariaDB 和 MSSQL，默认的排序规则是大小写不敏感的，因此它们会匹配。\n\
  \n如果你不确定你特定的数据库是否区分大小写，可以尝试这个简单的测试：\n```sql\nSELECT * FROM customers WHERE 'a'='A';\n\
  ```\n如果数据库是大小写敏感的，你将不会得到任何行，因为 `a` 不会匹配 `A`；如果不是，你将得到整个表的内容。\n\n#### ASCII 与 Unicode\n\
  \n传统上，字符串使用 ASCII（美国信息交换标准代码）进行编码。每个字符都有一个从 32 到 126 的数字，存储在一个字节中。例如，`A` 被编码为 65，而\
  \ `a` 被编码为 97。特殊字符包括空格（32）、感叹号（33），甚至数字 `0`–`9`（48–57）。\n\n由于 32 到 126 之间只有 95 个值，ASCII\
  \ 的字符范围有限。一旦你用完了大小写字母和 10 个数字，就已经用掉了 62 个字符，这为标点符号或其他特殊字符留下的空间不多了。（为什么他们会包含像 `~`\
  \ 和 `` ` `` 这样晦涩的字符，仍然是个谜。）\n\n基本的 ASCII 肯定没有足够的范围来包含更多的标点字符、欧洲带重音字符或希腊/西里尔字母。更不用说日语或中文了。\n\
  \n处理其他语言的一种技术是切换到 ASCII 的不同变体。一个更持久的解决方案是使用 Unicode。\n\nUnicode 是现代标准，用于在单一编码系统中处理多种语言。它通过使用多个字节来实现这一点。具体如何实现可能比较棘手，并且在不同实现中会有所不同，但其理念是相同的。\n\
  \nUnicode 旨在包含 ASCII 码，因此两者之间具有一定的兼容性。然而，一些 Unicode 实现确实比 ASCII 占用更多空间，即使它们编码的是相同的字符。如今，存储空间很便宜，而且数据库软件在高效利用空间方面相当聪明，所以这应该不是什么大问题。\n\
  \n所有现代 DBMS 都支持 Unicode。有些默认支持，有些则需要你主动要求。在某些情况下，你可以为整个数据库、特定表或单个列使用 Unicode。\n\n\
  示例数据库对大多数数据使用 Unicode，但在一些特意限制字符集的情况下可能会使用 ASCII，例如将电话号码存储为字符串时。\n\n一些 DBMS 除了支持\
  \ `CHAR` 和 `VARCHAR` 外，还支持 `NCHAR` 和 `NVARCHAR` 数据类型。如果数据库表设置为使用 Unicode，那么 `CHAR`\
  \ 和 `VARCHAR` 就可以胜任。否则，你可能需要使用 `NCHAR` 和 `NVARCHAR` 在特定列上指定 Unicode。\n\n#### 连接\n\
  \n连接是指将字符串拼接在一起。这是最简单的字符串操作，也是唯一一个不需要函数就能完成的操作。\n\n连接运算符通常是 `||`。Microsoft SQL Server\
  \ 使用 `+` 代替。例如：\n```sql\nSELECT\n    id,\n    givenname||' '||familyname AS fullname\n\
  --  givenname+' '+familyname AS fullname    --  MSSQL\nFROM customers;\n```\n这将给出类似这样的结果：\n\
  \n| `Id` | `fullname` |\n| --- | --- |\n| 42 | May Knott |\n| 459 | Rick Shaw |\n\
  | 597 | Ike Andy |\n| 186 | Pat Downe |\n| 352 | Basil Isk |\n| 576 | Pearl Divers\
  \ |\n| ~ 303 行 ~ |\n\n请注意，传统模式下的 MySQL 不支持任何形式的连接运算符。在 ANSI 模式下，它支持标准的 `||` 运算符。\n\
  \n许多 DBMS 也支持一个非标准函数 `concat(string,string,...)`。例如：\n```sql\n--  非 SQLite\nSELECT\n\
  \    id,\n    concat(givenname,' ',familyname) AS fullname\nFROM customers;\n```\n\
  这在 SQLite 中不支持。然而，它在 MySQL 中是支持的，因此在传统模式下，这就是你连接字符串的方式。\n\n对于大多数 DBMS，`concat()`\
  \ 函数和连接运算符之间有一个微妙但重要的区别。使用连接运算符时，如果其中有一个是 `NULL`，结果（自然）也将是 `NULL`。然而，`concat()`\
  \ 函数会自动将 `NULL` 结果合并为一个空字符串（`''`）。这可能方便也可能不方便，因为有时 `NULL` 是你需要知道的情况。\n\n不过，Oracle\
  \ 采用了不同的方法。他们将 `NULL` 字符串视为与空字符串 `''` 相同，因此以任何方式连接 `NULL` 都等同于连接一个空字符串。一方面，如果你不想处理合并问题，这很方便；另一方面，有时你需要\
  \ `NULL` 就是 `NULL`，所以这可能很麻烦。\n\n\n\n#### 字符串函数\n\n对字符串进行其他操作需要使用函数。以下是一些示例。\n\n\
  在接下来的示例中，我们包含了 `SELECT *` 以提供上下文——不过，在 Oracle 中，如果你将其与其他数据混合使用，则需要编写 `SELECT table.*`，因此我们在所有包含\
  \ Oracle 的示例中都这样做了。\n\n字符串的长度就是其中的字符数。要查找长度，你可以使用：\n\n```sql\n--  PostgreSQL, MySQL/MariaDB,\
  \ SQLite, Oracle\nSELECT customers.*, length(familyname) AS len\nFROM customers;\n\
  --  MSSQL\nSELECT *, len(familyname) AS len FROM customers;\n```\n\n要查找字符串中某一部分的位置，你可以使用以下方法：\n\
  \n```sql\n--  MySQL/MariaDB, SQLite, Oracle: INSTR('values',value)\nSELECT books.*,\
  \ instr(title,' ') AS space FROM books;\n--  PostgreSQL: POSITION(value IN 'values')\n\
  SELECT *, position(' ' in title) AS space FROM books;\n--  MSSQL: CHARINDEX(value,\
  \ 'values')\nSELECT *, charindex(' ',title) AS space FROM books;\n```\n\n你可以使用 `replace`\
  \ 来替换字符串中的子字符串：\n\n```sql\n--  replace(original,search,replace)\nSELECT books.*,\
  \ replace(title,' ','-') AS hyphens\nFROM books;\n```\n\n要切换大小写，有以下函数：\n\n```sql\n\
  --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle, MSSQL\nSELECT\n  books.*,\n  upper(title)\
  \ AS upper,\n  lower(title) AS lower\nFROM books;\n--  PostgreSQL, Oracle\nSELECT\
  \ books.*, initcap(title) AS lower FROM books;\n```\n\n要删除字符串开头或结尾的多余空格，你可以使用 `trim()`\
  \ 从两端删除，或者使用 `ltrim()` 或 `rtrim()` 分别从字符串的开头或结尾删除：\n\n```sql\nWITH vars AS (\n \
  \ SELECT ' abcdefghijklmnop ' AS string\n  --  FROM dual   --  Oracle\n)\nSELECT\n\
  \  string,\n  ltrim(string) AS ltrim,\n  rtrim(string) AS rtrim,\n  trim(string)\
  \ AS trim,\n  ltrim(rtrim(string)) AS same\nFROM vars;\n```\n\n所有现代数据库管理系统都支持 `trim()`，但\
  \ MSSQL 在 2017 版本之前并不支持。PostgreSQL 也称之为 `btrim()`。你可能不会注意到右侧的空格被修剪掉了。\n\n你可以根据所使用的数据库管理系统，使用\
  \ `substring()` 或 `substr()` 来获取子字符串：\n\n```sql\nWITH vars AS (\n  SELECT 'abcdefghijklmnop'\
  \ AS string\n  FROM dual   --  Oracle\n)\nSELECT\n  --  PostgreSQL, MariaDB/MySQL,\
  \ Oracle, SQLite\n  substr(string,3,5) AS substr,\n  --  PostgreSQL, MariaDB/MySQL,\
  \ MSSQL, SQLite\n  substring('abcdefghijklmnop',3,5) AS substring\nFROM vars;\n\
  ```\n\n一些数据库管理系统包含专门用于获取字符串开头或结尾部分的函数。在某些情况下，你可以使用负的起始位置来获取字符串的末尾部分：\n\n```sql\n\
  WITH vars AS (\n  SELECT 'abcdefghijklmnop' AS string\n  FROM dual   --  Oracle\n\
  )\nSELECT\n  --  左侧\n  --  PostgreSQL, MariaDB/MySQL, MSSQL:\n  left('abcdefghijklmnop',4)\
  \ AS lstring\n  --  包括 SQLITE 和 Oracle 在内的所有数据库管理系统:\n  --  substr(string,1,n) AS\
  \ lstring,\n  --  右侧\n  --  PostgreSQL, MariaDB/MySQL, MSSQL:\n  right('abcdefghijklmnop',4)\
  \ AS rstring\n  --  MariaDB/MySQL, Oracle, SQLite\n  --  substr('abcdefghijklmnop',-4)\
  \ AS rstring\nFROM vars;\n```\n\n请注意，如果你花费大量时间从数据中提取子字符串，这可能意味着你试图在一个值中存储过多信息。\n\
  \n另一方面，你通常可以使用子字符串将原始数据重新格式化为更友好的形式。\n\n## 日期操作\n\n从 SQL 的角度来看，日期是有问题的。这是因为，尽管日期在日常生活中无处不在，但日期的计量却相当混乱。\n\
  \n一个问题是我们同时使用多种不兼容的周期来计量日期：日、周、月和年。更糟糕的是，我们生活在不同的时区，所以我们甚至无法就当前时间达成一致。\n\n大多数数据库管理系统都有许多相关的数据类型来管理日期，特别是用于包含时间的日期的\
  \ `date`，以及包含时间的 `datetime`。通常，你可以预期这些类型的变体，以及包含时区的能力。\n\nSQLite 是一个例外，它期望你使用数字或字符串，并通过一些函数来处理这些值以进行日期运算。\n\
  \n对于日期和时间，你通常希望进行以下操作：\n\n1.  输入并存储日期/时间\n2.  获取当前日期/时间\n3.  按日期/时间分组和排序\n4.  提取日期/时间的组成部分\n\
  5.  对日期/时间进行加减\n6.  计算两个日期/时间之间的差值\n7.  格式化日期/时间\n\nSQLite 处理日期的方法完全不同。这部分是因为它实际上不支持日期类型。因此，在接下来的大部分讨论中，SQLite\
  \ 将不会涉及。附录中有关于在 SQLite 中处理日期的信息。\n\n### 输入和存储日期/时间\n\n由于大多数数据库管理系统有自己的存储日期/时间的方式，因此日期存储的具体细节并不重要。重要的是你能够输入数据。\n\
  \n在表中，日期或日期时间列通常定义如下：\n\n| **数据库管理系统** | **日期** | **带时间的日期** |\n| --- | --- | ---\
  \ |\n| PostgreSQL | `DATE` | `TIMESTAMP` |\n| MariaDB/MySQL | `DATE` | `DATETIME`\
  \ |\n| MSSQL | `DATE` | `DATETIME2` |\n| Oracle | `DATE` | `DATETIME` |\n| SQLite\
  \ | `TEXT` | `TEXT` |\n\n输入 `date` 或 `datetime` 字面常量的通常方法是使用以下格式之一：\n\n*   `date`:\
  \ `'2013-02-15'`\n*   `datetime`: `'2013-02-15 09:20:00'`\n\n你也可以省略秒数或包含秒的小数部分。\n\
  \n该格式是 `ISO8601` 格式的变体。在纯 `ISO8601` 格式中，时间会写在 `T` 之后而不是空格之后。\n\n请注意，在 Oracle 中，日期时间字面常量通常使用不同的格式。要使用前面的格式，需要分别在字面常量前加上\
  \ `date` 或 `datetime`：\n\n*   `date`: `date '2013-02-15'`\n*   `datetime`: `datetime\
  \ '2013-02-15 09:20:00'`\n\n在 PostgreSQL、MSSQL 和 MySQL/MariaDB 中，你通常也可以输入另一种可读的日期格式，例如\
  \ `'15 Feb 2013'`。但是，你*绝不*应该使用在国际上有不同含义的格式 `'2/3/2013'`。\n\n实际上，坚持使用标准格式即可：\n\n\
  ```sql\nSELECT *\nFROM customers\nWHERE dob<'1980-01-01'; --  Oracle dob<date '1980-01-01';\n\
  ```\n\n这会给你较年长的客户：\n\n| **id** | **givenname** | **familyname** | **…** | **dob**\
  \ | **…** |\n| --- | --- | --- | --- | --- | --- |\n| 459 | Rick | Shaw | … | 1945-07-03\
  \ | … |\n| 352 | Basil | Isk | … | 1960-01-13 | … |\n| 92 | Nan | Keen | … | 1943-05-18\
  \ | … |\n| 267 | Boris | Todeath | … | 1969-10-06 | … |\n| 91 | June | North | …\
  \ | 1967-03-22 | … |\n| 543 | Nat | Ering | … | 1946-04-30 | … |\n| ~ 133 行 ~ |\n\
  \n请注意，在像 `dob<'1980-01-01'` 这样的简单表达式中，SQL 不会混淆表达式是日期还是字符串：上下文已经很清楚了。\n\n### 获取当前日期/时间\n\
  \n有一件事你会想做，就是将某个日期/时间与现在进行比较。在大多数数据库管理系统中，你可以使用：\n\n```sql\nSELECT\n  current_timestamp\
  \ AS now,\n  current_date AS today       --  非 MSSQL\n  --  FROM dual   --  Oracle\n\
  ;\n```\n\n注意\n\n*   MSSQL 也有 `getdate()` 作为 `current_timestamp` 的同义词。尽管名称如此，它返回的不只是日期。\n\
  *   MariaDB/MySQL 也有 `now()` 作为 `current_timestamp` 的同义词。\n*   Oracle 还有 `systemtimestamp`\
  \ 和 `systemdate` 用于获取数据库服务器而非客户端上的日期/时间。\n\n如前所述，MSSQL 没有 `current_date` 的版本。无论如何，你可能已有一个现有的\
  \ `datetime`，希望将其简化为 `date`。最简单的方法是 `cast` 该 `datetime`：\n\n```sql\n--  非 Oracle\n\
  SELECT\n  current_timestamp AS now,\n  cast(current_timestamp as date) AS today\n\
  \  --  FROM dual   --  Oracle\n;\n```\n\n这对于 Oracle 不太适用；它确实允许你进行转换，但没有任何效果。相反，你应该使用\
  \ `trunc()` 函数：\n\n```sql\n--  Oracle\nSELECT\n  current_timestamp AS now,\n  trunc(current_timestamp)\
  \ AS today\nFROM dual   --  Oracle\n;\n```\n\n这仍然会包含时间部分，但它会被设置为 `00:00`。\n\n\n\n\
  ## 按日期/时间分组和排序\n\n您可以像对其他任何数据类型一样，按日期/时间进行排序。结果将按历史顺序排列：\n\n```sql\nSELECT *\nFROM\
  \ sales\nORDER BY ordered;\n```\n\n当然，您也可以使用 `DESC`。\n\n您也可以按 `date` 分组，但您可能不想按\
  \ `datetime` 分组，除非您每秒有大量交易。对于 `datetime`，您可以使用公用表表达式（CTE）将其转换为 `date`，然后再对结果进行分组。例如：\n\
  \n```sql\nWITH cte AS (\n  SELECT\n    cast(ordered as date) AS ordered, total \
  \ --  非 Oracle\n--  trunc(ordered) AS ordered, total     --  Oracle\n  FROM sales\n\
  )\nSELECT ordered, sum(total)\nFROM cte\nGROUP BY ordered\nORDER BY ordered;\n```\n\
  \n这将为您生成以下摘要：\n\n| ordered | sum |\n| --- | --- |\n| 2022-05-04 | 43.00 |\n| 2022-05-05\
  \ | 150.50 |\n| 2022-05-06 | 110.50 |\n| 2022-05-07 | 142.00 |\n| 2022-05-08 | 214.50\
  \ |\n| 2022-05-09 | 16.50 |\n| ~ 389 行 ~ |\n\n请记住，在 Oracle 中您需要使用 `trunc()` 函数。\n\
  \n## 提取日期/时间的部分\n\n从技术上讲，`datetime` 代表一个时间点。实际上，我们倾向于从天和年等组成部分来思考。这种情况因以下事实而变得复杂：(a)\
  \ 各组成部分不同步，并且 (b) 其中一些组成部分的大小会变化。\n\n### 在 PostgreSQL、MariaDB/MySQL 和 Oracle 中提取日期\n\
  \n提取日期部分的标准方法是使用 `extract()` 函数。其形式如下：\n\n```sql\nextract(part from datetime)\n\
  ```\n\n您可以看到 `extract()` 函数的实际应用：\n\n```sql\nWITH chelyabinsk AS (\n  SELECT\n \
  \   timestamp '2013-02-15 09:20:00' AS datetime\n  FROM dual\n)\nSELECT\n  datetime,\n\
  \  EXTRACT(year FROM datetime) AS year,\n  EXTRACT(month FROM datetime) AS month,\n\
  \  EXTRACT(day FROM datetime) AS day,\n--  非 Oracle 或 MariaDB/MySQL：\n  EXTRACT(dow\
  \ FROM datetime) AS weekday,\n  EXTRACT(hour FROM datetime) AS hour,\n  EXTRACT(minute\
  \ FROM datetime) AS minute,\n  EXTRACT(second FROM datetime) AS second\nFROM chelyabinsk;\n\
  ```\n\n您将得到以下组成部分：\n\n| datetime | year | month | day | weekday | hour | minute\
  \ | second |\n| --- | --- | --- | --- | --- | --- | --- | --- |\n| 2013-02-15 09:20:00\
  \ | 2013 | 2 | 15 | 5 | 9 | 20 | 0 |\n\n请注意，Oracle 和 MariaDB/MySQL 没有直接提取星期几的方法，这可能是个问题，例如，如果您想用它进行分组。但是，正如您稍后将看到的，您可以使用格式化函数来获取星期几以及前面的值。\n\
  \nPostgreSQL 还包含一个名为 `date_part('part',datetime)` 的函数，作为前述函数的替代方法。\n\n### 在 Microsoft\
  \ SQL 中提取日期\n\nMicrosoft SQL 有两个主要函数来提取日期部分：\n\n*   `datepart(part,datetime)` 将日期/时间的部分提取为**数字**。\n\
  *   `datename(part,datetime)` 将日期/时间的部分提取为**字符串**。对于大多数部分，例如年份，它只是 `datepart` 数字的字符串版本。然而，对于星期几和月份，它实际上是人类友好的名称。\n\
  \n您可以看到这两个函数的实际应用：\n\n```sql\nWITH chelyabinsk AS (\n  SELECT cast('2013-02-15 09:20'\
  \ as datetime) AS datetime\n)\nSELECT\n  datepart(year, datetime) AS year,    --\
  \  又名 year()\n  datename(year, datetime) AS yearstring,\n  datepart(month, datetime)\
  \ AS month,  --  又名 month()\n  datename(month, datetime) AS monthname,\n  datepart(day,\
  \ datetime) AS day,      --  又名 day()\n  datepart(weekday, datetime) AS weekday,\
  \ --  星期日=1\n  datename(weekday, datetime) AS weekdayname,\n  datepart(hour, datetime)\
  \ AS hour,\n  datepart(minute, datetime) AS minute,\n  datepart(second, datetime)\
  \ AS second\nFROM chelyabinsk;\n```\n\n注意\n\n*   `datename(date,year)` 只给出 `2013`\
  \ 的字符串版本。\n*   有三个短函数——`day()`、`month()` 和 `year()`——它们是 `datepart()` 的同义词。\n\n\
  ## 格式化日期\n\n与数字一样，格式化日期会生成一个字符串。\n\n对于 PostgreSQL 和 Oracle，您可以使用 `to_char` 函数。以下是两个有用的格式：\n\
  \n```sql\n--  PostgreSQL\nWITH vars AS (SELECT timestamp '1969-07-20 20:17:40' AS\
  \ moonshot)\nSELECT\n  moonshot,\n  to_char(moonshot,'FMDay, DDth FMMonth YYYY')\
  \ AS fulldate,\n  to_char(moonshot,'Dy DD Mon YYYY') AS shortdate\nFROM vars;\n\
  --  Oracle\nWITH vars AS (\n  SELECT timestamp '1969-07-20 20:17:40' AS moonshot\
  \ FROM dual\n)\nSELECT\n  moonshot,\n  to_char(moonshot,'FMDay, ddth Month YYYY')\
  \ AS fulldate,\n  to_char(moonshot,'Dy DD Mon YYYY') AS shortdate\nFROM vars;\n\
  ```\n\n您将得到类似以下内容：\n\n| moonshot | full | short |\n| --- | --- | --- |\n| 1969-07-20\
  \ 20:17:40 | Sunday, 20th July 1969 | Sun 20 Jul 1969 |\n\n您会注意到 PostgreSQL 和 Oracle\
  \ 的格式代码之间略有不同。\n\n对于 MariaDB/MySQL，有 `date_format()` 函数：\n\n```sql\nWITH vars AS\
  \ (SELECT timestamp '1969-07-20 20:17:40' AS moonshot)\nSELECT\n  moonshot,\n  date_format(moonshot,'%W,\
  \ %D %M %Y') AS fulldate,\n  date_format(moonshot,'%a %d %b %Y') AS shortdate\n\
  FROM vars;\n```\n\n对于 Microsoft SQL，`format()` 函数也可用于日期：\n\n```sql\nWITH vars AS\
  \ (SELECT cast('1969-07-20 20:17:40' AS datetime) AS moonshot)\nSELECT\n  format(moonshot,'dddd,\
  \ d MMMM yyy') AS fulldate,\n  format(moonshot,'ddd d MMM yyy') AS shortdate\nFROM\
  \ vars;\n```\n\nSQLite 的格式化功能非常有限，如果没有一些额外的技巧，您肯定无法获取月份或星期的名称。通常最好保留日期不变，让宿主应用程序执行所需的操作。\n\
  \n您可以在以下网址了解有关格式代码的更多信息：\n\n*   PostgreSQL: [`www.postgresql.org/docs/current/functions-formatting.html#FUNCTIONS-FORMATTING-DATETIME-TABLE`](http://www.postgresql.org/docs/current/functions-formatting.html%2523FUNCTIONS-FORMATTING-DATETIME-TABLE)\n\
  *   Oracle: [`https://docs.oracle.com/en/database/oracle/oracle-database/21/sqlrf/Format-Models.html`](https://docs.oracle.com/en/database/oracle/oracle-database/21/sqlrf/Format-Models.html%255D)\n\
  *   MariaDB: [`https://mariadb.com/kb/en/date_format/`](https://mariadb.com/kb/en/date_format/)\n\
  *   MySQL: [`https://dev.mysql.com/doc/refman/8.0/en/date-and-time-functions.html`](https://dev.mysql.com/doc/refman/8.0/en/date-and-time-functions.html)\n\
  *   Microsoft SQL: [`https://learn.microsoft.com/en-us/dotnet/standard/base-types/custom-date-and-time-format-strings`](https://learn.microsoft.com/en-us/dotnet/standard/base-types/custom-date-and-time-format-strings)\n\
  \n\n## 日期运算\n\n通常，你对日期要做的两件事是：\n\n*   通过增加或减少一个时间间隔来修改日期。\n*   计算两个日期之间的差值。\n\n\
  要修改日期，你可以加上或减去一个时间间隔。一些数据库管理系统为此定义了一种名为 `interval` 的数据类型。例如，要在当前时间上增加四个月，你可以使用：\n\
  \n```sql\n-- PostgreSQL\nSELECT\n    date '2015-10-31' + interval '4 months' AS\
  \ afterthen,\n    current_timestamp + interval '4 months' AS afternow,\n    current_timestamp\
  \ + interval '4' month  -- 也可以\n;\n-- Oracle\nSELECT\n    add_months('31 Oct 2015',4)\
  \ AS afterthen,\n    current_timestamp + interval '4' month AS afternow,\n    add_months(current_timestamp,4)\
  \ -- 也可以\nFROM dual;\n-- MariaDB/MySQL\nSELECT\n    date_add('2015-10-31',interval\
  \ 4 month) AS afterthen,\n    date_add(current_timestamp,interval 4 month) AS afternow,\n\
  \    current_timestamp + interval '4' month  -- 也可以\n;\n```\n\n这将得到类似以下的结果：\n\n\
  | **afterthen** | **Afternow** |\n| --- | --- |\n| 2016-02-29 00:00:00 | 2023-10-01\
  \ 16:01:13.691447+11 |\n\n你会注意到 PostgreSQL 和 Oracle 使用加法运算符，而 MariaDB/MySQL 使用一个特殊函数。Oracle\
  \ 还有一个特殊的 `add_months` 函数用于增加月份。\n\n对于 Microsoft SQL，你使用 `dateadd` 函数，指定单位和单位数量：\n\
  \n```sql\n-- MSSQL\nSELECT\n    dateadd(month,4,'2015-10-31') AS afterthen,\n  \
  \  dateadd(month,4,current_timestamp) AS afternow\n;\n```\n\nSQLite 使用 `strftime()`\
  \ 函数将字符串转换为日期，并使用修饰符来调整日期：\n\n```sql\n-- SQLite\nSELECT\n    strftime('%Y-%m-%d','2015-10-31','+4\
  \ month') AS afterthen,\n    strftime('%Y-%m-%d','now','+4 month') AS afternow\n\
  ;\n```\n\n另一件你想做的事是计算两个日期之间的差值。同样，每个 DBMS 的做法都不同。例如，要找出客户的年龄，你可以使用：\n\n```sql\n\
  -- PostgreSQL\nSELECT\n    dob,\n    age(dob) AS interval,\n    date_part('year',age(dob))\
  \ AS years,\n    extract(year from age(dob)) AS samething\nFROM customers;\n-- MariaDB/MySQL\n\
  SELECT\n    dob,\n    timestampdiff(year,dob,current_timestamp) AS age\nFROM customers;\n\
  -- MSSQL, 但不完全准确！\nSELECT\n    dob,\n    datediff(year,dob,current_timestamp) AS\
  \ age\nFROM customers;\n-- Oracle\nSELECT\n    dob,\n    trunc(months_between(current_timestamp,dob)/12)\
  \ AS age\nFROM customers;\n-- SQLite\nSELECT\n    dob,\n    cast(\n        strftime('%Y.%m%d',\
  \ 'now')\n        - strftime('%Y.%m%d', dob)\n        as int) AS age\nFROM customers;\n\
  ```\n\n对于 PostgreSQL，你将得到以下结果。其他 DBMS 不会有 `age` 列：\n\n| **dob** | **interval** |\
  \ **Years** | **samething** |\n| --- | --- | --- | --- |\n| [NULL] | [NULL] | 0\
  \ | 0 |\n| 1945-07-03 | 77 years 10 mons 29 days | 77 | 77 |\n| 1998-08-09 | 24\
  \ years 9 mons 23 days | 24 | 24 |\n| 1990-04-12 | 33 years 1 mon 19 days | 33 |\
  \ 33 |\n| 1960-01-13 | 63 years 4 mons 19 days | 63 | 63 |\n| [NULL] | [NULL] |\
  \ 0 | 0 |\n| ~ 约 303 行 ~ |\n\n在前面的计算中，`MSSQL` 有一个简单的 `datediff` 函数，但它是“短路”的：它只计算年份的差异，如果出生日期在年末而查询日期在年初，结果就会严重偏离。要获得更准确的结果需要更多的工作。\n\
  \n### CASE 表达式\n\n有时简单的表达式无法满足需求，你需要 SQL 做出一些选择。`CASE ... END` 表达式可用于从备选值中进行选择。\n\
  \n例如，你可以根据其他值创建类别：\n\n```sql\nSELECT\n    id,title,\n    CASE\n        WHEN price<7\
  \ THEN 'expensive'\n        -- ELSE NULL\n    END AS price\nFROM books;\n```\n\n\
  你会得到一个简单的价格列表：\n\n| **id** | **Title** | **price** |\n| --- | --- | --- |\n| 2094\
  \ | The Manuscript Found in Saragossa | expensive |\n| 336 | The Story of My Life\
  \ | reasonable |\n| 1868 | The Tenant of Wildfell Hall | [NULL] |\n| 375 | Dead\
  \ Souls | reasonable |\n| 1180 | Fables | cheap |\n| 990 | The History of Pendennis:\
  \ His Fortun … | cheap |\n| ~ 约 1200 行 ~ |\n\n注意，如果所有条件都不满足，结果将是 `NULL`，这在前面被注释掉了。如果你想要一个替代\
  \ `NULL` 的值，请使用 `ELSE` 表达式：\n\n```sql\nSELECT\n    id,title,\n    CASE\n       \
  \ WHEN price<7 THEN 'expensive'\n        ELSE ''\n    END AS price\nFROM books;\n\
  ```\n\n另外，请注意 `CASE` 表达式是“短路求值”的：一旦找到匹配项，它就会停止评估。\n\n### CASE 的各种用法\n\n当你测试一个简单的离散值时，`CASE`\
  \ 有一种简化的变体。例如：\n\n```sql\nSELECT\n    c.id,\n    givenname||' '||familyname AS name,\n\
  \    -- givenname+' '+familyname AS name, -- MSSQL\n    CASE status\n        WHEN\
  \ 1 THEN 'Gold'\n        WHEN 2 THEN 'Silver'\n        WHEN 3 THEN 'Bronze'\n  \
  \  END AS status\nFROM customers AS c LEFT JOIN VIP ON c.id=vip.id;\n-- Oracle:\n\
  -- FROM customers c LEFT JOIN VIP ON c.id=vip.id;\n```\n\n这将给你：\n\n| **id** | **Name**\
  \ | **status** |\n| --- | --- | --- |\n| 69 | Rudi Mentary | [NULL] |\n| 182 | June\
  \ Hills | Bronze |\n| 43 | Annie Day | [NULL] |\n| 263 | Mark Time | Bronze |\n\
  | 266 | Vic Tory | Silver |\n| 68 | Phyllis Stein | [NULL] |\n| 442 | Herb Garden\
  \ | Gold |\n| 33 | Eileen Dover | [NULL] |\n| ~ 约 303 行 ~ |\n\n这种形式并没有短很多，但意图更清晰。\n\
  \n你也可以使用 `IN` 表达式：\n\n```sql\nSELECT\n    id, givenname, familyname,\n    CASE\n\
  \        WHEN state IN('QLD','NSW','VIC','TAS') THEN 'East'\n        WHEN state\
  \ IN ('NT','SA') THEN 'Central'\n        ELSE 'Elsewhere'\n    END AS region\nFROM\
  \ customerdetails;\n```\n\n这会得到：\n\n| **id** | **Givenname** | **familyname** |\
  \ **region** |\n| --- | --- | --- | --- |\n| 137 | Albert | Ross | East |\n| 359\
  \ | Gail | Warning | Central |\n| 40 | Cliff | Face | East |\n| 151 | Rick | O’Shea\
  \ | East |\n| 96 | Rob | Blind | Elsewhere |\n| 465 | Mary | Christmas | Elsewhere\
  \ |\n| ~ 约 303 行 ~ |\n\n### Coalesce 类似于 CASE 的特殊形式\n\n使用 `coalesce()` 和 `CASE`\
  \ 之间有相似之处。你可以将 `CASE` 视为 `coalesce` 的一种替代方案：\n\n```sql\nSELECT\n    id, givenname,\
  \ familyname,\n    coalesce(phone,'-') AS coalesced,\n    CASE\n        WHEN phone\
  \ IS NOT NULL THEN phone\n        ELSE '-'\n    END AS cased\nFROM customers;\n\
  ```\n\n这两个表达式将给出相同的结果：\n\n| **id** | **givenname** | **familyname** | **coalesced**\
  \ | **cased** |\n| --- | --- | --- | --- | --- |\n| 42 | May | Knott | 0255509371\
  \ | 0255509371 |\n| 459 | Rick | Shaw | 0370101040 | 0370101040 |\n| 597 | Ike |\
  \ Andy | - | - |\n| 186 | Pat | Downe | 0870105900 | 0870105900 |\n| 352 | Basil\
  \ | Isk | 0255502503 | 0255502503 |\n| 576 | Pearl | Divers | 0370107821 | 0370107821\
  \ |\n| ~ 约 303 行 ~ |\n\n当然，这不一定是一个方便的替代方案，但它有助于理解两者的重叠用途。这在 Oracle 中特别有用，在那里你可以愉快地连接一个\
  \ `NULL` 而不会得到 `NULL`，否则很难使用 `coalesce`。\n\n\n### 嵌套的 CASE 表达式\n\n`CASE` 也可以嵌套额外的\
  \ `CASE`。当存在多种可能性时，这很有用。\n\n例如，`sales` 表包含订单下达的日期和时间，以及订单发货（或是否发货）的日期。\n\n我们可以使用\
  \ `CASE` 为这些日期生成状态。例如，使用 `shipped` 日期和 `ordered` 日期，可以设置以下标准：\n\n*   已发货：比较 `shipped`\
  \ 和 `ordered`\n    *   超过 14 天 ⇒ `发货延迟`\n*   其他情况 ⇒ `已发货`\n\n*   未发货：比较今日与 `ordered`\n\
  \    *   少于 7 天 ⇒ `当前`\n    *   少于 14 天 ⇒ `到期`\n*   其他情况 ⇒ `逾期`\n\n但在开始之前，请注意有些销售记录没有\
  \ `ordered` 值：\n\n```sql\nSELECT * FROM sales;\n```\n\n例如，如果客户从未结账，就可能出现这种情况。我们可能应该删除它们，但目前，我们只是将它们过滤掉：\n\
  \n```sql\nSELECT * FROM sales WHERE ordered IS NOT NULL;\n```\n\n首先，需要计算日期之间的差值。这在不同的数据库管理系统（DBMS）中有所不同：\n\
  \n```sql\n--  PostgreSQL, MariaDB / MySQL, Oracle\nSELECT\n    id, customerid, total,\n\
  \    cast(ordered as date) AS ordered, shipped,\n    current_date - cast(ordered\
  \ as date) AS ordered_age,\n    shipped - cast(ordered as date) AS shipped_age\n\
  FROM sales\nWHERE ordered IS NOT NULL;\n--  MSSQL\nSELECT\n    id, customerid, total,\n\
  \    cast(ordered as date) AS ordered, shipped,\n    datediff(day,ordered,current_timestamp)\
  \ AS ordered_age,\n    datediff(day,ordered,shipped) AS shipped_age\nFROM sales\n\
  WHERE ordered IS NOT NULL;\n--  SQLite\nSELECT\n    *,\n    julianday('now')-julianday(ordered)\
  \ AS ordered_age,\n    julianday(shipped)-julianday(ordered) AS shipped_age\nFROM\
  \ sales\nWHERE ordered IS NOT NULL;\n```\n\n你会得到类似以下的结果：\n\n| **id** | **customerid**\
  \ | **total** | **ordered** | **shipped** | **ordered_age** | **shipped_age** |\n\
  | --- | --- | --- | --- | --- | --- | --- |\n| 39 | 28 | 28.00 | 2022-05-15 | 2022-05-23\
  \ | 382 | 8 |\n| 40 | 27 | 34.00 | 2022-05-16 | 2022-05-24 | 381 | 8 |\n| 42 | 1\
  \ | 58.50 | 2022-05-16 | 2022-05-22 | 381 | 6 |\n| 43 | 26 | 50.00 | 2022-05-16\
  \ | [NULL] | 381 | [NULL] |\n| 45 | 26 | 17.50 | 2022-05-16 | 2022-05-28 | 381 |\
  \ 12 |\n| 668 | 105 | 15.00 | 2022-07-27 | [NULL] | 309 | [NULL] |\n| ~ 5295 rows\
  \ ~ |\n\n请注意，在 SQLite 中，获取年龄的最简单方法是将日期转换为儒略日（Julian date），这是自公元前 4714 年 11 月 24\
  \ 日正午以来的天数。说来话长。\n\n现在你应该知道，在 `SELECT` 子句的其他部分不能使用计算出的值，所以如果你需要它们，这就很麻烦。然而，你可以分两步完成查询。\n\
  \n如果将前面的查询放在一个公共表表达式（Common Table Expression）中，就可以在主查询中使用其结果。\n\n首先，你需要区分已发货和未发货的记录：\n\
  \n```sql\nWITH salesdata AS (\n    -- 上述查询之一，末尾不加分号\n)\nSELECT\n    salesdata.*,\n\
  \    CASE\n        WHEN shipped IS NOT NULL THEN\n            -- 两种状态之一\n      \
  \  ELSE\n            -- 三种状态之一\n    END AS status\nFROM salesdata;\n```\n\n每种情况下的状态是额外的\
  \ `CASE` 表达式：\n\n```sql\nWITH salesdata AS (\n    -- 上述查询之一，末尾不加分号\n)\nSELECT\n\
  \    salesdata.*,\n    CASE\n        WHEN shipped IS NOT NULL THEN\n           \
  \ CASE\n                WHEN shipped_age>14 THEN '发货延迟'\n                ELSE '已发货'\n\
  \            END\n        ELSE\n            CASE\n                WHEN ordered_age<7\
  \ THEN '当前'\n                WHEN ordered_age<14 THEN '到期'\n                ELSE\
  \ '逾期'\n            END\n    END AS status\nFROM salesdata;\n```\n\n这将给出类似以下的结果：\n\
  \n| **id** | **cid** | **total** | **ordered** | **shipped** | **ordered_age** |\
  \ **shipped_age** | **status** |\n| --- | --- | --- | --- | --- | --- | --- | ---\
  \ |\n| 39 | 28 | 28.00 | 2022-05-15 | 2022-05-23 | 382 | 8 | 已发货 |\n| 40 | 27 |\
  \ 34.00 | 2022-05-16 | 2022-05-24 | 381 | 8 | 已发货 |\n| 42 | 1 | 58.50 | 2022-05-16\
  \ | 2022-05-22 | 381 | 6 | 已发货 |\n| 43 | 26 | 50.00 | 2022-05-16 | [NULL] | 381\
  \ | [NULL] | 逾期 |\n| 45 | 26 | 17.50 | 2022-05-16 | 2022-05-28 | 381 | 12 | 已发货\
  \ |\n| 668 | 105 | 15.00 | 2022-07-27 | [NULL] | 309 | [NULL] | 逾期 |\n| ~ 5295 rows\
  \ ~ |\n\n"
- '# 总结


  SQL 表中的数据应该以其最纯粹、最简单的形式存储。然而，这些数据可以重新计算以提高其可用性。


  计算可以采取多种形式：


  *   基于单列

  *   基于多列

  *   硬编码的字面值

  *   子查询的结果

  *   由函数计算得出


  计算也可以用于 `WHERE` 和 `ORDER BY` 子句。


  ### 别名


  所有计算值都应该使用别名重命名。`AS` 关键字是可选的，但建议使用以减少混淆。


  如果新名称更合理，你也可以为非计算列指定别名。


  别名在 `SELECT` 子句中给出，该子句在 `ORDER BY` 之前最后求值。对于大多数 DBMS，这意味着你不能在 `ORDER BY` 之外的任何其他子句中使用该别名。


  ### NULL 值


  表当然可能在不同的地方包含 `NULL`。通常，`NULL` 会使任何计算失效，并在结果中留下 `NULL`。


  你可以使用 `coalesce()` 函数绕过 `NULL`，该函数用一个替代值替换 `NULL`。你也可以使用 `CASE ... END` 表达式。


  ### 类型转换


  SQL 主要处理三种数据类型：


  *   数字

  *   日期和时间

  *   字符串


  你可能需要改变数据类型。这是通过 `cast()` 函数完成的。


  当在主要类型内进行转换时，效果是改变类型的精度或大小。


  当在主要类型之间转换时，通常是为了兼容性。虽然转换为字符串通常是可能的且经常是自动的，但从字符串转换可能并不总是成功。不同的 DBMS 对不成功的转换有不同的反应。


  ### 数字计算


  你可以对所有数字类型执行基本算术。不同的 DBMS 对处理整数有不同的态度。


  SQL 包含多种处理数字的函数，包括：


  *   数学函数

  *   近似函数


  还有一些格式化函数，它们生成格式化后的字符串结果。


  ### 字符串计算


  字符串可能以各种方式存储。通常，字符串使用 ASCII 或 Unicode。字符串操作可能区分大小写，也可能不区分，这取决于数据库的排序规则（collation）。


  字符串的基本简单操作是连接（concatenation）。通常有一个简单的运算符来完成此操作。


  其他字符串操作涉及字符串函数。


  ### 日期计算


  请注意，SQLite 没有日期数据类型。它确实包含一些将字符串或数字转换为日期的函数。


  对于日期，以下操作很常见：


  *   输入并存储日期和时间

  *   获取当前日期和时间

  *   提取日期或时间的一部分

  *   格式化日期

  *   一些简单的算术，例如日期和时间之间的差值，以及修改日期和时间


  ### CASE 表达式


  `CASE` 表达式允许你从多个备选值中进行选择。`CASE` 表达式可用于简化值，也可用于对它们进行分组。


  `CASE` 表达式有一种简单形式，可用于离散值。


  `CASE` 表达式也可以嵌套以形成更复杂的表达式。


  ## 后续内容


  既然我们已经处理过表数据了，我们现在可以开始分析它。


  下一章将介绍使用聚合函数和分组来汇总数据。我们将涵盖 SQL 中数据聚合的方式、基本聚合函数，以及如何汇总到一个或多个组中。


  我们还将研究在不同级别组合聚合，以及数值数据的一些基本统计。



  '
- "# 5. 汇总数据\n\n数据库存储数据。这一点显而易见，但数据本身是相当静态的——你保存它，检索它，有时修改它。这对于某些需求来说没问题，但有时你希望数据能发挥更大作用。\n\
  \n当你开始对数据进行汇总时，就能让数据“工作”起来。这样你可以观察趋势、预见走向，或者仅仅是获得一个数据概览。\n\n聚合函数用于计算数据的摘要。它们有三种应用场景：\n\
  \n*   对整张表进行汇总。\n*   使用 `GROUP BY` 进行分组汇总。\n*   逐行包含摘要。这是通过使用 `OVER` 子句的 `窗口函数`\
  \ 来完成的。\n\n你将在第 8 章学习窗口函数。在本章中，我们将探讨如何使用 SQL 内置的聚合函数来计算摘要，无论是整体还是分组计算。\n\n### 基本聚合函数\n\
  \n毫无疑问，你已经对聚合函数有了一些经验。聚合函数本质上是统计性的，包括：\n\n*   `count`\n\n    计算一列中值的数量，无论实际值是什么。特殊情况是，`count(*)`\
  \ 计算表中的行数。\n*   `sum` 和 `avg`\n\n    对列中的值进行求和或计算平均值。当然，这仅在该列是数值类型时才能进行。\n*   `max`\
  \ 和 `min`\n\n    找出列中的最大或最小值。如果含义不明确的话，它们相当于使用 `ORDER BY` 时你会得到的第一个和最后一个值，当然，`NULL`\
  \ 值总是被忽略。\n*   `stddev`、`stddev_samp`、`stddev_pop` (PostgreSQL, MySQL/MariaDB, Oracle)\
  \ 或 `stdev`、`stdevp` (MSSQL)\n\n    计算列值的标准差。这可以是总体标准差或样本标准差。同样，这只适用于数值列。\n\n  \
  \  具体的函数名称（和拼写）在不同的数据库管理系统（DBMS）之间可能略有不同。PostgreSQL 将 `stddev` 视为 `stddev_samp`\
  \ 的同义词。MySQL/MariaDB 将其视为 `stddev_pop` 的同义词。Oracle 将其视为 `stddev_samp` 的一种变体。\n\n\
  根据所使用的 DBMS，还存在其他各种聚合函数，但前面列出的这些是相当典型的。\n\n例如：\n\n```sql\n--  图书数据\nSELECT\n-- \
  \ 计算行数：\ncount(*) AS nbooks,\n--  计算一列中的值数：\ncount(price) AS prices,\n--  最便宜和最贵的价格\n\
  min(price) AS cheapest, max(price) AS priciest\nFROM books;\n```\n\n你会得到类似这样的结果：\n\
  \n| **nbooks** | **prices** | **cheapest** | **priciest** |\n| --- | --- | --- |\
  \ --- |\n| 1201 | 1096 | 10 | 20 |\n\n或者用于数值统计：\n\n```sql\n--  客户数据\nSELECT\n--\
  \  计算行数：\ncount(*) AS ncustomers,\n--  计算一列中的值数：\ncount(phone) AS phones,\n--  身高统计\n\
  stddev_samp(height) AS sd   --  MSSQL: stdev(height)\nFROM customers;\n```\n\n你会得到类似这样的结果：\n\
  \n| **ncustomers** | **phones** | **sd** |\n| --- | --- | --- |\n| 303 | 286 | 6.992\
  \ |\n\n所有这些函数都适用于数字，但只有以下函数可用于其他数据类型，如字符串和日期：\n\n*   `count`\n*   `max` 和 `min`\n\
  \n例如：\n\n```sql\nSELECT\n--  计算一列中的值数：\ncount(dob) AS dobs,\n--  最早和最晚的日期\nmin(dob)\
  \ AS earliest, max(dob) AS latest\nFROM customers;\n```\n\n得到\n\n| **Dobs** | **earliest**\
  \ | **latest** |\n| --- | --- | --- |\n| 239 | 1943-05-18 | 2003-01-27 |\n\n我们在前面的描述中有些表述比较宽松。特别是：\n\
  \n*   表可以是虚拟表，例如视图、连接或公用表表达式。\n*   任何带有 `WHERE` 子句的表都会在应用聚合函数*之前*进行过滤。\n*   “值”我们肯定不包括\
  \ `NULL`。当你发现 `count()` 忽略 `NULL` 而 `avg()` 的除数是非 `NULL` 值时，这一点尤其明显。\n*   这些函数适用于整张表或行组。\n\
  \n### `NULL`\n\n聚合函数不包含 `NULL`。唯一不那么明显的情况是使用求和函数时。然而，需要注意以下几点：\n\n*   `count(column)`\
  \ 只会计数该列中的非 `NULL` 值，因此你得到的结果可能少于总行数。\n*   `avg(column)` 也会忽略 `NULL` 值，因此平均值只除以值的数量，而不一定是行数。\n\
  \n换句话说，`NULL` 与 `0` 或 `''` 有着天壤之别。\n\n我们稍后在研究聚合过滤器时，将会利用这一事实。\n\n\n## 理解聚合\n\n使用聚合函数有时会遇到一些问题，并且似乎有一些古怪的规则。如果你真正理解了聚合的工作原理，这一切就说得通了。\n\
  \n当你聚合数据时，原始数据实际上被转换成一个新的虚拟表，其中包含一个或多个分组的摘要。\n\n例如，查询\n```sql\nSELECT\n    count(*)\
  \ AS rows,\n    count(phone) AS phones\nFROM customers;\n```\n可以被视为\n```sql\nSELECT\n\
  \    count(*) AS rows,\n    count(phone) AS phones\nFROM customers\nGROUP BY ()\
  \ --  仅 PostgreSQL, MSSQL, Oracle 有效\n;\n```\n\n请注意，`GROUP BY ()` 子句并非适用于所有数据库管理系统（DBMS），例如\
  \ MariaDB/MySQL 或 SQLite。不过这没关系，因为分组无论如何都会发生。\n\n关键是，无论有没有 `GROUP BY ()` 子句，只要 SQL\
  \ 在查询中发现聚合函数，就会生成虚拟的汇总表。\n\n在前面的例子中，数据被汇总成一个单行的虚拟汇总表。反过来，这个虚拟表包含每个列的总计，如图 5-1 所示。\n\
  \n![](img/606708_1_En_5_Fig1_HTML.jpg)\n图 5-1：形象化理解 GROUP BY ()\n\n这就是为什么你不能在聚合查询中包含单个行数据。例如，这样就行不通：\n\
  ```sql\nSELECT\n    id,                     --  哎呀\n    count(*) AS rows,\n    count(phone)\
  \ AS phones\nFROM customers;\n```\n你会得到一个错误消息，基本上告诉你不能在查询中使用 `id`。\n\n请注意，在传统模式下的\
  \ MariaDB/MySQL 中，你确实可以成功运行此语句。但是，DBMS 会选择它能找到的第一个 `id`，而这实际上没有有意义的值。只有当你能够确定所有非聚合值都相同时，这个方法才主要有用。\n\
  \n当你包含一个更有意义的 `GROUP BY` 子句时，结果是类似的，除了：\n\n* 现在每个组有一个汇总行。\n* 每个分组列还会增加一个额外的列。\n\n\
  看起来如图 5-2 所示。\n\n![](img/606708_1_En_5_Fig2_HTML.jpg)\n图 5-2：GROUP BY 某个字段\n\n例如：\n\
  ```sql\nSELECT\n    town, state,                --  分组列\n    count(phone) AS phones,\
  \ --  每个组的摘要：\n    min(dob) AS oldest\nFROM customerdetails\nGROUP BY town, state;\n\
  ```\n你会得到类似这样的结果：\n\n| **town** | **State** | **phones** | **oldest** |\n| --- |\
  \ --- | --- | --- |\n| [NULL] | [NULL] | 24 | 1946-04-30 |\n| The Gap | QLD | 5\
  \ | 1998-04-22 |\n| Lilydale | TAS | 3 | 1945-08-31 |\n| Guildford | WA | 3 | 1985-10-06\
  \ |\n| Kingston | VIC | 2 | 1947-09-29 |\n| Reedy Creek | NSW | 6 | 1960-12-30 |\n\
  | ~ 约 92 行 ~ |\n\n（你可能会在开头或结尾得到一组 `NULL` 值，因为我们没有过滤掉 `NULL` 地址。）\n\n在整体流程中，（虚拟的）`GROUP\
  \ BY` 子句出现在 `FROM` 之后，并可能在 `WHERE` 子句之后，并在那个位置进行求值：\n```sql\nSELECT ...\nFROM ...\n\
  WHERE ...\nGROUP BY ...\n--  SELECT\nORDER BY ...\n```\n\n通常，`SELECT` 在 `ORDER BY`\
  \ 之前最后求值，尽管它在书写时写在最前面，如图 5-3 所示。\n\n![](img/606708_1_En_5_Fig3_HTML.jpg)\n图 5-3：子句顺序\n\
  \nSQL 既不知道也不关心数据的实际含义，因此不会检查你是否应该将这些聚合函数应用于特定的列。\n\n## 聚合部分值\n\n在某些情况下，你可能只希望聚合列中的某些值。在这里，我们将看看如何聚合唯一值，以及如何筛选要聚合的值。\n\
  \n### 唯一值\n\n大多数聚合函数可以应用于唯一值，但这可能在统计上是无效的。然而，如果你*计数*唯一值，它可能是有意义的，如下例所示：\n```sql\n\
  SELECT\n    count(state) AS addresses,\n    count(DISTINCT state) AS states\nFROM\
  \ customerdetails;\n```\n这将统计客户详细信息中有多少个不同的州。这并不是说无论如何都不能计数 `state` 列，因为它表示有多少行具有任何地址信息：\n\
  \n| **Addresses** | **states** |\n| --- | --- |\n| 278 | 8 |\n\n不过要小心。可能该列不能反映全貌。例如，如果你尝试\n\
  ```sql\nSELECT count(DISTINCT town) FROM customerdetails;\n```\n你会得到一个结果，但这可能会被误解。你得到的是不同的*城镇名称*，但其中许多城镇名称出现在不止一个州中。你不应该将此解释为不同的*城镇*。\n\
  \n至于其他聚合函数，通常对每个样本只应用任何其他统计计算是没有意义的。\n\n### 聚合筛选器\n\n通常，聚合函数应用于整个表或整个组。例如，`count(*)`\
  \ 会计算表或组中的所有行。\n\n一个相对较新的特性允许你将聚合函数应用于部分行。这可以在查询中多次应用。\n\n例如，以下查询将统计 customers 表中的所有客户：\n\
  ```sql\nSELECT count(*) FROM customers;\n```\n\n假设你想将客户分为年轻客户和年长客户。\n\n你可能会本能地尝试这样做：\n\
  ```sql\n--  别费心尝试这个：\nSELECT\n    count(dob='1980-01-01') AS younger\nFROM customers;\n\
  ```\n\n如果前面的查询没有产生错误，很可能会被误解。\n\nSQL 确实提供了一种有效的方法来筛选你想要筛选的内容。你可以输入：\n```sql\n--\
  \  PostgreSQL:\nSELECT\n    count(*) FILTER (WHERE dob='1980-01-01') AS younger\n\
  FROM customers;\n```\n你会得到类似这样的结果：\n\n| **older** | **younger** |\n| --- | --- |\n\
  | 133 | 106 |\n\n不幸的是，这并没有得到很好的支持（目前仅在 PostgreSQL 中支持）。然而，以下替代方法可以实现相同的效果：\n```sql\n\
  SELECT\n    count(CASE WHEN dob='1980-01-01' THEN 1 END) AS young\nFROM customers;\n\
  ```\n这使用 `CASE` 表达式来分离出生日期值。它们要么是 `1`，要么是 `NULL`，而 `count()` 函数只计算 `1`。\n\n你也可以将此技术用于其他聚合函数。例如：\n\
  ```sql\n--  新标准\nSELECT\n    sum(total),\n    sum(total) FILTER (WHERE ordered ='...')\
  \ AS newer\nFROM sales;\n--  替代方法\nSELECT\n    sum(total),\n    sum(CASE WHEN ordered='...'\
  \ THEN total END) AS newer\nFROM sales;\n```\n在这里，值要么是 `total`，要么是 `NULL`，而 `sum()`\
  \ 会礼貌地忽略 `NULL`。\n\n| **Sum** | **older** | **newer** |\n| --- | --- | --- |\n|\
  \ 342836.22 | 162045 | 164873.22 |\n\n但是，如果你有兴趣为不同的类别进行筛选，使用分组可能会更符合你的需求。\n\n\n\n\
  ## 按计算值分组\n\n前述技术是将不同组水平分隔，即每个值位于同一行。你也可以垂直分隔这些派生组。这是通过使用 `GROUP BY` 子句实现的。\n\n\
  你可能已经熟悉使用 `GROUP BY` 对简单的列值进行分组：\n```sql\nSELECT state, count(*)\nFROM customerdetails\n\
  GROUP BY state;\n```\n\n你也可以按一个派生值进行分组。例如，你可以按客户的出生月份对他们进行分组：\n```sql\n--  PostgreSQL,\
  \ Oracle\nSELECT EXTRACT(month FROM dob) as monthnumber,\ncount(*) AS howmany\n\
  FROM customerdetails\nGROUP BY EXTRACT(month FROM dob)\nORDER BY monthnumber;\n\
  --  MSSQL\nSELECT month(dob) AS monthnumber, count(*) AS howmany\nFROM customerdetails\n\
  GROUP BY month(dob)\nORDER BY monthnumber;\n--  MySQL / MariaDB\nSELECT month(dob)\
  \ AS monthnumber, count(*) AS howmany\nFROM customerdetails\nGROUP BY month(dob)\n\
  ORDER BY monthnumber;\n--  SQLite\nSELECT strftime('%m',dob) as monthnumber,\ncount(*)\
  \ AS howmany\nFROM customerdetails\nGROUP BY strftime('%m',dob)\nORDER BY monthnumber;\n\
  ```\n\n在此示例中，月份编号被命名为 `monthnumber`，同时也用于对结果进行排序。\n\n| **月份编号** | **数量** |\n| ---\
  \ | --- |\n| 1 | 19 |\n| 2 | 14 |\n| 3 | 17 |\n| 4 | 23 |\n| 5 | 24 |\n| 6 | 15\
  \ |\n| 7 | 27 |\n| 8 | 18 |\n| 9 | 18 |\n| 10 | 24 |\n| 11 | 17 |\n| 12 | 23 |\n\
  | [NULL] | 64 |\n\n请注意，计算出现了两次，一次在 `SELECT` 子句中，另一次在 `GROUP BY` 子句中。这是因为 `SELECT`\
  \ 是在 `GROUP BY` 之后才进行求值的，所以，遗憾的是，它的别名在 `GROUP BY` 中还不可用。\n\n这并不算真正的问题，因为 SQL 优化器会很乐意地复用该计算，所以实际上它只执行了一次计算。\n\
  \n不幸的是，月份编号不是很友好，因此我们可以使用月份名称。然而，不方便的是，月份名称的排序顺序不对，所以我们两者都需要：\n```sql\n--  非 SQLite\n\
  --  PostgreSQL, Oracle\nSELECT EXTRACT(month FROM dob) as monthnumber,\nto_char(dob,'Month')\
  \ AS monthname,\ncount(*) AS howmany\nFROM customerdetails\nGROUP BY EXTRACT(month\
  \ FROM dob), to_char(dob,'Month')\nORDER BY monthnumber;\n--  MSSQL\nSELECT month(dob)\
  \ AS monthnumber,\ndatename(month,dob) AS monthname, count(*) AS howmany\nFROM customerdetails\n\
  GROUP BY month(dob), datename(month,dob)\nORDER BY monthnumber;\n--  MySQL / MariaDB\n\
  SELECT month(dob) AS monthnumber,\nmonthname(dob) AS monthname, count(*) AS howmany\n\
  FROM customerdetails\nGROUP BY month(dob), monthname(dob)\nORDER BY monthnumber;\n\
  ```\n\n这样看起来好多了：\n\n| **月份编号** | **月份名称** | **数量** |\n| --- | --- | --- |\n| 1 |\
  \ January | 19 |\n| 2 | February | 14 |\n| 3 | March | 17 |\n| 4 | April | 23 |\n\
  | 5 | May | 24 |\n| 6 | June | 15 |\n| 7 | July | 27 |\n| 8 | August | 18 |\n| 9\
  \ | September | 18 |\n| 10 | October | 24 |\n| 11 | November | 17 |\n| 12 | December\
  \ | 23 |\n| [NULL] | [NULL] | 64 |\n\n如你所见，在 SQLite 中无法完全做到这一点，因为它没有获取月份名称的函数。\n\
  \n从技术上讲，按两者分组是冗余的，因为每个月只有一个月份名称。但是，我们需要两者，以便我们可以显示一个，但按另一个排序。\n\n尽管重复计算不是问题，但这确实使查询的可读性降低且更难维护。我们可以利用公用表表达式：\n\
  ```sql\nWITH cte AS (\n...\n)\nSELECT monthname, count(*)\nFROM cte\nGROUP BY monthnumber,\
  \ monthname\nORDER BY monthnumber;\n```\n\n你可以将 `GROUP BY` 与任何计算字段一起使用，但请注意：\n\n\
  *   由于简单的计算并不总是能产生值得分组的结果，因此你能用它们做的事情是有限的。\n*   如前所述，计算需要同时出现在 `SELECT` 子句和 `GROUP\
  \ BY` 子句中，这使得过程变得繁琐。\n\n前面提到的第二点可以通过使用公用表表达式来缓解。第一点则可以通过使用 CASE 语句来解决。\n\n### 使用\
  \ CASE 语句进行分组\n\n基本的 `GROUP BY` 假定你已经有可以分组的值。有时，这样的值可以是派生的，例如月份或星期名称。\n\n更任意的分组可以使用\
  \ `CASE` 语句创建。\n\n例如，假设我们想统计年轻和年长的客户。我们可以通过使用一个 `CASE` 语句来区分他们：\n```sql\nCASE\n\
  WHEN dob<'1980-01-01' THEN 'older'\nWHEN dob IS NOT NULL then 'younger'\n--  ELSE\
  \ NULL\nEND\n```\n\n请记住，一些 `dob` 可能为 `NULL`，所以你需要过滤掉它们才能得到年轻客户。还要记住，默认的 `ELSE` 是\
  \ `NULL`，所以我们不需要包含它。\n\n为了统计他们，我们可以将此语句包含在 `GROUP BY` 子句中，如下所示：\n```sql\nSELECT\
  \ count(*)\nFROM customers\nGROUP BY CASE\nWHEN dob<'1980-01-01' THEN 'older'\n\
  WHEN dob IS NOT NULL then 'younger'\nEND;\n```\n\n这会给你一些结果：\n\n| **计数** |\n| 64\
  \ |\n| 133 |\n| 106 |\n\n但如果没有某种标签，这些结果是无用的。我们可以通过在 `SELECT` 子句中重复该计算来实现：\n```sql\n\
  SELECT\nCASE\nWHEN dob<'1980-01-01' THEN 'older'\nWHEN dob IS NOT NULL then 'younger'\n\
  END AS agegroup,\ncount(*)\nFROM customers\nGROUP BY CASE\nWHEN dob<'1980-01-01'\
  \ THEN 'older'\nWHEN dob IS NOT NULL then 'younger'\nEND;\n```\n\n这样就可以工作了：\n\n\
  | **年龄组** | **计数** |\n| --- | --- |\n| [NULL] | 64 |\n| Older | 133 |\n| Younger\
  \ | 106 |\n\n但从编码的角度来看，这比上一节中的计算列更糟糕，所以这绝对会受益于使用公用表表达式：\n```sql\nWITH cte AS (\n\
  SELECT\n*,\nCASE\nWHEN dob<'1980-01-01' THEN 'older'\nWHEN dob IS NOT NULL then\
  \ 'younger'\nEND AS agegroup FROM customers\n)\nSELECT agegroup,count(*)\nFROM cte\n\
  GROUP BY agegroup;\n```\n\n现在这将给你一个更易于管理的结果。\n\n### 重新审视配送状态\n\n还记得在之前的章节中，我们使用嵌套的\
  \ `CASE` 语句创建了配送统计信息：\n```sql\nWITH salesdata AS (\n--  PostgreSQL, MariaDB / MySQL,\
  \ Oracle\nSELECT\nordered, shipped, total,\ncurrent_date - cast(ordered as date)\
  \ AS ordered_age,\nshipped - cast(ordered as date) AS shipped_age\nFROM sales\n\
  --  MSSQL\nSELECT\nordered, shipped, total,\ndatediff(day,ordered,current_timestamp)\n\
  AS ordered_age,\ndatediff(day,ordered,shipped) AS shipped_age\nFROM sales\n--  SQLite\n\
  SELECT\nordered, shipped, total,\njulianday('now')-julianday(ordered) AS ordered_age,\n\
  julianday(shipped)-julianday(ordered) AS shipped_age\nFROM sales\n)\nSELECT\nordered,\
  \ shipped, total,\nCASE\nWHEN shipped IS NOT NULL THEN\nCASE\nWHEN shipped_age>14\
  \ THEN 'Shipped Late'\nELSE 'Shipped'\nEND\nELSE\nCASE\nWHEN ordered_age<7 THEN\
  \ 'Current'\nWHEN ordered_age<14 THEN 'Due'\nELSE 'Overdue'\nEND\nEND AS status\n\
  FROM salesdata;\n```\n\n（当然，删除未使用的 `SELECT` 语句。）你会得到：\n\n| **订购日期** | **发货日期** |\
  \ **总计** | **状态** |\n| --- | --- | --- | --- |\n| 2022-05-15 21:12:07.988741 | 2022-05-23\
  \ | 28 | Shipped |\n| 2022-05-16 03:03:16.065969 | 2022-05-24 | 34 | Shipped |\n\
  | 2022-05-16 10:09:13.674823 | 2022-05-22 | 58.5 | Shipped |\n| 2022-05-16 15:02:43.285565\
  \ | [NULL] | 50 | Overdue |\n| 2022-05-16 16:48:14.674202 | 2022-05-28 | 17.5 |\
  \ Shipped |\n| [NULL] | [NULL] | 13 | Overdue |\n| ~ 5549 行 ~ |\n\n如果你想将其汇总到状态组中，你可以再次将整个语句放入一个\
  \ CTE，然后对该 CTE 进行汇总。你已经有一个 CTE 用于预计算时长，因此我们需要另一个 CTE 来保存前面的结果：\n```sql\nWITH\nsalesdata\
  \ AS (\n--  同上\n),\nstatuses AS (\nSELECT\nordered, shipped, total,\nCASE\nWHEN\
  \ shipped IS NOT NULL THEN\nCASE\nWHEN shipped_age>14\nTHEN 'Shipped Late'\nELSE\
  \ 'Shipped'\nEND\nELSE\nCASE\nWHEN ordered_age<7 THEN 'Current'\nWHEN ordered_age<14\
  \ THEN 'Due'\nELSE 'Overdue'\nEND\nEND AS status\nFROM salesdata\n)\nSELECT status,\
  \ count(*) AS number\nFROM statuses\nGROUP BY status;\n```\n\n这将给你汇总的数据：\n\n| **状态**\
  \ | **数量** |\n| --- | --- |\n| Due | 94 |\n| Current | 78 |\n| Shipped | 3808 |\n\
  | Overdue | 1273 |\n| Shipped Late | 296 |\n\n下一步是让结果按正确的顺序显示。\n\n\n## 按任意字符串排序\n\
  \n当然，当涉及对结果进行排序时，真正的问题在于 SQL 的想象力有限，它只会按字母顺序对字符串进行排序。这只在状态值本身也按字母顺序排列时才有效，但事实并非如此。\n\
  \n你可以采用几种方法：\n\n*   你可以在每个字符串开头包含一个数字，然后使用 `ORDER BY`。这是一种取巧的办法，而且看起来不太合适。\n*  \
  \ 你可以用另一个表来存储状态值及其位置编号，然后将该表连接到主查询中。这很复杂，但在某些情况下可能有用。\n*   你可以用数字而不是字符串复制 `CASE`\
  \ 表达式，并按该列排序。不幸的是，无法从单个 `CASE` 表达式中得到两列。这真的很混乱。\n*   你通过字符串在更长字符串中的*位置*（`position`）来排序。\n\
  \n我们将采用最后一种方法，因为它易于实现且不会影响结果。\n\n大多数 DBMS 都包含一个用于在更大字符串中查找子串的函数。它有各种名称和形式：\n\n```sql\n\
  --  PostgreSQL\nPOSITION(substring IN string)\n--  MariaDB / MySQL & SQLite\nINSTR(substring,string)\n\
  --  Oracle\nINSTR(string,substring)\n--  MSSQL\nCHARINDEX(substring,string)\n```\n\
  \n在本例中，我们可以找到 `status` 字符串在包含按顺序排列的状态值的更长字符串中的位置：\n\n```sql\n'Shipped,Shipped Late,Current,Due,Overdue'\n\
  ```\n\n逗号不是必需的，但它们使字符串更具可读性。更重要的是，状态字符串按你期望的顺序排列，并且位置函数会为更早找到的字符串返回更低的值。剩下的就由 `ORDER\
  \ BY` 子句来完成。\n\n我们可以使用定位函数对前面的查询进行排序，如下所示：\n\n```sql\nWITH\nsalesdata AS (\n-- \
  \ 如上所述\n),\nstatuses AS (\n--  如上所述\n)\nSELECT status, count(*) AS number\nFROM\
  \ cte\nGROUP BY status\n--  PostgreSQL\nORDER BY POSITION(status IN\n'Shipped,Shipped\
  \ Late,Current,Due,Overdue')\n--  MariaDB / MySQL & SQLite\nORDER BY INSTR(status,\n\
  'Shipped,Shipped Late,Current,Due,Overdue')\n--  Oracle\nORDER BY INSTR(status,\n\
  'Shipped,Shipped Late,Current,Due,Overdue')\n--  MSSQL\nORDER BY CHARINDEX(status,\n\
  'Shipped,Shipped Late,Current,Due,Overdue')\n;\n```\n\n你现在将按顺序得到结果：\n\n| **状态**\
  \ | **数量** |\n| --- | --- |\n| Shipped | 3808 |\n| Shipped Late | 296 |\n| Current\
  \ | 78 |\n| Due | 94 |\n| Overdue | 1273 |\n\n你可以将此技术用于任何非字母顺序的字符串排序，例如一周中的日子或彩虹中的颜色。\n\
  \n## 字符串拼接\n\n还有一个函数可用于聚合字符串数据。此函数将使用可选的分隔符连接字符串。\n\n这个函数有几个不同的名称：\n\n| DBMS | 函数\
  \ |\n| --- | --- |\n| PostgreSQL | `string_agg(column, delimiter)` |\n| SQL Server\
  \ 2017+ | `string_agg(column, delimiter)` |\n| SQLite | `group_concat(column, delimiter)`\
  \ |\n| MySQL and MariaDB | `group_concat(column /* ORDER BY column */SEPARATOR delimiter)`\
  \ |\n| Oracle | `listagg(column, delimiter)` |\n\n例如，你可以用这种方式获取每位作者的所有书籍列表：\n\n\
  ```sql\nSELECT\na.id, a.givenname, a.familyname,\n--  PostgreSQL, MSSQL\nstring_agg(b.title,\
  \ '; ') AS works\n--  SQLite\n--  group_concat(b.title, '; ') AS works\n--  Oracle\n\
  --  listagg(b.title, '; ') AS works\n--  MariaDB / MySQL\n--  group_concat(b.title\
  \ SEPARATOR '; ') AS works\nFROM authors AS a LEFT JOIN books AS b ON a.id=b.authorid\n\
  GROUP BY a.id, a.givenname, a.familyname;\n```\n\n你将得到类似这样的结果：\n\n| **id** | **givenname**\
  \ | **familyname** | **works** |\n| --- | --- | --- | --- |\n| 146 | Washington\
  \ | Irving | Rip Van Wink ...; Tales of the ...; The ... |\n| 963 | Richard | Marsh\
  \ | The Beetle ... |\n| 390 | Jean | Racine | Andromaque ...; Britannicus ...; Bérénice\
  \ ... |\n| 766 | Evelyn | Everett-Green | True to the ... |\n| 296 | Henri | Bergson\
  \ | Matter and M ...; Laughter ...; Time and Fre ... |\n| 464 | Ambrose | Bierce\
  \ | An Occurrenc ...; The Monk and ...; Tales ... |\n| ~ 488 行 ~ |\n\n`works` 列包含所有用\
  \ `;` 连接起来的书名。注意，`GROUP BY` 子句使用了作者 `id`，但也包含了冗余的作者姓名以便选择它们。\n\n不过要小心。很容易对这个函数过度使用，你会看到书籍列表可能非常长，而连接后的字符串也可能变得非常、非常长。\n\
  \n## 使用分组集汇总总计\n\n传统上，使用 `GROUP BY` 会给出每组组合的总计。例如：\n\n```sql\nSELECT state, town,\
  \ count(*)\nFROM customerdetails\nGROUP BY state, town;\n```\n\n将给出每个 `state`/`town`\
  \ 组合的细分小计。\n\n有时，你可能希望包含这些小计的汇总，例如每个 `state` 的总计以及总体总计。\n\n通常，你会认为**总计**（`total`）是求和，而**小计**（`subtotal`）是子组的总和。这暗示着要使用\
  \ `sum()` 函数。在本次讨论中，我们将更宽松地使用术语，将这个词用于任何聚合，例如 `count()`。在这里，小计将意味着对子组进行计数。\n\n在前面的示例中，你可以获得四种可能的总计：\n\
  \n*   每个 `state`/`town` 组合的 `count()`；这是你通常得到的。\n*   每个 `state` 组的 `count()`。\n\
  *   每个 `town` 组的 `count()`。在这个例子中，它不太有用，因为有些城镇名称在各州之间重复，因此你会合并本不应合并的值。然而，在其他例子中，这会很有用。\n\
  *   整个日志的 `count()`——总计。\n\n除了最后一个，其他都可以被认为是某种程度上的小计。\n\n当我们稍后处理这个例子时，我们将按三列进行聚合，将会有八种组合，因此我们可以计算八个总计和小计。\n\
  \n现代 SQL 允许你生成一个包含表数据和聚合数据的总计和小计组合的结果集。根据 DBMS 的不同，这可能包括对 `GROUP BY` 子句的修改：\n\n\
  *   `GROUPING SETS` 允许你指定要包含哪些附加汇总。例如，你可以决定包含前面四种可能性中的哪几种。\n    PostgreSQL、Microsoft\
  \ SQL 和 Oracle 支持此功能。\n*   `ROLLUP` 是 `GROUPING SETS` 的简化版本，它产生*部分*可能的小计，将列视为层次结构。在前面的示例中，你将获得\
  \ `state`/`town`、`state` 和总计。\n    PostgreSQL、Microsoft SQL、Oracle 和 MariaDB/MySQL\
  \ 支持此功能。\n*   `CUBE` 也是 `GROUPING SETS` 的专门版本，它产生*所有*可能的小计。在前面的示例中，它就是所有四种可能的总计。\n\
  \n在这里，我们将看看如何生成这样的汇总。但是，我们不会处理客户的地址，而是看一下销售数据。\n\n\n## 准备用于汇总的数据\n\n通常情况下，你的原始数据可能并未完全准备好用于汇总。例如，`sales`\
  \ 表包含了每笔订单的 `time`，但对其进行分组可能非常困难。在我们的示例中，我们将致力于汇总以下内容：\n\n*   订单的月份\n*   客户 ID\n\
  *   客户居住的州\n\n请注意，这三个列彼此独立，不像原始示例中的 `state` 和 `town` 那样。这意味着对任意组合进行合计都是有意义的。\n\n\
  为了准备数据，我们可以使用以下查询：\n\n```sql\nSELECT\n--  PostgreSQL, Oracle\nto_char(s.ordered,'YYYY-MM')\
  \ AS ordered,\n--  MariaDB / MySQL\n--  date_format(s.ordered,'%Y-%m') AS ordered,\n\
  --  MSSQL\n--  format(s.ordered,'yyyy-MM') AS ordered,\n--  SQLite\n--  strftime('%Y-%m',s.ordered)\
  \ AS ordered,\ns.total, c.id, c.state\nFROM sales AS s JOIN customerdetails AS c\n\
  ON s.customerid=c.id\nWHERE s.ordered IS NOT NULL;\n```\n\n你会看到类似这样的结果：\n\n| **ordered**\
  \ | **total** | **id** | **state** |\n| --- | --- | --- | --- |\n| 2022-05 | 28\
  \ | 28 | NSW |\n| 2022-05 | 34 | 27 | NSW |\n| 2022-05 | 58.5 | 1 | WA |\n| 2022-05\
  \ | 50 | 26 | VIC |\n| 2022-05 | 17.5 | 26 | VIC |\n| 2022-07 | 15 | 105 | VIC |\n\
  | ~ 5295 行 ~ |\n\n没有哪个版本的 SQL 提供了一种直接提取年-月组合的简单方法，所以我们使用一个格式化函数。它返回一个字符串，但这对于我们想要用它做的事情来说没问题。\n\
  \n在使用这个查询时，你可以在一个 CTE（公共表表达式）中使用它，但这并不是很方便，所以我们将其保存为一个视图：\n\n```sql\nDROP VIEW IF\
  \ EXISTS salesdata;  --  非 Oracle 语法\nCREATE VIEW salesdata AS\nSELECT\n--  PostgreSQL,\
  \ Oracle\nto_char(s.ordered,'YYYY-MM') AS ordered,\n--  MariaDB / MySQL\n--  date_format(s.ordered,'%Y-%m')\
  \ AS ordered,\n--  MSSQL\n--  format(s.ordered,'yyyy-MM') AS ordered,\n--  SQLite\n\
  --  strftime('%Y-%m',s.ordered) AS ordered,\ns.total, c.id, c.state\nFROM sales\
  \ AS s JOIN customerdetails AS c\nON s.customerid=c.id\nWHERE s.ordered IS NOT NULL;\n\
  ```\n\n如果你使用的是 Microsoft SQL Server，记得将你的 `CREATE VIEW` 语句用一对 `GO` 包围起来：\n\n```sql\n\
  -- MSSQL DROP VIEW IF EXISTS salesdata;\nGO\nCREATE VIEW salesdata AS\nSELECT\n\
  format(s.ordered,'yyyy-MM') AS ordered,\ns.total, c.id, c.state\nFROM sales AS s\
  \ JOIN customerdetails AS c\nON s.customerid=c.id\nWHERE s.ordered IS NOT NULL;\n\
  GO\n```\n\n首先，我们将分别生成汇总结果，然后用一个 `UNION` 子句将它们组合起来。\n\n## 使用 UNION 子句组合汇总结果\n\n大多数数据库管理系统（DBMS）都有一种更简单的方法来完成此操作，但通过（不太）漫长的方式来做，你会更好地理解这一切是如何工作的。\n\
  \n首先，你可以使用以下查询按州、客户 ID 和日期获取汇总：\n\n```sql\n--  所有分组汇总\nSELECT state, id, ordered,\
  \ count(*) AS nsales, sum(total) AS total\nFROM salesdata\nGROUP BY state,id,ordered\n\
  ORDER BY state,id,ordered;\n```\n\n你会得到每个州/客户 ID/订单日期组合的汇总。\n\n| **state** | **id**\
  \ | **ordered** | **nsales** | **total** |\n| --- | --- | --- | --- | --- |\n| ACT\
  \ | 85 | 2022-06 | 2 | 117 |\n| ACT | 85 | 2022-07 | 2 | 104.5 |\n| ACT | 85 | 2022-08\
  \ | 5 | 269.5 |\n| ACT | 85 | 2022-09 | 3 | 253.5 |\n| ACT | 85 | 2022-10 | 5 |\
  \ 476 |\n| ACT | 85 | 2022-11 | 3 | 179.5 |\n| ~ 1802 行 ~ |\n\n下一步是生成按州和客户 ID 的汇总：\n\
  \n```sql\n--  州, 订单日期 汇总\nSELECT\nstate, id, NULL, count(*) AS nsales,\nsum(total)\
  \ AS total\nFROM salesdata\nGROUP BY state, id\nORDER BY state, id;\n--  州 汇总\n\
  SELECT\nstate, NULL, NULL, count(*) AS nsales,\nsum(total) AS total\nFROM salesdata\n\
  GROUP BY state\nORDER BY state;\n```\n\n你会得到类似以下的结果：\n\n| state | id | ?column?\
  \ | nsales | total |\n| --- | --- | --- | --- | --- |\n| ACT | 85 | [NULL] | 37\
  \ | 2418.5 |\n| ACT | 112 | [NULL] | 20 | 1272.5 |\n| ACT | 147 | [NULL] | 32 |\
  \ 2202 |\n| ACT | 355 | [NULL] | 13 | 689.5 |\n| ACT | 489 | [NULL] | 3 | 199 |\n\
  | NSW | 10 | [NULL] | 48 | 2931.5 |\n|  ~ 266 行 |\n\n以及\n\n| state | ? | ? | nsales\
  \ | total |\n| --- | --- | --- | --- | --- |\n| ACT | [NULL] | [NULL] | 105 | 6781.5\
  \ |\n| NSW | [NULL] | [NULL] | 1668 | 102010.22 |\n| NT | [NULL] | [NULL] | 103\
  \ | 6151 |\n| QLD | [NULL] | [NULL] | 869 | 53331.5 |\n| SA | [NULL] | [NULL] |\
  \ 499 | 30977.5 |\n| TAS | [NULL] | [NULL] | 456 | 28193 |\n| VIC | [NULL] | [NULL]\
  \ | 1273 | 79199.5 |\n| WA | [NULL] | [NULL] | 322 | 20274 |\n\n不用担心缺失的列名，我们会在 `UNION`\
  \ 中得到它们。\n\n包含所有这些 `NULL` 的原因是为了在 `UNION` 中组合结果时对齐列。\n\n最后，获取总计：\n\n```sql\n-- \
  \ 总计\nSELECT\nNULL, NULL, NULL, count(*) AS nsales,\nsum(total) AS total\nFROM salesdata\n\
  --  GROUP BY ()\n;\n```\n\n这会给你一行总计结果：\n\n| **?** | **?** | **?** | **nsales** |\
  \ **total** |\n| --- | --- | --- | --- | --- |\n| [NULL] | [NULL] | [NULL] | 5295\
  \ | 326918.22 |\n\n注意这里包含了被注释掉的 `GROUP BY ()` 子句，只是为了提醒这是一个总计；当然，你并不需要它。\n\n`UNION`\
  \ 子句可用于组合多个 `SELECT` 语句的结果。唯一的要求是它们的列数和列类型匹配。\n\n```sql\n--  所有分组汇总\nSELECT\nstate,\
  \ id, ordered, count(*) AS nsales,\nsum(total) AS total\nFROM salesdata\nGROUP BY\
  \ state,id,ordered\n--  州, 客户 ID 汇总\nUNION\nSELECT state, id, NULL, count(*), sum(total)\n\
  FROM salesdata\nGROUP BY state,id\n--  州 汇总\nUNION\nSELECT state, NULL, NULL, count(*),\
  \ sum(total)\nFROM salesdata\nGROUP BY state\n--  总计\nUNION\nSELECT NULL, NULL,\
  \ NULL, count(*), sum(total)\nFROM salesdata\n--  排序\nORDER BY state,id,ordered;\n\
  ```\n\n现在你得到了合并后的结果：\n\n| state | id | ordered | nsales | total |\n| --- | --- |\
  \ --- | --- | --- |\n| ACT | 85 | 2022-06 | 2 | 117 |\n| ACT | 85 | 2022-07 | 2\
  \ | 104.5 |\n| ACT | 85 | 2022-08 | 5 | 269.5 |\n| ACT | 85 | 2022-09 | 3 | 253.5\
  \ |\n| ACT | 85 | 2022-10 | 5 | 476 |\n| ACT | 85 | 2022-11 | 3 | 179.5 |\n| ACT\
  \ | 85 | 2022-12 | 2 | 84 |\n| ACT | 85 | 2023-01 | 4 | 248.5 |\n| ACT | 85 | 2023-03\
  \ | 3 | 209 |\n| ACT | 85 | 2023-04 | 6 | 384 |\n| ACT | 85 | 2023-05 | 2 | 93 |\n\
  | ACT | 85 | [NULL] | 37 | 2418.5 |\n| ACT | 112 | 2022-07 | 2 | 72 |\n| ACT | 112\
  \ | 2022-08 | 2 | 78 |\n| ACT | 112 | 2022-09 | 1 | 49 |\n| ACT | 112 | 2022-10\
  \ | 1 | 70.5 |\n| ~ 2077 行 |\n\n\n\n\n\n请注意，在 `UNION` 中，只有第一个查询为销售数量和总金额设置了别名；第一个查询的列名适用于整个结果集。如果这让你感觉更好，你可以为其余部分添加别名，但这不会产生任何影响。\n\
  \n当组合不同级别的汇总时，较高级别的汇总中会出现 `NULL` 而不是实际值。这是正确的，但很不方便：\n\n- 当排序时，`NULL` 可能出现在列表的开头或结尾。SQL\
  \ 标准对此态度模糊，不同的数据库管理系统（DBMS）有不同的看法，有些甚至让你选择。\n- 无论如何，结果集中的 `NULL` 是不清晰且无用的。\n\n为了解决排序问题，我们可以添加一个特殊值来强制排序顺序：\n\
  \n```sql\n--  所有分组汇总\nSELECT\nstate, id, ordered, count(*) AS nsales,\nsum(total)\
  \ AS total,\n0 AS state_level, 0 AS id_level, 0 AS ordered_level\nFROM salesdata\n\
  GROUP BY state,id,ordered\n--  state, ordered 汇总\nUNION\nSELECT\nstate, id, NULL,\
  \ count(*), sum(total),\n0, 0, 1\nFROM salesdata\nGROUP BY state,id\n--  state 汇总\n\
  UNION\nSELECT\nstate, NULL, NULL, count(*), sum(total),\n0, 1, 1\nFROM salesdata\n\
  GROUP BY state\n--  总计\nUNION\nSELECT\nNULL, NULL, NULL, count(*), sum(total),\n\
  1, 1, 1\nFROM salesdata\n--  排序\nORDER BY state_level, state, id_level, id,\nordered_level,\
  \ ordered;\n```\n\n为了得到正确的结果顺序，我们引入了两个值 `state_level` 和 `town_level`，这样我们就可以将总计行推到其他值之下。\n\
  \n| **state** | **id** | **ordered** | **nsales** | **total** | **state_level**\
  \ | **id_level** | **ordered_level** |\n| --- | --- | --- | --- | --- | --- | ---\
  \ | --- |\n| ACT | 85 | 2022-06 | 2 | 117 | 0 | 0 | 0 |\n| ACT | 85 | 2022-07 |\
  \ 2 | 104.5 | 0 | 0 | 0 |\n| ACT | 85 | 2022-08 | 5 | 269.5 | 0 | 0 | 0 |\n| ACT\
  \ | 85 | 2022-09 | 3 | 253.5 | 0 | 0 | 0 |\n| ACT | 85 | 2022-10 | 5 | 476 | 0 |\
  \ 0 | 0 |\n| ACT | 85 | 2022-11 | 3 | 179.5 | 0 | 0 | 0 |\n| ACT | 85 | 2022-12\
  \ | 2 | 84 | 0 | 0 | 0 |\n| ACT | 85 | 2023-01 | 4 | 248.5 | 0 | 0 | 0 |\n| ACT\
  \ | 85 | 2023-03 | 3 | 209 | 0 | 0 | 0 |\n| ACT | 85 | 2023-04 | 6 | 384 | 0 | 0\
  \ | 0 |\n| ACT | 85 | 2023-05 | 2 | 93 | 0 | 0 | 0 |\n| ACT | 85 | [NULL] | 37 |\
  \ 2418.5 | 0 | 0 | 1 |\n| ACT | 112 | 2022-07 | 2 | 72 | 0 | 0 | 0 |\n| ACT | 112\
  \ | 2022-08 | 2 | 78 | 0 | 0 | 0 |\n| ACT | 112 | 2022-09 | 1 | 49 | 0 | 0 | 0 |\n\
  | ACT | 112 | 2022-10 | 1 | 70.5 | 0 | 0 | 0 |\n| ~ 2077 rows ~ |\n\n为了从结果集中消除排序列，你可以将其转换为公用表表达式（Common\
  \ Table Expression）：\n\n```sql\nWITH cte AS (\n--  上面的 UNION 查询\n)\nSELECT state,\
  \ id, ordered, nsales, total\nFROM cte\nORDER BY state_level,state,id_level,id,ordered_level,ordered;\n\
  ```\n\n虽然得到这个结果需要一些工作，但可能有更简单的方法。\n\n### 使用 GROUPING SETS、CUBE 和 ROLLUP\n\n分组集（`GROUPING\
  \ SETS`）为上面的 `UNION` 提供了一种更简单的替代方案。它们的语法不是立即显而易见的，但遵循与 `GROUP BY` 子句类似的模式。\n\n并非所有数据库管理系统都完全支持分组集。大多数支持一个更简单的版本，但\
  \ SQLite 完全不支持。如果你使用 SQLite，你能做的最好就是像我们之前用 `UNION` 所做的那样。\n\n在大多数情况下，你可能想要的是稍后描述的\
  \ `ROLLUP`。\n\n#### GROUPING SETS 和 CUBE（PostgreSQL、MSSQL 和 Oracle）\n\n最通用的技术是使用\
  \ `GROUPING SETS` 子句。在此子句中，你可以指定要包含在汇总中的列的组合。\n\n语法是\n\n```sql\nSELECT columns\n\
  FROM table\nGROUP BY GROUPING SETS ((set),(set));\n```\n\n回想一下，前面的例子有按 `state`、客户\
  \ `id`、`ordered` 日期分组的 `SELECT` 语句，以及一个总计。这可以按如下方式生成：\n\n```sql\nSELECT state,town,count(*)\n\
  FROM customers\nGROUP BY GROUPING SETS ((state,id,ordered),(state,id),(state),());\n\
  ```\n\n这里，集合 `()` 表示总计。\n\n还可以使用许多其他组合（例如 `(state,ordered)`）。如果你真的想要所有组合，可以使用 `CUBE`：\n\
  \n```sql\nSELECT state, id, ordered, count(*), sum(total)\nFROM salesdata\nGROUP\
  \ BY CUBE (state,id,ordered)\n```\n\n当你没有太多分组列，并且它们彼此都无关时，`CUBE` 变体效果最好。记住，三列会给你八种可能的组合。可能性的数量可以计算为\
  \ `2^n`，其中 `n` 是列数。在这种情况下，是 `2³ = 8`。如果你有四列，你将有 16 种可能的总计和小计，这可能开始变得难以处理。\n\n####\
  \ 使用 ROLLUP（PostgreSQL、MSSQL、Oracle 和 MariaDB/MySQL）\n\n一个更简单、更易读（但灵活性稍差）的替代方法是使用\
  \ `ROLLUP`。它有两种形式：\n\n```sql\n--  ROLLUP(...)       -   PostgreSQL, MSSQL, Oracle\n\
  SELECT state, id, ordered, count(*), sum(total)\nFROM salesdata\nGROUP BY ROLLUP\
  \ (state, id, ordered);\n--  ... WITH ROLLUP   -   MariaDB / MySQL, MSSQL\nSELECT\
  \ state, id, ordered, count(*), sum(total)\nFROM salesdata\nGROUP BY state, id,\
  \ ordered WITH ROLLUP;\n```\n\n两种形式都会给你相同的结果。请注意，MSSQL 允许你选择使用任一形式。\n\n`ROLLUP`\
  \ 做出了一个重要假设，即这些列形成了某种层次结构。在客户 `state` 和客户 `id` 的情况下，这是显而易见的。你是否将 `ordered` 日期视为层次结构的末端取决于你。\n\
  \n你可以在结果中看到这种层次结构，并且它与之前的 `GROUPING SETS` 示例相匹配。你将获得以下结果：\n\n1.  `(state, id, ordered)`\
  \ 组合\n2.  `(state, id)` 组合\n3.  `(state)` 值\n4.  `()` – 总计\n\n显然，使用 `ROLLUP` 是获得这些结果的更简单方法，你可能不会太怀念\
  \ `GROUPING SETS` 的灵活性。\n\n\n\n\n## 概述\n\n### 排序结果\n\n在一些数据库管理系统中，您可能会看到结果自动按之前\
  \ `UNION` 版本相同的顺序排序。在其他系统中，您需要自己进行排序。\n\n这又遇到了前面提到的与 `UNION` 版本相关的两个问题。为了解决第二个问题，即排序顺序问题，我们可以使用\
  \ `grouping(column)` 函数，它指示被汇总列的层级。值为 `1` 表示这是一个汇总行，`0` 表示不是。这将与前面虚构的层级列具有相同的效果：\n\
  \n```sql\n--  ROLLUP(...):      PostgreSQL, MSSQL, Oracle\nSELECT state, id, ordered,\
  \ count(*), sum(total)\nFROM salesdata\nGROUP BY ROLLUP (state,id,ordered)\nORDER\
  \ BY grouping(state), state, grouping(id), id,\ngrouping(ordered), ordered;\n--\
  \  ... WITH ROLLUP: MySQL, MSSQL\n--  (MariaDB 不支持 grouping())\nSELECT state, id,\
  \ ordered, count(*), sum(total)\nFROM salesdata\nGROUP BY state,id,ordered WITH\
  \ ROLLUP\nORDER BY grouping(state), state, grouping(id), id,\ngrouping(ordered),\
  \ ordered;\n```\n\n您将获得一个排序更好的表。\n\n请注意，虽然 MySQL 支持 `grouping()`，但 MariaDB *不支持*\
  \ `grouping()` 函数！\n\n在 PostgreSQL 和 MySQL 中，您可以在多个列上使用 `grouping()`。这将给出一个组合层级，它是\
  \ `1` 和 `0` 的二进制组合。在 MSSQL 和 Oracle 中，您需要使用 `grouping_id()` 函数来实现这一点。\n\n为了解决第一个问题，即无意义的\
  \ `NULL` 标记问题，我们必须对 `SELECT` 子句进行更有创意的处理。在这种情况下，我们可以使用 `coalesce` 来选取 `NULL` 并提供替代值：\n\
  \n```sql\n--  PostgreSQL, MSSQL;\nSELECT\ncoalesce(state,'National Total') AS state,\n\
  coalesce(cast(id as varchar),state||' Total') AS id,\ncoalesce(ordered,'Total for\
  \ '||cast(id as varchar))\nAS ordered,\ncount(*), sum(total)\nFROM salesdata\nGROUP\
  \ BY ROLLUP (state,id,ordered)\nORDER BY grouping(state), state,\ngrouping(id),\
  \ id, grouping(ordered), ordered;\n--  MySQL, MSSQL (MariaDB 不支持 grouping())\nSELECT\n\
  coalesce(state,'National Total') AS state,\ncoalesce(cast(id as varchar),state||'\
  \ Total') AS id,\ncoalesce(ordered,'Total for '||cast(id as varchar))\nAS ordered,\n\
  count(*), sum(total)\nFROM salesdata\nGROUP BY state,id,ordered WITH ROLLUP\nORDER\
  \ BY grouping(state), state,\ngrouping(id), id, grouping(ordered), ordered;\n--\
  \   NOT Oracle\n```\n\n这将为您在汇总行提供一些有意义的内容。\n\n### 在 Oracle 中重命名值\n\n您会注意到这对 Oracle\
  \ 无效。在这方面，Oracle 被证明是无帮助的，因为 (a) `NULL` 字符串等同于空字符串 (`''`)，因此它们不会合并，(b) 所选列不再被认为匹配\
  \ `GROUP BY` 子句，以及 (c) 当您进行了其他更改后，在使用 `grouping()` 函数排序时也会遇到问题。\n\n使其工作的最直接方法是对列使用\
  \ `CASE` 表达式：\n\n```sql\nSELECT\ncoalesce(state,'National Total') AS state,\ngrouping(state)\
  \ AS statelevel,\nCASE\nWHEN state IS NULL THEN NULL\nWHEN id IS NULL THEN 'Total\
  \ for '||state\nELSE cast(id AS varchar(3))\nEND AS id,\ngrouping(id) AS idlevel,\n\
  CASE\nWHEN id IS NULL THEN NULL\nWHEN ordered IS NULL THEN\n'Total for '||cast(id\
  \ as varchar(3))\nELSE ordered\nEND AS ordered,\ngrouping(ordered) AS orderedlevel,\n\
  count(*) AS count, sum(total) AS sum\nFROM salesdata\nGROUP BY ROLLUP (state,id,ordered)\n\
  ORDER BY statelevel, state, idlevel, id, orderedlevel, ordered\n;\n```\n\n它看起来像这样：\n\
  \n| **state** | statelevel | **id** | idlevel | **ordered** | orderedlevel | **count**\
  \ | **sum** |\n| --- | --- | --- | --- | --- | --- | --- | --- |\n| ACT | 0 | 112\
  \ | 0 | 2022-07 | 0 | 2 | 72 |\n| ACT | 0 | 112 | 0 | 2022-08 | 0 | 2 | 78 |\n|\
  \ ACT | 0 | 112 | 0 | 2022-09 | 0 | 1 | 49 |\n| ACT | 0 | 112 | 0 | 2022-10 | 0\
  \ | 1 | 70.5 |\n| ACT | 0 | 112 | 0 | 2022-11 | 0 | 1 | 94 |\n| ACT | 0 | 112 |\
  \ 0 | 2022-12 | 0 | 4 | 224 |\n| ACT | 0 | 112 | 0 | 2023-01 | 0 | 1 | 48.5 |\n\
  | ACT | 0 | 112 | 0 | 2023-02 | 0 | 5 | 320 |\n| ACT | 0 | 112 | 0 | 2023-03 | 0\
  \ | 2 | 191.5 |\n| ACT | 0 | 112 | 0 | 2023-05 | 0 | 1 | 125 |\n| ACT | 0 | 112\
  \ | 0 | Total for 112 | 1 | 20 | 1272.5 |\n| ACT | 0 | 147 | 0 | 2022-08 | 0 | 8\
  \ | 392 |\n| ACT | 0 | 147 | 0 | 2022-09 | 0 | 2 | 199.5 |\n| ACT | 0 | 147 | 0\
  \ | 2022-10 | 0 | 2 | 162 |\n| ACT | 0 | 147 | 0 | 2022-11 | 0 | 3 | 228.5 |\n|\
  \ ACT | 0 | 147 | 0 | 2022-12 | 0 | 3 | 251 |\n| ~ 2077 行 ~ |\n\n这里，`grouping()`\
  \ 函数在 `SELECT` 子句中使用，然后用于排序。`id` 和 `ordered` 列使用 `CASE ... END` 表达式计算，以解决 `NULL`\
  \ 字符串的问题。\n\n当然，现在您有那三个用于排序的额外列。要隐藏它们，您可以使用 CTE：\n\n```sql\nWITH cte AS (\n-- 上面的\
  \ SELECT 语句\n--  无需包含 ORDER BY 子句\n)\nSELECT state, id, ordered, count, sum\nFROM\
  \ cte\nORDER BY statelevel, state, idlevel, id, orderedlevel, ordered\n;\n```\n\n\
  顺便说一下，前面的语句包含了 `ORDER BY` 子句。您可以将其包含在 CTE 中（在 MSSQL 中不行），但这是不必要的，因为我们在主查询中无论如何都会进行排序，所以您应该省略它。\n\
  \n### 直方图、平均值、众数和中位数\n\n您可能在学校学过一些简单的统计知识。以下是一些基本概念的提醒：\n\n*   **频数表** 是值及其出现频率的表格。\n\
  *   **平均值**，或更专业地称为 **算术平均数**，就是我们通常所说的 **平均值**：它是总和除以值的个数。\n*   **众数** 是出现最频繁的值。\n\
  *   **中位数** 是值的中间值（如果它们都按顺序排列）。\n\n您可以使用频数表生成 **直方图**，这就是电子表格程序所说的条形图。例如，您可以生成按身高（厘米）划分的客户数量的频数表和直方图。它看起来像图\
  \ 5-4。\n\n![](img/606708_1_En_5_Fig4_HTML.jpg)\n\n直方图说明了正态分布。大多数值落在 166 到 177 之间。\n\
  \n图 5-4\n\n直方图\n\n如果您的值基于多个不同的因素，它们倾向于沿着众所周知的“钟形曲线”分布。大多数值出现在中间附近，离中间越远，值出现的频率就越低。这更专业地称为\
  \ **正态分布**。\n\n您的身高取决于许多因素，其中一些包括遗传、饮食和其他生活方式因素。因此，正如您在上图中看到的那样，客户身高往往遵循正态分布。当然，如果我们有更大的数据集合，这种趋势会变得更强：如果只有几百个样本，那么数据就不会那么紧密地拟合。\n\
  \n出于本次讨论的目的，我们将重点讨论客户身高，因为它们往往更容易以这种方式进行分析。\n\n尽管样本数据是随机的，但它是按照小样本中可能预期的正态分布生成的。\n\
  \n对于澳大利亚成年人，平均身高约为 168.7 厘米。实际上，有两个平均身高，一个是成年女性，一个是成年男性，但两者的平均值是 168.7 厘米。标准差是 7\
  \ 厘米。您可以在 [`https://en.wikipedia.org/wiki/Average_human_height_by_country`](https://en.wikipedia.org/wiki/Average_human_height_by_country)\
  \ 获取更多信息。\n\n\n### 计算均值\n\n在统计学和数学中，“平均值”这个词有些模糊，因为有多种测量方式可以描述平均情况。我们这里感兴趣的是**算术平均值**。你已经有一个内置的聚合函数\
  \ `avg()` 来计算平均值：\n\n```sql\nSELECT avg(height) AS mean FROM customers;\n```\n\n\
  你将得到类似下面的结果：\n\n| **平均值** |\n| 170.844 |\n\n如果愿意，你可以使用 `sum(height)/count(height)`\
  \ 来计算平均值，但这除了证明两者相同外，没有其他意义。\n\n这个数字相当合理。成年人的平均身高约为 168.7 厘米。\n\n### 生成频率表\n\n频率表列出了一个值在表中出现的次数。如果这听起来像是你以前做过的事情，那你是对的。这只不过是结合使用\
  \ `GROUP BY` 和 `count(*)`。\n\n然而，首先我们需要让数据更容易分组。如果数据粒度太细，就不会有太多重复项——讽刺的是，细节过多反而难以总结。\n\
  \n这里，身高测量到了 0.1 厘米。我们将通过将其四舍五入到整数厘米来准备数据：\n\n```sql\nSELECT floor(height+0.5) AS\
  \ height\nFROM customers\nWHERE height IS NOT NULL;\n```\n\n我们还过滤掉了缺失的身高值，为你提供\n\
  \n| **身高** |\n| 169 |\n| 171 |\n| 153 |\n| 176 |\n| 156 |\n| 176 |\n| ~ 267 行 ~\
  \ |\n\n我们本可以使用 `round()` 函数进行四舍五入，但某些数据库管理系统倾向于四舍五入到最近的偶数，因此上述方法会更可靠。\n\n将数据放入一个公共表表达式中，然后我们可以使用简单的\
  \ `GROUP BY` 查询：\n\n```sql\nWITH heights AS (\nSELECT floor(height+0.5) AS height\n\
  FROM customers\nWHERE height IS NOT NULL\n)\nSELECT height, count(*) AS frequency\n\
  FROM heights\nGROUP BY height\nORDER BY height;\n```\n\n这将得到\n\n| **身高** | **频数**\
  \ |\n| --- | --- |\n| 153 | 1 |\n| 154 | 3 |\n| 156 | 1 |\n| 157 | 3 |\n| 158 |\
  \ 1 |\n| 159 | 2 |\n| ~ 36 行 ~ |\n\n注意可能存在一些缺失值。这很自然，尤其是在我们这样相对较小的样本中。然而，由于这些间隔，它还不完全适合制作直方图。稍后，当我们更仔细地研究递归公共表表达式时，我们将看到如何填补这些空白。\n\
  \n### 计算众数\n\n众数是出现最频繁的值。实际上，可能有多个众数并列第一。\n\n要获得众数，你首先需要获得频数，然后找到最大频数。原则上，你是在寻找\
  \ `max(count(*))`，但你不能像那样嵌套聚合函数。这意味着需要多一步操作，而这又意味着需要更多的公共表表达式。\n\n从前面的频率表开始，我们可以将结果放入另一个公共表表达式中：\n\
  \n```sql\nWITH\nheights AS (\nSELECT floor(height+0.5) AS height\nFROM customers\n\
  WHERE height IS NOT NULL\n),      --  别忘了在这里加逗号\nfrequency_table AS (\nSELECT height,\
  \ count(*) AS frequency\nFROM heights\nGROUP BY height\n)\n...\n```\n\n你还需要最大频数，这必须作为一个单独的步骤来计算：\n\
  \n```sql\nWITH\nheights AS (\n...\n),\nfrequency_table AS (\n...\n),      --  别忘了在这里加逗号\n\
  limits AS (\nSELECT max(frequency) AS max FROM frequency_table\n)\n...\n```\n\n\
  最后，你可以将频率表与 `limits` 公共表表达式进行交叉连接，以找到众数：\n\n```sql\nWITH\nheights AS (\n...\n),\n\
  frequency_table AS (\n...\n),\nlimits AS (\n...\n)\nSELECT height, frequency\nFROM\
  \ frequency_table,limits\nWHERE frequency_table.frequency=limits.max\nORDER BY height;\n\
  ```\n\n你将得到类似下面的结果：\n\n| **身高** | **频数** |\n| --- | --- |\n| 172 | 22 |\n\n在一组完美的正态数据中，众数应该与均值完全匹配。在现实生活中，它应该是接近的。\n\
  \n### 计算中位数\n\n中位数是中间值。这意味着一半的值应低于中位数，一半应高于中位数。\n\n要找到中位数，需要将所有值排序并找到中点。如果你愿意，可以这样做，但这涉及到我们尚未掌握的一些技巧，特别是获取行号。我们将在后面关于窗口函数的章节中探讨这一点。\n\
  \n幸运的是，现代 SQL 包含一个名为 `percentile_cont` 的函数。不幸的是，并非所有数据库管理系统都以相同方式使用它，而 SQLite 则完全不支持它。\n\
  \n`percentile_cont()` 函数根据百分位数来查找值。百分位数是按 100 组分组。第 50 百分位数将位于中间。\n\n要在 PostgreSQL\
  \ 中查找中位数：\n\n```sql\n--  PostgreSQL: 仅聚合函数\nSELECT percentile_cont(0.5)\nWITHIN\
  \ GROUP (ORDER BY height)\nFROM customers\nWHERE height IS NOT NULL;\n```\n\n这应该会给出类似的结果\n\
  \n| **percentile_cont** |\n| 171.2 |\n\n如注释所述，在 PostgreSQL 中，`percentile_cont()`\
  \ 仅是一个聚合函数，而这正是我们想要的。\n\n聚合函数的替代方案是什么？它是我们稍后将研究的窗口函数之一。窗口函数类似于聚合函数，但它为每一行计算，而不仅仅是作为一个摘要。\n\
  \n使用窗口函数版本，我们可以用\n\n```sql\n--  MySQL / MariaDB, MSSQL, Oracle: 仅窗口函数\nSELECT percentile_cont(0.5)\n\
  WITHIN GROUP (ORDER BY height) OVER()\nFROM customers\nWHERE height IS NOT NULL;\n\
  ```\n\n问题是你将在多行中得到相同的值。为了完成这项工作，你可以使用 `DISTINCT`：\n\n```sql\n--  MySQL / MariaDB,\
  \ MSSQL, Oracle: 仅窗口函数\nSELECT DISTINCT percentile_cont(0.5)\nWITHIN GROUP (ORDER\
  \ BY height) OVER()\nFROM customers\nWHERE height IS NOT NULL;\n```\n\n这样现在就会给你中位数。\n\
  \n### 标准差\n\n标准差是衡量数据变化程度的指标。对于正态分布，大约 68%的结果应落在均值的一个标准差范围内。\n\n低于预期的标准差表明结果相当接近，而高于预期的标准差则表明结果比预期的更随机。无论哪种情况，你都会怀疑数据存在偏差——无论是由于数据选择方式，还是暗示部分数据是编造的。\n\
  \n例如，如果身高是正态分布的，你会发现一个标准差相当于 7 厘米，并且 68%的客户应位于均值两侧 7 厘米的范围内。\n\n要计算标准差，SQL 有一个简单的聚合函数，你之前已经见过。\n\
  \n你可能想知道为什么有两个。如果你知道你拥有所有值，你可以使用 `stddev_pop(height)` （或者对于 MSSQL 使用 `stdevp(height)`）。然而，我们并不知道，所以我们可以将我们所拥有的视为一个样本。为此，我们使用\
  \ `stddev_samp(height)` （或者对于 MSSQL 使用 `stdev(height)`）：\n\n```sql\nSELECT\nstddev_pop(height)\
  \ AS sd\n--  stdevp(height) AS sd        --  MSSQL\nFROM customers;\n```\n\n你应该得到接近\
  \ 7 的值：\n\n| **Sd** |\n| 6.979 |\n\n请记住，只有当你认为底层数据遵循正态分布时，标准差才有意义。\n\n"
- '# 总结


  在本章中，我们了解了如何聚合数据集。


  ### 基本聚合函数


  基本聚合函数有：


  *   `count()`，计算列中的值数或表中的行数。

  *   `sum` 和 `avg`，对列中的数字进行求和或求平均值。

  *   `max` 和 `min`，查找任何类型列的最小值和最大值。实际上，它们是在按该列排序时查找第一个和最后一个值。

  *   `stddev`, `stddev_samp`, `stddev_pop` (PostgreSQL, MySQL/MariaDB, Oracle) `stdev`,
  `stdevp` (MSSQL)。计算一列数字的总体或样本标准差；我们假设数据是正态分布的。


  `sum`、`avg` 和标准差函数只能应用于数字数据。




  ### NULL 值


  所有聚合函数都会跳过 `NULL`。这在计数值时尤其重要，计算平均值时也是如此。


  `NULL` 会被跳过这一事实，也可以在计算选择性聚合时加以利用。


  ### 聚合过程


  你聚合的数据不一定来自已保存的表。你也可以聚合由连接、公用表表达式和视图生成的虚拟表。


  聚合数据时，数据可能先被 `WHERE` 子句过滤。聚合是基于过滤后剩余的数据进行的。


  执行聚合操作实质上是将原始数据转换成一个或多个汇总行的虚拟表。这不再包含原始数据。你只能选择虚拟汇总表中存在的内容。因此，你无法在单个 `SELECT` 子句中混合聚合数据和原始数据。


  如果你同时需要原始数据和汇总数据，你可能需要将原始表与包含汇总数据的 CTE 进行连接。


  ### 聚合过滤器


  可以过滤用于单个聚合函数的数据。


  有一个标准的 `FILTER (WHERE ...)` 子句，允许你对列进行过滤。然而，它（目前）尚未得到广泛支持。


  过滤数据的常用方法是在要聚合的内容上使用 `CASE ... END` 表达式。为你想要的值设置一个值，例如 `1`，让其余的值默认为 `NULL`，并让聚合函数在后续处理中忽略它们。


  你也可以在 `DISTINCT`（不同的）值上进行聚合。这在计数时最有意义。


  ### GROUP BY


  `GROUP BY` 子句可用于生成一个组汇总的虚拟表。


  在某些 DBMS 中，你可以使用 `GROUP BY ()` 来生成总计。这是没有 `GROUP BY ()` 子句时的默认行为，并且每当 SQL 看到聚合函数时都会自动完成。它从来都不是真正必需的。


  你可以按基本值分组，也可以按计算值分组。


  按计算值分组可能会变得复杂，因为 `SELECT` 和 `ORDER BY` 子句只能使用 `GROUP BY` 子句中的内容。由于子句的顺序，你可能会发现自己在各个子句中重复相同的计算。


  由于 `SELECT` 子句只在最后阶段进行求值，并且选择和排序只能基于 `GROUP BY` 子句中的内容，你可能会发现以下技术很有帮助：


  *   使用冗余分组来选择一项并按另一项排序。

  *   将聚合查询放在一个 CTE 中，并将其与其他表连接以获取其余结果。


  按列分组时，结果可能不会按正确顺序排列。由于组名都是字符串，按组名排序只会将它们按字母顺序排列，这并不总是合适的。但是，你也可以根据它们在另一个字符串中的位置来排序，这个字符串可以按你喜欢的任何顺序排列。


  ### 混合小计


  总的来说，聚合查询产生的是单一层级的简单聚合。有时，你需要将它们与不同级别的小计结合起来。


  你可以在单独的查询中生成小计，然后用 `UNION` 将它们组合起来。你可能需要一些额外的工作才能让结果按你希望的顺序排列。


  大多数 DBMS 包含小计操作来自动创建组合结果。它们可能包括 `GROUPING SETS`、`ROLLUP` 或 `CUBE`。大多数包含 `ROLLUP`，这是最常见的变体。还有其他的分组函数来辅助排序和标记。


  ### 统计


  一般来说，聚合函数本质上是统计性的。虽然 SQL 不像专门的统计软件那样强大，但你可以使用聚合和分组来生成一些基本的统计数据。


  ## 后续内容


  在某些情况下，我们使用公用表表达式中的查询来准备数据。然而，在其中一个案例中，我们创建了一个视图，以便可以重用该查询。


  在下一章中，我们将更仔细地研究如何创建和使用视图来改进我们的工作流程。


