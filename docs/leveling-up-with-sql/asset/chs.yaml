- "# 6. 使用视图及其相关对象\n\n这不是你第一次在书中看到视图，也不会是最后一次。\n\n本章整合了你可能已经了解到的关于视图和相关概念的知识，并提供了一些关于如何一般性地使用它们的想法。\n\
  \n你可以用一生来编写 SQL 语句，工作也能完成。然而，你可能会达到一个点，即一遍又一遍地写同样的东西失去了魅力，因此你会想要找到重用先前查询的方法。\n\n\
  首先，让我们看看表是什么，以及当你使用 `SELECT` 语句时会发生什么。\n\nSQL 数据库将数据存储在表中。实际上，并非如此——每个表实际上存储在其他某种结构中，例如二进制树，这样更高效。然而，当你看到它时，它将被呈现为一个表，并且在数据库中就是这样称呼的。\n\
  \n表由行和列组成。出于我们的目的，表不一定是永久表，并且有些操作会生成表结构而不一定被永久存储。我们将它们称为 **虚拟表**。\n\n以下是一些生成（虚拟）表的操作，按持久性递增的顺序排列：\n\
  \n*   `SELECT` 语句的结果是一个虚拟表。\n*   一个 **连接** 是两个或多个（虚拟）表的组合，以产生一个扩展的虚拟表。\n*   一个 **公用表表达式**\
  \ 生成一个虚拟表，你可以在查询的后面部分使用它。表子查询本质上是相同的东西。\n*   一个 **视图** 是一个保存的 `SELECT` 查询，将在调用时重新生成虚拟表。\n\
  \    一个 **物化视图** 是一种存储其结果的视图，因此不必总是重新生成所有内容。\n    一些 DBMS 支持 **表值函数**，这些是生成虚拟表的函数。\n\
  *   一个 **临时表** 就像一个真实的表。它可能存储在磁盘上，也可能不存储。当会话结束时，它会自动销毁。\n\n关于表和虚拟表的关键点是，它们都可以在 `FROM`\
  \ 子句中使用。\n\n你已经知道如何使用连接。你也使用过公用表表达式，我们将在接下来的章节中更深入地讨论它们。\n\n在本章中，我们将研究其余的对象，以及我们如何利用它们来改进我们的工作流程。\n\
  \n\n\n## 处理视图\n\n到目前为止，你已经创建过一两个视图了，所以对这部分内容应该比较熟悉。\n\n视图是一个保存在数据库中的 `SELECT` 语句。当视图被保存时，数据库管理系统（DBMS）通常也会保存其执行计划，因此下次规划相同查询时就不会浪费太多时间。\n\
  \n任何你需要从表中读取数据的地方，都可以使用视图。你可以把视图看作一个虚拟表——其行为表现得就像一个表。\n\n要从视图中读取数据，你就像对待表一样对待它：\n\
  ```\nSELECT columns FROM view;\n```\n\n请注意，其语法与表的语法完全相同。从 `SELECT` 语句的角度来看，从视图中选择数据和从表中选择数据没有区别。\n\
  \n一个重要的结果是，你不能有与表同名的视图——视图和表共享同一个命名空间。\n\n这并不意味着它们没有区别。数据库管理系统将视图存储为不同类型的对象，并以不同的方式管理它们。然而，一旦创建，你就可以像对待表一样对待视图。\n\
  \n视图可以成为你工作流中的重要组成部分。例如：\n-   保存复杂的查询以供简单使用\n-   向外部应用程序暴露复杂的查询\n-   在现有数据和应用程序之间创建接口\n\
  -   作为某些查询的替代方案\n\n创建视图需要权限，而你作为数据库用户可能尚未拥有这些权限。请采取必要行动来获取这些权限——根据需要，去恳求、贿赂或要挟吧。\n\
  \n视图有几个好处：\n-   你可以用一个只返回结果虚拟表的视图来隐藏复杂的处理过程。\n-   你可以通过创建只包含特定行和列的视图来限制对表中数据的访问。\n\
  -   你可以隐藏聚合查询中的细节。\n\n也存在一些限制。主要限制是视图不够灵活。例如，你无法改变视图可能用来计算结果的值。稍后我们讨论表值函数时，你会看到一个可能的解决方案。\n\
  \n其他限制因数据库管理系统而异。一些数据库管理系统支持临时视图。MSSQL 不允许在视图中使用 `ORDER BY`，除非使用一些额外技巧。一些数据库管理系统支持在临时表上创建视图，而另一些则不支持。\n\
  \n然而，在大多数情况下，视图将简化你的工作流程，使你能够转向更复杂的任务。\n\n### 创建视图\n\n视图始于一个简单的 `SELECT` 语句。例如，我们可以开始开发一个\
  \ `pricelist` 视图，它将包含有关书籍、其作者和价格（含税）的一些信息：\n```\n/* 注释\n===================================================\n\
  MSSQL:  使用 + 进行拼接\nOracle: 表别名不能使用 AS:\nFROM books b JOIN authors a ON ...\n===================================================\
  \ */\nSELECT\nb.id, b.title, b.published,\ncoalesce(a.givenname||' ','')\n|| coalesce(othernames||'\
  \ ','')\n|| a.familyname AS author,\nb.price, b.price*0.1 AS tax, b.price*1.1 AS\
  \ inc\nFROM books AS b LEFT JOIN authors AS a ON b.authorid=a.id\nWHERE b.price\
  \ IS NOT NULL;\n```\n\n这应该会给你类似这样的结果：\n\n| `id` | `title` | `pub` | `author` | `price`\
  \ | `tax` | `inc` |\n| --- | --- | --- | --- | --- | --- | --- |\n| 2078 | The Duel\
  \ | 1811 | Heinrich von Kleis ... | 12.50 | 1.25 | 13.75 |\n| 503 | Uncle Silas\
  \ | 1864 | J. Sheridan Le Fan ... | 17.00 | 1.70 | 18.70 |\n| 2007 | North and South\
  \ | 1854 | Elizabeth Gaskell | 17.50 | 1.75 | 19.25 |\n| 702 | Jane Eyre | 1847\
  \ | Charlotte Brontë | 17.50 | 1.75 | 19.25 |\n| 1530 | Robin Hood, The Pr ... |\
  \ 1862 | Alexandre Dumas | 12.50 | 1.25 | 13.75 |\n| 1759 | La Curée | 1872 | Émile\
  \ Zola | 16.00 | 1.60 | 17.60 |\n| ~ 1096 行 ~ |\n\n由于这是一个价格列表，我们过滤掉了 `NULL` 价格。\n\
  \n但是，需要满足某些条件：\n-   视图中的所有列都必须有名称，包括计算列。你不能像在简单的 `SELECT` 语句中那样拥有匿名列。\n-   列名必须是唯一的。这在连接表时尤其重要，因为列名可能会重复。\n\
  \n换句话说，虚拟表必须符合真实表的规则。\n\n要创建视图，需要在 `SELECT` 语句前加上 `CREATE VIEW ... AS` 子句：\n```\n\
  /* 注释\n===================================================\nMSSQL:  使用 + 进行拼接\n\
  MSSQL:  用 GO 包围 CREATE VIEW\nOracle: 表别名不能使用 AS:\nFROM books b JOIN authors a ON\
  \ ...\n=================================================== */\n--  GO\nCREATE VIEW\
  \ aupricelist AS\nSELECT\nb.id, b.title, b.published,\ncoalesce(a.givenname||' ','')\n\
  || coalesce(othernames||' ','')\n|| a.familyname AS author,\nb.price, b.price*0.1\
  \ AS tax, b.price*1.1 AS inc\nFROM books AS b JOIN authors AS a ON b.authorid=a.id;\n\
  --  GO\n```\n\n这将被保存到你的数据库中。\n\n我们将这个价格列表命名为 `aupricelist`，因为税率设为 10%，这是澳大利亚的税率。你可以随意使用任何你喜欢的税率和名称。\n\
  \n-   仅在 Microsoft SQL Server 中，你需要将 `CREATE VIEW` 语句与脚本的其余部分分开。通过在前后放置 `GO` 来实现，`GO`\
  \ 标记了他们所谓的“批处理”。`GO` 必须单独占一行。\n\n现在，你可以像读取表一样读取相应的结果：\n```\nSELECT * FROM aupricelist;\n\
  ```\n\n这将给你与之前相同的结果。\n\n你可以像过滤表一样过滤视图：\n```\nSELECT *\nFROM aupricelist\nWHERE published\
  \ BETWEEN 1700 AND 1799;\n```\n\n这会得到：\n\n| `id` | `title` | `pub` | `author` |\
  \ `price` | `tax` | `inc` |\n| --- | --- | --- | --- | --- | --- | --- |\n| 1608\
  \ | The Autobiography ... | 1791 | Benjamin Franklin | 18.50 | 1.85 | 20.35 |\n\
  | 2303 | The Metaphysics of ... | 1797 | Immanuel Kant | 12.00 | 1.20 | 13.20 |\n\
  | 1305 | An Essay on Critic ... | 1711 | Alexander Pope | 11.00 | 1.10 | 12.10 |\n\
  | 1963 | A Treatise of Huma ... | 1740 | David Hume | 18.50 | 1.85 | 20.35 |\n|\
  \ 1196 | Equiano’s Travels: ... | 1789 | Olaudah Equiano | 12.50 | 1.25 | 13.75\
  \ |\n| 1255 | Discourse on the O ... | 1755 | Jean-Jacques Rouss ... | 19.00 | 1.90\
  \ | 20.90 |\n| ~ 166 行 ~ |\n\n你也可以对结果进行排序：\n```\nSELECT * FROM aupricelist ORDER\
  \ BY title;\n```\n\n这会得到：\n\n| `id` | `title` | `pub` | `author` | `price` | `tax`\
  \ | `inc` |\n| --- | --- | --- | --- | --- | --- | --- |\n| 541 | 120 Days of Sodom\
  \ | 1904 | Marquis de Sade | 12.50 | 1.25 | 13.75 |\n| 729 | A Cartomante e Out\
  \ ... | 1884 | Machado de Assis | 16.00 | 1.60 | 17.60 |\n| 2092 | A Chaste Maid\
  \ in C ... | 1613 | Thomas Middleton | 15.00 | 1.50 | 16.50 |\n| 1437 | A Child’s\
  \ Garden o ... | 1885 | Robert Louis Steve ... | 11.00 | 1.10 | 12.10 |\n| 454 |\
  \ A Christmas Carol | 1843 | Charles Dickens | 13.50 | 1.35 | 14.85 |\n| 1094 |\
  \ A Confession | 1882 | Leo Tolstoy | 17.50 | 1.75 | 19.25 |\n| ~ 1096 行 ~ |\n\n\
  除了 MSSQL，你本可以将 `ORDER BY` 子句直接包含在视图本身中。虽然这很方便，但这可能不是一个好主意：无论你是否需要，它都会强制数据库管理系统对结果进行排序，而且你可能之后还需要以不同的顺序再次排序。\n\
  \n### 在 MSSQL 中使用 ORDER BY\n\n如前所述，SQL Server 不允许在视图中使用 `ORDER BY`，除非使用一些额外技巧。如果你*真的*想要一个预排序的视图，可以这样做：\n\
  ```\nCREATE VIEW something AS\nSELECT columns\nFROM table\nORDER BY columns OFFSET\
  \ 0 ROWS;\n```\n\n这样做除了其他好处外，还可以让你创建有序视图，而无需仅仅为了排序而包含额外的列。\n\n但是，你需要意识到有序视图确实会给数据库带来额外负担，因此应仅在需要时使用。\n\
  \n### 使用视图的技巧\n\n视图通常是个好东西，但有一些技巧可以帮助你更可靠地使用它们。一些细节会因数据库管理系统而异，并且数据库管理系统会尽其所能高效工作。尽管如此，牢记这些想法是明智的。\n\
  \n\n#### 不要过度级联视图\n\n你可以基于其他视图构建视图。这有助于简化工作流程，但需要谨慎：\n\n*   修改底层视图可能会导致该视图混乱。某些数据库管理系统甚至不允许你更改视图，如果另一个视图依赖于它的话。\n\
  *   SQL 会尝试优化你的查询，但如果视图嵌套层级过深，它可能无法很好地进行优化。\n*   其中一个视图可能包含了新视图所需的更多内容，因此你是在浪费处理时间来生成你不需要的数据。\n\
  \n这并不意味着你不应该在现有视图的基础上构建，而是说你应该明智地这样做。\n\n#### 不要使用 SELECT *\n\n`SELECT *` 很可能无法完全满足你的需求，但即使它能，你可能也应该明确列出所有列。某些数据库管理系统甚至会将\
  \ `SELECT *` 转换为列列表。\n\n`SELECT *` 可能不是一个好主意的原因包括：\n\n*   你可能希望自定义列的顺序，而不是使用默认顺序。\n\
  *   底层表的结构可能会发生变化，因此你的视图最终可能并非你最初预期的样子。\n\n#### 避免使用 ORDER BY\n\n大多数数据库管理系统允许你在视图中包含\
  \ `ORDER BY` 子句，即使在 MSSQL 中，你也可以强制使用它。然而，这可能不是一个好主意。\n\n你很可能会希望以各种方式对视图进行排序。即使你偏好一种排序顺序，你也不希望数据库管理系统在你再次排序之前不必要地对结果进行排序。\n\
  \n然而，你应该做的是确保你的视图包含你以后将用于排序的列。\n\n### 表值函数\n\n视图是一个强大的工具，但它有一个缺点：你不能更改视图中使用的任何值。例如，`aupricelist`\
  \ 视图中的税率是硬编码的 10%。一种更灵活的视图类型将允许你输入自己的税率。这样的视图将被称为 **参数化视图**。\n\nSQL 通常不支持参数化视图。一些数据库管理系统支持生成虚拟表的函数，称为\
  \ **表值函数**，或者如果你赶时间可以叫它 TVF。这将产生大致相同的结果。\n\n在我们常用的数据库管理系统中，只有 PostgreSQL 和 Microsoft\
  \ SQL Server 支持创建 TVF 的直接方法。我们将在接下来的讨论中探讨这两种。\n\n大多数数据库管理系统允许你创建自定义函数。一个值得注意的例外是\
  \ SQLite，不过它允许你在外部创建函数并将其挂钩进来。\n\n一次生成单个值的函数称为 **标量** 函数。像 `lower()` 和 `length()`\
  \ 这样的内置函数就是标量函数。\n\n在创建函数时，从某种意义上说，存在一个契约。函数定义包括期望的输入数据以及将返回的数据类型。如果输入数据不符合要求，那么就不要期待有结果。\n\
  \nTVF 的工作方式相同：你定义期望的输入，并承诺返回一个结果表。在这里，我们将创建一个更通用的价格表，它允许你告知税率，而不是硬编码。\n\n要使用 TVF，你像使用任何虚拟表一样使用它：\n\
  \n```sql\nSELECT *\nFROM pricelist(15);\n```\n\n这里，TVF 被称为 `pricelist()`，输入参数是 `15`，意思是\
  \ 15%。代码应负责将其转换为 `0.15`：\n\n| **id** | **Title** | **pub** | **author** | **price**\
  \ | **tax** | **inc** |\n| --- | --- | --- | --- | --- | --- | --- |\n| 2078 | The\
  \ Duel | 1811 | Heinrich von Kleis ... | 12.50 | 1.88 | 14.38 |\n| 503 | Uncle Silas\
  \ | 1864 | J. Sheridan Le Fan ... | 17.00 | 2.55 | 19.55 |\n| 2007 | North and South\
  \ | 1854 | Elizabeth Gaskell | 17.50 | 2.63 | 20.13 |\n| 702 | Jane Eyre | 1847\
  \ | Charlotte Brontë | 17.50 | 2.63 | 20.13 |\n| 1530 | Robin Hood, The Pr ... |\
  \ 1862 | Alexandre Dumas | 12.50 | 1.88 | 14.38 |\n| 1759 | La Curée | 1872 | Émile\
  \ Zola | 16.00 | 2.40 | 18.40 |\n| ~ 1070 rows ~ |\n\n我们接下来将为 PostgreSQL 和 MSSQL\
  \ 实现这个。\n\n#### PostgreSQL 中的 TVF\n\nPostgreSQL 中 TVF 的大纲如下：\n\n```sql\nCREATE FUNCTION\
  \ pricelist(...)\nRETURNS TABLE (...)\nLANGUAGE plpgsql AS\n$$\nBEGIN\nRETURN QUERY\n\
  SELECT ...\nEND\n$$;\n```\n\n在这个大纲中：\n\n*   函数名 `pricelist` 包含了输入参数的名称和类型。\n*  \
  \ 该函数将返回一个包含列名和类型的 `TABLE` 结构。\n*   编程语言是 `plpgsql`，这是 PostgreSQL 的标准编程语言。\n*  \
  \ 实际的代码包含在一个大的字符串中。因为代码中可能还有其他字符串，两端的 `$$` 充当了一个替代的分隔符。\n*   然后代码被放置在 `BEGIN` 和\
  \ `END` 之间；在这个例子中，它将返回一个 `SELECT` 查询的结果。\n\n填充细节后，我们可以这样写：\n\n```sql\nDROP FUNCTION\
  \ IF EXISTS pricelist(taxrate decimal(4,2));\nCREATE FUNCTION pricelist(taxrate\
  \ decimal(4,2))\nRETURNS TABLE (\nid int, title varchar, published int, author text,\n\
  price decimal(5,2), tax decimal(4,2), inc decimal(5,2)\n)\nLANGUAGE plpgsql AS $$\n\
  BEGIN\nRETURN QUERY\nSELECT\nb.id, b.title, b.published,\ncoalesce(a.givenname||'\
  \ ','') || coalesce(othernames||' ','')\n|| a.familyname AS author,\nb.price, b.price*taxrate/100\
  \ AS tax,\nb.price*(1+taxrate/100) AS inc\nFROM books as b LEFT JOIN authors a ON\
  \ b.authorid=a.id\nWHERE b.price IS NOT NULL;\nEND; $$;\n```\n\n输出表是最繁琐的部分。在其中，我们必须列出我们期望生成的所有列名和类型。\n\
  \n至于计算，我们采取了一种用户友好的方式，允许税率类似于我们在现实生活中可能使用的百分比。我们不能使用 `%`，尤其是因为它有其他含义，但除此之外，我们可以使用这个值。不过，我们需要将其除以\
  \ 100 以得到其真实值。\n\n#### Microsoft SQL 中的 TVF\n\n在 Microsoft SQL 中创建 TVF 要比在 PostgreSQL\
  \ 中简单得多。Microsoft SQL 中 TVF 的大纲如下：\n\n```sql\nGO\nCREATE FUNCTION pricelist(...)\
  \ RETURNS TABLE AS\nRETURN SELECT ...\nGO\n```\n\nMSSQL 中有两种类型的 TVF。有一种更复杂的类型，但前面提到的简单类型与创建视图非常相似。\n\
  \n在这个大纲中：\n\n*   函数名 `pricelist` 包含了输入参数的名称和类型。\n*   该函数将返回一个 `TABLE` 结构。\n*   在简单的\
  \ TVF 中，只有一个 `SELECT` 语句，该语句会立即作为结果返回。\n*   实际的代码与视图的代码几乎相同，只是它会包含来自输入参数的值。\n\n\
  填充细节后，我们可以这样写：\n\n```sql\nDROP FUNCTION IF EXISTS pricelist;\nGO\nCREATE FUNCTION\
  \ pricelist(@taxrate decimal(4,2))\nRETURNS TABLE AS\nRETURN SELECT\nb.id, b.title,\
  \ b.published,\ncoalesce(a.givenname+' ','')\n+ coalesce(othernames+' ','')\n+ a.familyname\
  \ AS author,\nb.price, b.price*@taxrate/100 AS tax,\nb.price*(1+@taxrate/100) AS\
  \ inc\nFROM books as b JOIN authors a ON b.authorid=a.id\nWHERE b.price IS NOT NULL;\n\
  GO\n```\n\n输入参数名为 `@taxrate`。实际上，它的真名是 `taxrate`，但 MSSQL 使用 `@` 字符作为所有变量的前缀。\n\n\
  与 PostgreSQL 版本一样，我们采取了一种用户友好的方式，允许税率类似于我们在现实生活中可能使用的百分比。我们不能使用 `%`，尤其是因为它有其他含义，但除此之外，我们可以使用这个值。不过，我们需要将其除以\
  \ 100 以得到其真实值。\n\n### 你能用视图做什么？\n\n既然视图是一个虚拟表，那么可以用视图做哪些类型的事情呢？\n\n#### 便捷性\n\n\
  视图最直接的用途是作为一种便捷的方式来封装一个有用的 `SELECT` 查询。例如：\n\n```sql\nSELECT * FROM customerdetails;\n\
  SELECT * FROM aupricelist;\n```\n\n前面的两个视图都包含了连接，其中一个还包含了多项计算。当你需要时，使用已保存的视图要方便得多。\n\
  \n#### 视图的多种用途\n\n## 作为接口\n\n视图的第二个用途是为现有数据提供一个一致的接口。\n\n例如，当我们通过引用另一个表并删除几个列来重构\
  \ `customers` 表时，我们面临着使依赖于旧结构的任何其他查询失效的风险。通过创建 `customerdetails` 视图，你有了一个新的虚拟表，它可以像旧表一样被读取。\n\
  \n在你重命名或重新组织表和列的过程中，这也很方便。假设，例如，你正在开发 `customers` 表的新版本，包含以下一些列：\n\n| customerid\
  \ | firstname | lastname | height_in_inches | au_phone | ... |\n| --- | --- | ---\
  \ | --- | --- | --- |\n| ... | ... | ... | ... | ... | ... |\n\n你可以用类似下面的语句来准备它：\n\
  \n```\n/* Notes\n========================================================\nMSSQL:\
  \              Use + for concatenation\nOracle, SQLite: Use substr(phone,2) instead\
  \ of right()\n======================================================= */\n--  CREATE\
  \ VIEW newcustomers AS\nSELECT\nid AS customerid,\ngivenname AS firstname, familyname\
  \ AS lastname,\ncast(height/2.54 as decimal(3,1))\nAS height_in_inches,\n'+61' ||\
  \ right(phone,9) AS au_phone\n--  etc\nFROM customers;\n```\n\n这将给你类似下面的结果：\n\n\
  | customerid | firstname | lastname | height_in_inches | au_phone |\n| --- | ---\
  \ | --- | --- | --- |\n| 42 | May | Knott | 66.3 | +61255509371 |\n| 459 | Rick\
  \ | Shaw | 67.3 | +61370101040 |\n| 597 | Ike | Andy | 60.2 | [NULL] |\n| 186 |\
  \ Pat | Downe | 69.3 | +61870105900 |\n| 352 | Basil | Isk | 61.6 | +61255502503\
  \ |\n| 576 | Pearl | Divers | 69.4 | +61370107821 |\n| ~ 303 rows ~ |\n\n（`CREATE\
  \ VIEW` 子句被注释掉了，因为我们并不真的打算执行它。）\n\n如果你正在为外部应用程序准备数据，这种方法也会很有用。\n\n## 与外部应用程序协作\n\
  \n虽然我们一直在前端客户端上花费时间，但这并非数据的必然归宿。通常，我们会在外部应用程序（如报表软件）中使用数据。\n\n最有意义的是在将数据用于外部应用程序之前，尽可能多地进行预处理。特别是，连接表或运行子查询应该在数据库端完成，而不是之后。\n\
  \n请注意，有些事情数据库无法轻易完成。例如，可能存在数据格式要求或某些数据库服务器不支持的函数。为此，你需要提取原始数据并在外部应用程序中处理。\n\n与外部应用程序协作的例子包括：\n\
  \n-   与文字处理器进行邮件合并\n-   在电子表格中使用数据透视表\n-   与报表软件配合使用\n\n这类软件通常在数据操作方面能力有限，因此尽可能多地进行预处理是明智的。从外部软件的角度来看，你的视图将被视为单个表（尽管通常它们仍会表明自己实际上是视图）。\n\
  \n## 缓存数据与临时表\n\n一些数据库管理系统提供物化视图。这是一种可以缓存数据的视图类型。其结果是，重复从视图读取数据（不一定）需要重新处理。\n\n\
  当你使用视图时，你可能会给数据库管理系统带来额外的负担。如果视图需要进行一些复杂的处理和连接，那么每次查看视图时，你都会发现自己在重复进行额外的工作。\n\n\
  一些数据库管理系统通过保留一份结果的副本来“作弊”，只要下次访问的时间不太晚，并且相关表没有发生变化。这个副本被称为**缓存**，是否这样做由数据库管理系统决定。\n\
  \n一些数据库管理系统支持物化视图，使这一过程正式化。物化视图在数据库中分配了存储空间来维护结果的副本。这在处理上成本更低，因为数据库管理系统不需要如此频繁地处理相同的数据，但在存储上成本更高。通常，你可能会发现额外的存储比处理能力更便宜。\n\
  \n物化视图并未得到广泛支持，有时用处有限。然而，你可以通过临时表走得很远。\n\n原则上，所有 SQL 表都是临时的，因为总是可以删除一个表——在 SQL 中，如同在生活中，没有什么是真正永恒的。但是，临时表是注定短暂存在的，并且会在你关闭会话时自我销毁。\n\
  \n你可以像创建真实表一样创建临时表，但使用 `TEMPORARY` 前缀：\n\n```\n--  PostgreSQL, MariaDB/MySQL, SQLite\n\
  CREATE TEMPORARY TABLE somebooks (\nid INT PRIMARY KEY,\ntitle VARCHAR(255),\nauthor\
  \ VARCHAR(255),\nprice DECIMAL(4,2)\n);\n--  Oracle\nCREATE GLOBAL TEMPORARY TABLE\
  \ somebooks (\nid INT PRIMARY KEY,\ntitle VARCHAR(255),\nauthor VARCHAR(255),\n\
  price DECIMAL(4,2)\n);\n--  MSSQL\nCREATE #somebooks (\nid INT PRIMARY KEY,\ntitle\
  \ VARCHAR(255),\nauthor VARCHAR(255),\nprice DECIMAL(4,2)\n);\n```\n\n**注意：**\n\n\
  -   Oracle 区分 `GLOBAL` 和 `PRIVATE` 临时表，需要这两个关键字之一。私有临时表还需要特殊的名称。\n-   PostgreSQL\
  \ 允许你使用 `GLOBAL` 和 `LOCAL` 关键字达到相同目的，但会忽略它们；建议省略。\n-   MSSQL 使用井号（`#`）表示私有临时表，双井号（`##`）表示全局临时表。\n\
  \n所谓“全局”，是指数据库的其他用户可以访问该临时表。私有临时表，顾名思义，是会话私有的。\n\n如果你非常着急，PostgreSQL 和 SQLite 允许你用\
  \ `TEMP` 代替 `TEMPORARY` 来节省时间。你读这段话花的时间可能比这还多。\n\n这个例子中的临时表有一个简单的整数主键。如果你打算在后续添加更多数据，你也可以使用自动递增的主键。\n\
  \n一旦创建了临时表，你就可以使用 `SELECT` 语句将数据复制进去。例如：\n\n```\nINSERT INTO somebooks(id,title,author,price)\n\
  SELECT id,title,author,price\nFROM aupricelist\nWHERE price IS NOT NULL;\n```\n\n\
  `INSERT ... SELECT ...` 语句将数据复制到一个已存在的表中，无论是临时表还是永久表。\n\n你可以使用以下语句在一个语句中创建新表并填充它：\n\
  \n```\n--  PostgreSQL, MariaDB/MySQL, Oracle\nCREATE TABLE otherbooks AS\nSELECT\
  \ id,title,author,price\nFROM aupricelist\nWHERE price IS NULL\n;\n--  PostgreSQL,\
  \ SQLite\nSELECT id,title,author,price\nINTO TEMPORARY otherbooks\nFROM aupricelist\n\
  WHERE price IS NULL;\n--  MSSQL\nSELECT id,title,author,price\nINTO #otherbooks\n\
  FROM aupricelist\nWHERE price IS NULL;\n```\n\n如你所见，该语句有两种形式；PostgreSQL 两者都支持。\n\
  \n请注意，无论哪种形式，都要求你拥有创建临时表或永久表的权限。\n\n请记住，数据是副本，因此除非你更新它，否则它会过时。\n\n### 为何要使用临时表？\n\
  \n你为什么需要临时表？在我们的示例数据库中，没有任何内容可以被视为真正意义上的“重负载”。然而，在现实世界中，你可能会处理一个涉及海量行、复杂连接、筛选、计算和排序的查询。这最终可能耗费大量的时间和精力，尤其是当你需要不断重新生成数据时。\n\
  \n你选择使用临时表而非视图的原因包括：\n\n*   保存先前生成的结果比重新生成它们更高效。这被称为 `缓存` 结果。\n*   有时，你*希望*数据不是最新的，例如当你需要使用当天早些时候数据的\
  \ `快照` 时。\n\n如果你需要在未来某个时间点使用该快照，临时表可能就显得“寿命太短”了。我们下面要讨论的所有内容，同样适用于专门创建的永久表。\n\n\
  数据库绝不应保留数据的多个副本。然而，有时你确实需要一个临时表来进行进一步处理、试验，或作为数据迁移过程中的过渡。\n\n#### 计算列\n\n现代 SQL\
  \ 允许你向表中添加一个原则上不应直接存储在表中的列。`计算`列，或称计算列，是一个基于某些计算值的额外列。仔细想想，这正是你通常会在视图中做的事情。\n\n\
  不妨将计算列理解为在表中嵌入了一个微型视图。如果你经常使用同一种计算，但又不想承担视图的开销，它就特别方便。如果你可以选择缓存结果，它也很有用。\n\n计算列是一个只读的虚拟列。你无法向其中写入任何内容，而且，如果它保存了任何数据，那也只是为了节省日后重新计算的开销而缓存的值。例如，你可以为了方便而存储客户的全名。\n\
  \n你可以在创建表时创建计算列，也可以在事后将其添加到表中。\n\n例如，假设我们想为 `ordered` 日期时间列添加一个缩短形式，只包含日期部分。这对于按天进行汇总非常方便。\n\
  \n你可以按如下方式添加新列：\n\n```sql\n--  PostgreSQL >= 12\nALTER TABLE sales\nADD COLUMN ordered_date\
  \ date\nGENERATED ALWAYS AS (cast(ordered as date)) STORED;\n--  MSSQL\nALTER TABLE\
  \ sales\nADD ordered_date AS (cast(ordered as date)) PERSISTED;\n--  MariaDB / MySQL\n\
  ALTER TABLE sales\nADD ordered_date date\nGENERATED ALWAYS AS (cast(ordered as date))\
  \ STORED;\n--  SQLite>=3.31.0\nALTER TABLE sales\nADD ordered_date date\nGENERATED\
  \ ALWAYS AS (cast(ordered as date)) VIRTUAL;\n--  Oracle (STORED)\nALTER TABLE sales\n\
  ADD ordered_date date\nGENERATED ALWAYS AS (trunc(ordered));\n```\n\n如你所见，大多数数据库管理系统都使用标准的\
  \ `GENERATED ALWAYS` 语法。然而，MSSQL 使用了其自身更简单的语法，它不指定数据类型，而是从计算中推断出来。\n\n你还会注意到不同类型的计算列：\n\
  \n*   `VIRTUAL` 列不被存储，每次都会重新计算。这是 MSSQL 的默认类型。\n*   `STORED` 列保存结果的副本，只有在底层值发生变化时才会重新计算。MSSQL\
  \ 称之为 `PERSISTED`。在 Oracle 中，这是默认类型。SQLite 也支持此类型，但仅在你以那种方式创建表时；如果后续添加列，则只能是 `VIRTUAL`\
  \ 类型。\n\n现在你可以获取包含虚拟列的数据了：\n\n```sql\nSELECT * FROM sales;\n```\n\n这将返回：\n\n| **id**\
  \ | **...** | **Ordered** | **shipped** | **ordered_date** |\n| --- | --- | ---\
  \ | --- | --- |\n| 39 | ... | 2022-05-15 21:12:07.988741 | 2022-05-23 | 2022-05-15\
  \ |\n| 40 | ... | 2022-05-16 03:03:16.065969 | 2022-05-24 | 2022-05-16 |\n| 42 |\
  \ ... | 2022-05-16 10:09:13.674823 | 2022-05-22 | 2022-05-16 |\n| 43 | ... | 2022-05-16\
  \ 15:02:43.285565 | [NULL] | 2022-05-16 |\n| 45 | ... | 2022-05-16 16:48:14.674202\
  \ | 2022-05-28 | 2022-05-16 |\n| 518 | ... | [NULL] | [NULL] | [NULL] |\n| ~ 5549\
  \ 行 ~ | | | | |\n\n如果可选的话，`STORED` 或其等效类型是更好的选择。它会占用稍多的空间，但能为后续处理节省开销。\n\n"
- '# 总结


  你的大量工作不仅会涉及真实表，还会涉及生成的虚拟表。虚拟表包括：


  *   一个连接

  *   一个公用表表达式或一个表子查询

  *   一个视图，或在某些情况下，一个表值函数

  *   一个临时表。


  ### 视图


  视图是一个已保存的 `SELECT` 语句。你可以将其设置得尽可能复杂，然后像虚拟表一样获取它。


  视图的优点包括：


  *   它们可以是处理数据的一种便捷方式。

  *   它们可以充当数据的接口，特别是在原始或修改后的形式不符合你的要求时。

  *   当从外部应用程序访问时，它们为复杂数据提供了简单的表格视图。


  ### 表值函数


  表值函数是一种返回虚拟表的函数。对表值函数的支持情况不一。在支持的地方，它允许你向查询中输入参数，使其比简单视图更加灵活。


  ### 临时表


  有时，保存结果比每次都重新生成它们更好。你可以将它们保存到一个缓存表中。


  优点包括：


  *   无需重新计算本就相同的结果，这更高效。

  *   你可能希望使用某个时间点的数据快照进行工作。


  如果你的缓存计划非常短暂，你可能会使用临时表。临时表是一种会在会话结束时自动销毁的表。


  无论缓存表是临时的还是永久的，你都可以使用 `SELECT` 语句将数据复制到其中。你也可以在单条语句中创建一个新表并将数据复制进去。


  #### 计算列


  在现代数据库管理系统中，你可以在表中创建虚拟列来给出计算结果。


  `VIRTUAL` 计算列每次从表中获取数据时都会重新生成值。`STORED` 计算列（在 MSSQL 中也称为 `PERSISTED`）会缓存结果，直到其他数据发生更改。


  计算列可以用于提供便利。如果它是 `STORED` 列，它还具有节省处理开销的好处。


  ## 即将介绍


  一条 `SELECT` 语句不一定就是故事的终点。在某些情况下，它可以是一个更复杂过程中的一步。


  一个 `子查询` 允许你将一条 `SELECT` 语句嵌入到另一个查询中。这可以用于从其他表中获取值，或者使用一个表来过滤另一个表。如果你想在另一个查询中纳入聚合数据，这尤其方便。


  下一章将更详细地探讨子查询。



  '
- "# 7. 使用子查询与公共表表达式\n\n运行一个 `SELECT` 语句，假设没有错误，会给出一个结果。该结果是一个虚拟表，它将包含行和列。\n\n就我们的目的而言，我们对三种可能的虚拟表感兴趣：\n\
  \n*   一行一列：你只得到一个值，尽管技术上它仍然在一个表中。我们将其称为单个值。\n*   一列多行：到时候，我们会称其为一个列表。\n*   多行多列：在此上下文中，具有多列的单行也算作同类事物。这更像是我们在谈论虚拟表时所想到的那种东西。\n\
  \n当然，该结果也可能是空的，但这被视为 `NULL`。\n\n你将从以下示例中获得这些类型的结果。\n\n例如，一行一列：\n\n```sql\nSELECT\
  \ id FROM books WHERE title='Frankenstein';\n```\n\n这是一个单值：\n\n| **Id** |\n| ---\
  \ |\n| 392 |\n\n一列多行：\n\n```sql\nSELECT email FROM customerdetails WHERE state='VIC';\n\
  ```\n\n这给出一个列表：\n\n| **Email** |\n| --- |\n| xavier.money17@example.net |\n| anne.onymous262@example.net\
  \ |\n| bess.twishes26@example.net |\n| judy.free93@example.net |\n| peter.off415@example.com\
  \ |\n| moe.grass360@example.com |\n| ~ 64 rows ~ |\n\n多行多列：\n\n```sql\nSELECT givenname,\
  \ familyname, email\nFROM customerdetails WHERE state='VIC';\n```\n\n这给出一个虚拟表：\n\
  \n| **givenname** | **Familyname** | **email** |\n| --- | --- | --- |\n| Xavier\
  \ | Money | xavier.money17@example.net |\n| Anne | Onymous | anne.onymous262@example.net\
  \ |\n| Bess | Twishes | bess.twishes26@example.net |\n| Judy | Free | judy.free93@example.net\
  \ |\n| Peter | Off | peter.off415@example.com |\n| Moe | Grass | moe.grass360@example.com\
  \ |\n| ~ 64 rows ~ |\n\n最后一种类别，即虚拟表，也可能是非常宽泛的查询的结果，例如 `SELECT * FROM customerdetails`。其工作方式完全相同。\n\
  \n根据上下文，这些结果中的任何一个都可以用在后续的查询中，该查询期望使用单个值、一个列表或一个（虚拟）表。例如，使用单个值：\n\n```sql\nSELECT\
  \ *\nFROM saleitems\nWHERE bookid=(SELECT id FROM books WHERE title='Frankenstein');\n\
  ```\n\n这里，单值查询被括号包裹起来，其用法就像你已经知道要匹配的 `bookid` 值一样：\n\n| **id** | **Saleid** | **bookid**\
  \ | **quantity** | **price** |\n| --- | --- | --- | --- | --- |\n| 7234 | 2873 |\
  \ 392 | 3 | 18.50 |\n| 14875 | 5907 | 392 | 2 | 18.50 |\n| 11183 | 4448 | 392 |\
  \ 2 | 18.50 |\n| 1312 | 517 | 392 | 2 | 18.50 |\n| 9956 | 3948 | 392 | 2 | 18.50\
  \ |\n| 12636 | 5012 | 392 | 2 | 18.50 |\n| ~ 14 rows ~ |\n\n或者你可能期望某种列表：\n\n```sql\n\
  SELECT *\nFROM books\nWHERE authorid IN (\nSELECT id FROM authors WHERE born BETWEEN\
  \ '1700-01-01' AND '1799-12-31'\n);\n```\n\n`IN` 操作符期望一个值列表，我们从嵌套的 `SELECT` 语句中的那一列获得：\n\
  \n| **id** | **authorid** | **Title** | **published** | **price** |\n| --- | ---\
  \ | --- | --- | --- |\n| 2078 | 765 | The Duel | 1811 | 12.50 |\n| 2243 | 715 |\
  \ Vrijmoedige Verhalen; ee … | 1831 | [NULL] |\n| 532 | 628 | Elective Affinities\
  \ | 1809 | 11.50 |\n| 1608 | 420 | The Autobiography of Ben … | 1791 | 18.50 |\n\
  | 2303 | 633 | The Metaphysics of Moral … | 1797 | 12.00 |\n| 1963 | 529 | A Treatise\
  \ of Human Natu … | 1740 | 18.50 |\n| ~ 256 rows ~ |\n\n嵌套的 `SELECT` 语句被称为 `子查询`。`子查询`\
  \ 是一个 `SELECT` 语句，它被用作另一个查询的一部分。从概念上讲，你使用 SELECT 查询来获取一个或多个结果，这些结果继而会被用于另一个查询中。\n\
  \n子查询可以在 `SELECT`、`WHERE`、`FROM` 甚至 `ORDER BY` 子句中使用。当使用它们时，结果必须与上下文兼容。例如：\n\n*\
  \   `SELECT` 子句中的子查询必须始终返回单个值，就像任何其他计算所期望的那样。这可以称为 `标量`（单值）子查询。一些现代 DBMS 现在开始增加对返回多列值的支持，但目前尚未广泛支持。\n\
  *   `WHERE` 子句中的子查询在使用比较操作符时必须返回单个值，或在使用 `IN()` 表达式时返回单个列。\n*   `FROM` 子句中的子查询必须返回一个结果表。这种类型的子查询有时被称为内联视图。\n\
  \n子查询的一些用途包括：\n\n*   从另一个表中查找相关数据（`SELECT`）\n*   查找一个值或一组值以用作过滤器（`WHERE`）\n*   生成一个派生的虚拟表（`FROM`）\n\
  \n关于子查询的整个要点是，通过子查询，你可以组合多个部分以构成更复杂的查询：\n\n*   使用子查询，你将能够从其他表获取数据。\n*   你可以使用子查询来预处理数据，以便在主查询中使用。\n\
  *   子查询将允许你组合聚合查询和非聚合查询，而这通常无法在单个查询中完成。\n\n然而，子查询确实有成本，因为你将为一次查询付出运行两次或更多次查询的代价——有时甚至是为一次查询付出运行数百次查询的代价。我们将在后面将子查询与其他技术进行比较时详细讨论这一点。\n\
  \n毫无疑问，你之前已经见过一些子查询，肯定在本书前面的某些章节中见过。在本章中，我们将更仔细地研究子查询如何工作以及我们可以用它们做什么。\n\n\n###\
  \ 关联与非关联子查询\n\n子查询可以是 `关联` 的或 `非关联` 的。关联子查询包含对主查询的引用。非关联子查询则是独立于主查询进行评估的。\n\n以下是一个非关联子查询的例子：\n\
  \n```\n--  女性作家的书籍\nSELECT *\nFROM books\nWHERE authorid IN(\nSELECT id FROM authors\
  \ WHERE gender='f'\n);\n```\n\n你将得到类似这样的结果：\n\n| `id` | `authorid` | `Title` | `published`\
  \ | `price` |\n| --- | --- | --- | --- | --- |\n| 2007 | 99 | North and South |\
  \ 1854 | 17.50 |\n| 702 | 547 | Jane Eyre | 1847 | 17.50 |\n| 95 | 701 | Silas Marner\
  \ | 1861 | 18.50 |\n| 983 | 211 | East Lynne | 1861 | 16.00 |\n| 678 | 547 | Tales\
  \ of Angria | 1839 | 14.50 |\n| 1255 | 608 | Discourse on the Origin … | 1755 |\
  \ 19.00 |\n| ~ 165 rows ~ |\n\n这是另一个在子查询中使用聚合函数的例子：\n\n```\n--  最年长的顾客\nSELECT *\n\
  FROM customers\nWHERE dob=(SELECT min(dob) FROM customers);\n```\n\n这会给出\n\n| `id`\
  \ | `givenname` | `familyname` | `…` | `dob` | `…` |\n| --- | --- | --- | --- |\
  \ --- | --- |\n| 92 | Nan | Keen | … | 1943-05-18 | … |\n| 392 | Daisy | Chain |\
  \ … | 1943-05-18 | … |\n\n（你会注意到有不止一位最年长的顾客，因为他们恰好在同一天出生。这种情况时有发生。）\n\n在这两种情况下，子查询都被评估一次，其结果被用于主查询。结果可能是一个列表，如女性作家示例，也可能是一个单一值，如最年长的顾客示例。\n\
  \n非关联子查询独立于主查询。如果你只高亮显示子查询并运行它，你也会得到一个结果。\n\n以下是一个关联子查询的例子：\n\n```\n--  书籍作者（是的，还有另一种方法可以实现）\n\
  SELECT\nid, title, (\nSELECT coalesce(givenname||' ','')\n|| coalesce(othernames||'\
  \ ','')\n|| familyname\nFROM authors\nWHERE authors.id=books.authorid\n) AS author\n\
  FROM books;\n\n--  MSSQL\nSELECT\nid, title, (\nSELECT coalesce(givenname+' ',''\n\
  + coalesce(othernames+' ','')\n+ familyname\nFROM authors\nWHERE authors.id=books.authorid\n\
  ) AS author\nFROM books;\n\n--  Oracle\nSELECT\nid, title, (\nSELECT ltrim(givenname||'\
  \ ')\n||ltrim(othernames||' ')\n||familyname\nFROM authors\nWHERE authors.id=books.authorid\n\
  ) AS author\nFROM books;\n```\n\n这会给出以下结果：\n\n| `id` | `title` | `author` |\n| ---\
  \ | --- | --- |\n| 2078 | The Duel | Heinrich von Kleist |\n| 503 | Uncle Silas\
  \ | J. Sheridan Le Fanu |\n| 2007 | North and South | Elizabeth Gaskell |\n| 702\
  \ | Jane Eyre | Charlotte Brontë |\n| 1530 | Robin Hood, The Prince of Thieves |\
  \ Alexandre Dumas |\n| 1759 | La Curée | Émile Zola |\n| ~ 1201 rows ~ |\n\n在这种情况下，子查询对每一行都重新评估一次。看一下前面第一个例子中的子查询，为了让它更易读，我们把它展开：\n\
  \n```\n(\nSELECT\ncoalesce(givenname||' ','')\n|| coalesce(othernames||' ','')\n\
  || familyname\nFROM authors\nWHERE authors.id=books.authorid\n)\n```\n\n`SELECT`\
  \ 子句期望 `author` 列是一个单一值，因此子查询应该提供一个单一值，它确实做到了。在这种上下文中，你不能使用多列，所以你需要将姓名连接起来以给出这个单一值。\n\
  \n同样重要的是，你也不能返回多行。在这里，`WHERE` 子句将结果过滤为一行，其中 `id` 与主查询中的 `authorid` 匹配：`WHERE authors.id=books.authorid`。\n\
  \n对于 `books` 表中的每一行，子查询都会再次运行以匹配下一个 `authorid`。\n\n如果没有匹配项，子查询会返回一个 `NULL`。\n\n\
  你可以通过查询引用了主查询中的某些内容来识别关联子查询。因此，你不能高亮显示子查询并单独运行它，因为它需要那个引用才能完整。\n\n顺便提一下，注意子查询中的\
  \ `WHERE` 子句。在某种意义上，它的条件是过强的，我们本可以这样写：`WHERE id=authorid`。尽管 `id` 列在子查询和主查询中都出现了。\n\
  \n当子查询被评估时，列名将由内向外定义。对于 `id` 列，内部的 `authors` 表中有一个，所以 SQL 不会费心去注意外部的 `books` 表中也有一个。对于\
  \ `authorid` 列，`authors` 表中没有，所以它就对应到了 `books` 表中的那个。\n\n这就是 SQL 中的工作方式，但像我们在示例中那样限定列名，可能对我们人类读者来说能最大限度地减少混淆。\n\
  \n一般来说，关联子查询是一项昂贵的操作，因为它被频繁地重新评估。这并不意味着你不应该使用它，只是意味着如果有其他选择，你应该考虑替代方案。你通常无法选择需要哪种类型的子查询，但它有助于在决定是否有更好的替代方案时提供参考。\n\
  \n## SELECT 子句中的子查询\n\n正如我们所见，`SELECT`子句中的子查询预期为每一行返回一个**单一值**。但如果你希望使用关联子查询从同一个外部表中获取多个值，这可能会很繁琐：\n\
  \n```sql\nSELECT\nid, title, (\nSELECT coalesce(givenname||' ','')\n|| coalesce(othernames||'\
  \ ','')\n|| familyname\nFROM authors\nWHERE authors.id=books.authorid\n) AS author,\n\
  (SELECT born FROM authors\nWHERE authors.id=books.authorid) AS born,\n(SELECT died\
  \ FROM authors\nWHERE authors.id=books.authorid) AS died\nFROM books;\n```\n\n除了繁琐，这种方式开销也大。当然，有更好的方法可以实现，即使用连接：\n\
  \n```sql\nSELECT\nid, title,\ncoalesce(givenname||' ','')\n|| coalesce(othernames||'\
  \ ','')\n|| familyname AS author,\nborn, died\nFROM books AS b LEFT JOIN authors\
  \ AS a ON b.authorid=a.id;\n--  Oracle\n--  FROM books b LEFT JOIN authors a ON\
  \ b.authorid=a.id;\n```\n\n实际上，你很可能会发现，关联子查询通常最好用连接来替代。连接也有一定成本，但在此之后，其余数据的获取就是“免费”的了。\n\
  \n另一方面，如果子查询是**非关联的**，那么它的开销就不那么大。例如，以下是客户身高与平均身高的差值：\n\n```sql\nSELECT\nid, givenname,\
  \ familyname,\nheight,\nheight-(SELECT avg(height) FROM customers) AS diff\nFROM\
  \ customers;\n```\n\n你应该会看到类似这样的结果：\n\n| **id** | **givenname** | **familyname**\
  \ | **height** | **Diff** |\n| --- | --- | --- | --- | --- |\n| 42 | May | Knott\
  \ | 168.5 | -2.34 |\n| 459 | Rick | Shaw | 170.9 | 0.06 |\n| 597 | Ike | Andy |\
  \ 153.0 | -17.84 |\n| 186 | Pat | Downe | 176.0 | 5.16 |\n| 352 | Basil | Isk |\
  \ 156.4 | -14.44 |\n| 576 | Pearl | Divers | 176.3 | 5.46 |\n| ~ 303 rows ~ |\n\n\
  尽管平均值参与了每一行的计算，但在非关联子查询中，它只计算**一次**。\n\n顺便提一下，还有一种替代方法可以实现前面的查询，即使用`窗口函数`，我们将在第\
  \ 8 章介绍。不过，就这个例子而言，结果差别不大。\n\n你会注意到，在这种情况下，子查询引用的是与主查询相同的表。但这并不使它成为关联子查询，因为它没有引用主查询中的实际*行*。你可以通过高亮选中子查询并单独运行它来验证——它是可以独立工作的。\n\
  \n本例中的子查询是一个聚合查询。你也可以在关联子查询中使用聚合函数。以下是生成累计总和的一种方法：\n\n```sql\n--  Oracle: FROM sales\
  \ ss\nSELECT\nid, ordered, total,\n(SELECT sum(total) FROM sales AS ss\nWHERE ss.ordered<=sales.ordered)\
  \ AS running_total\nFROM sales\nORDER BY id;\n```\n\n你会得到类似这样的结果：\n\n| id | ordered\
  \ | total | running_total |\n| --- | --- | --- | --- |\n| 1 | 2022-05-04 21:53:55.165107\
  \ | 43.00 | 43.00 |\n| 2 | 2022-05-05 12:39:41.438631 | 54.50 | 97.50 |\n| 3 | 2022-05-05\
  \ 17:48:08.433387 | 96.00 | 193.50 |\n| 4 | 2022-05-07 08:29:35.61573 | 17.50 |\
  \ 321.50 |\n| 5 | 2022-05-07 13:10:25.441528 | 63.00 | 384.50 |\n| 6 | 2022-05-06\
  \ 17:23:38.261261 | 18.00 | 211.50 |\n| ~ 5549 rows |\n\n我们必须在子查询中将表别名设为`ss`（subsales？），以便与主查询中的同一个表区分开。这样表达式`ss.ordered<=sales.ordered`才能引用正确的表。\n\
  \n在这里，子查询计算的是按`ordered`列排序后，到当前销售记录（包括当前记录）为止所有`total`的总和。\n\n你可能注意到这个查询运行起来花了点时间。正如我们提到的，关联子查询开销很大，而涉及聚合的关联子查询开销尤其大。幸运的是，也有对应的窗口函数可以实现，我们将在下一章看到。\n\
  \n## WHERE 子句中的子查询\n\n子查询也可以用于过滤你的数据。\n\n同样，你可能会发现子查询的替代方案，比如`JOIN`，但一个引人注目的用例是当子查询是一个聚合查询时。\n\
  \n以下是一些子查询能清晰简洁地说明问题的情况。\n\n### 带简单聚合的子查询\n\n子查询有用的一种情况是当你需要混合聚合与非聚合查询时。例如，如果你想找到最年长的客户，你需要分两步完成：\n\
  \n1.  使用聚合查询找到最早的出生日期。\n2.  使用聚合结果作为过滤条件。\n\n在这里，你看到聚合查询被用作子查询：\n\n```sql\nSELECT\
  \ *\nFROM customers\nWHERE dob=(SELECT min(dob) FROM customers);\n```\n\n你也可以用同样的方式找到身高低于平均值的客户：\n\
  \n```sql\nSELECT *\nFROM customers\nWHERE height<(SELECT avg(height) FROM customers);\n\
  ```\n\n在这两种情况下，聚合查询和主查询都基于同一张表。你可能认为可以使用像`WHERE dob=min(dob)`或`WHERE height<avg(height)`这样的表达式，但这行不通；聚合是在`WHERE`子句**之后**计算的。\n\
  \n\n#### 大额消费者\n\n假设你想识别你的“大额消费者”——那些消费金额最高的客户。为此，你需要用到 `customers` 表和 `sales` 表的数据。\n\
  \n这里，我们将使用子查询作为多步骤过程的一部分。\n\n首先，你需要确定什么才算大额购买：\n\n```\nSELECT * FROM sales WHERE\
  \ total>160;\n```\n\n你会得到类似这样的结果：\n\n| **id** | **customerid** | **total** | **…**\
  \ | **ordered_date** |\n| --- | --- | --- | --- | --- |\n| 80 | 32 | 168.00 | …\
  \ | 2022-05-22 |\n| 216 | 13 | 160.50 | … | 2022-06-11 |\n| 483 | 59 | 176.50 |\
  \ … | 2022-07-11 |\n| 726 | 68 | 173.00 | … | 2022-08-02 |\n| 823 | 86 | 165.50\
  \ | … | 2022-08-09 |\n| 891 | 140 | 162.50 | … | 2022-08-16 |\n| ~ 35 rows ~ |\n\
  \n在这里，我们只对 `customerid` 感兴趣，我们将用它来从 `customers` 表中进行选择：\n\n```\nSELECT *\nFROM customers\n\
  WHERE id IN(SELECT customerid FROM sales WHERE total>160);\n```\n\n这会得到\n\n| **id**\
  \ | **…** | **familyname** | **givenname** | **…** |\n| --- | --- | --- | --- |\
  \ --- |\n| 42 | … | Knott | May | … |\n| 58 | … | Ting | Jess | … |\n| 91 | … |\
  \ North | June | … |\n| 140 | … | Byrd | Dicky | … |\n| 40 | … | Face | Cliff |\
  \ … |\n| 141 | … | Rice | Jasmin | … |\n| ~ 32 rows ~ |\n\n注意 `IN` 操作符需要一个值的 *列表*。在子查询中，这是一个单列的值。\n\
  \n另请注意，你得到的结果可能比前一个查询少；这可能是因为某些客户 ID 出现了不止一次。\n\nSQL 还有一个 `ANY` 操作符，可以完成同样的工作：\n\
  \n```\nSELECT *\nFROM customers\nWHERE id=ANY(SELECT customerid FROM sales WHERE\
  \ total>=160);\n```\n\n你也可以使用 `JOIN`：\n\n```\nSELECT DISTINCT customers.*\nFROM\
  \ customers JOIN sales ON customers.id=sales.customerid\nWHERE sales.total>=160;\n\
  ```\n\n为了重现我们上一个查询的结果，我们限定了星号（`customers.*`）并使用 `DISTINCT` 来去除那些可能在列表中出现多次的客户。\n\
  \n使用连接的优势在于你可以随时获取销售数据，因此这会给出稍微更丰富的结果：\n\n```\nSELECT *\nFROM customers JOIN sales\
  \ ON customers.id=sales.customerid\nWHERE sales.total>=160;\n```\n\n在这里，我们移除了 `DISTINCT`\
  \ 和 `customers.`，所以你会得到大量数据：\n\n| **id** | **…** | **familyname** | **givenname**\
  \ | **…** | **total** | **…** | **ordered_date** |\n| --- | --- | --- | --- | ---\
  \ | --- | --- | --- |\n| 32 | … | Cue | Barbie | … | 168.00 | … | 2022-05-22 |\n\
  | 13 | … | Fine | Marty | … | 160.50 | … | 2022-06-11 |\n| 59 | … | Don | Leigh\
  \ | … | 176.50 | … | 2022-07-11 |\n| 68 | … | Stein | Phyllis | … | 173.00 | … |\
  \ 2022-08-02 |\n| 86 | … | Fied | Molly | … | 165.50 | … | 2022-08-09 |\n| 140 |\
  \ … | Byrd | Dicky | … | 162.50 | … | 2022-08-16 |\n| ~ 35 rows ~ |\n\n要找到总销售额很大的客户，需要使用聚合子查询：\n\
  \n```\nSELECT *\nFROM customers\nWHERE id IN(\nSELECT customerid FROM sales\nGROUP\
  \ BY customerid HAVING sum(total)>=2000\n);\n```\n\n这将得到\n\n| **id** | **…** | **familyname**\
  \ | **givenname** | **…** |\n| --- | --- | --- | --- | --- |\n| 42 | … | Knott |\
  \ May | … |\n| 58 | … | Ting | Jess | … |\n| 26 | … | Twishes | Bess | … |\n| 91\
  \ | … | North | June | … |\n| 69 | … | Mentary | Rudi | … |\n| 140 | … | Byrd |\
  \ Dicky | … |\n| ~ 57 rows ~ |\n\n#### 最后订单\n\n这里，我们将再次使用聚合子查询，这次是为了获取每个客户的最后订单。\n\
  \n首先，我们需要获取每个客户的最后日期和时间：\n\n```\nSELECT max(ordered) FROM sales GROUP BY customerid\n\
  ```\n\n这将给我们一个列表，每个客户对应一个日期时间：\n\n| **Max** |\n| 2023-05-15 00:46:00.864446 |\n\
  | 2023-05-25 00:42:26.783461 |\n| 2023-05-16 05:27:53.810977 |\n| 2023-05-06 01:40:02.346894\
  \ |\n| 2023-05-19 07:41:25.104524 |\n| 2023-05-07 19:01:06.756387 |\n| ~ 269 rows\
  \ ~ |\n\n我们将使用这个列表来获取匹配的订单：\n\n```\nSELECT * FROM sales\nWHERE ordered IN(SELECT\
  \ max(ordered) FROM sales GROUP BY customerid);\n```\n\n这将给我们一个销售列表：\n\n| **id**\
  \ | **customerid** | **total** | **…** | **ordered_date** |\n| --- | --- | --- |\
  \ --- | --- |\n| 6168 | 42 | 121.22 | … | 2023-05-28 |\n| 4209 | 287 | 50.50 | …\
  \ | 2023-03-03 |\n| 4542 | 26 | 11.00 | … | 2023-03-18 |\n| 4793 | 368 | 56.00 |\
  \ … | 2023-03-28 |\n| 4939 | 282 | 39.00 | … | 2023-04-03 |\n| 4953 | 395 | 75.50\
  \ | … | 2023-04-03 |\n| ~ 266 rows ~ |\n\n如果你数一下行数，可能会发现主查询返回的行数比子查询少。如果存在一些 `NULL`\
  \ 的订单日期时间，就会发生这种情况。在某个时候，我们应该学会忽略这些记录，要么将它们过滤掉，要么直接移除。\n\n问题是，为什么这些销售没有包含在完整的查询中？答案在于\
  \ `IN()` 操作符。\n\n记得在第 3 章中，我们讨论了 `NOT IN` 的怪异之处。这个讨论同样适用于普通的 `IN`。子查询中的 `NULL` 日期时间会导致等同于测试\
  \ `WHERE ordered=NULL`，众所周知，这总是失败的。\n\n现在我们有了每个客户的销售记录，将其与 `customers` 表连接起来以获取更多细节就很简单了：\n\
  \n```\nSELECT *\nFROM sales JOIN customers ON sales.customerid=customers.id\nWHERE\
  \ ordered IN(SELECT max(ordered) FROM sales GROUP BY customerid);\n```\n\n你会得到类似这样的结果：\n\
  \n| **id** | **cid** | **total** | **…** | **od** | **id** | **email** | **…** |\n\
  | --- | --- | --- | --- | --- | --- | --- | --- |\n| 6168 | 42 | 121.22 | … | 2023-05-28\
  \ | 42 | may.knott61@example.net | … |\n| 4209 | 287 | 50.50 | … | 2023-03-03 |\
  \ 287 | judy.free287@example.com | … |\n| 4542 | 26 | 11.00 | … | 2023-03-18 | 26\
  \ | bess.twishes26@example.net | … |\n| 4793 | 368 | 56.00 | … | 2023-03-28 | 368\
  \ | sharon.sharalike368@example.net | … |\n| 4939 | 282 | 39.00 | … | 2023-04-03\
  \ | 282 | howard.youknow282@example.com | … |\n| 4953 | 395 | 75.50 | … | 2023-04-03\
  \ | 395 | holly.day395@example.net | … |\n| ~ 266 rows ~ |\n\n你现在可以提取任何你可能需要处理的客户或销售数据。\n\
  \n#### 重复的客户\n\n我们在第 2 章中已经看到了如何查找重复项。假设，例如，你想查找重复的客户姓名：\n\n```\nSELECT\ngivenname||'\
  \ '||familyname AS fullname,\n--  MSSQL: givenname+' '+familyname AS fullname,\n\
  count(*) as occurrences\nFROM customers\nGROUP BY familyname, givenname\nHAVING\
  \ count(*)>1;\n```\n\n你会得到\n\n| **fullname** | **Occurrences** |\n| --- | --- |\n\
  | Judy Free | 2 |\n| Annie Mate | 2 |\n| Mary Christmas | 2 |\n| Ken Tuckey | 2\
  \ |\n| Corey Ander | 2 |\n| Ida Dunnit | 2 |\n| Paul Bearer | 2 |\n| Terry Bell\
  \ | 2 |\n\n请记住，名字相同并不一定意味着它们是重复的。很可能只是巧合。\n\n我们连接名字是因为下一步我们要做的事情。\n\n聚合查询的问题是，你只能选择你正在分组的内容，所以我们看不到客户的其余细节。任何包含它们的尝试都会破坏聚合。\n\
  \n但是，我们可以将重复项查询用作子查询来过滤 `customers` 表：\n\n```\n/*  注意\n================================================\n\
  MSSQL: 使用 givenname+' '+familyname\n================================================\
  \ */\nSELECT *\nFROM customers\nWHERE givenname||' '||familyname IN (\nSELECT givenname||'\
  \ '||familyname FROM customers\nGROUP BY familyname, givenname\nHAVING count(*)>1\n\
  );\n```\n\n这将给我们客户的其余细节。我们必须连接客户姓名的原因是，在 `IN()` 表达式中只能有一个列。\n\n\n## FROM 子句中的子查询\n\
  \n子查询也可以生成一个虚拟表，这在你实际查询前需要准备数据时非常有用。\n\n例如，假设你想按价格分组查看你的书籍。你可以创建一个像这样的简单查询：\n\n\
  ```sql\nSELECT\n  id, title,\n  CASE\n    WHEN price > 17 THEN 'expensive'\n   \
  \ WHEN price > 7 THEN 'reasonable'\n    ELSE 'cheap'\n  END AS price_group\nFROM\
  \ books;\n```\n\n你会得到类似这样的结果：\n\n| **id** | **title** | **price_group** |\n| ---\
  \ | --- | --- |\n| 2078 | The Duel | Cheap |\n| 503 | Uncle Silas | Reasonable |\n\
  | 2007 | North and South | Expensive |\n| 702 | Jane Eyre | Expensive |\n| 1530\
  \ | Robin Hood, The Prince of Thieves | Cheap |\n| 1759 | La Curée | Reasonable\
  \ |\n| ~ 1201 行 ~ |\n\n现在，假设你想对这个表进行汇总。问题是，你不能这样做：\n\n```sql\n-- 这样不行：\nSELECT\n\
  -- id, title,\n  CASE\n    WHEN price > 17 THEN 'expensive'\n    WHEN price > 7\
  \ THEN 'reasonable'\n    ELSE 'cheap'\n  END AS price_group,\n  count(*) as num_books\n\
  FROM books\nGROUP BY price_group;\n```\n\n我们已经注释掉了不用于分组的列，但由于那个烦人的子句顺序问题，它仍然无法工作：别名\
  \ `price_group` 是在 `SELECT` 子句中创建的，而 `SELECT` 子句出现在 `GROUP BY` 子句*之后*，因此它尚不能用于分组。当然，你随后可以在\
  \ `GROUP BY` 子句中重现这个计算：\n\n```sql\n-- 这样可以，但...\nSELECT\n-- id, title,\n  CASE\n\
  \    WHEN price > 17 THEN 'expensive'\n    WHEN price > 7 THEN 'reasonable'\n  \
  \  ELSE 'cheap'\n  END AS price_group,\n  count(*) as num_books\nFROM books\nGROUP\
  \ BY CASE\n           WHEN price > 17 THEN 'expensive'\n           WHEN price >\
  \ 7 THEN 'reasonable'\n           ELSE 'cheap'\n         END;\n```\n\n但你肯定不想那么做。\n\
  \n一个解决方案是将原始的 `SELECT` 语句放入一个子查询中：\n\n```sql\nSELECT price_group, count(*) AS num_books\n\
  FROM (\n  SELECT\n    id, title,\n    CASE\n      WHEN price > 17 THEN 'expensive'\n\
  \      WHEN price > 7 THEN 'reasonable'\n      ELSE 'cheap'\n    END AS price_group\n\
  \  FROM books\n) AS sq     -- Oracle: ( ... ) sq\nGROUP BY price_group;\n```\n\n\
  这会给出一个有意义的结果：\n\n| **price_group** | **num_books** |\n| --- | --- |\n| expensive\
  \ | 320 |\n| [NULL] | 105 |\n| reasonable | 467 |\n| cheap | 309 |\n\n记住，`CASE`\
  \ 表达式的默认穿透（fall through）结果是 `NULL`。那些未定价的书籍最终会归入 `NULL` 价格组。根据数据库管理系统的不同，你可能会在结果集的某个地方看到它作为一个单独的分组。\n\
  \n记住，`SELECT` 语句生成的是一个虚拟表。因此，它可以以子查询的形式用在 `FROM` 子句中。\n\n注意，`FROM` 子句中的子查询有一个特殊要求：它必须有一个别名，即使你没有计划使用它。我们在这里没有特殊计划，所以它就随便被叫做\
  \ `sq`（代表“SubQuery”）。如果你想，比如说，将这个子查询与另一个表或虚拟表进行连接，那么别名就会很有用。\n\n### 嵌套子查询\n\n子查询是一个带有自己\
  \ `FROM` 子句的 `SELECT` 语句。反过来，那个 `FROM` 子句也可能来自另一个子查询。如果你有一个子查询里面又包含一个子查询，这就是一个**嵌套**子查询。\n\
  \n例如，我们再来看重复的客户姓名。你可以用下面的聚合查询找出候选对象：\n\n```sql\nSELECT familyname, givenname\nFROM\
  \ customers\nGROUP BY familyname, givenname HAVING count(*)>1;\n```\n\n这里只有名字。假设你想要更多细节。为此，你可以将\
  \ `customers` 表与前面的查询进行连接：\n\n```sql\nSELECT\n  c.id, c.givenname, c.familyname,\
  \ c.email\nFROM customers AS c JOIN (\n  SELECT familyname, givenname\n  FROM customers\n\
  \  GROUP BY familyname, givenname HAVING count(*)>1\n) AS n ON c.givenname=n.givenname\
  \ AND c.familyname=n.familyname;\n```\n\n我们之前见过类似的东西。你现在会得到候选客户：\n\n| **id** | **givenname**\
  \ | **familyname** | **Email** |\n| --- | --- | --- | --- |\n| 429 | Corey | Ander\
  \ | corey.ander429@example.net |\n| 287 | Judy | Free | judy.free287@example.com\
  \ |\n| 90 | Ida | Dunnit | ida.dunnit90@example.net |\n| 488 | Ken | Tuckey | ken.tuckey488@example.net\
  \ |\n| 174 | Paul | Bearer | paul.bearer174@example.com |\n| 505 | Annie | Mate\
  \ | annie.mate505@example.com |\n| ~ 16 行 ~ |\n\n为了方便，我们将 `customers` 表别名为 `c`（别忘了\
  \ Oracle 中没有 `AS`），而且子查询无论如何也需要个名字，所以我们叫它 `n`。在 `SELECT` 子句中，我们只是提取了 `id`、姓名和电子邮件地址。\n\
  \n现在，让我们在另一个聚合查询中结合这个结果，这将为我们提供每个名字一行，并合并其他详细信息：\n\n```sql\nSELECT\n  givenname,\
  \ familyname,\n  -- PostgreSQL, MSSQL:\n  string_agg(email,', ') AS email,\n  string_agg(cast(id\
  \ AS varchar(3)),', ') AS ids\n  -- MariaDB/MySQL:\n  group_concat(email SEPARATOR\
  \ ', ') AS email,\n  group_concat(cast(id AS varchar(3)) SEPARATOR ', ') AS ids\n\
  \  -- SQLite:\n  group_concat(email,', ') AS email,\n  group_concat(cast(id AS varchar(3)),',\
  \ ') AS ids\n  -- Oracle:\n  listagg(email,', ') AS email,\n  listagg(cast(id AS\
  \ varchar(3)),', ') AS ids\nFROM (  -- 将之前的 SELECT 作为子查询\n  SELECT c.id, c.givenname,\
  \ c.familyname, c.email\n  FROM customers AS c JOIN (\n    SELECT familyname, givenname\n\
  \    FROM customers\n    GROUP BY familyname, givenname HAVING count(*)>1\n  ) AS\
  \ n ON c.givenname=n.givenname AND\n            c.familyname=n.familyname\n) AS\
  \ sq\nGROUP BY familyname, givenname;\n```\n\n现在你会得到类似这样的结果：\n\n| **givenname**\
  \ | **familyname** | **Email** | **ids** |\n| --- | --- | --- | --- |\n| Corey |\
  \ Ander | corey.ander429@e …, corey.ander85@ex … | 429, 85 |\n| Paul | Bearer |\
  \ paul.bearer174@e …, paul.bearer482@e … | 174, 482 |\n| Terry | Bell | terry.bell402@ex\
  \ …, terry.bell295@ex … | 402, 295 |\n| Mary | Christmas | mary.christmas46 …, mary.christmas59\
  \ … | 465, 594 |\n| Ida | Dunnit | ida.dunnit504@ex …, ida.dunnit90@exa … | 504,\
  \ 90 |\n| Judy | Free | judy.free93@exam …, judy.free287@exa … | 93, 287 |\n| ~\
  \ 8 行 ~ |\n\n注意，我们包含了如 `第 5 章` 所述的 `string_agg()` 函数的变体。此外，我们必须将 `id` 转换为字符串，以便将其聚合成一个字段。\n\
  \n如果你觉得最后一个例子有点难以阅读，嗯，这就是嵌套子查询的问题之一。值得庆幸的是，还有公共表表达式（Common Table Expressions）作为替代方案，我们很快会看到。\n\
  \n## 使用 WHERE EXISTS (子查询)\n\n你已经见过在 `WHERE` 子句中使用子查询来过滤你的查询。到目前为止，子查询返回的是单个值或单个列，用于\
  \ `IN()` 表达式。\n\n你也可以使用 `WHERE EXISTS (...)` 来过滤一组数据。它看起来有点像这样：\n\n```sql\nSELECT\
  \ ...\nFROM ...\nWHERE EXISTS(subquery);\n```\n\n子查询要么返回结果，要么不返回。如果返回，那么 `WHERE\
  \ EXISTS` 条件满足，该行被保留；如果不返回，那么 `WHERE EXISTS` 条件不满足，该行将被过滤掉。\n\n例如，你可以用下面的语句测试这个想法：\n\
  \n```sql\n-- PostgreSQL, MSSQL, SQLite\nSELECT * FROM authors\nWHERE EXISTS (SELECT\
  \ 1 WHERE 1=1);\n-- MariaDB/MySQL, Oracle\nSELECT * FROM authors\nWHERE EXISTS (SELECT\
  \ 1 FROM dual WHERE 1=1);\n```\n\n因为 `1=1` 总是真，所以你会得到 `authors` 表的所有行。\n\n虽然你通常只在\
  \ Oracle 中使用 `FROM dual`，但 MariaDB 和 MySQL 也支持这个。在这种情况下，MariaDB 和 MySQL 不喜欢没有 `FROM`\
  \ 的 `WHERE` 子句，所以我们加上它来让它们高兴。\n\n同样地，你也可以返回空结果：\n\n```sql\n-- PostgreSQL, MSSQL,\
  \ SQLite\nSELECT * FROM authors\nWHERE EXISTS (SELECT 1 WHERE 1=0);\n-- MariaDB/MySQL,\
  \ Oracle\nSELECT * FROM authors\nWHERE EXISTS (SELECT 1 FROM dual WHERE 1=0);\n\
  ```\n\n子查询处于一个特殊位置，因为实际选择哪些列并不重要：重要的是有没有行存在。这就是为什么我们包含了一个虚拟的 `SELECT 1`。\n\n你也可以选择\
  \ `SELECT NULL` 甚至 `SELECT 1/0`。前者会给人一种（错误的）印象，好像我们在查找什么都没有，后者如果单独运行会导致错误。虽然很诱人选择一个更有意义的值来更认真地对待它，但其实没有必要。\n\
  \n\n#### WHERE EXISTS 与非关联子查询\n\n显然，前面的例子会给你“全部”或“全部不给”的结果，这正是你可以从非关联子查询中预期的行为，例如\n\
  \n```\nSELECT * FROM authors\nWHERE EXISTS (SELECT 1/0 FROM books WHERE price<15);\n\
  ```\n\n该子查询选取*一些*行，这足以满足 `WHERE` 子句的条件，因此你将获得*所有*作者。如果你尝试 `WHERE price<0`，那么你将*一个*作者也得不到。\n\
  \n#### WHERE EXISTS 与关联子查询\n\n如果使用关联子查询，`WHERE EXISTS` 会更有趣。此时，测试将针对每一行进行评估，因此一些行会通过，而另一些则不会。\n\
  \n例如，如果你想查找所有在 `books` 表中有书的作者，你可以使用\n\n```\nSELECT * FROM authors\nWHERE EXISTS\
  \ (\nSELECT 1 FROM books WHERE books.authorid=authors.id\n);\n```\n\n你将得到类似下面的结果：\n\
  \n| **id** | **givenname** | **…** | **familyname** | **…** | **Home** |\n| ---\
  \ | --- | --- | --- | --- | --- |\n| 464 | Ambrose | … | Bierce | … | Meigs County,\
  \ Ohio |\n| 858 | Alexander | … | Ostrovsky | … | Moscow |\n| 525 | Francis | …\
  \ | Beaumont | … | Grace-Dieu, Leicestershire |\n| 488 | Bashou | … | Matsuo | …\
  \ | Matsuo Kinsaku |\n| 703 | Friedrich | … | Engels | … | Barmen |\n| 722 | Stanley\
  \ | … | Waterloo | … | St. Clair, Mich. |\n| ~ 443 rows ~ |\n\n在这里，子查询查找 `books.authorid`\
  \ 与 `authors.id` 匹配的行，如果存在这样的行（对大多数作者来说确实存在），则会返回该作者行。\n\n#### WHERE EXISTS 与 IN()\
  \ 表达式的对比\n\n在前面的例子中，你也可以使用 `IN()` 表达式获得相同的结果：\n\n```\nSELECT * FROM authors\nWHERE\
  \ id IN(SELECT authorid FROM books);\n```\n\n这种写法当然更简单。然而，很可能在底层，SQL 执行的操作完全相同，所以你如何编写它其实是个口味问题。\n\
  \n另一方面，如果你要查找*没有*书的作者（在我们的目录中），那就是另一回事了。\n\n这*不*能工作：\n\n```\nSELECT * FROM authors\n\
  WHERE id NOT IN(SELECT authorid FROM books);\n```\n\n嗯，严格来说，它*能*工作，但不是我们想要的方式。再次回忆第\
  \ 3 章中的“NOT IN 怪癖”。由于 `authorid` 列中存在一些 `NULL`，`NOT` `IN` 操作符最终会评估类似 `... AND id=NULL\
  \ AND ...` 的条件。`id=NULL` 总是失败，并且 `... AND ...` 将此失败与其余部分组合起来，导致整个表达式失败。\n\n然而，使用\
  \ `WHERE NOT EXISTS` 将能工作：\n\n```\nSELECT * FROM authors\nWHERE NOT EXISTS (\nSELECT\
  \ 1 FROM books WHERE books.authorid=authors.id\n);\n```\n\n这是因为 `WHERE EXISTS` 评估的是行，而不是值：\n\
  \n| **id** | **givenname** | **…** | **familyname** | **…** | **Home** |\n| ---\
  \ | --- | --- | --- | --- | --- |\n| 479 | C.E. | … | Koetsveld | … | Rotterdam\
  \ |\n| 874 | Henry | … | Savery | … | Somerset, England |\n| 429 | Oliné | … | Keese\
  \ | … | [NULL] |\n| 35 | James | … | Lowell | … | Cambridge, Massachusetts |\n|\
  \ 148 | Demetrius | … | Boulger | … | [NULL] |\n| 922 | Robert | … | Ingersoll |\
  \ … | Dresden, New York |\n| ~ 45 rows ~ |\n\n在实际应用中，你不会经常看到 `WHERE EXISTS`，因为通常你可以使用连接（join）或\
  \ `IN` 操作符完成相同的事情。然而，有时它具有优势或更直观。这尤其是因为当 `NOT IN` 不起作用时，`WHERE EXISTS` 可以表达得更清晰、更具体。\n\
  \n## LATERAL 连接（又称 CROSS APPLY）及其相关功能\n\n此功能在 SQLite 中不可用。MariaDB 中也不可用，尽管它*确实*在\
  \ MySQL 中可用。\n\n不过，如果你正在使用其中一种 DBMS，你可能想了解它是怎么回事。无论如何，对于大多数事情都有替代方案，尤其是在下一节中介绍的公用表表达式（Common\
  \ Table Expressions）。\n\n然而，SQLite 在 `WHERE` 子句方面有一个有趣的特性，如果你继续阅读就会看到。\n\n如果你尝试以下查询：\n\
  \n```\nSELECT\nid, title,\nprice, price*0.1 AS tax, price+tax AS inc\nFROM books;\n\
  ```\n\n它将无法工作。这是因为每一列都是独立的，与其他列无关。你不能在 `SELECT` 子句中将别名用作另一个计算的一部分。我们通过单独计算 `inc`\
  \ 列来绕过这个问题：`price*1.1 AS inc`。\n\n如果你尝试这样的操作，情况会更糟：\n\n```\nSELECT\nid, title,\n\
  price, price*0.1 AS tax\nFROM books\nWHERE tax>1.5;\n```\n\n这里的问题在于 `SELECT` 子句是在\
  \ `WHERE` 子句*之后*评估的，因此在 `WHERE` 子句中，`tax` 的别名计算尚不可用。同样，我们可以在 `WHERE` 子句中重新计算该值：`WHERE\
  \ price*1.1>1.5`。\n\n但 SQLite 除外。你确实可以在 `WHERE` 子句中使用别名，也可以在 `GROUP BY` 子句中使用。\n\
  \n最后，例如，如果你想在 `SELECT` 子句中从子查询获取多个列，这也不起作用：\n\n```\nSELECT\nid, title,\n(SELECT\
  \ givenname, othernames, familynames\nFROM authors WHERE authors.id=books.authorid)\n\
  FROM books\nWHERE tax>1.5;\n```\n\n`SELECT` 子句中的子查询只能返回一个值，如果你将名称连接起来然后返回结果，那是没问题的。否则，你只能使用三个子查询，这既昂贵又繁琐。\n\
  \nSQL 可以通过对每一行应用子查询来解决这个问题。这在某些 DBMS 中被称为 `LATERAL JOIN`，在另一些中则称为 `APPLY`。\n\n###\
  \ 添加列\n\n在前面的前两个例子中，你可以使用像这样的表达式：\n\n```\n--  PostgreSQL, MySQL (非 MariaDB)\nSELECT\n\
  id, title,\nprice, tax, inc\nFROM\nbooks\nJOIN LATERAL(SELECT price*0.1 AS tax)\
  \ AS sq ON true\nJOIN LATERAL(SELECT price+tax AS inc) AS sq2 ON true\nWHERE tax>1.5\n\
  ;\n--  MSSQL\nSELECT\nid, title,\nprice, tax, inc\nFROM books\nCROSS APPLY (SELECT\
  \ price*0.1 AS tax) AS sq\nCROSS APPLY (SELECT price+tax AS inc) AS sq2\nWHERE tax>1.5\n\
  ;\n--  Oracle (子查询名称中无 AS)\nSELECT\nid, title,\nprice, tax, inc\nFROM books\nCROSS\
  \ APPLY (SELECT price*0.1 AS tax FROM dual) sq\nCROSS APPLY (SELECT price+tax AS\
  \ inc FROM dual) sq2\nWHERE tax>1.5\n;\n```\n\n你将得到类似这样的结果：\n\n| **id** | **Title**\
  \ | **price** | **tax** | **inc** |\n| --- | --- | --- | --- | --- |\n| 503 | Uncle\
  \ Silas | 17.00 | 1.700 | 18.700 |\n| 2007 | North and South | 17.50 | 1.750 | 19.250\
  \ |\n| 702 | Jane Eyre | 17.50 | 1.750 | 19.250 |\n| 1759 | La Curée | 16.00 | 1.600\
  \ | 17.600 |\n| 205 | Shadow: A Parable | 17.50 | 1.750 | 19.250 |\n| 1702 | Philaster\
  \ | 17.50 | 1.750 | 19.250 |\n| ~ 525 rows ~ |\n\n注意\n\n.\n\n*   子查询必须被赋予一个别名，即使它没有被使用。\n\
  \n*   PostgreSQL、MySQL 和 MSSQL 允许你将列别名放在子查询别名中：`(SELECT price*0.1) AS sq(tax)`。Oracle\
  \ 不行。\n\n*   PostgreSQL 和 MySQL 的例子使用了虚拟条件 `ON true`。MySQL 允许你省略它，但 PostgreSQL 要求必须有它。\n\
  \n尤其要注意，第二个子查询会愉快地计算表达式 `price+tax AS inc`。这是因为子查询是依次评估的，所以表达式可以累积。\n\n`LATERAL`\
  \ 或 `CROSS APPLY` 子查询应用于主查询的每一行。原则上，这可能相当昂贵，但事实证明，情况并非如此糟糕。如果你需要在更复杂的计算中包含一系列中间步骤，它特别有用——它易于理解和维护。\n\
  \nSQL 还有一种称为 `CROSS JOIN` 的连接类型。在交叉连接中，一个表的每一行与另一个表的每一行连接。此结果也称为笛卡尔积。那是大量的组合，通常不是你想要的。\n\
  \n`CROSS APPLY` 与此不同，尽管它是一种连接类型。它更接近于 `OUTER JOIN`。\n\n稍后当我们与单行虚拟表进行交叉连接时，你会看到交叉连接的一个用途。\n\
  \n\n## 使用公用表表达式\n\n### 多列查询\n\n如前所述，SQL 不允许在 `SELECT` 子句中从单个子查询获取多列，因为 `SELECT`\
  \ 子句中的所有内容都应是标量——即单个值。\n\n然而，如果上下文是类似表的结构（例如在 `FROM` 子句中），则可以获取多列。例如：\n\n```sql\n\
  --  PostgreSQL, MySQL (非 MariaDB)\nSELECT\nid, title,\ngivenname, othernames, familyname\n\
  FROM\nbooks\nLEFT JOIN LATERAL(\nSELECT givenname, othernames, familyname\nFROM\
  \ authors\nWHERE authors.id=books.authorid\n) AS a ON true;\n--  MSSQL\nSELECT\n\
  id, title,\ngivenname, othernames, familyname,\nhome\nFROM books\nOUTER APPLY (\n\
  SELECT givenname, othernames, familyname\nFROM authors\nWHERE authors.id=books.authorid\n\
  ) AS a;\n--  Oracle: 与 MSSQL 相同，但不使用 AS\n```\n\n结果类似于：\n\n| **id** | **标题** | **givenname**\
  \ | **othernames** | **familyname** |\n| --- | --- | --- | --- | --- |\n| 2078 |\
  \ The Duel | Heinrich | [NULL] | von Kleist |\n| 503 | Uncle Silas | J. | Sheridan\
  \ | Le Fanu |\n| 2007 | North and South | Elizabeth | [NULL] | Gaskell |\n| 702\
  \ | Jane Eyre | Charlotte | [NULL] | Brontë |\n| 1530 | Robin Hood, The … | Alexandre\
  \ | [NULL] | Dumas |\n| 1759 | La Curée | Émile | [NULL] | Zola |\n| ~ 约 1201 行\
  \ ~ |\n\n在这种情况下，使用普通的外连接同样可以轻松获得相同的结果：\n\n```sql\nSELECT\nbooks.id, title,\ngivenname,\
  \ othernames, familyname,\nhome\nFROM books LEFT JOIN authors ON authors.id=books.authorid;\n\
  ```\n\n后一种形式显然更简单（为了简洁我们省略了表别名，并且出于必要对 `books.id` 列进行了限定）。\n\n另一方面，如果子查询是聚合查询，横向连接就非常方便，因为你反正需要一个子查询：请记住，你不能在单个\
  \ `SELECT` 语句中混合聚合数据和非聚合数据。\n\n例如，假设你想要一个客户列表及其各自的总销售额。你需要一个聚合查询来获取总和，再与客户表连接。你可以这样做：\n\
  \n```sql\n--  PostgreSQL, MySQL (非 MariaDB)\nSELECT\nid, givenname, familyname,\
  \ total\nFROM\ncustomers\nLEFT JOIN LATERAL(\nSELECT sum(total) AS total FROM sales\n\
  WHERE sales.customerid=customers.id\n) AS totals ON true;\n--  MSSQL, Oracle (不使用\
  \ AS)\nSELECT\nid, givenname, familyname, total\nFROM\ncustomers\nOUTER APPLY(\n\
  SELECT sum(total) AS total FROM sales\nWHERE sales.customerid=customers.id\n) AS\
  \ totals;\n```\n\n这将得到类似这样的结果：\n\n| **Id** | **givenname** | **familyname** | **total**\
  \ |\n| --- | --- | --- | --- |\n| 42 | May | Knott | 3437.72 |\n| 459 | Rick | Shaw\
  \ | 461.00 |\n| 597 | Ike | Andy | [NULL] |\n| 186 | Pat | Downe | 1536.50 |\n|\
  \ 352 | Basil | Isk | 573.00 |\n| 576 | Pearl | Divers | [NULL] |\n| ~ 约 303 行 ~\
  \ |\n\n尽管可能存在替代方案（在使用 SQLite 或 MariaDB 时你将会需要），但横向连接有时可以让这类查询更加直观。\n\n### 语法\n\n\
  我们已经看到可以在 `FROM` 子句中使用子查询，甚至可以嵌套它们。然而，还有一种替代方法可以使处理这些子查询更加自然。\n\n公用表表达式，朋友们简称 CTEs，是生成表结果的子查询。因此，你几乎总是可以用\
  \ CTE 替换 `FROM` 子查询。\n\n我们在前面的章节中已经使用过 CTEs，所以如果你有种*似曾相识（déjà vu）*的感觉，那是正常的。\n\n\
  公用表表达式（CTEs）是 SQL 中相对较新的功能，但已存在一段时间，并且在几乎所有现代 DBMS 中都可用。值得注意的落后者是 MariaDB（在 2016\
  \ 年发布的 10.2 版本中添加了支持）和 MySQL（在 2018 年发布的 8.0 版本中添加了支持）。如果你被困在旧版本的 MariaDB 或 MySQL\
  \ 上，也许可以学着享受嵌套子查询。\n\nCTE 是在使用前定义的虚拟表。它与子查询相似，因为它包含一个 `SELECT` 语句，但语法不同，并且具有许多优点。\n\
  \n最简单形式的 CTEs 是子查询的替代形式。即便如此，也有一个直接的好处：\n\n-   CTEs 更具可读性且更易于维护，因为它们在查询开头定义，而不是在中间定义。\n\
  \n复杂的子查询可能有一个子查询引用另一个子查询。这涉及子查询的嵌套。\n\n-   CTEs 可以引用先前的 CTEs，而无需嵌套。\n\n这两个好处都与可读性和可维护性有关。第三个好处是普通子查询所不具备的。\n\
  \n-   CTEs 可以引用自身；因此，它们可以是递归的。\n\n一个公用表表达式作为查询的一部分定义在主查询部分之前：\n\n```sql\nWITH cte\
  \ AS (subquery)\nSELECT columns FROM cte;\n```\n\nCTE 被赋予一个名称，当然不一定非得是 `cte`。之后，它在主查询中被当作普通表使用。你可以如下定义多个\
  \ CTEs：\n\n```sql\nWITH\ncte AS (subquery),\nanother AS (subquery)\nSELECT columns\
  \ FROM ...;\n```\n\n\n#### 使用公用表表达式（CTE）准备计算\n\n还记得带有价格组的那个子查询吗？\n\n```\nSELECT\
  \ price_group, count(*) AS num_books\nFROM (\nSELECT\nid, title,\nCASE\nWHEN price\
  \ < 17 THEN 'cheap'\nWHEN price < 30 THEN 'affordable'\nWHEN price >= 17 THEN 'expensive'\n\
  END AS price_group\nFROM books\n) AS sq     --  Oracle: ( ... ) sq\nGROUP BY price_group;\n\
  ```\n\n这可以轻松地重写为 CTE：\n\n```\n--  准备数据\nWITH sq AS (\nSELECT\nid, title,\nCASE\n\
  WHEN price < 17 THEN 'cheap'\nWHEN price < 30 THEN 'affordable'\nWHEN price >= 17\
  \ THEN 'expensive'\nEND AS price_group\nFROM books\n)\n--  使用准备好的数据\nSELECT price_group,\
  \ count(*) AS num_books\nFROM sq\nGROUP BY price_group;\n```\n\n它看起来差别不大，但重要的是你现在将查询分成了两部分：第一部分定义子查询，第二部分使用它。这是一种组织代码的更好方式。\n\
  \n子查询在查询的开头被转移到一个 CTE 中。从那时起，主`SELECT`语句引用该 CTE，就好像它是另一张表一样。\n\n优点是查询是按照计划编写的：先准备数据，然后使用数据。\n\
  \n目前 MSSQL 不要求在语句末尾使用分号，但你应该养成使用它的习惯。\n\n然而，`WITH`子句在前一个`SELECT`语句末尾有另一种含义，因此如果你不以分号结束前一个`SELECT`语句，它将被错误解释。\n\
  \n只需在每个语句末尾使用分号，一切都会很好。不要听信这种无稽之谈：\n\n`;WITH (...)`\n\n这是另一个例子，我们将在接下来的几章中进一步使用它。如果你查看`sales`表：\n\
  \n```\nSELECT * FROM sales;\n```\n\n你将看到以下内容：\n\n| **id** | **customerid** | **total**\
  \ | **…** | **ordered_date** |\n| --- | --- | --- | --- | --- |\n| 39 | 28 | 28.00\
  \ | … | 2022-05-15 |\n| 40 | 27 | 34.00 | … | 2022-05-16 |\n| 42 | 1 | 58.50 | …\
  \ | 2022-05-16 |\n| 43 | 26 | 50.00 | … | 2022-05-16 |\n| 45 | 26 | 17.50 | … |\
  \ 2022-05-16 |\n| 518 | 50 | 13.00 | … | [NULL] |\n| ~ 5549 行 ~ |\n\n如果你想汇总该表，例如获取每月总计，数据就太细粒度了。相反，你可以通过将`ordered_date`格式化为年-月值来准备数据：\n\
  \n```\nWITH salesdata AS (\nSELECT\n--  PostgreSQL, Oracle\nto_char(ordered_date,'YYYY-MM')\
  \ AS month,\n--  MariaDB/MySQL\n--  date_format(ordered_date,'%Y-%m') AS month,\n\
  --  MSSQL\n--  format(ordered_date,'yyyy-MM') AS month,\n--  SQLite\n--  strftime('%Y-%m',ordered_date)\
  \ AS month,\ntotal\nFROM sales\n)\nSELECT month, sum(total) AS monthly_total\nFROM\
  \ salesdata\nGROUP BY month\nORDER BY month;\n```\n\n现在你将得到以下汇总：\n\n| **月份** | **月度总计**\
  \ |\n| --- | --- |\n| 2022-05 | 6966.50 |\n| 2022-06 | 12733.00 |\n| 2022-07 | 17314.00\
  \ |\n| 2022-08 | 19093.00 |\n| 2022-09 | 20295.50 |\n| 2022-10 | 27797.50 |\n| ~\
  \ 14 行 ~ |\n\n在现实生活中，你想汇总的许多内容格式都不正确，但你可以在 CTE 中准备它，使其就绪。\n\n我们将在第 9 章再次讨论 CTE，届时我们将看到更多可应用的技术。\n\
  \n"
- '# 总结


  在本章中，我们研究了在查询中使用子查询的各种变体。我们在前面的章节中已经看到过一些子查询，但在这里我们更仔细地研究了它们的工作原理。


  子查询可以在任何子句中使用。子查询的结果必须匹配该子句的上下文：


  *   `SELECT`子句或简单`WHERE`表达式中的子查询需要返回单个值。

  *   在`IN()`表达式中使用的子查询需要返回单个列。

  *   `FROM`子句中使用的子查询需要返回一个虚拟表。


  你也可以在`ORDER BY`子句中使用子查询，尽管你可能更希望在`SELECT`子句中使用该表达式。


  你还可以将子查询与`WHERE EXISTS`表达式或`LATERAL`连接一起使用。


  `FROM`子句中的子查询可以嵌套，尽管你可能更希望使用公用表表达式。


  ### 关联与非关联子查询


  子查询可以是关联的或非关联的：


  *   非关联子查询独立于主查询，并被计算一次。然后结果用于主查询。

  *   关联子查询是引用主查询中数据的那种。它为每一行计算一次。


  关联子查询可能代价高昂，因为它会被计算多次，因此可能存在更合适的替代方案。


  ### WHERE EXISTS 表达式


  `WHERE EXISTS`测试子查询是否返回任何行；如果返回，则保留主查询中的行；否则，将其过滤掉。


  在`WHERE EXISTS`中使用非关联子查询通常会返回主查询中的所有行或不返回任何行。使用关联子查询将过滤选择性行。


  你通常可以使用`IN()`表达式作为替代方案，但有时`WHERE EXISTS`允许使用更复杂的子查询。它也绕过了`NOT IN`的怪癖。


  ### LATERAL 连接（亦称 CROSS APPLY）


  `LATERAL JOIN`（在某些 DBMS 中为`CROSS APPLY`）允许你向主查询中的每一行添加列：


  *   你可以使用`LATERAL JOIN`来添加计算列，并且可以链接它们，因此可以有多个计算和中间值。

  *   你也可以使用`LATERAL JOIN`从子查询中添加多个列。


  ### 公用表表达式


  子查询可以在`FROM`子句中使用，但它可能很复杂，特别是在需要多个子查询的情况下，这些子查询必须嵌套。


  公用表表达式允许你在主查询之前定义一个虚拟表，使主查询能够像普通查询一样工作。


  你也可以将多个 CTE 链接在一起，这比嵌套子查询更容易处理。


  ## 后续内容


  在第 5 章中，我们研究了聚合数据。通常，聚合值不能与非聚合值混合，除非在其中放入几个子查询。


  **窗口函数**是一组函数，其作用是将子查询应用于每一行。窗口函数主要有两大类：


  *   聚合函数可用于将聚合应用于非聚合查询的每一行。它们也可用于累积或分组聚合。

  *   排序函数可用于根据行在数据集中的位置生成值。它们可用于指示行位置或某些分组。它们也可用于从其他行获取值。


  使用窗口函数，你将能够生成结合了纯数据与更多分析数据的数据集。



