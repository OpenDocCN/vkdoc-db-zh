  raw: '### Creating a Unique Index


    There are some columns where you might not expect duplicated values. For example,
    in your customer table, you wouldn’t expect two customers to have the same email
    address, especially if they’re expected to log in using the email address. Similarly,
    you mightn’t expect different customers to have the same phone numbers.


    Other columns, such as the family name or date of birth, should happily allow
    for duplicates: duplicated values are simply a coincidence.


    The `customers` table has already protected against duplicated email addresses
    by including the `UNIQUE` property on that column. We will do the same with the
    phone number.


    Before you do, however, you will need to make sure that there aren’t any existing
    duplicates. SQL will refuse to do anything which violates the constraints of the
    database, so if you have duplicated phone numbers, you won’t be able to add a
    `UNIQUE` constraint until those duplicates are resolved.


    To find duplicates, you use an aggregate group query. For example, you might want
    to look for customers with duplicate names:


    ```

    SELECT familyname, givenname, count(*) AS number

    FROM customers

    GROUP BY familyname, givenname;

    ```


    By grouping the names, you can count how many times they appear. Of course, since
    you’re only interested in those that appear more than once, you can filter the
    results with a `HAVING` clause:


    ```

    SELECT familyname, givenname, count(*) AS number

    FROM customers

    GROUP BY familyname, givenname

    HAVING count(*)>1;

    ```


    You should see a short list of candidates:


    | familyname | Givenname | number |

    | --- | --- | --- |

    | Free | Judy | 2 |

    | Mate | Annie | 2 |

    | Christmas | Mary | 2 |

    | Tuckey | Ken | 2 |

    | Ander | Corey | 2 |

    | Dunnit | Ida | 2 |

    | Bearer | Paul | 2 |

    | Bell | Terry | 2 |


    In the preceding query, the rows are grouped by `familyname` and `givenname` and
    summarized. The `HAVING` clause filters for those groups where there are more
    than one instance. The `SELECT` clause then outputs those names and the number
    of instances.


    You don’t need the `count(*)` in the `SELECT` clause, of course, but it helps
    to make the result clearer.


    Of course, it’s no problem if you find duplicate family names: many people have
    the same name as someone else. However, it can be if you find duplicate phone
    numbers:


    | **phone** | **number** |

    | --- | --- |

    | [NULL] | 17 |


    ```

    SELECT phone, count(*) AS number

    FROM customers

    GROUP BY phone

    HAVING count(*)>1;

    ```


    In this case, there are no duplicates. What appear to be duplicates are `NULL`s,
    because there are multiple `NULL`s in the table. They don’t count.


    If you do find duplicates, then you have your work cut out for you in trying to
    work out whether these duplicates are legitimate. You might even conclude that
    duplicate phone numbers are OK, so you wouldn’t go ahead with the next step.


    Assuming that duplicates are *not* OK, to protect against duplicates, you add
    a `UNIQUE INDEX`:


    ```

    --  Not MSSQL

    CREATE UNIQUE INDEX uq_customers_phone

    ON customers(phone);

    ```


    Microsoft SQL has a quirk which regards multiple `NULL`s as duplicates,^([³](#fn3))
    so you will need this workaround:


    ```

    --  MSSQL

    CREATE UNIQUE INDEX uq_customers_phone

    ON customers(phone)

    WHERE phone IS NOT NULL;

    ```


    Note that this time the index name begins with `uq` as a reminder that this is
    a unique index. Again, there are no rules for how to name the index, but this
    one follows a common and understandable pattern.


    Whether or not you really want to disallow duplicate phone numbers is another
    question. Two customers from the same household or organization may well share
    the same phone number, so disallowing them would be problematic. This is an exercise
    in *how* to disallow duplicates, but not necessarily on *whether* to disallow
    duplicates. That’s something best left to the needs of the individual database.


    ## Review


    A well-designed SQL database needs to follow a few rules to ensure that the data
    can be relied upon. There is no guarantee that the data is *true*, but the data
    will at least be *valid*.


    ### Normal Form


    A table which follows certain design principles is said to be in a normal form.
    This doesn’t mean that it’s commonplace, but rather that it is in a definitive
    form.


    Normalized tables include the following properties:


    *   Data is atomic.


    *   Rows are unordered.


    *   Rows are unique.


    *   Rows are independent of each other.


    *   Columns are independent of each other.


    *   Columns are of a single type.


    *   Column names are unique.


    *   Columns are unordered.


    ### Multiple Values


    One issue in developing tables is how to handle multiple values and recurring
    values. In general, the solution is to have additional tables and to link them
    using foreign keys.


    ### Altering Tables


    When restructuring or hardening a database, you need to make changes to existing
    tables and columns. The `ALTER TABLE` statement can be used to


    *   Add extra columns, including foreign keys


    *   Drop columns


    *   Add or drop constraints


    *   Add or drop indexes


    Constraints include adding `NOT NULL`, defaults, and additional `CHECK` constraints.


    ### Views


    A view is a saved SELECT statement. One reason to create a view is for the convenience
    of having data from one or more tables in one place.


    Sometimes, when you create a view with combined data, you end up with a result
    which no longer follows all the rules of normalization. In the trade, this would
    be referred to as **denormalization**.


    Denormalized data is generally a bad way to maintain data, but very often a convenient
    way to extract data. In this sense, it is the best of both worlds: the original
    data is still intact in the original tables.


    Some DBMSs include the ability to update data in view. In fact, the update doesn’t
    affect the view at all, but is rather passed on to the underlying tables.


    ### Indexes


    An index is a supplement to a table which stores the selected data in order, together
    with a reference to the data in the original table. Using the index, the DBMS
    can search for data more quickly.


    Indexes are automatically created for primary keys and unique columns. You can
    add an index on any other column.


    Indexes have some costs, so they shouldn’t be added for no reason. Costs include
    storage and maintenance.


    Unique indexes can be added to ensure that values in a particular column, or combination
    of columns, are unique.


    ### The Final Product


    After you’ve made the changes to the table structures, your database will resemble
    the design in Figure [2-1](#606708_1_En_2_Chapter.xhtml#Fig1).


    ![](images/606708_1_En_2_Chapter/606708_1_En_2_Fig1_HTML.jpg)


    An illustration represents the layout of the database tables such as v i p, customers,
    towns, countries, sales, sale items, books, book genres, genres, employees, and
    authors, which interact with each other.


    Figure 2-1


    The Improved Database Design


    ## Summary


    In this chapter, we focused on the properties of individual tables and looked
    for ways to make the database more reliable and more efficient.


    We looked at


    *   The principles of normalized SQL tables


    *   How multiple values are handled in normalized tables


    *   Altering tables to improve their reliability and to better fit the principles
    of normal tables


    *   Creating views to improve access to multiple tables


    *   Adding an index to improve efficiency


    The process of improving the database was, of course, incomplete, but it gives
    us a better understanding of what makes a database more reliable and more efficient.


    ## Coming Up


    In this chapter, we’ve been focused on properties of individual tables, which
    help to improve the integrity and efficiency of the tables.


    In the next chapter, we’ll look more at how multiple tables interact.


