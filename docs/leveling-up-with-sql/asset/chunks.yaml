  trans: "\n### 修复可空列的问题\n\n`saleitems` 表中包含一个名为 `quantity` 的列——这代表你购买该书的数量：\n\n```sql\n\
    SELECT * FROM saleitems ORDER BY saleid,id;\n```\n\n你将看到类似以下内容：\n\n| **Id** |\
    \ **saleid** | **bookid** | **quantity** | **price** |\n| --- | --- | --- | ---\
    \ | --- |\n| 1 | 1 | 1403 | 1 | 11.5 |\n| 2 | 1 | 1861 | 1 | 13.5 |\n| 3 | 1 |\
    \ 643 | [NULL] | 18 |\n| 4 | 2 | 187 | 1 | 10 |\n| 5 | 2 | 1530 | 1 | 12.5 |\n\
    | 6 | 2 | 1412 | 2 | 16 |\n| ~ 13964 rows ~ |\n\n然而，由于疏忽，该列允许 `NULL` 值，如果你仔细查看，会发现很多行中存在这种情况。这不合常理：如果你不知道要购买多少本，就无法生成销售明细。\n\
    一个合理的推测是：缺失的 `quantity` 表示数量为 `1`。你可以使用 `coalesce()` 函数来实现这个推测：\n\n```sql\nSELECT\n\
    id, saleid, bookid,\ncoalesce(quantity,1) AS quantity, price\nFROM saleitems\n\
    ORDER BY saleid, id;\n```\n\n现在，除了 `NULL` 值被替换为 `1` 之外，我们将得到相同的结果：\n\n| **id**\
    \ | **saleid** | **bookid** | **quantity** | **Price** |\n| --- | --- | --- |\
    \ --- | --- |\n| 1 | 1 | 1403 | 1 | 11.5 |\n| 2 | 1 | 1861 | 1 | 13.5 |\n| 3 |\
    \ 1 | 643 | 1 | 18 |\n| 4 | 2 | 187 | 1 | 10 |\n| 5 | 2 | 1530 | 1 | 12.5 |\n\
    | 6 | 2 | 1412 | 2 | 16 |\n| ~ 13964 rows ~ |\n\n如同使用 `coalesce()` 函数时通常需要做的那样，你必须检查你的假设。`1`\
    \ *真的*是一个合理的推测吗？在这种情况下，它不太可能代表零本或其他数字，但这确实取决于具体情况。为了本次练习，我们暂且接受这个推测...\n我们当然不希望每次都手动处理，因此我们将修正旧数据并防止未来出现\
    \ `NULL` 值。\n接下来的操作不适用于 SQLite。不过，在此之后会有一节专门说明如何在 SQLite 中进行相同的更改。\n\n#### 替换\
    \ NULL 数量值\n\n首先，我们将禁止 `NULL` 值。稍后，我们将为 `quantity` 列添加一个 `NOT NULL` 约束。然而，在清除现有的\
    \ `NULL` 值之前，我们无法这样做，因为即使约束是后来添加的，DBMS（数据库管理系统）也绝不会允许违反约束。\n假设这没问题，我们可以将 `NULL`\
    \ 值替换为 `1`：\n\n```sql\nUPDATE saleitems\nSET quantity=1\nWHERE quantity IS NULL;\n\
    ```\n\n从现在开始，对于现有数据，我们不再需要使用 `coalesce()`，但我们需要防止未来出现 `NULL` 值。\n\n#### 为数量列设置\
    \ NOT NULL 约束\n\n接下来是在该列上设置一个 `NOT NULL` 约束：\n\n```sql\n--  PostgreSQL\nALTER\
    \ TABLE saleitems ALTER COLUMN quantity SET NOT NULL;\n--  MySQL/MariaDB\nALTER\
    \ TABLE saleitems MODIFY quantity INT NOT NULL;\n--  MSSQL\nALTER TABLE saleitems\
    \ ALTER COLUMN quantity INT NOT NULL;\n--  Oracle\nALTER TABLE saleitems MODIFY\
    \ quantity NOT NULL;\n--  SQLite 中无法直接实现\n```\n\n之前，`ALTER TABLE` 语句被用来添加或删除列。你也可以用它来修改现有列。这里，我们用它来添加一个\
    \ `NOT NULL` 约束。\n正如你之前所见，每个 DBMS 对 `ALTER TABLE` 语句都有其细微的语法差异。\n\n#### 为数量列设置\
    \ DEFAULT 默认值\n\n原则上，导致 `NULL` 值出现的原因可能会再次发生，只是现在会引发错误。更好的做法是，我们应提供一个默认值 `1`，以防未来的交易中再次缺失数量：\n\
    \n```sql\n--  PostgreSQL\nALTER TABLE saleitems\nALTER COLUMN quantity SET DEFAULT\
    \ 1;\n--  MySQL/MariaDB\nALTER TABLE saleitems\nMODIFY quantity INT DEFAULT 1;\n\
    --  MSSQL\nALTER TABLE saleitems\nADD DEFAULT 1 FOR quantity;\n--  Oracle\nALTER\
    \ TABLE saleitems\nMODIFY quantity DEFAULT 1;\n--  SQLite 中无法直接实现\n```\n\n`DEFAULT`\
    \ 值是在你不提供值时使用的值。该列不一定要是 `NOT NULL`，`NOT NULL` 列也不一定要有 `DEFAULT`。然而，在这种情况下，这是一个合理的组合。\n\
    再次注意，每个 DBMS 的语法都有其细微差异。\n\n#### 为数量列添加正数 CHECK 约束\n\n在我们微调 `quantity` 列的行为时，你还可以防止另一种可能的错误。原则上，整数可以包含负值，这对于\
    \ `quantity` 来说毫无意义。即使零在当前情况下也不合适。\n你可以使用 `CHECK` 约束来防止出现超出范围的值：\n\n```sql\nCHECK\
    \ (quantity>0)\n```\n\n你也可以使用 `BETWEEN` 表达式来设置一个上限：\n\n```sql\nCHECK (quantity\
    \ BETWEEN 1 AND 5)\n```\n\n请记住 `BETWEEN` 是包含边界的。\n然而，在施加任意限制（例如最大为 5）时必须谨慎，因为比如说，购买\
    \ 6 本并非不可能。我们将这个决定留待将来。\n要添加 `CHECK` 约束，你再次需要使用 `ALTER TABLE`：\n\n```sql\n-- \
    \ PostgreSQL\nALTER TABLE saleitems\nADD CHECK (quantity>0);\n--  MySQL/MariaDB\n\
    ALTER TABLE saleitems\nMODIFY quantity INT CHECK(quantity>0);\n--  MSSQL\nALTER\
    \ TABLE saleitems\nADD CHECK(quantity>0);\n--  Oracle\nALTER TABLE saleitems\n\
    MODIFY quantity CHECK(quantity>0);\n--  SQLite 中无法直接实现\n```\n\n至此，我们已经使 `quantity`\
    \ 列更加可靠了。\n\n#### 合并更改\n\n在某些 DBMS 中，可以将这些更改合并到一个 `ALTER TABLE` 语句中：\n\n```sql\n\
    --  PostgreSQL\nALTER TABLE saleitems\nALTER COLUMN quantity SET NOT NULL,\nALTER\
    \ COLUMN quantity SET DEFAULT 1,\nADD CHECK (quantity>0);\n--  MySQL/MariaDB\n\
    ALTER TABLE saleitems MODIFY quantity INT\nNOT NULL\nDEFAULT 1\nCHECK(quantity>0);\n\
    --  Oracle\nALTER TABLE saleitems MODIFY quantity\nDEFAULT 1\nNOT NULL\nCHECK(quantity>0);\n\
    --  MSSQL 中无法实现\n--  SQLite 中无法实现\n```\n\n由于你实际上并不经常进行这类更改，即使将步骤分开执行也没有什么损失。\n\
    \n#### 在 SQLite 中进行更改\n\n如你所见，SQLite 在更改表结构方面能力非常有限。通常，SQLite 只能对表进行以下更改：\n* \
    \  添加列\n*   重命名列\n*   删除列\n\n然而，只要我们不介意列的顺序不同，这就足以实现我们想要的所有更改。\n要完成前面所有的更改：\n\n\
    1.  重命名原始的 `quantity` 列：\n    ```sql\n    ALTER TABLE saleitems\n    RENAME quantity\
    \ TO oldquantity;\n    ```\n2.  添加一个具有所需属性的新 `quantity` 列：\n    ```sql\n    ALTER\
    \ TABLE saleitems\n    ADD quantity INT NOT NULL DEFAULT 1 CHECK(quantity>0);\n\
    \    ```\n3.  将数据从旧列复制到新列：\n    ```sql\n    UPDATE saleitems\n    SET quantity=oldquantity;\n\
    \    ```\n4.  删除旧列：\n    ```sql\n    ALTER TABLE saleitems\n    DROP oldquantity;\n\
    \    ```\n\n新列将位于表的末尾，与原始列位置不同，但这并不是什么大问题。\n"
- fmt: '### Other Adjustments


    As often in the development process, it’s not hard to get something working, but
    the main effort goes into making it working just right. Here are some suggestions
    to improve both the integrity and the performance of the database.


    We’ll talk about indexes in the next section: they help in making the data easier
    to search or sort.


    | **table** | **column** | **suggestion** |

    | --- | --- | --- |

    | Customers |

    |   | height | `CHECK` (`height>0`) – or `height BETWEEN 60 and 260` |

    |   | dob | `CHECK` (`dob<current_timestamp`) |

    |   | registered | `CHECK` (`registered<current_timestamp`) |

    | Authors |

    |   | names | `INDEX` |

    |   | dates | `CHECK` (`born<died`) |

    |   | gender | `CHECK` (`gender IN(‘m‘,‘f‘)`) |

    |   |   | `CHECK` (`givenname IS NOT NULL OR familyname IS NOT NULL`) |

    | Books |

    |   | authorid | `INDEX` |

    |   | title | `INDEX` |

    |   | published | `CHECK` (`published < year(current_timestamp)`) |

    |   | price | `CHECK` (`price>=0`) |

    | Sales |

    |   | total | `CHECK` (`total>=0`) |

    |   | ordered | `CHECK` (`ordered<current_timestamp`) |

    |   | customerid | `INDEX` |

    |   |   | `CHECK` (`shipped>=ordered`) |

    | Saleitems |

    |   | saleid | `INDEX` |

    |   | bookid | `INDEX` |

    |   | quantity | `NOT NULL CHECK(quantity>0) DEFAULT 1` |

    |   | price | `CHECK(price>=0)` |


    You’ll notice that some of the `CHECK` constraints aren’t associated with a single
    column. Some constraints are more concerned with how one column relates to another
    column.


    We certainly won’t address all of these suggestions here. After all, this isn’t
    a real working database, and it’s quite possibly not your job anyway. We’ll just
    look at two more.


    #### Ensuring the Prices Are Not Negative


    If it were possible to define a data type as nonnegative, we should use that type
    for many columns. For example, MySQL/MariaDB has a data type called `UNSIGNED
    INT`: being unsigned it will always be zero or positive, which is handy for some
    counters, as well as for quantities.


    The alternative, of course, is to use a `CHECK` constraint to restrict the values.
    We’ll build that into the price of books.


    One thing you might consider is a suitable minimum or maximum price, for which
    you might use a `BETWEEN` condition. However, that might change over time, so
    it’s not always practical.


    What we’ll do here is just make sure that the price is never less than zero. We
    will allow zero in case we have something we’re prepared to give away, but the
    price should never be less than zero.


    Adding that constraint is simple, but again the syntax varies between DBMSs:


    ```

    --  PostgreSQL

    ALTER TABLE books ADD CHECK (price>=0);

    --  MySQL/MariaDB

    ALTER TABLE books MODIFY price INT CHECK(price>=0);

    --  MSSQL

    ALTER TABLE books ADD CHECK(price>=0);

    --  Oracle

    ALTER TABLE books MODIFY price CHECK(price>=0);

    ```


    Again, to do this with SQLite, you can follow the steps for the `quantity` in
    `saleitems` earlier.


    #### Ensuring That an Author Is Born Before Dying


    Whenever you have multiple columns with similar data, you run the risk of having
    them the wrong way round.


    One notorious example is the name: you sort the name as `familyname`, then `givenname`,
    so it makes sense to store it that way, but you often view it the other way. It’s
    not hard to imagine how the name might be entered the wrong way.


    The `authors` table has two dates: the `born` date and the `died` date. In this
    case, they’re stored chronologically, but it would still be good to make sure.


    Here, we’ll add a `table constraint`—a constraint which is applied to the table
    rather than to an individual column. Column constraints can also be added this
    way, but some constraints don’t apply to single columns.


    If we had the chance to recreate the table from scratch, we’d do something like
    this:


    ```

    CREATE TABLE authors (

    id int PRIMARY KEY,     --  auto-numbered as per DBMS

    --  givenname, othernames, familyname,

    born DATE,

    died DATE,

    --  gender, home,

    --  Table Constraint:

    CONSTRAINT ck_author_dates CHECK(born<died)

    );

    ```


    Here, the constraint appears as an additional property, typically, though not
    necessarily, at the end.


    Given that the table already exists and that it already has data, that opportunity
    has passed us by. However, we can add the table constraint retroactively.


    First, of course, you need to check for any data which might violate the constraint:


    ```

    SELECT * FROM authors WHERE born<died;

    ```


    There shouldn’t be any. If there are, then you’re on your own. You’ll have to
    do your own research on what the correct dates should be, or, if you’re desperate,
    you can set them to `NULL`.


    The next step would be to add the table constraint:


    ```

    ALTER TABLE authors ADD CHECK (born<died);

    ```


    Unlike adding a column constraint, the various DBMSs all use the same syntax—except,
    of course, for SQLite. There is no simple method for adding a table constraint
    in SQLite. Complex methods include dropping and recreating the whole table similar
    to dropping and recreating a column or tampering with the internals of the database,
    which is definitely not for the fainthearted.'
  raw: '### Other Adjustments


    As often in the development process, it’s not hard to get something working, but
    the main effort goes into making it working just right. Here are some suggestions
    to improve both the integrity and the performance of the database.


    We’ll talk about indexes in the next section: they help in making the data easier
    to search or sort.


    | **table** | **column** | **suggestion** |

    | --- | --- | --- |

    | Customers |

    |   | height | CHECK (height>0) – or height BETWEEN 60 and 260 |

    |   | dob | CHECK (dob<current_timestamp) |

    |   | registered | CHECK (registered<current_timestamp) |

    | Authors |

    |   | names | INDEX |

    |   | dates | CHECK (born<died) |

    |   | gender | CHECK (gender IN(‘m’,‘f’)) |

    |   |   | CHECK (givenname IS NOT NULL OR familyname IS NOT NULL) |

