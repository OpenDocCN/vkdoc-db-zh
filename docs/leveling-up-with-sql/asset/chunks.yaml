    \ `0` or `''` on the other.\n\nWe’ll take advantage of this fact when we look\
    \ at aggregate filters later."
  trans: "# 5. 汇总数据\n\n数据库存储数据。这一点显而易见，但数据本身是相当静态的——你保存它，检索它，有时修改它。这对于某些需求来说没问题，但有时你希望数据能发挥更大作用。\n\
    \n当你开始对数据进行汇总时，就能让数据“工作”起来。这样你可以观察趋势、预见走向，或者仅仅是获得一个数据概览。\n\n聚合函数用于计算数据的摘要。它们有三种应用场景：\n\
    \n*   对整张表进行汇总。\n*   使用 `GROUP BY` 进行分组汇总。\n*   逐行包含摘要。这是通过使用 `OVER` 子句的 `窗口函数`\
    \ 来完成的。\n\n你将在第 8 章学习窗口函数。在本章中，我们将探讨如何使用 SQL 内置的聚合函数来计算摘要，无论是整体还是分组计算。\n\n## 基本聚合函数\n\
    \n毫无疑问，你已经对聚合函数有了一些经验。聚合函数本质上是统计性的，包括：\n\n*   `count`\n\n    计算一列中值的数量，无论实际值是什么。特殊情况是，`count(*)`\
    \ 计算表中的行数。\n*   `sum` 和 `avg`\n\n    对列中的值进行求和或计算平均值。当然，这仅在该列是数值类型时才能进行。\n*  \
    \ `max` 和 `min`\n\n    找出列中的最大或最小值。如果含义不明确的话，它们相当于使用 `ORDER BY` 时你会得到的第一个和最后一个值，当然，`NULL`\
    \ 值总是被忽略。\n*   `stddev`、`stddev_samp`、`stddev_pop` (PostgreSQL, MySQL/MariaDB,\
    \ Oracle) 或 `stdev`、`stdevp` (MSSQL)\n\n    计算列值的标准差。这可以是总体标准差或样本标准差。同样，这只适用于数值列。\n\
    \n    具体的函数名称（和拼写）在不同的数据库管理系统（DBMS）之间可能略有不同。PostgreSQL 将 `stddev` 视为 `stddev_samp`\
    \ 的同义词。MySQL/MariaDB 将其视为 `stddev_pop` 的同义词。Oracle 将其视为 `stddev_samp` 的一种变体。\n\
    \n根据所使用的 DBMS，还存在其他各种聚合函数，但前面列出的这些是相当典型的。\n\n例如：\n\n```sql\n--  图书数据\nSELECT\n\
    --  计算行数：\ncount(*) AS nbooks,\n--  计算一列中的值数：\ncount(price) AS prices,\n--  最便宜和最贵的价格\n\
    min(price) AS cheapest, max(price) AS priciest\nFROM books;\n```\n\n你会得到类似这样的结果：\n\
    \n| **nbooks** | **prices** | **cheapest** | **priciest** |\n| --- | --- | ---\
    \ | --- |\n| 1201 | 1096 | 10 | 20 |\n\n或者用于数值统计：\n\n```sql\n--  客户数据\nSELECT\n\
    --  计算行数：\ncount(*) AS ncustomers,\n--  计算一列中的值数：\ncount(phone) AS phones,\n--\
    \  身高统计\nstddev_samp(height) AS sd   --  MSSQL: stdev(height)\nFROM customers;\n\
    ```\n\n你会得到类似这样的结果：\n\n| **ncustomers** | **phones** | **sd** |\n| --- | --- |\
    \ --- |\n| 303 | 286 | 6.992 |\n\n所有这些函数都适用于数字，但只有以下函数可用于其他数据类型，如字符串和日期：\n\n*\
    \   `count`\n*   `max` 和 `min`\n\n例如：\n\n```sql\nSELECT\n--  计算一列中的值数：\ncount(dob)\
    \ AS dobs,\n--  最早和最晚的日期\nmin(dob) AS earliest, max(dob) AS latest\nFROM customers;\n\
    ```\n\n得到\n\n| **Dobs** | **earliest** | **latest** |\n| --- | --- | --- |\n|\
    \ 239 | 1943-05-18 | 2003-01-27 |\n\n我们在前面的描述中有些表述比较宽松。特别是：\n\n*   表可以是虚拟表，例如视图、连接或公用表表达式。\n\
    *   任何带有 `WHERE` 子句的表都会在应用聚合函数*之前*进行过滤。\n*   “值”我们肯定不包括 `NULL`。当你发现 `count()`\
    \ 忽略 `NULL` 而 `avg()` 的除数是非 `NULL` 值时，这一点尤其明显。\n*   这些函数适用于整张表或行组。\n\n### `NULL`\n\
    \n聚合函数不包含 `NULL`。唯一不那么明显的情况是使用求和函数时。然而，需要注意以下几点：\n\n*   `count(column)` 只会计数该列中的非\
    \ `NULL` 值，因此你得到的结果可能少于总行数。\n*   `avg(column)` 也会忽略 `NULL` 值，因此平均值只除以值的数量，而不一定是行数。\n\
    \n换句话说，`NULL` 与 `0` 或 `''` 有着天壤之别。\n\n我们稍后在研究聚合过滤器时，将会利用这一事实。"
- fmt: "## Understanding Aggregates\n\nUsing aggregates sometimes runs into a few\
    \ problems and seems to have a few quirky rules. It all makes more sense if you\
    \ understand how aggregates really work.\n\nWhen you aggregate data, the original\
    \ data is effectively transformed into a new virtual table, with summaries for\
    \ one or more groups.\n\nFor example, the query\n```sql\nSELECT\n    count(*)\
    \ AS rows,\n    count(phone) AS phones\nFROM customers;\n```\ncan be regarded\
    \ as\n```sql\nSELECT\n    count(*) AS rows,\n    count(phone) AS phones\nFROM\
    \ customers\nGROUP BY () --  PostgreSQL, MSSQL, Oracle only\n;\n```\n\nNote that\
    \ the clause `GROUP BY ()` doesn’t work for all DBMSs, such as MariaDB/MySQL or\
    \ SQLite. That doesn’t matter, since the grouping is happening anyway.\n\nThe\
    \ thing is, with or without the `GROUP BY ()` clause, SQL will generate the virtual\
    \ summary table as soon as it finds an aggregate function in the query.\n\nIn\
    \ the preceding example, the data is summarized into a single virtual summary\
    \ table of one row. In turn, this virtual table has grand totals for every column\
    \ as in Figure [5-1](#606708_1_En_5_Chapter.xhtml#Fig1).\n\n![](images/606708_1_En_5_Chapter/606708_1_En_5_Fig1_HTML.jpg)\n\
    Figure 5-1: Picturing GROUP BY ()\n\nThis is why you can’t include individual\
    \ row data with an aggregate query. For example, this won’t work:\n```sql\nSELECT\n\
    \    id,                     --  oops\n    count(*) AS rows,\n    count(phone)\
    \ AS phones\nFROM customers;\n```\nYou’ll get an error message basically telling\
    \ you that you can’t use the `id` in the query.\n\nNote that in MariaDB/MySQL\
    \ in traditional mode, you can indeed run this statement successfully. However,\
    \ the DBMS will pick the first `id` it can find, and that really has no meaningful\
    \ value. It’s mainly useful if you can be sure that all of the non-aggregate values\
    \ are the same.\n\nWhen you include a more meaningful `GROUP BY` clause, the result\
    \ is similar, except that\n\n* There is now one summary row for each group.\n\
    * There is also an additional column for each grouping column.\n\nIt looks something\
    \ like Figure [5-2](#606708_1_En_5_Chapter.xhtml#Fig2).\n\n![](images/606708_1_En_5_Chapter/606708_1_En_5_Fig2_HTML.jpg)\n\
    Figure 5-2: GROUP BY Something\n\nFor example:\n```sql\nSELECT\n    town, state,\
    \                --  grouping columns\n    count(phone) AS phones, --  summaries\
    \ for each group:\n    min(dob) AS oldest\nFROM customerdetails\nGROUP BY town,\
    \ state;\n```\nYou’ll get something like this:\n\n| **town** | **State** | **phones**\
    \ | **oldest** |\n| --- | --- | --- | --- |\n| [NULL] | [NULL] | 24 | 1946-04-30\
    \ |\n| The Gap | QLD | 5 | 1998-04-22 |\n| Lilydale | TAS | 3 | 1945-08-31 |\n\
    | Guildford | WA | 3 | 1985-10-06 |\n| Kingston | VIC | 2 | 1947-09-29 |\n| Reedy\
    \ Creek | NSW | 6 | 1960-12-30 |\n| ~ 92 rows ~ |\n\n(You may get a group of `NULL`s\
    \ either at the beginning or the end, because we haven’t filtered out the `NULL`\
    \ addresses.)\n\nIn the overall scheme of things, the (virtual) `GROUP BY` clause\
    \ appears after the `FROM` and possibly `WHERE` clauses and is evaluated at that\
    \ point:\n```sql\nSELECT ...\nFROM ...\nWHERE ...\nGROUP BY ...\n--  SELECT\n\
    ORDER BY ...\n```\n\nAs usual, `SELECT` is evaluated last before `ORDER BY`, even\
    \ though it is written first, as in Figure [5-3](#606708_1_En_5_Chapter.xhtml#Fig3).\n\
    \n![](images/606708_1_En_5_Chapter/606708_1_En_5_Fig3_HTML.jpg)\nFigure 5-3: Clause\
    \ Order\n\nSQL neither knows nor cares about the actual meaning of the data, so\
    \ there are no checks over whether you should apply these aggregate functions\
    \ to particular columns.\n\n## Aggregating Some of the Values\n\nIn some cases,\
    \ you may wish to aggregate only some of the values in a column. Here, we’ll look\
    \ at aggregating distinct values and then at filtering which values to aggregate.\n\
    \n### Distinct Values\n\nMost aggregate functions can be applied to distinct values,\
    \ but it is probably statistically invalid. However, it can be meaningful if you\
    \ *count* distinct values, such as in the following example:\n```sql\nSELECT\n\
    \    count(state) AS addresses,\n    count(DISTINCT state) AS states\nFROM customerdetails;\n\
    ```\nThis will count how many distinct states are in the customer details. That’s\
    \ not to say that you can’t count the `state` column anyway, as it indicates the\
    \ number of rows which have any address information at all:\n\n| **Addresses**\
    \ | **states** |\n| --- | --- |\n| 278 | 8 |\n\nBe careful, though. It’s possible\
    \ that the column doesn’t give the whole picture. For example, if you try\n```sql\n\
    SELECT count(DISTINCT town) FROM customerdetails;\n```\nyou’d get a result, but\
    \ it might be open to misinterpretation. What you’re getting is distinct *town\
    \ names*, but many of these town names appear in more than one state. You shouldn’t\
    \ interpret this as meaning distinct *towns*.\n\nAs for the other aggregate functions,\
    \ generally, it is meaningless to apply any other statistical calculation to only\
    \ one of each sample.\n\n### Aggregate Filter\n\nNormally, aggregate functions\
    \ apply to the whole table or to the whole group. For example, `count(*)` will\
    \ count all the rows in the table or group.\n\nA relatively new feature allows\
    \ you to apply an aggregate function to some of the rows. This can be applied\
    \ multiple times in the query.\n\nFor example, the following will count all the\
    \ customers in the customers table:\n```sql\nSELECT count(*) FROM customers;\n\
    ```\n\nSuppose you want to separate the customers into the younger and older customers.\n\
    \nYou might instinctively try something like this:\n```sql\n--  Don't bother trying\
    \ this:\nSELECT\n    count(dob='1980-01-01') AS younger\nFROM customers;\n```\n\
    \nIf the preceding query doesn’t produce an error, it is likely to be misinterpreted.\n\
    \nSQL does provide a working way of filtering what you want to filter. You can\
    \ enter the following:\n```sql\n--  PostgreSQL:\nSELECT\n    count(*) FILTER (WHERE\
    \ dob='1980-01-01') AS younger\nFROM customers;\n```\nYou get something like this:\n\
    \n| **Older** | **younger** |\n| --- | --- |\n| 133 | 106 |\n\nUnfortunately,\
    \ this is not well supported (currently, it is only supported in PostgreSQL).\
    \ However, the following alternative will do the same:\n```sql\nSELECT\n    count(CASE\
    \ WHEN dob='1980-01-01' THEN 1 END) AS young\nFROM customers;\n```\nThis uses\
    \ the `CASE` expression to separate the dob values. They will either be `1` or\
    \ `NULL`, and the `count()` function counts only the `1`s.\n\nYou can also use\
    \ this technique with other aggregate functions. For example:\n```sql\n--  New\
    \ Standard\nSELECT\n    sum(total),\n    sum(total) FILTER (WHERE ordered ='...')\
    \ AS newer\nFROM sales;\n--  Alternative\nSELECT\n    sum(total),\n    sum(CASE\
    \ WHEN ordered='...' THEN total END) AS newer\nFROM sales;\n```\nHere, the value\
    \ is either `total` or `NULL`, and `sum()` politely ignores the `NULL`s.\n\n|\
    \ **Sum** | **older** | **newer** |\n| --- | --- | --- |\n| 342836.22 | 162045\
    \ | 164873.22 |\n\nIf you’re interested in filtering for different categories,\
    \ however, you might get more of what you want with grouping."
  raw: '## Understanding Aggregates


    Using aggregates sometimes runs into a few problems and seems to have a few quirky
    rules. It all makes more sense if you understand how aggregates really work.


    When you aggregate data, the original data is effectively transformed into a new
    virtual table, with summaries for one or more groups.


    For example, the query


    ```

    SELECT

    count(*) AS rows,

    count(phone) AS phones

    FROM customers;

    ```


    can be regarded as


    ```

    SELECT

    count(*) AS rows,

    count(phone) AS phones

    FROM customers

    GROUP BY () --  PostgreSQL, MSSQL, Oracle only

    ;

    ```


    Note that the clause `GROUP BY ()` doesn’t work for all DBMSs, such as MariaDB/MySQL
    or SQLite. That doesn’t matter, since the grouping is happening anyway.


    The thing is, with or without the `GROUP BY ()` clause, SQL will generate the
    virtual summary table as soon as it finds an aggregate function in the query.


    In the preceding example, the data is summarized into a single virtual summary
    table of one row. In turn, this virtual table has grand totals for every column
    as in Figure [5-1](#606708_1_En_5_Chapter.xhtml#Fig1).


    ![](images/606708_1_En_5_Chapter/606708_1_En_5_Fig1_HTML.jpg)


    An illustration of a grid. The grid on the left has 8 rows and 8 columns. The
    first row has been removed from the grid.


    Figure 5-1


    Picturing GROUP BY ()


    This is why you can’t include individual row data with an aggregate query. For
    example, this won’t work:


    ```

    SELECT

    id,                     --  oops

    count(*) AS rows,

    count(phone) AS phones

    FROM customers;

    ```


    You’ll get an error message basically telling you that you can’t use the `id`
    in the query.


    Note that in MariaDB/MySQL in traditional mode, you can indeed run this statement
    successfully. However, the DBMS will pick the first `id` it can find, and that
    really has no meaningful value. It’s mainly useful if you can be sure that all
    of the non-aggregate values are the same.


    When you include a more meaningful `GROUP BY` clause, the result is similar, except
    that


    *   There is now one summary row for each group.


    *   There is also an additional column for each grouping column.


    It looks something like Figure [5-2](#606708_1_En_5_Chapter.xhtml#Fig2).


    ![](images/606708_1_En_5_Chapter/606708_1_En_5_Fig2_HTML.jpg)


    An illustration of a grid. It is divided into three sets. Apple, banana, and cherry.
    They combine to form one.


    Figure 5-2


    GROUP BY Something


    For example:


    ```

    SELECT

    town, state,                --  grouping columns

    count(phone) AS phones, --  summaries for each group:

    min(dob) AS oldest

    FROM customerdetails

    GROUP BY town, state;

    ```


    You’ll get something like this:


    | **town** | **State** | **phones** | **oldest** |

    | --- | --- | --- | --- |

    | [NULL] | [NULL] | 24 | 1946-04-30 |

    | The Gap | QLD | 5 | 1998-04-22 |

    | Lilydale | TAS | 3 | 1945-08-31 |

    | Guildford | WA | 3 | 1985-10-06 |

    | Kingston | VIC | 2 | 1947-09-29 |

    | Reedy Creek | NSW | 6 | 1960-12-30 |

    | ~ 92 rows ~ |


    (You may get a group of `NULL`s either at the beginning or the end, because we
    haven’t filtered out the `NULL` addresses.)


    In the overall scheme of things, the (virtual) `GROUP BY` clause appears after
    the `FROM` and possibly `WHERE` clauses and is evaluated at that point:


    ```

    SELECT ...

    FROM ...

    WHERE ...

    GROUP BY ...

    --  SELECT

    ORDER BY ...

    ```


    As usual, `SELECT` is evaluated last before `ORDER BY`, even though it is written
    first, as in Figure [5-3](#606708_1_En_5_Chapter.xhtml#Fig3).


    ![](images/606708_1_En_5_Chapter/606708_1_En_5_Fig3_HTML.jpg)


    Two blocks, namely, written and processed, describe the clause order. SELECT from
    written and SELECT from processed are linked.


    Figure 5-3


    Clause Order


    SQL neither knows nor cares about the actual meaning of the data, so there are
    no checks over whether you should apply these aggregate functions to particular
    columns.


    ## Aggregating Some of the Values


    In some cases, you may wish to aggregate only some of the values in a column.
    Here, we’ll look at aggregating distinct values and then at filtering which values
    to aggregate.


    ### Distinct Values


    Most aggregate functions can be applied to distinct values, but it is probably
    statistically invalid. However, it can be meaningful if you *count* distinct values,
    such as in the following example:


    ```

    SELECT

    count(state) AS addresses,

    count(DISTINCT state) AS states

    FROM customerdetails;

    ```


    This will count how many distinct states are in the customer details. That’s not
    to say that you can’t count the `state` column anyway, as it indicates the number
    of rows which have any address information at all:


    | **Addresses** | **states** |

    | --- | --- |

    | 278 | 8 |


    Be careful, though. It’s possible that the column doesn’t give the whole picture.
    For example, if you try


    ```

    SELECT count(DISTINCT town) FROM customerdetails;

    ```


    you’d get a result, but it might be open to misinterpretation. What you’re getting
    is distinct *town names*, but many of these town names appear in more than one
    state. You shouldn’t interpret this as meaning distinct *towns*.


    As for the other aggregate functions, generally, it is meaningless to apply any
    other statistical calculation to only one of each sample.


    ### Aggregate Filter


    Normally, aggregate functions apply to the whole table or to the whole group.
    For example, `count(*)` will count all the rows in the table or group.


    A relatively new feature allows you to apply an aggregate function to some of
    the rows. This can be applied multiple times in the query.


    For example, the following will count all the customers in the customers table:


    ```

    SELECT count(*) FROM customers;

    ```


    Suppose you want to separate the customers into the younger and older customers.


    You might instinctively try something like this:


    ```

    --  Don''t bother trying this:

    SELECT

    count(dob=''1980-01-01'') AS younger

    FROM customers;

    ```


    If the preceding query doesn’t produce an error, it is likely to be misinterpreted.


    SQL does provide a working way of filtering what you want to filter. You can enter
    the following:


    ```

    --  PostgreSQL:

    SELECT

    count(*) FILTER (WHERE dob=''1980-01-01'') AS younger

    FROM customers;

    ```


    You get something like this:


    | **Older** | **younger** |

    | --- | --- |

    | 133 | 106 |


    Unfortunately, this is not well supported (currently, it is only supported in
    PostgreSQL). However, the following alternative will do the same:


    ```

    SELECT

    count(CASE WHEN dob=''1980-01-01'' THEN 1 END) AS young

    FROM customers;

    ```


    This uses the `CASE` expression to separate the dob values. They will either be
    `1` or `NULL`, and the `count()` function counts only the `1`s.


    You can also use this technique with other aggregate functions. For example:


    ```

    --  New Standard

    SELECT

    sum(total),

    sum(total) FILTER (WHERE ordered =''...'') AS newer

    FROM sales;

    --  Alternative

    SELECT

    sum(total),

    sum(CASE WHEN ordered=''...'' THEN total END) AS newer

    FROM sales;

    ```


    Here, the value is either `total` or `NULL`, and `sum()` politely ignores the
    `NULL`s.


    | **Sum** | **older** | **newer** |

    | --- | --- | --- |

    | 342836.22 | 162045 | 164873.22 |


    If you’re interested in filtering for different categories, however, you might
    get more of what you want with grouping.'
  trans: "\n## 理解聚合\n\n使用聚合函数有时会遇到一些问题，并且似乎有一些古怪的规则。如果你真正理解了聚合的工作原理，这一切就说得通了。\n\n\
    当你聚合数据时，原始数据实际上被转换成一个新的虚拟表，其中包含一个或多个分组的摘要。\n\n例如，查询\n```sql\nSELECT\n    count(*)\
    \ AS rows,\n    count(phone) AS phones\nFROM customers;\n```\n可以被视为\n```sql\n\
    SELECT\n    count(*) AS rows,\n    count(phone) AS phones\nFROM customers\nGROUP\
    \ BY () --  仅 PostgreSQL, MSSQL, Oracle 有效\n;\n```\n\n请注意，`GROUP BY ()` 子句并非适用于所有数据库管理系统（DBMS），例如\
    \ MariaDB/MySQL 或 SQLite。不过这没关系，因为分组无论如何都会发生。\n\n关键是，无论有没有 `GROUP BY ()` 子句，只要\
    \ SQL 在查询中发现聚合函数，就会生成虚拟的汇总表。\n\n在前面的例子中，数据被汇总成一个单行的虚拟汇总表。反过来，这个虚拟表包含每个列的总计，如图\
    \ 5-1 所示。\n\n![](img/606708_1_En_5_Fig1_HTML.jpg)\n图 5-1：形象化理解 GROUP BY ()\n\n\
    这就是为什么你不能在聚合查询中包含单个行数据。例如，这样就行不通：\n```sql\nSELECT\n    id,                   \
    \  --  哎呀\n    count(*) AS rows,\n    count(phone) AS phones\nFROM customers;\n\
    ```\n你会得到一个错误消息，基本上告诉你不能在查询中使用 `id`。\n\n请注意，在传统模式下的 MariaDB/MySQL 中，你确实可以成功运行此语句。但是，DBMS\
    \ 会选择它能找到的第一个 `id`，而这实际上没有有意义的值。只有当你能够确定所有非聚合值都相同时，这个方法才主要有用。\n\n当你包含一个更有意义的 `GROUP\
    \ BY` 子句时，结果是类似的，除了：\n\n* 现在每个组有一个汇总行。\n* 每个分组列还会增加一个额外的列。\n\n看起来如图 5-2 所示。\n\n\
    ![](img/606708_1_En_5_Fig2_HTML.jpg)\n图 5-2：GROUP BY 某个字段\n\n例如：\n```sql\nSELECT\n\
    \    town, state,                --  分组列\n    count(phone) AS phones, --  每个组的摘要：\n\
    \    min(dob) AS oldest\nFROM customerdetails\nGROUP BY town, state;\n```\n你会得到类似这样的结果：\n\
    \n| **town** | **State** | **phones** | **oldest** |\n| --- | --- | --- | ---\
    \ |\n| [NULL] | [NULL] | 24 | 1946-04-30 |\n| The Gap | QLD | 5 | 1998-04-22 |\n\
    | Lilydale | TAS | 3 | 1945-08-31 |\n| Guildford | WA | 3 | 1985-10-06 |\n| Kingston\
    \ | VIC | 2 | 1947-09-29 |\n| Reedy Creek | NSW | 6 | 1960-12-30 |\n| ~ 约 92 行\
    \ ~ |\n\n（你可能会在开头或结尾得到一组 `NULL` 值，因为我们没有过滤掉 `NULL` 地址。）\n\n在整体流程中，（虚拟的）`GROUP\
    \ BY` 子句出现在 `FROM` 之后，并可能在 `WHERE` 子句之后，并在那个位置进行求值：\n```sql\nSELECT ...\nFROM\
    \ ...\nWHERE ...\nGROUP BY ...\n--  SELECT\nORDER BY ...\n```\n\n通常，`SELECT` 在\
    \ `ORDER BY` 之前最后求值，尽管它在书写时写在最前面，如图 5-3 所示。\n\n![](img/606708_1_En_5_Fig3_HTML.jpg)\n\
    图 5-3：子句顺序\n\nSQL 既不知道也不关心数据的实际含义，因此不会检查你是否应该将这些聚合函数应用于特定的列。\n\n## 聚合部分值\n\n在某些情况下，你可能只希望聚合列中的某些值。在这里，我们将看看如何聚合唯一值，以及如何筛选要聚合的值。\n\
    \n### 唯一值\n\n大多数聚合函数可以应用于唯一值，但这可能在统计上是无效的。然而，如果你*计数*唯一值，它可能是有意义的，如下例所示：\n```sql\n\
    SELECT\n    count(state) AS addresses,\n    count(DISTINCT state) AS states\n\
    FROM customerdetails;\n```\n这将统计客户详细信息中有多少个不同的州。这并不是说无论如何都不能计数 `state` 列，因为它表示有多少行具有任何地址信息：\n\
    \n| **Addresses** | **states** |\n| --- | --- |\n| 278 | 8 |\n\n不过要小心。可能该列不能反映全貌。例如，如果你尝试\n\
    ```sql\nSELECT count(DISTINCT town) FROM customerdetails;\n```\n你会得到一个结果，但这可能会被误解。你得到的是不同的*城镇名称*，但其中许多城镇名称出现在不止一个州中。你不应该将此解释为不同的*城镇*。\n\
    \n至于其他聚合函数，通常对每个样本只应用任何其他统计计算是没有意义的。\n\n### 聚合筛选器\n\n通常，聚合函数应用于整个表或整个组。例如，`count(*)`\
    \ 会计算表或组中的所有行。\n\n一个相对较新的特性允许你将聚合函数应用于部分行。这可以在查询中多次应用。\n\n例如，以下查询将统计 customers\
    \ 表中的所有客户：\n```sql\nSELECT count(*) FROM customers;\n```\n\n假设你想将客户分为年轻客户和年长客户。\n\
    \n你可能会本能地尝试这样做：\n```sql\n--  别费心尝试这个：\nSELECT\n    count(dob='1980-01-01') AS\
    \ younger\nFROM customers;\n```\n\n如果前面的查询没有产生错误，很可能会被误解。\n\nSQL 确实提供了一种有效的方法来筛选你想要筛选的内容。你可以输入：\n\
    ```sql\n--  PostgreSQL:\nSELECT\n    count(*) FILTER (WHERE dob='1980-01-01')\
    \ AS younger\nFROM customers;\n```\n你会得到类似这样的结果：\n\n| **older** | **younger**\
    \ |\n| --- | --- |\n| 133 | 106 |\n\n不幸的是，这并没有得到很好的支持（目前仅在 PostgreSQL 中支持）。然而，以下替代方法可以实现相同的效果：\n\
    ```sql\nSELECT\n    count(CASE WHEN dob='1980-01-01' THEN 1 END) AS young\nFROM\
    \ customers;\n```\n这使用 `CASE` 表达式来分离出生日期值。它们要么是 `1`，要么是 `NULL`，而 `count()` 函数只计算\
    \ `1`。\n\n你也可以将此技术用于其他聚合函数。例如：\n```sql\n--  新标准\nSELECT\n    sum(total),\n   \
    \ sum(total) FILTER (WHERE ordered ='...') AS newer\nFROM sales;\n--  替代方法\nSELECT\n\
    \    sum(total),\n    sum(CASE WHEN ordered='...' THEN total END) AS newer\nFROM\
    \ sales;\n```\n在这里，值要么是 `total`，要么是 `NULL`，而 `sum()` 会礼貌地忽略 `NULL`。\n\n| **Sum**\
    \ | **older** | **newer** |\n| --- | --- | --- |\n| 342836.22 | 162045 | 164873.22\
    \ |\n\n但是，如果你有兴趣为不同的类别进行筛选，使用分组可能会更符合你的需求。\n"
- fmt: '## Grouping by Calculated Values


    The preceding technique separates different groups horizontally—that is, each
    value is in the same row. You can also separate these derived groups vertically.
    This is achieved by using the `GROUP BY` clause.


    You will be familiar with using `GROUP BY` with simple column values:

    ```sql

    SELECT state, count(*)

    FROM customerdetails

    GROUP BY state;

    ```


    You can also group by a derived value. For example, you can group your customers
    by their month of birth:

    ```sql

    --  PostgreSQL, Oracle

    SELECT EXTRACT(month FROM dob) as monthnumber,

    count(*) AS howmany

    FROM customerdetails

    GROUP BY EXTRACT(month FROM dob)

    ORDER BY monthnumber;

    --  MSSQL

    SELECT month(dob) AS monthnumber, count(*) AS howmany

    FROM customerdetails

    GROUP BY month(dob)

    ORDER BY monthnumber;

    --  MySQL / MariaDB

    SELECT month(dob) AS monthnumber, count(*) AS howmany

    FROM customerdetails

    GROUP BY month(dob)

    ORDER BY monthnumber;

    --  SQLite

    SELECT strftime(''%m'',dob) as monthnumber,

    count(*) AS howmany

    FROM customerdetails

    GROUP BY strftime(''%m'',dob)

    ORDER BY monthnumber;

    ```


    In this example, the month number is called `monthnumber`, which is also used
    to sort the results.


    | **Monthnumber** | **howmany** |

    | --- | --- |

    | 1 | 19 |

    | 2 | 14 |

    | 3 | 17 |

    | 4 | 23 |

    | 5 | 24 |

    | 6 | 15 |

    | 7 | 27 |

    | 8 | 18 |

    | 9 | 18 |

    | 10 | 24 |

    | 11 | 17 |

    | 12 | 23 |

    | [NULL] | 64 |


    Note that the calculation appears twice, once in the `SELECT` clause and once
    in the `GROUP BY` clause. This is because the `SELECT` is evaluated after `GROUP
    BY`, so, alas, its alias is not yet available to `GROUP BY`.


    This is not a real problem, as the SQL optimizer will happily reuse the calculation,
    so it’s not really doing it twice.


    Unfortunately, the month number isn’t very friendly, so we could use the month
    name. However, inconveniently, the month name is in the wrong sort order, so we
    will need both:

    ```sql

    --  Not SQLite

    --  PostgreSQL, Oracle

    SELECT EXTRACT(month FROM dob) as monthnumber,

    to_char(dob,''Month'') AS monthname,

    count(*) AS howmany

    FROM customerdetails

    GROUP BY EXTRACT(month FROM dob), to_char(dob,''Month'')

    ORDER BY monthnumber;

    --  MSSQL

    SELECT month(dob) AS monthnumber,

    datename(month,dob) AS monthname, count(*) AS howmany

    FROM customerdetails

    GROUP BY month(dob), datename(month,dob)

    ORDER BY monthnumber;

    --  MySQL / MariaDB

    SELECT month(dob) AS monthnumber,

    monthname(dob) AS monthname, count(*) AS howmany

    FROM customerdetails

    GROUP BY month(dob), monthname(dob)

    ORDER BY monthnumber;

    ```


    This looks better:


    | **Monthnumber** | **monthname** | **howmany** |

    | --- | --- | --- |

    | 1 | January | 19 |

    | 2 | February | 14 |

    | 3 | March | 17 |

    | 4 | April | 23 |

    | 5 | May | 24 |

    | 6 | June | 15 |

    | 7 | July | 27 |

    | 8 | August | 18 |

    | 9 | September | 18 |

    | 10 | October | 24 |

    | 11 | November | 17 |

    | 12 | December | 23 |

    | [NULL] | [NULL] | 64 |


    As you see, you can’t quite do this in SQLite since it doesn’t have a function
    to get the month name.


    Technically, grouping by both is redundant, since there is only one month name
    per month. However, we need both so that we can display one, but order by the
    other.


    Although repeating the calculations is not a problem, it does make the query less
    readable and harder to maintain. We can take advantage of using a Common Table
    Expression:

    ```sql

    WITH cte AS (

    ...

    )

    SELECT monthname, count(*)

    FROM cte

    GROUP BY monthnumber, monthname

    ORDER BY monthnumber;

    ```


    You can use `GROUP BY` with any calculated field, but note that


    *   Since simple calculations don’t always result in something worth grouping,
    there is a limit on what you can do with them.

    *   As noted before, the calculation needs to be in both the `SELECT` clause and
    the `GROUP BY` clause, making the process tedious.


    The second point earlier can be alleviated with the use of Common Table Expressions.
    The first point can be addressed by the use of CASE statements.


    ### Grouping with CASE Statements


    The basic `GROUP BY` presupposes that you already have values which can be grouped.
    Sometimes, such values can be derived, such as the month or day name.


    More arbitrary groupings can be created using the `CASE` statement.


    For example, suppose we want to count the younger and older customers. We can
    do this by using a `CASE` statement which distinguishes between them:

    ```sql

    CASE

    WHEN dob<''1980-01-01'' THEN ''older''

    WHEN dob IS NOT NULL then ''younger''

    --  ELSE NULL

    END

    ```


    Remember that some `dob`s may be `NULL`, so you need to filter them to get the
    younger ones. Remember, too, that the default `ELSE` is `NULL`, so we don’t need
    to include it.


    To count them, we could include this in the `GROUP BY` clause as follows:

    ```sql

    SELECT count(*)

    FROM customers

    GROUP BY CASE

    WHEN dob<''1980-01-01'' THEN ''older''

    WHEN dob IS NOT NULL then ''younger''

    END;

    ```


    This gives you something:


    | **Count** |

    | 64 |

    | 133 |

    | 106 |


    but it’s useless without some sort of labels. We can do this by repeating the
    calculation in the `SELECT` clause:

    ```sql

    SELECT

    CASE

    WHEN dob<''1980-01-01'' THEN ''older''

    WHEN dob IS NOT NULL then ''younger''

    END AS agegroup,

    count(*)

    FROM customers

    GROUP BY CASE

    WHEN dob<''1980-01-01'' THEN ''older''

    WHEN dob IS NOT NULL then ''younger''

    END;

    ```


    This now works:


    | **Agegroup** | **count** |

    | --- | --- |

    | [NULL] | 64 |

    | Older | 133 |

    | Younger | 106 |


    but from the point of view of coding, it’s worse than the calculated columns in
    the previous section, so this would definitely benefit from the use of a Common
    Table Expression:

    ```sql

    WITH cte AS (

    SELECT

    *,

    CASE

    WHEN dob<''1980-01-01'' THEN ''older''

    WHEN dob IS NOT NULL then ''younger''

    END AS agegroup FROM customers

    )

    SELECT agegroup,count(*)

    FROM cte

    GROUP BY agegroup;

    ```


    This will now give you a more manageable result.


    ### Revisiting the Delivery Status


    Remember in a previous chapter we had created a delivery statistics using a nested
    `CASE` statement:

    ```sql

    WITH salesdata AS (

    --  PostgreSQL, MariaDB / MySQL, Oracle

    SELECT

    ordered, shipped, total,

    current_date - cast(ordered as date) AS ordered_age,

    shipped - cast(ordered as date) AS shipped_age

    FROM sales

    --  MSSQL

    SELECT

    ordered, shipped, total,

    datediff(day,ordered,current_timestamp)

    AS ordered_age,

    datediff(day,ordered,shipped) AS shipped_age

    FROM sales

    --  SQLite

    SELECT

    ordered, shipped, total,

    julianday(''now'')-julianday(ordered) AS ordered_age,

    julianday(shipped)-julianday(ordered) AS shipped_age

    FROM sales

    )

    SELECT

    ordered, shipped, total,

    CASE

    WHEN shipped IS NOT NULL THEN

    CASE

    WHEN shipped_age>14 THEN ''Shipped Late''

    ELSE ''Shipped''

    END

    ELSE

    CASE

    WHEN ordered_age<7 THEN ''Current''

    WHEN ordered_age<14 THEN ''Due''

    ELSE ''Overdue''

    END

    END AS status

    FROM salesdata;

    ```


    (Delete the unused `SELECT` statements, of course.) You get


    | **Ordered** | **shipped** | **total** | **status** |

    | --- | --- | --- | --- |

    | 2022-05-15 21:12:07.988741 | 2022-05-23 | 28 | Shipped |

    | 2022-05-16 03:03:16.065969 | 2022-05-24 | 34 | Shipped |

    | 2022-05-16 10:09:13.674823 | 2022-05-22 | 58.5 | Shipped |

    | 2022-05-16 15:02:43.285565 | [NULL] | 50 | Overdue |

    | 2022-05-16 16:48:14.674202 | 2022-05-28 | 17.5 | Shipped |

    | [NULL] | [NULL] | 13 | Overdue |

    | ~ 5549 rows ~ |


    If you want to summarize this into status groups, you can again put the whole
    statement into a CTE and then summarize the CTE. You already have one CTE to precalculate
    the age, so we’ll need another to hold the preceding results:

    ```sql

    WITH

    salesdata AS (

    --  as above

    ),

    statuses AS (

    SELECT

    ordered, shipped, total,

    CASE

    WHEN shipped IS NOT NULL THEN

    CASE

    WHEN shipped_age>14

    THEN ''Shipped Late''

    ELSE ''Shipped''

    END

    ELSE

    CASE

    WHEN ordered_age<7 THEN ''Current''

    WHEN ordered_age<14 THEN ''Due''

    ELSE ''Overdue''

    END

    END AS status

    FROM salesdata

    )

    SELECT status, count(*) AS number

    FROM statuses

    GROUP BY status;

    ```


    This will give you the summarized data:


    | **Status** | **Number** |

    | --- | --- |

    | Due | 94 |

    | Current | 78 |

    | Shipped | 3808 |

    | Overdue | 1273 |

    | Shipped Late | 296 |


    The next thing is to get the results in the right order.'
