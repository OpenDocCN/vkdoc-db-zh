- fmt: '#### Don’t Cascade Views Too Much


    You can build a view using other views. That can help simplify your workflow,
    but you need to be careful:


    *   Changing the underlying view may make a mess of the view. Some DBMSs won’t
    even allow you to change a view if another view depends on it.

    *   SQL tries to optimize your queries, but if your views are too deeply nested,
    it may not be able to optimize well.

    *   One of the views may have more than you need for the new view, so you’re wasting
    processing time generating what you don’t need.


    That doesn’t mean you shouldn’t build on existing views, just that you should
    do it judiciously.


    #### Don’t Use SELECT *


    There’s a good chance that `SELECT *` doesn’t give you quite what you want anyway,
    but, even if it does, you should probably list all of the columns specifically.
    Some DBMSs will even convert `SELECT *` to a column list.


    Reasons why `SELECT *` may not be a good idea include


    *   You may want your own column order rather than the default one.

    *   The underlying table may undergo a change in structure, so your view may not
    end up being what you originally expected.


    #### Avoid Using ORDER BY


    Most DBMSs allow you to include an `ORDER BY` clause, and, even in MSSQL, you
    can force it to. However, it may not be a good idea.


    There’s a good chance that you will want to sort the view in various ways. Even
    if there’s one sort order you prefer, you don’t want the DBMS to sort the result
    unnecessarily before you sort them again.


    What you should do, however, is make sure that your view includes whatever columns
    you’ll be sorting on later.


    ### Table-Valued Functions


    Views are a powerful tool, but there’s one shortcoming: you can’t change any of
    the values used in a view. For example, the `aupricelist` view has a hard-coded
    tax rate of 10%. A more flexible type of view would allow you to input your own
    tax rate. Such a view would then be called a `parameterized view`.


    Parameterized views are not generally supported in SQL. Some DBMSs support functions
    which generate a virtual table, known as a `Table-Valued Function`, or TVF if
    you’re in a hurry. This will give more or less the same result.


    Of our popular DBMSs, only PostgreSQL and Microsoft SQL Server support a straightforward
    method of creating a TVF. We’ll explore these two in the following discussion.


    Most DBMSs allow you to create custom functions. The notable exception is SQLite,
    which does, however, allow you to create functions externally and hook them in.


    A function which generates a single value at a time is called a `scalar` function.
    Built-in functions such as `lower()` and `length()` are scalar functions.


    When creating a function, there is, in a sense, a contract. The function definition
    includes what input data is expected and what sort of data will be returned. If
    the input data doesn’t fit, then don’t expect a result.


    A TVF works the same way: you define what input is expected, and you promise to
    return a table of results. Here, we’ll create a more generic price list which
    allows you to tell it what the tax rate is, rather than hard-coding it.


    To use the TVF, you use it like any virtual table:


    ```sql

    SELECT *

    FROM pricelist(15);

    ```


    Here, the TVF is called `pricelist()` and the input parameter is `15`, meaning
    15%. The code should handle converting that to `0.15`:


    | **id** | **Title** | **pub** | **author** | **price** | **tax** | **inc** |

    | --- | --- | --- | --- | --- | --- | --- |

    | 2078 | The Duel | 1811 | Heinrich von Kleis ... | 12.50 | 1.88 | 14.38 |

    | 503 | Uncle Silas | 1864 | J. Sheridan Le Fan ... | 17.00 | 2.55 | 19.55 |

    | 2007 | North and South | 1854 | Elizabeth Gaskell | 17.50 | 2.63 | 20.13 |

    | 702 | Jane Eyre | 1847 | Charlotte Brontë | 17.50 | 2.63 | 20.13 |

    | 1530 | Robin Hood, The Pr ... | 1862 | Alexandre Dumas | 12.50 | 1.88 | 14.38
    |

    | 1759 | La Curée | 1872 | Émile Zola | 16.00 | 2.40 | 18.40 |

    | ~ 1070 rows ~ |


    We’ll do that for PostgreSQL and MSSQL next.


    #### TVFs in PostgreSQL


    The outline of a TVF in PostgreSQL looks like this:


    ```sql

    CREATE FUNCTION pricelist(...)

    RETURNS TABLE (...)

    LANGUAGE plpgsql AS

    $$

    BEGIN

    RETURN QUERY

    SELECT ...

    END

    $$;

    ```


    In this outline


    *   The function name `pricelist` includes the input parameter names and types.

    *   The function will return a `TABLE` structure with column names and types.

    *   The coding language is `plpgsql` which is PostgreSQL’s standard coding language.

    *   The actual code is contained in one big string. Because there might be other
    strings in the code, the `$$` at either end acts as an alternative delimiter.

    *   The code is then placed between `BEGIN` and `END`; in this case, it will return
    the results of a `SELECT` query.


    Filling in the details, we can write


    ```sql

    DROP FUNCTION IF EXISTS pricelist(taxrate decimal(4,2));

    CREATE FUNCTION pricelist(taxrate decimal(4,2))

    RETURNS TABLE (

    id int, title varchar, published int, author text,

    price decimal(5,2), tax decimal(4,2), inc decimal(5,2)

    )

    LANGUAGE plpgsql AS $$

    BEGIN

    RETURN QUERY

    SELECT

    b.id, b.title, b.published,

    coalesce(a.givenname||'' '','''') || coalesce(othernames||'' '','''')

    || a.familyname AS author,

    b.price, b.price*taxrate/100 AS tax,

    b.price*(1+taxrate/100) AS inc

    FROM books as b LEFT JOIN authors a ON b.authorid=a.id

    WHERE b.price IS NOT NULL;

    END; $$;

    ```


    The output table is the most tedious part. In it, we have to list all of the column
    names and types we’re expecting to generate.


    As for the calculation, we’ve taken a user-friendly approach and allowed the tax
    rate to resemble the percentage we might have used in real life. We can’t use
    `%`, especially as that has another meaning, but other than that, we can use the
    value. However, we then need to divide by 100 to get its real value.


    #### TVFs in Microsoft SQL


    Creating a TVF in Microsoft SQL is much simpler than in PostgreSQL. The outline
    of a TVF in Microsoft SQL looks like this:


    ```sql

    GO

    CREATE FUNCTION pricelist(...) RETURNS TABLE AS

    RETURN SELECT ...

    GO

    ```


    There are two types of TVF in MSSQL. There is a more complex type, but the simpler
    type earlier is very similar to creating a view.


    In this outline


    *   The function name `pricelist` includes the input parameter names and types.

    *   The function will return a `TABLE` structure.

    *   In the simple TVF, there is only a single `SELECT` statement, which is immediately
    returned as the result.

    *   The actual code is almost the same as for the view, except that it will include
    the value from the input parameter.


    Filling in the details, we can write


    ```sql

    DROP FUNCTION IF EXISTS pricelist;

    GO

    CREATE FUNCTION pricelist(@taxrate decimal(4,2))

    RETURNS TABLE AS

    RETURN SELECT

    b.id, b.title, b.published,

    coalesce(a.givenname+'' '','''')

    + coalesce(othernames+'' '','''')

    + a.familyname AS author,

    b.price, b.price*@taxrate/100 AS tax,

    b.price*(1+@taxrate/100) AS inc

    FROM books as b JOIN authors a ON b.authorid=a.id

    WHERE b.price IS NOT NULL;

    GO

    ```


    The input parameter is called `@taxrate`. Actually, it’s really called `taxrate`,
    but MSSQL uses the `@` character to prefix all variables.


    As with the PostgreSQL version, we’ve taken a user-friendly approach and allowed
    the tax rate to resemble the percentage we might have used in real life. We can’t
    use `%`, especially as that has another meaning, but other than that, we can use
    the value. However, we then need to divide by 100 to get its real value.


    ### What Can You Do with a View?


    Given that a view is a virtual table, what sorts of things can be done with a
    view?


    #### Convenience


    The most immediate use of a view is as a convenient way of packaging a useful
    `SELECT` query. For example:


    ```sql

    SELECT * FROM customerdetails;

    SELECT * FROM aupricelist;

    ```


    Both of the preceding views include joins, and one includes a number of calculations.
    It’s much more convenient to use the saved view when you need it.'
