    --  anchor

    UNION ALL

    --  recursive: others (supervisorid NOT NULL)

    SELECT

    e.id, e.givenname, e.familyname, e.supervisorid,

    cte.givenname||'' ''||cte.familyname||'' < ''||

    cte.supervisors, n+1

    FROM cte JOIN employees AS e ON cte.id=e.supervisorid

    --  Oracle: no AS

    )

    SELECT * FROM cte

    ORDER BY id;

    ```


    The join is similar to the self-join earlier. The current employee is referred
    to in the `e` table alias, and this aliased table is joined to the CTE, which
    will be the supervisor. The raw data will be from the aliased table, while the
    supervisor’s details will be concatenated as the new `supervisors` parameter.


    Normally, you’d want to limit the recursion with a `WHERE` clause. For this one,
    the join will do the job, as it will stop when there are no more to be joined.


    The magic is in the expression for the `supervisors` string. In the recursive
