  trans: '# 使用公用表表达式


    ## 多列查询


    如前所述，SQL 不允许在 `SELECT` 子句中从单个子查询获取多列，因为 `SELECT` 子句中的所有内容都应是标量——即单个值。


    然而，如果上下文是类似表的结构（例如在 `FROM` 子句中），则可以获取多列。例如：


    ```sql

    --  PostgreSQL, MySQL (非 MariaDB)

    SELECT

    id, title,

    givenname, othernames, familyname

    FROM

    books

    LEFT JOIN LATERAL(

    SELECT givenname, othernames, familyname

    FROM authors

    WHERE authors.id=books.authorid

    ) AS a ON true;

    --  MSSQL

    SELECT

    id, title,

    givenname, othernames, familyname,

    home

    FROM books

    OUTER APPLY (

    SELECT givenname, othernames, familyname

    FROM authors

    WHERE authors.id=books.authorid

    ) AS a;

    --  Oracle: 与 MSSQL 相同，但不使用 AS

    ```


    结果类似于：


    | **id** | **标题** | **givenname** | **othernames** | **familyname** |

    | --- | --- | --- | --- | --- |

    | 2078 | The Duel | Heinrich | [NULL] | von Kleist |

    | 503 | Uncle Silas | J. | Sheridan | Le Fanu |

    | 2007 | North and South | Elizabeth | [NULL] | Gaskell |

    | 702 | Jane Eyre | Charlotte | [NULL] | Brontë |

    | 1530 | Robin Hood, The … | Alexandre | [NULL] | Dumas |

    | 1759 | La Curée | Émile | [NULL] | Zola |

    | ~ 约 1201 行 ~ |


    在这种情况下，使用普通的外连接同样可以轻松获得相同的结果：


    ```sql

    SELECT

    books.id, title,

    givenname, othernames, familyname,

    home

    FROM books LEFT JOIN authors ON authors.id=books.authorid;

    ```


    后一种形式显然更简单（为了简洁我们省略了表别名，并且出于必要对 `books.id` 列进行了限定）。


    另一方面，如果子查询是聚合查询，横向连接就非常方便，因为你反正需要一个子查询：请记住，你不能在单个 `SELECT` 语句中混合聚合数据和非聚合数据。


    例如，假设你想要一个客户列表及其各自的总销售额。你需要一个聚合查询来获取总和，再与客户表连接。你可以这样做：


    ```sql

    --  PostgreSQL, MySQL (非 MariaDB)

    SELECT

    id, givenname, familyname, total

    FROM

    customers

    LEFT JOIN LATERAL(

    SELECT sum(total) AS total FROM sales

    WHERE sales.customerid=customers.id

    ) AS totals ON true;

    --  MSSQL, Oracle (不使用 AS)

    SELECT

    id, givenname, familyname, total

    FROM

    customers

    OUTER APPLY(

    SELECT sum(total) AS total FROM sales

    WHERE sales.customerid=customers.id

    ) AS totals;

    ```


    这将得到类似这样的结果：


    | **Id** | **givenname** | **familyname** | **total** |

    | --- | --- | --- | --- |

    | 42 | May | Knott | 3437.72 |

    | 459 | Rick | Shaw | 461.00 |

    | 597 | Ike | Andy | [NULL] |

    | 186 | Pat | Downe | 1536.50 |

    | 352 | Basil | Isk | 573.00 |

    | 576 | Pearl | Divers | [NULL] |

    | ~ 约 303 行 ~ |


    尽管可能存在替代方案（在使用 SQLite 或 MariaDB 时你将会需要），但横向连接有时可以让这类查询更加直观。


    ## 语法


    我们已经看到可以在 `FROM` 子句中使用子查询，甚至可以嵌套它们。然而，还有一种替代方法可以使处理这些子查询更加自然。


    公用表表达式，朋友们简称 CTEs，是生成表结果的子查询。因此，你几乎总是可以用 CTE 替换 `FROM` 子查询。


    我们在前面的章节中已经使用过 CTEs，所以如果你有种*似曾相识（déjà vu）*的感觉，那是正常的。


    公用表表达式（CTEs）是 SQL 中相对较新的功能，但已存在一段时间，并且在几乎所有现代 DBMS 中都可用。值得注意的落后者是 MariaDB（在 2016
    年发布的 10.2 版本中添加了支持）和 MySQL（在 2018 年发布的 8.0 版本中添加了支持）。如果你被困在旧版本的 MariaDB 或 MySQL
    上，也许可以学着享受嵌套子查询。


    CTE 是在使用前定义的虚拟表。它与子查询相似，因为它包含一个 `SELECT` 语句，但语法不同，并且具有许多优点。


    最简单形式的 CTEs 是子查询的替代形式。即便如此，也有一个直接的好处：


    -   CTEs 更具可读性且更易于维护，因为它们在查询开头定义，而不是在中间定义。


    复杂的子查询可能有一个子查询引用另一个子查询。这涉及子查询的嵌套。


    -   CTEs 可以引用先前的 CTEs，而无需嵌套。


    这两个好处都与可读性和可维护性有关。第三个好处是普通子查询所不具备的。


    -   CTEs 可以引用自身；因此，它们可以是递归的。


    一个公用表表达式作为查询的一部分定义在主查询部分之前：


    ```sql

    WITH cte AS (subquery)

    SELECT columns FROM cte;

    ```


    CTE 被赋予一个名称，当然不一定非得是 `cte`。之后，它在主查询中被当作普通表使用。你可以如下定义多个 CTEs：


    ```sql

    WITH

    cte AS (subquery),

    another AS (subquery)

    SELECT columns FROM ...;

    ```'
- fmt: '### Using a CTE to Prepare Calculations


    还记得带有价格组的那个子查询吗？


    ```

    SELECT price_group, count(*) AS num_books

    FROM (

    SELECT

    id, title,

    CASE

    WHEN price < 17 THEN ''cheap''

    WHEN price < 30 THEN ''affordable''

    WHEN price >= 17 THEN ''expensive''

    END AS price_group

    FROM books

    ) AS sq     --  Oracle: ( ... ) sq

    GROUP BY price_group;

    ```


    这可以轻松地重写为CTE：


    ```

    --  Prepare Data

    WITH sq AS (

    SELECT

    id, title,

    CASE

    WHEN price < 17 THEN ''cheap''

    WHEN price < 30 THEN ''affordable''

    WHEN price >= 17 THEN ''expensive''

    END AS price_group

    FROM books

    )

    --  Use Prepared Data

    SELECT price_group, count(*) AS num_books

    FROM sq

    GROUP BY price_group;

    ```


    它看起来差别不大，但重要的是你现在将查询分成了两部分：第一部分定义子查询，第二部分使用它。这是一种组织代码的更好方式。


    子查询在查询的开头被转移到一个CTE中。从那时起，主`SELECT`语句引用该CTE，就好像它是另一张表一样。


    优点是查询是按照计划编写的：先准备数据，然后使用数据。


    目前MSSQL不要求在语句末尾使用分号，但你应该养成使用它的习惯。


    然而，`WITH`子句在前一个`SELECT`语句末尾有另一种含义，因此如果你不以分号结束前一个`SELECT`语句，它将被错误解释。


    只需在每个语句末尾使用分号，一切都会很好。不要听信这种无稽之谈：


    `;WITH (...)`


    这是另一个例子，我们将在接下来的几章中进一步使用它。如果你查看`sales`表：


    ```

    SELECT * FROM sales;

    ```


    你将看到以下内容：


    | **id** | **customerid** | **total** | **…** | **ordered_date** |

    | --- | --- | --- | --- | --- |

    | 39 | 28 | 28.00 | … | 2022-05-15 |

    | 40 | 27 | 34.00 | … | 2022-05-16 |

    | 42 | 1 | 58.50 | … | 2022-05-16 |

    | 43 | 26 | 50.00 | … | 2022-05-16 |

    | 45 | 26 | 17.50 | … | 2022-05-16 |

    | 518 | 50 | 13.00 | … | [NULL] |

    | ~ 5549 rows ~ |


    如果你想汇总该表，例如获取每月总计，数据就太细粒度了。相反，你可以通过将`ordered_date`格式化为年-月值来准备数据：


    ```

    WITH salesdata AS (

    SELECT

    --  PostgreSQL, Oracle

    to_char(ordered_date,''YYYY-MM'') AS month,

    --  MariaDB/MySQL

    --  date_format(ordered_date,''%Y-%m'') AS month,

    --  MSSQL

    --  format(ordered_date,''yyyy-MM'') AS month,

    --  SQLite

    --  strftime(''%Y-%m'',ordered_date) AS month,

    total

    FROM sales

    )

    SELECT month, sum(total) AS monthly_total

    FROM salesdata

    GROUP BY month

    ORDER BY month;

    ```


    现在你将得到以下汇总：


    | **Month** | **monthly_total** |

    | --- | --- |

    | 2022-05 | 6966.50 |

    | 2022-06 | 12733.00 |

    | 2022-07 | 17314.00 |

    | 2022-08 | 19093.00 |

    | 2022-09 | 20295.50 |

    | 2022-10 | 27797.50 |

    | ~ 14 rows ~ |


    在现实生活中，你想汇总的许多内容格式都不正确，但你可以在CTE中准备它，使其就绪。


    我们将在第9章再次讨论CTE，届时我们将看到更多可应用的技术。


    ## Summary


    在本章中，我们研究了在查询中使用子查询的各种变体。我们在前面的章节中已经看到过一些子查询，但在这里我们更仔细地研究了它们的工作原理。


    子查询可以在任何子句中使用。子查询的结果必须匹配该子句的上下文：


    *   `SELECT`子句或简单`WHERE`表达式中的子查询需要返回单个值。

    *   在`IN()`表达式中使用的子查询需要返回单个列。

    *   `FROM`子句中使用的子查询需要返回一个虚拟表。


    你也可以在`ORDER BY`子句中使用子查询，尽管你可能更希望在`SELECT`子句中使用该表达式。


    你还可以将子查询与`WHERE EXISTS`表达式或`LATERAL`连接一起使用。


    `FROM`子句中的子查询可以嵌套，尽管你可能更希望使用公用表表达式。


    ### Correlated and Non-correlated Subqueries


    子查询可以是关联的或非关联的：


    *   非关联子查询独立于主查询，并被计算一次。然后结果用于主查询。

    *   关联子查询是引用主查询中数据的那种。它为每一行计算一次。


    关联子查询可能代价高昂，因为它会被计算多次，因此可能存在更合适的替代方案。


    ### The WHERE EXISTS Expression


    `WHERE EXISTS`测试子查询是否返回任何行；如果返回，则保留主查询中的行；否则，将其过滤掉。


    在`WHERE EXISTS`中使用非关联子查询通常会返回主查询中的所有行或不返回任何行。使用关联子查询将过滤选择性行。


    你通常可以使用`IN()`表达式作为替代方案，但有时`WHERE EXISTS`允许使用更复杂的子查询。它也绕过了`NOT IN`的怪癖。


    ### LATERAL JOINS (a.k.a. CROSS APPLY)


    `LATERAL JOIN`（在某些DBMS中为`CROSS APPLY`）允许你向主查询中的每一行添加列：


    *   你可以使用`LATERAL JOIN`来添加计算列，并且可以链接它们，因此可以有多个计算和中间值。

    *   你也可以使用`LATERAL JOIN`从子查询中添加多个列。


    ### Common Table Expressions


    子查询可以在`FROM`子句中使用，但它可能很复杂，特别是在需要多个子查询的情况下，这些子查询必须嵌套。


    公用表表达式允许你在主查询之前定义一个虚拟表，使主查询能够像普通查询一样工作。


    你也可以将多个CTE链接在一起，这比嵌套子查询更容易处理。


    ## Coming Up


    在第5章中，我们研究了聚合数据。通常，聚合值不能与非聚合值混合，除非在其中放入几个子查询。


    **窗口函数**是一组函数，其作用是将子查询应用于每一行。窗口函数主要有两大类：


    *   聚合函数可用于将聚合应用于非聚合查询的每一行。它们也可用于累积或分组聚合。

    *   排序函数可用于根据行在数据集中的位置生成值。它们可用于指示行位置或某些分组。它们也可用于从其他行获取值。


    使用窗口函数，你将能够生成结合了纯数据与更多分析数据的数据集。'
  raw: '### Using a CTE to Prepare Calculations


    Remember the subquery with the price groups?


    ```

    SELECT price_group, count(*) AS num_books

    FROM (

    SELECT

    id, title,

    CASE

    WHEN price17 THEN ''expensive''

    END AS price_group

    FROM books

    ) AS sq     --  Oracle: ( ... ) sq

    GROUP BY price_group;

    ```


    That is easily rewritten as a CTE:


    ```

    --  Prepare Data

    WITH sq AS (

    SELECT

    id, title,

    CASE

    WHEN price17 THEN ''expensive''

    END AS price_group

    FROM books

    )

    --  Use Prepared Data

    SELECT price_group, count(*) AS num_books

    FROM sq

    GROUP BY price_group;

    ```


    It doesn’t look much different, but the important part is that you now have your
    query in two parts: the first part defines the subquery, and the second uses it.
    It’s a much better way of organizing your code.


    The subquery has been transferred to a CTE at the beginning of the query. From
    there on, the main `SELECT` statement references the CTE as if it were just another
    table.


    The advantage is that the query is written according to the plan: first prepare
    the data, and then use the data.


    MSSQL currently doesn’t require a semicolon at the end of a statement, but you
    should be in the habit of using it anyway.


    However, the `WITH` clause has an alternative meaning at the end of a previous
    `SELECT` statement, so it will be misinterpreted if you don’t end the previous
    `SELECT` statement with the semicolon.


    Just use the semicolon at the end of every statement, and all will be fine. *Don’t*
    fall for this nonsense:


    `;WITH (...)`


    Here’s another example, which we’ll use further in the next few chapters. If you
    look at the `sales` table:


    ```

    SELECT * FROM sales;

    ```


    you’ll see the following:


    | **id** | **customerid** | **total** | **…** | **ordered_date** |

    | --- | --- | --- | --- | --- |

    | 39 | 28 | 28.00 | … | 2022-05-15 |

    | 40 | 27 | 34.00 | … | 2022-05-16 |

    | 42 | 1 | 58.50 | … | 2022-05-16 |

    | 43 | 26 | 50.00 | … | 2022-05-16 |

    | 45 | 26 | 17.50 | … | 2022-05-16 |

    | 518 | 50 | 13.00 | … | [NULL] |

    | ~ 5549 rows ~ |


    If you want to summarize the table, such as to get monthly totals, the data is
    too fine-detailed. Instead, you can prepare the data by formatting the `ordered`
    as a year-month value:


    ```

    WITH salesdata AS (

    SELECT

    --  PostgreSQL, Oracle

    to_char(ordered,''YYYY-MM'') AS month,

    --  MariaDB/MySQL

    --  date_format(ordered,''%Y-%m'') AS month,

    --  MSSQL

    --  format(ordered,''yyyy-MM'') AS month,

    --  SQLite

    --  strftime(''%Y-%m'',ordered) AS month,

    total

    FROM sales

    )

    SELECT month, sum(total) AS daily_total

    FROM salesdata

    GROUP BY month

    ORDER BY month;

    ```


    You’ll now get the following summary:


    | **Month** | **daily_total** |

    | --- | --- |

    | 2022-05 | 6966.50 |

    | 2022-06 | 12733.00 |

    | 2022-07 | 17314.00 |

    | 2022-08 | 19093.00 |

    | 2022-09 | 20295.50 |

    | 2022-10 | 27797.50 |

    | ~ 14 rows ~ |


    In real life, much of what you want to summarize isn’t in the right form, but
    you can prepare it in a CTE to get it ready.


    We’ll have another look at CTEs in Chapter [9](#606708_1_En_9_Chapter.xhtml),
    where we’ll see more techniques we can apply.


    ## Summary


    In this chapter, we’ve had a look at using variations on subqueries in a query.
    We’ve already seen some subqueries in previous chapters, but here we had a closer
    look at how they work.


    Subqueries can be used in any clause. The results of the subquery must match the
    context of the clause:


    *   Subqueries in the `SELECT` clause or in simple `WHERE` expressions need to
    return a single value.


    *   Subqueries used in an `IN()` expression need to return a single column.


    *   Subqueries used in the `FROM` clause need to return a virtual table.


    You can also use subqueries in the `ORDER BY` clause, though you’d probably want
    to use the expression in the `SELECT` clause instead.


    You can also use subqueries with the `WHERE EXISTS` expression or in `LATERAL`
    joins.


    Subqueries in the `FROM` clause can be nested, though you would probably want
    to use a Common Table Expression instead.


    ### Correlated and Non-correlated Subqueries


    Subqueries can be correlated or non-correlated:


    *   A non-correlated subquery is independent of the main query and is evaluated
    once. The results are then used for the main query.


    *   A correlated subquery is one which references data in the main query. It is
    evaluated for every row.


    A correlated subquery can be expensive, since it’s evaluated multiple times, so
    there may be more suitable alternatives.


    ### The WHERE EXISTS Expression


    The `WHERE EXISTS` tests whether the subquery returns any rows; if it does, the
    row in the main query is retained; otherwise, it is filtered out.


    Using a non-correlated subquery in `WHERE EXISTS` will generally return all or
    none of the rows in the main query. Using a correlated subquery will filter selective
    rows.


    You can generally use an `IN()` expression as an alternative, but there are times
    when `WHERE EXISTS` allows a more complex subquery. It also bypasses the `NOT
    IN` quirk.


    ### LATERAL JOINS (a.k.a. CROSS APPLY)


    A `LATERAL JOIN`, which, in some DBMSs, is a `CROSS APPLY`, allows you to add
    columns to each row in the main query:


    *   You can use a `LATERAL JOIN` to add calculated columns, and you can chain
    them, so you can have multiple calculations and intermediate values.


    *   You can also use a `LATERAL JOIN` to add multiple columns from a subquery.


    ### Common Table Expressions


    A subquery can be used in a `FROM` clause, but it can be complex, especially if
    there’s a need for multiple subqueries, which will have to be nested.


    A Common Table Expression allows you to define a virtual table before the main
    query, allowing the main query to work like an ordinary query.


    You can also chain multiple CTEs together, which is easier to work with than nesting
    subqueries.


    ## Coming Up


    In Chapter [5](#606708_1_En_5_Chapter.xhtml), we had a look at aggregating data.
    Generally, aggregate values can’t be mixed with non-aggregate values without throwing
    a few subqueries into the mix.


    **Window functions** are a group of functions which do the job of applying subqueries
    to each row. There are two main groups of window functions:


    *   The aggregate functions can be used to apply an aggregate to each row of a
    non-aggregate query. They can also be used to accumulate or aggregate in groups.


    *   The sequencing functions can be used to generate a value based on the position
    of the row in the dataset. They can be used to indicate the row position or some
    grouping. They can also be used to fetch values from other rows.


    With window functions, you’ll be able to generate datasets which combine plain
    data with more analytical data.'
