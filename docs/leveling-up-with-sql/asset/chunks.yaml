  trans: '## SELECT 子句中的子查询


    正如我们所见，`SELECT`子句中的子查询预期为每一行返回一个**单一值**。但如果你希望使用关联子查询从同一个外部表中获取多个值，这可能会很繁琐：


    ```sql

    SELECT

    id, title, (

    SELECT coalesce(givenname||'' '','''')

    || coalesce(othernames||'' '','''')

    || familyname

    FROM authors

    WHERE authors.id=books.authorid

    ) AS author,

    (SELECT born FROM authors

    WHERE authors.id=books.authorid) AS born,

    (SELECT died FROM authors

    WHERE authors.id=books.authorid) AS died

    FROM books;

    ```


    除了繁琐，这种方式开销也大。当然，有更好的方法可以实现，即使用连接：


    ```sql

    SELECT

    id, title,

    coalesce(givenname||'' '','''')

    || coalesce(othernames||'' '','''')

    || familyname AS author,

    born, died

    FROM books AS b LEFT JOIN authors AS a ON b.authorid=a.id;

    --  Oracle

    --  FROM books b LEFT JOIN authors a ON b.authorid=a.id;

    ```


    实际上，你很可能会发现，关联子查询通常最好用连接来替代。连接也有一定成本，但在此之后，其余数据的获取就是“免费”的了。


    另一方面，如果子查询是**非关联的**，那么它的开销就不那么大。例如，以下是客户身高与平均身高的差值：


    ```sql

    SELECT

    id, givenname, familyname,

    height,

    height-(SELECT avg(height) FROM customers) AS diff

    FROM customers;

    ```


    你应该会看到类似这样的结果：


    | **id** | **givenname** | **familyname** | **height** | **Diff** |

    | --- | --- | --- | --- | --- |

    | 42 | May | Knott | 168.5 | -2.34 |

    | 459 | Rick | Shaw | 170.9 | 0.06 |

    | 597 | Ike | Andy | 153.0 | -17.84 |

    | 186 | Pat | Downe | 176.0 | 5.16 |

    | 352 | Basil | Isk | 156.4 | -14.44 |

    | 576 | Pearl | Divers | 176.3 | 5.46 |

    | ~ 303 rows ~ |


    尽管平均值参与了每一行的计算，但在非关联子查询中，它只计算**一次**。


    顺便提一下，还有一种替代方法可以实现前面的查询，即使用`窗口函数`，我们将在第 8 章介绍。不过，就这个例子而言，结果差别不大。


    你会注意到，在这种情况下，子查询引用的是与主查询相同的表。但这并不使它成为关联子查询，因为它没有引用主查询中的实际*行*。你可以通过高亮选中子查询并单独运行它来验证——它是可以独立工作的。


    本例中的子查询是一个聚合查询。你也可以在关联子查询中使用聚合函数。以下是生成累计总和的一种方法：


    ```sql

    --  Oracle: FROM sales ss

    SELECT

    id, ordered, total,

    (SELECT sum(total) FROM sales AS ss

    WHERE ss.ordered<=sales.ordered) AS running_total

    FROM sales

    ORDER BY id;

    ```


    你会得到类似这样的结果：


    | id | ordered | total | running_total |

    | --- | --- | --- | --- |

    | 1 | 2022-05-04 21:53:55.165107 | 43.00 | 43.00 |

    | 2 | 2022-05-05 12:39:41.438631 | 54.50 | 97.50 |

    | 3 | 2022-05-05 17:48:08.433387 | 96.00 | 193.50 |

    | 4 | 2022-05-07 08:29:35.61573 | 17.50 | 321.50 |

    | 5 | 2022-05-07 13:10:25.441528 | 63.00 | 384.50 |

    | 6 | 2022-05-06 17:23:38.261261 | 18.00 | 211.50 |

    | ~ 5549 rows |


    我们必须在子查询中将表别名设为`ss`（subsales？），以便与主查询中的同一个表区分开。这样表达式`ss.ordered<=sales.ordered`才能引用正确的表。


    在这里，子查询计算的是按`ordered`列排序后，到当前销售记录（包括当前记录）为止所有`total`的总和。


    你可能注意到这个查询运行起来花了点时间。正如我们提到的，关联子查询开销很大，而涉及聚合的关联子查询开销尤其大。幸运的是，也有对应的窗口函数可以实现，我们将在下一章看到。


    ## WHERE 子句中的子查询


    子查询也可以用于过滤你的数据。


    同样，你可能会发现子查询的替代方案，比如`JOIN`，但一个引人注目的用例是当子查询是一个聚合查询时。


    以下是一些子查询能清晰简洁地说明问题的情况。


    ### 带简单聚合的子查询


    子查询有用的一种情况是当你需要混合聚合与非聚合查询时。例如，如果你想找到最年长的客户，你需要分两步完成：


    1.  使用聚合查询找到最早的出生日期。

    2.  使用聚合结果作为过滤条件。


    在这里，你看到聚合查询被用作子查询：


    ```sql

    SELECT *

    FROM customers

    WHERE dob=(SELECT min(dob) FROM customers);

    ```


    你也可以用同样的方式找到身高低于平均值的客户：


    ```sql

    SELECT *

    FROM customers

    WHERE height<(SELECT avg(height) FROM customers);

    ```


    在这两种情况下，聚合查询和主查询都基于同一张表。你可能认为可以使用像`WHERE dob=min(dob)`或`WHERE height<avg(height)`这样的表达式，但这行不通；聚合是在`WHERE`子句**之后**计算的。'
- fmt: '# 大额消费者


    假设你想识别你的“大额消费者”——那些消费金额最高的客户。为此，你需要用到 `customers` 表和 `sales` 表的数据。


    这里，我们将使用子查询作为多步骤过程的一部分。


    首先，你需要确定什么才算大额购买：


    ```

    SELECT * FROM sales WHERE total>160;

    ```


    你会得到类似这样的结果：


    | **id** | **customerid** | **total** | **…** | **ordered_date** |

    | --- | --- | --- | --- | --- |

    | 80 | 32 | 168.00 | … | 2022-05-22 |

    | 216 | 13 | 160.50 | … | 2022-06-11 |

    | 483 | 59 | 176.50 | … | 2022-07-11 |

    | 726 | 68 | 173.00 | … | 2022-08-02 |

    | 823 | 86 | 165.50 | … | 2022-08-09 |

    | 891 | 140 | 162.50 | … | 2022-08-16 |

    | ~ 35 rows ~ |


    在这里，我们只对 `customerid` 感兴趣，我们将用它来从 `customers` 表中进行选择：


    ```

    SELECT *

    FROM customers

    WHERE id IN(SELECT customerid FROM sales WHERE total>160);

    ```


    这会得到


    | **id** | **…** | **familyname** | **givenname** | **…** |

    | --- | --- | --- | --- | --- |

    | 42 | … | Knott | May | … |

    | 58 | … | Ting | Jess | … |

    | 91 | … | North | June | … |

    | 140 | … | Byrd | Dicky | … |

    | 40 | … | Face | Cliff | … |

    | 141 | … | Rice | Jasmin | … |

    | ~ 32 rows ~ |


    注意 `IN` 操作符需要一个值的 *列表*。在子查询中，这是一个单列的值。


    另请注意，你得到的结果可能比前一个查询少；这可能是因为某些客户 ID 出现了不止一次。


    SQL 还有一个 `ANY` 操作符，可以完成同样的工作：


    ```

    SELECT *

    FROM customers

    WHERE id=ANY(SELECT customerid FROM sales WHERE total>=160);

    ```


    你也可以使用 `JOIN`：


    ```

    SELECT DISTINCT customers.*

    FROM customers JOIN sales ON customers.id=sales.customerid

    WHERE sales.total>=160;

    ```


    为了重现我们上一个查询的结果，我们限定了星号（`customers.*`）并使用 `DISTINCT` 来去除那些可能在列表中出现多次的客户。


    使用连接的优势在于你可以随时获取销售数据，因此这会给出稍微更丰富的结果：


    ```

    SELECT *

    FROM customers JOIN sales ON customers.id=sales.customerid

    WHERE sales.total>=160;

    ```


    在这里，我们移除了 `DISTINCT` 和 `customers.`，所以你会得到大量数据：


    | **id** | **…** | **familyname** | **givenname** | **…** | **total** | **…**
    | **ordered_date** |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 32 | … | Cue | Barbie | … | 168.00 | … | 2022-05-22 |

    | 13 | … | Fine | Marty | … | 160.50 | … | 2022-06-11 |

    | 59 | … | Don | Leigh | … | 176.50 | … | 2022-07-11 |

    | 68 | … | Stein | Phyllis | … | 173.00 | … | 2022-08-02 |

    | 86 | … | Fied | Molly | … | 165.50 | … | 2022-08-09 |

    | 140 | … | Byrd | Dicky | … | 162.50 | … | 2022-08-16 |

    | ~ 35 rows ~ |


    要找到总销售额很大的客户，需要使用聚合子查询：


    ```

    SELECT *

    FROM customers

    WHERE id IN(

    SELECT customerid FROM sales

    GROUP BY customerid HAVING sum(total)>=2000

    );

    ```


    这将得到


    | **id** | **…** | **familyname** | **givenname** | **…** |

    | --- | --- | --- | --- | --- |

    | 42 | … | Knott | May | … |

    | 58 | … | Ting | Jess | … |

    | 26 | … | Twishes | Bess | … |

    | 91 | … | North | June | … |

    | 69 | … | Mentary | Rudi | … |

    | 140 | … | Byrd | Dicky | … |

    | ~ 57 rows ~ |


    # 最后订单


    这里，我们将再次使用聚合子查询，这次是为了获取每个客户的最后订单。


    首先，我们需要获取每个客户的最后日期和时间：


    ```

    SELECT max(ordered) FROM sales GROUP BY customerid

    ```


    这将给我们一个列表，每个客户对应一个日期时间：


    | **Max** |

    | 2023-05-15 00:46:00.864446 |

    | 2023-05-25 00:42:26.783461 |

    | 2023-05-16 05:27:53.810977 |

    | 2023-05-06 01:40:02.346894 |

    | 2023-05-19 07:41:25.104524 |

    | 2023-05-07 19:01:06.756387 |

    | ~ 269 rows ~ |


    我们将使用这个列表来获取匹配的订单：


    ```

    SELECT * FROM sales

    WHERE ordered IN(SELECT max(ordered) FROM sales GROUP BY customerid);

    ```


    这将给我们一个销售列表：


    | **id** | **customerid** | **total** | **…** | **ordered_date** |

    | --- | --- | --- | --- | --- |

    | 6168 | 42 | 121.22 | … | 2023-05-28 |

    | 4209 | 287 | 50.50 | … | 2023-03-03 |

    | 4542 | 26 | 11.00 | … | 2023-03-18 |

    | 4793 | 368 | 56.00 | … | 2023-03-28 |

    | 4939 | 282 | 39.00 | … | 2023-04-03 |

    | 4953 | 395 | 75.50 | … | 2023-04-03 |

    | ~ 266 rows ~ |


    如果你数一下行数，可能会发现主查询返回的行数比子查询少。如果存在一些 `NULL` 的订单日期时间，就会发生这种情况。在某个时候，我们应该学会忽略这些记录，要么将它们过滤掉，要么直接移除。


    问题是，为什么这些销售没有包含在完整的查询中？答案在于 `IN()` 操作符。


    记得在第 [3](#606708_1_En_3_Chapter.xhtml) 章中，我们讨论了 `NOT IN` 的怪异之处。这个讨论同样适用于普通的 `IN`。子查询中的
    `NULL` 日期时间会导致等同于测试 `WHERE ordered=NULL`，众所周知，这总是失败的。


    现在我们有了每个客户的销售记录，将其与 `customers` 表连接起来以获取更多细节就很简单了：


    ```

    SELECT *

    FROM sales JOIN customers ON sales.customerid=customers.id

    WHERE ordered IN(SELECT max(ordered) FROM sales GROUP BY customerid);

    ```


    你会得到类似这样的结果：


    | **id** | **cid** | **total** | **…** | **od** | **id** | **email** | **…** |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 6168 | 42 | 121.22 | … | 2023-05-28 | 42 | may.knott61@example.net | … |

    | 4209 | 287 | 50.50 | … | 2023-03-03 | 287 | judy.free287@example.com | … |

    | 4542 | 26 | 11.00 | … | 2023-03-18 | 26 | bess.twishes26@example.net | … |

    | 4793 | 368 | 56.00 | … | 2023-03-28 | 368 | sharon.sharalike368@example.net
    | … |

    | 4939 | 282 | 39.00 | … | 2023-04-03 | 282 | howard.youknow282@example.com |
    … |

    | 4953 | 395 | 75.50 | … | 2023-04-03 | 395 | holly.day395@example.net | … |

    | ~ 266 rows ~ |


    你现在可以提取任何你可能需要处理的客户或销售数据。


    # 重复的客户


    我们在第 [2](#606708_1_En_2_Chapter.xhtml) 章中已经看到了如何查找重复项。假设，例如，你想查找重复的客户姓名：


    ```

    SELECT

    givenname||'' ''||familyname AS fullname,

    --  MSSQL: givenname+'' ''+familyname AS fullname,

    count(*) as occurrences

    FROM customers

    GROUP BY familyname, givenname

    HAVING count(*)>1;

    ```


    你会得到


    | **fullname** | **Occurrences** |

    | --- | --- |

    | Judy Free | 2 |

    | Annie Mate | 2 |

    | Mary Christmas | 2 |

    | Ken Tuckey | 2 |

    | Corey Ander | 2 |

    | Ida Dunnit | 2 |

    | Paul Bearer | 2 |

    | Terry Bell | 2 |


    请记住，名字相同并不一定意味着它们是重复的。很可能只是巧合。


    我们连接名字是因为下一步我们要做的事情。


    聚合查询的问题是，你只能选择你正在分组的内容，所以我们看不到客户的其余细节。任何包含它们的尝试都会破坏聚合。


    但是，我们可以将重复项查询用作子查询来过滤 `customers` 表：


    ```

    /*  Note

    ================================================

    MSSQL: Use givenname+'' ''+familyname

    ================================================ */

    SELECT *

    FROM customers

    WHERE givenname||'' ''||familyname IN (

    SELECT givenname||'' ''||familyname FROM customers

    GROUP BY familyname, givenname

    HAVING count(*)>1

    );

    ```


    这将给我们客户的其余细节。我们必须连接客户姓名的原因是，在 `IN()` 表达式中只能有一个列。'
  raw: '### Big Spenders


    Suppose you want to identify your “big spenders”—the customers who have spent
    the highest amounts. For that, you will need data from the `customers` and `sales`
    tables.


    Here, we’ll use subqueries as part of a multistep process.


    To begin with, you’ll want to identify what you regard as large purchases:


    ```

    SELECT * FROM sales WHERE total>160;

    ```


    You’ll get something like this:


    | **id** | **customerid** | **total** | **…** | **ordered_date** |

    | --- | --- | --- | --- | --- |

    | 80 | 32 | 168.00 | … | 2022-05-22 |

    | 216 | 13 | 160.50 | … | 2022-06-11 |

    | 483 | 59 | 176.50 | … | 2022-07-11 |

    | 726 | 68 | 173.00 | … | 2022-08-02 |

    | 823 | 86 | 165.50 | … | 2022-08-09 |

    | 891 | 140 | 162.50 | … | 2022-08-16 |

    | ~ 35 rows ~ |


    In here, we’re only interested in the `customerid`, which we’ll use to select
    from the `customers` table:


    ```

    SELECT *

    FROM customers

    WHERE id IN(SELECT customerid FROM sales WHERE total>160);

    ```


    This gives you


    | **id** | **…** | **familyname** | **givenname** | **…** |

    | --- | --- | --- | --- | --- |

    | 42 | … | Knott | May | … |

    | 58 | … | Ting | Jess | … |

    | 91 | … | North | June | … |

    | 140 | … | Byrd | Dicky | … |

    | 40 | … | Face | Cliff | … |

    | 141 | … | Rice | Jasmin | … |

    | ~ 32 rows ~ |


    Note that the `IN` operator requires a *list* of values. In a subquery, this is
    a single column of values.


    Note also that you may have few results than in the previous query; that would
    be if some of the customer ids appear more than once.


    SQL also has an `ANY` operator which will do the same job:


    ```

    SELECT *

    FROM customers

    WHERE id=ANY(SELECT customerid FROM sales WHERE total>=160);

    ```


    You could also have used a `JOIN`:


    ```

    SELECT DISTINCT customers.*

    FROM customers JOIN sales ON customers.id=sales.customerid

    WHERE sales.total>=160;

    ```


    To recreate what we had in the previous query, we’ve qualified the star (`customers.*`)
    and used `DISTINCT` to remove duplicates of customers who may have appeared in
    the list more than once.


    The advantage of using a join is that you can also get sales data for the asking,
    so this gives a slightly richer result:


    ```

    SELECT *

    FROM customers JOIN sales ON customers.id=sales.customerid

    WHERE sales.total>=160;

    ```


    Here, we’ve removed the `DISTINCT` and the `customers.`, so you’ll get a lot of
    data:


    | **id** | **…** | **familyname** | **givenname** | **…** | **total** | **…**
    | **ordered_date** |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 32 | … | Cue | Barbie | … | 168.00 | … | 2022-05-22 |

    | 13 | … | Fine | Marty | … | 160.50 | … | 2022-06-11 |

    | 59 | … | Don | Leigh | … | 176.50 | … | 2022-07-11 |

    | 68 | … | Stein | Phyllis | … | 173.00 | … | 2022-08-02 |

    | 86 | … | Fied | Molly | … | 165.50 | … | 2022-08-09 |

    | 140 | … | Byrd | Dicky | … | 162.50 | … | 2022-08-16 |

    | ~ 35 rows ~ |


    To find customers with large *total* sales will require an aggregate subquery:


    ```

    SELECT *

    FROM customers

    WHERE id IN(

    SELECT customerid FROM sales

    GROUP BY customerid HAVING sum(total)>=2000

    );

    ```


    This will give you


    | **id** | **…** | **familyname** | **givenname** | **…** |

    | --- | --- | --- | --- | --- |

    | 42 | … | Knott | May | … |

    | 58 | … | Ting | Jess | … |

    | 26 | … | Twishes | Bess | … |

    | 91 | … | North | June | … |

    | 69 | … | Mentary | Rudi | … |

    | 140 | … | Byrd | Dicky | … |

    | ~ 57 rows ~ |


    ### Last Orders, Please


    Here again, we’ll use an aggregate subquery, this time to fetch the last order
    of each customer.


    First, we’ll need to fetch the last date and time for each customer:


    ```

    SELECT max(ordered) FROM sales GROUP BY customerid

    ```


    This will give us a list of one datetime for each customer:


    | **Max** |

    | 2023-05-15 00:46:00.864446 |

    | 2023-05-25 00:42:26.783461 |

    | 2023-05-16 05:27:53.810977 |

    | 2023-05-06 01:40:02.346894 |

    | 2023-05-19 07:41:25.104524 |

    | 2023-05-07 19:01:06.756387 |

    | ~ 269 rows ~ |


    We’ll use this list to fetch the matching orders:


    ```

    SELECT * FROM sales

    WHERE ordered IN(SELECT max(ordered) FROM sales GROUP BY customerid);

    ```


    This will give us a list of sales:


    | **id** | **customerid** | **total** | **…** | **ordered_date** |

    | --- | --- | --- | --- | --- |

    | 6168 | 42 | 121.22 | … | 2023-05-28 |

    | 4209 | 287 | 50.50 | … | 2023-03-03 |

    | 4542 | 26 | 11.00 | … | 2023-03-18 |

    | 4793 | 368 | 56.00 | … | 2023-03-28 |

    | 4939 | 282 | 39.00 | … | 2023-04-03 |

    | 4953 | 395 | 75.50 | … | 2023-04-03 |

    | ~ 266 rows ~ |


    If you count the rows, you may find that the main query returned fewer rows than
    the subquery. That would happen if there were some `NULL` ordered datetimes. At
    some point, we should learn to ignore these, either by filtering them out or removing
    them altogether.


    The question is, why weren’t those sales included in the full query? And the answer
    is that it’s all about the `IN()` operator.


    Remember in Chapter [3](#606708_1_En_3_Chapter.xhtml), we discussed the `NOT IN`
    quirk. The discussion also applies to a plain `IN`. The `NULL` datetimes in the
    subquery would result in the equivalent of testing `WHERE ordered=NULL`, which,
    as we all know, always fails.


    Now that we have sales for each customer, it’s a simple matter to join that to
    the `customers` table to get more details:


    ```

    SELECT *

    FROM sales JOIN customers ON sales.customerid=customers.id

    WHERE ordered IN(SELECT max(ordered) FROM sales GROUP BY customerid);

    ```


    You’ll get something like


    | **id** | **cid** | **total** | **…** | **od** | **id** | **email** | **…** |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 6168 | 42 | 121.22 | … | 2023-05-28 | 42 | may.knott61@example.net | … |

    | 4209 | 287 | 50.50 | … | 2023-03-03 | 287 | judy.free287@example.com | … |

    | 4542 | 26 | 11.00 | … | 2023-03-18 | 26 | bess.twishes26@example.net | … |

    | 4793 | 368 | 56.00 | … | 2023-03-28 | 368 | sharon.sharalike368@example.net
    | … |

    | 4939 | 282 | 39.00 | … | 2023-04-03 | 282 | howard.youknow282@example.com |
    … |

    | 4953 | 395 | 75.50 | … | 2023-04-03 | 395 | holly.day395@example.net | … |

    | ~ 266 rows ~ |


    You can now extract any customer or sales data you might want to work with.


    ### Duplicated Customers


    We’ve seen in Chapter [2](#606708_1_En_2_Chapter.xhtml) how to find duplicates.
    Suppose, for example, you want to find duplicate customer names:


    ```

    SELECT

    givenname||'' ''||familyname AS fullname,

    --  MSSQL: givenname+'' ''+familyname AS fullname,

    count(*) as occurrences

    FROM customers

    GROUP BY familyname, givenname

    HAVING count(*)>1;

    ```


    You get


    | **fullname** | **Occurrences** |

    | --- | --- |

    | Judy Free | 2 |

    | Annie Mate | 2 |

    | Mary Christmas | 2 |

    | Ken Tuckey | 2 |

    | Corey Ander | 2 |

    | Ida Dunnit | 2 |

    | Paul Bearer | 2 |

    | Terry Bell | 2 |


    Remember, having the same name doesn’t necessarily mean they’re duplicates. It’s
    probably just a coincidence.


    We’ve concatenated the name because of what we’re going to do in the next step.


    The problem with aggregate queries is that you can only select what you’re grouping,
    so we can’t see the rest of the customer details. Any attempt to include them
    would destroy the aggregate.


    We can, however, use the duplicate query as a subquery to filter the `customers`
    table:


    ```

    /*  Note

    ================================================

    MSSQL: Use givenname+'' ''+familyname

    ================================================ */

    SELECT *

    FROM customers

    WHERE givenname||'' ''||familyname IN (

    SELECT givenname||'' ''||familyname FROM customers

    GROUP BY familyname, givenname

    HAVING count(*)>1

    );

    ```


    This will give us the rest of the customer details. The reason we had to concatenate
    the customers’ names is that you can only have a single column in the `IN()` expression.'
  trans: '

    # 大额消费者


    假设你想识别你的“大额消费者”——那些消费金额最高的客户。为此，你需要用到 `customers` 表和 `sales` 表的数据。


    这里，我们将使用子查询作为多步骤过程的一部分。


    首先，你需要确定什么才算大额购买：


    ```

    SELECT * FROM sales WHERE total>160;

    ```


    你会得到类似这样的结果：


    | **id** | **customerid** | **total** | **…** | **ordered_date** |

    | --- | --- | --- | --- | --- |

    | 80 | 32 | 168.00 | … | 2022-05-22 |

    | 216 | 13 | 160.50 | … | 2022-06-11 |

    | 483 | 59 | 176.50 | … | 2022-07-11 |

    | 726 | 68 | 173.00 | … | 2022-08-02 |

    | 823 | 86 | 165.50 | … | 2022-08-09 |

    | 891 | 140 | 162.50 | … | 2022-08-16 |

    | ~ 35 rows ~ |


    在这里，我们只对 `customerid` 感兴趣，我们将用它来从 `customers` 表中进行选择：


    ```

    SELECT *

    FROM customers

    WHERE id IN(SELECT customerid FROM sales WHERE total>160);

    ```


    这会得到


    | **id** | **…** | **familyname** | **givenname** | **…** |

    | --- | --- | --- | --- | --- |

    | 42 | … | Knott | May | … |

    | 58 | … | Ting | Jess | … |

    | 91 | … | North | June | … |

    | 140 | … | Byrd | Dicky | … |

    | 40 | … | Face | Cliff | … |

    | 141 | … | Rice | Jasmin | … |

    | ~ 32 rows ~ |


    注意 `IN` 操作符需要一个值的 *列表*。在子查询中，这是一个单列的值。


    另请注意，你得到的结果可能比前一个查询少；这可能是因为某些客户 ID 出现了不止一次。


    SQL 还有一个 `ANY` 操作符，可以完成同样的工作：


    ```

    SELECT *

    FROM customers

    WHERE id=ANY(SELECT customerid FROM sales WHERE total>=160);

    ```


    你也可以使用 `JOIN`：


    ```

    SELECT DISTINCT customers.*

    FROM customers JOIN sales ON customers.id=sales.customerid

    WHERE sales.total>=160;

    ```


    为了重现我们上一个查询的结果，我们限定了星号（`customers.*`）并使用 `DISTINCT` 来去除那些可能在列表中出现多次的客户。


    使用连接的优势在于你可以随时获取销售数据，因此这会给出稍微更丰富的结果：


    ```

    SELECT *

    FROM customers JOIN sales ON customers.id=sales.customerid

    WHERE sales.total>=160;

    ```


    在这里，我们移除了 `DISTINCT` 和 `customers.`，所以你会得到大量数据：


    | **id** | **…** | **familyname** | **givenname** | **…** | **total** | **…**
    | **ordered_date** |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 32 | … | Cue | Barbie | … | 168.00 | … | 2022-05-22 |

    | 13 | … | Fine | Marty | … | 160.50 | … | 2022-06-11 |

    | 59 | … | Don | Leigh | … | 176.50 | … | 2022-07-11 |

    | 68 | … | Stein | Phyllis | … | 173.00 | … | 2022-08-02 |

    | 86 | … | Fied | Molly | … | 165.50 | … | 2022-08-09 |

    | 140 | … | Byrd | Dicky | … | 162.50 | … | 2022-08-16 |

    | ~ 35 rows ~ |


    要找到总销售额很大的客户，需要使用聚合子查询：


    ```

    SELECT *

    FROM customers

    WHERE id IN(

    SELECT customerid FROM sales

    GROUP BY customerid HAVING sum(total)>=2000

    );

    ```


    这将得到


    | **id** | **…** | **familyname** | **givenname** | **…** |

    | --- | --- | --- | --- | --- |

    | 42 | … | Knott | May | … |

    | 58 | … | Ting | Jess | … |

    | 26 | … | Twishes | Bess | … |

    | 91 | … | North | June | … |

    | 69 | … | Mentary | Rudi | … |

    | 140 | … | Byrd | Dicky | … |

    | ~ 57 rows ~ |


    # 最后订单


    这里，我们将再次使用聚合子查询，这次是为了获取每个客户的最后订单。


    首先，我们需要获取每个客户的最后日期和时间：


    ```

    SELECT max(ordered) FROM sales GROUP BY customerid

    ```


    这将给我们一个列表，每个客户对应一个日期时间：


    | **Max** |

    | 2023-05-15 00:46:00.864446 |

    | 2023-05-25 00:42:26.783461 |

    | 2023-05-16 05:27:53.810977 |

    | 2023-05-06 01:40:02.346894 |

    | 2023-05-19 07:41:25.104524 |

    | 2023-05-07 19:01:06.756387 |

    | ~ 269 rows ~ |


    我们将使用这个列表来获取匹配的订单：


    ```

    SELECT * FROM sales

    WHERE ordered IN(SELECT max(ordered) FROM sales GROUP BY customerid);

    ```


    这将给我们一个销售列表：


    | **id** | **customerid** | **total** | **…** | **ordered_date** |

    | --- | --- | --- | --- | --- |

    | 6168 | 42 | 121.22 | … | 2023-05-28 |

    | 4209 | 287 | 50.50 | … | 2023-03-03 |

    | 4542 | 26 | 11.00 | … | 2023-03-18 |

    | 4793 | 368 | 56.00 | … | 2023-03-28 |

    | 4939 | 282 | 39.00 | … | 2023-04-03 |

    | 4953 | 395 | 75.50 | … | 2023-04-03 |

    | ~ 266 rows ~ |


    如果你数一下行数，可能会发现主查询返回的行数比子查询少。如果存在一些 `NULL` 的订单日期时间，就会发生这种情况。在某个时候，我们应该学会忽略这些记录，要么将它们过滤掉，要么直接移除。


    问题是，为什么这些销售没有包含在完整的查询中？答案在于 `IN()` 操作符。


    记得在第 3 章中，我们讨论了 `NOT IN` 的怪异之处。这个讨论同样适用于普通的 `IN`。子查询中的 `NULL` 日期时间会导致等同于测试 `WHERE
    ordered=NULL`，众所周知，这总是失败的。


    现在我们有了每个客户的销售记录，将其与 `customers` 表连接起来以获取更多细节就很简单了：


    ```

    SELECT *

    FROM sales JOIN customers ON sales.customerid=customers.id

    WHERE ordered IN(SELECT max(ordered) FROM sales GROUP BY customerid);

    ```


    你会得到类似这样的结果：


    | **id** | **cid** | **total** | **…** | **od** | **id** | **email** | **…** |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 6168 | 42 | 121.22 | … | 2023-05-28 | 42 | may.knott61@example.net | … |

    | 4209 | 287 | 50.50 | … | 2023-03-03 | 287 | judy.free287@example.com | … |

    | 4542 | 26 | 11.00 | … | 2023-03-18 | 26 | bess.twishes26@example.net | … |

    | 4793 | 368 | 56.00 | … | 2023-03-28 | 368 | sharon.sharalike368@example.net
    | … |

    | 4939 | 282 | 39.00 | … | 2023-04-03 | 282 | howard.youknow282@example.com |
    … |

    | 4953 | 395 | 75.50 | … | 2023-04-03 | 395 | holly.day395@example.net | … |

    | ~ 266 rows ~ |


    你现在可以提取任何你可能需要处理的客户或销售数据。


    # 重复的客户


    我们在第 2 章中已经看到了如何查找重复项。假设，例如，你想查找重复的客户姓名：


    ```

    SELECT

    givenname||'' ''||familyname AS fullname,

    --  MSSQL: givenname+'' ''+familyname AS fullname,

    count(*) as occurrences

    FROM customers

    GROUP BY familyname, givenname

    HAVING count(*)>1;

    ```


    你会得到


    | **fullname** | **Occurrences** |

    | --- | --- |

    | Judy Free | 2 |

    | Annie Mate | 2 |

    | Mary Christmas | 2 |

    | Ken Tuckey | 2 |

    | Corey Ander | 2 |

    | Ida Dunnit | 2 |

    | Paul Bearer | 2 |

    | Terry Bell | 2 |


    请记住，名字相同并不一定意味着它们是重复的。很可能只是巧合。


    我们连接名字是因为下一步我们要做的事情。


    聚合查询的问题是，你只能选择你正在分组的内容，所以我们看不到客户的其余细节。任何包含它们的尝试都会破坏聚合。


    但是，我们可以将重复项查询用作子查询来过滤 `customers` 表：


    ```

    /*  注意

    ================================================

    MSSQL: 使用 givenname+'' ''+familyname

    ================================================ */

    SELECT *

    FROM customers

    WHERE givenname||'' ''||familyname IN (

    SELECT givenname||'' ''||familyname FROM customers

    GROUP BY familyname, givenname

    HAVING count(*)>1

    );

    ```


    这将给我们客户的其余细节。我们必须连接客户姓名的原因是，在 `IN()` 表达式中只能有一个列。

