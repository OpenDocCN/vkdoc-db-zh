    *To Brian. You’re part of what I am today.*


    # Introduction


    In the early 1970s, a new design for managing databases was being developed based
    on the original work of `E. F. Codd`. The underlying model was known as the relational
    model and described a way of collecting data and accessing and manipulating data
    using mathematical principles.


    Over the decade, the `SQL` language was developed, and, though it doesn’t follow
    the relational model completely, it attempts to make the database accessible using
    a simple language.


    The `SQL` language has been improved, enhanced, and further developed over the
    years, and in the late 1980s, the language was developed into a standard of both
    `ANSI` (the American National Standards Institute) and `ISO` (the International
    Organization for Standardization, and, that’s right, it doesn’t spell `ISO`).


    The takeaways from this very brief history are


    *   `SQL` has been around for some time.

    *   `SQL` is based on some solid mathematical principles.

    *   There is an official standard, even if nobody quite sticks to it.

    *   `SQL` is a developing language, and there are new features and new techniques
    being added all the time.


    The second half of the third point is worth stressing. Nobody quite sticks to
    the `SQL` standards. There are many reasons for this, some good, some bad. But
    you’ll probably find that the various dialects of `SQL` are about 80–90% compatible,
    and the rest we’ll fill you in on as we go.


    In this book, you’ll learn about using `SQL` to a level which goes beyond the
    basics. Some things you’ll learn about are newer features in `SQL`; some are older
    features that you may not have known about. We’ll look at a few non-standard features,
    and we’ll also look at using features that you already know about, but in more
    powerful ways.


    This book is not for the raw beginner—we assume you have some knowledge and experience
    in `SQL`. If you are a raw beginner, then you will get more from my previous book,
    *Getting Started with SQL and Databases*^([1](#fn1)); you can then return to this
    book full of confidence and enthusiasm with a good solid grounding in `SQL`.


    If you have the knowledge and experience, the first chapter will give you a quick
    overview of the sort of knowledge you should have.


    ## The Sample Database


    To work through the exercises, you’ll need the following:


    *   A database server and a suitable database client.

    *   Permissions to do anything you like on the database. If you’ve installed the
    software locally, you probably have all the permissions you need, but if you’re
    doing this on somebody else’s system, you need to check.

    *   The script which produces the sample database.


    The first chapter will go into the details of getting your `DBMS` software and
    sample database ready. It will also give you an overview of the story behind the
    sample database.


    ## Notes


    While you’re writing `SQL` to work with the data, there’s a piece of software
    at the other end responding to the `SQL`. That software is referred to generically
    as a database server, and, more specifically, as a DataBase Management System,
    or `DBMS` to its friends. We’ll be using that term throughout the book.


    The `DBMS`s we’ll be covering are `PostgreSQL`, `MariaDB`, `MySQL`, `Microsoft
    SQL Server`, `SQLite`, and `Oracle`. We’ll assume that you’re working with reasonably
    current versions of the `DBMS`s.


    [Chapter 1](#606708_1_En_1_Chapter.xhtml) will go into more details on setting
    up your `DBMS`, as well as downloading and installing the sample database.


    ## Source Code


    All source code used in this book can be downloaded from `github.com/apress/leveling-up-sql`.


    ## Acknowledgments


    The sample data includes information about books and authors from Goodreads ([`www.goodreads.com/`](http://www.goodreads.com/)),
    particularly from their lists of classical literature over the past centuries.
    Additional author information was obtained, of course, from Wikipedia ([`www.wikipedia.org/`](http://www.wikipedia.org/)).


    The author makes no guarantees about whether the information was correct or even
    copied correctly. Certainly, the list of books should not in any way be interpreted
    as an endorsement or even an indication of personal taste. After all, it’s just
    sample data.


    ## About the Author


    ## About the Technical Reviewer


