    the time has come to deal with them. We can delete all of the `NULL` sales as
    follows:


    ```

    --  Not Yet!

    DELETE FROM sales WHERE ordered IS NULL;

    ```


    Note that there’s a foreign key from the `saleitems` table to the `sales` table,
    which would normally disallow deleting the sales if there are any items attacked.
    However, if you check the script which generates the sample database, you’ll notice
    the `ON DELETE CASCADE` clause, which will automatically delete the orphaned sale
    items.


    When should you delete data? The short answer is never. The longer answer is more
    complicated. You would delete data that was entered in error, or you would delete
    test data when you’ve finished testing.


    In this case, we’re going to delete the sales with a `NULL` for the `ordered`
    date; we’ll assume that the sale was never checked out and that the customer won’t
    ever come back and finish it. However, we’ll keep a copy of it anyway, just in
    case.


    Most DBMSs handle triggers in a very similar way, but there are variations. We’ll
    go over the basics first and then the details for individual DBMSs.


    ### Some Trigger Basics


    The basic syntax for creating a trigger is something like this:


    ```

    CREATE TRIGGER something

    ON some_table

    BEFORE DELETE

    BEGIN

    ...

    END

    ```


    None of the DBMSs do it exactly the same way, but it’s roughly right:


    *   The trigger, of course, has a name: `CREATE TRIGGER something`.


    *   The trigger is attached to a table: `ON some_table`.


    *   The trigger is attached to an event.


    The event is typically one of `BEFORE`, `AFTER`, or `INSTEAD OF`, followed by
    one of the DML statements. In this example, we want to do something with the old
    data before it’s deleted.


    For the sample trigger, we’re going to copy the old data into a table called `deleted_sales`.
    This means that we’re going to have to get to the data before it’s vanished. The
    appropriate event is


    ```

    BEFORE DELETE

    ```


    It’s going to be a little complicated, because we want to copy not only the data
    from the `sales` table but also from the `saleitems` table. We’ll do that by concatenating
    those items into one string. You really shouldn’t keep multiple items that way,
    but it’s good enough for an archive, and you can always pull it apart if you ever
    need to.


    The archive table looks something like this:


    ```

    CREATE TABLE deleted_sales (

    id INT PRIMARY KEY,     --  Auto Incremented

    saleid INT,

    customerid INT,

    items VARCHAR(255),

    deleted_date TIMESTAMP  --  date/time

    );

    ```


    This table has already been created.'
  trans: '# 10. 更多技术：触发器、数据透视表和变量


    在本书中，我们一直在探讨如何将 SQL 的知识和应用推向更深层次，并探索了多种技术，其中有些是新的，有些则不是。在审视某些技术时，特别是那些涉及聚合和公用表表达式的技术，我们也体会到了通过多层语句将
    SQL 推向更深层次的感觉。在本章中，我们将稍微超越简单的 SQL，探索一些对 SQL 进行补充的技术。它们彼此之间没有直接关联，但都能让你在数据处理上做更多事情。


    SQL 触发器是一些小的代码块，它们会在发生某些数据库事件时自动运行。我们将探讨其工作原理以及如何编写一个触发器。具体来说，我们将研究一个用于自动归档已删除数据的触发器。数据透视表是二维的聚合。它们允许你基于行和列数据构建汇总。我们将看一个准备待汇总数据的例子，以及如何生成数据透视表。变量是可以用来在语句之间保持值的临时数据片段。它们允许我们运行一组
    SQL 语句，同时这些变量保存着从一个语句传递到另一个语句的中间值。在本章中，我们将学习在向多个表添加数据时，使用变量来保存临时值。


    ## 理解触发器


    有时，一个简单的 SQL 查询并不足够。有时，你真正想要的是让一个查询触发一个或多个额外的查询。有时，你想要的就是一个 `触发器`。一个 `触发器` 是一小块代码，当数据库发生某些事情时，它会自动运行。触发器有多种类型，包括：


    *   DML（数据操作语言）触发器在数据表发生某些更改时运行，例如执行 `INSERT`、`UPDATE` 或 `DELETE` 语句时。

    *   DDL（数据定义语言）触发器在数据库结构发生更改时运行，例如执行 `CREATE`、`ALTER` 或 `DROP` 语句时。

    *   登录触发器在用户登录时运行。


    你可能使用 DDL 或登录触发器的一个原因是为了通过将活动存储在日志表中来跟踪活动。在这里，我们将更多地关注 DML 触发器。


    触发器可用于弥补标准 DBMS 行为的一些不足。以下是一些可能需要触发器的情况：


    *   你可能有一个活动表，希望每次进行更改时都更新一个日期列。你可以使用一个触发器来为每次插入或更新设置该列。

    *   假设你有一个租赁表，其中输入了开始和结束日期。如果结束日期未输入，你希望其默认为开始日期。SQL 的默认功能没那么智能，但你可以设置一个触发器在插入新行时设置结束日期。

    *   SQL 在通常意义上没有审计功能。你可以创建一个触发器，在每次添加、更新或删除行时，向日志表添加一些数据。


    在这个例子中，我们将创建一个触发器，用于保存我们即将从 `sales` 表中删除的数据的副本。在之前的一些章节中，我们不得不面对这样一个事实：在 `sales`
    表中，某些行的订单日期/时间是 `NULL`。可以推测，这些销售从未结账。到目前为止，我们一直相当宽容，不时地将它们过滤掉，但现在是时候处理它们了。我们可以按如下方式删除所有
    `NULL` 销售：


    ```sql

    --  还不是时候！

    DELETE FROM sales WHERE ordered IS NULL;

    ```


    请注意，`saleitems` 表到 `sales` 表有一个外键，如果有关联的任何项目，通常不允许删除销售记录。但是，如果你检查生成示例数据库的脚本，你会注意到
    `ON DELETE CASCADE` 子句，它将自动删除孤立的销售项目。


    你应该在什么时候删除数据？简短的答案是永不。更长的答案则更复杂。你会删除输入错误的数据，或者在完成测试后删除测试数据。在这个例子中，我们将删除 `ordered`
    日期为 `NULL` 的销售记录；我们将假设该销售从未结账，并且客户永远不会回来完成它。然而，无论如何，我们会保留一份副本，以防万一。


    大多数 DBMS 以非常相似的方式处理触发器，但也存在差异。我们将首先概述基本原理，然后介绍各个 DBMS 的具体细节。


    ### 触发器的一些基础知识


    创建触发器的基本语法大致如下：


    ```sql

    CREATE TRIGGER something

    ON some_table

    BEFORE DELETE

    BEGIN

    ...

    END

    ```


    没有哪个 DBMS 的做法完全相同，但大致如此：


    *   触发器当然有一个名称：`CREATE TRIGGER something`。

    *   触发器附着在一个表上：`ON some_table`。

    *   触发器附着在一个事件上。


    该事件通常是 `BEFORE`、`AFTER` 或 `INSTEAD OF` 之一，后跟一个 DML 语句。在这个例子中，我们希望在数据被删除之前对旧数据做一些处理。对于示例触发器，我们将把旧数据复制到一个名为
    `deleted_sales` 的表中。这意味着我们必须在数据消失之前获取到它。合适的事件是 `BEFORE DELETE`。


    这会有点复杂，因为我们不仅想复制 `sales` 表的数据，还想复制 `saleitems` 表的数据。我们将通过把这些项目连接成一个字符串来实现。你真的不应该以这种方式保存多个项目，但对于归档来说已经足够好了，而且如果你需要，随时可以将其拆分。


    归档表大致如下：


    ```sql

    CREATE TABLE deleted_sales (

    id INT PRIMARY KEY,     --  自增

    saleid INT,

    customerid INT,

    items VARCHAR(255),

    deleted_date TIMESTAMP  --  日期/时间

    );

    ```


    这个表已经创建好了。'
- fmt: '### Preparing the Data to Be Archived


    The trigger code will basically be an `INSERT` statement, inserting prepared values
    from the `sales` and `saleitems` tables. We’ll prepare the values in a `CTE`:


    ```sql

    --  PostgreSQL, MSSQL

    WITH cte AS (

    ...

    )

    INSERT INTO deleted_sales(saleid, customerid, items,

    deleted_date)

    SELECT saleid,customerid, items, current_timestamp

    FROM cte;

    --  MariaDB/MySQL, SQLite, Oracle

    INSERT INTO deleted_sales(saleid, customerid, items, deleted_date)

    WITH cte AS (

    ...

    )

    SELECT saleid,customerid, items, current_timestamp

    FROM cte;

    ```


    As you see, with some `DBMS`s you start with the `CTE`, as you would using a `SELECT`
    statement, while in others you start with the `INSERT` clause.


    As for the `CTE` itself, we’ll derive that from the data to be deleted.


    For most `DBMS`s, each row to be deleted is represented in a virtual row called
    `old` (`:old` in `Oracle`). `MSSQL` instead has a virtual table called `deleted`.


    If we were simply archiving from one table, we wouldn’t need the `CTE`, and we
    could simply copy the rows with


    ```sql

    --  Not MSSQL: FOR EACH ROW

    INSERT INTO deleted_sales

    VALUES(old.saleid, old.customerid, ''...'',

    current_timestamp);

    --  MSSQL: deleted is a virtual table

    INSERT INTO deleted_sales

    SELECT saleid, customerid, ''...'', current_timestamp

    FROM deleted;

    ```


    However, it’s not so simple when there’s another table involved. Here, the plan
    is to read the book ids and quantities from the other table and combine them using
    `string_agg`, `group_concat`, or `listagg` according to `DBMS`.


    To generate the data, we’ll use a join and aggregate the results:


    ```sql

    WITH cte(saleid,customerid,items) AS (

    SELECT

    s.id, s.customerid,

    string_agg(si.bookid||'':''||si.quantity,'';'')

    FROM sales AS s JOIN saleitems AS si ON s.id=si.saleid

    WHERE s.id=old.id

    GROUP BY s.id, s.customerid

    )

    ```


    The preceding sample is for `PostgreSQL`, but the others are nearly identical—just
    the variations in the `string_agg()` function, concatenation, and table aliases.


    The `items` string will contain something like the following:


    ```sql

    123:3;456:1;789:2

    ```


    That is, one or more `bookid:quantity` items are joined with a semicolon.


    If you do need to pull it apart, you can use the same techniques we used for splitting
    strings in Chapter [9](#606708_1_En_9_Chapter.xhtml). We can now go about creating
    the trigger.


    ### Creating the Trigger


    Now that we’ve covered the basics of how the trigger’s going to work, we can write
    the actual code. For the most part, it will be pretty close to what you have seen
    earlier, with variations for each `DBMS`.


    Once the trigger has been created, we can try it out with the following. The plan
    is to delete those sales without an `ordered` date:


    ```sql

    --  Before

    SELECT * FROM sales order by id;

    SELECT * FROM saleitems order by id;

    SELECT * FROM deleted_sales order by id;

    --  Delete with Trigger

    DELETE FROM sales WHERE ordered IS NULL;

    --  After

    SELECT * FROM sales order by id;

    SELECT * FROM saleitems order by id;

    SELECT * FROM deleted_sales order by id;

    ```


    We’ll now go into the details for the individual `DBMS`s.


    #### PostgreSQL Triggers


    `PostgreSQL` has the least convenient form of trigger, in that you first need
    to prepare a `function` to contain the trigger code. A function is a named block
    of code, which can be called later at any time.


    To prepare for the function and trigger, we can start with a few `DROP` statements:


    ```sql

    DROP TRIGGER IF EXISTS archive_sales_trigger ON sales;

    DROP FUNCTION IF EXISTS do_archive_sales;

    ```


    The function will basically contain the code described earlier:


    ```sql

    CREATE FUNCTION do_archive_sales() RETURNS TRIGGER

    LANGUAGE plpgsql AS

    $$BEGIN

    WITH cte(saleid,customerid,items) AS (

    SELECT

    s.id, s.customerid,

    string_agg(si.bookid||'':''||si.quantity,'';'')

    FROM sales AS s JOIN saleitems AS si

    ON s.id=si.saleid

    WHERE s.id=old.id

    GROUP BY s.id, s.customerid

    )

    INSERT INTO deleted_sales(saleid, customerid,items,

    deleted_date)

    SELECT saleid, customerid, items, current_timestamp

    FROM cte;

    RETURN old;

    END$$;

    ```


    As you see, the function has the code for the `CTE` and for copying the data into
    the `deleted_sales` table. Here are a few points about the function itself:


    *   A function has a name (`do_archive_sales`) and returns a result of a certain
    type, in this case a `TRIGGER`.

    *   `PostgreSQL` has a number of alternative coding languages you can use to write
    a function, but the standard one is called `plpgsql`.

    *   Technically, a function definition is a string. However, using single quotes
    would interfere with single quotes inside the function definition. `PostgreSQL`
    allows an alternative string delimiter, in this case the `$$` code. This is the
    most mysterious part of writing `PostgreSQL` functions.


    Once you have the function in place, creating the trigger is simple:


    ```sql

    CREATE TRIGGER archive_sales_trigger

    BEFORE DELETE ON sales

    FOR EACH ROW

    EXECUTE FUNCTION do_archive_sales();

    ```


    You can now try it out.


    #### MySQL/MariaDB Triggers


    With `MariaDB`/`MySQL`, the trigger can be written in a single block. First, we’ll
    write the code to drop the trigger:


    ```sql

    DROP TRIGGER IF EXISTS archive_sales_trigger;

    ```


    The basic form of the trigger code will be


    ```sql

    CREATE TRIGGER archive_sales_trigger

    BEFORE DELETE ON sales

    FOR EACH ROW

    BEGIN

    ...

    END;

    ```


    There’s going to be a possible complication here. The trigger code includes a
    `BEGIN ... END` block which is to allow multiple statements on one block. At this
    point, `MariaDB`/`MySQL` isn’t sure where the real end will be, so it’s normal
    to change the end of the statement delimiter:


    ```sql

    DELIMITER $$

    CREATE TRIGGER archive_sales_trigger

    BEFORE DELETE ON sales

    FOR EACH ROW

    BEGIN

    ...

    END; $$

    DELIMITER ;

    ```


    Here, the delimiter is changed to `$$`. It doesn’t have to be that, but it’s a
    combination you’re unlikely to use for anything else. The new delimiter is used
    to mark the end of the code and switched back to the semicolon after that.


    After that, the trigger code is much as described:


    ```sql

    DELIMITER $$

    CREATE TRIGGER archive_sales_trigger

    BEFORE DELETE ON sales

    FOR EACH ROW

    BEGIN

    INSERT INTO deleted_sales(saleid,customerid,items,deleted_date)

    WITH cte(saleid,customerid,items) AS (

    SELECT

    s.id, s.customerid,

    group_concat(si.bookid||'':''||si.quantity SEPARATOR '';'')

    FROM sales AS s JOIN saleitems AS si ON s.id=si.saleid

    WHERE s.id=old.id

    GROUP BY s.id, s.customerid

    )

    SELECT saleid,customerid,items,current_timestamp

    FROM cte;

    END; $$

    DELIMITER ;

    ```


    You can now test your trigger.'
