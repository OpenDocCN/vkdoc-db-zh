  trans: '

    ### 其他调整


    正如开发过程中常见的情况，让某些东西运行起来并不难，但主要的精力耗费在于让它运行得恰到好处。以下是一些建议，用于提升数据库的完整性和性能。


    我们将在下一节讨论索引：它们有助于让数据更易于搜索或排序。


    | **表** | **列** | **建议** |

    | --- | --- | --- |

    | Customers |

    |   | height | `CHECK` (`height>0`) – 或 `height BETWEEN 60 and 260` |

    |   | dob | `CHECK` (`dob<current_timestamp`) |

    |   | registered | `CHECK` (`registered<current_timestamp`) |

    | Authors |

    |   | names | `INDEX` |

    |   | dates | `CHECK` (`born<died`) |

    |   | gender | `CHECK` (`gender IN(‘m‘,‘f‘)`) |

    |   |   | `CHECK` (`givenname IS NOT NULL OR familyname IS NOT NULL`) |

    | Books |

    |   | authorid | `INDEX` |

    |   | title | `INDEX` |

    |   | published | `CHECK` (`published < year(current_timestamp)`) |

    |   | price | `CHECK` (`price>=0`) |

    | Sales |

    |   | total | `CHECK` (`total>=0`) |

    |   | ordered | `CHECK` (`ordered<current_timestamp`) |

    |   | customerid | `INDEX` |

    |   |   | `CHECK` (`shipped>=ordered`) |

    | Saleitems |

    |   | saleid | `INDEX` |

    |   | bookid | `INDEX` |

    |   | quantity | `NOT NULL CHECK(quantity>0) DEFAULT 1` |

    |   | price | `CHECK(price>=0)` |


    你会注意到，有些 `CHECK` 约束并未关联到单一列。有些约束更关注一列如何与另一列相关联。


    我们当然不会在这里处理所有这些建议。毕竟，这不是一个真实的工作数据库，而且这很可能也不是你的工作。我们只会再看两个例子。


    #### 确保价格非负


    如果能够定义一种非负的数据类型，我们应该对许多列使用这种类型。例如，MySQL/MariaDB 有一种称为 `UNSIGNED INT` 的数据类型：由于是无符号的，它将始终为零或正数，这对于一些计数器以及数量来说非常方便。


    当然，另一种方法是使用 `CHECK` 约束来限制取值。我们会将此构建到书籍价格中。


    你可能会考虑一个合适的最低或最高价格，为此你可以使用 `BETWEEN` 条件。然而，这可能会随时间变化，所以并不总是实用。


    我们在这里要做的只是确保价格从不低于零。我们会允许零，以防有些东西我们愿意免费赠送，但价格绝不应低于零。


    添加这个约束很简单，但语法在不同的数据库管理系统之间又有所不同：


    ```

    --  PostgreSQL

    ALTER TABLE books ADD CHECK (price>=0);

    --  MySQL/MariaDB

    ALTER TABLE books MODIFY price INT CHECK(price>=0);

    --  MSSQL

    ALTER TABLE books ADD CHECK(price>=0);

    --  Oracle

    ALTER TABLE books MODIFY price CHECK(price>=0);

    ```


    再次，在 SQLite 中执行此操作，你可以遵循之前 `saleitems` 表中 `quantity` 列的步骤。


    #### 确保作者生年早于卒年


    当你有多个包含类似数据的列时，就存在将它们顺序弄反的风险。


    一个众所周知的例子是姓名：你按姓氏 `familyname`，然后名字 `givenname` 排序，因此按这种方式存储是有道理的，但你常常会以相反的顺序查看它。不难想象姓名可能会被错误地输入。


    `authors` 表有两个日期：`born`（出生日期）和 `died`（死亡日期）。在这种情况下，它们是按时间顺序存储的，但进行确认仍然是好的。


    在这里，我们将添加一个 `table constraint`（表约束）——一个应用于表而不是单个列的约束。列约束也可以通过这种方式添加，但有些约束不适用于单个列。


    如果我们有机会从头开始重建表，我们会这样做：


    ```

    CREATE TABLE authors (

    id int PRIMARY KEY,     --  按 DBMS 自动编号

    --  givenname, othernames, familyname,

    born DATE,

    died DATE,

    --  gender, home,

    --  表约束:

    CONSTRAINT ck_author_dates CHECK(born<died)

    );

    ```


    这里，约束作为一个附加属性出现，通常（但不一定）在最后。


    鉴于表已经存在并且已有数据，那个机会已经错过了。然而，我们可以事后添加表约束。


    首先，当然，你需要检查是否有任何数据可能违反该约束：


    ```

    SELECT * FROM authors WHERE born<died;

    ```


    不应该有任何数据违反。如果有，那你就得自己处理了。你必须自行研究正确的日期应该是什么，或者，如果你实在没办法，可以将它们设置为 `NULL`。


    下一步将是添加表约束：


    ```

    ALTER TABLE authors ADD CHECK (born<died);

    ```


    与添加列约束不同，各种数据库管理系统都使用相同的语法——当然，SQLite 除外。在 SQLite 中，没有简单的方法来添加表约束。复杂的方法包括删除并重建整个表（类似于删除并重建列），或者篡改数据库内部结构，这绝对不适合胆小的人。

    '
- fmt: '## Adding Indexes


    SQL doesn''t define what order a table should be in. That leaves it up to the
    DBMS to store the table in any way it deems most efficient.


    The problem is that when searching for a particular row, it could be anywhere,
    and the only way to find it is to look through the whole table and hope that it
    doesn''t take too long.


    If, on the other hand, the table were in order, it would be much easier to find
    what you''re looking for. However, even if it''s in order, it''s just as likely
    to be in the order of the wrong thing.


    For example, even if the `customers` table is in, say, `id` order, it doesn''t
    help when searching by `familyname`. If it''s in `familyname` order, it doesn''t
    help when searching by `phone`.


    The solution is to leave the table alone and then supplement the table with one
    or more `indexes`. An index is an additional listing which is in search order,
    together with a pointer to the matching row in the table.


    For example, the `customers` table has an index for the `familyname`. When the
    time comes to search on the `familyname`, the DBMS automatically looks up the
    index instead, finds what it wants, and goes back to the real table to fetch the
    rest of the data.


    There are two costs to having an index:


    *   Each index takes up a little more space in the database.

    *   Every time you add or change a row in the table, each index will also need
    to be updated.


    For this reason, you will only find an index on a column if it has been specifically
    requested in the table design. And you would only include an index if you considered
    the improvement in search ability to be worth the cost in storage and management.


    There are two additional indexes which are automatically included:


    *   Any `UNIQUE` column is always indexed; the best way to prevent duplicated
    values is to keep an ordered list of existing values.

    *   The primary key is always indexed; by definition, it is a unique identifier,
    which you would presumably search often.


    Another type of column which might be worth considering is a foreign key. That''s
    because it will, of course, be heavily involved in searching and sorting.


    There is some discussion in learned circles as to the merits of indexing foreign
    keys. Overall, it appears to be a good idea, and you would probably do well consider
    adding an index to each of them.


    Any other column would be a matter of judgment. At least it''s not hard to change
    your mind about adding or removing an index at some point in the future.


    Some DBMSs do include the ability to store the table in order of one column or
    the other. This is called a `clustered index or an index organized table`. In
    some DBMSs, such as Microsoft SQL, the clustering is permanent (the DBMS ensures
    that the table is maintained in that order); in some others, it is temporary (the
    DBMS sorts the table once, but you''ll have to do it again in the future).


    Here, we''re ignoring clustering. In any case, you still can''t keep the table
    in multiple orders, so you''ll need indexes anyway.


    ### Adding an Index to the Books and Authors Tables


    One column which you might search routinely is the `title` column in the `books`
    table. To add an index, use `CREATE INDEX`:


    ```

    CREATE INDEX ix_books_title

    ON books(title);

    ```


    The `ON` clause identifies the table and the columns you want listed.


    It is possible to index multiple columns in a single statement, but that doesn''t
    create multiple separate indexes. Instead, you create an index on the combined
    value. For example:


    ```

    CREATE INDEX ix_authors_name

    ON authors(familyname, givenname, othernames);

    ```


    This will create a single index of the authors'' `familyname`, `givenname`, and
    `othernames`.


    Even though the index is built around all three parts of the author''s name, it
    will still be used if you just search for, say, the `familyname`. However, using
    a partial index that way presumes that you''re at least using the first components
    of the index, which is why the columns are in that order.


    Note that in both statements earlier, the index has been given a name. There are
    no rules for what that name should be, but developers have their own patterns.
    For example, the preceding pattern is something like


    ```

    ix_table_columns

    ```


    This isn''t a rigid rule, but it makes things easier to work with.


    Why does the index need a name anyway? Most of the time, you don''t really care.
    However, there are two reasons:


    *   Everything stored in the database, including maintenance objects, must have
    a unique name for internal management.

    *   If you ever need to drop an index, you need to use its name to identify it.


    Even if you succeed in creating an anonymous index, the DBMS will automatically
    assign its own name, which isn''t always a very pretty name.


    Another index you might consider is on the foreign key `authorid` in the `books`
    table. You can add it with


    ```

    CREATE INDEX ix_books_authors

    ON books(authorid);

    ```


    Of course, you might also include an index on customer details or other details.'
