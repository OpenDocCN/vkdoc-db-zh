    \ `format()` function with its more intuitive formatting codes; it also adjusts\
    \ for locales and can be used to format a date.\n\n*   SQLite only has a generic\
    \ `format()`, a.k.a. `printf()`, function, which will be more familiar to programmers;\
    \ SQLite presumes that you will format data in the host application such as PHP\
    \ or wherever SQLite has been embedded.\n\nNote that if you do run a number through\
    \ a formatting function, *it is no longer a number*! If all you do is look at\
    \ it, then that doesn’t matter. However, if you have plans to do any further calculations,\
    \ or to sort the results, then a formatted number is likely to backfire on you.\n\
    \nWhen all is said and done, formatting is probably something you won’t do much\
    \ in SQL. The main purpose of SQL is to *get* the data and prepare it for the\
    \ next step. Formatting comes last and is often done in other software.\n\n###\
    \ `String Calculations`\n\nA **string** is a string of characters, hence the name.\
    \ In SQL, this is referred to as **character** data.\n\nTraditionally, SQL has\
    \ two main data types for strings:\n\n*   Character: `CHAR(length)` is a fixed-length\
    \ string. If you enter fewer characters than the length, then the string will\
    \ be right-padded with spaces. This probably explains why standard SQL ignores\
    \ trailing spaces for string comparison.\n\n*   Character varying: `VARCHAR(length)`\
    \ is a limited length string. If you enter a shorter string, it will *not* be\
    \ padded.\n\nIn principle, `CHAR()` is more efficient for processing since it’s\
    \ always the same length, and the DBMS doesn’t need to worry about working out\
    \ the size and making things fixed. `VARCHAR()` is supposed to be more efficient\
    \ for storage.\n\nIn reality, modern DBMSs are much cleverer than their ancestors,\
    \ and the difference between the two types is not very important anymore. For\
    \ example, PostgreSQL recommends always using `VARCHAR` since it actually handles\
    \ that type more efficiently.\n\nMost DBMSs offer a third type, `TEXT`, which\
    \ is, in principle, unlimited in length. Again, modern DBMSs allow longer standard\
    \ strings than they used to, so again this is not so important. Microsoft has\
    \ deprecated `TEXT` in favor of `VARCHAR(MAX)` which does the same job.\n\nA string\
    \ literal is written between single quotes:\n\n```\nSELECT 'hello'; --  Oracle:\
    \ FROM dual;\n```\n\nWhen working with strings, you normally simply want to save\
    \ them and fetch them. However, you can process the strings themselves. This is\
    \ usually one of the following operations:\n\n*   **Concatenation** means joining\
    \ strings together.\n\n    Concatenation is the only direct operation on strings.\
    \ All other operations make use of functions.\n\n*   Some functions will make\
    \ changes to a string. They don’t actually change the string, but return a changed\
    \ version of the string.\n\n*   Some functions can be used to extract parts of\
    \ a string.\n\n*   Some functions are more concerned with individual characters\
    \ of the string."
  trans: "## 数学函数\n\n也有一些数学函数。大多数情况下，除非你从事相当专业的工作，否则数学函数不会被大量使用。\n\n```sql\nSELECT\n\
    pi() AS pi,            --  非 Oracle\nsin(radians(45)) AS sin45,  --  非 Oracle\n\
    sqrt(2) AS root2,      --  √2\nlog10(3) AS log3,\nln(10) AS ln10,        --  自然对数\n\
    power(4,3) AS four_cubed    --  4³\n--  FROM dual                  --  Oracle\n\
    ;\n--  Oracle 的三角函数不太方便\nSELECT\nacos(-1) AS pi,\nsin(45*acos(-1)/180) AS sin45\n\
    FROM dual;\n```\n\n结果大致如下：\n\n| `pi` | `sin45` | `root2` | `log3` | `ln10` | `four_cubed`\
    \ |\n| --- | --- | --- | --- | --- | --- |\n| 3.142 | 0.707 | 1.414 | 0.477 |\
    \ 2.303 | 64 |\n\n所以，现在你可以用 SQL 来计算靠墙梯子的长度，或者计算海上两艘失联船只之间的距离。\n\n## 近似函数\n\n还有一些函数可以给出一个十进制数的近似值。以下是一个示例，其中展示了不同数据库管理系统之间的差异：\n\
    \n```sql\nSELECT\nceiling(200/7.0) AS ceiling,\n--  SQLite: round(200/7.0 + 0.5),\n\
    --  Oracle: ceil(200/7.0),\nfloor(200/7.0) AS floor,\n--  SQLite: round(200/7.0\
    \ - 0.5),\nround(200/7.0,0) AS rounded_integer,\n--  或者 round(200/7), --  非 MSSQL\n\
    round(200/7.0,2) AS rounded_decimal\n--  FROM DUAL   -- Oracle\n;\n```\n\n如你所见，这些函数都会损失精度：\n\
    \n| `ceiling` | `floor` | `rounded_integer` | `rounded_decimal` |\n| --- | ---\
    \ | --- | --- |\n| 29 | 28 | 29 | 28.57 |\n\n如果你使用 `cast()` 函数转换为另一种更窄的数值类型，你也会损失精度。然而，接下来会发生什么取决于具体的数据库管理系统：\n\
    \n| `DBMS` | `castint` | `castdec` |\n| --- | --- | --- |\n| PostgreSQL | 235\
    \ | 234.57 |\n| MariaDB/MySQL | 235 | 234.57 |\n| Oracle | 235 | 234.57 |\n| MSSQL\
    \ | 234 | 234.57 |\n| SQLite | 234 | 234.567 |\n\n```sql\nSELECT\ncast(234.567\
    \ AS int) AS castint,\n--  cast(234.567 AS unsigned),  --  MySQL\ncast(234.567\
    \ AS decimal(5,2)) AS castdec\n--  FROM dual               --  Oracle\n;\n```\n\
    \n*   对于 PostgreSQL、Oracle 和 MariaDB/MySQL，转换为整数或更短的小数会对数字进行四舍五入。\n*   对于 MSSQL，转换为更短的小数会四舍五入，但转换为整数则会截断。如果你想要截断为整数，可以使用类似\
    \ `decimal(3,0)` 的方法。\n*   对于 SQLite，转换为整数会截断，而转换为小数则会被忽略并保留原始值。\n\n## 数字格式化\n\
    \n格式化函数改变数字的显示外观。与其他近似函数不同，格式化函数的结果不是数字，而是字符串；这是你改变数字外观的唯一方式。\n\n对于数字，你最常想做的是改变小数位数、显示千位分隔符，以及可能添加货币符号。\n\
    \n同样，不同的数据库管理系统有截然不同的函数。例如，以下是一些将数字格式化为带千位分隔符的货币的方法：\n\n```sql\n--  PostgreSQL,\
    \ Oracle\nSELECT\nto_char(total,'FM999G999G999D00') AS local_number,\nto_char(total,'FML999G999G999D00')\
    \ AS local_currency\nFROM sales;\nSELECT to_char(total,'FM$999,999,999.00') FROM\
    \ sales;\n\n--  MariaDB/MySQL\nSELECT\nformat(total,2) AS local_number,\nformat(total,2,'de_DE')\
    \ AS specific_number\nFROM sales;\n\n--  MSSQL\nSELECT\nformat(total,'n') AS local_number,\n\
    format(total,'c') AS local_currency\nFROM sales;\n\n--  SQLite\nSELECT printf('$%,d.%02d',total,round(total*100)%100)\n\
    FROM sales;\n```\n\n你会得到类似下面这样的结果：\n\n| `local_number` | `local_currency` |\n\
    | --- | --- |\n| 28.00 | $28.00 |\n| 34.00 | $34.00 |\n| 58.50 | $58.50 |\n| 50.00\
    \ | $50.00 |\n| 17.50 | $17.50 |\n| 13.00 | $13.00 |\n| ~ 5549 行 ~ |\n\n注意\n\n\
    *   PostgreSQL 和 Oracle 都有灵活的 `to_char()` 函数，该函数也可用于格式化日期。\n*   MariaDB/MySQL\
    \ 使用 `format()` 函数，它添加千位分隔符和小数位；你还可以指定它适应不同的区域设置。\n*   MSSQL 有其自己的 `format()`\
    \ 函数，具有更直观的格式代码；它也能适应区域设置，并可用于格式化日期。\n*   SQLite 只有一个通用的 `format()` 函数，也称为 `printf()`\
    \ 函数，这对程序员来说可能更熟悉；SQLite 假定你会在宿主应用程序（如 PHP 或任何嵌入了 SQLite 的地方）中格式化数据。\n\n请注意，如果你确实对一个数字使用了格式化函数，它就不再是数字了！如果你只是查看它，那没关系。但是，如果你计划进行任何进一步的计算，或者对结果进行排序，那么格式化的数字很可能会适得其反。\n\
    \n说到底，格式化可能是你在 SQL 中不会做太多的事情。SQL 的主要目的是获取数据并为下一步做好准备。格式化是最后一步，通常在其他软件中完成。\n\n\
    ### 字符串计算\n\n字符串就是字符的序列，因此得名。在 SQL 中，这被称为字符数据。\n\n传统上，SQL 有两种主要的字符串数据类型：\n\n*\
    \   字符型：`CHAR(length)` 是固定长度的字符串。如果你输入的字符少于指定长度，字符串将在右侧填充空格。这可能解释了为什么标准 SQL 在比较字符串时会忽略尾随空格。\n\
    *   字符可变型：`VARCHAR(length)` 是有长度限制的字符串。如果你输入较短的字符串，它不会被填充。\n\n原则上，`CHAR()` 在处理上更高效，因为它总是相同的长度，数据库管理系统不需要担心计算大小并固定内容。`VARCHAR()`\
    \ 理应存储效率更高。\n\n实际上，现代数据库管理系统比它们的前辈聪明得多，这两种类型之间的差异已不再那么重要。例如，PostgreSQL 建议始终使用\
    \ `VARCHAR`，因为它实际上能更高效地处理该类型。\n\n大多数数据库管理系统提供第三种类型，`TEXT`，它在原则上长度是无限的。同样，现代数据库管理系统允许的标准字符串长度比过去更长，所以这也不那么重要了。微软已弃用\
    \ `TEXT`，转而使用功能相同的 `VARCHAR(MAX)`。\n\n字符串字面量写在单引号之间：\n\n```sql\nSELECT 'hello';\
    \ --  Oracle: FROM dual;\n```\n\n使用字符串时，你通常只是想保存和获取它们。然而，你也可以处理字符串本身。这通常是以下操作之一：\n\
    \n*   **串联** 意味着将字符串连接在一起。\n    串联是字符串上唯一的直接操作。所有其他操作都使用函数。\n*   一些函数会修改字符串。它们并不实际改变字符串，而是返回一个修改后的字符串版本。\n\
    *   一些函数可用于提取字符串的部分内容。\n*   一些函数更关注字符串的各个字符。"
- fmt: "#### Case Sensitivity\n\nSQL will store the upper/lower case characters as\
    \ expected, but you may have a hard time searching for them. That's because some\
    \ databases ignore case, while others don't.\n\nHow a database handles case is\
    \ a question of **collation**. Collation refers to how it interprets variations\
    \ of letters. In English, the only variation to worry about is upper or lower\
    \ case, but other languages may have more variations, such as accented letters\
    \ in French or German.\n\nCollation will have an impact on how strings are sorted\
    \ and how they compare. In English, you're mainly worried about whether upper\
    \ case strings match lower case strings and possibly whether upper and lower case\
    \ strings are sorted together or sorted separately. In some other languages, the\
    \ same questions might apply to whether accented and nonaccented characters match\
    \ and how they, too, are sorted.\n\nYou can set a collation when you create the\
    \ database or a table, but if you don't worry about it, the DBMS will have a default\
    \ collation for new databases.\n\nIn PostgreSQL, Oracle, and SQLite, the default\
    \ collation is case sensitive, so upper and lower case won't match. With MySQL/MariaDB\
    \ and MSSQL, the default collation is case insensitive, so they will match.\n\n\
    If you're not sure whether your particular database is case sensitive or not,\
    \ you can try this simple test:\n```sql\nSELECT * FROM customers WHERE 'a'='A';\n\
    ```\nIf the database is case sensitive, you won't get any rows, since `a` won't\
    \ match `A`; if it's not, you will get the whole table.\n\n#### ASCII and Unicode\n\
    \nTraditionally, strings are encoded using ASCII—the American Standard Code for\
    \ Information Interchange. Each character has a number from 32 to 126, stored\
    \ in a single byte. For example, `A` is encoded as 65, while `a` is encoded as\
    \ 97. Special characters include the space (32), the exclamation mark (33), and\
    \ even the numerals `0`–`9` (48–57).\n\nSince there are only 95 values between\
    \ 32 and 126, ASCII has a limited range of characters. Once you've taken up the\
    \ alphabet in upper and lower case as well as the 10 digits, you've already used\
    \ up 62 characters, which doesn't leave much room for punctuation or other special\
    \ characters. (Why they include obscure characters such as `~` and `` ` `` remains\
    \ a mystery.)\n\nBasic ASCII certainly doesn't have the scope to include more\
    \ punctuation characters, European accented characters, or the Greek or Cyrillic\
    \ alphabets. And don't even think about Japanese or Chinese.\n\nOne technique\
    \ for handling other languages is to switch to different variations of ASCII.\
    \ A more enduring solution is to use Unicode.\n\nUnicode is the modern standard\
    \ for handling multiple languages in a single encoding system. It does this by\
    \ using multiple bytes. How exactly this is achieved can be tricky and will vary\
    \ in different implementations, but the idea is the same.\n\nUnicode is designed\
    \ to include ASCII codes, so there is some compatibility between the two. However,\
    \ some Unicode implementations do take up more space than ASCII, even when they're\
    \ encoding the same characters. Today, space is cheap, and database software is\
    \ pretty clever at using space efficiently, so that shouldn't be too much of a\
    \ problem.\n\nAll modern DBMSs support Unicode. Some do it by default, while some\
    \ expect you to ask for it. In some cases, you can use Unicode for the whole database,\
    \ for particular tables, or for individual columns.\n\nThe sample database uses\
    \ Unicode for most of the data, but may use ASCII in some cases where the character\
    \ set is deliberately limited, such as for phone numbers which are stored as strings.\n\
    \nSome DBMSs support `NCHAR` and `NVARCHAR` data types in addition to `CHAR` and\
    \ `VARCHAR`. If the database tables are set to use Unicode, then `CHAR` and `VARCHAR`\
    \ will do the job. Otherwise, you might use `NCHAR` and `NVARCHAR` to specify\
    \ Unicode on particular columns.\n\n#### Concatenation\n\nConcatenation means\
    \ joining strings together. This is the simplest string operation and the only\
    \ one which can be done without a function.\n\nThe concatenation operator is usually\
    \ `||`. Microsoft SQL Server uses `+` instead. For example:\n```sql\nSELECT\n\
    \    id,\n    givenname||' '||familyname AS fullname\n--  givenname+' '+familyname\
    \ AS fullname    --  MSSQL\nFROM customers;\n```\nThat will give you something\
    \ like\n\n| `Id` | `fullname` |\n| --- | --- |\n| 42 | May Knott |\n| 459 | Rick\
    \ Shaw |\n| 597 | Ike Andy |\n| 186 | Pat Downe |\n| 352 | Basil Isk |\n| 576\
    \ | Pearl Divers |\n| ~ 303 rows ~ |\n\nNote that MySQL in traditional mode doesn't\
    \ support the concatenation operator in any form. In ANSI mode, it supports the\
    \ standard `||` operator.\n\nMany DBMSs also support a non-standard function `concat(string,string,...)`.\
    \ For example:\n```sql\n--  Not SQLite\nSELECT\n    id,\n    concat(givenname,'\
    \ ',familyname) AS fullname\nFROM customers;\n```\nThis is not supported in SQLite.\
    \ However, it is supported in MySQL, so that's how you concatenate strings in\
    \ traditional mode.\n\nFor most DBMSs, there is a subtle but important difference\
    \ between the `concat()` function and the concatenation operator. With the concatenation\
    \ operator, if there is a `NULL` in the mix, the result will (naturally) also\
    \ be `NULL`. However, the `concat()` function will automatically coalesce a `NULL`\
    \ result to an empty string (`''`). This may or may not be convenient, as sometimes\
    \ the `NULL` is something you should know about.\n\nOracle, however, takes a different\
    \ approach. They regard a `NULL` string as the same as an empty string `''`, so\
    \ concatenating a `NULL` either way is the same as concatenating an empty string.\
    \ On one hand, this is convenient if you don't want to have to coalesce; on the\
    \ other hand, there are times when you need `NULL` to be `NULL`, so this can be\
    \ awkward."
  raw: '#### Case Sensitivity


    SQL will store the upper/lower case characters as expected, but you may have a
    hard time searching for them. That’s because some databases ignore case, while
    others don’t.


    How a database handles case is a question of **collation**. Collation refers to
    how it interprets variations of letters. In English, the only variation to worry
    about is upper or lower case, but other languages may have more variations, such
    as accented letters in French or German.


    Collation will have an impact on how strings are sorted and how they compare.
    In English, you’re mainly worried about whether upper case strings match lower
    case strings and possibly whether upper and lower case strings are sorted together
    or sorted separately. In some other languages, the same questions might apply
    to whether accented and nonaccented characters match and how they, too, are sorted.


    You can set a collation when you create the database or a table, but if you don’t
    worry about it, the DBMS will have a default collation for new databases.


    In PostgreSQL, Oracle, and SQLite, the default collation is case sensitive, so
    upper and lower case won’t match. With MySQL/MariaDB and MSSQL, the default collation
    is case insensitive, so they will match.


    If you’re not sure whether your particular database is case sensitive or not,
    you can try this simple test:


    ```

    SELECT * FROM customers WHERE ''a''=''A'';

    ```


    If the database is case sensitive, you won’t get any rows, since `a` won’t match
    `A`; if it’s not, you will get the whole table.


    #### ASCII and Unicode


    Traditionally, strings are encoded using ASCII—the American Standard Code for
    Information Interchange. Each character has a number from 32 to 126, stored in
    a single byte. For example, `A` is encoded as 65, while `a` is encoded as 97.
    Special characters include the space (32), the exclamation mark (33), and even
    the numerals `0`–`9` (48–57).


    Since there are only 95 values between 32 and 126, ASCII has a limited range of
    characters. Once you’ve taken up the alphabet in upper and lower case as well
    as the 10 digits, you’ve already used up 62 characters, which doesn’t leave much
    room for punctuation or other special characters. (Why they include obscure characters
    such as `~` and `` ` `` remains a mystery.)


    Basic ASCII certainly doesn’t have the scope to include more punctuation characters,
    European accented characters, or the Greek or Cyrillic alphabets. And don’t even
    think about Japanese or Chinese.


    One technique for handling other languages is to switch to different variations
    of ASCII. A more enduring solution is to use Unicode.


    Unicode is the modern standard for handling multiple languages in a single encoding
    system. It does this by using multiple bytes. How exactly this is achieved can
    be tricky and will vary in different implementations, but the idea is the same.


    Unicode is designed to include ASCII codes, so there is some compatibility between
    the two. However, some Unicode implementations do take up more space than ASCII,
    even when they’re encoding the same characters. Today, space is cheap, and database
    software is pretty clever at using space efficiently, so that shouldn’t be too
    much of a problem.


    All modern DBMSs support Unicode. Some do it by default, while some expect you
    to ask for it. In some cases, you can use Unicode for the whole database, for
    particular tables, or for individual columns.


    The sample database uses Unicode for most of the data, but may use ASCII in some
    cases where the character set is deliberately limited, such as for phone numbers
    which are stored as strings.


    Some DBMSs support `NCHAR` and `NVARCHAR` data types in addition to `CHAR` and
    `VARCHAR`. If the database tables are set to use Unicode, then `CHAR` and `VARCHAR`
    will do the job. Otherwise, you might use `NCHAR` and `NVARCHAR` to specify Unicode
    on particular columns.


    #### Concatenation


    Concatenation means joining strings together. This is the simplest string operation
    and the only one which can be done without a function.


    The concatenation operator is usually `||`. Microsoft SQL Server uses `+` instead.
    For example:


    ```

    SELECT

    id,

    givenname||'' ''||familyname AS fullname

    --  givenname+'' ''+familyname AS fullname    --  MSSQL

    FROM customers;

    ```


    That will give you something like


    | **Id** | **fullname** |

    | --- | --- |

    | 42 | May Knott |

    | 459 | Rick Shaw |

    | 597 | Ike Andy |

    | 186 | Pat Downe |

    | 352 | Basil Isk |

    | 576 | Pearl Divers |

    | ~ 303 rows ~ |


    Note that MySQL in traditional mode doesn’t support the concatenation operator
    in any form. In ANSI mode, it supports the standard `||` operator.


    Many DBMSs also support a non-standard function `concat(string,string,...)`. For
    example:


    ```

    --  Not SQLite

    SELECT

    id,

    concat(givenname,'' '',familyname) AS fullname

    FROM customers;

    ```


    This is not supported in SQLite. However, it is supported in MySQL, so that’s
    how you concatenate strings in traditional mode.


    For most DBMSs, there is a subtle but important difference between the `concat()`
    function and the concatenation operator. With the concatenation operator, if there
    is a `NULL` in the mix, the result will (naturally) also be `NULL`. However, the
    `concat()` function will automatically coalesce a `NULL` result to an empty string
    (`''''`). This may or may not be convenient, as sometimes the `NULL` is something
    you should know about.


    Oracle, however, takes a different approach. They regard a `NULL` string as the
    same as an empty string `''''`, so concatenating a `NULL` either way is the same
    as concatenating an empty string. On one hand, this is convenient if you don’t
    want to have to coalesce; on the other hand, there are times when you need `NULL`
    to be `NULL`, so this can be awkward.'
  trans: "\n#### 大小写敏感性\n\nSQL 会按预期存储大写/小写字符，但你在搜索它们时可能会遇到困难。这是因为某些数据库忽略大小写，而另一些则不忽略。\n\
    \n数据库如何处理大小写是一个**排序规则**的问题。排序规则指的是它如何解释字母的变体。在英语中，唯一需要担心的变体是大写或小写，但其他语言可能有更多的变体，例如法语或德语中的带重音字母。\n\
    \n排序规则会影响字符串的排序和比较方式。在英语中，你主要关心的是大写字符串是否与小写字符串匹配，以及大写和小写字符串是混合排序还是分开排序。在其他一些语言中，同样的问题可能适用于带重音字符和不带重音字符是否匹配，以及它们如何排序。\n\
    \n你可以在创建数据库或表时设置排序规则，但如果你不关心这个，DBMS 会为新数据库分配一个默认的排序规则。\n\n在 PostgreSQL、Oracle\
    \ 和 SQLite 中，默认的排序规则是大小写敏感的，因此大写和小写不会匹配。而对于 MySQL/MariaDB 和 MSSQL，默认的排序规则是大小写不敏感的，因此它们会匹配。\n\
    \n如果你不确定你特定的数据库是否区分大小写，可以尝试这个简单的测试：\n```sql\nSELECT * FROM customers WHERE 'a'='A';\n\
    ```\n如果数据库是大小写敏感的，你将不会得到任何行，因为 `a` 不会匹配 `A`；如果不是，你将得到整个表的内容。\n\n#### ASCII 与 Unicode\n\
    \n传统上，字符串使用 ASCII（美国信息交换标准代码）进行编码。每个字符都有一个从 32 到 126 的数字，存储在一个字节中。例如，`A` 被编码为\
    \ 65，而 `a` 被编码为 97。特殊字符包括空格（32）、感叹号（33），甚至数字 `0`–`9`（48–57）。\n\n由于 32 到 126 之间只有\
    \ 95 个值，ASCII 的字符范围有限。一旦你用完了大小写字母和 10 个数字，就已经用掉了 62 个字符，这为标点符号或其他特殊字符留下的空间不多了。（为什么他们会包含像\
    \ `~` 和 `` ` `` 这样晦涩的字符，仍然是个谜。）\n\n基本的 ASCII 肯定没有足够的范围来包含更多的标点字符、欧洲带重音字符或希腊/西里尔字母。更不用说日语或中文了。\n\
    \n处理其他语言的一种技术是切换到 ASCII 的不同变体。一个更持久的解决方案是使用 Unicode。\n\nUnicode 是现代标准，用于在单一编码系统中处理多种语言。它通过使用多个字节来实现这一点。具体如何实现可能比较棘手，并且在不同实现中会有所不同，但其理念是相同的。\n\
    \nUnicode 旨在包含 ASCII 码，因此两者之间具有一定的兼容性。然而，一些 Unicode 实现确实比 ASCII 占用更多空间，即使它们编码的是相同的字符。如今，存储空间很便宜，而且数据库软件在高效利用空间方面相当聪明，所以这应该不是什么大问题。\n\
    \n所有现代 DBMS 都支持 Unicode。有些默认支持，有些则需要你主动要求。在某些情况下，你可以为整个数据库、特定表或单个列使用 Unicode。\n\
    \n示例数据库对大多数数据使用 Unicode，但在一些特意限制字符集的情况下可能会使用 ASCII，例如将电话号码存储为字符串时。\n\n一些 DBMS\
    \ 除了支持 `CHAR` 和 `VARCHAR` 外，还支持 `NCHAR` 和 `NVARCHAR` 数据类型。如果数据库表设置为使用 Unicode，那么\
    \ `CHAR` 和 `VARCHAR` 就可以胜任。否则，你可能需要使用 `NCHAR` 和 `NVARCHAR` 在特定列上指定 Unicode。\n\n\
    #### 连接\n\n连接是指将字符串拼接在一起。这是最简单的字符串操作，也是唯一一个不需要函数就能完成的操作。\n\n连接运算符通常是 `||`。Microsoft\
    \ SQL Server 使用 `+` 代替。例如：\n```sql\nSELECT\n    id,\n    givenname||' '||familyname\
    \ AS fullname\n--  givenname+' '+familyname AS fullname    --  MSSQL\nFROM customers;\n\
    ```\n这将给出类似这样的结果：\n\n| `Id` | `fullname` |\n| --- | --- |\n| 42 | May Knott |\n\
    | 459 | Rick Shaw |\n| 597 | Ike Andy |\n| 186 | Pat Downe |\n| 352 | Basil Isk\
    \ |\n| 576 | Pearl Divers |\n| ~ 303 行 ~ |\n\n请注意，传统模式下的 MySQL 不支持任何形式的连接运算符。在\
    \ ANSI 模式下，它支持标准的 `||` 运算符。\n\n许多 DBMS 也支持一个非标准函数 `concat(string,string,...)`。例如：\n\
    ```sql\n--  非 SQLite\nSELECT\n    id,\n    concat(givenname,' ',familyname) AS\
    \ fullname\nFROM customers;\n```\n这在 SQLite 中不支持。然而，它在 MySQL 中是支持的，因此在传统模式下，这就是你连接字符串的方式。\n\
    \n对于大多数 DBMS，`concat()` 函数和连接运算符之间有一个微妙但重要的区别。使用连接运算符时，如果其中有一个是 `NULL`，结果（自然）也将是\
    \ `NULL`。然而，`concat()` 函数会自动将 `NULL` 结果合并为一个空字符串（`''`）。这可能方便也可能不方便，因为有时 `NULL`\
    \ 是你需要知道的情况。\n\n不过，Oracle 采用了不同的方法。他们将 `NULL` 字符串视为与空字符串 `''` 相同，因此以任何方式连接 `NULL`\
    \ 都等同于连接一个空字符串。一方面，如果你不想处理合并问题，这很方便；另一方面，有时你需要 `NULL` 就是 `NULL`，所以这可能很麻烦。\n"
- fmt: "# String Functions\n\nOther operations with strings require functions. Here\
    \ are some examples.\n\nFor the following examples, we’ve included `SELECT *`\
    \ for context—except that in Oracle you need to write `SELECT table.*` if you’re\
    \ mixing it with other data, so we’ve done that with all of the examples which\
    \ include Oracle.\n\nThe length of a string is the number of characters in the\
    \ string. To find the length, you can use\n\n```sql\n--  PostgreSQL, MySQL/MariaDB,\
    \ SQLite, Oracle\nSELECT customers.*, length(familyname) AS len\nFROM customers;\n\
    --  MSSQL\nSELECT *, len(familyname) AS len FROM customers;\n```\n\nTo find where\
    \ part of a string is, you can use the following:\n\n```sql\n--  MySQL/MariaDB,\
    \ SQLite, Oracle: INSTR('values',value)\nSELECT books.*, instr(title,' ') AS space\
    \ FROM books;\n--  PostgreSQL: POSITION(value IN 'values')\nSELECT *, position('\
    \ ' in title) AS space FROM books;\n--  MSSQL: CHARINDEX(value, 'values')\nSELECT\
    \ *, charindex(' ',title) AS space FROM books;\n```\n\nYou can use `replace` to\
    \ replace substrings in a string:\n\n```sql\n--  replace(original,search,replace)\n\
    SELECT books.*, replace(title,' ','-') AS hyphens\nFROM books;\n```\n\nTo change\
    \ between upper and lower case, there is\n\n```sql\n--  PostgreSQL, MySQL/MariaDB,\
    \ SQLite, Oracle, MSSQL\nSELECT\n  books.*,\n  upper(title) AS upper,\n  lower(title)\
    \ AS lower\nFROM books;\n--  PostgreSQL, Oracle\nSELECT books.*, initcap(title)\
    \ AS lower FROM books;\n```\n\nTo remove extra spaces at the beginning or the\
    \ end of a string, you can use `trim()` to remove from both ends, or `ltrim()`\
    \ or `rtrim()` to remove from the beginning or end of the string:\n\n```sql\n\
    WITH vars AS (\n  SELECT ' abcdefghijklmnop ' AS string\n  --  FROM dual   --\
    \  Oracle\n)\nSELECT\n  string,\n  ltrim(string) AS ltrim,\n  rtrim(string) AS\
    \ rtrim,\n  trim(string) AS trim,\n  ltrim(rtrim(string)) AS same\nFROM vars;\n\
    ```\n\nAll modern DBMSs support `trim()`, but MSSQL didn’t until version 2017.\
    \ PostgreSQL also calls it `btrim()`. You may not notice when the spaces on the\
    \ right are trimmed.\n\nYou can get substring with `substring()` or `substr()`,\
    \ depending on your DBMS:\n\n```sql\nWITH vars AS (\n  SELECT 'abcdefghijklmnop'\
    \ AS string\n  FROM dual   --  Oracle\n)\nSELECT\n  --  PostgreSQL, MariaDB/MySQL,\
    \ Oracle, SQLite\n  substr(string,3,5) AS substr,\n  --  PostgreSQL, MariaDB/MySQL,\
    \ MSSQL, SQLite\n  substring('abcdefghijklmnop',3,5) AS substring\nFROM vars;\n\
    ```\n\nSome DBMSs include specialized functions to get the first or last part\
    \ of a string. In some cases, you can use a negative start to get the last part\
    \ of a string:\n\n```sql\nWITH vars AS (\n  SELECT 'abcdefghijklmnop' AS string\n\
    \  FROM dual   --  Oracle\n)\nSELECT\n  --  Left\n  --  PostgreSQL, MariaDB/MySQL,\
    \ MSSQL:\n  left('abcdefghijklmnop',4) AS lstring\n  --  All DBMSs including SQLITE\
    \ and Oracle:\n  --  substr(string,1,n) AS lstring,\n  --  Right\n  --  PostgreSQL,\
    \ MariaDB/MySQL, MSSQL:\n  right('abcdefghijklmnop',4) AS rstring\n  --  MariaDB/MySQL,\
    \ Oracle, SQLite\n  --  substr('abcdefghijklmnop',-4) AS rstring\nFROM vars;\n\
    ```\n\nJust note that if you spend a lot of time extracting substrings from your\
    \ data, it’s possible that you’re trying to store too much in a single value.\n\
    \nOn the other hand, you can often use substrings to reformat raw data into something\
    \ more friendly.\n\n## Date Operations\n\nFrom an SQL point of view, dates are\
    \ problematic. That’s because, despite their overwhelming presence in daily life,\
    \ measuring dates is a mess.\n\nOne problem is that we measure dates using a number\
    \ of incompatible cycles all at the same time: the day, week, month, and year.\
    \ To make things worse, we all live in different time zones, so we can’t even\
    \ agree on what time it is.\n\nMost DBMSs have a number of related data types\
    \ to manage dates, specifically the `date` which is for dates with times and `datetime`\
    \ which includes the time. Generally, you can expect variations on these types,\
    \ as well as the ability to include time zones.\n\nThe exception is SQLite, which\
    \ expects you to use numbers or strings and run the values through a few functions\
    \ to do the date arithmetic.\n\nThere are a number of things you would expect\
    \ to do with dates and times:\n\n1.  Enter and store a date/time\n2.  Get the\
    \ current date/time\n3.  Group and sort by date/time\n4.  Extract parts of the\
    \ date/time\n5.  Add to a date/time\n6.  Calculate the difference between two\
    \ dates/times\n7.  Format a date/time\n\nSQLite has a completely different approach\
    \ to working with dates. That’s partly because it doesn’t actually support dates.\
    \ As a result, SQLite will be missing from much of the following discussion. The\
    \ Appendix has some information on handling dates in SQLite.\n\n### Entering and\
    \ Storing a Date/Time\n\nSince most DBMSs have their own way of storing a date/time,\
    \ the actual details of date storage are not important. What is important is that\
    \ you can enter the data.\n\nIn a table, a date or datetime column is usually\
    \ defined as follows:\n\n| **DBMS** | **Date** | **Date with time** |\n| --- |\
    \ --- | --- |\n| PostgreSQL | `DATE` | `TIMESTAMP` |\n| MariaDB/MySQL | `DATE`\
    \ | `DATETIME` |\n| MSSQL | `DATE` | `DATETIME2` |\n| Oracle | `DATE` | `DATETIME`\
    \ |\n| SQLite | `TEXT` | `TEXT` |\n\nThe normal way to enter a `date` or `datetime`\
    \ literal is to use one of the following:\n\n*   `date`: `'2013-02-15'`\n*   `datetime`:\
    \ `'2013-02-15 09:20:00'`\n\nYou can also omit the seconds or include decimal\
    \ parts of a second.\n\nThe format is a variation of the `ISO8601` format. In\
    \ pure `ISO8601` format, the time would be written after a `T` instead of a space.\n\
    \nNote that with Oracle, datetime literals generally use a different format. To\
    \ use the preceding formats, prefix the literal with `date` or `datetime`, respectively:\n\
    \n*   `date`: `date '2013-02-15'`\n*   `datetime`: `datetime '2013-02-15 09:20:00'`\n\
    \nIn PostgreSQL, MSSQL, and MySQL/MariaDB, you can often enter another readable\
    \ date format such as `'15 Feb 2013'`. However, you should *never* use the format\
    \ `'2/3/2013'` which has different meanings internationally.\n\nIn practical terms,\
    \ just stick to the standard format:\n\n```sql\nSELECT *\nFROM customers\nWHERE\
    \ dob<'1980-01-01'; --  Oracle dob<date '1980-01-01';\n```\n\nwhich gives you\
    \ older customers:\n\n| **id** | **givenname** | **familyname** | **…** | **dob**\
    \ | **…** |\n| --- | --- | --- | --- | --- | --- |\n| 459 | Rick | Shaw | … |\
    \ 1945-07-03 | … |\n| 352 | Basil | Isk | … | 1960-01-13 | … |\n| 92 | Nan | Keen\
    \ | … | 1943-05-18 | … |\n| 267 | Boris | Todeath | … | 1969-10-06 | … |\n| 91\
    \ | June | North | … | 1967-03-22 | … |\n| 543 | Nat | Ering | … | 1946-04-30\
    \ | … |\n| ~ 133 rows ~ |\n\nNote that in simple expressions like `dob<'1980-01-01'`,\
    \ SQL doesn’t get confused about whether the expression is a date or a string:\
    \ the context makes it clear.\n\n### Getting the Current Date/Time\n\nOne thing\
    \ you will want to do is compare a date/time to now. In most DBMSs, you can use\n\
    \n```sql\nSELECT\n  current_timestamp AS now,\n  current_date AS today       --\
    \  Not MSSQL\n  --  FROM dual   --  Oracle\n;\n```\n\nNote\n\n*   MSSQL also has\
    \ `getdate()` as a synonym for `current_timestamp`. Despite the name, it gives\
    \ not just the date.\n*   MariaDB/MySQL also has `now()` as a synonym for `current_timestamp`.\n\
    *   Oracle also has `systemtimestamp` and `systemdate` for date/time on the database\
    \ server rather than on the client.\n\nAs noted earlier, MSSQL doesn’t have a\
    \ version of `current_date`. In any case, you may have an existing `datetime`\
    \ which you want to simplify to a `date`. The simplest way is to `cast` the `datetime`:\n\
    \n```sql\n--  Not Oracle\nSELECT\n  current_timestamp AS now,\n  cast(current_timestamp\
    \ as date) AS today\n  --  FROM dual   --  Oracle\n;\n```\n\nThis won’t quite\
    \ work with Oracle; it will let you do the cast all right, but it doesn’t change\
    \ anything. Instead, you should use the `trunc()` function:\n\n```sql\n--  Oracle\n\
    SELECT\n  current_timestamp AS now,\n  trunc(current_timestamp) AS today\nFROM\
    \ dual   --  Oracle\n;\n```\n\nThis will still have a time component, but it’s\
    \ set to `00:00`."
