  trans: '

    ## 将 CTE 用作变量


    在第 4 章中，我们使用一个测试值进行了一些计算：


    ```sql

    WITH vars AS (

    SELECT '' abcdefghijklmnop '' AS string

    --  FROM dual   --  Oracle

    )

    SELECT

    string,

    --  示例字符串函数

    FROM vars;

    ```


    在本章后面，当我们探讨表字面量时，会看到这种技术更复杂的版本。现在，我们先看看如何使用它。


    一些数据库管理系统以及所有编程语言都有`变量`的概念。变量是一个临时的、有名称的值。在数据库系统支持的情况下，你可以声明一个变量名并赋值，然后在后续步骤中使用。例如，在
    MSSQL 中，你可以这样写：


    ```sql

    --  MSSQL

    DECLARE @taxrate decimal(4,2);

    SET @taxrate = 12.5;

    SELECT

    id, title,

    price, price/@taxrate/100 AS tax

    FROM books;

    ```


    要运行这段代码，你需要高亮选中所有语句并一次性执行。


    本章不会重点讨论这些变量，关于变量的更多用法将在第 10 章中介绍。相反，我们将看看如何使用通用表表达式（CTE）来完成类似的工作。


    严格来说，我们将要使用的不是变量，而是`常量`，这意味着我们只会设置一次它们的值。不过，我们可以使用更宽泛的术语“变量”，因为它更通用。


    定义变量有两个主要好处：


    *   你可以一次性指定一个任意值，并多次使用它。

    *   你可以将任意值移到准备部分。


    在前面的 CTE 示例中，由于我们处理的不是真实数据，我们只是简单地从 CTE 本身进行选择。在更实际的例子中，我们会将 CTE 与其他表进行交叉连接。


    ### 设置硬编码常量


    CTE 变量的一个简单用途是设置一个任意值供主查询使用。例如，假设我们想使用一个任意税率生成一个简单的价格列表。


    我们可以从一个包含税率的 CTE 开始：


    ```sql

    WITH vars AS (

    SELECT 0.1 AS taxrate

    --  FROM dual   --  Oracle

    )

    ```


    现在，我们可以使用简单的交叉连接将 CTE 与`books`表结合起来：


    ```sql

    WITH vars AS (

    SELECT 0.1 AS taxrate

    --  FROM dual   --  Oracle

    )

    SELECT * FROM books, vars;

    ```


    结果如下所示：


    | **id** | **authorid** | **Truncate** | **published** | **price** | **taxrate**
    |

    | --- | --- | --- | --- | --- | --- |

    | 2078 | 765 | The Duel | 1811 | 12.5 | 0.1 |

    | 503 | 128 | Uncle Silas | 1864 | 17 | 0.1 |

    | 2007 | 99 | North and South | 1854 | 17.5 | 0.1 |

    | 702 | 547 | Jane Eyre | 1847 | 17.5 | 0.1 |

    | 1530 | 28 | Robin Hood, The ... | 1862 | 12.5 | 0.1 |

    | 1759 | 17 | La Curée | 1872 | 16 | 0.1 |

    | ~ 1201 行 ~ |


    交叉连接将一张表的每一行与另一张表的每一行组合在一起。由于`vars` CTE 只有一行，交叉连接的效果就是简单地给`books`表添加了另一列。


    SQL 有一个更现代的交叉连接语法：`books CROSS JOIN vars`。这里，我们将使用较旧的语法，因为它更简单、更易读。


    我们现在可以计算含税价格列表：


    ```sql

    WITH vars AS (SELECT 0.1 AS taxrate)

    SELECT

    id, title,

    price, price*taxrate AS tax, price*(1+taxrate) AS total

    FROM books, vars;

    ```


    结果如下：


    | **Id** | **Title** | **price** | **tax** | **total** |

    | --- | --- | --- | --- | --- |

    | 2078 | The Duel | 12.5 | 1.25 | 13.75 |

    | 503 | Uncle Silas | 17 | 1.7 | 18.7 |

    | 2007 | North and South | 17.5 | 1.75 | 19.25 |

    | 702 | Jane Eyre | 17.5 | 1.75 | 19.25 |

    | 1530 | Robin Hood, The Prince of Thieves | 12.5 | 1.25 | 13.75 |

    | 1759 | La Curée | 16 | 1.6 | 17.6 |

    | ~ 1201 行 ~ |


    当然，我们本可以直接使用`0.1`而不是`taxrate`，并省略 CTE 和交叉连接。然而，CTE 的好处在于，它允许我们在开头设置一次税率，这样便于维护，并且可以在后面多次使用。


    ### 派生常量


    这些值不必是字面值。你也可以从另一个查询中派生这些值。例如，要获取最年长和最年轻的客户，首先在变量中设置最小和最大的出生日期：


    ```sql

    --  vars CTE

    SELECT min(dob) AS oldest, max(dob) AS youngest

    FROM customers

    ```


    然后你可以将该 CTE 与`customers`表进行交叉连接，以获取匹配的客户：


    ```sql

    WITH vars AS (

    SELECT min(dob) AS oldest, max(dob) AS youngest

    FROM customers

    )

    SELECT *

    FROM customers, vars

    WHERE dob IN(oldest, youngest);

    ```


    你应该会看到类似这样的结果：


    | **id** | **givenname** | **familyname** | **...** | **dob** | **...** |

    | --- | --- | --- | --- | --- | --- |

    | 92 | Nan | Keen | ... | 1943-05-18 | ... |

    | 228 | Cam | Payne | ... | 2003-01-27 | ... |

    | 577 | Sybil | Service | ... | 2003-01-27 | ... |

    | 392 | Daisy | Chain | ... | 1943-05-18 | ... |


    要获取个子较矮的客户，你可以将平均身高设置在一个变量中：


    ```sql

    WITH vars AS (SELECT avg(height) AS average FROM customers)

    SELECT *

    FROM customers, vars

    WHERE height<average;

    ```


    这是你用其他方法做不到的事情，因为平均值是一个聚合值。


    ### 在 CTE 中使用聚合


    正如我们多次看到的，你不能将聚合与非聚合查询混合使用。解决方案总是单独计算任何你需要的聚合，然后将结果合并到下一个查询中。


    #### 查找每个客户最近的销售记录


    例如，假设你想获取每个客户最近一次销售的详细信息。要获取最近的销售记录，你首先需要一个简单的聚合查询：


    ```sql

    SELECT customerid, max(ordered) AS last_order

    FROM sales

    GROUP BY customerid;

    ```


    你会得到类似这样的结果：


    | **Customerid** | **last_order** |

    | --- | --- |

    | 550 | 2023-04-18 09:18:51.933845 |

    | 272 | 2023-04-28 09:15:17.85286 |

    | 70 | 2023-04-19 14:00:44.880376 |

    | 190 | 2023-04-09 10:12:53.416293 |

    | 539 | 2023-04-22 16:14:16.173923 |

    | 314 | 2023-04-11 03:33:57.825786 |

    | ~ 269 行 ~ |


    这里，我们有两个重要数据：客户 ID 以及最近订单的日期和时间。在子查询中使用这个结果，我们可以将其与`customers`和`sales`表连接起来以获取更多详细信息：


    ```sql

    WITH cte(customerid, last_order) AS (

    SELECT customerid, max(ordered) AS last_order

    FROM sales

    GROUP BY customerid

    )

    SELECT

    customers.id AS customerid,

    customers.givenname, customers.familyname,

    sales.id AS saleid,

    sales.ordered_date, sales.total

    FROM

    sales

    JOIN cte ON sales.customerid=cte.customerid

    AND sales.ordered=cte.last_order

    JOIN customers ON customers.id=cte.customerid

    ;

    ```


    我们会得到类似这样的结果：


    | **customer** | **Givenname** | **familyname** | **sale** | **ordered_date**
    | **total** |

    | --- | --- | --- | --- | --- | --- |

    | 287 | Judy | Free | 4209 | 2023-02-04 | 50.5 |

    | 26 | Bess | Twishes | 4542 | 2023-02-19 | 11 |

    | 368 | Sharon | Sharalike | 4793 | 2023-03-01 | 56 |

    | 282 | Howard | Youknow | 4939 | 2023-03-07 | 39 |

    | 395 | Holly | Day | 4953 | 2023-03-07 | 75.5 |

    | 474 | Alf | Abet | 5092 | 2023-03-13 | 94 |

    | ~ 266 行 ~ |


    请注意，CTE 被用来连接两个表并充当过滤器。我们实际上不需要它的结果出现在输出中。

    '
- fmt: '### Finding Customers with Duplicate Names


    In Chapter [2](#606708_1_En_2_Chapter.xhtml), we saw how to find duplicates using
    an aggregate query. We did this to find duplicate names, of which there were some,
    and duplicate phone numbers, of which there were none.


    If we were more serious about duplicate customer names, we would want more details
    about the customers. First, let’s find the duplicated names:


    ```

    --  cte

    SELECT familyname, givenname FROM customers

    GROUP BY familyname, givenname HAVING count(*)>1

    ```


    Here, `customers` are grouped by both names, and the groups are filtered for more
    than one instance.


    Putting that in a CTE, we can join that to the `customers` table:


    ```

    WITH names AS (

    SELECT familyname, givenname FROM customers

    GROUP BY familyname, givenname HAVING count(*)>1

    )

    SELECT

    c.id, c.givenname, c.familyname,

    c.email, c.phone

    --  etc

    FROM customers AS c

    JOIN names  ON c.givenname=names.givenname

    AND c.familyname=names.familyname

    ORDER BY c.familyname, c.givenname;

    ```


    You’ll get something like this:


    | `id` | `givenname` | `familyname` | `email` | `phone` |

    | --- | --- | --- | --- | --- |

    | 429 | Corey | Ander | corey.ander429@example.net | 0355503360 |

    | 85 | Corey | Ander | corey.ander85@example.net | 0255501923 |

    | 174 | Paul | Bearer | paul.bearer174@example.com | 0370109921 |

    | 482 | Paul | Bearer | paul.bearer482@example.com | 0755502522 |

    | 402 | Terry | Bell | terry.bell402@example.com | 0755504982 |

    | 295 | Terry | Bell | terry.bell295@example.com | 0355509630 |

    | ~ 16 rows ~ |


    We’ve joined the CTE and the `customers` table using two columns and included
    their `email` addresses and `phone` numbers (if any) so that we can chase them
    up.


    ## CTE Parameter Names


    By default, column names come from the CTE, and you are expected to make sure
    that all calculations have an alias, as before. If the columns in the CTE don’t
    have an alias, such as when you’ve calculated something, then (a) you can’t refer
    to the data, and (b) some DBMSs won’t let you go ahead.


    You can also specify column names with the CTE name as parameters. For example,
    when we found the first and last dates of birth, we could have put the aliases
    in the `cte` expression:


    ```

    WITH vars(oldest, youngest) AS (    --  parameter names

    SELECT min(dob), max(dob)       --  no aliases

    FROM customers

    )

    SELECT *

    FROM customers, vars

    WHERE dob IN(oldest, youngest);

    ```


    For the most part, it’s a matter of taste whether you do it this way or add the
    aliases inside the CTE. If you do include the names, they will override any aliases
    in the CTE.


    One reason you might prefer CTE parameter names is if you think it’s more readable,
    as you have all the names in one place. Later, we’ll be writing more complex CTEs
    which involve multiple CTEs and unions, and it will definitely be easier to follow
    with parameter names, so you’ll be seeing more of that style from here on.


    ## Using Multiple Common Table Expressions


    We’ve seen that, in its simplest form, a CTE can be written as a subquery:


    ```

    SELECT columns

    FROM (

    SELECT columns FROM table

    ) AS sq;

    ```


    A CTE can make this more manageable by putting this subquery at the beginning:


    ```

    WITH cte AS (

    SELECT columns FROM table

    )

    SELECT columns

    FROM cte;

    ```


    That’s already an improvement, but where the improvement becomes more obvious
    is when the subquery also has a subquery:


    ```

    SELECT columns

    FROM (

    SELECT columns FROM (

    SELECT columns FROM table

    ) AS sq1

    ) AS sq2;

    ```


    That’s called nesting subqueries, and it can become a nightmare if things get
    too complex.


    Thankfully, CTEs work much more simply:


    ```

    WITH

    sq1 AS (SELECT columns FROM table),

    sq2 AS (SELECT columns FROM sql1)

    SELECT columns FROM sq2;

    ```


    You can have multiple CTEs chained this way, as long as you remember to separate
    them with a comma. As you see in this example, each subquery can refer to a previous
    one in the chain.


    We’ll build this up a little more later, and we’ll see that additional CTEs don’t
    necessarily have to refer to the previous ones.


    ### Summarizing Duplicate Names with Multiple CTEs


    When we produced our list of duplicated names, we had one row for each instance
    of the name. In Chapter [7](#606708_1_En_7_Chapter.xhtml), we produced a more
    consolidated list, but without the benefit of CTEs.


    Here, we’ll reproduce the consolidated list, but using CTEs to make it much more
    workable.


    We’ll start off with the previous query for duplicated names:


    ```

    WITH names AS (

    SELECT familyname, givenname FROM customers

    GROUP BY familyname, givenname HAVING count(*)>1

    )

    SELECT

    c.id, c.givenname, c.familyname,

    c.email, c.phone

    FROM customers AS c

    JOIN names  ON c.givenname=names.givenname

    AND c.familyname=names.familyname

    ORDER BY c.familyname, c.givenname;

    ```


    This time, we’ll put the results into a second CTE:


    ```

    WITH

    names AS (

    SELECT familyname, givenname FROM customers

    GROUP BY familyname, givenname HAVING count(*)>1

    ),

    duplicates(givenname, familyname, info) AS (

    SELECT

    c.givenname, c.familyname,

    cast(c.id AS varchar(5)) || '': '' || c.email

    --  MSSQL: Use +

    FROM customers AS c     --  Oracle: No AS

    JOIN names ON c.givenname=names.givenname

    AND c.familyname=names.familyname

    )

    SELECT * from duplicates

    ORDER by familyname, giv1enname;

    ```


    Note


    .


    *   The layout has changed to make multiple CTEs easier to follow.


    *   The `duplicates` CTE has the parameter names for simplicity. There’s no need
    to do that with the `names` CTE, as there are no calculated values; however, you
    may want to do that for consistency.


    *   Instead of listing the `id` separately, we’ve cast it to a string and concatenated
    it to the `email` address. This is to get ready for what follows.


    *   For simplicity, we’ve ignored the `phone` number, since it may be missing.


    You can see what you get so far:


    | `givenname` | `familyname` | `info` |

    | --- | --- | --- |

    | Corey | Ander | 429: corey.ander429@example.net |

    | Corey | Ander | 85: corey.ander85@example.net |

    | Paul | Bearer | 174: paul.bearer174@example.com |

    | Paul | Bearer | 482: paul.bearer482@example.com |

    | Terry | Bell | 402: terry.bell402@example.com |

    | Terry | Bell | 295: terry.bell295@example.com |

    | ~ 16 rows ~ |


    The next step is to consolidate them by combining the `info` column values:


    ```

    WITH

    names AS ( ),

    duplicates(givenname, familyname, info) AS ( )

    SELECT

    givenname, familyname, count(*),

    --  PostgreSQL, MSSQL

    string_agg(info,'', '') AS info

    --  MySQL/MariaDB

    --  group_concat(info SEPARATOR '', '') AS info

    --  SQLite

    --  group_concat(info,'', '') AS info

    --  Oracle

    --  listagg(info,'', '') AS info

    FROM duplicates

    GROUP BY familyname, givenname

    ORDER by familyname, givenname;

    ```


    The consolidated list looks like this:


    | `givenname` | `familyname` | `count` | `info` |

    | --- | --- | --- | --- |

    | Corey | Ander | 2 | 429: corey.ander ..., 85: corey.ander8 ... |

    | Paul | Bearer | 2 | 174: paul.bearer ..., 482: paul.bearer ... |

    | Terry | Bell | 2 | 402: terry.bell4 ..., 295: terry.bell2 ... |

    | Mary | Christmas | 2 | 465: mary.christ ..., 594: mary.christ ... |

    | Ida | Dunnit | 2 | 504: ida.dunnit5 ..., 90: ida.dunnit90 ... |

    | Judy | Free | 2 | 93: judy.free93@ ..., 287: judy.free28 ... |

    | Annie | Mate | 2 | 505: annie.mate5 ..., 357: annie.mate3 ... |

    | Ken | Tuckey | 2 | 98: ken.tuckey98 ..., 488: ken.tuckey4 ... |


    We’ll see more examples of multiple CTEs in the following sections.'
