  trans: '

    # 分页结果


    你可能需要知道总行数的一个原因，是希望将结果分成多页。例如，假设你希望每页显示，比如说，二十条记录，而现在你想展示其中的第三页。


    我们可以从之前的 `pricelist` 视图开始，并加入 `row_number()` 窗口函数：


    ```sql

    SELECT

    id, title, published, author,

    price, tax, inc,

    row_number() OVER(ORDER BY id) AS row_number

    FROM aupricelist;

    ```


    我们尚未包含 `ORDER BY` 子句，因为后面还有内容。某些数据库管理系统可能会按 `id` 顺序生成结果，但这当然不能保证。


    现在，我们可以将其放入一个公用表表达式（CTE）中，并基于行号进行筛选：


    ```sql

    WITH cte AS (

    SELECT

    id, title, published, author,

    price, tax, inc,

    row_number() OVER(ORDER BY id) AS row_number

    FROM aupricelist

    )

    SELECT *

    FROM cte

    WHERE row_number BETWEEN 40 AND 59

    ORDER BY id;

    ```


    你会得到类似下面的结果：


    | **id** | **title** | **…** | **price** | **tax** | **inc** | **row_number**
    |

    | --- | --- | --- | --- | --- | --- | --- |

    | 98 | 卡米拉 | … | 12 | 1.2 | 13.2 | 40 |

    | 102 | 汉索姆之谜 … | … | 14.5 | 1.45 | 15.95 | 41 |

    | 103 | 波斯信札 | … | 15.5 | 1.55 | 17.05 | 42 |

    | 104 | 罪人在愤怒上帝手中 … | … | 19.5 | 1.95 | 21.45 | 43 |

    | 106 | 特拉法尔加 | … | 16 | 1.6 | 17.6 | 44 |

    | 109 | 红字与 … | … | 19.5 | 1.95 | 21.45 | 45 |

    | ~ 约 20 行 ~ |


    Oracle 有一个内置的值叫做 `rownum`。遗憾的是，你仍然需要通过 CTE 或子查询来使用它。


    当然，你不一定要按 `id` 排序。你可以使用 `title` 或 `price`，只要在窗口函数和 `ORDER BY` 子句中都包含它就行。当然，你也可以使用
    `DESC` 来降序排列。


    还有一种替代方法。正式地说，你可以使用 `OFFSET ... FETCH ...` 子句：


    ```sql

    --  PostgreSQL, MSSQL, Oracle

    SELECT

    id, title, published, author,

    price, tax, inc,

    row_number() OVER(ORDER BY id) AS row_number

    ORDER BY id OFFSET 40 ROWS FETCH FIRST 20 ROWS ONLY;

    ```


    这会跳过前 40 行，并获取之后的 20 行。


    非正式地，一些数据库管理系统支持 `LIMIT ... OFFSET`：


    ```sql

    --  PostgreSQL (再次), MariaDB/MySQL, SQLite

    SELECT

    id, title, published, author,

    price, tax, inc,

    row_number() OVER(ORDER BY id) AS row_number

    ORDER BY id LIMIT 20 OFFSET 40;

    ```


    这是一种更简单的语法，但不幸的是，它不是官方语法。


    MSSQL 也支持简单的 `SELECT TOP` 语法，但它不够灵活。


    当然，这两种替代方法比使用窗口函数技术简单得多，但使用窗口函数有一个优势。


    假设你正在按某个非唯一字段排序，比如 `price`。普通的分页技术（包括前面的 `row_number()`）的问题在于，页面严格在行数处停止（如果没有更多数据，则可能更少）。


    如果你想将相同价格的记录分在一组，可以改用类似下面的方法：


    ```sql

    WITH cte AS (

    SELECT

    id, title, published, author,

    price, tax, inc,

    rank() OVER(ORDER BY price) AS rank

    FROM aupricelist

    )

    SELECT *

    FROM cte

    WHERE rank BETWEEN 40 AND 59

    ORDER BY price;

    ```


    只要分组不是太大，它应该能给你几乎相同的结果，但同一价格的所有书籍都会被归在一起。


    # 使用 ntile


    如果你想将排序后的结果集分成，比如，十个组，我们称这些组为 `十分位数`，源自拉丁语中表示“十”的词。如果你想要五个组，则称为 `五分位数`，一百个组就是
    `百分位数`。如果你懂足够多的拉丁语，你还可以继续分成七组或十三组。


    数学家对任何数字都有一个通用名称，称为 `n`，一旦你习惯了，这个名字相当吸引人。如果你将排序后的数据分成组，你就创建了 `ntiles`，对应的窗口函数是
    `ntile(n)`，其中 `n` 是组的数量。


    例如，要在客户表中按身高创建十分位数，你可以使用：


    ```sql

    SELECT

    id, givenname, familyname, height,

    ntile(10) OVER (order by height) AS decile

    FROM customers

    WHERE height IS NOT NULL;

    ```


    你会得到类似这样的结果：


    | **id** | **givenname** | **familyname** | **height** | **decile** |

    | --- | --- | --- | --- | --- |

    | 597 | 艾克 | 安迪 | 153 | 1 |

    | 283 | 埃塞尔 | 格利科尔 | 153 | 1 |

    | 451 | 弗雷德 | 诺特 | 153.8 | 1 |

    | 194 | 罗德 | 菲什 | 154.3 | 1 |

    | 534 | 明妮 | 巴斯 | 156.4 | 1 |

    | 352 | 巴兹尔 | 伊斯克 | 156.4 | 1 |

    | ~ 约 267 行 ~ |


    注意我们已经过滤掉了 `NULL` 身高值。如果我们没有过滤，那么根据你的数据库管理系统，第一个或最后一个十分位左右的组里会充斥着 `NULL` 身高值。这会创建一个本不应存在的组，但无论如何被包括进来了。


    这只是 `ntile()` 的一个陷阱。实际上有两个陷阱，其中一个可能是决定性的障碍。


    首先，请注意前面的结果有 267 行，这不能被 10 整除。这没关系，但 SQL 必须处理这种情况，你会发现前七个组会有 27 行，其余组有 26 行。当然，你自己的结果可能不同，但思路是一样的：余下的行会从前面开始填充。


    第二个陷阱可能需要仔细寻找，并且在你自己的示例数据库中可能不明显。如果你仔细查找，可能会发现类似这样的情况：


    | **id** | **givenname** | **familyname** | **height** | **decile** |

    | --- | --- | --- | --- | --- |

    | … |

    | 388 | 罗恩 | 德莱 | 166.9 | 3 |

    | 546 | 帕特 | 埃拉 | 167.1 | 3 |

    | 106 | 杰伊 | 沃克 | 167.1 | 3 |

    | 77 | 林恩 | 希德 | 167.1 | 4 |

    | 403 | 威尔 | 诺特 | 167.3 | 4 |

    | 314 | 杰克 | 波茨 | 167.4 | 4 |

    | … |


    在这个例子中，你会看到三位客户身高相同（`167.1`），但其中一位没能挤进前一个十分位数，所以被推到了下一个组。这更多是前面提到的不公平性，是由于 `ntile`
    的计算纯粹基于行号和值。


    例如，如果你要根据某些十分位数给客户颁奖或折扣，仅仅因为排序顺序不可预测而遗漏某人，这是不公平的。


    如果你依赖 `ntile`，这可能是一个决定性的障碍。不过，有一个解决方法。

    '
- fmt: "### A Workaround for `ntile`\n\nAs we noted, the `ntile` is based on the row\
    \ number. If, however, the `ntile` were based on the `rank()`, `count()`, or even\
    \ `dense_rank()`, then rows with the same value would end up in the same decile.\n\
    \nIn this case, we’ll generate twenty groups, called vigintiles. To do that, we’ll\
    \ have to calculate our own groupings. We begin with calculating the size of each\
    \ group:\n\n```sql\nSELECT count(*)/20.0 AS bin\nFROM customers WHERE height IS\
    \ NOT NULL\n```\n\nWe’ll call this value `bin`, which is a common statistical\
    \ name for groups.\n\nWe can put that into a CTE and run the following:\n\n```sql\n\
    --  PostgreSQL, MariaDB/MySQL, MSSQL, Oracle\nWITH data AS (\nSELECT count(*)/20.0\
    \ AS bin\nFROM customers WHERE height IS NOT NULL\n)\nSELECT\nid, givenname, familyname,\
    \ height,\nrow_number() OVER(ORDER BY height) AS row_number,\nntile(20) OVER(ORDER\
    \ BY height) AS vigintile,\nfloor((row_number() OVER(ORDER BY height)-1)/bin)+1\n\
    AS row_vitintile,\nfloor((rank() OVER(ORDER BY height)-1)/bin)+1\nAS rank_vigintile,\n\
    floor((count(*) OVER(ORDER BY height)-1)/bin)+1\nAS count_vigintile,\nbin\nFROM\
    \ customers, data\nWHERE height IS NOT NULL\nORDER BY height;\n```\n\nSQLite doesn’t\
    \ have a `floor()` function, but you can use `cast(... AS int)` instead:\n\n```sql\n\
    cast((row_number() OVER(ORDER BY height)-1)/bin AS int)+1\nAS row_vigintile,\n\
    cast((rank() OVER(ORDER BY height)-1)/bin AS int)+1\nAS rank_vigintile,\ncast((count(*)\
    \ OVER(ORDER BY height)-1)/bin AS int)+1\nAS count_vigintile,\n```\n\nYou’ll get\
    \ the following results:\n\n| id   | …    | height | rn   | vig  | row_vig | rank_vig\
    \ | count_vig | bin    |\n| :--- | :--- | :----- | :--- | :--- | :------ | :-------\
    \ | :-------- | :----- |\n| 597  | …    | 153    | 1    | 1    | 1       | 1 \
    \       | 1         | 13.35  |\n| 283  | …    | 153    | 2    | 1    | 1     \
    \  | 1        | 1         | 13.35  |\n| 451  | …    | 153.8  | 3    | 1    | 1\
    \       | 1        | 1         | 13.35  |\n| 194  | …    | 154.3  | 4    | 1 \
    \   | 1       | 1        | 1         | 13.35  |\n| 534  | …    | 156.4  | 5  \
    \  | 1    | 1       | 1        | 1         | 13.35  |\n| 352  | …    | 156.4 \
    \ | 6    | 1    | 1       | 1        | 1         | 13.35  |\n| ~ 267 rows ~ |\n\
    \nNote that the `vigintile` and `row_vigintile` values should be the same; the\
    \ `row_vigintile` is there to show how the vigintile was calculated from the row\
    \ number.\n\nMore importantly, you’ll see that the `rank_vigintile` and `count_vigintile`\
    \ columns are calculated from the `rank()` and `count(*)` values, and they always\
    \ put the rows with the same height in the same group. It’s up to you to decide\
    \ which is preferable.\n\n## Working with Previous and Next Rows\n\nWhile working\
    \ with an ordered result set, we can also get data from previous and next rows.\
    \ These results are called the `lag` and `lead`, respectively.\n\nThe general\
    \ syntax for the function is\n\n```sql\nlead(column,number) OVER (...)\nlag(column,number)\
    \ OVER (...)\n```\n\nHere, as well as the `OVER` clause, we need to supply two\
    \ values. The `column` value refers to which data in the other row you want. The\
    \ `number` value refers to how many rows back or forward to get it from. If you\
    \ want, you can leave it out, in which case it will default to 1.\n\nFor example,\
    \ suppose you want to look at sales for each day, as well as for the previous\
    \ and next days. You can write\n\n```sql\nSELECT\nordered_date, daily_total,\n\
    lag(daily_total) OVER (ORDER BY ordered_date)\nAS previous,\nlead(daily_total)\
    \ OVER (ORDER BY ordered_date)\nAS next\nFROM daily_sales\nORDER BY ordered_date;\n\
    ```\n\nYou’ll see:\n\n| ordered_date | daily_total | previous | next   |\n| :-----------\
    \ | :---------- | :------- | :----- |\n| 2022-05-04   | 43          | [NULL] \
    \  | 150.5  |\n| 2022-05-05   | 150.5       | 43       | 110.5  |\n| 2022-05-06\
    \   | 110.5       | 150.5    | 142    |\n| 2022-05-07   | 142         | 110.5\
    \    | 214.5  |\n| 2022-05-08   | 214.5       | 142      | 16.5   |\n| 2022-05-09\
    \   | 16.5        | 214.5    | 160    |\n| ~ 388 rows ~ |\n\nYou’ll notice that\
    \ the `previous` for the first row is `NULL`; so is the `next` for the last row.\n\
    \nYou might think that’s a bit pointless if you can just move your eyes to look\
    \ up or down a row. However, you can also incorporate the lag or lead in a calculation.\
    \ For example, suppose you want to compare sales for each day to a week before.\
    \ You could use\n\n```sql\nSELECT\nordered_date, daily_total,\nlag(daily_total,7)\
    \ OVER (ORDER BY ordered_date)\nAS last_week,\ndaily_total\n- lag(daily_total,7)\
    \ OVER (ORDER BY ordered_date)\nAS difference\nFROM daily_sales\nORDER BY ordered_date;\n\
    ```\n\nThis results in\n\n| ordered_date | daily_total | last_week | difference\
    \ |\n| :----------- | :---------- | :-------- | :--------- |\n| 2022-05-04   |\
    \ 43          | [NULL]    | [NULL]     |\n| 2022-05-05   | 150.5       | [NULL]\
    \    | [NULL]     |\n| 2022-05-06   | 110.5       | [NULL]    | [NULL]     |\n\
    | 2022-05-07   | 142         | [NULL]    | [NULL]     |\n| 2022-05-08   | 214.5\
    \       | [NULL]    | [NULL]     |\n| 2022-05-09   | 16.5        | [NULL]    |\
    \ [NULL]     |\n| 2022-05-10   | 160         | [NULL]    | [NULL]     |\n| 2022-05-11\
    \   | 115         | 43        | 72         |\n| 2022-05-12   | 205         | 150.5\
    \     | 54.5       |\n| 2022-05-13   | 164.5       | 110.5     | 54         |\n\
    | 2022-05-14   | 46.5        | 142       | -95.5      |\n| 2022-05-15   | 457.5\
    \       | 214.5     | 243        |\n| ~ 388 rows ~ |\n\nHere, the expression `lag(total,7)`\
    \ gets the value for seven rows before. As you’d expect, the first seven rows\
    \ have `NULL` for the value.\n\nThere are two important conditions if you want\
    \ to use `lag` or `lead` meaningfully:\n\n*   There must be only one row for each\
    \ instance you want to test. For example, you can’t have two rows with the same\
    \ date.\n*   There must be no gaps. For example, there can’t be a missing date.\n\
    \nThat’s because we’re interpreting each row as one day. If you’re just working\
    \ with a sequence or sales regardless of the date, it won’t matter.\n\nIf you\
    \ look carefully (and patiently) through the data, you will find that there are\
    \ a few missing dates. That means that the previous row isn’t always “yesterday,”\
    \ and the seven rows previous isn’t always “last week.” We’ll see how to plug\
    \ these gaps in Chapter 9.\n\n## Summary\n\nWindow functions are functions which\
    \ give a row-by-row value based on a “window” or a group of rows.\n\nWindow functions\
    \ include\n\n*   Aggregate functions\n    These include all of the major nonwindow\
    \ aggregate functions, such as `count()` and `sum()`.\n*   Ranking functions and\
    \ grouping\n    These include `row_number()`, `rank()`, and `dense_rank()` to\
    \ generate a position, as well as `ntile()` to generate ordered groups.\n*   Functions\
    \ which fetch data from other rows\n    These include `lag()` and `lead()`.\n\n\
    ### Window Clauses\n\nA window function features an `OVER()` clause:\n\n```sql\n\
    fn() OVER (...)\n```\n\nThe `OVER()` clause includes the following:\n\n*   `ORDER\
    \ BY` to define the row order of the data.\n*   `PARTITION BY` to define subgroups\
    \ of the data.\n*   A framing clause which determines whether the data is defined\
    \ by row number or by value. It also determines the start and end rows of the\
    \ window.\n\n## Coming Up\n\nIn Chapter 7, we’ve already discussed how Common\
    \ Table Expressions work. In fact, we’ve used them pretty extensively throughout\
    \ the book.\n\nIn the next chapter, we’ll have another look at CTEs and examine\
    \ some of their more sophisticated features. In particular, we’ll have a look\
    \ at the dreaded recursive CTE.\n\nFootnotes [1]\n\n# 9. More on Common Table\
    \ Expressions\n\nYou have already made use of CTEs to prepare data for use in\
    \ aggregates and other operations.\n\nHere, we will take a further look at some\
    \ of the more powerful features of CTEs."
  raw: "### A Workaround for ntile\n\nAs we noted, the `ntile` is based on the row\
    \ number. If, however, the `ntile` were based on the `rank()`, `count()`, or even\
    \ `dense_rank()`, then rows with the same value would end up in the same decile.\n\
    \nIn this case, we’ll generate twenty groups, called vigintiles. To do that, we’ll\
    \ have to calculate our own groupings. We begin with calculating the size of each\
    \ group:\n\n```\nSELECT count(*)/20.0 AS bin\nFROM customers WHERE height IS NOT\
    \ NULL\n```\n\nWe’ll call this value `bin`, which is a common statistical name\
    \ for groups.\n\nWe can put that into a CTE and run the following:\n\n```\n--\
    \  PostgreSQL, MariaDB/MySQL, MSSQL, Oracle\nWITH data AS (\nSELECT count(*)/20.0\
    \ AS bin\nFROM customers WHERE height IS NOT NULL\n)\nSELECT\nid, givenname, familyname,\
    \ height,\nrow_number() OVER(ORDER BY height) AS row_number,\nntile(20) OVER(ORDER\
    \ BY height) AS vigintile,\nfloor((row_number() OVER(ORDER BY height)-1)/bin)+1\n\
    AS row_vitintile,\nfloor((rank() OVER(ORDER BY height)-1)/bin)+1\nAS rank_vigintile,\n\
    floor((count(*) OVER(ORDER BY height)-1)/bin)+1\nAS count_vigintile,\nbin\nFROM\
    \ customers, data\nWHERE height IS NOT NULL\nORDER BY height;\n```\n\nSQLite doesn’t\
    \ have a `floor()` function, but you can use `cast(... AS int)` instead:\n\n```\n\
    cast((row_number() OVER(ORDER BY height)-1)/bin AS int)+1\nAS row_vigintile,\n\
    cast((rank() OVER(ORDER BY height)-1)/bin AS int)+1\nAS rank_vigintile,\ncast((count(*)\
    \ OVER(ORDER BY height)-1)/bin AS int)+1\nAS count_vigintile,\n```\n\nYou’ll get\
    \ the following results:\n\n| **id** | **…** | **height** | **rn** | **vig** |\
    \ **row_vig** | **rank_vig** | **count_vig** | **bin** |\n| --- | --- | --- |\
    \ --- | --- | --- | --- | --- | --- |\n| 597 | … | 153 | 1 | 1 | 1 | 1 | 1 | 13.35\
    \ |\n| 283 | … | 153 | 2 | 1 | 1 | 1 | 1 | 13.35 |\n| 451 | … | 153.8 | 3 | 1\
    \ | 1 | 1 | 1 | 13.35 |\n| 194 | … | 154.3 | 4 | 1 | 1 | 1 | 1 | 13.35 |\n| 534\
    \ | … | 156.4 | 5 | 1 | 1 | 1 | 1 | 13.35 |\n| 352 | … | 156.4 | 6 | 1 | 1 | 1\
    \ | 1 | 13.35 |\n| ~ 267 rows ~ |\n\nNote that the `vigintile` and `row_vigintile`\
    \ values should be the same; the `row_vigintile` is there to show how the vigintile\
    \ was calculated from the row number.\n\nMore importantly, you’ll see that the\
    \ `rank_vigintile` and `count_vigintile` columns are calculated from the `rank()`\
    \ and `count(*)` values, and they always put the rows with the same height in\
    \ the same group. It’s up to you to decide which is preferable.\n\n## Working\
    \ with Previous and Next Rows\n\nWhile working with an ordered result set, we\
    \ can also get data from previous and next rows. These results are called the\
    \ `lag` and `lead`, respectively.\n\nThe general syntax for the function is\n\n\
    ```\nlead(column,number) OVER (...)\nlag(column,number) OVER (...)\n```\n\nHere,\
    \ as well as the `OVER` clause, we need to supply two values. The `column` value\
    \ refers to which data in the other row you want. The `number` value refers to\
    \ how many rows back or forward to get it from. If you want, you can leave it\
    \ out, in which case it will default to 1.\n\nFor example, suppose you want to\
    \ look at sales for each day, as well as for the previous and next days. You can\
    \ write\n\n```\nSELECT\nordered_date, daily_total,\nlag(daily_total) OVER (ORDER\
    \ BY ordered_date)\nAS previous,\nlead(daily_total) OVER (ORDER BY ordered_date)\n\
    AS next\nFROM daily_sales\nORDER BY ordered_date;\n```\n\nYou’ll see:\n\n| **ordered_date**\
    \ | **daily_total** | **previous** | **next** |\n| --- | --- | --- | --- |\n|\
    \ 2022-05-04 | 43 | [NULL] | 150.5 |\n| 2022-05-05 | 150.5 | 43 | 110.5 |\n| 2022-05-06\
    \ | 110.5 | 150.5 | 142 |\n| 2022-05-07 | 142 | 110.5 | 214.5 |\n| 2022-05-08\
    \ | 214.5 | 142 | 16.5 |\n| 2022-05-09 | 16.5 | 214.5 | 160 |\n| ~ 388 rows ~\
    \ |\n\nYou’ll notice that the `previous` for the first row is `NULL`; so is the\
    \ `next` for the last row.\n\nYou might think that’s a bit pointless if you can\
    \ just move your eyes to look up or down a row. However, you can also incorporate\
    \ the lag or lead in a calculation. For example, suppose you want to compare sales\
    \ for each day to a week before. You could use\n\n```\nSELECT\nordered_date, daily_total,\n\
    lag(daily_total,7) OVER (ORDER BY ordered_date)\nAS last_week,\ndaily_total\n\
    - lag(daily_total,7) OVER (ORDER BY ordered_date)\nAS difference\nFROM daily_sales\n\
    ORDER BY ordered_date;\n```\n\nThis results in\n\n| **ordered_date** | **daily_total**\
    \ | **last_week** | **difference** |\n| --- | --- | --- | --- |\n| 2022-05-04\
    \ | 43 | [NULL] | [NULL] |\n| 2022-05-05 | 150.5 | [NULL] | [NULL] |\n| 2022-05-06\
    \ | 110.5 | [NULL] | [NULL] |\n| 2022-05-07 | 142 | [NULL] | [NULL] |\n| 2022-05-08\
    \ | 214.5 | [NULL] | [NULL] |\n| 2022-05-09 | 16.5 | [NULL] | [NULL] |\n| 2022-05-10\
    \ | 160 | [NULL] | [NULL] |\n| 2022-05-11 | 115 | 43 | 72 |\n| 2022-05-12 | 205\
    \ | 150.5 | 54.5 |\n| 2022-05-13 | 164.5 | 110.5 | 54 |\n| 2022-05-14 | 46.5 |\
    \ 142 | -95.5 |\n| 2022-05-15 | 457.5 | 214.5 | 243 |\n| ~ 388 rows ~ |\n\nHere,\
    \ the expression `lag(total,7)` gets the value for seven rows before. As you’d\
    \ expect, the first seven rows have `NULL` for the value.\n\nThere are two important\
    \ conditions if you want to use `lag` or `lead` meaningfully:\n\n*   There must\
    \ be only one row for each instance you want to test. For example, you can’t have\
    \ two rows with the same date.\n\n*   There must be no gaps. For example, there\
    \ can’t be a missing date.\n\nThat’s because we’re interpreting each row as one\
    \ day. If you’re just working with a sequence or sales regardless of the date,\
    \ it won’t matter.\n\nIf you look carefully (and patiently) through the data,\
    \ you will find that there are a few missing dates. That means that the previous\
    \ row isn’t always “yesterday,” and the seven rows previous isn’t always “last\
    \ week.” We’ll see how to plug these gaps in Chapter [9](#606708_1_En_9_Chapter.xhtml).\n\
    \n## Summary\n\nWindow functions are functions which give a row-by-row value based\
    \ on a “window” or a group of rows.\n\nWindow functions include\n\n*   Aggregate\
    \ functions\n\n    These include all of the major nonwindow aggregate functions,\
    \ such as `count()` and `sum()`.\n\n*   Ranking functions and grouping\n\n   \
    \ These include `row_number()`, `rank()`, and `dense_rank()` to generate a position,\
    \ as well as `ntile()` to generate ordered groups.\n\n*   Functions which fetch\
    \ data from other rows\n\n    These include `lag()` and `lead()`.\n\n### Window\
    \ Clauses\n\nA window function features an `OVER()` clause:\n\n```\nfn() OVER\
    \ (...)\n```\n\nThe `OVER()` clause includes the following:\n\n*   `ORDER BY`\
    \ to define the row order of the data.\n\n*   `PARTITION BY` to define subgroups\
    \ of the data.\n\n*   A framing clause which determines whether the data is defined\
    \ by row number or by value. It also determines the start and end rows of the\
    \ window.\n\n## Coming Up\n\nIn Chapter [7](#606708_1_En_7_Chapter.xhtml), we’ve\
    \ already discussed how Common Table Expressions work. In fact, we’ve used them\
    \ pretty extensively throughout the book.\n\nIn the next chapter, we’ll have another\
    \ look at CTEs and examine some of their more sophisticated features. In particular,\
    \ we’ll have a look at the dreaded recursive CTE.\n\nFootnotes [1](#606708_1_En_8_Chapter.xhtml#Fn1_source)\n\
    \n# 9. More on Common Table Expressions\n\nYou have already made use of CTEs to\
    \ prepare data for use in aggregates and other operations.\n\nHere, we will take\
    \ a further look at some of the more powerful features of CTEs."
  trans: "\n### 针对 `ntile` 的一个变通方案\n\n正如我们提到的，`ntile` 是基于行号的。然而，如果 `ntile` 能基于 `rank()`、`count()`\
    \ 甚至是 `dense_rank()`，那么具有相同值的行最终就会被分到同一个十分位组中。\n\n在这种情况下，我们将生成二十个组，称为二十分位组。为此，我们必须计算自己的分组。我们从计算每个组的大小开始：\n\
    \n```sql\nSELECT count(*)/20.0 AS bin\nFROM customers WHERE height IS NOT NULL\n\
    ```\n\n我们将这个值称为 `bin`，这是统计学中对分组的常见命名。\n\n我们可以把它放到一个 CTE（公共表表达式）中，然后运行以下查询：\n\n\
    ```sql\n--  PostgreSQL, MariaDB/MySQL, MSSQL, Oracle\nWITH data AS (\nSELECT count(*)/20.0\
    \ AS bin\nFROM customers WHERE height IS NOT NULL\n)\nSELECT\nid, givenname, familyname,\
    \ height,\nrow_number() OVER(ORDER BY height) AS row_number,\nntile(20) OVER(ORDER\
    \ BY height) AS vigintile,\nfloor((row_number() OVER(ORDER BY height)-1)/bin)+1\n\
    AS row_vitintile,\nfloor((rank() OVER(ORDER BY height)-1)/bin)+1\nAS rank_vigintile,\n\
    floor((count(*) OVER(ORDER BY height)-1)/bin)+1\nAS count_vigintile,\nbin\nFROM\
    \ customers, data\nWHERE height IS NOT NULL\nORDER BY height;\n```\n\nSQLite 没有\
    \ `floor()` 函数，但你可以使用 `cast(... AS int)` 作为替代：\n\n```sql\ncast((row_number() OVER(ORDER\
    \ BY height)-1)/bin AS int)+1\nAS row_vigintile,\ncast((rank() OVER(ORDER BY height)-1)/bin\
    \ AS int)+1\nAS rank_vigintile,\ncast((count(*) OVER(ORDER BY height)-1)/bin AS\
    \ int)+1\nAS count_vigintile,\n```\n\n你将得到以下结果：\n\n| id   | …    | height | rn\
    \   | vig  | row_vig | rank_vig | count_vig | bin    |\n| :--- | :--- | :-----\
    \ | :--- | :--- | :------ | :------- | :-------- | :----- |\n| 597  | …    | 153\
    \    | 1    | 1    | 1       | 1        | 1         | 13.35  |\n| 283  | …   \
    \ | 153    | 2    | 1    | 1       | 1        | 1         | 13.35  |\n| 451  |\
    \ …    | 153.8  | 3    | 1    | 1       | 1        | 1         | 13.35  |\n| 194\
    \  | …    | 154.3  | 4    | 1    | 1       | 1        | 1         | 13.35  |\n\
    | 534  | …    | 156.4  | 5    | 1    | 1       | 1        | 1         | 13.35\
    \  |\n| 352  | …    | 156.4  | 6    | 1    | 1       | 1        | 1         |\
    \ 13.35  |\n| ~ 共 267 行 ~ |\n\n注意，`vigintile` 和 `row_vigintile` 的值应该是相同的；`row_vigintile`\
    \ 用于展示二十分位组是如何从行号计算出来的。\n\n更重要的是，你会看到 `rank_vigintile` 和 `count_vigintile` 列是根据\
    \ `rank()` 和 `count(*)` 值计算的，它们总是将具有相同身高的行放在同一个组中。选择哪种方式取决于你。\n\n## 处理前后行数据\n\n\
    在处理有序结果集的同时，我们也可以获取前一行和后一行的数据。这些结果分别称为 `lag`（滞后）和 `lead`（超前）。\n\n该函数的通用语法是：\n\n\
    ```sql\nlead(column,number) OVER (...)\nlag(column,number) OVER (...)\n```\n\n\
    在这里，除了 `OVER` 子句，我们还需要提供两个值。`column` 值指的是你想要获取的另一行中的哪一列数据。`number` 值指的是要向后或向前获取多少行。如果需要，你可以省略它，这种情况下它将默认为\
    \ 1。\n\n例如，假设你想查看每天的销售额，以及前一天和后一天的销售额。你可以这样写：\n\n```sql\nSELECT\nordered_date,\
    \ daily_total,\nlag(daily_total) OVER (ORDER BY ordered_date)\nAS previous,\n\
    lead(daily_total) OVER (ORDER BY ordered_date)\nAS next\nFROM daily_sales\nORDER\
    \ BY ordered_date;\n```\n\n你会看到：\n\n| ordered_date | daily_total | previous |\
    \ next   |\n| :----------- | :---------- | :------- | :----- |\n| 2022-05-04 \
    \  | 43          | [NULL]   | 150.5  |\n| 2022-05-05   | 150.5       | 43    \
    \   | 110.5  |\n| 2022-05-06   | 110.5       | 150.5    | 142    |\n| 2022-05-07\
    \   | 142         | 110.5    | 214.5  |\n| 2022-05-08   | 214.5       | 142  \
    \    | 16.5   |\n| 2022-05-09   | 16.5        | 214.5    | 160    |\n| ~ 共 388\
    \ 行 ~ |\n\n你会注意到，第一行的 `previous` 是 `NULL`；最后一行的 `next` 也是 `NULL`。\n\n你可能会认为这有点没意义，因为你只需移动视线就能查看上一行或下一行。然而，你也可以将滞后或超前函数纳入计算中。例如，假设你想将每天的销售额与一周前进行比较。你可以使用：\n\
    \n```sql\nSELECT\nordered_date, daily_total,\nlag(daily_total,7) OVER (ORDER BY\
    \ ordered_date)\nAS last_week,\ndaily_total\n- lag(daily_total,7) OVER (ORDER\
    \ BY ordered_date)\nAS difference\nFROM daily_sales\nORDER BY ordered_date;\n\
    ```\n\n结果是：\n\n| ordered_date | daily_total | last_week | difference |\n| :-----------\
    \ | :---------- | :-------- | :--------- |\n| 2022-05-04   | 43          | [NULL]\
    \    | [NULL]     |\n| 2022-05-05   | 150.5       | [NULL]    | [NULL]     |\n\
    | 2022-05-06   | 110.5       | [NULL]    | [NULL]     |\n| 2022-05-07   | 142\
    \         | [NULL]    | [NULL]     |\n| 2022-05-08   | 214.5       | [NULL]  \
    \  | [NULL]     |\n| 2022-05-09   | 16.5        | [NULL]    | [NULL]     |\n|\
    \ 2022-05-10   | 160         | [NULL]    | [NULL]     |\n| 2022-05-11   | 115\
    \         | 43        | 72         |\n| 2022-05-12   | 205         | 150.5   \
    \  | 54.5       |\n| 2022-05-13   | 164.5       | 110.5     | 54         |\n|\
    \ 2022-05-14   | 46.5        | 142       | -95.5      |\n| 2022-05-15   | 457.5\
    \       | 214.5     | 243        |\n| ~ 共 388 行 ~ |\n\n在这里，表达式 `lag(total,7)`\
    \ 获取的是前 7 行的值。正如你所料，前 7 行的值为 `NULL`。\n\n要有效且有意义地使用 `lag` 或 `lead`，有两个重要条件：\n\n\
    *   对于每个你想测试的实例，必须只有一行数据。例如，你不能有两行具有相同的日期。\n*   数据不能有间隔（缺失）。例如，不能有缺失的日期。\n\n这是因为我们将每一行解释为一天。如果你只是处理一个序列或销售数据而不考虑日期，这就无关紧要了。\n\
    \n如果你仔细（且耐心地）浏览数据，会发现有几个缺失的日期。这意味着前一行并不总是“昨天”，前 7 行也不总是“上周”。我们将在第 9 章中看到如何填补这些间隔。\n\
    \n## 总结\n\n窗口函数是基于一个“窗口”或一组行，逐行计算出值的函数。\n\n窗口函数包括：\n\n*   聚合函数\n    包括所有主要的非窗口聚合函数，如\
    \ `count()` 和 `sum()`。\n*   排名函数和分组\n    包括 `row_number()`、`rank()` 和 `dense_rank()`\
    \ 用于生成位置，以及 `ntile()` 用于生成有序分组。\n*   从其他行获取数据的函数\n    包括 `lag()` 和 `lead()`。\n\
    \n### 窗口子句\n\n窗口函数具有一个 `OVER()` 子句：\n\n```sql\nfn() OVER (...)\n```\n\n`OVER()`\
    \ 子句包含以下内容：\n\n*   `ORDER BY`：用于定义数据的行顺序。\n*   `PARTITION BY`：用于定义数据的子组。\n*  \
    \ 一个帧子句：用于确定数据是按行号还是按值定义。它还决定了窗口的起始行和结束行。\n\n## 后续内容\n\n在第 7 章，我们已经讨论了公共表表达式的工作原理。事实上，我们在本书中已经相当广泛地使用了它们。\n\
    \n在下一章，我们将再次审视 CTE，并研究它们一些更复杂的功能。特别是，我们将看看令人头疼的递归 CTE。\n\n脚注 [1]\n\n# 9. 关于公共表表达式的更多内容\n\
    \n你已经利用 CTEs 为聚合和其他操作准备了数据。\n\n在这里，我们将进一步探讨 CTEs 一些更强大的功能。\n"
- fmt: '## CTEs As Variables


    In Chapter [4](#606708_1_En_4_Chapter.xhtml), we tested some calculations with
    a test value:


    ```sql

    WITH vars AS (

    SELECT '' abcdefghijklmnop '' AS string

    --  FROM dual   --  Oracle

    )

    SELECT

    string,

    --  sample string functions

    FROM vars;

    ```


    Later in this chapter, we’ll see a more sophisticated version of this technique
    when we look at table literals. For now, let’s look at how we can use this.


    Some DBMSs as well as all programming languages have a concept of `variables`.
    A variable is a temporary named value. Where the DBMS supports it, you declare
    a variable name and assign a value which you use in a subsequent step. For example,
    in MSSQL, you can write this:


    ```sql

    --  MSSQL

    DECLARE @taxrate decimal(4,2);

    SET @taxrate = 12.5;

    SELECT

    id, title,

    price, price/@taxrate/100 AS tax

    FROM books;

    ```


    To run this, you would need to highlight all of the statements and run in one
    go.


    This chapter won’t focus on these variables, but you’ll see more on using variables
    in Chapter [10](#606708_1_En_10_Chapter.xhtml). Instead, we’ll have a look at
    using a common table expression to do a similar job.


    Strictly speaking, what we’re going to use is not variables but `constants`, which
    means that we will set their value once only. However, we can get away with using
    the looser term "variable," as it’s more generic.


    There are two main benefits to defining variables:


    *   You can specify an arbitrary value once, but use it multiple times.

    *   You move arbitrary values to a preparation section.


    In the preceding CTE example, where we’re not working with real data, we simply
    selected from the CTE itself. In more realist examples, we will cross join the
    CTE with other tables.


    ### Setting Hard-Coded Constants


    One simple use for CTE variables is to set an arbitrary value to be used in the
    main query. For example, suppose we want to generate a simple price list with
    an arbitrary tax rate.


    We can begin with a CTE to contain the tax rate:


    ```sql

    WITH vars AS (

    SELECT 0.1 AS taxrate

    --  FROM dual   --  Oracle

    )

    ```


    We can now combine the CTE with the `books` table, using a simple cross join:


    ```sql

    WITH vars AS (

    SELECT 0.1 AS taxrate

    --  FROM dual   --  Oracle

    )

    SELECT * FROM books, vars;

    ```


    This looks like the following:


    | **id** | **authorid** | **Truncate** | **published** | **price** | **taxrate**
    |

    | --- | --- | --- | --- | --- | --- |

    | 2078 | 765 | The Duel | 1811 | 12.5 | 0.1 |

    | 503 | 128 | Uncle Silas | 1864 | 17 | 0.1 |

    | 2007 | 99 | North and South | 1854 | 17.5 | 0.1 |

    | 702 | 547 | Jane Eyre | 1847 | 17.5 | 0.1 |

    | 1530 | 28 | Robin Hood, The ... | 1862 | 12.5 | 0.1 |

    | 1759 | 17 | La Curée | 1872 | 16 | 0.1 |

    | ~ 1201 rows ~ |


    A cross join combines every row from one table to every row from another. Since
    the `vars` CTE only has one row, the cross join simply has the effect of adding
    another column to the `books` table.


    SQL has a more modern syntax for a cross join: `books CROSS JOIN vars`. Here,
    we’ll use the older syntax because it’s simpler and more readable.


    We can now calculate the price list with tax:


    ```sql

    WITH vars AS (SELECT 0.1 AS taxrate)

    SELECT

    id, title,

    price, price*taxrate AS tax, price*(1+taxrate) AS total

    FROM books, vars;

    ```


    This gives us


    | **Id** | **Title** | **price** | **tax** | **total** |

    | --- | --- | --- | --- | --- |

    | 2078 | The Duel | 12.5 | 1.25 | 13.75 |

    | 503 | Uncle Silas | 17 | 1.7 | 18.7 |

    | 2007 | North and South | 17.5 | 1.75 | 19.25 |

    | 702 | Jane Eyre | 17.5 | 1.75 | 19.25 |

    | 1530 | Robin Hood, The Prince of Thieves | 12.5 | 1.25 | 13.75 |

    | 1759 | La Curée | 16 | 1.6 | 17.6 |

    | ~ 1201 rows ~ |


    Of course, we could just as readily have used `0.1` instead of the `taxrate` and
    dispensed with the CTE and the cross join. However, the CTE has the benefit of
    allowing us to set the tax rate once at the beginning, where it’s easy to maintain
    and can be used multiple times later.


    ### Deriving Constants


    The values don’t need to be literal values. You can also derive the values from
    another query. For example, to get the oldest and youngest customers, first set
    the minimum and maximum dates in variables:


    ```sql

    --  vars CTE

    SELECT min(dob) AS oldest, max(dob) AS youngest

    FROM customers

    ```


    You can then cross join that with the `customers` table to get the matching customers:


    ```sql

    WITH vars AS (

    SELECT min(dob) AS oldest, max(dob) AS youngest

    FROM customers

    )

    SELECT *

    FROM customers, vars

    WHERE dob IN(oldest, youngest);

    ```


    You should see something like this:


    | **id** | **givenname** | **familyname** | **...** | **dob** | **...** |

    | --- | --- | --- | --- | --- | --- |

    | 92 | Nan | Keen | ... | 1943-05-18 | ... |

    | 228 | Cam | Payne | ... | 2003-01-27 | ... |

    | 577 | Sybil | Service | ... | 2003-01-27 | ... |

    | 392 | Daisy | Chain | ... | 1943-05-18 | ... |


    To get the shorter customers, you can set the average height in a variable:


    ```sql

    WITH vars AS (SELECT avg(height) AS average FROM customers)

    SELECT *

    FROM customers, vars

    WHERE height<average;

    ```


    This is the sort of thing you can’t do otherwise, because the average is an aggregate.


    ## Using Aggregates in the CTE


    As we’ve seen many times, you can’t mix aggregates with non-aggregate queries.
    The solution is always to calculate any aggregates you need separately and then
    incorporate the results in the next query.


    ### Finding the Most Recent Sales per Customer


    Suppose, for example, you want to get details about the most recent sale for each
    customer. To get the most recent sale, you first need a simple aggregate query:


    ```sql

    SELECT customerid, max(ordered) AS last_order

    FROM sales

    GROUP BY customerid;

    ```


    You’ll get something like this:


    | **Customerid** | **last_order** |

    | --- | --- |

    | 550 | 2023-04-18 09:18:51.933845 |

    | 272 | 2023-04-28 09:15:17.85286 |

    | 70 | 2023-04-19 14:00:44.880376 |

    | 190 | 2023-04-09 10:12:53.416293 |

    | 539 | 2023-04-22 16:14:16.173923 |

    | 314 | 2023-04-11 03:33:57.825786 |

    | ~ 269 rows ~ |


    Here, we have two important pieces of data: the customer id and the date and time
    of the most recent order. Using this in a subquery, we can join the results with
    the `customers` and `sales` tables to get more details:


    ```sql

    WITH cte(customerid, last_order) AS (

    SELECT customerid, max(ordered) AS last_order

    FROM sales

    GROUP BY customerid

    )

    SELECT

    customers.id AS customerid,

    customers.givenname, customers.familyname,

    sales.id AS saleid,

    sales.ordered_date, sales.total

    FROM

    sales

    JOIN cte ON sales.customerid=cte.customerid

    AND sales.ordered=cte.last_order

    JOIN customers ON customers.id=cte.customerid

    ;

    ```


    We’ll get something like this:


    | **customer** | **Givenname** | **familyname** | **sale** | **ordered_date**
    | **total** |

    | --- | --- | --- | --- | --- | --- |

    | 287 | Judy | Free | 4209 | 2023-02-04 | 50.5 |

    | 26 | Bess | Twishes | 4542 | 2023-02-19 | 11 |

    | 368 | Sharon | Sharalike | 4793 | 2023-03-01 | 56 |

    | 282 | Howard | Youknow | 4939 | 2023-03-07 | 39 |

    | 395 | Holly | Day | 4953 | 2023-03-07 | 75.5 |

    | 474 | Alf | Abet | 5092 | 2023-03-13 | 94 |

    | ~ 266 rows ~ |


    Note that the CTE was used to join the two tables and act as a filter. We don’t
    actually need its results in the output.'
