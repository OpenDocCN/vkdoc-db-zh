- fmt: "# Adding the Sale Items and Getting the Prices\n\nArmed with the new sale\
    \ id, the rest is simple. To add the sale items, we can use\n\n```\n--  Not Oracle\n\
    INSERT INTO saleitems(saleid, bookid, quantity)\nVALUES\n( ... , 123, 3),\n( ...\
    \ , 456, 1),\n( ... , 789, 2);\n--  Oracle\nINSERT INTO saleitems(saleid, bookid,\
    \ quantity)\nVALUES ( ... , 123, 3);\nINSERT INTO saleitems(saleid, bookid, quantity)\n\
    VALUES ( ... , 456, 1);\nINSERT INTO saleitems(saleid, bookid, quantity)\nVALUES\
    \ ( ... , 789, 2);\n```\n\nRemember to use your new sale `id` in the preceding\
    \ statements.\n\nAlso, remember that Oracle doesn’t like multiple values in a\
    \ single `INSERT` statement, which is why there are multiple statements. You can\
    \ use that for the other DBMSs if you prefer, but it’s not necessary.\n\nThe prices\
    \ come from another table. You can fetch those prices into the new sale items\
    \ using a subquery:\n\n```\nUPDATE saleitems\nSET price=(SELECT price FROM books\
    \ WHERE\nbooks.id=saleitems.bookid)\nWHERE saleid = ... ;\n```\n\nThe correlated\
    \ subquery fetches the price from the `saleitems` table for the matching book\
    \ (`WHERE books.id=saleitems.bookid`).\n\nThe `WHERE` clause in the main query\
    \ ensures that only the new sale items get the prices. This is important because\
    \ you don’t want to copy the prices into the old sale items: there might have\
    \ been a price change since the older sales were completed, and you shouldn’t\
    \ let that change affect old transactions.\n\n# Completing the Sale\n\nFinally,\
    \ you should find the total for the sale items and put that into the new sale.\n\
    \nTo get the total for the sale items, you can use an aggregate query:\n\n```\n\
    SELECT sum(quantity*price)\nFROM saleitems\nWHERE saleid = ... ;\n```\n\nThe result\
    \ would be correct, but it would also be incomplete. What’s missing is the tax\
    \ and any VIP discount applicable.\n\nLet’s assume a tax of 10%—it varies from\
    \ country to country, of course, so you might want to make an adjustment. That\
    \ means you’ll end up paying (1 + 10%) times the total:\n\n```\nSELECT sum(quantity*price)\
    \ * (1 + 0.10)\nFROM saleitems\nWHERE saleid = ... ;\n```\n\nIn real life, of\
    \ course, you would simply write `1.1`, but the preceding expression is a reminder\
    \ of where the value came from and how you might adapt it for different tax rates.\n\
    \nThe VIP discount depends on the customer. You can read that from the VIP table:\n\
    \n```\nSELECT 1 - discount FROM vip WHERE id = 42 ;\n```\n\nThe reason you subtract\
    \ it from `1` is that it’s a discount: it comes off the full price.\n\nYou can\
    \ use that in a subquery with the calculated total:\n\n```\nSELECT\nsum(quantity*price)\n\
    * (1 + 0.1)\n* (SELECT  1 - discount FROM vip WHERE id = 42)\nFROM saleitems\n\
    WHERE saleid = ... ;\n```\n\nexcept not necessarily. Some customers aren’t VIPs,\
    \ so the subquery might return a `NULL`. That would destroy the whole calculation.\
    \ Since a missing VIP value means no discount, we should coalesce the subquery\
    \ to `1`:\n\n```\nSELECT\nsum(quantity*price)\n* (1 + 0.1)\n* coalesce((SELECT\
    \  1 - discount FROM vip\nWHERE id = 42),1)\nFROM saleitems\nWHERE saleid = ...\
    \ ;\n```\n\nFinally, we can put this value into the `sales` table:\n\n```\nUPDATE\
    \ sales\nSET total = (\nSELECT\nsum(quantity*price)\n* (1 + 0.1)\n* coalesce((SELECT\
    \  1 - discount FROM vip\nWHERE id = 42),1)\nFROM saleitems\nWHERE saleid = ...\n\
    )\nWHERE id = ... ;\n```\n\nThere’s a lot going on here. First, the `UPDATE` query\
    \ sets a value to a subquery, which, in turn, uses a subquery to fetch a value.\
    \ You’ll also find that the query uses the sale `id` twice, once to filter the\
    \ sale items and once to select the sale.\n\n# Review\n\nA main feature of SQL\
    \ databases is that there are multiple tables and that these tables are related\
    \ to each other.\n\nRelationships are generally established through primary keys\
    \ and foreign keys which reference the primary keys in related tables. The foreign\
    \ key is normally in the form of a constraint, which guarantees that the foreign\
    \ key references a valid primary key value in the other table, if not necessarily\
    \ the correct one.\n\nThere may also be `ad hoc` relationships which are not planned\
    \ or enforced.\n\n## Types of Relationships\n\nThere are three main relationship\
    \ types:\n\n*   `One-to-many` relationships are between a foreign key in one table,\
    \ often called a `child` table, and a primary key in another, the `parent`. Generally,\
    \ one parent can have many children.\n\n    This is the most common type of relationship.\n\
    \n*   `One-to-one` relationships are between primary keys in both tables. The\
    \ primary key in one table doubles up as a foreign key in the other.\n\n    A\
    \ true one-to-one relationship requires both primary keys to be foreign keys to\
    \ the other table. In practice, this is difficult to implement, and the foreign\
    \ key is normally on one table only. This may informally be called a `one-to-maybe`\
    \ relationship.\n\n*   `Many-to-many` relationships allow a row in one table to\
    \ relate to many rows in the other, as well as the other way around. Since columns\
    \ can only have single values, this relationship is created through another table,\
    \ often called an `associative` table, with a pair of one-to-one relationships.\n\
    \n    In any reasonably sized database, the fact that there are many tables in\
    \ one-to-many relationships results in many-to-many relationships.\n\nIt’s a basic\
    \ principle in a database that a column shouldn’t have multiple values and that\
    \ you shouldn’t have multiple columns doing the same job. The way to handle multiple\
    \ values is with additional tables, either in one-to-many or many-to-many relationships.\n\
    \n## Joining Tables\n\nWhen there is an established relationship between tables,\
    \ you can combine their contents using joins.\n\nSometimes, you may want to count\
    \ the number of expected results to check whether your join type matches what\
    \ you want.\n\nWhen you do join tables, you often end up with several rows with\
    \ the same repeated data coming from the parent table. You may be able to simplify\
    \ this by grouping on parent data and aggregating on the child data. Because you\
    \ can only select what you summarise, you may need to join the results again to\
    \ get more details.\n\n## Views\n\nSelecting what you want from multiple related\
    \ tables can be inconvenient. You can save your complex joined query in a view\
    \ for future use and use it as you might a simple table afterward.\n\n## Inserting\
    \ into Related Tables\n\nOften, inserting into a table is not so simple. In some\
    \ cases, if it’s a child table, you may need to also insert into the parent table\
    \ so that the child can reference it.\n\nIn other cases, such as when the parent\
    \ table is used as a container for child data, you may need to insert into multiple\
    \ tables in a number of steps.\n\nThis process can be complicated if the primary\
    \ key is autogenerated.\n\n# Summary\n\nIn this chapter, we looked at how multiple\
    \ tables are related through foreign keys matching with primary keys. We also\
    \ looked at different types of relationships and why tables were designed this\
    \ way.\n\nUsing this, we were able to combine tables using one or more joins to\
    \ match rows from one table to another. We looked at different types of joins\
    \ and when you might choose between them.\n\n# Coming Up\n\nMost of the data we’ve\
    \ worked with have been simple values, though in a few cases we calculated values\
    \ such as tax and discounts.\n\nIn the next chapter, we’re going to take a small\
    \ detour and concentrate on performing calculations in SQL."
