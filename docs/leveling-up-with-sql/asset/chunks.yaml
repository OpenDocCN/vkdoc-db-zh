- fmt: "### Basic Ranking Functions\n\nThere are four main ranking functions:\n\n\
    *   `row_number()`: Calculate the current row number in the current partition\
    \ in the specified order.\n\n    If two values in the `ORDER BY` clause are the\
    \ same, they will still get a different row number; there is no guarantee which\
    \ one comes first.\n\n*   `rank()`: Give the rank within the result set.\n\n \
    \   If two values in the `ORDER BY` clause are the same, they will get the same\
    \ rank. The next different value will not get the next rank; it will catch up\
    \ with the row number above.\n\n*   `count(*)`: If you leave the framing clause\
    \ out and let it default to `RANGE`, it will behave like `rank()` with one difference.\
    \ We’ll look at the difference later.\n\n*   `dense_rank()`: This will also give\
    \ a rank, similar to `rank()` earlier. However, the next different value will\
    \ get the next rank, so this will gradually fall behind the row number.\n\nIf\
    \ the partition isn’t specified (there is no `PARTITION BY` clause), then the\
    \ preceding functions apply to the whole table. Otherwise, they will give the\
    \ position within the group.\n\nThe difference between `rank()` and `dense_rank()`\
    \ is that for equal values, `rank()` will pick up from the next `row_number()`,\
    \ while `dense_rank()` won’t.\n\nIf the `ORDER BY` value is not unique\n\n*  \
    \ `row_number()` is arbitrary.\n\n*   `rank()` gives the rank at the *beginning*\
    \ of the group.\n\n*   `count(*)` gives the rank at the *end* of the group.\n\n\
    *   `dense_rank()` gives the rank of the group.\n\nIf the `ORDER BY` value is\
    \ unique, these all give the same results.\n\nWe can test this with customer heights,\
    \ where we know some heights are repeated:\n\n```sql\nSELECT\nid, givenname, familyname,\n\
    height,\nrow_number() OVER (ORDER BY height) AS row_number,\ncount(*) OVER (ORDER\
    \ BY height) AS count,\nrank() OVER (ORDER BY height) AS rank,\ndense_rank() OVER\
    \ (ORDER BY height) AS dense_rank\nFROM customers\nWHERE height IS NOT NULL\n\
    ORDER BY height;\n```\n\nYou’ll get something like this:\n\n| `id` | `…` | `height`\
    \ | `row_number` | `count` | `rank` | `dense_rank` |\n| --- | --- | --- | ---\
    \ | --- | --- | --- |\n| 597 | … | 153 | 1 | 2 | 1 | 1 |\n| 283 | … | 153 | 2\
    \ | 2 | 1 | 1 |\n| 451 | … | 153.8 | 3 | 3 | 3 | 2 |\n| 194 | … | 154.3 | 4 |\
    \ 4 | 4 | 3 |\n| 534 | … | 156.4 | 5 | 6 | 5 | 4 |\n| 352 | … | 156.4 | 6 | 6\
    \ | 5 | 4 |\n| ~ 267 rows ~ |\n\nYour actual results may, of course, be different.\
    \ However, in the preceding example, we can see\n\n*   The `row_number()` is distinct,\
    \ regardless of the actual value.\n\n*   The `rank()` is the same for equal values.\
    \ The *next* value matches the `row_number()`.\n\n*   The `count(*)` is also the\
    \ same for equal values. The *next* value also matches the `row_number()`.\n\n\
    *   The `rank()` is the same as the *first* `row_number()` for equal values; the\
    \ `count(*)` is the same as the *last* `row_number()` for equal values.\n\n* \
    \  The `dense_rank()` is also the same for equal values. The *next* value gets\
    \ the next rank. By the time you get to the end of the result set, it will be\
    \ very different to the row number.\n\nWith most DBMSs, the ranking functions\
    \ all require an `ORDER BY` window clause. That makes sense, since ranking is\
    \ meaningless without order.\n\nThe exceptions include PostgreSQL and SQLite,\
    \ which will allow an empty window clause:\n\n```sql\n--  PostgreSQL, SQLite\n\
    SELECT\nid, givenname, familyname,\nheight,\nrow_number() OVER () AS row_number,\n\
    count(*) OVER () AS count,\nrank() OVER () AS rank,\ndense_rank() OVER () AS dense_rank\n\
    FROM customers\nWHERE height IS NOT NULL\nORDER BY height;\n```\n\nHowever, the\
    \ results are meaningless. The `count(*)`, `rank()`, and `dense_rank()` expressions\
    \ all give one value for the whole result set, and the `row_number()` gives row\
    \ numbers in an arbitrary order.\n\n### Ranking with PARTITION BY\n\nBy default,\
    \ ranking functions such as `row_number()` rank over the entire result set. You\
    \ can also rank over groups using `PARTITION BY`:\n\n```sql\nSELECT\nid, ordered_date,\
    \ total,\nrow_number() OVER (PARTITION BY ordered_date) AS row_number\nFROM sales\n\
    ORDER BY ordered;\n```\n\nThe results will be something like this:\n\n| `id` |\
    \ `ordered_date` | `total` | `row_number` |\n| --- | --- | --- | --- |\n| 1 |\
    \ 2022-05-04 | 43 | 1 |\n| 2 | 2022-05-05 | 54.5 | 1 |\n| 3 | 2022-05-05 | 96\
    \ | 2 |\n| 6 | 2022-05-06 | 18 | 2 |\n| 7 | 2022-05-06 | 92.5 | 1 |\n| 4 | 2022-05-07\
    \ | 17.5 | 1 |\n| ~ 5295 rows ~ |\n\nThe row numbers may not be in the expected\
    \ order, since the order wasn’t specified. To finish the job, we should also include\
    \ that:\n\n```sql\nSELECT\nid, ordered_date, total,\nrow_number() OVER (\nPARTITION\
    \ BY ordered_date ORDER BY ordered\n) AS row_number\nFROM sales\nORDER BY ordered;\n\
    ```\n\nThe row number is now in the order we would have expected:\n\n| `id` |\
    \ `ordered_date` | `total` | `row_number` |\n| --- | --- | --- | --- |\n| 1 |\
    \ 2022-05-04 | 43 | 1 |\n| 2 | 2022-05-05 | 54.5 | 1 |\n| 3 | 2022-05-05 | 96\
    \ | 2 |\n| 6 | 2022-05-06 | 18 | 1 |\n| 7 | 2022-05-06 | 92.5 | 2 |\n| 4 | 2022-05-07\
    \ | 17.5 | 1 |\n| ~ 5295 rows ~ |\n\nYou can use the group row number in a creative\
    \ way. For example, you might want to show the date for only the first sale for\
    \ the day. You can show the date selectively using a `CASE ... END` expression:\n\
    \n```sql\nCASE\nWHEN row_number() OVER\n(PARTITION BY ordered_date ORDER BY ordered)=1\n\
    THEN CAST(ordered_date AS varchar(16))\nELSE ''\nEND AS ordered_date,\n```\n\n\
    Rearrange and rename a few columns, and you’ll get\n\n```sql\nSELECT\nid,\nCASE\n\
    WHEN row_number() OVER\n(PARTITION BY ordered_date ORDER BY ordered)=1\nTHEN CAST(ordered_date\
    \ AS varchar(16))\nELSE ''\nEND AS ordered_date,\nrow_number() OVER (PARTITION\
    \ BY ordered_date) AS item,\ntotal\nFROM sales\nORDER BY ordered;\n```\n\nwhich\
    \ gives you a simpler looking result:\n\n| `id` | `ordered_date` | `item` | `Total`\
    \ |\n| --- | --- | --- | --- |\n| 1 | 2022-05-04 | 1 | 43 |\n| 2 | 2022-05-05\
    \ | 1 | 54.5 |\n| 3 | | 2 | 96 |\n| 6 | 2022-05-06 | 1 | 18 |\n| 7 | | 2 | 92.5\
    \ |\n| 4 | 2022-05-07 | 1 | 17.5 |\n| 5 | | 2 | 63 |\n| 9 | | 3 | 61.5 |\n| 10\
    \ | 2022-05-08 | 1 | 67.5 |\n| 11 | | 2 | 18.5 |\n| 8 | | 3 | 54 |\n| 13 | | 4\
    \ | 74.5 |\n| ~ 5295 rows ~ |\n\nOf course, you can still include your running\
    \ totals."
