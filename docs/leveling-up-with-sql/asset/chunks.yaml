- fmt: "## Recursive CTEs\n\n如你所见，使用 CTE 的一个特性是一个 CTE 可以引用之前的 CTE。另一个特性是 CTE 可以引用自身。\n\
    \n任何引用自身的事物都被称为**递归**。如果你是程序员，递归函数就是调用自身的函数，如果不妥善处理，它们的风险很高。同样，一个递归 CTE 如果不小心，也可能非常危险。\n\
    \n一个递归 CTE 有两种形式，具体取决于你的 DBMS：\n\n```\n--  PostgreSQL, MariaDB/MySQL, SQLite\n\
    WITH RECURSIVE cte AS (\n--  Anchor\nSELECT ...\nUNION\n--  Recursive Member\n\
    SELECT ... FROM cte WHERE ...\n)\n--  MSSQL, Oracle\nWITH cte AS (\n--  Anchor\n\
    SELECT ...\nUNION ALL\n--  Recursive Member\nSELECT ... FROM cte WHERE ...\n)\n\
    ```\n\n正如你所看到的，PostgreSQL、MariaDB/MySQL 和 SQLite 使用 `RECURSIVE` 关键字。MSSQL 和 Oracle\
    \ 不使用，但要求使用 `UNION ALL` 而不是简单的 `UNION`。\n\n在两种情况下，你都会看到递归 CTE 有两个部分：\n\n*   **锚点**定义了起点或第一个成员。\n\
    \n    在简单情况下，可能只有一个值，但在其他查询中，可能不止一个。\n\n*   **递归成员**基于从前一个 CTE 迭代继承的数据定义数据。也就是说，它定义了下一个成员。\n\
    \n    同样，如果有多个锚点成员，那么也会有多个递归成员。\n\n请注意，递归 CTE 必须定义何时结束，或者更准确地说，何时可以继续。通常，这是通过一个\
    \ `WHERE` 子句实现的，正如你之前看到的，但也可以使用任何其他方法，比如连接。\n\n一个简单的递归 CTE 例子是生成一个简单的序列。例如：\n\n\
    ```\n--  PostgreSQL, MariaDB/MySQL, SQLite\nWITH RECURSIVE cte(n) AS (\n--  Anchor\n\
    SELECT 1\nUNION\n--  Recursive Member\nSELECT n+1 FROM cte WHERE n<10\n)\nSELECT\
    \ * FROM cte;\n--  MSSQL, Oracle\nWITH cte(n) AS (\n--  Anchor\nSELECT 1    --\
    \  Oracle: FROM dual\nUNION ALL\n--  Recursive Member\nSELECT n+1 FROM cte WHERE\
    \ n<10\n)\nSELECT * FROM cte;\n```\n\n这个 CTE 为了方便包含了一个参数 (`cte(n)`)。否则，你可以把别名放在\
    \ `SELECT` 语句中。\n\n单个锚点值，在这个例子中是数字 1。递归（下一个）值是 `n+1`，只要 `n<10`。之后，它就会停止，最终你得到：\n\
    \n| **N** |\n| 1 |\n| 2 |\n| 3 |\n| ... |\n| 8 |\n| 9 |\n| 10 |\n\n——一个从一到十的数字序列。\n\
    \n递归 CTE 是标准 SQL 中最接近迭代或循环的东西。^([⁶](#fn6))\n\n递归 CTE 的两个常见用途是：\n\n*   生成序列\n*\
    \   遍历层次结构\n\n我们还将使用递归 CTE 将字符串拆分成更小的部分，只是为了向你展示可以如何在查询中发挥一点创造力。\n\n### 生成序列\n\
    \n我们已经看到了如何生成一个数字序列：\n\n```\nWITH cte AS (\n--  Anchor\nSELECT 0 AS n\nUNION ALL\n\
    --  Recursive\nSELECT n+1 FROM cte WHERE n<100\n)\nSELECT * FROM cte;\n```\n\n\
    需要记住的是，递归成员有一个 `WHERE` 子句来限制序列。没有它，递归查询将试图永远运行下去，而你知道，没有什么是永恒的。\n\nMSSQL 有一个内置的安全限制，即\
    \ 100 次递归，我们稍后必须绕过它：\n\n```\n--  MSSQL\nWITH cte (\n)\nSELECT ... FROM cte OPTION(MAXRECURSION\
    \ ...);\n```\n\n其他数据库没有这个限制，但对于 PostgreSQL、MariaDB 和 MySQL，你可以轻松设置一个时间限制：\n\n\
    ```\n--  PostgreSQL\nSET statement_timeout TO '5s';\n--  MariaDB\nSET MAX_STATEMENT_TIME=1;\
    \       --  秒\n--  MySQL\nSET MAX_EXECUTION_TIME=1000;    --  毫秒\n```\n\n如果你确信你的递归会正常终止，就不需要担心这个。然而，在\
    \ MSSQL 中，对于某些查询，你将需要增加或禁用递归限制。\n\n不过，在接下来的内容中包含一个简单的数字序列作为安全保障总是好的。\n\n序列有用的一种情况是获取一系列日期。这将简单地定义一个开始日期，并在递归成员中增加一天。\n\
    \nCTE 的开始足够简单：\n\n```\n--  PostgreSQL, MariaDB / MySQL\nWITH RECURSIVE dates(d,\
    \ n) AS (\nSELECT date'2023-01-01', 1\n)\nSELECT * FROM dates;\n--  MSSQL\nWITH\
    \ dates(d, n) AS (\nSELECT cast('2023-01-01' as date), 1\n)\nSELECT * FROM dates;\n\
    --  Oracle\nWITH dates(d, n) AS (\nSELECT date '2023-01-01', 1 FROM dual\n)\n\
    SELECT * FROM dates;\n--  SQLite\nWITH RECURSIVE dates(d, n) AS (\nSELECT '2023-01-01',\
    \ 1\n)\nSELECT * FROM dates;\n```\n\n请注意，第一个值 `d` 被转换为日期类型，SQLite 除外，它没有日期类型。设置为\
    \ `1` 的 `n` 被添加为序列号，但实际上没有必要。这里添加它是为了说明如何用它来防止 CTE 超出范围。\n\n递归部分也足够简单，但增加一天的方式因\
    \ DBMS 而异：\n\n```\n--  PostgreSQL\nWITH RECURSIVE dates(d, n) AS (\nSELECT date'2023-01-01',\
    \ 1\nUNION\nSELECT d+1, n+1 FROM dates\nWHERE d<'2023-05-01' AND n<10000\n)\n\
    SELECT * FROM dates;\n--  MariaDB / MySQL\nWITH RECURSIVE dates(d, n) AS (\nSELECT\
    \ date'2023-01-01', 1\nUNION\nSELECT date_add(d, interval 1 day), n+1 FROM dates\n\
    WHERE d<'2023-05-01' AND n<10000\n)\nSELECT * FROM dates;\n--  MSSQL\nWITH dates(d,\
    \ n) AS (\nSELECT cast('2023-01-01' as date), 1\nUNION ALL\nSELECT dateadd(day,1,d),\
    \ n+1 FROM dates\nWHERE d<'2023-05-01' AND n<10000\n)\nSELECT * FROM dates;\n\
    --  SQLite\nWITH RECURSIVE dates(d, n) AS (\nSELECT '2023-01-01', 1\nUNION\nSELECT\
    \ strftime('%Y-%m-%d',d,'+1 day'), n+1 FROM dates\nWHERE d<'2023-05-01' AND n<10000\n\
    )\nSELECT * FROM dates;\n--  Oracle\nWITH dates(d, n) AS (\nSELECT date '2023-01-01',\
    \ 1 FROM dual\nUNION ALL\nSELECT d+1, n+1 FROM dates\nWHERE d<date'2023-05-01'\
    \ AND n<10000\n)\nSELECT * FROM dates;\n```\n\n你将看到一系列的日期（和数字）：\n\n| **D** | **n**\
    \ |\n| --- | --- |\n| 2023-01-01 | 1 |\n| 2023-01-02 | 2 |\n| 2023-01-03 | 3 |\n\
    | 2023-01-04 | 4 |\n| 2023-01-05 | 5 |\n| 2023-01-06 | 6 |\n| ~ 121 行 ~ |\n\n\
    你会注意到，对于 MSSQL，我们添加了 `OPTION (MAXRECURSION 0)`，这基本上禁用了递归限制。\n\n还要注意 `WHERE` 子句中的\
    \ `AND n<10000`。这个数字相当大，相当于超过 27 年，但它不是无限的。如果你在何时停止 CTE 上犯了错误，这个表达式应该能限制递归次数。\n\
    \n你可能想知道为什么你想要一个介于 `2023-01-01` 和 `2023-05-01` 之间的日期序列，答案会是“为什么不呢？”，这并没有说服力。然而，我们将使用这种技术来克服第\
    \ 8 章中提到的问题：我们的一些日期会从摘要中缺失。"
  raw: "## Recursive CTEs\n\nAs you’ve seen, a feature of using CTEs is that one CTE\
    \ can refer to a previous CTE. Another feature is that a CTE can refer to itself.\n\
    \nAnything which refers to itself is said to be **recursive**. If you’re a programmer,\
    \ recursive functions are functions which call themselves and are very risky if\
    \ not handled properly. Similarly, a recursive CTE can be very risky if you’re\
    \ not careful.\n\nA recursive CTE takes one of two forms, depending on your DBMS:\n\
    \n```\n--  PostgreSQL, MariaDB/MySQL, SQLite\nWITH RECURSIVE cte AS (\n--  Anchor\n\
    SELECT ...\nUNION\n--  Recursive Member\nSELECT ... FROM cte WHERE ...\n)\n--\
    \  MSSQL, Oracle\nWITH cte AS (\n--  Anchor\nSELECT ...\nUNION ALL\n--  Recursive\
    \ Member\nSELECT ... FROM cte WHERE ...\n)\n```\n\nAs you see, PostgreSQL, MariaDB/MySQL,\
    \ and SQLite use the `RECURSIVE` keyword. MSSQL and Oracle don’t, but require\
    \ a `UNION ALL` instead of a simple `UNION`.\n\nIn both cases, you’ll see that\
    \ the recursive CTE has two parts:\n\n*   The **anchor** defines the starting\
    \ point or the first member.\n\n    In simple cases, there will be one value,\
    \ but in other queries there may be more than one.\n\n*   The **recursive member**\
    \ defines data based on what is inherited from the previous iteration of the CTE.\
    \ That is, it defines the next member.\n\n    Again, if there’s more than one\
    \ anchor member, then there will be multiple recursive members.\n\nNote that the\
    \ recursive CTE must define when it’s going to end or, more correctly, when it\
    \ can continue. Typically, that’s with a `WHERE` clause, as you’ve seen earlier,\
    \ but can use any other method, such as a join.\n\nA simple example of a recursive\
    \ CTE is one which generates a simple sequence. For example:\n\n```\n--  PostgreSQL,\
    \ MariaDB/MySQL, SQLite\nWITH RECURSIVE cte(n) AS (\n--  Anchor\nSELECT 1\nUNION\n\
    --  Recursive Member\nSELECT n+1 FROM cte WHERE n<10\n)\nSELECT * FROM cte;\n\
    --  MSSQL, Oracle\nWITH cte(n) AS (\n--  Anchor\nSELECT 1    --  Oracle: FROM\
    \ dual\nUNION ALL\n--  Recursive Member\nSELECT n+1 FROM cte WHERE n<10\n)\nSELECT\
    \ * FROM cte;\n```\n\nThe CTE includes a parameter for convenience (`cte(n)`).\
    \ Otherwise, you can put the alias in the `SELECT` statement.\n\nThe single anchor\
    \ value, in this case, is the number 1\\. The recursive (next) value is `n+1`,\
    \ so long as `n<10`. After that, it stops, and you end up with\n\n| **N** |\n\
    | 1 |\n| 2 |\n| 3 |\n| ... |\n| 8 |\n| 9 |\n| 10 |\n\n—a sequence of numbers from\
    \ one to ten.\n\nRecursive CTEs are the closest thing you’ll get in standard SQL\
    \ to iterations or looping.^([⁶](#fn6))\n\nTwo common uses of recursive CTEs are\n\
    \n*   Generate a sequence\n\n*   Traverse a hierarchy\n\nWe’ll also use a recursive\
    \ CTE to split a string into smaller parts, just to show you a little creativity\
    \ can be added to your queries.\n\n### Generating a Sequence\n\nWe’ve already\
    \ seen how to generate a sequence of numbers:\n\n```\nWITH cte AS (\n--  Anchor\n\
    SELECT 0 AS n\nUNION ALL\n--  Recursive\nSELECT n+1 FROM cte WHERE n<100\n)\n\
    SELECT * FROM cte;\n```\n\nThe thing to remember is that the recursive member\
    \ has a `WHERE` clause to limit the sequence. Without that, the recursive query\
    \ would try to run forever, and as you know, nothing lasts forever.\n\nMSSQL has\
    \ a built-in safety limit of 100 recursions, which we’ll have to circumvent later:\n\
    \n```\n--  MSSQL\nWITH cte (\n)\nSELECT ... FROM cte OPTION(MAXRECURSION ...);\n\
    ```\n\nThe others don’t, but for PostgreSQL, MariaDB, and MySQL, you can readily\
    \ set a time limit:\n\n```\n--  PostgreSQL\nSET statement_timeout TO '5s';\n--\
    \  MariaDB\nSET MAX_STATEMENT_TIME=1;       --  seconds\n--  MySQL\nSET MAX_EXECUTION_TIME=1000;\
    \    --  milliseconds\n```\n\nIf you’re sure about your recursion terminating\
    \ properly, you don’t need to worry about this. In MSSQL, you will, however, need\
    \ to increase or disable the recursion limit for some queries.\n\nHowever, it\
    \ won’t hurt to include a simple number sequence in what follows just to be safe.\n\
    \nOne case where a sequence can be useful is to get a sequence of dates. This\
    \ will simply define a start date and add one day in the recursive member.\n\n\
    The CTE starts simply enough:\n\n```\n--  PostgreSQL, MariaDB / MySQL\nWITH RECURSIVE\
    \ dates(d, n) AS (\nSELECT date'2023-01-01', 1\n)\nSELECT * FROM dates;\n--  MSSQL\n\
    WITH dates(d, n) AS (\nSELECT cast('2023-01-01' as date), 1\n)\nSELECT * FROM\
    \ dates;\n--  Oracle\nWITH dates(d, n) AS (\nSELECT date '2023-01-01', 1 FROM\
    \ dual\n)\nSELECT * FROM dates;\n--  SQLite\nWITH RECURSIVE dates(d, n) AS (\n\
    SELECT '2023-01-01', 1\n)\nSELECT * FROM dates;\n```\n\nNote that the first value,\
    \ `d`, has been cast to a date, with the exception of SQLite, which doesn’t have\
    \ a date type. The `n` set to `1` is added as a sequence number, but is really\
    \ unnecessary. It’s added here to illustrate how you can use it to stop overrunning\
    \ your CTE.\n\nThe recursive part is also easy enough, but adding one day varies\
    \ between DBMSs:\n\n```\n--  PostgreSQL\nWITH RECURSIVE dates(d, n) AS (\nSELECT\
    \ date'2023-01-01', 1\nUNION\nSELECT d+1, n+1 FROM dates\nWHERE d<'2023-05-01'\
    \ AND n<10000\n)\nSELECT * FROM dates;\n--  MariaDB / MySQL\nWITH RECURSIVE dates(d,\
    \ n) AS (\nSELECT date'2023-01-01', 1\nUNION\nSELECT date_add(d, interval 1 day),\
    \ n+1 FROM dates\nWHERE d<'2023-05-01' AND n<10000\n)\nSELECT * FROM dates;\n\
    --  MSSQL\nWITH dates(d, n) AS (\nSELECT cast('2023-01-01' as date), 1\nUNION\
    \ ALL\nSELECT dateadd(day,1,d), n+1 FROM dates\nWHERE d<'2023-05-01' AND n<10000\n\
    )\nSELECT * FROM dates;\n--  SQLite\nWITH RECURSIVE dates(d, n) AS (\nSELECT '2023-01-01',\
    \ 1\nUNION\nSELECT strftime('%Y-%m-%d',d,'+1 day'), n+1 FROM dates\nWHERE d<'2023-05-01'\
    \ AND n<10000\n)\nSELECT * FROM dates;\n--  Oracle\nWITH dates(d, n) AS (\nSELECT\
    \ date '2023-01-01', 1 FROM dual\nUNION ALL\nSELECT d+1, n+1 FROM dates\nWHERE\
    \ d<date'2023-05-01' AND n<10000\n)\nSELECT * FROM dates;\n```\n\nYou’ll see a\
    \ series of dates (and numbers):\n\n| **D** | **n** |\n| --- | --- |\n| 2023-01-01\
    \ | 1 |\n| 2023-01-02 | 2 |\n| 2023-01-03 | 3 |\n| 2023-01-04 | 4 |\n| 2023-01-05\
    \ | 5 |\n| 2023-01-06 | 6 |\n| ~ 121 rows ~ |\n\nYou’ll notice that for MSSQL,\
    \ we’ve added `OPTION (MAXRECURSION 0)`, which basically disables the recursion\
    \ limit.\n\nNote also the `AND n<10000` in the `WHERE` clause. That number is\
    \ pretty big, and it amounts to over 27 years, but it’s not infinite. If you make\
    \ an error in when to stop the CTE, that expression should limit the recursions.\n\
    \nYou might wonder why you would want a sequence of dates between `2023-01-01`\
    \ and `2023-05-01`, the answer would be “why not?”, which isn’t very convincing.\
    \ However, we’re going to use this technique to overcome a problem mentioned in\
    \ Chapter [8](#606708_1_En_8_Chapter.xhtml): some of the dates will be missing\
    \ from our summary."
