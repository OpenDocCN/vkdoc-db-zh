    is equivalent to


    ```

    SELECT * FROM customerdetails

    WHERE state''VIC'' AND state''QLD'' AND stateNULL;

    ```


    When you negate a logical expression, you not only negate the individual terms,
    but you also negate the operators between them.


    Once again, the term `state<>NULL` always fails, but, since this is now `AND`ed
    with the rest, it fails the whole expression.


    The moral of this story is that you can’t use `NOT IN` if the list contains `NULL`s.


    ### Creating a Books and Authors View


    As a general rule, if you’ve done something a little complicated, you don’t want
    to do it again. Joining the `books` and `authors` table isn’t so complicated,
    but it’s still worth considering a simpler approach.


    A SELECT statement can be saved permanently in the database as a **View**. A View
    is just a saved query. Although you can use it like a table, it doesn’t actually
    save data, so it’s cheap.


    There is also something called a **materialized view** which does save the results,
    but it’s not meant to be a permanent store of new data. A materialized view can
    be useful when your view is fairly complex and you have a lot of processing to
    do with the results; it doesn’t have to recalculate the results every time.


    To create a view, you use `CREATE VIEW`:


    ```

    --  Drop old version (Not Oracle)

    DROP VIEW IF EXISTS bookdetails;

    --  Drop old version (Oracle)

    DROP VIEW bookdetails;

    --  (Re) create view

    CREATE VIEW bookdetails AS

    SELECT

    b.id, b.title, b.published, b.price,

    a.givenname, a.othernames, a.familyname,

    a.born, a.died, a.gender, a.home

    FROM

    books AS b

    LEFT JOIN authors AS a ON b.authorid=a.id

    ;

    ```


    You can drop an existing view using `DROP VIEW`. For most DBMSs, you can use `DROP
    VIEW IF EXISTS` if you’re not sure that it exists (yet). Not with Oracle, however.


    Microsoft SQL has an additional quirk: `CREATE VIEW` must be the only statement
    in its batch, so you need to put the statement between the `GO` keyword, which
    marks the end of one batch and the beginning of another:


    ```

    DROP VIEW IF EXISTS bookdetails;

    --  MSSQL Only:

    GO

    CREATE VIEW bookdetails AS

    SELECT

    b.id, b.title, b.published, b.price,

    b.authorid, a.givenname, a.othernames, a.familyname,

    a.born, a.died, a.gender, a.home

    FROM

    books AS b

    LEFT JOIN authors AS a ON b.authorid=a.id

    ;

    GO

    ```


    We’ve included the `authorid` in case you want to use it to get more author details.


    Once you have saved a view, you can pretend it’s another table:


    ```

    SELECT * FROM bookdetails;

    ```


    You’ll get the same results as before with a little less effort.


    ## One-to-One Relationships


    A one-to-one relationship associates a single row of one table with a single row
    of another. It is normally between two primary keys.


    If every row in one table is associated with a row in another table, then you
    can consider the second table as an extension of the first table. If that’s the
    case, why not just put all of the columns in the same table? Reasons include the
    following:


    *   You want to add more details, but you don’t want to change the original table.


    *   You want to add more details, but you *can’t* change the original table (possibly
    because of permissions).


    *   The additional table contains details that may be optional: not all rows in
    the original table require the additional columns.


    *   You want to keep some of the details in a separate table so that you can add
    another layer of security to the additional details.'
  trans: '

    该子查询选取那些 `id` 确实出现在 `books` 表中的作者。`NOT IN` 表达式则选取其余的作者。子查询中包含 `WHERE authorid
    IS NOT NULL` 子句的原因，在于 `NOT IN` 与 `NULL` 值搭配时行为的一个怪癖。这一点将在后文解释。


    现在，你拥有了估算连接行数所需的所有数字。你可以使用以下组合：


    | `JOIN` 类型 | `计算公式` |

    | --- | --- |

    | `INNER JOIN` | `INNER JOIN` |

    | 子表 `OUTER JOIN` | `INNER JOIN` + 未匹配的子表行 = 子表行数 |

    | 父表 `OUTER JOIN` | `INNER JOIN` + 未匹配的父表行数 |

    | 全 `OUTER JOIN` | `INNER JOIN` + 未匹配的子表行数 + 未匹配的父表行数 |


    这就是从一个子表外连接（即 `LEFT JOIN` 或 `RIGHT JOIN`，取决于你将子表放在连接的哪一侧）中可以预期得到的行数。


    当然，事情不一定到此为止。如果你进行的是内连接，并且存在一些 `NULL` 外键值，那么你最终得到的行数会少于估算值。如果你选择父表外连接，那么当存在没有匹配子表的父表记录时，行数会更多。


    不过，这是一个很好的起点。


    ### NOT IN 的怪癖


    你可能会想，如果 `IN(...)` 用于查找匹配某些值的行，那么 `NOT IN(...)` 应该会找到其他的行。这在大多数情况下是正确的，**除非**列表中包含一个
    `NULL` 值。


    例如，要查找位于两个州的客户，你可以使用：


    ```sql

    SELECT * FROM customerdetails

    WHERE state IN (''VIC'',''QLD'');

    ```


    要查找位于其他州的客户，你可以使用 `NOT IN`：


    ```sql

    SELECT * FROM customerdetails

    WHERE state NOT IN (''VIC'',''QLD'');

    ```


    这符合预期。然而，如果你在列表中包含了 `NULL`，情况就会变得混乱。你需要记住 `IN(...)` 是如何被解释的。例如：


    ```sql

    SELECT * FROM customerdetails

    WHERE state IN (''VIC'',''QLD'',NULL);

    ```


    等价于：


    ```sql

    SELECT * FROM customerdetails

    WHERE state=''VIC'' OR state=''QLD'' OR state=NULL;

    ```


    最后一项 `state=NULL` 将**总是**失败，因为 `NULL` 值在比较时*总是*返回未知（FALSE），但如果它匹配了其他项中的任一个，那也没问题。


    然而，`NOT IN` 版本：


    ```sql

    SELECT * FROM customerdetails

    WHERE state NOT IN (''VIC'',''QLD'',NULL);

    ```


    等价于：


    ```sql

    SELECT * FROM customerdetails

    WHERE state<>''VIC'' AND state<>''QLD'' AND state<>NULL;

    ```


    当你对一个逻辑表达式进行否定时，你不仅否定了各个项，还否定了它们之间的运算符。


    再次强调，项 `state<>NULL` 总是失败，但由于它现在是与其余部分进行 `AND` 运算，这会导致整个表达式失败。


    这个故事的寓意是：如果列表中包含 `NULL` 值，你就**不能**使用 `NOT IN`。


    ### 创建书籍与作者视图


    通常来说，如果你做了一些稍微复杂的事情，你会不想再重复做一次。连接 `books` 和 `authors` 表并不算特别复杂，但仍然值得考虑一种更简单的方法。


    一条 `SELECT` 语句可以作为 `View` 永久保存在数据库中。`View` 只是一个被保存的查询。虽然你可以像使用表一样使用它，但它实际上并不保存数据，因此开销很小。


    还有一种叫做 `物化视图` 的东西，它确实会保存结果，但它并非旨在作为新数据的永久存储。当你的视图相当复杂，并且你有大量的结果需要处理时，物化视图会很有用；它不必每次都重新计算结果。


    要创建视图，你需要使用 `CREATE VIEW`：


    ```sql

    --  删除旧版本 (非 Oracle)

    DROP VIEW IF EXISTS bookdetails;

    --  删除旧版本 (Oracle)

    DROP VIEW bookdetails;

    --  (重新) 创建视图

    CREATE VIEW bookdetails AS

    SELECT

    b.id, b.title, b.published, b.price,

    a.givenname, a.othernames, a.familyname,

    a.born, a.died, a.gender, a.home

    FROM

    books AS b

    LEFT JOIN authors AS a ON b.authorid=a.id

    ;

    ```


    你可以使用 `DROP VIEW` 来删除一个已有的视图。对于大多数 `DBMS`，如果你不确定它（是否）存在，可以使用 `DROP VIEW IF EXISTS`。但是
    Oracle 不支持此语法。


    Microsoft SQL 有一个额外的怪癖：`CREATE VIEW` 语句必须是其批处理中唯一的语句，因此你需要将该语句放在 `GO` 关键字之间，该关键字标记了一个批处理的结束和另一个批处理的开始：


    ```sql

    DROP VIEW IF EXISTS bookdetails;

    --  仅适用于 MSSQL:

    GO

    CREATE VIEW bookdetails AS

    SELECT

    b.id, b.title, b.published, b.price,

    b.authorid, a.givenname, a.othernames, a.familyname,

    a.born, a.died, a.gender, a.home

    FROM

    books AS b

    LEFT JOIN authors AS a ON b.authorid=a.id

    ;

    GO

    ```


    我们包含了 `authorid`，以防你想用它来获取更多作者详细信息。


    一旦你保存了一个视图，就可以把它当作另一张表来用：


    ```sql

    SELECT * FROM bookdetails;

    ```


    你将用少一点的工作量获得与之前相同的结果。


    ### 一对一关系


    一对一关系将一个表中的一行与另一个表中的一行关联起来。这通常发生在两个主键之间。


    如果第一个表中的每一行都与第二个表中的一行相关联，那么你可以将第二个表视为第一个表的扩展。如果是这种情况，为什么不把所有列都放在同一个表中呢？原因包括：


    *   你想添加更多细节，但不想修改原始表。

    *   你想添加更多细节，但你*无法*修改原始表（可能因为权限问题）。

    *   附加表包含的细节可能是可选的：并非原始表中的所有行都需要这些附加列。

    *   你想将某些细节保存在单独的表中，以便为这些附加细节增加另一层安全性。

