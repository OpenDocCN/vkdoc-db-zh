  trans: '#### 修复作者姓名


    使用 `coalesce()` 函数，你可以用一个替代值来填补缺失的作者姓名。这里需要考虑两点：


    *   你不能虚构一个缺失的姓名，因此替代值必须是一个空字符串。

    *   你还应该去掉缺失姓名后面的空格。


    对于第二点，我们不会单独对姓名进行 coalesce，而是对姓名和空格的组合进行处理，这个组合也应该为 `NULL`——除了 Oracle，它的行为方式不同。我们会对
    Oracle 采取不同的方法。


    要将姓名和空格 coalesce 成为空字符串，我们可以使用


    ```sql

    --  PostgreSQL, MariaDB/MySQL, SQLite

    SELECT

    id, givenname, othernames, familyname,

    coalesce(givenname||'' '','''')

    ||coalesce(othernames||'' '','''')

    ||familyname AS fullname

    FROM authors;


    --  MSSQL

    SELECT

    id, givenname, othernames, familyname,

    coalesce(givenname+'' '','''')

    +coalesce(othernames+'' '','''')

    +familyname AS fullname

    FROM authors;

    ```


    这会得到


    | **id** | **givenname** | **Othernames** | **familyname** | **fullname** |

    | --- | --- | --- | --- | --- |

    | 464 | Ambrose | [NULL] | Bierce | Ambrose Bierce |

    | 858 | Alexander | [NULL] | Ostrovsky | Alexander Ostrovsky |

    | 525 | Francis | [NULL] | Beaumont | Francis Beaumont |

    | 479 | C.E. | Van | Koetsveld | C.E. van Koetsveld |

    | 703 | Friedrich | [NULL] | Engels | Friedrich Engels |

    | ~ 488 rows ~ |


    由于 Oracle 会很乐意连接一个 `NULL` 字符串，我们不能使用 `coalesce()`。相反，我们将使用 `ltrim()` 函数。这个函数会移除字符串的前导空格。因为我们是在字符串的*末尾*添加一个空格，只有当姓名为空时，它才会成为一个前导空格。这会给我们


    ```sql

    --  Oracle

    SELECT

    id, givenname, othernames, familyname,

    ltrim(givenname||'' '')||ltrim(othernames||'' '')

    ||familyname AS fullname

    FROM authors;

    ```


    这应该会给出与之前相同的结果。


    ### 在其他子句中使用计算


    在本章中，我们主要在 `SELECT` 子句中使用计算。当然，任何包含值的子句都可以使用计算出的值。我们在这里看几个例子。


    计算的一个明显用途是在 `WHERE` 子句中。例如，你可以查找标题较短的书籍：


    ```sql

    SELECT *

    FROM books

    WHERE length(title)<24;     --  MSSQL: len(title)

    ```


    给出


    | **id** | **authorid** | **Title** | **published** | **price** |

    | --- | --- | --- | --- | --- |

    | 2078 | 765 | The Duel | 1811 | 12.50 |

    | 503 | 128 | Uncle Silas | 1864 | 17.00 |

    | 2007 | 99 | North and South | 1854 | 17.50 |

    | 702 | 547 | Jane Eyre | 1847 | 17.50 |

    | 1759 | 17 | La Curée | 1872 | 16.00 |

    | 205 | 436 | Shadow: A Parable | [NULL] | 17.50 |

    | ~ 762 rows ~ |


    如果你的数据库区分大小写，并且你需要匹配一个大小写未知的字符串，你可能需要这个：


    ```sql

    SELECT *

    FROM books

    WHERE lower(title) LIKE ''%journey%'';

    ```


    给出


    | **id** | **authorid** | **Title** | **published** | **price** |

    | --- | --- | --- | --- | --- |

    | 880 | 777 | The Journey of Niels Klim to the Wor … | 1741 | 12.50 |

    | 946 | 704 | Following the Equator: A Journey Aro … | 1897 | 19.50 |

    | 1314 | 606 | Mozart’s Journey to Prague | 1856 | 17.00 |

    | 1092 | 295 | A Journey to the Western Islands of … | 1775 | 14.50 |

    | 502 | [NULL] | Journey to the Center of the Earth | 1864 | 15.50 |

    | 1454 | 914 | A Sentimental Journey | 1768 | 13.50 |


    你也可以在子查询中计算聚合值：


    ```sql

    SELECT *

    FROM customers

    WHERE height<(SELECT avg(height) FROM customers);

    ```


    给出


    | **id** | **familyname** | **Givenname** | **…** | **height** | **…** |

    | --- | --- | --- | --- | --- | --- |

    | 42 | Knott | May | … | 168.5 | … |

    | 597 | Andy | Ike | … | 153.0 | … |

    | 352 | Isk | Basil | … | 156.4 | … |

    | 526 | Coming | Seymour | … | 163.5 | … |

    | 26 | Twishes | Bess | … | 164.6 | … |

    | 91 | North | June | … | 164.5 | … |

    | ~ 128 rows ~ |


    你也可以在 `ORDER BY` 子句中使用计算，例如当你想按标题长度排序时：


    ```sql

    SELECT *

    FROM books

    ORDER BY length(title);     --  MSSQL: length(title)

    ```


    这会给出


    | **id** | **authorid** | **title** | **published** | **price** |

    | --- | --- | --- | --- | --- |

    | 385 | 971 | She | 1887 | 11.00 |

    | 488 | 478 | Mumu | 1852 | 18.00 |

    | 728 | 534 | Emma | 1815 | 10.00 |

    | 1625 | 496 | Lenz | 1835 | 18.50 |

    | 317 | 99 | Ruth | 1853 | 16.50 |

    | 2140 | 17 | Nana | 1880 | 12.50 |

    | ~ 1200 rows ~ |


    然而，你很可能想要选择你排序的依据，因此在 `SELECT` 子句中计算该值并按结果排序会更有意义：


    ```sql

    SELECT id, authorid, title, length(title) AS len, published, price

    FROM books

    ORDER BY len;       --  MSSQL: length(title)

    ```


    这更具信息性：


    | **id** | **authorid** | **Title** | **len** | **published** | **price** |

    | --- | --- | --- | --- | --- | --- |

    | 385 | 971 | She | 3 | 1887 | 11.00 |

    | 488 | 478 | Mumu | 4 | 1852 | 18.00 |

    | 728 | 534 | Emma | 4 | 1815 | 10.00 |

    | 1625 | 496 | Lenz | 4 | 1835 | 18.50 |

    | 317 | 99 | Ruth | 4 | 1853 | 16.50 |

    | 2140 | 17 | Nana | 4 | 1880 | 12.50 |

    | ~ 1200 rows ~ |


    这里有一个在 `ORDER BY` 子句中使用 `coalesce` 的有趣用法。一些数据库管理系统支持 `NULLS FIRST` 或 `NULLS LAST`
    来决定在排序顺序中放置 `NULL` 的位置。如果你的数据库管理系统不支持，你可以将该列 coalesce 为一个极值。例如：


    ```sql

    SELECT *

    FROM customers

    ORDER BY coalesce(height,0);    --  NULLS FIRST


    SELECT *

    FROM customers

    ORDER BY coalesce(height,1000); --  NULLS LAST

    ```


    通过将所有 `NULL` coalesce 为一个极值，SQL 会相应地将它们排序到一端或另一端。


    至于 `FROM` 子句，你需要一个生成虚拟表的计算。这通常会是一个视图、一个连接，甚至是一个子查询。在这个上下文中，一个公用表表达式就像一个子查询。我们稍后会做更多这类事情。


    ### 关于计算的更多细节


    SQL 数据库通常理解三种主要数据类型：数字、字符串和日期。这些类型有一些变体，例如数字是否包含小数，字符串的长度，或者日期是否包含时间。还有一些其他类型，例如布尔值（仅限于
    `true` 或 `false`）或二进制数据（有时称为二进制大对象，或简称 BLOBs），在不同数据库管理系统中的支持程度各不相同。


    在这里，我们将看看使用主要数据类型进行计算的一些细节。


    通常，值有三种形式：


    *   一个 `存储的` 值可能来自变量或列。

    *   一个值可能是 `计算出的` 或来自内置函数。

    *   一个 `字面` 值可以直接在代码中输入。


    SQL 和大多数编程语言一样，需要一些帮助来区分某些字面值与其他代码。数字字面值按原样输入（裸量），因为它们显然不可能是其他东西。


    而字符串或日期字面值则用单引号（`'' ... ''`）包裹以标记出来。这是为了让 SQL 能够区分字符串和其他单词，例如 SQL 关键字或表和列名。


    字符串或日期字面值的实际值不包括引号。但是，在将它们写入代码时需要引号。


    在接下来的大部分内容中，我们将使用字面值作为示例。'
- fmt: "### Casting\n\n`cast()` 函数用于将一个值解释为不同的数据类型。回想一下，SQL 有三种主要数据类型：数字、字符串和日期。你可以使用\
    \ `cast` 来做以下两件事之一：\n\n*   你可以尝试将一种主要类型转换为另一种主要类型。\n    *   转换为字符串应该相当容易，但转换为另一种类型需要\
    \ SQL 知道如何解释该值。不同的数据库管理系统在转换失败时的反应不同。\n\n*   你可以在同一种主要类型内进行转换。例如，你可以在整数和十进制数之间转换，或者在日期和日期时间之间转换。\n\
    \    *   如果你将十进制数转换为整数、将日期时间转换为日期，或者将字符串转换为更短的字符串，你自然会丢失精度。如果你向相反方向转换，额外的精度将用相当于“无”的内容填充。\n\
    \    *   如果你确实转换为更窄的类型，它可能会正常工作，但不要过于冒险。例如，将数字 `123.45` 转换为 `decimal(4,2)` 将会失败，因为你没有允许足够的位数；你会得到一个溢出错误。\n\
    \n对于接下来的内容，请记住 SQLite 没有日期类型，所以你不用担心那种转换。稍后，我们会快速看一下 SQLite 中的等效方法。\n\n以下是一些在类型内进行转换的示例：\n\
    \n```sql\n--  更短的日期和数字\nSELECT\n--  非 SQLite:\ncast(ordered as date) AS ordered_date,\n\
    cast(total AS integer) AS whole_dollars\nFROM sales;\n--  更短的字符串\nSELECT cast(title\
    \ AS varchar(16)) AS short_title\nFROM books;\n--  更宽泛的日期和数字\nSELECT\n--  SQLite:\
    \ 没有日期类型\n--  PostgreSQL, Oracle\ncast(dob as timestamp) as long_dob,\n--  MariaDB\
    \ / MySQL, MSSQL\ncast(dob as datetime) as long_dob,\ncast(height as decimal(5,2))\
    \ as long_height\nFROM customers;\n```\n\n如果你将一个字符串转换为更长的类型，将会发生以下两种情况之一。如果你将其转换为\
    \ `CHAR`（固定长度）类型，额外的长度将用空格填充。如果你将其转换为 `VARCHAR` 类型，字符串将保持不变。但是，该字符串将被允许增长到更长的字符串。\n\
    \n在不同类型之间转换是另一回事。大多数数据库管理系统会在必要时自动转换为字符串。例如：\n\n```sql\n--  非 MSSQL\nSELECT id\
    \ || ': ' || email\nFROM customers;\n```\n\n你会得到类似这样的结果：\n\n| **?column?** |\n\
    | 42: may.knott61@example.net |\n| 459: rick.shaw459@example.net |\n| 597: ike.andy597@example.com\
    \ |\n| 186: pat.downe186@example.net |\n| 352: basil.isk352@example.net |\n| 576:\
    \ pearl.divers576@example.com |\n| ~ 303 rows ~ |\n\n如你所见，MSSQL 不会自动这样做，可能是因为与它们的连接运算符（`+`）混淆。在那里，你必须强制进行：\n\
    \n```sql\n--  MSSQL\nSELECT cast(id as varchar(5)) + ': ' + email\nFROM customers;\n\
    ```\n\n你也可以对日期做同样的事情。我们将对客户的出生日期这样做，但我们会遇到一些出生日期缺失的复杂情况。使用 `coalesce` 应该可以解决这个问题：\n\
    \n```sql\n--  PostgreSQL, MariaDB/MySQL, SQlite\nSELECT\nid || ': ' || email\n\
    || coalesce('  Born: ' || dob,'')\nFROM customers;\n--  MSSQL\nSELECT\ncast(id\
    \ as varchar(5)) + ': ' + email\n+ coalesce('  Born: ' + cast(dob as char(10)),'')\n\
    FROM customers;\n--  非 Oracle\n```\n\n对于 SQLite，这并不费力，因为我们无论如何都是将日期存储为字符串。\n\n\
    在这里，我们对整个连接值 `' Born: ' || dob` 使用了 `coalesce`。这是因为我们希望在 `dob` 缺失时用空字符串替换整个表达式。与\
    \ `NULL` 连接应该会导致 `NULL`。\n\n对于 Oracle，你会再次遇到将 `NULL` 字符串视为空字符串的怪癖，因此它们不会被合并。我们可以使用\
    \ `CASE` 来解决这个问题：\n\n```sql\n--  Oracle\nSELECT\nid || ': ' || email\n|| CASE\n\
    WHEN dob IS NOT NULL THEN '  Born: ' || dob\nEND\nFROM customers;\n```\n\n基本上，你可以将\
    \ `coalesce` 视为简化的 `CASE` 表达式。对于 Oracle，你需要更明确地写出来。\n\n你可能想要更改数据类型的一个原因是为了将它们与其他值混合，例如连接前面的字符串。当我们想要组合来自多个表或虚拟表（例如连接和联合）的数据时，也会看到使用类型转换。\n\
    \n另一个改变数据类型的原因是排序。所有字符串数据通常按字母顺序排序，但你可能需要将它们转换为非字符串类型以进行排序。例如：\n\n```sql\n-- \
    \ 整数\nSELECT * FROM sorting\nORDER BY numberstring;\nSELECT * FROM sorting\nORDER\
    \ BY cast(numberstring as int);         -- 非 MySQL\n--  ORDER BY cast(numberstring\
    \ as signed);  --  MySQL\n--  日期 (非 SQLite)\nSELECT * FROM sorting\nORDER BY datestring;\n\
    SELECT * FROM sorting\nORDER BY cast(datestring as date);\n```\n\n在 `sorting`\
    \ 表中，有一些存储为字符串的值代表数字或日期。对它们进行正确排序的唯一方法是先进行类型转换。\n\n请注意，MySQL 不允许直接转换为整数。你必须使用\
    \ `SIGNED`（意思相同）或 `UNSIGNED`。MariaDB 可以接受整数。\n\n并非所有从字符串的转换都会成功，因为字符串可能与正确的类型不相似。例如：\n\
    \n```sql\n--  这个可以：\nSELECT cast('23' as int)    --  MySQL: as signed\n--  FROM\
    \ dual   --  Oracle\n;\n--  这个不行：\nSELECT cast('hello' as int) --  MySQL: as signed\n\
    --  FROM dual   --  Oracle\n;\n```\n\n接下来会发生什么取决于数据库管理系统：\n\n*   MariaDB/MySQL\
    \ 都会给出一个 `0`，这比较宽容。\n*   MSSQL 会给出一个错误。\n    *   不过，你可以使用一个名为 `try_cast` 的替代方法，它只会给出一个\
    \ `NULL`。如果你愿意，你可以合并结果。\n*   Oracle 也会给出一个错误。\n    *   不过，在这个形式中有一个可选的默认值：`cast('hello'\
    \ as int DEFAULT 0 ON CONVERSION ERROR)`。它比较冗长，但它允许使用 `0` 或其他你喜欢的值作为替代。\n*   PostgreSQL\
    \ 直接给出错误。\n    *   可以编写一个函数来绕过它。\n\n### Numeric Calculations\n\n数字通常用于计数某些东西——它是对“多少”这个问题的答案。例如，客户身高有多少厘米，或者这件物品支付了多少美元？\n\
    \n数字并不总是那样使用。有时，它们被用作令牌或代码。你可能对数字执行的计算将取决于数字的使用方式。\n\n#### Basic Arithmetic\n\n\
    你总是可以对数字执行基本操作：\n\n```sql\nSELECT\n3*5 AS multiplication,\n4+7 AS addition,\n\
    8-11 AS subtraction,\n20/3 AS division,\n20%3 AS remainder,  --  Oracle: mod(20,3),\n\
    24/3*5 AS associativity,\n1+2*3 AS precedence,\n2*(3+4) + 5*(8-5) AS distributive\n\
    --  FROM dual   --  Oracle\n;\n```\n\n此示例说明了主要操作：\n\n| **mul…** | **add…** | **sub…**\
    \ | **div…** | **rem…** | **ass…** | **pre…** | **dis…** |\n| --- | --- | ---\
    \ | --- | --- | --- | --- | --- |\n| 15 | 11 | -3 | 6 | 2 | 40 | 7 | 29 |\n\n\
    请注意，如果你在 Oracle 中测试这个，需要添加 `FROM dual`。\n\n另请注意\n*   不同的数据库管理系统对整数除法的态度不同。在某些情况下，`20/3`\
    \ 会给你一个 `6` 的结果，丢弃小数部分。在其他情况下，你会得到像 `6.66...7` 这样的十进制数。\n*   `%` 运算符计算整数除法后的 **余数**。Oracle\
    \ 使用 `mod()` 函数。\n*   当混合操作时，SQL 遵循你在学校学到的关于优先级（哪些运算符先计算）和结合性（从左到右计算）的规则。SQL 也允许你使用括号先计算表达式。\n\
    \n如果你认识忘记算术基本规则的人，你可以告诉他们\n1.  先算括号里的。\n2.  先算乘法 | 除法，再算加法 | 减法（优先级）。\n3.  相同优先级的操作从左到右计算（结合性）。\n\
    \n当然，无论值是字面量还是某些存储或计算的值，这些表达式的工作方式都是一样的。"
  raw: '### Casting


    The `cast()` function is used to interpret a value as a different data type. Recall
    that SQL has three main data types: numbers, strings, and dates. You can use cast
    to do one of two things:


    *   You can try to cast from one main type to another.


    Casting to a string should be easy enough, but casting to another type requires
    that SQL know how to interpret the value. Different DBMSs react differently to
    failure.


    *   You can cast within a main type. For example, you can cast between integer
    and decimal numbers or between dates and datetimes.


    If you cast a decimal to an integer, a datetime to a date, or a string to a shorter
    string, you’ll naturally lose precision. If you cast in the opposite direction,
    the extra precision will be filled with the equivalent of “nothing.”


    If you do cast to a narrower type, it will probably work, but don’t push your
    luck too hard. For example, casting the number `123.45` to a `decimal(4,2)` will
    fail because you haven’t allowed enough digits; you’ll get an overflow error.


    For what follows, remember that SQLite doesn’t have a date type, so that’s one
    cast you won’t have to worry about. Later, we’ll have a quick look at the equivalent
    in SQLite.


    Here are some examples of casting within types:


    ```

    --  shorter dates & numbers

    SELECT

    --  not SQLite:

    cast(ordered as date) AS ordered_date,

    cast(total AS integer) AS whole_dollars

    FROM sales;

    --  shorter strings

    SELECT cast(title AS varchar(16)) AS short_title

    FROM books;

    --  broader dates & numbers

    SELECT

    --  SQLite: no date type

    --  PostgreSQL, Oracle

    cast(dob as timestamp) as long_dob,

    --  MariaDB / MySQL, MSSQL

    cast(dob as datetime) as long_dob,

    cast(height as decimal(5,2)) as long_height

    FROM customers;

    ```


    If you cast a string to a longer type, one of two things will happen. If you cast
    it to a `CHAR` (fixed length) type, the extra length will be padded with spaces.
    If you cast it to a `VARCHAR` type, the string will be unchanged. However, the
    string will be permitted to grow to a longer string.


    Casting between types is a different matter. Most DBMSs will automatically cast
    to a string if necessary. For example:


    ```

    --  Not MSSQL

    SELECT id || '': '' || email

    FROM customers;

    ```


    You’ll get something like this:


    | **?column?** |

    | 42: may.knott61@example.net |

    | 459: rick.shaw459@example.net |

    | 597: ike.andy597@example.com |

    | 186: pat.downe186@example.net |

    | 352: basil.isk352@example.net |

    | 576: pearl.divers576@example.com |

    | ~ 303 rows ~ |


    As you see, MSSQL won’t do this automatically, possibly due to a confusion with
    their concatenation operator (`+`). There you’ll have to force the issue:


    ```

    --  MSSQL

    SELECT cast(id as varchar(5)) + '': '' + email

    FROM customers;

    ```


    You can do the same with dates, too. We’ll do that with the customers’ dates of
    birth, but we’ll run into the complication of the fact that some dates of birth
    are missing. Using coalesce should do the job:


    ```

    --  PostgreSQL, MariaDB/MySQL, SQlite

    SELECT

    id || '': '' || email

    || coalesce(''  Born: '' || dob,'''')

    FROM customers;

    --  MSSQL

    SELECT

    cast(id as varchar(5)) + '': '' + email

    + coalesce(''  Born: '' + cast(dob as char(10)),'''')

    FROM customers;

    --  Not Oracle

    ```


    For SQLite, it wasn’t much effort as we’ve stored the dates as a string anyway.


    Here, we’ve coalesced the entire concatenated value `'' Born: '' || dob`. That’s
    because we want to replace the whole expression with the empty string if the `dob`
    is missing. Concatenating with a `NULL` should result in a `NULL`.


    For Oracle, you run again into the quirk of treating `NULL` strings as empty strings,
    so they won’t coalesce. We can work around it using `CASE`:


    ```

    --  Oracle

    SELECT

    id || '': '' || email

    || CASE

    WHEN dob IS NOT NULL THEN ''  Born: '' || dob

    END

    FROM customers;

    ```


    Basically, you can think of `coalesce` as a simplified `CASE` expression. With
    Oracle, you need to spell it out more.


    One reason you might want to change data types is to mix them with other values,
    such as concatenating the preceding strings. We’ll also see casting being used
    when we want to combine data from multiple tables or virtual tables, such as with
    joins and unions.


    Another reason to change data types is for sorting. All string data will normally
    sort alphabetically, but you may need to cast them as non-strings for sorting.
    For example:


    ```

    --  Integers

    SELECT * FROM sorting

    ORDER BY numberstring;

    SELECT * FROM sorting

    ORDER BY cast(numberstring as int);         -- not MySQL

    --  ORDER BY cast(numberstring as signed);  --  MySQL

    --  Dates (not SQLite)

    SELECT * FROM sorting

    ORDER BY datestring;

    SELECT * FROM sorting

    ORDER BY cast(datestring as date);

    ```


    In the `sorting` table, there are some values stored as strings which represent
    numbers or dates. The only way to sort them properly is to cast them first.


    Note that MySQL won’t let you cast to an integer directly. You have to use `SIGNED`
    (which means the same thing) or `UNSIGNED`. MariaDB is OK with integers.


    Not all casts from strings are successful, since the string may not resemble the
    correct type. For example:


    ```

    --  This works:

    SELECT cast(''23'' as int)    --  MySQL: as signed

    --  FROM dual   --  Oracle

    ;

    --  This doesn’t:

    SELECT cast(''hello'' as int) --  MySQL: as signed

    --  FROM dual   --  Oracle

    ;

    ```


    What happens next depends on the DBMS:


    *   MariaDB/MySQL will both give a `0` which is forgiving.


    *   MSSQL will give an error.


    However, you can use an alternative called `try_cast` which will simply give a
    `NULL`. If you wish, you can then coalesce the result.


    *   Oracle will also give an error.


    However, there is an optional default in this form:


    `cast(''hello'' as int DEFAULT 0 ON CONVERSION ERROR)`.


    It’s verbose but it allows an alternative to `0`, or whatever you like.


    *   PostgreSQL just gives an error.


    It’s possible to write a function to get around that.


    ### Numeric Calculations


    A number is normally used to count something—it’s the answer to the question “how
    many.” For example, how many centimeters in the customer’s height, or how many
    dollars were paid for this item?


    Numbers aren’t always used that way. Sometimes, they’re used as tokens or as codes.
    The calculations you might perform on a number would depend on how the number
    is being used.


    #### Basic Arithmetic


    You can always perform the basic operations on numbers:


    ```

    SELECT

    3*5 AS multiplication,

    4+7 AS addition,

    8-11 AS subtraction,

    20/3 AS division,

    20%3 AS remainder,  --  Oracle: mod(20,3),

    24/3*5 AS associativity,

    1+2*3 AS precedence,

    2*(3+4) + 5*(8-5) AS distributive

    --  FROM dual   --  Oracle

    ;

    ```


    This sample illustrates the main operations:


    | **mul…** | **add…** | **sub…** | **div…** | **rem…** | **ass…** | **pre…** |
    **dis…** |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 15 | 11 | -3 | 6 | 2 | 40 | 7 | 29 |


    Note that you’ll need to add `FROM dual` if you’re testing this in Oracle.


    Also note


    *   Different DBMSs have different attitudes to dividing integers. In some cases,
    `20/3` would give you a result of `6`, discarding the fraction. On other cases,
    you’d get something like `6.66...7` as a decimal.


    *   The `%` operator calculates the **remainder** after integer division. Oracle
    uses the `mod()` function.


    *   When mixing operations, SQL follows the rules you would have learned in school
    regarding precedence (which operators come first) and associativity (calculating
    from left to right). SQL also allows you to use parentheses to calculate expressions
    first.


    If you know someone who’s forgotten the basic rules of arithmetic, you can tell
    them


    1.  Do what’s inside parentheses first.


    2.  Do multiplication | division before addition | subtraction (precedence).


    3.  Do operations of the same precedence from left to right (associativity).


    Of course, these expressions work just the same whether the value is a literal
    or some stored or calculated value.'
  trans: "\n### 类型转换\n\n`cast()` 函数用于将一个值解释为不同的数据类型。回想一下，SQL 有三种主要数据类型：数字、字符串和日期。你可以使用\
    \ `cast` 来做以下两件事之一：\n\n*   你可以尝试将一种主要类型转换为另一种主要类型。\n    *   转换为字符串应该相当容易，但转换为另一种类型需要\
    \ SQL 知道如何解释该值。不同的数据库管理系统在转换失败时的反应不同。\n\n*   你可以在同一种主要类型内进行转换。例如，你可以在整数和十进制数之间转换，或者在日期和日期时间之间转换。\n\
    \    *   如果你将十进制数转换为整数、将日期时间转换为日期，或者将字符串转换为更短的字符串，你自然会丢失精度。如果你向相反方向转换，额外的精度将用相当于“无”的内容填充。\n\
    \    *   如果你确实转换为更窄的类型，它可能会正常工作，但不要过于冒险。例如，将数字 `123.45` 转换为 `decimal(4,2)` 将会失败，因为你没有允许足够的位数；你会得到一个溢出错误。\n\
    \n对于接下来的内容，请记住 SQLite 没有日期类型，所以你不用担心那种转换。稍后，我们会快速看一下 SQLite 中的等效方法。\n\n以下是一些在类型内进行转换的示例：\n\
    \n```sql\n--  更短的日期和数字\nSELECT\n--  非 SQLite:\ncast(ordered as date) AS ordered_date,\n\
    cast(total AS integer) AS whole_dollars\nFROM sales;\n--  更短的字符串\nSELECT cast(title\
    \ AS varchar(16)) AS short_title\nFROM books;\n--  更宽泛的日期和数字\nSELECT\n--  SQLite:\
    \ 没有日期类型\n--  PostgreSQL, Oracle\ncast(dob as timestamp) as long_dob,\n--  MariaDB\
    \ / MySQL, MSSQL\ncast(dob as datetime) as long_dob,\ncast(height as decimal(5,2))\
    \ as long_height\nFROM customers;\n```\n\n如果你将一个字符串转换为更长的类型，将会发生以下两种情况之一。如果你将其转换为\
    \ `CHAR`（固定长度）类型，额外的长度将用空格填充。如果你将其转换为 `VARCHAR` 类型，字符串将保持不变。但是，该字符串将被允许增长到更长的字符串。\n\
    \n在不同类型之间转换是另一回事。大多数数据库管理系统会在必要时自动转换为字符串。例如：\n\n```sql\n--  非 MSSQL\nSELECT id\
    \ || ': ' || email\nFROM customers;\n```\n\n你会得到类似这样的结果：\n\n| **?column?** |\n\
    | 42: may.knott61@example.net |\n| 459: rick.shaw459@example.net |\n| 597: ike.andy597@example.com\
    \ |\n| 186: pat.downe186@example.net |\n| 352: basil.isk352@example.net |\n| 576:\
    \ pearl.divers576@example.com |\n| ~ 303 rows ~ |\n\n如你所见，MSSQL 不会自动这样做，可能是因为与它们的连接运算符（`+`）混淆。在那里，你必须强制进行：\n\
    \n```sql\n--  MSSQL\nSELECT cast(id as varchar(5)) + ': ' + email\nFROM customers;\n\
    ```\n\n你也可以对日期做同样的事情。我们将对客户的出生日期这样做，但我们会遇到一些出生日期缺失的复杂情况。使用 `coalesce` 应该可以解决这个问题：\n\
    \n```sql\n--  PostgreSQL, MariaDB/MySQL, SQlite\nSELECT\nid || ': ' || email\n\
    || coalesce('  Born: ' || dob,'')\nFROM customers;\n--  MSSQL\nSELECT\ncast(id\
    \ as varchar(5)) + ': ' + email\n+ coalesce('  Born: ' + cast(dob as char(10)),'')\n\
    FROM customers;\n--  非 Oracle\n```\n\n对于 SQLite，这并不费力，因为我们无论如何都是将日期存储为字符串。\n\n\
    在这里，我们对整个连接值 `' Born: ' || dob` 使用了 `coalesce`。这是因为我们希望在 `dob` 缺失时用空字符串替换整个表达式。与\
    \ `NULL` 连接应该会导致 `NULL`。\n\n对于 Oracle，你会再次遇到将 `NULL` 字符串视为空字符串的怪癖，因此它们不会被合并。我们可以使用\
    \ `CASE` 来解决这个问题：\n\n```sql\n--  Oracle\nSELECT\nid || ': ' || email\n|| CASE\n\
    WHEN dob IS NOT NULL THEN '  Born: ' || dob\nEND\nFROM customers;\n```\n\n基本上，你可以将\
    \ `coalesce` 视为简化的 `CASE` 表达式。对于 Oracle，你需要更明确地写出来。\n\n你可能想要更改数据类型的一个原因是为了将它们与其他值混合，例如连接前面的字符串。当我们想要组合来自多个表或虚拟表（例如连接和联合）的数据时，也会看到使用类型转换。\n\
    \n另一个改变数据类型的原因是排序。所有字符串数据通常按字母顺序排序，但你可能需要将它们转换为非字符串类型以进行排序。例如：\n\n```sql\n-- \
    \ 整数\nSELECT * FROM sorting\nORDER BY numberstring;\nSELECT * FROM sorting\nORDER\
    \ BY cast(numberstring as int);         --  非 MySQL\n--  ORDER BY cast(numberstring\
    \ as signed);  --  MySQL\n--  日期 (非 SQLite)\nSELECT * FROM sorting\nORDER BY datestring;\n\
    SELECT * FROM sorting\nORDER BY cast(datestring as date);\n```\n\n在 `sorting`\
    \ 表中，有一些存储为字符串的值代表数字或日期。对它们进行正确排序的唯一方法是先进行类型转换。\n\n请注意，MySQL 不允许直接转换为整数。你必须使用\
    \ `SIGNED`（意思相同）或 `UNSIGNED`。MariaDB 可以接受整数。\n\n并非所有从字符串的转换都会成功，因为字符串可能与正确的类型不相似。例如：\n\
    \n```sql\n--  这个可以：\nSELECT cast('23' as int)    --  MySQL: as signed\n--  FROM\
    \ dual   --  Oracle\n;\n--  这个不行：\nSELECT cast('hello' as int) --  MySQL: as signed\n\
    --  FROM dual   --  Oracle\n;\n```\n\n接下来会发生什么取决于数据库管理系统：\n\n*   MariaDB/MySQL\
    \ 都会给出一个 `0`，这比较宽容。\n*   MSSQL 会给出一个错误。\n    *   不过，你可以使用一个名为 `try_cast` 的替代方法，它只会给出一个\
    \ `NULL`。如果你愿意，你可以合并结果。\n*   Oracle 也会给出一个错误。\n    *   不过，在这个形式中有一个可选的默认值：`cast('hello'\
    \ as int DEFAULT 0 ON CONVERSION ERROR)`。它比较冗长，但它允许使用 `0` 或其他你喜欢的值作为替代。\n*   PostgreSQL\
    \ 直接给出错误。\n    *   可以编写一个函数来绕过它。\n\n### 数值计算\n\n数字通常用于计数某些东西——它是对“多少”这个问题的答案。例如，客户身高有多少厘米，或者这件物品支付了多少美元？\n\
    \n数字并不总是那样使用。有时，它们被用作令牌或代码。你可能对数字执行的计算将取决于数字的使用方式。\n\n#### 基本算术\n\n你总是可以对数字执行基本操作：\n\
    \n```sql\nSELECT\n3*5 AS multiplication,\n4+7 AS addition,\n8-11 AS subtraction,\n\
    20/3 AS division,\n20%3 AS remainder,  --  Oracle: mod(20,3),\n24/3*5 AS associativity,\n\
    1+2*3 AS precedence,\n2*(3+4) + 5*(8-5) AS distributive\n--  FROM dual   --  Oracle\n\
    ;\n```\n\n此示例说明了主要操作：\n\n| **mul…** | **add…** | **sub…** | **div…** | **rem…**\
    \ | **ass…** | **pre…** | **dis…** |\n| --- | --- | --- | --- | --- | --- | ---\
    \ | --- |\n| 15 | 11 | -3 | 6 | 2 | 40 | 7 | 29 |\n\n请注意，如果你在 Oracle 中测试这个，需要添加\
    \ `FROM dual`。\n\n另请注意\n*   不同的数据库管理系统对整数除法的态度不同。在某些情况下，`20/3` 会给你一个 `6` 的结果，丢弃小数部分。在其他情况下，你会得到像\
    \ `6.66...7` 这样的十进制数。\n*   `%` 运算符计算整数除法后的 **余数**。Oracle 使用 `mod()` 函数。\n*   当混合操作时，SQL\
    \ 遵循你在学校学到的关于优先级（哪些运算符先计算）和结合性（从左到右计算）的规则。SQL 也允许你使用括号先计算表达式。\n\n如果你认识忘记算术基本规则的人，你可以告诉他们\n\
    1.  先算括号里的。\n2.  先算乘法 | 除法，再算加法 | 减法（优先级）。\n3.  相同优先级的操作从左到右计算（结合性）。\n\n当然，无论值是字面量还是某些存储或计算的值，这些表达式的工作方式都是一样的。\n"
- fmt: "\n## Mathematical Functions\n\nThere are some mathematical functions as well.\
    \ For the most part, the mathematical functions won’t get a lot of use unless\
    \ you’re doing something fairly specialized.\n\n```sql\nSELECT\npi() AS pi,  \
    \          --  Not Oracle\nsin(radians(45)) AS sin45,  --  Not Oracle\nsqrt(2)\
    \ AS root2,      --  √2\nlog10(3) AS log3,\nln(10) AS ln10,        --  Natural\
    \ Logarithm\npower(4,3) AS four_cubed    --  4³\n--  FROM dual               \
    \   --  Oracle\n;\n--  Oracle's Trigometric functions are less convenient\nSELECT\n\
    acos(-1) AS pi,\nsin(45*acos(-1)/180) AS sin45\nFROM dual;\n```\n\nThe results\
    \ look something like this:\n\n| `pi` | `sin45` | `root2` | `log3` | `ln10` |\
    \ `four_cubed` |\n| --- | --- | --- | --- | --- | --- |\n| 3.142 | 0.707 | 1.414\
    \ | 0.477 | 2.303 | 64 |\n\nSo, now you can use SQL to find the length of a ladder\
    \ leaning against a wall or the distance between two ships lost at sea.\n\n##\
    \ Approximation Functions\n\nThere are also functions which give an approximate\
    \ value of a decimal number. Here is a sample with variations between DBMSs:\n\
    \n```sql\nSELECT\nceiling(200/7.0) AS ceiling,\n--  SQLite: round(200/7.0 + 0.5),\n\
    --  Oracle: ceil(200/7.0),\nfloor(200/7.0) AS floor,\n--  SQLite: round(200/7.0\
    \ - 0.5),\nround(200/7.0,0) AS rounded_integer,\n--  or round(200/7), --  not\
    \ MSSQL\nround(200/7.0,2) AS rounded_decimal\n--  FROM DUAL   -- Oracle\n;\n```\n\
    \nAs you see, the functions all tend to lose precision:\n\n| `ceiling` | `floor`\
    \ | `rounded_integer` | `rounded_decimal` |\n| --- | --- | --- | --- |\n| 29 |\
    \ 28 | 29 | 28.57 |\n\nIf you use the `cast()` function to another narrow number\
    \ type, you’ll also lose precision. However, what happens next depends on the\
    \ DBMS:\n\n| `DBMS` | `castint` | `castdec` |\n| --- | --- | --- |\n| PostgreSQL\
    \ | 235 | 234.57 |\n| MariaDB/MySQL | 235 | 234.57 |\n| Oracle | 235 | 234.57\
    \ |\n| MSSQL | 234 | 234.57 |\n| SQLite | 234 | 234.567 |\n\n```sql\nSELECT\n\
    cast(234.567 AS int) AS castint,\n--  cast(234.567 AS unsigned),  --  MySQL\n\
    cast(234.567 AS decimal(5,2)) AS castdec\n--  FROM dual               --  Oracle\n\
    ;\n```\n\n*   With PostgreSQL, Oracle, and MariaDB/MySQL, casting to an integer\
    \ or a shorter decimal will round off the number.\n*   With MSSQL, casting to\
    \ a shorter decimal will round off the number, but casting to an integer will\
    \ truncate it. If you want the integer truncated, you can use something like `decimal(3,0)`.\n\
    *   With SQLite, casting to an integer will truncate, while casting to a decimal\
    \ is ignored and retains the original value.\n\n## Formatting Numbers\n\nFormatting\
    \ functions change the appearance of a number. Unlike approximation and other\
    \ functions, the result of a formatting function is not a number but is a string;\
    \ that’s the only way you can change the way a number appears.\n\nFor numbers,\
    \ most of what you want to do is change the number of decimal places, display\
    \ the thousands separator, and possibly currency symbols.\n\nAgain, the different\
    \ DBMSs have wildly different functions. As an example, here are some ways of\
    \ formatting a number as currency with thousands separators:\n\n```sql\n--  PostgreSQL,\
    \ Oracle\nSELECT\nto_char(total,'FM999G999G999D00') AS local_number,\nto_char(total,'FML999G999G999D00')\
    \ AS local_currency\nFROM sales;\nSELECT to_char(total,'FM$999,999,999.00') FROM\
    \ sales;\n\n--  MariaDB/MySQL\nSELECT\nformat(total,2) AS local_number,\nformat(total,2,'de_DE')\
    \ AS specific_number\nFROM sales;\n\n--  MSSQL\nSELECT\nformat(total,'n') AS local_number,\n\
    format(total,'c') AS local_currency\nFROM sales;\n\n--  SQLite\nSELECT printf('$%,d.%02d',total,round(total*100)%100)\n\
    FROM sales;\n```\n\nYou’ll get variations of the following:\n\n| `local_number`\
    \ | `local_currency` |\n| --- | --- |\n| 28.00 | $28.00 |\n| 34.00 | $34.00 |\n\
    | 58.50 | $58.50 |\n| 50.00 | $50.00 |\n| 17.50 | $17.50 |\n| 13.00 | $13.00 |\n\
    | ~ 5549 rows ~ |\n\nNote\n\n*   Both PostgreSQL and Oracle have a flexible `to_char()`\
    \ function which can also be used to format dates.\n*   MariaDB/MySQL uses the\
    \ `format()` function which adds thousands separators and decimal places; you\
    \ can also tell it to adjust for different locales.\n*   MSSQL has its own `format()`\
    \ function with its more intuitive formatting codes; it also adjusts for locales\
    \ and can be used to format a date.\n*   SQLite only has a generic `format()`,\
    \ a.k.a. `printf()`, function, which will be more familiar to programmers; SQLite\
    \ presumes that you will format data in the host application such as PHP or wherever\
    \ SQLite has been embedded.\n\nNote that if you do run a number through a formatting\
    \ function, it is no longer a number! If all you do is look at it, then that doesn’t\
    \ matter. However, if you have plans to do any further calculations, or to sort\
    \ the results, then a formatted number is likely to backfire on you.\n\nWhen all\
    \ is said and done, formatting is probably something you won’t do much in SQL.\
    \ The main purpose of SQL is to get the data and prepare it for the next step.\
    \ Formatting comes last and is often done in other software.\n\n### String Calculations\n\
    \nA string is a string of characters, hence the name. In SQL, this is referred\
    \ to as character data.\n\nTraditionally, SQL has two main data types for strings:\n\
    \n*   Character: `CHAR(length)` is a fixed-length string. If you enter fewer characters\
    \ than the length, then the string will be right-padded with spaces. This probably\
    \ explains why standard SQL ignores trailing spaces for string comparison.\n*\
    \   Character varying: `VARCHAR(length)` is a limited length string. If you enter\
    \ a shorter string, it will not be padded.\n\nIn principle, `CHAR()` is more efficient\
    \ for processing since it’s always the same length, and the DBMS doesn’t need\
    \ to worry about working out the size and making things fixed. `VARCHAR()` is\
    \ supposed to be more efficient for storage.\n\nIn reality, modern DBMSs are much\
    \ cleverer than their ancestors, and the difference between the two types is not\
    \ very important anymore. For example, PostgreSQL recommends always using `VARCHAR`\
    \ since it actually handles that type more efficiently.\n\nMost DBMSs offer a\
    \ third type, `TEXT`, which is, in principle, unlimited in length. Again, modern\
    \ DBMSs allow longer standard strings than they used to, so again this is not\
    \ so important. Microsoft has deprecated `TEXT` in favor of `VARCHAR(MAX)` which\
    \ does the same job.\n\nA string literal is written between single quotes:\n\n\
    ```sql\nSELECT 'hello'; --  Oracle: FROM dual;\n```\n\nWhen working with strings,\
    \ you normally simply want to save them and fetch them. However, you can process\
    \ the strings themselves. This is usually one of the following operations:\n\n\
    *   **Concatenation** means joining strings together.\n    Concatenation is the\
    \ only direct operation on strings. All other operations make use of functions.\n\
    *   Some functions will make changes to a string. They don’t actually change the\
    \ string, but return a changed version of the string.\n*   Some functions can\
    \ be used to extract parts of a string.\n*   Some functions are more concerned\
    \ with individual characters of the string.\n"
