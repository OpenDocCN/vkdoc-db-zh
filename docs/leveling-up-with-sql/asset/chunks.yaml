    ![](images/606708_1_En_1_Chapter/606708_1_En_1_Fig4_HTML.jpg)


    An illustration represents two database tables labeled written and processed,
    listing six clauses. In the written table, the select clause is listed at the
    top, while in the processed table, it has moved to fifth place.


    Figure 1-4


    SQL Clause Order


    The important thing to remember is that the `SELECT` clause is the last to be
    evaluated before the `ORDER BY` clause. That means that only the `ORDER BY` clause
    can use values and aliases produced in the `SELECT` clause.^([²](#fn2))


    As we’ll see later in the book, there are additional clauses which are extensions
    to the one we have here.


    #### Filtering Data with the WHERE Clause


    **A table can be filtered using** **the** `WHERE` **clause****.**


    **When you have a large number of rows, you can filter them using the** `WHERE`
    **clause. The** `WHERE` **clause is followed by one or more assertions which evaluate
    either to true or false, determining whether a particular row is to be included
    in the result set.**


    **The syntax for the** `WHERE` **clause** **is**


    ```

    SELECT columns

    FROM table

    WHERE conditions;

    ```


    The conditions are one or more assertions, expressions which evaluate to true
    or not true. If an assertion is not true, it’s not necessarily false either. Typically,
    if the expression involves `NULL`, the result will be unknown, which is also not
    true.


    *   `NULL` represents a missing value, so testing it is tricky.


    *   `NULL`s will always fail a comparison, such as the equality operator (`=`).


    Testing for `NULL` requires the special expression `IS NULL` or `IS NOT NULL`.


    ##### Multiple Assertions


    You can combine multiple assertions with the logical `AND` and `OR` operators.
    If you combine them, `AND` takes precedence over `OR`.


    The `IN` operator will match from a list. It is the equivalent of multiple `OR`
    expressions. It can also be used with a subquery which generates a single column
    of values.


    ##### Wildcard Matches


    Strings can be compared more loosely using wildcard patterns and the `LIKE` operator.


    *   Wildcards include special pattern characters.


    *   Some DBMSs allow you to use `LIKE` with non-string data, implicitly converting
    them to strings for comparison.


    *   Some DBMSs supplement the standard wildcard characters with additional patterns.


    *   Some DBMSs support regular expressions, which are more sophisticated than
    regular wildcard pattern matching.


    #### Sorting with the ORDER BY Clause


    SQL tables are unordered collections of rows.


    *   Row order is insignificant and may be unexpected.


    *   You can sort the results using an `ORDER BY` clause.


    Sorting a table is done using the `ORDER BY` clause:


    ```

    SELECT columns

    FROM table

    --  WHERE ...

    ORDER BY ...;

    ```


    The `ORDER BY` clause is both the last to be written and the last to be evaluated.


    *   Sorting does not change the actual table, just the order of the results for
    the present query.


    *   You can sort using original columns or calculated values.


    *   You can sort using multiple columns, which will effectively group the rows;
    column order is arbitrary, but will affect how the grouping is effected.


    *   By default, each sorting column is sorted in increasing (ascending) order.
    Each sorting column can be qualified by the `DESC` clause which will sort in decreasing
    (descending) order. You can also add `ASC` which changes nothing as it’s the default
    anyway.


    *   Different DBMSs will have their own approach as to where to place sorted `NULL`s,
    but they will all be grouped either at the beginning or the end.


    *   Data types will affect the sort order.


    *   Some DBMSs will sort upper and lower case values separately.


    ##### Limiting Results


    A `SELECT` statement can also include a limit on the number of rows. This feature
    has been available unofficially for a long time, but is now an official feature.


    The official form is something like


    ```

    SELECT ...

    FROM ...

    ORDER BY ... OFFSET ... ROWS FETCH FIRST ... ROWS ONLY;

    ```


    This is supported in PostgreSQL, MSSQL, and Oracle.


    Many DBMSs still offer their proprietary unofficial limiting clauses. The most
    common unofficial version is something like


    ```

    SELECT ...

    FROM ...

    ORDER BY ... LIMIT ... OFFSET ...;

    ```


    This is supported in PostgreSQL (which also supports `OFFSET ... FETCH`), MariaDB/MySQL,
    and SQLite.


    MSSQL also has a simple `TOP` clause added to the `SELECT` clause.


    ##### Sorting Strings


    Sorting alphabetically is, by and large, meaningless. However, there are techniques
    to sort strings in a more meaningful order.


    ### Calculating Columns


    In SQL, there are three main data types: numbers, strings, and dates. Each data
    type has its own methods and functions to calculate values:


    *   For numbers, you can do simple arithmetic and calculate with more complex
    functions. There are also functions which approximate numbers.


    *   For dates, you can calculate an age between dates or offset a date. You can
    also extract various parts of the date.


    *   For strings, you can concatenate them, change parts of the string, or extract
    parts of the string.


    *   For numbers and dates, you can generate a formatted string which gives you
    a possibly more friendly version.


    #### Calculating with NULLs


    Whenever a calculation involves a `NULL`, it has a catastrophic effect on the
    result, and the result will normally be `NULL`.


    In some cases, you may be able to substitute a value using `coalesce()` which
    will replace `NULL` with a reasonable alternative. Of course, you will need to
    work out what you mean by “reasonable.”


    ##### Aliases


    Every column should have a distinct name. When you calculate a value, you supply
    this name as an alias using `AS`. You can also do this with noncalculated columns
    to provide a more suitable name.


    Aliases and other names should be distinct. They should also follow standard column
    naming rules, such as not being the same as an SQL keyword and not having special
    characters.


    If, for any reason, a name or an alias needs to break the naming rules, you can
    always wrap the name in double quotes (`"double quotes"`) or whatever the DBMS
    supplies as an alternative.


    Some DBMSs have an alternative to double quotes, but you should prefer double
    quotes if possible.


    ##### Subqueries


    A subquery is an additional `SELECT` statement used as part of the main query.


    A column can also include a value derived from a subquery. This is especially
    useful if you want to include data from a separate related table. If the subquery
    involves a value from the main table, it is said to be correlated. Such subqueries
    can be costly, but are nonetheless a useful technique.


    #### The CASE Expression


    You can generate categories using `CASE` `... END`, which tests a value against
    possible matches and results in one out of a number of alternative values.'
  trans: '### 数据类型


    粗略来说，主要有三种数据类型：


    *   数字

    *   字符串

    *   日期和时间


    数字字面量以裸露形式表示：它们没有任何引号。


    数字按照数轴顺序进行比较，并且可以使用基本的比较运算符进行筛选。


    字符串字面量用单引号书写。一些数据库管理系统也允许使用双引号，但双引号更准确地应用于列名而非值。


    *   在某些数据库管理系统和数据库中，大小写可能不匹配。

    *   尾随空格应该被忽略，但并非总是如此。


    日期字面量也使用单引号。


    *   首选的日期格式是 ISO8601 (`yyyy-mm-dd`)，尽管 Oracle 不太喜欢这种格式。

    *   大多数数据库管理系统允许替代格式，但应避免使用 `??/??/yyyy` 格式，因为它在各地的含义并不相同。


    日期按照历史顺序进行比较。


    ### SQL 子句


    在典型的 `SELECT` 语句中，我们最多使用六个子句。SQL 子句按照特定顺序书写。然而，它们的处理顺序略有不同，如图 1-4 所示。


    ![](img/606708_1_En_1_Fig4_HTML.jpg)


    图 1-4：SQL 子句顺序。一幅示意图代表了两个分别标记为“书写顺序”和“处理顺序”的数据库表，列出了六个子句。在“书写顺序”表中，SELECT 子句列在顶部，而在“处理顺序”表中，它移动到了第五位。


    需要记住的重要一点是，在 `ORDER BY` 子句之前，`SELECT` 子句是最后被求值的。这意味着只有 `ORDER BY` 子句可以使用在 `SELECT`
    子句中生成的值和别名。^²


    正如我们将在本书后面看到的，还有一些额外的子句是对我们这里所介绍内容的扩展。


    #### 使用 WHERE 子句筛选数据


    可以使用 `WHERE` 子句对表进行筛选。


    当你拥有大量行时，你可以使用 `WHERE` 子句对它们进行筛选。`WHERE` 子句后跟一个或多个断言，这些断言的评估结果要么为真，要么为假，从而决定某一行是否应包含在结果集中。


    `WHERE` 子句的语法是


    ```

    SELECT columns

    FROM table

    WHERE conditions;

    ```


    条件是一个或多个断言，即评估结果为真或不为真的表达式。如果一个断言不为真，它也未必为假。通常，如果表达式涉及 `NULL`，结果将是未知的，这同样不是真。


    *   `NULL` 代表一个缺失的值，因此测试它很棘手。

    *   `NULL` 在任何比较中（例如等号运算符 `=`）总是会失败。


    测试 `NULL` 需要特殊的表达式 `IS NULL` 或 `IS NOT NULL`。


    ##### 多重断言


    你可以使用逻辑 `AND` 和 `OR` 运算符组合多个断言。当你组合它们时，`AND` 的优先级高于 `OR`。


    `IN` 运算符将与列表中的值进行匹配。它等同于多个 `OR` 表达式。它也可以与生成单列值的子查询一起使用。


    ##### 通配符匹配


    可以使用通配符模式和 `LIKE` 运算符更宽松地比较字符串。


    *   通配符包括特殊的模式字符。

    *   一些数据库管理系统允许你将 `LIKE` 与非字符串数据一起使用，会隐式地将其转换为字符串进行比较。

    *   一些数据库管理系统用额外的模式补充了标准的通配符字符。

    *   一些数据库管理系统支持正则表达式，它比常规的通配符模式匹配更为复杂。


    #### 使用 ORDER BY 子句排序


    SQL 表是行的无序集合。


    *   行的顺序无关紧要，并且可能出人意料。

    *   你可以使用 `ORDER BY` 子句对结果进行排序。


    对表进行排序是使用 `ORDER BY` 子句完成的：


    ```

    SELECT columns

    FROM table

    --  WHERE ...

    ORDER BY ...;

    ```


    `ORDER BY` 子句既是最后书写的，也是最后被求值的。


    *   排序不会改变实际的表，只会改变当前查询结果的顺序。

    *   你可以使用原始列或计算值进行排序。

    *   你可以使用多个列进行排序，这将有效地对行进行分组；列的顺序是任意的，但会影响分组的方式。

    *   默认情况下，每个排序列按递增（升序）顺序排序。每个排序列都可以通过 `DESC` 子句进行限定，该子句将按递减（降序）顺序排序。你也可以添加 `ASC`，这不会有任何改变，因为它本来就是默认值。

    *   不同的数据库管理系统对于排序后的 `NULL` 值放置位置有各自的做法，但它们都会将 `NULL` 值分组在开头或末尾。

    *   数据类型会影响排序顺序。

    *   一些数据库管理系统会分别对大小写值进行排序。


    ##### 限制结果数量


    `SELECT` 语句也可以包含对行数的限制。这个功能长期以来一直是非官方的特性，但现在已成为官方功能。


    官方形式类似于


    ```

    SELECT ...

    FROM ...

    ORDER BY ... OFFSET ... ROWS FETCH FIRST ... ROWS ONLY;

    ```


    这在 PostgreSQL、MSSQL 和 Oracle 中得到支持。


    许多数据库管理系统仍然提供其专有的、非官方的限制子句。最常见的非官方版本类似于


    ```

    SELECT ...

    FROM ...

    ORDER BY ... LIMIT ... OFFSET ...;

    ```


    这在 PostgreSQL（它也支持 `OFFSET ... FETCH`）、MariaDB/MySQL 和 SQLite 中得到支持。


    MSSQL 还有一个简单的 `TOP` 子句，可以添加到 `SELECT` 子句中。


    ##### 排序字符串


    按字母顺序排序在很大程度上是没有意义的。然而，有一些技术可以以更有意义的顺序对字符串进行排序。


    ### 计算列


    在 SQL 中，主要有三种数据类型：数字、字符串和日期。每种数据类型都有其自己的计算值的方法和函数：


    *   对于数字，你可以进行简单的算术运算，并使用更复杂的函数进行计算。还有一些函数可以对数字进行近似计算。

    *   对于日期，你可以计算日期之间的年龄或对日期进行偏移。你也可以提取日期的各个部分。

    *   对于字符串，你可以连接它们、更改字符串的部分内容或提取字符串的部分内容。

    *   对于数字和日期，你可以生成格式化的字符串，这可能会提供更友好的版本。


    #### 使用 NULL 值进行计算


    每当计算涉及 `NULL` 时，它会对结果产生灾难性的影响，结果通常会是 `NULL`。


    在某些情况下，你或许可以使用 `coalesce()` 替换一个值，它会用一个合理的替代值替换 `NULL`。当然，你需要确定什么对于你来说是“合理的”。


    ##### 别名


    每一列都应该有一个不同的名称。当你计算一个值时，你可以使用 `AS` 提供这个名称作为别名。你也可以对非计算列这样做，以提供一个更合适的名称。


    别名和其他名称应该是唯一的。它们还应遵循标准的列命名规则，例如不与 SQL 关键字相同，并且不包含特殊字符。


    如果由于任何原因，名称或别名需要打破命名规则，你总是可以将名称用双引号 (`"双引号"`) 括起来，或者使用数据库管理系统提供的任何替代符号。


    一些数据库管理系统有双引号的替代符号，但如果可能，你应该优先使用双引号。


    ##### 子查询


    子查询是一个额外的 `SELECT` 语句，用作主查询的一部分。


    一列也可以包含源自子查询的值。如果你想包含来自单独相关表的数据，这尤其有用。如果子查询涉及来自主表的值，则称为相关子查询。这种子查询可能开销很大，但仍然是一种有用的技术。


    #### CASE 表达式


    你可以使用 `CASE ... END` 生成类别，它测试一个值与可能的匹配项，并从多个备选值中得出一个结果。'
- fmt: "### Type Conversion\n\nYou may be able to change the data type of a value,\
    \ using `cast()`:\n\n*   You can change within a main type to a type with more\
    \ or less detail.\n*   You can sometimes change between major types if the value\
    \ sufficiently resembles the other type.\n\nSometimes, casting is performed automatically,\
    \ but sometimes you need to do it yourself.\n\nOne case where you might need to\
    \ cast from a string is when you need a date literal. Since both string and date\
    \ literals use single quotes, SQL might misinterpret the date for a string.\n\n\
    ### Views\n\nYou can save a `SELECT` statement into the database by creating a\
    \ view. A view allows you to save a complex statement as a virtual table, which\
    \ you can use later in a simpler form.\n\nViews are a good way of building a collection\
    \ of useful statements.\n\n## Joins\n\nVery often, you will create a query which\
    \ involves data from multiple tables. Joins effectively widen tables by attaching\
    \ corresponding rows from the other tables.\n\nThe basic syntax for a join is\n\
    \n```sql\nSELECT columns\nFROM table JOIN table;\n```\n\nThere is an older syntax\
    \ using the `WHERE` clause, but it’s not as useful for most joins.\n\nAlthough\
    \ tables are joined pairwise, you can join any number of tables to get results\
    \ from any related tables.\n\nWhen joining tables, it is best to distinguish the\
    \ columns. This is especially important if the tables have column names in common:\n\
    \n*   You should fully qualify all column names.\n*   It is helpful to use table\
    \ aliases to simplify the names. These aliases can then be used to qualify the\
    \ columns.\n\n### The ON Clause\n\nThe `ON` clause is used to describe which rows\
    \ from one table are joined to which rows from the other, by declaring which columns\
    \ from each should match.\n\nThe most obvious join is from the child table’s foreign\
    \ key to the parent table’s primary key. More complex joins are possible.\n\n\
    You can also create `ad hoc` joins which match columns which are not in a fixed\
    \ relationship.\n\n### Join Types\n\nThe default join type is the `INNER JOIN`.\
    \ The `INNER` is presumed when no join type is specified:\n\n*   An `INNER JOIN`\
    \ results only in child rows for which there is a parent. Rows with a `NULL` foreign\
    \ key are omitted.\n*   An `OUTER JOIN` is an `INNER JOIN` combined with unmatched\
    \ rows. There are three types of `OUTER JOIN`:\n    *   A `LEFT` or `RIGHT` join\
    \ includes unmatched rows from one of the joined tables.\n    *   A `FULL` join\
    \ includes unmatched rows from both tables.\n    *   A `NATURAL` join matches\
    \ two columns with identical names and doesn’t require an `ON` clause. It is particularly\
    \ useful in joining one-to-one tables. Not all DBMSs support this.\n\nThere is\
    \ also a `CROSS JOIN`, which combines every row in one table with every row in\
    \ the other. It’s not generally useful, but can be handy when you cross join with\
    \ a single row of variables.\n\n## Aggregates\n\nInstead of just fetching simple\
    \ data from the database tables, you can generate various summaries using aggregate\
    \ queries. Aggregate queries use one or more aggregate functions and imply some\
    \ groupings of the data.\n\nAggregate queries effectively transform the data into\
    \ a secondary summary table. With grand total aggregates, you can only select\
    \ summaries. You cannot also select non-aggregate values.\n\nThe main aggregate\
    \ functions include\n\n*   `count()`, which counts the number of rows or values\
    \ in a column\n*   `min()` and `max()` which fetch the first or last of the values\
    \ in sort order\n\nFor numbers, you also have\n\n*   `sum()`, `avg()`, and `stdev()`\
    \ (or `stddev()`) which perform the sum, average, and standard deviation on a\
    \ column of numbers\n\nWhen it comes to working with numbers, not all numbers\
    \ are used in the same way, so not all numbers should be summarized.\n\nFor strings,\
    \ you also have\n\n*   `string_agg()`, `group_concat()`, or `listagg()`, depending\
    \ on the DBMS, which concatenates strings in a column\n\nIn all cases, aggregate\
    \ functions only work with values: they all skip over `NULL`.\n\nYou can control\
    \ which values in a column are included:\n\n*   You can use `DISTINCT` to count\
    \ only one instance of each value.\n*   You can use `CASE ... END` to work as\
    \ a filter for certain values.\n\nWithout a `GROUP BY` clause, or using `GROUP\
    \ BY ()`, the aggregates are grand totals: you will get one row of summaries.\n\
    \nYou can also use `GROUP BY` to generate summaries in multiple groups. Each group\
    \ is distinct. When you do, you get summaries for each group, as well as additional\
    \ columns with the group values themselves.\n\nAggregates are not limited to single\
    \ tables:\n\n*   You can join multiple tables and aggregate the result.\n*   You\
    \ can join an aggregate to one or more other tables.\n\nIn many cases, it makes\
    \ sense to work with your aggregates in more than one step. For that, it’s convenient\
    \ to put your first step into a common table expression, which is a virtual table\
    \ which can be used with the next step.\n\nWhen grouping your data, sometimes\
    \ you want to filter some of the groups. This is done with a `HAVING` clause,\
    \ which you add after the `GROUP BY` clause.\n\n## Working with Tables\n\nTables\
    \ are created using the `CREATE TABLE` statement. This statement includes\n\n\
    *   Column names\n*   Data types\n*   Other table and column properties\n\nA table\
    \ design can be changed afterward, such as adding triggers or indexes. More serious\
    \ changes, such as adding or dropping columns, can be effected using `ALTER TABLE`\
    \ statements.\n\n### Data Types\n\nThere are three main types of data:\n\n*  \
    \ Numbers\n*   Strings\n*   Dates\n\nThere are many variations of the preceding\
    \ types which make data storage and processing more efficient and help to validate\
    \ the data values.\n\nThere are also additional types such as boolean or binary\
    \ data, which you won’t see so much in a typical database.\n\n### Constraints\n\
    \nConstraints define what values are considered valid. Standard constraints include\n\
    \n*   `NOT NULL`\n*   `UNIQUE`\n*   `DEFAULT`\n*   Foreign keys (`REFERENCES`)\n\
    \nYou can construct your own additional constraints with the generic `CHECK` constraint.\
    \ Here, you add a condition similar to a `WHERE` clause which defines your own\
    \ particular validation rule.\n\n### Foreign Keys\n\nA foreign key is a reference\
    \ to another table and is also regarded as a constraint, in that it limits values\
    \ to those which match the other table.\n\nThe foreign key is defined in the child\
    \ table.\n\nA foreign key also affects any attempt to delete a row from the parent\
    \ table. By default, the parent row cannot be deleted if there are matching child\
    \ rows. However, this can be changed to either (a) setting the foreign key to\
    \ `NULL` or (b) cascading the delete to all of the children.\n\n### Indexes\n\n\
    Since tables are not stored in any particular order, they can be time consuming\
    \ to search. An optional index can be added for any column you routinely search,\
    \ which makes searching much quicker.\n\n## Manipulating Data\n\nData manipulation\
    \ statements are used to add or change data. In addition to the `SELECT` statement,\
    \ there are\n\n*   `INSERT`: Add new rows to the table\n*   `UPDATE`: Change the\
    \ data in one or more rows in the table\n*   `DELETE`: Delete one or more rows\
    \ of the table\n\nLike `SELECT`, the `UPDATE` and `DELETE` statements can be qualified\
    \ with a `WHERE` clause to determine which rows will be affected.\n\nUnlike `SELECT`,\
    \ these have the potential to make a mess of a database, especially since SQL\
    \ doesn’t have an undo."
