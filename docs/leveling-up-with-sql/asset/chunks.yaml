    虽然我们一直在前端客户端上花费时间，但这并非数据的必然归宿。通常，我们会在外部应用程序（如报表软件）中使用数据。


    最有意义的是在将数据用于外部应用程序之前，尽可能多地进行预处理。特别是，连接表或运行子查询应该在数据库端完成，而不是之后。


    请注意，有些事情数据库无法轻易完成。例如，可能存在数据格式要求或某些数据库服务器不支持的函数。为此，你需要提取原始数据并在外部应用程序中处理。


    与外部应用程序协作的例子包括：


    -   与文字处理器进行邮件合并

    -   在电子表格中使用数据透视表

    -   与报表软件配合使用


    这类软件通常在数据操作方面能力有限，因此尽可能多地进行预处理是明智的。从外部软件的角度来看，你的视图将被视为单个表（尽管通常它们仍会表明自己实际上是视图）。


    ## 缓存数据与临时表


    一些数据库管理系统提供物化视图。这是一种可以缓存数据的视图类型。其结果是，重复从视图读取数据（不一定）需要重新处理。


    当你使用视图时，你可能会给数据库管理系统带来额外的负担。如果视图需要进行一些复杂的处理和连接，那么每次查看视图时，你都会发现自己在重复进行额外的工作。


    一些数据库管理系统通过保留一份结果的副本来“作弊”，只要下次访问的时间不太晚，并且相关表没有发生变化。这个副本被称为**缓存**，是否这样做由数据库管理系统决定。


    一些数据库管理系统支持物化视图，使这一过程正式化。物化视图在数据库中分配了存储空间来维护结果的副本。这在处理上成本更低，因为数据库管理系统不需要如此频繁地处理相同的数据，但在存储上成本更高。通常，你可能会发现额外的存储比处理能力更便宜。


    物化视图并未得到广泛支持，有时用处有限。然而，你可以通过临时表走得很远。


    原则上，所有 SQL 表都是临时的，因为总是可以删除一个表——在 SQL 中，如同在生活中，没有什么是真正永恒的。但是，临时表是注定短暂存在的，并且会在你关闭会话时自我销毁。


    你可以像创建真实表一样创建临时表，但使用 `TEMPORARY` 前缀：


    ```

    --  PostgreSQL, MariaDB/MySQL, SQLite

    CREATE TEMPORARY TABLE somebooks (

    id INT PRIMARY KEY,

    title VARCHAR(255),

    author VARCHAR(255),

    price DECIMAL(4,2)

    );

    --  Oracle

    CREATE GLOBAL TEMPORARY TABLE somebooks (

    id INT PRIMARY KEY,

    title VARCHAR(255),

    author VARCHAR(255),

    price DECIMAL(4,2)

    );

    --  MSSQL

    CREATE #somebooks (

    id INT PRIMARY KEY,

    title VARCHAR(255),

    author VARCHAR(255),

    price DECIMAL(4,2)

    );

    ```


    **注意：**


    -   Oracle 区分 `GLOBAL` 和 `PRIVATE` 临时表，需要这两个关键字之一。私有临时表还需要特殊的名称。

    -   PostgreSQL 允许你使用 `GLOBAL` 和 `LOCAL` 关键字达到相同目的，但会忽略它们；建议省略。

    -   MSSQL 使用井号（`#`）表示私有临时表，双井号（`##`）表示全局临时表。


    所谓“全局”，是指数据库的其他用户可以访问该临时表。私有临时表，顾名思义，是会话私有的。


    如果你非常着急，PostgreSQL 和 SQLite 允许你用 `TEMP` 代替 `TEMPORARY` 来节省时间。你读这段话花的时间可能比这还多。


    这个例子中的临时表有一个简单的整数主键。如果你打算在后续添加更多数据，你也可以使用自动递增的主键。


    一旦创建了临时表，你就可以使用 `SELECT` 语句将数据复制进去。例如：


    ```

    INSERT INTO somebooks(id,title,author,price)

    SELECT id,title,author,price

    FROM aupricelist

    WHERE price IS NOT NULL;

    ```


    `INSERT ... SELECT ...` 语句将数据复制到一个已存在的表中，无论是临时表还是永久表。


    你可以使用以下语句在一个语句中创建新表并填充它：


    ```

    --  PostgreSQL, MariaDB/MySQL, Oracle

    CREATE TABLE otherbooks AS

    SELECT id,title,author,price

    FROM aupricelist

    WHERE price IS NULL

    ;

    --  PostgreSQL, SQLite

    SELECT id,title,author,price

    INTO TEMPORARY otherbooks

    FROM aupricelist

    WHERE price IS NULL;

    --  MSSQL

    SELECT id,title,author,price

    INTO #otherbooks

    FROM aupricelist

    WHERE price IS NULL;

    ```


    如你所见，该语句有两种形式；PostgreSQL 两者都支持。


    请注意，无论哪种形式，都要求你拥有创建临时表或永久表的权限。


    请记住，数据是副本，因此除非你更新它，否则它会过时。'
- fmt: '# Why Use Temporary Tables?


    Why would you want a temporary table? There’s nothing in our sample database which
    could be regarded as in any way heavy-duty. However, in the real world, you might
    be working with a query which involves a huge number of rows, complex joins, filters
    and calculations, and sorting. This could end up taking a great deal of time and
    effort, especially if you’re constantly regenerating the data.


    The reasons you would use a temporary table rather than a view include:


    *   It’s more efficient to save previously generated results than it is to regenerate
    them. This is called `caching` the results.

    *   Sometimes, you *want* the data to be out of date, such as when you need to
    work with a `snapshot` of the data from earlier in the day.


    If you need to work with the snapshot at some point in the future, a temporary
    table may be too fleeting. Everything we’ve done will also apply to specially
    created permanent tables.


    A database should never keep multiple copies of data. However, there are times
    when you need a temporary table for further processing, experimenting, or in transit
    to migrating data.


    ## Computed Columns


    Modern SQL allows you to add a column to a table which in principle shouldn’t
    be in the table. A `computed` column, or calculated column, is an additional column
    which is based on some calculated value. When you think about it, that’s the sort
    of thing you would do in a view.


    Think of the computed column as embedding a mini-view in the table. It’s particularly
    handy if you commonly use one calculation but don’t want the overhead of a view.
    It can also be handy if you have the option to cache the results.


    A computed column is a read-only virtual column. You can’t write anything into
    the column, and, if it saves any data at all, it’s a cached value to save the
    effort of recalculating it later. For example, you might store the full name of
    the customer as a convenience.


    You can create a computed column when you create the table, or you can add it
    to the table after the event.


    For example, suppose we want to add a shortened form of the `ordered` datetime
    column, with just the date. This will be handy for summarizing by day.


    You can add the new column as follows:


    ```sql

    --  PostgreSQL >= 12

    ALTER TABLE sales

    ADD COLUMN ordered_date date

    GENERATED ALWAYS AS (cast(ordered as date)) STORED;

    --  MSSQL

    ALTER TABLE sales

    ADD ordered_date AS (cast(ordered as date)) PERSISTED;

    --  MariaDB / MySQL

    ALTER TABLE sales

    ADD ordered_date date

    GENERATED ALWAYS AS (cast(ordered as date)) STORED;

    --  SQLite>=3.31.0

    ALTER TABLE sales

    ADD ordered_date date

    GENERATED ALWAYS AS (cast(ordered as date)) VIRTUAL;

    --  Oracle (STORED)

    ALTER TABLE sales

    ADD ordered_date date

    GENERATED ALWAYS AS (trunc(ordered));

    ```


    As you see, most DBMSs use the standard `GENERATED ALWAYS` syntax. MSSQL, however,
    uses its own simpler syntax which doesn’t specify the data type but infers it
    from the calculation.


    You’ll also notice different types of computed column:


    *   `VIRTUAL` columns are not stored and are recalculated. This is the default
    in MSSQL.

    *   `STORED` columns save a copy of the result and will only recalculate if the
    underlying value has changed. MSSQL calls this `PERSISTED`. In Oracle, it’s the
    default. SQLite does support this as well, but only if you create the table that
    way; if you add the column later, it can only be `VIRTUAL`.


    You can now fetch the data complete with virtual column:


    ```sql

    SELECT * FROM sales;

    ```


    This gives you:


    | **id** | **...** | **Ordered** | **shipped** | **ordered_date** |

    | --- | --- | --- | --- | --- |

    | 39 | ... | 2022-05-15 21:12:07.988741 | 2022-05-23 | 2022-05-15 |

    | 40 | ... | 2022-05-16 03:03:16.065969 | 2022-05-24 | 2022-05-16 |

    | 42 | ... | 2022-05-16 10:09:13.674823 | 2022-05-22 | 2022-05-16 |

    | 43 | ... | 2022-05-16 15:02:43.285565 | [NULL] | 2022-05-16 |

    | 45 | ... | 2022-05-16 16:48:14.674202 | 2022-05-28 | 2022-05-16 |

    | 518 | ... | [NULL] | [NULL] | [NULL] |

    | ~ 5549 rows ~ | | | | |


    If you have the option, the better option is `STORED` or equivalent. It takes
    a little more space, but saves on processing later.


    ## Summary


    Much of your work will involve not only real tables but generated virtual tables.
    Virtual tables include:


    *   A join

    *   A Common Table Expression or a table subquery

    *   A view or, in some cases, a Table Valued Function

    *   A temporary table.


    ### Views


    A view is a saved `SELECT` statement. It can be made as complex as you like and
    then fetched as a virtual table.


    The benefits of views include:


    *   They can be a convenient way of working with data.

    *   They can act as an interface to your data, particularly where the original
    or modified form doesn’t match your requirements.

    *   They offer a simple table view of complex data when accessed from external
    applications.


    ### Table Valued Functions


    A Table Valued Function is a function which results in a virtual table. Support
    for TVFs is sketchy. Where it is supported, it allows you to feed parameters into
    the query, making it more flexible than a simple view.


    ### Temporary Tables


    There are times when it is better to store results rather than regenerate them
    every time. You can save them into a caching table.


    The benefits include:


    *   It’s more efficient not to have to recalculate what will be the same results.

    *   You might want to work with a dated snapshot of your data.


    If your cache is intended to be particularly short-lived, you might use a temporary
    table. A temporary table is one which will self-destruct at the end of the session.


    Whether the caching table is temporary or permanent, you can copy data into it
    using a `SELECT` statement. You can also create a new table and copy into it in
    a single statement.


    #### Computed Columns


    In modern DBMSs, you can create virtual columns in a table which give the results
    of a calculation.


    A `VIRTUAL` computed column will regenerate the value every time you fetch from
    the table. A `STORED` computed column, a.k.a. `PERSISTED` in MSSQL, will cache
    the results until other data has changed.


    A computed column can be used for convenience. If it’s a `STORED` column, it also
    has the benefit of saving on processing.


    ## Coming Up


    A `SELECT` statement doesn’t have to be the end of the story. In some cases, it
    can be one step in a more complex story.


    A `subquery` allows you to embed a `SELECT` statement inside a query. This can
    be used to fetch values from other tables or to use one table to filter another.
    It’s particularly handy if you want to incorporate aggregate data in another query.


    The next chapter will look at subqueries in more detail.'
