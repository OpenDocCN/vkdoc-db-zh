- fmt: "## 关于示例数据库\n\n对于示例数据库，我们假设正在运营一家名为**BookWorks**的在线书店。在此场景中：\n\n*   客户访问网站。\n\
    *   在某个时刻，客户会注册并提供详细信息。\n*   然后他们将一本或多本书的一本或多本副本添加到购物车。\n*   希望他们接着结账并付款。\n* \
    \  BookWorks 随后将采购书籍，并在某个时候将它们发货给客户。\n\n为了管理这一切，数据库表的布局类似于图[1-1](#606708_1_En_1_Chapter.xhtml#Fig1)。\n\
    \n![](images/606708_1_En_1_Chapter/606708_1_En_1_Fig1_HTML.jpg)\n\n一幅示意图展示了不同数据库表（如`vip`、`customers`、`sales`、`sale_items`、`book_genres`、`genres`、`books`、`employees`和`authors`）的布局以及它们之间的交互。\n\
    \n图 1-1\n\nBookWorks 模式\n\n在现实生活中，情况要更复杂。例如，我们没有包含支付或配送方式，也没有包含登录凭证。也没有库存数据，尽管我们将假设书籍是按需订购的。\n\
    \n但这个数据库包含的内容已经足够我们在发展和提高 SQL 技能的过程中使用了。\n\n## 设置\n\n你可以坐在舒适的椅子上，手边放一杯最爱的饮品和一盒美味的巧克力，从头到尾阅读本书。然而，如果你参与示例实践，你会从本书中获得更多收获。\n\
    \n### 数据库管理软件\n\n首先，你需要能够访问数据库管理软件（DBMS）。本书中使用的五个半 DBMS 是：\n\n*   PostgreSQL\n\
    *   MariaDB/MySQL\n*   Microsoft SQL Server\n*   SQLite\n*   Oracle\n\nPostgreSQL、MariaDB/MySQL\
    \ 和 SQLite 都是免费的。Microsoft SQL Server 和 Oracle 是付费产品，但有免费版本。\n\nMariaDB 是 MySQL\
    \ 的一个分支，这就是为什么它们被放在一起讨论。它们在功能上几乎完全相同，但你会发现一些细微差别。\n\n如果你使用 MariaDB/MySQL，我们假设你正在**ANSI\
    \ 模式**下运行它。在会话开始时很容易做到：\n\n```\nSET SESSION sql_mode = 'ANSI';\n```\n\n你可能在本书中多次看到这条消息。附录会告诉你原因。\n\
    \n很可能——甚至非常可能——你已经安装了 DBMS。只需确保：\n\n*   它是一个相当新的版本。你要学习的一些功能在某些旧版本的 DBMS 中不可用。特别是注意\
    \ MySQL：你需要 2018 年发布的 8 版本才能使用一些更复杂的功能。\n*   你有足够的权限来创建数据库以及创建和修改表。本书大部分内容不需要这些，但第[2](#606708_1_En_2_Chapter.xhtml)章肯定需要。\n\
    \    至少，你需要能够安装示例数据库。\n\n如果你无法更改数据库，你仍然可以完成本书的大部分内容，只是阅读第[2](#606708_1_En_2_Chapter.xhtml)章时，你可能需要礼貌地点头同意我们在该章中对数据库所做的几处修改。在创建视图时，你可能也会遇到一些困难，这将在第[6](#606708_1_En_6_Chapter.xhtml)章及其他章节中介绍。\n\
    \n### 数据库客户端\n\n你还需要一个数据库客户端。所有主流的 DBMS 供应商都有自己的免费客户端，同时也有许多免费和付费的第三方替代品。\n\n\
    ### 示例数据库\n\n当然，你还需要安装示例数据库。\n\n本书的示例数据库和额外的代码文件可通过本书产品页面在 GitHub 上获取，地址位于 [`www.apress.com/ISBN`](http://www.apress.com/ISBN)。\n\
    \n你也可以通过访问 [`www.sample-db.net/`](https://www.sample-db.net/) 并点击几个按钮来直接下载脚本。\n\
    \n你需要执行以下操作：\n\n1.  为你的 DBMS 创建示例数据库。如果想不到更好的名字，`bookworks`是个不错的名字。对于大多数 DBMS，你可以运行：\n\
    \    ```\n    CREATE DATABASE bookworks;\n    ```\n    然后你需要连接到该数据库。\n2.  使用前面的链接，为你的\
    \ DBMS 选择选项。对于此示例，你应该选择“Book Works”示例（步骤 2）以及额外的“Towns”和“Countries”表（步骤 4）。下载文件。它是一个\
    \ ZIP 文件，因此你需要解压它。\n3.  使用你的数据库客户端，连接到新创建的数据库，打开下载的脚本文件并运行该脚本。\n\n## 你可能已经知道的内容\n\
    \n……或者说，SQL 速成课\n\n如果你在阅读下文时有似曾相识的感觉，那是对我之前 Apress 图书《SQL 和数据库入门》所学内容的总结。如果你对这些概念很有信心，可以直接跳到下一章，但复习一下以保持记忆清新也是值得的。\n\
    \n在本节中，我们将回顾以下概念：\n\n*   一些哲学概念\n*   编写 SQL\n*   基础 SQL\n*   数据类型\n*   SQL 子句\n\
    *   计算列\n*   连接\n*   聚合\n*   使用表\n*   操作数据\n*   集合运算\n\n这是你在之前书籍中会遇到的内容的总结。其中一些主题将在后续章节中进一步探讨。\n\
    \n### 一些哲学概念\n\n有些人对计算机，特别是数据库内部的工作原理有错误的理解。在这里，我们将澄清这一点，并明确术语——这些词的含义是什么。\n\n\
    **数据库**是数据的集合。嗯，很明显，但当我们谈论 SQL 时，我们谈论的是以特定方式组织和访问的数据。首先，数据库的设计遵循所谓的**关系模型**，这是一套关于数据如何组织的基本原则。这个模型追求纯粹和清晰。每个数据项都有一个确切的位置，它属于那里并以其最纯粹的形式存储。相关的数据项被收集在一起。\n\
    \n关系数据库的纯粹主义者会毫不犹豫地指出，SQL 数据库并没有严格遵循这些原则，甚至在有些情况下偏离得很远。尽管如此，关系模型仍然是 SQL 数据库构建的基础。"
  raw: "## About the Sample Database\n\nFor the sample database, we’re going to suppose\
    \ that we’re running an online bookshop: **BookWorks**. In this scenario\n\n*\
    \   Customers visit the website.\n\n*   At some point, customers will have registered\
    \ with their details.\n\n*   They then add one or more copies of one or more books\
    \ to a shopping cart.\n\n*   Hopefully, they then check out and pay.\n\n*   BookWorks\
    \ will then procure the books and ship them to customers at some point.\n\nTo\
    \ manage all of this, the database tables look something like Figure [1-1](#606708_1_En_1_Chapter.xhtml#Fig1).\n\
    \n![](images/606708_1_En_1_Chapter/606708_1_En_1_Fig1_HTML.jpg)\n\nAn illustration\
    \ represents the layout of different database tables such as v i p, customers,\
    \ sales, sale items, book genres, genres, books, employees, and authors that interact\
    \ with each other.\n\nFigure 1-1\n\nThe BookWorks Schema\n\nIn real life, there’s\
    \ more to the story. For example, we haven’t included payment or shipping methods,\
    \ and we haven’t included login credentials. There’s no stock either, although\
    \ we’ll presume that the books are ordered on demand.\n\nBut there’s enough in\
    \ this database for us to work with as we develop and improve our SQL skills.\n\
    \n## Setting Up\n\nYou can sit in a comfortable chair with a glass of your favorite\
    \ refreshment and a box of nice chocolates and read this book from cover to cover.\
    \ However, you’ll get more from this book if you join in on the samples.\n\n###\
    \ Database Management Software\n\nFirst, you’ll need access to Database Management\
    \ Software (DBMS). The five and a half DBMSs we work with in the book are\n\n\
    *   PostgreSQL\n\n*   MariaDB/MySQL\n\n*   Microsoft SQL Server\n\n*   SQLite\n\
    \n*   Oracle\n\nPostgreSQL, MariaDB/MySQL, and SQLite are all free. Microsoft\
    \ SQL Server and Oracle are paid products, but have free versions.\n\nMariaDB\
    \ is a spin-off of MySQL, which is why they’re treated together. They are almost\
    \ identical in features, but you’ll find a few places where they’re not identical.\n\
    \nIf you’re using MariaDB/MySQL, we’re going to assume that you’re running it\
    \ in **ANSI mode**. It’s easily done if you start the session with\n\n`SET SESSION\
    \ sql_mode = 'ANSI';`\n\nYou’ll probably see this message a few times throughout\
    \ the book. The Appendix will tell you why.\n\nIt’s possible—even likely—that\
    \ you already have the DBMS installed. Just make sure that\n\n*   It’s a fairly\
    \ recent version.\n\n    Some of the features you’ll learn about aren’t available\
    \ in some older versions of some DBMSs. In particular, watch out for MySQL: you’ll\
    \ need version 8 which was released in 2018 for some of the more sophisticated\
    \ features.\n\n*   You have enough privileges to create a database and to create\
    \ and modify tables. Most of the book won’t require that, but Chapter [2](#606708_1_En_2_Chapter.xhtml)\
    \ definitely will.\n\n    At the very least, you’ll need to be able to install\
    \ the sample database.\n\nIf you can’t make changes to the database, you can still\
    \ work with most of the book, and you’ll just have to nod your head politely as\
    \ you’re reading Chapter [2](#606708_1_En_2_Chapter.xhtml), in which we make a\
    \ few changes to the database. You might also have some difficulty in creating\
    \ views, which we cover in Chapter [6](#606708_1_En_6_Chapter.xhtml) and in other\
    \ chapters.\n\n### Database Client\n\nYou’ll also need a database client. All\
    \ the major DBMS vendors have their own free client, and there are plenty of free\
    \ and paid third-party alternatives.\n\n### The Sample Database\n\nAnd, of course,\
    \ you’ll need to install the sample database.\n\nThe sample database and additional\
    \ code files for this book are available on GitHub via the book’s product page,\
    \ located at [`www.apress.com/ISBN`](http://www.apress.com/ISBN).\n\nYou can also\
    \ directly download a script by visiting\n\n[`www.sample-db.net/`](https://www.sample-db.net/)\n\
    \nand clicking a few buttons.\n\nYou’ll need to do the following:\n\n1.  For your\
    \ DBMS, create your sample database. If you can’t think of a better name, `bookworks`\
    \ is a fine name. For most DBMSs, you can run\n\n    `CREATE DATABASE bookworks;`\n\
    \n    You’ll then need to connect to the database.\n\n2.  Using the preceding\
    \ link, select the options for your DBMS.\n\n    For this sample, you should select\
    \ the “Book Works” sample (Step 2), as well as the additional Towns and Countries\
    \ tables (Step 4).\n\n    Download the file. It will come as a ZIP file, so you’ll\
    \ have to unzip it.\n\n3.  Using your database, connect to your new database,\
    \ open the downloaded script file, and run the script.\n\n## What You Probably\
    \ Know Already\n\n… or, A Crash Course in SQL\n\nIf you get a sense of déjà vu\
    \ reading what follows, it’s a summary of what you would have learned from my\
    \ prior Apress book, *Getting Started with SQL and Databases*. You can skip to\
    \ the next chapter if you’re confident with these ideas, but it might be worth\
    \ going over, to keep them fresh.\n\nIn this section, we’ll go over the following\
    \ ideas:\n\n*   Some Philosophical Concepts\n\n*   Writing SQL\n\n*   Basic SQL\n\
    \n*   Data Types\n\n*   SQL Clauses\n\n*   Calculating Columns\n\n*   Joins\n\n\
    *   Aggregates\n\n*   Working with Tables\n\n*   Manipulating Data\n\n*   Set\
    \ Operations\n\nThis is a summary of what you will have encountered in the prior\
    \ book. Some of these topics will be pushed further in the following chapters.\n\
    \n### Some Philosophical Concepts\n\nSome people get the wrong idea of what computers\
    \ do and, in particular, what’s going on in a database. Here, we’ll look at clearing\
    \ this up, as well as clarifying the terminology—what the words mean.\n\nA **database**\
    \ is a collection of data. Well, obviously, but when we’re talking about SQL,\
    \ we’re talking about data which is organized and accessed in a particular way.\
    \ To begin with, the design of a database follows what is called the **relational\
    \ model**, which is basically a set of principles about how the data is organized.\
    \ This model is all about purity and clarity. Each item of data has exactly one\
    \ place where it belongs and is stored in its purest form. Related items of data\
    \ are collected together.\n\nRelational database purists won’t be hesitant to\
    \ point out that SQL databases don’t follow these principles to the letter or,\
    \ in some cases, even to the paragraph. Nevertheless, the relational model is\
    \ the basis of how SQL databases are put together."
  trans: "\n## 关于示例数据库\n\n对于示例数据库，我们假设正在运营一家名为**BookWorks**的在线书店。在此场景中：\n\n*   客户访问网站。\n\
    *   在某个时刻，客户会注册并提供详细信息。\n*   然后他们将一本或多本书的一本或多本副本添加到购物车。\n*   希望他们接着结账并付款。\n* \
    \  BookWorks 随后将采购书籍，并在某个时候将它们发货给客户。\n\n为了管理这一切，数据库表的布局类似于图 1-1。\n\n![](img/606708_1_En_1_Fig1_HTML.jpg)\n\
    \n一幅示意图展示了不同数据库表（如`vip`、`customers`、`sales`、`sale_items`、`book_genres`、`genres`、`books`、`employees`和`authors`）的布局以及它们之间的交互。\n\
    \n图 1-1\n\nBookWorks 模式\n\n在现实生活中，情况要更复杂。例如，我们没有包含支付或配送方式，也没有包含登录凭证。也没有库存数据，尽管我们将假设书籍是按需订购的。\n\
    \n但这个数据库包含的内容已经足够我们在发展和提高 SQL 技能的过程中使用了。\n\n## 设置\n\n你可以坐在舒适的椅子上，手边放一杯最爱的饮品和一盒美味的巧克力，从头到尾阅读本书。然而，如果你参与示例实践，你会从本书中获得更多收获。\n\
    \n### 数据库管理软件\n\n首先，你需要能够访问数据库管理软件（DBMS）。本书中使用的五个半 DBMS 是：\n\n*   PostgreSQL\n\
    *   MariaDB/MySQL\n*   Microsoft SQL Server\n*   SQLite\n*   Oracle\n\nPostgreSQL、MariaDB/MySQL\
    \ 和 SQLite 都是免费的。Microsoft SQL Server 和 Oracle 是付费产品，但有免费版本。\n\nMariaDB 是 MySQL\
    \ 的一个分支，这就是为什么它们被放在一起讨论。它们在功能上几乎完全相同，但你会发现一些细微差别。\n\n如果你使用 MariaDB/MySQL，我们假设你正在**ANSI\
    \ 模式**下运行它。在会话开始时很容易做到：\n\n```\nSET SESSION sql_mode = 'ANSI';\n```\n\n你可能在本书中多次看到这条消息。附录会告诉你原因。\n\
    \n很可能——甚至非常可能——你已经安装了 DBMS。只需确保：\n\n*   它是一个相当新的版本。你要学习的一些功能在某些旧版本的 DBMS 中不可用。特别是注意\
    \ MySQL：你需要 2018 年发布的 8 版本才能使用一些更复杂的功能。\n*   你有足够的权限来创建数据库以及创建和修改表。本书大部分内容不需要这些，但第\
    \ 2 章肯定需要。\n    至少，你需要能够安装示例数据库。\n\n如果你无法更改数据库，你仍然可以完成本书的大部分内容，只是阅读第 2 章时，你可能需要礼貌地点头同意我们在该章中对数据库所做的几处修改。在创建视图时，你可能也会遇到一些困难，这将在第\
    \ 6 章及其他章节中介绍。\n\n### 数据库客户端\n\n你还需要一个数据库客户端。所有主流的 DBMS 供应商都有自己的免费客户端，同时也有许多免费和付费的第三方替代品。\n\
    \n### 示例数据库\n\n当然，你还需要安装示例数据库。\n\n本书的示例数据库和额外的代码文件可通过本书产品页面在 GitHub 上获取，地址位于 [`www.apress.com/ISBN`](http://www.apress.com/ISBN)。\n\
    \n你也可以通过访问 [`www.sample-db.net/`](https://www.sample-db.net/) 并点击几个按钮来直接下载脚本。\n\
    \n你需要执行以下操作：\n\n1.  为你的 DBMS 创建示例数据库。如果想不到更好的名字，`bookworks`是个不错的名字。对于大多数 DBMS，你可以运行：\n\
    \    ```\n    CREATE DATABASE bookworks;\n    ```\n    然后你需要连接到该数据库。\n2.  使用前面的链接，为你的\
    \ DBMS 选择选项。对于此示例，你应该选择“Book Works”示例（步骤 2）以及额外的“Towns”和“Countries”表（步骤 4）。下载文件。它是一个\
    \ ZIP 文件，因此你需要解压它。\n3.  使用你的数据库客户端，连接到新创建的数据库，打开下载的脚本文件并运行该脚本。\n\n## 你可能已经知道的内容\n\
    \n……或者说，SQL 速成课\n\n如果你在阅读下文时有似曾相识的感觉，那是对我之前 Apress 图书《SQL 和数据库入门》所学内容的总结。如果你对这些概念很有信心，可以直接跳到下一章，但复习一下以保持记忆清新也是值得的。\n\
    \n在本节中，我们将回顾以下概念：\n\n*   一些哲学概念\n*   编写 SQL\n*   基础 SQL\n*   数据类型\n*   SQL 子句\n\
    *   计算列\n*   连接\n*   聚合\n*   使用表\n*   操作数据\n*   集合运算\n\n这是你在之前书籍中会遇到的内容的总结。其中一些主题将在后续章节中进一步探讨。\n\
    \n### 一些哲学概念\n\n有些人对计算机，特别是数据库内部的工作原理有错误的理解。在这里，我们将澄清这一点，并明确术语——这些词的含义是什么。\n\n\
    **数据库**是数据的集合。嗯，很明显，但当我们谈论 SQL 时，我们谈论的是以特定方式组织和访问的数据。首先，数据库的设计遵循所谓的**关系模型**，这是一套关于数据如何组织的基本原则。这个模型追求纯粹和清晰。每个数据项都有一个确切的位置，它属于那里并以其最纯粹的形式存储。相关的数据项被收集在一起。\n\
    \n关系数据库的纯粹主义者会毫不犹豫地指出，SQL 数据库并没有严格遵循这些原则，甚至在有些情况下偏离得很远。尽管如此，关系模型仍然是 SQL 数据库构建的基础。\n"
- fmt: "#### Data vs. Information vs. Values\n\nDatabases store `data`. That’s what\
    \ the name implies, but it’s important to understand that that’s not the same\
    \ as `information`, even if we yield to the temptation to call it that.\n\nData\
    \ is neutral. It has no meaning. Your height might be, say, 175 (cm), but the\
    \ database neither knows nor cares whether that’s good or bad. It’s just a number,\
    \ and if it’s not correct, it doesn’t care about that either.\n\nWhat the database\
    \ does care about, however, is whether the data entered follows any rules predefined\
    \ in the design of the database. That might include the type of data entered or\
    \ the range of possible values.\n\nInformation, however, is something that humans\
    \ do. We assign it a meaning, and we make judgments. Here, we decide whether the\
    \ height is what we’d expect or meaningful in some other way.\n\nWhy would that\
    \ be important? Take, for example, your date of birth. Is it possible that it\
    \ might change?\n\nThe short answer is no, you can’t (as far as we know) go back\
    \ and change your date of birth. However, the actual `data` itself can change,\
    \ such as when it was entered incorrectly, or there’s been a change to the calendar\
    \ (which doesn’t, admittedly, happen often).\n\nThis affects how a database should\
    \ be designed: you have to allow for errors, and you have to see what reasonableness\
    \ checks you might need to add to the definitions. You can’t, for example, lock\
    \ in the date of birth, just because it’s not supposed to change.\n\nThe other\
    \ concept is the `value`. Think of the data as a question and the value as the\
    \ answer. What is your given name (data)? The answer is its value.\n\nThat’s important,\
    \ because much of the design of a database is about the data, not the actual values.\n\
    \nFor example, a well-constructed database should only store your given name data\
    \ exactly once. However, the actual value (“Fred,” “Wilma,” etc.) might well appear\
    \ with somebody else’s data. Values can be repeated, and, if they are, we just\
    \ regard that as a coincidence. The real giveaway is that you might change the\
    \ value of one person’s given name without being obliged to do the same elsewhere.\n\
    \nTo put it simply:\n\n*   `Data` is a placeholder. It should never be duplicated\
    \ elsewhere.\n*   A `value` is the content of the data. It may be `NULL` which\
    \ means that you don’t have the value, and it may be duplicated because, well,\
    \ these things happen.\n*   `Information` is the meaning you personally put on\
    \ the database, and the database neither knows nor cares about that. We won’t\
    \ be dealing with information much here.\n\nWe may use the term “information”\
    \ loosely to refer to data, but it’s really not the same thing.\n\n#### Database\
    \ Tables\n\nSQL databases store data in one or more `tables`. In turn, a table\
    \ presents the data in `rows` and `columns`. You get the picture in Figure 1-2.\n\
    \n![](images/606708_1_En_1_Chapter/606708_1_En_1_Fig2_HTML.jpg)\n\nAn illustration\
    \ represents a grid with columns and rows marked along the horizontal and vertical\
    \ axes, respectively. On the top of the grid is a rectangular block labeled table.\n\
    \nFigure 1-2: A Database Table\n\nA row is an instance of the data, such as a\
    \ book in the books table or a customer in the customers table. Columns are used\
    \ for details, such as the given name of a customer or the title of a book. Figure\
    \ 1-3 gives the idea.\n\n![](images/606708_1_En_1_Chapter/606708_1_En_1_Fig3_HTML.jpg)\n\
    \nAn illustration represents a grid with column details and individual customers\
    \ marked along the horizontal and vertical axes, respectively. On the top of the\
    \ grid is a rectangular block labeled customers.\n\nFigure 1-3: A Customers Table\n\
    \nHere are some of the important properties of a well-designed table:\n\n*   Data\
    \ is atomic: In each row, each column stores one piece of data only.\n*   Row\
    \ order is not significant: You can sort them if you like, but the row order has\
    \ no real significance.\n*   Rows are unique: You don’t have two rows describing\
    \ the same thing.\n*   Rows are independent: Data in one row shouldn’t affect\
    \ any other row.\n*   Columns are independent of each other: Changing what’s in\
    \ one column shouldn’t affect what’s in another column.\n*   Columns are of a\
    \ single type: You can’t mix types in a single column.\n*   Column names are unique.\
    \ Obviously.\n*   Column order is not significant: That’s a bit confusing, since\
    \ obviously column order may be the only clue as to which is which. However, it\
    \ doesn’t matter which order you choose.\n\nOne important consequence of this\
    \ is that columns should never be used to hold multiple values, either singly\
    \ or in combination. This means:\n\n*   A single column should not contain multiple\
    \ values.\n*   Multiple columns cannot have the same role.\n\nThere are a few\
    \ additional rules, but they are more fine-tuning of the basic principles.\n\n\
    SQL uses the term “table” in two overlapping ways:\n\n*   Data is stored in the\
    \ database in a table. The data is accessed as rows and columns; that is, the\
    \ data is in a table format.\n    There is such a thing as a `temporary table`.\
    \ That’s the same as a real table earlier, except that it will self-destruct when\
    \ you finish with the session.\n*   Data may also be held fleetingly in a table\
    \ format without actually being stored.\n    You’ll get this table data as a result\
    \ of a join, a common table expression, a view, or even from another `SELECT`.\n\
    \nWhen we need to refer to the generated table data, we’ll use the term `virtual\
    \ table` to make the point clear.\n\n### Writing SQL\n\n`SQL` is a simple language\
    \ which has a few rules and a few recommendations for readability:\n\n*   `SQL`\
    \ is relaxed about using extra spacing. You should use as much spacing as required\
    \ to make your `SQL` more readable.\n*   Each `SQL` statement ends with a semicolon\
    \ (`;`).\n*   The `SQL` language is case insensitive, as are the column names.\
    \ Table names may be case sensitive, depending on the operating system.\n\nMicrosoft\
    \ `SQL` is relaxed about the use of semicolons, and many `MSSQL` developers have\
    \ got in the bad habit of forgetting about them. However, Microsoft strongly encourages\
    \ you to use them, and some `SQL` may not work properly if you get too sloppy.\
    \ See [`https://docs.microsoft.com/en-us/sql/t-sql/language-elements/transact-sql-syntax-conventions-transact-sql#transact-sql-syntax-conventions-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/language-elements/transact-sql-syntax-conventions-transact-sql%2523transact-sql-syntax-conventions-transact-sql).\n\
    \nIf you remember to include semicolons, you’ll stay out of trouble.\n\nRemember,\
    \ some parts of the language are flexible, but there is still a strict syntax\
    \ to be followed.\n\n### Basic SQL\n\nThe basic statement used to fetch data from\
    \ a table is the `SELECT` table. In its simplest form, it looks like this:\n\n\
    *   The `SELECT` statement will select one or more columns of data from a table.\n\
    *   You can select columns in any order.\n*   The `SELECT *` expression is used\
    \ to select all columns.\n*   Columns may be calculated.\n\n```sql\nSELECT ...\n\
    FROM ...;\n```\n\nCalculated columns should be named with an alias; noncalculated\
    \ columns can also be aliased.\n\nA comment is additional text for the human reader\
    \ which is ignored by `SQL`:\n\n*   `SQL` has a standard single-line comment:\
    \ `-- etc`\n*   Most `DBMS`s also support the non-standard block comment: `/*\
    \ ... */`\n*   Comments can be used to explain something or to act as section\
    \ headers. They can also be used to disable some code as you might when troubleshooting\
    \ or testing."
  raw: "#### Data vs. Information vs. Values\n\nDatabases store **data**. That’s what\
    \ the name implies, but it’s important to understand that that’s not the same\
    \ as **information**, even if we yield to the temptation to call it that.\n\n\
    Data is neutral. It has no meaning. Your height might be, say, 175 (cm), but the\
    \ database neither knows nor cares whether that’s good or bad. It’s just a number,\
    \ and if it’s not correct, it doesn’t care about that either.\n\nWhat the database\
    \ does care about, however, is whether the data entered follows any rules predefined\
    \ in the design of the database. That might include the type of data entered or\
    \ the range of possible values.\n\nInformation, however, is something that humans\
    \ do. We assign it a meaning, and we make judgments. Here, we decide whether the\
    \ height is what we’d expect or meaningful in some other way.\n\nWhy would that\
    \ be important? Take, for example, your date of birth. Is it possible that it\
    \ might change?\n\nThe short answer is no, you can’t (as far as we know) go back\
    \ and change your date of birth. However, the actual *data* itself can change,\
    \ such as when it was entered incorrectly, or there’s been a change to the calendar\
    \ (which doesn’t, admittedly, happen often).\n\nThis affects how a database should\
    \ be designed: you have to allow for errors, and you have to see what reasonableness\
    \ checks you might need to add to the definitions. You can’t, for example, lock\
    \ in the date of birth, just because it’s not supposed to change.\n\nThe other\
    \ concept is the **value**. Think of the data as a question and the value as the\
    \ answer. What is your given name (data)? The answer is its value.\n\nThat’s important,\
    \ because much of the design of a database is about the data, not the actual values.\n\
    \nFor example, a well-constructed database should only store your given name data\
    \ exactly once. However, the actual value (“Fred,” “Wilma,” etc.) might well appear\
    \ with somebody else’s data. Values can be repeated, and, if they are, we just\
    \ regard that as a coincidence. The real giveaway is that you might change the\
    \ value of one person’s given name without being obliged to do the same elsewhere.\n\
    \nTo put it simply:\n\n*   **Data** is a placeholder. It should never be duplicated\
    \ elsewhere.\n\n*   A **value** is the content of the data. It may be `NULL` which\
    \ means that you don’t have the value, and it may be duplicated because, well,\
    \ these things happen.\n\n*   **Information** is the meaning you personally put\
    \ on the database, and the database neither knows nor cares about that. We won’t\
    \ be dealing with information much here.\n\nWe may use the term “information”\
    \ loosely to refer to data, but it’s really not the same thing.\n\n#### Database\
    \ Tables\n\nSQL databases store data in one or more **tables**. In turn, a table\
    \ presents the data in **rows** and **columns**. You get the picture in Figure\
    \ [1-2](#606708_1_En_1_Chapter.xhtml#Fig2).\n\n![](images/606708_1_En_1_Chapter/606708_1_En_1_Fig2_HTML.jpg)\n\
    \nAn illustration represents a grid with columns and rows marked along the horizontal\
    \ and vertical axes, respectively. On the top of the grid is a rectangular block\
    \ labeled table.\n\nFigure 1-2\n\nA Database Table\n\nA row is an instance of\
    \ the data, such as a book in the books table or a customer in the customers table.\
    \ Columns are used for details, such as the given name of a customer or the title\
    \ of a book. Figure [1-3](#606708_1_En_1_Chapter.xhtml#Fig3) gives the idea.\n\
    \n![](images/606708_1_En_1_Chapter/606708_1_En_1_Fig3_HTML.jpg)\n\nAn illustration\
    \ represents a grid with column details and individual customers marked along\
    \ the horizontal and vertical axes, respectively. On the top of the grid is a\
    \ rectangular block labeled customers.\n\nFigure 1-3\n\nA Customers Table\n\n\
    Here are some of the important properties of a well-designed table:\n\n*   Data\
    \ is atomic: In each row, each column stores one piece of data only.\n\n*   Row\
    \ order is not significant: You can sort them if you like, but the row order has\
    \ no real significance.\n\n*   Rows are unique: You don’t have two rows describing\
    \ the same thing.\n\n*   Rows are independent: Data in one row shouldn’t affect\
    \ any other row.\n\n*   Columns are independent of each other: Changing what’s\
    \ in one column shouldn’t affect what’s in another column.\n\n*   Columns are\
    \ of a single type: You can’t mix types in a single column.\n\n*   Column names\
    \ are unique. Obviously.\n\n*   Column order is not significant: That’s a bit\
    \ confusing, since obviously column order may be the only clue as to which is\
    \ which. However, it doesn’t matter which order you choose.\n\nOne important consequence\
    \ of this is that columns should never be used to hold multiple values, either\
    \ singly or in combination. This means\n\n*   A single column should not contain\
    \ multiple values.\n\n*   Multiple columns cannot have the same role.\n\nThere\
    \ are a few additional rules, but they are more fine-tuning of the basic principles.\n\
    \nSQL uses the term “table” in two overlapping ways:\n\n*   Data is stored in\
    \ the database in a table. The data is accessed as rows and columns; that is,\
    \ the data is in a table format.\n\n    There is such a thing as a **temporary\
    \ table**. That’s the same as a real table earlier, except that it will self-destruct\
    \ when you finish with the session.\n\n*   Data may also be held fleetingly in\
    \ a table format without actually being stored.\n\n    You’ll get this table data\
    \ as a result of a join, a common table expression, a view, or even from another\
    \ `SELECT`.\n\nWhen we need to refer to the generated table data, we’ll use the\
    \ term **virtual table** to make the point clear.\n\n### Writing SQL\n\n**SQL\
    \ is** **a simple language which has a few rules and a few recommendations for\
    \ readability:**\n\n*   **SQL** **is relaxed about using extra spacing. You should\
    \ use as much spacing as required to make your SQL more readable.**\n\n*   **Each\
    \ SQL statement ends with a semicolon (**`;`**).**\n\n*   **The SQL language is\
    \ case insensitive, as are the column names. Table names may be case sensitive,\
    \ depending on the operating system.**\n\n    Microsoft SQL is relaxed about the\
    \ use of semicolons, and many MSSQL developers have got in the bad habit of forgetting\
    \ about them. However, Microsoft strongly encourages you to use them, and some\
    \ SQL may not work properly if you get too sloppy. See [`https://docs.microsoft.com/en-us/sql/t-sql/language-elements/transact-sql-syntax-conventions-transact-sql#transact-sql-syntax-conventions-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/language-elements/transact-sql-syntax-conventions-transact-sql%2523transact-sql-syntax-conventions-transact-sql).\n\
    \n    If you remember to include semicolons, you’ll stay out of trouble.\n\nRemember,\
    \ some parts of the language are flexible, but there is still a strict syntax\
    \ to be followed.\n\n### Basic SQL\n\nThe basic statement used to fetch data from\
    \ a table is the `SELECT` table. In its simplest form, it looks like this:\n\n\
    *   The `SELECT` statement will select one or more columns of data from a table.\n\
    \n*   You can select columns in any order.\n\n*   The `SELECT *` expression is\
    \ used to select all columns.\n\n*   Columns may be calculated.\n\n```\nSELECT\
    \ ...\nFROM ...;\n```\n\nCalculated columns should be named with an alias; noncalculated\
    \ columns can also be aliased.\n\nA comment is additional text for the human reader\
    \ which is ignored by SQL:\n\n*   SQL has a standard single-line comment: `--\
    \ etc`\n\n*   Most DBMSs also support the non-standard block comment: `/* ...\
    \ */`\n\n*   Comments can be used to explain something or to act as section headers.\
    \ They can also be used to disable some code as you might when troubleshooting\
    \ or testing."
  trans: "\n#### 数据 vs. 信息 vs. 值\n\n数据库存储的是 `数据`。这是其名称所暗示的，但重要的是要明白，这与 `信息` 并非同一回事，即使我们有时会忍不住混用这两个词。\n\
    \n数据是中性的。它本身没有意义。比如，你的身高可能是 175（厘米），但数据库既不知道也不关心这是好是坏。它只是一个数字，而且即使这个数字不正确，它也不在意。\n\
    \n然而，数据库关心的是输入的数据是否遵循了数据库设计中预定义的规则。这可能包括输入数据的类型或可能的取值范围。\n\n然而，`信息` 是人类赋予的东西。我们赋予它意义并进行判断。在这里，我们判断身高是否符合预期，或是否有其他意义。\n\
    \n为什么这很重要呢？以你的出生日期为例。它有可能改变吗？\n\n简短的回答是不行，你无法（就我们所知）回到过去更改你的出生日期。然而，实际的 `数据` 本身可以改变，例如当初输入错误时，或者日历系统发生了更改（虽然这种情况确实不常发生）。\n\
    \n这影响了数据库的设计方式：你必须考虑到错误的存在，并且需要考虑在定义中添加哪些合理性检查。你不能仅仅因为出生日期“不应当”改变，就将其锁定。\n\n另一个概念是\
    \ `值`。可以将数据视为问题，而值则是答案。你的名字（数据）是什么？答案就是它的值。\n\n这一点很重要，因为数据库设计的很多方面是围绕 `数据` 进行的，而非实际的值。\n\
    \n例如，一个设计良好的数据库应该只存储一次你的名字 `数据`。然而，实际的值（如“Fred”、“Wilma”）很可能与其他人的数据一起出现。值可以重复，如果重复了，我们只将其视为巧合。真正的迹象是，你可以更改一个人的名字值，而无需在其他地方也做同样的更改。\n\
    \n简而言之：\n\n*   `数据` 是一个占位符。它永远不应该在其他地方被复制。\n*   `值` 是数据的内容。它可能是 `NULL`（意味着你没有这个值），并且它可能因为各种原因而被重复。\n\
    *   `信息` 是你个人赋予数据库的意义，数据库对此既不了解也不关心。我们在这里不会过多讨论信息。\n\n我们可能会宽松地使用“信息”一词来指代数据，但它们真的不是一回事。\n\
    \n#### 数据库表\n\nSQL 数据库将数据存储在一个或多个 `表` 中。反过来，表通过 `行` 和 `列` 来呈现数据。你可以通过图 1-2 获得直观理解。\n\
    \n![](img/606708_1_En_1_Fig2_HTML.jpg)\n\n一张插图展示了一个网格，水平轴和垂直轴分别标记了列和行。网格顶部有一个标记为“table”的矩形块。\n\
    \n图 1-2：一个数据库表\n\n一行是数据的一个实例，例如书籍表中的一本书或客户表中的一位客户。列用于存储详细信息，例如客户的名字或书籍的标题。图 1-3\
    \ 给出了概念示意。\n\n![](img/606708_1_En_1_Fig3_HTML.jpg)\n\n一张插图展示了一个网格，水平轴和垂直轴分别标记了列的细节和各个客户。网格顶部有一个标记为“customers”的矩形块。\n\
    \n图 1-3：一个客户表\n\n以下是一个设计良好的表的一些重要属性：\n\n*   数据是原子的：在每一行中，每一列只存储一条数据。\n*   行的顺序无关紧要：你可以按喜好对它们排序，但行的顺序本身没有实际意义。\n\
    *   行是唯一的：你不会拥有两行描述相同内容的记录。\n*   行是独立的：一行中的数据不应影响其他任何行。\n*   列彼此独立：更改一列中的内容不应影响另一列中的内容。\n\
    *   列是单一类型的：你不能在同一列中混合类型。\n*   列名是唯一的。显然如此。\n*   列的顺序无关紧要：这可能有点令人困惑，因为显然列的顺序可能是区分不同列的唯一线索。然而，你选择哪种顺序并不重要。\n\
    \n由此产生的一个重要结果是，列绝不应用于存储多个值，无论是单独还是组合。这意味着：\n\n*   单个列不应包含多个值。\n*   多个列不能具有相同的角色。\n\
    \n还有一些额外的规则，但它们更多是对基本原则的微调。\n\nSQL 在两种有重叠的场景中使用“表”这个术语：\n\n*   数据以表的形式存储在数据库中。数据以行和列的形式被访问；也就是说，数据处于表格式。\n\
    \    存在一种叫做 `临时表` 的东西。它与前面提到的真实表相同，区别在于当你结束会话时，它会自我销毁。\n*   数据也可能以表格式短暂持有，而无需实际存储。\n\
    \    你可能通过连接（join）、公用表表达式（common table expression）、视图（view），甚至另一个 `SELECT` 语句的结果获得这种表数据。\n\
    \n当我们需要引用这种生成的表数据时，我们将使用术语 `虚拟表` 来明确这一点。\n\n### 编写 SQL\n\n`SQL` 是一种简单的语言，它有一些规则和一些关于可读性的建议：\n\
    \n*   `SQL` 在使用额外空格方面比较宽松。你应该使用足够的空格来让你的 `SQL` 更易读。\n*   每个 `SQL` 语句以分号 (`;`)\
    \ 结尾。\n*   `SQL` 语言不区分大小写，列名也是如此。表名可能区分大小写，这取决于操作系统。\n\n微软 `SQL` 对分号的使用比较宽松，许多\
    \ `MSSQL` 开发者养成了忘记分号的坏习惯。然而，微软强烈建议你使用它们，而且如果你过于随意，某些 `SQL` 可能无法正常工作。请参阅 [`https://docs.microsoft.com/en-us/sql/t-sql/language-elements/transact-sql-syntax-conventions-transact-sql#transact-sql-syntax-conventions-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/language-elements/transact-sql-syntax-conventions-transact-sql%2523transact-sql-syntax-conventions-transact-sql)。\n\
    \n如果你记得包含分号，就能避免麻烦。\n\n请记住，语言的某些部分是灵活的，但仍需遵循严格的语法。\n\n### 基础 SQL\n\n用于从表中获取数据的基本语句是\
    \ `SELECT` 语句。其最简单的形式如下：\n\n*   `SELECT` 语句将从表中选择一列或多列数据。\n*   你可以以任意顺序选择列。\n\
    *   `SELECT *` 表达式用于选择所有列。\n*   列可以是计算得出的。\n\n```sql\nSELECT ...\nFROM ...;\n\
    ```\n\n计算列应使用别名命名；非计算列也可以使用别名。\n\n注释是供人类阅读者参考的额外文本，会被 `SQL` 忽略：\n\n*   `SQL` 有标准的单行注释：`--\
    \ 等`\n*   大多数 `DBMS` 也支持非标准的块注释：`/* ... */`\n*   注释可用于解释某些内容，或作为章节标题。它们也可以用来禁用部分代码，就像你在排除故障或测试时可能做的那样。\n"
- fmt: '### Data Types


    Broadly, there are three main data types:


    *   Numbers

    *   Strings

    *   Dates and times


    Number literals are represented bare: they do not have any form of quotes.


    Numbers are compared in number line order and can be filtered using the basic
    comparison operators.


    String literals are written in single quotes. Some DBMSs also allow double quotes,
    but double quotes are more correctly used for column names rather than values.


    *   In some DBMSs and databases, upper and lower case may not match.

    *   Trailing spaces should be ignored, but aren’t always.


    Date literals are also in single quotes.


    *   The preferred date format is ISO8601 (`yyyy-mm-dd`), though Oracle doesn’t
    like it so much.

    *   Most DBMSs allow alternative formats, but avoid the `??/??/yyyy` format, since
    it doesn’t mean the same thing everywhere.


    Dates are compared in historical order.


    ### SQL Clauses


    For the most part, we use up to six clauses in a typical `SELECT` statement. SQL
    clauses are written in a specific order. However, they are processed in a slightly
    different order, as in Figure [1-4](#606708_1_En_1_Chapter.xhtml#Fig4).


    ![](images/606708_1_En_1_Chapter/606708_1_En_1_Fig4_HTML.jpg)


    Figure 1-4: SQL Clause Order. An illustration represents two database tables labeled
    written and processed, listing six clauses. In the written table, the select clause
    is listed at the top, while in the processed table, it has moved to fifth place.


    The important thing to remember is that the `SELECT` clause is the last to be
    evaluated before the `ORDER BY` clause. That means that only the `ORDER BY` clause
    can use values and aliases produced in the `SELECT` clause.^[²](#fn2)


    As we’ll see later in the book, there are additional clauses which are extensions
    to the one we have here.


    #### Filtering Data with the WHERE Clause


    A table can be filtered using the `WHERE` clause.


    When you have a large number of rows, you can filter them using the `WHERE` clause.
    The `WHERE` clause is followed by one or more assertions which evaluate either
    to true or false, determining whether a particular row is to be included in the
    result set.


    The syntax for the `WHERE` clause is


    ```

    SELECT columns

    FROM table

    WHERE conditions;

    ```


    The conditions are one or more assertions, expressions which evaluate to true
    or not true. If an assertion is not true, it’s not necessarily false either. Typically,
    if the expression involves `NULL`, the result will be unknown, which is also not
    true.


    *   `NULL` represents a missing value, so testing it is tricky.

    *   `NULL`s will always fail a comparison, such as the equality operator (`=`).


    Testing for `NULL` requires the special expression `IS NULL` or `IS NOT NULL`.


    ##### Multiple Assertions


    You can combine multiple assertions with the logical `AND` and `OR` operators.
    If you combine them, `AND` takes precedence over `OR`.


    The `IN` operator will match from a list. It is the equivalent of multiple `OR`
    expressions. It can also be used with a subquery which generates a single column
    of values.


    ##### Wildcard Matches


    Strings can be compared more loosely using wildcard patterns and the `LIKE` operator.


    *   Wildcards include special pattern characters.

    *   Some DBMSs allow you to use `LIKE` with non-string data, implicitly converting
    them to strings for comparison.

    *   Some DBMSs supplement the standard wildcard characters with additional patterns.

    *   Some DBMSs support regular expressions, which are more sophisticated than
    regular wildcard pattern matching.


    #### Sorting with the ORDER BY Clause


    SQL tables are unordered collections of rows.


    *   Row order is insignificant and may be unexpected.

    *   You can sort the results using an `ORDER BY` clause.


    Sorting a table is done using the `ORDER BY` clause:


    ```

    SELECT columns

    FROM table

    --  WHERE ...

    ORDER BY ...;

    ```


    The `ORDER BY` clause is both the last to be written and the last to be evaluated.


    *   Sorting does not change the actual table, just the order of the results for
    the present query.

    *   You can sort using original columns or calculated values.

    *   You can sort using multiple columns, which will effectively group the rows;
    column order is arbitrary, but will affect how the grouping is effected.

    *   By default, each sorting column is sorted in increasing (ascending) order.
    Each sorting column can be qualified by the `DESC` clause which will sort in decreasing
    (descending) order. You can also add `ASC` which changes nothing as it’s the default
    anyway.

    *   Different DBMSs will have their own approach as to where to place sorted `NULL`s,
    but they will all be grouped either at the beginning or the end.

    *   Data types will affect the sort order.

    *   Some DBMSs will sort upper and lower case values separately.


    ##### Limiting Results


    A `SELECT` statement can also include a limit on the number of rows. This feature
    has been available unofficially for a long time, but is now an official feature.


    The official form is something like


    ```

    SELECT ...

    FROM ...

    ORDER BY ... OFFSET ... ROWS FETCH FIRST ... ROWS ONLY;

    ```


    This is supported in PostgreSQL, MSSQL, and Oracle.


    Many DBMSs still offer their proprietary unofficial limiting clauses. The most
    common unofficial version is something like


    ```

    SELECT ...

    FROM ...

    ORDER BY ... LIMIT ... OFFSET ...;

    ```


    This is supported in PostgreSQL (which also supports `OFFSET ... FETCH`), MariaDB/MySQL,
    and SQLite.


    MSSQL also has a simple `TOP` clause added to the `SELECT` clause.


    ##### Sorting Strings


    Sorting alphabetically is, by and large, meaningless. However, there are techniques
    to sort strings in a more meaningful order.


    ### Calculating Columns


    In SQL, there are three main data types: numbers, strings, and dates. Each data
    type has its own methods and functions to calculate values:


    *   For numbers, you can do simple arithmetic and calculate with more complex
    functions. There are also functions which approximate numbers.

    *   For dates, you can calculate an age between dates or offset a date. You can
    also extract various parts of the date.

    *   For strings, you can concatenate them, change parts of the string, or extract
    parts of the string.

    *   For numbers and dates, you can generate a formatted string which gives you
    a possibly more friendly version.


    #### Calculating with NULLs


    Whenever a calculation involves a `NULL`, it has a catastrophic effect on the
    result, and the result will normally be `NULL`.


    In some cases, you may be able to substitute a value using `coalesce()` which
    will replace `NULL` with a reasonable alternative. Of course, you will need to
    work out what you mean by “reasonable.”


    ##### Aliases


    Every column should have a distinct name. When you calculate a value, you supply
    this name as an alias using `AS`. You can also do this with noncalculated columns
    to provide a more suitable name.


    Aliases and other names should be distinct. They should also follow standard column
    naming rules, such as not being the same as an SQL keyword and not having special
    characters.


    If, for any reason, a name or an alias needs to break the naming rules, you can
    always wrap the name in double quotes (`"double quotes"`) or whatever the DBMS
    supplies as an alternative.


    Some DBMSs have an alternative to double quotes, but you should prefer double
    quotes if possible.


    ##### Subqueries


    A subquery is an additional `SELECT` statement used as part of the main query.


    A column can also include a value derived from a subquery. This is especially
    useful if you want to include data from a separate related table. If the subquery
    involves a value from the main table, it is said to be correlated. Such subqueries
    can be costly, but are nonetheless a useful technique.


    #### The CASE Expression


    You can generate categories using `CASE ... END`, which tests a value against
    possible matches and results in one out of a number of alternative values.'
