    DO $$

    DECLARE

    cid INT := 42;

    od TIMESTAMP := current_timestamp;

    sid INT;

    END $$ ;

    ```


    The variable names can be anything you like, but you run the risk of competing
    with column names in the following code. Some developers prefix the names with
    an underscore (such as `_cid`).


    The `sid` variable is an integer which will be assigned later. The `cid` and `od`
    variables are for the customer id and ordered date/time. They are assigned from
    the beginning with the special operator `:=`.


    The code proper is inside a `BEGIN ... END` block. It will be all of the code
    you used in Chapter [3](#606708_1_En_3_Chapter.xhtml), but run together. The important
    part is that the variable `sid` is used to manage the new sale id:


    ```

    DO $$

    DECLARE

    cid INT := 42;

    od TIMESTAMP := current_timestamp;

    sid INT;

    BEGIN

    INSERT INTO sales(customerid, ordered)

    VALUES(cid, current_timestamp)

    RETURNING id INTO sid;

    INSERT INTO saleitems(saleid, bookid, quantity)

    VALUES

    (sid,123,3),

    (sid,456,1),

    (sid,789,2);

    UPDATE saleitems AS si

    SET price=(SELECT price FROM books AS b

    WHERE b.id=si.bookid)

    WHERE saleid=sid;

    UPDATE sales

    SET total=(SELECT sum(price*quantity)

    FROM saleitems WHERE saleid=sid)

    WHERE id=sid;

    END $$;

    ```


    The `sid` variable gets its value from the `RETURNING` clause in the first `INSERT`
    statement. From there on, it’s used in the remaining statements.


    You can test the results using


    ```

    SELECT * FROM sales ORDER BY id DESC;

    SELECT * FROM saleitems ORDER BY id DESC;

    ```


    You should see the new sale and sale items at the top.


    #### Using Variables in MariaDB/MySQL


    MariaDB/MySQL has the simplest approach to using variables. Outside of a stored
    function or procedure, you don’t declare the variables or their types: you just
    go ahead and use them.


    The other thing is that there’s no strong concept of an anonymous code block,
    so defining one is really more of an organizational thing. We’ll do that, even
    though it really makes no real difference:


    ```

    DELIMITER $$

    BEGIN

    END; $$

    DELIMITER ;

    ```


    First, we’ll assign a few variables:


    ```

    DELIMITER $$

    BEGIN

    SET @cid = 42;

    SET @od = current_timestamp;

    SET @sid = NULL;

    END; $$

    DELIMITER ;

    ```


    Variables are prefixed with the `@` character. This makes them a little more obvious
    and avoids possible conflict with column names.


    The statement `SET @sid = NULL;` is unnecessary. Since you don’t declare variables,
    we’ve included the statement just to make it clear that we’ll be using the `@sid`
    variable a little later.


    The whole code looks like this:


    ```

    DELIMITER $$

    BEGIN

    SET @cid = 42;

    SET @od = current_timestamp;

    SET @sid = NULL;    --  unnecessary; just to make clear

    INSERT INTO sales(customerid, ordered)

    VALUES(@cid, @od);

    SET @sid = last_insert_id();

    INSERT INTO saleitems(saleid,bookid,quantity)

    VALUES

    (@sid,123,3),

    (@sid,456,1),

    (@sid,789,2);

    UPDATE saleitems

    SET price=(SELECT price FROM books

    WHERE books.id=saleitems.bookid)

    WHERE saleid=@sid;

    UPDATE sales

    SET total=(SELECT sum(price*quantity)

    FROM saleitems WHERE saleid=@sid)

    WHERE id=@sid;

    END;

    $$

    DELIMITER ;

    ```


    Note the statement:


    ```

    SET @sid = last_insert_id();

    ```


    When you add a new row with an autogenerated primary key, you need to get the
    new value to use later. The `last_insert_id()` function fetches the most recent
    autogenerated value in the current session. You’ll notice that it doesn’t specify
    which table: that’s why you need to call it immediately after the `INSERT` statement.


    As you see, the rest of the code is generally the same as in Chapter [3](#606708_1_En_3_Chapter.xhtml),
    with the `@sid` variable used to manage the new sale id.


    You can test the results using


    ```

    SELECT * FROM sales ORDER BY id DESC;

    SELECT * FROM saleitems ORDER BY id DESC;

    ```


    You should see the new sale and sale items at the top.


    #### Using Variables in MSSQL


    MSSQL code can be written inside a block delimited with the `GO` keyword:


    ```

    GO

    ...

    GO

    ```


    The `GO` keyword isn’t actually a part of Microsoft’s SQL language (or any other
    SQL, for that matter). It’s actually an instruction to the client software to
    treat what’s inside as a single batch and to run it as such. Some clients allow
    you to indent the keyword, and some allow you to add semicolons and comments on
    the same line, but the safest thing is not to indent it and not add anything else
    to the line.


    Microsoft doesn’t have a block to declare variables, but it does have a statement.
    To declare three variables, you can use three statements:


    ```

    GO

    DECLARE @cid INT = 42;

    DECLARE @od datetime2 = current_timestamp;

    DECLARE @sid INT;

    GO

    ```


    or you can use a single statement with the variables separated by commas:


    ```

    GO

    DECLARE

    @cid INT = 42,

    @od datetime2 = current_timestamp,

    @sid INT;

    GO

    ```


    Variables are prefixed with the `@` character, which makes them easy to spot and
    easy to distinguish from column names.


    The `@sid` variable is an integer which will be assigned later.


    The rest of the code is similar to what we did in Chapter [3](#606708_1_En_3_Chapter.xhtml),
    but the new sale id will be managed in the `@sid` variable:


    ```

    GO

    DECLARE @cid INT = 42;

    DECLARE @od datetime2 = current_timestamp;

    DECLARE @sid INT;

    INSERT INTO sales(customerid,ordered)

    VALUES(@cid, @od);

    SET @sid = scope_identity();

    INSERT INTO saleitems(saleid,bookid,quantity)

    VALUES

    (@sid,123,3),

    (@sid,456,1),

    (@sid,789,2);

    UPDATE saleitems

    SET price=(SELECT price FROM books

    WHERE books.id=saleitems.bookid)

    WHERE saleid=@sid;

    UPDATE sales

    SET total=(SELECT sum(price*quantity)

    FROM saleitems WHERE saleid=@sid)

    WHERE id=@sid;

    GO

    ```


    The `@sid` variable gets its value from the `scope_identity()` function. You’ll
    notice that it doesn’t specify which table: that’s why you need to call it immediately
    after the `INSERT` statement. From there on, it’s used in the remaining statements.


    You can test the results using


    ```

    SELECT * FROM sales ORDER BY id DESC;

    SELECT * FROM saleitems ORDER BY id DESC;

    ```


    You should see the new sale and sale items at the top.'
  trans: '## 在 PostgreSQL 中使用变量


    最初，PostgreSQL 不允许你在存储代码块之外进行任何此类操作。从版本 11 开始，你可以使用**匿名块**。如果你使用的是旧版 PostgreSQL，那么很遗憾，此功能不可用。


    匿名块定义在 `DO ... END` 之间：


    ```

    DO $$

    ...

    END $$ ;

    ```


    `$$` 符号用于将多个语句视为单个块。这样，分号就不会提前终止块。


    变量在 `DECLARE` 部分声明：


    ```

    DO $$

    DECLARE

    cid INT := 42;

    od TIMESTAMP := current_timestamp;

    sid INT;

    END $$ ;

    ```


    变量名可以随意取，但你可能会面临与后续代码中列名冲突的风险。一些开发者会给变量名加上下划线前缀（例如 `_cid`）。


    `sid` 变量是一个整数，稍后将被赋值。`cid` 和 `od` 变量分别用于存储客户 ID 和订购日期/时间。它们通过特殊运算符 `:=` 从一开始就进行了赋值。


    实际的代码位于 `BEGIN ... END` 块内。它将是你在第 3 章中使用过的所有代码，但连贯地运行在一起。重要的是，变量 `sid` 用于管理新的销售
    ID：


    ```

    DO $$

    DECLARE

    cid INT := 42;

    od TIMESTAMP := current_timestamp;

    sid INT;

    BEGIN

    INSERT INTO sales(customerid, ordered)

    VALUES(cid, current_timestamp)

    RETURNING id INTO sid;

    INSERT INTO saleitems(saleid, bookid, quantity)

    VALUES

    (sid,123,3),

    (sid,456,1),

    (sid,789,2);

    UPDATE saleitems AS si

    SET price=(SELECT price FROM books AS b

    WHERE b.id=si.bookid)

    WHERE saleid=sid;

    UPDATE sales

    SET total=(SELECT sum(price*quantity)

    FROM saleitems WHERE saleid=sid)

    WHERE id=sid;

    END $$;

    ```


    `sid` 变量的值来自第一个 `INSERT` 语句中的 `RETURNING` 子句。从那时起，它就在后续的语句中被使用。


    你可以使用以下语句测试结果：


    ```

    SELECT * FROM sales ORDER BY id DESC;

    SELECT * FROM saleitems ORDER BY id DESC;

    ```


    你应该能在顶部看到新的销售记录和销售项目。


    ## 在 MariaDB/MySQL 中使用变量


    MariaDB/MySQL 使用变量的方法最简单。在存储函数或过程之外，你无需声明变量或其类型：直接使用即可。


    另外，它并没有严格的匿名代码块概念，因此定义一个更多是出于组织结构的考虑。我们还是会这样做，尽管它实际上没什么区别：


    ```

    DELIMITER $$

    BEGIN

    END; $$

    DELIMITER ;

    ```


    首先，我们给几个变量赋值：


    ```

    DELIMITER $$

    BEGIN

    SET @cid = 42;

    SET @od = current_timestamp;

    SET @sid = NULL;

    END; $$

    DELIMITER ;

    ```


    变量以 `@` 字符为前缀。这使它们更明显，并避免了可能与列名的冲突。


    语句 `SET @sid = NULL;` 是不必要的。由于你不需要声明变量，我们加入这个语句只是为了明确表示我们稍后将使用 `@sid` 变量。


    完整的代码如下所示：


    ```

    DELIMITER $$

    BEGIN

    SET @cid = 42;

    SET @od = current_timestamp;

    SET @sid = NULL;    -- 非必需；只是为了明确

    INSERT INTO sales(customerid, ordered)

    VALUES(@cid, @od);

    SET @sid = last_insert_id();

    INSERT INTO saleitems(saleid,bookid,quantity)

    VALUES

    (@sid,123,3),

    (@sid,456,1),

    (@sid,789,2);

    UPDATE saleitems

    SET price=(SELECT price FROM books

    WHERE books.id=saleitems.bookid)

    WHERE saleid=@sid;

    UPDATE sales

    SET total=(SELECT sum(price*quantity)

    FROM saleitems WHERE saleid=@sid)

    WHERE id=@sid;

    END;

    $$

    DELIMITER ;

    ```


    注意这个语句：


    ```

    SET @sid = last_insert_id();

    ```


    当你添加一个具有自动生成主键的新行时，你需要获取新值以便稍后使用。`last_insert_id()` 函数获取当前会话中最近一次自动生成的值。你会注意到它没有指定是哪个表：这就是为什么你需要在
    `INSERT` 语句后立即调用它。


    如你所见，其余代码与第 3 章中的基本相同，只是使用 `@sid` 变量来管理新的销售 ID。


    你可以使用以下语句测试结果：


    ```

    SELECT * FROM sales ORDER BY id DESC;

    SELECT * FROM saleitems ORDER BY id DESC;

    ```


    你应该能在顶部看到新的销售记录和销售项目。


    ## 在 MSSQL 中使用变量


    MSSQL 代码可以写在由 `GO` 关键字分隔的块内：


    ```

    GO

    ...

    GO

    ```


    `GO` 关键字实际上不是 Microsoft SQL 语言的一部分（任何其他 SQL 语言也不是）。它实际上是给客户端软件的一个指令，将内部内容视为单个批处理并执行。有些客户端允许你缩进关键字，有些允许在同一行添加分号和注释，但最安全的做法是不缩进它，也不在同一行添加任何其他内容。


    Microsoft 没有用于声明变量的块，但它有一个语句。要声明三个变量，你可以使用三个语句：


    ```

    GO

    DECLARE @cid INT = 42;

    DECLARE @od datetime2 = current_timestamp;

    DECLARE @sid INT;

    GO

    ```


    或者你可以使用一个语句，用逗号分隔变量：


    ```

    GO

    DECLARE

    @cid INT = 42,

    @od datetime2 = current_timestamp,

    @sid INT;

    GO

    ```


    变量以 `@` 字符为前缀，这使它们易于识别并易于与列名区分开。


    `@sid` 是一个整数，稍后将被赋值。


    其余的代码与我们在第 3 章中所做的类似，但新的销售 ID 将在 `@sid` 变量中管理：


    ```

    GO

    DECLARE @cid INT = 42;

    DECLARE @od datetime2 = current_timestamp;

    DECLARE @sid INT;

    INSERT INTO sales(customerid,ordered)

    VALUES(@cid, @od);

    SET @sid = scope_identity();

    INSERT INTO saleitems(saleid,bookid,quantity)

    VALUES

    (@sid,123,3),

    (@sid,456,1),

    (@sid,789,2);

    UPDATE saleitems

    SET price=(SELECT price FROM books

    WHERE books.id=saleitems.bookid)

    WHERE saleid=@sid;

    UPDATE sales

    SET total=(SELECT sum(price*quantity)

    FROM saleitems WHERE saleid=@sid)

    WHERE id=@sid;

    GO

    ```


    `@sid` 变量的值来自 `scope_identity()` 函数。你会注意到它没有指定是哪个表：这就是为什么你需要在 `INSERT` 语句后立即调用它。从那时起，它就在后续的语句中被使用。


    你可以使用以下语句测试结果：


    ```

    SELECT * FROM sales ORDER BY id DESC;

    SELECT * FROM saleitems ORDER BY id DESC;

    ```


    你应该能在顶部看到新的销售记录和销售项目。'
