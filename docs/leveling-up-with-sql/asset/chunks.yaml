  raw: '### Splitting a String


    If you have the courage to look in the script which generated the database, you’ll
    find two recursive CTEs near the end:


    ```

    --  Populate Genres

    INSERT INTO genres(genre)

    WITH split(bookid,genre,rest,genres) AS (

    ...

    )

    SELECT DISTINCT genre

    FROM split

    WHERE split.genre IS NOT NULL;

    --  Populate Book Genres

    INSERT INTO bookgenres(bookid,genreid)

    WITH split(bookid,genre,rest,genres) AS (

    ...

    )

    SELECT split.bookid,genres.id

    FROM split JOIN genres ON split.genre=genres.genre

    WHERE split.genre IS NOT NULL;

    ```


    The reason is purely pragmatic. There are thousands of book-genre combinations,
    and, instead of dumping the `bookgenres` table directly, it was more convenient
    to code the combined genres into a table and use the recursive CTEs to pull that
    apart. To leave the genres combined would have been wrong for all the reasons
    discussed in Chapter [3](#606708_1_En_3_Chapter.xhtml).


    Here, we’ll have a look at how this process works, by splitting a few sample strings.


    We’ll first take a simple string and put it in a table literal. For now, it will
    be a simple string with comma-separated values. Later, it will be more complex.


    ```

    --  PostgreSQL, SQLite, MariaDB (not MySQL)

    WITH

    cte(fruit) AS (

    VALUES (''Apple,Banana,Cherry,Date,

    Elderberry,Fig'')

    ),

    --  MySQL (Not MariaDB)

    WITH

    cte(fruit) AS (

    VALUES row(''Apple,Banana,Cherry,Date,

    Elderberry,Fig'')

    ),

    --  MSSQL

    WITH

    cte(fruit) AS (

    SELECT *

    FROM (VALUES (''Apple,Banana,Cherry,Date,

    Elderberry,Fig'')) AS sq(a)

    ),

    --  Oracle)

    WITH

    cte(fruit) AS (

    SELECT ''Apple,Banana,Cherry,Date,

    Elderberry,Fig'' FROM dual

    ),

    ```


    In order to make the code readable, the string has been split over two lines.
    *Don’t do this in your real code!*


    Some DBMSs don’t like string literals with a line break inside. For those that
    will accept the line break, it will be part of the data, and we won’t want that.


    Be sure to write the string on one line, even if it’s very long.


    For the recursive CTE, we’ll build two values: the individual item and a string
    containing the rest of the original string. The CTE can be called `split`:


    ```

    WITH

    cte(fruit) AS (),

    split(fruit, rest) AS (

    )

    ```


    The anchor member will get the first item from the string, up to the comma, and
    the rest, after the comma:


    ```

    WITH

    cte(fruit) AS (),

    --  PostgreSQL

    split(fruit, rest) AS (

    SELECT

    substring(fruit,0,position('','' in fruits)),

    substring(fruit,position('','' in fruits)+1)||'',''

    FROM cte

    )

    --  MariaDB, MySQL

    split(fruit, rest) AS (

    SELECT

    substring(fruit,1,position('','' in fruits)-1),

    substring(fruit,position('','' in fruits)+1)||'',''

    FROM cte

    )

    --  MSSQL

    split(fruit, rest) AS (

    SELECT

    cast(substring(fruit,0,charindex('','',fruits)) as varchar(255)),

    cast(substring(fruit,charindex('','',fruits)+1,255)+'','' as varchar(255))

    FROM cte

    )

    --  SQLite

    split(fruit, rest) AS (

    SELECT

    substring(fruit,0,instr(fruits,'','')),

    substring(fruit,instr(fruits,'','')+1)||'',''

    FROM cte

    )

    --  Oracle

    split(fruit, rest) AS (

    SELECT

    substr(fruit,1,instr(fruits,'','')-1),

    substr(fruit,instr(fruits,'','')+1)||'',''

    FROM cte

    )

    ```


    Note that for MSSQL we’ve had to cast the calculation to `varchar(255)` because
    of a peculiarity with string compatibility.


    For the recursive member, we use the `rest` value. First, we get the string up
    to the first comma, which becomes the `fruit` value. Then, we get the rest of
    the string from the comma, which becomes the new value for `rest`:


    ```

    WITH

    cte(fruit) AS (),

    --  PostgreSQL

    split(fruit, rest) AS (

    SELECT ...

    UNION

    SELECT

    substring(rest,0,position('','' in rest)),

    substring(rest,position('','' in rest)+1)

    FROM cte WHERE rest''''

    )

    --  MariaDB, MySQL

    split(fruit, rest) AS (

    SELECT ...

    UNION

    SELECT

    substring(rest,1,position('','' in rest)-1),

    substring(rest,position('','' in rest)+1)

    FROM cte WHERE rest''''

    )

    --  MSSQL

    split(fruit, rest) AS (

    SELECT ...

    UNION ALL

    SELECT

    substring(rest,0,charindex('','', rest)),

    substring(rest,charindex('','', rest)+1,255)

    FROM cte WHERE rest''''

    )

    --  SQLite

    split(fruit, rest) AS (

    SELECT ...

    UNION

    SELECT

    substring(rest,0,instr(rest,'','')),

    substring(rest,instr(rest,'','')+1)

    FROM cte WHERE rest''''

    )

    --  Oracle

    split(fruit, rest) AS (

    SELECT ...

    UNION ALL

    SELECT

    substr(rest,1,instr(rest,'','')-1),

    substr(rest,instr(rest,'','')+1)

    FROM cte WHERE rest''''

    )

    ```


    Note that we don’t add a comma to the `rest` value this time: that was just to
    get started.


    We have also added `WHERE rest<>''''` to the `FROM` clause. This is because we
    need to stop recursing when there’s no more of the string to search.


    You can now try it out:


    ```

    WITH

    cte(fruit) AS (),

    split(fruit,rest) AS ()

    SELECT * FROM split;

    ```


    You should now see the following:


    | **fruit** | **rest** |

    | --- | --- |

    | Apple | Banana,Cherry,Date,Elderberry,Fig, |

    | Banana | Cherry,Date,Elderberry,Fig, |

    | Cherry | Date,Elderberry,Fig, |

    | Date | Elderberry,Fig, |

    | Elderberry | Fig, |

    | Fig | [NULL] |


    Of course, we don’t need to see the `rest` value in the output: it’s just there
    so you can see its progress.'
  trans: '

    # 字符串分割技术详解


    ## 分割字符串


    如果你有勇气去查看生成数据库的脚本，会在末尾找到两个递归 CTE：


    ```

    --  填充流派表

    INSERT INTO genres(genre)

    WITH split(bookid,genre,rest,genres) AS (

    ...

    )

    SELECT DISTINCT genre

    FROM split

    WHERE split.genre IS NOT NULL;

    --  填充书籍流派表

    INSERT INTO bookgenres(bookid,genreid)

    WITH split(bookid,genre,rest,genres) AS (

    ...

    )

    SELECT split.bookid,genres.id

    FROM split JOIN genres ON split.genre=genres.genre

    WHERE split.genre IS NOT NULL;

    ```


    原因纯粹是出于实用考虑。存在数千个书籍-流派组合，与其直接导出`bookgenres`表，不如将组合的流派编码到一个表中，然后使用递归 CTE 来拆分，这样更为方便。将流派保持组合状态是错误的，原因正如第
    3 章所讨论的那样。


    接下来，我们将通过拆分几个示例字符串来了解这个过程是如何工作的。


    首先，我们取一个简单的字符串并将其放入表字面量中。目前，它将是一个包含逗号分隔值的简单字符串。稍后，它会变得更复杂。


    ```

    --  PostgreSQL, SQLite, MariaDB (非 MySQL)

    WITH

    cte(fruit) AS (

    VALUES (''Apple,Banana,Cherry,Date,

    Elderberry,Fig'')

    ),

    --  MySQL (非 MariaDB)

    WITH

    cte(fruit) AS (

    VALUES row(''Apple,Banana,Cherry,Date,

    Elderberry,Fig'')

    ),

    --  MSSQL

    WITH

    cte(fruit) AS (

    SELECT *

    FROM (VALUES (''Apple,Banana,Cherry,Date,

    Elderberry,Fig'')) AS sq(a)

    ),

    --  Oracle

    WITH

    cte(fruit) AS (

    SELECT ''Apple,Banana,Cherry,Date,

    Elderberry,Fig'' FROM dual

    ),

    ```


    为了使代码可读，字符串被拆分在两行上。*在你的实际代码中不要这样做！*


    有些 DBMS 不喜欢内部有换行的字符串字面量。对于那些接受换行的情况，它将成为数据的一部分，而我们并不希望如此。


    务必在一行上书写字符串，即使它很长。


    对于递归 CTE，我们将构建两个值：单个项目和一个包含原始字符串剩余部分的字符串。该 CTE 可以称为`split`：


    ```

    WITH

    cte(fruit) AS (),

    split(fruit, rest) AS (

    )

    ```


    锚点成员将从字符串中获取第一个项目（直到逗号），以及逗号之后剩余的部分：


    ```

    WITH

    cte(fruit) AS (),

    --  PostgreSQL

    split(fruit, rest) AS (

    SELECT

    substring(fruit,0,position('','' in fruits)),

    substring(fruit,position('','' in fruits)+1)||'',''

    FROM cte

    )

    --  MariaDB, MySQL

    split(fruit, rest) AS (

    SELECT

    substring(fruit,1,position('','' in fruits)-1),

    substring(fruit,position('','' in fruits)+1)||'',''

    FROM cte

    )

    --  MSSQL

    split(fruit, rest) AS (

    SELECT

    cast(substring(fruit,0,charindex('','',fruits)) as varchar(255)),

    cast(substring(fruit,charindex('','',fruits)+1,255)+'','' as varchar(255))

    FROM cte

    )

    --  SQLite

    split(fruit, rest) AS (

    SELECT

    substring(fruit,0,instr(fruits,'','')),

    substring(fruit,instr(fruits,'','')+1)||'',''

    FROM cte

    )

    --  Oracle

    split(fruit, rest) AS (

    SELECT

    substr(fruit,1,instr(fruits,'','')-1),

    substr(fruit,instr(fruits,'','')+1)||'',''

    FROM cte

    )

    ```


    注意，对于`MSSQL`，我们不得不将计算转换为`varchar(255)`，这是由于字符串兼容性方面的一个特性。


    对于递归成员，我们使用`rest`值。首先，我们获取到第一个逗号之前的字符串，成为`fruit`值。然后，我们获取从逗号开始的剩余字符串，成为`rest`的新值：


    ```

    WITH

    cte(fruit) AS (),

    --  PostgreSQL

    split(fruit, rest) AS (

    SELECT ...

    UNION

    SELECT

    substring(rest,0,position('','' in rest)),

    substring(rest,position('','' in rest)+1)

    FROM cte WHERE rest''''

    )

    --  MariaDB, MySQL

    split(fruit, rest) AS (

    SELECT ...

    UNION

    SELECT

    substring(rest,1,position('','' in rest)-1),

    substring(rest,position('','' in rest)+1)

    FROM cte WHERE rest''''

    )

    --  MSSQL

    split(fruit, rest) AS (

    SELECT ...

    UNION ALL

    SELECT

    substring(rest,0,charindex('','', rest)),

    substring(rest,charindex('','', rest)+1,255)

    FROM cte WHERE rest''''

    )

    --  SQLite

    split(fruit, rest) AS (

    SELECT ...

    UNION

    SELECT

    substring(rest,0,instr(rest,'','')),

    substring(rest,instr(rest,'','')+1)

    FROM cte WHERE rest''''

    )

    --  Oracle

    split(fruit, rest) AS (

    SELECT ...

    UNION ALL

    SELECT

    substr(rest,1,instr(rest,'','')-1),

    substr(rest,instr(rest,'','')+1)

    FROM cte WHERE rest''''

    )

    ```


    注意，这次我们没有向`rest`值添加逗号：那只是为了启动递归。


    我们还在`FROM`子句中添加了`WHERE rest<>''''`。这是因为当字符串没有更多内容可供搜索时，我们需要停止递归。


    你现在可以尝试一下：


    ```

    WITH

    cte(fruit) AS (),

    split(fruit,rest) AS ()

    SELECT * FROM split;

    ```


    你现在应该看到以下内容：


    | **水果** | **剩余部分** |

    | --- | --- |

    | Apple | Banana,Cherry,Date,Elderberry,Fig, |

    | Banana | Cherry,Date,Elderberry,Fig, |

    | Cherry | Date,Elderberry,Fig, |

    | Date | Elderberry,Fig, |

    | Elderberry | Fig, |

    | Fig | [NULL] |


    当然，我们不需要在输出中看到`rest`值：它只是为了让你看到它的处理过程。

