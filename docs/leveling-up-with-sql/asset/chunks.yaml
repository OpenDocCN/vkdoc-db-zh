    ```

    /

    DECLARE

    cid INT := 42;

    od TIMESTAMP := current_timestamp;

    sid INT;

    /

    ```


    The variable names can be anything you like, but you run the risk of competing
    with column names in the following code. Some developers prefix the names with
    an underscore (such as `_cid`).


    The `sid` variable is an integer which will be assigned later. The `cid` and `od`
