- fmt: '## Splitting More Complex Data


    So far, we’ve only split a simple string. We can do that with a more complex set
    of data. Here, we’ll have a CTE with three rows and two columns:


    | **name** | **list** |

    | --- | --- |

    | colours | Red,Orange,Yellow,Green,Blue,Indigo,Violet |

    | elements | Hydrogen,Helium,Lithium,Beryllium,Boron,Carbon |

    | numbers | One,Two,Three,Four,Five,Six,Seven,Eight,Nine |


    The good news is that the process is nearly the same.


    To begin with, we’ll have a CTE with the table literal:


    ```sql

    --  PostgreSQL, SQLite, MariaDB (not MySQL)

    WITH

    cte(name,items) AS (

    VALUES

    (''colours'',''Red,Orange,...,Indigo,Violet''),

    (''elements'',''Hydrogen,Helium,...,Carbon''),

    (''numbers'',''One,Two,...,Eight,Nine'')

    ),

    --  MySQL (Not MariaDB)

    WITH

    cte(name,items) AS (

    VALUES

    row(''colours'',''Red,Orange,...,Indigo,Violet''),

    row(''elements'',''Hydrogen,Helium,...,Carbon''),

    row(''numbers'',''One,Two,...,Eight,Nine'')

    ),

    --  MSSQL

    WITH

    cte(name,items) AS (

    SELECT *

    FROM (

    VALUES

    (''colours'',''Red,Orange,...,Indigo,Violet''),

    (''elements'',''Hydrogen,Helium,...,Carbon''),

    (''numbers'',''One,Two,...,Eight,Nine'')

    ) AS sq(a,b)

    ),

    --  Oracle)

    WITH

    cte(name,items) AS (

    SELECT ''colours'',''Red,Orange,...,Indigo,Violet''

    FROM dual

    UNION ALL SELECT ''elements'',''Hydrogen,...,Carbon''

    FROM dual

    UNION ALL SELECT ''numbers'',''One,Two,...,Eight,Nine''

    FROM dual

    ),

    ```


    (We’ve obviously abbreviated the lists to fit nicely on the page.)


    For the anchor member, we start the same way as before, but we’ll include the
    `name` of the list. It won’t be involved in the split, but is useful for the output.


    ```sql

    WITH

    cte(name, items) AS (),

    --  PostgreSQL

    split(name, item, rest) AS (

    SELECT

    name,

    substring(items,0,position('','' in items)),

    substring(items,position('','' in items)+1)||'',''

    FROM cte

    )

    --  MariaDB, MySQL

    split(name, list, rest) AS (

    SELECT

    name,

    substring(items,1,position('','' in items)-1),

    substring(items,position('','' in items)+1)||'',''

    FROM cte

    )

    --  MSSQL

    split(name, list, rest) AS (

    SELECT

    name,

    cast(substring(items,0,charindex('','', items)) as varchar(255)),

    substring(items,charindex('','', items)+1,255)+'',''

    FROM cte

    )

    --  SQLite

    split(name, list, rest) AS (

    SELECT

    name,

    substring(items,0,instr(items,'','')),

    substring(items,instr(items,'','')+1)||'',''

    FROM cte

    )

    --  Oracle

    split(name, list, rest) AS (

    SELECT

    name,

    substr(items,1,instr(items,'','')-1),

    substr(items,instr(items,'','')+1)||'',''

    FROM cte

    )

    ```


    As for the recursive member, again it’s the same idea, with the `name` value included:


    ```sql

    WITH

    cte(name, items) AS (),

    --  PostgreSQL

    split(name, list, rest) AS (

    SELECT ...

    UNION

    SELECT

    name,

    substring(rest,0,position('','' in rest)),

    substring(rest,position('','' in rest)+1)

    FROM cte WHERE rest''''

    )

    --  MariaDB, MySQL

    split(name, list, rest) AS (

    SELECT ...

    UNION

    SELECT

    name,

    substring(rest,1,position('','' in rest)-1),

    substring(rest,position('','' in rest)+1)

    FROM cte WHERE rest''''

    )

    --  MSSQL

    split(name, list, rest) AS (

    SELECT ...

    UNION ALL

    SELECT

    name,

    cast(substring(rest,0,charindex('','', rest)) as varchar(255)),

    substring(rest,charindex('','', rest)+1,255)

    FROM cte WHERE rest''''

    )

    --  SQLite

    split(name, list, rest) AS (

    SELECT ...

    UNION

    SELECT

    name,

    substring(rest,0,instr(rest,'','')),

    substring(rest,instr(rest,'','')+1)

    FROM cte WHERE rest''''

    )

    --  Oracle

    split(name, list, rest) AS (

    SELECT ...

    UNION ALL

    SELECT

    name,

    substr(rest,1,instr(rest,'','')-1),

    substr(rest,instr(rest,'','')+1)

    FROM cte WHERE rest''''

    )

    ```


    We can now put this to the test:


    ```sql

    WITH

    cte(name, items) AS ()

    split(name, item, rest) AS ()

    SELECT *

    FROM split

    ORDER BY name, item;

    ```


    When it’s all going, you should see something like the following:


    | **name** | **item** | **rest** |

    | --- | --- | --- |

    | colours | Blue | Indigo,Violet, |

    | colours | Green | Blue,Indigo,Violet, |

    | colours | Indigo | Violet, |

    | colours | Orange | Yellow,Green,Blue,Indigo,Violet, |

    | colours | Red | Orange,Yellow,Green,Blue,Indigo,Violet, |

    | colours | Violet | [NULL] |

    | colours | Yellow | Green,Blue,Indigo,Violet, |

    | elements | Beryllium | Boron,Carbon, |

    | elements | Boron | Carbon, |

    | elements | Carbon | [NULL] |

    | elements | Helium | Lithium,Beryllium,Boron,Carbon, |

    | elements | Hydrogen | Helium,Lithium,Beryllium,Boron,Carbon, |

    | elements | Lithium | Beryllium,Boron,Carbon, |

    | numbers | Eight | Nine, |

    | numbers | Five | Six,Seven,Eight,Nine, |

    | numbers | Four | Five,Six,Seven,Eight,Nine, |

    | numbers | Nine | [NULL] |

    | numbers | One | Two,Three,Four,Five,Six,Seven,Eight,Nine, |

    | numbers | Seven | Eight,Nine, |

    | numbers | Six | Seven,Eight,Nine, |

    | numbers | Three | Four,Five,Six,Seven,Eight,Nine, |

    | numbers | Two | Three,Four,Five,Six,Seven,Eight,Nine, |


    As you see the recursive CTE was able to work with multiple rows of data.


    ## Summary


    In this chapter, we had a closer look at using Common Table Expressions. A common
    table expression generates a virtual table that you can use later in the main
    query. In the past, you would make do with a subquery in the `FROM` clause.


    The reason why you would use a CTE or a `FROM` subquery is that you might need
    to prepare data but you don’t want to go to the trouble of saving it either in
    a view or a temporary table. CTEs are more ephemeral than temporary tables in
    that they are not saved at all.


    CTEs have a number of advantages over `FROM` subqueries:


    *   You define the CTE before using it, making the query more readable and more
    manageable.


    *   You can chain multiple dependent or independent CTEs simply. If you wanted
    to do that with `FROM` subqueries, you would have to nest them, which gets unwieldy
    very quickly.


    *   CTEs can be recursive, so you can use them to iterate through data.


    ### Simple CTEs


    The simplest use of a CTE is to prepare data for further processing. Some uses
    include


    *   Defining a set of constant values, either as literals or as calculated values


    *   Preparing aggregate data, to be combined with non-aggregate queries


    ### Parameter Names


    A CTE is expected to have a name or alias for each column. You can define the
    names inside the CTE, or you can define them as part of the CTE definition.


    ### Multiple CTEs


    Some queries involve multiple steps. These steps can be implemented by chaining
    multiple CTEs.


    ### Recursive CTEs


    A recursive CTE is one which references itself. It can be used for iterating through
    a set of data.


    Some uses of recursive CTEs include


    *   Generating a sequence of values


    *   Traversing a hierarchy through a self-join


    *   Splitting strings into smaller parts


    ## Coming Up


    So far, we’ve worked on a number of important major concepts. In the next chapter,
    we’ll have a look at a few additional techniques you can use to work smarter with
    your database:


    *   **Triggers** allow you to automate a process whenever some of the data changes.


    *   **Pivot tables** are basically a two-dimensional aggregate query.


    *   **Variables** allow you to hold interim values when there’s too much going
    on.


