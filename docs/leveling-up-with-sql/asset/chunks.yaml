- fmt: "### One-to-Maybe Relationships\n\nTechnically, a *true* **one-to-one** relationship\
    \ requires a reference from both tables to each other. Among other things, it\
    \ is hard to implement as it might require adding both rows at the same time.\n\
    \nSince a row from table A must reference a row from table B, you would need to\
    \ have the table B row in place before you add to table A. However, if a row from\
    \ table B must also reference a row from table A, then you need to add to table\
    \ A first. That’s clearly a contradiction.\n\nOne way to do this would be to **defer**\
    \ the foreign key constraint until after you’ve added to both tables in either\
    \ order. Unfortunately, most DBMSs don’t let you do this, so you’re stuck with\
    \ this impossible situation.\n\nA more common variation of this relationship is\
    \ the **one-to-maybe** relationship.^([⁴](#fn4)) This allows the second table\
    \ to contain data which does not necessarily apply to every row of the first table.\n\
    \nFor example, the `vip` table contains extra details for some of the customers.\
    \ In SQL, it looks something like this:\n\n```sql\nCREATE TABLE customers (  \
    \      --  main table\nid INT PRIMARY KEY\n--  main data\n);\nCREATE TABLE vip\
    \ (         --  secondary table\nid INT PRIMARY KEY REFERENCES customers(id)\n\
    --  additional columns\n);\n```\n\nVisually, it looks like Figure [3-6](#606708_1_En_3_Chapter.xhtml#Fig6).\n\
    \n![](images/606708_1_En_3_Chapter/606708_1_En_3_Fig6_HTML.jpg)\n\nTwo blocks,\
    \ namely, customers and V I P describe the one-to-maybe join. V I P i d and P\
    \ K links to customer i d and P K.\n\nFigure 3-6\n\nOne-to-Maybe Join\n\nHere,\
    \ the secondary table contains additional data for *some* of the rows in the main\
    \ table.\n\nNote that this relationship is implemented by making the `id` in the\
    \ secondary table both a primary key and a foreign key.\n\nFor example, the `vip`\
    \ table includes additional features for some customers:\n\n```sql\nSELECT * FROM\
    \ customers ORDER BY id;\nSELECT * FROM vip ORDER BY id;\n```\n\nYou can see all\
    \ of the customers, some of whom also have VIP data:\n\n| **Id** | **givenname**\
    \ | **familyname** | **...** |\n| --- | --- | --- | --- |\n| 1 | Pierce | Dears\
    \ | ... |\n| 2 | Arthur | Moore | ... |\n| 5 | Ray | King | ... |\n| 6 | Gene\
    \ | Poole | ... |\n| 9 | Donna | Worry | ... |\n| 10 | Ned | Duwell | ... |\n\
    | ~ 303 rows ~ |\n| **Id** | **status** | **discount** | **review** |\n| 5 | 3\
    \ | 0.05 | 2023-12-01 |\n| 10 | 2 | 0.1 | 2023-08-23 |\n| 21 | 1 | 0.15 | 2024-03-14\
    \ |\n| 26 | 1 | 0.15 | 2024-02-24 |\n| 40 | 1 | 0.15 | 2023-11-11 |\n| 41 | 3\
    \ | 0.05 | 2024-03-09 |\n| ~ 81 rows ~ |\n\nYou’ll notice that there aren’t as\
    \ many rows in the `vip` table as in the `customers` table. There might have been,\
    \ if every customer were a VIP, but not in this case.\n\nYou can see how they\
    \ relate using a join:\n\n```sql\nSELECT c.*, v.*\nFROM customers AS c LEFT JOIN\
    \ vip AS v ON c.id=v.id;\n```\n\nThis effectively gives you a widened `customers`\
    \ table:\n\n| **id** | **givenname** | **familyname** | **...** | **id** | **status**\
    \ | **discount** | **review** |\n| --- | --- | --- | --- | --- | --- | --- | ---\
    \ |\n| 42 | May | Knott | ... | 42 | 3 | 0.05 | 2024-01-03 |\n| 459 | Rick | Shaw\
    \ | ... |   |   |   |   |\n| 597 | Ike | Andy | ... |   |   |   |   |\n| 186 |\
    \ Pat | Downe | ... |   |   |   |   |\n| 352 | Basil | Isk | ... | 352 | 1 | 0.15\
    \ | 2023-08-06 |\n| 576 | Pearl | Divers | ... |   |   |   |   |\n| ~ 303 rows\
    \ ~ |\n\nThis gives all of the customers, with either their VIP data or NULLs\
    \ in the extra columns.\n\nNote\n\n*   We need the `LEFT JOIN` to include non-VIP\
    \ customers. If you wanted VIP customers only, a simple (inner) `JOIN` would be\
    \ better.\n\n    We could have used `SELECT *`, but using `c.*, v.*` allows you\
    \ to decide which tables you are most interested in.\n\nAs a special case, you\
    \ can also select VIP customers only, without additional VIP columns, using\n\n\
    ```sql\nSELECT c.*\nFROM customers AS c JOIN vip AS v ON c.id=v.id;\n```\n\nHere,\
    \ the inner join selects only VIP customers, and the `c.*` selects only the customer\
    \ columns.\n\nWhy you would want to do this is, of course, up to you.\n\n### Multiple\
    \ Values\n\nOne major question in database design is how to handle multiple values.\
    \ The principles of properly normalized tables preclude multiple values in a row:\n\
    \n*   A single column cannot contain multiple values.\n\n    For example, you\
    \ shouldn’t have multiple phone numbers in a single column, such as `0270101234,0355505678`.\
    \ This would be impossible to sort or search properly and be a real nightmare\
    \ to maintain.\n\n*   You shouldn’t have multiple columns with the same role.\n\
    \n    For example, you shouldn’t have multiple columns for phone numbers such\
    \ as `phone1`, `phone2`, `phone3`, etc. It would make searching problematic as\
    \ you can’t be sure which column to search. You would also have the problem of\
    \ too many or not enough columns.\n\n    Note that you *can* do this if there\
    \ is a clear distinction in the *type* of phone number. For example, you could\
    \ legitimately have separate columns for `fax` (does anybody remember these?),\
    \ `mobile`, and `landline` numbers.\n\nFor example, suppose we wish to record\
    \ multiple genres for a book. Here are two attempted solutions which are *not\
    \ correct*:\n\n*   A column with multiple (delimited) values\n\n    The idea is\
    \ that the genre column would have multiple genres or genre ids, delimited possibly\
    \ by a comma. The problem is that the data is not atomic, and this becomes very\
    \ difficult to sort, search, and update. You will also need extra work to use\
    \ the data.\n\n*   Multiple columns for genres\n\n    You cannot have multiple\
    \ columns with the same name, so these columns might be called `genre1`, `genre2`,\
    \ etc. Here, the problems are (a) you will either have too many or not enough\
    \ columns, (b) there is no “correct” column for a particular value, and (c) searching\
    \ and sorting are impractical.\n\nThe problem of recording genres is more complicated,\
    \ because not only can one book have multiple genres, one genre can apply to multiple\
    \ books. This is an example of a **many-to-many** relationship.\n\nThis cannot\
    \ be achieved directly between the two tables; rather, it involves an additional\
    \ table between them.\n\nIf you have the courage to look at the script which created\
    \ and populated the sample database, you’ll find a table called `booksgenres`\
    \ (not to be confused with the `bookgenres` table, which is, of course, *completely*\
    \ different) which does indeed have the genres combined in a single column. This\
    \ is, of course, cheating.\n\nThe `booksgenres` table is used as a simple method\
    \ of carrying what will be thousands of rows in two other tables, and there is\
    \ a rather frightening part of the script later on which pulls this data apart\
    \ to populate these tables. The `booksgenres` table will then be dropped to hide\
    \ the evidence.\n\nThis is one case where you might break the rules for the purpose\
    \ of transferring or backing up the data only. However, the data should *never*\
    \ stay in this format."
