- fmt: '# 10. More Techniques: Triggers, Pivot Tables, and Variables


    Throughout the book, we’ve looked at pushing our knowledge and application of
    SQL a little further and explored a number of techniques, some new and some not
    so new. When looking at some techniques, in particular, those involving aggregates
    and common table expressions, we also got a sense of pushing SQL deeper, with
    multitiered statements. In this chapter, we’ll go a little beyond simple SQL and
    explore a few techniques which supplement SQL. They’re not directly related to
    each other, but they all allow you to do more in working with your data.


    SQL triggers are small blocks of code which run automatically in some response
    to some database event. We’ll look at how these work and how you would write one.
    In particular, we’ll look at a trigger to automatically archive data which has
    been deleted. Pivot tables are aggregates in two dimensions. They allow you to
    build summaries in both row and column data. We’ll look at an example of preparing
    data to be summarized and how we produce a pivot table. Variables are pieces of
    temporary data which can be used to maintain values between statements. They allow
    us to run a group of SQL statements, while they hold interim values which are
    passed from one statement to another. In this chapter, we’ll look at using variables
    to hold temporary values while we add data to multiple tables.


    ## Understanding Triggers


    Sometimes, a simple SQL query isn’t quite enough. Sometimes, what you really want
    is for a query to start off one or more additional queries. Sometimes, what you
    want is a `trigger`. A `trigger` is a small block of code which will be run automatically
    when something happens to the database. There are various types of triggers, including:


    *   DML (Data Manipulation Language) triggers run when some change is made to
    the data tables, as when the `INSERT`, `UPDATE`, or `DELETE` statements are executed.

    *   DDL (Data Definition Language) triggers run when changes are made to the structure
    of the database, such as when `CREATE`, `ALTER`, or `DROP` statements are executed.

    *   Logon triggers run when a user has logged in.


    One reason you might use DDL or Logon triggers is if you want to track activity
    by storing this in a logging table. Here, we’re going to look more at a DML trigger.


    Triggers can be used to fill in some shortcomings of standard DBMS behavior. Here
    are some examples which might call for a trigger:


    *   You might have an activity table which wants a date column updated every time
    you make a change. You can use a trigger to set the column for every insert or
    update.

    *   Suppose you have a rental table, where you enter a start and a finish date.
    You’d like the finish date to default to the start date if it isn’t entered. SQL
    defaults aren’t quite so clever, but you can set a trigger to set the finish date
    when you insert a new row.

    *   SQL has no auditing in the normal sense of the word. You can create a trigger
    to add some data to a logging table every time a row is added, updated, or deleted.


    In this example, we’re going to create a trigger to keep a copy of data which
    we’re going to delete from the `sales` table. In some of the preceding chapters,
    we’ve had to contend with the fact that in the `sales` table, some rows have `NULL`s
    for the ordered date/time. Presumably, those sales never checked out. We’ve been
    pretty forgiving so far and filtered them out from time to time, but the time
    has come to deal with them. We can delete all of the `NULL` sales as follows:


    ```sql

    --  Not Yet!

    DELETE FROM sales WHERE ordered IS NULL;

    ```


    Note that there’s a foreign key from the `saleitems` table to the `sales` table,
    which would normally disallow deleting the sales if there are any items attached.
    However, if you check the script which generates the sample database, you’ll notice
    the `ON DELETE CASCADE` clause, which will automatically delete the orphaned sale
    items.


    When should you delete data? The short answer is never. The longer answer is more
    complicated. You would delete data that was entered in error, or you would delete
    test data when you’ve finished testing. In this case, we’re going to delete the
    sales with a `NULL` for the `ordered` date; we’ll assume that the sale was never
    checked out and that the customer won’t ever come back and finish it. However,
    we’ll keep a copy of it anyway, just in case.


    Most DBMSs handle triggers in a very similar way, but there are variations. We’ll
    go over the basics first and then the details for individual DBMSs.


    ### Some Trigger Basics


    The basic syntax for creating a trigger is something like this:


    ```sql

    CREATE TRIGGER something

    ON some_table

    BEFORE DELETE

    BEGIN

    ...

    END

    ```


    None of the DBMSs do it exactly the same way, but it’s roughly right:


    *   The trigger, of course, has a name: `CREATE TRIGGER something`.

    *   The trigger is attached to a table: `ON some_table`.

    *   The trigger is attached to an event.


    The event is typically one of `BEFORE`, `AFTER`, or `INSTEAD OF`, followed by
    one of the DML statements. In this example, we want to do something with the old
    data before it’s deleted. For the sample trigger, we’re going to copy the old
    data into a table called `deleted_sales`. This means that we’re going to have
    to get to the data before it’s vanished. The appropriate event is `BEFORE DELETE`.


    It’s going to be a little complicated, because we want to copy not only the data
    from the `sales` table but also from the `saleitems` table. We’ll do that by concatenating
    those items into one string. You really shouldn’t keep multiple items that way,
    but it’s good enough for an archive, and you can always pull it apart if you ever
    need to.


    The archive table looks something like this:


    ```sql

    CREATE TABLE deleted_sales (

    id INT PRIMARY KEY,     --  Auto Incremented

    saleid INT,

    customerid INT,

    items VARCHAR(255),

    deleted_date TIMESTAMP  --  date/time

    );

    ```


    This table has already been created.'
