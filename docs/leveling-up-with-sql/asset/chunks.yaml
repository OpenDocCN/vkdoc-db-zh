    split(name, list, rest) AS (

    SELECT

    name,

    substring(items,0,instr(items,'','')),

    substring(items,instr(items,'','')+1)||'',''

    FROM cte

    )

    --  Oracle

    split(name, list, rest) AS (

    SELECT

    name,

    substr(items,1,instr(items,'','')-1),

    substr(items,instr(items,'','')+1)||'',''

    FROM cte

    )

    ```


    至于递归成员，同样遵循相同的思路，并包含了 `name` 值：


    ```sql

    WITH

    cte(name, items) AS (),

    --  PostgreSQL

    split(name, list, rest) AS (

    SELECT ...

    UNION

    SELECT

    name,

    substring(rest,0,position('','' in rest)),

    substring(rest,position('','' in rest)+1)

    FROM cte WHERE rest''''

    )

    --  MariaDB, MySQL

    split(name, list, rest) AS (

    SELECT ...

    UNION

    SELECT

    name,

    substring(rest,1,position('','' in rest)-1),

    substring(rest,position('','' in rest)+1)

    FROM cte WHERE rest''''

    )

    --  MSSQL

    split(name, list, rest) AS (

    SELECT ...

    UNION ALL

    SELECT

    name,

    cast(substring(rest,0,charindex('','', rest)) as varchar(255)),

    substring(rest,charindex('','', rest)+1,255)

    FROM cte WHERE rest''''

    )

    --  SQLite

    split(name, list, rest) AS (

    SELECT ...

    UNION

    SELECT

    name,

    substring(rest,0,instr(rest,'','')),

    substring(rest,instr(rest,'','')+1)

    FROM cte WHERE rest''''

    )

    --  Oracle

    split(name, list, rest) AS (

    SELECT ...

    UNION ALL

    SELECT

    name,

    substr(rest,1,instr(rest,'','')-1),

    substr(rest,instr(rest,'','')+1)

    FROM cte WHERE rest''''

    )

    ```


    我们现在可以对此进行测试：


    ```sql

    WITH

    cte(name, items) AS ()

    split(name, item, rest) AS ()

    SELECT *

    FROM split

    ORDER BY name, item;

    ```


    当一切顺利运行时，您应该会看到类似以下的结果：


    | **名称 (name)** | **项目 (item)** | **剩余 (rest)** |

    | --- | --- | --- |

    | colours | Blue | Indigo,Violet, |

    | colours | Green | Blue,Indigo,Violet, |

    | colours | Indigo | Violet, |

    | colours | Orange | Yellow,Green,Blue,Indigo,Violet, |

    | colours | Red | Orange,Yellow,Green,Blue,Indigo,Violet, |

    | colours | Violet | [NULL] |

    | colours | Yellow | Green,Blue,Indigo,Violet, |

    | elements | Beryllium | Boron,Carbon, |

    | elements | Boron | Carbon, |

    | elements | Carbon | [NULL] |

    | elements | Helium | Lithium,Beryllium,Boron,Carbon, |

    | elements | Hydrogen | Helium,Lithium,Beryllium,Boron,Carbon, |

    | elements | Lithium | Beryllium,Boron,Carbon, |

    | numbers | Eight | Nine, |

    | numbers | Five | Six,Seven,Eight,Nine, |

    | numbers | Four | Five,Six,Seven,Eight,Nine, |

    | numbers | Nine | [NULL] |

    | numbers | One | Two,Three,Four,Five,Six,Seven,Eight,Nine, |

    | numbers | Seven | Eight,Nine, |

    | numbers | Six | Seven,Eight,Nine, |

    | numbers | Three | Four,Five,Six,Seven,Eight,Nine, |

    | numbers | Two | Three,Four,Five,Six,Seven,Eight,Nine, |


    如您所见，递归 CTE 能够处理多行数据。


    ## 总结


    在本章中，我们仔细研究了如何使用**公共表表达式**。公共表表达式生成一个虚拟表，您可以稍后在主查询中使用它。过去，您会在 `FROM` 子句中使用子查询来应付。


    您会使用 CTE 或 `FROM` 子查询的原因是，您可能需要准备数据，但又不想麻烦地将其保存在视图或临时表中。CTE 比临时表更短暂，因为它们根本不会被保存。


    与 `FROM` 子查询相比，CTE 有一些优势：


    *   您在 CTE 使用前就定义它，使查询更易读、更易于管理。

    *   您可以简单地链接多个相互依赖或独立的 CTE。如果您想使用 `FROM` 子查询来实现这一点，就必须嵌套它们，这很快就会变得难以处理。

    *   CTE 可以是递归的，因此您可以用它们来迭代数据。


    ### 简单的 CTE


    CTE 最简单的用途是为后续处理准备数据。一些用途包括：


    *   定义一组常量值，可以是字面值或计算值。

    *   准备聚合数据，以便与非聚合查询结合使用。


    ### 参数名称


    CTE 期望为每一列提供一个名称或别名。您可以在 CTE 内部定义这些名称，也可以将它们作为 CTE 定义的一部分来定义。


    ### 多个 CTE


    一些查询涉及多个步骤。这些步骤可以通过链接多个 CTE 来实现。


    ### 递归 CTE


    递归 CTE 是指引用自身的 CTE。它可以用于迭代一组数据。


    递归 CTE 的一些用途包括：


    *   生成一系列值。

    *   通过自连接遍历层次结构。

    *   将字符串拆分为更小的部分。


    ## 后续内容


    到目前为止，我们已经处理了多个重要的核心概念。在下一章中，我们将了解一些额外的技术，您可以用它们来更智能地处理数据库：


    *   **触发器 (Triggers)** 允许您在数据发生某些变化时自动执行流程。

    *   **数据透视表 (Pivot tables)** 本质上是二维聚合查询。

    *   **变量 (Variables)** 允许您在操作过于复杂时保存中间值。


