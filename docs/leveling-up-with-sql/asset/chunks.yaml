  trans: '#### 不要过度级联视图


    你可以基于其他视图构建视图。这有助于简化工作流程，但需要谨慎：


    *   修改底层视图可能会导致该视图混乱。某些数据库管理系统甚至不允许你更改视图，如果另一个视图依赖于它的话。

    *   SQL 会尝试优化你的查询，但如果视图嵌套层级过深，它可能无法很好地进行优化。

    *   其中一个视图可能包含了新视图所需的更多内容，因此你是在浪费处理时间来生成你不需要的数据。


    这并不意味着你不应该在现有视图的基础上构建，而是说你应该明智地这样做。


    #### 不要使用 SELECT *


    `SELECT *` 很可能无法完全满足你的需求，但即使它能，你可能也应该明确列出所有列。某些数据库管理系统甚至会将 `SELECT *` 转换为列列表。


    `SELECT *` 可能不是一个好主意的原因包括：


    *   你可能希望自定义列的顺序，而不是使用默认顺序。

    *   底层表的结构可能会发生变化，因此你的视图最终可能并非你最初预期的样子。


    #### 避免使用 ORDER BY


    大多数数据库管理系统允许你在视图中包含 `ORDER BY` 子句，即使在 MSSQL 中，你也可以强制使用它。然而，这可能不是一个好主意。


    你很可能会希望以各种方式对视图进行排序。即使你偏好一种排序顺序，你也不希望数据库管理系统在你再次排序之前不必要地对结果进行排序。


    然而，你应该做的是确保你的视图包含你以后将用于排序的列。


    ### 表值函数


    视图是一个强大的工具，但它有一个缺点：你不能更改视图中使用的任何值。例如，`aupricelist` 视图中的税率是硬编码的 10%。一种更灵活的视图类型将允许你输入自己的税率。这样的视图将被称为
    **参数化视图**。


    SQL 通常不支持参数化视图。一些数据库管理系统支持生成虚拟表的函数，称为 **表值函数**，或者如果你赶时间可以叫它 TVF。这将产生大致相同的结果。


    在我们常用的数据库管理系统中，只有 PostgreSQL 和 Microsoft SQL Server 支持创建 TVF 的直接方法。我们将在接下来的讨论中探讨这两种。


    大多数数据库管理系统允许你创建自定义函数。一个值得注意的例外是 SQLite，不过它允许你在外部创建函数并将其挂钩进来。


    一次生成单个值的函数称为 **标量** 函数。像 `lower()` 和 `length()` 这样的内置函数就是标量函数。


    在创建函数时，从某种意义上说，存在一个契约。函数定义包括期望的输入数据以及将返回的数据类型。如果输入数据不符合要求，那么就不要期待有结果。


    TVF 的工作方式相同：你定义期望的输入，并承诺返回一个结果表。在这里，我们将创建一个更通用的价格表，它允许你告知税率，而不是硬编码。


    要使用 TVF，你像使用任何虚拟表一样使用它：


    ```sql

    SELECT *

    FROM pricelist(15);

    ```


    这里，TVF 被称为 `pricelist()`，输入参数是 `15`，意思是 15%。代码应负责将其转换为 `0.15`：


    | **id** | **Title** | **pub** | **author** | **price** | **tax** | **inc** |

    | --- | --- | --- | --- | --- | --- | --- |

    | 2078 | The Duel | 1811 | Heinrich von Kleis ... | 12.50 | 1.88 | 14.38 |

    | 503 | Uncle Silas | 1864 | J. Sheridan Le Fan ... | 17.00 | 2.55 | 19.55 |

    | 2007 | North and South | 1854 | Elizabeth Gaskell | 17.50 | 2.63 | 20.13 |

    | 702 | Jane Eyre | 1847 | Charlotte Brontë | 17.50 | 2.63 | 20.13 |

    | 1530 | Robin Hood, The Pr ... | 1862 | Alexandre Dumas | 12.50 | 1.88 | 14.38
    |

    | 1759 | La Curée | 1872 | Émile Zola | 16.00 | 2.40 | 18.40 |

    | ~ 1070 rows ~ |


    我们接下来将为 PostgreSQL 和 MSSQL 实现这个。


    #### PostgreSQL 中的 TVF


    PostgreSQL 中 TVF 的大纲如下：


    ```sql

    CREATE FUNCTION pricelist(...)

    RETURNS TABLE (...)

    LANGUAGE plpgsql AS

    $$

    BEGIN

    RETURN QUERY

    SELECT ...

    END

    $$;

    ```


    在这个大纲中：


    *   函数名 `pricelist` 包含了输入参数的名称和类型。

    *   该函数将返回一个包含列名和类型的 `TABLE` 结构。

    *   编程语言是 `plpgsql`，这是 PostgreSQL 的标准编程语言。

    *   实际的代码包含在一个大的字符串中。因为代码中可能还有其他字符串，两端的 `$$` 充当了一个替代的分隔符。

    *   然后代码被放置在 `BEGIN` 和 `END` 之间；在这个例子中，它将返回一个 `SELECT` 查询的结果。


    填充细节后，我们可以这样写：


    ```sql

    DROP FUNCTION IF EXISTS pricelist(taxrate decimal(4,2));

    CREATE FUNCTION pricelist(taxrate decimal(4,2))

    RETURNS TABLE (

    id int, title varchar, published int, author text,

    price decimal(5,2), tax decimal(4,2), inc decimal(5,2)

    )

    LANGUAGE plpgsql AS $$

    BEGIN

    RETURN QUERY

    SELECT

    b.id, b.title, b.published,

    coalesce(a.givenname||'' '','''') || coalesce(othernames||'' '','''')

    || a.familyname AS author,

    b.price, b.price*taxrate/100 AS tax,

    b.price*(1+taxrate/100) AS inc

    FROM books as b LEFT JOIN authors a ON b.authorid=a.id

    WHERE b.price IS NOT NULL;

    END; $$;

    ```


    输出表是最繁琐的部分。在其中，我们必须列出我们期望生成的所有列名和类型。


    至于计算，我们采取了一种用户友好的方式，允许税率类似于我们在现实生活中可能使用的百分比。我们不能使用 `%`，尤其是因为它有其他含义，但除此之外，我们可以使用这个值。不过，我们需要将其除以
    100 以得到其真实值。


    #### Microsoft SQL 中的 TVF


    在 Microsoft SQL 中创建 TVF 要比在 PostgreSQL 中简单得多。Microsoft SQL 中 TVF 的大纲如下：


    ```sql

    GO

    CREATE FUNCTION pricelist(...) RETURNS TABLE AS

    RETURN SELECT ...

    GO

    ```


    MSSQL 中有两种类型的 TVF。有一种更复杂的类型，但前面提到的简单类型与创建视图非常相似。


    在这个大纲中：


    *   函数名 `pricelist` 包含了输入参数的名称和类型。

    *   该函数将返回一个 `TABLE` 结构。

    *   在简单的 TVF 中，只有一个 `SELECT` 语句，该语句会立即作为结果返回。

    *   实际的代码与视图的代码几乎相同，只是它会包含来自输入参数的值。


    填充细节后，我们可以这样写：


    ```sql

    DROP FUNCTION IF EXISTS pricelist;

    GO

    CREATE FUNCTION pricelist(@taxrate decimal(4,2))

    RETURNS TABLE AS

    RETURN SELECT

    b.id, b.title, b.published,

    coalesce(a.givenname+'' '','''')

    + coalesce(othernames+'' '','''')

    + a.familyname AS author,

    b.price, b.price*@taxrate/100 AS tax,

    b.price*(1+@taxrate/100) AS inc

    FROM books as b JOIN authors a ON b.authorid=a.id

    WHERE b.price IS NOT NULL;

    GO

    ```


    输入参数名为 `@taxrate`。实际上，它的真名是 `taxrate`，但 MSSQL 使用 `@` 字符作为所有变量的前缀。


    与 PostgreSQL 版本一样，我们采取了一种用户友好的方式，允许税率类似于我们在现实生活中可能使用的百分比。我们不能使用 `%`，尤其是因为它有其他含义，但除此之外，我们可以使用这个值。不过，我们需要将其除以
    100 以得到其真实值。


    ### 你能用视图做什么？


    既然视图是一个虚拟表，那么可以用视图做哪些类型的事情呢？


    #### 便捷性


    视图最直接的用途是作为一种便捷的方式来封装一个有用的 `SELECT` 查询。例如：


    ```sql

    SELECT * FROM customerdetails;

    SELECT * FROM aupricelist;

    ```


    前面的两个视图都包含了连接，其中一个还包含了多项计算。当你需要时，使用已保存的视图要方便得多。'
- fmt: '# 视图的多种用途


    ## 作为接口


    视图的第二个用途是为现有数据提供一个一致的接口。


    例如，当我们通过引用另一个表并删除几个列来重构 `customers` 表时，我们面临着使依赖于旧结构的任何其他查询失效的风险。通过创建 `customerdetails`
    视图，你有了一个新的虚拟表，它可以像旧表一样被读取。


    在你重命名或重新组织表和列的过程中，这也很方便。假设，例如，你正在开发 `customers` 表的新版本，包含以下一些列：


    | customerid | firstname | lastname | height_in_inches | au_phone | ... |

    | --- | --- | --- | --- | --- | --- |

    | ... | ... | ... | ... | ... | ... |


    你可以用类似下面的语句来准备它：


    ```

    /* Notes

    ========================================================

    MSSQL:              Use + for concatenation

    Oracle, SQLite: Use substr(phone,2) instead of right()

    ======================================================= */

    --  CREATE VIEW newcustomers AS

    SELECT

    id AS customerid,

    givenname AS firstname, familyname AS lastname,

    cast(height/2.54 as decimal(3,1))

    AS height_in_inches,

    ''+61'' || right(phone,9) AS au_phone

    --  etc

    FROM customers;

    ```


    这将给你类似下面的结果：


    | customerid | firstname | lastname | height_in_inches | au_phone |

    | --- | --- | --- | --- | --- |

    | 42 | May | Knott | 66.3 | +61255509371 |

    | 459 | Rick | Shaw | 67.3 | +61370101040 |

    | 597 | Ike | Andy | 60.2 | [NULL] |

    | 186 | Pat | Downe | 69.3 | +61870105900 |

    | 352 | Basil | Isk | 61.6 | +61255502503 |

    | 576 | Pearl | Divers | 69.4 | +61370107821 |

    | ~ 303 rows ~ |


    （`CREATE VIEW` 子句被注释掉了，因为我们并不真的打算执行它。）


    如果你正在为外部应用程序准备数据，这种方法也会很有用。


    ## 与外部应用程序协作


    虽然我们一直在前端客户端上花费时间，但这并非数据的必然归宿。通常，我们会在外部应用程序（如报表软件）中使用数据。


    最有意义的是在将数据用于外部应用程序之前，尽可能多地进行预处理。特别是，连接表或运行子查询应该在数据库端完成，而不是之后。


    请注意，有些事情数据库无法轻易完成。例如，可能存在数据格式要求或某些数据库服务器不支持的函数。为此，你需要提取原始数据并在外部应用程序中处理。


    与外部应用程序协作的例子包括：


    -   与文字处理器进行邮件合并

    -   在电子表格中使用数据透视表

    -   与报表软件配合使用


    这类软件通常在数据操作方面能力有限，因此尽可能多地进行预处理是明智的。从外部软件的角度来看，你的视图将被视为单个表（尽管通常它们仍会表明自己实际上是视图）。


    ## 缓存数据与临时表


    一些数据库管理系统提供物化视图。这是一种可以缓存数据的视图类型。其结果是，重复从视图读取数据（不一定）需要重新处理。


    当你使用视图时，你可能会给数据库管理系统带来额外的负担。如果视图需要进行一些复杂的处理和连接，那么每次查看视图时，你都会发现自己在重复进行额外的工作。


    一些数据库管理系统通过保留一份结果的副本来“作弊”，只要下次访问的时间不太晚，并且相关表没有发生变化。这个副本被称为**缓存**，是否这样做由数据库管理系统决定。


    一些数据库管理系统支持物化视图，使这一过程正式化。物化视图在数据库中分配了存储空间来维护结果的副本。这在处理上成本更低，因为数据库管理系统不需要如此频繁地处理相同的数据，但在存储上成本更高。通常，你可能会发现额外的存储比处理能力更便宜。


    物化视图并未得到广泛支持，有时用处有限。然而，你可以通过临时表走得很远。


    原则上，所有SQL表都是临时的，因为总是可以删除一个表——在SQL中，如同在生活中，没有什么是真正永恒的。但是，临时表是注定短暂存在的，并且会在你关闭会话时自我销毁。


    你可以像创建真实表一样创建临时表，但使用 `TEMPORARY` 前缀：


    ```

    --  PostgreSQL, MariaDB/MySQL, SQLite

    CREATE TEMPORARY TABLE somebooks (

    id INT PRIMARY KEY,

    title VARCHAR(255),

    author VARCHAR(255),

    price DECIMAL(4,2)

    );

    --  Oracle

    CREATE GLOBAL TEMPORARY TABLE somebooks (

    id INT PRIMARY KEY,

    title VARCHAR(255),

    author VARCHAR(255),

    price DECIMAL(4,2)

    );

    --  MSSQL

    CREATE #somebooks (

    id INT PRIMARY KEY,

    title VARCHAR(255),

    author VARCHAR(255),

    price DECIMAL(4,2)

    );

    ```


    **注意：**


    -   Oracle 区分 `GLOBAL` 和 `PRIVATE` 临时表，需要这两个关键字之一。私有临时表还需要特殊的名称。

    -   PostgreSQL 允许你使用 `GLOBAL` 和 `LOCAL` 关键字达到相同目的，但会忽略它们；建议省略。

    -   MSSQL 使用井号（`#`）表示私有临时表，双井号（`##`）表示全局临时表。


    所谓“全局”，是指数据库的其他用户可以访问该临时表。私有临时表，顾名思义，是会话私有的。


    如果你非常着急，PostgreSQL 和 SQLite 允许你用 `TEMP` 代替 `TEMPORARY` 来节省时间。你读这段话花的时间可能比这还多。


    这个例子中的临时表有一个简单的整数主键。如果你打算在后续添加更多数据，你也可以使用自动递增的主键。


    一旦创建了临时表，你就可以使用 `SELECT` 语句将数据复制进去。例如：


    ```

    INSERT INTO somebooks(id,title,author,price)

    SELECT id,title,author,price

    FROM aupricelist

    WHERE price IS NOT NULL;

    ```


    `INSERT ... SELECT ...` 语句将数据复制到一个已存在的表中，无论是临时表还是永久表。


    你可以使用以下语句在一个语句中创建新表并填充它：


    ```

    --  PostgreSQL, MariaDB/MySQL, Oracle

    CREATE TABLE otherbooks AS

    SELECT id,title,author,price

    FROM aupricelist

    WHERE price IS NULL

    ;

    --  PostgreSQL, SQLite

    SELECT id,title,author,price

    INTO TEMPORARY otherbooks

    FROM aupricelist

    WHERE price IS NULL;

    --  MSSQL

    SELECT id,title,author,price

    INTO #otherbooks

    FROM aupricelist

    WHERE price IS NULL;

    ```


    如你所见，该语句有两种形式；PostgreSQL 两者都支持。


    请注意，无论哪种形式，都要求你拥有创建临时表或永久表的权限。


    请记住，数据是副本，因此除非你更新它，否则它会过时。'
  raw: '#### As an Interface


    A second use of views is to present a consistent interface for existing data.


    For example, when we refactored the `customers` table by referencing another table
    and dropping a few columns, we ran the risk of invalidating any other queries
    which depended on the old structure. By creating the `customerdetails` view, you
    have a new virtual table which can be read the same way as the old table.


    It can also be handy if you’re in the process of renaming or rearranging tables
    and columns. Suppose, for example, you’re in the process of developing a new version
    of the `customers` table, with some of the following columns:


    | **customerid** | **firstname** | **lastname** | **height_in_inches** | **au_phone**
    | **...** |

    | --- | --- | --- | --- | --- | --- |

    | ... | ... | ... | ... | ... | ... |


    You can prepare for it with something like the following:


    ```

    /* Notes

    ========================================================

    MSSQL:              Use + for concatenation

    Oracle, SQLite: Use substr(phone,2) instead of right()

    ======================================================= */

    --  CREATE VIEW newcustomers AS

    SELECT

    id AS customerid,

    givenname AS firstname, familyname AS lastname,

    cast(height/2.54 as decimal(3,1))

    AS height_in_inches,

    ''+61'' || right(phone,9) AS au_phone

    --  etc

    FROM customers;

    ```


    This will give you something like


    | **customerid** | **firstname** | **lastname** | **height_in_inches** | **au_phone**
    |

    | --- | --- | --- | --- | --- |

    | 42 | May | Knott | 66.3 | +61255509371 |

    | 459 | Rick | Shaw | 67.3 | +61370101040 |

    | 597 | Ike | Andy | 60.2 | [NULL] |

    | 186 | Pat | Downe | 69.3 | +61870105900 |

    | 352 | Basil | Isk | 61.6 | +61255502503 |

    | 576 | Pearl | Divers | 69.4 | +61370107821 |

    | ~ 303 rows ~ |


    (The `CREATE VIEW` clause is commented out, because we’re not really going to
    go ahead with this.)


    This approach will also be useful if you’re preparing data for an external application.


    #### Working with External Applications


    Although we’ve spent our time with a front-end client, that is not necessarily
    the destiny of the data. Often, we will use the data in an external application
    such as reporting software.


    It makes the most sense to preprocess the data as much as possible before using
    it with an external application. In particular, joining tables or running subqueries
    is something which should be at the database end, not later.


    Note that there are some things the database cannot do so readily. For example,
    there may be data formatting requirements or certain functions which are not available
    in the database server. For that, you will need to extract the raw data and process
    it in the external application.


    Examples of working with external applications include


    *   Mail Merge with a word processor


    *   Working with Pivot Tables in a spreadsheet


    *   Working with reporting software


    Such software typically has very limited ability in manipulating data, so it makes
    sense to do as much preprocessing as possible. When seen from the external software,
    your views will be perceived as single tables (though often they’ll still indicate
    that they are actually views).


    ## Caching Data and Temporary Tables


    Some DBMSs offer a materialized view. This is a type of view which caches the
    data. The result is that repeated reading from the view doesn’t (necessarily)
    require reprocessing.


    When you’re using a view, you may be putting an extra burden on the DBMS. If the
    view has some complex processing and joining to do, then every time you look at
    the view, you find yourself redoing the extra work.


    Some DBMSs cheat a little by keeping a copy of the results for next time, as long
    as next time isn’t too much later and nothing’s changed in the associated tables.
    This copy is called a **cache**, and it’s up to the DBMS whether to do this or
    not.


    Some DBMSs support a materialized view, which formalizes the process. A materialized
    view has storage allocated to maintaining a copy of the results with the database.
    This is cheaper on processing, because the DBMS doesn’t need to process the same
    data so often, but more expensive on storage. As usual, you may find that extra
    storage is cheaper than processing power.


    Materialized views aren’t widely supported and are sometimes limited in usefulness.
    However, you go a long way with temporary tables.


    In principle, all SQL tables are temporary, in that it’s always possible to drop
    a table—in SQL, as in life, nothing’s truly permanent. However, a temporary table
    is one destined to be short-lived and will self-destruct when you close the session.


    You can create a temporary table as you might a real table, but using the `TEMPORARY`
    prefix:


    ```

    --  PostgreSQL, MariaDB/MySQL, SQLite

    CREATE TEMPORARY TABLE somebooks (

    id INT PRIMARY KEY,

    title VARCHAR(255),

    author VARCHAR(255),

    price DECIMAL(4,2)

    );

    --  Oracle

    CREATE GLOBAL TEMPORARY TABLE somebooks (

    id INT PRIMARY KEY,

    title VARCHAR(255),

    author VARCHAR(255),

    price DECIMAL(4,2)

    );

    --  MSSQL

    CREATE #somebooks (

    id INT PRIMARY KEY,

    title VARCHAR(255),

    author VARCHAR(255),

    price DECIMAL(4,2)

    );

    ```


    Note


    .


    *   Oracle distinguishes between `GLOBAL` and `PRIVATE` temporary tables and requires
    one of the two keywords. Private temporary tables also need to have special names.


    *   PostgreSQL allows you to use the `GLOBAL` and `LOCAL` keywords for the same
    purpose, but then ignores them; they recommend leaving them out.


    *   MSSQL uses hashes for global and private temporary tables: one hash (`#`)
    for private and two hashes (`##`) for global.


    By “global,” we mean that other uses of the database can access the temporary
    table. Private ones are, well, private to the session.


    If you’re in a desperate hurry, PostgreSQL and SQLite allow you to save time by
    writing `TEMP` instead of `TEMPORARY`. It probably took you more time to read
    this paragraph.


    The temporary table in this example has a simple integer primary key. If you intend
    adding more data as you go, you might also use an autoincremented primary key.


    Once you have created your temporary table, you can copy data into it using the
    `SELECT` statement. For example:


    ```

    INSERT INTO somebooks(id,title,author,price)

    SELECT id,title,author,price

    FROM aupricelist

    WHERE price IS NOT NULL;

    ```


    The `INSERT ... SELECT ...` statement copies data into an existing table, temporary
    or permanent.


    You can create a new table and populate it in one statement with the following
    statement:


    ```

    --  PostgreSQL, MariaDB/MySQL, Oracle

    CREATE TABLE otherbooks AS

    SELECT id,title,author,price

    FROM aupricelist

    WHERE price IS NULL

    ;

    --  PostgreSQL, SQLite

    SELECT id,title,author,price

    INTO TEMPORARY otherbooks

    FROM aupricelist

    WHERE price IS NULL;

    --  MSSQL

    SELECT id,title,author,price

    INTO #otherbooks

    FROM aupricelist

    WHERE price IS NULL;

    ```


    As you see, this statement takes one of two forms; PostgreSQL supports both.


    Note that either form requires that you have permissions to create either a temporary
    or permanent table.


    Remember, however, that the data is a copy, so it will go stale unless you update
    it.'
