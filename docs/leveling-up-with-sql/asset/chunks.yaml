    It won’t work. That’s because each column is independent of the rest. You can’t
    use an alias as part of another calculation in the `SELECT` clause. We got around
    this by calculating the `inc` column separately: `price*1.1 AS inc`.


    It gets worse if you try something like this:


    ```

    SELECT

    id, title,

    price, price*0.1 AS tax

    FROM books

    WHERE tax>1.5;

    ```


    Here, the problem is that the `SELECT` clause is evaluated *after* the `WHERE`
    clause, so the aliased calculation for `tax` isn’t available yet in the `WHERE`
    clause. Again, we could recalculate the value in the `WHERE` clause: `WHERE price*1.1>1.5`.


    Except with SQLite. You can indeed use aliases in the `WHERE` clause and also
    in the `GROUP BY` clause.


    Finally, if, for example, you want to get multiple columns from a subquery in
    the `SELECT` clause, this won’t work either:


    ```

    SELECT

    id, title,

    (SELECT givenname, othernames, familynames

    FROM authors WHERE authors.id=books.authorid)

    FROM books

    WHERE tax>1.5;

    ```


    A subquery in the `SELECT` clause can only return one value, which is all right
    if you concatenate the names and then return the result. Otherwise, you’re stuck
    with three subqueries, which is both costly and tedious.


    SQL can solve this by applying a subquery to each row. This is called a `LATERAL
    JOIN` in some DBMSs, or an `APPLY` in some others.


    ### Adding Columns


    In the first two examples earlier, you can use an expression like this:


    ```

    --  PostgreSQL, MySQL (not MariaDB)

    SELECT

    id, title,

    price, tax, inc

    FROM

    books

    JOIN LATERAL(SELECT price*0.1 AS tax) AS sq ON true

    JOIN LATERAL(SELECT price+tax AS inc) AS sq2 ON true

    WHERE tax>1.5

    ;

    --  MSSQL

    SELECT

    id, title,

    price, tax, inc

    FROM books

    CROSS APPLY (SELECT price*0.1 AS tax) AS sq

    CROSS APPLY (SELECT price+tax AS inc) AS sq2

    WHERE tax>1.5

    ;

    --  Oracle (No AS in subquery name)

    SELECT

    id, title,

    price, tax, inc

    FROM books

    CROSS APPLY (SELECT price*0.1 AS tax FROM dual) sq

    CROSS APPLY (SELECT price+tax AS inc FROM dual) sq2

    WHERE tax>1.5

    ;

    ```


    You’ll get something like this:


    | **id** | **Title** | **price** | **tax** | **inc** |

    | --- | --- | --- | --- | --- |

    | 503 | Uncle Silas | 17.00 | 1.700 | 18.700 |

    | 2007 | North and South | 17.50 | 1.750 | 19.250 |

    | 702 | Jane Eyre | 17.50 | 1.750 | 19.250 |

    | 1759 | La Curée | 16.00 | 1.600 | 17.600 |

    | 205 | Shadow: A Parable | 17.50 | 1.750 | 19.250 |

    | 1702 | Philaster | 17.50 | 1.750 | 19.250 |

    | ~ 525 rows ~ |


    Note


    .


    *   The subquery must be given an alias, even though it’s not used.


    *   PostgreSQL, MySQL, and MSSQL allow you to put the column aliases in the subquery
    aliases instead: `(SELECT price*0.1) AS sq(tax)`. Not Oracle.


    *   The example for PostgreSQL and MySQL uses the dummy condition `ON true`. MySQL
    will allow you to leave this out, but PostgreSQL requires it.


    Note in particular that the second subquery will happily calculate the expression
    `price+tax AS inc`. This is because the subqueries are evaluated one after the
    other, so the expressions can accumulate.


    The `LATERAL` or `CROSS APPLY` subquery is applied to every row of the main query.
    In principle, that could be pretty expensive, but, as it turns out, it’s not so
    bad. It’s particularly useful if you need to include a series of intermediate
    steps in a more complex calculation—it’s easy to understand and easy to maintain.


    SQL also has a type of join called `CROSS JOIN`. In a cross join, each row of
    one table is joined with each row of the other table. This result is also known
    as a Cartesian product. That’s a lot of combinations, and it’s usually not what
    you want.


    A `CROSS APPLY` is not the same thing, though it is a type of join. It’s closer
    to an `OUTER JOIN`.


    You’ll see a use for a cross join later when we cross join with a single row virtual
    table.'
  trans: '

    # WHERE EXISTS 与非关联子查询


    显然，前面的例子会给你“全部”或“全部不给”的结果，这正是你可以从非关联子查询中预期的行为，例如


    ```

    SELECT * FROM authors

    WHERE EXISTS (SELECT 1/0 FROM books WHERE price<15);

    ```


    该子查询选取*一些*行，这足以满足 `WHERE` 子句的条件，因此你将获得*所有*作者。如果你尝试 `WHERE price<0`，那么你将*一个*作者也得不到。


    # WHERE EXISTS 与关联子查询


    如果使用关联子查询，`WHERE EXISTS` 会更有趣。此时，测试将针对每一行进行评估，因此一些行会通过，而另一些则不会。


    例如，如果你想查找所有在 `books` 表中有书的作者，你可以使用


    ```

    SELECT * FROM authors

    WHERE EXISTS (

    SELECT 1 FROM books WHERE books.authorid=authors.id

    );

    ```


    你将得到类似下面的结果：


    | **id** | **givenname** | **…** | **familyname** | **…** | **Home** |

    | --- | --- | --- | --- | --- | --- |

    | 464 | Ambrose | … | Bierce | … | Meigs County, Ohio |

    | 858 | Alexander | … | Ostrovsky | … | Moscow |

    | 525 | Francis | … | Beaumont | … | Grace-Dieu, Leicestershire |

    | 488 | Bashou | … | Matsuo | … | Matsuo Kinsaku |

    | 703 | Friedrich | … | Engels | … | Barmen |

    | 722 | Stanley | … | Waterloo | … | St. Clair, Mich. |

    | ~ 443 rows ~ |


    在这里，子查询查找 `books.authorid` 与 `authors.id` 匹配的行，如果存在这样的行（对大多数作者来说确实存在），则会返回该作者行。


    # WHERE EXISTS 与 IN() 表达式的对比


    在前面的例子中，你也可以使用 `IN()` 表达式获得相同的结果：


    ```

    SELECT * FROM authors

    WHERE id IN(SELECT authorid FROM books);

    ```


    这种写法当然更简单。然而，很可能在底层，SQL 执行的操作完全相同，所以你如何编写它其实是个口味问题。


    另一方面，如果你要查找*没有*书的作者（在我们的目录中），那就是另一回事了。


    这*不*能工作：


    ```

    SELECT * FROM authors

    WHERE id NOT IN(SELECT authorid FROM books);

    ```


    嗯，严格来说，它*能*工作，但不是我们想要的方式。再次回忆第 3 章中的“NOT IN 怪癖”。由于 `authorid` 列中存在一些 `NULL`，`NOT`
    `IN` 操作符最终会评估类似 `... AND id=NULL AND ...` 的条件。`id=NULL` 总是失败，并且 `... AND ...`
    将此失败与其余部分组合起来，导致整个表达式失败。


    然而，使用 `WHERE NOT EXISTS` 将能工作：


    ```

    SELECT * FROM authors

    WHERE NOT EXISTS (

    SELECT 1 FROM books WHERE books.authorid=authors.id

    );

    ```


    这是因为 `WHERE EXISTS` 评估的是行，而不是值：


    | **id** | **givenname** | **…** | **familyname** | **…** | **Home** |

    | --- | --- | --- | --- | --- | --- |

    | 479 | C.E. | … | Koetsveld | … | Rotterdam |

    | 874 | Henry | … | Savery | … | Somerset, England |

    | 429 | Oliné | … | Keese | … | [NULL] |

    | 35 | James | … | Lowell | … | Cambridge, Massachusetts |

    | 148 | Demetrius | … | Boulger | … | [NULL] |

    | 922 | Robert | … | Ingersoll | … | Dresden, New York |

    | ~ 45 rows ~ |


    在实际应用中，你不会经常看到 `WHERE EXISTS`，因为通常你可以使用连接（join）或 `IN` 操作符完成相同的事情。然而，有时它具有优势或更直观。这尤其是因为当
    `NOT IN` 不起作用时，`WHERE EXISTS` 可以表达得更清晰、更具体。


    # LATERAL 连接（又称 CROSS APPLY）及其相关功能


    此功能在 SQLite 中不可用。MariaDB 中也不可用，尽管它*确实*在 MySQL 中可用。


    不过，如果你正在使用其中一种 DBMS，你可能想了解它是怎么回事。无论如何，对于大多数事情都有替代方案，尤其是在下一节中介绍的公用表表达式（Common Table
    Expressions）。


    然而，SQLite 在 `WHERE` 子句方面有一个有趣的特性，如果你继续阅读就会看到。


    如果你尝试以下查询：


    ```

    SELECT

    id, title,

    price, price*0.1 AS tax, price+tax AS inc

    FROM books;

    ```


    它将无法工作。这是因为每一列都是独立的，与其他列无关。你不能在 `SELECT` 子句中将别名用作另一个计算的一部分。我们通过单独计算 `inc` 列来绕过这个问题：`price*1.1
    AS inc`。


    如果你尝试这样的操作，情况会更糟：


    ```

    SELECT

    id, title,

    price, price*0.1 AS tax

    FROM books

    WHERE tax>1.5;

    ```


    这里的问题在于 `SELECT` 子句是在 `WHERE` 子句*之后*评估的，因此在 `WHERE` 子句中，`tax` 的别名计算尚不可用。同样，我们可以在
    `WHERE` 子句中重新计算该值：`WHERE price*1.1>1.5`。


    但 SQLite 除外。你确实可以在 `WHERE` 子句中使用别名，也可以在 `GROUP BY` 子句中使用。


    最后，例如，如果你想在 `SELECT` 子句中从子查询获取多个列，这也不起作用：


    ```

    SELECT

    id, title,

    (SELECT givenname, othernames, familynames

    FROM authors WHERE authors.id=books.authorid)

    FROM books

    WHERE tax>1.5;

    ```


    `SELECT` 子句中的子查询只能返回一个值，如果你将名称连接起来然后返回结果，那是没问题的。否则，你只能使用三个子查询，这既昂贵又繁琐。


    SQL 可以通过对每一行应用子查询来解决这个问题。这在某些 DBMS 中被称为 `LATERAL JOIN`，在另一些中则称为 `APPLY`。


    ## 添加列


    在前面的前两个例子中，你可以使用像这样的表达式：


    ```

    --  PostgreSQL, MySQL (非 MariaDB)

    SELECT

    id, title,

    price, tax, inc

    FROM

    books

    JOIN LATERAL(SELECT price*0.1 AS tax) AS sq ON true

    JOIN LATERAL(SELECT price+tax AS inc) AS sq2 ON true

    WHERE tax>1.5

    ;

    --  MSSQL

    SELECT

    id, title,

    price, tax, inc

    FROM books

    CROSS APPLY (SELECT price*0.1 AS tax) AS sq

    CROSS APPLY (SELECT price+tax AS inc) AS sq2

    WHERE tax>1.5

    ;

    --  Oracle (子查询名称中无 AS)

    SELECT

    id, title,

    price, tax, inc

    FROM books

    CROSS APPLY (SELECT price*0.1 AS tax FROM dual) sq

    CROSS APPLY (SELECT price+tax AS inc FROM dual) sq2

    WHERE tax>1.5

    ;

    ```


    你将得到类似这样的结果：


    | **id** | **Title** | **price** | **tax** | **inc** |

    | --- | --- | --- | --- | --- |

    | 503 | Uncle Silas | 17.00 | 1.700 | 18.700 |

    | 2007 | North and South | 17.50 | 1.750 | 19.250 |

    | 702 | Jane Eyre | 17.50 | 1.750 | 19.250 |

    | 1759 | La Curée | 16.00 | 1.600 | 17.600 |

    | 205 | Shadow: A Parable | 17.50 | 1.750 | 19.250 |

    | 1702 | Philaster | 17.50 | 1.750 | 19.250 |

    | ~ 525 rows ~ |


    注意


    .


    *   子查询必须被赋予一个别名，即使它没有被使用。


    *   PostgreSQL、MySQL 和 MSSQL 允许你将列别名放在子查询别名中：`(SELECT price*0.1) AS sq(tax)`。Oracle
    不行。


    *   PostgreSQL 和 MySQL 的例子使用了虚拟条件 `ON true`。MySQL 允许你省略它，但 PostgreSQL 要求必须有它。


    尤其要注意，第二个子查询会愉快地计算表达式 `price+tax AS inc`。这是因为子查询是依次评估的，所以表达式可以累积。


    `LATERAL` 或 `CROSS APPLY` 子查询应用于主查询的每一行。原则上，这可能相当昂贵，但事实证明，情况并非如此糟糕。如果你需要在更复杂的计算中包含一系列中间步骤，它特别有用——它易于理解和维护。


    SQL 还有一种称为 `CROSS JOIN` 的连接类型。在交叉连接中，一个表的每一行与另一个表的每一行连接。此结果也称为笛卡尔积。那是大量的组合，通常不是你想要的。


    `CROSS APPLY` 与此不同，尽管它是一种连接类型。它更接近于 `OUTER JOIN`。


    稍后当我们与单行虚拟表进行交叉连接时，你会看到交叉连接的一个用途。

    '
- fmt: '# Working with Common Table Expressions


    ## Multiple Columns


    As we noted, SQL won’t let you fetch multiple columns from a single subquery in
    the `SELECT` clause, because everything in the `SELECT` clause is supposed to
    be scalar—a single value.


    However, you can fetch multiple columns if the context is table-like, such as
    in the `FROM` clause. For example:


    ```sql

    --  PostgreSQL, MySQL (Not MariaDB)

    SELECT

    id, title,

    givenname, othernames, familyname

    FROM

    books

    LEFT JOIN LATERAL(

    SELECT givenname, othernames, familyname

    FROM authors

    WHERE authors.id=books.authorid

    ) AS a ON true;

    --  MSSQL

    SELECT

    id, title,

    givenname, othernames, familyname,

    home

    FROM books

    OUTER APPLY (

    SELECT givenname, othernames, familyname

    FROM authors

    WHERE authors.id=books.authorid

    ) AS a;

    --  Oracle: Same as MSSQL without AS

    ```


    You’ll get something like


    | **id** | **Truncate** | **givenname** | **othernames** | **familyname** |

    | --- | --- | --- | --- | --- |

    | 2078 | The Duel | Heinrich | [NULL] | von Kleist |

    | 503 | Uncle Silas | J. | Sheridan | Le Fanu |

    | 2007 | North and South | Elizabeth | [NULL] | Gaskell |

    | 702 | Jane Eyre | Charlotte | [NULL] | Brontë |

    | 1530 | Robin Hood, The … | Alexandre | [NULL] | Dumas |

    | 1759 | La Curée | Émile | [NULL] | Zola |

    | ~ 1201 rows ~ |


    In this case, you can just as readily use a normal outer join to get the same
    results:


    ```sql

    SELECT

    books.id, title,

    givenname, othernames, familyname,

    home

    FROM books LEFT JOIN authors ON authors.id=books.authorid;

    ```


    The latter form is definitely simpler (we’ve left off the table aliases for simplicity
    and qualified the `books.id` column out of necessity).


    On the other hand, if the subquery is an aggregate query, the lateral join is
    convenient, since you’re going to need a subquery anyway: remember you can’t mix
    aggregate and non-aggregate data in a single `SELECT` statement.


    For example, suppose you want a list of customers with the total sales for each
    customer. You’ll need an aggregate query to get the totals, joined to the customers
    table. You could do this:


    ```sql

    --  PostgreSQL, MySQL (not MariaDB)

    SELECT

    id, givenname, familyname, total

    FROM

    customers

    LEFT JOIN LATERAL(

    SELECT sum(total) AS total FROM sales

    WHERE sales.customerid=customers.id

    ) AS totals ON true;

    --  MSSQL, Oracle (no AS)

    SELECT

    id, givenname, familyname, total

    FROM

    customers

    OUTER APPLY(

    SELECT sum(total) AS total FROM sales

    WHERE sales.customerid=customers.id

    ) AS totals;

    ```


    This will give you something like this:


    | **Id** | **givenname** | **familyname** | **total** |

    | --- | --- | --- | --- |

    | 42 | May | Knott | 3437.72 |

    | 459 | Rick | Shaw | 461.00 |

    | 597 | Ike | Andy | [NULL] |

    | 186 | Pat | Downe | 1536.50 |

    | 352 | Basil | Isk | 573.00 |

    | 576 | Pearl | Divers | [NULL] |

    | ~ 303 rows ~ |


    Although there may be alternatives, as you’ll need when working with SQLite or
    MariaDB, the lateral join can sometimes make this sort of query a little more
    intuitive.


    ## Syntax


    We’ve seen that you can use subqueries in the `FROM` clause and that you can even
    nest them. However, there’s an alternative method which makes working with these
    subqueries more natural.


    Common Table Expressions, or CTEs to their friends, are subqueries which generate
    table results. As a result, you can almost always replace a `FROM` subquery with
    a CTE.


    We’ve already used CTEs in previous chapters, so if you get a sense of *déjà vu*,
    it’s OK.


    Common Table Expressions (CTEs) are a relatively new feature in SQL, but have
    been around for some time, and are available in almost all modern DBMSs. The notable
    laggards are MariaDB which added support in version 10.2 (released in 2016) and
    MySQL which added support in version 8.0 (released in 2018). If you’re stuck with
    an older version of MariaDB or MySQL, maybe you can learn to enjoy nested subqueries.


    A CTE is a virtual table defined before it is used. It is similar to a subquery
    in that it comprises a `SELECT` statement, but the syntax is different, and it
    offers a number of advantages.


    In their simplest form, CTEs are an alternative form of subquery. Even so, there
    is an immediate benefit:


    - CTEs are more readable and easier to maintain, because they are defined at the
    beginning rather than in the middle of a query.


    Complex subqueries may have one subquery referring to another. This involves nesting
    subqueries.


    - CTEs can reference previous CTEs without the need for nesting.


    Both these benefits relate to readability and maintainability. The third benefit
    is one which is not available for ordinary subqueries.


    - CTEs can refer to themselves; thus, they can be recursive.


    A Common Table Expression is defined as part of the query, before the main part:


    ```sql

    WITH cte AS (subquery)

    SELECT columns FROM cte;

    ```


    The CTE is given a name, though not necessarily `cte` of course. Thereafter, it
    is used as a normal table in the main query. You can define multiple CTEs as follows:


    ```sql

    WITH

    cte AS (subquery),

    another AS (subquery)

    SELECT columns FROM ...;

    ```'
