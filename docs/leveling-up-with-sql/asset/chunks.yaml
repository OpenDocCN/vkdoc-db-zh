    \ different) which does indeed have the genres combined in a single column. This\
    \ is, of course, cheating.\n\nThe `booksgenres` table is used as a simple method\
    \ of carrying what will be thousands of rows in two other tables, and there is\
    \ a rather frightening part of the script later on which pulls this data apart\
    \ to populate these tables. The `booksgenres` table will then be dropped to hide\
    \ the evidence.\n\nThis is one case where you might break the rules for the purpose\
    \ of transferring or backing up the data only. However, the data should *never*\
    \ stay in this format."
  trans: "\n### 一对多可能关系\n\n从技术上讲，一个*真正*的**一对一**关系要求两个表相互引用。除其他因素外，这很难实现，因为它可能需要同时添加两个表的行。\n\
    \n由于表 A 的一行必须引用表 B 的一行，因此在向表 A 添加数据之前，你需要先拥有表 B 的行。但是，如果表 B 的一行也必须引用表 A 的一行，那么你又需要先向表\
    \ A 添加数据。这显然是矛盾的。\n\n实现这一点的一种方法是**延迟**外键约束，直到你以任意顺序向两个表添加完数据之后。不幸的是，大多数数据库管理系统不允许你这样做，因此你只能困在这种不可能的境地中。\n\
    \n这种关系的一个更常见的变体是**一对多可能**关系。^(⁴) 这允许第二个表包含的数据不一定适用于第一个表的每一行。\n\n例如，`vip`表包含了一些客户的额外详细信息。在\
    \ SQL 中，它看起来像这样：\n\n```sql\nCREATE TABLE customers (        --  主表\nid INT PRIMARY\
    \ KEY\n--  主数据\n);\nCREATE TABLE vip (         --  辅助表\nid INT PRIMARY KEY REFERENCES\
    \ customers(id)\n--  附加列\n);\n```\n\n视觉上，它如图 3-6 所示。\n\n![](img/606708_1_En_3_Fig6_HTML.jpg)\n\
    \n两个块，即 customers 和 V I P，描述了一对多可能连接。V I P i d 和 P K 链接到 customer i d 和 P K。\n\
    \n图 3-6\n\n一对多可能连接\n\n在这里，辅助表包含了主表中*部分*行的额外数据。\n\n请注意，这种关系是通过将辅助表中的 `id` 同时设为主键和外键来实现的。\n\
    \n例如，`vip`表为一些客户包含了额外的特性：\n\n```sql\nSELECT * FROM customers ORDER BY id;\nSELECT\
    \ * FROM vip ORDER BY id;\n```\n\n你可以看到所有的客户，其中一些也有 VIP 数据：\n\n| **Id** | **givenname**\
    \ | **familyname** | **...** |\n| --- | --- | --- | --- |\n| 1 | Pierce | Dears\
    \ | ... |\n| 2 | Arthur | Moore | ... |\n| 5 | Ray | King | ... |\n| 6 | Gene\
    \ | Poole | ... |\n| 9 | Donna | Worry | ... |\n| 10 | Ned | Duwell | ... |\n\
    | ~ 303 rows ~ |\n| **Id** | **status** | **discount** | **review** |\n| 5 | 3\
    \ | 0.05 | 2023-12-01 |\n| 10 | 2 | 0.1 | 2023-08-23 |\n| 21 | 1 | 0.15 | 2024-03-14\
    \ |\n| 26 | 1 | 0.15 | 2024-02-24 |\n| 40 | 1 | 0.15 | 2023-11-11 |\n| 41 | 3\
    \ | 0.05 | 2024-03-09 |\n| ~ 81 rows ~ |\n\n你会注意到`vip`表中的行没有`customers`表那么多。如果每个客户都是\
    \ VIP，可能会有那么多，但在这种情况下并非如此。\n\n你可以使用连接查看它们如何关联：\n\n```sql\nSELECT c.*, v.*\nFROM\
    \ customers AS c LEFT JOIN vip AS v ON c.id=v.id;\n```\n\n这实际上给你一个扩展的`customers`表：\n\
    \n| **id** | **givenname** | **familyname** | **...** | **id** | **status** |\
    \ **discount** | **review** |\n| --- | --- | --- | --- | --- | --- | --- | ---\
    \ |\n| 42 | May | Knott | ... | 42 | 3 | 0.05 | 2024-01-03 |\n| 459 | Rick | Shaw\
    \ | ... |   |   |   |   |\n| 597 | Ike | Andy | ... |   |   |   |   |\n| 186 |\
    \ Pat | Downe | ... |   |   |   |   |\n| 352 | Basil | Isk | ... | 352 | 1 | 0.15\
    \ | 2023-08-06 |\n| 576 | Pearl | Divers | ... |   |   |   |   |\n| ~ 303 rows\
    \ ~ |\n\n这给出了所有客户，附带他们的 VIP 数据，或者在额外列中为 NULL。\n\n注意\n\n*   我们需要 `LEFT JOIN` 来包含非\
    \ VIP 客户。如果你只想要 VIP 客户，一个简单的（内）`JOIN`会更好。\n\n    我们本可以使用 `SELECT *`，但使用 `c.*,\
    \ v.*` 可以让你决定你更感兴趣的是哪些表。\n\n作为特例，你也可以只选择 VIP 客户，而不包含额外的 VIP 列，使用\n\n```sql\nSELECT\
    \ c.*\nFROM customers AS c JOIN vip AS v ON c.id=v.id;\n```\n\n在这里，内连接只选择 VIP\
    \ 客户，而 `c.*` 只选择客户列。\n\n当然，你是否想这样做取决于你自己。\n\n### 多值处理\n\n数据库设计中的一个主要问题是如何处理多值。适当规范化的表的原则禁止在一行中包含多值：\n\
    \n*   单列不能包含多个值。\n\n    例如，你不应该在单列中存储多个电话号码，例如 `0270101234,0355505678`。这将无法正确排序或搜索，并且维护起来将是一场真正的噩梦。\n\
    \n*   你不应该有多个具有相同作用的列。\n\n    例如，你不应该有多个电话号码列，如 `phone1`、`phone2`、`phone3` 等。这会使搜索变得困难，因为你无法确定要搜索哪一列。你还会遇到列过多或不足的问题。\n\
    \n    请注意，如果电话号码的*类型*有明确区分，你*可以*这样做。例如，你合理地拥有单独的 `fax`（还有人记得这个吗？）、`mobile` 和 `landline`\
    \ 号码列。\n\n例如，假设我们希望记录一本书的多个流派。以下是两种*不正确*的尝试解决方案：\n\n*   一个包含多个（分隔）值的列\n\n    其想法是流派列将包含多个流派或流派\
    \ ID，可能用逗号分隔。问题在于数据不是原子性的，这使得排序、搜索和更新变得非常困难。你还需要额外的工作来使用这些数据。\n\n*   多个流派列\n\n\
    \    你不能有多个同名的列，因此这些列可能被称为 `genre1`、`genre2` 等。这里的问题是：(a) 你最终会有太多或不足的列，(b) 没有“正确”的列来对应特定值，(c)\
    \ 搜索和排序不切实际。\n\n记录流派的问题更为复杂，因为不仅一本书可以有多个流派，一个流派也可以应用于多本书。这是一个**多对多**关系的例子。\n\n\
    这不能直接在两个表之间实现；相反，它需要一个额外的表在两者之间。\n\n如果你有勇气查看创建和填充示例数据库的脚本，你会发现一个名为 `booksgenres`\
    \ 的表（不要与 `bookgenres` 表混淆，后者当然*完全*不同），它确实将流派合并到了单列中。这当然是作弊。\n\n`booksgenres` 表被用作一种简单的方法来承载将在另外两个表中出现的数千行数据，脚本后面有一部分相当吓人的代码将这些数据拆开以填充那些表。然后\
    \ `booksgenres` 表将被删除以销毁证据。\n\n这是一个你可能为了仅用于传输或备份数据而打破规则的案例。但是，数据*绝不应*长期保持这种格式。\n"
- fmt: '## Many-to-Many Relationships


    To represent a many-to-many relationship between tables, you will need another
    table which links the two others.


    Such a table is called an **associative** table or a **bridging** table.


    It looks like Figure [3-7](#606708_1_En_3_Chapter.xhtml#Fig7).


    ![](images/606708_1_En_3_Chapter/606708_1_En_3_Fig7_HTML.jpg)


    Three blocks, namely, books, book genres, and genres, describe the many-to-many
    relationship. I d P K of books links to the book i d F K of book genres, and i
    d P K of genres.


    Figure 3-7


    A Many-to-Many Relationship


    Here are two table extracts to illustrate this:


    ```

    --  Book Table

    CREATE TABLE books (

    id int PRIMARY KEY,

    title varchar,

    --  etc

    );

    --  Genre Table

    CREATE TABLE genres (

    id int PRIMARY KEY,

    name varchar,

    description varchar

    --  etc

    );

    ```


    The `genres` table includes a surrogate primary key. It also contains the actual
    genre name and a description so that the use of the particular genre is clear.


    You can see what’s in the two tables with simple `SELECT` statements:


    ```

    SELECT * FROM books;

    SELECT * FROM genres;

    ```


    You’ll see two apparently unrelated sets of data:


    | **id** | **authorid** | **title** | **published** | **price** |

    | --- | --- | --- | --- | --- |

    | 2078 | 765 | The Duel | 1811 | 12.5 |

    | 503 | 128 | Uncle Silas | 1864 | 17 |

    | 2007 | 99 | North and South | 1854 | 17.5 |

    | 702 | 547 | Jane Eyre | 1847 | 17.5 |

    | 1530 | 28 | Robin Hood, The Prince of Thieves | 1862 | 12.5 |

    | 1759 | 17 | La Curée | 1872 | 16 |

    | ~ 1201 rows ~ |

    | **id** | **Genre** |

    | 1 | Biology |

    | 2 | Ancient History |

    | 3 | Academia |

    | 4 | Science |

    | 5 | College |

    | 6 | Comics |

    | ~ 166 rows ~ |


    Neither table refers to the other. Instead, you need an additional table.


    The **associative** table will then link books with genres:


    ```

    --  Associative Table

    CREATE TABLE book_genres (

    bookid int REFERENCES books(id),

    genreid int REFERENCES genres(id)

    );

    ```


    You can see what’s in this table with the following:


    ```

    SELECT * FROM bookgenres;

    ```


    You’ll get a very simple, very boring result:


    | **bookid** | **Genreid** |

    | --- | --- |

    | 456 | 8 |

    | 789 | 8 |

    | 123 | 52 |

    | 456 | 38 |

    | 789 | 38 |

    | 123 | 80 |

    | 456 | 94 |

    | 356 | 1 |

    | 789 | 113 |

    | 123 | 9 |

    | 1914 | 1 |

    | 936 | 1 |

    | 1198 | 1 |

    | 918 | 1 |

    | 456 | 35 |

    | 789 | 68 |

    | 456 | 146 |

    | 789 | 80 |

    | 456 | 101 |

    | 456 | 145 |

    | 1618 | 2 |

    | 844 | 3 |

    | ~ 8011 rows ~ |


    This table is a simple table which has one job only: record which books are related
    to which tables.


    Each column must be a foreign key to the other table; otherwise, the whole point
    of the association is lost. This association allows a book to be associated with
    multiple genres and a genre to be associated with multiple books.


    In the preceding table, for example, book `123` has multiple genres. Book `456`
    also has two genres. Some of those genres appear for both books and, for all we
    know, other books later on. That is, one book can have many genres, and one genre
    can associate with many books.


    There is one more requirement. The combination should be unique. There is no point
    in associating a book with the same genre more than once. Since there is no other
    data in the table, it would be appropriate to make the combination a compound
    primary key:


    ```

    --  Associative Table

    CREATE TABLE book_genres (

    bookid int REFERENCES books(id),

    genreid int REFERENCES genres(id),

    PRIMARY KEY (bookid,genreid)

    );

    ```


    We *might* have designed the table this way:


    ```

    CREATE TABLE bookgenres (

    id INT PRIMARY KEY,

    bookid INT REFERENCES books(id),

    genreid INT REFERENCES genres(id),

    UNIQUE (bookid,genreid)

    );

    ```


    which has a `UNIQUE` constraint on the book/genre combination, as well as a separate
    primary key. However, by definition, the primary key is already unique, so we
    can use the more compact design as before.


    Note that this is one of the few cases where the primary key is not a single column
    but a combination of columns. For that reason, the `PRIMARY KEY` is added separately
    to the individual columns.


    ## Joining Many-to-Many Tables


    To see how books and genres are related, you will need to join these two tables
    via the associative table.


    Normally, you would consider counting the rows in the child table to estimate
    the number of joined results. In this case, it is the associative table which
    is the child of both the other tables.


    To count the number of rows:


    ```

    SELECT count(*) FROM bookgenres;

    ```


    We already know the result by now:


    | **Count** |

    | 8011 |


    To join the tables, you only need an `INNER JOIN`:


    ```

    SELECT *

    FROM

    bookgenres AS bg

    JOIN books AS b ON bg.bookid=b.id

    JOIN genres AS g ON bg.genreid=g.id

    ;

    ```


    This gives a very long list, because the `bookgenres` table is very long:


    | **bookid** | **genreid** | **id** | **title** | **...** | **id** | **Genre**
    |

    | --- | --- | --- | --- | --- | --- | --- |

    | 1732 | 8 | 1732 | In His Steps | ... | 8 | Fiction |

    | 414 | 8 | 414 | Poesies | ... | 8 | Fiction |

    | 241 | 106 | 241 | Researches in Teutoni… | ... | 106 | Fantasy |

    | 247 | 153 | 247 | The King in Yellow | ... | 153 | Gothic |

    | 1914 | 38 | 1914 | Voyage of the Beagle | ... | 38 | Classics |

    | 936 | 38 | 936 | The Origin of Species | ... | 38 | Classics |

    | ~ 8011 rows ~ |


    Here, we started the join from the middle, since we’re focusing on the associative
    table. You could just as readily have started on one end:


    ```

    SELECT *

    FROM

    books AS b

    JOIN bookgenres AS bg ON b.id=bg.bookid

    JOIN genres AS g ON bg.genreid=g.id

    ;

    ```


    You’ll get the same data, but, since the tables are in a different order, the
    columns will also be in a different order.


    In reality, you end up with too many columns, two of which are duplicated by the
    join. You can simplify the result as


    ```

    SELECT b.id, b.title, g.genre

    FROM

    bookgenres AS bg

    JOIN books AS b ON bg.bookid=b.id

    JOIN genres AS g ON bg.genreid=g.id

    ;

    ```


    You get a simpler result:


    | **id** | **title** | **Genre** |

    | --- | --- | --- |

    | 1732 | In His Steps | Fiction |

    | 414 | Poesies | Fiction |

    | 241 | Researches in Teutonic Mythology | Fantasy |

    | 247 | The King in Yellow | Gothic |

    | 1914 | Voyage of the Beagle | Classics |

    | 936 | The Origin of Species | Classics |

    | ~ 8011 rows ~ |


    The book’s `id` is important because it is quite possible for different books
    to have the same title.


    Since you’ve now listed the specific columns, the column order won’t depend on
    the order of the tables in the join.


    By its very nature, the associative table cannot include `NULL`s for either the
    `bookid` or the `genreid`. As such, there is no need for an outer join.'
