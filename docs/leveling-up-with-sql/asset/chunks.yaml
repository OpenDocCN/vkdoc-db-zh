- fmt: "### NULLs\n\n聚合函数都会跳过`NULL`。这在计数值时尤其重要，在计算平均值时也是如此。\n\n`NULL`会被跳过这一事实，也可以在计算选择性聚合时加以利用。\n\
    \n### 聚合过程\n\n你聚合的数据不一定来自已保存的表。你也可以聚合由连接、公用表表达式和视图生成的虚拟表。\n\n聚合数据时，数据可能先被`WHERE`子句过滤。聚合是基于过滤后剩余的数据进行的。\n\
    \n执行聚合操作实质上是将原始数据转换成一个或多个汇总行的虚拟表。这不再包含原始的原始数据。你只能选择虚拟汇总表中存在的内容。因此，你无法在单个`SELECT`子句中混合聚合数据和原始数据。\n\
    \n如果你同时需要原始数据和汇总数据，你可能需要将原始表与包含汇总数据的CTE进行连接。\n\n### 聚合过滤器\n\n可以过滤用于单个聚合函数的数据。\n\
    \n有一个标准的`FILTER (WHERE ...)`子句，允许你对列进行过滤。然而，它（目前）尚未得到广泛支持。\n\n过滤数据的常用方法是在要聚合的内容上使用`CASE\
    \ ... END`表达式。为你想要的值设置一个值，例如`1`，让其余的值默认为`NULL`，并让聚合函数在后续处理中忽略它们。\n\n你也可以在`DISTINCT`（不同的）值上进行聚合。这在计数时最有意义。\n\
    \n### GROUP BY\n\n`GROUP BY`子句可用于生成一个组汇总的虚拟表。\n\n在某些DBMS中，你可以使用`GROUP BY ()`来生成总计。这是没有`GROUP\
    \ BY ()`子句时的默认行为，并且每当SQL看到聚合函数时都会自动完成。它从来都不是真正必需的。\n\n你可以按基本值分组，也可以按计算值分组。\n\n\
    按计算值分组可能会变得复杂，因为`SELECT`和`ORDER BY`子句只能使用`GROUP BY`子句中的内容。由于子句的顺序，你可能会发现自己在各个子句中重复相同的计算。\n\
    \n由于`SELECT`子句只在最后阶段进行求值，并且选择和排序只能基于`GROUP BY`子句中的内容，你可能会发现以下技术很有帮助：\n\n*   使用冗余分组来选择一项并按另一项排序\n\
    *   将聚合查询放在一个CTE中，并将其与其他表连接以获取其余结果\n\n按列分组时，结果可能不会按正确顺序排列。由于组名都是字符串，按组名排序只会将它们按字母顺序排列，这并不总是合适的。但是，你也可以根据它们在另一个字符串中的位置来排序，这个字符串可以按你喜欢的任何顺序排列。\n\
    \n### 混合小计\n\n总的来说，聚合查询产生的是单一层级的简单聚合。有时，你需要将它们与不同级别的小计结合起来。\n\n你可以在单独的查询中生成小计，然后用`UNION`将它们组合起来。你可能需要一些额外的工作才能让结果按你希望的顺序排列。\n\
    \n大多数DBMS包含小计操作来自动创建组合结果。它们可能包括`GROUPING SETS`、`ROLLUP`或`CUBE`。大多数包含`ROLLUP`，这是最常见的变体。还有其他的分组函数来辅助排序和标记。\n\
    \n### 统计\n\n一般来说，聚合函数本质上是统计性的。虽然SQL不像专门的统计软件那样强大，但你可以使用聚合和分组来生成一些基本的统计数据。\n\n\
    ## 后续内容\n\n在某些情况下，我们使用公用表表达式中的查询来准备数据。然而，在其中一个案例中，我们创建了一个视图，以便可以重用该查询。\n\n在下一章中，我们将更仔细地研究如何创建和使用视图来改进我们的工作流程。\n\
    \n# 6. 使用视图及其相关对象\n\n这不是你第一次在书中看到视图，也不会是最后一次。\n\n本章整合了你可能已经了解到的关于视图和相关概念的知识，并提供了一些关于如何一般性地使用它们的想法。\n\
    \n你可以用一生来编写SQL语句，工作也能完成。然而，你可能会达到一个点，即一遍又一遍地写同样的东西失去了魅力，因此你会想要找到重用先前查询的方法。\n\n\
    首先，让我们看看表是什么，以及当你使用`SELECT`语句时会发生什么。\n\nSQL数据库将数据存储在表中。实际上，并非如此——每个表实际上存储在其他某种结构中，例如二进制树，这样更高效。然而，当你看到它时，它将被呈现为一个表，并且在数据库中就是这样称呼的。\n\
    \n表由行和列组成。出于我们的目的，表不一定是永久表，并且有些操作会生成表结构而不一定被永久存储。我们将它们称为**虚拟表**。\n\n以下是一些生成（虚拟）表的操作，按持久性递增的顺序排列：\n\
    \n*   `SELECT`语句的结果是一个虚拟表。\n*   一个**连接**是两个或多个（虚拟）表的组合，以产生一个扩展的虚拟表。\n*   一个**公用表表达式**生成一个虚拟表，你可以在查询的后面部分使用它。表子查询本质上是相同的东西。\n\
    *   一个**视图**是一个保存的`SELECT`查询，将在调用时重新生成虚拟表。\n    一个**物化视图**是一种存储其结果的视图，因此不必总是重新生成所有内容。\n\
    \    一些DBMS支持**表值函数**，这些是生成虚拟表的函数。\n*   一个**临时表**就像一个真实的表。它可能存储在磁盘上，也可能不存储。当会话结束时，它会自动销毁。\n\
    \n关于表和虚拟表的关键点是，它们都可以在`FROM`子句中使用。\n\n你已经知道如何使用连接。你也使用过公用表表达式，我们将在接下来的章节中更深入地讨论它们。\n\
    \n在本章中，我们将研究其余的对象，以及我们如何利用它们来改进我们的工作流程。"
  raw: "### NULLs\n\nAggregate functions all skip `NULL`s. This is particularly important\
    \ when counting values, but also when calculating averages.\n\nThe fact that `NULL`s\
    \ are skipped can also be used when calculating selective aggregates.\n\n### The\
    \ Aggregating Process\n\nThe data you aggregate is not necessarily in a saved\
    \ table. You can also aggregate virtual tables generated by joins, common table\
    \ expressions, and views.\n\nWhen aggregating data, the data may first be filtered\
    \ by a `WHERE` clause. The aggregate data is based on what’s left after filtering.\n\
    \nPerforming aggregates effectively transforms the original data into a virtual\
    \ table of one or more summary rows. This no longer includes the original raw\
    \ data. You can only select what is in the virtual summary table. As a result,\
    \ you can’t mix aggregates with raw data in a single `SELECT` clause.\n\nIf you\
    \ need both original and summary data, you may need to join the original table\
    \ with a CTE which has the summary.\n\n### Aggregate Filters\n\nIt’s possible\
    \ to filter what data is used for a single aggregate function.\n\nThere is a standard\
    \ `FILTER (WHERE ...)` clause which allows you to filter a column. However, it’s\
    \ not (yet) widely supported.\n\nThe common way to filter data is to use the `CASE\
    \ ... END` expression on what you’re aggregating. Set a value of, say, `1` for\
    \ the values you want, allow the rest to default to `NULL`, and let the aggregate\
    \ functions ignore them for the rest.\n\nYou can also aggregate on `DISTINCT`\
    \ values. This makes the most sense when you are counting.\n\n### GROUP BY\n\n\
    The `GROUP BY` clause can be used to generate a virtual table of group summaries.\n\
    \nIn some DBMSs, you can use `GROUP BY ()` to generate a grand summary. This is\
    \ the default without the `GROUP BY ()` clause and is automatically done whenever\
    \ SQL sees an aggregate function. It’s never truly needed.\n\nYou can group by\
    \ basic values, but also by calculated values.\n\nGrouping by calculated values\
    \ can get complicated, since the `SELECT` and `ORDER BY` clauses can only use\
    \ what’s in the `GROUP BY`. Because of the clause order, you may find yourself\
    \ repeating the same calculations in various clauses.\n\nSince the `SELECT` clause\
    \ is only evaluated near the end, and selecting and ordering can only be done\
    \ on what’s in the `GROUP BY` clause, you may find the following techniques helpful:\n\
    \n*   Using redundant groups to select one thing and sort by another\n\n*   Putting\
    \ aggregate queries in a CTE and joining that with other tables to get the rest\
    \ of the results\n\nWhen grouping by a column, your results may not be in the\
    \ correct order. Since the group names are all strings, sorting on the group name\
    \ will only put them in alphabetical order, which isn’t always suitable. However,\
    \ you can also sort them by their position in another string, which can be in\
    \ any order you like.\n\n### Mixing Subtotals\n\nBy and large, aggregate queries\
    \ produce simple aggregates on one level. Sometimes, you need to combine them\
    \ with various levels of subtotals.\n\nYou can generate subtotals in separate\
    \ queries and combine them with `UNION`. You might need some extra work to get\
    \ the results sorted in your preferred order.\n\nMost DBMSs include subtotaling\
    \ operations to create the combined result automatically. They may include `GROUPING\
    \ SETS`, `ROLLUP`, or `CUBE`. Most include the `ROLLUP` which is the most common\
    \ variation. There are additional grouping functions to assist with sorting and\
    \ labeling.\n\n### Statistics\n\nIn general, aggregate functions are basically\
    \ statistical in nature. Although SQL is not as powerful as dedicated statistical\
    \ software, you can use aggregates and grouping to generate some of the basic\
    \ statistics.\n\n## Coming Up\n\nIn some cases, we have used a query in a Common\
    \ Table Expression to prepare data. However, in one case we created a view instead,\
    \ so that we could reuse the query.\n\nIn the next chapter, we’ll have a closer\
    \ look at creating and using views to improve our workflow.\n\n# 6. Using Views\
    \ and Friends\n\nThis isn’t the first time you’ve looked at views in this book,\
    \ and it won’t be the last time.\n\nThis chapter consolidates what you may have\
    \ already picked up about views and related concepts and gives a few ideas about\
    \ working with them in general.\n\nYou can spend the rest of your life writing\
    \ SQL statements, and the job would get done. However, you might get to the point\
    \ where writing the same thing over and over again loses its charm, and so you’ll\
    \ want to find ways of reusing previous queries.\n\nFirst, let’s have a look at\
    \ what we mean by tables and what happens when you use the `SELECT` statement.\n\
    \nSQL databases store data in tables. Actually, they don’t—each table is really\
    \ stored in some other structure such as a binary tree, which is more efficient.\
    \ However, by the time you see it, it will be presented as a table, and that’s\
    \ what it’s called in the database.\n\nA table is made up of rows and columns.\
    \ For our purpose, the table doesn’t have to be a permanent table, and there are\
    \ operations which generate table structures without necessarily being permanently\
    \ stored. We’ll refer to them as **virtual tables**.\n\nHere is a list of operations\
    \ which generate (virtual) tables, in increasing order of longevity:\n\n*   The\
    \ result of a `SELECT` statement is a virtual table.\n\n*   A **join** is the\
    \ combination of two or more (virtual) tables to produce an expanded virtual table.\n\
    \n*   A **Common Table Expression** generates a virtual table which you can use\
    \ later in the query. A table subquery amounts to the same thing.\n\n*   A **view**\
    \ is a saved `SELECT` query, which will regenerate the virtual table on call.\n\
    \n    A **materialized view** is a view which stores its results so it doesn’t\
    \ always have to regenerate everything.\n\n    Some DBMSs support **Table-Valued\
    \ Functions** which are functions which generate virtual tables.\n\n*   A **temporary\
    \ table** is like a real table. It may or may not be stored on the disk. It will\
    \ self-destruct when the session is finished.\n\nThe thing about tables and virtual\
    \ tables is that they can all be used in the `FROM` clause.\n\nYou will already\
    \ know about using joins. You have also used Common Table Expressions, but we’ll\
    \ discuss them in more depth in the following chapters.\n\nIn this chapter, we’ll\
    \ look at the rest and how we can improve our workflow with them."
