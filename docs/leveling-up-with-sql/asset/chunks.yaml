  trans: '# 8. 窗口函数


    到目前为止，你已经了解了两大类计算：


    *   大多数计算都是基于表的`列`：对于每一行，根据一个或多个列计算出一个值。

    *   聚合查询用于汇总`行`：针对整个表，汇总部分或全部行。


    `窗口函数`是一组将行数据作为列添加的函数。我们将研究三组窗口函数：


    *   聚合函数：通常，你会将聚合值作为表数据的单独汇总获取，但聚合窗口函数允许你将聚合值与每一行一起包含。除了其他用途，你将看到如何利用它来生成累计总计。

    *   排名函数：这将根据当前行在数据集中的位置生成一个值。使用排序函数，你可以获取行号、相对排名，甚至是像十分位这样的分组。

    *   值函数：你可以获取当前行之前或之后的行中的数据。你还可以获取每组中的第一个和最后一个值。例如，这将帮助你获取当前行与另一行之间的值差。


    在本章中，我们将探讨所有这些函数。


    窗口函数对于 SQL 来说相对较新，但大多数现代数据库管理系统现在都支持它们。再次落后的是 MariaDB（在 10.2 版本引入）和 MySQL（在 8
    版本引入）。


    在开始之前，部分示例将使用`sales`表。该表包含一些下单日期/时间的`NULL`值。大概这些销售从未结账。到目前为止我们一直比较宽容，时不时将它们过滤掉，但现在是时候处理它们了。我们可以按如下方式删除所有`NULL`销售记录：


    ```

    DELETE FROM sales WHERE ordered IS NULL;

    ```


    你会注意到`saleitems`表有一个指向`sales`表的外键，这通常不允许在存在相关项目时删除销售记录。但是，如果你检查生成示例数据库的脚本，你会发现`ON
    DELETE CASCADE`子句，它会自动删除孤立的销售项目。


    ## 编写窗口函数


    窗口函数在一组行上生成一个值。这组行被称为一个`窗口`。


    窗口函数的通用语法是：


    ```

    fn() OVER (PARTITION BY columns |

    ORDER BY columns | frame clause)

    ```


    重要部分是`OVER()`子句，它定义了要汇总的窗口。有三个主要的窗口子句：


    *   `PARTITION BY`：为定义的组计算函数。它等同于`GROUP BY`。默认的分区是整个表。

    *   `ORDER BY`：按定义的顺序累积计算函数。换句话说，它生成累计总计。这个顺序不需要与表的`ORDER BY`子句相同。

    *   还有一个可选的框架子句。这会在分区内创建一个滑动窗口。框架子句需要一个`ORDER BY`窗口子句。默认情况下，框架是从开头到当前行的行，但当我们讲到那里时需要限定说明。


    在以下示例中，`SELECT`语句末尾通常有一个`ORDER BY`子句，其内容与`OVER()`子句中的相同。这不是必需的，但它使结果更容易理解。


    ### 简单的聚合窗口


    如你所知，你不能在非聚合查询中混合使用聚合函数。例如，这是一个无法工作的聚合查询：


    ```

    SELECT

    id, givenname, familyname,

    count(*)

    FROM customerdetails;

    ```


    但是，这样可以工作：


    ```

    SELECT

    id, givenname, familyname,

    count(*) OVER ()

    FROM customerdetails;

    ```


    这会给你类似这样的结果：


    | **id** | **givenname** | **familyname** | **count** |

    | --- | --- | --- | --- |

    | 42 | May | Knott | 303 |

    | 459 | Rick | Shaw | 303 |

    | 597 | Ike | Andy | 303 |

    | 186 | Pat | Downe | 303 |

    | 352 | Basil | Isk | 303 |

    | 576 | Pearl | Divers | 303 |

    | ~ 303 行 ~ |


    `OVER()`子句将聚合函数变成了一个`窗口`函数。现在将为每一列生成这个聚合函数。稍后你会看到，`OVER()`子句定义了任何分组（称为分区）、顺序以及在聚合中考虑的行数。


    对于如此简单的情况，你可以使用子查询获得相同的结果：


    ```

    SELECT

    id, givenname, familyname,

    (SELECT count(*) FROM customers)

    FROM customerdetails;

    ```


    当你应用一个窗口子句时，窗口函数会变得更有趣。例如：


    ```

    SELECT

    id, givenname, familyname,

    count(*) OVER (ORDER BY id)

    FROM customerdetails;

    ```


    这将按`id`的顺序给出截至当前行（包括当前行）的运行计数。实际表结果可能按行顺序排列，也可能不按行顺序排列，特别是如果你包含其他表达式时，因此最好在末尾添加`ORDER
    BY`：


    ```

    SELECT

    id, givenname, familyname,

    count(*) OVER (ORDER BY id) AS running_count

    FROM customerdetails

    ORDER BY id;

    ```


    现在你会得到类似这样的结果：


    | **id** | **Givenname** | **familyname** | **running_count** |

    | --- | --- | --- | --- |

    | 1 | Pierce | Dears | 1 |

    | 2 | Arthur | Moore | 2 |

    | 5 | Ray | King | 3 |

    | 6 | Gene | Poole | 4 |

    | 9 | Donna | Worry | 5 |

    | 10 | Ned | Duwell | 6 |

    | ~ 303 行 ~ |


    `running_count`列看起来非常像一个简单的行号。我们稍后会看到，如果`ORDER BY`列不是唯一的，它不一定相同。'
- fmt: '# Aggregate Functions


    Normally, you can’t use aggregate functions in a normal query unless you squeeze
    them into a subquery. However, they can be repurposed as window functions.


    Previously, you saw that you can use the expression `count(*) OVER ()` to give
    the total number on every row. You can also do something similar with the `sum()`
    or `avg()` functions.


    For example, suppose you want to compare sales totals with the overall average:


    ```sql

    SELECT

    id, ordered, total,

    total-avg(total) OVER () AS difference

    FROM sales;

    ```


    You’ll get something like:


    | **id** | **Ordered** | **total** | **difference** |

    | --- | --- | --- | --- |

    | 39 | 2022-05-15 21:12:07.988741 | 28 | -33.783 |

    | 40 | 2022-05-16 03:03:16.065969 | 34 | -27.783 |

    | 42 | 2022-05-16 10:09:13.674823 | 58.5 | -3.283 |

    | 43 | 2022-05-16 15:02:43.285565 | 50 | -11.783 |

    | 45 | 2022-05-16 16:48:14.674202 | 17.5 | -44.283 |

    | 518 | [NULL] | 13 | -48.783 |

    | ~ 5549 rows ~ |


    In a more complicated example, suppose you want to compare how sales each day
    compare to the rest of the week. First, you could extract only the day of the
    week and total from the `sales` table. You can use either the day name or the
    day number for this, but let’s use the day number:


    ```sql

    --  PostgreSQL: Sunday=0

    SELECT

    EXTRACT(dow FROM ordered) AS weekday_number,

    total

    FROM sales;


    --  MSSQL: Sunday=1

    SELECT

    datepart(weekday,ordered) AS weekday_number,

    total

    FROM sales;


    --  Oracle: Sunday=1

    SELECT

    to_char(ordered,''D'')+0 AS weekday_number,

    total

    FROM sales;


    --  MariaDB/MySQL: Sunday=1

    SELECT

    dayofweek(ordered) AS weekday_number,

    total

    FROM sales;


    --  SQLite: Sunday=0

    SELECT

    strftime(''%w'',ordered) AS weekday_number,

    total

    FROM sales;

    ```


    You’ll see they all have a different way to do it, and they can’t even agree on
    the day number. Fortunately, they all agree on the first day of the week:


    | **weekday_number** | **Total** |

    | --- | --- |

    | 0 | 28 |

    | 1 | 34 |

    | 1 | 58.5 |

    | 1 | 50 |

    | 1 | 17.5 |

    | 0 | 13 |

    | ~ 5549 rows ~ |


    Next, put that into a CTE, so you can aggregate them:


    ```sql

    WITH

    data AS (

    SELECT

    ... AS weekday,

    total

    FROM sales

    )

    --  to be done

    ;

    ```


    Next, you could summarize the data in another CTE:


    ```sql

    WITH

    data AS (

    SELECT

    ... AS weekday_number,

    total

    FROM sales

    ),

    summary AS (

    SELECT weekday_number, sum(total) AS total

    FROM data

    GROUP BY weekday_number

    )

    --  etc

    ```


    Finally, you can compare the daily totals to the grand totals using a window aggregate:


    ```sql

    WITH

    data AS (...),

    summary AS (...)

    SELECT

    weekday_number, total,

    total/sum(total) OVER() AS proportion

    FROM summary

    ORDER BY weekday_number;

    ```


    This will give you a day-by-day summary:


    | **weekday_number** | **total** | **?column?** |

    | --- | --- | --- |

    | 0 | 48182.22 | 0.147 |

    | 1 | 49304 | 0.151 |

    | 2 | 45156.5 | 0.138 |

    | 3 | 45959.5 | 0.141 |

    | 4 | 47528 | 0.145 |

    | 5 | 42372.5 | 0.13 |

    | 6 | 48415.5 | 0.148 |


    Note that the expression `total/sum(total) OVER()` is confusing as the `OVER()`
    clause seems a little uninvolved. You might prefer to write it as `total/(sum(total)
    OVER ())` to make it clearer that it is, in fact, a single expression. We’ll leave
    that to your preference, but it isn’t normally written that way.


    You can finish off by giving the calculation an alias, displaying it as a percentage,
    and sorting by weekday:


    ```sql

    WITH

    data AS (...),

    summary AS (...)

    SELECT

    weekday_number, total,

    100*total/sum(total) OVER() AS proportion

    FROM summary

    ;

    ```


    If you want to display the percentage symbol, that’s up to the DBMS. You can try
    one of the following:


    ```sql

    --  PostgreSQL

    to_char(100*total/sum(total) OVER(),''99.9%'')


    --  MariaDB/MySQL

    format(100*total/sum(total) OVER(),2) || ''%''


    --  MSSQL

    format(100*total/sum(total) OVER(),''0.0%'')


    --  SQLite: aka printf(...)

    select format(''%.1f%%'',100*total/sum(total) OVER())


    --  Oracle

    to_char(100*total/sum(total) OVER(),''99.9'') || ''%''

    ```


    This looks more convincing:


    | **weekday_number** | **total** | **proportion** |

    | --- | --- | --- |

    | 0 | 48182.22 | 14.7% |

    | 1 | 49304 | 15.1% |

    | 2 | 45156.5 | 13.8% |

    | 3 | 45959.5 | 14.1% |

    | 4 | 47528 | 14.5% |

    | 5 | 42372.5 | 13.0% |

    | 6 | 48415.5 | 14.8% |


    We’ve used `OVER()` to calculate the grand total for the table. However, we can
    also use a sliding window, as we’ll see in the next section.


    # Aggregate Window Functions and ORDER BY


    Recall our introductory sample where we included an `ORDER BY` clause in the `OVER()`
    clause:


    ```sql

    SELECT

    id, givenname, familyname,

    count(*) OVER (ORDER BY id) AS running_count

    FROM customerdetails

    ORDER BY id;

    ```


    In this example, the `id`, being the primary key, is unique. That will give us
    a false idea of how this works, so let’s look at using the `height`, which is
    not unique. We’ll also filter out the `NULL` heights to make it more obvious:


    ```sql

    SELECT

    id, givenname, familyname,

    height,

    count(*) OVER (ORDER BY height) AS running_count

    FROM customerdetails

    WHERE height IS NOT NULL

    ORDER BY height;

    ```


    You’ll see some repeated heights and how they affect the window function:


    | **id** | **givenname** | **familyname** | **Height** | **running_count** |

    | --- | --- | --- | --- | --- |

    | 597 | Ike | Andy | 153 | 2 |

    | 283 | Ethel | Glycol | 153 | 2 |

    | 451 | Fred | Knott | 153.8 | 3 |

    | 194 | Rod | Fishing | 154.3 | 4 |

    | 534 | Minnie | Bus | 156.4 | 6 |

    | 352 | Basil | Isk | 156.4 | 6 |

    | ~ 267 rows ~ |


    When using `ORDER BY` in the `OVER` clause, it means count the number of rows
    *up to the current value*. That may or may not be what you wanted.


    ## The Framing Clause


    In this example, there’s an implied **framing** clause, which defaults to this
    behavior. If you like, you can make it more specific:


    ```sql

    count(*) OVER (ORDER BY height

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW)

    ```


    That’s quite a mouthful, but that’s the way the SQL language is developing: Why
    say something in two words if you can say it in twenty^([⁵](#fn5))? Here, the
    word `RANGE` refers to the value of `height`. For example, in the fifth row earlier,
    the value is the same as the next row, so `count(*)` includes both.


    The obvious alternative is:


    ```sql

    SELECT

    id, givenname, familyname,

    height,

    count(*) OVER (ORDER BY height

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS running_count

    FROM customerdetails

    WHERE height IS NOT NULL

    ORDER BY height;

    ```


    The subtle change is from `RANGE BETWEEN` to `ROWS BETWEEN`. It now counts the
    number of rows up to the current *row*.


    | **id** | **givenname** | **familyname** | **Height** | **running_count** |

    | --- | --- | --- | --- | --- |

    | 597 | Ike | Andy | 153 | 1 |

    | 283 | Ethel | Glycol | 153 | 2 |

    | 451 | Fred | Knott | 153.8 | 3 |

    | 194 | Rod | Fishing | 154.3 | 4 |

    | 534 | Minnie | Bus | 156.4 | 5 |

    | 352 | Basil | Isk | 156.4 | 6 |

    | ~ 267 rows ~ |


    It’s a little bit unfair: two customers on the same height are arbitrarily positioned
    one before the other. We’ll see more of this unfairness later.


    The framing clause can take the following form:


    ```sql

    [ROW|RANGE] BETWEEN start AND end

    ```


    As we saw, the difference between `ROWS` and `RANGE` is that `RANGE` includes
    all the rows which match the current value, while `ROWS` doesn’t.


    ## Frame Borders


    The `start` and `end` expressions, a.k.a. the **frame borders**, can take one
    of the following forms:


    | Expression | Meaning |

    | --- | --- |

    | `UNBOUND PRECEDING` | Beginning |

    | `n PRECEDING` | Number of rows *before* the current row |

    | `CURRENT ROW` | |

    | `n FOLLOWING` | Number of rows *after* the current row |

    | `UNBOUND FOLLOWING` | End |


    There’s also a short form:


    ```sql

    ROWS|RANGE start

    ```


    which means between the start and the current row.'
  raw: '## Aggregate Functions


    Normally, you can’t use aggregate functions in a normal query unless you squeeze
    them into a subquery. However, they can be repurposed as window functions.


    Previously, you saw that you can use the expression `count(*) OVER ()` to give
    the total number on every row. You can also do something similar with the `sum()`
    or `avg()` functions.


    For example, suppose you want to compare sales totals with the overall average:


    ```

    SELECT

    id, ordered, total,

    total-avg(total) OVER () AS difference

    FROM sales;

    ```


    You’ll get something like


    | **id** | **Ordered** | **total** | **difference** |

    | --- | --- | --- | --- |

    | 39 | 2022-05-15 21:12:07.988741 | 28 | -33.783 |

    | 40 | 2022-05-16 03:03:16.065969 | 34 | -27.783 |

    | 42 | 2022-05-16 10:09:13.674823 | 58.5 | -3.283 |

    | 43 | 2022-05-16 15:02:43.285565 | 50 | -11.783 |

    | 45 | 2022-05-16 16:48:14.674202 | 17.5 | -44.283 |

    | 518 | [NULL] | 13 | -48.783 |

    | ~ 5549 rows ~ |


    In a more complicated example, suppose you want to compare how sales each day
    compare to the rest of the week.


    First, you could extract only the day of the week and total from the `sales` table.
    You can use either the day name or the day number for this, but let’s use the
    day number:


    ```

    --  PostgreSQL: Sunday=0

    SELECT

    EXTRACT(dow FROM ordered) AS weekday_number,

    total

    FROM sales;

    --  MSSQL: Sunday=1

    SELECT

    datepart(weekday,ordered) AS weekday_number,

    total

    FROM sales;

    --  Oracle: Sunday=1

    SELECT

    to_char(ordered,''D'')+0 AS weekday_number,

    total

    FROM sales;

    --  MariaDB/MySQL: Sunday=1

    SELECT

    dayofweek(ordered) AS weekday_number,

    total

    FROM sales;

    --  SQLite: Sunday=0

    SELECT

    strftime(''%w'',ordered) AS weekday_number

    total

    FROM sales;

    ```


    You’ll see they all have a different way to do it, and they can’t even agree on
    the day number. Fortunately, they all agree on the first day of the week:


    | **weekday_number** | **Total** |

    | --- | --- |

    | 0 | 28 |

    | 1 | 34 |

    | 1 | 58.5 |

    | 1 | 50 |

    | 1 | 17.5 |

    | 0 | 13 |

    | ~ 5549 rows ~ |


    Next, put that into a CTE, so you can aggregate them:


    ```

    WITH

    data AS (

    SELECT

    ... AS weekday,

    total

    FROM sales

    )

    --  to be done

    ;

    ```


    Next, you could summarize the data in another CTE:


    ```

    WITH

    data AS (

    SELECT

    ... AS weekday_number,

    total

    FROM sales

    ),

    summary AS (

    SELECT weekday_number, sum(total) AS total

    FROM data

    GROUP BY weekday_number

    )

    --  etc

    ```


    Finally, you can compare the daily totals to the grand totals using a window aggregate:


    ```

    WITH

    data AS (...),

    summary AS (...)

    SELECT

    weekday_number, total,

    total/sum(total) OVER()

    FROM weekday_number

    ORDER BY weekday_number;

    ```


    This will give you a day-by-day summary:


    | **weekday_number** | **total** | **?column?** |

    | --- | --- | --- |

    | 0 | 48182.22 | 0.147 |

    | 1 | 49304 | 0.151 |

    | 2 | 45156.5 | 0.138 |

    | 3 | 45959.5 | 0.141 |

    | 4 | 47528 | 0.145 |

    | 5 | 42372.5 | 0.13 |

    | 6 | 48415.5 | 0.148 |


    Note that the expression `total/sum(total) OVER()` is confusing as the `OVER()`
    clause seems a little uninvolved. You might prefer to write it as `total/(sum(total)
    OVER ())`


    to make it clearer that it is, in fact, a single expression. We’ll leave that
    to your preference, but it isn’t normally written that way.


    You can finish off by giving the calculation an alias, displaying it as a percentage,
    and sorting by weekday:


    ```

    WITH

    data AS (...),

    summary AS (...)

    SELECT

    weekday, total,

    100*total/sum(total) OVER() AS proportion

    FROM summary

    ;

    ```


    If you want to display the percentage symbol, that’s up to the DBMS. You can try
    one of the following:


    ```

    --  PostgreSQL

    to_char(100*total/sum(total) OVER(),''99.9%'')

    --  MariaDB/MySQL

    format(100*total/sum(total) OVER(),2) || ''%''

    --  MSSQL

    format(100*total/sum(total) OVER(),''0.0%'')

    --  SQLite: aka printf(...)

    select format(''%.1f%%'',100*total/sum(total) OVER())

    --  Oracle

    to_char(100*total/sum(total) OVER(),''99.9'') || ''%''

    ```


    This looks more convincing:


    | **weekday_number** | **total** | **proportion** |

    | --- | --- | --- |

    | 0 | 48182.22 | 14.7% |

    | 1 | 49304 | 15.1% |

    | 2 | 45156.5 | 13.8% |

    | 3 | 45959.5 | 14.1% |

    | 4 | 47528 | 14.5% |

    | 5 | 42372.5 | 13.0% |

    | 6 | 48415.5 | 14.8% |


    We’ve used `OVER()` to calculate the grand total for the table. However, we can
    also use a sliding window, as we’ll see in the next section.


