  trans: '## 对多个值进行汇总


    前面生成的表行数非常多，且单本书籍会因关联不同体裁而多次出现。你可以使用 `GROUP BY` 查询来合并多个值。


    这可能会有些棘手，因为你尝试汇总的并非简单表，而是以连接形式生成的虚拟表。你可以使用公用表表达式来完成此操作：


    ```

    WITH cte AS (

    SELECT b.id, b.title, g.genre

    FROM bookgenres AS bg

    JOIN books AS b ON bg.bookid=b.id

    JOIN genres AS g ON bg.genreid=g.id

    )

    --等等

    ;

    ```


    公用表表达式 (`CTE`) 将 `SELECT` 语句的结果保存到一个虚拟表中，以便你可以在后续阶段使用这些结果。你将在第 7 章和第 9 章中了解更多关于
    `CTE` 的内容。


    现在，你可以使用 `count()` 和 `string_agg()` 两个函数来汇总 `CTE` 的结果：


    ```

    WITH cte AS (

    SELECT b.id, b.title, g.genre

    FROM

    bookgenres AS bg

    JOIN books AS b ON bg.bookid=b.id

    JOIN genres AS g ON bg.genreid=g.id

    )

    SELECT

    id, title,

    count(*) AS ncategories,        --  实际上并非必需

    --  PostgreSQL, MSSQL

    string_agg(genre,'', '') AS genres

    --  MySQL / MariaDB

    --  group_concat(genre separator '', '') AS genres

    --  SQLite

    --  group_concat(genre, '', '') AS genres

    --  Oracle

    --  listagg(genre separator '', '') AS genres

    FROM cte

    GROUP BY id, title

    ORDER BY id;

    ```


    现在，你得到了一个更紧凑的列表：


    | `id` | `书名` | `类别数` | `体裁` |

    | --- | --- | --- | --- |

    | 4 | 基础（节选） ... | 6 | 经典，德国文学，非小 ... |

    | 5 | 劳工（节选） ... | 7 | 欧洲文学，法国文学 ... |

    | 6 | 美国参议员 ... | 12 | 经典文学，欧洲文学 ... |

    | 7 | 天真与经验之歌 ... | 5 | 18 世纪，诗歌，经典， ... |

    | 9 | 面具之后，奥 ... | 8 | 文学，美国，历史小 ... |

    | 11 | 苏珊夫人 ... | 4 | 罗曼史，历史小说，经 ... |

    | ~ 1200 行 ~ |


    `string_agg(列名,分隔符)` 函数使用指定的分隔符连接列中的值。你无疑会惊讶地发现，各 `DBMS` 在此函数的实现上存在差异。正如你所见，在某些
    `DBMS` 中它被称为 `GROUP_CONCAT` 或 `listagg`。


    请注意，我们同时按书籍的 `id` 和 `title` 列进行了分组。由于 `id` 是主键，因此具有唯一性，通常没有必要像之前那样尝试进行子分组。然而，这是在
    `SELECT` 子句中包含 `title` 的一种简单方法，因为 `SELECT` 子句只能包含分组列和汇总结果。


    ## 组合连接


    一旦我们知道了如何处理书籍与作者、书籍与体裁的关系，就可以将它们全部连接在一起：


    ```

    --  不适用于 SQLite

    SELECT

    b.id, b.title, b.published, b.price,

    g.genre,

    a.givenname, a.othernames, a.familyname,

    a.born, a.died, a.gender, a.home

    FROM

    authors AS a

    RIGHT JOIN books AS b ON a.id=b.authorid

    LEFT JOIN bookgenres AS bg ON b.id=bg.bookid

    JOIN genres AS g ON bg.genreid=g.id

    ;

    ```


    这将得到一个相当全面的数据集：


    | `id` | `截断` | `...` | `体裁` | `名` | `中间名` | `姓` | `...` |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 1732 | 跟随他的脚步 ... | ... | 小说 | Charles | M. | Sheldon | ... |

    | 414 | 诗集 ... | ... | 小说 | Stéphane |   | Mallarmé | ... |

    | 241 | 对北欧神话的研究 ... | ... | 奇幻 | Viktor |   | Rydberg | ... |

    | 247 | 黄衣之王 ... | ... | 哥特 | Robert | W. | Chambers | ... |

    | 1914 | 小猎犬号航行记 ... | ... | 经典 | Charles |   | Darwin | ... |

    | 936 | 物种起源 ... | ... | 经典 | Charles |   | Darwin | ... |

    | ~ 8011 行 ~ |


    在上面的示例中，我们包含了四个表中的大部分列，省略了外键和大部分其他主键。


    这些表从 `authors` 表到 `genres` 表呈线性连接。由于我们想要所有的书籍，无论它们是否关联了作者或体裁，因此使用了两个外连接。结果证明，我们看到了三种主要连接类型的示例。


    `SQLite` 不支持 `RIGHT JOIN`，所以这个查询在 SQLite 中无法运行。


    如果你愿意，可以从 `books` 表开始编写连接：


    ```

    SELECT

    b.id, b.title, b.published, b.price,

    g.genre,

    a.givenname, a.othernames, a.familyname,

    a.born, a.died, a.gender, a.home

    FROM

    books AS b

    LEFT JOIN bookgenres AS bg ON b.id=bg.bookid

    JOIN genres AS g ON bg.genreid=g.id

    LEFT JOIN authors AS a ON b.authorid=a.id

    ;

    ```


    从视觉上看，这似乎将重点放在了 `books` 表上，但它将产生与之前完全相同的结果。


    这一次，`SQLite` 就没问题了。


    不过，还有一种替代方法，它利用了之前创建的视图。


    首先，你可以用 `bookdetails` 视图替换对单独 `books` 和 `authors` 表的引用：


    ```

    SELECT

    bd.id, bd.title, bd.published, bd.price,

    g.genre,

    bd.givenname, bd.othernames, bd.familyname,

    bd.born, bd.died, bd.gender, bd.home

    FROM

    bookdetails AS bd

    LEFT JOIN bookgenres AS bg ON bd.id=bg.bookid

    JOIN genres AS g ON bg.genreid=g.id;

    ```


    这是一个更简单的查询，基于你已经准备好的一个查询。请注意：


    *   `bookdetails` 视图被别名为 `bd`。

    *   除了来自 `genres` 表的 `genre` 列外，所有列都来自 `bookdetails` 视图。


    如果你想合并体裁名称，可以在一个 `CTE` 中完成，然后将结果与视图连接：


    ```

    WITH cte AS (

    SELECT bg.bookid, string_agg(g.genre,'', '') AS genres

    FROM bookgenres AS bg JOIN genres AS g ON bg.genreid=g.id

    GROUP BY bg.bookid

    )

    SELECT *

    FROM bookdetails AS b JOIN cte ON b.id=cte.bookid;

    ```


    现在，你也能得到完整的体裁详细信息了：


    | `id` | `书名` | `...` | `体裁` | `名` | `姓` | `...` |

    | --- | --- | --- | --- | --- | --- | --- |

    | 4 | 基础（节选） ... | ... | 经典，德国 ... | Immanuel | Kant | ... |

    | 5 | 劳工（节选） ... | ... | 欧洲文学 ... | Victor | Hugo | ... |

    | 6 | 美国参议员 ... | ... | 经典文学 ... | Anthony | Trollope | ... |

    | 7 | 天真与经验之歌 ... | ... | 18 世纪，诗歌 ... | William | Blake | ... |

    | 9 | 面具之后，奥 ... | ... | 文学，美国 ... | A.M. | Barnard | ... |

    | 11 | 苏珊夫人 ... | ... | 罗曼史，历史 ... | Jane | Austen | ... |

    | ~ 1200 行 ~ |


    你可能想要筛选体裁。你可以在 `CTE` 内部完成此操作。'
- fmt: "```\nWITH cte AS (\nSELECT bg.bookid, string_agg(g.genre,', ') AS genres\n\
    FROM bookgenres AS bg JOIN genres AS g ON bg.genreid=g.id\nWHERE g.genre IN('Fantasy','Science\
    \ Fiction')\nGROUP BY bg.bookid\n)\nSELECT *\nFROM bookdetails AS b JOIN cTE ON\
    \ b.id=cte.bookid;\n```\n\nYou’ll then get a filtered list:\n\n| **id** | **truncate**\
    \ | **...** | **genres** | **givenname** | **familyname** | **...** |\n| --- |\
    \ --- | --- | --- | --- | --- | --- |\n| 589 | The Story of ... | ... | Fantasy\
    \ ... | Stanley | Waterloo | ... |\n| 96 | Bee: The Pri ... | ... | Fantasy ...\
    \ | Anatole | France | ... |\n| 880 | The Journey ... | ... | Fantasy, Science\
    \ F… | Ludvig | Holberg | ... |\n| 591 | The Story of ... | ... | Fantasy ...\
    \ | E. | Nesbit | ... |\n| 1938 | Histoire Com ... | ... | Science Fiction ...\
    \ | Cyrano | de Bergerac | ... |\n| 128 | The Year 3000… | ... | Science Fiction\
    \ ... | Paolo | Mantegazza | ... |\n| ~ 163 rows ~ |\n\nNote that the concatenated\
    \ genres column has been aliased to `` `genres` ``. That’s the same name as the\
    \ `genres` table, so you might get confused. The good news is that SQL doesn’t,\
    \ so you can get away with it. On the other hand, if you’re worried about that\
    \ you can always use double quotes: `AS \"genres\"`. Of course, you can also choose\
    \ a better alias.\n\nA word of warning, however. When you start using views inside\
    \ queries, you will have to consider some possible side effects:\n\n*   Since\
    \ the view is not part of the original database, you may lead to some confusion\
    \ with other users, since views look like tables, but aren’t with the rest of\
    \ the tables.\n\n*   If you have too many views in a query, the DBMS optimizer\
    \ may not be able to work out the most efficient plan for running the query. This\
    \ can be because some views produce more than you need for the next query, and\
    \ the optimizer may not be able to work out what you really want.\n\n*   If there\
    \ are any changes to the view, they will, of course, affect the outcome of the\
    \ query.\n\n*   These side effects will be more pronounced if you start to create\
    \ views using other views. It is often safer to create the new view from scratch.\n\
    \nThis doesn’t mean that you shouldn’t use views in your queries—that’s the whole\
    \ point of creating a view. It does mean, however, that you should be careful\
    \ when piling them up.\n\n## Many-to-Many Relationships Happen All the Time\n\n\
    Any time you have one table linked to two others, you have a many-to-many relationship.\n\
    \nFor example, the database includes `customers`, `sales`, `saleitems`, and `books`.\
    \ All of these tables are joined with foreign key/primary key relationships. That\
    \ means there is a many-to-many relationship between customers and books: one\
    \ customer can buy many books, while one book can be bought by multiple customers\
    \ (not the same one, of course, but a copy of the book).\n\nThis means that the\
    \ `sales` and `saleitems` tables, in particular the `saleitems` table, are taking\
    \ on the role of associative tables.\n\nThere are two main differences between\
    \ the `sales` and `saleitems` tables in this example and the `bookgenres` table\
    \ in the previous example:\n\n*   The association doesn’t need to be unique. It’s\
    \ quite feasible for a customer to buy the same book on another occasion. In fact,\
    \ it would do the business good if it happened more often.\n\n*   The association\
    \ isn’t the whole story. You also want to record other sales details such as the\
    \ date, the amount paid, and so on.\n\nIn this case, the sales tables are not\
    \ purely associative, since they contain new data of their own, but they are still\
    \ doing an associative job.\n\n## Another Many-to-Many Example\n\nThe current\
    \ database presumes that each book has a single author only. In principle, you\
    \ could have a book written by multiple authors. That doesn’t happen very often\
    \ in fiction, but is more common in nonfiction.\n\nTo do this, you would need\
    \ to modify your design as follows:\n\n*   Remove the `authorid` column from the\
    \ `books` table.\n\n*   Create an `authorship` table which associates books with\
    \ authors.\n\nThere are a few extra tables, not part of the main database, which\
    \ we can use to make the concept clear:\n\n*   `multibooks`: A small table of\
    \ books without an author id\n\n*   `multiauthors`: A table of authors for the\
    \ preceding books\n\n*   `authorship`: An associative table which associates books\
    \ and authors\n\nThe table structure looks like this:\n\n```\nCREATE TABLE books\
    \ (\nid INT PRIMARY KEY,\ntitle varchar(60)\n--  additional book details NOT including\
    \ author\n);\nCREATE TABLE authors (\nid INT PRIMARY KEY,\ngivenname varchar(24),\n\
    familyname varchar(24)\n--  additional author details NOT including book\n);\n\
    CREATE TABLE authorship (\nbookid INT REFERENCES books(id),\nauthorid INT REFERENCES\
    \ authors(id),\nPRIMARY KEY(bookid,authorid)\n);\n```\n\nAn example of a book\
    \ with multiple authors would be\n\n```\nINSERT INTO books(title)\nVALUES('Good\
    \ Omens');\nINSERT INTO authors(givenname,familyname)\nVALUES\n('Terry','Pratchett'),\n\
    ('Neil','Gaiman');\nINSERT INTO authorship(bookid,authorid)\nVALUES\n(1,1),  --\
    \  Good Omens, Terry Pratchett\n(1,2);  --  Good Omens, Neil Gaiman\n```\n\nYou\
    \ won’t need to run the preceding example, as the data is already in the sample\
    \ tables.\n\nYou can fetch the associated data using something like the following:\n\
    \n```\nSELECT *\nFROM\nmultibooks AS b\nJOIN authorship AS ba ON b.id=ba.bookid\n\
    JOIN multiauthors AS a ON ba.authorid=a.id;\n```\n\nYou’ll get something like\
    \ this:\n\n| **id** | **title** | **authorid** | **bookid** | **id** | **givenname**\
    \ | **familyname** |\n| --- | --- | --- | --- | --- | --- | --- |\n| 18 | The\
    \ Gilded Age | 9 | 18 | 9 | Charles | Warner |\n| 9 | The Syndic | 7 | 9 | 7 |\
    \ Cyril | Kornbluth |\n| 21 | Seller | 7 | 21 | 7 | Cyril | Kornbluth |\n| 8 |\
    \ Wolfbane | 7 | 8 | 7 | Cyril | Kornbluth |\n| 12 | Takeoff | 7 | 12 | 7 | Cyril\
    \ | Kornbluth |\n| 8 | Wolfbane | 6 | 8 | 6 | Frederik | Pohl |\n| ~ 31 rows ~\
    \ |\n\nYou can also combine the authors for each book using a CTE and an aggregate\
    \ query:\n\n```\nWITH cte AS (\nSELECT\nba.bookid,\nstring_agg(a.givenname||'\
    \ '||a.familyname,' & ')\nAS authors\nFROM authorship AS ba JOIN multiauthors\
    \ AS a\nON ba.authorid=a.id\nGROUP BY ba.bookid\n)\nSELECT b.id, b.title, cte.authors\n\
    FROM multibooks AS b JOIN cte ON b.id=cte.bookid\nORDER BY b.id;\n```\n\nYou now\
    \ have a list of books with all of their authors:\n\n| **id** | **title** | **Authors**\
    \ |\n| --- | --- | --- |\n| 1 | Man Plus | Frederik Pohl |\n| 2 | Proxima | Stephen\
    \ Baxter |\n| 3 | The Long Mars | Stephen Baxter & Terry Pratchett |\n| 4 | The\
    \ Shining | Stephen King |\n| 5 | The Talisman | Peter Straub & Stephen King |\n\
    | 6 | The Long Earth | Stephen Baxter & Terry Pratchett |\n| ~ 23 rows ~ |\n\n\
    The main sample database doesn’t include multiple authors simply because it doesn’t\
    \ happen often enough with classic literature to make it worth complicating the\
    \ sample further.\n\nHowever, the point is that whenever you have multiple values,\
    \ you will need additional tables rather than additional columns or compound columns.\
    \ Multiple values should appear in rows, not columns.\n\n## Inserting into Related\
    \ Tables\n\nAs you see, one-to-many tables are very common in an SQL database.\
    \ This creates additional challenges when you need to add to multiple tables in\
    \ a single transaction.\n\nThese challenges include the following:\n\n*   You\
    \ may need to add to the parent (one) table before you add to the child (many)\
    \ table.\n    This is because the child table will refer to the parent table.\n\
    \n*   When adding to the parent table, you need to remember the new primary key.\n\
    \    This becomes a challenge when the primary key is generated by the database\
    \ itself, so you will need to fetch the new value.\n\n*   During the process,\
    \ one of the steps may fail.\n    This may lead to a partially completed operation,\
    \ adding some invalid data as a residue.\n\nHere, we’ll see how that works in\
    \ practice.\n```"
