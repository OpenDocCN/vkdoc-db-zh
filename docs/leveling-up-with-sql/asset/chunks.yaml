  trans: "# 3. 表关系与连接\n\n一个数据库并非只有一张表。当然，它可以只有一张表，但任何一个复杂的数据库——比如你用来管理在线书店的数据库——都会包含多张表，每张表分别处理不同的数据集合。\n\
    \n虽然通过查看单张表可以获得一些有用的信息，但通过组合多张表，你将获得远多于此的信息。\n\n在本章中，我们将探讨如何处理多张表、它们之间如何关联，以及在需要时如何将它们组合起来。\n\
    \n具体来说，我们将看看：\n\n*   表关系及其主要类型是什么意思\n*   如何使用一对多关系来管理多个值\n*   如何使用一对一关系用一张表来扩展另一张表\n\
    *   如何使用多对多关系来管理更复杂的多个值\n*   如何在多张表中处理数据的插入和更新\n\n我们将探讨数据库为何要以这种多表结构来构建，以及如何使用连接（join）将它们组合成虚拟表。\n\
    \n## 关系概述\n\n一个结构良好的数据库遵循若干重要的设计原则。其中两条如下：\n\n*   每张表只包含一种类型的数据，不包含本应属于另一张表的数据。\n\
    \    例如，`customers`（客户）表不包含书籍详情，而`books`（书籍）表不包含客户详情。这也适用于`books`和`authors`（作者）表。\n\
    \    这并不是说`books`表完全不知道作者信息。我们稍后会探讨这一点。\n*   数据从不重复。同一数据项不会出现在不同的表中，也不会在同一张表中重复出现。\n\
    \    例如，如果你在`books`表中包含作者姓名和其他详情，你会发现对于同一作者的其他书籍，这些详情会被重复记录。\n\n这两条原则是相互关联的：如果你将作者详情与书籍混在一起，违反了第一条原则，最终就会导致为多本书重复记录相同的详情，从而违反了第二条原则。\n\
    \n管理书籍和作者的正确方式是，将作者详情放在一个单独的表中，并在`books`表中包含一个指向某位作者的`引用`。这样，我们说这两个表之间存在一个`关系`。\n\
    \n同样的原则也适用于`books`和`customers`表。由于目标是让客户购买书籍，因此这些表之间也应该存在关系。不过，这种关系稍微复杂一些，我们稍后会看到。\n\
    \n关系主要有三种类型：\n\n*   `一对多`关系存在于一张表的`主键`与另一张表的外键之间。\n    例如，`authors`和`books`表之间是一对多关系：一位作者可以有多本书，多本书可以对应同一位作者。\n\
    *   `一对一`关系存在于一张表的`主键`与另一张表的`主键`之间。通常这种情况较少见，你更可能看到的是它的一种变体。\n    例如，有一个`vip`（贵宾）表，用于存储客户的额外功能。对于每个客户，只能有一个`vip`条目，因此这两个表之间存在一种（改良的）一对一关系。\n\
    *   `多对多`关系不是直接关系，而是涉及在两张主表之间的一张连接表。\n    例如，有一个`genres`（体裁）表，其中包含书籍可能的体裁标签。由于一本书可以有多种体裁，一种体裁可以适用于多本书，因此这两个表之间存在多对多关系。\n\
    \    你会看到，这是通过一张额外的表来实现的。\n\n这些关系可以被描述为`计划内`的关系。它们通常通过外键约束来强制实现，通常涉及主键，并为数据库定义了一个紧密的结构。\n\
    \n也可能会存在计划外的关系。例如，你可能会考虑客户生日与作者生日之间的关系。这种关系很可能只是巧合，但在某些情况下可能值得探究——也许天蝎座的人会对其他天蝎座的人感到亲切。\n\
    \n我们将计划外的关系称为`临时`关系，并稍后看几个例子。\n\n如果多张表处于计划内或计划外的关系中，你可以使用`JOIN`（连接）来查看它们的组合。"
- fmt: '## One-to-Many Relationship


    This is the most common type of relationship between two tables. The relationship
    is between the primary key of one table and a foreign key in another. However,
    it’s actually implemented as a reference from a foreign key to the primary key.

    The relationship is used to indicate a number of possible scenarios. For example:


    *   One Author has written many Books.

    *   One Customer has many Sales.

    *   One Sale contains many Items.


    Note that the use of the word *many* can imply any number from 0 to ∞.

    In the preceding cases, one table is referred to as the **one** table, while the
    other is referred to as the **many** table, which is not very informative. Sometimes,
    it is helpful to think of the one table as the **parent** table, while the many
    table is the **child** table.

    A one-to-many relationship is implemented as a reference from the child table
    to the parent table, for example, for books and authors:


    ```

    CREATE TABLE authors (          --  Parent Table (One)

    id INT PRIMARY KEY

    --  other columns

    );

    CREATE TABLE books (            --  Child Table (Many)

    id INT PRIMARY KEY,

    bookid INT REFERENCES parent(id)

    --  other columns

    );

    ```


    Visually, it looks like Figure [3-1](#606708_1_En_3_Chapter.xhtml#Fig1).


    ![](images/606708_1_En_3_Chapter/606708_1_En_3_Fig1_HTML.jpg)

    Two blocks, such as books and authors, illustrate the one-to-many join. The author
    i d F K in books is linked to the author i d P K.

    Figure 3-1

    One-to-Many Join


    Note that while the child table has a reference to the parent table, the parent
    table does *not* have a reference to the child table.

    You can combine parent and child tables using a `JOIN`:


    ```

    --  Not Oracle

    SELECT

    b.id, b.title,      --  etc

    a.givenname, a.familyname   --  etc

    FROM books AS b JOIN authors AS a ON b.authorid=a.id;

    --  Oracle: No AS in table aliases

    SELECT

    b.id, b.title,       --  etc

    a.givenname, a.familyname   --  etc

    FROM books b JOIN authors a ON b.authorid=a.id;

    ```


    This will give you the books with their matching authors:


    | `id` | `title` | `givenname` | `familyname` |

    | --- | --- | --- | --- |

    | 2078 | The Duel | Heinrich | von Kleist |

    | 503 | Uncle Silas | J. | Le Fanu |

    | 2007 | North and South | Elizabeth | Gaskell |

    | 702 | Jane Eyre | Charlotte | Brontë |

    | 1530 | Robin Hood, The Prince of ... | Alexandre | Dumas |

    | 1759 | La Curée | Émile | Zola |

    | ~ 1172 rows ~ |


    Note that Oracle has a quirk which disallows using `AS` for table aliases. If
    you’re using Oracle, you’ll need to remember that in the following examples which
    may include `AS`.

    Remember, if there are anonymous books (books with a `NULL` for `authorid`), you
    will need an outer join:


    ```

    --  Not Oracle

    SELECT

    b.id, b.title,       --  etc

    a.givenname, a.familyname   --  etc

    FROM books AS b LEFT JOIN authors AS a ON b.authorid=a.id;

    --  Oracle: Remember no AS in table aliases

    SELECT

    b.id, b.title,       --  etc

    a.givenname, a.familyname   --  etc

    FROM books b LEFT JOIN authors a ON b.authorid=a.id;

    ```


    This will give you all of the books with or without their authors:


    | `id` | `title` | `givenname` | `familyname` |

    | --- | --- | --- | --- |

    | 1868 | The Tenant of Wildfell Hall | Anne | Brontë |

    | 661 | The Narrative of Arthur Gordon Pym ... | Edgar | Poe |

    | 91 | My Bondage and My Freedom | Frederick | Douglass |

    | 848 | The Charterhouse of Parma | [NULL] | Stendhal |

    | 440 | The Princess and the Goblin | George | MacDonald |

    | 881 | Against Nature | Joris-Karl | Huysmans |

    | ~ 1201 rows ~ |


    The one-to-many relationship is the most common relationship between tables.

    Remember that SQLite doesn’t support `RIGHT JOIN`s. If you want an outer join,
    you need to put the unmatched row table on the left and make sure to use `LEFT
    JOIN`.


    ### Counting One-to-Many Joins


    When you’re not quite sure how the database is set up, and you’re not quite sure
    whether you’ve properly joined the right columns to the matching columns, it might
    be helpful to estimate the number of results you should get from a join.

    To get an idea of where we’re headed, suppose we have simplified tables of books
    and authors as in Figure [3-2](#606708_1_En_3_Chapter.xhtml#Fig2).


    ![](images/606708_1_En_3_Chapter/606708_1_En_3_Fig2_HTML.jpg)

    Two tables, books, and authors demonstrate the counting of one-to-many joins.
    Two books by Jane Austen, Lewis Carroll, and Mark Twain.

    Figure 3-2

    Books and Authors


    In the previous example, we opted for a `LEFT JOIN`. When you join a child table
    to a parent table, you generally have four options:


    *   Only the matching rows

    *   Include all of the unmatched children

    *   Include all of the unmatched parents

    *   Include all of the unmatched children *and* parents


    The first option is, of course, an `INNER JOIN`, or, more simply, `JOIN`.

    The result would look like Figure [3-3](#606708_1_En_3_Chapter.xhtml#Fig3).


    ![](images/606708_1_En_3_Chapter/606708_1_En_3_Fig3_HTML.png)

    A table lists the books and their respective authors. It represents the inner
    join.

    Figure 3-3

    An Inner Join


    You’ll notice that the join doesn’t include unmatched books or authors.

    The second and third options are `LEFT OUTER JOIN` or `RIGHT OUTER JOIN`, depending
    on whether the unmatched rows are on the left or the right; again, we can simply
    write `LEFT JOIN` or `RIGHT JOIN`. In this case, a `LEFT JOIN` would include unmatched
    books, as in Figure [3-4](#606708_1_En_3_Chapter.xhtml#Fig4).


    ![](images/606708_1_En_3_Chapter/606708_1_En_3_Fig4_HTML.png)

    Two tables list the books and their authors, representing an outer join.

    Figure 3-4

    An Outer Join


    Most DBMSs (not including SQLite or MySQL/MariaDB) have a fourth option: include
    all of the unmatched parents and children. That’s called a `FULL OUTER JOIN` or
    `FULL JOIN` to its friends. This would include unmatched rows from both sides
    as in Figure [3-5](#606708_1_En_3_Chapter.xhtml#Fig5).


    ![](images/606708_1_En_3_Chapter/606708_1_En_3_Fig5_HTML.jpg)

    Two tables list the books and their authors, representing a full join.

    Figure 3-5

    A Full Join


    In this case, we went for the `LEFT JOIN` because the child table was on the left,
    and we wanted all of them with or without matches.

    Despite the apparent symmetry, all joins are not equal. When you join a child
    to a parent table, the number of results will generally reflect the child table.
    That’s because many of the children would share the same parent.

    To get a fair estimate of how many results you might expect, therefore, you should
    start by counting the rows.

    To get the number of results in an `INNER JOIN`, you’ll need to count the number
    of children which match a parent—that is, where the foreign key is `NOT NULL`:


    ```

    --  Child Inner Join

    SELECT count(*) FROM books WHERE authorid IS NOT NULL;

    ```


    That should get you the number of rows for the `INNER JOIN` previously:


    | `Count` |

    | 1172 |


    To count the number of unmatched child rows, you just need to count the ones where
    the foreign key is `NULL`:


    ```

    --  Unmatched Children

    SELECT count(*) FROM books WHERE authorid IS NULL;

    ```


    That will give you the number of rows missing in the `INNER JOIN`:


    | `Count` |

    | 29 |


    If you add this to the number for the `INNER JOIN`, you’ll get the total number
    of books, which is the number of rows in the child `OUTER JOIN` earlier.

    To get the number of unmatched parent rows is trickier. You’ll need to count the
    number of rows in the parent table whose primary key is *not* one of the foreign
    keys in the child table:


    ```

    --  Unmatched Parents

    SELECT count(*) FROM authors

    WHERE id NOT IN(SELECT authorid FROM books WHERE authorid IS NOT NULL);

    ```


    This will give you the number of unmatched parents:


    | `Count` |

    | 45 |'
  raw: '## One-to-Many Relationship


    This is the most common type of relationship between two tables. The relationship
    is between the primary key of one table and a foreign key in another. However,
    it’s actually implemented as a reference from a foreign key to the primary key.


    The relationship is used to indicate a number of possible scenarios. For example:


    *   One Author has written many Books.


    *   One Customer has many Sales.


    *   One Sale contains many Items.


    Note that the use of the word *many* can imply any number from 0 to ∞.


    In the preceding cases, one table is referred to as the **one** table, while the
    other is referred to as the **many** table, which is not very informative. Sometimes,
    it is helpful to think of the one table as the **parent** table, while the many
    table is the **child** table.


    A one-to-many relationship is implemented as a reference from the child table
    to the parent table, for example, for books and authors:


    ```

    CREATE TABLE authors (          --  Parent Table (One)

    id INT PRIMARY KEY

    --  other columns

    );

    CREATE TABLE books (            --  Child Table (Many)

    id INT PRIMARY KEY,

    bookid INT REFERENCES parent(id)

    --  other columns

    );

    ```


    Visually, it looks like Figure [3-1](#606708_1_En_3_Chapter.xhtml#Fig1).


    ![](images/606708_1_En_3_Chapter/606708_1_En_3_Fig1_HTML.jpg)


    Two blocks, such as books and authors, illustrate the one-to-many join. The author
    i d F K in books is linked to the author i d P K.


    Figure 3-1


    One-to-Many Join


    Note that while the child table has a reference to the parent table, the parent
    table does *not* have a reference to the child table.


    You can combine parent and child tables using a `JOIN`:


    ```

    --  Not Oracle

    SELECT

    b.id, b.title,      --  etc

    a.givenname, a.familyname   --  etc

    FROM books AS b JOIN authors AS a ON b.authorid=a.id;

    --  Oracle: No AS in table aliases

    SELECT

    b.id, b.title,       --  etc

    a.givenname, a.familyname   --  etc

    FROM books b JOIN authors a ON b.authorid=a.id;

    ```


    This will give you the books with their matching authors:


    | id | title | givenname | familyname |

    | --- | --- | --- | --- |

    | 2078 | The Duel | Heinrich | von Kleist |

    | 503 | Uncle Silas | J. | Le Fanu |

    | 2007 | North and South | Elizabeth | Gaskell |

    | 702 | Jane Eyre | Charlotte | Brontë |

    | 1530 | Robin Hood, The Prince of ... | Alexandre | Dumas |

    | 1759 | La Curée | Émile | Zola |

    | ~ 1172 rows ~ |


    Note that Oracle has a quirk which disallows using `AS` for table aliases. If
    you’re using Oracle, you’ll need to remember that in the following examples which
    may include `AS`.


    Remember, if there are anonymous books (books with a `NULL` for `authorid`), you
    will need an outer join:


    ```

    --  Not Oracle

    SELECT

    b.id, b.title,       --  etc

    a.givenname, a.familyname   --  etc

    FROM books AS b LEFT JOIN authors AS a ON b.authorid=a.id;

    --  Oracle: Remember no AS in table aliases

    SELECT

    b.id, b.title,       --  etc

    a.givenname, a.familyname   --  etc

    FROM books b LEFT JOIN authors a ON b.authorid=a.id;

    ```


    This will give you all of the books with or without their authors:


    | **id** | **Title** | **givenname** | **familyname** |

    | --- | --- | --- | --- |

    | 1868 | The Tenant of Wildfell Hall | Anne | Brontë |

    | 661 | The Narrative of Arthur Gordon Pym ... | Edgar | Poe |

    | 91 | My Bondage and My Freedom | Frederick | Douglass |

    | 848 | The Charterhouse of Parma | [NULL] | Stendhal |

    | 440 | The Princess and the Goblin | George | MacDonald |

    | 881 | Against Nature | Joris-Karl | Huysmans |

    | ~ 1201 rows ~ |


    The one-to-many relationship is the most common relationship between tables.


    Remember that SQLite doesn’t support `RIGHT JOIN`s. If you want an outer join,
    you need to put the unmatched row table on the left and make sure to use `LEFT
    JOIN`.


    ### Counting One-to-Many Joins


    When you’re not quite sure how the database is set up, and you’re not quite sure
    whether you’ve properly joined the right columns to the matching columns, it might
    be helpful to estimate the number of results you should get from a join.


    To get an idea of where we’re headed, suppose we have simplified tables of books
    and authors as in Figure [3-2](#606708_1_En_3_Chapter.xhtml#Fig2).


    ![](images/606708_1_En_3_Chapter/606708_1_En_3_Fig2_HTML.jpg)


    Two tables, books, and authors demonstrate the counting of one-to-many joins.
    Two books by Jane Austen, Lewis Carroll, and Mark Twain.


    Figure 3-2


    Books and Authors


    In the previous example, we opted for a `LEFT JOIN`. When you join a child table
    to a parent table, you generally have four options:


    *   Only the matching rows


    *   Include all of the unmatched children


    *   Include all of the unmatched parents


    *   Include all of the unmatched children *and* parents


    The first option is, of course, an `INNER JOIN`, or, more simply, `JOIN`.


    The result would look like Figure [3-3](#606708_1_En_3_Chapter.xhtml#Fig3).


    ![](images/606708_1_En_3_Chapter/606708_1_En_3_Fig3_HTML.png)


    A table lists the books and their respective authors. It represents the inner
    join.


    Figure 3-3


    An Inner Join


    You’ll notice that the join doesn’t include unmatched books or authors.


    The second and third options are `LEFT OUTER JOIN` or `RIGHT OUTER JOIN`, depending
    on whether the unmatched rows are on the left or the right; again, we can simply
    write `LEFT JOIN` or `RIGHT JOIN`. In this case, a `LEFT JOIN` would include unmatched
    books, as in Figure [3-4](#606708_1_En_3_Chapter.xhtml#Fig4).


    ![](images/606708_1_En_3_Chapter/606708_1_En_3_Fig4_HTML.png)


    Two tables list the books and their authors, representing an outer join.


    Figure 3-4


    An Outer Join


    Most DBMSs (not including SQLite or MySQL/MariaDB) have a fourth option: include
    all of the unmatched parents and children. That’s called a `FULL OUTER JOIN` or
    `FULL JOIN` to its friends. This would include unmatched rows from both sides
    as in Figure [3-5](#606708_1_En_3_Chapter.xhtml#Fig5).


    ![](images/606708_1_En_3_Chapter/606708_1_En_3_Fig5_HTML.jpg)


    Two tables list the books and their authors, representing a full join.


    Figure 3-5


    A Full Join


    In this case, we went for the `LEFT JOIN` because the child table was on the left,
    and we wanted all of them with or without matches.


    Despite the apparent symmetry, all joins are not equal. When you join a child
    to a parent table, the number of results will generally reflect the child table.
    That’s because many of the children would share the same parent.


    To get a fair estimate of how many results you might expect, therefore, you should
    start by counting the rows.


    To get the number of results in an `INNER JOIN`, you’ll need to count the number
    of children which match a parent—that is, where the foreign key is `NOT NULL`:


    ```

    --  Child Inner Join

    SELECT count(*) FROM books WHERE authorid IS NOT NULL;

    ```


    That should get you the number of rows for the `INNER JOIN` previously:


    | **Count** |

    | 1172 |


    To count the number of unmatched child rows, you just need to count the ones where
    the foreign key is `NULL`:


    ```

    --  Unmatched Children

    SELECT count(*) FROM books WHERE authorid IS NULL;

    ```


    That will give you the number of rows missing in the `INNER JOIN`:


    | **Count** |

    | 29 |


    If you add this to the number for the `INNER JOIN`, you’ll get the total number
    of books, which is the number of rows in the child `OUTER JOIN` earlier.


    To get the number of unmatched parent rows is trickier. You’ll need to count the
    number of rows in the parent table whose primary key is *not* one of the foreign
    keys in the child table:


    ```

    --  Unmatched Parents

    SELECT count(*) FROM authors

    WHERE id NOT IN(SELECT authorid FROM books WHERE authorid IS NOT NULL);

    ```


    This will give you the number of unmatched parents:


    | **Count** |

    | 45 |'
  trans: '

    ## 一对多关系


    这是两个表之间最常见的一种关系类型。这种关系存在于一张表的主键与另一张表的外键之间。但实际上，它是通过从外键到主键的引用来实现的。


    这种关系用于描述许多可能的情景。例如：


    *   一位作者（Author）写了多本书（Book）。

    *   一位客户（Customer）有多笔销售（Sale）。

    *   一笔销售（Sale）包含多个商品项（Item）。


    请注意，*许多*一词可以表示从 0 到∞的任何数量。

    在上述情况中，一张表被称为 **一** 表，而另一张表被称为 **多** 表，但这种命名方式信息量有限。有时，将 **一** 表视为 **父** 表，将 **多**
    表视为 **子** 表，会更易于理解。


    一对多关系是通过从子表到父表的引用来实现的，例如，对于书籍和作者表：


    ```

    CREATE TABLE authors (          --  父表 (一)

    id INT PRIMARY KEY

    --  其他列

    );

    CREATE TABLE books (            --  子表 (多)

    id INT PRIMARY KEY,

    bookid INT REFERENCES parent(id)

    --  其他列

    );

    ```


    从视觉上看，它类似于图 3-1。


    ![](img/606708_1_En_3_Fig1_HTML.jpg)

    两个方块，例如书籍和作者，说明了一对多连接。`books`表中的`authorid`外键（FK）链接到`authors`表中的`authorid`主键（PK）。

    图 3-1

    一对多连接


    请注意，虽然子表持有对父表的引用，但父表并*不*持有对子表的引用。


    你可以使用`JOIN`来合并父表和子表：


    ```

    --  非 Oracle 语法

    SELECT

    b.id, b.title,      --  等

    a.givenname, a.familyname   --  等

    FROM books AS b JOIN authors AS a ON b.authorid=a.id;

    --  Oracle 语法：表别名中不使用 AS

    SELECT

    b.id, b.title,       --  等

    a.givenname, a.familyname   --  等

    FROM books b JOIN authors a ON b.authorid=a.id;

    ```


    这将为你提供书籍及其匹配的作者：


    | `id` | `title` | `givenname` | `familyname` |

    | --- | --- | --- | --- |

    | 2078 | The Duel | Heinrich | von Kleist |

    | 503 | Uncle Silas | J. | Le Fanu |

    | 2007 | North and South | Elizabeth | Gaskell |

    | 702 | Jane Eyre | Charlotte | Brontë |

    | 1530 | Robin Hood, The Prince of ... | Alexandre | Dumas |

    | 1759 | La Curée | Émile | Zola |

    | ~ 1172 行 ~ |


    请注意 Oracle 有一个怪癖，不允许在表别名中使用 `AS`。如果你使用 Oracle，需要记住这一点，因为在后续包含 `AS` 的示例中需要注意。


    记住，如果有匿名书籍（即 `authorid` 为 `NULL` 的书籍），你将需要一个外连接：


    ```

    --  非 Oracle 语法

    SELECT

    b.id, b.title,       --  等

    a.givenname, a.familyname   --  等

    FROM books AS b LEFT JOIN authors AS a ON b.authorid=a.id;

    --  Oracle 语法：记住表别名中不使用 AS

    SELECT

    b.id, b.title,       --  等

    a.givenname, a.familyname   --  等

    FROM books b LEFT JOIN authors a ON b.authorid=a.id;

    ```


    这将为你提供所有书籍，无论它们是否有匹配的作者：


    | `id` | `title` | `givenname` | `familyname` |

    | --- | --- | --- | --- |

    | 1868 | The Tenant of Wildfell Hall | Anne | Brontë |

    | 661 | The Narrative of Arthur Gordon Pym ... | Edgar | Poe |

    | 91 | My Bondage and My Freedom | Frederick | Douglass |

    | 848 | The Charterhouse of Parma | [NULL] | Stendhal |

    | 440 | The Princess and the Goblin | George | MacDonald |

    | 881 | Against Nature | Joris-Karl | Huysmans |

    | ~ 1201 行 ~ |


    一对多关系是表之间最常见的关系。


    请记住 SQLite 不支持 `RIGHT JOIN`。如果你想要一个外连接，你需要将未匹配行所在的表放在左边，并确保使用 `LEFT JOIN`。


    ### 计算一对多连接的结果数


    当你不太确定数据库是如何设置的，也不确定是否将正确的列连接到了匹配的列时，估算连接应该产生的结果数量可能会有所帮助。


    为了对我们的目标有个概念，假设我们有一个简化的书籍和作者表，如图 3-2 所示。


    ![](img/606708_1_En_3_Fig2_HTML.jpg)

    两个表，books 和 authors，演示了一对多连接的计数。包括简·奥斯汀、刘易斯·卡罗尔和马克·吐温的两本书。

    图 3-2

    书籍和作者


    在前面的例子中，我们选择了 `LEFT JOIN`。当你将子表连接到父表时，通常有四种选择：


    *   只返回匹配的行

    *   包含所有未匹配的子行

    *   包含所有未匹配的父行

    *   包含所有未匹配的子行*和*父行


    第一种选择当然是 `INNER JOIN`，或者更简单地称为 `JOIN`。

    结果将如图 3-3 所示。


    ![](img/606708_1_En_3_Fig3_HTML.png)

    一个表格列出了书籍及其对应的作者。这代表了内连接。

    图 3-3

    一个内连接


    你会注意到，该连接不包含未匹配的书籍或作者。


    第二和第三种选项是 `LEFT OUTER JOIN` 或 `RIGHT OUTER JOIN`，取决于未匹配行是在左侧还是右侧；同样，我们可以简单地写作
    `LEFT JOIN` 或 `RIGHT JOIN`。在这种情况下，`LEFT JOIN` 会包含未匹配的书籍，如图 3-4 所示。


    ![](img/606708_1_En_3_Fig4_HTML.png)

    两个表格列出了书籍及其作者，代表了一个外连接。

    图 3-4

    一个外连接


    大多数 DBMS（不包括 SQLite 或 MySQL/MariaDB）有第四种选项：包含所有未匹配的父行和子行。这被称为 `FULL OUTER JOIN`，或者亲切地称为
    `FULL JOIN`。这将包含来自两侧的未匹配行，如图 3-5 所示。


    ![](img/606708_1_En_3_Fig5_HTML.jpg)

    两个表格列出了书籍及其作者，代表了一个全连接。

    图 3-5

    一个全连接


    在这种情况下，我们选择了 `LEFT JOIN`，因为子表在左边，我们希望包含所有子表记录，无论是否匹配。


    尽管表面上看起来对称，但所有连接并不都是等价的。当你将子表连接到父表时，结果的数量通常反映子表的情况。这是因为许多子行可能共享同一个父行。


    因此，为了对可能得到的结果数量有一个合理的估计，你应该从计数开始。


    要获得 `INNER JOIN` 的结果数，你需要统计匹配到父行的子行数量——即外键为 `NOT NULL` 的那些：


    ```

    --  子表内连接计数

    SELECT count(*) FROM books WHERE authorid IS NOT NULL;

    ```


    这应该会得到前面 `INNER JOIN` 的行数：


    | `Count` |

    | 1172 |


    要统计未匹配的子行数量，你只需要统计那些外键为 `NULL` 的行：


    ```

    --  未匹配的子行

    SELECT count(*) FROM books WHERE authorid IS NULL;

    ```


    这将给出在 `INNER JOIN` 中缺失的行数：


    | `Count` |

    | 29 |


    如果你将这个数字加到 `INNER JOIN` 的数字上，就会得到书籍的总数，也就是之前 `OUTER JOIN`（子表）中的行数。


    要获得未匹配的父行数量则更棘手一些。你需要统计父表中，其主键*不*在子表的外键列表中的行数：


    ```

    --  未匹配的父行

    SELECT count(*) FROM authors

    WHERE id NOT IN(SELECT authorid FROM books WHERE authorid IS NOT NULL);

    ```


    这将给出未匹配的父行数：


    | `Count` |

    | 45 |

    '
- fmt: 'The subquery selects for the authors whose `id` does make an appearance in
    the `books` table. The `NOT IN` expression selects for the others. The reason
    that the subquery includes the `WHERE authorid IS NOT NULL` clause is due to a
    quirk in the behavior of `NOT IN` with `NULL`s. This is explained later.


    Now, you have all the numbers you need to estimate the number of rows in your
    join. You can use the following combinations:


    | `JOIN` | `Calculation` |

    | --- | --- |

    | `INNER JOIN` | `INNER JOIN` |

    | Child `OUTER JOIN` | `INNER JOIN` + Unmatched Children= Children |

    | Parent `OUTER JOIN` | `INNER JOIN` + Unmatched Parents |

    | Full `OUTER JOIN` | `INNER JOIN` + Unmatched Children + Unmatched Parents |


    That’s the number of rows you can expect from a child outer join: `LEFT JOIN`
    or `RIGHT JOIN`, depending on where you put the child table.


    Of course, that’s not necessarily the end of it. If you have an inner join, and
    there are some `NULL` foreign keys, then you’ll end up with fewer than the estimate.
    If you opt for a parent outer join, then there’ll be more rows if you have parents
    without matching children.


    However, this is a good starting point.


    ### The NOT IN Quirk


    You’d think that if `IN(...)` finds the rows which match something, then `NOT
    IN(...)` would find the others. That’s mostly true, except when the list contains
    a `NULL`.


    For example, to find the customers in two of the states, you can use


    ```sql

    SELECT * FROM customerdetails

    WHERE state IN (''VIC'',''QLD'');

    ```


    To find customers in the other states, you can use `NOT IN`:


    ```sql

    SELECT * FROM customerdetails

    WHERE state NOT IN (''VIC'',''QLD'');

    ```


    That’s as expected. However, if you include `NULL` in your list, things get messy.
    You need to remember how `IN(...)` is interpreted. For example:


    ```sql

    SELECT * FROM customerdetails

    WHERE state IN (''VIC'',''QLD'',NULL);

    ```


    is equivalent to


    ```sql

    SELECT * FROM customerdetails

    WHERE state=''VIC'' OR state=''QLD'' OR state=NULL;

    ```


    That last term `state=NULL` will always fail, since `NULL` *always* fails a comparison,
    but that’s OK if it matches one of the others.


    However, the `NOT IN` version:


    ```sql

    SELECT * FROM customerdetails

    WHERE state NOT IN (''VIC'',''QLD'',NULL);

    ```


    is equivalent to


    ```sql

    SELECT * FROM customerdetails

    WHERE state<>''VIC'' AND state<>''QLD'' AND state<>NULL;

    ```


    When you negate a logical expression, you not only negate the individual terms,
    but you also negate the operators between them.


    Once again, the term `state<>NULL` always fails, but, since this is now `AND`ed
    with the rest, it fails the whole expression.


    The moral of this story is that you can’t use `NOT IN` if the list contains `NULL`s.


    ### Creating a Books and Authors View


    As a general rule, if you’ve done something a little complicated, you don’t want
    to do it again. Joining the `books` and `authors` table isn’t so complicated,
    but it’s still worth considering a simpler approach.


    A `SELECT` statement can be saved permanently in the database as a `View`. A `View`
    is just a saved query. Although you can use it like a table, it doesn’t actually
    save data, so it’s cheap.


    There is also something called a `materialized view` which does save the results,
    but it’s not meant to be a permanent store of new data. A materialized view can
    be useful when your view is fairly complex and you have a lot of processing to
    do with the results; it doesn’t have to recalculate the results every time.


    To create a view, you use `CREATE VIEW`:


    ```sql

    --  Drop old version (Not Oracle)

    DROP VIEW IF EXISTS bookdetails;

    --  Drop old version (Oracle)

    DROP VIEW bookdetails;

    --  (Re) create view

    CREATE VIEW bookdetails AS

    SELECT

    b.id, b.title, b.published, b.price,

    a.givenname, a.othernames, a.familyname,

    a.born, a.died, a.gender, a.home

    FROM

    books AS b

    LEFT JOIN authors AS a ON b.authorid=a.id

    ;

    ```


    You can drop an existing view using `DROP VIEW`. For most `DBMS`s, you can use
    `DROP VIEW IF EXISTS` if you’re not sure that it exists (yet). Not with Oracle,
    however.


    Microsoft SQL has an additional quirk: `CREATE VIEW` must be the only statement
    in its batch, so you need to put the statement between the `GO` keyword, which
    marks the end of one batch and the beginning of another:


    ```sql

    DROP VIEW IF EXISTS bookdetails;

    --  MSSQL Only:

    GO

    CREATE VIEW bookdetails AS

    SELECT

    b.id, b.title, b.published, b.price,

    b.authorid, a.givenname, a.othernames, a.familyname,

    a.born, a.died, a.gender, a.home

    FROM

    books AS b

    LEFT JOIN authors AS a ON b.authorid=a.id

    ;

    GO

    ```


    We’ve included the `authorid` in case you want to use it to get more author details.


    Once you have saved a view, you can pretend it’s another table:


    ```sql

    SELECT * FROM bookdetails;

    ```


    You’ll get the same results as before with a little less effort.


    ### One-to-One Relationships


    A one-to-one relationship associates a single row of one table with a single row
    of another. It is normally between two primary keys.


    If every row in one table is associated with a row in another table, then you
    can consider the second table as an extension of the first table. If that’s the
    case, why not just put all of the columns in the same table? Reasons include the
    following:


    *   You want to add more details, but you don’t want to change the original table.

    *   You want to add more details, but you *can’t* change the original table (possibly
    because of permissions).

    *   The additional table contains details that may be optional: not all rows in
    the original table require the additional columns.

    *   You want to keep some of the details in a separate table so that you can add
    another layer of security to the additional details.'
