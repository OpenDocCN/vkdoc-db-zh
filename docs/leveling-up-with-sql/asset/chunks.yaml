    | **id** | **givenname** | **familyname** | **sid** | **supervisors** | **n**
    |

    | --- | --- | --- | --- | --- | --- |

    | 1 | Marmaduke | Mayhem | 10 | Beryl Bubbles < Mildred Thisenth ... < | 3 |

