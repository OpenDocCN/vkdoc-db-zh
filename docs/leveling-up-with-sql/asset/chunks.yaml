  trans: "\n# 字符串函数\n\n对字符串进行其他操作需要使用函数。以下是一些示例。\n\n在接下来的示例中，我们包含了 `SELECT *` 以提供上下文——不过，在\
    \ Oracle 中，如果你将其与其他数据混合使用，则需要编写 `SELECT table.*`，因此我们在所有包含 Oracle 的示例中都这样做了。\n\
    \n字符串的长度就是其中的字符数。要查找长度，你可以使用：\n\n```sql\n--  PostgreSQL, MySQL/MariaDB, SQLite,\
    \ Oracle\nSELECT customers.*, length(familyname) AS len\nFROM customers;\n-- \
    \ MSSQL\nSELECT *, len(familyname) AS len FROM customers;\n```\n\n要查找字符串中某一部分的位置，你可以使用以下方法：\n\
    \n```sql\n--  MySQL/MariaDB, SQLite, Oracle: INSTR('values',value)\nSELECT books.*,\
    \ instr(title,' ') AS space FROM books;\n--  PostgreSQL: POSITION(value IN 'values')\n\
    SELECT *, position(' ' in title) AS space FROM books;\n--  MSSQL: CHARINDEX(value,\
    \ 'values')\nSELECT *, charindex(' ',title) AS space FROM books;\n```\n\n你可以使用\
    \ `replace` 来替换字符串中的子字符串：\n\n```sql\n--  replace(original,search,replace)\nSELECT\
    \ books.*, replace(title,' ','-') AS hyphens\nFROM books;\n```\n\n要切换大小写，有以下函数：\n\
    \n```sql\n--  PostgreSQL, MySQL/MariaDB, SQLite, Oracle, MSSQL\nSELECT\n  books.*,\n\
    \  upper(title) AS upper,\n  lower(title) AS lower\nFROM books;\n--  PostgreSQL,\
    \ Oracle\nSELECT books.*, initcap(title) AS lower FROM books;\n```\n\n要删除字符串开头或结尾的多余空格，你可以使用\
    \ `trim()` 从两端删除，或者使用 `ltrim()` 或 `rtrim()` 分别从字符串的开头或结尾删除：\n\n```sql\nWITH vars\
    \ AS (\n  SELECT ' abcdefghijklmnop ' AS string\n  --  FROM dual   --  Oracle\n\
    )\nSELECT\n  string,\n  ltrim(string) AS ltrim,\n  rtrim(string) AS rtrim,\n \
    \ trim(string) AS trim,\n  ltrim(rtrim(string)) AS same\nFROM vars;\n```\n\n所有现代数据库管理系统都支持\
    \ `trim()`，但 MSSQL 在 2017 版本之前并不支持。PostgreSQL 也称之为 `btrim()`。你可能不会注意到右侧的空格被修剪掉了。\n\
    \n你可以根据所使用的数据库管理系统，使用 `substring()` 或 `substr()` 来获取子字符串：\n\n```sql\nWITH vars\
    \ AS (\n  SELECT 'abcdefghijklmnop' AS string\n  FROM dual   --  Oracle\n)\nSELECT\n\
    \  --  PostgreSQL, MariaDB/MySQL, Oracle, SQLite\n  substr(string,3,5) AS substr,\n\
    \  --  PostgreSQL, MariaDB/MySQL, MSSQL, SQLite\n  substring('abcdefghijklmnop',3,5)\
    \ AS substring\nFROM vars;\n```\n\n一些数据库管理系统包含专门用于获取字符串开头或结尾部分的函数。在某些情况下，你可以使用负的起始位置来获取字符串的末尾部分：\n\
    \n```sql\nWITH vars AS (\n  SELECT 'abcdefghijklmnop' AS string\n  FROM dual \
    \  --  Oracle\n)\nSELECT\n  --  左侧\n  --  PostgreSQL, MariaDB/MySQL, MSSQL:\n\
    \  left('abcdefghijklmnop',4) AS lstring\n  --  包括 SQLITE 和 Oracle 在内的所有数据库管理系统:\n\
    \  --  substr(string,1,n) AS lstring,\n  --  右侧\n  --  PostgreSQL, MariaDB/MySQL,\
    \ MSSQL:\n  right('abcdefghijklmnop',4) AS rstring\n  --  MariaDB/MySQL, Oracle,\
    \ SQLite\n  --  substr('abcdefghijklmnop',-4) AS rstring\nFROM vars;\n```\n\n\
    请注意，如果你花费大量时间从数据中提取子字符串，这可能意味着你试图在一个值中存储过多信息。\n\n另一方面，你通常可以使用子字符串将原始数据重新格式化为更友好的形式。\n\
    \n## 日期操作\n\n从 SQL 的角度来看，日期是有问题的。这是因为，尽管日期在日常生活中无处不在，但日期的计量却相当混乱。\n\n一个问题是我们同时使用多种不兼容的周期来计量日期：日、周、月和年。更糟糕的是，我们生活在不同的时区，所以我们甚至无法就当前时间达成一致。\n\
    \n大多数数据库管理系统都有许多相关的数据类型来管理日期，特别是用于包含时间的日期的 `date`，以及包含时间的 `datetime`。通常，你可以预期这些类型的变体，以及包含时区的能力。\n\
    \nSQLite 是一个例外，它期望你使用数字或字符串，并通过一些函数来处理这些值以进行日期运算。\n\n对于日期和时间，你通常希望进行以下操作：\n\n\
    1.  输入并存储日期/时间\n2.  获取当前日期/时间\n3.  按日期/时间分组和排序\n4.  提取日期/时间的组成部分\n5.  对日期/时间进行加减\n\
    6.  计算两个日期/时间之间的差值\n7.  格式化日期/时间\n\nSQLite 处理日期的方法完全不同。这部分是因为它实际上不支持日期类型。因此，在接下来的大部分讨论中，SQLite\
    \ 将不会涉及。附录中有关于在 SQLite 中处理日期的信息。\n\n### 输入和存储日期/时间\n\n由于大多数数据库管理系统有自己的存储日期/时间的方式，因此日期存储的具体细节并不重要。重要的是你能够输入数据。\n\
    \n在表中，日期或日期时间列通常定义如下：\n\n| **数据库管理系统** | **日期** | **带时间的日期** |\n| --- | --- |\
    \ --- |\n| PostgreSQL | `DATE` | `TIMESTAMP` |\n| MariaDB/MySQL | `DATE` | `DATETIME`\
    \ |\n| MSSQL | `DATE` | `DATETIME2` |\n| Oracle | `DATE` | `DATETIME` |\n| SQLite\
    \ | `TEXT` | `TEXT` |\n\n输入 `date` 或 `datetime` 字面常量的通常方法是使用以下格式之一：\n\n*   `date`:\
    \ `'2013-02-15'`\n*   `datetime`: `'2013-02-15 09:20:00'`\n\n你也可以省略秒数或包含秒的小数部分。\n\
    \n该格式是 `ISO8601` 格式的变体。在纯 `ISO8601` 格式中，时间会写在 `T` 之后而不是空格之后。\n\n请注意，在 Oracle 中，日期时间字面常量通常使用不同的格式。要使用前面的格式，需要分别在字面常量前加上\
    \ `date` 或 `datetime`：\n\n*   `date`: `date '2013-02-15'`\n*   `datetime`: `datetime\
    \ '2013-02-15 09:20:00'`\n\n在 PostgreSQL、MSSQL 和 MySQL/MariaDB 中，你通常也可以输入另一种可读的日期格式，例如\
    \ `'15 Feb 2013'`。但是，你*绝不*应该使用在国际上有不同含义的格式 `'2/3/2013'`。\n\n实际上，坚持使用标准格式即可：\n\n\
    ```sql\nSELECT *\nFROM customers\nWHERE dob<'1980-01-01'; --  Oracle dob<date\
    \ '1980-01-01';\n```\n\n这会给你较年长的客户：\n\n| **id** | **givenname** | **familyname**\
    \ | **…** | **dob** | **…** |\n| --- | --- | --- | --- | --- | --- |\n| 459 |\
    \ Rick | Shaw | … | 1945-07-03 | … |\n| 352 | Basil | Isk | … | 1960-01-13 | …\
    \ |\n| 92 | Nan | Keen | … | 1943-05-18 | … |\n| 267 | Boris | Todeath | … | 1969-10-06\
    \ | … |\n| 91 | June | North | … | 1967-03-22 | … |\n| 543 | Nat | Ering | … |\
    \ 1946-04-30 | … |\n| ~ 133 行 ~ |\n\n请注意，在像 `dob<'1980-01-01'` 这样的简单表达式中，SQL 不会混淆表达式是日期还是字符串：上下文已经很清楚了。\n\
    \n### 获取当前日期/时间\n\n有一件事你会想做，就是将某个日期/时间与现在进行比较。在大多数数据库管理系统中，你可以使用：\n\n```sql\n\
    SELECT\n  current_timestamp AS now,\n  current_date AS today       --  非 MSSQL\n\
    \  --  FROM dual   --  Oracle\n;\n```\n\n注意\n\n*   MSSQL 也有 `getdate()` 作为 `current_timestamp`\
    \ 的同义词。尽管名称如此，它返回的不只是日期。\n*   MariaDB/MySQL 也有 `now()` 作为 `current_timestamp`\
    \ 的同义词。\n*   Oracle 还有 `systemtimestamp` 和 `systemdate` 用于获取数据库服务器而非客户端上的日期/时间。\n\
    \n如前所述，MSSQL 没有 `current_date` 的版本。无论如何，你可能已有一个现有的 `datetime`，希望将其简化为 `date`。最简单的方法是\
    \ `cast` 该 `datetime`：\n\n```sql\n--  非 Oracle\nSELECT\n  current_timestamp AS\
    \ now,\n  cast(current_timestamp as date) AS today\n  --  FROM dual   --  Oracle\n\
    ;\n```\n\n这对于 Oracle 不太适用；它确实允许你进行转换，但没有任何效果。相反，你应该使用 `trunc()` 函数：\n\n```sql\n\
    --  Oracle\nSELECT\n  current_timestamp AS now,\n  trunc(current_timestamp) AS\
    \ today\nFROM dual   --  Oracle\n;\n```\n\n这仍然会包含时间部分，但它会被设置为 `00:00`。\n"
- fmt: "## 按日期/时间分组和排序\n\n您可以像对其他任何数据类型一样，按日期/时间进行排序。结果将按历史顺序排列：\n\n```sql\nSELECT\
    \ *\nFROM sales\nORDER BY ordered;\n```\n\n当然，您也可以使用 `DESC`。\n\n您也可以按 `date` 分组，但您可能不想按\
    \ `datetime` 分组，除非您每秒有大量交易。对于 `datetime`，您可以使用公用表表达式（CTE）将其转换为 `date`，然后再对结果进行分组。例如：\n\
    \n```sql\nWITH cte AS (\n  SELECT\n    cast(ordered as date) AS ordered, total\
    \  --  Not Oracle\n--  trunc(ordered) AS ordered, total     --  Oracle\n  FROM\
    \ sales\n)\nSELECT ordered, sum(total)\nFROM cte\nGROUP BY ordered\nORDER BY ordered;\n\
    ```\n\n这将为您生成以下摘要：\n\n| ordered | sum |\n| --- | --- |\n| 2022-05-04 | 43.00 |\n\
    | 2022-05-05 | 150.50 |\n| 2022-05-06 | 110.50 |\n| 2022-05-07 | 142.00 |\n| 2022-05-08\
    \ | 214.50 |\n| 2022-05-09 | 16.50 |\n| ~ 389 rows ~ |\n\n请记住，在 Oracle 中您需要使用\
    \ `trunc()` 函数。\n\n## 提取日期/时间的部分\n\n从技术上讲，`datetime` 代表一个时间点。实际上，我们倾向于从天和年等组成部分来思考。这种情况因以下事实而变得复杂：(a)\
    \ 各组成部分不同步，并且 (b) 其中一些组成部分的大小会变化。\n\n### 在 PostgreSQL、MariaDB/MySQL 和 Oracle 中提取日期\n\
    \n提取日期部分的标准方法是使用 `extract()` 函数。其形式如下：\n\n```sql\nextract(part from datetime)\n\
    ```\n\n您可以看到 `extract()` 函数的实际应用：\n\n```sql\nWITH chelyabinsk AS (\n  SELECT\n\
    \    timestamp '2013-02-15 09:20:00' AS datetime\n  FROM dual\n)\nSELECT\n  datetime,\n\
    \  EXTRACT(year FROM datetime) AS year,\n  EXTRACT(month FROM datetime) AS month,\n\
    \  EXTRACT(day FROM datetime) AS day,\n--  not Oracle or MariaDB/MySQL:\n  EXTRACT(dow\
    \ FROM datetime) AS weekday,\n  EXTRACT(hour FROM datetime) AS hour,\n  EXTRACT(minute\
    \ FROM datetime) AS minute,\n  EXTRACT(second FROM datetime) AS second\nFROM chelyabinsk;\n\
    ```\n\n您将得到以下组成部分：\n\n| datetime | year | month | day | weekday | hour | minute\
    \ | second |\n| --- | --- | --- | --- | --- | --- | --- | --- |\n| 2013-02-15\
    \ 09:20:00 | 2013 | 2 | 15 | 5 | 9 | 20 | 0 |\n\n请注意，Oracle 和 MariaDB/MySQL 没有直接提取星期几的方法，这可能是个问题，例如，如果您想用它进行分组。但是，正如您稍后将看到的，您可以使用格式化函数来获取星期几以及前面的值。\n\
    \nPostgreSQL 还包含一个名为 `date_part('part',datetime)` 的函数，作为前述函数的替代方法。\n\n### 在 Microsoft\
    \ SQL 中提取日期\n\nMicrosoft SQL 有两个主要函数来提取日期部分：\n\n*   `datepart(part,datetime)`\
    \ 将日期/时间的部分提取为**数字**。\n*   `datename(part,datetime)` 将日期/时间的部分提取为**字符串**。对于大多数部分，例如年份，它只是\
    \ `datepart` 数字的字符串版本。然而，对于星期几和月份，它实际上是人类友好的名称。\n\n您可以看到这两个函数的实际应用：\n\n```sql\n\
    WITH chelyabinsk AS (\n  SELECT cast('2013-02-15 09:20' as datetime) AS datetime\n\
    )\nSELECT\n  datepart(year, datetime) AS year,    --  aka year()\n  datename(year,\
    \ datetime) AS yearstring,\n  datepart(month, datetime) AS month,  --  aka month()\n\
    \  datename(month, datetime) AS monthname,\n  datepart(day, datetime) AS day,\
    \      --  aka day()\n  datepart(weekday, datetime) AS weekday, --  Sunday=1\n\
    \  datename(weekday, datetime) AS weekdayname,\n  datepart(hour, datetime) AS\
    \ hour,\n  datepart(minute, datetime) AS minute,\n  datepart(second, datetime)\
    \ AS second\nFROM chelyabinsk;\n```\n\n注意\n\n*   `datename(date,year)` 只给出 `2013`\
    \ 的字符串版本。\n*   有三个短函数——`day()`、`month()` 和 `year()`——它们是 `datepart()` 的同义词。\n\n\
    ## 格式化日期\n\n与数字一样，格式化日期会生成一个字符串。\n\n对于 PostgreSQL 和 Oracle，您可以使用 `to_char` 函数。以下是两个有用的格式：\n\
    \n```sql\n--  PostgreSQL\nWITH vars AS (SELECT timestamp '1969-07-20 20:17:40'\
    \ AS moonshot)\nSELECT\n  moonshot,\n  to_char(moonshot,'FMDay, DDth FMMonth YYYY')\
    \ AS fulldate,\n  to_char(moonshot,'Dy DD Mon YYYY') AS shortdate\nFROM vars;\n\
    --  Oracle\nWITH vars AS (\n  SELECT timestamp '1969-07-20 20:17:40' AS moonshot\
    \ FROM dual\n)\nSELECT\n  moonshot,\n  to_char(moonshot,'FMDay, ddth Month YYYY')\
    \ AS fulldate,\n  to_char(moonshot,'Dy DD Mon YYYY') AS shortdate\nFROM vars;\n\
    ```\n\n您将得到类似以下内容：\n\n| moonshot | full | short |\n| --- | --- | --- |\n| 1969-07-20\
    \ 20:17:40 | Sunday, 20th July 1969 | Sun 20 Jul 1969 |\n\n您会注意到 PostgreSQL 和\
    \ Oracle 的格式代码之间略有不同。\n\n对于 MariaDB/MySQL，有 `date_format()` 函数：\n\n```sql\nWITH\
    \ vars AS (SELECT timestamp '1969-07-20 20:17:40' AS moonshot)\nSELECT\n  moonshot,\n\
    \  date_format(moonshot,'%W, %D %M %Y') AS fulldate,\n  date_format(moonshot,'%a\
    \ %d %b %Y') AS shortdate\nFROM vars;\n```\n\n对于 Microsoft SQL，`format()` 函数也可用于日期：\n\
    \n```sql\nWITH vars AS (SELECT cast('1969-07-20 20:17:40' AS datetime) AS moonshot)\n\
    SELECT\n  format(moonshot,'dddd, d MMMM yyy') AS fulldate,\n  format(moonshot,'ddd\
    \ d MMM yyy') AS shortdate\nFROM vars;\n```\n\nSQLite 的格式化功能非常有限，如果没有一些额外的技巧，您肯定无法获取月份或星期的名称。通常最好保留日期不变，让宿主应用程序执行所需的操作。\n\
    \n您可以在以下网址了解有关格式代码的更多信息：\n\n*   PostgreSQL: [`www.postgresql.org/docs/current/functions-formatting.html#FUNCTIONS-FORMATTING-DATETIME-TABLE`](http://www.postgresql.org/docs/current/functions-formatting.html%2523FUNCTIONS-FORMATTING-DATETIME-TABLE)\n\
    *   Oracle: [`https://docs.oracle.com/en/database/oracle/oracle-database/21/sqlrf/Format-Models.html`](https://docs.oracle.com/en/database/oracle/oracle-database/21/sqlrf/Format-Models.html%255D)\n\
    *   MariaDB: [`https://mariadb.com/kb/en/date_format/`](https://mariadb.com/kb/en/date_format/)\n\
    *   MySQL: [`https://dev.mysql.com/doc/refman/8.0/en/date-and-time-functions.html`](https://dev.mysql.com/doc/refman/8.0/en/date-and-time-functions.html)\n\
    *   Microsoft SQL: [`https://learn.microsoft.com/en-us/dotnet/standard/base-types/custom-date-and-time-format-strings`](https://learn.microsoft.com/en-us/dotnet/standard/base-types/custom-date-and-time-format-strings)"
  raw: '#### Grouping and Sorting by Date/Time


    You can sort by date/time as with any other data type. The result will be in historical
    order:


    ```

    SELECT *

    FROM sales

    ORDER BY ordered;

    ```


    Of course, you can also use `DESC`.


    You can also group by `date`, but you probably wouldn’t want to group by `datetime`,
    unless you have a huge number of transactions per second. For a `datetime`, you
    might use a Common Table Expression to cast it to a date and then group the results.
    For example:


    ```

    WITH cte AS (

    SELECT

    cast(ordered as date) AS ordered, total  --  Not Oracle

    --  trunc(ordered) AS ordered, total     --  Oracle

    FROM sales

    )

    SELECT ordered, sum(total)

    FROM cte

    GROUP BY ordered

    ORDER BY ordered;

    ```


    This gives you the following summary:


    | **ordered** | **sum** |

    | --- | --- |

    | 2022-05-04 | 43.00 |

    | 2022-05-05 | 150.50 |

    | 2022-05-06 | 110.50 |

    | 2022-05-07 | 142.00 |

    | 2022-05-08 | 214.50 |

    | 2022-05-09 | 16.50 |

    | ~ 389 rows ~ |


    Remember, in Oracle you need to use the `trunc()` function.


    #### Extracting Parts of a Date/Time


    Technically, a `datetime` represents a point in time. Practically, we tend to
    think in terms of components such as days and years. The situation is complicated
    by the fact that (a) the components are not in step with each other and (b) some
    of them vary in size.


    ##### Date Extracting in PostgreSQL, MariaDB/MySQL, and Oracle


    The standard method of extracting part of a date is to use the `extract()` function.
    This function takes the form


    ```

    extract(part from datetime)

    ```


    You can see the `extract()` function in action:


    ```

    WITH chelyabinsk AS (

    SELECT

    timestamp ''2013-02-15 09:20:00'' AS datetime

    FROM dual

    )

    SELECT

    datetime,

    EXTRACT(year FROM datetime) AS year,

    EXTRACT(month FROM datetime) AS month,

    EXTRACT(day FROM datetime) AS day,

    --  not Oracle or MariaDB/MySQL:

    EXTRACT(dow FROM datetime) AS weekday,

    EXTRACT(hour FROM datetime) AS hour,

    EXTRACT(minute FROM datetime) AS minute,

    EXTRACT(second FROM datetime) AS second

    FROM chelyabinsk;

    ```


    You get the following components:


    | **datetime** | **year** | **month** | **day** | **weekday** | **hour** | **minute**
    | **second** |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 2013-02-15 09:20:00 | 2013 | 2 | 15 | 5 | 9 | 20 | 0 |


    Note that Oracle and MariaDB/MySQL don’t have a direct way of extracting the day
    of the week, which can be a problem if, say, you want to use it for grouping.
    However, as you will see later, you can use a formatting function to get the day
    of the week, as well as the preceding values.


    PostgreSQL also includes a function called `date_part(''part'',datetime)` as an
    alternative to the preceding function.


    ##### Date Extracting in Microsoft SQL


    Microsoft SQL has two main functions to extract part of a date:


    *   `datepart(part,datetime)` extracts the part of a date/time as a *number*.


    *   `datename(part,datetime)` extracts the part of a date/time as a *string*.
    For most parts, such as the year, it’s simply a string version of the `datepart`
    number. However, for the weekday and the month, it’s actually the human-friendly
    name.


    You can see these two functions in action:


    ```

    WITH chelyabinsk AS (

    SELECT cast(''2013-02-15 09:20'' as datetime) AS datetime

    )

    SELECT

    datepart(year, datetime) AS year,    --  aka year()

    datename(year, datetime) AS yearstring,

    datepart(month, datetime) AS month,  --  aka month()

    datename(month, datetime) AS monthname,

    datepart(day, datetime) AS day,      --  aka day()

    datepart(weekday, datetime) AS weekday, --  Sunday=1

    datename(weekday, datetime) AS weekdayname,

    datepart(hour, datetime) AS hour,

    datepart(minute, datetime) AS minute,

    datepart(second, datetime) AS second

    FROM chelyabinsk;

    ```


    Note


    .


    *   `datename(date,year)` just gives a string version of `2013`.


    *   There are three short functions—`day()`, `month()`, and `year()`—which are
    synonyms of `datepart()`.


    #### Formatting a Date


    As with numbers, formatting a date generates a string.


    For both PostgreSQL and Oracle, you can use the `to_char` function. Here are two
    useful formats:


    ```

    --  PostgreSQL

    WITH vars AS (SELECT timestamp ''1969-07-20 20:17:40'' AS moonshot)

    SELECT

    moonshot,

    to_char(moonshot,''FMDay, DDth FMMonth YYYY'') AS fulldate,

    to_char(moonshot,''Dy DD Mon YYYY'') AS shortdate

    FROM vars;

    --  Oracle

    WITH vars AS (

    SELECT timestamp ''1969-07-20 20:17:40'' AS moonshot FROM dual

    )

    SELECT

    moonshot,

    to_char(moonshot,''FMDay, ddth Month YYYY'') AS fulldate,

    to_char(moonshot,''Dy DD Mon YYYY'') AS shortdate

    FROM vars;

    ```


    You’ll get something like this:


    | **moonshot** | **full** | **short** |

    | --- | --- | --- |

    | 1969-07-20 20:17:40 | Sunday, 20th July 1969 | Sun 20 Jul 1969 |


    You’ll notice that there is a slight difference in the format codes between PostgreSQL
    and Oracle.


    For MariaDB/MySQL, there is the `date_format()` function:


    ```

    WITH vars AS (SELECT timestamp ''1969-07-20 20:17:40'' AS moonshot)

    SELECT

    moonshot,

    date_format(moonshot,''%W, %D %M %Y'') AS fulldate,

    date_format(moonshot,''%a %d %b %Y'') AS shortdate

    FROM vars;

    ```


    For Microsoft SQL, the `format()` function can also be used for dates:


    ```

    WITH vars AS (SELECT cast(''1969-07-20 20:17:40'' AS datetime) AS moonshot)

    SELECT

    format(moonshot,''dddd, d MMMM yyy'') AS fulldate,

    format(moonshot,''ddd d MMM yyy'') AS shortdate

    FROM vars;

    ```


    SQLite has very limited formatting functionality, and you certainly can’t get
    month or weekday names without some additional trickery. It’s usually better to
    leave the date alone and let the host application do what is needed.


    You can learn more about the format codes at


    *   PostgreSQL: [`www.postgresql.org/docs/current/functions-formatting.html#FUNCTIONS-FORMATTING-DATETIME-TABLE`](http://www.postgresql.org/docs/current/functions-formatting.html%2523FUNCTIONS-FORMATTING-DATETIME-TABLE)


    *   Oracle: [`https://docs.oracle.com/en/database/oracle/oracle-database/21/sqlrf/Format-Models.html`](https://docs.oracle.com/en/database/oracle/oracle-database/21/sqlrf/Format-Models.html%255D)


    *   MariaDB: [`https://mariadb.com/kb/en/date_format/`](https://mariadb.com/kb/en/date_format/)


    *   MySQL: [`https://dev.mysql.com/doc/refman/8.0/en/date-and-time-functions.html`](https://dev.mysql.com/doc/refman/8.0/en/date-and-time-functions.html)


    *   Microsoft SQL: [`https://learn.microsoft.com/en-us/dotnet/standard/base-types/custom-date-and-time-format-strings`](https://learn.microsoft.com/en-us/dotnet/standard/base-types/custom-date-and-time-format-strings)'
  trans: "\n## 按日期/时间分组和排序\n\n您可以像对其他任何数据类型一样，按日期/时间进行排序。结果将按历史顺序排列：\n\n```sql\nSELECT\
    \ *\nFROM sales\nORDER BY ordered;\n```\n\n当然，您也可以使用 `DESC`。\n\n您也可以按 `date` 分组，但您可能不想按\
    \ `datetime` 分组，除非您每秒有大量交易。对于 `datetime`，您可以使用公用表表达式（CTE）将其转换为 `date`，然后再对结果进行分组。例如：\n\
    \n```sql\nWITH cte AS (\n  SELECT\n    cast(ordered as date) AS ordered, total\
    \  --  非 Oracle\n--  trunc(ordered) AS ordered, total     --  Oracle\n  FROM sales\n\
    )\nSELECT ordered, sum(total)\nFROM cte\nGROUP BY ordered\nORDER BY ordered;\n\
    ```\n\n这将为您生成以下摘要：\n\n| ordered | sum |\n| --- | --- |\n| 2022-05-04 | 43.00 |\n\
    | 2022-05-05 | 150.50 |\n| 2022-05-06 | 110.50 |\n| 2022-05-07 | 142.00 |\n| 2022-05-08\
    \ | 214.50 |\n| 2022-05-09 | 16.50 |\n| ~ 389 行 ~ |\n\n请记住，在 Oracle 中您需要使用 `trunc()`\
    \ 函数。\n\n## 提取日期/时间的部分\n\n从技术上讲，`datetime` 代表一个时间点。实际上，我们倾向于从天和年等组成部分来思考。这种情况因以下事实而变得复杂：(a)\
    \ 各组成部分不同步，并且 (b) 其中一些组成部分的大小会变化。\n\n### 在 PostgreSQL、MariaDB/MySQL 和 Oracle 中提取日期\n\
    \n提取日期部分的标准方法是使用 `extract()` 函数。其形式如下：\n\n```sql\nextract(part from datetime)\n\
    ```\n\n您可以看到 `extract()` 函数的实际应用：\n\n```sql\nWITH chelyabinsk AS (\n  SELECT\n\
    \    timestamp '2013-02-15 09:20:00' AS datetime\n  FROM dual\n)\nSELECT\n  datetime,\n\
    \  EXTRACT(year FROM datetime) AS year,\n  EXTRACT(month FROM datetime) AS month,\n\
    \  EXTRACT(day FROM datetime) AS day,\n--  非 Oracle 或 MariaDB/MySQL：\n  EXTRACT(dow\
    \ FROM datetime) AS weekday,\n  EXTRACT(hour FROM datetime) AS hour,\n  EXTRACT(minute\
    \ FROM datetime) AS minute,\n  EXTRACT(second FROM datetime) AS second\nFROM chelyabinsk;\n\
    ```\n\n您将得到以下组成部分：\n\n| datetime | year | month | day | weekday | hour | minute\
    \ | second |\n| --- | --- | --- | --- | --- | --- | --- | --- |\n| 2013-02-15\
    \ 09:20:00 | 2013 | 2 | 15 | 5 | 9 | 20 | 0 |\n\n请注意，Oracle 和 MariaDB/MySQL 没有直接提取星期几的方法，这可能是个问题，例如，如果您想用它进行分组。但是，正如您稍后将看到的，您可以使用格式化函数来获取星期几以及前面的值。\n\
    \nPostgreSQL 还包含一个名为 `date_part('part',datetime)` 的函数，作为前述函数的替代方法。\n\n### 在 Microsoft\
    \ SQL 中提取日期\n\nMicrosoft SQL 有两个主要函数来提取日期部分：\n\n*   `datepart(part,datetime)`\
    \ 将日期/时间的部分提取为**数字**。\n*   `datename(part,datetime)` 将日期/时间的部分提取为**字符串**。对于大多数部分，例如年份，它只是\
    \ `datepart` 数字的字符串版本。然而，对于星期几和月份，它实际上是人类友好的名称。\n\n您可以看到这两个函数的实际应用：\n\n```sql\n\
    WITH chelyabinsk AS (\n  SELECT cast('2013-02-15 09:20' as datetime) AS datetime\n\
    )\nSELECT\n  datepart(year, datetime) AS year,    --  又名 year()\n  datename(year,\
    \ datetime) AS yearstring,\n  datepart(month, datetime) AS month,  --  又名 month()\n\
    \  datename(month, datetime) AS monthname,\n  datepart(day, datetime) AS day,\
    \      --  又名 day()\n  datepart(weekday, datetime) AS weekday, --  星期日=1\n  datename(weekday,\
    \ datetime) AS weekdayname,\n  datepart(hour, datetime) AS hour,\n  datepart(minute,\
    \ datetime) AS minute,\n  datepart(second, datetime) AS second\nFROM chelyabinsk;\n\
    ```\n\n注意\n\n*   `datename(date,year)` 只给出 `2013` 的字符串版本。\n*   有三个短函数——`day()`、`month()`\
    \ 和 `year()`——它们是 `datepart()` 的同义词。\n\n## 格式化日期\n\n与数字一样，格式化日期会生成一个字符串。\n\n对于\
    \ PostgreSQL 和 Oracle，您可以使用 `to_char` 函数。以下是两个有用的格式：\n\n```sql\n--  PostgreSQL\n\
    WITH vars AS (SELECT timestamp '1969-07-20 20:17:40' AS moonshot)\nSELECT\n  moonshot,\n\
    \  to_char(moonshot,'FMDay, DDth FMMonth YYYY') AS fulldate,\n  to_char(moonshot,'Dy\
    \ DD Mon YYYY') AS shortdate\nFROM vars;\n--  Oracle\nWITH vars AS (\n  SELECT\
    \ timestamp '1969-07-20 20:17:40' AS moonshot FROM dual\n)\nSELECT\n  moonshot,\n\
    \  to_char(moonshot,'FMDay, ddth Month YYYY') AS fulldate,\n  to_char(moonshot,'Dy\
    \ DD Mon YYYY') AS shortdate\nFROM vars;\n```\n\n您将得到类似以下内容：\n\n| moonshot | full\
    \ | short |\n| --- | --- | --- |\n| 1969-07-20 20:17:40 | Sunday, 20th July 1969\
    \ | Sun 20 Jul 1969 |\n\n您会注意到 PostgreSQL 和 Oracle 的格式代码之间略有不同。\n\n对于 MariaDB/MySQL，有\
    \ `date_format()` 函数：\n\n```sql\nWITH vars AS (SELECT timestamp '1969-07-20 20:17:40'\
    \ AS moonshot)\nSELECT\n  moonshot,\n  date_format(moonshot,'%W, %D %M %Y') AS\
    \ fulldate,\n  date_format(moonshot,'%a %d %b %Y') AS shortdate\nFROM vars;\n\
    ```\n\n对于 Microsoft SQL，`format()` 函数也可用于日期：\n\n```sql\nWITH vars AS (SELECT cast('1969-07-20\
    \ 20:17:40' AS datetime) AS moonshot)\nSELECT\n  format(moonshot,'dddd, d MMMM\
    \ yyy') AS fulldate,\n  format(moonshot,'ddd d MMM yyy') AS shortdate\nFROM vars;\n\
    ```\n\nSQLite 的格式化功能非常有限，如果没有一些额外的技巧，您肯定无法获取月份或星期的名称。通常最好保留日期不变，让宿主应用程序执行所需的操作。\n\
    \n您可以在以下网址了解有关格式代码的更多信息：\n\n*   PostgreSQL: [`www.postgresql.org/docs/current/functions-formatting.html#FUNCTIONS-FORMATTING-DATETIME-TABLE`](http://www.postgresql.org/docs/current/functions-formatting.html%2523FUNCTIONS-FORMATTING-DATETIME-TABLE)\n\
    *   Oracle: [`https://docs.oracle.com/en/database/oracle/oracle-database/21/sqlrf/Format-Models.html`](https://docs.oracle.com/en/database/oracle/oracle-database/21/sqlrf/Format-Models.html%255D)\n\
    *   MariaDB: [`https://mariadb.com/kb/en/date_format/`](https://mariadb.com/kb/en/date_format/)\n\
    *   MySQL: [`https://dev.mysql.com/doc/refman/8.0/en/date-and-time-functions.html`](https://dev.mysql.com/doc/refman/8.0/en/date-and-time-functions.html)\n\
    *   Microsoft SQL: [`https://learn.microsoft.com/en-us/dotnet/standard/base-types/custom-date-and-time-format-strings`](https://learn.microsoft.com/en-us/dotnet/standard/base-types/custom-date-and-time-format-strings)\n"
- fmt: "## Date Arithmetic\n\nGenerally, the two things you want to do with dates\
    \ are:\n\n*   Modify a date by adding or subtracting an interval.\n*   Find the\
    \ difference between two dates.\n\nTo modify a date, you can add or subtract an\
    \ interval. Some DBMSs define a type of data called `interval` for the purpose.\
    \ For example, to add four months to now, you can use:\n\n```sql\n-- PostgreSQL\n\
    SELECT\n    date '2015-10-31' + interval '4 months' AS afterthen,\n    current_timestamp\
    \ + interval '4 months' AS afternow,\n    current_timestamp + interval '4' month\
    \  -- also OK\n;\n-- Oracle\nSELECT\n    add_months('31 Oct 2015',4) AS afterthen,\n\
    \    current_timestamp + interval '4' month AS afternow,\n    add_months(current_timestamp,4)\
    \ -- also OK\nFROM dual;\n-- MariaDB/MySQL\nSELECT\n    date_add('2015-10-31',interval\
    \ 4 month) AS afterthen,\n    date_add(current_timestamp,interval 4 month) AS\
    \ afternow,\n    current_timestamp + interval '4' month  -- also OK\n;\n```\n\n\
    This gives you something like this:\n\n| **afterthen** | **Afternow** |\n| ---\
    \ | --- |\n| 2016-02-29 00:00:00 | 2023-10-01 16:01:13.691447+11 |\n\nYou’ll notice\
    \ that PostgreSQL and Oracle use the addition operator, while MariaDB/MySQL uses\
    \ a special function. Oracle also has a special function `add_months` to add months.\n\
    \nFor Microsoft SQL, you use `dateadd`, specifying the units and number of units:\n\
    \n```sql\n-- MSSQL\nSELECT\n    dateadd(month,4,'2015-10-31') AS afterthen,\n\
    \    dateadd(month,4,current_timestamp) AS afternow\n;\n```\n\nSQLite uses the\
    \ `strftime()` function to convert from a string, together with modifiers to adjust\
    \ the date:\n\n```sql\n-- SQLite\nSELECT\n    strftime('%Y-%m-%d','2015-10-31','+4\
    \ month') AS afterthen,\n    strftime('%Y-%m-%d','now','+4 month') AS afternow\n\
    ;\n```\n\nThe other thing you’ll want to do is calculate the difference between\
    \ two dates. Here again, every DBMS does it differently. For example, to find\
    \ the age of your customers, you can use:\n\n```sql\n-- PostgreSQL\nSELECT\n \
    \   dob,\n    age(dob) AS interval,\n    date_part('year',age(dob)) AS years,\n\
    \    extract(year from age(dob)) AS samething\nFROM customers;\n-- MariaDB/MySQL\n\
    SELECT\n    dob,\n    timestampdiff(year,dob,current_timestamp) AS age\nFROM customers;\n\
    -- MSSQL, but not quite!\nSELECT\n    dob,\n    datediff(year,dob,current_timestamp)\
    \ AS age\nFROM customers;\n-- Oracle\nSELECT\n    dob,\n    trunc(months_between(current_timestamp,dob)/12)\
    \ AS age\nFROM customers;\n-- SQLite\nSELECT\n    dob,\n    cast(\n        strftime('%Y.%m%d',\
    \ 'now')\n        - strftime('%Y.%m%d', dob)\n        as int) AS age\nFROM customers;\n\
    ```\n\nFor PostgreSQL, you’ll get the following results. The other DBMSs won’t\
    \ have the `age` column:\n\n| **dob** | **interval** | **Years** | **samething**\
    \ |\n| --- | --- | --- | --- |\n| [NULL] | [NULL] | 0 | 0 |\n| 1945-07-03 | 77\
    \ years 10 mons 29 days | 77 | 77 |\n| 1998-08-09 | 24 years 9 mons 23 days |\
    \ 24 | 24 |\n| 1990-04-12 | 33 years 1 mon 19 days | 33 | 33 |\n| 1960-01-13 |\
    \ 63 years 4 mons 19 days | 63 | 63 |\n| [NULL] | [NULL] | 0 | 0 |\n| ~ 303 rows\
    \ ~ |\n\nOf the preceding calculations, `MSSQL` has a simple function `datediff`\
    \ which is `short-circuited`: All it does is calculate the difference between\
    \ the years, which is way out if the date of birth is at the end of the year but\
    \ the asking date is at the beginning of the year. To get a more correct result\
    \ takes a lot more work.\n\n## The CASE Expression\n\nThere are times when a simple\
    \ expression won’t do, and you need SQL to make some choices. The `CASE ... END`\
    \ expression can be used to choose from alternative values.\n\nFor example, you\
    \ can create categories from other values:\n\n```sql\nSELECT\n    id,title,\n\
    \    CASE\n        WHEN price<7 THEN 'expensive'\n        -- ELSE NULL\n    END\
    \ AS price\nFROM books;\n```\n\nYou get a simple price listing:\n\n| **id** |\
    \ **Title** | **price** |\n| --- | --- | --- |\n| 2094 | The Manuscript Found\
    \ in Saragossa | expensive |\n| 336 | The Story of My Life | reasonable |\n| 1868\
    \ | The Tenant of Wildfell Hall | [NULL] |\n| 375 | Dead Souls | reasonable |\n\
    | 1180 | Fables | cheap |\n| 990 | The History of Pendennis: His Fortun … | cheap\
    \ |\n| ~ 1200 rows ~ |\n\nNote that if all conditions fail, then the result will\
    \ be `NULL`, which is commented out earlier. If you want an alternative to `NULL`,\
    \ use the `ELSE` expression:\n\n```sql\nSELECT\n    id,title,\n    CASE\n    \
    \    WHEN price<7 THEN 'expensive'\n        ELSE ''\n    END AS price\nFROM books;\n\
    ```\n\nAlso, note that the `CASE` expression is `short-circuited`: once it finds\
    \ a match, it stops evaluating.\n\n### Various Uses of CASE\n\nThere is a simplified\
    \ variation of `CASE` for when you are testing a simple discrete value. For example:\n\
    \n```sql\nSELECT\n    c.id,\n    givenname||' '||familyname AS name,\n    -- givenname+'\
    \ '+familyname AS name, -- MSSQL\n    CASE status\n        WHEN 1 THEN 'Gold'\n\
    \        WHEN 2 THEN 'Silver'\n        WHEN 3 THEN 'Bronze'\n    END AS status\n\
    FROM customers AS c LEFT JOIN VIP ON c.id=vip.id;\n-- Oracle:\n-- FROM customers\
    \ c LEFT JOIN VIP ON c.id=vip.id;\n```\n\nThis gives you:\n\n| **id** | **Name**\
    \ | **status** |\n| --- | --- | --- |\n| 69 | Rudi Mentary | [NULL] |\n| 182 |\
    \ June Hills | Bronze |\n| 43 | Annie Day | [NULL] |\n| 263 | Mark Time | Bronze\
    \ |\n| 266 | Vic Tory | Silver |\n| 68 | Phyllis Stein | [NULL] |\n| 442 | Herb\
    \ Garden | Gold |\n| 33 | Eileen Dover | [NULL] |\n| ~ 303 rows ~ |\n\nThis form\
    \ isn’t much shorter, but it makes the intention clear.\n\nYou can also use the\
    \ `IN` expression:\n\n```sql\nSELECT\n    id, givenname, familyname,\n    CASE\n\
    \        WHEN state IN('QLD','NSW','VIC','TAS') THEN 'East'\n        WHEN state\
    \ IN ('NT','SA') THEN 'Central'\n        ELSE 'Elsewhere'\n    END AS region\n\
    FROM customerdetails;\n```\n\nwhich gives you:\n\n| **id** | **Givenname** | **familyname**\
    \ | **region** |\n| --- | --- | --- | --- |\n| 137 | Albert | Ross | East |\n\
    | 359 | Gail | Warning | Central |\n| 40 | Cliff | Face | East |\n| 151 | Rick\
    \ | O’Shea | East |\n| 96 | Rob | Blind | Elsewhere |\n| 465 | Mary | Christmas\
    \ | Elsewhere |\n| ~ 303 rows ~ |\n\n### Coalesce Is like a Special Case of CASE\n\
    \nThere’s some similarity between using `coalesce()` and `CASE`. You can think\
    \ of `CASE` as an alternative to `coalesce`:\n\n```sql\nSELECT\n    id, givenname,\
    \ familyname,\n    coalesce(phone,'-') AS coalesced,\n    CASE\n        WHEN phone\
    \ IS NOT NULL THEN phone\n        ELSE '-'\n    END AS cased\nFROM customers;\n\
    ```\n\nThe two expressions will give the same results:\n\n| **id** | **givenname**\
    \ | **familyname** | **coalesced** | **cased** |\n| --- | --- | --- | --- | ---\
    \ |\n| 42 | May | Knott | 0255509371 | 0255509371 |\n| 459 | Rick | Shaw | 0370101040\
    \ | 0370101040 |\n| 597 | Ike | Andy | - | - |\n| 186 | Pat | Downe | 0870105900\
    \ | 0870105900 |\n| 352 | Basil | Isk | 0255502503 | 0255502503 |\n| 576 | Pearl\
    \ | Divers | 0370107821 | 0370107821 |\n| ~ 303 rows ~ |\n\nIt’s not necessarily\
    \ a convenient alternative, of course, but it helps to appreciate the overlapping\
    \ use of the two. It’s particularly useful with Oracle, where you can happily\
    \ concatenate a `NULL` without ending up with a `NULL`, so it’s hard to `coalesce`\
    \ otherwise."
  raw: '#### Date Arithmetic


    Generally, the two things you want to do with dates are


    *   Modify a date by adding or subtracting an interval


    *   Find the difference between two dates


    To modify a date, you can add or subtract an interval. Some DBMSs define a type
    of data called `interval` for the purpose. For example, to add four months to
    now, you can use


    ```

    --  PostgreSQL

    SELECT

    date ''2015-10-31'' + interval ''4 months'' AS afterthen,

    current_timestamp + interval ''4 months'' AS afternow,

    current_timestamp + interval ''4'' month  --  also OK    ;

    --  Oracle

    SELECT

    add_months(''31 Oct 2015'',4) AS afterthen,

    current_timestamp + interval ''4'' month AS afternow,

    add_months(current_timestamp,4) --  also OK

    FROM dual;

    --  MariaDB/MySQL

    SELECT

    date_add(''2015-10-31'',interval 4 month) AS afterthen,

    date_add(current_timestamp,interval 4 month)

    AS afternow,

    current_timestamp + interval ''4'' month  --  also OK

    ;

    ```


    This gives you something like this:


    | **afterthen** | **Afternow** |

    | --- | --- |

    | 2016-02-29 00:00:00 | 2023-10-01 16:01:13.691447+11 |


    You’ll notice that PostgreSQL and Oracle use the addition operator, while MariaDB/MySQL
    uses a special function. Oracle also has a special function to add months.


    For Microsoft SQL, you use `dateadd`, specifying the units and number of units:


    ```

    --  MSSQL

    SELECT

    dateadd(month,4,''2015-10-31'') AS afterthen,

    dateadd(month,4,current_timestamp) AS afternow

    ;

    ```


    SQLite uses the `strftime()` function to convert from a string, together with
    modifiers to adjust the date:


    ```

    --  SQLite

    SELECT

    strftime(''%Y-%m-%d'',''2015-10-31'',''+4 month'')

    AS afterthen,

    strftime(''%Y-%m-%d'',''now'',''+4 month'') AS afternow

    ;

    ```


    The other thing you’ll want to do is calculate the difference between two dates.
    Here again, every DBMS does it differently. For example, to find the age of your
    customers, you can use


    ```

    --  PostgreSQL

    SELECT

    dob,

    age(dob) AS interval,

    date_part(''year'',age(dob)) AS years,

    extract(year from age(dob)) AS samething

    FROM customers;

    --  MariaDB/MySQL

    SELECT

    dob,

    timestampdiff(year,dob,current_timestamp) AS age

    FROM customers;

    --  MSSQL, but not quite!

    SELECT

    dob,

    datediff(year,dob,current_timestamp) AS age

    FROM customers;

    --  Oracle

    SELECT

    dob,

    trunc(months_between(current_timestamp,dob)/12)

    AS age

    FROM customers;

    --  SQLite

    SELECT

    dob,

    cast(

    strftime(''%Y.%m%d'', ''now'')

    - strftime(''%Y.%m%d'', dob)

    as int) AS age

    FROM customers;

    ```


    For PostgreSQL, you’ll get the following results. The other DBMSs won’t have the
    `age` column:


    | **dob** | **interval** | **Years** | **samething** |

    | --- | --- | --- | --- |

    | [NULL] | [NULL] | 0 | 0 |

    | 1945-07-03 | 77 years 10 mons 29 days | 77 | 77 |

    | 1998-08-09 | 24 years 9 mons 23 days | 24 | 24 |

    | 1990-04-12 | 33 years 1 mon 19 days | 33 | 33 |

    | 1960-01-13 | 63 years 4 mons 19 days | 63 | 63 |

    | [NULL] | [NULL] | 0 | 0 |

    | ~ 303 rows ~ |


    Of the preceding calculations, MSSQL has a simple function which is *too* simple.
    All it does is calculate the difference between the years, which is way out if
    the date of birth is at the end of the year but the asking date is at the beginning
    of the year. To get a more correct result takes a lot more work.


    ## The CASE Expression


    There are times when a simple expression won’t do, and you need SQL to make some
    choices. The `CASE ... END` expression can be used to choose from alternative
    values.


    For example, you can create categories from other values:


    ```

    SELECT

    id,title,

    CASE

    WHEN price17 THEN ''expensive''

    --  ELSE NULL

    END AS price

    FROM books;

    ```


    You get a simple price listing:


    | **id** | **Title** | **price** |

    | --- | --- | --- |

    | 2094 | The Manuscript Found in Saragossa | expensive |

    | 336 | The Story of My Life | reasonable |

    | 1868 | The Tenant of Wildfell Hall | [NULL] |

    | 375 | Dead Souls | reasonable |

    | 1180 | Fables | cheap |

    | 990 | The History of Pendennis: His Fortun … | cheap |

    | ~ 1200 rows ~ |


    Note that if all conditions fail, then the result will be `NULL`, which is commented
    out earlier. If you want an alternative to `NULL`, use the `ELSE` expression:


    ```

    SELECT

    id,title,

    CASE

    WHEN price17 THEN ''expensive''

    ELSE ''''

    END AS price

    FROM books;

    ```


    Also, note that the `CASE` expression is **short-circuited**: once it finds a
    match, it stops evaluating.


    ### Various Uses of CASE


    There is a simplified variation of `CASE` for when you are testing a simple discrete
    value. For example:


    ```

    SELECT

    c.id,

    givenname||'' ''||familyname AS name,

    --  givenname+'' ''+familyname AS name, --  MSSQL

    CASE status

    WHEN 1 THEN ''Gold''

    WHEN 2 THEN ''Silver''

    WHEN 3 THEN ''Bronze''

    CASE AS status

    FROM customers AS c LEFT JOIN VIP ON c.id=vip.id;

    --  Oracle:

    --  FROM customers c LEFT JOIN VIP ON c.id=vip.id;

    ```


    This gives you


    | **id** | **Name** | **status** |

    | --- | --- | --- |

    | 69 | Rudi Mentary | [NULL] |

    | 182 | June Hills | Bronze |

    | 43 | Annie Day | [NULL] |

    | 263 | Mark Time | Bronze |

    | 266 | Vic Tory | Silver |

    | 68 | Phyllis Stein | [NULL] |

    | 442 | Herb Garden | Gold |

    | 33 | Eileen Dover | [NULL] |

    | ~ 303 rows ~ |


    This form isn’t much shorter, but it makes the intention clear.


    You can also use the `IN` expression:


    ```

    SELECT

    id, givenname, familyname,

    CASE

    WHEN state IN(''QLD'',''NSW'',''VIC'',''TAS'') THEN ''East''

    WHEN state IN (''NT'',''SA'') THEN ''Central''

    ELSE ''Elsewhere''

    END AS region

    FROM customerdetails;

    ```


    which gives you


    | **id** | **Givenname** | **familyname** | **region** |

    | --- | --- | --- | --- |

    | 137 | Albert | Ross | East |

    | 359 | Gail | Warning | Central |

    | 40 | Cliff | Face | East |

    | 151 | Rick | O’Shea | East |

    | 96 | Rob | Blind | Elsewhere |

    | 465 | Mary | Christmas | Elsewhere |

    | ~ 303 rows ~ |


    ### Coalesce Is like a Special Case of CASE


    There’s some similarity between using `coalesce()` and `CASE`. You can think of
    `CASE` as an alternative to `coalesce`:


    ```

    SELECT

    id, givenname, familyname,

    coalesce(phone,''-'') AS coalesced,

    CASE

    WHEN phone IS NOT NULL THEN phone

    ELSE ''-''

    END AS cased

    FROM customers;

    ```


    The two expressions will give the same results:


    | **id** | **givenname** | **familyname** | **coalesced** | **cased** |

    | --- | --- | --- | --- | --- |

    | 42 | May | Knott | 0255509371 | 0255509371 |

    | 459 | Rick | Shaw | 0370101040 | 0370101040 |

    | 597 | Ike | Andy | - | - |

    | 186 | Pat | Downe | 0870105900 | 0870105900 |

    | 352 | Basil | Isk | 0255502503 | 0255502503 |

    | 576 | Pearl | Divers | 0370107821 | 0370107821 |

    | ~ 303 rows ~ |


    It’s not necessarily a convenient alternative, of course, but it helps to appreciate
    the overlapping use of the two. It’s particularly useful with Oracle, where you
    can happily concatenate a `NULL` without ending up with a `NULL`, so it’s hard
    to coalesce otherwise.'
  trans: "## 日期运算\n\n通常，你对日期要做的两件事是：\n\n*   通过增加或减少一个时间间隔来修改日期。\n*   计算两个日期之间的差值。\n\
    \n要修改日期，你可以加上或减去一个时间间隔。一些数据库管理系统为此定义了一种名为 `interval` 的数据类型。例如，要在当前时间上增加四个月，你可以使用：\n\
    \n```sql\n-- PostgreSQL\nSELECT\n    date '2015-10-31' + interval '4 months' AS\
    \ afterthen,\n    current_timestamp + interval '4 months' AS afternow,\n    current_timestamp\
    \ + interval '4' month  -- 也可以\n;\n-- Oracle\nSELECT\n    add_months('31 Oct 2015',4)\
    \ AS afterthen,\n    current_timestamp + interval '4' month AS afternow,\n   \
    \ add_months(current_timestamp,4) -- 也可以\nFROM dual;\n-- MariaDB/MySQL\nSELECT\n\
    \    date_add('2015-10-31',interval 4 month) AS afterthen,\n    date_add(current_timestamp,interval\
    \ 4 month) AS afternow,\n    current_timestamp + interval '4' month  -- 也可以\n\
    ;\n```\n\n这将得到类似以下的结果：\n\n| **afterthen** | **Afternow** |\n| --- | --- |\n| 2016-02-29\
    \ 00:00:00 | 2023-10-01 16:01:13.691447+11 |\n\n你会注意到 PostgreSQL 和 Oracle 使用加法运算符，而\
    \ MariaDB/MySQL 使用一个特殊函数。Oracle 还有一个特殊的 `add_months` 函数用于增加月份。\n\n对于 Microsoft\
    \ SQL，你使用 `dateadd` 函数，指定单位和单位数量：\n\n```sql\n-- MSSQL\nSELECT\n    dateadd(month,4,'2015-10-31')\
    \ AS afterthen,\n    dateadd(month,4,current_timestamp) AS afternow\n;\n```\n\n\
    SQLite 使用 `strftime()` 函数将字符串转换为日期，并使用修饰符来调整日期：\n\n```sql\n-- SQLite\nSELECT\n\
    \    strftime('%Y-%m-%d','2015-10-31','+4 month') AS afterthen,\n    strftime('%Y-%m-%d','now','+4\
    \ month') AS afternow\n;\n```\n\n另一件你想做的事是计算两个日期之间的差值。同样，每个 DBMS 的做法都不同。例如，要找出客户的年龄，你可以使用：\n\
    \n```sql\n-- PostgreSQL\nSELECT\n    dob,\n    age(dob) AS interval,\n    date_part('year',age(dob))\
    \ AS years,\n    extract(year from age(dob)) AS samething\nFROM customers;\n--\
    \ MariaDB/MySQL\nSELECT\n    dob,\n    timestampdiff(year,dob,current_timestamp)\
    \ AS age\nFROM customers;\n-- MSSQL, 但不完全准确！\nSELECT\n    dob,\n    datediff(year,dob,current_timestamp)\
    \ AS age\nFROM customers;\n-- Oracle\nSELECT\n    dob,\n    trunc(months_between(current_timestamp,dob)/12)\
    \ AS age\nFROM customers;\n-- SQLite\nSELECT\n    dob,\n    cast(\n        strftime('%Y.%m%d',\
    \ 'now')\n        - strftime('%Y.%m%d', dob)\n        as int) AS age\nFROM customers;\n\
    ```\n\n对于 PostgreSQL，你将得到以下结果。其他 DBMS 不会有 `age` 列：\n\n| **dob** | **interval**\
    \ | **Years** | **samething** |\n| --- | --- | --- | --- |\n| [NULL] | [NULL]\
    \ | 0 | 0 |\n| 1945-07-03 | 77 years 10 mons 29 days | 77 | 77 |\n| 1998-08-09\
    \ | 24 years 9 mons 23 days | 24 | 24 |\n| 1990-04-12 | 33 years 1 mon 19 days\
    \ | 33 | 33 |\n| 1960-01-13 | 63 years 4 mons 19 days | 63 | 63 |\n| [NULL] |\
    \ [NULL] | 0 | 0 |\n| ~ 约 303 行 ~ |\n\n在前面的计算中，`MSSQL` 有一个简单的 `datediff` 函数，但它是“短路”的：它只计算年份的差异，如果出生日期在年末而查询日期在年初，结果就会严重偏离。要获得更准确的结果需要更多的工作。\n\
    \n## CASE 表达式\n\n有时简单的表达式无法满足需求，你需要 SQL 做出一些选择。`CASE ... END` 表达式可用于从备选值中进行选择。\n\
    \n例如，你可以根据其他值创建类别：\n\n```sql\nSELECT\n    id,title,\n    CASE\n        WHEN price<7\
    \ THEN 'expensive'\n        -- ELSE NULL\n    END AS price\nFROM books;\n```\n\
    \n你会得到一个简单的价格列表：\n\n| **id** | **Title** | **price** |\n| --- | --- | --- |\n\
    | 2094 | The Manuscript Found in Saragossa | expensive |\n| 336 | The Story of\
    \ My Life | reasonable |\n| 1868 | The Tenant of Wildfell Hall | [NULL] |\n| 375\
    \ | Dead Souls | reasonable |\n| 1180 | Fables | cheap |\n| 990 | The History\
    \ of Pendennis: His Fortun … | cheap |\n| ~ 约 1200 行 ~ |\n\n注意，如果所有条件都不满足，结果将是\
    \ `NULL`，这在前面被注释掉了。如果你想要一个替代 `NULL` 的值，请使用 `ELSE` 表达式：\n\n```sql\nSELECT\n   \
    \ id,title,\n    CASE\n        WHEN price<7 THEN 'expensive'\n        ELSE ''\n\
    \    END AS price\nFROM books;\n```\n\n另外，请注意 `CASE` 表达式是“短路求值”的：一旦找到匹配项，它就会停止评估。\n\
    \n### CASE 的各种用法\n\n当你测试一个简单的离散值时，`CASE` 有一种简化的变体。例如：\n\n```sql\nSELECT\n    c.id,\n\
    \    givenname||' '||familyname AS name,\n    -- givenname+' '+familyname AS name,\
    \ -- MSSQL\n    CASE status\n        WHEN 1 THEN 'Gold'\n        WHEN 2 THEN 'Silver'\n\
    \        WHEN 3 THEN 'Bronze'\n    END AS status\nFROM customers AS c LEFT JOIN\
    \ VIP ON c.id=vip.id;\n-- Oracle:\n-- FROM customers c LEFT JOIN VIP ON c.id=vip.id;\n\
    ```\n\n这将给你：\n\n| **id** | **Name** | **status** |\n| --- | --- | --- |\n| 69\
    \ | Rudi Mentary | [NULL] |\n| 182 | June Hills | Bronze |\n| 43 | Annie Day |\
    \ [NULL] |\n| 263 | Mark Time | Bronze |\n| 266 | Vic Tory | Silver |\n| 68 |\
    \ Phyllis Stein | [NULL] |\n| 442 | Herb Garden | Gold |\n| 33 | Eileen Dover\
    \ | [NULL] |\n| ~ 约 303 行 ~ |\n\n这种形式并没有短很多，但意图更清晰。\n\n你也可以使用 `IN` 表达式：\n\n```sql\n\
    SELECT\n    id, givenname, familyname,\n    CASE\n        WHEN state IN('QLD','NSW','VIC','TAS')\
    \ THEN 'East'\n        WHEN state IN ('NT','SA') THEN 'Central'\n        ELSE\
    \ 'Elsewhere'\n    END AS region\nFROM customerdetails;\n```\n\n这会得到：\n\n| **id**\
    \ | **Givenname** | **familyname** | **region** |\n| --- | --- | --- | --- |\n\
    | 137 | Albert | Ross | East |\n| 359 | Gail | Warning | Central |\n| 40 | Cliff\
    \ | Face | East |\n| 151 | Rick | O’Shea | East |\n| 96 | Rob | Blind | Elsewhere\
    \ |\n| 465 | Mary | Christmas | Elsewhere |\n| ~ 约 303 行 ~ |\n\n### Coalesce 类似于\
    \ CASE 的特殊形式\n\n使用 `coalesce()` 和 `CASE` 之间有相似之处。你可以将 `CASE` 视为 `coalesce` 的一种替代方案：\n\
    \n```sql\nSELECT\n    id, givenname, familyname,\n    coalesce(phone,'-') AS coalesced,\n\
    \    CASE\n        WHEN phone IS NOT NULL THEN phone\n        ELSE '-'\n    END\
    \ AS cased\nFROM customers;\n```\n\n这两个表达式将给出相同的结果：\n\n| **id** | **givenname**\
    \ | **familyname** | **coalesced** | **cased** |\n| --- | --- | --- | --- | ---\
    \ |\n| 42 | May | Knott | 0255509371 | 0255509371 |\n| 459 | Rick | Shaw | 0370101040\
    \ | 0370101040 |\n| 597 | Ike | Andy | - | - |\n| 186 | Pat | Downe | 0870105900\
    \ | 0870105900 |\n| 352 | Basil | Isk | 0255502503 | 0255502503 |\n| 576 | Pearl\
    \ | Divers | 0370107821 | 0370107821 |\n| ~ 约 303 行 ~ |\n\n当然，这不一定是一个方便的替代方案，但它有助于理解两者的重叠用途。这在\
    \ Oracle 中特别有用，在那里你可以愉快地连接一个 `NULL` 而不会得到 `NULL`，否则很难使用 `coalesce`。"
- fmt: "### Nested CASE Expression\n\n`CASE` 也可以嵌套额外的 `CASE`。当存在多种可能性时，这很有用。\n\n例如，`sales`\
    \ 表包含订单下达的日期和时间，以及订单发货（或是否发货）的日期。\n\n我们可以使用 `CASE` 为这些日期生成状态。例如，使用 `shipped` 日期和\
    \ `ordered` 日期，可以设置以下标准：\n\n*   已发货：比较 `shipped` 和 `ordered`\n    *   超过14天 ⇒\
    \ `Shipped Late`\n*   其他情况 ⇒ `Shipped`\n\n*   未发货：比较今日与 `ordered`\n    *   少于7天\
    \ ⇒ `Current`\n    *   少于14天 ⇒ `Due`\n*   其他情况 ⇒ `Overdue`\n\n但在开始之前，请注意有些销售记录没有\
    \ `ordered` 值：\n\n```sql\nSELECT * FROM sales;\n```\n\n例如，如果客户从未结账，就可能出现这种情况。我们可能应该删除它们，但目前，我们只是将它们过滤掉：\n\
    \n```sql\nSELECT * FROM sales WHERE ordered IS NOT NULL;\n```\n\n首先，需要计算日期之间的差值。这在不同的数据库管理系统（DBMS）中有所不同：\n\
    \n```sql\n--  PostgreSQL, MariaDB / MySQL, Oracle\nSELECT\n    id, customerid,\
    \ total,\n    cast(ordered as date) AS ordered, shipped,\n    current_date - cast(ordered\
    \ as date) AS ordered_age,\n    shipped - cast(ordered as date) AS shipped_age\n\
    FROM sales\nWHERE ordered IS NOT NULL;\n--  MSSQL\nSELECT\n    id, customerid,\
    \ total,\n    cast(ordered as date) AS ordered, shipped,\n    datediff(day,ordered,current_timestamp)\
    \ AS ordered_age,\n    datediff(day,ordered,shipped) AS shipped_age\nFROM sales\n\
    WHERE ordered IS NOT NULL;\n--  SQLite\nSELECT\n    *,\n    julianday('now')-julianday(ordered)\
    \ AS ordered_age,\n    julianday(shipped)-julianday(ordered) AS shipped_age\n\
    FROM sales\nWHERE ordered IS NOT NULL;\n```\n\n你会得到类似以下的结果：\n\n| **id** | **customerid**\
    \ | **total** | **ordered** | **shipped** | **ordered_age** | **shipped_age**\
    \ |\n| --- | --- | --- | --- | --- | --- | --- |\n| 39 | 28 | 28.00 | 2022-05-15\
    \ | 2022-05-23 | 382 | 8 |\n| 40 | 27 | 34.00 | 2022-05-16 | 2022-05-24 | 381\
    \ | 8 |\n| 42 | 1 | 58.50 | 2022-05-16 | 2022-05-22 | 381 | 6 |\n| 43 | 26 | 50.00\
    \ | 2022-05-16 | [NULL] | 381 | [NULL] |\n| 45 | 26 | 17.50 | 2022-05-16 | 2022-05-28\
    \ | 381 | 12 |\n| 668 | 105 | 15.00 | 2022-07-27 | [NULL] | 309 | [NULL] |\n|\
    \ ~ 5295 rows ~ |\n\n请注意，在 SQLite 中，获取年龄的最简单方法是将日期转换为儒略日（Julian date），这是自公元前4714年11月24日正午以来的天数。说来话长。\n\
    \n现在你应该知道，在 `SELECT` 子句的其他部分不能使用计算出的值，所以如果你需要它们，这就很麻烦。然而，你可以分两步完成查询。\n\n如果将前面的查询放在一个公共表表达式（Common\
    \ Table Expression）中，就可以在主查询中使用其结果。\n\n首先，你需要区分已发货和未发货的记录：\n\n```sql\nWITH salesdata\
    \ AS (\n    -- 上述查询之一，末尾不加分号\n)\nSELECT\n    salesdata.*,\n    CASE\n        WHEN\
    \ shipped IS NOT NULL THEN\n            -- 两种状态之一\n        ELSE\n            --\
    \ 三种状态之一\n    END AS status\nFROM salesdata;\n```\n\n每种情况下的状态是额外的 `CASE` 表达式：\n\
    \n```sql\nWITH salesdata AS (\n    -- 上述查询之一，末尾不加分号\n)\nSELECT\n    salesdata.*,\n\
    \    CASE\n        WHEN shipped IS NOT NULL THEN\n            CASE\n         \
    \       WHEN shipped_age>14 THEN 'Shipped Late'\n                ELSE 'Shipped'\n\
    \            END\n        ELSE\n            CASE\n                WHEN ordered_age<7\
    \ THEN 'Current'\n                WHEN ordered_age<14 THEN 'Due'\n           \
    \     ELSE 'Overdue'\n            END\n    END AS status\nFROM salesdata;\n```\n\
    \n这将给出类似以下的结果：\n\n| **id** | **cid** | **total** | **ordered** | **shipped** |\
    \ **ordered_age** | **shipped_age** | **status** |\n| --- | --- | --- | --- |\
    \ --- | --- | --- | --- |\n| 39 | 28 | 28.00 | 2022-05-15 | 2022-05-23 | 382 |\
    \ 8 | Shipped |\n| 40 | 27 | 34.00 | 2022-05-16 | 2022-05-24 | 381 | 8 | Shipped\
    \ |\n| 42 | 1 | 58.50 | 2022-05-16 | 2022-05-22 | 381 | 6 | Shipped |\n| 43 |\
    \ 26 | 50.00 | 2022-05-16 | [NULL] | 381 | [NULL] | Overdue |\n| 45 | 26 | 17.50\
    \ | 2022-05-16 | 2022-05-28 | 381 | 12 | Shipped |\n| 668 | 105 | 15.00 | 2022-07-27\
    \ | [NULL] | 309 | [NULL] | Overdue |\n| ~ 5295 rows ~ |\n\n## Summary\n\nSQL表中的数据应该以其最纯粹、最简单的形式存储。然而，这些数据可以重新计算以提高其可用性。\n\
    \n计算可以采取多种形式：\n\n*   基于单列\n*   基于多列\n*   硬编码的字面值\n*   子查询的结果\n*   由函数计算得出\n\n\
    计算也可以用于 `WHERE` 和 `ORDER BY` 子句。\n\n### Aliases\n\n所有计算值都应该使用别名重命名。`AS` 关键字是可选的，但建议使用以减少混淆。\n\
    \n如果新名称更合理，你也可以为非计算列指定别名。\n\n别名在 `SELECT` 子句中给出，该子句在 `ORDER BY` 之前最后求值。对于大多数 DBMS，这意味着你不能在\
    \ `ORDER BY` 之外的任何其他子句中使用该别名。\n\n### NULLs\n\n表当然可能在不同的地方包含 `NULL`。通常，`NULL` 会使任何计算失效，并在结果中留下\
    \ `NULL`。\n\n你可以使用 `coalesce()` 函数绕过 `NULL`，该函数用一个替代值替换 `NULL`。你也可以使用 `CASE ...\
    \ END` 表达式。\n\n### Casting Types\n\nSQL 主要处理三种数据类型：\n\n*   数字\n*   日期和时间\n*  \
    \ 字符串\n\n你可能需要改变数据类型。这是通过 `cast()` 函数完成的。\n\n当在主要类型内进行转换时，效果是改变类型的精度或大小。\n\n当在主要类型之间转换时，通常是为了兼容性。虽然转换为字符串通常是可能的且经常是自动的，但从字符串转换可能并不总是成功。不同的\
    \ DBMS 对不成功的转换有不同的反应。\n\n### Calculating with Numbers\n\n你可以对所有数字类型执行基本算术。不同的\
    \ DBMS 对处理整数有不同的态度。\n\nSQL 包含多种处理数字的函数，包括：\n\n*   数学函数\n*   近似函数\n\n还有一些格式化函数，它们生成格式化后的字符串结果。\n\
    \n### Calculating with Strings\n\n字符串可能以各种方式存储。通常，字符串使用 ASCII 或 Unicode。字符串操作可能区分大小写，也可能不区分，这取决于数据库的排序规则（collation）。\n\
    \n字符串的基本简单操作是连接（concatenation）。通常有一个简单的运算符来完成此操作。\n\n其他字符串操作涉及字符串函数。\n\n### Calculating\
    \ with Dates\n\n请注意，SQLite 没有日期数据类型。它确实包含一些将字符串或数字转换为日期的函数。\n\n对于日期，以下操作很常见：\n\
    \n*   输入并存储日期和时间\n*   获取当前日期和时间\n*   提取日期或时间的一部分\n*   格式化日期\n*   一些简单的算术，例如日期和时间之间的差值，以及修改日期和时间\n\
    \n### The CASE Expression\n\n`CASE` 表达式允许你从多个备选值中进行选择。`case` 表达式可用于简化值，也可用于对它们进行分组。\n\
    \n`CASE` 表达式有一种简单形式，可用于离散值。\n\n`CASE` 表达式也可以嵌套以形成更复杂的表达式。\n\n## Coming Up\n\n\
    既然我们已经处理过表数据了，我们现在可以开始分析它。\n\n下一章将介绍使用聚合函数和分组来汇总数据。我们将涵盖 SQL 中数据聚合的方式、基本聚合函数，以及如何汇总到一个或多个组中。\n\
    \n我们还将研究在不同级别组合聚合，以及数值数据的一些基本统计。"
  raw: "### Nested CASE Expression\n\n`CASE` can also be nested with additional `CASE`s.\
    \ This is useful when there are possibilities within possibilities.\n\nFor example,\
    \ the `sales` table has the date and time when the order was placed and the date\
    \ when (or if) the order was shipped.\n\nWe can use `CASE` to generate a status\
    \ for these dates. For example, using the `shipped` date and `ordered` date, you\
    \ can set up the following criteria:\n\n*   Shipped: Compare `shipped` to `ordered`\n\
    \    *   14 days ⇒ `Shipped Late`\n\n*   Else `Shipped`\n\n*   Not Shipped: Compare\
    \ Today to `ordered`\n    *   < 7 days ⇒ `Current`\n\n*   < 14 days ⇒ `Due`\n\n\
    *   Else `Overdue`\n\nBefore we get going, however, note that some sales have\
    \ no `ordered` value:\n\n```\nSELECT * FROM sales;\n```\n\nThat might be, for\
    \ example, if the customer never checked out the order. We probably should get\
    \ rid of them, but, for now, we’ll just filter them out:\n\n```\nSELECT * FROM\
    \ sales WHERE ordered IS NOT NULL;\n```\n\nThe first thing you’ll have to do is\
    \ to calculate the difference between dates. This varies between DBMSs:\n\n```\n\
    --  PostgreSQL, MariaDB / MySQL, Oracle\nSELECT\nid, customerid, total,\ncast(ordered\
    \ as date) AS ordered, shipped,\ncurrent_date - cast(ordered as date) AS ordered_age,\n\
    shipped - cast(ordered as date) AS shipped_age\nFROM sales\nWHERE ordered IS NOT\
    \ NULL;\n--  MSSQL\nSELECT\nid, customerid, total,\ncast(ordered as date) AS ordered,\
    \ shipped,\ndatediff(day,ordered,current_timestamp) AS ordered_age,\ndatediff(day,ordered,shipped)\
    \ AS shipped_age\nFROM sales\nWHERE ordered IS NOT NULL;\n--  SQLite\nSELECT\n\
    *,\njulianday('now')-julianday(ordered) AS ordered_age,\njulianday(shipped)-julianday(ordered)\
    \ AS shipped_age\nFROM sales\nWHERE ordered IS NOT NULL;\n```\n\nYou’ll get the\
    \ following:\n\n| **id** | **customerid** | **total** | **ordered** | **shipped**\
    \ | **ordered_age** | **shipped_age** |\n| --- | --- | --- | --- | --- | --- |\
    \ --- |\n| 39 | 28 | 28.00 | 2022-05-15 | 2022-05-23 | 382 | 8 |\n| 40 | 27 |\
    \ 34.00 | 2022-05-16 | 2022-05-24 | 381 | 8 |\n| 42 | 1 | 58.50 | 2022-05-16 |\
    \ 2022-05-22 | 381 | 6 |\n| 43 | 26 | 50.00 | 2022-05-16 | [NULL] | 381 | [NULL]\
    \ |\n| 45 | 26 | 17.50 | 2022-05-16 | 2022-05-28 | 381 | 12 |\n| 668 | 105 | 15.00\
    \ | 2022-07-27 | [NULL] | 309 | [NULL] |\n| ~ 5295 rows ~ |\n\nNote that with\
    \ SQLite, the simplest way to get an age is to convert dates to a Julian date,\
    \ which is the number of days since Noon, 24 November 4714 BC. Long story.\n\n\
    You know by now that you can’t use the calculated values in other parts of the\
    \ SELECT clause, so that’s awkward if you need them. You can, however, do the\
    \ query in two steps.\n\nIf you put the preceding query in a Common Table Expression,\
    \ you can then use the results in the main query.\n\nFirst, you need to distinguish\
    \ between those which have been shipped and those which haven’t:\n\n```\nWITH\
    \ salesdata AS (\n--  one of the above queries WITHOUT the semicolon\n)\nSELECT\n\
    salesdata.*,\nCASE\nWHEN shipped IS NOT NULL THEN\n--  One of two statuses\nELSE\n\
    --  One of three statuses\nEND AS status\nFROM salesdata;\n```\n\nThe statuses\
    \ in each case are additional `CASE` expressions:\n\n```\nWITH salesdata AS (\n\
    --  one of the above queries WITHOUT the semicolon\n)\nSELECT\nsalesdata.*,\n\
    CASE\nWHEN shipped IS NOT NULL THEN\nCASE\nWHEN shipped_age>14 THEN 'Shipped Late'\n\
    ELSE 'Shipped'\nEND\nELSE\nCASE\nWHEN ordered_age<7 THEN 'Current'\nWHEN ordered_age<14\
    \ THEN 'Due'\nELSE 'Overdue'\nEND\nEND AS status\nFROM salesdata;\n```\n\nThis\
    \ will give you something like\n\n| **id** | **cid** | **total** | **ordered**\
    \ | **shipped** | **ordered_age** | **shipped_age** | **status** |\n| --- | ---\
    \ | --- | --- | --- | --- | --- | --- |\n| 39 | 28 | 28.00 | 2022-05-15 | 2022-05-23\
    \ | 382 | 8 | Shipped |\n| 40 | 27 | 34.00 | 2022-05-16 | 2022-05-24 | 381 | 8\
    \ | Shipped |\n| 42 | 1 | 58.50 | 2022-05-16 | 2022-05-22 | 381 | 6 | Shipped\
    \ |\n| 43 | 26 | 50.00 | 2022-05-16 | [NULL] | 381 | [NULL] | Overdue |\n| 45\
    \ | 26 | 17.50 | 2022-05-16 | 2022-05-28 | 381 | 12 | Shipped |\n| 668 | 105 |\
    \ 15.00 | 2022-07-27 | [NULL] | 309 | [NULL] | Overdue |\n| ~ 5295 rows ~ |\n\n\
    ## Summary\n\nData in an SQL table should be stored in its purest, simplest form.\
    \ However, this data can be recalculated to increase its usefulness.\n\nCalculations\
    \ can take a number of forms:\n\n*   Based on single columns\n\n*   Based on multiple\
    \ columns\n\n*   Hard-coded literal values\n\n*   Results of a subquery\n\n* \
    \  Calculated from a function\n\nCalculations can also be used in the `WHERE`\
    \ and `ORDER BY` clause.\n\n### Aliases\n\nAll calculated values should be renamed\
    \ with an alias. The word `AS` is optional, but is recommended to reduce confusion.\n\
    \nYou can also alias noncalculated columns if the new name makes more sense.\n\
    \nAliases are given in the `SELECT` clause, which is evaluated last before `ORDER\
    \ BY`. For most DBMSs, this means that you can’t use the alias in any other clause\
    \ but the `ORDER BY`.\n\n### NULLs\n\nA table may, of course, include `NULL`s\
    \ in various places. As a rule, a `NULL` will wipe out any calculation, leaving\
    \ `NULL` in its wake.\n\nYou can bypass `NULL`s with the `coalesce()` function\
    \ which replaces `NULL` with an alternative value. You might also use a `CASE\
    \ ... END` expression.\n\n### Casting Types\n\nSQL works with three main data\
    \ types:\n\n*   Numbers\n\n*   Dates and times\n\n*   Strings\n\nYou may need\
    \ to change the data type. This is done with the `cast()` function.\n\nWhen you\
    \ cast within a major type, the effect is to change the precision or size of the\
    \ type.\n\nWhen you cast between major types, it is usually for compatibility.\
    \ While casting *to* a string is usually possible and often automatic, casting\
    \ *from* a string may not always succeed. Different DBMSs have different reactions\
    \ to an unsuccessful cast.\n\n### Calculating with Numbers\n\nYou can perform\
    \ basic arithmetic on all number types. Different DBMSs have various attitudes\
    \ to working with integers.\n\nSQL will include various functions to work with\
    \ numbers, including\n\n*   Mathematical functions\n\n*   Approximation functions\n\
    \nThere are also formatting functions which generate a formatted result as a string.\n\
    \n### Calculating with Strings\n\nStrings may be stored in various ways. Typically,\
    \ a string uses ASCII or Unicode. String operations may or may not be case sensitive,\
    \ depending on the collation of the database.\n\nThe basic simple operation with\
    \ strings is concatenation. There is usually a simple operator to do this.\n\n\
    Other string operations involve string functions.\n\n### Calculating with Dates\n\
    \nNote that SQLite doesn’t have a date data type. It does include some functions\
    \ to convert strings or numbers to dates.\n\nWith dates, the following operations\
    \ are common:\n\n*   Entering and storing a date and time\n\n*   Getting the current\
    \ date and time\n\n*   Extracting part of the date or time\n\n*   Formatting a\
    \ date\n\n*   Some simple arithmetic, such as the difference between dates and\
    \ times, and modifying a date and time\n\n### The CASE Expression\n\nThe `CASE`\
    \ expression allows you to choose from a number of alternative values. The case\
    \ expression can be used to simplify values, as well as to group them.\n\nThere\
    \ is a simple form of the `CASE` expression which can be used for discrete values.\n\
    \n`CASE` expressions can also be nested for more complex expressions.\n\n## Coming\
    \ Up\n\nNow that we’ve worked with table data, we can now start looking at analyzing\
    \ it.\n\nThe next chapter will look at summarizing data with aggregate functions\
    \ and grouping. We’ll cover how data is aggregated in SQL, the basic aggregate\
    \ functions, and summarizing into one or more groups.\n\nWe’ll also look at combining\
    \ aggregates at various levels, as well as some basic statistics on numerical\
    \ data."
  trans: "\n### 嵌套的 CASE 表达式\n\n`CASE` 也可以嵌套额外的 `CASE`。当存在多种可能性时，这很有用。\n\n例如，`sales`\
    \ 表包含订单下达的日期和时间，以及订单发货（或是否发货）的日期。\n\n我们可以使用 `CASE` 为这些日期生成状态。例如，使用 `shipped` 日期和\
    \ `ordered` 日期，可以设置以下标准：\n\n*   已发货：比较 `shipped` 和 `ordered`\n    *   超过 14 天\
    \ ⇒ `发货延迟`\n*   其他情况 ⇒ `已发货`\n\n*   未发货：比较今日与 `ordered`\n    *   少于 7 天 ⇒ `当前`\n\
    \    *   少于 14 天 ⇒ `到期`\n*   其他情况 ⇒ `逾期`\n\n但在开始之前，请注意有些销售记录没有 `ordered` 值：\n\n\
    ```sql\nSELECT * FROM sales;\n```\n\n例如，如果客户从未结账，就可能出现这种情况。我们可能应该删除它们，但目前，我们只是将它们过滤掉：\n\
    \n```sql\nSELECT * FROM sales WHERE ordered IS NOT NULL;\n```\n\n首先，需要计算日期之间的差值。这在不同的数据库管理系统（DBMS）中有所不同：\n\
    \n```sql\n--  PostgreSQL, MariaDB / MySQL, Oracle\nSELECT\n    id, customerid,\
    \ total,\n    cast(ordered as date) AS ordered, shipped,\n    current_date - cast(ordered\
    \ as date) AS ordered_age,\n    shipped - cast(ordered as date) AS shipped_age\n\
    FROM sales\nWHERE ordered IS NOT NULL;\n--  MSSQL\nSELECT\n    id, customerid,\
    \ total,\n    cast(ordered as date) AS ordered, shipped,\n    datediff(day,ordered,current_timestamp)\
    \ AS ordered_age,\n    datediff(day,ordered,shipped) AS shipped_age\nFROM sales\n\
    WHERE ordered IS NOT NULL;\n--  SQLite\nSELECT\n    *,\n    julianday('now')-julianday(ordered)\
    \ AS ordered_age,\n    julianday(shipped)-julianday(ordered) AS shipped_age\n\
    FROM sales\nWHERE ordered IS NOT NULL;\n```\n\n你会得到类似以下的结果：\n\n| **id** | **customerid**\
    \ | **total** | **ordered** | **shipped** | **ordered_age** | **shipped_age**\
    \ |\n| --- | --- | --- | --- | --- | --- | --- |\n| 39 | 28 | 28.00 | 2022-05-15\
    \ | 2022-05-23 | 382 | 8 |\n| 40 | 27 | 34.00 | 2022-05-16 | 2022-05-24 | 381\
    \ | 8 |\n| 42 | 1 | 58.50 | 2022-05-16 | 2022-05-22 | 381 | 6 |\n| 43 | 26 | 50.00\
    \ | 2022-05-16 | [NULL] | 381 | [NULL] |\n| 45 | 26 | 17.50 | 2022-05-16 | 2022-05-28\
    \ | 381 | 12 |\n| 668 | 105 | 15.00 | 2022-07-27 | [NULL] | 309 | [NULL] |\n|\
    \ ~ 5295 rows ~ |\n\n请注意，在 SQLite 中，获取年龄的最简单方法是将日期转换为儒略日（Julian date），这是自公元前 4714\
    \ 年 11 月 24 日正午以来的天数。说来话长。\n\n现在你应该知道，在 `SELECT` 子句的其他部分不能使用计算出的值，所以如果你需要它们，这就很麻烦。然而，你可以分两步完成查询。\n\
    \n如果将前面的查询放在一个公共表表达式（Common Table Expression）中，就可以在主查询中使用其结果。\n\n首先，你需要区分已发货和未发货的记录：\n\
    \n```sql\nWITH salesdata AS (\n    -- 上述查询之一，末尾不加分号\n)\nSELECT\n    salesdata.*,\n\
    \    CASE\n        WHEN shipped IS NOT NULL THEN\n            -- 两种状态之一\n    \
    \    ELSE\n            -- 三种状态之一\n    END AS status\nFROM salesdata;\n```\n\n\
    每种情况下的状态是额外的 `CASE` 表达式：\n\n```sql\nWITH salesdata AS (\n    -- 上述查询之一，末尾不加分号\n\
    )\nSELECT\n    salesdata.*,\n    CASE\n        WHEN shipped IS NOT NULL THEN\n\
    \            CASE\n                WHEN shipped_age>14 THEN '发货延迟'\n         \
    \       ELSE '已发货'\n            END\n        ELSE\n            CASE\n        \
    \        WHEN ordered_age<7 THEN '当前'\n                WHEN ordered_age<14 THEN\
    \ '到期'\n                ELSE '逾期'\n            END\n    END AS status\nFROM salesdata;\n\
    ```\n\n这将给出类似以下的结果：\n\n| **id** | **cid** | **total** | **ordered** | **shipped**\
    \ | **ordered_age** | **shipped_age** | **status** |\n| --- | --- | --- | ---\
    \ | --- | --- | --- | --- |\n| 39 | 28 | 28.00 | 2022-05-15 | 2022-05-23 | 382\
    \ | 8 | 已发货 |\n| 40 | 27 | 34.00 | 2022-05-16 | 2022-05-24 | 381 | 8 | 已发货 |\n\
    | 42 | 1 | 58.50 | 2022-05-16 | 2022-05-22 | 381 | 6 | 已发货 |\n| 43 | 26 | 50.00\
    \ | 2022-05-16 | [NULL] | 381 | [NULL] | 逾期 |\n| 45 | 26 | 17.50 | 2022-05-16\
    \ | 2022-05-28 | 381 | 12 | 已发货 |\n| 668 | 105 | 15.00 | 2022-07-27 | [NULL] |\
    \ 309 | [NULL] | 逾期 |\n| ~ 5295 rows ~ |\n\n## 总结\n\nSQL 表中的数据应该以其最纯粹、最简单的形式存储。然而，这些数据可以重新计算以提高其可用性。\n\
    \n计算可以采取多种形式：\n\n*   基于单列\n*   基于多列\n*   硬编码的字面值\n*   子查询的结果\n*   由函数计算得出\n\n\
    计算也可以用于 `WHERE` 和 `ORDER BY` 子句。\n\n### 别名\n\n所有计算值都应该使用别名重命名。`AS` 关键字是可选的，但建议使用以减少混淆。\n\
    \n如果新名称更合理，你也可以为非计算列指定别名。\n\n别名在 `SELECT` 子句中给出，该子句在 `ORDER BY` 之前最后求值。对于大多数 DBMS，这意味着你不能在\
    \ `ORDER BY` 之外的任何其他子句中使用该别名。\n\n### NULL 值\n\n表当然可能在不同的地方包含 `NULL`。通常，`NULL`\
    \ 会使任何计算失效，并在结果中留下 `NULL`。\n\n你可以使用 `coalesce()` 函数绕过 `NULL`，该函数用一个替代值替换 `NULL`。你也可以使用\
    \ `CASE ... END` 表达式。\n\n### 类型转换\n\nSQL 主要处理三种数据类型：\n\n*   数字\n*   日期和时间\n* \
    \  字符串\n\n你可能需要改变数据类型。这是通过 `cast()` 函数完成的。\n\n当在主要类型内进行转换时，效果是改变类型的精度或大小。\n\n\
    当在主要类型之间转换时，通常是为了兼容性。虽然转换为字符串通常是可能的且经常是自动的，但从字符串转换可能并不总是成功。不同的 DBMS 对不成功的转换有不同的反应。\n\
    \n### 数字计算\n\n你可以对所有数字类型执行基本算术。不同的 DBMS 对处理整数有不同的态度。\n\nSQL 包含多种处理数字的函数，包括：\n\n\
    *   数学函数\n*   近似函数\n\n还有一些格式化函数，它们生成格式化后的字符串结果。\n\n### 字符串计算\n\n字符串可能以各种方式存储。通常，字符串使用\
    \ ASCII 或 Unicode。字符串操作可能区分大小写，也可能不区分，这取决于数据库的排序规则（collation）。\n\n字符串的基本简单操作是连接（concatenation）。通常有一个简单的运算符来完成此操作。\n\
    \n其他字符串操作涉及字符串函数。\n\n### 日期计算\n\n请注意，SQLite 没有日期数据类型。它确实包含一些将字符串或数字转换为日期的函数。\n\
    \n对于日期，以下操作很常见：\n\n*   输入并存储日期和时间\n*   获取当前日期和时间\n*   提取日期或时间的一部分\n*   格式化日期\n\
    *   一些简单的算术，例如日期和时间之间的差值，以及修改日期和时间\n\n### CASE 表达式\n\n`CASE` 表达式允许你从多个备选值中进行选择。`CASE`\
    \ 表达式可用于简化值，也可用于对它们进行分组。\n\n`CASE` 表达式有一种简单形式，可用于离散值。\n\n`CASE` 表达式也可以嵌套以形成更复杂的表达式。\n\
    \n## 后续内容\n\n既然我们已经处理过表数据了，我们现在可以开始分析它。\n\n下一章将介绍使用聚合函数和分组来汇总数据。我们将涵盖 SQL 中数据聚合的方式、基本聚合函数，以及如何汇总到一个或多个组中。\n\
    \n我们还将研究在不同级别组合聚合，以及数值数据的一些基本统计。\n"
- fmt: "# 5. Aggregating Data\n\nDatabases store data. That’s obvious, but the data\
    \ itself is pretty inert—you save it, you retrieve it, and you sometimes change\
    \ it. That’s OK for some things, but sometimes you want the data to work a little\
    \ harder.\n\nYou can put the data to work when you start to summarize it. You\
    \ can then see trends, see where it’s going, or just get an overview of the data.\n\
    \nAggregate functions are used to calculate summaries of data. They have three\
    \ contexts:\n\n*   Summarize the whole table.\n*   Summarize in groups, using\
    \ `GROUP BY`.\n*   Include summaries row by row. This is done with `window functions`,\
    \ using the `OVER` clause.\n\nYou’ll learn about window functions in Chapter [8](#606708_1_En_8_Chapter.xhtml).\
    \ In this chapter, we look at how to calculate summaries, either wholly or in\
    \ groups, using SQL’s built-in aggregate functions.\n\n## The Basic Aggregate\
    \ Functions\n\nYou’ve no doubt already had some experience with aggregate functions.\
    \ The aggregate functions are basically statistical in nature and include\n\n\
    *   `count`\n\n    Count the number of values in a column, regardless of what\
    \ the actual value is. As a special case, `count(*)` counts the number of rows\
    \ in a table.\n*   `sum` and `avg`\n\n    Add or average the values in a column.\
    \ Of course, you can only do this if the column is numeric.\n*   `max` and `min`\n\
    \n    Find the maximum or minimum value in a column. In case the interpretation\
    \ is unclear, they find the first and last values you’d get if you used `ORDER\
    \ BY`, except, of course, for the `NULL`s, which are always ignored.\n*   `stddev`,\
    \ `stddev_samp`, `stddev_pop` (PostgreSQL, MySQL/MariaDB, Oracle) or `stdev`,\
    \ `stdevp` (MSSQL)\n\n    Find the standard deviation of the column values. This\
    \ is either the population or sample standard deviation. Again, this only works\
    \ with numeric columns.\n\n    The actual name (and spelling) tends to vary slightly\
    \ between DBMS. PostgreSQL treats `stddev` as a synonym for `stddev_samp`. MySQL/MariaDB\
    \ treats it as a synonym for `stddev_pop`. Oracle treats it as a variation of\
    \ `stddev_samp`.\n\nThere are various other aggregate functions, depending on\
    \ the DBMS, but the preceding ones are fairly typical.\n\nFor example:\n\n```sql\n\
    --  Book Data\nSELECT\n--  Count Rows:\ncount(*) AS nbooks,\n--  Count Values\
    \ in a column:\ncount(price) AS prices,\n--  Cheapest & Most Expensive\nmin(price)\
    \ AS cheapest, max(price) AS priciest\nFROM books;\n```\n\nYou get results like\
    \ these:\n\n| **nbooks** | **prices** | **cheapest** | **priciest** |\n| --- |\
    \ --- | --- | --- |\n| 1201 | 1096 | 10 | 20 |\n\nOr for numerical statistics:\n\
    \n```sql\n--  Customer Data\nSELECT\n--  Count Rows:\ncount(*) AS ncustomers,\n\
    --  Count Values in a column:\ncount(phone) AS phones,\n--  Height Statistics\n\
    stddev_samp(height) AS sd   --  MSSQL: stdev(height)\nFROM customers;\n```\n\n\
    You get results like these:\n\n| **ncustomers** | **phones** | **sd** |\n| ---\
    \ | --- | --- |\n| 303 | 286 | 6.992 |\n\nAll of these functions are applicable\
    \ to numbers, but only the following may be used for other data, such as strings\
    \ and dates:\n\n*   `count`\n*   `max` and `min`\n\nFor example:\n\n```sql\nSELECT\n\
    --  Count Values in a column:\ncount(dob) AS dobs,\n--  Earliest & Latest\nmin(dob)\
    \ AS earliest, max(dob) AS latest\nFROM customers;\n```\n\ngives you\n\n| **Dobs**\
    \ | **earliest** | **latest** |\n| --- | --- | --- |\n| 239 | 1943-05-18 | 2003-01-27\
    \ |\n\nWe’ve been a little bit relaxed in the preceding descriptions. In particular\n\
    \n*   A table may be a virtual table, such as a view, a join, or a common table\
    \ expression.\n*   Any table with a `WHERE` clause will be filtered *before* the\
    \ aggregates are applied.\n*   By value, we definitely don’t include `NULL`. That’s\
    \ particularly apparent when you find that `count()` ignores `NULL`s and that\
    \ `avg()` is divided by the non-`NULL` values.\n*   These functions apply to either\
    \ the whole table or groups of rows.\n\n### `NULL`\n\nAggregate functions do not\
    \ include `NULL`s. The only time this is not obvious is when using the sum function.\
    \ However, it is significant to note that\n\n*   `count(column)` will only count\
    \ the non-`NULL` values in the column, so you may get fewer than the total number\
    \ of rows.\n*   `avg(column)` will also ignore the `NULL` values, so the average\
    \ is divided only by the number of values, not necessarily the number of rows.\n\
    \nTo put it another way, there is a world of difference between `NULL` on one\
    \ hand and `0` or `''` on the other.\n\nWe’ll take advantage of this fact when\
    \ we look at aggregate filters later."
