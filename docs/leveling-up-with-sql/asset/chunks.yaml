- fmt: "# 3. Table Relationships and Joins\n\nA database is not just one table. Well,\
    \ it can be of course, but any sophisticated database, such as one which you would\
    \ use to manage an online bookshop, will comprise a number of tables, each handling\
    \ a different collection of data.\n\nWhile you can get some useful information\
    \ from examining individual tables, you will get so much more from combining tables.\n\
    \nIn this chapter, we will look at working with multiple tables, how they are\
    \ related to each other, and how to combine them when the time comes.\n\nSpecifically,\
    \ we’ll look at\n\n*   What we mean by table relationships and their main types\n\
    *   How one-to-many relationships are used to manage multiple values\n*   How\
    \ one-to-one relationships are used to extend one table with another\n*   How\
    \ many-to-many relationships are used to manage more complex multiple values\n\
    *   How to work with inserting and updating data in multiple tables\n\nWe’ll look\
    \ at why the database is structured this way with multiple tables and how we can\
    \ use joins to combine them into virtual tables.\n\n## An Overview of Relationships\n\
    \nA well-structured database adheres to a number of important design principles.\
    \ Two of these are as follows:\n\n*   Each table has one type of data only and\
    \ doesn’t include data which rightly belongs in another table.\n    For example,\
    \ the `customers` table doesn’t include book details, and the `books` table doesn’t\
    \ include customer details. This would also apply to the `books` and `authors`\
    \ tables.\n    That isn’t to say that the `books` table isn’t aware of the author\
    \ at all. We’ll look at that in a moment.\n*   Data is never repeated. The same\
    \ item of data is not to be found in a different table, nor will it be repeated\
    \ in the same table.\n    For example, if you were to include the author’s name\
    \ and other details in the `books` table, you would find yourself repeating the\
    \ same details for other books by the same author.\n\nThese two principles are\
    \ related: if you mix author details with the books, violating the first principle,\
    \ you will end up repeating the details for multiple books, violating the second\
    \ principle.\n\nThe correct way to manage books and authors is to put author details\
    \ in a separate table and for the `books` table to include a `reference` to one\
    \ of the authors. In this way, we say that there is a `relationship` between the\
    \ two tables.\n\nThe same would apply to the `books` and `customers` tables. Since\
    \ the goal is for customers to buy books, there should be a relationship between\
    \ these tables as well. However, this relationship is a little more complex, as\
    \ we shall see later.\n\nThere are three main types of relationships:\n\n*   A\
    \ `one-to-many` relationship is between the `primary key` of one table and a foreign\
    \ key of another.\n    For example, there is a one-to-many relationship between\
    \ `authors` and `books`: one author can have many books, and many books can have\
    \ the same author.\n*   A `one-to-one` relationship is between the `primary key`\
    \ of one table and the `primary key` of another. Generally, this is rare, and\
    \ you are more likely to see a variation of this.\n    For example, there is a\
    \ `vip` table of additional features for customers. For each customer, there can\
    \ only be one `vip` entry, and there is a (modified) one-to-one relationship between\
    \ the two tables.\n*   A `many-to-many` relationship is not a direct relationship,\
    \ but one that involves a joining table between the two main tables.\n    For\
    \ example, there is a `genres` table which contains possible genre labels for\
    \ books. Since one book could have many genres, and one genre could apply to many\
    \ books, there is a many-to-many relationship between the two tables.\n    You\
    \ will see that this is implemented with an additional table.\n\nThese relationships\
    \ might be described as `planned` relationships. They’re usually enforced with\
    \ foreign key constraints, usually involve a primary key, and define a tight structure\
    \ for the database.\n\nThere can also be unplanned relationships. For example,\
    \ you might consider a relationship between birthdays of customers and authors.\
    \ That sort of relationship would probably be a coincidence, but might be worth\
    \ exploring in some situations—maybe Scorpios feel an affinity with other Scorpios.\n\
    \nWe’ll refer to unplanned relationships as `ad hoc` relationships and look at\
    \ a few later.\n\nIf you have multiple tables in a planned or unplanned relationship,\
    \ you can examine the combination using a `JOIN`."
