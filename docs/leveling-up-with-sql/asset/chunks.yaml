    END;

    ```


    `FOR EACH ROW` 子句是可选的，因为在 SQLite 中目前没有其他替代选项。不过，包含它是为了明确指出该触发器应用于即将被删除的每一行。


    现在你可以测试这个触发器了。


    #### Oracle 触发器


    在 Oracle 中编写触发器代码与之前概述的基本代码类似，但有一些复杂因素需要我们设法规避。


    在此之前，我们可以编写删除触发器的代码：


    ```

    --  DROP TRIGGER archive_sales_trigger;

    ```


    代码被注释掉了，因为 Oracle 不支持 `IF EXISTS`。


    第一个复杂因素是触发器代码由多个语句组成，因此很难分辨哪些语句属于同一个代码块。


    Oracle 提供了一个替代的语句分隔符，用于当你需要组合多个语句时：


    ```

    /

    CREATE TRIGGER archive_sales_trigger

    BEFORE DELETE ON sales

    FOR EACH ROW

    BEGIN

    ...

    END;

    /

    ```


    代码前后的斜杠 (`/`) 定义了代码块。斜杠之间的所有内容，包括以分号结尾的语句，都将被视为一个代码块。


    第二个复杂因素是 Oracle 不喜欢修改触发操作的表本身。解决方案是告诉 Oracle 该代码属于一个独立的事务：


    ```

    CREATE TRIGGER archive_sales_trigger

    BEFORE DELETE ON sales

    FOR EACH ROW

    DECLARE

    PRAGMA AUTONOMOUS_TRANSACTION;

    BEGIN

    ...

    COMMIT;

    END;

    ```


    事务是一组可以撤销（“回滚”）的更改（如果出现问题）。然而，要保留更改，你需要使用 `COMMIT` 语句。


    其余代码与之前讨论的非常相似：


    ```

    /

    CREATE TRIGGER archive_sales_trigger

    BEFORE DELETE ON sales

    FOR EACH ROW

    DECLARE

    PRAGMA AUTONOMOUS_TRANSACTION;

    BEGIN

    INSERT INTO deleted_sales(saleid, customerid, items, deleted_date)

    WITH cte(saleid,customerid,items) AS (

    SELECT

    s.id, s.customerid,

    listagg(si.bookid||'':''||si.quantity,'';'')

    FROM sales s JOIN saleitems si ON s.id=si.saleid

    WHERE s.id=:old.id

    GROUP BY s.id, s.customerid

    )

    SELECT saleid, customerid, items, current_timestamp

    FROM cte;

    COMMIT;

    END;

    /

    ```


    现在你可以测试这个触发器了。


    ### 触发器的优缺点


    触发器的主要作用是为数据库添加原本不存在的行为。例如，DBMS 已经支持默认值和列约束，因此，虽然你可以使用触发器来实现类似的功能，但应该首先检查内置特性是否能满足需求。


    触发器曾经派上用场的一个例子是早期版本的 Oracle。其他 DBMS 很早就实现了自增主键，但 Oracle 直到较新的版本才支持。在这种情况下，你会使用一个触发器来维护和利用一个单独的序列，为下一行插入的数据填充主键。


    我们之前已经提到过一些情况，例如你可能希望为列提供一个比内置默认功能更复杂的默认值，或者你可能希望自动更新某个列。在这种情况下，触发器或许能提供这种额外功能。


    然而，触发器也可能被滥用。如果一个表上有 DML 触发器，那么每次你对表数据进行任何更改时，总会有一点额外的工作，这可能会增加额外的负担。


    另一个问题是触发器可能会给数据库增加一些神秘感，特别是对数据库的其他用户而言。每次你做某件事时，总会引发其他事情的发生。这可能会使故障排查变得棘手一些，也让检查数据是否正确变得困难一些。

    '
- fmt: '## Pivoting Data


    One of the important principles of good database design is that each column does
    a different job. On top of that, each column is independent of the other columns.
    That’s one reason why we put so much effort separating out the town details from
    the `customers` table in Chapter [2](#606708_1_En_2_Chapter.xhtml).


    There are some situations, however, where this sort of design doesn’t suit analysis.
    Take, for example, a typical ledger type of table:


    | **date** | **description** | **food** | **travel** | **accommodation** | **misc**
    |

    | --- | --- | --- | --- | --- | --- |

    | . . . | . . . | . . . | . . . | . . . | . . . |

    | . . . | . . . | . . . | . . . | . . . | . . . |


    This is a layout that’s very easy to understand and analyze. If you want to get
    the totals for a particular category, just add down the column. If you want to
    get the totals for a particular item, just add across. This sort of thing used
    to be done by hand until spreadsheets were invented to let the computer do all
    the hard work.


    You may see this sort of design in database tables you come across. However, it’s
    not a good design for SQL tables:


    *   Putting a value in one column precludes putting it in another: the columns
    are deeply dependent.

    *   You will end up with very many empty spaces.

    *   A new category means adding a new column to the table design. You may end
    up with a huge number of columns.

    *   The data is harder to analyze, because now you need calculate across *columns*:
    SQL aggregate functions are designed to aggregate across *rows*.


    A better design would be


    | **Date** | **description** | **category** | **amount** |

    | --- | --- | --- | --- |

    | . . . | . . . | . . . | . . . |

    | . . . | . . . | . . . | . . . |


    As a general rule, the categories should be in rows, not columns.


    Still, it would be nice to be able to get the data from the second form into the
    first form. You can use it in presentations and possibly turn it into amazing
    charts.


    ### Pivoting the Data


    Generating the first type of result from the second is called pivoting the data.
    The idea is that the categories pivot (swing) around, from vertical to horizontal.


    If you read the data in a spreadsheet program, you can pivot the data simply.
    However, you can also generate pivoted data directly within the database, though
    it’s not quite so simple.


    Generating the pivot table in the spreadsheet has the following advantages:


    *   It is more interactive, and you can easily change what is being pivoted and
    summarized.

    *   The spreadsheet will more automatically generate the categories; as you will
    see, this is not so convenient from within the database.

    *   You’re only a step away from turning it into a chart.


    On the other hand, using the database has the following advantages:


    *   The data is generated in a single environment.

    *   You can create a view to regenerate the pivot table at any time.


    There are two main ways you can generate a pivot table in SQL:


    *   Manually: Using a `GROUP BY` clause, you can aggregate the data in multiple
    columns.

    *   MSSQL and Oracle have a built-in pivot table feature to do this for you. PostgreSQL
    also has one, but it’s not built in and requires installation.


    Since the purpose of pivoting data is to create summaries, you often need to use
    a grouped field or to group the values yourself. For example:


    *   You can use the existing `state` column which is a group of addresses.

    *   You can use date functions, such as `month()` to group dates by month.

    *   You can use string functions to extract a common part of a string.


    The pivot table will look something like this:


    | **row groups** | **column group** | **column group** | **column group** |

    | --- | --- | --- | --- |

    | group 1 | . . . | . . . | . . . |

    | group 2 | . . . | . . . | . . . |

    | group 3 | . . . | . . . | . . . |


    We’re going to see how to pivot data from the `sales` and `customers` tables to
    get total sales by state and VIP categories. The result will look something like
    this:


    | **State** | **gold** | **silver** | **bronze** |

    | --- | --- | --- | --- |

    | . . . | . . . | . . . | . . . |

    | . . . | . . . | . . . | . . . |

    | . . . | . . . | . . . | . . . |


    In principle, you could transpose the table and have the VIP groups go down, with
    the states going across. This version, however, will look neater.'
