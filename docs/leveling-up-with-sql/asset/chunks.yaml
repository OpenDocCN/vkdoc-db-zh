    在本章中，我们研究了在查询中使用子查询的各种变体。我们在前面的章节中已经看到过一些子查询，但在这里我们更仔细地研究了它们的工作原理。


    子查询可以在任何子句中使用。子查询的结果必须匹配该子句的上下文：


    *   `SELECT`子句或简单`WHERE`表达式中的子查询需要返回单个值。

    *   在`IN()`表达式中使用的子查询需要返回单个列。

    *   `FROM`子句中使用的子查询需要返回一个虚拟表。


    你也可以在`ORDER BY`子句中使用子查询，尽管你可能更希望在`SELECT`子句中使用该表达式。


    你还可以将子查询与`WHERE EXISTS`表达式或`LATERAL`连接一起使用。


    `FROM`子句中的子查询可以嵌套，尽管你可能更希望使用公用表表达式。


    ### 关联与非关联子查询


    子查询可以是关联的或非关联的：


    *   非关联子查询独立于主查询，并被计算一次。然后结果用于主查询。

    *   关联子查询是引用主查询中数据的那种。它为每一行计算一次。


    关联子查询可能代价高昂，因为它会被计算多次，因此可能存在更合适的替代方案。


    ### WHERE EXISTS 表达式


    `WHERE EXISTS`测试子查询是否返回任何行；如果返回，则保留主查询中的行；否则，将其过滤掉。


    在`WHERE EXISTS`中使用非关联子查询通常会返回主查询中的所有行或不返回任何行。使用关联子查询将过滤选择性行。


    你通常可以使用`IN()`表达式作为替代方案，但有时`WHERE EXISTS`允许使用更复杂的子查询。它也绕过了`NOT IN`的怪癖。


    ### LATERAL 连接（亦称 CROSS APPLY）


    `LATERAL JOIN`（在某些 DBMS 中为`CROSS APPLY`）允许你向主查询中的每一行添加列：


    *   你可以使用`LATERAL JOIN`来添加计算列，并且可以链接它们，因此可以有多个计算和中间值。

    *   你也可以使用`LATERAL JOIN`从子查询中添加多个列。


    ### 公用表表达式


    子查询可以在`FROM`子句中使用，但它可能很复杂，特别是在需要多个子查询的情况下，这些子查询必须嵌套。


    公用表表达式允许你在主查询之前定义一个虚拟表，使主查询能够像普通查询一样工作。


    你也可以将多个 CTE 链接在一起，这比嵌套子查询更容易处理。


    ## 后续内容


    在第 5 章中，我们研究了聚合数据。通常，聚合值不能与非聚合值混合，除非在其中放入几个子查询。


    **窗口函数**是一组函数，其作用是将子查询应用于每一行。窗口函数主要有两大类：


    *   聚合函数可用于将聚合应用于非聚合查询的每一行。它们也可用于累积或分组聚合。

    *   排序函数可用于根据行在数据集中的位置生成值。它们可用于指示行位置或某些分组。它们也可用于从其他行获取值。


    使用窗口函数，你将能够生成结合了纯数据与更多分析数据的数据集。

    '
- fmt: '# 8. Window Functions


    So far, you have seen two main groups of calculations:


    *   Most calculations have been based on table `columns`: For each row, a value
    is calculated from one or more columns.

    *   Aggregate queries are used to summarize `rows`: For the whole table, some
    or all rows are summarized.


    `Window functions` are a group of functions which add row data as columns. We’ll
    be working with three groups of window functions:


    *   Aggregate functions: You would normally get aggregates as a separate summary
    of the table data, but aggregate window functions allow you to include aggregates
    with each row. Among other things, you’ll see how this can be used to generate
    running totals.

    *   Ranking functions: This will generate a value based on the position of the
    current row within the dataset. Using sequencing functions, you can get the row
    number, the relative ranking, and even groups such as deciles.

    *   Value functions: You can get data from rows which precede or follow the current
    row. You can also get the first and last values in each group. This will, for
    example, get you the difference in values between this and some other row.


    In this chapter, we’ll look at all of these.


    Window functions are relatively new to SQL, but most modern DBMSs now support
    them. Again, the laggards are MariaDB, which introduced them in version 10.2,
    and MySQL which introduced them in version 8.


    Before we get started, some of the samples will be working with the `sales` table.
    That table includes some `NULL`s for the ordered date/time. Presumably, those
    sales never checked out. We’ve been pretty forgiving so far and filtered them
    out from time to time, but the time has come to deal with them. We can delete
    all of the `NULL` sales as follows:


    ```

    DELETE FROM sales WHERE ordered IS NULL;

    ```


    You’ll notice that there’s a foreign key from the `saleitems` table to the `sales`
    table, which would normally disallow deleting the sales if there are any items
    attacked. However, if you check the script which generates the sample database,
    you’ll notice the `ON DELETE CASCADE` clause, which will automatically delete
    the orphaned sale items.


    ## Writing Window Functions


    A window function generates a value over a set of rows. The set of rows is called
    a `window`.


    The general syntax for window functions is


    ```

    fn() OVER (PARTITION BY columns |

    ORDER BY columns | frame clause)

    ```


    The important part is the `OVER()` clause which generates the window to be summarized.
    There are three main window clauses:


    *   `PARTITION BY`: This calculates the function for the group defined. It is
    equivalent to `GROUP BY`. The default partition is the whole table.

    *   `ORDER BY`: This calculates the function cumulatively, in the order defined.
    In other words, it generates running totals. This order does not need to be the
    same as the table’s `ORDER BY` clause.

    *   There is also an optional framing clause. This creates a sliding window within
    the partition. The framing clause requires an `ORDER BY` window clause. By default,
    the frame is the rows from the beginning to the current row, but that needs to
    be qualified when we get to that.


    In the following samples, there is normally an `ORDER BY` clause at the end of
    the `SELECT` statement, which is the same as what’s in the `OVER()` clause. This
    isn’t necessary, but it makes the results easier to follow.


    ### Simple Aggregate Windows


    As you know, you can’t mix aggregate functions in non-aggregate queries. For example,
    here is an aggregate query which won’t work:


    ```

    SELECT

    id, givenname, familyname,

    count(*)

    FROM customerdetails;

    ```


    However, this will work:


    ```

    SELECT

    id, givenname, familyname,

    count(*) OVER ()

    FROM customerdetails;

    ```


    This gives you something like


    | **id** | **givenname** | **familyname** | **count** |

    | --- | --- | --- | --- |

    | 42 | May | Knott | 303 |

    | 459 | Rick | Shaw | 303 |

    | 597 | Ike | Andy | 303 |

    | 186 | Pat | Downe | 303 |

    | 352 | Basil | Isk | 303 |

    | 576 | Pearl | Divers | 303 |

    | ~ 303 rows ~ |


    The `OVER()` clause changes the aggregate function into a `window` function. This
    aggregate function will now be generated for each column. You’ll see later that
    the `OVER()` clause defines any grouping, known as partitions, the order, and
    the number of rows to be considered in the aggregate.


    For such a simple case, you can get the same result with a subquery:


    ```

    SELECT

    id, givenname, familyname,

    (SELECT count(*) FROM customers)

    FROM customerdetails;

    ```


    The window function becomes more interesting when you apply one of the window
    clauses. For example:


    ```

    SELECT

    id, givenname, familyname,

    count(*) OVER (ORDER BY id)

    FROM customerdetails;

    ```


    This will give the running count up to and including the current row, in order
    of `id`. The actual table results may or may not be in row order, especially if
    you include other expressions, so it’s better to add that to the end:


    ```

    SELECT

    id, givenname, familyname,

    count(*) OVER (ORDER BY id) AS running_count

    FROM customerdetails

    ORDER BY id;

    ```


    Now you’ll get something like


    | **id** | **Givenname** | **familyname** | **running_count** |

    | --- | --- | --- | --- |

    | 1 | Pierce | Dears | 1 |

    | 2 | Arthur | Moore | 2 |

    | 5 | Ray | King | 3 |

    | 6 | Gene | Poole | 4 |

    | 9 | Donna | Worry | 5 |

    | 10 | Ned | Duwell | 6 |

    | ~ 303 rows ~ |


    The `running_count` column looks very much like a simple row number. We’ll see
    later that it’s not necessarily the same if the `ORDER BY` column isn’t unique.'
