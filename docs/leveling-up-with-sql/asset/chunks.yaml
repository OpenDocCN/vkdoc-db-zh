    FROM salesdata

    GROUP BY state,id,ordered

    --  state, ordered 汇总

    UNION

    SELECT

    state, id, NULL, count(*), sum(total),

    0, 0, 1

    FROM salesdata

    GROUP BY state,id

    --  state 汇总

    UNION

    SELECT

    state, NULL, NULL, count(*), sum(total),

    0, 1, 1

    FROM salesdata

    GROUP BY state

    --  总计

    UNION

    SELECT

    NULL, NULL, NULL, count(*), sum(total),

    1, 1, 1

    FROM salesdata

    --  排序

    ORDER BY state_level, state, id_level, id,

    ordered_level, ordered;

    ```


    为了得到正确的结果顺序，我们引入了两个值 `state_level` 和 `town_level`，这样我们就可以将总计行推到其他值之下。


    | **state** | **id** | **ordered** | **nsales** | **total** | **state_level**
    | **id_level** | **ordered_level** |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | ACT | 85 | 2022-06 | 2 | 117 | 0 | 0 | 0 |

    | ACT | 85 | 2022-07 | 2 | 104.5 | 0 | 0 | 0 |

    | ACT | 85 | 2022-08 | 5 | 269.5 | 0 | 0 | 0 |

    | ACT | 85 | 2022-09 | 3 | 253.5 | 0 | 0 | 0 |

    | ACT | 85 | 2022-10 | 5 | 476 | 0 | 0 | 0 |

    | ACT | 85 | 2022-11 | 3 | 179.5 | 0 | 0 | 0 |

    | ACT | 85 | 2022-12 | 2 | 84 | 0 | 0 | 0 |

    | ACT | 85 | 2023-01 | 4 | 248.5 | 0 | 0 | 0 |

    | ACT | 85 | 2023-03 | 3 | 209 | 0 | 0 | 0 |

    | ACT | 85 | 2023-04 | 6 | 384 | 0 | 0 | 0 |

    | ACT | 85 | 2023-05 | 2 | 93 | 0 | 0 | 0 |

    | ACT | 85 | [NULL] | 37 | 2418.5 | 0 | 0 | 1 |

    | ACT | 112 | 2022-07 | 2 | 72 | 0 | 0 | 0 |

    | ACT | 112 | 2022-08 | 2 | 78 | 0 | 0 | 0 |

    | ACT | 112 | 2022-09 | 1 | 49 | 0 | 0 | 0 |

    | ACT | 112 | 2022-10 | 1 | 70.5 | 0 | 0 | 0 |

    | ~ 2077 rows ~ |


    为了从结果集中消除排序列，你可以将其转换为公用表表达式（Common Table Expression）：


    ```sql

    WITH cte AS (

    --  上面的 UNION 查询

    )

    SELECT state, id, ordered, nsales, total

    FROM cte

    ORDER BY state_level,state,id_level,id,ordered_level,ordered;

    ```


    虽然得到这个结果需要一些工作，但可能有更简单的方法。


    ### 使用 GROUPING SETS、CUBE 和 ROLLUP


    分组集（`GROUPING SETS`）为上面的 `UNION` 提供了一种更简单的替代方案。它们的语法不是立即显而易见的，但遵循与 `GROUP BY`
    子句类似的模式。


    并非所有数据库管理系统都完全支持分组集。大多数支持一个更简单的版本，但 SQLite 完全不支持。如果你使用 SQLite，你能做的最好就是像我们之前用 `UNION`
    所做的那样。


    在大多数情况下，你可能想要的是稍后描述的 `ROLLUP`。


    #### GROUPING SETS 和 CUBE（PostgreSQL、MSSQL 和 Oracle）


    最通用的技术是使用 `GROUPING SETS` 子句。在此子句中，你可以指定要包含在汇总中的列的组合。


    语法是


    ```sql

    SELECT columns

    FROM table

    GROUP BY GROUPING SETS ((set),(set));

    ```


    回想一下，前面的例子有按 `state`、客户 `id`、`ordered` 日期分组的 `SELECT` 语句，以及一个总计。这可以按如下方式生成：


    ```sql

    SELECT state,town,count(*)

    FROM customers

    GROUP BY GROUPING SETS ((state,id,ordered),(state,id),(state),());

    ```


    这里，集合 `()` 表示总计。


    还可以使用许多其他组合（例如 `(state,ordered)`）。如果你真的想要所有组合，可以使用 `CUBE`：


    ```sql

    SELECT state, id, ordered, count(*), sum(total)

    FROM salesdata

    GROUP BY CUBE (state,id,ordered)

    ```


    当你没有太多分组列，并且它们彼此都无关时，`CUBE` 变体效果最好。记住，三列会给你八种可能的组合。可能性的数量可以计算为 `2^n`，其中 `n` 是列数。在这种情况下，是
    `2³ = 8`。如果你有四列，你将有 16 种可能的总计和小计，这可能开始变得难以处理。


    #### 使用 ROLLUP（PostgreSQL、MSSQL、Oracle 和 MariaDB/MySQL）


    一个更简单、更易读（但灵活性稍差）的替代方法是使用 `ROLLUP`。它有两种形式：


    ```sql

    --  ROLLUP(...)       -   PostgreSQL, MSSQL, Oracle

    SELECT state, id, ordered, count(*), sum(total)

    FROM salesdata

    GROUP BY ROLLUP (state, id, ordered);

    --  ... WITH ROLLUP   -   MariaDB / MySQL, MSSQL

    SELECT state, id, ordered, count(*), sum(total)

    FROM salesdata

    GROUP BY state, id, ordered WITH ROLLUP;

    ```


    两种形式都会给你相同的结果。请注意，MSSQL 允许你选择使用任一形式。


    `ROLLUP` 做出了一个重要假设，即这些列形成了某种层次结构。在客户 `state` 和客户 `id` 的情况下，这是显而易见的。你是否将 `ordered`
    日期视为层次结构的末端取决于你。


    你可以在结果中看到这种层次结构，并且它与之前的 `GROUPING SETS` 示例相匹配。你将获得以下结果：


    1.  `(state, id, ordered)` 组合

    2.  `(state, id)` 组合

    3.  `(state)` 值

    4.  `()` – 总计


    显然，使用 `ROLLUP` 是获得这些结果的更简单方法，你可能不会太怀念 `GROUPING SETS` 的灵活性。



    '
- fmt: '## 概述


    ### 排序结果


    在一些数据库管理系统中，您可能会看到结果自动按之前 `UNION` 版本相同的顺序排序。在其他系统中，您需要自己进行排序。


    这又遇到了前面提到的与 `UNION` 版本相关的两个问题。为了解决第二个问题，即排序顺序问题，我们可以使用 `grouping(column)` 函数，它指示被汇总列的层级。值为
    `1` 表示这是一个汇总行，`0` 表示不是。这将与前面虚构的层级列具有相同的效果：


    ```sql

    --  ROLLUP(...):      PostgreSQL, MSSQL, Oracle

    SELECT state, id, ordered, count(*), sum(total)

    FROM salesdata

    GROUP BY ROLLUP (state,id,ordered)

    ORDER BY grouping(state), state, grouping(id), id,

    grouping(ordered), ordered;

    --  ... WITH ROLLUP: MySQL, MSSQL

    --  (MariaDB doesn''t support grouping())

    SELECT state, id, ordered, count(*), sum(total)

    FROM salesdata

    GROUP BY state,id,ordered WITH ROLLUP

    ORDER BY grouping(state), state, grouping(id), id,

    grouping(ordered), ordered;

    ```


    您将获得一个排序更好的表。


    请注意，虽然 MySQL 支持 `grouping()`，但 MariaDB *不支持* `grouping()` 函数！


    在 PostgreSQL 和 MySQL 中，您可以在多个列上使用 `grouping()`。这将给出一个组合层级，它是 `1` 和 `0` 的二进制组合。在
    MSSQL 和 Oracle 中，您需要使用 `grouping_id()` 函数来实现这一点。


    为了解决第一个问题，即无意义的 `NULL` 标记问题，我们必须对 `SELECT` 子句进行更有创意的处理。在这种情况下，我们可以使用 `coalesce`
    来选取 `NULL` 并提供替代值：


    ```sql

    --  PostgreSQL, MSSQL;

    SELECT

    coalesce(state,''National Total'') AS state,

    coalesce(cast(id as varchar),state||'' Total'') AS id,

    coalesce(ordered,''Total for ''||cast(id as varchar))

    AS ordered,

    count(*), sum(total)

    FROM salesdata

    GROUP BY ROLLUP (state,id,ordered)

    ORDER BY grouping(state), state,

    grouping(id), id, grouping(ordered), ordered;

    --  MySQL, MSSQL (MariaDB doesn''t support grouping())

    SELECT

    coalesce(state,''National Total'') AS state,

    coalesce(cast(id as varchar),state||'' Total'') AS id,

    coalesce(ordered,''Total for ''||cast(id as varchar))

    AS ordered,

    count(*), sum(total)

    FROM salesdata

    GROUP BY state,id,ordered WITH ROLLUP

    ORDER BY grouping(state), state,

    grouping(id), id, grouping(ordered), ordered;

    --   NOT Oracle

    ```


    这将为您在汇总行提供一些有意义的内容。


    ### 在 Oracle 中重命名值


    您会注意到这对 Oracle 无效。在这方面，Oracle 被证明是无帮助的，因为 (a) `NULL` 字符串等同于空字符串 (`''''`)，因此它们不会合并，(b)
    所选列不再被认为匹配 `GROUP BY` 子句，以及 (c) 当您进行了其他更改后，在使用 `grouping()` 函数排序时也会遇到问题。


    使其工作的最直接方法是对列使用 `CASE` 表达式：


    ```sql

    SELECT

    coalesce(state,''National Total'') AS state,

    grouping(state) AS statelevel,

    CASE

    WHEN state IS NULL THEN NULL

    WHEN id IS NULL THEN ''Total for ''||state

    ELSE cast(id AS varchar(3))

    END AS id,

    grouping(id) AS idlevel,

    CASE

    WHEN id IS NULL THEN NULL

    WHEN ordered IS NULL THEN

    ''Total for ''||cast(id as varchar(3))

    ELSE ordered

    END AS ordered,

    grouping(ordered) AS orderedlevel,

    count(*) AS count, sum(total) AS sum

    FROM salesdata

    GROUP BY ROLLUP (state,id,ordered)

    ORDER BY statelevel, state, idlevel, id, orderedlevel, ordered

    ;

    ```


    它看起来像这样：


    | **state** | statelevel | **id** | idlevel | **ordered** | orderedlevel | **count**
    | **sum** |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | ACT | 0 | 112 | 0 | 2022-07 | 0 | 2 | 72 |

    | ACT | 0 | 112 | 0 | 2022-08 | 0 | 2 | 78 |

    | ACT | 0 | 112 | 0 | 2022-09 | 0 | 1 | 49 |

    | ACT | 0 | 112 | 0 | 2022-10 | 0 | 1 | 70.5 |

    | ACT | 0 | 112 | 0 | 2022-11 | 0 | 1 | 94 |

    | ACT | 0 | 112 | 0 | 2022-12 | 0 | 4 | 224 |

    | ACT | 0 | 112 | 0 | 2023-01 | 0 | 1 | 48.5 |

    | ACT | 0 | 112 | 0 | 2023-02 | 0 | 5 | 320 |

    | ACT | 0 | 112 | 0 | 2023-03 | 0 | 2 | 191.5 |

    | ACT | 0 | 112 | 0 | 2023-05 | 0 | 1 | 125 |

    | ACT | 0 | 112 | 0 | Total for 112 | 1 | 20 | 1272.5 |

    | ACT | 0 | 147 | 0 | 2022-08 | 0 | 8 | 392 |

    | ACT | 0 | 147 | 0 | 2022-09 | 0 | 2 | 199.5 |

    | ACT | 0 | 147 | 0 | 2022-10 | 0 | 2 | 162 |

    | ACT | 0 | 147 | 0 | 2022-11 | 0 | 3 | 228.5 |

    | ACT | 0 | 147 | 0 | 2022-12 | 0 | 3 | 251 |

    | ~ 2077 rows ~ |


    这里，`grouping()` 函数在 `SELECT` 子句中使用，然后用于排序。`id` 和 `ordered` 列使用 `CASE ... END`
    表达式计算，以解决 `NULL` 字符串的问题。


    当然，现在您有那三个用于排序的额外列。要隐藏它们，您可以使用 CTE：


    ```sql

    WITH cte AS (

    -- SELECT statement as above

    --  don''t bother with the ORDER BY clause

    )

    SELECT state, id, ordered, count, sum

    FROM cte

    ORDER BY statelevel, state, idlevel, id, orderedlevel, ordered

    ;

    ```


    顺便说一下，前面的语句包含了 `ORDER BY` 子句。您可以将其包含在 CTE 中（在 MSSQL 中不行），但这是不必要的，因为我们在主查询中无论如何都会进行排序，所以您应该省略它。


    ### 直方图、平均值、众数和中位数


    您可能在学校学过一些简单的统计知识。以下是一些基本概念的提醒：


    *   **频数表** 是值及其出现频率的表格。

    *   **平均值**，或更专业地称为 **算术平均数**，就是我们通常所说的 **平均值**：它是总和除以值的个数。

    *   **众数** 是出现最频繁的值。

    *   **中位数** 是值的中间值（如果它们都按顺序排列）。


    您可以使用频数表生成 **直方图**，这就是电子表格程序所说的条形图。例如，您可以生成按身高（厘米）划分的客户数量的频数表和直方图。它看起来像图 5-4。


    ![](images/606708_1_En_5_Chapter/606708_1_En_5_Fig4_HTML.jpg)


    直方图说明了正态分布。大多数值落在 166 到 177 之间。


    图 5-4


    直方图


    如果您的值基于多个不同的因素，它们倾向于沿着众所周知的“钟形曲线”分布。大多数值出现在中间附近，离中间越远，值出现的频率就越低。这更专业地称为 **正态分布**。


    您的身高取决于许多因素，其中一些包括遗传、饮食和其他生活方式因素。因此，正如您在上图中看到的那样，客户身高往往遵循正态分布。当然，如果我们有更大的数据集合，这种趋势会变得更强：如果只有几百个样本，那么数据就不会那么紧密地拟合。


    出于本次讨论的目的，我们将重点讨论客户身高，因为它们往往更容易以这种方式进行分析。


    尽管样本数据是随机的，但它是按照小样本中可能预期的正态分布生成的。


    对于澳大利亚成年人，平均身高约为 168.7 厘米。实际上，有两个平均身高，一个是成年女性，一个是成年男性，但两者的平均值是 168.7 厘米。标准差是 7
    厘米。您可以在 [`https://en.wikipedia.org/wiki/Average_human_height_by_country`](https://en.wikipedia.org/wiki/Average_human_height_by_country)
    获取更多信息。'
  raw: '#### Sorting the Results


    In some DBMSs, you may see the results sorted automatically in the same order
    as the `UNION` version earlier. In some, you will need to sort it yourself.


    This again has the two problems mentioned with the `UNION` version earlier. To
    address the second problem, that of sort order, we can use the `grouping(column)`
    function which indicates the level of a column being summarized. The value is
    `1` to indicate that this is a summary and `0` to indicate that it’s not. This
    will have the same effect as the preceding contrived level columns:


    ```

    --  ROLLUP(...):      PostgreSQL, MSSQL, Oracle

    SELECT state, id, ordered, count(*), sum(total)

    FROM salesdata

    GROUP BY ROLLUP (state,id,ordered)

    ORDER BY grouping(state), state, grouping(id), id,

    grouping(ordered), ordered;

    --  ... WITH ROLLUP: MySQL, MSSQL

    --  (MariaDB doesn''t support grouping())

    SELECT state, id, ordered, count(*), sum(total)

    FROM salesdata

    GROUP BY state,id,ordered WITH ROLLUP

    ORDER BY grouping(state), state, grouping(id), id,

    grouping(ordered), ordered;`

    ```


    You’ll get a better sorted table.


    Note that while MySQL does support `grouping()`, MariaDB *doesn’t* support the
    `grouping()` function!


    In PostgreSQL and MySQL, you can use `grouping()` with multiple columns. This
    will give you a combined level which is a binary combination of the `1`s and `0`s.
    In MSSQL and Oracle, you would use the `grouping_id()` function for that.


    To solve the first problem, that of meaningless `NULL` markers, we have to be
    more creative with the `SELECT` clause. In this case, we can use coalesce to pick
    up the `NULL` and supply an alternative value:


    ```

    --  PostgreSQL, MSSQL;

    SELECT

    coalesce(state,''National Total'') AS state,

    coalesce(cast(id as varchar),state||'' Total'') AS id,

    coalesce(ordered,''Total for ''||cast(id as varchar))

    AS ordered,

    count(*), sum(total)

    FROM salesdata

    GROUP BY ROLLUP (state,id,ordered)

    ORDER BY grouping(state), state,

    grouping(id), id, grouping(ordered), ordered;

    --  MySQL, MSSQL (MariaDB doesn''t support grouping())

    SELECT

    coalesce(state,''National Total'') AS state,

    coalesce(cast(id as varchar),state||'' Total'') AS id,

    coalesce(ordered,''Total for ''||cast(id as varchar))

    AS ordered,

    count(*), sum(total)

    FROM salesdata

    GROUP BY state,id,ordered WITH ROLLUP

    ORDER BY grouping(state), state,

    grouping(id), id, grouping(ordered), ordered;

    --   NOT Oracle

    ```


    This will give you something meaningful for the summary rows.


    #### Renaming Values in Oracle


    You’ll notice that this won’t work for Oracle. Here, Oracle proves to be unhelpful
    since (a) `NULL` strings are equivalent to an empty string (`''''`) so they won’t
    coalesce, (b) the selected columns are no longer considered to match the `GROUP
    BY` clause, and (c) you’ll also have problems sorting with the `grouping()` function
    when you’ve made the other changes.


    The most straightforward way of getting this to work is to use a `CASE` expression
    for the columns:


    ```

    SELECT

    coalesce(state,''National Total'') AS state,

    grouping(state) AS statelevel,

    CASE

    WHEN state IS NULL THEN NULL

    WHEN id IS NULL THEN ''Total for ''||state

    ELSE cast(id AS varchar(3))

    END AS id,

    grouping(id) AS idlevel,

    CASE

    WHEN id IS NULL THEN NULL

    WHEN ordered IS NULL THEN

    ''Total for ''||cast(id as varchar(3))

    ELSE ordered

    END AS ordered,

    grouping(ordered) AS orderedlevel,

    count(*) AS count, sum(total) AS sum

    FROM salesdata

    GROUP BY ROLLUP (state,id,ordered)

    ORDER BY statelevel, state, idlevel, id, orderedlevel, ordered

    ;

    ```


    It will look something like this:


    | **state** | statelevel | **id** | idlevel | **ordered** | orderedlevel | **count**
    | **sum** |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | ACT | 0 | 112 | 0 | 2022-07 | 0 | 2 | 72 |

    | ACT | 0 | 112 | 0 | 2022-08 | 0 | 2 | 78 |

    | ACT | 0 | 112 | 0 | 2022-09 | 0 | 1 | 49 |

    | ACT | 0 | 112 | 0 | 2022-10 | 0 | 1 | 70.5 |

    | ACT | 0 | 112 | 0 | 2022-11 | 0 | 1 | 94 |

    | ACT | 0 | 112 | 0 | 2022-12 | 0 | 4 | 224 |

    | ACT | 0 | 112 | 0 | 2023-01 | 0 | 1 | 48.5 |

    | ACT | 0 | 112 | 0 | 2023-02 | 0 | 5 | 320 |

    | ACT | 0 | 112 | 0 | 2023-03 | 0 | 2 | 191.5 |

    | ACT | 0 | 112 | 0 | 2023-05 | 0 | 1 | 125 |

    | ACT | 0 | 112 | 0 | Total for 112 | 1 | 20 | 1272.5 |

    | ACT | 0 | 147 | 0 | 2022-08 | 0 | 8 | 392 |

    | ACT | 0 | 147 | 0 | 2022-09 | 0 | 2 | 199.5 |

    | ACT | 0 | 147 | 0 | 2022-10 | 0 | 2 | 162 |

    | ACT | 0 | 147 | 0 | 2022-11 | 0 | 3 | 228.5 |

    | ACT | 0 | 147 | 0 | 2022-12 | 0 | 3 | 251 |

    | ~ 2077 rows ~ |


    Here, the `grouping()` function is used in the `SELECT` clause and then used for
    sorting. The `id` and `ordered` columns are calculated with a `CASE ... END` expression
    to get around the problem of the `NULL` strings.


    Of course, now you have those three extra columns used for sorting. To hide them,
    you can use a CTE:


    ```

    WITH cte AS (

    -- SELECT statement as above

    --  don''t bother with the ORDER BY clause

    )

    SELECT state, id, ordered, count, sum

    FROM cte

    ORDER BY statelevel, state, idlevel, id, orderedlevel, ordered

    ;

    ```


    Incidentally, the previous statement included an `ORDER BY` clause. You can include
    it in the CTE (you can’t in MSSQL), but it’s unnecessary as we’re sorting it anyway
    in the main query, so you should leave it out.


    ## Histograms, Mean, Mode, and Median


    You may have learned some simple statistics at school. Here’s a reminder of some
    of the basic concepts:


    *   A **frequency table** is a table of values and how often they appear.


    *   A **mean**, or more technically an **arithmetic mean**, is what we casually
    call the **average**: it’s the total divided by the number of values.


    *   The **mode** is the value which appears the most often.


    *   The **median** is the middle of the values (if they’re all placed in order).


    You can use the frequency table to generate a **histogram**, which is what spreadsheet
    programs call a bar chart. For example, you can generate a frequency table and
    histogram of the number of customers per height (in centimetres). It looks like
    Figure [5-4](#606708_1_En_5_Chapter.xhtml#Fig4).


    ![](images/606708_1_En_5_Chapter/606708_1_En_5_Fig4_HTML.jpg)


    A histogram illustrates the normal distribution. The majority of the values fall
    between 166 and 177.


    Figure 5-4


    A Histogram


    If your values are based on a number of different factors, there is a tendency
    for them to be distributed along the well-known “bell curve.” Most values occur
    around the middle, and the further you are from the middle, the fewer times the
    value occurs. This is more technically referred to as the **normal distribution**.


    Your height is dependent on a number of factors, some of which include genetics,
    diet, and other lifestyle factors. As a result, customer heights tend to follow
    the normal distribution as you see very roughly in the figure above. Of course,
    the tendency becomes stronger if we have a larger collection of data: if you have
    only a few hundred samples, then the data won’t be such a tight fit.


    For the purpose of this discussion, we’ll focus on customer heights, as they tend
    to be easy to analyze this way.


    Although the sample data was randomized, it was generated to follow the normal
    distribution as well as might be expected in the small sample.


    For adults in Australia, the mean height is about 168.7 cm. Actually, there are
    two mean heights, one for female and one for male adults, but between them the
    average is 168.7 cm. The standard deviation is 7 cm. You can get more information
    at [`https://en.wikipedia.org/wiki/Average_human_height_by_country`](https://en.wikipedia.org/wiki/Average_human_height_by_country).'
