  trans: "\n# 添加销售项目并获取价格\n\n有了新的销售 ID 后，剩下的事情就简单了。要添加销售项目，我们可以使用\n\n```\n-- 非 Oracle\
    \ 数据库\nINSERT INTO saleitems(saleid, bookid, quantity)\nVALUES\n( ... , 123, 3),\n\
    ( ... , 456, 1),\n( ... , 789, 2);\n-- Oracle 数据库\nINSERT INTO saleitems(saleid,\
    \ bookid, quantity)\nVALUES ( ... , 123, 3);\nINSERT INTO saleitems(saleid, bookid,\
    \ quantity)\nVALUES ( ... , 456, 1);\nINSERT INTO saleitems(saleid, bookid, quantity)\n\
    VALUES ( ... , 789, 2);\n```\n\n请记得在上述语句中使用你新的销售`id`。\n\n同时，请记住 Oracle 不喜欢单个`INSERT`语句中包含多个值，这就是为什么需要多个语句。如果你愿意，也可以在其他数据库管理系统中使用这种方式，但并非必须。\n\
    \n价格来自另一个表。你可以使用子查询将这些价格获取到新的销售项目中：\n\n```\nUPDATE saleitems\nSET price=(SELECT\
    \ price FROM books WHERE\nbooks.id=saleitems.bookid)\nWHERE saleid = ... ;\n```\n\
    \n这个关联子查询会从`books`表中为匹配的书籍（`WHERE books.id=saleitems.bookid`）获取价格。\n\n主查询中的`WHERE`子句确保只有新的销售项目会被设置价格。这很重要，因为你可能不想将价格复制到旧的销售项目中：自旧交易完成以来，价格可能已经发生变化，你不应该让这种变化影响旧的交易。\n\
    \n# 完成销售\n\n最后，你应该计算销售项目的总额并将其存入新的销售记录中。\n\n要获取销售项目的总额，可以使用聚合查询：\n\n```\nSELECT\
    \ sum(quantity*price)\nFROM saleitems\nWHERE saleid = ... ;\n```\n\n这个结果是正确的，但也是不完整的。缺失的部分是税费和任何适用的\
    \ VIP 折扣。\n\n我们假设税率为 10%——当然，各国税率不同，你可能需要进行调整。这意味着你最终将支付总额的(1 + 10%)倍：\n\n```\n\
    SELECT sum(quantity*price) * (1 + 0.10)\nFROM saleitems\nWHERE saleid = ... ;\n\
    ```\n\n在实际生活中，你当然可以直接写`1.1`，但前面的表达式提醒了数值的来源以及你如何根据不同的税率进行调整。\n\nVIP 折扣取决于客户。你可以从\
    \ VIP 表中读取这个折扣：\n\n```\nSELECT 1 - discount FROM vip WHERE id = 42 ;\n```\n\n\
    之所以要从`1`中减去它，是因为这是一个折扣：它从总价中扣除。\n\n你可以在一个子查询中使用计算出的总额：\n\n```\nSELECT\nsum(quantity*price)\n\
    * (1 + 0.1)\n* (SELECT  1 - discount FROM vip WHERE id = 42)\nFROM saleitems\n\
    WHERE saleid = ... ;\n```\n\n但情况不一定总是如此。有些客户不是 VIP，所以子查询可能返回`NULL`。这会破坏整个计算。由于缺失的\
    \ VIP 值意味着没有折扣，我们应该将子查询结果合并为`1`：\n\n```\nSELECT\nsum(quantity*price)\n* (1 + 0.1)\n\
    * coalesce((SELECT  1 - discount FROM vip\nWHERE id = 42),1)\nFROM saleitems\n\
    WHERE saleid = ... ;\n```\n\n最后，我们可以将这个值存入`sales`表：\n\n```\nUPDATE sales\nSET\
    \ total = (\nSELECT\nsum(quantity*price)\n* (1 + 0.1)\n* coalesce((SELECT  1 -\
    \ discount FROM vip\nWHERE id = 42),1)\nFROM saleitems\nWHERE saleid = ...\n)\n\
    WHERE id = ... ;\n```\n\n这里发生了很多事情。首先，`UPDATE`查询将一个值设置为一个子查询，而这个子查询又使用另一个子查询来获取值。你还会发现这个查询两次使用了销售`id`，一次用于筛选销售项目，另一次用于选择销售记录。\n\
    \n# 回顾\n\nSQL 数据库的一个主要特点是存在多个表，并且这些表相互关联。\n\n关系通常通过主键和外键建立，外键引用相关表中的主键。外键通常以约束的形式存在，保证外键引用的是另一张表中有效的主键值（尽管不一定是正确的值）。\n\
    \n也可能存在一些未被规划或强制的`临时(ad hoc)`关系。\n\n## 关系类型\n\n主要有三种关系类型：\n\n*   `一对多`关系存在于一个表的外键（通常称为`子表`）与另一个表的主键（`父表`）之间。通常，一个父记录可以有多个子记录。\n\
    \n    这是最常见的关系类型。\n\n*   `一对一`关系存在于两个表的主键之间。一个表中的主键同时兼作另一个表中的外键。\n\n    真正的一对一关系要求两个主键都是对方表的外键。在实践中这难以实现，外键通常只存在于一个表中。这种关系可能非正式地被称为`一对可能`关系。\n\
    \n*   `多对多`关系允许一个表中的一行与另一个表中的多行相关，反之亦然。由于列只能包含单个值，这种关系是通过另一个表（通常称为`关联表`）创建的，该表包含两组一对一关系。\n\
    \n    在任何规模合理的数据库中，由于存在许多具有一对多关系的表，最终会产生多对多关系。\n\n数据库的一个基本原则是，一个列不应该包含多个值，也不应该有多个列做同样的工作。处理多个值的方法是使用额外的表，通过一对多或多对多关系来实现。\n\
    \n## 连接表\n\n当表之间建立了关系后，你可以使用连接（join）来合并它们的内容。\n\n有时，你可能想计算预期的结果数量，以检查你的连接类型是否符合预期。\n\
    \n当你连接表时，通常会得到一些来自父表的重复数据行。你可以通过对父表数据进行分组并对子表数据进行聚合来简化结果。因为你只能选择你汇总的内容，所以你可能需要再次连接结果以获取更多详细信息。\n\
    \n## 视图\n\n从多个相关表中选择所需内容可能并不方便。你可以将复杂的连接查询保存在一个视图（view）中供将来使用，之后就可以像使用简单表一样使用它。\n\
    \n## 向相关表插入数据\n\n通常，向一个表插入数据并不那么简单。在某些情况下，如果是子表，你可能还需要先向父表插入数据，以便子表能够引用它。\n\n\
    在其他情况下，例如当父表用作子数据的容器时，你可能需要分多个步骤向多个表插入数据。\n\n如果主键是自动生成的，这个过程可能会很复杂。\n\n# 总结\n\n\
    在本章中，我们探讨了多个表如何通过外键匹配主键相互关联。我们还研究了不同类型的关系以及表这样设计的原因。\n\n利用这些知识，我们能够使用一个或多个连接将表组合起来，将一个表中的行与另一个表中的行进行匹配。我们了解了不同类型的连接以及何时选择它们。\n\
    \n# 后续内容\n\n我们处理的大多数数据都是简单值，尽管在少数情况下我们计算了诸如税费和折扣之类的值。\n\n在下一章中，我们将稍作调整，专注于在 SQL\
    \ 中执行计算。\n"
- fmt: "# 4. Working with Calculated Data\n\nNo doubt, you will have seen calculations\
    \ before now. SQL allows you to include calculated data in your queries.\n\nIn\
    \ this chapter, we’ll look at some important ideas about the different types of\
    \ data and how they can be calculated.\n\nDon’t get too carried away with calculations\
    \ in your SQL. The database is more concerned with maintaining and accessing raw\
    \ data. However, it’s useful to be able to take your raw data and make it more\
    \ useful to the task at hand.\n\nDBMSs vary widely in their ability to perform\
    \ calculations. This is especially the case with functions, which vary not only\
    \ in scope but even in what the DBMSs call them.\n\nIn particular, SQLite has\
    \ a very limited ability to perform calculations, particularly with functions.\n\
    \nIn this chapter, we’ll be working with various types of data, including strings.\
    \ If you’re using MariaDB/MySQL, we thoroughly recommend that you set your session\
    \ to ANSI mode, so that string behavior works as for standard SQL.\n\nYou can\
    \ begin your session with `SET SESSION sql_mode = 'ANSI';`.\n\n## Calculation\
    \ Basics\n\nWe’ll look at more details later, but here is an overview of how calculations\
    \ work in SQL.\n\nYou can calculate values based on individual columns or multiple\
    \ columns. For example:\n\n```sql\nSELECT\n    height/2.54,                  \
    \     --  single column\n    givenname||' '||familyname         --  multiple columns\n\
    \    --  givenname+' '+familyname       --  MSSQL\nFROM customers;\n```\n\nThis\
    \ gives you:\n\n| **?column?** | **?column?** |\n| --- | --- |\n| 66.339 | May\
    \ Knott |\n| 67.283 | Rick Shaw |\n| 60.236 | Ike Andy |\n| ~ 303 rows ~ |\n\n\
    You can also \"hard-code\" values or get them from subqueries:\n\n```sql\nSELECT\n\
    \    'active',                   --  hard-coded\n    (SELECT name FROM towns WHERE\
    \ id=townid)  --  sub query\nFROM customers;\n```\n\nYou get:\n\n| **?column?**\
    \ | **?column?** |\n| --- | --- |\n| active | Kings Park |\n| active | Richmond\
    \ |\n| ~ 303 rows ~ |\n\nThere are also some built-in functions:\n\n```sql\nSELECT\n\
    \    upper(familyname)          --  upper case function\nFROM customers;\n```\n\
    \nThis gets you:\n\n| **?column?** |\n| --- |\n| KNOTT |\n| SHAW |\n| ~ 303 rows\
    \ ~ |\n\nIn all cases, you’ll notice that a calculated value doesn’t have a proper\
    \ name.\n\n### Using Aliases\n\nCalculated columns cause a minor inconvenience\
    \ for SQL. Generally, each column should have a distinct name, but SQL has no\
    \ clear idea what to call the newly generated column.\n\nSome SQL clients will\
    \ leave the calculated column unnamed, while some will generate a dummy name.\
    \ When experimenting with simple `SELECT` statements, this is OK, but when taking\
    \ the statement seriously, such as when you plan to use the results later, you\
    \ will need to give each column a better name.\n\nAn **alias** is a new name for\
    \ a column, whether it’s a calculated column or an original. You create an alias\
    \ using the `AS` keyword. For example:\n\n```sql\nSELECT\n    id AS customer,\n\
    \    height/2.54 AS height,\n    givenname||' '||familyname AS fullname,\n   \
    \ --  givenname+' '+familyname AS fullname    --  MSSQL\n    'active' AS status,\n\
    \    (SELECT name FROM towns WHERE id=townid) AS town,\n    length(email) AS length\n\
    \    --  len(email) AS length           --  MSSQL\nFROM customers;\n```\n\nThis\
    \ looks better:\n\n| **customer** | **Height** | **fullname** | **status** | **town**\
    \ | **length** |\n| --- | --- | --- | --- | --- | --- |\n| 42 | 66.339 | May Knott\
    \ | active | Kings Park | 23 |\n| 459 | 67.283 | Rick Shaw | active | Richmond\
    \ | 24 |\n| ~ 303 rows ~ |\n\nNote:\n- The `id` column has been aliased even though\
    \ it hasn’t been calculated.\n- The `height` calculation has been aliased to `height`;\
    \ this is fine, since it still means the same thing, but in different units.\n\
    \nApart from the fact that each calculated column must have a distinct name, other\
    \ reasons to include aliases are as follows:\n- Sometimes, you simply need to\
    \ rename columns either for better meaning or to suit later use.\n- Sometimes,\
    \ you need to format or convert a column to something more suitable, but still\
    \ retain its original name.\n\nAt this point, we’re not worried about whether\
    \ the preceding aliases are the best possible names for their columns; we’re just\
    \ looking at how they work.\n\n#### Alias Names\n\nBy and large, the rules for\
    \ alias names are the same as those for the names of columns. That means:\n- Aliases\
    \ and original column names must be unique.\n- Aliases should not contain spaces,\
    \ can’t start with a number, and can’t contain other special characters.\n- Aliases\
    \ should not be SQL keywords.\n\nIf you really need to work around the preceding\
    \ second and third rules, you can enclose the alias in double quotes. For example:\n\
    \n```sql\nSELECT\n    ordered AS \"order\",\n    shipped AS \"shipped date\"\n\
    FROM sales;\n```\n\nHere, the name `order` is an SQL keyword, while `shipped date`\
    \ contains a space.\n\n| **Order** | **shipped date** |\n| --- | --- |\n| 2022-05-15\
    \ 21:12:07.988741 | 2022-05-23 |\n| 2022-05-16 03:03:16.065969 | 2022-05-24 |\n\
    | ~ 5549 rows ~ |\n\nYou should resist the urge to do this. Aliases, as with column\
    \ names, are for technical rather than aesthetic use. A `SELECT` statement is\
    \ not actually a report.\n\nSome DBMSs offer alternatives to double quotes for\
    \ special names:\n- Microsoft SQL offers square brackets as an alternative: `[shipped\
    \ date]`. There is no reason to prefer this to double quotes.\n- MySQL/MariaDB\
    \ uses \"backticks\" as an alternative: `` `shipped date` ``. In ANSI mode, this\
    \ is unnecessary, but in traditional mode, it’s all you’ve got.\n\nWhatever names\
    \ you choose, remember that they are meant to be purely functional. Don’t get\
    \ carried away trying to use upper and lower case, or spaces, or anything else\
    \ that might look better. That’s up to the software handling the output of your\
    \ queries. In SQL, you just need a suitable name to refer to the data.\n\n####\
    \ AS Is Optional\n\nYou will discover soon enough that `AS` is optional:\n\n```sql\n\
    SELECT\n    id customer,\n    height/2.54 height,\n    givenname||' '||familyname\
    \ fullname,\n    --  givenname+' '+familyname fullname   --  MSSQL\n    'active'\
    \ status,\n    (SELECT name FROM towns WHERE id=townid) town,\n    length(email)\
    \ length\n    --  len(email) length         --  MSSQL\nFROM customers;\n```\n\n\
    Some developers justify leaving out the `AS` as it saves time or makes them look\
    \ more professional. However, you will also make this kind of mistake soon enough:\n\
    \n```sql\nSELECT\n    id,\n    email\n    givenname, familyname,\n    height,\n\
    \    dob\nFROM customers;\n```\n\nThis gives you a confusing result:\n\n| **id**\
    \ | **givenname** | **familyname** | **height** | **dob** |\n| --- | --- | ---\
    \ | --- | --- |\n| 42 | may.knott61@example.net | Knott | 168.5 | [NULL] |\n|\
    \ 459 | rick.shaw459@example.net | Shaw | 170.9 | 1945-07-03 |\n| ~ 303 rows ~\
    \ |\n\nAt first glance, this looks OK, as it is not a technical error. However,\
    \ on closer inspection, you’ll see that the `email` has been aliased to `familyname`,\
    \ since there is no comma between them. Aliasing one column to another is legitimate,\
    \ though it’s not often that you would really want to.\n\nYou can’t stop SQL from\
    \ allowing this, but you can make mistakes like this slightly easier to spot if\
    \ you develop a pattern which always includes `AS` for aliases."
  raw: '# 4. Working with Calculated Data


    No doubt, you will have seen calculations before now. SQL allows you to include
    calculated data in your queries.


    In this chapter, we’ll look at some important ideas about the different types
    of data and how they can be calculated.


    Don’t get too carried away with calculations in your SQL. The database is more
    concerned with maintaining and accessing raw data. However, it’s useful to be
    able to take your raw data and make it more useful to the task at hand.


    DBMSs vary widely in their ability to perform calculations. This is especially
    the case with functions, which vary not only in scope but even in what the DBMSs
    call them.


    In particular, SQLite has a very limited ability to perform calculations, particularly
    with functions.


    In this chapter, we’ll be working with various types of data, including strings.
    If you’re using MariaDB/MySQL, we thoroughly recommend that you set your session
    to ANSI mode, so that string behavior works as for standard SQL.


    You can begin your session with `SET SESSION sql_mode = ''ANSI'';`


    ## Calculation Basics


    We’ll look at more details later, but here is an overview of how calculations
    work in SQL.


    You can calculate values based on individual columns or multiple columns. For
    example:


    ```

    SELECT

    height/2.54,                --  single column

    givenname||'' ''||familyname         --  multiple columns

    --  givenname+'' ''+familyname          --  MSSQL

    FROM customers;

    ```


    This gives you


    | **?column?** | **?column?** |

    | --- | --- |

    | 66.339 | May Knott |

    | 67.283 | Rick Shaw |

    | 60.236 | Ike Andy |

    | 69.291 | Pat Downe |

    | 61.575 | Basil Isk |

    | 69.409 | Pearl Divers |

    | ~ 303 rows ~ |


    You can also “hard-code” values or get them from subqueries:


    ```

    SELECT

    ''active'',                   --  hard-coded

    (SELECT name FROM towns WHERE id=townid)  --  sub query

    FROM customers;

    ```


    You get


    | **?column?** | **?column?** |

    | --- | --- |

    | active | Kings Park |

    | active | Richmond |

    | active | Hillcrest |

    | active | Guildford |

    | active | Wallaroo |

    | active | Broadwater |

    | ~ 303 rows ~ |


    There are also some built-in functions:


    ```

    SELECT

    upper(familyname)          --  upper case function

    FROM customers;

    ```


    This gets you


    | **?column?** |

    | KNOTT |

    | SHAW |

    | ANDY |

    | DOWNE |

    | ISK |

    | DIVERS |

    | ~ 303 rows ~ |


    In all cases, you’ll notice that a calculated value doesn’t have a proper name.


    ### Using Aliases


    Calculated columns cause a minor inconvenience for SQL. Generally, each column
    should have a distinct name, but SQL has no clear idea what to call the newly
    generated column.


    Some SQL clients will leave the calculated column unnamed, while some will generate
    a dummy name. When experimenting with simple `SELECT` statements, this is OK,
    but when taking the statement seriously, such as when you plan to use the results
    later, you will need to give each column a better name.


    An **alias** is a new name for a column, whether it’s a calculated column or an
    original. You create an alias using the `AS` keyword. For example:


    ```

    SELECT

    id AS customer,

    height/2.54 AS height,

    givenname||'' ''||familyname AS fullname,

    --  givenname+'' ''+familyname AS fullname    --  MSSQL

    ''active'' AS status,

    (SELECT name FROM towns WHERE id=townid) AS town,

    length(email) AS length

    --  len(email) AS length           --  MSSQL

    FROM customers;

    ```


    This looks better:


    | **customer** | **Height** | **fullname** | **status** | **town** | **length**
    |

    | --- | --- | --- | --- | --- | --- |

    | 42 | 66.339 | May Knott | active | Kings Park | 23 |

    | 459 | 67.283 | Rick Shaw | active | Richmond | 24 |

    | 597 | 60.236 | Ike Andy | active | Hillcrest | 23 |

    | 186 | 69.291 | Pat Downe | active | Guildford | 24 |

    | 352 | 61.575 | Basil Isk | active | Wallaroo | 24 |

    | 576 | 69.409 | Pearl Divers | active | Broadwater | 27 |

    | ~ 303 rows ~ |


    Note


    .


    *   The `id` column has been aliased even though it hasn’t been calculated.


    *   The `height` calculation has been aliased to `height`; this is fine, since
    it still means the same thing, but in different units.


    Apart from the fact that each calculated column must have a distinct name, other
    reasons to include aliases are as follows:


    *   Sometimes, you simply need to rename columns either for better meaning or
    to suit later use.


    *   Sometimes, you need to format or convert a column to something more suitable,
    but still retain its original name.


    At this point, we’re not worried about whether the preceding aliases are the best
    possible names for their columns; we’re just looking at how they work.


    #### Alias Names


    By and large, the rules for alias names are the same as those for the names of
    columns. That means


    *   Aliases and original column names must be unique.


    *   Aliases should not contain spaces, can’t start with a number, and can’t contain
    other special characters.


    *   Aliases should not be SQL keywords.


    If you really need to work around the preceding second and third rules, you can
    enclose the alias in double quotes. For example:


    ```

    SELECT

    ordered AS "order",

    shipped AS "shipped date"

    FROM sales;

    ```


    Here, the name `order` is an SQL keyword, while `shipped date` contains a space.


    | **Order** | **shipped date** |

    | --- | --- |

    | 2022-05-15 21:12:07.988741 | 2022-05-23 |

    | 2022-05-16 03:03:16.065969 | 2022-05-24 |

    | 2022-05-16 10:09:13.674823 | 2022-05-22 |

    | 2022-05-16 15:02:43.285565 | [NULL] |

    | 2022-05-16 16:48:14.674202 | 2022-05-28 |

    | ~ 5549 rows ~ |


    You should resist the urge to do this. Aliases, as with column names, are for
    technical rather than aesthetic use. A `SELECT` statement is not actually a report.


    Some DBMSs offer alternatives to double quotes for special names:


    *   Microsoft SQL offers square brackets as an alternative: `[shipped date]`.
    There is no reason to prefer this to double quotes.


    *   MySQL/MariaDB uses “backticks” as an alternative: `''shipped date''`. In ANSI
    mode, this is unnecessary, but in traditional mode, it’s all you’ve got.


    Whatever names you choose, remember that they are meant to be purely functional.
    Don’t get carried away trying to use upper and lower case, or spaces, or anything
    else that might look better. That’s up to the software handling the output of
    your queries. In SQL, you just need a suitable name to refer to the data.


    #### AS Is Optional


    You will discover soon enough that `AS` is optional:


    ```

    SELECT

    id customer,

    height/2.54 height,

    givenname||'' ''||familyname fullname,

    --  givenname+'' ''+familyname fullname   --  MSSQL

    ''active'' status,

    (SELECT name FROM towns WHERE id=townid) town,

    length(email) length

    --  len(email) length         --  MSSQL

    FROM customers;

    ```


    Some developers justify leaving out the `AS` as it saves time or makes them look
    more professional. However, you will also make this kind of mistake soon enough:


    ```

    SELECT

    id,

    email

    givenname, familyname,

    height,

    dob

    FROM customers;

    ```


    This gives you a confusing result:


    | **id** | **givenname** | **familyname** | **height** | **dob** |

    | --- | --- | --- | --- | --- |

    | 42 | may.knott61@example.net | Knott | 168.5 | [NULL] |

    | 459 | rick.shaw459@example.net | Shaw | 170.9 | 1945-07-03 |

    | 597 | ike.andy597@example.com | Andy | 153 | 1998-08-09 |

    | 186 | pat.downe186@example.net | Downe | 176 | 1990-04-12 |

    | 352 | basil.isk352@example.net | Isk | 156.4 | 1960-01-13 |

    | 576 | pearl.divers576@example.com | Divers | 176.3 |   |

    | ~ 303 rows ~ |


    At first glance, this looks OK, as it is not a technical error. However, on closer
    inspection, you’ll see that the `email` has been aliased to `familyname`, since
    there is no comma between them. Aliasing one column to another is legitimate,
    though it’s not often that you would really want to.


    You can’t stop SQL from allowing this, but you can make mistakes like this slightly
    easier to spot if you develop a pattern which always includes `AS` for aliases.'
  trans: "\n# 4. 处理计算数据\n\n毫无疑问，你之前一定见过计算。SQL 允许你在查询中包含计算数据。\n\n在本章中，我们将探讨关于不同类型数据及其计算方式的一些重要概念。\n\
    \n不要过度沉迷于在 SQL 中进行计算。数据库更关心的是维护和访问原始数据。然而，能够将你的原始数据转化为对当前任务更有用的形式，是很有帮助的。\n\n\
    不同的数据库管理系统在执行计算的能力上差异很大。尤其是在函数方面，它们不仅在功能范围上有所不同，甚至在数据库管理系统对它们的称呼上也不一样。\n\n特别是，SQLite\
    \ 执行计算的能力非常有限，尤其是在函数方面。\n\n在本章中，我们将处理各种类型的数据，包括字符串。如果你使用的是 MariaDB/MySQL，我们强烈建议你会话设置为\
    \ ANSI 模式，这样字符串的行为就能与标准 SQL 保持一致。\n\n你可以用 `SET SESSION sql_mode = 'ANSI';` 来开始你的会话。\n\
    \n## 计算基础\n\n我们稍后会看更多细节，但这里概述一下 SQL 中计算的工作原理。\n\n你可以基于单个列或多个列来计算值。例如：\n\n```sql\n\
    SELECT\n    height/2.54,                       --  单列\n    givenname||' '||familyname\
    \         --  多列\n    --  givenname+' '+familyname       --  MSSQL\nFROM customers;\n\
    ```\n\n这会得到：\n\n| **?column?** | **?column?** |\n| --- | --- |\n| 66.339 | May\
    \ Knott |\n| 67.283 | Rick Shaw |\n| 60.236 | Ike Andy |\n| ~ 303 行 ~ |\n\n你也可以“硬编码”值或从子查询中获取它们：\n\
    \n```sql\nSELECT\n    'active',                   --  硬编码\n    (SELECT name FROM\
    \ towns WHERE id=townid)  --  子查询\nFROM customers;\n```\n\n你会得到：\n\n| **?column?**\
    \ | **?column?** |\n| --- | --- |\n| active | Kings Park |\n| active | Richmond\
    \ |\n| ~ 303 行 ~ |\n\n还有一些内置函数：\n\n```sql\nSELECT\n    upper(familyname)     \
    \     --  大写函数\nFROM customers;\n```\n\n这会得到：\n\n| **?column?** |\n| --- |\n|\
    \ KNOTT |\n| SHAW |\n| ~ 303 行 ~ |\n\n在所有情况下，你会注意到计算值都没有一个合适的名称。\n\n### 使用别名\n\
    \n计算列给 SQL 带来了一个小麻烦。通常，每一列都应该有一个唯一的名称，但 SQL 不清楚该如何称呼新生成的列。\n\n有些 SQL 客户端会让计算列保持无名，而有些则会生成一个虚拟名。在尝试简单的\
    \ `SELECT` 语句时，这没问题，但当要认真对待该语句时（例如，你计划稍后使用其结果），你就需要为每一列指定一个更好的名称。\n\n**别名** 是列的新名称，无论它是计算列还是原始列。你使用\
    \ `AS` 关键字来创建别名。例如：\n\n```sql\nSELECT\n    id AS customer,\n    height/2.54 AS\
    \ height,\n    givenname||' '||familyname AS fullname,\n    --  givenname+' '+familyname\
    \ AS fullname    --  MSSQL\n    'active' AS status,\n    (SELECT name FROM towns\
    \ WHERE id=townid) AS town,\n    length(email) AS length\n    --  len(email) AS\
    \ length           --  MSSQL\nFROM customers;\n```\n\n这样看起来好多了：\n\n| **customer**\
    \ | **Height** | **fullname** | **status** | **town** | **length** |\n| --- |\
    \ --- | --- | --- | --- | --- |\n| 42 | 66.339 | May Knott | active | Kings Park\
    \ | 23 |\n| 459 | 67.283 | Rick Shaw | active | Richmond | 24 |\n| ~ 303 行 ~ |\n\
    \n注意：\n- `id` 列即使没有被计算，也被设置了别名。\n- `height` 计算被别名为 `height`；这没问题，因为它仍然表示相同的意思，只是单位不同。\n\
    \n除了每个计算列必须有唯一名这一事实外，包含别名的其他原因如下：\n- 有时，你只是需要重命名列，以获得更好的含义或适应后续使用。\n- 有时，你需要将列格式化或转换为更合适的形式，但仍希望保留其原始名称。\n\
    \n此时，我们并不关心前面的别名是否是列的最佳名称；我们只是看看它们是如何工作的。\n\n#### 别名名称\n\n总的来说，别名名称的规则与列名的规则相同。这意味着：\n\
    - 别名和原始列名必须是唯一的。\n- 别名不应包含空格，不能以数字开头，也不能包含其他特殊字符。\n- 别名不应是 SQL 关键字。\n\n如果你确实需要绕过上面第二和第三条规则，你可以将别名用双引号括起来。例如：\n\
    \n```sql\nSELECT\n    ordered AS \"order\",\n    shipped AS \"shipped date\"\n\
    FROM sales;\n```\n\n这里，名称 `order` 是一个 SQL 关键字，而 `shipped date` 包含一个空格。\n\n| **Order**\
    \ | **shipped date** |\n| --- | --- |\n| 2022-05-15 21:12:07.988741 | 2022-05-23\
    \ |\n| 2022-05-16 03:03:16.065969 | 2022-05-24 |\n| ~ 5549 行 ~ |\n\n你应该克制这样做的冲动。别名，如同列名，是为了技术用途而非美观。`SELECT`\
    \ 语句实际上不是报表。\n\n有些数据库管理系统为特殊名称提供了双引号的替代方案：\n- Microsoft SQL 提供方括号作为替代：`[shipped\
    \ date]`。没有理由更倾向于使用它而不是双引号。\n- MySQL/MariaDB 使用“反引号”作为替代：`` `shipped date` ``。在\
    \ ANSI 模式下，这是不必要的，但在传统模式下，你只能用这个。\n\n无论你选择什么名称，请记住它们应该是纯粹功能性的。不要试图使用大小写、空格或其他可能看起来更好的东西。那是处理查询输出的软件的事情。在\
    \ SQL 中，你只需要一个合适的名称来引用数据。\n\n#### AS 是可选的\n\n你很快就会发现 `AS` 是可选的：\n\n```sql\nSELECT\n\
    \    id customer,\n    height/2.54 height,\n    givenname||' '||familyname fullname,\n\
    \    --  givenname+' '+familyname fullname   --  MSSQL\n    'active' status,\n\
    \    (SELECT name FROM towns WHERE id=townid) town,\n    length(email) length\n\
    \    --  len(email) length         --  MSSQL\nFROM customers;\n```\n\n有些开发者认为省略\
    \ `AS` 可以节省时间或让他们看起来更专业。然而，你很快也会犯这种错误：\n\n```sql\nSELECT\n    id,\n    email\n\
    \    givenname, familyname,\n    height,\n    dob\nFROM customers;\n```\n\n这会给你一个令人困惑的结果：\n\
    \n| **id** | **givenname** | **familyname** | **height** | **dob** |\n| --- |\
    \ --- | --- | --- | --- |\n| 42 | may.knott61@example.net | Knott | 168.5 | [NULL]\
    \ |\n| 459 | rick.shaw459@example.net | Shaw | 170.9 | 1945-07-03 |\n| ~ 303 行\
    \ ~ |\n\n乍一看，这似乎没问题，因为它没有技术错误。然而，仔细检查后，你会发现 `email` 被别名为了 `givenname`，因为它们之间没有逗号。将一列别名为另一列是合法的，尽管你并不经常真正想这么做。\n\
    \n你无法阻止 SQL 允许这种做法，但如果你养成一个总是用 `AS` 来指定别名的模式，就能让这类错误更容易被发现。\n"
- fmt: '#### 别名在查询后续部分不可用


    回顾基础 SQL 子句的处理顺序：


    1.  `FROM`

    2.  `WHERE`

    3.  `GROUP BY`

    4.  `HAVING`

    5.  `SELECT`

    6.  `ORDER BY`


    这与你编写 SQL 的方式不同，因为你*先写* `SELECT` 子句。


    这在下面这样的语句中会造成主要混淆点：


    ```sql

    SELECT id, title, price, price*0.1 AS tax

    FROM books

    WHERE tax<1.5;

    ```


    这将导致错误，因为尽管 `price*0.1 AS tax` 表达式写在第一个子句中，但它实际上在 `WHERE` 子句之后才被处理。因此，`tax` 在
    `WHERE` 子句中尚不可用。


    如果你将计算结果别名为原始列名，情况会变得更令人困惑：


    ```sql

    SELECT

    id, title,

    price*1.1 AS price  -- 调整以含税

    FROM books

    WHERE price<15;

    ```


    这将生效。这里，`price` 被增加以包含税，并被别名为原始名称，这是合法的。


    | **id** | **Truncate** | **price** |

    | --- | --- | --- |

    | 2078 | The Duel | 13.75 |

    | 1530 | Robin Hood, The Prince of Thieves | 13.75 |

    | 982 | Struwwelpeter: Fearful Stories and Vile Pictures … | 12.65 |

    | 573 | The Nose | 11 |

    | 1573 | Rachel Ray | 11 |

    | 532 | Elective Affinities | 12.65 |

    | ~ 521 rows ~ |


    然而，`WHERE` 子句将基于*原始* `price` 列进行过滤，*而不是*调整后的版本。


    同样，你对此直接能做的并不多，因为你不能选择将 `SELECT` 子句写在更靠后的位置，也不能在其他任何子句中创建别名。


    稍后，我们将看到使用公共表表达式如何有助于预处理计算列。


    如果你计划稍后使用某个计算结果，将其别名为原始列名可能不是一个好主意。


    SQL 对如何处理别名有清晰的规定，但人类读者很可能会感到困惑。


    ### 处理 NULL 值


    迟早，你会在计算中遇到可怕的 `NULL`。实际上，`NULL` 本身并没有问题，但它会彻底搞乱你的计算。


    任何涉及 `NULL` 的计算结果都将是 `NULL`。可以说 `NULL` 对于计算极具破坏性。除非你将数据通过一个或两个能够处理 `NULL` 的表达式。


    Oracle 字符串是例外。Oracle 将 `NULL` 字符串视为空字符串。一方面，这很方便；另一方面，有时你确实需要 `NULL` 的行为像 `NULL`。


    如果你正在对包含 `NULL` 的单个列进行计算，结果也是 `NULL` 是合理的。例如：


    ```sql

    SELECT

    id, givenname, familyname,

    height/2.54 AS height       -- 有时为 NULL

    FROM customers;

    ```


    有时你会得到 `NULL` 结果：


    | **id** | **Givenname** | **familyname** | **height** |

    | --- | --- | --- | --- |

    | 101 | Artie | Chokes | 63.858 |

    | 489 | Justin | Case | [NULL] |

    | 59 | Leigh | Don | 66.693 |

    | 593 | Luke | Warm | [NULL] |

    | 170 | Dan | Dee | 65.039 |

    | 541 | Neil | Downe | 64.606 |

    | ~ 303 rows ~ |


    由于我们所做的只是转换单个值，因此将 `NULL` 保留原样是完全可接受的——如果你不知道身高（厘米），那么你仍然不知道它（英寸）。然而，我们很快会看到，有时你可能用你觉得更好的值替换
    `NULL`。


    另一方面，如果你在多个列上进行计算，且其中大多数不是 `NULL`，这种行为会变得更加麻烦：


    ```sql

    SELECT

    id, givenname, othernames, familyname,

    givenname||'' ''||othernames||'' ''||familyname AS fullname

    --  MSSQL:

    --  givenname+'' ''+othernames+'' ''+familyname AS fullname

    FROM authors;

    ```


    除了 Oracle，你会得到很多 `NULL`：


    | **id** | **givenname** | **Othernames** | **familyname** | **fullname** |

    | --- | --- | --- | --- | --- |

    | 464 | Ambrose | [NULL] | Bierce | [NULL] |

    | 858 | Alexander | [NULL] | Ostrovsky | [NULL] |

    | 525 | Francis | [NULL] | Beaumont | [NULL] |

    | 479 | C.E. | Van | Koetsveld | C.E. van Koetsveld |

    | 703 | Friedrich | [NULL] | Engels | [NULL] |

    | ~ 488 rows ~ |


    在前面的例子中，大多数作者没有 `othernames` 的值，因此它是 `NULL`。有些甚至没有 `givenname` 值。大多数情况下，`givenname`
    或 `familyname` 没问题，但 `othernames` 的 `NULL` 毁掉了整个计算。


    然而，在 Oracle 中，你不会得到 `NULL`。但是，你会在缺失名字的位置看到额外的空格。


    从技术上讲，结果是正确的。如果你不知道某些名字，那么你就不知道全名。然而，这没有帮助。


    #### Coalesce


    SQL 有一个名为 `coalesce()` 的函数，可以用首选的替代值替换 `NULL`。单词 “coalesce” 实际上意味着合并，但它如何成为此操作的名称是那些在古代历史深处丢失的谜团之一。


    该函数这样使用：


    ```sql

    coalesce(expression,planB)

    ```


    如果前面的 `expression` 恰好是 `NULL`，则将使用 `planB`。


    你可以有多个替代值：


    ```sql

    coalesce(expression,planB,planC, ... , planZ)

    ```


    如果 `planB` 也恰好是 `NULL`，`coalesce()` 将尝试下一个替代值，依此类推，直到找到实际值，或者替代值用尽。


    你可以在缺失的电话号码上看到 `coalesce` 的实际应用：


    ```sql

    SELECT

    id, givenname, familyname,

    phone

    FROM employees;

    ```


    在 `employees` 表中，有些人缺失电话号码。


    | **id** | **Givenname** | **familyname** | **phone** |

    | --- | --- | --- | --- |

    | 7 | Ebenezer | Splodge | 0491577644 |

    | 4 | Gladys | Raggs | 0491573087 |

    | 28 | Cornelius | Eversoe | [NULL] |

    | 32 | Clarisse | Cringinghut | 0491571804 |

    | 33 | Will | Power | 0491576398 |

    | 26 | Fred | Kite | 0491572983 |

    | ~ 34 rows ~ |


    将这些缺失的电话号码替换为公司的总机号码是合理的：


    ```sql

    SELECT

    id, givenname, familyname,

    coalesce(phone,''1300975711'')  -- 合并至总机号码

    FROM employees;

    ```


    这里，缺失的号码已被合并：


    | **id** | **Givenname** | **familyname** | **coalesce** |

    | --- | --- | --- | --- |

    | 7 | Ebenezer | Splodge | 0491577644 |

    | 4 | Gladys | Raggs | 0491573087 |

    | 28 | Cornelius | Eversoe | 1300975711 |

    | 32 | Clarisse | Cringinghut | 0491571804 |

    | 33 | Will | Power | 0491576398 |

    | 26 | Fred | Kite | 0491572983 |

    | ~ 34 rows ~ |


    关于 `coalesce()` 的问题是，你并不总能蒙混过关。你需要确保你的替代有意义，并且你的猜测是个好猜测。有很多时候它没有意义，例如一本书缺失的价格或作者的出生日期；`NULL`
    通常是你能做的最好的事情。


    在第 [2](#606708_1_En_2_Chapter.xhtml) 章中，你使用 `coalesce()` 猜测了一个缺失的数量，然后修复了它，使得该数量在未来不能为
    `NULL`。有时，那是最好的解决方案。'
  raw: '#### Aliases Are Not Available in the Rest of the Query


    Recall that the processing order for basic SQL clauses is


    1.  `FROM`


    2.  `WHERE`


    3.  `GROUP BY`


    4.  `HAVING`


    5.  `SELECT`


    6.  `ORDER BY`


    This is different to the way you write SQL in that you *write* the `SELECT` clause
    first.


    This creates a major point of confusion in a statement like this:


    ```

    SELECT id, title, price, price*0.1 AS tax

    FROM books

    WHERE tax<1.5;

    ```


    This will result in an error, since although the `price*0.1 AS tax` expression
    is written in the first clause, it isn’t actually processed until after the `WHERE`
    clause. As a result, `tax` is not yet available for the `WHERE` clause.


    It becomes more confusing if you alias a calculation to an original column name:


    ```

    SELECT

    id, title,

    price*1.1 AS price  --  adjust to include tax

    FROM books

    WHERE price<15;

    ```


    This will work. Here, the `price` has been increased to include tax and aliased
    to the original name, which is legitimate.


    | **id** | **Truncate** | **price** |

    | --- | --- | --- |

    | 2078 | The Duel | 13.75 |

    | 1530 | Robin Hood, The Prince of Thieves | 13.75 |

    | 982 | Struwwelpeter: Fearful Stories and Vile Pictures … | 12.65 |

    | 573 | The Nose | 11 |

    | 1573 | Rachel Ray | 11 |

    | 532 | Elective Affinities | 12.65 |

    | ~ 521 rows ~ |


    However, the `WHERE` clause will filter on the *original* `price` column, *not*
    the adjusted version.


    Again, there’s not much you can do about this directly, as you don’t have the
    option to write the `SELECT` clause further down, and you can’t create aliases
    in any other clause.


    Later, we will see how using Common Table Expressions can help preprocess calculated
    columns.


    It’s probably not a good idea to alias a calculation to an original column name
    *if* you’re planning to use it later.


    SQL has a clear idea of what it’s going to do with the aliased name, but the human
    reader may well get confused.


    ### Dealing with NULLs


    Sooner or later, you will encounter the dreaded `NULL` in your calculations. Actually,
    there’s nothing wrong with `NULL` *per se*, but it will totally make a mess of
    your calculations.


    Any calculation involving a `NULL` will end up as `NULL`. You can say that `NULL`
    is very destructive for calculations. That is, unless you run the data through
    one or two expressions which are capable of handling `NULL`s.


    The exception to this is with Oracle strings. Oracle treats `NULL` strings as
    empty strings. On one hand, this can be convenient; on the other, there are times
    when you really need `NULL` to behave as `NULL`.


    If you are calculating with a single column which includes `NULL`, it makes sense
    that the result is also a `NULL`. For example:


    ```

    SELECT

    id, givenname, familyname,

    height/2.54 AS height       --  sometimes NULL

    FROM customers;

    ```


    Sometimes, you get a `NULL` result:


    | **id** | **Givenname** | **familyname** | **height** |

    | --- | --- | --- | --- |

    | 101 | Artie | Chokes | 63.858 |

    | 489 | Justin | Case | [NULL] |

    | 59 | Leigh | Don | 66.693 |

    | 593 | Luke | Warm | [NULL] |

    | 170 | Dan | Dee | 65.039 |

    | 541 | Neil | Downe | 64.606 |

    | ~ 303 rows ~ |


    Since all we’re doing is converting a single value, it is perfectly acceptable
    to leave `NULL`s as they are—if you don’t know what the height is in centimeters,
    then you still don’t know what it is in inches. However, we’ll see shortly how
    you might sometimes replace the `NULL` with something you feel is better.


    On the other hand, this behavior becomes more of a nuisance if you’re calculating
    on multiple columns, most of which are not `NULL`:


    ```

    SELECT

    id, givenname, othernames, familyname,

    givenname||'' ''||othernames||'' ''||familyname AS fullname

    --  MSSQL:

    --  givenname+'' ''+othernames+'' ''+familyname AS fullname

    FROM authors;

    ```


    With the exception of Oracle, you’ll get a lot of `NULL`s:


    | **id** | **givenname** | **Othernames** | **familyname** | **fullname** |

    | --- | --- | --- | --- | --- |

    | 464 | Ambrose | [NULL] | Bierce | [NULL] |

    | 858 | Alexander | [NULL] | Ostrovsky | [NULL] |

    | 525 | Francis | [NULL] | Beaumont | [NULL] |

    | 479 | C.E. | Van | Koetsveld | C.E. van Koetsveld |

    | 703 | Friedrich | [NULL] | Engels | [NULL] |

    | ~ 488 rows ~ |


    In the preceding example, most authors don’t have a value for `othernames`, so
    it is `NULL`. Some don’t even have a `givenname` value. There’s nothing wrong
    for the most part with the `givenname` or the `familyname`, but the `NULL` for
    `othernames` destroys the whole calculation.


    With Oracle, however, you won’t get `NULL`s. However, you will see extra spaces
    where the missing names are.


    Technically, the result is correct. If you don’t know some of the names, then
    you don’t know the full name. However, that’s unhelpful.


    #### Coalesce


    SQL has a function called `coalesce()` which can replace `NULL` with a preferred
    alternative. The word “coalesce” actually means to combine, but how it came to
    be the name of this operation is one of those mysteries lost in the depths of
    ancient history.


    The function is used this way:


    ```

    coalesce(expression,planB)

    ```


    If the preceding `expression` happens to be `NULL`, then `planB` will be used.


    You can have a number of alternative values:


    ```

    coalesce(expression,planB,planC, ... , planZ)

    ```


    If `planB` also happens to be `NULL`, `coalesce()` will try the next alternative
    and so on until either there is a real value, or the alternatives have been exhausted.


    You can see `coalesce` in action with missing phone numbers:


    ```

    SELECT

    id, givenname, familyname,

    phone

    FROM employees;

    ```


    In the `employees` table, some are missing phone numbers.


    | **id** | **Givenname** | **familyname** | **phone** |

    | --- | --- | --- | --- |

    | 7 | Ebenezer | Splodge | 0491577644 |

    | 4 | Gladys | Raggs | 0491573087 |

    | 28 | Cornelius | Eversoe | [NULL] |

    | 32 | Clarisse | Cringinghut | 0491571804 |

    | 33 | Will | Power | 0491576398 |

    | 26 | Fred | Kite | 0491572983 |

    | ~ 34 rows ~ |


    It would be reasonable to replace these missing phone numbers with the company’s
    main phone number:


    ```

    SELECT

    id, givenname, familyname,

    coalesce(phone,''1300975711'')  --  coalesce to main number

    FROM employees;

    ```


    Here, the missing number has been coalesced:


    | **id** | **Givenname** | **familyname** | **coalesce** |

    | --- | --- | --- | --- |

    | 7 | Ebenezer | Splodge | 0491577644 |

    | 4 | Gladys | Raggs | 0491573087 |

    | 28 | Cornelius | Eversoe | 1300975711 |

    | 32 | Clarisse | Cringinghut | 0491571804 |

    | 33 | Will | Power | 0491576398 |

    | 26 | Fred | Kite | 0491572983 |

    | ~ 34 rows ~ |


    The thing about `coalesce()` is that you can’t always get away with it. You need
    to be sure that your substitute makes sense and that your guess is a good one.
    There are many times when it wouldn’t make sense, such as a missing price for
    a book or an author’s date of birth; `NULL` is often the best thing you can do.


    In Chapter [2](#606708_1_En_2_Chapter.xhtml), you guessed at a missing quantity
    using `coalesce()` and then fixed it so that the quantity can’t be `NULL` in the
    future. Sometimes, that’s the best solution.'
  trans: '#### 别名在查询后续部分不可用


    回顾基础 SQL 子句的处理顺序：


    1.  `FROM`

    2.  `WHERE`

    3.  `GROUP BY`

    4.  `HAVING`

    5.  `SELECT`

    6.  `ORDER BY`


    这与你编写 SQL 的方式不同，因为你*先写* `SELECT` 子句。


    这在下面这样的语句中会造成主要混淆点：


    ```sql

    SELECT id, title, price, price*0.1 AS tax

    FROM books

    WHERE tax<1.5;

    ```


    这将导致错误，因为尽管 `price*0.1 AS tax` 表达式写在第一个子句中，但它实际上在 `WHERE` 子句之后才被处理。因此，`tax` 在
    `WHERE` 子句中尚不可用。


    如果你将计算结果别名为原始列名，情况会变得更令人困惑：


    ```sql

    SELECT

    id, title,

    price*1.1 AS price  -- 调整以含税

    FROM books

    WHERE price<15;

    ```


    这将生效。这里，`price` 被增加以包含税，并被别名为原始名称，这是合法的。


    | **id** | **书名** | **price** |

    | --- | --- | --- |

    | 2078 | The Duel | 13.75 |

    | 1530 | Robin Hood, The Prince of Thieves | 13.75 |

    | 982 | Struwwelpeter: Fearful Stories and Vile Pictures … | 12.65 |

    | 573 | The Nose | 11 |

    | 1573 | Rachel Ray | 11 |

    | 532 | Elective Affinities | 12.65 |

    | ~ 521 行 ~ |


    然而，`WHERE` 子句将基于*原始* `price` 列进行过滤，*而不是*调整后的版本。


    同样，你对此直接能做的并不多，因为你不能选择将 `SELECT` 子句写在更靠后的位置，也不能在其他任何子句中创建别名。


    稍后，我们将看到使用公共表表达式如何有助于预处理计算列。


    如果你计划稍后使用某个计算结果，将其别名为原始列名可能不是一个好主意。


    SQL 对如何处理别名有清晰的规定，但人类读者很可能会感到困惑。


    ### 处理 NULL 值


    迟早，你会在计算中遇到可怕的 `NULL`。实际上，`NULL` 本身并没有问题，但它会彻底搞乱你的计算。


    任何涉及 `NULL` 的计算结果都将是 `NULL`。可以说 `NULL` 对于计算极具破坏性。除非你将数据通过一个或两个能够处理 `NULL` 的表达式。


    Oracle 字符串是例外。Oracle 将 `NULL` 字符串视为空字符串。一方面，这很方便；另一方面，有时你确实需要 `NULL` 的行为像 `NULL`。


    如果你正在对包含 `NULL` 的单个列进行计算，结果也是 `NULL` 是合理的。例如：


    ```sql

    SELECT

    id, givenname, familyname,

    height/2.54 AS height       -- 有时为 NULL

    FROM customers;

    ```


    有时你会得到 `NULL` 结果：


    | **id** | **Givenname** | **familyname** | **height** |

    | --- | --- | --- | --- |

    | 101 | Artie | Chokes | 63.858 |

    | 489 | Justin | Case | [NULL] |

    | 59 | Leigh | Don | 66.693 |

    | 593 | Luke | Warm | [NULL] |

    | 170 | Dan | Dee | 65.039 |

    | 541 | Neil | Downe | 64.606 |

    | ~ 303 行 ~ |


    由于我们所做的只是转换单个值，因此将 `NULL` 保留原样是完全可接受的——如果你不知道身高（厘米），那么你仍然不知道它（英寸）。然而，我们很快会看到，有时你可能用你觉得更好的值替换
    `NULL`。


    另一方面，如果你在多个列上进行计算，且其中大多数不是 `NULL`，这种行为会变得更加麻烦：


    ```sql

    SELECT

    id, givenname, othernames, familyname,

    givenname||'' ''||othernames||'' ''||familyname AS fullname

    --  MSSQL:

    --  givenname+'' ''+othernames+'' ''+familyname AS fullname

    FROM authors;

    ```


    除了 Oracle，你会得到很多 `NULL`：


    | **id** | **givenname** | **Othernames** | **familyname** | **fullname** |

    | --- | --- | --- | --- | --- |

    | 464 | Ambrose | [NULL] | Bierce | [NULL] |

    | 858 | Alexander | [NULL] | Ostrovsky | [NULL] |

    | 525 | Francis | [NULL] | Beaumont | [NULL] |

    | 479 | C.E. | Van | Koetsveld | C.E. van Koetsveld |

    | 703 | Friedrich | [NULL] | Engels | [NULL] |

    | ~ 488 行 ~ |


    在前面的例子中，大多数作者没有 `othernames` 的值，因此它是 `NULL`。有些甚至没有 `givenname` 值。大多数情况下，`givenname`
    或 `familyname` 没问题，但 `othernames` 的 `NULL` 毁掉了整个计算。


    然而，在 Oracle 中，你不会得到 `NULL`。但是，你会在缺失名字的位置看到额外的空格。


    从技术上讲，结果是正确的。如果你不知道某些名字，那么你就不知道全名。然而，这没有帮助。


    #### Coalesce


    SQL 有一个名为 `coalesce()` 的函数，可以用首选的替代值替换 `NULL`。单词 “coalesce” 实际上意味着合并，但它如何成为此操作的名称是那些在古代历史深处丢失的谜团之一。


    该函数这样使用：


    ```sql

    coalesce(expression,planB)

    ```


    如果前面的 `expression` 恰好是 `NULL`，则将使用 `planB`。


    你可以有多个替代值：


    ```sql

    coalesce(expression,planB,planC, ... , planZ)

    ```


    如果 `planB` 也恰好是 `NULL`，`coalesce()` 将尝试下一个替代值，依此类推，直到找到实际值，或者替代值用尽。


    你可以在缺失的电话号码上看到 `coalesce` 的实际应用：


    ```sql

    SELECT

    id, givenname, familyname,

    phone

    FROM employees;

    ```


    在 `employees` 表中，有些人缺失电话号码。


    | **id** | **Givenname** | **familyname** | **phone** |

    | --- | --- | --- | --- |

    | 7 | Ebenezer | Splodge | 0491577644 |

    | 4 | Gladys | Raggs | 0491573087 |

    | 28 | Cornelius | Eversoe | [NULL] |

    | 32 | Clarisse | Cringinghut | 0491571804 |

    | 33 | Will | Power | 0491576398 |

    | 26 | Fred | Kite | 0491572983 |

    | ~ 34 行 ~ |


    将这些缺失的电话号码替换为公司的总机号码是合理的：


    ```sql

    SELECT

    id, givenname, familyname,

    coalesce(phone,''1300975711'')  -- 合并至总机号码

    FROM employees;

    ```


    这里，缺失的号码已被合并：


    | **id** | **Givenname** | **familyname** | **coalesce** |

    | --- | --- | --- | --- |

    | 7 | Ebenezer | Splodge | 0491577644 |

    | 4 | Gladys | Raggs | 0491573087 |

    | 28 | Cornelius | Eversoe | 1300975711 |

    | 32 | Clarisse | Cringinghut | 0491571804 |

    | 33 | Will | Power | 0491576398 |

    | 26 | Fred | Kite | 0491572983 |

    | ~ 34 行 ~ |


    关于 `coalesce()` 的问题是，你并不总能蒙混过关。你需要确保你的替代有意义，并且你的猜测是个好猜测。有很多时候它没有意义，例如一本书缺失的价格或作者的出生日期；`NULL`
    通常是你能做的最好的事情。


    在第 2 章中，你使用 `coalesce()` 猜测了一个缺失的数量，然后修复了它，使得该数量在未来不能为 `NULL`。有时，那是最好的解决方案。'
- fmt: '#### Fixing the Author Names


    With the `coalesce()` function, you can replace the missing author names with
    an alternative. There are two things to consider here:


    *   You can’t make up a missing name, so the alternative will have to be an empty
    string.

    *   You’ll also want to leave out the spaces after the missing names.


    For the second point, we won’t coalesce just the name, but the combination of
    the name and the space, which should also be `NULL`—except for Oracle, which doesn’t
    behave the same way. We’ll take a different approach for Oracle.


    To coalesce the names and spaces to an empty string, we can use


    ```sql

    --  PostgreSQL, MariaDB/MySQL, SQLite

    SELECT

    id, givenname, othernames, familyname,

    coalesce(givenname||'' '','''')

    ||coalesce(othernames||'' '','''')

    ||familyname AS fullname

    FROM authors;


    --  MSSQL

    SELECT

    id, givenname, othernames, familyname,

    coalesce(givenname+'' '','''')

    +coalesce(othernames+'' '','''')

    +familyname AS fullname

    FROM authors;

    ```


    This gives us


    | **id** | **givenname** | **Othernames** | **familyname** | **fullname** |

    | --- | --- | --- | --- | --- |

    | 464 | Ambrose | [NULL] | Bierce | Ambrose Bierce |

    | 858 | Alexander | [NULL] | Ostrovsky | Alexander Ostrovsky |

    | 525 | Francis | [NULL] | Beaumont | Francis Beaumont |

    | 479 | C.E. | Van | Koetsveld | C.E. van Koetsveld |

    | 703 | Friedrich | [NULL] | Engels | Friedrich Engels |

    | ~ 488 rows ~ |


    Since Oracle will happily concatenate a `NULL` string, we can’t use `coalesce()`.
    Instead, we’ll use the `ltrim()` function. This function removes leading spaces
    from a string. Since we’re adding a space to the *end* of the string, it will
    only be a leading space if the name is empty. This gives us


    ```sql

    --  Oracle

    SELECT

    id, givenname, othernames, familyname,

    ltrim(givenname||'' '')||ltrim(othernames||'' '')

    ||familyname AS fullname

    FROM authors;

    ```


    This should give us the same result as before.


    ### Using Calculations in Other Clauses


    In this chapter, we’re using the calculations mostly in the `SELECT` clause. Of
    course, any clause which contains a value can use a calculated value. We’ll have
    a look at a few examples here.


    One obvious use for calculations is in the `WHERE` clause. For example, you can
    find books with shorter titles:


    ```sql

    SELECT *

    FROM books

    WHERE length(title)<24;     --  MSSQL: len(title)

    ```


    giving


    | **id** | **authorid** | **Title** | **published** | **price** |

    | --- | --- | --- | --- | --- |

    | 2078 | 765 | The Duel | 1811 | 12.50 |

    | 503 | 128 | Uncle Silas | 1864 | 17.00 |

    | 2007 | 99 | North and South | 1854 | 17.50 |

    | 702 | 547 | Jane Eyre | 1847 | 17.50 |

    | 1759 | 17 | La Curée | 1872 | 16.00 |

    | 205 | 436 | Shadow: A Parable | [NULL] | 17.50 |

    | ~ 762 rows ~ |


    You may need this if your database is case sensitive and you need to match a string
    in an unknown case:


    ```sql

    SELECT *

    FROM books

    WHERE lower(title) LIKE ''%journey%'';

    ```


    giving


    | **id** | **authorid** | **Title** | **published** | **price** |

    | --- | --- | --- | --- | --- |

    | 880 | 777 | The Journey of Niels Klim to the Wor … | 1741 | 12.50 |

    | 946 | 704 | Following the Equator: A Journey Aro … | 1897 | 19.50 |

    | 1314 | 606 | Mozart’s Journey to Prague | 1856 | 17.00 |

    | 1092 | 295 | A Journey to the Western Islands of … | 1775 | 14.50 |

    | 502 | [NULL] | Journey to the Center of the Earth | 1864 | 15.50 |

    | 1454 | 914 | A Sentimental Journey | 1768 | 13.50 |


    You can also calculate an aggregate value in a subquery:


    ```sql

    SELECT *

    FROM customers

    WHERE height<(SELECT avg(height) FROM customers);

    ```


    giving


    | **id** | **familyname** | **Givenname** | **…** | **height** | **…** |

    | --- | --- | --- | --- | --- | --- |

    | 42 | Knott | May | … | 168.5 | … |

    | 597 | Andy | Ike | … | 153.0 | … |

    | 352 | Isk | Basil | … | 156.4 | … |

    | 526 | Coming | Seymour | … | 163.5 | … |

    | 26 | Twishes | Bess | … | 164.6 | … |

    | 91 | North | June | … | 164.5 | … |

    | ~ 128 rows ~ |


    You can also use calculations in the `ORDER BY` clause, such as when you want
    to sort by the length of a title:


    ```sql

    SELECT *

    FROM books

    ORDER BY length(title);     --  MSSQL: length(title)

    ```


    which gives


    | **id** | **authorid** | **title** | **published** | **price** |

    | --- | --- | --- | --- | --- |

    | 385 | 971 | She | 1887 | 11.00 |

    | 488 | 478 | Mumu | 1852 | 18.00 |

    | 728 | 534 | Emma | 1815 | 10.00 |

    | 1625 | 496 | Lenz | 1835 | 18.50 |

    | 317 | 99 | Ruth | 1853 | 16.50 |

    | 2140 | 17 | Nana | 1880 | 12.50 |

    | ~ 1200 rows ~ |


    However, you’re likely to want to select what you’re sorting by, so it would make
    more sense to calculate the value in the `SELECT` clause and sort by the result:


    ```sql

    SELECT id, authorid, title, length(title) AS len, published, price

    FROM books

    ORDER BY len;       --  MSSQL: length(title)

    ```


    which is more informative:


    | **id** | **authorid** | **Title** | **len** | **published** | **price** |

    | --- | --- | --- | --- | --- | --- |

    | 385 | 971 | She | 3 | 1887 | 11.00 |

    | 488 | 478 | Mumu | 4 | 1852 | 18.00 |

    | 728 | 534 | Emma | 4 | 1815 | 10.00 |

    | 1625 | 496 | Lenz | 4 | 1835 | 18.50 |

    | 317 | 99 | Ruth | 4 | 1853 | 16.50 |

    | 2140 | 17 | Nana | 4 | 1880 | 12.50 |

    | ~ 1200 rows ~ |


    Here’s an interesting use for `coalesce` in the `ORDER BY` clause. Some DBMSs
    support `NULLS FIRST` or `NULLS LAST` to decide where to put the `NULL`s in the
    sort order. If your DBMS doesn’t support it, you can coalesce the column to an
    extreme value. For example:


    ```sql

    SELECT *

    FROM customers

    ORDER BY coalesce(height,0);    --  NULLS FIRST


    SELECT *

    FROM customers

    ORDER BY coalesce(height,1000); --  NULLS LAST

    ```


    By coalescing all of the `NULL`s to an extreme value, SQL will sort them to one
    end or the other accordingly.


    As for the `FROM` clause, you’ll need a calculation which generates a virtual
    table. That’s usually going to be a view, a join, or even a subquery. A Common
    Table Expression, in this context, is like a subquery. We’ll do more of that sort
    of thing later.


    ### More Details on Calculations


    SQL databases typically understand the three main types of data: numbers, strings,
    and dates. There are variations on these types, such as whether numbers include
    decimals, or the length of a string, or whether the date includes a time. There
    are also some other types, such as boolean values (limited to `true` or `false`)
    or binary data (sometimes called Binary Large Objects, or BLOBs for short), with
    varying degrees of support in different DBMSs.


    Here, we’ll look at some of the details of calculating with the main data types.


    As a rule, a value comes in three forms:


    *   A `stored` value may come from a variable or a column.

    *   A value may be `calculated` or come from a built-in function.

    *   A `literal` value may be entered directly in code.


    SQL, like most coding languages, needs some help with certain literal values to
    distinguish them from other code. Numeric literals are entered as they are (bare)
    because they obviously can’t be anything else.


    String or date literals, on the other hand, are wrapped in single quotes (`''
    ... ''`) to mark them as such. That’s so that SQL can distinguish between strings
    and other words, such as SQL keywords or table and column names.


    The actual value of a string or date literal doesn’t include the quotes. However,
    the quotes are required when writing them into the code.


    For much of what follows, we’ll be using literals for examples.'
