  raw: 'Note that only the first query has aliases for the number of sales and the
    total; in a `UNION`, the column names for the first query apply to the whole result.
    You can alias the rest if it makes you feel better, but it won’t make any difference.


    When combining different levels of summaries, the higher-level summaries will
    have `NULL` instead of actual values. This is correct, but inconvenient:


    *   When sorted, `NULL` may appear at the beginning or the end of the list. The
    SQL standard is ambivalent on this, and different DBMSs have different opinions,
    while some give you a choice.


    *   In any case, `NULL` in the result set is unclear and unhelpful.


    To resolve the sorting problem, we can add a contrived value to force a sorting
    order:


    ```

    --  All Group summaries

    SELECT

    state, id, ordered, count(*) AS nsales,

    sum(total) AS total,

    0 AS state_level, 0 AS id_level, 0 AS ordered_level

    FROM salesdata

    GROUP BY state,id,ordered

    --  state, ordered summaries

    UNION

    SELECT

    state, id, NULL, count(*), sum(total),

    0, 0, 1

    FROM salesdata

    GROUP BY state,id

    --  state summaries

    UNION

    SELECT

    state, NULL, NULL, count(*), sum(total),

    0, 1, 1

    FROM salesdata

    GROUP BY state

    --  grand total

    UNION

    SELECT

    NULL, NULL, NULL, count(*), sum(total),

    1, 1, 1

    FROM salesdata

    --  Sort

    ORDER BY state_level, state, id_level, id,

    ordered_level, ordered;

    ```


    To get the results in the right order, we have introduced two values, `state_level`
    and `town_level`, so that we can push the totals below the other values.


    | **state** | **id** | **ordered** | **nsales** | **total** | **state_level**
    | **id_level** | **ordered_level** |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | ACT | 85 | 2022-06 | 2 | 117 | 0 | 0 | 0 |

    | ACT | 85 | 2022-07 | 2 | 104.5 | 0 | 0 | 0 |

    | ACT | 85 | 2022-08 | 5 | 269.5 | 0 | 0 | 0 |

    | ACT | 85 | 2022-09 | 3 | 253.5 | 0 | 0 | 0 |

    | ACT | 85 | 2022-10 | 5 | 476 | 0 | 0 | 0 |

    | ACT | 85 | 2022-11 | 3 | 179.5 | 0 | 0 | 0 |

    | ACT | 85 | 2022-12 | 2 | 84 | 0 | 0 | 0 |

