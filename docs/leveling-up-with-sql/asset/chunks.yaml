    you used in Chapter [3](#606708_1_En_3_Chapter.xhtml), but run together. The important
    part is that the variable `sid` is used to manage the new sale id:


    ```

    /

    DECLARE

    cid INT := 42;

    od TIMESTAMP := current_timestamp;

    sid INT;

    BEGIN

    INSERT INTO sales(customerid,ordered)

    VALUES(cid, od)

    RETURNING id INTO sid;

    INSERT INTO saleitems(saleid,bookid,quantity)

    VALUES (sid,123,3);

