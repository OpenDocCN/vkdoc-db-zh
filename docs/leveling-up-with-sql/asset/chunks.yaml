  trans: '# 为何要使用临时表？


    你为什么需要临时表？在我们的示例数据库中，没有任何内容可以被视为真正意义上的“重负载”。然而，在现实世界中，你可能会处理一个涉及海量行、复杂连接、筛选、计算和排序的查询。这最终可能耗费大量的时间和精力，尤其是当你需要不断重新生成数据时。


    你选择使用临时表而非视图的原因包括：


    *   保存先前生成的结果比重新生成它们更高效。这被称为 `缓存` 结果。

    *   有时，你*希望*数据不是最新的，例如当你需要使用当天早些时候数据的 `快照` 时。


    如果你需要在未来某个时间点使用该快照，临时表可能就显得“寿命太短”了。我们下面要讨论的所有内容，同样适用于专门创建的永久表。


    数据库绝不应保留数据的多个副本。然而，有时你确实需要一个临时表来进行进一步处理、试验，或作为数据迁移过程中的过渡。


    ## 计算列


    现代 SQL 允许你向表中添加一个原则上不应直接存储在表中的列。`计算`列，或称计算列，是一个基于某些计算值的额外列。仔细想想，这正是你通常会在视图中做的事情。


    不妨将计算列理解为在表中嵌入了一个微型视图。如果你经常使用同一种计算，但又不想承担视图的开销，它就特别方便。如果你可以选择缓存结果，它也很有用。


    计算列是一个只读的虚拟列。你无法向其中写入任何内容，而且，如果它保存了任何数据，那也只是为了节省日后重新计算的开销而缓存的值。例如，你可以为了方便而存储客户的全名。


    你可以在创建表时创建计算列，也可以在事后将其添加到表中。


    例如，假设我们想为 `ordered` 日期时间列添加一个缩短形式，只包含日期部分。这对于按天进行汇总非常方便。


    你可以按如下方式添加新列：


    ```sql

    --  PostgreSQL >= 12

    ALTER TABLE sales

    ADD COLUMN ordered_date date

    GENERATED ALWAYS AS (cast(ordered as date)) STORED;

    --  MSSQL

    ALTER TABLE sales

    ADD ordered_date AS (cast(ordered as date)) PERSISTED;

    --  MariaDB / MySQL

    ALTER TABLE sales

    ADD ordered_date date

    GENERATED ALWAYS AS (cast(ordered as date)) STORED;

    --  SQLite>=3.31.0

    ALTER TABLE sales

    ADD ordered_date date

    GENERATED ALWAYS AS (cast(ordered as date)) VIRTUAL;

    --  Oracle (STORED)

    ALTER TABLE sales

    ADD ordered_date date

    GENERATED ALWAYS AS (trunc(ordered));

    ```


    如你所见，大多数数据库管理系统都使用标准的 `GENERATED ALWAYS` 语法。然而，MSSQL 使用了其自身更简单的语法，它不指定数据类型，而是从计算中推断出来。


    你还会注意到不同类型的计算列：


    *   `VIRTUAL` 列不被存储，每次都会重新计算。这是 MSSQL 的默认类型。

    *   `STORED` 列保存结果的副本，只有在底层值发生变化时才会重新计算。MSSQL 称之为 `PERSISTED`。在 Oracle 中，这是默认类型。SQLite
    也支持此类型，但仅在你以那种方式创建表时；如果后续添加列，则只能是 `VIRTUAL` 类型。


    现在你可以获取包含虚拟列的数据了：


    ```sql

    SELECT * FROM sales;

    ```


    这将返回：


    | **id** | **...** | **Ordered** | **shipped** | **ordered_date** |

    | --- | --- | --- | --- | --- |

    | 39 | ... | 2022-05-15 21:12:07.988741 | 2022-05-23 | 2022-05-15 |

    | 40 | ... | 2022-05-16 03:03:16.065969 | 2022-05-24 | 2022-05-16 |

    | 42 | ... | 2022-05-16 10:09:13.674823 | 2022-05-22 | 2022-05-16 |

    | 43 | ... | 2022-05-16 15:02:43.285565 | [NULL] | 2022-05-16 |

    | 45 | ... | 2022-05-16 16:48:14.674202 | 2022-05-28 | 2022-05-16 |

    | 518 | ... | [NULL] | [NULL] | [NULL] |

    | ~ 5549 行 ~ | | | | |


    如果可选的话，`STORED` 或其等效类型是更好的选择。它会占用稍多的空间，但能为后续处理节省开销。


    ## 总结


    你的大量工作不仅会涉及真实表，还会涉及生成的虚拟表。虚拟表包括：


    *   一个连接

    *   一个公用表表达式或一个表子查询

    *   一个视图，或在某些情况下，一个表值函数

    *   一个临时表。


    ### 视图


    视图是一个已保存的 `SELECT` 语句。你可以将其设置得尽可能复杂，然后像虚拟表一样获取它。


    视图的优点包括：


    *   它们可以是处理数据的一种便捷方式。

    *   它们可以充当数据的接口，特别是在原始或修改后的形式不符合你的要求时。

    *   当从外部应用程序访问时，它们为复杂数据提供了简单的表格视图。


    ### 表值函数


    表值函数是一种返回虚拟表的函数。对表值函数的支持情况不一。在支持的地方，它允许你向查询中输入参数，使其比简单视图更加灵活。


    ### 临时表


    有时，保存结果比每次都重新生成它们更好。你可以将它们保存到一个缓存表中。


    优点包括：


    *   无需重新计算本就相同的结果，这更高效。

    *   你可能希望使用某个时间点的数据快照进行工作。


    如果你的缓存计划非常短暂，你可能会使用临时表。临时表是一种会在会话结束时自动销毁的表。


    无论缓存表是临时的还是永久的，你都可以使用 `SELECT` 语句将数据复制到其中。你也可以在单条语句中创建一个新表并将数据复制进去。


    #### 计算列


    在现代数据库管理系统中，你可以在表中创建虚拟列来给出计算结果。


    `VIRTUAL` 计算列每次从表中获取数据时都会重新生成值。`STORED` 计算列（在 MSSQL 中也称为 `PERSISTED`）会缓存结果，直到其他数据发生更改。


    计算列可以用于提供便利。如果它是 `STORED` 列，它还具有节省处理开销的好处。


    ## 即将介绍


    一条 `SELECT` 语句不一定就是故事的终点。在某些情况下，它可以是一个更复杂过程中的一步。


    一个 `子查询` 允许你将一条 `SELECT` 语句嵌入到另一个查询中。这可以用于从其他表中获取值，或者使用一个表来过滤另一个表。如果你想在另一个查询中纳入聚合数据，这尤其方便。


    下一章将更详细地探讨子查询。'
- fmt: '# 7. Working with Subqueries and Common Table Expressions


    Running a `SELECT` statement, assuming that there’s no error, gives you a result.
    That result is a virtual table, and it will have rows and columns.


    For our purposes, we are interested in three possible virtual tables:


    *   One row and one column: You get just one value, though technically it’s still
    in a table. We’ll call this a single value.

    *   One column and multiple rows: When the time comes, we’ll call this a list.

    *   Multiple rows and multiple columns: In this context, a single row with multiple
    columns counts as the same sort of thing. This is more like the sort of thing
    we think about when talking about virtual tables.


    Of course, that result may be empty, but that’s treated as `NULL`s.


    You’ll get these types of results from the following examples.


    For example, one row and one column:


    ```sql

    SELECT id FROM books WHERE title=''Frankenstein'';

    ```


    which is a single value:


    | **Id** |

    | --- |

    | 392 |


    One column and multiple rows:


    ```sql

    SELECT email FROM customerdetails WHERE state=''VIC'';

    ```


    which gives a list:


    | **Email** |

    | --- |

    | xavier.money17@example.net |

    | anne.onymous262@example.net |

    | bess.twishes26@example.net |

    | judy.free93@example.net |

    | peter.off415@example.com |

    | moe.grass360@example.com |

    | ~ 64 rows ~ |


    Multiple rows and multiple columns:


    ```sql

    SELECT givenname, familyname, email

    FROM customerdetails WHERE state=''VIC'';

    ```


    which gives a virtual table:


    | **givenname** | **Familyname** | **email** |

    | --- | --- | --- |

    | Xavier | Money | xavier.money17@example.net |

    | Anne | Onymous | anne.onymous262@example.net |

    | Bess | Twishes | bess.twishes26@example.net |

    | Judy | Free | judy.free93@example.net |

    | Peter | Off | peter.off415@example.com |

    | Moe | Grass | moe.grass360@example.com |

    | ~ 64 rows ~ |


    That last category, the virtual table, could also be the result of a very broad
    query such as `SELECT * FROM customerdetails`. It all works the same way.


    Any of these results, depending on the context, can be used in a subsequent query
    where a single value, a list, or a (virtual) table might have been expected. For
    example, using a single value:


    ```sql

    SELECT *

    FROM saleitems

    WHERE bookid=(SELECT id FROM books WHERE title=''Frankenstein'');

    ```


    Here, the single value query is wrapped inside parentheses and used the way you
    would if you already knew the value of the `bookid` you’re matching:


    | **id** | **Saleid** | **bookid** | **quantity** | **price** |

    | --- | --- | --- | --- | --- |

    | 7234 | 2873 | 392 | 3 | 18.50 |

    | 14875 | 5907 | 392 | 2 | 18.50 |

    | 11183 | 4448 | 392 | 2 | 18.50 |

    | 1312 | 517 | 392 | 2 | 18.50 |

    | 9956 | 3948 | 392 | 2 | 18.50 |

    | 12636 | 5012 | 392 | 2 | 18.50 |

    | ~ 14 rows ~ |


    Or you could be expecting some sort of list:


    ```sql

    SELECT *

    FROM books

    WHERE authorid IN (

    SELECT id FROM authors WHERE born BETWEEN ''1700-01-01'' AND ''1799-12-31''

    );

    ```


    The `IN` operator expects a list of values, which we get from the one column in
    the nested `SELECT` statement:


    | **id** | **authorid** | **Title** | **published** | **price** |

    | --- | --- | --- | --- | --- |

    | 2078 | 765 | The Duel | 1811 | 12.50 |

    | 2243 | 715 | Vrijmoedige Verhalen; ee … | 1831 | [NULL] |

    | 532 | 628 | Elective Affinities | 1809 | 11.50 |

    | 1608 | 420 | The Autobiography of Ben … | 1791 | 18.50 |

    | 2303 | 633 | The Metaphysics of Moral … | 1797 | 12.00 |

    | 1963 | 529 | A Treatise of Human Natu … | 1740 | 18.50 |

    | ~ 256 rows ~ |


    The nested `SELECT` statement is called a `subquery`. A `subquery` is a `SELECT`
    statement which is used as part of another query. Conceptually, you use the SELECT
    query to fetch one or more results, which in turn will be used in another query.


    Subqueries can be used in the `SELECT`, `WHERE`, `FROM`, and even `ORDER BY` clauses.
    When they are used, the result must be compatible with the context. For example:


    *   A subquery in a `SELECT` clause must always return a single value, as would
    be expected from any other calculation. This can be called a `scalar` (single-value)
    subquery. Some modern DBMSs are now adding support for returning values for more
    than one column, but it’s not widely supported for now.

    *   A subquery in the `WHERE` clause must return a single value when used with
    a comparison operator, or a single column when used with an `IN()` expression.

    *   A subquery in the `FROM` clause must return a table of results. This type
    of subquery is sometimes called an inline view.


    Some uses of subqueries include:


    *   Looking up related data from another table (`SELECT`)

    *   Looking up a value or set of values to act as a filter (`WHERE`)

    *   Generating a derived virtual table (`FROM`)


    The whole thing with subqueries is that with a subquery you can combine multiple
    parts to make a more complex query:


    *   Using a subquery, you’ll be able to get data from other tables.

    *   You can use subqueries to preprocess data to be used in the main query.

    *   Subqueries will allow you to combine aggregate and non-aggregate queries,
    which you can’t normally do in single queries.


    Subqueries do have a cost, however, as you will be running two or more queries
    for the price of one—sometimes, even hundreds of queries for the price of one.
    We’ll have a look at that later when we compare subqueries to alternative techniques.


    You will no doubt have seen some subqueries before now, certainly in some of the
    earlier chapters in this book. In this chapter, we’ll have a closer look at how
    subqueries work and what we can do with them.'
