    # 1. Getting Ready


    If you’re reading this book, you’ll already know some `SQL`, either through previous
    study or through bitter experience, or, more likely, a little of both. In the
    process, there may be a few bits that you’ve missed, or forgotten, or couldn’t
    see the point.


    We’ll assume that you’re comfortable enough with `SQL` to get the basic things
    done, which mostly involves fetching data from one or more tables. You may even
    have manipulated some of that data or even the tables themselves.


    We *won’t* assume that you consider yourself an expert in all of this. Have a
    look in the section “What You Probably Know Already” to check the sort of experience
    we think you already have. If there are some areas you’re not completely sure
    about, don’t panic. Each chapter will include some of the background concepts
    which should take you to the next level.


    If all of this is a bit new to you, perhaps we can recommend an introductory book.
    It’s called *Getting Started with SQL and Databases* by Mark Simon, and you can
    learn more about it at [`https://link.springer.com/book/10.1007/978-1-4842-9493-2`](https://link.springer.com/book/10.1007/978-1-4842-9493-2).'
