- fmt: "## Subqueries in the FROM Clause\n\nA subquery can also generate a virtual\
    \ table, which is useful when you need to prepare data before actually querying\
    \ it.\n\nFor example, suppose you want to look at your books in price groups.\
    \ You can create a simple query like this:\n\n```sql\nSELECT\n  id, title,\n \
    \ CASE\n    WHEN price > 17 THEN 'expensive'\n    WHEN price > 7 THEN 'reasonable'\n\
    \    ELSE 'cheap'\n  END AS price_group\nFROM books;\n```\n\nYou’ll get something\
    \ like this:\n\n| **id** | **title** | **price_group** |\n| --- | --- | --- |\n\
    | 2078 | The Duel | Cheap |\n| 503 | Uncle Silas | Reasonable |\n| 2007 | North\
    \ and South | Expensive |\n| 702 | Jane Eyre | Expensive |\n| 1530 | Robin Hood,\
    \ The Prince of Thieves | Cheap |\n| 1759 | La Curée | Reasonable |\n| ~ 1201\
    \ rows ~ |\n\nNow, suppose you want to summarize the table. The problem is that\
    \ you can’t do this:\n\n```sql\n-- This doesn’t work:\nSELECT\n-- id, title,\n\
    \  CASE\n    WHEN price > 17 THEN 'expensive'\n    WHEN price > 7 THEN 'reasonable'\n\
    \    ELSE 'cheap'\n  END AS price_group,\n  count(*) as num_books\nFROM books\n\
    GROUP BY price_group;\n```\n\nWe’ve commented out the columns we’re not grouping,\
    \ but it still won’t work because of that pesky clause order thing: the alias\
    \ `price_group` is created in the `SELECT` clause which comes *after* the `GROUP\
    \ BY` clause, so it’s not available for grouping. Of course, you can then reproduce\
    \ the calculation in the `GROUP BY` clause:\n\n```sql\n-- This works, but ...\n\
    SELECT\n-- id, title,\n  CASE\n    WHEN price > 17 THEN 'expensive'\n    WHEN\
    \ price > 7 THEN 'reasonable'\n    ELSE 'cheap'\n  END AS price_group,\n  count(*)\
    \ as num_books\nFROM books\nGROUP BY CASE\n           WHEN price > 17 THEN 'expensive'\n\
    \           WHEN price > 7 THEN 'reasonable'\n           ELSE 'cheap'\n      \
    \   END;\n```\n\nbut you really don’t want to go there.\n\nOne solution is to\
    \ put the original `SELECT` statement in a subquery:\n\n```sql\nSELECT price_group,\
    \ count(*) AS num_books\nFROM (\n  SELECT\n    id, title,\n    CASE\n      WHEN\
    \ price > 17 THEN 'expensive'\n      WHEN price > 7 THEN 'reasonable'\n      ELSE\
    \ 'cheap'\n    END AS price_group\n  FROM books\n) AS sq     -- Oracle: ( ...\
    \ ) sq\nGROUP BY price_group;\n```\n\nThis gives a meaningful result:\n\n| **price_group**\
    \ | **num_books** |\n| --- | --- |\n| expensive | 320 |\n| [NULL] | 105 |\n| reasonable\
    \ | 467 |\n| cheap | 309 |\n\nRemember that the default fall through for the `CASE`\
    \ expression is `NULL`. Those books which are unpriced will end up in the `NULL`\
    \ price group. Depending on the DBMS, you’ll see this somewhere in the result\
    \ set as a separate group.\n\nRemember that a `SELECT` statement generates a virtual\
    \ table. As such, it can be used in a `FROM` clause in the form of a subquery.\n\
    \nNote that there’s a special requirement for a `FROM` subquery: it must have\
    \ an alias, even if you’ve no plans to use it. We have no special plans here,\
    \ so it’s just called `sq` (“SubQuery”) for no particular reason. If you want\
    \ to, say, join the subquery with another table or virtual table, then the alias\
    \ will be useful.\n\n### Nested Subqueries\n\nA subquery is a `SELECT` statement\
    \ with its own `FROM` clause. In turn, that `FROM` clause might be from another\
    \ subquery. If you have a subquery within a subquery, it’s a **nested** subquery.\n\
    \nFor example, let’s look at duplicate customer names again. You can find candidates\
    \ with the following aggregate query:\n\n```sql\nSELECT familyname, givenname\n\
    FROM customers\nGROUP BY familyname, givenname HAVING count(*)>1;\n```\n\nThey’re\
    \ just the names. Suppose you want more details. For that, you can join the `customers`\
    \ table with the preceding query:\n\n```sql\nSELECT\n  c.id, c.givenname, c.familyname,\
    \ c.email\nFROM customers AS c JOIN (\n  SELECT familyname, givenname\n  FROM\
    \ customers\n  GROUP BY familyname, givenname HAVING count(*)>1\n) AS n ON c.givenname=n.givenname\
    \ AND c.familyname=n.familyname;\n```\n\nWe’ve seen something like this before.\
    \ You’ll now get the candidate customers:\n\n| **id** | **givenname** | **familyname**\
    \ | **Email** |\n| --- | --- | --- | --- |\n| 429 | Corey | Ander | corey.ander429@example.net\
    \ |\n| 287 | Judy | Free | judy.free287@example.com |\n| 90 | Ida | Dunnit | ida.dunnit90@example.net\
    \ |\n| 488 | Ken | Tuckey | ken.tuckey488@example.net |\n| 174 | Paul | Bearer\
    \ | paul.bearer174@example.com |\n| 505 | Annie | Mate | annie.mate505@example.com\
    \ |\n| ~ 16 rows ~ |\n\nWe’ve aliased the `customers` table to `c` for convenience\
    \ (don’t forget no `AS` in Oracle), and the subquery needs a name anyway, so we’ve\
    \ called it `n`. In the `SELECT` clause, we’ve just fetched the `id`, the names,\
    \ and the email address.\n\nNow, let’s combine this in another aggregate query,\
    \ which will give us one row per name, and combine the other details:\n\n```sql\n\
    SELECT\n  givenname, familyname,\n  -- PostgreSQL, MSSQL:\n  string_agg(email,',\
    \ ') AS email,\n  string_agg(cast(id AS varchar(3)),', ') AS ids\n  -- MariaDB/MySQL:\n\
    \  group_concat(email SEPARATOR ', ') AS email,\n  group_concat(cast(id AS varchar(3))\
    \ SEPARATOR ', ') AS ids\n  -- SQLite:\n  group_concat(email,', ') AS email,\n\
    \  group_concat(cast(id AS varchar(3)),', ') AS ids\n  -- Oracle:\n  listagg(email,',\
    \ ') AS email,\n  listagg(cast(id AS varchar(3)),', ') AS ids\nFROM (  -- previous\
    \ SELECT as subquery\n  SELECT c.id, c.givenname, c.familyname, c.email\n  FROM\
    \ customers AS c JOIN (\n    SELECT familyname, givenname\n    FROM customers\n\
    \    GROUP BY familyname, givenname HAVING count(*)>1\n  ) AS n ON c.givenname=n.givenname\
    \ AND\n            c.familyname=n.familyname\n) AS sq\nGROUP BY familyname, givenname;\n\
    ```\n\nNow you’ll get something like\n\n| **givenname** | **familyname** | **Email**\
    \ | **ids** |\n| --- | --- | --- | --- |\n| Corey | Ander | corey.ander429@e …,\
    \ corey.ander85@ex … | 429, 85 |\n| Paul | Bearer | paul.bearer174@e …, paul.bearer482@e\
    \ … | 174, 482 |\n| Terry | Bell | terry.bell402@ex …, terry.bell295@ex … | 402,\
    \ 295 |\n| Mary | Christmas | mary.christmas46 …, mary.christmas59 … | 465, 594\
    \ |\n| Ida | Dunnit | ida.dunnit504@ex …, ida.dunnit90@exa … | 504, 90 |\n| Judy\
    \ | Free | judy.free93@exam …, judy.free287@exa … | 93, 287 |\n| ~ 8 rows ~ |\n\
    \nNote that we’ve included variations on the `string_agg()` functions as described\
    \ in `Chapter 5`. Also, we’ve had to cast the `id` as a string so that it can\
    \ be aggregated as one.\n\nIf you think this last example is getting a little\
    \ hard to read, well, that’s one of the problems with nested subqueries. Thankfully,\
    \ there’s an alternative in Common Table Expressions, which we’ll look at soon.\n\
    \n## Using WHERE EXISTS (Subquery)\n\nYou have already seen subqueries in the\
    \ `WHERE` clause to filter your query. So far, the subquery has returned either\
    \ a single value or a single column for use in an `IN()` expression.\n\nYou can\
    \ also filter a set of data using `WHERE EXISTS (...)`. It looks a little like\
    \ this:\n\n```sql\nSELECT ...\nFROM ...\nWHERE EXISTS(subquery);\n```\n\nThe subquery\
    \ will either return a result or not. If it does, then the `WHERE EXISTS` is satisfied,\
    \ and the row is passed; if it doesn’t, then the `WHERE EXISTS` isn’t satisfied,\
    \ and the row will be filtered.\n\nFor example, you can test the idea with the\
    \ following statement:\n\n```sql\n-- PostgreSQL, MSSQL, SQLite\nSELECT * FROM\
    \ authors\nWHERE EXISTS (SELECT 1 WHERE 1=1);\n-- MariaDB/MySQL, Oracle\nSELECT\
    \ * FROM authors\nWHERE EXISTS (SELECT 1 FROM dual WHERE 1=1);\n```\n\nSince `1=1`\
    \ is always true, you’ll get all of the rows from the `authors` table.\n\nAlthough\
    \ you would normally only use `FROM dual` with Oracle, MariaDB and MySQL also\
    \ support this. In this case, MariaDB and MySQL don’t like the `WHERE` clause\
    \ without a `FROM`, so we’ve thrown it in to keep them happy.\n\nSimilarly, you\
    \ can return nothing:\n\n```sql\n-- PostgreSQL, MSSQL, SQLite\nSELECT * FROM authors\n\
    WHERE EXISTS (SELECT 1 WHERE 1=0);\n-- MariaDB/MySQL, Oracle\nSELECT * FROM authors\n\
    WHERE EXISTS (SELECT 1 FROM dual WHERE 1=0);\n```\n\nThe subquery is in a special\
    \ position in that it doesn’t matter what columns are actually being selected:\
    \ what matters is that there is or isn’t a row. That’s why we’ve included a dummy\
    \ `SELECT 1`.\n\nYou can also choose `SELECT NULL` or even `SELECT 1/0`. The former\
    \ would give the (false) impression that we’re looking for nothing, and the latter\
    \ would have resulted in an error if run by itself. It’s tempting to take it more\
    \ seriously by selecting a more meaningful value, but there’s no need."
  raw: '## Subqueries in the FROM Clause


    A subquery can also generate a virtual table, which is useful when you need to
    prepare data before actually querying it.


    For example, suppose you want to look at your books in price groups. You can create
    a simple query like this:


    ```

    SELECT

    id, title,

    CASE

    WHEN price17 THEN ''expensive''

    END AS price_group

    FROM books;

    ```


    You’ll get something like this:


    | **id** | **title** | **price_group** |

    | --- | --- | --- |

    | 2078 | The Duel | Cheap |

    | 503 | Uncle Silas | Reasonable |

    | 2007 | North and South | Expensive |

    | 702 | Jane Eyre | Expensive |

    | 1530 | Robin Hood, The Prince of Thieves | Cheap |

    | 1759 | La Curée | Reasonable |

    | ~ 1201 rows ~ |


    Now, suppose you want to summarize the table. The problem is that you can’t do
    this:


    ```

    --  This doesn’t work:

    SELECT

    --  id, title,

    CASE

    WHEN price17 THEN ''expensive''

    END AS price_group,

    count(*) as num_books

    FROM books

    GROUP BY price_group;

    ```


    We’ve commented out the columns we’re not grouping, but it still won’t work because
    of that pesky clause order thing: the alias `price_group` is created in the `SELECT`
    clause which comes *after* the `GROUP BY` clause, so it’s not available for grouping.
    Of course, you can then reproduce the calculation in the `GROUP BY` clause:


    ```

    --  This works, but ...

    SELECT

    --  id, title,

    CASE

    WHEN price17 THEN ''expensive''

    END AS price_group,

    count(*) as num_books

    FROM books

    GROUP BY CASE

    WHEN price17 THEN ''expensive''

    END;

    ```


    but you really don’t want to go there.


    One solution is to put the original `SELECT` statement in a subquery:


    ```

    SELECT price_group, count(*) AS num_books

    FROM (

    SELECT

    id, title,

    CASE

    WHEN price17 THEN ''expensive''

    END AS price_group

    FROM books

    ) AS sq     --  Oracle: ( ... ) sq

    GROUP BY price_group;

    ```


    This gives a meaningful result:


    | **price_group** | **num_books** |

    | --- | --- |

    | expensive | 320 |

    | [NULL] | 105 |

    | reasonable | 467 |

    | cheap | 309 |


    Remember that the default fall through for the `CASE` expression is `NULL`. Those
    books which are unpriced will end up in the `NULL` price group. Depending on the
    DBMS, you’ll see this somewhere in the result set as a separate group.


    Remember that a `SELECT` statement generates a virtual table. As such, it can
    be used in a `FROM` clause in the form of a subquery.


    Note that there’s a special requirement for a `FROM` subquery: it must have an
    alias, even if you’ve no plans to use it. We have no special plans here, so it’s
    just called `sq` (“SubQuery”) for no particular reason. If you want to, say, join
    the subquery with another table or virtual table, then the alias will be useful.


    ### Nested Subqueries


    A subquery is a `SELECT` statement with its own `FROM` clause. In turn, that `FROM`
    clause might be from another subquery. If you have a subquery within a subquery,
    it’s a **nested** subquery.


    For example, let’s look at duplicate customer names again. You can find candidates
    with the following aggregate query:


    ```

    SELECT familyname, givenname

    FROM customers

    GROUP BY familyname, givenname HAVING count(*)>1;

    ```


    They’re just the names. Suppose you want more details. For that, you can join
    the `customers` table with the preceding query:


    ```

    SELECT

    c.id, c.givenname, c.familyname, c.email

    FROM customers AS c JOIN (

    SELECT familyname, givenname

    FROM customers

    GROUP BY familyname, givenname HAVING count(*)>1

    ) AS n ON c.givenname=n.givenname AND c.familyname=n.familyname;

    ```


    We’ve seen something like this before. You’ll now get the candidate customers:


    | **id** | **givenname** | **familyname** | **Email** |

    | --- | --- | --- | --- |

    | 429 | Corey | Ander | corey.ander429@example.net |

    | 287 | Judy | Free | judy.free287@example.com |

    | 90 | Ida | Dunnit | ida.dunnit90@example.net |

    | 488 | Ken | Tuckey | ken.tuckey488@example.net |

    | 174 | Paul | Bearer | paul.bearer174@example.com |

    | 505 | Annie | Mate | annie.mate505@example.com |

    | ~ 16 rows ~ |


    We’ve aliased the `customers` table to `c` for convenience (don’t forget no `AS`
    in Oracle), and the subquery needs a name anyway, so we’ve called it `n`. In the
    `SELECT` clause, we’ve just fetched the `id`, the names, and the email address.


    Now, let’s combine this in another aggregate query, which will give us one row
    per name, and combine the other details:


    ```

    SELECT

    givenname, familyname,

    --  PostgreSQL, MSSQL:

    string_agg(email,'', '') AS email,

    string_agg(cast(id AS varchar(3)),'', '') AS ids

    --  MariaDB/MySQL:

    group_concat(email SEPARATOR '', '') AS email,

    group_concat(cast(id AS varchar(3)) SEPARATOR '', '')

    AS ids

    --  SQLite:

    group_concat(email,'', '') AS email,

    group_concat(cast(id AS varchar(3)),'', '') AS ids

    --  Oracle:

    listagg(email,'', '') AS email,

    listagg(cast(id AS varchar(3)),'', '') AS ids

    FROM (  --  previous SELECT as subquery

    SELECT c.id, c.givenname, c.familyname, c.email

    FROM customers AS c JOIN (

    SELECT familyname, givenname

    FROM customers

    GROUP BY familyname, givenname HAVING count(*)>1

    ) AS n ON c.givenname=n.givenname AND

    c.familyname=n.familyname

    ) AS sq

    GROUP BY familyname, givenname;

    ```


    Now you’ll get something like


    | **givenname** | **familyname** | **Email** | **ids** |

    | --- | --- | --- | --- |

    | Corey | Ander | corey.ander429@e …, corey.ander85@ex … | 429, 85 |

    | Paul | Bearer | paul.bearer174@e …, paul.bearer482@e … | 174, 482 |

    | Terry | Bell | terry.bell402@ex …, terry.bell295@ex … | 402, 295 |

    | Mary | Christmas | mary.christmas46 …, mary.christmas59 … | 465, 594 |

    | Ida | Dunnit | ida.dunnit504@ex …, ida.dunnit90@exa … | 504, 90 |

    | Judy | Free | judy.free93@exam …, judy.free287@exa … | 93, 287 |

    | ~ 8 rows ~ |


    Note that we’ve included variations on the `string_agg()` functions as described
    in Chapter [5](#606708_1_En_5_Chapter.xhtml). Also, we’ve had to cast the `id`
    as a string so that it can be aggregated as one.


    If you think this last example is getting a little hard to read, well, that’s
    one of the problems with nested subqueries. Thankfully, there’s an alternative
    in Common Table Expressions, which we’ll look at soon.


    ## Using WHERE EXISTS (Subquery)


    You have already seen subqueries in the `WHERE` clause to filter your query. So
    far, the subquery has returned either a single value or a single column for use
    in an `IN()` expression.


    You can also filter a set of data using `WHERE EXISTS (...)`. It looks a little
    like this:


    ```

    SELECT ...

    FROM ...

    WHERE EXISTS(subquery);

    ```


    The subquery will either return a result or not. If it does, then the `WHERE EXISTS`
    is satisfied, and the row is passed; if it doesn’t, then the `WHERE EXISTS` isn’t
    satisfied, and the row will be filtered.


    For example, you can test the idea with the following statement:


    ```

    --  PostgreSQL, MSSQL, SQLite

    SELECT * FROM authors

    WHERE EXISTS (SELECT 1 WHERE 1=1);

    --  MariaDB/MySQL, Oracle

    SELECT * FROM authors

    WHERE EXISTS (SELECT 1 FROM dual WHERE 1=1);

    ```


    Since `1=1` is always true, you’ll get all of the rows from the `authors` table.


    Although you would normally only use `FROM dual` with Oracle, MariaDB and MySQL
    also support this. In this case, MariaDB and MySQL don’t like the `WHERE` clause
    without a `FROM`, so we’ve thrown it in to keep them happy.


    Similarly, you can return nothing:


    ```

    --  PostgreSQL, MSSQL, SQLite

    SELECT * FROM authors

    WHERE EXISTS (SELECT 1 WHERE 1=0);

    --  MariaDB/MySQL, Oracle

    SELECT * FROM authors

    WHERE EXISTS (SELECT 1 FROM dual WHERE 1=0);

    ```


    The subquery is in a special position in that it doesn’t matter what columns are
    actually being selected: what matters is that there is or isn’t a row. That’s
    why we’ve included a dummy `SELECT 1`.


    You can also choose `SELECT NULL` or even `SELECT 1/0`. The former would give
    the (false) impression that we’re looking for nothing, and the latter would have
    resulted in an error if run by itself. It’s tempting to take it more seriously
    by selecting a more meaningful value, but there’s no need.'
  trans: "## FROM 子句中的子查询\n\n子查询也可以生成一个虚拟表，这在你实际查询前需要准备数据时非常有用。\n\n例如，假设你想按价格分组查看你的书籍。你可以创建一个像这样的简单查询：\n\
    \n```sql\nSELECT\n  id, title,\n  CASE\n    WHEN price > 17 THEN 'expensive'\n\
    \    WHEN price > 7 THEN 'reasonable'\n    ELSE 'cheap'\n  END AS price_group\n\
    FROM books;\n```\n\n你会得到类似这样的结果：\n\n| **id** | **title** | **price_group** |\n\
    | --- | --- | --- |\n| 2078 | The Duel | Cheap |\n| 503 | Uncle Silas | Reasonable\
    \ |\n| 2007 | North and South | Expensive |\n| 702 | Jane Eyre | Expensive |\n\
    | 1530 | Robin Hood, The Prince of Thieves | Cheap |\n| 1759 | La Curée | Reasonable\
    \ |\n| ~ 1201 行 ~ |\n\n现在，假设你想对这个表进行汇总。问题是，你不能这样做：\n\n```sql\n-- 这样不行：\nSELECT\n\
    -- id, title,\n  CASE\n    WHEN price > 17 THEN 'expensive'\n    WHEN price >\
    \ 7 THEN 'reasonable'\n    ELSE 'cheap'\n  END AS price_group,\n  count(*) as\
    \ num_books\nFROM books\nGROUP BY price_group;\n```\n\n我们已经注释掉了不用于分组的列，但由于那个烦人的子句顺序问题，它仍然无法工作：别名\
    \ `price_group` 是在 `SELECT` 子句中创建的，而 `SELECT` 子句出现在 `GROUP BY` 子句*之后*，因此它尚不能用于分组。当然，你随后可以在\
    \ `GROUP BY` 子句中重现这个计算：\n\n```sql\n-- 这样可以，但...\nSELECT\n-- id, title,\n  CASE\n\
    \    WHEN price > 17 THEN 'expensive'\n    WHEN price > 7 THEN 'reasonable'\n\
    \    ELSE 'cheap'\n  END AS price_group,\n  count(*) as num_books\nFROM books\n\
    GROUP BY CASE\n           WHEN price > 17 THEN 'expensive'\n           WHEN price\
    \ > 7 THEN 'reasonable'\n           ELSE 'cheap'\n         END;\n```\n\n但你肯定不想那么做。\n\
    \n一个解决方案是将原始的 `SELECT` 语句放入一个子查询中：\n\n```sql\nSELECT price_group, count(*) AS\
    \ num_books\nFROM (\n  SELECT\n    id, title,\n    CASE\n      WHEN price > 17\
    \ THEN 'expensive'\n      WHEN price > 7 THEN 'reasonable'\n      ELSE 'cheap'\n\
    \    END AS price_group\n  FROM books\n) AS sq     -- Oracle: ( ... ) sq\nGROUP\
    \ BY price_group;\n```\n\n这会给出一个有意义的结果：\n\n| **price_group** | **num_books** |\n\
    | --- | --- |\n| expensive | 320 |\n| [NULL] | 105 |\n| reasonable | 467 |\n|\
    \ cheap | 309 |\n\n记住，`CASE` 表达式的默认穿透（fall through）结果是 `NULL`。那些未定价的书籍最终会归入 `NULL`\
    \ 价格组。根据数据库管理系统的不同，你可能会在结果集的某个地方看到它作为一个单独的分组。\n\n记住，`SELECT` 语句生成的是一个虚拟表。因此，它可以以子查询的形式用在\
    \ `FROM` 子句中。\n\n注意，`FROM` 子句中的子查询有一个特殊要求：它必须有一个别名，即使你没有计划使用它。我们在这里没有特殊计划，所以它就随便被叫做\
    \ `sq`（代表“SubQuery”）。如果你想，比如说，将这个子查询与另一个表或虚拟表进行连接，那么别名就会很有用。\n\n### 嵌套子查询\n\n\
    子查询是一个带有自己 `FROM` 子句的 `SELECT` 语句。反过来，那个 `FROM` 子句也可能来自另一个子查询。如果你有一个子查询里面又包含一个子查询，这就是一个**嵌套**子查询。\n\
    \n例如，我们再来看重复的客户姓名。你可以用下面的聚合查询找出候选对象：\n\n```sql\nSELECT familyname, givenname\n\
    FROM customers\nGROUP BY familyname, givenname HAVING count(*)>1;\n```\n\n这里只有名字。假设你想要更多细节。为此，你可以将\
    \ `customers` 表与前面的查询进行连接：\n\n```sql\nSELECT\n  c.id, c.givenname, c.familyname,\
    \ c.email\nFROM customers AS c JOIN (\n  SELECT familyname, givenname\n  FROM\
    \ customers\n  GROUP BY familyname, givenname HAVING count(*)>1\n) AS n ON c.givenname=n.givenname\
    \ AND c.familyname=n.familyname;\n```\n\n我们之前见过类似的东西。你现在会得到候选客户：\n\n| **id** |\
    \ **givenname** | **familyname** | **Email** |\n| --- | --- | --- | --- |\n| 429\
    \ | Corey | Ander | corey.ander429@example.net |\n| 287 | Judy | Free | judy.free287@example.com\
    \ |\n| 90 | Ida | Dunnit | ida.dunnit90@example.net |\n| 488 | Ken | Tuckey |\
    \ ken.tuckey488@example.net |\n| 174 | Paul | Bearer | paul.bearer174@example.com\
    \ |\n| 505 | Annie | Mate | annie.mate505@example.com |\n| ~ 16 行 ~ |\n\n为了方便，我们将\
    \ `customers` 表别名为 `c`（别忘了 Oracle 中没有 `AS`），而且子查询无论如何也需要个名字，所以我们叫它 `n`。在 `SELECT`\
    \ 子句中，我们只是提取了 `id`、姓名和电子邮件地址。\n\n现在，让我们在另一个聚合查询中结合这个结果，这将为我们提供每个名字一行，并合并其他详细信息：\n\
    \n```sql\nSELECT\n  givenname, familyname,\n  -- PostgreSQL, MSSQL:\n  string_agg(email,',\
    \ ') AS email,\n  string_agg(cast(id AS varchar(3)),', ') AS ids\n  -- MariaDB/MySQL:\n\
    \  group_concat(email SEPARATOR ', ') AS email,\n  group_concat(cast(id AS varchar(3))\
    \ SEPARATOR ', ') AS ids\n  -- SQLite:\n  group_concat(email,', ') AS email,\n\
    \  group_concat(cast(id AS varchar(3)),', ') AS ids\n  -- Oracle:\n  listagg(email,',\
    \ ') AS email,\n  listagg(cast(id AS varchar(3)),', ') AS ids\nFROM (  -- 将之前的\
    \ SELECT 作为子查询\n  SELECT c.id, c.givenname, c.familyname, c.email\n  FROM customers\
    \ AS c JOIN (\n    SELECT familyname, givenname\n    FROM customers\n    GROUP\
    \ BY familyname, givenname HAVING count(*)>1\n  ) AS n ON c.givenname=n.givenname\
    \ AND\n            c.familyname=n.familyname\n) AS sq\nGROUP BY familyname, givenname;\n\
    ```\n\n现在你会得到类似这样的结果：\n\n| **givenname** | **familyname** | **Email** | **ids**\
    \ |\n| --- | --- | --- | --- |\n| Corey | Ander | corey.ander429@e …, corey.ander85@ex\
    \ … | 429, 85 |\n| Paul | Bearer | paul.bearer174@e …, paul.bearer482@e … | 174,\
    \ 482 |\n| Terry | Bell | terry.bell402@ex …, terry.bell295@ex … | 402, 295 |\n\
    | Mary | Christmas | mary.christmas46 …, mary.christmas59 … | 465, 594 |\n| Ida\
    \ | Dunnit | ida.dunnit504@ex …, ida.dunnit90@exa … | 504, 90 |\n| Judy | Free\
    \ | judy.free93@exam …, judy.free287@exa … | 93, 287 |\n| ~ 8 行 ~ |\n\n注意，我们包含了如\
    \ `第 5 章` 所述的 `string_agg()` 函数的变体。此外，我们必须将 `id` 转换为字符串，以便将其聚合成一个字段。\n\n如果你觉得最后一个例子有点难以阅读，嗯，这就是嵌套子查询的问题之一。值得庆幸的是，还有公共表表达式（Common\
    \ Table Expressions）作为替代方案，我们很快会看到。\n\n## 使用 WHERE EXISTS (子查询)\n\n你已经见过在 `WHERE`\
    \ 子句中使用子查询来过滤你的查询。到目前为止，子查询返回的是单个值或单个列，用于 `IN()` 表达式。\n\n你也可以使用 `WHERE EXISTS\
    \ (...)` 来过滤一组数据。它看起来有点像这样：\n\n```sql\nSELECT ...\nFROM ...\nWHERE EXISTS(subquery);\n\
    ```\n\n子查询要么返回结果，要么不返回。如果返回，那么 `WHERE EXISTS` 条件满足，该行被保留；如果不返回，那么 `WHERE EXISTS`\
    \ 条件不满足，该行将被过滤掉。\n\n例如，你可以用下面的语句测试这个想法：\n\n```sql\n-- PostgreSQL, MSSQL, SQLite\n\
    SELECT * FROM authors\nWHERE EXISTS (SELECT 1 WHERE 1=1);\n-- MariaDB/MySQL, Oracle\n\
    SELECT * FROM authors\nWHERE EXISTS (SELECT 1 FROM dual WHERE 1=1);\n```\n\n因为\
    \ `1=1` 总是真，所以你会得到 `authors` 表的所有行。\n\n虽然你通常只在 Oracle 中使用 `FROM dual`，但 MariaDB\
    \ 和 MySQL 也支持这个。在这种情况下，MariaDB 和 MySQL 不喜欢没有 `FROM` 的 `WHERE` 子句，所以我们加上它来让它们高兴。\n\
    \n同样地，你也可以返回空结果：\n\n```sql\n-- PostgreSQL, MSSQL, SQLite\nSELECT * FROM authors\n\
    WHERE EXISTS (SELECT 1 WHERE 1=0);\n-- MariaDB/MySQL, Oracle\nSELECT * FROM authors\n\
    WHERE EXISTS (SELECT 1 FROM dual WHERE 1=0);\n```\n\n子查询处于一个特殊位置，因为实际选择哪些列并不重要：重要的是有没有行存在。这就是为什么我们包含了一个虚拟的\
    \ `SELECT 1`。\n\n你也可以选择 `SELECT NULL` 甚至 `SELECT 1/0`。前者会给人一种（错误的）印象，好像我们在查找什么都没有，后者如果单独运行会导致错误。虽然很诱人选择一个更有意义的值来更认真地对待它，但其实没有必要。"
- fmt: '# WHERE EXISTS with Non-correlated Subqueries


    Clearly, the previous examples will give you all or nothing, and that''s the sort
    of thing you can expect from a non-correlated subquery, such as


    ```

    SELECT * FROM authors

    WHERE EXISTS (SELECT 1/0 FROM books WHERE price<15);

    ```


    The subquery selects *some* rows, which is enough to satisfy the `WHERE` clause,
    so you''ll get *all* the authors. If you had tried `WHERE price<0`, then you''d
    get *none* of the authors.


    # WHERE EXISTS with Correlated Subqueries


    Using `WHERE EXISTS` is more interesting if you use a correlated subquery. Here,
    the test will be evaluated for every row, so some rows will pass and some won''t.


    For example, if you want to find all the authors whose books are in the `books`
    table, you can use


    ```

    SELECT * FROM authors

    WHERE EXISTS (

    SELECT 1 FROM books WHERE books.authorid=authors.id

    );

    ```


    You''ll get something like


    | **id** | **givenname** | **…** | **familyname** | **…** | **Home** |

    | --- | --- | --- | --- | --- | --- |

    | 464 | Ambrose | … | Bierce | … | Meigs County, Ohio |

    | 858 | Alexander | … | Ostrovsky | … | Moscow |

    | 525 | Francis | … | Beaumont | … | Grace-Dieu, Leicestershire |

    | 488 | Bashou | … | Matsuo | … | Matsuo Kinsaku |

    | 703 | Friedrich | … | Engels | … | Barmen |

    | 722 | Stanley | … | Waterloo | … | St. Clair, Mich. |

    | ~ 443 rows ~ |


    Here, the subquery looks for a row where `books.authorid` matches `authors.id`,
    and if there is such a row (as there is with most authors), the author row will
    be returned.


    # WHERE EXISTS vs. the IN() Expression


    In the previous example, you can also get the same result with the `IN()` expression:


    ```

    SELECT * FROM authors

    WHERE id IN(SELECT authorid FROM books);

    ```


    This variation is, of course, simpler. However, it''s quite likely that, on the
    inside, SQL does exactly the same thing, so how you write it is really a matter
    of taste.


    On the other hand, if you''re looking for authors *without* books (in our catalogue),
    then it''s a different matter.


    This *won''t* work:


    ```

    SELECT * FROM authors

    WHERE id NOT IN(SELECT authorid FROM books);

    ```


    Well, technically, it *will* work, but not the way we would have wanted. Recall
    again from Chapter [3](#606708_1_En_3_Chapter.xhtml) the "NOT IN quirk." Since
    there are some `NULL`s in the `authorid` column, the `NOT IN` operator eventually
    evaluates something like `... AND id=NULL AND ...`. The `id=NULL` always fails,
    and the `... AND ...` combines that failure with the rest and causes the whole
    expression to fail.


    Using `WHERE NOT EXISTS` will, however, work:


    ```

    SELECT * FROM authors

    WHERE NOT EXISTS (

    SELECT 1 FROM books WHERE books.authorid=authors.id

    );

    ```


    That''s because `WHERE EXISTS` evaluates rows, not values:


    | **id** | **givenname** | **…** | **familyname** | **…** | **Home** |

    | --- | --- | --- | --- | --- | --- |

    | 479 | C.E. | … | Koetsveld | … | Rotterdam |

    | 874 | Henry | … | Savery | … | Somerset, England |

    | 429 | Oliné | … | Keese | … | [NULL] |

    | 35 | James | … | Lowell | … | Cambridge, Massachusetts |

    | 148 | Demetrius | … | Boulger | … | [NULL] |

    | 922 | Robert | … | Ingersoll | … | Dresden, New York |

    | ~ 45 rows ~ |


    You won''t see `WHERE EXISTS` much in the wild, since you can generally do the
    same thing with either a join or the `IN` operator. However, there are times where
    it has an advantage or is more intuitive. That''s especially because `WHERE EXISTS`
    can be more expressive and particular when `NOT IN` doesn''t work.


    # LATERAL JOINS (a.k.a. CROSS APPLY) and Friends


    This feature is not available in SQLite. Neither is it available in MariaDB, though
    it *is* available in MySQL.


    Still, if you''re working with one of these DBMSs, you might want to see what
    it''s all about. In any case, there''s an alternative for most things, especially
    with Common Table Expressions, in the next section.


    SQLite does, however, have an interesting quirk with the `WHERE` clause, which
    you''ll see if you hang around.


    If you try the following query:


    ```

    SELECT

    id, title,

    price, price*0.1 AS tax, price+tax AS inc

    FROM books;

    ```


    It won''t work. That''s because each column is independent of the rest. You can''t
    use an alias as part of another calculation in the `SELECT` clause. We got around
    this by calculating the `inc` column separately: `price*1.1 AS inc`.


    It gets worse if you try something like this:


    ```

    SELECT

    id, title,

    price, price*0.1 AS tax

    FROM books

    WHERE tax>1.5;

    ```


    Here, the problem is that the `SELECT` clause is evaluated *after* the `WHERE`
    clause, so the aliased calculation for `tax` isn''t available yet in the `WHERE`
    clause. Again, we could recalculate the value in the `WHERE` clause: `WHERE price*1.1>1.5`.


    Except with SQLite. You can indeed use aliases in the `WHERE` clause and also
    in the `GROUP BY` clause.


    Finally, if, for example, you want to get multiple columns from a subquery in
    the `SELECT` clause, this won''t work either:


    ```

    SELECT

    id, title,

    (SELECT givenname, othernames, familynames

    FROM authors WHERE authors.id=books.authorid)

    FROM books

    WHERE tax>1.5;

    ```


    A subquery in the `SELECT` clause can only return one value, which is all right
    if you concatenate the names and then return the result. Otherwise, you''re stuck
    with three subqueries, which is both costly and tedious.


    SQL can solve this by applying a subquery to each row. This is called a `LATERAL
    JOIN` in some DBMSs, or an `APPLY` in some others.


    ## Adding Columns


    In the first two examples earlier, you can use an expression like this:


    ```

    --  PostgreSQL, MySQL (not MariaDB)

    SELECT

    id, title,

    price, tax, inc

    FROM

    books

    JOIN LATERAL(SELECT price*0.1 AS tax) AS sq ON true

    JOIN LATERAL(SELECT price+tax AS inc) AS sq2 ON true

    WHERE tax>1.5

    ;

    --  MSSQL

    SELECT

    id, title,

    price, tax, inc

    FROM books

    CROSS APPLY (SELECT price*0.1 AS tax) AS sq

    CROSS APPLY (SELECT price+tax AS inc) AS sq2

    WHERE tax>1.5

    ;

    --  Oracle (No AS in subquery name)

    SELECT

    id, title,

    price, tax, inc

    FROM books

    CROSS APPLY (SELECT price*0.1 AS tax FROM dual) sq

    CROSS APPLY (SELECT price+tax AS inc FROM dual) sq2

    WHERE tax>1.5

    ;

    ```


    You''ll get something like this:


    | **id** | **Title** | **price** | **tax** | **inc** |

    | --- | --- | --- | --- | --- |

    | 503 | Uncle Silas | 17.00 | 1.700 | 18.700 |

    | 2007 | North and South | 17.50 | 1.750 | 19.250 |

    | 702 | Jane Eyre | 17.50 | 1.750 | 19.250 |

    | 1759 | La Curée | 16.00 | 1.600 | 17.600 |

    | 205 | Shadow: A Parable | 17.50 | 1.750 | 19.250 |

    | 1702 | Philaster | 17.50 | 1.750 | 19.250 |

    | ~ 525 rows ~ |


    Note


    .


    *   The subquery must be given an alias, even though it''s not used.


    *   PostgreSQL, MySQL, and MSSQL allow you to put the column aliases in the subquery
    aliases instead: `(SELECT price*0.1) AS sq(tax)`. Not Oracle.


    *   The example for PostgreSQL and MySQL uses the dummy condition `ON true`. MySQL
    will allow you to leave this out, but PostgreSQL requires it.


    Note in particular that the second subquery will happily calculate the expression
    `price+tax AS inc`. This is because the subqueries are evaluated one after the
    other, so the expressions can accumulate.


    The `LATERAL` or `CROSS APPLY` subquery is applied to every row of the main query.
    In principle, that could be pretty expensive, but, as it turns out, it''s not
    so bad. It''s particularly useful if you need to include a series of intermediate
    steps in a more complex calculation—it''s easy to understand and easy to maintain.


    SQL also has a type of join called `CROSS JOIN`. In a cross join, each row of
    one table is joined with each row of the other table. This result is also known
    as a Cartesian product. That''s a lot of combinations, and it''s usually not what
    you want.


    A `CROSS APPLY` is not the same thing, though it is a type of join. It''s closer
    to an `OUTER JOIN`.


    You''ll see a use for a cross join later when we cross join with a single row
    virtual table.'
