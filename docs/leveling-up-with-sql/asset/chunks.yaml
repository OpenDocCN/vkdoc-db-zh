  trans: '

    #### 创建客户详情视图


    视图是一个已保存的查询，我们可以将其用作虚拟表。在此视图中，我们将简单地添加 `customers` 表中的所有列，除了城镇数据。对于城镇数据，我们需要连接到
    `towns` 表。


    首先，我们用一个简单的 `SELECT` 语句来测试：


    ```sql

    SELECT

    c.id, c.email, c.familyname, c.givenname,

    c.street,

    --  原始值

    c.town, c.state, c.postcode,

    c.townid,

    --  来自 towns 表

    t.name AS town, t.state, t.postcode,

    c.dob, c.phone, c.spam, c.height

    FROM customers AS c LEFT JOIN towns AS t ON c.townid=t.id;

    ```


    如果你是在 Oracle 中操作，请记住不能为表别名使用 `AS`：


    ```sql

    SELECT

    ...

    FROM customers c LEFT JOIN towns t ON c.townid=t.id;

    ```


    请注意：


    *   我们使用 `LEFT JOIN` 来包含没有地址的客户。

    *   为了方便，我们为 `customers` 和 `towns` 表设置了别名。

    *   `towns` 表有一个 `name` 列，而不是 `town` 列。然而，在查询上下文中，将其别名为 `town` 是合理的。

    *   我们还包含了 `c.townid` 列，虽然它是冗余的，但可能使维护更容易。


    一旦你确认 `SELECT` 语句能完成工作，就可以创建视图了。当然，你应该省略旧的城镇数据，因为整个目的是使用来自连接的数据：


    ```sql

    CREATE VIEW customerdetails AS

    SELECT

    c.id, c.email, c.familyname, c.givenname,

    c.street,

    --  省略 c.town, c.state, c.postcode

    c.townid, t.name AS town, t.state, t.postcode,

    c.dob, c.phone, c.spam, c.height

    FROM customers AS c LEFT JOIN towns AS t ON c.townid=t.id;

    ```


    在 Microsoft SQL 中，你需要将 `CREATE VIEW` 语句包裹在一对 `GO` 关键字之间：


    ```sql

    --  MSSQL:

    GO

    CREATE VIEW customerdetails AS

    SELECT

    c.id, c.email, c.familyname, c.givenname,

    c.street,

    c.townid, t.name as town, t.state, t.postcode,

    c.dob, c.phone, c.spam, c.height

    FROM customers AS c LEFT JOIN towns AS t ON c.townid=t.id;

    GO

    ```


    你稍后会了解更多关于视图的知识。


    #### 删除地址列


    要删除旧的地址列，你应该能够运行以下语句：


    ```sql

    --  PostgreSQL, MySQL / MariaDB

    ALTER TABLE customers

    DROP COLUMN town, DROP COLUMN state, DROP COLUMN postcode;

    --  Oracle: 不是 DROP COLUMN

    ALTER TABLE customers DROP (town, state, postcode);

    --  SQLite: 你需要一次删除一个列

    ALTER TABLE customers DROP COLUMN town;

    ALTER TABLE customers DROP COLUMN state;

    ALTER TABLE customers DROP COLUMN postcode;

    --  MSSQL: （目前）不工作

    ALTER TABLE customers

    DROP COLUMN town, state, postcode;

    ```


    这里，我们使用 `DROP COLUMN` 来移除一个或多个列，当然，以及它们的所有数据，所以你需要确保不再需要它。正如你之前看到的，不同数据库管理系统之间的语法存在一些差异。


    在 Microsoft SQL 中，你会收到一个错误，提示无法删除 `postcode` 列，因为存在一个约束。约束是用于有效值的附加规则。


    在这种情况下，有一个名为 `ck_customers_postcode` 的约束，要求邮政编码仅由四位数字组成。你现在不再需要这个约束了，特别是因为你正要删除该列。


    要移除约束，请运行：


    ```sql

    --  MSSQL

    ALTER TABLE customers

    DROP CONSTRAINT ck_customers_postcode;

    ```


    成功移除约束后，你现在可以删除列了：


    ```sql

    ALTER TABLE customers DROP COLUMN town, state, postcode;

    ```


    这样你就移除了多余的地址列。


    请记住，如果你删除了错误的列，要恢复它是非常棘手或不可能的。


    ### 更改城镇


    当然，整个练习的重点是你现在应该能够通过一个单一的更改来迁移到另一个城镇。我们将用客户 `42` 来尝试这个。


    首先，找到客户 `42` 的地址，特别是注意 `townid`：


    ```sql

    SELECT * FROM customerdetails WHERE id=42;

    ```


    你会得到类似这样的结果：


    | `id` | `...` | `townid` | `town` | `State` | `postcode` | `...` |

    | --- | --- | --- | --- | --- | --- | --- |

    | 42 | ... | 846 | Kings Park | NSW | 2148 | ... |


    请注意，我们是从 `customerdetails` 视图中读取数据，因为城镇数据已不在 `customers` 表中，尽管 `townid` 还在。


    现在，将客户的 `townid` 更改为任何你喜欢的值（只要不超过 `towns` 表中的最高 id）：


    ```sql

    UPDATE customers SET townid=12345 WHERE id=42;

    ```


    如果你现在检查同一个客户：


    ```sql

    SELECT * FROM customerdetails WHERE id=42;

    ```


    你会得到类似这样的结果：


    | `id` | `...` | `townid` | `town` | `State` | `postcode` | `...` |

    | --- | --- | --- | --- | --- | --- | --- |

    | 42 | ... | 12345 | Swan Marsh | VIC | 3249 | ... |


    如果你愿意，可以将其设置回原始值。


    在这里，我们设置了 `customers` 表中的 `townid`，这是它所属的位置。


    一些数据库管理系统允许你采取稍微间接的方法来更改此值，并通过视图进行更改：


    ```sql

    --  不是 PostgreSQL 或 SQLite：

    UPDATE customerdetails SET townid = ... WHERE id=42;

    ```


    如你所见，这不包括 PostgreSQL 或 SQLite。


    当然，你并不能真正更新视图，因为它实际上只是一个 `SELECT` 语句，不包含任何数据。相反，数据库管理系统会尝试找出特定列属于哪个表，并将更改传递给该表。有时它无法做到这一点，例如当你尝试更新一个计算列时。在这种情况下，更新将失败，你必须直接更新表。

    '
- fmt: "# Improving Database Integrity\n\n## Adding the Country\n\nFor completeness,\
    \ you may want to add a reference to a country. You might simply have another\
    \ column with the country name, but many countries have variations in their names,\
    \ and you don't want three different versions of the country in the same table.\n\
    \nIt's better to have a separate table of countries and include a foreign key\
    \ to this table. You can add this reference to the `customers` table, but it might\
    \ make more sense to add this to the `towns` table, since it is the town which\
    \ is located in a country.\n\nYou'll note that the `countries` table has much\
    \ more than we need for the purpose. You probably don't need things like the country's\
    \ population or area. However, at some point in the future, you might want the\
    \ country's currency, time zone, or phone prefix, so it doesn't hurt to have it\
    \ now. It's not a very big table, and you can just ignore what you don't want,\
    \ but you can always drop the columns you really don't need.\n\n1.  There is an\
    \ SQL file for another table called `countries.sql`. It has a number of details,\
    \ but the two most important details are\n\n    ```\n    CREATE TABLE countries\
    \ (\n    id CHAR(2) PRIMARY KEY,\n    name VARCHAR(...),\n    --  etc\n    );\n\
    \    ```\n\n    Note that the primary key is a two-character string. Every country\
    \ has a predefined two-character code, generally based on the country's name,\
    \ either in English or in the country's language. It makes sense to use this as\
    \ its primary key, rather than making one up. This is an example of a `natural\
    \ key`: a primary key based on actual data rather than an arbitrary code.\n\n\
    \    Run the script to install the table.\n\n2.  Add a `countryid` column to the\
    \ `towns` table, similar to the way you added `townid` to the `customers` table.\
    \ Remember, the data type must match the preceding primary key:\n\n    ```\n \
    \   --  PostgreSQL, Oracle, MSSQL, SQLite\n    ALTER TABLE towns\n    ADD countryid\
    \ CHAR(2)\n    CONSTRAINT fk_town_country REFERENCES countries(id);\n    --  MySQL\
    \ / MariaDB\n    ALTER TABLE towns\n    ADD countryid CHAR(2) REFERENCES countries(id);\n\
    \    ```\n\n3.  Update the `towns` table to set the value of `countryid` to `'au'`\
    \ for Australia or whichever country you choose. This is much simpler than setting\
    \ it from a subquery:\n\n    ```\n    UPDATE towns SET countryid='au';\n    ```\n\
    \n4.  You will have to modify your view. First, drop the old version:\n\n    ```\n\
    \    --  Not Oracle:\n    DROP VIEW IF EXISTS customerdetails;\n    --  Oracle:\n\
    \    DROP VIEW customerdetails;\n    ```\n\n5.  Next, you will have to recreate\
    \ it with the country name:\n\n    ```\n    --  Not Oracle\n    CREATE VIEW customerdetails\
    \ AS\n    SELECT\n    ...\n    c.townid, t.name AS town, t.state, t.postcode,\n\
    \    n.name AS country\n    ...\n    FROM\n    customers AS c\n    LEFT JOIN towns\
    \ AS t ON c.townid=t.id\n    LEFT JOIN countries AS n ON t.countryid=n.id;\n \
    \   --  Oracle\n    CREATE VIEW customerdetails AS\n    SELECT\n    ...\n    c.townid,\
    \ t.name AS town, t.state, t.postcode,\n    n.name AS country\n    ...\n    FROM\n\
    \    customers c\n    LEFT JOIN towns t ON c.townid=t.id\n    LEFT JOIN countries\
    \ n ON t.countryid=n.id;\n    ```\n\n**Note**\n\n*   This includes an additional\
    \ `JOIN` to the `countries` table; to accommodate the longer clause, we have split\
    \ the `JOIN` over multiple lines.\n*   The alias for the `countries` table has\
    \ been set to `n` (for Nation); this is simply because we can't use `c` as it\
    \ is already in use.\n\n## Additional Comments\n\nYou may have noticed that we\
    \ didn't do anything about the `street` address column. Strictly speaking, this\
    \ is also subject to the same issues as the rest of the address, so it would have\
    \ been better if we did something similar.\n\nHowever, street addresses are much\
    \ more complicated, and we don't have so many customers, so we have left them\
    \ as they are. This leaves us with an imperfect but much improved design.\n\n\
    ## Improving Database Integrity\n\nSo far, we have focused on bringing a table\
    \ closer to a true normal form by reducing the dependency between columns and\
    \ repetition of data. This meant adding other tables and foreign keys.\n\nHere,\
    \ we will explore additional improvements to the integrity of the database. `Database\
    \ integrity` refers to the quality of the data: Does the data make any sense?\n\
    \nYou need to remember that the DBMS really has no idea of what's going on, and\
    \ it really doesn't care whether you're telling the truth. However, the DBMS is\
    \ deeply concerned with whether the data is *valid*. That is, whether the data\
    \ conforms to various rules.\n\nIn theory, data belongs to a `domain`—a set of\
    \ valid values. You should then be able to define a domain for one or more columns.\
    \ In practice, this feature isn't widely supported in most DBMSs.\n\nOn the other\
    \ hand, you can readily impose `constraints` on a column. A constraint is a data\
    \ rule.\n\nYou'll already know some standard constraint types:\n\n*   A data type,\
    \ such as `INTEGER` or `VARCHAR(16)`, limits the type and range of the data which\
    \ is acceptable.\n*   A `NOT NULL` constraint means the value cannot be `NULL`;\
    \ that is, it's required.\n*   A `UNIQUE` constraint will disallow a value if\
    \ another row has the same value already in that column (or combination of columns).\n\
    *   A `REFERENCES` constraint defines a foreign key; a foreign key *must* match\
    \ an existing value in another key.\n\nIn all cases, of course, there's no guarantee\
    \ that the value is true—just valid.\n\nIf you want to get more specific in your\
    \ definition of what is valid, there is also the `CHECK` constraint. The `CHECK`\
    \ is a miscellaneous constraint which allows you to set up your own rules using\
    \ an expression similar to a `WHERE` clause. Sometimes, these are called `business\
    \ rules`.\n\nIn this section, we'll look at some weaknesses of the database and\
    \ try to fill in some of the design gaps by adding some constraints.\n\nMuch of\
    \ the following will involve making changes to existing columns. If you're using\
    \ SQLite, then, sadly, you can't do that. SQLite has very limited `ALTER TABLE`\
    \ functionality, and you can't make changes to existing columns. If you really\
    \ need to make such changes, you would have to go through a more complicated process\
    \ of dropping a column and creating a new one."
