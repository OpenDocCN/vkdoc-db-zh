    \ `GROUP BY` 子句中的内容，你可能会发现以下技术很有帮助：\n\n*   使用冗余分组来选择一项并按另一项排序。\n*   将聚合查询放在一个\
    \ CTE 中，并将其与其他表连接以获取其余结果。\n\n按列分组时，结果可能不会按正确顺序排列。由于组名都是字符串，按组名排序只会将它们按字母顺序排列，这并不总是合适的。但是，你也可以根据它们在另一个字符串中的位置来排序，这个字符串可以按你喜欢的任何顺序排列。\n\
    \n### 混合小计\n\n总的来说，聚合查询产生的是单一层级的简单聚合。有时，你需要将它们与不同级别的小计结合起来。\n\n你可以在单独的查询中生成小计，然后用\
    \ `UNION` 将它们组合起来。你可能需要一些额外的工作才能让结果按你希望的顺序排列。\n\n大多数 DBMS 包含小计操作来自动创建组合结果。它们可能包括\
    \ `GROUPING SETS`、`ROLLUP` 或 `CUBE`。大多数包含 `ROLLUP`，这是最常见的变体。还有其他的分组函数来辅助排序和标记。\n\
    \n### 统计\n\n一般来说，聚合函数本质上是统计性的。虽然 SQL 不像专门的统计软件那样强大，但你可以使用聚合和分组来生成一些基本的统计数据。\n\n\
    ## 后续内容\n\n在某些情况下，我们使用公用表表达式中的查询来准备数据。然而，在其中一个案例中，我们创建了一个视图，以便可以重用该查询。\n\n在下一章中，我们将更仔细地研究如何创建和使用视图来改进我们的工作流程。\n\
    \n# 6. 使用视图及其相关对象\n\n这不是你第一次在书中看到视图，也不会是最后一次。\n\n本章整合了你可能已经了解到的关于视图和相关概念的知识，并提供了一些关于如何一般性地使用它们的想法。\n\
    \n你可以用一生来编写 SQL 语句，工作也能完成。然而，你可能会达到一个点，即一遍又一遍地写同样的东西失去了魅力，因此你会想要找到重用先前查询的方法。\n\
    \n首先，让我们看看表是什么，以及当你使用 `SELECT` 语句时会发生什么。\n\nSQL 数据库将数据存储在表中。实际上，并非如此——每个表实际上存储在其他某种结构中，例如二进制树，这样更高效。然而，当你看到它时，它将被呈现为一个表，并且在数据库中就是这样称呼的。\n\
    \n表由行和列组成。出于我们的目的，表不一定是永久表，并且有些操作会生成表结构而不一定被永久存储。我们将它们称为 **虚拟表**。\n\n以下是一些生成（虚拟）表的操作，按持久性递增的顺序排列：\n\
    \n*   `SELECT` 语句的结果是一个虚拟表。\n*   一个 **连接** 是两个或多个（虚拟）表的组合，以产生一个扩展的虚拟表。\n*   一个\
    \ **公用表表达式** 生成一个虚拟表，你可以在查询的后面部分使用它。表子查询本质上是相同的东西。\n*   一个 **视图** 是一个保存的 `SELECT`\
    \ 查询，将在调用时重新生成虚拟表。\n    一个 **物化视图** 是一种存储其结果的视图，因此不必总是重新生成所有内容。\n    一些 DBMS 支持\
    \ **表值函数**，这些是生成虚拟表的函数。\n*   一个 **临时表** 就像一个真实的表。它可能存储在磁盘上，也可能不存储。当会话结束时，它会自动销毁。\n\
    \n关于表和虚拟表的关键点是，它们都可以在 `FROM` 子句中使用。\n\n你已经知道如何使用连接。你也使用过公用表表达式，我们将在接下来的章节中更深入地讨论它们。\n\
    \n在本章中，我们将研究其余的对象，以及我们如何利用它们来改进我们的工作流程。\n"
- fmt: '## Working with Views


    You have already created one or two views so far, so much of this is familiar
    territory.


    A view is a `SELECT` statement saved in the database. When the view is saved,
    the DBMS often also saves the execution plan, so less time is wasted planning
    the same thing next time.


    Views can be used whenever you might have read from a table. You can think of
    a view as a virtual table—something which behaves as a table.


    To read from a view, you treat it as a table:

    ```

    SELECT columns FROM view;

    ```


    Note the syntax is exactly the same as for tables. From the perspective of a `SELECT`
    statement, there is no distinction between selecting from a view and from a table.


    One important consequence of this is that you cannot have views with the same
    names as tables—views and tables share the name space.


    This doesn’t mean that there are no differences. The DBMS stores views as separate
    types of objects and manages them differently. However, once created, you can
    treat a view like a table.


    Views can be an important part of your workflow. For example:

    - Saving a complex query to be used simply

    - Exposing complex queries to external applications

    - Creating an interface between existing data and an application

    - As a substitute for some queries


    Creating a view requires permissions which you may not already have as a database
    user. Do whatever is required to get these permissions—badger, bribe, blackmail
    as needed.


    Views have several benefits:

    - You can hide complex processing with a view which just gives a virtual table
    of the results.

    - You can restrict access to data in tables by creating a view with only certain
    rows and columns.

    - You can hide details in aggregate queries.


    There are some limitations as well. The main limitation is that a view is inflexible.
    You can’t, for example, vary the values that a view might use to calculate results.
    You’ll see a possible solution to that when we discuss Table Valued Functions
    later.


    Other limitations vary between DBMSs. Some DBMSs support temporary views. MSSQL
    doesn’t allow an `ORDER BY` in a view without additional trickery. Some DBMSs
    support views on temporary tables, while others don’t.


    For the most part, however, views will simplify your workflow and allow you to
    move on to more complex tasks.


    ### Creating a View


    A view starts off as a simple `SELECT` statement. For example, we can start developing
    a `pricelist` view which will comprise some information about books, their authors,
    and the price, including tax:

    ```

    /* Notes

    ===================================================

    MSSQL:  Use + for concatenation

    Oracle: No AS for tables:

    FROM books b JOIN authors a ON ...

    =================================================== */

    SELECT

    b.id, b.title, b.published,

    coalesce(a.givenname||'' '','''')

    || coalesce(othernames||'' '','''')

    || a.familyname AS author,

    b.price, b.price*0.1 AS tax, b.price*1.1 AS inc

    FROM books AS b LEFT JOIN authors AS a ON b.authorid=a.id

    WHERE b.price IS NOT NULL;

    ```


    This should give you something like this:


    | `id` | `title` | `pub` | `author` | `price` | `tax` | `inc` |

    | --- | --- | --- | --- | --- | --- | --- |

    | 2078 | The Duel | 1811 | Heinrich von Kleis ... | 12.50 | 1.25 | 13.75 |

    | 503 | Uncle Silas | 1864 | J. Sheridan Le Fan ... | 17.00 | 1.70 | 18.70 |

    | 2007 | North and South | 1854 | Elizabeth Gaskell | 17.50 | 1.75 | 19.25 |

    | 702 | Jane Eyre | 1847 | Charlotte Brontë | 17.50 | 1.75 | 19.25 |

    | 1530 | Robin Hood, The Pr ... | 1862 | Alexandre Dumas | 12.50 | 1.25 | 13.75
    |

    | 1759 | La Curée | 1872 | Émile Zola | 16.00 | 1.60 | 17.60 |

    | ~ 1096 rows ~ |


    As it’s a price list, we’ve filtered out the `NULL` prices.


    There are, however, certain conditions:

    - All columns in a view must have a name, including calculated columns. You can’t
    have anonymous columns as you might in a simple `SELECT` statement.

    - Column names must be unique. This is especially important with joined tables,
    where column names may be duplicated.


    In other words, the virtual table must conform to the rules of a real table.


    To create a view, prepend the `SELECT` statement with a `CREATE VIEW ... AS` clause:

    ```

    /* Notes

    ===================================================

    MSSQL:  Use + for concatenation

    MSSQL:  Surround the CREATE VIEW with GO

    Oracle: No AS for tables:

    FROM books b JOIN authors a ON ...

    =================================================== */

    --  GO

    CREATE VIEW aupricelist AS

    SELECT

    b.id, b.title, b.published,

    coalesce(a.givenname||'' '','''')

    || coalesce(othernames||'' '','''')

    || a.familyname AS author,

    b.price, b.price*0.1 AS tax, b.price*1.1 AS inc

    FROM books AS b JOIN authors AS a ON b.authorid=a.id;

    --  GO

    ```


    That will now be saved into your database.


    We’ve called the price list `aupricelist` because the tax is set to 10%, which
    is the rate in Australia. Feel free to use any tax rate and name that you like.


    - In Microsoft SQL Server only, you need to separate the `CREATE` view statement
    from the rest of the script. You do this by putting `GO` before and after, which
    marks off what they call a batch. The `GO` must be on a line by itself.


    You can now read the appropriate results like a table:

    ```

    SELECT * FROM aupricelist;

    ```


    This will give you the same results as before.


    You can filter the view as with a table:

    ```

    SELECT *

    FROM aupricelist

    WHERE published BETWEEN 1700 AND 1799;

    ```


    This gives you:


    | `id` | `title` | `pub` | `author` | `price` | `tax` | `inc` |

    | --- | --- | --- | --- | --- | --- | --- |

    | 1608 | The Autobiography ... | 1791 | Benjamin Franklin | 18.50 | 1.85 | 20.35
    |

    | 2303 | The Metaphysics of ... | 1797 | Immanuel Kant | 12.00 | 1.20 | 13.20
    |

    | 1305 | An Essay on Critic ... | 1711 | Alexander Pope | 11.00 | 1.10 | 12.10
    |

    | 1963 | A Treatise of Huma ... | 1740 | David Hume | 18.50 | 1.85 | 20.35 |

    | 1196 | Equiano’s Travels: ... | 1789 | Olaudah Equiano | 12.50 | 1.25 | 13.75
    |

    | 1255 | Discourse on the O ... | 1755 | Jean-Jacques Rouss ... | 19.00 | 1.90
    | 20.90 |

    | ~ 166 rows ~ |


    You can also sort the results:

    ```

    SELECT * FROM aupricelist ORDER BY title;

    ```


    This gives you:


    | `id` | `title` | `pub` | `author` | `price` | `tax` | `inc` |

    | --- | --- | --- | --- | --- | --- | --- |

    | 541 | 120 Days of Sodom | 1904 | Marquis de Sade | 12.50 | 1.25 | 13.75 |

    | 729 | A Cartomante e Out ... | 1884 | Machado de Assis | 16.00 | 1.60 | 17.60
    |

    | 2092 | A Chaste Maid in C ... | 1613 | Thomas Middleton | 15.00 | 1.50 | 16.50
    |

    | 1437 | A Child’s Garden o ... | 1885 | Robert Louis Steve ... | 11.00 | 1.10
    | 12.10 |

    | 454 | A Christmas Carol | 1843 | Charles Dickens | 13.50 | 1.35 | 14.85 |

    | 1094 | A Confession | 1882 | Leo Tolstoy | 17.50 | 1.75 | 19.25 |

    | ~ 1096 rows ~ |


    With the exception of MSSQL, you could have included the `ORDER BY` clause in
    the view itself. Although it’s convenient, it’s probably not a good idea: you
    forcing the DBMS to sort the result whether you need it or not, and you may end
    up sorting it again in a different order afterward.


    ### Using ORDER BY in MSSQL


    As noted earlier, SQL Server precludes `ORDER BY` in a view without additional
    trickery. If you *really* want to have a presorted view, you can do the following:

    ```

    CREATE VIEW something AS

    SELECT columns

    FROM table

    ORDER BY columns OFFSET 0 ROWS;

    ```


    Among other things, this will allow you to create an ordered view without the
    need to include extra columns just for sorting.


    However, you need to be aware that an ordered view does place an extra burden
    on the database, so it should only be used when needed.


    ### Tips for Working with View


    Views are generally a good thing, but there are a few things to help you use them
    more reliably. Some of the fine points will vary between DBMSs, and the DBMS will
    do its best to work as efficiently as possible. Nevertheless, it’s a good idea
    to keep these ideas in mind.'
