    ```

    SELECT * FROM sales ORDER BY id DESC;

    SELECT * FROM saleitems ORDER BY id DESC;

    ```


    You should see the new sale and sale items at the top.


    ## Review


    In this chapter, we’ve looked at a few additional techniques that can be used
    to get more out of our database.


    ### Triggers


    Triggers are code scripts which run in response to something happening in the
    database. Typically, these include `INSERT`, `UPDATE`, and `DELETE` events. Using
    a trigger, you can intercept the event and make your own additional changes to
    the affected table or another table. Some triggers can go further and work more
    closely with the DBMS or operating system.


    We explored the concept by creating a trigger which responds to deleting from
    the `sales` table. In this case, we copied data from the sale and matching sale
    item into an `archive` table.


    Different DBMSs vary in detail, but generally they follow the same principles:


    *   A trigger is defined for an event on a table.


    *   The trigger code has access to the data about to be affected (such as the
    `INSERTED` and `DELETED` virtual tables).


    *   Using this data, the trigger code can go ahead and perform additional SQL
    operations.


    ### Pivot Tables


    A pivot table is a virtual table which summarizes data in both rows and columns.
    It’s a sort of two-dimensional aggregate.


    For the most part, raw table data isn’t ready to be summarized this way. You would
    put some effort into preparing the data in the right form and making it available
    in one or more CTEs.


    You can create a pivot table manually using a combination of two techniques:


    *   An aggregate query generates the vertical groups and the data to be summarized.


    *   A `SELECT` statement with aggregate filters generates a summary for each horizontal
    category.


    `MSSQL` and `Oracle` both have a non-standard `PIVOT` clause which will, to some
    extent, automate the second process earlier. However, it still requires some input
    from the SQL developer to finish the job.


    ### SQL Variables


    In this chapter, we used variables to streamline the code, first introduced in
    Chapter [3](#606708_1_En_3_Chapter.xhtml), which adds a sale by inserting into
    multiple tables and updating them.


    Most of the SQL we’ve worked with involved single statements. Some of those statements
    were effectively multipart statements with the use of CTEs to generate interim
    data.


    In the case where you need more complex code to run in multiple statements, you
    may need to store interim values. These values are held in variables, which are
    temporary pieces of data.


    In this chapter, we used variables for two purposes:


    *   To hold fixed values to be used in the code


    *   To store an interim value generated by some of the code


    In most DBMSs, variables are declared and used within a block of code. In most
    cases, the variables and their values will vaporize after the code block is run.
    `MariaDB/MySQL`, however, will retain variables beyond the run.


    `SQLite` doesn’t support variables. It is expected that the hosting application
    will handle the temporary data that variables are supposed to manage.


    ## Summary


    Although you can go a long way with straightforward SQL statements and features,
    you can often get more out of your DBMS with some additional features:


    *   Triggers are used to run some code in response to some database event. They
    can be used to add some further processing to your database automatically.


    *   Pivot tables are virtual tables which provide a compact view of your summaries.
    You can generate a pivot table using a combination of aggregate queries, but some
    DBMSs offer a pivot feature to simplify the process.


    *   SQL variables are used to store temporary values between other SQL statements.
    They can be used to store interim values that can be used in subsequent statements.


    Using what you’ve learned here and in previous chapters, you can build more complex
    queries to work with and analyze your database.'
