  raw: "#### Using the Unpivot Feature\n\nBoth MSSQL and Oracle can reverse the process\
    \ using `UNPIVOT`. Noting that a pivot table is denormalized, the `UNPIVOT` clause\
    \ can give you a normalized result. The idea is that summaries which are spread\
    \ across the table in category columns will appear down the table in rows.\n\n\
    The sample database doesn’t include a table in pivot table form, and rightly so.\
    \ However, we do have a ready-made pivot table in the preceding work. We can use\
    \ that to illustrate the unpivot feature.\n\nFirst, we’ll need to wrap the final\
    \ `SELECT` statement into another CTE:\n\n```\nWITH\nstatuses(status, statusname)\
    \ AS (\n...\n),\ncustomerinfo(id, state, statusname) AS (\n...\n),\nsalesdata(state,\
    \ statusname, total) AS (\n...\n),  --  extra comma\npivottable AS (\nSELECT *\n\
    FROM salesdata\nPIVOT ...\n)\nSELECT *\nFROM pivottable\n;\n```\n\nIf you run\
    \ this, you’ll get the same result as before; we’ve just put the result into the\
    \ `pivottable` CTE.\n\nThe next step is to add the `UNPIVOT` clause at the end\
    \ of the `SELECT` statement:\n\n```\nWITH\nstatuses(status, statusname) AS (\n\
    ...\n),\ncustomerinfo(id, state, statusname) AS (\n...\n),\nsalesdata(state, statusname,\
    \ total) AS (\n...\n),\npivottable AS (\n...\n)\nSELECT *\nFROM pivottable\n--\
    \ MSSQL:\nUNPIVOT (\ntotal FOR statuses IN (Gold,Silver,Bronze)\n) AS w\n--  Oracle:\n\
    UNPIVOT (\ntotal FOR statuses IN (Gold,Silver,Bronze)\n)\n```\n\nYou should see\
    \ something like\n\n| state | total | statuses |\n| --- | --- | --- |\n| QLD |\
    \ 5532.5 | Gold |\n| QLD | 3557.5 | Silver |\n| QLD | 10937 | Bronze |\n| VIC\
    \ | 8352 | Gold |\n| VIC | 6381.5 | Silver |\n| VIC | 6023 | Bronze |\n| NSW |\
    \ 11526 | Gold |\n| NSW | 9567 | Silver |\n| NSW | 11941.5 | Bronze |\n| NT |\
    \ 349.5 | Bronze |\n| ACT | 1387 | Gold |\n| TAS | 4574 | Gold |\n| TAS | 2459.5\
    \ | Silver |\n| TAS | 2873.5 | Bronze |\n| SA | 826.5 | Gold |\n| SA | 1634.5\
    \ | Silver |\n| SA | 3709.5 | Bronze |\n| WA | 213 | Gold |\n| WA | 1655 | Silver\
    \ |\n\nThe `UNPIVOT` clause is even more mysterious than the `PIVOT` clause. The\
    \ only column that’s specifically mentioned is the `statuses` column, and, again,\
    \ you need to list the possible values. From there, the DBMS magically works out\
    \ that there is a `state` column, and whatever’s left will appear in another column,\
    \ which we have called `total`.\n\n## Working with SQL Variables\n\nSQL is not\
    \ a *programming* language. With a programming language, you code *how* to do\
    \ a job in a series of steps. SQL is a *declarative* language in which you code\
    \ what you want done, but leave it up to the DBMS to decide how to go about doing\
    \ it.\n\nNevertheless, there are times when you need a job done in multiple steps,\
    \ and having the ability to write your code in steps would come in handy. We saw\
    \ this in Chapter [3](#606708_1_En_3_Chapter.xhtml), where adding a new sale involved\
    \ multiple steps.\n\nWhat was missing from the process in Chapter [3](#606708_1_En_3_Chapter.xhtml)\
    \ was the ability to store interim values. That’s what we’re going to look at\
    \ in this section.\n\nMany DBMSs supply information about the current database\
    \ environment in the form of special functions or system or global variables.\
    \ Sometimes, these system variables can be set to new values using a `SET` command.\
    \ That’s *not* what we’re looking at in this section. In this section, we’re looking\
    \ at variables that you create and set for your own use.\n\nA **variable** is\
    \ a temporary piece of data. Generally, you **declare** it before you use it and\
    \ define its data type. You may set it then or, more typically, in a later step.\n\
    \nTypically, a variable is associated with a stored block of code called a **function**\
    \ or a **procedure**, depending on the DBMS and what you’re attempting to do in\
    \ the code. In this section, we’ll be working without storing the code.\n\nThe\
    \ various DBMSs have slightly different processes for working with variables:\n\
    \n*   PostgreSQL historically limited variables to stored code blocks (functions).\
    \ However, in version 11 they introduced an **anonymous** (`DO`) block, which\
    \ lets you write the code without storing the block. PostgreSQL variables must\
    \ be declared with a data type.\n\n*   MariaDB/MySQL is most relaxed about variables,\
    \ and you *don’t* declare a variable before using it. Variable names are prefixed\
    \ with the `@` sign.\n\n*   MSSQL variables must be declared with a data type.\
    \ They are prefixed with the `@` sign.\n\n*   Oracle variables are declared with\
    \ a data type.\n\n    SQLite is missing from this list, and that’s because it\
    \ doesn’t support variables. SQLite is typically embedded in a host application.\
    \ The assumption is that you’re writing programming code for the host application.\
    \ You can have all the additional variables and functionality you like there.\n\
    \n### Code Blocks\n\nIf you’re using a client which makes it easy to run one statement\
    \ at a time, you may find it gets a little confused when working with blocks of\
    \ multiple statements. It will be easier to work with if you surround your block\
    \ with delimiters.\n\nFor the various DBMSs, the delimiters look like this:\n\n\
    ```\n--  PostgreSQL\nDO $$\n...\nEND $$;\n--  MariaDB/MySQL\nDELIMITER $$\n...\n\
    $$\nDELIMITER ;\n--  MSSQL\nGO\n...\nGO\n--  Oracle\n/\n...\n/\n```\n\nIn the\
    \ end, you will probably just highlight all of the lines of code and run them\
    \ together. That’s what we recommend in trying the following code. *Don’t try\
    \ running just one line at a time.*\n\nIn the following code, we’ll do what we\
    \ did in Chapter [3](#606708_1_En_3_Chapter.xhtml) in adding a new sale. Then,\
    \ we made a point of recording the new sale id, so that we could use it in subsequent\
    \ statements. This time, however, we’ll use variables to store interim values,\
    \ so we can run the code in a single batch.\n\nThe code will broadly follow these\
    \ steps:\n\n1.  Set up the data to be used.\n\n2.  Insert the sale.\n\n3.  Get\
    \ the new sale id into a variable.\n\n4.  Insert the sale items, using the sale\
    \ id.\n\n5.  Update the sale items with their prices, using the sale id.\n\n6.\
    \  Update the new sale with the total, using the sale id, of course.\n\nWhile\
    \ we’re at it, we’ll set a few other variables:\n\n*   A variable to store the\
    \ customer’s id\n\n*   A variable to store the ordered date/time\n\nIt would be\
    \ nice to have another variable with the sale items. However, most DBMSs aren’t\
    \ adept at defining multivalued variables without a lot of extra fuss in defining\
    \ custom data types to do the job. Here, we’re trying to keep things simple.\n\
    \nWhat follows will be four similar versions of how to write the code block.\n\
    \n### Updated Code to Add a Sale\n\nThe outline of the following code blocks will\
    \ be basically the same:\n\n*   Define the variables\n\n*   Run the `INSERT` and\
    \ `UPDATE` statements\n\n*   Test the results\n\nWe’ll discuss the code for each\
    \ of the main DBMSs."
  trans: "### 反透视功能\n\nMSSQL 和 Oracle 都可以使用 `UNPIVOT` 来逆转该过程。注意到透视表是反规范化数据，而 `UNPIVOT`\
    \ 子句可以给你一个规范化后的结果。其核心思想是，分散在表中各个类别列中的汇总信息，将会以行的形式出现在表中。\n\n示例数据库中没有以透视表形式存储的表，这是合理的。不过，在之前的工作中，我们已经得到了一个现成的透视表。我们可以用它来演示反透视功能。\n\
    \n首先，我们需要将最终的 `SELECT` 语句包装到另一个 CTE（公共表表达式）中：\n\n```\nWITH\nstatuses(status, statusname)\
    \ AS (\n...\n),\ncustomerinfo(id, state, statusname) AS (\n...\n),\nsalesdata(state,\
    \ statusname, total) AS (\n...\n),  --  额外的逗号\npivottable AS (\nSELECT *\nFROM\
    \ salesdata\nPIVOT ...\n)\nSELECT *\nFROM pivottable\n;\n```\n\n如果你运行这个，你会得到和之前一样的结果；我们只是把结果放进了\
    \ `pivottable` 这个 CTE 中。\n\n下一步是在 `SELECT` 语句的末尾添加 `UNPIVOT` 子句：\n\n```\nWITH\n\
    statuses(status, statusname) AS (\n...\n),\ncustomerinfo(id, state, statusname)\
    \ AS (\n...\n),\nsalesdata(state, statusname, total) AS (\n...\n),\npivottable\
    \ AS (\n...\n)\nSELECT *\nFROM pivottable\n-- MSSQL:\nUNPIVOT (\ntotal FOR statuses\
    \ IN (Gold,Silver,Bronze)\n) AS w\n--  Oracle:\nUNPIVOT (\ntotal FOR statuses\
    \ IN (Gold,Silver,Bronze)\n)\n```\n\n你应该会看到类似这样的结果：\n\n| 州 (state) | 总额 (total)\
    \ | 状态 (statuses) |\n| --- | --- | --- |\n| QLD | 5532.5 | Gold |\n| QLD | 3557.5\
    \ | Silver |\n| QLD | 10937 | Bronze |\n| VIC | 8352 | Gold |\n| VIC | 6381.5\
    \ | Silver |\n| VIC | 6023 | Bronze |\n| NSW | 11526 | Gold |\n| NSW | 9567 |\
    \ Silver |\n| NSW | 11941.5 | Bronze |\n| NT | 349.5 | Bronze |\n| ACT | 1387\
    \ | Gold |\n| TAS | 4574 | Gold |\n| TAS | 2459.5 | Silver |\n| TAS | 2873.5 |\
    \ Bronze |\n| SA | 826.5 | Gold |\n| SA | 1634.5 | Silver |\n| SA | 3709.5 | Bronze\
    \ |\n| WA | 213 | Gold |\n| WA | 1655 | Silver |\n\n`UNPIVOT` 子句比 `PIVOT` 子句更神秘一些。它唯一明确提及的列是\
    \ `statuses` 列，并且你同样需要列出其可能的值。从那里，DBMS（数据库管理系统）会神奇地推断出有一个 `state` 列，而剩下的数据则会出现在另一列中，我们称之为\
    \ `total`。\n\n## 使用 SQL 变量\n\nSQL 不是一门编程语言。使用编程语言时，你通过一系列步骤来编写如何完成工作的代码。SQL 是一种声明式语言，你编写你想要完成的任务，而由\
    \ DBMS 决定如何去完成它。\n\n然而，有时你需要分多个步骤完成一个工作，这时能够分步编写代码就很有用了。我们在第 3 章中看到了这一点，其中添加一笔新销售就涉及多个步骤。\n\
    \n第 3 章中的流程缺失的是存储中间值的能力。这正是我们将在本节中探讨的内容。\n\n许多 DBMS 通过特殊函数或系统/全局变量的形式提供有关当前数据库环境的信息。有时，可以使用\
    \ `SET` 命令将这些系统变量设置为新值。但这并不是我们在本节中要讨论的内容。在本节中，我们探讨的是你为自己创建和设置的变量。\n\n**变量** 是一个临时的数据片段。通常，你会在使用前**声明**它并定义其数据类型。你可以在声明时设置它，或者更常见的是，在后续步骤中设置它。\n\
    \n通常，一个变量与一个称为**函数**或**过程**（取决于 DBMS 和你试图在代码中完成的任务）的存储代码块相关联。在本节中，我们将在不存储代码的情况下进行操作。\n\
    \n不同的 DBMS 在使用变量的过程上略有不同：\n\n*   **PostgreSQL** 历史上将变量限制在存储代码块（函数）内。然而，在版本 11\
    \ 中，他们引入了匿名（`DO`）代码块，允许你编写代码而无需存储该代码块。PostgreSQL 变量必须用数据类型声明。\n*   **MariaDB/MySQL**\
    \ 对变量最宽松，你无需在使用前声明变量。变量名以 `@` 符号为前缀。\n*   **MSSQL** 变量必须用数据类型声明。它们以 `@` 符号为前缀。\n\
    *   **Oracle** 变量用数据类型声明。\n\n    SQLite 不在此列，因为它不支持变量。SQLite 通常嵌入在宿主应用程序中。假设你正在为宿主应用程序编写编程代码，你可以在那里拥有所有你想要的额外变量和功能。\n\
    \n### 代码块\n\n如果你使用的客户端便于一次运行一条语句，你可能会发现在处理包含多条语句的代码块时会有点混乱。使用分隔符将你的代码块括起来会更容易处理。\n\
    \n对于不同的 DBMS，分隔符如下所示：\n\n```\n--  PostgreSQL\nDO $$\n...\nEND $$;\n--  MariaDB/MySQL\n\
    DELIMITER $$\n...\n$$\nDELIMITER ;\n--  MSSQL\nGO\n...\nGO\n--  Oracle\n/\n...\n\
    /\n```\n\n最终，你可能只是高亮显示所有代码行并一起运行它们。这就是我们在尝试以下代码时推荐的做法。不要尝试一次只运行一行。\n\n在下面的代码中，我们将执行第\
    \ 3 章中添加新销售的操作。然后，我们特意记录了新的销售 ID，以便在后续语句中使用。然而，这次我们将使用变量来存储中间值，以便我们可以在一个批处理中运行代码。\n\
    \n代码将大致遵循以下步骤：\n\n1.  设置要使用的数据。\n2.  插入销售记录。\n3.  将新的销售 ID 存入一个变量。\n4.  使用该销售\
    \ ID，插入销售项目。\n5.  使用该销售 ID，用它们的价格更新销售项目。\n6.  当然，还是使用该销售 ID，用总额更新新的销售记录。\n\n同时，我们还将设置几个其他变量：\n\
    \n*   一个存储客户 ID 的变量\n*   一个存储订购日期/时间的变量\n\n如果能有另一个变量来存储销售项目就更好了。然而，大多数 DBMS 不擅长在不增加定义自定义数据类型来完成这项工作的大量额外麻烦的情况下定义多值变量。在这里，我们试图保持简单。\n\
    \n接下来将是四个类似的版本，展示如何编写该代码块。\n\n### 更新后用于添加销售的代码\n\n以下代码块的大纲基本相同：\n\n*   定义变量\n\
    *   运行 `INSERT` 和 `UPDATE` 语句\n*   测试结果\n\n我们将讨论针对主要 DBMS 的代码。"
- fmt: '## Using Variables in PostgreSQL


    Originally, PostgreSQL wouldn’t let you do any of this outside a stored code block.
    From version 11 onward, you can use an **anonymous block**. If you’re working
    with an older version of PostgreSQL, then you’re out of luck.


    The anonymous block is defined between `DO ... END`:


    ```

    DO $$

    ...

    END $$ ;

    ```


    The `$$` code is used to allow multiple statements to be treated as a single block.
    That way, the semicolon doesn’t end up terminating the block prematurely.


    Variables are declared inside a `DECLARE` section:


    ```

    DO $$

    DECLARE

    cid INT := 42;

    od TIMESTAMP := current_timestamp;

    sid INT;

    END $$ ;

    ```


    The variable names can be anything you like, but you run the risk of competing
    with column names in the following code. Some developers prefix the names with
    an underscore (such as `_cid`).


    The `sid` variable is an integer which will be assigned later. The `cid` and `od`
    variables are for the customer id and ordered date/time. They are assigned from
    the beginning with the special operator `:=`.


    The code proper is inside a `BEGIN ... END` block. It will be all of the code
    you used in Chapter [3](#606708_1_En_3_Chapter.xhtml), but run together. The important
    part is that the variable `sid` is used to manage the new sale id:


    ```

    DO $$

    DECLARE

    cid INT := 42;

    od TIMESTAMP := current_timestamp;

    sid INT;

    BEGIN

    INSERT INTO sales(customerid, ordered)

    VALUES(cid, current_timestamp)

    RETURNING id INTO sid;

    INSERT INTO saleitems(saleid, bookid, quantity)

    VALUES

    (sid,123,3),

    (sid,456,1),

    (sid,789,2);

    UPDATE saleitems AS si

    SET price=(SELECT price FROM books AS b

    WHERE b.id=si.bookid)

    WHERE saleid=sid;

    UPDATE sales

    SET total=(SELECT sum(price*quantity)

    FROM saleitems WHERE saleid=sid)

    WHERE id=sid;

    END $$;

    ```


    The `sid` variable gets its value from the `RETURNING` clause in the first `INSERT`
    statement. From there on, it’s used in the remaining statements.


    You can test the results using


    ```

    SELECT * FROM sales ORDER BY id DESC;

    SELECT * FROM saleitems ORDER BY id DESC;

    ```


    You should see the new sale and sale items at the top.


    ## Using Variables in MariaDB/MySQL


    MariaDB/MySQL has the simplest approach to using variables. Outside of a stored
    function or procedure, you don’t declare the variables or their types: you just
    go ahead and use them.


    The other thing is that there’s no strong concept of an anonymous code block,
    so defining one is really more of an organizational thing. We’ll do that, even
    though it really makes no real difference:


    ```

    DELIMITER $$

    BEGIN

    END; $$

    DELIMITER ;

    ```


    First, we’ll assign a few variables:


    ```

    DELIMITER $$

    BEGIN

    SET @cid = 42;

    SET @od = current_timestamp;

    SET @sid = NULL;

    END; $$

    DELIMITER ;

    ```


    Variables are prefixed with the `@` character. This makes them a little more obvious
    and avoids possible conflict with column names.


    The statement `SET @sid = NULL;` is unnecessary. Since you don’t declare variables,
    we’ve included the statement just to make it clear that we’ll be using the `@sid`
    variable a little later.


    The whole code looks like this:


    ```

    DELIMITER $$

    BEGIN

    SET @cid = 42;

    SET @od = current_timestamp;

    SET @sid = NULL;    --  unnecessary; just to make clear

    INSERT INTO sales(customerid, ordered)

    VALUES(@cid, @od);

    SET @sid = last_insert_id();

    INSERT INTO saleitems(saleid,bookid,quantity)

    VALUES

    (@sid,123,3),

    (@sid,456,1),

    (@sid,789,2);

    UPDATE saleitems

    SET price=(SELECT price FROM books

    WHERE books.id=saleitems.bookid)

    WHERE saleid=@sid;

    UPDATE sales

    SET total=(SELECT sum(price*quantity)

    FROM saleitems WHERE saleid=@sid)

    WHERE id=@sid;

    END;

    $$

    DELIMITER ;

    ```


    Note the statement:


    ```

    SET @sid = last_insert_id();

    ```


    When you add a new row with an autogenerated primary key, you need to get the
    new value to use later. The `last_insert_id()` function fetches the most recent
    autogenerated value in the current session. You’ll notice that it doesn’t specify
    which table: that’s why you need to call it immediately after the `INSERT` statement.


    As you see, the rest of the code is generally the same as in Chapter [3](#606708_1_En_3_Chapter.xhtml),
    with the `@sid` variable used to manage the new sale id.


    You can test the results using


    ```

    SELECT * FROM sales ORDER BY id DESC;

    SELECT * FROM saleitems ORDER BY id DESC;

    ```


    You should see the new sale and sale items at the top.


    ## Using Variables in MSSQL


    MSSQL code can be written inside a block delimited with the `GO` keyword:


    ```

    GO

    ...

    GO

    ```


    The `GO` keyword isn’t actually a part of Microsoft’s SQL language (or any other
    SQL, for that matter). It’s actually an instruction to the client software to
    treat what’s inside as a single batch and to run it as such. Some clients allow
    you to indent the keyword, and some allow you to add semicolons and comments on
    the same line, but the safest thing is not to indent it and not add anything else
    to the line.


    Microsoft doesn’t have a block to declare variables, but it does have a statement.
    To declare three variables, you can use three statements:


    ```

    GO

    DECLARE @cid INT = 42;

    DECLARE @od datetime2 = current_timestamp;

    DECLARE @sid INT;

    GO

    ```


    or you can use a single statement with the variables separated by commas:


    ```

    GO

    DECLARE

    @cid INT = 42,

    @od datetime2 = current_timestamp,

    @sid INT;

    GO

    ```


    Variables are prefixed with the `@` character, which makes them easy to spot and
    easy to distinguish from column names.


    The `@sid` variable is an integer which will be assigned later.


    The rest of the code is similar to what we did in Chapter [3](#606708_1_En_3_Chapter.xhtml),
    but the new sale id will be managed in the `@sid` variable:


    ```

    GO

    DECLARE @cid INT = 42;

    DECLARE @od datetime2 = current_timestamp;

    DECLARE @sid INT;

    INSERT INTO sales(customerid,ordered)

    VALUES(@cid, @od);

    SET @sid = scope_identity();

    INSERT INTO saleitems(saleid,bookid,quantity)

    VALUES

    (@sid,123,3),

    (@sid,456,1),

    (@sid,789,2);

    UPDATE saleitems

    SET price=(SELECT price FROM books

    WHERE books.id=saleitems.bookid)

    WHERE saleid=@sid;

    UPDATE sales

    SET total=(SELECT sum(price*quantity)

    FROM saleitems WHERE saleid=@sid)

    WHERE id=@sid;

    GO

    ```


    The `@sid` variable gets its value from the `scope_identity()` function. You’ll
    notice that it doesn’t specify which table: that’s why you need to call it immediately
    after the `INSERT` statement. From there on, it’s used in the remaining statements.


    You can test the results using


    ```

    SELECT * FROM sales ORDER BY id DESC;

    SELECT * FROM saleitems ORDER BY id DESC;

    ```


    You should see the new sale and sale items at the top.'
