    ```

    UPDATE customers

    SET townid=(

    SELECT id FROM towns AS t

    WHERE t.name=customers.town

    AND t.postcode=customers.postcode

    AND t.state=customers.state

    );

    ```


    The `UPDATE` statement is used to change values in an existing table. You can
    set the value to a constant value, a calculated value, or, as in this case, a
    value from another table.


    Here, the same subquery is used to fetch the `id` that will be copied into the
    `townid` column.


    Some DBMSs allow you to alias the `customers` table, which would make the `UPDATE`
    statement a little simpler.


    A correlated subquery can be expensive, and it’s normally preferable to use a
    join if you can. We could have used a join for the `SELECT` statement, but not
    all DBMSs cooperate so well with `UPDATE` statements. Here, the subquery is intuitive
    and works well, and, since you’re only running this once, not too expensive.


    ### Remove the Old Address Columns


    Shortly, we will remove the old address columns, but that’s going to create an
    inconvenience later, since the town data is now in a separate table. That means
    we can’t get the customer’s details including the full address without joining
    the tables. To manage this inconvenience, it will be useful to create a view to
    combine the customer data with the town data.'
  trans: '

    # 列应当独立


    表格设计的基本原则之一是列之间应相互独立。也就是说，更改某一列不应必然影响另一列。


    然而，如果你查看客户地址：


    ```sql

    SELECT

    id, givenname, familyname,

    street, town, state, postcode

    FROM customers;

    ```


    你会发现一些地址列之间确实存在关系。


    | `Id` | `...` | `street` | `town` | `state` | `postcode` |

    | --- | --- | --- | --- | --- | --- |

    | 85 | z | 1313 Webfoot Walk | Kingston | ACT | 2604 |

    | 355 | ... | 345 Stonecave Road | Kingston | ACT | 2604 |

    | 147 | ... | Apartment 5A, 129 West 81st Street | Kingston | ACT | 2604 |

    | 112 | ... | 890 Fifth Avenue | Kingston | ACT | 2604 |

    | 489 | ... | Apartment 42, 2630 Hegal Place | Gordon | ACT | 2906 |

    | 592 | ... | 0001 Cemetery Lane | Rosebery | NSW | 1445 |

    | ~ 303 行 ~ |


    例如，如果你将地址从一个城镇更改为另一个，你很可能也需要更改 `postcode`，甚至可能还要改 `state`。除此之外，住在同一个城镇的人可能也有相同的
    `postcode`；他们肯定在同一个 `state`。


    这就带来了一个维护问题：


    *   更改地址需要为单次变更修改*三个*列。

    *   可能出现错误，只修改了部分数据；这会导致数据不一致，使得数据失效。


    正确的解决方案是将此数据移到另一个表中。


    ## 添加城镇表


    有一个名为 `towns.sql` 的 SQL 文件。它将创建并填充一个 `towns` 表。


    该表结构如下：


    ```sql

    CREATE TABLE towns (

    id INT PRIMARY KEY, --  自动编号

    name VARCHAR(...),

    state VARCHAR(...),

    postcode CHAR(4),

    UNIQUE(name,state,postcode)

    );

    ```


    该表还包括一个自动编号的 `id` 列，它是**主键**。主键是唯一标识一行的列。在这里，它是一个任意数字。具体细节将取决于你使用的 DBMS。


    虽然 `name`、`state` 和 `postcode` 可能存在重复，但它们的*组合*将是唯一的。


    前面的 `UNIQUE` 子句也会创建一个索引，这将使搜索表的速度更快。你稍后会了解更多关于索引的内容。


    你现在可以运行此脚本来创建并填充 `towns` 表。


    根据你的 DBMS，你可能需要确保将此表安装到正确的数据库中。


    ## 添加到城镇的外键


    下一步是在 `customers` 表中添加一列以引用 `towns` 表中的城镇。这通过 `ALTER` 语句完成：


    ```sql

    ALTER TABLE customers

    ADD townid INT

    CONSTRAINT fk_customers_town REFERENCES towns(id);

    ```


    请注意，`townid` 列必须与 `towns` 表中的 `id` 列的数据类型匹配，在本例中为整数。


    你会注意到它实际上没有使用 `FOREIGN KEY` 这个术语。是关键字 `REFERENCES` 使其成为外键：这里它引用了 `towns` 表中的一个
    `id`。


    你还会注意到使用 `CONSTRAINT fk_customers_town` 命名外键。每个约束实际上都有一个名称，但如果你愿意让 DBMS 为你生成一个名称，则不必自己命名。如果是这样，你可以使用更简短的形式：


    ```sql

    ALTER TABLE customers

    ADD townid INT REFERENCES towns(id);

    ```


    如果你已经有了该列，可以使用以下语句追溯添加外键约束：


    ```sql

    ALTER TABLE customers

    ADD CONSTRAINT fk_customers_town FOREIGN KEY(townid)

    REFERENCES towns(id);

    ```


    默认情况下，当你创建新列时，它将填充为 `NULL`。你本可以添加一个默认值，但在这种情况下是毫无意义的，因为每个人都住在不同的地方；在某些情况下，我们根本没有客户的地址。


    ## 更新客户表


    现在你有了外键列，你需要用对相应城镇的引用来填充它。


    如果你想查看这些外键应该是什么，可以使用子查询：


    ```sql

    SELECT

    id, givenname, familyname,

    town, state, postcode,    --  现有数据

    (SELECT id FROM towns AS t WHERE    --  新数据

    t.name=customers.town

    AND t.postcode=customers.postcode

    AND t.state=customers.state

    ) AS reference

    FROM customers;

    ```


    其中一些结果当然是 `NULL`，因为有些客户没有记录的地址。


    | `id` | `givenname` | `familyname` | `town` | `state` | `postcode` | `reference`
    |

    | --- | --- | --- | --- | --- | --- | --- |

    | 85 | Corey | Ander | Kingston | ACT | 2604 | 35 |

    | 355 | Joe | Kerr | Kingston | ACT | 2604 | 35 |

    | 147 | Aiden | Abet | Kingston | ACT | 2604 | 35 |

    | 112 | Jerry | Cann | Kingston | ACT | 2604 | 35 |

    | 489 | Justin | Case | Gordon | ACT | 2906 | 135 |

    | 592 | Paddy | Wagon | Rosebery | NSW | 1445 | 386 |

    | ~ 303 行 ~ |


    子查询是嵌套在查询内部的查询。在这种情况下，它是一种从另一个表中查找内容的简单方法。


    此子查询是一个*关联*子查询：它针对主查询中的每一行运行，使用主查询中的值与子查询进行比较。这通常是一种开销较大的查询类型，但我们不会经常使用它。它对下一步也很有用。


    你稍后将了解更多关于子查询的内容。


    请注意，我们在子查询中为 `towns` 表起了别名；这是为了使代码更易于阅读和编写。你也可以为 `customers` 表起别名，但这在下一步中并非所有
    DBMS 都适用。


    我们不仅仅想查看引用：我们想将引用复制到 `customers` 表中。你可以使用 `UPDATE` 语句来完成：


    ```sql

    UPDATE customers

    SET townid=(

    SELECT id FROM towns AS t

    WHERE t.name=customers.town

    AND t.postcode=customers.postcode

    AND t.state=customers.state

    );

    ```


    `UPDATE` 语句用于更改现有表中的值。你可以将值设置为常量值、计算值，或者如本例所示，来自另一个表的值。


    这里，使用相同的子查询来获取将被复制到 `townid` 列中的 `id`。


    一些 DBMS 允许你为 `customers` 表起别名，这会使 `UPDATE` 语句稍微简单一些。


    关联子查询可能开销较大，通常如果可能，最好使用连接（join）。我们本可以在 `SELECT` 语句中使用连接，但并非所有 DBMS 与 `UPDATE`
    语句配合得那么好。这里，子查询直观且效果良好，而且由于你只运行一次，开销不算太大。


    ## 移除旧的地址列


    很快，我们将移除旧的地址列，但这将在以后造成不便，因为城镇数据现在在另一个单独的表中。这意味着如果不连接表，我们就无法获取包含完整地址的客户详细信息。为了管理这种不便，创建一个视图来组合客户数据和城镇数据将很有用。

    '
- fmt: '#### Create a customerdetails View


    A view is a saved query which we can use as a virtual table. In this view, we
    will simply add all of the columns from the `customers` table except for the town
    data. For the town data, we will need to join to the `towns` table.


    First, we try things out with a simple `SELECT` statement:


    ```sql

    SELECT

    c.id, c.email, c.familyname, c.givenname,

    c.street,

    --  original values

    c.town, c.state, c.postcode,

    c.townid,

    --  from towns table

    t.name AS town, t.state, t.postcode,

    c.dob, c.phone, c.spam, c.height

    FROM customers AS c LEFT JOIN towns AS t ON c.townid=t.id;

    ```


    If you’re doing this in Oracle, remember that you can’t use `AS` for the table
    aliases:


    ```sql

    SELECT

    ...

    FROM customers c LEFT JOIN towns t ON c.townid=t.id;

    ```


    Note that


    *   We use the `LEFT JOIN` to include customers without an address.

    *   We alias the `customers` and `towns` tables for convenience.

    *   The `towns` table has a `name` column, instead of the `town` column. However,
    in the context of the query, it makes sense to alias it to `town`.

    *   We’ve also included the `c.townid` column, which, though it’s redundant, might
    make it easier to maintain.


    Once you have checked that the `SELECT` statement does the job, you can create
    a view. Of course, you should leave out the old town data, since the whole point
    is to use the data from the joined data:


    ```sql

    CREATE VIEW customerdetails AS

    SELECT

    c.id, c.email, c.familyname, c.givenname,

    c.street,

    --  leave out the c.town, c.state, c.postcode

    c.townid, t.name AS town, t.state, t.postcode,

    c.dob, c.phone, c.spam, c.height

    FROM customers AS c LEFT JOIN towns AS t ON c.townid=t.id;

    ```


    In Microsoft SQL, you need to wrap the `CREATE VIEW` statement between a pair
    of `GO` keywords:


    ```sql

    --  MSSQL:

    GO

    CREATE VIEW customerdetails AS

    SELECT

    c.id, c.email, c.familyname, c.givenname,

    c.street,

    c.townid, t.name as town, t.state, t.postcode,

    c.dob, c.phone, c.spam, c.height

    FROM customers AS c LEFT JOIN towns AS t ON c.townid=t.id;

    GO

    ```


    You will learn more about views later.


    #### Drop the Address Columns


    To drop the old address columns, you should be able to run the following:


    ```sql

    --  PostgreSQL, MySQL / MariaDB

    ALTER TABLE customers

    DROP COLUMN town, DROP COLUMN state, DROP COLUMN postcode;

    --  Oracle: not DROP COLUMN

    ALTER TABLE customers DROP (town, state, postcode);

    --  SQLite: You need to drop one column at a time

    ALTER TABLE customers DROP COLUMN town;

    ALTER TABLE customers DROP COLUMN state;

    ALTER TABLE customers DROP COLUMN postcode;

    --  MSSQL: Doesn’t work (yet)

    ALTER TABLE customers

    DROP COLUMN town, state, postcode;

    ```


    Here, we use `DROP COLUMN` which removes one or more columns and, of course, all
    of their data, so you would want to be sure that you don’t need it anymore. As
    you’ve seen earlier, there are some variations in the syntax between DBMSs.


    In Microsoft SQL, you will get an error that you can’t drop the `postcode` column
    because there is an existing constraint. A constraint is an additional rule for
    a valid value.


    In this case, there is a constraint called `ck_customers_postcode` which requires
    that postcodes comprise four digits only. You won’t need that constraint now,
    especially since you’re going to remove the column.


    To remove the constraint, run


    ```sql

    --  MSSQL

    ALTER TABLE customers

    DROP CONSTRAINT ck_customers_postcode;

    ```


    Once you have successfully removed the constraint, you can now remove the columns:


    ```sql

    ALTER TABLE customers DROP COLUMN town, state, postcode;

    ```


    You will now have removed the extraneous address columns.


    Remember, if you drop the wrong column, it is very tricky or impossible to get
    it back.


    ### Changing the Town


    Of course, the whole point of the exercise is you should now be able to move to
    another town with a single change. We’ll try this with customer `42`.


    First, find the address of customer `42`, and, in particular, note the `townid`:


    ```sql

    SELECT * FROM customerdetails WHERE id=42;

    ```


    You’ll get something like this:


    | `id` | `...` | `townid` | `town` | `State` | `postcode` | `...` |

    | --- | --- | --- | --- | --- | --- | --- |

    | 42 | ... | 846 | Kings Park | NSW | 2148 | ... |


    Note that we’re reading from the `customerdetails` view, because the town data
    is no longer in the `customers` table, though the `townid` is.


    Now, change the customer’s `townid` to anything you like (as long as it’s no more
    than the highest id in the `towns` table):


    ```sql

    UPDATE customers SET townid=12345 WHERE id=42;

    ```


    If you now check the same customers:


    ```sql

    SELECT * FROM customerdetails WHERE id=42;

    ```


    you’ll get something like this:


    | `id` | `...` | `townid` | `town` | `State` | `postcode` | `...` |

    | --- | --- | --- | --- | --- | --- | --- |

    | 42 | ... | 12345 | Swan Marsh | VIC | 3249 | ... |


    If you like, you can set it back to its original value.


    Here, we’ve set the `townid` in the `customers` table, which is where it belongs.


    Some DBMSs allow you to take a slightly indirect approach to changing this value
    and change it via the view:


    ```sql

    --  Not PostgreSQL or SQLite:

    UPDATE customerdetails SET townid = ... WHERE id=42;

    ```


    As you see, this doesn’t include PostgreSQL or SQLite.


    Of course, you can’t really update a view because it’s really just a `SELECT`
    statement and doesn’t contain any data. Instead, the DBMS tries to work out which
    table the particular column belongs to and passes the change on to the table.
    There are times when it can’t work that out, such as when you try to update a
    calculated column. In that case, the update will fail, and you’ll have to update
    the table directly.'
