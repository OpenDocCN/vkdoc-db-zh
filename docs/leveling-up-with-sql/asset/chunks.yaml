    这又遇到了前面提到的与 `UNION` 版本相关的两个问题。为了解决第二个问题，即排序顺序问题，我们可以使用 `grouping(column)` 函数，它指示被汇总列的层级。值为
    `1` 表示这是一个汇总行，`0` 表示不是。这将与前面虚构的层级列具有相同的效果：


    ```sql

    --  ROLLUP(...):      PostgreSQL, MSSQL, Oracle

    SELECT state, id, ordered, count(*), sum(total)

    FROM salesdata

    GROUP BY ROLLUP (state,id,ordered)

    ORDER BY grouping(state), state, grouping(id), id,

    grouping(ordered), ordered;

    --  ... WITH ROLLUP: MySQL, MSSQL

    --  (MariaDB 不支持 grouping())

    SELECT state, id, ordered, count(*), sum(total)

    FROM salesdata

    GROUP BY state,id,ordered WITH ROLLUP

    ORDER BY grouping(state), state, grouping(id), id,

    grouping(ordered), ordered;

    ```


    您将获得一个排序更好的表。


    请注意，虽然 MySQL 支持 `grouping()`，但 MariaDB *不支持* `grouping()` 函数！


    在 PostgreSQL 和 MySQL 中，您可以在多个列上使用 `grouping()`。这将给出一个组合层级，它是 `1` 和 `0` 的二进制组合。在
    MSSQL 和 Oracle 中，您需要使用 `grouping_id()` 函数来实现这一点。


    为了解决第一个问题，即无意义的 `NULL` 标记问题，我们必须对 `SELECT` 子句进行更有创意的处理。在这种情况下，我们可以使用 `coalesce`
    来选取 `NULL` 并提供替代值：


    ```sql

    --  PostgreSQL, MSSQL;

    SELECT

    coalesce(state,''National Total'') AS state,

    coalesce(cast(id as varchar),state||'' Total'') AS id,

    coalesce(ordered,''Total for ''||cast(id as varchar))

    AS ordered,

    count(*), sum(total)

    FROM salesdata

    GROUP BY ROLLUP (state,id,ordered)

    ORDER BY grouping(state), state,

    grouping(id), id, grouping(ordered), ordered;

    --  MySQL, MSSQL (MariaDB 不支持 grouping())

    SELECT

    coalesce(state,''National Total'') AS state,

    coalesce(cast(id as varchar),state||'' Total'') AS id,

    coalesce(ordered,''Total for ''||cast(id as varchar))

    AS ordered,

    count(*), sum(total)

    FROM salesdata

    GROUP BY state,id,ordered WITH ROLLUP

    ORDER BY grouping(state), state,

    grouping(id), id, grouping(ordered), ordered;

    --   NOT Oracle

    ```


    这将为您在汇总行提供一些有意义的内容。


    ### 在 Oracle 中重命名值


    您会注意到这对 Oracle 无效。在这方面，Oracle 被证明是无帮助的，因为 (a) `NULL` 字符串等同于空字符串 (`''''`)，因此它们不会合并，(b)
    所选列不再被认为匹配 `GROUP BY` 子句，以及 (c) 当您进行了其他更改后，在使用 `grouping()` 函数排序时也会遇到问题。


    使其工作的最直接方法是对列使用 `CASE` 表达式：


    ```sql

    SELECT

    coalesce(state,''National Total'') AS state,

    grouping(state) AS statelevel,

    CASE

    WHEN state IS NULL THEN NULL

    WHEN id IS NULL THEN ''Total for ''||state

    ELSE cast(id AS varchar(3))

    END AS id,

    grouping(id) AS idlevel,

    CASE

    WHEN id IS NULL THEN NULL

    WHEN ordered IS NULL THEN

    ''Total for ''||cast(id as varchar(3))

    ELSE ordered

    END AS ordered,

    grouping(ordered) AS orderedlevel,

    count(*) AS count, sum(total) AS sum

    FROM salesdata

    GROUP BY ROLLUP (state,id,ordered)

    ORDER BY statelevel, state, idlevel, id, orderedlevel, ordered

    ;

    ```


    它看起来像这样：


    | **state** | statelevel | **id** | idlevel | **ordered** | orderedlevel | **count**
    | **sum** |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | ACT | 0 | 112 | 0 | 2022-07 | 0 | 2 | 72 |

    | ACT | 0 | 112 | 0 | 2022-08 | 0 | 2 | 78 |

    | ACT | 0 | 112 | 0 | 2022-09 | 0 | 1 | 49 |

    | ACT | 0 | 112 | 0 | 2022-10 | 0 | 1 | 70.5 |

    | ACT | 0 | 112 | 0 | 2022-11 | 0 | 1 | 94 |

    | ACT | 0 | 112 | 0 | 2022-12 | 0 | 4 | 224 |

    | ACT | 0 | 112 | 0 | 2023-01 | 0 | 1 | 48.5 |

    | ACT | 0 | 112 | 0 | 2023-02 | 0 | 5 | 320 |

    | ACT | 0 | 112 | 0 | 2023-03 | 0 | 2 | 191.5 |

    | ACT | 0 | 112 | 0 | 2023-05 | 0 | 1 | 125 |

    | ACT | 0 | 112 | 0 | Total for 112 | 1 | 20 | 1272.5 |

    | ACT | 0 | 147 | 0 | 2022-08 | 0 | 8 | 392 |

    | ACT | 0 | 147 | 0 | 2022-09 | 0 | 2 | 199.5 |

    | ACT | 0 | 147 | 0 | 2022-10 | 0 | 2 | 162 |

    | ACT | 0 | 147 | 0 | 2022-11 | 0 | 3 | 228.5 |

    | ACT | 0 | 147 | 0 | 2022-12 | 0 | 3 | 251 |

    | ~ 2077 行 ~ |


    这里，`grouping()` 函数在 `SELECT` 子句中使用，然后用于排序。`id` 和 `ordered` 列使用 `CASE ... END`
    表达式计算，以解决 `NULL` 字符串的问题。


    当然，现在您有那三个用于排序的额外列。要隐藏它们，您可以使用 CTE：


    ```sql

    WITH cte AS (

    -- 上面的 SELECT 语句

    --  无需包含 ORDER BY 子句

    )

    SELECT state, id, ordered, count, sum

    FROM cte

    ORDER BY statelevel, state, idlevel, id, orderedlevel, ordered

    ;

    ```


    顺便说一下，前面的语句包含了 `ORDER BY` 子句。您可以将其包含在 CTE 中（在 MSSQL 中不行），但这是不必要的，因为我们在主查询中无论如何都会进行排序，所以您应该省略它。


    ### 直方图、平均值、众数和中位数


    您可能在学校学过一些简单的统计知识。以下是一些基本概念的提醒：


    *   **频数表** 是值及其出现频率的表格。

    *   **平均值**，或更专业地称为 **算术平均数**，就是我们通常所说的 **平均值**：它是总和除以值的个数。

    *   **众数** 是出现最频繁的值。

    *   **中位数** 是值的中间值（如果它们都按顺序排列）。


    您可以使用频数表生成 **直方图**，这就是电子表格程序所说的条形图。例如，您可以生成按身高（厘米）划分的客户数量的频数表和直方图。它看起来像图 5-4。


    ![](img/606708_1_En_5_Fig4_HTML.jpg)


    直方图说明了正态分布。大多数值落在 166 到 177 之间。


    图 5-4


    直方图


    如果您的值基于多个不同的因素，它们倾向于沿着众所周知的“钟形曲线”分布。大多数值出现在中间附近，离中间越远，值出现的频率就越低。这更专业地称为 **正态分布**。


    您的身高取决于许多因素，其中一些包括遗传、饮食和其他生活方式因素。因此，正如您在上图中看到的那样，客户身高往往遵循正态分布。当然，如果我们有更大的数据集合，这种趋势会变得更强：如果只有几百个样本，那么数据就不会那么紧密地拟合。


    出于本次讨论的目的，我们将重点讨论客户身高，因为它们往往更容易以这种方式进行分析。


    尽管样本数据是随机的，但它是按照小样本中可能预期的正态分布生成的。


    对于澳大利亚成年人，平均身高约为 168.7 厘米。实际上，有两个平均身高，一个是成年女性，一个是成年男性，但两者的平均值是 168.7 厘米。标准差是 7
    厘米。您可以在 [`https://en.wikipedia.org/wiki/Average_human_height_by_country`](https://en.wikipedia.org/wiki/Average_human_height_by_country)
    获取更多信息。'
- fmt: '### Calculating the Mean


    In statistics and mathematics, the word “average” is a little vague, as there
    are many measurements which can describe an average. The one we’re interested
    in here is called arithmetic mean. You already have the mean as a built-in aggregate
    function `avg()`:


    ```sql

    SELECT avg(height) AS mean FROM customers;

    ```


    You’ll get something like this:


    | **mean** |

    | 170.844 |


    If you want, you can calculate the mean using `sum(height)/count(height)`, but
    there’s no point other than to show they’re the same.


    This figure is fairly reasonable. The mean height for adults is about 168.7 cm.


    ### Generating a Frequency Table


    A frequency table lists how many times a value appears in the table. If that sounds
    suspiciously like something you’ve done before, you’re right. That’s just using
    a `GROUP BY` with `count(*)`.


    First, however, we need to make the data more groupable. If the data is too fine,
    you won’t get many duplicates—the irony is that there can be too much detail to
    summarize.


    Here, the heights are measured to 0.1 of a centimeter. We’ll prepare it by rounding
    it off to whole centimeters:


    ```sql

    SELECT floor(height+0.5) AS height

    FROM customers

    WHERE height IS NOT NULL;

    ```


    We’ve also filtered out the missing heights to give you


    | **Height** |

    | 169 |

    | 171 |

    | 153 |

    | 176 |

    | 156 |

    | 176 |

    | ~ 267 rows ~ |


    We could possibly have used a `round()` function to do the rounding off, but some
    DBMSs prefer to round to the nearest even number, so the preceding method will
    do more reliably.


    Putting the data into a CTE, we can then use a simple `GROUP BY` query:


    ```sql

    WITH heights AS (

    SELECT floor(height+0.5) AS height

    FROM customers

    WHERE height IS NOT NULL

    )

    SELECT height, count(*) AS frequency

    FROM heights

    GROUP BY height

    ORDER BY height;

    ```


    This will get you


    | **Height** | **frequency** |

    | --- | --- |

    | 153 | 1 |

    | 154 | 3 |

    | 156 | 1 |

    | 157 | 3 |

    | 158 | 1 |

    | 159 | 2 |

    | ~ 36 rows ~ |


    Note that there may be some missing values. That’s natural, especially in a relatively
    small sample such as we have. However, with these gaps it’s not quite ready for
    a histogram. Later, when we have a closer look at recursive common table expressions,
    we’ll see how to fill in the gaps.


    ### Calculating the Mode


    The mode is the value which occurs most often. Actually, there may be more than
    one mode which tie for first.


    To get the mode(s), you first need to get the frequencies and then find the maximum
    frequency. In principle, you’re looking for `max(count(*))`, but you can’t nest
    aggregate functions like that. That means taking an extra step, which, in turn,
    means more CTEs.


    Starting with the previous frequency table, we can put the results in another
    CTE:


    ```sql

    WITH

    heights AS (

    SELECT floor(height+0.5) AS height

    FROM customers

    WHERE height IS NOT NULL

    ),      --  don''t forget to add a comma here

    frequency_table AS (

    SELECT height, count(*) AS frequency

    FROM heights

    GROUP BY height

    )

    ...

    ```


    You’ll also need the maximum frequency, which has to be calculated as a separate
    step:


    ```sql

    WITH

    heights AS (

    ...

    ),

    frequency_table AS (

    ...

    ),      --  don''t forget to add a comma here

    limits AS (

    SELECT max(frequency) AS max FROM frequency_table

    )

    ...

    ```


    Finally, you can cross join the frequency table to the `limits` CTE to find the
    mode(s):


    ```sql

    WITH

    heights AS (

    ...

    ),

    frequency_table AS (

    ...

    ),

    limits AS (

    ...

    )

    SELECT height, frequency

    FROM frequency_table,limits

    WHERE frequency_table.frequency=limits.max

    ORDER BY height;

    ```


    You’ll get something like this:


    | **Height** | **frequency** |

    | --- | --- |

    | 172 | 22 |


    In a perfect set of normal data, the mode should match the mean exactly. In real
    life, it should be close.


    ### Calculating the Median


    The median is the middle value. What that means is that half of the values should
    be below the median and half should be above.


    To find the median involves putting all of the values in order and finding the
    midpoint. You can do this if you like, but that involves some skills we haven’t
    developed yet, in particular getting the row number. We’ll look at that later
    in the chapter on window functions.


    Fortunately, modern SQL includes a function called `percentile_cont`. Unfortunately,
    not all DBMSs use it the same way, and SQLite doesn’t support it at all.


    The `percentile_cont()` function finds the value by its percentile. A percentile
    is a grouping of 100 groups. The 50th percentile would be in the middle.


    To find the median in PostgreSQL:


    ```sql

    --  PostgreSQL: aggregate function only

    SELECT percentile_cont(0.5)

    WITHIN GROUP (ORDER BY height)

    FROM customers

    WHERE height IS NOT NULL;

    ```


    This should give something like


    | **percentile_cont** |

    | 171.2 |


    As noted in the comment, in PostgreSQL `percentile_cont()` is an aggregate function
    only, which is exactly what we want anyway.


    What’s the alternative to an aggregate function? It’s one of those window functions
    which we’ll be looking at later. A window function is like an aggregate function,
    except that it’s calculated for every row, not just as a summary.


    With the window function version, we can use


    ```sql

    --  MySQL / MariaDB, MSSQL, Oracle: window function only

    SELECT percentile_cont(0.5)

    WITHIN GROUP (ORDER BY height) OVER()

    FROM customers

    WHERE height IS NOT NULL;

    ```


    The problem is that you’ll get the same value for multiple rows. To finish the
    job, you can use `DISTINCT`:


    ```sql

    --  MySQL / MariaDB, MSSQL, Oracle: window function only

    SELECT DISTINCT percentile_cont(0.5)

    WITHIN GROUP (ORDER BY height) OVER()

    FROM customers

    WHERE height IS NOT NULL;

    ```


    This will now give you the median.


    ### The Standard Deviation


    The standard deviation is a measure of how varied the data is. For the normal
    distribution, about 68% of the results should fall within one standard deviation
    of the mean.


    A lower than expected standard deviation would indicate that the results are fairly
    close together, while a higher than standard deviation would indicate that the
    results are more random than expected. In either case, you would suspect that
    the data is biased—either by how the data was selected or suggesting that some
    of it was made up.


    For example, if the heights were normally distributed, you’d find that one standard
    deviation amounts to 7 cm and that 68% of the customers should be within 7 cm
    on either side of the mean.


    To calculate the standard deviation, SQL has a simple aggregate function, which
    you have already seen earlier.


    You might wonder why there are two. If you know that you have all the values,
    you could use `stddev_pop(height)` (or `stdevp(height)` for MSSQL). However, we
    don’t, so we can regard what we do have as a sample. For that, we use `stddev_samp(height)`
    (or `stdev(height)` for MSSQL):


    ```sql

    SELECT

    stddev_pop(height) AS sd

    --  stdevp(height) AS sd        --  MSSQL

    FROM customers;

    ```


    You should get something close to 7:


    | **Sd** |

    | 6.979 |


    Remember that the standard deviation only has meaning when you believe that the
    underlying data follows a normal distribution.


    ## Summary


    In this chapter, we had a look at aggregating sets of data.


    ### Basic Aggregate Functions


    The basic aggregate functions are


    *   `count()`, which counts the number of values in a column or rows in a table.


    *   `sum` and `avg`, which add or average numbers in a column.


    *   `max` and `min`, which find the lowest and highest values of any type of column.
    In effect, they find the first and last values when sorted by that column.


    *   `stddev`, `stddev_samp`, `stddev_pop` (PostgreSQL, MySQL/MariaDB, Oracle)
    `stdev`, `stdevp` (MSSQL). This calculates a population or standard deviation
    of a column of numbers; we assume that the data is normally distributed.


    The `sum`, `avg`, and standard deviation functions can only be applied to numeric
    data.'
