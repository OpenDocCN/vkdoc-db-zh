  trans: "\n### 使用递归 CTE 实现多级层级结构\n\n我们真正需要的不只是直接上级，而是每位员工的所有上级组成的层级列表。这当然需要使用递归 CTE。\n\
    \n锚定成员将是那些没有上级的员工，通常是位于层级结构顶端的人员：\n\n```sql\nWITH RECURSIVE      --  MSSQL, Oracle:\
    \ 不用 RECURSIVE\ncte(id, givenname, familyname, supervisorid,\nsupervisors, n)\
    \ AS (\n--  锚定成员\nSELECT\n    id, givenname, familyname, supervisorid, '', 1\n\
    \    FROM employees WHERE supervisorid IS NULL\n)\n```\n\n这些列包含部分原始详细信息，以及一个上级字符串。显然，对于锚定成员，上级\
    \ ID 将是`NULL`，字符串为空。你还会注意到一个从 1 开始的序列号。这是我们稍后会用到的一个技巧。\n\n锚定成员可能有多行。这没关系，处理方式仍然相同。只是会启动多个序列。\n\
    \n递归成员将是那些有上级的员工（即其余员工），其上级列表会逐渐增长：\n\n```sql\n--  目前尚不支持 MSSQL 或 MariaDB/MySQL!\n\
    WITH RECURSIVE  --  MSSQL, Oracle: 不用 RECURSIVE\ncte(id, givenname, familyname,\
    \ supervisorid,\nsupervisors, n) AS (\n--  锚定成员\n    SELECT\n        id, givenname,\
    \ familyname, supervisorid, '', 1\n        FROM employees WHERE supervisorid IS\
    \ NULL\nUNION ALL\n--  递归成员：其他员工（supervisorid 不为 NULL）\n    SELECT\n        e.id,\
    \ e.givenname, e.familyname, e.supervisorid,\n        cte.givenname||' '||cte.familyname||'\
    \ < '||\n        cte.supervisors, n+1\n        FROM cte JOIN employees AS e ON\
    \ cte.id=e.supervisorid\n        --  Oracle: 不用 AS\n)\nSELECT * FROM cte\nORDER\
    \ BY id;\n```\n\n这个连接类似于之前的自连接。当前员工在`e`表别名中引用，这个别名表与 CTE（代表上级）进行连接。原始数据来自别名表，而上级的详细信息则被拼接为新的`supervisors`参数。\n\
    \n通常，你会希望用`WHERE`子句来限制递归。对于这个例子，连接本身就会完成这项工作，因为当没有更多可以连接的行时，它会自动停止。\n\n关键在于`supervisors`字符串的表达式。在递归成员中，CTE\
    \ 代表继承的值。\n\n| **id** | **givenname** | **familyname** | **sid** | **supervisors**\
    \ | **n** |\n| --- | --- | --- | --- | --- | --- |\n| 1 | Marmaduke | Mayhem |\
    \ 10 | Beryl Bubbles < Mildred Thisenth ... < | 3 |\n| 2 | Osric | Pureheart |\
    \ 12 | Mildred Thisenth ... < | 2 |\n| 3 | Rubin | Croucher | [NULL] | [NULL]\
    \ | 1 |\n| 4 | Gladys | Raggs | 29 | Fred Nurke < Murgatroyd Murdo ... < Rubin\
    \ Croucher < | 4 |\n| 5 | Cynthia | Hyphen-Smythe | 12 | Mildred Thisenth ...\
    \ < | 2 |\n| 6 | Sebastian | Trefether | 5 | Cynthia Hyphen-S ... < Mildred Thisenth\
    \ ... < | 3 |\n| ~ 共 34 行 ~ |\n\n这在大多数数据库管理系统中都有效，但目前还不支持 MSSQL 或 MariaDB/MySQL。不过，它已经`接近`能用了。\n\
    \n对于 MariaDB/MySQL，锚定成员中的`''`会导致它推断该字符串长度为零，因此`supervisors`列将为空。\n\n你需要在锚定成员中将空字符串转换（cast）为更长的字符串：\n\
    \n```sql\nSELECT\n    ..., cast('' AS char(255)), 1\n    FROM employees WHERE\
    \ supervisorid IS NULL\n```\n\nMySQL 的一个长期问题是，你不能转换为`varchar`，而是转换为`char`，而这个`char`与常规的`char`不同，它不是固定长度的，所以实际上还是`varchar`。没人知道为什么。在\
    \ MariaDB 中，他们允许使用`varchar`。长度`255`应该足够了。\n\nMSSQL 的情况更糟。自然，锚定成员和递归成员中的列应该在数据类型上匹配，但在\
    \ MSSQL 中，这种匹配需要非常精确。两者都是字符串类型还不够。字符串需要是相同类型和大小。拼接字符串会产生更长的字符串，MSSQL 会判定这些更长的字符串与其它字符串在数据上不兼容。\n\
    \n在这种情况下，你需要将*两个*表达式都转换为相同类型：\n\n```sql\nSELECT\n    ..., cast('' AS nvarchar(255)),\
    \ ...\n    FROM employees WHERE supervisorid IS NULL\nUNION ALL\nSELECT\n    ...,\n\
    \    cast(cte.givenname+' '+cte.familyname\n         +' < '+cte.supervisors as\
    \ nvarchar(255)), ...\n    FROM cte JOIN employees AS e ON cte.id=e.supervisorid\n\
    ```\n\n进行这些更改后，查询应该就能工作了。\n\n### 清理列表末尾的多余字符\n\n你会注意到，除了空的`supervisors`字符串外，末尾还有一个`<`。这是因为在递归成员中总是添加了这个字符。\n\
    \n如果你查看`n`列，会发现它代表层级编号。这个字符应该只在已经存在另一个上级时才添加——也就是说，当我们正在添加第二个或后续的上级时。这意味着当`n`达到\
    \ 2 或更高时。\n\n我们可以通过使用`CASE ... END`表达式来修改这部分表达式：\n\n```sql\n--  其他数据库\ncte.givenname||'\
    \ '||cte.familyname\n||  CASE WHEN n>1 THEN ' < ' ELSE '' END\n    || cte.supervisors\n\
    ```\n\n这样会产生更清晰的结果：\n\n| **id** | **givenname** | **familyname** | **Sid** | **supervisors**\
    \ | **n** |\n| --- | --- | --- | --- | --- | --- |\n| 1 | Marmaduke | Mayhem |\
    \ 10 | Beryl Bubbles < Mildred Thisenth ... | 3 |\n| 2 | Osric | Pureheart | 12\
    \ | Mildred Thisenth ... | 2 |\n| 3 | Rubin | Croucher | [NULL] | [NULL] | 1 |\n\
    | 4 | Gladys | Raggs | 29 | Fred Nurke < Murgatroyd Murdo ... < Rubin Croucher\
    \ | 4 |\n| 5 | Cynthia | Hyphen-Smythe | 12 | Mildred Thisenth ... | 2 |\n| 6\
    \ | Sebastian | Trefether | 5 | Cynthia Hyphen-S ... < Mildred Thisenth ... |\
    \ 3 |\n| ~ 共 34 行 ~ |\n\n当然，我们不再需要最后的`n`列了。\n"
- fmt: "# Working with Table Literals\n\nAt some point, you might want to work with\
    \ a set of values which haven’t been saved anywhere—something in a virtual table\
    \ which stays around long enough for you to process the data and then discreetly\
    \ vanishes when you’ve finished.\n\nIn principle, SQL does that all the time when\
    \ you insert literal values into a table. For example, a statement like\n\n```sql\n\
    INSERT INTO table(columns)\nVALUES ( ... ), ( ... ), ( ... );\n```\n\ninserts\
    \ from a virtual table, generated by the `VALUES` clause. That also means that,\
    \ in principle, you should be able to use `VALUES ...` as a virtual table without\
    \ actually inserting anything. Unfortunately, it’s not quite so straightforward.\n\
    \nA `table literal` is an expression which results in a collection of rows and\
    \ columns—a virtual table. If things go according to plan, it could look like\
    \ this:\n\n```sql\nVALUES ('a','apple'), ('b','banana'), ('c','cherry')\n```\n\
    \nNot all DBMSs see it that way. Some DBMSs do allow just such an expression,\
    \ but others have something a little more complicated.\n\nA little later, we’ll\
    \ want to work with a virtual table to experiment with, so the first step will\
    \ be to put this into a `CTE`. Using the standard notation, you can use\n\n```sql\n\
    --  PostgreSQL, MariaDB (not MySQL), SQLite\nWITH cte(id,value) AS (\n  VALUES\
    \ ('a','apple'), ('b','banana'), ('c','cherry')\n)\nSELECT * FROM cte;\n```\n\n\
    You’ll see the following:\n\n| id | value |\n| --- | --- |\n| a | apple |\n| b\
    \ | banana |\n| c | cherry |\n\nNote that we’ve included the column names in the\
    \ `CTE` name.\n\nFor the other DBMSs, there are various alternatives:\n\n```sql\n\
    --  MSSQL\nWITH cte(id,value) AS (\n  SELECT * FROM\n    (VALUES ('a','apple'),\
    \ ('b','banana'),\n      ('c','cherry')) AS sq(a,b)\n)\nSELECT * FROM cte;\n```\n\
    ```sql\n--  MySQL (not MariaDB)\nWITH cte(id,value) AS (\n  VALUES ROW('a','apple'),\
    \ ROW('b','banana'),\n    ROW('c','cherry')\n)\nSELECT * FROM cte;\n```\n```sql\n\
    --  Oracle\nWITH cte(id,value) AS (\n  SELECT 'a','apple' FROM dual\n  UNION ALL\
    \ SELECT 'b','banana' FROM dual\n  UNION ALL SELECT 'c','cherry' FROM dual\n)\n\
    SELECT * FROM cte;\n```\n\nAs you see, the prize for the most awkward version\
    \ goes to Oracle, which doesn’t yet support a proper `table literal`. Apparently,\
    \ that’s coming soon.\n\n`MSSQL` does support a `table literal`, but, for some\
    \ unknown reason, it has to be inside a subquery, complete with a dummy subquery\
    \ name and dummy column names.\n\n`MySQL` also supports a `table literal`, but\
    \ requires each row inside a `ROW()` constructor, because `MySQL` has a non-standard\
    \ `values()` function which conflicts with using it simply as a `table literal`.\
    \ This is one of the cases where `MariaDB` and `MySQL` are not the same.\n\n##\
    \ Using a Table Literal for Testing\n\nOne reason you might want throwaway values\
    \ is if you’re testing something, and you haven’t the energy to put the test value\
    \ in a real or temporary value.\n\nFor example, suppose you want to test calculating\
    \ the difference between dates, so for finding an age. You could do something\
    \ like this:\n\n```sql\nWITH dates(dob,today) AS (\n  --  list of dob and today\
    \ values\n)\nSELECT\n  --  today - dob AS age\nFROM dates;\n```\n\nThe actual\
    \ code is commented out, because the DBMSs all have their own ways. It gets further\
    \ complicated because of the date literals.\n\nWe’re going to try this with the\
    \ following series of dates:\n\n| `dob` | `today` |\n| --- | --- |\n| 1940-07-07\
    \ | 2023-01-01 |\n| 1943-02-25 | 2023-01-01 |\n| 1942-06-18 | 2023-01-01 |\n|\
    \ 1940-10-09 | 2023-01-01 |\n| 1940-07-07 | 2022-12-31 |\n| 1943-02-25 | 2022-12-31\
    \ |\n| 1942-06-18 | 2022-12-31 |\n| 1940-10-09 | 2022-12-31 |\n| 1940-07-07 |\
    \ 2023-07-07 |\n| 1943-02-25 | 2023-02-25 |\n| 1942-06-18 | 2023-06-18 |\n| 1940-10-09\
    \ | 2023-10-09 |\n\n(If you recognize the dates of birth, don’t let on.)\n\nFirst,\
    \ you’ll need to set up your `dates` `CTE`. This is complicated by the fact that\
    \ in SQL a date literal is in single quotes. However, without context, SQL will\
    \ regard single quote literals as strings, which won’t work with date calculations.\
    \ The exception is `SQLite`, which only works with date strings anyway.\n\nThe\
    \ `dates` `CTE` would look like this:\n\n```sql\n--  PostgreSQL, MariaDB (not\
    \ MySQL)\nWITH dates(dob, today) AS (\n  VALUES\n    (date'1940-07-07',date'2023-01-01'),\n\
    \    ('1943-02-25','2023-01-01'),\n    ('1942-06-18','2023-01-01')\n    --  etc\n\
    )\n```\n```sql\n--  MySQL (not MariaDB)\nWITH dates(dob, today) AS (\n  VALUES\n\
    \    row(date'1940-07-07',date'2023-01-01'),\n    row('1943-02-25','2023-01-01'),\n\
    \    row('1942-06-18','2023-01-01')\n    --  etc\n)\n```\n```sql\n--  MSSQL\n\
    WITH dates(dob, today) AS (\n  SELECT * FROM (VALUES\n    (cast('1940-07-07' as\
    \ date),\n      cast('2023-01-01' as date)),\n    ('1943-02-25','2023-01-01'),\n\
    \    ('1942-06-18','2023-01-01')\n    --  etc\n  ) AS sq(a,b)\n)\n```\n```sql\n\
    --  SQLite\nWITH dates(dob, today) AS (\n  VALUES\n    ('1940-07-07','2023-01-01'),\n\
    \    ('1943-02-25','2023-01-01'),\n    ('1942-06-18','2023-01-01')\n    --  etc\n\
    )\n```\n```sql\n--  Oracle\nWITH dates(dob, today) AS (\n  SELECT date'1940-07-07',date'2023-01-01'\
    \ FROM dual\n  UNION ALL SELECT date'1943-02-25',date'2023-01-01'\n    FROM dual\n\
    \  UNION ALL SELECT date'1942-06-18',date'2023-01-01'\n    FROM dual\n    -- \
    \ etc\n)\n```\n\nNote\n\n*   For `PostgreSQL`, `MariaDB/MySQL`, and `Oracle`,\
    \ you can use the simple expression `date'...'` to interpret a literal as a date.\n\
    *   For `PostgreSQL`, `MariaDB/MySQL`, and `MSSQL`, it’s sufficient to cast the\
    \ literals for the first row only; SQL gets the hint from there. `Oracle`, on\
    \ the other hand, needs all of the rows to be cast.\n\nYou now have a virtual\
    \ table with a collection of test dates. You can now try out your age calculation:\n\
    \n```sql\n--  PostgreSQL\nWITH dates(dob, today) AS (\n  --  etc\n)\nSELECT\n\
    \  dob, today,\n  extract(year from age(today,dob)) AS age\nFROM dates;\n```\n\
    ```sql\n--  MariaDB/MySQL\nWITH dates(dob, today) AS (\n  --  etc\n)\nSELECT\n\
    \  dob, today,\n  timestampdiff(year,dob,current_timestamp) AS age\nFROM dates;\n\
    ```\n```sql\n--  MSSQL\nWITH dates(dob, today) AS (\n  --  etc\n)\nSELECT\n  dob,\
    \ today,\n  datediff(year,dob,today) AS age\nFROM dates;\n```\n```sql\n--  SQLite\n\
    WITH dates(dob, today) AS (\n  --  etc\n)\nSELECT\n  dob, today,\n  cast(\n  \
    \  strftime('%Y.%m%d', today) - strftime('%Y.%m%d', dob)\n    as int) AS age\n\
    FROM dates;\n```\n```sql\n--  Oracle\nWITH dates(dob, today) AS (\n  --  etc\n\
    )\nSELECT\n  dob, today,\n  trunc(months_between(today,dob)/12) AS age\nFROM dates;\n\
    ```\n\nWe’ve already noted in Chapter [4](#606708_1_En_4_Chapter.xhtml) how `MSSQL`\
    \ gets the age wrong, and this is one way you can test this."
  raw: '## Working with Table Literals


    At some point, you might want to work with a set of values which haven’t been
    saved anywhere—something in a virtual table which stays around long enough for
    you to process the data and then discreetly vanishes when you’ve finished.


    In principle, SQL does that all the time when you insert literal values into a
    table. For example, a statement like


    ```

    INSERT INTO table(columns)

    VALUES ( ... ), ( ... ), ( ... );

    ```


    inserts from a virtual table, generated by the `VALUES` clause. That also means
    that, in principle, you should be able to use `VALUES ...` as a virtual table
    without actually inserting anything. Unfortunately, it’s not quite so straightforward.


    A **table literal** is an expression which results in a collection of rows and
    columns—a virtual table. If things go according to plan, it could look like this:


    ```

    VALUES (''a'',''apple''), (''b'',''banana''), (''c'',''cherry'')

    ```


    Not all DBMSs see it that way. Some DBMSs do allow just such an expression, but
    others have something a little more complicated.


    A little later, we’ll want to work with a virtual table to experiment with, so
    the first step will be to put this into a CTE. Using the standard notation, you
    can use


    ```

    --  PostgreSQL, MariaDB (not MySQL), SQLite

    WITH cte(id,value) AS (

    VALUES (''a'',''apple''), (''b'',''banana''), (''c'',''cherry'')

    )

    SELECT * FROM cte;

    ```


    You’ll see the following:


    | id | value |

    | --- | --- |

    | a | apple |

    | b | banana |

    | c | cherry |


    Note that we’ve included the column names in the CTE name.


    For the other DBMSs, there are various alternatives:


    ```

    --  MSSQL

    WITH cte(id,value) AS (

    SELECT * FROM

    (VALUES (''a'',''apple''), (''b'',''banana''),

    (''c'',''cherry'')) AS sq(a,b)

    )

    SELECT * FROM cte;

    --  MySQL (not MariaDB)

    WITH cte(id,value) AS (

    VALUES ROW(''a'',''apple''), ROW(''b'',''banana''),

    ROW(''c'',''cherry'')

    )

    SELECT * FROM cte;

    --  Oracle

    WITH cte(id,value) AS (

    SELECT ''a'',''apple'' FROM dual

    UNION ALL SELECT ''b'',''banana'' FROM dual

    UNION ALL SELECT ''c'',''cherry'' FROM dual

    )

    SELECT * FROM cte;

    ```


    As you see, the prize for the most awkward version goes to Oracle, which doesn’t
    yet support a proper table literal. Apparently, that’s coming soon.


    MSSQL does support a table literal, but, for some unknown reason, it has to be
    inside a subquery, complete with a dummy subquery name and dummy column names.


    MySQL also supports a table literal, but requires each row inside a `ROW()` constructor,
    because MySQL has a non-standard `values()` function which conflicts with using
    it simply as a table literal. This is one of the cases where MariaDB and MySQL
    are not the same.


    ### Using a Table Literal for Testing


    One reason you might want throwaway values is if you’re testing something, and
    you haven’t the energy to put the test value in a real or temporary value.


    For example, suppose you want to test calculating the difference between dates,
    so for finding an age. You could do something like this:


    ```

    WITH dates(dob,today) AS (

    --  list of dob and today values

    )

    SELECT

    --  today - dob AS age

    FROM dates;

    ```


    The actual code is commented out, because the DBMSs all have their own ways. It
    gets further complicated because of the date literals.


    We’re going to try this with the following series of dates:


    | **dob** | **today** |

    | --- | --- |

    | 1940-07-07 | 2023-01-01 |

    | 1943-02-25 | 2023-01-01 |

    | 1942-06-18 | 2023-01-01 |

    | 1940-10-09 | 2023-01-01 |

    | 1940-07-07 | 2022-12-31 |

    | 1943-02-25 | 2022-12-31 |

    | 1942-06-18 | 2022-12-31 |

    | 1940-10-09 | 2022-12-31 |

    | 1940-07-07 | 2023-07-07 |

    | 1943-02-25 | 2023-02-25 |

    | 1942-06-18 | 2023-06-18 |

    | 1940-10-09 | 2023-10-09 |


    (If you recognize the dates of birth, don’t let on.)


    First, you’ll need to set up your `dates` CTE. This is complicated by the fact
    that in SQL a date literal is in single quotes. However, without context, SQL
    will regard single quote literals as strings, which won’t work with date calculations.
    The exception is SQLite, which only works with date strings anyway.


    The `dates` CTE would look like this:


    ```

    --  PostgreSQL, MariaDB (not MySQL)

    WITH dates(dob, today) AS (

    VALUES

    (date''1940-07-07'',date''2023-01-01''),

    (''1943-02-25'',''2023-01-01''),

    (''1942-06-18'',''2023-01-01'')

    --  etc

    )

    --  MySQL (not MariaDB)

    WITH dates(dob, today) AS (

    VALUES

    row(date''1940-07-07'',date''2023-01-01''),

    row(''1943-02-25'',''2023-01-01''),

    row(''1942-06-18'',''2023-01-01'')

    --  etc

    )

    --  MSSQL

    WITH dates(dob, today) AS (

    SELECT * FROM (VALUES

    (cast(''1940-07-07'' as date),

    cast(''2023-01-01'' as date)),

    (''1943-02-25'',''2023-01-01''),

    (''1942-06-18'',''2023-01-01'')

    --  etc

    ) AS sq(a,b)

    )

    --  SQLite

    WITH dates(dob, today) AS (

    VALUES

    (''1940-07-07'',''2023-01-01''),

    (''1943-02-25'',''2023-01-01''),

    (''1942-06-18'',''2023-01-01'')

    --  etc

    )

    --  Oracle

    WITH dates(dob, today) AS (

    SELECT date''1940-07-07'',date''2023-01-01'' FROM dual

    UNION ALL SELECT date''1943-02-25'',date''2023-01-01''

    FROM dual

    UNION ALL SELECT date''1942-06-18'',date''2023-01-01''

    FROM dual

    --  etc

    )

    ```


    Note


    .


    *   For PostgreSQL, MariaDB/MySQL, and Oracle, you can use the simple expression
    `date''...''` to interpret a literal as a date.


    *   For PostgreSQL, MariaDB/MySQL, and MSSQL, it’s sufficient to cast the literals
    for the first row only; SQL gets the hint from there. Oracle, on the other hand,
    needs all of the rows to be cast.


    You now have a virtual table with a collection of test dates. You can now try
    out your age calculation:


    ```

    --  PostgreSQL

    WITH dates(dob, today) AS (

    --  etc

    )

    SELECT

    dob, today,

    extract(year from age(today,dob)) AS age

    FROM dates;

    --  MariaDB/MySQL

    WITH dates(dob, today) AS (

    --  etc

    )

    SELECT

    dob, today,

    timestampdiff(year,dob,current_timestamp) AS age

    FROM dates;

    --  MSSQL

    WITH dates(dob, today) AS (

    --  etc

    )

    SELECT

    dob, today,

    datediff(year,dob,today) AS age

    FROM dates;

    --  SQLite

    WITH dates(dob, today) AS (

    --  etc

    )

    SELECT

    dob, today,

    cast(

    strftime(''%Y.%m%d'', today) - strftime(''%Y.%m%d'', dob)

    as int) AS age

    FROM dates;

    --  Oracle

    WITH dates(dob, today) AS (

    --  etc

    )

    SELECT

    dob, today,

    trunc(months_between(today,dob)/12) AS age

    FROM dates;

    ```


    We’ve already noted in Chapter [4](#606708_1_En_4_Chapter.xhtml) how MSSQL gets
    the age wrong, and this is one way you can test this.'
  trans: "# 处理表字面量\n\n在某些时候，您可能想要处理一组尚未保存到任何位置的值——例如一个虚拟表中的数据，该表会存在足够长的时间让您处理数据，然后在您完成后悄然消失。\n\
    \n从原理上讲，SQL 在将字面值插入表时一直都在这样做。例如，像下面这样的语句：\n\n```sql\nINSERT INTO table(columns)\n\
    VALUES ( ... ), ( ... ), ( ... );\n```\n\n就是从一个由 `VALUES` 子句生成的虚拟表中插入数据。这也意味着，从原理上讲，您应该能够将\
    \ `VALUES ...` 作为一个虚拟表来使用，而无需实际插入任何数据。不幸的是，事情并非如此简单。\n\n一个 `表字面量` 是一个表达式，其结果是一组行和列——即一个虚拟表。如果一切按计划进行，它可能看起来像这样：\n\
    \n```sql\nVALUES ('a','apple'), ('b','banana'), ('c','cherry')\n```\n\n并非所有的数据库管理系统（DBMS）都这样看待它。有些\
    \ DBMS 确实允许这样的表达式，但其他的则需要稍微复杂一点的写法。\n\n稍后，我们将需要使用一个虚拟表来进行实验，所以第一步是将其放入一个 `CTE`（公用表表达式）中。使用标准语法，您可以写：\n\
    \n```sql\n--  PostgreSQL, MariaDB (非 MySQL), SQLite\nWITH cte(id,value) AS (\n\
    \  VALUES ('a','apple'), ('b','banana'), ('c','cherry')\n)\nSELECT * FROM cte;\n\
    ```\n\n您将看到以下结果：\n\n| id | value |\n| --- | --- |\n| a | apple |\n| b | banana\
    \ |\n| c | cherry |\n\n请注意，我们已经将列名包含在了 `CTE` 的名称中。\n\n对于其他的 DBMS，有各种替代写法：\n\n\
    ```sql\n--  MSSQL\nWITH cte(id,value) AS (\n  SELECT * FROM\n    (VALUES ('a','apple'),\
    \ ('b','banana'),\n      ('c','cherry')) AS sq(a,b)\n)\nSELECT * FROM cte;\n```\n\
    ```sql\n--  MySQL (非 MariaDB)\nWITH cte(id,value) AS (\n  VALUES ROW('a','apple'),\
    \ ROW('b','banana'),\n    ROW('c','cherry')\n)\nSELECT * FROM cte;\n```\n```sql\n\
    --  Oracle\nWITH cte(id,value) AS (\n  SELECT 'a','apple' FROM dual\n  UNION ALL\
    \ SELECT 'b','banana' FROM dual\n  UNION ALL SELECT 'c','cherry' FROM dual\n)\n\
    SELECT * FROM cte;\n```\n\n如您所见，最笨拙版本的“奖项”属于 Oracle，它还不支持一个恰当的 `表字面量`。显然，这个功能即将推出。\n\
    \n`MSSQL` 确实支持 `表字面量`，但出于某种未知的原因，它必须放在一个子查询内，并且必须有一个虚构的子查询名称和虚构的列名。\n\n`MySQL`\
    \ 也支持 `表字面量`，但要求将每一行都放在一个 `ROW()` 构造器中，因为 `MySQL` 有一个非标准的 `values()` 函数，这与其简单地用作\
    \ `表字面量` 相冲突。这是 `MariaDB` 和 `MySQL` 不同的情况之一。\n\n## 使用表字面量进行测试\n\n您可能想要使用一次性值的一个原因是，当您在测试某些东西，而又没有精力将测试值放入一个真实或临时表中时。\n\
    \n例如，假设您想测试计算日期之间的差值，比如计算年龄。您可以这样做：\n\n```sql\nWITH dates(dob,today) AS (\n  --\
    \  列表：出生日期和今日日期值\n)\nSELECT\n  --  今日日期 - 出生日期 AS 年龄\nFROM dates;\n```\n\n实际的代码被注释掉了，因为各个\
    \ DBMS 都有自己的方法。由于日期字面量的存在，这变得进一步复杂。\n\n我们将尝试使用以下一系列日期：\n\n| `dob` | `today` |\n\
    | --- | --- |\n| 1940-07-07 | 2023-01-01 |\n| 1943-02-25 | 2023-01-01 |\n| 1942-06-18\
    \ | 2023-01-01 |\n| 1940-10-09 | 2023-01-01 |\n| 1940-07-07 | 2022-12-31 |\n|\
    \ 1943-02-25 | 2022-12-31 |\n| 1942-06-18 | 2022-12-31 |\n| 1940-10-09 | 2022-12-31\
    \ |\n| 1940-07-07 | 2023-07-07 |\n| 1943-02-25 | 2023-02-25 |\n| 1942-06-18 |\
    \ 2023-06-18 |\n| 1940-10-09 | 2023-10-09 |\n\n（如果您认出了这些出生日期，请不要声张。）\n\n首先，您需要设置您的\
    \ `dates` `CTE`。这很复杂，因为在 SQL 中，日期字面量是用单引号括起来的。然而，如果没有上下文，SQL 会将单引号字面量视为字符串，这无法用于日期计算。例外是\
    \ `SQLite`，它本来就只处理日期字符串。\n\n`dates` `CTE` 看起来会像这样：\n\n```sql\n--  PostgreSQL,\
    \ MariaDB (非 MySQL)\nWITH dates(dob, today) AS (\n  VALUES\n    (date'1940-07-07',date'2023-01-01'),\n\
    \    ('1943-02-25','2023-01-01'),\n    ('1942-06-18','2023-01-01')\n    --  等等\n\
    )\n```\n```sql\n--  MySQL (非 MariaDB)\nWITH dates(dob, today) AS (\n  VALUES\n\
    \    row(date'1940-07-07',date'2023-01-01'),\n    row('1943-02-25','2023-01-01'),\n\
    \    row('1942-06-18','2023-01-01')\n    --  等等\n)\n```\n```sql\n--  MSSQL\nWITH\
    \ dates(dob, today) AS (\n  SELECT * FROM (VALUES\n    (cast('1940-07-07' as date),\n\
    \      cast('2023-01-01' as date)),\n    ('1943-02-25','2023-01-01'),\n    ('1942-06-18','2023-01-01')\n\
    \    --  等等\n  ) AS sq(a,b)\n)\n```\n```sql\n--  SQLite\nWITH dates(dob, today)\
    \ AS (\n  VALUES\n    ('1940-07-07','2023-01-01'),\n    ('1943-02-25','2023-01-01'),\n\
    \    ('1942-06-18','2023-01-01')\n    --  等等\n)\n```\n```sql\n--  Oracle\nWITH\
    \ dates(dob, today) AS (\n  SELECT date'1940-07-07',date'2023-01-01' FROM dual\n\
    \  UNION ALL SELECT date'1943-02-25',date'2023-01-01'\n    FROM dual\n  UNION\
    \ ALL SELECT date'1942-06-18',date'2023-01-01'\n    FROM dual\n    --  等等\n)\n\
    ```\n\n请注意\n\n*   对于 `PostgreSQL`、`MariaDB/MySQL` 和 `Oracle`，您可以使用简单的表达式 `date'...'`\
    \ 将字面量解释为日期。\n*   对于 `PostgreSQL`、`MariaDB/MySQL` 和 `MSSQL`，仅需对第一行的字面量进行转换；SQL\
    \ 会从那里理解您的意图。而 `Oracle` 则需要所有行都进行转换。\n\n现在您有了一个包含一组测试日期的虚拟表。您可以尝试您的年龄计算了：\n\n\
    ```sql\n--  PostgreSQL\nWITH dates(dob, today) AS (\n  --  等等\n)\nSELECT\n  dob,\
    \ today,\n  extract(year from age(today,dob)) AS 年龄\nFROM dates;\n```\n```sql\n\
    --  MariaDB/MySQL\nWITH dates(dob, today) AS (\n  --  等等\n)\nSELECT\n  dob, today,\n\
    \  timestampdiff(year,dob,current_timestamp) AS 年龄\nFROM dates;\n```\n```sql\n\
    --  MSSQL\nWITH dates(dob, today) AS (\n  --  等等\n)\nSELECT\n  dob, today,\n \
    \ datediff(year,dob,today) AS 年龄\nFROM dates;\n```\n```sql\n--  SQLite\nWITH dates(dob,\
    \ today) AS (\n  --  等等\n)\nSELECT\n  dob, today,\n  cast(\n    strftime('%Y.%m%d',\
    \ today) - strftime('%Y.%m%d', dob)\n    as int) AS 年龄\nFROM dates;\n```\n```sql\n\
    --  Oracle\nWITH dates(dob, today) AS (\n  --  等等\n)\nSELECT\n  dob, today,\n\
    \  trunc(months_between(today,dob)/12) AS 年龄\nFROM dates;\n```\n\n我们已经在第 4 章中指出过\
    \ `MSSQL` 计算年龄时出错的问题，而这是您可以测试该问题的一种方法。"
- fmt: '## Using a Table Literal for Sorting


    In Chapter [5](#606708_1_En_5_Chapter.xhtml), we noted the problem of sorting
    string values. Put simply, alphabetical order is rarely the best way to list items
    which are supposed to be sequential.


    For example, if you have the day names of the week, the month names of the year,
    the colors of the rainbow, or even the names of the numbers (`"One"`, `"Two"`,
    `"Three"`, etc.), sorting the strings in alphabetical order will just make things
    confusing.


    In Chapter [5](#606708_1_En_5_Chapter.xhtml), we cheated by relying on a string
    position. Another, more resilient solution is to have a (virtual) table of values
    with their correct position.


    In Chapter [8](#606708_1_En_8_Chapter.xhtml), we generated a summary of sales
    per weekday:


    ```sql

    WITH

    data AS (...)

    summary AS (...)

    SELECT

    weekday_number, total,

    100*total/sum(total) OVER()

    FROM weekday_number

    ORDER BY weekday_number;

    ```


    The problem is that we’ve had to get the weekday number in order to sort this
    correctly. It would have been nicer to use the weekday name instead. We can then
    use an additional virtual table to sort the names.


    ### Redefine data CTE with the weekday name


    First, let’s redo the `data` CTE with the day name:


    ```sql

    --  PostgreSQL, Oracle

    WITH data AS (

    SELECT to_char(ordered,''FMDay'') AS weekday, total

    FROM sales

    )

    --  MSSQL

    WITH data AS (

    SELECT datename(weekday,ordered) AS weekday, total

    FROM sales

    )

    --  MariaDB/MySQL

    WITH data AS (

    SELECT date_format(ordered,''%W''), total

    FROM sales

    )

    ```


    You’ll notice that SQLite isn’t included in the list. That’s because it doesn’t
    have a method of getting the weekday name. If you need it, you’ll want the reverse
    technique in the next section.


    ### Group by the weekday name


    The `summary` CTE will now group by the weekday name:


    ```sql

    WITH

    data AS (

    SELECT

    ... AS weekday,

    total

    FROM sales

    ),

    summary AS (

    SELECT weekday, sum(total) AS total

    FROM data

    GROUP BY weekday

    )

    --  etc

    ```


    ### Create a table literal for weekdays


    We’ll now need a table literal with the days of the week as well as a sequence
    number.


    | **sequence** | **weekday** |

    | --- | --- |

    | 1 | Monday |

    | 2 | Tuesday |

    | 3 | Wednesday |

    | 4 | Thursday |

    | 5 | Friday |

    | 6 | Saturday |

    | 7 | Sunday |


    ```sql

    --  PostgreSQL, MariaDB (not MySQL), SQLite

    weekdays(sequence,weekday) AS (

    VALUES (1,''Monday''),(2,''Tuesday'')           --  etc

    )

    --  MySQL (not MariaDB)

    weekdays(sequence,weekday) AS (

    VALUES row(1,''Monday''), row(2,''Tuesday'')    --  etc

    )

    --  MSSQL

    weekdays(sequence,weekday) AS (

    SELECT * FROM (

    VALUES (1,''Monday''),(2,''Tuesday'')       --  etc

    ) AS sq(a,b)

    )

    --  Oracle

    weekdays(sequence,weekday) AS (

    SELECT 1,''Monday'' FROM dual

    UNION ALL SELECT 2,''Tuesday'' FROM dual      --  etc

    )

    ```


    ### Join and sort by the sequence number


    Finally, to do the sorting, you can join the `summary` CTE with the `weekdays`
    CTE and sort by the sequence number:


    ```sql

    WITH

    data AS ( ),

    summary AS ( ),

    weekdays(dob, today) AS ( )

    SELECT

    summary.weekday, summary.total,

    100*total/sum(summary.total) OVER()

    FROM summary JOIN weekdays

    ON summary.weekday=weekdays.weekday

    ORDER BY weekdays.sequence;

    ```


    You should see something like this:


    | **weekday** | **total** | **proportion** |

    | --- | --- | --- |

    | Monday | 49304 | 15.081 |

    | Tuesday | 45156.5 | 13.813 |

    | Wednesday | 45959.5 | 14.058 |

    | Thursday | 47528 | 14.538 |

    | Friday | 42372.5 | 12.961 |

    | Saturday | 48415.5 | 14.81 |

    | Sunday | 48182.22 | 14.738 |


    One advantage of this technique is that you can change the sequence numbering
    in the table literal, for example, to start on Wednesday if that suits you better.


    By the way, if you’re going to sort by weekday, or anything like it, very often,
    you might be better off saving the data in a permanent lookup table.


    ## Using a Table Literal As a Lookup


    We’ve already noted that SQLite has no function to get the day name of the week—only
    the day number. In any case, you may have other situations where the data you
    have isn’t as friendly or as comprehensible as you would like.


    One solution is to use a table literal to act as a lookup table.


    For example, the `vip` table has a status level of 1, 2, or 3. You’re supposed
    to realize that it means Gold, Silver, and Bronze. Here, we’ll use a table literal
    to do just that.


    ### Create a CTE with status names


    First, we’ll develop a CTE with the status names:


    ```sql

    --  PostgreSQL, MariaDB (not MySQL), SQLite

    WITH statuses(status,name) AS (

    VALUES (1,''Gold''),(2,''Silver''),(3,''Bronze'')

    )

    --  MySQL (not MariaDB)

    WITH statuses(status,name) AS (

    VALUES row(1,''Gold''),row(2,''Silver''),row(3,''Bronze'')

    )

    --  MSSQL

    WITH statuses(status,name) AS (

    SELECT * FROM (

    VALUES (1,''Gold''),(2,''Silver''),(3,''Bronze'')

    ) AS sq(a,b)

    )

    --  Oracle

    WITH statuses(status,name) AS (

    SELECT 1,''Gold'' FROM DUAL

    UNION ALL SELECT 2,''Silver'' FROM DUAL

    UNION ALL SELECT 3,''Bronze'' FROM DUAL

    )

    ```


    ### Join the CTE to customer and vip tables


    We can now join the CTE to `customers` and `vip` tables:


    ```sql

    WITH statuses(status,name) AS (

    --  etc

    )

    SELECT *

    FROM

    customers

    LEFT JOIN vip ON customers.id=vip.id

    LEFT JOIN statuses ON vip.status=statuses.status

    ;

    ```


    Again, the benefit is that you can change the status names on the fly.


    You can also do the same sort of thing with author and customer genders. Another
    thing you can do with this technique is to translate from one set of names to
    another set of names.


    You may be wondering why we don’t include the full name of the gender or the vip
    status in the table itself. Remember that you should only record a piece of data
    once, and it should be the simplest version possible. Storing a value as a single
    character, as with the gender, or an integer, as with the vip status, reduces
    the possibility of data error or variation, and you can spell it out later when
    you want.'
  raw: '### Using a Table Literal for Sorting


    In Chapter [5](#606708_1_En_5_Chapter.xhtml), we noted the problem of sorting
    string values. Put simply, alphabetical order is rarely the best way to list items
    which are supposed to be sequential.


    For example, if you have the day names of the week, the month names of the year,
    the colors of the rainbow, or even the names of the numbers (“One,” “Two,” “Three,”
    etc.), sorting the strings in alphabetical order will just make things confusing.


    In Chapter [5](#606708_1_En_5_Chapter.xhtml), we cheated by relying on a string
    position. Another, more resilient solution is to have a (virtual) table of values
    with their correct position.


    In Chapter [8](#606708_1_En_8_Chapter.xhtml), we generated a summary of sales
    per weekday:


