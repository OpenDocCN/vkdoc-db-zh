  trans: '

    ## 按计算值分组


    前述技术是将不同组水平分隔，即每个值位于同一行。你也可以垂直分隔这些派生组。这是通过使用 `GROUP BY` 子句实现的。


    你可能已经熟悉使用 `GROUP BY` 对简单的列值进行分组：

    ```sql

    SELECT state, count(*)

    FROM customerdetails

    GROUP BY state;

    ```


    你也可以按一个派生值进行分组。例如，你可以按客户的出生月份对他们进行分组：

    ```sql

    --  PostgreSQL, Oracle

    SELECT EXTRACT(month FROM dob) as monthnumber,

    count(*) AS howmany

    FROM customerdetails

    GROUP BY EXTRACT(month FROM dob)

    ORDER BY monthnumber;

    --  MSSQL

    SELECT month(dob) AS monthnumber, count(*) AS howmany

    FROM customerdetails

    GROUP BY month(dob)

    ORDER BY monthnumber;

    --  MySQL / MariaDB

    SELECT month(dob) AS monthnumber, count(*) AS howmany

    FROM customerdetails

    GROUP BY month(dob)

    ORDER BY monthnumber;

    --  SQLite

    SELECT strftime(''%m'',dob) as monthnumber,

    count(*) AS howmany

    FROM customerdetails

    GROUP BY strftime(''%m'',dob)

    ORDER BY monthnumber;

    ```


    在此示例中，月份编号被命名为 `monthnumber`，同时也用于对结果进行排序。


    | **月份编号** | **数量** |

    | --- | --- |

    | 1 | 19 |

    | 2 | 14 |

    | 3 | 17 |

    | 4 | 23 |

    | 5 | 24 |

    | 6 | 15 |

    | 7 | 27 |

    | 8 | 18 |

    | 9 | 18 |

    | 10 | 24 |

    | 11 | 17 |

    | 12 | 23 |

    | [NULL] | 64 |


    请注意，计算出现了两次，一次在 `SELECT` 子句中，另一次在 `GROUP BY` 子句中。这是因为 `SELECT` 是在 `GROUP BY` 之后才进行求值的，所以，遗憾的是，它的别名在
    `GROUP BY` 中还不可用。


    这并不算真正的问题，因为 SQL 优化器会很乐意地复用该计算，所以实际上它只执行了一次计算。


    不幸的是，月份编号不是很友好，因此我们可以使用月份名称。然而，不方便的是，月份名称的排序顺序不对，所以我们两者都需要：

    ```sql

    --  非 SQLite

    --  PostgreSQL, Oracle

    SELECT EXTRACT(month FROM dob) as monthnumber,

    to_char(dob,''Month'') AS monthname,

    count(*) AS howmany

    FROM customerdetails

    GROUP BY EXTRACT(month FROM dob), to_char(dob,''Month'')

    ORDER BY monthnumber;

    --  MSSQL

    SELECT month(dob) AS monthnumber,

    datename(month,dob) AS monthname, count(*) AS howmany

    FROM customerdetails

    GROUP BY month(dob), datename(month,dob)

    ORDER BY monthnumber;

    --  MySQL / MariaDB

    SELECT month(dob) AS monthnumber,

    monthname(dob) AS monthname, count(*) AS howmany

    FROM customerdetails

    GROUP BY month(dob), monthname(dob)

    ORDER BY monthnumber;

    ```


    这样看起来好多了：


    | **月份编号** | **月份名称** | **数量** |

    | --- | --- | --- |

    | 1 | January | 19 |

    | 2 | February | 14 |

    | 3 | March | 17 |

    | 4 | April | 23 |

    | 5 | May | 24 |

    | 6 | June | 15 |

    | 7 | July | 27 |

    | 8 | August | 18 |

    | 9 | September | 18 |

    | 10 | October | 24 |

    | 11 | November | 17 |

    | 12 | December | 23 |

    | [NULL] | [NULL] | 64 |


    如你所见，在 SQLite 中无法完全做到这一点，因为它没有获取月份名称的函数。


    从技术上讲，按两者分组是冗余的，因为每个月只有一个月份名称。但是，我们需要两者，以便我们可以显示一个，但按另一个排序。


    尽管重复计算不是问题，但这确实使查询的可读性降低且更难维护。我们可以利用公用表表达式：

    ```sql

    WITH cte AS (

    ...

    )

    SELECT monthname, count(*)

    FROM cte

    GROUP BY monthnumber, monthname

    ORDER BY monthnumber;

    ```


    你可以将 `GROUP BY` 与任何计算字段一起使用，但请注意：


    *   由于简单的计算并不总是能产生值得分组的结果，因此你能用它们做的事情是有限的。

    *   如前所述，计算需要同时出现在 `SELECT` 子句和 `GROUP BY` 子句中，这使得过程变得繁琐。


    前面提到的第二点可以通过使用公用表表达式来缓解。第一点则可以通过使用 CASE 语句来解决。


    ### 使用 CASE 语句进行分组


    基本的 `GROUP BY` 假定你已经有可以分组的值。有时，这样的值可以是派生的，例如月份或星期名称。


    更任意的分组可以使用 `CASE` 语句创建。


    例如，假设我们想统计年轻和年长的客户。我们可以通过使用一个 `CASE` 语句来区分他们：

    ```sql

    CASE

    WHEN dob<''1980-01-01'' THEN ''older''

    WHEN dob IS NOT NULL then ''younger''

    --  ELSE NULL

    END

    ```


    请记住，一些 `dob` 可能为 `NULL`，所以你需要过滤掉它们才能得到年轻客户。还要记住，默认的 `ELSE` 是 `NULL`，所以我们不需要包含它。


    为了统计他们，我们可以将此语句包含在 `GROUP BY` 子句中，如下所示：

    ```sql

    SELECT count(*)

    FROM customers

    GROUP BY CASE

    WHEN dob<''1980-01-01'' THEN ''older''

    WHEN dob IS NOT NULL then ''younger''

    END;

    ```


    这会给你一些结果：


    | **计数** |

    | 64 |

    | 133 |

    | 106 |


    但如果没有某种标签，这些结果是无用的。我们可以通过在 `SELECT` 子句中重复该计算来实现：

    ```sql

    SELECT

    CASE

    WHEN dob<''1980-01-01'' THEN ''older''

    WHEN dob IS NOT NULL then ''younger''

    END AS agegroup,

    count(*)

    FROM customers

    GROUP BY CASE

    WHEN dob<''1980-01-01'' THEN ''older''

    WHEN dob IS NOT NULL then ''younger''

    END;

    ```


    这样就可以工作了：


    | **年龄组** | **计数** |

    | --- | --- |

    | [NULL] | 64 |

    | Older | 133 |

    | Younger | 106 |


    但从编码的角度来看，这比上一节中的计算列更糟糕，所以这绝对会受益于使用公用表表达式：

    ```sql

    WITH cte AS (

    SELECT

    *,

    CASE

    WHEN dob<''1980-01-01'' THEN ''older''

    WHEN dob IS NOT NULL then ''younger''

    END AS agegroup FROM customers

    )

    SELECT agegroup,count(*)

    FROM cte

    GROUP BY agegroup;

    ```


    现在这将给你一个更易于管理的结果。


    ### 重新审视配送状态


    还记得在之前的章节中，我们使用嵌套的 `CASE` 语句创建了配送统计信息：

    ```sql

    WITH salesdata AS (

    --  PostgreSQL, MariaDB / MySQL, Oracle

    SELECT

    ordered, shipped, total,

    current_date - cast(ordered as date) AS ordered_age,

    shipped - cast(ordered as date) AS shipped_age

    FROM sales

    --  MSSQL

    SELECT

    ordered, shipped, total,

    datediff(day,ordered,current_timestamp)

    AS ordered_age,

    datediff(day,ordered,shipped) AS shipped_age

    FROM sales

    --  SQLite

    SELECT

    ordered, shipped, total,

    julianday(''now'')-julianday(ordered) AS ordered_age,

    julianday(shipped)-julianday(ordered) AS shipped_age

    FROM sales

    )

    SELECT

    ordered, shipped, total,

    CASE

    WHEN shipped IS NOT NULL THEN

    CASE

    WHEN shipped_age>14 THEN ''Shipped Late''

    ELSE ''Shipped''

    END

    ELSE

    CASE

    WHEN ordered_age<7 THEN ''Current''

    WHEN ordered_age<14 THEN ''Due''

    ELSE ''Overdue''

    END

    END AS status

    FROM salesdata;

    ```


    （当然，删除未使用的 `SELECT` 语句。）你会得到：


    | **订购日期** | **发货日期** | **总计** | **状态** |

    | --- | --- | --- | --- |

    | 2022-05-15 21:12:07.988741 | 2022-05-23 | 28 | Shipped |

    | 2022-05-16 03:03:16.065969 | 2022-05-24 | 34 | Shipped |

    | 2022-05-16 10:09:13.674823 | 2022-05-22 | 58.5 | Shipped |

    | 2022-05-16 15:02:43.285565 | [NULL] | 50 | Overdue |

    | 2022-05-16 16:48:14.674202 | 2022-05-28 | 17.5 | Shipped |

    | [NULL] | [NULL] | 13 | Overdue |

    | ~ 5549 行 ~ |


    如果你想将其汇总到状态组中，你可以再次将整个语句放入一个 CTE，然后对该 CTE 进行汇总。你已经有一个 CTE 用于预计算时长，因此我们需要另一个 CTE
    来保存前面的结果：

    ```sql

    WITH

    salesdata AS (

    --  同上

    ),

    statuses AS (

    SELECT

    ordered, shipped, total,

    CASE

    WHEN shipped IS NOT NULL THEN

    CASE

    WHEN shipped_age>14

    THEN ''Shipped Late''

    ELSE ''Shipped''

    END

    ELSE

    CASE

    WHEN ordered_age<7 THEN ''Current''

    WHEN ordered_age<14 THEN ''Due''

    ELSE ''Overdue''

    END

    END AS status

    FROM salesdata

    )

    SELECT status, count(*) AS number

    FROM statuses

    GROUP BY status;

    ```


    这将给你汇总的数据：


    | **状态** | **数量** |

    | --- | --- |

    | Due | 94 |

    | Current | 78 |

    | Shipped | 3808 |

    | Overdue | 1273 |

    | Shipped Late | 296 |


    下一步是让结果按正确的顺序显示。

    '
- fmt: "## Ordering by Arbitrary Strings\n\n当然，当涉及到对结果进行排序时，真正的问题是 SQL 的想象力有限，只会按字母顺序对字符串进行排序。这只在状态值本身也是按字母顺序排列时才有效，但事实并非如此。\n\
    \n你可以采用几种方法：\n\n*   你可以在每个字符串开头包含一个数字，然后使用 `ORDER BY`。这是一种取巧的办法，而且看起来不太合适。\n*\
    \   你可以用另一个表来存储状态值及其位置编号，然后将该表连接到主查询中。这很复杂，但在某些情况下可能有用。\n*   你可以用数字而不是字符串复制 `CASE`\
    \ 表达式，并按该列排序。不幸的是，无法从单个 `CASE` 表达式中得到两列。这真的很混乱。\n*   你通过字符串在更长字符串中的*位置*（`position`）来排序。\n\
    \n我们将采用最后一种方法，因为它易于实现且不会影响结果。\n\n大多数 DBMS 都包含一个用于在更大字符串中查找子串的函数。它有各种名称和形式：\n\n\
    ```sql\n--  Postgresql\nPOSITION(substring IN string)\n--  MariaDB / MySQL & SQLite\n\
    INSTR(substring,string)\n--  Oracle\nINSTR(string,substring)\n--  MSSQL\nCHARINDEX(substring,string)\n\
    ```\n\n在本例中，我们可以找到 `status` 字符串在包含按顺序排列的状态值的更长字符串中的位置：\n\n```sql\n'Shipped,Shipped\
    \ Late,Current,Due,Overdue'\n```\n\n逗号不是必需的，但它们使字符串更具可读性。更重要的是，状态字符串按你期望的顺序排列，并且位置函数会为更早找到的字符串返回更低的值。剩下的就由\
    \ `ORDER BY` 子句来完成。\n\n我们可以使用定位函数对前面的查询进行排序，如下所示：\n\n```sql\nWITH\nsalesdata AS\
    \ (\n--  as above\n),\nstatuses AS (\n--  as above\n)\nSELECT status, count(*)\
    \ AS number\nFROM cte\nGROUP BY status\n--  Postgresql\nORDER BY POSITION(status\
    \ IN\n'Shipped,Shipped Late,Current,Due,Overdue')\n--  MariaDB / MySQL & SQLite\n\
    ORDER BY INSTR(status,\n'Shipped,Shipped Late,Current,Due,Overdue')\n--  Oracle\n\
    ORDER BY INSTR(status,\n'Shipped,Shipped Late,Current,Due,Overdue')\n--  MSSQL\n\
    ORDER BY CHARINDEX(status,\n'Shipped,Shipped Late,Current,Due,Overdue')\n;\n```\n\
    \n你现在将按顺序得到结果：\n\n| **Status** | **number** |\n| --- | --- |\n| Shipped | 3808\
    \ |\n| Shipped Late | 296 |\n| Current | 78 |\n| Due | 94 |\n| Overdue | 1273\
    \ |\n\n你可以将此技术用于任何非字母顺序的字符串排序，例如一周中的日子或彩虹中的颜色。\n\n## Group Concatenation\n\n还有一个函数可用于聚合字符串数据。此函数将使用可选的分隔符连接字符串。\n\
    \n这个函数有几个不同的名称：\n\n| DBMS | Function |\n| --- | --- |\n| PostgreSQL | `string_agg(column,\
    \ delimiter)` |\n| SQL Server 2017+ | `string_agg(column, delimiter)` |\n| SQLite\
    \ | `group_concat(column, delimiter)` |\n| MySQL and MariaDB | `group_concat(column\
    \ /* ORDER BY column */SEPARATOR delimiter)` |\n| Oracle | `listagg(column, delimiter)`\
    \ |\n\n例如，你可以用这种方式获取每位作者的所有书籍列表：\n\n```sql\nSELECT\na.id, a.givenname, a.familyname,\n\
    --  PostgreSQL, MSSQL\nstring_agg(b.title, '; ') AS works\n--  SQLite\n--  group_concat(b.title,\
    \ '; ') AS works\n--  Oracle\n--  listagg(b.title, '; ') AS works\n--  MariaDB\
    \ / MySQL\n--  group_concat(b.title SEPARATOR '; ') AS works\nFROM authors AS\
    \ a LEFT JOIN books AS b ON a.id=b.authorid\nGROUP BY a.id, a.givenname, a.familyname;\n\
    ```\n\n你将得到类似这样的结果：\n\n| **id** | **givenname** | **familyname** | **works** |\n\
    | --- | --- | --- | --- |\n| 146 | Washington | Irving | Rip Van Wink ...; Tales\
    \ of the ...; The ... |\n| 963 | Richard | Marsh | The Beetle ... |\n| 390 | Jean\
    \ | Racine | Andromaque ...; Britannicus ...; Bérénice ... |\n| 766 | Evelyn |\
    \ Everett-Green | True to the ... |\n| 296 | Henri | Bergson | Matter and M ...;\
    \ Laughter ...; Time and Fre ... |\n| 464 | Ambrose | Bierce | An Occurrenc ...;\
    \ The Monk and ...; Tales ... |\n| ~ 488 rows ~ |\n\n`works` 列包含所有用 `;` 连接起来的书名。注意，`GROUP\
    \ BY` 子句使用了作者 `id`，但也包含了冗余的作者姓名以便选择它们。\n\n不过要小心。很容易对这个函数过度使用，你会看到书籍列表可能非常长，而连接后的字符串也可能变得非常、非常长。\n\
    \n## Summarizing the Summary with Grouping Sets\n\n传统上，使用 `GROUP BY` 会给出每组组合的总计。例如：\n\
    \n```sql\nSELECT state, town, count(*)\nFROM customerdetails\nGROUP BY state,\
    \ town;\n```\n\n将给出每个 `state`/`town` 组合的细分小计。\n\n有时，你可能希望包含这些小计的汇总，例如每个 `state`\
    \ 的总计以及总体总计。\n\n通常，你会认为**总计**（`total`）是求和，而**小计**（`subtotal`）是子组的总和。这暗示着要使用 `sum()`\
    \ 函数。在本次讨论中，我们将更宽松地使用术语，将这个词用于任何聚合，例如 `count()`。在这里，小计将意味着对子组进行计数。\n\n在前面的示例中，你可以获得四种可能的总计：\n\
    \n*   每个 `state`/`town` 组合的 `count()`；这是你通常得到的。\n*   每个 `state` 组的 `count()`。\n\
    *   每个 `town` 组的 `count()`。在这个例子中，它不太有用，因为有些城镇名称在各州之间重复，因此你会合并本不应合并的值。然而，在其他例子中，这会很有用。\n\
    *   整个日志的 `count()`——总计。\n\n除了最后一个，其他都可以被认为是某种程度上的小计。\n\n当我们稍后处理这个例子时，我们将按三列进行聚合，将会有八种组合，因此我们可以计算八个总计和小计。\n\
    \n现代 SQL 允许你生成一个包含表数据和聚合数据的总计和小计组合的结果集。根据 DBMS 的不同，这可能包括对 `GROUP BY` 子句的修改：\n\n\
    *   `GROUPING SETS` 允许你指定要包含哪些附加汇总。例如，你可以决定包含前面四种可能性中的哪几种。\n    PostgreSQL、Microsoft\
    \ SQL 和 Oracle 支持此功能。\n*   `ROLLUP` 是 `GROUPING SETS` 的简化版本，它产生*部分*可能的小计，将列视为层次结构。在前面的示例中，你将获得\
    \ `state`/`town`、`state` 和总计。\n    PostgreSQL、Microsoft SQL、Oracle 和 MariaDB/MySQL\
    \ 支持此功能。\n*   `CUBE` 也是 `GROUPING SETS` 的专门版本，它产生*所有*可能的小计。在前面的示例中，它就是所有四种可能的总计。\n\
    \n在这里，我们将看看如何生成这样的汇总。但是，我们不会处理客户的地址，而是看一下销售数据。"
  raw: "### Ordering by Arbitrary Strings\n\nOf course, the real problem when it comes\
    \ to sorting the results is that SQL has limited imagination and will only sort\
    \ strings alphabetically. That only works well if the status values were also\
    \ in alphabetical order, which they’re not.\n\nThere are a few approaches you\
    \ could take:\n\n*   You can include a number at the beginning of each string\
    \ and then use `ORDER BY`. That’s cheating and won’t look right.\n\n*   You can\
    \ have another table with the status values and a position number and then join\
    \ this table to the main query. That’s complicated, but may be useful in some\
    \ cases.\n\n*   You can duplicate the `CASE` expression with numbers instead of\
    \ the strings and `ORDER BY` that column instead. Unfortunately, there’s no way\
    \ to get two columns out of a single `CASE` expression. That’s really messy.\n\
    \n*   You `ORDER BY` the *position* of the string in a longer string.\n\nWe’ll\
    \ take the last approach earlier, since it’s easy to implement and doesn’t otherwise\
    \ affect the results.\n\nMost DBMSs include a function to find a substring in\
    \ a larger string. It has various names and forms:\n\n```\n--  Postgresql\nPOSITION(substring\
    \ IN string)\n--  MariaDB / MySQL & SQLite\nINSTR(substring,string)\n--  Oracle\n\
    INSTR(string,substring)\n--  MSSQL\nCHARINDEX(substring,string)\n```\n\nIn this\
    \ case, we can find the position of the `status` string inside a longer string\
    \ with the status values in order:\n\n```\n'Shipped,Shipped Late,Current,Due,Overdue'\n\
    ```\n\nThe commas aren’t necessary, but they make the string more readable. What’s\
    \ more important is that the status strings are in your preferred order, and the\
    \ position function will return a lower value for strings it finds earlier. The\
    \ rest is up to the `ORDER BY` clause.\n\nWe can order the preceding query using\
    \ the positioning function like this:\n\n```\nWITH\nsalesdata AS (\n--  as above\n\
    ),\nstatuses AS (\n--  as above\n)\nSELECT status, count(*) AS number\nFROM cte\n\
    GROUP BY status\n--  Postgresql\nORDER BY POSITION(status IN\n'Shipped,Shipped\
    \ Late,Current,Due,Overdue')\n--  MariaDB / MySQL & SQLite\nORDER BY INSTR(status,\n\
    'Shipped,Shipped Late,Current,Due,Overdue')\n--  Oracle\nORDER BY INSTR(status,\n\
    'Shipped,Shipped Late,Current,Due,Overdue')\n--  MSSQL\nORDER BY CHARINDEX(status,\n\
    'Shipped,Shipped Late,Current,Due,Overdue')\n;\n```\n\nYou’ll now get the results\
    \ in order:\n\n| **Status** | **number** |\n| --- | --- |\n| Shipped | 3808 |\n\
    | Shipped Late | 296 |\n| Current | 78 |\n| Due | 94 |\n| Overdue | 1273 |\n\n\
    You can use this technique for any nonalphabetical string order, such as days\
    \ of the week or colors in the rainbow.\n\n## Group Concatenation\n\nThere is\
    \ an additional function which can be used to aggregate string data. This function\
    \ will concatenate strings with an optional delimiter.\n\nThis function has a\
    \ few different names:\n\n| DBMS | Function |\n| --- | --- |\n| PostgreSQL | `string_agg(column,\
    \ delimiter)` |\n| SQL Server 2017+ | `string_agg(column, delimiter)` |\n| SQLite\
    \ | `group_concat(column, delimiter)` |\n| MySQL and MariaDB | `group_concat(column\
    \ /* ORDER BY column */SEPARATOR delimiter)` |\n| Oracle | `listagg(column, delimiter)`\
    \ |\n\nFor example, you can get a list of all the books for each author this way:\n\
    \n```\nSELECT\na.id, a.givenname, a.familyname,\n--  PostgreSQL, MSSQL\nstring_agg(b.title,\
    \ '; ') AS works\n--  SQLite\n--  group_concat(b.title, '; ') AS works\n--  Oracle\n\
    --  listagg(b.title, '; ') AS works\n--  MariaDB / MySQL\n--  group_concat(b.title\
    \ SEPARATOR '; ') AS works\nFROM authors AS a LEFT JOIN books AS b ON a.id=b.authorid\n\
    GROUP BY a.id, a.givenname, a.familyname;\n```\n\nYou’ll get something like this:\n\
    \n| **id** | **givenname** | **familyname** | **works** |\n| --- | --- | --- |\
    \ --- |\n| 146 | Washington | Irving | Rip Van Wink ...; Tales of the ...; The\
    \ ... |\n| 963 | Richard | Marsh | The Beetle ... |\n| 390 | Jean | Racine | Andromaque\
    \ ...; Britannicus ...; Bérénice ... |\n| 766 | Evelyn | Everett-Green | True\
    \ to the ... |\n| 296 | Henri | Bergson | Matter and M ...; Laughter ...; Time\
    \ and Fre ... |\n| 464 | Ambrose | Bierce | An Occurrenc ...; The Monk and ...;\
    \ Tales ... |\n| ~ 488 rows ~ |\n\nThe `works` column has all of the book titles\
    \ concatenated with a `;` between them. Note that the `GROUP BY` clause uses the\
    \ author `id` but includes the redundant author names to allow them to be selected.\n\
    \nBe careful, though. It’s easy to get carried away with this function, and you’ll\
    \ see that the list of books can be very long, and the concatenated string can\
    \ be very, very long.\n\n## Summarizing the Summary with Grouping Sets\n\nClassically,\
    \ using `GROUP BY` will give you totals for each combination of the groups. For\
    \ example:\n\n```\nSELECT state, town, count(*)\nFROM customerdetails\nGROUP Y\
    \ state, town;\n```\n\nwill give you subtotals for each `state`/`town` combination.\n\
    \nSometimes, you would like to include summaries of these subtotals, such as grand\
    \ totals for each `state` and grand total overall.\n\nNormally, you think of the\
    \ word **total** as adding values and **subtotal** as a total of a subgroup. This\
    \ would imply using the `sum()` function. In this discussion, we’ll use the terminology\
    \ more loosely and use the word for any aggregates, such as `count()`. Here, a\
    \ subtotal would imply counting a subgroup.\n\nIn the preceding example, there\
    \ are four possible totals that you could get:\n\n*   The `count()` of each `state`/`town`\
    \ combination; this is what you normally get.\n\n*   The `count()` of each `state`\
    \ group.\n\n*   The `count()` of each `town` group. In this example, it’s not\
    \ so useful, since some town names are duplicated across states, so you’d be combining\
    \ values which shouldn’t be. However, in other examples, this would be useful.\n\
    \n*   The `count()` of the whole log—the grand total.\n\nApart from the last one,\
    \ the others would all be considered subtotals at some level.\n\nWhen we work\
    \ with the example shortly, we’ll aggregate by three columns, and there’ll be\
    \ eight combinations, so eight totals and subtotals we can calculate.\n\nModern\
    \ SQL allows you to generate a result set which is a combination of totals and\
    \ subtotals of table data and aggregate data. Depending on the DBMS, this might\
    \ include a modification of the `GROUP BY` clause:\n\n*   `GROUPING SETS` allow\
    \ you to specify which additional summaries to include. So, for example, you can\
    \ decide which of the four possibilities earlier you want to include.\n\n    This\
    \ is supported by PostgreSQL, Microsoft SQL, and Oracle.\n\n*   `ROLLUP` is a\
    \ simplified version of `GROUPING SETS` which produces *some* of the possible\
    \ subtotals, treating the columns as a hierarchy. In the preceding example, you\
    \ would get the `state`/`town`, `state`, and grand totals.\n\n    This is supported\
    \ by PostgreSQL, Microsoft SQL, Oracle, and MariaDB/MySQL.\n\n*   `CUBE` is also\
    \ a specialized version of `GROUPING SETS` which produces *all* of the possible\
    \ subtotals. In the preceding example, it’s all four of the possible totals.\n\
    \nHere, we’ll have a look at generating such a summary. However, rather than work\
    \ with customers’ addresses, we’ll have a look at sales data."
  trans: "## 按任意字符串排序\n\n当然，当涉及对结果进行排序时，真正的问题在于 SQL 的想象力有限，它只会按字母顺序对字符串进行排序。这只在状态值本身也按字母顺序排列时才有效，但事实并非如此。\n\
    \n你可以采用几种方法：\n\n*   你可以在每个字符串开头包含一个数字，然后使用 `ORDER BY`。这是一种取巧的办法，而且看起来不太合适。\n*\
    \   你可以用另一个表来存储状态值及其位置编号，然后将该表连接到主查询中。这很复杂，但在某些情况下可能有用。\n*   你可以用数字而不是字符串复制 `CASE`\
    \ 表达式，并按该列排序。不幸的是，无法从单个 `CASE` 表达式中得到两列。这真的很混乱。\n*   你通过字符串在更长字符串中的*位置*（`position`）来排序。\n\
    \n我们将采用最后一种方法，因为它易于实现且不会影响结果。\n\n大多数 DBMS 都包含一个用于在更大字符串中查找子串的函数。它有各种名称和形式：\n\n\
    ```sql\n--  PostgreSQL\nPOSITION(substring IN string)\n--  MariaDB / MySQL & SQLite\n\
    INSTR(substring,string)\n--  Oracle\nINSTR(string,substring)\n--  MSSQL\nCHARINDEX(substring,string)\n\
    ```\n\n在本例中，我们可以找到 `status` 字符串在包含按顺序排列的状态值的更长字符串中的位置：\n\n```sql\n'Shipped,Shipped\
    \ Late,Current,Due,Overdue'\n```\n\n逗号不是必需的，但它们使字符串更具可读性。更重要的是，状态字符串按你期望的顺序排列，并且位置函数会为更早找到的字符串返回更低的值。剩下的就由\
    \ `ORDER BY` 子句来完成。\n\n我们可以使用定位函数对前面的查询进行排序，如下所示：\n\n```sql\nWITH\nsalesdata AS\
    \ (\n--  如上所述\n),\nstatuses AS (\n--  如上所述\n)\nSELECT status, count(*) AS number\n\
    FROM cte\nGROUP BY status\n--  PostgreSQL\nORDER BY POSITION(status IN\n'Shipped,Shipped\
    \ Late,Current,Due,Overdue')\n--  MariaDB / MySQL & SQLite\nORDER BY INSTR(status,\n\
    'Shipped,Shipped Late,Current,Due,Overdue')\n--  Oracle\nORDER BY INSTR(status,\n\
    'Shipped,Shipped Late,Current,Due,Overdue')\n--  MSSQL\nORDER BY CHARINDEX(status,\n\
    'Shipped,Shipped Late,Current,Due,Overdue')\n;\n```\n\n你现在将按顺序得到结果：\n\n| **状态**\
    \ | **数量** |\n| --- | --- |\n| Shipped | 3808 |\n| Shipped Late | 296 |\n| Current\
    \ | 78 |\n| Due | 94 |\n| Overdue | 1273 |\n\n你可以将此技术用于任何非字母顺序的字符串排序，例如一周中的日子或彩虹中的颜色。\n\
    \n## 字符串拼接\n\n还有一个函数可用于聚合字符串数据。此函数将使用可选的分隔符连接字符串。\n\n这个函数有几个不同的名称：\n\n| DBMS |\
    \ 函数 |\n| --- | --- |\n| PostgreSQL | `string_agg(column, delimiter)` |\n| SQL\
    \ Server 2017+ | `string_agg(column, delimiter)` |\n| SQLite | `group_concat(column,\
    \ delimiter)` |\n| MySQL and MariaDB | `group_concat(column /* ORDER BY column\
    \ */SEPARATOR delimiter)` |\n| Oracle | `listagg(column, delimiter)` |\n\n例如，你可以用这种方式获取每位作者的所有书籍列表：\n\
    \n```sql\nSELECT\na.id, a.givenname, a.familyname,\n--  PostgreSQL, MSSQL\nstring_agg(b.title,\
    \ '; ') AS works\n--  SQLite\n--  group_concat(b.title, '; ') AS works\n--  Oracle\n\
    --  listagg(b.title, '; ') AS works\n--  MariaDB / MySQL\n--  group_concat(b.title\
    \ SEPARATOR '; ') AS works\nFROM authors AS a LEFT JOIN books AS b ON a.id=b.authorid\n\
    GROUP BY a.id, a.givenname, a.familyname;\n```\n\n你将得到类似这样的结果：\n\n| **id** | **givenname**\
    \ | **familyname** | **works** |\n| --- | --- | --- | --- |\n| 146 | Washington\
    \ | Irving | Rip Van Wink ...; Tales of the ...; The ... |\n| 963 | Richard |\
    \ Marsh | The Beetle ... |\n| 390 | Jean | Racine | Andromaque ...; Britannicus\
    \ ...; Bérénice ... |\n| 766 | Evelyn | Everett-Green | True to the ... |\n| 296\
    \ | Henri | Bergson | Matter and M ...; Laughter ...; Time and Fre ... |\n| 464\
    \ | Ambrose | Bierce | An Occurrenc ...; The Monk and ...; Tales ... |\n| ~ 488\
    \ 行 ~ |\n\n`works` 列包含所有用 `;` 连接起来的书名。注意，`GROUP BY` 子句使用了作者 `id`，但也包含了冗余的作者姓名以便选择它们。\n\
    \n不过要小心。很容易对这个函数过度使用，你会看到书籍列表可能非常长，而连接后的字符串也可能变得非常、非常长。\n\n## 使用分组集汇总总计\n\n传统上，使用\
    \ `GROUP BY` 会给出每组组合的总计。例如：\n\n```sql\nSELECT state, town, count(*)\nFROM customerdetails\n\
    GROUP BY state, town;\n```\n\n将给出每个 `state`/`town` 组合的细分小计。\n\n有时，你可能希望包含这些小计的汇总，例如每个\
    \ `state` 的总计以及总体总计。\n\n通常，你会认为**总计**（`total`）是求和，而**小计**（`subtotal`）是子组的总和。这暗示着要使用\
    \ `sum()` 函数。在本次讨论中，我们将更宽松地使用术语，将这个词用于任何聚合，例如 `count()`。在这里，小计将意味着对子组进行计数。\n\n\
    在前面的示例中，你可以获得四种可能的总计：\n\n*   每个 `state`/`town` 组合的 `count()`；这是你通常得到的。\n*   每个\
    \ `state` 组的 `count()`。\n*   每个 `town` 组的 `count()`。在这个例子中，它不太有用，因为有些城镇名称在各州之间重复，因此你会合并本不应合并的值。然而，在其他例子中，这会很有用。\n\
    *   整个日志的 `count()`——总计。\n\n除了最后一个，其他都可以被认为是某种程度上的小计。\n\n当我们稍后处理这个例子时，我们将按三列进行聚合，将会有八种组合，因此我们可以计算八个总计和小计。\n\
    \n现代 SQL 允许你生成一个包含表数据和聚合数据的总计和小计组合的结果集。根据 DBMS 的不同，这可能包括对 `GROUP BY` 子句的修改：\n\n\
    *   `GROUPING SETS` 允许你指定要包含哪些附加汇总。例如，你可以决定包含前面四种可能性中的哪几种。\n    PostgreSQL、Microsoft\
    \ SQL 和 Oracle 支持此功能。\n*   `ROLLUP` 是 `GROUPING SETS` 的简化版本，它产生*部分*可能的小计，将列视为层次结构。在前面的示例中，你将获得\
    \ `state`/`town`、`state` 和总计。\n    PostgreSQL、Microsoft SQL、Oracle 和 MariaDB/MySQL\
    \ 支持此功能。\n*   `CUBE` 也是 `GROUPING SETS` 的专门版本，它产生*所有*可能的小计。在前面的示例中，它就是所有四种可能的总计。\n\
    \n在这里，我们将看看如何生成这样的汇总。但是，我们不会处理客户的地址，而是看一下销售数据。"
- fmt: '## Preparing Data for Summarizing


    It’s often the case that your original data isn’t quite ready for summarizing.
    For example, the `sales` table includes the `time` of each order, but it’s very
    hard to group that. For our sample, we’ll work on summarizing the following:


    *   The month of the order

    *   The customer id

    *   The state the customer lives in


    Note that all three columns are independent of each other, unlike the `state`
    and `town` in the original example. That means totaling any combination is meaningful.


    To prepare the data, we can use the following query:


    ```sql

    SELECT

    --  PostgreSQL, Oracle

    to_char(s.ordered,''YYYY-MM'') AS ordered,

    --  MariaDB / MySQL

    --  date_format(s.ordered,''%Y-%m'') AS ordered,

    --  MSSQL

    --  format(s.ordered,''yyyy-MM'') AS ordered,

    --  SQLite

    --  strftime(''%Y-%m'',s.ordered) AS ordered,

    s.total, c.id, c.state

    FROM sales AS s JOIN customerdetails AS c

    ON s.customerid=c.id

    WHERE s.ordered IS NOT NULL;

    ```


    You’ll see something like this:


    | **ordered** | **total** | **id** | **state** |

    | --- | --- | --- | --- |

    | 2022-05 | 28 | 28 | NSW |

    | 2022-05 | 34 | 27 | NSW |

    | 2022-05 | 58.5 | 1 | WA |

    | 2022-05 | 50 | 26 | VIC |

    | 2022-05 | 17.5 | 26 | VIC |

    | 2022-07 | 15 | 105 | VIC |

    | ~ 5295 rows ~ |


    No version of SQL has a straightforward way of extracting a year-month combination,
    so we use a formatting function. It returns a string, but that’s fine for what
    we want to do with it.


    When working with this, you could use this in a CTE, but it’s not quite convenient,
    so we’ll save it as a view instead:


    ```sql

    DROP VIEW IF EXISTS salesdata;  --  Not Oracle

    CREATE VIEW salesdata AS

    SELECT

    --  PostgreSQL, Oracle

    to_char(s.ordered,''YYYY-MM'') AS ordered,

    --  MariaDB / MySQL

    --  date_format(s.ordered,''%Y-%m'') AS ordered,

    --  MSSQL

    --  format(s.ordered,''yyyy-MM'') AS ordered,

    --  SQLite

    --  strftime(''%Y-%m'',s.ordered) AS ordered,

    s.total, c.id, c.state

    FROM sales AS s JOIN customerdetails AS c

    ON s.customerid=c.id

    WHERE s.ordered IS NOT NULL;

    ```


    If you’re using Microsoft SQL, remember to surround your `CREATE VIEW` statement
    between a pair of `GO`s:


    ```sql

    -- MSSQL DROP VIEW IF EXISTS salesdata;

    GO

    CREATE VIEW salesdata AS

    SELECT

    format(s.ordered,''yyyy-MM'') AS ordered,

    s.total, c.id, c.state

    FROM sales AS s JOIN customerdetails AS c

    ON s.customerid=c.id

    WHERE s.ordered IS NOT NULL;

    GO

    ```


    To begin with, we’ll generate the summaries separately and combine them with a
    `UNION` clause.


    ## Combining Summaries with the UNION Clause


    Most DBMSs have a simpler way of doing this, but you’ll get a feeling for how
    all of this works doing it the (not very) long way.


    To begin with, you can get summaries by state, customer ids, and dates using the
    following query:


    ```sql

    --  All Group summaries

    SELECT state, id, ordered, count(*) AS nsales, sum(total) AS total

    FROM salesdata

    GROUP BY state,id,ordered

    ORDER BY state,id,ordered;

    ```


    You’ll get summaries for each state/customer id/ordered date combination.


    | **state** | **id** | **ordered** | **nsales** | **total** |

    | --- | --- | --- | --- | --- |

    | ACT | 85 | 2022-06 | 2 | 117 |

    | ACT | 85 | 2022-07 | 2 | 104.5 |

    | ACT | 85 | 2022-08 | 5 | 269.5 |

    | ACT | 85 | 2022-09 | 3 | 253.5 |

    | ACT | 85 | 2022-10 | 5 | 476 |

    | ACT | 85 | 2022-11 | 3 | 179.5 |

    | ~ 1802 rows ~ |


    The next step is to generate summaries for the state and customer ids:


    ```sql

    --  state, ordered summaries

    SELECT

    state, id, NULL, count(*) AS nsales,

    sum(total) AS total

    FROM salesdata

    GROUP BY state, id

    ORDER BY state, id;

    --  state summaries

    SELECT

    state, NULL, NULL, count(*) AS nsales,

    sum(total) AS total

    FROM salesdata

    GROUP BY state

    ORDER BY state;

    ```


    You’ll get something like the following:


    | state | id | ?column? | nsales | total |

    | --- | --- | --- | --- | --- |

    | ACT | 85 | [NULL] | 37 | 2418.5 |

    | ACT | 112 | [NULL] | 20 | 1272.5 |

    | ACT | 147 | [NULL] | 32 | 2202 |

    | ACT | 355 | [NULL] | 13 | 689.5 |

    | ACT | 489 | [NULL] | 3 | 199 |

    | NSW | 10 | [NULL] | 48 | 2931.5 |

    |  ~ 266 rows |


    and


    | state | ? | ? | nsales | total |

    | --- | --- | --- | --- | --- |

    | ACT | [NULL] | [NULL] | 105 | 6781.5 |

    | NSW | [NULL] | [NULL] | 1668 | 102010.22 |

    | NT | [NULL] | [NULL] | 103 | 6151 |

    | QLD | [NULL] | [NULL] | 869 | 53331.5 |

    | SA | [NULL] | [NULL] | 499 | 30977.5 |

    | TAS | [NULL] | [NULL] | 456 | 28193 |

    | VIC | [NULL] | [NULL] | 1273 | 79199.5 |

    | WA | [NULL] | [NULL] | 322 | 20274 |


    Don’t worry about the missing column names, as we’ll get them from the `UNION`.


    The reason to include all those `NULL`s is to line up the columns when you combine
    them in a `UNION`.


    Finally, get the grand total:


    ```sql

    --  grand total

    SELECT

    NULL, NULL, NULL, count(*) AS nsales,

    sum(total) AS total

    FROM salesdata

    --  GROUP BY ()

    ;

    ```


    This gives you a single row of grand totals:


    | **?** | **?** | **?** | **nsales** | **total** |

    | --- | --- | --- | --- | --- |

    | [NULL] | [NULL] | [NULL] | 5295 | 326918.22 |


    Note that this includes the commented out `GROUP BY ()` clause, just as a reminder
    that this is a grand total; of course, you don’t need it.


    The `UNION` clause can be used to combine the results of multiple `SELECT` statements.
    The only requirement is that they match in the number and types of columns.


    ```sql

    --  All Group summaries

    SELECT

    state, id, ordered, count(*) AS nsales,

    sum(total) AS total

    FROM salesdata

    GROUP BY state,id,ordered

    --  state, ordered summaries

    UNION

    SELECT state, id, NULL, count(*), sum(total)

    FROM salesdata

    GROUP BY state,id

    --  state summaries

    UNION

    SELECT state, NULL, NULL, count(*), sum(total)

    FROM salesdata

    GROUP BY state

    --  grand total

    UNION

    SELECT NULL, NULL, NULL, count(*), sum(total)

    FROM salesdata

    --  Sort

    ORDER BY state,id,ordered;

    ```


    You now have the results combined:


    | state | id | ordered | nsales | total |

    | --- | --- | --- | --- | --- |

    | ACT | 85 | 2022-06 | 2 | 117 |

    | ACT | 85 | 2022-07 | 2 | 104.5 |

    | ACT | 85 | 2022-08 | 5 | 269.5 |

    | ACT | 85 | 2022-09 | 3 | 253.5 |

    | ACT | 85 | 2022-10 | 5 | 476 |

    | ACT | 85 | 2022-11 | 3 | 179.5 |

    | ACT | 85 | 2022-12 | 2 | 84 |

    | ACT | 85 | 2023-01 | 4 | 248.5 |

    | ACT | 85 | 2023-03 | 3 | 209 |

    | ACT | 85 | 2023-04 | 6 | 384 |

    | ACT | 85 | 2023-05 | 2 | 93 |

    | ACT | 85 | [NULL] | 37 | 2418.5 |

    | ACT | 112 | 2022-07 | 2 | 72 |

    | ACT | 112 | 2022-08 | 2 | 78 |

    | ACT | 112 | 2022-09 | 1 | 49 |

    | ACT | 112 | 2022-10 | 1 | 70.5 |

    | ~ 2077 rows |'
