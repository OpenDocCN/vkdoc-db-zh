  trans: '

    ```

    WITH cte AS (

    SELECT bg.bookid, string_agg(g.genre,'', '') AS genres

    FROM bookgenres AS bg JOIN genres AS g ON bg.genreid=g.id

    WHERE g.genre IN(''Fantasy'',''Science Fiction'')

    GROUP BY bg.bookid

    )

    SELECT *

    FROM bookdetails AS b JOIN cTE ON b.id=cte.bookid;

    ```

    然后你将得到一个筛选后的列表：


    | **id** | **truncate** | **...** | **genres** | **givenname** | **familyname**
    | **...** |

    | --- | --- | --- | --- | --- | --- | --- |

    | 589 | The Story of ... | ... | Fantasy ... | Stanley | Waterloo | ... |

    | 96 | Bee: The Pri ... | ... | Fantasy ... | Anatole | France | ... |

    | 880 | The Journey ... | ... | Fantasy, Science F… | Ludvig | Holberg | ... |

    | 591 | The Story of ... | ... | Fantasy ... | E. | Nesbit | ... |

    | 1938 | Histoire Com ... | ... | Science Fiction ... | Cyrano | de Bergerac |
    ... |

    | 128 | The Year 3000… | ... | Science Fiction ... | Paolo | Mantegazza | ...
    |

    | ~ 163 行 ~ |


    请注意，拼接后的 `genres` 列已被别名为 `` `genres` ``。这与 `genres` 表名相同，因此你可能会感到困惑。好消息是 SQL 不会混淆，所以你可以这样用。另一方面，如果你对此担心，可以随时使用双引号：`AS
    "genres"`。当然，你也可以选择一个更好的别名。


    然而，需要提醒一句。当你开始在查询中使用视图时，必须考虑一些可能的副作用：

    *   由于视图不是原始数据库的一部分，它可能会给其他用户带来一些混淆，因为视图看起来像表，但与其余的表并不相同。

    *   如果一个查询中有太多视图，DBMS 优化器可能无法为执行查询制定出最有效的计划。这可能是因为某些视图产生的数据超出了下一个查询的需要，而优化器可能无法确定你真正想要什么。

    *   如果视图有任何更改，当然会影响查询的结果。

    *   如果你开始基于其他视图来创建视图，这些副作用会更加显著。通常从头开始创建新视图更安全。


    这并不意味着你不应该在查询中使用视图——这正是创建视图的意义所在。然而，它确实意味着在叠加使用视图时需要小心。


    ## 多对多关系无处不在


    任何时候，当一个表与另外两个表相关联时，你就有了一个多对多关系。


    例如，数据库包含 `customers`、`sales`、`saleitems` 和 `books` 表。所有这些表都通过外键/主键关系连接。这意味着客户和书籍之间存在多对多关系：一个客户可以购买多本书，而一本书可以被多个客户购买（当然不是同一本，而是这本书的副本）。


    这意味着 `sales` 和 `saleitems` 表，特别是 `saleitems` 表，承担了关联表的角色。


    本例中的 `sales` 和 `saleitems` 表与前一个示例中的 `bookgenres` 表有两个主要区别：

    *   关联不需要是唯一的。同一个客户在另一场合购买同一本书是完全可行的。事实上，如果这种情况更常发生，对生意还有好处。

    *   关联并非全部。你还需要记录其他销售细节，例如日期、支付金额等等。


    在这种情况下，销售表并非纯粹的关联表，因为它们包含自身的新数据，但它们仍然在做关联的工作。


    ## 另一个多对多示例


    当前数据库假设每本书只有一位作者。原则上，一本书可以由多位作者撰写。这在小说中不常见，但在非小说类书籍中更常见。


    为此，你需要按如下方式修改你的设计：

    *   从 `books` 表中移除 `authorid` 列。

    *   创建一个 `authorship` 表，用于关联书籍和作者。


    这里有一些不属于主数据库的额外表，我们可以用来阐明概念：

    *   `multibooks`：一个没有作者 id 的小型书籍表。

    *   `multiauthors`：前述书籍的作者表。

    *   `authorship`：一个关联书籍和作者的关联表。


    表结构如下所示：

    ```

    CREATE TABLE books (

    id INT PRIMARY KEY,

    title varchar(60)

    --  其他书籍详情，不包括作者

    );

    CREATE TABLE authors (

    id INT PRIMARY KEY,

    givenname varchar(24),

    familyname varchar(24)

    --  其他作者详情，不包括书籍

    );

    CREATE TABLE authorship (

    bookid INT REFERENCES books(id),

    authorid INT REFERENCES authors(id),

    PRIMARY KEY(bookid,authorid)

    );

    ```

    一个拥有多位作者的书籍示例如下：

    ```

    INSERT INTO books(title)

    VALUES(''Good Omens'');

    INSERT INTO authors(givenname,familyname)

    VALUES

    (''Terry'',''Pratchett''),

    (''Neil'',''Gaiman'');

    INSERT INTO authorship(bookid,authorid)

    VALUES

    (1,1),  --  Good Omens, Terry Pratchett

    (1,2);  --  Good Omens, Neil Gaiman

    ```

    你不需要运行前面的示例，因为数据已经存在于示例表中。


    你可以使用类似下面的查询来获取关联数据：

    ```

    SELECT *

    FROM

    multibooks AS b

    JOIN authorship AS ba ON b.id=ba.bookid

    JOIN multiauthors AS a ON ba.authorid=a.id;

    ```

    你将得到类似这样的结果：


    | **id** | **title** | **authorid** | **bookid** | **id** | **givenname** | **familyname**
    |

    | --- | --- | --- | --- | --- | --- | --- |

    | 18 | The Gilded Age | 9 | 18 | 9 | Charles | Warner |

    | 9 | The Syndic | 7 | 9 | 7 | Cyril | Kornbluth |

    | 21 | Seller | 7 | 21 | 7 | Cyril | Kornbluth |

    | 8 | Wolfbane | 7 | 8 | 7 | Cyril | Kornbluth |

    | 12 | Takeoff | 7 | 12 | 7 | Cyril | Kornbluth |

    | 8 | Wolfbane | 6 | 8 | 6 | Frederik | Pohl |

    | ~ 31 行 ~ |


    你也可以结合使用 CTE 和聚合查询来合并每本书的作者：

    ```

    WITH cte AS (

    SELECT

    ba.bookid,

    string_agg(a.givenname||'' ''||a.familyname,'' & '')

    AS authors

    FROM authorship AS ba JOIN multiauthors AS a

    ON ba.authorid=a.id

    GROUP BY ba.bookid

    )

    SELECT b.id, b.title, cte.authors

    FROM multibooks AS b JOIN cte ON b.id=cte.bookid

    ORDER BY b.id;

    ```

    现在你得到了一个包含所有作者的书籍列表：


    | **id** | **title** | **Authors** |

    | --- | --- | --- |

    | 1 | Man Plus | Frederik Pohl |

    | 2 | Proxima | Stephen Baxter |

    | 3 | The Long Mars | Stephen Baxter & Terry Pratchett |

    | 4 | The Shining | Stephen King |

    | 5 | The Talisman | Peter Straub & Stephen King |

    | 6 | The Long Earth | Stephen Baxter & Terry Pratchett |

    | ~ 23 行 ~ |


    主示例数据库不包含多位作者，仅仅是因为在经典文学中这种情况不够频繁，不值得因此而使示例复杂化。


    然而，关键点在于，无论何时你有多个值，你都需要额外的表，而不是额外的列或复合列。多个值应该出现在行中，而不是列中。


    ## 向关联表中插入数据


    如你所见，一对一关系在 SQL 数据库中非常常见。当你需要在一个事务中向多个表添加数据时，这带来了额外的挑战。


    这些挑战包括：

    *   你可能需要在向子表（多）添加数据之前，先向父表（一）添加数据。这是因为子表会引用父表。

    *   向父表添加数据时，需要记住新的主键值。当主键由数据库自身生成时，这就变成了一个挑战，因此你需要获取新值。

    *   在此过程中，其中一个步骤可能会失败。这可能导致部分完成的操作，留下一些无效数据作为残留。


    在这里，我们将看看这在实践中是如何运作的。

    '
- fmt: '### Adding a Book and an Author


    The `books` collection is very light on works in the 20th century and contains
    nothing by Agatha Christie. Here, we will add one of her books.


    This will involve two tables: the `books` and the `authors` table as you see in
    Figure [3-8](#606708_1_En_3_Chapter.xhtml#Fig8).


    ![](images/606708_1_En_3_Chapter/606708_1_En_3_Fig8_HTML.jpg)


    Two tables, namely, `books` and `authors`, list the following details. `Books`
    include `i d`, `author i d`, `title`, `published`, and `price`. `Authors` include
    `i d`, `given name`, `other names`, `family name`, `born`, `died`, `gender`, `home`,
    and `index`.


    Figure 3-8


    Books and Authors


    To add a new book to the database


    1.  Check whether the author already exists in the `authors` table.

    2.  If not, add the author to the `authors` table.

    3.  If you have just added a new author, fetch its primary key.

    4.  Else fetch the primary key of the existing author.

    5.  Using this primary key, add the new book to the `books` table.


    First, we’ll check to see whether the author has already been added to the `authors`
    table:


    ```sql

    SELECT * FROM authors WHERE familyname=''Christie'';

    ```


    It appears not, so we’ll need to add her.


    #### Adding an Author


    In principle, you would add the new author with the following statement:


    ```sql

    --  Don''t run this yet:

    INSERT INTO authors(givenname, othernames, familyname,

    born, died, gender,home)

    VALUES(''Agatha'',''Mary Clarissa'',''Christie'',

    ''1890-09-15'',''1976-01-12'',''f'',

    ''Tourquay, Devon, England'');

    --  For Oracle, you need to precede the dates with the

    --  date keyword: date''1890-09-15'', date''1976-01-12''

    ```


    As the comment says, don’t run this statement yet. Because the author’s `id` is
    autogenerated, we’ll need to get the new `id` after inserting the row. You can
    do a search for it after adding the row, but it may be possible to have the DBMS
    tell you what the new `id` is.


    Different DBMSs have different methods of getting this `id`.


    For PostgreSQL, you can simply use a `RETURNING` clause at the end of the `INSERT`
    statement:


    ```sql

    --  PostgreSQL

    INSERT INTO authors(givenname, othernames, familyname,

    born, died, gender,home)

    VALUES(''Agatha'',''Mary Clarissa'',''Christie'',

    ''1890-09-15'',''1976-01-12'',''f'',

    ''Tourquay, Devon, England'')

    RETURNING id;   --  Take note of this!

    ```


    For MySQL/MariaDB, Microsoft SQL, and SQLite, you run a separate function after
    the event. Note that you should run *both* statements together by highlighting
    both before you run:


    ```sql

    --  MSSQL: Select both statements and run:

    INSERT INTO authors(givenname, othernames, familyname,

    born, died, gender,home)

    VALUES(''Agatha'',''Mary Clarissa'',''Christie'',

    ''1890-09-15'',''1976-01-12'',''f'',

    ''Tourquay, Devon, England'');

    SELECT scope_identity();        --  Take note of this!

    --  MySQL / MariaDB: Select both statements and run:

    INSERT INTO authors(givenname, othernames, familyname,

    born, died, gender,home)

    VALUES(''Agatha'',''Mary Clarissa'',''Christie'',

    ''1890-09-15'',''1976-01-12'',''f'',

    ''Tourquay, Devon, England'');

    SELECT last_insert_id();        --  Take note of this!

    --  SQLite: Select both statements and run:

    INSERT INTO authors(givenname, othernames, familyname,

    born, died, gender,home)

    VALUES(''Agatha'',''Mary Clarissa'',''Christie'',

    ''1890-09-15'',''1976-01-12'',''f'',

    ''Tourquay, Devon, England'');

    SELECT last_insert_rowid();     --  Take note of this!

    ```


    The additional `SELECT` statements earlier all fetch the newly generated `id`.


    Oracle, on the other hand, makes it pretty tricky. It does support a `RETURNING`
    clause, but only into variables. You can get the newly generated `id`, but that
    involves some extra trickery in hunting for sequences. The simplest method really
    is to select the row you’ve just inserted using data you’ve just entered:


    ```sql

    --  Oracle

    INSERT INTO authors(givenname, othernames, familyname,

    born, died, gender,home)

    VALUES(''Agatha'',''Mary Clarissa'',''Christie'',

    date ''1890-09-15'',date ''1976-01-12'',''f'',

    ''Tourquay, Devon, England'');

    SELECT id FROM authors

    WHERE givenname=''Agatha'' AND othernames=''Mary Clarissa''

    AND familyname=''Christie'';

    ```


    Of course, you don’t necessarily need to filter all of the new values: just enough
    to be sure you’ve got the right one.


    #### Adding a Book


    After that, the rest is easy.


    Whether or not you have just added the new author, you can simply search for the
    `authors` table to get the author `id`:


    ```sql

    SELECT * FROM authors WHERE familyname=''Christie'';

    ```


    Taking note of the `id` in particular, you can insert the book with the following
    statement:


    ```sql

    --  Use the author''s id:

    INSERT INTO books(authorid,title,published,price)

    VALUES ( ... , ''The Mysterious Affair at Styles'',

    1920, 16.00);

    ```


    Of course, you will need to supply the correct `id` in the preceding statement,
    either from the `INSERT` statements in the previous section or from the `SELECT`
    statement earlier.


    Note that we’ve picked an arbitrary value of `16.00` for the price. It didn’t
    need the decimal part, of course, but it makes the purpose clearer.


    ### Adding a New Sale


    Adding a book is simple enough, but tedious. Adding a new sale, however, adds
    another level of complexity. Remember that a sale comprises a row in the `sales`
    table and one or more rows in the `saleitems` table, as you see in Figure [3-9](#606708_1_En_3_Chapter.xhtml#Fig9).


    ![](images/606708_1_En_3_Chapter/606708_1_En_3_Fig9_HTML.jpg)


    Two tables, namely, `sales` and `sales items`, list the following details. `Sales`
    include `i d`, `customer i d`, `total`, `ordered`, and `shipped`. `Sales items`
    include `i d`, `sale i d`, `book i d`, `quantity`, `price`, and `check`.


    Figure 3-9


    Sales and Sale Items


    The process would be


    1.  Create a new row in the `sales` table.

    2.  Fetch the primary key of the new sale.

    3.  Add one or more rows in the `saleitems` table, using the previous primary
    key to refer to the new sale. This will include the `bookid` and `quantity`, but
    the `price` will need to be fetched separately.

    4.  For each sale item, fetch the price of each item from the `books` table, using
    the `bookid`.

    5.  Update the new sale with the total value of the new sale items.


    Here, we will work with adding a new sale.


    For our sample data, we’ll use the following values:


    | **Data** | **Value** |

    | --- | --- |

    | Customer ID | `42` |

    | Book IDs | `123, 456, 789` |

    | Quantities | `3, 2, 1` |


    We’ll also use `current_timestamp` for the date.


    #### Adding a New Sale in the Sales Table


    Adding the main sale is the easy part, but, again, we’ll need the new `id`. To
    add a sale, we can use


    ```sql

    --  PostgreSQL

    INSERT INTO sales(customerid, ordered)

    VALUES (42,current_timestamp)

    RETURNING id;

    --  MSSQL

    INSERT INTO sales(customerid, ordered)

    VALUES (42,current_timestamp);

    SELECT scope_identity();

    --  MySQL / MariaDB

    INSERT INTO sales(customerid, ordered)

    VALUES (42,current_timestamp);

    SELECT last_insert_id();

    --  SQLite

    INSERT INTO sales(customerid, ordered)

    VALUES (42,current_timestamp);

    SELECT last_insert_rowid();

    --  Oracle

    INSERT INTO sales(customerid, ordered, total)

    VALUES (42,current_timestamp,0);

    SELECT id FROM sales WHERE id=42 AND total=0;

    ```


    For Oracle, we’ve taken a slightly different approach in including a dummy `total`
    of `0`. When the sale is fully added, the value shouldn’t be zero, so we’re using
    it as a temporary placeholder to help identify the new sale.


    Remember that we’ll need to remember the new sale `id`.'
