  trans: '

    ## 数据透视


    优秀数据库设计的一个重要原则是每列承担不同的职责。在此基础上，各列之间保持独立。这就是为什么我们在第 2 章中花费大量精力将城镇详情从`customers`表中分离出来的原因之一。


    然而，在某些情况下，这种设计并不适合分析。以典型的账目表为例：


    | **日期** | **描述** | **餐饮** | **交通** | **住宿** | **杂项** |

    | --- | --- | --- | --- | --- | --- |

    | . . . | . . . | . . . | . . . | . . . | . . . |

    | . . . | . . . | . . . | . . . | . . . | . . . |


    这种布局非常易于理解和分析。若想获取特定类别的总计，只需纵向相加该列。若想获取特定项目的总计，只需横向相加。在电子表格发明让计算机承担所有繁重工作之前，这类事情通常是手工完成的。


    你可能会在遇到的数据库表中见到这类设计。然而，对于 SQL 表来说，这并非好的设计方案：


    *   将一个值放入某列就排除了放入另一列的可能：各列之间存在深度依赖。

    *   最终会出现大量空白。

    *   新增类别意味着需要在表设计中添加新列。最终可能导致列数过多。

    *   数据分析变得更困难，因为现在需要跨*列*进行计算：SQL 聚合函数是设计用于跨*行*聚合的。


    更好的设计是：


    | **日期** | **描述** | **类别** | **金额** |

    | --- | --- | --- | --- |

    | . . . | . . . | . . . | . . . |

    | . . . | . . . | . . . | . . . |


    通常规则是：类别应置于行中，而非列中。


    尽管如此，能够将第二种形式的数据转换为第一种形式仍然很有用。你可以在演示文稿中使用它，并可能将其转化为出色的图表。


    ### 透视数据


    从第二种形式生成第一种结果被称为**数据透视**。其核心思想是让类别围绕轴心旋转（摆动），从纵向变为横向。


    如果在电子表格程序中读取数据，你可以简单地完成透视。不过，你也可以直接在数据库中生成透视数据，尽管过程不那么简单。


    在电子表格中生成透视表有以下优势：


    *   交互性更强，可以轻松更改透视和汇总的内容。

    *   电子表格会更自动生成类别；正如你将看到的，从数据库内部操作则不那么方便。

    *   离将其转化为图表仅一步之遥。


    另一方面，使用数据库有以下优势：


    *   数据在单一环境中生成。

    *   你可以创建视图，随时重新生成透视表。


    在 SQL 中生成透视表主要有两种方式：


    *   手动：使用`GROUP BY`子句，可以在多列上聚合数据。

    *   MSSQL 和 Oracle 内置了透视表功能来完成此任务。PostgreSQL 也有类似功能，但非内置，需要安装。


    由于数据透视的目的是创建汇总，你通常需要使用分组字段或自行对值进行分组。例如：


    *   可以使用现有的`state`列（它是地址的一个分组）。

    *   可以使用日期函数，如`month()`按月份对日期进行分组。

    *   可以使用字符串函数提取字符串的公共部分。


    透视表大致如下所示：


    | **行分组** | **列分组** | **列分组** | **列分组** |

    | --- | --- | --- | --- |

    | 组 1 | . . . | . . . | . . . |

    | 组 2 | . . . | . . . | . . . |

    | 组 3 | . . . | . . . | . . . |


    我们将看到如何对`sales`和`customers`表中的数据进行透视，以获取按州和 VIP 类别划分的销售总额。结果大致如下：


    | **州** | **金卡** | **银卡** | **铜卡** |

    | --- | --- | --- | --- |

    | . . . | . . . | . . . | . . . |

    | . . . | . . . | . . . | . . . |

    | . . . | . . . | . . . | . . . |


    原则上，你可以转置表格，让 VIP 组纵向排列，州横向排列。不过，当前这种版本看起来会更整洁。

    '
- fmt: '### Manually Pivoting Data


    As we’ve already seen before, you often need to prepare the data before you aggregate
    it. This particular summary will need data from four tables: `customers`, `towns`,
    `vip`, and `sales`. Fortunately, the `customerdetails` view already combines the
    `customers` and `towns` tables, so we can reduce the number to three.


    All the preparation will be done in multiple CTEs:


    *   The `vip` table has a status number. The `statuses` CTE will be a table literal
    which allocates a name to the number.

    *   The `customerinfo` CTE will join the tables together and select the columns
    we want to summarize.

    *   The `salesdata` will be an aggregate query which will be a first step in our
    pivot table summary.


    ```

    WITH

    statuses AS (

    ...

    ),

    customerinfo AS (

    ...

    ),

    salesdata AS (

    )

    ...

    ```


    With those CTEs, we’ll run another aggregate query which will result in our pivot
    table.


    The `status` CTE is simple. We just need to match status numbers with names:


    ```

    WITH

    statuses(status, statusname) As (

    --  PostgreSQL, SQLite, MariaDB (Not MySQL):

    VALUES (1,''Gold''), (2,''Silver''), (3,''Bronze'')

    --  MySQL:

    VALUES row(1,''Gold''), row(2,''Silver''),

    row(3,''Bronze'')

    --  MSSQL:

    SELECT * FROM (VALUES (1,''Gold''),(2,''Silver''),

    (3,''Bronze''))

    --  Oracle:

    SELECT 1,''Gold'' FROM dual

    UNION ALL SELECT 2,''Silver'' FROM dual

    UNION ALL SELECT 3,''Bronze'' FROM dual

    )

    ```


    The `customerinfo` CTE will join this to the `customerdetails` view and the `vip`
    table to get the id, state, and status name for the customers:


    ```

    WITH

    statuses(status, statusname) AS (

    ...

    ),

    customerinfo(id, state, statusname) AS (

    SELECT customerdetails.id, state, statuses.statusname

    FROM

    customerdetails

    LEFT JOIN vip ON customerdetails.id=vip.id

    LEFT JOIN statuses ON vip.status=statuses.status

    )

    SELECT *

    FROM customerinfo;

    ```


    If you test it now, you’ll get something like this:


    | **Id** | **state** | **statusname** |

    | --- | --- | --- |

    | 407 | NSW | Bronze |

    | 299 | QLD | Gold |

    | 21 | [NULL] | Gold |

    | 597 | TAS | [NULL] |

    | 106 | NSW | Gold |

    | 26 | VIC | Gold |

    | ~ 303 rows ~ |


    At this point, you can group it by `state` or `statusname` to see how many of
    each you have, but we’re more interested in the total sales.


    For that, we’ll need to join the preceding with the `sales` table in another CTE:


    ```

    WITH

    statuses(status, statusname) AS (

    ...

    ),

    customerinfo(id, state, statusname) AS (

    ...

    ),

    salesdata(state, statusname, total) AS (

    SELECT state, statusname, total

    FROM customerinfo JOIN sales

    ON customerinfo.id=sales.customerid

    )

    SELECT *

    FROM salesdata;

    ```


    Again, testing what we have so far, we get


    | **State** | **statusname** | **total** |

    | --- | --- | --- |

    | NSW | [NULL] | 56 |

    | NSW | Silver | 43.5 |

    | VIC | [NULL] | 70 |

    | QLD | [NULL] | 28 |

    | VIC | Gold | 24.5 |

    | VIC | [NULL] | 133 |

    | ~ 5294 rows ~ |


    All of this is just to get the data ready. What we’re going to do now is generate
    our group rows.


    Obviously, you’ll need an aggregate query, grouping by `state`. Normally, it would
    have looked something like this:


    ```

    WITH

    statuses(status, statusname) AS (

    ...

    ),

    customerinfo(id, state, statusname) AS (

    ...

    ),

    salesdata(state, statusname, total) AS (

    ...

    )

    SELECT state, sum(total)

    FROM salesdata

    GROUP BY state;

    ```


    to give us this:


    | **State** | **sum** |

    | --- | --- |

    | WA | 20274 |

    | ACT | 6781.5 |

    | TAS | 28193 |

    | VIC | 79199.5 |

    | NSW | 101889 |

    | NT | 6151 |

    | QLD | 53331.5 |

    | SA | 30977.5 |


    However, to get that ledger table appearance, we’ll use aggregate filters to generate
    three separate totals:


    ```

    WITH

    statuses(status, statusname) AS (

    ...

    ),

    customerinfo(id, state, statusname) AS (

    ...

    ),

    salesdata(state, statusname, total) AS (

    ...

    )

    SELECT

    state,

    sum(CASE WHEN statusname=''Gold'' THEN total END) AS gold,

    sum(CASE WHEN statusname=''Silver'' THEN total END)

    AS silver,

    sum(CASE WHEN statusname=''Bronze'' THEN total END)

    AS bronze

    FROM salesdata;

    ```


    This finally gives you the following:


    | **State** | **gold** | **silver** | **bronze** |

    | --- | --- | --- | --- |

    | WA | 213 | 1655 | [NULL] |

    | ACT | 1272.5 | [NULL] | [NULL] |

    | TAS | 4182.5 | 2203 | 2764.5 |

    | VIC | 8190 | 5875 | 5752.5 |

    | NSW | 11068.5 | 9319 | 10760.5 |

    | NT | [NULL] | [NULL] | 339.5 |

    | QLD | 5094 | 3522.5 | 10480 |

    | SA | 644 | 1390.5 | 3362 |


    You might be tempted to ask whether there’s an easier way to do it. The answer
    is not really. The hard part was always going to be the preparation of the data
    for pivoting.


    However, for a few DBMSs, the final step can be achieved with a built-in feature.


    ### Using the Pivot Feature (MSSQL, Oracle)


    MSSQL and Oracle both offer a non-standard `pivot` feature which simplifies generating
    the pivot table. It takes the following form:


    *   The *aggregate* is the aggregate function you want to apply. In this case,
    it’s `sum(total)`.

    *   The *column* is the column whose values you want across the table. In this
    case, it’s `statusname`.

    *   The *columnnames* is a list of values which will be the columns across the
    pivot table. In this case, it’s `Gold, Silver, Bronze`.

    *   The alias is any alias you want to give. It’s not used here, but it’s required.
    The pivot table is, after all, a virtual table.


    ```

    SELECT ...

    FROM ...

    PIVOT (aggregate FOR column IN(columnnames)) AS alias

    ```


    In our case, the pivot table will look like this:


    ```

    WITH

    statuses(status, statusname) AS (

    ...

    ),

    customerinfo(id, state, statusname) AS (

    ...

    ),

    salesdata(state, statusname, total) AS (

    ...

    )

    SELECT *

    FROM salesdata

    --  MSSQL:

    PIVOT (sum(total) FOR statusname IN (Gold, Silver, Bronze))

    AS whatever

    --  Oracle:

    PIVOT (sum(total) FOR statusname IN (''Gold'' AS Gold, ''Silver''

    AS Silver, ''Bronze'' AS Bronze))

    ;

    ```


    This is a little bit simpler than the filtered aggregates we used previously.
    However, note that there are some quirks with this technique.


    The syntax for MSSQL and Oracle is not identical:


    *   In MSSQL, the column names list is a plain list of names. Also, note that
    the `PIVOT` clause requires an alias.

    *   In Oracle, the list of column names is a list of strings; however, they are
    aliased to prevent the single quotes from appearing in the names. The `PIVOT`
    clause itself does not require an alias.


    You’ll notice that the `state` doesn’t make an appearance in the `PIVOT` clause;
    only the `statusname` and `total`. *Any column not mentioned in the* `PIVOT` *clause
    will appear as grouping rows.* You can have more complex pivot tables if there’s
    more than one such column, but you need to make sure that the (virtual) table
    you want to pivot doesn’t have any stray unwanted columns.


    You’ll also notice that the `IN` expression isn’t a normal `IN` expression. To
    begin with, it’s not a list of values, but a list of column names.


    On top of that, you can’t use a subquery to get the list of column names. You
    have to know ahead of time what the column names are going to be, and you’ll have
    to type them in yourself.


    Using the `pivot` feature is not quite as convenient as it might have been, but,
    if it’s available, is still simpler than the filtered aggregates. However, you
    will still need to put in some effort in preparing your data first.'
  raw: '### Manually Pivoting Data


    As we’ve already seen before, you often need to prepare the data before you aggregate
    it. This particular summary will need data from four tables: `customers`, `towns`,
    `vip`, and `sales`. Fortunately, the `customerdetails` view already combines the
    `customers` and `towns` tables, so we can reduce the number to three.


    All the preparation will be done in multiple CTEs:


    *   The `vip` table has a status number. The `statuses` CTE will be a table literal
    which allocates a name to the number.


    *   The `customerinfo` CTE will join the tables together and select the columns
    we want to summarize.


    *   The `salesdata` will be an aggregate query which will be a first step in our
    pivot table summary.


    ```

    WITH

    statuses AS (

    ...

    ),

    customerinfo AS (

    ...

    ),

    salesdata AS (

    )

    ...

    ```


    With those CTEs, we’ll run another aggregate query which will result in our pivot
    table.


    The `status` CTE is simple. We just need to match status numbers with names:


    ```

    WITH

    statuses(status, statusname) As (

    --  PostgreSQL, SQLite, MariaDB (Not MySQL):

    VALUES (1,''Gold''), (2,''Silver''), (3,''Bronze'')

    --  MySQL:

    VALUES row(1,''Gold''), row(2,''Silver''),

    row(3,''Bronze'')

    --  MSSQL:

    SELECT * FROM (VALUES (1,''Gold''),(2,''Silver''),

    (3,''Bronze''))

    --  Oracle:

    SELECT 1,''Gold'' FROM dual

    UNION ALL SELECT 2,''Silver'' FROM dual

    UNION ALL SELECT 3,''Bronze'' FROM dual

    )

    ```


    The `customerinfo` CTE will join this to the `customerdetails` view and the `vip`
    table to get the id, state, and status name for the customers:


    ```

    WITH

    statuses(status, statusname) AS (

    ...

    ),

    customerinfo(id, state, statusname) AS (

    SELECT customerdetails.id, state, statuses.statusname

    FROM

    customerdetails

    LEFT JOIN vip ON customerdetails.id=vip.id

    LEFT JOIN statuses ON vip.status=statuses.status

    )

    SELECT *

    FROM customerinfo;

    ```


    If you test it now, you’ll get something like this:


    | **Id** | **state** | **statusname** |

    | --- | --- | --- |

    | 407 | NSW | Bronze |

    | 299 | QLD | Gold |

    | 21 | [NULL] | Gold |

    | 597 | TAS | [NULL] |

    | 106 | NSW | Gold |

    | 26 | VIC | Gold |

    | ~ 303 rows ~ |


    At this point, you can group it by state or status name to see how many of each
    you have, but we’re more interested in the total sales.


    For that, we’ll need to join the preceding with the `sales` table in another CTE:


    ```

    WITH

    statuses(status, statusname) AS (

    ...

    ),

    customerinfo(id, state, statusname) AS (

    ...

    ),

    salesdata(state, statusname, total) AS (

    SELECT state, statusname, total

    FROM customerinfo JOIN sales

    ON customerinfo.id=sales.customerid

    )

    SELECT *

    FROM salesdata;

    ```


    Again, testing what we have so far, we get


    | **State** | **statusname** | **total** |

    | --- | --- | --- |

    | NSW | [NULL] | 56 |

    | NSW | Silver | 43.5 |

    | VIC | [NULL] | 70 |

    | QLD | [NULL] | 28 |

    | VIC | Gold | 24.5 |

    | VIC | [NULL] | 133 |

    | ~ 5294 rows ~ |


    All of this is just to get the data ready. What we’re going to do now is generate
    our group rows.


    Obviously, you’ll need an aggregate query, grouping by state. Normally, it would
    have looked something like this:


    ```

    WITH

    statuses(status, statusname) AS (

    ...

    ),

    customerinfo(id, state, statusname) AS (

    ...

    ),

    salesdata(state, statusname, total) AS (

    ...

    )

    SELECT state, sum(total)

    FROM salesdata

    GROUP BY state;

    ```


    to give us this:


    | **State** | **sum** |

    | --- | --- |

    | WA | 20274 |

    | ACT | 6781.5 |

    | TAS | 28193 |

    | VIC | 79199.5 |

    | NSW | 101889 |

    | NT | 6151 |

    | QLD | 53331.5 |

    | SA | 30977.5 |


    However, to get that ledger table appearance, we’ll use aggregate filters to generate
    three separate totals:


    ```

    WITH

    statuses(status, statusname) AS (

    ...

    ),

    customerinfo(id, state, statusname) AS (

    ...

    ),

    salesdata(state, statusname, total) AS (

    ...

    )

    SELECT

    state,

    sum(CASE WHEN statusname=''Gold'' THEN total END) AS gold,

    sum(CASE WHEN statusname=''Silver'' THEN total END)

    AS silver,

    sum(CASE WHEN statusname=''Bronze'' THEN total END)

    AS bronze

    FROM salesdata;

    ```


    This finally gives you the following:


    | **State** | **gold** | **silver** | **bronze** |

    | --- | --- | --- | --- |

    | WA | 213 | 1655 | [NULL] |

    | ACT | 1272.5 | [NULL] | [NULL] |

    | TAS | 4182.5 | 2203 | 2764.5 |

    | VIC | 8190 | 5875 | 5752.5 |

    | NSW | 11068.5 | 9319 | 10760.5 |

    | NT | [NULL] | [NULL] | 339.5 |

    | QLD | 5094 | 3522.5 | 10480 |

    | SA | 644 | 1390.5 | 3362 |


    You might be tempted to ask whether there’s an easier way to do it. The answer
    is not really. The hard part was always going to be the preparation of the data
    for pivoting.


    However, for a few DBMSs, the final step can be achieved with a built-in feature.


    ### Using the Pivot Feature (MSSQL, Oracle)


    MSSQL and Oracle both offer a non-standard pivot feature which simplifies generating
    the pivot table. It takes the following form:


    *   The *aggregate* is the aggregate function you want to apply. In this case,
    it’s `sum(total)`.


    *   The *column* is the column whose values you want across the table. In this
    case, it’s `statusname`.


    *   The *columnnames* is a list of values which will be the columns across the
    pivot table. In this case, it’s `Gold, Silver, Bronze`.


    *   The alias is any alias you want to give. It’s not used here, but it’s required.
    The pivot table is, after all, a virtual table.


    ```

    SELECT ...

    FROM ...

    PIVOT (aggregate FOR column IN(columnnames)) AS alias

    ```


    In our case, the pivot table will look like this:


    ```

    WITH

    statuses(status, statusname) AS (

    ...

    ),

    customerinfo(id, state, statusname) AS (

    ...

    ),

    salesdata(state, statusname, total) AS (

    ...

    )

    SELECT *

    FROM salesdata

    --  MSSQL:

    PIVOT (sum(total) FOR statusname IN (Gold, Silver, Bronze))

    AS whatever

    --  Oracle:

    PIVOT (sum(total) FOR statusname IN (''Gold'' AS Gold, ''Silver''

    AS Silver, ''Bronze'' AS Bronze))

    ;

    ```


    This is a little bit simpler than the filtered aggregates we used previously.
    However, note that there are some quirks with this technique.


    The syntax for MSSQL and Oracle is not identical:


    *   In MSSQL, the column names list is a plain list of names. Also, note that
    the `PIVOT` clause requires an alias.


    *   In Oracle, the list of column names is a list of strings; however, they are
    aliased to prevent the single quotes from appearing in the names. The `PIVOT`
    clause itself does not require an alias.


    You’ll notice that the `state` doesn’t make an appearance in the `PIVOT` clause;
    only the `statusname` and `total`. *Any column not mentioned in the* `PIVOT` *clause
    will appear as grouping rows.* You can have more complex pivot tables if there’s
    more than one such column, but you need to make sure that the (virtual) table
    you want to pivot doesn’t have any stray unwanted columns.


    You’ll also notice that the `IN` expression isn’t a normal `IN` expression. To
    begin with, it’s not a list of values, but a list of column names.


    On top of that, you can’t use a subquery to get the list of column names. You
    have to know ahead of time what the column names are going to be, and you’ll have
    to type them in yourself.


    Using the pivot feature is not quite as convenient as it might have been, but,
    if it’s available, is still simpler than the filtered aggregates. However, you
    will still need to put in some effort in preparing your data first.'
  trans: '

    ### 手动进行数据透视


    正如我们之前所见，通常在聚合数据之前需要先进行准备。这个特定的数据汇总将需要来自四张表的数据：`customers`（客户）、`towns`（城镇）、`vip`（贵宾）和`sales`（销售）。幸运的是，`customerdetails`（客户详情）视图已经合并了`customers`和`towns`表，因此我们可以将需要处理的表数量减少到三张。


    所有的准备工作将在多个公用表表达式（CTE）中完成：


    *   `vip`表包含一个状态编号。`statuses` CTE 将是一个字面量表，它将名称分配给编号。

    *   `customerinfo` CTE 将连接各个表并选择我们需要汇总的列。

    *   `salesdata`将是一个聚合查询，这将是我们数据透视表汇总的第一步。


    ```

    WITH

    statuses AS (

    ...

    ),

    customerinfo AS (

    ...

    ),

    salesdata AS (

    )

    ...

    ```


    有了这些 CTE，我们将运行另一个聚合查询，从而生成我们的数据透视表。


    `status` CTE 很简单。我们只需要将状态编号与名称进行匹配：


    ```

    WITH

    statuses(status, statusname) As (

    --  PostgreSQL, SQLite, MariaDB (Not MySQL):

    VALUES (1,''Gold''), (2,''Silver''), (3,''Bronze'')

    --  MySQL:

    VALUES row(1,''Gold''), row(2,''Silver''),

    row(3,''Bronze'')

    --  MSSQL:

    SELECT * FROM (VALUES (1,''Gold''),(2,''Silver''),

    (3,''Bronze''))

    --  Oracle:

    SELECT 1,''Gold'' FROM dual

    UNION ALL SELECT 2,''Silver'' FROM dual

    UNION ALL SELECT 3,''Bronze'' FROM dual

    )

    ```


    `customerinfo` CTE 将把这个状态表与`customerdetails`视图和`vip`表连接起来，以获取客户的 ID、州（state）和状态名称：


    ```

    WITH

    statuses(status, statusname) AS (

    ...

    ),

    customerinfo(id, state, statusname) AS (

    SELECT customerdetails.id, state, statuses.statusname

    FROM

    customerdetails

    LEFT JOIN vip ON customerdetails.id=vip.id

    LEFT JOIN statuses ON vip.status=statuses.status

    )

    SELECT *

    FROM customerinfo;

    ```


    如果现在进行测试，你会得到类似这样的结果：


    | **Id** | **state** | **statusname** |

    | --- | --- | --- |

    | 407 | NSW | Bronze |

    | 299 | QLD | Gold |

    | 21 | [NULL] | Gold |

    | 597 | TAS | [NULL] |

    | 106 | NSW | Gold |

    | 26 | VIC | Gold |

    | ~ 303 行 ~ |


    此时，你可以按`state`或`statusname`进行分组，查看每种状态的数量，但我们更感兴趣的是销售总额。


    为此，我们需要在另一个 CTE 中，将前面的结果与`sales`表连接起来：


    ```

    WITH

    statuses(status, statusname) AS (

    ...

    ),

    customerinfo(id, state, statusname) AS (

    ...

    ),

    salesdata(state, statusname, total) AS (

    SELECT state, statusname, total

    FROM customerinfo JOIN sales

    ON customerinfo.id=sales.customerid

    )

    SELECT *

    FROM salesdata;

    ```


    再次测试我们目前得到的结果，会得到：


    | **State** | **statusname** | **total** |

    | --- | --- | --- |

    | NSW | [NULL] | 56 |

    | NSW | Silver | 43.5 |

    | VIC | [NULL] | 70 |

    | QLD | [NULL] | 28 |

    | VIC | Gold | 24.5 |

    | VIC | [NULL] | 133 |

    | ~ 5294 行 ~ |


    所有这些只是为了准备好数据。我们现在要做的是生成分组行。


    显然，你需要一个聚合查询，按`state`分组。通常，它看起来会是这样：


    ```

    WITH

    statuses(status, statusname) AS (

    ...

    ),

    customerinfo(id, state, statusname) AS (

    ...

    ),

    salesdata(state, statusname, total) AS (

    ...

    )

    SELECT state, sum(total)

    FROM salesdata

    GROUP BY state;

    ```


    这样会得到：


    | **State** | **sum** |

    | --- | --- |

    | WA | 20274 |

    | ACT | 6781.5 |

    | TAS | 28193 |

    | VIC | 79199.5 |

    | NSW | 101889 |

    | NT | 6151 |

    | QLD | 53331.5 |

    | SA | 30977.5 |


    然而，为了获得那种分类账表格的外观，我们将使用聚合过滤器来生成三个独立的总计：


    ```

    WITH

    statuses(status, statusname) AS (

    ...

    ),

    customerinfo(id, state, statusname) AS (

    ...

    ),

    salesdata(state, statusname, total) AS (

    ...

    )

    SELECT

    state,

    sum(CASE WHEN statusname=''Gold'' THEN total END) AS gold,

    sum(CASE WHEN statusname=''Silver'' THEN total END)

    AS silver,

    sum(CASE WHEN statusname=''Bronze'' THEN total END)

    AS bronze

    FROM salesdata;

    ```


    这最终会给你以下结果：


    | **State** | **gold** | **silver** | **bronze** |

    | --- | --- | --- | --- |

    | WA | 213 | 1655 | [NULL] |

    | ACT | 1272.5 | [NULL] | [NULL] |

    | TAS | 4182.5 | 2203 | 2764.5 |

    | VIC | 8190 | 5875 | 5752.5 |

    | NSW | 11068.5 | 9319 | 10760.5 |

    | NT | [NULL] | [NULL] | 339.5 |

    | QLD | 5094 | 3522.5 | 10480 |

    | SA | 644 | 1390.5 | 3362 |


    你可能会忍不住问，是否有更简单的方法。答案是，其实没有。困难的部分始终在于为数据透视准备数据。


    不过，对于少数几种数据库管理系统（DBMS），最后一步可以通过内置功能来实现。


    ### 使用透视功能（MSSQL, Oracle）


    MSSQL 和 Oracle 都提供了一个非标准的`pivot`功能，可以简化数据透视表的生成。它采用以下形式：


    *   *聚合*是你想要应用的聚合函数。在这里，是`sum(total)`。

    *   *列*是其值将横跨表格显示的列。在这里，是`statusname`。

    *   *列名列表*是一组值，这些值将成为数据透视表中的列标题。在这里，是`Gold, Silver, Bronze`。

    *   别名是你想指定的任何别名。这里虽然用不到，但它是必需的。毕竟，数据透视表是一个虚拟表。


    ```

    SELECT ...

    FROM ...

    PIVOT (aggregate FOR column IN(columnnames)) AS alias

    ```


    在我们的例子中，数据透视表将如下所示：


    ```

    WITH

    statuses(status, statusname) AS (

    ...

    ),

    customerinfo(id, state, statusname) AS (

    ...

    ),

    salesdata(state, statusname, total) AS (

    ...

    )

    SELECT *

    FROM salesdata

    --  MSSQL:

    PIVOT (sum(total) FOR statusname IN (Gold, Silver, Bronze))

    AS whatever

    --  Oracle:

    PIVOT (sum(total) FOR statusname IN (''Gold'' AS Gold, ''Silver''

    AS Silver, ''Bronze'' AS Bronze))

    ;

    ```


    这比我们之前使用的过滤聚合稍微简单一些。但是请注意，这种技术有一些需要注意的地方。


    MSSQL 和 Oracle 的语法并不完全相同：


    *   在 MSSQL 中，列名列表是一个简单的名称列表。另外，请注意 `PIVOT` 子句需要一个别名。

    *   在 Oracle 中，列名列表是一个字符串列表；但是，它们被设置了别名，以防止名称中出现单引号。`PIVOT` 子句本身不需要别名。


    你会注意到 `state` 列没有出现在 `PIVOT` 子句中；只有 `statusname` 和 `total`。*任何未在* `PIVOT` *子句中提及的列都将作为分组行出现。*
    如果有不止一个这样的列，你可以制作更复杂的数据透视表，但你需要确保要进行透视的（虚拟）表没有任何多余的、不需要的列。


    你还会注意到 `IN` 表达式不是普通的 `IN` 表达式。首先，它不是一个值列表，而是一个列名列表。


    除此之外，你不能使用子查询来获取列名列表。你必须事先知道列名会是什么，并且必须自己手动输入它们。


    使用 `pivot` 功能并不像它可能做到的那样方便，但如果可用，它仍然比过滤聚合简单。然而，你仍然需要先在数据准备上投入一些精力。

