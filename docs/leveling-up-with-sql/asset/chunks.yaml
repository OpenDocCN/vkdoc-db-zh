    \ rows. There are three types of `OUTER JOIN`:\n    *   A `LEFT` or `RIGHT` join\
    \ includes unmatched rows from one of the joined tables.\n\n    *   A `FULL` join\
    \ includes unmatched rows from both tables.\n\n    *   A `NATURAL` join matches\
    \ two columns with identical names and doesn’t require an `ON` clause. It is particularly\
    \ useful in joining one-to-one tables. Not all DBMSs support this.\n\nThere is\
    \ also a `CROSS JOIN`, which combines every row in one table with every row in\
    \ the other. It’s not generally useful, but can be handy when you cross join with\
    \ a single row of variables.\n\n### Aggregates\n\nInstead of just fetching simple\
    \ data from the database tables, you can generate various summaries using aggregate\
    \ queries. Aggregate queries use one or more aggregate functions and imply some\
    \ groupings of the data.\n\nAggregate queries effectively transform the data into\
    \ a secondary summary table. With grand total aggregates, you can only select\
    \ summaries. You cannot also select non-aggregate values.\n\nThe main aggregate\
    \ functions include\n\n*   `count()`, which counts the number of rows or values\
    \ in a column\n\n*   `min()` and `max()` which fetch the first or last of the\
    \ values in sort order\n\nFor numbers, you also have\n\n*   `sum()`, `avg()`,\
    \ and `stdev()` (or `stddev()`) which perform the sum, average, and standard deviation\
    \ on a column of numbers\n\nWhen it comes to working with numbers, not all numbers\
    \ are used in the same way, so not all numbers should be summarized.\n\nFor strings,\
    \ you also have\n\n*   `string_agg()`, `group_concat()`, or `listagg()`, depending\
    \ on the DBMS, which concatenates strings in a column\n\nIn all cases, aggregate\
    \ functions only work with values: they all skip over `NULL`.\n\nYou can control\
    \ which values in a column are included:\n\n*   You can use `DISTINCT` to count\
    \ only one instance of each value.\n\n*   You can use `CASE ... END` to work as\
    \ a filter for certain values.\n\nWithout a `GROUP BY` clause, or using `GROUP\
    \ BY ()`, the aggregates are grand totals: you will get one row of summaries.\n\
    \nYou can also use `GROUP BY` to generate summaries in multiple groups. Each group\
    \ is distinct. When you do, you get summaries for each group, as well as additional\
    \ columns with the group values themselves.\n\nAggregates are not limited to single\
    \ tables:\n\n*   You can join multiple tables and aggregate the result.\n\n* \
    \  You can join an aggregate to one or more other tables.\n\nIn many cases, it\
    \ makes sense to work with your aggregates in more than one step. For that, it’s\
    \ convenient to put your first step into a common table expression, which is a\
    \ virtual table which can be used with the next step.\n\nWhen grouping your data,\
    \ sometimes you want to filter some of the groups. This is done with a `HAVING`\
    \ clause, which you add after the `GROUP BY` clause.\n\n### Working with Tables\n\
    \nTables are created using the `CREATE TABLE` statement. This statement includes\n\
    \n*   Column names\n\n*   Data types\n\n*   Other table and column properties\n\
    \nA table design can be changed afterward, such as adding triggers or indexes.\
    \ More serious changes, such as adding or dropping columns, can be effected using\
    \ `ALTER TABLE` statements.\n\n#### Data Types\n\nThere are three main types of\
    \ data:\n\n*   Numbers\n\n*   Strings\n\n*   Dates\n\nThere are many variations\
    \ of the preceding types which make data storage and processing more efficient\
    \ and help to validate the data values.\n\nThere are also additional types such\
    \ as boolean or binary data, which you won’t see so much in a typical database.\n\
    \n#### Constraints\n\nConstraints define what values are considered valid. Standard\
    \ constraints include\n\n*   `NOT NULL`\n\n*   `UNIQUE`\n\n*   `DEFAULT`\n\n*\
    \   Foreign keys (`REFERENCES`)\n\nYou can construct your own additional constraints\
    \ with the generic `CHECK` constraint. Here, you add a condition similar to a\
    \ `WHERE` clause which defines your own particular validation rule.\n\n#### Foreign\
    \ Keys\n\nA foreign key is a reference to another table and is also regarded as\
    \ a constraint, in that it limits values to those which match the other table.\n\
    \nThe foreign key is defined in the child table.\n\nA foreign key also affects\
    \ any attempt to delete a row from the parent table. By default, the parent row\
    \ cannot be deleted if there are matching child rows. However, this can be changed\
    \ to either (a) setting the foreign key to `NULL` or (b) cascading the delete\
    \ to all of the children.\n\n#### Indexes\n\nSince tables are not stored in any\
    \ particular order, they can be time consuming to search. An optional index can\
    \ be added for any column you routinely search, which makes searching much quicker.\n\
    \n### Manipulating Data\n\nData manipulation statements are used to add or change\
    \ data. In addition to the `SELECT` statement, there are\n\n*   `INSERT`: Add\
    \ new rows to the table\n\n*   `UPDATE`: Change the data in one or more rows in\
    \ the table\n\n*   `DELETE`: Delete one or more rows of the table\n\nLike SELECT,\
    \ the UPDATE and DELETE statements can be qualified with a WHERE clause to determine\
    \ which rows will be affected.\n\nUnlike `SELECT`, these have the potential to\
    \ make a mess of a database, especially since SQL doesn’t have an undo."
  trans: "\n### 类型转换\n\n你可以使用 `cast()` 来更改值的数据类型：\n\n*   你可以在主类型内部，更改为细节更多或更少的类型。\n\
    *   如果值与其他类型足够相似，你有时可以在主要类型之间进行转换。\n\n有时转换会自动执行，但有时你需要手动操作。\n\n一个你可能需要从字符串转换的情况是当你需要日期字面量时。由于字符串和日期字面量都使用单引号，SQL\
    \ 可能会将日期误认为是字符串。\n\n### 视图\n\n你可以通过创建视图将 `SELECT` 语句保存到数据库中。视图允许你将复杂的语句保存为虚拟表，以便以后以更简单的形式使用。\n\
    \n视图是构建有用语句集合的好方法。\n\n## 连接\n\n你经常会创建涉及来自多个表的数据的查询。连接通过附加来自其他表的对应行来有效地扩展表。\n\n\
    连接的基本语法是\n\n```sql\nSELECT columns\nFROM table JOIN table;\n```\n\n存在一种使用 `WHERE`\
    \ 子句的旧语法，但对于大多数连接来说它不那么有用。\n\n尽管表是成对连接的，但你可以连接任意数量的表以从任何相关表中获取结果。\n\n连接表时，最好区分列。如果表有共同的列名，这一点尤其重要：\n\
    \n*   你应该完全限定所有列名。\n*   使用表别名来简化名称很有帮助。然后这些别名可用于限定列。\n\n### ON 子句\n\n`ON` 子句用于描述一个表中的哪些行与另一个表中的哪些行连接，通过声明来自每个表的哪些列应该匹配来实现。\n\
    \n最明显的连接是从子表的外键到父表的主键。更复杂的连接也是可能的。\n\n你还可以创建匹配非固定关系列的 `临时` 连接。\n\n### 连接类型\n\n\
    默认的连接类型是 `INNER JOIN`。当未指定连接类型时，假定为 `INNER`：\n\n*   `INNER JOIN` 的结果仅包含有父行的子行。外键为\
    \ `NULL` 的行会被忽略。\n*   `OUTER JOIN` 是 `INNER JOIN` 与不匹配行的组合。`OUTER JOIN` 有三种类型：\n\
    \    *   `LEFT` 或 `RIGHT` 连接包含来自其中一个连接表的不匹配行。\n    *   `FULL` 连接包含来自两个表的不匹配行。\n\
    \    *   `NATURAL` 连接匹配两个名称相同的列，不需要 `ON` 子句。它在连接一对一的表时特别有用。并非所有数据库管理系统都支持此功能。\n\
    \n还有一种 `CROSS JOIN`，它将一个表中的每一行与另一个表中的每一行组合起来。它通常不太有用，但当你与单行变量进行交叉连接时可能很方便。\n\n\
    ## 聚合\n\n除了仅仅从数据库表中获取简单数据，你还可以使用聚合查询生成各种摘要。聚合查询使用一个或多个聚合函数，并暗示数据的某些分组。\n\n聚合查询有效地将数据转换为二级摘要表。使用总计聚合时，你只能选择摘要。你不能同时选择非聚合值。\n\
    \n主要的聚合函数包括\n\n*   `count()`，计算列中的行数或值的数量\n*   `min()` 和 `max()`，按排序顺序获取列中的第一个或最后一个值\n\
    \n对于数字，你还有\n\n*   `sum()`、`avg()` 和 `stdev()`（或 `stddev()`），它们对数字列执行求和、平均值和标准差运算\n\
    \n在处理数字时，并非所有数字的用法都相同，因此并非所有数字都应被汇总。\n\n对于字符串，你还有\n\n*   `string_agg()`、`group_concat()`\
    \ 或 `listagg()`（取决于数据库管理系统），它们连接列中的字符串\n\n在所有情况下，聚合函数只对值起作用：它们都会跳过 `NULL`。\n\n\
    你可以控制列中包含哪些值：\n\n*   你可以使用 `DISTINCT` 来仅计算每个值的一个实例。\n*   你可以使用 `CASE ... END`\
    \ 作为特定值的过滤器。\n\n如果没有 `GROUP BY` 子句，或者使用 `GROUP BY ()`，聚合就是总计：你将得到一行摘要。\n\n你也可以使用\
    \ `GROUP BY` 来生成多个组的摘要。每个组都是独立的。这样做时，你会得到每个组的摘要，以及包含组值本身的附加列。\n\n聚合不仅限于单个表：\n\n\
    *   你可以连接多个表并对结果进行聚合。\n*   你可以将一个聚合连接到一个或多个其他表。\n\n在许多情况下，分多步处理聚合是有意义的。为此，将第一步放入公用表表达式很方便，这是一种虚拟表，可以与下一步一起使用。\n\
    \n对数据进行分组时，有时你想要筛选某些组。这可以通过 `HAVING` 子句完成，该子句添加在 `GROUP BY` 子句之后。\n\n## 表操作\n\n\
    表是使用 `CREATE TABLE` 语句创建的。该语句包括\n\n*   列名\n*   数据类型\n*   其他表和列属性\n\n表设计可以稍后更改，例如添加触发器或索引。更严重的更改，例如添加或删除列，可以使用\
    \ `ALTER TABLE` 语句来实现。\n\n### 数据类型\n\n数据主要有三种类型：\n\n*   数字\n*   字符串\n*   日期\n\n\
    上述类型有许多变体，这使得数据存储和处理更加高效，并有助于验证数据值。\n\n还有一些额外的类型，如布尔型或二进制数据，在典型的数据库中不太常见。\n\n\
    ### 约束\n\n约束定义了哪些值被视为有效。标准约束包括\n\n*   `NOT NULL`\n*   `UNIQUE`\n*   `DEFAULT`\n\
    *   外键（`REFERENCES`）\n\n你可以使用通用的 `CHECK` 约束来构建自己的附加约束。在这里，你添加一个类似于 `WHERE` 子句的条件，该条件定义了你自己特定的验证规则。\n\
    \n### 外键\n\n外键是对另一个表的引用，也被视为一种约束，因为它将值限制为与另一个表匹配的值。\n\n外键在子表中定义。\n\n外键还会影响任何尝试从父表中删除行的操作。默认情况下，如果存在匹配的子行，则无法删除父行。但是，这可以更改为\
    \ (a) 将外键设置为 `NULL` 或 (b) 级联删除到所有子行。\n\n### 索引\n\n由于表不是按任何特定顺序存储的，因此搜索起来可能很耗时。可以为你经常搜索的任何列添加可选的索引，这会使搜索快得多。\n\
    \n## 数据操作\n\n数据操作语句用于添加或更改数据。除了 `SELECT` 语句外，还有\n\n*   `INSERT`：向表中添加新行\n*   `UPDATE`：更改表中一行或多行的数据\n\
    *   `DELETE`：删除表中一行或多行\n\n与 `SELECT` 一样，`UPDATE` 和 `DELETE` 语句可以用 `WHERE` 子句限定，以确定将影响哪些行。\n\
    \n与 `SELECT` 不同，它们有可能搞乱数据库，尤其是因为 SQL 没有撤销功能。\n"
- fmt: "# Set Operations\n\nIn SQL, tables are mathematical sets of rows. This means\
    \ that they contain no duplicates and are unordered. It also means that you can\
    \ combine tables and virtual tables with set operations.\n\nThere are three main\
    \ set operations:\n\n*   `UNION` combines two or more tables and results in all\
    \ of the rows, with any duplicates filtered out. If you want to keep the duplicates,\
    \ you use the `UNION ALL` clause.\n\n*   `INTERSECT` returns only the rows which\
    \ appear in all of the participating tables.\n\n*   `EXCEPT` (a.k.a. `MINUS` in\
    \ Oracle) returns the rows in the first table which are not also present in the\
    \ second.\n\nWhen applying a set operation, there are some rules regarding the\
    \ columns in each `SELECT` statement:\n\n*   The columns must match in number\
    \ and type.\n\n*   Only the names and aliases from first SELECT are used.\n\n\
    *   Only the values are matched, which means that if your various `SELECT`s change\
    \ the column order or select different columns, they will be matched if they are\
    \ compatible.\n\nA `SELECT` can include any of the standard clauses, such as `WHERE`\
    \ and `GROUP BY`, but not the `ORDER BY` clause. You can, however, sort the final\
    \ results with an `ORDER BY` at the end.\n\nSet operations can also be used for\
    \ special techniques, such as creating sample data, comparing result sets, and\
    \ combining aggregates.\n\n## Coming Up\n\nAs we said, we won’t presume that you’re\
    \ an expert in all of this. As we introduce the following chapters, we’ll also\
    \ recap some of the basic principles to help you steady your feet.\n\nIn the chapters\
    \ that follow, we’ll have a good look at working with the following ideas:\n\n\
    *   How to improve the reliability and efficiency of the database tables (Chapter\
    \ [2](#606708_1_En_2_Chapter.xhtml))\n\n*   How the tables are related to each\
    \ other and how to work with multiple tables (Chapter [3](#606708_1_En_3_Chapter.xhtml))\n\
    \n*   How to manipulate the values to get more value out of the values (Chapter\
    \ [4](#606708_1_En_4_Chapter.xhtml))\n\n*   How to summarize and analyze data\
    \ (Chapter [5](#606708_1_En_5_Chapter.xhtml))\n\n*   How we can save queries and\
    \ interim results (Chapter [6](#606708_1_En_6_Chapter.xhtml))\n\n*   How to mix\
    \ data from multiple tables and aggregates (Chapter [7](#606708_1_En_7_Chapter.xhtml))\n\
    \n*   How to work more complex queries by building on top of other queries (Chapters\
    \ [6](#606708_1_En_6_Chapter.xhtml), [7](#606708_1_En_7_Chapter.xhtml), and [9](#606708_1_En_9_Chapter.xhtml))\n\
    \n*   How to add running aggregates and ranking data to our datasets (Chapter\
    \ [8](#606708_1_En_8_Chapter.xhtml))\n\nIn Chapter [2](#606708_1_En_2_Chapter.xhtml),\
    \ we’ll make a few changes to the database tables and even add a few more tables\
    \ to improve its overall design. It won’t be perfect, but it will show how a database\
    \ can be further developed.\n\nFootnotes [1](#606708_1_En_1_Chapter.xhtml#Fn1_source)\n\
    \n# 2. Working with Table Design\n\nSQL databases are, or at least should be,\
    \ built on some pretty strong principles. Although these principles are sometimes\
    \ relaxed in real life, the database will be more reliable and more efficient\
    \ if they’re followed as far as possible.\n\nIn this chapter, we’re going to look\
    \ at parts of the existing database and how it can be improved using some of those\
    \ principles. We’ll look at\n\n*   The basic understanding of normal tables—tables\
    \ which have been constructed or reconstructed along the core principles\n\n*\
    \   Modifying tables to follow the principles more closely\n\n*   Improving the\
    \ reliability and integrity of the database by adding additional checks and constraints\n\
    \n*   Improving the performance of the database by adding indexes to help find\
    \ data more efficiently\n\nOf course, we won’t be able to make the table perfect:\
    \ that would take a long time and a lot of experience with the database. You mightn’t\
    \ even be in a position to do this with your database. However, we’ll be able\
    \ to get a better understanding of what makes a database work better.\n\n## Understanding\
    \ Normalized Tables\n\nOne of the first things to consider is how individual tables\
    \ are designed and constructed. The goal is to be sure that each piece of data\
    \ has a distinct and identifiable place and that the data is in its simplest form.\n\
    \nMathematicians have a term for anything in its purest form: they say it is `normal`.\
    \ As with so many mathematical terms, it probably doesn’t mean what it looks like:\
    \ it doesn’t mean that it’s common, but that it’s definitive.\n\nDeveloping a\
    \ database table often starts with a rough idea of the sort of data to be stored\
    \ and then goes through a process of **normalization**: examining the features\
    \ of the table and making changes to fit in better with the requirements of a\
    \ normal table.\n\nThere are various rules and levels of normalization. In general,\
    \ a normalized database meets the following requirements:\n\n*   Data is atomic.\n\
    \n    This means that data is broken down into its smallest practical parts.\n\
    \n*   Rows are unordered.\n\n    Of course, you will always see the rows in some\
    \ sort of order, but the row order is insignificant.\n\n*   Rows are unique.\n\
    \n    There shouldn’t be any genuine duplicates. Coincidences are, of course,\
    \ another matter.\n\n*   Rows are independent.\n\n    Whatever appears in one\
    \ row should have no effect on what appears in another row within the table.\n\
    \n*   Columns are independent of each other.\n\n    More technically, columns\
    \ are dependent only on the primary key.\n\n*   Columns are of a single type.\n\
    \n    You can’t mix data types in a single column. Strictly, you shouldn’t be\
    \ able to mix `domains`, which are sets of acceptable values, but SQL has a hard\
    \ time checking that.\n\n*   Column names are unique.\n\n*   Columns are unordered.\n\
    \n    Again, columns will appear in some sort of order—by default, in the order\
    \ in which the table is designed. However, the column order is insignificant.\n\
    \nOne of the design problems that normalization addresses deals with multiple\
    \ values. If data is to be atomic, and columns are to be independent, how do you\
    \ manage multiple values? For example, how do you handle sales with multiple sale\
    \ items or books with multiple genres?\n\nThe solution is to put these values\
    \ into a separate table, one value per row, and let the table refer back to the\
    \ first table. We will be looking at the relationships between tables, especially\
    \ in handling multiple values, in the next chapter. The basic idea will be that\
    \ an additional table will hold multiple values in multiple rows; it will then\
    \ include a `foreign key`, a reference to a primary key in the first table.\n\n\
    In this chapter, we’ll look at some of these principles and see how our database\
    \ compares against them. When we do find shortcomings, we’ll make some changes\
    \ to the tables themselves and even add a few more tables to make the database\
    \ more conformant to these ideas. We’ll also look at ways of ensuring that the\
    \ data is more reliable and, to some extent, more efficient.\n\nWe’ll begin by\
    \ addressing problems with interdependent columns, which will mean changing some\
    \ tables. It will also mean adding additional tables. To make these changes less\
    \ inconvenient, we’ll look at creating views to take in the additional tables.\n\
    \nWe’ll also look at how to work toward a more reliable database by adding additional\
    \ constraints—data rules—to check what goes into the table in the first place.\n\
    \nFinally, we’ll look at adding indexes to improve the performance of the database.\n\
    \nWhen it comes to the question of multiple values, we’ll see more on that in\
    \ the next chapter, which deals with how tables are related with each other.\n\
    \nNo database is perfect, and it won’t be our aim to make this one perfect: we’ll\
    \ leave a lot of work undone. It’s also quite likely not your job anyway. However,\
    \ at least we’ll get a better understanding of what makes a good database work."
