  trans: '

    ## 多对多关系


    要表示表之间的多对多关系，你需要另一张表来连接这两张表。


    这样的表被称为**关联**表或**桥接**表。


    其结构如图 3-7 所示。


    ![](img/606708_1_En_3_Fig7_HTML.jpg)


    三个方块，即 books（书籍）、book genres（书籍流派）和 genres（流派），描述了多对多关系。books 的 i d P K 连接到 book
    genres 的 book i d F K，以及 genres 的 i d P K。


    图 3-7


    一个多对多关系


    以下是两个表摘录来说明这一点：


    ```

    --  书籍表

    CREATE TABLE books (

    id int PRIMARY KEY,

    title varchar,

    --  等等

    );

    --  流派表

    CREATE TABLE genres (

    id int PRIMARY KEY,

    name varchar,

    description varchar

    --  等等

    );

    ```


    `genres` 表包含一个代理主键。它还包含实际的流派名称和描述，以便明确该特定流派的用途。


    你可以使用简单的 `SELECT` 语句查看这两个表的内容：


    ```

    SELECT * FROM books;

    SELECT * FROM genres;

    ```


    你会看到两组明显不相关的数据：


    | **id** | **authorid** | **title** | **published** | **price** |

    | --- | --- | --- | --- | --- |

    | 2078 | 765 | The Duel | 1811 | 12.5 |

    | 503 | 128 | Uncle Silas | 1864 | 17 |

    | 2007 | 99 | North and South | 1854 | 17.5 |

    | 702 | 547 | Jane Eyre | 1847 | 17.5 |

    | 1530 | 28 | Robin Hood, The Prince of Thieves | 1862 | 12.5 |

    | 1759 | 17 | La Curée | 1872 | 16 |

    | ~ 1201 行 ~ |

    | **id** | **Genre** |

    | 1 | Biology |

    | 2 | Ancient History |

    | 3 | Academia |

    | 4 | Science |

    | 5 | College |

    | 6 | Comics |

    | ~ 166 行 ~ |


    这两个表都没有引用对方。因此，你需要一个额外的表。


    **关联**表将把书籍与流派连接起来：


    ```

    --  关联表

    CREATE TABLE book_genres (

    bookid int REFERENCES books(id),

    genreid int REFERENCES genres(id)

    );

    ```


    你可以通过以下语句查看此表的内容：


    ```

    SELECT * FROM bookgenres;

    ```


    你会得到一个非常简单、非常枯燥的结果：


    | **bookid** | **Genreid** |

    | --- | --- |

    | 456 | 8 |

    | 789 | 8 |

    | 123 | 52 |

    | 456 | 38 |

    | 789 | 38 |

    | 123 | 80 |

    | 456 | 94 |

    | 356 | 1 |

    | 789 | 113 |

    | 123 | 9 |

    | 1914 | 1 |

    | 936 | 1 |

    | 1198 | 1 |

    | 918 | 1 |

    | 456 | 35 |

    | 789 | 68 |

    | 456 | 146 |

    | 789 | 80 |

    | 456 | 101 |

    | 456 | 145 |

    | 1618 | 2 |

    | 844 | 3 |

    | ~ 8011 行 ~ |


    这个表是一个简单的表，它只有一个任务：记录哪些书籍与哪些流派相关。


    每一列都必须是另一个表的外键；否则，关联的整个意义就丧失了。这种关联允许一本书与多个流派相关联，一个流派也可以与多本书相关联。


    例如，在上表中，书籍 `123` 有多个流派。书籍 `456` 也有两个流派。其中一些流派同时出现在这两本书中，并且，据我们所知，以后可能还会出现在其他书中。也就是说，一本书可以有多个流派，一个流派也可以与多本书相关联。


    还有一个要求。组合应该是唯一的。将一本书与同一个流派关联多次是没有意义的。由于表中没有其他数据，将组合设为复合主键是合适的：


    ```

    --  关联表

    CREATE TABLE book_genres (

    bookid int REFERENCES books(id),

    genreid int REFERENCES genres(id),

    PRIMARY KEY (bookid,genreid)

    );

    ```


    我们*可能*会这样设计表：


    ```

    CREATE TABLE bookgenres (

    id INT PRIMARY KEY,

    bookid INT REFERENCES books(id),

    genreid INT REFERENCES genres(id),

    UNIQUE (bookid,genreid)

    );

    ```


    这个设计在书籍/流派组合上有一个 `UNIQUE` 约束，以及一个单独的主键。然而，根据定义，主键已经是唯一的，因此我们可以使用像之前那样更紧凑的设计。


    请注意，这是主键不是单列而是列组合的少数情况之一。因此，`PRIMARY KEY` 是单独添加到各个列上的。


    ## 连接多对多表


    要查看书籍和流派之间的关系，你需要通过关联表来连接这两个表。


    通常，你会考虑计算子表中的行数来估计连接结果的数量。在这种情况下，关联表是其他两个表的子表。


    计算行数：


    ```

    SELECT count(*) FROM bookgenres;

    ```


    我们现在已经知道结果了：


    | **Count** |

    | 8011 |


    要连接表，你只需要一个 `INNER JOIN`：


    ```

    SELECT *

    FROM

    bookgenres AS bg

    JOIN books AS b ON bg.bookid=b.id

    JOIN genres AS g ON bg.genreid=g.id

    ;

    ```


    这会给出一个非常长的列表，因为 `bookgenres` 表非常长：


    | **bookid** | **genreid** | **id** | **title** | **...** | **id** | **Genre**
    |

    | --- | --- | --- | --- | --- | --- | --- |

    | 1732 | 8 | 1732 | In His Steps | ... | 8 | Fiction |

    | 414 | 8 | 414 | Poesies | ... | 8 | Fiction |

    | 241 | 106 | 241 | Researches in Teutoni… | ... | 106 | Fantasy |

    | 247 | 153 | 247 | The King in Yellow | ... | 153 | Gothic |

    | 1914 | 38 | 1914 | Voyage of the Beagle | ... | 38 | Classics |

    | 936 | 38 | 936 | The Origin of Species | ... | 38 | Classics |

    | ~ 8011 行 ~ |


    这里，我们从中间开始连接，因为我们关注的是关联表。你也可以很容易地从一端开始：


    ```

    SELECT *

    FROM

    books AS b

    JOIN bookgenres AS bg ON b.id=bg.bookid

    JOIN genres AS g ON bg.genreid=g.id

    ;

    ```


    你会得到相同的数据，但由于表的顺序不同，列的顺序也会不同。


    实际上，你最终会得到太多的列，其中两列因为连接而重复。你可以简化结果如下：


    ```

    SELECT b.id, b.title, g.genre

    FROM

    bookgenres AS bg

    JOIN books AS b ON bg.bookid=b.id

    JOIN genres AS g ON bg.genreid=g.id

    ;

    ```


    你会得到一个更简洁的结果：


    | **id** | **title** | **Genre** |

    | --- | --- | --- |

    | 1732 | In His Steps | Fiction |

    | 414 | Poesies | Fiction |

    | 241 | Researches in Teutonic Mythology | Fantasy |

    | 247 | The King in Yellow | Gothic |

    | 1914 | Voyage of the Beagle | Classics |

    | 936 | The Origin of Species | Classics |

    | ~ 8011 行 ~ |


    书籍的 `id` 很重要，因为不同的书籍完全可能有相同的标题。


    既然你已经列出了特定的列，列的顺序就不再依赖于连接中表的顺序。


    就其本质而言，关联表不能为 `bookid` 或 `genreid` 包含 `NULL` 值。因此，不需要外连接。

    '
- fmt: '## Summarizing Multiple Values


    The resulting table earlier has a very large number of rows, and individual books
    appear multiple times, associated with different genres. You can combine multiple
    values using a `GROUP BY` query.


    This could get tricky, because you’re trying to summarize not a simple table,
    but a generated virtual table in the form of a join. You can do this in the form
    of a Common Table Expression:


    ```

    WITH cte AS (

    SELECT b.id, b.title, g.genre

    FROM bookgenres AS bg

    JOIN books AS b ON bg.bookid=b.id

    JOIN genres AS g ON bg.genreid=g.id

    )

    --etc

    ;

    ```


    A Common Table Expression (`CTE`) saves the results of a `SELECT` statement into
    a virtual table, so you can use those results in the next stage. You’ll see more
    on `CTE`s in Chapters [7](#606708_1_En_7_Chapter.xhtml) and [9](#606708_1_En_9_Chapter.xhtml).


    You can now summarize the `CTE` using two functions, `count()` and `string_agg()`:


    ```

    WITH cte AS (

    SELECT b.id, b.title, g.genre

    FROM

    bookgenres AS bg

    JOIN books AS b ON bg.bookid=b.id

    JOIN genres AS g ON bg.genreid=g.id

    )

    SELECT

    id, title,

    count(*) AS ncategories,        --  not really needed

    --  PostgreSQL, MSSQL

    string_agg(genre,'', '') AS genres

    --  MySQL / MariaDB

    --  group_concat(genre separator '', '') AS genres

    --  SQLite

    --  group_concat(genre, '', '') AS genres

    --  Oracle

    --  listagg(genre separator '', '') AS genres

    FROM cte

    GROUP BY id, title

    ORDER BY id;

    ```


    You now get a more compact list:


    | `id` | `title` | `ncategories` | `Genres` |

    | --- | --- | --- | --- |

    | 4 | Groundwork of th ... | 6 | Classics, German Literature, Non ... |

    | 5 | The Toilers of t ... | 7 | European Literature, French Lite ... |

    | 6 | The American Sen ... | 12 | Classic Literature, European Lit ... |

    | 7 | Songs of Innocen ... | 5 | 18th Century, Poetry, Classics, ... |

    | 9 | Behind a Mask, O ... | 8 | Literature, American, Historical ... |

    | 11 | Lady Susan ... | 4 | Romance, Historical Fiction, Cla ... |

    | ~ 1200 rows ~ |


    The `string_agg(column,separator)` function concatenates the values in the column
    using the separator in between. You’ll no doubt be surprised to learn that the
    `DBMS`s have variations on this function. As you see, in some `DBMS`s it is called
    `GROUP_CONCAT` or `listagg`.


    Note that we have grouped by both the book’s `id` and `title` columns. Since the
    `id` is a primary key, and therefore unique, there is normally no point in attempting
    to subgroup as before. However, this is a simple way of including the `title`
    for the `SELECT` clause, since the `SELECT` clause can only contain grouping columns
    and summaries.


    ## Combining the Joins


    Once we know how to handle books and authors, and books and genres, we can join
    them all together:


    ```

    --  Not SQLite

    SELECT

    b.id, b.title, b.published, b.price,

    g.genre,

    a.givenname, a.othernames, a.familyname,

    a.born, a.died, a.gender, a.home

    FROM

    authors AS a

    RIGHT JOIN books AS b ON a.id=b.authorid

    LEFT JOIN bookgenres AS bg ON b.id=bg.bookid

    JOIN genres AS g ON bg.genreid=g.id

    ;

    ```


    This will give a fairly comprehensive dataset:


    | `id` | `truncate` | `...` | `genre` | `givenname` | `othernames` | `familyname`
    | `...` |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 1732 | In His Steps ... | ... | Fiction | Charles | M. | Sheldon | ... |

    | 414 | Poesies ... | ... | Fiction | Stéphane |   | Mallarmé | ... |

    | 241 | Researches in Te ... | ... | Fantasy | Viktor |   | Rydberg | ... |

    | 247 | The King in Yell ... | ... | Gothic | Robert | W. | Chambers | ... |

    | 1914 | Voyage of the Be ... | ... | Classics | Charles |   | Darwin | ... |

    | 936 | The Origin of Sp ... | ... | Classics | Charles |   | Darwin | ... |

    | ~ 8011 rows ~ |


    In the preceding example, we have included most of the columns from the four tables,
    omitting the foreign keys and most of the other primary keys.


    The tables are joined in a line from the `authors` table to the `genres` table.
    Since we want all of the books, regardless of whether they have associated authors
    or genres, we use two outer joins. As it turns out, we see examples of each of
    the three main join types.


    `SQLite` doesn’t support the `RIGHT JOIN`, so this won’t work.


    You can write the joins starting from the `books` table if you like:


    ```

    SELECT

    b.id, b.title, b.published, b.price,

    g.genre,

    a.givenname, a.othernames, a.familyname,

    a.born, a.died, a.gender, a.home

    FROM

    books AS b

    LEFT JOIN bookgenres AS bg ON b.id=bg.bookid

    JOIN genres AS g ON bg.genreid=g.id

    LEFT JOIN authors AS a ON b.authorid=a.id

    ;

    ```


    Visually, this appears to put the emphasis on the `books` table, but it will give
    exactly the same results as before.


    This time, `SQLite` will be happy.


    However, there is an alternative, which takes advantage of the view previously
    created.


    First, you can replace the references to the individual `books` and `authors`
    tables with the `bookdetails` view:


    ```

    SELECT

    bd.id, bd.title, bd.published, bd.price,

    g.genre,

    bd.givenname, bd.othernames, bd.familyname,

    bd.born, bd.died, bd.gender, bd.home

    FROM

    bookdetails AS bd

    LEFT JOIN bookgenres AS bg ON bd.id=bg.bookid

    JOIN genres AS g ON bg.genreid=g.id;

    ```


    This is a simpler query, building on one you’ve already prepared. Note:


    *   The `bookdetails` view is aliased to `bd`.

    *   All of the columns come from the `bookdetails` view except for the `genre`,
    which comes from the `genres` table.


    If you want to combine the genre names, you can do that in a `CTE` and join the
    results with the view:


    ```

    WITH cte AS (

    SELECT bg.bookid, string_agg(g.genre,'', '') AS genres

    FROM bookgenres AS bg JOIN genres AS g ON bg.genreid=g.id

    GROUP BY bg.bookid

    )

    SELECT *

    FROM bookdetails AS b JOIN cte ON b.id=cte.bookid;

    ```


    You now get the complete genre details as well:


    | `id` | `title` | `...` | `genres` | `givenname` | `familyname` | `...` |

    | --- | --- | --- | --- | --- | --- | --- |

    | 4 | Groundwork of ... | ... | Classics, German ... | Immanuel | Kant | ... |

    | 5 | The Toilers ... | ... | European Literature ... | Victor | Hugo | ... |

    | 6 | The American ... | ... | Classic Literature ... | Anthony | Trollope | ...
    |

    | 7 | Songs of ... | ... | 18th Century, Poetry ... | William | Blake | ... |

    | 9 | Behind a Mask ... | ... | Literature, American ... | A.M. | Barnard | ...
    |

    | 11 | Lady Susan ... | ... | Romance, Historical ... | Jane | Austen | ... |

    | ~ 1200 rows ~ |


    You might want to filter the genres. You can do that inside the `CTE`.'
  raw: '### Summarizing Multiple Values


    The resulting table earlier has a very large number of rows, and individual books
    appear multiple times, associated with different genres. You can combine multiple
    values using a `GROUP BY` query.


    This could get tricky, because you’re trying to summarize not a simple table,
    but a generated virtual table in the form of a join. You can do this in the form
    of a Common Table Expression:


    ```

    WITH cte AS (

    SELECT b.id, b.title, g.genre

    FROM bookgenres AS bg

    JOIN books AS b ON bg.bookid=b.id

    JOIN genres AS g ON bg.genreid=g.id

    )

    --etc

    ;

    ```


    A Common Table Expression (CTE) saves the results of a `SELECT` statement into
    a virtual table, so you can use those results in the next stage. You’ll see more
    on CTEs in Chapters [7](#606708_1_En_7_Chapter.xhtml) and [9](#606708_1_En_9_Chapter.xhtml).


    You can now summarize the CTE using two functions, `count()` and `string_agg()`:


    ```

    WITH cte AS (

    SELECT b.id, b.title, g.genre

    FROM

    bookgenres AS bg

    JOIN books AS b ON bg.bookid=b.id

    JOIN genres AS g ON bg.genreid=g.id

    )

    SELECT

    id, title,

    count(*) AS ncategories,        --  not really needed

    --  PostgreSQL, MSSQL

    string_agg(genre,'', '') AS genres

    --  MySQL / MariaDB

    --  group_concat(genre separator '', '') AS genres

    --  SQLite

    --  group_concat(genre, '', '') AS genres

    --  Oracle

    --  listagg(genre separator '', '') AS genres

    FROM cte

    GROUP BY id, title

    ORDER BY id;

    ```


    You now get a more compact list:


    | **id** | **title** | **ncategories** | **Genres** |

    | --- | --- | --- | --- |

    | 4 | Groundwork of th ... | 6 | Classics, German Literature, Non ... |

    | 5 | The Toilers of t ... | 7 | European Literature, French Lite ... |

    | 6 | The American Sen ... | 12 | Classic Literature, European Lit ... |

    | 7 | Songs of Innocen ... | 5 | 18th Century, Poetry, Classics, ... |

    | 9 | Behind a Mask, O ... | 8 | Literature, American, Historical ... |

    | 11 | Lady Susan ... | 4 | Romance, Historical Fiction, Cla ... |

    | ~ 1200 rows ~ |


    The `string_agg(column,separator)` function concatenates the values in the column
    using the separator in between. You’ll no doubt be surprised to learn that the
    DBMSs have variations on this function. As you see, in some DBMSs it is called
    `GROUP_CONCAT` or `listagg`.


    Note that we have grouped by both the book’s `id` and `title` columns. Since the
    `id` is a primary key, and therefore unique, there is normally no point in attempting
    to subgroup as before. However, this is a simple way of including the `title`
    for the `SELECT` clause, since the `SELECT` clause can only contain grouping columns
    and summaries.


    ### Combining the Joins


    Once we know how to handle books and authors, and books and genres, we can join
    them all together:


    ```

    --  Not SQLite

    SELECT

    b.id, b.title, b.published, b.price,

    g.genre,

    a.givenname, a.othernames, a.familyname,

    a.born, a.died, a.gender, a.home

    FROM

    authors AS a

    RIGHT JOIN books AS b ON a.id=b.authorid

    LEFT JOIN bookgenres AS bg ON b.id=bg.bookid

    JOIN genres AS g ON bg.genreid=g.id

    ;

    ```


    This will give a fairly comprehensive dataset:


    | **id** | **truncate** | **...** | **genre** | **givenname** | **othernames**
    | **familyname** | **...** |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 1732 | In His Steps ... | ... | Fiction | Charles | M. | Sheldon | ... |

    | 414 | Poesies ... | ... | Fiction | Stéphane |   | Mallarmé | ... |

    | 241 | Researches in Te ... | ... | Fantasy | Viktor |   | Rydberg | ... |

    | 247 | The King in Yell ... | ... | Gothic | Robert | W. | Chambers | ... |

    | 1914 | Voyage of the Be ... | ... | Classics | Charles |   | Darwin | ... |

    | 936 | The Origin of Sp ... | ... | Classics | Charles |   | Darwin | ... |

    | ~ 8011 rows ~ |


    In the preceding example, we have included most of the columns from the four tables,
    omitting the foreign keys and most of the other primary keys.


    The tables are joined in a line from the `authors` table to the `genres` table.
    Since we want all of the books, regardless of whether they have associated authors
    or genres, we use two outer joins. As it turns out, we see examples of each of
    the three main join types.


    SQLite doesn’t support the `RIGHT JOIN`, so this won’t work.


    You can write the joins starting from the `books` table if you like:


    ```

    SELECT

    b.id, b.title, b.published, b.price,

    g.genre,

    a.givenname, a.othernames, a.familyname,

    a.born, a.died, a.gender, a.home

    FROM

    books AS b

    LEFT JOIN bookgenres AS bg ON b.id=bg.bookid

    JOIN genres AS g ON bg.genreid=g.id

    LEFT JOIN authors AS a ON b.authorid=a.id

    ;

    ```


    Visually, this appears to put the emphasis on the `books` table, but it will give
    exactly the same results as before.


    This time, SQLite will be happy.


    However, there is an alternative, which takes advantage of the view previously
    created.


    First, you can replace the references to the individual `books` and `authors`
    tables with the `bookdetails` view:


    ```

    SELECT

    bd.id, bd.title, bd.published, bd.price,

    g.genre,

    bd.givenname, bd.othernames, bd.familyname,

    bd.born, bd.died, bd.gender, bd.home

    FROM

    bookdetails AS bd

    LEFT JOIN bookgenres AS bg ON bd.id=bg.bookid

    JOIN genres AS g ON bg.genreid=g.id;

    ```


    This is a simpler query, building on one you’ve already prepared. Note:


    *   The `bookdetails` view is aliased to `bd`.


    *   All of the columns come from the `bookdetails` view except for the `genre`,
    which comes from the `genres` table.


    If you want to combine the genre names, you can do that in a CTE and join the
    results with the view:


    ```

    WITH cte AS (

    SELECT bg.bookid, string_agg(g.genre,'', '') AS genres

    FROM bookgenres AS bg JOIN genres AS g ON bg.genreid=g.id

    GROUP BY bg.bookid

    )

    SELECT *

    FROM bookdetails AS b JOIN cte ON b.id=cte.bookid;

    ```


    You now get the complete genre details as well:


    | **id** | **title** | **...** | **genres** | **givenname** | **familyname** |
    **...** |

    | --- | --- | --- | --- | --- | --- | --- |

    | 4 | Groundwork of ... | ... | Classics, German ... | Immanuel | Kant | ... |

    | 5 | The Toilers ... | ... | European Literature ... | Victor | Hugo | ... |

    | 6 | The American ... | ... | Classic Literature ... | Anthony | Trollope | ...
    |

    | 7 | Songs of ... | ... | 18th Century, Poetry ... | William | Blake | ... |

    | 9 | Behind a Mask ... | ... | Literature, American ... | A.M. | Barnard | ...
    |

    | 11 | Lady Susan ... | ... | Romance, Historical ... | Jane | Austen | ... |

    | ~ 1200 rows ~ |


