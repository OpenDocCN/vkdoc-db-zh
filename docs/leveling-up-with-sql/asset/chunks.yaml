  trans: '### 连接序列 CTE 以获取缺失值


    你可以将生成序列的递归 CTE 与另一个存在序列缺口的表或 CTE 进行`JOIN`，以填充缺失的值。


    例如，要获取每年出生的客户数量，某些年份的数据可能会缺失，但你仍然希望将这些缺失的年份也包含在内。


    首先，获取年份序列：


    ```sql

    --  PostgreSQL, MariaDB/MySQL, SQLite

    WITH RECURSIVE

    allyears(year) AS (

    SELECT 1940

    UNION

    SELECT year+1 FROM allyears WHERE year<2010

    )

    --  MSSQL, Oracle

    WITH

    allyears(year) AS (

    SELECT 1940

    UNION ALL

    SELECT year+1 FROM allyears WHERE year<2010

    )

    ```


    接下来，获取客户（`id`）及其出生年份：


    ```sql

    --  PostgreSQL, MariaDB/MySQL, Oracle

    yobs(yob) AS (

    SELECT id, EXTRACT(year FROM dob)

    FROM customers WHERE dob IS NOT NULL

    )

    --  MSSQL

    yobs(yob) AS (

    SELECT id, year(dob)

    FROM customers WHERE dob IS NOT NULL

    )

    --  SQLite

    yobs(yob) AS (

    SELECT id, strftime(''%Y'',dob)

    FROM customers WHERE dob IS NOT NULL

    )

    ```


    最后，将它们进行`JOIN`并获取聚合结果：


    ```sql

    WITH RECURSIVE  --  MSSQL, Oracle: 无 RECURSIVE

    allyears(year) AS ( ),

    yobs AS ( )

    SELECT allyears.year, count(*) AS nums

    FROM allyears LEFT JOIN yobs ON allyears.year=yobs.yob

    GROUP BY allyears.year

    ORDER BY allyears.year;

    ```


    你需要使用`LEFT JOIN`来包含所有的年份序列，即使某一年没有匹配到客户数据；毕竟，这正是使用它的原因。


    | `year` | `nums` |

    | --- | --- |

    | 1940 | 1 |

    | 1941 | 1 |

    | 1942 | 1 |

    | 1943 | 1 |

    | 1944 | 1 |

    | 1945 | 1 |

    | ~ 共 71 行 ~ | |


    我们将对销售数据进行同样的处理。


    ### 包含缺失日期的每日对比


    同样的方法也适用于缺失的日期。在第 8 章中，我们生成了每日销售摘要。然后我们创建了一个包含可用每日销售数据的视图。我们可以从该视图中进行选择：


    ```sql

    SELECT *

    FROM daily_sales

    ORDER BY ordered_date;

    ```


    你会得到类似这样的结果：


    | `ordered_date` | `ordered_month` | `daily_total` |

    | --- | --- | --- |

    | 2022-04-08 | 2022-04 | 97.5 |

    | 2022-04-09 | 2022-04 | 96 |

    | 2022-04-10 | 2022-04 | 191 |

    | 2022-04-11 | 2022-04 | 201.5 |

    | 2022-04-12 | 2022-04 | 91 |

    | 2022-04-13 | 2022-04 | 160 |

    | ~ 共 385 行 ~ |   |   |


    然而，如果你仔细查看，会发现一些日期缺失了。我们正准备填补这些空缺。


    为此，我们需要以下内容：

    *   `daily_sales` 视图

    *   一个包含每日销售首尾日期的 CTE

    *   一个日期序列


    你已经知道如何生成日期序列了。这次，我们不在任意日期开始和停止，而是根据`daily_sales`视图的最早和最晚日期来开始和停止。我们可以将这些值放入一个
    CTE 中以便引用：


    ```sql

    WITH

    vars(first_date, last_date) AS (

    SELECT min(ordered_date), max(ordered_date)

    FROM daily_sales

    )

    ```


    现在我们可以使用这些值来生成日期序列：


    ```sql

    --  PostgreSQL

    WITH RECURSIVE

    vars(first_date, last_date) AS ( ),

    dates(d) AS (

    SELECT first_date FROM vars

    UNION

    SELECT d+1 FROM vars, dates WHERE d<last_date

    )

    --  MariaDB / MySQL

    WITH RECURSIVE

    vars(first_date, last_date) AS ( ),

    dates(d) AS (

    SELECT first_date FROM vars

    UNION

    SELECT date_add(d, interval 1 day)

    FROM vars, dates WHERE d<last_date

    )

    --  MSSQL

    WITH

    vars(first_date, last_date) AS ( ),

    dates(d) AS (

    SELECT first_date FROM vars

    UNION ALL

    SELECT dateadd(day,1,d)

    FROM vars, dates WHERE d<last_date

    )

    --  SQLite

    WITH RECURSIVE

    vars(first_date, last_date) AS ( ),

    dates(d) AS (

    SELECT first_date FROM vars

    UNION

    SELECT strftime(''%Y-%m-%d'',d,''+1 day'')

    FROM vars, dates WHERE d<last_date

    )

    --  Oracle

    WITH

    vars(first_date, last_date) AS ( ),

    dates(d) AS (

    SELECT first_date FROM vars

    UNION ALL

    SELECT d+1 FROM vars, dates WHERE d<last_date

    )

    ```


    对于那些使用`RECURSIVE`关键字的 DBMS，即使某些 CTE 不是递归的，你也只需在开头使用一次该关键字。


    注意，我们交叉连接了`vars`和`dates`，这是将变量应用到另一个表的常用技巧。我们本可以写`CROSS JOIN`，但没必要这么麻烦。


    我们现在可以使用`LEFT JOIN`来完成查询，以获取所有的日期序列：


    ```sql

    WITH RECURSIVE  --  MSSQL, Oracle: 无 RECURSIVE

    vars(first_date, last_date) AS (

    --  等等

    ),

    dates(d) AS (

    --  等等

    )

    SELECT d AS ordered_date, daily_sales.daily_total

    FROM dates LEFT JOIN daily_sales ON dates.d=daily_sales.ordered_date

    ORDER BY dates.d;

    ```


    现在我们将看到以下结果：


    | `ordered_date` | `daily_total` |

    | --- | --- |

    | 2022-04-08 | 97.5 |

    | 2022-04-09 | 96 |

    | 2022-04-10 | 191 |

    | 2022-04-11 | 201.5 |

    | 2022-04-12 | 91 |

    | 2022-04-13 | 160 |

    | ~ 共 387 行 ~ | |


    注意，我们选择了`dates.d AS ordered_date`，而不是`daily_sales`视图中的`ordered_date`。这是因为后者存在一些缺失日期，而这正是我们最初要费这番功夫的原因。


    当然，生成一个简单的序列并不是递归 CTE 的唯一用途。


    ### 遍历层次结构


    递归 CTE 的另一个用例是遍历层次结构。我们要看的层次结构位于`employees`表中：


    ```sql

    SELECT * FROM employees;

    ```


    当然，在一个真实的员工表中，会有更多细节；这里我们只包含足以说明问题的内容。


    具体来说，你会看到在`employees`表中有一个`supervisorid`列，它是引用同一张表的外键：


    ```sql

    employees.supervisorid ➤ employees.id

    ```


    一种更简单但错误的方法是：要么包含主管的姓名（这与在书籍表中包含作者姓名一样，原因相同，是错误的），要么引用另一个主管表（这出于一个更微妙的原因，也是错误的）。


    对于书籍和作者，关键在于作者与书籍不是同一种事物。在一个设计良好的数据库中，每个表只包含一种类型的成员。但对于员工和主管来说，情况并非如此。简单来说，主管就是另一名员工。


    我们将遍历`employees`表，以获取员工及其主管的列表。


    #### 获取单层层次结构


    不使用递归 CTE，你可以通过简单的`OUTER JOIN`到同一张表来获取员工的主管。这通常被称为`自连接`：


    ```sql

    SELECT

    e.id AS eid,

    e.givenname, e.familyname,

    s.id AS sid,

    s.givenname||'' ''||s.familyname AS supervisor

    --  s.givenname+'' ''+s.familyname AS supervisor  --  MSSQL

    FROM employees AS e LEFT JOIN employees AS s

    ON e.supervisorid=s.id                --  Oracle: 不用 AS

    ORDER BY e.id;

    ```


    你会得到类似这样的结果：


    | `eid` | `givenname` | `familyname` | `sid` | `supervisor` |

    | --- | --- | --- | --- | --- |

    | 1 | Marmaduke | Mayhem | 10 | Beryl Bubbles |

    | 2 | Osric | Pureheart | 12 | Mildred Thisenthat |

    | 3 | Rubin | Croucher | [NULL] | [NULL] |

    | 4 | Gladys | Raggs | 29 | Fred Nurke |

    | 5 | Cynthia | Hyphen-Smythe | 12 | Mildred Thisenthat |

    | 6 | Sebastian | Trefether | 5 | Cynthia Hyphen-Smythe |

    | ~ 共 34 行 ~ | | | | |


    关键在于，当将表与自身连接时，你需要为该表指定两个不同的别名来限定连接。'
- fmt: "### Multilevel Hierarchy Using Recursive CTE\n\nWhat we really want is not\
    \ just the immediate supervisor but a hierarchical list of all supervisors for\
    \ each employee. This will, of course, require a recursive CTE.\n\nThe anchor\
    \ member will be the employees who have no supervisors, presumably those at the\
    \ top of the hierarchy:\n\n```sql\nWITH RECURSIVE      --  MSSQL, Oracle: No RECURSIVE\n\
    cte(id, givenname, familyname, supervisorid,\nsupervisors, n) AS (\n--  anchor\n\
    SELECT\n    id, givenname, familyname, supervisorid, '', 1\n    FROM employees\
    \ WHERE supervisorid IS NULL\n)\n```\n\nThe columns include some of the raw details,\
    \ as well as a string of supervisors. Obviously, for the anchor member, the supervisor\
    \ id will be `NULL`, and the string is empty. You’ll also notice a sequence number,\
    \ starting at 1. That’s for a trick we’ll resort to later on.\n\nThere will be\
    \ more than one row for the anchor. That’s all right and will still work the same\
    \ way. There’ll just be more than one sequence going.\n\nThe recursive member\
    \ will be the employees with supervisors (i.e., the rest) with a growing list\
    \ of their supervisors:\n\n```sql\n--  Not MSSQL or MariaDB/MySQL Yet!\nWITH RECURSIVE\
    \  --  MSSQL, Oracle: No RECURSIVE\ncte(id, givenname, familyname, supervisorid,\n\
    supervisors, n) AS (\n--  anchor\n    SELECT\n        id, givenname, familyname,\
    \ supervisorid, '', 1\n        FROM employees WHERE supervisorid IS NULL\nUNION\
    \ ALL\n--  recursive: others (supervisorid NOT NULL)\n    SELECT\n        e.id,\
    \ e.givenname, e.familyname, e.supervisorid,\n        cte.givenname||' '||cte.familyname||'\
    \ < '||\n        cte.supervisors, n+1\n        FROM cte JOIN employees AS e ON\
    \ cte.id=e.supervisorid\n        --  Oracle: no AS\n)\nSELECT * FROM cte\nORDER\
    \ BY id;\n```\n\nThe join is similar to the self-join earlier. The current employee\
    \ is referred to in the `e` table alias, and this aliased table is joined to the\
    \ CTE, which will be the supervisor. The raw data will be from the aliased table,\
    \ while the supervisor’s details will be concatenated as the new `supervisors`\
    \ parameter.\n\nNormally, you’d want to limit the recursion with a `WHERE` clause.\
    \ For this one, the join will do the job, as it will stop when there are no more\
    \ to be joined.\n\nThe magic is in the expression for the `supervisors` string.\
    \ In the recursive member, the CTE represents inherited values.\n\n| **id** |\
    \ **givenname** | **familyname** | **sid** | **supervisors** | **n** |\n| ---\
    \ | --- | --- | --- | --- | --- |\n| 1 | Marmaduke | Mayhem | 10 | Beryl Bubbles\
    \ < Mildred Thisenth ... < | 3 |\n| 2 | Osric | Pureheart | 12 | Mildred Thisenth\
    \ ... < | 2 |\n| 3 | Rubin | Croucher | [NULL] | [NULL] | 1 |\n| 4 | Gladys |\
    \ Raggs | 29 | Fred Nurke < Murgatroyd Murdo ... < Rubin Croucher < | 4 |\n| 5\
    \ | Cynthia | Hyphen-Smythe | 12 | Mildred Thisenth ... < | 2 |\n| 6 | Sebastian\
    \ | Trefether | 5 | Cynthia Hyphen-S ... < Mildred Thisenth ... < | 3 |\n| ~ 34\
    \ rows ~ |\n\nThis will work in most DBMSs, but not yet in MSSQL or in MariaDB/MySQL.\
    \ However, it will `nearly` work.\n\nIn the case of MariaDB/MySQL, the `''` in\
    \ the anchor causes it to jump to the conclusion that the string will be zero\
    \ characters long, so the `supervisors` column will be empty.\n\nYou will need\
    \ to cast your empty string in the anchor to a longer one:\n\n```sql\nSELECT\n\
    \    ..., cast('' AS char(255)), 1\n    FROM employees WHERE supervisorid IS NULL\n\
    ```\n\nA long-standing complaint of MySQL is that you don’t cast to a `varchar`,\
    \ but to a `char`, which unlike a normal `char` isn’t a fixed length, so it’s\
    \ really a `varchar` anyway. Nobody knows why. In MariaDB, they allow `varchar`.\
    \ The length of `255` should be enough.\n\nIt gets worse with MSSQL. Naturally,\
    \ the columns in the anchor and recursive member should match in data type, but\
    \ in MSSQL, this match needs to be very exact. The fact that they are both strings\
    \ is not enough. The strings will need to be of the same type and size. Concatenating\
    \ the strings produces a longer string, and MSSQL will decide that the longer\
    \ strings aren’t data compatible with the other strings.\n\nIn this case, you’ll\
    \ need to cast *both* expressions to the same:\n\n```sql\nSELECT\n    ..., cast(''\
    \ AS nvarchar(255)), ...\n    FROM employees WHERE supervisorid IS NULL\nUNION\
    \ ALL\nSELECT\n    ...,\n    cast(cte.givenname+' '+cte.familyname\n         +'\
    \ < '+cte.supervisors as nvarchar(255)), ...\n    FROM cte JOIN employees AS e\
    \ ON cte.id=e.supervisorid\n```\n\nWith those changes, the query should work.\n\
    \n### Cleaning the Tail End of the List\n\nYou’ll notice that, with the exception\
    \ of the empty `supervisors` strings, there’s a trailing `<`. That’s because that\
    \ character is always added in the recursive member.\n\nIf you look at the `n`\
    \ column, you’ll see that it represents a level number. The character should only\
    \ be added when there’s already another supervisor—that is to say, when we’re\
    \ now adding a second or subsequent supervisor. That means when `n` has reached\
    \ two or higher.\n\nWe can change that part of the expression by using a `CASE\
    \ ... END` expression:\n\n```sql\n--  Others\ncte.givenname||' '||cte.familyname\n\
    ||  CASE WHEN n>1 THEN ' < ' ELSE '' END\n    || cte.supervisors\n```\n\nThis\
    \ will now produce a cleaner result:\n\n| **id** | **givenname** | **familyname**\
    \ | **Sid** | **supervisors** | **n** |\n| --- | --- | --- | --- | --- | --- |\n\
    | 1 | Marmaduke | Mayhem | 10 | Beryl Bubbles < Mildred Thisenth ... | 3 |\n|\
    \ 2 | Osric | Pureheart | 12 | Mildred Thisenth ... | 2 |\n| 3 | Rubin | Croucher\
    \ | [NULL] | [NULL] | 1 |\n| 4 | Gladys | Raggs | 29 | Fred Nurke < Murgatroyd\
    \ Murdo ... < Rubin Croucher | 4 |\n| 5 | Cynthia | Hyphen-Smythe | 12 | Mildred\
    \ Thisenth ... | 2 |\n| 6 | Sebastian | Trefether | 5 | Cynthia Hyphen-S ... <\
    \ Mildred Thisenth ... | 3 |\n| ~ 34 rows ~ |\n\nOf course, we don’t need the\
    \ `n` column at the end anymore."
  raw: '#### Multilevel Hierarchy Using Recursive CTE


    What we really want is not just the immediate supervisor but a hierarchical list
    of all supervisors for each employee. This will, of course, require a recursive
    CTE.


