  trans: "# 提升数据库完整性\n\n## 添加国家信息\n\n为了保证完整性，你可能需要添加国家的参考信息。你可以简单地增加一个包含国家名称的列，但许多国家的名称存在变体，你不会希望同一张表中出现三个不同版本的国家名称。\n\
    \n更好的做法是创建一张独立的国家表，并包含一个指向该表的外键。你可以将这个引用添加到 `customers` 表中，但将其添加到 `towns` 表可能更有意义，因为城镇是位于某个国家的。\n\
    \n你会注意到 `countries` 表包含的内容远超当前所需。你可能不需要国家的人口或面积等信息。然而，在未来某个时候，你可能需要国家的货币、时区或电话区号，所以现在包含这些信息并无坏处。这不是一张很大的表，你可以忽略不需要的部分，但也可以随时删除确实不需要的列。\n\
    \n1.  另有一个名为 `countries.sql` 的 SQL 文件用于创建另一张表。它包含许多细节，但最重要的两个细节是：\n\n    ```\n\
    \    CREATE TABLE countries (\n    id CHAR(2) PRIMARY KEY,\n    name VARCHAR(...),\n\
    \    --  等等\n    );\n    ```\n\n    注意主键是一个双字符字符串。每个国家都有一个预定义的两字符代码，通常基于该国名称（英文或本国语言）。将其用作主键是合理的，而不是自己编造一个。这就是一个\
    \ `自然键` 的例子：一个基于实际数据而非任意代码的主键。\n\n    运行脚本来安装该表。\n\n2.  向 `towns` 表中添加一个 `countryid`\
    \ 列，类似于你向 `customers` 表添加 `townid` 的方式。记住，数据类型必须与前面的主键匹配：\n\n    ```\n    -- \
    \ PostgreSQL, Oracle, MSSQL, SQLite\n    ALTER TABLE towns\n    ADD countryid\
    \ CHAR(2)\n    CONSTRAINT fk_town_country REFERENCES countries(id);\n    --  MySQL\
    \ / MariaDB\n    ALTER TABLE towns\n    ADD countryid CHAR(2) REFERENCES countries(id);\n\
    \    ```\n\n3.  更新 `towns` 表，将澳大利亚或你选择的其他国家的 `countryid` 值设置为 `'au'`。这比通过子查询设置要简单得多：\n\
    \n    ```\n    UPDATE towns SET countryid='au';\n    ```\n\n4.  你将需要修改你的视图。首先，删除旧版本：\n\
    \n    ```\n    --  非 Oracle 数据库：\n    DROP VIEW IF EXISTS customerdetails;\n \
    \   --  Oracle 数据库：\n    DROP VIEW customerdetails;\n    ```\n\n5.  接下来，你需要使用国家名称重新创建它：\n\
    \n    ```\n    --  非 Oracle 数据库\n    CREATE VIEW customerdetails AS\n    SELECT\n\
    \    ...\n    c.townid, t.name AS town, t.state, t.postcode,\n    n.name AS country\n\
    \    ...\n    FROM\n    customers AS c\n    LEFT JOIN towns AS t ON c.townid=t.id\n\
    \    LEFT JOIN countries AS n ON t.countryid=n.id;\n    --  Oracle 数据库\n    CREATE\
    \ VIEW customerdetails AS\n    SELECT\n    ...\n    c.townid, t.name AS town,\
    \ t.state, t.postcode,\n    n.name AS country\n    ...\n    FROM\n    customers\
    \ c\n    LEFT JOIN towns t ON c.townid=t.id\n    LEFT JOIN countries n ON t.countryid=n.id;\n\
    \    ```\n\n**注意**\n\n*   这包括了与 `countries` 表的一次额外 `JOIN`；为了适应更长的子句，我们将 `JOIN`\
    \ 拆分到了多行。\n*   `countries` 表的别名被设置为 `n`（代表 Nation）；这仅仅是因为我们不能使用 `c`，因为它已被占用。\n\
    \n## 附加说明\n\n你可能注意到我们没有对 `street` 地址列做任何处理。严格来说，它也存在与其他地址部分相同的问题，因此如果我们采取类似处理会更好。\n\
    \n然而，街道地址要复杂得多，而且我们的客户也不算多，所以我们保持了原样。这使得我们的设计虽不完美，但已大为改进。\n\n## 提升数据库完整性\n\n到目前为止，我们一直专注于通过减少列之间的依赖和数据重复，使表更接近真正的范式。这意味着需要添加其他表和外键。\n\
    \n在这里，我们将探讨对数据库完整性的其他改进。`数据库完整性`指的是数据的质量：数据是否有意义？\n\n你需要记住，DBMS（数据库管理系统）实际上并不了解发生了什么，它也不在乎你是否在说实话。然而，DBMS\
    \ 非常关心数据是否 *有效*。即，数据是否符合各种规则。\n\n理论上，数据属于一个 `域`——一个有效值的集合。然后你应该能够为一个或多个列定义一个域。实际上，这个特性在大多数\
    \ DBMS 中并未得到广泛支持。\n\n另一方面，你可以轻松地对列施加 `约束`。约束就是数据规则。\n\n你已经知道一些标准的约束类型：\n\n*  \
    \ 数据类型，如 `INTEGER` 或 `VARCHAR(16)`，限制了可接受数据的类型和范围。\n*   `NOT NULL` 约束意味着值不能为 `NULL`；即，它是必填的。\n\
    *   `UNIQUE` 约束将不允许出现重复值，如果另一行在该列（或列组合）中已存在相同的值。\n*   `REFERENCES` 约束定义了一个外键；外键\
    \ *必须* 匹配另一个键中的现有值。\n\n当然，在所有情况下，都不能保证值是真实的——仅仅是有效的。\n\n如果你想更具体地定义什么是有效，还有 `CHECK`\
    \ 约束。`CHECK` 是一种杂项约束，允许你使用类似于 `WHERE` 子句的表达式来设置自己的规则。有时，这些被称为 `业务规则`。\n\n在本节中，我们将研究数据库的一些弱点，并通过添加一些约束来填补设计中的一些空白。\n\
    \n以下大部分内容将涉及对现有列进行更改。如果你使用的是 SQLite，那么很遗憾，你无法这样做。SQLite 的 `ALTER TABLE` 功能非常有限，无法修改现有列。如果你确实需要进行此类更改，你将不得不经历一个更复杂的过程，即删除一列并创建一个新列。"
- fmt: "### Fixing Issues with a Nullable Column\n\nThe `saleitems` table includes\
    \ a column called `quantity`—this is the number of copies you’re buying of the\
    \ book:\n\n```sql\nSELECT * FROM saleitems ORDER BY saleid,id;\n```\n\nYou’ll\
    \ see something like this:\n\n| **Id** | **saleid** | **bookid** | **quantity**\
    \ | **price** |\n| --- | --- | --- | --- | --- |\n| 1 | 1 | 1403 | 1 | 11.5 |\n\
    | 2 | 1 | 1861 | 1 | 13.5 |\n| 3 | 1 | 643 | [NULL] | 18 |\n| 4 | 2 | 187 | 1\
    \ | 10 |\n| 5 | 2 | 1530 | 1 | 12.5 |\n| 6 | 2 | 1412 | 2 | 16 |\n| ~ 13964 rows\
    \ ~ |\n\nHowever, through an oversight, the column allows `NULL`, which, if you\
    \ look far enough, you’ll find in a number of rows. That doesn’t make sense: you\
    \ can’t have a sale item if you don’t know how many copies it’s for.\nIt’s reasonable\
    \ to guess that a missing `quantity` suggests a quantity of `1`. You can implement\
    \ this guess using `coalesce()`:\n\n```sql\nSELECT\nid, saleid, bookid,\ncoalesce(quantity,1)\
    \ AS quantity, price\nFROM saleitems\nORDER BY saleid, id;\n```\n\nNow we’ll get\
    \ the same results, except that the `NULL`s have been replaced with `1`:\n\n|\
    \ **id** | **saleid** | **bookid** | **quantity** | **Price** |\n| --- | --- |\
    \ --- | --- | --- |\n| 1 | 1 | 1403 | 1 | 11.5 |\n| 2 | 1 | 1861 | 1 | 13.5 |\n\
    | 3 | 1 | 643 | 1 | 18 |\n| 4 | 2 | 187 | 1 | 10 |\n| 5 | 2 | 1530 | 1 | 12.5\
    \ |\n| 6 | 2 | 1412 | 2 | 16 |\n| ~ 13964 rows ~ |\n\nAs always with the `coalesce()`\
    \ function, you need to check your assumptions. Is `1` *really* a reasonable guess?\
    \ In this case, it’s unlikely to mean zero copies or any other number, but it\
    \ all really depends on the situation. For the exercise, we’ll just play along...\n\
    We certainly don’t want to keep doing this every time, so we’re going to fix the\
    \ old values and prevent the `NULL`s in the future.\nWhat follows won’t work with\
    \ SQLite. However, there is a section after this which is what you might do to\
    \ make the same changes in SQLite.\n\n#### Replacing NULL Quantities\n\nFirst,\
    \ we’ll disallow `NULL`s. Shortly, we will add a `NOT NULL` constraint to the\
    \ `quantity` column. However, we can’t do that until we clear out the existing\
    \ `NULL`s, because the DBMS will never allow the constraints to be violated, even\
    \ if the constraints are added later.\nAssuming this is OK, we can replace the\
    \ `NULL`s with `1`:\n\n```sql\nUPDATE saleitems\nSET quantity=1\nWHERE quantity\
    \ IS NULL;\n```\n\nFrom here, we won’t need to use `coalesce()` on existing data,\
    \ but we need to prevent `NULL`s in the future.\n\n#### Setting the NOT NULL Constraint\
    \ for Quantity\n\nThe next thing is to set a `NOT NULL` constraint on the column:\n\
    \n```sql\n--  PostgreSQL\nALTER TABLE saleitems ALTER COLUMN quantity SET NOT\
    \ NULL;\n--  MySQL/MariaDB\nALTER TABLE saleitems MODIFY quantity INT NOT NULL;\n\
    --  MSSQL\nALTER TABLE saleitems ALTER COLUMN quantity INT NOT NULL;\n--  Oracle\n\
    ALTER TABLE saleitems MODIFY quantity NOT NULL;\n--  Not Possible in SQLite\n\
    ```\n\nEarlier, the `ALTER TABLE` statement was used to add or remove a column.\
    \ You can also use it to make changes to an existing column. Here, we use it to\
    \ add a `NOT NULL` constraint.\nAs you’ve seen earlier, each DBMS has its own\
    \ subtle variation on the `ALTER TABLE` statement.\n\n#### Setting a DEFAULT for\
    \ Quantity\n\nIn principle, whatever caused the `NULL`s to appear may happen again,\
    \ only now it will generate an error. Better still, we should supply a default\
    \ of `1` in case the quantity is missing in a future transaction:\n\n```sql\n\
    --  PostgreSQL\nALTER TABLE saleitems\nALTER COLUMN quantity SET DEFAULT 1;\n\
    --  MySQL/MariaDB\nALTER TABLE saleitems\nMODIFY quantity INT DEFAULT 1;\n-- \
    \ MSSQL\nALTER TABLE saleitems\nADD DEFAULT 1 FOR quantity;\n--  Oracle\nALTER\
    \ TABLE saleitems\nMODIFY quantity DEFAULT 1;\n--  Not Possible in SQLite\n```\n\
    \nThe `DEFAULT` value is the value used if you don’t supply a value of your own.\
    \ The column doesn’t have to be `NOT NULL`, and `NOT NULL` columns don’t have\
    \ to have a `DEFAULT`. However, in this case, it’s a reasonable combination.\n\
    Again, note that each DBMS has its own subtle variation on the syntax.\n\n####\
    \ Adding a Positive CHECK Constraint for Quantity\n\nWhile we’re fine-tuning the\
    \ behavior of the `quantity` column, you can protect against another possible\
    \ error. In principle, integers can include negative values, which would make\
    \ no sense at all for `quantity`. Even zero wouldn’t be appropriate in this case.\n\
    You can protect against an out-of-range value using a `CHECK` constraint:\n\n\
    ```sql\nCHECK (quantity>0)\n```\n\nYou could also impose an upper limit by using\
    \ the `BETWEEN` expression:\n\n```sql\nCHECK (quantity BETWEEN 1 AND 5)\n```\n\
    \nRemember that `BETWEEN` is inclusive.\nHowever, you have to be careful in imposing\
    \ arbitrary limits, such as a maximum of 5, because, say, 6 is not out of the\
    \ question. We’ll leave that decision to some future time.\nTo add the `CHECK`\
    \ constraint, again, you use `ALTER TABLE`:\n\n```sql\n--  PostgreSQL\nALTER TABLE\
    \ saleitems\nADD CHECK (quantity>0);\n--  MySQL/MariaDB\nALTER TABLE saleitems\n\
    MODIFY quantity INT CHECK(quantity>0);\n--  MSSQL\nALTER TABLE saleitems\nADD\
    \ CHECK(quantity>0);\n--  Oracle\nALTER TABLE saleitems\nMODIFY quantity CHECK(quantity>0);\n\
    --  Not Possible in SQLite\n```\n\nWe’ve now made the `quantity` column more reliable.\n\
    \n#### Combining the Changes\n\nIn some DBMSs, it is possible to combine the changes\
    \ in a single `ALTER TABLE` statement:\n\n```sql\n--  PostgreSQL\nALTER TABLE\
    \ saleitems\nALTER COLUMN quantity SET NOT NULL,\nALTER COLUMN quantity SET DEFAULT\
    \ 1,\nADD CHECK (quantity>0);\n--  MySQL/MariaDB\nALTER TABLE saleitems MODIFY\
    \ quantity INT\nNOT NULL\nDEFAULT 1\nCHECK(quantity>0);\n--  Oracle\nALTER TABLE\
    \ saleitems MODIFY quantity\nDEFAULT 1\nNOT NULL\nCHECK(quantity>0);\n--  Not\
    \ Possible in MSSQL\n--  Not Possible in SQLite\n```\n\nSince you don’t actually\
    \ make this sort of change terribly often, you lose nothing if you keep the steps\
    \ separate.\n\n#### Making the Changes in SQLite\n\nAs you see, SQLite has very\
    \ limited ability to make changes. Generally, SQLite can only make the following\
    \ changes to a table:\n*   Add a column\n*   Rename a column\n*   Drop a column\n\
    \nHowever, that’s enough to make the changes we want, as long as we’re happy with\
    \ a different column order.\nTo make all of the preceding changes\n\n1.  Rename\
    \ the original `quantity` column:\n    ```sql\n    ALTER TABLE saleitems\n   \
    \ RENAME quantity TO oldquantity;\n    ```\n2.  Add a new `quantity` column with\
    \ the required properties:\n    ```sql\n    ALTER TABLE saleitems\n    ADD quantity\
    \ INT NOT NULL DEFAULT 1 CHECK(quantity>0);\n    ```\n3.  Copy the data from the\
    \ old column to the new one:\n    ```sql\n    UPDATE saleitems\n    SET quantity=oldquantity;\n\
    \    ```\n4.  Drop the old column:\n    ```sql\n    ALTER TABLE saleitems\n  \
    \  DROP oldquantity;\n    ```\n\nThe new column will be at the end, which is not\
    \ where the original was, but that’s not really a problem."
