- fmt: "### Using the Unpivot Feature\n\nBoth MSSQL and Oracle can reverse the process\
    \ using `UNPIVOT`. Noting that a pivot table is denormalized, the `UNPIVOT` clause\
    \ can give you a normalized result. The idea is that summaries which are spread\
    \ across the table in category columns will appear down the table in rows.\n\n\
    The sample database doesn’t include a table in pivot table form, and rightly so.\
    \ However, we do have a ready-made pivot table in the preceding work. We can use\
    \ that to illustrate the unpivot feature.\n\nFirst, we’ll need to wrap the final\
    \ `SELECT` statement into another CTE:\n\n```\nWITH\nstatuses(status, statusname)\
    \ AS (\n...\n),\ncustomerinfo(id, state, statusname) AS (\n...\n),\nsalesdata(state,\
    \ statusname, total) AS (\n...\n),  --  extra comma\npivottable AS (\nSELECT *\n\
    FROM salesdata\nPIVOT ...\n)\nSELECT *\nFROM pivottable\n;\n```\n\nIf you run\
    \ this, you’ll get the same result as before; we’ve just put the result into the\
    \ `pivottable` CTE.\n\nThe next step is to add the `UNPIVOT` clause at the end\
    \ of the `SELECT` statement:\n\n```\nWITH\nstatuses(status, statusname) AS (\n\
    ...\n),\ncustomerinfo(id, state, statusname) AS (\n...\n),\nsalesdata(state, statusname,\
    \ total) AS (\n...\n),\npivottable AS (\n...\n)\nSELECT *\nFROM pivottable\n--\
    \ MSSQL:\nUNPIVOT (\ntotal FOR statuses IN (Gold,Silver,Bronze)\n) AS w\n--  Oracle:\n\
    UNPIVOT (\ntotal FOR statuses IN (Gold,Silver,Bronze)\n)\n```\n\nYou should see\
    \ something like\n\n| state | total | statuses |\n| --- | --- | --- |\n| QLD |\
    \ 5532.5 | Gold |\n| QLD | 3557.5 | Silver |\n| QLD | 10937 | Bronze |\n| VIC\
    \ | 8352 | Gold |\n| VIC | 6381.5 | Silver |\n| VIC | 6023 | Bronze |\n| NSW |\
    \ 11526 | Gold |\n| NSW | 9567 | Silver |\n| NSW | 11941.5 | Bronze |\n| NT |\
    \ 349.5 | Bronze |\n| ACT | 1387 | Gold |\n| TAS | 4574 | Gold |\n| TAS | 2459.5\
    \ | Silver |\n| TAS | 2873.5 | Bronze |\n| SA | 826.5 | Gold |\n| SA | 1634.5\
    \ | Silver |\n| SA | 3709.5 | Bronze |\n| WA | 213 | Gold |\n| WA | 1655 | Silver\
    \ |\n\nThe `UNPIVOT` clause is even more mysterious than the `PIVOT` clause. The\
    \ only column that’s specifically mentioned is the `statuses` column, and, again,\
    \ you need to list the possible values. From there, the DBMS magically works out\
    \ that there is a `state` column, and whatever’s left will appear in another column,\
    \ which we have called `total`.\n\n## Working with SQL Variables\n\nSQL is not\
    \ a programming language. With a programming language, you code how to do a job\
    \ in a series of steps. SQL is a declarative language in which you code what you\
    \ want done, but leave it up to the DBMS to decide how to go about doing it.\n\
    \nNevertheless, there are times when you need a job done in multiple steps, and\
    \ having the ability to write your code in steps would come in handy. We saw this\
    \ in Chapter 3, where adding a new sale involved multiple steps.\n\nWhat was missing\
    \ from the process in Chapter 3 was the ability to store interim values. That’s\
    \ what we’re going to look at in this section.\n\nMany DBMSs supply information\
    \ about the current database environment in the form of special functions or system\
    \ or global variables. Sometimes, these system variables can be set to new values\
    \ using a `SET` command. That’s not what we’re looking at in this section. In\
    \ this section, we’re looking at variables that you create and set for your own\
    \ use.\n\nA **variable** is a temporary piece of data. Generally, you **declare**\
    \ it before you use it and define its data type. You may set it then or, more\
    \ typically, in a later step.\n\nTypically, a variable is associated with a stored\
    \ block of code called a **function** or a **procedure**, depending on the DBMS\
    \ and what you’re attempting to do in the code. In this section, we’ll be working\
    \ without storing the code.\n\nThe various DBMSs have slightly different processes\
    \ for working with variables:\n\n*   PostgreSQL historically limited variables\
    \ to stored code blocks (functions). However, in version 11 they introduced an\
    \ anonymous (`DO`) block, which lets you write the code without storing the block.\
    \ PostgreSQL variables must be declared with a data type.\n\n*   MariaDB/MySQL\
    \ is most relaxed about variables, and you don’t declare a variable before using\
    \ it. Variable names are prefixed with the `@` sign.\n\n*   MSSQL variables must\
    \ be declared with a data type. They are prefixed with the `@` sign.\n\n*   Oracle\
    \ variables are declared with a data type.\n\n    SQLite is missing from this\
    \ list, and that’s because it doesn’t support variables. SQLite is typically embedded\
    \ in a host application. The assumption is that you’re writing programming code\
    \ for the host application. You can have all the additional variables and functionality\
    \ you like there.\n\n### Code Blocks\n\nIf you’re using a client which makes it\
    \ easy to run one statement at a time, you may find it gets a little confused\
    \ when working with blocks of multiple statements. It will be easier to work with\
    \ if you surround your block with delimiters.\n\nFor the various DBMSs, the delimiters\
    \ look like this:\n\n```\n--  PostgreSQL\nDO $$\n...\nEND $$;\n--  MariaDB/MySQL\n\
    DELIMITER $$\n...\n$$\nDELIMITER ;\n--  MSSQL\nGO\n...\nGO\n--  Oracle\n/\n...\n\
    /\n```\n\nIn the end, you will probably just highlight all of the lines of code\
    \ and run them together. That’s what we recommend in trying the following code.\
    \ Don’t try running just one line at a time.\n\nIn the following code, we’ll do\
    \ what we did in Chapter 3 in adding a new sale. Then, we made a point of recording\
    \ the new sale id, so that we could use it in subsequent statements. This time,\
    \ however, we’ll use variables to store interim values, so we can run the code\
    \ in a single batch.\n\nThe code will broadly follow these steps:\n\n1.  Set up\
    \ the data to be used.\n2.  Insert the sale.\n3.  Get the new sale id into a variable.\n\
    4.  Insert the sale items, using the sale id.\n5.  Update the sale items with\
    \ their prices, using the sale id.\n6.  Update the new sale with the total, using\
    \ the sale id, of course.\n\nWhile we’re at it, we’ll set a few other variables:\n\
    \n*   A variable to store the customer’s id\n*   A variable to store the ordered\
    \ date/time\n\nIt would be nice to have another variable with the sale items.\
    \ However, most DBMSs aren’t adept at defining multivalued variables without a\
    \ lot of extra fuss in defining custom data types to do the job. Here, we’re trying\
    \ to keep things simple.\n\nWhat follows will be four similar versions of how\
    \ to write the code block.\n\n### Updated Code to Add a Sale\n\nThe outline of\
    \ the following code blocks will be basically the same:\n\n*   Define the variables\n\
    *   Run the `INSERT` and `UPDATE` statements\n*   Test the results\n\nWe’ll discuss\
