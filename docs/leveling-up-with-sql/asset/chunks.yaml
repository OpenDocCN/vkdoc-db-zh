    | ACT | 85 | 2023-04 | 6 | 384 | 0 | 0 | 0 |

    | ACT | 85 | 2023-05 | 2 | 93 | 0 | 0 | 0 |

    | ACT | 85 | [NULL] | 37 | 2418.5 | 0 | 0 | 1 |

    | ACT | 112 | 2022-07 | 2 | 72 | 0 | 0 | 0 |

    | ACT | 112 | 2022-08 | 2 | 78 | 0 | 0 | 0 |

