    *   行之间是独立的。

    *   列之间是独立的。

    *   列是单一类型的。

    *   列名是唯一的。

    *   列是无序的。


    ### 多值处理


    在开发表时，一个主要问题是如何处理多值和重复值。通常的解决方案是使用额外的表，并通过外键将它们连接起来。


    ### 修改表


    在重构或加固数据库时，你需要对现有的表和列进行更改。`ALTER TABLE`语句可用于：


    *   添加额外的列，包括外键

    *   删除列

    *   添加或删除约束

    *   添加或删除索引


    约束包括添加`NOT NULL`、默认值以及其他`CHECK`约束。


    ### 视图


    视图是一个保存的 SELECT 语句。创建视图的一个原因是为了方便，将一个或多个表的数据集中在一个地方。


    有时，当你创建一个包含组合数据的视图时，最终得到的结果可能不再遵循所有规范化规则。在业内，这被称为**反规范化**。


    反规范化数据通常是维护数据的一种糟糕方式，但经常是提取数据的一种便捷方式。从这个意义上说，它结合了两者的优点：原始数据在原始表中仍然完好无损。


    一些数据库管理系统支持在视图中更新数据。实际上，更新不会影响视图本身，而是传递到底层的表。


    ### 索引


    索引是对表的一种补充，它将选定的数据按顺序存储，并包含对原始表中数据的引用。使用索引，数据库管理系统可以更快地搜索数据。


    主键和唯一列会自动创建索引。你可以在任何其他列上添加索引。


    索引有一些成本，因此不应无故添加。成本包括存储和维护。


    可以添加唯一索引以确保特定列或列组合的值是唯一的。


    ### 最终成果


    在对表结构进行更改后，你的数据库将类似于图 2-1 中的设计。


    ![图片：一个示意图，展示了诸如 v i p, customers, towns, countries, sales, sale items, books,
    book genres, genres, employees 和 authors 等数据库表的布局，它们相互交互。](img/606708_1_En_2_Fig1_HTML.jpg)


    图 2-1

    改进后的数据库设计


    ## 总结


    在本章中，我们关注了单个表的属性，并寻找使数据库更可靠、更高效的方法。


    我们探讨了：


    *   规范化 SQL 表的原则

    *   如何在规范化表中处理多值

    *   修改表以提高其可靠性并更好地符合规范化表的原则

    *   创建视图以改进对多表的访问

    *   添加索引以提高效率


    改进数据库的过程当然是不完整的，但它让我们更好地理解了什么使数据库更可靠、更高效。


    ## 后续内容


    在本章中，我们一直关注单个表的属性，这些属性有助于提高表的完整性和效率。


    在下一章中，我们将更多地探讨多个表如何相互交互。


