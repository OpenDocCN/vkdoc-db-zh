    To eliminate the sorting columns from the result set, you can turn this into a
    Common Table Expression:


    ```

    WITH cte AS (

    --  UNION query above

    )

    SELECT state, id, ordered, nsales, total

    FROM cte

    ORDER BY state_level,state,id_level,id,ordered_level,ordered;

    ```


    This isn’t so much work to get the results, but there may be a simpler method.


    ### Using GROUPING SETS, CUBE, and ROLLUP


    Grouping sets offer a simpler alternative to the `UNION` above. Their syntax is
    not immediately obvious, but it follows a similar pattern to the `GROUP BY` clauses.


    Grouping sets are not fully supported by all DBMSs. Most support a simpler version,
    but SQLite doesn’t support them at all. If you have SQLite, the best you can do
    is what we did earlier with the `UNION`.


    For the most part, what you probably want is the `ROLLUP` described later.


    #### GROUPING SETS and CUBE (PostgreSQL, MSSQL, and Oracle)


    The most general-purpose technique uses the `GROUPING SET` clause. In this clause,
    you specify which combinations of columns you want to include in the summary.


    The syntax is


    ```

    SELECT columns

    FROM table

    GROUP BY GROUPING SETS ((set),(set));

    ```


    Recall that the previous example had `SELECT` statements, grouped by state, customer
    id, ordered date, and a grand total. This can be generated as follows:


    ```

    SELECT state,town,count(*)

    FROM customers

    GROUP BY GROUPING SETS ((state,id,ordered),(state,id),(state),());

    ```


    Here, the set `()` indicates the grand summary.


    Many other combinations are available (such as `(state,ordered)`). If you really
    wanted them all, you can use `CUBE`:


    ```

    SELECT state, id, ordered, count(*), sum(total)

    FROM salesdata

    GROUP BY CUBE (state,id,ordered)

    ```


    The `CUBE` variation works best when you don’t have too many grouping columns
    and when they’re all unrelated to each other. Remember three columns would give
    you eight possible combinations. You can calculate the number of possibilities
    as 2^n, where `n` is the number of columns. In this case, it’s 2³ = 8\. If you
    had even four columns, you would have 16 possible totals and subtotals, which
    might start to get overwhelming.


    #### USING ROLLUP (PostgreSQL, MSSQL, Oracle, and MariaDB/MySQL)


    A simpler, more readable (but slightly less flexible) alternative is to use `ROLLUP`.
    This takes two forms:


    ```

    --  ROLLUP(...)       -   PostgreSQL, MSSQL, Oracle

    SELECT state, id, ordered, count(*), sum(total)

    FROM salesdata

    GROUP BY ROLLUP (state, id, ordered);

    --  ... WITH ROLLUP   -   MariaDB / MySQL, MSSQL

    SELECT state, id, ordered, count(*), sum(total)

    FROM salesdata

    GROUP BY state, id, ordered WITH ROLLUP;

    ```


    Both forms will give you the same result. Note that MSSQL gives you the choice
    to use either form.


    `ROLLUP` makes an important assumption that the columns form some sort of hierarchy.
    In the case of the customer state and the customer id, that’s obvious. Whether
    you consider the ordered date as the end of the hierarchy is up to you.


    You can see the hierarchy in the results and in the fact that this matches the
    `GROUPING SETS` example earlier. You will get results for


    1.  `(state, id, ordered)` combinations


    2.  `(state, id)` combinations


    3.  `(state)` values


    4.  `()` – grand totals


    Clearly, using `ROLLUP` is a much simpler way to get these results, and you probably
    won’t miss the flexibility of `GROUPING SETS` very much.'
