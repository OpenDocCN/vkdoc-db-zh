  trans: '

    # 7. 使用子查询与公共表表达式


    运行一个 `SELECT` 语句，假设没有错误，会给出一个结果。该结果是一个虚拟表，它将包含行和列。


    就我们的目的而言，我们对三种可能的虚拟表感兴趣：


    *   一行一列：你只得到一个值，尽管技术上它仍然在一个表中。我们将其称为单个值。

    *   一列多行：到时候，我们会称其为一个列表。

    *   多行多列：在此上下文中，具有多列的单行也算作同类事物。这更像是我们在谈论虚拟表时所想到的那种东西。


    当然，该结果也可能是空的，但这被视为 `NULL`。


    你将从以下示例中获得这些类型的结果。


    例如，一行一列：


    ```sql

    SELECT id FROM books WHERE title=''Frankenstein'';

    ```


    这是一个单值：


    | **Id** |

    | --- |

    | 392 |


    一列多行：


    ```sql

    SELECT email FROM customerdetails WHERE state=''VIC'';

    ```


    这给出一个列表：


    | **Email** |

    | --- |

    | xavier.money17@example.net |

    | anne.onymous262@example.net |

    | bess.twishes26@example.net |

    | judy.free93@example.net |

    | peter.off415@example.com |

    | moe.grass360@example.com |

    | ~ 64 rows ~ |


    多行多列：


    ```sql

    SELECT givenname, familyname, email

    FROM customerdetails WHERE state=''VIC'';

    ```


    这给出一个虚拟表：


    | **givenname** | **Familyname** | **email** |

    | --- | --- | --- |

    | Xavier | Money | xavier.money17@example.net |

    | Anne | Onymous | anne.onymous262@example.net |

    | Bess | Twishes | bess.twishes26@example.net |

    | Judy | Free | judy.free93@example.net |

    | Peter | Off | peter.off415@example.com |

    | Moe | Grass | moe.grass360@example.com |

    | ~ 64 rows ~ |


    最后一种类别，即虚拟表，也可能是非常宽泛的查询的结果，例如 `SELECT * FROM customerdetails`。其工作方式完全相同。


    根据上下文，这些结果中的任何一个都可以用在后续的查询中，该查询期望使用单个值、一个列表或一个（虚拟）表。例如，使用单个值：


    ```sql

    SELECT *

    FROM saleitems

    WHERE bookid=(SELECT id FROM books WHERE title=''Frankenstein'');

    ```


    这里，单值查询被括号包裹起来，其用法就像你已经知道要匹配的 `bookid` 值一样：


    | **id** | **Saleid** | **bookid** | **quantity** | **price** |

    | --- | --- | --- | --- | --- |

    | 7234 | 2873 | 392 | 3 | 18.50 |

    | 14875 | 5907 | 392 | 2 | 18.50 |

    | 11183 | 4448 | 392 | 2 | 18.50 |

    | 1312 | 517 | 392 | 2 | 18.50 |

    | 9956 | 3948 | 392 | 2 | 18.50 |

    | 12636 | 5012 | 392 | 2 | 18.50 |

    | ~ 14 rows ~ |


    或者你可能期望某种列表：


    ```sql

    SELECT *

    FROM books

    WHERE authorid IN (

    SELECT id FROM authors WHERE born BETWEEN ''1700-01-01'' AND ''1799-12-31''

    );

    ```


    `IN` 操作符期望一个值列表，我们从嵌套的 `SELECT` 语句中的那一列获得：


    | **id** | **authorid** | **Title** | **published** | **price** |

    | --- | --- | --- | --- | --- |

    | 2078 | 765 | The Duel | 1811 | 12.50 |

    | 2243 | 715 | Vrijmoedige Verhalen; ee … | 1831 | [NULL] |

    | 532 | 628 | Elective Affinities | 1809 | 11.50 |

    | 1608 | 420 | The Autobiography of Ben … | 1791 | 18.50 |

    | 2303 | 633 | The Metaphysics of Moral … | 1797 | 12.00 |

    | 1963 | 529 | A Treatise of Human Natu … | 1740 | 18.50 |

    | ~ 256 rows ~ |


    嵌套的 `SELECT` 语句被称为 `子查询`。`子查询` 是一个 `SELECT` 语句，它被用作另一个查询的一部分。从概念上讲，你使用 SELECT
    查询来获取一个或多个结果，这些结果继而会被用于另一个查询中。


    子查询可以在 `SELECT`、`WHERE`、`FROM` 甚至 `ORDER BY` 子句中使用。当使用它们时，结果必须与上下文兼容。例如：


    *   `SELECT` 子句中的子查询必须始终返回单个值，就像任何其他计算所期望的那样。这可以称为 `标量`（单值）子查询。一些现代 DBMS 现在开始增加对返回多列值的支持，但目前尚未广泛支持。

    *   `WHERE` 子句中的子查询在使用比较操作符时必须返回单个值，或在使用 `IN()` 表达式时返回单个列。

    *   `FROM` 子句中的子查询必须返回一个结果表。这种类型的子查询有时被称为内联视图。


    子查询的一些用途包括：


    *   从另一个表中查找相关数据（`SELECT`）

    *   查找一个值或一组值以用作过滤器（`WHERE`）

    *   生成一个派生的虚拟表（`FROM`）


    关于子查询的整个要点是，通过子查询，你可以组合多个部分以构成更复杂的查询：


    *   使用子查询，你将能够从其他表获取数据。

    *   你可以使用子查询来预处理数据，以便在主查询中使用。

    *   子查询将允许你组合聚合查询和非聚合查询，而这通常无法在单个查询中完成。


    然而，子查询确实有成本，因为你将为一次查询付出运行两次或更多次查询的代价——有时甚至是为一次查询付出运行数百次查询的代价。我们将在后面将子查询与其他技术进行比较时详细讨论这一点。


    毫无疑问，你之前已经见过一些子查询，肯定在本书前面的某些章节中见过。在本章中，我们将更仔细地研究子查询如何工作以及我们可以用它们做什么。

    '
- fmt: '## Correlated and Non-correlated Subqueries


    Subqueries can be `correlated` or `non-correlated`. A correlated subquery includes
    a reference to the main query. A non-correlated subquery is evaluated independently
    from the main query.


    Here’s an example of a non-correlated subquery:


    ```

    --  Books by Female Authors

    SELECT *

    FROM books

    WHERE authorid IN(

    SELECT id FROM authors WHERE gender=''f''

    );

    ```


    You’ll get a result like this:


    | `id` | `authorid` | `Title` | `published` | `price` |

    | --- | --- | --- | --- | --- |

    | 2007 | 99 | North and South | 1854 | 17.50 |

    | 702 | 547 | Jane Eyre | 1847 | 17.50 |

    | 95 | 701 | Silas Marner | 1861 | 18.50 |

    | 983 | 211 | East Lynne | 1861 | 16.00 |

    | 678 | 547 | Tales of Angria | 1839 | 14.50 |

    | 1255 | 608 | Discourse on the Origin … | 1755 | 19.00 |

    | ~ 165 rows ~ |


    Here’s another which uses an aggregate in the subquery:


    ```

    --  Oldest Customers

    SELECT *

    FROM customers

    WHERE dob=(SELECT min(dob) FROM customers);

    ```


    This gives you


    | `id` | `givenname` | `familyname` | `…` | `dob` | `…` |

    | --- | --- | --- | --- | --- | --- |

    | 92 | Nan | Keen | … | 1943-05-18 | … |

    | 392 | Daisy | Chain | … | 1943-05-18 | … |


    (You’ll note that there’s more than one oldest customer, because they happen to
    be born on the same day. It happens.)


    In both cases, the subquery is evaluated once, and the results are used in the
    main query. The result may be a list, as in the female authors, or a single value
    as in the oldest customer.


    A non-correlated subquery is independent of the main query. If you highlight the
    subquery alone and run it, you’ll get a result.


    Here’s an example of a correlated subquery:


    ```

    --  Book Authors (yes, there’s another way to do this)

    SELECT

    id, title, (

    SELECT coalesce(givenname||'' '','''')

    || coalesce(othernames||'' '','''')

    || familyname

    FROM authors

    WHERE authors.id=books.authorid

    ) AS author

    FROM books;


    --  MSSQL

    SELECT

    id, title, (

    SELECT coalesce(givenname+'' '',''''

    + coalesce(othernames+'' '','''')

    + familyname

    FROM authors

    WHERE authors.id=books.authorid

    ) AS author

    FROM books;


    --  Oracle

    SELECT

    id, title, (

    SELECT ltrim(givenname||'' '')

    ||ltrim(othernames||'' '')

    ||familyname

    FROM authors

    WHERE authors.id=books.authorid

    ) AS author

    FROM books;

    ```


    This gives you the following:


    | `id` | `title` | `author` |

    | --- | --- | --- |

    | 2078 | The Duel | Heinrich von Kleist |

    | 503 | Uncle Silas | J. Sheridan Le Fanu |

    | 2007 | North and South | Elizabeth Gaskell |

    | 702 | Jane Eyre | Charlotte Brontë |

    | 1530 | Robin Hood, The Prince of Thieves | Alexandre Dumas |

    | 1759 | La Curée | Émile Zola |

    | ~ 1201 rows ~ |


    In this case, the subquery is evaluated once for every row. Look at the subquery
    in the first example earlier, spread out to be more readable:


    ```

    (

    SELECT

    coalesce(givenname||'' '','''')

    || coalesce(othernames||'' '','''')

    || familyname

    FROM authors

    WHERE authors.id=books.authorid

    )

    ```


    The `SELECT` clause is expecting a single value for the `author` column, and so
    the subquery should deliver a single value, which it does. You can’t use multiple
    columns in this context, so you need to concatenate the names to give the single
    value.


    Just as importantly, you can’t have multiple rows either. Here, the `WHERE` clause
    filters the result to a single row, where the `id` matches the `authorid` in the
    main query: `WHERE authors.id=books.authorid`.


    For every row in the `books` table, the subquery runs again to match the next
    `authorid`.


    If there’s no match, the subquery comes back with a `NULL`.


    You can recognize a correlated subquery by the fact that the query references
    something from the main query. As a result, you can’t highlight the subquery and
    run it alone, because it needs that reference to be complete.


    Incidentally, note the `WHERE` clause in the subquery. In a sense, it’s overqualified,
    and we could have used this: `WHERE id=authorid`. This is in spite of the fact
    that an `id` column appears in both the subquery and the main query.


    When the subquery is evaluated, column names will be defined from the inside out.
    For the `id` column, there’s one in the inner `authors` table, so SQL doesn’t
    bother to notice that there’s also one in the outer `books` table. For the `authorid`
    column, there isn’t one in the `authors` table, so it falls through the one in
    the `books` table.


    That’s how it works in SQL, but it’s probably better to qualify the columns as
    we did in this example to minimize confusion for us humans.


    As a rule, a correlated subquery is an expensive operation because it’s reevaluated
    so often. That doesn’t mean you shouldn’t use one, just that you should consider
    the alternatives, if there are any. You don’t generally get to choose which type
    of subquery you will need, but it will help in deciding whether there’s a better
    alternative.'
  raw: '## Correlated and Non-correlated Subqueries


    Subqueries can be **correlated** or **non-correlated**. A correlated subquery
    includes a reference to the main query. A non-correlated subquery is evaluated
    independently from the main query.


    Here’s an example of a non-correlated subquery:


    ```

    --  Books by Female Authors

    SELECT *

    FROM books

    WHERE authorid IN(

    SELECT id FROM authors WHERE gender=''f''

    );

    ```


    You’ll get a result like this:


    | **id** | **authorid** | **Title** | **published** | **price** |

    | --- | --- | --- | --- | --- |

    | 2007 | 99 | North and South | 1854 | 17.50 |

    | 702 | 547 | Jane Eyre | 1847 | 17.50 |

    | 95 | 701 | Silas Marner | 1861 | 18.50 |

    | 983 | 211 | East Lynne | 1861 | 16.00 |

    | 678 | 547 | Tales of Angria | 1839 | 14.50 |

    | 1255 | 608 | Discourse on the Origin … | 1755 | 19.00 |

    | ~ 165 rows ~ |


    Here’s another which uses an aggregate in the subquery:


    ```

    --  Oldest Customers

    SELECT *

    FROM customers

    WHERE dob=(SELECT min(dob) FROM customers);

    ```


    This gives you


    | **id** | **givenname** | **familyname** | **…** | **dob** | **…** |

    | --- | --- | --- | --- | --- | --- |

    | 92 | Nan | Keen | … | 1943-05-18 | … |

    | 392 | Daisy | Chain | … | 1943-05-18 | … |


    (You’ll note that there’s more than one oldest customer, because they happen to
    be born on the same day. It happens.)


    In both cases, the subquery is evaluated once, and the results are used in the
    main query. The result may be a list, as in the female authors, or a single value
    as in the oldest customer.


    A non-correlated subquery is independent of the main query. If you highlight the
    subquery alone and run it, you’ll get a result.


    Here’s an example of a correlated subquery:


    ```

    --  Book Authors (yes, there’s another way to do this)

    SELECT

    id, title, (

    SELECT coalesce(givenname||'' '','''')

    || coalesce(othernames||'' '','''')

    || familyname

    FROM authors

    WHERE authors.id=books.authorid

    ) AS author

    FROM books;

    --  MSSQL

    SELECT

    id, title, (

    SELECT coalesce(givenname+'' '',''''

    + coalesce(othernames+'' '','''')

    + familyname

    FROM authors

    WHERE authors.id=books.authorid

    ) AS author

    FROM books;

    --  Oracle

    SELECT

    id, title, (

    SELECT ltrim(givenname||'' '')

    ||ltrim(othernames||'' '')

    ||familyname

    FROM authors

    WHERE authors.id=books.authorid

    ) AS author

    FROM books;

    ```


    This gives you the following:


    | **id** | **title** | **author** |

    | --- | --- | --- |

    | 2078 | The Duel | Heinrich von Kleist |

    | 503 | Uncle Silas | J. Sheridan Le Fanu |

    | 2007 | North and South | Elizabeth Gaskell |

    | 702 | Jane Eyre | Charlotte Brontë |

    | 1530 | Robin Hood, The Prince of Thieves | Alexandre Dumas |

    | 1759 | La Curée | Émile Zola |

    | ~ 1201 rows ~ |


    In this case, the subquery is evaluated once for every row. Look at the subquery
    in the first example earlier, spread out to be more readable:


    ```

    (

    SELECT

    coalesce(givenname||'' '','''')

    || coalesce(othernames||'' '','''')

    || familyname

    FROM authors

    WHERE authors.id=books.authorid

    )

    ```


    The `SELECT` clause is expecting a single value for the `author` column, and so
    the subquery should deliver a single value, which it does. You can’t use multiple
    columns in this context, so you need to concatenate the names to give the single
    value.


    Just as importantly, you can’t have multiple rows either. Here, the `WHERE` clause
    filters the result to a single row, where the `id` matches the `authorid` in the
    main query: `WHERE authors.id=books.authorid`.


    For every row in the `books` table, the subquery runs again to match the next
    `authorid`.


    If there’s no match, the subquery comes back with a `NULL`.


    You can recognize a correlated subquery by the fact that the query references
    something from the main query. As a result, you can’t highlight the subquery and
    run it alone, because it needs that reference to be complete.


    Incidentally, note the `WHERE` clause in the subquery. In a sense, it’s overqualified,
    and we could have used this: `WHERE id=authorid`. This is in spite of the fact
    that an `id` column appears in both the subquery and the main query.


    When the subquery is evaluated, column names will be defined from the inside out.
    For the `id` column, there’s one in the inner `authors` table, so SQL doesn’t
    bother to notice that there’s also one in the outer `books` table. For the `authorid`
    column, there isn’t one in the `authors` table, so it falls through the one in
    the `books` table.


    That’s how it works in SQL, but it’s probably better to qualify the columns as
    we did in this example to minimize confusion for us humans.


    As a rule, a correlated subquery is an expensive operation because it’s reevaluated
    so often. That doesn’t mean you shouldn’t use one, just that you should consider
    the alternatives, if there are any. You don’t generally get to choose which type
    of subquery you will need, but it will help in deciding whether there’s a better
    alternative.'
  trans: '## 关联与非关联子查询


    子查询可以是 `关联` 的或 `非关联` 的。关联子查询包含对主查询的引用。非关联子查询则是独立于主查询进行评估的。


    以下是一个非关联子查询的例子：


    ```

    --  女性作家的书籍

    SELECT *

    FROM books

    WHERE authorid IN(

    SELECT id FROM authors WHERE gender=''f''

    );

    ```


    你将得到类似这样的结果：


    | `id` | `authorid` | `Title` | `published` | `price` |

    | --- | --- | --- | --- | --- |

    | 2007 | 99 | North and South | 1854 | 17.50 |

    | 702 | 547 | Jane Eyre | 1847 | 17.50 |

    | 95 | 701 | Silas Marner | 1861 | 18.50 |

    | 983 | 211 | East Lynne | 1861 | 16.00 |

    | 678 | 547 | Tales of Angria | 1839 | 14.50 |

    | 1255 | 608 | Discourse on the Origin … | 1755 | 19.00 |

    | ~ 165 rows ~ |


    这是另一个在子查询中使用聚合函数的例子：


    ```

    --  最年长的顾客

    SELECT *

    FROM customers

    WHERE dob=(SELECT min(dob) FROM customers);

    ```


    这会给出


    | `id` | `givenname` | `familyname` | `…` | `dob` | `…` |

    | --- | --- | --- | --- | --- | --- |

    | 92 | Nan | Keen | … | 1943-05-18 | … |

    | 392 | Daisy | Chain | … | 1943-05-18 | … |


    （你会注意到有不止一位最年长的顾客，因为他们恰好在同一天出生。这种情况时有发生。）


    在这两种情况下，子查询都被评估一次，其结果被用于主查询。结果可能是一个列表，如女性作家示例，也可能是一个单一值，如最年长的顾客示例。


    非关联子查询独立于主查询。如果你只高亮显示子查询并运行它，你也会得到一个结果。


    以下是一个关联子查询的例子：


    ```

    --  书籍作者（是的，还有另一种方法可以实现）

    SELECT

    id, title, (

    SELECT coalesce(givenname||'' '','''')

    || coalesce(othernames||'' '','''')

    || familyname

    FROM authors

    WHERE authors.id=books.authorid

    ) AS author

    FROM books;


    --  MSSQL

    SELECT

    id, title, (

    SELECT coalesce(givenname+'' '',''''

    + coalesce(othernames+'' '','''')

    + familyname

    FROM authors

    WHERE authors.id=books.authorid

    ) AS author

    FROM books;


    --  Oracle

    SELECT

    id, title, (

    SELECT ltrim(givenname||'' '')

    ||ltrim(othernames||'' '')

    ||familyname

    FROM authors

    WHERE authors.id=books.authorid

    ) AS author

    FROM books;

    ```


    这会给出以下结果：


    | `id` | `title` | `author` |

    | --- | --- | --- |

    | 2078 | The Duel | Heinrich von Kleist |

    | 503 | Uncle Silas | J. Sheridan Le Fanu |

    | 2007 | North and South | Elizabeth Gaskell |

    | 702 | Jane Eyre | Charlotte Brontë |

    | 1530 | Robin Hood, The Prince of Thieves | Alexandre Dumas |

    | 1759 | La Curée | Émile Zola |

    | ~ 1201 rows ~ |


    在这种情况下，子查询对每一行都重新评估一次。看一下前面第一个例子中的子查询，为了让它更易读，我们把它展开：


    ```

    (

    SELECT

    coalesce(givenname||'' '','''')

    || coalesce(othernames||'' '','''')

    || familyname

    FROM authors

    WHERE authors.id=books.authorid

    )

    ```


    `SELECT` 子句期望 `author` 列是一个单一值，因此子查询应该提供一个单一值，它确实做到了。在这种上下文中，你不能使用多列，所以你需要将姓名连接起来以给出这个单一值。


    同样重要的是，你也不能返回多行。在这里，`WHERE` 子句将结果过滤为一行，其中 `id` 与主查询中的 `authorid` 匹配：`WHERE authors.id=books.authorid`。


    对于 `books` 表中的每一行，子查询都会再次运行以匹配下一个 `authorid`。


    如果没有匹配项，子查询会返回一个 `NULL`。


    你可以通过查询引用了主查询中的某些内容来识别关联子查询。因此，你不能高亮显示子查询并单独运行它，因为它需要那个引用才能完整。


    顺便提一下，注意子查询中的 `WHERE` 子句。在某种意义上，它的条件是过强的，我们本可以这样写：`WHERE id=authorid`。尽管 `id`
    列在子查询和主查询中都出现了。


    当子查询被评估时，列名将由内向外定义。对于 `id` 列，内部的 `authors` 表中有一个，所以 SQL 不会费心去注意外部的 `books` 表中也有一个。对于
    `authorid` 列，`authors` 表中没有，所以它就对应到了 `books` 表中的那个。


    这就是 SQL 中的工作方式，但像我们在示例中那样限定列名，可能对我们人类读者来说能最大限度地减少混淆。


    一般来说，关联子查询是一项昂贵的操作，因为它被频繁地重新评估。这并不意味着你不应该使用它，只是意味着如果有其他选择，你应该考虑替代方案。你通常无法选择需要哪种类型的子查询，但它有助于在决定是否有更好的替代方案时提供参考。'
- fmt: '## Subqueries in the SELECT Clause


    As we saw, a subquery in a `SELECT` clause is expected to return a single value
    for each row. This can be tedious if, say, you want more than one value from the
    same external table with a correlated subquery:


    ```sql

    SELECT

    id, title, (

    SELECT coalesce(givenname||'' '','''')

    || coalesce(othernames||'' '','''')

    || familyname

    FROM authors

    WHERE authors.id=books.authorid

    ) AS author,

    (SELECT born FROM authors

    WHERE authors.id=books.authorid) AS born,

    (SELECT died FROM authors

    WHERE authors.id=books.authorid) AS died

    FROM books;

    ```


    Apart from being tedious, it’s also expensive, and, of course, there’s a better
    way to do it, using a join:


    ```sql

    SELECT

    id, title,

    coalesce(givenname||'' '','''')

    || coalesce(othernames||'' '','''')

    || familyname AS author,

    born, died

    FROM books AS b LEFT JOIN authors AS a ON b.authorid=a.id;

    --  Oracle

    --  FROM books b LEFT JOIN authors a ON b.authorid=a.id;

    ```


    In fact, you’ll probably find that a correlated subquery is often best replaced
    by a join. There’s also some cost in the join, but after that, the rest of the
    data is free.


    On the other hand, if the subquery is non-correlated, then it’s not so expensive.
    For example, here’s the difference between customers’ heights and the average
    height:


    ```sql

    SELECT

    id, givenname, familyname,

    height,

    height-(SELECT avg(height) FROM customers) AS diff

    FROM customers;

    ```


    You should see something like this:


    | **id** | **givenname** | **familyname** | **height** | **Diff** |

    | --- | --- | --- | --- | --- |

    | 42 | May | Knott | 168.5 | -2.34 |

    | 459 | Rick | Shaw | 170.9 | 0.06 |

    | 597 | Ike | Andy | 153.0 | -17.84 |

    | 186 | Pat | Downe | 176.0 | 5.16 |

    | 352 | Basil | Isk | 156.4 | -14.44 |

    | 576 | Pearl | Divers | 176.3 | 5.46 |

    | ~ 303 rows ~ |


    Even though the average is involved in a calculation in every row, it’s only calculated
    once in the non-correlated subquery.


    By the way, there’s an alternative way to do the preceding query involving `window
    functions`, which we’ll look at in Chapter [8](#606708_1_En_8_Chapter.xhtml).
    However, in this case, there’s not much difference in the result.


    You’ll have noticed that, in this case, the subquery references the same table
    as the main query. That doesn’t make it a correlated subquery, as it doesn’t reference
    the actual *rows* in the main query. You can verify that if you highlight the
    subquery and run it by itself—it will work.


    The subquery in this example was an aggregate query. You can also use an aggregate
    in a correlated query. Here’s a way of generating a running total:


    ```sql

    --  Oracle: FROM sales ss

    SELECT

    id, ordered, total,

    (SELECT sum(total) FROM sales AS ss

    WHERE ss.ordered<=sales.ordered) AS running_total

    FROM sales

    ORDER BY id;

    ```


    You’ll get something like this:


    | id | ordered | total | running_total |

    | --- | --- | --- | --- |

    | 1 | 2022-05-04 21:53:55.165107 | 43.00 | 43.00 |

    | 2 | 2022-05-05 12:39:41.438631 | 54.50 | 97.50 |

    | 3 | 2022-05-05 17:48:08.433387 | 96.00 | 193.50 |

    | 4 | 2022-05-07 08:29:35.61573 | 17.50 | 321.50 |

    | 5 | 2022-05-07 13:10:25.441528 | 63.00 | 384.50 |

    | 6 | 2022-05-06 17:23:38.261261 | 18.00 | 211.50 |

    | ~ 5549 rows |


    We’ve had to alias the table in the subquery to something like `ss` (subsales?)
    to distinguish it from the same table in the main query. That’s so that the expression
    `ss.ordered<=sales.ordered` can reference the correct tables.


    Here, the subquery calculates the sum of the `total`s up to and including the
    current sale, ordered by the `ordered` column.


    You possibly noticed that the query took a little while to run. As we noted, a
    correlated subquery is costly, and one which involves aggregates is especially
    costly. Fortunately, there’s also a window function for that, as we’ll see in
    the next chapter.


    ## Subqueries in the WHERE Clause


    A subquery can also be used to filter your data.


    Again, you may find an alternative to subqueries, such as `JOIN`s, but one compelling
    use case is when the subquery is an aggregate query.


    Here are some cases where the subquery makes the point clearly and simply.


    ### Subqueries with Simple Aggregates


    One place where a subquery is useful is when you need to mix aggregate and non-aggregate
    queries. For example, if you want to find the oldest customer, you’ll need to
    do it in two steps:


    1.  Use an aggregate query to find the earliest date of birth.


    2.  Use the aggregate result as a filter.


    Here, you see the aggregate query used as a subquery:


    ```sql

    SELECT *

    FROM customers

    WHERE dob=(SELECT min(dob) FROM customers);

    ```


    You can also do the same to find customers shorter than the average:


    ```sql

    SELECT *

    FROM customers

    WHERE height<(SELECT avg(height) FROM customers);

    ```


    In both cases, the aggregate query was on the same table as the main query. You
    might have thought that you could use an expression like `WHERE dob=min(dob)`
    or `WHERE height<avg(height)`, but it wouldn’t work; aggregates are calculated
    *after* the `WHERE` clause.'
