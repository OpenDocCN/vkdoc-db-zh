  trans: "\n### 基本排名函数\n\n主要有四个排名函数：\n\n*   `row_number()`: 计算当前行在当前分区中指定顺序下的行号。\n\
    \n    如果`ORDER BY`子句中的两个值相同，它们仍会获得不同的行号；无法保证谁排在前面。\n\n*   `rank()`: 在结果集中给出排名。\n\
    \n    如果`ORDER BY`子句中的两个值相同，它们将获得相同的排名。下一个不同的值不会获得紧接的下一个排名；它会追上一行的行号。\n\n*   `count(*)`:\
    \ 如果你省略窗口框架子句，让它默认为`RANGE`，它的行为将与`rank()`相似，但有一个区别。我们稍后会看这个区别。\n\n*   `dense_rank()`:\
    \ 这也会给出一个排名，类似于之前的`rank()`。然而，下一个不同的值会获得下一个排名，因此它会逐渐落后于行号。\n\n如果未指定分区（即没有`PARTITION\
    \ BY`子句），则上述函数将应用于整个表。否则，它们将给出组内的位置。\n\n`rank()`和`dense_rank()`之间的区别在于，对于相等的值，`rank()`会从下一个`row_number()`开始计数，而`dense_rank()`不会。\n\
    \n如果`ORDER BY`值不是唯一的\n\n*   `row_number()`是任意的。\n\n*   `rank()`给出的是组*开始*处的排名。\n\
    \n*   `count(*)`给出的是组*结束*处的排名。\n\n*   `dense_rank()`给出的是组的排名。\n\n如果`ORDER BY`值是唯一的，这些函数都会给出相同的结果。\n\
    \n我们可以用客户身高来测试这一点，我们知道有些身高是重复的：\n\n```sql\nSELECT\nid, givenname, familyname,\n\
    height,\nrow_number() OVER (ORDER BY height) AS row_number,\ncount(*) OVER (ORDER\
    \ BY height) AS count,\nrank() OVER (ORDER BY height) AS rank,\ndense_rank() OVER\
    \ (ORDER BY height) AS dense_rank\nFROM customers\nWHERE height IS NOT NULL\n\
    ORDER BY height;\n```\n\n你会得到类似这样的结果：\n\n| `id` | `…` | `height` | `row_number`\
    \ | `count` | `rank` | `dense_rank` |\n| --- | --- | --- | --- | --- | --- | ---\
    \ |\n| 597 | … | 153 | 1 | 2 | 1 | 1 |\n| 283 | … | 153 | 2 | 2 | 1 | 1 |\n| 451\
    \ | … | 153.8 | 3 | 3 | 3 | 2 |\n| 194 | … | 154.3 | 4 | 4 | 4 | 3 |\n| 534 |\
    \ … | 156.4 | 5 | 6 | 5 | 4 |\n| 352 | … | 156.4 | 6 | 6 | 5 | 4 |\n| ~ 267 行\
    \ ~ |\n\n当然，你的实际结果可能不同。然而，在上面的例子中，我们可以看到\n\n*   `row_number()`是唯一的，与实际值无关。\n*\
    \   对于相等的值，`rank()`是相同的。*下一个*值与`row_number()`匹配。\n*   对于相等的值，`count(*)`也是相同的。*下一个*值也与`row_number()`匹配。\n\
    *   对于相等的值，`rank()`与*第一个*`row_number()`相同；`count(*)`与*最后一个*`row_number()`相同。\n\
    *   对于相等的值，`dense_rank()`也是相同的。*下一个*值会获得下一个排名。等到结果集结束时，它会与行号相差很大。\n\n对于大多数数据库管理系统，排名函数都需要一个`ORDER\
    \ BY`窗口子句。这是合理的，因为没有顺序，排名就没有意义。\n\n例外包括 PostgreSQL 和 SQLite，它们允许空的窗口子句：\n\n```sql\n\
    --  PostgreSQL, SQLite\nSELECT\nid, givenname, familyname,\nheight,\nrow_number()\
    \ OVER () AS row_number,\ncount(*) OVER () AS count,\nrank() OVER () AS rank,\n\
    dense_rank() OVER () AS dense_rank\nFROM customers\nWHERE height IS NOT NULL\n\
    ORDER BY height;\n```\n\n然而，结果是没有意义的。`count(*)`、`rank()`和`dense_rank()`表达式都为整个结果集给出一个值，而`row_number()`则以任意顺序给出的行号。\n\
    \n### 使用 PARTITION BY 进行排名\n\n默认情况下，像`row_number()`这样的排名函数会对整个结果集进行排名。你也可以使用`PARTITION\
    \ BY`按组进行排名：\n\n```sql\nSELECT\nid, ordered_date, total,\nrow_number() OVER (PARTITION\
    \ BY ordered_date) AS row_number\nFROM sales\nORDER BY ordered;\n```\n\n结果将是类似这样的：\n\
    \n| `id` | `ordered_date` | `total` | `row_number` |\n| --- | --- | --- | ---\
    \ |\n| 1 | 2022-05-04 | 43 | 1 |\n| 2 | 2022-05-05 | 54.5 | 1 |\n| 3 | 2022-05-05\
    \ | 96 | 2 |\n| 6 | 2022-05-06 | 18 | 2 |\n| 7 | 2022-05-06 | 92.5 | 1 |\n| 4\
    \ | 2022-05-07 | 17.5 | 1 |\n| ~ 5295 行 ~ |\n\n行号可能不是预期的顺序，因为没有指定排序。为了完成工作，我们还应该包含排序：\n\
    \n```sql\nSELECT\nid, ordered_date, total,\nrow_number() OVER (\nPARTITION BY\
    \ ordered_date ORDER BY ordered\n) AS row_number\nFROM sales\nORDER BY ordered;\n\
    ```\n\n现在的行号就是我们所预期的顺序了：\n\n| `id` | `ordered_date` | `total` | `row_number` |\n\
    | --- | --- | --- | --- |\n| 1 | 2022-05-04 | 43 | 1 |\n| 2 | 2022-05-05 | 54.5\
    \ | 1 |\n| 3 | 2022-05-05 | 96 | 2 |\n| 6 | 2022-05-06 | 18 | 1 |\n| 7 | 2022-05-06\
    \ | 92.5 | 2 |\n| 4 | 2022-05-07 | 17.5 | 1 |\n| ~ 5295 行 ~ |\n\n你可以以一种创造性的方式使用分组行号。例如，你可能只想显示每天第一笔销售的日期。你可以使用`CASE\
    \ ... END`表达式有选择地显示日期：\n\n```sql\nCASE\nWHEN row_number() OVER\n(PARTITION BY\
    \ ordered_date ORDER BY ordered)=1\nTHEN CAST(ordered_date AS varchar(16))\nELSE\
    \ ''\nEND AS ordered_date,\n```\n\n重新排列并重命名几个列，你会得到\n\n```sql\nSELECT\nid,\nCASE\n\
    WHEN row_number() OVER\n(PARTITION BY ordered_date ORDER BY ordered)=1\nTHEN CAST(ordered_date\
    \ AS varchar(16))\nELSE ''\nEND AS ordered_date,\nrow_number() OVER (PARTITION\
    \ BY ordered_date) AS item,\ntotal\nFROM sales\nORDER BY ordered;\n```\n\n这会给你一个看起来更简洁的结果：\n\
    \n| `id` | `ordered_date` | `item` | `Total` |\n| --- | --- | --- | --- |\n| 1\
    \ | 2022-05-04 | 1 | 43 |\n| 2 | 2022-05-05 | 1 | 54.5 |\n| 3 | | 2 | 96 |\n|\
    \ 6 | 2022-05-06 | 1 | 18 |\n| 7 | | 2 | 92.5 |\n| 4 | 2022-05-07 | 1 | 17.5 |\n\
    | 5 | | 2 | 63 |\n| 9 | | 3 | 61.5 |\n| 10 | 2022-05-08 | 1 | 67.5 |\n| 11 | |\
    \ 2 | 18.5 |\n| 8 | | 3 | 54 |\n| 13 | | 4 | 74.5 |\n| ~ 5295 行 ~ |\n\n当然，你仍然可以包含你的累计总数。\n"
- fmt: '# Paging Results


    One reason why you might want the overall row number is that you might want to
    break up your results into pages. For example, suppose you want your results in
    pages of, say, twenty, and you now want to display page 3 of that.


    We can start with our `pricelist` view and include the `row_number()` window function:


    ```sql

    SELECT

    id, title, published, author,

    price, tax, inc,

    row_number() OVER(ORDER BY id) AS row_number

    FROM aupricelist;

    ```


    We haven’t yet included an `ORDER BY` clause, because there’s more to come. Some
    DBMSs may decide to produce the results in `id` order, but that’s not guaranteed,
    of course.


    We can now put this in a CTE and filter on the row number:


    ```sql

    WITH cte AS (

    SELECT

    id, title, published, author,

    price, tax, inc,

    row_number() OVER(ORDER BY id) AS row_number

    FROM aupricelist

    )

    SELECT *

    FROM cte

    WHERE row_number BETWEEN 40 AND 59

    ORDER BY id;

    ```


    You’ll get something like


    | **id** | **title** | **…** | **price** | **tax** | **inc** | **row_number**
    |

    | --- | --- | --- | --- | --- | --- | --- |

    | 98 | Camilla | … | 12 | 1.2 | 13.2 | 40 |

    | 102 | The Mystery of a Hansom … | … | 14.5 | 1.45 | 15.95 | 41 |

    | 103 | Persian Letters | … | 15.5 | 1.55 | 17.05 | 42 |

    | 104 | Sinners in the Hands of … | … | 19.5 | 1.95 | 21.45 | 43 |

    | 106 | Trafalgar | … | 16 | 1.6 | 17.6 | 44 |

    | 109 | The Scarlet Letter and S … | … | 19.5 | 1.95 | 21.45 | 45 |

    | ~ 20 rows ~ |


    Oracle has a built-in value called `rownum`. Sadly, you still need to use it from
    a CTE or a subquery.


    Of course, you don’t have to order by the `id`. You can use the `title`, or the
    `price`, as long as you include it in both the window function and in the `ORDER
    BY` clause. And, of course, you can also use `DESC`.


    There is an alternative way to do this. Officially, you can use the `OFFSET ...
    FETCH ...` clause:


    ```sql

    --  PostgreSQL, MSSQL, Oracle

    SELECT

    id, title, published, author,

    price, tax, inc,

    row_number() OVER(ORDER BY id) AS row_number

    ORDER BY id OFFSET 40 ROWS FETCH FIRST 20 ROWS ONLY;

    ```


    This skips over the first 40 rows and fetches the next 20 rows after that.


    Unofficially, some DBMSs support `LIMIT ... OFFSET`:


    ```sql

    --  PostgreSQL (again), MariaDB/MySQL, SQLite

    SELECT

    id, title, published, author,

    price, tax, inc,

    row_number() OVER(ORDER BY id) AS row_number

    ORDER BY id LIMIT 20 OFFSET 40;

    ```


    This is a simpler syntax, but, unfortunately, not the official syntax.


    MSSQL also supports the simple `SELECT TOP` syntax, but it’s not so flexible.


    Of course, these two alternatives are much simpler than using the window function
    technique, but there is an advantage with using the window function.


    Suppose you’re sorting by something non-unique, such as the `price`. The problem
    with the normal paging techniques, including the `row_number()` earlier, is that
    the page stops strictly at the number of rows (or less if there are no more).


    If you decide to keep the prices together, you can instead use something like


    ```sql

    WITH cte AS (

    SELECT

    id, title, published, author,

    price, tax, inc,

    rank() OVER(ORDER BY price) AS rank

    FROM aupricelist

    )

    SELECT *

    FROM cte

    WHERE rank BETWEEN 40 AND 59

    ORDER BY price;

    ```


    As long as the groupings aren’t too big, it should give you nearly the same results,
    but with all the books of one price together.


    # Working with ntile


    If you want to split your ordered result set into, say, ten groups, we refer to
    the groups as `deciles`, from the Latin word for ten. If you want five groups,
    then they’re called `pentiles`, and one hundred groups would be `percentiles`.
    If you know enough Latin, you can go on to have seven groups or thirteen groups.


    Mathematicians have a generic name for any number, called `n`, which is rather
    catchy once you get used to it. If you separate your ordered data into groups,
    you create `ntiles`, and the window function is `ntile(n)`, where `n` is the number
    of groups.


    For example, to create deciles by height in your customers table, you can use


    ```sql

    SELECT

    id, givenname, familyname, height,

    ntile(10) OVER (order by height) AS decile

    FROM customers

    WHERE height IS NOT NULL;

    ```


    You’ll get something like this:


    | **id** | **givenname** | **familyname** | **height** | **decile** |

    | --- | --- | --- | --- | --- |

    | 597 | Ike | Andy | 153 | 1 |

    | 283 | Ethel | Glycol | 153 | 1 |

    | 451 | Fred | Knott | 153.8 | 1 |

    | 194 | Rod | Fishing | 154.3 | 1 |

    | 534 | Minnie | Bus | 156.4 | 1 |

    | 352 | Basil | Isk | 156.4 | 1 |

    | ~ 267 rows ~ |


    Notice that we’ve filtered out the `NULL` heights. If we hadn’t, then the first
    or last decile or so will be filled with `NULL` heights, depending on your DBMS.
    This creates a group that doesn’t really belong, but are included anyway.


    That’s just one trap with `ntile()`. There are two traps, one of which might be
    a deal breaker.


    First, note that the preceding result has 267 rows, which doesn’t evenly divide
    by 10. That’s OK, but SQL has to work this one out, and you’ll find that the first
    seven groups will have 27 rows, and the rest 26. Of course, your own results may
    be different, but the idea is the same: the remainder rows will fill in from the
    front.


    The second trap might take some hunting and may not be apparent in your own sample
    database. If you look hard enough, you may find something like this:


    | **id** | **givenname** | **familyname** | **height** | **decile** |

    | --- | --- | --- | --- | --- |

    | … |

    | 388 | Ron | Delay | 166.9 | 3 |

    | 546 | Pat | Ella | 167.1 | 3 |

    | 106 | Jay | Walker | 167.1 | 3 |

    | 77 | Lyn | Seed | 167.1 | 4 |

    | 403 | Will | Knott | 167.3 | 4 |

    | 314 | Jack | Potts | 167.4 | 4 |

    | … |


    In this sample, you’ll see that three customers have the same height (`167.1`),
    but one of them didn’t fit in the earlier decile, so was pushed into the next.
    That’s more of the unfairness mentioned earlier, as is due to the fact that `ntile`s
    are calculated purely on the row number and the value.


    If you were, for example, awarding prizes or discounts to customers in certain
    deciles, it would be unfair to miss out just because the sort order is unpredictable.


    This might be a deal breaker, if you rely on the `ntile`. There is, however, a
    workaround.'
  raw: '### Paging Results


    One reason why you might want the overall row number is that you might want to
    break up your results into pages. For example, suppose you want your results in
    pages of, say, twenty, and you now want to display page 3 of that.


    We can start with our `pricelist` view and include the `row_number()` window function:


    ```

    SELECT

    id, title, published, author,

    price, tax, inc,

    row_number() OVER(ORDER BY id) AS row_number

    FROM aupricelist;

    ```


    We haven’t yet included an `ORDER BY` clause, because there’s more to come. Some
    DBMSs may decide to produce the results in `id` order, but that’s not guaranteed,
    of course.


    We can now put this in a CTE and filter on the row number:


    ```

    WITH cte AS (

    SELECT

    id, title, published, author,

    price, tax, inc,

    row_number() OVER(ORDER BY id) AS row_number

    FROM aupricelist

    )

    SELECT *

    FROM cte

    WHERE row_number BETWEEN 40 AND 59

    ORDER BY id;

    ```


