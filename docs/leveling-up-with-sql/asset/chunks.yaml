    \ strftime('%Y-%m-%d',d,'+1 day'), n+1 FROM dates\nWHERE d<'2023-05-01' AND n<10000\n\
    )\nSELECT * FROM dates;\n--  Oracle\nWITH dates(d, n) AS (\nSELECT date '2023-01-01',\
    \ 1 FROM dual\nUNION ALL\nSELECT d+1, n+1 FROM dates\nWHERE d<date'2023-05-01'\
    \ AND n<10000\n)\nSELECT * FROM dates;\n```\n\n你将看到一系列的日期（和数字）：\n\n| **D** | **n**\
    \ |\n| --- | --- |\n| 2023-01-01 | 1 |\n| 2023-01-02 | 2 |\n| 2023-01-03 | 3 |\n\
    | 2023-01-04 | 4 |\n| 2023-01-05 | 5 |\n| 2023-01-06 | 6 |\n| ~ 121 行 ~ |\n\n\
    你会注意到，对于 MSSQL，我们添加了 `OPTION (MAXRECURSION 0)`，这基本上禁用了递归限制。\n\n还要注意 `WHERE` 子句中的\
    \ `AND n<10000`。这个数字相当大，相当于超过 27 年，但它不是无限的。如果你在何时停止 CTE 上犯了错误，这个表达式应该能限制递归次数。\n\
    \n你可能想知道为什么你想要一个介于 `2023-01-01` 和 `2023-05-01` 之间的日期序列，答案会是“为什么不呢？”，这并没有说服力。然而，我们将使用这种技术来克服第\
    \ 8 章中提到的问题：我们的一些日期会从摘要中缺失。"
- fmt: '### Joining a Sequence CTE to Get Missing Values


    You can `JOIN` a recursive CTE which generates a sequence with another table or
    CTE which has gaps in the sequence to fill in the missing values.


    For example, to get the number of customers born per year, it is possible that
    some years will be missing, but you would like to include the missing year anyway.


    First, get a sequence of years:


    ```sql

    --  PostgreSQL, MariaDB/MySQL, SQLite

    WITH RECURSIVE

    allyears(year) AS (

    SELECT 1940

    UNION

    SELECT year+1 FROM allyears WHERE year<2010

    )

    --  MSSQL, Oracle

    WITH

    allyears(year) AS (

    SELECT 1940

    UNION ALL

    SELECT year+1 FROM allyears WHERE year<2010

    )

    ```


    Next, get the customer (`id`) and the year of birth of the customers:


    ```sql

    --  PostgreSQL, MariaDB/MySQL, Oracle

    yobs(yob) AS (

    SELECT id, EXTRACT(year FROM dob)

    FROM customers WHERE dob IS NOT NULL

    )

    --  MSSQL

    yobs(yob) AS (

    SELECT id, year(dob)

    FROM customers WHERE dob IS NOT NULL

    )

    --  SQLite

    yobs(yob) AS (

    SELECT id, strftime(''%Y'',dob)

    FROM customers WHERE dob IS NOT NULL

    )

    ```


    Finally, `JOIN` them and get the aggregate:


    ```sql

    WITH RECURSIVE  --  MSSQL, Oracle: no RECURSIVE

    allyears(year) AS ( ),

    yobs AS ( )

    SELECT allyears.year, count(*) AS nums

    FROM allyears LEFT JOIN yobs ON allyears.year=yobs.yob

    GROUP BY allyears.year

    ORDER BY allyears.year;

    ```


    You’ll need the `LEFT JOIN` to include all of the sequence of years even if it
    doesn’t match a customer year; after all, that’s why it’s there.


    | `year` | `nums` |

    | --- | --- |

    | 1940 | 1 |

    | 1941 | 1 |

    | 1942 | 1 |

    | 1943 | 1 |

    | 1944 | 1 |

    | 1945 | 1 |

    | ~ 71 rows ~ | |


    We’ll do the same sort of thing for sales data.


    ### Daily Comparison Including Missing Days


    The same can be applied to missing dates. In Chapter [8](#606708_1_En_8_Chapter.xhtml),
    we generated a summary of sales per day. We then created a view with daily sales,
    such as were available. We can then select from the view:


    ```sql

    SELECT *

    FROM daily_sales

    ORDER BY ordered_date;

    ```


    You get something like this:


    | `ordered_date` | `ordered_month` | `daily_total` |

    | --- | --- | --- |

    | 2022-04-08 | 2022-04 | 97.5 |

    | 2022-04-09 | 2022-04 | 96 |

    | 2022-04-10 | 2022-04 | 191 |

    | 2022-04-11 | 2022-04 | 201.5 |

    | 2022-04-12 | 2022-04 | 91 |

    | 2022-04-13 | 2022-04 | 160 |

    | ~ 385 rows ~ |   |   |


    However, if you look hard enough, you’ll find some dates missing. We’re about
    to fill them in.


    For this, we’ll need the following:

    *   The `daily_sales` view

    *   A CTE with the first and last dates of the daily sales

    *   A sequence of dates


    You already know how to generate a sequence of dates. This time, instead of starting
    and stopping on arbitrary dates, we’ll start and stop on the first and last dates
    of the `daily_sales` view. We can put those values in a CTE for reference:


    ```sql

    WITH

    vars(first_date, last_date) AS (

    SELECT min(ordered_date), max(ordered_date)

    FROM daily_sales

    )

    ```


    We can now use these values to generate our sequence of dates:


    ```sql

    --  PostgreSQL

    WITH RECURSIVE

    vars(first_date, last_date) AS ( ),

    dates(d) AS (

    SELECT first_date FROM vars

    UNION

    SELECT d+1 FROM vars, dates WHERE d<last_date

    )

    --  MariaDB / MySQL

    WITH RECURSIVE

    vars(first_date, last_date) AS ( ),

    dates(d) AS (

    SELECT first_date FROM vars

    UNION

    SELECT date_add(d, interval 1 day)

    FROM vars, dates WHERE d<last_date

    )

    --  MSSQL

    WITH

    vars(first_date, last_date) AS ( ),

    dates(d) AS (

    SELECT first_date FROM vars

    UNION ALL

    SELECT dateadd(day,1,d)

    FROM vars, dates WHERE d<last_date

    )

    --  SQLite

    WITH RECURSIVE

    vars(first_date, last_date) AS ( ),

    dates(d) AS (

    SELECT first_date FROM vars

    UNION

    SELECT strftime(''%Y-%m-%d'',d,''+1 day'')

    FROM vars, dates WHERE d<last_date

    )

    --  Oracle

    WITH

    vars(first_date, last_date) AS ( ),

    dates(d) AS (

    SELECT first_date FROM vars

    UNION ALL

    SELECT d+1 FROM vars, dates WHERE d<last_date

    )

    ```


    For those DBMSs which use the keyword `RECURSIVE`, you use it once at the beginning,
    even if some of the CTEs aren’t recursive.


    Notice that we’ve cross-joined the `vars` and `dates`, which is the usual technique
    of applying variables to another table. We could have written `CROSS JOIN`, but
    it’s not worth the effort.


    We can now complete our query using a `LEFT JOIN` to get all of the sequence of
    dates:


    ```sql

    WITH RECURSIVE  --  MSSQL, Oracle: no RECURSIVE

    vars(first_date, last_date) AS (

    --  etc

    ),

    dates(d) AS (

    --  etc

    )

    SELECT d AS ordered_date, daily_sales.daily_total

    FROM dates LEFT JOIN daily_sales ON dates.d=daily_sales.ordered_date

    ORDER BY dates.d;

    ```


    We’ll now see the following:


    | `ordered_date` | `daily_total` |

    | --- | --- |

    | 2022-04-08 | 97.5 |

    | 2022-04-09 | 96 |

    | 2022-04-10 | 191 |

    | 2022-04-11 | 201.5 |

    | 2022-04-12 | 91 |

    | 2022-04-13 | 160 |

    | ~ 387 rows ~ | |


    Notice that we’ve selected `dates.d AS ordered_date` in favor of the `ordered_date`
    from the `daily_sales` view. That’s because the latter has some missing dates,
    which is why we went to this trouble in the first place.


    Of course, generating a simple sequence isn’t the only use for a recursive CTE.


    ### Traversing a Hierarchy


    Another use case for a recursive CTE is to traverse a hierarchy. The hierarchy
    we’re going to look at is in the `employees` table:


    ```sql

    SELECT * FROM employees;

    ```


    Of course, in a real employees table, there would be more details; we’ve only
    included enough here to make the point.


    In particular, you’ll see that in the `employees` table, there is a `supervisorid`
    column which is a foreign key to the same table:


    ```sql

    employees.supervisorid ➤ employees.id

    ```


    A more naive approach would be either to include the supervisor’s name, which
    is wrong for the same reasons we don’t include the author’s name with the books
    table, or to reference another table of supervisors, which is wrong for a different,
    more subtle reason.


    With books and authors, the point is that an author is not the same as a book.
    In a well-designed database, each table has only one type of member. That’s not
    the case with employees and supervisors. Put simply, the supervisor is another
    employee.


    We’re going to traverse the `employees` table to get a list of employees and their
    supervisors.


    #### Getting a Single-Level Hierarchy


    Without a recursive CTE, you can get employees’ supervisors with a simple `OUTER
    JOIN` to the same table. This is often referred to as a `self-join`:


    ```sql

    SELECT

    e.id AS eid,

    e.givenname, e.familyname,

    s.id AS sid,

    s.givenname||'' ''||s.familyname AS supervisor

    --  s.givenname+'' ''+s.familyname AS supervisor  --  MSSQL

    FROM employees AS e LEFT JOIN employees AS s

    ON e.supervisorid=s.id                --  Oracle: No AS

    ORDER BY e.id;

    ```


    You’ll get something like this:


    | `eid` | `givenname` | `familyname` | `sid` | `supervisor` |

    | --- | --- | --- | --- | --- |

    | 1 | Marmaduke | Mayhem | 10 | Beryl Bubbles |

    | 2 | Osric | Pureheart | 12 | Mildred Thisenthat |

    | 3 | Rubin | Croucher | [NULL] | [NULL] |

    | 4 | Gladys | Raggs | 29 | Fred Nurke |

    | 5 | Cynthia | Hyphen-Smythe | 12 | Mildred Thisenthat |

    | 6 | Sebastian | Trefether | 5 | Cynthia Hyphen-Smythe |

    | ~ 34 rows ~ | | | | |


    The trick is, when joining a table to itself, you need to give the table two different
    aliases to qualify the join.'
