    \   Modifying tables to follow the principles more closely\n\n*   Improving the\
    \ reliability and integrity of the database by adding additional checks and constraints\n\
    \n*   Improving the performance of the database by adding indexes to help find\
    \ data more efficiently\n\nOf course, we won’t be able to make the table perfect:\
    \ that would take a long time and a lot of experience with the database. You mightn’t\
    \ even be in a position to do this with your database. However, we’ll be able\
    \ to get a better understanding of what makes a database work better.\n\n## Understanding\
    \ Normalized Tables\n\nOne of the first things to consider is how individual tables\
    \ are designed and constructed. The goal is to be sure that each piece of data\
    \ has a distinct and identifiable place and that the data is in its simplest form.\n\
    \nMathematicians have a term for anything in its purest form: they say it is **normal**.\
    \ As with so many mathematical terms, it probably doesn’t mean what it looks like:\
    \ it doesn’t mean that it’s common, but that it’s definitive.\n\nDeveloping a\
    \ database table often starts with a rough idea of the sort of data to be stored\
    \ and then goes through a process of **normalization**: examining the features\
    \ of the table and making changes to fit in better with the requirements of a\
    \ normal table.\n\nThere are various rules and levels of normalization. In general,\
    \ a normalized database meets the following requirements:\n\n*   Data is atomic.\n\
    \n    This means that data is broken down into its smallest practical parts.\n\
    \n*   Rows are unordered.\n\n    Of course, you will always see the rows in some\
    \ sort of order, but the row order is insignificant.\n\n*   Rows are unique.\n\
    \n    There shouldn’t be any genuine duplicates. Coincidences are, of course,\
    \ another matter.\n\n*   Rows are independent.\n\n    Whatever appears in one\
    \ row should have no effect on what appears in another row within the table.\n\
    \n*   Columns are independent of each other.\n\n    More technically, columns\
    \ are dependent only on the primary key.\n\n*   Columns are of a single type.\n\
    \n    You can’t mix data types in a single column. Strictly, you shouldn’t be\
    \ able to mix **domains**, which are sets of acceptable values, but SQL has a\
    \ hard time checking that.\n\n*   Column names are unique.\n\n*   Columns are\
    \ unordered.\n\n    Again, columns will appear in some sort of order—by default,\
    \ in the order in which the table is designed. However, the column order is insignificant.\n\
    \nOne of the design problems that normalization addresses deals with multiple\
    \ values. If data is to be atomic, and columns are to be independent, how do you\
    \ manage multiple values? For example, how do you handle sales with multiple sale\
    \ items or books with multiple genres?\n\nThe solution is to put these values\
    \ into a separate table, one value per row, and let the table refer back to the\
    \ first table. We will be looking at the relationships between tables, especially\
    \ in handling multiple values, in the next chapter. The basic idea will be that\
    \ an additional table will hold multiple values in multiple rows; it will then\
    \ include a **foreign key**, a reference to a primary key in the first table.\n\
    \nIn this chapter, we’ll look at some of these principles and see how our database\
    \ compares against them. When we do find shortcomings, we’ll make some changes\
    \ to the tables themselves and even add a few more tables to make the database\
    \ more conformant to these ideas. We’ll also look at ways of ensuring that the\
    \ data is more reliable and, to some extent, more efficient.\n\nWe’ll begin by\
    \ addressing problems with interdependent columns, which will mean changing some\
    \ tables. It will also mean adding additional tables. To make these changes less\
    \ inconvenient, we’ll look at creating views to take in the additional tables.\n\
    \nWe’ll also look at how to work toward a more reliable database by adding additional\
    \ constraints—data rules—to check what goes into the table in the first place.\n\
    \nFinally, we’ll look at adding indexes to improve the performance of the database.\n\
    \nWhen it comes to the question of multiple values, we’ll see more on that in\
    \ the next chapter, which deals with how tables are related with each other.\n\
    \nNo database is perfect, and it won’t be our aim to make this one perfect: we’ll\
    \ leave a lot of work undone. It’s also quite likely not your job anyway. However,\
    \ at least we’ll get a better understanding of what makes a good database work."
  trans: "# 集合操作\n\n在 SQL 中，表是行的数学集合。这意味着它们不包含重复项且是无序的。这也意味着你可以使用集合操作来组合表和虚拟表。\n\n\
    主要有三种集合操作：\n\n*   `UNION` 组合两个或多个表，并返回所有行，其中任何重复项会被过滤掉。若要保留重复项，需使用 `UNION ALL`\
    \ 子句。\n\n*   `INTERSECT` 仅返回出现在所有参与表中的行。\n\n*   `EXCEPT`（在 Oracle 中也称为 `MINUS`）返回第一个表中存在，但第二个表中不存在的行。\n\
    \n应用集合操作时，关于每个 `SELECT` 语句中的列有一些规则：\n\n*   列在数量和类型上必须匹配。\n\n*   仅使用第一个 SELECT\
    \ 的名称和别名。\n\n*   仅匹配值，这意味着如果你的各个 `SELECT` 改变了列顺序或选择了不同的列，只要它们是兼容的，它们就会被匹配。\n\n\
    一个 `SELECT` 可以包含任何标准子句，例如 `WHERE` 和 `GROUP BY`，但不能包含 `ORDER BY` 子句。不过，你可以在最后使用\
    \ `ORDER BY` 对最终结果进行排序。\n\n集合操作也可用于特殊技术，例如创建示例数据、比较结果集以及组合聚合。\n\n## 后续内容\n\n如前所述，我们不会假设你已精通所有内容。在介绍后续章节时，我们也会回顾一些基本原理，帮助你稳固基础。\n\
    \n在接下来的章节中，我们将重点探讨以下概念：\n\n*   如何提高数据库表的可靠性和效率（第 2 章）\n\n*   表之间如何关联以及如何操作多张表（第\
    \ 3 章）\n\n*   如何操作数值以从中获取更多价值（第 4 章）\n\n*   如何汇总和分析数据（第 5 章）\n\n*   如何保存查询和中间结果（第\
    \ 6 章）\n\n*   如何混合来自多张表的数据和聚合值（第 7 章）\n\n*   如何基于其他查询构建更复杂的查询（第 6、7 和 9 章）\n\n\
    *   如何向数据集中添加累计聚合和排名数据（第 8 章）\n\n在第 2 章中，我们将对数据库表进行一些修改，甚至添加几张表，以改进其整体设计。它不会完美，但将展示如何进一步开发数据库。\n\
    \n脚注 1\n\n# 2. 使用表设计\n\nSQL 数据库是——或者至少应该是——建立在一些相当强大的原则之上的。尽管这些原则在现实生活中有时会被放宽，但如果尽可能遵循它们，数据库将更可靠、更高效。\n\
    \n在本章中，我们将查看现有数据库的部分内容，并探讨如何使用其中一些原则对其进行改进。我们将探讨：\n\n*   对规范化表的基本理解——即按照核心原则构建或重建的表\n\
    \n*   修改表以使其更严格地遵循这些原则\n\n*   通过添加额外的检查和约束来提高数据库的可靠性和完整性\n\n*   通过添加索引以帮助更高效地查找数据来提升数据库性能\n\
    \n当然，我们无法让表变得完美：这需要很长时间以及对数据库的丰富经验。对于你的数据库，你甚至可能无法做到这一点。然而，我们将能够更好地理解是什么让数据库工作得更好。\n\
    \n## 理解规范化表\n\n首先要考虑的事情之一是个别表的设计和构建方式。目标是确保每条数据都有一个独特且可识别的位置，并且数据处于其最简单的形式。\n\n\
    数学家对任何处于最纯粹形式的事物有一个术语：他们称之为 `normal`（规范化的）。与许多数学术语一样，它的含义可能并非字面所示：它并不意味着“常见”，而是指“确定的”。\n\
    \n开发数据库表通常始于对要存储数据类型的大致想法，然后经历一个 **规范化** 过程：检查表的特性并进行更改，以更好地符合规范化表的要求。\n\n规范化有不同的规则和级别。通常，一个规范化的数据库满足以下要求：\n\
    \n*   数据是原子性的。\n\n    这意味着数据被分解成其最小的实用单元。\n\n*   行是无序的。\n\n    当然，你总是会以某种顺序看到行，但行的顺序并不重要。\n\
    \n*   行是唯一的。\n\n    不应有真正的重复行。巧合情况则另当别论。\n\n*   行是独立的。\n\n    一行中出现的任何内容都不应影响同一表中另一行的内容。\n\
    \n*   列彼此独立。\n\n    更专业地说，列仅依赖于主键。\n\n*   列是单一类型的。\n\n    你不能在单个列中混合数据类型。严格来说，你不应该混合\
    \ `domains`（域，即可接受值的集合），但 SQL 很难检查这一点。\n\n*   列名是唯一的。\n\n*   列是无序的。\n\n    同样，列会以某种顺序出现——默认情况下，按表设计的顺序。然而，列的顺序并不重要。\n\
    \n规范化要解决的一个设计问题是处理多值。如果数据要是原子性的，列要是独立的，那么如何管理多个值呢？例如，如何处理有多个销售项目的销售或有多个流派的书籍？\n\
    \n解决方案是将这些值放入一个单独的表中，每行一个值，并让该表引用回第一个表。我们将在下一章探讨表之间的关系，特别是在处理多值时。基本思路是，一个附加表将在多行中保存多个值；然后它将包含一个\
    \ `foreign key`（外键），即对第一个表中主键的引用。\n\n在本章中，我们将研究其中一些原则，并看看我们的数据库与之相比如何。当我们确实发现不足时，我们将对表本身进行一些修改，甚至添加几张表，使数据库更符合这些理念。我们还将探讨确保数据更可靠，并在某种程度上更高效的方法。\n\
    \n我们将从解决相互依赖列的问题开始，这意味着要修改一些表。这也意味着要添加额外的表。为了使这些更改不那么麻烦，我们将探讨创建视图来包含这些额外表。\n\n\
    我们还将探讨如何通过添加额外的约束——即数据规则——来首先检查进入表的数据，从而朝着构建更可靠的数据库努力。\n\n最后，我们将探讨添加索引以提高数据库性能。\n\
    \n关于多值的问题，我们将在下一章中看到更多内容，该章将讨论表之间如何相互关联。\n\n没有数据库是完美的，我们的目标也不是让这个变得完美：我们将留下很多未完成的工作。而且，这很可能也不是你的工作。但是，至少我们将能更好地理解是什么造就了一个好的数据库。"
- fmt: '# Columns Should Be Independent


    One of the fundamental principles of table design is that columns should be independent
    of each other. That is, changing one column shouldn’t necessarily affect another.


    However, if you look at customer addresses:


    ```sql

    SELECT

    id, givenname, familyname,

    street, town, state, postcode

    FROM customers;

    ```


    you will see that there is indeed a relationship between some of the address columns.


    | `Id` | `...` | `street` | `town` | `state` | `postcode` |

    | --- | --- | --- | --- | --- | --- |

    | 85 | z | 1313 Webfoot Walk | Kingston | ACT | 2604 |

    | 355 | ... | 345 Stonecave Road | Kingston | ACT | 2604 |

    | 147 | ... | Apartment 5A, 129 West 81st Street | Kingston | ACT | 2604 |

    | 112 | ... | 890 Fifth Avenue | Kingston | ACT | 2604 |

    | 489 | ... | Apartment 42, 2630 Hegal Place | Gordon | ACT | 2906 |

    | 592 | ... | 0001 Cemetery Lane | Rosebery | NSW | 1445 |

    | ~ 303 rows ~ |


    For example, if you change your address from one town to another, you will probably
    also need to change the `postcode` and possibly the `state`. On top of that, people
    living in the same town probably also have the same `postcode`; certainly, they
    will be in the same `state`.


    This creates a maintenance problem:


    *   Changing address requires changes in *three* columns for a single change.


    *   It is possible to make a mistake and change only some of the data; this creates
    an inconsistency, making the data useless.


    The correct solution would be to move this data to another table.


    ## Adding the Towns Table


    There is an SQL file called `towns.sql`. This will create and populate a `towns`
    table.


    The table has the following structure:


    ```sql

    CREATE TABLE towns (

    id INT PRIMARY KEY, --  auto numbered

    name VARCHAR(...),

    state VARCHAR(...),

    postcode CHAR(4),

    UNIQUE(name,state,postcode)

    );

    ```


    The table also includes an autonumbering `id` column, which is the **primary key**.
    A primary key is a column which uniquely identifies a row. In this case, it’s
    an arbitrary number. The actual details will depend on the DBMS you’re using.


    Although there will be duplicated `name`s, `state`s, and `postcode`s, the *combination*
    will be unique.


    The preceding `UNIQUE` clause also creates an index, which will make searching
    the table faster. You will learn more about indexes later.


    You can run this script now to create and populate the `towns` table.


    Depending on your DBMS, you may need to make sure that you are installing this
    table into the correct database.


    ## Adding a Foreign Key to the Town


    The next step will be to add a column in the `customers` table to reference the
    town in the `towns` table. This is done with an `ALTER` statement:


    ```sql

    ALTER TABLE customers

    ADD townid INT

    CONSTRAINT fk_customers_town REFERENCES towns(id);

    ```


    Note that the `townid` column must match the data type of the `id` column in the
    `towns` table, which, in this case, is an integer.


    You’ll notice that it doesn’t actually use the term `FOREIGN KEY`. It’s the keyword
    `REFERENCES` that makes it a foreign key: in this case, it references an `id`
    in the `towns` table.


    You’ll also notice the naming of the foreign key using `CONSTRAINT fk_customers_town`.
    Every constraint actually has a name, but you don’t have to name it yourself if
    you’re prepared to allow the DBMS to make one up. If so, you can use a shorter
    form:


    ```sql

    ALTER TABLE customers

    ADD townid INT REFERENCES towns(id);

    ```


    If you already had the column, you could have added the foreign key constraint
    retroactively with


    ```sql

    ALTER TABLE customers

    ADD CONSTRAINT fk_customers_town FOREIGN KEY(townid)

    REFERENCES towns(id);

    ```


    By default, when you create a new column, it will be filled with `NULL`s. You
    could have added a default value instead, but that would be pointless in this
    case, since everybody lives somewhere else; in some cases, we don’t have the customer’s
    address at all.


    ## Update the Customers Table


    Now that you have a foreign key column, you will need to fill it with references
    to the corresponding towns.


    If you want to see what these foreign keys should be, you can use a subquery:


    ```sql

    SELECT

    id, givenname, familyname,

    town, state, postcode,    --  existing data

    (SELECT id FROM towns AS t WHERE    --  new data

    t.name=customers.town

    AND t.postcode=customers.postcode

    AND t.state=customers.state

    ) AS reference

    FROM customers;

    ```


    Some of these results will, of course, be `NULL`, as some of the customers have
    no recorded address.


    | `id` | `givenname` | `familyname` | `town` | `state` | `postcode` | `reference`
    |

    | --- | --- | --- | --- | --- | --- | --- |

    | 85 | Corey | Ander | Kingston | ACT | 2604 | 35 |

    | 355 | Joe | Kerr | Kingston | ACT | 2604 | 35 |

    | 147 | Aiden | Abet | Kingston | ACT | 2604 | 35 |

    | 112 | Jerry | Cann | Kingston | ACT | 2604 | 35 |

    | 489 | Justin | Case | Gordon | ACT | 2906 | 135 |

    | 592 | Paddy | Wagon | Rosebery | NSW | 1445 | 386 |

    | ~ 303 rows ~ |


    A subquery is a query within a query. In this case, it’s a simple way of looking
    up something from another table.


    This subquery is a *correlated* subquery: it is run for every row in the main
    query, using values from the main query to compare to the subquery. That’s normally
    an expensive type of query, but we won’t use it very much. It will also be useful
    for the next step.


    You will learn more about subqueries later.


    Note that we have aliased the `towns` table in the subquery; that’s to make the
    code easier to read and write. You could also have aliased the `customers` table,
    but that won’t work for all DBMSs in the next step.


    We don’t just want to look at the reference: we want to copy the reference into
    the `customers` table. You do that with an `UPDATE` statement:


    ```sql

    UPDATE customers

    SET townid=(

    SELECT id FROM towns AS t

    WHERE t.name=customers.town

    AND t.postcode=customers.postcode

    AND t.state=customers.state

    );

    ```


    The `UPDATE` statement is used to change values in an existing table. You can
    set the value to a constant value, a calculated value, or, as in this case, a
    value from another table.


    Here, the same subquery is used to fetch the `id` that will be copied into the
    `townid` column.


    Some DBMSs allow you to alias the `customers` table, which would make the `UPDATE`
    statement a little simpler.


    A correlated subquery can be expensive, and it’s normally preferable to use a
    join if you can. We could have used a join for the `SELECT` statement, but not
    all DBMSs cooperate so well with `UPDATE` statements. Here, the subquery is intuitive
    and works well, and, since you’re only running this once, not too expensive.


    ## Remove the Old Address Columns


    Shortly, we will remove the old address columns, but that’s going to create an
    inconvenience later, since the town data is now in a separate table. That means
    we can’t get the customer’s details including the full address without joining
    the tables. To manage this inconvenience, it will be useful to create a view to
    combine the customer data with the town data.'
