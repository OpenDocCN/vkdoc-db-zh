- fmt: '### PARTITION BY Multiple Columns


    Given that `PARTITION BY` generates subtotals, `PARTITION BY` multiple columns
    will generate subsubtotals, if that''s a real word.


    Suppose, for example, that you want to generate a report of sales by state, town,
    and customer. That data is available, but it''s in multiple tables, and you''ll
    need to prepare it first.


    First, you''ll need to join the `customerdetails` view (which has the state and
    town) with the sales. When the time comes, we''ll put that in a CTE called `customer_sales`:


    ```sql

    --  customer_sales

    SELECT c.id AS customerid, c.state, c.town, total

    FROM customerdetails AS c JOIN sales AS s

    ON c.id=s.customerid

    ```


    We''ll then want to summarize the data by grouping by state, town, and customer
    id. Again, that will go into another CTE:


    ```sql

    --  totals

    SELECT state, town, customerid, sum(total) AS total

    FROM customer_sales

    GROUP BY state, town, customerid

    ```


    We can put this together and check the results:


    ```sql

    WITH

    customer_sales AS (

    SELECT c.id AS customerid, c.state, c.town, total

    FROM customerdetails AS c JOIN sales AS s

    ON c.id=s.customerid

    ),

    totals AS (

    SELECT state, town, customerid, sum(total) AS total

    FROM customer_sales

    GROUP BY state, town, customerid

    )

    SELECT state, town, customerid, total AS customer_total

    FROM totals

    ORDER BY state, customerid;

    ```


    You''ll get a result like this:


    | `state` | `Town` | `customerid` | `customer_total` |

    | --- | --- | --- | --- |

    | ACT | Kingston | 85 | 2469 |

    | ACT | Kingston | 112 | 1387 |

    | ACT | Kingston | 147 | 2439.5 |

    | ACT | Kingston | 355 | 689.5 |

    | ACT | Gordon | 489 | 199 |

    | NSW | Reedy Creek | 10 | 3089 |

    | ~ 269 rows ~ |


    Now for the window functions. First, to get the group total by state, we can use


    ```sql

    sum(total) OVER(PARTITION BY state) AS state_total

    ```


    To get the group total per town, remember that the town name can appear in more
    than one state. To use `PARTITION BY town` would be a mistake, as the town names
    would be conflated. Instead, we use


    ```sql

    sum(total) OVER(PARTITION BY state, town) AS town_total

    ```


    Incorporating these two expressions and adding an `ORDER BY` clause to see it
    all, we get


    ```sql

    WITH

    customer_sales AS (

    SELECT c.id AS customerid, c.state, c.town, total

    FROM customerdetails AS c JOIN sales AS s

    ON c.id=s.customerid

    ),

    totals AS (

    SELECT state, town, customerid, sum(total) AS total

    FROM customer_sales

    GROUP BY state, town, customerid

    )

    SELECT

    state, town, customerid, total AS customer_total,

    sum(total) OVER(PARTITION BY state) AS state_total,

    sum(total) OVER(PARTITION BY state, town) AS town_total

    FROM totals

    ORDER BY state, customerid;

    ```


    The results look like this:


    | `state` | `Town` | `customerid` | `customer_total` | `state_total` | `town_total`
    |

    | --- | --- | --- | --- | --- | --- |

    | ACT | Kingston | 85 | 2469 | 7184 | 6985 |

    | ACT | Kingston | 112 | 1387 | 7184 | 6985 |

    | ACT | Kingston | 147 | 2439.5 | 7184 | 6985 |

    | ACT | Kingston | 355 | 689.5 | 7184 | 6985 |

    | ACT | Gordon | 489 | 199 | 7184 | 199 |

    | NSW | Reedy Creek | 10 | 3089 | 106389.22 | 12655 |

    | ~ 269 rows ~ |


    There''s an implied hierarchy between a state and a town: a town is part of a
    state (and, for the time being, a customer is in a town). As a result, the `PARTITION
    BY` clause must follow the hierarchy: `state,town`. You can also use columns which
    are unrelated, such as the state and year of birth, in which case the columns
    can go either way.


    ## Ranking Functions


    The window functions used so far are basically aggregate functions given a new
    context. The other group of functions are specific to window functions. Generally,
    they relate to the position of the current row. Broadly, we can call them ranking
    functions.


    There is one aggregate window function, which we''ve already seen, which also
    acts as a ranking function:


    ```sql

    SELECT

    id, givenname, familyname,

    height,

    count(*) OVER (ORDER BY height

    ROWS UNBOUNDED PRECEDING) AS running_count

    FROM customers

    WHERE height IS NOT NULL

    ORDER BY height;

    ```


    As long as you use the framing clause `ROWS UNBOUNDED PRECEDING` (shortened from
    `ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW`), the `count(*)` will count
    the number of rows up to the current row, which is basically the row number in
    the result set.


    There''s a simpler alternative to that:


    ```sql

    SELECT

    id, givenname, familyname,

    height,

    row_number() OVER (ORDER BY height) AS running_count

    FROM customers

    WHERE height IS NOT NULL

    ORDER BY height;

    ```


    The `row_number()` function basically generates just that: a number for each row
    in the result set.'
