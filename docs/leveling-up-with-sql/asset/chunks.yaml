- fmt: '#### MSSQL Triggers


    MSSQL also has a simple, direct way of creating a trigger. However, there’s a
    complicating factor, which we’ll need to work around.


    Before that, however, we’ll add the code to drop the trigger:


    ```

    DROP TRIGGER IF EXISTS archive_sales_trigger;

    ```


    With other DBMSs, you create a `BEFORE DELETE` trigger to capture the data before
    it’s gone. With MSSQL, you don’t have that option: there’s only `AFTER DELETE`
    and `INSTEAD OF DELETE`. In both cases, there is a virtual table called `deleted`
    which has the rows to be deleted.


    The problem with `AFTER DELETE` is that, even though the `deleted` virtual table
    has the deleted rows from the `sales` table, it’s too late to get the rows from
    the `saleitems` table, as they have also been deleted, but there’s no virtual
    table for that.


    For that, we’ll take a different approach. We’ll use an `INSTEAD OF DELETE` event,
    which is to say that MSSQL will run the trigger instead of actually deleting the
    data. The trick is to finish off the trigger by doing the delete at the end:


    ```

    CREATE TRIGGER archive_sales_trigger

    ON sales

    INSTEAD OF DELETE AS

    BEGIN

    ...

    DELETE FROM sales WHERE id IN(SELECT id FROM deleted);

    END;

    ```


    The `deleted` virtual table still has the rows which haven’t actually been deleted,
    but were going to be before the trigger stepped in. All we need from that is the
    `id` to identify the sales which should be deleted at the end, together with the
    cascaded sale items.


    The other complication is that MSSQL won’t let you concatenate strings with numbers,
    so you’ll have to cast the numbers as strings:


    ```

    cast(si.bookid AS varchar)+'':''+cast(si.quantity AS varchar)

    ```


    In MSSQL, `varchar` is short for `varchar(30)`. It’s much more than we need for
    the integers, but it will reduce to the actual size of the integer, and is easy
    to read.


    The completed trigger code is


    ```

    CREATE TRIGGER archive_sales_trigger

    ON sales

    INSTEAD OF DELETE AS

    BEGIN

    WITH cte(saleid, customerid, items) AS (

    SELECT

    s.id, s.customerid,

    string_agg(cast(si.bookid AS varchar)+'':''

    +cast(si.quantity AS varchar),'';'')

    FROM

    sales AS s

    JOIN saleitems AS si ON s.id=si.saleid

    JOIN deleted ON s.id=deleted.id

    GROUP BY s.id, s.customerid

    )

    INSERT INTO deleted_sales(saleid, customerid, items,

    deleted_date)

    SELECT saleid, customerid, items, current_timestamp

    FROM cte;

    DELETE FROM sales

    WHERE id IN(SELECT id FROM deleted);

    END;

    ```


    You can now delete your sales.


    #### SQLite Triggers


    Of all the DBMSs in this book, SQLite has by far the simplest and most direct
    version of coding a trigger.


    First, we can write the code to drop the trigger:


    ```

    DROP TRIGGER IF EXISTS archive_sales_trigger;

    ```


    The code to create the trigger is almost identical to the discussion earlier:


    ```

    CREATE TRIGGER archive_sales_trigger

    BEFORE DELETE ON sales

    FOR EACH ROW

    BEGIN

    INSERT INTO deleted_sales(saleid, customerid, items,

    deleted_date)

    WITH cte(saleid, customerid, items) AS (

    SELECT

    s.id, s.customerid,

    group_concat(si.bookid||'':''||si.quantity,'';'')

    FROM sales AS s JOIN saleitems AS si

    ON s.id=si.saleid

    WHERE s.id=old.id

    GROUP BY s.id, s.customerid

    )

    SELECT saleid, customerid, items,current_timestamp

    FROM cte;

    END;

    ```


    The `FOR EACH ROW` clause is optional, since in SQLite there’s no alternative
    currently. However, it’s included to make the point clear that the trigger applies
    to each row about to be deleted.


    You can now test the trigger.


    #### Oracle Triggers


    Writing trigger code in Oracle is similar to the basic code outlined earlier,
    but there are a few complicating factors which we’ll need to work around.


    Before that, we can write the code to drop the trigger:


    ```

    --  DROP TRIGGER archive_sales_trigger;

    ```


    The code is commented out because Oracle doesn’t support `IF EXISTS`.


    The first complication is that the trigger code consists of multiple statements,
    so it’s hard to tell which statements belong to a single block.


    Oracle has an alternative statement delimiter which is used when you’re trying
    to combine multiple statements:


    ```

    /

    CREATE TRIGGER archive_sales_trigger

    BEFORE DELETE ON sales

    FOR EACH ROW

    BEGIN

    ...

    END;

    /

    ```


    The forward slash (`/`) before and after the code defines the block. Everything
    between the slashes, including the statements terminated with a semicolon, will
    be treated as one block of code.


    The second complication is that Oracle doesn’t like making changes to the table
    doing the triggering. The solution is to tell Oracle that code is part of a separate
    transaction:


    ```

    CREATE TRIGGER archive_sales_trigger

    BEFORE DELETE ON sales

    FOR EACH ROW

    DECLARE

    PRAGMA AUTONOMOUS_TRANSACTION;

    BEGIN

    ...

    COMMIT;

    END;

    ```


    A transaction is a group of changes which can be reversed (“rolled back”) if something
    goes wrong. To keep the changes, however, you then need to use the `COMMIT` statement.


    The rest of the code is much as discussed earlier:


    ```

    /

    CREATE TRIGGER archive_sales_trigger

    BEFORE DELETE ON sales

    FOR EACH ROW

    DECLARE

    PRAGMA AUTONOMOUS_TRANSACTION;

    BEGIN

    INSERT INTO deleted_sales(saleid, customerid, items, deleted_date)

    WITH cte(saleid,customerid,items) AS (

    SELECT

    s.id, s.customerid,

    listagg(si.bookid||'':''||si.quantity,'';'')

    FROM sales s JOIN saleitems si ON s.id=si.saleid

    WHERE s.id=:old.id

    GROUP BY s.id, s.customerid

    )

    SELECT saleid, customerid, items, current_timestamp

    FROM cte;

    COMMIT;

    END;

    /

    ```


    You can now test the trigger.


    ### Pros and Cons of Triggers


    The main role of triggers is to add behaviors to the database which aren’t already
    there. For example, the DBMS already supports defaults and column constraints,
    so, though you could use triggers to do something similar, you should first check
    whether the built-in feature will do the job.


    One example where triggers have come to the rescue is with earlier versions of
    Oracle. Other DBMSs have long implemented an autoincremented primary key, but
    Oracle didn’t until more recent versions. In that case, you would use a trigger
    to maintain and use a separate sequence to fill in the primary key for the next
    inserted row.


    We’ve already mentioned cases when you might want to provide a default value for
    a column which is more complex than the built-in default feature, or you might
    want to update a column automatically. Here, the trigger might be able to provide
    this extra functionality.


    However, it’s possible to get carried away with triggers. If there’s a DML trigger
    on a table, then, every time you make any changes to the table data, there’s always
    a little extra work, which might add an extra burden.


    The other problem is that triggers might add a little more mystery to the database,
    especially to other users of the database. Every time you do something, something
    else happens. This can make troubleshooting a little trickier and make it a little
    harder to check that the data is correct.'
