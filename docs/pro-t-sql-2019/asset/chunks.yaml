- fmt: "In Figure [15-21](#480547_1_En_15_Chapter.xhtml#Fig21), you can see there\
    \ are `179` data pages read from memory and `35,103` records returned. This performance\
    \ is still much better than the performance when all data existed in a single\
    \ non-partitioned table.\n\nWe have confirmed that partitioned views work well\
    \ for both queries that access partitioned tables and non-partitioned tables within\
    \ the partitioned view. Like partitioned tables, it is still best to query data\
    \ using the columns that are part of the partition. In Listing [15-26](#480547_1_En_15_Chapter.xhtml#PC26),\
    \ I will query the partitioned view using columns that are not part of the partition.\n\
    \n```sql\nSELECT RecipeHistoryID,\n       RecipeID,\n       RecipeHistoryStatusID,\n\
    \       DateCreated\nFROM dbo.vwRecipeHistory\nWHERE RecipeID = 4\n  AND RecipeHistoryStatusID\
    \ = 2;\n```\n\n*Listing 15-26 Access Data Without Using Partitioned Column*\n\n\
    You can see that instead of referencing a date for the preceding query, I want\
    \ to return all records for `RecipeID` of `4` that have a `RecipeHistoryStatusID`\
    \ of `2`. There is no date provided, and `SQL Server` will need to access all\
    \ tables within the partitioned view. We can see the execution plan for the query\
    \ in Listing [15-26](#480547_1_En_15_Chapter.xhtml#PC26) in Figure [15-22](#480547_1_En_15_Chapter.xhtml#Fig22).\n\
    \n![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig22_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig22_HTML.jpg)\n\
    \n*Figure 15-22 Execution Plan for Partitioned View Not on Partitioning Key*\n\
    \nAs expected, the execution plan shows a `Clustered Index Scan` on `dbo.RecipeHistory`\
    \ and `dbo.RecipeHistory2018`. There is no date range provided in Listing [15-26](#480547_1_En_15_Chapter.xhtml#PC26)\
    \ which causes `SQL Server` to access both tables in the partitioned view. The\
    \ criteria for the query does not take advantage of any indexes on the tables\
    \ which causes the need for a `Clustered Index Scan`. The key point here is to\
    \ use the partitioning column as much as possible. This gives you the best chance\
    \ to take advantage of any performance gains associated with partitioning your\
    \ data.\n\n## Summary and Considerations\n\nThe longer your applications and databases\
    \ are in use, you will find yourself facing new challenges in managing the data\
    \ generated. When working with hybrid workloads, you may find that you need too\
    \ many different methods to manage and access your data. Combining tables and\
    \ partitioned tables together in a partitioned view can give you some of the flexibility\
    \ you need. Breaking your data up into multiple non-partitioned and partitioned\
    \ tables can allow you to create different indexes on the tables based on how\
    \ you will be accessing the data within those tables. This sort of strategy can\
    \ allow you to keep a table with only recent data separate from any data used\
    \ for reporting purposes. The table containing recent and current data can then\
    \ be configured to maximize application performance.\n\nOne of the options available\
    \ within `SQL Server` is the use of partitioning. You have the option to partition\
    \ information into various filegroups. You can also create partition functions\
    \ and partition schemes that help `SQL Server` determine how to segment data.\
    \ Once the partition scheme is applied to a column on a table, the table is now\
    \ a partitioned table. The column used for the partition scheme is known as the\
    \ partitioning key. When queries are designed to use the partitioning key, `SQL\
    \ Server` can use partition elimination to find the records that meet the query\
    \ criteria. In addition to using partitioned tables, you also have the option\
    \ of using partitioned views. Partitioned views can allow you to combine multiple\
    \ database objects into a single object that can be referenced by your application\
    \ code. When running a query, `SQL Server` will determine which objects need to\
    \ be accessed to meet the query criteria. You can also combine non-partitioned\
    \ tables and partitioned tables into the same partitioned view. This method may\
    \ be able to help you if you find yourself in the situation where your database\
    \ needs to be able to handle both transactional and analytical based queries."
  raw: 'In Figure [15-21](#480547_1_En_15_Chapter.xhtml#Fig21), you can see there
    are 179 data pages read from memory and 35,103 records returned. This performance
    is still much better than the performance when all data existed in a single non-partitioned
    table.


    We have confirmed that partitioned views work well for both queries that access
    partitioned tables and non-partitioned tables within the partitioned view. Like
    partitioned tables, it is still best to query data using the columns that are
    part of the partition. In Listing [15-26](#480547_1_En_15_Chapter.xhtml#PC26),
    I will query the partitioned view using columns that are not part of the partition.


    ```

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    DateCreated

    FROM dbo.vwRecipeHistory

    WHERE RecipeID = 4

    AND RecipeHistoryStatusID = 2;

    Listing 15-26

    Access Data Without Using Partitioned Column

    ```


    You can see that instead of referencing a date for the preceding query, I want
    to return all records for RecipeID of 4 that have a RecipeHistoryStatusID of 2\.
    There is no date provided, and SQL Server will need to access all tables within
    the partitioned view. We can see the execution plan for the query in Listing [15-26](#480547_1_En_15_Chapter.xhtml#PC26)
    in Figure [15-22](#480547_1_En_15_Chapter.xhtml#Fig22).


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig22_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig22_HTML.jpg)


    Figure 15-22


    Execution Plan for Partitioned View Not on Partitioning Key


    As expected, the execution plan shows a Clustered Index Scan on dbo.RecipeHistory
    and dbo.RecipeHistory2018\. There is no date range provided in Listing [15-26](#480547_1_En_15_Chapter.xhtml#PC26)
    which causes SQL Server to access both tables in the partitioned view. The criteria
    for the query does not take advantage of any indexes on the tables which causes
    the need for a Clustered Index Scan. The key point here is to use the partitioning
    column as much as possible. This gives you the best chance to take advantage of
    any performance gains associated with partitioning your data.


    The longer your applications and databases are in use, you will find yourself
    facing new challenges in managing the data generated. When working with hybrid
    workloads, you may find that you need too many different methods to manage and
    access your data. Combining tables and partitioned tables together in a partitioned
    view can give you some of the flexibility you need. Breaking your data up into
    multiple non-partitioned and partitioned tables can allow you to create different
    indexes on the tables based on how you will be accessing the data within those
    tables. This sort of strategy can allow you to keep a table with only recent data
    separate from any data used for reporting purposes. The table containing recent
    and current data can then be configured to maximize application performance.


    One of the options available within SQL Server is the use of partitioning. You
    have the option to partition information into various filegroups. You can also
    create partition functions and partition schemes that help SQL Server determine
    how to segment data. Once the partition scheme is applied to a column on a table,
    the table is now a partitioned table. The column used for the partition scheme
    is known as the partitioning key. When queries are designed to use the partitioning
    key, SQL Server can use partition elimination to find the records that meet the
    query criteria. In addition to using partitioned tables, you also have the option
    of using partitioned views. Partitioned views can allow you to combine multiple
    database objects into a single object that can be referenced by your application
    code. When running a query, SQL Server will determine which objects need to be
    accessed to meet the query criteria. You can also combine non-partitioned tables
    and partitioned tables into the same partitioned view. This method may be able
    to help you if you find yourself in the situation where your database needs to
    be able to handle both transactional and analytical based queries.'
  trans: "\n在图 15-21 中，您可以看到有 `179` 个数据页从内存中读取，并返回了 `35,103` 条记录。此性能仍远优于所有数据存储在单个非分区表中的情况。\n\
    \n我们已经确认，分区视图对于访问分区表内和分区视图内非分区表的查询都运行良好。与分区表类似，使用作为分区一部分的列来查询数据仍然是最佳实践。在清单 15-26\
    \ 中，我将使用非分区列来查询分区视图。\n\n```sql\nSELECT RecipeHistoryID,\n       RecipeID,\n  \
    \     RecipeHistoryStatusID,\n       DateCreated\nFROM dbo.vwRecipeHistory\nWHERE\
    \ RecipeID = 4\n  AND RecipeHistoryStatusID = 2;\n```\n\n*清单 15-26  不使用分区列访问数据*\n\
    \n您可以看到，在之前的查询中我没有引用日期，而是希望返回所有 `RecipeID` 为 `4` 且 `RecipeHistoryStatusID` 为 `2`\
    \ 的记录。这里没有提供日期，因此 `SQL Server` 将需要访问分区视图中的所有表。我们可以在图 15-22 中看到清单 15-26 的执行计划。\n\
    \n![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig22_HTML.jpg](img/480547_1_En_15_Fig22_HTML.jpg)\n\
    \n*图 15-22  非分区键上的分区视图的执行计划*\n\n正如预期的那样，执行计划显示在 `dbo.RecipeHistory` 和 `dbo.RecipeHistory2018`\
    \ 上进行了 `聚集索引扫描`。清单 15-26 中没有提供日期范围，这导致 `SQL Server` 访问分区视图中的两个表。查询条件没有利用表上的任何索引，因此需要执行\
    \ `聚集索引扫描`。这里的关键点是尽可能使用分区列。这使您最有可能享受到与数据分区相关的任何性能提升。\n\n## 总结与注意事项\n\n您的应用程序和数据库使用时间越长，您会发现自己面临着管理生成数据的新挑战。在处理混合工作负载时，您可能会发现需要太多不同的方法来管理和访问数据。将表和分区表组合在分区视图中，可以为您提供所需的部分灵活性。将数据拆分为多个非分区表和分区表，可以让您根据访问这些表中数据的方式，在表上创建不同的索引。这种策略可以让您将仅包含近期数据的表与用于报告目的的任何数据分开存放。包含近期和当前数据的表随后可以配置为最大化应用程序性能。\n\
    \n`SQL Server` 中可用的选项之一是使用分区。您可以选择将信息分区到不同的文件组中。您还可以创建分区函数和分区方案，以帮助 `SQL Server`\
    \ 确定如何分割数据。一旦分区方案应用于表中的某个列，该表就成为了分区表。用于分区方案的列称为分区键。当查询设计为使用分区键时，`SQL Server` 可以使用分区消除来查找符合查询条件的记录。除了使用分区表，您还可以选择使用分区视图。分区视图允许您将多个数据库对象组合成一个可由应用程序代码引用的单一对象。在运行查询时，`SQL\
    \ Server` 将确定需要访问哪些对象以满足查询条件。您还可以将非分区表和分区表组合到同一个分区视图中。如果您发现自己处于数据库需要能够同时处理事务型和分析型查询的情况，此方法可能对您有所帮助。\n"
