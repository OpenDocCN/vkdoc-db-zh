    ```


    在前面的函数中，我可以快速识别 FROM 语句中的多个连接和 WHERE 子句中的一个条件。如果该函数仅返回所提供的配方结果，那么已发现的任何错误很可能与连接条件相关。


    我对查询进行性能调优的过程是不同的，我将在本书的第二部分《构建高性能的 T-SQL》中进一步讨论这些差异。当涉及到作为性能调优一部分审查 T-SQL 时，我将重点关注使用了哪些表。如果涉及多个表，我还将查看这些表是如何连接的。我的最后重点将是正在使用哪些列，以及这些列与现有索引的关系。'
- fmt: '# T-SQL代码格式化示例与最佳实践


    我也会在更新`T-SQL`代码内的逻辑时审查这些代码。无论是新增、更改还是删除了功能，我都需要修改`T-SQL`代码以反映这些变更。根据修改的复杂程度，这可能简单到查看`SELECT`子句中的字段并更改显示的字段或计算方式；也可能复杂到需要查看`FROM`子句并向连接条件中添加或删除表。在某些情况下，我需要更新`WHERE`子句中的条件以满足新的业务需求。清单
    [3-6](#480547_1_En_3_Chapter.xhtml#PC6) 展示了创建表值参数的情况，就属于这种情况。我首先注意到的一点是此存储过程中缺少`WHERE`子句。这也是在处理用户定义表类型时增加复杂性的地方。


    ```sql

    CREATE PROCEDURE dbo.UpdateRecipeMenuType

    @RecipeMeal RecipeMealType READONLY

    AS

    SET NOCOUNT ON

    UPDATE rec

    SET MealTypeID = meal.MealTypeID

    FROM dbo.Recipe rec

    INNER JOIN @RecipeMeal recmeal

    ON rec.RecipeName = recmeal.RecipeName

    INNER JOIN dbo.MealType meal

    ON recmeal.MealTypeName = meal.MealTypeName

    Listing 3-6

    Create Table-Valued Parameter

    ```


    用户定义的表很可能用于在连接上筛选数据。然而，仅看代码，很难判断应用程序如何使用此存储过程。由于用户定义表类型，增强此存储过程逻辑所需的工作量显著增加。我需要了解数据如何通过表值参数传入，同时还需要考虑传递给此表值参数的数据可能如何随时间变化。由于数据库管理员通常是在应用程序部署后长期管理`T-SQL`代码的人，我发现最好将`T-SQL`代码设计为便于未来维护。正如你在清单
    [3-7](#480547_1_En_3_Chapter.xhtml#PC7) 中所看到的，在创建公共表表达式时，我使用了相同的方法，但对公共表表达式内部的查询进行了缩进。我再次使用这种缩进来表示特定部分正在发生特殊逻辑。


    ```sql

    WITH cte_meal AS

    (

    SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    )

    SELECT meal.MealTypeName, meal.RecipeName, meal.ServingQuantity, meal.IngredientName

    FROM cte_meal meal

    Listing 3-7

    Create a Common Table Expression

    ```


    在定义我个人风格时，我学到我的总体目标是让查询能放在一个足够小的区域内，以便我能快速高效地找到想要审查的那部分`T-SQL`代码。在设计你自己的标准时，你需要思考你的总体目标是什么。


    在许多公司中，会招聘初级团队成员。其中一些初级成员可能刚接触`SQL Server`，任何新员工都需要一些时间来了解你业务中的应用程序是如何工作的。在设计内部`T-SQL`编码标准时，你需要考虑应遵循哪些格式约定，以帮助新员工快速了解你公司的系统和数据流。


    制定`T-SQL`格式化标准的另一个因素是创建一个员工易于记忆或参考的标准。你希望你的团队成员在实施新标准时能够成功，而不是在编写代码时被所有的细微差别压垮。这一点尤其重要，如果所有的`T-SQL`代码都必须手动编写，而你的公司没有可以自动为你格式化`T-SQL`代码的软件。


    对于`INSERT`、`UPDATE`和`DELETE`语句也有一些格式上的考虑。清单 [3-8](#480547_1_En_3_Chapter.xhtml#PC8)
    展示了一个`INSERT`语句示例。在此示例中，我列出了`INSERT`的所有列名。


    ```sql

    INSERT INTO dbo.IngredientCost (IngredientID, ServingPortionID, Cost, IsActive,
    DateCreated, DateModified)

    VALUES (1, 1, 5.98, 1, GETDATE(), GETDATE())

    Listing 3-8

    Query to Insert Data

    ```


    虽然列出列名可能看起来不必要，但这种格式标准使插入的数据易于识别，并且如果未来添加了列或列顺序发生变化，此格式也能保护应用程序代码免于出现问题。更新数据的格式很简单，如清单
    [3-9](#480547_1_En_3_Chapter.xhtml#PC9) 所示。我仍然遵循与保留字和引用用户定义数据库对象相同的格式。


    ```sql

    UPDATE dbo.AvailableMeal

    SET IngredientName = ''Spicy Italian Sausage''

    WHERE RecipeName = ''Spaghetti''

    Listing 3-9

    Simple Query to Update Data

    ```


    你还可以看到我始终在运算符两侧填充空格。我在几个例子中都这样做了。与我为格式化所做的其他决定一样，我相信在等号前后添加空格可以提高`T-SQL`代码的可读性。我还包含了清单
    [3-10](#480547_1_En_3_Chapter.xhtml#PC10) 来展示如何在`T-SQL`中格式化删除数据。


    ```sql

    DELETE FROM dbo.Ingredient

    WHERE IngredientName LIKE ''%tomato%''

    Listing 3-10

    Query to Delete Data

    ```


    此示例是一个简单的删除，当涉及连接时，删除数据的格式可能变得更加复杂。删除数据在`SQL Server`中往往显得比其他数据操作活动更重要。有时你可能希望编写一个查询来系统地删除表中的数据。当我刚开始编写从表中删除数据的查询时，我会从编写`SELECT`语句开始。这将有助于解决几个因素。我可以清楚地看到哪些数据会受到影响。我还可以获得预期受影响记录数的行计数。一旦写好了`SELECT`语句，我就可以轻松修改代码以删除必要的记录。清单
    [3-11](#480547_1_En_3_Chapter.xhtml#PC11) 中的查询展示了我将用于准备删除数据记录的`SELECT`语句。


    ```sql

    SELECT rec.RecipeID, rec.RecipeName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    WHERE meal.MealTypeID = 2

    Listing 3-11

    Select Recipes with MealTypeID of 2

    ```


    在这种情况下，我准备从`dbo.Recipe`表中删除`MealTypeID`为 2 的记录。使用清单 [3-11](#480547_1_En_3_Chapter.xhtml#PC11)
    的结果，我可以确认要删除的数据以及预期删除的记录数。在检查了清单 [3-11](#480547_1_En_3_Chapter.xhtml#PC11) 的结果后，我可以更新`T-SQL`代码以删除这些记录。在清单
    [3-12](#480547_1_En_3_Chapter.xhtml#PC12) 中，我将`SELECT`语句替换为引用`dbo.Recipe`表别名的`DELETE
    FROM`。


    ```sql

    BEGIN TRAN

    DELETE FROM rec

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    WHERE meal.MealTypeID = 2

    COMMIT

    Listing 3-12

    Delete Recipes with MealTypeID of 2

    ```'
  raw: 'I also review T-SQL code when updating logic inside of the T-SQL code. Either
    new functionality has been added, changed, or removed, I will need to modify the
    T-SQL code to mirror those modifications. Depending on the modifications, it may
    be as simple as looking at the fields in the SELECT clause and changing what fields
    are displayed or how calculations are performed. Other times, I may need to look
    at the FROM clause and add or remove tables from join conditions. In some cases,
    I need to update criteria in the WHERE clause to handle the new business requirements.
    Such is the case in Listing [3-6](#480547_1_En_3_Chapter.xhtml#PC6) which shows
    the creation of a table-valued parameter. One of the first things I notice is
    the lack of a WHERE clause in this stored procedure. This is also where some complexity
    is added when dealing with user-defined table types.


    ```

    CREATE PROCEDURE dbo.UpdateRecipeMenuType

    @RecipeMeal RecipeMealType READONLY

    AS

    SET NOCOUNT ON

    UPDATE rec

    SET MealTypeID = meal.MealTypeID

    FROM dbo.Recipe rec

    INNER JOIN @RecipeMeal recmeal

    ON rec.RecipeName = recmeal.RecipeName

    INNER JOIN dbo.MealType meal

    ON recmeal.MealTypeName = meal.MealTypeName

    Listing 3-6

    Create Table-Valued Parameter

    ```


    It is very likely that the user-defined table is being used to filter the data
    on the join. However, just looking at the code, it is very difficult to tell how
    the application uses this stored procedure. Because of the user-defined table
    type, the amount of work required to enhance the logic on this stored procedure
    is significantly increased. I need to be aware of how data is being passed in
    the table-valued parameter, but I also need to consider how the data being passed
    to this table-valued parameter can change over time. As database administrators
    are often the ones managing the T-SQL code long after the application has been
    deployed, I find it best to design T-SQL code so that it can be easily supported
    going forward. As you can see in Listing [3-7](#480547_1_En_3_Chapter.xhtml#PC7),
    when creating a common table expression I use the same method, but I indent the
    query inside of the common table expression. Once again, I use this indent to
    help signify that special logic is happening in a given section.


    ```

    WITH cte_meal AS

    (

    SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    )

    SELECT meal.MealTypeName, meal.RecipeName, meal.ServingQuantity, meal.IngredientName

    FROM cte_meal meal

    Listing 3-7

    Create a Common Table Expression

    ```


    When defining my own personal style, I have learned that my overall objective
    is to have a query fit in a small enough area that I can quickly and efficiently
    find the part of T-SQL code that I am trying to review. When it comes to designing
    your own standard, you will want to think about what your overall objective is.


    In many companies, junior team members will be hired. Some of these junior team
    members will be new to SQL Server, and it will take any new hire some time to
    understand how the applications in your business work. When designing an internal
    T-SQL coding standard, you will want to take into consideration what formatting
    conventions should be followed that will help new employees quickly learn your
    company’s systems and data flows.


    Another factor in developing a T-SQL formatting standard is creating a standard
    that employees can easily remember or reference. You want your team members to
    be able to succeed when implementing a new standard and not be overwhelmed by
    all the nuances when writing the code. This is especially important if all T-SQL
    code must be written manually, and your company does not have software that can
    automatically format the T-SQL code for you.


    There are also some formatting considerations for inserts, updates, and deletes.
    In Listing [3-8](#480547_1_En_3_Chapter.xhtml#PC8), there is a sample INSERT statement.
    In this example, I have listed all the column names for an INSERT.


    ```

    INSERT INTO dbo.IngredientCost (IngredientID, ServingPortionID, Cost, IsActive,
    DateCreated, DateModified)

    VALUES (1, 1, 5.98, 1, GETDATE(), GETDATE())

    Listing 3-8

    Query to Insert Data

    ```


    While listing the column names may seem unnecessary, this formatting standard
    makes what data is being inserted easily identifiable, but this format also protects
    the application code from future issues if columns are added or the column order
    changes. The format to update data is simple as you can see in Listing [3-9](#480547_1_En_3_Chapter.xhtml#PC9).
    I am still following the same formatting for reserved words and referencing user-defined
    database objects.


    ```

    UPDATE dbo.AvailableMeal

    SET IngredientName = ''Spicy Italian Sausage''

    WHERE RecipeName = ''Spaghetti''

    Listing 3-9

    Simple Query to Update Data

    ```


    You can also see that I consistently pad the operator. I have done this in several
    examples. Like other decisions I have made for formatting, I believe adding a
    space before and after the equal sign improves the readability of the T-SQL code.
    I have also included Listing [3-10](#480547_1_En_3_Chapter.xhtml#PC10) to show
    how to format deleting data in T-SQL.


    ```

    DELETE FROM dbo.Ingredient

    WHERE IngredientName LIKE ''%tomato%''

    Listing 3-10

    Query to Delete Data

    ```


    This example is for a simple delete, and when joins are involved, the format to
    delete data can become even more involved. Deleting data often seems more significant
    than other data manipulation activities in SQL Server. There are times where you
    may want to write a query to systematically delete data from a table. When I first
    started writing queries to delete data from tables, I would start with writing
    the SELECT statement. This would help with several factors. I could clearly see
    what data would be affected. I could also get a row count for the number of records
    I expected to be affected. Once I had the SELECT statement written, I could easily
    modify the code to delete the necessary records. The query in Listing [3-11](#480547_1_En_3_Chapter.xhtml#PC11)
    shows the SELECT statement I would use to prepare for deleting data records.


    ```

    SELECT rec.RecipeID, rec.RecipeName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    WHERE meal.MealTypeID = 2

    Listing 3-11

    Select Recipes with MealTypeID of 2

    ```


    In this case, I am preparing to delete records from the dbo.Recipe table that
    have a MealTypeID of 2\. Using the result from Listing [3-11](#480547_1_En_3_Chapter.xhtml#PC11),
    I can confirm what data I am deleting and how many records I can expect to delete.
    After I reviewed the results from Listing [3-11](#480547_1_En_3_Chapter.xhtml#PC11),
    I can update my T-SQL code to delete the records. In Listing [3-12](#480547_1_En_3_Chapter.xhtml#PC12),
    I have replaced the SELECT statement with a DELETE FROM referencing the table
    alias for dbo.Recipe.


    ```

    BEGIN TRAN

    DELETE FROM rec

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    WHERE meal.MealTypeID = 2

    COMMIT

    Listing 3-12

    Delete Recipes with MealTypeID of 2

    ```'
