    | --- | --- | --- |

    | Spaghetti | Tomato Sauce | True |


    | RecipeID | IngredientID | IsActive |

    | --- | --- | --- |

    | Spaghetti | Minced Garlic | True |


    虽然所有这些条目都可以单独插入，但也可以一次插入多条记录。在这种情况下，可能看起来像表5-15所示。


