    \ do will depend on what you are trying to accomplish. You can implement testing\
    \ to confirm that a single piece of functionality is working as expected. It is\
    \ also possible to test interactions between two or more pieces of code. This\
    \ type of testing can also be useful when trying to confirm the downstream effects\
    \ of implementing changes to your T-SQL code. There is also testing that can be\
    \ done to help ensure that the code you write matches your coding standards. While\
    \ any type of testing is valuable, the most significant benefits come when using\
    \ all three in conjunction.\n\n## Unit Testing\n\nYou have gotten your next task,\
    \ and you are ready to start writing some T-SQL. You also want to implement functionally\
    \ testing your code. When you are testing a single piece of code, this is called\
    \ unit testing. Understanding what unit tests are and why you should use them\
    \ can help improve your T-SQL code quality. Once you know what unit tests are,\
    \ you will want to work toward learning when unit testing is beneficial. This\
    \ will get you ready to start writing your first unit tests for SQL Server.\n\n\
    The concept of unit testing is basic. You have a single change that you want to\
    \ make to your T-SQL code. Unit testing allows you to test and confirm the functionality\
    \ for a single piece of code. One of the common methods with unit testing is to\
    \ create a scenario that fails, write the T-SQL code, run the unit test, and repeat\
    \ until the unit test passes. This is test-driven design. Whether you are implementing\
    \ new functionality or resolving a bug in T-SQL, unit tests can help verify your\
    \ code.\n\nWhen creating unit tests, you will need to think differently than you\
    \ normally would when you set out to write T-SQL code. We are creating unit tests\
    \ to confirm that the code we are writing works as expected. In order to verify\
    \ that your T-SQL code is working as expected, you will want your unit test to\
    \ indicate a Pass. When creating your unit test, your first execution of the unit\
    \ test should Fail. Starting with a failing unit test would indicate that the\
    \ desired functionality does not exist.\n\nThere are many different implementations\
    \ of running unit tests. Unit tests can be written inside of Visual Studio. You\
    \ can also use a free third-party unit testing framework that creates database\
    \ objects in T-SQL. Another option is using a paid third-party tool to create\
    \ and run your unit tests. There are benefits and drawbacks to each of these options.\n\
    \nAnother factor in determining how you will implement unit testing is in how\
    \ you would like to run your unit tests. Depending on your environment, you may\
    \ decide that you would prefer to manually run your unit tests. However, you may\
    \ also decide that you want an automated way to run your unit tests. The easiest\
