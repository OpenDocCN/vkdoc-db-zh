    if you want the best idea of the execution plan that was used previously. You
    may not be able to find the query or stored procedure here if the execution plan
    has been cleared from the plan cache. In addition, depending on when the performance
    issue happened, the plan that was in cache may have been cleared. This may mean
    you can find an execution plan, but it may not be the same one used previously.


    If you find that the execution plan is not in the plan cache or that the execution
    plan has been changed since the performance issue, you can try to find the current
    execution plan. There are two options available when using this method. One option
    is to get a hypothetical idea of what SQL Server would use as an execution plan.
    This can be done without running the actual T-SQL code on the server. This is
    called the estimated execution plan. The largest challenge using this method is
    that just because SQL Server has estimated an execution does not give you any
    guarantee that this will be the actual execution plan that SQL Server uses when
    the query is run. I do not usually use estimated execution plans in my day-to-day
    operations. I have used estimated execution plans only a handful of times, and
    that was when I was hesitant to run the T-SQL code for fear of causing an outage
    in Production.


    The next best option besides reviewing an execution plan in the plan cache is
    to see what the execution plan would look like right now if you ran the execution
    plan. Requesting an actual execution plan when you execute your T-SQL code will
    cause the execution plan to be available after the query execution completes.
    There is also a newer option available in SQL Server 2014 and higher, that is,
    the ability to see the flow of data through the execution plan as the query is
    executing. Instead of viewing the actual execution plan, you will ask SQL Server
    to show you the live query statistics. While this option may be helpful in slower
    queries where there is one specific pain point, I often find that many queries
    complete too quickly to use this method to effectively diagnose many issues I
    am trying to resolve.


    How and when you retrieve an execution plan are factors that you can control when
    it comes to working with execution plans. There is also the option of what the
    execution plan should look like once you retrieve it. My usual method is looking
    at the graphical output for the execution plan. The process of reviewing execution
    plans for T-SQL code is the same regardless of whether you are writing new T-SQL
    or performance tuning some existing code. An example of a graphical execution
    plan can be found in Figure [7-1](#480547_1_En_7_Chapter.xhtml#Fig1).


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig1_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Graphical Execution Plan


    The graphical execution gives a high-level view of how a query is executed. This
    makes the execution plan easier to read at a glance, but it also means that there
    is additional information that needs to be accessed when getting into the details
    in the execution plan. Figure [7-2](#480547_1_En_7_Chapter.xhtml#Fig2) shows some
    details that can be viewed when putting your mouse over various objects in the
    execution plan.


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig2_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Operator Details from a Graphical Execution Plan


    In addition to the properties in this tool tip, in newer versions of SQL Server
    Management Studio, you also have access to even more extended properties as shown
    in Figure [7-3](#480547_1_En_7_Chapter.xhtml#Fig3).


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig3_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Additional Properties for Execution Plans


    There is an option to interact with the execution plan in an XML format. You can
    see an example of this in Listing [7-1](#480547_1_En_7_Chapter.xhtml#PC1).


    ```


    Listing 7-1

    XML Execution Plan

    ```


    While this method may be more difficult to read, it does contain all information
    related to the execution plan. The query that generated this table was a SELECT
    statement on one table. As you can also see, having all the data in one place
    makes for quite a bit of code that needs to be reviewed.'
  trans: '

    # 阅读执行计划


    当我编写 T-SQL 时，我的最终目标是确保获得准确的结果。在某些情况下，我编写的查询简单而直接。作为一名数据工程师，我发现自己经常需要对与报表相关的查询进行性能调优，或者为编写新的报表查询。由于这些查询是为了提供事务数据的报告，我通常必须比编写应用程序查询时加入更多的连接（join）和更多的逻辑。虽然这并不理想，但对于许多公司来说，这是一个非常常见的情况。


    许多公司已经开始意识到其系统中数据的重要性，或者它们希望增加监控以确保应用程序按预期工作。无论哪种情况，你都很有可能在环境中遇到一个对你的应用程序产生负面影响的查询。那时，你会想知道可以采取什么措施来解决这个问题。在本节中，你将了解为什么执行计划很重要，以及何时需要使用它们。你将学习如何阅读执行计划，包括常用的符号。你还将了解执行计划中的属性和警告。


    我的第一位导师曾经告诉我，要编写好的 T-SQL，我需要理解 SQL Server 的工作原理。这是我得到过的最明智的建议之一，并且我至今仍在努力更好地理解
    SQL Server 内部机制。考虑到这个建议，我们能更好地理解 SQL Server 的一种方式，就是理解 SQL Server 将如何执行我们编写的任何查询。虽然我不会涵盖与执行查询相关的所有内部机制，但我会向你展示
    SQL Server 确定用于执行你的 T-SQL 代码的指令。只要计划仍在计划缓存中，这些指令就可以在执行计划中找到。


    ### 访问权限


    一旦你决定要开始研究某段 T-SQL 代码的执行计划，你应该确认你在 SQL Server 中拥有查看执行计划的访问权限。你有几个选择。如果你打算在 T-SQL
    代码执行时获取**实际执行计划**，你需要确保你有执行该代码的权限，并且对于 T-SQL 代码中涉及的数据库，你拥有 `SHOWPLAN` 权限。你也可以从计划缓存中获取执行计划，但你需要能够查询动态管理视图
    `sys.dm_exec_cached_plans`。既然你知道了如何验证访问权限，我想接下来介绍一下可用的不同类型的执行计划。


    ### 类型与检索方法


    有多种方法可以检索执行计划，当时的具体需求将有助于确定使用哪种模型最合适。当你试图排查性能问题时，最佳选择是从 `sys.dm_exec_cached_plans`
    检索执行计划。如果你想了解之前使用的执行计划的最佳情况，这是你想使用的方法。如果执行计划已从计划缓存中清除，你可能无法在此处找到该查询或存储过程。此外，根据性能问题发生的时间，缓存中的计划可能已被清除。这可能意味着你能找到一个执行计划，但它可能不是之前使用的同一个计划。


    如果你发现执行计划不在计划缓存中，或者自性能问题发生后执行计划已被更改，你可以尝试查找当前的执行计划。使用此方法有两种选择。一种选择是获取 SQL Server
    将用作执行计划的假设性方案。这可以在服务器上不实际运行 T-SQL 代码的情况下完成。这被称为**估计执行计划**。使用此方法的最大挑战是，仅仅因为 SQL
    Server 估计了一个执行计划，并不能保证这就是查询运行时 SQL Server 将使用的实际执行计划。我在日常操作中通常不使用估计执行计划。我只用过几次估计执行计划，那是在我因为担心导致生产环境（Production）中断而犹豫是否要运行
    T-SQL 代码的时候。


    除了查看计划缓存中的执行计划之外，下一个最佳选择是查看如果现在运行查询，执行计划会是什么样子。在执行 T-SQL 代码时请求**实际执行计划**，将使该执行计划在查询执行完成后可用。在
    SQL Server 2014 及更高版本中还有一个更新的选项，即能够在查询执行时查看数据流经执行计划的流程。你不是查看实际执行计划，而是要求 SQL Server
    向你显示**实时查询统计信息**。虽然此选项对于查询较慢且存在一个特定关键瓶颈的情况可能有帮助，但我经常发现许多查询完成得太快，无法使用此方法有效诊断我试图解决的许多问题。


    你如何以及何时检索执行计划，是在处理执行计划时你可以控制的因素。还有一个选项是关于检索后执行计划应该是什么样子。我通常的方法是查看执行计划的图形输出。无论你是编写新的
    T-SQL 还是为一些现有代码进行性能调优，审查 T-SQL 代码执行计划的过程都是相同的。一个图形化执行计划的示例可以在 `图 7-1` 中找到。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig1_HTML.jpg](img/480547_1_En_7_Fig1_HTML.jpg)


    **图 7-1** 图形化执行计划


    图形化执行计划提供了查询如何执行的高层次视图。这使得执行计划一目了然，更容易阅读，但这也意味着在深入执行计划的细节时，需要访问额外的信息。`图 7-2` 展示了将鼠标悬停在执行计划中的各种对象上时可以查看的一些详细信息。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig2_HTML.jpg](img/480547_1_En_7_Fig2_HTML.jpg)


    **图 7-2** 图形化执行计划中的运算符详细信息


    除了此工具提示中的属性外，在新版本的 SQL Server Management Studio 中，你还可以访问更多的扩展属性，如 `图 7-3` 所示。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig3_HTML.jpg](img/480547_1_En_7_Fig3_HTML.jpg)


    **图 7-3** 执行计划的附加属性


    ### XML 格式


    还有一个选项可以以 XML 格式与执行计划进行交互。你可以在 `代码清单 7-1` 中看到一个例子。


    ```xml

    代码清单 7-1

    XML 执行计划

    ```


    虽然这种方法可能更难阅读，但它包含了与执行计划相关的所有信息。生成此表的查询是对一个表的 `SELECT` 语句。你还可以看到，将所有数据放在一处会导致需要审查的代码量相当大。

    '
- fmt: '# SQL Server 执行计划解读指南


    一旦您设置好 SQL Server Management Studio 以显示执行计划，您就会想知道在查看执行计划时应该关注什么。您需要了解如何解读执行计划中的流程，以更好地理解
    SQL Server 将如何执行该查询。还有一些常见的形状您需要熟悉，因为它们可能帮助您一眼就发现潜在问题。执行计划中可能包含额外的文本，能快速显示已确定对查询执行产生负面影响的问题。更好地理解所有这些元素将帮助您找出查询的痛点，从而决定集中精力的方向。


    ## 理解执行计划的流程


    有了执行计划，您可以更清楚地了解 SQL Server 将如何执行该查询。我们阅读英文时习惯从左到右、从 top 到 bottom。将此与执行计划进行比较，最左上角代表查询的结果。如果将此比作读书，当您从左到右移动时，您正在深入了解
    SQL Server 为获取结果集所采取的步骤。从上到下移动也是如此。查看图[7-4](#480547_1_En_7_Chapter.xhtml#Fig4)中的示例，您可以看到一个包含多个步骤的执行计划。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig4_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig4_HTML.jpg)


    **图 7-4** 包含多个步骤的执行计划


    如果从左到右阅读，我可以看到 `SELECT` 返回结果的表示。向右移动，我可以看到 SQL Server 在获取结果集之前立即使用了计算标量。这意味着，如果我移动到最右边的对象，这是
    SQL Server 执行查询时采取的第一个操作。在这个例子中，SQL Server 执行此查询的第一步是一个聚集索引扫描。这很重要，因为您可能会听到“从左到右阅读执行计划”的说法。在这种情况下，说话者指的是按照
    SQL Server 执行查询的相同方式阅读执行计划。


    ## 识别关键指标：箭头粗细


    当我刚开始使用执行计划时，很快就被其中的大量信息淹没了。我想从一开始就理解所有内容。然而，这对我来说太多了，根本记不住。通过多年的问题排查，我学会了通过寻找差异来开始我的分析。对于执行计划，没过多久我就立刻看到了差异。我注意到两个对象之间的箭头并不总是保持相同的大小。图[7-5](#480547_1_En_7_Chapter.xhtml#Fig5)中并排显示了两个不同的箭头以供比较。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig5_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig5_HTML.jpg)


    **图 7-5** 执行计划中的箭头


    我了解到线条粗细的差异表明了 SQL Server 在每个步骤中访问的记录的相对数量。虽然有些查询返回的记录会比其他查询多，因此线条更粗，但您会发现执行计划中某一步的线条很粗，而下一步的线条却很细。这通常表明，线条较粗的步骤可以通过更高效地编写来减少返回的数据量。查看线条的粗细是您查看执行计划时可以检查的事项之一。


    ## 关注排序操作


    有时您希望数据按特定方式排序。例如，您可能希望按字母顺序或创建日期显示食谱列表。排序可以在应用程序代码中进行，也可以在 SQL Server 中进行。如果您选择在
    SQL Server 中排序数据，您可能会在执行计划中看到一个排序操作符。您可以在图[7-6](#480547_1_En_7_Chapter.xhtml#Fig6)中看到排序操作符的示例。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig6_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig6_HTML.jpg)


    **图 7-6** 排序操作符


    您会在执行计划中看到排序操作符。有些情况下排序操作符是必要的。但是，您需要留意那些可能不需要的排序实例。这包括为合并连接所需的排序。在这些情况下，您需要查看是否有可用于连接且已对数据排序的索引。最需要注意的问题之一是与排序操作符相关的警告。


    ## 警告信息的重要性


    执行计划最有帮助的功能之一是它们会返回警告。理想情况下，您希望编写性能良好的 `T-SQL`。这也意味着 `T-SQL` 不应返回带有警告的执行计划。有时您的执行计划会包含警告。警告将如图[7-7](#480547_1_En_7_Chapter.xhtml#Fig7)所示。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig7_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig7_HTML.jpg)


    **图 7-7** 执行计划中的警告


    看到警告的主要好处是 SQL Server 已经识别出您的 `T-SQL` 代码中可能存在的问题。调查返回的任何警告并查看是否可以采取措施解决它们，将会对您有益。


    ## 估算行数与实际行数


    执行计划还有其他元素会提醒您潜在的性能问题。虽然警告可以就 `T-SQL` 的问题提供具体建议，但执行计划中的其他项目并不提供相同水平的指导。在创建执行计划时，SQL
    Server 使用统计信息来猜测将返回的行数。SQL Server 还会跟踪执行计划每个步骤中返回的实际行数。如果您将鼠标悬停在操作符上，您将能够看到类似于图[7-8](#480547_1_En_7_Chapter.xhtml#Fig8)中的内容。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig8_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig8_HTML.jpg)


    **图 7-8** 估算行数与实际行数


    第一个箭头指向此执行计划步骤返回的实际行数。第二个箭头指向返回的估算行数。在这个例子中，行数是匹配的。如果行数匹配或在接近的范围内，您就不会遇到与估算相关的性能问题。如果两个数字差异很大，那么您可能得到一个性能不如预期的执行计划。这可能是因为统计信息已过时，SQL
    Server 无法准确确定将返回的行数。另一种可能性是 SQL Server 可能是为另一组值创建的执行计划。无论原因如何，如果您看到估算行数和实际行数之间存在很大差异，这是您应该调查的事情。


    ## 总结


    通过阅读执行计划，您可以快速识别查询中存在性能问题的地方，以及可以采取哪些步骤来解决这些问题。这包括知道如何访问执行计划，并了解估算执行计划与实际执行计划之间的区别。执行计划还具有多项功能，可帮助您快速识别可能的性能问题。通过查看箭头的大小，您可以判断执行计划中每个步骤通过的数据的相对数量。排序操作符可能为排序数据提供见解，而不仅仅是为了返回有序的结果集。您还可以查看估算和返回的实际行数，以帮助确定
    SQL Server 是否有足够的信息来为您提供良好的执行计划。一旦您熟悉了执行计划的这些方面，您可能想研究 SQL Server 是如何使用您的索引的。'
  raw: 'Once you have set up SQL Server Management Studio to give you an execution
    plan, you will want to know what to look for when reviewing the execution plan.
    You will need to know how to interpret the flow in the execution plan to better
    understand how SQL Server will execute the query. There are also some general
    shapes you will want to be familiar with as they may help you find potential issues
    at a glance. Included in the execution plan you may find additional text that
    quickly shows issues that have been determined to be negatively affecting the
    execution of your query. Having a better understanding of all these elements will
    help you figure out the pain points for your queries so that you can determine
    where to focus your efforts.


    Once you have an execution plan, you can get a better idea of exactly how SQL
    Server will execute that query. When we read English, we are accustomed to reading
    from left to right and from top to bottom. To compare this to execution plans,
    the uppermost left corner represents the result of the query. If we compare this
    to reading a book, as you move from left to right, you are drilling down into
    steps that SQL Server took to get the result set. The same is true when moving
    from top to bottom. Looking at the example in Figure [7-4](#480547_1_En_7_Chapter.xhtml#Fig4),
    you can see an execution plan with multiple steps.


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig4_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Execution Plan with Multiple Steps


    If I read from left to right, I can see the representation for the results returned
    with the SELECT. When I move to the right, I can see that SQL Server used the
    compute scalar immediately before getting the result set. This means that if I
    move to the right-most object, this is the first action SQL Server took when executing
    the query. In this case, the first step SQL Server performed when executing this
    query is a clustered Index Scan. This is important to know because you may hear
    references to reading execution plans left to right. In these cases, the person
    is referring to reading the execution plan in the same way SQL Server executes
    the query.


    When I first started working with execution plans, I was quickly overwhelmed with
    the amount of information available in them. I wanted to understand everything
    from the beginning. However, this was far too much for me to remember. Through
    my years of troubleshooting any issues, I learned to start my analysis by finding
    differences. With the execution plans, it did not take long to quickly see difference
    right away. I noticed that the arrows between two objects did not always stay
    the same size. There are two different arrows side by side in Figure [7-5](#480547_1_En_7_Chapter.xhtml#Fig5)
    for comparison.


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig5_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig5_HTML.jpg)


    Figure 7-5


    Arrows from Execution Plans


    I learned that the difference in the thickness of the lines indicated the relative
    amount of records SQL Server was accessing for each step. While there are some
    queries that are going to return more records than others and therefore have thicker
    lines, you will find execution plans where one step has a very thick line and
    the next step will have a thin line. This usually indicates the step with the
    thicker line could be written more efficiently in order to pull back less data.
    Looking at the thickness of the lines is one of the things you can check when
    you look at execution plans.


    There are times when you will want your data ordered in a specific way. For instance,
    you may want to show a list of recipes alphabetically or by creation date. The
    recipes can either be sorted within the application code or within SQL Server.
    If you choose to order the data within SQL Server, you may see a Sort operator
    in your execution plan. You can see an example of what the Sort operator looks
    like in Figure [7-6](#480547_1_En_7_Chapter.xhtml#Fig6).


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig6_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Sort Operator


    You will see Sort operators in your execution plans. There are occasions where
    the Sort operator is necessary. However, you will want to look for instances where
    the Sort operator may not be needed. This can include Sorts that are required
    for Merge Joins. In these cases, you will want to see if there is an index that
    can be used for the join that already has the data sorted. One of the largest
    issues to watch out for is when there is a warning related to the Sort operator.


    One of the most helpful features of execution plans is when they return a warning.
    Ideally, you want to write T-SQL that performs well. This also means the T-SQL
    should not return execution plans with warnings. There will be times when you
    get a warning as part of your execution plan. The warning will look like Figure
    [7-7](#480547_1_En_7_Chapter.xhtml#Fig7).


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig7_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig7_HTML.jpg)


    Figure 7-7


    Warning in an Execution Plan


    The main advantage of seeing a warning is that SQL Server has identified a potential
    issue with your T-SQL code. It would benefit you to investigate any warnings that
    are returned and see if you can take steps to resolve them.


    Execution plans have other elements that will alert you to potential performance
    issues. While warnings can give you a specific advice about issues with your T-SQL,
    there are other items in your execution plan that do not provide the same level
    of guidance. When creating an execution plan, SQL Server uses statistics to make
    a guess as to the number of rows that will be returned. SQL Server will also keep
    track of the actual number of rows returned in each step of the execution plan.
    If you mouse over the operators, you will be able to see something like what is
    in Figure [7-8](#480547_1_En_7_Chapter.xhtml#Fig8).


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig8_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig8_HTML.jpg)


    Figure 7-8


    Estimated vs. Actual Number of Rows


    The first arrow points to the actual number of rows returned for this step of
    the execution plan. The second arrow points to the estimated number of rows returned.
    In this case, the number of rows matches. If the number of rows matches or is
    close in range, you will not have performance issues related to estimates. If
    the two numbers are significantly different, then you may get an execution plan
    that does not perform as well as it could. This could be happening because the
    statistics are out of date, and SQL Server cannot accurately determine the number
    of rows that will be returned. Another possibility is that SQL Server may have
    created the execution plan for a different set of values. Regardless of the reason,
    if you see a large variation between the estimated and actual number of rows returned,
    this is something that you should investigate.


    By reading execution plans, you can quickly identify where there are performance
    issues in your queries and what steps you can take to solve those issues. This
    includes knowing how to access execution plans and know the difference between
    estimated and actual execution plans. Execution plans also have several features
    that will help you quickly identify possible performance issues. By looking at
    the size of the arrows, you can tell the relative amount of data passing through
    each step in an execution plan. The Sort operator may provide insights into data
    that is sorted for more reasons than returning an ordered result set. You can
    also look at the estimated and actual number of rows returned to help determine
    if SQL Server has enough information to give you a good execution plan. Once you
    have gotten familiar with these aspects of execution plans, you may want to investigate
    how SQL Server is using your indexes.'
