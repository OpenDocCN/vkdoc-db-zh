    the same database code.


    I could also use source control to easily compare T-SQL code to previous versions.
    As part of the comparison, sections of the code that had been modified were highlighted.
    Even more helpful was that code that was added vs. modified or removed was highlighted
    in two different colors. One drawback of source control is that I no longer reviewed
    the whole script. Any pre-existing issues with the T-SQL code that were not modified
    did not have a chance to be corrected. This applies to both formatting standards
    and also to coding standards.


    Having access to your T-SQL code can make it easier to get scripts together for
    deployments. Source control also helps protect unapproved T-SQL code from getting
    deployed in error. Without source control for T-SQL, getting ready for a deployment
    can be a hassle. I have worked with various companies that handle deployments
    differently. I have experienced deployments where scripts were copied from tickets
    and added to a release page. I have been on deployments where the SQL scripts
    were bundled and prepped by the development team. Both methods will work, and
    every method has its downfall.


    For the first method, I had one deployment where the same stored procedure was
    changed in three different user stories. When it came time to deploy the code,
    neither I nor the developers knew for certain which version should get deployed.
    In the second method, the actual deployment time was much shorter, and there was
    error logging. However, for both methods there was not a single source of truth
    when it came to database code. In either scenario, if I needed to undo a deployment
    that was several months old, it would take time to sift through deployment scripts
    to find which version of the T-SQL code needed to be deployed for the rollback.'
  trans: '# 为何使用源代码控制


    维护代码涉及多个方面以确保其可维护性。这包括能够找到任何数据库对象的 T-SQL 代码，并知晓你正在修改的是正确的版本。如果修改并部署了错误的 T-SQL
    代码版本，可能会引发严重问题。同时，了解在任何时间点需要部署哪个版本的代码也至关重要。所有这些方面都受益于为你的数据库引入源代码控制。


    ## 代码组织与团队协作


    将 T-SQL 代码以易于访问的方式集中保存可能是个挑战。源代码控制有助于将你所有的 T-SQL 代码集中、有序地存放一处。虽然你可能认为源代码控制仅适用于软件开发者，但情况已不再如此。让开发团队和数据库管理员协同工作的最简单方法之一，就是采用相似的流程。当你的
    T-SQL 代码保存在源代码控制中时，便有额外的工具可用，通过自动拒绝不符合格式或编码标准的代码，来简化编码和脚本审查过程。


    ## 协同工作与变更管理


    编写 T-SQL 代码时还可能出现其他问题。多人或团队可能需要修改相同的数据库对象。根据你公司处理部署的方式，最终可能会出现数据库对象叠加了多层更改的情况。源代码控制可以帮助管理这些变更，并确保它们被正确实施。它允许你基于最新的代码进行工作。


    ## 本地开发与构建验证


    在修改数据库代码时，你可以选择在本地工作。如果你使用 SQL Server Data Tools 并将所有数据库代码保存在同一个项目中，你可以构建你的代码以验证其可执行性。这相比于手动将代码部署到
    SQL Server 更具优势。作为构建过程的一部分，数据库项目会验证你的视图、函数、存储过程或其他自定义对象中的字段是否存在于数据库中。


    ## 获取最新代码版本


    对 T-SQL 代码的某些更改可能很复杂，有时你可能在处理关键的数据库对象或代码。开始修改代码前，你需要确保使用的是最新的版本。在使用源代码控制之前，我会从生产环境拉取代码。然而，我正在审查的对象可能自上次生产部署后，已作为某个用户故事的一部分被修改。更糟的是，该代码可能尚未部署到开发环境，或者仍在等待脚本审查。使用源代码控制能让你持续获取到最新的
    T-SQL 代码版本。


    ## 迭代修改与集中存储


    当你进行更改时，你可能需要一个地方来经历修改、测试并重复这一过程，直到达到预期的输出。源代码控制可以将最近保存的 T-SQL 代码拉取到你的本地计算机。然后你可以在本地进行修改。准备就绪后，你可以将更改保存到集中位置。这个代码库就成为了你所有数据库变更的权威记录源。


    ## 依赖管理与代码重构


    如果你将所有数据库保存在同一解决方案中，可以在存在依赖关系的情况下添加数据库间的引用。这样，如果你修改了基础数据库对象，当任何依赖对象不再正常工作时，你会收到提醒。这在添加、删除或重命名列时尤其有用。有时你可能想要重构一个表或其他数据库对象。如果你的应用程序和数据库保存在同一解决方案中，你可以选择自动重构代码。当你的应用程序中直接保存有
    SQL 代码时，这会很有帮助。


    ## 变更追踪与代码审查


    使用源代码控制的另一个好处是能够快速查找哪些 T-SQL 代码发生了变化。在源代码控制之前，我不得不手动审查整个数据库对象以确认变更。我发现的最佳流程是视觉对比当前生产环境的存储过程与新版本。虽然有一定效果，但很容易遗漏某些内容。我还必须从头到尾审查所有
    T-SQL 代码，以确保理解每一行。


    在执行脚本审查前，我会通读相关的用户故事以理解预期功能。我曾倾向于只审查与用户故事明确相关的代码行。在将数据库纳入源代码控制后，我可以轻松查看作为审查一部分而更改的所有代码。这让我能快速看到所有的
    T-SQL 代码修改。在那些不正式鼓励修复技术债务，但开发者在处理影响相同数据库代码的用户故事时有一定自由度去解决它的环境中，这尤其有帮助。


    我还可以使用源代码控制将 T-SQL 代码与之前的版本进行比较。在比较过程中，修改的部分会被高亮显示。更有帮助的是，新增的代码与被修改或删除的代码会用不同颜色高亮。源代码控制的一个缺点是，我不再审查整个脚本。任何未修改的
    T-SQL 代码中存在的原有问题都没有机会得到纠正。这既适用于格式，也适用于编码标准。


    ## 部署准备与版本管理


    能够访问你的 T-SQL 代码使得为部署准备脚本更加容易。源代码控制还有助于防止未经批准的 T-SQL 代码被错误部署。如果没有用于 T-SQL 的源代码控制，准备部署可能很麻烦。我曾与处理部署方式各异的各种公司合作过。我经历过从工单复制脚本并添加到发布页面的部署。我也参与过由开发团队打包和准备
    SQL 脚本的部署。两种方法都可行，但各有其缺点。


    对于第一种方法，我曾有一次部署中，同一个存储过程在三个不同的用户故事中被修改。到了部署的时候，开发者和我都不知道应该部署哪个版本。对于第二种方法，实际的部署时间更短，并且有错误日志记录。然而，对于这两种方法，都没有单一的数据库代码可信源。在任何一种情况下，如果我需要撤销几个月前的一次部署，都需要花时间筛选部署脚本来找出回滚所需的
    T-SQL 代码版本。'
- fmt: '# 数据库源代码控制：优势与实践


    ## 源代码控制的优势


    您需要能够访问不同数据库和部署的脚本，同时跟踪随时间的变化。您可能会修改某些应用程序或报表的`T-SQL`代码，而这些代码可能被新版本覆盖。然而，业务方可能决定希望回退到原始代码。当该代码保存在源代码控制中时，搜索特定数据库对象的不同版本并找到特定实例要容易得多。还有其他时候，一个生产问题可能在原始变更部署后好几个版本才被报告出来。在确定了导致错误的特定`T-SQL`代码后，我可能需要向管理层报告该问题随时间产生的影响。借助源代码控制，我可以节省时间，快速找到变更是在何时实施的。


    源代码控制的另一个优势是为您提供了一个额外的工具，以帮助进行灾难恢复。如果您丢失了所有硬件和备份，您的业务需要多长时间才能恢复运行？虽然您可能知道需要定期测试备份，但您最近可能没有机会进行测试。根据贵公司制定的灾难恢复计划以及灾难发生时的情况，这可能意味着您将无法访问当前的生产服务器及所有相关数据。如果发生这种不太可能的情况，您可能会发现自己陷入困境，不知如何让应用程序重新运行。作为最后的手段，如果您的数据库与基础表中的必要数据一起处于源代码控制中，您就有机会让公司的系统重新启动并运行。


    ## 如何使用源代码控制


    在首次实施源代码控制时，我发现的一件事是在实施之前需要进行内部讨论。我发现数据库团队、开发团队和质量保证团队需要就如何管理代码达成一致。其中一些讨论涉及到不同团队的工作方式。在管理数据库代码的方式上存在差异。这可能包括何时使用本地与集中式存储库、如何将更改保存到源代码控制、如何处理已部署的错误，以及数据库代码应包含哪些内容的指南。


    在使用源代码控制之前，您可能编写了`T-SQL`脚本并将其保存在本地。在测试`T-SQL`脚本时，您可能在`SQL Server`机器上本地执行了它们。直到这一点，您的大部分工作都是在本地完成的。之后，您可能在这些脚本准备好部署到开发环境时执行了它们。然后，您可能修改了开发环境（一个更集中的位置）中的数据库架构对象。虽然这是编写代码时一个容易开始的地方，但它确实带来了一些风险。如果脚本保存在您的本地机器上，而您的机器损坏了，您可能丢失了与这些脚本相关的所有工作。还存在这样的可能性：当您将代码部署到开发环境时，它破坏了其他地方的功能。此外，如果您和一位同事同时处理同一个数据库对象，您可能会发现您的更改被同事的代码覆盖了。


    这正是在本地编写代码然后将这些更改保存到集中式存储库的优势所在。在很大程度上，这就是源代码控制背后的理念。源代码控制允许您在本地机器上处理代码。您可以创建或更改数据库对象，并且当您在本地构建代码时，您有一个额外的检查点，确保数据库项目能够成功构建。一旦您测试并确认了您的数据库代码，就可以将其签入集中式服务器。这个中央存储库可以接收您以及团队中任何其他有权更改此数据库项目的成员的代码变更。这在您的工作环境、同事的工作环境以及所有代码更改的集合之间实现了一定程度的分离。


    您使用的源代码控制软件类型将决定您管理和更新`T-SQL`代码的方式。当我刚开始使用数据库的源代码控制时，`Git`还没有成为主要的源代码控制软件。我从`Team
    Foundation Server (TFS)`开始。在我工作的公司，我们通常不处理多个分支。数据库项目是我们第一次实现分支的地方。在实施时，所有开发都属于相同的报告结构和部署周期。


    您可以对源代码控制进行更改。每次将这些更改保存到中央存储库时，称为一次`check-in`。在`check-in`代码时，您可以为此次`check-in`添加注释。在我的公司，我们通常会注明用户故事编号以及关于变更内容的简要说明。当您开始处理源代码控制中的代码时，可以让代码自动`checked
    out`。这将使其他人知道您正在更改代码。'
  raw: 'You will need to be able to access scripts for different databases and deployments
    but also keep track of changes over time. You may change some T-SQL code for applications
    or reporting that may get overwritten with newer code. However, the business may
    decide they want to go back to the original code. When that code is saved in source
    control, it is much easier to search through the versions of the specific database
    object and find the specific occurrence. There are other times where an issue
    may get reported from Production several deployments after the original change
    went out. After I have determined the specific T-SQL code that is causing the
    bug, I may need to report to management the effects of this issue over time. With
    source control I can save time by finding when the change was implemented.


    Another advantage of source control is allowing you to have one more tool to help
    in the case of disaster recovery. If you were to lose all your hardware and backups,
    how would it take you to get your business up and running again? While you may
    know that your backups need to be tested on a regular basis, you may not have
    had the opportunity to test them lately. Depending on how your company has developed
    their disaster recovery plan and what happens when disaster strikes could mean
    you lose access to your current Production servers and all the associated data.
    If this unlikely situation happens, you may find yourself in a situation where
    you are wondering how you will get your applications running again. As a plan
    of last resort, if your databases are in source control along with the necessary
    data in your base tables, you have a chance of getting your company’s systems
    up and running.


    ## How to Use Source Control


    One of the things I found out when first implementing source control were the
    types of discussions that needed to happen internally prior to implementing source
    control. I found that the database team, the development teams, and the QA teams
    needed to come to an agreement as to how code would be managed going forward.
    Some of these discussions had to deal with how the different teams functioned.
    There are differences in how you want to manage your database code. This can include
    guidelines for when to use local vs. centralized repositories, how to save your
    changes to source control, how to resolve bugs that have been deployed, and what
    should be included with your database code.


    Prior to using source control, you may have written T-SQL scripts and save them
    locally. When testing your T-SQL scripts, you may have executed them locally on
    the SQL Server machine. Up until this point, you have done most of your work locally.
    Afterward, you may have executed them once these scripts were ready to deploy
    to the development environment. You may haved then modified the objects in your
    development environment, a database schema in a more centralized location. While
    this is an easy place to start when writing code, it does create some risk. If
    the scripts were saved locally on your machine and your machine died, you may
    have lost any work associated with the scripts. There is also the possibility
    that when you deployed code to the development environment, it broke functionality
    somewhere else. In addition, if you and a fellow coworker were both working on
    the same database object, you may find your changes overwritten with your coworker’s
    code.


    This is where the benefits of writing code locally and then saving those changes
    in a centralized repository can be helpful. To a large extent, that is the idea
    behind source control. Source control allows you to work with code locally on
    your machine. You can create database objects or change database objects, and
    when you build the code locally, you have an additional check that the database
    project can build successfully. Once you have tested and confirmed your database
    code, you can check it in a centralized server. This central repository can receive
    code changes from you and any other members of your team that are authorized to
    make changes to this database project. This allows a certain degree of separation
    between your work environment, your coworkers’ work environment, and the collection
    of all code changes together.


    Depending on the type of software you use for source control will determine how
    you manage writing and updating your T-SQL code. When I first started working
    with databases in source control, Git had not become the primary software used
    for source control. I started with Team Foundation Server (TFS) . In the company
    where I worked, we typically did not work with multiple branches. The database
    project is the first place we implemented branching. At the time of implementation,
    all of development fell under the same reporting structure and deployment cycle.


    You can make changes to your source control. Each time you save these changes
    to central repository, it is called a check-in. When checking in code, you can
    add comments to the check-in. In my company, we usually indicate the user story
    number and a brief comment about what has changed. When you begin working on code
    in source control, you can have the code automatically checked out. This will
    allow others to know that you are making changes to the code.'
