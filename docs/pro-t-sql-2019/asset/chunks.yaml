    ## Integration Testing


    While it is good to know that a single piece of database code is working as expected,
    most T-SQL code does not exist in isolation. The very nature of relational design
    infers that items in the database are related to one another. We normally think
    of the relationships between tables. However, stored procedures access data that
    exists in tables. If I wanted to verify an insert of data, I may run a unit test.
    This would confirm that the data I expected to be inserted has been inserted.


    Issues can arise when there is more than one way to access the same data in the
    database. Oftentimes, these queries were written at different periods in time.
    This can cause the logic in the queries to be slightly different. I have also
    seen instances where different business units in a company have different calculations
    for the same data. If a calculation for one business unit is reused for another
    business unit, it can cause what appears to be inaccurate results.


    This brings up a question as to how to keep our T-SQL code and query results consistent
    across multiple different database objects. This is where integration testing
    can be useful. Integration testing is the term used to indicate testing that is
    designed to work with more than a single piece of code. If you are using an application
    to insert data and you want to verify that the data is inserted correctly, that
    could be considered integration testing. You would be testing both the application’s
    ability to connect to SQL Server and the T-SQL code to insert the data into the
    database.


    This is only one scenario where integration testing can be used. A common situation
    I find myself in is working with two stored procedures that are intended to pull
    back generally the same information. There are times that changes to one of the
    underlying tables or code in one of the stored procedures may cause these two
    stored procedures to return different results. Unfortunately, these differences
    in results are not usually found until well after the T-SQL code was deployed.
    This causes an overall loss of confidence in the applications.


    While it is preferred that these intertwined stored procedures would be documented
    or better yet re-factored down to a single stored procedure, this is not always
    an option. There are costs associated with having multiple versions of similar
    code, but there are also costs with having multiple processes relying on the same
    code. For the rest of this chapter, we will assume that the T-SQL code cannot
    be rewritten to get rid of the dependency.


    Just like unit testing database code, you can begin your integration testing manually
    by using T-SQL queries. The biggest factor in your integration is understanding
    how your environment works together. Sometimes this is found by accident like
    when something breaks. Other times, you may be a subject matter expert and already
    know the interactions. Either way, in order to begin integration testing, you
    first need to have at least two things to test.


    You could begin by testing a data insert along with a data select of the same
    table(s). You could also use integration testing to compare the results of two
    queries. This could happen if you have one query where you return all values and
    another query where you search for a specific value. While these two stored procedures
    would not match for every record, they may have matching results for a specific
    record. This type of integration testing would confirm that the values returned
    in the columns were consistent between one another.'
