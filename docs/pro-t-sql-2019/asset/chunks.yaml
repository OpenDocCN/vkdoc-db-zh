    从`SQL Server 2016`开始，有了关于如何管理执行计划的新功能。不再仅仅是在计划缓存中提供执行计划，而是可以选择保存有关已生成执行计划的历史信息。这个新功能被称为`Query
    Store`。要使用`Query Store`，你必须如清单[8-6]所示启用它。


    ```sql

    ALTER DATABASE Menu

    SET QUERY_STORE (OPERATION_MODE = READ_WRITE);

    ```

    *清单 8-6 启用查询存储的查询*


    启用`Query Store`允许`SQL Server`随时间跟踪执行计划。除了跟踪执行计划外，`Query Store`还记录执行统计信息。从`SQL
    Server 2017`和`Azure SQL Database`开始，`Query Store`还跟踪有关特定查询执行的等待统计信息的信息。在`SQL Server
    2016`中，你必须手动管理`Query Store`以确定你的`T-SQL`代码是否有更好的执行计划。如果你发现一个查询可以从`Query Store`中的执行计划中受益，则需要手动为该查询强制使用一个计划。这将导致随着时间的推移产生额外的维护，因为随着数据库中数据的可能变化，你需要返回并撤销强制计划。'
- fmt: '# Automatic Plan Correction


    Building on top of the functionality introduced in SQL Server 2016 with Query
    Store is a new feature introduced in SQL Server 2017. The next step was to see
    if SQL Server could use the access to historical information about execution plans,
    execution statistics, and wait statistics for those query executions to the benefit
    of SQL Server. Like Query Store, this is functionality that can be configured
    so that no human intervention is required. In order to make that happen, this
    new functionality also had to include a way to verify the results.


    Now that SQL Server could look at the query store, it could determine systematically
    if a new execution plan performed better or worse than the prior execution plan.
    This new functionality is referred to as Automatic Plan Correction. This feature
    is not enabled by default. Before it can be enabled, Query Store will need to
    be enabled as shown in Listing [8-6](#480547_1_En_8_Chapter.xhtml#PC6). Once Query
    Store has been enabled, you can run the code shown in Listing [8-7](#480547_1_En_8_Chapter.xhtml#PC7)
    to enable Automatic Plan Correction.


    ```sql

    ALTER DATABASE Menu

    SET AUTOMATIC_TUNING (FORCE_LAST_GOOD_PLAN = ON);

    ```

    **Listing 8-7** Query to Enable Automatic Plan Correction


    Once Automatic Plan Correction has been enabled, SQL Server can compare the new
    and previous execution plans to determine if the comparison meets the criteria
    where SQL Server can force the execution plan. In order to make sure that SQL
    Server did not spend extra effort micro tuning performance, the threshold was
    set at a benefit of decreasing the CPU cost by 10 seconds or more. The other option
    was if the number of errors in the execution was less than the previous version.
    If the new execution plan cost less than 10 extra seconds on the CPU, then SQL
    Server could force the previous plan automatically. Similarly, if the new execution
    plan had more errors than the previous plan, then SQL Server could force the previous
    execution plan.


    After SQL Server forced an execution plan automatically, it would continue to
    monitor performance to confirm that the newly forced execution plan was working
    as expected. If SQL Server determines that the forced execution plan is no longer
    providing the performance benefit expected, then SQL Server can undo forcing the
    execution plan. Automatic Plan Correction does not alter your T-SQL code; this
    feature only helps manage which execution plan is currently being used for your
    T-SQL code.


    If you would prefer to manually manage your execution plans, you can do so. You
    will want to make sure that you do not run the T-SQL code shown in Listing [7-8](#480547_1_En_7_Chapter.xhtml#PC8).
    If you choose to manual plan choice correction, then you will need to regularly
    monitor which queries need to have plans forced. You will also need to manually
    undo forcing query execution plans over time as the shape of your data and the
    associated statistics may change over time. Query Store can be used to monitor
    execution plans over time starting in SQL Server 2016. With SQL Server 2017, there
    is also the option of using the DMV `sys.dm_tuning_recommendations` to find queries
    that can benefit from forcing an execution plan.


    While automatic or manual plan correction is outside the scope of T-SQL, it is
    helpful to know what SQL Server can do with your T-SQL queries. I would still
    suggest that you design your T-SQL to run efficiently for a variety of scenarios,
    but it is nice to know that when there are times that issues like parameter sniffing
    are unavoidable, there are other options within SQL Server to help your overall
    query performance.


    # Automatic Index Management


    In addition to allowing SQL Server to manage your execution plans and choose the
    best available plan, you also have the option of allowing SQL Server to systematically
    monitor and manage your indexes. This feature is currently only available in Azure
    SQL Database. Enabling Automatic Index Management allows SQL Server to not only
    create new indexes that it deems necessary, but SQL Server can also identify indexes
    that are unused or that seem to be like other indexes that have been created.


    Like Automatic Plan Correction, SQL Server will monitor the performance of new
    indexes. If there are deemed to be less efficient, SQL Server will remove those
    indexes. The same process will be used if SQL Server modifies or drops indexes.
    It will still be possible to manually manage your indexes while using Azure SQL
    Database. However, allowing Azure SQL Database to promptly find and resolve indexing
    issues may save you money as less resources may be required to perform the same
    tasks.


    # Intelligent Query Processing


    Along with the ability for SQL Server to automatically manage execution plans
    and indexes, there are other new features that can help automatically optimize
    T-SQL code performance. As discussed in Chapter [6](#480547_1_En_6_Chapter.xhtml),
    memory is a key resource used by SQL Server. When using memory with SQL Server,
    we want to be sure that memory is being used as efficiently as possible. Working
    with data sets is also critical to working with SQL Server. If SQL Server can
    convert a collection of rows into a batch and then perform any necessary actions,
    this will help optimize the query. The shape of the data is not always consistent
    in a data table. In those scenarios, it may be helpful to have an execution plan
    that is flexible depending on the types of data pulled back. These features can
    help improve the efficiency of the T-SQL code that is being executed.


    ## Memory Grant Feedback


    When executing a query, SQL Server will try to estimate the amount of memory required
    for that transaction. The amount of memory allocated to a query based on the estimate
    is referred to as a memory grant. While it is ideal that the SQL Server estimate
    the memory correctly, there are times where the amount of memory estimated does
    not match the amount of memory used. Memory Grant Feedback first became available
    in SQL Server 2017. The original memory grants were for batch mode operations.
    That is a type of operation where records are processed as a unit instead of row
    by row.


    In order to make sure that memory grants were managed correctly, thresholds were
    defined for the variance between the memory grant and the actual memory usage.
    If the memory used was less than 1 MB, no additional analysis was required. If
    the memory grant was twice the amount of memory used, then the memory grant for
    the specific query could be recalculated. Similarly, the memory grant could be
    recalculated if the memory needed to execute the query was more than the memory
    grant.


    ## Batch Mode on Rowstore


    Having memory grants for batch mode operations was a necessary foundation for
    the next stage in the development of batch mode operations. Batch mode operations
    are where SQL Server can perform an action to group of records all at once instead
    of one record at a time. When batch mode was originally introduced in SQL Server
    2012, it was only available for columnstore indexes. Starting with SQL Server
    2019, batch mode operations were also allowed to be used for a collection of rows.
    In this case, a collection of rows is also called a rowstore. Memory grants for
    batch mode operations allowing batch mode operations for heaps and indexes are
    the foundation for an additional type of query optimization.'
  raw: '### Automatic Plan Correction


    Building on top of the functionality introduced in SQL Server 2016 with Query
    Store is a new feature introduced in SQL Server 2017\. The next step was to see
    if SQL Server could use the access to historical information about execution plans,
    execution statistics, and wait statistics for those query executions to the benefit
    of SQL Server. Like Query Store, this is functionality that can be configured
    so that no human intervention is required. In order to make that happen, this
    new functionality also had to include a way to verify the results.


    Now that SQL Server could look at the query store, it could determine systematically
    if a new execution plan performed better or worse than the prior execution plan.
    This new functionality is referred to as Automatic Plan Correction. This feature
    is not enabled by default. Before it can be enabled, Query Store will need to
    be enabled as shown in Listing [8-6](#480547_1_En_8_Chapter.xhtml#PC6). Once Query
    Store has been enabled, you can run the code shown in Listing [8-7](#480547_1_En_8_Chapter.xhtml#PC7)
    to enable Automatic Plan Correction.


    ```

    ALTER DATABASE Menu

    SET AUTOMATIC_TUNING (FORCE_LAST_GOOD_PLAN = ON);

    Listing 8-7

    Query to Enable Automatic Plan Correction

    ```


    Once Automatic Plan Correction has been enabled, SQL Server can compare the new
    and previous execution plans to determine if the comparison meets the criteria
    where SQL Server can force the execution plan. In order to make sure that SQL
    Server did not spend extra effort micro tuning performance, the threshold was
    set at a benefit of decreasing the CPU cost by 10 seconds or more. The other option
    was if the number of errors in the execution was less than the previous version.
    If the new execution plan cost less than 10 extra seconds on the CPU, then SQL
    Server could force the previous plan automatically. Similarly, if the new execution
    plan had more errors than the previous plan, then SQL Server could force the previous
    execution plan.


    After SQL Server forced an execution plan automatically, it would continue to
    monitor performance to confirm that the newly forced execution plan was working
    as expected. If SQL Server determines that the forced execution plan is no longer
    providing the performance benefit expected, then SQL Server can undo forcing the
    execution plan. Automatic Plan Correction does not alter your T-SQL code; this
    feature only helps manage which execution plan is currently being used for your
    T-SQL code.


    If you would prefer to manually manage your execution plans, you can do so. You
    will want to make sure that you do not run the T-SQL code shown in Listing [7-8](#480547_1_En_7_Chapter.xhtml#PC8).
    If you choose to manual plan choice correction, then you will need to regularly
    monitor which queries need to have plans forced. You will also need to manually
    undo forcing query execution plans over time as the shape of your data and the
    associated statistics may change over time. Query Store can be used to monitor
    execution plans over time starting in SQL Server 2016\. With SQL Server 2017,
    there is also the option of using the DMV `sys.dm_tuning_recommendations` to find
    queries that can benefit from forcing an execution plan.


    While automatic or manual plan correction is outside the scope of T-SQL, it is
    helpful to know what SQL Server can do with your T-SQL queries. I would still
    suggest that you design your T-SQL to run efficiently for a variety of scenarios,
    but it is nice to know that when there are times that issues like parameter sniffing
    are unavoidable, there are other options within SQL Server to help your overall
    query performance.


    ### Automatic Index Management


    In addition to allowing SQL Server to manage your execution plans and choose the
    best available plan, you also have the option of allowing SQL Server to systematically
    monitor and manage your indexes. This feature is currently only available in Azure
    SQL Database. Enabling Automatic Index Management allows SQL Server to not only
    create new indexes that it deems necessary, but SQL Server can also identify indexes
    that are unused or that seem to be like other indexes that have been created.


    Like Automatic Plan Correction, SQL Server will monitor the performance of new
    indexes. If there are deemed to be less efficient, SQL Server will remove those
    indexes. The same process will be used if SQL Server modifies or drops indexes.
    It will still be possible to manually manage your indexes while using Azure SQL
    Database. However, allowing Azure SQL Database to promptly find and resolve indexing
    issues may save you money as less resources may be required to perform the same
    tasks.


    ## Intelligent Query Processing


    Along with the ability for SQL Server to automatically manage execution plans
    and indexes, there are other new features that can help automatically optimize
    T-SQL code performance. As discussed in Chapter [6](#480547_1_En_6_Chapter.xhtml),
    memory is a key resource used by SQL Server. When using memory with SQL Server,
    we want to be sure that memory is being used as efficiently as possible. Working
    with data sets is also critical to working with SQL Server. If SQL Server can
    convert a collection of rows into a batch and then perform any necessary actions,
    this will help optimize the query. The shape of the data is not always consistent
    in a data table. In those scenarios, it may be helpful to have an execution plan
    that is flexible depending on the types of data pulled back. These features can
    help improve the efficiency of the T-SQL code that is being executed.


    ### Memory Grant Feedback


    When executing a query, SQL Server will try to estimate the amount of memory required
    for that transaction. The amount of memory allocated to a query based on the estimate
    is referred to as a memory grant. While it is ideal that the SQL Server estimate
    the memory correctly, there are times where the amount of memory estimated does
    not match the amount of memory used. Memory Grant Feedback first became available
    in SQL Server 2017\. The original memory grants were for batch mode operations.
    That is a type of operation where records are processed as a unit instead of row
    by row.


    In order to make sure that memory grants were managed correctly, thresholds were
    defined for the variance between the memory grant and the actual memory usage.
    If the memory used was less than 1 MB, no additional analysis was required. If
    the memory grant was twice the amount of memory used, then the memory grant for
    the specific query could be recalculated. Similarly, the memory grant could be
    recalculated if the memory needed to execute the query was more than the memory
    grant.


    ### Batch Mode on Rowstore


    Having memory grants for batch mode operations was a necessary foundation for
    the next stage in the development of batch mode operations. Batch mode operations
    are where SQL Server can perform an action to group of records all at once instead
    of one record at a time. When batch mode was originally introduced in SQL Server
    2012, it was only available for columnstore indexes. Starting with SQL Server
    2019, batch mode operations were also allowed to be used for a collection of rows.
    In this case, a collection of rows is also called a rowstore. Memory grants for
    batch mode operations allowing batch mode operations for heaps and indexes are
    the foundation for an additional type of query optimization.'
  trans: '# 自动计划修正


    建立在 SQL Server 2016 引入的 **查询存储** 功能之上，SQL Server 2017 引入了一项新特性。下一步是观察 SQL Server
    能否利用对执行计划、执行统计信息以及这些查询执行等待统计信息的历史信息的访问来使 SQL Server 本身获益。与查询存储类似，此功能可进行配置，从而无需人工干预。为了实现这一点，此新功能还必须包含一种验证结果的方法。


    既然 SQL Server 可以查看查询存储，它就能系统地判断一个新的执行计划是否比前一个执行计划表现得更好或更差。这项新功能被称为 **自动计划修正**。此功能默认不启用。在启用它之前，需要先启用查询存储，如清单
    8-6 所示。一旦启用了查询存储，你可以运行清单 8-7 中所示的代码来启用自动计划修正。


    ```sql

    ALTER DATABASE Menu

    SET AUTOMATIC_TUNING (FORCE_LAST_GOOD_PLAN = ON);

    ```

    **清单 8-7** 启用自动计划修正的查询


    启用自动计划修正后，SQL Server 可以比较新旧执行计划，以确定比较结果是否符合 SQL Server 可以强制使用执行计划的标准。为了确保 SQL
    Server 不会花费额外的精力进行微调性能，阈值被设定为 CPU 成本减少 10 秒或更多。另一个选项是如果执行中的错误数量少于之前的版本。如果新的执行计划在
    CPU 上花费的额外时间少于 10 秒，那么 SQL Server 可以自动强制使用前一个计划。同样地，如果新的执行计划比之前的计划产生更多错误，那么 SQL
    Server 可以强制使用前一个执行计划。


    在 SQL Server 自动强制执行一个计划后，它将继续监控性能，以确认新强制的执行计划是否按预期工作。如果 SQL Server 确定强制的执行计划不再提供预期的性能收益，那么
    SQL Server 可以撤销对该执行计划的强制。自动计划修正不会更改你的 T-SQL 代码；此功能仅帮助管理当前用于你的 T-SQL 代码的执行计划。


    如果你更愿意手动管理执行计划，你也可以这样做。但你需要确保不要运行清单 7-8 中所示的 T-SQL 代码。如果你选择手动修正计划选择，那么你需要定期监控哪些查询需要强制执行计划。随着时间的推移，由于数据形态和相关统计信息可能会发生变化，你还需要手动撤销对查询执行计划的强制。从
    SQL Server 2016 开始，可以使用查询存储来长期监控执行计划。在 SQL Server 2017 中，还可以选择使用 DMV `sys.dm_tuning_recommendations`
    来查找可能从强制执行计划中受益的查询。


    虽然自动或手动计划修正超出了 T-SQL 的范畴，但了解 SQL Server 能用你的 T-SQL 查询做些什么是有帮助的。我仍然建议你设计的 T-SQL
    代码能够高效地运行于各种场景，但知道当像参数嗅探这类问题不可避免时，SQL Server 内部还有其他选项来帮助提升整体查询性能，这总是件好事。


    # 自动索引管理


    除了允许 SQL Server 管理你的执行计划并选择最佳可用计划之外，你还可以选择让 SQL Server 系统地监控和管理你的索引。此功能目前仅在 Azure
    SQL Database 中可用。启用自动索引管理允许 SQL Server 不仅创建其认为必要的新索引，还可以识别未使用的索引或似乎与其他已创建索引相似的索引。


    与自动计划修正类似，SQL Server 将监控新索引的性能。如果它们被认为效率较低，SQL Server 将删除这些索引。如果 SQL Server 修改或删除索引，也将使用相同的过程。使用
    Azure SQL Database 时，仍然可以手动管理你的索引。然而，允许 Azure SQL Database 及时发现并解决索引问题可能会为你节省成本，因为执行相同任务所需的资源可能会更少。


    # 智能查询处理


    除了 SQL Server 能够自动管理执行计划和索引之外，还有其他新特性可以帮助自动优化 T-SQL 代码性能。如第 6 章所述，内存是 SQL Server
    使用的关键资源。在 SQL Server 中使用内存时，我们希望确保内存得到尽可能高效的利用。处理数据集对于使用 SQL Server 也至关重要。如果 SQL
    Server 能够将一组行转换为一个批次，然后执行任何必要的操作，这将有助于优化查询。数据表中的数据形态并不总是一致的。在这些场景下，一个能根据所拉回数据类型而灵活调整的执行计划可能会有所帮助。这些特性有助于提高正在执行的
    T-SQL 代码的效率。


    ## 内存授予反馈


    在执行查询时，SQL Server 会尝试估计该事务所需的内存量。基于估计分配给查询的内存量被称为内存授予。虽然 SQL Server 能够正确估计内存是理想情况，但有时估计的内存量与实际使用的内存量并不匹配。内存授予反馈功能最初在
    SQL Server 2017 中可用。最初的内存授予是针对批处理模式操作的。这是一种将记录作为整体（而不是逐行）进行处理的操作类型。


    为了确保内存授予得到正确管理，为内存授予和实际内存使用量之间的差异定义了阈值。如果使用的内存少于 1 MB，则不需要进行额外分析。如果内存授予是实际使用内存量的两倍，则可以重新计算特定查询的内存授予。同样地，如果执行查询所需的内存超过了内存授予，也可以重新计算内存授予。


    ## 行存储上的批处理模式


    拥有用于批处理模式操作的内存授予是批处理模式操作发展的下一个阶段所必需的基础。批处理模式操作是 SQL Server 可以一次性对一组记录执行操作，而不是一次一条记录。当批处理模式最初在
    SQL Server 2012 中引入时，它仅适用于列存储索引。从 SQL Server 2019 开始，批处理模式操作也被允许用于一组行。在这种情况下，一组行也被称为行存储。用于批处理模式操作的内存授予，使得批处理模式操作可用于堆和索引，这是另一种查询优化类型的基础。'
- fmt: '## Adaptive Joins


    SQL Server uses statistics to help estimate the best plan. However, data is not
    always evenly distributed in a table. This can cause SQL Server to select an execution
    plan that may not be the best choice. The chance of this happening has decreased
    in SQL Server 2019 due to new functionality that allows SQL Server to choose between
    the physical join operator of a `Nested Loop` and a `Hash Match` depending on
    the current execution of the query. This new functionality is called an `Adaptive
    Join`.


    `Adaptive Joins` were originally introduced in SQL Server 2017. However, adaptive
    joins can only be used as part of a batch mode operation. In SQL Server 2017,
    batch mode operations were only supported for columnstore indexes. Now that batch
    mode operations are also supported for heaps and B-tree indexes, `Adaptive Joins`
    can also be used on these database objects. Executing the query from Listing 8-5
    generated an execution plan that contained an adaptive join. When you see the
    execution plan, you will see a physical operator for an `Adaptive Join`. On the
    graphical execution plan, you cannot tell what type of operator was used behind
    the scenes. However, if you mouse over the `Adaptive Join` in the execution plan,
    you will see a list of properties like the one shown in Figure 8-5.


    ![../images/480547_1_En_8_Chapter/480547_1_En_8_Fig5_HTML.jpg](images/480547_1_En_8_Chapter/480547_1_En_8_Fig5_HTML.jpg)


    *Figure 8-5 Adaptive Join Properties from Listing 8-5*


    The original query from Listing 8-5 was to return a list of all recipes, the meal
    type associated with the recipe, the list of ingredients, and the cost associated
    with the ingredients. In Figure 8-5, you can see that the `Adaptive Join` type
    listed under the properties is the `Hash Match`. In Figure 8-6 is a partial screenshot
    from the live query statistics for the execution of Listing 8-5.


    ![../images/480547_1_En_8_Chapter/480547_1_En_8_Fig6_HTML.jpg](images/480547_1_En_8_Chapter/480547_1_En_8_Fig6_HTML.jpg)


    *Figure 8-6 Live Query Statistics from Listing 8-5*


    You can see the total number of records processed by each step as the time spent
    on some of the steps. Looking at the live query statistics, you can see the percent
    of records returned vs. the estimate. In this case, some records like `Clustered
    Index Scan` on the table `MealType` or the `Index Scan` on the table `RecipeIngredient`
    were estimated correctly. While other operations like the `Clustered Index Scan`,
    `Hash Match`, and `Adaptive Join` were underestimated. While these variances may
    cause performance issues, the reason I am pointing these values out is to compare
    them to the query execution after I change the value passed to the `@RecipeID`
    variable.


    If I limit the same query to one recipe, I may write T-SQL like what is shown
    in Listing 8-8.


    ```sql

    DECLARE @RecipeID INT = 1350;

    SELECT rec.RecipeName, meal.MealTypeName, ing.IngredientName, ingcos.Cost

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    LEFT JOIN dbo.IngredientCost ingcos

    ON ing.IngredientID = ingcos.IngredientID

    AND ingcos.IsActive = 1

    WHERE (rec.RecipeID = @RecipeID OR @RecipeID IS NULL)

    ORDER BY rec.RecipeName, ing.IngredientName;

    ```

    *Listing 8-8 Query for Recipe Information for a Specific Recipe*


    The singular difference between Listing 8-5 and Listing 8-8 is the first line.
    In Listing 8-5, the `@RecipeID` was set to `NULL` so that all recipes would be
    returned. In Listing 8-8, the `@RecipeID` is set to one specific value. We can
    execute this query and look at the execution plan to see if SQL Server will handle
    this query execution differently now that there may be only one recipe affected.
    In Figure 8-7, you can see the properties for the `Adaptive Join` when executing
    Listing 8-8.


    ![../images/480547_1_En_8_Chapter/480547_1_En_8_Fig7_HTML.jpg](images/480547_1_En_8_Chapter/480547_1_En_8_Fig7_HTML.jpg)


    *Figure 8-7 Adaptive Join Properties from Listing 8-8*


    The Actual Join type shown in Figure 8-7 is a `Nested Loop`. The difference between
    the `Adaptive Join` types in Figures 8-5 and 8-7 shows how the `Adaptive Join`
    can help optimize queries that previously were affected by parameter sniffing.
    The details of the live query statistics from Listing 8-8 are shown in Figure
    8-8.


    ![../images/480547_1_En_8_Chapter/480547_1_En_8_Fig8_HTML.jpg](images/480547_1_En_8_Chapter/480547_1_En_8_Fig8_HTML.jpg)


    *Figure 8-8 Live Query Statistics from Listing 8-8*


    In Figure 8-8, the same physical operators are present as in Figure 8-6. However,
    the actual number of rows processed vs. the estimated number of rows is significantly
    different. In the case of Figure 8-8, almost all the steps are severely overestimated.
    However, the query from Listing 8-8 will still benefit the performance due to
    the use of the `Adaptive Join`.


    There are many ways that you can work toward optimizing for T-SQL code. Unless
    you are testing a new query, often the first step is to identify what T-SQL code
    needs to be optimized. After determining what query needs optimization, you may
    want to analyze execution plans to help determine if there is a step that stands
    out as needing optimization. You may also want to analyze information associated
    with the query such as average logical reads or average execution time. Combining
    this information together may help you identify what can be tuned to improve performance.


    In addition, there are features in SQL Server that can help automatically make
    your T-SQL code perform better. This includes allowing SQL Server to analyze your
    new execution plans and confirm that they are performing better than the previous
    execution plan. If the previous execution plan is expected to perform better,
    SQL Server can make sure that plan is automatically selected. If you are using
    Azure SQL Database, you also have a similar option available when it comes to
    managing indexes. The use of `Adaptive Joins` allows SQL Server to make your execution
    plans more flexible. When an `Adaptive Join` is part of an execution plan, SQL
    Server can decide the correct physical operator to use depending on the values
    passed for that specific query execution. Whether you are manually optimizing
    your T-SQL code or letting SQL Server determine how to improve query execution,
    you have several tools available that should make your T-SQL code perform better.


    ## Part III Building Manageable T-SQL'
