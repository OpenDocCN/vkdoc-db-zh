- fmt: 'Like a check-in in `TFS`, you can commit code in `Git`. Both actions save
    the changes that have been made to the branch you are currently using. While the
    functionality appears the same, these can work differently depending on what version
    control software you are using and what tool you are using with the software.
    `Git` and `GitHub` allow you to save changes before they are committed permanently
    to the repository. Staging changes is the term for when you save changes that
    are not immediately committed to the repository. Staging changes for your commit
    can be done through the command line.


    When we discussed how to manage checking in code and managing branches, the design
    was based on our internal development process, script review process, and deployment
    cycle. We wanted to allow developers to be able to check in `T-SQL` code frequently
    and have that code available in their development environment. We also wanted
    to make sure that the database administrators had time to review code before the
    code was deployed to the QA environment. We wanted to make sure that QA did not
    spend time testing `T-SQL` code that had not been approved.


    Due to this break between development and QA, we opted to create a branch specifically
    for code that had been script-reviewed and approved. As part of the script review
    process, the database administrators were responsible for merging the code. There
    were challenges with this process. Even though all code was meant to be deployed
    in the same sprint, there were times that items were merged out of order from
    how they were created in the development branch. This led to files getting overwritten.
    All of this became even more difficult to manage after the teams were split up
    and the development cycles became staggered.


    With the desire for more companies to move to any combination of Agile, Kanban,
    Scrum, Continuous Integration, or Continuous Delivery, it has become increasingly
    important to have a source control solution that is more flexible. This new solution
    needed to allow for multiple different teams to simultaneously work on the same
    code base without negatively affecting deployments. That is where the popularity
    of `Git` originates.


    The concept of using `Git` is that there is more control over how and when your
    code is merged. In my company, each team is rarely working on the same application
    as another team, so there are few conflicts when it comes to managing code. However,
    almost every application relies on shared databases. In addition, the database
    team is frequently working on the same databases. There are also different deployment
    cycles across the various teams. That is where you can see the power of `Git`.


    Unfortunately, there are still challenges with using source control. These challenges
    exist for either `TFS`, `Git`, or any other versioning control software. Using
    version control is not something that has historically been common for data professionals.
    While there are benefits to making that change, there is also a learning curve
    when it comes to using and managing source control. As with many things the happy
    path works well, but when it comes to more complex scenarios, source control can
    become overwhelming.


    There are features available in `Git` that require more training than using `TFS`.
    These same features are also what help make `Git`’s source control more flexible.
    As is the case, while the increased functionality is nice to have, it can also
    make using the software more complex. There is a main repository where a group
    of code can be saved together. If you are using `SQL Server Data Tools`, this
    is where you have the option of choosing if each database project will have its
    own repository, all databases will share the same repository, or all applications
    and databases will share the same repository. These decisions are not only based
    on preference and desired functionality. As you will see in Chapter 12, how you
    organize your repository will also determine how your code is deployed.


    Inside of the repository, there is the concept of one or more branches. There
    is one branch that should be the main branch. Think of it similarly to what set
    of code would you regularly go to if you needed to deploy these changes. This
    branch is called the `master`. Any time you want to make changes to the `master`
    branch, it is generally best to create a new branch to write your `T-SQL` code.
    This allows the main branch to remain unaffected by code that is in development
    and is not ready to be deployed. In this way, the `master` branch can match the
    code that is currently deployed to Production.


    When you create a branch, this takes a copy of the current repository. You can
    work with this copy and make any changes necessary. When using `Git`, you may
    decide that each person will work off their own branch. This helps everyone develop
    their code individually without being affected by someone else’s code. While this
    is a benefit for development and testing a specific piece of functionality, this
    is also where source control can get complicated.


    As these check-ins happen per branch, you may find yourself in a situation where
    you need to deploy two different branches during the same deployment. This is
    where you will want to try to combine this code. In order to combine this code
    together, you want to take the changes in the branch and add the changes back
    to the `master` branch. To combine a feature branch to the `master` branch is
    called a `merge`. One aspect that can happen as part of this `merge` is called
    the conflict. This can happen when many people have been working on the same database
    object over the same period of time or there has been a delay in merging a previous
    feature branch with the `master` branch. Make sure to work with your development
    teams to get a better understanding of how to avoid merge conflicts and how they
    can be resolved.


    One thing that happens more often than some of us would like to admit is when
    code is deployed and then does not work as intended. I have been in situations
    where those bugs were found during the deployment. Other times those bugs are
    not found until days, weeks, or months after a deployment. In either scenario,
    the key is to figure out how to quickly restore the database to a more functional
    state. One of the discussions I had with developers and QA was how to handle this
    on deployment night. A bug can be manually fixed by a `T-SQL` script. Depending
    on how you manage your database code deployments, it is possible that this bug
    fix can be undone in a future deployment. If you put the bug fix into source control,
    you can make sure this bug fix will not be undone going forward.'
  raw: 'Like a check-in in TFS, you can commit code in Git. Both actions save the
    changes that have been made to the branch you are currently using. While the functionality
    appears the same, these can work differently depending on what version control
    software you are using and what tool you are using with the software. Git and
    GitHub allow you to save changes before they are committed permanently to the
    repository. Staging changes is the term for when you save changes that are not
    immediately committed to the repository. Staging changes for your commit can be
    done through the command line.


    When we discussed how to manage checking in code and managing branches, the design
    was based on our internal development process, script review process, and deployment
    cycle. We wanted to allow developers to be able to check in T-SQL code frequently
    and have that code available in their development environment. We also wanted
    to make sure that the database administrators had time to review code before the
    code was deployed to the QA environment. We wanted to make sure that QA did not
    spend time testing T-SQL code that had not been approved.


    Due to this break between development and QA, we opted to create a branch specifically
    for code that had been script-reviewed and approved. As part of the script review
    process, the database administrators were responsible for merging the code. There
    were challenges with this process. Even though all code was meant to be deployed
    in the same sprint, there were times that items were merged out of order from
    how they were created in the development branch. This led to files getting overwritten.
    All of this became even more difficult to manage after the teams were split up
    and the development cycles became staggered.


    With the desire for more companies to move to any combination of Agile, Kanban,
    Scrum, Continuous Integration, or Continuous Delivery, it has become increasingly
    important to have a source control solution that is more flexible. This new solution
    needed to allow for multiple different teams to simultaneously work on the same
    code base without negatively affecting deployments. That is where the popularity
    of Git originates.


    The concept of using Git is that there is more control over how and when your
