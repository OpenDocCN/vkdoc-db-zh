    \ dbo.RecipeModified rec\nINNER JOIN dbo.MealType mtp\n    ON rec.MealTypeID =\
    \ mtp.MealTypeID\nINNER JOIN dbo.PreparationType prp\n    ON rec.PreparationTypeID\
    \ = prp.PreparationTypeID;\n```\n**代码清单 13-15** 使用规范化表的视图"
- fmt: 'Like the logic in Listing [13-11](#480547_1_En_13_Chapter.xhtml#PC11), you
    can create a view with the name `dbo.Recipe` so that the applications can interact
    with the new table going forward. Depending on the purpose of the original and
    new tables, you may not be able to update all code to use these new tables. If
    so, you may have to rely on triggers to update these tables.


    ## Reporting on Transactional Data


    Most databases used by applications are designed to handle a large volume of transactions.
    The overall design of these databases is referred to as online transaction processing
    or OLTP. These databases are usually designed to store and retrieve data quickly.
    This type of behavior involves many writes to the database. However, your business
    may ultimately decide that it needs information from this same database that is
    running one of your applications. Ideally, you would only have your applications
    accessing databases on your transactional servers. You will want to have a good
    understanding of your business and the impact your queries will have on application
    performance. You may be able to run very simple `SELECT` statements that are only
    accessing a small set of data without negatively impacting your applications.
    You should do everything in your power to limit the additional load put on SQL
    Server for data requests outside of your applications. When large quantities of
    data are accessed for reporting purposes, this can cause performance degradation
    of your applications. This includes additional CPU resources to generate execution
    plans that have been flushed from the cache to make way for running queries for
    reporting workloads. You may also have issues with application data that exists
    in memory getting cleared from the buffer pool after large quantities of data
    have been moved to memory for reporting. These issues can cascade into a scenario
    where your application performance is affected by reporting workloads. If you
    find yourself in the situation where you need to report directly from a transactional
    database, communicate with your management team what kind of impact reporting
    may have on your applications.


    When you need to access data for reporting, you need to have a high number of
    reads from this same database. This type of behavior happens when you need to
    report on the data in this database. Aside from the fact that a transactional
    database is not designed for handling reading large quantities of data as well
    as it can handle reading very small sets of data, there are other challenges that
    can happen when using your transactional data for reporting.


    In some cases, gathering this reporting data can be simple. There may be a small
    number of joins or the underlying logic may not be very complex. I have found
    that you can end up writing a single report, and due to the quality of the report,
    you may be asked to create additional reports. These additional reports may involve
    many tables or the overall logic for these queries may be more complex. This can
    often be because these tables were not designed with reporting in mind. In some
    cases, you may find that you are being asked to report on data that does not exist.


    To develop reports quickly, it is often easiest to write specific logic for each
    individual report. Over time this can cause you to end up with a significant number
    of reports that should return the same or similar results but may not. The best-case
    scenario is that the results are similar but that the underlying code is different.
    This can get even more complex as the business may change the functionality of
    some applications. It may be easy to identify some reports that will need to be
    updated while other reports are missed and start returning inaccurate results.


    At some point in time, you may receive a request to generate a report from your
    transactional data. Often these requests can start out as a simple one-time request
    for data. In our scenario, a user may want to be able to access the recipe and
    ingredient information for making spaghetti. While this may start as a request
    to run a query and get some data, you may find that eventually your users want
    this report available to be run any time or by a select group of people. At that
    point in time, you may write a query like the one in Listing [13-16](#480547_1_En_13_Chapter.xhtml#PC16).'
