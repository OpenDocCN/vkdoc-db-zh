- fmt: '# T-SQL 代码格式化与最佳实践


    ## 在复杂操作中使用显式事务


    多年来，我发现将复杂的 `DELETE` 语句包装在显式事务中是最好的做法。默认情况下，在 SQL Server 上执行 T-SQL 代码时，我们使用的是隐式事务。这意味着
    SQL Server 会在我们执行完事务后自动提交它。我们也可以选择指定一个显式事务。在这种情况下，直到我们向 SQL Server 发送 `COMMIT`
    命令，SQL Server 才会完成 T-SQL 代码的执行。尤其是对于删除操作，但通常对于任何复杂的代码，我发现始终保持谨慎是最佳策略。我知道我可能要么运行
    `BEGIN TRAN` 和不带 `COMMIT` 的查询，要么在首次执行类似清单 [3-12] 中的查询时以 `ROLLBACK` 结束整个语句。这让我能够核实受影响的记录数量。这是我确认查询是否按预期工作的最后机会。如果返回的记录数量与我预期的不同，我可以发出
    `ROLLBACK`，SQL Server 将撤销我试图运行的代码。这只在使用显式事务时才可能实现。同样值得提及的是，如果你使用多级事务（称为嵌套事务），`ROLLBACK`
    的功能可能与预期不同。


    ## 格式化的考量因素


    这引出了设计 T-SQL 格式时的另一个考量。你需要了解你的 T-SQL 代码将如何编写和存储。如果所有 T-SQL 代码都将手动编写，并且无法由第三方工具格式化，那么你可能需要保持编码标准非常简单，并限制对特殊情况的判定标准。然而，如果你有可用的第三方工具，你可以创建一种该工具能够处理的、尽可能复杂的格式。


    ## 一致性至关重要


    构成一名优秀开发者或工程师的因素之一是纪律性。编写 T-SQL 时也是如此。在某种程度上，你使用哪种特定的格式风格并不重要。重要的是**坚持使用那种格式**。理想情况下，你应该尝试让整个团队就一种标准的
    T-SQL 格式化方法达成一致。


    当整个团队都以相同的方式编写 T-SQL 代码时，查看他人的代码会容易得多。你不再需要同时解析格式和编码风格，这可以带来更快的分析和更快的问题解决。格式化
    T-SQL 代码以使其更具可读性，完全关乎代码的呈现方式。


    你应该致力于让公司编写的所有 T-SQL 代码具有一致的格式。由于无论谁编写代码，格式都将相同，这也意味着每个阅读代码的人都会越来越熟悉并快速理解他们的代码。正如你在清单
    [3-13] 中看到的，我正在创建一个用户定义的表类型。


    ```sql

    CREATE TYPE RecipeMealType AS TABLE

    (

    RecipeName VARCHAR(25),

    MealTypeName VARCHAR(25)

    );

    ```

    *清单 3-13 创建用户定义的表类型*


    在清单 [3-14] 中创建临时表时，我也使用了一致的格式。


    ```sql

    CREATE TABLE #TempAvailableMeal

    (

    MealTypeName VARCHAR(25),

    RecipeName VARCHAR(25),

    ServingQuantity TINYINT,

    IngredientName VARCHAR(25)

    )

    ```

    *清单 3-14 创建临时表*


    你还可以看到在清单 [3-15] 中创建表变量时，我使用了相同的格式。


    ```sql

    DECLARE @TempAvailableMeal TABLE

    (

    MealTypeName VARCHAR(25),

    RecipeName VARCHAR(25),

    ServingQuantity TINYINT,

    IngredientName VARCHAR(25)

    )

    ```

    *清单 3-15 创建表变量*


    比较清单 [3-8]、[3-9] 和 [3-10]，你可以很快发现我在创建表时使用了一致的格式。这将使任何其他人（包括我自己）看到这种格式的代码时，能很快知道这是在创建表。


    ## 大小写规则


    关于大小写，至少需要考虑两件事：与关键字相关的大小写，以及所有其他术语的大小写。我倾向于将所有保留字大写。T-SQL 保留字列表可能相当长。我选择将任何不属于数据库模式组成部分的词都视为保留字。我按照数据库对象和列创建时的大小写形式进行大写。当我创建表别名时，我使用小写。你可以在清单
    [3-16] 中看到保留字被大写，而数据库对象名称每个单词的首字母被大写。


    ```sql

    CREATE TRIGGER dbo.LogIngredientCostHistory

    ON dbo.IngredientCost

    AFTER INSERT, UPDATE

    AS

    IF (ROWCOUNT_BIG() = 0)

    RETURN;

    INSERT INTO dbo.IngredientCostHistory (IngredientCostID, Cost, DateCost, DateCreated)

    SELECT inserted.IngredientCostID, inserted.Cost, GETDATE()

    FROM inserted;

    ```

    *清单 3-16 创建 DML 触发器*


    ## 别名的使用


    确定 T-SQL 格式化标准时需要考虑的另一个因素是是否以及如何使用别名。别名是一种允许你创建一个简短名称来引用表的方法。在编写查询时，也可以在 `SELECT`
    语句中为列名创建别名。如何使用别名取决于被别名化的是表还是列。然而，整体概念是相同的。如果为表名创建了别名，则必须在该查询的整个生命周期中使用该别名代替表名。对于列，别名通常用于重命名列或使输出对用户更友好。通常列别名不会被引用。


    在编写查询时，我唯一会引用列别名的情况是，如果我必须按一个已被别名化的列进行排序，特别是当该列包含的逻辑不仅仅是重命名原始列名时。可以在 `ORDER BY`
    子句中提供列的数字顺序表示，而不是提供列名。虽然这是一种快速排序数据的方法，但不建议将其用作永久应用程序代码的一部分，因为 `SELECT` 语句中列的顺序可能会更改，而
    `ORDER BY` 子句却没有更新。这将导致返回的数据可能以非预期的顺序排列。


    ## 逗号的格式


    关于 T-SQL 代码格式化的另一个有争议的话题是如何在编写代码时格式化逗号。有些人喜欢将逗号放在每行的开头。这可以提高可读性并帮助其他人快速识别这是多行中的一行。将逗号添加到每行的开头确实简化了调试，因为很容易注释掉以逗号开头的单行，而查询的其余部分仍能正确解析。我更喜欢将我的逗号放在末尾，这样我可以忽略逗号，专注于查询中返回的列。


    ## WHERE 子句的格式


    当涉及到 `WHERE` 子句中的多个条件时，我确实更喜欢与那些偏好逗号在开头的人相同类型的方法。我希望 `WHERE` 子句具有与 `SELECT` 语句相同的风格。然而，这并不总是意味着每行的逻辑与逗号的逻辑相同。`WHERE`
    子句中的某些行可能包含 `AND` 或 `OR`，而不仅仅是单一的比较。这种额外的逻辑将要求你根据自己的阅读舒适度做出一些决定。我确实希望那些行能突出显示，以便我意识到
    `WHERE` 子句中每一行使用的逻辑。'
  raw: 'Over the years, I have found it best to wrap complex DELETE statements in
    an explicit transaction. By default, when we execute T-SQL code on SQL Server,
    we are using an implicit transaction. That means that SQL Server knows to commit
    the transaction automatically after we execute the transaction. We also have the
    option of specifying an explicit transaction. This is where SQL Server will not
    complete the execution of the T-SQL code until we send the COMMIT to SQL Server.
    Particularly with deletes, but often with any complex code, I have found that
    it is best to always be careful. I know I will either run the BEGIN TRAN and the
    query without the COMMIT or end the whole statement with a ROLLBACK when I first
    execute a query like the one in Listing [3-12](#480547_1_En_3_Chapter.xhtml#PC12).
    This allows me to verify the number of records affected. This is my last chance
    to confirm that my query is working as expected. If I were to get a different
    number of records returned than the one I expected I could issue a ROLLBACK, and
    SQL Server would undo the code that I had attempted to run. This is only possible
    while using explicit transactions. It is also worth mentioning that if you are
    using multiple levels of transactions, referred to as nested transactions, the
    functionality of the ROLLBACK may work differently than expected.


    This leads to another consideration when designing your T-SQL formatting. You
    will need to know how your T-SQL code will be written and stored. If all T-SQL
    code will be written manually and cannot be formatted by a third-party tool, then
    you may need to keep the coding standard very simple and limit criteria for special
    situations. However, if you have a third-party tool available, you can create
    a format that is as complex as that tool can handle.


    One of the factors that makes a good developer or engineer is discipline. The
    same is true when writing T-SQL. To certain extent, it does not matter what specific
    style of formatting you use. What does matter is being consistent with that formatting.
    Ideally, you should try to get your entire team to agree to a standard method
    of formatting T-SQL.


    When your whole team writes T-SQL code the same way, it makes it much easier to
    look at someone else’s code. You no longer must translate both the format and
    the coding style which can lead to quicker analysis and quicker problem resolution.
    Formatting your T-SQL code to make it more readable is all about how the code
    will look.


    You should move toward having consistent formatting for all T-SQL code written
    at your company. Since the formatting will be the same regardless of who writes
    the code, it also means that everyone reading the code will become more and more
    familiar with quickly interpreting their code. As you can see in Listing [3-13](#480547_1_En_3_Chapter.xhtml#PC13),
    I am creating a user-defined table type.


    ```

    CREATE TYPE RecipeMealType AS TABLE

    (

    RecipeName VARCHAR(25),

    MealTypeName VARCHAR(25)

    );

    Listing 3-13

    Create User-Defined Table Type

    ```


    I also use a consistent format in Listing [3-14](#480547_1_En_3_Chapter.xhtml#PC14)
    when creating a temporary table.


    ```

    CREATE TABLE #TempAvailableMeal

    (

    MealTypeName VARCHAR(25),

    RecipeName VARCHAR(25),

    ServingQuantity TINYINT,

    IngredientName VARCHAR(25)

    )

    Listing 3-14

    Create a Temporary Table

    ```


    You can also see I use the same format when creating a table variable in Listing
    [3-15](#480547_1_En_3_Chapter.xhtml#PC15).


    ```

    DECLARE @TempAvailableMeal TABLE

    (

    MealTypeName VARCHAR(25),

    RecipeName VARCHAR(25),

    ServingQuantity TINYINT,

    IngredientName VARCHAR(25)

    )

    Listing 3-15

    Create a Table Variable

    ```


    Comparing Listings [3-8](#480547_1_En_3_Chapter.xhtml#PC8), [3-9](#480547_1_En_3_Chapter.xhtml#PC9),
    and [3-10](#480547_1_En_3_Chapter.xhtml#PC10), you can quickly see that I use
    a consistent format when creating tables. This will allow anyone else and myself
    to see code in this format and quickly know that this code is creating a table.


    There are at least two things to consider when it comes to capitalization. There
    is capitalization related to keywords and capitalization for all other terms.
    I prefer to uppercase all reserved words. The list of T-SQL reserved words can
    be quite lengthy. I chose to consider any word that is not part of the database
    schema as considered a reserved word. I capitalize database objects and column
    names as they were created. When I create table aliases, I use lowercase. You
    can see in Listing [3-16](#480547_1_En_3_Chapter.xhtml#PC16) how the reserved
    words are uppercased and the first letter of each word for a database object name
    is capitalized.


    ```

    CREATE TRIGGER dbo.LogIngredientCostHistory

    ON dbo.IngredientCost

    AFTER INSERT, UPDATE

    AS

    IF (ROWCOUNT_BIG() = 0)

    RETURN;

    INSERT INTO dbo.IngredientCostHistory (IngredientCostID, Cost, DateCreated)

    SELECT inserted.IngredientCostID, inserted.Cost, GETDATE()

    FROM inserted;

    Listing 3-16

    Create a DML Trigger

    ```


    One of the other factors to consider when determining formatting standards for
    T-SQL is if and how to use aliasing. Aliasing is a method that allows you to create
    a shortened name to reference a table. It is also possible to alias column names
    in your select statements when writing queries. How the aliased values can be
    used depends on whether a table or a column is being aliased. However, the overall
    concept is the same. If an alias is created for a table name, the alias must be
    used in place of the table name for the entirety of the given query. For columns,
    aliases are often used to rename a column or make the output more user-friendly.
    Often the column aliases are not referenced.


    The only time I will reference a column alias when writing my queries is if I
    must order by a column that has been aliased, particularly if that column has
    more logic than only renaming the original column name. It is possible to provide
    a numeric representation of the column order in the ORDER BY statement instead
    of proving a column name. While this is a quick method to sort data, this is not
    recommended to be used as part of permanent application code as the order of columns
    in the SELECT statement can be changed without the ORDER BY clause getting updated.
    This would cause the data returned to potentially be ordered differently than
    intended.


    Another debated topic when it comes to T-SQL code formatting is how to format
    commas when writing code. There are those who prefer to put the commas at the
    beginning of each line. This can improve readability and help others quickly identify
    that this is one of multiple lines. Adding the commas at the front of each line
    does simplify debugging as it is easy to comment out a single line that begins
    with a comma and the rest of the query will parse correctly. I prefer adding my
    commas at the end so that I can ignore the commas and focus on the columns being
    returned in a query.


    When it comes to multiple criteria in the WHERE clause, I do prefer the same type
    of methodology as those that prefer the commas at the beginning. I want the WHERE
    clause to have the same style as the SELECT statement. However, this does not
    always mean that the logic for each line is the same as it does for a comma. Some
    lines in a WHERE clause can have an AND or an OR instead of a single comparison.
    This additional logic will require you to make some decisions about what is comfortable
    for you to read. I do like those to stand out that I can be aware of how the logic
    is being used for each line in the WHERE clause.'
