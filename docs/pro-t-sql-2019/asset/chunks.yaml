  trans: '

    #### CHAR 和 VARCHAR


    可用的两种字符串数据类型是 `CHAR` 和 `VARCHAR`。这些数据类型相似，仅在特定考虑上有所不同。可以配置数据字段以决定数据如何存储。可以配置列以切换大小写敏感性、重音敏感性、假名敏感性或宽度敏感性。所存储的敏感性称为排序规则。可存储的数据类型通常与数据库排序规则匹配。除非有特定覆盖设置，否则列的排序规则与数据库相同。两种数据类型都用于存储文本数据，这些字段中可存储的字符与列的排序规则所允许的字符相同。


    在决定使用哪种数据类型时，需要记住将存储的数据种类。如果数据长度相似，例如电话号码或邮政编码，那么 `CHAR` 可能是首选数据类型。但是，如果列宽度差异很大，例如地址行或备注列，那么
    `VARCHAR` 将是更好的选择。考虑将 `VARCHAR(MAX)` 的使用限制在你预计要保存超过 8000 个字符的情况。如果指定了 `VARCHAR(MAX)`，则最大存储大小为
    2 GB。


    在使用 `CHAR` 和 `VARCHAR` 时，还有一些额外的注意事项需要牢记。当使用 `CHAR` 和 `VARCHAR` 进行数据定义或变量声明时，请记住默认值是一个字符。但是，在使用
    `CAST` 或 `CONVERT` 函数时，默认字符数将是 30。为了最大程度地减少数据截断，在使用 `CHAR` 或 `VARCHAR` 数据类型时，请确保始终显式指定字符数。


    对于使用单字节编码字符（如 Latin）的排序规则，`CHAR` 的存储大小（以字节为单位）等于字符数。在使用 `VARCHAR` 时，字符数加上 2 个额外字节等于存储的总字节数。也可以在
    `CHAR` 和 `VARCHAR` 数据类型中保存多字节编码字符。对于这两种数据类型，保存的字符数可能小于总字节数。


    从 SQL Server 2019 开始，现在可以将 Unicode 值保存在 `CHAR` 或 `VARCHAR` 中。但是，这仅在启用 UTF-8 编码时才可能。


    #### TEXT


    `TEXT` 数据类型以前在需要存储非常大的字符串时使用。但是，此数据类型已弃用。由于此数据类型已弃用，在新的开发中应避免使用 `TEXT` 数据类型。如果需要使用
    `TEXT` 数据，对于新的开发，应考虑使用数据类型 `VARCHAR(MAX)`。但是，请考虑你是否需要此功能，或者使用字符数较少的 `VARCHAR`
    是否更合适。未来使用 `TEXT` 数据类型的唯一考虑应该是为了应用程序的向后兼容性。`TEXT` 数据类型主要用于处理可变长度的非常大的字符串的情况。在许多情况下，这是指保存的数据长度超过
    8000 个字符的情况。可以保存到 `TEXT` 数据类型的最大字符数是 2,147,483,647。在某些情况下，可存储的总字符数可能小于此数字。


    ### Unicode 字符串数据类型


    在 SQL Server 2019 之前，任何 Unicode 文本数据都需要保存为特殊数据类型。在无法启用 UTF-8 编码的情况下，这仍然是正确的。


    #### NCHAR 和 NVARCHAR


    使用 Unicode 值时，有几种可用选项。这些选项包括存储固定长度或可变长度的字符串。为了避免意外结果，如果未指定字符数或排序规则，你应该了解这些数据类型的工作原理。


    一旦确定需要使用 `NCHAR` 或 `NVARCHAR` 数据类型，选择它们就变得容易了。如果要存储的数据长度大致相似，那么 `NCHAR` 数据类型是正确的选择。但是，如果存储的值差异很大，那么
    `NVARCHAR` 数据类型可能是更好的选择。此外，如果要存储的字符数超过 4000，建议使用 `NVARCHAR(MAX)`。


    通常，在声明 `NCHAR` 或 `NVARCHAR` 数据类型时，指定字符数是最佳实践。对于数据定义或变量声明，`NCHAR` 或 `NVARCHAR`
    的默认字符数是一个字符。但是，在使用 `CAST` 或 `CONVERT` 函数时，如果未指定字符数，则默认为 30。如果未为 `NCHAR` 或 `NVARCHAR`
    数据类型指定排序规则，将使用默认的数据库排序规则。


    了解存储此数据类型所需的空间量也可以让你更好地判断这是否是正确的数据类型以及需要存储的字符数。存储 `NCHAR` 占用的字节数是字节对字符串长度的两倍，而使用
    `NVARCHAR` 时，存储的字节数是字节对字符串长度的两倍加 2 字节。


    #### NTEXT


    以前，使用 `NTEXT` 数据类型来存储非常大的可变长度 Unicode 数据。如果此数据类型仍在你的系统中使用，你可以期望它存储多达 1,073,741,823
    个字符。但是，由于 Unicode 值相关的大小，存储的总长度可能较小。展望未来，使用此数据类型不再是最佳实践。相反，请使用 `NVARCHAR(MAX)`
    数据类型。


    ### 二进制字符串数据类型


    有时，你可能希望存储既不是数字也不是字符的数据。在这些情况下，使用二进制字符串可能是合适的。使用二进制字符串数据类型时有几种选择。


    #### BINARY 和 VARBINARY


    可用于存储二进制字符串数据的选项涉及存储固定长度或可变长度的字符串。与讨论的其他字符串数据类型类似，处理这些数据类型时也有一些考虑因素。


    使用二进制字符串来存储没有字符的字符串项目可能很有用。这些可以包括音频、视频、图像或其他类似项目。可用的数据类型中有两种是 `BINARY` 和 `VARBINARY`。存储长度相似的二进制字符串的最佳选项是
    `BINARY` 数据类型。相反，当存储长度差异显著的二进制字符串时，`VARBINARY` 数据类型是更好的选择。如果二进制字符串的总长度预计超过 4000
    个字符，则建议使用 `VARBINARY(MAX)`。


    使用 `BINARY` 和 `VARBINARY` 数据类型进行数据定义或变量声明时，如果未指定字符数，则默认长度为一。当使用 `CAST` 或 `CONVERT`
    函数将 `BINARY` 转换为 `VARBINARY` 时，默认字符数将为 30。当从具有不同长度的变量转换为 `BINARY` 或 `VARBINARY`
    时要小心，因为 SQL Server 可能会根据需要填充或截断二进制数据。


    `BINARY` 数据类型存储的字节数与要存储的数据长度相同，而 `VARBINARY` 使用 2 字节加上要存储的数据长度的相同字节数。两种数据类型的长度最多可达
    8000。对于 `VARBINARY(MAX)`，最大存储大小为 2 GB。


    #### IMAGE


    可以存储在二进制字符串中的项目之一是图像。处理图像时，重要的是考虑应如何存储这些数据，如果存储，应使用什么数据类型。


    此 `IMAGE` 数据类型以前用于存储大型可变长度二进制数据。虽然此数据类型长度可达 2,147,483,647，但有时允许的存储长度可能较小。对于 `IMAGE`
    数据类型，你应该在未来使用 `VARBINARY(MAX)` 数据类型，因为 `IMAGE` 数据类型已弃用。

    '
- fmt: '## Date and Time Data Types


    Each database transaction occurs at a specific point in time. There may be a need
    to reference or know when a transaction happened. Your application may record
    important dates for a person including birthdays or anniversaries. Dates and times
    can also be used to determine pricing and functionality. By using dates and times,
    you can determine when functionality should be enabled or disabled. Dates and
    times can also show when a user account is inactive or access to a given system
    is enabled or expired. Pricing and billing rates can cover multiple different
    date ranges. When one set of pricing becomes inactive, another set may be active.
    Due to regulations, your company may need to record the pricing over a period
    of time. This includes indicating when the pricing rates may have started and
    stopped. Depending on the purpose for tracking this information, you may only
    need to know only the date or time of the transaction. There are other situations
    where it is best to know both the date and time associated with a certain action.


    ### DATE


    When working with transactions, there may be a specific occasion where you want
    to record when something happened. In some cases, it may only matter on what day
    in which the transaction happened. The `DATE` data type can also be used to store
    aggregated data for a given day. While recording the date of the activity, there
    may also be some options available as to how that data is displayed. When choosing
    if the `DATE` data type is right for you, it is also important to consider not
    only how much data is stored for the `DATE` data type but any possible limitations
    in how the data can be stored.


    There will be times when an application or a user needs to know when a specific
    action happened. When deciding if a `DATE` data type is the right choice, you
    will want to consider the need for the information both in terms of user and application
    usage. In some cases, it is easier to think about when a `DATE` data type would
    not be preferable. For any action where you would want to know a specific time
    when something happened, the `DATE` data type would not be a good choice. However,
    if it is only necessary to know on what day an action occurred, then the `DATE`
    data type would be a great option.


    For the `DATE` data types, there are several options as to how a `DATE` can be
    displayed. With the date format, the default is `YYYY-MM-DD`. In this case `YYYY`
    represents the four-digit year with the range of 0001 to 9999. `MM` represents
    the month number from 01 to 12, and `DD` stands for the day ranging from 01 to
    31, per the number of days in a month. The `DATE` can be displayed in a variety
    of numeric and alphabetic formats. However, the format `ydm` is not supported.


    The `DATE` values that can be stored range from 0001-01-01 to 9999-12-31. The
    `DATE` data type has a ten-digit character length with a precision of 10 and a
    scale of 0. The `DATE` data type takes up 3 bytes and is stored as an `INT`.


    Dates can be converted to `DATETIME`, `SMALLDATETIME`, `DATETIME2`, or `DATETIMEOFFSET`.
    However, the time value will be set to midnight. However, dates cannot be converted
    to the `TIME` data type, and any attempts to perform this conversion will fail
    with an error. In addition, dates do not have a time zone offset and are not daylight
    saving time aware.


    ### TIME


    Another data type related to when an action happened is the `TIME` data type.
    It is useful to understand how time is stored and formatted. When using the `TIME`
    data type, it is helpful to know the implications of converting the data type
    to other `DATE` and `DATETIME` data types. There are also some limitations when
    using the `TIME` data type.


    `TIME` can be used to record a specific time when a transaction or activity occurred.
    When this happens, the time is recorded independently of the date and the date
    may not be able to be determined in the future. One way around this issue could
    be to store the date separately from time. The accuracy of `TIME` is up to 100
    nanoseconds, and the default value for `TIME` is 00:00:00.


    The default format for `TIME` is `hh:mm:ss[.nnnnnnn]`. In this format, `hh` stands
    for a two-digit hour ranging from 0 to 23, `mm` is for a two-digit minute ranging
    from 0 to 59, and `ss` is for a two-digit second from 0 to 59. The `TIME` data
    type allows for varying precision, and if specified, up to seven decimal places
    can be used for fractional seconds as represented by `nnnnnnn`. These values can
    range from 0 to 9999999.


    Due to how `AM` and `PM` are used to differentiate between morning and evening,
    there are additional considerations when working with `TIME`. If `AM` or `PM`
    is not provided and the value for hour is between 00 and 11, the time will be
    recorded as `AM`. For hours 12 to 23, the time will be saved as `PM`. When writing
    `TIME`, if 12 `AM` is entered, this value will be converted to the 0 hour.


    The range of `TIME` is 00:00:00.0000000 to 23:59:59.9999999. The character length
    can vary from 8 to 16 digits, depending on the precision specified for `TIME`.
    In either scenario, `TIME` will be saved as fixed 5 bytes. If `TIME` is converted
    to any data type with a date and time, the day value will be represented as 1900-01-01.
    If the fractional precision is higher for `TIME` than the new data type, the value
    will be truncated. Any attempt to convert the `TIME` data type to a `DATE` will
    fail. Like `DATE`, `TIME` is neither time zone nor daylight saving time aware.'
  raw: '## Date and Time Data Types


    Each database transaction occurs at a specific point in time. There may be a need
    to reference or know when a transaction happened. Your application may record
    important dates for a person including birthdays or anniversaries. Dates and times
    can also be used to determine pricing and functionality. By using dates and times,
    you can determine when functionality should be enabled or disabled. Dates and
    times can also show when a user account is inactive or access to a given system
    is enabled or expired. Pricing and billing rates can cover multiple different
    date ranges. When one set of pricing becomes inactive, another set may be active.
    Due to regulations, your company may need to record the pricing over a period
    of time. This includes indicating when the pricing rates may have started and
    stopped. Depending on the purpose for tracking this information, you may only
    need to know only the date or time of the transaction. There are other situations
    where it is best to know both the date and time associated with a certain action.


    ### DATE


    When working with transactions, there may be a specific occasion where you want
    to record when something happened. In some cases, it may only matter on what day
    in which the transaction happened. The DATE data type can also be used to store
    aggregated data for a given day. While recording the date of the activity, there
    may also be some options available as to how that data is displayed. When choosing
    if the DATE data type is right for you, it is also important to consider not only
    how much data is stored for the DATE data type but any possible limitations in
    how the data can be stored.


    There will be times when an application or a user needs to know when a specific
    action happened. When deciding if a DATE data type is the right choice, you will
    want to consider the need for the information both in terms of user and application
    usage. In some cases, it is easier to think about when a DATE data type would
    not be preferable. For any action where you would want to know a specific time
    when something happened, the DATE data type would not be a good choice. However,
    if it is only necessary to know on what day an action occurred, then the DATE
    data type would be a great option.


    For the DATE data types, there are several options as to how a DATE can be displayed.
    With the date format, the default is YYYY-MM-DD. In this case YYYY represents
    the four-digit year with the range of 0001 to 9999\. MM represents the month number
    from 01 to 12, and DD stands for the day ranging from 01 to 31, per the number
    of days in a month. The DATE can be displayed in a variety of numeric and alphabetic
    formats. However, the format ydm is not supported.


    The DATE values that can be stored range from 0001-01-01 to 9999-12-31\. The DATE
    data type has a ten-digit character length with a precision of 10 and a scale
    of 0\. The DATE data type takes up 3 bytes and is stored as an INT.


    Dates can be converted to DATETIME, SMALLDATETIME, DATETIME2, or DATETIMEOFFSET.
    However, the time value will be set to midnight. However, dates cannot be converted
    to the TIME data type, and any attempts to perform this conversion will fail with
    an error. In addition, dates do not have a time zone offset and are not daylight
    saving time aware.


    ### TIME


    Another data type related to when an action happened is the TIME data type. It
    is useful to understand how time is stored and formatted. When using the TIME
    data type, it is helpful to know the implications of converting the data type
    to other DATE and DATETIME data types. There are also some limitations when using
    the TIME data type.


    TIME can be used to record a specific time when a transaction or activity occurred.
    When this happens, the time is recorded independently of the date and the date
    may not be able to be determined in the future. One way around this issue could
    be to store the date separately from time. The accuracy of TIME is up to 100 nanoseconds,
    and the default value for TIME is 00:00:00.


    The default format for TIME is hh:mm:ss[.nnnnnnn]. In this format, hh stands for
    a two-digit hour ranging from 0 to 23, mm is for a two-digit minute ranging from
    0 to 59, and ss is for a two-digit second from 0 to 59\. The TIME data type allows
    for varying precision, and if specified, up to seven decimal places can be used
    for fractional seconds as represented by nnnnnnn. These values can range from
    0 to 9999999.


    Due to how AM and PM are used to differentiate between morning and evening, there
    are additional considerations when working with TIME. If AM or PM is not provided
    and the value for hour is between 00 and 11, the time will be recorded as AM.
    For hours 12 to 23, the time will be saved as PM. When writing TIME, if 12 AM
    is entered, this value will be converted to the 0 hour.


    The range of TIME is 00:00:00.0000000 to 23:59:59.9999999\. The character length
    can vary from 8 to 16 digits, depending on the precision specified for TIME. In
    either scenario, TIME will be saved as fixed 5 bytes. If TIME is converted to
    any data type with a date and time, the day value will be represented as 1900-01-01\.
    If the fractional precision is higher for TIME than the new data type, the value
    will be truncated. Any attempt to convert the TIME data type to a DATE will fail.
    Like DATE, TIME is neither time zone nor daylight saving time aware.'
  trans: '## 日期和时间数据类型


    每个数据库事务都发生在特定的时间点。可能需要参考或知道事务发生的时间。您的应用程序可能需要记录个人的重要日期，例如生日或纪念日。日期和时间也可用于确定定价和功能。通过使用日期和时间，您可以确定功能应何时启用或禁用。日期和时间还可以显示用户帐户何时非活动，或对给定系统的访问权限何时启用或过期。定价和计费费率可能涵盖多个不同的日期范围。当一组定价失效时，另一组可能生效。由于法规要求，您的公司可能需要记录一段时间内的定价信息。这包括指出定价费率何时开始和停止。根据跟踪此信息的目的，您可能只需要知道事务发生的日期或时间。在其他情况下，最好同时知道与某个操作相关的日期和时间。


    ### DATE


    在处理事务时，可能存在特定情况需要记录某事发生的时间。在某些情况下，只需关心事务发生的日期。`DATE`数据类型也可用于存储特定日期的汇总数据。在记录活动日期时，关于如何显示该数据也可能有一些可用选项。在选择`DATE`数据类型是否适合您时，不仅要考虑为`DATE`数据类型存储多少数据，还要考虑数据存储方式可能存在的限制，这一点很重要。


    有时，应用程序或用户需要知道特定操作发生的时间。在决定`DATE`数据类型是否是正确选择时，您需要考虑用户和应用程序两方面对信息的需求。在某些情况下，考虑何时**不**使用`DATE`数据类型更容易。对于任何需要知道某事发生具体时间的操作，`DATE`数据类型都不是一个好的选择。但是，如果只需要知道操作发生的日期，那么`DATE`数据类型将是一个很好的选项。


    对于`DATE`数据类型，关于如何显示`DATE`有几种选项。日期格式默认为`YYYY-MM-DD`。其中`YYYY`表示四位数年份，范围为 0001 到
    9999。`MM`表示月份编号，范围从 01 到 12，`DD`表示日期，范围从 01 到 31（根据每月天数而定）。`DATE`可以以多种数字和字母格式显示。但是，不支持`ydm`格式。


    可存储的`DATE`值范围从 0001-01-01 到 9999-12-31。`DATE`数据类型具有 10 个字符的长度，精度为 10，小数位数为 0。`DATE`数据类型占用
    3 个字节，并作为`INT`存储。


    日期可以转换为`DATETIME`、`SMALLDATETIME`、`DATETIME2`或`DATETIMEOFFSET`。但是，时间值将被设置为午夜。然而，日期不能转换为`TIME`数据类型，任何尝试执行此转换的操作都将失败并报错。此外，日期没有时区偏移，也不感知夏令时。


    ### TIME


    另一个与操作发生时间相关的数据类型是`TIME`数据类型。了解时间的存储和格式非常重要。使用`TIME`数据类型时，了解将其转换为其他`DATE`和`DATETIME`数据类型的影响很有帮助。使用`TIME`数据类型也存在一些限制。


    `TIME`可用于记录事务或活动发生的具体时间。此时，时间独立于日期记录，未来可能无法确定日期。解决此问题的一种方法可能是将日期与时间分开存储。`TIME`的精度最高可达
    100 纳秒，`TIME`的默认值为 00:00:00。


    `TIME`的默认格式为`hh:mm:ss[.nnnnnnn]`。在此格式中，`hh`表示两位数小时，范围从 0 到 23；`mm`表示两位数分钟，范围从
    0 到 59；`ss`表示两位数秒，范围从 0 到 59。`TIME`数据类型允许不同的精度，如果指定，小数秒最多可使用七位数，由`nnnnnnn`表示。这些值的范围可以从
    0 到 9999999。


    由于`AM`和`PM`用于区分上午和下午，在使用`TIME`时需要额外注意。如果未提供`AM`或`PM`，且小时值在 00 到 11 之间，则时间将被记录为`AM`。对于
    12 到 23 点，时间将被保存为`PM`。写入`TIME`时，如果输入 12 `AM`，此值将被转换为 0 时。


    `TIME`的范围是 00:00:00.0000000 到 23:59:59.9999999。字符长度可以是 8 到 16 位数字，具体取决于为`TIME`指定的精度。无论哪种情况，`TIME`都将保存为固定的
    5 个字节。如果`TIME`转换为任何包含日期和时间的数据类型，日期值将表示为 1900-01-01。如果`TIME`的小数精度高于新数据类型，则值将被截断。任何将`TIME`数据类型转换为`DATE`的尝试都将失败。与`DATE`一样，`TIME`既不感知时区，也不感知夏令时。'
- fmt: '### SMALLDATETIME, DATETIME, DATETIME2, DATETIMEOFFSET


    There are occasions where saving the date or time may not be enough. For these
    scenarios, it may be best to combine the date and time values together. Sometimes
    these values can be somewhat simpler, need more precision, or need to be time
    zone aware.


    One such data type is the `SMALLDATETIME`. This data type is used to record both
    a specific date and time. It has a default value of `1900-01-01 00:00:00`. While
    the accuracy of this data type is listed as 1 second, it is important to note
    that the seconds will always be saved as 00 in the database.


    As with the `date` data type, the `SMALLDATETIME` data type can be displayed in
    a variety of numeric and alphabetical formats. The range for the `SMALLDATETIME`
    is somewhat limited as compared to other `DATE` and `DATETIME` data types. The
    day portion of this data type can span `1900-01-01` to `2079-06-06`. While the
    time entered can range from `00:00:00` to `23:59:59`, the value saved in the database
    will be `00:00:00` to `23:59:00`. The overall length of the `SMALLDATETIME` is
    up to 19 characters, and the storage size required is a total of 4 fixed bytes.


    When converting `SMALLDATETIME` to other `DATETIME` data types, keep in mind that
    any additional precision needed will be recorded with 0s. While it may be tempting
    to use the `SMALLDATETIME`, this data type is not ANSI compliant. As stated previously,
    the seconds for this data type will be rounded depending on the value passed for
    the seconds. If the seconds passed are less than or equal to 29.998, the minute
    will be rounded down. Otherwise, the minute will be rounded up. Like the `date`
    and `time` data types, `SMALLDATETIME` is also not time zone or daylight saving
    time aware.


    There are more options available than just `SMALLDATETIME`. `DATETIME` has been
    an option for a higher level of precision than the previously mentioned data types.
    There are also several key considerations when using this data type.


    While the `DATETIME` data type can record a specific day and time, it may not
    comply with the SQL Standard. One of the key issues with this data type has to
    do with the limitations related to accuracy. The `DATETIME` data type can record
    three decimal places for fractional seconds; the third decimal place is always
    rounded to an increment ending in `.000`, `.003`, or `.007`.


    If a value is not specified, the default for `DATETIME` will be `1900-01-01 00:00:00`.
    There are many numeric and alphabetical formats available when using this data
    type. The year range for `DATETIME` is `1753-01-01` to `2999-12-31`, and the time
    can range from `00:00:00.000` to `23:59:59.997`. The size of this data type is
    8 bytes with a character length ranging from 19 to 26.


    While it is possible to convert other data types to `DATETIME`, it is not recommended
    as this data type does not meet SQL Standards and is not ANSI compliant. The `DATETIME`
    data type is also limited due to the rounding that occurs allowing only increments
    of `.000`, `.003`, and `.007`. This data type is also not time zone or daylight
    saving time aware.


    The `DATETIME2` data type has some additional advantages over the data types previously
    mentioned. While some of the previously mentioned data types have a fixed size,
    this data type works a little differently. We will also look at storing and formatting
    available for this data type.


    The `DATETIME2` data type allows for a specific date and time to be recorded with
    an accuracy of up to 100 nanoseconds. The default value for `DATETIME2` is `1900-01-01
    00:00:00`. Due to this level of precision, this is a great data type to use for
    scenarios where the time must be known to a fraction of a second. As `DATETIME2`
    doesn’t have the same rounding issues as `DATETIME`, it is also more straightforward
    to work with this data type when writing code.


    The `DATETIME2` data type supports multiple numeric and alphabetical ways to display
    the information. The date range for `DATETIME` is from `1753-01-01` to `2999-12-31`,
    and the time range is from `00:00:00` to `23:59:59.9999999`. Multiple precision
    options are allowed, thus causing the character length to range from 19 for the
    precision to the second all the way up to 27 for the precision to 0.0000001 nanoseconds.


    The variation in the precision also affects the storage size of the `DATETIME2`
    data type. One byte is used to store the precision of `DATETIME2` plus the number
    of bytes needed depending on the precision of time. If the precision is less than
    three decimal places for nanoseconds, then there are another 6 bytes used to store
    the `DATETIME2` value. If the precision is 3 or 4, there is 1 byte to store the
    precision and 7 bytes to store the value, for a total of 8 bytes. However, the
    total will be 9 bytes for any values with a precision of more than four decimal
    places.


    Due to the high level of accuracy, the probability of converting values to `DATETIME2`
    is highly likely. If a date is converted to `DATETIME2`, the time component will
    be recorded as `00:00:00`. If time is converted to `DATETIME2`, the day will be
    `1900-01-01`. In the case of `SMALLDATETIME` to `DATETIME2`, the date and time
    will be copied. Any additional precision will be represented with 0s. Going from
    `DATETIMEOFFSET` to `DATETIME2` will cause the time zone to be truncated. When
    going from `DATETIME` to `DATETIME2`, make sure to use explicit conversions to
    avoid unexpected results. The main limitation of using `DATETIME2` is that the
    data type is not time zone aware or daylight saving aware.


    The final data type for dates and times is `DATETIMEOFFSET`. When discussing the
    `DATETIMEOFFSET`, there is some additional functionality that has not been seen
    before with the other data types. There are also things to keep in mind when formatting,
    storing, or converting to this data type.


    The `DATETIMEOFFSET` data type records the specific date and time, with a high
    level of accuracy, for transactions or actions that have taken place. One of the
    key advantages to this data type is the ability to have an offset on the time,
    thus allowing databases from multiple geographic locations to not only be aware
    of when something happened in relation to their local time but also in relation
    to local time at another location.


    The `DATETIMEOFFSET` is accurate to 100 nanoseconds and has a default value of
    `1900-01-01 00:00:00`. The format of `DATETIMEOFFSET` is `YYYY-MM-DD hh:mm:ss.nnnnnnn
    +|– hh:mm`. The `+|– hh:mm` portion of this data type is related to the offset.
    The offset can range from +14 to –14 for the number of hours that a given time
    can have an offset. As with the other time and `DATETIME` data types, this date
    can be formatted or displayed numerically or alphabetically.


    The dates can range from `0001-01-01` to `2999-12-31`. The time that can be saved
    ranges from `00:00:00` to `23:59:59.9999999`. When the precision is saved as `YYYY-MM-DD
    hh:mm:ss {+|–} hh:mm`, the character length is 26. The character length can go
    up to 34 when the precision is `YYYY-MM-DD hh:mm:ss.0000000 {+|–} hh:mm`. The
    storage space required for the `DATETIMEOFFSET` data type is a fixed 10 bytes.


    ## Other Data Types


    In addition to the data types discussed previously, SQL Server has several other
    data types that are available. Some of these data types can be used in `table
    definition` and may have special purposes, while some of the other data types
    may only be usable as `variables` or inside `stored procedures`.'
  raw: '### SMALLDATETIME, DATETIME, DATETIME2, DATETIMEOFFSET


    There are occasions where saving the date or time may not be enough. For these
    scenarios, it may be best to combine the date and time values together. Sometimes
    these values can be somewhat simpler, need more precision, or need to be time
    zone aware.


    One such data type is the SMALLDATETIME. This data type is used to record both
    a specific date and time. It has a default value of 1900-01-01 00:00:00\. While
    the accuracy of this data type is listed as 1 second, it is important to note
    that the seconds will always be saved as 00 in the database.


    As with the date data type, the SMALLDATETIME data type can be displayed in a
    variety of numeric and alphabetical formats. The range for the SMALLDATETIME is
    somewhat limited as compared to other DATE and DATETIME data types. The day portion
    of this data type can span 1900-01-01 to 2079-06-06\. While the time entered can
    range from 00:00:00 to 23:59:59, the value saved in the database will be 00:00:00
    to 23:59:00\. The overall length of the SMALLDATETIME is up to 19 characters,
    and the storage size required is a total of 4 fixed bytes.


    When converting SMALLDATETIME to other DATETIME data types, keep in mind that
    any additional precision needed will be recorded with 0s. While it may be tempting
    to use the SMALLDATETIME, this data type is not ANSI compliant. As stated previously,
    the seconds for this data type will be rounded depending on the value passed for
    the seconds. If the seconds passed are less than or equal to 29.998, the minute
    will be rounded down. Otherwise, the minute will be rounded up. Like the date
    and time data types, SMALLDATETIME is also not time zone or daylight saving time
    aware.


    There are more options available than just SMALLDATETIME. DATETIME has been an
    option for a higher level of precision than the previously mentioned data types.
    There are also several key considerations when using this data type.


    While the DATETIME data type can record a specific day and time, it may not comply
    with the SQL Standard. One of the key issues with this data type has to do with
    the limitations related to accuracy. The DATETIME data type can record three decimal
    places for fractional seconds; the third decimal place is always rounded to an
    increment ending in .000, .003, or .007.


    If a value is not specified, the default for DATETIME will be 1900-01-01 00:00:00\.
    There are many numeric and alphabetical formats available when using this data
    type. The year range for DATETIME is 1753-01-01 to 2999-12-31, and the time can
    range from 00:00:00.000 to 23:59:59.997\. The size of this data type is 8 bytes
    with a character length ranging from 19 to 26.


    While it is possible to convert other data types to DATETIME, it is not recommended
    as this data type does not meet SQL Standards and is not ANSI compliant. The DATETIME
    data type is also limited due to the rounding that occurs allowing only increments
    of .000, .003, and .007. This data type is also not time zone or daylight saving
    time aware.


    The DATETIME2 data type has some additional advantages over the data types previously
    mentioned. While some of the previously mentioned data types have a fixed size,
    this data type works a little differently. We will also look at storing and formatting
    available for this data type.


    The DATETIME2 data type allows for a specific date and time to be recorded with
    an accuracy of up to 100 nanoseconds. The default value for DATETIME2 is 1900-01-01
    00:00:00\. Due to this level of precision, this is a great data type to use for
    scenarios where the time must be known to a fraction of a second. As DATETIME2
    doesn’t have the same rounding issues as DATETIME, it is also more straightforward
    to work with this data type when writing code.


    The DATETIME2 data type supports multiple numeric and alphabetical ways to display
    the information. The date range for DATETIME is from 1753-01-01 to 2999-12-31,
    and the time range is from 00:00:00 to 23:59:59.9999999\. Multiple precision options
    are allowed, thus causing the character length to range from 19 for the precision
    to the second all the way up to 27 for the precision to 0.0000001 nanoseconds.


    The variation in the precision also affects the storage size of the DATETIME2
    data type. One byte is used to store the precision of DATETIME2 plus the number
    of bytes needed depending on the precision of time. If the precision is less than
    three decimal places for nanoseconds, then there are another 6 bytes used to store
    the DATETIME2 value. If the precision is 3 or 4, there is 1 byte to store the
    precision and 7 bytes to store the value, for a total of 8 bytes. However, the
    total will be 9 bytes for any values with a precision of more than four decimal
    places.


    Due to the high level of accuracy, the probability of converting values to DATETIME2
    is highly likely. If a date is converted to DATETIME2, the time component will
    be recorded as 00:00:00\. If time is converted to DATETIME2, the day will be 1900-01-01\.
    In the case of SMALLDATETIME to DATETIME2, the date and time will be copied. Any
    additional precision will be represented with 0s. Going from DATETIMEOFFSET to
    DATETIME2 will cause the time zone to be truncated. When going from DATETIME to
    DATETIME2, make sure to use explicit conversions to avoid unexpected results.
    The main limitation of using DATETIME2 is that the data type is not time zone
    aware or daylight saving aware.


    The final data type for dates and times is DATETIMEOFFSET. When discussing the
    DATETIMEOFFSET, there is some additional functionality that has not been seen
    before with the other data types. There are also things to keep in mind when formatting,
    storing, or converting to this data type.


    The DATETIMEOFFSET data type records the specific date and time, with a high level
    of accuracy, for transactions or actions that have taken place. One of the key
    advantages to this data type is the ability to have an offset on the time, thus
    allowing databases from multiple geographic locations to not only be aware of
    when something happened in relation to their local time but also in relation to
    local time at another location.


    The DATETIMEOFFSET is accurate to 100 nanoseconds and has a default value of 1900-01-01
    00:00:00\. The format of DATETIMEOFFSET is YYYY-MM-DD hh:mm:ss.nnnnnnn +|– hh:mm.
    The +|– hh:mm portion of this data type is related to the offset. The offset can
    range from +14 to –14 for the number of hours that a given time can have an offset.
    As with the other time and DATETIME data types, this date can be formatted or
    displayed numerically or alphabetically.


    The dates can range from 0001-01-01 to 2999-12-31\. The time that can be saved
    ranges from 00:00:00 to 23:59:59.9999999\. When the precision is saved as YYYY-MM-DD
    hh:mm:ss {+|–} hh:mm, the character length is 26\. The character length can go
    up to 34 when the precision is YYYY-MM-DD hh:mm:ss.0000000 {+|–} hh:mm. The storage
    space required for the DATETIMEOFFSET data type is a fixed 10 bytes.


    ## Other Data Types


    In addition to the data types discussed previously, SQL Server has several other
    data types that are available. Some of these data types can be used in table definition
    and may have special purposes, while some of the other data types may only be
    usable as variables or inside stored procedures.'
  trans: '

    ### SMALLDATETIME、DATETIME、DATETIME2、DATETIMEOFFSET


    有些情况下，仅保存日期或时间可能不够。对于这些场景，最好将日期和时间值组合在一起。有时这些值可能相对简单，有时需要更高的精度，或者需要感知时区。


    其中一种数据类型是 `SMALLDATETIME`。该数据类型用于记录具体的日期和时间。其默认值为 `1900-01-01 00:00:00`。虽然该数据类型的精度列为
    1 秒，但需注意秒部分在数据库中始终保存为 00。


    与 `date` 数据类型类似，`SMALLDATETIME` 数据类型可以多种数字和字母格式显示。与其他 `DATE` 和 `DATETIME` 数据类型相比，`SMALLDATETIME`
    的范围有所限制。该数据类型的日期部分范围可从 `1900-01-01` 到 `2079-06-06`。虽然输入的时间范围可从 `00:00:00` 到 `23:59:59`，但在数据库中保存的值将是
    `00:00:00` 到 `23:59:00`。`SMALLDATETIME` 的总长度最多为 19 个字符，所需存储大小为固定的 4 字节。


    当将 `SMALLDATETIME` 转换为其他 `DATETIME` 数据类型时，请记住任何额外的精度都将记录为 0。虽然使用 `SMALLDATETIME`
    可能很诱人，但该数据类型不符合 ANSI 标准。如前所述，该数据类型的秒数将根据传递的秒数值进行四舍五入。如果传递的秒数小于或等于 29.998，分钟将向下舍入。否则，分钟将向上舍入。与
    `date` 和 `time` 数据类型类似，`SMALLDATETIME` 也不感知时区或夏令时。


    可用的选项不仅仅只有 `SMALLDATETIME`。`DATETIME` 一直提供比前述数据类型更高精度的选项。使用此数据类型时，也有几个关键的注意事项。


    虽然 `DATETIME` 数据类型可以记录具体的日期和时间，但它可能不符合 SQL 标准。此数据类型的一个关键问题与精度相关的限制有关。`DATETIME`
    数据类型可以记录小数秒的三位小数；第三位小数总是四舍五入到以 `.000`、`.003` 或 `.007` 结尾的增量。


    如果未指定值，`DATETIME` 的默认值为 `1900-01-01 00:00:00`。使用此数据类型时，有多种数字和字母格式可用。`DATETIME`
    的年份范围是 `1753-01-01` 到 `2999-12-31`，时间范围可从 `00:00:00.000` 到 `23:59:59.997`。此数据类型的大小为
    8 字节，字符长度范围从 19 到 26。


    虽然可以将其他数据类型转换为 `DATETIME`，但不建议这样做，因为此数据类型不符合 SQL 标准，也不符合 ANSI 标准。`DATETIME` 数据类型也因发生的四舍五入而受限，只允许
    `.000`、`.003` 和 `.007` 的增量。此数据类型也不感知时区或夏令时。


    `DATETIME2` 数据类型比前面提到的数据类型具有一些额外优势。虽然前面提到的一些数据类型具有固定大小，但此数据类型的工作方式略有不同。我们还将了解此数据类型的存储和可用格式。


    `DATETIME2` 数据类型允许记录具体的日期和时间，精度高达 100 纳秒。`DATETIME2` 的默认值为 `1900-01-01 00:00:00`。由于这种精度水平，对于需要精确到小数秒的场景，这是一个很好的数据类型。由于
    `DATETIME2` 没有与 `DATETIME` 相同的四舍五入问题，在编写代码时使用此数据类型也更直接。


    `DATETIME2` 数据类型支持多种数字和字母方式来显示信息。`DATETIME2` 的日期范围从 `1753-01-01` 到 `2999-12-31`，时间范围从
    `00:00:00` 到 `23:59:59.9999999`。允许多种精度选项，因此字符长度从精度到秒的 19 一直增加到精度到 0.0000001 纳秒的
    27。


    精度的变化也会影响 `DATETIME2` 数据类型的存储大小。使用一个字节来存储 `DATETIME2` 的精度，再加上根据时间精度所需的字节数。如果精度小于纳秒的三位小数，则另外使用
    6 个字节来存储 `DATETIME2` 值。如果精度为 3 或 4，则使用 1 个字节存储精度，7 个字节存储值，总共 8 字节。但是，对于精度超过四位小数的任何值，总数将为
    9 字节。


    由于高度的准确性，将值转换为 `DATETIME2` 的可能性很大。如果日期转换为 `DATETIME2`，时间组件将记录为 `00:00:00`。如果时间转换为
    `DATETIME2`，日期将是 `1900-01-01`。对于从 `SMALLDATETIME` 转换为 `DATETIME2`，日期和时间将被复制。任何额外的精度将用
    0 表示。从 `DATETIMEOFFSET` 转换为 `DATETIME2` 将导致时区被截断。当从 `DATETIME` 转换为 `DATETIME2`
    时，请确保使用显式转换以避免意外结果。使用 `DATETIME2` 的主要限制是该数据类型不感知时区或夏令时。


    最后一个用于日期和时间的数据类型是 `DATETIMEOFFSET`。在讨论 `DATETIMEOFFSET` 时，有一些之前在其他数据类型中未见过的额外功能。在格式化、存储或转换到此数据类型时，也有一些需要注意的事项。


    `DATETIMEOFFSET` 数据类型记录已发生的事务或操作的具体日期和时间，具有高精度。此数据类型的关键优势之一是能够对时间进行偏移，从而使来自多个地理位置的数据库不仅可以感知某事相对于其本地时间的发生时间，还可以感知相对于另一位置本地时间的发生时间。


    `DATETIMEOFFSET` 的精度为 100 纳秒，默认值为 `1900-01-01 00:00:00`。`DATETIMEOFFSET` 的格式为
    `YYYY-MM-DD hh:mm:ss.nnnnnnn +|– hh:mm`。此数据类型的 `+|– hh:mm` 部分与偏移量相关。给定时间的偏移量范围可以从
    +14 到 –14 小时。与其他时间和 `DATETIME` 数据类型一样，此日期可以数字或字母格式格式化或显示。


    日期范围可以从 `0001-01-01` 到 `2999-12-31`。可保存的时间范围从 `00:00:00` 到 `23:59:59.9999999`。当精度保存为
    `YYYY-MM-DD hh:mm:ss {+|–} hh:mm` 时，字符长度为 26。当精度为 `YYYY-MM-DD hh:mm:ss.0000000
    {+|–} hh:mm` 时，字符长度可达 34。`DATETIMEOFFSET` 数据类型所需的存储空间是固定的 10 字节。


    ## 其他数据类型


    除了前面讨论的数据类型外，SQL Server 还有其他几种可用的数据类型。其中一些数据类型可用于 `表定义` 并可能有特殊用途，而另一些数据类型可能只能用作
    `变量` 或在 `存储过程` 内部使用。

    '
- fmt: '# SQL Server 特殊数据类型概述


    ## UNIQUEIDENTIFIER


    This data type can be a column in a table or used as a variable. The `UNIQUEIDENTIFIER`
    takes up 16 bytes and has a maximum number of characters that can be stored in
    this data type is 36. While non-unicode character strings can be converted to
    `UNIQUEIDENTIFIER`, if the total number of characters exceeds 36, those results
    will be truncated.


    This data type is a GUID, or Globally Unique Identifier. The concept is that these
    unique values will only ever be used once. However, there have been reports of
    this not being true. Either way, the `UNIQUEIDENTIFIER` can be populated one of
    several ways. These include using the functions `NEWID()` and `NEWSEQUENTIALID()`.
    Otherwise, these values can be manually populated if the overall format of the
    GUID is correct and uses valid hexadecimal values of `0–9` and `a–f`.


    While the `UNIQUEIDENTIFIER` can be used in place of `IDENTITY`, I would only
    recommend it for scenarios where it is absolutely required. Not only does it take
    up significantly more space than an `INT` or `BIGINT`, but `UNIQUEIDENTIFIER`
    is limited in the types of constraints that can be used with this data type. `UNIQUEIDENTIFER`
    can be an `IDENTITY` but other table constraints are not allowed.


    ## XML


    Various systems and applications send, use, or store XML data. While there is
    the option to parse this data and save it in tables, there are also times where
    it may be necessary to store the XML data intact. When storing XML data, there
    are other considerations that include what data is in the XML.


    For the `XML` data type, the data must be in a valid XML format. In order to be
    valid, there are several requirements. These include all starting tags must have
    matching end tags. In addition, nested elements must begin and end within the
    same parent element. XML elements cannot have more than one attribute and markup
    characters must be properly specified. If the XML data meets all the preceding
    requirements, then the XML data is considered well-formed.


    The total amount of stored XML data allowed is limited to 2 GB. That data can
    have non-unicode or Unicode data. Sometimes XML data follows a set guideline and
    has specified data types. In this scenario, the XML data may have a defined XML
    schema. For XML data that has a schema, the XML can be considered typed. Often
    typed XML data will take up less space, and there may be additional functionality
    with the data that is stored. However, a limitation of this typed XML is that
    the XML must pass validation. If untyped XML data is chosen, the data does not
    have to be validated and may not be assigned a schema.


    ## Spatial Geometry Types


    When working with data, you may want to store various shapes in your database.
    While this is not a common request, there is an available data type that can be
    used to store shapes or drawings based on flat maps.


    This data type can support several format instances including points, lines, circular
    lines, curves, polygons, curved polygons, multiple points, multiple strings, multiple
    polygons, and a collection of any or none of these objects.


    ## Spatial Geography Types


    While you may want to save shapes in SQL Server using a flat-earth method, there
    are other times that it is necessary to store information based on the shape of
    the earth. In these cases, using the `geography` data type will be preferable.
    Use this data type for countries, roads, or maps where longitude and latitude
    are important.


    Like the `geometry` data type, the `geography` data type also supports several
    options. These options include all the same types as the `geometry` data type
    including points, lines, circular lines, curves, polygons, curved polygons, multiple
    points, multiple strings, multiple polygons, and a collection of any or none of
    these shapes. However, the `geography` data type also supports the full globe
    instance.


    ## SQL_VARIANT


    There may be an occasion where you will want to store more than one data type
    in a column. While this is generally not best practice, make sure to understand
    how this data type stores information and what kinds of limitations exist for
    this data type.


    The `SQL_VARIANT` data type allows you to store various data types in the same
    column. The data saved in this column has a total maximum length of 8016 bytes.
    However, 16 of those bytes are to store information about the data stored in that
    record. This leaves a total of 8000 bytes available for the actual data saved
    in the column.


    You can insert data directly into the column or cast the data as a specific data
    type. If you do not specify the data type at the time of the insert, `SQL_VARIANT`
    will try to determine the correct data type. This can cause data to be stored
    differently than expected. While `SQL_VARIANT` does seem to choose well with numbers,
    there are cases where dates may be stored as `VARCHAR(8000)` if the data type
    is not specified.


    All data types that can be stored in tables can be used for `SQL_VARIANT` except
    the following:

    *   `VARCHAR(MAX)`

    *   `NVARCHAR(MAX)`

    *   `TEXT`

    *   `IMAGE`

    *   `SQL_VARIANT`

    *   `HIERARCHYID`

    *   `VARBINARY(MAX)`

    *   `XML`

    *   `NTEXT`

    *   `ROWVERSION`

    *   `GEOGRAPHY`

    *   `GEOMETRY`

    *   `DATETIMEOFFSET`

    *   User-defined types


    The way data in a `SQL_VARIANT` columns is ordered also differs from other data
    types. `SQL_VARIANT` groups data into like types called data type families. These
    data type families have their own order, and values with data types in higher
    families will be considered greater than values in lower families. If a data that
    is being compared exists in same family, `SQL_VARIANT` will implicitly convert
    the data type that is lower to the data type that is higher and then complete
    the comparison.


    ## Rowversion


    There are instances where you may want to know when an action happened to a table.
    While there are some methods that can be used to track database changes, there
    is also a specific data type that can be used to record when a record has been
    updated.


    The `ROWVERSION` data type allows you to get a relative idea on when a specific
    record or set of records was updated. This value neither has a date nor time component
    but is a binary value. The `ROWVERSION` can be compared to other `rowversion`
    values or to the current `rowversion` value in the database. I can create a table
    with that has a column named `RowVersion` with the type `ROWVERSION`. Upon inserting
    a record, the `ROWVERSION` column may be updated to have the value `0x00000000000007D1`.
    I can update one of the columns in the same row, and the `ROWVERSION` column may
    be updated to `0x00000000000007D2`. While I can tell a change has happened, I
    cannot determine when the change happened or determine what was changed.


    When storing the `rowversion` value, the total storage space required is 8 bytes.
    You can specify if `ROWVERSION` should be either non-nullable or nullable. If
    the column is not nullable, then the column will act similarly to `BINARY(8)`.
    Otherwise, the column will behave similarly to `VARBINARY(8)`. Only one `ROWVERSION`
    column can be added per table. This column will be updated systematically any
    time one or more rows is inserted or updated.


    ## HIERARCHYID


    Sometimes data is related to the other data in the same column. Oftentimes this
    has to do with data that is a parent or child of other data. This can involve
    locations like countries, states, and cities or product information like manufacture,
    item, and production date.


    For these scenarios, the `HIERARCHYID` may be useful to help categorize how data
    is interrelated. The data type `HIERARCHYID` is limited to 892 bytes. However,
    this data type is a system data type with a variable length. Even though this
    data type is a system data type, the application using this data type is responsible
    for determining the correct hierarchy that should be stored.'
  raw: '### UNIQUEIDENTIFIER


    This data type can be a column in a table or used as a variable. The UNIQUEIDENTIFIER
    takes up 16 bytes and has a maximum number of characters that can be stored in
    this data type is 36\. While non-unicode character strings can be converted to
    UNIQUEIDENTIFIER, if the total number of characters exceeds 36, those results
    will be truncated.


    This data type is a GUID, or Globally Unique Identifier. The concept is that these
    unique values will only ever be used once. However, there have been reports of
    this not being true. Either way, the UNIQUEIDENTIFIER can be populated one of
    several ways. These include using the functions NEWID() and NEWSEQUENTIALID().
    Otherwise, these values can be manually populated if the overall format of the
    GUID is correct and uses valid hexadecimal values of 0–9 and a–f.


    While the UNIQUEIDENTIFIER can be used in place of IDENTITY, I would only recommend
    it for scenarios where it is absolutely required. Not only does it take up significantly
    more space than an INT or BIGINT, but UNIQUEIDENTIFIER is limited in the types
    of constraints that can be used with this data type. UNIQUEIDENTIFER can be an
    IDENTITY but other table constraints are not allowed.


    ### XML


    Various systems and applications send, use, or store XML data. While there is
    the option to parse this data and save it in tables, there are also times where
    it may be necessary to store the XML data intact. When storing XML data, there
    are other considerations that include what data is in the XML.


    For the XML data type, the data must be in a valid XML format. In order to be
    valid, there are several requirements. These include all starting tags must have
    matching end tags. In addition, nested elements must begin and end within the
    same parent element. XML elements cannot have more than one attribute and markup
    characters must be properly specified. If the XML data meets all the preceding
    requirements, then the XML data is considered well-formed.


    The total amount of stored XML data allowed is limited to 2 GB. That data can
    have non-unicode or Unicode data. Sometimes XML data follows a set guideline and
    has specified data types. In this scenario, the XML data may have a defined XML
    schema. For XML data that has a schema, the XML can be considered typed. Often
    typed XML data will take up less space, and there may be additional functionality
    with the data that is stored. However, a limitation of this typed XML is that
    the XML must pass validation. If untyped XML data is chosen, the data does not
    have to be validated and may not be assigned a schema.


    ### Spatial Geometry Types


    When working with data, you may want to store various shapes in your database.
    While this is not a common request, there is an available data type that can be
    used to store shapes or drawings based on flat maps.


    This data type can support several format instances including points, lines, circular
    lines, curves, polygons, curved polygons, multiple points, multiple strings, multiple
    polygons, and a collection of any or none of these objects.


    ### Spatial Geography Types


    While you may want to save shapes in SQL Server using a flat-earth method, there
    are other times that it is necessary to store information based on the shape of
    the earth. In these cases, using the geography data type will be preferable. Use
    this data type for countries, roads, or maps where longitude and latitude are
    important.


    Like the geometry data type, the geography data type also supports several options.
    These options include all the same types as the geometry data type including points,
    lines, circular lines, curves, polygons, curved polygons, multiple points, multiple
    strings, multiple polygons, and a collection of any or none of these shapes. However,
    the geography data type also supports the full globe instance.


    ### SQL_VARIANT


    There may be an occasion where you will want to store more than one data type
    in a column. While this is generally not best practice, make sure to understand
    how this data type stores information and what kinds of limitations exist for
    this data type.


    The SQL_VARIANT data type allows you to store various data types in the same column.
    The data saved in this column has a total maximum length of 8016 bytes. However,
    16 of those bytes are to store information about the data stored in that record.
    This leaves a total of 8000 bytes available for the actual data saved in the column.


    You can insert data directly into the column or cast the data as a specific data
    type. If you do not specify the data type at the time of the insert, SQL_VARIANT
    will try to determine the correct data type. This can cause data to be stored
    differently than expected. While SQL_VARIANT does seem to choose well with numbers,
    there are cases where dates may be stored as VARCHAR(8000) if the data type is
    not specified.


    All data types that can be stored in tables can be used for SQL_VARIANT except
    the following:


    *   VARCHAR(MAX)


    *   NVARCHAR(MAX)


    *   TEXT


    *   IMAGE


    *   SQL_VARIANT


    *   HIERARCHYID


    *   VARBINARY(MAX)


    *   XML


    *   NTEXT


    *   ROWVERSION


    *   GEOGRAPHY


    *   GEOMETRY


    *   DATETIMEOFFSET


    *   User-defined types


    The way data in a SQL_VARIANT columns is ordered also differs from other data
    types. SQL_VARIANT groups data into like types called data type families. These
    data type families have their own order, and values with data types in higher
    families will be considered greater than values in lower families. If a data that
    is being compared exists in same family, SQL_VARIANT will implicitly convert the
    data type that is lower to the data type that is higher and then complete the
    comparison.


    ### Rowversion


    There are instances where you may want to know when an action happened to a table.
    While there are some methods that can be used to track database changes, there
    is also a specific data type that can be used to record when a record has been
    updated.


    The ROWVERSION data type allows you to get a relative idea on when a specific
    record or set of records was updated. This value neither has a date nor time component
    but is a binary value. The ROWVERSION can be compared to other rowversion values
    or to the current rowversion value in the database. I can create a table with
    that has a column named RowVersion with the type ROWVERSION. Upon inserting a
    record, the ROWVERSION column may be updated to have the value 0x00000000000007D1\.
    I can update one of the columns in the same row, and the ROWVERSION column may
    be updated to 0x00000000000007D2\. While I can tell a change has happened, I cannot
    determine when the change happened or determine what was changed.


    When storing the rowversion value, the total storage space required is 8 bytes.
    You can specify if ROWVERSION should be either non-nullable or nullable. If the
    column is not nullable, then the column will act similarly to BINARY(8). Otherwise,
    the column will behave similarly to VARBINARY(8). Only one ROWVERSION column can
    be added per table. This column will be updated systematically any time one or
    more rows is inserted or updated.


    ### HIERARCHYID


    Sometimes data is related to the other data in the same column. Oftentimes this
    has to do with data that is a parent or child of other data. This can involve
    locations like countries, states, and cities or product information like manufacture,
    item, and production date.


    For these scenarios, the HIERARCHYID may be useful to help categorize how data
    is interrelated. The data type HIERARCHYID is limited to 892 bytes. However, this
    data type is a system data type with a variable length. Even though this data
    type is a system data type, the application using this data type is responsible
    for determining the correct hierarchy that should be stored.'
  trans: '

    # SQL Server 特殊数据类型概述


    ## UNIQUEIDENTIFIER


    此数据类型可以作为表中的一列或用作变量。`UNIQUEIDENTIFIER` 占用 16 字节，该数据类型可存储的最大字符数为 36。虽然非 Unicode
    字符串可以转换为 `UNIQUEIDENTIFIER`，但如果字符总数超过 36，结果将被截断。


    此数据类型是 GUID（全局唯一标识符）。其概念是这些唯一值将仅被使用一次。然而，有报告表明情况并非总是如此。无论如何，`UNIQUEIDENTIFIER`
    可以通过以下几种方式之一填充：包括使用函数 `NEWID()` 和 `NEWSEQUENTIALID()`。或者，如果 GUID 的整体格式正确并使用有效的十六进制值
    `0–9` 和 `a–f`，也可以手动填充这些值。


    虽然 `UNIQUEIDENTIFIER` 可以替代 `IDENTITY` 使用，但我只建议在绝对必需的场景下使用。它不仅比 `INT` 或 `BIGINT`
    占用更多空间，而且 `UNIQUEIDENTIFIER` 可与之使用的约束类型也有限制。`UNIQUEIDENTIFIER` 可以是一个 `IDENTITY`，但不允许其他表约束。


    ## XML


    各种系统和应用程序会发送、使用或存储 XML 数据。虽然可以选择解析此数据并将其保存在表中，但有时也可能需要完整地存储 XML 数据。存储 XML 数据时，还需要考虑
    XML 中包含的数据内容。


    对于 `XML` 数据类型，数据必须是有效的 XML 格式。为了有效，需要满足若干要求，包括所有起始标签必须有匹配的结束标签。此外，嵌套元素必须在同一个父元素内开始和结束。XML
    元素不能有多个属性，并且标记字符必须正确指定。如果 XML 数据满足所有前述要求，则认为该 XML 数据是格式良好的。


    允许存储的 XML 数据总量限制为 2 GB。数据可以包含非 Unicode 或 Unicode 数据。有时 XML 数据遵循一套既定指南并有指定的数据类型。在这种情况下，XML
    数据可能有一个定义的 XML 模式。对于有模式的 XML 数据，可被视为类型化的。通常类型化的 XML 数据占用空间更少，并且存储的数据可能具有附加功能。然而，这种类型化
    XML 的一个限制是 XML 必须通过验证。如果选择非类型化 XML 数据，则数据无需验证，也可能不会分配模式。


    ## 空间几何类型


    处理数据时，您可能希望在数据库中存储各种形状。虽然这不是常见请求，但有一种可用的数据类型可用于存储基于平面地图的形状或绘图。


    此数据类型可支持多种格式实例，包括点、线、圆形线、曲线、多边形、曲面多边形、多点、多线、多面，以及这些对象中任意或全部的集合。


    ## 空间地理类型


    虽然您可能希望在 SQL Server 中使用平面地球方法保存形状，但有时有必要根据地球形状存储信息。在这些情况下，使用 `geography` 数据类型将是更可取的。对于国家、道路或经度和纬度重要的地图，请使用此数据类型。


    与 `geometry` 数据类型类似，`geography` 数据类型也支持多种选项。这些选项包括与 `geometry` 数据类型相同的所有类型，例如点、线、圆形线、曲线、多边形、曲面多边形、多点、多线、多面，以及这些形状中任意或全部的集合。然而，`geography`
    数据类型还支持完整的地球实例。


    ## SQL_VARIANT


    有时您可能希望在一列中存储多种数据类型。虽然这通常不是最佳实践，但请确保了解此数据类型如何存储信息以及存在哪些限制。


    `SQL_VARIANT` 数据类型允许您在同一列中存储不同的数据类型。此列中保存的数据总最大长度为 8016 字节。然而，其中的 16 字节用于存储有关该记录中数据的信息。这为实际保存在列中的数据留下了总共
    8000 字节的可用空间。


    您可以直接将数据插入列中，或将数据转换为特定数据类型。如果在插入时未指定数据类型，`SQL_VARIANT` 将尝试确定正确的数据类型。这可能导致数据存储方式与预期不同。虽然
    `SQL_VARIANT` 在处理数字时似乎选择良好，但在某些情况下，如果未指定数据类型，日期可能被存储为 `VARCHAR(8000)`。


    所有可以存储在表中的数据类型都可用于 `SQL_VARIANT`，但以下类型除外：

    *   `VARCHAR(MAX)`

    *   `NVARCHAR(MAX)`

    *   `TEXT`

    *   `IMAGE`

    *   `SQL_VARIANT`

    *   `HIERARCHYID`

    *   `VARBINARY(MAX)`

    *   `XML`

    *   `NTEXT`

    *   `ROWVERSION`

    *   `GEOGRAPHY`

    *   `GEOMETRY`

    *   `DATETIMEOFFSET`

    *   用户定义类型


    `SQL_VARIANT` 列中数据的排序方式也与其他数据类型不同。`SQL_VARIANT` 将数据分组为相似的类型，称为数据类型族。这些数据类型族有自己的顺序，数据类型在较高族中的值将被视为大于较低族中的值。如果正在比较的数据存在于同一族中，`SQL_VARIANT`
    会将较低的数据类型隐式转换为较高的数据类型，然后完成比较。


    ## Rowversion


    有时您可能想知道表中某个操作发生的时间。虽然有一些方法可用于跟踪数据库更改，但也有一种特定的数据类型可用于记录记录何时被更新。


    `ROWVERSION` 数据类型可以让您大致了解特定记录或一组记录何时被更新。此值既没有日期也没有时间组件，而是一个二进制值。`ROWVERSION` 可以与其他
    `rowversion` 值或数据库中当前的 `rowversion` 值进行比较。我可以创建一个包含名为 `RowVersion` 且类型为 `ROWVERSION`
    的列的表。插入记录时，`ROWVERSION` 列可能被更新为值 `0x00000000000007D1`。我可以更新同一行中的某一列，`ROWVERSION`
    列可能被更新为 `0x00000000000007D2`。虽然我可以判断发生了更改，但我无法确定更改发生的时间或具体更改了什么。


    存储 `rowversion` 值时，所需的总存储空间为 8 字节。您可以指定 `ROWVERSION` 为非空或可空。如果该列不可空，则该列的行为类似于
    `BINARY(8)`。否则，该列的行为类似于 `VARBINARY(8)`。每个表只能添加一个 `ROWVERSION` 列。只要插入或更新一行或多行，该列就会被系统自动更新。


    ## HIERARCHYID


    有时，同一列中的数据与其他数据相关。这通常涉及作为其他数据父级或子级的数据。这可以包括位置（如国家、州和城市）或产品信息（如制造商、物品和生产日期）。


    对于这些场景，`HIERARCHYID` 可能有助于对数据的相互关系进行分类。`HIERARCHYID` 数据类型限制为 892 字节。然而，此数据类型是一种具有可变长度的系统数据类型。尽管此数据类型是系统数据类型，但使用此数据类型的应用程序负责确定应存储的正确层次结构。

    '
- fmt: '### Table


    Some data types cannot exist as columns in tables. The `table` data type is one
    of those. When you find yourself wanting to store data for later use, this may
    be a good data type to consider. However, there are some caveats and limitations
    to keep in mind with using tables as a data type.


    Usually, it is preferable to limit the use of table variables to scenarios where
    there will not be a significant amount of data returned. Historically, SQL Server
    has not accurately estimated the total number of rows in a table variable. However,
    starting with SQL Server 2019 the database engine should give a better estimation
    when dealing with table variables going forward.


    While table variables can be used in stored procedures, batches, or functions,
    the table variable only exists for the duration of that object. In the case of
    functions or stored procedures, the table variable no longer exists after the
    function or stored procedure has completed executing. In the case of batches,
    the table will exist for the entirety of the batch. As table variables only persist
    for the entirety of an update, using them may decrease the locks required as part
    of an update.


    Another limitation of tables as data types is that there are no statistics generated
    on the table variable. This also means that using indexes with table variables
    is very limited. As a matter of fact, indexes could not be created on table variables
    until SQL Server 2014. Starting with SQL Server 2014, some indexes can be included
    when creating a table variable.


    ### Cursor


    Another data type that cannot be used as a column in a table is `cursor`. Overall,
    this data type can be very limited, but there are occasions where this is the
    best data type for the task. When considering this data type, it is best to understand
    the potential performance impact associated with using the `cursor` data type.


    The `cursor` data type is usually used as a variable. However, this data type
    can also be used as an output from a stored procedure. In either case, the `cursor`
    data type takes a set of data and interacts with each record row by row. Since
    the `cursor` data type can hold a set of data, it is also possible for this data
    type to have no data. This indicates that the `cursor` data type is nullable.


    Most of the uses for this data type have to do with creating and using a cursor.
    In order to create a cursor, a local variable must be declared as a cursor. Like
    other local variables, it is possible to either declare the cursor and populate
    values or declare the cursor and populate values using a `SET` statement. Other
    functions used to create cursors can be used with this data type. This include
    `OPEN`, `FETCH`, `CLOSE`, `DEALLOCATE`, and `CURSOR_STATUS`. In addition, there
    are system stored procedures that have `cursor` data types.


    # 2. Database Objects


    One of the key factors in understanding the various data types available is knowing
    which data type to use. In some cases, using the correct data type may come down
    to saving space. Other times, using an incorrect data type could lead to significant
    performance issues. You also want to be consistent in how you use and reference
    your data types both in your T-SQL code and database objects. If SQL Server needs
    to compare two different types, SQL Server will need to convert at least one of
    the data types so that both data types are the same. This process is known as
    implicit conversion. The CPU cost associated with implicit conversion can be significant
    and should be avoided if possible. The best way to avoid implicit conversion is
    to use the same data types for fields that will be compared. The biggest challenge
    is that sometimes it takes several years to realize how an incorrect data type
    may be negatively impacting application performance.


    You often need to know more than just the right data types to write T-SQL that
    performs quickly and uses hardware efficiently. Data types will help you determine
    how your data should be stored, but the next step will be to design the process
    to access that data. One of the largest benefits and drawbacks to using T-SQL
    is the number of options available to access data. The expectation is that you
    are already familiar with how to write T-SQL to read, insert, update, or delete
    data.


    In this chapter, I will discuss various methods that can be used to interact with
    your data. There are objects that will allow you to consistently and quickly pull
    information together. You may also want a database object that performs small,
    quick actions and can reuse that code for multiple purposes. Some database objects
    can store information temporarily for reusability either within the same batch
    or connection. Other database objects can perform actions as result of activities
    on the server or database objects. While T-SQL performs best with set-based activities,
    you may also find yourself needing to loop through data one record at a time.


    Depending on your purpose, there can be one or more database objects that meet
    your needs. While each of these database objects has their place, there are pros
    and cons for when and how to use each of these objects. Throughout this chapter,
    I will walk through various scenarios showing both the positive and negative consequences
    of using each of these database objects. First, I will start with discussing views
    in T-SQL.


    ## Views


    What is a view? Like the definition of the word view, a view in T-SQL is a means
    of taking several different items and putting them together to form one cohesive
    image. In this section, I will be discussing some of the options available when
    using views. As with any tool, there are advantages to using views, and there
    are risks associated with views if they are used incorrectly.


    ```sql

    -- Example T-SQL statement from the original text

    if (condVar > someVal) {console.log("xxx")}

    ```'
