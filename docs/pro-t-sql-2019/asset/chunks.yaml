    Once I select OK on the dialog window, I will get another pop-up as shown in Figure
    [11-3](#480547_1_En_11_Chapter.xhtml#Fig3).


    ![../images/480547_1_En_11_Chapter/480547_1_En_11_Fig3_HTML.jpg](images/480547_1_En_11_Chapter/480547_1_En_11_Fig3_HTML.jpg)


    Figure 11-3


