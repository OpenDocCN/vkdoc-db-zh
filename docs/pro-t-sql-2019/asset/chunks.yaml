- fmt: "## Using Parameters\n\nIn addition to using stored procedures to help T-SQL\
    \ code be more reusable, you can also use parameters with your T-SQL code. Parameters\
    \ can be used with ad hoc queries, prepared statements, or stored procedures.\
    \ It is also possible to use parameters as an input or output. Regardless of where\
    \ parameters are used, parameters are what allow you to write queries that can\
    \ be used in a variety of situations.\n\nIn Listing 4-6, you can see that this\
    \ is a stored procedure that will return recipe information based on the `RecipeID`\
    \ that has been provided in the stored procedure.\n\n```sql\n/*-------------------------------------------------------------*\\\
    \nName:             dbo.GetRecipeByRecipeID\nAuthor:           Elizabeth Noble\n\
    Created Date:     April 20, 2019\nDescription: Get recipe information when a recipe\
    \ ID is provided\nSample Usage:\nDECLARE @RecipeID INT;\nSET @RecipeID = 1;\n\
    EXECUTE dbo.GetRecipeByRecipeID @RecipeID\n\\*-------------------------------------------------------------*/\n\
    CREATE PROCEDURE dbo.GetRecipeByRecipeID\n    @RecipeID   INT\nAS\n    SELECT\n\
    \        RecipeID,\n        RecipeName,\n        RecipeDescription,\n        ServingQuantity,\n\
    \        MealTypeID,\n        PreparationTypeID,\n        IsActive,\n        DateCreated,\n\
    \        DateModified\n    FROM dbo.Recipe\n    WHERE RecipeID = @RecipeID;\n\
    ```\n\nListing 4-6\nCreate Stored Procedure with a Parameter\n\nThe preceding\
    \ stored procedure allows you to pass in any `RecipeID` and the stored procedure\
    \ will return a predefined set of recipe information based on that `RecipeID`.\
    \ This also allows the T-SQL code to be called in a much simpler method. Looking\
    \ at Listing 4-7, I have written code to execute the stored procedure passing\
    \ a hard-coded value as part of the execution.\n\n```sql\nEXECUTE dbo.GetRecipeByRecipeID\
    \ 1;\n```\n\nListing 4-7\nExecute Stored Procedure with Hard-Coded Value\n\nWhile\
    \ it is possible to use this method to call the stored procedure, using variables\
    \ would be a much more dynamic way to execute this stored procedure. One such\
    \ method is to declare a variable with a specific data type and then set that\
    \ variable to a specific value. This more closely simulates how an application\
    \ might call a stored procedure. The application code would generally have a variable\
    \ already declared and use the same variable when executing the stored procedure.\
    \ The process of declaring a variable, setting that variable to a value, and executing\
    \ the stored procedure using that variable can be seen in Listing 4-8.\n\n```sql\n\
    DECLARE @RecipeID INT;\nSET @RecipeID = 1\nEXECUTE dbo.GetRecipeByRecipeID @RecipeID;\n\
    ```\n\nListing 4-8\nExecute Stored Procedure with a Variable\n\nTo get a comparison\
    \ of the plan cache for the stored procedure in Listing 4-6 vs. an ad hoc query,\
    \ I will execute the ad hoc query that will use the same overall logic as Listing\
    \ 4-6. However, this value will not be parameterized. In Listing 4-9, you can\
    \ see the query with the hard-coded value for the `RecipeID`.\n\n```sql\nSELECT\n\
    \    RecipeID,\n    RecipeName,\n    RecipeDescription,\n    ServingQuantity,\n\
    \    MealTypeID,\n    PreparationTypeID,\n    IsActive,\n    DateCreated,\n  \
    \  DateModified\nFROM dbo.Recipe\nWHERE RecipeID = 1;\n```\n\nListing 4-9\nRun\
    \ Ad Hoc Query with Hard-Coded Value\n\nAnother method for executing the same\
    \ stored procedure would be to use a query like the one in Listing 4-9 but to\
    \ use a parameter as part of the where clause. This will perform that same overall\
    \ logic as Listings 4-7, 4-8, and 4-9. In Listing 4-10, I have used the same code\
    \ by declaring a variable and parameterized the query overall.\n\n```sql\nDECLARE\
    \ @RecipeID INT;\nSET @RecipeID = 1\nSELECT\n    RecipeID,\n    RecipeName,\n\
    \    RecipeDescription,\n    ServingQuantity,\n    MealTypeID,\n    PreparationTypeID,\n\
    \    IsActive,\n    DateCreated,\n    DateModified\nFROM dbo.Recipe\nWHERE RecipeID\
    \ = @RecipeID;\n```\n\nListing 4-10\nRun Ad Hoc Query with a Parameter\n\nWhile\
    \ all these queries are pulling back the same data, the way SQL Server handles\
    \ these four queries can be surprisingly different. In my test case, I cleared\
    \ the plan cache and then executed the T-SQL code in Listings 4-7, 4-8, 4-9, and\
    \ 4-10. Even though each of these queries is returning the same results, you will\
    \ see in Table 4-3 how SQL Server has calculated or used execution plans for each\
    \ of these queries.\n\nTable 4-3\nComparison of Plan Cache for Variables and Hard-Coded\
    \ Values\n\n| Use Counts | Object Type | Text |\n| --- | --- | --- |\n| 2 | Proc\
    \ | `CREATE PROCEDURE dbo.GetRecipeByRecipeID        @RecipeID   INT  AS     \
    \     SELECT               RecipeID,               RecipeName,               RecipeDescription,\
    \               ServingQuantity,               MealTypeID,               PreparationTypeID,\
    \               IsActive,               DateCreated,               DateModified\
    \        FROM dbo.Recipe        WHERE RecipeID = @RecipeID;` |\n| 1 | Ad hoc |\
    \ `DECLARE @RecipeID INT;    SET @RecipeID = 1    EXECUTE dbo.GetRecipeByRecipeID\
    \ @RecipeID;` |\n| 1 | Ad hoc | `DECLARE @RecipeID INT;    SET @RecipeID = 1 \
    \   SELECT          RecipeID,          RecipeName,          RecipeDescription,\
    \          ServingQuantity,          MealTypeID,          PreparationTypeID, \
    \         IsActive,          DateCreated,          DateModified  FROM dbo.Recipe\
    \  WHERE RecipeID = @RecipeID;` |\n| 1 | Ad hoc | `SELECT          RecipeID, \
    \         RecipeName,          RecipeDescription,          ServingQuantity,  \
    \        MealTypeID,          PreparationTypeID,          IsActive,          DateCreated,\
    \          DateModified  FROM dbo.Recipe  WHERE RecipeID = 1;` |\n| 1 | Prepared\
    \ | `(@1 tinyint)SELECT [RecipeID], [RecipeName], [RecipeDescription], [ServingQuantity],\
    \ [MealTypeID], [PreparationTypeID], [IsActive], [DateCreated], [DateModified]\
    \ FROM [dbo].[Recipe] WHERE [RecipeID]=@1` |\n\nIn Table 4-3, you can see that\
    \ the stored procedure has been executed twice. The `SELECT` statement with the\
    \ hard-coded value and the `SELECT` statement with the parameter value each have\
    \ their own execution plan. This may not have a large impact when you are discussing\
    \ only a handful of queries. However, if your entire environment has a significant\
    \ number of queries that are not stored procedures, you may want to check your\
    \ plan cache to see how they are being handled.\n\nThis is not the only topic\
    \ you need to consider when writing your queries. Another potential option has\
    \ to do with what is commonly referred to as parameter sniffing. Parameter sniffing\
    \ does not sound as dangerous as it can be. The key takeaway when understanding\
    \ what parameter sniffing is and how it affects you is to consider how your data\
    \ is shaped. For many companies, not all data stored in a data table is evenly\
    \ distributed. In Listing 4-11, you can see the stored procedure that I am creating\
    \ to test for parameter sniffing."
  raw: '## Using Parameters


    In addition to using stored procedures to help T-SQL code be more reusable, you
    can also use parameters with your T-SQL code. Parameters can be used with ad hoc
    queries, prepared statements, or stored procedures. It is also possible to use
    parameters as an input or output. Regardless of where parameters are used, parameters
    are what allow you to write queries that can be used in a variety of situations.
    In Listing [4-6](#480547_1_En_4_Chapter.xhtml#PC6), you can see that this is a
    stored procedure that will return recipe information based on the RecipeID that
    has been provided in the stored procedure.


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetRecipeByRecipeID

    Author:           Elizabeth Noble

    Created Date:     April 20, 2019

    Description: Get recipe information when a recipe ID is provided

    Sample Usage:

    DECLARE @RecipeID INT;

    SET @RecipeID = 1;

    EXECUTE dbo.GetRecipeByRecipeID @RecipeID

    \*-------------------------------------------------------------*/

    CREATE PROCEDURE dbo.GetRecipeByRecipeID

    @RecipeID   INT

    AS

    SELECT

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe

    WHERE RecipeID = @RecipeID;

    Listing 4-6

    Create Stored Procedure with a Parameter

    ```


    The preceding stored procedure allows you to pass in any RecipeID and the stored
    procedure will return a predefined set of recipe information based on that RecipeID.
    This also allows the T-SQL code to be called in a much simpler method. Looking
    at Listing [4-7](#480547_1_En_4_Chapter.xhtml#PC7), I have written code to execute
    the stored procedure passing a hard-coded value as part of the execution.


    ```

    EXECUTE dbo.GetRecipeByRecipeID 1;

    Listing 4-7

    Execute Stored Procedure with Hard-Coded Value

    ```


    While it is possible to use this method to call the stored procedure, using variables
    would be a much more dynamic way to execute this stored procedure. One such method
    is to declare a variable with a specific data type and then set that variable
    to a specific value. This more closely simulates how an application might call
    a stored procedure. The application code would generally have a variable already
    declared and use the same variable when executing the stored procedure. The process
    of declaring a variable, setting that variable to a value, and executing the stored
    procedure using that variable can be seen in Listing [4-8](#480547_1_En_4_Chapter.xhtml#PC8).


    ```

    DECLARE @RecipeID INT;

    SET @RecipeID = 1

    EXECUTE dbo.GetRecipeByRecipeID @RecipeID;

    Listing 4-8

    Execute Stored Procedure with a Variable

    ```


    To get a comparison of the plan cache for the stored procedure in Listing [4-6](#480547_1_En_4_Chapter.xhtml#PC6)
    vs. an ad hoc query, I will execute the ad hoc query that will use the same overall
    logic as Listing [4-6](#480547_1_En_4_Chapter.xhtml#PC6). However, this value
    will not be parameterized. In Listing [4-9](#480547_1_En_4_Chapter.xhtml#PC9),
    you can see the query with the hard-coded value for the RecipeID.


    ```

    SELECT

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe

    WHERE RecipeID = 1;

    Listing 4-9

    Run Ad Hoc Query with Hard-Coded Value

    ```


    Another method for executing the same stored procedure would be to use a query
    like the one in Listing [4-9](#480547_1_En_4_Chapter.xhtml#PC9) but to use a parameter
    as part of the where clause. This will perform that same overall logic as Listings
    [4-7](#480547_1_En_4_Chapter.xhtml#PC7), [4-8](#480547_1_En_4_Chapter.xhtml#PC8),
    and [4-9](#480547_1_En_4_Chapter.xhtml#PC9). In Listing [4-10](#480547_1_En_4_Chapter.xhtml#PC10),
    I have used the same code by declaring a variable and parameterized the query
    overall.


    ```

    DECLARE @RecipeID INT;

    SET @RecipeID = 1

    SELECT

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe

    WHERE RecipeID = @RecipeID;

    Listing 4-10

    Run Ad Hoc Query with a Parameter

    ```


    While all these queries are pulling back the same data, the way SQL Server handles
    these four queries can be surprisingly different. In my test case, I cleared the
    plan cache and then executed the T-SQL code in Listings [4-7](#480547_1_En_4_Chapter.xhtml#PC7),
    [4-8](#480547_1_En_4_Chapter.xhtml#PC8), [4-9](#480547_1_En_4_Chapter.xhtml#PC9),
    and [4-10](#480547_1_En_4_Chapter.xhtml#PC10). Even though each of these queries
    is returning the same results, you will see in Table [4-3](#480547_1_En_4_Chapter.xhtml#Tab3)
    how SQL Server has calculated or used execution plans for each of these queries.


    Table 4-3


    Comparison of Plan Cache for Variables and Hard-Coded Values


    | Use Counts | Object Type | Text |

    | --- | --- | --- |

    | 2 | Proc | CREATE PROCEDURE dbo.GetRecipeByRecipeID        @RecipeID   INT  AS          SELECT               RecipeID,               RecipeName,               RecipeDescription,               ServingQuantity,               MealTypeID,               PreparationTypeID,               IsActive,               DateCreated,               DateModified        FROM
    dbo.Recipe        WHERE RecipeID = @RecipeID; |

    | 1 | Ad hoc | DECLARE @RecipeID INT;    SET @RecipeID = 1    EXECUTE dbo.GetRecipeByRecipeID
    @RecipeID; |

    | 1 | Ad hoc | DECLARE @RecipeID INT;    SET @RecipeID = 1    SELECT         RecipeID,         RecipeName,         RecipeDescription,         ServingQuantity,         MealTypeID,         PreparationTypeID,         IsActive,         DateCreated,         DateModified  FROM
    dbo.Recipe  WHERE RecipeID = @RecipeID; |

    | 1 | Ad hoc | SELECT         RecipeID,         RecipeName,         RecipeDescription,         ServingQuantity,         MealTypeID,         PreparationTypeID,         IsActive,         DateCreated,         DateModified  FROM
    dbo.Recipe  WHERE RecipeID = 1; |

    | 1 | Prepared | (@1 tinyint)SELECT [RecipeID], [RecipeName], [RecipeDescription],
    [ServingQuantity], [MealTypeID], [PreparationTypeID], [IsActive], [DateCreated],
    [DateModified] FROM [dbo].[Recipe] WHERE [RecipeID]=@1 |


    In Table [4-3](#480547_1_En_4_Chapter.xhtml#Tab3), you can see that the stored
    procedure has been executed twice. The SELECT statement with the hard-coded value
    and the SELECT statement with the parameter value each have their own execution
    plan. This may not have a large impact when you are discussing only a handful
    of queries. However, if your entire environment has a significant number of queries
    that are not stored procedures, you may want to check your plan cache to see how
    they are being handled.


    This is not the only topic you need to consider when writing your queries. Another
    potential option has to do with what is commonly referred to as parameter sniffing.
    Parameter sniffing does not sound as dangerous as it can be. The key takeaway
    when understanding what parameter sniffing is and how it affects you is to consider
    how your data is shaped. For many companies, not all data stored in a data table
    is evenly distributed. In Listing [4-11](#480547_1_En_4_Chapter.xhtml#PC11), you
    can see the stored procedure that I am creating to test for parameter sniffing.'
  trans: "## 使用参数\n\n除了使用存储过程来帮助 T-SQL 代码实现更高的可重用性外，你还可以在 T-SQL 代码中使用参数。参数可用于即席查询、预处理语句或存储过程。参数也可以用作输入或输出。无论参数在何处使用，它们都使得你能够编写可在多种情况下使用的查询。\n\
    \n在代码清单 4-6 中，你可以看到这是一个存储过程，它将根据提供给存储过程的 `RecipeID` 返回食谱信息。\n\n```sql\n/*-------------------------------------------------------------*\\\
    \nName:             dbo.GetRecipeByRecipeID\nAuthor:           Elizabeth Noble\n\
    Created Date:     April 20, 2019\nDescription: Get recipe information when a recipe\
    \ ID is provided\nSample Usage:\nDECLARE @RecipeID INT;\nSET @RecipeID = 1;\n\
    EXECUTE dbo.GetRecipeByRecipeID @RecipeID\n\\*-------------------------------------------------------------*/\n\
    CREATE PROCEDURE dbo.GetRecipeByRecipeID\n    @RecipeID   INT\nAS\n    SELECT\n\
    \        RecipeID,\n        RecipeName,\n        RecipeDescription,\n        ServingQuantity,\n\
    \        MealTypeID,\n        PreparationTypeID,\n        IsActive,\n        DateCreated,\n\
    \        DateModified\n    FROM dbo.Recipe\n    WHERE RecipeID = @RecipeID;\n\
    ```\n\n**代码清单 4-6**\n创建带有参数的存储过程\n\n前面的存储过程允许你传入任何 `RecipeID`，存储过程将根据该 `RecipeID`\
    \ 返回一组预定义的食谱信息。这也使得 T-SQL 代码能够以一种简单得多的方法被调用。查看代码清单 4-7，我编写了代码来执行存储过程，并将一个硬编码值作为执行的一部分传入。\n\
    \n```sql\nEXECUTE dbo.GetRecipeByRecipeID 1;\n```\n\n**代码清单 4-7**\n使用硬编码值执行存储过程\n\
    \n虽然可以使用此方法来调用存储过程，但使用变量将是执行此存储过程更为动态的方式。其中一种方法是声明一个具有特定数据类型的变量，然后将该变量设置为特定值。这更接近于模拟应用程序可能调用存储过程的方式。应用程序代码通常已经声明了一个变量，并在执行存储过程时使用相同的变量。声明变量、将该变量设置为某个值以及使用该变量执行存储过程的过程可以在代码清单\
    \ 4-8 中看到。\n\n```sql\nDECLARE @RecipeID INT;\nSET @RecipeID = 1\nEXECUTE dbo.GetRecipeByRecipeID\
    \ @RecipeID;\n```\n\n**代码清单 4-8**\n使用变量执行存储过程\n\n为了比较代码清单 4-6 中存储过程的计划缓存与即席查询的计划缓存，我将执行一个即席查询，该查询将使用与代码清单\
    \ 4-6 相同的整体逻辑。但是，此值不会被参数化。在代码清单 4-9 中，你可以看到带有 `RecipeID` 硬编码值的查询。\n\n```sql\n\
    SELECT\n    RecipeID,\n    RecipeName,\n    RecipeDescription,\n    ServingQuantity,\n\
    \    MealTypeID,\n    PreparationTypeID,\n    IsActive,\n    DateCreated,\n  \
    \  DateModified\nFROM dbo.Recipe\nWHERE RecipeID = 1;\n```\n\n**代码清单 4-9**\n运行带有硬编码值的即席查询\n\
    \n执行相同存储过程的另一种方法是使用类似代码清单 4-9 中的查询，但在 WHERE 子句中使用参数。这将执行与代码清单 4-7、4-8 和 4-9 相同的整体逻辑。在代码清单\
    \ 4-10 中，我使用了相同的代码，声明了一个变量并对整个查询进行了参数化。\n\n```sql\nDECLARE @RecipeID INT;\nSET\
    \ @RecipeID = 1\nSELECT\n    RecipeID,\n    RecipeName,\n    RecipeDescription,\n\
    \    ServingQuantity,\n    MealTypeID,\n    PreparationTypeID,\n    IsActive,\n\
    \    DateCreated,\n    DateModified\nFROM dbo.Recipe\nWHERE RecipeID = @RecipeID;\n\
    ```\n\n**代码清单 4-10**\n运行带有参数的即席查询\n\n虽然所有这些查询都返回相同的数据，但 SQL Server 处理这四种查询的方式可能会大不相同。在我的测试案例中，我清除了计划缓存，然后执行了代码清单\
    \ 4-7、4-8、4-9 和 4-10 中的 T-SQL 代码。尽管每个查询返回的结果相同，但你将在表 4-3 中看到 SQL Server 如何为每个查询计算或使用执行计划。\n\
    \n**表 4-3**\n变量与硬编码值的计划缓存比较\n\n| 使用次数 | 对象类型 | 文本 |\n| --- | --- | --- |\n| 2\
    \ | 存储过程 | `CREATE PROCEDURE dbo.GetRecipeByRecipeID        @RecipeID   INT  AS\
    \          SELECT               RecipeID,               RecipeName,          \
    \     RecipeDescription,               ServingQuantity,               MealTypeID,\
    \               PreparationTypeID,               IsActive,               DateCreated,\
    \               DateModified        FROM dbo.Recipe        WHERE RecipeID = @RecipeID;`\
    \ |\n| 1 | 即席 | `DECLARE @RecipeID INT;    SET @RecipeID = 1    EXECUTE dbo.GetRecipeByRecipeID\
    \ @RecipeID;` |\n| 1 | 即席 | `DECLARE @RecipeID INT;    SET @RecipeID = 1    SELECT\
    \          RecipeID,          RecipeName,          RecipeDescription,        \
    \  ServingQuantity,          MealTypeID,          PreparationTypeID,         \
    \ IsActive,          DateCreated,          DateModified  FROM dbo.Recipe  WHERE\
    \ RecipeID = @RecipeID;` |\n| 1 | 即席 | `SELECT          RecipeID,          RecipeName,\
    \          RecipeDescription,          ServingQuantity,          MealTypeID, \
    \         PreparationTypeID,          IsActive,          DateCreated,        \
    \  DateModified  FROM dbo.Recipe  WHERE RecipeID = 1;` |\n| 1 | 预处理 | `(@1 tinyint)SELECT\
    \ [RecipeID], [RecipeName], [RecipeDescription], [ServingQuantity], [MealTypeID],\
    \ [PreparationTypeID], [IsActive], [DateCreated], [DateModified] FROM [dbo].[Recipe]\
    \ WHERE [RecipeID]=@1` |\n\n在表 4-3 中，你可以看到存储过程已执行了两次。带有硬编码值的 `SELECT` 语句和带有参数值的\
    \ `SELECT` 语句各自拥有自己的执行计划。当讨论的只是少数几个查询时，这可能不会有太大影响。然而，如果你的整个环境中存在大量非存储过程的查询，你可能需要检查你的计划缓存，看看它们是如何被处理的。\n\
    \n编写查询时，这不是你需要考虑的唯一主题。另一个可能的选项与通常被称为**参数嗅探**的问题有关。参数嗅听起来可能并不像它实际那么危险。理解参数嗅探是什么以及它如何影响你的关键要点是考虑你的数据是如何分布的。对于许多公司来说，存储在数据表中的数据并非都是均匀分布的。在代码清单\
    \ 4-11 中，你可以看到我为测试参数嗅探而创建的存储过程。"
- fmt: '## 存储过程示例：按用餐类型获取食谱与食材


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetRecipeAndIngredientByMealTypeID

    Author:           Elizabeth Noble

    Created Date:     April 20, 2019

    Description: Get all recipes and their ingredients by meal type

    Sample Usage:

    EXECUTE dbo.GetRecipeAndIngredientByMealTypeID 1

    \*-------------------------------------------------------------*/

    CREATE PROCEDURE dbo.GetRecipeAndIngredientByMealTypeID

    @MealTypeID     INT

    AS

    SELECT

    rec.RecipeName,

    ingr.IngredientName,

    ingr.IsActive,

    ingr.DateCreated,

    ingr.DateModified

    FROM dbo.Recipe rec

    INNER JOIN dbo.RecipeIngredient recingr

    ON rec.RecipeID = recingr.RecipeID

    LEFT OUTER JOIN dbo.Ingredient ingr

    ON recingr.IngredientID = ingr.IngredientID

    WHERE rec.MealTypeID = @MealTypeID

    ORDER BY rec.RecipeName, ingr.IngredientName;

    ```

    *Listing 4-11: 用于按用餐类型查找食谱与食材的存储过程*


    ### 参数嗅探问题


    对于食谱数据，存储在表中的食谱类型数量可能存在显著差异。如果你有数百或数千个早餐食谱，但只有少数晚餐食谱，你可能会遇到参数嗅探（`parameter sniffing`）影响应用程序性能的场景。在我们这个用餐类型的场景中，你可能执行一个存储过程来获取早餐食谱。第一次调用存储过程时，`SQL
    Server`会根据提供的参数生成一个执行计划。该执行计划最终会存储在计划缓存中。


    为了测试参数嗅探，你可能希望使用给定的参数执行存储过程，如代码清单[4-12](#480547_1_En_4_Chapter.xhtml#PC12)所示。


    ```

    EXECUTE dbo.GetRecipeAndIngredientByMealTypeID 3;

    ```

    *Listing 4-12: 使用具有较多记录的参数执行存储过程*


    对于此存储过程执行，我得到了如图[4-2](#480547_1_En_4_Chapter.xhtml#Fig2)所示的执行计划。


    ![../images/480547_1_En_4_Chapter/480547_1_En_4_Fig2_HTML.jpg](images/480547_1_En_4_Chapter/480547_1_En_4_Fig2_HTML.jpg)

    *Figure 4-2: 使用具有较多记录的参数的存储过程执行计划*


    如果你稍后想重新运行存储过程来获取晚餐食谱，`SQL Server`将重用原始的执行计划来检索数据。然而，`SQL Server`最初创建的执行计划在尝试查找用餐类型为晚餐的食谱时，性能可能更差。如果我清除计划缓存并以不同的顺序重新运行存储过程，就可以验证该问题确实与参数嗅探有关。在代码清单[4-13](#480547_1_En_4_Chapter.xhtml#PC13)中，你可以看到在计划缓存被清除后，用于生成新执行计划的`T-SQL`代码。


    ```

    EXECUTE dbo.GetRecipeAndIngredientByMealTypeID 2;

    ```

    *Listing 4-13: 使用具有较少记录的参数执行存储过程*


    当我执行此存储过程时，我发现创建了一个不同的计划缓存。你可以在图[4-3](#480547_1_En_4_Chapter.xhtml#Fig3)中看到创建的另一个执行计划。


    ![../images/480547_1_En_4_Chapter/480547_1_En_4_Fig3_HTML.jpg](images/480547_1_En_4_Chapter/480547_1_En_4_Fig3_HTML.jpg)

    *Figure 4-3: 使用具有较少记录的参数的存储过程执行计划*


    如果我运行与代码清单[4-12](#480547_1_En_4_Chapter.xhtml#PC12)中相同的`T-SQL`，我现在会得到相同的执行计划。这表明此查询遇到了参数嗅探问题。有几种可用选项来处理参数嗅探。理想情况下，你或许可以重新设计查询以使用不同的索引。


    ### 解决方案：条件重编译


    不幸的是，可能并不总是能够以这种方式修改查询。这可能促使你寻找其他选项，例如使用`WITH RECOMPILE`查询提示更新查询。使用此方法的缺点是，每次执行查询时都必须编译它。这在硬件和每次查询执行的时间方面都产生了额外成本。这时你可能需要寻找更好的替代方案。可以针对某些更常见的参数修改查询以使用缓存的计划，而对于所有其他场景则重新编译存储过程。代码清单[4-14](#480547_1_En_4_Chapter.xhtml#PC14)中的存储过程已修改为对某些值使用重编译。


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetRecipeAndIngredientByMealTypeID

    Author:           Elizabeth Noble

    Created Date:     April 20, 2019

    Description: Get all recipes and their ingredients by meal type

    Sample Usage:

    EXECUTE dbo.GetRecipeAndIngredientByMealTypeID 1

    \*-------------------------------------------------------------*/

    CREATE PROCEDURE dbo.GetRecipeAndIngredientByMealTypeID

    @MealTypeID     INT

    AS

    DECLARE @QueryString    NVARCHAR(1000);

    -- Original query to be executed

    SELECT @QueryString = N''

    SELECT

    rec.RecipeName,

    ingr.IngredientName,

    ingr.IsActive,

    ingr.DateCreated,

    ingr.DateModified

    FROM dbo.Recipe rec

    INNER JOIN dbo.RecipeIngredient recingr

    ON rec.RecipeID = recingr.RecipeID

    LEFT OUTER JOIN dbo.Ingredient ingr

    ON recingr.IngredientID = ingr.IngredientID

    WHERE rec.MealTypeID = @MelTypID

    ORDER BY rec.RecipeName, ingr.IngredientName''

    -- If the parameters do not provide a stable execution plan

    ---- Add OPTION(RECOMPILE) to the query

    IF (@MealTypeID  2)

    BEGIN

    SELECT @QueryString = @QueryString + N'' OPTION(RECOMPILE)'';

    END

    -- Execute the query string

    EXECUTE [sp_executesql] @QueryString,

    N''@MelTypID INT'',

    @MelTypID = @MealTypeID;

    GO

    ```

    *Listing 4-14: 条件性使用重编译选项执行存储过程的代码*


    在代码清单4-14中，当提供`MealTypeID`为2时，执行计划被认为是稳定的。当存储过程以`MealTypeID`为2运行时，它将执行`T-SQL`代码而不会生成新的执行计划。但是，如果为`MealTypeID`提供了不同的值，则`SQL
    Server`每次都会生成一个新的执行计划。这种场景在查询的大多数执行时间都接收到`MealTypeID`为2的参数时效果很好。这可以避免`SQL Server`在每次调用存储过程时都生成执行计划。如果每执行十次存储过程，有一两次参数未设置为`MealTypeID`为2，那么`SQL
    Server`将会生成新的执行计划。这种方法可以让你最小化重新编译执行的成本，并将其发生频率限制得更低。虽然`SQL Server`按预期工作，但正是数据的形态导致了性能问题。'
  raw: '```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetRecipeAndIngredientByMealTypeID

    Author:           Elizabeth Noble

    Created Date:     April 20, 2019

    Description: Get all recipes and their ingredients by meal type

    Sample Usage:

    EXECUTE dbo.GetRecipeAndIngredientByMealTypeID 1

    \*-------------------------------------------------------------*/

    CREATE PROCEDURE dbo.GetRecipeAndIngredientByMealTypeID

    @MealTypeID     INT

    AS

    SELECT

    rec.RecipeName,

    ingr.IngredientName,

    ingr.IsActive,

    ingr.DateCreated,

    ingr.DateModified

    FROM dbo.Recipe rec

    INNER JOIN dbo.RecipeIngredient recingr

    ON rec.RecipeID = recingr.RecipeID

    LEFT OUTER JOIN dbo.Ingredient ingr

    ON recingr.IngredientID = ingr.IngredientID

    WHERE rec.MealTypeID = @MealTypeID

    ORDER BY rec.RecipeName, ingr.IngredientName;

    Listing 4-11

    Stored Procedure to Find Recipe and Ingredient by Meal Type

    ```


    In the case of recipes, you may have a significant difference in the quantity
    of the types of recipes that are stored in the tables. If you had hundreds or
    thousands of breakfast recipes but only a handful of dinner recipes, you may find
    yourself in a scenario where parameter sniffing would affect your application
    performance. In our scenario of meal types, you may execute a stored procedure
    wanting breakfast recipes. The first time you call your stored procedure, SQL
    Server will use the parameter provided to generate an execution plan. That execution
    plan will end up stored in the plan cache. To test for parameter sniffing, you
    may want to execute the stored procedure with a given parameter as shown in Listing
    [4-12](#480547_1_En_4_Chapter.xhtml#PC12).


    ```

    EXECUTE dbo.GetRecipeAndIngredientByMealTypeID 3;

    Listing 4-12

    Execute Stored Procedure with a Parameter with Many Records

    ```


    For this stored procedure execution, I get the following execution plan as shown
    in Figure [4-2](#480547_1_En_4_Chapter.xhtml#Fig2).


    ![../images/480547_1_En_4_Chapter/480547_1_En_4_Fig2_HTML.jpg](images/480547_1_En_4_Chapter/480547_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Execution Plan for Stored Procedure with a Parameter That Has Many Records


    If you come back later and want to rerun the stored procedure for dinner recipes,
    SQL Server will reuse the original execution plan to pull back the data. However,
    the first execution plan that SQL Server created may perform worse when trying
    to find recipes with the meal type of dinner. If I were to clear the plan cache
    and rerun the stored procedure in a different order, I can verify that the issue
    is related to parameter sniffing. In Listing [4-13](#480547_1_En_4_Chapter.xhtml#PC13),
    you can see the T-SQL code used to generate a new execution plan now that the
    plan cache has been cleared.


    ```

    EXECUTE dbo.GetRecipeAndIngredientByMealTypeID 2;

    Listing 4-13

    Execute Stored Procedure with a Parameter with Few Records

    ```


    When I execute this stored procedure, I find that a different plan cache is created.
    You can see the other execution plan that is created in Figure [4-3](#480547_1_En_4_Chapter.xhtml#Fig3).


    ![../images/480547_1_En_4_Chapter/480547_1_En_4_Fig3_HTML.jpg](images/480547_1_En_4_Chapter/480547_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Execution Plan for Stored Procedure with a Parameter That Has Many Records


    If I run the same T-SQL from Listing [4-12](#480547_1_En_4_Chapter.xhtml#PC12),
    I now get the same execution plan. This is a sign that this query is encountering
    parameter sniffing. There are several options available to handle parameter sniffing.
    Ideally, you may be able to redesign your query to use different indexes.


    Unfortunately, it may not always be possible to modify the query in this manner.
    This may cause you to look for other options like updating the query using the
    WITH RECOMPILE query hint. The downside of using this method is that the query
    must be compiled each time the query is executed. This incurs both an additional
    cost in terms of hardware and time for each query execution. That is when you
    may want to look for better alternatives. It is possible to modify the query to
    the cached plan for certain parameters which are more common and recompile the
    stored procedure for all other scenarios. The stored procedure in Listing [4-14](#480547_1_En_4_Chapter.xhtml#PC14)
    has been modified to use recompile for some values.


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetRecipeAndIngredientByMealTypeID

    Author:           Elizabeth Noble

    Created Date:     April 20, 2019

    Description: Get all recipes and their ingredients by meal type

    Sample Usage:

    EXECUTE dbo.GetRecipeAndIngredientByMealTypeID 1

    \*-------------------------------------------------------------*/

    CREATE PROCEDURE dbo.GetRecipeAndIngredientByMealTypeID

    @MealTypeID     INT

    AS

    DECLARE @QueryString    NVARCHAR(1000);

    -- Original query to be executed

    SELECT @QueryString = N''

    SELECT

    rec.RecipeName,

    ingr.IngredientName,

    ingr.IsActive,

    ingr.DateCreated,

    ingr.DateModified

    FROM dbo.Recipe rec

    INNER JOIN dbo.RecipeIngredient recingr

    ON rec.RecipeID = recingr.RecipeID

    LEFT OUTER JOIN dbo.Ingredient ingr

    ON recingr.IngredientID = ingr.IngredientID

    WHERE rec.MealTypeID = @MelTypID

    ORDER BY rec.RecipeName, ingr.IngredientName''

    -- If the parameters do not provide a stable execution plan

    ---- Add OPTION(RECOMPILE) to the query

    IF (@MealTypeID  2)

    BEGIN

    SELECT @QueryString = @QueryString + N'' OPTION(RECOMPILE)'';

    END

    -- Execute the query string

    EXECUTE [sp_executesql] @QueryString,

    N''@MelTypID INT'',

    @MelTypID = @MealTypeID;

    GO

    Listing 4-14

    Execute the Stored Procedure

    ```


    In Listing 14-14, the execution plan is considered stable when MealTypeID of 2
    is provided. When the stored procedure is run with a MealTypeID of 2, the stored
    procedure will execute the T-SQL code without generating a new execution plan.
    However, if a different value is provided for the MealTypeID, then SQL Server
    will generate a new execution plan each time. This type of scenario works well
    when most of the time the query is executed; it will receive the parameter of
    MealTypeID of 2\. This keeps SQL Server from generating an execution plan every
    time the stored procedure is called. If one or two times out of every ten times
    the stored procedure is executed and the parameter is not set as MealTypeID of
    2, then SQL Server will generate a new execution plan. This method allows you
    to minimize the cost of recompiling the execution and limiting this to happen
    much less frequently. While SQL Server is working as intended, it is the shape
    of the data that is contributing to the performance issue.'
