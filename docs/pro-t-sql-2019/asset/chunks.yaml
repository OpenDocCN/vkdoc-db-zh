    \ This is the beginning of a journey that will have some hiccups but also save\
    \ you time in the long run. Now that you have implemented source control, you\
    \ are ready for the next steps in managing your T-SQL code. The next chapter will\
    \ focus on the various methods you can use to test your T-SQL code and confirm\
    \ that you are complying with various coding standards.\n\n# 11. Testing\n\nWhen\
    \ you need to write or modify some T-SQL code, you may be tempted to just start\
    \ writing the code. In many cases, the necessary database code is simple enough\
    \ that no additional analysis is needed. Eventually, there always comes a scenario\
    \ where the data being queried or the T-SQL code is complex enough where you want\
    \ to make certain that your code is working as expected. During these times, you\
    \ might find that you want to test your T-SQL changes. While you can start testing\
    \ T-SQL code at any time, you may find it helpful to start the habits early on\
    \ before dealing with complex scenarios.\n\nYou may be ready to start testing\
