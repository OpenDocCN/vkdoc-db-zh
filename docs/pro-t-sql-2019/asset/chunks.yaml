- fmt: 'The creation of this table does not specify that partition scheme of `RecipeHistRange`.
    This table will be a standard table created on the `PRIMARY` filegroup in the
    database.


    Once the underlying tables have been created, we can create a single database
    object that can allow us to access both tables. This will be the same as the partitioned
    view created in the previous section. `Listing 15-22` has the `T-SQL` code needed
    to create a partitioned view.


    ```sql

    CREATE VIEW dbo.vwRecipeHistory

    AS

    -- Select data from current read/write table

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.RecipeHistory

    UNION ALL

    -- Select data from partitioned table

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.RecipeHistoryPartition;

    ```


    **Listing 15-22** Create Partitioned View


    The preceding partitioned view allows us to keep the most recent and highly active
    data in a table without partitions. This table can be specifically indexed to
    allow for the best write speeds. Any other tables included in the partitioned
    view can be indexed based on their usage. The partitioned table included in the
    preceding partitioned view may only include inactive data. As a result, we may
    expect this data to only be read going forward. Knowing this, we can use a different
    strategy to index this table.


    Reviewing what we have already covered, I want to show the behavior of `SQL Server`
    when querying a non-partitioned table. The query in `Listing 15-23` shows a query
    to find all records for a specific date range in the `dbo.RecipeHistory` table.


    ```sql

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    DateCreated

    FROM dbo.RecipeHistory

    WHERE DateCreated BETWEEN ''10/7/18'' AND ''10/9/18'';

    ```


    **Listing 15-23** Access Data Before Partitioning Table and View


    The preceding query will be run on a non-partitioned table. At the time of the
    query execution, this table is ordered by the original primary key which is the
    `RecipeHistoryID`. As a result, the execution plan from the query in `Listing
    15-23` is shown in `Figure 15-16`.


    ![Execution Plan for Unpartitioned Table](images/480547_1_En_15_Chapter/480547_1_En_15_Fig16_HTML.jpg)


    **Figure 15-16** Execution Plan for Unpartitioned Table


    Based on the execution plan in `Figure 15-16`, you can see that `SQL Server` uses
    a `Clustered Index Scan` to find the relevant records. This is because there is
    no index that includes the `DateCreated`. With the table not being partitioned
    by date, `SQL Server` also needs to go through the entire table to find the data
    records that satisfy the query in `Listing 15-23`.


    After running this query, we can review additional information about the operators
    in the execution plan. Specifically, I want to look at the number of logical reads
    and rows returned for this query execution. Looking at `Figure 15-17`, you can
    see the logical reads and number of rows.


    ![Reads Associated with Clustered Index Scan](images/480547_1_En_15_Chapter/480547_1_En_15_Fig17_HTML.jpg)


    **Figure 15-17** Reads Associated with Clustered Index Scan


    We can see that this query returned 33,465 rows with a total number of 5,654 pages
    read as logical reads. We will be comparing these values to the performance associated
    with a partitioned view that contains both a partitioned and non-partitioned table.


    Previously, in `Listing 15-22`, I created a partitioned view that contained a
    partitioned table for all 2018 data records and non-partitioned table for all
    2019 data records. To compare how a partitioned view performs differently than
    a non-partitioned table, I can run the query in `Listing 15-24`.


    ```sql

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    DateCreated

    FROM dbo.vwRecipeHistory

    WHERE DateCreated BETWEEN ''10/7/18'' AND ''10/9/18'';

    ```


    **Listing 15-24** Access Data Using Partitioned Column in Partitioned Table


    The preceding query looks for the same data records as the query from `Listing
    15-23`. However, this query is accessing a partitioned view instead of a non-partitioned
    table. The partitioned view is composed of a partitioned table for all of 2018
    and a non-partitioned table containing data for 2019. In `Figure 15-18`, we can
    see the execution plan generated for this query.


    ![Execution Plan for Partitioned View](images/480547_1_En_15_Chapter/480547_1_En_15_Fig18_HTML.jpg)


    **Figure 15-18** Execution Plan for Partitioned View


    One of the important things to note is that this execution plan uses a `Clustered
    Index Seek` instead of a `Clustered Index Scan`. This lets us know that `SQL Server`
    could determine where to find the relevant data records efficiently and without
    having to go through all or most of the records in the table. Another thing that
    stands out is that the `Clustered Index Seek` is performed on the partitioned
    `dbo.RecipeHistory2018` table. I can also look at the properties associated with
    the `Clustered Index Seek` to get additional information. In `Figure 15-19`, we
    can see the number of logical reads and the number of records returned.


    ![Reads for Query Partitioned View with Clustered Index on Partitioning Key](images/480547_1_En_15_Chapter/480547_1_En_15_Fig19_HTML.jpg)


    **Figure 15-19** Reads for Query Partitioned View with Clustered Index on Partitioning
    Key


    The total number of rows returned is 10,040 with a total number of 54 data pages
    read from memory. The decrease in the number of total data pages read from memory
    indicates that this query is more efficient at finding the relevant data than
    the query in `Listing 15-23`.


    We have seen how querying a partitioned view on a column that references a partitioned
    table performs. The next step is to see how querying a partitioned view works
    when accessing a non-partitioned table. `Listing 15-25` shows a query to access
    data from the non-partitioned table of the partitioned view.


    ```sql

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    DateCreated

    FROM dbo.vwRecipeHistory

    WHERE DateCreated BETWEEN ''5/7/19'' AND ''5/9/19'';

    ```


    **Listing 15-25** Access Data Using Partitioned Column Not in Partitioned Table


    The preceding query is returning the same columns as the queries from `Listing
    15-23` and `Listing 15-24`. The criteria in the `WHERE` clause is accessing data
    from 2019 instead of 2018. To see how this change in dates affects the execution
    plan generated, we can see the difference in `Figure 15-20`.


    ![Execution Plan for Partitioned View Not on Partitioned Table](images/480547_1_En_15_Chapter/480547_1_En_15_Fig20_HTML.jpg)


    **Figure 15-20** Execution Plan for Partitioned View Not on Partitioned Table


    Similarly, in `Figure 15-20`, the preceding execution plan will use a `Clustered
    Index Seek` on the `dbo.RecipeHistory` table. While the execution plans between
    the partitioned and non-partitioned tables are similar, how much data is retrieved
    from `SQL Server` can vary between the two execution plans. Looking at `Figure
    15-21` can show us how much data is accessed for the query in `Listing 15-25`.


    ![Reads for Query Partitioned View on Non-partitioned Table](images/480547_1_En_15_Chapter/480547_1_En_15_Fig21_HTML.jpg)


    **Figure 15-21** Reads for Query Partitioned View on Non-partitioned Table'
