  trans: '

    #### 持久化临时表


    处理临时表时，您可能希望创建一个永久存在于 `tempdb` 数据库中的表。需要注意的一点是，如果您计划创建一个永久存在的临时表，在 SQL Server
    重启的情况下，数据将不会被保存。您可以通过使用与在用户数据库中创建表类似的 T-SQL 来创建持久化临时表。此数据库代码的示例见代码清单 2-29。


    ```sql

    USE tempdb;

    GO

    CREATE TABLE AvailableMeal

    (

    MealTypeName VARCHAR(25),

    RecipeName VARCHAR(25),

    ServingQuantity TINYINT,

    IngredientName VARCHAR(25)

    );

    ```

    代码清单 2-29：创建持久化临时表


    您可以使用代码清单 2-29 中的 T-SQL 代码来创建持久化表，但我推荐一种更符合 `tempdb` 使用习惯的方法。您可以创建一个在 SQL Server
    启动时执行的存储过程。然后，此存储过程将创建您可能需要的任何全局临时表。您可以使用代码清单 2-30 中的 T-SQL 来创建用于生成全局临时表的存储过程。


    ```sql

    CREATE PROCEDURE dbo.CreatePersistentTable

    AS

    CREATE TABLE ##AvailableMeal

    (

    MealTypeName VARCHAR(25),

    RecipeName VARCHAR(25),

    ServingQuantity TINYINT,

    IngredientName VARCHAR(25)

    );

    GO

    ```

    代码清单 2-30：为全局临时表创建存储过程


    创建代码清单 2-30 中的存储过程后，您需要修改存储过程选项，以便在 SQL Server 重启时执行该存储过程。代码清单 2-31 中的 T-SQL 将允许您修改存储过程以在启动时执行。


    ```sql

    EXEC sp_procoption ''CreatePersistentTable'', ''startup'', ''true''

    ```

    代码清单 2-31：更新存储过程以在启动时执行


    如果您发现自己处于考虑使用持久化临时表的情况，请考虑您的环境，以及在维护和知识共享方面可能增加的潜在困难，以便让每个人都知道可能有一个关键任务表存在于 `tempdb`
    数据库中。


    ### 表变量


    在某些情况下，您希望在本地存储数据，但您知道将存储的记录数量有限。如果您不需要其他连接可用该数据，并且可以接受数据仅存在于批处理内部，那么您可以尝试使用表变量。在使用表变量时，如果您愿意将所有内容保持在同一个批处理中，您还可以选择多次重用该表变量。


    在 SQL Server 2019 之前，表变量的估计行数是一条记录。与本章前面讨论的其他对象类似，SQL Server 在改进表变量相关的一般性能方面取得了重大进展。SQL
    Server 现在能够在使用表变量时生成更准确的行数估计。既然 SQL Server 对行数的估计更准确，它也将该逻辑保存在执行计划中。


    如果您发现自己处于表变量返回的数据可能高度偏斜的情况，您可能会发现 T-SQL 代码的性能表现不稳定。现在关于表变量的信息被存储在执行计划中，遇到参数嗅探的概率更高。虽然这可能很麻烦，但请记住，SQL
    Server 也会生成一个至少对某些数据值来说非常高效的执行计划。


    与临时表类似，表变量的创建和使用可能很直接。代码清单 2-32 展示了声明和填充表变量的方法。


    ```sql

    DECLARE @TempAvailableMeal TABLE

    (

    MealTypeName VARCHAR(25),

    RecipeName VARCHAR(25),

    ServingQuantity TINYINT,

    IngredientName VARCHAR(25)

    )

    INSERT INTO @TempAvailableMeal (MealTypeName, RecipeName, ServingQuantity, IngredientName)

    SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    ```

    代码清单 2-32：声明和填充表变量


    此查询的执行计划看起来与填充本地临时表时生成的图 2-16 中的执行计划非常相似。图 2-19 显示了填充表变量时创建的执行计划。


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig19_HTML.jpg](img/480547_1_En_2_Fig19_HTML.jpg)


    图 2-19：填充表变量


    既然 SQL Server 2019 已经更新，允许在使用表变量时进行更好的估计，我预计执行计划会经常匹配。但是，如果您计划向表变量添加大量数据，我会仔细检查查询性能。


    ### 临时存储过程


    如果在 `tempdb` 数据库中创建了存储过程，则该存储过程是临时存储过程。SQL Server 可能使此功能成为可能，但请记住开发人员和应用程序将如何与此数据库对象交互。至少，在
    `tempdb` 数据库中有一个临时存储过程会使与这些存储过程相关的代码更难以进行故障排除或维护。


    ## 触发器


    SQL Server 提供了在发生某些其他活动时执行特定操作的能力。这些反应可能发生在用户登录系统时。还有其他反应可能在现有数据库更改之后发生或阻止更改。在处理应用程序和数据时，最常见的反应类型是响应数据库中数据的更改。无论原因如何，这些反应都被定义为触发器。触发器是一种特殊类型的存储过程，它响应对服务器、数据库或表执行的特定操作。


    ### 登录触发器


    当用户登录到服务器时，您可能希望记录该特定活动。或者在其他情况下，您可能希望在登录时限制用户活动，或由于服务器登录而实现额外的安全功能。登录触发器使您能够允许
    SQL Server 启动反应以响应某些或所有登录到服务器的行为。


    在应用程序开发中，需要登录触发器的场景并不多。但是，登录触发器可以完成一些有助于保护应用程序的事情。登录触发器可以限制登录允许的连接数。在发生违规的情况下，这可以确保数据库不会被过多的连接淹没。相反，限制每个登录允许的连接数量也会限制可扩展性和未来的适应性。今天可接受的连接数量可能远低于未来所需的登录次数。

    '
- fmt: '### Data Definition Language (DDL) Triggers


    When applications or users change the overall database schema, they are using
    data definition language. In the case of SQL Server, it is possible to react to
    specific scenarios resulting from changes to the database. While I do not expect
    this to be a standard part of application development, it may be helpful to be
    aware of this type of trigger.


    If you are concerned about SQL injection causing issues on your server, data definition
    language triggers can help mitigate the damage. There are options to prevent all
    sorts of database objects from being dropped. In addition, it is possible to log
    or record when database objects are created or altered. While you may want to
    use triggers to set up all sorts of triggers to monitor every activity on the
    server and the databases, there can be better options available. There are other
    alternatives available for tracking this type of behavior. This includes SQL Server
    Audit for both server and database activity. Typically, applications are not concerned
    with logging changes to the server or database schemas.


    ### Data Manipulation Language (DML) Triggers


    If you find yourself needing to implement auditing or logging as a part of your
    application development, you may find using data manipulation triggers quite helpful.
    These triggers have several options and respond to a variety of actions based
    on changes to the actual data in the database. In some cases, you may just want
    to record when the change happened and what changed. In other instances, it may
    be more important to change or verify the functionality of the request.


    One method for triggers is to have an action performed after something happens.
    In this case, I want to successfully modify a record in the `dbo.IngredientCost`
    table, but I also want to keep a history of that item’s cost changes over time.
    Listing 2-33 shows some T-SQL that will add an entry to a history table after
    a change is made.


    ```sql

    CREATE TRIGGER dbo.LogIngredientCostHistory

    ON dbo.IngredientCost

    AFTER INSERT, UPDATE

    AS

    IF (ROWCOUNT_BIG() = 0)

    RETURN;

    INSERT INTO dbo.IngredientCostHistory (IngredientCostID, Cost, DateCreated)

    SELECT inserted.IngredientCostID, inserted.Cost, GETDATE()

    FROM inserted;

    GO

    ```

    Listing 2-33: Create After Insert DML Trigger


    When a record is inserted or updated in the `dbo.IngredientCost` table, the new
    cost and the date the cost was changed will be recorded in the `dbo.IngredientCostHistory`
    table. To see the performance of this trigger, I test this trigger by running
    the code in Listing 2-34.


    ```sql

    INSERT INTO dbo.IngredientCost (IngredientID, ServingPortionID, Cost, IsActive,
    DateCreated, DateModified)

    VALUES (1, 1, 5.98, 1, GETDATE(), GETDATE())

    ```

    Listing 2-34: Query to Insert Record into `IngredientCost`


    When executing the preceding code, the execution plan includes two steps. The
    first is to run the code to insert the record into `dbo.IngredientCost`. The second
    execution plan shows the plan for the insert that occurs due to the trigger. The
    execution plans generated from Listing 2-34 are in Figure 2-20.


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig20_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig20_HTML.jpg)

    Figure 2-20: Execution Plan to Insert Record with Trigger


    The execution plan in Figure 2-20 shows what happens when there is a record that
    is modified in a way to fire the trigger. However, the T-SQL code `IF (ROWCOUNT_BIG()
    = 0) RETURN;` from Listing 2-31 prevents the DML trigger from firing if no records
    were updated. This is considered best practice to minimize resource utilization
    on the server when no actions are needed. Listing 2-35 shows an update query where
    there will not be any records to be updated.


    ```sql

    UPDATE dbo.IngredientCost

    SET Cost = 10.00

    WHERE IngredientID  IngredientID

    ```

    Listing 2-35: Update Statement that Will Not Update Any Records


    As you can see in Figure 2-21, the execution plan only has one step. That is the
    execution plan for the update. There is no T-SQL code execution from the trigger.


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig21_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig21_HTML.jpg)

    Figure 2-21: Execution Plan Where No Records Are Updated


    As you can see, SQL Server was aware that there were no records to update returned
    from the trigger. Without attempting to insert any records into the `dbo.IngredientCostHistory`
    table, the only action was to generate an execution plan for the update. Having
    a trigger execute after an activity is not the only option for data manipulation
    triggers. There is also the possibility of having a trigger perform an action
    instead of the original action that was requested. Listing 2-36 shows a trigger
    that will disable a record when a user issues a delete.


    ```sql

    CREATE TRIGGER dbo.DisableMealType

    ON dbo.MealType

    INSTEAD OF DELETE

    AS

    IF (ROWCOUNT_BIG() = 0)

    RETURN;

    UPDATE meal

    SET IsActive = 0

    FROM dbo.MealType meal

    INNER JOIN deleted del

    ON meal.MealTypeID = del.MealTypeID;

    GO

    ```

    Listing 2-36: `INSTEAD OF` Trigger


    As you can see, there is more than one option available when using DML triggers
    in SQL Server. There is also the possibility of having multiple triggers per database
    object. You can have up to one `INSTEAD OF` trigger per `INSERT`, `UPDATE`, and
    `DELETE`. You can have multiple `AFTER` triggers on the same table or view as
    well. Due to the number of triggers allowed, you can also specify which trigger
    should be run first and last per `INSERT`, `UPDATE`, or `DELETE`. If you have
    more than one type of `AFTER` trigger per action type, any of the triggers will
    be run in a random order.


    Since there can be so many layers of triggers on a given database object, testing
    the functionality of these triggers is important. Like many other concepts discussed
    in this chapter, understanding how triggers will perform under load helps prepare
    for how the application will perform.'
  raw: '### Data Definition Language (DDL) Triggers


    When applications or users change the overall database schema, they are using
    data definition language. In the case of SQL Server, it is possible to react to
    specific scenarios resulting from changes to the database. While I do not expect
    this to be a standard part of application development, it may be helpful to be
    aware of this type of trigger.


    If you are concerned about SQL injection causing issues on your server, data definition
    language triggers can help mitigate the damage. There are options to prevent all
    sorts of database objects from being dropped. In addition, it is possible to log
    or record when database objects are created or altered. While you may want to
    use triggers to set up all sorts of triggers to monitor every activity on the
    server and the databases, there can be better options available. There are other
    alternatives available for tracking this type of behavior. This includes SQL Server
    Audit for both server and database activity. Typically, applications are not concerned
    with logging changes to the server or database schemas.


    ### Data Manipulation Language (DML) Triggers


    If you find yourself needing to implement auditing or logging as a part of your
    application development, you may find using data manipulation triggers quite helpful.
    These triggers have several options and respond to a variety of actions based
    on changes to the actual data in the database. In some cases, you may just want
    to record when the change happened and what changed. In other instances, it may
    be more important to change or verify the functionality of the request.


    One method for triggers is to have an action performed after something happens.
    In this case, I want to successfully modify a record in the dbo.IngredientCost
    table, but I also want to keep a history of that item’s cost changes over time.
    Listing [2-33](#480547_1_En_2_Chapter.xhtml#PC33) shows some T-SQL that will add
    an entry to a history table after a change is made.


    ```

    CREATE TRIGGER dbo.LogIngredientCostHistory

    ON dbo.IngredientCost

    AFTER INSERT, UPDATE

    AS

    IF (ROWCOUNT_BIG() = 0)

    RETURN;

    INSERT INTO dbo.IngredientCostHistory (IngredientCostID, Cost, DateCreated)

    SELECT inserted.IngredientCostID, inserted.Cost, GETDATE()

    FROM inserted;

    GO

    Listing 2-33

    Create After Insert DML Trigger

    ```


    When a record is inserted or updated in the dbo.IngredientCost table, the new
    cost and the date the cost was changed will be recorded in the dbo.IngredientCostHistory
    table. To see the performance of this trigger, I test this trigger by running
    the code in Listing [2-34](#480547_1_En_2_Chapter.xhtml#PC34).


    ```

    INSERT INTO dbo.IngredientCost (IngredientID, ServingPortionID, Cost, IsActive,
    DateCreated, DateModified)

    VALUES (1, 1, 5.98, 1, GETDATE(), GETDATE())

    Listing 2-34

    Query to Insert Record into IngredientCost

    ```


    When executing the preceding code, the execution plan includes two steps. The
    first is to run the code to insert the record into dbo.IngredientCost. The second
    execution plan shows the plan for the insert that occurs due to the trigger. The
    execution plans generated from Listing [2-34](#480547_1_En_2_Chapter.xhtml#PC34)
    are in Figure [2-20](#480547_1_En_2_Chapter.xhtml#Fig20).


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig20_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig20_HTML.jpg)


    Figure 2-20


    Execution Plan to Insert Record with Trigger


    The execution plan in Figure [2-20](#480547_1_En_2_Chapter.xhtml#Fig20) shows
    what happens when there is a record that is modified in a way to fire the trigger.
    However, the T-SQL code `IF (ROWCOUNT_BIG() = 0) RETURN;` from Listing [2-31](#480547_1_En_2_Chapter.xhtml#PC31)
    prevents the DML trigger from firing if no records were updated. This is considered
    best practice to minimize resource utilization on the server when no actions are
    needed. Listing [2-35](#480547_1_En_2_Chapter.xhtml#PC35) shows an update query
    where there will not be any records to be updated.


    ```

    UPDATE dbo.IngredientCost

    SET Cost = 10.00

    WHERE IngredientID  IngredientID

    Listing 2-35

    Update Statement that Will Not Update Any Records

    ```


    As you can see in Figure [2-21](#480547_1_En_2_Chapter.xhtml#Fig21), the execution
    plan only has one step. That is the execution plan for the update. There is no
    T-SQL code execution from the trigger.


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig21_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig21_HTML.jpg)


    Figure 2-21


    Execution Plan Where No Records Are Updated


    As you can see, SQL Server was aware that there were no records to update returned
    from the trigger. Without attempting to insert any records into the dbo.IngredientCostHistory
    table, the only action was to generate an execution plan for the update. Having
    a trigger execute after an activity is not the only option for data manipulation
    triggers. There is also the possibility of having a trigger perform an action
    instead of the original action that was requested. Listing [2-36](#480547_1_En_2_Chapter.xhtml#PC36)
    shows a trigger that will disable a record when a user issues a delete.


    ```

    CREATE TRIGGER dbo.DisableMealType

    ON dbo.MealType

    INSTEAD OF DELETE

    AS

    IF (ROWCOUNT_BIG() = 0)

    RETURN;

    UPDATE meal

    SET IsActive = 0

    FROM dbo.MealType meal

    INNER JOIN deleted del

    ON meal.MealTypeID = del.MealTypeID;

    GO

    Listing 2-36

    Instead of Trigger

    ```


    As you can see, there is more than one option available when using DML triggers
    in SQL Server. There is also the possibility of having multiple triggers per database
    object. You can have up to one INSTEAD OF trigger per INSERT, UPDATE, and DELETE.
    You can have multiple AFTER triggers on the same table or view as well. Due to
    the number of triggers allowed, you can also specify which trigger should be run
    first and last per INSERT, UPDATE, or DELETE. If you have more than one type of
    AFTER trigger per action type, any of the triggers will be run in a random order.


