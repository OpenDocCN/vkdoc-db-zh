- fmt: 'If you have confirmed that you are dealing with the minimal amount of data
    that you want to interact with, there may be nothing you can do to decrease the
    storage cost associated with your `T-SQL` queries. In some cases, just like with
    memory finding large storage usage may point to other issues. These issues can
    include things like how the data is saved on disk; it can also include how the
    indexes are designed.


    In some cases, you may find that frequent index updates are causing a significant
    amount of storage cost. This may be due to indexes constantly needing to reorganize
    based on how the index is designed. There are also cases involving page splits
    where you may see a significant storage cost associated with this activity. The
    way that your tables are ordered or your indexes are designed may cause a significant
    amount of page splits. You may see an increase in storage costs associated with
    this activity as well.


    For additional information regarding how storage costs work, it may help to understand
    how the `SQL Server` storage engine operates. When dealing with `T-SQL` queries,
    there is one aspect that depends on the storage engine more frequently. This has
    to do with accessing data that is currently not in the buffer pool.


    The storage engine has several different functions. These functions involve accessing
    data that is not in the buffer pool. Another function of the storage engine has
    to do with how data is handled when locks are required. The third function of
    the storage engine involves commands that are not related to running `T-SQL` that
    is used by applications.


    The storage engine can experience performance bottlenecks when accessing data.
    These bottlenecks can in turn cause performance issues when it comes to accessing
    the data that is stored. One example is when queries are accessing rows in data
    tables or interacting with indexes. At other times, the storage engine may need
    to handle page allocations related to retrieving data for the buffer pool. If
    your company has decided to implement row versioning, there may also be a possibility
    that this could cause performance issues with storage. While this is outside the
    scope of this book, if you are using row versioning and you experience issues
    related to storage performance, you may want to do some additional research to
    confirm that row versioning is not the cause.


    When accessing data rows or indexes, `SQL Server` will utilize the storage engine.
    The data being accessed may be stored in the buffer pool. It is up to the storage
    engine to keep track of where these rows live in the `B-tree`. The same process
    happens with regard to managing, adding, updating, or removing entries from indexes
    within `SQL Server`. This is collectively called row and index operations maintenance
    within the storage engine.


    `SQL Server` uses indexes to organize data and allow data to be retrieved easily
    and quickly. When it comes to tables that are larger than a couple of data pages,
    `SQL Server` tries to use indexes to help traverse the various data pages and
    find the data it needs quickly. However, there can be scenarios where the necessary
    indexes do not exist. This causes `SQL Server` to have to read more data pages,
    sometimes all the data in a table, to determine which rows are needed in order
    to satisfy the query requirements.


    When writing queries to access data, `SQL Server` keeps track of the data that
    needs to be accessed by referring to that data as reads. If the data is available
    in memory, the act of accessing that data is referred to as a logical read. There
    are also times that accessing data may require `SQL Server` to go to disk or storage
    to access the data pages. If the data is accessed from disk, the data is referred
    to as physical reads. If the pages are moved to the buffer pool, then that action
    is referred to as read-ahead read. In either case, `SQL Server` will need to go
    to disk to access the requested records. When you write a query and it needs to
    retrieve records that do not exist in the buffer pool, `SQL Server` will need
    to access those records on disk. This can be a very normal process for `SQL Server`.
    However, in cases where the query requires more records to be read than are needed
    for the query results, this can cause more activity on disk than is required.
    One way to monitor the amount of time spent retrieving data from disk is with
    latch waits. This is the amount of time that `SQL Server` spends accessing data
    that does not exist in the buffer pool.


    In addition to `SQL Server` managing data access within the storage engine, the
    storage engine also manages activities relating to locking data. This type of
    activity can be affected by the concurrency method configured on the server, application,
    or transaction. In many cases, the concurrency level configuration is usually
    managed by a different team than the people that are responsible for writing the
    `T-SQL` code. The storage engine is also responsible for handling how locks are
    handled in `SQL Server`.


    Additional factors that can contribute to performance issues related to storage
    have to do with other areas of query design that may interact with the hard drive,
    for instance, database actions that require a large amount of activity to get
    recorded to the transaction. This can include inserting, updating, or deleting
    a large quantity of data. `SQL Server` is designed to handle recording these changes
    to the transaction log promptly. However, these modifications will need to be
    recorded to disk as well. Depending on fragmentation or other processes utilizing
    the hard disk, this may cause additional performance issues.


    `Tempdb` is another part of `SQL Server` that can have a noticeable amount of
    overhead related to storage. There may be queries that are causing quite a bit
    of activity to happen within `tempdb`. In many cases, the effects to the rest
    of the system can be mitigated by putting `tempdb` on a separate drive. In those
    causes, any storage overhead on `tempdb` should only affect other queries also
    relying on `tempdb`.


    Writing `T-SQL` queries is fundamentally linked to how `SQL Server` interacts
    with data that has been stored. There are some aspects of this interaction that
    can be controlled like making sure that you are accessing the least amount of
    data as possible. There are other factors such as how `SQL Server` accesses data
    or manages locking that may be outside of your control. Either way, it is important
    to be aware of how all these pieces come together and may affect your query performance.'
