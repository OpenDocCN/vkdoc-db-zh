  trans: '

    # 9. 编码标准


    在本书前面的第 3 章中，我讨论了标准化你的 `T-SQL` 可以采取的各种步骤。这包括在格式化 `T-SQL` 代码、命名数据库对象以及为 `T-SQL`
    代码添加注释时保持一致性。虽然制定在编写、命名和文档化 `T-SQL` 时允许保持一致性的标准很重要，但要创建一个全面的 `T-SQL` 编码标准，还有更多工作要做。


    在本章中，我将讨论实施编码标准的各种优势。我还将介绍在定义编码标准时应该考虑哪些类型的因素。在制定编码标准时，你还需要决定如何实施这些标准。我将涵盖制定这些编码标准所需的基本流程。


    ## 为何使用编码标准


    你可以做许多不同的事情来提高代码质量。在提高代码质量时，你需要思考最终目标。我希望我的 `T-SQL` 代码能够高效运行、便于快速调试且易于理解。这通常是你在设计和编写
    `T-SQL` 代码时创建一致性的结果。其中一个选择就是实施编码标准。


    通常，有一些特定的 `T-SQL` 实践，你希望人们去遵循。其中一些行为很容易达成共识，并且大多数人默认就会使用。然而，也可能存在其他一些 `T-SQL`
    最佳实践，你知道它们在普遍情况下或在你的组织中并不常见。你希望创建一套指导方针，让每个人都能轻松知道他们应该怎么做。


    在 `T-SQL` 中，也有一些东西，你知道无论如何都不希望在 `T-SQL` 代码中看到。同样，其中一些主题并不常见，但另一些可能非常普遍。无论哪种情况，你都希望将这些明确地定义为编码标准的一部分。使用编码标准可以最大程度地减少关于允许哪些类型的
    `T-SQL` 代码或哪种代码更可取而产生的反复争论。


    你可以使用编码标准来设定允许和不允许的界限。我遇到过这样的情况：软件工程师或数据库开发人员希望使用特定的 `T-SQL` 写法，因为它更易读易写。然而，有些时候，对人类来说容易理解的
    `T-SQL` 代码在 `SQL Server` 中的性能表现却不尽如人意。虽然我希望这些人能够来询问我关于当前流程的问题，但有时我会有太多更高优先级的请求，而没有时间解决他们的顾虑。


    最好能在需要标准之前就让这些指导方针得到认同。这也应该能提供一些保证，表明每个主题都经过了讨论，并且多方已经达成共识，认为某些 `T-SQL` 代码在许多场景下性能良好，或者存在引发性能问题的高风险。


    我知道当我开始工作时，我的一天已经排满了。不仅来自我知道需要做的事情，还来自最后一刻的请求和零散的问题。实施编码标准的真正目标是让你的生活更轻松。这包括能够安心，知道你的数据库中运行着高质量的
    `T-SQL` 代码。理想情况下，你应该能够将那些时间用于未来的数据库设计改进或消除技术债务。


    影响我们生活的另一个因素是决策疲劳。这是一个概念，指的是一个人在一天中不得不做出一个又一个决定而感到疲惫不堪。随着技术的出现，我们每天都会经历这种疲劳。当涉及到关于
    `T-SQL` 编码的决策时，这种决策疲劳可能更加令人不堪重负。在 `SQL Server` 中，有很多方法可以实现相同的功能。实施 `T-SQL` 编码标准的另一个优势是，它可以最大限度地减少数据库开发人员在编写新代码时需要做出的决策。


    当你首次实施编码标准时，确保获得所有相关方的认可。在许多情况下，你可能无法达成一致同意。如果可以的话，为你希望包含在编码标准中的任何变更争取多数票。另一种方法是确保在标准被批准和实施之前，每个人都同意最终的标准。


    `T-SQL` 在工作场所面临的主要挑战之一是，许多负责编写 `T-SQL` 的人并非数据库专家。这不仅会导致挫败感，还可能导致查询性能不佳。`T-SQL`
    最好也是最难的方面之一，就是编写第一个查询是多么容易。`SQL` 是 `结构化查询语言` 的缩写，编写简单查询就是如此简单。你几乎可以像读句子一样阅读它们。


    然而，这可能会造成一种错误的印象，认为 `SQL Server` 后台发生的事情同样简单。我们大多数人在高压力、快节奏的环境中工作。这通常意味着我们没有时间停下来解释我们做出的每一个决定。这可能包括为什么应该或不应该使用某些
    `T-SQL` 代码。这正是 `T-SQL` 编码标准真正发挥优势的地方。它允许你进行一次对话来设定基本规则。一旦这些规则或标准到位，`T-SQL` 开发人员和工程师就可以按照他们想要的任何方式编写代码，只要它符合预定义的标准。


    我听软件开发人员说过，在编写应用程序时定义编码标准非常有帮助。这使他们能够轻松地接手任何代码，无论是否是他们自己写的，并立即感到适应。这是因为虽然他们可能知道从未看过这组代码，但他们的大脑已经从中看到了与他们编写过的其他代码的相似之处。这消除了那种“眼前的代码不是我的”瞬间反应。好处是，他们可以立即着手审查代码或进行必要的修改。


    既然你已经确定要定义编码标准，下一步就是实施这些标准。事情可能就会变得棘手。你可能会希望每一个经过脚本审查的存储过程都遵守这些标准。然而，你会看到的一些代码已经投入生产环境了。我发现有些时候，特别是当其他人面临严格的截止日期时，仅仅因为存储过程不符合编码标准而被拒绝，会让人特别沮丧。


    一个可能的折中方案是给予有条件的批准，并请求创建一个新的用户故事，以便 `T-SQL` 代码可以更新以符合新的编码标准。这可以让开发人员放心，他们能够满足当前冲刺的截止日期，同时也让你知道这段
    `T-SQL` 代码应该在未来的版本中进行修正以满足编码标准。


    处理这些新用户故事的一个简单方法是将它们添加到下一个冲刺中。这允许它们在你仍然记得需要更改的内容时得到清理。这也确保了其他进行脚本审查的人员知道，让所有 `T-SQL`
    代码符合编码标准对各方都很重要。


    ## 编码标准应包含什么


    理想情况下，制定编码标准将为你提供一个框架，最大限度地减少你在审查和部署 `T-SQL` 代码时遇到的整体挑战。你希望编码标准涵盖 `T-SQL` 代码应该如何呈现（外观）、`T-SQL`
    代码应该如何运作（功能）、`T-SQL` 代码应该如何表现（性能）以及 `T-SQL` 代码应该如何被理解（可读性）。


    编码标准的一些基础知识已经在第 3 章讨论过。这包括通过创建关于 `T-SQL` 代码书写方式的标准来格式化 `T-SQL` 代码。你还需要关于如何命名 `T-SQL`
    数据库对象的标准。制定关于 `T-SQL` 代码应如何注释的标准也很有用。

    '
- fmt: '# T-SQL Design


    使用 SQL 编码标准，您可以通过编码标准定义数据库设计。这可以包括数据库对象（包括架构）应如何组织。编码标准还可以指出数据应如何存储在数据库中。您可以指明哪些类型的列应包含在主键中。还可以指示表应如何聚簇，或者何时最好使用聚簇索引或非聚簇索引。


    ## ANSI STANDARD


    一个考虑因素是是否让您的 T-SQL 代码符合 ANSI 标准。虽然 SQL Server 有一些可用的功能，但并非所有这些功能都符合 ANSI 标准。在许多情况下，SQL
    Server 特定的命令和函数可以使用 ANSI 标准代码重写。确保您编写 T-SQL 代码为 ANSI 标准，可以让您轻松迁移到另一个同样符合 ANSI
    标准的关系数据库管理系统。


    ## Normal Form


    在涵盖 T-SQL 编码标准时，您可能还希望定义设计元素。这包括数据应如何分组到表中，以及这些表中应包含什么信息。存在不同级别的范式，您可以使用 T-SQL
    编码标准来指明这些范式是什么。通常讨论的各种类型的数据库规范化包括第一范式 (1NF)、第二范式 (2NF)、第三范式 (3NF) 和第四范式 (4NF)。


    每种类型的范式都建立在前一种范式的基础上。最低级别的范式是第一范式。这包括要求每个表都有一个主键，并且每条记录只保存一个值。


    ## Table Size


    创建表时，很容易想把与特定项目相关的所有列都放在同一个表中。这可能导致表包含非常多列。拥有大量列的表面临的挑战之一是数据的存储方式。这最终可能导致性能问题。可以设计表来防止此类问题。此外，设计良好的表使整体数据库设计更能适应应用程序随时间发生的变化。


    ## Name Value Pair


    使用 SQL Server 时，目标是考虑基于集合的操作。牢记这一点，您在设计表时需要谨慎。您要确保不要为了保持表宽度小而最小化列的数量。您需要考虑哪些类型的列是有价值的。如果您使用一列来定义值类型，另一列来定义实际值，那么您就设计了一个名称-值对关系。


    这种设计可能更容易理解并创建更简单的表，但这种设计并未充分利用 SQL Server 的优势。使用名称-值对时，使用索引变得越来越困难。因此，SQL Server
    需要查看更多数据才能提取必要的值。


    ## Primary Key


    在创建和设计表时，您需要考虑将存储什么类型的数据。这不仅与数据的排序方式有关，还与表与其他表的关系有关。在许多情况下，将主键作为编码标准的一部分是理想的做法。虽然主键并非在所有场景中都是必需的，但它应有助于澄清哪些字段用于定义与其他表的关系。


    ## Foreign Key


    SQL Server 是一个关系数据库管理系统，其主要优势之一是表之间的关系。但是，您需要指定表之间的关系，以便 SQL Server 可以确保在表中保存有效数据。发生这种情况时，SQL
    Server 会检查存储值的表与引用表之间的关系。SQL Server 使用外键来实现这一点。因为 SQL Server 知道它可以信任这种关系，所以通常可以更有效地过滤数据并更快地找到数据。因此，在
    T-SQL 编码标准中指定外键关系可能是一个好主意。


    ## Non-clustered Index


    我发现非聚簇索引比我预想的更具争议性。使用非聚簇索引的挑战之一是，将数据作为索引的一部分记录或在值更改时更新索引会产生成本。然而，SQL Server 使用索引来快速查找各种查询引用的数据。您需要确保使用非聚簇索引的好处大于成本。


    您可以通过确保正确定义索引来实现这一点。由于维护索引有相关成本，您需要确保您创建的任何索引都被可用查询定期使用。您可能还希望定义如何确定哪些列应成为索引的一部分，哪些列应作为索引的一部分被提取回来。


    ## Constraint Definition


    您的表可以包含一列或多列。每列都保存某种类型的信息。对于该信息，您可能知道只有某些值可以存储在该列中。在某些情况下，使用外键可以保持数据完整性，但在其他情况下，使用外键可能没有意义。在这些情况下，您可以指定记录上的约束。该约束可以限制可以在这些列中存储的信息类型。


    但是，强制 SQL Server 管理这些约束会给 SQL Server 带来额外负担。因此，您可能需要考虑尽量减少使用约束来限制可以存储在数据库中的数据类型，并依赖应用程序代码来提供良好的数据。约束的另一个用途是为某些字段指定默认值。这可能适用于您知道创建记录时最可能存在值的列。例如，您可能希望为
    `IsActive` 列指定默认值 `True`，因为大多数创建的记录在创建时都是活动的。同样，这可以由应用程序处理，但您也可以决定将此作为 T-SQL 编码标准的一部分来强制执行。


    考虑鼓励良好设计实践的 T-SQL 编码标准非常重要。这包括确定您将多大程度上遵守 ANSI 标准。还有其他主题需要包括，例如选择作为数据库设计一部分允许的最小范式级别。此决定可能会影响
    T-SQL 设计的其他方面，包括主键、外键和非聚簇索引。您可能还会考虑如何处理约束。一旦确定了为良好 T-SQL 设计实践而要强制执行的 T-SQL 编码标准，您可能还想决定关于
    T-SQL 整体性能需要哪些编码标准。


    # T-SQL Performance


    确定了与数据库设计和实施相关的 T-SQL 编码标准后，您将需要确定需要哪些标准来帮助最小化和解决可能出现的任何性能问题。这包括创建有助于确保 SQL Server
    不会被不必要信息拖累的 T-SQL 编码标准。您还需要考虑如何编写或不编写 T-SQL 代码以最小化性能开销。'
  raw: '### T-SQL Design


    Using SQL coding standards, you can define database design through coding standards.
    This can include how database objects should be organized including schemas. Coding
    standards can also indicate how data should be stored in the database. You can
    indicate what types of columns should be included in primary keys. It is also
    possible to indicate how tables should be clustered or when it is best to use
    clustered or non-clustered indexes.


    #### ANSI STANDARD


    One consideration is whether to keep your T-SQL code in compliance with ANSI standards.
    While SQL Server has some functionality that can be used, not all of this functionality
    is compliant with ANSI standards. In many cases, the SQL Server specific commands
    and functions can be rewritten using ANSI standard code. Making sure you write
    your T-SQL code as ANSI standard allows you to easily move to another relational
    database management system that is also ANSI standard compliant.


    #### Normal Form


    While covering T-SQL Coding Standards, you may also want to define design elements.
    This includes what and how data should be grouped together in tables and what
    information should be in those tables. There are various levels of normal forms
    , and you can use your T-SQL Coding Standards to indicate what those are. There
    are various types of database normalization that are commonly discussed. These
    include first normal form (1NF), second normal form (2NF), third normal form (3NF),
    and fourth normal form (4NF).


    Each type of normal form builds on the one before it. The lowest-level normal
    form is the first normal form. This includes requiring that each table has a Primary
    Key and that each record only holds a single value.


    #### Table Size


    When creating tables, it is tempting to want to put all columns related to a specific
    item into the same table. This can cause tables to have many, many columns. One
    of the challenges of having a table with a significant number of columns is how
    the data is stored. This can ultimately lead to performance issues. It is possible
    to design your tables to prevent this kind of issue. In addition, properly designed
    tables make the overall database design more adaptable as applications change
    over time.


    #### Name Value Pair


    Working with SQL Server, the goal is to think about set-based actions. Keeping
    this is mind, you will want to be careful designing tables. You want to make sure
    that you do not minimize the number of columns to keep the table width small.
    You want to consider what kinds of columns are valuable. If you are using one
    column to define the value type and another column to define the actual value,
    you have designed a name-value pair relationship.


    This type of design may be easier to understand and create simpler tables, but
    this design does not embrace the benefits of using SQL Server. When using name-value
    pairs, it becomes increasingly difficult to use indexes. Therefore, SQL Server
    will need to look through more data to pull back the necessary values.


    #### Primary Key


    When creating and designing tables, you will want to think about what type of
    data will be stored. This not only has to do with how the data is ordered but
    also the table’s relationship to other tables. In many cases, it is ideal to require
    primary keys as part of your coding standards. While a primary key is not required
    in all scenarios, it should help clarify what fields are used to define relationships
    to other tables.


    #### Foreign Key


    SQL Server is a relational database management system, and one of the main benefits
    of SQL Server is the relationships between tables. However, you need to specify
    the relationships between tables so that SQL Server can ensure that valid data
    is saved across the tables. When this happens, SQL Server checks the relationship
    between the table storing the values and the referencing table. SQL Server does
    this using a foreign key. Because SQL Server knows that it can trust the relationship,
    SQL Server can often filter out data more efficiently and find data faster. Therefore,
    it may be a good idea to specify that foreign key relationships are part of your
    T-SQL Coding Standards.


    #### Non-clustered Index


    I have found that non-clustered indexes are a more highly debated topic than I
    would have ever expected. One of the challenges of using non-clustered indexes
    is that there is a cost associated with recording the data as part of the index
    or updating the index as the values change. However, SQL Server uses indexes to
    quickly find the data referenced by various queries. You will want to make sure
    that the benefit of using non-clustered indexes outweighs the cost.


    One of the ways that you can do this is to make sure that you properly define
    your indexes. Due to the cost associated with maintaining indexes, you will want
    to make certain that any index you create is regularly being used by the available
    queries. You may also want to define how to determine which columns should be
    part of the index and which columns should be pulled back as part of the index.


    #### Constraint Definition


    Your tables can have one or more columns. Each of those columns holds some type
    of information. When it comes to that information, you may know that only certain
    values can be stored in that column. Using foreign keys can keep the data integrity
    in some situations, but there are other times that it may not make sense to use
    a foreign key. In those cases, you can specify a constraint on the record. The
    constraint can limit what type of information can be stored in those columns.


    However, forcing SQL Server to manage those constraints puts an extra load on
    SQL Server. So, you may want to consider minimizing the use of constraints to
    limit what type of data can be stored in the database and rely on the application
    code to provide good data. Another use of constraints is to specify default values
    for certain fields. This can happen for columns where you know the most likely
    value that will exist when a record is created. For instance, you may want to
    specify a default value of True for an IsActive column as most records created
    will be active at the time they are created. Once again, this can be handled by
    the application, but you may also decide to enforce this as part of your T-SQL
    Coding Standards.


    It is important to consider T-SQL Coding Standards that encourage good design
    practices. This includes determining how closely you will adhere to ANSI standards.
    There are other topics to include such as choosing the minimum normal form allowed
    as part of your database design. This decision may affect other aspects of your
    T-SQL design including primary keys, foreign keys, and non-clustered indexes.
    You may also consider how you want to handle constraints. Once you have determined
    the T-SQL Coding Standards you want to enforce for good T-SQL design practices,
    you may want to decide what coding standards are needed with regard to the overall
    performance of T-SQL.


    ### T-SQL Performance


    After determining the T-SQL Coding Standards related to database design and implementation,
    you will want to determine what standards you need to help minimize and address
    any performance issues that may come up. This includes creating T-SQL Coding Standards
    that help make sure SQL Server does not get bogged down with unnecessary information.
    You will also want to consider how T-SQL code needs to be or not be written to
    minimize performance overhead.'
