- fmt: '# Why Use Source Control


    Maintaining code involves several aspects to ensure it is maintainable. This includes
    being able to find the T-SQL code for any database object and knowing that you
    are modifying the correct version. Serious issues can occur if the wrong version
    of T-SQL code is modified and deployed. It also helps to know what version of
    code needs to be deployed at any point in time. All of these items benefit from
    incorporating source control for your databases.


    ## 代码组织与团队协作


    Keeping T-SQL code together in an easily accessible way can be a challenge. Source
    control helps keep all your T-SQL code organized in one place. While you may think
    source control is only for software developers, that is no longer the case. One
    of the easiest ways to get development teams and database administrators to work
    together is by adopting similar processes. When your T-SQL code is saved in source
    control, additional tools are available to streamline coding and script reviews
    by automatically rejecting code that does not meet formatting or coding standards.


    ## 协同工作与变更管理


    Other issues can arise when writing T-SQL code. Multiple people or teams may need
    to change the same database objects. Depending on how your company handles deployments,
    you might end up with database objects that have multiple layers of changes. Source
    control can help manage those changes and ensure they are implemented correctly.
    It allows you to work from the most up-to-date code.


    ## 本地开发与构建验证


    When making changes to database code, you have the option to work locally. If
    you use SQL Server Data Tools and keep all your database code in the same project,
    you can build your code to verify that it will execute. This is an advantage over
    deploying code manually to SQL Server. As part of the build process, the database
    project verifies that the fields in your views, functions, stored procedures,
    or other custom objects exist within the database.


    ## 获取最新代码版本


    Some changes to T-SQL code can be complex, and other times you may be working
    with critical database objects or code. To start changing code, you need to ensure
    you are working with the most up-to-date version. Before using source control,
    I would pull the code from Production. However, the object I was reviewing might
    have been altered as part of a user story since the last Production deployment.
    Worse, that code may not have been deployed to the development environment or
    might still await a script review. Using source control allows you to consistently
    get the most recent version of the T-SQL code.


    ## 迭代修改与集中存储


    When you make changes, you may want a place to go through the process of modifying,
    testing, and repeating until you achieve the desired output. Source control can
    pull the most recently saved T-SQL code to your local machine. You can then work
    on your modifications locally. When ready, you can save your changes to the centralized
    location. This repository becomes your source of record for all database changes.


    ## 依赖管理与代码重构


    If you keep all your databases in the same solution, you can add references between
    databases if there are dependencies. This ensures that if you make changes to
    underlying database objects, you will receive an alert if any dependent objects
    no longer function. This is especially useful when adding, removing, or renaming
    columns. There may come a time when you want to refactor a table or another database
    object. If your applications and databases are saved in the same solution, you
    have the option to automatically refactor the code. This helps when your applications
    have SQL code saved directly in them.


    ## 变更追踪与代码审查


    Another benefit of using source control is the ability to quickly find what T-SQL
    code has changed. Before source control, I had to manually review an entire database
    object to confirm changes. The best process I found was visually comparing the
    current Production stored procedure to the new version. While somewhat effective,
    it was easy to miss something. I also had to review all T-SQL code from top to
    bottom to ensure I understood every line.


    Before performing a script review, I read through the associated user story to
    understand the expected functionality. I was tempted to only review the lines
    of code explicitly related to the user story. After adding the database to source
    control, I could easily see all code changed as part of the review. This allowed
    me to quickly see all T-SQL code modifications. This is especially helpful in
    environments where fixing technical debt is not officially condoned, but developers
    have some freedom to address it while working on a user story affecting the same
    database code.


    I could also use source control to compare T-SQL code to previous versions. During
    comparison, modified sections were highlighted. Even more helpful was that added
    versus modified or removed code was highlighted in different colors. One drawback
    of source control is that I no longer reviewed the whole script. Any pre-existing
    issues with unmodified T-SQL code had no chance of being corrected. This applies
    to both formatting and coding standards.


    ## 部署准备与版本管理


    Having access to your T-SQL code makes it easier to prepare scripts for deployments.
    Source control also helps protect unapproved T-SQL code from being deployed in
    error. Without source control for T-SQL, preparing for a deployment can be a hassle.
    I have worked with various companies that handle deployments differently. I have
    experienced deployments where scripts were copied from tickets and added to a
    release page. I have also been on deployments where SQL scripts were bundled and
    prepared by the development team. Both methods work, but each has its downfall.


    For the first method, I had one deployment where the same stored procedure was
    changed in three different user stories. When it came time to deploy, neither
    the developers nor I knew which version should be deployed. For the second method,
    the actual deployment time was shorter, and there was error logging. However,
    for both methods, there was not a single source of truth for database code. In
    either scenario, if I needed to undo a deployment from several months ago, it
    would take time to sift through deployment scripts to find which version of the
    T-SQL code was needed for the rollback.'
