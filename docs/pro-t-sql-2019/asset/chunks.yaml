- fmt: '# 9. Coding Standards


    Earlier in Chapter [3](#480547_1_En_3_Chapter.xhtml), I discussed various steps
    you can take to standardize your `T-SQL`. This included being consistent when
    you format your `T-SQL` code, name your database objects, and comment your `T-SQL`
    code. While developing standards that allow for consistency when writing, naming,
    and documenting `T-SQL`, there is more to creating a comprehensive `T-SQL` coding
    standard.


    In this chapter, I will discuss various advantages to implementing coding standards.
    I will also go over what types of factors you should consider when defining coding
    standards. When developing coding standards, you will also want to determine how
    to implement those coding standards. I will cover the basic process needed to
    institute these coding standards.


    ## Why Use Coding Standards


    There are many different things you can do to improve your code quality. When
    improving your code quality, you want to think about your end goal. I want my
    `T-SQL` code to run efficiently, can be debugged quickly, and is easy to understand.
    This is often the result of creating consistency in how you design and write your
    `T-SQL` code. One option is to implement coding standards.


    Oftentimes, there are specific `T-SQL` practices that you know you want people
    to follow. Some of these behaviors are easily agreed upon and most people use
    them by default. However, there can be other `T-SQL` best practices that you know
    are not common in general or in your organization. You want to create a set of
    guidelines that allows everyone to easily know what they should be doing.


    There are also certain things in `T-SQL` that you know you do not want to see
    in `T-SQL` code no matter the reason. Once again, some of these topics are not
    common, but others may also be pervasive. Either way, you want to clearly define
    this all as part of your coding standards. Using coding standards can minimize
    the back and forth regarding what types of `T-SQL` code is allowed or preferable
    vs. other code.


    You can use coding standards to set boundaries for what is and is not allowed.
    I have come across times where software engineers or database developers want
    to use specific `T-SQL` because it is easier to read and write. However, there
    are times where the `T-SQL` code that makes sense easily to a human does not perform
    as well with `SQL Server`. While I want those same individuals to be able to come
    to me ask question about the current process, there are times where I have too
    many higher priority requests, and I do not have time to address their concerns.


    It would be nice to have these guidelines agreed on prior to the standards being
    needed. This also should provide some reassurance that each topic has been discussed
    and multiple parties have come to the same conclusion that certain `T-SQL` code
    is either performing well for many scenarios or could be at a high risk to cause
    performance issues.


    I know when I come into work my day is already full. Not only from the things
    I know I need to do but the last-minute requests and the one-off questions. The
    real goal to implementing coding standards is to make your life easier. That includes
    being able to rest easy knowing that quality `T-SQL` code is in your database.
    Ideally, you should be able to spend that time working on future database design
    enhancements or getting rid of technical debt.


    Another factor affecting our lives is decision fatigue. This is the concept where
    a person gets worn down having to make decision after decision throughout the
    day. With the advent of technology, we experience that kind of fatigue every day.
    When it comes to making decisions regarding `T-SQL` coding, this type of decision
    fatigue can be even more overwhelming. There are many ways to accomplish the same
    thing in `SQL Server`. One of the other advantages to implementing `T-SQL` Coding
    Standards is that it can minimize the decisions a database developer needs to
    make when writing new code.


    When you first implement coding standards, make sure to get buy-in from all parties.
    In many cases, you will not be able to have a unanimous decision. If you can,
    get a majority vote for any change you would like included in the coding standards.
    Another method is to make sure every individual agrees on the final standard before
    those standards are approved and implemented.


    One of the main challenges with `T-SQL` in the workplace is that many people that
    are responsible for writing `T-SQL` are not database experts. This can not only
    cause frustration, but it can also contribute to poorly performing queries. One
    of the nicest and hardest aspects about `T-SQL` is how easy it is to write your
    first query. `SQL` is an abbreviation for `Structured Query Language`, and that
    is how simple queries are written. You can read them almost like a sentence.


    However, this can give the false impression that what is happening with `SQL Server`
    behind the scenes is also simple. Most of us work in a high stress, fast paced
    environment. This often means we do not have time to stop and explain every decision
    we make. This can include why or why not certain `T-SQL` code should not be used.
    That is where the strength of `T-SQL` Coding Standards really shines. It allows
    you to have the conversation once to set up the ground rules. After those rules
    or standards are in place, `T-SQL` developers and engineers can write their code
    in any way they want if it meets the predefined standards.


    I have heard software developers say that having defined coding standards when
    writing applications can be very helpful. It allows them to easily jump into any
    code, whether they wrote it or not, and immediately feel comfortable. This is
    because while they may know they have never looked at this set of code, their
    brain already sees similarities with other code they have written. It gets rid
    of the instantaneous response that the code they are looking at is not theirs.
    The benefit is that they can immediately jump into reviewing the code or making
    the necessary changes.


    Now that you have determined that you want to define coding standards, the next
    step is to implement these coding standards. This is where things can get tricky.
    It will be tempting to want every stored procedure that goes through script review
    to adhere to these standards. However, some of the code you will see is already
    out in Production. I have found there are times, especially when others are under
    strict deadlines, that it is especially frustrating when a stored procedure is
    rejected merely because it does not follow coding standards.


    A possible compromise is to give a conditional approval and request that a new
    user story be created so that the `T-SQL` code can be updated to fit the new coding
    standards. This gives the developer reassurance that they can meet the deadlines
    of their current sprint, and it also lets you know that this `T-SQL` code should
    be corrected in a future release to meet coding standards.


    An easy way to handle these new user stories is to add them to the following sprint.
    This allows them to get cleaned up while you still remember what needs to be changed.
    This also makes sure that the others performing script reviews know that the effort
    to get all `T-SQL` code compliant with the coding standards is important to all
    parties.


    ## What to Include in Coding Standards


    Ideally, coming up with coding standards will provide you with a framework that
    minimizes your overall challenges with reviewing and deploying `T-SQL` code. You
    want coding standards to cover how `T-SQL` code should look, how `T-SQL` code
    should function, how `T-SQL` code should perform, and how `T-SQL` code should
    be understood.


    Some of the basics of coding standards have already been discussed in Chapter
    [3](#480547_1_En_3_Chapter.xhtml). This includes formatting `T-SQL` code by creating
    standards as to how the `T-SQL` is written. You will also want standards indicating
    how to name `T-SQL` database objects. It is also useful to have standards indicating
    how `T-SQL` code should be commented.'
