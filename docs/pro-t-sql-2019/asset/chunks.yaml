  trans: '

    如果你已确认正在处理的是你希望交互的最小数据量，那么可能无法再通过任何操作来降低与你的 `T-SQL` 查询相关的存储成本。在某些情况下，就像内存问题一样，发现大量的存储使用量可能指向其他潜在问题。这些问题可能包括数据在磁盘上的保存方式，也可能包括索引的设计方式。


    在某些情况下，你可能会发现频繁的索引更新导致了显著的存储成本。这可能是由于索引根据其设计方式需要不断重组造成的。也存在涉及页拆分（page splits）的情况，你可能会看到与此活动相关的显著存储成本。你的表的排序方式或索引的设计方式可能导致大量的页拆分。你也可能会看到与此活动相关的存储成本增加。


    关于存储成本如何运作的更多信息，了解 `SQL Server` 存储引擎的运作机制可能会有所帮助。在处理 `T-SQL` 查询时，有一个方面更频繁地依赖于存储引擎。这与访问当前不在缓冲池（buffer
    pool）中的数据有关。


    存储引擎有几种不同的功能。这些功能涉及访问不在缓冲池中的数据。存储引擎的另一个功能与需要锁时如何处理数据有关。存储引擎的第三个功能涉及与应用程序使用的、非运行
    `T-SQL` 相关的命令。


    存储引擎在访问数据时可能会遇到性能瓶颈。这些瓶颈反过来又会在访问存储的数据时导致性能问题。一个例子是当查询访问数据表中的行或与索引交互时。在其他时候，存储引擎可能需要处理与为缓冲池检索数据相关的页分配。如果你的公司决定实施行版本控制（row
    versioning），这也有可能导致存储相关的性能问题。虽然这超出了本书的范围，但如果你正在使用行版本控制并且遇到与存储性能相关的问题，你可能需要做一些额外的研究来确认行版本控制不是原因。


    当访问数据行或索引时，`SQL Server` 将利用存储引擎。被访问的数据可能存储在缓冲池中。由存储引擎负责跟踪这些行在 `B` 树（B-tree）中的位置。对于在
    `SQL Server` 中管理、添加、更新或删除索引条目，也会发生相同的过程。这在存储引擎中统称为行和索引操作维护。


    `SQL Server` 使用索引来组织数据，并允许轻松快速地检索数据。对于大于几个数据页的表，`SQL Server` 会尝试使用索引来帮助遍历各个数据页并快速找到所需的数据。然而，可能存在必要索引不存在的情况。这导致
    `SQL Server` 必须读取更多的数据页，有时甚至是表中的所有数据，以确定需要哪些行来满足查询要求。


    在编写查询以访问数据时，`SQL Server` 将需要访问的数据称为读取（reads）来跟踪。如果数据在内存中可用，访问该数据的行为称为逻辑读取（logical
    read）。有时，访问数据可能需要 `SQL Server` 转到磁盘或存储来访问数据页。如果从磁盘访问数据，则该数据称为物理读取（physical read）。如果页被移到缓冲池，则该操作称为预读（read-ahead
    read）。在任何一种情况下，`SQL Server` 都需要转到磁盘来访问请求的记录。当你编写一个查询并且它需要检索不存在于缓冲池中的记录时，`SQL Server`
    将需要访问磁盘上的那些记录。对于 `SQL Server` 来说，这可能是一个非常正常的过程。然而，在查询需要读取的记录多于查询结果所需记录的情况下，这会导致磁盘上发生比所需更多的活动。一种监控从磁盘检索数据所花费时间的方法是使用闩锁等待（latch
    waits）。这就是 `SQL Server` 访问不存在于缓冲池中的数据所花费的时间量。


    除了 `SQL Server` 在存储引擎内管理数据访问外，存储引擎还负责管理与锁定数据相关的活动。这类活动可能会受到服务器、应用程序或事务上配置的并发方法的影响。在许多情况下，并发级别配置通常由与负责编写
    `T-SQL` 代码的人员不同的团队管理。存储引擎还负责处理 `SQL Server` 中锁的处理方式。


    可能导致与存储相关的性能问题的其他因素与查询设计中可能与硬盘交互的其他领域有关，例如，需要将大量活动记录到事务中的数据库操作。这可能包括插入、更新或删除大量数据。`SQL
    Server` 被设计为能够及时处理将这些更改记录到事务日志中。然而，这些修改也需要被记录到磁盘上。根据碎片或其他使用硬盘的进程情况，这可能会导致额外的性能问题。


    `Tempdb` 是 `SQL Server` 的另一个部分，它可能产生与存储相关的显著开销。可能存在一些查询在 `tempdb` 内引发了大量的活动。在许多情况下，通过将
    `tempdb` 放在单独的驱动器上，可以减轻对系统其余部分的影响。在这些情况下，`tempdb` 上的任何存储开销应该只影响其他也依赖 `tempdb`
    的查询。


    编写 `T-SQL` 查询从根本上说与 `SQL Server` 如何与已存储的数据交互相关联。这种交互的某些方面是可以控制的，例如确保你访问尽可能少的数据。还有其他因素，例如
    `SQL Server` 如何访问数据或管理锁定，可能超出你的控制范围。无论哪种情况，重要的是要意识到所有这些部分是如何组合在一起的，并且可能影响你的查询性能。

    '
- fmt: '## Considering CPU with T-SQL Design


    SQL Server does not only work with memory and with storage but also interacts
    with the server CPU. This is one of the final pieces to consider when designing
    your queries. When it comes to licensing SQL Server, the CPU can be a significant
    cost. Some of this may be due to not understanding the best CPU needed for SQL
    Server. This can cause servers to be purchased with a CPU that seems like it would
    be more beneficial than other CPUs out there. However, more cores on the CPU may
    not mean better performance. It may operate slower for SQL Server but have more
    cores. Therefore, some CPUs may be more expensive than other CPUs on the market,
    but they may also be less effective than other CPUs when those CPUs are used by
    SQL Server. There are several different places that CPUs can be used with SQL
    Server. There is the matter of performing calculations as part of your T-SQL code.


    As we saw previously in the chapter, there are times where a significant use of
    memory can cause I/O issues. The same can be said when there is a significant
    amount of I/O activity; this can lead to CPU issues. When talking about considering
    memory in your overall T-SQL design, I discussed there were two types of caching.
    In that section, I mainly focused on buffer caching or the buffer pool. In this
    section, I will talk a little bit about how caching of execution plans can contribute
    to CPU performance issues.


    ### Execution Plan Caching


    When SQL Server determines how to execute a query, it creates an execution plan.
    For SQL Server to know how to execute a query, it must utilize the CPU. This is
    considered a CPU cost. The expectation is that this type of cost should not cause
    performance issues as frequently executed prepared statements and stored procedures
    will already have their plans saved in the cache and do not need to have these
    execution plans re-created with any amount of significant frequency.


    That does lead into what causes SQL Server to determine that a new execution plan
    is needed. This is directly related to understanding what SQL Server does when
    it creates an execution plan. Part of creating an execution plan is creating a
    value that allows SQL Server to quickly find a previously created execution plan.
    In the plan cache, this value is known as the `plan hash`. While you may have
    several queries that look similar or return the same results, SQL Server may not
    give them the same `plan hash`. Only queries that look the same have the same
    `plan hash`.


    This dependency on the `plan hash` helps determine if a new execution plan needs
    to be created. This causes us to become dependent on using parameters. These parameters
    can exist either in stored procedures or prepared statements. If the query that
    is being executed has the same `plan hash` and the `plan hash` in the plan cache,
    SQL Server will not re-create a new execution plan. This process of creating an
    execution plan is called compilation. This can be one of the many reasons that
    your queries may be using more CPU resources than you expected.


    It is also possible that SQL Server may determine it needs to create a new execution
    plan for a query where there is already an associated `plan hash` in the execution
    cache. This scenario is generally caused when SQL Server identifies that the data
    involved in the query has changed significantly enough to require a new execution
    plan. This can be the result of frequent data changes, or it can be the result
    of parameter sniffing; either way, it will lead to something that SQL Server identifies
    as a `recompilation`. Just like there was a cost associated with a query compilation,
    there is also a cost on the CPU associated with `recompilations`.


    ### Statistics and Index Fragmentation


    If there is a significant amount of I/O being handled for a query, this may spill
    over into causing CPU performance issues. While it is possible that a query may
    be accessing more data than is necessary, it may not be due to the overall T-SQL
    query design. It is possible that it could be due to out-of-date statistics. While
    the concept of managing statistics is outside the scope of this book, you want
    to be aware of the effect that statistics have on your execution plans. Statistics
    are what give SQL Server a quick glance at the overall distribution of data within
    a specific data table or index. The concept is that proper statistics help SQL
    Server make a best guess as to how to create an execution plan. If these values
    are out of date or stale, then SQL Server may decide on an execution plan that
    would not be as efficient as it could be if SQL Server had up-to-date statistics.
    Due to the out-of-date statistics, you can see that there is a significant difference
    between the estimated and actual number of reads. This can cause a performance
    impact on the CPU. You can see now that the statistics have been updated and the
    estimated and actual number of rows returned remains relatively consistent.


    There is also the possibility that SQL Server is having to traverse more of the
    hard disk or storage than it originally anticipated. This can be due to situations
    involving fragmentation. In the case of higher than normal CPU activity, it could
    be possible that this is due to index fragmentation. This means that SQL Server
    may have only estimated a certain amount of work required to retrieve data by
    assuming that the index was not fragmented. However, since the index is fragmented,
    SQL Server is having to do potentially more work than it anticipated to access
    the requested data.


    ### Data Type and Implicit Conversions


    Another common issue that can happen with your T-SQL query design involves data
    types. There are many different places in SQL Server where you will define data
    types. These can be defined in tables, temporary tables, parameters, stored procedure,
    parameters, and even the data types that are specified through your application
    code. As discussed previously in Chapter 1, SQL Server can convert one data type
    to another in the background; this process is called implicit conversion. While
    SQL Server can handle implicit conversion and has a structured process to do so,
    forcing SQL Server to perform an implicit conversion can also have a CPU cost
    associated with that activity. The code in Listing 6-3 is an example of an implicit
    conversion.


    ```sql

    DECLARE @IsActive NVARCHAR(1);

    SET @IsActive = 1;

    SELECT RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe

    WHERE IsActive = @IsActive;

    Listing 6-3

    Query with Implicit Conversion

    ```


    The implicit conversion is created in Listing 6-3 as the data type for the variable
    `@IsActive` is set to an `NVARCHAR`. The data type for the field `IsActive` in
    the `dbo.Recipe` table is a `BIT`. Therefore, SQL Server will have to perform
    an implicit conversion to compare these two values. In Figure 6-1, you can see
    the impact of an implicit conversion on an execution plan.


    ![`../images/480547_1_En_6_Chapter/480547_1_En_6_Fig1_HTML.jpg`](images/480547_1_En_6_Chapter/480547_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Index Scan in Execution Plan Showing Implicit Conversion


    An implicit conversion can have a significant and negative overall performance
    impact on the query; you will want to make sure you avoid implicit conversions
    when writing your T-SQL queries.'
