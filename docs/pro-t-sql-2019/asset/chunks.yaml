    \ Date:     July 23, 2019\nDescription: Remove DateCreated and DateModified columns\n\
    Sample Usage:\nEXECUTE dbo.GetRecipe\n\\*-------------------------------------------------------------*/\n\
    ALTER PROCEDURE dbo.GetRecipe\nAS\nSELECT\nRecipeID,\nRecipeName,\nRecipeDescription,\n\
    ServingQuantity,\nMealTypeID,\nPreparationTypeID,\nIsActive\nFROM dbo.Recipe\n\
    WHERE IsActive = 1;\nGO\nListing 12-7\nSample Script for Migration-Based Deployment\n\
    ```"
  trans: "\n确定部署方法的一部分工作，将包括了解您当前部署数据库代码的流程。目前，您的业务中可能有手动部署的脚本。根据您的组织结构，您可能拥有一个环境，其中的脚本可以在任何时间点部署到特定环境；或者您可能有关于这些\
    \ `T-SQL` 脚本可以在一周中的哪些天进行部署的条件限制。如果某些天才能部署到各个环境，这被称为**门控部署**。您可能在版本控制系统中使用了数据库项目。在第\
    \ 10 章中，已经介绍了分支和合并的主题。您的公司可能只使用一个分支用于数据库项目。所有个人的开发工作都在同一个地方完成。另一方面，您的公司可能利用分支。这是指您的开发人员使用主代码库的副本，并对该副本进行更改。有些公司可能选择直接从一个分支进行部署。如果您编写数据库代码时并未使其能够在任何时间点部署，这种方式可能特别有用。其他公司，尤其是那些编写代码以支持随时部署的公司，可能会选择在所有工作完成后，将所有分支合并回\
    \ master 或主分支。在这种情况下，所有部署都将来自主分支。\n\n有时，团队管理工作流程的方式取决于他们的部署频率。对于许多公司而言，目标是能够频繁部署。然而，这并不意味着每家公司都已准备好应对这种部署频率。对于以更接近**看板**模式编写代码的开发团队而言，何时将代码部署到生产环境可能没有固定模式。其他团队可能有固定的节奏或冲刺周期来部署他们的代码。这些冲刺周期可能从几周到几个月不等。如果您的公司仍在确定代码发布频率的过程中，我建议谨慎对待较长的冲刺周期，因为这通常意味着需要一次性部署更多变更。这会增加部署出现问题的风险。\n\
    \n您还需要了解单次平均部署中涉及的数据库变更量。您可能会发现，平均每个冲刺周期部署的数据库变更并不多。如果是这种情况，您需要确保最终不会在一次部署中包含大量数据库变更。当单次部署中对数据库进行多项变更时，不仅出现错误的风险更高，而且根据您的部署方法，一项\
    \ `T-SQL` 代码的变更可能会覆盖另一项。\n\n在介绍部署数据库代码的两种主要方法之前，还有一个额外的因素需要考虑。虽然我们都希望每次数据库部署都能顺利按预期工作，但有时您可能需要撤销或回滚一次部署中的一个或多个数据库变更。我建议，如果您还没有制定回滚策略，那么现在是开始考虑一个可靠回滚策略的好时机。通常需要回滚时，并不是您想要开始研究如何快速有效地回滚\
    \ `T-SQL` 代码的时候。拥有一个可重复执行此操作的方法，可以显著增强您对部署的信心。您的公司可能会使用回滚脚本来简化需要恢复到数据库代码先前版本的情况。如果您使用版本控制，您可以选择恢复到数据库代码的不同版本。在此基础上，如果您使用持续集成，您可能拥有一个预先打包的先前数据库代码版本，可以在几分钟内部署到您的生产数据库上。\n\
    \n这最终将我们引向考虑数据库部署常用的部署方法。其中一种方法是将所有要一起部署的脚本打包在一起。这被认为是**基于迁移的方法**；另一种选择是获取源代码管理中的所有内容，并将其视为您数据库的真实来源。使用此类方法时，您部署到的任何数据库都将被覆盖，以匹配源代码管理中存在的数据库对象。这通常被称为**基于状态的部署**。到目前为止收集的有关谁在开发数据库代码、这些变更如何编码和管理以及您的部署频率的信息，可以帮助您确定是基于迁移的方法还是基于状态的方法最适合您。\n\
    \n既然我们知道了什么是基于迁移的部署方法，我们就可以开始尝试确定它是否是部署的最佳方法。使用基于迁移方法的主要好处之一是，您可以精确控制部署到数据库的内容。这种部署方法通常涉及将所有要部署的脚本保存在单一位置，并且这些脚本的命名方式通常允许按特定顺序部署。这可以使您的部署易于管理。您可以快速查看保存脚本的文件夹，并确切知道将要部署什么。\n\
    \n如果您使用这种部署方法，我建议您有一个单独的文件夹，用于跟踪需要部署的回滚脚本以及这些回滚脚本的部署顺序。这不仅有助于在部署当晚需要回滚时快速找到回滚脚本，而且如果您需要一次性回滚多个部署，它也应能帮助您快速找到需要回滚的代码。基于迁移的部署方法存在一些限制。主要的挑战之一是，如果您需要回滚特定的一段代码。根据源代码管理的管理方式，这可能不像查看该数据库对象的历史记录并从源代码管理恢复先前版本那样简单。\n\
    \n设置基于迁移的部署方法可以是手动的。您和团队的其他成员可以编写 `T-SQL` 代码文件并按数字顺序保存。这实际上包括在 `SQL Server Management\
    \ Studio` 中创建脚本，并以特定的命名约定保存文件。这种命名约定将包括指定部署顺序，例如在文件名前加上步骤编号以指示部署顺序。\n\n如果我将清单\
    \ 12-1 中的查询更新为与清单 12-6 中的查询匹配，我会创建一个包含这些更改的 SQL 文件。我可能会选择将此文件命名为 `001_20190723-2023_ActiveRecipe.sql`。但是，之后我可能会收到对同一存储过程进行额外修改的请求。在这种情况下，我需要从存储过程\
    \ `dbo.GetRecipe` 中移除日期列。在清单 12-7 中，您可以看到新的 `T-SQL` 代码。\n\n```\n-- \nGO\nGO\n\
    PRINT N'正在修改 [dbo].[GetRecipe]...';\nGO\n/*-------------------------------------------------------------*\\\
    \n名称：             dbo.GetRecipe\n作者：           Elizabeth Noble\n创建日期：     2019\
    \ 年 4 月 20 日\n描述：获取数据库中所有食谱的列表\n更新日期：     2019 年 7 月 23 日\n描述：移除非活动食谱\n更新日期： \
    \    2019 年 7 月 23 日\n描述：移除 DateCreated 和 DateModified 列\n示例用法：\nEXECUTE dbo.GetRecipe\n\
    \\*-------------------------------------------------------------*/\nALTER PROCEDURE\
    \ dbo.GetRecipe\nAS\nSELECT\nRecipeID,\nRecipeName,\nRecipeDescription,\nServingQuantity,\n\
    MealTypeID,\nPreparationTypeID,\nIsActive\nFROM dbo.Recipe\nWHERE IsActive = 1;\n\
    GO\n清单 12-7\n基于迁移部署的示例脚本\n```\n"
- fmt: 'Once I have completed my changes to the database code, I can save this code
    as a SQL script. I will save this code with the filename `002_20190723_2024_RemoteDates.sql`.
    In order to make sure that my deployment runs smoothly, I can put both files in
    the same folder. Figure 12-1 shows the two files as they would be displayed in
    a file folder.


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig1_HTML.jpg](images/480547_1_En_12_Chapter/480547_1_En_12_Fig1_HTML.jpg)


    **Figure 12-1**


    **Migration-Based File List**


    The first script that I created begins with `001`. This is the first script in
    order by filename. This is also the first script that should be run during the
    next deployment. The second script that I created begins with `002`. This will
    be the second script that will be run during the next deployment. Writing `T-SQL`
    scripts and saving them manually is not the only method that can be used as part
    of migration-based deployments. You also have third-party tools that can help
    manage this process for you.


    There are many proponents of migration-based deployments. One of the main challenges
    in developing any database code is managing how the code is maintained when multiple
    developers are working off the same code base. In Chapter 10, I covered branching
    and merging. This is the main method used to make sure that everyone developing
    `T-SQL` code for the database project can work in a manner that limits inconsistencies
    when multiple developers are working on the same database object. If you are working
    with a team that is not accustomed to source control, using a migration-based
    approach may be more logical. A migration-based deployment process is better suited
    to handle multiple changes to the data in your database. This can be part of a
    data cleanup or related to re-factoring database objects. Another advantage of
    using a migration-based deployment method is that it can be easier to pick and
    choose exactly what database objects will be deployed. If you make frequent changes
    to your databases, you may end up with many scripts that may increase the amount
    of time required for deployment.


    Due to these factors, there are some scenarios where you may find a migration-based
    deployment is more effective than a state-based deployment. Smaller development
    teams may find a migration-based approach easier to use. If you are using source
    control for your database, you will still need to make sure that your team frequently
    pulls down the latest version of database code for their development. The same
    may also be true for environments that have fewer development teams. If your team
    is not doing frequent deployments during the same day or has a larger maintenance
    window available for deployments, then the migration-based deployment method may
    also work well for you.


    The one risk you will need to keep in mind when using a migration-based approach
    involves database changes that happen outside of source control. You may find
    yourself in a situation where you need to deploy a change immediately to production.
    Often these changes are deployed to production without having these changes deployed
    to the lower environments or checked into source control. If you need to deploy
    a `hotfix` or a `patch` and this code does not end up in your source control,
    you may end up with your environments being out of sync. While future deployments
    will not overwrite your changes, you may find inconsistent behavior between your
    environments.


    Migration-based deployments are not the only option available when deploying your
    `T-SQL` code. Another popular option for database deployments involves using a
    source for your database schema and updating your target environment to have that
    same database schema. This is what is known as a state-based approach. Typically,
    this is used with source control, but that is all not always necessary. The concept
    is that the target database will end up looking like the source database or source
    control once the deployment is complete. This method does not require source control,
    but it is easier to manage through source control.


    Whereas each change is saved individually in its own script file when using the
    migration-based approach, this is not the case for a state-based deployment. In
    a state-based deployment, you can have many changes to the same database object,
    but there will only be one set of `T-SQL` code that is deployed to your target
    database instance. This single `T-SQL` script will combine all the changes into
    one net change. If the database object is in source control or the source database
    is different from the target, the change script will be run on the target instance.
    I also like the fact that I know exactly what state the database will be in once
    a deployment is complete. The database in the target instance should have the
    same database objects that exist in the source location after the deployment is
    complete.


    Using the same example as the one for the migration-based approach, I will walk
    through how this is handled as part of the state-based deployment. The first step
    will involve going into source control and making sure that you have the latest
    version. Once you have the latest version, you can open the stored procedure `dbo.GetRecipe`.
    When you open this `SQL` script originally, you will see the code as shown in
    Listing 12-1. You can make the necessary modifications so that the `T-SQL` code
    matches Listing 12-6. After you have made these changes, you can check these changes
    into source control. Suppose someone else will be making the changes to match
    the `T-SQL` code in Listing 12-7. This developer will also need to pull down the
    latest version of source control. They can then make changes to the `dbo.GetRecipe`
    stored procedure. These changes can then be merged back into the master branch.
    When it is time to deploy this code, the source location will have both changes.
    These changes will be to only show active recipes and to remove the date columns.
    Instead of deploying these changes one at a time, the stored procedure `dbo.GetRecipe`
    will be deployed to the target instance once. This single update to the stored
    procedure will include both changes.


    Working with many developers or many different development teams there may be
    a benefit from using a state-based deployment method. This is due to the frequency
    of changes that may be happening in the overall database project. While the state-based
    migration can work for database projects that have a few or many changes, this
    deployment method is better at managing frequent changes. When using the state-based
    approach, you can be confident that any changes in your source location will exist
    in your target location after the deployment is complete. This also means that
    if there are many changes made to Production that were not put into source control,
    then these changes will be overwritten during the next deployment. If your team
    is performing frequent updates especially throughout the day, you may find the
    state-based approach takes less time for a deployment. At the very least, this
    is since there are usually less changes being deployed through the state-based
    approach when there are frequent deployments.'
