- fmt: 'This is not the limit to using data sets for updating multiple records. I
    have had many situations where I need to update hundreds or thousands of records.
    While I could write a query to identify each record individually and then manually
    pull those IDs to update all those records individually or in a set. There are
    easier ways to update those multiple records and minimize the risk of errors due
    to human intervention. The query in Listing 5-10 shows you can update data while
    joining tables together.


    ```sql

    UPDATE ing

    SET ing.DateModified = GETDATE()

    FROM dbo.Ingredient ing

    INNER JOIN dbo.RecipeIngredient recing

    ON ing.IngredientID = recing.IngredientID

    INNER JOIN dbo.Recipe rec

    ON recing.RecipeID = rec.RecipeID

    WHERE rec.RecipeName = ''Spaghetti''

    ```

    Listing 5-10: Updating Data with Joins to Create a Data Set


    When using joins during your updates, I would recommend that you confirm what
    data you are updating. This can be done by converting the update statement to
    a select statement as shown in Listing 5-11.


    ```sql

    SELECT ing.IngredientID,

    ing.IngredientName,

    ing.IsActive,

    ing.DateCreated,

    ing.DateModified

    FROM dbo.Ingredient ing

    INNER JOIN dbo.RecipeIngredient recing

    ON ing.IngredientID = recing.IngredientID

    INNER JOIN dbo.Recipe rec

    ON recing.RecipeID = rec.RecipeID

    WHERE rec.RecipeName = ''Spaghetti''

    ```

    Listing 5-11: Verifying the Data Set with a Select Statement


    You can check the records and verify the record count. Before performing the update,
    I suggest wrapping the `UPDATE` statement in a `BEGIN TRAN… ROLLBACK` to verify
    the record count.


    Just like working with updates, you can also use data sets when deleting data.
    I have found that deleting data using data sets can be significantly more efficient,
    but it can also be somewhat risky if the data is not verified prior to deleting.


    One of the largest temptations overall in writing T-SQL code is not taking advantage
    of data sets. Often, this is a result of being more comfortable writing procedural
    code or not having developed the ability to think in terms of data sets. My goal
    throughout this next section is to guide you through various ways to write code
    that embraces using data sets.


    # 6. Hardware Usage


    I have covered the elements of set-based design when considering how to design
    your queries. There are other things to take into consideration when working with
    SQL Server. You are working with a system that involves more than its pieces.
    There are many aspects to SQL Server. There is the data that is stored. There
    is accessing the data. There is also the process of how to access the data. SQL
    Server is not only software, but it’s also how that software interacts with your
    computer’s or server’s hardware.


    When it comes to working with hardware, there are several different parts that
    SQL Server uses. Some of these may seem straightforward and others may be surprising
    at first. SQL Server is known as a relational database management system (`RDBMS`).
    As part of a relational database management system, SQL Server’s purpose is to
    allow for efficient storage and retrieval of data. This implies that one of the
    most important pieces of hardware is the memory on the system that is running
    SQL Server. When it comes to long-term storage of data, the hard drives become
    the most significant. We will refer to these as storage for the purposes of this
    chapter as storage is not only limited to hard disks. However, there are other
    elements that are less obvious such as `CPU`.


    ## Considering Memory with T-SQL Design


    When you first start working with data in SQL Server, it may come as a surprise
    that memory is one of the most important factors. Much of this has to do with
    what memory is used for within SQL Server. One of the reasons for this is because
    of the speed and versatility for memory. Another factor is related to the cost
    of memory vs. the cost of storage. This difference in costs increases the importance
    of using memory effectively. There are many different types of things that are
    stored in memory. The process SQL Server will use to access the data needed to
    meet a query’s criteria is saved in memory as an `execution plan`. The data retrieved
    for a query’s results are also stored in memory. You can also have database objects
    that exist in memory such as table variables or temporary tables.


    First, let me consider why memory is so important when dealing with SQL Server.
    You often hear the term `OLTP` (online transaction processing). What this really
    means is you want a system that can perform a high volume of write and update
    activity. These are the types of activities that happen frequently within our
    applications. When referring to write and update activity, using the database
    for recipes would involve each time a recipe was accessed, each change that was
    made to recipe, or every new ingredient that was added to the system.


    While there is a significant amount of data being stored within the system, often
    someone only wants to deal with a very small subset of that data. The skill comes
    when trying to determine what data should remain readily available. This will
    increase the speed required to add new entries, to update existing entries, or
    to access pre-existing entries. This is where a better understanding of hardware
    can assist you.


    We most commonly think of memory as the `RAM` available on our servers or in our
    machines. However, there are other types of memory available. Even closer to the
    `CPU` and faster than `RAM` are `L2 cache` and `L3 cache`. `L2` and `L3 cache`
    exist on the processor and have a lower latency than `RAM`. This latency can be
    ten times less than `RAM`. However, the `L2 cache` or `L3 cache` available to
    SQL Server is significantly smaller the amount of data that is usually required
    for your applications to run effectively. The latency on the `L2 cache` can be
    half as much as the `L3 cache`, but the speed comes at the size of the cache.
    `L2 cache` is frequently measured in hundreds of kilobytes, and `L3 cache` is
    usually in tens of megabytes. How can we access data as quickly as possible and
    as cheaply as possible? This is where proper use of memory excels.


    SQL Server is designed to take advantage of memory. There is a process called
    `caching` that keeps information in memory. There are two types of caching that
    are important when it comes to SQL Server. The first of these has to do with caching
    `execution plans`. This is where SQL Server saves directions on how it would execute
    a stored procedure or ad hoc query again in the future. The goal is to take advantage
    of the knowledge SQL Server already has calculated when it comes to the best way
    to execute a specific query. The second form of cache that has to do with query
    design can almost be more important. It has to do with how information is stored
    in memory. This is called the `buffer pool`.'
