  trans: '

    ## 考虑 CPU 与 T-SQL 设计


    SQL Server 不仅与内存和存储交互，还与服务器 CPU 进行交互。这是设计查询时需要考虑的最后环节之一。在为 SQL Server 考虑许可授权时，CPU
    可能是一项重大成本。部分原因可能是对 SQL Server 所需的最佳 CPU 缺乏了解。这可能导致采购的服务器 CPU 看似比其他 CPU 更有优势，但实际上，CPU
    核心数更多并不意味着性能更好。对于 SQL Server，核心数更多的 CPU 可能运行速度反而更慢。因此，市场上的一些 CPU 可能比其他 CPU 更昂贵，但当它们被
    SQL Server 使用时，其效果可能还不如其他 CPU。CPU 在 SQL Server 中有多种不同的用途。其中之一是作为 T-SQL 代码的一部分执行计算。


    正如本章前面所见，内存的大量使用有时会导致 I/O 问题。同样，当 I/O 活动量非常大时，也可能导致 CPU 问题。在讨论整体 T-SQL 设计中的内存考虑时，我提到了两种类型的缓存。在那一部分，我主要关注了缓冲区缓存或缓冲池。在本节中，我将简要谈谈执行计划的缓存如何可能导致
    CPU 性能问题。


    ### 执行计划缓存


    当 SQL Server 确定如何执行查询时，它会创建一个执行计划。为了让 SQL Server 知道如何执行查询，它必须利用 CPU。这被视为一种 CPU
    成本。预期是这类成本不应频繁导致性能问题，因为经常执行的预处理语句和存储过程它们的计划已经保存在缓存中，不需要以任何显著的频率重新创建这些执行计划。


    但这引出了什么会导致 SQL Server 判定需要一个新的执行计划。这与理解 SQL Server 在创建执行计划时所做的事情直接相关。创建执行计划的一部分是创建一个允许
    SQL Server 快速找到先前创建的执行计划的值。在计划缓存中，这个值被称为`计划哈希`。虽然您可能有多个查询看起来相似或返回相同的结果，但 SQL Server
    可能不会给它们相同的`计划哈希`。只有看起来完全相同的查询才具有相同的`计划哈希`。


    这种对`计划哈希`的依赖有助于确定是否需要创建新的执行计划。这导致我们依赖于使用参数。这些参数可以存在于存储过程或预处理语句中。如果正在执行的查询具有与计划缓存中相同的`计划哈希`，SQL
    Server 将不会重新创建新的执行计划。创建执行计划的这个过程称为编译。这可能是您的查询使用的 CPU 资源超出预期的众多原因之一。


    SQL Server 也可能判定需要为一个在执行缓存中已有相关`计划哈希`的查询创建新的执行计划。这种情况通常发生在 SQL Server 识别到查询涉及的数据发生了足够显著的变化，需要一个新的执行计划时。这可能是频繁数据更改的结果，也可能是参数嗅探的结果；无论哪种情况，都会导致
    SQL Server 识别为一次`重新编译`。就像查询编译有相关成本一样，`重新编译`也会带来 CPU 上的成本。


    ### 统计信息与索引碎片


    如果查询处理的 I/O 量非常大，这可能会蔓延并导致 CPU 性能问题。虽然查询可能访问了比必要更多的数据，但这可能并非由于整体的 T-SQL 查询设计，而可能是由于统计信息过时。尽管管理统计信息的概念超出了本书的范围，但您需要意识到统计信息对执行计划的影响。统计信息能让
    SQL Server 快速了解特定数据表或索引内的数据整体分布情况。其理念是，正确的统计信息有助于 SQL Server 对如何创建执行计划做出最佳猜测。如果这些值过时或陈旧，那么
    SQL Server 可能会决定一个不如拥有最新统计信息时高效的执行计划。由于统计信息过时，您可能会看到估计读取次数与实际读取次数之间存在显著差异。这可能对
    CPU 造成性能影响。您现在可以看到，统计信息已经更新，估计返回的行数与实际返回的行数保持相对一致。


    另一种可能性是，SQL Server 不得不遍历比其最初预期更多的硬盘或存储空间。这可能是由于涉及碎片的情况。在 CPU 活动异常高的情况下，这可能是由于索引碎片造成的。这意味着
    SQL Server 可能仅根据索引未被碎片化的假设，估计了检索数据所需的一定工作量。然而，由于索引存在碎片，SQL Server 为访问所请求的数据可能不得不做比预期更多的工作。


    ### 数据类型与隐式转换


    T-SQL 查询设计中另一个常见的问题涉及数据类型。在 SQL Server 中有很多不同的地方需要定义数据类型。这些定义可以出现在表、临时表、参数、存储过程、参数，甚至通过应用程序代码指定的数据类型中。正如第
    1 章前面所讨论的，SQL Server 可以在后台将一种数据类型转换为另一种；这个过程称为隐式转换。虽然 SQL Server 可以处理隐式转换并且有一个结构化的过程来执行它，但强制
    SQL Server 执行隐式转换也可能带来相关的 CPU 成本。清单 6-3 中的代码是一个隐式转换的例子。


    ```sql

    DECLARE @IsActive NVARCHAR(1);

    SET @IsActive = 1;

    SELECT RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe

    WHERE IsActive = @IsActive;

    Listing 6-3

    存在隐式转换的查询

    ```


    在清单 6-3 中产生了隐式转换，因为变量`@IsActive`的数据类型被设置为`NVARCHAR`。`dbo.Recipe`表中`IsActive`字段的数据类型是`BIT`。因此，SQL
    Server 必须执行隐式转换来比较这两个值。在图 6-1 中，您可以看到隐式转换对执行计划的影响。


    ![`../images/480547_1_En_6_Chapter/480547_1_En_6_Fig1_HTML.jpg`](img/480547_1_En_6_Fig1_HTML.jpg)


    图 6-1


    显示隐式转换的执行计划中的索引扫描


    隐式转换可能对查询的整体性能产生显著的负面影响；在编写 T-SQL 查询时，您需要确保避免隐式转换。

    '
- fmt: '# 7. SQL Server 性能与执行计划


    一些公司可能也在使用数据压缩。数据压缩的好处之一是能够在内存中保存更多数据，因为压缩数据所占用的空间比未压缩数据更小。在 SQL Server 中使用数据压缩也有一些缺点。其中一个缺点与整个数据压缩过程中产生的
    CPU 成本有关。这并不意味着你不应该使用数据压缩。我提到这一点是为了让你意识到可能出现的任何潜在问题。


    这就引出了并行的概念。最容易观察到 CPU 使用率升高的常见方式之一，就是当你的查询使用了并行处理时。并行是一种概念，指的不是在一个单一线程上执行查询，而是可以在多个线程上执行查询。在这种情况下，假设你的
    CPU 有四个核心。每个核心可能有两个线程。如果一个查询只在一个线程上运行，它将只使用你 CPU 四分之一个核心的资源。然而，如果查询以并行方式运行，它可能能够在多个线程上运行。例如，如果它在四个线程上运行，那么这个查询就可以占满你
    CPU 的所有核心。这会导致整体的 CPU 处理量增加。


    SQL Server 在决定是否在执行查询时使用并行处理时，会考虑许多因素。这很大程度上与 SQL Server 的配置方式有关。虽然配置 SQL Server
    超出了本书的范围，但我希望你能了解当 SQL Server 创建执行计划时它是如何工作的。SQL Server 会生成执行计划并计算其总成本。SQL Server
    还有一个配置值，用于指示在 SQL Server 决定实施并行处理之前，执行计划应达到的最小成本。这个成本被称为**并行度的成本阈值**。如果执行计划的成本大于并行度的成本阈值，那么
    SQL Server 可以判断是否存在一个更好的、以并行方式运行的执行计划。


    如果 SQL Server 决定创建一个使用并行的执行计划，它还需要确定给定执行计划允许使用的最大线程数。还有一个配置值用于指示可用于并行处理的最大线程数。这个值被称为**最大并行度**。`MAXDOP`
    是最大并行度的缩写。这并不意味着 SQL Server 必须使用与最大并行度中指定的相同数量的线程。它只表示这是执行计划以并行方式运行所允许的最大线程数。


    SQL Server 将在执行时确定将在并行执行的执行计划使用的线程数。这将基于查询执行开始时未使用的线程数量来决定。在涉及并行时，可能影响 CPU 性能的一个因素发生在查询并行运行期间使用了更多线程的情况下。并行的基本思想是，虽然总体上会使用更多的
    CPU 处理能力，但持续时间会短得多。如果有更多查询进入队列并且需要运行，需要更多线程处于活动状态，这可能会导致 CPU 在较长时间内保持高于正常水平的运行状态。


    确保你的 T-SQL 不会对 CPU 使用率产生负面影响的主要原因之一，是与 CPU 相关的货币成本。自 SQL Server 2012 以来，SQL Server
    的许可一直与运行 SQL Server 的核心数量相关。在更高版本的 SQL Server 中，这被修改为与服务器可用的核心数量相关，即使这些核心没有明确分配给
    SQL Server。当公司开始遇到性能问题时，常见的解决方案之一是增加更多硬件。虽然这可能在短期内解决性能问题，但根据需要添加的硬件情况，这也可能是一个非常昂贵的解决方案。由于每个核心的许可费用可能超过
    1000 美元，因此最好尝试通过减少与 CPU 使用率相关的性能瓶颈来最小化对额外 CPU 的需求。


    在设计 T-SQL 查询时，有许多方面需要考虑。其中一些因素包括意识到 T-SQL 可能对运行 SQL Server 的物理硬件产生的影响。在编写 T-SQL
    查询时，你需要注意访问的数据量，以便最好地利用可用的内存。最小化数据访问的另一个额外好处是减少了存储资源的消耗。确保你的统计信息是最新的并且有适当的索引，将有利于
    CPU 使用率。了解你的查询如何影响硬件，不仅可以减少对额外硬件的需求，还可以让你当前的硬件更好地支持你的应用程序。


    # 7.1 执行计划简介


    当我刚开始编写 T-SQL 时，我专注于使用正确的语法。我努力尝试记住像 `GROUP BY` 子句是否在 `ORDER BY` 子句之前这样的事情。随着我对编写
    T-SQL 越来越熟悉，我面临了新的挑战，比如确保我的结果是准确的。随着时间的推移，我发展到了不仅编写具有复杂逻辑的查询，还必须编写几个更简单的查询来验证我的结果。我开始调试其他数据库开发人员编写的
    T-SQL 代码。我也负责研究各种应用程序问题。


    在许多情况下，这种研究的结果归结为一些在应用程序崩溃或硬件使用率飙升的同时运行的 T-SQL 代码。在那个时候，压力很大，需要尽快找出导致性能问题的原因。最初，我学会了依赖自己对业务需求和数据库设计的理解。虽然这可能非常有帮助，但它确实需要大量的领域知识，这可能需要数年时间才能获得。有更好的、更快的、更简单的方法来找到查询中的痛点。


    在本章中，你将学习如何查看和理解 SQL Server 执行计划。你还将看到演示，了解你现有和新建的索引如何影响执行计划。你还将了解 SQL Server
    在执行计划中如何将数据连接在一起。到本章结束时，你将掌握如何使用执行计划来提高 T-SQL 性能的知识。'
  raw: 'Some companies may also be utilizing data compression. One of the benefits
    of data compression is the ability to keep more data in memory as the amount of
    data that is taken up by the compressed data is smaller than the uncompressed
    data. There are also some drawbacks to using data compression in SQL Server. One
    of these drawbacks has to do with the CPU cost incurred as part of the overall
    data compression process. This does not mean that you should not use data compression.
    I only mention this so that you can be aware of any potential issues should they
    arise.


    That brings us to the overall concept of parallelism. The most common way that
    you can easily see CPU usage is when it comes to parallelism with your queries.
    Parallelism is a concept where instead of a query executing on a single thread,
    a query can execute on more than one thread. In this scenario, this can mean that
    your CPU may have four cores. Each core may have two threads. If a query were
    only to run on one thread, it would run on one quarter of a core of your CPU.
    However, if the query was running in parallelism, it may be able to run on more
    than one thread. For instance, if it ran on four threads, this query could then
    take the full number of cores in your CPU. This would cause the overall CPU process
    to increase.


    There are many factors involved for SQL Server to determine whether parallelism
    should be used when executing a query. Much of this involves how SQL Server is
    configured. While configuring SQL Server is outside the scope of this book, I
    want you to be aware of how it works when SQL Server creates an execution plan.
    SQL Server gives the execution plan and overall cost. SQL Server also has a configured
    value that indicates a minimum cost that should exist before SQL Server decides
    to implement parallelism. This cost is referred to as the cost threshold for parallelism.
    If the execution plan has a cost that is greater than the cost threshold of parallelism,
    then SQL Server can determine if there is a better execution plan that runs in
    parallel.


    If SQL Server does decide to create an execution plan using parallelism, SQL Server
    will also need to determine the maximum number of threads that are allowed for
    a given execution plan. There is also a configured value that indicates the maximum
    number of threads that can be used for parallelism. This value is referred to
    as the maximum degrees of parallelism. MAXDOP is the abbreviation for maximum
    degrees of parallelism. This does not mean that SQL Server must use the same number
    of threads as specified in the maximum degrees of parallelism. It only means this
    is the maximum amount of threads that can be allowed for an execution plan to
    run in parallelism.


    SQL Server will determine the number of threads to use for an execution plan that
    will run in parallelism at the time of execution. This will be done based on the
    number of threads that are not utilized at the beginning of the execution of the
    query. One factor that can affect CPU performance when it comes to parallelism
    can occur if more threads come into use while the query is running in parallelism.
    The general idea for parallelism is that more CPU process will be used overall
    but for a much shorter duration. If there are more queries that come into the
    queue and need to be run requiring more threads to be active, it may cause the
    CPU to operate at a higher than normal level for a longer period.


    One of the main reasons you will want to make sure your T-SQL is not negatively
    impacting CPU usage has to do with the monetary cost related to CPUs. Since SQL
    Server 2012, the licensing for SQL Server has been related to the number of cores
    using SQL Server. In later versions of SQL Server, that has been modified to be
    the number of cores available to the server even if they are not explicitly allocated
    to SQL Server. One of the common solutions when companies start experiencing performance
    issues is to add more hardware. While this may solve performance issues in the
    short term, it can also be a very expensive solution depending on what hardware
    needs to be added. As the license per core can be over $1000, it is ideal to try
    and minimize the need for additional CPUs by reducing performance bottlenecks
    related to CPU usage.


    There are many aspects to consider when designing your T-SQL queries. Some of
    these factors include being aware of the impact T-SQL can have on the physical
    hardware that runs SQL Server. When writing your T-SQL queries, you will want
    to be mindful of the amount of data being accessed in order to make the best use
    of the memory available. Another added benefit to minimizing the data that is
    decreasing storage resources. Making sure that your statistics are up to date
    and that proper indexes are in place will benefit the CPU usage. Being aware of
    how your queries are affecting your hardware will not only minimize the need for
    additional hardware but also allows your current hardware to better support your
    applications.


    # 7. Execution Plans


    When I first started writing T-SQL, I focused on using the right syntax. I worked
    to try memorizing things like if the GROUP BY clause came before the ORDER BY
    clause. As I became more familiar with writing T-SQL, I had new challenges like
    making sure that my results were accurate. Over time, I got to the point that
    not only was I writing queries with complex logic, I also had to write several
    simpler queries to verify my results. I got to the point where I started debugging
    T-SQL code that had been written by other database developers. I also became responsible
    for researching various application issues.


    In many cases, the result of this research came down to some T-SQL code that was
    running at the same time as an application crash or a spike in hardware usage.
    At this point in time, the pressure was on to figure out what was causing the
    performance issue as quickly as possible. In the beginning, I learned to rely
    on my understanding of the needs of the business and the database design. While
    this can be very helpful, it does require a significant amount of domain knowledge
    that can take years to acquire. There are better, faster, and easier ways to find
    the pain points in your queries.


    In this chapter, you will learn how to view and understand SQL Server execution
    plans. You will also see demonstrations on how your existing and new indexes can
    affect your execution plans. You will also learn about how SQL Server will join
    data together in the execution plan. By the end of this chapter, you will have
    the knowledge to know how to use execution plans to improve the performance of
    your T-SQL.'
