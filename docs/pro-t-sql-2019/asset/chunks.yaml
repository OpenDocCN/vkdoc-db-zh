    and confirmed that this test failed when running the stored procedure in Listing
    [11-2](#480547_1_En_11_Chapter.xhtml#PC2) since the inactive records were also
    returned with the result set.


    The next step is to figure out how to get the unit test to pass. For this example,
    the change is simple. I need to add a line at the end of the stored procedure
    where only active recipes are returned as shown in Listing [11-3](#480547_1_En_11_Chapter.xhtml#PC3).


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetRecipe

    Author:           Elizabeth Noble

    Created Date:     April 20, 2019

    Description: Get a list of all recipes in the database

    Sample Usage:

    EXECUTE dbo.GetRecipe

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetRecipe

    AS

    SELECT

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe

    WHERE IsActive = 1;

    Listing 11-3

    Stored Procedure After Modification

    ```


    Once this stored procedure has been created, you can execute the stored procedure
    to confirm that the new functionality is working as expected. In this case, you
    would want to verify that RecipeIDs 2 and 5 are no longer being returned. Based
    on the preceding code, we would expect the result set from Listing [11-3](#480547_1_En_11_Chapter.xhtml#PC3)
    to match what is shown in Table [11-3](#480547_1_En_11_Chapter.xhtml#Tab3).


    Table 11-3


    All Active Recipes


    | RecipeID | RecipeName | IsActive |

    | --- | --- | --- |

    | 1 | Spaghetti | True |

    | 3 | Spinach Frittata | True |

    | 3 | Roasted Chicken | True |

    | 4 | Dinner Rolls | True |


    We have confirmed that the changes we made to Listing [11-3](#480547_1_En_11_Chapter.xhtml#PC3)
    have correctly removed the inactive recipes from the result set.


    This method of testing your code is a good place to start, but it can be difficult
    to follow consistently. You may have some tables that can store data in various
    states. For instance, if I wanted to find the information about the frequency
    with which a recipe was prepared based on an ingredient on sale, the logic to
    test the results gets more complex. That is where the benefit of using third-party
    tools can be helpful.


    Finding individual sample sets for your data can be time consuming and error prone.
    In addition, you may spend more time trying to find the right test case rather
    than writing or testing the T-SQL code. Another challenge is that you skip over
    important test cases due to the time and energy spent manually finding test data
    that already exists in the database. However, using T-SQL to find specific test
    cases in your data is not your only option. You could manually insert test data
    and perform your tests on the records that have been inserted. This method would
    allow you to determine what were the best scenarios for the code you were testing.
    In most cases, this sample data would not remain in a centralized location. You
    may still need to rewrite specific examples each time you test a new piece of
    functionality.


    There are different types of unit testing tools available to you. Unit testing
    can be handled by adding additional T-SQL objects to your database. Another option
    is to pay for third-party tools that can help manage your unit tests. Another
    option is to use Visual Studio to create and manage unit tests. While all these
    options are valid and have their own benefits, I want to focus on what you can
    accomplish by creating unit tests natively in Visual Studio. Figure [11-1](#480547_1_En_11_Chapter.xhtml#Fig1)
