- fmt: '# 存储过程与MERGE语句


    ```

    CREATE PROCEDURE dbo.RecipeUpsert

    @RecipeID INT,

    @RecipeName VARCHAR(25),

    @RecipeDescription VARCHAR(50),

    @ServingQuantity TINYINT,

    @MealTypeID TINYINT,

    @PreparationTypeID TINYINT,

    @IsActive BIT,

    @DateCreated DATETIME,

    @DateModified DATETIME

    AS

    IF EXISTS (SELECT RecipeID FROM dbo.Recipe WHERE RecipeID = @RecipeID)

    BEGIN

    UPDATE dbo.Recipe

    SET   RecipeName = @RecipeName,

    RecipeDescription = @RecipeDescription,

    ServingQuantity = @ServingQuantity,

    MealTypeID = @MealTypeID,

    PreparationTypeID = @PreparationTypeID,

    IsActive = @IsActive,

    DateModified = @DateModified

    WHERE RecipeID = @RecipeID

    END

    ELSE

    BEGIN

    INSERT dbo.Recipe

    (

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    )

    VALUES

    (

    @RecipeID,

    @RecipeName,

    @RecipeDescription,

    @ServingQuantity,

    @MealTypeID,

    @PreparationTypeID,

    @IsActive,

    @DateCreated,

    @DateModified

    )

    END

    Listing 13-2

    Store Procedure to Insert or Update

    ```


    使用 `IF… ELSE` 语句替代 `MERGE` 语句的逻辑，可以控制 SQL Server 查询中的操作流。如列表[13-2](#480547_1_En_13_Chapter.xhtml#PC2)所示，如果
    `dbo.Recipe` 表中存在该食谱，则记录将更新除 `DateCreated` 外的所有字段。否则，将在 `dbo.Recipe` 中插入一条新记录。


    `MERGE` 语句不仅限于在目标表中插入或更新数据。使用 `MERGE` 语句可以扩展到处理其他场景，例如插入或删除数据。还可以创建 `MERGE` 语句，以便在单个语句中插入缺失的记录、更新更改的记录以及删除孤立的记录。虽然数据修改可以合并为单个语句的一部分，但在使用
    `MERGE` 语句时应谨慎，因为 `MERGE` 语句容易出现性能问题和数据不一致的情况。由于编写 `MERGE` 语句很容易，可能会以对 SQL Server
    不高效的方式比较两个表之间的数据。虽然表只比较一次，但如果比较效率不高，这会对被比较表的性能产生显著影响。也有实例表明，使用筛选索引时可能会发生唯一键冲突。在特定情况下，`MERGE`
    语句也可能导致外键约束违规。这包括使用两个具有外键约束的表，其中外键设置为 `NOCHECK`，然后回滚。建议研究 `MERGE` 语句的已知问题，并进行充分的测试以确认
    T-SQL 代码能按预期工作。列表[13-2](#480547_1_En_13_Chapter.xhtml#PC2)中的代码表明，编写能够处理插入或更新的代码并不复杂。在
    SQL Server 2019 之前，列表[13-1](#480547_1_En_13_Chapter.xhtml#PC1)或列表[13-2](#480547_1_En_13_Chapter.xhtml#PC2)中的代码都可能受到参数嗅探的影响。现在
    SQL Server 2019 具有自适应连接，这应该不再是问题。


    ## 禁用功能


    在设计应用程序时，通常首要目标是专注于满足指定的需求。在许多情况下，产品负责人或业务部门要求的是他们目前需要的功能。然而，这些人并不具备您在应用程序和数据库开发方面的知识。因此，他们可能不会要求具备根据其请求启用或禁用特定功能的能力。在这种情况下，功能可以考虑为用户或角色执行操作的能力，或者应用程序以某种方式运行的能力。可能他们指望着您来了解他们将来可能希望如何使用相同的应用程序。


    设计新应用程序时，最容易被忽视的事情之一是能够为用户角色启用或禁用某些功能。如果表中的一条记录存在意味着它对应用程序可用，那么您就可以判断自己处于这种情况。对于此示例，表
    `dbo.Recipe` 将使用列表[13-3](#480547_1_En_13_Chapter.xhtml#PC3)中的 T-SQL 语句创建。


    ```

    CREATE TABLE dbo.Recipe

    (

    RecipeID          INT         IDENTITY(1,1)     NOT NULL,

    RecipeName        VARCHAR(25)                   NOT NULL,

    RecipeDescription VARCHAR(50)                   NOT NULL,

    ServingQuantity   TINYINT                       NOT NULL,

    MealTypeID        TINYINT                       NOT NULL,

    PreparationTypeID TINYINT                       NOT NULL,

    DateCreated       DATETIME2(7)                  NOT NULL,

    DateModified      DATETIME2(7)                  NOT NULL,

    CONSTRAINT PK_Recipe_RecipeID PRIMARY KEY CLUSTERED (RecipeID),

    CONSTRAINT FK_Recipe_MealTypeID FOREIGN KEY (MealTypeID)

    REFERENCES dbo.MealType (MealTypeID),

    CONSTRAINT FK_Recipe_PreparationTypeID FOREIGN KEY (PreparationTypeID)

    REFERENCES dbo.PreparationType (PreparationTypeID)

    );

    Listing 13-3

    Create dbo.Recipe Table

    ```


    在表[13-1](#480547_1_En_13_Chapter.xhtml#Tab1)中，您可以看到 `dbo.Recipe` 表中的记录。


    表 13-1 食谱表数据


    | RecipeID | RecipeName | DateCreated | DateModified |

    | --- | --- | --- | --- |

    | 1 | Spaghetti | 01/02/2018 | 02/05/2019 |

    | 2 | Lee’s Burgers | 01/03/2018 | 02/05/2019 |

    | 3 | Spinach Frittata | 01/03/2018 | 03/16/2019 |

    | 4 | Dinner Rolls | 02/01/2018 | 03/17/2019 |

    | 5 | Brandin’s Fried Rice | 04/16/2019 | 06/23/2019 |


    例如，如果因为食谱在食谱表中而将其显示在应用程序中，那么在这种情况下，您将无法控制应用程序如何与食谱交互。您阻止食谱被应用程序使用的唯一选择是删除该食谱记录。此操作称为硬删除。


    根据您需要从中删除记录的表，此删除可能会受到外键关系的阻止。在这些场景中，您只有几个可用选项。一个选项是删除外键，然后删除指定的记录。对于此表设计，如果要将
    `Dinner Rolls` 从可用食谱中移除，您需要删除任何引用 `dbo.Recipe` 表的外键，然后删除该记录。列表[13-4](#480547_1_En_13_Chapter.xhtml#PC4)中的查询将删除外键。


    ```

    ALTER TABLE dbo.RecipeIngredient

    DROP CONSTRAINT FK_RecipeIngredient_RecipeID;

    Listing 13-4

    Drop Foreign Key

    ```


    一旦删除了引用 `dbo.Recipe` 表的所有外键，您就需要删除食谱记录以确保它不再可用。列表[13-5](#480547_1_En_13_Chapter.xhtml#PC5)是删除特定食谱的语句。


    ```

    DELETE FROM dbo.Recipe

    WHERE RecipeName = ''Dinner Rolls'';

    Listing 13-5

    Delete Recipe Record

    ```


    结果表将包含表[13-2](#480547_1_En_13_Chapter.xhtml#Tab2)中所示的记录。


    表 13-2 删除 `Dinner Rolls` 后的食谱表'
