- fmt: '#### CHAR and VARCHAR


    Two of the character string data types available are `CHAR` and `VARCHAR`. These
    data types are similar and only vary regarding some specific considerations. The
    data field can be configured to determine how data can be stored. The columns
    can be configured to toggle case sensitivity, accent sensitivity, sensitivity
    for kana, or width sensitivity. The sensitivity that is stored is referred to
    as collation. The type of data that can be stored usually matches the database
    collation. The collation of a column is the same as the database unless there
    is a specific override in place. Both data types are used to store text data,
    and the characters that can be stored in these fields are the same characters
    allowed by the collation of the column.


    When determining which data type to use, keep in mind what kinds of data will
    be stored. If the data will have similar lengths, like phone numbers or zip codes,
    then `CHAR` may be the preferred data type. However, if the column widths can
    vary significantly as is the case with address lines or notes columns, then `VARCHAR`
    will be a better option. Consider limiting the use of `VARCHAR(MAX)` for situations
    where you expect to save more than 8000 characters. If `VARCHAR(MAX)` is specified,
    then the maximum storage size is 2 GB.


    There are some additional considerations to keep in mind when using `CHAR` and
    `VARCHAR`. When using `CHAR` and `VARCHAR` for data definition or variable declaration,
    remember that the default value is one character. However, when using the `CAST`
    or `CONVERT` functions, the default number of characters will be 30. In order
    to minimize truncating data, make sure to always specify the number of characters
    explicitly when using the `CHAR` or `VARCHAR` data types.


    For collations using single-byte encoding characters, such as Latin, the storage
    size in bytes for `CHAR` is equal to the number of characters. When working with
    `VARCHAR`, the number of characters plus 2 additional bytes is equal the total
    number of bytes stored. It is also possible to save multi-byte encoding characters
    in the `CHAR` and `VARCHAR` data types. For both data types, the number of characters
    saved may be less than the total number of bytes.


    Starting with SQL Server 2019, it is now possible to save unicode values in `CHAR`
    or `VARCHAR`. However, this is only possible if UTF-8 encoding is enabled.


    #### TEXT


    The `TEXT` data types have been previously used when needing to store very large
    strings of characters. However, this data type has been deprecated. As this data
    type has been deprecated, you will want to avoid using the `TEXT` data type for
    new development. If you need to use the `TEXT` data you, you will want to consider
    the data type `VARCHAR(MAX)` for new development instead. However, consider if
    you need this functionality or if using `VARCHAR` with a smaller number of characters
    may be more appropriate. The only consideration for using the `TEXT` data type
    going forward should be as needed for backward compatibility of your applications.
    The `TEXT` data type is primarily used in situations with very large strings that
    have variable length. In many cases, this would be where the length of data saved
    is more than 8000 characters. The maximum number of characters that can be saved
    to the `TEXT` data type is 2,147,483,647. There may be occasions where the total
    number of characters that can be stored is less than this number.


    ### Unicode String Data Types


    Prior to SQL Server 2019, any Unicode text data would need to be saved as a special
    data type. This is still true for situations where UTF-8 encoding cannot be enabled.


    #### NCHAR and NVARCHAR


    When using Unicode values, there are a couple of options available. These options
    include storing a fixed or variable-length string. In order to avoid unexpected
    results, you should understand how these data types work if the number of characters
    or collation is not specified.


    Once you have determined that you need to use the `NCHAR` or `NVARCHAR` data types,
    choosing between them gets easy. If the data being stored will have generally
    similar lengths, then the `NCHAR` data type is the correct choice. However, if
    the values stored will vary significantly, then the `NVARCHAR` data type may be
    a better choice. In addition, if the number of characters to be stored is over
    4000, it is recommended to use `NVARCHAR(MAX)`.


    Typically, it is best practice to specify the number of characters when declaring
    the `NCHAR` or `NVARCHAR` data types. The default number of characters for data
    definition or variable declaration is one character for `NCHAR` or `NVARCHAR`.
    However, when using the `CAST` or `CONVERT` function, the default number of characters
    is 30 if none are specified. If a collation is not specified for the `NCHAR` or
    `NVARCHAR` data type, the default database collation will be used.


    Understanding the amount of space required to store this data type also allows
    you to make better decisions about if this is the correct data type and the number
    of characters that need to be stored. Storing `NCHAR` takes up twice as many bytes
    as the string length of the byte pairs, while using `NVARCHAR` the number of bytes
    stored is twice the string length in byte pairs plus 2 bytes.


    #### NTEXT


    Previously, storing very large variable-length Unicode data was accomplished using
    the `NTEXT` data type. If this data type is still in use in your systems, you
    can expect it to store up to 1,073,741,823 characters. However, due the size associated
    with Unicode values, the total length stored may be less. Going forward, it is
    no longer best practice to use this data type. Instead, use the `NVARCHAR(MAX)`
    data type.


    ### Binary String Data Types


    At some point, you may want to store data that is neither a number nor a character.
    In these cases, the use of binary strings may be appropriate. There are a couple
    alternatives when using binary string data types.


    #### BINARY and VARBINARY


    The options available for storing binary string data involved storing either fixed
    length or variable-length character strings. Like the other string data types
    discussed, there are also some considerations when dealing with these data types.


    Using binary strings for storing items that are strings without characters may
    be useful. These can include audio, video, images, or other similar items. Two
    of the available data types are `BINARY` and `VARBINARY`. The best option for
    storing binary strings with similar lengths is the `BINARY` data type. Conversely,
    when storing binary strings with significantly varying lengths of data, the `VARBINARY`
    data type is a better choice. If the total length of the binary string is expected
    to exceed 4000 characters, then it is suggested to use `VARBINARY(MAX)`.


    Using the `BINARY` and `VARBINARY` data types for data definition or variable
    declaration will have a default length of one if the number of characters is not
    specified. When converting the `BINARY` to `VARBINARY` with the `CAST` or `CONVERT`
    function, the default number of characters will be 30. Use caution when converting
    to `BINARY` or `VARBINARY` from a variable with a different length as SQL Server
    may pad or truncate the binary data as necessary.


    The `BINARY` data types stores the same number of bytes as the length of data
    being stored, whereas `VARBINARY` uses 2 bytes plus the same number of bytes as
    the length of data being stored. In both data types, the length can be up to 8000.
    For `VARBINARY(MAX)`, the maximum storage size is 2 GB.


    #### IMAGE


    One of the items that can be stored in a binary string is image. When working
    with images, it is important to consider how this data should be stored and if
    so what data type should be used.


    This `IMAGE` data type has been used to store large variable-length binary data.
    While this data type can have a length of 2,147,483,647, there are times where
    the allowable length stored may be less. In the case of the `IMAGE` data type,
    you should use the `VARBINARY(MAX)` data type going forward as the `IMAGE` data
    type is deprecated.'
