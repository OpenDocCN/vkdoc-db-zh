    ## 名称-值对


    使用 SQL Server 时，目标是考虑基于集合的操作。牢记这一点，您在设计表时需要谨慎。您要确保不要为了保持表宽度小而最小化列的数量。您需要考虑哪些类型的列是有价值的。如果您使用一列来定义值类型，另一列来定义实际值，那么您就设计了一个名称-值对关系。


    这种设计可能更容易理解并创建更简单的表，但这种设计并未充分利用 SQL Server 的优势。使用名称-值对时，使用索引变得越来越困难。因此，SQL Server
    需要查看更多数据才能提取必要的值。


    ## 主键


    在创建和设计表时，您需要考虑将存储什么类型的数据。这不仅与数据的排序方式有关，还与表与其他表的关系有关。在许多情况下，将主键作为编码标准的一部分是理想的做法。虽然主键并非在所有场景中都是必需的，但它应有助于澄清哪些字段用于定义与其他表的关系。


    ## 外键


    SQL Server 是一个关系数据库管理系统，其主要优势之一是表之间的关系。但是，您需要指定表之间的关系，以便 SQL Server 可以确保在表中保存有效数据。发生这种情况时，SQL
    Server 会检查存储值的表与引用表之间的关系。SQL Server 使用外键来实现这一点。因为 SQL Server 知道它可以信任这种关系，所以通常可以更有效地过滤数据并更快地找到数据。因此，在
    T-SQL 编码标准中指定外键关系可能是个好主意。


    ## 非聚簇索引


    我发现非聚簇索引比我预想的更具争议性。使用非聚簇索引的挑战之一是，将数据作为索引的一部分记录或在值更改时更新索引会产生成本。然而，SQL Server 使用索引来快速查找各种查询引用的数据。您需要确保使用非聚簇索引的好处大于成本。


    您可以通过确保正确定义索引来实现这一点。由于维护索引有相关成本，您需要确保您创建的任何索引都被可用查询定期使用。您可能还希望定义如何确定哪些列应成为索引的一部分，哪些列应作为索引的一部分被提取回来。


    ## 约束定义


    您的表可以包含一列或多列。每列都保存某种类型的信息。对于该信息，您可能知道只有某些值可以存储在该列中。在某些情况下，使用外键可以保持数据完整性，但在其他情况下，使用外键可能没有意义。在这些情况下，您可以指定记录上的约束。该约束可以限制可以在这些列中存储的信息类型。


    但是，强制 SQL Server 管理这些约束会给 SQL Server 带来额外负担。因此，您可能需要考虑尽量减少使用约束来限制可以存储在数据库中的数据类型，并依赖应用程序代码来提供良好的数据。约束的另一个用途是为某些字段指定默认值。这可能适用于您知道创建记录时最可能存在值的列。例如，您可能希望为
    `IsActive` 列指定默认值 `True`，因为大多数创建的记录在创建时都是活动的。同样，这可以由应用程序处理，但您也可以决定将此作为 T-SQL 编码标准的一部分来强制执行。


    考虑鼓励良好设计实践的 T-SQL 编码标准非常重要。这包括确定您将多大程度上遵守 ANSI 标准。还有其他主题需要包括，例如选择作为数据库设计一部分允许的最小范式级别。此决定可能会影响
    T-SQL 设计的其他方面，包括主键、外键和非聚簇索引。您可能还会考虑如何处理约束。一旦确定了为良好 T-SQL 设计实践而要强制执行的 T-SQL 编码标准，您可能还想决定关于
    T-SQL 整体性能需要哪些编码标准。


    # T-SQL 性能


    确定了与数据库设计和实施相关的 T-SQL 编码标准后，您将需要确定需要哪些标准来帮助最小化和解决可能出现的任何性能问题。这包括创建有助于确保 SQL Server
    不会被不必要信息拖累的 T-SQL 编码标准。您还需要考虑如何编写或不编写 T-SQL 代码以最小化性能开销。'
- fmt: '#### Select Necessary Data


    SQL Server can store quite a bit of data, and SQL Server can also retrieve large
    quantities of data. There are many scenarios where applications are retrieving
    data. When first learning about a database and the associated tables, it is often
    tempting to select all the columns in a table. While this is the easiest method
    to return data, it is not usually ideal.


    First is the syntax used to select all rows by using the asterisks. The issue
    with this method is if the columns in the underlying object change, the code may
    not work as expected. Even worse, the code may not provide an error and users
    would not know they were getting bad data.


    The second issue that can happen is more common. When you pull back all columns,
    there is considerably more work put on SQL Server. Not only must SQL Server return
    everything for all rows of data returned, but it is likely that SQL Server will
    not be able to use any indexes to return this data. This is the equivalent to
    reading this entire book each time you want to study one specific section. You
    would learn what you needed, but you would also spend a considerable amount of
    time reading topics that you were mostly likely going to disregard since they
    were not relevant for your needs at that time.


    #### Sargeable


    You want SQL Server to be able to easily search the database to find the information
    you are trying to access. There are some ways that you can write T-SQL that can
    let SQL Server take advantage of indexes and quickly find the necessary data.
    However, there are other methods of writing T-SQL that can give the same results
    but may take longer and require SQL Server to look through more data. The difference
    between these two scenarios is that the first scenario refers to making sure your
    T-SQL is sargeable, whereas the second option is when the T-SQL is not sargeable.
    This usually happens in the `WHERE` clause of the T-SQL statement. In `Listing
    9-1`, I have written a query to find all recipes that were created in August 2019.


    ```sql

    SELECT RecipeName, RecipeDescription

    FROM dbo.Recipe

    WHERE DATEPART(MM, DateCreated) = 8

    AND DATEPART(YY, DateCreated) = 2019

    ```


    `Listing 9-1`

    Query Using Non-sargeable Criteria


    You can see that I have used the `DATEPART` function on the date created to determine
    both the month and the year each record was created. In order for SQL Server to
    determine which records are in August 2019, SQL Server will need to check every
    record in the table. You can see this is true in the execution plan in `Figure
    9-1` with the `Index Scan`.


    ![../images/480547_1_En_9_Chapter/480547_1_En_9_Fig1_HTML.jpg](images/480547_1_En_9_Chapter/480547_1_En_9_Fig1_HTML.jpg)


    `Figure 9-1`

    Execution Plan from Non-sargeable Criteria


    When execution plans are this simple, it can sometimes be difficult to get an
    idea of how performant these queries really are. One way that we can get a better
    idea is to look at the properties associated with this execution plan. There is
    a lot of information in `Figure 9-2`, but we will focus on the `Number of Rows
    Read`.


    ![../images/480547_1_En_9_Chapter/480547_1_En_9_Fig2_HTML.jpg](images/480547_1_En_9_Chapter/480547_1_En_9_Fig2_HTML.jpg)


    `Figure 9-2`

    Properties for `Index Scan` from Non-sargeable Criteria


    The number of rows read for the `Index Scan` from `Listing 9-1` is 32,242. To
    get a better idea of whether this query is performing well, I will also write
    a query with sargeable values. In `Listing 9-2`, I am still querying the `dbo.Recipe`
    table for records created in August 2019, but I am now using greater than or equal
    to and less than to specify an exact date range.


    ```sql

    SELECT RecipeName, RecipeDescription

    FROM dbo.Recipe

    WHERE DateCreated >= ''8/1/19''

    AND DateCreated < ''9/1/19''

    ```


    `Listing 9-2`

    Query Using Sargeable Criteria


    While this may look less clean or harder to read, the importance is in writing
    a query where SQL Server can quickly determine what records meet the criteria
    requested in the query. `Figure 9-3` shows the execution plan for the query from
    `Listing 9-2`.


    ![../images/480547_1_En_9_Chapter/480547_1_En_9_Fig3_HTML.jpg](images/480547_1_En_9_Chapter/480547_1_En_9_Fig3_HTML.jpg)


    `Figure 9-3`

    Execution Plan from Sargeable Criteria


    At a glance, the execution plan in `Figure 9-3` looks very similar to the execution
    plan in `Figure 9-1`. When comparing execution plans that look similar, they can
    be said to have the same shape. While these execution plans have a similar shape,
    the items that make up the execution plan are different. In `Figure 9-1`, we saw
    there was an `Index Scan`. In `Figure 9-3`, we can see that this execution plan
    is using an `Index Seek`. There is also a thinner line between the `Index Seek`
    from the `SELECT` in `Figure 9-3` than there is in the `Index Scan` from the `SELECT`
    in `Figure 9-1`. All of this is a graphical representation of the overall performance
    of each query. However, we can also get some facts and figures to compare the
    performance to the queries in `Listings 9-1` and `9-2`. In `Figure 9-2`, we found
    the actual number of rows read was 32,242. We can compare this value to the actual
    number of rows read from `Figure 9-4`.


    ![../images/480547_1_En_9_Chapter/480547_1_En_9_Fig4_HTML.jpg](images/480547_1_En_9_Chapter/480547_1_En_9_Fig4_HTML.jpg)


    `Figure 9-4`

    Properties for `Index Seek` from Sargeable Criteria


    The actual number of rows read for `Listing 9-2` is 1 as shown in `Figure 9-4`.
    Comparing 1 row read for `Listing 9-2` to 32,242 rows read for `Listing 9-1`,
    it becomes very clear which query is more efficient.


    We can also look at the total CPU usage for both queries to see how each query
    performs. If I run both queries in `Listings 9-1` and `9-2` at the same time,
    98% of the total execution plan of both queries is spent on the query in `Listing
    9-1`. I can also use `SET STATISTICS TIME ON` to find the CPU time and elapsed
    time. The CPU time is the total amount of time the query execution spent on the
    CPU or CPUs. The elapsed time is the total time for the query to execute. I ran
    both queries several times and found that the average CPU time for `Listing 9-1`
    was 15 milliseconds and the average elapsed time for `Listing 9-1` was 17 milliseconds.
    Each time the CPU time and elapsed time for `Listing 9-2` was 0 millisecond. Comparing
    both the CPU time and the elapsed time, we can clearly see that `Listing 9-2`
    performs better than `Listing 9-1`. It is also important to note that the total
    elapsed time could be less than the total CPU time if there are multiple CPUs.'
