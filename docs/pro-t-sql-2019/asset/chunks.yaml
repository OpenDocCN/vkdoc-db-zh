- fmt: 'While these updates could be done in a with hard-coded values, there are times
    that it may be better to join the table you are updating to other related tables.
    This type of interaction between the tables may make it easier to perform your
    updates.


    You could use the ingredients in the recipe to determine how to update the meal
    types on your recipes. It helps to think about the logic you would want to use.
    If you wanted to update the meal type to a generic category based upon the main
    ingredient per recipe, you would first need to figure out what the `main ingredient`
    was per recipe. You would also need to determine general categories for your `meal
    type`. In the preceding scenario, I might have `Meat`, `Egg`, `Fruit`, `Vegetable`,
    `Grain`, and `Sugar`. Once I have both pieces of information, I may create a temporary
    table to map the ingredients to a specific category, unless I have designed the
    `ingredient table` to record that specific category per ingredient.


    In general, I found anytime that I am dealing with data one record of the time,
    I am often having to perform some type of manual interaction. I have found that
    manual interactions are the most likely to have issues or errors. I much prefer
    writing code in data sets, so that I can be more assured that my logic is being
    consistent.


    ## Writing Code for Data Sets


    Previously, I discussed how to start thinking about your data as data sets instead
    of individual records. I frequently use data sets when selecting, updating, or
    deleting data. While most application code may insert single records at a time,
    there are many common scenarios where inserting data as data set may also be helpful.
    In this next section, I will walk through various scenarios where you may want
    to think about your data as sets instead of individual records.


    The most frequent use for data sets is when you want to view a portion of data.
    Ideally, these data sets are selected based upon specific criteria. This is not
    only good for performance but also can help make sure you are only looking at
    the specific data that you want. For most scenarios, it does not even make sense
    to retrieve and display one individual record at a time. Oftentimes, if you find
    yourself in a situation where you are selecting one record at a time, it is a
    good indication that you may want to see if that `T-SQL` code can be rewritten
    to use set-based logic.


    There are some more complex ways that queries can be selected. In some cases,
    you may find yourself wanting to combine or compare two different data sets. If
    you want to join two data sets together, you have the option of `UNION` or `UNION
    ALL`. There is only one small but important difference between the two of these.
    When you `UNION` data, each record returned will be distinct between the `SELECT`
    statements that are joined together. `Listing 5-1` shows a `UNION` between two
    queries.


    ```sql

    SELECT IngredientID, IngredientName

    FROM dbo.Ingredient

    WHERE IngredientName LIKE ''%Tomato%''

    UNION

    SELECT IngredientID, IngredientName

    FROM dbo.Ingredient

    WHERE Measurement = ''Ounces''

    ```

    `Listing 5-1` `Union of Two Queries`


    `Table 5-19` shows the data currently stored for ingredients. In `Table 5-19`,
    I have five ingredients that are all active.


    `Table 5-19`


    `General Ingredients`


    | `IngredientID` | `IngredientName` | `Measurement` | `IsActive` |

    | --- | --- | --- | --- |

    | 1 | Italian Sausage | Pound | 1 |

    | 2 | Tomato Sauce | Tablespoon | 1 |

    | 3 | Diced Tomatoes | Ounces | 1 |

    | 4 | Tomato Paste | Ounces | 1 |

    | 5 | Minced Garlic | Ounces | 1 |


    Using `Table 5-20`, the first query from the preceding figure would return the
    following values.


    `Table 5-20`


    `Ingredients with Tomatoes`


    | `IngredientID` | `IngredientName` |

    | --- | --- |

    | 2 | Tomato Sauce |

    | 3 | Diced Tomatoes |

    | 4 | Tomato Paste |


    The data from the second query from `Table 5-21` would be the following.


    `Table 5-21`


    `Ingredients Measured in Ounces`


    | `IngredientID` | `IngredientName` |

    | --- | --- |

    | 3 | Diced Tomatoes |

    | 4 | Tomato Paste |

    | 5 | Minced Garlic |


    A union would give us the following result set as shown in `Table 5-22`.


    `Table 5-22`


    `Union of Results from Tables 5-21 and 5-22`


    | `IngredientID` | `IngredientName` |

    | --- | --- |

    | 2 | Tomato Sauce |

    | 3 | Diced Tomatoes |

    | 4 | Tomato Paste |

    | 5 | Minced Garlic |


    However, for a `UNION ALL`, every record returned in both queries will be returned
    regardless of whether there are duplicate values in the multiple queries. If we
    were to run the same query but use a `UNION ALL`, the `T-SQL` code would look
    like `Listing 5-2`.


    ```sql

    SELECT IngredientID, IngredientName

    FROM dbo.Ingredient

    WHERE IngredientName LIKE ''%Tomato%''

    UNION ALL

    SELECT IngredientID, IngredientName

    FROM dbo.Ingredient

    WHERE Measurement = ''Ounces''

    ```

    `Listing 5-2` `Union All of Two Queries`


    Since we are returning all data, even if they are duplicate, the result for a
    `UNION ALL` would look like the values in `Table 5-23`.


    `Table 5-23`'
