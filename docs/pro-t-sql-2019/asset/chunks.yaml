    to the GitHub server. In Figure [10-15](#480547_1_En_10_Chapter.xhtml#Fig15),
    you can see the window that appears after clicking the hyperlink to Sync these
    changes.


    I have the option of selecting either Azure DevOps or GitHub. For GitHub, there
    is an option to Publish this repository or Push this project to Remote Repository.
    For my example, I will Publish this repository to GitHub. The act of publishing
    this repository will create a new repository. I have specified the new repository
    name on GitHub as MenuDB. I have provided a description for the GitHub repository.
    I have also specified that this should be a private repository. Once I select
    publish, these changes will be synced to GitHub and available to myself and any
    other accounts that are added as contributors to this repository.


    ![../images/480547_1_En_10_Chapter/480547_1_En_10_Fig15_HTML.jpg](images/480547_1_En_10_Chapter/480547_1_En_10_Fig15_HTML.jpg)


    Figure 10-15


    Select Where to Sync the Solution


    It may be worth noting that the same options shown earlier are the same options
    we were able to select previously in Figure [10-3](#480547_1_En_10_Chapter.xhtml#Fig3).
    The Synchronization submenu will update and show you that the repository was successfully
    created as shown in Figure [10-16](#480547_1_En_10_Chapter.xhtml#Fig16).


    ![../images/480547_1_En_10_Chapter/480547_1_En_10_Fig16_HTML.jpg](images/480547_1_En_10_Chapter/480547_1_En_10_Fig16_HTML.jpg)


    Figure 10-16


    Database Project Has Been Added to GitHub Repository


    You can see that the repository has been successfully created. This window also
    shows you that there are no incoming or outgoing commits for this project. Once
    you get the repository created, you will want to get accustomed to pulling incoming
    changes before you begin making changes to the database objects. Pulling changes
    down from the centralized Git repository will allow you to have the most updated
    code before you begin making changes. After pulling down incoming commits, you
    can then push outgoing commits. I am also unable to commit any changes as all
    changes have already been committed.


    When setting up a new database project and a repository, there are several items
    that are getting created. I have already confirmed that I have a local Git repository.
    In the preceding steps, I have published this same repository to GitHub. Now I
    have both a local and a remote repository for my database project. Previously
