- fmt: "Part of determining your deployment method will include understanding the\
    \ current process you use to deploy your database code. Right now, your business\
    \ may have scripts that are manually deployed. Depending on your organizational\
    \ structure, you may have an environment where those scripts can be deployed at\
    \ any point in time to a specific environment or you may have conditions about\
    \ what days of the week those `T-SQL` scripts can be deployed. If there are certain\
    \ days that you can deploy to various environments, this is known as a gated deployment.\
    \ You may be using database projects in a version control system. In Chapter [10](#480547_1_En_10_Chapter.xhtml),\
    \ the topic of branching and merging was covered. Your company may only use one\
    \ branch for your database project. All development work by all individuals is\
    \ done in the same place. On the other hand, your company may utilize branching.\
    \ This is where your developers use a copy of the main code base and make changes\
    \ to that copy. Some companies may choose to deploy directly from a branch. This\
    \ can be particularly helpful if you are not writing your database code to be\
    \ able to be deployed at any point in time. Other companies particularly those\
    \ who are writing code to be deployed at any point in time may choose to have\
    \ all branches merged back to master or the main branch once the work is complete.\
    \ In this case, all deployments would be from the main branch.\n\nSometimes how\
    \ teams manage their workflows is determined by the frequency of their deployments.\
    \ For many companies, the goal is to be able to deploy frequently. However, that\
    \ does not mean that every company is ready for that frequency of deployments.\
    \ For the development teams that are writing code in a more Kanban style, there\
    \ may be no pattern for when code is deployed to Production. Other teams may have\
    \ a set cadence or sprint cycle for when they deploy their code. These Sprint\
    \ cycles can range from weeks to months. If your company is still in the process\
    \ of determining how often to release code, I would caution against longer Sprint\
    \ cycles as it often means more changes are being deployed at once. This increases\
    \ the risk of having issues in your deployment.\n\nYou will also want to understand\
    \ the volume of database changes happening on an average deployment. You may find\
    \ that on average there are not that many database changes getting deployed every\
    \ Sprint. If this is the case, you will want to make sure you do not end up having\
    \ a deployment with a significant number of database changes. When there are multiple\
    \ changes happening to the database during a single deployment, there is not only\
    \ a greater risk of having a bug, but there is also the possibility depending\
    \ on your deployment method that one change to `T-SQL` code may overwrite another.\n\
    \nBefore getting into two of the main methods of deploying database code, there\
    \ is one additional factor you should consider. While we all want every database\
    \ deployment to go out and work as expected, there may come a time where you need\
    \ to undo or roll back one or more database changes from a deployment. I would\
    \ recommend that if you do not have a rollback strategy in place, now is a good\
    \ time to start considering a solid rollback strategy. Often when a rollback is\
    \ needed is not the time that you want to start figuring out how to quickly and\
    \ effectively roll back your `T-SQL` code. Having a method to do this repeatedly\
    \ can significantly help increase the confidence you have in your deployments.\
    \ Your company may use rollback scripts to streamline when you need to revert\
    \ to the previous version of database code. If you are using version control,\
    \ you have the option to revert to a different version of your database code.\
    \ To build upon that if you are using continuous integration, you may have a prepackaged\
    \ version of the previous database code that can be deployed against your Production\
    \ database in a manner of minutes.\n\nThis ultimately leads us to consider the\
    \ deployment methods commonly used for database deployments. One such method consists\
    \ of bundling all the scripts that will be deployed together. This is considered\
    \ a migration-based approach; another option is to take everything that is existing\
    \ in source control and treated as the source of truth for your database. When\
    \ using this type of method, whatever database you are deploying to will be overwritten\
    \ to match the database objects that exist in source control. This is commonly\
    \ called a state-based deployment. The information collected so far about who\
    \ is developing database code, how those changes are coded and managed, and the\
    \ frequency of your deployments can help you determine whether a migration or\
    \ state-based approach is best for you.\n\nNow that we know what the migration-based\
    \ deployment method is, we can start trying to determine if that is the best method\
    \ for our deployments. One of the main benefits of using the migration-based approach\
    \ is that you can control exactly what is deployed to your database. This method\
    \ of deployment often involves having all the scripts that will be deployed saved\
    \ in a single location, and these scripts are usually named in a way that allows\
    \ them to be deployed in a specific order. This can make your deployments easy\
    \ to manage. You can quickly look at the folder where the scripts are saved and\
    \ know exactly what is getting deployed.\n\nIf you use this deployment method,\
    \ I recommend that you have a separate folder that keeps track of the rollback\
    \ scripts that need to be deployed and the order in which these rollback scripts\
    \ should be deployed. This will not only help if you have to roll back on deployment\
    \ night, but it should help you quickly find the code that needs to be rolled\
    \ back if you need to roll back several deployments at once. There are some limitations\
    \ with the migration-based deployment method. One of the main challenges is if\
    \ you need to roll back a specific piece of code. Depending on how your source\
    \ control is managed, it may not be as simple as viewing the history of that database\
    \ object and restoring a previous version from source control.\n\nUsing a migration-based\
    \ deployment method can be set up manually. The rest of your team and you can\
    \ write your `T-SQL` code files and save them in numerical order. This really\
    \ consists of creating a script in `SQL Server Management Studio` and saving the\
    \ file with a specific naming convention. This naming convention would include\
    \ specifying the deployment order such as prefixing the filename with the step\
    \ number to indicate the deployment order.\n\nIf I were to update the query in\
    \ Listing [12-1](#480547_1_En_12_Chapter.xhtml#PC1) to match the query in Listing\
    \ [12-6](#480547_1_En_12_Chapter.xhtml#PC6), I would create a SQL file with these\
    \ changes. I may choose to name this file `001_20190723-2023_ActiveRecipe.sql`.\
    \ However, I may then receive a request to make additional modifications to the\
    \ same stored procedure. In this case, I need to remove the date columns from\
    \ the stored procedure `dbo.GetRecipe`. In Listing [12-7](#480547_1_En_12_Chapter.xhtml#PC7),\
    \ you can see the new `T-SQL` code.\n\n```\n-- \nGO\nGO\nPRINT N'Altering [dbo].[GetRecipe]...';\n\
    GO\n/*-------------------------------------------------------------*\\\nName:\
    \             dbo.GetRecipe\nAuthor:           Elizabeth Noble\nCreated Date:\
    \     April 20, 2019\nDescription: Get a list of all recipes in the database\n\
    Updated Date:     July 23, 2019\nDescription: Remove inactive recipes\nUpdated\
    \ Date:     July 23, 2019\nDescription: Remove DateCreated and DateModified columns\n\
    Sample Usage:\nEXECUTE dbo.GetRecipe\n\\*-------------------------------------------------------------*/\n\
    ALTER PROCEDURE dbo.GetRecipe\nAS\nSELECT\nRecipeID,\nRecipeName,\nRecipeDescription,\n\
    ServingQuantity,\nMealTypeID,\nPreparationTypeID,\nIsActive\nFROM dbo.Recipe\n\
    WHERE IsActive = 1;\nGO\nListing 12-7\nSample Script for Migration-Based Deployment\n\
    ```"
