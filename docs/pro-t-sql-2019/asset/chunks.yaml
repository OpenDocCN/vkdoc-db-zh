  trans: '

    # 第二部分 构建高性能 T-SQL


    # 5. 基于集合的设计


    了解如何设计 T-SQL 是编写专业代码的基础之一。一旦你能够编写易于理解的 T-SQL 代码，就可以开始专注于提升 T-SQL 代码的性能。如果你是在工作中非正式地学习的
    T-SQL，或者你的主要职能是为软件应用程序编写代码，那么在编写 T-SQL 代码时，你可能不会刻意考虑基于集合的设计。你或许是一位经验丰富的数据库开发人员，并希望了解更多关于基于集合设计的知识。


    在本章中，我将讨论如何处理数据。第一步是熟悉与数据交互的各种方式。一旦你理解了与数据交互的不同方式，就要开始思考如何为查询准备最佳格式的数据。然后，你应该能够以利用
    SQL Server 天然优势的方式来编写这些查询。


    ## 基于集合的设计简介


    我们生活在一个数据无处不在的世界里。我们所做的几乎任何事情都可能产生需要保存的数据。收集数据的第一个挑战是确定如何存储数据。第二个挑战是如何访问这些数据。你使用
    SQL Server 的原因之一就是为了利用数据之间的关系。这是因为 SQL Server 是一个关系数据库管理系统（RDBMS）。虽然我们的重点是编写 T-SQL，但理解数据在
    SQL Server 中的存储方式也很重要。


    回到我以食谱数据库为例，让我们看看这类信息可以关联哪些类型的数据：


    *   名称

    *   成本

    *   配料

    *   份数

    *   准备时间

    *   烹饪时间

    *   菜系类型

    *   烹饪方法

    *   餐食类型


    我可以根据这些数据如何描述其他项目来对它们进行分组。例如，我可以像表 5-1 那样将关于食谱的信息分组。


    表 5-1


    配料的通用属性


    | 食谱 | 配料 | 烹饪方法 |

    | --- | --- | --- |

    | 名称 | 名称 | 名称 |

    | 菜系 | 计量单位 |   |

    | 份数 | 成本 |   |

    | 配料 |   |   |

    | 配料数量 |   |   |


    信息分组后，数据就可以按这些分组进行存储。如果我开始为配料填充数据，数据可以存储在一个表中，如表 5-2 所示。


    表 5-2


    通用配料信息


    | 配料名称 | 单位 | 计量 | 成本 |

    | --- | --- | --- | --- |

    | 番茄丁 | 28 | 盎司 | $1.84 |

    | 番茄膏 | 10 | 汤匙 | $0.79 |

    | 番茄酱 | 8 | 盎司 | $0.55 |

    | 蒜末 | 60 | 汤匙 | $5.99 |


    表中整理的数据是一个数据集。查看第一列“配料名称”中的数据，有三条记录包含“番茄”这个词。还有两行是以“盎司”为单位计量的。


    使用 SQL Server 时，可能困难的一点是基于集合的事务处理。人们从其他领域和职业转向 SQL Server，包括软件开发、网络、系统管理或一般业务运营。在所有这些情况下，一个人可能还没有培养出基于集合操作进行思考的技能。


    什么是基于集合的操作？它们意味着什么？为什么如此重要？基于集合的操作是从块或段的角度来看待数据，而不是逐行查看记录或数据。为了向你展示一个对比，表 5-3
    单独显示了每条数据记录。


    表 5-3


    按单行显示的配料


    | 配料名称 |

    | --- |

    | 番茄丁 |


    | 配料名称 |

    | --- |

    | 番茄膏 |


    | 配料名称 |

    | --- |

    | 番茄酱 |


    | 配料名称 |

    | --- |

    | 蒜末 |


    如果我以这种方式从表 5-3 中选择数据，效率将远低于尝试将数据作为一个集合来选择。表 5-4 显示了将数据作为一个集合来选择的效果。


    表 5-4


    作为一个数据集的配料


    | 配料名称 |

    | --- |

    | 番茄丁 |

    | 番茄膏 |

    | 番茄酱 |

    | 蒜末 |


    这样查看数据还可以让你看到数据之间的相似之处。


    你需要弄清楚如何同时处理多行来实现一个过程或任务。你要考虑对所有这些行同时执行相同的操作。在上面的例子中，我可以快速确定哪些记录共同包含“番茄”这个词。数据给了我们一个提示，如果我们想要查看或更改与番茄配料相关的信息，可能不止一种方法可以实现这个目标。这种场景可能表明，你的逻辑应该以这样的方式构建：它能够通过使用代数逻辑而非硬编码值来正确运行。

    '
- fmt: '# 过程式代码与集合式设计


    过程式代码被描述为不仅告诉系统要做什么，还要告诉它怎么做。在许多公司中，软件开发人员或软件工程师负责编写 `T-SQL` 代码。我发现的一件事是，当编写应用程序代码时，这种代码被设计为最适合过程式处理。大部分代码在迭代处理数据时表现良好。在过程式应用程序代码和数据库
    `T-SQL` 代码之间切换上下文的成本可能很高。总体而言，编写基于集合的代码所引发的思维过程与迭代处理代码非常不同。


    为什么我们甚至有兴趣使用基于集合的设计？为什么它值得这么麻烦？这与 `SQL Server` 引擎的工作方式以及如何检索查询数据有关。当发出查询时，`SQL
    Server` 需要检索数据记录。`SQL Server` 会前往缓冲区缓存查看这些数据是否可用。图 5-1 显示了如果数据在缓冲池中缓存，`SQL Server`
    作为查询请求的一部分检索数据所经历的过程。


    ![../images/480547_1_En_5_Chapter/480547_1_En_5_Fig1_HTML.jpg](images/480547_1_En_5_Chapter/480547_1_En_5_Fig1_HTML.jpg)


    **图 5-1** 从单个查询中检索数据


    如果查询是按过程式编写的，即每次检索新行时都执行，那么 `SQL Server` 将需要为每条记录都去访问缓冲区缓存。一次检索单行的过程会增加 `SQL Server`
    的工作负载。在图 5-2 中，您可以看到一次检索一行所需的额外工作负载。


    ![../images/480547_1_En_5_Chapter/480547_1_En_5_Fig2_HTML.jpg](images/480547_1_En_5_Chapter/480547_1_En_5_Fig2_HTML.jpg)


    **图 5-2** 当查询一次检索一行时的数据检索


    图 5-2 显示了在数据存储在缓冲池中的情况下，一次检索单个记录的查询过程。但是，如果查询是为基于集合的设计编写的，那么将只有一次对缓冲池的调用。在小型数据集上，这可能不会产生很大的影响。当处理数千或数百万条记录的数据集时，执行时间的差异会非常显著。这里还涉及其他因素，这与数据如何存储在缓冲区缓存中有关。当
    `SQL Server` 执行查询并取回数据时，它只取回存在于缓冲区缓存中的数据。从 `SQL Server 2019` 开始，有一个称为混合缓冲池的功能。混合缓冲池允许将存储在
    `RAM` 和持久内存（`PMEM`）中的数据都视为缓冲区缓存的一部分。否则，如果数据在 `RAM` 或 `PMEM` 中不可用，那么 `SQL Server`
    将需要访问磁盘来检索数据。检索到的数据随后将被存储在内存中。图 5-3 显示了这些数据如何从磁盘检索并存储到缓冲区缓存中。


    ![../images/480547_1_En_5_Chapter/480547_1_En_5_Fig3_HTML.jpg](images/480547_1_En_5_Chapter/480547_1_En_5_Fig3_HTML.jpg)


    **图 5-3** 从磁盘到缓冲区缓存的数据检索


    当查询执行时，该数据在那个时间点可能甚至不在缓冲区缓存中。`SQL Server` 必须访问磁盘 `I/O` 子系统来查找该数据。一旦找到该数据，该数据就会被存储在缓冲区缓存中。


    如果每一行都被单独拉取，那么对磁盘 `I/O` 的调用就必须为每条记录单独发生。从缓冲区缓存拉取数据并非瞬时完成。从磁盘 `I/O` 获取数据并将其放入缓冲区缓存以供查询检索，则更加耗费资源。最终，这创造了一种场景，您希望专注于基于集合的设计，以获得执行查询时尽可能最佳的性能。


    ## 以数据集方式思考


    既然我已经讨论了什么是数据集，我希望您能习惯于以拥抱数据集的方式来思考数据。在开始编写 `T-SQL` 代码之前，首先理解存储了什么信息、数据如何存储，以及按相似特征分组选择或使用这些数据，可能会节省您的时间和精力。当底层表被设计为最适合数据集时，处理数据集也更容易完成。


    真正的诀窍是学习如何以数据集的方式思考。这意味着如何考虑一次处理多条记录，而不是单条记录。这确实需要一种更少算术性、更多代数性的方法。通常，执行 `SELECT`
    语句是熟悉基于集合的事务的最简单方式。考虑表 5-5 中所示的数据。


    **表 5-5** 成分数据


    | 成分名称 | 单位数量 | 计量单位 | 成本 |

    | --- | --- | --- | --- |

    | Diced Tomatoes | 28 | Ounces | $1.85 |

    | Tomato Paste | 10 | Tablespoons | $0.79 |

    | Tomato Sauce | 8 | Ounces | $0.55 |

    | Minced Garlic | 60 | Tablespoon | $5.99 |


    这是一个食谱可能成分的列表，以及单位数量、计量单位和每单位成本。通过查看前面的数据，我可以发现某些列中数据之间的相似性。


    我可以创建一个数据集，获取所有计量单位为汤匙的记录。这些记录如表 5-6 所示。


    **表 5-6** 计量单位为汤匙的成分


    | 成分名称 | 单位数量 | 计量单位 | 成本 |

    | --- | --- | --- | --- |

    | Tomato Paste | 10 | Tablespoons | $0.79 |

    | Minced Garlic | 60 | Tablespoon | $5.99 |


    我也可以获取所有成本低于 $1.00 的成分的数据集，如表 5-7 所示。


    **表 5-7** 成本低于 $1.00 的成分


    | 成分名称 | 单位数量 | 计量单位 | 成本 |

    | --- | --- | --- | --- |

    | Tomato Paste | 10 | Tablespoons | $0.79 |

    | Tomato Sauce | 8 | Ounces | $0.55 |


    现在我有了一个数据集，我可以考虑如何与该数据集进行交互。知道我可以将相似的数据分组并对整个数据集执行操作，是有效使用 `T-SQL` 代码的关键。如果我想找出每单位的成本，我可以将成本除以单位数量。要为每条记录计算每单位成本，我可以手动为每条记录计算。在这种情况下，番茄酱的每单位成本将是
    $0.79/10。这将得到每汤匙 $0.08 的结果。或者，我可以使用数据集中的列进行相同的计算。要作为一个数据集计算每单位成本，我可以指定 `Cost/Unit(s)`。以这种方式处理数据的结果将是一个类似于表
    5-8 所示的输出。


    **表 5-8** 成分每单位成本的计算值


    | 成分名称 | 每单位成本 |

    | --- | --- |

    | Tomato Paste | $0.08 per tablespoon |

    | Tomato Sauce | $0.07 per ounce |


    使用 `SQL Server` 最大的挑战之一是学习如何以数据集的方式思考。思考数据集最简单的方法是将检索数据的过程视为对一个列或列子集执行操作。如果您能找到某种模式来对数据的子集执行该操作，那么您就是在以数据集的方式思考。


    查看成分表，我可以创建一个数据集，其中所有成分名称中都包含“番茄”这个词。`Ingredient` 表中所有可用的值都在表 5-9 中。


    **表 5-9** 成分的一般列表'
  raw: 'Procedural code is described as not only telling a system what to do but how
    to do it. In many companies the software developers or software engineers are
    the ones responsible for writing the T-SQL code. One of the things I have found
    is when writing application code, this code is designed to work best procedurally.
    Much of the code performs well when interacting with data iteratively. The cost
    of context switching between procedural application code and database T-SQL code
    can be significant. Overall the process of writing set-based code causes a very
    different thought process than dealing with the code iteratively.


    Why are we even interested in using set-based design? Why is it worth the trouble?
    This has to do with how the SQL Server engine works and how data is retrieved
    for queries. When a query is issued, SQL Server needs to retrieve the data record.
    SQL Server goes to the buffer cache to see if this data is available. Figure [5-1](#480547_1_En_5_Chapter.xhtml#Fig1)
    shows the process SQL Server goes through to retrieve data as part of a query
    request if the data is cached in the buffer pool.


    ![../images/480547_1_En_5_Chapter/480547_1_En_5_Fig1_HTML.jpg](images/480547_1_En_5_Chapter/480547_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Data Retrieval from a Single Query


    If the query is written procedurally, that is, to execute every time a new row
    is retrieved, SQL Server will need to go to the buffer cache for each record.
    The process of retrieving a single row at a time can increase the workload on
    SQL Server. In Figure [5-2](#480547_1_En_5_Chapter.xhtml#Fig2), you can see the
    additional workload required to retrieve one row at a time.


    ![../images/480547_1_En_5_Chapter/480547_1_En_5_Fig2_HTML.jpg](images/480547_1_En_5_Chapter/480547_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Data Retrieval when Query Retrieves One Row at a Time


    Figure [5-2](#480547_1_En_5_Chapter.xhtml#Fig2) shows the query process to retrieve
    a single record at a time with the data stored in the buffer pool. However, if
    the query is written for set-based design, then there will be one call to the
    buffer pool. On a small set of data, this may not be a very large impact. When
    dealing with data sets of thousands or millions of records, the difference in
    execution time can be drastic. There is also something else at play here that
    has to do with how the data is stored in the buffer cache. When SQL Server executes
    a query and pulls back data, it only pulls back data that exists in the buffer
    cache. Starting in SQL Server 2019, there is a feature called the hybrid buffer
    pool. The hybrid buffer pool allows both data stored on RAM and in persistent
    memory (PMEM) to be treated as being part of the buffer cache. Otherwise, if the
    data is not available in RAM or PMEM, then SQL Server will need to go to disk
    to retrieve the data. The data retrieved will then be stored in memory. Figure
    [5-3](#480547_1_En_5_Chapter.xhtml#Fig3) shows how this data would be retrieved
    from disk and stored in the buffer cache.


    ![../images/480547_1_En_5_Chapter/480547_1_En_5_Fig3_HTML.jpg](images/480547_1_En_5_Chapter/480547_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Data Retrieval from Disk to the Buffer Cache


    When the query is executed, that data may not even be in the buffer cache at that
    point in time. SQL Server must go to the subsystem disk I/O to find that data.
    Once that data is found, that data is stored in the buffer cache.


    If each row is pulled individually, that call to the disk I/O will have to happen
    individually for each record. Pulling data from the buffer cache is not instantaneous.
    Getting data from the disk I/O and putting it in the buffer cache to then be retrieved
    by the query is even more resource intensive. Ultimately this creates a scenario
    where you want to focus on set-based design to have the best possible performance
    for the queries that you are executing.


    ## Thinking in Data Sets


    Now that I have discussed what data sets are, I want you to be comfortable thinking
    about data in a way that embraces data sets. Before you start writing T-SQL code,
    it may save you time and energy by first understanding what information is stored,
    how the data is stored, and selecting or using that data in groups of similar
    characteristics. Working with data sets is also easier to accomplish when the
    underlying tables are designed to work best with data sets.


    The real trick is learning how to think in terms of data sets. This means how
    to think about handling multiple records at once instead of a single record. This
    really requires an approach that is less arithmetic and more algebraic. In general,
    performing SELECT statements is the easiest way to get comfortable with set-based
    transactions. Consider the data shown in Table [5-5](#480547_1_En_5_Chapter.xhtml#Tab5).


    Table 5-5


    Ingredient Data


    | Ingredient Name | Unit(s) | Measurement | Cost |

    | --- | --- | --- | --- |

    | Diced Tomatoes | 28 | Ounces | $1.85 |

    | Tomato Paste | 10 | Tablespoons | $0.79 |

    | Tomato Sauce | 8 | Ounces | $0.55 |

    | Minced Garlic | 60 | Tablespoon | $5.99 |


    This is a list of possible ingredients for a recipe along with the number of units,
    the unit of measure, and the cost per unit. By looking at the preceding data,
    I can find similarities between the data in some of the columns.


    I can create a data set that gets all records where the measurement is tablespoon.
    Those records are shown in Table [5-6](#480547_1_En_5_Chapter.xhtml#Tab6).


    Table 5-6


    Ingredients with Measurement of Tablespoon


    | Ingredient Name | Unit(s) | Measurement | Cost |

    | --- | --- | --- | --- |

    | Tomato Paste | 10 | Tablespoons | $0.79 |

    | Minced Garlic | 60 | Tablespoon | $5.99 |


    I could instead get the data set for all ingredients where the cost was less than
    $1.00 as shown in Table [5-7](#480547_1_En_5_Chapter.xhtml#Tab7).


    Table 5-7


    Ingredients with a Cost Less Than $1.00


    | Ingredient Name | Unit(s) | Measurement | Cost |

    | --- | --- | --- | --- |

    | Tomato Paste | 10 | Tablespoons | $0.79 |

    | Tomato Sauce | 8 | Ounces | $0.55 |


    Now that I have a set of data, I can consider how I want to interact with that
    data set. Knowing that I can group like data together and perform an action on
    that entire set of data is the key to using T-SQL code effectively. If I want
    to find out that cost per unit, I can divide the cost by the number of units.
    To calculate the cost per unit for each record, I can calculate the cost per unit
    manually for each record. In this case, the cost per unit for tomato paste would
    be $0.79/10\. This would give the result of $0.08 per tablespoon. Alternatively,
    I can use the columns in the data sets to do the same calculation. To calculate
    the cost per unit as a data set, I can specify Cost/Unit(s). The result of handling
    the data in this fashion would be an output like the one shown in Table [5-8](#480547_1_En_5_Chapter.xhtml#Tab8).


    Table 5-8


    Calculated Value for Cost per Unit of an Ingredient


    | Ingredient Name | Cost per Unit |

    | --- | --- |

    | Tomato Paste | $0.08 per tablespoon |

    | Tomato Sauce | $0.07 per ounce |


    One of the greatest challenges working with SQL Server is learning how to think
    in data sets. The simplest way to think of data sets is to view the process of
    retrieving data as performing an action on a column or a subset of a column. If
    you can find some sort of pattern on how to perform that action on a subset of
    the data, then you are thinking in terms of data sets.


    Looking at the ingredient table, I could create a data set where all ingredients
    had the word tomato in the ingredient name. All the available values in the Ingredient
    table are in Table [5-9](#480547_1_En_5_Chapter.xhtml#Tab9).


    Table 5-9


    General Listing of Ingredients'
