    ## 以集合方式插入数据


    使用数据集最大的挑战之一与插入数据记录有关。大多数情况下，当你插入一条数据记录时，每次只插入单条记录。这可能导致你养成只处理一次插入单个记录的习惯。当你设计新表或移动数据时，可能会遇到可以从数据集角度考虑插入的情况。这通常发生在你创建查询将数据插入另一个表时。


    虽然这种情况似乎不常出现，但我经常在填充临时表、表变量和公用表表达式时使用数据集。


    以集合方式插入数据的基础是以数据集方式选择数据。一旦你以集合方式选择了数据，你就可以以集合方式插入数据。我曾出于几个不同的原因将数据插入到像临时表这样的对象中。一个更常见的情况是，当我连接多个表并实现涉及复杂计算或函数的条件时。查看表5-14，你可以看到一些将要插入到`dbo.RecipeIngredient`中的数据示例。


