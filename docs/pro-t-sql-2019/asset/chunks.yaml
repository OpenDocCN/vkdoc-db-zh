  trans: '# 用户定义视图


    术语“用户定义视图”是视图基本版本的全称。视图的成果之一是简化了操作。它为应用程序和用户提供了一种访问复杂信息集合的方式，而无需理解数据库中的所有关系。使用视图时，还具备一些额外的保护和安全功能。我将通过一些有助于提升性能的视图示例，以及一些视图可能不适用的情况来进行说明。


    对于标准的用户定义视图，SQL Server 不会物理存储视图返回的实际数据。因此，每次调用视图时，它都会使用视图内部的语句来拉取当前存在的数据。这种方法的一个优点是，它允许访问这些视图的用户查看更清晰、更易读的代码。视图的另一个特性是，可以授予用户访问视图的权限，但不授予其关联表的权限。这可以使用户能够访问组成视图的表中的部分数据，而不是全部数据。


    让我们首先比较一下视图与将相同查询作为即席查询或存储过程执行时的性能。清单 2-1 展示了将用作比较基础的查询。


    ```sql

    SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    ```


    **清单 2-1** 用于分析的查询


    此查询将用作比较视图如何影响性能的基础。对于此查询，其逻辑很简单。清单 2-2 展示了如何使用以下 T-SQL 代码创建视图。


    ```sql

    CREATE VIEW dbo.AvailableMeal

    AS

    SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    ```


    **清单 2-2** 创建视图


    视图创建后，使用它来拉取与原始查询相同的信息就变得简单得多。清单 2-3 展示了如何使用视图来简化从 SQL Server 拉取数据的过程。


    ```sql

    SELECT MealTypeName, RecipeName, IngredientName

    FROM dbo.AvailableMeal

    ```


    **清单 2-3** 调用视图


    虽然拥有简化的数据访问方式很好，但另一个需要考虑的因素是视图与查询相比性能如何。通常，您可能期望视图的性能与视图内部存在的查询相同。图 2-1 显示了即席查询的实际查询执行计划。


    ![即席查询执行计划](img/480547_1_En_2_Fig1_HTML.jpg)


    **图 2-1** 即席查询执行计划


    将其与图 2-2 中视图的查询执行计划进行比较，您可以看到执行计划之间没有差异。


    ![视图的执行计划](img/480547_1_En_2_Fig2_HTML.jpg)


    **图 2-2** 视图的执行计划


    使用视图时可能出现的问题之一是，执行计划没有清晰地显示视图与基础表之间的关系。虽然视图可以使使用变得更简单，但您可能还想以其他方式使用视图。由于视图使与复杂查询的交互变得更简单，它也可能使修改数据更容易。但是，通过视图更新数据时，需要考虑一些注意事项。在清单
    2-4 中，您可以看到基于视图更新数据的查询。


    ```sql

    UPDATE dbo.AvailableMeal

    SET IngredientName = ''Spicy Italian Sausage''

    WHERE RecipeName = ''Spaghetti''

    ```


    **清单 2-4** 在视图中更新数据


    通过视图，您可以更新基础表中的数据。如果视图用于修改来自多个基础表的数据，则更新将失败。插入操作与更新操作的情况相同。在清单 2-5 中，您可以看到尝试为多个表中的数据插入记录时发生的情况。


    ```sql

    INSERT INTO dbo.AvailableMeal (MealTypeName, RecipeName)

    VALUES (''Lunch'', ''Spinach Quiche'')

    ```


    **清单 2-5** 通过视图插入数据


    尝试执行上述查询时，SQL Server 会返回错误：“视图或函数 ''dbo.AvailableMeal'' 不可更新，因为修改会影响多个基础表。” 使用视图时还有其他可用功能。有一种方法可以防止在引用视图时修改基础表。如果您想确保用户不会意外删除表，可以让视图通过
    `SCHEMABINDING` 引用表，这是一个可用的选项。您可以使用清单 2-6 中的查询来实现这种额外的安全级别。


    ```sql

    CREATE VIEW dbo.RecipeSecure

    WITH SCHEMABINDING

    AS

    SELECT RecipeName, RecipeDescription, IsActive

    FROM dbo.Recipe;

    ```


    **清单 2-6** 创建具有架构绑定的视图


    当向视图添加 `SCHEMABINDING` 时，我更改了 SQL Server 处理对视图所包含列更改的方式。具体来说，我不能以会影响视图 `dbo.RecipeSecure`
    的方式修改 `dbo.Recipe` 表中的列。清单 2-7 展示了一个查询，其中我尝试删除被 `dbo.RecipeSecure` 架构引用的 `dbo.Recipe`
    表中的列。


    ```sql

    ALTER TABLE dbo.Recipe

    DROP COLUMN RecipeDescription;

    ```


    **清单 2-7** 在架构绑定的视图中删除列


    尝试执行上述查询时，我收到以下错误：“对象 ''RecipeSecure'' 依赖于列 ''RecipeDescription''。ALTER TABLE
    DROP COLUMN RecipeDescription 失败，因为一个或多个对象访问了此列。” 然而，在保护数据方面还存在一个潜在的漏洞。一旦创建了视图，只要字段别名与原始列名相同，就可以替换原始列名以使用不同的列。回到清单
    2-2 中创建的视图，我可以尝试更改返回的值。这可能会造成用户能够访问他们本不应访问的数据的情况。在清单 2-8 中，我更改了原始的 `dbo.AvailableMeal`
    视图。


    ```sql

    ALTER VIEW dbo.AvailableMeal

    AS

    SELECT meal.MealTypeName,

    rec.RecipeName,

    rec.RecipeDescription AS ServingQuantity,

    ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID;

    ```


    **清单 2-8** 更改视图以修改列


    之前，我有一个用户只具有访问视图 `dbo.AvailableMeal` 内数据的权限。我的意图是仅允许此用户访问视图中的原始列。当同一个用户在稍后日期尝试查询该视图时，现在能够看到
    `RecipeDescription` 列中的数据了。'
- fmt: 'Throughout all these features, one of the largest issues remains around nested
    views. In typical software development, there is a desire to reuse the same software
    code in multiple scenarios. When creating views, it can become tempting to reuse
    those views to create other views. Unfortunately, this can create a situation
    where one view can start performing poorly. Once the view is performing poorly,
    it can take considerable effort to weave through the various layers of nested
    views to find the root cause.


    ### Indexed View


    I have covered how views can be used to simplify writing queries, to modify data,
    and to protect database schemas. I have also covered how reusing views to create
    other views can cause significant performance issues. As you saw in the previous
    section, views can help make T-SQL simpler, but the execution plan is the same
    for both the ad hoc query and the view. In some instances, there are joins that
    do not perform well either as a query or a view. There is the possibility of adding
    indexes to a view.


    If you find yourself in a situation where you need to improve the performance
    of a view, you have the option of adding indexes to a view. When adding indexes
    to a view, the view is then considered an indexed view. The first index added
    to a view must be a clustered index. After a clustered index has been added, non-clustered
    indexes can also be added to the view. However, there is a cost associated with
    adding indexes to a view. Each time data is modified, the indexes on any related
    table and the indexed view must also be updated.


    The first step in creating an indexed view is to create a view. In this example,
    I will be using the view created in Listing 2-2. The next step will be to add
    an index to this view. In Listing 2-9, I will add a clustered index to this view.


    ```sql

    CREATE UNIQUE CLUSTERED INDEX CX_AvailableMeal_RecipeNameIngredientName

    ON dbo.AvailableMeal (RecipeName, IngredientName);

    ```


    Listing 2-9

    Add Clustered Index to a View


    Comparing the performance between the view before adding a clustered index and
    after shows an improvement in performance overall. Remember that while there are
    situations where indexed views can help performance when pulling back the data,
    there can still be performance issues that happen when data is inserted, updated,
    or deleted on the affected tables. In Figure 2-3, see the execution plan for when
    data is inserted into the base table.


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig3_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Execution Plan for Insert into Base Table


    As you can see, there is an extra step where the index on the view is updated
    as part of the insert into the base table.


    ## Functions


    In many applications, there are core parts of the functionality that may be recalculated
    or reused several times. Sometimes you may want to write some simple piece of
    code once and reuse that code throughout various other database objects. There
    are other situations where you may want to take complex logic and create a database
    object that encompasses that logic and returns the required results. This could
    be done to make T-SQL code appear less complex and therefore less overwhelming.
    Either way, functions can help you simplify your T-SQL code.


    ### Scalar Functions


    You may find yourself in a situation where you need to rerun the same portion
    of code in many different scenarios. You may be looking up a configuration value,
    or you may want to rerun the same basic logic in many different parts of your
    code where only one value is returned. When there are times where you want to
    pass zero or more parameters and you only want to return a single value, you may
    be able to use a scalar function. However, you will want to consider what the
    potential cost may be when using a scalar function.


    Prior to SQL Server 2019, scalar functions worked very differently in SQL Server.
    Historically, SQL Server did not include cost-based optimization on scalar functions.
    This often meant that scalar functions were not included as part of the execution
    plan. Now that SQL Server 2019 has implemented additional features as part of
    the intelligent query processing, including scalar user-defined function (UDF)
    inlining, the performance of functions has improved.


    An inline function is one that can be included as part of the execution plan.
    One of the largest advantages of inlining scalar UDFs is the significantly improved
    performance when it comes to using scalar UDFs. When wanting to simplify complex
    processes and reuse code, scalar UDFs are the ideal option when the function only
    needs to return one result.


    The difference between scalar UDFs between prior versions of SQL Server and SQL
    Server 2019 in terms of performance is significant. To compare these execution
    plans, I will change the compatibility mode to match that of SQL Server 2017 and
    SQL Server 2019. Compatibility mode 140 will use the optimizer as it works in
    SQL Server 2017. Putting the compatibility mode of the data to 150 will then use
    the optimizer available in SQL Server 2019. Listing 2-10 shows the code necessary
    to create a scalar UDF in T-SQL.


    ```sql

    CREATE FUNCTION dbo.Ingredient_Price

    (

    @Cost DECIMAL(6,3),

    @Count DECIMAL(6,3)

    )

    RETURNS DECIMAL (6,3) AS

    BEGIN

    RETURN @Cost / @Count;

    END

    ```


    Listing 2-10

    Creating a Scalar UDF


    When executing the preceding function in compatibility mode 140, the execution
    plan ends up appearing to be simpler than the execution plan generated in compatibility
    mode 150. In Listing 2-11, you can see the code that I executed in both compatibility
    mode 140 and 150.


    ```sql

    SELECT ing.IngredientName, dbo.Ingredient_Price(ingcos.Cost, srv.ServingPortionQuantity)

    FROM dbo.Ingredient ing

    INNER JOIN dbo.IngredientCost ingcos

    ON ing.IngredientID = ingcos.IngredientID

    INNER JOIN dbo.ServingPortion srv

    ON ingcos.ServingPortionID = srv.ServingPortionID

    ```


    Listing 2-11

    Code to Execute Function


    In order to simulate the behavior of SQL Server 2017, I will change the compatibility
    mode of the database to 140. You can see the T-SQL code needed to change the compatibility
    mode in Listing 2-12.


    ```sql

    ALTER DATABASE Menu

    SET COMPATIBILITY_LEVEL = 140;

    ```


    Listing 2-12

    Change Database Compatibility Mode to Previous Version


    The query in Listing 2-13 allows us to force SQL Server to generate new execution
    plans for all queries using compatibility level 140.


    ```sql

    DBCC FREEPROCCACHE;

    ```


    Listing 2-13

    Clear Execution Plan for Query from Listing 2-11


    It is important to note that the preceding T-SQL code should not be run in your
    Production environments. This code will cause SQL Server to use additional resources
    to determine how every query should be run the first time the query is called.
    I saved the actual execution plan from running the preceding query using compatibility
    mode 140. You can see a copy of this actual execution plan in Figure 2-4.


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig4_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Execution Plan for Compatibility Mode 140'
