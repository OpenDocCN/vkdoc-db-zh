- fmt: '### SMALLMONEY, MONEY


    接下来要讨论的数据类型是`MONEY`和`SMALLMONEY`。`MONEY`和`SMALLMONEY`数据类型类似于`DECIMAL`或`NUMERIC`数据类型。`SMALLMONEY`和`MONEY`数据类型也可用于存储货币值。SQL
    Server将保存数值，并排除与该值关联的货币类型。


    `MONEY`和`SMALLMONEY`数据类型之间最大的区别是大小和存储空间。`SMALLMONEY`数据类型的范围从 -214,000 到 +214,000，仅占用4字节数据，而`MONEY`数据类型的范围从
    -9220亿 到 +9220亿，占用8字节数据。


    `MONEY`数据类型最多可精确存储四位小数。小数点位数的限制将影响所存储货币值的精度，只能精确到万分之一。`MONEY`数据类型会将所有值保存到四位小数。固定的小数点位数会影响舍入如何影响涉及`MONEY`数据类型的计算。


    ## 近似数值数据类型


    接下来我们将讨论精确数和近似数之间的区别。精确数用于你知道确切数量的事物，例如，你在商店购买了多少件商品，或者确切到美元和美分的金额。而近似数则用于测量可能不精确的场景。近似数可用于存储非常大或非常小的数字。你可能还会发现你的应用程序正在记录一个不精确的测量值。你可能会剪下一块接近但不完全是特定值的布料长度。例如，布料的长度可能在12英寸左右。存储值12（英寸）将是一个近似值。这个12英寸的测量值可能如此接近，以至于很难判断布料的长度不是精确的12英寸。


    处理近似数时会出现一些舍入问题。这是因为近似数已知不是精确的测量值。在SQL Server中，近似数有一个选项。这种数据类型称为`FLOAT`。如果浮点数有24位数字，同义的数据类型是`REAL`。


    使用`REAL`或`FLOAT`数字时，将此数据类型转换为其他数据类型可能会出现问题。将`FLOAT`数据类型转换为`INTEGER`时，小数点后的所有值都将被截断。你需要意识到，使用近似数可能会导致意外结果。一个例子是使用`DECIMAL`或`NUMERIC`数据类型时。将`FLOAT`或`REAL`数字转换为`DECIMAL`或`NUMERIC`数据类型时，只能保留七位小数。


    ## 转换数值数据类型


    我们已经介绍了可用的数字类型，以及使用各种数值数据类型时会发生什么。除了存储数字，你还需要了解各种数值数据类型如何相互作用。首先，我们应该考虑当使用相同数据类型的字段进行计算时会发生什么。在这些场景中，如果计算的所有字段都是相同的数据类型，则数据类型将保持不变。因此，如果你将数量乘以价格，并且两个值都存储为`DECIMAL(5,2)`类型的`NUMERIC`数据类型，结果将给出相同`DECIMAL`数据类型。SQL
    Server将根据起始精度和小数位数以及执行的计算类型来确定结果的精度和小数位数。你还需要考虑精度和小数位数在应用程序中的存储方式。应用程序可能期望一个`DECIMAL(5,2)`的值。根据执行的计算，返回的数据值可能超出指定数据类型的范围。这可能导致计算溢出。


    当跨各种数据类型工作时，情况会变得更有趣一些。再次以数量乘以价格为例，我们可以检查如果你有一个`INT`数据类型与一个`DECIMAL(5,2)`数据类型进行计算会发生什么。SQL
    Server将使用数据类型优先级的过程。首先，我们应该熟悉迄今为止所涵盖数据类型的数据类型优先级顺序。以下列表按从高到低的顺序排列。


    1.  `FLOAT`

    2.  `REAL`

    3.  `DECIMAL`

    4.  `MONEY`

    5.  `SMALLMONEY`

    6.  `MONEY`

    7.  `BIGINT`

    8.  `INT`

    9.  `SMALLINT`

    10. `TINYINT`

    11. `BIT`


    在前面的场景中，我们同时使用了`INT`和`DECIMAL`数据类型。如你所见，列出了`INT`和`DECIMAL`数据类型。对于`INT`和`DECIMAL`数据类型，`INT`的优先级较低。由于优先级顺序，SQL
    Server将在内部将`INT`数据类型转换为`DECIMAL`数据类型。此转换不会更改原始数据值，仅更改SQL Server如何将此值用作计算的一部分。转换完成后，SQL
    Server将继续进行计算。这通常效果很好，除非你执行诸如尝试连接数字和字符串数据类型的操作。


    ## 字符串数据类型


    既然你知道了如何使用数值数据类型，我们应该花些时间了解各种字符串数据类型。这类数据类型用于存储字母、单词或字母与数字的组合。此外，字符串数据类型用于存储非unicode或unicode的字符值。字符串数据类型的最后一个类别包括图像和二进制值。


    ### 字符串数据类型


    数据库中存储的信息并非直接与数字相关。这些数据可以是名称、描述、地址或其他字符值。决定使用哪种数据类型将取决于所存储信息的类型以及需要存储的信息量。'
  raw: '#### SMALLMONEY, MONEY


    The next data types to discuss are MONEY and SMALLMONEY. The MONEY and SMALLMONEY
    data types are like the DECIMAL or NUMERIC data type. The SMALLMONEY and MONEY
    data types can also be used to store values for currency. SQL Server will save
    the numeric value and exclude the type of currency associated with the value saved.


    The largest difference between the MONEY and SMALLMONEY data types is size and
    storage space. The SMALLMONEY data type covers a range from –214,000 to positive
    214,000 and takes up only 4 bytes of data, whereas the MONEY data type covers
    a range from –922 billion to 922 billion and takes up 8 bytes of data.


    The MONEY data type is accurate to store up to four decimal places. The limitation
    on decimal places will limit the accuracy to ten thousandths of the monetary value
    stored. The MONEY data type will save all values to four decimal places. The fixed
    number of decimal places will impact how rounding affects calculations involving
    the MONEY data type.


    ### Approximate Number Data Types


    Next we will move on to the differences between exact and approximate numbers.
    Exact numbers exist for things that you know the exact quantity of, for instance,
    how many items you bought at the store or the exact amount in dollars and cents.
    Whereas approximate numbers exist for scenarios where the measurements may not
    be exact. Approximate numbers can be used to store very large or very small numbers.
    You may also find that your application is recording a measurement that is not
    exact. You may cut a length of fabric that is close to but not exactly a specific
    value. For example, the length of fabric may be around 12 inches. Storing the
    value 12 for inches would be an approximate value. This measurement of 12 inches
    may be so close that it would be difficult to tell that the length of fabric was
    not exactly 12 inches.


    There are some rounding issues that come into play when dealing with approximate
    numbers. This is because approximate numbers are known to not be the exact measurement.
    In SQL Server, there is one option for approximate numbers. This data type is
    called FLOAT. If the floating number has 24 numbers, the synonymous data type
    is REAL.


    When working with REAL or FLOAT numbers, there can be issues converting this data
    type to other data types. Converting a FLOAT data type to an INTEGER, all the
    values in the decimal places will be truncated. You will want to be aware that
    using approximate numbers may cause unexpected results. One example is when using
    the DECIMAL or NUMERIC data types. When converting a FLOAT or REAL number to a
    DECIMAL or NUMERIC data type, you are only able to keep seven decimal places.


    ### Converting Number Data Types


    We have covered the types of numbers available, and what happens in working with
    the various number data types. In addition to storing numbers, you will also want
    to understand how various number data types interact with one another. First we
    should consider what happens when we are doing calculations involving fields with
    the same data type. In these scenarios, if all the fields for the calculation
    are of the same data type, the data type will remain the same. Therefore, if you
    were multiplying a quantity times the price and both values are stored as a NUMERIC
    data type of DECIMAL(5,2), it will give the same data type of DECIMAL as a result.
    SQL Server will determine the result precision and scale based on the starting
    precision and scale as well as the type of calculation performed. You will also
    want to consider how the precision and scale is stored in the application. The
    application may be expecting a value of DECIMAL(5,2). Based on the calculation
    performed, the data values returned may be outside the range of the data type
    specified. This can cause an overflow in calculation.


    Things can get a little more interesting when working across various data types.
    To use the example of quantity times price again, we can examine what happens
    if you had an INT data type that was calculated with a DECIMAL (5,2) data type.
    SQL Server would use the process of data type precedents. First we should get
    familiar with the data type order of precedence related to the data types covered
    so far. The following list is ordered from highest order to lowest.


    1.  FLOAT


    2.  REAL


    3.  DECIMAL


    4.  MONEY


    5.  SMALLMONEY


    6.  MONEY


    7.  BIGINT


    8.  INT


    9.  SMALLINT


    10.  TINYINT


    11.  BIT


    In the preceding scenario, we are using both the INT and DECIMAL data types. As
    you can see, the INT and DECIMAL data types are listed. In the case of the INT
    and DECIMAL data types, the INT has a lower precedence. Due to the order of precedence,
    SQL Server will internally convert the INT data type to the DECIMAL data type.
    This conversion does not change the original data value, only how SQL Server uses
    this value as part of the calculation. Once this conversion is complete, SQL Server
    moves forward with the calculation. This works well unless you are performing
    an action like trying to concatenate a number and string data types.


    ## String Data Types


    Now that you know how to work with number data types, we should spend some time
    on the various string data types. These sorts of data types are used to store
    alphabetical letters, words, or combinations or letters and numbers. In addition,
    string data types are used to store character values that are either non-unicode
    or unicode. The last category of string data types includes images and binary
    values.


    ### Character String Data Types


    There is information that will be stored in the database that is not related directly
    to numbers. This data can be names, descriptions, addresses, or other character
    values. Determining which data type to use will depend on what type of information
    is being stored and how much information needs to be stored.'
  trans: '

    ### SMALLMONEY, MONEY


    接下来讨论的数据类型是`MONEY`和`SMALLMONEY`。`MONEY`与`SMALLMONEY`数据类型类似于`DECIMAL`或`NUMERIC`数据类型。`SMALLMONEY`和`MONEY`数据类型同样可用于存储货币值。SQL
    Server 会保存数值，但会忽略与该值关联的具体货币种类。


    `MONEY`与`SMALLMONEY`数据类型最主要的区别在于数值范围和存储空间。`SMALLMONEY`数据类型的范围是从 -214,000 到 +214,000，仅占用
    4 字节存储空间；而`MONEY`数据类型的范围是从 -9220 亿 到 +9220 亿，占用 8 字节存储空间。


    `MONEY`数据类型最多可精确存储四位小数。小数点位数的限制会影响所存储货币值的精度，其精度只能达到万分之一。`MONEY`数据类型会将所有值都保存到四位小数。这种固定的小数点位数会影响涉及`MONEY`数据类型的计算中的舍入方式。


    ## 近似数值数据类型


    接下来，我们将讨论精确数与近似数之间的区别。精确数用于你确知其确切数量的事物，例如你在商店购买了多少件商品，或者精确到美元和美分的金额。而近似数则用于测量可能不精确的场景。近似数可用于存储非常大或非常小的数字。你可能还会发现你的应用程序正在记录一个不精确的测量值。例如，你剪下一块长度接近但并非完全等于特定值的布料。布料的长度可能在
    12 英寸左右。存储值 12（英寸）就是一个近似值。这个 12 英寸的测量值可能如此接近，以至于很难判断布料的实际长度并非精确的 12 英寸。


    处理近似数时会出现一些舍入问题。这是因为近似数本身已知就不是精确的测量值。在 SQL Server 中，近似数有一种对应的数据类型。这种数据类型称为`FLOAT`。如果浮点数有
    24 位有效数字，其同义的数据类型是`REAL`。


    使用`REAL`或`FLOAT`类型时，将此数据类型转换为其他数据类型可能会出现问题。将`FLOAT`数据类型转换为`INTEGER`时，小数点后的所有值都将被截断。你需要意识到，使用近似数可能会导致意外结果。一个例子是在使用`DECIMAL`或`NUMERIC`数据类型时。将`FLOAT`或`REAL`数字转换为`DECIMAL`或`NUMERIC`数据类型时，最多只能保留七位小数。


    ## 转换数值数据类型


    我们已经介绍了可用的数值类型，以及使用各种数值数据类型时会发生什么。除了存储数字，你还需要了解各种数值数据类型之间如何相互作用。首先，我们应该考虑当使用相同数据类型的字段进行计算时会发生什么。在这些场景中，如果计算涉及的所有字段都是相同的数据类型，那么结果的数据类型将保持不变。因此，如果你将“数量”乘以“价格”，并且两个值都存储为`DECIMAL(5,2)`类型的`NUMERIC`数据类型，那么结果将给出相同`DECIMAL`数据类型。SQL
    Server 将根据起始精度和小数位数以及所执行计算的类型来确定结果的精度和小数位数。你还需要考虑精度和小数位数在应用程序中的使用方式。应用程序可能期望接收一个`DECIMAL(5,2)`的值。根据所执行计算的不同，返回的数据值可能超出指定数据类型的范围，这可能导致计算溢出。


    当跨各种数据类型进行操作时，情况会变得更有趣一些。再次以“数量”乘以“价格”为例，我们可以检查如果你有一个`INT`数据类型与一个`DECIMAL(5,2)`数据类型进行计算会发生什么。SQL
    Server 将使用数据类型优先级的规则。首先，我们应该熟悉到目前为止所涵盖的数据类型的数据类型优先级顺序。以下列表按从高到低的顺序排列：


    1.  `FLOAT`

    2.  `REAL`

    3.  `DECIMAL`

    4.  `MONEY`

    5.  `SMALLMONEY`

    6.  `MONEY`

    7.  `BIGINT`

    8.  `INT`

    9.  `SMALLINT`

    10. `TINYINT`

    11. `BIT`


    在前面的场景中，我们同时使用了`INT`和`DECIMAL`数据类型。如你所见，`INT`和`DECIMAL`数据类型都在列表中。对于`INT`和`DECIMAL`数据类型，`INT`的优先级较低。由于优先级规则，SQL
    Server 将在内部将`INT`数据类型转换为`DECIMAL`数据类型。此转换不会更改原始数据值，只更改 SQL Server 如何将此值用作计算的一部分。转换完成后，SQL
    Server 将继续进行计算。这通常效果很好，除非你执行诸如尝试连接数字和字符串数据类型的操作。


    ## 字符串数据类型


    既然你知道了如何使用数值数据类型，我们应该花些时间了解各种字符串数据类型。这类数据类型用于存储字母、单词或字母与数字的组合。此外，字符串数据类型用于存储非
    Unicode 或 Unicode 的字符值。字符串数据类型的最后一个类别包括图像和二进制值。


    ### 字符串数据类型


    数据库中存储的信息并非都与数字直接相关。这些数据可以是名称、描述、地址或其他字符值。决定使用哪种数据类型将取决于所存储信息的类型以及需要存储的信息量。

