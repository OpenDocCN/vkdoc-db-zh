    [8-5](#480547_1_En_8_Chapter.xhtml#PC5), the @RecipeID was set to NULL so that
    all recipes would be returned. In Listing [8-8](#480547_1_En_8_Chapter.xhtml#PC8),
    the @Recipe is set to one specific value. We can execute this query and look at
    the execution plan to see if SQL Server will handle this query execution differently
    now that there may be only one recipe affected. In Figure [8-7](#480547_1_En_8_Chapter.xhtml#Fig7),
    you can see the properties for the Adaptive Join when executing Listing [8-8](#480547_1_En_8_Chapter.xhtml#PC8).


    ![../images/480547_1_En_8_Chapter/480547_1_En_8_Fig7_HTML.jpg](images/480547_1_En_8_Chapter/480547_1_En_8_Fig7_HTML.jpg)


    Figure 8-7


    Adaptive Join Properties from Listing [8-8](#480547_1_En_8_Chapter.xhtml#PC8)


    The Actual Join type shown in Figure [8-7](#480547_1_En_8_Chapter.xhtml#Fig7)
    is a Nested Loop. The difference between the Adaptive Join types in Figures [8-5](#480547_1_En_8_Chapter.xhtml#Fig5)
    and [8-7](#480547_1_En_8_Chapter.xhtml#Fig7) shows how the Adaptive Join can help
    optimize queries that previously were affected by parameter sniffing. The details
    of the live query statistics from Listing [8-8](#480547_1_En_8_Chapter.xhtml#PC8)
    are shown in Figure [8-8](#480547_1_En_8_Chapter.xhtml#Fig8).


    ![../images/480547_1_En_8_Chapter/480547_1_En_8_Fig8_HTML.jpg](images/480547_1_En_8_Chapter/480547_1_En_8_Fig8_HTML.jpg)


    Figure 8-8


    Live Query Statistics from Listing [8-8](#480547_1_En_8_Chapter.xhtml#PC8)


    In Figure [8-8](#480547_1_En_8_Chapter.xhtml#Fig8), the same physical operators
    are present as in Figure [8-6](#480547_1_En_8_Chapter.xhtml#Fig6). However, the
    actual number of rows processed vs. the estimated number of rows is significantly
    different. In the case of Figure [8-8](#480547_1_En_8_Chapter.xhtml#Fig8), almost
    all the steps are severely overestimated. However, the query from Listing [8-8](#480547_1_En_8_Chapter.xhtml#PC8)
    will still benefit the performance due to the use of the Adaptive Join.


    There are many ways that you can work toward optimizing for T-SQL code. Unless
    you are testing a new query, often the first step is to identify what T-SQL code
    needs to be optimized. After determining what query needs optimization, you may
    want to analyze execution plans to help determine if there is a step that stands
    out as needing optimization. You may also want to analyze information associated
    with the query such as average logical reads or average execution time. Combining
    this information together may help you identify what can be tuned to improve performance.


    In addition, there are features in SQL Server that can help automatically make
    your T-SQL code perform better. This includes allowing SQL Server to analyze your
    new execution plans and confirm that they are performing better than the previous
    execution plan. If the previous execution plan is expected to perform better,
    SQL Server can make sure that plan is automatically selected. If you are using
    Azure SQL Database, you also have a similar option available when it comes to
    managing indexes. The use of Adaptive Joins allows SQL Server to make your execution
    plans more flexible. When an Adaptive Join is part of an execution plan, SQL Server
    can decide the correct physical operator to use depending on the values passed
    for that specific query execution. Whether you are manually optimizing your T-SQL
    code or letting SQL Server determine how to improve query execution, you have
    several tools available that should make your T-SQL code perform better.


    # Part IIIBuilding Manageable T-SQL'
  trans: '

    ## 自适应连接


    SQL Server 利用统计信息帮助估算最优执行计划。然而，数据在表中的分布并不总是均匀的。这可能导致 SQL Server 选择的执行计划并非最佳选项。在
    SQL Server 2019 中，由于引入了新功能，这种情况发生的概率有所降低。该功能允许 SQL Server 根据查询当前的执行情况，在 `嵌套循环`
    和 `哈希匹配` 这两种物理连接运算符之间进行选择。这项新功能被称为 `自适应连接`。


    `自适应连接` 最初在 SQL Server 2017 中引入。然而，自适应连接只能作为批处理模式操作的一部分使用。在 SQL Server 2017 中，批处理模式操作仅对列存储索引提供支持。既然现在批处理模式操作也支持堆和
    B 树索引，那么 `自适应连接` 也可以在这些数据库对象上使用。执行清单 8-5 中的查询会生成一个包含自适应连接的执行计划。当你查看执行计划时，你会看到一个代表
    `自适应连接` 的物理运算符。在图形化执行计划中，你无法分辨背后具体使用的是哪种类型的运算符。但是，如果你将鼠标悬停在执行计划中的 `自适应连接` 上，你会看到如图
    8-5 所示的属性列表。


    ![../images/480547_1_En_8_Chapter/480547_1_En_8_Fig5_HTML.jpg](img/480547_1_En_8_Fig5_HTML.jpg)


    *图 8-5 清单 8-5 对应的自适应连接属性*


    清单 8-5 中的原始查询是返回所有食谱列表、与食谱关联的餐食类型、配料列表以及配料的相关成本。在图 8-5 中，你可以看到属性下列出的 `自适应连接` 类型是
    `哈希匹配`。图 8-6 是清单 8-5 执行时的实时查询统计信息的部分截图。


    ![../images/480547_1_En_8_Chapter/480547_1_En_8_Fig6_HTML.jpg](img/480547_1_En_8_Fig6_HTML.jpg)


    *图 8-6 清单 8-5 对应的实时查询统计信息*


    你可以看到每个步骤处理的总记录数以及部分步骤所花费的时间。查看实时查询统计信息，你可以看到返回记录数与估算记录数的百分比。在这个案例中，某些操作（如表 `MealType`
    上的 `聚集索引扫描` 或表 `RecipeIngredient` 上的 `索引扫描`）被正确估算。而其他操作，如 `聚集索引扫描`、`哈希匹配` 和 `自适应连接`，则被低估了。虽然这些差异可能导致性能问题，但我指出这些值的原因，是为了将它们与我更改传递给
    `@RecipeID` 变量的值之后的查询执行情况进行比较。


    如果我将同一个查询限制为一个食谱，我可能会编写如清单 8-8 所示的 T-SQL。


    ```sql

    DECLARE @RecipeID INT = 1350;

    SELECT rec.RecipeName, meal.MealTypeName, ing.IngredientName, ingcos.Cost

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    LEFT JOIN dbo.IngredientCost ingcos

    ON ing.IngredientID = ingcos.IngredientID

    AND ingcos.IsActive = 1

    WHERE (rec.RecipeID = @RecipeID OR @RecipeID IS NULL)

    ORDER BY rec.RecipeName, ing.IngredientName;

    ```

    *清单 8-8 查询特定食谱信息的语句*


    清单 8-5 和清单 8-8 之间唯一的区别在于第一行。在清单 8-5 中，`@RecipeID` 被设为 `NULL`，以便返回所有食谱。在清单 8-8
    中，`@RecipeID` 被设置为一个特定的值。我们可以执行这个查询并查看执行计划，看看由于现在可能只影响一个食谱，SQL Server 是否会以不同的方式处理这个查询执行。在图
    8-7 中，你可以看到执行清单 8-8 时 `自适应连接` 的属性。


    ![../images/480547_1_En_8_Chapter/480547_1_En_8_Fig7_HTML.jpg](img/480547_1_En_8_Fig7_HTML.jpg)


    *图 8-7 清单 8-8 对应的自适应连接属性*


    图 8-7 中显示的实际连接类型是 `嵌套循环`。图 8-5 和图 8-7 中 `自适应连接` 类型的差异，展示了 `自适应连接` 如何帮助优化那些先前受参数嗅探影响的查询。清单
    8-8 对应的实时查询统计信息详情如图 8-8 所示。


    ![../images/480547_1_En_8_Chapter/480547_1_En_8_Fig8_HTML.jpg](img/480547_1_En_8_Fig8_HTML.jpg)


    *图 8-8 清单 8-8 对应的实时查询统计信息*


    在图 8-8 中，出现了与图 8-6 中相同的物理运算符。然而，实际处理的行数与估算行数相比有显著差异。在图 8-8 的案例中，几乎所有步骤都被严重高估了。不过，清单
    8-8 中的查询仍然会因使用 `自适应连接` 而受益于性能提升。


    你可以通过多种方式来优化 T-SQL 代码。除非你正在测试一个新查询，否则通常第一步是确定需要优化哪些 T-SQL 代码。确定了需要优化的查询后，你可能需要分析执行计划，以帮助确定是否有某个步骤明显需要优化。你可能还想分析与查询相关的信息，例如平均逻辑读取次数或平均执行时间。将这些信息结合起来，可能有助于你确定可以调优以提升性能的方面。


    此外，SQL Server 中还有一些功能可以帮助自动提升你的 T-SQL 代码性能。这包括允许 SQL Server 分析你新的执行计划，并确认它们是否比之前的执行计划性能更优。如果预计之前的执行计划性能更好，SQL
    Server 可以确保自动选择该计划。如果你使用的是 Azure SQL Database，在管理索引方面也有类似的选项可用。`自适应连接` 的使用使 SQL
    Server 能够让你的执行计划更加灵活。当执行计划中包含 `自适应连接` 时，SQL Server 可以根据该特定查询执行时传递的值来决定使用正确的物理运算符。无论你是手动优化
    T-SQL 代码，还是让 SQL Server 决定如何改进查询执行，你都可以使用多种工具来使你的 T-SQL 代码性能更佳。


    ## 第三部分 构建可管理的 T-SQL

