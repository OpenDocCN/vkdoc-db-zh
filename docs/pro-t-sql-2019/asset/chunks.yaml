    # SQL Server 执行计划解读指南


    一旦您设置好 SQL Server Management Studio 以显示执行计划，您就会想知道在查看执行计划时应该关注什么。您需要了解如何解读执行计划中的流程，以更好地理解
    SQL Server 将如何执行该查询。还有一些常见的形状您需要熟悉，因为它们可能帮助您一眼就发现潜在问题。执行计划中可能包含额外的文本，能快速显示已确定对查询执行产生负面影响的问题。更好地理解所有这些元素将帮助您找出查询的痛点，从而决定集中精力的方向。


    ## 理解执行计划的流程


    有了执行计划，您可以更清楚地了解 SQL Server 将如何执行该查询。我们阅读英文时习惯从左到右、从 top 到 bottom。将此与执行计划进行比较，最左上角代表查询的结果。如果将此比作读书，当您从左到右移动时，您正在深入了解
    SQL Server 为获取结果集所采取的步骤。从上到下移动也是如此。查看图 7-4 中的示例，您可以看到一个包含多个步骤的执行计划。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig4_HTML.jpg](img/480547_1_En_7_Fig4_HTML.jpg)


    **图 7-4** 包含多个步骤的执行计划


    如果从左到右阅读，我可以看到 `SELECT` 返回结果的表示。向右移动，我可以看到 SQL Server 在获取结果集之前立即使用了计算标量。这意味着，如果我移动到最右边的对象，这是
    SQL Server 执行查询时采取的第一个操作。在这个例子中，SQL Server 执行此查询的第一步是一个聚集索引扫描。这很重要，因为您可能会听到“从左到右阅读执行计划”的说法。在这种情况下，说话者指的是按照
    SQL Server 执行查询的相同方式阅读执行计划。


    ## 识别关键指标：箭头粗细


    当我刚开始使用执行计划时，很快就被其中的大量信息淹没了。我想从一开始就理解所有内容。然而，这对我来说太多了，根本记不住。通过多年的问题排查，我学会了通过寻找差异来开始我的分析。对于执行计划，没过多久我就立刻看到了差异。我注意到两个对象之间的箭头并不总是保持相同的大小。图
    7-5 中并排显示了两个不同的箭头以供比较。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig5_HTML.jpg](img/480547_1_En_7_Fig5_HTML.jpg)


    **图 7-5** 执行计划中的箭头


    我了解到线条粗细的差异表明了 SQL Server 在每个步骤中访问的记录的相对数量。虽然有些查询返回的记录会比其他查询多，因此线条更粗，但您会发现执行计划中某一步的线条很粗，而下一步的线条却很细。这通常表明，线条较粗的步骤可以通过更高效地编写来减少返回的数据量。查看线条的粗细是您查看执行计划时可以检查的事项之一。


    ## 关注排序操作


    有时您希望数据按特定方式排序。例如，您可能希望按字母顺序或创建日期显示食谱列表。排序可以在应用程序代码中进行，也可以在 SQL Server 中进行。如果您选择在
    SQL Server 中排序数据，您可能会在执行计划中看到一个排序操作符。您可以在图 7-6 中看到排序操作符的示例。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig6_HTML.jpg](img/480547_1_En_7_Fig6_HTML.jpg)


    **图 7-6** 排序操作符


    您会在执行计划中看到排序操作符。有些情况下排序操作符是必要的。但是，您需要留意那些可能不需要的排序实例。这包括为合并连接所需的排序。在这些情况下，您需要查看是否有可用于连接且已对数据排序的索引。最需要注意的问题之一是与排序操作符相关的警告。


    ## 警告信息的重要性


    执行计划最有帮助的功能之一是它们会返回警告。理想情况下，您希望编写性能良好的 `T-SQL`。这也意味着 `T-SQL` 不应返回带有警告的执行计划。有时您的执行计划会包含警告。警告将如图
    7-7 所示。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig7_HTML.jpg](img/480547_1_En_7_Fig7_HTML.jpg)


    **图 7-7** 执行计划中的警告


    看到警告的主要好处是 SQL Server 已经识别出您的 `T-SQL` 代码中可能存在的问题。调查返回的任何警告并查看是否可以采取措施解决它们，将会对您有益。


    ## 估算行数与实际行数


    执行计划还有其他元素会提醒您潜在的性能问题。虽然警告可以就 `T-SQL` 的问题提供具体建议，但执行计划中的其他项目并不提供相同水平的指导。在创建执行计划时，SQL
    Server 使用统计信息来猜测将返回的行数。SQL Server 还会跟踪执行计划每个步骤中返回的实际行数。如果您将鼠标悬停在操作符上，您将能够看到类似于图
    7-8 中的内容。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig8_HTML.jpg](img/480547_1_En_7_Fig8_HTML.jpg)


    **图 7-8** 估算行数与实际行数


    第一个箭头指向此执行计划步骤返回的实际行数。第二个箭头指向返回的估算行数。在这个例子中，行数是匹配的。如果行数匹配或在接近的范围内，您就不会遇到与估算相关的性能问题。如果两个数字差异很大，那么您可能得到一个性能不如预期的执行计划。这可能是因为统计信息已过时，SQL
    Server 无法准确确定将返回的行数。另一种可能性是 SQL Server 可能是为另一组值创建的执行计划。无论原因如何，如果您看到估算行数和实际行数之间存在很大差异，这是您应该调查的事情。


    ## 总结


    通过阅读执行计划，您可以快速识别查询中存在性能问题的地方，以及可以采取哪些步骤来解决这些问题。这包括知道如何访问执行计划，并了解估算执行计划与实际执行计划之间的区别。执行计划还具有多项功能，可帮助您快速识别可能的性能问题。通过查看箭头的大小，您可以判断执行计划中每个步骤通过的数据的相对数量。排序操作符可能为排序数据提供见解，而不仅仅是为了返回有序的结果集。您还可以查看估算和返回的实际行数，以帮助确定
    SQL Server 是否有足够的信息来为您提供良好的执行计划。一旦您熟悉了执行计划的这些方面，您可能想研究 SQL Server 是如何使用您的索引的。

    '
- fmt: '# Index Usage in Execution Plans


    In terms of managing `T-SQL`, one of the largest differences I have seen across
    companies is how indexes are managed. In some cases, the development teams own
    writing all the `T-SQL` code including index creation. There are also companies
    where the database team handles all index creation and maintenance. Since database
    administrators usually have less access to development than the developers, I
    believe it may be most helpful to have the two teams work together. The database
    administrators can find indexes that are performing poorly and may have more experience
    designing indexes for multiple `T-SQL` queries. On the other hand, the developers
    may have a better idea of how the tables are designed and how the `T-SQL` code
    uses those tables.


    ## Identifying Index Issues


    There are many queries, health checks, and monitoring tools that exist that can
    help you identify issues with your indexes. You can either use queries to find
    what stored procedures use the same database objects or you may have a specific
    query in mind to improve performance. Once you get the execution plan from the
    cache or generate the current actual execution plan, you can start looking into
    potential performance issues. As discussed in the previous section, you know that
    you can check the relative amount of data records for each step, look at various
    operators and warnings, and verify the estimated and actual number of rows returned.
    You can also look at how indexes are being used as part of your execution plan.


    ## Understanding Seek and Scan Operations


    When working with data in `SQL Server`, the preference is that data is found as
    quickly as possible. When data is saved in a clustered index, the data is sorted
    based on the columns of the index. This means that when `SQL Server` searches
    through a clustered index, the data is stored in order. In the best scenario,
    `SQL Server` would look through the data and find the data quickly. If this happens,
    you will see a `Clustered Index Seek` in the execution plan. The `Clustered Index
    Seek` in the execution plan will look like Figure 7-9.


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig9_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig9_HTML.jpg)


    *Figure 7-9: Clustered Index Seek*


    Seeing a `Clustered Index Seek` lets you know that your `T-SQL` code is written
    well enough to find the data quickly. If you do not see a `Clustered Index Seek`
    in your execution plan, you may want to see if there is a way to rewrite your
    `T-SQL` to use a `Clustered Index Seek`.


    While it is ideal for your data to use a `Clustered Index Seek`, you may see something
    in your execution plan that looks similar but not the same. It is possible for
    `SQL Server` to use the clustered index but not find the data quickly. In this
    case, `SQL Server` may need to look through a significant percentage of the index.
    If this happens, you may see a `Clustered Index Scan` in the execution plan as
    shown in Figure 7-10.


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig10_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig10_HTML.jpg)


    *Figure 7-10: Clustered Index Scan*


    This does mean that `SQL Server` looked through the data as sorted by the clustered
    index but had to scan through the table to find all the records needed to satisfy
    the query requirements.


    `SQL Server` uses the term `seek` to indicate that the requested data could be
    found without searching a significant portion of the reference index. When the
    entire table or a significant part of the table needed to be searched, `SQL Server`
    refers to this as a `scan`. While `seeks` or `scans` can apply to clustered indexes,
    they can also apply to non-clustered indexes. Non-clustered indexes are not sorted
    in the same order as the clustered index or the table, if the table is a `heap`.
    The non-clustered index is sorted in the order of key columns specified in the
    index. If there is a clustered index on the table, the non-clustered index will
    have a pointer back to the clustered index. If there is no clustered index, then
    the non-clustered index will point back to the row ID in the table.


    If the execution plan uses a non-clustered index, there are a couple of different
    ways the `SQL Server` can search through the data records. If `SQL Server` knows
    where to find the data in the non-clustered index, you will see an `Index Seek`
    in the execution plan. The `Index Seek` will look like Figure 7-11.


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig11_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig11_HTML.jpg)


    *Figure 7-11: Index Seek*


    If a `Clustered Index Seek` cannot be used based on the `T-SQL` code that is written,
    the next best option is an `Index Seek`. If a `seek` is not possible, `SQL Server`
    ends up using an `Index Scan`. Like the `Clustered Index Scan`, this means that
    `SQL Server` needed to go through the index to find the necessary data records.
    If the execution plan uses an `Index Scan`, Figure 7-12 shows how the `Index Scan`
    will appear in your execution plan.


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig12_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig12_HTML.jpg)


    *Figure 7-12: Index Scan*


    Also, like `Clustered Index Scans`, if you see an `Index Scan`, you may want to
    see what can be done in terms of rewriting `T-SQL` to use an `Index Seek` instead.


    ## Considering Included Columns and Key Lookups


    Keep in mind what kind of data is needed when writing your `T-SQL` queries. While
    including additional data fields can have additional hardware overhead, it can
    also affect how `SQL Server` searches the data records. If `SQL Server` needs
    to use an `Index Seek` or an `Index Scan` to find the required data records, that
    does not mean that all the data fields need to exist in the non-clustered index.
    If additional data columns are required, `SQL Server` may need the non-clustered
    index to get the additional data columns from the clustered index. When this happens,
    you will see a `Key Lookup` in your execution plan like the one in Figure 7-13.


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig13_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig13_HTML.jpg)


    *Figure 7-13: Key Lookup*


    When you see a `Key Lookup`, that lets you know that not all of the information
    needed for your query existed in the non-clustered index. In these scenarios,
    it signifies that the index may need to be modified to include those columns.
    Before deciding to add these data fields as included columns, you should be aware
    that including the columns in the index may have an additional cost associated
    with writing or updating the index.


    ## Heaps and Table Scans


    A table that does not have a clustered index is also known as a `heap`. If there
    are no other indexes on the table, `SQL Server` will have to search row by row
    to find the data records it needs for query results. There are many other factors
    that can be involved, but this can cause `SQL Server` to scan the entire table.
    This can be seen in the execution plan as Figure 7-14.


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig14_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig14_HTML.jpg)


    *Figure 7-14: Table Scan*'
