  trans: '### DDL（数据定义语言）触发器


    当应用程序或用户更改整体数据库架构时，他们使用的便是数据定义语言。以 SQL Server 为例，它能够对数据库更改引发的特定场景作出响应。虽然我不期望这会成为应用开发的标准组成部分，但了解此类触发器的存在可能有所帮助。


    如果你担心 SQL 注入会对你的服务器造成问题，DDL 触发器可以帮助减轻损害。你可以设置选项来防止所有类型的数据库对象被删除。此外，还可以记录或追踪数据库对象何时被创建或修改。尽管你可能想利用触发器来设置各种监控服务器和数据库上所有活动的触发器，但可能存在更好的选择。有其他替代方案可用于跟踪此类行为。这包括用于服务器和数据库活动的
    SQL Server 审计。通常，应用程序并不关心记录对服务器或数据库架构的更改。


    ### DML（数据操作语言）触发器


    如果你发现自己需要在应用开发中实现审计或日志记录，你会发现数据操作触发器非常有用。这些触发器有多种选项，并能根据数据库中实际数据的更改响应各种操作。在某些情况下，你可能只想记录更改发生的时间及更改了什么。在其他情况下，更改或验证请求的功能可能更为重要。


    触发器的一种方法是在某事发生后执行一个操作。例如，我希望成功修改 `dbo.IngredientCost` 表中的一条记录，但同时也希望保留该项目成本随时间变化的历史记录。清单
    2-33 展示了一些 T-SQL 代码，它将在更改发生后向历史表添加一条记录。


    ```sql

    CREATE TRIGGER dbo.LogIngredientCostHistory

    ON dbo.IngredientCost

    AFTER INSERT, UPDATE

    AS

    IF (ROWCOUNT_BIG() = 0)

    RETURN;

    INSERT INTO dbo.IngredientCostHistory (IngredientCostID, Cost, DateCreated)

    SELECT inserted.IngredientCostID, inserted.Cost, GETDATE()

    FROM inserted;

    GO

    ```

    清单 2-33：创建后插入型 DML 触发器


    当在 `dbo.IngredientCost` 表中插入或更新记录时，新的成本和成本更改的日期将被记录在 `dbo.IngredientCostHistory`
    表中。为了查看此触发器的性能，我通过运行清单 2-34 中的代码对其进行测试。


    ```sql

    INSERT INTO dbo.IngredientCost (IngredientID, ServingPortionID, Cost, IsActive,
    DateCreated, DateModified)

    VALUES (1, 1, 5.98, 1, GETDATE(), GETDATE())

    ```

    清单 2-34：向 `IngredientCost` 插入记录的查询


    执行上述代码时，执行计划包含两个步骤。第一步是运行代码将记录插入到 `dbo.IngredientCost`。第二个执行计划显示了由触发器引发的插入操作的计划。清单
    2-34 生成的执行计划见图 2-20。


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig20_HTML.jpg](img/480547_1_En_2_Fig20_HTML.jpg)

    图 2-20：带触发器的插入记录执行计划


    图 2-20 中的执行计划显示了当记录被修改以触发触发器时发生的情况。然而，来自清单 2-31 的 T-SQL 代码 `IF (ROWCOUNT_BIG()
    = 0) RETURN;` 可防止在没有记录被更新时 DML 触发器触发。这被认为是最佳实践，可以在无需任何操作时最小化服务器上的资源利用。清单 2-35
    展示了一个不会有记录被更新的更新查询。


    ```sql

    UPDATE dbo.IngredientCost

    SET Cost = 10.00

    WHERE IngredientID  IngredientID

    ```

    清单 2-35：不会更新任何记录的更新语句


    如你在图 2-21 中所见，执行计划只有一个步骤。那就是更新操作的执行计划。没有来自触发器的 T-SQL 代码执行。


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig21_HTML.jpg](img/480547_1_En_2_Fig21_HTML.jpg)

    图 2-21：没有记录被更新的执行计划


    如你所见，SQL Server 意识到触发器没有返回任何需要更新的记录。在没有尝试向 `dbo.IngredientCostHistory` 表插入任何记录的情况下，唯一的动作是生成更新的执行计划。在活动之后执行触发器并不是数据操作触发器的唯一选项。还可以让触发器执行一个操作来代替原本请求的操作。清单
    2-36 展示了一个在用户发出删除操作时会禁用记录的触发器。


    ```sql

    CREATE TRIGGER dbo.DisableMealType

    ON dbo.MealType

    INSTEAD OF DELETE

    AS

    IF (ROWCOUNT_BIG() = 0)

    RETURN;

    UPDATE meal

    SET IsActive = 0

    FROM dbo.MealType meal

    INNER JOIN deleted del

    ON meal.MealTypeID = del.MealTypeID;

    GO

    ```

    清单 2-36：`INSTEAD OF` 触发器


    如你所见，在 SQL Server 中使用 DML 触发器时，有多个选项可用。还可以为每个数据库对象设置多个触发器。你可以为每个 `INSERT`、`UPDATE`
    和 `DELETE` 设置一个 `INSTEAD OF` 触发器。你也可以在同一个表或视图上拥有多个 `AFTER` 触发器。由于允许的触发器数量，你还可以指定每个
    `INSERT`、`UPDATE` 或 `DELETE` 操作中哪个触发器应该最先或最后运行。如果你为一个操作类型拥有多个 `AFTER` 触发器，这些触发器将以随机顺序运行。


    由于一个给定的数据库对象上可能存在多层触发器，因此测试这些触发器的功能非常重要。正如本章讨论的许多其他概念一样，了解触发器在负载下的表现有助于为应用程序的性能表现做好准备。'
- fmt: '## Cursors


    在有效地使用关系型数据库时，通常关键是要以大块或集合的形式来思考进程和数据。几乎所有场景的目标都是编写能够利用这种基于集合逻辑的 T-SQL。虽然这是理想的方法，但你可能会遇到一些情况，让你觉得无法以大块的方式处理数据。在某些情况下，这可能意味着是时候逐行处理数据了。


    如果你考虑走这条路，必须承认 SQL Server 在处理一个大数据块时比逐个处理大量单独记录时表现更好。在一些忍不住想使用逐行逻辑工具的情况下，可能是时候寻找另一个能更好满足需求的工具了。例如，当需要创建一个游标来逐一连接到多个
    SQL Server 实例并执行任务时。虽然这超出了本书的范围，但这种特定情况可能最好通过创建一个 SQL Server Integration Services
    (SSIS) 包来处理连接到各个 SQL Server 实例。


    还有其他一些时候，你可能需要使用 T-SQL 生成一个结果集，其中返回的数据是相同的，但必须按位置或供应商信息进行分段。在这个例子中，可以使用 SQL Server
    Reporting Services (SSRS) 来实现相同的目标。然而，你的公司可能决定不使用 SSRS。因此，使用游标可能是正确的选择。我也遇到过需要用每个记录特定的计算值来更新数据的情况。在这种情况下，几乎不可能使用基于集合的逻辑来执行更新。虽然
    SQL Server 能够处理这个任务，但如果应用程序能处理这些更改会更理想。


    游标可以帮助创建一个可重复的进程，一次处理一条记录。虽然游标可用于解决各种问题，但重要的是要记住，很多时候可能有不用游标就能达到相同结果的不同方法。如果你确定确实必须使用游标，下一步就是确定使用哪种类型的游标。无论使用哪种类型，游标的概念是相同的，但游标的类型将决定其内部数据的功能和可访问性。


    当为你的需求选择合适的游标类型时，请选择满足你需求且功能最少的那一个。与功能更多的游标类型相比，这将有助于减少负面性能影响。无论何时在 SQL Server
    中逐条处理记录，它们几乎总是比以分组方式处理数据的性能更差。


    游标选择一个数据集，一次获取一条记录，然后修改当前记录。一旦完成了所需的操作，就可以获取下一条记录。这就是了解可用的各种游标类型能让你选择正确类型的地方。


    ### Forward-Only Cursors


    默认的游标类型称为仅向前游标。对于这种类型的游标，数据只能单向获取。在仅向前游标中获取的记录可以插入、更新和删除游标内获取的记录。如果一条记录之前已被更新过，除非游标关闭并重新打开，否则它不会再次被获取。在少数情况下，在记录被更新后，你仍可能在同一游标内看到该记录。代码清单
    [2-37](#480547_1_En_2_Chapter.xhtml#PC37) 展示了一个仅向前游标的示例。


    ```sql

    SET NOCOUNT ON;

    DECLARE @RecipeID INT,

    @RecipeName VARCHAR(25),

    @message VARCHAR(50);

    PRINT ''-------- Recipe Listing --------'';

    DECLARE recipe_cursor CURSOR FORWARD_ONLY

    FOR

    SELECT RecipeID, RecipeName

    FROM dbo.Recipe

    ORDER BY RecipeID;

    OPEN recipe_cursor

    FETCH NEXT FROM recipe_cursor

    INTO @RecipeID, @RecipeName

    WHILE @@FETCH_STATUS = 0

    BEGIN

    PRINT '' ''

    SELECT @message = ''----- Ingredients For Recipe: '' + @RecipeName + ''-----''

    PRINT @message

    SELECT ing.IngredientName, srv.ServingPortionQuantity, srv.ServingPortionUnit

    FROM dbo.Ingredient ing

    INNER JOIN dbo.RecipeIngredient recing

    ON ing.IngredientID = recing.IngredientID

    INNER JOIN dbo.ServingPortion srv

    ON recing.ServingPortionID = srv.ServingPortionID

    WHERE recing.RecipeID = @RecipeID

    FETCH NEXT FROM recipe_cursor INTO @RecipeID, @RecipeName

    END

    CLOSE recipe_cursor;

    DEALLOCATE recipe_cursor;

    ```


    代码清单 2-37

    仅向前游标示例


    在这个仅向前游标的例子中，我生成了一个食谱列表及其每道菜所需的所有配料。在图 [2-22](#480547_1_En_2_Chapter.xhtml#Fig22)
    中，你可以看到输出到文本窗口的结果。


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig22_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig22_HTML.jpg)


    图 2-22

    仅向前游标的输出


    虽然这产生了我想要的输出，但我也必须记住性能影响。在图 [2-23](#480547_1_En_2_Chapter.xhtml#Fig23) 中，你可以看到此游标执行计划的一部分。


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig23_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig23_HTML.jpg)


    图 2-23

    仅向前游标的执行计划


    重要的是要记住，此图的第二部分和第三部分将为此游标处理的每一行重新运行。当底层查询快速且高效时，这可能不是问题。然而，如果游标内的查询有任何性能问题，游标可能会严重加剧这些性能问题。


    ### Static Cursors


    有时你会希望在运行游标时能够前后移动。使用静态游标时，可用的结果集在游标首次打开后不会改变。静态游标可以选择为只读或允许读写。当游标为只读时，数据无法被修改。如果数据被修改，无法保证游标会拉回修改后的数据。


    ### Keyset Cursors


    在定义游标时，可能有一组列创建了唯一条目。如果可以找到这组唯一数据，并且你需要能够与已更改的记录进行交互，那么使用键集游标可能是一个选择。键集是从唯一列集的一组键。游标可以前后移动，但检测属于游标的记录顺序变化的唯一方法是关闭并重新打开游标。'
  raw: '## Cursors


    In order to use relational databases effectively, it is often critical to think
    of processes and data in large chunks, or sets. The goal in almost all scenarios
    is to write T-SQL that takes advantage of this set-based logic. While this is
    the ideal method, you may find yourself in a situation where you feel handling
    data in large sections is not possible. In some of these scenarios, it may mean
    that it is time to handle the data by each row individually.


    If you consider this route, it is imperative to acknowledge that SQL Server is
    designed to perform best when dealing with one large section of data vs. dealing
    with lots of individual records one at a time. In some cases where it is tempting
    to use something that handles row-by-row logic, it may be time to look for another
    tool to handle your needs better. Such is the case when creating a cursor to connect
    to several instances of SQL Server one at a time and perform a task. While it
    is outside the scope of this book, this specific situation may be best resolved
    by creating an SQL Server Integration Services (SSIS) package to handle connecting
    to the various SQL Server instances.


    There are other times where you may need to use T-SQL to generate a result set
    where the data returned is the same, but the data must be segmented by location
    or vendor information. In this example, SQL Server Reporting Services (SSRS) could
    be used to achieve the same goal. However, your business may decide not to use
    SSRS. Therefore, using a cursor may be the right choice. I have also seen situations
    where data needed to be updated with a calculation using a specific, calculated
    value per record. In this case, it was almost impossible to perform the updates
    using set-based logic. While SQL Server was able to handle this task, it would
    have been preferable for the application to handle these changes.


    Cursors can help make a repeatable process that touches one record at a time.
    While cursors can be used to address a variety of issues, it is important to remember
    that many times there may be a different way to achieve the same outcome without
    using cursors. If you have decided that you must really use a cursor, the next
    step is determining which type of cursor to use. While the concept of a cursor
    is the same regardless of which type is used, the type of cursor will determine
    the functionality and accessibility of the data within the cursor.


    When choosing the right type of cursor for your needs, choose the one with the
    least amount of functionality that will meet your needs. This will help reduce
    negative performance as compared to cursor types with more functionality. Whenever
    you are handling records in SQL Server one at a time, they will almost always
    perform worse than handling data in groups.


    A cursor selects a set of data, fetches one record at a time, and then modifies
    the current record. Once the required actions have been taken, the next record
    can be fetched. This is where knowing the various types of cursors available will
    allow you to choose the correct type.


    ### Forward-Only Cursors


    The default type of cursor is called the forward-only cursor. For this type of
    cursor, the data can only be fetched in one direction. Records fetched in forward-only
    cursors can insert, update, and delete records that are fetched within the cursor.
    If a record has been updated previously, it will not be fetched again unless the
    cursor is closed and reopened. There are also limited cases where you would be
    able to see the same record within the cursor after it had already been updated.
    Listing [2-37](#480547_1_En_2_Chapter.xhtml#PC37) shows an example of forward-only
    cursor.


    ```

    SET NOCOUNT ON;

    DECLARE @RecipeID INT,

    @RecipeName VARCHAR(25),

    @message VARCHAR(50);

    PRINT ''-------- Recipe Listing --------'';

    DECLARE recipe_cursor CURSOR FORWARD_ONLY

    FOR

    SELECT RecipeID, RecipeName

    FROM dbo.Recipe

    ORDER BY RecipeID;

    OPEN recipe_cursor

    FETCH NEXT FROM recipe_cursor

    INTO @RecipeID, @RecipeName

    WHILE @@FETCH_STATUS = 0

    BEGIN

    PRINT '' ''

    SELECT @message = ''----- Ingredients For Recipe: '' + @RecipeName + ''-----''

    PRINT @message

    SELECT ing.IngredientName, srv.ServingPortionQuantity, srv.ServingPortionUnit

    FROM dbo.Ingredient ing

    INNER JOIN dbo.RecipeIngredient recing

    ON ing.IngredientID = recing.IngredientID

    INNER JOIN dbo.ServingPortion srv

    ON recing.ServingPortionID = srv.ServingPortionID

    WHERE recing.RecipeID = @RecipeID

    FETCH NEXT FROM recipe_cursor INTO @RecipeID, @RecipeName

    END

    CLOSE recipe_cursor;

    DEALLOCATE recipe_cursor;

    Listing 2-37

    Example of a Forward-Only Cursor

    ```


    In the case of this forward-only cursor, I am generating a list of recipes with
    all the ingredients required per menu. In Figure [2-22](#480547_1_En_2_Chapter.xhtml#Fig22),
    you can see what this result looks like when output to the text window.


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig22_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig22_HTML.jpg)


    Figure 2-22


    Output from the Forward-Only Cursor


    While this produced the output I wanted, I also must keep in mind the performance
    impact. In Figure [2-23](#480547_1_En_2_Chapter.xhtml#Fig23), you can see part
    of the execution plan for this cursor.


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig23_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig23_HTML.jpg)


    Figure 2-23


    Execution Plan for a Forward-Only Cursor


    It is important to remember that the second and third sections of this figure
    will rerun for each row processed in this cursor. When the underlying queries
    are quick and perform efficiently, that may not be an issue. However, if the queries
    inside of the cursor have any performance issues at all, a cursor can severely
    exacerbate any of these performance issues.


    ### Static Cursors


    Sometimes you will want to be able to move backward and forward when running the
    cursor. When using a static cursor, the available result set does not change from
    when the cursor is first opened. The static cursor has the option to be read only
    or allow reads and writes. When the cursor is read only, data cannot be modified.
    If the data is modified, there is no guarantee that the cursor will pull back
    the modified data.


    ### Keyset Cursors


    When defining a cursor, there may be a set of columns that create a unique entry.
    If that set of unique data can be found and you need to be able to interact with
    records that have changed, using the keyset cursor may be an option. The keyset
    is a set of keys from the unique set of columns. The cursor can move backward
    and forward, but the only way to detect changes to the order are the records that
    belong in the cursor to close and reopen the cursor.'
  trans: '


    ## 游标


    在有效地使用关系型数据库时，通常关键是要以大块或集合的形式来思考进程和数据。几乎所有场景的目标都是编写能够利用这种基于集合逻辑的 T-SQL。虽然这是理想的方法，但你可能会遇到一些情况，让你觉得无法以大块的方式处理数据。在某些情况下，这可能意味着是时候逐行处理数据了。


    如果你考虑走这条路，必须承认 SQL Server 在处理一个大数据块时比逐个处理大量单独记录时表现更好。在一些忍不住想使用逐行逻辑工具的情况下，可能是时候寻找另一个能更好满足需求的工具了。例如，当需要创建一个游标来逐一连接到多个
    SQL Server 实例并执行任务时。虽然这超出了本书的范围，但这种特定情况可能最好通过创建一个 SQL Server Integration Services
    (SSIS) 包来处理连接到各个 SQL Server 实例。


    还有其他一些时候，你可能需要使用 T-SQL 生成一个结果集，其中返回的数据是相同的，但必须按位置或供应商信息进行分段。在这个例子中，可以使用 SQL Server
    Reporting Services (SSRS) 来实现相同的目标。然而，你的公司可能决定不使用 SSRS。因此，使用游标可能是正确的选择。我也遇到过需要用每个记录特定的计算值来更新数据的情况。在这种情况下，几乎不可能使用基于集合的逻辑来执行更新。虽然
    SQL Server 能够处理这个任务，但如果应用程序能处理这些更改会更理想。


    游标可以帮助创建一个可重复的进程，一次处理一条记录。虽然游标可用于解决各种问题，但重要的是要记住，很多时候可能有不用游标就能达到相同结果的不同方法。如果你确定确实必须使用游标，下一步就是确定使用哪种类型的游标。无论使用哪种类型，游标的概念是相同的，但游标的类型将决定其内部数据的功能和可访问性。


    当为你的需求选择合适的游标类型时，请选择满足你需求且功能最少的那一个。与功能更多的游标类型相比，这将有助于减少负面性能影响。无论何时在 SQL Server
    中逐条处理记录，它们几乎总是比以分组方式处理数据的性能更差。


    游标选择一个数据集，一次获取一条记录，然后修改当前记录。一旦完成了所需的操作，就可以获取下一条记录。这就是了解可用的各种游标类型能让你选择正确类型的地方。


    ### 仅向前游标


    默认的游标类型称为仅向前游标。对于这种类型的游标，数据只能单向获取。在仅向前游标中获取的记录可以插入、更新和删除游标内获取的记录。如果一条记录之前已被更新过，除非游标关闭并重新打开，否则它不会再次被获取。在少数情况下，在记录被更新后，你仍可能在同一游标内看到该记录。代码清单
    2-37 展示了一个仅向前游标的示例。


    ```sql

    SET NOCOUNT ON;

    DECLARE @RecipeID INT,

    @RecipeName VARCHAR(25),

    @message VARCHAR(50);

    PRINT ''-------- Recipe Listing --------'';

    DECLARE recipe_cursor CURSOR FORWARD_ONLY

    FOR

    SELECT RecipeID, RecipeName

    FROM dbo.Recipe

    ORDER BY RecipeID;

    OPEN recipe_cursor

    FETCH NEXT FROM recipe_cursor

    INTO @RecipeID, @RecipeName

    WHILE @@FETCH_STATUS = 0

    BEGIN

    PRINT '' ''

    SELECT @message = ''----- Ingredients For Recipe: '' + @RecipeName + ''-----''

    PRINT @message

    SELECT ing.IngredientName, srv.ServingPortionQuantity, srv.ServingPortionUnit

    FROM dbo.Ingredient ing

    INNER JOIN dbo.RecipeIngredient recing

    ON ing.IngredientID = recing.IngredientID

    INNER JOIN dbo.ServingPortion srv

    ON recing.ServingPortionID = srv.ServingPortionID

    WHERE recing.RecipeID = @RecipeID

    FETCH NEXT FROM recipe_cursor INTO @RecipeID, @RecipeName

    END

    CLOSE recipe_cursor;

    DEALLOCATE recipe_cursor;

    ```


    代码清单 2-37

    仅向前游标示例


    在这个仅向前游标的例子中，我生成了一个食谱列表及其每道菜所需的所有配料。在图 2-22 中，你可以看到输出到文本窗口的结果。


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig22_HTML.jpg](img/480547_1_En_2_Fig22_HTML.jpg)


    图 2-22

    仅向前游标的输出


    虽然这产生了我想要的输出，但我也必须记住性能影响。在图 2-23 中，你可以看到此游标执行计划的一部分。


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig23_HTML.jpg](img/480547_1_En_2_Fig23_HTML.jpg)


    图 2-23

    仅向前游标的执行计划


    重要的是要记住，此图的第二部分和第三部分将为此游标处理的每一行重新运行。当底层查询快速且高效时，这可能不是问题。然而，如果游标内的查询有任何性能问题，游标可能会严重加剧这些性能问题。


    ### 静态游标


    有时你会希望在运行游标时能够前后移动。使用静态游标时，可用的结果集在游标首次打开后不会改变。静态游标可以选择为只读或允许读写。当游标为只读时，数据无法被修改。如果数据被修改，无法保证游标会拉回修改后的数据。


    ### 键集游标


    在定义游标时，可能有一组列创建了唯一条目。如果可以找到这组唯一数据，并且你需要能够与已更改的记录进行交互，那么使用键集游标可能是一个选择。键集是从唯一列集的一组键。游标可以前后移动，但检测属于游标的记录顺序变化的唯一方法是关闭并重新打开游标。


