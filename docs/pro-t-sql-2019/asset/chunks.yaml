    创建此表时并未指定 `RecipeHistRange` 的分区方案。该表将作为标准表创建在数据库的 `PRIMARY` 文件组上。


    一旦基础表创建完成，我们便可以创建一个单一的数据库对象来访问这两个表。这将与上一节创建的分区视图相同。`清单 15-22` 包含了创建分区视图所需的 `T-SQL`
    代码。


    ```sql

    CREATE VIEW dbo.vwRecipeHistory

    AS

    -- 从当前的读写表中选择数据

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.RecipeHistory

    UNION ALL

    -- 从分区表中选择数据

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    DateCreated,

    DateModified

    FROM dbo.RecipeHistoryPartition;

    ```


    **清单 15-22** 创建分区视图


    前面的分区视图使我们能够将最新且高度活跃的数据保留在一个没有分区的表中。可以对此表特别建立索引，以实现最佳的写入速度。分区视图中包含的任何其他表则可以根据其使用情况进行索引。前面分区视图中包含的分区表可能仅包含非活跃数据。因此，我们可以预期这些数据将来只会被读取。了解这一点后，我们可以使用不同的策略来索引此表。


    回顾我们已经介绍的内容，我想展示 `SQL Server` 在查询非分区表时的行为。`清单 15-23` 中的查询用于在 `dbo.RecipeHistory`
    表中查找特定日期范围的所有记录。


    ```sql

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    DateCreated

    FROM dbo.RecipeHistory

    WHERE DateCreated BETWEEN ''2018/10/7'' AND ''2018/10/9'';

    ```


    **清单 15-23** 在分区表和视图之前访问数据


    前面的查询将在非分区表上运行。在查询执行时，此表是按原始主键 `RecipeHistoryID` 排序的。因此，`清单 15-23` 中查询的执行计划如 `图
    15-16` 所示。


    ![非分区表的执行计划](img/480547_1_En_15_Fig16_HTML.jpg)


    **图 15-16** 非分区表的执行计划


    基于 `图 15-16` 中的执行计划，你可以看到 `SQL Server` 使用了 `聚集索引扫描` 来查找相关记录。这是因为没有包含 `DateCreated`
    的索引。由于表没有按日期分区，`SQL Server` 也需要遍历整个表来查找满足 `清单 15-23` 中查询条件的数据记录。


    运行此查询后，我们可以查看有关执行计划中运算符的更多信息。具体来说，我想查看此查询执行的逻辑读取次数和返回的行数。查看 `图 15-17`，你可以看到逻辑读取次数和行数。


    ![与聚集索引扫描相关的读取](img/480547_1_En_15_Fig17_HTML.jpg)


    **图 15-17** 与聚集索引扫描相关的读取


    我们可以看到，此查询返回了 33,465 行，逻辑读取的总页数为 5,654 页。我们将把这些值与包含分区表和非分区表的分区视图的性能进行比较。


    之前，在 `清单 15-22` 中，我创建了一个分区视图，其中包含一个用于所有 2018 年数据记录的分区表和一个用于所有 2019 年数据记录的非分区表。为了比较分区视图与非分区表的性能差异，我可以运行
    `清单 15-24` 中的查询。


    ```sql

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    DateCreated

    FROM dbo.vwRecipeHistory

    WHERE DateCreated BETWEEN ''2018/10/7'' AND ''2018/10/9'';

    ```


    **清单 15-24** 使用分区表中的分区列访问数据


    前面的查询寻找的数据记录与 `清单 15-23` 中的查询相同。但是，此查询访问的是分区视图，而不是非分区表。该分区视图由一个包含所有 2018 年数据的分区表和一个包含
    2019 年数据的非分区表组成。在 `图 15-18` 中，我们可以看到为此查询生成的执行计划。


    ![分区视图的执行计划](img/480547_1_En_15_Fig18_HTML.jpg)


    **图 15-18** 分区视图的执行计划


    需要注意的一个重要点是，此执行计划使用了 `聚集索引查找` 而不是 `聚集索引扫描`。这让我们知道 `SQL Server` 能够确定如何有效地找到相关数据记录，而无需遍历表中所有或大部分记录。另一个显著点是
    `聚集索引查找` 是在分区的 `dbo.RecipeHistory2018` 表上执行的。我还可以查看与 `聚集索引查找` 相关的属性以获取更多信息。在 `图
    15-19` 中，我们可以看到逻辑读取次数和返回的记录数。


    ![在分区键上建有聚集索引的分区视图的查询读取](img/480547_1_En_15_Fig19_HTML.jpg)


    **图 15-19** 在分区键上建有聚集索引的分区视图的查询读取


    返回的总行数为 10,040 行，从内存中读取的数据页总数为 54。从内存中读取的数据页总数减少表明，此查询在查找相关数据方面比 `清单 15-23` 中的查询更高效。


    我们已经看到了查询引用分区表的分区视图时在分区列上的表现。下一步是查看当访问非分区表时，查询分区视图是如何工作的。`清单 15-25` 显示了一个查询，用于从分区视图的非分区表中访问数据。


    ```sql

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    DateCreated

    FROM dbo.vwRecipeHistory

    WHERE DateCreated BETWEEN ''2019/5/7'' AND ''2019/5/9'';

    ```


    **清单 15-25** 使用不在分区表中的分区列访问数据


    前面的查询返回的列与 `清单 15-23` 和 `清单 15-24` 中的查询相同。`WHERE` 子句中的条件访问的是 2019 年而非 2018 年的数据。要查看这种日期变化如何影响生成的执行计划，我们可以在
    `图 15-20` 中看到差异。


    ![非分区表上的分区视图执行计划](img/480547_1_En_15_Fig20_HTML.jpg)


    **图 15-20** 非分区表上的分区视图执行计划


    类似地，在 `图 15-20` 中，前面的执行计划将在 `dbo.RecipeHistory` 表上使用 `聚集索引查找`。虽然分区表和非分区表的执行计划相似，但从
    `SQL Server` 检索的数据量可能因执行计划而异。查看 `图 15-21` 可以显示 `清单 15-25` 中查询访问了多少数据。


    ![非分区表上的分区视图查询读取](img/480547_1_En_15_Fig21_HTML.jpg)


    **图 15-21** 非分区表上的分区视图查询读取

