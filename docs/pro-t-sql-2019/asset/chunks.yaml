    issues. In Listing 13-1, there is an example of a `MERGE` statement.


    ```sql

    CREATE PROCEDURE dbo.RecipeUpsert

    @RecipeID INT,

    @RecipeName VARCHAR(25),

    @RecipeDescription VARCHAR(50),

