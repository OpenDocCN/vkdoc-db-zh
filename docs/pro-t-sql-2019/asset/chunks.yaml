    # 第四部分 构建可维护的 T-SQL


    ## 第 13 章 功能设计


    在本书的进程中，我们已经涵盖了许多不同的主题。其中大多数章节都涉及最佳实践。这些最佳实践包括命名规范、T-SQL 代码格式化或数据库对象设计。尽管你尽了最大努力，仍可能会遇到超出最佳实践范畴的情况。这些时候可能与高压时期或紧迫的截止日期相关联。本章的目标是帮助你为那些必须就复杂主题做出快速决策的情况做好准备。


    为那些旨在允许用户插入或更新数据的应用程序设计数据库代码可能具有挑战性。你可能会发现自己需要处理那些需要禁用权限或功能的应用程序。在处理遗留的应用程序代码时，可能会有额外的挑战，特别是如果这些应用程序使用了
    ORM 软件。随着组织的增长，可能需要额外的报表功能，但可能没有开发数据仓库所需的时间。在 SQL Server 中，有办法让你的 T-SQL 代码更灵活，但你需要确保不会为了灵活性而牺牲功能性。


    ### 插入与更新数据


    有各种场景会让你希望能够传入一组值。如果记录不存在，你可能希望插入信息；但如果记录确实存在，那么你可能希望更新该记录。通常，当我们处于压力之下时，我们会寻找最快、最简单的方法来做事情。其他时候，我们可能更关注
    T-SQL 代码的可读性，而不是什么对数据库引擎最有利。虽然确保你的数据库代码能被他人理解很重要，但在编写 T-SQL 时，考虑数据库代码的性能同样重要。


    在使用 T-SQL 插入或更新数据库记录时，这一点同样适用。无论用户是插入新记录还是更新现有记录，应用程序执行相同的存储过程可能更容易、更直接。这类操作也可被称为**更新插入**。你是如何陷入这种境地的并不重要；重要的是设计出可靠有效运行的
    T-SQL 代码。


    有一些 T-SQL 数据库代码可以使执行插入或更新的过程易于编写。此功能称为 `MERGE` 语句。使用此 `MERGE` 语句的好处在于逻辑直接明了。然而，`MERGE`
    语句存在许多已知问题。我建议除非你愿意接受这些潜在问题，否则不要使用 `MERGE` 语句。在清单 13-1 中，有一个 `MERGE` 语句的示例。


    ```sql

    CREATE PROCEDURE dbo.RecipeUpsert

    @RecipeID INT,

    @RecipeName VARCHAR(25),

    @RecipeDescription VARCHAR(50),

    @ServingQuantity TINYINT,

    @MealTypeID TINYINT,

    @PreparationTypeID TINYINT,

    @IsActive BIT,

    @DateCreated DATETIME,

    @DateModified DATETIME

    AS

    MERGE dbo.Recipe AS [Target]

    USING

    (

    VALUES

    (

    @RecipeID,

    @RecipeName,

    @RecipeDescription,

    @ServingQuantity,

    @MealTypeID,

    @PreparationTypeID,

    @IsActive,

    @DateCreated,

    @DateModified

    )

    ) AS [Source]

    (

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    )

    ON ([Target].RecipeID = [Source].RecipeID)

    WHEN MATCHED THEN

    UPDATE SET

    [Target].RecipeName = [Source].RecipeName,

    [Target].RecipeDescription = [Source].RecipeDescription,

    [Target].ServingQuantity = [Source].ServingQuantity,

    [Target].MealTypeID = [Source].MealTypeID,

    [Target].PreparationTypeID = [Source].PreparationTypeID,

    [Target].IsActive = [Source].IsActive,

    [Target].DateCreated = [Source].DateCreated,

    [Target].DateModified = [Source].DateModified

    WHEN NOT MATCHED BY TARGET THEN

    INSERT (

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    )

    VALUES (

    [Source].RecipeID,

    [Source].RecipeName,

    [Source].RecipeDescription,

    [Source].ServingQuantity,

    [Source].MealTypeID,

    [Source].PreparationTypeID,

    [Source].IsActive,

    [Source].DateCreated,

    [Source].DateModified

    );

    ```


    清单 13-1：包含 Merge 语句的存储过程


    前面的 `MERGE` 语句在食谱已存在于 `dbo.Recipe` 表中时更新它。此 `MERGE` 语句的逻辑易于遵循，其格式也易于编写。使用 `MERGE`
    语句存在几个已知问题。在你的环境中实施 `MERGE` 语句之前，你需要意识到这些问题。


    我曾经在没有完全理解 `MERGE` 语句带来的问题之前就实施了它们。当我试图替换这些 `MERGE` 语句时，有人担心替换后的逻辑会过于困难。要替换清单
    13-1 中的逻辑，你可以编写一个类似于清单 13-2 中的查询。

