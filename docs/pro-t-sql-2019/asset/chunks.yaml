- fmt: '# Partitioned Tables


    While we have created filegroups, files, partition functions, and partition schemes,
    none of this partitioning logic has been applied to any data within the databases.
    We either have the option of creating a new table or partitioning an existing
    table. For this example, I will start with creating a new table that is partitioned
    as part of the table creation. You can see the T-SQL to create the partitioned
    table in `Listing 15-6`.


    ```sql

    CREATE TABLE dbo.RecipeHistory

    (

    RecipeHistoryID         BIGINT      NOT NULL IDENTITY(1,1),

    RecipeID                SMALLINT    NOT NULL,

    RecipeHistoryStatusID   TINYINT     NOT NULL,

    DateCreated             DATETIME    NOT NULL,

    DateModified            DATETIME    NULL,

    CONSTRAINT pk_RecipeHistory_RecipeHistoryID

    PRIMARY KEY NONCLUSTERED

    (RecipeHistoryID, DateCreated),

    CONSTRAINT fk_RecipeHistory_RecipeID

    FOREIGN KEY (RecipeID)

    REFERENCES dbo.Recipe(RecipeID),

    CONSTRAINT fk_RecipeHistory_RecipeHistoryStatusID

    FOREIGN KEY (RecipeHistoryStatusID)

    REFERENCES

    dbo.RecipeHistoryStatus(RecipeHistoryStatusID)

    )

    ON RecipeHistRange (DateCreated);

    ```

    `Listing 15-6` Create Partitioned Table


    In the preceding code, the last line indicates that the table should be created
    on the partition scheme from `Listing 15-4`. Once the partitioned table is created
    in `Listing 15-6`, the structure of the table will look like `Figure 15-3`.


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig3_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig3_HTML.jpg)

    `Figure 15-3` Partitioned Table Data Structure


    Inside of the partitioned table, you can see each partition clearly. Within the
    partitioned table, you can also see how the right range on the partition function
    has broken out the data into each partition. You can confirm how the table is
    partitioned by running the query in `Listing 15-7`.


    ```sql

    SELECT tbl.[name] AS TableName,

    sch.[name] AS PartitionScheme,

    fnc.[name] AS PartitionFunction,

    prt.partition_number,

    fnc.[type_desc],

    rng.boundary_id,

    rng.[value] AS BoundaryValue,

    prt.[rows]

    FROM sys.tables tbl

    INNER JOIN sys.indexes idx

    ON tbl.[object_id] = idx.[object_id]

    INNER JOIN sys.partitions prt

    ON idx.[object_id] = prt.[object_id]

    AND idx.index_id = prt.index_id

    INNER JOIN sys.partition_schemes AS sch

    ON idx.data_space_id = sch.data_space_id

    INNER JOIN sys.partition_functions AS fnc

    ON sch.function_id = fnc.function_id

    LEFT JOIN sys.partition_range_values AS rng

    ON fnc.function_id = rng.function_id

    AND rng.boundary_id = prt.partition_number

    WHERE tbl.[name] = ''RecipeHistory''

    AND idx.[type] <= 1

    ORDER BY prt.partition_number;

    ```

    `Listing 15-7` View Partitions for Partitioned Table


    The preceding query shows the table name, the partition scheme used on the table,
    the partition function used on the table, the partition number, value to partition
    the data, and the number of rows in each partition. `Figure 15-4` shows the results
    from the query in `Listing 15-7`.


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig4_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig4_HTML.jpg)

    `Figure 15-4` Data for Partitioned Table


    The preceding results were taken immediately after the partitioned table was created.
    You can see that the partition scheme used is `RecipeHistRange` and the partition
    function is `RecipeHistFunc`. The preceding boundary values match the ranges specified
    in `Listing 15-3` when the partition function was created. Looking at the value
    in the `rows` column from `Figure 15-4` above, you can see all the values are
    0\. This is because there are no rows in the table.


    I inserted data from a pre-existing table into the partitioned table. Executing
    the same query from `Listing 15-7`, I can see how the data has been stored in
    the partitions. In `Figure 15-5`, you can see the number of rows per partition.


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig5_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig5_HTML.jpg)

    `Figure 15-5` Data Added to Partitioned Table


    In `Figure 15-4`, I showed the row counts per partition before any data was added
    to the `dbo.RecipeHistory` table. `Figure 15-5` shows the number of rows per partition
    after the table is fully populated. The first partition has 203,493 rows. We know
    the actual number of rows in the partition, but we may still want to confirm that
    the table is partitioning data as we would expect. In `Listing 15-8`, I have written
    a query to count the number of records by date ranges.


    ```sql

    SELECT

    SUM(

    CASE WHEN DateCreated = ''7/1/2019''

    THEN 1

    ELSE 0

    END

    ) AS Partition4

    FROM dbo.RecipeHistory;

    ```

    `Listing 15-8` Query to Confirm Row Counts


    The first column in the query returns a count of records that have a created date
    before January 1, 2019\. Assuming the partition function is partitioning data
    as we would expect, the number of rows shown for the first partition from `Figure
    15-5` should match the value returned for column one from `Listing 15-8`. The
    query results from `Listing 15-8` are shown in `Figure 15-6`.


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig6_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig6_HTML.jpg)

    `Figure 15-6` Query Results Showing Row Count


    Each column in `Figure 15-6` shows the number of records that exist in each date
    range. The first column represents the number of records with a date created before
    January 1, 2019\. The second column is the number of records with a created date
    starting on January 1, 2019, up to but not including April 1, 2019\. The third
    column follows a similar pattern for records with a date created of April 1, 2019,
    all the way until July 1, 2019\. The last column is for all records created on
    or after July 1, 2019\. Comparing the values in these four columns to the `rows`
    column from `Figure 15-5` can help us confirm that our partition function is working
    as expected. In our case, the value from the `rows` column from `Figure 15-5`
    does correspond to the column values from `Figure 15-6`. This confirms that our
    data is being partitioned as expected.


    We have verified that the data is getting sorted into the correct partition. However,
    we have not confirmed that we have any data that has a value that matches the
    exact date for our range partitions. One way we can verify this is to run a query,
    like the one in `Listing 15-9`, that shows the number of records with the exact
    date and time as the one specified for our partition function.


    ```sql

    SELECT COUNT(*)

    FROM dbo.RecipeHistory

    WHERE DateCreated = ''1/1/2019''

    ```

    `Listing 15-9` Query to Confirm Range Function


    When I run the preceding query, I end up getting 14,720 results returned. This
    lets me know that my partition function is working as expected. If I had zero
    results returned, I might not be certain on which partition any records with the
    exact date and time of January 1, 2019, 12:00:00:00.000 would end up. However,
    since my partitions show the correct counts by date and time grouping, I know
    my partition is working as expected.'
  raw: '## Partitioned Tables


    While we have created filegroups, files, partition functions, and partition schemes,
    none of this partitioning logic has been applied to any data within the databases.
    We either have the option of creating a new table or partitioning an existing
    table. For this example, I will start with creating a new table that is partitioned
    as part of the table creation. You can see the T-SQL to create the partitioned
    table in Listing [15-6](#480547_1_En_15_Chapter.xhtml#PC6).


    ```

    CREATE TABLE dbo.RecipeHistory

    (

    RecipeHistoryID         BIGINT      NOT NULL IDENTITY(1,1),

    RecipeID                SMALLINT    NOT NULL,

    RecipeHistoryStatusID   TINYINT     NOT NULL,

    DateCreated             DATETIME    NOT NULL,

    DateModified            DATETIME    NULL,

    CONSTRAINT pk_RecipeHistory_RecipeHistoryID

    PRIMARY KEY NONCLUSTERED

    (RecipeHistoryID, DateCreated),

    CONSTRAINT fk_RecipeHistory_RecipeID

    FOREIGN KEY (RecipeID)

    REFERENCES dbo.Recipe(RecipeID),

    CONSTRAINT fk_RecipeHistory_RecipeHistoryStatusID

    FOREIGN KEY (RecipeHistoryStatusID)

    REFERENCES

    dbo.RecipeHistoryStatus(RecipeHistoryStatusID)

    )

    ON RecipeHistRange (DateCreated);

    Listing 15-6

    Create Partitioned Table

    ```


    In the preceding code, the last line indicates that the table should be created
    on the partition scheme from Listing [15-4](#480547_1_En_15_Chapter.xhtml#PC4).
    Once the partitioned table is created in Listing [15-6](#480547_1_En_15_Chapter.xhtml#PC6),
    the structure of the table will look like Figure [15-3](#480547_1_En_15_Chapter.xhtml#Fig3).


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig3_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig3_HTML.jpg)


    Figure 15-3


    Partitioned Table Data Structure


    Inside of the partitioned table, you can see each partition clearly. Within the
    partitioned table, you can also see how the right range on the partition function
    has broken out the data into each partition. You can confirm how the table is
    partitioned by running the query in Listing [15-7](#480547_1_En_15_Chapter.xhtml#PC7).


    ```

    SELECT tbl.[name] AS TableName,

    sch.[name] AS PartitionScheme,

    fnc.[name] AS PartitionFunction,

    prt.partition_number,

    fnc.[type_desc],

    rng.boundary_id,

    rng.[value] AS BoundaryValue,

    prt.[rows]

    FROM sys.tables tbl

    INNER JOIN sys.indexes idx

    ON tbl.[object_id] = idx.[object_id]

    INNER JOIN sys.partitions prt

    ON idx.[object_id] = prt.[object_id]

    AND idx.index_id = prt.index_id

    INNER JOIN sys.partition_schemes AS sch

    ON idx.data_space_id = sch.data_space_id

    INNER JOIN sys.partition_functions AS fnc

    ON sch.function_id = fnc.function_id

    LEFT JOIN sys.partition_range_values AS rng

    ON fnc.function_id = rng.function_id

    AND rng.boundary_id = prt.partition_number

    WHERE tbl.[name] = ''RecipeHistory''

    AND idx.[type] <= 1

    ORDER BY prt.partition_number;

    Listing 15-7

    View Partitions for Partitioned Table

    ```


    The preceding query shows the table name, the partition scheme used on the table,
    the partition function used on the table, the partition number, value to partition
    the data, and the number of rows in each partition. Figure [15-4](#480547_1_En_15_Chapter.xhtml#Fig4)
    shows the results from the query in Listing [15-7](#480547_1_En_15_Chapter.xhtml#PC7).


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig4_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig4_HTML.jpg)


    Figure 15-4


    Data for Partitioned Table


    The preceding results were taken immediately after the partitioned table was created.
    You can see that the partition scheme used is RecipeHistRange and the partition
    function is RecipeHistFunc. The preceding boundary values match the ranges specified
    in Listing [15-3](#480547_1_En_15_Chapter.xhtml#PC3) when the partition function
    was created. Looking at the value in the rows column from Figure [15-4](#480547_1_En_15_Chapter.xhtml#Fig4)
    above, you can see all the values are 0\. This is because there are no rows in
    the table.


    I inserted data from a pre-existing table into the partitioned table. Executing
    the same query from Listing [15-7](#480547_1_En_15_Chapter.xhtml#PC7), I can see
    how the data has been stored in the partitions. In Figure [15-5](#480547_1_En_15_Chapter.xhtml#Fig5),
    you can see the number of rows per partition.


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig5_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig5_HTML.jpg)


    Figure 15-5


    Data Added to Partitioned Table


    In Figure [15-4](#480547_1_En_15_Chapter.xhtml#Fig4), I showed the row counts
    per partition before any data was added to the dbo.RecipeHistory table. Figure
    [15-5](#480547_1_En_15_Chapter.xhtml#Fig5) shows the number of rows per partition
    after the table is fully populated. The first partition has 203,493 rows. We know
    the actual number of rows in the partition, but we may still want to confirm that
    the table is partitioning data as we would expect. In Listing [15-8](#480547_1_En_15_Chapter.xhtml#PC8),
    I have written a query to count the number of records by date ranges.


    ```

    SELECT

    SUM(

    CASE WHEN DateCreated = ''7/1/2019''

    THEN 1

    ELSE 0

    END

    ) AS Partition4

    FROM dbo.RecipeHistory;

    Listing 15-8

    Query to Confirm Row Counts

    ```


    The first column in the query returns a count of records that have a created date
    before January 1, 2019\. Assuming the partition function is partitioning data
    as we would expect, the number of rows shown for the first partition from Figure
    [15-5](#480547_1_En_15_Chapter.xhtml#Fig5) should match the value returned for
    column one from Listing [15-8](#480547_1_En_15_Chapter.xhtml#PC8). The query results
    from Listing [15-8](#480547_1_En_15_Chapter.xhtml#PC8) are shown in Figure [15-6](#480547_1_En_15_Chapter.xhtml#Fig6).


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig6_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig6_HTML.jpg)


    Figure 15-6


    Query Results Showing Row Count


    Each column in Figure [15-6](#480547_1_En_15_Chapter.xhtml#Fig6) shows the number
    of records that exist in each date range. The first column represents the number
    of records with a date created before January 1, 2019\. The second column is the
    number of records with a created date starting on January 1, 2019, up to but not
    including April 1, 2019\. The third column follows a similar pattern for records
    with a date created of April 1, 2019, all the way until July 1, 2019\. The last
    column is for all records created on or after July 1, 2019\. Comparing the values
    in these four columns to the rows column from Figure [15-5](#480547_1_En_15_Chapter.xhtml#Fig5)
    can help us confirm that our partition function is working as expected. In our
    case, the value from the rows column from Figure [15-5](#480547_1_En_15_Chapter.xhtml#Fig5)
    does correspond to the column values from Figure [15-6](#480547_1_En_15_Chapter.xhtml#Fig6).
    This confirms that our data is being partitioned as expected.


    We have verified that the data is getting sorted into the correct partition. However,
    we have not confirmed that we have any data that has a value that matches the
    exact date for our range partitions. One way we can verify this is to run a query,
    like the one in Listing [15-9](#480547_1_En_15_Chapter.xhtml#PC9), that shows
    the number of records with the exact date and time as the one specified for our
    partition function.


    ```

    SELECT COUNT(*)

    FROM dbo.RecipeHistory

    WHERE DateCreated = ''1/1/2019''

    Listing 15-9

    Query to Confirm Range Function

    ```


    When I run the preceding query, I end up getting 14,720 results returned. This
    lets me know that my partition function is working as expected. If I had zero
    results returned, I might not be certain on which partition any records with the
    exact date and time of January 1, 2019, 12:00:00:00.000 would end up. However,
    since my partitions show the correct counts by date and time grouping, I know
    my partition is working as expected.'
  trans: '# 分区表


    虽然我们已经创建了文件组、文件、分区函数和分区方案，但这些分区逻辑尚未应用于数据库中的任何数据。我们有两种选择：创建新表或对现有表进行分区。在本示例中，我将从创建新表开始，该表在创建时即进行分区。创建分区表的
    T-SQL 代码见 `Listing 15-6`。


    ```sql

    CREATE TABLE dbo.RecipeHistory

    (

    RecipeHistoryID         BIGINT      NOT NULL IDENTITY(1,1),

    RecipeID                SMALLINT    NOT NULL,

    RecipeHistoryStatusID   TINYINT     NOT NULL,

    DateCreated             DATETIME    NOT NULL,

    DateModified            DATETIME    NULL,

    CONSTRAINT pk_RecipeHistory_RecipeHistoryID

    PRIMARY KEY NONCLUSTERED

    (RecipeHistoryID, DateCreated),

    CONSTRAINT fk_RecipeHistory_RecipeID

    FOREIGN KEY (RecipeID)

    REFERENCES dbo.Recipe(RecipeID),

    CONSTRAINT fk_RecipeHistory_RecipeHistoryStatusID

    FOREIGN KEY (RecipeHistoryStatusID)

    REFERENCES

    dbo.RecipeHistoryStatus(RecipeHistoryStatusID)

    )

    ON RecipeHistRange (DateCreated);

    ```

    `Listing 15-6` 创建分区表


    在上面的代码中，最后一行表示该表应创建在 `Listing 15-4` 的分区方案上。一旦按照 `Listing 15-6` 创建了分区表，表的结构将如 `Figure
    15-3` 所示。


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig3_HTML.jpg](img/480547_1_En_15_Fig3_HTML.jpg)

    `Figure 15-3` 分区表数据结构


    在分区表内部，你可以清晰地看到每个分区。在分区表内，你还可以看到分区函数上的正确范围如何将数据分解到各个分区。你可以通过运行 `Listing 15-7`
    中的查询来确认表是如何分区的。


    ```sql

    SELECT tbl.[name] AS TableName,

    sch.[name] AS PartitionScheme,

    fnc.[name] AS PartitionFunction,

    prt.partition_number,

    fnc.[type_desc],

    rng.boundary_id,

    rng.[value] AS BoundaryValue,

    prt.[rows]

    FROM sys.tables tbl

    INNER JOIN sys.indexes idx

    ON tbl.[object_id] = idx.[object_id]

    INNER JOIN sys.partitions prt

    ON idx.[object_id] = prt.[object_id]

    AND idx.index_id = prt.index_id

    INNER JOIN sys.partition_schemes AS sch

    ON idx.data_space_id = sch.data_space_id

    INNER JOIN sys.partition_functions AS fnc

    ON sch.function_id = fnc.function_id

    LEFT JOIN sys.partition_range_values AS rng

    ON fnc.function_id = rng.function_id

    AND rng.boundary_id = prt.partition_number

    WHERE tbl.[name] = ''RecipeHistory''

    AND idx.[type] <= 1

    ORDER BY prt.partition_number;

    ```

    `Listing 15-7` 查看分区表的分区情况


    上面的查询显示了表名、表上使用的分区方案、表上使用的分区函数、分区号、数据分区值以及每个分区中的行数。`Figure 15-4` 显示了 `Listing
    15-7` 中查询的结果。


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig4_HTML.jpg](img/480547_1_En_15_Fig4_HTML.jpg)

    `Figure 15-4` 分区表的数据


    以上结果是在分区表创建后立即获取的。你可以看到使用的分区方案是 `RecipeHistRange`，分区函数是 `RecipeHistFunc`。上面的边界值与创建分区函数时在
    `Listing 15-3` 中指定的范围相匹配。查看上图 `Figure 15-4` 中 `rows` 列的值，你会发现所有值都是 0。这是因为表中没有任何行。


    我将数据从一个预先存在的表插入到了这个分区表中。执行与 `Listing 15-7` 相同的查询，我可以看到数据是如何存储在分区中的。在 `Figure 15-5`
    中，你可以看到每个分区的行数。


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig5_HTML.jpg](img/480547_1_En_15_Fig5_HTML.jpg)

    `Figure 15-5` 添加到分区表的数据


    在 `Figure 15-4` 中，我展示了在 `dbo.RecipeHistory` 表中添加任何数据之前，每个分区的行数。`Figure 15-5` 显示了表完全填充后每个分区的行数。第一个分区有
    203,493 行。我们知道分区中的实际行数，但我们可能仍然想确认表是否按预期对数据进行分区。在 `Listing 15-8` 中，我编写了一个查询来按日期范围统计记录数。


    ```sql

    SELECT

    SUM(

    CASE WHEN DateCreated = ''7/1/2019''

    THEN 1

    ELSE 0

    END

    ) AS Partition4

    FROM dbo.RecipeHistory;

    ```

    `Listing 15-8` 用于确认行数的查询


    查询中的第一列返回创建日期早于 2019 年 1 月 1 日的记录计数。假设分区函数按预期对数据进行分区，那么 `Figure 15-5` 中第一个分区显示的行数应与
    `Listing 15-8` 返回的第一列值相匹配。`Listing 15-8` 的查询结果如 `Figure 15-6` 所示。


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig6_HTML.jpg](img/480547_1_En_15_Fig6_HTML.jpg)

    `Figure 15-6` 显示行数的查询结果


    `Figure 15-6` 中的每一列都显示了存在于每个日期范围内的记录数。第一列代表创建日期早于 2019 年 1 月 1 日的记录数。第二列是创建日期从
    2019 年 1 月 1 日开始，到 2019 年 4 月 1 日（不包括）为止的记录数。第三列遵循类似的模式，统计创建日期为 2019 年 4 月 1 日直到
    2019 年 7 月 1 日的记录。最后一列用于所有创建日期在 2019 年 7 月 1 日或之后的记录。将这四列中的值与 `Figure 15-5` 中的
    `rows` 列进行比较，可以帮助我们确认分区函数是否按预期工作。在我们的例子中，`Figure 15-5` 中 `rows` 列的值确实与 `Figure
    15-6` 中的列值相对应。这证实了我们的数据正按预期进行分区。


    我们已经验证了数据被正确地分类到各个分区中。然而，我们尚未确认是否有任何数据的值恰好匹配我们范围分区的确切日期。我们可以通过运行一个查询来验证这一点，比如
    `Listing 15-9` 中的查询，它显示了与分区函数指定的日期和时间完全匹配的记录数。


    ```sql

    SELECT COUNT(*)

    FROM dbo.RecipeHistory

    WHERE DateCreated = ''1/1/2019''

    ```

    `Listing 15-9` 用于确认范围函数的查询


    当我运行上面的查询时，我最终得到了 14,720 条返回结果。这让我知道我的分区函数正在按预期工作。如果我返回的结果为零，我可能无法确定哪些具有确切日期和时间（2019
    年 1 月 1 日 12:00:00:00.000）的记录会最终落在哪个分区。然而，由于我的分区显示了按日期和时间分组的正确计数，我知道我的分区正在按预期工作。'
- fmt: '## 概述


    在上一节中，我们创建了一个空的分区表。一旦对表进行分区，我们就准备好随着时间推移管理该表的增长。这种数据增长的管理过程不是一次性发生的，而是需要在未来持续维护。对于这个表，我们需要在未来添加分区。这个过程将类似于清单
    [15-5](#480547_1_En_15_Chapter.xhtml#PC5) 中展示的过程。


    向现有分区表添加分区并不是我们可能需要对表进行分区的唯一时机。您也可能会遇到这样的情况：最初并未打算对表进行分区，但由于各种情况，您现在发现需要对表进行分区。在清单
    [15-10](#480547_1_En_15_Chapter.xhtml#PC10) 中，您可以看到将非分区表更改为分区表所需的 T-SQL 代码。


    ```

    ALTER TABLE dbo.RecipeHistory

    DROP CONSTRAINT pk_RecipeHistory_RecipeHistoryID;

    ALTER TABLE dbo.RecipeHistory

    ADD CONSTRAINT pk_RecipeHistory_RecipeHistoryID

    PRIMARY KEY NONCLUSTERED (RecipeHistoryID, DateCreated);

    CREATE CLUSTERED INDEX ix_RecipeHistory_DateCreated

    ON dbo.RecipeHistory (DateCreated)

    ON RecipeHistRange (DateCreated);

    Listing 15-10

    Add Partition to Existing Table

    ```


    在实施分区之前，表中的所有数据都是按主键排序的。在本例中，主键是 `RecipeHistoryID`。然而，一旦我们对表进行分区，我们希望表按创建日期进行分段。这需要更改表中数据的存储方式。要让
    SQL Server 更新数据的存储方式，您需要先删除原始主键。此时，您可以创建一个新的非聚集主键以及创建日期 (`DateCreated`)。将创建日期作为分区列的一部分包含在主键中对于分区表是必需的。完成此操作后，您可以在创建日期上创建聚集索引。该索引将在分区方案上创建。您需要注意，向表中添加这个非对齐的主键将阻止您在该表上使用分区切换。


    如果您现有的非分区表中的所有数据都存在于新表的某个分区中，您可以选择轻松地将数据从非分区表移动到分区表。清单 [15-11](#480547_1_En_15_Chapter.xhtml#PC11)
    显示了完成此任务所需的 T-SQL 代码。


    ```

    ALTER TABLE dbo.RecipeHistory

    WITH CHECK ADD CONSTRAINT ck_RecipeHistory_MinDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated >= ''08/01/2018''

    );

    ALTER TABLE dbo.RecipeHistory

    WITH CHECK ADD CONSTRAINT ck_RecipeHistory_MaxDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated < ''10/01/2019''

    );

    ALTER TABLE dbo.RecipeHistory

    SWITCH TO dbo.RecipeHistoryArchive

    PARTITION RecipeHistory2018Q4;

    Listing 15-11

    Switch All Data Out of Non-Partitioned Table to Partitioned Table

    ```


    要切换非分区表中的数据，您首先需要证明非分区表中的所有数据都符合您将在分区表上使用的分区范围。您需要先在分区列上创建与分区范围匹配的约束。创建约束后，您就可以将所有数据从非分区表切换到分区表上指定的分区。


    如果我有两个分区表，我可能希望将一个分区从一个表移动到另一个表。这个过程可以称为分区切换。完成此操作所需的 T-SQL 代码比清单 [15-11](#480547_1_En_15_Chapter.xhtml#PC11)
    中的代码简单。在清单 [15-12](#480547_1_En_15_Chapter.xhtml#PC12) 中，我编写了数据库代码，将分区从当前表切换到新的归档表。


    ```

    ALTER TABLE dbo.RecipeHistory SWITCH

    PARTITION 1

    TO dbo.RecipeHistoryArchive

    PARTITION 1;

    Listing 15-12

    Switch Out of Partitioned Table to Another Partitioned Table

    ```


    在这个例子中，我将 2018 年第四季度的记录从 `dbo.RecipeHistory` 表移动到 `dbo.RecipeHistoryArchive` 表。为了将一个分区从一个表切换到另一个分区表中的分区，您必须为每个表指定分区。目标表中的分区也必须是空的，此
    T-SQL 代码才能执行。这种方法是管理数据随时间增长的一种特别直接和简单的方法。如果您创建一个特定的数据管理计划，并将数据从您的主要 OLTP 表移动到归档表，您可以保留所有数据，同时让高事务性的表仅保留与您的业务最相关的数据。


    既然我们已经介绍了如何对新表和现有表进行分区，我想看看分区对查询执行意味着什么。数据通常是按每个事务发生的顺序记录的。这可能与特定的时间段相关，但情况并非总是如此。此外，即使数据是按特定顺序记录的，业务也可能经常希望根据特定的日期范围查看数据。我可能希望查看在特定日期范围内开始的食谱。发出清单
    [15-13](#480547_1_En_15_Chapter.xhtml#PC13) 中的查询，我可以查看 `dbo.RecipeHistory` 表来查找此信息。


    ```

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    DateCreated

    FROM dbo.RecipeHistory

    WHERE DateCreated BETWEEN ''10/7/18'' AND ''10/9/18'';

    Listing 15-13

    Access Data Before Partitioning Table

    ```


    在针对特定日期范围查询 `dbo.RecipeHistory` 表之后，我还可以查看 SQL Server 如何执行该 T-SQL 代码以找到我请求的数据。图
    [15-7](#480547_1_En_15_Chapter.xhtml#Fig7) 中的执行计划显示了数据是如何被检索的。


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig7_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig7_HTML.jpg)


    图 15-7


    未分区表的执行计划


    当执行此查询时，`dbo.RecipeHistory` 表尚未分区，并且该表是按聚集主键排序的。在本例中，即 `RecipeHistoryID`。虽然数据可能是按记录创建的顺序存储的，但
    SQL Server 无法根据表的配置方式知道这是真的。为了确保 SQL Server 基于创建日期检索所有数据，SQL Server 需要检查表中的每条记录。这在前面由执行计划上的“聚集索引扫描”运算符表示。图
    [15-8](#480547_1_En_15_Chapter.xhtml#Fig8) 显示了与清单 [15-3](#480547_1_En_15_Chapter.xhtml#PC3)
    中的查询相关的一些属性。


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig8_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig8_HTML.jpg)


    图 15-8


    与聚集索引扫描相关的读取操作


    此查询返回的总记录数为 33,465。本地读取总数为 5,654。这表示为确定符合此查询条件的记录数而访问的总页数。'
  raw: 'Previously in this section, we created an empty partitioned table. Once we
    partition the table, we have are ready to manage the growth of this table over
    time. This process of managing data growth is not a one-time occurrence but something
    that will need to be maintained going forward. In the case of the table, we will
    need to add partitions going forward. This process will be like the one shown
    in Listing [15-5](#480547_1_En_15_Chapter.xhtml#PC5). Adding partitions to an
    existing partitioned table is not the only time that we may need to partition
    tables. You may also find yourself in a situation where you did not originally
    intend to partition a table, but for any number of circumstances, you may now
    find you need to partition the table. In Listing [15-10](#480547_1_En_15_Chapter.xhtml#PC10),
    you can see the T-SQL code required to change a non-partitioned table to a partitioned
    table.


    ```

    ALTER TABLE dbo.RecipeHistory

    DROP CONSTRAINT pk_RecipeHistory_RecipeHistoryID;

    ALTER TABLE dbo.RecipeHistory

    ADD CONSTRAINT pk_RecipeHistory_RecipeHistoryID

    PRIMARY KEY NONCLUSTERED (RecipeHistoryID, DateCreated);

    CREATE CLUSTERED INDEX ix_RecipeHistory_DateCreated

    ON dbo.RecipeHistory (DateCreated)

    ON RecipeHistRange (DateCreated);

    Listing 15-10

    Add Partition to Existing Table

    ```


    Prior to implementing the partition, all the data in the table is ordered by the
    primary key. In this case, the primary key is the RecipeHistoryID. However, once
    we partition the table, we will want the table segmented by the created date.
    This requires changing how the data in the table is stored. To get SQL Server
    to update how the data is stored, you will need to drop the original primary key.
    At that time, you can create a new non-clustered primary key along with the date
    created. Including the date created as part of the partitioning column on the
    primary key is necessary for the partitioned table. Once this is done, you can
    create a clustered index on the date created. This index will be created on the
    partition scheme. You will want to be aware that adding this non-aligned primary
    key to the table will prevent you from using partition switching on this table.


    If all the data in your existing non-partitioned table exists within one of the
    partitions on your new table, you have the option to easily move the data from
    the non-partitioned table to the partitioned table. Listing [15-11](#480547_1_En_15_Chapter.xhtml#PC11)
    shows the T-SQL code necessary to accomplish this task.


    ```

    ALTER TABLE dbo.RecipeHistory

    WITH CHECK ADD CONSTRAINT ck_RecipeHistory_MinDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated >= ''08/01/2018''

    );

    ALTER TABLE dbo.RecipeHistory

    WITH CHECK ADD CONSTRAINT ck_RecipeHistory_MaxDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated < ''10/01/2019''

    );

    ALTER TABLE dbo.RecipeHistory

    SWITCH TO dbo.RecipeHistoryArchive

    PARTITION RecipeHistory2018Q4;

    Listing 15-11

    Switch All Data Out of Non-Partitioned Table to Partitioned Table

    ```


    To switch the data from the non-partitioned table, you will first need to prove
    that all the data in the non-partitioned table fits inside of the partition that
    you will be using on the partitioned table. You will first need to create constraints
    on the partitioning column that match the range for the partition. Once the constraints
    have been created, you can switch all the data from the non-partitioned table
    into the partition specified on the partitioned table.


    If I have two partitioned tables, I may want to move a partition from one table
    to another. This process can be referred to as partition switching . The T-SQL
    code required to do this is less complex than the code from Listing [15-11](#480547_1_En_15_Chapter.xhtml#PC11).
    In Listing [15-12](#480547_1_En_15_Chapter.xhtml#PC12), I have written database
    code that will switch the partition from the current table to a new archive table.


    ```

    ALTER TABLE dbo.RecipeHistory SWITCH

    PARTITION 1

    TO dbo.RecipeHistoryArchive

    PARTITION 1;

    Listing 15-12

    Switch Out of Partitioned Table to Another Partitioned Table

    ```


    For this example, I have moved the records from the fourth quarter of 2018 from
    the dbo.RecipeHistory table to the dbo.RecipeHistoryArchive table. In order to
    switch a partition from one table to partition in a different partitioned table,
    you must specify the partitions for each table. The partition in the target table
    must also be empty in order for this T-SQL code to execute. This method is a particularly
    straightforward and easy method of managing your data growth over time. If you
    create a specific data management plan and move data from your main OLTP tables
    to an archive table, you can keep all your data but also allow your highly transactional
    tables to maintain only the most relevant data for your business.


    Now that we have covered how to partition new and existing tables, I want to look
    at what partitioning can mean for query execution. Data is usually recorded in
    the order that each transaction occurred. This can correlate to a specific time
    period, but that may not always be the case. In addition, even though data is
    recorded in a specific order, there are often reasons why the business may want
    to look at data based on a specific date range. I may want to look at the recipes
    that were started for a specific date range. Issuing the query in Listing [15-13](#480547_1_En_15_Chapter.xhtml#PC13),
    I can look at the dbo.RecipeHistory table to find this information.


    ```

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    DateCreated

    FROM dbo.RecipeHistory

    WHERE DateCreated BETWEEN ''10/7/18'' AND ''10/9/18'';

    Listing 15-13

    Access Data Before Partitioning Table

    ```


    After querying the dbo.RecipeHistory table for a specific date range, I can also
    review how SQL Server executed that T-SQL code to find the data I requested. The
    execution plan in Figure [15-7](#480547_1_En_15_Chapter.xhtml#Fig7) shows how
    the data was retrieved.


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig7_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig7_HTML.jpg)


    Figure 15-7


    Execution Plan for Unpartitioned Table


    The dbo.RecipeHistory table was not partitioned when this query was executed,
    and the table was ordered by the clustered primary key. In this case, that is
    the RecipeHistoryID. While the data may have been stored in the order the records
    were created, SQL Server has no way to know that is true based on how the table
    is configured. To make sure that SQL Server retrieves all data based on the date
    created, SQL Server will need to review each record in the table. This is represented
    earlier with the Clustered Index Scan operator on the execution plan. Figure [15-8](#480547_1_En_15_Chapter.xhtml#Fig8)
    shows some of the properties associated with the query from Listing [15-3](#480547_1_En_15_Chapter.xhtml#PC3).


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig8_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig8_HTML.jpg)


    Figure 15-8


    Reads Associated with Clustered Index Scan


    The number of total records returned for this query is 33,465\. The total number
    of local reads is 5,654\. This represents the total number of pages that were
    accessed to determine the number of records that met the criteria for this query.'
  trans: '

    ## 概述


    在上一节中，我们创建了一个空的分区表。一旦对表进行分区，我们就准备好随着时间推移管理该表的增长。这种数据增长的管理过程不是一次性发生的，而是需要在未来持续维护。对于这个表，我们需要在未来添加分区。这个过程将类似于清单
    15-5 中展示的过程。


    向现有分区表添加分区并不是我们可能需要对表进行分区的唯一时机。您也可能会遇到这样的情况：最初并未打算对表进行分区，但由于各种情况，您现在发现需要对表进行分区。在清单
    15-10 中，您可以看到将非分区表更改为分区表所需的 T-SQL 代码。


    ```

    ALTER TABLE dbo.RecipeHistory

    DROP CONSTRAINT pk_RecipeHistory_RecipeHistoryID;

    ALTER TABLE dbo.RecipeHistory

    ADD CONSTRAINT pk_RecipeHistory_RecipeHistoryID

    PRIMARY KEY NONCLUSTERED (RecipeHistoryID, DateCreated);

    CREATE CLUSTERED INDEX ix_RecipeHistory_DateCreated

    ON dbo.RecipeHistory (DateCreated)

    ON RecipeHistRange (DateCreated);

    Listing 15-10

    向现有表添加分区

    ```


    在实施分区之前，表中的所有数据都是按主键排序的。在本例中，主键是 `RecipeHistoryID`。然而，一旦我们对表进行分区，我们希望表按创建日期进行分段。这需要更改表中数据的存储方式。要让
    SQL Server 更新数据的存储方式，您需要先删除原始主键。此时，您可以创建一个新的非聚集主键以及创建日期 (`DateCreated`)。将创建日期作为分区列的一部分包含在主键中对于分区表是必需的。完成此操作后，您可以在创建日期上创建聚集索引。该索引将在分区方案上创建。您需要注意，向表中添加这个非对齐的主键将阻止您在该表上使用分区切换。


    如果您现有的非分区表中的所有数据都存在于新表的某个分区中，您可以选择轻松地将数据从非分区表移动到分区表。清单 15-11 显示了完成此任务所需的 T-SQL
    代码。


    ```

    ALTER TABLE dbo.RecipeHistory

    WITH CHECK ADD CONSTRAINT ck_RecipeHistory_MinDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated >= ''08/01/2018''

    );

    ALTER TABLE dbo.RecipeHistory

    WITH CHECK ADD CONSTRAINT ck_RecipeHistory_MaxDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated < ''10/01/2019''

    );

    ALTER TABLE dbo.RecipeHistory

    SWITCH TO dbo.RecipeHistoryArchive

    PARTITION RecipeHistory2018Q4;

    Listing 15-11

    将所有数据从非分区表切换到分区表

    ```


    要切换非分区表中的数据，您首先需要证明非分区表中的所有数据都符合您将在分区表上使用的分区范围。您需要先在分区列上创建与分区范围匹配的约束。创建约束后，您就可以将所有数据从非分区表切换到分区表上指定的分区。


    如果我有两个分区表，我可能希望将一个分区从一个表移动到另一个表。这个过程可以称为分区切换。完成此操作所需的 T-SQL 代码比清单 15-11 中的代码简单。在清单
    15-12 中，我编写了数据库代码，将分区从当前表切换到新的归档表。


    ```

    ALTER TABLE dbo.RecipeHistory SWITCH

    PARTITION 1

    TO dbo.RecipeHistoryArchive

    PARTITION 1;

    Listing 15-12

    从分区表切换到另一个分区表

    ```


    在这个例子中，我将 2018 年第四季度的记录从 `dbo.RecipeHistory` 表移动到 `dbo.RecipeHistoryArchive` 表。为了将一个分区从一个表切换到另一个分区表中的分区，您必须为每个表指定分区。目标表中的分区也必须是空的，此
    T-SQL 代码才能执行。这种方法是管理数据随时间增长的一种特别直接和简单的方法。如果您创建一个特定的数据管理计划，并将数据从您的主要 OLTP 表移动到归档表，您可以保留所有数据，同时让高事务性的表仅保留与您的业务最相关的数据。


    既然我们已经介绍了如何对新表和现有表进行分区，我想看看分区对查询执行意味着什么。数据通常是按每个事务发生的顺序记录的。这可能与特定的时间段相关，但情况并非总是如此。此外，即使数据是按特定顺序记录的，业务也可能经常希望根据特定的日期范围查看数据。我可能希望查看在特定日期范围内开始的食谱。发出清单
    15-13 中的查询，我可以查看 `dbo.RecipeHistory` 表来查找此信息。


    ```

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    DateCreated

    FROM dbo.RecipeHistory

    WHERE DateCreated BETWEEN ''10/7/18'' AND ''10/9/18'';

    Listing 15-13

    在表分区前访问数据

    ```


    在针对特定日期范围查询 `dbo.RecipeHistory` 表之后，我还可以查看 SQL Server 如何执行该 T-SQL 代码以找到我请求的数据。图
    15-7 中的执行计划显示了数据是如何被检索的。


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig7_HTML.jpg](img/480547_1_En_15_Fig7_HTML.jpg)


    图 15-7


    未分区表的执行计划


    当执行此查询时，`dbo.RecipeHistory` 表尚未分区，并且该表是按聚集主键排序的。在本例中，即 `RecipeHistoryID`。虽然数据可能是按记录创建的顺序存储的，但
    SQL Server 无法根据表的配置方式知道这是真的。为了确保 SQL Server 基于创建日期检索所有数据，SQL Server 需要检查表中的每条记录。这在前面由执行计划上的“聚集索引扫描”运算符表示。图
    15-8 显示了与清单 15-3 中的查询相关的一些属性。


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig8_HTML.jpg](img/480547_1_En_15_Fig8_HTML.jpg)


    图 15-8


    与聚集索引扫描相关的读取操作


    此查询返回的总记录数为 33,465。本地读取总数为 5,654。这表示为确定符合此查询条件的记录数而访问的总页数。

    '
- fmt: '## SQL Server 分区表性能比较


    前述数值代表了 SQL Server 在非分区表上执行查询的方式。我们可以比较清单 [15-13](#480547_1_En_15_Chapter.xhtml#PC13)
    中的查询在非分区表和分区表上的性能。我们可以为 `dbo.RecipeHistory` 表添加一个分区，并将结果与前面的非分区表进行比较。首先，我需要删除现有的主键，并添加一个新的非聚集主键，类似于清单
    [15-10](#480547_1_En_15_Chapter.xhtml#PC10) 中的那个。由于此表不再有聚集索引，如果我尝试重新运行清单 [15-13](#480547_1_En_15_Chapter.xhtml#PC13)
    中的查询，我将得到一个类似于图 [15-9](#480547_1_En_15_Chapter.xhtml#Fig9) 中的执行计划。


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig9_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig9_HTML.jpg)


    图 15-9 分区表上没有在分区键上创建聚集索引


    如果您忘记在分区列（包含分区范围）上添加新的聚集索引，最终会得到一个堆表。在这种情况下，结果是需要对表进行全表扫描以查找符合指定日期条件的任何记录。虽然您可能期望此示例与上一个示例的逻辑读取次数相同，但图
    [15-10](#480547_1_En_15_Chapter.xhtml#Fig10) 显示了不同的结果。


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig10_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig10_HTML.jpg)


    图 15-10 在没有分区键聚集索引的分区表上执行查询的读取情况


    在第一个示例中，图 [15-8](#480547_1_En_15_Chapter.xhtml#Fig8) 显示为找到 `dbo.RecipeHistory`
    中符合指定日期范围的所有记录，进行了 5,654 次逻辑读取。对表进行分区，并用 `RecipeHistoryID` 和 `DateCreated` 的组合替换原始主键，导致逻辑读取次数从图
    [15-10](#480547_1_En_15_Chapter.xhtml#Fig10) 所示的 5,654 次下降到 909 次。虽然逻辑读取次数显著下降，但在分区表的分区列上执行需要全表扫描的查询并不理想。关键是要确保在分区表上有一个聚集索引，该索引能够利用分区列。


    为了更好地利用您的分区表，您需要在分区表上包含一个聚集索引。这包括拥有一个按分区键在分区方案上对齐的聚集索引。完成此操作后，您可以运行清单 [15-13](#480547_1_En_15_Chapter.xhtml#PC13)
    中的 `T-SQL` 代码。您将获得一个类似于图 [15-11](#480547_1_En_15_Chapter.xhtml#Fig11) 中的执行计划。


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig11_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig11_HTML.jpg)


    图 15-11 在分区键上有聚集索引的分区表


    您可以看到 SQL Server 现在使用 `Clustered Index Seek` 来查找正确的数据。我们还可以查看此运算符的属性，以了解包含分区键的聚集索引会产生何种影响。您可以在图
    [15-12](#480547_1_En_15_Chapter.xhtml#Fig12) 中看到 I/O 统计信息和返回的行数。


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig12_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig12_HTML.jpg)


    图 15-12 在分区键上有聚集索引的分区表上执行查询的读取情况


    当我们最初在非分区表上运行此查询时，有 5,654 次逻辑读取。在没有聚集索引的情况下对表进行分区后，逻辑读取次数下降到 909 次。虽然较低的逻辑读取次数不能确定地表明性能会更好，但我们可以确认，查询在分区列上有聚集索引的分区表时，SQL
    Server 将读取更少的数据。现在在分区表上有了聚集索引，总逻辑读取次数已从 909 次下降到 186 次逻辑读取，如上图 [15-12](#480547_1_En_15_Chapter.xhtml#Fig12)
    所示。


    正确创建分区表只是希望看到性能提升所面临挑战的一部分。主要方法是通过编写 `T-SQL` 代码来实现，这些代码包含允许分区消除的条件。清单 [15-14](#480547_1_En_15_Chapter.xhtml#PC14)
    中的数据代码是一个未将分区列指定为条件的 `T-SQL` 代码示例。


    ```sql

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    DateCreated

    FROM dbo.RecipeHistory

    WHERE RecipeID = 4

    AND RecipeHistoryStatusID = 2;

    Listing 15-14

    Access Data Without Using Partitioned Column

    ```


    因此，此查询将在表中的所有分区上执行。即使为指定的列存在索引，查询仍然需要分别查看每个分区中的数据，以确认返回了所有请求的数据。一旦决定了分区列，您应该在所有查询中包含该分区列，以便能够利用分区表。'
  raw: 'The preceding values represent how SQL Server would execute a query on a non-partitioned
    table. We can compare the performance of the query in Listing [15-13](#480547_1_En_15_Chapter.xhtml#PC13)
    between a non-partitioned and partitioned table. We can add a partition to the
    dbo.RecipeHistory table and compare the results to the preceding non-partitioned
    table. I will first need to drop the existing primary key and add a new non-clustered
    primary key like the one from Listing [15-10](#480547_1_En_15_Chapter.xhtml#PC10).
    Since this table no longer has a clustered index, I will get an execution plan
    like the one in Figure [15-9](#480547_1_En_15_Chapter.xhtml#Fig9) if I try to
    rerun the query from Listing [15-13](#480547_1_En_15_Chapter.xhtml#PC13).


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig9_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig9_HTML.jpg)


    Figure 15-9


    Partitioned Table Without Clustered Index on Partitioning Key


    If you forget to add a new clustered index on the partitioning column including
    the partition range, you will end up with a heap. In this case, the result is
    a full scan of the table to find any records that matches the date criteria specified.
    While you might expect the number of logical reads to be the same for this example
    and the previous example, Figure [15-10](#480547_1_En_15_Chapter.xhtml#Fig10)
    shows a different result.


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig10_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig10_HTML.jpg)


    Figure 15-10


    Reads for Query Partitioned Table Without Clustered Index on Partitioning Key


    In the first example, Figure [15-8](#480547_1_En_15_Chapter.xhtml#Fig8) shows
    5,654 logical reads to find all records in dbo.RecipeHistory that match the date
    range specified. Partitioning the table and replacing the original primary key
    with both the RecipeHistoryID and DateCreated has caused the number of logical
    reads to drop from 5,654 to 909 shown in Figure [15-10](#480547_1_En_15_Chapter.xhtml#Fig10).
    While the number of logical reads has dropped significantly, it is not ideal to
    perform queries where full Table Scans are required on the partitioning column
    of the partitioned table. The point is to make sure you have a clustered index
    on your partitioned table that can take advantage of the partitioning column.


    To take better advantage of your partitioned table, you will want to include a
    clustered index on your partitioned table. This included having a clustered index
    that is aligned on the partition scheme by the partitioning key. Once you have
    done this, you can run the T-SQL code from Listing [15-13](#480547_1_En_15_Chapter.xhtml#PC13).
    You will get an execution plan like the one in Figure [15-11](#480547_1_En_15_Chapter.xhtml#Fig11).


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig11_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig11_HTML.jpg)


    Figure 15-11


    Partitioned Table with Clustered Index on Partitioning Key


    You can see that SQL Server now uses a Clustered Index Seek to find the correct
    data. We can also look at the properties for this operator to see what kind of
    impact having a clustered index that includes the partitioning key really has.
    You can see the I/O statistics and rows return in Figure [15-12](#480547_1_En_15_Chapter.xhtml#Fig12).


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig12_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig12_HTML.jpg)


    Figure 15-12


    Reads for Query Partitioned Table with Clustered Index on Partitioning Key


    When we originally ran this query on a non-partitioned table, there were 5,654
    logical reads. After partitioning table without a clustered index, the number
    of logical reads dropped to 909\. While the lower number of logical reads does
    not indicate with certainty that the performance will be better, we can confirm
    that SQL Server will read less data querying a partitioned table with a clustered
    index on the partitioning column. Now that there is a clustered index on the partition
    table, the total logic reads has dropped from 909 to 186 logical reads, as shown
    in Figure [15-12](#480547_1_En_15_Chapter.xhtml#Fig12) above.


    Creating a partitioned table correctly is only part of the challenge if you want
    to see improved performance as a result. The main way this can be done is by writing
    T-SQL code that includes criteria that allows for partition elimination. The data
    code in Listing [15-14](#480547_1_En_15_Chapter.xhtml#PC14) is an example of T-SQL
    code that does not specify the partitioning column as part of the criteria.


    ```

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    DateCreated

    FROM dbo.RecipeHistory

    WHERE RecipeID = 4

    AND RecipeHistoryStatusID = 2;

    Listing 15-14

    Access Data Without Using Partitioned Column

    ```


    As a result, this query will be executed on all partitions in the table. Even
    if there is an index for the columns specified, the query will still need to look
    at the data in each partition separately to confirm that all data requested is
    returned. Once you decide on a partitioning column, you should include the partitioning
    column in all your queries so that you can take advantage of the partitioned table.'
  trans: '## SQL Server 分区表性能比较


    前述数值代表了 SQL Server 在非分区表上执行查询的方式。我们可以比较清单 15-13 中的查询在非分区表和分区表上的性能。我们可以为 `dbo.RecipeHistory`
    表添加一个分区，并将结果与前面的非分区表进行比较。首先，我需要删除现有的主键，并添加一个新的非聚集主键，类似于清单 15-10 中的那个。由于此表不再有聚集索引，如果我尝试重新运行清单
    15-13 中的查询，我将得到一个类似于图 15-9 中的执行计划。


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig9_HTML.jpg](img/480547_1_En_15_Fig9_HTML.jpg)


    图 15-9 分区表上没有在分区键上创建聚集索引


    如果您忘记在分区列（包含分区范围）上添加新的聚集索引，最终会得到一个堆表。在这种情况下，结果是需要对表进行全表扫描以查找符合指定日期条件的任何记录。虽然您可能期望此示例与上一个示例的逻辑读取次数相同，但图
    15-10 显示了不同的结果。


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig10_HTML.jpg](img/480547_1_En_15_Fig10_HTML.jpg)


    图 15-10 在没有分区键聚集索引的分区表上执行查询的读取情况


    在第一个示例中，图 15-8 显示为找到 `dbo.RecipeHistory` 中符合指定日期范围的所有记录，进行了 5,654 次逻辑读取。对表进行分区，并用
    `RecipeHistoryID` 和 `DateCreated` 的组合替换原始主键，导致逻辑读取次数从图 15-10 所示的 5,654 次下降到 909
    次。虽然逻辑读取次数显著下降，但在分区表的分区列上执行需要全表扫描的查询并不理想。关键是要确保在分区表上有一个聚集索引，该索引能够利用分区列。


    为了更好地利用您的分区表，您需要在分区表上包含一个聚集索引。这包括拥有一个按分区键在分区方案上对齐的聚集索引。完成此操作后，您可以运行清单 15-13 中的
    `T-SQL` 代码。您将获得一个类似于图 15-11 中的执行计划。


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig11_HTML.jpg](img/480547_1_En_15_Fig11_HTML.jpg)


    图 15-11 在分区键上有聚集索引的分区表


    您可以看到 SQL Server 现在使用 `Clustered Index Seek` 来查找正确的数据。我们还可以查看此运算符的属性，以了解包含分区键的聚集索引会产生何种影响。您可以在图
    15-12 中看到 I/O 统计信息和返回的行数。


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig12_HTML.jpg](img/480547_1_En_15_Fig12_HTML.jpg)


    图 15-12 在分区键上有聚集索引的分区表上执行查询的读取情况


    当我们最初在非分区表上运行此查询时，有 5,654 次逻辑读取。在没有聚集索引的情况下对表进行分区后，逻辑读取次数下降到 909 次。虽然较低的逻辑读取次数不能确定地表明性能会更好，但我们可以确认，查询在分区列上有聚集索引的分区表时，SQL
    Server 将读取更少的数据。现在在分区表上有了聚集索引，总逻辑读取次数已从 909 次下降到 186 次逻辑读取，如上图 15-12 所示。


    正确创建分区表只是希望看到性能提升所面临挑战的一部分。主要方法是通过编写 `T-SQL` 代码来实现，这些代码包含允许分区消除的条件。清单 15-14 中的数据代码是一个未将分区列指定为条件的
    `T-SQL` 代码示例。


    ```sql

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    DateCreated

    FROM dbo.RecipeHistory

    WHERE RecipeID = 4

    AND RecipeHistoryStatusID = 2;

    Listing 15-14

    不使用分区列访问数据

    ```


    因此，此查询将在表中的所有分区上执行。即使为指定的列存在索引，查询仍然需要分别查看每个分区中的数据，以确认返回了所有请求的数据。一旦决定了分区列，您应该在所有查询中包含该分区列，以便能够利用分区表。'
- fmt: '# Partitioned Views


    你可以通过创建分区表将单个表拆分为多个段。相反，你也可以将多个较小的表组合在一起，使它们像一个大表一样工作。以这种方式连接的表可以是分区的，也可以不是。与创建分区表类似，你也可以选择创建分区视图。


    与分区表一样，你不应期望使用分区视图必然意味着将来使用此数据库对象的查询会获得更好的性能。但是，有一些设计原则可能会让你看到性能的提升。在使用分区表时，我们有分区消除的概念。在分区视图中也可以看到类似的概念。在清单
    [15-15](#480547_1_En_15_Chapter.xhtml#PC15) 中，我在同一个分区方案上创建了两个表。


    ```sql

    CREATE TABLE dbo.RecipeHistory2019

    (

    RecipeHistoryID         INT         NOT NULL,

    RecipeID                SMALLINT    NOT NULL,

    RecipeHistoryStatusID   TINYINT     NOT NULL,

    DateCreated             DATETIME    NOT NULL,

    DateModified            DATETIME    NULL,

    CONSTRAINT pk_RecipeHistory2019_RecipeHistoryID

    PRIMARY KEY NONCLUSTERED

    (RecipeHistoryID, DateCreated),

    CONSTRAINT fk_RecipeHistory2019_RecipeID

    FOREIGN KEY (RecipeID)

    REFERENCES dbo.Recipe(RecipeID),

    CONSTRAINT fk_RecipeHistory2019_RecipeHistoryStatusID

    FOREIGN KEY (RecipeHistoryStatusID)

    REFERENCES

    dbo.RecipeHistoryStatus(RecipeHistoryStatusID)

    );

    CREATE CLUSTERED INDEX ix_RecipeHistory2019_DateCreated

    ON dbo.RecipeHistory2019 (DateCreated)

    ON RecipeHistRange (DateCreated);

    CREATE TABLE dbo.RecipeHistory2018

    (

    RecipeHistoryID         INT         NOT NULL,

    RecipeID                SMALLINT    NOT NULL,

    RecipeHistoryStatusID   TINYINT     NOT NULL,

    DateCreated             DATETIME    NOT NULL,

    DateModified            DATETIME    NULL,

    CONSTRAINT pk_RecipeHistory2018_RecipeHistoryID

    PRIMARY KEY NONCLUSTERED

    (RecipeHistoryID, DateCreated),

    CONSTRAINT fk_RecipeHistory2018_RecipeID

    FOREIGN KEY (RecipeID)

    REFERENCES dbo.Recipe(RecipeID),

    CONSTRAINT fk_RecipeHistory2018_RecipeHistoryStatusID

    FOREIGN KEY (RecipeHistoryStatusID)

    REFERENCES

    dbo.RecipeHistoryStatus(RecipeHistoryStatusID)

    )

    ON RecipeHistRange (DateCreated);

    CREATE CLUSTERED INDEX ix_RecipeHistory2018_DateCreated

    ON dbo.RecipeHistory2018 (DateCreated)

    ON RecipeHistRange (DateCreated);

    ```

    清单 15-15

    为分区视图创建表


    尽管这些表都在同一个分区方案上，但没有什么可以限制将存储在这些表中的数据类型。第一个表旨在存储 2019 年的数据，第二个表用于 2018 年的数据。但是，我需要向这些表添加约束，以确保每个表中存在正确的记录。在清单
    [15-16](#480547_1_En_15_Chapter.xhtml#PC16) 中，你可以看到将要添加到两个表的约束。


    ```sql

    ALTER TABLE dbo.RecipeHistory2019

    WITH CHECK ADD CONSTRAINT ck_RecipeHistory2019_MinDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated >= ''01/01/2019''

    );

    ALTER TABLE dbo.RecipeHistory2019

    WITH CHECK ADD CONSTRAINT ck_RecipeHistory2019_MaxDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated < ''01/01/2020''

    );

    ALTER TABLE dbo.RecipeHistory2018

    WITH CHECK ADD CONSTRAINT ck_RecipeHistory2018_MinDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated >= ''01/01/2018''

    );

    ALTER TABLE dbo.RecipeHistory2018

    WITH CHECK ADD CONSTRAINT ck_RecipeHistory2018_MaxDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated < ''01/01/2019''

    );

    ```

    清单 15-16

    向表添加约束


    现在，2019 年的表有一个约束，只允许 `DateCreated` 从 2019 年 1 月 1 日到但不包括 2020 年 1 月 1 日的记录。2018
    年的表上也有一个逻辑类似的约束，以便只有 2018 年创建的记录才能存储在此表中。


    现在你有了两个不同日期范围的表，并且已向这些表应用了约束。下一步是创建分区视图。创建分区视图的过程相对简单，包括在每个底层表的 `SELECT` 语句之间添加
    `UNION ALL`。创建分区视图的示例可以在清单 [15-17](#480547_1_En_15_Chapter.xhtml#PC17) 中找到。


    ```sql

    CREATE VIEW dbo.vwRecipeHistory

    AS

    -- Select data from current read/write table

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.RecipeHistory2019

    UNION ALL

    -- Select data from partitioned table

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.RecipeHistory2018;

    ```

    清单 15-17

    创建分区视图


    请注意，分区视图中使用的两个 `SELECT` 语句的列列表顺序相同。这是创建分区视图的要求。在创建分区视图时，还必须指定表的完整列列表。创建分区视图后，你可能想看看查询分区视图是如何工作的。


    在本章前面，清单 [15-13](#480547_1_En_15_Chapter.xhtml#PC13) 中，我们查询了 `dbo.RecipeHistory`
    表在 2018 年 10 月 7 日到 2018 年 10 月 9 日之间的日期范围。我们可以对分区视图查询相同的日期范围，如清单 [15-18](#480547_1_En_15_Chapter.xhtml#PC18)
    所示。


    ```sql

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    DateCreated

    FROM dbo.vwRecipeHistory

    WHERE DateCreated BETWEEN ''10/7/2018'' AND ''10/9/2018'';

    ```

    清单 15-18

    使用分区列访问数据


    清单 [15-13](#480547_1_En_15_Chapter.xhtml#PC13) 和清单 [15-18](#480547_1_En_15_Chapter.xhtml#PC18)
    之间的 `T-SQL` 代码非常相似。这展示了在查询中改用分区视图而不是当前表名是多么容易。然而，我们真正感兴趣的是确认使用分区视图后执行计划如何变化。图
    [15-13](#480547_1_En_15_Chapter.xhtml#Fig13) 显示了运行清单 [15-18](#480547_1_En_15_Chapter.xhtml#PC18)
    中的查询所生成的执行计划。


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig13_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig13_HTML.jpg)


    图 15-13

    分区视图的执行计划


    与本章前面引用的分区表类似，分区视图的执行计划也使用了 `Clustered Index Seek`。即使分区视图包含了 2019 和 2018 年的表，从执行计划中也可以看出，`SQL
    Server` 在查找清单 [15-18](#480547_1_En_15_Chapter.xhtml#PC18) 中的查询结果时仅使用了 2018 年的表。我们还可以查看图
    [15-14](#480547_1_En_15_Chapter.xhtml#Fig14) 中 `Clustered Index Seek` 的属性。


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig14_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig14_HTML.jpg)


    图 15-14

    在分区键上使用聚集索引查询分区视图的读取情况


    根据返回的行数，你可以看到 2018 年表中的数据与本章前面引用的分区表中的数据不同。你还可以看到逻辑读取的相对数量较低，趋势与本章前面的分区表类似。


    清单 [15-18](#480547_1_En_15_Chapter.xhtml#PC18) 中执行的 `T-SQL` 代码基于每个表中的分区列和为每个表指定的约束访问了分区视图。我们看到，`SQL
    Server` 能够在查询数据时快速确定要访问哪个表。有时我们可能希望运行一个不包含分区列的查询，就像清单 [15-19](#480547_1_En_15_Chapter.xhtml#PC19)
    中的那样。'
  raw: '## Partitioned Views


    You can break a single table up into multiple segments by creating a partitioned
    table. Conversely, you all have the option of combining several smaller tables
    together in a way that will allow them to act like one large table. The tables
    that are joined in this manner can be partitioned or not. Similarly to creating
    a partitioned table, you also have the option of creating a partitioned view.


    Like partitioned tables, you should not expect the use of partitioned views to
    necessarily mean that you will get better performance from the queries that will
    use this database object going forward. However, there are some design principles
    that may allow you to see improved performance. When using partitioned tables,
    we had the concept of partition elimination. The same sort of concept can be seen
    with partitioned views. In Listing [15-15](#480547_1_En_15_Chapter.xhtml#PC15),
    I am creating two tables on the same partitioning scheme.


    ```

    CREATE TABLE dbo.RecipeHistory2019

    (

    RecipeHistoryID         INT         NOT NULL,

    RecipeID                SMALLINT    NOT NULL,

    RecipeHistoryStatusID   TINYINT     NOT NULL,

    DateCreated             DATETIME    NOT NULL,

    DateModified            DATETIME    NULL,

    CONSTRAINT pk_RecipeHistory2019_RecipeHistoryID

    PRIMARY KEY NONCLUSTERED

    (RecipeHistoryID, DateCreated),

    CONSTRAINT fk_RecipeHistory2019_RecipeID

    FOREIGN KEY (RecipeID)

    REFERENCES dbo.Recipe(RecipeID),

    CONSTRAINT fk_RecipeHistory2019_RecipeHistoryStatusID

    FOREIGN KEY (RecipeHistoryStatusID)

    REFERENCES

    dbo.RecipeHistoryStatus(RecipeHistoryStatusID)

    );

    CREATE CLUSTERED INDEX ix_RecipeHistory2019_DateCreated

    ON dbo.RecipeHistory2019 (DateCreated)

    ON RecipeHistRange (DateCreated);

    CREATE TABLE dbo.RecipeHistory2018

    (

    RecipeHistoryID         INT         NOT NULL,

    RecipeID                SMALLINT    NOT NULL,

    RecipeHistoryStatusID   TINYINT     NOT NULL,

    DateCreated             DATETIME    NOT NULL,

    DateModified            DATETIME    NULL,

    CONSTRAINT pk_RecipeHistory2018_RecipeHistoryID

    PRIMARY KEY NONCLUSTERED

    (RecipeHistoryID, DateCreated),

    CONSTRAINT fk_RecipeHistory2018_RecipeID

    FOREIGN KEY (RecipeID)

    REFERENCES dbo.Recipe(RecipeID),

    CONSTRAINT fk_RecipeHistory2018_RecipeHistoryStatusID

    FOREIGN KEY (RecipeHistoryStatusID)

    REFERENCES

    dbo.RecipeHistoryStatus(RecipeHistoryStatusID)

    )

    ON RecipeHistRange (DateCreated);

    CREATE CLUSTERED INDEX ix_RecipeHistory2018_DateCreated

    ON dbo.RecipeHistory2018 (DateCreated)

    ON RecipeHistRange (DateCreated);

    Listing 15-15

    Create Tables for Partitioned View

    ```


    While each of these tables is on the same partitioning scheme, there is nothing
    to limit the type of data that will be stored in these tables. The first table
    is intended to store data for 2019, and the second table is for data from 2018\.
    However, I need to add constraints to these tables to ensure that the correct
    records exist in each table. In Listing [15-16](#480547_1_En_15_Chapter.xhtml#PC16),
    you can see the constraints that will be added to both tables.


    ```

    ALTER TABLE dbo.RecipeHistory2019

    WITH CHECK ADD CONSTRAINT ck_RecipeHistory2019_MinDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated >= ''01/01/2019''

    );

    ALTER TABLE dbo.RecipeHistory2019

    WITH CHECK ADD CONSTRAINT ck_RecipeHistory2019_MaxDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated = ''01/01/2018''

    );

    ALTER TABLE dbo.RecipeHistory2018

    WITH CHECK ADD CONSTRAINT ck_RecipeHistory2018_MaxDateCreated

    CHECK

    (

    DateCreated IS NOT NULL

    AND DateCreated < ''01/01/2019''

    );

    Listing 15-16

    Add Constraints to Tables

    ```


    The table for 2019 now has a constraint that only allows records with a DateCreated
    from January 1, 2019, up to but not including January 1, 2020\. There is also
    a constraint on the table for 2018 with similar logic so that only records that
    were created in 2018 can be stored in this table.


    You now have tables for two different date ranges, and you have applied constraints
    to these tables. The next step is creating a partitioned view. The process of
    creating a partitioned view is relatively simple and consists of adding a UNION
    ALL between each select statement on the underlying tables. An example of creating
    a partitioned view can be found in Listing [15-17](#480547_1_En_15_Chapter.xhtml#PC17).


    ```

    CREATE VIEW dbo.vwRecipeHistory

    AS

    -- Select data from current read/write table

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.RecipeHistory2019

    UNION ALL

    -- Select data from partitioned table

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.RecipeHistoryPartition2018;

    Listing 15-17

    Create Partitioned View

    ```


    Notice that the column lists are in the same order for both SELECT statements
    used within the partitioned view. This is a requirement of creating a partitioned
    view. You must also specify the full column list of the table when creating a
    partitioned view. Once the partitioned view has been created, you may want to
    see how querying a partitioned view works.


    Earlier in the chapter, in Listing [15-13](#480547_1_En_15_Chapter.xhtml#PC13),
    we queried the dbo.RecipeHistory table on the date range between October 7, 2018,
    and October 9, 2018\. We can query the partitioned view for the same date range
    as shown in Listing [15-18](#480547_1_En_15_Chapter.xhtml#PC18).


    ```

    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    DateCreated

    FROM dbo.vwRecipeHistory

    WHERE DateCreated BETWEEN ''10/7/18'' AND ''10/9/18'';

    Listing 15-18

    Access Data Using Partitioned Column

    ```


    The T-SQL code is very similar between Listing [15-13](#480547_1_En_15_Chapter.xhtml#PC13)
    and Listing [15-18](#480547_1_En_15_Chapter.xhtml#PC18). This shows how easy it
    can be to shift to using a partitioned view instead of the current table names
    in your queries. However, what we are really interested in confirming is seeing
    how the execution plan has changed with the use of a partitioned view. Figure
    [15-13](#480547_1_En_15_Chapter.xhtml#Fig13) shows the execution plan that is
    generated as a result of running the query in Listing [15-18](#480547_1_En_15_Chapter.xhtml#PC18).


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig13_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig13_HTML.jpg)


    Figure 15-13


    Execution Plan for Partitioned View


    Like the partitioned table referenced earlier in this chapter, the execution plan
    for the partitioned view also uses a Clustered Index Seek. Even though the partitioned
    view includes both the 2019 and 2018 tables, you can see from the execution plan
    that SQL Server only used the 2018 table when finding the results from the query
    in Listing [15-18](#480547_1_En_15_Chapter.xhtml#PC18). We can also look at the
    properties of the Clustered Index Seek in Figure [15-14](#480547_1_En_15_Chapter.xhtml#Fig14).


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig14_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig14_HTML.jpg)


    Figure 15-14


    Reads for Query Partitioned View with Clustered Index on Partitioning Key


    You can see based on the number of rows returned that the data in the 2018 table
    is different from the partitioned tables referenced previously in this chapter.
    You can also see that the relative number of logical reads is low and trends similarly
    to the partitioned table earlier in this chapter.


    The T-SQL code executed in Listing [15-18](#480547_1_En_15_Chapter.xhtml#PC18)
    accessed the partitioned view based on the partitioned column in each of the tables
    and on the constraint specified for each of the tables. We saw that SQL Server
    was able to quickly determine which table to access when querying the data. There
    may be times where we may want to run a query that does not include the partitioning
    column like the one in Listing [15-19](#480547_1_En_15_Chapter.xhtml#PC19).'
