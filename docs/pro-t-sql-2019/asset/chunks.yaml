  trans: '

    ## 隐式转换


    SQL Server 中的数据都有其数据类型。这些数据类型将在第 1 章中进一步讨论。使用这些数据类型时，确保保持数据类型一致至关重要。否则，SQL Server
    将不得不进行隐式转换。这是指 SQL Server 在后台将一种数据类型转换为另一种数据类型的过程。这可能会给 SQL Server 带来额外的负载。此外，还存在隐式转换失败的风险。我最常见到的情况是，一个标识类型的列主要存储整数值，但偶尔也存储字符串值。


    ## SET NOCOUNT ON


    你可以对 T-SQL 做许多小的调整，以获得一些微小的性能提升。默认情况下，当你运行 T-SQL 代码时，它会计算受影响的行数并进行报告。计算这些记录的成本可能是额外的几毫秒。因此，对编码标准的一个可能的改进是关闭此功能，尤其是在涉及存储过程时。实现这一点的方法是确保在存储过程内部包含
    `SET NOCOUNT ON`。你可以在清单 9-3 中看到这一点。


    ```

    CREATE PROCEDURE dbo.UpdateRecipeMenuType

    @RecipeMeal RecipeMealType READONLY

    AS

    SET NOCOUNT ON

    UPDATE rec

    SET MealTypeID = meal.MealTypeID

    FROM dbo.Recipe rec

    INNER JOIN @RecipeMeal recmeal

    ON rec.RecipeName = recmeal.RecipeName

    INNER JOIN dbo.MealType meal

    ON recmeal.MealTypeName = meal.MealTypeName

    Listing 9-3

    使用 SET NOCOUNT ON 的存储过程

    ```


    当在查询代码执行前包含了 `SET NOCOUNT ON`，存储过程的执行时间可以减少几毫秒。


    ## NULL 值


    大多数 T-SQL 编码标准的存在是为了帮助提高 SQL Server 的整体性能。然而，有些 T-SQL 编码标准的存在是为了帮助改进查询结果或使人们更容易编写出按预期工作的代码。`NULL`
    的问题之一是它不能直观地工作。在 SQL Server 中，`NULL` 被视为未知值。这意味着 `NULL` 既不是 `True` 也不是 `False`。因此，在可能包含
    `NULL` 值的字段中，处理这些字段的方式必须有所不同。


    此外，`NULL` 值可能表明表的设计效率不高。在陷入这种情况之前，考虑如何设计表可能是有益的。你需要确保表确实需要包含可为空的列。这也与数据的存储方式以及索引的创建方式有关。你需要考虑这些数据将如何被使用。


    ## NOLOCK


    T-SQL 编码标准还涉及其他因素。其中一些包括你可能认为的最佳实践。一些非常常见的最佳实践包括高度争议性的话题，例如是否或在何时在查询中使用 `NOLOCK`
    提示。我特别提到这一点的原因之一是，至少存在两个关于 `NOLOCK` 的截然不同的群体。一方面，许多数据库管理员认为不使用 `NOLOCK` 是一种最佳实践。另一方面，许多开发人员则持相反观点，认为使用
    `NOLOCK` 是一种最佳实践。这种观点上的差异是基于数据准确性和性能之间的权衡。


    `NOLOCK` 背后的想法是通过减少锁的数量来提高查询性能。在 `NOLOCK` 的情况下，减少的锁活动是针对 `SELECT` 语句的。`INSERT`、`UPDATE`
    和 `DELETE` 等操作不受 `NOLOCK` 的影响。然而，当数据修改操作持有 `SELECT` 语句试图访问的同一表上的锁时，在 `SELECT`
    语句上使用 `NOLOCK` 可以更快地返回结果。


    我们可以通过一个例子来了解这些观点为何是正确的。在清单 9-4 中，我编写了一个查询，在显式事务中将一条记录插入到 `dbo.Recipe` 表中。


    ```

    BEGIN TRAN

    INSERT INTO dbo.Recipe

    (

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    )

    VALUES

    (

    ''Baked Acorn Squash'',

    ''Acorn squash with butter and brown sugar'',

    4,

    4,

    1,

    1,

    GETDATE(),

    GETDATE()

    )

    Listing 9-4

    向 dbo.Recipe 插入记录

    ```


    在清单 9-4 中，我使用 `BEGIN TRAN` 启动了一个显式事务，但没有指定 `COMMIT` 或 `ROLLBACK`。这将使事务保持打开状态，并在
    `dbo.Recipe` 上持有一个锁。为了模拟应用程序性能，我将打开一个单独的查询窗口并运行一个查询，尝试查找此表中在 2019 年 8 月 1 日之后创建的所有记录。你可以在清单
    9-5 中看到此查询的示例。


    ```

    SELECT RecipeName, RecipeDescription

    FROM dbo.Recipe

    WHERE DateCreated > ''8/1/19'';

    Listing 9-5

    查询最近的食谱

    ```


    由于清单 9-4 中的查询对 `dbo.Recipe` 持有的锁，我的查询似乎一直在运行。清单 9-5 中的查询正在等待锁被释放，然后才能返回任何数据。为了更快地获得结果，我可以更改
    SQL Server 处理表上锁的方式。在清单 9-6 中，我修改了清单 9-5 中的查询，并包含了一个查询提示 `WITH (NOLOCK)`。


    ```

    SELECT RecipeName, RecipeDescription

    FROM dbo.Recipe WITH(NOLOCK)

    WHERE DateCreated > ''8/1/19'';

    Listing 9-6

    使用 NOLOCK 提示查询最近的食谱

    ```


    当我在一个单独的查询窗口中运行清单 9-5 中的查询时，我几乎立即得到了结果。你可以在表 9-1 中看到这些结果的示例。


    表 9-1

    2019 年 8 月 1 日后创建的食谱


    | RecipeName | RecipeDescription |

    | --- | --- |

    | Lee’s Hamburgers | The best hamburgers |

    | Acorn Squash | Acorn squash with butter and brown sugar |


    查看前面的结果，你可以看到清单 9-4 中插入的记录包含在结果中。但是，此记录尚未提交到 SQL Server。我可以回滚清单 9-4 中的事务并撤消插入操作。这将导致表
    9-1 中的结果不准确。这种查询返回的结果未完全提交到数据库的差异被称为脏读。这是在查询中使用 `NOLOCK` 时的最大风险。在决定应在 T-SQL 代码中使用
    `NOLOCK` 之前，请确保业务方（包括你的最终用户）了解使用此提示的潜在风险。

    '
- fmt: "#### RECOMPILE\n\nBesides `NOLOCK`, another possible query hint that is often\
    \ considered is `RECOMPILE`. You may find yourself dealing with a query that is\
    \ affected by parameter sniffing as discussed in Chapter [4](#480547_1_En_4_Chapter.xhtml).\
    \ This means that the query creates an execution plan that may perform well for\
    \ some values, but when other parameter values are used, the performance can degrade\
    \ significantly. One of the workarounds that can be easily and quickly implemented\
    \ is the query hint `RECOMPILE`. In Listing [9-7](#480547_1_En_9_Chapter.xhtml#PC7),\
    \ you can see the additional line needed when creating a stored procedure to allow\
    \ the stored procedure to recompile on execution.\n\n```sql\n/*-------------------------------------------------------------*\\\
    \nName:             dbo.GetRecipeAndIngredientByMealTypeID\nAuthor:          \
    \ Elizabeth Noble\nCreated Date:     April 20, 2019\nDescription: Get all recipes\
    \ and their ingredients by meal type\nSample Usage:\nEXECUTE dbo.GetRecipeAndIngredientByMealTypeID\
    \ 1\n\\*-------------------------------------------------------------*/\nCREATE\
    \ PROCEDURE dbo.GetRecipeAndIngredientByMealTypeID\n    @MealTypeID     INT\n\
    WITH RECOMPILE\nAS\nSELECT\n    rec.RecipeName,\n    ingr.IngredientName,\n  \
    \  ingr.IsActive,\n    ingr.DateCreated,\n    ingr.DateModified\nFROM dbo.Recipe\
    \ rec\nINNER JOIN dbo.RecipeIngredient recingr\n    ON rec.RecipeID = recingr.RecipeID\n\
    LEFT OUTER JOIN dbo.Ingredient ingr\n    ON recingr.IngredientID = ingr.IngredientID\n\
    WHERE rec.MealTypeID = @MealTypeID\nORDER BY rec.RecipeName, ingr.IngredientName;\n\
    ```\n\n**Listing 9-7** Adding `WITH RECOMPILE` to a Stored Procedure\n\nWhile\
    \ this is a quick fix, it can increase the CPU load on the server. I would suggest\
    \ trying to redesign the query if possible. If not, you may need to change the\
    \ stored procedure to only recompile for the values that fall outside of the majority.\n\
    \nFor your T-SQL Coding Standards, it is important to include guidelines related\
    \ to writing T-SQL that performs well. You will also want to include some rules\
    \ for what actions are or are not allowable in order to try and fix poorly performing\
    \ T-SQL. The last part of your T-SQL Coding Standards is a catch-all generally\
    \ related to security, futureproofing, and maintainability.\n\n### T-SQL Usability\n\
    \nHaving T-SQL Coding Standards that encourage good database design and address\
    \ performance issues is a good start. However, you are also going to want some\
    \ coding standards to help with other aspects of T-SQL. Some of this includes\
    \ having T-SQL Coding Standards for potential security issues. There are other\
    \ coding standards that you can put in place that are best practices but may not\
    \ affect performance. They may be in place either to help keep your T-SQL functioning\
    \ even if the underlying data structure changes or encourage T-SQL commands that\
    \ help make your T-SQL code easier to read or understand.\n\n#### Linked Server\n\
    \nLinked servers are one of those things that may be overlooked as part of the\
    \ coding standards. It seems unlikely that you will need to use linked servers,\
    \ but linked servers have a way of seeming necessary when you least expect it.\
    \ That is why it is a good idea to include specifications about how to handle\
    \ linked servers as part of your T-SQL Coding Standards. Due to the general security\
    \ risks associated with using linked servers, it is recommended that you do not\
    \ use linked servers unless necessary. I would suggest clearly defining exactly\
    \ what is considered necessary. This will help reduce any contention should you\
    \ find yourself wanting to implement linked servers.\n\n#### Column Definition\n\
    \nOne of the key factors of writing T-SQL is specifying what columns you are using\
    \ or affecting. While this is related to making sure you only interact with the\
    \ data you need, there are other benefits to requiring your T-SQL code to explicate\
    \ state column names. When inserting data into SQL Server, it is possible to not\
    \ state the column names or order you are using for the insert. If you are inserting\
    \ data into every column in the table and you are inserting the data in the same\
    \ order as the columns in the table, you will not have any issues. However, this\
    \ can cause stored procedures or other T-SQL code to stop functioning if columns\
    \ are added or removed from the table or if the column order is changed in the\
    \ future. Therefore, a good habit is to explicitly state your column names on\
    \ all T-SQL. For these examples, this specifically includes selects and inserts.\n\
    \n#### `BETWEEN`\n\nThere are also situations where you have multiple choices\
    \ on how to write T-SQL code, and all those options seem to perform about the\
    \ same. This can happen when you are trying to get a subset of data that covers\
    \ a continuous range. Defining a T-SQL Coding Standard in this situation does\
    \ not necessarily correlate to improving the performance of SQL Server. This is\
    \ more closely related to improving the consistency of the T-SQL code. An example\
    \ of how to write T-SQL using `BETWEEN` is shown in Listing [9-8](#480547_1_En_9_Chapter.xhtml#PC8).\n\
    \n```sql\nSELECT *\nFROM dbo.Recipe\nWHERE RecipeID BETWEEN 100 AND 20000\n```\n\
    \n**Listing 9-8** Query with `BETWEEN`\n\nIn terms of readability, you may decide\
    \ that all ranges that cover inclusive values should be written using `BETWEEN`.\
    \ This may be preferable to using greater than or equal to and less than or equal\
    \ to get the same range.\n\n#### Stored Procedure Parameters\n\nWhile improving\
    \ code readability is important, there are times that improving readability of\
    \ T-SQL may make debugging the code harder when it comes to performance issues.\
    \ This type of situation can happen depending on how you configured your stored\
    \ procedure parameters. You can either define each parameter individually or you\
    \ can create a user-defined table that you can use to pass in a multitude of variables.\
    \ If you choose to use a user-defined table, your T-SQL code may be cleaner, but\
    \ it may take more time to debug performance issues going forward. In addition,\
    \ your stored procedure will work differently as you are working with a table\
    \ variable instead of handling each data field individually.\n\n#### `UNION`\n\
    \nYou will have times where you want to combine data from two different queries.\
    \ This type of combination involves appending one data set to another. When these\
    \ two data sets share the same number of columns with the same data types, there\
    \ is the possibility to use a `UNION` statement to combine this data. The advantage\
    \ of using a `UNION` is that the queries are readable and you can easily tell\
    \ by reading the T-SQL code what is happening. The challenge with using `UNION`\
    \ is that the performance of a `UNION` may be worse than the performance of each\
    \ query independently. In addition to `UNION`, there is also the `UNION ALL` functionality.\
    \ The main difference between a `UNION` and a `UNION ALL` is how the data is returned.\
    \ In a `UNION` statement, a distinct set of records is returned, whereas in a\
    \ `UNION ALL` statement, the actual number of records from each separate query\
    \ is included in the result set. When designing your coding standards, you will\
    \ want to decide if `UNION` and `UNION ALL` statements are allowed. You may also\
    \ want to decide if there are specific scenarios where they would or would not\
    \ be allowed.\n\n#### `CAST`\n\nWhen writing code, you find yourself in a situation\
    \ where you want to change the data type from one value to another. Changing data\
    \ types can be important with performing mathematical functions on integer values.\
    \ Due to how SQL Server performs mathematical operations, if you divided one integer\
    \ by another integer, you will get an integer as the answer. If you want SQL Server\
    \ to provide a decimal as a result, you will need to change the data type from\
    \ an integer to a decimal. Similarly, you may want to display a string of text\
    \ as part of a SQL Server query. However, if you include an integer in the string,\
    \ you will get an error when SQL Server tries to execute the query. However, if\
    \ you change the integer to a `varchar` data type, you will be able to parse the\
    \ string correctly."
  raw: '#### RECOMPILE


    Besides NOLOCK, another possible query hint that is often considered is RECOMPILE.
    You may find yourself dealing with a query that is affected by parameter sniffing
    as discussed in Chapter [4](#480547_1_En_4_Chapter.xhtml). This means that the
    query creates an execution plan that may perform well for some values, but when
    other parameter values are used, the performance can degrade significantly. One
    of the workarounds that can be easily and quickly implemented is the query hint
    RECOMPILE. In Listing [9-7](#480547_1_En_9_Chapter.xhtml#PC7), you can see the
    additional line needed when creating a stored procedure to allow the stored procedure
    to recompile on execution.


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetRecipeAndIngredientByMealTypeID

    Author:           Elizabeth Noble

    Created Date:     April 20, 2019

    Description: Get all recipes and their ingredients by meal type

    Sample Usage:

    EXECUTE dbo.GetRecipeAndIngredientByMealTypeID 1

    \*-------------------------------------------------------------*/

    CREATE PROCEDURE dbo.GetRecipeAndIngredientByMealTypeID

    @MealTypeID     INT

    WITH RECOMPILE

    AS

    SELECT

    rec.RecipeName,

    ingr.IngredientName,

    ingr.IsActive,

    ingr.DateCreated,

    ingr.DateModified

    FROM dbo.Recipe rec

    INNER JOIN dbo.RecipeIngredient recingr

    ON rec.RecipeID = recingr.RecipeID

    LEFT OUTER JOIN dbo.Ingredient ingr

    ON recingr.IngredientID = ingr.IngredientID

    WHERE rec.MealTypeID = @MealTypeID

    ORDER BY rec.RecipeName, ingr.IngredientName;

    Listing 9-7

    Adding WITH RECOMPILE to a Stored Procedure

    ```


    While this is a quick fix, it can increase the CPU load on the server. I would
    suggest trying to redesign the query if possible. If not, you may need to change
    the stored procedure to only recompile for the values that fall outside of the
    majority.


    For your T-SQL Coding Standards, it is important to include guidelines related
    to writing T-SQL that performs well. You will also want to include some rules
    for what actions are or are not allowable in order to try and fix poorly performing
    T-SQL. The last part of your T-SQL Coding Standards is a catch-all generally related
    to security, futureproofing, and maintainability.


    ### T-SQL Usability


    Having T-SQL Coding Standards that encourage good database design and address
    performance issues is a good start. However, you are also going to want some coding
    standards to help with other aspects of T-SQL. Some of this includes having T-SQL
    Coding Standards for potential security issues. There are other coding standards
    that you can put in place that are best practices but may not affect performance.
    They may be in place either to help keep your T-SQL functioning even if the underlying
    data structure changes or encourage T-SQL commands that help make your T-SQL code
    easier to read or understand.


    #### Linked Server


    Linked servers are one of those things that may be overlooked as part of the coding
    standards. It seems unlikely that you will need to use linked servers, but linked
    servers have a way of seeming necessary when you least expect it. That is why
    it is a good idea to include specifications about how to handle linked servers
    as part of your T-SQL Coding Standards. Due to the general security risks associated
    with using linked servers, it is recommended that you do not use linked servers
    unless necessary. I would suggest clearly defining exactly what is considered
    necessary. This will help reduce any contention should you find yourself wanting
    to implement linked servers.


    #### Column Definition


    One of the key factors of writing T-SQL is specifying what columns you are using
    or affecting. While this is related to making sure you only interact with the
    data you need, there are other benefits to requiring your T-SQL code to explicate
    state column names. When inserting data into SQL Server, it is possible to not
    state the column names or order you are using for the insert. If you are inserting
    data into every column in the table and you are inserting the data in the same
    order as the columns in the table, you will not have any issues. However, this
    can cause stored procedures or other T-SQL code to stop functioning if columns
    are added or removed from the table or if the column order is changed in the future.
    Therefore, a good habit is to explicitly state your column names on all T-SQL.
    For these examples, this specifically includes selects and inserts.


    #### BETWEEN


    There are also situations where you have multiple choices on how to write T-SQL
    code, and all those options seem to perform about the same. This can happen when
    you are trying to get a subset of data that covers a continuous range. Defining
    a T-SQL Coding Standard in this situation does not necessarily correlate to improving
    the performance of SQL Server. This is more closely related to improving the consistency
    of the T-SQL code. An example of how to write T-SQL using BETWEEN is shown in
    Listing [9-8](#480547_1_En_9_Chapter.xhtml#PC8).


    ```

    SELECT *

    FROM dbo.Recipe

    WHERE RecipeID BETWEEN 100 AND 20000

    Listing 9-8

    Query with BETWEEN

    ```


    In terms of readability, you may decide that all ranges that cover inclusive values
    should be written using BETWEEN. This may be preferable to using greater than
    or equal to and less than or equal to get the same range.


    #### Stored Procedure Parameters


    While improving code readability is important, there are times that improving
    readability of T-SQL may make debugging the code harder when it comes to performance
    issues. This type of situation can happen depending on how you configured your
    stored procedure parameters. You can either define each parameter individually
    or you can create a user-defined table that you can use to pass in a multitude
    of variables. If you choose to use a user-defined table, your T-SQL code may be
    cleaner, but it may take more time to debug performance issues going forward.
    In addition, your stored procedure will work differently as you are working with
    a table variable instead of handling each data field individually.


    #### UNION


    You will have times where you want to combine data from two different queries.
    This type of combination involves appending one data set to another. When these
    two data sets share the same number of columns with the same data types, there
    is the possibility to use a UNION statement to combine this data. The advantage
    of using a UNION is that the queries are readable and you can easily tell by reading
    the T-SQL code what is happening. The challenge with using UNION is that the performance
    of a UNION may be worse than the performance of each query independently. In addition
    to UNION, there is also the UNION ALL functionality. The main difference between
    a UNION and a UNION ALL is how the data is returned. In a UNION statement, a distinct
    set of records is returned, whereas in a UNION ALL statement, the actual number
    of records from each separate query is included in the result set. When designing
    your coding standards, you will want to decide if UNION and UNION ALL statements
    are allowed. You may also want to decide if there are specific scenarios where
    they would or would not be allowed.


    #### CAST


    When writing code, you find yourself in a situation where you want to change the
    data type from one value to another. Changing data types can be important with
    performing mathematical functions on integer values. Due to how SQL Server performs
    mathematical operations, if you divided one integer by another integer, you will
    get an integer as the answer. If you want SQL Server to provide a decimal as a
    result, you will need to change the data type from an integer to a decimal. Similarly,
    you may want to display a string of text as part of a SQL Server query. However,
    if you include an integer in the string, you will get an error when SQL Server
    tries to execute the query. However, if you change the integer to a varchar data
    type, you will be able to parse the string correctly.'
  trans: "\n#### 重新编译\n\n除了 `NOLOCK`，另一个经常被考虑的查询提示是 `RECOMPILE`。你可能会遇到一个受到**参数探测**影响的查询，正如第\
    \ 4 章所讨论的。这意味着该查询创建的执行计划可能对某些参数值表现良好，但当使用其他参数值时，性能可能会显著下降。一个可以轻松快速实施的变通方法就是查询提示\
    \ `RECOMPILE`。在清单 9-7 中，你可以看到在创建存储过程以允许其在执行时重新编译时，所需的额外一行。\n\n```sql\n/*-------------------------------------------------------------*\\\
    \nName:             dbo.GetRecipeAndIngredientByMealTypeID\nAuthor:          \
    \ Elizabeth Noble\nCreated Date:     April 20, 2019\nDescription: Get all recipes\
    \ and their ingredients by meal type\nSample Usage:\nEXECUTE dbo.GetRecipeAndIngredientByMealTypeID\
    \ 1\n\\*-------------------------------------------------------------*/\nCREATE\
    \ PROCEDURE dbo.GetRecipeAndIngredientByMealTypeID\n    @MealTypeID     INT\n\
    WITH RECOMPILE\nAS\nSELECT\n    rec.RecipeName,\n    ingr.IngredientName,\n  \
    \  ingr.IsActive,\n    ingr.DateCreated,\n    ingr.DateModified\nFROM dbo.Recipe\
    \ rec\nINNER JOIN dbo.RecipeIngredient recingr\n    ON rec.RecipeID = recingr.RecipeID\n\
    LEFT OUTER JOIN dbo.Ingredient ingr\n    ON recingr.IngredientID = ingr.IngredientID\n\
    WHERE rec.MealTypeID = @MealTypeID\nORDER BY rec.RecipeName, ingr.IngredientName;\n\
    ```\n\n**清单 9-7** 在存储过程中添加 `WITH RECOMPILE`\n\n虽然这是一个快速解决方案，但它会增加服务器的 CPU 负载。我建议，如果可能的话，尝试重新设计查询。如果不行，你可能需要更改存储过程，使其仅针对那些偏离大多数情况的值进行重新编译。\n\
    \n对于你的 T-SQL 编码标准，包含与编写高性能 T-SQL 相关的指导原则非常重要。你还需要包含一些规则，规定哪些操作是允许的或不允许的，以尝试修复性能不佳的\
    \ T-SQL。T-SQL 编码标准的最后一部分是一个兜底条款，通常与安全性、面向未来和可维护性相关。\n\n### T-SQL 可用性\n\n拥有鼓励良好数据库设计和解决性能问题的\
    \ T-SQL 编码标准是一个好的开始。然而，你还需要一些编码标准来帮助处理 T-SQL 的其他方面。其中一些包括为潜在的安全问题制定 T-SQL 编码标准。还有一些编码标准属于最佳实践，可能不会影响性能。它们可能是为了帮助即使在底层数据结构发生变化时也能保持\
    \ T-SQL 功能正常，或者鼓励使用那些使 T-SQL 代码更易于阅读或理解的 T-SQL 命令。\n\n#### 链接服务器\n\n链接服务器是那些可能被忽视作为编码标准一部分的事物之一。看起来你不太可能需要使用链接服务器，但链接服务器总能在你最意想不到的时候显得必要。这就是为什么将关于如何处理链接服务器的规范包含在你的\
    \ T-SQL 编码标准中是个好主意。由于使用链接服务器存在普遍的安全风险，建议除非必要，否则不要使用。我建议明确定义什么情况被视为“必要”。这将有助于在你发现自己想要实现链接服务器时减少任何争议。\n\
    \n#### 列定义\n\n编写 T-SQL 的一个关键因素是明确说明你正在使用或影响哪些列。虽然这与确保你只与所需数据进行交互有关，但要求你的 T-SQL\
    \ 代码显式说明列名还有其他好处。将数据插入 SQL Server 时，可以不说明列名或插入顺序。如果你正在向表中的每一列插入数据，并且插入数据的顺序与表中列的顺序相同，那么不会有任何问题。但是，如果将来从表中添加或删除列，或者更改了列的顺序，这可能会导致存储过程或其他\
    \ T-SQL 代码停止工作。因此，一个好的习惯是在所有 T-SQL 语句中显式说明列名。在这些示例中，这特别包括 `SELECT` 和 `INSERT`\
    \ 语句。\n\n#### `BETWEEN`\n\n还存在一些情况，你有多种编写 T-SQL 代码的选择，并且这些选项的性能看起来都差不多。当你试图获取覆盖一个连续范围的数据子集时，就可能发生这种情况。在这种情况下定义\
    \ T-SQL 编码标准不一定能改善 SQL Server 的性能，而更密切地关系到提高 T-SQL 代码的一致性。清单 9-8 展示了如何使用 `BETWEEN`\
    \ 编写 T-SQL 的示例。\n\n```sql\nSELECT *\nFROM dbo.Recipe\nWHERE RecipeID BETWEEN 100\
    \ AND 20000\n```\n\n**清单 9-8** 使用 `BETWEEN` 的查询\n\n就可读性而言，你可能会决定所有包含边界值的范围都应使用\
    \ `BETWEEN` 来编写。这可能比使用大于等于和小于等于来获得相同范围更可取。\n\n#### 存储过程参数\n\n虽然提高代码可读性很重要，但在处理性能问题时，提高\
    \ T-SQL 的可读性有时可能会使调试代码变得更加困难。这种类型的情况可能取决于你如何配置存储过程参数。你可以单独定义每个参数，也可以创建一个用户定义表来传递多个变量。如果你选择使用用户定义表，你的\
    \ T-SQL 代码可能更简洁，但今后调试性能问题可能需要更多时间。此外，你的存储过程工作方式也会不同，因为你是在使用表变量，而不是单独处理每个数据字段。\n\
    \n#### `UNION`\n\n有时你会希望将来自两个不同查询的数据组合起来。这种组合涉及将一个数据集附加到另一个数据集。当这两个数据集具有相同数量的列且数据类型相同时，就有可能使用\
    \ `UNION` 语句来组合这些数据。使用 `UNION` 的优势在于查询具有可读性，通过阅读 T-SQL 代码可以很容易地看出发生了什么。使用 `UNION`\
    \ 的挑战在于，`UNION` 的性能可能比每个查询单独执行时的性能更差。除了 `UNION`，还有 `UNION ALL` 功能。`UNION` 和 `UNION\
    \ ALL` 之间的主要区别在于返回数据的方式。在 `UNION` 语句中，返回的是一个唯一记录集，而在 `UNION ALL` 语句中，结果集中包含每个单独查询的实际记录数。在设计编码标准时，你需要决定是否允许使用\
    \ `UNION` 和 `UNION ALL` 语句。你可能还想决定是否存在特定的场景，在这些场景中允许或不允许使用它们。\n\n#### `CAST`\n\
    \n在编写代码时，你可能会遇到需要将一种数据类型的值更改为另一种数据类型的情况。对整数值执行数学函数时，更改数据类型可能很重要。由于 SQL Server\
    \ 执行数学运算的方式，如果你将一个整数除以另一个整数，你会得到一个整数作为答案。如果你希望 SQL Server 提供一个十进制数作为结果，你需要将数据类型从整数更改为十进制数。同样，你可能希望在\
    \ SQL Server 查询中显示一串文本。但是，如果你在字符串中包含一个整数，当 SQL Server 尝试执行查询时会出现错误。然而，如果你将整数更改为\
    \ `varchar` 数据类型，你将能够正确解析该字符串。\n"
- fmt: '### Cursor


    游标（`Cursor`）在数据库领域一直存在争议。在第5章中，我介绍了基于集合的操作，这是`SQL Server`性能最佳的方式。游标的问题在于它们无法利用这些基于集合的操作，这在处理数据时可能导致相当大的开销。雪上加霜的是，游标的编写方式更接近于应用程序代码，而非`T-SQL`。这使得使用游标变得非常诱人，因为理解如何编写代码以获得所需结果可能更容易。与制定`T-SQL`编码标准的其他因素一样，你可能无法完全排除游标。如果是这样，试着制定一些标准，在你认为游标有益的情况下，并将游标使用仅限于这些情况。


    ### ORDER BY


    人们常常希望`SQL Server`能完全按照应用程序所需的方式获取所有数据。虽然`SQL Server`可以做到这一点，但你需要考虑为完成你所请求的所有工作，对`SQL
    Server`而言是否值得。当你希望数据为应用程序排序时，就可能出现这种情况。`SQL Server`可以使用`ORDER BY`语句对数据进行排序，但让应用程序对这些数据进行排序可能是资源利用的更好方式。如果你决定这是处理数据排序的方式，那么在你的`T-SQL`编码标准中明确规定不应在`SQL
    Server`中对数据进行排序，可能是一个好主意。如果你知道某些特定情况无法避免排序，那么你可以在编码标准中明确说明在`T-SQL`代码中允许使用`ORDER
    BY`的确切场景。


    ### Case Statement


    `T-SQL`代码用途广泛。虽然你可能选择将`T-SQL`代码的功能限制在应用程序内，但数据库代码也用于其他目的，例如报告。在许多应用程序中，你可能同时处理事务并允许用户搜索和筛选数据。这类活动可以视为报告活动。通常，用户不希望看到数据的存储方式。例如，你可能有一个包含状态类型的表。一条给定的记录可能随着时间的推移有几个状态。然而，用户可能希望看到一行显示该特定记录的所有状态。这正是你需要使用`Case
    Statement`的地方，以便将多行转换为多个列。执行此类活动并非`T-SQL`纯粹的事务性用途，你可能希望在编码标准中限制此类行为。


    ### TRY… CATCH


    在`T-SQL`代码中包含错误处理会很有帮助，可能被认为是你们工作场所的最佳实践。你希望你的应用程序能够优雅地处理失败的存储过程。你可能会遇到的一种不幸情况是，一个存储过程成为死锁的牺牲品。`TRY…
    CATCH`块可以使该死锁的存储过程能够重新运行或优雅地退出。


    ```sql

    DECLARE @IngredientID         INT = 1;

    DECLARE @ServingPortionID     INT = 1;

    DECLARE @Cost                 DECIMAL(5,2) = 5.98

    DECLARE @IsActive             BIT = 1;

    DECLARE @DateCreated          DATETIME = GETDATE();

    DECLARE @DateModified         DATETIME = GETDATE();

    BEGIN TRY

    BEGIN TRAN

    INSERT INTO dbo.IngredientCost

    (

    IngredientID,

    ServingPortionID,

    Cost,

    IsActive,

    DateCreated,

    DateModified

    )

    VALUES

    (

    @IngredientID,

    @ServingPortionID,

    @Cost,

    @IsActive,

    @DateCreated,

    @DateModified

    )

    COMMIT TRANSACTION

    END TRY

    BEGIN CATCH

    PRINT ''Insert Failed''

    ROLLBACK TRANSACTION

    END CATCH

    ```


    一旦你决定了要在`T-SQL`编码标准中包含什么，下一步就是获得将编写`T-SQL`的同事或其他部门的认可。让每个人都同意一套标准可以解决许多问题。首先，它有助于新入职的员工。当他们审查代码时，会看到一致的代码风格。这将使他们能够专注于`T-SQL`在做什么，而不是试图解释`T-SQL`代码是如何编写的。


    如果你创建了一个全面且定义良好的编码标准，在脚本审查期间，当出现被认为不是最佳实践的`T-SQL`时，应该会有更少的反复讨论。有了`T-SQL`编码标准，所有相关方都知道什么是允许的，什么代码被认为是不良或不良实践。新员工也会知道哪些`T-SQL`是可以接受的。每个人都可以遵循相同的标准，这让其他人看到编写`T-SQL`的规则是公平的。


    ## 概述


    编写可管理的`T-SQL`代码是一个值得追求的目标，它建立在可理解、可维护代码的坚实基础之上。第3章讨论了如何标准化你的`T-SQL`代码。这在第9章通过实现`SQL`编码标准的概念得以延续。这个基础的目的是为你的数据库创建一个一致的代码库。虽然开发一致的代码库有助于提高代码质量，但如果你无法维护`T-SQL`代码，这种效果就会减弱。


    开发可管理的`T-SQL`代码涵盖了编写数据库代码的许多不同方面。前一章侧重于编码标准，以此作为指导你和他人编写性能良好的`T-SQL`代码的方法。拥有性能良好且易于阅读的数据库代码不仅可以帮助你的应用程序，还可以帮助你的开发过程。该路径的下一步是考虑如何存储你的代码。


    一个选择是考虑使用`source control`（源代码管理）来保存与创建各种数据库对象相关的`T-SQL`代码。你可能想知道为什么源代码管理很重要，或者它能如何帮助改进`T-SQL`代码开发。知道你想实施源代码管理与定义管理源代码管理的过程是不同的。建立关于如何处理源代码管理的指导方针，使你处于一个良好的位置，可以开始在源代码管理中创建你的第一个数据库项目。'
  raw: '#### Cursor


    Cursors are a source of controversy when it comes to databases. In Chapter [5](#480547_1_En_5_Chapter.xhtml),
    I went over set-based operations which is where SQL Server performs best. The
    issue with cursors is that they do not take advantage of those set-based operations.
    This can cause considerable overhead when it comes to handling data. To compound
    the challenges with cursors, they are written in a way that is more alike to how
    application code is written than T-SQL. This can make it very tempting to use
    cursors as it may be easier to understand how to write the code to get the desired
    results. Like other factors of developing your T-SQL Coding Standards, you may
    not be able to rule out cursors entirely. If so, try to create some criteria where
    you believe cursors would be beneficial and limit cursor usage to only those situations.


    #### ORDER BY


    It is often tempting to want SQL Server to get all of the data exactly how your
    application needs the data. While SQL Server can do this, you want to consider
    if it is worth the cost to SQL Server to do all the work you are requesting. Such
    can be the situation when you want data to be sorted for your application. SQL
    Server can sort the data using the ORDER BY statement, but it may be a better
    use of resources to have the application sort this data. If you decide that is
    how you want to handle sorting data, then it may be a good idea to include in
    your T-SQL Coding Standards that data should not be sorted in SQL Server. If you
    know there are specific situations where this will be unavoidable, then you can
    state in your coding standards the exact scenarios where using an ORDER BY is
    allowed in your T-SQL code.


    #### Case Statement


    T-SQL code can be versatile. While you may choose to keep your T-SQL code limited
    to application functionality, database code is also used for other purposes such
    as reporting. In many applications, you may be both processing transactions and
    allowing your users to search and filter data. This type of activity can be a
    reporting activity. Oftentimes, users do not want to see data in the same manner
    the data is stored. For instance, you may have a table that includes a status
    type. A given record may have several statuses over time. However, a user may
    want to see one line with all of the statuses for that specific record. This is
    where you would want to use a case statement so that you could convert multiple
    rows into various columns. Performing this type of activity is not a purely transactional
    use of T-SQL, and you may want to limit this type of behavior as part of your
    coding standards.


    #### TRY… CATCH


    Including error handling in T-SQL code can be helpful and may be considered best
    practice in your workplace. You want your application to gracefully handle procedures
    that fail. One of the situations you may find yourself in is in the unfortunate
    event that a stored procedure is a deadlock victim. The TRY… CATCH block can allow
    the deadlock stored procedure to either rerun or exit gracefully.


    ```

    DECLARE @IngredientID         INT = 1;

    DECLARE @ServingPortionID     INT = 1;

    DECLARE @Cost                 DECIMAL(5,2) = 5.98

    DECLARE @IsActive             BIT = 1;

    DECLARE @DateCreated          DATETIME = GETDATE();

    DECLARE @DateModified         DATETIME = GETDATE();

    BEGIN TRY

    BEGIN TRAN

    INSERT INTO dbo.IngredientCost

    (

    IngredientID,

    ServingPortionID,

    Cost,

    IsActive,

    DateCreated,

    DateModified

    )

    VALUES

    (

    @IngredientID,

    @ServingPortionID,

    @Cost,

    @IsActive,

    @DateCreated,

    @DateModified

    )

    COMMIT TRANSACTION

    END TRY

    BEGIN CATCH

    PRINT ''Insert Failed''

    ROLLBACK TRANSACTION

    END CATCH

    ```


    Once you have determined what you want to include in your T-SQL Coding Standards,
    the next step is to get buy-in from your coworkers or other departments that will
    also be writing T-SQL. Getting everyone to agree to a set standard can solve many
    issues. First, it helps those that are onboarding to the company. When they review
    code, they will see a consistent code style. This will allow them to focus on
    what the T-SQL is doing instead of trying to interpret how the T-SQL code is written.


    If you create a thorough and well-defined coding standard, there should be less
    back and forth during script reviews when there is T-SQL that is not believed
    to be best practice. With the T-SQL Coding Standard in place, all parties know
    what is allowable and what code is deemed as undesirable or bad practice. New
    hires will also know what T-SQL is acceptable. Everyone can be held to the same
    standard, and it allows others to see that the rules for writing T-SQL are fair.


    # 10. Source Control


    Writing T-SQL code that is manageable is a worthwhile goal to build upon a solid
    foundation of understandable and maintainable code. Chapter [3](#480547_1_En_3_Chapter.xhtml)
    discussed how you can standardize your T-SQL code. This continued in Chapter [9](#480547_1_En_9_Chapter.xhtml)
    with the concept of implementing SQL Coding Standards. The purpose of this foundation
    was to create a consistent code base for your database. While developing a consistent
    code base can help improve code quality, this effect is diminished if you are
    unable to maintain your T-SQL code.


    Developing manageable T-SQL code covers many different aspects of writing database
    code. The previous chapter focused on coding standards as a way to help guide
    you and others to writing T-SQL code that performs well. Having database code
    that performs well and is easy to read can not only help your applications but
    also your development process. The next step in that path is to consider how you
    are storing your code.


    One option is to consider using source control to save T-SQL code associated with
    creating various database objects. You may be wondering why source control is
    important or what it can do to help make T-SQL code development better. Knowing
    that you want to implement source control is different from defining a process
    for managing source control. Setting up guidelines on how source control can be
    handled puts you in a good place to begin creating your first database project
    in source control.'
