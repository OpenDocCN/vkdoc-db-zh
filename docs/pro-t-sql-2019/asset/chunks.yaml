    You will also want to get the execution plan from the plan cache so that you can
    see how SQL Server is executing the T-SQL code. The partial execution plan in
    Figure [8-1](#480547_1_En_8_Chapter.xhtml#Fig1) shows one part of the execution
    plan that may benefit from optimization.


    ![../images/480547_1_En_8_Chapter/480547_1_En_8_Fig1_HTML.jpg](images/480547_1_En_8_Chapter/480547_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Partial Execution Plan for Listing [8-1](#480547_1_En_8_Chapter.xhtml#PC1)


    The execution plan has one thick line that results in a thin line after the Hash
    Match. This is a good indication that the query may be able to be optimized to
    use less reads overall. Based on this information, I need to investigate how the
    data from dbo.Recipe is combined with dbo.RecipeIngredient. Looking at either
    the T-SQL code or the output of the T-SQL code, I can get a better idea of what
    the purpose of this query is. This query is returning all ingredients where the
    cost has changed three times along with information about what recipes use these
    ingredients.


    Knowing this helps us begin the process of optimizing the logical reads on this
    query. I know that this query is based on ingredients that have had their cost
    changed more than three times. It may be possible to reduce the number of reads
    if I focus on trying to find only recipes that contain ingredients where the price
    has been changed more than three times. While the table dbo.RecipeIngredient is
    ordered by RecipeID and then by IngredientID, this does not help when the T-SQL
    code in Listing [8-1](#480547_1_En_8_Chapter.xhtml#PC1) is only looking for recipes
    that have specific ingredients. The execution plan indicates that there is a non-clustered
    index that SQL Server is using to retrieve the data. This T-SQL code to create
    this index is in Listing [8-2](#480547_1_En_8_Chapter.xhtml#PC2).


    ```

    CREATE NONCLUSTERED INDEX NDX_RecipeIngredient_IsActive_IngredientID

    ON dbo.RecipeIngredient (IsActive, IngredientID)

    Listing 8-2

    Query for Index on RecipeIngredient

    ```


    The non-clustered index does not change the order of the data in the table, but
    the index does keep the data for the index ordered. In this case, the index orders
    all the data first by the value of the IsActive column, then by the IngredientID.
    The non-clustered index also must be able to reference back to the clustered index
    for situations where SQL Server decides to use this non-clustered index but also
    may need some additional data from the table. SQL Server does this by including
    the columns for the clustered index as part of this index. This helps us because
    this means the RecipeID from this index can be used to find all RecipeIDs with
    this ingredient.


    This all sounds great, but it does not look like this index is currently giving
    us the best performance. While we could work on tuning the indexes, I have found
    that on very large tables and on highly transactional systems, you may not be
    able to add or alter indexes as they exist. Sometimes those indexes are there
    doing exactly what they need to be doing, making sure a critical part of the application
    performs well. Modifying these indexes may cause even more headaches. We are fortunate
    that in this scenario we can add one line of the code to the T-SQL from Listing
    [8-1](#480547_1_En_8_Chapter.xhtml#PC1) and decrease the number of reads. The
    index is ordered by the IsActive flag. If I modify the query to reference the
    IsActive flag, I may be able to get the index to work more efficiently. You can
    see the code `AND (recing.IsActive = 1 OR recing.IsActive = 0)` in Listing [8-3](#480547_1_En_8_Chapter.xhtml#PC3).


