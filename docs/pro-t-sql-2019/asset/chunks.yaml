  trans: '

    在探讨所有这些特性时，最大的问题之一仍然围绕着**嵌套视图**。在典型的软件开发中，人们希望在多个场景中复用相同的软件代码。在创建视图时，很容易会想到去复用这些视图来构建其他视图。不幸的是，这可能会导致一个视图开始出现性能低下的情况。一旦视图性能不佳，就需要付出相当大的努力，穿梭于各个嵌套视图层之间，才能找到根本原因。


    ### 索引视图


    我已经介绍了视图如何用于简化查询编写、修改数据以及保护数据库架构。我也谈到了复用视图来创建其他视图可能导致严重的性能问题。正如你在前一节所看到的，视图可以使
    T-SQL 更简洁，但对于临时查询和视图，其执行计划是相同的。在某些情况下，无论是作为查询还是视图，某些连接操作的表现都不尽如人意。这时就有可能考虑为视图添加索引。


    如果你发现自己需要提升视图的性能，可以选择为视图添加索引。当为视图添加索引后，该视图就被视为**索引视图**。添加到视图的第一个索引必须是聚集索引。在添加了聚集索引之后，还可以向该视图添加非聚集索引。然而，为视图添加索引是有代价的。每次数据被修改时，相关表上的任何索引以及索引视图也必须随之更新。


    创建索引视图的第一步是先创建一个视图。在这个例子中，我将使用在代码清单 2-2 中创建的视图。下一步是为这个视图添加一个索引。在代码清单 2-9 中，我将为这个视图添加一个聚集索引。


    ```sql

    CREATE UNIQUE CLUSTERED INDEX CX_AvailableMeal_RecipeNameIngredientName

    ON dbo.AvailableMeal (RecipeName, IngredientName);

    ```

    代码清单 2-9

    向视图添加聚集索引


    比较添加聚集索引前后视图的性能，总体上显示出性能有所提升。请记住，尽管索引视图在拉取数据时可以在某些情况下帮助提升性能，但当受影响的表发生数据插入、更新或删除操作时，仍然可能出现性能问题。在图
    2-3 中，可以看到向基表插入数据时的执行计划。


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig3_HTML.jpg](img/480547_1_En_2_Fig3_HTML.jpg)

    图 2-3

    向基表插入数据的执行计划


    如你所见，作为向基表插入数据的一部分，多出了一个更新视图索引的步骤。


    ## 函数


    在许多应用程序中，有些核心功能可能会被多次重新计算或复用。有时你可能希望编写一次简单的代码片段，然后在各种其他数据库对象中复用它。还有些情况下，你可能希望将复杂的逻辑封装起来，创建一个包含该逻辑并返回所需结果的数据库对象。这样做可以使
    T-SQL 代码看起来不那么复杂，从而不那么令人望而生畏。无论哪种方式，函数都能帮助你简化 T-SQL 代码。


    ### 标量函数


    你可能会遇到这样的情况：需要在许多不同的场景中重新运行同一段代码。你可能在查找一个配置值，或者希望在代码的多个不同部分重新运行相同的基本逻辑，其中只返回一个值。当你希望传递零个或多个参数，并且只想返回单个值时，你或许可以使用**标量函数**。不过，在使用标量函数时，你需要考虑其潜在的代价。


    在 SQL Server 2019 之前，标量函数在 SQL Server 中的运行方式大不相同。历史上，SQL Server 没有对标量函数进行基于成本的优化。这通常意味着标量函数不作为执行计划的一部分被考虑。既然
    SQL Server 2019 作为智能查询处理的一部分实现了额外的功能，包括标量用户定义函数 (UDF) 内联，函数的性能得到了提升。


    内联函数是可以作为执行计划一部分被包含的函数。内联标量 UDF 的最大优势之一是，在使用标量 UDF 时性能得到显著提升。当想要简化复杂流程并复用代码时，如果函数只需要返回一个结果，标量
    UDF 是理想的选择。


    早期版本的 SQL Server 与 SQL Server 2019 中的标量 UDF 在性能方面差异显著。为了比较这些执行计划，我将更改兼容性模式以匹配
    SQL Server 2017 和 SQL Server 2019。兼容性级别 140 将使用 SQL Server 2017 中的优化器。将数据的兼容性级别设置为
    150 则会使用 SQL Server 2019 中可用的优化器。代码清单 2-10 展示了在 T-SQL 中创建标量 UDF 所需的代码。


    ```sql

    CREATE FUNCTION dbo.Ingredient_Price

    (

    @Cost DECIMAL(6,3),

    @Count DECIMAL(6,3)

    )

    RETURNS DECIMAL (6,3) AS

    BEGIN

    RETURN @Cost / @Count;

    END

    ```

    代码清单 2-10

    创建标量 UDF


    在兼容性级别 140 下执行上述函数时，最终的执行计划看起来比兼容性级别 150 下生成的执行计划更简单。在代码清单 2-11 中，你可以看到我在兼容性级别
    140 和 150 下都执行过的代码。


    ```sql

    SELECT ing.IngredientName, dbo.Ingredient_Price(ingcos.Cost, srv.ServingPortionQuantity)

    FROM dbo.Ingredient ing

    INNER JOIN dbo.IngredientCost ingcos

    ON ing.IngredientID = ingcos.IngredientID

    INNER JOIN dbo.ServingPortion srv

    ON ingcos.ServingPortionID = srv.ServingPortionID

    ```

    代码清单 2-11

    执行函数的代码


    为了模拟 SQL Server 2017 的行为，我将把数据库的兼容性级别更改为 140。你可以在代码清单 2-12 中看到更改兼容性级别所需的 T-SQL
    代码。


    ```sql

    ALTER DATABASE Menu

    SET COMPATIBILITY_LEVEL = 140;

    ```

    代码清单 2-12

    将数据库兼容性模式更改为先前版本


    代码清单 2-13 中的查询允许我们强制 SQL Server 使用兼容性级别 140 为所有查询生成新的执行计划。


    ```sql

    DBCC FREEPROCCACHE;

    ```

    代码清单 2-13

    清除代码清单 2-11 中查询的执行计划


    需要注意的是，前面的 T-SQL 代码不应在你的生产环境中运行。这段代码将导致 SQL Server 使用额外资源来确定每个查询在首次调用时应如何运行。我保存了使用兼容性级别
    140 运行上述查询时的实际执行计划。你可以在图 2-4 中看到该实际执行计划的副本。


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig4_HTML.jpg](img/480547_1_En_2_Fig4_HTML.jpg)

    图 2-4

    兼容性模式 140 的执行计划

    '
- fmt: 'Looking at the actual execution plan for compatibility mode `150`, you can
    see that the execution plan appears more complex. However, you can also see that
    the scalar function is included in the execution plan in Figure [2-5](#480547_1_En_2_Chapter.xhtml#Fig5).


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig5_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Execution Plan for Compatibility Mode `150`


    While the execution plan for SQL Server 2019 may be more complex, the execution
    time between these two versions of SQL Server is significant. We can also compare
    the CPU and elapsed times for both compatibility mode `140` and `150`. In Table
    [2-1](#480547_1_En_2_Chapter.xhtml#Tab1), you can see the CPU and elapsed times
    for both query executions.


    Table 2-1


    Elapsed and CPU Times for Query Execution


    | Compatibility Mode | CPU Time | Elapsed Time |

    | --- | --- | --- |

    | `140` | `3438 milliseconds` | `4768 milliseconds` |

    | `150` | `655 milliseconds` | `1913 milliseconds` |


    As you can see, the function performs significantly better in compatibility mode
    `150` vs. `140`.


    The ability to inline scalar UDFs in SQL Server 2019 does not apply only to single
    query scalar UDFs. There is also improved functionality when it comes to using
    multi-statement scalar UDFs. Multi-statement scalar UDFs return a single value
    similarly to the scalar UDF created in Listing [2-10](#480547_1_En_2_Chapter.xhtml#PC10).
    The difference with a multi-statement scalar UDF is that additional logic can
    exist within the function. We may want to improve the function created in Listing
    [2-10](#480547_1_En_2_Chapter.xhtml#PC10) so that the function can handle a divide
    by zero error. In Listing [2-14](#480547_1_En_2_Chapter.xhtml#PC14), I have written
    the T-SQL code to enhance Listing [2-10](#480547_1_En_2_Chapter.xhtml#PC10) by
    using a multi-statement scalar UDF.


    ```

    CREATE OR ALTER FUNCTION dbo.Ingredient_Price

    (

    @Cost DECIMAL(6,3),

    @Count DECIMAL(6,3)

    )

    RETURNS DECIMAL (6,3) AS

    BEGIN

    DECLARE @IngPrc DECIMAL (6,3)

    IF @Count = 0

    BEGIN

    SET @IngPrc =  0.00

    END

    ELSE

    BEGIN

    SET @IngPrc = @Cost / @Count;

    END

    RETURN @IngPrc

    END;

    Listing 2-14

    Create Multi-Statement Scalar UDF

    ```


    The multi-statement scalar UDF created in Listing [2-14](#480547_1_En_2_Chapter.xhtml#PC14)
    will benefit from the same scalar inlining as the scalar UDF created in Listing
    [2-10](#480547_1_En_2_Chapter.xhtml#PC10). Regardless of the scalar UDF you decide
    to use, SQL Server 2019 has been improved so that you can see improved performance
    with these functions.


    ## Table-Valued Functions


    There will be situations where you find yourself needing to perform complex logic,
    but you need to return more than one value. When these situations come up, you
    may want to consider using a table-valued function. Prior to SQL Server 2019,
    the only function that could run inline was a variation of table-valued functions.


    Table-valued functions are useful for those times where you need a table as a
    result. This could be anything from one row with multiple columns to one column
    with the potential for multiple rows or many rows and many columns. No matter
    your purpose, if you want a reusable piece of code that can give you a table output,
    then table-valued functions may be what you want. Keep in mind that there are
    two main types of table-valued functions, and while the output can look the same,
    the performance of each of these types can be incredibly different.


    ### Inline Table-Valued Functions


    If you’re using a function to perform some complex logic, but you can survive
    only using a select statement, then you may want to learn more about how inline
    table-valued user-defined functions can work for you. It is important to note
    that you do not specifically indicate that a function is inline or multi-statement.
    It is how you create and declare the function that will determine which type of
    function you have created.


    Like the inline scalar user-defined functions (UDFs) available in SQL Server 2019,
    table-valued functions can also be inlined. Also be aware that table-valued functions
    have been able to be inlined for quite some time, while inlining scalar UDFs is
    quite new. Either way, the advantage is clear. When a table-valued function can
    be run inline with the rest of the query, the optimizer can provide a better execution
    plan for the function and the T-SQL code overall.


    Historically, the most popular use for inline table-valued functions is to operate
    similarly to views. Except that in the case of inline table-valued functions,
    parameters can be used to limit the data returned; whereas views will return all
    data available to the view for each execution. Let’s look at the steps necessary
    to create an inline table-valued function in Listing [2-15](#480547_1_En_2_Chapter.xhtml#PC15).


    ```

    CREATE FUNCTION dbo.IngredientsByRecipe (@RecipeID INT)

    RETURNS TABLE

    AS

    RETURN

    (

    SELECT meal.MealTypeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    WHERE rec.RecipeID = @RecipeID

    );

    GO

    Listing 2-15

    Create Inline Table-Valued Function

    ```


    The process to create an inline table-valued function is straightforward. There
    can be concerns about the impact functions have on performance. I can see how
    an inline table-valued function performs; I will need to run a query using this
    function so that we can see what happens in the execution plan. In Listing [2-16](#480547_1_En_2_Chapter.xhtml#PC16),
    there is the script that will be run to determine the effectiveness of an execution
    plan.


    ```

    SELECT * FROM dbo.IngredientsByRecipe (1);

    Listing 2-16

    Query to Call Inline Table-Valued Function

    ```


    I will show the execution plan generated from the code in Listing [2-16](#480547_1_En_2_Chapter.xhtml#PC16)
    as it was returned in SQL Server 2019. You can see the execution plan in Figure
    [2-6](#480547_1_En_2_Chapter.xhtml#Fig6).


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig6_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig6_HTML.jpg)


    Figure 2-6


    Inline Table-Valued Function Execution Plan


    As you can see, the function appears directly in the execution plan. The optimizer
    is aware of this inline table-valued function. While inline table-valued UDFs
    can be used like tables and can accept parameters, there are still limitations
    associated with using inline table-valued UDFs. These types of functions can only
    allow for one select statement and one result set. In addition, the data that
    is returned in these functions cannot be modified in the database. However, data
    returned from an inline table-valued UDF that is displayed in a select statement
    can be modified. This is a change to the data that is cosmetic and does not affect
    the data that is stored in the database.'
