    \ Server可以使用合并连接。创建Listing [7-7](#480547_1_En_7_Chapter.xhtml#PC7)中的主键将使两个表之间的数据以相同的方式排序。执行Listing\
    \ [7-8](#480547_1_En_7_Chapter.xhtml#PC8)中的查询时，返回的执行计划如图[7-28](#480547_1_En_7_Chapter.xhtml#Fig28)所示。\n\
    \n![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig28_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig28_HTML.jpg)\n\
    \n**Figure 7-28**  \n**Execution Plan Using Merge Join**\n\n图[7-28](#480547_1_En_7_Chapter.xhtml#Fig28)向我们展示了当存在不等式时，使用合并连接是可能的。然而，只有当表是有序的且存在不等式时，你才能在全外连接中看到合并连接。除了与逻辑连接相关的T-SQL连接外，SQL\
    \ Server还可以使用其他逻辑连接类型。\n\n另一种逻辑连接类型涉及SQL Server在两个表之间比较数据但不执行完整连接的情况。根据使用的T-SQL代码，这可以被称为半连接或反半连接。与左外连接和右外连接类似，SQL\
    \ Server在将半连接和反半连接匹配到物理连接运算符时存在一些相同的限制。在处理半连接或反半连接时，存在左或右的概念。这个左或右与比较的是哪一边有关。Listing\
    \ [7-9](#480547_1_En_7_Chapter.xhtml#PC9)查找所有不在ID为2的食谱中的食材。\n\n```sql\nSELECT\
    \ ing.IngredientName\nFROM dbo.Ingredient ing\nWHERE NOT EXISTS\n(\nSELECT *\n\
    FROM dbo.RecipeIngredient recing\nWHERE ing.IngredientID = recing.IngredientID\n\
    AND recing.RecipeID = 2\n)\n```\n**Listing 7-9**  \n**All Ingredients Except Those\
    \ in RecipeID 2**\n\n运行此查询时，`RecipeIngredient`中的数据按`RecipeID`排序，然后是`IngredientID`。如图[7-29](#480547_1_En_7_Chapter.xhtml#Fig29)所示，执行计划显示了一个左反半连接。\n\
    \n![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig29_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig29_HTML.jpg)\n\
    \n**Figure 7-29**  \n**Execution Plan with Left Semi Anti Join**\n\n这个反半连接是由于Listing\
    \ [7-9](#480547_1_En_7_Chapter.xhtml#PC9)查询中的`NOT EXISTS`导致的。在前面的场景中，SQL Server选择了左连接。由于`RecipeIngredient`表按`RecipeID`排序，然后是`IngredientID`，并且T-SQL代码只查看一个`RecipeID`，因此被评估的值是`IngredientID`，其排序方式与`Ingredient`表相同。这使得SQL\
    \ Server能够在此查询中使用合并连接。在Listing [7-10](#480547_1_En_7_Chapter.xhtml#PC10)的查询中，我寻找存在于特定食谱子集中的所有食材。\n\
    \n```sql\nSELECT ing.IngredientName\nFROM dbo.Ingredient ing\nWHERE EXISTS\n(\n\
    SELECT *\nFROM dbo.RecipeIngredient recing\nWHERE ing.IngredientID = recing.IngredientID\n\
    AND recing.RecipeID < 200\n)\n```\n**Listing 7-10**  \n**All Ingredients in All\
    \ Recipes up to RecipeID 200**\n\n如图[7-30](#480547_1_En_7_Chapter.xhtml#Fig30)所示的执行计划中，你可以看到一个右半连接。\n\
    \n![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig30_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig30_HTML.jpg)\n\
    \n**Figure 7-30**  \n**Execution Plan with Right Semi Join**\n\n使用`RIGHT SEMI\
    \ JOIN`是由于Listing [7-10](#480547_1_En_7_Chapter.xhtml#PC10)中的T-SQL代码使用了`EXISTS`。“右”的使用表明SQL\
    \ Server正在将`EXISTS`语句返回的结果与食材列表进行比较。虽然使用`EXISTS`或`NOT EXISTS`可能表明会使用半连接或反半连接，但这并不总是会发生。Listing\
    \ [7-11](#480547_1_En_7_Chapter.xhtml#PC11)是一个将返回ID为2的食谱的所有食材的查询。\n\n```sql\n\
    SELECT ing.IngredientName\nFROM dbo.Ingredient ing\nWHERE EXISTS\n(\nSELECT *\n\
    FROM dbo.RecipeIngredient recing\nWHERE ing.IngredientID = recing.IngredientID\n\
    AND recing.RecipeID = 2\n)\n```\n**Listing 7-11**  \n**All Ingredients in RecipeID\
    \ 2**\n\n图[7-31](#480547_1_En_7_Chapter.xhtml#Fig31)所示的执行计划展示了SQL Server决定如何执行此查询。\n\
