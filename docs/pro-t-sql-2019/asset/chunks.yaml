    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig11_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig11_HTML.jpg)


    Figure 2-11


    Execution Plan for Compatibility Mode 150


    The execution plan in Figure [2-11](#480547_1_En_2_Chapter.xhtml#Fig11) is different
    from either of the execution plans in Figure [2-7](#480547_1_En_2_Chapter.xhtml#Fig7)
    and Figure [2-9](#480547_1_En_2_Chapter.xhtml#Fig9). We can also see that the
