    \n**Figure 7-31**  \n**Execution Plan with No Semi Joins**\n\n对于这个执行，SQL Server决定将这个T-SQL转换为类似于内连接而不是半连接。这是因为SQL\
    \ Server计算出这将提供所有评估方案中最佳的执行计划。\n\n有一些方法可以组合数据，这些方法涉及比较两个数据集之间的值并选择匹配或不匹配的项目。还存在将整个数据集作为逻辑连接类型的一部分进行组合的可能性。这可能包括在你的T-SQL代码中使用`UNION`或`UNION\
    \ ALL`。Listing [7-12](#480547_1_En_7_Chapter.xhtml#PC12)所示的查询展示了在两个表之间使用`UNION`。\n\
    \n```sql\nSELECT ing.IngredientName\nFROM dbo.Ingredient ing\nWHERE ing.IngredientName\
    \ LIKE 'Tomato%'\nUNION\nSELECT ing.IngredientName\nFROM dbo.Ingredient ing\n\
    WHERE ing.IngredientName = 'Tomato'\n```\n**Listing 7-12**  \n**All Ingredients\
    \ with Tomato**\n\n在此查询中，将以\"Tomato\"开头或等于\"Tomato\"的食材列表将被返回。当此查询在SQL Server中执行时，返回的执行计划如图[7-32](#480547_1_En_7_Chapter.xhtml#Fig32)所示。\n\
    \n![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig32_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig32_HTML.jpg)\n\
    \n**Figure 7-32**  \n**Execution Plan with Concatenation**\n\n对于这个查询，SQL Server并没有像本章其他示例那样连接数据。相反，只有一个操作符，`Concatenation`，它指示了SQL\
    \ Server如何组合这些数据。"
  raw: '```

    SELECT TOP 500 rec.RecipeName

    FROM dbo.Recipe rec

    FULL OUTER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID  recing.RecipeID

    Listing 7-8

    Full Outer Join with Inequality

    ```


    If I re-create the primary key referenced in Listing [7-5](#480547_1_En_7_Chapter.xhtml#PC5),
    the data between the two tables will be sorted differently. Due to the amount
    of data that will be compared between the two tables, I decided to limit the result
    to the first 500 records. After running this query, I get the execution plan returned
    in Figure [7-27](#480547_1_En_7_Chapter.xhtml#Fig27).


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig27_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig27_HTML.jpg)


    Figure 7-27


    Execution Plan Using Nested Loop


    Now that the only join in the T-SQL code is an inequality, SQL Server uses a Nested
    Loop physical join. Almost every query where there are no joins that are equal
    must use a Nested Loop except one specific scenario. If the data being compared
    is sorted and there is an inequality, SQL Server can use a Merge Join. Creating
    the primary key from Listing [7-7](#480547_1_En_7_Chapter.xhtml#PC7) will order
    the data the same between the two tables. The execution plan in Figure [7-28](#480547_1_En_7_Chapter.xhtml#Fig28)
    is returned when executing the query from Listing [7-8](#480547_1_En_7_Chapter.xhtml#PC8).


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig28_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig28_HTML.jpg)


    Figure 7-28


    Execution Plan Using Merge Join


    Figure [7-28](#480547_1_En_7_Chapter.xhtml#Fig28) shows us that it is possible
    to have a Merge Join when there is an inequality. However, only when the tables
    are sorted and there is an inequality is where you can see a Merge Join with a
    FULL OUTER JOIN. In addition to T-SQL joins that relate to logical joins, there
    are other logical join types that SQL Server can use.


    Another logical join type involves situations where SQL Server compares data between
    two tables but without doing a full join between the tables. Depending on the
    T-SQL code used, this can be referred to as a SEMI JOIN or an ANTI SEMI JOIN.
    Like the LEFT OUTER JOIN and RIGHT OUTER JOIN, SQL Server has some of the same
    limitations matching the SEMI JOIN and ANTI SEMI JOIN to physical join operators.
    When working with either a SEMI JOIN or an ANTI SEMI JOIN, there is a concept
    of left or right. This left or right has to do with which side is being compared.
    Listing [7-9](#480547_1_En_7_Chapter.xhtml#PC9) finds all ingredients that are
    not in the recipe with an ID of 2.


    ```

    SELECT ing.IngredientName

    FROM dbo.Ingredient ing

    WHERE NOT EXISTS

    (

    SELECT *

    FROM dbo.RecipeIngredient recing

    WHERE ing.IngredientID = recing.IngredientID

    AND recing.RecipeID = 2

    )

    Listing 7-9

    All Ingredients Except Those in RecipeID 2

    ```


    When this query was run, the data in RecipeIngredient was sorted by RecipeID,
    then IngredientID. In Figure [7-29](#480547_1_En_7_Chapter.xhtml#Fig29), the execution
    plan shows a LEFT ANTI SEMI JOIN.


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig29_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig29_HTML.jpg)


    Figure 7-29


    Execution Plan with Left Semi Anti Join


    The semi anti join is due to the NOT EXISTS in the query from Listing [7-9](#480547_1_En_7_Chapter.xhtml#PC9).
    In the preceding scenario, SQL Server has chosen a left join. Since the table
    RecipeIngredient is ordered by RecipeID and then IngredientID and the T-SQL code
    is only looking at one RecipeID, the values evaluated are IngredientIDs that are
    ordered in the same way as the Ingredient table. This is what allows SQL Server
    to use a Merge Join for this query. In the query in Listing [7-10](#480547_1_En_7_Chapter.xhtml#PC10),
    I am looking for all ingredients that exist in a certain subset of recipes.


    ```

    SELECT ing.IngredientName

    FROM dbo.Ingredient ing

    WHERE EXISTS

    (

    SELECT *

    FROM dbo.RecipeIngredient recing

    WHERE ing.IngredientID = recing.IngredientID

    AND recing.RecipeID < 200

    )

    Listing 7-10

    All Ingredients in All Recipes up to RecipeID 200

    ```


    As shown in execution plan in Figure [7-30](#480547_1_En_7_Chapter.xhtml#Fig30),
    you can see a RIGHT SEMI JOIN.


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig30_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig30_HTML.jpg)


    Figure 7-30


    Execution Plan with Right Semi Join


    The use of the RIGHT SEMI JOIN is due to the EXISTS in the T-SQL from Listing
    [7-10](#480547_1_En_7_Chapter.xhtml#PC10). The use of right is stating the SQL
    Server is evaluating the results returned from the EXISTS statement to the list
    of ingredients. While the use of EXISTS or NOT EXISTS can indicate that there
    will be a SEMI JOIN or an ANTI SEMI join, that may not always be what happens.
    Listing [7-11](#480547_1_En_7_Chapter.xhtml#PC11) is a query that will return
    all ingredients that exist for the recipe with an ID of 2.


    ```

    SELECT ing.IngredientName

    FROM dbo.Ingredient ing

    WHERE EXISTS

    (

    SELECT *

    FROM dbo.RecipeIngredient recing

    WHERE ing.IngredientID = recing.IngredientID

    AND recing.RecipeID = 2

    )

    Listing 7-11

    All Ingredients in RecipeID 2

    ```


    The execution plan in Figure [7-31](#480547_1_En_7_Chapter.xhtml#Fig31) shows
    how SQL Server has determined to execute this query.


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig31_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig31_HTML.jpg)


    Figure 7-31


    Execution Plan with No Semi Joins


    For this execution, SQL Server has decided to convert this T-SQL to act like an
    INNER JOIN instead of a SEMI JOIN. This is because SQL Server has calculated that
    this will give the best execution out of those evaluated.


    There are ways to combine data that consist of comparing values between two data
    sets and selecting items that match or do not match between them. There is also
    the possibility of combining entire data sets as part of the logical join types.
    This can include the use of UNION or UNION ALL in your T-SQL code. The query shown
    in Listing [7-12](#480547_1_En_7_Chapter.xhtml#PC12) shows the use of a UNION
    between the two tables.


    ```

    SELECT ing.IngredientName

    FROM dbo.Ingredient ing

    WHERE ing.IngredientName LIKE ''Tomato%''

    UNION

    SELECT ing.IngredientName

    FROM dbo.Ingredient ing

    WHERE ing.IngredientName = ''Tomato''

    Listing 7-12

    All Ingredients with Tomato

    ```


    In this query, the list of ingredients that begin with tomato or the ingredient
    are equal to tomato will be returned. When this query is executed in the SQL Server,
    the execution plan in Figure [7-32](#480547_1_En_7_Chapter.xhtml#Fig32) is returned.


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig32_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig32_HTML.jpg)


    Figure 7-32


    Execution Plan with Concatenation


    In the case of this query, SQL Server is not joining the data together as it has
    in the other examples from this chapter. Instead, there is only one operator,
    Concatenation, that indicates how SQL Server is combining this data.'
  trans: "\n# SQL 连接类型与执行计划\n\n```sql\nSELECT TOP 500 rec.RecipeName\nFROM dbo.Recipe\
    \ rec\nFULL OUTER JOIN dbo.RecipeIngredient recing\nON rec.RecipeID  recing.RecipeID\n\
    ```\n**代码清单 7-8**  \n**使用不等式的全外连接**\n\n如果我重新创建在代码清单 7-5 中引用的主键，两个表之间的数据将以不同的方式排序。由于需要在两个表之间比较的数据量很大，我决定将结果限制为前\
    \ 500 条记录。运行此查询后，我得到了如图 7-27 所示的执行计划。\n\n![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig27_HTML.jpg](img/480547_1_En_7_Fig27_HTML.jpg)\n\
    \n**图 7-27**  \n**使用嵌套循环的执行计划**\n\n由于 T-SQL 代码中唯一的连接是一个不等式，SQL Server 使用了嵌套循环物理连接。几乎没有连接是等值连接的查询几乎都必须使用嵌套循环，除非是一种特定情况。如果被比较的数据是有序的并且存在不等式，SQL\
    \ Server 可以使用合并连接。创建代码清单 7-7 中的主键将使两个表之间的数据以相同的方式排序。执行代码清单 7-8 中的查询时，返回的执行计划如图\
    \ 7-28 所示。\n\n![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig28_HTML.jpg](img/480547_1_En_7_Fig28_HTML.jpg)\n\
    \n**图 7-28**  \n**使用合并连接的执行计划**\n\n图 7-28 向我们展示了当存在不等式时，使用合并连接是可能的。然而，只有当表是有序的且存在不等式时，你才能在全外连接中看到合并连接。除了与逻辑连接相关的\
    \ T-SQL 连接外，SQL Server 还可以使用其他逻辑连接类型。\n\n另一种逻辑连接类型涉及 SQL Server 在两个表之间比较数据但不执行完整连接的情况。根据使用的\
    \ T-SQL 代码，这可以被称为半连接或反半连接。与左外连接和右外连接类似，SQL Server 在将半连接和反半连接匹配到物理连接运算符时存在一些相同的限制。在处理半连接或反半连接时，存在左或右的概念。这个左或右与比较的是哪一边有关。代码清单\
    \ 7-9 查找所有不在 ID 为 2 的食谱中的食材。\n\n```sql\nSELECT ing.IngredientName\nFROM dbo.Ingredient\
    \ ing\nWHERE NOT EXISTS\n(\nSELECT *\nFROM dbo.RecipeIngredient recing\nWHERE\
    \ ing.IngredientID = recing.IngredientID\nAND recing.RecipeID = 2\n)\n```\n**代码清单\
    \ 7-9**  \n**除 RecipeID 为 2 的食谱中所有食材外的所有食材**\n\n运行此查询时，`RecipeIngredient`中的数据按`RecipeID`排序，然后是`IngredientID`。如图\
    \ 7-29 所示，执行计划显示了一个左反半连接。\n\n![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig29_HTML.jpg](img/480547_1_En_7_Fig29_HTML.jpg)\n\
    \n**图 7-29**  \n**包含左反半连接的执行计划**\n\n这个反半连接是由于代码清单 7-9 查询中的`NOT EXISTS`导致的。在前面的场景中，SQL\
    \ Server 选择了左连接。由于`RecipeIngredient`表按`RecipeID`排序，然后是`IngredientID`，并且 T-SQL\
    \ 代码只查看一个`RecipeID`，因此被评估的值是`IngredientID`，其排序方式与`Ingredient`表相同。这使得 SQL Server\
    \ 能够在此查询中使用合并连接。在代码清单 7-10 的查询中，我寻找存在于特定食谱子集中的所有食材。\n\n```sql\nSELECT ing.IngredientName\n\
    FROM dbo.Ingredient ing\nWHERE EXISTS\n(\nSELECT *\nFROM dbo.RecipeIngredient\
    \ recing\nWHERE ing.IngredientID = recing.IngredientID\nAND recing.RecipeID <\
    \ 200\n)\n```\n**代码清单 7-10**  \n**所有 RecipeID 小于 200 的食谱中的所有食材**\n\n如图 7-30 所示的执行计划中，你可以看到一个右半连接。\n\
    \n![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig30_HTML.jpg](img/480547_1_En_7_Fig30_HTML.jpg)\n\
    \n**图 7-30**  \n**包含右半连接的执行计划**\n\n使用`RIGHT SEMI JOIN`是由于代码清单 7-10 中的 T-SQL 代码使用了`EXISTS`。“右”的使用表明\
    \ SQL Server 正在将`EXISTS`语句返回的结果与食材列表进行比较。虽然使用`EXISTS`或`NOT EXISTS`可能表明会使用半连接或反半连接，但这并不总是会发生。代码清单\
    \ 7-11 是一个将返回 ID 为 2 的食谱的所有食材的查询。\n\n```sql\nSELECT ing.IngredientName\nFROM dbo.Ingredient\
    \ ing\nWHERE EXISTS\n(\nSELECT *\nFROM dbo.RecipeIngredient recing\nWHERE ing.IngredientID\
    \ = recing.IngredientID\nAND recing.RecipeID = 2\n)\n```\n**代码清单 7-11**  \n**RecipeID\
    \ 为 2 的食谱中的所有食材**\n\n图 7-31 所示的执行计划展示了 SQL Server 决定如何执行此查询。\n\n![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig31_HTML.jpg](img/480547_1_En_7_Fig31_HTML.jpg)\n\
    \n**图 7-31**  \n**不含半连接的执行计划**\n\n对于这个执行，SQL Server 决定将这个 T-SQL 转换为类似于内连接而不是半连接。这是因为\
    \ SQL Server 计算出这将提供所有评估方案中最佳的执行计划。\n\n有一些方法可以组合数据，这些方法涉及比较两个数据集之间的值并选择匹配或不匹配的项目。还存在将整个数据集作为逻辑连接类型的一部分进行组合的可能性。这可能包括在你的\
    \ T-SQL 代码中使用`UNION`或`UNION ALL`。代码清单 7-12 所示的查询展示了在两个表之间使用`UNION`。\n\n```sql\n\
    SELECT ing.IngredientName\nFROM dbo.Ingredient ing\nWHERE ing.IngredientName LIKE\
    \ 'Tomato%'\nUNION\nSELECT ing.IngredientName\nFROM dbo.Ingredient ing\nWHERE\
    \ ing.IngredientName = 'Tomato'\n```\n**代码清单 7-12**  \n**所有包含“Tomato”的食材**\n\n\
    在此查询中，将以\"Tomato\"开头或等于\"Tomato\"的食材列表将被返回。当此查询在 SQL Server 中执行时，返回的执行计划如图 7-32\
    \ 所示。\n\n![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig32_HTML.jpg](img/480547_1_En_7_Fig32_HTML.jpg)\n\
    \n**图 7-32**  \n**包含串联操作的执行计划**\n\n对于这个查询，SQL Server 并没有像本章其他示例那样连接数据。相反，只有一个操作符，`Concatenation`，它指示了\
    \ SQL Server 如何组合这些数据。\n"
- fmt: '# 7. Understanding Execution Plans


    Overall, the goal is to use the physical join that is the most effective for the
    data that is being joined. `Merge Joins` can perform very well, but they are limited
    to data that has been ordered by indexes or `ORDER BY` or `GROUP BY` statements.
    As expected, `Index Merge Joins` will perform even better than `Merge Joins` that
    do not use an index. When data is not sorted and particularly if one of the two
    sides of the data being joined is small, SQL Server may use a `Nested Loop`. You
    will want to confirm that the cost of looping through the other table does not
    incur a significant cost. Just as a `Merge Join` using an index performs better
    than a `Merge Join` without an index, the same is true for a `Nested Loop`. For
    both a `Merge Join` and `Nested Loop`, see if you can alter your T-SQL code to
    use an index. This does not mean creating an index if one does not exist; instead,
    you can check the indexes on the table and see if any will apply for your specific
    query. If the tables are not sorted and particularly if the numbers of records
    being joined on either side are both large, the `Hash Match` can be the ideal
    solution.


    Throughout this chapter, we have gone over various aspects of working with execution
    plans. We started with some of the ways you can access and view execution plans.
    We also discussed how `estimated execution plans`, `actual execution plans`, and
    executions in the `plan cache` differed. When looking at execution plans, there
    are some items such as `arrow sizes`, `estimated number of rows`, and `actual
    number of rows` that can give you some hints regarding the next steps you can
    take to improve the performance on your T-SQL code. After looking into these items,
    you may also be able to check how the execution is using `indexes`. It is helpful
    to not only focus on what `indexes` are being used but how SQL Server is searching
    through those `indexes`. When joining tables, you will use T-SQL code that can
    reference certain logical join type behavior. These logical join types can affect
    what types of physical join types will be used as part of the execution plan.
    By writing your T-SQL code differently, you may be able to impact the execution
    plan generated by SQL Server. Using all the information covered in this chapter
    should help you get more comfortable with reviewing your T-SQL code and improving
    the speed and hardware usage associated with your T-SQL.


    # 8. Optimize T-SQL


    In this part of the book, I have gone over many aspects of writing T-SQL code.
    I started with going over the use of `set-based design` in queries. When designing
    queries, it will also be important to design queries that use hardware effectively.
    One way that you can check the performance of your queries is using `execution
    plans`. Once you have an `execution plan` of a query you are wanting to improve,
    you can start focusing on how to optimize the query. There are some options available
    when it comes to optimizing T-SQL.


    You have many options available to you when you start working on `performance
    tuning` your queries. In the past, one option you would have would be to manually
    identify poorly performing queries and improve them. When identifying queries
    that need to be optimized, there are many different factors that you can take
    into consideration. Starting in `SQL Server 2017`, additional functionality has
    been added that allows SQL Server to automatically improve the performance of
    certain aspects of executing T-SQL. With `SQL Server 2019`, there have been even
    more enhancements to help queries run better and faster without changing the underlying
    T-SQL code.


    ## Optimizing Logical Reads


    I have seen T-SQL code that appears to run well. The code executes in a timely
    fashion and returns the correct results. When you look at one of your SQL Server
    monitoring tools, you may notice some unexpected behavior that indicates there
    is a performance issue on your system. In some cases, you may find queries that
    are reading pages from memory that are not included in the result set. Reading
    the data pages can be identified as `logical reads`. You will want to look at
    the `execution plan` for the T-SQL code to figure out what could be causing this
    discrepancy. This does not only involve looking at what T-SQL code is executing
    but also trying to determine what can be done to improve performance.


    The advantage of optimizing this query to use less reads is that this should decrease
    the number of data pages that are read into memory as part of this query execution.
    Put another way, the downside of reading more data than is needed for the query
    result is that pages that are used more frequently by the applications may be
    cleared from memory too soon. Unfortunately, we often are only aware of performance
    issues when we find out that an application is running slowly or an application
    is crashing. At these times, it can be difficult to diagnose the specific query
    causing issues. If you do not have access to monitoring software, this situation
    can become even more difficult to troubleshoot. When I first started investigating
    performance issues, I would check `SQL Server Agent`''s job history. Sometimes
    you will find a process running at the same time as the Production issue. While
    this does not confirm that the `SQL Server Agent` job is the cause, it may be
    worth investigating.


    For these situations, it would be preferable to know the exact stored procedure
    or prepared statement that is causing performance issues. Aside from third-party
    software, `Query Store` or `extended events` that were previously set up, you
    may have very few options available. In addition, I would rather identify queries
    that may cause performance issues before there is an outage. If I do not have
    access to third-party tools, I will use `DMVs` to try and find queries before
    they become an issue. I will often use any combination of the preceding actions
    with `Performance Monitor` to help track SQL Server over time and confirm if my
    performance tuning is effective.


    If you do not have third-party tools or you want to get more familiar with `DMVs`
    to find T-SQL that needs performance tuning, you can query `sys.dm_exec_query_stats`.
    This `DMV` tracks statistics about T-SQL code that is executed and is still part
    of the `plan cache`. This will only return results for queries that have not been
    cleared out of the `plan cache`. If you believe that this `DMV` is missing some
    stored procedures that you would expect to see, you may want to do some research
    on your `plan cache` and determine if the cache is getting filled with `ad hoc
    queries`. You will need to join this data to `sys.dm_exec_sql_text` to find the
    T-SQL code associated with the statistics.


    When trying to find queries with high `logical reads`, you will want to look at
    T-SQL code based on various criteria. Looking at the average `logical reads` is
    usually my main target when looking for queries to performance tune. I prefer
    this metric as it often identifies T-SQL code that runs frequently on the server
    and probably has more reads than I would expect. If there is a process that runs
    frequently on the server, I would not expect the average number of reads to be
    very high as a frequent process would imply the T-SQL code is directly related
    to an application. There are also some queries that do not run very often but
    use a high number of `logical reads` when they do run. In my experience, if the
    total `logical reads` are high and the overall execution count is low, I will
    prioritize these queries below T-SQL code that has a higher average `logical read`
    value and a high number of executions.'
