  trans: '

    利用数据集来更新多条记录，其潜力远不止于此。我曾遇到许多需要更新成百上千条记录的情况。虽然我可以编写查询来逐条识别记录，然后手动提取那些 ID 来逐个或分批更新所有记录，但确实存在更简便的方法来更新这些多条记录，并最大限度地减少因人工干预导致错误的风险。清单
    5-10 中的查询展示了如何在联接表的同时更新数据。


    ```sql

    UPDATE ing

    SET ing.DateModified = GETDATE()

    FROM dbo.Ingredient ing

    INNER JOIN dbo.RecipeIngredient recing

    ON ing.IngredientID = recing.IngredientID

    INNER JOIN dbo.Recipe rec

    ON recing.RecipeID = rec.RecipeID

    WHERE rec.RecipeName = ''Spaghetti''

    ```

    清单 5-10：通过联接创建数据集来更新数据


    在更新操作中使用联接时，我建议你先确认将要更新的是哪些数据。这可以通过将`UPDATE`语句转换为`SELECT`语句来实现，如清单 5-11 所示。


    ```sql

    SELECT ing.IngredientID,

    ing.IngredientName,

    ing.IsActive,

    ing.DateCreated,

    ing.DateModified

    FROM dbo.Ingredient ing

    INNER JOIN dbo.RecipeIngredient recing

    ON ing.IngredientID = recing.IngredientID

    INNER JOIN dbo.Recipe rec

    ON recing.RecipeID = rec.RecipeID

    WHERE rec.RecipeName = ''Spaghetti''

    ```

    清单 5-11：使用`SELECT`语句验证数据集


    你可以检查这些记录并确认记录数量。在执行更新操作之前，我建议将`UPDATE`语句包裹在`BEGIN TRAN… ROLLBACK`中，以验证记录数量。


    就像处理更新一样，在删除数据时，你也可以使用数据集。我发现，使用数据集来删除数据可以显著提高效率，但如果在删除前未验证数据，也可能存在一定风险。


    编写 T-SQL 代码时，最大的诱惑之一就是不利用数据集。这通常是因为编写过程式代码让人更得心应手，或者尚未培养出以数据集方式思考的能力。在接下来的部分中，我的目标是引导你通过各种方法来编写充分利用数据集的代码。


    # 6. 硬件使用


    在考虑如何设计查询时，我已经介绍了基于集合设计的要素。在使用 SQL Server 时，还有其他需要考虑的事项。你所面对的是一个超越其各组成部分的系统。SQL
    Server 涉及诸多方面：存储的数据、访问数据的方式，以及如何访问数据的处理过程。SQL Server 不仅是软件，还涉及该软件如何与你的计算机或服务器的硬件进行交互。


    当谈到硬件使用时，SQL Server 会利用几个不同的部分。其中一些可能看起来很直接，而另一些起初可能会令人惊讶。SQL Server 被称为关系数据库管理系统（`RDBMS`）。作为关系数据库管理系统的一部分，SQL
    Server 的目标是实现高效的数据存储和检索。这意味着，运行 SQL Server 的系统上，最重要的硬件之一是内存。当谈到数据的长期存储时，硬盘驱动器变得最为关键。在本章中，我们将这些称为“存储”，因为存储不仅限于硬盘。然而，还有一些不太明显的要素，比如`CPU`。


    ## T-SQL 设计中的内存考量


    当你刚开始在 SQL Server 中处理数据时，内存是最重要的因素之一可能会让你感到惊讶。这很大程度上与内存在 SQL Server 中的用途有关。原因之一是内存的速度和多功能性。另一个因素与内存成本与存储成本的对比有关。这种成本差异增加了有效使用内存的重要性。内存中存储着许多不同类型的事物。SQL
    Server 用于访问满足查询条件所需数据的过程，会以“执行计划”的形式保存在内存中。为查询结果检索到的数据也存储在内存中。你还可以让数据库对象存在于内存中，例如表变量或临时表。


    首先，让我解释一下为什么在处理 SQL Server 时内存如此重要。你经常听到`OLTP`（联机事务处理）这个术语。它的真正含义是你希望系统能够执行高容量的写入和更新活动。这些正是应用程序中频繁发生的活动类型。在提到写入和更新活动时，以食谱数据库为例，每次访问食谱、对食谱进行的每一项更改，或向系统添加的每一种新食材，都属于此类活动。


    虽然系统中存储着大量的数据，但通常人们只想处理其中非常小的一部分子集。技巧在于试图确定哪些数据应该保持随时可用。这将提高添加新条目、更新现有条目或访问已有条目的速度。这正是对硬件有更深入了解能帮助你的地方。


    我们最常想到的内存是服务器或机器上可用的`RAM`。然而，还有其他类型的内存存在。甚至比`RAM`更接近`CPU`且速度更快的是`L2 缓存`和`L3 缓存`。`L2`和`L3
    缓存`存在于处理器上，其延迟比`RAM`更低。这种延迟可能比`RAM`低十倍。然而，SQL Server 可用的`L2 缓存`或`L3 缓存`容量，通常远小于你的应用程序有效运行所需的数据量。`L2
    缓存`的延迟可能只有`L3 缓存`的一半，但速度的优势是以缓存大小为代价的。`L2 缓存`通常以数百 KB 为单位衡量，而`L3 缓存`通常以数十 MB 为单位。我们如何才能尽可能快速且经济高效地访问数据？这正是正确使用内存的卓越之处。


    SQL Server 的设计旨在利用内存。有一个称为“缓存”的过程将信息保留在内存中。在 SQL Server 中，有两种类型的缓存非常重要。第一种与缓存“执行计划”有关。这是
    SQL Server 保存如何在未来再次执行某个存储过程或即席查询的指令的地方。其目标是利用 SQL Server 在计算执行特定查询的最佳方式时已经获得的知识。第二种与查询设计相关的缓存形式可能更为重要。它与信息如何存储在内存中有关。这被称为“缓冲池”。

    '
- fmt: "# SQL Server 中的内存管理：计划缓存与缓冲池\n\n虽然执行计划和数据都可以保存在缓存中，但 SQL Server 会执行特定计算来决定为计划缓存或缓冲池分配多少内存。此外，还有复杂的计算用于确定在计划缓存或缓冲池中保留某项内容多长时间。其真正目标是确保不常访问的存储过程或查询从计划缓存中删除，从而不占用不必要的空间。同样地，对于缓冲池，目标是仅保留应用程序正在积极使用的数据，并清除应用程序不再需要的数据。在这两种情况下，项目只有在缓存已满且需要为新的执行计划或数据腾出空间时才会被清除。SQL\
    \ Server 2014 引入了缓冲池扩展功能，提供了另一种解决方案。缓冲池扩展允许您将缓冲池扩展到使用 RAM 和固态硬盘（SSD）。考虑到 SSD 比购买额外的\
    \ RAM 更具成本效益，这有助于解决 I/O 瓶颈问题。\n\n## 计划缓存的特定考量\n\n谈到计划缓存，需要记住一些特定的考量。默认情况下，SQL\
    \ Server 针对存储过程和预处理语句进行了优化。这种对存储过程的优化也是使用计划缓存时的一个因素。在理想情况下，您的计划缓存中应有大量存储过程，而即席查询很少。然而，这并非对每个业务都适用。您的公司可能使用\
    \ ORM 或其他技术（如 LINQ）在应用程序代码中编写即席查询。虽然这对开发人员来说很方便，但它们给 SQL Server 带来了额外成本。如果这些查询没有转换为预处理语句，情况可能尤其如此。\n\
    \n可能发生的情况是，计划缓存会被即席查询填满。这可能导致应用程序更急需的存储过程从计划缓存中被删除。如果有存储过程因应用程序而从计划缓存中被删除，那么当下次调用该存储过程时，SQL\
    \ Server 将需要重新计算其执行计划。这将给系统带来额外成本。有各种方法可以处理计划缓存中存在大量即席查询的情况。然而，这超出了本书的范围。\n\n\
    ## 缓冲池与数据保留\n\n我在与 SQL Server 交互时遇到的另一个问题与缓冲池以及其中保存的数据有关。我不止一次听说，在处理非常大的表时，您将总是陷入必须处理访问大量数据的困境。如果表设计、索引、查询或上述任何组合未得到优化，这种情况确实可能发生。然而，有方法可以防止它。\n\
    \n## 编写高效查询\n\n使用内存和 SQL Server 时需要考虑的主要方面是，当您编写查询时，这些查询将返回正确的结果并在应用程序可接受的时间内完成。然而，根据整体表设计或查询的编写方式，这些查询访问的数据量可能远远超出必要。乍看之下，这可能不是一个重大问题。当数据表是新的且没有填满数据时，通常不会出现问题。清单\
    \ [6-1](#480547_1_En_6_Chapter.xhtml#PC1) 中的查询用于返回应用程序中的一些数据。\n\n```sql\nSELECT\
    \ rec.RecipeName,\n       rec.RecipeDescription,\n       rec.ServingQuantity,\n\
    \       ing.IngredientName,\n       ml.MealTypeName,\n       ml.MealTypeDescription,\n\
    \       prp.PreparationTypeName,\n       prp.PreparationTypeDescription\nFROM\
    \ dbo.Recipe rec\nINNER JOIN dbo.RecipeIngredient recing\n    ON rec.RecipeID\
    \ = recing.RecipeID\nINNER JOIN dbo.Ingredient ing\n    ON recing.IngredientID\
    \ = ing.IngredientID\nINNER JOIN dbo.MealType ml\n    ON rec.MealTypeID = ml.MealTypeID\n\
    INNER JOIN dbo.PreparationType prp\n    ON rec.PreparationTypeID = prp.PreparationTypeID\n\
    WHERE ing.IngredientName LIKE 'Tom%'\n  AND ing.IsActive = 1\n-- 清单 6-1\n-- 获取食谱成分的查询\n\
    ```\n\n当表是新的且数据不多时，您将看到如表 [6-1](#480547_1_En_6_Chapter.xhtml#Tab1) 所示的逻辑读取。\n\n\
    **表 6-1 数据表较小时的逻辑读取**\n\n| 食谱数量 | 成分数量 | 食谱成分数量 | 返回记录数 | 逻辑读取数 |\n| :--- | :---\
    \ | :--- | :--- | :--- |\n| 32,242 | 4 | 3 | 4 | 351 |\n\n351 的逻辑读取数指的是为了执行此查询而读取的数据页数。随着表的增长，SQL\
    \ Server 必须筛选越来越多的数据，您可能会开始看到与此行为相关的显著性能影响。当这种情况发生时，逻辑读取数可能会显著增加，如表 [6-2](#480547_1_En_6_Chapter.xhtml#Tab2)\
    \ 所示。\n\n**表 6-2 数据表较大时的逻辑读取**\n\n| 食谱数量 | 成分数量 | 食谱成分数量 | 返回记录数 | 逻辑读取数 |\n|\
    \ :--- | :--- | :--- | :--- | :--- |\n| 32,242 | 263,010 | 3,040,002 | 196 | 7858\
    \ |\n\n如您所见，一个最初表现良好的查询，在应用程序成熟并获取更多数据后，可能会开始出现性能问题。\n\n## 性能影响与指标\n\n在这些情况下，应用程序经常访问的数据可能正从缓冲池中被清除。当有存储过程运行且必须筛选大量数据时，通过查看与查询关联的逻辑读取数通常可以看出这一点。您可能正在处理一个只返回五个结果的查询；然而，它必须经过\
    \ 200 万次逻辑读取才能返回结果。这是一个信号，表明您可能正在使用比预期更多的缓冲池。\n\n这种行为可能导致缓冲池中的大量数据被清除。SQL Server\
    \ 中有一个称为**页面寿命预期**的值，它显示数据页在缓冲池中停留的平均时间。我已开始使用页面寿命预期作为指标，表明有些查询可能在 SQL Server\
    \ 中读取的数据量远多于结果集中返回的数据量。这可能导致这些查询使用比查询所需更多的内存。通常，当我处理与应用程序相关的查询时，它们通常一次不涉及超过十条记录。如果查询用于某种形式的报告，通常一次也不超过几千条记录。即使我得到的结果是查看\
    \ 20 万条记录，我仍然不希望为了获得这些结果而处理数千万次逻辑读取。\n\n## 优化建议\n\n真正的关键是尝试限制 SQL Server 必须处理的数据量。在编写查询时，这可以通过连接逻辑或\
    \ `WHERE` 子句条件来处理。您要确保访问尽可能少的数据。访问所需最少的数据量可以让您在使用 T-SQL 时最小化内存使用。前面在清单 [6-1](#480547_1_En_6_Chapter.xhtml#PC1)\
    \ 中引用的查询用于返回一些数据。然而，此查询中包含了一些不需要的额外列和连接。我可以更新查询以移除这些额外的列，如清单 [6-2](#480547_1_En_6_Chapter.xhtml#PC2)\
    \ 所示。"
  raw: 'While both the execution plan and the data can be saved in cache, there are
    certain calculations performed by SQL Server to determine how much should be allocated
    in memory to either the plan cache or the buffer pool. In addition, there are
    complex calculations that are used to determine how long to keep something in
    the plan cache or the buffer pool. The real goal is to make certain that stored
    procedures or queries that are not frequently accessed are dropped from the plan
    cache, so they do not take up unnecessary space. In the same way, when it comes
    to the buffer pool, the goal is to only keep data in the buffer pool that is being
    actively used and to clear out data that is no longer needed by the application.
    In both scenarios, items are not cleared from cache until the cache is full and
    space is needed for new execution plans or data. Another solution is available
    in SQL Server 2014 with the introduction of buffer pool extensions. The buffer
    pool extension allows you to extend the buffer pool to use RAM and solid state
    drive (SSDs). Considering that SSDs can be more cost-effective than purchasing
    additional RAM, this can help with I/O bottlenecks.


    When it comes to the plan cache, there are some specific considerations that need
    to be remembered. By default, SQL Server is optimized to deal with stored procedures
    and prepared statements. This optimization for stored procedures is also a factor
    when using the plan cache. In a perfect world, your plan cache would have a significant
    amount of stored procedures in the cache and very few ad hoc queries. However,
    this is not always the case for every business. Your company may use ORM or other
    technologies like LINQ to write ad hoc queries inside application code. While
    these are convenient for the developers to write, they put an additional cost
    on SQL Server. This can be especially true if those queries are not converted
    into prepared statements.


    What can happen is the plan cache can get full of ad hoc queries. This can cause
    stored procedures that are more critically needed by the application to be dropped
    from the plan cache. If there are stored procedures that are dropped out of the
    plan cache by the application, then when the stored procedure is called the next
    time, SQL Server will need to recalculate its execution plan. This will require
    an additional cost on the system. There are various ways to handle situations
    where there are a high number of ad hoc queries in your plan cache. However, that
    is outside the scope of this book.


    One of the other issues I have seen when interacting with SQL Server has to do
    with the buffer pool and the data that is being held in the buffer pool. I have
    heard more than once that when dealing with very large tables, you will always
    be stuck having to deal with accessing large quantities of data. This can be true
    that when the table design, the indexes, the queries, or any combination of the
    preceding is not optimized, then this exact scenario can happen. However, there
    are ways to prevent this.


    The main aspect to consider when working with memory and with SQL Server is when
    you write queries those queries will return the correct results and complete in
    an acceptable amount of time for your applications. However, depending on the
    overall table design or how the queries are written, these queries may be accessing
    far greater amounts of data than is necessary. This may not seem like a significant
    issue at first. It typically will not be an issue when the data tables are new
    and not full of data. The query in Listing [6-1](#480547_1_En_6_Chapter.xhtml#PC1)
    is a query used to return some data in the application.


    ```

    SELECT rec.RecipeName,

    rec.RecipeDescription,

    rec.ServingQuantity,

    ing.IngredientName,

    ml.MealTypeName,

    ml.MealTypeDescription,

    prp.PreparationTypeName,

    prp.PreparationTypeDescription

    FROM dbo.Recipe rec

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    INNER JOIN dbo.MealType ml

    ON rec.MealTypeID = ml.MealTypeID

    INNER JOIN dbo.PreparationType prp

    ON rec.PreparationTypeID = prp.PreparationTypeID

    WHERE ing.IngredientName LIKE ''Tom%''

    AND ing.IsActive = 1

    Listing 6-1

    Query to Get Recipe Ingredients

    ```


    When the tables are new and there is not much data, you will see logical reads
    as shown in Table [6-1](#480547_1_En_6_Chapter.xhtml#Tab1).


    Table 6-1


    Logical Reads when Data Table Is Small


    | Number of Recipes | Number of Ingredients | Number of Recipe Ingredients | Records
    Returned | Logical Reads |

    | --- | --- | --- | --- | --- |

    | 32,242 | 4 | 3 | 4 | 351 |


    The logical reads of 351 refers to the number of data pages read in order to execute
    this query. As your tables grow SQL Server must sift through more and more data,
    you may start seeing significant performance impact related to this behavior.
    When this happens, the number of logical reads can increase significantly as shown
    in Table [6-2](#480547_1_En_6_Chapter.xhtml#Tab2).


    Table 6-2


    Logical Reads when Data Table Is Larger


    | Number of Recipes | Number of Ingredients | Number of Recipe Ingredients | Records
    Returned | Logical Reads |

    | --- | --- | --- | --- | --- |

    | 32,242 | 263,010 | 3,040,002 | 196 | 7858 |


    As you can see, a query that originally seemed to perform well may start experiencing
    performance issues as the application matures and acquires more data.


    In these situations, the data that is frequently accessed by the application may
    be getting cleared out of the buffer pool. When there is a stored procedure that
    runs that must sift through a significant amount of data, you can usually see
    this when you look at the logical reads associated with the query. You may be
    working with a query that only returns five results; however, it must go through
    2 million logical reads to return the results. This is a sign that you are potentially
    using more of your buffer pool than you intended.


    This type of behavior can cause a significant amount of data in the buffer pool
    to be cleared out. There is value called page life expectancy in SQL Server that
    shows the amount of time on average that data pages stay in the buffer pool. I
    have come to use page life expectancy as an indicator that there are queries that
    may be reading far more data in SQL Server than are returned in the result set.
    This can cause those same queries to use more memory than the query needs. Often
    when I am working with queries that are working with the application, they normally
    do not involve more than ten records at a time. If the query is used for some
    form of reports, it is still usually not more than a couple thousand records at
    a time. Even if I am getting results where I am looking at 200,000 records at
    a time, I would still not want to be handling tens of millions of logical reads
    in order to get those results.


    The real key is to try to limit the amount of data SQL Server must process. When
    writing your queries, this can be handled based on your join logic or this can
    also be handled with your where clause criteria. You want to make sure that you
    are accessing as little data as possible. Accessing the smallest amounts of data
    needed allows you to minimize your use of memory when it comes to your T-SQL.
    The query previously referenced in Listing [6-1](#480547_1_En_6_Chapter.xhtml#PC1)
    is being used to return some data. However, there are some extra columns and joins
    that are included in this query that are not needed. I can update the query to
    remove the extra columns in Listing [6-2](#480547_1_En_6_Chapter.xhtml#PC2).'
  trans: "\n# SQL Server 中的内存管理：计划缓存与缓冲池\n\n虽然执行计划和数据都可以保存在缓存中，但 SQL Server 会执行特定计算来决定为计划缓存或缓冲池分配多少内存。此外，还有复杂的计算用于确定在计划缓存或缓冲池中保留某项内容多长时间。其真正目标是确保不常访问的存储过程或查询从计划缓存中删除，从而不占用不必要的空间。同样地，对于缓冲池，目标是仅保留应用程序正在积极使用的数据，并清除应用程序不再需要的数据。在这两种情况下，项目只有在缓存已满且需要为新的执行计划或数据腾出空间时才会被清除。SQL\
    \ Server 2014 引入了缓冲池扩展功能，提供了另一种解决方案。缓冲池扩展允许您将缓冲池扩展到使用 RAM 和固态硬盘（SSD）。考虑到 SSD 比购买额外的\
    \ RAM 更具成本效益，这有助于解决 I/O 瓶颈问题。\n\n## 计划缓存的特定考量\n\n谈到计划缓存，需要记住一些特定的考量。默认情况下，SQL\
    \ Server 针对存储过程和预处理语句进行了优化。这种对存储过程的优化也是使用计划缓存时的一个因素。在理想情况下，您的计划缓存中应有大量存储过程，而即席查询很少。然而，这并非对每个业务都适用。您的公司可能使用\
    \ ORM 或其他技术（如 LINQ）在应用程序代码中编写即席查询。虽然这对开发人员来说很方便，但它们给 SQL Server 带来了额外成本。如果这些查询没有转换为预处理语句，情况可能尤其如此。\n\
    \n可能发生的情况是，计划缓存会被即席查询填满。这可能导致应用程序更急需的存储过程从计划缓存中被删除。如果有存储过程因应用程序而从计划缓存中被删除，那么当下次调用该存储过程时，SQL\
    \ Server 将需要重新计算其执行计划。这将给系统带来额外成本。有各种方法可以处理计划缓存中存在大量即席查询的情况。然而，这超出了本书的范围。\n\n\
    ## 缓冲池与数据保留\n\n我在与 SQL Server 交互时遇到的另一个问题与缓冲池以及其中保存的数据有关。我不止一次听说，在处理非常大的表时，您将总是陷入必须处理访问大量数据的困境。如果表设计、索引、查询或上述任何组合未得到优化，这种情况确实可能发生。然而，有方法可以防止它。\n\
    \n## 编写高效查询\n\n使用内存和 SQL Server 时需要考虑的主要方面是，当您编写查询时，这些查询将返回正确的结果并在应用程序可接受的时间内完成。然而，根据整体表设计或查询的编写方式，这些查询访问的数据量可能远远超出必要。乍看之下，这可能不是一个重大问题。当数据表是新的且没有填满数据时，通常不会出现问题。清单\
    \ 6-1 中的查询用于返回应用程序中的一些数据。\n\n```sql\nSELECT rec.RecipeName,\n       rec.RecipeDescription,\n\
    \       rec.ServingQuantity,\n       ing.IngredientName,\n       ml.MealTypeName,\n\
    \       ml.MealTypeDescription,\n       prp.PreparationTypeName,\n       prp.PreparationTypeDescription\n\
    FROM dbo.Recipe rec\nINNER JOIN dbo.RecipeIngredient recing\n    ON rec.RecipeID\
    \ = recing.RecipeID\nINNER JOIN dbo.Ingredient ing\n    ON recing.IngredientID\
    \ = ing.IngredientID\nINNER JOIN dbo.MealType ml\n    ON rec.MealTypeID = ml.MealTypeID\n\
    INNER JOIN dbo.PreparationType prp\n    ON rec.PreparationTypeID = prp.PreparationTypeID\n\
    WHERE ing.IngredientName LIKE 'Tom%'\n  AND ing.IsActive = 1\n-- 清单 6-1\n-- 获取食谱成分的查询\n\
    ```\n\n当表是新的且数据不多时，您将看到如表 6-1 所示的逻辑读取。\n\n**表 6-1 数据表较小时的逻辑读取**\n\n| 食谱数量 | 成分数量\
    \ | 食谱成分数量 | 返回记录数 | 逻辑读取数 |\n| :--- | :--- | :--- | :--- | :--- |\n| 32,242 |\
    \ 4 | 3 | 4 | 351 |\n\n351 的逻辑读取数指的是为了执行此查询而读取的数据页数。随着表的增长，SQL Server 必须筛选越来越多的数据，您可能会开始看到与此行为相关的显著性能影响。当这种情况发生时，逻辑读取数可能会显著增加，如表\
    \ 6-2 所示。\n\n**表 6-2 数据表较大时的逻辑读取**\n\n| 食谱数量 | 成分数量 | 食谱成分数量 | 返回记录数 | 逻辑读取数 |\n\
    | :--- | :--- | :--- | :--- | :--- |\n| 32,242 | 263,010 | 3,040,002 | 196 | 7858\
    \ |\n\n如您所见，一个最初表现良好的查询，在应用程序成熟并获取更多数据后，可能会开始出现性能问题。\n\n## 性能影响与指标\n\n在这些情况下，应用程序经常访问的数据可能正从缓冲池中被清除。当有存储过程运行且必须筛选大量数据时，通过查看与查询关联的逻辑读取数通常可以看出这一点。您可能正在处理一个只返回五个结果的查询；然而，它必须经过\
    \ 200 万次逻辑读取才能返回结果。这是一个信号，表明您可能正在使用比预期更多的缓冲池。\n\n这种行为可能导致缓冲池中的大量数据被清除。SQL Server\
    \ 中有一个称为**页面寿命预期**的值，它显示数据页在缓冲池中停留的平均时间。我已开始使用页面寿命预期作为指标，表明有些查询可能在 SQL Server\
    \ 中读取的数据量远多于结果集中返回的数据量。这可能导致这些查询使用比查询所需更多的内存。通常，当我处理与应用程序相关的查询时，它们通常一次不涉及超过十条记录。如果查询用于某种形式的报告，通常一次也不超过几千条记录。即使我得到的结果是查看\
    \ 20 万条记录，我仍然不希望为了获得这些结果而处理数千万次逻辑读取。\n\n## 优化建议\n\n真正的关键是尝试限制 SQL Server 必须处理的数据量。在编写查询时，这可以通过连接逻辑或\
    \ `WHERE` 子句条件来处理。您要确保访问尽可能少的数据。访问所需最少的数据量可以让您在使用 T-SQL 时最小化内存使用。前面在清单 6-1 中引用的查询用于返回一些数据。然而，此查询中包含了一些不需要的额外列和连接。我可以更新查询以移除这些额外的列，如清单\
    \ 6-2 所示。\n"
- fmt: '```sql

    SELECT rec.RecipeName,

    ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    WHERE ing.IngredientName LIKE ''Tom%''

    AND ing.IsActive = 1

    ```


    **Listing 6-2** Query to Get Only Recipe and Ingredients


    While it did not affect the original performance of the query, now that the data
    table has more data, there is an obvious performance impact. Even though I expect
    the query to involve less logical reads, I should verify this hypothesis by executing
    the query. In **Table 6-3**, you can see the logical reads now that the query
    has been modified.


    **Table 6-3** Logical Reads with Only Necessary Columns


    | Number of Recipes | Number of Ingredients | Number of Recipe Ingredients | Records
    Returned | Logical Reads |

    | --- | --- | --- | --- | --- |

    | 32,242 | 263,010 | 3,040,002 | 196 | 6990 |


    Comparing the results from **Table 6-2** to **Table 6-3**, you can see that the
    logical reads has decreased. As a result, `SQL Server` should access less data
    pages in the `buffer pool` to perform this query. This should help other applications
    using this instance of `SQL Server` perform better.


    While memory could be considered the most powerful and beneficial hardware available
    to `SQL Server`, there are monetary costs associated with memory. Memory can make
    up for T-SQL that has not been optimized. But there often comes a point where
    tables are significantly large and the queries are not fully optimized, at that
    time it is tempting to get more memory to solve the performance issues. In many
    cases, this ends up being a short-term solution to a long-term problem. On top
    of that, the cost associated with purchasing additional memory is not always an
    option for the business. One way to prevent this or resolve this issue is to look
    at the stored procedures and prepared statements in your system and look for queries
    that can be improved by reducing the logical reads associated with those queries.


    ## Considering Storage with T-SQL Design


    I have covered how to interact with the data that you plan on accessing frequently;
    you will also want to consider how the bulk of your data is stored. When it comes
    to working with storage, it is important to consider what activities cause you
    to have to access data on disk. These are the types of activities that we want
    to figure out how to minimize or improve. In some cases, when I see a significant
    amount of disk I/O, it may be a sign that there is some other part of T-SQL design
    that needs to be improved. This may be the symptom instead of the cause.


    In the previous section, I talked about data being stored in the `buffer pool`.
    What happens if we need data that is not in the `buffer pool`? This can be where
    things within `SQL Server` get a little more complex. `SQL Server` only interacts
    with data that is inside the `buffer pool`. Therefore, if data is needed that
    is not in the `buffer pool`, the first step will be to determine what data has
    been used less frequently. Then remove this data from the `buffer pool`. These
    first steps already give us a hint into the memory usage. If there is something
    that fills up the `buffer pool` unnecessarily, we now know that critical data
    may be cleared out of the `buffer pool` to make room for this new data.


    Once the data has been deemed to not be a priority, `SQL Server` can then go to
    disk and get the data that it needs. This data will then be stored in the `buffer
    pool` until a future point where it is deemed that this data is no longer needed.
    In terms of the speed of hardware, there is already a slowness introduced with
    this process. If the data did not exist in the `buffer pool`, there is also the
    time associated with determining what records need to be dropped from the `buffer
    pool`. Dropping those records from the `buffer pool` and going to disk incurs
    additional cost in terms of time to retrieve that data from disk.


    If this data was only needed for a job that runs once every 4 to 6 hours, most
    of this data may be deemed irrelevant for every other process. This introduces
    a high churn of data that is being removed from the `buffer pool`. New data can
    be grabbed from disk and saved to the `buffer pool`. Then this new data may be
    removed from the `buffer pool` and be replaced with even newer data that has been
    retrieved from disk.


    In addition to this overhead associated with dealing with significant amount of
    data, there are other activities that interact with the disk or storage. When
    new data is being written to the system, that data will get stored in the `transaction
    log`. Data will continue to be added to the `transaction log` until the `transaction
    log` is cleared. Flushing the log can occur when the transaction is committed
    and the information is written to disk. In cases where there is a significant
    amount of data that is being added, updated, or deleted from the system, this
    can incur a significant use of storage.


    Knowing how this data is stored and how `SQL Server` can easily find that data
    through `indexes` and other data pages is stored on disk is important. When information
    is added to an `index` or an `index` needs to be updated, this information will
    also incur storage cost. This is not only in terms of the time needed to store
    the data but also the time involved to go to disk and make these additions or
    changes.


    When working with T-SQL, you want to consider how your queries are affecting your
    data storage. This can mean multiple things as we have seen in the previous section.
    You will want to make sure that you are not accessing, inserting, updating, or
    deleting more data than you need at a given time. That is not the only factor
    that comes into play when writing T-SQL. There are some things you can do to monitor
    storage use associated with your queries. Most of these involve looking at the
    number of `physical reads`, `read-ahead reads`, or the `I/O cost` associated with
    the query.'
