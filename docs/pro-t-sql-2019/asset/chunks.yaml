  trans: '### 动态游标


    如果其他游标类型可能不适用于您的情况，还有最后一种可用的游标类型。由于潜在的性能影响，这种类型的游标应尽可能少地使用。**动态游标**允许您在结果集中向前和向后移动。此外，它能感知数据发生的变化。虽然处理事务超出了本书的范围，但关于动态游标与事务级别相关的情况，还有一些额外的注意事项。所有已提交事务的更改都将可见。然而，只有在游标的事务级别设置为“未提交读”时，才能看到未提交的事务更改。


    在本节前面，我展示了如何创建一个只进游标。创建游标有趣的一点是，在不同游标类型之间切换时，代码并不会发生显著变化。游标类型之间的最大区别在于每种游标能看到哪些数据修改以及数据是如何被提取的。一个最大的诱惑是，游标的工作方式与应用程序代码非常相似。它们不是一次性处理大量数据，而是循环遍历数据。在应用程序代码中，这通常是访问数据的首选方法，这使得使用游标更具诱惑力。


    我见过游标最常被用于处理本应由应用程序更好地处理的流程。您可能会遇到一种情况，似乎游标是唯一可行的解决方案之一。查看清单 2-38，您可以了解动态游标可能的样子。


    ```

    SET NOCOUNT ON;

    DECLARE @RecipeID INT,

    @RecipeName VARCHAR(25),

    @message VARCHAR(50);

    PRINT ''-------- Recipe Listing --------'';

    DECLARE recipe_cursor CURSOR DYNAMIC

    FOR

    SELECT RecipeID, RecipeName

    FROM dbo.Recipe

    ORDER BY RecipeID;

    OPEN recipe_cursor

    FETCH NEXT FROM recipe_cursor

    INTO @RecipeID, @RecipeName

    WHILE @@FETCH_STATUS = 0

    BEGIN

    PRINT '' ''

    SELECT @message = ''----- Ingredients For Recipe: '' + @RecipeName + ''-----''

    PRINT @message

    SELECT ing.IngredientName, srv.ServingPortionQuantity, srv.ServingPortionUnit

    FROM dbo.Ingredient ing

    INNER JOIN dbo.RecipeIngredient recing

    ON ing.IngredientID = recing.IngredientID

    INNER JOIN dbo.ServingPortion srv

    ON recing.ServingPortionID = srv.ServingPortionID

    WHERE recing.RecipeID = @RecipeID

    FETCH NEXT FROM recipe_cursor INTO @RecipeID, @RecipeName

    END

    CLOSE recipe_cursor;

    DEALLOCATE recipe_cursor;

    ```

    清单 2-38：创建动态游标


    将游标类型从 `FORWARD_ONLY` 更改为 `DYNAMIC` 就像简单地将这两个短语互换一样容易。这些游标的输出也是相同的。真正可能发生的差异发生在幕后。如果游标运行期间某条记录发生了变化，只进游标可能无法察觉到该更改，而动态游标则可能能够滚动查看到该更改，或者在某些场景下，动态游标甚至可能在更改提交之前就看到它。


    在本章中，我介绍了在编写 T-SQL 时可用的几种不同类型的数据库对象。这些对象可以帮助使代码更具可读性。虽然其中一些数据库对象在适当的情况下可以提高性能，但它们都不是为了解决每一个技术挑战而设计的。在某些情况下，使用错误的数据库对象可能会对数据库和您的应用程序代码产生负面的性能影响。现在您已经知道何时使用每种数据库对象，是时候开始考虑您编写的代码质量了。


    # 3. 标准化 T-SQL


    在我开始讨论如何为复杂场景编写查询之前，我想先专注于如何编写良好的 T-SQL。这不是关于编写性能良好的代码，而是关于编写可读性好的 T-SQL 代码。我想回顾如何编写代码，以便于他人和您自己阅读。如果您像我一样，在职业生涯的某个阶段，您会回顾自己以前的代码，却无法立即理解其中涉及的所有逻辑。


    编写易于理解的 T-SQL 对您和您的公司都有好处。许多其他编程语言都有标准或最佳实践，我认为 T-SQL 也不例外。虽然编写 T-SQL 的主要目标可能是实现某个功能，但次要目标——确保您的
    T-SQL 逻辑清晰——同样重要。随着时间的推移，代码会变更，或者会发现错误。您的 T-SQL 代码可读性和可理解性越高，就越容易修改或进行故障排除。'
- fmt: '## Formatting T-SQL


    T-SQL 代码的书写方式和其内容本身同样重要。和其他应用程序代码一样，未来总会有人需要阅读你的代码，或者你需要阅读别人的代码。如果我不是在编写新代码，那么就是在查看已有代码，以理解其用途、调试代码、优化查询性能或更新业务逻辑。根据我审查代码的原因，我通常会确定当时对我重要的是什么。


    如果我查看 T-SQL 代码是为了理解代码的功能，我会首先查看涉及哪些表，以了解可能使用此 T-SQL 代码的应用程序。我通常不关心表是如何连接的，因为我假设它们的功能是正确的。尽管表连接逻辑错误可能是查询返回非常意外结果的一个原因。接下来，我会查看用于过滤
    T-SQL 代码结果的条件。只有在分析的最后，我才会检查查询返回的列。通常，只有在涉及特殊业务逻辑时，我才会关注这些列。将这种思维模式应用于编写简单查询，你可以看到我在代码清单
    [3-1](#480547_1_En_3_Chapter.xhtml#PC1) 中将列名列在一行上。


    ```

    SELECT IngredientID, IngredientName, DateCreated, DateModified

    FROM dbo.Ingredient

    Listing 3-1

    Basic Query

    ```


    我这样格式化代码是因为我希望能够快速查看 FROM 子句和 WHERE 条件中发生的所有操作项。如果为每个列创建单独的一行，我将更难看清表之间的关系以及应用于这些关系的条件。如代码清单
    [3-2](#480547_1_En_3_Chapter.xhtml#PC2) 所示，我更改了 SELECT 子句中列的显示方式。


    ```

    SELECT rec.RecipeName,

    rec.RecipeDescription,

    rec.IsActive AS ''RecipeIsActive'',

    ingr.IngredientName,

    ingr.IsActive AS ''IngredientIsActive''

    FROM dbo.Recipe rec

    INNER JOIN dbo.RecipeIngredient recingr

    ON rec.RecipeID = recingr.IngredientID

    LEFT OUTER JOIN dbo.Ingredient ingr

    ON recingr.IngredientID = ingr.IngredientID

    AND ingr.IngredientName  ''Italian Sausage''

    Listing 3-2

    Queries with Joins

    ```


    对于此查询，列是逐行列出的。这是因为我对实际返回的列进行了某种更改。如果我对列进行别名设置或向列添加特殊逻辑，我会更改 SELECT 语句中列的格式。对于这些情况，根据逻辑的复杂性，我将为每列创建一行或多行。如果你还注意到查询的最后两行，我有两个连接条件。我通常会缩进第一个之后的任何连接条件，因为我希望立即明显看出已对连接应用了多个条件。


    很多时候，我审查 T-SQL 代码是为了排查为什么 T-SQL 代码可能返回错误的结果。当返回的结果出现问题时，我会从用户故事开始，了解发生了什么不正确的情况。在这些情况下，我会立即转到
    WHERE 子句以仔细检查逻辑并确认其是否正确。一旦确认了逻辑，我就会查看连接条件，以确认表是否正确连接。我使用与理解 T-SQL 代码相同的过程来排查代码问题；我会最后查看
    SELECT 语句，重点关注任何主要的、带有特殊逻辑的列。查看代码清单 [3-3](#480547_1_En_3_Chapter.xhtml#PC3) 中的查询，我可以先扫描
    FROM 子句，然后是 WHERE 子句。


    ```

    SELECT

    (

    SELECT rec.RecipeName

    FROM dbo.Recipe rec

    INNER JOIN dbo.RecipeIngredient recingr

    ON rec.RecipeID = recingr.RecipeID

    WHERE recingr.IngredientID = ingr.IngredientID

    ) AS ''RecipeName'',

    ingr.IngredientName,

    ingr.IsActive,

    ingr.DateCreated,

    ingr.DateModified

    FROM dbo.Ingredient ingr

    WHERE IngredientName LIKE ''%Tomato%''

    ORDER BY RecipeName, ingr.IngredientName

    Listing 3-3

    Queries with Subqueries

    ```


    这使我能够立即确定此查询处理的是类似于番茄的配料。由于 SELECT 语句中的列列在单独的行上，我立即意识到 SELECT 语句的这部分涉及一些特殊逻辑。我还缩进了逻辑的子查询部分，这有助于子查询更加突出。既然我正在排查潜在的不准确结果，我可以快速深入探究可能导致问题的原因。根据报告的错误，问题很可能出在
    WHERE 子句或 SELECT 语句返回的第一列上。分析代码清单 [3-4](#480547_1_En_3_Chapter.xhtml#PC4) 中创建的视图则显示了不同的结论。


    ```

    CREATE VIEW dbo.AvailableMeal

    AS

    SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    Listing 3-4

    Create a View

    ```


    对于此视图的 T-SQL 代码，我仍然首先查看 FROM 子句。我立即发现存在多个连接。此外，没有 WHERE 子句，并且我还可以快速确定 SELECT 语句中没有特殊逻辑，因为所有列都不在它们自己的行上。将关于此视图的信息与我正在研究的任何潜在错误相匹配，我知道此查询最复杂的部分是连接逻辑。如果连接是正确的，并且视图返回了太多结果，我可以快速排除
    SELECT 语句；或者如果返回的数据不正确，我可以排除 WHERE 子句。在创建函数时也可以遵循类似的模式，如代码清单 [3-5](#480547_1_En_3_Chapter.xhtml#PC5)
    所示。


    ```

    CREATE FUNCTION dbo.IngredientsByRecipe (@RecipeID INT)

    RETURNS TABLE

    AS

    RETURN

    (

    SELECT meal.MealTypeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    WHERE rec.RecipeID = @RecipeID

    );

    Listing 3-5

    Create a Function

    ```


    在前面的函数中，我可以快速识别 FROM 语句中的多个连接和 WHERE 子句中的一个条件。如果该函数仅返回所提供配方的结果，那么已发现的任何错误很可能与连接条件相关。


    我对查询进行性能调优的过程是不同的，我将在本书的第二部分《构建高性能的 T-SQL》中进一步讨论这些差异。当涉及到作为性能调优一部分审查 T-SQL 时，我将重点关注使用了哪些表。如果涉及多个表，我还将查看这些表是如何连接的。我的最后重点将是正在使用哪些列，以及这些列与现有索引的关系。'
  raw: '## Formatting T-SQL


    How T-SQL looks when it is written can be as significant as what is written. Like
    other application code, there is always a chance that someone will need to look
    at your code in the future or you will need to look at theirs. If I am not writing
    new code, I am looking at pre-existing code to understand the purpose, to debug
    the code, to performance tune the query, or to update business logic. Depending
    on the reason why I am reviewing the code, I will generally determine what is
    important to me at the time.


    If I am looking at the T-SQL code to understand what the code does, I will look
    at what tables are involved first to understand what application may be using
    this T-SQL code. I am not concerned with how tables are joined together as I expect
    that to be functioning correctly. Though incorrect logic on table joins can be
    a cause of queries returned very unexpected results. Next, I will look at the
    criteria used to filter the results of the T-SQL code. Only at the very end of
    my analysis will I review the column returned in the query. Oftentimes, I am only
    concerned with the columns if there is special business logic involved. Applying
    this thought pattern to writing simple queries, you can see that I list the column
    names on one line in Listing [3-1](#480547_1_En_3_Chapter.xhtml#PC1).


    ```

    SELECT IngredientID, IngredientName, DateCreated, DateModified

    FROM dbo.Ingredient

    Listing 3-1

    Basic Query

    ```


    I format my code this way because I want to be able to quickly see all the action
    items that are happening through the FROM clause and the WHERE criteria. If I
    were to create one line per column, it would be harder for me to see how tables
    were related and what conditions were being applied to those relationships. As
    you can see in Listing [3-2](#480547_1_En_3_Chapter.xhtml#PC2), I have altered
    how the columns in the SELECT clause are displayed.


    ```

    SELECT rec.RecipeName,

    rec.RecipeDescription,

    rec.IsActive AS ''RecipeIsActive'',

    ingr.IngredientName,

    ingr.IsActive AS ''IngredientIsActive''

    FROM dbo.Recipe rec

    INNER JOIN dbo.RecipeIngredient recingr

    ON rec.RecipeID = recingr.IngredientID

    LEFT OUTER JOIN dbo.Ingredient ingr

    ON recingr.IngredientID = ingr.IngredientID

    AND ingr.IngredientName  ''Italian Sausage''

    Listing 3-2

    Queries with Joins

    ```


    For this query, the columns are listed line by line. This is because I have altered
    something about the actual column being pulled back. If there is ever a time I
    am aliasing a column or adding special logic to a column, I will change how I
    format the columns in the SELECT statement. For these scenarios, I will create
    one line or more per column depending on the complexity of the logic. If you also
    notice on the last two lines of the query, I have two join conditions. I usually
    indent any join condition after the first one as I want it to be immediately obvious
    there has been more than one condition applied to a join.


    There are many times I am reviewing T-SQL code to troubleshoot why the T-SQL code
    may be returning incorrect results. When there are issues with the results being
    returned, I start with a user story indicating what is happening that is incorrect.
    In these cases, I will go immediately to the WHERE clause to double-check the
    logic and confirm that it is correct. Once I have confirmed that logic, I look
    at the join criteria to confirm that the tables are joined correctly. I use the
    same process to troubleshoot the code as I use to understand T-SQL code; I will
    look at the SELECT statement last focusing on any primarily columns with any special
    logic. Looking at the query in Listing [3-3](#480547_1_En_3_Chapter.xhtml#PC3),
    I can scan first the FROM clause, then the WHERE clause.


    ```

    SELECT

    (

    SELECT rec.RecipeName

    FROM dbo.Recipe rec

    INNER JOIN dbo.RecipeIngredient recingr

    ON rec.RecipeID = recingr.RecipeID

    WHERE recingr.IngredientID = ingr.IngredientID

    ) AS ''RecipeName'',

    ingr.IngredientName,

    ingr.IsActive,

    ingr.DateCreated,

    ingr.DateModified

    FROM dbo.Ingredient ingr

    WHERE IngredientName LIKE ''%Tomato%''

    ORDER BY RecipeName, ingr.IngredientName

    Listing 3-3

    Queries with Subqueries

    ```


    This allows me to immediately determine this query is dealing with ingredients
    that are like tomato. With the columns in the SELECT statement listed on individual
    lines, I am immediately aware that there is some special logic involved in the
    part of the SELECT statement. I have also indented the subquery portion of the
    logic which helps that subquery stand out even further. Now that I am trying to
    troubleshoot potentially inaccurate results, I can quickly dig into what can be
    causing the issue. Depending on the bug reported, there is a very high possibility
    the issue is either with the WHERE clause or the first column returned in the
    SELECT statement. Analyzing the view created in Listing [3-4](#480547_1_En_3_Chapter.xhtml#PC4)
    shows a different conclusion.


    ```

    CREATE VIEW dbo.AvailableMeal

    AS

    SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    Listing 3-4

    Create a View

    ```


    In the T-SQL code for this view, I still go first to the FROM clause. I immediately
    identify that there are several joins. In addition, there is no WHERE clause,
    and I can also quickly determine there is no special logic in the SELECT statement
    as all columns are not on their own line(s). Matching the information about this
    view to any potential bug I am researching, I know the most complex part of this
    query is the join logic. If the joins are correct, I can quickly rule out the
    SELECT statement if the view is returning too many results or I can rule out the
    WHERE clause if the data returned is incorrect. A similar pattern can be followed
    when creating a function as shown in Listing [3-5](#480547_1_En_3_Chapter.xhtml#PC5).


    ```

    CREATE FUNCTION dbo.IngredientsByRecipe (@RecipeID INT)

    RETURNS TABLE

    AS

    RETURN

    (

    SELECT meal.MealTypeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    WHERE rec.RecipeID = @RecipeID

    );

    Listing 3-5

    Create a Function

    ```


    In the preceding function, I can quickly identify several joins in the FROM statement
    and one criterion in the WHERE clause. If the function is returning only results
    for the recipe provided, it is highly likely that any bug that has been found
    is related to the join conditions.


    My process for performance tuning queries is handled differently, and I will discuss
    those differences further in Part II of this book, Building Performant T-SQL.
    When it comes to reviewing the T-SQL as part of performance tuning, I will focus
    on what tables are used. If there is more than one table, I will also look at
    how those tables are joined together. My final focus will be on what columns are
    being used and how those relate to indexes that already exist.'
