- fmt: '## Feature Flag


    在开发应用程序时，你可能需要进行许多涉及不同用户故事的修改。换句话说，你可能在重构一个预计需要数月才能完成的应用程序。与此同时，你知道你的业务可能每两周部署一次数据库代码。问题在于如何开发
    T-SQL 代码，既能确认代码在现有数据库结构中有效，又能确保这些数据库变更在准备就绪之前不会进入生产环境。


    这不仅是许多数据库开发人员，也是软件开发人员经常问自己的问题。问题的核心在于如何编写可以开关的数据库代码。处理这个问题的一种方法是使用特性标志。实现特性标志的方式有很多种，但目标是一致的：创建可配置为在一种或另一种场景下工作的数据库代码和数据库对象。


    使用特性标志时，你可以随意启用或禁用新功能。这种管理数据库代码的方法允许你编写代码、将代码部署到生产环境，并在业务选定的后续时间启用新功能。除了能够精确控制何时启用新功能之外，你还可以通过更新数据库中的单个值来几乎立即回滚更改，从而获得额外的好处。在全面采用特性标志之前，你需要建立一些基础。例如，你应该习惯并养成对数据库代码进行单元测试的习惯。对于特性标志，你不仅需要在特性标志启用时进行单元测试，还需要在特性标志禁用时进行单元测试，以确认你的应用程序使用的是预先存在的数据库逻辑。


    我建议你在为数据库完全实施源代码控制之后，再采用特性标志。这个建议的原因之一是管理特性标志需要额外的工作。当你为数据库对象创建特性标志时，你需要创建一些额外的逻辑，以允许你的应用程序使用预先存在的
    T-SQL 代码或新的数据库代码。这不仅需要在编写 T-SQL 代码时保持纪律性，还需要有定义明确的流程来确定何时从数据库代码中移除特性标志。虽然特性标志对于存储过程、函数或视图等数据库对象效果很好，但它们并不是你开发的所有内容的解决方案。某些更改，例如对数据库列的更改，无法被来回切换。为了管理对数据库对象的这类更改，我们将在本节末尾讨论一些解决方案。


    当为你的 T-SQL 代码使用特性标志时，你有几个选项来确定在任何给定时间启用了哪些特性标志。关于特性和数据库，我听过两个主要的解决方案。第一个可能更偏向应用程序代码，即在配置文件中提供特性标志值。第二个选项更像是基于
    T-SQL 的解决方案，即创建一个表来存储特性标志的当前状态，例如启用或禁用。每个选项都有其优缺点。使用应用程序代码来管理特性标志可能更容易实现和管理。然而，数据库管理员可能更难支持这些特性标志。如果你将特性标志值保存在数据库中，你需要有纪律地管理这些特性标志并移除它们。最终很容易得到一个充斥着已弃用特性标志的混乱表。缺点是只有有权访问数据库表的用户才能看到每个特性标志关联的值。


    当你部署数据库代码时，你可以将特性标志部署为禁用状态。一旦你准备好启用新功能，就可以将特性标志设置为启用。你需要定义一个流程来确定何时完全切换到新功能。当你准备好完全使用新功能时，你需要移除之前的
    T-SQL 代码。作为此过程的一部分，你还需要移除任何对特性标志的引用。这种方法面临的挑战是，很容易跳过移除先前数据库代码的过程。如果你的 T-SQL 代码没有定期清理，这可能会大大降低代码未来的可管理性。


    如果我需要更新一个存储过程以使用新逻辑，我可以使用特性标志，以便在任何我想要的时候部署这个更改。查看清单 12-1，你可以看到尚未修改的原始存储过程。


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.GetRecipe

    Author:           Elizabeth Noble

    Created Date:     April 20, 2019

    Description: Get a list of all recipes in the database

    Sample Usage:

    EXECUTE dbo.GetRecipe

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetRecipe

    AS

    SELECT

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe;

    ```


    清单 12-1

    原始存储过程


    此存储过程提取所有食谱的各种信息。在上面的 T-SQL 代码中，该存储过程没有区分活动和非活动食谱，返回了所有食谱的信息。我可能发现这个存储过程本应只返回活动的食谱。虽然我需要更新此存储过程以仅返回活动食谱，但可能存在业务原因导致此代码更改在部署后无法立即启用。


    在这种情况下，我需要使用类似特性标志的东西，以便能够灵活地在存储过程中创建这些更改，并控制这些更改何时对应用程序可用。使用特性标志时，你需要一种方法来确定特性标志是启用还是禁用。这是你和数据库代码将知道在给定时间应执行哪段
    T-SQL 代码的方式。一个选项是创建一个表来存储有关特性标志的信息。你可以创建一个如清单 12-2 所示的表。


    ```sql

    CREATE TABLE dbo.FeatureFlag

    (

    FeatureFlagID     INT,

    IsActive          BIT,

