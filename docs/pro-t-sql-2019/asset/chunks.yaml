    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetRecipe

    Author:           Elizabeth Noble

    Created Date:     April 20, 2019

    Description: Get a list of all recipes in the database

    Updated Date:     May 20, 2019

    Description: Add feature flag. If feature flag is enabled, only

    Show active recipes. Otherwise, show all recipes.

    Updated Date:     June 20, 2019

    Description: Remove the feature flag. Leave only the new logic.

    The stored procedure now only returns active recipes.

    Sample Usage:

    EXECUTE dbo.GetRecipe

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetRecipe

    AS

    SELECT

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe

    WHERE IsActive = 1;

    Listing 12-6

    Final Stored Procedure

    ```


    The database code in the stored procedure dbo.GetRecipe has been updated. Before
    any code changes, this stored procedure returned all recipes. After creating the
    feature flag, the stored procedure was updated to include logic to either return
    all recipes or only active recipes depending on the feature flag status. When
    the changes have been confirmed, you can remove the logic for the feature flag.
    This will leave the stored procedure in place with only the updated T-SQL code.


    Depending on how you manage your branching and merging in source control may determine
    how frequently you need to deploy database code that is incomplete. You may find
    yourself in a situation where you are working on developing database code, but
    it is not complete before your next deployment. It is often easiest to write code
    in a way that it can be deployed when it is completed. However, with the move
    toward Agile software development, it has become increasingly important to write
    T-SQL code in a manner where it can be deployed at any moment in time. This is
    where the true benefit of feature flags can be realized.


    ## Methodology


    Each development environment is different. Before deciding how to deploy T-SQL
    code, it will help to get a better understanding of how development is handled
    at your company. You will want to know how many database developers are at your
    company and how many different development teams use SQL Server. Another factor
    that you will want to know is how those development teams write and deploy code.
    Collecting all this information will help you determine the best method to deploy
    T-SQL code that will work for your environment.


    When working with SQL Server, often the risks associated with code issues can
    be larger than with application code. These risks are compounded when there are
    multiple individuals accessing the same T-SQL code. If you are in an environment
    where you are the only database developer, there may be less of a chance of having
    issues with merge conflicts. If there are multiple database developers or teams
    that may be writing T-SQL code, there is more of a chance to have more than one
    person working on the same database code. While some of this can be managed through
    source control, it is also important to be mindful of how database code is deployed.


    There are several different ways that database development teams can manage their
    workflows. Depending on the methodology that is used can contribute to what type
    of deployment method should be used. My first job that involved consistently writing
    database code did not have any strict timelines. The goal was to make changes
    and deploy them as quickly as possible. This is often because I was creating SSRS
    reports. Typically, this type of development can be referred to as Kanban. I have
    also worked in environments where changes to the database were only deployed as
    part of a full sprint cycle. For these deployments, all user stories in the Sprint
    were deployed as part of the Sprint. While there are some ways to deploy everything
    in a Sprint without changing functionality, our code was often not written that
    way. If your business is trying to move toward being able to deploy changes at
    any point in time, you want to consider changing how you develop your database
    code. This change can be a shift in how you think about your solutions and how
    you write your code. Concepts like using feature flags will help you. Essentially
    you want to write your T-SQL code in a way that it can be deployed at any point
    in time and your applications will not break. However, to get to this point requires
    several fundamental steps. The first of which is knowing how your company develops
    your T-SQL code. You may want to handle deployments differently if you have many
    developers working on T-SQL code for a single application than if you have each
    developer working on a separate application. This will help you determine what
    method of deployment will work best for you.'
  trans: '

    我已为 `功能标志 947` 插入了一条记录。插入时，该功能标志处于禁用状态。目标是让现有的存储过程继续返回与添加功能标志之前相同的结果。在清单 12-4
    的存储过程中，我添加了逻辑，使存储过程能根据 `功能标志 947` 是禁用还是启用而返回不同的结果。


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetRecipe

    Author:           Elizabeth Noble

    Created Date:     April 20, 2019

    Description: 获取数据库中所有食谱的列表

    Updated Date:     May 20, 2019

    Description: 添加功能标志。如果启用功能标志，则只显示活跃的食谱。否则，显示所有食谱。

    Sample Usage:

    EXECUTE dbo.GetRecipe

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetRecipe

    AS

    IF ((SELECT IsActive FROM dbo.FeatureFlag WHERE FeatureFlagID = 947) = 1)

    BEGIN

    SELECT

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe

    WHERE IsActive = 1;

    END

    ELSE

    BEGIN

    SELECT

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe;

    END

    Listing 12-4

    带功能标志的存储过程

    ```


    此查询的第一部分现在仅在 `功能标志 947` 启用时才返回结果。对于任何其他情况，存储过程将返回第二个查询的结果。功能标志的初始状态为禁用。当功能标志被禁用时，将返回所有食谱。一旦此代码部署到生产环境，终将有你准备好启用新功能的时候。当那一刻来临时，运行清单
    12-5 中的 T-SQL 代码将启用该功能标志。


    ```

    UPDATE dbo.FeatureFlag

    SET   IsActive = 1,

    DateModified = GETDATE()

    WHERE FeatureFlagID = 947;

    Listing 12-5

    启用功能标志

    ```


    启用此功能标志将导致存储过程 `dbo.GetRecipe` 现在仅返回活跃的食谱。


    一旦你确信新代码按预期工作，并且没有业务需求需要回滚，你就会希望更新存储过程，使其仅返回新数据库代码的结果。移除功能标志还将保护此存储过程，避免因功能标志被错误更新而返回不准确的结果。清单
    12-6 中的 T-SQL 代码展示了 `dbo.GetRecipe` 存储过程的最终状态。


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetRecipe

    Author:           Elizabeth Noble

    Created Date:     April 20, 2019

    Description: 获取数据库中所有食谱的列表

    Updated Date:     May 20, 2019

    Description: 添加功能标志。如果启用功能标志，则只显示活跃的食谱。否则，显示所有食谱。

    Updated Date:     June 20, 2019

    Description: 移除功能标志。仅保留新逻辑。存储过程现在只返回活跃的食谱。

    Sample Usage:

    EXECUTE dbo.GetRecipe

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetRecipe

    AS

    SELECT

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe

    WHERE IsActive = 1;

    Listing 12-6

    最终的存储过程

    ```


    存储过程 `dbo.GetRecipe` 中的数据库代码已更新。在任何代码更改之前，此存储过程返回所有食谱。创建功能标志后，存储过程被更新为包含逻辑，根据功能标志状态返回所有食谱或仅活跃食谱。当更改得到确认后，你可以移除功能标志的逻辑。这将保留存储过程，仅包含更新后的
    T-SQL 代码。


    根据你在源代码管理中管理分支和合并的方式，可能决定了你需要多频繁地部署不完整的数据库代码。你可能会发现自己在开发数据库代码，但在下次部署前尚未完成。通常最简单的方式是编写可以部署时即完成的代码。然而，随着向敏捷软件开发的转变，以一种可以随时部署的方式编写
    T-SQL 代码变得越来越重要。这正是功能标志真正益处得以体现的地方。


    ## 方法论


    每个开发环境都不同。在决定如何部署 T-SQL 代码之前，更好地了解你公司如何处理开发会很有帮助。你需要知道公司有多少数据库开发人员，以及有多少个不同的开发团队使用
    SQL Server。另一个你想了解的因素是那些开发团队如何编写和部署代码。收集所有这些信息将帮助你确定最适合你环境的 T-SQL 代码部署方法。


    使用 SQL Server 时，与代码问题相关的风险通常比应用程序代码更大。当有多个人访问相同的 T-SQL 代码时，这些风险会加剧。如果你身处的环境中你是唯一的数据库开发人员，出现合并冲突问题的可能性可能较小。如果有多个数据库开发人员或团队可能编写
    T-SQL 代码，那么有多个人处理相同数据库代码的可能性就更大。虽然其中一些可以通过源代码管理来管理，但同样重要的是要注意数据库代码是如何部署的。


    数据库开发团队可以有几种不同的方式来管理工作流。根据所采用的方法论，可以影响应使用哪种类型的部署方法。我第一份涉及持续编写数据库代码的工作没有任何严格的时间表。目标是尽可能快地进行更改并部署。这通常是因为我正在创建
    SSRS 报告。通常，这种开发可以被称为看板。我也曾在这样的环境中工作过：对数据库的更改仅作为完整的冲刺周期的一部分部署。对于这些部署，冲刺中的所有用户故事都作为冲刺的一部分部署。虽然有一些方法可以在不改变功能的情况下部署冲刺中的所有内容，但我们的代码通常不是那样编写的。如果你的业务正尝试转向能够在任何时间点部署更改，那么你需要考虑改变开发数据库代码的方式。这种改变可以是你思考解决方案和编写代码方式的转变。使用功能标志等概念将对你有所帮助。本质上，你希望以一种可以随时部署的方式编写
    T-SQL 代码，而你的应用程序不会崩溃。然而，要达到这个点需要几个基本步骤。首先是了解你的公司如何开发 T-SQL 代码。如果你有许多开发人员为一个应用程序编写
    T-SQL 代码，与每个开发人员处理一个单独的应用程序相比，你可能希望以不同的方式处理部署。这将帮助你确定哪种部署方法最适合你。

