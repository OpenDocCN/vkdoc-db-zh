    *代码清单 4-11：用于按用餐类型查找食谱与食材的存储过程*


    ### 参数嗅探问题


    对于食谱数据，表中存储的食谱类型数量可能存在显著差异。如果你有数百或数千个早餐食谱，但只有少数晚餐食谱，你可能会遇到**参数嗅探**（`parameter
    sniffing`）影响应用程序性能的场景。在我们这个用餐类型的场景中，你可能执行一个存储过程来获取早餐食谱。第一次调用存储过程时，`SQL Server`会根据提供的参数生成一个执行计划。该执行计划最终会存储在计划缓存中。


    为了测试参数嗅探，你可能希望使用给定的参数执行存储过程，如代码清单 4-12 所示。


    ```

    EXECUTE dbo.GetRecipeAndIngredientByMealTypeID 3;

    ```

    *代码清单 4-12：使用具有较多记录的参数执行存储过程*


    对于此存储过程执行，我得到了如图 4-2 所示的执行计划。


    ![../images/480547_1_En_4_Chapter/480547_1_En_4_Fig2_HTML.jpg](img/480547_1_En_4_Fig2_HTML.jpg)

    *图 4-2：使用具有较多记录的参数的存储过程执行计划*


    如果你稍后想重新运行存储过程来获取晚餐食谱，`SQL Server`将重用原始的执行计划来检索数据。然而，`SQL Server`最初创建的执行计划在尝试查找用餐类型为晚餐的食谱时，性能可能更差。如果我清除计划缓存并以不同的顺序重新运行存储过程，就可以验证该问题确实与参数嗅探有关。在代码清单
    4-13 中，你可以看到在计划缓存被清除后，用于生成新执行计划的`T-SQL`代码。


    ```

    EXECUTE dbo.GetRecipeAndIngredientByMealTypeID 2;

    ```

    *代码清单 4-13：使用具有较少记录的参数执行存储过程*


    当我执行此存储过程时，我发现创建了一个不同的计划缓存。你可以在图 4-3 中看到创建的另一个执行计划。


    ![../images/480547_1_En_4_Chapter/480547_1_En_4_Fig3_HTML.jpg](img/480547_1_En_4_Fig3_HTML.jpg)

    *图 4-3：使用具有较少记录的参数的存储过程执行计划*


    如果我运行与代码清单 4-12 中相同的`T-SQL`，我现在会得到相同的执行计划。这表明此查询遇到了参数嗅探问题。有几种可用选项来处理参数嗅探。理想情况下，你或许可以重新设计查询以使用不同的索引。


    ### 解决方案：条件重编译


    不幸的是，可能并不总是能够以这种方式修改查询。这可能促使你寻找其他选项，例如使用`WITH RECOMPILE`查询提示更新查询。使用此方法的缺点是，每次执行查询时都必须编译它。这在硬件和每次查询执行的时间方面都产生了额外成本。这时你可能需要寻找更好的替代方案。可以针对某些更常见的参数修改查询以使用缓存的计划，而对于所有其他场景则重新编译存储过程。代码清单
    4-14 中的存储过程已修改为对某些值使用重编译。


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetRecipeAndIngredientByMealTypeID

    Author:           Elizabeth Noble

    Created Date:     April 20, 2019

    Description:     按用餐类型获取所有食谱及其食材

    Sample Usage:

    EXECUTE dbo.GetRecipeAndIngredientByMealTypeID 1

    \*-------------------------------------------------------------*/

    CREATE PROCEDURE dbo.GetRecipeAndIngredientByMealTypeID

    @MealTypeID     INT

    AS

    DECLARE @QueryString    NVARCHAR(1000);

    -- 待执行的原始查询

    SELECT @QueryString = N''

    SELECT

    rec.RecipeName,

    ingr.IngredientName,

    ingr.IsActive,

    ingr.DateCreated,

    ingr.DateModified

    FROM dbo.Recipe rec

    INNER JOIN dbo.RecipeIngredient recingr

    ON rec.RecipeID = recingr.RecipeID

    LEFT OUTER JOIN dbo.Ingredient ingr

    ON recingr.IngredientID = ingr.IngredientID

    WHERE rec.MealTypeID = @MelTypID

    ORDER BY rec.RecipeName, ingr.IngredientName''

    -- 如果参数无法提供稳定的执行计划

    ---- 向查询添加 OPTION(RECOMPILE)

    IF (@MealTypeID <> 2)

    BEGIN

    SELECT @QueryString = @QueryString + N'' OPTION(RECOMPILE)'';

    END

    -- 执行查询字符串

    EXECUTE [sp_executesql] @QueryString,

    N''@MelTypID INT'',

    @MelTypID = @MealTypeID;

    GO

    ```

    *代码清单 4-14：条件性使用重编译选项执行存储过程的代码*


    在代码清单 4-14 中，当提供`MealTypeID`为 2 时，执行计划被认为是稳定的。当存储过程以`MealTypeID`为 2 运行时，它将执行`T-SQL`代码而不会生成新的执行计划。但是，如果为`MealTypeID`提供了不同的值，则`SQL
    Server`每次都会生成一个新的执行计划。这种场景在查询的大多数执行时间都接收到`MealTypeID`为 2 的参数时效果很好。这可以避免`SQL Server`在每次调用存储过程时都生成执行计划。如果每执行十次存储过程，有一两次参数未设置为`MealTypeID`为
    2，那么`SQL Server`将会生成新的执行计划。这种方法可以让你最小化重新编译执行的成本，并将其发生频率限制得更低。虽然`SQL Server`按预期工作，但正是数据的形态导致了性能问题。'
- fmt: "# Using Complex Logic\n\nThere are some basic operations in SQL Server that\
    \ are not significantly complex. These basic operations can include inserting,\
    \ reading, updating, and deleting table from single tables. Some of these operations\
    \ may involve a couple of joins, but at some point in time, there may be a need\
    \ for more complex logic. One of the challenges that happens while working with\
    \ T-SQL is dealing with complex logic.\n\n## The First Step in Dealing with Complex\
    \ Logic\n\nWhen dealing with complex logic, it is important to keep a couple of\
    \ things in mind. The first step in dealing with complex logic is breaking down\
    \ the request into smaller parts. Part of this logic will be to figure out what\
    \ data you need to start with and how to whittle that data down into a smaller\
    \ data set. You will also want to focus on taking all the requirements and breaking\
    \ those requirements down into simplified steps.\n\n## Challenges with Query Requests\n\
    \nMany of these query requests can involve either dealing with databases that\
    \ were not designed to take advantage of the strengths for relational databases\
    \ and systems that were not designed to be integrated or interacting with legacy\
    \ applications. Oftentimes, we do not have control over what we are requested\
    \ to do, and we are lucky if we get to design how the data is stored in the database.\n\
    \nThese types of scenarios can also involve various types of coding methodologies\
    \ that do not necessarily coincide with best practices. This includes needing\
    \ to loop through data including recursion. There are also times that you may\
    \ want to use correlated subqueries or work with various strings such as XML or\
    \ JSON. While many of these options may seem like they are the perfect solution,\
    \ many of these options are overly complex. This is where the balancing act between\
    \ making T-SQL code easy to understand and having T-SQL code that performs well\
    \ can be tricky. My goal here is to show how using what seems like more advanced\
    \ query techniques may be contributing to poor performance in your applications.\n\
    \n## The Pitfall of Overly Specific Code\n\nIt is often tempting with writing\
    \ T-SQL to write your code in a way that matches the specific acceptance criteria\
    \ or business request. Sometimes this will work well, and you will end up with\
    \ code that performs very well. In other instances, not only can trying to write\
    \ to solve complex problem be difficult and frustrating, but if the T-SQL code\
    \ is not written in a way that works best for SQL Server, you have the potential\
    \ to come across significant performance issues. I have found that SQL Server\
    \ generally works best if you can keep your code simple and straightforward. This\
    \ also means that using new functionality in SQL Server may not always yield the\
    \ best results in terms of performance, even if the code is easier to write.\n\
    \n## The Most Common Case: Loops\n\nThe most common case I see where the T-SQL\
    \ code that is written does not always consider how SQL Server performs best is\
    \ involving loops. SQL Server allows many options for looping through data, and\
    \ while the code will return the correct results, I often find the cost on SQL\
    \ Server more significant than figuring out a different way of interacting with\
    \ the same data. Looking back at Listing [2-29](#480547_1_En_2_Chapter.xhtml#PC29),\
    \ I have pasted the same logic in Listing [4-15](#480547_1_En_4_Chapter.xhtml#PC15).\n\
    \n```sql\nSET NOCOUNT ON;\nDECLARE @RecipeID INT,\n        @RecipeName VARCHAR(25),\n\
    \        @message VARCHAR(50);\nPRINT '-------- Recipe Listing --------';\nDECLARE\
    \ recipe_cursor CURSOR DYNAMIC\nFOR\nSELECT RecipeID, RecipeName\nFROM dbo.Recipe\n\
    ORDER BY RecipeID;\nOPEN recipe_cursor\nFETCH NEXT FROM recipe_cursor\nINTO @RecipeID,\
    \ @RecipeName\nWHILE @@FETCH_STATUS = 0\nBEGIN\n    PRINT ' '\n    SELECT @message\
    \ = '----- Ingredients For Recipe: ' + @RecipeName + '-----'\n    PRINT @message\n\
    \    SELECT ing.IngredientName, srv.ServingPortionQuantity, srv.ServingPortionUnit\n\
    \    FROM dbo.Ingredient ing\n    INNER JOIN dbo.RecipeIngredient recing\n   \
    \     ON ing.IngredientID = recing.IngredientID\n    INNER JOIN dbo.ServingPortion\
    \ srv\n        ON recing.ServingPortionID = srv.ServingPortionID\n    WHERE recing.RecipeID\
    \ = @RecipeID\n    FETCH NEXT FROM recipe_cursor INTO @RecipeID, @RecipeName\n\
    END\nCLOSE recipe_cursor;\nDEALLOCATE recipe_cursor;\n```\n\n**Listing 4-15**\n\
    Creating a Dynamic Cursor\n\nThis query will give us the exact results we want,\
    \ but SQL Server will have to repeat the logic inside the cursor for each row\
    \ that the cursor will be analyzing. When the query logic inside the cursor is\
    \ written well, there can be minimal impact. However, the real challenges happen\
    \ when the T-SQL code inside the query either performs slowly or uses a significant\
    \ amount of hardware. Then the server and even the applications can feel the pain\
    \ every time the code inside the cursor is executed. While it is easy to blame\
    \ cursors specifically, there are other scenarios like `WHILE` loops that have\
    \ the same potential for issues.\n\n## Performance Degradation Over Time\n\nAnother\
    \ of the larger struggles here is that even if the code performs well when it\
    \ is first created, there is still the potential for the performance of this code\
    \ to decrease over time as the database grows or the shape of the data changes.\
    \ In those situations, what once appeared to be a great solution can quickly become\
    \ one of the largest headaches. There are some options available to get the same\
    \ output but write the T-SQL code in a manner that is more efficient and less\
    \ resource intensive. In Listing [4-16](#480547_1_En_4_Chapter.xhtml#PC16), you\
    \ will see some comments that are trying to outline the steps needed to get the\
    \ same data output as would be returned in Listing [4-15](#480547_1_En_4_Chapter.xhtml#PC15).\n\
    \n```sql\n-- Create Report Heading for All Recipes\n-- Repeat the following per\
    \ recipe\n---- Create Section Subheading per Recipe\n---- List All Ingredients\
    \ Per Recipe\n```\n\n**Listing 4-16**\nSimplifying T-SQL Code Logic with Comments\n\
    \n## A Methodical Approach to Rewriting\n\nWhen working with queries where the\
    \ logic is not straightforward, I will start by breaking down the overall request\
    \ into smaller pieces. Ideally, the process of breaking the acceptance criteria\
    \ down will allow me to focus on where I can start minimizing data. I will look\
    \ at the query from two different perspectives. The first is determining how I\
    \ can start paring the data down to only the data I will need in my result. I\
    \ usually try to do that as early as possible in my query design. I will also\
    \ try to look for the sections where I know the T-SQL code needed will be simple.\n\
    \nWhen referring to Listing [4-15](#480547_1_En_4_Chapter.xhtml#PC15), I can tell\
    \ that I need a way to pull all ingredients per recipe. I also want to find a\
    \ way to insert some sort of header between each recipe. I will eventually want\
    \ to figure out how to insert the header row. However, I will first write a query\
    \ to pull back all recipes and their ingredients. I have written that query in\
    \ Listing [4-17](#480547_1_En_4_Chapter.xhtml#PC17).\n\n```sql\n-- Create Report\
    \ Heading for All Recipes\n-- Repeat the following per recipe\n---- Create Section\
    \ Subheading per Recipe\n---- List All Ingredients Per Recipe\nSELECT\n    rec.RecipeName,\n\
    \    ing.IngredientName,\n    srv.ServingPortionQuantity,\n    srv.ServingPortionUnit\n\
    FROM dbo.Ingredient ing\nINNER JOIN dbo.RecipeIngredient recing\n    ON ing.IngredientID\
    \ = recing.IngredientID\nINNER JOIN dbo.Recipe rec\n    ON recing.RecipeID = rec.RecipeID\n\
    INNER JOIN dbo.ServingPortion srv\n    ON recing.ServingPortionID = srv.ServingPortionID\n\
    ORDER BY rec.RecipeName, ing.IngredientName\n```\n\n**Listing 4-17**\nGet All\
    \ Ingredients for All Recipes\n\nOnce I have a starting point of data, I can continue\
    \ to add additional pieces of logic. I will start with the main part of the data\
    \ I am trying to pull back and branch out from there. In this example, I start\
    \ adding header information as shown in Listing [4-18](#480547_1_En_4_Chapter.xhtml#PC18).\n\
    \n```sql\n-- Create Report Heading for All Recipes\nPRINT '-------- Recipe Listing\
    \ --------';\n-- Repeat the following per recipe\n---- Create Section Subheading\
    \ per Recipe\nSELECT\n    '----- Ingredients For Recipe: ' + rec.RecipeName +\
    \ '-----' AS 'SectionHeader'\nFROM  dbo.Recipe rec\n---- List All Ingredients\
    \ Per Recipe\nSELECT\n    rec.RecipeID,\n    rec.RecipeName,\n    ing.IngredientName,\n\
    \    srv.ServingPortionQuantity,\n    srv.ServingPortionUnit\nFROM dbo.Ingredient\
    \ ing\nINNER JOIN dbo.RecipeIngredient recing\n    ON ing.IngredientID = recing.IngredientID\n\
    INNER JOIN dbo.Recipe rec\n    ON recing.RecipeID = rec.RecipeID\nINNER JOIN dbo.ServingPortion\
    \ srv\n    ON recing.ServingPortionID = srv.ServingPortionID\nORDER BY rec.RecipeName,\
    \ ing.IngredientName\n```\n\n**Listing 4-18**\nGet All the Data Pulled Together\n\
    \nAfter adding some header information, I am ready to start getting the output\
    \ to match the current output. In Listing [4-19](#480547_1_En_4_Chapter.xhtml#PC19),\
    \ you can see all the code that was required to match the original output.\n\n\
    ```sql\nSET NOCOUNT ON;\n-- Create Report Heading for All Recipes\nPRINT '--------\
    \ Recipe Listing --------';\nPRINT '\n-- Create a temporary table to store the\
    \ recipe information\nCREATE TABLE #RecipeList\n(\n    OrderedList           \
    \  INT,\n    RecipeID                INT,\n    SectionHeader           VARCHAR(100)\n\
    );\n-- Repeat the following per recipe\n---- Create Section Spacing per Recipe\n\
    INSERT INTO #RecipeList (OrderedList, RecipeID, SectionHeader)\nSELECT\n    0\
    \ AS 'OrderedList',\n    rec.RecipeID,\n    '' AS 'SectionHeader'\nFROM  dbo.Recipe\
    \ rec\nWHERE rec.RecipeID < 3\n---- Create Section Subheading per Recipe\nINSERT\
    \ INTO #RecipeList (OrderedList, RecipeID, SectionHeader)\nSELECT\n    10 AS 'OrderedList',\n\
    \    rec.RecipeID,\n    '----- Ingredients For Recipe: ' + rec.RecipeName AS 'SectionHeader'\n\
    FROM  dbo.Recipe rec\nWHERE rec.RecipeID < 3\n---- Add the column headings for\
    \ ingredients per recipe\nINSERT INTO #RecipeList (OrderedList, RecipeID, SectionHeader)\n\
    SELECT\n    15 AS 'OrderedList',\n    rec.RecipeID,\n    CAST(''IngredientName''\
    \ AS CHAR(25)) + '' '' +\n    CAST(''ServingPortionQuantity'' AS CHAR(22)) + ''\
    \ '' +\n    CAST(''ServingPortionUnit'' AS CHAR(19)) AS 'SectionHeader'\nFROM\
    \  dbo.Recipe rec\nWHERE rec.RecipeID < 3\nINSERT INTO #RecipeList (OrderedList,\
    \ RecipeID, SectionHeader)\nSELECT\n    20 AS 'OrderedList',\n    rec.RecipeID,\n\
    \    ''------------------------- ---------------------- ------------------'' AS\
    \ 'SectionHeader'\nFROM  dbo.Recipe rec\nWHERE rec.RecipeID < 3\n---- List All\
    \ Ingredients Per Recipe\nINSERT INTO #RecipeList\n(\n    OrderedList,\n    RecipeID,\n\
    \    SectionHeader\n)\nSELECT\n    25 AS 'OrderedList',\n    rec.RecipeID,\n \
    \   CAST(ing.IngredientName AS CHAR(25)) + '' '' +\n    CAST(srv.ServingPortionQuantity\
    \ AS CHAR(22)) + '' '' +\n    CAST(srv.ServingPortionUnit AS CHAR(19)) AS 'SectionHeader'\n\
    FROM dbo.Ingredient ing\nINNER JOIN dbo.RecipeIngredient recing\n    ON ing.IngredientID\
    \ = recing.IngredientID\nINNER JOIN dbo.Recipe rec\n    ON recing.RecipeID = rec.RecipeID\n\
    INNER JOIN dbo.ServingPortion srv\n    ON recing.ServingPortionID = srv.ServingPortionID\n\
    WHERE rec.RecipeID < 3\nORDER BY rec.RecipeName, ing.IngredientName\nSELECT\n\
    \    SectionHeader\nFROM #RecipeList\nORDER BY RecipeID, OrderedList\nDROP TABLE\
    \ #RecipeList\n```\n\n**Listing 4-19**\nRewritten Query to Avoid Using a Cursor\n\
    \n## Comparing the Outputs\n\nThe original cursor gave the output shown in Figure\
    \ [4-4](#480547_1_En_4_Chapter.xhtml#Fig4) when the results were written to text.\n\
    \n![../images/480547_1_En_4_Chapter/480547_1_En_4_Fig4_HTML.jpg](images/480547_1_En_4_Chapter/480547_1_En_4_Fig4_HTML.jpg)\n\
    \n**Figure 4-4**\nOutput from Cursor\n\nTo confirm that our rewrite from Listing\
    \ [4-19](#480547_1_En_4_Chapter.xhtml#PC19) is correct, I captured the results\
    \ to text when executing the same query. The output in Figure [4-5](#480547_1_En_4_Chapter.xhtml#Fig5)\
    \ appears to be the same.\n\n![../images/480547_1_En_4_Chapter/480547_1_En_4_Fig5_HTML.jpg](images/480547_1_En_4_Chapter/480547_1_En_4_Fig5_HTML.jpg)\n\
    \n**Figure 4-5**\nOutput from Modified Query\n\nHowever, these outputs are only\
    \ the same when they are exported to text. When dealing with small sets of data,\
    \ the extra code and level of work may not seem to be required. As is usually\
    \ the case, most performance issues do not become apparent until the performance\
    \ is significantly and negatively impacted. In the case of these two methods,\
    \ when working with two records, the performance appeared the same. However, when\
    \ handling over 10,000 recipes, it becomes immediately clear that the query from\
    \ Listing [4-19](#480547_1_En_4_Chapter.xhtml#PC19) performs significantly better.\n\
    \n## Summary of the Chapter\n\nIn this chapter, I have covered how and why you\
    \ would want to use stored procedures. This includes creating code that is reusable\
    \ and consistent. I have also shown you how to use parameters. For the most part,\
    \ parameters will help make your code more adaptable and dynamic. Parameters are\
    \ helpful for many different scenarios. While parameters are very useful in many\
    \ different situations, you will also need to make sure your T-SQL is not being\
    \ negatively affected by parameter sniffing. I also covered a common situation\
    \ where you may need to solve complex problems using T-SQL. You will often find\
    \ your T-SQL performs better when you keep the code more straightforward. This\
    \ may mean that the code is not as readable or clean, but SQL Server will have\
    \ a better idea how to get an optimal execution plan.\n\n## Conclusion of the\
    \ Section\n\nThis also concludes the current section on writing understandable\
    \ T-SQL. This is T-SQL that uses the best data type for each scenario. This is\
    \ usually a data type that takes up the least amount of space possible and provides\
    \ the necessary accuracy. You will also want to understand the various SQL Server\
    \ database objects available that you can use to build your T-SQL. You will need\
    \ to determine the benefits vs. the challenges of using one database object vs.\
    \ another. In some cases, you will need to decide if code readability or database\
    \ performance is more important. Another aspect of writing understandable T-SQL\
    \ is formatting, naming, and commenting your T-SQL so that others can quickly\
    \ understand what you have written.\n\nWhen working with T-SQL, there will be\
    \ times where you want to write T-SQL that can be called consistently more than\
    \ once. This T-SQL code may also become more flexible using parameters. When faced\
    \ with writing T-SQL that is not straightforward, it will help you break the code\
    \ into segments to simplify what needs to be written. Once you feel comfortable\
    \ writing T-SQL that is understandable, you will be ready to start focusing on\
    \ writing T-SQL that is efficient and minimizes performance impact on SQL Server."
  raw: '## Using Complex Logic


    There are some basic operations in SQL Server that are not significantly complex.
    These basic operations can include inserting, reading, updating, and deleting
    table from single tables. Some of these operations may involve a couple of joins,
    but at some point in time, there may be a need for more complex logic. One of
    the challenges that happens while working with T-SQL is dealing with complex logic.


    When dealing with complex logic, it is important to keep a couple of things in
    mind. The first step in dealing with complex logic is breaking down the request
    into smaller parts. Part of this logic will be to figure out what data you need
    to start with and how to whittle that data down into a smaller data set. You will
    also want to focus on taking all the requirements and breaking those requirements
    down into simplified steps.


    Many of these query requests can involve either dealing with databases that were
    not designed to take advantage of the strengths for relational databases and systems
    that were not designed to be integrated or interacting with legacy applications.
    Oftentimes, we do not have control over what we are requested to do, and we are
    lucky if we get to design how the data is stored in the database.


    These types of scenarios can also involve various types of coding methodologies
    that do not necessarily coincide with best practices. This includes needing to
    loop through data including recursion. There are also times that you may want
    to use correlated subqueries or work with various strings such as XML or JSON.
    While many of these options may seem like they are the perfect solution, many
    of these options are overly complex. This is where the balancing act between making
    T-SQL code easy to understand and having T-SQL code that performs well can be
    tricky. My goal here is to show how using what seems like more advanced query
    techniques may be contributing to poor performance in your applications.


    It is often tempting with writing T-SQL to write your code in a way that matches
    the specific acceptance criteria or business request. Sometimes this will work
    well, and you will end up with code that performs very well. In other instances,
    not only can trying to write to solve complex problem be difficult and frustrating,
    but if the T-SQL code is not written in a way that works best for SQL Server,
    you have the potential to come across significant performance issues. I have found
    that SQL Server generally works best if you can keep your code simple and straightforward.
    This also means that using new functionality in SQL Server may not always yield
    the best results in terms of performance, even if the code is easier to write.


    The most common case I see where the T-SQL code that is written does not always
    consider how SQL Server performs best is involving loops. SQL Server allows many
    options for looping through data, and while the code will return the correct results,
    I often find the cost on SQL Server more significant than figuring out a different
    way of interacting with the same data. Looking back at Listing [2-29](#480547_1_En_2_Chapter.xhtml#PC29),
    I have pasted the same logic in Listing [4-15](#480547_1_En_4_Chapter.xhtml#PC15).


    ```

    SET NOCOUNT ON;

    DECLARE @RecipeID INT,

    @RecipeName VARCHAR(25),

    @message VARCHAR(50);

    PRINT ''-------- Recipe Listing --------'';

    DECLARE recipe_cursor CURSOR DYNAMIC

    FOR

    SELECT RecipeID, RecipeName

    FROM dbo.Recipe

    ORDER BY RecipeID;

    OPEN recipe_cursor

    FETCH NEXT FROM recipe_cursor

    INTO @RecipeID, @RecipeName

    WHILE @@FETCH_STATUS = 0

    BEGIN

    PRINT '' ''

    SELECT @message = ''----- Ingredients For Recipe: '' + @RecipeName + ''-----''

    PRINT @message

    SELECT ing.IngredientName, srv.ServingPortionQuantity, srv.ServingPortionUnit

    FROM dbo.Ingredient ing

    INNER JOIN dbo.RecipeIngredient recing

    ON ing.IngredientID = recing.IngredientID

    INNER JOIN dbo.ServingPortion srv

    ON recing.ServingPortionID = srv.ServingPortionID

    WHERE recing.RecipeID = @RecipeID

    FETCH NEXT FROM recipe_cursor INTO @RecipeID, @RecipeName

    END

    CLOSE recipe_cursor;

    DEALLOCATE recipe_cursor;

    Listing 4-15

    Creating a Dynamic Cursor

    ```


    This query will give us the exact results we want, but SQL Server will have to
    repeat the logic inside the cursor for each row that the cursor will be analyzing.
    When the query logic inside the cursor is written well, there can be minimal impact.
    However, the real challenges happen when the T-SQL code inside the query either
    performs slowly or uses a significant amount of hardware. Then the server and
    even the applications can feel the pain every time the code inside the cursor
    is executed. While it is easy to blame cursors specifically, there are other scenarios
    like WHILE loops that have the same potential for issues.


    Another of the larger struggles here is that even if the code performs well when
    it is first created, there is still the potential for the performance of this
    code to decrease over time as the database grows or the shape of the data changes.
    In those situations, what once appeared to be a great solution can quickly become
    one of the largest headaches. There are some options available to get the same
    output but write the T-SQL code in a manner that is more efficient and less resource
    intensive. In Listing [4-16](#480547_1_En_4_Chapter.xhtml#PC16), you will see
    some comments that are trying to outline the steps needed to get the same data
    output as would be returned in Listing [4-15](#480547_1_En_4_Chapter.xhtml#PC15).


    ```

    -- Create Report Heading for All Recipes

    -- Repeat the following per recipe

    ---- Create Section Subheading per Recipe

    ---- List All Ingredients Per Recipe

    Listing 4-16

    Simplifying T-SQL Code Logic with Comments

    ```


    When working with queries where the logic is not straightforward, I will start
    by breaking down the overall request into smaller pieces. Ideally, the process
    of breaking the acceptance criteria down will allow me to focus on where I can
    start minimizing data. I will look at the query from two different perspectives.
    The first is determining how I can start paring the data down to only the data
    I will need in my result. I usually try to do that as early as possible in my
    query design. I will also try to look for the sections where I know the T-SQL
    code needed will be simple.


    When referring to Listing [4-15](#480547_1_En_4_Chapter.xhtml#PC15), I can tell
    that I need a way to pull all ingredients per recipe. I also want to find a way
    to insert some sort of header between each recipe. I will eventually want to figure
    out how to insert the header row. However, I will first write a query to pull
    back all recipes and their ingredients. I have written that query in Listing [4-17](#480547_1_En_4_Chapter.xhtml#PC17).


    ```

    -- Create Report Heading for All Recipes

    -- Repeat the following per recipe

    ---- Create Section Subheading per Recipe

    ---- List All Ingredients Per Recipe

    SELECT

    rec.RecipeName,

    ing.IngredientName,

    srv.ServingPortionQuantity,

    srv.ServingPortionUnit

    FROM dbo.Ingredient ing

    INNER JOIN dbo.RecipeIngredient recing

    ON ing.IngredientID = recing.IngredientID

    INNER JOIN dbo.Recipe rec

    ON recing.RecipeID = rec.RecipeID

    INNER JOIN dbo.ServingPortion srv

    ON recing.ServingPortionID = srv.ServingPortionID

    ORDER BY rec.RecipeName, ing.IngredientName

    Listing 4-17

    Get All Ingredients for All Recipes

    ```


    Once I have a starting point of data, I can continue to add additional pieces
    of logic. I will start with the main part of the data I am trying to pull back
    and branch out from there. In this example, I start adding header information
    as shown in Listing [4-18](#480547_1_En_4_Chapter.xhtml#PC18).


    ```

    -- Create Report Heading for All Recipes

    PRINT ''-------- Recipe Listing --------'';

    -- Repeat the following per recipe

    ---- Create Section Subheading per Recipe

    SELECT

    ''----- Ingredients For Recipe: '' + rec.RecipeName + ''-----'' AS ''SectionHeader''

    FROM  dbo.Recipe rec

    ---- List All Ingredients Per Recipe

    SELECT

    rec.RecipeID,

    rec.RecipeName,

    ing.IngredientName,

    srv.ServingPortionQuantity,

    srv.ServingPortionUnit

    FROM dbo.Ingredient ing

    INNER JOIN dbo.RecipeIngredient recing

    ON ing.IngredientID = recing.IngredientID

    INNER JOIN dbo.Recipe rec

    ON recing.RecipeID = rec.RecipeID

    INNER JOIN dbo.ServingPortion srv

    ON recing.ServingPortionID = srv.ServingPortionID

    ORDER BY rec.RecipeName, ing.IngredientName

    Listing 4-18

    Get All the Data Pulled Together

    ```


    After adding some header information, I am ready to start getting the output to
    match the current output. In Listing [4-19](#480547_1_En_4_Chapter.xhtml#PC19),
    you can see all the code that was required to match the original output.


    ```

    SET NOCOUNT ON;

    -- Create Report Heading for All Recipes

    PRINT ''-------- Recipe Listing --------'';

    PRINT "

    -- Create a temporary table to store the recipe information

    CREATE TABLE #RecipeList

    (

    OrderedList             INT,

    RecipeID                INT,

    SectionHeader           VARCHAR(100)

    );

    -- Repeat the following per recipe

    ---- Create Section Spacing per Recipe

    INSERT INTO #RecipeList (OrderedList, RecipeID, SectionHeader)

    SELECT

    0 AS ''OrderedList'',

    rec.RecipeID,

    " AS ''SectionHeader''

    FROM  dbo.Recipe rec

    WHERE rec.RecipeID < 3

    ---- Create Section Subheading per Recipe

    INSERT INTO #RecipeList (OrderedList, RecipeID, SectionHeader)

    SELECT

    10 AS ''OrderedList'',

    rec.RecipeID,

    ''----- Ingredients For Recipe: '' + rec.RecipeName AS ''SectionHeader''

    FROM  dbo.Recipe rec

    WHERE rec.RecipeID < 3

    ---- Add the column headings for ingredients per recipe

    INSERT INTO #RecipeList (OrderedList, RecipeID, SectionHeader)

    SELECT

    15 AS ''OrderedList'',

    rec.RecipeID,

    CAST(''IngredientName'' AS CHAR(25)) + '' '' +

    CAST(''ServingPortionQuantity'' AS CHAR(22)) + '' '' +

    CAST(''ServingPortionUnit'' AS CHAR(19)) AS ''SectionHeader''

    FROM  dbo.Recipe rec

    WHERE rec.RecipeID < 3

    INSERT INTO #RecipeList (OrderedList, RecipeID, SectionHeader)

    SELECT

    20 AS ''OrderedList'',

    rec.RecipeID,

    ''------------------------- ---------------------- ------------------'' AS ''SectionHeader''

    FROM  dbo.Recipe rec

    WHERE rec.RecipeID < 3

    ---- List All Ingredients Per Recipe

    INSERT INTO #RecipeList

    (

    OrderedList,

    RecipeID,

    SectionHeader

    )

    SELECT

    25 AS ''OrderedList'',

    rec.RecipeID,

    CAST(ing.IngredientName AS CHAR(25)) + '' '' +

    CAST(srv.ServingPortionQuantity AS CHAR(22)) + '' '' +

    CAST(srv.ServingPortionUnit AS CHAR(19)) AS ''SectionHeader''

    FROM dbo.Ingredient ing

    INNER JOIN dbo.RecipeIngredient recing

    ON ing.IngredientID = recing.IngredientID

    INNER JOIN dbo.Recipe rec

    ON recing.RecipeID = rec.RecipeID

    INNER JOIN dbo.ServingPortion srv

    ON recing.ServingPortionID = srv.ServingPortionID

    WHERE rec.RecipeID < 3

    ORDER BY rec.RecipeName, ing.IngredientName

    SELECT

    SectionHeader

    FROM #RecipeList

    ORDER BY RecipeID, OrderedList

    DROP TABLE #RecipeList

    Listing 4-19

    Rewritten Query to Avoid Using a Cursor

    ```


    The original cursor gave the output shown in Figure [4-4](#480547_1_En_4_Chapter.xhtml#Fig4)
    when the results were written to text.


    ![../images/480547_1_En_4_Chapter/480547_1_En_4_Fig4_HTML.jpg](images/480547_1_En_4_Chapter/480547_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Output from Cursor


    To confirm that our rewrite from Listing [4-19](#480547_1_En_4_Chapter.xhtml#PC19)
    is correct, I captured the results to text when executing the same query. The
    output in Figure [4-5](#480547_1_En_4_Chapter.xhtml#Fig5) appears to be the same.


    ![../images/480547_1_En_4_Chapter/480547_1_En_4_Fig5_HTML.jpg](images/480547_1_En_4_Chapter/480547_1_En_4_Fig5_HTML.jpg)


    Figure 4-5


    Output from Modified Query


    However, these outputs are only the same when they are exported to text. When
    dealing with small sets of data, the extra code and level of work may not seem
    to be required. As is usually the case, most performance issues do not become
    apparent until the performance is significantly and negatively impacted. In the
    case of these two methods, when working with two records, the performance appeared
    the same. However, when handling over 10,000 recipes, it becomes immediately clear
    that the query from Listing [4-19](#480547_1_En_4_Chapter.xhtml#PC19) performs
    significantly better.


    In this chapter, I have covered how and why you would want to use stored procedures.
    This includes creating code that is reusable and consistent. I have also shown
    you how to use parameters. For the most part, parameters will help make your code
    more adaptable and dynamic. Parameters are helpful for many different scenarios.
    While parameters are very useful in many different situations, you will also need
    to make sure your T-SQL is not being negatively affected by parameter sniffing.
    I also covered a common situation where you may need to solve complex problems
    using T-SQL. You will often find your T-SQL performs better when you keep the
