  raw: 'Database Project After Added to Source Control


    Now that all items have been committed, you can see blue locks next to all the
    items. This signifies that all items have been properly checked into source control.


    Implementing source control is a big step into getting your database projects
    to be more manageable. Knowing why source control can not only help you but help
    you convince others to help champion a source control initiative at your company.
    You are also ready to reach out to other departments and put procedures in place
    that ensure everyone feels comfortable implementing source control. I have also
    walked through the beginning steps of getting your database added to source control.
    This is the beginning of a journey that will have some hiccups but also save you
    time in the long run. Now that you have implemented source control, you are ready
    for the next steps in managing your T-SQL code. The next chapter will focus on
    the various methods you can use to test your T-SQL code and confirm that you are
    complying with various coding standards.


    # 11. Testing


    When you need to write or modify some T-SQL code, you may be tempted to just start
    writing the code. In many cases, the necessary database code is simple enough
    that no additional analysis is needed. Eventually, there always comes a scenario
    where the data being queried or the T-SQL code is complex enough where you want
    to make certain that your code is working as expected. During these times, you
    might find that you want to test your T-SQL changes. While you can start testing
    T-SQL code at any time, you may find it helpful to start the habits early on before
    dealing with complex scenarios.


    You may be ready to start testing your code, but you do not know where to start.
    What type of testing you will do will depend on what you are trying to accomplish.
    You can implement testing to confirm that a single piece of functionality is working
    as expected. It is also possible to test interactions between two or more pieces
    of code. This type of testing can also be useful when trying to confirm the downstream
    effects of implementing changes to your T-SQL code. There is also testing that
    can be done to help ensure that the code you write matches your coding standards.
    While any type of testing is valuable, the most significant benefits come when
    using all three in conjunction.


    ## Unit Testing


    You have gotten your next task, and you are ready to start writing some T-SQL.
    You also want to implement functionally testing your code. When you are testing
    a single piece of code, this is called unit testing. Understanding what unit tests
    are and why you should use them can help improve your T-SQL code quality. Once
    you know what unit tests are, you will want to work toward learning when unit
    testing is beneficial. This will get you ready to start writing your first unit
    tests for SQL Server.


    The concept of unit testing is basic. You have a single change that you want to
    make to your T-SQL code. Unit testing allows you to test and confirm the functionality
    for a single piece of code. One of the common methods with unit testing is to
    create a scenario that fails, write the T-SQL code, run the unit test, and repeat
    until the unit test passes. This is test-driven design. Whether you are implementing
    new functionality or resolving a bug in T-SQL, unit tests can help verify your
    code.


    When creating unit tests, you will need to think differently than you normally
    would when you set out to write T-SQL code. We are creating unit tests to confirm
    that the code we are writing works as expected. In order to verify that your T-SQL
    code is working as expected, you will want your unit test to indicate a Pass.
    When creating your unit test, your first execution of the unit test should Fail.
    Starting with a failing unit test would indicate that the desired functionality
    does not exist.


    There are many different implementations of running unit tests. Unit tests can
    be written inside of Visual Studio. You can also use a free third-party unit testing
    framework that creates database objects in T-SQL. Another option is using a paid
    third-party tool to create and run your unit tests. There are benefits and drawbacks
    to each of these options.


    Another factor in determining how you will implement unit testing is in how you
    would like to run your unit tests. Depending on your environment, you may decide
    that you would prefer to manually run your unit tests. However, you may also decide
    that you want an automated way to run your unit tests. The easiest method that
    has the least amount of overhead is manually running your unit tests. This can
    either be running these tests with a stored procedure or through a GUI.


    You can use unit tests to verify just about anything with your database schema.
    Most of those unit tests will be for testing functionality for your database objects
    like stored procedures, views, and functions. I may be biased, but I hope you
    have far more stored procedures than views or queries. Do not be concerned if
    you do not have any unit tests in place now. You can create unit tests as you
    need them. This may mean that you do not have complete code coverage for your
    unit tests, but it prevents you from spending time implementing unit tests for
    code that is not modified frequently.


    Before I write my first unit test, I need to know what functionality I will be
    developing. In my case, I need to change the stored procedure dbo.GetRecipe to
    only display recipes that are active. When I first started unit testing my T-SQL
    code, I would run my unit tests manually. In this case, I would look for recipes
    that are currently not active. I can create a unit test to check for inactive
    records. If my unit test finds any inactive records, my unit test would fail.
    If my unit test does not find any inactive records, my unit test would succeed
    or pass. I would run the query shown in Listing [11-1](#480547_1_En_11_Chapter.xhtml#PC1)
    to find any recipes that are not active.


    ```

    SELECT

    RecipeID,

    RecipeName,

    IsActive

    FROM dbo.Recipe

    WHERE IsActive = 0;

    Listing 11-1

    Find Inactive Recipes

    ```


    When running this query, I might get the following results as displayed in Table
    [11-1](#480547_1_En_11_Chapter.xhtml#Tab1).


    Table 11-1


    Inactive Recipes'
  trans: "\n# 数据库项目加入源代码控制后\n\n现在所有项目都已提交，你可以在所有项目旁边看到蓝色锁图标。这表示所有项目都已正确签入源代码控制。\n\n\
    实施源代码控制是让你的数据库项目更易于管理的重要一步。了解源代码控制为何不仅能帮助你，还能帮助你说服他人，在你公司内推动源代码控制计划，这点很重要。你也已准备好联系其他部门，并制定相关流程，确保每个人都对实施源代码控制感到安心。我还带你了解了将数据库添加到源代码控制的初始步骤。这是一段旅程的开始，过程中可能会有些小波折，但从长远来看能为你节省时间。既然你已经实施了源代码控制，就为管理\
    \ T-SQL 代码的后续步骤做好了准备。下一章将重点介绍可用于测试 T-SQL 代码并确认你是否符合各种编码标准的多种方法。\n\n# 11. 测试\n\n\
    当你需要编写或修改一些 T-SQL 代码时，可能很想直接开始写代码。在许多情况下，必要的数据库代码足够简单，无需进行额外分析。但最终总会遇到这样的场景：被查询的数据或\
    \ T-SQL 代码足够复杂，以至于你希望确保你的代码能按预期工作。在这些时候，你可能会发现自己想要测试你的 T-SQL 更改。虽然你可以随时开始测试 T-SQL\
    \ 代码，但你可能会发现，在处理复杂场景之前尽早养成这种习惯会很有帮助。\n\n你可能已经准备好开始测试你的代码，但不知道从哪里开始。你将进行何种类型的测试取决于你想要实现的目标。你可以实施测试来确认单个功能是否按预期工作。也可以测试两个或多个代码块之间的交互。在试图确认对\
    \ T-SQL 代码的更改所产生的下游影响时，这种类型的测试也很有用。此外，还可以进行测试以帮助确保你编写的代码符合你的编码标准。虽然任何类型的测试都很有价值，但最显著的好处来自于同时运用这三种测试。\n\
    \n## 单元测试\n\n你接到了下一个任务，并准备好开始编写一些 T-SQL。你也想对你的代码实施功能测试。当你测试单个代码块时，这被称为单元测试。了解什么是单元测试以及为何应该使用它们，可以帮助提高你的\
    \ T-SQL 代码质量。一旦你了解了什么是单元测试，你就会想要学习在何时进行单元测试是有益的。这将为你开始为 SQL Server 编写你的第一个单元测试做好准备。\n\
    \n单元测试的概念很简单。你有一个想要对你的 T-SQL 代码进行的单个更改。单元测试允许你测试并确认单个代码块的功能。单元测试的一个常见方法是：创建一个失败的场景，编写\
    \ T-SQL 代码，运行单元测试，并重复直到单元测试通过。这就是测试驱动设计。无论你是在实现新功能还是在解决 T-SQL 中的错误，单元测试都可以帮助验证你的代码。\n\
    \n在创建单元测试时，你需要以与平时编写 T-SQL 代码不同的方式进行思考。我们创建单元测试是为了确认我们编写的代码能按预期工作。为了验证你的 T-SQL\
    \ 代码是否按预期工作，你会希望你的单元测试显示“通过”。在创建单元测试时，你第一次执行单元测试应该“失败”。从一个失败的单元测试开始，将表明所需的功能尚不存在。\n\
    \n运行单元测试有许多不同的实现方式。单元测试可以在 Visual Studio 内部编写。你也可以使用一个免费的第三方单元测试框架，该框架在 T-SQL\
    \ 中创建数据库对象。另一个选择是使用付费的第三方工具来创建和运行你的单元测试。每种选择都有其优缺点。\n\n决定如何实现单元测试的另一个因素是你希望如何运行你的单元测试。根据你的环境，你可能会决定更愿意手动运行你的单元测试。然而，你也可能会决定你想要一种自动化的方式来运行你的单元测试。开销最少、最简单的方法是手动运行你的单元测试。这可以通过存储过程或图形用户界面来完成。\n\
    \n你可以使用单元测试来验证数据库架构中的几乎所有内容。这些单元测试中的大多数将用于测试数据库对象的功能，例如存储过程、视图和函数。我可能有偏见，但我希望你的存储过程远多于视图或查询。如果你现在还没有任何单元测试，请不要担心。你可以在需要时创建单元测试。这可能意味着你的单元测试没有完整的代码覆盖，但这可以防止你花时间为不经常修改的代码实现单元测试。\n\
    \n在我编写第一个单元测试之前，我需要知道我将要开发什么功能。就我而言，我需要修改存储过程 `dbo.GetRecipe`，使其只显示处于活动状态的食谱。当我刚开始对我的\
    \ T-SQL 代码进行单元测试时，我会手动运行我的单元测试。在这种情况下，我会查找当前不处于活动状态的食谱。我可以创建一个单元测试来检查非活动记录。如果我的单元测试找到任何非活动记录，我的单元测试将失败。如果我的单元测试没有找到任何非活动记录，我的单元测试将成功或通过。我会运行清单\
    \ 11-1 中所示的查询来查找任何不处于活动状态的食谱。\n\n```sql\nSELECT\n    RecipeID,\n    RecipeName,\n\
    \    IsActive\nFROM dbo.Recipe\nWHERE IsActive = 0;\n```\n\n*清单 11-1 查找非活跃食谱*\n\
    \n运行此查询时，我可能会得到表 11-1 中显示的结果。\n\n*表 11-1 非活跃食谱*\n"
