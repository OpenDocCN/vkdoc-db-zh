  trans: '


    #### 选择必要数据


    SQL Server 能存储海量数据，也能检索大量数据。在许多应用场景中，应用程序都需要检索数据。初次学习数据库及相关表时，人们常常倾向于选择表中的所有列。尽管这是返回数据最简单的方法，但通常并非理想之选。


    首先是使用星号 (`*`) 选择所有行的语法。这种方法的问题在于，如果基础对象中的列发生变化，代码可能无法按预期工作。更糟糕的是，代码可能不会报错，用户也就无从知晓他们获取的是错误数据。


    第二个可能发生的问题更为常见。当你拉回所有列时，会给 SQL Server 带来相当大的额外工作量。SQL Server 不仅必须为返回的所有行返回所有数据，而且很可能无法使用任何索引来返回这些数据。这就好比每次想学习某个特定章节时，都要通读整本书。你固然能学到所需内容，但也会花费大量时间阅读那些当时很可能与你需求无关、因而会被忽略的主题。


    #### 可搜索的 (Sargeable)


    你希望 SQL Server 能够轻松地搜索数据库以找到你试图访问的信息。有一些编写 T-SQL 的方式可以让 SQL Server 利用索引快速找到必要的数据。然而，也存在其他编写
    T-SQL 的方法，它们能得到相同的结果，但可能耗时更长，并且需要 SQL Server 扫描更多数据。这两种情况的区别在于，第一种情况指的是确保你的 T-SQL
    是 **可搜索的 (sargeable)**，而第二种情况则是 T-SQL **不是可搜索的 (not sargeable)**。这通常发生在 T-SQL
    语句的 `WHERE` 子句中。在 `代码清单 9-1` 中，我编写了一个查询，用于查找所有在 2019 年 8 月创建的食谱。


    ```sql

    SELECT RecipeName, RecipeDescription

    FROM dbo.Recipe

    WHERE DATEPART(MM, DateCreated) = 8

    AND DATEPART(YY, DateCreated) = 2019

    ```


    `代码清单 9-1`

    使用不可搜索条件的查询


    你可以看到，我在创建日期 (`DateCreated`) 上使用了 `DATEPART` 函数来分别确定每条记录创建的月份和年份。为了让 SQL Server
    判断哪些记录属于 2019 年 8 月，它将需要检查表中的每一条记录。你可以从 `图 9-1` 中的 `索引扫描 (Index Scan)` 执行计划验证这一点。


    ![../images/480547_1_En_9_Chapter/480547_1_En_9_Fig1_HTML.jpg](img/480547_1_En_9_Fig1_HTML.jpg)


    `图 9-1`

    来自不可搜索条件的执行计划


    当执行计划如此简单时，有时很难直观地了解这些查询的实际性能如何。一个更好的方法是查看与此执行计划相关的属性。`图 9-2` 包含大量信息，但我们将重点关注
    **已读取行数 (Number of Rows Read)**。


    ![../images/480547_1_En_9_Chapter/480547_1_En_9_Fig2_HTML.jpg](img/480547_1_En_9_Fig2_HTML.jpg)


    `图 9-2`

    来自不可搜索条件的 `索引扫描` 属性


    `代码清单 9-1` 中 `索引扫描` 的已读取行数是 32,242。为了更好地判断这个查询的性能表现，我还会编写一个使用可搜索值的查询。在 `代码清单 9-2`
    中，我仍然查询 `dbo.Recipe` 表中 2019 年 8 月创建的记录，但我现在使用大于等于 (`>=`) 和小于 (`<`) 来指定一个确切的日期范围。


    ```sql

    SELECT RecipeName, RecipeDescription

    FROM dbo.Recipe

    WHERE DateCreated >= ''8/1/19''

    AND DateCreated < ''9/1/19''

    ```


    `代码清单 9-2`

    使用可搜索条件的查询


    虽然这看起来不够简洁或更难阅读，但重点在于编写一个查询，让 SQL Server 能够快速确定哪些记录满足查询中请求的条件。`图 9-3` 显示了 `代码清单
    9-2` 中查询的执行计划。


    ![../images/480547_1_En_9_Chapter/480547_1_En_9_Fig3_HTML.jpg](img/480547_1_En_9_Fig3_HTML.jpg)


    `图 9-3`

    来自可搜索条件的执行计划


    乍一看，`图 9-3` 中的执行计划与 `图 9-1` 中的执行计划非常相似。在比较外观相似的执行计划时，可以说它们具有相同的 **形状 (shape)**。虽然这些执行计划形状相似，但构成执行计划的具体项目却不同。在
    `图 9-1` 中，我们看到有一个 `索引扫描 (Index Scan)`。在 `图 9-3` 中，我们可以看到这个执行计划使用的是 `索引查找 (Index
    Seek)`。此外，`图 9-3` 中 `SELECT` 的 `索引查找` 之间的连线也比 `图 9-1` 中 `SELECT` 的 `索引扫描` 的连线更细。所有这些都以图形化的方式代表了每个查询的整体性能。不过，我们也可以获取一些事实和数据来比较
    `代码清单 9-1` 和 `9-2` 中查询的性能。在 `图 9-2` 中，我们发现实际读取的行数是 32,242。我们可以将这个值与 `图 9-4` 中显示的`实际读取行数`进行比较。


    ![../images/480547_1_En_9_Chapter/480547_1_En_9_Fig4_HTML.jpg](img/480547_1_En_9_Fig4_HTML.jpg)


    `图 9-4`

    来自可搜索条件的 `索引查找` 属性


    如 `图 9-4` 所示，`代码清单 9-2` 的实际读取行数是 1。将 `代码清单 9-2` 读取的 1 行与 `代码清单 9-1` 读取的 32,242
    行进行比较，哪个查询更高效就变得非常清楚了。


    我们还可以查看两个查询的总 CPU 使用率，以了解每个查询的性能表现。如果我同时运行 `代码清单 9-1` 和 `9-2` 中的两个查询，两者执行计划总时间的
    98% 都消耗在 `代码清单 9-1` 的查询上。我也可以使用 `SET STATISTICS TIME ON` 来查找 CPU 时间和已用时间。CPU 时间是查询执行在
    CPU 上花费的总时间。已用时间是查询执行的总时间。我多次运行这两个查询，发现 `代码清单 9-1` 的平均 CPU 时间是 15 毫秒，平均已用时间是 17
    毫秒。而 `代码清单 9-2` 每次的 CPU 时间和已用时间都是 0 毫秒。比较 CPU 时间和已用时间，我们可以清楚地看到 `代码清单 9-2` 的性能优于
    `代码清单 9-1`。同样重要的是要注意，如果存在多个 CPU，总已用时间可能少于总 CPU 时间。


    '
- fmt: '## Implicit Conversion


    The data in SQL Server has a data type. These data types are discussed further
    in Chapter [1](#480547_1_En_1_Chapter.xhtml). When using these data types, it
    is important to make sure you keep the data types consistent. Otherwise, SQL Server
    must undergo an implicit conversation. This is where SQL Server converts one data
    type to another behind the scenes. This can cause additional load on SQL Server.
    In addition, there is a risk that the implicit conversion will fail. I see this
    most when an identification type column saves mostly integer values but occasionally
    strings.


    ## SET NOCOUNT ON


    There are many small tweaks that you can make to your T-SQL that will allow for
    some minor performance improvements. When you run T-SQL code by default, it will
    count the number of rows affected and can report those back. The cost of counting
    these records can be a few extra milliseconds. Therefore, a possible enhancement
    to the coding standards is to turn this functionality off, particularly when it
    involves stored procedures. The way to accomplish this is to make sure that `SET
    NOCOUNT ON` is included inside of a stored procedure. You can see this in Listing
    [9-3](#480547_1_En_9_Chapter.xhtml#PC3).


    ```

    CREATE PROCEDURE dbo.UpdateRecipeMenuType

    @RecipeMeal RecipeMealType READONLY

    AS

    SET NOCOUNT ON

    UPDATE rec

    SET MealTypeID = meal.MealTypeID

    FROM dbo.Recipe rec

    INNER JOIN @RecipeMeal recmeal

    ON rec.RecipeName = recmeal.RecipeName

    INNER JOIN dbo.MealType meal

    ON recmeal.MealTypeName = meal.MealTypeName

    Listing 9-3

    Stored Procedure Using SET NOCOUNT ON

    ```


    When `SET NOCOUNT ON` is included before the query code is executed, the stored
    procedure can execute in a couple fewer milliseconds.


    ## NULL Values


    Most of the T-SQL Coding Standards exist to help improve overall performance for
    SQL Server. However, some T-SQL coding standards exist to help improve query results
    or make it easier for people to write code that works as expected. One of the
    issues with `NULL` is that it does not work intuitively. `NULL` is treated as
    an unknown value in SQL Server. That means that `NULL` is neither `True` nor `False`.
    Therefore, where there are fields that can contain `NULL` values, the way these
    fields must be treated is different.


    In addition, `NULL` values may indicate that tables were not designed efficiently.
    Before ending up in these scenarios, it may be beneficial to consider how the
    table should be designed. You will want to make sure that the table really needs
    to include nullable columns. This is also due to how data is stored and how indexes
    are created. You will want to consider how this data will be used.


    ## NOLOCK


    There are also factors involved in T-SQL Coding Standards. Some of these include
    things that you may consider best practices. Some of the very common best practices
    include highly debated topics like if or when to use the `NOLOCK` hint in queries.
    One of the reasons I mention this specifically is that there are at least two
    very distinct groups involving `NOLOCK`. On the one hand, many database administrators
    view not using `NOLOCK` is a best practice. On the other hand, there are many
    developers that see the opposite side that the use of `NOLOCK` is a best practice.
    This difference in perspective is based on a trade-off between data accuracy and
    performance.


    The idea behind `NOLOCK` is to improve query performance by reducing the number
    of locks. In the case of `NOLOCK`, the reduction in lock activity is on the `SELECT`
    statement. Actions such as `INSERT`, `UPDATE`, and `DELETE` are not affected by
    `NOLOCK`. However, using `NOLOCK` on a `SELECT` statement can return results more
    quickly when a data modification action is holding a lock on that same table that
    the `SELECT` statement is trying to access.


    We can get an idea of how these viewpoints are correct by looking at an example.
    In Listing [9-4](#480547_1_En_9_Chapter.xhtml#PC4), I have written a query to
    insert a record into the `dbo.Recipe` table inside of an explicit transaction.


    ```

    BEGIN TRAN

    INSERT INTO dbo.Recipe

    (

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    )

    VALUES

    (

    ''Baked Acorn Squash'',

    ''Acorn squash with butter and brown sugar'',

    4,

    4,

    1,

    1,

    GETDATE(),

    GETDATE()

    )

    Listing 9-4

    Insert Record into dbo.Recipe

    ```


    In Listing [9-4](#480547_1_En_9_Chapter.xhtml#PC4), I have started an explicit
    transaction using `BEGIN TRAN`, but I have not specified a `COMMIT` or `ROLLBACK`.
    This will leave the transaction open with a lock on `dbo.Recipe`. To simulate
    application performance, I will open a separate query window and run a query to
    try and find all records created in this table after August 1, 2019. You can see
    a sample of this query in Listing [9-5](#480547_1_En_9_Chapter.xhtml#PC5).


    ```

    SELECT RecipeName, RecipeDescription

    FROM dbo.Recipe

    WHERE DateCreated > ''8/1/19'';

    Listing 9-5

    Query to Find Recent Recipes

    ```


    Due to the lock on `dbo.Recipe` from the query in Listing [9-4](#480547_1_En_9_Chapter.xhtml#PC4),
    it seems like my query is continuing to run. The query in Listing [9-5](#480547_1_En_9_Chapter.xhtml#PC5)
    is waiting for the locks to be released before any data can be returned. In order
    to get results more quickly, I can change how SQL Server treats the locks on the
    table. In Listing [9-6](#480547_1_En_9_Chapter.xhtml#PC6), I have modified the
    query from Listing [9-5](#480547_1_En_9_Chapter.xhtml#PC5) and included a query
    hint of `WITH (NOLOCK)`.


    ```

    SELECT RecipeName, RecipeDescription

    FROM dbo.Recipe WITH(NOLOCK)

    WHERE DateCreated > ''8/1/19'';

    Listing 9-6

    Query to Find Recent Recipes Using NOLOCK Hint

    ```


    When I run the query in Listing [9-5](#480547_1_En_9_Chapter.xhtml#PC5) in a separate
    query window, I get nearly instantaneous results. You can see an example of these
    results in Table [9-1](#480547_1_En_9_Chapter.xhtml#Tab1).


    Table 9-1

    Recipes Created After August 1, 2019


    | RecipeName | RecipeDescription |

    | --- | --- |

    | Lee’s Hamburgers | The best hamburgers |

    | Acorn Squash | Acorn squash with butter and brown sugar |


    Looking at the preceding results, you can see that the record inserted in Listing
    [9-4](#480547_1_En_9_Chapter.xhtml#PC4) is included in the results. However, this
    record has not been committed to SQL Server. I could roll back the transaction
    from Listing [9-4](#480547_1_En_9_Chapter.xhtml#PC4) and undo the insert. This
    would cause the results from Table [9-1](#480547_1_En_9_Chapter.xhtml#Tab1) to
    be inaccurate. This discrepancy where queries return results that are not fully
    committed to the database is known as a dirty read. This is the largest risk when
    using `NOLOCK` in your queries. Before deciding that you should use `NOLOCK` in
    your T-SQL code, make sure that the business, including your end users, understands
    the potential risks of using this hint.'
