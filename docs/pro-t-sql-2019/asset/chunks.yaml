    There are times where the query logic is complex enough that I may not quickly
    understand all the T-SQL code or other times where I am troubleshooting very large
    data sets. If I write a simpler query that returns all the data that I want, I
    will often write an INTERSECT between those two queries to find where the records
    match. Using the same general query as earlier, I want to show you what the data
    returned will look like when using INTERSECT as compared to the other options.
    In Listing [5-3](#480547_1_En_5_Chapter.xhtml#PC3), you can see the query to find
    the intersection between the two queries.


    ```

    SELECT IngredientID, IngredientName

    FROM dbo.Ingredient

    WHERE IngredientName LIKE ''%Tomato%''

    INTERSECT

    SELECT IngredientID, IngredientName

    FROM dbo.Ingredient

    WHERE Measurement = ''Ounces''

    Listing 5-3

    Intersect of Two Queries

    ```


    We already know what results returned for each query individually from the preceding
    figures. The actual results for the preceding T-SQL code are shown in Table [5-24](#480547_1_En_5_Chapter.xhtml#Tab24).


    Table 5-24


    Intersect of Results from Tables [5-21](#480547_1_En_5_Chapter.xhtml#Tab21) and
    [5-22](#480547_1_En_5_Chapter.xhtml#Tab22)


    | IngredientID | IngredientName |

    | --- | --- |

    | 4 | Tomato Paste |


    In addition, if I am trying to find missing records or verify that there are matching
    records, I will use an EXCEPT between two queries. Listing [5-4](#480547_1_En_5_Chapter.xhtml#PC4)
    shows what the T-SQL code would look like if you were trying to exclude the results
    from one query from the results of the other query.


    ```

    SELECT IngredientID, IngredientName

    FROM dbo.Ingredient

    WHERE IngredientName LIKE ''%Tomato%''

    EXCEPT

    SELECT IngredientID, IngredientName

    FROM dbo.Ingredient

    WHERE Measurement = ''Ounces''

    Listing 5-4

    Except of Two Queries

    ```


    In this case, the first query returns all results where the ingredient name includes
    the word tomato. However, the except statement indicates that if a record is returned
    in both the first and second query, then the record will be excluded from the
    result set. The results of this query is in Table [5-25](#480547_1_En_5_Chapter.xhtml#Tab25).


    Table 5-25


    Except of Results from Tables [5-21](#480547_1_En_5_Chapter.xhtml#Tab21) and [5-22](#480547_1_En_5_Chapter.xhtml#Tab22)


    | IngredientID | IngredientName |

    | --- | --- |

    | 2 | Tomato Sauce |

    | 3 | Diced Tomatoes |


    Using an EXCEPT statement may not be the preferred method to exclude results from
    a data set, but it is the method that I am more accustomed to using. Therein lies
    the benefits and challenges of T-SQL code, for almost any scenario there is almost
    certainly more than one way to write T-SQL code. Depending on the reason you are
    writing database code will determine the level of flexibility you have in writing
    your code. If you are executing a query for a single time, you may be able to
    use a less efficient method to access this data. However, if you are writing your
    code for an application, you will want to balance how you write your T-SQL code
    to be both efficient and readable.


    Listing [5-5](#480547_1_En_5_Chapter.xhtml#PC5) is an example of how to use data
    sets when inserting data.


    ```

    CREATE TABLE #TempIngredientNutrition

    (

    IngredientID      INT         NOT NULL,

    IngredientName    VARCHAR(25) NOT NULL,

    Calories          TINYINT     NOT NULL,

    Sugar             TINYINT     NOT NULL,

    Fiber             TINYINT     NOT NULL,

    Protein           TINYINT     NOT NULL

    )

    INSERT INTO #TempIngredientNutrition

    (

    IngredientID,

    IngredientName,

    Calories,

    Sugar,

    Fiber,

    Protein

    )

    SELECT

    ing.IngredientID,

    ing.IngredientName,

    nutr.Calories,

    nutr.Sugar,

    nutr.Fiber,

    nutr.Protein

    FROM dbo.Ingredient ing

    INNER JOIN dbo.IngredientNutrition nutr

    ON ing.IngredientID = nutr.IngredientID

    Listing 5-5

    Inserting Data as a Set

    ```


    As shown in Listing [5-6](#480547_1_En_5_Chapter.xhtml#PC6), this is what the
    insert statements would look like if there were inserted record by record.


    ```

    CREATE TABLE #TempIngredientNutrition

    (

    IngredientID      INT         NOT NULL,

    IngredientName    VARCHAR(25) NOT NULL,

    Calories          TINYINT     NOT NULL,

    Sugar             TINYINT     NOT NULL,

    Fiber             TINYINT     NOT NULL,

    Protein           TINYINT     NOT NULL

    )

    INSERT INTO #TempIngredientNutrition

    (

    IngredientID,

    IngredientName,

    Calories,

    Sugar,

    Fiber,

    Protein

    )

    VALUES (1, ''Italian Sausage'', 180, 5, 1, 18)

    INSERT INTO #TempIngredientNutrition

    (

    IngredientID,

    IngredientName,

    Calories,

    Sugar,

    Fiber,

    Protein

    )

    VALUES (2, ''Tomato Sauce'', 60, 7, 2, 1)

    INSERT INTO #TempIngredientNutrition

    (

    IngredientID,

    IngredientName,

    Calories,

    Sugar,

    Fiber,

    Protein

    )

    VALUES (3, ''Diced Tomatoes'', 20, 2, 3, 1)

    Listing 5-6

    Inserting Data Record by Record

    ```


    As you can see, inserting data record by record takes up considerably more code
    and can be quite a bit more tedious.


    One of my favorite uses for data sets is to update data. In many situations, I
    am not updating a specific record, but I am updating multiple records that share
    the same characteristics. If I want to make all these ingredients inactive from
    the table, I have a couple different ways I can do this. For instance, I can write
    one update statement per record to set the IsActive value to zero as shown in
    Listing [5-7](#480547_1_En_5_Chapter.xhtml#PC7).


    ```

    UPDATE dbo.Ingredient

    SET IsActive = 0

    WHERE IngredientID = 1

    UPDATE dbo.Ingredient

    SET IsActive = 0

    WHERE IngredientID = 2

    UPDATE dbo.Ingredient

    SET IsActive = 0

    WHERE IngredientID = 3

    UPDATE dbo.Ingredient

    SET IsActive = 0

    WHERE IngredientID = 4

    UPDATE dbo.Ingredient

    SET IsActive = 0

    WHERE IngredientID = 5

    Listing 5-7

    Updating Data Record by Record

    ```


    This would require five unique transactions. In addition, SQL Server would have
    to access the data page that each of these records was on five times. As shown
    in Listing [5-8](#480547_1_En_5_Chapter.xhtml#PC8), I could also write a query
    that would allow me to update all five records at once.


    ```

    UPDATE dbo.Ingredient

    SET IsActive = 0

    WHERE IngredientID BETWEEN 1 AND 5

    Listing 5-8

    Updating Data as a Range

    ```


    In fact, if all five of these records lived on the same data page, I would only
    need to access that page once. A much more likely scenario would be a request
    to deactivate all ingredients that contained the word tomato in the ingredient name.
    This is type of pattern you want to find. If there is a pattern like this, you
    can write a query like the one in Listing [5-9](#480547_1_En_5_Chapter.xhtml#PC9).


    ```

    UPDATE dbo.Ingredient

    SET IsActive = 0

    WHERE IngredientName LIKE ''%Tomato%''

    Listing 5-9

    Updating Data as a Data Set

    ```


    This query accomplishes two goals. It lets you update more than one record in
    a given query. This T-SQL code also uses the data set for all ingredients that
    contain the word tomato to determine which records should be updated.'
