    \ been committed, you can see blue locks next to all the items. This signifies\
    \ that all items have been properly checked into source control.\n\nImplementing\
    \ source control is a big step into getting your database projects to be more\
    \ manageable. Knowing why source control can not only help you but help you convince\
    \ others to help champion a source control initiative at your company. You are\
