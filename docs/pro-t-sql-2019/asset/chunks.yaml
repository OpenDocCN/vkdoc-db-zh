- fmt: '## 创建分区方案


    创建分区函数很有帮助。分区函数让 SQL Server 知道如何对数据进行分区。然而，你还需要指明 SQL Server 应该如何使用该分区函数。这时，你需要创建一个分区方案。分区方案将特定的分区函数映射到文件组。你可以查看清单
    [15-4](#480547_1_En_15_Chapter.xhtml#PC4) 中的 T-SQL 代码来创建分区方案。


    ```sql

    CREATE PARTITION SCHEME RecipeHistRange

    AS PARTITION RecipeHistFunc TO

    (

    RecipeHistory2018,

    RecipeHistory2019Q1,

    RecipeHistory2019Q2,

    RecipeHistory2019Q3

    );

    Listing 15-4

    Creation Partition Scheme

    ```


    分区方案有一个特定的名称，并引用了要使用的分区函数。分区函数和分区方案之间的一个区别是，分区函数指定了三个值。然而，分区方案有四个值。由于我们指定分区函数的范围是
    `RIGHT`，因此在分区函数指定的第一个日期之前的所有值最终都将位于第一个文件组中。回顾清单 [15-3](#480547_1_En_15_Chapter.xhtml#PC3)
    和清单 [15-4](#480547_1_En_15_Chapter.xhtml#PC4) 之间的 T-SQL 代码，你可以看到分区函数中指定的第一个值与
    2019 年第一季度的开始日期相关联。


    在我们将此分区方案应用到特定数据表之前，我们需要熟悉与分区相关的一些其他方面。几乎每次有人谈论分区时，他们也会指出分区并不一定是用来提高性能的。有很多原因可能导致分区无法提升性能，其中一些原因是分区可能没有得到正确实施。在考虑分区时，你需要重点关注将使用哪个数据列来对数据进行分区。这被称为分区列。你需要了解分区列的原因是，这个分区列将决定你后续如何编写
    T-SQL 代码。


    你需要在所有 T-SQL 代码中使用分区列的原因在于 SQL Server 使用分区的方式。一旦你对数据进行了分区，SQL Server 将以不同于非分区表的方式搜索分区数据。分区实施后，SQL
    Server 将使用分区来确定表的哪个部分包含查询请求的数据。如果我按日期搜索记录，SQL Server 会很快知道确切访问哪个分区来查找数据。但是，如果我不指定日期，而是查找关于特定配方的信息，SQL
    Server 将遍历每个分区来查找我请求的信息。在数据库中实施分区时，选择一个好的分区列非常重要。如果你选择的列不是频繁或几乎总是作为查询的一部分使用，你可能会因拥有分区而产生额外的性能开销。


    通常建议，你不应主要为了提高性能而实施分区。虽然总体目标是简化随时间推移的数据管理，但你可以实施一些功能来增加提高性能的可能性。其中一种方法是如何对分区表进行索引。你需要创建与表上分区类似的分段索引。这些索引称为对齐分区索引。对齐分区索引可以是聚集索引或非聚集索引。根据对齐分区索引是否唯一，有不同的要求。然而，一般结果是相同的。两种类型的对齐分区索引都将包含对分区列的引用。对于唯一的对齐聚集或非聚集索引，分区列必须是索引的一部分。另一方面，在创建非唯一对齐索引时，你不必指定分区列。如果分区列不是对齐索引的一部分，SQL
    Server 将在索引中添加一个对分区列的回引。


    也有可能创建与你的分区不同段的索引。然而，这些索引可以有自己的分区。这些被认为是非对齐分区索引。在某些特定情况下，你会想要使用这种类型的索引，例如确认非分区列的列中的每个值都是唯一的。但是，我会限制非对齐分区索引的使用，因为依赖于索引的查询可能会性能更差，因为可能需要扫描整个表才能找到所有相关记录。由于非对齐分区索引不是表分区函数的一部分，因此你不需要在索引中指定分区列。


    最终，使用分区的目标是在尝试读取或更新数据时，减少 SQL Server 访问的记录数。你可以以这样的方式编写查询：SQL Server 可以快速确定哪些分区拥有请求的数据。当
    SQL Server 生成忽略特定分区的执行计划时，这称为分区消除。SQL Server 可以将一个非常大的表视为许多较小的表。通过这样做，SQL Server
    只需要与分区表的一个子集进行交互。这是你通过分区提高性能的最佳机会。但是，为了让你的查询利用分区消除，你需要在查询中引用分区列。否则，SQL Server
    将不知道访问哪个分区。


    在本节前面，我创建了新的文件组并将其添加到当前数据库。我还创建了一个新的分区函数和方案。在清单 [15-5](#480547_1_En_15_Chapter.xhtml#PC5)
    中，你可以看到添加新分区的 T-SQL。


    ```sql

    ALTER DATABASE Menu

    ADD FILEGROUP RecipeHistory2019Q4;

    ALTER DATABASE Menu

    ADD FILE

    (

    NAME = RecipeHistFG2019Q4,

    FILENAME = ''D:\SQLData\RecipeHistFG2019Q4.ndf'',

    SIZE = 50MB

    )

    TO FILEGROUP RecipeHistory2019Q4;

    ALTER PARTITION FUNCTION RecipeHistFunc(DATETIME2)

    AS SPLIT RANGE (''10/01/2019'');

    ALTER PARTITION SCHEME RecipeHistRange

    NEXT USED RecipeHistory2019Q4;

    Listing 15-5

    Add New Partition to Existing Partition

    ```


    为了创建一个新分区，我需要获取现有的分区函数并在指定点拆分现有分区。在运行清单 [15-5](#480547_1_En_15_Chapter.xhtml#PC5)
    中的 T-SQL 代码之前，分区函数中的最后一个范围包括 2019 年 7 月 1 日及之后的所有数据。对最后一个分区执行的 `SPLIT RANGE` 代码以
    2019 年 7 月 1 日开始的最后一个分区，并将其拆分为两个分区。分区在清单 [15-5](#480547_1_En_15_Chapter.xhtml#PC5)
    中提供的日期 2019 年 10 月 1 日处被分离。之前的分区随后被拆分为两个分区。这两个分区中的第一个包括从 2019 年 7 月 1 日开始直到但不包括
    2019 年 10 月 1 日的所有日期。第二个分区涵盖 2019 年 10 月 1 日及之后的所有日期。


    前面大部分数据库代码遵循与本章前面所示相同的逻辑。我创建一个新的文件组并将文件添加到数据库。我还需要更改分区方案，让 SQL Server 知道应作为分区方案一部分使用的下一个文件组。一旦完成，我就可以更新分区函数。这将允许
    SQL Server 根据新规范将数据保存在正确的文件组中。'
  raw: 'Creating a partition function is helpful. A partition function lets SQL Server
    know how to partition the data. However, you also need to indicate how SQL Server
    should use that partition function. This is where you will want to create a partition
    scheme. A partition scheme maps a specific partition function to filegroups. You
    can see the T-SQL code to create a partition scheme in Listing [15-4](#480547_1_En_15_Chapter.xhtml#PC4).


    ```

    CREATE PARTITION SCHEME RecipeHistRange

    AS PARTITION RecipeHistFunc TO

    (

    RecipeHistory2018,

    RecipeHistory2019Q1,

    RecipeHistory2019Q2,

    RecipeHistory2019Q3

    );

    Listing 15-4

    Creation Partition Scheme

    ```


    The partition scheme has a specific name and references a partition function to
    use. One difference you can see between the partition function and the partition
    scheme is that the partition function specified three values. However, the partition
    scheme has four values. Since we specified that the range on the partition function
    was right, all values before the first date in the partition function specified
    will end up in the first filegroup. Reviewing the T-SQL code between Listing [15-3](#480547_1_En_15_Chapter.xhtml#PC3)
    and Listing [15-4](#480547_1_En_15_Chapter.xhtml#PC4), you can see that the first
    value specified in the partition function correlates with the begin date for the
    first quarter of 2019.


    Before we get into applying this partition scheme to a specific data table, we
    will want to get familiar with some additional aspects associated with partitions.
    Almost any time someone talks about partitions, they also specify that partitions
    are not necessarily something that is used to improve performance. There are many
    reasons that partitions may not improve performance, and some of those reasons
    are because partitions may not always be properly implemented. When considering
    partitioning, you want to focus on what data column you will be using to partition
    your data. This is known as the partitioning column. The reason that you will
    want to be aware of your partitioning column is because this partitioning column
    will determine how you write your T-SQL code going forward.


    The reason that you will want to use your partitioning column in all your T-SQL
    code is due to how SQL Server uses partitions. Once you have partitioned your
    data, SQL Server will search through partitioned data differently than non-partitioned
    tables. Once a partition has been implemented, SQL Server will use the partition
    to figure out which section of the table has the data that a query is requesting.
    If I search for a record by date, SQL Server will very quickly know exactly which
    partition to access to find the data. However, if I do not specify a date and
    I am looking for information about a specific recipe, SQL Server will look through
    every partition to find the information I have requested. Selecting a good partitioned
    column is important when implementing partitioning in your database. If you do
    not choose a column that is frequently or almost always used as part of your queries,
    you may incur additional performance overhead associated with having a partition.


    It is generally advised that you should not implement partitioning primarily to
    improve performance. While the overall goal is to simplify managing your data
    over time, you can implement some functionality in order to increase the possibility
    of improving performance. One such method is in how you index your partitioned
    table. You will want to create indexes that are segmented like the partition on
    your table. These indexes are known as aligned partitioned indexes. Aligned partitioned
    indexes can be clustered or non-clustered. There are different requirements depending
    on if the aligned partitioned index is unique. However, the general outcome is
    the same. Both types of aligned partitioned indexes will include a reference to
    the partitioned column. In the case of a unique aligned clustered or non-clustered
    index, the partitioned column must be part of the index. On the other hand, when
    creating a non-unique aligned index, you do not have to specify the partitioned
    column. If the partitioned column is not part of the aligned index, SQL Server
    will add a reference back to the partitioned column as part of the index.


    There is also the possibility of creating indexes that are not segmented like
    your partition. However, these indexes can have their own partition. These are
    considered non-aligned partitioned indexes. There are some specific cases where
    you would want to use this type of index, such as confirming that every value
    in a column that is not the partitioning column is unique. However, I would limit
    the use of non-aligned partitioned indexes as your queries that rely on indexes
    may perform worse as the entire table may need to be scanned to find all relevant
    records. Since the non-aligned partitioned index is not part of the partition
    function on the table, you do not need to specify the partition column as part
    of the index.


    Ultimately, the goal when using partitioning is to reduce the number of records
    SQL Server is accessing when trying to read or update data. You can write your
    queries in such a way that SQL Server can quickly determine exactly which partitions
    have the data requested. When SQL Server generates an execution plan ignoring
    specific partitions, this is known as partition elimination. SQL Server can treat
    a very large table like many smaller tables. In so doing, SQL Server only needs
    to interact with a subset of the partitioned table. This is your best chance to
    improve performance as a result of partitioning. However, in order to have your
    queries take advantage of partition elimination, you will need to reference the
    partitioning column in your query. Otherwise, SQL Server will not know which partition
    to access.


    Previously in this section, I created new filegroups and added those to the current
    database. I also created a new partition function and scheme. In Listing [15-5](#480547_1_En_15_Chapter.xhtml#PC5),
    you can see the T-SQL to add a new partition.


    ```

    ALTER DATABASE Menu

    ADD FILEGROUP RecipeHistory2019Q4;

    ALTER DATABASE Menu

    ADD FILE

    (

    NAME = RecipeHistFG2019Q4,

    FILENAME = ''D:\SQLData\RecipeHistFG2019Q4.ndf'',

    SIZE = 50MB

    )

    TO FILEGROUP RecipeHistory2019Q4;

    ALTER PARTITION FUNCTION RecipeHistFunc(DATETIME2)

    AS SPLIT RANGE (''10/01/2019'');

    ALTER PARTITION SCHEME RecipeHistRange

    NEXT USED RecipeHistory2019Q4;

    Listing 15-5

    Add New Partition to Existing Partition

    ```


    In order to create a new partition, I need to take the existing partition function
    and break the existing partition at a specified point. Before running the T-SQL
    code in Listing [15-5](#480547_1_En_15_Chapter.xhtml#PC5), the last range in the
    partition function included all data on and after July 1, 2019. The SPLIT RANGE
    code on the last partition takes the last partition beginning on July 1, 2019,
    and breaks it into two partitions. The partition is separated on the date October
    1, 2019, provided in Listing [15-5](#480547_1_En_15_Chapter.xhtml#PC5). The previous
    partition is then split into two partitions. The first of these two partitions
    includes all dates beginning on July 1, 2019, up to but not including October
    1, 2019\. The second partition covers all dates on October 1, 2019, and later.


    Most of the preceding database code follows the same logic as shown previously
    in this chapter. I create a new filegroup and add the file to the database. I
    also need to change the partition scheme to let SQL Server know the next filegroup
    that should be used as part of the partition scheme. Once that is complete, I
    can update the partition function. This will allow SQL Server to save data in
    the correct filegroup based upon the new specifications.'
