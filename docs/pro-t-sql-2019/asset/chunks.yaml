  trans: '# 14. 日志记录


    在您使用`SQL Server`的过程中，将会收到来自公司的各种各样的请求。其中一些请求可能涉及更改业务逻辑或添加新功能。有时，公司可能还想追踪过去发生的事情。有许多第三方工具有助于跟踪与数据库维护相关的性能和其他功能。然而，您的业务部门可能对跟踪数据更改或理解问题出在何处更感兴趣。


    这种与数据修改或错误处理相关的日志记录可以使用`T-SQL`来实现。在记录这些类型的更改时，您有多种选项可供选择。这些选项可以包括从最小程度地记录活动到记录最细致的活动。您还需要考虑未来将如何访问和使用这些信息。这将帮助您以一种未来可能对组织有益的方式记录信息。这也可以防止您记录那些最终从未被使用的数据。


    ## 数据修改


    选择跟踪数据修改的方法需要了解您的组织需要跟踪哪些类型的信息。您可能只想在某些内容发生变化时才记录信息。根据您的业务案例，您可能不仅需要知道何时发生了变化，还需要知道发生了什么变化。在如何跟踪这些更改方面，也有几种选择。您可以选择使用`SQL
    Server`为您跟踪这些更改，也可以创建数据库对象来为您记录这些信息。


    在实施任何类型的日志记录时，需要考虑的一点是性能开销。在跟踪数据修改时，这一点可能更为关键。您需要确保选择的日志记录方法既能跟踪必要的更改，又具有预期的性能影响。正如您可能预料的那样，您实现的日志记录越详细，性能开销就越大。


    在本章讨论的所有选项中，`更改跟踪`的开销最小。如果您希望记录更详细的信息，并且愿意增加资源利用率，那么您可以考虑`更改数据捕获`。另一种可能的跟踪更改的实现方式涉及使用数据库触发器。虽然使用数据库触发器允许您更精细地调整记录的内容和方式，但这可能会以更高的资源利用率为代价。


    根据您想要记录的数据类型，一个折中的选项可能是使用`SQL Server 审核`。`SQL Server 审核`可用于跟踪服务器或数据库级别的活动。在记录与应用程序相关的更改的上下文中，您会希望重点关注数据库审核。`SQL
    Server 审核`内的数据库审核操作可以跟踪与所有类型数据活动相关的更改，包括访问或修改数据。`SQL Server`使用扩展事件来监视审核活动。可以检索的数据包括操作发生的时间、触发审核的用户信息以及受影响的对象。也可能记录审核操作发生时所执行的语句。


    关于数据修改，另一种可用的最低限度日志记录活动涉及记录记录最近的更改时间，并为该数据记录递增已发生的更改次数。这种类型的跟踪由`SQL Server`内的`更改跟踪`处理。要使用`更改跟踪`，您首先需要在数据库上启用`更改跟踪`。在本书中，我们一直在使用`Menu`数据库。我将需要运行如清单
    14-1 所示的`T-SQL`代码来在`Menu`数据库上启用`更改跟踪`。


    ```

    ALTER DATABASE Menu

    SET CHANGE_TRACKING = ON

    (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = ON);

    ```


    清单 14-1：在菜单数据库上启用更改跟踪


    要在`Menu`数据库上启用`更改跟踪`，您需要指定数据库名称并表明您希望打开`更改跟踪`。前面`T-SQL`代码中的最后一行是可选的。这些值表示您希望保留更改的时间长度以及是否应自动清理保留的历史记录。


    一旦您在`Menu`数据中启用了`更改跟踪`，您就能够配置表以使用`更改跟踪`。您将在其上实现`更改跟踪`的表必须具有主键。如果该表没有主键，您将需要先添加一个，然后才能在该表上启用`更改跟踪`。在我们的例子中，我将在`dbo.Recipe`表上启用`更改跟踪`。清单
    14-2 显示了在`dbo.Recipe`表上启用`更改跟踪`所需的数据库代码。


    ```

    ALTER TABLE dbo.Recipe

    ENABLE CHANGE_TRACKING

    WITH (TRACK_COLUMNS_UPDATED = ON);

    ```


    清单 14-2：在 dbo.Recipe 表上启用更改跟踪'
- fmt: '# Change Tracking 配置与使用


    Change Tracking 现已在 `dbo.Recipe` 表上启用。Change Tracking 可以记录整行数据的更改，也可以指定特定列的更改。当跟踪列更改时，SQL
    Server 会记录发生了更改以及具体更改了哪一列或多列。如果未为 `TRACK_COLUMNS_UPDATED` 指定值，SQL Server 将使用默认值
    off。


    ## 查看变更信息


    设置好 Change Tracking 后，你可能想了解有哪些可用信息或哪些信息已更改。虽然 `dbo.Recipe` 表中的更改会被 SQL Server
    跟踪，但这些信息并非存储在对象资源管理器中可见的表里。相反，你需要访问与 `dbo.Recipe` 表关联的 `CHANGETABLE`。启用 Change
    Tracking 后，记录会被初始化并可在 `CHANGETABLE` 中找到。清单 [14-3] 展示了如何查看这些初始化的记录。


    ```sql

    SELECT rec.RecipeID,

    rec.RecipeName,

    rec.RecipeDescription,

    rec.IsActive,

    chng.RecipeID,

    chng.SYS_CHANGE_VERSION,

    chng.SYS_CHANGE_CONTEXT

    FROM dbo.Recipe AS rec

    CROSS APPLY CHANGETABLE

    (VERSION Recipe, (RecipeID), (rec.RecipeID)) AS chng;

    Listing 14-3

    Query Initialized Records

    ```


    此查询将返回来自 `dbo.Recipe` 表和 `CHANGETABLE` 的信息。表 [14-1] 展示了一个初始化记录的示例。


    **Table 14-1**


    **Initialized Records**


    | RecipeID | SYS_CHANGE_VERSION | SYS_CHANGE_CONTEXT |

    | --- | --- | --- |

    | 1 | NULL | NULL |

    | 2 | NULL | NULL |

    | 3 | NULL | NULL |

    | 4 | NULL | NULL |


    表 [14-1] 中的记录来自 `CHANGETABLE`。其中包含 `RecipeID`（表的主键）列以及用于跟踪更改信息的列。由于没有任何数据记录被修改，因此所有值均为
    `NULL`。


    ## 修改记录并跟踪更改


    我可以修改 `dbo.Recipe` 表中的记录。在清单 [14-4] 中，我更新了 `DateModified`。


    ```sql

    UPDATE dbo.Recipe

    SET DateModified = GETDATE()

    WHERE RecipeID = 3;

    Listing 14-4

    Update DateModified

    ```


    现在有记录被修改了，我可以更好地了解 Change Tracking 如何存储信息。清单 [14-5] 展示了自上次自动清理以来查找 `dbo.Recipe`
    表更改信息所需的查询。


    ```sql

    SELECT RecipeID,

    SYS_CHANGE_OPERATION AS ChangeOperation,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''Recipe''), ''RecipeName'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS NameChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''Recipe''), ''RecipeDescription'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS DescChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''Recipe''), ''IsActive'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS IsActiveChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''Recipe''), ''DateCreated'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS CreateChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''Recipe''), ''DateModified'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS ModifiedChange,

    SYS_CHANGE_CONTEXT

    FROM CHANGETABLE

    (CHANGES dbo.Recipe,0) as ChngTbl

    ORDER BY SYS_CHANGE_VERSION

    Listing 14-5

    Find Changed Records

    ```


    此版本信息对于查找此表更改的状态是必需的。清单 [14-5] 中的查询展示了访问此信息的一种方法。表 [14-2] 展示了清单 [14-5] 中查询的结果。


    **Table 14-2**


    **Change Tracking Result Set**


    | RecipeID | Change Operation | Name Changed | Desc Changed | IsActive Changed
    | Created Changed | Modified Changed |

    | --- | --- | --- | --- | --- | --- | --- |

    | 3 | U | False | False | False | False | True |


    这些结果记录自清单 [14-4] 中发出的更新。


    受影响的 `RecipeID` 列在表 [14-2] 的第一列。这与清单 [14-4] 中更新的 `RecipeID` 相匹配。`ChangeOperation`
    列为 U，表示更新。这也与清单 [14-4] 中的 DML 操作相匹配。表 [14-2] 中的最后五列是使用特定函数填充的，用于解码 Change Tracking
    表中指示的列。如果列被修改，该函数返回 true 值；如果数据未被修改，则返回 false 值。在清单 [14-4] 的情况下，唯一更新的列是 `DateModified`。这与表
    [14-2] 中的结果相符。`NameChange`、`DescChanged`、`IsActiveChanged` 和 `CreatedChanged`
    列均为 false，表示这些值未被更改。然而，`ModifiedChanged` 列为 true，这表明引用的列 `DateModified` 已被更改。


    ## 一致性问题与替代方案


    使用 Change Tracking 时存在一些潜在的一致性问题。存储数据不影响数据的一致性，数据一致性是在数据检索过程中受到影响的。你可以采取一切措施确保查看的是
    Change Tracking 表中的最新数据，包括检查 Change Tracking 中最后同步的版本并确认该版本仍然可用。但是，如果 Change Tracking
    中的版本早于保留期，这些数据可能会在检索到之前被清理掉。使用 Change Tracking 时，你也可能遇到数据修改发生在最后一次同步之后的情况，这可能导致返回额外的版本或修改记录。这些情况中的任何一种都会影响使用
    Change Tracking 返回数据的一致性。最小化一致性问题的最佳实践是使用快照隔离级别。


    如果你需要了解比哪一行或哪一列被更改、以及自实施 Change Tracking 以来该记录发生的更改次数更多的信息，你可能需要考虑 Change Data
    Capture。与 Change Tracking 类似，使用 Change Data Capture 也有其优缺点。最大的好处是 Change Data
    Capture 会捕获与被更改数据记录相关的详细信息。


    对于插入的数据，你将能够确切地看到添加到表中的内容。同样，你将能够看到被删除数据记录的所有列。更新数据时，你将能够访问更新前后的数据。一个缺点是表的每次更改都要求至少向跟踪表写入一条记录。另一个缺点是，每个被跟踪的表都会创建两个
    SQL Server Agent 作业。随着你增加 Change Data Capture 下的表数量，所使用的资源量也会增加。这可能会导致与 Change
    Data Capture 相关的性能影响变得非常严重，以至于阻止你实施 Change Data Capture。


    如果你决定继续使用 Change Data Capture，你可以更新数据库中的一个表以使用 Change Data Capture。在执行此操作之前，你需要允许在你的数据库上发生
    Change Data Capture。你可以通过运行清单 [14-6] 中的 T-SQL 代码来为每个数据库启用 Change Data Capture。


    ```sql

    USE Menu;

    GO

    EXECUTE sys.sp_cdc_enable_db;

    GO

    Listing 14-6

    Enable Database Tracking on Menu Database

    ```'
  raw: 'Change Tracking is now enabled on the dbo.Recipe table. Change Tracking can
    either record that an entire data row has changed or specify that specific columns
    have changed. When you track column changes, SQL Server will record that a change
    happened and the specific column or columns that have changed. If you do not specify
    a value for `TRACK_COLUMNS_UPDATED`, SQL Server will use the default value of
    off.


    After setting up Change Tracking, you may want to see what kind of information
    is available or has changed. While the changes in the table dbo.Recipe are tracked
    by SQL Server, this information is not available from a table that you can see
    in Object Explorer. Instead, you will need to access the `CHANGETABLE` associated
    with the table dbo.Recipe. Once Change Tracking has been enabled, records are
    initialized and can be found in the `CHANGETABLE`. The query in Listing [14-3](#480547_1_En_14_Chapter.xhtml#PC3)
    shows how you would see these initialized records.


    ```

    SELECT rec.RecipeID,

    rec.RecipeName,

    rec.RecipeDescription,

    rec.IsActive,

    chng.RecipeID,

    chng.SYS_CHANGE_VERSION,

    chng.SYS_CHANGE_CONTEXT

    FROM dbo.Recipe AS rec

    CROSS APPLY CHANGETABLE

    (VERSION Recipe, (RecipeID), (rec.RecipeID)) AS chng;

    Listing 14-3

    Query Initialized Records

    ```


    This query will return information from the dbo.Recipe table and information from
    the `CHANGETABLE`. Table [14-1](#480547_1_En_14_Chapter.xhtml#Tab1) shows an example
    of the initialized records.


    Table 14-1


    Initialized Records


    | RecipeID | SYS_CHANGE_VERSION | SYS_CHANGE_CONTEXT |

    | --- | --- | --- |

    | 1 | NULL | NULL |

    | 2 | NULL | NULL |

    | 3 | NULL | NULL |

    | 4 | NULL | NULL |


    The records in Table [14-1](#480547_1_En_14_Chapter.xhtml#Tab1) are from the `CHANGETABLE`.
    There is a column for the RecipeID, the primary key on the table, and columns
    to track information about the changes. Since none of the data records have been
    modified, the values are all NULL.


    I can modify the records in the table dbo.Recipe. In Listing [14-4](#480547_1_En_14_Chapter.xhtml#PC4),
    I have updated the DateModified.


    ```

    UPDATE dbo.Recipe

    SET DateModified = GETDATE()

    WHERE RecipeID = 3;

    Listing 14-4

    Update DateModified

    ```


    Now that a record has been modified, I can get a better idea of how information
    is being stored when it comes to Change Tracking. Listing [14-5](#480547_1_En_14_Chapter.xhtml#PC5)
    shows the query needed to find information about changes to dbo.Recipe that occurred
    since the last automatic cleanup.


    ```

    SELECT RecipeID,

    SYS_CHANGE_OPERATION AS ChangeOperation,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''Recipe''), ''RecipeName'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS NameChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''Recipe''), ''RecipeDescription'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS DescChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''Recipe''), ''IsActive'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS IsActiveChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''Recipe''), ''DateCreated'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS CreateChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''Recipe''), ''DateModified'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS ModifiedChange,

    SYS_CHANGE_CONTEXT

    FROM CHANGETABLE

    (CHANGES dbo.Recipe,0) as ChngTbl

    ORDER BY SYS_CHANGE_VERSION

    Listing 14-5

    Find Changed Records

    ```


    This version information is needed to find the state of the changes on this table.
    The query in Listing [14-5](#480547_1_En_14_Chapter.xhtml#PC5) shows you one way
    that you can use to access this information. Table [14-2](#480547_1_En_14_Chapter.xhtml#Tab2)
    shows the results for the query in Listing [14-5](#480547_1_En_14_Chapter.xhtml#PC5).


    Table 14-2


    Change Tracking Result Set


    | RecipeID | Change Operation | Name Changed | Desc Changed | IsActive Changed
    | Created Changed | Modified Changed |

    | --- | --- | --- | --- | --- | --- | --- |

    | 3 | U | False | False | False | False | True |


    These results are recorded from the update issued in Listing [14-4](#480547_1_En_14_Chapter.xhtml#PC4).


    The RecipeID affected is listed in the first column of Table [14-2](#480547_1_En_14_Chapter.xhtml#Tab2).
    This matches the same RecipeID updated in Listing [14-4](#480547_1_En_14_Chapter.xhtml#PC4).
    The ChangeOperation is listed as a U for update. This also matches the DML action
    in Listing [14-4](#480547_1_En_14_Chapter.xhtml#PC4). The final five columns in
    Table [14-2](#480547_1_En_14_Chapter.xhtml#Tab2) were populated using specific
    functions to unmask the columns indicated in the Change Tracking tables. The function
    involved returns a true value if the column was modified and a false value if
    the data was not modified. In the case of Listing [14-4](#480547_1_En_14_Chapter.xhtml#PC4),
    the only column updated was the DateModified. This matches the result in Table
    [14-2](#480547_1_En_14_Chapter.xhtml#Tab2). The columns NameChange, DescChanged,
    IsActiveChanged, and CreatedChanged are all false. These values were not changed.
    However, the column ModifiedChanged is true. This indicates that the column referenced,
    DateModified, was changed.


    There are some potential issues regarding consistency when using Change Tracking.
    Storing the data does not affect the consistency of the data. The consistency
    of the data is affected as part of the data retrieval. You can do everything possible
    to make sure you are looking at the most recent data in the Change Tracking table.
    This includes checking for the last synchronized version in Change Tracking and
    confirming that this version is still available. However, if the version in Change
    Tracking is older than the retention period, this data may be cleaned up before
    the data can be retrieved. With Change Tracking, you may also have occasions where
    a data modification occurs after the last synchronization. This can cause additional
    versions or modified records to be returned. Any of these scenarios can affect
    the consistency of the data returned with Change Tracking. The best practice to
    minimize issues with consistency is to use the snapshot isolation level.


    If you need to know more than the row or column that was changed and the number
    of changes that occurred for that record since implementing Change Tracking, you
    may want to consider Change Data Capture. Like Change Tracking, there are benefits
    and drawbacks of using Change Data Capture. The single largest benefit is that
    Change Data Capture will capture the details related to the data record that was
    changed.


    For inserted data, you will be able to see exactly what was added to the table.
    Similarly, you will be able to see all the columns for a data record that was
    deleted. When updating data, you will be able to access both the data before and
    after the update. A downside is that each change to the table requires that at
    least one record is written to a tracking table. Another downside is that two
    SQL Server Agent jobs are created for each table that is tracked. As you increase
    the number of tables under Change Data Capture, the amount of resources used will
    increase as well. This can cause the performance hit associated with Change Data
    Capture to be severe enough to prevent you from implementing Change Data Capture.


    If you decide to move forward with Change Data Capture, you can update a table
    in a database to use Change Data Capture. Before doing this, you will need to
    allow Change Data Capture to occur on your database. You can enable Change Data
    Capture per database by running the T-SQL code in Listing [14-6](#480547_1_En_14_Chapter.xhtml#PC6).


    ```

    USE Menu;

    GO

    EXECUTE sys.sp_cdc_enable_db;

    GO

    Listing 14-6

    Enable Database Tracking on Menu Database

    ```'
  trans: '

    # 变更跟踪的配置与使用


    变更跟踪现已在 `dbo.Recipe` 表上启用。变更跟踪可以记录整行数据的更改，也可以指定特定列的更改。当跟踪列更改时，SQL Server 会记录发生了更改以及具体更改了哪一列或多列。如果未为
    `TRACK_COLUMNS_UPDATED` 指定值，SQL Server 将使用默认值 off。


    ## 查看变更信息


    设置好变更跟踪后，你可能想了解有哪些可用信息或哪些信息已更改。虽然 `dbo.Recipe` 表中的更改会被 SQL Server 跟踪，但这些信息并非存储在对象资源管理器中可见的表里。相反，你需要访问与
    `dbo.Recipe` 表关联的 `CHANGETABLE`。启用变更跟踪后，记录会被初始化并可在 `CHANGETABLE` 中找到。清单 [14-3]
    展示了如何查看这些初始化的记录。


    ```sql

    SELECT rec.RecipeID,

    rec.RecipeName,

    rec.RecipeDescription,

    rec.IsActive,

    chng.RecipeID,

    chng.SYS_CHANGE_VERSION,

    chng.SYS_CHANGE_CONTEXT

    FROM dbo.Recipe AS rec

    CROSS APPLY CHANGETABLE

    (VERSION Recipe, (RecipeID), (rec.RecipeID)) AS chng;

    Listing 14-3

    Query Initialized Records

    ```


    此查询将返回来自 `dbo.Recipe` 表和 `CHANGETABLE` 的信息。表 [14-1] 展示了一个初始化记录的示例。


    **表 14-1**


    **初始化记录**


    | RecipeID | SYS_CHANGE_VERSION | SYS_CHANGE_CONTEXT |

    | --- | --- | --- |

    | 1 | NULL | NULL |

    | 2 | NULL | NULL |

    | 3 | NULL | NULL |

    | 4 | NULL | NULL |


    表 [14-1] 中的记录来自 `CHANGETABLE`。其中包含 `RecipeID`（表的主键）列以及用于跟踪更改信息的列。由于没有任何数据记录被修改，因此所有值均为
    `NULL`。


    ## 修改记录并跟踪更改


    我可以修改 `dbo.Recipe` 表中的记录。在清单 [14-4] 中，我更新了 `DateModified`。


    ```sql

    UPDATE dbo.Recipe

    SET DateModified = GETDATE()

    WHERE RecipeID = 3;

    Listing 14-4

    Update DateModified

    ```


    现在有记录被修改了，我可以更好地了解变更跟踪如何存储信息。清单 [14-5] 展示了自上次自动清理以来查找 `dbo.Recipe` 表更改信息所需的查询。


    ```sql

    SELECT RecipeID,

    SYS_CHANGE_OPERATION AS ChangeOperation,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''Recipe''), ''RecipeName'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS NameChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''Recipe''), ''RecipeDescription'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS DescChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''Recipe''), ''IsActive'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS IsActiveChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''Recipe''), ''DateCreated'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS CreateChange,

    CHANGE_TRACKING_IS_COLUMN_IN_MASK

    (COLUMNPROPERTY

    (OBJECT_ID(''Recipe''), ''DateModified'', ''ColumnId''),

    SYS_CHANGE_COLUMNS) AS ModifiedChange,

    SYS_CHANGE_CONTEXT

    FROM CHANGETABLE

    (CHANGES dbo.Recipe,0) as ChngTbl

    ORDER BY SYS_CHANGE_VERSION

    Listing 14-5

    Find Changed Records

    ```


    此版本信息对于查找此表更改的状态是必需的。清单 [14-5] 中的查询展示了访问此信息的一种方法。表 [14-2] 展示了清单 [14-5] 中查询的结果。


    **表 14-2**


    **变更跟踪结果集**


    | RecipeID | Change Operation | Name Changed | Desc Changed | IsActive Changed
    | Created Changed | Modified Changed |

    | --- | --- | --- | --- | --- | --- | --- |

    | 3 | U | False | False | False | False | True |


    这些结果记录自清单 [14-4] 中发出的更新。


    受影响的 `RecipeID` 列在表 [14-2] 的第一列。这与清单 [14-4] 中更新的 `RecipeID` 相匹配。`ChangeOperation`
    列为 U，表示更新。这也与清单 [14-4] 中的 DML 操作相匹配。表 [14-2] 中的最后五列是使用特定函数填充的，用于解码变更跟踪表中指示的列。如果列被修改，该函数返回
    true 值；如果数据未被修改，则返回 false 值。在清单 [14-4] 的情况下，唯一更新的列是 `DateModified`。这与表 [14-2]
    中的结果相符。`NameChange`、`DescChanged`、`IsActiveChanged` 和 `CreatedChanged` 列均为 false，表示这些值未被更改。然而，`ModifiedChanged`
    列为 true，这表明引用的列 `DateModified` 已被更改。


    ## 一致性问题与替代方案


    使用变更跟踪时存在一些潜在的一致性问题。存储数据不影响数据的一致性，数据一致性是在数据检索过程中受到影响的。你可以采取一切措施确保查看的是变更跟踪表中的最新数据，包括检查变更跟踪中最后同步的版本并确认该版本仍然可用。但是，如果变更跟踪中的版本早于保留期，这些数据可能会在检索到之前被清理掉。使用变更跟踪时，你也可能遇到数据修改发生在最后一次同步之后的情况，这可能导致返回额外的版本或修改记录。这些情况中的任何一种都会影响使用变更跟踪返回数据的一致性。最小化一致性问题的最佳实践是使用快照隔离级别。


    如果你需要了解比哪一行或哪一列被更改、以及自实施变更跟踪以来该记录发生的更改次数更多的信息，你可能需要考虑变更数据捕获。与变更跟踪类似，使用变更数据捕获也有其优缺点。最大的好处是变更数据捕获会捕获与被更改数据记录相关的详细信息。


    对于插入的数据，你将能够确切地看到添加到表中的内容。同样，你将能够看到被删除数据记录的所有列。更新数据时，你将能够访问更新前后的数据。一个缺点是表的每次更改都要求至少向跟踪表写入一条记录。另一个缺点是，每个被跟踪的表都会创建两个
    SQL Server Agent 作业。随着你增加变更数据捕获下的表数量，所使用的资源量也会增加。这可能会导致与变更数据捕获相关的性能影响变得非常严重，以至于阻止你实施变更数据捕获。


    如果你决定继续使用变更数据捕获，你可以更新数据库中的一个表以使用变更数据捕获。在执行此操作之前，你需要允许在你的数据库上发生变更数据捕获。你可以通过运行清单
    [14-6] 中的 T-SQL 代码来为每个数据库启用变更数据捕获。


    ```sql

    USE Menu;

    GO

    EXECUTE sys.sp_cdc_enable_db;

    GO

    Listing 14-6

    Enable Database Tracking on Menu Database

    ```

    '
- fmt: '## 启用 Change Data Capture


    现在您已经启用了 Change Data Capture，您将需要选择一个您只关心记录何时发生变化的表。我将在表 `dbo.Recipe` 上实现 Change
    Data Capture。在启用此表的 Change Data Capture 之前，我需要确保此实例上的 SQL Server Agent 正在运行。在代码清单
    [14-7](#480547_1_En_14_Chapter.xhtml#PC7) 中，您可以看到在此表上实现 Change Data Capture 所需的数据库代码。


    ```sql

    USE Menu;

    GO

    EXECUTE sys.sp_cdc_enable_table

    @source_schema = ''dbo'',

    @source_name = ''Recipe'',

    @role_name = NULL;

    GO

    ```


    **代码清单 14-7**

    在 `dbo.Recipe` 表上启用数据库跟踪


    您至少需要指定表架构、表名以及可以访问此数据的数据库角色。如果您为角色名称指定 `NULL`，则 Change Data Capture 记录的信息将对所有人可访问。一旦此表启用了
    Change Data Capture，我将能够在 SQL Server Agent 中看到新创建的任务。代码清单 [14-7](#480547_1_En_14_Chapter.xhtml#PC7)
    中的 T-SQL 代码完成后，您将收到一条消息。您可以在图 [14-1](#480547_1_En_14_Chapter.xhtml#Fig1) 中看到此消息的示例。


    ![显示 SQL Server Agent 任务已创建的消息](images/480547_1_En_14_Chapter/480547_1_En_14_Fig1_HTML.jpg)


    **图 14-1**

    显示 SQL Server Agent 任务已创建的消息


    启用 Change Data Capture 的过程还会在 `cdc` 架构中创建几个系统表。您可以在图 [14-2](#480547_1_En_14_Chapter.xhtml#Fig2)
    中看到这些为管理 Change Data Capture 而创建的系统表。


    ![为 Change Data Capture 创建的系统表](images/480547_1_En_14_Chapter/480547_1_En_14_Fig2_HTML.jpg)


    **图 14-2**

    为 Change Data Capture 创建的系统表


    我们将用来跟踪 `dbo.Recipe` 上更改的表是 `cdc.dbo_Recipe_CT` 表。


    ### 在空表与现有表上实施的差异


    如果您在空表上实施 Change Data Capture，您将能够跟踪数据记录何时发生变化，同时也能够跟踪自表创建以来发生的变化次数。在代码清单 [14-8](#480547_1_En_14_Chapter.xhtml#PC8)
    中，我编写了一个脚本将记录插入 `dbo.Recipe`。


    ```sql

    INSERT INTO dbo.Recipe

    (

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    )

    VALUES

    (

    ''Lee"s Hamburgers'',

    ''The best hamburgers'',

    4,

    2,

    1,

    1,

    GETDATE(),

    GETDATE()

    );

    ```


    **代码清单 14-8**

    向 `dbo.Recipe` 插入记录


    当向现有表添加 Change Data Capture 时，工作方式会有所不同。如果您向现有表添加 Change Data Capture，您仍然能够跟踪数据记录何时发生变化，但您只能看到自
    Change Data Capture 实施以来发生的数据修改次数。


    之前在代码清单 [14-8](#480547_1_En_14_Chapter.xhtml#PC8) 中，我在 `dbo.Recipe` 表上启用了 Change
    Data Capture。如果我假设该表是空的并插入一些记录，我将能够确定这些记录是何时添加的。执行代码清单 [14-9](#480547_1_En_14_Chapter.xhtml#PC9)
    中的查询将显示 Change Data Capture 表中的记录。


    ```sql

    SELECT __$start_lsn,

    __$end_lSN,

    __$seqval,

    __$operation,

    __$update_mask,

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified,

    __$command_id

    FROM cdc.dbo_Recipe_CT

    ```


    **代码清单 14-9**

    查询 `dbo.Recipe` 的 Change Data Capture 表


    您可以在表 [14-3](#480547_1_En_14_Chapter.xhtml#Tab3) 中看到有关已跟踪数据记录信息的子集。


    **表 14-3**

    `dbo.Recipe` 的更改跟踪输出


    | __$operation | RecipeID | RecipeName | DateCreated | __$command_id |

    | --- | --- | --- | --- | --- |

    | 2 | 1 | Spaghetti | 05/21/2019 | 1 |


    ### 解释跟踪数据


    看起来记录的信息可能不多，但保存在此表中的信息可能非常有用。列 `__$operation` 指示在此表上发生的操作。`__$operation` 将告诉您执行了哪种类型的活动。如果记录被插入，您将在
    `cdc.dbo_Recipe_CT` 中有一个包含插入值的条目。如果记录被删除，您将在 `cdc.dbo_Recipe_CT` 中有一个包含删除值的条目。如果记录被更新，您将在
    `cdc.dbo_Recipe_CT` 表中有两个条目。第一条记录将包含更新前的记录值。第二条记录将包含更新后的记录值。


    ### 注意事项与替代方案


    如果表已经存在并且我启用了 Change Data Capture，直到这些记录被更新后，您才会看到它们。一旦这些记录被修改，它们就会出现在 `cdc.dbo_Recipe_CT`
    表中。虽然 Change Data Capture 可以轻松设置和实施，但在向 Change Data Capture 添加表时应谨慎。添加到 Change
    Data Capture 的每个表都会导致创建两个 SQL Server Agent 任务。由于跟踪这些表上的更改，还会发生大量的日志记录。这两者都可能导致
    SQL Server 使用额外的资源。


    您可以使用 Change Tracking、Change Data Capture 或数据库触发器来跟踪数据修改。所有这些选项都有其自身的优势和限制。为您的组织选择正确的选项时，您需要考虑需要记录的数据类型以及您愿意为跟踪这些更改而产生的性能开销。如果您需要更好的性能，通常必须选择较少的功能。您想要收集的信息越多或您越想自定义记录数据修改，都将伴随着硬件利用率增加和潜在性能开销的代价。'
  raw: 'Now that you have enabled Change Data Capture, you will want to choose a table
    where you are only concerned with knowing when a record has changed. I will implement
    Change Data Capture on the table dbo.Recipe. Before enabling Change Data Capture
    on this table, I will need to make sure that SQL Server Agent is running on this
    instance. In Listing [14-7](#480547_1_En_14_Chapter.xhtml#PC7), you can see the
    database code needed to implement Change Data Capture on this table.


    ```

    USE Menu;

    GO

    EXECUTE sys.sp_cdc_enable_table

    @source_schema = ''dbo'',

    @source_name = ''Recipe'',

    @role_name = NULL;

    GO

    Listing 14-7

    Enable Database Tracking on dbo.Recipe Table

    ```


    At a minimum you will need to specify the table schema, table name, and the database
    roles that can access this data. If you specify NULL for the role name, the information
    recorded by Change Data Capture will be accessible to everyone. Once this table
    has been enabled for Change Data Capture, I will be able to see the new jobs created
    in SQL Server Agent. You will receive a message once the T-SQL code in Listing [14-7](#480547_1_En_14_Chapter.xhtml#PC7)
    completes. You can see an example of this message in Figure [14-1](#480547_1_En_14_Chapter.xhtml#Fig1).


    ![../images/480547_1_En_14_Chapter/480547_1_En_14_Fig1_HTML.jpg](images/480547_1_En_14_Chapter/480547_1_En_14_Fig1_HTML.jpg)


    Figure 14-1


    Message Showing SQL Server Agent Jobs Created


    The process of enabling Change Data Capture also creates several system tables
    in the cdc schema. You can see these tables in Figure [14-2](#480547_1_En_14_Chapter.xhtml#Fig2),
    the system tables that were created to manage Change Data Capture.


    ![../images/480547_1_En_14_Chapter/480547_1_En_14_Fig2_HTML.jpg](images/480547_1_En_14_Chapter/480547_1_En_14_Fig2_HTML.jpg)


    Figure 14-2


    System Tables Created for Change Data Capture


    The table that we will use to track changes on dbo.Recipe is the cdc.dbo_Recipe_CT
    table.


    If you implement Change Data Capture on an empty table, you will be able to track
    when your data records have changed but you will also be able to track the number
    of changes that happen since the table was created. In Listing [14-8](#480547_1_En_14_Chapter.xhtml#PC8),
    I have written a script to insert records into dbo.Recipe.


    ```

    INSERT INTO dbo.Recipe

    (

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    )

    VALUES

    (

    ''Lee"s Hamburgers'',

    ''The best hamburgers'',

    4,

    2,

    1,

    1,

    GETDATE(),

    GETDATE()

    );

    Listing 14-8

    Insert Records into dbo.Recipe

    ```


    This can work somewhat differently when adding Change Data Capture to an existing
    table. If you add Change Data Capture to an existing table, you will still be
    able to track when changes have happened to your data records, but you will only
    be able to see the number of data modifications that have happened since Change
    Data Capture was implemented.


    Previously in Listing [14-8](#480547_1_En_14_Chapter.xhtml#PC8), I enabled Change
    Data Capture on the dbo.Recipe table. If I assume that the table was empty and
    I insert some records into the table, I will be able to determine when these records
    were added. Executing the query in Listing [14-9](#480547_1_En_14_Chapter.xhtml#PC9)
    will show you the records in the Change Data Capture table.


    ```

    SELECT __$start_lsn,

    __$end_lSN,

    __$seqval,

    __$operation,

    __$update_mask,

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified,

    __$command_id

    FROM cdc.dbo_Recipe_CT

    Listing 14-9

    Query the Change Data Capture Table for dbo.Recipe

    ```


    You can see a subset of the information that has been tracked about the data records
    in Table [14-3](#480547_1_En_14_Chapter.xhtml#Tab3).


    Table 14-3


    Change Tracking Output for dbo.Recipe


    | __$operation | RecipeID | RecipeName | DateCreated | __$command_id |

    | --- | --- | --- | --- | --- |

    | 2 | 1 | Spaghetti | 05/21/2019 | 1 |


    It may not look like there is much information being recorded, but the information
    saved in this table can be quite helpful. The column __$operation indicates the
    action that occurred on this table. The __$operation will tell you which type
    of activity was performed. If the record was inserted, you will have one entry
    in cdc.dbo_Recipe_CT with the values that were inserted. If the record was deleted,
    you will have one entry in cdc.dbo_Recipe_CT with the values that were deleted.
    If the record was updated, you will have two entries in cdc.dbo_Recipe_CT table.
    The first record will have the values of the record before the update. The second
    record will have the values of the record after the update.


    If the table had already existed and I had enabled Change Data Capture, you will
    not see those data records until they had been updated. Once these records are
    modified, they will show up in the cdc.dbo_Recipe_CT table. While Change Data
    Capture can be easy for setup and implementation, you should use caution when
    adding tables to Change Data Capture. Each table added to Change Data Capture
    causes two SQL Server Agent jobs to be created. There is also a significant amount
    of logging that occurs as a result of tracking changes on these tables. Both can
    cause SQL Server to use additional resources.


    You can use Change Tracking, Change Data Capture, or database triggers to track
    data modifications. All these options have their own strengths and limitations.
    When choosing the right option for your organization, you will want to consider
    what type of data you need to record and the performance overhead you are willing
    to incur tracking these changes. If you need better performance, you will generally
    have to choose less functionality. The more information you would like to collect
    or the more you would like to customize logging data modifications will come at
    a cost of increased hardware utilization and potential performance overhead.'
  trans: '## 启用变更数据捕获


    现在您已经启用了变更数据捕获，您将需要选择一个您只关心记录何时发生变化的表。我将在表 `dbo.Recipe` 上实现变更数据捕获。在启用此表的变更数据捕获之前，我需要确保此实例上的
    SQL Server 代理正在运行。在代码清单 14-7 中，您可以看到在此表上实现变更数据捕获所需的数据库代码。


    ```sql

    USE Menu;

    GO

    EXECUTE sys.sp_cdc_enable_table

    @source_schema = ''dbo'',

    @source_name = ''Recipe'',

    @role_name = NULL;

    GO

    ```


    **代码清单 14-7**

    在 `dbo.Recipe` 表上启用数据库跟踪


    您至少需要指定表架构、表名以及可以访问此数据的数据库角色。如果您为角色名称指定 `NULL`，则变更数据捕获记录的信息将对所有人可访问。一旦此表启用了变更数据捕获，我将能够在
    SQL Server 代理中看到新创建的任务。代码清单 14-7 中的 T-SQL 代码完成后，您将收到一条消息。您可以在图 14-1 中看到此消息的示例。


    ![显示 SQL Server 代理任务已创建的消息](img/480547_1_En_14_Fig1_HTML.jpg)


    **图 14-1**

    显示 SQL Server 代理任务已创建的消息


    启用变更数据捕获的过程还会在 `cdc` 架构中创建几个系统表。您可以在图 14-2 中看到这些为管理变更数据捕获而创建的系统表。


    ![为变更数据捕获创建的系统表](img/480547_1_En_14_Fig2_HTML.jpg)


    **图 14-2**

    为变更数据捕获创建的系统表


    我们将用来跟踪 `dbo.Recipe` 上更改的表是 `cdc.dbo_Recipe_CT` 表。


    ### 在空表与现有表上实施的差异


    如果您在空表上实施变更数据捕获，您将能够跟踪数据记录何时发生变化，同时也能够跟踪自表创建以来发生的变化次数。在代码清单 14-8 中，我编写了一个脚本将记录插入
    `dbo.Recipe`。


    ```sql

    INSERT INTO dbo.Recipe

    (

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    )

    VALUES

    (

    ''Lee"s Hamburgers'',

    ''The best hamburgers'',

    4,

    2,

    1,

    1,

    GETDATE(),

    GETDATE()

    );

    ```


    **代码清单 14-8**

    向 `dbo.Recipe` 插入记录


    当向现有表添加变更数据捕获时，工作方式会有所不同。如果您向现有表添加变更数据捕获，您仍然能够跟踪数据记录何时发生变化，但您只能看到自变更数据捕获实施以来发生的数据修改次数。


    之前在代码清单 14-8 中，我在 `dbo.Recipe` 表上启用了变更数据捕获。如果我假设该表是空的并插入一些记录，我将能够确定这些记录是何时添加的。执行代码清单
    14-9 中的查询将显示变更数据捕获表中的记录。


    ```sql

    SELECT __$start_lsn,

    __$end_lSN,

    __$seqval,

    __$operation,

    __$update_mask,

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified,

    __$command_id

    FROM cdc.dbo_Recipe_CT

    ```


    **代码清单 14-9**

    查询 `dbo.Recipe` 的变更数据捕获表


    您可以在表 14-3 中看到有关已跟踪数据记录信息的子集。


    **表 14-3**

    `dbo.Recipe` 的更改跟踪输出


    | __$operation | RecipeID | RecipeName | DateCreated | __$command_id |

    | --- | --- | --- | --- | --- |

    | 2 | 1 | Spaghetti | 05/21/2019 | 1 |


    ### 解释跟踪数据


    看起来记录的信息可能不多，但保存在此表中的信息可能非常有用。列 `__$operation` 指示在此表上发生的操作。`__$operation` 将告诉您执行了哪种类型的活动。如果记录被插入，您将在
    `cdc.dbo_Recipe_CT` 中有一个包含插入值的条目。如果记录被删除，您将在 `cdc.dbo_Recipe_CT` 中有一个包含删除值的条目。如果记录被更新，您将在
    `cdc.dbo_Recipe_CT` 表中有两个条目。第一条记录将包含更新前的记录值。第二条记录将包含更新后的记录值。


    ### 注意事项与替代方案


    如果表已经存在并且我启用了变更数据捕获，直到这些记录被更新后，您才会看到它们。一旦这些记录被修改，它们就会出现在 `cdc.dbo_Recipe_CT` 表中。虽然变更数据捕获可以轻松设置和实施，但在向变更数据捕获添加表时应谨慎。添加到变更数据捕获的每个表都会导致创建两个
    SQL Server 代理任务。由于跟踪这些表上的更改，还会发生大量的日志记录。这两者都可能导致 SQL Server 使用额外的资源。


    您可以使用变更跟踪、变更数据捕获或数据库触发器来跟踪数据修改。所有这些选项都有其自身的优势和限制。为您的组织选择正确的选项时，您需要考虑需要记录的数据类型以及您愿意为跟踪这些更改而产生的性能开销。如果您需要更好的性能，通常必须选择较少的功能。您想要收集的信息越多或您越想自定义记录数据修改，都将伴随着硬件利用率增加和潜在性能开销的代价。'
- fmt: '## Error Handling


    在记录数据修改之外，您可能还会发现，记录数据库中发生的某些错误类型会很有帮助。虽然存在 SQL Server 特有的错误，但那不是本节的重点。还存在一些因应用程序与数据库交互而产生的错误。许多此类错误可以作为应用程序开发的一部分，在
    SQL Server 之外进行记录。但是，您可能会发现有些问题需要能从 SQL Server 内部访问。


    在考虑错误处理时，您不仅需要考虑如何记录这些信息，还需要考虑应用程序如何处理错误。在 SQL Server 内部，一个更常见的选择是使用 `TRY...CATCH`
    块。这段代码封装了尝试执行 T-SQL 代码的能力，并在尝试失败时执行特定操作。如果代码成功，则 T-SQL 代码将按预期执行。清单 [14-10](#480547_1_En_14_Chapter.xhtml#PC10)
    展示了一个 `TRY…CATCH` 块。


    ```

    CREATE PROCEDURE dbo.RecipeInsert

    @RecipeName VARCHAR(25),

    @RecipeDescription VARCHAR(50),

    @ServingQuantity TINYINT,

    @MealTypeID TINYINT,

    @PreparationTypeID TINYINT,

    @IsActive BIT,

    @DateCreated DATETIME2(7),

    @DateModified DATETIME2(7)

    AS

    BEGIN TRY

    BEGIN TRANSACTION

    INSERT INTO dbo.Recipe

    (

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    )

    VALUES

    (

    @RecipeName,

    @RecipeDescription,

    @ServingQuantity,

    @MealTypeID,

    @PreparationTypeID,

    @IsActive,

    @DateCreated,

    @DateModified

    )

    COMMIT TRANSACTION

    END TRY

    BEGIN CATCH

    ROLLBACK TRANSACTION

    END CATCH

    ```

    *清单 14-10 用于插入食谱的 Try…Catch 块*


    这段代码如果没有错误，将插入一条记录。但是，如果遇到错误，则事务将被回滚。有一些方法可以将其与应用程序代码集成，以便用户知晓事务中发生了错误。使用此方法的目标是防止应用程序崩溃，或防止最终用户期望事务能正确保存。如果用户知晓操作失败，他们可以选择纠正问题并重试该操作。


    您可能会发现您的应用程序能够毫无问题地写入或更新数据库中的数据。但是，您可能有一个将数据从一个系统发送到另一个系统的过程。可能存在基础设施问题或数据类型不一致，这可能导致在将数据从一个数据库对象发送到另一个时失败。这些也是您需要决定如何处理的一类错误。您仍然需要一种方法来处理这些故障，但您可能还需要更即时的报告，告知这些记录发送或接收失败。当今的业务要求持续的正常运行时间和成功的交互。您可以通过记录处理数据尝试失败时的方式来控制您响应这些问题的有效性。


    存储需要流经系统的信息的数据库表通常在数据表中存储一个状态类型列。无论哪个过程更新记录的状态，都可能在更新记录状态时出现问题，或者将记录状态更新为失败状态。当表中的数据量不大时，查找这些失败的记录可能很容易。这通常需要搜索在指定时间内状态未更改的记录，或者处于失败或错误状态的记录。


    根据我们如何使用食谱信息，我们可能希望记录每个食谱何时被准备。我们可以有一个应用程序，让我们能够指示食谱何时开始和完成。这些信息可以与食谱状态一起记录。我需要创建一个表来指示食谱历史状态。可以在表
    [14-4](#480547_1_En_14_Chapter.xhtml#Tab4) 中看到信息的示例。


    *表 14-4 dbo.RecipeHistoryStatus 表中的数据*


    | RecipeHistoryStatusID | RecipeHistoryStatusName | IsActive | DateCreated | DateModified
    |

    | --- | --- | --- | --- | --- |

    | 1 | Started | True | 05/21/2019 | 05/21/2019 |

    | 2 | Completed | True | 05/21/2019 | 05/21/2019 |

    | 3 | Cancelled | True | 05/21/2019 | 05/21/2019 |

    | 4 | Error | True | 05/21/2019 | 05/21/2019 |


    此表包含当记录某人开始准备食谱时可用的状态。为了记录每次准备食谱的实例，我需要创建一个表来存储每次准备食谱时的信息。有几种记录方式。为了本章的目的，我将在每次食谱开始时创建一条记录。一旦食谱开始，该食谱最终可能处于完成、取消或错误状态。用于存储食谱历史记录的查询可以在清单
    [14-11](#480547_1_En_14_Chapter.xhtml#PC11) 中看到。


    ```

    CREATE TABLE dbo.RecipeHistory

    (

    RecipeHistoryID         INT         NOT NULL,

    RecipeID                SMALLINT    NOT NULL,

    RecipeHistoryStatusID   TINYINT     NOT NULL,

    DateCreated             DATETIME    NOT NULL,

    DateModified            DATETIME    ,

    CONSTRAINT pk_RecipeHistory_RecipeHistoryID

    PRIMARY KEY CLUSTERED (RecipeHistoryID),

    CONSTRAINT fk_RecipeHistory_RecipeID

    FOREIGN KEY (RecipeID)

    REFERENCES dbo.Recipe(RecipeID),

    CONSTRAINT fk_RecipeHistory_RecipeHistoryStatusID

    FOREIGN KEY (RecipeHistoryStatusID)

    REFERENCES

    dbo.RecipeHistoryStatus(RecipeHistoryStatusID)

    );

    ```

    *清单 14-11 创建 dbo.RecipeHistory 表*


    此表可以存储每次食谱开始的唯一时间。可以在表 [14-5](#480547_1_En_14_Chapter.xhtml#Tab5) 中找到存储在此表中的数据示例。


    *表 14-5 dbo.RecipeHistory 表中的数据*


    | RecipeHistoryID | RecipeID | RecipeHistoryStatusID | DateCreated | DateModified
    |

    | --- | --- | --- | --- | --- |

    | 1 | 1 | 2 | 05/17/2019 | 05/17/2019 |

    | 2 | 1 | 3 | 05/18/2019 | 05/18/2019 |

    | 3 | 3 | 4 | 05/20/2019 | 05/20/2019 |

    | 4 | 4 | 1 | 05/21/2019 | 05/21/2019 |


    表 [14-5](#480547_1_En_14_Chapter.xhtml#Tab5) 中的记录指示了已开始及其各种状态的食谱。第一条记录是 `RecipeID`
    为 1、状态为完成的记录。第二条记录是 `RecipeID` 为 1、状态为取消的记录。第三条记录是 `RecipeID` 为 3、状态为错误的记录。最后显示的记录是
    `RecipeID` 为 4、状态为开始的记录。


    当任何记录出现错误时，这些记录在 `dbo.RecipeHistory` 表中的 `RecipeHistoryStatusID` 将为 4。最初此表中的数据量不会很大，因此很容易在其中查找最近的错误记录。然而，随着时间的推移，此表将增长到相当大的规模。这可能导致
    SQL Server 必须搜索许多记录才能找到任何最近的错误记录。如果我们计划 `dbo.RecipeHistory` 表增长到难以搜索的大小，我们可能会以不同的方式实现错误日志记录。可能存在其他场景，您希望保留所有处于错误状态的出错记录，但同时您也希望知道如何解决最近出错记录的问题。


    在上述任一场景中，创建一个专门用于记录最近错误记录的表可能很有益。在创建此表之前，您可能还希望考虑如何随时间管理此表。与 `dbo.RecipeHistory`
    表不同，您需要确保这个新表不会变得太大。您还希望仅在此表中保留最近的错误记录。在表中保留少量记录使表易于搜索。这个新表的目标仅仅是提醒用户任何最近的错误记录。考虑到此表的目的，您还需要设计一个定期清除此表数据的过程。'
  raw: '## Error Handling


    In addition to logging data modifications, you may also find that you would benefit
    from logging certain types of errors that occur within the database. While there
    are SQL Server specific errors that can occur, that is not the focus of this section.
    There are also errors that occur as a result of the application interacting with
    the database. Many of these errors can be logged outside of SQL Server as part
    of your application development. However, you may find that some issues need to
    be accessible from within SQL Server.


    When considering error handling, you will not only want to consider how that information
    is logged but also how the application handles errors. One of the more common
    options from within SQL Server is to use a TRY... CATCH block. This code wraps
    the ability to try the T-SQL code and perform a specific action if that attempt
    failed. If the code succeeds, then the T-SQL code will execute as expected. Listing
    [14-10](#480547_1_En_14_Chapter.xhtml#PC10) shows a TRY… CATCH block.


    ```

    CREATE PROCEDURE dbo.RecipeInsert

    @RecipeName VARCHAR(25),

    @RecipeDescription VARCHAR(50),

    @ServingQuantity TINYINT,

    @MealTypeID TINYINT,

    @PreparationTypeID TINYINT,

    @IsActive BIT,

    @DateCreated DATETIME2(7),

    @DateModified DATETIME2(7)

    AS

    BEGIN TRY

    BEGIN TRANSACTION

    INSERT INTO dbo.Recipe

    (

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    )

    VALUES

    (

    @RecipeName,

    @RecipeDescription,

    @ServingQuantity,

    @MealTypeID,

    @PreparationTypeID,

    @IsActive,

    @DateCreated,

    @DateModified

    )

    COMMIT TRANSACTION

    END TRY

    BEGIN CATCH

    ROLLBACK TRANSACTION

    END CATCH

    Listing 14-10

    Try… Catch Block to Insert Recipe

    ```


    This block of code will insert a record if there are no errors. However, if an
    error is encountered, then the transaction will be rolled back. There are some
    ways to integrate this with your application code so that the user is aware there
    was an error with the transaction. The goal of using this method is to prevent
    the application from crashing or prevent the end user from expecting the transaction
    to save correctly. If the user is aware the action has failed, they have the option
    to correct the issue and retry the action.


    You may find that your application is able to write or update data in the database
    without any issues. However, you may have a process that sends data from one system
    to another. There may be infrastructure issues or inconsistencies with data types
    that can cause failures when sending data from one database object to another.
    These are also a type of error that you will want to determine how it should be
    handled. You will still want a method to handle these failures, but you may also
    need more instantaneous reporting that these records failed to be sent or received.
    Business today requires a constant state of uptime and successful interactions.
    You can control your effectiveness in responding to these issues by how you record
    failures when trying to process data.


    Database tables that store information that need to be moved through a system
    often store a status type column in the data table. Whatever process updates,
    the status of the record may either have issues updating the record status or
    update the record status to a failed state. When there is not a large amount of
    data in the table, finding these failed records can be easy. This would usually
    require a search of records where the status has not changed in a specified period
    or where the records are in a failed or error status.


    Depending on how we use the information about recipes, we may want to log when
    each recipe is prepared. We could have an application that would allow us to indicate
    when a recipe was started and completed. This information could be recorded with
    a recipe status. I would need to create a table to indicate the recipe history
    status. An example of the information can be seen in Table [14-4](#480547_1_En_14_Chapter.xhtml#Tab4).


    Table 14-4


    Data Within the dbo.RecipeHistoryStatus Table


    | RecipeHistoryStatusID | RecipeHistoryStatusName | IsActive | DateCreated | DateModified
    |

    | --- | --- | --- | --- | --- |

    | 1 | Started | True | 05/21/2019 | 05/21/2019 |

    | 2 | Completed | True | 05/21/2019 | 05/21/2019 |

    | 3 | Cancelled | True | 05/21/2019 | 05/21/2019 |

    | 4 | Error | True | 05/21/2019 | 05/21/2019 |


    This table includes the status available when recording occurrences where someone
    has started preparing a recipe. To log each instance of a recipe being prepared,
    I would need to create a table to store information about when each recipe is
    prepared. There are several ways this could be recorded. For the sake of this
    chapter, I will create a single record each time a recipe is started. Once the
    recipe is started, the recipe can end up in a completed, cancelled, or error status.
    The query for storing the recipe history can be seen in Listing [14-11](#480547_1_En_14_Chapter.xhtml#PC11).


    ```

    CREATE TABLE dbo.RecipeHistory

    (

    RecipeHistoryID         INT         NOT NULL,

    RecipeID                SMALLINT    NOT NULL,

    RecipeHistoryStatusID   TINYINT     NOT NULL,

    DateCreated             DATETIME    NOT NULL,

    DateModified            DATETIME    ,

    CONSTRAINT pk_RecipeHistory_RecipeHistoryID

    PRIMARY KEY CLUSTERED (RecipeHistoryID),

    CONSTRAINT fk_RecipeHistory_RecipeID

    FOREIGN KEY (RecipeID)

    REFERENCES dbo.Recipe(RecipeID),

    CONSTRAINT fk_RecipeHistory_RecipeHistoryStatusID

    FOREIGN KEY (RecipeHistoryStatusID)

    REFERENCES

    dbo.RecipeHistoryStatus(RecipeHistoryStatusID)

    );

    Listing 14-11

    Create dbo.RecipeHistory Table

    ```


    This table can store each unique time a recipe is started. An example of the data
    stored in this table can be found in Table [14-5](#480547_1_En_14_Chapter.xhtml#Tab5).


    Table 14-5


    Data Within the dbo.RecipeHistory Table


    | RecipeHistoryID | RecipeID | RecipeHistoryStatusID | DateCreated | DateModified
    |

    | --- | --- | --- | --- | --- |

    | 1 | 1 | 2 | 05/17/2019 | 05/17/2019 |

    | 2 | 1 | 3 | 05/18/2019 | 05/18/2019 |

    | 3 | 3 | 4 | 05/20/2019 | 05/20/2019 |

    | 4 | 4 | 1 | 05/21/2019 | 05/21/2019 |


    The records in Table [14-5](#480547_1_En_14_Chapter.xhtml#Tab5) indicate recipes
    that have been started and their various statuses. The first record is for RecipeID
    of 1 with a status of completed. The second record is for RecipeID of 1 with a
    status of cancelled. The third record is for RecipeID of 3 with a status of error.
    The last record displayed is for RecipeID of 4 with a status of started.


    When there is an error for any of the records, those records will have a RecipeHistoryStatusID
    of 4 in the dbo.RecipeHistory table. Initially the amount of data in this table
    will not be very large, and it will be easy to find the recent error records within
    this table. However, over time this table will grow to a considerable size. This
    can cause SQL Server to search through many records in order to find any recent
    error records. If we plan for the table dbo.RecipeHistory to grow to a size where
    it will be difficult to search, we may implement error logging differently. There
    may be other scenarios where you would want to keep all records that have errored
    in an error status, but you would also want to know what to be able to resolve
    any issues with recently errored records.


    In either of these scenarios, it may be beneficial to create a table specifically
    for logging recent error records. Before creating this table, you may also want
    to consider how this table must be managed over time. Unlike the dbo.RecipeHistory
    table, you would want to make sure that this new table did not get too large.
    You would also want to only keep recent error records in this table. Keeping a
    small number of records in the table allows the table to be easily searched. The
    goal of this new table will only be to alert users of any recent error records.
    Considering the purpose of this table, you will also want to design a process
    to purge data from this table regularly.'
  trans: '## 错误处理


    在记录数据修改之外，您可能还会发现，记录数据库中发生的某些错误类型会很有帮助。虽然存在 SQL Server 特有的错误，但那不是本节的重点。还存在一些因应用程序与数据库交互而产生的错误。许多此类错误可以作为应用程序开发的一部分，在
    SQL Server 之外进行记录。但是，您可能会发现有些问题需要能从 SQL Server 内部访问。


    在考虑错误处理时，您不仅需要考虑如何记录这些信息，还需要考虑应用程序如何处理错误。在 SQL Server 内部，一个更常见的选择是使用 `TRY...CATCH`
    块。这段代码封装了尝试执行 T-SQL 代码的能力，并在尝试失败时执行特定操作。如果代码成功，则 T-SQL 代码将按预期执行。清单 14-10 展示了一个
    `TRY…CATCH` 块。


    ```

    CREATE PROCEDURE dbo.RecipeInsert

    @RecipeName VARCHAR(25),

    @RecipeDescription VARCHAR(50),

    @ServingQuantity TINYINT,

    @MealTypeID TINYINT,

    @PreparationTypeID TINYINT,

    @IsActive BIT,

    @DateCreated DATETIME2(7),

    @DateModified DATETIME2(7)

    AS

    BEGIN TRY

    BEGIN TRANSACTION

    INSERT INTO dbo.Recipe

    (

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    )

    VALUES

    (

    @RecipeName,

    @RecipeDescription,

    @ServingQuantity,

    @MealTypeID,

    @PreparationTypeID,

    @IsActive,

    @DateCreated,

    @DateModified

    )

    COMMIT TRANSACTION

    END TRY

    BEGIN CATCH

    ROLLBACK TRANSACTION

    END CATCH

    ```

    *清单 14-10 用于插入食谱的 Try…Catch 块*


    这段代码如果没有错误，将插入一条记录。但是，如果遇到错误，则事务将被回滚。有一些方法可以将其与应用程序代码集成，以便用户知晓事务中发生了错误。使用此方法的目标是防止应用程序崩溃，或防止最终用户期望事务能正确保存。如果用户知晓操作失败，他们可以选择纠正问题并重试该操作。


    您可能会发现您的应用程序能够毫无问题地写入或更新数据库中的数据。但是，您可能有一个将数据从一个系统发送到另一个系统的过程。可能存在基础设施问题或数据类型不一致，这可能导致在将数据从一个数据库对象发送到另一个时失败。这些也是您需要决定如何处理的一类错误。您仍然需要一种方法来处理这些故障，但您可能还需要更即时的报告，告知这些记录发送或接收失败。当今的业务要求持续的正常运行时间和成功的交互。您可以通过记录处理数据尝试失败时的方式来控制您响应这些问题的有效性。


    存储需要流经系统的信息的数据库表通常在数据表中存储一个状态类型列。无论哪个过程更新记录的状态，都可能在更新记录状态时出现问题，或者将记录状态更新为失败状态。当表中的数据量不大时，查找这些失败的记录可能很容易。这通常需要搜索在指定时间内状态未更改的记录，或者处于失败或错误状态的记录。


    根据我们如何使用食谱信息，我们可能希望记录每个食谱何时被准备。我们可以有一个应用程序，让我们能够指示食谱何时开始和完成。这些信息可以与食谱状态一起记录。我需要创建一个表来指示食谱历史状态。可以在表
    14-4 中看到信息的示例。


    *表 14-4 dbo.RecipeHistoryStatus 表中的数据*


    | RecipeHistoryStatusID | RecipeHistoryStatusName | IsActive | DateCreated | DateModified
    |

    | --- | --- | --- | --- | --- |

    | 1 | Started | True | 05/21/2019 | 05/21/2019 |

    | 2 | Completed | True | 05/21/2019 | 05/21/2019 |

    | 3 | Cancelled | True | 05/21/2019 | 05/21/2019 |

    | 4 | Error | True | 05/21/2019 | 05/21/2019 |


    此表包含当记录某人开始准备食谱时可用的状态。为了记录每次准备食谱的实例，我需要创建一个表来存储每次准备食谱时的信息。有几种记录方式。为了本章的目的，我将在每次食谱开始时创建一条记录。一旦食谱开始，该食谱最终可能处于完成、取消或错误状态。用于存储食谱历史记录的查询可以在清单
    14-11 中看到。


    ```

    CREATE TABLE dbo.RecipeHistory

    (

    RecipeHistoryID         INT         NOT NULL,

    RecipeID                SMALLINT    NOT NULL,

    RecipeHistoryStatusID   TINYINT     NOT NULL,

    DateCreated             DATETIME    NOT NULL,

    DateModified            DATETIME    ,

    CONSTRAINT pk_RecipeHistory_RecipeHistoryID

    PRIMARY KEY CLUSTERED (RecipeHistoryID),

    CONSTRAINT fk_RecipeHistory_RecipeID

    FOREIGN KEY (RecipeID)

    REFERENCES dbo.Recipe(RecipeID),

    CONSTRAINT fk_RecipeHistory_RecipeHistoryStatusID

    FOREIGN KEY (RecipeHistoryStatusID)

    REFERENCES

    dbo.RecipeHistoryStatus(RecipeHistoryStatusID)

    );

    ```

    *清单 14-11 创建 dbo.RecipeHistory 表*


    此表可以存储每次食谱开始的唯一时间。可以在表 14-5 中找到存储在此表中的数据示例。


    *表 14-5 dbo.RecipeHistory 表中的数据*


    | RecipeHistoryID | RecipeID | RecipeHistoryStatusID | DateCreated | DateModified
    |

    | --- | --- | --- | --- | --- |

    | 1 | 1 | 2 | 05/17/2019 | 05/17/2019 |

    | 2 | 1 | 3 | 05/18/2019 | 05/18/2019 |

    | 3 | 3 | 4 | 05/20/2019 | 05/20/2019 |

    | 4 | 4 | 1 | 05/21/2019 | 05/21/2019 |


    表 14-5 中的记录指示了已开始及其各种状态的食谱。第一条记录是 `RecipeID` 为 1、状态为完成的记录。第二条记录是 `RecipeID` 为
    1、状态为取消的记录。第三条记录是 `RecipeID` 为 3、状态为错误的记录。最后显示的记录是 `RecipeID` 为 4、状态为开始的记录。


    当任何记录出现错误时，这些记录在 `dbo.RecipeHistory` 表中的 `RecipeHistoryStatusID` 将为 4。最初此表中的数据量不会很大，因此很容易在其中查找最近的错误记录。然而，随着时间的推移，此表将增长到相当大的规模。这可能导致
    SQL Server 必须搜索许多记录才能找到任何最近的错误记录。如果我们计划 `dbo.RecipeHistory` 表增长到难以搜索的大小，我们可能会以不同的方式实现错误日志记录。可能存在其他场景，您希望保留所有处于错误状态的出错记录，但同时您也希望知道如何解决最近出错记录的问题。


    在上述任一场景中，创建一个专门用于记录最近错误记录的表可能很有益。在创建此表之前，您可能还希望考虑如何随时间管理此表。与 `dbo.RecipeHistory`
    表不同，您需要确保这个新表不会变得太大。您还希望仅在此表中保留最近的错误记录。在表中保留少量记录使表易于搜索。这个新表的目标仅仅是提醒用户任何最近的错误记录。考虑到此表的目的，您还需要设计一个定期清除此表数据的过程。'
- fmt: 'If you choose to create an additional logging table for error records, you
    may end up creating a table like the one in Listing [14-12](#480547_1_En_14_Chapter.xhtml#PC12).


    ```sql

    CREATE TABLE dbo.RecipeHistoryLog

    (

    RecipeHistoryLogID      INT         NOT NULL,

    RecipeHistoryID         INT         NOT NULL,

    DateCreated             DATETIME    NOT NULL,

    DateModified            DATETIME    ,

    CONSTRAINT pk_RecipeHistoryLog_RecipeHistoryLogID

    PRIMARY KEY CLUSTERED (RecipeHistoryLogID),

    CONSTRAINT fk_RecipeHistoryLog_RecipeHistoryID

    FOREIGN KEY (RecipeHistoryID)

    REFERENCES dbo.RecipeHistory(RecipeHistoryID)

    );

    ```

    Listing 14-12: Create `dbo.RecipeHistoryLog` Table


    Any record that errors on the `dbo.RecipeHistory` table can have a corresponding
    record entered to the table in Listing [14-12](#480547_1_En_14_Chapter.xhtml#PC12).
    In Table [14-5](#480547_1_En_14_Chapter.xhtml#Tab5), there was an error record
    for `RecipeHistoryID` 2. If we had created the table in Listing [14-12](#480547_1_En_14_Chapter.xhtml#PC12)
    before that error record was created, we might see an entry like the one in Table
    [14-6](#480547_1_En_14_Chapter.xhtml#Tab6).


    **Table 14-6: Data Within the `dbo.RecipeHistoryLog` Table**


    | RecipeHistoryLogID | RecipeHistoryID | DateCreated | DateModified |

    | --- | --- | --- | --- |

    | 1 | 2 | 05/18/2019 | 05/18/2019 |


    Once we have a record in the `dbo.RecipeHistoryLog` table, we can generate an
    alert based on the existence of a record in this table. One option may be to have
    a stored procedure that is executed every 15 minutes. The purpose of this stored
    procedure may be to generate an email if there are any records found in the `dbo.RecipeHistoryLog`
    table. If you choose this method to create your alerts, you will want to also
    make certain that you remove data from this table regularly. In this case, you
    would also need a stored procedure to regularly remove data from this table.


    Regardless of which method you choose to implement logging errors between your
    applications and SQL Server, you should make sure that these errors are tracked
    somewhere that can be accessible to multiple parties. One of the more difficult
    issues to troubleshoot is when there is no logging available. The goal of logging
    errors related to SQL Server is to allow individuals within your organization
    to quickly find where issues are occurring so that they can resolve them efficiently.
    You may choose to implement most of your error handling from the application.
    However, it may be possible to generate automated reports from within SQL Server
    for errors that need to be corrected promptly.


    As part of your application development, you will want to consider what type of
    logging is necessary for your organization. In industries where there is the possibility
    for greater theft, it may be more important to track when a data modification
    occurs and who modified the data. Depending on the information needed will determine
    what type of logging you implement for data modifications. You will also want
    to consider how to manage errors associated with the database. These are not errors
    that are specific to SQL Server but are errors that occur as a result of the T-SQL
    code that has been written for use by your applications. After determining how
    to manage logging for your application, you may want to consider how to design
    your T-SQL code to be reusable.


    # 15. Managing Data Growth


    When a database is first created, for a given amount of time, the tables in the
    database will remain small. Depending on the nature of the data stored in the
    table or the amount of time that has passed, you may find yourself in a situation
    where one or more of your tables have experienced a significant amount of growth
    since the table was first created. There can be many motivations for managing
    the relative age of the data stored in a table or how data is stored overall.
    The goal of this chapter will be to focus on organizing your data in a way that
    can be managed long term. While many companies also have the goal of improving
    performance when it comes to managing data, that will not be the focus of this
    chapter.


    SQL Server provides the functionality to separate or sort your data into various
    groups or categories. When it comes to managing data growth, this data is normally
    sorted by date. You are not limited to organizing your data by a given date, but
    for the purposes of this chapter, that will be my focus. You will first want to
    figure out how to organize your data, not only how the data will be grouped but
    also how the data will be stored. Setting up the functionality for sorting and
    storing your data will allow you to start moving your data into those various
    groups that you have created. There are options available on how to group the
    data, and you have the possibility of using multiple different ways to store your
    data. This allows you to design a solution that can support a highly transactional
    throughput for recent data and allow older data to be designed in a way to support
    reporting.'
