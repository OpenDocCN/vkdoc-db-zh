  raw: 'There are times when working with T-SQL code that you will write complex code.
    This code may include subqueries or logic in the WHERE clause involving ANDs or
    ORs. If there is logic like a subquery or a mixture of ANDs and ORs in the WHERE
    clause, I will wrap those in parentheses. I will indent all the code inside the
    parentheses so that it is easy to identify what logic is wrapped together. There
    are also times where there are multiple join conditions between two tables. If
    there is more than one join condition between two tables, I will indent every
    join condition except the first one so that others can easily tell there are multiple
    join conditions between two tables.


    You will also want to consider how to format T-SQL code when adding additional
    levels of logic to your code. There are various reasons for T-SQL code blocks
    including TRY… CATCH blocks, IF… ELSE statements, BEGIN…END, or other reasons
    to segment code. For these scenarios, I indent the interior of the code block.
    If code blocks end up being nested, I will indent each subsequent code block.
    I prefer to indent my code blocks so that others reviewing my code can see the
    parent activity such as the WHILE loop in Listing [3-17](#480547_1_En_3_Chapter.xhtml#PC17).
    Once you see the first level of indentation, you know that all the logic that
    has been indented belongs to the same code block.


    ```

    SET NOCOUNT ON;

    DECLARE @RecipeID INT,

    @RecipeName VARCHAR(25),

    @message VARCHAR(50);

    PRINT ''-------- Recipe Listing --------'';

    DECLARE recipe_cursor CURSOR FORWARD_ONLY

    FOR

    SELECT RecipeID, RecipeName

    FROM dbo.Recipe

    ORDER BY RecipeID;

    OPEN recipe_cursor

    FETCH NEXT FROM recipe_cursor

    INTO @RecipeID, @RecipeName

    WHILE @@FETCH_STATUS = 0

    BEGIN

    PRINT '' ''

    SELECT @message = ''----- Ingredients For Recipe: '' + @RecipeName + ''-----''

    PRINT @message

    SELECT ing.IngredientName,

    srv.ServingPortionQuantity,

    srv.ServingPortionUnit

    FROM dbo.Ingredient ing

    INNER JOIN dbo.RecipeIngredient recing

    ON ing.IngredientID = recing.IngredientID

    INNER JOIN dbo.ServingPortion srv

    ON recing.ServingPortionID = srv.ServingPortionID

    WHERE recing.RecipeID = @RecipeID

    FETCH NEXT FROM recipe_cursor INTO @RecipeID, @RecipeName

    END

    CLOSE recipe_cursor;

    DEALLOCATE recipe_cursor;

    Listing 3-17

    Create a Cursor

    ```


    Formatting T-SQL code consistently improves readability for yourself and anyone
    in the future who will need to review your code. Well-formatted code can help
    provide clarity when troubleshooting, performance tuning, and code enhancing.
    Creating a T-SQL formatting standard in your organization can also help when onboarding
    new employees or training junior database developers. Once T-SQL formatting standards
    have been determined, you will want to consider what steps need to be taken to
    create naming conventions for your T-SQL code.


    ## Naming T-SQL


    When you write T-SQL, you have options on how to write that code. You will most
    likely create persistent objects in T-SQL. Regardless of your purpose, following
    a good naming policy makes it easier for others to understand the purpose of your
    T-SQL code. Ideally, your team members should be able to determine the purpose
    of your code based on the object name where the code lives. This is particularly
    helpful for new or less experienced employees.


    The same practices for formatting T-SQL are similar for when choosing your naming
    convention strategy. One of the aspects that comes with naming conventions is
    look and feel. This can involve the capitalization used for objects. There are
    various options available when providing a case for database objects. The main
    choices are camel case or pascal case. The primary difference between these casing
    styles is the first letter of the database object. In Listing [3-18](#480547_1_En_3_Chapter.xhtml#PC18),
    you will see writing a query using camel case.


    ```

    SELECT recipeID, ingredientID, dateCreated, dateModified

    FROM dbo.recipeIngredient

    Listing 3-18

    Query with Camel Case

    ```


    Conversely, you can see in Listing [3-19](#480547_1_En_3_Chapter.xhtml#PC19) what
    pascal case looks like when writing the same query.


    ```

    SELECT RecipeID, IngredientID, DateCreated, DateModified

    FROM dbo.RecipeIngredient

    Listing 3-19

    Query with Pascal Case

    ```


    In addition, there is also an option where the first letter is not capitalized
    and there is an underscore between words. I am generally not a fan of non-alphabetic
    characters in database names, but I do know some people that prefer underscores.
    If you want another alternative, Listing [3-20](#480547_1_En_3_Chapter.xhtml#PC20)
    shows how tables and columns would need to be named has been referred to as snake
    case.


    ```

    SELECT recipeID, ingredientID, date_created, date_modified

    FROM dbo.recipe_ingredient

    Listing 3-20

    Query with Snake Case

    ```


    When determining which case to use for your naming convention, make sure to also
    be aware of the collation for your database and if any tables have a special collation.
    Being aware of case sensitivity will help you ensure that your naming conventions
    and your formatting standards line up.


    This can also involve where objects appear in Object Explorer. Some of this has
    to do with what type of object is being named and who will be looking for these
    objects. If you are wanting to find objects by their use, you may want to specify
    schema names that group those objects together. This can be particularly useful
    for applications or services. Depending on what type of troubleshooting is expected,
    database objects, particularly stored procedures, can be named with the action
    they are taking. This would allow for an easy search of stored procedures that
    are selecting data vs. inserting data. However, there is also another option where
    the main table affected could be the first word in the stored procedure name.
    This would allow someone to search in Object Explorer by affected table to see
    all the stored procedures that exist.


    Another consideration is whether reserved words can be used when naming database
    objects. If reserved words are used in database object names, you will want to
    add another word to the object name so that brackets are not needed when referencing
    the object name.


    When determining naming conventions, you may also want to consider if there are
    columns in tables that will have the same names as other columns in tables. Some
    of these types of columns include specifying the date a record was created, the
    date a record was last updated, and if the record has been soft deleted. For tables
    that are specifying status or types, these tables can have columns with a status
    or type name and an associated description. You may decide that you want all these
    columns to have the exact same name in all tables with these columns.'
  trans: "\n# 格式化 T-SQL 代码\n\n在使用 T-SQL 代码时，有时你会编写复杂的代码。这些代码可能包含子查询，或者 `WHERE` 子句中涉及\
    \ `AND` 或 `OR` 的逻辑。如果 `WHERE` 子句中存在诸如子查询或 `AND` 和 `OR` 混合使用之类的逻辑，我会将它们括在括号内。我会将括号内的所有代码进行缩进，以便轻松识别哪些逻辑被组合在一起。有时，两个表之间存在多个连接条件。如果两个表之间有不止一个连接条件，我会对除第一个连接条件外的每一个连接条件进行缩进，以便他人可以轻易看出两个表之间存在多个连接条件。\n\
    \n当向代码中添加额外的逻辑层次时，你还需要考虑如何格式化 T-SQL 代码。T-SQL 代码块有各种原因，包括 `TRY… CATCH` 块、`IF… ELSE`\
    \ 语句、`BEGIN…END`，或者其他需要分割代码的情况。对于这些场景，我会对代码块的内部进行缩进。如果代码块最终被嵌套，我会对每个后续代码块进行缩进。我倾向于对代码块进行缩进，以便审查我代码的人可以看到父级活动，例如清单\
    \ 3-17 中的 `WHILE` 循环。一旦你看到第一级缩进，你就知道所有缩进的逻辑都属于同一个代码块。\n\n```sql\nSET NOCOUNT ON;\n\
    DECLARE @RecipeID INT,\n    @RecipeName VARCHAR(25),\n    @message VARCHAR(50);\n\
    PRINT '-------- Recipe Listing --------';\nDECLARE recipe_cursor CURSOR FORWARD_ONLY\n\
    FOR\nSELECT RecipeID, RecipeName\nFROM dbo.Recipe\nORDER BY RecipeID;\nOPEN recipe_cursor\n\
    FETCH NEXT FROM recipe_cursor\nINTO @RecipeID, @RecipeName\nWHILE @@FETCH_STATUS\
    \ = 0\nBEGIN\n    PRINT ' '\n    SELECT @message = '----- Ingredients For Recipe:\
    \ ' + @RecipeName + '-----'\n    PRINT @message\n    SELECT ing.IngredientName,\n\
    \        srv.ServingPortionQuantity,\n        srv.ServingPortionUnit\n    FROM\
    \ dbo.Ingredient ing\n    INNER JOIN dbo.RecipeIngredient recing\n        ON ing.IngredientID\
    \ = recing.IngredientID\n    INNER JOIN dbo.ServingPortion srv\n        ON recing.ServingPortionID\
    \ = srv.ServingPortionID\n    WHERE recing.RecipeID = @RecipeID\n    FETCH NEXT\
    \ FROM recipe_cursor INTO @RecipeID, @RecipeName\nEND\nCLOSE recipe_cursor;\n\
    DEALLOCATE recipe_cursor;\n```\n清单 3-17\n创建游标\n\n一致地格式化 T-SQL 代码可以提高你自己以及将来需要审查你代码的任何人的可读性。格式良好的代码可以在故障排除、性能调优和代码增强时提供清晰度。在你的组织中创建\
    \ T-SQL 格式化标准也有助于新员工入职或培训初级数据库开发人员。一旦确定了 T-SQL 格式化标准，你将需要考虑采取哪些步骤来为你的 T-SQL 代码创建命名约定。\n\
    \n## 命名 T-SQL\n\n当你编写 T-SQL 时，你有选择如何编写该代码的方式。你很可能会在 T-SQL 中创建持久性对象。无论你的目的是什么，遵循良好的命名策略都使他人更容易理解你的\
    \ T-SQL 代码的用途。理想情况下，你的团队成员应该能够基于代码所在的对象名称来确定你代码的目的。这对于新员工或经验较少的员工特别有帮助。\n\n格式化\
    \ T-SQL 的相同实践在选择命名约定策略时是类似的。命名约定带来的一个方面是外观和感觉。这可以涉及用于对象的大写字母。在为数据库对象提供大小写时，有多种可用选项。主要选择是驼峰式命名法（camel\
    \ case）或帕斯卡式命名法（pascal case）。这些大小写风格之间的主要区别在于数据库对象的首字母。在清单 3-18 中，你将看到使用驼峰式命名法编写的查询。\n\
    \n```sql\nSELECT recipeID, ingredientID, dateCreated, dateModified\nFROM dbo.recipeIngredient\n\
    ```\n清单 3-18\n使用驼峰式命名法的查询\n\n相反，在清单 3-19 中，你可以看到编写相同查询时帕斯卡式命名法的样子。\n\n```sql\n\
    SELECT RecipeID, IngredientID, DateCreated, DateModified\nFROM dbo.RecipeIngredient\n\
    ```\n清单 3-19\n使用帕斯卡式命名法的查询\n\n此外，还有一种选项是首字母不大写，并且单词之间用下划线分隔。我通常不喜欢数据库名称中出现非字母字符，但我知道有些人偏爱下划线。如果你想要另一种选择，清单\
    \ 3-20 展示了表和列需要如何命名，这被称为蛇形命名法（snake case）。\n\n```sql\nSELECT recipeID, ingredientID,\
    \ date_created, date_modified\nFROM dbo.recipe_ingredient\n```\n清单 3-20\n使用蛇形命名法的查询\n\
    \n在确定命名约定使用哪种大小写时，请务必注意数据库的排序规则以及是否有任何表具有特殊的排序规则。了解大小写敏感性将有助于确保你的命名约定和格式化标准保持一致。\n\
    \n这还可能涉及对象在对象资源管理器中出现的位置。其中一些与正在命名的对象类型以及谁将查找这些对象有关。如果你想根据用途查找对象，你可能需要指定将这些对象分组在一起的模式名称。这对于应用程序或服务可能特别有用。根据预期进行何种类型的故障排除，数据库对象，尤其是存储过程，可以以它们所执行的操作来命名。这将便于搜索执行数据选择与数据插入的存储过程。但是，还有另一种选择，即主要受影响的表可以作为存储过程名称的第一个单词。这将允许某人按受影响的表在对象资源管理器中搜索，以查看所有存在的存储过程。\n\
    \n另一个考虑因素是在命名数据库对象时是否可以使用保留字。如果在数据库对象名称中使用了保留字，你将需要在对象名称中添加另一个单词，以便在引用对象名称时不需要使用方括号。\n\
    \n在确定命名约定时，你可能还想考虑表中是否有列将与其他表中的列具有相同的名称。这类列中的一部分包括指定记录创建日期、记录最后更新日期以及记录是否被软删除。对于指定状态或类型的表，这些表可以包含一个状态或类型名称列以及一个关联的描述列。你可能决定希望所有具有这些列的表中的所有这些列都具有完全相同的名称。\n"
- fmt: '# 数据库对象命名约定


    当编写查询时，我倾向于不给列名起别名（如果可能的话）。同时，我也不会显示多个创建日期或更新日期列。因此，对于创建日期、修改日期和软删除标志，我会使用完全相同的名称。然而，在编写查询时，我通常也会从多个表中拉取名称或描述字段。因此，我希望这些列名中包含表名作为列名的一部分。这允许其他人查看`SELECT`语句时能轻松识别引用的是哪个表。这也意味着我在编写查询时需要别名的列更少。


    ## 命名持久化数据库对象


    命名持久化数据库对象也可能很棘手。命名表可能不同于命名索引、视图、触发器或函数。再次强调，命名这些对象不仅仅是给它们一个描述性的名称。此外，这还可能涉及给它们一个能清楚表明其对象类型的名称。这是因为许多数据库工程师和开发人员使用**对象资源管理器**作为查找对象的主要工具。正如我所讨论的，如果表名以名词开头，存储过程以动词开头，那么我接下来需要弄清楚如何将其他数据库对象与表和存储过程区分开来。


    ## 使用对象类型缩写前缀


    一种选择是在对象名称前加上对象类型的缩写。对于索引，可以使用`IX_`表示非聚集索引，使用`CX_`表示聚集索引。在命名索引时，一旦指定了`IX_`或`CX_`，下一个项目应该是该索引所在的表名。表名之后应该是索引中的列列表。列的顺序应与创建索引时指定的顺序相同。在清单[3-21]中，我创建了一个聚集索引。如你所见，聚集索引名称以`CX`开头，后跟表名，然后是列名。每个部分用下划线分隔。


    ```

    CREATE CLUSTERED INDEX CX_Ingredient_IngredientName

    ON dbo.Ingredient (IngredientName);

    Listing 3-21

    Create a Clustered Index

    ```


    创建非聚集索引遵循相同的模式。在清单[3-22]中，你会看到非聚集索引也包含多列。


    ```

    CREATE NONCLUSTERED INDEX IX_Ingredient_IngredientName_IsActive

    ON dbo.Ingredient (IngredientName ASC, IsActive DESC);

    Listing 3-22

    Create a Non-clustered Index with Multiple Columns

    ```


    ## 命名主键和外键


    在创建主键和外键时也是如此。如果在`T-SQL`中创建主键或外键时没有指定名称，`SQL Server`会随机分配一个名称。因此，最佳实践是显式命名主键或外键。在命名主键时，你会希望主键以`PK_`开头，代表主键。类似地，你会希望在外键名称前加上`FK_`，然后命名键的其余部分。名称的下一部分是分配主键或外键的表名。然后是用于定义主键或外键的列。如果指定了多个列，则主键或外键中列出的列应按顺序排列。清单[3-23]展示了一个在表创建后如何添加并命名主键的示例。


    ```

    ALTER TABLE dbo.Ingredient

    ADD CONSTRAINT PK_Ingredient_IngredientID

    PRIMARY KEY (IngredientID);

    Listing 3-23

    Add a Primary Key

    ```


    如你所见，主键名称以`PK`开头，后跟表名，然后是用于创建主键的列名。


    类似地，你会希望在外键名称前加上`FK_`，然后命名键的其余部分。名称的下一部分是分配主键或外键的表名。然后是用于定义主键或外键的列。如果指定了多个列，则主键或外键中列出的列应按顺序排列。在表创建后创建外键时，可以参考清单[3-24]。


    ```

    ALTER TABLE dbo.RecipeIngredient

    ADD CONSTRAINT FK_RecipeIngredient_IngredientID

    FOREIGN KEY (IngredientID)

    REFERENCES dbo.Ingredient(IngredientID);

    Listing 3-24

    Add a Foreign Key

    ```


    与创建主键类似，外键遵循相似的命名结构。外键以`FK`开头，后跟表名，然后是列名。


    ## 命名视图和触发器


    我也可以在视图名称前加上`vw_`，在触发器名称前加上`tr_`。还有其他不那么明显的选项可用。例如，你可以定义一组仅保留用于视图或触发器的名词或动词。这将给你更多的灵活性，同时也能避免对象资源管理器列表中的所有项目都以相同的三个字符开头。这将使任何人都能轻松看出这些对象既不是表也不是存储过程。对于视图和触发器来说尤其如此。


    最大的挑战之一是，如果它们没有被命名得显而易见，人们可能会花费大量时间寻找这些对象却找不到。这是因为视图的使用方式类似于表，而触发器的操作方式类似于存储过程。这是因为视图像表一样用于连接，而触发器像存储过程一样更改对象。触发器甚至更棘手，因为它们可能导致你花费大量时间研究存储过程，试图确定为什么值会发生变化。


    ## 命名表


    在命名表时，你希望只使用名词。这有助于表明这些对象用于存储，而不是执行任何特定活动。在命名对象时，一个常被忽视直到为时已晚的命名约定是对象应该是单数还是复数。在第一次出现复数对象之前，这真的不是问题。一旦一个复数的数据库对象进入整个模式中，其问题很快就会变得明显。这是因为一旦数据库中存在复数对象，在编写查询时就越来越难记住哪些表是复数形式。


    你还希望确保在命名表时选择一个描述性名称。你需要以一种其他数据库工程师和开发人员能够轻松知道表中存储了什么类型信息的方式来描述你的表。用名词命名表也将表明该对象用于存储，而不是执行任何特定活动。


    ## 命名存储过程


    大多数用户很容易熟悉表和存储过程。选择一个通过让存储过程以动词开头或将高级标准作为存储过程名称的一部分来区分这些对象的命名约定是很容易的。清单[3-25]展示了一个存储过程名称以动词开头的示例。


    ```

    EXECUTE dbo.GetRecipeIngredient

    Listing 3-25

    Stored Procedure Beginning with a Verb

    ```


    如果我看到那个存储过程名称，我会期望它检索所有食谱及其相关配料。清单[3-26]中的存储过程将拉回给定食谱的所有配料。


    ```

    EXECUTE dbo.GetIngredientByRecipe

    Listing 3-26

    Stored Procedure with Selection Criteria

    ```'
  raw: 'When writing my queries, I prefer not to alias my column names, if possible.
    I also am not displaying more than one date created or updated. Therefore, I would
    use the exact same name for creation date, modified date, and the soft delete
    flag. However, I also am usually pulling back the name or description field from
    multiple tables when I write my queries. Therefore, I prefer those columns to
    include the table name as part of the column name. This allows others to view
    the select statement and easily identify which table is being referenced. It also
    means I am aliasing less columns when I write my queries.


    Naming persistent database objects can get tricky as well. Naming tables can be
    different than naming indexes or views or triggers or functions. Once again, naming
    these objects is more than just giving them a descriptive name. In addition, it
    may also be about giving them a name that makes it clear what type of object it
    is. This is because many database engineers and developers use Object Explorer
    as their primary tool for finding objects. As I have discussed if table names
    begin with nouns and stored procedures begin with verbs, I next need to figure
    out how to differentiate other database objects from tables and stored procedures.


    One of the options is to precede the object name with an abbreviation for the
    object type. In the case of indexes, you can use IX_ for non-clustered indexes
    and CX_ for clustered indexes. When naming indexes, once you specify the IX_ or
    CX_ the next item should be the table name where the index exists. After the table
    name should be the list of columns in the index. The columns should be listed
    in the same order that they are specified when the index is created. In Listing
    [3-21](#480547_1_En_3_Chapter.xhtml#PC21), I have created a clustered index. As
    you can see, the clustered index name begins with CX followed by the table name
    and then the column name. Each section is separated by an underscore.


    ```

    CREATE CLUSTERED INDEX CX_Ingredient_IngredientName

    ON dbo.Ingredient (IngredientName);

    Listing 3-21

    Create a Clustered Index

    ```


    Creating a non-clustered index follows the same pattern. In Listing [3-22](#480547_1_En_3_Chapter.xhtml#PC22),
    you will see the non-clustered index also includes multiple columns.


    ```

    CREATE NONCLUSTERED INDEX IX_Ingredient_IngredientName_IsActive

    ON dbo.Ingredient (IngredientName ASC, IsActive DESC);

    Listing 3-22

    Create a Non-clustered Index with Multiple Columns

    ```


    The same is true when creating primary and foreign keys. If you do not specify
    a name when you create a primary or foreign key in T-SQL, SQL Server will assign
    a name at random. Therefore, it is best practice to specifically name the primary
    or foreign key. When naming the primary key, you will want the primary key to
    begin with PK_ which stands for primary key. Similarly, you will want to precede
    the foreign key with FK_ and then name the rest of the key. The next part of the
    name is the table name where the primary or foreign key is assigned. This is followed
    by the column or columns used to define the primary or foreign key. If there is
    more than one column specified, the columns listed in the primary or foreign key
    should be listed in order. Listing [3-23](#480547_1_En_3_Chapter.xhtml#PC23) shows
    an example of how to add and name a primary key after table has been created.


    ```

    ALTER TABLE dbo.Ingredient

    ADD CONSTRAINT PK_Ingredient_IngredientID

    PRIMARY KEY (IngredientID);

    Listing 3-23

    Add a Primary Key

    ```


    As you can see, the primary key name begins with PK followed by the table name
    and then the column name used for the creation of the primary key.


    Similarly, you will want to precede the foreign key with FK_ and then name the
    rest of the key. The next part of the name is the table name where the primary
    or foreign key is assigned. This is followed by the column or columns used to
    define the primary or foreign key. If there is more than one column specified,
    the columns listed in the primary or foreign key should be listed in order. When
    creating a foreign key after the table has been created, you can refer to Listing
    [3-24](#480547_1_En_3_Chapter.xhtml#PC24).


    ```

    ALTER TABLE dbo.RecipeIngredient

    ADD CONSTRAINT FK_RecipeIngredient_IngredientID

    FOREIGN KEY (IngredientID)

    REFERENCES dbo.Ingredient(IngredientID);

    Listing 3-24

    Add a Foreign Key

    ```


    Like creating the primary key, the foreign key follows a similar naming structure.
    The foreign key begins with FK followed by the table name and then the column
    name.


    I can also precede views with vw_ and triggers with tr_. There are other options
    available that can be less obvious. For instance, you can define a list of nouns
    or verbs that will be reserved for only views or triggers. This will give you
    more flexibility, and it will also keep Object Explorer from having all items
    in the list begin with the same three characters. This will allow anyone to easily
    be able to tell these objects are neither tables nor stored procedures. This is
    particularly true when it comes to views and triggers.


    One of the biggest challenges is that if they are not named to make it obvious
    that they are views or triggers, people can spend a significant amount of time
    looking for these objects without being able to find them. This is because views
    are used similarly to tables, and triggers operate similarly to stored procedures.
    This is because views are used in joins like tables, whereas triggers change objects
    like stored procedures. Triggers are even trickier because they can cause you
    to spend a significant amount of time researching stored procedures trying to
    determine why values are changing.


    When naming tables, you want to use only nouns. This helps signify that these
    objects are for storage and not performing any specific activity. When naming
    objects, one of the naming conventions that is often overlooked until it is too
    late is whether objects are singular or plural. It is not really an issue until
    that first time where an object is pluralized. Once a plural database object is
    in the overall schema, it becomes obvious very quickly the issues with a plural
    object. This is because once a plural object exists in the database, it becomes
    increasingly difficult to write queries without specifically remembering which
    tables are plural.


    You also want to make sure that you choose a descriptive name when naming a table.
    You will want to describe your table in a way that other database engineers and
    developers will easily know what type of information is stored in the table. Naming
    tables with nouns will also indicate that the object is for storage and not performing
    any specific activities.


    Most users become easily familiar with tables and stored procedures. It is easy
    to choose a naming convention that differentiates these objects either by having
    stored procedure preceded with a verb or having additional high-level criteria
    as part of the stored procedure name. Listing [3-25](#480547_1_En_3_Chapter.xhtml#PC25)
    shows a stored procedure that has a verb at the beginning of a stored procedure
    name.


    ```

    EXECUTE dbo.GetRecipeIngredient

    Listing 3-25

    Stored Procedure Beginning with a Verb

    ```


    If I were to see that stored procedure name, I would expect it to retrieve all
    recipes and all associated ingredients. The stored procedure in Listing [3-26](#480547_1_En_3_Chapter.xhtml#PC26)
    would pull back all the ingredients for a given stored procedure.


    ```

    EXECUTE dbo.GetIngredientByRecipe

    Listing 3-26

    Stored Procedure with Selection Criteria

    ```'
