  trans: '## 局部临时表


    如果你发现自己需要将数据暂存以便进行额外分析或处理，那么你可能考虑过使用局部临时表。这类临时表在存储过程内部也很有用。局部临时表仅在创建它们的同一会话或连接内可用。一旦会话关闭或连接终止，你就无法访问该局部临时表。


    虽然局部临时表可用于许多不同的场景，但通常建议，在需要临时存储数据时，不要首先使用临时表。局部临时表本身并无问题，但你可能会发现其他对象能够以更小的潜在性能影响来临时存储数据。与所有与
    SQL Server 相关的事项一样，在将 T-SQL 代码部署到生产环境之前，最好实施解决方案并对其进行测试，包括负载测试。


    创建临时表很容易。虽然可以在创建表的同时将数据插入临时表，但最佳实践是先创建具有已定义数据类型的临时表，然后再插入记录。在代码清单 2-25 中，有一段用于生成局部临时表的代码。作为对比，用于填充此表的代码与代码清单
    2-2 中使用的代码相同。


    ```

    CREATE TABLE #TempAvailableMeal

    (

    MealTypeName VARCHAR(25),

    RecipeName VARCHAR(25),

    ServingQuantity TINYINT,

    IngredientName VARCHAR(25)

    )

    ```


    代码清单 2-25

    创建临时表


    一旦临时表创建完成，运行代码清单 2-26 中的查询以填充表中的数据。


    ```

    INSERT INTO #TempAvailableMeal (MealTypeName, RecipeName, ServingQuantity, IngredientName)

    SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    ```


    代码清单 2-26

    填充临时表


    当我运行填充临时表的过程时，我还获取了此过程的执行计划。在图 2-17 中，你会看到该执行计划看起来与为视图和公用表表达式生成的执行计划相似。虽然形状相似，但正在发生的部分活动以及百分比分布有所不同。


    `../images/480547_1_En_2_Chapter/480547_1_En_2_Fig17_HTML.jpg`


    图 2-17

    创建临时表的执行计划


    既然我们已经确定了创建临时表的执行计划是什么样子，那么当我们从临时表中查询数据后，执行计划又是如何的呢？代码清单 2-27 展示了如何查询现有的临时表。


    ```

    SELECT MealTypeName, RecipeName, ServingQuantity, IngredientName

    FROM #TempAvailableMeal

    ```


    代码清单 2-27

    查询临时表


    到目前为止，我们已经看到，对于大多数查询而言，大部分工作发生在原始数据被选取的同一时间。而在本例中，`insert` 和 `select` 已被分离成两个独立的步骤。图
    2-18 是查询临时表中的数据时生成的执行计划。


    `../images/480547_1_En_2_Chapter/480547_1_En_2_Fig18_HTML.jpg`


    图 2-18

    查询临时表


    虽然此查询使用了 `Table Scan`（表扫描），但可以向临时表添加索引。


    ## 全局临时表


    你可能会发现自己想要创建一个存在时间比当前会话或活动数据库连接更长的临时表。也许你想要一个可以被多个用户访问的临时表。在这种情况下，你可能需要创建一个全局临时表。即使创建该全局临时表的原始会话或连接不再活动，这个全局临时表仍然会存在。


    创建全局临时表很简单。如果我想重新创建代码清单 2-26 中的临时表，但要确保该表是全局的，我可以运行代码清单 2-28 中的代码来创建全局临时表。


    ```

    INSERT INTO ##TempAvailableMeal (MealTypeName, RecipeName, ServingQuantity, IngredientName)

    SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    ```


    代码清单 2-28

    创建全局临时表


    创建局部临时表和全局临时表之间的唯一区别在于创建时使用的表名。比较代码清单 2-26（用于局部临时表）和代码清单 2-28（用于全局临时表）的代码，你可以看到表名的差异。在代码清单
    2-26 中，表名是 `#TempAvailableMeal`，而在代码清单 2-28 中，临时表名是 `##TempAvailableMeal`。表名开头多出的第二个
    `#` 字符表明该临时表是一个全局临时表。此外，全局临时表的运行方式与局部临时表类似。一个关键区别是，全局临时表可以在创建该临时表的特定连接之外被访问。'
- fmt: '#### Persistent Temporary Table


    When working with temporary tables, you may want to create a table that exists
    in the `tempdb` database permanently. One thing to keep in mind is if you plan
    on creating a temporary table that exists permanently, the data will not be saved
    in the case where SQL Server is restarted. You can create a persistent temporary
    table by using the same sort of T-SQL as you would to create a table in a user
    database. An example of this database code can be found in Listing [2-29](#480547_1_En_2_Chapter.xhtml#PC29).


    ```sql

    USE tempdb;

    GO

    CREATE TABLE AvailableMeal

    (

    MealTypeName VARCHAR(25),

    RecipeName VARCHAR(25),

    ServingQuantity TINYINT,

    IngredientName VARCHAR(25)

    );

    ```

    Listing 2-29: Create Persistent Temporary Table


    You can use the T-SQL code in Listing [2-29](#480547_1_En_2_Chapter.xhtml#PC29)
    to create a persistent table, but I would recommend a method that is more consistent
    with the use of `tempdb`. Instead you can create a stored procedure that executes
    when SQL Server starts. This stored procedure will then create any global temporary
    tables that you may need. You can use the T-SQL in Listing [2-30](#480547_1_En_2_Chapter.xhtml#PC30)
    to create a stored procedure to create global temporary tables.


    ```sql

    CREATE PROCEDURE dbo.CreatePersistentTable

    AS

    CREATE TABLE ##AvailableMeal

    (

    MealTypeName VARCHAR(25),

    RecipeName VARCHAR(25),

    ServingQuantity TINYINT,

    IngredientName VARCHAR(25)

    );

    GO

    ```

    Listing 2-30: Create Stored Procedure for Global Temporary Tables


    Once the stored procedure in Listing [2-30](#480547_1_En_2_Chapter.xhtml#PC30)
    is created, you will want to modify the stored procedure options so that the stored
    procedure is executed when SQL Server restarts. The T-SQL in Listing [2-31](#480547_1_En_2_Chapter.xhtml#PC31)
    will allow you to modify the stored procedure to execute on startup.


    ```sql

    EXEC sp_procoption ''CreatePersistentTable'', ''startup'', ''true''

    ```

    Listing 2-31: Update Stored Procedure to Execute on Startup


    If you find yourself in the situation where you are considering a persistent temporary
    table, consider your environment and what potential difficulty is being added
    in terms of maintenance and knowledge sharing so that everyone is aware a mission
    critical table may exist on the `tempdb` database.


    ### Table Variables


    There are instances where you want to store data locally, but you know that the
    number of records you will be storing is limited. If you do not need to have the
    data available to other connections and it is acceptable to only have the data
    persist within the batch, then you may want to try out using table variables.
    When it comes to using table variables, you also have the option to reuse the
    table variable as many times as you would like if you are willing to keep everything
    in the same batch.


    Prior to SQL Server 2019, the estimated number of rows for a table variable was
    one record. Like other objects discussed previously in this chapter, SQL Server
    has made significant strides to improve general performance related to table variable.
    SQL Server is now capable of generating a more accurate estimated number of rows
    when it comes to using table variables. Now that SQL Server is estimating the
    number of rows more accurately, it is also saving that logic in the execution
    plan.


    If you find yourself in a situation where the data that will be pulled back with
    the table variable can be highly skewed, you may find that the T-SQL code will
    perform inconsistently. Now that the information about the table variable is getting
    stored in the execution plan, there is a higher probability of coming across parameter
    sniffing. While this may be troublesome, remember that SQL Server is also generating
    an execution plan that can be highly efficient for at least some data values.


    Like temporary tables, table variables can be straightforward to create and use.
    Listing [2-32](#480547_1_En_2_Chapter.xhtml#PC32) shows the method to declare
    and populate a table variable.


    ```sql

    DECLARE @TempAvailableMeal TABLE

    (

    MealTypeName VARCHAR(25),

    RecipeName VARCHAR(25),

    ServingQuantity TINYINT,

    IngredientName VARCHAR(25)

    )

    INSERT INTO @TempAvailableMeal (MealTypeName, RecipeName, ServingQuantity, IngredientName)

    SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    ```

    Listing 2-32: Declare and Populate a Table Variable


    The execution plan for this query looks very similar to the one generated in Figure
    [2-16](#480547_1_En_2_Chapter.xhtml#Fig16) when populating the local temporary
    table. Figure [2-19](#480547_1_En_2_Chapter.xhtml#Fig19) shows the execution plan
    created when populating the table variable.


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig19_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig19_HTML.jpg)


    Figure 2-19: Populating the Table Variable


    Now that SQL Server 2019 has been updated to allow for better estimates when using
    table variables, I expect the execution plans to match often. However, I would
    double-check the query performance especially if you are planning on adding large
    quantities of data to the table variable.


    ### Temporary Stored Procedures


    If a stored procedure is created in the `tempdb` database, then this stored procedure
    is a temporary stored procedure. SQL Server may have made this functionality possible,
    but keep in mind how developers and applications would interact with this database
    object. At the very least, having a temporary stored procedure in the `tempdb`
    database would make it more difficult to troubleshoot or maintain code related
    to these stored procedures.


    ## Triggers


    SQL Server provides the ability to have specific actions occur as a result of
    some other activity. The reactions can occur in result to a user logging into
    the system. There are other reactions that can happen after or prevent changes
    to the existing database. When dealing with applications and data, the most common
    type of reaction is in response to changing data in the database. Regardless of
    the reason, these reactions are defined as triggers. Triggers are a special type
    of stored procedure that responds to a specific action on the server, database(s),
    or table(s).


    ### Logon Triggers


    When users log onto the server, you may want to record that specific activity.
    Or in other instances, you may want to limit user activity upon login or implement
    additional security functionality as a result of a server login. The logon trigger
    gives you the ability to allow SQL Server to initiate reactions in response to
    some or all logins onto the server.


    There are not many scenarios where logon triggers will be needed for application
    development. However, there are some things that can be done with logon triggers
    that could help protect your application. A logon trigger can limit the number
    of connections allowed by a login. In the case of a breach, this could make sure
    the database does not get flooded with excess connections. Conversely, limiting
    the number of connections allowed per login can also limit scalability and futureproofing.
    The number of acceptable connections today may be much lower than the number of
    logins needed in the future.'
