  trans: '

    一旦我完成了对数据库代码的修改，就可以将这段代码保存为一个 SQL 脚本。我将以 `002_20190723_2024_RemoteDates.sql` 作为文件名保存此代码。为了确保部署顺利进行，我可以将这两个文件放在同一个文件夹中。图
    12-1 展示了这两个文件在文件文件夹中的显示方式。


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig1_HTML.jpg](img/480547_1_En_12_Fig1_HTML.jpg)


    **图 12-1**


    **基于迁移的文件列表**


    我创建的第一个脚本以 `001` 开头。这是按文件名排序的第一个脚本，也是下一次部署时应该运行的第一个脚本。我创建的第二个脚本以 `002` 开头。这将是下一次部署时运行的第二个脚本。手动编写
    `T-SQL` 脚本并保存并不是基于迁移的部署可以使用的唯一方法。你还可以借助第三方工具来帮助管理此过程。


    基于迁移的部署有许多支持者。开发任何数据库代码的主要挑战之一是，当多个开发人员基于同一代码库工作时，如何管理代码的维护。在第 10 章中，我介绍了分支与合并。这是确保所有为数据库项目开发
    `T-SQL` 代码的人员都能以一种在多人处理同一数据库对象时限制不一致性的方式工作所采用的主要方法。如果你的团队不习惯使用源代码控制，那么采用基于迁移的方法可能更符合逻辑。基于迁移的部署过程更适合处理对数据库数据的多次更改。这可以是数据清理的一部分，也可能与重构数据库对象有关。使用基于迁移部署方法的另一个优点是，更容易精确选择将要部署的数据库对象。如果你频繁更改数据库，最终可能会积累许多脚本，从而增加部署所需的时间。


    由于这些因素，在某些场景下，你会发现基于迁移的部署比基于状态的部署更有效。较小的开发团队可能会觉得基于迁移的方法更容易使用。如果你对数据库使用源代码控制，你仍然需要确保团队频繁拉取最新的数据库代码版本以供开发。对于开发团队较少的环境，情况也可能类似。如果你的团队在同一天不进行频繁部署，或者有较大的维护窗口可用于部署，那么基于迁移的部署方法也可能很适合你。


    采用基于迁移的方法时，需要牢记的一个风险是涉及在源代码控制之外发生的数据库更改。你可能会遇到需要立即将更改部署到生产环境的情况。通常，这些更改在未部署到较低环境或未检入源代码控制的情况下就被部署到了生产环境。如果你需要部署一个
    `热修复` 或 `补丁`，而这些代码最终没有进入你的源代码控制，那么你的各个环境可能会变得不同步。虽然未来的部署不会覆盖你的更改，但你可能会发现环境之间存在不一致的行为。


    部署 `T-SQL` 代码时，基于迁移的部署并不是唯一可用的选择。数据库部署的另一个流行选项是使用数据库架构的源，并将目标环境更新为具有相同的数据库架构。这就是所谓的基于状态的方法。通常，这与源代码控制一起使用，但这并非总是必需。其核心理念是，一旦部署完成，目标数据库最终将看起来与源数据库或源代码控制中的一致。此方法不需要源代码控制，但通过源代码控制来管理会更容易。


    在使用基于迁移的方法时，每次更改都单独保存在自己的脚本文件中，而基于状态的部署则不是这样。在基于状态的部署中，你可能会对同一个数据库对象进行多次更改，但最终只有一组
    `T-SQL` 代码会被部署到你的目标数据库实例。这个单一的 `T-SQL` 脚本会将所有更改合并为一个净变更。如果数据库对象在源代码控制中，或者源数据库与目标数据库不同，则变更脚本将在目标实例上运行。我也很喜欢这样一点：我确切知道部署完成后数据库将处于什么状态。部署完成后，目标实例中的数据库应具有与源位置相同的数据库对象。


    使用与基于迁移方法相同的例子，我将逐步说明这在基于状态的部署中是如何处理的。第一步是进入源代码控制并确保你拥有最新版本。获得最新版本后，你可以打开存储过程
    `dbo.GetRecipe`。当你最初打开这个 `SQL` 脚本时，你将看到如清单 12-1 所示的代码。你可以进行必要的修改，使 `T-SQL` 代码与清单
    12-6 匹配。完成这些更改后，你可以将这些更改检入源代码控制。假设另一个人将进行更改以匹配清单 12-7 中的 `T-SQL` 代码。该开发人员也需要拉取最新版本的源代码控制。然后他们可以修改
    `dbo.GetRecipe` 存储过程。这些更改随后可以合并回主分支。当需要部署此代码时，源位置将包含两项更改：一项是仅显示活跃食谱，另一项是移除日期列。与其逐个部署这些更改，不如一次性将
    `dbo.GetRecipe` 存储过程部署到目标实例。这次对存储过程的单一更新将同时包含两项更改。


    与许多开发人员或不同的开发团队合作时，使用基于状态的部署方法可能会带来好处。这是由于整个数据库项目中可能发生的更改频率较高。虽然基于状态的迁移适用于更改较少或较多的数据库项目，但这种部署方法在管理频繁更改方面表现更佳。使用基于状态的方法时，你可以确信源位置中的任何更改在部署完成后都会存在于目标位置。这也意味着，如果生产环境中有许多未纳入源代码控制的更改，那么这些更改将在下次部署时被覆盖。如果你的团队执行频繁更新，尤其是在一天之内，你可能会发现基于状态的方法部署所需时间更少。至少，这是因为当部署频繁时，通过基于状态的方法部署的更改通常较少。

    '
- fmt: One of the largest challenges in using the state-based approach has to do with
    deploying data manipulation changes. The state-based approach is excellent for
    comparing the overall database schema. However, there are limitations when it
    comes to changing the data within the database. In most cases, this is done through
    manual files that may be executed after the deployment. If you are using source
    control, these can be managed through the pre-deployment and post-deployment scripts.
    There is only one pre-deployment and one post-deployment script if you are using
    source control. This can make the process of changing data somewhat more complicated
    as you will either need to write your T-SQL code to be able to run once and then
    be ignored or go into source control and frequently change either your pre-deployment
    or post-deployment script.
  raw: One of the largest challenges in using the state-based approach has to do with
    deploying data manipulation changes. The state-based approach is excellent for
    comparing the overall database schema. However, there are limitations when it
    comes to changing the data within the database. In most cases, this is done through
    manual files that may be executed after the deployment. If you are using source
    control, these can be managed through the pre-deployment and post-deployment scripts.
    There is only one pre-deployment and one post-deployment script if you are using
    source control. This can make the process of changing data somewhat more complicated
    as you will either need to write your T-SQL code to be able to run once and then
    be ignored or go into source control and frequently change either your pre-deployment
    or post-deployment script.
  trans: '

    使用基于状态的方法时，最大的挑战之一在于部署数据操作变更。基于状态的方法在比较整体数据库模式方面非常出色。然而，在修改数据库内部数据时存在局限性。在大多数情况下，这是通过部署后可能执行的手动文件完成的。如果使用源代码控制，这些可以通过预部署和部署后脚本来管理。如果使用源代码控制，仅有一个预部署脚本和一个部署后脚本。这会使数据变更过程变得较为复杂，因为你需要确保编写的
    T-SQL 代码能够运行一次后即被忽略，或者需要进入源代码控制并频繁修改预部署或部署后脚本。

    '
- fmt: '## Automated Deployment


    处理数据库部署有多种方式，您有多种选择来帮助自动化这些部署。自动化数据库部署不仅涉及不同的工具，还包括不同的部署策略。确定为数据库部署使用何种方法，取决于您试图预防或解决的问题类型。部分部署策略取决于要部署的T-SQL代码类型。其他部署数据库代码的方法则涉及以能在生产环境中提前发现问题的方式进行部署，然后再将更改全面推广。


    可以使用 SQL Server Management Studio、Visual Studio 或 PowerShell 来简化和自动化部署T-SQL代码。如果您希望在不将数据库纳入源代码控制的情况下尝试自动化数据库部署，您将需要采取一些额外步骤来保护您的数据库。您的T-SQL代码应该已经以一种允许多次运行的方式编写。这可能不是您目前使用的方法，但您应该考虑如果有人意外地再次尝试部署相同的脚本会发生什么。请编写您的脚本，使其无论执行多少次都能成功运行。如果您已经在使用源代码控制，您的源代码控制应该为您管理此功能。


    当基于迁移的部署中部署T-SQL代码时，如果您不使用源代码控制，过程可能会有所不同。对于基于迁移的部署，您通常需要一组用于部署的脚本。我发现，当您不使用源代码控制时，最复杂的步骤有时是确定到底应该部署什么。当您准备好部署T-SQL代码时，理想情况下脚本应保存在同一个文件夹中。此时，您可以手动运行所有这些迁移脚本，或者看看能做些什么来自动化运行这些脚本。如果您选择手动运行脚本，您将需要打开每个脚本并确保连接到正确的SQL
    Server实例。还有其他选项可用于提高部署这些迁移脚本的一致性和速度。使用批处理文件或PowerShell可以帮助您自动化这些部署。


    如果您使用基于状态的迁移方法且不使用源代码控制，管理部署可能会稍微棘手一些。不使用第三方工具进行基于状态的部署的过程涉及使用数据层应用程序，也称为DACPAC。这些DACPAC可以从已存在的数据库和SQL
    Server实例生成。SQL Server附带一个工具可帮助您生成这些DACPAC。您将使用的工具是一个名为`SQLPackage.exe`的可执行文件。使用SQL
    Package时，您可以从现有数据库生成DACPAC。SQL Server具有允许您将此DACPAC与不同数据库进行比较的功能。根据您选择使用DACPAC的方式，您可以将目标数据库更新为匹配DACPAC中的代码，或者基于DACPAC与目标数据库之间的差异创建脚本文件。


    实现完全自动化部署的最简单方法是使用第三方工具。然而，这并非您唯一的选择。如果您对基于迁移的部署感兴趣，至少有一个免费的第三方工具可用。那就是DbUp。虽然此工具可能有助于管理基于迁移的部署，但本书将不涵盖DbUp。请注意，如果您要使用基于迁移的部署和源代码控制，您将需要一个扩展或像DbUp这样的另一个工具。


    如果您的数据库在源代码控制中，并且您正在使用基于状态的迁移，您有几种替代方案可用于部署数据库更改。您可以选择直接从Visual Studio将更改部署到您的目标数据库实例。然而，这并不能让您更接近自动化部署。如果不使用第三方工具来自动化部署，您将需要致力于创建PowerShell脚本来创建DACPAC或SQL脚本文件，并将这些文件部署到目标实例。


    在上一节关于部署方法的内容中，我介绍了基于迁移和基于状态的部署。当向数据库中的数据部署更改时，您通常希望确保不会意外地多次更新此数据。虽然我们可能希望确保每个脚本都能以无法多次更新数据的方式编写，但有时可能无法编写脚本来防止这种情况发生。如果发生这种情况，您可以使用类似于功能标志的概念。这时，您可以创建一个表来记录数据修改脚本何时已运行。当此脚本首次完成时，可以更新该表，用一个值表明所有记录都已更新。运行的脚本也可以在运行前检查该值是否不存在于表中。还可以在T-SQL脚本通过或失败时检查和填充此表，或者在更新完成时记录每个单独的记录。


    您也可能会发现，有时数据库代码已准备好部署，但业务尚未准备好启用新功能。在本章前面，我们介绍了功能标志如何帮助我们控制应用程序是使用数据库代码的当前状态还是未来状态。有一种部署方法可以在这些情况下提供帮助。这里的最大优势是，您可以部署数据库代码，而无需让您的应用程序使用这个新的T-SQL代码。根据正在更改的数据库对象，这可能相对容易或难以管理。


    当您想要部署T-SQL代码更改，但尚未准备好将这些更改发布到生产环境时，您可以使用一种部署方法来帮助您。您将要使用的部署方法称为暗部署。此方法将使用功能标志或类似概念。您将部署T-SQL代码，使数据库代码继续像往常一样运行。当您准备好启用新功能时，您可以启用功能标志。这将切换数据库代码的工作方式，使其使用新功能而非原始数据库代码。


    应用程序和数据库的初始状态如图[12-2](#480547_1_En_12_Chapter.xhtml#Fig2)所示。


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig2_HTML.jpg](images/480547_1_En_12_Chapter/480547_1_En_12_Fig2_HTML.jpg)


    图12-2


    未修改的应用程序和数据库


    暗部署中的下一步是通过部署SQL脚本来更新数据库。如果您使用功能标志，则功能标志应处于禁用状态。图[12-3](#480547_1_En_12_Chapter.xhtml#Fig3)中的数据库已使用新的数据库代码进行更新。


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig3_HTML.jpg](images/480547_1_En_12_Chapter/480547_1_En_12_Fig3_HTML.jpg)


    图12-3


    部署数据库更改


    部署了带有功能标志的T-SQL代码后，您现在可以部署应用程序了。一旦您部署应用程序并启用功能标志，您的应用程序和数据库将处于与图[12-4](#480547_1_En_12_Chapter.xhtml#Fig4)相同的状态。


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig4_HTML.jpg](images/480547_1_En_12_Chapter/480547_1_En_12_Fig4_HTML.jpg)


    图12-4


    部署应用程序并启用功能标志


    这些步骤允许您以暗部署方式部署数据库更改。


    数据库部署涉及许多风险。这些风险可能涉及不再按预期工作的T-SQL代码或应用程序代码。也存在相同代码看似工作但未按预期工作的风险。在某些情况下，这个问题可能是表面的。在其他时候，引入数据库代码的错误可能会对保存在数据库中的数据质量产生负面影响。这可能包括以数据不再可用的方式更改数据。为了避免这些情况，可以使用不同的部署方法来保护数据库和应用程序。


    一种潜在的部署方法是，用一套装有更新软件的硬件换出一套硬件。这种部署方法被称为蓝绿部署。这对于应用程序效果很好，但当涉及数据库时会更困难。如果您的应用程序仅使用数据库读取数据，您可以按原样使用蓝绿方法。然而，由于该概念是完全替换代码，这对于需要允许写入活动的数据库效果不佳。有一个修改版的蓝绿方法可用于数据库。在这种方法中，您仍然会有两套应用程序：原始应用程序和新应用程序。


    在用户连接到原始应用程序期间，您将部署那些可以更新并仍允许原始应用程序按预期工作的任何脚本。如果您使用功能标志，您可以部署那些使用功能标志的数据库对象。一旦您准备好开始使用新的应用程序代码，您可以更新存储过程以开始为新的应用程序代码使用功能标志。在您确信对应用程序和数据库代码的更新按预期工作后，您可以移除功能标志。此时，您将完全过渡到新的应用程序代码，并且所有功能标志都将从T-SQL代码中移除。


    蓝绿部署的初始状态如图[12-5](#480547_1_En_12_Chapter.xhtml#Fig5)所示。


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig5_HTML.jpg](images/480547_1_En_12_Chapter/480547_1_En_12_Fig5_HTML.jpg)


    图12-5


    未修改的应用程序和数据库


    在部署之前，应用程序和数据库都未被修改。蓝绿数据库部署的下一步是部署对原始或新应用程序都适用的数据库更改。应用了一些更改的数据库的图像如图[12-6](#480547_1_En_12_Chapter.xhtml#Fig6)所示。


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig6_HTML.jpg](images/480547_1_En_12_Chapter/480547_1_En_12_Fig6_HTML.jpg)


    图12-6


    部署数据库更改


    原始应用程序将继续连接到已修改的数据库。蓝绿部署方法基于替换代码而非覆盖代码的概念。为了遵循此部署方法，您将需要为新的应用程序建立所需的硬件和软件。图[12-7](#480547_1_En_12_Chapter.xhtml#Fig7)显示了数据库和更新后的应用程序的状态。


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig7_HTML.jpg](images/480547_1_En_12_Chapter/480547_1_En_12_Fig7_HTML.jpg)


    图12-7


    部署新应用程序


    借助功能标志，两个应用程序将继续以与原始应用程序相同的方式运行。现在应用程序代码已准备就绪，可以在数据库中启用功能标志。图[12-8](#480547_1_En_12_Chapter.xhtml#Fig8)中的图像显示了更新后的应用程序连接到更新后的数据库。


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig8_HTML.jpg](images/480547_1_En_12_Chapter/480547_1_En_12_Fig8_HTML.jpg)


    图12-8


    移除功能标志


    更新后的应用程序和数据库已启动并运行，原始应用程序已停用。新状态看起来如图[12-9](#480547_1_En_12_Chapter.xhtml#Fig9)所示。


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig9_HTML.jpg](images/480547_1_En_12_Chapter/480547_1_En_12_Fig9_HTML.jpg)


    图12-9


    移除原始应用程序


    这是您可用于蓝绿部署的过程。此部署方法让您管理如何部署和启用新的数据库代码。


    除了影响数据质量外，还存在与对数据库代码进行的更改的性能相关的担忧。在某些情况下，添加或修改数据库对象的方式可能导致性能严重下降。根据应用程序的配置方式，这可能导致应用程序失败。可以实施一些部署策略来帮助在最终用户察觉之前识别潜在的性能问题。


    您可能还希望在让所有人使用新的T-SQL代码之前测试它。通过使用一个应用了T-SQL代码更改的单独数据库，可以获得对T-SQL代码性能的大致了解。由于SQL
    Server目前的性质，您将只能在此辅助数据库上测试读取事务。当您使用此方法时，您正在使用金丝雀部署方法。其概念是应用程序将连接到两个数据库。第二个数据库将仅执行读取事务。借助额外的硬件，您可以将大部分事务发送到原始数据库，并将一小部分活动发送到第二个数据库。随着您对新的T-SQL代码信心的增加，您可以增加发送到第二个数据库的活动量。


    在设计可部署的代码时，您需要从最开始着手。您必须了解您的团队结构、开发周期以及您的代码何时在各个环境中部署。目标是编写可维护且可管理的T-SQL代码。您可以选择使用基于迁移的方法部署T-SQL代码，在此方法中您可以精确控制部署到环境的内容。或者，您可以选择使用基于状态的部署方法，在此方法中您可以控制部署后数据库的样子。您还可以选择如何处理尚未准备好部署的代码开发。使用分支和合并策略，您可以将开发中的代码与将要部署的代码分开。还有使用功能标志的选项，这样您就可以在任何时间点部署代码，并控制何时启用新功能。无论您选择何种方法，您都需要确定一个可定义且可重复的部署策略。'
  raw: '## Automated Deployment


    There are many ways to handle your database deployments. You have various options
    available to you to help automate these deployments. There are not only different
    tools you can use to automate your database deployments, there are also different
    deployment strategies that you can use. Determining what method to use for your
    database deployments depends on what types of issues you are trying to prevent
    or resolve. Some of these deployment strategies will depend on what type of T-SQL
    code is being deployed. Other methods of deploying database code involve deploying
    your database in a way that can help you catch issues in production before the
    changes are deployed everywhere.


    There are ways to streamline and automate deploying T-SQL code using SQL Server
    Management Studio, Visual Studio, or PowerShell. If you want to try to automate
    your database deployments without having your database in source control, you
    will want to take some additional steps to protect your database. Your T-SQL code
    should already be written in a way to allow your database code to be run more
    than once. This may not be the method that you are using now, but you should consider
    what would happen if someone accidentally tried to deploy the same scripts again.
    Write your scripts so that they will run successfully no matter how many times
    they are executed. If you are using source control already, your source control
    should manage this functionality for you.


    When deploying T-SQL code as part of a migration-based deployment, the process
    may function differently if you are not using source control. For migration-based
    deployments, you will usually have a set of scripts that need to be run for your
    deployment. I have found that when you are not using source control, the most
    complicated step can sometimes be determining exactly what should be deployed.
    When you are ready to deploy your T-SQL code, ideally the scripts will be saved
    in the same folder. At this point, you can either manually run all these migration
    scripts or see what you can do to automate running the scripts. If you choose
    to run the scripts manually, you will need to open each script and make sure that
    you are connected to the correct instance of SQL Server. There are other options
    you can use to improve the consistency and speed of deploying these migration
    scripts. Using batch files or PowerShell can help you automate these deployments.


    If you are using a state-based migration approach and you are not using source
    control, it can be a little trickier to manage your deployments. The process of
    having a state-based deployment without using third-party tools consists of using
    data-tier applications also known as DACPACs . These DACPACs can be generated
    from a database that already exists and an instance of SQL Server. There is a
    tool that comes with SQL Server that will help you generate these DACPACs. The
    tool that you will be using is an executable file named SQLPackage.exe. When using
    SQL package, you can generate a DACPAC from an existing database. SQL Server has
    the functionality that allows you to compare this DACPAC to a different database.
    Depending on how you choose to work with DACPACs, you can either have the target
    database updated to match the code from the DACPAC or you can create a script
    file based off the differences between the DACPAC and the target database.


    The easiest way to move towards a fully automated deployment is to use third-party
    tools. However, that is not the only option available to you. If you are interested
    in migration-based deployments, there is at least one free third-party tool available.
    This would be DbUp. While this tool may be helpful for managing migration-based
    deployments, I will not be covering DbUp as part of this book. Be aware that if
    you are going to use migration-based deployments and source control, you will
    need an extension or another tool like DbUp.


    If your database is in source control and you are using state-based migrations,
    you have several alternatives you can use to deploy your database changes. You
    have the option of deploying the changes directly from Visual Studio to your target
    database instance. However, this does not get you any closer to automating your
    deployments. Without using third-party tools to automate your deployments, you
    will need to work on creating PowerShell scripts to create the DACPAC or SQL script
    file and deploying those files to the target instance.


    In the previous section of deployment methods, I went over migration-based and
    state-based deployments. When deploying changes to the data within a database,
    you often want to make certain that you cannot accidentally update this data more
    than once. While we may want to make sure that every script can be written in
    a way where they could not update the data more than once, there may be times
    where it is not possible to write a script to prevent this from happening. If
    this happens, you can use a similar concept to the feature flags. This is where
    you create a table to record when a data modification script has been run. The
    first time this script completes, the table can be updated with a value indicating
    that all records were updated. The script that is run can also check to make sure
    that this value does not exist in the table prior to running the script. This
    table can also be checked and populated either as pass or fail for the entire
    T-SQL script or each individual record can be recorded when the update is complete.


    You may also find that there are times where database code is ready to be deployed
    but the business is not ready to enable the new functionality. Earlier in this
    chapter, we covered how feature flags can help us control whether applications
    use the current state or future state of database code. There is a deployment
    method that can help in these situations. The largest advantage here is that you
    can deploy database code without having your applications use this new T-SQL code.
    Depending on the database objects that are changing, this can be relatively easy
    or difficult to manage.


    When you want to deploy T-SQL code changes, but you are not ready for those changes
    to be released to the Production environment, you can use a deployment method
    to help you. The deployment method you will want to use is referred to as dark
    deployment. This method will use a feature flag or a similar concept. You will
    deploy T-SQL code so that the database code continues to function as it always
    has. When you are ready to enable the new functionality, you can enable the feature
    flags. This will switch how the database code works so that it uses the new functionality
    instead of the original database code.


    The beginning state of the application and the database is shown in Figure [12-2](#480547_1_En_12_Chapter.xhtml#Fig2).


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig2_HTML.jpg](images/480547_1_En_12_Chapter/480547_1_En_12_Fig2_HTML.jpg)


    Figure 12-2


    Unmodified Application and Database


    The next step in a dark deployment is to update the database by deploying the
    SQL scripts. If you are using feature flags, the feature flags should be disabled.
    The database in Figure [12-3](#480547_1_En_12_Chapter.xhtml#Fig3) has been updated
    with the new database code.


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig3_HTML.jpg](images/480547_1_En_12_Chapter/480547_1_En_12_Fig3_HTML.jpg)


    Figure 12-3


    Deploy Database Changes


    After the T-SQL code with feature flags has been deployed, you are now ready to
    deploy the application. Once you deploy the application and enable the feature
    flag, your application and database will be in the same state as Figure [12-4](#480547_1_En_12_Chapter.xhtml#Fig4).


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig4_HTML.jpg](images/480547_1_En_12_Chapter/480547_1_En_12_Fig4_HTML.jpg)


    Figure 12-4


    Deploy Application and Enable Feature Flags


    These steps can allow you to deploy your database changes dark.


    There are many risks involved with database deployments. These risks can involve
    T-SQL code or application code that no longer work as expected. There are also
    risks that the same code may appear to work but does not work as expected. In
    some cases, this issue may be cosmetic. There are other times that a bug that
    is introduced into database code may negatively affect the quality of the data
    that is saved in the database. This can include altering the data in a way that
    the data is no longer usable. In order to avoid these types of scenarios, there
    are different deployment methods that can be used to protect the database and
    the applications.


    One potential deployment method is where one set of hardware is swapped out for
    a set of hardware with the updated software. This type of deployment method is
    known as blue-green. This can work well for applications, but this can be more
    difficult when databases are involved. If your application is only using a database
    to read data, you can use the blue-green method as is. However, since the concept
    is to replace the code entirely, this does not work well for databases that need
    to allow for write activity. There is a modified version of the blue-green method
    that can be used for databases. In this method, you would still have two sets
    of applications: the original application and the new application.


    During the time that users were connecting to the original application, you would
    deploy any scripts that could be updated and still allow the original application
    to work as intended. If you were using feature flags, you could deploy those database
    objects that were using feature flags. Once you were ready to start using the
    new application code, you could update the stored procedures to start using the
    feature flags for the new application code. After you were confident that the
    updates to the applications and the database code were working as intended, you
    could remove the feature flags. At this point, you would have transitioned entirely
    over to the new application code, and all feature flags would be removed from
    the T-SQL code.


    The initial state for your blue-green deployment is shown in Figure [12-5](#480547_1_En_12_Chapter.xhtml#Fig5).


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig5_HTML.jpg](images/480547_1_En_12_Chapter/480547_1_En_12_Fig5_HTML.jpg)


    Figure 12-5


    Unmodified Application and Database


    The application and the database are both unmodified before the deployment. The
    next step in a blue-green database deployment is to deploy the database changes
    that will work for either the original or new application. An image of the database
    having some changes applied is shown in Figure [12-6](#480547_1_En_12_Chapter.xhtml#Fig6).


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig6_HTML.jpg](images/480547_1_En_12_Chapter/480547_1_En_12_Fig6_HTML.jpg)


    Figure 12-6


    Deploy Database Changes


    The original application will continue to connect to the modified database. The
    blue-green deployment method is based on the concept of replacing code not overwriting
    code. In order to follow this deployment method, you will want to stand up the
    hardware and software needed for the new application. Figure [12-7](#480547_1_En_12_Chapter.xhtml#Fig7)
    shows the state of the database and the updated application.


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig7_HTML.jpg](images/480547_1_En_12_Chapter/480547_1_En_12_Fig7_HTML.jpg)


    Figure 12-7


    Deploy New Application


    With the feature flags in place, both applications will continue to function in
    the same manner as the original application. Now that the application code is
    ready, the feature flags can be enabled in the database. The image in Figure [12-8](#480547_1_En_12_Chapter.xhtml#Fig8)
    shows the updated application connecting to the updated database.


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig8_HTML.jpg](images/480547_1_En_12_Chapter/480547_1_En_12_Fig8_HTML.jpg)


    Figure 12-8


    Remove Feature Flags


    The updated application and database are up and running, and the original application
    has been decommissioned. The new state looks like the image in Figure [12-9](#480547_1_En_12_Chapter.xhtml#Fig9).


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig9_HTML.jpg](images/480547_1_En_12_Chapter/480547_1_En_12_Fig9_HTML.jpg)


    Figure 12-9


    Remove Original Application


    This is the process that you can use for a blue-green deployment. This deployment
    method lets you manage how you deploy and enable your new database code.


    While impacting the quality of the data is one issue, there are also concerns
    related to the performance of changes that are made to the database code. In some
    cases, database objects may be added or modified in a way that causes a severe
    degradation of performance. Depending on how the applications are configured,
    this can cause the applications to fail. There are some deployment strategies
    that can be implemented to help identify potential performance issues before they
    are visible to the end users.


    You may also want to try to test your new code before letting everyone use the
    new T-SQL code. It is possible to get a general idea of the performance of your
    T-SQL code by using a separate database where the changes to the T-SQL code have
    been applied. Due to the nature of SQL Server at this time, you will only be able
    to test read transactions on this secondary database. When you use this method,
    you are using a canary deployment method. The concept is that the application
    will connect to both databases. The second database will only perform read transactions.
    With additional hardware, you can have most of the transactions sent to the original
    database and a small portion of the activity sent to the second database. As you
    gain confidence in the new T-SQL code, you can increase the volume of activity
    sent to second database.


    When designing code that is deployable, you want to start at the very beginning.
    You must understand how your teams are structured, your development cycle, and
    when your code is deployed across your environments. The goal is to write maintainable
    and manageable T-SQL code. You can choose to deploy your T-SQL code using a migration-based
    approach where you can control exactly what is getting deployed to your environments.
    You could instead choose to use a state-based deployment method where you control
    what your database will look like after the deployment. You also have the option
    to determine how to handle developing code that is not ready to be deployed. Using
    branching and merging strategies, you can keep the code that is in development
    separate from the code that will be deployed. There is also the option of using
    feature flags so that you can deploy code at any point in time and control when
    the new functionality is enabled. Regardless of the methods you choose, you will
    want to determine a deployment strategy that can be defined and is repeatable.'
  trans: '

    ## 自动化部署


    处理数据库部署有多种方式，您有多种选择来帮助自动化这些部署。自动化数据库部署不仅涉及不同的工具，还包括不同的部署策略。确定为数据库部署使用何种方法，取决于您试图预防或解决的问题类型。部分部署策略取决于要部署的
    T-SQL 代码类型。其他部署数据库代码的方法则涉及以能在生产环境中提前发现问题的方式进行部署，然后再将更改全面推广。


    可以使用 SQL Server Management Studio、Visual Studio 或 PowerShell 来简化和自动化部署 T-SQL 代码。如果您希望在不将数据库纳入源代码控制的情况下尝试自动化数据库部署，您将需要采取一些额外步骤来保护您的数据库。您的
    T-SQL 代码应该已经以一种允许多次运行的方式编写。这可能不是您目前使用的方法，但您应该考虑如果有人意外地再次尝试部署相同的脚本会发生什么。请编写您的脚本，使其无论执行多少次都能成功运行。如果您已经在使用源代码控制，您的源代码控制应该为您管理此功能。


    当基于迁移的部署中部署 T-SQL 代码时，如果您不使用源代码控制，过程可能会有所不同。对于基于迁移的部署，您通常需要一组用于部署的脚本。我发现，当您不使用源代码控制时，最复杂的步骤有时是确定到底应该部署什么。当您准备好部署
    T-SQL 代码时，理想情况下脚本应保存在同一个文件夹中。此时，您可以手动运行所有这些迁移脚本，或者看看能做些什么来自动化运行这些脚本。如果您选择手动运行脚本，您将需要打开每个脚本并确保连接到正确的
    SQL Server 实例。还有其他选项可用于提高部署这些迁移脚本的一致性和速度。使用批处理文件或 PowerShell 可以帮助您自动化这些部署。


    如果您使用基于状态的迁移方法且不使用源代码控制，管理部署可能会稍微棘手一些。不使用第三方工具进行基于状态的部署的过程涉及使用数据层应用程序，也称为 DACPAC。这些
    DACPAC 可以从已存在的数据库和 SQL Server 实例生成。SQL Server 附带一个工具可帮助您生成这些 DACPAC。您将使用的工具是一个名为
    `SQLPackage.exe` 的可执行文件。使用 SQL Package 时，您可以从现有数据库生成 DACPAC。SQL Server 具有允许您将此
    DACPAC 与不同数据库进行比较的功能。根据您选择使用 DACPAC 的方式，您可以将目标数据库更新为匹配 DACPAC 中的代码，或者基于 DACPAC
    与目标数据库之间的差异创建脚本文件。


    实现完全自动化部署的最简单方法是使用第三方工具。然而，这并非您唯一的选择。如果您对基于迁移的部署感兴趣，至少有一个免费的第三方工具可用。那就是 DbUp。虽然此工具可能有助于管理基于迁移的部署，但本书将不涵盖
    DbUp。请注意，如果您要使用基于迁移的部署和源代码控制，您将需要一个扩展或像 DbUp 这样的另一个工具。


    如果您的数据库在源代码控制中，并且您正在使用基于状态的迁移，您有几种替代方案可用于部署数据库更改。您可以选择直接从 Visual Studio 将更改部署到您的目标数据库实例。然而，这并不能让您更接近自动化部署。如果不使用第三方工具来自动化部署，您将需要致力于创建
    PowerShell 脚本来创建 DACPAC 或 SQL 脚本文件，并将这些文件部署到目标实例。


    在上一节关于部署方法的内容中，我介绍了基于迁移和基于状态的部署。当向数据库中的数据部署更改时，您通常希望确保不会意外地多次更新此数据。虽然我们可能希望确保每个脚本都能以无法多次更新数据的方式编写，但有时可能无法编写脚本来防止这种情况发生。如果发生这种情况，您可以使用类似于功能标志的概念。这时，您可以创建一个表来记录数据修改脚本何时已运行。当此脚本首次完成时，可以更新该表，用一个值表明所有记录都已更新。运行的脚本也可以在运行前检查该值是否不存在于表中。还可以在
    T-SQL 脚本通过或失败时检查和填充此表，或者在更新完成时记录每个单独的记录。


    您也可能会发现，有时数据库代码已准备好部署，但业务尚未准备好启用新功能。在本章前面，我们介绍了功能标志如何帮助我们控制应用程序是使用数据库代码的当前状态还是未来状态。有一种部署方法可以在这些情况下提供帮助。这里的最大优势是，您可以部署数据库代码，而无需让您的应用程序使用这个新的
    T-SQL 代码。根据正在更改的数据库对象，这可能相对容易或难以管理。


    当您想要部署 T-SQL 代码更改，但尚未准备好将这些更改发布到生产环境时，您可以使用一种部署方法来帮助您。您将要使用的部署方法称为暗部署。此方法将使用功能标志或类似概念。您将部署
    T-SQL 代码，使数据库代码继续像往常一样运行。当您准备好启用新功能时，您可以启用功能标志。这将切换数据库代码的工作方式，使其使用新功能而非原始数据库代码。


    应用程序和数据库的初始状态如图 12-2 所示。


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig2_HTML.jpg](img/480547_1_En_12_Fig2_HTML.jpg)


    图 12-2


    未修改的应用程序和数据库


    暗部署中的下一步是通过部署 SQL 脚本来更新数据库。如果您使用功能标志，则功能标志应处于禁用状态。图 12-3 中的数据库已使用新的数据库代码进行更新。


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig3_HTML.jpg](img/480547_1_En_12_Fig3_HTML.jpg)


    图 12-3


    部署数据库更改


    部署了带有功能标志的 T-SQL 代码后，您现在可以部署应用程序了。一旦您部署应用程序并启用功能标志，您的应用程序和数据库将处于与图 12-4 相同的状态。


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig4_HTML.jpg](img/480547_1_En_12_Fig4_HTML.jpg)


    图 12-4


    部署应用程序并启用功能标志


    这些步骤允许您以暗部署方式部署数据库更改。


    数据库部署涉及许多风险。这些风险可能涉及不再按预期工作的 T-SQL 代码或应用程序代码。也存在相同代码看似工作但未按预期工作的风险。在某些情况下，这个问题可能是表面的。在其他时候，引入数据库代码的错误可能会对保存在数据库中的数据质量产生负面影响。这可能包括以数据不再可用的方式更改数据。为了避免这些情况，可以使用不同的部署方法来保护数据库和应用程序。


    一种潜在的部署方法是，用一套装有更新软件的硬件换出一套硬件。这种部署方法被称为蓝绿部署。这对于应用程序效果很好，但当涉及数据库时会更困难。如果您的应用程序仅使用数据库读取数据，您可以按原样使用蓝绿方法。然而，由于该概念是完全替换代码，这对于需要允许写入活动的数据库效果不佳。有一个修改版的蓝绿方法可用于数据库。在这种方法中，您仍然会有两套应用程序：原始应用程序和新应用程序。


    在用户连接到原始应用程序期间，您将部署那些可以更新并仍允许原始应用程序按预期工作的任何脚本。如果您使用功能标志，您可以部署那些使用功能标志的数据库对象。一旦您准备好开始使用新的应用程序代码，您可以更新存储过程以开始为新的应用程序代码使用功能标志。在您确信对应用程序和数据库代码的更新按预期工作后，您可以移除功能标志。此时，您将完全过渡到新的应用程序代码，并且所有功能标志都将从
    T-SQL 代码中移除。


    蓝绿部署的初始状态如图 12-5 所示。


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig5_HTML.jpg](img/480547_1_En_12_Fig5_HTML.jpg)


    图 12-5


    未修改的应用程序和数据库


    在部署之前，应用程序和数据库都未被修改。蓝绿数据库部署的下一步是部署对原始或新应用程序都适用的数据库更改。应用了一些更改的数据库的图像如图 12-6 所示。


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig6_HTML.jpg](img/480547_1_En_12_Fig6_HTML.jpg)


    图 12-6


    部署数据库更改


    原始应用程序将继续连接到已修改的数据库。蓝绿部署方法基于替换代码而非覆盖代码的概念。为了遵循此部署方法，您将需要为新的应用程序建立所需的硬件和软件。图 12-7
    显示了数据库和更新后的应用程序的状态。


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig7_HTML.jpg](img/480547_1_En_12_Fig7_HTML.jpg)


    图 12-7


    部署新应用程序


    借助功能标志，两个应用程序将继续以与原始应用程序相同的方式运行。现在应用程序代码已准备就绪，可以在数据库中启用功能标志。图 12-8 中的图像显示了更新后的应用程序连接到更新后的数据库。


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig8_HTML.jpg](img/480547_1_En_12_Fig8_HTML.jpg)


    图 12-8


    移除功能标志


    更新后的应用程序和数据库已启动并运行，原始应用程序已停用。新状态看起来如图 12-9 所示。


    ![../images/480547_1_En_12_Chapter/480547_1_En_12_Fig9_HTML.jpg](img/480547_1_En_12_Fig9_HTML.jpg)


    图 12-9


    移除原始应用程序


    这是您可用于蓝绿部署的过程。此部署方法让您管理如何部署和启用新的数据库代码。


    除了影响数据质量外，还存在与对数据库代码进行的更改的性能相关的担忧。在某些情况下，添加或修改数据库对象的方式可能导致性能严重下降。根据应用程序的配置方式，这可能导致应用程序失败。可以实施一些部署策略来帮助在最终用户察觉之前识别潜在的性能问题。


    您可能还希望在让所有人使用新的 T-SQL 代码之前测试它。通过使用一个应用了 T-SQL 代码更改的单独数据库，可以获得对 T-SQL 代码性能的大致了解。由于
    SQL Server 目前的性质，您将只能在此辅助数据库上测试读取事务。当您使用此方法时，您正在使用金丝雀部署方法。其概念是应用程序将连接到两个数据库。第二个数据库将仅执行读取事务。借助额外的硬件，您可以将大部分事务发送到原始数据库，并将一小部分活动发送到第二个数据库。随着您对新的
    T-SQL 代码信心的增加，您可以增加发送到第二个数据库的活动量。


    在设计可部署的代码时，您需要从最开始着手。您必须了解您的团队结构、开发周期以及您的代码何时在各个环境中部署。目标是编写可维护且可管理的 T-SQL 代码。您可以选择使用基于迁移的方法部署
    T-SQL 代码，在此方法中您可以精确控制部署到环境的内容。或者，您可以选择使用基于状态的部署方法，在此方法中您可以控制部署后数据库的样子。您还可以选择如何处理尚未准备好部署的代码开发。使用分支和合并策略，您可以将开发中的代码与将要部署的代码分开。还有使用功能标志的选项，这样您就可以在任何时间点部署代码，并控制何时启用新功能。无论您选择何种方法，您都需要确定一个可定义且可重复的部署策略。

    '
- fmt: '# Part IV Building Maintainable T-SQL


    ## 13. Functional Design


    Over the course of this book, we have covered many different topics. Most of these
    chapters involve best practices. These best practices involve naming conventions,
    formatting T-SQL code, or designing database objects. Despite your best efforts,
    you may find yourself in a situation that is outside the scope of best practices.
    These times can correlate to periods of high stress or tight deadlines. The goal
    of this chapter is to help you prepare for the situations when you must make quick
    decisions about complex topics.


    Designing database code for applications that are created to let users insert
    or update data can be challenging. You may find yourself dealing with applications
    where you need to disable permissions or functionality. When dealing with legacy
    application code, there may be additional challenges particularly if those applications
    are using ORM software. As organizations grow, there may be a need for additional
    reporting, but there may not be the time required to develop a data warehouse.
    Within SQL Server, there is the ability to make your T-SQL code more flexible,
    but you will want to ensure that you do not sacrifice functionality at the cost
    of flexibility.


    ### Inserting and Updating Data


    There are a variety of scenarios where you would want the ability to pass in a
    set of values. If the records do not exist, you may want to insert the information,
    but if the record does exist, then you may want to update that record. Often when
    we are under pressure, we look for the fastest, easiest way to do things. Other
    times, we may be focused more on T-SQL code readability than what is best for
    the database engine. While it is important to ensure that your database code can
    be understood by others, it is equally as important to consider the performance
    of your database code when writing T-SQL.


    This can be equally true when using T-SQL to insert or update database records.
    It may be easier and more straightforward for an application to execute the same
    stored procedure regardless of whether the user is inserting a new record or updating
    an existing record. This type of action can also be referred to as an upsert.
    It does not matter how you find yourself in the situation; the important thing
    is to design T-SQL code that works reliably and effectively.


    There is T-SQL database code that can make the process of performing an insert
    or an update simple to write. This functionality is called a `MERGE` statement.
    The benefit of using this `MERGE` statement is that the logic is straightforward.
    However, there are many known issues with the `MERGE` statement. I would suggest
