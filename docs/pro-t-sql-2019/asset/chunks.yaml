  trans: '

    # 执行计划中的索引使用


    在管理 `T-SQL` 方面，我观察到各公司间最大的差异之一就是索引的管理方式。某些情况下，开发团队负责编写所有包含索引创建的 `T-SQL` 代码。也有一些公司由数据库团队处理所有的索引创建和维护工作。由于数据库管理员通常对开发的访问权限少于开发人员，我认为让两个团队协同工作可能最有帮助。数据库管理员可以发现性能不佳的索引，并且可能在为多个
    `T-SQL` 查询设计索引方面更有经验。另一方面，开发人员可能更了解表的设计方式以及 `T-SQL` 代码如何使用这些表。


    ## 识别索引问题


    存在许多查询、健康检查和监控工具可以帮助你识别索引问题。你可以通过查询来找出哪些存储过程使用了相同的数据库对象，或者你可能心里已经有了一个特定的查询来改进性能。一旦你从缓存中获取执行计划或生成当前的实际执行计划，你就可以开始调查潜在的性能问题。如前一节所述，你知道可以检查每个步骤的相对数据记录量，查看各种运算符和警告，并验证估计的和实际返回的行数。你还可以查看索引在执行计划中是如何被使用的。


    ## 理解查找与扫描操作


    在 `SQL Server` 中处理数据时，首选是尽快找到数据。当数据保存在聚集索引中时，数据会根据索引的列进行排序。这意味着当 `SQL Server`
    搜索聚集索引时，数据是按顺序存储的。在最理想的情况下，`SQL Server` 会查看数据并快速找到所需数据。如果发生这种情况，你将在执行计划中看到一个 `聚集索引查找`。执行计划中的
    `聚集索引查找` 看起来如图 7-9 所示。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig9_HTML.jpg](img/480547_1_En_7_Fig9_HTML.jpg)


    *图 7-9：聚集索引查找*


    看到 `聚集索引查找` 让你知道你的 `T-SQL` 代码写得足够好，能够快速找到数据。如果你在执行计划中没有看到 `聚集索引查找`，你可能需要看看是否有办法重写你的
    `T-SQL` 以使用 `聚集索引查找`。


    虽然理想情况是你的数据使用 `聚集索引查找`，但你可能在执行计划中看到一些看起来相似但不完全相同的东西。`SQL Server` 有可能使用了聚集索引但未能快速找到数据。在这种情况下，`SQL
    Server` 可能需要查看索引的很大一部分比例。如果发生这种情况，你可能在执行计划中看到一个 `聚集索引扫描`，如图 7-10 所示。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig10_HTML.jpg](img/480547_1_En_7_Fig10_HTML.jpg)


    *图 7-10：聚集索引扫描*


    这确实意味着 `SQL Server` 查看了按聚集索引排序的数据，但必须扫描整个表以找到满足查询要求所需的所有记录。


    `SQL Server` 使用术语 `查找` 来表示可以在不搜索引用索引的很大一部分的情况下找到请求的数据。当需要搜索整个表或表的很大一部分时，`SQL Server`
    将此称为 `扫描`。虽然 `查找` 或 `扫描` 可以应用于聚集索引，但它们也可以应用于非聚集索引。非聚集索引的排序方式与聚集索引或表（如果该表是 `堆`）不同。非聚集索引按照索引中指定的键列顺序进行排序。如果表上存在聚集索引，非聚集索引将包含一个指向聚集索引的指针。如果没有聚集索引，那么非聚集索引将指回表中的行
    ID。


    如果执行计划使用了非聚集索引，`SQL Server` 有几种不同的方式来搜索数据记录。如果 `SQL Server` 知道如何在非聚集索引中找到数据，你将在执行计划中看到一个
    `索引查找`。`索引查找` 看起来如图 7-11 所示。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig11_HTML.jpg](img/480547_1_En_7_Fig11_HTML.jpg)


    *图 7-11：索引查找*


    如果根据所编写的 `T-SQL` 代码无法使用 `聚集索引查找`，次优选择是 `索引查找`。如果 `查找` 不可行，`SQL Server` 最终会使用 `索引扫描`。与
    `聚集索引扫描` 类似，这意味着 `SQL Server` 需要遍历索引来查找必要的数据记录。如果执行计划使用了 `索引扫描`，图 7-12 显示了 `索引扫描`
    在你的执行计划中出现的样子。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig12_HTML.jpg](img/480547_1_En_7_Fig12_HTML.jpg)


    *图 7-12：索引扫描*


    此外，和 `聚集索引扫描` 一样，如果你看到一个 `索引扫描`，你可能想看看在重写 `T-SQL` 以使用 `索引查找` 方面可以做些什么。


    ## 考虑包含列与键查找


    在编写 `T-SQL` 查询时，请记住需要什么样的数据。虽然包含额外的数据字段可能会带来额外的硬件开销，但它也会影响 `SQL Server` 搜索数据记录的方式。如果
    `SQL Server` 需要使用 `索引查找` 或 `索引扫描` 来找到所需的数据记录，这并不意味着所有数据字段都必须存在于非聚集索引中。如果需要额外的数据列，`SQL
    Server` 可能需要通过非聚集索引从聚集索引中获取这些额外的数据列。当这种情况发生时，你将在执行计划中看到一个 `键查找`，如图 7-13 所示。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig13_HTML.jpg](img/480547_1_En_7_Fig13_HTML.jpg)


    *图 7-13：键查找*


    当你看到 `键查找` 时，它让你知道查询所需的信息并非全部存在于非聚集索引中。在这些场景下，它表明索引可能需要被修改以包含那些列。在决定将这些数据字段添加为包含列之前，你应该意识到在索引中包含列可能会带来与写入或更新索引相关的额外成本。


    ## 堆与表扫描


    没有聚集索引的表也被称为 `堆`。如果表上没有其他索引，`SQL Server` 将不得不逐行搜索以找到查询结果所需的数据记录。虽然可能涉及许多其他因素，但这可能导致
    `SQL Server` 扫描整个表。这可以在执行计划中看到，如图 7-14 所示。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig14_HTML.jpg](img/480547_1_En_7_Fig14_HTML.jpg)


    *图 7-14：表扫描*

    '
- fmt: '# 索引优化与执行计划分析


    一些非常小的表可能不需要索引，使用`Table Scan`可能是可以接受的。如果表中有很多记录，那么`Table Scan`就不理想了。在这种情况下，你可能需要调查是否有任何可能的索引可以添加到表上。


    如果堆上有一个非聚集索引，SQL Server 可能会将这些非聚集索引用作执行计划的一部分。如果是这种情况，你将会看到一个`Index Seek`或`Index
    Scan`。当执行计划中出现`Index Seek`或`Index Scan`时，查询中使用的列可能不存在于非聚集索引中。如果需要查找表中的其他列，你将在执行计划中看到一个`RID
    Lookup`。你可以在图 [7-15](#480547_1_En_7_Chapter.xhtml#Fig15) 中看到这一点。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig15_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig15_HTML.jpg)


    图 7-15


    `RID Lookup`


    与`Key Lookup`类似，你会希望查看是否可以修改任何非聚集索引以包含来自 T-SQL 代码的必要列。也有可能通过修改查询来排除导致`RID Lookup`的列。


    举个例子，我编写了一个查询来获取所有名称以“tomato”开头的原料。为了做到这一点，我需要运行清单 [7-2](#480547_1_En_7_Chapter.xhtml#PC2)
    中的查询。


    ```

    SELECT IngredientName, DateCreated

    FROM dbo. Ingredient

    WHERE IngredientName LIKE ''Tomato%'';

    Listing 7-2

    获取原料的查询

    ```


    第一次运行此查询时，此表上只有一个在`IngredientID`上的主聚集索引。来自清单 [7-2](#480547_1_En_7_Chapter.xhtml#PC2)
    中 T-SQL 代码的执行计划如图 [7-16](#480547_1_En_7_Chapter.xhtml#Fig16) 所示。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig16_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig16_HTML.jpg)


    图 7-16


    仅有聚集索引时的执行计划


    该表上没有非聚集索引。SQL Server 唯一的选择是搜索整个聚集索引来查找请求的记录。通过查看与`Clustered Index Scan`相关的属性可以看到这一点。此查询执行的属性可以在图
    [7-17](#480547_1_En_7_Chapter.xhtml#Fig17) 中找到。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig17_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig17_HTML.jpg)


    图 7-17


    使用聚集索引时的读取次数


    查看估计的和实际的读取行数，两者读取的行数是相同的。每者的总数都是 263,010 行被读取。实际返回的行数是 3 行。SQL Server 必须搜索 263,010
    行才能找到符合标准的 3 行。


    在这个场景中，我们有一个查询，它读取的行数远大于返回的行数。我无法重写查询以使用非聚集索引，因为不存在这样的索引。我最好的选择是编写一个非聚集索引来提高性能。新的非聚集索引在清单
    [7-3](#480547_1_En_7_Chapter.xhtml#PC3) 中。


    ```

    CREATE INDEX IX_Ingredient_IngredientName

    ON dbo.Ingredient (IngredientName);

    Listing 7-3

    创建非聚集索引

    ```


    现在我已经创建了非聚集索引，我将再次运行查询以查看是否会得到一个新的执行计划。新的执行计划在图 [7-18](#480547_1_En_7_Chapter.xhtml#Fig18)
    中。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig18_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig18_HTML.jpg)


    图 7-18


    使用非聚集索引时的执行计划


    在图 [7-18](#480547_1_En_7_Chapter.xhtml#Fig18) 中，`Clustered Index Scan`已被`Index
    Scan`和`Key Lookup`所取代。虽然这看起来像是我降低了执行计划的性能，但我可以通过查看读取的行数来验证这一点。在图 [7-19](#480547_1_En_7_Chapter.xhtml#Fig19)
    中，你可以看到与`Index Seek`相关的属性。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig19_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig19_HTML.jpg)


    图 7-19


    `Index Seek`的属性


    现在非聚集索引已经创建，我可以看到实际的读取行数已经从 263,010 减少到 3。我预计`Key Lookup`会有相同的读取次数，但我可以查看属性来确认。在图
    [7-20](#480547_1_En_7_Chapter.xhtml#Fig20) 中，你可以看到返回的属性。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig20_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig20_HTML.jpg)


    图 7-20


    `Key Lookup`的属性


    检查`Key Lookup`，其中也有三行被读取。没有非聚集索引的 T-SQL 代码有 263,010 次读取。使用非聚集索引后的总读取行数是六次。


    我可以通过将`DateCreated`列作为非聚集索引的一部分包含进来，或者从原始查询中删除该列来消除`Key Lookup`。


    ```

    CREATE INDEX IX_Ingredient_IngredientName

    ON dbo.Ingredient (IngredientName) INCLUDE (DateCreated);

    Listing 7-4

    包含列的非聚集索引

    ```


    在添加了清单 [7-4](#480547_1_En_7_Chapter.xhtml#PC4) 中的索引并运行来自清单 [7-2](#480547_1_En_7_Chapter.xhtml#PC2)
    的查询后，我可以获得执行计划。该执行计划可以在图 [7-21](#480547_1_En_7_Chapter.xhtml#Fig21) 中找到。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig21_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig21_HTML.jpg)


    图 7-21


    使用非聚集索引和包含列时的执行计划


    执行计划显示查询仍在使用非聚集索引。由于此索引已更改以包含 select 语句中的附加列，因此执行计划也发生了变化。之前使用非聚集索引时，执行计划有一个`Index
    Scan`和一个`Key Lookup`。现在执行计划使用的是一个`Index Seek`。


    一旦你熟悉了阅读执行计划，就可以开始使用执行计划来帮助你确定如何提高性能。当你查看执行计划时，可能会发现一个`Clustered Index Scan`。通常，这意味着
    SQL Server 必须遍历整个表才能找到符合查询条件的数据。如本节所示，创建一个包含连接条件的非聚集索引可以帮助提高查询性能。如果你发现 SQL Server
    必须执行`Key Lookup`，你可以查看是否将被选择的列作为非聚集索引的一部分包含进来是有意义的。了解 SQL Server 如何使用索引可以帮助提高查询性能。了解
    SQL Server 如何比较来自多个数据集的数据也可以帮助你提高查询性能。'
  raw: 'Some tables that are very small may not need to have indexes, and using a
    Table Scan may be acceptable. If there are many records in the table, then a Table
    Scan is not ideal. When this is the case, you may want to investigate if there
    are any possible indexes that can be added to the table.


    If there is a non-clustered index on the heap, it is possible that SQL Server
    can use those non-clustered indexes as part of the execution plan. If this is
    the case, you will see an Index Seek or an Index Scan. When either an Index Seek
    or Index Scan is in the execution plan, it is possible that the columns used in
    the query do not exist in the non-clustered index. If additional columns need
    to be looked up in the table, you will see a RID Lookup in the execution plan.
    You can see this in Figure [7-15](#480547_1_En_7_Chapter.xhtml#Fig15).


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig15_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig15_HTML.jpg)


    Figure 7-15


    RID Lookup


    Like the Key Lookup, you will want to see if you can alter any non-clustered indexes
    to include the necessary columns from the T-SQL code. It is also possible that
    the query can be modified to exclude the columns that are causing the RID Lookup.


    As an example, I have written a query to pull back all ingredients that begin
    with the name tomato. In order to do this, I will need to run the query in Listing
    [7-2](#480547_1_En_7_Chapter.xhtml#PC2).


    ```

    SELECT IngredientName, DateCreated

    FROM dbo. Ingredient

    WHERE IngredientName LIKE ''Tomato%'';

    Listing 7-2

    Query to Get Ingredients

    ```


    The first time I ran this query, there was only a primary clustered index on IngredientID
    in this table. The execution plan from the T-SQL code in Listing [7-2](#480547_1_En_7_Chapter.xhtml#PC2)
    is shown in Figure [7-16](#480547_1_En_7_Chapter.xhtml#Fig16).


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig16_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig16_HTML.jpg)


    Figure 7-16


    Execution Plan with Only Clustered Index


    There are no non-clustered index on the table. The only option SQL Server has
    is to search through the entire clustered index to find the requested records.
    You can see this by looking over the properties associated with the Clustered
    Index Scan. The properties for this query execution can be found in Figure [7-17](#480547_1_En_7_Chapter.xhtml#Fig17).


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig17_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig17_HTML.jpg)


    Figure 7-17


    Reads with Clustered Index


    Looking at the estimated and actual number of rows to be read, the rows to be
    read are the same for both. The total for each was 263,010 rows read. The actual
    number of rows is 3\. SQL Server must search 263,010 rows to find the 3 rows that
    matched the criteria.


    In this scenario, we have a query that is reading significantly more rows than
    the number of rows returned. I cannot rewrite the query to use a non-clustered
    index since none exist. My best option is to write a non-clustered index to improve
    performance. The new non-clustered index is Listing [7-3](#480547_1_En_7_Chapter.xhtml#PC3).


    ```

    CREATE INDEX IX_Ingredient_IngredientName

    ON dbo.Ingredient (IngredientName);

    Listing 7-3

    Create Non-clustered Index

    ```


    Now that I have created the non-clustered index, I am going to run the query again
    to see if I get a new execution plan. The new execution plan is in Figure [7-18](#480547_1_En_7_Chapter.xhtml#Fig18).


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig18_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig18_HTML.jpg)


    Figure 7-18


    Execution Plan with Non-clustered Index


    In Figure [7-18](#480547_1_En_7_Chapter.xhtml#Fig18), the Clustered Index Scan
    has been replaced with an Index Scan and a Key Lookup. While this may seem like
    I have decreased the performance of the execution plan, I can verify this by looking
    at the number of rows read. In Figure [7-19](#480547_1_En_7_Chapter.xhtml#Fig19),
    you can see the properties associated with the Index Seek.


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig19_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig19_HTML.jpg)


    Figure 7-19


    Properties for Index Seek


    Now that the non-clustered index has been created, I can see that the actual number
    of rows read has decreased from 263,010 to 3\. I would expect that the Key Lookup
    would have the same number of reads, but I can look at the properties to confirm.
    In Figure [7-20](#480547_1_En_7_Chapter.xhtml#Fig20), you can see the properties
    returned.


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig20_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig20_HTML.jpg)


    Figure 7-20


    Properties of the Key Lookup


    Reviewing the Key Lookup, there were also three rows read in the Key Lookup. The
    T-SQL code without the non-clustered index had reads of 263,010\. The total number
    of rows read with the non-clustered index is six.


    I could get rid of the Key Lookup by including the DateCreated column as part
    of the non-clustered index or remove the column from the original query.


    ```

    CREATE INDEX IX_Ingredient_IngredientName

    ON dbo.Ingredient (IngredientName) INCLUDE (DateCreated);

    Listing 7-4

    Non-clustered Index with Included Column

    ```


    After adding the index in Listing [7-4](#480547_1_En_7_Chapter.xhtml#PC4) and
    running the query from Listing [7-2](#480547_1_En_7_Chapter.xhtml#PC2), I can
    get the execution plan. The execution plan can be found in Figure [7-21](#480547_1_En_7_Chapter.xhtml#Fig21).


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig21_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig21_HTML.jpg)


    Figure 7-21


    Execution Plan with Non-clustered Index and Included Column


    The execution plan is showing that the query is still using the non-clustered
    index. Since this index has changed to include the additional column in the select
    statement, the execution plan has changed. Previously, with the non-clustered
    index, the execution plan had an Index Scan and a Key Lookup. Now the execution
    plan is using an Index Seek.


    Once you get familiar with reading execution plan, you can start using execution
    plans to help you determine how to improve performance. When you look at your
    execution plan, you may find a Clustered Index Scan. Generally, this implies that
    SQL Server had to look through the entire table to find the data that meets the
    query criteria. As shown in this section, creating a non-clustered index that
    includes the join criteria can help improve the performance of your query. If
    you find that SQL Server is having to perform a Key Lookup, you can see if it
    makes sense to include the columns being selected as part of the non-clustered
    index. Understanding how SQL Server uses indexes can help improve your query performance.
    Understanding how SQL Server compares data from more than one data set can also
    help you improve query performance.'
  trans: '# 索引优化与执行计划分析


    一些非常小的表可能不需要索引，使用`Table Scan`可能是可以接受的。如果表中有很多记录，那么`Table Scan`就不理想了。在这种情况下，你可能需要调查是否有任何可能的索引可以添加到表上。


    如果堆上有一个非聚集索引，SQL Server 可能会将这些非聚集索引用作执行计划的一部分。如果是这种情况，你将会看到一个`Index Seek`或`Index
    Scan`。当执行计划中出现`Index Seek`或`Index Scan`时，查询中使用的列可能不存在于非聚集索引中。如果需要查找表中的其他列，你将在执行计划中看到一个`RID
    Lookup`。你可以在图 7-15 中看到这一点。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig15_HTML.jpg](img/480547_1_En_7_Fig15_HTML.jpg)


    图 7-15


    `RID Lookup`


    与`Key Lookup`类似，你会希望查看是否可以修改任何非聚集索引以包含来自 T-SQL 代码的必要列。也有可能通过修改查询来排除导致`RID Lookup`的列。


    举个例子，我编写了一个查询来获取所有名称以“tomato”开头的原料。为了做到这一点，我需要运行清单 7-2 中的查询。


    ```

    SELECT IngredientName, DateCreated

    FROM dbo. Ingredient

    WHERE IngredientName LIKE ''Tomato%'';

    清单 7-2

    获取原料的查询

    ```


    第一次运行此查询时，此表上只有一个在`IngredientID`上的主聚集索引。来自清单 7-2 中 T-SQL 代码的执行计划如图 7-16 所示。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig16_HTML.jpg](img/480547_1_En_7_Fig16_HTML.jpg)


    图 7-16


    仅有聚集索引时的执行计划


    该表上没有非聚集索引。SQL Server 唯一的选择是搜索整个聚集索引来查找请求的记录。通过查看与`Clustered Index Scan`相关的属性可以看到这一点。此查询执行的属性可以在图
    7-17 中找到。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig17_HTML.jpg](img/480547_1_En_7_Fig17_HTML.jpg)


    图 7-17


    使用聚集索引时的读取次数


    查看估计的和实际的读取行数，两者读取的行数是相同的。每者的总数都是 263,010 行被读取。实际返回的行数是 3 行。SQL Server 必须搜索 263,010
    行才能找到符合标准的 3 行。


    在这个场景中，我们有一个查询，它读取的行数远大于返回的行数。我无法重写查询以使用非聚集索引，因为不存在这样的索引。我最好的选择是编写一个非聚集索引来提高性能。新的非聚集索引在清单
    7-3 中。


    ```

    CREATE INDEX IX_Ingredient_IngredientName

    ON dbo.Ingredient (IngredientName);

    清单 7-3

    创建非聚集索引

    ```


    现在我已经创建了非聚集索引，我将再次运行查询以查看是否会得到一个新的执行计划。新的执行计划在图 7-18 中。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig18_HTML.jpg](img/480547_1_En_7_Fig18_HTML.jpg)


    图 7-18


    使用非聚集索引时的执行计划


    在图 7-18 中，`Clustered Index Scan`已被`Index Scan`和`Key Lookup`所取代。虽然这看起来像是我降低了执行计划的性能，但我可以通过查看读取的行数来验证这一点。在图
    7-19 中，你可以看到与`Index Seek`相关的属性。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig19_HTML.jpg](img/480547_1_En_7_Fig19_HTML.jpg)


    图 7-19


    `Index Seek`的属性


    现在非聚集索引已经创建，我可以看到实际的读取行数已经从 263,010 减少到 3。我预计`Key Lookup`会有相同的读取次数，但我可以查看属性来确认。在图
    7-20 中，你可以看到返回的属性。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig20_HTML.jpg](img/480547_1_En_7_Fig20_HTML.jpg)


    图 7-20


    `Key Lookup`的属性


    检查`Key Lookup`，其中也有三行被读取。没有非聚集索引的 T-SQL 代码有 263,010 次读取。使用非聚集索引后的总读取行数是六次。


    我可以通过将`DateCreated`列作为非聚集索引的一部分包含进来，或者从原始查询中删除该列来消除`Key Lookup`。


    ```

    CREATE INDEX IX_Ingredient_IngredientName

    ON dbo.Ingredient (IngredientName) INCLUDE (DateCreated);

    清单 7-4

    包含列的非聚集索引

    ```


    在添加了清单 7-4 中的索引并运行来自清单 7-2 的查询后，我可以获得执行计划。该执行计划可以在图 7-21 中找到。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig21_HTML.jpg](img/480547_1_En_7_Fig21_HTML.jpg)


    图 7-21


    使用非聚集索引和包含列时的执行计划


    执行计划显示查询仍在使用非聚集索引。由于此索引已更改以包含 select 语句中的附加列，因此执行计划也发生了变化。之前使用非聚集索引时，执行计划有一个`Index
    Scan`和一个`Key Lookup`。现在执行计划使用的是一个`Index Seek`。


    一旦你熟悉了阅读执行计划，就可以开始使用执行计划来帮助你确定如何提高性能。当你查看执行计划时，可能会发现一个`Clustered Index Scan`。通常，这意味着
    SQL Server 必须遍历整个表才能找到符合查询条件的数据。如本节所示，创建一个包含连接条件的非聚集索引可以帮助提高查询性能。如果你发现 SQL Server
    必须执行`Key Lookup`，你可以查看是否将被选择的列作为非聚集索引的一部分包含进来是有意义的。了解 SQL Server 如何使用索引可以帮助提高查询性能。了解
    SQL Server 如何比较来自多个数据集的数据也可以帮助你提高查询性能。'
- fmt: '## Logical Join Types in Execution Plans


    除了阅读执行计划和理解索引，你的T-SQL代码还可以用于确定执行计划将如何生成。在某些情况下，表如何连接在一起与数据如何存储在表中同样重要。有时，你连接列的方式也可能影响你的执行计划。`WHERE`子句中的某些T-SQL会影响查询执行中使用的逻辑连接类型。如果多个查询被组合，也可能改变查询的执行方式。最终，T-SQL代码的编写方式与SQL
    Server决定执行查询的方式之间存在关系。


    SQL Server中有几种不同的逻辑连接。其中一些逻辑连接在T-SQL中很容易看到。这包括`INNER JOIN`、`LEFT OUTER JOIN`、`RIGHT
    OUTER JOIN`和`FULL OUTER JOIN`。这些并不是SQL Server中存在的唯一逻辑连接。使用一些T-SQL命令时，SQL Server会将一个表与另一个表进行比较，寻找匹配或不匹配的记录。在这些情况下，SQL
    Server不执行完整的连接，而是执行`SEMI JOIN`。这种连接类型未被指定为T-SQL命令，但一些T-SQL命令如`EXISTS`或`NOT EXISTS`会指示一个`SEMI
    JOIN`。可用的半连接包括`LEFT SEMI JOIN`、`LEFT ANTI-SEMI JOIN`、`RIGHT SEMI JOIN`和`RIGHT
    ANTI-SEMI JOIN`。最后，还有一些逻辑连接与在同一事务中组合两个或多个查询结果有关。这可以包括通常与`UNION ALL`相关的`CONCATENATION`，或者在T-SQL中使用`UNION`时可能发生的`UNION`逻辑连接。根据逻辑连接，SQL
    Server将决定可以使用哪些物理连接。通过这种方式，逻辑连接可用于影响查询性能。


    有一些物理连接操作符可以与逻辑连接相关联。这四个物理连接操作符分别称为合并连接、哈希连接、嵌套循环和自适应连接。使用`INNER JOIN`时，这四种物理连接操作符中的任何一种都可以作为执行计划的一部分使用。根据数据在表中的存储方式以及表的相对大小，可能会影响使用哪个物理操作符。如果被比较的两个表中的数据已排序，则可以对来自两个表的记录进行并排比较。这将使SQL
    Server能够快速找到匹配或不匹配的记录，具体取决于查询要求。当这种情况发生时，它被称为合并连接。一个出现在执行计划中的合并连接物理操作符如图7-22所示。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig22_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig22_HTML.jpg)


    **图 7-22**


    合并连接


    有时被连接在一起的表没有排序。如果是这种情况，SQL Server仍然可以比较每个表之间的行。然而，SQL Server需要将记录转换为可以轻松比较的内容。这可以通过哈希来完成。如果SQL
    Server对两个表中被比较的列进行哈希处理并进行比较，那么物理操作符将是哈希匹配。如果你在执行计划中看到图7-23，那么你就知道SQL Server是如何执行哈希匹配物理连接的。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig23_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig23_HTML.jpg)


    **图 7-23**


    哈希匹配


    如果有两个表，其中一个表比另一个小，那么SQL Server可能会决定逐行比较一个表的值与另一个表的所有行。当这种情况发生时，SQL Server将使用嵌套循环，如图7-24所示。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig24_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig24_HTML.jpg)


    **图 7-24**


    嵌套循环


    从SQL Server 2017开始，有一种新的物理连接操作符可以在SQL Server确定查询的执行计划时使用。这个新的物理连接操作符旨在帮助解决给定表中存储的数据可能根据`WHERE`子句中的标准而有显著差异的情况。这种物理连接允许SQL
    Server根据为查询选择的数据来决定是使用哈希匹配还是嵌套循环。这被称为自适应连接。在SQL Server 2017中，自适应连接仅在列存储索引上可用。这对于SQL
    Server 2019已经发生了变化。


    了解了可用的逻辑连接后，接下来是`LEFT OUTER JOIN`和`RIGHT OUTER JOIN`。在某种程度上，这两种逻辑连接类型是相同但也不同的。例如，嵌套循环只能使用`LEFT
    OUTER JOIN`。如果查询是使用`RIGHT OUTER JOIN`编写的，SQL Server将产生额外的开销来将`RIGHT OUTER JOIN`转换为`LEFT
    OUTER JOIN`。除了这个特定场景，所有物理连接类型都支持使用`LEFT OUTER JOIN`。在SQL Server的早期版本中，根据查询中使用的是`LEFT
    OUTER JOIN`还是`RIGHT OUTER JOIN`，SQL Server可能生成两个不同的执行计划。这是由于在连接重新排序方面的限制造成的。


    下一种逻辑连接是`FULL OUTER JOIN`。在所有连接类型中，这种类型对于何时可能使用一种物理连接类型而非另一种有最多的特定条件。在第一个例子中，我将按标识符对表进行排序，如清单7-5所示。


    ```

    ALTER TABLE dbo.RecipeIngredient

    ADD CONSTRAINT PK_RecipeIngredient_RecipeIngredientID

    PRIMARY KEY CLUSTERED (RecipeIngredientID)

    Listing 7-5

    Primary Key to Sort Data by RecipeIngredientID

    ```


    一旦表按`RecipeIngredientID`排序，我将把`RecipeIngredient`表连接到`Recipe`表。此连接的T-SQL代码如清单7-6所示。


    ```

    SELECT rec.RecipeName

    FROM dbo.Recipe rec

    LEFT OUTER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    Listing 7-6

    Outer Join Between Recipe and RecipeIngredient

    ```


    在此场景中，两个表的排序方式不同。`RecipeIngredient`表按`RecipeIngredientID`排序，而`Recipe`表按`RecipeID`排序。你可以在图7-25中看到，物理操作符是哈希匹配。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig25_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig25_HTML.jpg)


    **图 7-25**


    使用哈希匹配的执行计划


    我们已经看到了当表排序不同时会发生什么。如果我运行清单7-7中的T-SQL代码，两个表将按相同的列`RecipeID`排序。


    ```

    ALTER TABLE dbo.RecipeIngredient

    ADD CONSTRAINT PK_RecipeIngredient_RecipeIDIngredientID

    PRIMARY KEY CLUSTERED (RecipeID, IngredientID)

    Listing 7-7

    Change Primary Key to Sort Data by RecipeID

    ```


    查看图7-26，你可以看到执行计划已更改为使用合并连接。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig26_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig26_HTML.jpg)


    **图 7-26**


    使用合并连接的执行计划


    现在这两个表以相同的方式排序，SQL Server确定使用合并连接更具成本效益。在前面的例子中，SQL Server将获取两个有序的数据集并比较记录以确定哪些记录匹配。前面所有的例子都假设被比较的列之间相等。作为一般准则，如果查询中的连接都不相等，SQL
    Server将始终使用嵌套循环。你可以在清单7-8中看到一个满足此条件的查询示例。'
  raw: '## Logical Join Types in Execution Plans


    In addition to reading execution plans and understanding indexes, your T-SQL code
    can also be used to determine how an execution plan will be generated. In some
    cases, how tables are joined together is just as important as how data is stored
    in the tables. There are times where how you are joining your columns together
    may also affect your execution plan. Some T-SQL in the WHERE clause can impact
    what types of logical joins are used in the query execution. If multiple queries
    are combined, it is also possible that it may change how the query is executed.
    Ultimately, there is a relationship between how the T-SQL code is written and
    how SQL Server decides to execute the query.


    There are several different logical joins in SQL Server. Some of these logical
    joins are easily visible in T-SQL. This includes the INNER JOIN, LEFT OUTER JOIN,
    RIGHT OUTER JOIN, and FULL OUTER JOIN. These are not the only logical joins that
    exist in SQL Server. With some T-SQL commands, SQL Server will compare one table
    to another looking for records that match or not. In these scenarios, SQL Server
    does not perform a full join but a SEMI JOIN. This type of join is not specified
    as a T-SQL command, but some T-SQL commands like EXISTS or NOT EXISTS will indicate
    a SEMI JOIN. Available semi joins include the LEFT SEMI JOIN, LEFT ANTI-SEMI JOIN,
    RIGHT SEMI JOIN, and RIGHT ANTI-SEMI JOIN. Finally, there are some logical joins
    that are related to combining two or more query results in the same transaction.
    This can include CONCATENATION which is often associated with a UNION ALL or the
    UNION logical join which can happen with a UNION in T-SQL. Based on the logical
    join, SQL Server will determine what physical joins can be used. In this way,
    logical joins can be used to affect query performance.


    There are physical join operators that can be associated with logical joins. The
    four physical join operators are called merge join, hash join, nested loop, and
    adaptive join. When using an INNER JOIN, any of these four types of physical join
    operators can be used as part of the execution plan. Depending on how the data
    is stored in the table and the relative sizes of the tables may affect which physical
    operator is used. If the data from both tables being compared is sorted, then
    the records from the two tables can be compared side by side. This would let SQL
    Server quickly find the records that do or do not match, depending on the query
    requirements. When this happens, it is called a Merge Join. A Merge Join physical
    operator that would appear in the execution plan as shown in Figure [7-22](#480547_1_En_7_Chapter.xhtml#Fig22).


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig22_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig22_HTML.jpg)


    Figure 7-22


    Merge Join


    There are times where the tables being joined together are not sorted. If that
    is the case, SQL Server can still compare the rows between each of the tables.
    However, SQL Server will need to convert the records to something that can be
    compared easily. This can be done by hashing. If SQL Server hashes the columns
    being compared in both tables and compares them, the physical operator will be
    a Hash Match. If you see Figure [7-23](#480547_1_En_7_Chapter.xhtml#Fig23) in
    your execution plan, then you know how SQL Server is performing a Hash Match physical
    join.


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig23_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig23_HTML.jpg)


    Figure 7-23


    Hash Match


    If there are two tables where one table is smaller than another, then SQL Server
    may decide to compare the values or one table one row at a time to all rows of
    the other table. When this happens, SQL Server will be using a Nested Loop as
    shown in Figure [7-24](#480547_1_En_7_Chapter.xhtml#Fig24).


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig24_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig24_HTML.jpg)


    Figure 7-24


    Nested Loop


    Starting in SQL Server 2017, there is a new physical join operator that can be
    used when SQL Server determines an execution plan for a query. This new physical
    join operator is intended to help in situations where the data stored in a given
    table may vary significantly based on the criteria in the `WHERE` clause . This
    type of physical join allows SQL Server to determine if a Hash Match or Nested
    Loop should be used depending on the data selected for the query. This is referred
    to as an Adaptive Join. In SQL Server 2017, Adaptive Joins were only available
    with columnstore indexes. This has changed for SQL Server 2019.


    Going through the logical joins that are available, the next one on the list is
    the LEFT OUTER JOIN and the RIGHT OUTER JOIN. In some ways, these two types of
    logical joins are the same but also different. For instance, Nested Loops can
    only use a LEFT OUTER JOIN. If a query is written using a RIGHT OUTER JOIN, SQL
    Server will incur an additional cost to convert a RIGHT OUTER JOIN to a LEFT OUTER
    JOIN. Except this specific scenario, all physical join types support the use of
    LEFT OUTER JOIN. In previous versions of SQL Server, it was possible for SQL Server
    to generate two different execution plans depending on whether a LEFT OUTER JOIN
    or a RIGHT OUTER JOIN was used in the query. This was due to the limitations around
    how joins can be reordered.


    The next type of logical join is the FULL OUTER JOIN. Of all the join types, this
    one has the most specifics about when one physical join type may be used over
    another. In the first example, I am going to order the table by the identifier
    as shown in Listing [7-5](#480547_1_En_7_Chapter.xhtml#PC5).


    ```

    ALTER TABLE dbo.RecipeIngredient

    ADD CONSTRAINT PK_RecipeIngredient_RecipeIngredientID

    PRIMARY KEY CLUSTERED (RecipeIngredientID)

    Listing 7-5

    Primary Key to Sort Data by RecipeIngredientID

    ```


    Once the table has been ordered by the RecipeIngredientID, I will join the RecipeIngredient
    table to the Recipe table. The T-SQL code for this join is shown in Listing [7-6](#480547_1_En_7_Chapter.xhtml#PC6).


    ```

    SELECT rec.RecipeName

    FROM dbo.Recipe rec

    LEFT OUTER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    Listing 7-6

    Outer Join Between Recipe and RecipeIngredient

    ```


    In this scenario, the two tables are not ordered in the same way. The RecipeIngredient
    table is sorted by the RecipeIngredientID, whereas the Recipe table is sorted
    by the RecipeID. You can see in Figure [7-25](#480547_1_En_7_Chapter.xhtml#Fig25)
    that the physical operator is a Hash Match.


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig25_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig25_HTML.jpg)


    Figure 7-25


    Execution Plan Using Hash Match


    We have seen what happens when the tables are ordered differently. If I run the
    T-SQL code in Listing [7-7](#480547_1_En_7_Chapter.xhtml#PC7), both tables will
    be ordered by the same column, RecipeID.


    ```

    ALTER TABLE dbo.RecipeIngredient

    ADD CONSTRAINT PK_RecipeIngredient_RecipeIDIngredientID

    PRIMARY KEY CLUSTERED (RecipeID, IngredientID)

    Listing 7-7

    Change Primary Key to Sort Data by RecipeID

    ```


    Looking at Figure [7-26](#480547_1_En_7_Chapter.xhtml#Fig26), you can see that
    the execution plan has changed to use a Merge Join.


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig26_HTML.jpg](images/480547_1_En_7_Chapter/480547_1_En_7_Fig26_HTML.jpg)


    Figure 7-26


    Execution Plan Using Merge Join


    Now that these two tables are ordered in the same manner, SQL Server has determined
    that it is more cost-effective to use a Merge Join. In the preceding example,
    SQL Server will take the two ordered data sets and compare the records to determine
    which records match. All the preceding examples assume equality between the columns
    being compared. As a general guide, SQL Server will always use a Nested Loop if
    none of the joins in the query are equal. You can see an example of query that
    meets this criteria in Listing [7-8](#480547_1_En_7_Chapter.xhtml#PC8).'
  trans: '

    ## 执行计划中的逻辑连接类型


    除了阅读执行计划和理解索引，你的 T-SQL 代码还可以用来确定执行计划将如何生成。在某些情况下，表如何连接在一起与数据如何存储在表中同样重要。有时，连接列的方式也可能影响你的执行计划。`WHERE`子句中的某些
    T-SQL 代码会影响查询执行中使用的逻辑连接类型。如果多个查询被组合，也可能改变查询的执行方式。最终，T-SQL 代码的编写方式与 SQL Server
    决定执行查询的方式之间存在关系。


    SQL Server 中有几种不同的逻辑连接。其中一些逻辑连接在 T-SQL 中很容易看到。这包括`INNER JOIN`、`LEFT OUTER JOIN`、`RIGHT
    OUTER JOIN`和`FULL OUTER JOIN`。这些并不是 SQL Server 中存在的唯一逻辑连接。使用某些 T-SQL 命令时，SQL Server
    会将一个表与另一个表进行比较，寻找匹配或不匹配的记录。在这些情况下，SQL Server 不执行完整的连接，而是执行`SEMI JOIN`。这种连接类型未被指定为
    T-SQL 命令，但一些 T-SQL 命令如`EXISTS`或`NOT EXISTS`会指示一个`SEMI JOIN`。可用的半连接包括`LEFT SEMI
    JOIN`、`LEFT ANTI-SEMI JOIN`、`RIGHT SEMI JOIN`和`RIGHT ANTI-SEMI JOIN`。最后，还有一些逻辑连接与在同一事务中组合两个或多个查询结果有关。这可以包括通常与`UNION
    ALL`相关的`CONCATENATION`，或者在 T-SQL 中使用`UNION`时可能发生的`UNION`逻辑连接。根据逻辑连接，SQL Server
    将决定可以使用哪些物理连接。通过这种方式，逻辑连接可用于影响查询性能。


    有一些物理连接操作符可以与逻辑连接相关联。这四个物理连接操作符分别称为合并连接、哈希连接、嵌套循环和自适应连接。使用`INNER JOIN`时，这四种物理连接操作符中的任何一种都可以作为执行计划的一部分使用。根据数据在表中的存储方式以及表的相对大小，可能会影响使用哪个物理操作符。如果被比较的两个表中的数据已排序，则可以对来自两个表的记录进行并排比较。这将使
    SQL Server 能够快速找到匹配或不匹配的记录，具体取决于查询要求。当这种情况发生时，它被称为合并连接。一个出现在执行计划中的合并连接物理操作符如图
    7-22 所示。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig22_HTML.jpg](img/480547_1_En_7_Fig22_HTML.jpg)


    **图 7-22**


    合并连接


    有时被连接在一起的表没有排序。如果是这种情况，SQL Server 仍然可以比较每个表之间的行。然而，SQL Server 需要将记录转换为可以轻松比较的内容。这可以通过哈希来完成。如果
    SQL Server 对两个表中被比较的列进行哈希处理并进行比较，那么物理操作符将是哈希匹配。如果你在执行计划中看到图 7-23，那么你就知道 SQL Server
    是如何执行哈希匹配物理连接的。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig23_HTML.jpg](img/480547_1_En_7_Fig23_HTML.jpg)


    **图 7-23**


    哈希匹配


    如果有两个表，其中一个表比另一个小，那么 SQL Server 可能会决定逐行比较一个表的值与另一个表的所有行。当这种情况发生时，SQL Server 将使用嵌套循环，如图
    7-24 所示。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig24_HTML.jpg](img/480547_1_En_7_Fig24_HTML.jpg)


    **图 7-24**


    嵌套循环


    从 SQL Server 2017 开始，有一种新的物理连接操作符可以在 SQL Server 确定查询的执行计划时使用。这个新的物理连接操作符旨在帮助解决给定表中存储的数据可能根据`WHERE`子句中的标准而有显著差异的情况。这种物理连接允许
    SQL Server 根据为查询选择的数据来决定是使用哈希匹配还是嵌套循环。这被称为自适应连接。在 SQL Server 2017 中，自适应连接仅在列存储索引上可用。这对于
    SQL Server 2019 已经发生了变化。


    了解了可用的逻辑连接后，接下来是`LEFT OUTER JOIN`和`RIGHT OUTER JOIN`。在某种程度上，这两种逻辑连接类型是相同但也不同的。例如，嵌套循环只能使用`LEFT
    OUTER JOIN`。如果查询是使用`RIGHT OUTER JOIN`编写的，SQL Server 将产生额外的开销来将`RIGHT OUTER JOIN`转换为`LEFT
    OUTER JOIN`。除了这个特定场景，所有物理连接类型都支持使用`LEFT OUTER JOIN`。在 SQL Server 的早期版本中，根据查询中使用的是`LEFT
    OUTER JOIN`还是`RIGHT OUTER JOIN`，SQL Server 可能生成两个不同的执行计划。这是由于在连接重新排序方面的限制造成的。


    下一种逻辑连接是`FULL OUTER JOIN`。在所有连接类型中，这种类型对于何时可能使用一种物理连接类型而非另一种有最多的特定条件。在第一个例子中，我将按标识符对表进行排序，如清单
    7-5 所示。


    ```

    ALTER TABLE dbo.RecipeIngredient

    ADD CONSTRAINT PK_RecipeIngredient_RecipeIngredientID

    PRIMARY KEY CLUSTERED (RecipeIngredientID)

    Listing 7-5

    Primary Key to Sort Data by RecipeIngredientID

    ```


    一旦表按`RecipeIngredientID`排序，我将把`RecipeIngredient`表连接到`Recipe`表。此连接的 T-SQL 代码如清单
    7-6 所示。


    ```

    SELECT rec.RecipeName

    FROM dbo.Recipe rec

    LEFT OUTER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    Listing 7-6

    Outer Join Between Recipe and RecipeIngredient

    ```


    在此场景中，两个表的排序方式不同。`RecipeIngredient`表按`RecipeIngredientID`排序，而`Recipe`表按`RecipeID`排序。你可以在图
    7-25 中看到，物理操作符是哈希匹配。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig25_HTML.jpg](img/480547_1_En_7_Fig25_HTML.jpg)


    **图 7-25**


    使用哈希匹配的执行计划


    我们已经看到了当表排序不同时会发生什么。如果我运行清单 7-7 中的 T-SQL 代码，两个表将按相同的列`RecipeID`排序。


    ```

    ALTER TABLE dbo.RecipeIngredient

    ADD CONSTRAINT PK_RecipeIngredient_RecipeIDIngredientID

    PRIMARY KEY CLUSTERED (RecipeID, IngredientID)

    Listing 7-7

    Change Primary Key to Sort Data by RecipeID

    ```


    查看图 7-26，你可以看到执行计划已更改为使用合并连接。


    ![../images/480547_1_En_7_Chapter/480547_1_En_7_Fig26_HTML.jpg](img/480547_1_En_7_Fig26_HTML.jpg)


    **图 7-26**


    使用合并连接的执行计划


    现在这两个表以相同的方式排序，SQL Server 确定使用合并连接更具成本效益。在前面的例子中，SQL Server 将获取两个有序的数据集并比较记录以确定哪些记录匹配。前面所有的例子都假设被比较的列之间相等。作为一般准则，如果查询中的连接都不相等，SQL
    Server 将始终使用嵌套循环。你可以在清单 7-8 中看到一个满足此条件的查询示例。

    '
- fmt: "# SQL 连接类型与执行计划\n\n```sql\nSELECT TOP 500 rec.RecipeName\nFROM dbo.Recipe\
    \ rec\nFULL OUTER JOIN dbo.RecipeIngredient recing\nON rec.RecipeID  recing.RecipeID\n\
    ```\n**Listing 7-8**  \n**Full Outer Join with Inequality**\n\n如果我重新创建在Listing\
