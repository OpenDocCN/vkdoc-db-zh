    # Introduction


    Working with `T-SQL` allows you to write code and see results relatively quickly.
    There is also a great deal of flexibility when creating `T-SQL` statements. In
    many cases, there is more than one way you can achieve the same outcome from your
    `T-SQL`. This book is designed for database developers and data professionals
    that have a general knowledge of `T-SQL` but are looking to improve their overall
    code quality. You should understand `T-SQL` syntax and know how to write `SELECT`,
    `INSERT`, `UPDATE`, or `DELETE` statements before beginning this book. `Pro T-SQL
    2019` will prepare you to write consistent code with improved performance. You
    will also learn how to protect your `T-SQL` code by using source control and improving
    your database deployment pipeline. Overall, the goal of this book is to provide
    you with a framework to write better `T-SQL` code. As data professionals, we can
    find ourselves in scenarios where there are high demands or short deadlines. `Pro
    T-SQL 2019` was written with the intent to help you write code that could save
    you time and energy in the future.


    There are four sections in this book. The first section covers how to improve
    the readability of your `T-SQL` code. There is an overview of the various data
    types for `T-SQL` along with guidance on how to best use those data types. This
    first section explains the benefits and disadvantages of the various database
    objects in `SQL Server`. Additional chapters discuss standardizing and designing
    `T-SQL` code. The second section explains how to write `T-SQL` code that is efficient.
    This section includes using set-based design to write `T-SQL` code and understanding
    the relationship between hardware and `T-SQL` design. You will also learn how
    to use execution plans and new features in `SQL Server 2019` to improve the performance
    of your `T-SQL` code. The third section discusses how to manage your `T-SQL` code.
    The chapters included in this section cover developing coding standards and using
    source control to store your code. To further manage your `T-SQL` code, you will
    also learn some methods to test and deploy your database code. The fourth section
    addresses how to write `T-SQL` code so that it is sustainable over time. These
    chapters include methods to safely add new functionality, to log changes to data
    within your databases, and to manage data growth over time.


