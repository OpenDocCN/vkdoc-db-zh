    is one option.'
  trans: '

    这正是让代码具备灵活性的关键所在。虽然本书的主题不是应用程序代码开发，但你需要一个能与应用程序代码协同工作的数据库来处理这些场景。从概念上讲，这类似于第 12
    章讨论的`feature flags`（功能开关）。你可以创建一个表来存储对指定功能的引用。在某些环境中，这可能被称为`application rules`（应用程序规则）。


    ## 支持遗留代码


    软件开发中的一个关键问题涉及技术债务的处理。应用程序是随时间逐步开发的，其开发方式将决定后续维护的难易程度。对许多组织而言，应用程序最初是围绕时间线开发的，以满足当前业务需求。这可能导致应用程序在缺乏未来支持规划的情况下被快速开发出来。这常常成为开发团队与数据库管理员之间紧张关系的根源。


    真正的挑战在于，应用程序开发时通常缺乏完善文档。如果应用程序文档不完善，并且`T-SQL`查询直接保存在应用程序代码中，那么支持遗留代码将更加困难。如果数据库代码位于应用程序中，那么不仅需要付出更多努力来定位特定的数据库代码，还需要更新这些代码。因为这不仅仅是修改一个表或存储过程来增加`T-SQL`代码的灵活性和可维护性那么简单。


    随着业务的增长和变化，同一个应用程序可能需要被修改以处理新功能。这些新功能可能需要存储新的信息。为了存储这些信息，你可能希望向表中添加一个新列，或者完全创建一个新表。挑战在于试图理解所有依赖于此表的项目。虽然你可以验证数据库对象之间的依赖关系，但问题是你并不知道应用程序当前是如何访问这个表的。你的应用程序可能通过`prepared
    statements`（预处理语句）和`ad hoc queries`（即席查询）访问数据表。如果你的应用程序使用`prepared statements`或`ad
    hoc queries`，那么在向表添加新列时，可能不得不更改应用程序代码，特别是当你的编码标准没有规定在`T-SQL`查询中必须始终指定列名时。


    核心担忧是如何修改此表而不破坏整个应用程序。有些策略可以让你在向现有表添加新列的同时不破坏现有代码。你需要找到一种方法，既允许现有代码按原样引用该表，又能以符合现有标准的方式存储新信息。本节讨论的选项旨在短期内支持新功能。建议你更新应用程序代码和数据库对象，以保持符合最佳实践。


    最简单的选项是创建一个具有与要修改表相同主键的新表。在这种情况下，你还需要重命名现有表。为了防止现有应用程序崩溃，你可以创建一个与当前表同名的视图。所有访问原始未修改表的查询现在都将访问此视图。当你准备好更新所有应用程序代码时，可以删除该视图并将表重命名回其原始名称。


    这些新列可以添加到这第二个表中。你可能会发现，由于遗留应用程序代码的编写方式，你无法实现如`列表 13-8`所示的更改。你可能希望向`dbo.Recipe`表添加`IsActive`列，但你的应用程序可能在内部嵌入了`T-SQL`查询。因此，如果添加这个新列，你可能不确定哪些部分会崩溃。`列表
    13-10`中创建新表`dbo.RecipeIsActive`就是一种可选方案。

    '
- fmt: "# 数据库表重构策略\n\n## 创建新表并迁移数据\n\n```sql\nCREATE TABLE dbo.RecipeIsActive\n(\n\
    \    RecipeID          INT         IDENTITY(1,1)     NOT NULL,\n    RecipeName\
    \        VARCHAR(25)                   NOT NULL,\n    RecipeDescription VARCHAR(50)\
    \                   NOT NULL,\n    ServingQuantity   TINYINT                 \
    \      NOT NULL,\n    MealTypeID        TINYINT                       NOT NULL,\n\
    \    PreparationTypeID TINYINT                       NOT NULL,\n    IsActive \
    \         BIT\n        CONSTRAINT DF_RecipeIsActive_IsActive\n        DEFAULT\
    \ 1                           NOT NULL,\n    DateCreated       DATETIME2(7)  \
    \                NOT NULL,\n    DateModified      DATETIME2(7)               \
    \   NOT NULL,\n    CONSTRAINT PK_RecipeIsActive_RecipeID\n        PRIMARY KEY\
    \ CLUSTERED (RecipeID),\n    CONSTRAINT FK_RecipeIsActive_MealTypeID\n       \
    \ FOREIGN KEY (MealTypeID)\n        REFERENCES dbo.MealType (MealTypeID),\n  \
    \  CONSTRAINT FK_RecipeIsActive_PreparationTypeID\n        FOREIGN KEY (PreparationTypeID)\n\
    \        REFERENCES dbo.PreparationType (PreparationTypeID)\n);\n```\n**Listing\
    \ 13-10** 创建包含 `IsActive` 列的 `dbo.Recipe` 表副本\n\n你可以将所有数据从 `dbo.Recipe` 表移动到 `dbo.RecipeIsActive`\
    \ 表。为了让应用程序能继续插入或更新数据记录，你需要删除 `dbo.Recipe` 表并创建一个同名视图。视图示例见 **Listing 13-11**。\n\
    \n## 使用视图保持兼容性\n\n```sql\nCREATE VIEW dbo.Recipe\nAS\nSELECT RecipeID,\n     \
    \  RecipeName,\n       RecipeDescription,\n       ServingQuantity,\n       MealTypeID,\n\
    \       PreparationTypeID,\n       DateCreated,\n       DateModified\nFROM dbo.RecipeIsActive;\n\
