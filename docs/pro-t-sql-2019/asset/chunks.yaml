    清单 8-3 的部分执行计划


    发生了一些变化。从整体执行计划来看，可以看到所有的线条比之前细了很多。虽然某些步骤的顺序发生了变化，但最大的差异与非聚集索引有关。在图 8-1 中，SQL
    Server 正在对该索引执行**索引扫描**。现在我已将 `IsActive` 列指定为查询的一部分，SQL Server 现在对这个相同的非聚集索引使用**索引查找**。并非所有优化
    `T-SQL` 代码的尝试都这么简单。但是，当你了解数据的存储方式以及表上索引引用该数据的方式时，就有可能对你的 `T-SQL` 代码做出显著的改进。


    ## 优化持续时间


    我使用 SQL Server 的目标是让执行 `T-SQL` 代码的查询运行得尽可能快。我倾向于关注逻辑读取次数，因为我希望最小化进入缓存的、并非正在执行的查询所需的数据页数量。然而，SQL
    Server 中还可能发生其他问题，这些问题可能对下游产生负面影响。


    在 SQL Server 2019 之前，查询速度慢的最常见原因之一是参数嗅探。SQL Server 2019 中的**自适应连接**有助于最小化与参数嗅探相关的问题。如果执行计划包含自适应连接，SQL
    Server 将在执行时决定是使用合并连接还是嵌套循环连接。自适应连接的灵活性允许 `T-SQL` 代码在数据集较小时以一种方式执行，而在数据集较大时使用不同的物理连接方式执行。无论检索的数据如何，这都将使查询执行得更好。


    寻找执行时间最慢的查询可能具有挑战性，特别是当你试图获取有关查询性能的实时数据时。幸运的是，SQL Server 确实会跟踪查询计划缓存中存在的 `T-SQL`
    代码的查询性能。你可以使用与上一节相同的 DMV，即 `sys.dm_exec_query_stats`，但不是查找总逻辑读取或平均逻辑读取最高的记录，而是需要查看工作线程时间。你可以从总工作线程时间或平均工作线程时间开始查看。根据查询运行的时间段，这可能有助于你决定首先关注哪一个。如果工作线程时间最高的某个查询在你业务最活跃的时间段运行，我会首先处理该查询。但是，如果你有平均工作线程时间最高的
    `T-SQL` 代码在一天中的繁忙时段频繁运行，首先处理这段代码可能会带来更多好处。无论哪种方式，你都需要在 `sys.dm_exec_sql_text`
    中查找与 `sys.dm_exec_query_stats` 中的计划相匹配的计划，以找到相关的查询文本。


    SQL Server 的一个挑战是，同一个解决方案并不总是适用于所有情况。我遇到过一些查询，将数据拆分成更小的片段可以提高性能。在其他时候，将几个步骤合并为单个
    `T-SQL` 语句可能更有效。清单 8-4 中的查询显示了一系列 `T-SQL` 语句。


    ```sql

    DECLARE @RecipeID INT = NULL;

    CREATE TABLE #TempIngredient

    (

    RecipeID          INT,

    IngredientName    VARCHAR(25),

    Cost              DECIMAL(6,3)

    );

    INSERT INTO #TempIngredient

    SELECT recing.RecipeID, ing.IngredientName, ingcos.Cost

    FROM dbo.RecipeIngredient recing

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    LEFT JOIN dbo.IngredientCost ingcos

    ON ing.IngredientID = ingcos.IngredientID

    AND ingcos.IsActive = 1

    AND ingcos.Cost > 5.00

    ORDER BY recing.RecipeID, recing.IngredientID;

    SELECT rec.RecipeName, meal.MealTypeName, ting.IngredientName, ting.Cost

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN #TempIngredient ting

    ON rec.RecipeID = ting.RecipeID

    WHERE (rec.RecipeID = @RecipeID OR @RecipeID IS NULL)

    ORDER BY rec.RecipeName, ting.IngredientName;

    DROP TABLE #TempIngredient;

    ```


    **清单 8-4**

    获取所有食谱信息的原始查询


    总体而言，清单 8-4 的目标是返回所有或特定食谱的食谱名称、餐食类型、食材和食材成本。在查看执行计划时，我们将需要深入查看执行计划中百分比最高的特定部分，如图
    8-3 所示。


    ![../images/480547_1_En_8_Chapter/480547_1_En_8_Fig3_HTML.jpg](img/480547_1_En_8_Fig3_HTML.jpg)


    **图 8-3**

    清单 8-4 的部分执行计划


    插入到临时表是第一个 `T-SQL` 语句中最显著的部分。同一语句也占用了整体执行计划中较高的百分比。因此，与此查询相关的最高成本是向临时表插入数据。我可以将此查询重写为清单
    8-5 所示的那样。


    ```sql

    DECLARE @RecipeID INT = NULL;

    SELECT rec.RecipeName, meal.MealTypeName, ing.IngredientName, ingcos.Cost

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    LEFT JOIN dbo.IngredientCost ingcos

    ON ing.IngredientID = ingcos.IngredientID

    AND ingcos.IsActive = 1

    WHERE (rec.RecipeID = @RecipeID OR @RecipeID IS NULL)

    ORDER BY rec.RecipeName, ing.IngredientName;

    ```


    **清单 8-5**

    优化后的获取所有食谱信息的查询


    前面的 `T-SQL` 语句包含了生成与清单 8-4 相同输出所需的所有代码。根据表上存在的索引和连接条件，有时你会看到在单个查询中选择所有数据能获得更好的性能。其他时候，通过获取数据子集并将它们组合到一个查询中，你可能可以优化查询。清单
    8-5 执行计划的一部分可以在图 8-4 中看到。


    ![../images/480547_1_En_8_Chapter/480547_1_En_8_Fig4_HTML.jpg](img/480547_1_En_8_Fig4_HTML.jpg)


    **图 8-4**

    清单 8-5 的部分执行计划


    如图 8-4 所示，占用执行计划最大百分比的步骤已经改变。根据实际执行计划，最大的百分比花费在对 `RecipeIngredient` 表的主键执行**聚集索引查找**上。由于这是涉及表主键的查找，似乎没有更好的替代方案来调整此查询的性能。


    还有其他因素可能导致查询运行缓慢。在许多情况下，优化这些查询的最佳方法涉及使用索引。你需要检查执行计划中的**键查找**。这些键查找表明 SQL Server
    必须从非聚集索引转到聚集索引以查找查询所需的其他字段。在某些情况下，你可能能够更改返回的值或查询的连接条件来解决键查找问题。否则，你将需要查看是否可以更改索引以提高性能。'
- fmt: '# 创建和维护索引


    创建和维护索引本身就是一个可以单独成书的话题，但在处理索引时，有些事情你可以做。如果你认为可能需要考虑添加索引，首先需要了解相关表上当前存在哪些索引。虽然这超出了本书的范围，但你需要确定是否有不再使用并可以删除的索引。对于保留的索引，你需要仔细评估。其中一个索引可能可以通过修改，使其不仅继续对其他`T-SQL`代码有效，还能优化当前的查询。你可以创建或修改索引，以便将额外的列与索引一起存储。但是，索引不会按这些列排序。这些列可以被称为覆盖列。如果某一列需要用于连接或`WHERE`子句，我会考虑将其添加到索引中。在决定将列添加到索引之前，请确保你熟悉`SQL
    Server`如何使用索引来搜索数据。某些索引的处理方式是将列作为索引的包含列添加。这将允许`SQL Server`返回该列结果而无需`Key Lookup`，但它不会影响`SQL
    Server`如何使用索引来检索数据记录。


    优化`T-SQL`代码的执行时长可以带来诸多好处。其中包括提升应用程序的性能。在某些情况下，你可能通过以更高效的方式重写代码来改善查询的时长。在其他情况下，你可能需要考虑是否有不同的代码编写方式可以更好地利用现有索引。另一个选择是修改现有索引或创建新索引。如果选择修改索引，请谨慎行事，因为有时存在的索引可能弊大于利。定期检查`T-SQL`代码的执行时长，看看是否能找到任何需要性能调优的查询。


    # 自动数据库调优


    在前面的章节中，我讨论了你可以做些什么来优化`T-SQL`代码的逻辑读取和执行时长。在过去几个版本的`SQL Server`中，发生了许多变化，这些变化可以帮助你自动优化`SQL
    Server`或优化你的查询。在某些情况下，这涉及记录查询性能的信息。在其他时候，这可以是`SQL Server`管理你的执行计划或索引。虽然本节涵盖的主题与`SQL
    Server`可以为你执行的优化相关，但理解这些概念是有帮助的，以便你能更清楚地了解`SQL Server`将如何处理你的`T-SQL`代码。


    ## 查询存储


    在`SQL Server`中执行查询时，关键优势之一是使用执行计划。在第[6]章中，我简要讨论了内存在`SQL Server`中的使用方式，在第[7]章中，我解释了执行计划如何保存在其自己的计划缓存中。执行计划面临的一个挑战是当执行计划从计划缓存中被清除时。生成新的执行计划不仅有关联成本，而且新的执行计划相比原始计划可能存在性能不佳的风险。


    从`SQL Server 2016`开始，有了关于如何管理执行计划的新功能。不再仅仅是在计划缓存中提供执行计划，而是可以选择保存有关已生成执行计划的历史信息。这个新功能被称为`Query
    Store`。要使用`Query Store`，你必须如清单[8-6]所示启用它。


    ```sql

    ALTER DATABASE Menu

    SET QUERY_STORE (OPERATION_MODE = READ_WRITE);

    ```

    *清单 8-6 启用查询存储的查询*


    启用`Query Store`允许`SQL Server`随时间跟踪执行计划。除了跟踪执行计划外，`Query Store`还记录执行统计信息。从`SQL
    Server 2017`和`Azure SQL Database`开始，`Query Store`还跟踪有关特定查询执行的等待统计信息的信息。在`SQL Server
    2016`中，你必须手动管理`Query Store`以确定你的`T-SQL`代码是否有更好的执行计划。如果你发现一个查询可以从`Query Store`中的执行计划中受益，则需要手动为该查询强制使用一个计划。这将导致随着时间的推移产生额外的维护，因为随着数据库中数据的可能变化，你需要返回并撤销强制计划。'
  raw: 'Creating and maintaining indexes is a topic that could be covered entirely
    in a book by itself, but there are some things you can do when working with indexes.
    If you are at a point where you think you may need to consider adding indexes,
    you will first want to be aware of what indexes currently exist on the tables
    in question. While it is outside the scope of this book, you will want to determine
    if there are indexes that are no longer in use and can be dropped. Of the indexes
    that are remaining, you will want to evaluate these carefully. One of these indexes
    may be able to be modified to allow it to continue to be effective for other T-SQL
    code but also to optimize the current query. You can create or modify an index
    so that additional columns are stored with the index. However, the index is not
    sorted by these columns. These columns can be referred to as a covering column.
    If a column is needed for a join or a WHERE clause, I would consider adding it
    to the index. Before deciding to add the column to the index, make sure you are
    familiar with how SQL Server uses indexes to search for data. The approach with
    some indexes involves adding a column as an included column on the index. This
    will allow SQL Server to return the column results without a Key Lookup, but it
    will not affect how SQL Server uses the index to retrieve data records.


    Optimizing the duration of your T-SQL code can yield many benefits. Among these
    is improved performance of your applications. In some cases, you may be able to
    improve the duration of your queries by rewriting the code in a way that is more
    efficient. In other situations, you may want to consider if there are ways the
    code can be written differently to make better use of the existing indexes. Another
    option is to modify existing indexes or create new ones. If you choose to modify
    indexes, use caution as sometimes indexes can exist that cause more harm than
    they help. Regularly review the duration of your T-SQL code to see if you can
    find any queries that need performance tuning.


    ## Automatic Database Tuning


    In the previous sections, I have discussed what you can do to optimize your T-SQL
    code regarding logical reads and duration. Over the past several releases of SQL
    Server, there have been many changes that can either help you optimize SQL Server
    or optimize your queries automatically. In some cases, this involves recording
    information about the performance of your queries. At other times this can be
    either SQL Server managing your execution plans or your indexes. While the topics
    covered in this section are related to optimization that SQL Server can perform
    for you, it is helpful to understand these concepts so that you can have a better
    idea as to how SQL Server will handle your T-SQL code.


    ### Query Store


    When executing queries in SQL Server, one of the key benefits is the use of execution
    plans. In Chapter [6](#480547_1_En_6_Chapter.xhtml), I discussed briefly how memory
    is used in SQL Server, and in Chapter [7](#480547_1_En_7_Chapter.xhtml), I explained
    how execution plans are saved in their own plan cache. One of the challenges with
    execution plans happens when an execution plan gets cleared from the plan cache.
    Not only was there a cost associated with generating a new execution plan, but
    there is also the risk that the new execution plan could perform poorly as compared
    to the original.


    Starting with SQL Server 2016, there is new functionality on how execution plans
    can be managed. Instead of only having execution plans available in the plan cache,
    there was the option to save historical information about the execution plans
    that had been generated. This new feature was called Query Store. In order to
    use Query Store, you will have to enable it as shown in Listing [8-6](#480547_1_En_8_Chapter.xhtml#PC6).


    ```

    ALTER DATABASE Menu

    SET QUERY_STORE (OPERATION_MODE = READ_WRITE);

    Listing 8-6

    Query to Enable Query Store

    ```


    Enabling Query Store allows SQL Server to keep track of the execution plans over
    time. In addition to keeping track of execution plans, Query Store also records
    execution statistics. Starting in SQL Server 2017 and Azure SQL Database, Query
    Store also tracks information regarding wait statistics for specific query executions.
    In SQL Server 2016, you would have to manually manage the Query Store to determine
    if there were better execution plans for your T-SQL code. If you found a query
    that would benefit from an execution plan in the Query Store, you would need to
    manually force a plan for that query. This would cause additional maintenance
    over time as you would need to go back and undo forced plans as the data in your
    database may change over time.'
