  trans: '

    查看兼容性模式 `150` 的实际执行计划，你会发现执行计划看起来更复杂。不过，你也能看到标量函数被包含在了图 2-5 的执行计划中。


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig5_HTML.jpg](img/480547_1_En_2_Fig5_HTML.jpg)


    图 2-5


    兼容性模式 `150` 的执行计划


    虽然 SQL Server 2019 的执行计划可能更复杂，但这两个 SQL Server 版本之间的执行时间差异显著。我们也可以比较兼容性模式 `140`
    和 `150` 的 CPU 时间和耗时。在表 2-1 中，你可以看到两次查询执行的 CPU 时间和耗时。


    表 2-1


    查询执行的耗时与 CPU 时间


    | 兼容性模式 | CPU 时间 | 耗时 |

    | --- | --- | --- |

    | `140` | `3438 milliseconds` | `4768 milliseconds` |

    | `150` | `655 milliseconds` | `1913 milliseconds` |


    正如你所见，该函数在兼容性模式 `150` 下的性能显著优于 `140` 模式。


    SQL Server 2019 中内联标量 UDF 的能力不仅适用于单查询标量 UDF。在使用多语句标量 UDF 时，功能也得到了改进。多语句标量 UDF
    与清单 2-10 中创建的标量 UDF 类似，都返回单个值。多语句标量 UDF 的不同之处在于，函数内部可以包含额外的逻辑。我们可能希望改进清单 2-10
    中创建的函数，使其能够处理除零错误。在清单 2-14 中，我编写了 T-SQL 代码，通过使用多语句标量 UDF 来增强清单 2-10。


    ```

    CREATE OR ALTER FUNCTION dbo.Ingredient_Price

    (

    @Cost DECIMAL(6,3),

    @Count DECIMAL(6,3)

    )

    RETURNS DECIMAL (6,3) AS

    BEGIN

    DECLARE @IngPrc DECIMAL (6,3)

    IF @Count = 0

    BEGIN

    SET @IngPrc =  0.00

    END

    ELSE

    BEGIN

    SET @IngPrc = @Cost / @Count;

    END

    RETURN @IngPrc

    END;

    清单 2-14

    创建多语句标量 UDF

    ```


    清单 2-14 中创建的多语句标量 UDF 将受益于与清单 2-10 中创建的标量 UDF 相同的标量内联优化。无论你决定使用哪种标量 UDF，SQL Server
    2019 都进行了改进，你可以看到这些函数的性能有所提升。


    ## 表值函数


    在某些情况下，你可能需要执行复杂的逻辑，但又需要返回多个值。当遇到这些情况时，你可能需要考虑使用表值函数。在 SQL Server 2019 之前，唯一能够内联运行的函数是表值函数的一种变体。


    当你需要将表作为结果时，表值函数非常有用。结果可以是从包含多列的一行到包含多行可能的一列，或者多行多列。无论你的目的是什么，如果你想要一个可重用的代码片段，它能给你提供一个表输出，那么表值函数可能就是你需要的。请记住，表值函数主要有两种类型，虽然输出看起来可能一样，但每种类型的性能可能有天壤之别。


    ### 内联表值函数


    如果你使用函数来执行一些复杂的逻辑，但只需使用一条 select 语句就能满足需求，那么你可能想了解更多关于内联表值用户定义函数如何为你工作。重要的是要注意，你并非明确指出一个函数是内联的还是多语句的。你创建和声明函数的方式将决定你创建的是哪种类型的函数。


    与 SQL Server 2019 中可用的内联标量用户定义函数 (UDF) 类似，表值函数也可以被内联。同时也要注意，表值函数能够内联已有相当长一段时间，而内联标量
    UDF 则是比较新的特性。无论哪种方式，优势都很明显。当一个表值函数可以与查询的其余部分内联运行时，优化器可以为该函数以及整个 T-SQL 代码提供更好的执行计划。


    从历史上看，内联表值函数最常见的用途是类似于视图进行操作。不同之处在于，对于内联表值函数，可以使用参数来限制返回的数据；而视图在每次执行时都会返回该视图可用的所有数据。让我们看一下在清单
    2-15 中创建内联表值函数所需的步骤。


    ```

    CREATE FUNCTION dbo.IngredientsByRecipe (@RecipeID INT)

    RETURNS TABLE

    AS

    RETURN

    (

    SELECT meal.MealTypeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    WHERE rec.RecipeID = @RecipeID

    );

    GO

    清单 2-15

    创建内联表值函数

    ```


    创建内联表值函数的过程很直接。可能会有关于函数对性能影响的担忧。我想看看内联表值函数的表现如何；我需要运行一个使用此函数的查询，以便查看执行计划中会发生什么。在清单
    2-16 中，是用于确定执行计划有效性的脚本。


    ```

    SELECT * FROM dbo.IngredientsByRecipe (1);

    清单 2-16

    调用内联表值函数的查询

    ```


    我将展示从清单 2-16 中的代码生成的执行计划，因为它是在 SQL Server 2019 中返回的。你可以在图 2-6 中看到执行计划。


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig6_HTML.jpg](img/480547_1_En_2_Fig6_HTML.jpg)


    图 2-6


    内联表值函数执行计划


    如你所见，该函数直接出现在执行计划中。优化器感知到了这个内联表值函数。虽然内联表值 UDF 可以像表一样使用并且可以接受参数，但在使用它们时仍然存在一些限制。这些类型的函数只允许一个
    select 语句和一个结果集。此外，这些函数中返回的数据不能在数据库中直接修改。然而，在 select 语句中显示的、从内联表值 UDF 返回的数据是可以被修改的。这只是对数据的显示修改，不会影响存储在数据库中的数据。

