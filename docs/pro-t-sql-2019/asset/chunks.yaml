    # 第一部分 构建易于理解的 T-SQL


    # 1. 数据类型


    数据类型是构建高效、高性能 `T-SQL` 的基础构件。虽然许多数据类型要么是数字，要么是字符串，但也存在多种不属于这两类的数据类型。选择正确的数据类型时，理解数据类型是什么以及何时使用它至关重要。


    ## 数字数据类型


    尽管数字看起来可能都一样，但 `T-SQL` 将数字划分为不同类型的数据类型。这些数据类型可以包括整数或带小数点的数字。数字也根据精确或近似进行分类。在执行数学计算时，了解如何处理各种数字数据类型对于确保应用程序按预期处理数据至关重要。


    虽然从每个类别中选择最常见的数据类型可能最简单，但在某些特定情况下，最好分析将要存储的数据并选择更合适的选项。选择数据类型时，需要考虑多种因素。最重要的一步是弄清楚将存储什么类型的数据。接下来逻辑上的步骤是考虑数据将如何使用和存储。此外，理解
    `T-SQL` 如何处理涉及各种数据类型的计算也很重要。


    ### 精确数字数据类型


    有些情况下，数字的值是确定且已知的。这类数字可称为精确数字。一些例子包括真或假、销售 units 数量、折扣百分比或美元和美分。编写优质 `T-SQL` 的关键之一是为给定字段选择正确的数据类型类别。在某些情况下，某个类别有多个可用的数据类型。


    在考虑使用何种数据类型时，您需要思考该数据类型的用途。这将有助于在确定应使用哪种数据类型时提供更清晰的思路。您需要考虑与每种数据类型相关的优点和缺点。您还需要考虑
    `SQL Server` 是否必须因为此数据类型与其他数据类型在计算中使用而执行任何隐式转换。最后要考虑的是该数据类型在 `SQL Server` 中的存储方式。

    '
- fmt: '## BIT


    `BIT`数据类型源自短语“二进制数字”。因此，`BIT`数据类型只能存储两个值之一。在SQL Server的情况下，还有第三个选项与未知值相关。这第三个选项被称为`NULL`。因此，`BIT`数据类型唯一允许的值是`0`、`1`和`NULL`。这导致`BIT`数据类型只能使用最小的一组可用值。


    `BIT`数据类型非常适用于“非此即彼”适用的数据类型。存储的信息可以是真或假、开或关、是或否。在真或假的情况下，`BIT`类型可用于指示数据记录是否已成功转换。使用`BIT`数据类型指示开或关的常见用途涉及指示某个特定功能是否已启用。一个表示是或否值的例子是记录客户选择是否接收公司的营销信息。


    使用`BIT`数据类型的一个挑战是确保以促进良好数据库设计的方式使用它们。这意味着有时在选择`BIT`数据类型时需要考虑整体目的。例如，指示某项是否具有特定特征似乎可能是`BIT`数据类型的一个好用途。一个例子可能是表中像`IsVegetarian`这样的列。然而，重新设计数据库以在另一个表中记录这些属性可能更好。`BIT`可用于指示事务的成功状态。然而，通常有更多的状态需要记录一段时间内事务的状态。如果随时间记录状态变化很重要，那么使用`BIT`来记录事务是否成功可能不是最佳选择。


    `BIT`数据类型的一个优点是数据库中保存`BIT`值所需的总存储空间。由于一个字节中有8位，这在数据库记录存储中同样适用。表中每8个`BIT`列，其值都存储在一个字节中。如果表中有9到16个`BIT`列，所有`BIT`值将总共存储在2个字节中。所需存储空间如此之少，这意味着一个包含多达8个`BIT`列和100万条记录的表在数据库中仅使用1MB的空间。


    ## TINYINT, SMALLINT, INT, BIGINT


    SQL Server还允许你存储整数，即没有小数或分数值的数字。这些数字被称为整数。以整数存储的数据的一个例子是给定项目的数量。SQL Server中可以存储几种类型的整数值。第一种整数类型是`TINYINT`。`TINYINT`值可以包含0到255之间的任何整数值。由于此数据类型的大小有限，它可能对有限的配置类型或位置数量有用。此数据类型类似于`BIT`数据类型，但其范围稍宽。此数据类型也可用于配置系统中的状态类型或对象类别。`TINYINT`非常适合存储这些状态类型，因为许多应用程序不需要超过256种状态。


    既然我们已经介绍了`TINYINT`，让我们讨论一下`SMALLINT`的可能性。`SMALLINT`的范围涵盖大约70,000个可能的值。有了这个可用范围，你需要考虑在256到65,435个唯一值之间你想要存储什么样的值。`SMALLINT`的范围从`-32,768`开始，到`32,767`结束。这种数据类型对于记录每一次活动的日志表来说并不实用。许多数据库或数据表在几年的时间里可能有超过70,000条事务或记录。这可能导致此数据类型不适用于这些表。然而，也可能有其他表非常适合`SMALLINT`数据类型。


    如果你的数据表事务活动不高，但会在一段时间内增长，那么`SMALLINT`数据类型可能有益。了解你的业务将帮助你确定`SMALLINT`是否是存储该值的正确数据类型。


    如果你要创建一个表来持续为应用程序添加功能，你可能希望存储一条记录，指示向应用程序添加的每个新功能。一个例子是功能标志。你的应用程序在其生命周期内很可能会有超过256个增强功能。你可能还想存储应用程序的配置值。在表中存储这些配置值可能会受益于`SMALLINT`数据类型。


    接下来是整数或`INT`。这是整数数据类型最常用的。许多数据库专门使用这种数字来跟踪任何类型的整数。其中一个原因是其整个范围涵盖了大约54亿条记录。`INT`数据类型的范围从`-2,147,483,648`到`2,147,483,647`。然而，当创建许多数据表时，它们的标识列通常从整数`1`开始，或称为种子。这导致表被限制为大约21.5亿个唯一标识。如果你认为你的表将需要超过21.5亿个唯一标识记录，你可能希望从可能的最小数字`-2,147,483,648`开始标识。


    这通常是你需要执行一些数学计算的地方。一些企业每秒处理几百笔交易。其他企业每秒处理高达10,000或20,000笔交易。在这两种情况下，考虑持有此事务信息的表预期将有什么样的增长都很重要。如果你的应用程序在几年内每秒有数百笔交易，那么存储的记录数量将比应用程序在相同时间段内每秒有数万笔交易要少得多。


    ## DECIMAL/NUMERIC


    既然我们已经讨论了各种整数，我们应该考虑如何处理需要小数的数字。在某些情况下，你会需要小数位。其中一些情况涉及使用美元和美分，其他时候你需要小数位来进行精确测量。这些场景中有几个选项可用。


    首先有`DECIMAL`选项，或者也称为`NUMERIC`数据类型。此值不保存任何货币信息；但是，它会记录小数位。这些小数位可以通过指明应存储的总位数和小数点右边的位数来指定。你会发现`DECIMAL`或`NUMERIC`数据类型对于几乎所有涉及数字的数据类型都是可接受的。这包括通用数字、小数、测量值和货币值。


    考虑到`DECIMAL`类型可以表示多种不同类型的数字，我们应该更仔细地研究这种数据类型。`DECIMAL`和`NUMERIC`之间没有区别。它们在SQL
    Server中是相同的数据类型。`DECIMAL`数据类型有一些特定的术语。构成`DECIMAL`数据类型的值是精度和小数位数。精度与`DECIMAL`数据类型中保存的总位数相关。小数位数是指存储在小数点右边的位数。'
  raw: '#### BIT


    The term BIT is derived from the phrase binary digit. Therefore, the BIT data
    type can only store one of two values. In the case of SQL Server, there is a third
    option relating to unknown values. This third option is known as NULL. As such,
    the only values allowed with the BIT data type are 0, 1, and NULL. This consequently
    causes the BIT data type to only allow the smallest set of available values.


    The BIT data type is great for data types where “either X or Y” is applicable.
    The information stored can be true or false, on or off, and yes or no. In the
    case of true or false, this BIT type could be used to indicate if a data record
    was translated successfully. A common use of indicating on or off with the BIT
    data type would involve indicating if a certain feature is enabled. One example
    of a yes or no value would be to record a customer’s decision to opt in to receive
    marketing information from a company.


    One of the challenges with the BIT data type is making sure to use them in a way
    that promotes good database design. This means there are times when you need to
    consider the overall purpose when selecting the BIT data type. For instance, it
    may seem like indicating whether an item has specific characteristics may be a
    good use of the BIT data type. An example could be a column in a table like IsVegetarian.
    However, it may be better to consider redesigning the database to record those
    attributes in another table. A BIT can be used to indicate a successful status
    for a transaction. However, there is often more status to record the state of
    the transaction in over a period of time. If recording status changes over time
    is important, then using a BIT to record if a transaction is successful may not
    be the best option.


    An advantage of the BIT data type is the overall storage space required when saving
    BIT values in a database. As there are 8 bits in a byte, the same holds true for
    storing records in a database. For each 8 BIT columns in a table, those values
    are all stored a single byte. If there were 9 to 16 BIT columns in the table,
    all the BIT values would be stored in a total of 2 bytes. This small amount of
    storage space required indicates that it would take one table with up to 8 BIT
    columns and 1 million records to use one MB of space in the database.


    #### TINYINT, SMALLINT, INT, BIGINT


    SQL Server also allows you to store whole numbers, that is, numbers that do not
    have decimals or fractional values. These numbers are known as integers. One example
    of data stored as integers can be quantities of a given item. There are several
    types of integer values that can be stored within SQL Server. The first integer
    type is TINYINT. The TINYINT value can contain any integer value between 0 and
    255\. Due to the limited size of this data type, this may be useful for limited
    configuration types or number of locations. This data type is like the BIT data
    type, but this data type has a slightly wider range. This data type would also
    be useful to configure the types of statuses in a system or categories of objects.
    The TINYINT is good for storing these status types as many applications do not
    need more than 256 statuses.


    Now that we’ve covered TINYINT, let’s discuss the possibilities of SMALLINT. The
    range of SMALLINT covers approximately 70,000 possible values. With this range
    available, you want to consider what sorts of values you would want to have between
    256 and 65,435 unique values. The range for the SMALLINT starts at –32,768 and
    ends at 32,767\. This data type would not be useful for a table that logs every
    single activity that happens. Many databases or data tables may have more than
    70,000 transactions or records over the course of several years. This may cause
    this data type to be unsuitable for those tables. However, there may be other
    tables where the SMALLINT data type is ideal.


    If you have data tables that do not experience high transactional activity but
    will be growing for some time, the SMALLINT data type may be beneficial. Understanding
    your business will help you determine if the SMALLINT is the correct data type
    for that value being stored.


    If you were to create a table to continue to add functionality to your applications,
    you may want to store a record indicating each new piece of functionality was
    to your application. An example of this can be feature flags. Your application
    will likely have more than 256 enhancements over the life of the application.
    You may also want to store configuration values for the application. Storing these
    configuration values in a table may benefit from the SMALLINT data type.


    Moving on to integers or INT. This is the most frequently use of the whole number
    data types. Many databases use this number exclusively for any sort of whole number
    that is being tracked. One of the reasons for this is the entire range covers
    about 5.4 billion records. The INT data type covers the range from −2,147,483,648
    to 2,147,483,647\. However, when many data tables are created, their identity
    column is often started, or seeded, at the integer 1\. This causes the table to
    be limited to approximately 2.15 billion unique identities. If you believe that
    your table will need more than 2.15 billion unique identity records, you may want
    to start the identity with the lowest number possible, –2,147,483,648.


    This is often where you may need to perform some mathematical calculations. Some
    businesses process a couple hundred transactions per second. Other businesses
    process upward of 10,000 or 20,000 transactions per second. In both cases it’s
    important to consider what kind of growth will be expected in the tables holding
    this transactional information. If your application has hundreds of transactions
    per second over several years, the number of records stored will be much smaller
    than if the application has tens of thousands of transactions per second for the
    same time period.


    #### DECIMAL/NUMERIC


    Now that we have discussed various integers, we should consider what to do with
    numbers that require decimals. There are various cases where you are going to
    want decimal places. Some of these cases involve using dollars and cents, and
    other times you are going to need decimal places for precision in measurements.
    There are a couple of options available in these scenarios.


    First there is the option for DECIMAL or alternatively it is called a NUMERIC
    data type. This value does not save any currency information with it; however,
    it does record decimal places. These decimal places can be specified by indicating
    both the total number of digits that should be stored and the number of digits
    to the right of the decimal point. You will find that the DECIMAL or NUMERIC data
    type is acceptable for almost all data types involving numbers. This includes
    general-purpose numbers, decimals, measurements, and money values.


    Considering that the DECIMAL type can represent multiple different types of numbers,
    we should take a closer look at this data type. There is no difference between
    DECIMAL and NUMERIC. They are the same data type in SQL Server. There are some
    specific terms for the DECIMAL data type. The values that make up a DECIMAL data
    type are precision and scale. Precision relates to the total number of digits
    that are saved in a DECIMAL data type. Scale refers to the number of digits that
    are stored to the right of the decimal point.'
  trans: '## BIT


