    \ T-SQL 在数据中查找特定测试用例并非你唯一的选择。你可以手动插入测试数据并对插入的记录执行测试。这种方法可以让你确定你所测试代码的最佳场景。在大多数情况下，这些样本数据不会保留在一个集中位置。每次测试新功能时，你可能仍需重写特定的示例。\n\
