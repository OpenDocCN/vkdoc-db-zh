- fmt: '## Multi-statement Table-Valued Functions


    When there are times that you must have both code reuse and the ability to update
    SQL Server, then it may be time to consider using multi-statement table-valued
    functions. I would caution you to carefully consider whether this approach is
    necessary as these types of functions can end up having a tremendous performance
    impact.


    Multi-statement table-valued functions are not just inline table-valued functions
    that can do more. They also cannot be inlined with the query execution. This signifies
    that the query optimizer does not attempt a best guess when using these types
    of functions. As a matter of fact, prior to SQL Server 2014, multi-statement table-valued
    functions were estimated to have one row. For SQL Server 2014 and SQL Server 2016,
    the estimated number of rows was 100. However, as of SQL Server 2017, there is
    a possibility that SQL Server will get a proper estimate for the rows returned
    by using interleaved execution.


    What will happen is that the optimization process will pause to allow execution
    so that the cardinality estimator can determine the actual number of rows that
    should be returned by the multi-statement table-valued function. While interleaved
    execution is part of the new adaptive query processing, there are some limitations
    to keep in mind. If there is a `CROSS APPLY` used in conjunction with a multi-statement
    table-valued function, then the interleaved functionality will not work. It has
    also been reported that if there is a `WHERE` clause inside the multi-statement
    table-valued function that depends on an input parameter, then interleaved execution
    may also not apply.


    To get a better idea of how this all works, I will create the multi-statement
    table-valued function in `Listing 2-17`. I will create this function in SQL Server
    2012, SQL Server 2017, and SQL Server 2019.


    ```sql

    CREATE FUNCTION dbo.IngredientCostByIngredientID (@IngredientID INT)

    RETURNS @Output TABLE

    (

    IngredientName     VARCHAR(25),

    IngredientCost     DECIMAL(6,3)

    )

    AS

    BEGIN

    INSERT INTO @Output (IngredientName, IngredientCost)

    SELECT ing.IngredientName, ingcos.Cost

    FROM dbo.Ingredient ing

    INNER JOIN dbo.IngredientCost ingcos

    ON ing.IngredientID = ingcos.IngredientID

    WHERE ing.IngredientID = @IngredientID;

    RETURN;

    END;

    GO

    ```

    `Listing 2-17` Multi-statement Table-Valued Function


    Now that this function has been created, I can write a script to test the performance
    of this function in the various versions of SQL Server. The following code is
    the T-SQL written and executed as shown in `Listing 2-18`.


    ```sql

    SELECT rec.RecipeName, inglis.IngredientName, inglis.IngredientCost

    FROM   dbo.Recipe rec

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    CROSS APPLY dbo.IngredientCostByIngredientID(ing.IngredientID) inglis

    WHERE ing.IngredientName = ''Italian Sausage'';

    ```

    `Listing 2-18` Code to Execute Function


    Next, I will test the execution plans and relative performance across the various
    versions of SQL Server. In `Figure 2-7`, I will show the execution plan in SQL
    Server 2012 by using the compatibility mode 110.


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig7_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig7_HTML.jpg)


    `Figure 2-7` Execution Plan for Compatibility Mode 110


    The execution plan does not appear to have too many different operators. The table-valued
    function is represented as a single operator. The properties for the table-valued
    function are shown in `Figure 2-8`.


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig8_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig8_HTML.jpg)


    `Figure 2-8` Properties for Table-Valued Function in Compatibility Mode 110


    `Figure 2-8` shows the estimated number of rows as 1. Additional enhancements
    were made to the database engine in SQL Server 2017. The estimation for the number
    of rows for a table-valued function was improved. Using the compatibility mode
    140 for SQL Server 2017, you can see the execution plan generated in `Figure 2-9`.


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig9_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig9_HTML.jpg)


    `Figure 2-9` Execution Plan for Compatibility Mode 140


    `Figure 2-9` looks like the same as `Figure 2-7`. The only visible differences
    are on the percentages displayed for some of the operators. The percentage variance
    is not significant enough to affect the performance of the execution of this query
    in both compatibility modes 110 and 140. You can see the execution times in `Table
    2-2`.


    `Table 2-2` Comparing Execution Time for Multi-statement Table-Valued Function
    with Compatibility Modes 110 and 140


    | Compatibility Mode | CPU Time | Elapsed Time |

    | --- | --- | --- |

    | 110 | 1172 milliseconds | 1529 milliseconds |

    | 140 | 1140 milliseconds | 1523 milliseconds |


    The times displayed here are close enough to be considered comparable. While the
    execution plans and times are similar, we can also check and see if the properties
    on the table-valued function are the same. In `Figure 2-10`, we can see the properties
    associated with the table-valued function.


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig10_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig10_HTML.jpg)


    `Figure 2-10` Properties for Table-Valued Function in Compatibility Mode 140


    You can see that the estimated number rows in `Figure 2-10` is 100. This is different
    from the estimated number of rows shown in `Figure 2-8`. You can also see that
    the estimated operator cost and estimated subtree cost have all changed slightly.


    Now that we have run the query from `Listing 2-18`, we can now run the same query
    using the optimizer from SQL Server 2019. Before we do this, we will need to change
    the compatibility level back to 150 and clear the execution plan cache. Once this
    has been done and we execute the query from `Listing 2-18`, we get an execution
    plan like the one in `Figure 2-11`.


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig11_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig11_HTML.jpg)


    `Figure 2-11` Execution Plan for Compatibility Mode 150


    The execution plan in `Figure 2-11` is different from either of the execution
    plans in `Figure 2-7` and `Figure 2-9`. We can also see that the `Index Scan`
    on one of the non-clustered indexes from the `dbo.RecipeIngredient` table takes
    the majority of time to execute. As expected, this is the same operator that takes
    the majority of time in the execution plans for `Figure 2-7`, `Figure 2-9`, and
    `Figure 2-11`. We can also compare the elapsed and CPU times across compatibility
    levels 110, 140, and 150. This will allow us to compare the expected execution
