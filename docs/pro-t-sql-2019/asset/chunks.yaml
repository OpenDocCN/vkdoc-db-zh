    正如你所见，`UNION ALL` 会返回两行完全相同的数据。在某些场景下，这两种情况都可能符合需求。


    有时查询逻辑可能非常复杂，以至于我无法快速理解所有的 T-SQL 代码，或者有时我正在调试非常庞大的数据集。如果我编写一个更简单的查询来返回我想要的所有数据，我经常会在这两个查询之间写一个
    `INTERSECT` 来找出记录匹配的地方。使用与之前相同的通用查询，我想向你展示使用 `INTERSECT` 与使用其他选项时返回的数据会是什么样子。在清单
    [5-3](#480547_1_En_5_Chapter.xhtml#PC3) 中，你可以看到用于查找两个查询交集的查询。


    ```sql

    SELECT IngredientID, IngredientName

    FROM dbo.Ingredient

    WHERE IngredientName LIKE ''%Tomato%''

    INTERSECT

    SELECT IngredientID, IngredientName

    FROM dbo.Ingredient

    WHERE Measurement = ''Ounces''

    ```

    清单 5-3 两个查询的交集（INTERSECT）


    我们已经从前面的图中知道每个单独查询返回的结果。上述 T-SQL 代码的实际结果如表 [5-24](#480547_1_En_5_Chapter.xhtml#Tab24)
    所示。


    **表 5-24** 表 [5-21](#480547_1_En_5_Chapter.xhtml#Tab21) 和 [5-22](#480547_1_En_5_Chapter.xhtml#Tab22)
    结果的交集


    | IngredientID | IngredientName |

    | --- | --- |

    | 4 | Tomato Paste |


    此外，如果我试图查找缺失的记录或验证是否存在匹配记录，我会在两个查询之间使用 `EXCEPT`。清单 [5-4](#480547_1_En_5_Chapter.xhtml#PC4)
    展示了如果你试图从一个查询的结果中排除另一个查询的结果时，T-SQL 代码的样子。


    ```sql

    SELECT IngredientID, IngredientName

    FROM dbo.Ingredient

    WHERE IngredientName LIKE ''%Tomato%''

    EXCEPT

    SELECT IngredientID, IngredientName

    FROM dbo.Ingredient

    WHERE Measurement = ''Ounces''

    ```

    清单 5-4 两个查询的差集（EXCEPT）


    在这个例子中，第一个查询返回所有食材名称包含单词“tomato”的结果。然而，`EXCEPT` 语句表明，如果一条记录同时出现在第一个和第二个查询中，那么该记录将从结果集中排除。此查询的结果在表
    [5-25](#480547_1_En_5_Chapter.xhtml#Tab25) 中。


    **表 5-25** 表 [5-21](#480547_1_En_5_Chapter.xhtml#Tab21) 和 [5-22](#480547_1_En_5_Chapter.xhtml#Tab22)
    结果的差集


    | IngredientID | IngredientName |

    | --- | --- |

    | 2 | Tomato Sauce |

    | 3 | Diced Tomatoes |


    使用 `EXCEPT` 语句可能不是从数据集中排除结果的首选方法，但这是我更习惯使用的方法。这就是 T-SQL 代码的益处和挑战所在，对于几乎任何场景，编写
    T-SQL 代码几乎肯定不止一种方法。你编写数据库代码的原因将决定你在编写代码时拥有的灵活度。如果你是为单次执行编写查询，你或许可以使用一种效率较低的方法来访问这些数据。然而，如果你是为某个应用程序编写代码，你将需要平衡
    T-SQL 代码的编写方式，使其既高效又易读。


    ## 使用数据集插入数据


    清单 [5-5](#480547_1_En_5_Chapter.xhtml#PC5) 是一个展示如何在插入数据时使用数据集的例子。


    ```sql

    CREATE TABLE #TempIngredientNutrition

    (

    IngredientID      INT         NOT NULL,

    IngredientName    VARCHAR(25) NOT NULL,

    Calories          TINYINT     NOT NULL,

    Sugar             TINYINT     NOT NULL,

    Fiber             TINYINT     NOT NULL,

    Protein           TINYINT     NOT NULL

    )

    INSERT INTO #TempIngredientNutrition

    (

    IngredientID,

    IngredientName,

    Calories,

    Sugar,

    Fiber,

    Protein

    )

    SELECT

    ing.IngredientID,

    ing.IngredientName,

    nutr.Calories,

    nutr.Sugar,

    nutr.Fiber,

    nutr.Protein

    FROM dbo.Ingredient ing

    INNER JOIN dbo.IngredientNutrition nutr

    ON ing.IngredientID = nutr.IngredientID

    ```

    清单 5-5 以集合形式插入数据


    如清单 [5-6](#480547_1_En_5_Chapter.xhtml#PC6) 所示，如果逐条记录插入，`INSERT` 语句看起来会是这样。


    ```sql

