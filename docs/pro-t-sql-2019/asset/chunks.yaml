    of code would you regularly go to if you needed to deploy these changes. This
    branch is called the master. Any time you want to make changes to the master branch,
    it is generally best to create a new branch to write your T-SQL code. This allows
    the main branch to remain unaffected by code that is in development and is not
    ready to be deployed. In this way, the master branch can match the code that is
    currently deployed to Production.


    When you create a branch, this takes a copy of the current repository. You can
    work with this copy and make any changes necessary. When using Git, you may decide
    that each person will work off their own branch. This helps everyone develop their
    code individually without being affected by someone else’s code. While this is
    a benefit for development and testing a specific piece of functionality, this
    is also where source control can get complicated.


    As these check-ins happen per branch, you may find yourself in a situation where
    you need to deploy two different branches during the same deployment. This is
    where you will want to try to combine this code. In order to combine this code
    together, you want to take the changes in the branch and add the changes back
    to the master branch. To combine a feature branch to the master branch is called
    a merge. One aspect that can happen as part of this merge is called the conflict.
    This can happen when many people have been working on the same database object
    over the same period of time or there has been a delay in merging a previous feature
    branch with the master branch. Make sure to work with your development teams to
    get a better understanding of how to avoid merge conflicts and how they can be
    resolved.


    One thing that happens more often than some of us would like to admit is when
    code is deployed and then does not work as intended. I have been in situations
    where those bugs were found during the deployment. Other times those bugs are
    not found until days, weeks, or months after a deployment. In either scenario,
    the key is to figure out how to quickly restore the database to a more functional
    state. One of the discussions I had with developers and QA was how to handle this
    on deployment night. A bug can be manually fixed by a T-SQL script. Depending
    on how you manage your database code deployments, it is possible that this bug
    fix can be undone in a future deployment. If you put the bug fix into source control,
    you can make sure this bug fix will not be undone going forward.'
  trans: '

    就像在 `TFS` 中的签到一样，你也可以在 `Git` 中提交代码。这两种操作都会保存对你当前所用分支所做的更改。虽然功能看似相同，但根据你使用的版本控制软件以及与该软件配合使用的工具，它们的工作方式可能有所不同。`Git`
    和 `GitHub` 允许你在更改被永久提交到仓库之前保存它们。暂存更改是指你保存那些不立即提交到仓库的更改的操作。提交前的暂存更改可以通过命令行完成。


    当我们讨论如何管理代码签入和分支时，其设计是基于我们内部的开发流程、脚本审查流程和部署周期。我们希望开发者能够频繁地签入 `T-SQL` 代码，并使这些代码在其开发环境中可用。我们也希望确保数据库管理员在代码部署到
    QA 环境之前有时间进行审查。我们希望确保 QA 团队不会将时间浪费在测试未经批准的 `T-SQL` 代码上。


    由于开发和 QA 之间存在这种隔断，我们选择专门为经过脚本审查并获批的代码创建一个分支。作为脚本审查流程的一部分，数据库管理员负责合并代码。这个流程存在一些挑战。尽管所有代码本应在同一个
    Sprint 内部署，但有时项目合并的顺序与它们在开发分支中的创建顺序不一致。这导致文件被覆盖。在团队拆分、开发周期错开之后，所有这些都变得更加难以管理。


    随着越来越多的公司希望采用敏捷、看板、Scrum、持续集成或持续交付中的任何组合，拥有一个更灵活的源代码控制解决方案变得越来越重要。这个新解决方案需要允许多个不同的团队同时处理同一代码库，而不会对部署产生负面影响。这正是
    `Git` 流行起来的原因。


    使用 `Git` 的理念在于，你可以更好地控制代码合并的方式和时机。在我的公司，每个团队很少与其他团队开发相同的应用程序，因此在代码管理方面的冲突很少。然而，几乎每个应用程序都依赖于共享数据库。此外，数据库团队经常在相同的数据库上工作。不同团队之间也存在不同的部署周期。这正是你可以看到
    `Git` 强大之处的地方。


    不幸的是，使用源代码控制仍然存在挑战。这些挑战对于 `TFS`、`Git` 或任何其他版本控制软件都存在。使用版本控制在历史上并非数据专业人士的常见做法。虽然做出这种改变有其好处，但在使用和管理源代码控制方面也存在学习曲线。正如许多事情一样，顺利的情况工作良好，但当涉及到更复杂的场景时，源代码控制可能会变得让人难以招架。


    `Git` 中有些功能需要比使用 `TFS` 更多的培训。正是这些功能使得 `Git` 的源代码控制更加灵活。因此，虽然增强的功能很好，但它也会使软件的使用更加复杂。有一个主仓库，可以在其中保存一组代码。如果你使用
    `SQL Server Data Tools`，你可以选择是每个数据库项目拥有自己的仓库，所有数据库共享同一个仓库，还是所有应用程序和数据库共享同一个仓库。这些决策不仅基于偏好和期望的功能。正如你将在第
    12 章看到的，你组织仓库的方式也将决定你的代码如何部署。


    在仓库内部，存在一个或多个分支的概念。应该有一个主分支。可以把它想象成，如果你需要部署这些更改，你会定期去查看哪一组代码。这个分支被称为 `master`。任何时候你想对
    `master` 分支进行更改，通常最好创建一个新分支来编写你的 `T-SQL` 代码。这样可以确保主分支不受正在开发且尚未准备好部署的代码影响。通过这种方式，`master`
    分支可以与当前部署到生产环境的代码保持一致。


    当你创建一个分支时，它会获取当前仓库的一个副本。你可以使用这个副本并进行任何必要的更改。使用 `Git` 时，你可以决定每个人都在自己的分支上工作。这有助于每个人独立开发代码，而不受他人代码的影响。虽然这对于开发和测试特定功能是一个好处，但这同时也是源代码控制可能变得复杂的地方。


    由于这些签入是按分支发生的，你可能会遇到需要在同一个部署中部署两个不同分支的情况。这时你会希望尝试合并这些代码。为了将这些代码合并在一起，你需要获取分支中的更改，并将这些更改添加回
    `master` 分支。将一个功能分支合并到 `master` 分支的操作称为 `merge`。作为这个 `merge` 过程的一部分可能发生的一个方面称为冲突。当许多人在同一时间段内处理同一个数据库对象，或者之前的功能分支与
    `master` 分支的合并被延迟时，就可能发生冲突。请务必与你的开发团队合作，以更好地理解如何避免合并冲突以及如何解决它们。


    一件发生得比我们有些人愿意承认的更频繁的事情是，代码部署后未能按预期工作。我遇到过在部署期间就发现那些缺陷的情况。其他时候，这些缺陷直到部署后几天、几周或几个月才被发现。无论哪种情况，关键是要找出如何快速将数据库恢复到功能更佳的状态。我曾与开发人员和
    QA 讨论过在部署当晚如何处理这个问题。缺陷可以通过 `T-SQL` 脚本来手动修复。根据你管理数据库代码部署的方式，这个缺陷修复有可能在未来的部署中被撤销。如果你将缺陷修复放入源代码控制，你可以确保这个修复在将来不会被撤销。

    '
- fmt: '## 回滚策略与热修复方法


    因此，我们决定采用所谓的“前滚”策略。如果我们能快速找到并解决问题，那么我们会将这些更改签入源代码管理，并通过各个环境部署上去。这种前滚策略只允许在部署当晚采用。当我们采用该策略时，其概念是部署所有已合并到主分支的代码。如果你选择部署的数据库项目版本不是最新版本，你将无法使用此方法。


    我们还采用了一种使用热修复的方法。这些是由于应用程序功能严重缺失而需要尽快进行的更改。由于开发中可能存在各种项目，我们不能直接部署最新的数据库代码。在这些情况下，我仍然会将修改后的`T-SQL`代码签入源代码管理。该代码可能已部署到开发环境并在我们的`QA`环境中测试过，但代码将手动部署到生产环境。其概念是下次部署数据库代码时，该数据库对象将已经存在。


    设计如何保存数据库代码还涉及与开发、`QA`和发布管理团队的沟通。现有的各种方法各有优缺点。你可以将所有数据库项目与所有应用程序代码保存在同一个解决方案中。虽然这可能会使你的项目构建时间更长，但如果创建了正确的关系，你可以确保数据库的更改不会影响应用程序的功能。根据公司中存在的应用程序数量，这可能是一项艰巨的任务。也可以选择将所有数据库保存在同一个解决方案中。如果你有跨数据库依赖关系，此方法将有助于保护你的数据库。当你对一个数据库对象进行更改，并且不确定这些更改是否会破坏另一个数据库的功能时，这尤其有用。最后一个选项是每个数据库创建一个解决方案。此方法的优点是可以独立开发每个数据库。缺点是，你可能对数据库所做的更改会破坏另一个数据库的功能。


    在将第一个数据库置于源代码管理之前，我建议与公司的其他团队讨论本节中的主题。你需要确保在编写、测试和保存数据库代码更改方面，每个人都达成一致。在如何修复已部署的数据库代码方面，也要让其他人参与进来。同时考虑你希望你的数据库项目之间以及它们与你的应用程序如何交互。一旦你考虑了所有这些因素，就可以创建数据库项目了。


    ## 设置源代码管理


    既然你已决定为数据库实施源代码管理，并且已经就如何设置数据库项目制定了一些通用准则，那么你现在可以设置源代码管理了。首先要做的是让你使用的`IDE`连接到源代码管理。连接到版本控制后，你需要创建一种方式来存储数据库的源代码管理。在有了数据库源代码管理的位置后，你需要弄清楚如何制作和保存数据库代码的更改。


    在本节中，我将使用`Visual Studio 2017`、`SQL Server Data Tools`、`Git`和`GitHub`将数据库纳入源代码管理。如果你使用的是`Visual
    Studio 2015`或`2017`，你将无需任何额外步骤即可连接到`TFS`。如果你想在这两个版本的`Visual Studio`中使用`Git`和`GitHub`，则需要手动安装`GitHub`扩展。截至本文撰写时，以下`URL`可以指导你完成此过程：`https://social.technet.microsoft.com/wiki/contents/articles/38935.visual-studio-2017-install-and-use-GitHub-extension.aspx`。你可以通过使用团队资源管理器将`Visual
    Studio`连接到版本控制，如图`10-1`所示。


    ![`../images/480547_1_En_10_Chapter/480547_1_En_10_Fig1_HTML.jpg`](images/480547_1_En_10_Chapter/480547_1_En_10_Fig1_HTML.jpg)


    图`10-1`


    将`Visual Studio`连接到版本控制


    在此示例中，我已将`Git`扩展添加到`Visual Studio`，并准备连接到`GitHub`。如果你还没有`GitHub`账户，可以通过选择“注册”来创建一个。就我而言，我已经有一个`GitHub`账户。一旦我选择“连接…”，我会得到一个弹出窗口，如图`10-2`所示。


    ![`../images/480547_1_En_10_Chapter/480547_1_En_10_Fig2_HTML.jpg`](images/480547_1_En_10_Chapter/480547_1_En_10_Fig2_HTML.jpg)


    图`10-2`


    创建`Git`仓库


    在此步骤中，我正在创建一个`Git`仓库并将其连接到我的`GitHub`账户。我决定将仓库命名为`MenuDatabase`。我给仓库的描述是“`Database
    project for Menu`”。我还指定了本地代码仓库应保存的本地路径。我为`Git`忽略文件选择了`Visual Studio`的默认值。我还选择了`GNU
    General Public License v2.0`作为许可证。详细讨论`Git`忽略文件或可用的许可选项超出了本书的范围。我指定的最后一部分是私有仓库。公共仓库和私有仓库的主要区别在于你是否希望其他人能够访问、下载和对你的代码提出建议。


    现在我已经创建了一个新仓库并将其链接到我的`GitHub`账户，我可以看到如图`10-3`所示的信息。


    ![`../images/480547_1_En_10_Chapter/480547_1_En_10_Fig3_HTML.jpg`](images/480547_1_En_10_Chapter/480547_1_En_10_Fig3_HTML.jpg)


    图`10-3`


    团队资源管理器中的仓库


    你可以在团队资源管理器中看到，我既有一个在`GitHub`上的仓库，也有一个本地`Git`仓库。`Visual Studio`会建议你可能想要安装的一些第三方工具。对话框窗口如图`10-4`所示。


    ![`../images/480547_1_En_10_Chapter/480547_1_En_10_Fig4_HTML.jpg`](images/480547_1_En_10_Chapter/480547_1_En_10_Fig4_HTML.jpg)


    图`10-4`


    为`GitHub`安装第三方工具


    你应该只需要下载一次这些第三方工具。安装第三方工具时，请检查并确认它们来自可信来源。安装此第三方工具将使你能够访问`GitHub`操作，如图`10-5`所示。'
  raw: 'As a result, we concluded to adopt what we called a rollforward strategy .
    If we could quickly find and resolve the issue, then we would check those changes
    into source control and deploy them up through the environments. This rollforward
    strategy was only permitted on the night of the deployment. When we adopted the
    strategy, the concept was that we were going to deploy all code that had been
    merged to a master branch. If you choose to deploy a different version of the
    database project than the most recent version, you will not be able to use this
    method.


    We also adopted a method to use a hotfix. These were changes that were needed
    as soon as possible due to a critical loss in functionality of an application.
    As there may be various items in development, we could not go ahead and just deploy
    the most recent database code. In these cases, I would still check the modified
    T-SQL code into source control. That code may have been deployed to development
    and tested in our QA environment, but the code would be manually deployed to production.
    The concept being that the next time the database code was deployed, this database
    object would already exist.


    Designing how to save database code also involves conversations with the development,
    QA, and release management teams. There are pros and cons to the various methods
    that exist. You can save all of your database projects in the same solution with
    all of your application code. While this may take longer for your projects to
    build, if you create the right relationships, you can be certain that changes
    in your database will not affect functionality of your applications. Depending
    on the number of applications that exist in your company, this may be a difficult
    task. There is also the option of having all your databases saved in the same
    solution. If you have crossed database dependencies, this method will help protect
    your databases. This is particularly helpful when you make changes to one database
    object, and you are not certain if these changes will break functionality in a
    different database. The final option is to create one solution per database. The
    advantage of this method is that you can develop each database independently.
    The downside is that you may make changes to a database that breaks functionality
    for another database.


    Prior to setting up your first database in source control, I would recommend discussing
    the topics in this section with the other teams at your company. You will want
    to make sure everyone is in agreement when it comes to writing, testing, and saving
    changes to your database code. Get others on board when it comes to how to fix
    database code once it has been deployed. Also consider how you want your database
    projects to interact with one another and your applications. Once you take all
    of this under consideration, you are ready to create a database project.


    ## Setting Up Source Control


    You are ready to set up source control now that you decided you would like to
    implement source control for your database, and you figured out some general guidelines
    on how you want to set up your database projects. One of the first things to do
    is get whatever IDE you are using to connect to source control. Once you are connected
    to version control, you will want to create a way to store the source control
    for your databases. You will want to figure out how to make and save changes to
    your database code after you have a place for your database source control.


    In this section, I will be using Visual Studio 2017, SQL Server Data Tools, Git,
    and GitHub to get a database into source control. If you are using Visual Studio
    2015 or 2017, you will be able to connect to TFS without any additional steps.
    If you want to use Git and GitHub in either of these versions of Visual Studio,
    you will need to install a GitHub extension manually. As of this writing, the
    following URL can walk you through this process: [`https://social.technet.microsoft.com/wiki/contents/articles/38935.visual-studio-2017-install-and-use-GitHub-extension.aspx`](https://social.technet.microsoft.com/wiki/contents/articles/38935.visual-studio-2017-install-and-use-github-extension.aspx).
    You can connect Visual Studio to version control by using Team Explorer as shown
    in Figure [10-1](#480547_1_En_10_Chapter.xhtml#Fig1).


    ![../images/480547_1_En_10_Chapter/480547_1_En_10_Fig1_HTML.jpg](images/480547_1_En_10_Chapter/480547_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Connect Visual Studio to Version Control


    In this example, I have added the Git extension to Visual Studio, and I am ready
    to connect to GitHub. If you do not already have a GitHub account, you can create
    one by selecting Sign up. In my case, I already have a GitHub account. Once I
    select Connect…, I get a pop-up window as shown in Figure [10-2](#480547_1_En_10_Chapter.xhtml#Fig2).


    ![../images/480547_1_En_10_Chapter/480547_1_En_10_Fig2_HTML.jpg](images/480547_1_En_10_Chapter/480547_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    Create Git Repository


    In this step, I am creating a Git repository and connecting it to my GitHub account.
    I have decided to name the repository MenuDatabase. I have given the repository
    the description of Database project for Menu. I also specified a local path where
    my local code repository should be saved. I have selected the default for Git
    ignore of Visual Studio. I’ve also selected a license of GNU General Public License
    v2.0\. It is beyond the scope of this book to go into detail regarding Git ignore
    or the available licensing options. The last part I specified is a private repository.
    The main difference between a public and private repository is whether you would
    like others to be able to access, download, and make suggestions regarding your
    code.


    Now that I have created a new repository and linked it to my GitHub account, I
    can see the information shown in Figure [10-3](#480547_1_En_10_Chapter.xhtml#Fig3).


    ![../images/480547_1_En_10_Chapter/480547_1_En_10_Fig3_HTML.jpg](images/480547_1_En_10_Chapter/480547_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    Repository in Team Explorer


    You can see in Team Explorer that I have both a repository on GitHub and a local
    Git repository. Visual Studio will suggest some third-party tools that you may
    want to install. The dialog window is shown in Figure [10-4](#480547_1_En_10_Chapter.xhtml#Fig4).


    ![../images/480547_1_En_10_Chapter/480547_1_En_10_Fig4_HTML.jpg](images/480547_1_En_10_Chapter/480547_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Install Third-Party Tools for GitHub


    You should only need to download these third-party tools once. When installing
    third-party tools, check and confirm that they are from a trusted source. Installing
    this third-party tools will give you access to GitHub actions as shown in Figure
    [10-5](#480547_1_En_10_Chapter.xhtml#Fig5).'
  trans: '## 回滚策略与热修复方法


    因此，我们决定采用所谓的“前滚”策略。如果我们能快速找到并解决问题，那么我们会将这些更改签入源代码管理，并通过各个环境部署上去。这种前滚策略只允许在部署当晚采用。当我们采用该策略时，其概念是部署所有已合并到主分支的代码。如果你选择部署的数据库项目版本不是最新版本，你将无法使用此方法。


    我们还采用了一种使用热修复的方法。这些是由于应用程序功能严重缺失而需要尽快进行的更改。由于开发中可能存在各种项目，我们不能直接部署最新的数据库代码。在这些情况下，我仍然会将修改后的`T-SQL`代码签入源代码管理。该代码可能已部署到开发环境并在我们的`QA`环境中测试过，但代码将手动部署到生产环境。其概念是下次部署数据库代码时，该数据库对象将已经存在。


    设计如何保存数据库代码还涉及与开发、`QA`和发布管理团队的沟通。现有的各种方法各有优缺点。你可以将所有数据库项目与所有应用程序代码保存在同一个解决方案中。虽然这可能会使你的项目构建时间更长，但如果创建了正确的关系，你可以确保数据库的更改不会影响应用程序的功能。根据公司中存在的应用程序数量，这可能是一项艰巨的任务。也可以选择将所有数据库保存在同一个解决方案中。如果你有跨数据库依赖关系，此方法将有助于保护你的数据库。当你对一个数据库对象进行更改，并且不确定这些更改是否会破坏另一个数据库的功能时，这尤其有用。最后一个选项是每个数据库创建一个解决方案。此方法的优点是可以独立开发每个数据库。缺点是，你可能对数据库所做的更改会破坏另一个数据库的功能。


    在将第一个数据库置于源代码管理之前，我建议与公司的其他团队讨论本节中的主题。你需要确保在编写、测试和保存数据库代码更改方面，每个人都达成一致。在如何修复已部署的数据库代码方面，也要让其他人参与进来。同时考虑你希望你的数据库项目之间以及它们与你的应用程序如何交互。一旦你考虑了所有这些因素，就可以创建数据库项目了。


    ## 设置源代码管理


    既然你已决定为数据库实施源代码管理，并且已经就如何设置数据库项目制定了一些通用准则，那么你现在可以设置源代码管理了。首先要做的是让你使用的`IDE`连接到源代码管理。连接到版本控制后，你需要创建一种方式来存储数据库的源代码管理。在有了数据库源代码管理的位置后，你需要弄清楚如何制作和保存数据库代码的更改。


    在本节中，我将使用`Visual Studio 2017`、`SQL Server Data Tools`、`Git`和`GitHub`将数据库纳入源代码管理。如果你使用的是`Visual
    Studio 2015`或`2017`，你将无需任何额外步骤即可连接到`TFS`。如果你想在这两个版本的`Visual Studio`中使用`Git`和`GitHub`，则需要手动安装`GitHub`扩展。截至本文撰写时，以下`URL`可以指导你完成此过程：`https://social.technet.microsoft.com/wiki/contents/articles/38935.visual-studio-2017-install-and-use-GitHub-extension.aspx`。你可以通过使用团队资源管理器将`Visual
    Studio`连接到版本控制，如图`10-1`所示。


    ![`../images/480547_1_En_10_Chapter/480547_1_En_10_Fig1_HTML.jpg`](img/480547_1_En_10_Fig1_HTML.jpg)


    图`10-1`


    将`Visual Studio`连接到版本控制


    在此示例中，我已将`Git`扩展添加到`Visual Studio`，并准备连接到`GitHub`。如果你还没有`GitHub`账户，可以通过选择“注册”来创建一个。就我而言，我已经有一个`GitHub`账户。一旦我选择“连接…”，我会得到一个弹出窗口，如图`10-2`所示。


    ![`../images/480547_1_En_10_Chapter/480547_1_En_10_Fig2_HTML.jpg`](img/480547_1_En_10_Fig2_HTML.jpg)


    图`10-2`


    创建`Git`仓库


    在此步骤中，我正在创建一个`Git`仓库并将其连接到我的`GitHub`账户。我决定将仓库命名为`MenuDatabase`。我给仓库的描述是“`Database
    project for Menu`”。我还指定了本地代码仓库应保存的本地路径。我为`Git`忽略文件选择了`Visual Studio`的默认值。我还选择了`GNU
    General Public License v2.0`作为许可证。详细讨论`Git`忽略文件或可用的许可选项超出了本书的范围。我指定的最后一部分是私有仓库。公共仓库和私有仓库的主要区别在于你是否希望其他人能够访问、下载和对你的代码提出建议。


    现在我已经创建了一个新仓库并将其链接到我的`GitHub`账户，我可以看到如图`10-3`所示的信息。


    ![`../images/480547_1_En_10_Chapter/480547_1_En_10_Fig3_HTML.jpg`](img/480547_1_En_10_Fig3_HTML.jpg)


    图`10-3`


    团队资源管理器中的仓库


    你可以在团队资源管理器中看到，我既有一个在`GitHub`上的仓库，也有一个本地`Git`仓库。`Visual Studio`会建议你可能想要安装的一些第三方工具。对话框窗口如图`10-4`所示。


    ![`../images/480547_1_En_10_Chapter/480547_1_En_10_Fig4_HTML.jpg`](img/480547_1_En_10_Fig4_HTML.jpg)


    图`10-4`


    为`GitHub`安装第三方工具


    你应该只需要下载一次这些第三方工具。安装第三方工具时，请检查并确认它们来自可信来源。安装此第三方工具将使你能够访问`GitHub`操作，如图`10-5`所示。'
