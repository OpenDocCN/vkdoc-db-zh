    Comparing the results from Table [6-2](#480547_1_En_6_Chapter.xhtml#Tab2) to Table
    [6-3](#480547_1_En_6_Chapter.xhtml#Tab3), you can see that the logical reads has
    decreased . As a result, SQL Server should access less data pages in the buffer
    pool to perform this query. This should help other applications using this instance
    of SQL Server perform better.


    While memory could be considered the most powerful and beneficial hardware available
    to SQL Server, there are monetary costs associated with memory. Memory can make
    up for T-SQL that has not been optimized. But there often comes a point where
    tables are significantly large and the queries are not fully optimized, at that
    time it is tempting to get more memory to solve the performance issues. In many
    cases, this ends up being a short-term solution to a long-term problem. On top
    of that, the cost associated with purchasing additional memory is not always an
    option for the business. One way to prevent this or resolve this issue is to look
    at the stored procedures and prepared statements in your system and look for queries
    that can be improved by reducing the logical reads associated with those queries.


    ## Considering Storage with T-SQL Design


    I have covered how to interact with the data that you plan on accessing frequently;
    you will also want to consider how the bulk of your data is stored. When it comes
    to working with storage, it is important to consider what activities cause you
    to have to access data on disk. These are the types of activities that we want
    to figure out how to minimize or improve. In some cases, when I see a significant
    amount of disk I/O, it may be a sign that there is some other part of T-SQL design
    that needs to be improved. This may be the symptom instead of the cause.


    In the previous section, I talked about data being stored in the buffer pool.
    What happens if we need data that is not in the buffer pool? This can be where
    things within SQL Server get a little more complex. SQL Server only interacts
    with data that is inside the buffer pool. Therefore, if data is needed that is
    not in the buffer pool, the first step will be to determine what data has been
    used less frequently. Then remove this data from the buffer pool. These first
    steps already give us a hint into the memory usage. If there is something that
    fills up the buffer pool unnecessarily, we now know that critical data may be
    cleared out of the buffer pool to make room for this new data.


    Once the data has been deemed to not be a priority, SQL Server can then go to
    disk and get the data that it needs. This data will then be stored in the buffer
    pool until a future point where it is deemed that this data is no longer needed.
    In terms of the speed of hardware, there is already a slowness introduced with
    this process. If the data did not exist in the buffer pool, there is also the
    time associated with determining what records need to be dropped from the buffer
    pool. Dropping those records from the buffer pool and going to disk incurs additional
    cost in terms of time to retrieve that data from disk.


    If this data was only needed for a job that runs once every 4 to 6 hours, most
    of this data may be deemed irrelevant for every other process. This introduces
    a high churn of data that is being removed from the buffer pool. New data can
    be grabbed from disk and saved to the buffer pool. Then this new data may be removed
    from the buffer pool and be replaced with even newer data that has been retrieved
    from disk.


    In addition to this overhead associated with dealing with significant amount of
    data, there are other activities that interact with the disk or storage. When
    new data is being written to the system, that data will get stored in the transaction
    log. Data will continue to be added to the transaction log until the transaction
    log is cleared. Flushing the log can occur when the transaction is committed and
    the information is written to disk. In cases where there is a significant amount
    of data that is being added, updated, or deleted from the system, this can incur
    a significant use of storage.


    Knowing how this data is stored and how SQL Server can easily find that data through
    indexes and other data pages is stored on disk is important. When information
    is added to an index or an index needs to be updated, this information will also
    incur storage cost. This is not only in terms of the time needed to store the
    data but also the time involved to go to disk and make these additions or changes.


    When working with T-SQL, you want to consider how your queries are affecting your
    data storage. This can mean multiple things as we have seen in the previous section.
    You will want to make sure that you are not accessing, inserting, updating, or
    deleting more data than you need at a given time. That is not the only factor
    that comes into play when writing T-SQL. There are some things you can do to monitor
    storage use associated with your queries. Most of these involve looking at the
    number of physical reads, read-ahead reads, or the I/O cost associated with the
    query.'
  trans: '

    ```sql

    SELECT rec.RecipeName,

    ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    WHERE ing.IngredientName LIKE ''Tom%''

    AND ing.IsActive = 1

    ```


    **列表 6-2** 仅获取食谱和食材的查询


    虽然这并未影响查询的原始性能，但由于数据表现在有了更多数据，性能受到了明显影响。尽管我预计该查询涉及的逻辑读取会减少，但仍应通过执行查询来验证这一假设。在
    **表 6-3** 中，您可以看到查询修改后当前的逻辑读取情况。


    **表 6-3** 仅包含必要列时的逻辑读取情况


    | 食谱数量 | 食材数量 | 食谱食材关联记录数 | 返回记录数 | 逻辑读取数 |

    | --- | --- | --- | --- | --- |

    | 32,242 | 263,010 | 3,040,002 | 196 | 6990 |


    对比 **表 6-2** 和 **表 6-3** 的结果，可以看到逻辑读取数已经减少。因此，`SQL Server` 在 `缓冲池` 中访问的数据页应该更少，以执行此查询。这应有助于使用此
    `SQL Server` 实例的其他应用程序表现更好。


    尽管内存可能被认为是 `SQL Server` 可用最强大、最有益的硬件，但内存也涉及成本。内存可以弥补未优化的 T-SQL。但通常会遇到一个临界点：表变得非常庞大，而查询未完全优化，此时很容易倾向于通过增加内存来解决性能问题。在许多情况下，这最终成为解决长期问题的短期方案。此外，购买额外内存的成本并非总是业务能够承受的选项。预防或解决此问题的一种方法是，检查系统中的存储过程和预备语句，并寻找可以通过减少相关逻辑读取来改进的查询。


    ## 结合 T-SQL 设计考虑存储


    我已经介绍了如何与计划频繁访问的数据进行交互；您还需要考虑大部分数据的存储方式。当涉及到处理存储时，考虑哪些活动导致您必须访问磁盘上的数据至关重要。这些正是我们希望找出如何最小化或改进的活动类型。在某些情况下，当我看到大量的磁盘
    I/O 时，这可能表明 T-SQL 设计的某些其他部分需要改进。这可能只是症状而非根源。


    在上一节中，我谈到了数据存储在 `缓冲池` 中。如果我们需要的数据不在 `缓冲池` 中，会发生什么？这可能就是 `SQL Server` 内部情况变得有点复杂的地方。`SQL
    Server` 只与 `缓冲池` 内的数据交互。因此，如果需要的数据不在 `缓冲池` 中，第一步将是确定哪些数据使用频率较低。然后将这些数据从 `缓冲池`
    中移除。这些初始步骤已经让我们对内存使用情况有所了解。如果有某些东西不必要地填满了 `缓冲池`，我们现在就知道关键数据可能会被清除出 `缓冲池`，以便为这些新数据腾出空间。


    一旦数据被判定为非优先，`SQL Server` 就可以转到磁盘并获取所需的数据。这些数据随后将被存储在 `缓冲池` 中，直到未来某个时间点被判定不再需要。从硬件速度的角度来看，这个过程本身已经引入了延迟。如果数据不存在于
    `缓冲池` 中，还需要时间来确定哪些记录需要从 `缓冲池` 中丢弃。将这些记录从 `缓冲池` 中丢弃并转到磁盘，会在从磁盘检索数据所需的时间方面产生额外成本。


    如果这些数据仅用于每 4 到 6 小时运行一次的作业，那么这些数据中的大部分对于其他所有进程都可能被视为无关紧要。这导致了从 `缓冲池` 中移除的数据高度更替。新的数据可以从磁盘获取并保存到
    `缓冲池`。然后，这些新数据可能被移除出 `缓冲池`，并被从磁盘检索到的更新的数据所取代。


    除了处理大量数据相关的这些开销之外，还有其他与磁盘或存储交互的活动。当新数据被写入系统时，该数据将被存储在 `事务日志` 中。数据会不断添加到 `事务日志`
    中，直到 `事务日志` 被清空。当事务提交并且信息被写入磁盘时，可以发生日志刷新。在系统中存在大量数据添加、更新或删除的情况下，这可能导致存储的大量使用。


    了解这些数据如何存储，以及 `SQL Server` 如何通过 `索引` 和存储在磁盘上的其他数据页轻松找到这些数据，这一点很重要。当信息被添加到 `索引`
    或 `索引` 需要更新时，这些信息也会产生存储成本。这不仅涉及存储数据所需的时间，还涉及访问磁盘进行这些添加或更改所涉及的时间。


    在使用 T-SQL 时，您需要考虑您的查询如何影响数据存储。正如我们在前一节中看到的，这可能意味着多件事情。您需要确保在给定时间内，您没有访问、插入、更新或删除超出您所需的数据。然而，编写
    T-SQL 时，这并非唯一的考虑因素。您可以采取一些措施来监控与查询相关的存储使用情况。其中大多数涉及查看 `物理读取`、`预读` 或查询相关的 `I/O
    成本`。

