    WHERE RecipeID = @RecipeID

    END

    ELSE

    BEGIN

    INSERT dbo.Recipe

    (

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    )

    VALUES

    (

    @RecipeID,

    @RecipeName,

    @RecipeDescription,

    @ServingQuantity,

    @MealTypeID,

    @PreparationTypeID,

    @IsActive,

    @DateCreated,

    @DateModified

    )

    END

    Listing 13-2

    Store Procedure to Insert or Update

    ```


    Replacing the logic from the MERGE statement, you can use an IF… ELSE statement
    to control the flow of actions inside the SQL Server query. In Listing [13-2](#480547_1_En_13_Chapter.xhtml#PC2),
    if the recipe exists in the dbo.Recipe table, the record will update all fields
    except DateCreated. Otherwise, a new record in dbo.Recipe will be inserted.


    MERGE statements are not limited to inserting or updating data in a target table.
    Using MERGE statements can be expanded to handle other scenarios such as inserting
    or deleting data. MERGE statements can also be created so that missing records
    are inserted, changed records are updated, and orphaned records are deleted as
    part of a single statement. While the data modifications can be combined as part
    of single statement, you should use caution when using MERGE statements as MERGE
    statements can be prone to performance issues and data inconsistencies. Due to
    the ease of writing MERGE statements, it is possible to compare data between two
    tables in a way that is not efficient for SQL Server. While the tables are only
    being compared once, if the comparison is not efficient, this can have significant
    impact on the performance tables being compared. There have also been instances
    where the unique key violations can occur when using filtered indexes. MERGE statements
    can also create foreign key constraint violations in specific circumstances. This
    includes using two tables with foreign key constraints where the foreign key is
    set to NOCHECK and then rolled back. I suggest researching known issues with MERGE
    statements and performing adequate testing to confirm the T-SQL code will work
    as expected. The code in Listing [13-2](#480547_1_En_13_Chapter.xhtml#PC2) shows
    that it is not overly complex to write code that can handle either an insert or
    an update. Prior to SQL Server 2019, either the code in Listing [13-1](#480547_1_En_13_Chapter.xhtml#PC1)
    or Listing [13-2](#480547_1_En_13_Chapter.xhtml#PC2) may have been subject to
    parameter sniffing. Now that SQL Server 2019 has adaptive joins, this should be
    less of an issue.


    ## Disable Functionality


    When designing applications often the first goal is to focus on meeting the specified
    requirements. In many cases, the product owners or business units are asking for
    functionality that they need right now. However, the same individuals do not have
    your knowledge of application and database development. Therefore, the same people
    may not request the ability to enable or disable specified functionality upon
    their request. In this case, functionality can either be considered the ability
    for a user or a role to perform an action or for an application to behave in a
    certain way. It may be that they are counting on you to know how they may want
    to use the same applications in the future.


    One of the most frequent things that can be overlooked when designing a new application
    is the ability to enable or disable certain functionality for a user role. You
    can tell you are in this situation if the existence of a record in a table means
    that it is available to the application. For this example, table dbo.Recipe would
    be created using the T-SQL statement in Listing [13-3](#480547_1_En_13_Chapter.xhtml#PC3).


    ```

    CREATE TABLE dbo.Recipe

    (

    RecipeID          INT         IDENTITY(1,1)     NOT NULL,

    RecipeName        VARCHAR(25)                   NOT NULL,

    RecipeDescription VARCHAR(50)                   NOT NULL,

    ServingQuantity   TINYINT                       NOT NULL,

    MealTypeID        TINYINT                       NOT NULL,

    PreparationTypeID TINYINT                       NOT NULL,

    DateCreated       DATETIME2(7)                  NOT NULL,

    DateModified      DATETIME2(7)                  NOT NULL,

    CONSTRAINT PK_Recipe_RecipeID PRIMARY KEY CLUSTERED (RecipeID),

    CONSTRAINT FK_Recipe_MealTypeID FOREIGN KEY (MealTypeID)

    REFERENCES dbo.MealType (MealTypeID),

    CONSTRAINT FK_Recipe_PreparationTypeID FOREIGN KEY (PreparationTypeID)

    REFERENCES dbo.PreparationType (PreparationTypeID)

    );

    Listing 13-3

    Create dbo.Recipe Table

    ```


    In Table [13-1](#480547_1_En_13_Chapter.xhtml#Tab1), you can see the records in
    the dbo.Recipe table.


    Table 13-1


    Recipe Table Data


    | RecipeID | RecipeName | DateCreated | DateModified |

    | --- | --- | --- | --- |

    | 1 | Spaghetti | 01/02/2018 | 02/05/2019 |

    | 2 | Lee’s Burgers | 01/03/2018 | 02/05/2019 |

    | 3 | Spinach Frittata | 01/03/2018 | 03/16/2019 |

    | 4 | Dinner Rolls | 02/01/2018 | 03/17/2019 |

    | 5 | Brandin’s Fried Rice | 04/16/2019 | 06/23/2019 |


    For instance, if a recipe was displayed in an application because it was in the
    recipe table, this would be a case where you could not control how an application
    interacted with recipes. The only option you would have to keep a recipe from
    being used by an application would be to delete the recipe record. This action
    is referred to as a hard delete.


    Depending on what tables you need to delete a record from will depend on whether
    this deletion may be prevented by foreign key relationships. In these scenarios,
    you would only have a couple options available. One option would be to drop the
    foreign keys and then delete the specified record. For this table design, if you
    wanted to remove Dinner Rolls from being an available recipe, you would need to
    drop any foreign keys referencing the dbo.Recipe table and then delete the record.
    The query in Listing [13-4](#480547_1_En_13_Chapter.xhtml#PC4) would drop the
    foreign key.


    ```

    ALTER TABLE dbo.RecipeIngredient

    DROP CONSTRAINT FK_RecipeIngredient_RecipeID;

    Listing 13-4

    Drop Foreign Key

    ```


    Once any foreign keys that referenced the dbo.Recipe table have been dropped,
    you would need to remove the recipe record to make sure that it is no longer available.
    In Listing [13-5](#480547_1_En_13_Chapter.xhtml#PC5) is the statement to remove
    the specific recipe.


    ```

    DELETE FROM dbo.Recipe

    WHERE RecipeName = ''Dinner Rolls'';

    Listing 13-5

    Delete Recipe Record

    ```


    The resulting table would have the records shown in Table [13-2](#480547_1_En_13_Chapter.xhtml#Tab2).


    Table 13-2


    Recipe Table After Deleting Dinner Rolls'
