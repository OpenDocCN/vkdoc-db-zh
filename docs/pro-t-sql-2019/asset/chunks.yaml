    This would usually be a value that would indicate a true or false. For SQL Server,
    that is often represented with a one for true and a zero for false. If you set
    the IsActive to true and ran a query that filtered results where the IsActive
    value was true, then you would only see a listing of active recipes. Once you
    have added the IsActive column to the dbo.Recipe table, you can modify your T-SQL
    code to display either active or inactive recipes based on how they are written.


    You have the option to only show results based on the value assigned to IsActive.
    When the IsActive value is set to 1, the value is true. If you wanted to only
    show active recipes, you would modify your T-SQL code to use `IsActive = 1` in
    the WHERE clause. This also gives you the added ability to have some screens that
    would only show active recipes and other screens that would only show inactive
    or disabled recipes.


    In addition to disabling or enabling functionalities for users or roles, there
    are also occasions where you would want to be able to control how an application
    works. Companies often want to change how their business operates over time. This
    can usually be done by adding, changing, or removing functionality in the applications
    that the business uses.


    For instance, if a business wants to expand outside of their current market, they
    may choose to add new functionality to their existing applications. The easiest
    way to add this new functionality is to add new application code. However, the
    business may find that this new market or new line of business is not working
    the way that they intended, and the company decides to roll back this new functionality.
    Depending on how the code was written, this may be a complex change requiring
    another code rewrite or a simple change allowing the application to use a different
    part of the code.


    Depending on your business environment, you may find that it is easier to manage
    the changes in functionality through the database instead of the application code.
    This is even more likely when you may want functionality to change based on seasonality
    or by region. This allows you the option to exert finely tuned control that can
    be changed rapidly. You will want to carefully consider the best place to manage
    this functionality. The best advice I have received is to keep business logic
    in the application when higher-level management will need to sign off on any changes.
    For business logic that can change rapidly and with little oversight, it may be
    best to leave the business logic in the database.


    If you want to manage some of your application business logic from within the
    database, you will want to create a table to manage whether certain features are
    enabled. This table is similar in concept to the table created for feature flags
    in Chapter [12](#480547_1_En_12_Chapter.xhtml). If you want to manage the functionality
    in the database, you may want to create a table like the one in Listing [13-9](#480547_1_En_13_Chapter.xhtml#PC9).


    ```

    CREATE TABLE dbo.ApplicationRule

    (

    ApplicationRuleID IDENTITY(1,1) INT         NOT NULL,

    ApplicationRuleDescription      VARCHAR(50) NOT NULL,

    IsActive                        BIT         NOT NULL,

    DateCreated                     DATETIME   NOT NULL,

    DateModified                    DATETIME   NULL,

    CONSTRAINT PK_ApplicationRule_ApplicationRuleID

    PRIMARY KEY CLUSTERED (ApplicationRuleID)

    );

    Listing 13-9

    Create Application Rule Table

    ```


    If you are creating rules for a single, centralized application, this table design
    will work for your needs. If you are managing multiple applications, you will
    want to consider how these rules are used by applications. If most or all rules
    are unique per application, you may want to add a column to this table to indicate
    the application affected.


    There could be a business reason why you may want to toggle your application to
    show only active recipes or show all recipes. This scenario could happen if there
    were justifiable business reasons why the application may need to show all recipes
    or only the active recipes. The value for this rule could be stored in Table [13-3](#480547_1_En_13_Chapter.xhtml#Tab3).


    Table 13-3


    Application Rule Table


    | Application RuleID | ApplicationRule Description | IsActive | DateCreated |
    DateModifed |

    | --- | --- | --- | --- | --- |

    | 1 | Show only active recipes | 1 | 04/12/2019 | 04/12/2019 |


    The entry in this table indicates that only active recipes will be shown when
    this application rule is enabled. If you want the same application to show all
    recipes, you would need to update the IsActive value to false. While you could
    update all your database code and stored procedures to use IF... THEN statements
    depending on when this application rule is enabled, I would suggest handling this
    functionality within the application.'
  trans: "\n# 外键约束与数据完整性\n\n| RecipeID | RecipeName | DateCreated | DateModified |\n\
    | --- | --- | --- | --- |\n| 1 | Spaghetti | 01/02/2018 | 02/05/2019 |\n| 2 |\
    \ Lee’s Burgers | 01/03/2018 | 02/05/2019 |\n| 3 | Spinach Frittata | 01/03/2018\
    \ | 03/16/2019 |\n| 5 | Brandin’s Fried Rice | 04/16/2019 | 06/23/2019 |\n\n使用这种方法时存在一个显著问题。当你需要决定是否删除表之间的外键关系时，必须格外谨慎。这不仅会对查询性能产生负面影响，还可能影响数据质量。外键是确保表间数据保持一致性的最后几道防线之一。\n\
    \n另一种可能性是在具有外键关系的表中插入一条虚拟记录。你可以向 `dbo.Recipe` 表添加一个名为 `Inactive Recipe` 的食谱。可以使用清单\
    \ 13-6 中的查询来插入它。\n\n```sql\nSET IDENTITY_INSERT dbo.Recipe ON;\nINSERT INTO dbo.Recipe\n\
    (\n    RecipeID,\n    RecipeName,\n    RecipeDescription,\n    ServingQuantity,\n\
    \    MealTypeID,\n    PreparationTypeID,\n    DateCreated,\n    DateModified\n\
    )\nVALUES\n(\n    0,\n    'Inactive Recipe',\n    'Deactivated recipes',\n   \
    \ 0,\n    0,\n    0,\n    GETDATE(),\n    GETDATE()\n);\nSET IDENTITY_INSERT dbo.Recipe\
    \ OFF;\n-- Listing 13-6\n-- Insert Dummy Recipe Record\n```\n\n将这条虚拟记录插入 `dbo.Recipe`\
    \ 表只是第一步。你需要更新 `dbo.RecipeIngredient` 表中关于 `Dinner Rolls` 的记录，使其使用 `Inactive Recipe`\
    \ 的 `RecipeID`。更新语句的编写如清单 13-7 所示。\n\n```sql\nUPDATE dbo.RecipeIngredient\nSET\
    \ RecipeID = 0,\n    DateModified = GETDATE()\nWHERE RecipeID = 4;\n-- Listing\
    \ 13-7\n-- Update RecipeID for Dinner Rolls\n```\n\n除非你的应用程序被配置为始终忽略该值，否则这可能无法阻止应用程序显示该特定值。如果这两种选项都无法使用，还有另一种选择。在涉及这种表设计的情况下，另一个选择是移除与食谱\
    \ `Dinner Rolls` 关联的食材。\n\n由于这些限制，硬删除的概念可能并不适合你的环境。你还有其他可用选项。你可以设计表结构，以便能够切换食谱或食材是否处于活动状态。这允许你在不删除数据记录的情况下启用或禁用功能。要使用此选项，你需要\
    \ `dbo.Recipe` 表包含一个诸如 `IsActive` 的列。要修改在清单 13-3 中创建的表，你需要执行清单 13-8 中的查询。\n\n\
    ```sql\nALTER TABLE dbo.Recipe\nADD IsActive BIT\n    CONSTRAINT DF_Recipe_IsActive\
    \ DEFAULT '1' NOT NULL;\n-- Listing 13-8\n-- Add IsActive Column to dbo.Recipe\
    \ Table\n```\n\n这通常是一个表示真或假的值。对于 SQL Server，通常用 1 表示真，用 0 表示假。如果你将 `IsActive`\
    \ 设置为 `true` 并运行一个筛选 `IsActive` 值为 `true` 的结果的查询，那么你将只看到活动食谱的列表。一旦你将 `IsActive`\
    \ 列添加到 `dbo.Recipe` 表中，你就可以修改你的 T-SQL 代码，根据它们的编写方式来显示活动或非活动的食谱。\n\n你可以选择仅基于分配给\
    \ `IsActive` 的值来显示结果。当 `IsActive` 值设置为 1 时，该值为真。如果你只想显示活动食谱，你将在 WHERE 子句中修改你的\
    \ T-SQL 代码以使用 `IsActive = 1`。这也为你提供了额外的能力，让某些屏幕只显示活动食谱，而其他屏幕只显示非活动或已禁用的食谱。\n\n\
    除了为用户或角色禁用或启用功能外，有些时候你还需要能够控制应用程序的工作方式。公司通常希望随着时间的推移改变其业务的运营方式。这通常可以通过在业务使用的应用程序中添加、更改或删除功能来实现。\n\
    \n例如，如果一家公司希望扩展到其当前市场之外，他们可能会选择向其现有应用程序添加新功能。添加这个新功能最简单的方法是添加新的应用程序代码。然而，公司可能会发现这个新市场或新的业务线并未按预期运作，因此公司决定回滚这个新功能。根据代码的编写方式，这可能是一个需要重写代码的复杂变更，也可能是一个允许应用程序使用不同代码部分的简单变更。\n\
    \n根据你的业务环境，你可能会发现通过数据库管理功能变更比通过应用程序代码更容易。当功能可能需要根据季节性或地区进行变化时，这种可能性更大。这使你能够施加可快速更改的精细控制。你需要仔细考虑管理此功能的最佳位置。我得到的最好建议是：当需要高层管理人员对任何变更进行签字批准时，将业务逻辑保留在应用程序中。对于可以快速且几乎无人监督地变更的业务逻辑，最好将业务逻辑保留在数据库中。\n\
    \n如果你想从数据库内部管理部分应用程序业务逻辑，你将需要创建一个表来管理某些功能是否启用。这个表在概念上类似于第 12 章为功能标志创建的表。如果你想在数据库中管理功能，你可能希望创建一个如清单\
    \ 13-9 所示的表。\n\n```sql\nCREATE TABLE dbo.ApplicationRule\n(\n    ApplicationRuleID\
    \           INT           IDENTITY(1,1) NOT NULL,\n    ApplicationRuleDescription\
    \  VARCHAR(50)   NOT NULL,\n    IsActive                    BIT           NOT\
    \ NULL,\n    DateCreated                 DATETIME      NOT NULL,\n    DateModified\
    \                DATETIME      NULL,\n    CONSTRAINT PK_ApplicationRule_ApplicationRuleID\n\
    \        PRIMARY KEY CLUSTERED (ApplicationRuleID)\n);\n-- Listing 13-9\n-- Create\
    \ Application Rule Table\n```\n\n如果你是为单一的集中式应用程序创建规则，此表设计将满足你的需求。如果你管理多个应用程序，你需要考虑这些规则如何被应用程序使用。如果大多数或所有规则对于每个应用程序都是唯一的，你可能需要在表中添加一列来指明受影响的应用程序。\n\
    \n可能存在业务原因，使你希望切换应用程序以仅显示活动食谱或显示所有食谱。如果存在合理的业务原因，应用程序可能需要显示所有食谱或仅显示活动食谱，就可能发生此场景。此规则的值可以存储在表\
    \ 13-3 中。\n\n**表 13-3**\n\n**应用规则表**\n\n| ApplicationRuleID | ApplicationRuleDescription\
    \ | IsActive | DateCreated | DateModified |\n| --- | --- | --- | --- | --- |\n\
    | 1 | Show only active recipes | 1 | 04/12/2019 | 04/12/2019 |\n\n此表中的条目表明，当此应用程序规则启用时，将仅显示活动食谱。如果你希望同一应用程序显示所有食谱，则需要将\
    \ `IsActive` 值更新为 `false`。虽然你可以更新所有数据库代码和存储过程以使用 `IF...THEN` 语句，但我建议在应用程序内部处理此功能。\n\
    \n# 软删除方案：使用 IsActive 列\n\n# 在数据库中管理应用业务逻辑\n"
- fmt: 'This is where it becomes important to develop your code to be flexible. While
    the topic of this book is not an application code development, you will need a
    database that works with your application code to handle these scenarios. Conceptually
    this can work similarly to `feature flags` as discussed in Chapter [12](#480547_1_En_12_Chapter.xhtml).
    This is where you could make a table to store a reference to the specified functionality.
    In some environments this may be referred to as `application rules`.


    ## Support Legacy Code


    One of the key issues in software development involves dealing with technical
    debt. Applications are developed over time, and depending on how the applications
    are developed will determine how easy it can be to maintain them over time. For
    many organizations, applications are initially developed with a timeline in order
    to meet the current business needs. This can cause applications to be developed
    rapidly without having the time to plan for how this application will be supported
    in the future. This often becomes the single source of tension between development
    and the database administrators.


    The real challenge is that when an application is developed, it usually is not
    well documented. If the application is not well documented, this can make supporting
    legacy code even more difficult if the `T-SQL` queries are saved directly in the
    application code. If the database code is in the application, it will require
    more effort not only to locate the specific database code but also to get the
    database code updated. This because it is not merely as simple as altering a table
    or stored procedure to increase the flexibility and maintainability of the `T-SQL`
    code.


    As businesses grow and change, the same application may need to be modified to
    handle new functionality. This new functionality may require storing new information.
    To store this information, you may want to add a column to a table or create a
    new table entirely. The challenge becomes trying to understand all the items that
    depend on this table. While you can verify dependencies between database objects,
    the issue is that you do not know how the application is currently accessing this
    table. Your applications may be accessing the data table through `prepared statements`
    and `ad hoc queries`. If your application is using `prepared statements` or `ad
    hoc queries`, you may have to change your application code when adding a new column
    to a table especially if your coding standards do not specify that column names
    must always be specified with your `T-SQL` queries.


    The concern is how to modify this table without breaking the entire application.
    There are strategies that can be used to allow you to add new columns to an existing
    table without breaking existing code. You are looking for a way to both allow
    existing code to reference the table as is and store this new information in a
    manner that works with your existing standards. The options that will be discussed
    in this section are intended to support new functionality on a short-term basis.
    It is recommended that you update your application code and database objects to
    remain compliant with best practices.


    The simplest option that you can use to allow for additional columns in a table
    is to create another table with the same primary key as the table you want to
    modify. In this scenario, you will also need to rename the existing table. In
    order to prevent existing applications from breaking, you would create a view
    with the same name as the current table. All queries that would access the original
    unmodified table will now access this view. When you are ready to update all the
    application code, the view can be dropped and the table can be renamed back to
    its original name.


    These new columns can be added to this second table. You may find that due to
    how legacy application code was written, you cannot implement the change from
    `Listing [13-8](#480547_1_En_13_Chapter.xhtml#PC8)`. You may want to add the `IsActive`
    column to the `dbo.Recipe` table, but your application may have embedded `T-SQL`
    queries within the application. Therefore, you may not be certain what will break
    if you add that new column. Creating a new table `dbo.RecipeIsActive` in `Listing
    [13-10](#480547_1_En_13_Chapter.xhtml#PC10)` is one option.'
