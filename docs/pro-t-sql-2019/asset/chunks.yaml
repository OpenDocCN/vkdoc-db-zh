- fmt: "# Formatting T-SQL Code\n\nThere are times when working with T-SQL code that\
    \ you will write complex code. This code may include subqueries or logic in the\
    \ `WHERE` clause involving `AND`s or `OR`s. If there is logic like a subquery\
    \ or a mixture of `AND`s and `OR`s in the `WHERE` clause, I will wrap those in\
    \ parentheses. I will indent all the code inside the parentheses so that it is\
    \ easy to identify what logic is wrapped together. There are also times where\
    \ there are multiple join conditions between two tables. If there is more than\
    \ one join condition between two tables, I will indent every join condition except\
    \ the first one so that others can easily tell there are multiple join conditions\
    \ between two tables.\n\nYou will also want to consider how to format T-SQL code\
    \ when adding additional levels of logic to your code. There are various reasons\
    \ for T-SQL code blocks including `TRY… CATCH` blocks, `IF… ELSE` statements,\
    \ `BEGIN…END`, or other reasons to segment code. For these scenarios, I indent\
    \ the interior of the code block. If code blocks end up being nested, I will indent\
    \ each subsequent code block. I prefer to indent my code blocks so that others\
    \ reviewing my code can see the parent activity such as the `WHILE` loop in Listing\
    \ [3-17](#480547_1_En_3_Chapter.xhtml#PC17). Once you see the first level of indentation,\
    \ you know that all the logic that has been indented belongs to the same code\
    \ block.\n\n```sql\nSET NOCOUNT ON;\nDECLARE @RecipeID INT,\n    @RecipeName VARCHAR(25),\n\
    \    @message VARCHAR(50);\nPRINT '-------- Recipe Listing --------';\nDECLARE\
    \ recipe_cursor CURSOR FORWARD_ONLY\nFOR\nSELECT RecipeID, RecipeName\nFROM dbo.Recipe\n\
    ORDER BY RecipeID;\nOPEN recipe_cursor\nFETCH NEXT FROM recipe_cursor\nINTO @RecipeID,\
    \ @RecipeName\nWHILE @@FETCH_STATUS = 0\nBEGIN\n    PRINT ' '\n    SELECT @message\
    \ = '----- Ingredients For Recipe: ' + @RecipeName + '-----'\n    PRINT @message\n\
    \    SELECT ing.IngredientName,\n        srv.ServingPortionQuantity,\n       \
    \ srv.ServingPortionUnit\n    FROM dbo.Ingredient ing\n    INNER JOIN dbo.RecipeIngredient\
    \ recing\n        ON ing.IngredientID = recing.IngredientID\n    INNER JOIN dbo.ServingPortion\
    \ srv\n        ON recing.ServingPortionID = srv.ServingPortionID\n    WHERE recing.RecipeID\
    \ = @RecipeID\n    FETCH NEXT FROM recipe_cursor INTO @RecipeID, @RecipeName\n\
    END\nCLOSE recipe_cursor;\nDEALLOCATE recipe_cursor;\n```\nListing 3-17\nCreate\
    \ a Cursor\n\nFormatting T-SQL code consistently improves readability for yourself\
    \ and anyone in the future who will need to review your code. Well-formatted code\
    \ can help provide clarity when troubleshooting, performance tuning, and code\
    \ enhancing. Creating a T-SQL formatting standard in your organization can also\
    \ help when onboarding new employees or training junior database developers. Once\
    \ T-SQL formatting standards have been determined, you will want to consider what\
    \ steps need to be taken to create naming conventions for your T-SQL code.\n\n\
    ## Naming T-SQL\n\nWhen you write T-SQL, you have options on how to write that\
    \ code. You will most likely create persistent objects in T-SQL. Regardless of\
    \ your purpose, following a good naming policy makes it easier for others to understand\
    \ the purpose of your T-SQL code. Ideally, your team members should be able to\
    \ determine the purpose of your code based on the object name where the code lives.\
    \ This is particularly helpful for new or less experienced employees.\n\nThe same\
    \ practices for formatting T-SQL are similar for when choosing your naming convention\
    \ strategy. One of the aspects that comes with naming conventions is look and\
    \ feel. This can involve the capitalization used for objects. There are various\
    \ options available when providing a case for database objects. The main choices\
    \ are camel case or pascal case. The primary difference between these casing styles\
    \ is the first letter of the database object. In Listing [3-18](#480547_1_En_3_Chapter.xhtml#PC18),\
    \ you will see writing a query using camel case.\n\n```sql\nSELECT recipeID, ingredientID,\
    \ dateCreated, dateModified\nFROM dbo.recipeIngredient\n```\nListing 3-18\nQuery\
    \ with Camel Case\n\nConversely, you can see in Listing [3-19](#480547_1_En_3_Chapter.xhtml#PC19)\
    \ what pascal case looks like when writing the same query.\n\n```sql\nSELECT RecipeID,\
    \ IngredientID, DateCreated, DateModified\nFROM dbo.RecipeIngredient\n```\nListing\
    \ 3-19\nQuery with Pascal Case\n\nIn addition, there is also an option where the\
    \ first letter is not capitalized and there is an underscore between words. I\
    \ am generally not a fan of non-alphabetic characters in database names, but I\
    \ do know some people that prefer underscores. If you want another alternative,\
    \ Listing [3-20](#480547_1_En_3_Chapter.xhtml#PC20) shows how tables and columns\
    \ would need to be named has been referred to as snake case.\n\n```sql\nSELECT\
    \ recipeID, ingredientID, date_created, date_modified\nFROM dbo.recipe_ingredient\n\
    ```\nListing 3-20\nQuery with Snake Case\n\nWhen determining which case to use\
    \ for your naming convention, make sure to also be aware of the collation for\
    \ your database and if any tables have a special collation. Being aware of case\
    \ sensitivity will help you ensure that your naming conventions and your formatting\
    \ standards line up.\n\nThis can also involve where objects appear in Object Explorer.\
    \ Some of this has to do with what type of object is being named and who will\
    \ be looking for these objects. If you are wanting to find objects by their use,\
    \ you may want to specify schema names that group those objects together. This\
    \ can be particularly useful for applications or services. Depending on what type\
    \ of troubleshooting is expected, database objects, particularly stored procedures,\
    \ can be named with the action they are taking. This would allow for an easy search\
    \ of stored procedures that are selecting data vs. inserting data. However, there\
    \ is also another option where the main table affected could be the first word\
    \ in the stored procedure name. This would allow someone to search in Object Explorer\
    \ by affected table to see all the stored procedures that exist.\n\nAnother consideration\
    \ is whether reserved words can be used when naming database objects. If reserved\
    \ words are used in database object names, you will want to add another word to\
    \ the object name so that brackets are not needed when referencing the object\
    \ name.\n\nWhen determining naming conventions, you may also want to consider\
    \ if there are columns in tables that will have the same names as other columns\
    \ in tables. Some of these types of columns include specifying the date a record\
    \ was created, the date a record was last updated, and if the record has been\
    \ soft deleted. For tables that are specifying status or types, these tables can\
    \ have columns with a status or type name and an associated description. You may\
