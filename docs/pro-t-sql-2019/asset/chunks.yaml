    SELECT RecipeHistoryID,

    RecipeID,

    RecipeHistoryStatusID,

    DateCreated

    FROM dbo.vwRecipeHistory

    WHERE RecipeID = 4

    AND RecipeHistoryStatusID = 2;

    Listing 15-19

    Access Data Without Using Partitioned Column

    ```


    The preceding query is searching for a specific recipe that has a certain status.
    However, there is no indication that any of these records will exist in a specific
    table within the indexed view. Since SQL Server does not have the ability to rule
    out certain date ranges as part of the query, we get the execution plan in Figure
    [15-15](#480547_1_En_15_Chapter.xhtml#Fig15).


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig15_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig15_HTML.jpg)


    Figure 15-15


    Execution Plan for Partitioned View


    You can see that in this execution plan, SQL Server must access both the table
    containing 2018 data and the table containing 2019 data. In this example, you
    can see that there is no benefit on the number of tables accessed as part of this
    request.


    Using partitioned views can help you take more than one table and combine them
    together into one database object. By accessing this single database object, you
    can simplify your T-SQL code across multiple ranges. You have also seen that using
    a partitioned view can be beneficial in limiting the number of tables accessed,
    but if you do not use the partitioning column as part of your queries, you will
    still need to access all tables included in the view. While partitioned tables
    break one table up into multiple segments and partitioned views combined tables
    together into one database object, you may find advantages to combining them both.


    ## Hybrid Workloads


    Companies have been using databases for many years and may have acquired a significant
    amount of data. Often, these same companies may be generating reports from this
    data. In many cases, these same companies may not have prioritized building a
    data warehouse. For these situations, one database is often trying to perform
    two tasks at the same time. The first role is to continue to store transactional
    data. However, the second role is to also act as a data warehouse for analytical
    processing. In many situations, the database design needed for transaction processing
    does not match the best design for analysis processing. While a company may be
    willing to move toward a data warehouse some day, you may find yourself in a situation
    where you need to implement designs that can function well with this hybrid workload.


    In combining partitioned and non-partitioned tables with a partitioned view, we
    can give ourselves some additional flexibility. Using a partitioned view will
    allow us to use a single database object and name to access any data for a specific
    purpose. In our example, we will continue to work with the data recorded as a
    result of recipes being started. Since a partitioned view allows us to combine
    several tables together, we can investigate how those tables can be created. One
    advantage of using multiple tables is that each table can use different indexes.
    This difference in indexes can change both how data is stored and accessed. We
    can also have the option to make some tables as read only which can also signify
    that we do not intend to add any additional data to these tables.


    We will be creating a partitioned view to access all the recipe history data.
    The first table we can create is only to hold all the older data that we want
    to archive. We can also partition this table to allow for partition elimination
    when searches are performed based on the partitioning key of the table. In Listing
    [15-20](#480547_1_En_15_Chapter.xhtml#PC20), you can see the T-SQL needed to create
    our partitioned table for archived data.


    ```

    CREATE TABLE dbo.RecipeHistoryPartition

    (

    RecipeHistoryID         INT         NOT NULL,

    RecipeID                SMALLINT    NOT NULL,

    RecipeHistoryStatusID   TINYINT     NOT NULL,

    DateCreated             DATETIME    NOT NULL,

    DateModified            DATETIME    NULL,

    CONSTRAINT pk_RecipeHistoryPartition_RecipeHistoryID

    PRIMARY KEY (RecipeHistoryID),

    CONSTRAINT fk_RecipeHistoryPartition_RecipeID

    FOREIGN KEY (RecipeID)

    REFERENCES dbo.Recipe(RecipeID),

    CONSTRAINT fk_RecipeHistoryParition_RecipeHistoryStatusID

    FOREIGN KEY (RecipeHistoryStatusID)

    REFERENCES

    dbo.RecipeHistoryStatus(RecipeHistoryStatusID)

    )

    ON RecipeHistRange (DateCreated);

    Listing 15-20

    Create Partitioned Tables for Archived Data

    ```


    The preceding partitioned table is created like many of the partitioned tables
    already included in this chapter. Like the partitioned tables created earlier
    in this chapter, this table was also created on the partition scheme RecipeHistRange.
    Now that we have a partitioned table, I want to create a non-partitioned table
    for data that is being actively used by the application right now. The table created
    in Listing [15-21](#480547_1_En_15_Chapter.xhtml#PC21) is an example of a non-partitioned
    table.


    ```

    CREATE TABLE dbo.RecipeHistory

    (

    RecipeHistoryID         INT         NOT NULL,

    RecipeID                SMALLINT    NOT NULL,

    RecipeHistoryStatusID   TINYINT     NOT NULL,

    DateCreated             DATETIME    NOT NULL,

    DateModified            DATETIME    NULL,

    CONSTRAINT pk_RecipeHistory_RecipeHistoryID

    PRIMARY KEY (RecipeHistoryID),

    CONSTRAINT fk_RecipeHistory_RecipeID

    FOREIGN KEY (RecipeID)

    REFERENCES dbo.Recipe(RecipeID),

    CONSTRAINT fk_RecipeHistory_RecipeHistoryStatusID

    FOREIGN KEY (RecipeHistoryStatusID)

    REFERENCES

    dbo.RecipeHistoryStatus(RecipeHistoryStatusID)

    );

    Listing 15-21

    Create Table for Active Data

    ```'
