    ## 合并表 [5-21](#480547_1_En_5_Chapter.xhtml#Tab21) 和 [5-22](#480547_1_En_5_Chapter.xhtml#Tab22)
    的结果（UNION ALL）


    | IngredientID | IngredientName |

