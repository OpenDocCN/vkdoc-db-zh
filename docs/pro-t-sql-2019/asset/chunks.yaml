  trans: '### 表


    有些数据类型不能作为列存在于表中。`table` 数据类型就是其中之一。当你想要存储数据以供后续使用时，这可能是一个值得考虑的数据类型。然而，在使用表作为数据类型时，需要注意一些注意事项和限制。


    通常，最好将表变量的使用限制在返回数据量不会很大的场景中。历史上，SQL Server 并不总能准确估计表变量中的总行数。不过，从 SQL Server 2019
    开始，数据库引擎在处理表变量时应能给出更好的估计。


    虽然表变量可以在存储过程、批处理或函数中使用，但表变量仅存在于该对象的持续时间内。在函数或存储过程的情况下，函数或存储过程执行完成后，表变量就不再存在。在批处理的情况下，表将存在于整个批处理期间。由于表变量仅在一次更新的整个过程中持续存在，使用它们可能会减少更新过程中所需的锁。


    表作为数据类型的另一个限制是表变量上不会生成统计信息。这也意味着表变量使用索引非常受限。事实上，在 SQL Server 2014 之前，无法在表变量上创建索引。从
    SQL Server 2014 开始，创建表变量时可以包含一些索引。


    ### 游标


    另一种不能用作表中列的数据类型是 `cursor`。总的来说，这种数据类型可能非常有限，但在某些情况下，它是最适合任务的数据类型。在考虑使用这种数据类型时，最好了解使用
    `cursor` 数据类型可能带来的潜在性能影响。


    `cursor` 数据类型通常用作变量。但是，这种数据类型也可以用作存储过程的输出。无论哪种情况，`cursor` 数据类型都接收一组数据，并逐行与每条记录交互。由于
    `cursor` 数据类型可以保存一组数据，因此它也可能不包含任何数据。这表明 `cursor` 数据类型是可为空的。


    这种数据类型的大多数用途都与创建和使用游标有关。要创建游标，必须将局部变量声明为游标。与其他局部变量一样，可以声明游标并填充值，或者声明游标并使用 `SET`
    语句填充值。其他用于创建游标的函数也可以与此数据类型一起使用。这些函数包括 `OPEN`、`FETCH`、`CLOSE`、`DEALLOCATE` 和 `CURSOR_STATUS`。此外，还有一些系统存储过程具有
    `cursor` 数据类型。


    # 2. 数据库对象


    理解可用的各种数据类型的一个关键因素是知道使用哪种数据类型。在某些情况下，使用正确的数据类型可能关系到节省空间。其他时候，使用不正确的数据类型可能导致严重的性能问题。你还需要在
    T-SQL 代码和数据库对象中保持使用和引用数据类型的方式一致。如果 SQL Server 需要比较两种不同的类型，SQL Server 将需要转换至少一种数据类型，以使两种数据类型相同。这个过程称为隐式转换。与隐式转换相关的
    CPU 开销可能很大，应尽可能避免。避免隐式转换的最佳方法是对要比较的字段使用相同的数据类型。最大的挑战是，有时需要几年时间才能意识到不正确的数据类型可能对应用程序性能产生的负面影响。


    通常，编写执行快速且高效使用硬件的 T-SQL，需要了解的不仅仅是正确的数据类型。数据类型将帮助你确定数据应如何存储，但下一步是设计访问该数据的过程。使用
    T-SQL 最大的好处和缺点之一是可用于访问数据的选项数量众多。期望是你已经熟悉如何编写 T-SQL 来读取、插入、更新或删除数据。


    在本章中，我将讨论可用于与数据交互的各种方法。有些对象可以让你一致且快速地整合信息。你可能还需要一个执行小型、快速操作并可以将该代码用于多种目的的数据库对象。一些数据库对象可以在同一批处理或连接内临时存储信息以供重用。其他数据库对象可以作为服务器或数据库对象上的活动的结果执行操作。虽然
    T-SQL 在基于集合的操作中表现最佳，但你可能也会发现自己需要逐条记录地循环遍历数据。


    根据你的目的，可能有一个或多个数据库对象可以满足你的需求。虽然这些数据库对象各有其适用之处，但在何时以及如何使用每个对象方面都有其优缺点。在本章中，我将通过各种场景，展示使用每个这些数据库对象的积极和消极后果。首先，我将从讨论
    T-SQL 中的视图开始。


    ## 视图


    什么是视图？就像“视图”这个词的定义一样，T-SQL 中的视图是一种将几个不同的项目组合在一起，形成一个统一图像的手段。在本节中，我将讨论使用视图时可用的一些选项。与任何工具一样，使用视图有其优势，但如果使用不当，也会带来与视图相关的风险。


    ```sql

    -- 原文中的示例 T-SQL 语句

    if (condVar > someVal) {console.log("xxx")}

    ```'
- fmt: '# User-Defined Views


    The term user-defined view is the full name for the basic version of a view. One
    of the results of a view is simplicity. It is one way for applications and users
    to access complex sets of information without needing to understand all the relationships
    in a database. There is some additional functionality for protection and security
    that is available when using views. I will go through examples of views that help
    performance as well as some situations where views may not be the right option.


    For standard user-defined views, SQL Server does not store the actual data returned
    by a view physically. Therefore, each time a view is called, it will use the statement
    inside the view to pull back the data that currently exists. One of the advantages
    for this method is it allows users accessing these views to look at code that
    is cleaner and easier to read. Another feature of views is that users can be granted
    permission to the view but not the associated tables. This can allow users to
    have access to some but not all the data from the tables that make up the view.


    Let’s start out with comparing the performance of a view to the performance of
    the same query as an ad hoc query or a stored procedure. Listing 2-1 shows the
    query that will be used as the basis for the comparison.


    ```sql

    SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    ```


    **Listing 2-1** Query for Analysis


    This query will be used as the basis for comparing how views can affect performance.
    In the case of this query, the logic is simple. In Listing 2-2, the query shows
    how to make a view using the following T-SQL code.


    ```sql

    CREATE VIEW dbo.AvailableMeal

    AS

    SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    ```


    **Listing 2-2** Creating a View


    Once the view has been created, it becomes much simpler to use the view to pull
    back the same information as the original query. Listing 2-3 shows how the view
    can be used to simplify pulling back data from SQL Server.


    ```sql

    SELECT MealTypeName, RecipeName, IngredientName

    FROM dbo.AvailableMeal

    ```


    **Listing 2-3** Calling the View


    While having a simplified way to access data is nice, another consideration is
    how the view performs vs. the query. In general, you might expect the view to
    perform the same as the query that exists inside the view. Figure 2-1 shows the
    actual query execution plan for the ad hoc query.


    ![Ad Hoc Query Execution Plan](images/480547_1_En_2_Chapter/480547_1_En_2_Fig1_HTML.jpg)


    **Figure 2-1** Ad Hoc Query Execution Plan


    Comparing this to the query execution plan for the view in Figure 2-2, you can
    see there is no difference between the execution plans.


    ![Execution Plan for View](images/480547_1_En_2_Chapter/480547_1_En_2_Fig2_HTML.jpg)


    **Figure 2-2** Execution Plan for View


    One of the issues that can occur when using views is that the execution plan does
    not clearly show the relationship between the view and the underlying tables.
    While views can make things simpler to use, there are other ways you may want
    to use views. As views make interacting with complex queries simpler, it may also
    make modifying data easier. However, there are some caveats that you need to consider
    when updating data through views. In Listing 2-4, you can see the query to update
    data based upon the view.


    ```sql

    UPDATE dbo.AvailableMeal

    SET IngredientName = ''Spicy Italian Sausage''

    WHERE RecipeName = ''Spaghetti''

    ```


    **Listing 2-4** Update Data in View


    Through a view you can update data from the base table. If a view is used to modify
    data from more than one base table, then the update will fail. The same is true
    for inserts as it is for updates. In Listing 2-5, you can see what happens when
    you attempt to insert a record for data in more than one table.


    ```sql

    INSERT INTO dbo.AvailableMeal (MealTypeName, RecipeName)

    VALUES (''Lunch'', ''Spinach Quiche'')

    ```


    **Listing 2-5** Insert Data Through a View


    When trying to execute the preceding query, SQL Server returns the error “View
    or function ‘dbo.AvailableMeal’ is not updatable because the modification affects
    multiple base tables.” There are other features available when using views. There
    is a way to prevent an underlying table from being modified when they are referenced
    by a view. If you want to make sure that users cannot accidentally drop a table,
    having a view reference table with `SCHEMABINDING` is an available option. You
    can implement this additional level of security using a query like the one in
    Listing 2-6.


    ```sql

    CREATE VIEW dbo.RecipeSecure

    WITH SCHEMABINDING

    AS

    SELECT RecipeName, RecipeDescription, IsActive

    FROM dbo.Recipe;

    ```


    **Listing 2-6** Create a View with Schema Binding


    When adding `SCHEMABINDING` to a view, I have changed how SQL Server handles changes
    to the columns contained within the view. Specifically, I cannot modify columns
    in the `dbo.Recipe` table in a way that would impact the view `dbo.RecipeSecure`.
    Listing 2-7 shows a query where I am trying to drop a column in the `dbo.Recipe`
    table that is referenced by the `dbo.RecipeSecure` schema.


    ```sql

    ALTER TABLE dbo.Recipe

    DROP COLUMN RecipeDescription;

    ```


    **Listing 2-7** Remove Column in Schemabound View


    When trying to execute the preceding query, I get the following error “The object
    ‘RecipeSecure’ is dependent on column ‘RecipeDescription’. ALTER TABLE DROP COLUMN
    RecipeDescription failed because one or more objects access this column.” However,
    there is also a potential loophole regarding protecting data. Once a view is created,
    the original column name can be replaced to use a different column as long as
    the field is aliased with the same column name. Going back to the view created
    in Listing 2-2, I can try to change the values returned. This can create a scenario
    where users can access data that they should not be able to access. In Listing
    2-8, I have altered the original `dbo.AvailableMeal` view.


    ```sql

    ALTER VIEW dbo.AvailableMeal

    AS

    SELECT meal.MealTypeName,

    rec.RecipeName,

    rec.RecipeDescription AS ServingQuantity,

    ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID;

    ```


    **Listing 2-8** Alter View to Change Column


    Previously, I had a user that only had permission to access the data within the
    view `dbo.AvailableMeal`. My intention was to allow this user to only have access
    to the original columns in the view. This same user attempts to query the view
    at a later date, this same user is now able to see the data in the `RecipeDescription`
    column.'
