- fmt: '### Dynamic Cursors


    If the other cursors may not work for your situation, there is a final type of
    cursor available. This type of cursor should be used as infrequently as possible
    due to the potential performance implications. The dynamic cursor allows you to
    move forward and backward through the result set. In addition, it will be aware
    of changes made to the data. While dealing with transaction levels is outside
    the scope of this book, there are some additional caveats for dynamic cursors
    when related to transaction levels. All changes from committed transactions will
    be visible. However, the only way uncommitted transactions can be seen is if the
    transaction level of the cursor is set to uncommitted.


    Earlier in this section, I showed how to create a forward-only cursor. The interesting
    thing about creating cursors is that the code does not change significantly when
    switching between the various types of cursor. The largest difference between
    the cursor types is what data modifications each cursor can see and how the data
    is fetched. One of the largest temptations is that cursors work very similarly
    to application code. Instead of handling large quantities all at once, the cursors
    loop through data. In application code, this would be the preferred method of
    accessing data, which makes using cursors even more tempting.


    Where I have seen cursors most used is to handle processes that could be better
    handled by applications. You may find yourself in a situation where a cursor seems
    like one of the only solutions available. Looking at Listing [2-38](#480547_1_En_2_Chapter.xhtml#PC38),
    you can get an idea of what a dynamic cursor can look like.


    ```

    SET NOCOUNT ON;

    DECLARE @RecipeID INT,

    @RecipeName VARCHAR(25),

    @message VARCHAR(50);

    PRINT ''-------- Recipe Listing --------'';

    DECLARE recipe_cursor CURSOR DYNAMIC

    FOR

    SELECT RecipeID, RecipeName

    FROM dbo.Recipe

    ORDER BY RecipeID;

    OPEN recipe_cursor

    FETCH NEXT FROM recipe_cursor

    INTO @RecipeID, @RecipeName

    WHILE @@FETCH_STATUS = 0

    BEGIN

    PRINT '' ''

    SELECT @message = ''----- Ingredients For Recipe: '' + @RecipeName + ''-----''

    PRINT @message

    SELECT ing.IngredientName, srv.ServingPortionQuantity, srv.ServingPortionUnit

    FROM dbo.Ingredient ing

    INNER JOIN dbo.RecipeIngredient recing

    ON ing.IngredientID = recing.IngredientID

    INNER JOIN dbo.ServingPortion srv

    ON recing.ServingPortionID = srv.ServingPortionID

    WHERE recing.RecipeID = @RecipeID

    FETCH NEXT FROM recipe_cursor INTO @RecipeID, @RecipeName

    END

    CLOSE recipe_cursor;

    DEALLOCATE recipe_cursor;

    ```

    Listing 2-38: Creating a Dynamic Cursor


    Changing the cursor type from `FORWARD_ONLY` to `DYNAMIC` was as easy as swapping
    out the phrases for one another. The output of these cursors is also the same.
    The real difference that could have happened is behind the scenes. If a record
    had changed while the cursor was running, the forward-only cursor may not have
    been aware of that change, whereas the dynamic cursor may have been able to scroll
    to see that change or in certain scenarios the dynamic cursor may have seen the
    change before it was committed.


    Throughout this chapter, I have covered several different types of database objects
    that are available to use when writing T-SQL. These objects can help make code
    more readable. While some of these database objects can improve performance in
    the right circumstances, none of these database objects are designed to resolve
    every technical challenge. There are situations where using the wrong database
    objects can have negative performance impact on the database and your application
    code. Now that you know when to use each database object, it is time to start
    considering the quality of code you write.


    # 3. Standardizing T-SQL


    Before I start talking about how to write queries for complex scenarios, I want
    to focus on how to write good T-SQL. This is not about writing code that performs
    well. This is about writing T-SQL code that reads well. I want to go over how
    to write code so that it is easily readable to others and to yourself. If you
    are like me, you’ll get to a point in your career where you look at your own code
    and do not immediately understand all the logic involved.


    Writing T-SQL that is understandable helps you and your company. Many other coding
    languages have standards or best practices, and I believe that T-SQL should be
    no different. While the primary goal of writing T-SQL may be to implement a piece
    of functionality, no less important is the secondary goal of making sure that
    your T-SQL makes sense. Over time, code changes or bugs are found. The more readable
    and understandable your T-SQL code is, the easier it is to modify or troubleshoot.'
