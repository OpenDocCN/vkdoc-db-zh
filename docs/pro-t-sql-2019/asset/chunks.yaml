    \ GUI.\n\nYou can use unit tests to verify just about anything with your database\
    \ schema. Most of those unit tests will be for testing functionality for your\
    \ database objects like stored procedures, views, and functions. I may be biased,\
    \ but I hope you have far more stored procedures than views or queries. Do not\
    \ be concerned if you do not have any unit tests in place now. You can create\
    \ unit tests as you need them. This may mean that you do not have complete code\
