  trans: '

    与清单 13-11 中的逻辑类似，你可以创建一个名为`dbo.Recipe`的视图，以便应用程序今后能够与新表进行交互。根据原始表和新表的用途，你可能无法将所有代码都更新为使用这些新表。如果是这种情况，你可能不得不依赖触发器来更新这些表。


    ## 事务数据报表


    大多数应用程序使用的数据库设计用于处理大量事务。这些数据库的整体设计被称为**联机事务处理**或 OLTP。这类数据库通常设计为快速存储和检索数据。这种行为涉及对数据库的多次写入。然而，你的业务最终可能决定需要从运行某个应用程序的同一个数据库中获取信息。理想情况下，你只应让应用程序访问事务处理服务器上的数据库。你需要充分理解你的业务以及查询将对应用程序性能产生的影响。你可能能够运行非常简单的`SELECT`语句，这些语句只访问一小部分数据，而不会对你的应用程序产生负面影响。你应该尽一切努力，限制为应用程序之外的数据请求而给
    SQL Server 带来的额外负载。当为了报表目的而访问大量数据时，这可能会导致应用程序性能下降。这包括额外的 CPU 资源来生成执行计划，而这些计划可能已被从缓存中清除，以便为报表工作负载的运行查询腾出空间。在大量数据被移入内存以供报表使用后，存在于内存中的应用程序数据也可能面临从缓冲池中被清除的风险。这些问题可能演变成一种场景，即你的应用程序性能受到报表工作负载的影响。如果你发现自己处于需要直接从事务型数据库生成报表的情况，请与你的管理团队沟通，说明报表可能对你的应用程序产生的影响。


    当你需要访问数据来制作报表时，你需要从同一个数据库进行大量的读取操作。当你需要对该数据库中的数据制作报表时，就会发生这种类型的行为。除了事务型数据库在处理读取大量数据方面不如处理读取极小数据集那样出色之外，使用你的事务数据制作报表还可能遇到其他挑战。


    在某些情况下，收集这些报表数据可能很简单。可能涉及少量的连接（join），或者底层逻辑可能不太复杂。我发现，你可能最终编写了一份报表，但由于该报表的质量，你可能会被要求创建额外的报表。这些额外的报表可能涉及许多表，或者这些查询的整体逻辑可能更为复杂。这通常是因为这些表在设计时并未考虑报表需求。在某些情况下，你可能会发现自己被要求对不存在的数据制作报表。


    为了快速开发报表，最简单的方法通常是为每个单独的报表编写特定的逻辑。随着时间的推移，这可能会导致你最终拥有大量本应返回相同或相似结果但实际上可能并非如此的报表。最好的情况是结果相似但底层代码不同。随着业务可能会改变某些应用程序的功能，情况可能变得更加复杂。识别出一些需要更新的报表可能很容易，而其他报表则被遗漏，并开始返回不准确的结果。


    在某个时间点，你可能会收到一个请求，要求从事务数据中生成报表。通常，这些请求最初可能只是一个简单的一次性数据请求。在我们的场景中，一个用户可能希望能够访问制作意大利面的食谱和配料信息。虽然这可能始于运行一个查询并获取一些数据的请求，但你可能会发现，最终你的用户希望这个报表可以随时运行，或者由特定群体的人运行。到那时，你可能会编写一个类似于清单
    13-16 中的查询。

    '
- fmt: "## 重新思考报告查询设计\n\n### 硬编码查询的问题\n\n```sql\nSELECT\n    rec.RecipeName,\n   \
    \ rec.RecipeDescription,\n    rec.ServingQuantity,\n    recing.IsActive,\n   \
    \ ing.IngredientName\nFROM dbo.Recipe rec\nINNER JOIN dbo.RecipeIngredient recing\n\
    \    ON rec.RecipeID = recing.RecipeID\nINNER JOIN dbo.Ingredient ing\n    ON\
    \ recing.IngredientID = ing.IngredientID\nWHERE rec.RecipeName = 'Spaghetti';\n\
    ```\n**Listing 13-16: Spaghetti Ingredients**\n\n虽然报表开发的具体细节超出了本书的范围，但我很少遇到不需要定期从业务数据库请求某种报表数据的环境。前面的查询没有显示存储过程，但你也可以使用存储过程来选择这些数据。Listing\
    \ [13-16] 中查询的问题在于，它是硬编码的，只返回食谱“Spaghetti”的结果。\n\n### 报告需求的变化\n\n随着时间的推移，企业在分析数据时常常需要不同或额外的信息。这可能表现为需要一个新的报告来展示另一个食谱的信息。在我们的例子中，用户要求提供一个关于“Spinach\
    \ Frittatas”的报告。这也可能是一个用“Spinach Frittata”的报告替换“Spaghetti”报告的请求。无论哪种情况，你都需要创建一个类似\
    \ Listing [13-17] 中的查询。\n\n```sql\nSELECT\n    rec.RecipeName,\n    rec.RecipeDescription,\n\
    \    rec.ServingQuantity,\n    recing.IsActive,\n    ing.IngredientName\nFROM\
    \ dbo.Recipe rec\nINNER JOIN dbo.RecipeIngredient recing\n    ON rec.RecipeID\
    \ = recing.RecipeID\nINNER JOIN dbo.Ingredient ing\n    ON recing.IngredientID\
    \ = ing.IngredientID\nWHERE rec.RecipeName = 'Spinach Frittata';\n```\n**Listing\
    \ 13-17: Spinach Frittata Ingredients**\n\n虽然我们满足了为“Spaghetti”创建一个报告和为“Spinach\
    \ Frittata”创建新报告的要求，但也增加了维护报告的额外开销。Listing [13-16] 和 [13-17] 的查询是分开维护的。如果某个报告的数据提取方式发生变化，你需要记得另一个报告也可能需要更改。我们的下一步是分析这两个报告，看看是否能为两者创建一个统一的数据集。\n\
    \n### 合并数据集\n\n如果你发现自己处于这种情况，下一步就是弄清楚如何开始合并报告中的数据集。你首先需要识别哪些报告返回相似的结果。这些报告可以处理相同的业务应用或相同的功能。你需要创建一个返回该应用或功能所有相关信息的查询。这将是你用来更新现有报告的基础数据源。Listing\
    \ [13-18] 中的查询展示了编写一个可用于两个报告的查询的一种方法。\n\n```sql\nDECLARE @RecipeName VARCHAR(25)\n\
    \nSELECT\n    rec.RecipeName,\n    rec.RecipeDescription,\n    rec.ServingQuantity,\n\
    \    recing.IsActive,\n    ing.IngredientName\nFROM dbo.Recipe rec\nINNER JOIN\
    \ dbo.RecipeIngredient recing\n    ON rec.RecipeID = recing.RecipeID\nINNER JOIN\
    \ dbo.Ingredient ing\n    ON recing.IngredientID = ing.IngredientID\nWHERE rec.RecipeName\
    \ = @RecipeName;\n```\n**Listing 13-18: Recipe Ingredients from Several Joins**\n\
    \n在前面的查询中，我们使用了参数`@RecipeName`。这个参数允许我们为`@RecipeName`变量设置一个值。根据运行哪个报告，这个值可以更改。在使用报表服务器时，可以为每个报告设置`@RecipeName`的值。这种类型的查询允许你为多种类型的报表使用同一套代码。这使得你可以为“Spaghetti”和“Spinach\
    \ Frittata”使用相同的查询，或者为特定食谱的报告请求使用。\n\n创建 Listing [13-17] 中的查询使你的整体代码可重用。这可以解决与从业务数据生成报告相关的问题之一。从业务数据进行报告时可能出现的另一个问题是表之间逻辑的复杂性。在\
    \ Listing [13-19] 中，关于食谱和配料的信息已经被扁平化，以更贴近数据仓库的设计方式。\n\n```sql\nCREATE VIEW dbo.MealTypeInformation\n\
    AS\nSELECT\n    mel.MealTypeName,\n    mel.MealTypeDescription,\n    prp.PreparationTypeName,\n\
    \    prp.PreparationTypeDescription,\n    rec.RecipeName,\n    rec.RecipeDescription,\n\
    \    rec.ServingQuantity,\n    recing.IsActive RecipeIngredientIsActive,\n   \
    \ ing.IngredientName,\n    ing.IsActive AS IngredientIsActive\nFROM dbo.Recipe\
    \ rec\nINNER JOIN dbo.MealType mel\n    ON rec.MealTypeID = mel.MealTypeID\nINNER\
    \ JOIN dbo.PreparationType prp\n    ON rec.PreparationTypeID = prp.PreparationTypeID\n\
    INNER JOIN dbo.RecipeIngredient recing\n    ON rec.RecipeID = recing.RecipeID\n\
    INNER JOIN dbo.Ingredient ing\n    ON recing.IngredientID = ing.IngredientID;\n\
    ```\n**Listing 13-19: Recipe Information**\n\n与 Listing [13-18] 中的查询类似，Listing\
    \ [13-19] 中的查询旨在让你的 T-SQL 代码可在各种场景中重用。这种设计将降低你的查询或报告所需逻辑的复杂性。Listing [13-20] 中的查询与\
    \ Listing [13-18] 中的查询具有相同的功能。\n\n```sql\nCREATE PROCEDURE dbo.RecipeByRecipeName\n\
    \    @RecipeName VARCHAR(25)\nAS\nSELECT\n    mtp.RecipeName,\n    mtp.RecipeDescription,\n\
    \    mtp.ServingQuantity,\n    mtp.RecipeIngredientIsActive,\n    mtp.IngredientName\n\
    FROM dbo.MealTypeInformation mtp\nWHERE mtp.RecipeName = @RecipeName;\n```\n**Listing\
    \ 13-20: Recipe Ingredients from a View**\n\n这两个查询的主要区别在于，Listing [13-20] 所需的整体逻辑要简单直接得多。这可以使技术背景较弱的用户能够基于相同的数据集创建报告。虽然这有助于保持数据的一致性和易于访问，但这种方法可能不是性能最佳的。当使用这种方法访问数据进行报告时，请务必监控性能，并确认报告能够在超时前返回数据。\n\
    \n这个基础数据集随后可以用于你所有的报告中。一旦你更新了报告以使用这个基础数据集，你就确认了这个数据集将能够满足你未来的报告需求。这让你了解到，如果你想向数据仓库迈进，你将需要什么样的数据结构。"
  raw: '```

    SELECT

    rec.RecipeName,

    rec.RecipeDescription,

    rec.ServingQuantity,

    recing.IsActive,

    ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    WHERE rec.RecipeName = ''Spaghetti'';

    Listing 13-16

    Spaghetti Ingredients

    ```


    While the specifics of report development is outside of the scope of this book,
    I have seldom worked in an environment where some type of reporting data was not
    regularly requested off the transactional databases. The preceding query does
    not show a stored procedure, but you could just as easily use a stored procedure
    to select this data. The issue with the query in Listing [13-16](#480547_1_En_13_Chapter.xhtml#PC16)
    is that it is hard-coded to only return results for the recipe Spaghetti.


    Over time, businesses often need different or additional information when it comes
    to analyzing data. This can come in the format of needing a new report showing
    information about another recipe. In our example, our users have asked for a report
    with information about Spinach Frittatas. This could have also been a request
    to replace the report for Spaghetti with a report for Spinach Frittata. In either
    scenario, you would need to create a query like the one in Listing [13-17](#480547_1_En_13_Chapter.xhtml#PC17).


    ```

    SELECT

    rec.RecipeName,

    rec.RecipeDescription,

    rec.ServingQuantity,

    recing.IsActive,

    ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    WHERE rec.RecipeName = ''Spinach Frittata'';

    Listing 13-17

    Spinach Frittata Ingredients

    ```


    While we have met the requirements for creating one report for Spaghetti and new
    report for Spinach Frittata, we have also added additional overhead to maintaining
    our reports. The queries from Listings [13-16](#480547_1_En_13_Chapter.xhtml#PC16)
    and [13-17](#480547_1_En_13_Chapter.xhtml#PC17) are maintained separately. If
    there are changes to how data is pulled from one report, you would need to remember
    that the other report may also need to be changed. Our next step would be to analyze
    these two reports and see if we can create one data set for both reports.


    If you find yourself in this situation, the next step is to figure out how to
    start collapsing the data sets in your reports. You will first want to identify
    which reports return similar results. These can be reports that deal with the
    same business application or the same functionality. You will want to create a
    query that returns all relevant information for that application or functionality.
    This will be the base data source that you can use to update your existing reports.
    The query in Listing [13-18](#480547_1_En_13_Chapter.xhtml#PC18) shows one way
    to write a query that can be used for both reports.


    ```

    DECLARE @RecipeName VARCHAR(25)

    SELECT

    rec.RecipeName,

    rec.RecipeDescription,

    rec.ServingQuantity,

    recing.IsActive,

    ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    WHERE rec.RecipeName = @RecipeName;

    Listing 13-18

    Recipe Ingredients from Several Joins

    ```


    In the preceding query, we are using a parameter @RecipeName. This parameter allows
    us to set a value for the @RecipeName variable. This value can be changed depending
    on which report is being run. When it comes to using Report Server, the value
    for @RecipeName can be set for each report. This type of query can allow you to
    use a single set of code for multiple types of report. This allows you to use
    the same query for Spaghetti and Spinach Frittata or a report request for a specific
    recipe.


    Creating the query in Listing [13-17](#480547_1_En_13_Chapter.xhtml#PC17) allows
    your overall code to be reusable. This can solve one of the issues related to
    generating reports off transactional data. Another issue that can occur when reporting
    off transactional data is the intricacy of the logic between the tables. In Listing
    [13-19](#480547_1_En_13_Chapter.xhtml#PC19), the information about recipes and
    ingredients has been flattened to more closely align with how a data warehouse
    is designed.


    ```

    CREATE VIEW dbo.MealTypeInformation

    AS

    SELECT

    mel.MealTypeName,

    mel.MealTypeDescription,

    prp.PreparationTypeName,

    prp.PreparationTypeDescription,

    rec.RecipeName,

    rec.RecipeDescription,

    rec.ServingQuantity,

    recing.IsActive RecipeIngredientIsActive,

    ing.IngredientName,

    ing.IsActive AS IngredientIsActive

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType mel

    ON rec.MealTypeID = mel.MealTypeID

    INNER JOIN dbo.PreparationType prp

    ON rec.PreparationTypeID = prp.PreparationTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID;

    Listing 13-19

    Recipe Information

    ```


    Like the query in Listing [13-18](#480547_1_En_13_Chapter.xhtml#PC18), the query
    in Listing [13-19](#480547_1_En_13_Chapter.xhtml#PC19) is designed to allow your
    T-SQL code to be reusable for a variety of scenarios. The design will decrease
    the complexity of the logic required for your queries or reports. The query in
    Listing [13-20](#480547_1_En_13_Chapter.xhtml#PC20) has the same functionality
    as the query in Listing [13-18](#480547_1_En_13_Chapter.xhtml#PC18).


    ```

    CREATE PROCEDURE dbo.RecipeByRecipeName

    @RecipeName VARCHAR(25)

    AS

    SELECT

    mtp.RecipeName,

    mtp.RecipeDescription,

    mtp.ServingQuantity,

    mtp.RecipeIngredientIsActive,

    mtp.IngredientName

    FROM dbo.MealTypeInformation mtp

    WHERE mtp.RecipeName = @RecipeName;

    Listing 13-20

    Recipe Ingredients from a View

    ```


    The main difference between these two queries is that the overall logic required
    for Listing [13-20](#480547_1_En_13_Chapter.xhtml#PC20) is much simpler and more
    straightforward. This can allow less technical users the ability to create reports
    off this same data set. While this can help keep data consistent and easy to access,
    this method may not have the best performance. When using this method to access
    your data for reporting, be sure to monitor performance and confirm that the reports
    are returning data without timing out.


    This base data set can then be used throughout all your reports. Once you have
    updated the reports to use this base data set, you are now confirming that this
    data set will be able to handle your reporting needs going forward. This gives
    you an idea of the structure of the data that you will need if you would like
    to move toward a data warehouse.'
  trans: "## 重新思考报告查询设计\n\n### 硬编码查询的问题\n\n```sql\nSELECT\n    rec.RecipeName,\n \
    \   rec.RecipeDescription,\n    rec.ServingQuantity,\n    recing.IsActive,\n \
    \   ing.IngredientName\nFROM dbo.Recipe rec\nINNER JOIN dbo.RecipeIngredient recing\n\
    \    ON rec.RecipeID = recing.RecipeID\nINNER JOIN dbo.Ingredient ing\n    ON\
    \ recing.IngredientID = ing.IngredientID\nWHERE rec.RecipeName = 'Spaghetti';\n\
    ```\n**代码清单 13-16：意大利面食材**\n\n虽然报表开发的具体细节超出了本书的范围，但我很少遇到不需要定期从业务数据库请求某种报表数据的环境。前面的查询没有显示存储过程，但你也可以使用存储过程来选择这些数据。代码清单\
    \ [13-16] 中查询的问题在于，它是硬编码的，只返回食谱“Spaghetti”的结果。\n\n### 报告需求的变化\n\n随着时间的推移，企业在分析数据时常常需要不同或额外的信息。这可能表现为需要一个新的报告来展示另一个食谱的信息。在我们的例子中，用户要求提供一个关于“菠菜菜肉馅煎蛋饼”的报告。这也可能是一个用“菠菜菜肉馅煎蛋饼”的报告替换“意大利面”报告的请求。无论哪种情况，你都需要创建一个类似代码清单\
    \ [13-17] 中的查询。\n\n```sql\nSELECT\n    rec.RecipeName,\n    rec.RecipeDescription,\n\
    \    rec.ServingQuantity,\n    recing.IsActive,\n    ing.IngredientName\nFROM\
    \ dbo.Recipe rec\nINNER JOIN dbo.RecipeIngredient recing\n    ON rec.RecipeID\
    \ = recing.RecipeID\nINNER JOIN dbo.Ingredient ing\n    ON recing.IngredientID\
    \ = ing.IngredientID\nWHERE rec.RecipeName = 'Spinach Frittata';\n```\n**代码清单\
    \ 13-17：菠菜菜肉馅煎蛋饼食材**\n\n虽然我们满足了为“意大利面”创建一个报告和为“菠菜菜肉馅煎蛋饼”创建新报告的要求，但也增加了维护报告的额外开销。代码清单\
    \ [13-16] 和 [13-17] 的查询是分开维护的。如果某个报告的数据提取方式发生变化，你需要记得另一个报告也可能需要更改。我们的下一步是分析这两个报告，看看是否能为两者创建一个统一的数据集。\n\
    \n### 合并数据集\n\n如果你发现自己处于这种情况，下一步就是弄清楚如何开始合并报告中的数据集。你首先需要识别哪些报告返回相似的结果。这些报告可以处理相同的业务应用或相同的功能。你需要创建一个返回该应用或功能所有相关信息的查询。这将是你用来更新现有报告的基础数据源。代码清单\
    \ [13-18] 中的查询展示了编写一个可用于两个报告的查询的一种方法。\n\n```sql\nDECLARE @RecipeName VARCHAR(25)\n\
    \nSELECT\n    rec.RecipeName,\n    rec.RecipeDescription,\n    rec.ServingQuantity,\n\
    \    recing.IsActive,\n    ing.IngredientName\nFROM dbo.Recipe rec\nINNER JOIN\
    \ dbo.RecipeIngredient recing\n    ON rec.RecipeID = recing.RecipeID\nINNER JOIN\
    \ dbo.Ingredient ing\n    ON recing.IngredientID = ing.IngredientID\nWHERE rec.RecipeName\
    \ = @RecipeName;\n```\n**代码清单 13-18：通过多个联接获取的食谱食材**\n\n在前面的查询中，我们使用了参数 `@RecipeName`。这个参数允许我们为\
    \ `@RecipeName` 变量设置一个值。根据运行哪个报告，这个值可以更改。在使用报表服务器时，可以为每个报告设置 `@RecipeName` 的值。这种类型的查询允许你为多种类型的报表使用同一套代码。这使得你可以为“意大利面”和“菠菜菜肉馅煎蛋饼”使用相同的查询，或者为特定食谱的报告请求使用。\n\
    \n创建代码清单 [13-17] 中的查询使你的整体代码可重用。这可以解决与从业务数据生成报告相关的问题之一。从业务数据进行报告时可能出现的另一个问题是表之间逻辑的复杂性。在代码清单\
    \ [13-19] 中，关于食谱和配料的信息已经被扁平化，以更贴近数据仓库的设计方式。\n\n```sql\nCREATE VIEW dbo.MealTypeInformation\n\
    AS\nSELECT\n    mel.MealTypeName,\n    mel.MealTypeDescription,\n    prp.PreparationTypeName,\n\
    \    prp.PreparationTypeDescription,\n    rec.RecipeName,\n    rec.RecipeDescription,\n\
    \    rec.ServingQuantity,\n    recing.IsActive RecipeIngredientIsActive,\n   \
    \ ing.IngredientName,\n    ing.IsActive AS IngredientIsActive\nFROM dbo.Recipe\
    \ rec\nINNER JOIN dbo.MealType mel\n    ON rec.MealTypeID = mel.MealTypeID\nINNER\
    \ JOIN dbo.PreparationType prp\n    ON rec.PreparationTypeID = prp.PreparationTypeID\n\
    INNER JOIN dbo.RecipeIngredient recing\n    ON rec.RecipeID = recing.RecipeID\n\
    INNER JOIN dbo.Ingredient ing\n    ON recing.IngredientID = ing.IngredientID;\n\
    ```\n**代码清单 13-19：食谱信息**\n\n与代码清单 [13-18] 中的查询类似，代码清单 [13-19] 中的查询旨在让你的 T-SQL\
    \ 代码可在各种场景中重用。这种设计将降低你的查询或报告所需逻辑的复杂性。代码清单 [13-20] 中的查询与代码清单 [13-18] 中的查询具有相同的功能。\n\
    \n```sql\nCREATE PROCEDURE dbo.RecipeByRecipeName\n    @RecipeName VARCHAR(25)\n\
    AS\nSELECT\n    mtp.RecipeName,\n    mtp.RecipeDescription,\n    mtp.ServingQuantity,\n\
    \    mtp.RecipeIngredientIsActive,\n    mtp.IngredientName\nFROM dbo.MealTypeInformation\
    \ mtp\nWHERE mtp.RecipeName = @RecipeName;\n```\n**代码清单 13-20：从视图获取的食谱食材**\n\n\
    这两个查询的主要区别在于，代码清单 [13-20] 所需的整体逻辑要简单直接得多。这可以使技术背景较弱的用户能够基于相同的数据集创建报告。虽然这有助于保持数据的一致性和易于访问，但这种方法可能不是性能最佳的。当使用这种方法访问数据进行报告时，请务必监控性能，并确认报告能够在超时前返回数据。\n\
    \n这个基础数据集随后可以用于你所有的报告中。一旦你更新了报告以使用这个基础数据集，你就确认了这个数据集将能够满足你未来的报告需求。这让你了解到，如果你想向数据仓库迈进，你将需要什么样的数据结构。"
- fmt: '## Dynamic SQL


    Depending on what `T-SQL` code you are trying to write, you may find it difficult
    to write your database code to use set-based design. In those situations, it may
    be tempting to write your code in a way that is more iterative. You may want to
    write `T-SQL` code that is highly variable and can be modified depending on the
    parameters and values passed into it. Using dynamic SQL may seem like the solution
    you have been wanting. In most cases, the drawbacks of dynamic SQL can far outweigh
    the benefits, but there are times where dynamic SQL can be one of the right solutions.


    ### Execution Plan Impact

    Previously in Chapter 7, I covered how you can read execution plans. When using
    dynamic SQL, a new execution plan will need to be calculated each time the query
    is executed. This causes additional strain on the database engine.


    ### Use Cases and Appeal

    Most of the cases where you would want to use dynamic SQL involve times when you
    need additional flexibility. Many of the times where dynamic SQL is desirable
    relate to database administration activities. Most of these activities involve
    performing the same actions on more than one database on the `SQL Server` instance.
    There is some additional functionality available with dynamic SQL that can make
    using dynamic SQL especially appealing.

    When executing `T-SQL`, you cannot use a database name or a table name as a variable
    in standard `T-SQL`. Using dynamic SQL gives you the option to write queries that
    can be executed on more than database object.


    ### Dynamic SQL Example

    The query in Listing 13-21 shows an example of dynamic SQL.

    ```sql

    CREATE PROCEDURE dbo.TableByDynamicValues

    @TableName VARCHAR(100),

    @ColumnName VARCHAR(25),

    @ColumnValue VARCHAR(25)

    AS

    DECLARE @ObjectID INT;

    DECLARE @ColumnList VARCHAR(500);

    DECLARE @Query NVARCHAR(1000);

    SELECT @ObjectID = OBJECT_ID(@TableName);

    SELECT @ColumnList = STRING_AGG (ISNULL([name],''*''), '','')

    FROM sys.columns

    WHERE [object_id] = @ObjectID

    AND [name] NOT IN (''IsActive'',''DateCreated'',''DateModified'');

    SET @Query =

    ''SELECT '' + @ColumnList +

    '' FROM '' + @TableName +

    '' WHERE '' + @ColumnName + '' = @ColumnValue'';

    EXECUTE sp_executesql @Query,

    N''@ColumnName NVARCHAR(25), @ColumnValue NVARCHAR(25)'',

    @ColumnName = @ColumnName,

    @ColumnValue = @ColumnValue;

    ```

    Listing 13-21 Dynamically Retrieve Data from Tables


    The preceding query allows a user or application to pass in a table name. This
    is the table name that will be queried for values. The other two parameters allow
    a column name and a column value to be passed in as part of the query. This column
    name is what will be used to filter the data out.


    ### Execution and Results

    There are some examples of how this code would function in Listing 13-22.

    ```sql

    EXECUTE dbo.TableByDynamicValues ''Recipe'', ''RecipeName'', ''Spaghetti'';

    EXECUTE dbo.TableByDynamicValues ''Ingredient'', ''IngredientName'', ''Tomato
    Sauce'';

    ```

    Listing 13-22 Execute Store Procedure with Different Values


    There are two occurrences of the same stored procedure in Listing 13-22. The first
    execution will return results from the `Recipe` table. The second execution will
    return results from the `Ingredient` table. Executing the queries in Listing 13-22,
    you will get the results in Table 13-4.


    | Recipe ID | Recipe Name | Recipe Description | Serving Quantity | Meal Type
    ID | Preparation Type ID |

    | --- | --- | --- | --- | --- | --- |

    | 1 | Spaghetti | Pasta dinner | 8 | 2 | 1 |


    | Ingredient ID | Ingredient Name |

    | --- | --- |

    | 2 | Tomato Sauce |


    The first set of data returned are the columns from the `Recipe` table for the
    `RecipeName` of `Spaghetti`. The stored procedure in Listing 13-21 excludes the
    columns `IsActive`, `DateCreated`, and `DateModified`. All other columns in the
    table are returned. The values in the second data set is the record from the `Ingredient`
    table for the `IngredientName` of `Tomato Sauce`. From a software development
    perspective, this may seem like the ideal method to use when writing database
    code.


    ### Drawbacks and Cautions

    However, this method of using `T-SQL` does not take how the database engine executes
    a query into considerations. This will cause `SQL Server` to generate a new execution
    plan each time the stored procedure is executed as the data being requested can
    change dramatically between each execution. While it may seem like dynamic SQL
    can help make your application code more flexible, there is a cost to this method
    of writing `T-SQL`. In general, I would avoid using dynamic SQL for most scenarios
    when I would need to write `T-SQL` code. Trying to write your code without dynamic
    SQL will encourage you to practice writing database code in a manner that uses
    the strengths of the `SQL Server` database engine.


    Using dynamic SQL can also increase the risk that additional `T-SQL` code is executed
    beyond the purpose you originally intended. This type of behavior is referred
    to as SQL injection. The concept of SQL injection is that additional `T-SQL` code
    is inserted, or injected, into the original statement. The additional `T-SQL`
    code that has been inserted allows for functionality that was not originally intended
    for the query execution. This can include viewing data that should not be accessible
    to this user. That same user may also be able to modify data or database objects
    through SQL injection. If you want to use dynamic SQL, you can minimize the risk
    of SQL injection by using parameters to pass values to the dynamic SQL. The method
    of parameterizing the dynamic SQL will make it more difficult for users to view
    or modified data in ways that you did not intend.


    ### Writing Effective T-SQL

    When writing `T-SQL` code, you want to write code that is functional and effective.
    This means writing code that is readable and maintainable. Writing code that can
    grow with your business is also a critical skill. If you are writing code to handle
    inserts and updates or variety of data modifications, you want to make sure you
    are writing code that is easily understood and supported going forward. During
    application development, consider how you want to handle disabling permissions
    or application functionality. If not, you will want to consider strategies that
    will allow you to deactivate data values in a way that does not break relationships
    between the tables in your database.

    You may also have to support legacy code. One of the challenges with supporting
    legacy code is making changes without breaking existing functionality. There are
    times you may need to pull data for reporting from your transactional database.
    Try to design your queries to allow for flexibility and reusability. While flexibility
    is good, also use caution as to how much flexibility you implement in your `T-SQL`
    code. After improving the functionality of your database code, you may find that
    you want to determine how to track changes to your data.'
