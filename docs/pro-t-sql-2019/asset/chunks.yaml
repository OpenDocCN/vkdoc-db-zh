  trans: '

    如果我开始着手修改一个用于查询数据的存储过程，我可能还需要测试与该数据相关的插入操作。例如，我可能正在更新存储过程 `dbo.GetRecipeAndIngredientByMealTypeID`，使其仅返回有效的食谱。我可以通过为无效食谱创建一个单元测试，再为有效食谱创建一个单元测试，来对该存储过程进行单元测试。我还可以使用集成测试来确认，在创建新食谱后，该存储过程是否仍能返回预期结果。这类测试现在可能看似微不足道，但随着应用程序的发展和成熟，它们会变得越来越有用。我注意到，有时业务部门需要答案的速度比提供答案的速度更快，这有时会导致数据库对象的使用方式偏离其最初设计意图。


    ## 插入与查询的集成测试


    我的集成测试将包括向 `dbo.Recipe` 表中插入一条新食谱记录。插入记录后，我将执行 `dbo.GetRecipeAndIngredientByMealTypeID`
    存储过程，以验证新插入的食谱是否被返回。用于向 `dbo.Recipe` 表插入记录的存储过程如清单 11-5 所示。


    ```sql

    CREATE OR ALTER PROCEDURE dbo.InsertRecepie

    @RecipeName        VARCHAR(25),

    @RecipeDescription VARCHAR(50),

    @ServingQuantity   TINYINT,

    @MealTypeID        TINYINT,

    @PreparationTypeID TINYINT,

    @IsActive          BIT,

    @DateCreated       DATETIME2(7),

    @DateModified      DATETIME2(7)

    AS

    INSERT INTO dbo.Recipe

    (

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive

    )

    VALUES

    (

    @RecipeName,

    @RecipeDescription,

    @ServingQuantity,

    @MealTypeID,

    @PreparationTypeID,

    @IsActive

    )

    ```

    清单 11-5：向 `dbo.Recipe` 表插入记录


    ## 用于查询的存储过程


    既然我知道了如何向数据库添加食谱，我还应该更清楚地了解将要使用的查询存储过程。在清单 11-6 中，你可以看到存储过程 `dbo.GetRecipeAndIngredientByMealTypeID`。


    ```sql

    CREATE OR ALTER PROCEDURE dbo.GetRecipeAndIngredientByMealTypeID

    @MealTypeID     INT

    AS

    SELECT

    rec.RecipeName,

    ingr.IngredientName,

    ingr.IsActive,

    ingr.DateCreated,

    ingr.DateModified

    FROM dbo.Recipe rec

    INNER JOIN dbo.RecipeIngredient recingr

    ON rec.RecipeID = recingr.RecipeID

    LEFT OUTER JOIN dbo.Ingredient ingr

    ON recingr.IngredientID = ingr.IngredientID

    WHERE rec.MealTypeID = @MealTypeID

    ORDER BY rec.RecipeName, ingr.IngredientName;

    ```

    清单 11-6：按用餐类型查询食谱和食材


    ## 执行手动集成测试


    为了进行集成测试，我需要编写一些代码来插入食谱。之后，我将运行第二个存储过程。我可以将这些结果插入到一个临时表中，然后验证通过第一个存储过程创建的食谱是否存在于第二个存储过程返回的结果中。在下面清单
    11-7 的示例中，我还需要为该食谱添加一些食材，以便 `dbo.GetRecipeAndIngredientByMealTypeID` 存储过程能够返回一些结果。


    ```sql

    DECLARE @RecipeID INT

    DECLARE @MealTypeID INT

    EXECUTE dbo.InsertRecepie

    @RecipeName = ''Eggplant Parmesan'',

    @RecipeDescription = ''A recipe to make eggplant parmesan'',

    @ServingQuantity = 6,

    @MealTypeID = @MealTypeID,

    @PreparationTypeID = 1,

    @IsActive = 1

    EXECUTE dbo.InsertRecipeIngredient

    @RecipeID

    INSERT INTO @RecipeMeal (RecipeName, IngredientName, IsActive, DateCreated, DateModified)

    EXECUTE dbo.GetRecipeAndIngredientByMealTypeID @MealTypeID

    SELECT RecipeName

    FROM @RecipeMeal

    WHERE RecipeID = @RecipeID

    ```

    清单 11-7：手动集成测试


    ## 确定测试内容及其原因


    在确定应进行哪些集成测试时，需要考虑与你正在编写的 T-SQL 代码相关的任何依赖关系。


    某些 T-SQL 代码比其他代码更明显需要集成测试。我发现最需要集成测试的场景之一涉及返回相同数据的不同数据库对象。这可能是两个不同的存储过程。集成测试也可能用于比较函数与存储过程之间，或视图与函数之间的结果。虽然这些数据库对象返回的结果集可能包含不同的列或列的顺序不同，但相同的列是可以进行比较的。


    其他时候，你可能会遇到这样的 T-SQL 代码：一个数据库对象依赖于前一步骤处理的数据。你可能有一个用于更新表中值的存储过程。一个视图或存储过程可能只返回特定的值子集。使用集成测试可以让你执行第一个存储过程来更新表中的查找值。根据测试要求，你可以执行存储过程并确认记录出现。除非该记录不应再出现，否则你可以使用集成测试来确认该记录不再出现。


    这种情况的一个常见场景是，当你想在应用程序中对数据记录进行软删除或禁用时。你可以使用一组 T-SQL 来禁用记录。然后，可能有一个或多个数据库对象需要测试，以确认被禁用的记录不再显示。创建一种将所有集成测试场景集中管理并确保其可重复的方法，将是未来保护你应用程序的关键。现在对你的代码进行集成测试，可以确认当前版本的
    T-SQL 代码能够通过测试。然而，将集成测试自动化并使其可重复，将使你能够持续验证新的错误没有被引入到你的 T-SQL 代码中。


    根据系统的设计和复杂性，你可能会有在一个应用程序中输入，然后被发送到或被另一个应用程序使用的数据。在整个业务活动中，这些数据最终可能出现在不同的数据库或不同的表中。这可能涉及贯穿你业务流程的数据处理的不同阶段。这也可能包括在事务型数据库和数据仓库之间进行集成测试。以这种方式使用集成测试有助于确保应用程序中输入的数据在迁移到数据仓库时保持一致性。


    存在更多优雅的方法可以帮助进行集成测试。不过，我发现这些方法大多引用的是单元测试。将这些工具用于集成测试时，唯一的区别在于测试的编写方式。这意味着你可以像前面章节所示，使用
    `Visual Studio` 内置的单元测试功能。还有其他可用于单元测试和集成测试的工具，但本书将不作介绍。

    '
- fmt: '## Load Testing


    另一个与 SQL Server 相关的方面是快速处理大型数据集。人们常常希望功能上正确的 T-SQL 代码也能具有良好的性能。然而，情况并非总是如此。虽然我们可以使用执行计划来很好地了解查询的相对性能，但这并不能保证代码在高负载下表现良好。如果我们想了解
    T-SQL 代码在压力下的表现，就需要进行负载测试。


    负载测试带来了一些非常特殊的问题。一个挑战是硬件通常介于负载测试环境和生产环境之间。除了硬件差异，较低级别环境中的数据通常也存在差异。这可能包括较低环境中数据较少，或者较低环境中的数据被清洗过并具有不同的统计信息。其他差异可能包括较低环境中输入的数据与生产环境不匹配。在许多情况下，这些差异无法解决。


    除非你拥有完全相同的硬件和完全相同的生产数据库，否则你的负载测试不可能与生产环境完全一致。尝试对 T-SQL 代码进行负载测试仍然是有益的。即使你无法创建完美的负载测试环境，你仍然可以在负载测试环境中比较
    T-SQL 代码的相对性能。下一步是弄清楚如何实施负载测试。一个简单但不太可靠的方法是创建 T-SQL 脚本来生成虚拟负载测试数据。这种方法会让你对性能有一个大致的了解，但如果没有对现有生产数据进行深入分析，它就不能准确反映生产性能。


    有几种第三方工具可用于负载测试，其中许多是免费的。这些工具应该能让开始负载测试变得更容易。然而，你面临着同样的问题，即这些测试可能无法准确反映生产活动。另一个选项是使用分布式重放来收集生产环境中的事务，并在较低的环境中重放它们。虽然在开发
    T-SQL 代码时，实施负载测试是一个重要方面，但进行负载测试所需的步骤超出了本书的范围。


    ## Static Code Analysis


    在编写 T-SQL 代码时，创建格式化和开发 T-SQL 编码标准仅仅是一个开始。在第 [3](#480547_1_En_3_Chapter.xhtml)
    章中，我谈到了标准化你的 T-SQL 代码。T-SQL 编码标准在第 [9](#480547_1_En_9_Chapter.xhtml) 章中进行了介绍。这些标准只有在被遵循时才是有用的。很多时候，这些标准很长，可能很难记住。确保这些标准被遵循，有比试图记住所有规则更好的方法。静态代码分析可用于确认你的标准是否得到遵循。


    正如本书前面所讨论的，标准化你和你的同事编写 T-SQL 的方式是有好处的。这可以使代码更易于阅读，并节省调试 T-SQL 代码问题的时间。不幸的是，如果签入源代码管理的
    T-SQL 代码不符合格式化标准，就无法实现标准化的好处。这就是静态代码分析可以提供帮助的一种情况。


    静态代码分析允许你编写 T-SQL 代码。这些代码可以被保存并签入源代码管理。在部署数据库代码之前，使用静态代码分析来验证签入的 T-SQL 代码是否符合编码标准。虽然有强制
    T-SQL 格式化的选项，但主要使用的选项是第三方工具。


    除了使用静态代码分析来标准化数据库代码的格式之外，你还可以将其用于数据库编码标准。`Visual Studio 2017` 中有内置功能。你可以通过从“属性”菜单中选择“代码分析”选项来找到图
    [11-10](#480547_1_En_11_Chapter.xhtml#Fig10) 中的窗口。


    ![../images/480547_1_En_11_Chapter/480547_1_En_11_Fig10_HTML.jpg](images/480547_1_En_11_Chapter/480547_1_En_11_Fig10_HTML.jpg)


    图 11-10


    数据库项目中的代码分析


    你可以选择在每次构建数据库项目时运行代码分析。你还可以选择哪些项目应作为代码分析的一部分包含在内。这些选项包括最佳实践以及可能影响 T-SQL 代码性能的项目。此外，还可以选择将其中一些规则升级为错误并导致失败，而不是发送警告消息。


    静态代码分析的好处是它自动化了确保 T-SQL 代码符合你业务编码标准的过程。这可以帮助代码被拒绝时感觉不那么针对个人，因为代码是作为整个构建过程的一部分被审查和拒绝的。构建过程也会以一致的方式传达警告或错误消息。


    将数据库代码纳入源代码管理只是问题的一半。真正的挑战可能出现在尝试部署仅保存在源代码管理中的数据库变更时。确定你希望如何部署代码将帮助你确定保存 T-SQL
    代码的方法。从源代码管理部署 T-SQL 代码将在第 [12](#480547_1_En_12_Chapter.xhtml) 章中进一步讨论。


    ## 12. Deployment


    在软件开发过程中，总会有需要实现新功能的时候。新功能的一个普遍问题是如何在不影响当前性能的情况下实现该功能。对于当今的许多企业来说，让应用程序 24 小时不间断运行至关重要。这造成了一种情况，任何形式的停机或当前功能的损失都可能非常昂贵。虽然使用的部署方法有助于最小化与新功能相关的整体风险，但在编写新代码时，还有其他选项可以使用。


    经常出现的一个问题与软件开发方式与代码部署方式的关联有关。在许多项目中，实现新功能所需的时间长于部署 T-SQL 代码的频率。确定如何管理源代码管理可以减轻其中一些风险。有多种方法可以部署
    T-SQL 代码。了解这些方法以及使用它们的最佳时机将有助于改进你的数据库部署。在用户如何与数据库代码交互方面，也有一些可用的选项。'
  raw: '## Load Testing


    Another aspect of working with SQL Server is handling large data sets quickly.
    It is often easy to hope that T-SQL code that is functionally correct will also
    perform well. However, that is not always what happens. While we can use execution
    plans to get a good idea of the relative performance of a query, that does not
    guarantee that the code will perform well under a heavy load. If we want to get
    an idea of how the T-SQL code will perform under stress, we will need to perform
    load testing.


    Load testing presents some very special issues. One challenge is that the hardware
    is often between the load testing environment and Production. In addition to hardware
    differences, there is usually a difference in the data that exists in the lower
    environments. This can be anything from having less data in lower environments
    to the data in the lower environments being cleansed and having different statistics.
    Additional differences can include data that has been entered in the lower environments
    that does not match Production. In many cases, these differences cannot be resolved.


    Unless you have the exact hardware and the exact Production databases, your load
    testing will not match Production with complete certainty. It is still beneficial
    to try and load test your T-SQL code. Even if you are unable to create the perfect
    load testing environment, you can still compare relative performance of T-SQL
    code in your load testing environment. The next step is to figure out how to implement
    load testing. A simple but not very reliable method is to create T-SQL scripts
    to generate dummy load testing data. This method will give you a general idea
    of performance, but without significant analysis of existing Production data,
    it will not accurately reflect Production performance.


    There are several third-party tools available for load testing and many of them
    are free. These tools should make it simpler to begin load testing. However, you
    are faced with the same issue that these tests may not accurately reflect Production
    activity. Another option is to use distributed replay to collect the transactions
    from Production and replay them in your lower environments. While implementing
    load testing is an important aspect when developing your T-SQL code, the steps
    needed to load test are outside the scope of this book.


    ## Static Code Analysis


    Creating standards for formatting and developing T-SQL coding standards is only
    a start when it comes to writing T-SQL code. Back in Chapter [3](#480547_1_En_3_Chapter.xhtml),
    I wrote about standardizing your T-SQL code. T-SQL Coding Standards were covered
    in Chapter [9](#480547_1_En_9_Chapter.xhtml). These standards are only useful
    if they are followed. Many times, the standards are lengthy and can be difficult
    to remember. There are better ways to ensure these standards are followed than
    trying to remember all the rules. Static code analysis can be used to confirm
    that your standards are being followed.


    As discussed previously in this book, there are benefits to standardizing how
    you and your coworkers write T-SQL. This can make the code easier to read and
    save time debugging issues in the T-SQL code. Unfortunately, the benefits of standardization
    cannot be realized if the T-SQL code getting checked into source control does
    not match the formatting standards. This is one situation where static code analysis
    can help.


    The static code analysis allows you to write T-SQL code. This code can be saved
    and checked into source control. Prior to deploying the database code, static
    code analysis is used to verify that the checked in T-SQL code meets the coding
    standards. There are options to enforce T-SQL formatting, but the main option
    that is used is a third-party tool.


    In addition to using static code analysis for standardization of formatting for
    database code, you can use static code analysis for your database coding standards
    as well. There is built-in functionality in Visual Studio 2017\. You can find
    the window in Figure [11-10](#480547_1_En_11_Chapter.xhtml#Fig10) by selecting
    the Code Analysis option from the Properties menu.


    ![../images/480547_1_En_11_Chapter/480547_1_En_11_Fig10_HTML.jpg](images/480547_1_En_11_Chapter/480547_1_En_11_Fig10_HTML.jpg)


    Figure 11-10


    Code Analysis in Database Projects


    You can select code analysis to be run every time you build the database project.
    You also have the option of selecting which items should be included as part of
    your code analysis. These options include best practices and items that can help
    affect the performance of the T-SQL code. In addition, there is the option to
    escalate some of these rules to error and fail instead of sending a warning message.


    The benefit of static code analysis is that it automates the process of ensuring
    that the T-SQL code is meeting your business’ coding standards. This can help
    code rejections feel less personal, and the code is being reviewed and rejected
    as part of the overall build process. The build process will also communicate
    the warning or error message in a consistent method.


    Getting your database code into source control is only half of the issue. The
    real challenge can come when trying to deploy database changes that are only saved
    in source control. Determining how you want to deploy your code will help you
    determine what method to use to save your T-SQL code. Deploying T-SQL code from
    source control will be discussed further in Chapter [12](#480547_1_En_12_Chapter.xhtml).


    # 12. Deployment


    Throughout the course of developing software, there will come a time where you
    need to implement new functionality. One of the prevailing issues with new functionality
    is implementing that functionality in a manner that does not affect current performance.
    For many businesses today, the need to have applications up and running 24 hours
    a day is critical. This creates a scenario where any form of downtime or loss
    in current functionality can be incredibly expensive. While the deployment method
    used can help minimize the overall risk associated with new functionality, there
    are other options that can be used when writing new code.


    A frequent issue that comes up is related to how software is developed in correlation
    with how code is deployed. In the case of many projects, the amount of time needed
    to implement new functionality is greater than the frequency with which T-SQL
    code is deployed. Determining on how source control is managed can mitigate some
    of these risks. There are different ways T-SQL code can be deployed. Understanding
    these methods and the best times to use them will help improve your database deployments.
    There are also some options available when it comes to how your users interact
    with the database code.'
