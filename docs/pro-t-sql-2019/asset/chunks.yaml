- fmt: "# Commenting T-SQL\n\nWhile the primary goal of writing T-SQL is to allow\
    \ an application to do a specific action regarding data, almost equally important\
    \ is ensuring that others will understand your T-SQL code going forward. At the\
    \ very least, this makes sure that you are not the only one responsible for a\
    \ certain piece of code or business logic going forward. It also helps all your\
    \ other team members build confidence in their ability to do their job and their\
    \ understanding of the code behind the scenes.\n\nIn many cases, quickly scanning\
    \ the T-SQL code or looking at the name of a database object is not enough to\
    \ understand the purpose of the T-SQL code. In Listing [3-27](#480547_1_En_3_Chapter.xhtml#PC27),\
    \ there is sample T-SQL code for creating a header section at the top of your\
    \ database objects.\n\n```\n/*-------------------------------------------------------------*\\\
    \nName:             \nAuthor:           \nCreated Date:     \nDescription:   \
    \   \nSample Usage:\n\nChange Log:\nUpdate on  by : \nUpdate on  by : \n\\*-------------------------------------------------------------*/\n\
    Listing 3-27\nComment for Header of Persistent Database Object\n```\n\nThe purpose\
    \ of this heading is giving other users a summary of this database object at a\
    \ glance. Depending on the purpose for reviewing this T-SQL will determine what\
    \ is important to the user. For those that are not familiar with all the details\
    \ of the business applications, the description segment will provide a high-level\
    \ idea of the purpose of the T-SQL database object. Likewise, the sample usage\
    \ allows those looking into performance issues to understand how the applications\
    \ are using this piece of T-SQL code. The author of the database object can be\
    \ useful to determine if the original creator is still with the company to answer\
    \ more specific questions about the database object. If your databases are in\
    \ source control, you may decide to omit some of these fields. I will discuss\
    \ source control further in Chapter [10](#480547_1_En_10_Chapter.xhtml). In Listing\
    \ [3-28](#480547_1_En_3_Chapter.xhtml#PC28), you can see how the header information\
    \ would look while creating the view originally found in Listing [3-4](#480547_1_En_3_Chapter.xhtml#PC4).\n\
    \n```\n/*-------------------------------------------------------------*\\\nName:\
    \             dbo.AvailableMeal\nAuthor:           Elizabeth Noble\nCreated Date:\
    \     03/13/2019\nDescription:      Simple view to display all meals with ingredients\n\
    Sample Usage:\nSELECT MealTypeName, RecipeName FROM dbo.AvailableMeal\nChange\
    \ Log:\nUpdate on 03/31/2019 by enoble: Added header to view\n\\*-------------------------------------------------------------*/\n\
    CREATE VIEW dbo.AvailableMeal\nAS\nSELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity,\
    \ ing.IngredientName\nFROM dbo.Recipe rec\nINNER JOIN dbo.MealType meal\nON rec.MealTypeID\
    \ = meal.MealTypeID\nINNER JOIN dbo.RecipeIngredient recing\nON rec.RecipeID =\
    \ recing.RecipeID\nINNER JOIN dbo.Ingredient ing\nON recing.IngredientID = ing.IngredientID\n\
    Listing 3-28\nCreate a View with a Commented Header\n```\n\nSometimes it may be\
    \ enough to write simple T-SQL that is easily readable. However, there are other\
    \ times where a database object may have T-SQL code that is difficult to understand\
    \ at a quick glance. I often find one of the challenges in commenting after I’ve\
    \ written my code is that my comments are too technical to easily describe what\
    \ I am trying to accomplish. You will want to make sure that someone unfamiliar\
    \ with your code can easily understand the purpose of your T-SQL code.\n\nIf there\
    \ is any complex logic, you will want to clearly explain how the complex logic\
    \ works. This is especially true if you are using T-SQL coding practices that\
    \ are not best practices. Any explanation as to why non-standard practices were\
    \ chosen will help save others’ time to try and figure out why non-standard practices\
    \ were used. This can also save your team members’ time if you have already determined\
    \ that standard best practices will not perform well enough in the given situation.\
    \ Looking back to Listing [3-3](#480547_1_En_3_Chapter.xhtml#PC3), there is a\
    \ subquery in the `SELECT` statement. First writing this code, it may be obvious\
    \ why a subquery was used, but you may forget the reason in the future. In addition,\
    \ it is probably not obvious to others who read my code why I chose to include\
    \ a subquery for that column. In Listing [3-29](#480547_1_En_3_Chapter.xhtml#PC29),\
    \ I show how you can add commenting to help show how adding comments can make\
    \ it easier for you to quickly understand the purpose or logic of the code that\
    \ is written.\n\n```\nSELECT\n-- This subquery pulls back the recipe name based\
    \ on\n-- the ingredients in the recipe\n---- The logic uses a correlated subquery\
    \ between the\n---- where clause in the subquery\n---- and the table in the outer\
    \ query\n(\nSELECT rec.RecipeName\nFROM dbo.Recipe rec\nINNER JOIN dbo.RecipeIngredient\
    \ recingr\nON rec.RecipeID = recingr.RecipeID\nWHERE recingr.IngredientID = ingr.IngredientID\n\
    ) AS 'RecipeName',\ningr.IngredientName,\ningr.IsActive,\ningr.DateCreated,\n\
    ingr.DateModified\nFROM dbo.Ingredient ingr\nWHERE IngredientName LIKE '%Tomato%'\n\
    ORDER BY RecipeName, ingr.IngredientName\nListing 3-29\nQueries with Subqueries\n\
    ```\n\nIt is often easiest to include comments in your code if you start commenting\
    \ your T-SQL code even before you begin writing any T-SQL. In Listing [3-30](#480547_1_En_3_Chapter.xhtml#PC30),\
    \ you can see the header information and the beginning comments. The comments\
    \ specified indicate the concept behind writing the stored procedure.\n\n```\n\
    /*-------------------------------------------------------------*\\\nName:    \
    \         dbo.GetRecipeNutrition\nAuthor:           Elizabeth Noble\nCreated Date:\
    \     03/13/2019\nDescription: Lookup nutritional information for a given recipe\n\
    Sample Usage:\nDECLARE @RecipeID INT\nSET @RecipeID = 1\nEXECUTE dbo. GetRecipeNutrition\
    \ @RecipeID\n\\*-------------------------------------------------------------*/\n\
    -- Get the nutrition information for a recipe\n-- Since nutrition information\
    \ is saved per ingredient\n-- This will be a summary of nutrition information\n\
    -- per ingredient that is specified in the recipe\nListing 3-30\nCreate New Stored\
    \ Procedure\n```\n\nOnce you specify the general logic for the query, you can\
    \ move forward with writing the T-SQL so that these requirements are met. This\
    \ is often helpful if you usually find yourself rephrasing the code you have already\
    \ written instead of explaining the overall purpose of the code.\n\nWriting these\
    \ comments before writing any T-SQL code ensures the comments explain the purpose\
    \ of the stored procedure instead of how the code executes.\n\nYou should now\
    \ be prepared to start defining SQL formatting standards for yourself and in your\
    \ own organization. This will allow you and other members of your team to quickly\
    \ review your organization’s T-SQL code. In addition, I have discussed strategies\
    \ to use when providing additional documentation about your T-SQL code. Commenting\
    \ your T-SQL code will allow others to understand what the T-SQL code should be\
    \ doing both regarding business logic and advanced technical logic. I have also\
    \ covered options available when defining naming conventions for your organization.\
    \ Well-defined naming conventions should make it easier for anyone accessing the\
    \ database schema to know where to find database objects."
  raw: "As you can see, there are many considerations when it comes to naming your\
    \ T-SQL database objects. In many of these cases, a good name will help you easily\
    \ determine the purpose of the database object. In special circumstances, it can\
    \ also help you identify the type of object. While you would normally name your\
    \ objects after formatting and commenting the T-SQL, I saved the commenting for\
    \ last as it covers both the creation of the database object and the T-SQL code\
    \ that goes inside the database object.\n\n## Commenting T-SQL\n\nWhile the primary\
    \ goal of writing T-SQL is to allow an application to do a specific action regarding\
    \ data, almost equally important is ensuring that others will understand your\
    \ T-SQL code going forward. At the very least, this makes sure that you are not\
    \ the only one responsible for a certain piece of code or business logic going\
    \ forward. It also helps all your other team members build confidence in their\
    \ ability to do their job and their understanding of the code behind the scenes.\n\
    \nIn many cases, quickly scanning the T-SQL code or looking at the name of a database\
    \ object is not enough to understand the purpose of the T-SQL code. In Listing\
    \ [3-27](#480547_1_En_3_Chapter.xhtml#PC27), there is sample T-SQL code for creating\
    \ a header section at the top of your database objects.\n\n```\n/*-------------------------------------------------------------*\\\
    \nName:             \nAuthor:           \nCreated Date:     \nDescription:   \
    \   \nSample Usage:\n\nChange Log:\nUpdate on  by : \nUpdate on  by : \n\\*-------------------------------------------------------------*/\n\
    Listing 3-27\nComment for Header of Persistent Database Object\n```\n\nThe purpose\
    \ of this heading is giving other users a summary of this database object at a\
    \ glance. Depending on the purpose for reviewing this T-SQL will determine what\
    \ is important to the user. For those that are not familiar with all the details\
    \ of the business applications, the description segment will provide a high-level\
    \ idea of the purpose of the T-SQL database object. Likewise, the sample usage\
    \ allows those looking into performance issues to understand how the applications\
    \ are using this piece of T-SQL code. The author of the database object can be\
    \ useful to determine if the original creator is still with the company to answer\
    \ more specific questions about the database object. If your databases are in\
    \ source control, you may decide to omit some of these fields. I will discuss\
    \ source control further in Chapter [10](#480547_1_En_10_Chapter.xhtml). In Listing\
    \ [3-28](#480547_1_En_3_Chapter.xhtml#PC28), you can see how the header information\
    \ would look while creating the view originally found in Listing [3-4](#480547_1_En_3_Chapter.xhtml#PC4).\n\
    \n```\n/*-------------------------------------------------------------*\\\nName:\
    \             dbo.AvailableMeal\nAuthor:           Elizabeth Noble\nCreated Date:\
    \     03/13/2019\nDescription:      Simple view to display all meals with ingredients\n\
    Sample Usage:\nSELECT MealTypeName, RecipeName FROM dbo.AvailableMeal\nChange\
    \ Log:\nUpdate on 03/31/2019 by enoble: Added header to view\n\\*-------------------------------------------------------------*/\n\
    CREATE VIEW dbo.AvailableMeal\nAS\nSELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity,\
    \ ing.IngredientName\nFROM dbo.Recipe rec\nINNER JOIN dbo.MealType meal\nON rec.MealTypeID\
    \ = meal.MealTypeID\nINNER JOIN dbo.RecipeIngredient recing\nON rec.RecipeID =\
    \ recing.RecipeID\nINNER JOIN dbo.Ingredient ing\nON recing.IngredientID = ing.IngredientID\n\
    Listing 3-28\nCreate a View with a Commented Header\n```\n\nSometimes it may be\
    \ enough to write simple T-SQL that is easily readable. However, there are other\
    \ times where a database object may have T-SQL code that is difficult to understand\
    \ at a quick glance. I often find one of the challenges in commenting after I’ve\
    \ written my code is that my comments are too technical to easily describe what\
    \ I am trying to accomplish. You will want to make sure that someone unfamiliar\
    \ with your code can easily understand the purpose of your T-SQL code.\n\nIf there\
    \ is any complex logic, you will want to clearly explain how the complex logic\
    \ works. This is especially true if you are using T-SQL coding practices that\
    \ are not best practices. Any explanation as to why non-standard practices were\
    \ chosen will help save others’ time to try and figure out why non-standard practices\
    \ were used. This can also save your team members’ time if you have already determined\
    \ that standard best practices will not perform well enough in the given situation.\
    \ Looking back to Listing [3-3](#480547_1_En_3_Chapter.xhtml#PC3), there is a\
    \ subquery in the SELECT statement. First writing this code, it may be obvious\
    \ why a subquery was used, but you may forget the reason in the future. In addition,\
    \ it is probably not obvious to others who read my code why I chose to include\
    \ a subquery for that column. In Listing [3-29](#480547_1_En_3_Chapter.xhtml#PC29),\
    \ I show how you can add commenting to help show how adding comments can make\
    \ it easier for you to quickly understand the purpose or logic of the code that\
    \ is written.\n\n```\nSELECT\n-- This subquery pulls back the recipe name based\
    \ on\n-- the ingredients in the recipe\n---- The logic uses a correlated subquery\
    \ between the\n---- where clause in the subquery\n---- and the table in the outer\
    \ query\n(\nSELECT rec.RecipeName\nFROM dbo.Recipe rec\nINNER JOIN dbo.RecipeIngredient\
    \ recingr\nON rec.RecipeID = recingr.RecipeID\nWHERE recingr.IngredientID = ingr.IngredientID\n\
    ) AS 'RecipeName',\ningr.IngredientName,\ningr.IsActive,\ningr.DateCreated,\n\
    ingr.DateModified\nFROM dbo.Ingredient ingr\nWHERE IngredientName LIKE '%Tomato%'\n\
    ORDER BY RecipeName, ingr.IngredientName\nListing 3-29\nQueries with Subqueries\n\
    ```\n\nIt is often easiest to include comments in your code if you start commenting\
    \ your T-SQL code even before you begin writing any T-SQL. In Listing [3-30](#480547_1_En_3_Chapter.xhtml#PC30),\
    \ you can see the header information and the beginning comments. The comments\
    \ specified indicate the concept behind writing the stored procedure.\n\n```\n\
    /*-------------------------------------------------------------*\\\nName:    \
    \         dbo.GetRecipeNutrition\nAuthor:           Elizabeth Noble\nCreated Date:\
    \     03/13/2019\nDescription: Lookup nutritional information for a given recipe\n\
    Sample Usage:\nDECLARE @RecipeID INT\nSET @RecipeID = 1\nEXECUTE dbo. GetRecipeNutrition\
    \ @RecipeID\n\\*-------------------------------------------------------------*/\n\
    -- Get the nutrition information for a recipe\n-- Since nutrition information\
    \ is saved per ingredient\n-- This will be a summary of nutrition information\n\
    -- per ingredient that is specified in the recipe\nListing 3-30\nCreate New Stored\
    \ Procedure\n```\n\nOnce you specify the general logic for the query, you can\
    \ move forward with writing the T-SQL so that these requirements are met. This\
    \ is often helpful if you usually find yourself rephrasing the code you have already\
    \ written instead of explaining the overall purpose of the code.\n\nWriting these\
    \ comments before writing any T-SQL code ensures the comments explain the purpose\
    \ of the stored procedure instead of how the code executes.\n\nYou should now\
    \ be prepared to start defining SQL formatting standards for yourself and in your\
    \ own organization. This will allow you and other members of your team to quickly\
    \ review your organization’s T-SQL code. In addition, I have discussed strategies\
    \ to use when providing additional documentation about your T-SQL code. Commenting\
    \ your T-SQL code will allow others to understand what the T-SQL code should be\
    \ doing both regarding business logic and advanced technical logic. I have also\
    \ covered options available when defining naming conventions for your organization.\
    \ Well-defined naming conventions should make it easier for anyone accessing the\
    \ database schema to know where to find database objects."
  trans: "# T-SQL 注释\n\n虽然编写 T-SQL 的主要目的是让应用程序对数据执行特定操作，但确保其他人能够理解你未来的 T-SQL 代码同样重要。这至少能保证你不是唯一一个需要为某段代码或业务逻辑负责的人。它还能帮助你团队中的所有成员增强对自己工作能力以及对背后代码理解的信心。\n\
    \n在许多情况下，仅仅快速浏览 T-SQL 代码或查看数据库对象的名称，并不足以理解 T-SQL 代码的目的。在清单 3-27 中，提供了一个在数据库对象顶部创建标题部分的\
    \ T-SQL 示例代码。\n\n```\n/*-------------------------------------------------------------*\\\
    \nName:             \nAuthor:           \nCreated Date:     \nDescription:   \
    \   \nSample Usage:\n\nChange Log:\nUpdate on  by : \nUpdate on  by : \n\\*-------------------------------------------------------------*/\n\
    Listing 3-27\n持久化数据库对象的标题注释\n```\n\n这个标题的目的是让其他用户一眼就能了解该数据库对象的概要。审查此 T-SQL 的目的将决定对用户而言什么是重要的。对于那些不熟悉业务应用所有细节的人来说，描述部分能提供关于\
    \ T-SQL 数据库对象目的的高层次概念。同样，示例用法让那些调查性能问题的人能够理解应用程序是如何使用这段 T-SQL 代码的。数据库对象的作者有助于确定原始创建者是否仍在公司，以便回答有关该数据库对象的更具体问题。如果你的数据库置于源代码控制之下，你可能会决定省略某些字段。我将在第\
    \ 10 章进一步讨论源代码控制。在清单 3-28 中，你可以看到在创建最初见于清单 3-4 的视图时，标题信息会是什么样子。\n\n```\n/*-------------------------------------------------------------*\\\
    \nName:             dbo.AvailableMeal\nAuthor:           Elizabeth Noble\nCreated\
    \ Date:     03/13/2019\nDescription:      Simple view to display all meals with\
    \ ingredients\nSample Usage:\nSELECT MealTypeName, RecipeName FROM dbo.AvailableMeal\n\
    Change Log:\nUpdate on 03/31/2019 by enoble: Added header to view\n\\*-------------------------------------------------------------*/\n\
    CREATE VIEW dbo.AvailableMeal\nAS\nSELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity,\
    \ ing.IngredientName\nFROM dbo.Recipe rec\nINNER JOIN dbo.MealType meal\nON rec.MealTypeID\
    \ = meal.MealTypeID\nINNER JOIN dbo.RecipeIngredient recing\nON rec.RecipeID =\
    \ recing.RecipeID\nINNER JOIN dbo.Ingredient ing\nON recing.IngredientID = ing.IngredientID\n\
    Listing 3-28\n创建带注释标题的视图\n```\n\n有时，编写简单易读的 T-SQL 可能就足够了。然而，在其他情况下，数据库对象可能包含难以一眼看懂的\
    \ T-SQL 代码。我发现在编写代码后进行注释的一个挑战是，我的注释往往过于技术化，难以轻松描述我试图实现的目标。你需要确保不熟悉你代码的人能够轻松理解你的\
    \ T-SQL 代码的目的。\n\n如果有任何复杂的逻辑，你需要清晰地解释该复杂逻辑是如何工作的。如果你使用的 T-SQL 编码实践并非最佳实践，这一点尤其重要。任何关于为何选择非标准实践的解释，都将有助于节省他人试图弄清为何使用非标准实践的时间。如果你已经确定标准的最佳实践在给定情况下性能不够好，这也可以节省你团队成员的时间。回顾清单\
    \ 3-3，`SELECT` 语句中有一个子查询。在初次编写此代码时，使用子查询的原因可能是显而易见的，但未来你可能会忘记这个原因。此外，阅读我代码的其他人可能也不明显我为何选择为该列包含一个子查询。在清单\
    \ 3-29 中，我展示了如何添加注释来帮助说明添加注释如何让你更容易快速理解所编写代码的目的或逻辑。\n\n```\nSELECT\n-- This subquery\
    \ pulls back the recipe name based on\n-- the ingredients in the recipe\n----\
    \ The logic uses a correlated subquery between the\n---- where clause in the subquery\n\
    ---- and the table in the outer query\n(\nSELECT rec.RecipeName\nFROM dbo.Recipe\
    \ rec\nINNER JOIN dbo.RecipeIngredient recingr\nON rec.RecipeID = recingr.RecipeID\n\
    WHERE recingr.IngredientID = ingr.IngredientID\n) AS 'RecipeName',\ningr.IngredientName,\n\
    ingr.IsActive,\ningr.DateCreated,\ningr.DateModified\nFROM dbo.Ingredient ingr\n\
    WHERE IngredientName LIKE '%Tomato%'\nORDER BY RecipeName, ingr.IngredientName\n\
    Listing 3-29\n带子查询的查询\n```\n\n如果你甚至在开始编写任何 T-SQL 代码之前就开始为你的 T-SQL 代码添加注释，通常最容易将注释包含在代码中。在清单\
    \ 3-30 中，你可以看到标题信息和开头的注释。指定的注释表明了编写该存储过程背后的概念。\n\n```\n/*-------------------------------------------------------------*\\\
    \nName:             dbo.GetRecipeNutrition\nAuthor:           Elizabeth Noble\n\
    Created Date:     03/13/2019\nDescription: Lookup nutritional information for\
    \ a given recipe\nSample Usage:\nDECLARE @RecipeID INT\nSET @RecipeID = 1\nEXECUTE\
    \ dbo. GetRecipeNutrition @RecipeID\n\\*-------------------------------------------------------------*/\n\
    -- Get the nutrition information for a recipe\n-- Since nutrition information\
    \ is saved per ingredient\n-- This will be a summary of nutrition information\n\
    -- per ingredient that is specified in the recipe\nListing 3-30\n创建新的存储过程\n```\n\
    \n一旦你指定了查询的总体逻辑，就可以继续编写 T-SQL 以满足这些要求。如果你通常发现自己是在重述已编写的代码，而不是解释代码的总体目的，那么这样做通常很有帮助。\n\
    \n在编写任何 T-SQL 代码之前编写这些注释，可以确保注释解释的是存储过程的目的，而不是代码如何执行。\n\n现在，你应该准备好开始为你自己和你所在的组织定义\
    \ SQL 格式化标准了。这将使你和你团队的其他成员能够快速审查你组织的 T-SQL 代码。此外，我还讨论了在为你的 T-SQL 代码提供附加文档时可以使用的策略。为你的\
    \ T-SQL 代码添加注释将使其他人能够理解 T-SQL 代码应该做什么，包括业务逻辑和高级技术逻辑。我还介绍了在为你的组织定义命名约定时可用的选项。定义良好的命名约定应使任何访问数据库模式的人更容易知道在哪里可以找到数据库对象。"
- fmt: 'You should now be familiar with SQL Server data types and the best time to
    use them. You should also be comfortable with some of the various database objects
    that are available when writing your T-SQL. Now that you are also more familiar
    with how to style your code to improve readability and understanding, you are
    ready to learn more about designing T-SQL code using parameters, complex logic,
    and stored procedures.


    # 4. Designing T-SQL


    In the earlier chapters in the section on “Building Understandable T-SQL,” I have
    covered the various data types available and how to select the correct data type.
    I have also discussed several database objects available when you write your T-SQL
    and the pros and cons of using each database object. In the previous chapter,
    I explained the importance of making your code readable for yourself and others.
    I will finish up this section by going over the various options when designing
    your T-SQL code.


    When writing T-SQL for your applications, I am a huge fan of using stored procedures.
    There are many advantages to using stored procedures including the possibility
    to make your code more adaptable and reusable. Similarly, using parameters with
    your code can increase the flexibility of your T-SQL code. You can use stored
    procedures and parameters when designing solutions for more complex queries. In
    addition, you may want to consider other techniques when it comes to solving complex
    issues. There are several items to consider when designing T-SQL code including
    stored procedures, parameters, and complex query logic.


    ## Using Stored Procedures


    When writing T-SQL code, you have several options available. Depending on the
    implementation you use, we will determine what SQL Server does with that T-SQL
    code. You can write ad hoc T-SQL where each query is written without uniformity.
    While this code can be repeated, you will need to be careful to make sure that
    all formatting is exactly consistent, including whitespace. There is also what
    is referred to as prepared statements. This type of T-SQL code uses parameters.
    When the prepared statements are used, the values passed to the parameters are
    updated. Finally, there are stored procedures. These are database objects that
    are persistent. Each of these has their pros and cons. However, stored procedures
    generally are the most consistent when writing T-SQL.


    There are several aspects to consider when writing T-SQL code for applications.
    In order to better understand how you want your applications to use T-SQL, it
    may be best to understand how SQL Server handles each of the T-SQL options available.
    When SQL Server executes a query, it must determine how it will go about executing
    that query. Before doing this, SQL Server will check to see if there is already
    an execution plan for this query. Depending on how the T-SQL is written will have
    some impact on how SQL Server verifies that the execution plan is already in place.


    To show how stored procedures, ad hoc queries, and prepared statements affect
    the plan cache, I will walk through some examples. In Listing 4-1, you can see
    a statement to create the stored procedure.


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.GetRecipe

    Author:           Elizabeth Noble

    Created Date:     April 20, 2019

    Description: Get a list of all recipes in the database

    Sample Usage:

    EXECUTE dbo.GetRecipe

    \*-------------------------------------------------------------*/

    CREATE PROCEDURE dbo.GetRecipe

    AS

    SELECT

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe;

    ```

    Listing 4-1

    Create a Stored Procedure


    In this example, I am creating a stored procedure that cannot be configured. Each
    time this stored procedure is executed, it will pull back the same types of data.
    This stored procedure will pull back information about all recipes that have been
    entered into the database. If you want to see the results for this stored procedure,
    you can execute the stored procedure as shown in Listing 4-2.


    ```sql

    EXECUTE dbo.GetRecipe;

    ```

    Listing 4-2

    Execute the Stored Procedure


    SQL Server will create this execution plan and save the execution plan to the
    query plan cache. If this stored procedure is run again in the future, SQL Server
    will check the plan cache to see if this stored procedure already exists in the
    cache. This plan will sit in the plan cache for as long as SQL Server deems the
    plan relevant. In Figure 4-1, you can see the execution plan associated with the
    stored procedure in Listing 4-2.


    ![../images/480547_1_En_4_Chapter/480547_1_En_4_Fig1_HTML.jpg](images/480547_1_En_4_Chapter/480547_1_En_4_Fig1_HTML.jpg)


    Figure 4-1

    Execution Plan for Stored Procedure


    If the plan is in the cache, SQL Server will continue to reuse the same execution
    plan. This works well for stored procedures. However, there are other ways of
    accessing data in SQL Server. One of these methods is to write ad hoc queries.
    When writing ad hoc queries, you have the option to hard-code the values or parameterize
    them. An example of this type of query shown in Listing 4-3 has the same logic
    as a stored procedure in Listing 4-1.'
