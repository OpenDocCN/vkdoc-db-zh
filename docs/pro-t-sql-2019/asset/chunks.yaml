    the table-valued function properties from Listing [2-10](#480547_1_En_2_Chapter.xhtml#PC10)
    which represented the compatibility level associated with SQL Server 2017 to those
    of compatibility level 150\. In Figure [2-12](#480547_1_En_2_Chapter.xhtml#Fig12),
    I have the properties for the table-valued function in compatibility mode 150.


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig12_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig12_HTML.jpg)


    Figure 2-12


    Properties for Table-Valued Function in Compatibility Mode 150


    Looking at the values in Figure [2-12](#480547_1_En_2_Chapter.xhtml#Fig12), there
    are several values that match those of Figure [2-10](#480547_1_En_2_Chapter.xhtml#Fig10).
    This includes the more accurate estimated number of rows in both Figure [2-10](#480547_1_En_2_Chapter.xhtml#Fig10)
    and Figure [2-12](#480547_1_En_2_Chapter.xhtml#Fig12). The estimated operator
    cost, estimated CPU cost, and estimated subtree cost are also the same in both
    Figure [2-10](#480547_1_En_2_Chapter.xhtml#Fig10) and Figure [2-12](#480547_1_En_2_Chapter.xhtml#Fig12).


    The performance of the multi-statement table-valued function improves in the newer
    versions of SQL Server. In addition, you can see that both SQL Server 2017 and
    SQL Server 2019 have the most accurate estimated and actual rows returned in the
    execution plan. While there still are performance concerns to keep in mind with
    multi-statement table-valued functions, there are scenarios where the performance
    is improved enough that it may be beneficial to use these functions starting with
    SQL Server 2017.


    ## Other User-Defined Objects


    There are many ways of working with complex data and breaking data up into sections
    that can be easily managed and analyzed. In some cases, data can be saved to temporary
    tables or table variables. However, there are other options available depending
    on your needs. One type of feature in SQL Server is using table-valued parameters.
    This allows for similar performance as temporary table, but it also works similarly
    to table variables. There is also a method where a temporary result set is created
    for use in the next statement in a batch.


    ### User-Defined Table Types


    When working with databases and stored procedures, you may find yourself in a
    situation where you want to pass many fields into a stored procedure as a parameter.
    There is an option to create a user-defined table type that will allow you to
    specify multiple columns and data types. One advantage of creating a user-defined
    table type is that this table type can be reused. This user-defined table type
    can be applied to multiple different stored procedures or other database code.
    You can see an example of creating a user-defined table type in Listing [2-19](#480547_1_En_2_Chapter.xhtml#PC19).


    ```

    CREATE TYPE RecipeMealType AS TABLE

    (

    RecipeName VARCHAR(25),

    MealTypeName VARCHAR(25)

    );

    GO

    Listing 2-19

    Code to Create User-Defined Table Type

    ```


    Once a user-defined table type has been created, it can be used as a parameter
    for a stored procedure or be used for variable declaration. The reusability and
    consistency that is created with user-defined table types comes with a cost. As
    the stored procedures now use a single parameter to represent all of the columns
    and rows stored in this object, it becomes difficult to determine what parameters
    in a stored procedure represent a single value and what parameters represent a
    user-defined table type. This object can make code easier to read; it can also
    make it harder to troubleshoot performance issues in the future.


    ### Table-Valued Parameters


    A high percentage of stored procedures can be used to insert, update, or delete
    data from tables. In some cases, the application may need to send one parameter
    per column of a table to various stored procedures. While using one parameter
    per field is straightforward and easy to debug, some can contend that it would
    be cleaner and simpler to send multiple fields in one parameter. I can understand
    wanting to simplify the code, but I also believe that too much simplification
    can make it difficult to troubleshoot code in the future.


    However, you may want to use an array type format in a stored procedure or other
    code. In this case, it would be beneficial to use this data to perform a set-based
    operation. When doing so, you will need to remember that the user-defined table
    type that is passed in as a parameter cannot be modified. When this parameter
    is passed in, the data passed can be treated like a temporary table and used to
    join to the base table and make any necessary modifications.


    As SQL Server is designed to perform best for set-based operations, you may get
    to the point where you want to take advantage of SQL Server’s inherent ability
    to work best with sets. You may want to consider using table-valued parameters
    if you are wanting to pass in a table to a stored procedure and use that table
    relationally with other tables within the same stored procedure.


    Since a table-valued parameter is ultimately a variable, SQL Server will not necessarily
    optimize the execution plan for the actual estimated number of rows. If you find
    yourself in this situation, you may need to take the values from the parameter
    and save them into a table variable within the stored procedure. I would advise
    against using table-valued parameters solely to improve readability of the code.
    Listing [2-20](#480547_1_En_2_Chapter.xhtml#PC20) shows an example of using a
    table-valued parameter in a stored procedure.


    ```

    CREATE PROCEDURE dbo.UpdateRecipeMenuType

    @RecipeMeal RecipeMealType READONLY

    AS

    SET NOCOUNT ON

    UPDATE rec

    SET MealTypeID = meal.MealTypeID

    FROM dbo.Recipe rec

    INNER JOIN @RecipeMeal recmeal

    ON rec.RecipeName = recmeal.RecipeName

    INNER JOIN dbo.MealType meal

    ON recmeal.MealTypeName = meal.MealTypeName

    Listing 2-20

    Using a Table-Valued Parameter

    ```


    The table-valued parameter in Listing [2-20](#480547_1_En_2_Chapter.xhtml#PC20)
    is using the user-defined table type created in Listing [2-19](#480547_1_En_2_Chapter.xhtml#PC19).
    When you want to execute the stored procedure using the table-valued parameter,
    you can run the code in Listing [2-21](#480547_1_En_2_Chapter.xhtml#PC21).


    ```

    DECLARE @RecipeType AS RecipeMealType;

    INSERT INTO @RecipeType (RecipeName, MealTypeName)

    SELECT rec.RecipeName, ml.MealTypeName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType ml

    ON rec.MealTypeID = ml.MealTypeID;

    EXEC dbo.UpdateRecipeMenuType @RecipeType;

    GO

    Listing 2-21

    Code to Execute Stored Procedure with Table-Valued Parameter

    ```


    The execution plan from this code is in Figure [2-13](#480547_1_En_2_Chapter.xhtml#Fig13).
    Notice the Table Scan on the table-valued parameter.


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig13_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig13_HTML.jpg)


    Figure 2-13


    Execution Plan for Stored Procedure with Table-Valued Parameter


