  trans: '

    如果您选择为错误记录创建额外的日志表，最终可能会创建一个类似于代码清单 14-12 中所示的表。


    ```sql

    CREATE TABLE dbo.RecipeHistoryLog

    (

    RecipeHistoryLogID      INT         NOT NULL,

    RecipeHistoryID         INT         NOT NULL,

    DateCreated             DATETIME    NOT NULL,

    DateModified            DATETIME    ,

    CONSTRAINT pk_RecipeHistoryLog_RecipeHistoryLogID

    PRIMARY KEY CLUSTERED (RecipeHistoryLogID),

    CONSTRAINT fk_RecipeHistoryLog_RecipeHistoryID

    FOREIGN KEY (RecipeHistoryID)

    REFERENCES dbo.RecipeHistory(RecipeHistoryID)

    );

    ```

    代码清单 14-12：创建 `dbo.RecipeHistoryLog` 表


    任何在 `dbo.RecipeHistory` 表上出错的记录都可以有一条对应的记录输入到代码清单 14-12 的表中。在表 14-5 中，有一条关于 `RecipeHistoryID`
    2 的错误记录。如果在该错误记录创建之前，我们已经创建了代码清单 14-12 中的表，我们可能会看到一个类似表 14-6 中的条目。


    **表 14-6：`dbo.RecipeHistoryLog` 表中的数据**


    | RecipeHistoryLogID | RecipeHistoryID | DateCreated | DateModified |

    | --- | --- | --- | --- |

    | 1 | 2 | 05/18/2019 | 05/18/2019 |


    一旦我们在 `dbo.RecipeHistoryLog` 表中有了记录，就可以根据此表中记录的存在性来生成警报。一种选择可能是设置一个每 15 分钟执行一次的存储过程。这个存储过程的目的可能是在
    `dbo.RecipeHistoryLog` 表中发现任何记录时生成一封电子邮件。如果您选择此方法来创建警报，您还需要确保定期从此表中清除数据。在这种情况下，您还需要一个存储过程来定期从此表中删除数据。


    无论您选择哪种方法来实现应用程序与 SQL Server 之间的错误日志记录，您都应确保这些错误被跟踪记录在一个对多方都可访问的地方。最难排查的问题之一就是当没有可用的日志记录时。记录与
    SQL Server 相关的错误的目标，是让贵组织内的人员能够快速找到问题发生的位置，以便他们能高效地解决问题。您可能选择从应用程序实现大部分错误处理。然而，对于需要立即纠正的错误，可能可以从
    SQL Server 内部生成自动报告。


    作为应用程序开发的一部分，您需要考虑贵组织需要哪种类型的日志记录。在盗窃风险较高的行业中，跟踪数据修改发生的时间以及修改人可能更为重要。所需信息的类型将决定您为数据修改实现何种日志记录。您还需要考虑如何管理与数据库相关的错误。这些错误并非
    SQL Server 特有的错误，而是由于为应用程序编写的 T-SQL 代码而导致的错误。在确定了如何管理应用程序的日志记录后，您可能还需要考虑如何设计可复用的
    T-SQL 代码。


    # 15. 管理数据增长


    数据库首次创建时，在给定时间内，其中的表会保持较小规模。根据表中存储数据的性质或时间的推移，您可能会发现自己处于这样一种情况：自表首次创建以来，一个或多个表已经经历了显著的增长。管理表中存储数据的相对“年龄”或数据整体存储方式的动机可能有很多。本章的目标将是如何以可长期管理的方式组织数据。虽然许多公司在管理数据时也有提高性能的目标，但这并非本章的重点。


    SQL Server 提供了将数据分离或排序到不同组或类别中的功能。在管理数据增长方面，数据通常按日期排序。您不仅限于按特定日期组织数据，但为本章目的，这将是我的重点。您首先需要弄清楚如何组织数据，不仅是数据如何分组，还包括数据如何存储。建立数据分类和存储的功能，将允许您开始将数据移动到您创建的各个分组中。数据分组方式有多种选项，并且您可以使用多种不同的方式来存储数据。这使您能够设计一个解决方案，既支持近期数据的高事务吞吐量，又能以支持报告的方式设计旧数据。

    '
- fmt: '## Partitioning


    ## 什么是分区？


    查看数据库中的一张表时，你可能会发现这张表已经增长到难以管理的规模。理想情况下，你应该在表增长到那个规模之前就识别出它们。无论哪种情况，你面对的都是一张需要更好地管理数据归档或维护索引的表。从概念上讲，你需要思考如何访问这些数据。为了使组织这些数据的过程更高效，你会希望选择一个在访问这些数据时始终会用到的列。通过某个值来组织数据的过程被称为分区。


    ## 分区步骤


    分区的第一步是弄清楚你希望如何一致地访问你的数据。我将使用`dbo.RecipeHistory`表进行说明。在本章中，此表表示过去2年食谱使用情况的信息。基于法律、用户体验或其他原因，我可能决定开始归档部分历史信息。由于这是一个历史表，我将选择根据`DateCreated`来分区，即组织或排序这些数据。如何分区数据引出了必须做出的下一个决定。


    一旦决定了如何对数据进行排序，我还需要具体决定哪些数据将被分组在一起。被分组在一起的数据称为范围。在选择要分区的范围时，需要考虑的一个因素是每个范围内数据被访问的频率。对于大多数应用，这意味着最近的数据被频繁访问，而较旧的数据被访问较少。如果我有5年的食谱历史数据，可能出于业务原因需要保留这么长时间的数据，但在日常操作中，我通常可能只按天、周、月或年访问信息。


    了解数据的大体访问方式将使我能够确定用于分区数据的范围。一旦确定了存储数据的范围，就需要创建文件组。文件组还可以通过允许你选择数据存储方式来为你带来好处。你可以将更频繁使用的数据保存在更快存储设备上的文件组中。也可以将较少使用的数据保存在较慢存储设备上的文件组中。这可以让你以节省成本的方式改变数据存储方式。文件组作为数据排序的逻辑结构运行。当你使用没有任何额外文件组的数据库时，你会看到只有一个名为`primary`的文件组。创建这些文件组的
    T-SQL 代码如清单 [15-1](#480547_1_En_15_Chapter.xhtml#PC1) 所示。


    ```sql

    ALTER DATABASE Menu

    ADD FILEGROUP RecipeHistory2018;

    ALTER DATABASE Menu

    ADD FILEGROUP RecipeHistory2019Q1;

    ALTER DATABASE Menu

    ADD FILEGROUP RecipeHistory2019Q2;

    ALTER DATABASE Menu

    ADD FILEGROUP RecipeHistory2019Q3;

    -- Listing 15-1

    -- Create Filegroups

    ```


    在此示例中，我创建了四个不同的文件组。创建的第一个文件组将保存2019年之前的所有食谱历史记录。接下来的两个文件组分别用于2019日历年的前两个季度。第三个文件组设计用于2019年的第三季度。创建文件组后，我需要创建文件组将使用的任何文件。对于本章中的示例，我们将为每个文件组创建一个文件。你可以使用清单
    [15-2](#480547_1_En_15_Chapter.xhtml#PC2) 中的 T-SQL 创建这些文件。


    ```sql

    ALTER DATABASE Menu

    ADD FILE

    (

    NAME = RecipeHistFG2018,

    FILENAME = ''D:\SQLData\RecipeHistFG2018.ndf'',

    SIZE = 50MB

    )

    TO FILEGROUP RecipeHistory2018;

    ALTER DATABASE Menu

    ADD FILE

    (

    NAME = RecipeHistFG2019Q1,

    FILENAME = ''D:\SQLData\RecipeHistFG2019Q1.ndf'',

    SIZE = 50MB

    )

    TO FILEGROUP RecipeHistory2019Q1;

    ALTER DATABASE Menu

    ADD FILE

    (

    NAME = RecipeHistFG2019Q2,

    FILENAME = ''D:\SQLData\RecipeHistFG2019Q2.ndf'',

    SIZE = 50MB

    )

    TO FILEGROUP RecipeHistory2019Q2;

    ALTER DATABASE Menu

    ADD FILE

    (

    NAME = RecipeHistFG2019Q3,

    FILENAME = ''D:\SQLData\RecipeHistFG2019Q3.ndf'',

    SIZE = 50MB

    )

    TO FILEGROUP RecipeHistory2019Q3;

    -- Listing 15-2

    -- Add Filegroups to Menu Database

    ```


    查看前面的 T-SQL 代码，我正在修改`Menu`数据库并向数据库添加文件。创建文件时，我指定了逻辑名称、文件名和文件路径、文件大小以及与该文件关联的文件组。


    文件组和文件决定了我们的数据将保存在哪里。我必须配置如何将数据保存到这些文件和文件组中。在数据可以存储到文件组之前，需要在 T-SQL 中创建几个不同的数据库对象。你已经确定了希望数据如何排序，现在只需要发出
    T-SQL 命令，以便 SQL Server 也知道如何排序这些数据。第一步是创建一个函数，告诉 SQL Server 如何为分区排序数据。这种类型的函数称为分区函数。在清单
    [15-3](#480547_1_En_15_Chapter.xhtml#PC3) 中，你可以看到创建分区函数的 T-SQL 代码。


    ```sql

    CREATE PARTITION FUNCTION RecipeHistFunc(DATETIME)

    AS RANGE RIGHT FOR VALUES

    (

    ''01/01/2019'',

    ''04/01/2019'',

    ''07/01/2019''

    );

    -- Listing 15-3

    -- Create Partition Function

    ```


    在清单 [15-3](#480547_1_En_15_Chapter.xhtml#PC3) 中，我将函数的范围指定为 `RIGHT`。范围与作为分区函数一部分提供的值直接相关。对于右范围，这表示在分隔分区时，该值位于边界右侧。使用清单
    [15-3](#480547_1_En_15_Chapter.xhtml#PC3) 中的 T-SQL 代码时，任何直到 2019年1月1日 的值都将进入第一个分区。第二个分区将包含从
    2019年1月1日 开始直到 2019年4月1日 的所有值。然而，从 2019年4月1日 到 2019年7月1日 之前的任何数据将存在于第三个分区中。按照分区函数当前的设计，所有在或之后
    2019年7月1日 创建的数据将进入第四个分区。右分区的示例如图 [15-1](#480547_1_En_15_Chapter.xhtml#Fig1) 所示。


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig1_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig1_HTML.jpg)


    图 15-1


    使用右范围进行分区


    创建分区函数时的另一个选项是指定范围为 `LEFT`。如果我指定了左范围或没有指定左或右，第一个分区将包括任何直到并*包括* 2019年1月1日 的值。在图
    [15-2](#480547_1_En_15_Chapter.xhtml#Fig2) 中，你可以看到如果我使用左范围，分区会是什么样子。


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig2_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig2_HTML.jpg)


    图 15-2


    使用左范围进行分区


    对于我们使用的数据，数据类型是`DATETIME2(7)`。如果我使用左范围，任何在 2019年1月1日 午夜之后 1毫秒 发生的数据都将进入第二个分区。你可以看到在创建分区函数时了解你的数据和数据类型是多么重要。'
  raw: '## Partitioning


    Looking at one of your database tables, you may find that this table has grown
    to a size that has made it difficult to manage. Ideally, you would identify these
    tables before they had grown to that size. In either scenario, you are looking
    at a table where you would like to better manage archiving data or maintaining
    indexes. Conceptually you will want to think about how you access this data. To
    make the process of organizing this data more efficient, you will want to choose
    a column that will always be used when accessing this data. The process of organizing
    this data by some value is called partitioning.


    The first step in partitioning will be figuring out how you want to consistently
    access your data. I will be working with the dbo.RecipeHistory table. For the
    purposes of this chapter, this table represents information about when recipes
    have been used over the past 2 years. I may decide for legal, user experience,
    or other reasons that I want to start the process of archiving some of this historical
    information. Since this is a historical table, I will be choosing to partition,
    that is, organize or sort, this data based upon the DateCreated. Choosing how
    this data will be partitioned leads to the next decision that must be made.


    Once I have decided how the data will be sorted, I also need to decide specifically
    what data will be sorted together in groups. The groups of data that are sorted
    together are called ranges. One thing to consider when choosing ranges to be partitioned
    is to think about how frequently data will be accessed within each range. For
    most applications, that would mean that recent data was accessed frequently and
    data that was much older was accessed less frequently. If I had 5 years of recipe
    history data, there may be a business reason why I would have data for this long
    of a period, but for day-to-day operations I may normally only access information
    on a daily, weekly, monthly, or annual basis.


    Knowing how the data is accessed in general will allow me to determine the ranges
    I will use to partition the data. Once you figure out the ranges on how you would
    like to store your data, you will need to create filegroups. Filegroups can also
    benefit you by allowing you to choose how you store your data. You can keep more
    frequently used data in filegroups on faster storage. You can also keep less frequently
    used data on filegroups in slower storage. This can allow you to change how your
    data is stored in a way that allows you to save money. The filegroups operate
    like a logical structure as to how the data will be sorted. When you are using
    a database that does not have any additional filegroups, you will see that there
    is a single filegroup named primary. The T-SQL code to create these filegroups
    is shown in Listing [15-1](#480547_1_En_15_Chapter.xhtml#PC1).


    ```

    ALTER DATABASE Menu

    ADD FILEGROUP RecipeHistory2018;

    ALTER DATABASE Menu

    ADD FILEGROUP RecipeHistory2019Q1;

    ALTER DATABASE Menu

    ADD FILEGROUP RecipeHistory2019Q2;

    ALTER DATABASE Menu

    ADD FILEGROUP RecipeHistory2019Q3;

    Listing 15-1

    Create Filegroups

    ```


    In this example, I have created four different filegroups. The first filegroup
    that was created will hold all the recipe history prior to 2019\. The next two
    filegroups are each for the first two quarters of the calendar year in 2019\.
    The third filegroup is designed for the third quarter of 2019\. Once I create
    the filegroups, I will need to create any files that will be used by the filegroups.
    For the example in this chapter, we will be creating one file per filegroup. You
    can create these files using T-SQL in Listing [15-2](#480547_1_En_15_Chapter.xhtml#PC2).


    ```

    ALTER DATABASE Menu

    ADD FILE

    (

    NAME = RecipeHistFG2018,

    FILENAME = ''D:\SQLData\RecipeHistFG2018.ndf'',

    SIZE = 50MB

    )

    TO FILEGROUP RecipeHistory2018;

    ALTER DATABASE Menu

    ADD FILE

    (

    NAME = RecipeHistFG2019Q1,

    FILENAME = ''D:\SQLData\RecipeHistFG2019Q1.ndf'',

    SIZE = 50MB

    )

    TO FILEGROUP RecipeHistory2019Q1;

    ALTER DATABASE Menu

    ADD FILE

    (

    NAME = RecipeHistFG2019Q2,

    FILENAME = ''D:\SQLData\RecipeHistFG2019Q2.ndf'',

    SIZE = 50MB

    )

    TO FILEGROUP RecipeHistory2019Q2;

    ALTER DATABASE Menu

    ADD FILE

    (

    NAME = RecipeHistFG2019Q3,

    FILENAME = ''D:\SQLData\RecipeHistFG2019Q3.ndf'',

    SIZE = 50MB

    )

    TO FILEGROUP RecipeHistory2019Q3;

    Listing 15-2

    Add Filegroups to Menu Database

    ```


    Looking at the preceding T-SQL code, I am altering the Menu database and adding
    a file to the database. When I create the file, I specify the logical name, the
    filename and file path, the file size, and the filegroup associated with that
    file.


    The filegroups and the files determine where our data will be saved. I must configure
    how to save that data to those files and filegroups. There are couple different
    database objects that need to be created in T-SQL before data can be stored in
    the filegroups. You have already determined how you want the data sorted, and
    now all you need is to issue T-SQL commands so that SQL Server also knows how
    to sort this data. This first step is to create a function that tells SQL Server
    how to sort data for a partition. This type of function is known as a partition
    function. In Listing [15-3](#480547_1_En_15_Chapter.xhtml#PC3), you can see the
    T-SQL code to create the partition function.


    ```

    CREATE PARTITION FUNCTION RecipeHistFunc(DATETIME)

    AS RANGE RIGHT FOR VALUES

    (

    ''01/01/2019'',

    ''04/01/2019'',

    ''07/01/2019''

    );

    Listing 15-3

    Create Partition Function

    ```


    In Listing [15-3](#480547_1_En_15_Chapter.xhtml#PC3), I specified the range of
    the function as **RIGHT**. The range is directly related to the values provided
    as part of the partition function. In the case of a right range, this signifies
    that the value is on the right-hand side of the boundary when separating your
    partitions. When using the T-SQL code from Listing [15-3](#480547_1_En_15_Chapter.xhtml#PC3),
    any value up to January 1, 2019, will end up in the first partition. The second
    partition will contain all values beginning exactly with January 1, 2019, up to
    April 1, 2019\. However, any data from April 1, 2019 until right before July 1,
    2019, will exist in the third partition. As the partition function is currently
    designed, all data that is created on or after July 1, 2019 will end up in the
    fourth partition. An example of what right partitions would look like can be seen
    in Figure [15-1](#480547_1_En_15_Chapter.xhtml#Fig1).


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig1_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig1_HTML.jpg)


    Figure 15-1


    Partition Using Right Range


    The other option when creating a partition function is specifying the range as
    **LEFT**. If I had specified a left range or not specified left or right, the
    first partition would include any values up to and *including* January 1, 2019\.
    In Figure [15-2](#480547_1_En_15_Chapter.xhtml#Fig2), you can see how the partitions
    would look if I had used a left range.


    ![../images/480547_1_En_15_Chapter/480547_1_En_15_Fig2_HTML.jpg](images/480547_1_En_15_Chapter/480547_1_En_15_Fig2_HTML.jpg)


    Figure 15-2


    Partition Using Left Range


    With the data we are using, the data type is DATETIME2(7). If I were to use the
    left range, any data happening 1 millisecond after midnight on January 1, 2019,
    would have ended up in the second partition. You can see how important it is to
    understand your data and your data types when creating partition functions.'
