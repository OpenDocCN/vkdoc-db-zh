  trans: '## 动态 SQL


    根据你尝试编写的 `T-SQL` 代码，你可能会发现很难将数据库代码写成基于集合的设计。在这种情况下，编写更具迭代性的代码可能很诱人。你可能想编写高度可变、并能根据传入的参数和值进行修改的
    `T-SQL` 代码。使用动态 SQL 似乎就是你一直想要的解决方案。在大多数情况下，动态 SQL 的缺点往往远大于其优点，但在某些时候，动态 SQL 也可以是正确的解决方案之一。


    ### 执行计划影响

    之前在第 7 章，我介绍了如何读取执行计划。使用动态 SQL 时，每次执行查询都需要计算一个新的执行计划。这会给数据库引擎带来额外的负担。


    ### 用例与吸引力

    大多数你想使用动态 SQL 的情况都涉及需要额外灵活性的场景。许多动态 SQL 令人向往的场景与数据库管理活动有关。这些活动大多涉及在 `SQL Server`
    实例中的多个数据库上执行相同的操作。动态 SQL 还提供了一些额外的功能，这使得使用动态 SQL 尤其具有吸引力。

    执行 `T-SQL` 时，在标准 `T-SQL` 中不能使用数据库名或表名作为变量。使用动态 SQL 使你能够编写可在多个数据库对象上执行的查询。


    ### 动态 SQL 示例

    代码清单 13-21 展示了一个动态 SQL 的例子。

    ```sql

    CREATE PROCEDURE dbo.TableByDynamicValues

    @TableName VARCHAR(100),

    @ColumnName VARCHAR(25),

    @ColumnValue VARCHAR(25)

    AS

    DECLARE @ObjectID INT;

    DECLARE @ColumnList VARCHAR(500);

    DECLARE @Query NVARCHAR(1000);

    SELECT @ObjectID = OBJECT_ID(@TableName);

    SELECT @ColumnList = STRING_AGG (ISNULL([name],''*''), '','')

    FROM sys.columns

    WHERE [object_id] = @ObjectID

    AND [name] NOT IN (''IsActive'',''DateCreated'',''DateModified'');

    SET @Query =

    ''SELECT '' + @ColumnList +

    '' FROM '' + @TableName +

    '' WHERE '' + @ColumnName + '' = @ColumnValue'';

    EXECUTE sp_executesql @Query,

    N''@ColumnName NVARCHAR(25), @ColumnValue NVARCHAR(25)'',

    @ColumnName = @ColumnName,

    @ColumnValue = @ColumnValue;

    ```

    代码清单 13-21 从表中动态检索数据


    前面的查询允许用户或应用程序传入一个表名。这是将要查询其值的表名。另外两个参数允许将列名和列值作为查询的一部分传入。此列名将用于筛选数据。


    ### 执行与结果

    代码清单 13-22 中有一些关于此代码如何运行的例子。

    ```sql

    EXECUTE dbo.TableByDynamicValues ''Recipe'', ''RecipeName'', ''Spaghetti'';

    EXECUTE dbo.TableByDynamicValues ''Ingredient'', ''IngredientName'', ''Tomato
    Sauce'';

    ```

    代码清单 13-22 使用不同值执行存储过程


    代码清单 13-22 中是同一个存储过程的两次执行。第一次执行将从 `Recipe` 表返回结果。第二次执行将从 `Ingredient` 表返回结果。执行代码清单
    13-22 中的查询，你将得到表 13-4 中的结果。


    | 食谱 ID | 食谱名称 | 食谱描述 | 份量 | 餐食类型 ID | 准备类型 ID |

    | --- | --- | --- | --- | --- | --- |

    | 1 | 意大利面 | 意面晚餐 | 8 | 2 | 1 |


    | 配料 ID | 配料名称 |

    | --- | --- |

    | 2 | 番茄酱 |


    返回的第一组数据是 `Recipe` 表中 `RecipeName` 为 `Spaghetti` 的列。代码清单 13-21 中的存储过程排除了 `IsActive`、`DateCreated`
    和 `DateModified` 这几列。表中的所有其他列都被返回。第二个数据集中的值是 `Ingredient` 表中 `IngredientName`
    为 `Tomato Sauce` 的记录。从软件开发的角度来看，这似乎是编写数据库代码的理想方法。


    ### 缺点与注意事项

    然而，这种使用 `T-SQL` 的方法没有考虑数据库引擎如何执行查询。这将导致 `SQL Server` 在每次执行存储计划时都生成一个新的执行计划，因为每次执行之间请求的数据可能发生巨大变化。虽然动态
    SQL 似乎可以帮助使你的应用程序代码更加灵活，但编写 `T-SQL` 的这种方法是有代价的。总的来说，在大多数需要编写 `T-SQL` 代码的场景中，我会避免使用动态
    SQL。尝试在不使用动态 SQL 的情况下编写代码，将鼓励你实践利用 `SQL Server` 数据库引擎优势的方式编写数据库代码。


    使用动态 SQL 还会增加执行超出你最初意图的额外 `T-SQL` 代码的风险。这种行为被称为 SQL 注入。SQL 注入的概念是，额外的 `T-SQL`
    代码被插入或注入到原始语句中。被插入的额外 `T-SQL` 代码允许实现原本非查询执行意图的功能。这可能包括查看本不该由该用户访问的数据。同一个用户也可能通过
    SQL 注入修改数据或数据库对象。如果你想使用动态 SQL，可以通过使用参数将值传递给动态 SQL 来最小化 SQL 注入的风险。对动态 SQL 进行参数化的方法将使用户更难以你未意图的方式查看或修改数据。


    ### 编写有效的 T-SQL

    编写 `T-SQL` 代码时，你需要编写功能性强且有效的代码。这意味着编写可读且可维护的代码。编写能够随着业务增长的代码也是一项关键技能。如果你正在编写代码来处理插入、更新或各种数据修改，你需要确保编写的代码易于理解和后续支持。在应用程序开发过程中，考虑你希望如何处理禁用权限或应用程序功能。如果不考虑，你将需要考虑策略，允许你以不破坏数据库中表之间关系的方式停用数据值。

    你可能还需要支持遗留代码。支持遗留代码的挑战之一是在不破坏现有功能的情况下进行更改。有时你可能需要从事务型数据库中提取数据用于报告。尝试设计你的查询以允许灵活性和可重用性。虽然灵活性是好的，但在
    `T-SQL` 代码中实现多少灵活性也要谨慎。在改进数据库代码的功能后，你可能会发现你想确定如何跟踪数据的变化。'
- fmt: '# 14. Logging


    During your time working with `SQL Server`, you will get a wide variety of requests
    from your company. Some of these requests may involve changing business logic
    or adding new functionality. There are other times that your company may want
    to track what happened in the past. There are a variety of third-party tools that
    can help track performance and other functionality related to database maintenance.
    However, your business may be interested in tracking data changes or understanding
    where something went wrong.


    This type of logging related to data modifications or error handling can be implemented
    using `T-SQL`. When logging these types of changes, you have several options available
    to you. These options can include minimally logging activity all the way to logging
    the most granular of activities. You will also want to consider how this information
    will be accessed and used going forward. This will help you log information in
    a way that can be beneficial to your organization in the future. This will also
    prevent you from logging data that ends up never being used.


    ## Data Modification


    Choosing a method to track data modifications requires understanding what types
    of information your organization needs to track. You may want to only log information
    when something has changed. Depending on your business case, you may need to know
    not only when something changed but also what changed. There are also a couple
    options on how you can track these changes. You have the option to either use
    `SQL Server` to track these changes for you or you can create database objects
    that will log this information for you.


    One of the things to consider when implementing any sort of logging is the performance
    overhead. This can be even more critical when tracking data modifications. You
    will want to make sure that you choose a logging method that allows you to both
    track the necessary changes and have the expected performance impact. As you may
    expect, the more detailed logging you implement, the greater the performance overhead.


    Out of all the options discussed in this chapter, `Change Tracking` has the least
    amount of overhead. If you would like to record more detailed information and
    you are willing to increase resource utilization, then you may want to consider
    `Change Data Capture`. Another possible implementation of tracking change involves
    using database triggers. While the use of database triggers allows you to more
    finely tune what is logged and how it is logged, it can come at the cost of even
    higher resource utilization.


    An intermediate option may be using `SQL Server Audit` depending on the type of
    data you want to log. `SQL Server Audit` can be used to track server or database-level
    activity. In the context of logging changes related to applications, you would
    want to focus on database audits. The database audit actions within `SQL Server
    Audit` can track changes related to all types of data activity including accessing
    or modifying data. `SQL Server` uses extended events to monitor the audit activity.
    The data that can be retrieved includes the time the action happened, information
    about the user that triggered the audit, and the object affected. It may also
    be possible to record the statement issued when the audit action took place.


    Another minimal logging activity available with regard to data modifications involves
    logging the most recent time a record was changed and incrementing the number
    of changes that have occurred for that data record. This type of tracking is handled
    by `Change Tracking` within `SQL Server`. To use `Change Tracking`, you will first
    need to enable `Change Tracking` on the database. Throughout this book, we have
    been using the `Menu` database. I will need to run the `T-SQL` code shown in Listing
    14-1 to enable `Change Tracking` on the `Menu` database.


    ```

    ALTER DATABASE Menu

    SET CHANGE_TRACKING = ON

    (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = ON);

    ```


    Listing 14-1: Enable Change Tracking on Menu Database


    To enable `Change Tracking` on the `Menu` database, you will need to specify the
    database name and indicate that you want to turn `Change Tracking` on. The last
    line in the preceding `T-SQL` code is optional. These values indicate how long
    you would like to retain changes and if the retention history should be cleaned
    up automatically.


    Once you have enabled `Change Tracking` in the `Menu` data, you are able to configure
    tables to use `Change Tracking`. The table where you will implement `Change Tracking`
    must have a primary key. If this table does not have a primary key, you will need
    to add one before you can enable `Change Tracking` on this table. In our case,
    I will be enabling `Change Tracking` on the `dbo.Recipe` table. Listing 14-2 shows
    the database code needed to enable `Change Tracking` on the `dbo.Recipe` table.


    ```

    ALTER TABLE dbo.Recipe

    ENABLE CHANGE_TRACKING

    WITH (TRACK_COLUMNS_UPDATED = ON);

    ```


    Listing 14-2: Enable Change Tracking on dbo.Recipe Table'
