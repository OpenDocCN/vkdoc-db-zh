    ## Optimizing Duration


    My goal when working with SQL Server is to have the queries executing `T-SQL`
    code run as quickly as possible. I tend to focus on logical reads as I want to
    minimize the number of data pages going into the cache that are not needed by
    the query that is being executed. However, there are other issues that can happen
    in SQL Server that can have negative effects downstream.


    Prior to SQL Server 2019, one of the most common reasons for slow queries was
    parameter sniffing. The Adaptive Join in SQL Server 2019 has helped minimize issues
    associated with parameter sniffing. If an execution plan has an Adaptive Join,
    SQL Server will determine at execution time whether to use a Merge Join or a Nested
    Loop. The flexibility of the Adaptive Join allows the execution of `T-SQL` code
    to execute one way if there is a small set of data and use a different physical
    join if there is a larger set of data. This will cause the execution of the query
    to perform better regardless of the data being retrieved.


    Working to find the queries that have the slowest durations can be challenging
    especially if you are trying to find real-time data regarding query performance.
    Thankfully, SQL Server does keep track of query performance for `T-SQL` code that
    exists in the query plan cache. You can use the same DMV from the previous section,
    `sys.dm_exec_query_stats`, but instead of looking for records with the highest
    total logical reads or average logical reads, you will want to look at worker
    time. You can either start with total worker time or average worker time. Depending
    on what time of day your queries are running may help you decide which to focus
    on first. If one of the queries with the highest worker time is running during
    the most active time for your business, I would address that query first. However,
    if you have `T-SQL` code with the highest average worker time running frequently
    throughout the busy time of your day, you may see more benefit by working on this
    code first. Either way, you will want to look up the plan in `sys.dm_exec_sql_text`
    that matches the plan from `sys.dm_exec_query_stats` to find the associated query
    text.


    One of the challenges with SQL Server is that the same solution does not always
    work for every situation. I have come across some queries where breaking the data
    up into smaller segments will improve performance. There are other times where
    it may be more efficient to combine several steps into a single `T-SQL` statement.
    The query in Listing [8-4](#480547_1_En_8_Chapter.xhtml#PC4) shows a series of
    `T-SQL` statements.


    ```sql

    DECLARE @RecipeID INT = NULL;

    CREATE TABLE #TempIngredient

    (

    RecipeID          INT,

    IngredientName    VARCHAR(25),

    Cost              DECIMAL(6,3)

    );

    INSERT INTO #TempIngredient

    SELECT recing.RecipeID, ing.IngredientName, ingcos.Cost

    FROM dbo.RecipeIngredient recing

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    LEFT JOIN dbo.IngredientCost ingcos

    ON ing.IngredientID = ingcos.IngredientID

    AND ingcos.IsActive = 1

    AND ingcos.Cost > 5.00

    ORDER BY recing.RecipeID, recing.IngredientID;

    SELECT rec.RecipeName, meal.MealTypeName, ting.IngredientName, ting.Cost

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN #TempIngredient ting

    ON rec.RecipeID = ting.RecipeID

    WHERE (rec.RecipeID = @RecipeID OR @RecipeID IS NULL)

    ORDER BY rec.RecipeName, ting.IngredientName;

    DROP TABLE #TempIngredient;

    ```


    **Listing 8-4**

    Original Query for Recipe Information for All Recipes


    Overall, the goal of Listing [8-4](#480547_1_En_8_Chapter.xhtml#PC4) is to return
    the recipe, type of meal, ingredient, and ingredient cost for all or a specific
    recipe. When looking at the execution plan, we will want to drill into the specific
    part of the execution plan with the highest percentage as shown in Figure [8-3](#480547_1_En_8_Chapter.xhtml#Fig3).


    ![../images/480547_1_En_8_Chapter/480547_1_En_8_Fig3_HTML.jpg](images/480547_1_En_8_Chapter/480547_1_En_8_Fig3_HTML.jpg)


    **Figure 8-3**

    Partial Execution Plan for Listing [8-4](#480547_1_En_8_Chapter.xhtml#PC4)


    The insert into the temporary table is the most significant part of the first
    `T-SQL` statement. The same statement also took up a higher percentage of the
    overall execution plan. Therefore, the highest cost associated with this query
    is inserting data into the temporary table. I can rewrite this query to the one
    shown in Listing [8-5](#480547_1_En_8_Chapter.xhtml#PC5).


    ```sql

    DECLARE @RecipeID INT = NULL;

    SELECT rec.RecipeName, meal.MealTypeName, ing.IngredientName, ingcos.Cost

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    LEFT JOIN dbo.IngredientCost ingcos

    ON ing.IngredientID = ingcos.IngredientID

    AND ingcos.IsActive = 1

    WHERE (rec.RecipeID = @RecipeID OR @RecipeID IS NULL)

    ORDER BY rec.RecipeName, ing.IngredientName;

    ```


    **Listing 8-5**

    Optimized Query for Recipe Information for All Recipes


    The preceding `T-SQL` statement has all the code required to generate the same
    output as the one from Listing [8-4](#480547_1_En_8_Chapter.xhtml#PC4). Depending
    on the indexes that exist on your tables and the join criteria, sometimes you
    will see better performance when selecting all your data in one query. Other times,
    you may optimize your queries by getting subsets of data and combining them into
    one query. A portion of the execution plan for Listing [8-5](#480547_1_En_8_Chapter.xhtml#PC5)
    can be seen in Figure [8-4](#480547_1_En_8_Chapter.xhtml#Fig4).


    ![../images/480547_1_En_8_Chapter/480547_1_En_8_Fig4_HTML.jpg](images/480547_1_En_8_Chapter/480547_1_En_8_Fig4_HTML.jpg)


    **Figure 8-4**

    Partial Execution Plan for Listing [8-5](#480547_1_En_8_Chapter.xhtml#PC5)


    As shown in Figure [8-4](#480547_1_En_8_Chapter.xhtml#Fig4), the step taking up
    the largest percentage of the execution plan has changed. Based on the actual
    execution plan, the largest percentage is spent performing a Clustered Index Seek
    on the primary key of the `RecipeIngredient` table. As this is a seek relating
    to the primary key of the table, it seems unlikely that there is a better alternative
    for performance tuning this query.


    There are other factors that can contribute to slowness of running queries. In
    many scenarios, the best way to optimize these queries involves using indexes.
    You want to check execution plans for Key Lookups. These Key Lookups indicate
    that SQL Server is having to go from the non-clustered index to the clustered
    index to find additional fields that are needed as part of the query. In some
    cases, you may be able to change the values returned or the join conditions of
    your query to resolve the Key Lookups. Otherwise, you will need to see if the
    indexes can be changed in order to improve performance.'
