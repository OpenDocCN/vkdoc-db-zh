    ```

    清单 5-6 逐条记录插入数据


    正如你所见，逐条记录插入数据会占用相当多的代码，而且可能非常繁琐。


    ## 使用数据集更新数据


    我最喜欢使用数据集的场景之一是更新数据。在许多情况下，我不是更新特定的记录，而是更新具有相同特征的多个记录。如果我想将表中所有这些食材设置为非活动状态，我有几种不同的方法可以做到这一点。例如，我可以为每条记录编写一个
    `UPDATE` 语句，将 `IsActive` 值设置为零，如清单 [5-7](#480547_1_En_5_Chapter.xhtml#PC7) 所示。


    ```sql

    UPDATE dbo.Ingredient

    SET IsActive = 0

    WHERE IngredientID = 1

    UPDATE dbo.Ingredient

    SET IsActive = 0

    WHERE IngredientID = 2

    UPDATE dbo.Ingredient

    SET IsActive = 0

    WHERE IngredientID = 3

    UPDATE dbo.Ingredient

    SET IsActive = 0

    WHERE IngredientID = 4

    UPDATE dbo.Ingredient

    SET IsActive = 0

    WHERE IngredientID = 5

    ```

    清单 5-7 逐条记录更新数据


    这将需要五个独立的事务。此外，SQL Server 将不得不访问这些记录所在的数据页五次。如清单 [5-8](#480547_1_En_5_Chapter.xhtml#PC8)
    所示，我也可以编写一个查询来一次性更新所有五条记录。


    ```sql

    UPDATE dbo.Ingredient

    SET IsActive = 0

    WHERE IngredientID BETWEEN 1 AND 5

    ```

    清单 5-8 按范围更新数据


    事实上，如果这五条记录都位于同一个数据页上，我只需要访问该页一次。一个更可能的场景是，请求将所有食材名称中包含单词“tomato”的食材设置为非活动状态。这是你想要发现的模式类型。如果存在这样的模式，你可以像清单
    [5-9](#480547_1_En_5_Chapter.xhtml#PC9) 中那样编写一个查询。


    ```sql

    UPDATE dbo.Ingredient

    SET IsActive = 0

    WHERE IngredientName LIKE ''%Tomato%''

    ```

    清单 5-9 以数据集形式更新数据


    这个查询实现了两个目标。它让你在单个查询中更新多条记录。这段 T-SQL 代码还利用了包含单词“tomato”的所有食材的数据集来确定应该更新哪些记录。'
