    CREATE TABLE dbo.RecipeIsActive

    (

    RecipeID          INT         IDENTITY(1,1)     NOT NULL,

    RecipeName        VARCHAR(25)                   NOT NULL,

    RecipeDescription VARCHAR(50)                   NOT NULL,

    ServingQuantity   TINYINT                       NOT NULL,

    MealTypeID        TINYINT                       NOT NULL,

    PreparationTypeID TINYINT                       NOT NULL,

    IsActive          BIT

    CONSTRAINT DF_RecipeIsActive_IsActive

    DEFAULT 1                           NOT NULL,

    DateCreated       DATETIME2(7)                  NOT NULL,

    DateModified      DATETIME2(7)                  NOT NULL,

    CONSTRAINT PK_RecipeIsActive_RecipeID

    PRIMARY KEY CLUSTERED (RecipeID),

    CONSTRAINT FK_RecipeIsActive_MealTypeID

    FOREIGN KEY (MealTypeID)

    REFERENCES dbo.MealType (MealTypeID),

    CONSTRAINT FK_RecipeIsActive_PreparationTypeID

    FOREIGN KEY (PreparationTypeID)

    REFERENCES dbo.PreparationType (PreparationTypeID)

    );

    Listing 13-10

    Create Copy of dbo.Recipe Table with IsActive Column

    ```


    You can move all the data from the dbo.Recipe table to the dbo.RecipeIsActive
    table. To allow the applications to continue to insert or update the data records,
    you will need to drop the dbo.Recipe table and create a view with the same name.
    An example of the view is available in Listing [13-11](#480547_1_En_13_Chapter.xhtml#PC11).


    ```

    CREATE VIEW dbo.Recipe

    AS

    SELECT RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    DateCreated,

    DateModified

    FROM dbo.RecipeIsActive;

    Listing 13-11

    Create View to Match Original Schema of dbo.Recipe

    ```


    Existing application code can reference the view to select or modify data. This
    is not an ideal long-term solution and is intended to allow you to move toward
    the goal of re-factoring your applications to use the new table over time. If
    you have database code written directly in the application, the transition period
    needed to drop the view and rename the table back to dbo.Recipe may require additional
    effort to manage. When determining how to modify your database objects while allowing
    existing code to function, you want to focus on implementing a solution that will
    allow you to easily continue to develop T-SQL code going forward.


    Besides views, you also have the option to make a new object with the desired
    specifications. This would be making the same table as in Listing [13-10](#480547_1_En_13_Chapter.xhtml#PC10).
    You can then add a trigger to allow any data modifications for the original table
    to be passed into this new database object. You would need to create one DML trigger
    each for the insert, update, and delete actions. Listing [13-12](#480547_1_En_13_Chapter.xhtml#PC12)
    shows an example of what the insert trigger would look like.


    ```

    CREATE TRIGGER RecipeInsertRecipeIsActive

    ON dbo.Recipe

    FOR INSERT

    AS

    INSERT INTO dbo.RecipeIsActive

    (

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    DateCreated,

    DateModified

    )

    SELECT

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    DateCreated,

    DateModified

    FROM inserted;

    Listing 13-12

    Create Trigger when Records Are Inserted into dbo.Recipe

    ```


    This will allow you to continue using the original database object for all your
    application code. You can leave this additional table and trigger in place until
    you are ready to start using the new table in your database code.


    In addition to adding new columns, you may want to use some other strategies to
    re-factor tables. This can include increasing the normalization of your databases.
    It is quite common to come across legacy tables with many more columns than would
    be expected for a database with a high level of normalization. By creating a space
    where you can modify the table design and create an abstraction layer, you can
    modify your database objects without affecting application performance.


    Sometimes it is easier to start with your end goal in mind. In this case, we are
    trying to redesign one legacy table into two or more normalized tables. The idea
    is to accomplish this while allowing your applications to function as normal.
    For this example, we have a table like the one from Listing [13-13](#480547_1_En_13_Chapter.xhtml#PC13).


    ```

    CREATE TABLE dbo.Recipe

    (

    RecipeID            INT         IDENTITY(1,1)     NOT NULL,

    RecipeName          VARCHAR(25)                   NOT NULL,

    RecipeDescription   VARCHAR(50)                   NOT NULL,

    ServingQuantity     TINYINT                       NOT NULL,

    MealTypeName        VARCHAR(25)                   NOT NULL,

    PreparationTypeName VARCHAR(25)                   NOT NULL,

    IsActive            BIT

    CONSTRAINT DF_Recipe_IsActive

    DEFAULT 1                             NOT NULL,

    DateCreated         DATETIME2(7)                  NOT NULL,

    DateModified        DATETIME2(7)                  NOT NULL,

    CONSTRAINT PK_Recipe_RecipeID

    PRIMARY KEY CLUSTERED (RecipeID),

    );

    Listing 13-13

    Original Denormalized Table

    ```


    Once you know which table you would like to normalize, you will want to design
    the tables you will use to replace this original table. Listing 13-14 below shows
    an example of the tables that can be created so that you can transition to more
    normalized data tables.


    ```

    CREATE TABLE dbo.MealType

    (

    MealTypeID        TINYINT         IDENTITY(1,1) NOT NULL,

    MealTypeName      VARCHAR(25)                   NOT NULL,

    MealTypeDescription

    VARCHAR(50)                   NOT NULL,

    IsActive          BIT

    CONSTRAINT DF_MealType_IsActive

    DEFAULT 1                           NOT NULL,

    DateCreated       DATETIME2(7)                  NOT NULL,

    DateModified      DATETIME2(7)                  NOT NULL,

    CONSTRAINT PK_MealType_MealTypeID

    PRIMARY KEY CLUSTERED (MealTypeID),

    );

    CREATE TABLE dbo.PreparationType

    (

    PreparationTypeID

    TINYINT         IDENTITY(1,1) NOT NULL,

    PreparationTypeName

    VARCHAR(25)                   NOT NULL,

    IsActive          BIT

    CONSTRAINT DF_PreparationType_IsActive

    DEFAULT 1                           NOT NULL,

    DateCreated       DATETIME2(7)                  NOT NULL,

    DateModified      DATETIME2(7)                  NOT NULL,

    CONSTRAINT PK_PreparationType_PreparationTypeID

    PRIMARY KEY CLUSTERED (PreparationTypeID),

    );

    CREATE TABLE dbo.RecipeModified

    (

    RecipeID          INT         IDENTITY(1,1)     NOT NULL,

    RecipeName        VARCHAR(25)                   NOT NULL,

    RecipeDescription VARCHAR(50)                   NOT NULL,

    ServingQuantity   TINYINT                       NOT NULL,

    MealTypeID        TINYINT                       NOT NULL,

    PreparationTypeID TINYINT                       NOT NULL,

    IsActive          BIT

    CONSTRAINT DF_ RecipeModified _IsActive

    DEFAULT 1                           NOT NULL,

    DateCreated       DATETIME2(7)                  NOT NULL,

    DateModified      DATETIME2(7)                  NOT NULL,

    CONSTRAINT PK_ RecipeModified _RecipeID

    PRIMARY KEY CLUSTERED (RecipeID),

    CONSTRAINT FK_ RecipeModified _MealTypeID

    FOREIGN KEY (MealTypeID)

    REFERENCES dbo.MealType (MealTypeID),

    CONSTRAINT FK_ RecipeModified _PreparationTypeID

    FOREIGN KEY (PreparationTypeID)

    REFERENCES dbo.PreparationType (PreparationTypeID)

    );

    Listing 13-14

    Normalized Table

    ```


    In the preceding example, if we know that there will be no data modifications
    to the dbo.MealType and dbo.PreparationType tables, we can also use a view to
    interact with the dbo.Recipe table. In Listing [13-15](#480547_1_En_13_Chapter.xhtml#PC15),
    I have created a view to use these new tables.


    ```

    CREATE VIEW dbo.Recipe

    AS

    SELECT rec.RecipeID,

    rec.RecipeName,

    rec.RecipeDescription,

    rec.ServingQuantity,

    mtp.MealTypeName,

    prp.PreparationTypeName,

    rec.IsActive,

    rec.DateCreated,

    rec.DateModified

    FROM dbo.RecipeModified rec

    INNER JOIN dbo.MealType mtp

    ON rec.MealTypeID = mtp.MealTypeID

    INNER JOIN dbo.PreparationType prp

    ON rec.PreparationTypeID = prp.PreparationTypeID;

    Listing 13-15

    View using Normalized Table

    ```'
