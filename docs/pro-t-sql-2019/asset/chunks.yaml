    现在单元测试已成功运行，我可以确信我新的 T-SQL 代码按预期工作。数据库项目还有其他可用的单元测试选项。我建议你研究几种替代方案，并与你的同事协作，以确定哪种方法最适合你们的环境。


    ## 集成测试


    虽然知道单个数据库代码片段按预期工作是件好事，但大多数 T-SQL 代码并非孤立存在。关系型设计的本质意味着数据库中的项目是相互关联的。我们通常考虑表之间的关系。然而，存储过程访问的是存在于表中的数据。如果我想验证数据插入，我可能会运行一个单元测试。这将确认我期望插入的数据确实已被插入。


    当存在多种方式访问数据库中的相同数据时，问题就可能出现。通常，这些查询是在不同时期编写的。这可能导致查询中的逻辑略有不同。我也见过这样的情况：公司中的不同业务部门对相同数据采用不同的计算方式。如果将一个业务部门的计算重复用于另一个业务部门，可能会导致看似不准确的结果。


    这就提出了一个问题：如何保持我们的 T-SQL 代码和查询结果在多个不同数据库对象之间的一致性。这就是集成测试可以发挥作用的地方。集成测试是指设计用于测试多于单个代码片段的测试。如果你正在使用一个应用程序插入数据，并希望验证数据是否正确插入，那就可以被视为集成测试。你将同时测试应用程序连接到
    SQL Server 的能力以及将数据插入数据库的 T-SQL 代码。


    这只是可以使用集成测试的一种场景。我发现自己经常遇到的一个常见情况是，处理两个旨在返回大致相同信息的存储过程。有时，对底层表之一或其中一个存储过程中的代码进行更改，可能导致这两个存储过程返回不同的结果。不幸的是，这些结果的差异通常在
    T-SQL 代码部署很久之后才会被发现。这会导致对应用程序的整体信任度下降。


    虽然最好能将这些相互关联的存储过程记录下来，或者更理想的是重构为单个存储过程，但这并不总是可行的。拥有多个版本的相似代码会产生成本，但让多个流程依赖于相同的代码也会产生成本。在本章的剩余部分，我们将假设
    T-SQL 代码无法重写以消除这种依赖。


    就像测试数据库代码的单元测试一样，你可以通过使用 T-SQL 查询手动开始集成测试。集成测试的最大因素在于理解你的环境是如何协同工作的。有时这是偶然发现的，比如当某些东西坏了的时候。其他时候，你可能是主题专家，已经知道这些交互。无论哪种方式，要开始集成测试，你首先至少需要两个测试对象。


    你可以从测试数据插入以及对同一张表的 SELECT 查询开始。你也可以使用集成测试来比较两个查询的结果。如果你有一个查询返回所有值，而另一个查询搜索特定值，就可能发生这种情况。虽然这两个存储过程对于每条记录可能不匹配，但对于特定记录，它们可能具有匹配的结果。这种类型的集成测试将确认返回的列中的值彼此一致。

    '
- fmt: 'If I start working on making changes to a stored procedure that selects data,
    I may want to test the insert of the data along with the select for that same
    data. I may be working on updating the stored procedure `dbo.GetRecipeAndIngredientByMealTypeID`
    to only return active recipes. I can unit test this stored procedure by creating
    a unit test for inactive recipes and a unit test for active recipes. I can also
    use integration testing to confirm that this stored procedure will still return
    expected results after creating a new recipe. This type of testing may be considered
    trivial now, but as the application grows and matures, they may become increasingly
    useful. I have found that there are times the business needs answers faster than
    they can be provided. This sometimes causes database objects to be used in ways
    they were not originally intended.


    ## Integration Test for Insert and Select


    My integration test will consist of inserting a new recipe into the `dbo.Recipe`
    table. After inserting the record, I will execute the `dbo.GetRecipeAndIngredientByMealTypeID`
    stored procedure to verify that the new recipe is returned. The stored procedure
    used to insert the record into `dbo.Recipe` is shown in Listing 11-5.


    ```sql

    CREATE OR ALTER PROCEDURE dbo.InsertRecepie

    @RecipeName        VARCHAR(25),

    @RecipeDescription VARCHAR(50),

    @ServingQuantity   TINYINT,

    @MealTypeID        TINYINT,

    @PreparationTypeID TINYINT,

    @IsActive          BIT,

    @DateCreated       DATETIME2(7),

    @DateModified      DATETIME2(7)

    AS

    INSERT INTO dbo.Recipe

    (

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive

    )

    VALUES

    (

    @RecipeName,

    @RecipeDescription,

    @ServingQuantity,

    @MealTypeID,

    @PreparationTypeID,

    @IsActive

    )

    ```

    Listing 11-5: Insert Record into `dbo.Recipe` Table


    ## The Selection Stored Procedure


    Now that I know how I will be adding the recipes to the database, I should also
    get a better idea of what stored procedure I will be using. In Listing 11-6, you
    can see the stored procedure `dbo.GetRecipeAndIngredientByMealTypeID`.


    ```sql

    CREATE OR ALTER PROCEDURE dbo.GetRecipeAndIngredientByMealTypeID

    @MealTypeID     INT

    AS

    SELECT

    rec.RecipeName,

    ingr.IngredientName,

    ingr.IsActive,

    ingr.DateCreated,

    ingr.DateModified

    FROM dbo.Recipe rec

    INNER JOIN dbo.RecipeIngredient recingr

    ON rec.RecipeID = recingr.RecipeID

    LEFT OUTER JOIN dbo.Ingredient ingr

    ON recingr.IngredientID = ingr.IngredientID

    WHERE rec.MealTypeID = @MealTypeID

    ORDER BY rec.RecipeName, ingr.IngredientName;

    ```

    Listing 11-6: Select Recipe and Ingredient by Meal Type


    ## Performing the Manual Integration Test


    In order to perform integration testing, I need to write some code so that I can
    insert the recipe. Afterward, I will run the second stored procedure. I can insert
    these results into a temporary table then verify that the recipe that was created
    from the first stored procedure exists in the results from the second stored procedure.
    In the example in Listing 11-7 below, I will also need to add some ingredients
    to the recipe so that the `dbo.GetRecipeAndIngredientByMealTypeID` stored procedure
    will be able to pull some results back.


    ```sql

    DECLARE @RecipeID INT

    DECLARE @MealTypeID INT

    EXECUTE dbo.InsertRecepie

    @RecipeName = ''Eggplant Parmesan'',

    @RecipeDescription = ''A recipe to make eggplant parmesan'',

    @ServingQuantity = 6,

    @MealTypeID = @MealTypeID,

    @PreparationTypeID = 1,

    @IsActive = 1

    EXECUTE dbo.InsertRecipeIngredient

    @RecipeID

    INSERT INTO @RecipeMeal (RecipeName, IngredientName, IsActive, DateCreated, DateModified)

    EXECUTE dbo.GetRecipeAndIngredientByMealTypeID @MealTypeID

    SELECT RecipeName

    FROM @RecipeMeal

    WHERE RecipeID = @RecipeID

    ```

    Listing 11-7: Manual Integration Testing


    ## Determining What to Test and Why


    When determining what you should be integration testing, think about any dependencies
    related to the T-SQL code that you are writing.


    Some T-SQL code has a more obvious need for integration testing than others. One
    of the scenarios I have found that need the most integration testing involves
    different database objects that return the same data. This can be two different
    stored procedures. It is also possible that the integration testing can compare
    the results between functions and stored procedures or views and functions. While
    these database objects may return different columns in the result set or in a
    different order, the columns that are the same can be compared.


    Other times you may have T-SQL code where one database object depends on the data
    handled in a previous step. You may have a stored procedure that updates a value
    in the table. A view or stored procedure may only return a specific subset of
    values. Using integration testing can allow you to execute the first stored procedure
    where you will update a lookup value in the table. Depending on the testing required,
    you can execute the stored procedure and confirm the record appears. Unless the
    record should no longer appear, then you can use integration testing to confirm
    that the record no longer appears.


    A common situation where this can occur is when you want to soft delete or disable
    a data record from your application. You can use one set of T-SQL to disable the
    record. There may be one or more database objects that should then be tested to
    confirm that the disabled records no longer appear. Creating a way to keep all
    your integration testing scenarios together and making sure that they are repeatable
    is what will protect your applications in the future. Integration testing your
    code now confirms that your current version of T-SQL code will pass. However,
    automating and repeating your integration testing going forward will allow you
    to continue to verify that new bugs have not been introduced into your T-SQL code.


    Depending on the design and complexity of your system, you may have data that
    is entered in one application and is sent to or used by another application. Throughout
    the business activities, this data may end up in different databases or different
    tables. This can involve different stages of data throughout your business. This
    can also include using integration testing between the transactional databases
    and a data warehouse. Using integration testing in this manner can help make sure
    that the data entered in your applications remains consistent when it is migrated
    into a data warehouse.


    There are more graceful methods around that can help with integration testing.
    However, I have found that most of these reference unit testing. The only difference
    for using these tools with integration testing is how the tests are written. This
    means you can use the unit testing functionality within `Visual Studio` as shown
    in the preceding section. There are other tools you can use for your unit and
    integration testing, but they will not be covered in this book.'
