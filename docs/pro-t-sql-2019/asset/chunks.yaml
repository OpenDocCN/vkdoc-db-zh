    As you can see in this example, there are not only limitations with regard to
    data sets that affect performance but can also affect functionality.


    One of the largest challenges in using data sets has to do with inserting data
    records. In most cases, when you insert a data record, you are inserting a single
    record at a time. This can cause it to become a habit to only deal with inserting
    one individual record at a time. When you are designing new table or moving data,
    you may have situations where you can think of an insert in terms of a data set.
    This will often happen when you are creating a query to insert data into another
    table.


    While it does not seem like these situations will come up very often, I am frequently
    using data sets when I am populating temporary tables, table variables, and common
    table expressions.


    Inserting data as a set uses the foundation of selecting data as data set. Once
    you a select data as a set, you can insert data as a set. I have used inserting
    data into an object like a temporary table for a couple of different reasons.
    One of the more common situations where I insert data sets is when I am joining
    several different tables and implementing criteria that make complicated calculations
    or functions. Looking at Table [5-14](#480547_1_En_5_Chapter.xhtml#Tab14), you
    can see some examples of data that will be inserted into dbo.RecipeIngredient.


    Table 5-14


    Ingredients in a Recipe by Each Record


    | RecipeID | IngredientID | IsActive |

    | --- | --- | --- |

    | Spaghetti | Diced Tomatoes | True |


    | RecipeID | IngredientID | IsActive |

    | --- | --- | --- |

    | Spaghetti | Tomato Paste | True |


    | RecipeID | IngredientID | IsActive |

    | --- | --- | --- |

    | Spaghetti | Tomato Sauce | True |


    | RecipeID | IngredientID | IsActive |

    | --- | --- | --- |

    | Spaghetti | Minced Garlic | True |


    While all these entries could be inserted individually, it is also possible to
    insert multiple records at once. In this case, it may look something like Table
    [5-15](#480547_1_En_5_Chapter.xhtml#Tab15).


    Table 5-15


    Ingredients in a Recipe as a Data Set


    | RecipeID | IngredientID | IsActive |

    | --- | --- | --- |

    | Spaghetti | Diced Tomatoes | True |

    | Spaghetti | Tomato Paste | True |

    | Spaghetti | Tomato Sauce | True |

    | Spaghetti | Minced Garlic | True |


    Another scenario where I have found using bulk inserts into temporary objects
    is when those records may require additional modifications by joining to other
    queries that include multiple table joins.


    If you are changing how your application code works and inserting new tables or
    changing how the value should be populated, you may find yourself needing to perform
    bulk updates. While you can perform bulk updates by updating one record at a time
    with hard-coded values, you will want to see if there is a way to update all the
    records in the data set by using the same code logic. However, this can be where
    data sets really help you out.


    You can write one query to find all the records that you need to update and systematically
    perform all those updates. In addition to the advantages in terms of performance
    and functionality, this type of process also ensures that your data is being handled
    consistently.


    Overall, the process for updating data as a data set is very much like the methods
    discussed for selecting and inserting data. In Table [5-16](#480547_1_En_5_Chapter.xhtml#Tab16),
