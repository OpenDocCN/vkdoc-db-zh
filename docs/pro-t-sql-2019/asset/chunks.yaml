  raw: '## Feature Flag


    You may be asked to make some changes to an application that will require many
    different user stories. To put it differently, you may be re-factoring an application
    where that process is expected to take months. At the same time, you know your
    business may deploy database code every 2 weeks. The issue becomes how you develop
    T-SQL code where you can confirm the code works in the existing database structure
    but also make sure that those database changes do not end up in Production before
    they are ready.


    This is a question not only many database developers but also software developers
    have asked themselves. At the heart of the issue is how I can write database code
    that can be turned on and off. One method that attempts to handle this is the
    use of feature flags. There are many ways to implement feature flags. The goal
    remains the same, to create database code and database objects that can be configured
    to work in one scenario or another.


    When using feature flags, you have the option to enable or disable new functionality
    at will. This method of managing your database code can allow you to write code,
    deploy the code to production, and enabled the new functionality at a later time
    chosen by the business. In addition to being able to determine exactly when to
    enable new functionality, you also get the added benefit of being able to roll
    back changes almost instantaneously by updating a single value in a database.
    There are some foundations you want to have in place before fully embracing feature
    flags. For instance, you want to be accustomed and in the habit of unit testing
    your database code. When it comes to feature flags, you will not only need to
    unit test when the feature flag is enabled, but you will also need to unit test
    when the feature flag is disabled to confirm that your applications are using
    the pre-existing database logic.


    I would suggest you wait until you have fully implemented source control for your
    databases before embracing feature flags. One of the reasons for this recommendation
    is that there is additional effort in managing your feature flags. When you create
    feature flags for your database objects, you will need to create some additional
    logic to allow your applications to use the pre-existing T-SQL code or the new
    database code. This will not only require discipline as you write your T-SQL code,
    but you will need to have defined processes to determine when to remove the feature
    flags from your database code. While feature flags will work great for database
    objects like stored procedures, functions, or views, feature flags are not the
    solution for everything that you are developing. Some changes such as changes
    to database columns cannot be toggled on and off. To manage these types of changes
    to database objects, we will discuss some solutions at the end of this section.


    When using feature flags for your T-SQL code, you have a couple options to determine
    what feature flags are enabled at any given time. There are two main solutions
    I’ve heard proposed when it comes to feature flags and databases. The first one
    may be more application code based. That is supplying the feature flag values
    in a configuration file. The second option is more of a T-SQL-based solution.
    This solution involves creating a table to store the feature flags in their current
    status such as enabled or disabled. There are benefits and downsides to each option.
    Using application code to manage feature flags may be easier to implement and
    manage. However, it may be more difficult for the database administrators to support
    these feature flags. If you keep the feature flag values in the database, you
    will need to be disciplined in managing those feature flags and removing them.
    It can become very easy to end up with a table that is cluttered with deprecated
    feature flags. The downside is that only users with access to the database table
    can see the value associated with each feature flag.


    When you deploy your database code, you can deploy the feature flag as disabled.
    Once you are ready to enable the new functionality, you can set the feature flag
    to enabled. You will want to define a process on how to determine when it is time
    to switch entirely to the new functionality. When you are ready to operate entirely
    on the new functionality, you will want to remove the previous T-SQL code. You
    will also remove any reference to feature flags as part of this process. The challenge
    with this method is it can become easy to skip over the process of removing the
    prior database code. If your T-SQL code is not cleaned up on a regular basis,
    this can greatly diminish the manageability of your code going forward.


    If I need to update a stored procedure to use new logic, I can use feature flags
    in order to deploy this change whenever I want. Looking at Listing [12-1](#480547_1_En_12_Chapter.xhtml#PC1),
    you can see the original stored procedure that has not been modified.


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetRecipe

    Author:           Elizabeth Noble

    Created Date:     April 20, 2019

    Description: Get a list of all recipes in the database

    Sample Usage:

    EXECUTE dbo.GetRecipe

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetRecipe

    AS

    SELECT

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe;

    Listing 12-1

    Original Stored Procedure

    ```


    This stored procedure pulls various information about all recipes. In the preceding
    T-SQL code, the stored procedure does not differentiate between active and inactive
    recipes. Information about all recipes are returned. I may find out that this
    stored procedure was only supposed to return active recipes. While I need to update
    this stored procedure to only return active recipes, there may be a business reason
    why this code change cannot be enabled as soon as it is deployed.


    In this case, I would need to use something like feature flags to allow me to
    have the flexibility to create these changes in the stored procedure and control
    when these changes are available to the application. When working with feature
    flags, you will need a way to determine whether a feature flag is enabled or not.
    This is how you and the database code will know which T-SQL code should be executed
    at a given time. One option is to create a table to store the information about
    the feature flags. You can create a table like the one shown in Listing [12-2](#480547_1_En_12_Chapter.xhtml#PC2).


    ```

    CREATE TABLE dbo.FeatureFlag

    (

    FeatureFlagID     INT,

    IsActive          BIT,

    DateCreated       DATETIME,

    DateModified      DATETIME

    );

    Listing 12-2

    Create Feature Flag Table

    ```


    The preceding table is simple. There is an integer value for the feature flag,
    a value that indicates if the feature flag is enabled, a date when the feature
    flag was created, and a date when the feature flag values were last updated. This
    table will allow us to store information about what feature flags are enabled.
    In order to use this feature flag table, I will need to enter information about
    this feature flag into the table created in Listing [12-2](#480547_1_En_12_Chapter.xhtml#PC2).
    The INSERT statement in Listing [12-3](#480547_1_En_12_Chapter.xhtml#PC3) shows
    an insert into the dbo.FeatureFlag table.


    ```

    INSERT INTO dbo.FeatureFlag

    (

    FeatureFlagID,

    IsActive,

    DateCreated,

    DateModified

    )

    VALUES (947,0,GETDATE(),GETDATE());

    Listing 12-3

    Insert Feature Flag Record

    ```'
  trans: '## 特性标志


    在开发应用程序时，你可能需要进行许多涉及不同用户故事的修改。换句话说，你可能在重构一个预计需要数月才能完成的应用程序。与此同时，你知道你的业务可能每两周部署一次数据库代码。问题在于如何开发
    T-SQL 代码，既能确认代码在现有数据库结构中有效，又能确保这些数据库变更在准备就绪之前不会进入生产环境。


    这不仅是许多数据库开发人员，也是软件开发人员经常问自己的问题。问题的核心在于如何编写可以开关的数据库代码。处理这个问题的一种方法是使用**特性标志**。实现特性标志的方式有很多种，但目标是一致的：创建可配置为在一种或另一种场景下工作的数据库代码和数据库对象。


    使用特性标志时，你可以随意启用或禁用新功能。这种管理数据库代码的方法允许你编写代码、将代码部署到生产环境，并在业务选定的后续时间启用新功能。除了能够精确控制何时启用新功能之外，你还可以通过更新数据库中的单个值来几乎立即回滚更改，从而获得额外的好处。在全面采用特性标志之前，你需要建立一些基础。例如，你应该习惯并养成对数据库代码进行单元测试的习惯。对于特性标志，你不仅需要在特性标志启用时进行单元测试，还需要在特性标志禁用时进行单元测试，以确认你的应用程序使用的是预先存在的数据库逻辑。


    我建议你在为数据库完全实施源代码控制之后，再采用特性标志。这个建议的原因之一是管理特性标志需要额外的工作。当你为数据库对象创建特性标志时，你需要创建一些额外的逻辑，以允许你的应用程序使用预先存在的
    T-SQL 代码或新的数据库代码。这不仅需要在编写 T-SQL 代码时保持纪律性，还需要有定义明确的流程来确定何时从数据库代码中移除特性标志。虽然特性标志对于存储过程、函数或视图等数据库对象效果很好，但它们并不是你开发的所有内容的解决方案。某些更改，例如对数据库列的更改，无法被来回切换。为了管理对数据库对象的这类更改，我们将在本节末尾讨论一些解决方案。


    当为你的 T-SQL 代码使用特性标志时，你有几个选项来确定在任何给定时间启用了哪些特性标志。关于特性和数据库，我听过两个主要的解决方案。第一个可能更偏向应用程序代码，即在配置文件中提供特性标志值。第二个选项更像是基于
    T-SQL 的解决方案，即创建一个表来存储特性标志的当前状态，例如启用或禁用。每个选项都有其优缺点。使用应用程序代码来管理特性标志可能更容易实现和管理。然而，数据库管理员可能更难支持这些特性标志。如果你将特性标志值保存在数据库中，你需要有纪律地管理这些特性标志并移除它们。最终很容易得到一个充斥着已弃用特性标志的混乱表。缺点是只有有权访问数据库表的用户才能看到每个特性标志关联的值。


    当你部署数据库代码时，你可以将特性标志部署为禁用状态。一旦你准备好启用新功能，就可以将特性标志设置为启用。你需要定义一个流程来确定何时完全切换到新功能。当你准备好完全使用新功能时，你需要移除之前的
    T-SQL 代码。作为此过程的一部分，你还需要移除任何对特性标志的引用。这种方法面临的挑战是，很容易跳过移除先前数据库代码的过程。如果你的 T-SQL 代码没有定期清理，这可能会大大降低代码未来的可管理性。


    如果我需要更新一个存储过程以使用新逻辑，我可以使用特性标志，以便在任何我想要的时候部署这个更改。查看清单 12-1，你可以看到尚未修改的原始存储过程。


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.GetRecipe

    Author:           Elizabeth Noble

    Created Date:     April 20, 2019

    Description: Get a list of all recipes in the database

    Sample Usage:

    EXECUTE dbo.GetRecipe

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetRecipe

    AS

    SELECT

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe;

    ```


    清单 12-1

    原始存储过程


    此存储过程提取所有食谱的各种信息。在上面的 T-SQL 代码中，该存储过程没有区分活动和非活动食谱，返回了所有食谱的信息。我可能发现这个存储过程本应只返回活动的食谱。虽然我需要更新此存储过程以仅返回活动食谱，但可能存在业务原因导致此代码更改在部署后无法立即启用。


    在这种情况下，我需要使用类似特性标志的东西，以便能够灵活地在存储过程中创建这些更改，并控制这些更改何时对应用程序可用。使用特性标志时，你需要一种方法来确定特性标志是启用还是禁用。这是你和数据库代码将知道在给定时间应执行哪段
    T-SQL 代码的方式。一个选项是创建一个表来存储有关特性标志的信息。你可以创建一个如清单 12-2 所示的表。


    ```sql

    CREATE TABLE dbo.FeatureFlag

    (

    FeatureFlagID     INT,

    IsActive          BIT,

    DateCreated       DATETIME,

    DateModified      DATETIME

    );

    ```


    清单 12-2

    创建特性标志表


    前面的表很简单。它包含一个整数类型的特性标志 ID、一个指示特性标志是否启用的值、特性标志创建的日期以及特性标志值最后一次更新的日期。此表将允许我们存储有关启用了哪些特性标志的信息。为了使用此特性标志表，我需要将有关此特性标志的信息输入到清单
    12-2 创建的表中。清单 12-3 中的 INSERT 语句展示了向 `dbo.FeatureFlag` 表插入数据的示例。


    ```sql

    INSERT INTO dbo.FeatureFlag

    (

    FeatureFlagID,

    IsActive,

    DateCreated,

    DateModified

    )

    VALUES (947,0,GETDATE(),GETDATE());

    ```


    清单 12-3

    插入特性标志记录'
- fmt: 'I have inserted a record for `Feature Flag 947`. At the time of the insert,
    the feature flag is disabled. The goal is that the existing stored procedure will
    continue to return the same results as it did before the feature flag was added.
    In the stored procedure in Listing 12-4, I have added logic to allow the stored
    procedure to return different results depending on whether `Feature Flag 947`
    is disabled or enabled.


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetRecipe

    Author:           Elizabeth Noble

    Created Date:     April 20, 2019

    Description: Get a list of all recipes in the database

    Updated Date:     May 20, 2019

    Description: Add feature flag. If feature flag is enabled, only

    Show active recipes. Otherwise, show all recipes.

    Sample Usage:

    EXECUTE dbo.GetRecipe

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetRecipe

    AS

    IF ((SELECT IsActive FROM dbo.FeatureFlag WHERE FeatureFlagID = 947) = 1)

    BEGIN

    SELECT

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe

    WHERE IsActive = 1;

    END

    ELSE

    BEGIN

    SELECT

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe;

    END

    Listing 12-4

    Stored Procedure with Feature Flag

    ```


    The first portion of this query will now only return results if `Feature Flag
    947` is enabled. For any other scenario, the stored procedure will return the
    results from the second query. The original state for the feature flag is to be
    disabled. When the feature flag is disabled, all recipes will be returned. Once
    this code has been deployed to Production, there will come a time where you are
    ready to enable the new functionality. When that happens, running the T-SQL code
    in Listing 12-5 will enable the feature flag.


    ```

    UPDATE dbo.FeatureFlag

    SET   IsActive = 1,

    DateModified = GETDATE()

    WHERE FeatureFlagID = 947;

    Listing 12-5

    Enable Feature Flag

    ```


    Enabling this feature flag will cause the stored procedure `dbo.GetRecipe` to
    now only return active recipes.


    Once you are confident that the new code is working as intended and there is no
    business need to roll back, you will want to update the stored procedure to only
    return results for the new database code. Removing the feature flag will also
    protect this stored procedure from returning inaccurate results if the feature
    flag gets updated in error. The T-SQL code in Listing 12-6 shows the final state
    of the `dbo.GetRecipe` stored procedure.


    ```

    /*-------------------------------------------------------------*\

    Name:             dbo.GetRecipe

    Author:           Elizabeth Noble

    Created Date:     April 20, 2019

    Description: Get a list of all recipes in the database

    Updated Date:     May 20, 2019

    Description: Add feature flag. If feature flag is enabled, only

    Show active recipes. Otherwise, show all recipes.

    Updated Date:     June 20, 2019

    Description: Remove the feature flag. Leave only the new logic.

    The stored procedure now only returns active recipes.

    Sample Usage:

    EXECUTE dbo.GetRecipe

    \*-------------------------------------------------------------*/

    CREATE OR ALTER PROCEDURE dbo.GetRecipe

    AS

    SELECT

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe

    WHERE IsActive = 1;

    Listing 12-6

    Final Stored Procedure

    ```


    The database code in the stored procedure `dbo.GetRecipe` has been updated. Before
    any code changes, this stored procedure returned all recipes. After creating the
    feature flag, the stored procedure was updated to include logic to either return
    all recipes or only active recipes depending on the feature flag status. When
    the changes have been confirmed, you can remove the logic for the feature flag.
    This will leave the stored procedure in place with only the updated T-SQL code.


    Depending on how you manage your branching and merging in source control may determine
    how frequently you need to deploy database code that is incomplete. You may find
    yourself in a situation where you are working on developing database code, but
    it is not complete before your next deployment. It is often easiest to write code
    in a way that it can be deployed when it is completed. However, with the move
    toward Agile software development, it has become increasingly important to write
    T-SQL code in a manner where it can be deployed at any moment in time. This is
    where the true benefit of feature flags can be realized.


    ## Methodology


    Each development environment is different. Before deciding how to deploy T-SQL
    code, it will help to get a better understanding of how development is handled
    at your company. You will want to know how many database developers are at your
    company and how many different development teams use SQL Server. Another factor
    that you will want to know is how those development teams write and deploy code.
    Collecting all this information will help you determine the best method to deploy
    T-SQL code that will work for your environment.


    When working with SQL Server, often the risks associated with code issues can
    be larger than with application code. These risks are compounded when there are
    multiple individuals accessing the same T-SQL code. If you are in an environment
    where you are the only database developer, there may be less of a chance of having
    issues with merge conflicts. If there are multiple database developers or teams
    that may be writing T-SQL code, there is more of a chance to have more than one
    person working on the same database code. While some of this can be managed through
    source control, it is also important to be mindful of how database code is deployed.


    There are several different ways that database development teams can manage their
    workflows. Depending on the methodology that is used can contribute to what type
    of deployment method should be used. My first job that involved consistently writing
    database code did not have any strict timelines. The goal was to make changes
    and deploy them as quickly as possible. This is often because I was creating SSRS
    reports. Typically, this type of development can be referred to as Kanban. I have
    also worked in environments where changes to the database were only deployed as
    part of a full sprint cycle. For these deployments, all user stories in the Sprint
    were deployed as part of the Sprint. While there are some ways to deploy everything
    in a Sprint without changing functionality, our code was often not written that
    way. If your business is trying to move toward being able to deploy changes at
    any point in time, you want to consider changing how you develop your database
    code. This change can be a shift in how you think about your solutions and how
    you write your code. Concepts like using feature flags will help you. Essentially
    you want to write your T-SQL code in a way that it can be deployed at any point
    in time and your applications will not break. However, to get to this point requires
    several fundamental steps. The first of which is knowing how your company develops
    your T-SQL code. You may want to handle deployments differently if you have many
    developers working on T-SQL code for a single application than if you have each
    developer working on a separate application. This will help you determine what
    method of deployment will work best for you.'
