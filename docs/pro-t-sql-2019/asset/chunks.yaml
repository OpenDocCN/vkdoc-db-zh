  trans: '## 多语句表值函数


    当您既需要代码重用又需要能够更新 SQL Server 时，可能就该考虑使用多语句表值函数了。但我建议您仔细权衡是否有必要采用此方法，因为这类函数最终可能对性能产生巨大影响。


    多语句表值函数不仅仅是能做更多事情的内联表值函数。它们也无法与查询执行进行内联。这意味着查询优化器在使用这类函数时不会尝试进行最佳推测。实际上，在 SQL
    Server 2014 之前，多语句表值函数被估计为只返回一行。对于 SQL Server 2014 和 SQL Server 2016，估计行数为 100。然而，自
    SQL Server 2017 起，通过使用**交错执行**，SQL Server 有可能获得对多语句表值函数返回行数的正确估计。


    实际发生的情况是，优化过程将暂停以允许执行，从而使基数估计器能够确定多语句表值函数应返回的实际行数。虽然交错执行是新的自适应查询处理的一部分，但需要注意一些限制。如果
    `CROSS APPLY` 与多语句表值函数结合使用，则交错功能将不起作用。也有报告称，如果多语句表值函数内部存在一个依赖于输入参数的 `WHERE` 子句，则交错执行也可能不适用。


    为了更好地理解其工作原理，我将在 `Listing 2-17` 中创建一个多语句表值函数。我将在 SQL Server 2012、SQL Server 2017
    和 SQL Server 2019 中创建此函数。


    ```sql

    CREATE FUNCTION dbo.IngredientCostByIngredientID (@IngredientID INT)

    RETURNS @Output TABLE

    (

    IngredientName     VARCHAR(25),

    IngredientCost     DECIMAL(6,3)

    )

    AS

    BEGIN

    INSERT INTO @Output (IngredientName, IngredientCost)

    SELECT ing.IngredientName, ingcos.Cost

    FROM dbo.Ingredient ing

    INNER JOIN dbo.IngredientCost ingcos

    ON ing.IngredientID = ingcos.IngredientID

    WHERE ing.IngredientID = @IngredientID;

    RETURN;

    END;

    GO

    ```

    `Listing 2-17` 多语句表值函数


    函数创建完成后，我可以编写一个脚本来测试该函数在各种版本 SQL Server 中的性能。以下代码是如 `Listing 2-18` 所示编写并执行的 T-SQL。


    ```sql

    SELECT rec.RecipeName, inglis.IngredientName, inglis.IngredientCost

    FROM   dbo.Recipe rec

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    CROSS APPLY dbo.IngredientCostByIngredientID(ing.IngredientID) inglis

    WHERE ing.IngredientName = ''Italian Sausage'';

    ```

    `Listing 2-18` 执行函数的代码


    接下来，我将测试不同版本 SQL Server 上的执行计划和相关性能。在 `Figure 2-7` 中，我将展示通过使用兼容性级别 110 在 SQL Server
    2012 中的执行计划。


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig7_HTML.jpg](img/480547_1_En_2_Fig7_HTML.jpg)


    `Figure 2-7` 兼容性级别 110 的执行计划


    执行计划看起来没有太多不同的运算符。表值函数表现为单个运算符。表值函数的属性如 `Figure 2-8` 所示。


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig8_HTML.jpg](img/480547_1_En_2_Fig8_HTML.jpg)


    `Figure 2-8` 兼容性级别 110 下表值函数的属性


    `Figure 2-8` 显示估计行数为 1。SQL Server 2017 对数据库引擎进行了额外的增强，改进了表值函数的行数估计。使用 SQL Server
    2017 的兼容性级别 140，您可以看到生成的执行计划，如 `Figure 2-9` 所示。


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig9_HTML.jpg](img/480547_1_En_2_Fig9_HTML.jpg)


    `Figure 2-9` 兼容性级别 140 的执行计划


    `Figure 2-9` 看起来与 `Figure 2-7` 相同。唯一可见的差异是一些运算符上显示的百分比。百分比差异不够显著，不足以影响此查询在兼容性级别
    110 和 140 下的执行性能。您可以在 `Table 2-2` 中看到执行时间。


    `Table 2-2` 比较多语句表值函数在兼容性级别 110 和 140 下的执行时间


    | 兼容性级别 | CPU 时间 | 已用时间 |

    | --- | --- | --- |

    | 110 | 1172 毫秒 | 1529 毫秒 |

    | 140 | 1140 毫秒 | 1523 毫秒 |


    此处显示的时间足够接近，可视为具有可比性。虽然执行计划和时间相似，我们也可以检查并查看表值函数上的属性是否相同。在 `Figure 2-10` 中，我们可以看到与表值函数相关的属性。


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig10_HTML.jpg](img/480547_1_En_2_Fig10_HTML.jpg)


    `Figure 2-10` 兼容性级别 140 下表值函数的属性


    您可以看到 `Figure 2-10` 中的估计行数为 100。这与 `Figure 2-8` 中显示的估计行数不同。您还可以看到估计运算符成本和估计子树成本都发生了轻微变化。


    现在我们已经运行了 `Listing 2-18` 中的查询，接下来可以使用 SQL Server 2019 的优化器运行相同的查询。在此之前，我们需要将兼容性级别改回
    150 并清除执行计划缓存。完成这些操作后，执行 `Listing 2-18` 中的查询，我们将得到一个类似于 `Figure 2-11` 中的执行计划。


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig11_HTML.jpg](img/480547_1_En_2_Fig11_HTML.jpg)


    `Figure 2-11` 兼容性级别 150 的执行计划


    `Figure 2-11` 中的执行计划与 `Figure 2-7` 和 `Figure 2-9` 中的执行计划都不同。我们还可以看到，`dbo.RecipeIngredient`
    表上某个非聚集索引的`索引扫描`运算占用了大部分执行时间。正如预期的那样，这与 `Figure 2-7`、`Figure 2-9` 和 `Figure 2-11`
    的执行计划中占用大部分时间的运算符相同。我们还可以比较兼容性级别 110、140 和 150 下的已用时间和 CPU 时间。这将使我们能够比较来自 SQL
    Server 2012、SQL Server 2017 和 SQL Server 2019 的 SQL Server 优化器的预期执行时间。`Table 2-3`
    显示了所有三个兼容性级别及其相关时间。


    `Table 2-3` 比较多语句表值函数在兼容性级别 110、140 和 150 下的执行时间'
- fmt: '| Compatibility Mode | CPU Time | Elapsed Time |

    | --- | --- | --- |

    | 110 | 1172 milliseconds | 1529 milliseconds |

    | 140 | 1140 milliseconds | 1523 milliseconds |

    | 150 | 391 milliseconds | 644 milliseconds |


    Table [2-3](#480547_1_En_2_Chapter.xhtml#Tab3) shows a dramatically improved execution
    time as compared to either compatibility level 110 or 140. I can also compare
    the table-valued function properties from Listing [2-10](#480547_1_En_2_Chapter.xhtml#PC10)
    which represented the compatibility level associated with SQL Server 2017 to those
    of compatibility level 150. In Figure [2-12](#480547_1_En_2_Chapter.xhtml#Fig12),
    I have the properties for the table-valued function in compatibility mode 150.


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig12_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig12_HTML.jpg)


    Figure 2-12: Properties for Table-Valued Function in Compatibility Mode 150


    Looking at the values in Figure [2-12](#480547_1_En_2_Chapter.xhtml#Fig12), there
    are several values that match those of Figure [2-10](#480547_1_En_2_Chapter.xhtml#Fig10).
    This includes the more accurate estimated number of rows in both Figure [2-10](#480547_1_En_2_Chapter.xhtml#Fig10)
    and Figure [2-12](#480547_1_En_2_Chapter.xhtml#Fig12). The estimated operator
    cost, estimated CPU cost, and estimated subtree cost are also the same in both
    Figure [2-10](#480547_1_En_2_Chapter.xhtml#Fig10) and Figure [2-12](#480547_1_En_2_Chapter.xhtml#Fig12).


    The performance of the multi-statement table-valued function improves in the newer
    versions of SQL Server. In addition, you can see that both SQL Server 2017 and
    SQL Server 2019 have the most accurate estimated and actual rows returned in the
