  trans: "\n# 使用复杂逻辑\n\nSQL Server 中有一些基本操作并不十分复杂。这些基本操作可能包括对单表进行插入、读取、更新和删除。其中一些操作可能涉及少量连接（join），但在某些时候，可能需要处理更复杂的逻辑。使用\
    \ T-SQL 时面临的挑战之一就是如何应对复杂的逻辑。\n\n## 处理复杂逻辑的第一步\n\n处理复杂逻辑时，牢记几点很重要。第一步是将请求分解成更小的部分。其中一部分逻辑在于弄清楚你需要从哪些数据开始，以及如何将这些数据缩减成一个更小的数据集。你还需要专注于将所有需求拆解成简化的步骤。\n\
    \n## 查询请求的挑战\n\n许多查询请求可能涉及以下情况：处理的数据库设计时并未考虑发挥关系型数据库的优势，或者系统设计时未考虑集成，亦或是需要与遗留应用程序交互。通常，我们无法控制被要求做什么，如果能由我们设计数据在数据库中的存储方式，那已经算是幸运了。\n\
    \n这类场景也可能涉及各种编码方法，而这些方法不一定符合最佳实践。这包括需要循环处理数据，包括递归。有时你也可能想使用关联子查询或处理各种字符串，如 XML\
    \ 或 JSON。虽然这些选项中的许多看起来像是完美的解决方案，但它们往往过于复杂。这正是 T-SQL 代码易于理解与 T-SQL 代码性能良好之间需要权衡的棘手之处。我的目标是展示使用那些看似更高级的查询技术，可能正在导致你的应用程序性能不佳。\n\
    \n## 过于具体代码的陷阱\n\n编写 T-SQL 时，常常会诱人地编写出完全匹配特定验收标准或业务需求的代码。有时这很有效，最终你会得到性能非常好的代码。但在其他情况下，试图编写代码来解决复杂问题不仅困难且令人沮丧，而且如果\
    \ T-SQL 代码的编写方式不适合 SQL Server，你可能会遇到严重的性能问题。我发现，如果你能让代码保持简单明了，SQL Server 通常能更好地工作。这也意味着，使用\
    \ SQL Server 的新功能可能并不总是在性能方面产生最佳结果，即使代码更容易编写。\n\n## 最常见的案例：循环\n\n我见到的最常见的 T-SQL\
    \ 代码未考虑 SQL Server 如何运行得最佳的情况，就是涉及循环。SQL Server 提供了多种循环处理数据的选项，虽然代码会返回正确的结果，但我常常发现其在\
    \ SQL Server 上的开销，比找出与相同数据交互的其他方法要大得多。回顾清单 2-29，我在清单 4-15 中粘贴了相同的逻辑。\n\n```sql\n\
    SET NOCOUNT ON;\nDECLARE @RecipeID INT,\n        @RecipeName VARCHAR(25),\n  \
    \      @message VARCHAR(50);\nPRINT '-------- Recipe Listing --------';\nDECLARE\
    \ recipe_cursor CURSOR DYNAMIC\nFOR\nSELECT RecipeID, RecipeName\nFROM dbo.Recipe\n\
    ORDER BY RecipeID;\nOPEN recipe_cursor\nFETCH NEXT FROM recipe_cursor\nINTO @RecipeID,\
    \ @RecipeName\nWHILE @@FETCH_STATUS = 0\nBEGIN\n    PRINT ' '\n    SELECT @message\
    \ = '----- Ingredients For Recipe: ' + @RecipeName + '-----'\n    PRINT @message\n\
    \    SELECT ing.IngredientName, srv.ServingPortionQuantity, srv.ServingPortionUnit\n\
    \    FROM dbo.Ingredient ing\n    INNER JOIN dbo.RecipeIngredient recing\n   \
    \     ON ing.IngredientID = recing.IngredientID\n    INNER JOIN dbo.ServingPortion\
    \ srv\n        ON recing.ServingPortionID = srv.ServingPortionID\n    WHERE recing.RecipeID\
    \ = @RecipeID\n    FETCH NEXT FROM recipe_cursor INTO @RecipeID, @RecipeName\n\
    END\nCLOSE recipe_cursor;\nDEALLOCATE recipe_cursor;\n```\n\n**清单 4-15**\n创建动态游标\n\
    \n这个查询会给我们想要的精确结果，但 SQL Server 必须为游标分析的每一行重复游标内部的逻辑。如果游标内的查询逻辑编写良好，影响可能很小。然而，真正的挑战发生在游标内的\
    \ T-SQL 代码执行缓慢或占用大量硬件资源时。那么，每次执行游标内的代码时，服务器甚至应用程序都会感受到痛苦。虽然很容易责怪游标本身，但像 `WHILE`\
    \ 循环这样的其他场景也有同样的潜在问题。\n\n## 随时间推移的性能下降\n\n这里另一个较大的难题是，即使代码在最初创建时性能良好，随着数据库增长或数据形态变化，其性能仍有可能随时间推移而下降。在这些情况下，曾经看似很棒的解决方案可能迅速变成最大的麻烦之一。有一些选项可以获得相同的输出，但以更高效、资源消耗更少的方式编写\
    \ T-SQL 代码。在清单 4-16 中，你会看到一些注释，试图概述获得与清单 4-15 相同数据输出所需的步骤。\n\n```sql\n-- 为所有食谱创建报告标题\n\
    -- 对每个食谱重复以下操作\n---- 为每个食谱创建章节小标题\n---- 列出每个食谱的所有配料\n```\n\n**清单 4-16**\n用注释简化\
    \ T-SQL 代码逻辑\n\n## 系统化重写方法\n\n当处理逻辑不直接的查询时，我会首先将整个请求分解成更小的部分。理想情况下，分解验收标准的过程能让我专注于哪些地方可以开始最小化数据。我会从两个不同的角度来看待查询。首先是确定如何开始将数据缩减到结果中只需要的数据。我通常会在查询设计中尽早尝试这样做。同时，我也会尝试寻找那些我知道所需\
    \ T-SQL 代码会比较简单的部分。\n\n参考清单 4-15，我可以看出我需要一种方法来提取每个食谱的所有配料。我还想找到一种方法在每个食谱之间插入某种标题。最终，我会想弄清楚如何插入标题行。不过，我将首先编写一个查询来获取所有食谱及其配料。我在清单\
    \ 4-17 中写好了这个查询。\n\n```sql\n-- 为所有食谱创建报告标题\n-- 对每个食谱重复以下操作\n---- 为每个食谱创建章节小标题\n\
    ---- 列出每个食谱的所有配料\nSELECT\n    rec.RecipeName,\n    ing.IngredientName,\n    srv.ServingPortionQuantity,\n\
    \    srv.ServingPortionUnit\nFROM dbo.Ingredient ing\nINNER JOIN dbo.RecipeIngredient\
    \ recing\n    ON ing.IngredientID = recing.IngredientID\nINNER JOIN dbo.Recipe\
    \ rec\n    ON recing.RecipeID = rec.RecipeID\nINNER JOIN dbo.ServingPortion srv\n\
    \    ON recing.ServingPortionID = srv.ServingPortionID\nORDER BY rec.RecipeName,\
    \ ing.IngredientName\n```\n\n**清单 4-17**\n获取所有食谱的所有配料\n\n一旦我有了一个数据起点，就可以继续添加额外的逻辑部分。我将从我试图提取的主要数据部分开始，然后向外扩展。在这个例子中，我开始添加标题信息，如清单\
    \ 4-18 所示。\n\n```sql\n-- 为所有食谱创建报告标题\nPRINT '-------- Recipe Listing --------';\n\
    -- 对每个食谱重复以下操作\n---- 为每个食谱创建章节小标题\nSELECT\n    '----- Ingredients For Recipe:\
    \ ' + rec.RecipeName + '-----' AS 'SectionHeader'\nFROM  dbo.Recipe rec\n----\
    \ 列出每个食谱的所有配料\nSELECT\n    rec.RecipeID,\n    rec.RecipeName,\n    ing.IngredientName,\n\
    \    srv.ServingPortionQuantity,\n    srv.ServingPortionUnit\nFROM dbo.Ingredient\
    \ ing\nINNER JOIN dbo.RecipeIngredient recing\n    ON ing.IngredientID = recing.IngredientID\n\
    INNER JOIN dbo.Recipe rec\n    ON recing.RecipeID = rec.RecipeID\nINNER JOIN dbo.ServingPortion\
    \ srv\n    ON recing.ServingPortionID = srv.ServingPortionID\nORDER BY rec.RecipeName,\
    \ ing.IngredientName\n```\n\n**清单 4-18**\n将所有数据汇总到一起\n\n添加了一些标题信息后，我准备好开始使输出与当前输出匹配。在清单\
    \ 4-19 中，你可以看到匹配原始输出所需的所有代码。\n\n```sql\nSET NOCOUNT ON;\n-- 为所有食谱创建报告标题\nPRINT\
    \ '-------- Recipe Listing --------';\nPRINT '\n-- 创建临时表存储食谱信息\nCREATE TABLE #RecipeList\n\
    (\n    OrderedList             INT,\n    RecipeID                INT,\n    SectionHeader\
    \           VARCHAR(100)\n);\n-- 对每个食谱重复以下操作\n---- 为每个食谱创建章节间距\nINSERT INTO #RecipeList\
    \ (OrderedList, RecipeID, SectionHeader)\nSELECT\n    0 AS 'OrderedList',\n  \
    \  rec.RecipeID,\n    '' AS 'SectionHeader'\nFROM  dbo.Recipe rec\nWHERE rec.RecipeID\
    \ < 3\n---- 为每个食谱创建章节小标题\nINSERT INTO #RecipeList (OrderedList, RecipeID, SectionHeader)\n\
    SELECT\n    10 AS 'OrderedList',\n    rec.RecipeID,\n    '----- Ingredients For\
    \ Recipe: ' + rec.RecipeName AS 'SectionHeader'\nFROM  dbo.Recipe rec\nWHERE rec.RecipeID\
    \ < 3\n---- 为每个食谱添加配料的列标题\nINSERT INTO #RecipeList (OrderedList, RecipeID, SectionHeader)\n\
    SELECT\n    15 AS 'OrderedList',\n    rec.RecipeID,\n    CAST(''IngredientName''\
    \ AS CHAR(25)) + '' '' +\n    CAST(''ServingPortionQuantity'' AS CHAR(22)) + ''\
    \ '' +\n    CAST(''ServingPortionUnit'' AS CHAR(19)) AS 'SectionHeader'\nFROM\
    \  dbo.Recipe rec\nWHERE rec.RecipeID < 3\nINSERT INTO #RecipeList (OrderedList,\
    \ RecipeID, SectionHeader)\nSELECT\n    20 AS 'OrderedList',\n    rec.RecipeID,\n\
    \    ''------------------------- ---------------------- ------------------'' AS\
    \ 'SectionHeader'\nFROM  dbo.Recipe rec\nWHERE rec.RecipeID < 3\n---- 列出每个食谱的所有配料\n\
    INSERT INTO #RecipeList\n(\n    OrderedList,\n    RecipeID,\n    SectionHeader\n\
    )\nSELECT\n    25 AS 'OrderedList',\n    rec.RecipeID,\n    CAST(ing.IngredientName\
    \ AS CHAR(25)) + '' '' +\n    CAST(srv.ServingPortionQuantity AS CHAR(22)) + ''\
    \ '' +\n    CAST(srv.ServingPortionUnit AS CHAR(19)) AS 'SectionHeader'\nFROM\
    \ dbo.Ingredient ing\nINNER JOIN dbo.RecipeIngredient recing\n    ON ing.IngredientID\
    \ = recing.IngredientID\nINNER JOIN dbo.Recipe rec\n    ON recing.RecipeID = rec.RecipeID\n\
    INNER JOIN dbo.ServingPortion srv\n    ON recing.ServingPortionID = srv.ServingPortionID\n\
    WHERE rec.RecipeID < 3\nORDER BY rec.RecipeName, ing.IngredientName\nSELECT\n\
    \    SectionHeader\nFROM #RecipeList\nORDER BY RecipeID, OrderedList\nDROP TABLE\
    \ #RecipeList\n```\n\n**清单 4-19**\n为避免使用游标而重写的查询\n\n## 比较输出结果\n\n当结果输出到文本时，原始游标给出了如图\
    \ 4-4 所示的输出。\n\n![../images/480547_1_En_4_Chapter/480547_1_En_4_Fig4_HTML.jpg](img/480547_1_En_4_Fig4_HTML.jpg)\n\
    \n**图 4-4**\n游标的输出结果\n\n为确认我们从清单 4-19 的重写是正确的，我在执行相同查询时将结果捕获为文本。图 4-5 中的输出看起来是一样的。\n\
    \n![../images/480547_1_En_4_Chapter/480547_1_En_4_Fig5_HTML.jpg](img/480547_1_En_4_Fig5_HTML.jpg)\n\
    \n**图 4-5**\n修改后查询的输出\n\n然而，这些输出仅在导出到文本时才相同。在处理小型数据集时，额外的代码和工作量可能看起来并非必要。通常情况是，大多数性能问题直到性能受到显著且负面影响时才会显现。就这两种方法而言，处理两条记录时，性能看起来相同。但是，当处理超过\
    \ 10,000 个食谱时，清单 4-19 中的查询性能明显好得多，这一点立刻变得清晰。\n\n## 本章总结\n\n在本章中，我介绍了如何以及为何要使用存储过程。这包括创建可重用且一致的代码。我还向你展示了如何使用参数。在大多数情况下，参数将有助于使你的代码更具适应性和动态性。参数在许多不同场景中都很有用。虽然参数在许多不同情况下非常有用，但你还需要确保你的\
    \ T-SQL 没有受到参数嗅探的负面影响。我还介绍了一种常见情况，即你可能需要使用 T-SQL 来解决复杂问题。你常常会发现，当你的 T-SQL 代码保持更直接明了时，其性能会更好。这可能意味着代码的可读性或整洁度有所下降，但\
    \ SQL Server 会更清楚如何获得最优的执行计划。\n\n## 本节结论\n\n这也结束了当前关于编写可理解的 T-SQL 的部分。可理解的 T-SQL\
    \ 是指针对每种情况使用最佳数据类型。这通常是占用最少空间并提供必要精度的数据类型。你还需要理解可用的各种 SQL Server 数据库对象，以便构建你的\
    \ T-SQL。你需要权衡使用一种数据库对象与另一种的益处和挑战。在某些情况下，你需要决定代码可读性与数据库性能哪个更重要。编写可理解的 T-SQL 的另一个方面是对\
    \ T-SQL 进行格式化、命名和添加注释，以便他人能快速理解你所写的内容。\n\n使用 T-SQL 时，会有你需要编写可多次一致调用的 T-SQL 的时候。使用参数也可以使这些\
    \ T-SQL 代码更加灵活。当面对编写不直接明了的 T-SQL 时，将代码分解成片段以简化需要编写的内容会对你有所帮助。一旦你对编写可理解的 T-SQL\
    \ 感到得心应手，你就准备好开始专注于编写高效且最小化对 SQL Server 性能影响的 T-SQL 了。\n"
- fmt: '# Part II Building Performant T-SQL


    # 5. Set-Based Design


    Knowing how to design T-SQL is part of the foundation for writing professional
    code. Once you can write T-SQL code that can be easily understood, you can start
    to focus on improving the performance of your T-SQL code. If you learned T-SQL
    informally as part of your job or your primary function is writing code for software
    applications, you may not consciously consider set-based design when writing your
    T-SQL code. You may be an experienced database developer and want to learn more
    about set-based design.


    In this chapter, I want to discuss how to work with your data. The first step
    is to get familiar with the various ways to interact with your data. Once you
    understand the different ways you can interact with your data, you want to start
    thinking about how to put the data in the best format for your queries. Then you
    should be able to write those queries in a way that takes advantages of SQL Server’s
    natural strengths.


    ## Introduction to Set-Based Design


    We live in a world where data is everywhere. Almost anything we do can generate
    data that needs to be saved. The first challenge in collecting data is determining
    how to store data. The second challenge is accessing that data. One of the reasons
    you will use SQL Server is to take advantage of the relationships between data.
    This is because SQL Server is a relational database management system (RDBMS).
    While our focus is writing T-SQL, it is important to also understand how the data
    is stored in SQL Server.


    Going back to my example of a database for recipes, let’s look at what types of
    data can be associated with this type of information:


    *   Name

    *   Cost

    *   Ingredients

    *   Number of Servings

    *   Preparation Time

    *   Cooking Time

    *   Type of Cuisine

    *   Cooking Method

    *   Type of Meal


    I can group data together by how they describe other items. For instance, I can
    group information about recipes as shown in Table 5-1.


    Table 5-1


    General Attributes for Ingredients


    | Recipe | Ingredient | Cooking Method |

    | --- | --- | --- |

    | Name | Name | Name |

    | Cuisine | Unit of Measure |   |

    | Number of Servings | Cost |   |

    | Ingredients |   |   |

    | Quantity of Ingredient |   |   |


    Once that information is grouped, the data can be stored by those groupings. If
    I were to start populating data for ingredients, the data could be stored in a
    table as shown in Table 5-2.


    Table 5-2


    General Ingredient Information


    | Ingredient Name | Unit(s) | Measurement | Cost |

    | --- | --- | --- | --- |

    | Diced Tomatoes | 28 | Ounces | $1.84 |

    | Tomato Paste | 10 | Tablespoon | $0.79 |

    | Tomato Sauce | 8 | Ounces | $0.55 |

    | Minced Garlic | 60 | Tablespoon | $5.99 |


    The data organized in the table is a data set. Looking at the data in the first
    column, Ingredient Name, there are three records that contain the word tomato.
    There are also two rows that are measured in ounces.


    One of the things that can be difficult when working with SQL Server is the use
    of set-based transactions. People come to SQL Server from other fields and professions.
    These include software development, networking, system administration, or general
    business operations. In each of these cases, a person may not have developed the
    skill set for thinking in set-based operations.


    What are set-based operations? What do they mean? Why are they so important? Set-based
    operations are looking at data in terms of chunks or segments instead of looking
    at records or data row by row. To show you a comparison, Table 5-3 shows each
    data record individually.


    Table 5-3


    Ingredients by Individual Row


    | Ingredient Name |

    | --- |

    | Diced Tomatoes |


    | Ingredient Name |

    | --- |

    | Tomato Paste |


    | Ingredient Name |

    | --- |

    | Tomato Sauce |


    | Ingredient Name |

    | --- |

    | Minced Garlic |


    If I were to select the data from Table 5-3 in this manner, it would be far less
    efficient than trying to select the data as a set. Table 5-4 shows what it would
    look like to select the data as a set.


    Table 5-4


    Ingredients as One Data Set


    | Ingredient Name |

    | --- |

    | Diced Tomatoes |

    | Tomato Paste |

    | Tomato Sauce |

    | Minced Garlic |


    Viewing the data like this allows you to also see the similarities between the
    data.


    You are trying to figure out how to handle implementing a process or a task with
    multiple rows at the same time. You want to consider doing the same thing to all
    those rows at the same time. In the preceding example, I can quickly determine
    which records have the word tomato in common. The data is giving us a hint that
    if we want to look at or change something about ingredients with tomatoes, there
    may be more than one way to accomplish this goal. This type of scenario may indicate
    your logic should be structured in a way that it can function correctly by using
    algebraic logic instead of hard-coded values.'
