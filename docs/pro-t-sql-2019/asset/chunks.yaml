    | 烤鸡 | 4 | 晚餐 |

    | 餐包 | 12 | 面包 |


    虽然这是食谱当前的保存方式，但我可能决定要更改餐类型的存储方式。我可能想根据主要成分而不是用餐时间来更改餐类型。在这种情况下，我可以像表 5-17 所示那样一次更新一条记录。


    **表 5-17：以单条记录形式更新的食谱**


