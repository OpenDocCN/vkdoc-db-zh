    递归 CTE 的部分执行计划


    我发现很少有绝对需要使用递归 CTE 的情况。然而，当我不得不使用常用表表达式时，我发现它们非常有用。


    ### 临时对象


    您可能会发现自己处于需要创建对象但只使用很短时间的场景。有时创建这些对象是为了在处理复杂逻辑时处理数据子集。其他时候，将部分代码拆分出来创建临时对象可以提高可读性或使其他人更容易理解您在做什么。无论哪种场景，在
    SQL Server 中都有可能创建临时对象。


    #### 临时表


    临时表正如其名。它们采用与表相同的结构，包含列、数据类型并存储数据。主要区别在于临时表不会无限期地存在。根据您想对临时表执行的操作以及需要它们保留的时间，将决定您最终创建哪种类型的临时表。


    使用临时表还有其他优势。这些包括能够使用主键和索引来提高性能。还可以在临时表上创建统计信息，进一步提高其性能。需要考虑的一点是，如果在首次创建临时表后执行了额外的修改，统计信息可能不会自动更新。'
  raw: 'While table-valued parameters can streamline your code, keep in mind that
    there can be a hidden performance impact. One of the best practices when developing
    new code is to check the execution plan and confirm that SQL Server is processing
    the code in a method that aligns with the shape of the data.


    ### Common Table Expressions


    While this is not a user-defined database object, I have included common table
    expressions in this section as they are often used for similar purposes as temporary
    tables, table variables, and table-valued parameters. Their purpose is to help
    break up complex logic or get a subset of data to be used later in the T-SQL code,
    batch, or stored procedure.


    The primary reason for using basic common table expressions is to improve overall
    readability of code. In Listing [2-22](#480547_1_En_2_Chapter.xhtml#PC22), I have
    created a common table expression using the same logic as the view that was created
    in Listing [2-2](#480547_1_En_2_Chapter.xhtml#PC2). The expectation is that when
    this code is executed, it will perform the same as the view created earlier.


    ```

    WITH cte_meal AS

    (

    SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    )

    SELECT meal.MealTypeName, meal.RecipeName, meal.ServingQuantity, meal.IngredientName

    FROM cte_meal meal

    Listing 2-22

    Create a Basic Common Table Expression

    ```


    In Figure [2-15](#480547_1_En_2_Chapter.xhtml#Fig15), you can see that the execution
    plan generated from Listing [2-22](#480547_1_En_2_Chapter.xhtml#PC22) matches
    the execution in Figure [2-6](#480547_1_En_2_Chapter.xhtml#Fig6). If you recall,
    the execution plan in Figure [2-6](#480547_1_En_2_Chapter.xhtml#Fig6) was generated
    from the view created in Listing [2-16](#480547_1_En_2_Chapter.xhtml#PC16).


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig15_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig15_HTML.jpg)


    Figure 2-15


    Execution Plan for Basic Common Table Expression


    When you use a common table expression, you can also join the common table expression
    (CTE) to other tables as you would do for a view or a temporary table. You also
    get the ability to use CTEs to not only SELECT but also INSERT, UPDATE, and DELETE
    data based from the CTE. Listing [2-23](#480547_1_En_2_Chapter.xhtml#PC23) shows
    a query with more complex logic when using common table expressions.


    ```

    WITH cte_meal AS

    (

    SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    )

    SELECT meal.RecipeName, meal.IngredientName, SUM(ingcos.Cost) AS ''IngredientCost''

    FROM cte_meal meal

    INNER JOIN dbo.Ingredient ing

    ON meal.IngredientName = ing.IngredientName

    INNER JOIN dbo.IngredientCost ingcos

    ON ingcos.IngredientID = ing.IngredientID

    GROUP BY meal.RecipeName, meal.IngredientName

    Listing 2-23

    Using Joins with Common Table Expressions

    ```


    There is also one final piece of functionality related to common table expressions
    that makes them somewhat unique. You can create recursive common table expressions.
    In this scenario, a CTE will reference itself to help generate hierarchical data.
    It may be tempting to try to get recursive CTEs to solve many different issues.
    I would advise to use caution when implementing recursive CTEs. They can be the
    correct tool when needed, but they can also cause significant performance challenges.
    Listing [2-24](#480547_1_En_2_Chapter.xhtml#PC24) is an example of creating a
    recursive CTE to find child recipes that are required for the parent recipe.


    ```

    WITH cte_meal (MealTypeName, RecipeName, ServingQuantity, IngredientName, RecipeLevel)
    AS

    (

    SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName,
    1

    FROM dbo.Ingredient ing

    INNER JOIN dbo.RecipeIngredient recing

    ON ing.IngredientID = recing.IngredientID

    INNER JOIN dbo.Recipe rec

    ON recing.RecipeID = rec.RecipeID

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    LEFT JOIN dbo.Ingredient baseing

    ON rec.RecipeName = baseing.IngredientName

    WHERE baseing.IngredientName IS NULL

    UNION ALL

    SELECT meal.MealTypeName, rec.RecipeName, meal.ServingQuantity, ing.IngredientName,
    meal.RecipeLevel + 1

    FROM cte_meal meal

    INNER JOIN dbo.Recipe rec

    ON meal.IngredientName = rec.RecipeName

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    )

    SELECT MealTypeName,

    RecipeName,

    IngredientName,

    RecipeLevel

    FROM cte_meal meal

    Listing 2-24

    Recursive CTE to Find All Required Recipes

    ```


    As you can see from the partial execution plan in Figure [2-16](#480547_1_En_2_Chapter.xhtml#Fig16),
    the steps SQL Server needs to take to execute this query get considerably more
    complex.


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig16_HTML.jpg](images/480547_1_En_2_Chapter/480547_1_En_2_Fig16_HTML.jpg)


    Figure 2-16


    Partial Execution Plan for Recursive CTE


    I have found very few times where I have needed to absolutely use a recursive
    CTE. However, when I have had to use a common table expression, I have found them
    very helpful.


    ## Temporary Objects


    You may find yourself in a situation where you need to create an object but only
    for a short period of time. Sometimes these objects are created so that you can
    work with a subset of data when dealing with complex logic. Other times it is
    easier to break some of the code out to create a temporary object to improve readability
    or make it easier for others to understand what you are doing. Regardless of the
    scenario, there is the possibility to create temporary objects in SQL Server.


    ### Temporary Tables


    Temporary tables are exactly what they sound like. They take the same shape as
    tables where they have columns and data types and stored data. The main difference
    is that temporary tables do not hang around indefinitely. Depending on what you
    want to do with your temporary tables and how long you need them to last will
    determine which type of temporary table you would end up creating.


    There are other advantages to using temporary tables. These include the ability
    to use primary keys and indexes for improved performance. Statistics can also
    be created on temporary tables further improving their performance. One thing
    to consider is that statistics may not be automatically updated on the temporary
    table if additional modifications are performed after the temporary table is first
    created.'
  trans: '

    ### 常用表表达式


    虽然这不是用户定义的数据库对象，但我将常用表表达式包含在本节中，因为它们经常用于与临时表、表变量和表参数相似的目的，即帮助拆分复杂的逻辑，或在 T-SQL
    代码、批处理或存储过程中获取稍后使用的数据子集。


    使用基本常用表表达式的主要原因是提高代码的整体可读性。在清单 2-22 中，我使用与清单 2-2 中创建的视图相同的逻辑创建了一个常用表表达式。期望是当执行此代码时，其性能将与之前创建的视图相同。


    ```

    WITH cte_meal AS

    (

    SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    )

    SELECT meal.MealTypeName, meal.RecipeName, meal.ServingQuantity, meal.IngredientName

    FROM cte_meal meal

    清单 2-22

    创建一个基本常用表表达式

    ```


    在图 2-15 中，您可以看到从清单 2-22 生成的执行计划与图 2-6 中的执行计划相匹配。如果您还记得，图 2-6 中的执行计划是从清单 2-16 创建的视图生成的。


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig15_HTML.jpg](img/480547_1_En_2_Fig15_HTML.jpg)


    图 2-15


    基本常用表表达式的执行计划


    当您使用常用表表达式时，您也可以像连接视图或临时表一样将常用表表达式（CTE）与其他表连接。您还可以使用 CTE 基于 CTE 执行 `SELECT`、`INSERT`、`UPDATE`
    和 `DELETE` 操作。清单 2-23 展示了一个使用常用表表达式时具有更复杂逻辑的查询。


    ```

    WITH cte_meal AS

    (

    SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    )

    SELECT meal.RecipeName, meal.IngredientName, SUM(ingcos.Cost) AS ''IngredientCost''

    FROM cte_meal meal

    INNER JOIN dbo.Ingredient ing

    ON meal.IngredientName = ing.IngredientName

    INNER JOIN dbo.IngredientCost ingcos

    ON ingcos.IngredientID = ing.IngredientID

    GROUP BY meal.RecipeName, meal.IngredientName

    清单 2-23

    在常用表表达式中使用连接

    ```


    还有一项与常用表表达式相关的最终功能使它们有些独特。您可以创建递归常用表表达式。在这种情况下，CTE 将引用自身以帮助生成分层数据。可能很诱人地想让递归 CTE
    解决许多不同的问题。我建议在实现递归 CTE 时谨慎行事。当需要时，它们可以是正确的工具，但它们也可能导致重大的性能挑战。清单 2-24 是创建递归 CTE
    以查找父配方所需的子配方的示例。


    ```

    WITH cte_meal (MealTypeName, RecipeName, ServingQuantity, IngredientName, RecipeLevel)
    AS

    (

    SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName,
    1

    FROM dbo.Ingredient ing

    INNER JOIN dbo.RecipeIngredient recing

    ON ing.IngredientID = recing.IngredientID

    INNER JOIN dbo.Recipe rec

    ON recing.RecipeID = rec.RecipeID

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    LEFT JOIN dbo.Ingredient baseing

    ON rec.RecipeName = baseing.IngredientName

    WHERE baseing.IngredientName IS NULL

    UNION ALL

    SELECT meal.MealTypeName, rec.RecipeName, meal.ServingQuantity, ing.IngredientName,
    meal.RecipeLevel + 1

    FROM cte_meal meal

    INNER JOIN dbo.Recipe rec

    ON meal.IngredientName = rec.RecipeName

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    )

    SELECT MealTypeName,

    RecipeName,

    IngredientName,

    RecipeLevel

    FROM cte_meal meal

    清单 2-24

    递归 CTE 以查找所有所需配方

    ```


    如图 2-16 中的部分执行计划所示，SQL Server 执行此查询所需的步骤变得相当复杂。


    ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig16_HTML.jpg](img/480547_1_En_2_Fig16_HTML.jpg)


    图 2-16


    递归 CTE 的部分执行计划


    我发现很少有绝对需要使用递归 CTE 的情况。然而，当我不得不使用常用表表达式时，我发现它们非常有用。


    ### 临时对象


    您可能会发现自己处于需要创建对象但只使用很短时间的场景。有时创建这些对象是为了在处理复杂逻辑时处理数据子集。其他时候，将部分代码拆分出来创建临时对象可以提高可读性或使其他人更容易理解您在做什么。无论哪种场景，在
    SQL Server 中都有可能创建临时对象。


    #### 临时表


    临时表正如其名。它们采用与表相同的结构，包含列、数据类型并存储数据。主要区别在于临时表不会无限期地存在。根据您想对临时表执行的操作以及需要它们保留的时间，将决定您最终创建哪种类型的临时表。


    使用临时表还有其他优势。这些包括能够使用主键和索引来提高性能。还可以在临时表上创建统计信息，进一步提高其性能。需要考虑的一点是，如果在首次创建临时表后执行了额外的修改，统计信息可能不会自动更新。

    '
- fmt: '## Local Temporary Tables


    If you find yourself needing to put data aside for additional analysis or processing,
    then you may have considered using a local temporary table. This type of temporary
    table can also be useful inside of stored procedures. Local temporary tables are
    only available within the same session or connection as they were created. Once
    the session is closed or the connection is terminated, you are unable to access
    the local temporary table.


    While local temporary tables can be used for many different scenarios, it is often
    recommended to not use temporary tables as the first option when needing to store
    data temporarily. There is nothing inherently wrong with local temporary tables,
    but you may find other objects can store data temporarily with less potential
    performance impact. As with all things related to SQL Server, it is best to implement
    a solution and test your solution including load testing before pushing the T-SQL
    code to Production.


    Creating temporary tables is easy. While data can be inserted in a temporary table
    as part of table creation, it is considered best practice to create the temporary
    table with defined data type before inserting records. In Listing 2-25, there
    is code to generate a local temporary table. For comparison, this code used to
    populate this table is the same as the code used in Listing 2-2.


    ```

    CREATE TABLE #TempAvailableMeal

    (

    MealTypeName VARCHAR(25),

    RecipeName VARCHAR(25),

    ServingQuantity TINYINT,

    IngredientName VARCHAR(25)

    )

    ```


    Listing 2-25

    Create a Temporary Table


    Once the temporary table has been created, run the query in Listing 2-26 to populate
    the data in the table.


    ```

    INSERT INTO #TempAvailableMeal (MealTypeName, RecipeName, ServingQuantity, IngredientName)

    SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    ```


    Listing 2-26

    Populate the Temporary Table


    When I ran the process to populate the temporary table, I also got the execution
    plan for this process. In Figure 2-17, you will see that the execution plan looks
    like the ones generated for the view and the common table expression. While the
    shape is similar, some of the activities that are happening and the percent distribution
    are different.


    `../images/480547_1_En_2_Chapter/480547_1_En_2_Fig17_HTML.jpg`


    Figure 2-17

    Execution Plan to Create Temporary Table


    Now that we have determined what the execution plan is to create the temporary
    table, how does the execution plan look after we query from the temporary table?
    Listing 2-27 shows how to query the existing temporary table.


    ```

    SELECT MealTypeName, RecipeName, ServingQuantity, IngredientName

    FROM #TempAvailableMeal

    ```


    Listing 2-27

    Query the Temporary Table


    So far, we have seen where most of the work for a query happen as the same time
    as when the data is originally selected. In this case, the `insert` and the `select`
    have been separated into two separate steps. Figure 2-18 is the execution that
    was generated when the data in the temporary table was queried.


    `../images/480547_1_En_2_Chapter/480547_1_En_2_Fig18_HTML.jpg`


    Figure 2-18

    Query the Temporary Table


    While this query used a `Table Scan`, it is possible to add indexes to a temporary
    table.


    ## Global Temporary Tables


    You may find yourself wanting to create a temporary table that exists for a longer
    period than just the current session or active database connection. Maybe you
    want a temporary table that can be accessed by more than one user. In this case,
    you may want to create a global temporary table. This global temporary table would
    exist even if the original session or connection that created the global temporary
    table is still available.


    Creating a global temporary table is straightforward. If I wanted to re-create
    the temporary table in Listing 2-26 but make sure that the table was global, I
    could run the code in Listing 2-28 to create the global temporary table.


    ```

    INSERT INTO ##TempAvailableMeal (MealTypeName, RecipeName, ServingQuantity, IngredientName)

    SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName

    FROM dbo.Recipe rec

    INNER JOIN dbo.MealType meal

    ON rec.MealTypeID = meal.MealTypeID

    INNER JOIN dbo.RecipeIngredient recing

    ON rec.RecipeID = recing.RecipeID

    INNER JOIN dbo.Ingredient ing

    ON recing.IngredientID = ing.IngredientID

    ```


    Listing 2-28

    Create Global Temporary Table


    The only change between creating a local and global temporary table is with the
    table name used during creation. Comparing the code in Listing 2-26 for a local
    temporary table and Listing 2-28 for a global temporary table, you can see the
    difference in the table names. In Listing 2-26, the table name is `#TempAvailableMeal`,
    while the temporary table name is `##TempAvailableMeal` in Listing 2-28. The addition
    of the second `#` character at the beginning of the table name indicates that
    this temporary table is a global temporary table. In addition, global temporary
    tables operate similarly to local temporary tables. One of the key differences
    is global temporary tables can be accessed outside of the specific connection
    that created the temporary table.'
