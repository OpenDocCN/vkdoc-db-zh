    # Part I Building Understandable T-SQL


    # 1. Data Types


    Data types are the building blocks that make the foundation of writing efficient
    and performant `T-SQL`. While many data types are either a number or a string,
    there are also a variety of data types that do not fit into either category. When
    selecting the right data type, it is important to understand what the data type
    is and when to use it.


    ## Number Data Types


    While numbers may all seem to be the same, `T-SQL` segments numbers into different
    kinds of data types. These data types can include whole numbers or numbers with
    decimal places. Numbers are also categorized by either being exact or approximate.
    Understanding how to work with various number data types when performing mathematical
    calculations is critical to ensuring applications handle data as expected.


    While it may be easiest to pick the most common seeming data types from each category,
    there are specific times where it is best to analyze the data that will be stored
    and select a more appropriate option. When choosing data types, there are various
    factors to consider. The most important step is to figure out what kind of data
    will be stored. The next logical step is to consider how the data will be used
    and stored. In addition, it is important to understand how `T-SQL` handles calculations
    involving various data types.


    ### Exact Number Data Types


    There are situations when the value of a number is definite and known. These types
    of numbers can be referred to as exact numbers. Some examples include true or
    false, quantity of units sold, discount percent, or dollars and cents. One of
    the keys to writing good `T-SQL` is selecting the correct data type category to
    use for a given field. In some cases, the categories have more than one data type
    available.


    When considering what data type to use, you will want to consider the purpose
    for this data type. This will provide better clarity when determining which data
    type should be used. You will want to consider both the benefits and drawbacks
    associated with each data type. You will also want to consider if `SQL Server`
    will have to perform any implicit conversions as a result of using this data type
    in calculations with other data types. The final piece will be to consider how
    the data type is stored in `SQL Server`.'
