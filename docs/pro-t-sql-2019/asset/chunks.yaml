  trans: '你现在应该已经熟悉了 SQL Server 的数据类型以及它们的最佳使用场景。你也应该对编写 T-SQL 时可用的各种数据库对象感到得心应手。既然你对如何通过格式化代码来提高可读性和理解力有了更多了解，现在就可以学习如何使用参数、复杂逻辑和存储过程来设计
    T-SQL 代码了。


    # 4. 设计 T-SQL


    在本节“构建可理解的 T-SQL”的前面章节中，我介绍了可用的各种数据类型以及如何选择正确的数据类型。我也讨论了编写 T-SQL 时可用的几种数据库对象，以及使用每种对象的优缺点。在上一章，我解释了为你自己和其他人使代码具有可读性的重要性。我将通过讲解设计
    T-SQL 代码时的各种选项来结束本节。


    在为应用程序编写 T-SQL 时，我非常推崇使用存储过程。使用存储过程有很多优点，包括使你的代码更具适应性和可重用性的可能性。同样，在代码中使用参数可以增加
    T-SQL 代码的灵活性。在为更复杂的查询设计解决方案时，你可以使用存储过程和参数。此外，在解决复杂问题时，你可能需要考虑其他技术。设计 T-SQL 代码时有几个需要考虑的项目，包括存储过程、参数和复杂的查询逻辑。


    ## 使用存储过程


    在编写 T-SQL 代码时，你有几种可用选项。根据你使用的实现方式，我们将决定 SQL Server 如何处理该 T-SQL 代码。你可以编写即席 T-SQL，其中每个查询的编写都没有统一性。虽然这种代码可以重复使用，但你需要小心确保所有格式完全一致，包括空格。还有所谓的预处理语句。这种类型的
    T-SQL 代码使用参数。当使用预处理语句时，传递给参数的值会被更新。最后，还有存储过程。它们是持久的数据库对象。这些方法各有优缺点。然而，在编写 T-SQL
    时，存储过程通常是最一致的。


    在为应用程序编写 T-SQL 代码时，需要考虑几个方面。为了更好地理解你希望应用程序如何使用 T-SQL，最好先了解 SQL Server 如何处理每个可用的
    T-SQL 选项。当 SQL Server 执行查询时，它必须决定如何执行该查询。在此之前，SQL Server 会检查是否已经存在该查询的执行计划。根据
    T-SQL 的编写方式，会对 SQL Server 验证执行计划是否已存在的方式产生一些影响。


    为了展示存储过程、即席查询和预处理语句如何影响计划缓存，我将通过一些例子进行说明。在清单 4-1 中，你可以看到创建存储过程的语句。


    ```sql

    /*-------------------------------------------------------------*\

    Name:             dbo.GetRecipe

    Author:           Elizabeth Noble

    Created Date:     April 20, 2019

    Description: Get a list of all recipes in the database

    Sample Usage:

    EXECUTE dbo.GetRecipe

    \*-------------------------------------------------------------*/

    CREATE PROCEDURE dbo.GetRecipe

    AS

    SELECT

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe;

    ```

    清单 4-1

    创建存储过程


    在这个例子中，我创建了一个不可配置的存储过程。每次执行此存储过程时，它都会拉回相同类型的数据。此存储过程将拉回已输入数据库的所有配方的信息。如果你想查看此存储过程的结果，可以如清单
    4-2 所示执行该存储过程。


    ```sql

    EXECUTE dbo.GetRecipe;

    ```

    清单 4-2

    执行存储过程


    SQL Server 将创建此执行计划并将其保存到查询计划缓存中。如果将来再次运行此存储过程，SQL Server 将检查计划缓存，看看此存储过程是否已存在于缓存中。只要
    SQL Server 认为该计划相关，此计划就会保留在计划缓存中。在图 4-1 中，你可以看到与清单 4-2 中的存储过程相关的执行计划。


    ![../images/480547_1_En_4_Chapter/480547_1_En_4_Fig1_HTML.jpg](img/480547_1_En_4_Fig1_HTML.jpg)


    图 4-1

    存储过程的执行计划


    如果计划在缓存中，SQL Server 将继续重用相同的执行计划。这对于存储过程很有效。然而，在 SQL Server 中还有其他访问数据的方法。其中一种方法是编写即席查询。编写即席查询时，你可以选择硬编码值或对其进行参数化。清单
    4-3 展示了这种查询的示例，其逻辑与清单 4-1 中的存储过程相同。'
- fmt: '# SQL 查询优化与执行计划缓存


    ## 即席查询逻辑


    ```

    SELECT

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe;

    ```

    **Listing 4-3 即席查询逻辑**


    Listing [4-1](#480547_1_En_4_Chapter.xhtml#PC1) 和 [4-3](#480547_1_En_4_Chapter.xhtml#PC3)
    中的逻辑是相同的。最大的区别在于 SQL Server 处理这两者的方式。对于这两个查询，这一点可能不太明显。实际上，SQL Server 会检查计划缓存以查看是否存在相同的执行计划。存储在计划缓存中的计划并非基于核心逻辑，而是基于实际的即席查询或存储过程执行的编写方式。


    为了查看 SQL Server 中的计划缓存，可以使用 Listing [4-4](#480547_1_En_4_Chapter.xhtml#PC4) 中提供的查询。此查询源自
    Microsoft 在线文档。


    ```

    SELECT cplan.usecounts, cplan.objtype, qtext.text, qplan.query_plan

    FROM sys.dm_exec_cached_plans AS cplan

    CROSS APPLY sys.dm_exec_sql_text(plan_handle) AS qtext

    CROSS APPLY sys.dm_exec_query_plan(plan_handle) AS qplan

    ORDER BY cplan.usecounts DESC

    ```

    **Listing 4-4 用于查看缓存中计划的查询**


    如下面的 Table [4-1](#480547_1_En_4_Chapter.xhtml#Tab1) 所示，即席查询甚至作为“Ad hoc”对象类型存储，而
    SQL Server 能正确识别第二行是一个存储过程。在 Table [4-1](#480547_1_En_4_Chapter.xhtml#Tab1) 中，您可以看到运行存储过程和运行相同代码作为即席查询后，计划缓存中的结果。


    ### Table 4-1：即席查询与存储过程的计划缓存


    | Use Count | Object Type | Query Text |

    | --- | --- | --- |

    | 1 | Ad hoc | SELECT          RecipeID,          RecipeName,          RecipeDescription,          ServingQuantity,          MealTypeID,          PreparationTypeID,          IsActive,          DateCreated,          DateModified   FROM
    dbo.Recipe; |

    | 1 | Proc | CREATE PROCEDURE dbo.GetRecipe     AS           SELECT                RecipeID,                RecipeName,                RecipeDescription,                ServingQuantity,                MealTypeID,                PreparationTypeID,                IsActive,                DateCreated,                DateModified         FROM
    dbo.Recipe; |


    ## 格式不一致的影响


    当用户或应用程序的代码编写不一致时，问题就变得重要起来。在此示例中，我修改了 Listing [4-3](#480547_1_En_4_Chapter.xhtml#PC3)
    中的查询，将 `SELECT` 子句后的第一列移到了同一行。修改查询后，运行 Listing [4-5](#480547_1_En_4_Chapter.xhtml#PC5)
    中的查询时，查询计划缓存会发生变化。


    ```

    SELECT RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe;

    ```

    **Listing 4-5 修改后的即席查询**


    我希望 SQL Server 能识别 Listing [4-3](#480547_1_En_4_Chapter.xhtml#PC3) 中的查询与 Listing
    [4-5](#480547_1_En_4_Chapter.xhtml#PC5) 中的代码是相同的。唯一真正改变的是查询本身的格式。重新运行 Listing
    [4-4](#480547_1_En_4_Chapter.xhtml#PC4) 中的查询，我可以在 Table [4-2](#480547_1_En_4_Chapter.xhtml#Tab2)
    中检查计划缓存。


    ### Table 4-2：修改后即席查询的计划缓存


    | Use Count | Object Type | Query Text |

    | --- | --- | --- |

    | 1 | Ad hoc | SELECT          RecipeID,          RecipeName,          RecipeDescription,          ServingQuantity,          MealTypeID,          PreparationTypeID,          IsActive,          DateCreated,          DateModified   FROM
    dbo.Recipe; |

    | 1 | Ad hoc | SELECT RecipeID,          RecipeName,          RecipeDescription,          ServingQuantity,          MealTypeID,          PreparationTypeID,          IsActive,          DateCreated,          DateModified   FROM
    dbo.Recipe; |

    | 1 | Proc | CREATE PROCEDURE dbo.GetRecipe     AS           SELECT                RecipeID,                RecipeName,                RecipeDescription,                ServingQuantity,                MealTypeID,                PreparationTypeID,                IsActive,                DateCreated,                DateModified         FROM
    dbo.Recipe; |


    在 Table [4-2](#480547_1_En_4_Chapter.xhtml#Tab2) 中可以看到，计划缓存中现在有三个条目。SQL Server
    并没有重用第一次调用即席查询时的执行计划，而是生成了一个全新的执行计划。每次 SQL Server 创建新的执行计划时，都需要消耗额外的资源。这可能导致 SQL
    Server 返回查询结果需要多花几秒钟。每个执行的查询计划都会保存在计划缓存中。为每个查询保存多个执行计划可能会填满执行计划缓存，从而导致其他查询的执行计划被过早地从缓存中移除。查询计划从缓存中移除后，SQL
    Server 将需要消耗额外的资源为该查询创建新的执行计划。在确定应用程序将如何调用 T-SQL 代码时，这是需要考虑的一个重要因素。


    ## 结论


    虽然存储过程为我们提供了一种一致的方式来多次调用相同类型的代码，但如果每个场景都要使用完全相同的基础查询，存储过程可能会相当受限。我通常希望编写一段通用的
    T-SQL 代码，可用于各种场景。在这种情况下，我发现自己想要编写使用参数的查询或存储过程。'
  raw: '```

    SELECT

    RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe;

    Listing 4-3

    Ad Hoc Query Logic

    ```


    The logic in Listings [4-1](#480547_1_En_4_Chapter.xhtml#PC1) and [4-3](#480547_1_En_4_Chapter.xhtml#PC3)
    is the same. The largest difference is in how SQL Server handles the two. For
    both queries, it is a little harder to see. However, what happens is SQL Server
    checks the plan cache to see if the same plan exists. The plans that are stored
    in the plan cache are not based on the core logic but are based on how the actual
    ad hoc query or stored procedure execution is written. In order to look at the
    plan cache in SQL Server, you can use the query is available in Listing [4-4](#480547_1_En_4_Chapter.xhtml#PC4).
    This query is from Microsoft Books Online.


    ```

    SELECT cplan.usecounts, cplan.objtype, qtext.text, qplan.query_plan

    FROM sys.dm_exec_cached_plans AS cplan

    CROSS APPLY sys.dm_exec_sql_text(plan_handle) AS qtext

    CROSS APPLY sys.dm_exec_query_plan(plan_handle) AS qplan

    ORDER BY cplan.usecounts DESC

    Listing 4-4

    Query to View Plans in the Cache

    ```


    As you will be able to see in Table [4-1](#480547_1_En_4_Chapter.xhtml#Tab1) below,
    the ad hoc query is even stored as an ad hoc object type, whereas SQL Server can
    properly tell that the second row is a stored procedure. In Table [4-1](#480547_1_En_4_Chapter.xhtml#Tab1),
    you can see the results in the plan cache from running the stored procedure and
    the same code as an ad hoc query.


    Table 4-1


    Plan Cache for Ad Hoc Query and Stored Procedure


    | Use Count | Object Type | Query Text |

    | --- | --- | --- |

    | 1 | Ad hoc | SELECT         RecipeID,         RecipeName,         RecipeDescription,         ServingQuantity,         MealTypeID,         PreparationTypeID,         IsActive,         DateCreated,         DateModified  FROM dbo.Recipe;
    |

    | 1 | Proc | CREATE PROCEDURE dbo.GetRecipe    AS          SELECT               RecipeID,               RecipeName,               RecipeDescription,               ServingQuantity,               MealTypeID,               PreparationTypeID,               IsActive,               DateCreated,               DateModified        FROM
    dbo.Recipe; |


    Where this all can become important is when users or applications are writing
    code inconsistently. In this case, I modify the query from Listing [4-3](#480547_1_En_4_Chapter.xhtml#PC3)
    by moving the first column in the select statement to the same row as the SELECT
    clause. If I modify the query from Listing [4-3](#480547_1_En_4_Chapter.xhtml#PC3),
    you can see how the query plan cache changes since running the query in Listing
    [4-5](#480547_1_En_4_Chapter.xhtml#PC5).


    ```

    SELECT RecipeID,

    RecipeName,

    RecipeDescription,

    ServingQuantity,

    MealTypeID,

    PreparationTypeID,

    IsActive,

    DateCreated,

    DateModified

    FROM dbo.Recipe;

    Listing 4-5

    Ad Hoc Query Modified

    ```


    I would hope that SQL Server can tell that the query in Listing [4-3](#480547_1_En_4_Chapter.xhtml#PC3)
    matches the same code as Listing [4-5](#480547_1_En_4_Chapter.xhtml#PC5). The
    only thing that has really changed is the formatting of the query itself. Rerunning
    the query from Listing [4-4](#480547_1_En_4_Chapter.xhtml#PC4), I can check the
    plan cache in Table [4-2](#480547_1_En_4_Chapter.xhtml#Tab2).


    Table 4-2


    Plan Cache for Modified Ad Hoc Query


    | Use Count | Object Type | Query Text |

    | --- | --- | --- |

    | 1 | Ad hoc | SELECT         RecipeID,         RecipeName,         RecipeDescription,         ServingQuantity,         MealTypeID,         PreparationTypeID,         IsActive,         DateCreated,         DateModified  FROM
    dbo.Recipe; |

    | 1 | Ad hoc | SELECT RecipeID,         RecipeName,         RecipeDescription,         ServingQuantity,         MealTypeID,         PreparationTypeID,         IsActive,         DateCreated,         DateModified  FROM
    dbo.Recipe; |

    | 1 | Proc | CREATE PROCEDURE dbo.GetRecipe    AS          SELECT               RecipeID,               RecipeName,               RecipeDescription,               ServingQuantity,               MealTypeID,               PreparationTypeID,               IsActive,               DateCreated,               DateModified        FROM
    dbo.Recipe; |


    You can see in Table [4-2](#480547_1_En_4_Chapter.xhtml#Tab2) that there are now
    three entries in the plan cache. Instead of SQL Server reusing the execution plan
    from the first time the ad hoc query was called, SQL Server has generated an entirely
    new execution plan. Each time SQL Server creates a new execution plan, it uses
    additional resources to create the plan. This can cause it to take a couple of
    seconds longer for SQL Server to return the query results. Each query plan executed
    is saved in the plan cache. Having multiple execution plans saved for each query
    can fill up the execution plan cache. This can cause other query execution plans
    to be removed from the plan cache prematurely. The removal of a query plan from
    the cache will cause SQL Server to expend additional resources to create a new
    execution for that other query. This is something to consider when determining
    how your applications will call T-SQL code.


    While a stored procedure gives us a consistent way to call that same type of code
    more than once, stored procedures can be fairly limiting if the exact same base
    query will be used for every scenario. I will often want to write a general piece
    of T-SQL code that can be used for various scenarios. In these types of situations,
    I find myself wanting to write queries or stored procedures that use parameters.'
