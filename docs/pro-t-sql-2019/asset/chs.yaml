  SQL Server 2019 中内联标量 UDF 的能力不仅适用于单查询标量 UDF。在使用多语句标量 UDF 时，功能也得到了改进。多语句标量 UDF 与清单
  2-10 中创建的标量 UDF 类似，都返回单个值。多语句标量 UDF 的不同之处在于，函数内部可以包含额外的逻辑。我们可能希望改进清单 2-10 中创建的函数，使其能够处理除零错误。在清单
  2-14 中，我编写了 T-SQL 代码，通过使用多语句标量 UDF 来增强清单 2-10。


  ```

  CREATE OR ALTER FUNCTION dbo.Ingredient_Price

  (

  @Cost DECIMAL(6,3),

  @Count DECIMAL(6,3)

  )

  RETURNS DECIMAL (6,3) AS

  BEGIN

  DECLARE @IngPrc DECIMAL (6,3)

  IF @Count = 0

  BEGIN

  SET @IngPrc =  0.00

  END

  ELSE

  BEGIN

  SET @IngPrc = @Cost / @Count;

  END

  RETURN @IngPrc

  END;

