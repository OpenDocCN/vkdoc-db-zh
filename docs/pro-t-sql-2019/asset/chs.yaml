- '# 7. 理解执行计划


  总体目标是选择对正在联接的数据而言最有效的物理联接方式。`合并联接`可能表现得非常好，但它们仅限于已通过索引或 `ORDER BY` 或 `GROUP BY`
  语句排序的数据。正如预期的那样，`索引合并联接`的性能会比不使用索引的`合并联接`更好。当数据未排序，特别是如果正在联接的两边数据中有一边较小时，SQL Server
  可能会使用`嵌套循环`。你需要确认循环遍历另一个表的代价不会带来显著的开销。正如使用索引的`合并联接`性能优于不使用索引的`合并联接`一样，`嵌套循环`也是如此。对于`合并联接`和`嵌套循环`，看看你是否能够修改
  T-SQL 代码以使用索引。这并不意味着如果不存在索引就去创建它；而是你可以检查表上的索引，看看是否有任何索引适用于你的特定查询。如果表未排序，特别是当两边联接的记录数都很大时，`哈希匹配`可能是理想的解决方案。


  在本章中，我们回顾了处理执行计划的各个方面。我们从访问和查看执行计划的多种方式开始。我们还讨论了`估计执行计划`、`实际执行计划`以及在`计划缓存`中的执行有何不同。查看执行计划时，有一些项目如`箭头大小`、`估计行数`和`实际行数`可以为你提供一些线索，指示下一步可以采取哪些措施来提升
  T-SQL 代码的性能。在考察这些项目之后，你或许还能检查执行是如何使用`索引`的。不仅关注使用了哪些`索引`，还关注 SQL Server 如何搜索这些`索引`，这很有帮助。在联接表时，你会使用
  T-SQL 代码，这些代码可以引用某些逻辑联接类型的行为。这些逻辑联接类型会影响作为执行计划一部分使用的物理联接类型。通过以不同的方式编写 T-SQL 代码，你或许能够影响
  SQL Server 生成的执行计划。运用本章涵盖的所有信息，应该能帮助你更自如地审视你的 T-SQL 代码，并提升与 T-SQL 相关的速度和硬件使用效率。


  ## 8. 优化 T-SQL


  在本书的这一部分，我阐述了编写 T-SQL 代码的许多方面。我从回顾在查询中使用`基于集合的设计`开始。在设计查询时，设计出能有效利用硬件的查询也很重要。检查查询性能的一种方法是使用`执行计划`。一旦你获得了想要改进的查询的`执行计划`，就可以开始专注于如何优化该查询。在优化
  T-SQL 方面，有几种可用的选项。


  当你开始对查询进行`性能调优`时，有许多可用的选项。过去，一种可行的选择是手动识别性能不佳的查询并加以改进。在识别需要优化的查询时，可以考虑许多不同的因素。从
  `SQL Server 2017` 开始，增加了额外的功能，允许 SQL Server 自动提升执行 T-SQL 某些方面的性能。而 `SQL Server 2019`
  则带来了更多增强功能，有助于在不改变底层 T-SQL 代码的情况下，让查询运行得更好、更快。


  ### 优化逻辑读取


  我曾见过一些 T-SQL 代码表面上运行良好。代码执行及时，结果正确。当你查看某个 SQL Server 监控工具时，可能会注意到一些意外行为，表明系统存在性能问题。在某些情况下，你可能会发现一些查询从内存中读取了数据页，但这些页并未包含在结果集中。读取数据页可以识别为`逻辑读取`。你需要查看该
  T-SQL 代码的`执行计划`，以找出可能导致这种差异的原因。这不仅涉及查看执行了哪些 T-SQL 代码，还涉及试图确定可以采取哪些措施来改善性能。


  优化此查询以减少读取量的优势在于，这应能减少作为此查询执行的一部分而读入内存的数据页数量。换句话说，读取超过查询结果所需数据的缺点是，应用程序更频繁使用的页面可能会过早地从内存中清除。不幸的是，我们通常只有在发现应用程序运行缓慢或崩溃时才会意识到性能问题。此时，可能很难诊断出导致问题的具体查询。如果你无法使用监控软件，这种情况的排查会变得更加困难。当我最初开始调查性能问题时，我会检查
  `SQL Server 代理` 的作业历史记录。有时你会发现某个进程与生产问题同时运行。虽然这并不能确认 `SQL Server 代理` 作业是原因，但可能值得调查。


  对于这些情况，最好能确切知道是哪个存储过程或预处理语句导致了性能问题。除了第三方软件、先前设置的`查询存储`或`扩展事件`之外，你可能没有太多可用的选项。此外，我更倾向于在发生中断之前识别出可能导致性能问题的查询。如果我无法使用第三方工具，我会使用
  `DMV`（动态管理视图）来尝试在问题发生前找到相关的 T-SQL。我常常会结合使用上述任何操作与`性能监视器`，来长期跟踪 SQL Server 并确认我的性能调优是否有效。


  如果你没有第三方工具，或者想更熟悉使用 `DMV` 来查找需要性能调优的 T-SQL，你可以查询 `sys.dm_exec_query_stats`。这个 `DMV`
  跟踪已执行且仍在`计划缓存`中的 T-SQL 代码的统计信息。它只返回尚未从`计划缓存`中清除的查询结果。如果你认为此 `DMV` 缺少了一些你期望看到的存储过程，你可能需要研究一下你的`计划缓存`，确定缓存是否被`即席查询`填满了。你需要将此数据与
  `sys.dm_exec_sql_text` 进行联接，以找到与统计信息关联的 T-SQL 代码。


  当试图查找具有高`逻辑读取`的查询时，你需要根据各种标准来查看 T-SQL 代码。查看平均`逻辑读取`通常是我寻找性能调优查询时的主要目标。我偏好这个指标，因为它通常能识别出在服务器上频繁运行、并且可能具有超出我预期的更多读取量的
  T-SQL 代码。如果某个进程在服务器上频繁运行，我不会期望它的平均读取次数非常高，因为频繁的进程意味着该 T-SQL 代码直接关联到某个应用程序。也有一些查询虽然运行不频繁，但在运行时使用了大量`逻辑读取`。根据我的经验，如果总`逻辑读取`很高，而总执行次数很低，我会将这些查询的优先级排在平均`逻辑读取`值较高且执行次数也较高的
  T-SQL 代码之后。




  ### 性能调优：分析与优化 T-SQL 查询


  一旦你确定了需要进行性能调优的`T-SQL`代码，你会希望同时查看代码和执行计划，以熟悉查询正在检索的数据以及`SQL Server`如何检索这些数据。在清单[8-1]中，你可以看到我将要优化的查询。


  ```sql

  DECLARE @RecipeID             INT = -1;

  DECLARE @PreparationTypeID    INT = -1;

  DECLARE @MealTypeID           INT = -1;

  DECLARE @StartDate            DATETIME = NULL;

  DECLARE @EndDate              DATETIME = NULL;

  SELECT recing.RecipeID,

  recing.IngredientID,

  ic.IngredientCostID

  INTO #TmpRecipe

  FROM dbo.Recipe rec

  INNER JOIN dbo.RecipeIngredient recing

  ON rec.RecipeID = recing.RecipeID

  INNER JOIN dbo.Ingredient ing

  ON recing.IngredientID = ing.IngredientID

  INNER JOIN dbo.IngredientCost ic

  ON ing.IngredientID = ic.IngredientID

  WHERE (rec.PreparationTypeID = @PreparationTypeID OR @PreparationTypeID = -1)

  AND (rec.RecipeID = @RecipeID OR @RecipeID = -1)

  AND (rec.MealTypeID = @MealTypeID OR @MealTypeID = -1)

  AND ing.IsActive = 1

  AND (rec.DateCreated > @StartDate OR @StartDate IS NULL)

  AND (rec.DateCreated < @EndDate OR @EndDate IS NULL)

  AND ic.IngredientCostID IN (

  SELECT IngredientCostID

  FROM dbo.IngredientCostHistory

  GROUP BY IngredientCostID

  HAVING COUNT(*) > 3

  );

  SELECT rec.RecipeName,

  rec.RecipeDescription,

  ing.IngredientName,

  rec.PreparationTypeID,

  p.PreparationTypeName,

  p.PreparationTypeDescription,

  ic.Cost

  FROM #TmpRecipe tr

  LEFT JOIN #UniqueIngredientCost uic

  ON tr.IngredientCostID = uic.IngredientCostID

  LEFT JOIN dbo.IngredientCostHistory ic

  ON uic.IngredientCostID = ic.IngredientCostID

  INNER JOIN dbo.Recipe rec

  ON tr.RecipeID = rec.RecipeID

  INNER JOIN dbo.Ingredient ing

  ON tr.IngredientID = ing.IngredientID

  INNER JOIN dbo.PreparationType p

  ON rec.PreparationTypeID = p.PreparationTypeID

  WHERE uic.IngredientCostID IS NOT NULL

  ORDER BY

  CASE WHEN

  (

  rec.RecipeID = @RecipeID

  AND rec.PreparationTypeID = @PreparationTypeID

  )

  THEN 0

  ELSE 1

  END,

  rec.RecipeName DESC,

  ing.IngredientName ASC

  DROP TABLE #TmpRecipe

  DROP TABLE #UniqueIngredientCost

  ```

  **清单 8-1** 用于查询食谱和准备详情的原始查询


  #### 分析执行计划


  你还需要从计划缓存中获取执行计划，以便查看`SQL Server`如何执行这段`T-SQL`代码。图[8-1]中的部分执行计划展示了执行计划中可能受益于优化的一个部分。


  ![执行计划图](img/480547_1_En_8_Fig1_HTML.jpg)


  **图 8-1** 清单[8-1]对应的部分执行计划


  执行计划中有一条粗线，在哈希匹配后变成了一条细线。这是一个很好的迹象，表明该查询可能能够被优化以减少整体读取次数。基于这些信息，我需要调查`dbo.Recipe`的数据是如何与`dbo.RecipeIngredient`结合的。查看`T-SQL`代码或其输出，我可以更好地理解这个查询的目的。此查询返回所有成本已更改三次以上的食材，以及使用这些食材的食谱信息。


  #### 理解优化点


  了解这一点有助于我们开始优化该查询逻辑读取的过程。我知道这个查询是基于成本已更改超过三次的食材。如果我尝试只查找包含价格已更改超过三次的食材的食谱，可能可以减少读取次数。虽然表`dbo.RecipeIngredient`是按`RecipeID`和`IngredientID`排序的，但这在清单[8-1]的`T-SQL`代码仅查找包含特定食材的食谱时没有帮助。执行计划表明`SQL
  Server`正在使用一个非聚集索引来检索数据。创建此索引的`T-SQL`代码在清单[8-2]中。


  ```sql

  CREATE NONCLUSTERED INDEX NDX_RecipeIngredient_IsActive_IngredientID

  ON dbo.RecipeIngredient (IsActive, IngredientID)

  ```

  **清单 8-2** 在`RecipeIngredient`上创建索引的查询


  非聚集索引不会改变表中数据的顺序，但索引会保持索引数据的排序。在这个案例中，索引首先按`IsActive`列的值排序，然后按`IngredientID`排序。非聚集索引还必须能够引用回聚集索引，以防`SQL
  Server`决定使用此非聚集索引但还需要表中的其他数据。`SQL Server`通过将聚集索引的列包含在此索引中来实现这一点。这对我们有帮助，因为这意味着可以使用此索引中的`RecipeID`来查找包含该食材的所有`RecipeID`。


  ##### 索引的局限性


  这一切听起来很棒，但看起来这个索引目前并没有给我们带来最佳性能。虽然我们可以致力于调整索引，但我发现，在非常大的表和高度事务性的系统中，你可能无法添加或修改现有索引。有时这些索引的存在正是为了确保应用程序关键部分的良好性能。修改这些索引可能会带来更多的麻烦。幸运的是，在这个场景中，我们只需向清单[8-1]的`T-SQL`中添加一行代码，就可以减少读取次数。索引是按`IsActive`标志排序的。如果我修改查询以引用`IsActive`标志，我可能能够使索引更高效地工作。你可以在清单[8-3]中看到代码`AND
  (recing.IsActive = 1 OR recing.IsActive = 0)`。


  ```sql

  DECLARE @RecipeID             INT = -1;

  DECLARE @PreparationTypeID    INT = -1;

  DECLARE @MealTypeID           INT = -1;

  DECLARE @StartDate            DATETIME = NULL;

  DECLARE @EndDate              DATETIME = NULL;

  SELECT recing.RecipeID,

  recing.IngredientID,

  ic.IngredientCostID

  INTO #TmpRecipe

  FROM dbo.Recipe rec

  INNER JOIN dbo.RecipeIngredient recing

  ON rec.RecipeID = recing.RecipeID

  INNER JOIN dbo.Ingredient ing

  ON recing.IngredientID = ing.IngredientID

  INNER JOIN dbo.IngredientCost ic

  ON ing.IngredientID = ic.IngredientID

  WHERE (rec.PreparationTypeID = @PreparationTypeID OR @PreparationTypeID = -1)

  AND (rec.RecipeID = @RecipeID OR @RecipeID = -1)

  AND (rec.MealTypeID = @MealTypeID OR @MealTypeID = -1)

  AND ing.IsActive = 1

  -- 添加下面的代码以尝试使用索引

  ---- dbo.RecipeIngredient 上已存在索引 NDX_RecipeIngredient_IsActive_IngredientID

  -------- 并且该索引按 IsActive 排序，然后是 IngredientID

  AND (recing.IsActive = 1 OR recing.IsActive = 0)

  AND (rec.DateCreated > @StartDate OR @StartDate IS NULL)

  AND (rec.DateCreated < @EndDate OR @EndDate IS NULL)

  AND ic.IngredientCostID IN (

  SELECT IngredientCostID

  FROM dbo.IngredientCostHistory

  GROUP BY IngredientCostID

  HAVING COUNT(*) > 3

  );

  SELECT rec.RecipeName,

  rec.RecipeDescription,

  ing.IngredientName,

  rec.PreparationTypeID,

  p.PreparationTypeName,

  p.PreparationTypeDescription,

  ic.Cost

  FROM #TmpRecipe tr

  LEFT JOIN #UniqueIngredientCost uic

  ON tr.IngredientCostID = uic.IngredientCostID

  LEFT JOIN dbo.IngredientCostHistory ic

  ON uic.IngredientCostID = ic.IngredientCostID

  INNER JOIN dbo.Recipe rec

  ON tr.RecipeID = rec.RecipeID

  INNER JOIN dbo.Ingredient ing

  ON tr.IngredientID = ing.IngredientID

  INNER JOIN dbo.PreparationType p

  ON rec.PreparationTypeID = p.PreparationTypeID

  WHERE uic.IngredientCostID IS NOT NULL

  ORDER BY

  CASE WHEN

  (

  rec.RecipeID = @RecipeID

  AND rec.PreparationTypeID = @PreparationTypeID

  )

  THEN 0

  ELSE 1

  END,

  rec.RecipeName DESC,

  ing.IngredientName ASC

  DROP TABLE #TmpRecipe

  DROP TABLE #UniqueIngredientCost

  ```

  **清单 8-3** 用于查询食谱和准备详情的优化后查询


  #### 验证优化结果


  现在我已经修改了代码，我需要获取一个新的执行计划来确认这些更改是否如我所愿地起作用。图[8-2]显示了执行计划中相同的区域，但这是`T-SQL`代码更改后的样子。



  ![../images/480547_1_En_8_Chapter/480547_1_En_8_Fig2_HTML.jpg](img/480547_1_En_8_Fig2_HTML.jpg)


  **图 8-2**


  清单 8-3 的部分执行计划


  发生了一些变化。从整体执行计划来看，可以看到所有的线条比之前细了很多。虽然某些步骤的顺序发生了变化，但最大的差异与非聚集索引有关。在图 8-1 中，SQL Server
  正在对该索引执行**索引扫描**。现在我已将 `IsActive` 列指定为查询的一部分，SQL Server 现在对这个相同的非聚集索引使用**索引查找**。并非所有优化
  `T-SQL` 代码的尝试都这么简单。但是，当你了解数据的存储方式以及表上索引引用该数据的方式时，就有可能对你的 `T-SQL` 代码做出显著的改进。


  #### 优化持续时间


  我使用 SQL Server 的目标是让执行 `T-SQL` 代码的查询运行得尽可能快。我倾向于关注逻辑读取次数，因为我希望最小化进入缓存的、并非正在执行的查询所需的数据页数量。然而，SQL
  Server 中还可能发生其他问题，这些问题可能对下游产生负面影响。


  在 SQL Server 2019 之前，查询速度慢的最常见原因之一是参数嗅探。SQL Server 2019 中的**自适应连接**有助于最小化与参数嗅探相关的问题。如果执行计划包含自适应连接，SQL
  Server 将在执行时决定是使用合并连接还是嵌套循环连接。自适应连接的灵活性允许 `T-SQL` 代码在数据集较小时以一种方式执行，而在数据集较大时使用不同的物理连接方式执行。无论检索的数据如何，这都将使查询执行得更好。


  寻找执行时间最慢的查询可能具有挑战性，特别是当你试图获取有关查询性能的实时数据时。幸运的是，SQL Server 确实会跟踪查询计划缓存中存在的 `T-SQL`
  代码的查询性能。你可以使用与上一节相同的 DMV，即 `sys.dm_exec_query_stats`，但不是查找总逻辑读取或平均逻辑读取最高的记录，而是需要查看工作线程时间。你可以从总工作线程时间或平均工作线程时间开始查看。根据查询运行的时间段，这可能有助于你决定首先关注哪一个。如果工作线程时间最高的某个查询在你业务最活跃的时间段运行，我会首先处理该查询。但是，如果你有平均工作线程时间最高的
  `T-SQL` 代码在一天中的繁忙时段频繁运行，首先处理这段代码可能会带来更多好处。无论哪种方式，你都需要在 `sys.dm_exec_sql_text` 中查找与
  `sys.dm_exec_query_stats` 中的计划相匹配的计划，以找到相关的查询文本。


  SQL Server 的一个挑战是，同一个解决方案并不总是适用于所有情况。我遇到过一些查询，将数据拆分成更小的片段可以提高性能。在其他时候，将几个步骤合并为单个
  `T-SQL` 语句可能更有效。清单 8-4 中的查询显示了一系列 `T-SQL` 语句。


  ```sql

  DECLARE @RecipeID INT = NULL;

  CREATE TABLE #TempIngredient

  (

  RecipeID          INT,

  IngredientName    VARCHAR(25),

  Cost              DECIMAL(6,3)

  );

  INSERT INTO #TempIngredient

  SELECT recing.RecipeID, ing.IngredientName, ingcos.Cost

  FROM dbo.RecipeIngredient recing

  INNER JOIN dbo.Ingredient ing

  ON recing.IngredientID = ing.IngredientID

  LEFT JOIN dbo.IngredientCost ingcos

  ON ing.IngredientID = ingcos.IngredientID

  AND ingcos.IsActive = 1

  AND ingcos.Cost > 5.00

  ORDER BY recing.RecipeID, recing.IngredientID;

  SELECT rec.RecipeName, meal.MealTypeName, ting.IngredientName, ting.Cost

  FROM dbo.Recipe rec

  INNER JOIN dbo.MealType meal

  ON rec.MealTypeID = meal.MealTypeID

  INNER JOIN #TempIngredient ting

  ON rec.RecipeID = ting.RecipeID

  WHERE (rec.RecipeID = @RecipeID OR @RecipeID IS NULL)

  ORDER BY rec.RecipeName, ting.IngredientName;

  DROP TABLE #TempIngredient;

  ```


