- "# 格式化 T-SQL 代码\n\n在使用 T-SQL 代码时，有时你会编写复杂的代码。这些代码可能包含子查询，或者 `WHERE` 子句中涉及 `AND`\
  \ 或 `OR` 的逻辑。如果 `WHERE` 子句中存在诸如子查询或 `AND` 和 `OR` 混合使用之类的逻辑，我会将它们括在括号内。我会将括号内的所有代码进行缩进，以便轻松识别哪些逻辑被组合在一起。有时，两个表之间存在多个连接条件。如果两个表之间有不止一个连接条件，我会对除第一个连接条件外的每一个连接条件进行缩进，以便他人可以轻易看出两个表之间存在多个连接条件。\n\
  \n当向代码中添加额外的逻辑层次时，你还需要考虑如何格式化 T-SQL 代码。T-SQL 代码块有各种原因，包括 `TRY… CATCH` 块、`IF… ELSE`\
  \ 语句、`BEGIN…END`，或者其他需要分割代码的情况。对于这些场景，我会对代码块的内部进行缩进。如果代码块最终被嵌套，我会对每个后续代码块进行缩进。我倾向于对代码块进行缩进，以便审查我代码的人可以看到父级活动，例如清单\
  \ 3-17 中的 `WHILE` 循环。一旦你看到第一级缩进，你就知道所有缩进的逻辑都属于同一个代码块。\n\n```sql\nSET NOCOUNT ON;\n\
  DECLARE @RecipeID INT,\n    @RecipeName VARCHAR(25),\n    @message VARCHAR(50);\n\
  PRINT '-------- Recipe Listing --------';\nDECLARE recipe_cursor CURSOR FORWARD_ONLY\n\
  FOR\nSELECT RecipeID, RecipeName\nFROM dbo.Recipe\nORDER BY RecipeID;\nOPEN recipe_cursor\n\
  FETCH NEXT FROM recipe_cursor\nINTO @RecipeID, @RecipeName\nWHILE @@FETCH_STATUS\
  \ = 0\nBEGIN\n    PRINT ' '\n    SELECT @message = '----- Ingredients For Recipe:\
  \ ' + @RecipeName + '-----'\n    PRINT @message\n    SELECT ing.IngredientName,\n\
  \        srv.ServingPortionQuantity,\n        srv.ServingPortionUnit\n    FROM dbo.Ingredient\
  \ ing\n    INNER JOIN dbo.RecipeIngredient recing\n        ON ing.IngredientID =\
  \ recing.IngredientID\n    INNER JOIN dbo.ServingPortion srv\n        ON recing.ServingPortionID\
  \ = srv.ServingPortionID\n    WHERE recing.RecipeID = @RecipeID\n    FETCH NEXT\
  \ FROM recipe_cursor INTO @RecipeID, @RecipeName\nEND\nCLOSE recipe_cursor;\nDEALLOCATE\
  \ recipe_cursor;\n```\n清单 3-17\n创建游标\n\n一致地格式化 T-SQL 代码可以提高你自己以及将来需要审查你代码的任何人的可读性。格式良好的代码可以在故障排除、性能调优和代码增强时提供清晰度。在你的组织中创建\
  \ T-SQL 格式化标准也有助于新员工入职或培训初级数据库开发人员。一旦确定了 T-SQL 格式化标准，你将需要考虑采取哪些步骤来为你的 T-SQL 代码创建命名约定。\n\
  \n### 命名 T-SQL\n\n当你编写 T-SQL 时，你有选择如何编写该代码的方式。你很可能会在 T-SQL 中创建持久性对象。无论你的目的是什么，遵循良好的命名策略都使他人更容易理解你的\
  \ T-SQL 代码的用途。理想情况下，你的团队成员应该能够基于代码所在的对象名称来确定你代码的目的。这对于新员工或经验较少的员工特别有帮助。\n\n格式化 T-SQL\
  \ 的相同实践在选择命名约定策略时是类似的。命名约定带来的一个方面是外观和感觉。这可以涉及用于对象的大写字母。在为数据库对象提供大小写时，有多种可用选项。主要选择是驼峰式命名法（camel\
  \ case）或帕斯卡式命名法（pascal case）。这些大小写风格之间的主要区别在于数据库对象的首字母。在清单 3-18 中，你将看到使用驼峰式命名法编写的查询。\n\
  \n```sql\nSELECT recipeID, ingredientID, dateCreated, dateModified\nFROM dbo.recipeIngredient\n\
  ```\n清单 3-18\n使用驼峰式命名法的查询\n\n相反，在清单 3-19 中，你可以看到编写相同查询时帕斯卡式命名法的样子。\n\n```sql\nSELECT\
  \ RecipeID, IngredientID, DateCreated, DateModified\nFROM dbo.RecipeIngredient\n\
  ```\n清单 3-19\n使用帕斯卡式命名法的查询\n\n此外，还有一种选项是首字母不大写，并且单词之间用下划线分隔。我通常不喜欢数据库名称中出现非字母字符，但我知道有些人偏爱下划线。如果你想要另一种选择，清单\
  \ 3-20 展示了表和列需要如何命名，这被称为蛇形命名法（snake case）。\n\n```sql\nSELECT recipeID, ingredientID,\
  \ date_created, date_modified\nFROM dbo.recipe_ingredient\n```\n清单 3-20\n使用蛇形命名法的查询\n\
  \n在确定命名约定使用哪种大小写时，请务必注意数据库的排序规则以及是否有任何表具有特殊的排序规则。了解大小写敏感性将有助于确保你的命名约定和格式化标准保持一致。\n\
  \n这还可能涉及对象在对象资源管理器中出现的位置。其中一些与正在命名的对象类型以及谁将查找这些对象有关。如果你想根据用途查找对象，你可能需要指定将这些对象分组在一起的模式名称。这对于应用程序或服务可能特别有用。根据预期进行何种类型的故障排除，数据库对象，尤其是存储过程，可以以它们所执行的操作来命名。这将便于搜索执行数据选择与数据插入的存储过程。但是，还有另一种选择，即主要受影响的表可以作为存储过程名称的第一个单词。这将允许某人按受影响的表在对象资源管理器中搜索，以查看所有存在的存储过程。\n\
  \n另一个考虑因素是在命名数据库对象时是否可以使用保留字。如果在数据库对象名称中使用了保留字，你将需要在对象名称中添加另一个单词，以便在引用对象名称时不需要使用方括号。\n\
  \n在确定命名约定时，你可能还想考虑表中是否有列将与其他表中的列具有相同的名称。这类列中的一部分包括指定记录创建日期、记录最后更新日期以及记录是否被软删除。对于指定状态或类型的表，这些表可以包含一个状态或类型名称列以及一个关联的描述列。你可能决定希望所有具有这些列的表中的所有这些列都具有完全相同的名称。\n\
  \n\n\n#### 数据库对象命名约定\n\n在编写查询时，我倾向于不给列名起别名（如果可能的话）。同时，我也不会显示多个创建日期或更新日期列。因此，对于创建日期、修改日期和软删除标志，我会使用完全相同的名称。然而，在编写查询时，我通常也会从多个表中拉取名称或描述字段。因此，我希望这些列名中包含表名作为列名的一部分。这允许其他人查看`SELECT`语句时能轻松识别引用的是哪个表。这也意味着我在编写查询时需要别名的列更少。\n\
  \n#### 命名持久化数据库对象\n\n命名持久化数据库对象也可能很棘手。命名表可能不同于命名索引、视图、触发器或函数。再次强调，命名这些对象不仅仅是给它们一个描述性的名称。此外，这还可能涉及给它们一个能清楚表明其对象类型的名称。这是因为许多数据库工程师和开发人员使用**对象资源管理器**作为查找对象的主要工具。正如我所讨论的，如果表名以名词开头，存储过程以动词开头，那么我接下来需要弄清楚如何将其他数据库对象与表和存储过程区分开来。\n\
  \n#### 使用对象类型缩写前缀\n\n一种选择是在对象名称前加上对象类型的缩写。对于索引，可以使用`IX_`表示非聚集索引，使用`CX_`表示聚集索引。在命名索引时，一旦指定了`IX_`或`CX_`，下一个项目应该是该索引所在的表名。表名之后应该是索引中的列列表。列的顺序应与创建索引时指定的顺序相同。在清单[3-21]中，我创建了一个聚集索引。如你所见，聚集索引名称以`CX`开头，后跟表名，然后是列名。每个部分用下划线分隔。\n\
  \n```\nCREATE CLUSTERED INDEX CX_Ingredient_IngredientName\nON dbo.Ingredient (IngredientName);\n\
  Listing 3-21\nCreate a Clustered Index\n```\n\n创建非聚集索引遵循相同的模式。在清单[3-22]中，你会看到非聚集索引也包含多列。\n\
  \n```\nCREATE NONCLUSTERED INDEX IX_Ingredient_IngredientName_IsActive\nON dbo.Ingredient\
  \ (IngredientName ASC, IsActive DESC);\nListing 3-22\nCreate a Non-clustered Index\
  \ with Multiple Columns\n```\n\n#### 命名主键和外键\n\n在创建主键和外键时也是如此。如果在`T-SQL`中创建主键或外键时没有指定名称，`SQL\
  \ Server`会随机分配一个名称。因此，最佳实践是显式命名主键或外键。在命名主键时，你会希望主键以`PK_`开头，代表主键。类似地，你会希望在外键名称前加上`FK_`，然后命名键的其余部分。名称的下一部分是分配主键或外键的表名。然后是用于定义主键或外键的列。如果指定了多个列，则主键或外键中列出的列应按顺序排列。清单[3-23]展示了一个在表创建后如何添加并命名主键的示例。\n\
  \n```\nALTER TABLE dbo.Ingredient\nADD CONSTRAINT PK_Ingredient_IngredientID\nPRIMARY\
  \ KEY (IngredientID);\nListing 3-23\nAdd a Primary Key\n```\n\n如你所见，主键名称以`PK`开头，后跟表名，然后是用于创建主键的列名。\n\
  \n类似地，你会希望在外键名称前加上`FK_`，然后命名键的其余部分。名称的下一部分是分配主键或外键的表名。然后是用于定义主键或外键的列。如果指定了多个列，则主键或外键中列出的列应按顺序排列。在表创建后创建外键时，可以参考清单[3-24]。\n\
  \n```\nALTER TABLE dbo.RecipeIngredient\nADD CONSTRAINT FK_RecipeIngredient_IngredientID\n\
  FOREIGN KEY (IngredientID)\nREFERENCES dbo.Ingredient(IngredientID);\nListing 3-24\n\
  Add a Foreign Key\n```\n\n与创建主键类似，外键遵循相似的命名结构。外键以`FK`开头，后跟表名，然后是列名。\n\n#### 命名视图和触发器\n\
  \n我也可以在视图名称前加上`vw_`，在触发器名称前加上`tr_`。还有其他不那么明显的选项可用。例如，你可以定义一组仅保留用于视图或触发器的名词或动词。这将给你更多的灵活性，同时也能避免对象资源管理器列表中的所有项目都以相同的三个字符开头。这将使任何人都能轻松看出这些对象既不是表也不是存储过程。对于视图和触发器来说尤其如此。\n\
  \n最大的挑战之一是，如果它们没有被命名得显而易见，人们可能会花费大量时间寻找这些对象却找不到。这是因为视图的使用方式类似于表，而触发器的操作方式类似于存储过程。这是因为视图像表一样用于连接，而触发器像存储过程一样更改对象。触发器甚至更棘手，因为它们可能导致你花费大量时间研究存储过程，试图确定为什么值会发生变化。\n\
  \n#### 命名表\n\n在命名表时，你希望只使用名词。这有助于表明这些对象用于存储，而不是执行任何特定活动。在命名对象时，一个常被忽视直到为时已晚的命名约定是对象应该是单数还是复数。在第一次出现复数对象之前，这真的不是问题。一旦一个复数的数据库对象进入整个模式中，其问题很快就会变得明显。这是因为一旦数据库中存在复数对象，在编写查询时就越来越难记住哪些表是复数形式。\n\
  \n你还希望确保在命名表时选择一个描述性名称。你需要以一种其他数据库工程师和开发人员能够轻松知道表中存储了什么类型信息的方式来描述你的表。用名词命名表也将表明该对象用于存储，而不是执行任何特定活动。\n\
  \n#### 命名存储过程\n\n大多数用户很容易熟悉表和存储过程。选择一个通过让存储过程以动词开头或将高级标准作为存储过程名称的一部分来区分这些对象的命名约定是很容易的。清单[3-25]展示了一个存储过程名称以动词开头的示例。\n\
  \n```\nEXECUTE dbo.GetRecipeIngredient\nListing 3-25\nStored Procedure Beginning\
  \ with a Verb\n```\n\n如果我看到那个存储过程名称，我会期望它检索所有食谱及其相关配料。清单[3-26]中的存储过程将拉回给定食谱的所有配料。\n\
  \n```\nEXECUTE dbo.GetIngredientByRecipe\nListing 3-26\nStored Procedure with Selection\
  \ Criteria\n```\n\n\n### T-SQL 注释\n\n虽然编写 T-SQL 的主要目的是让应用程序对数据执行特定操作，但确保其他人能够理解你未来的\
  \ T-SQL 代码同样重要。这至少能保证你不是唯一一个需要为某段代码或业务逻辑负责的人。它还能帮助你团队中的所有成员增强对自己工作能力以及对背后代码理解的信心。\n\
  \n在许多情况下，仅仅快速浏览 T-SQL 代码或查看数据库对象的名称，并不足以理解 T-SQL 代码的目的。在清单 3-27 中，提供了一个在数据库对象顶部创建标题部分的\
  \ T-SQL 示例代码。\n\n```\n/*-------------------------------------------------------------*\\\
  \nName:             \nAuthor:           \nCreated Date:     \nDescription:     \
  \ \nSample Usage:\n\nChange Log:\nUpdate on  by : \nUpdate on  by : \n\\*-------------------------------------------------------------*/\n\
  Listing 3-27\n持久化数据库对象的标题注释\n```\n\n这个标题的目的是让其他用户一眼就能了解该数据库对象的概要。审查此 T-SQL 的目的将决定对用户而言什么是重要的。对于那些不熟悉业务应用所有细节的人来说，描述部分能提供关于\
  \ T-SQL 数据库对象目的的高层次概念。同样，示例用法让那些调查性能问题的人能够理解应用程序是如何使用这段 T-SQL 代码的。数据库对象的作者有助于确定原始创建者是否仍在公司，以便回答有关该数据库对象的更具体问题。如果你的数据库置于源代码控制之下，你可能会决定省略某些字段。我将在第\
  \ 10 章进一步讨论源代码控制。在清单 3-28 中，你可以看到在创建最初见于清单 3-4 的视图时，标题信息会是什么样子。\n\n```\n/*-------------------------------------------------------------*\\\
  \nName:             dbo.AvailableMeal\nAuthor:           Elizabeth Noble\nCreated\
  \ Date:     03/13/2019\nDescription:      Simple view to display all meals with\
  \ ingredients\nSample Usage:\nSELECT MealTypeName, RecipeName FROM dbo.AvailableMeal\n\
  Change Log:\nUpdate on 03/31/2019 by enoble: Added header to view\n\\*-------------------------------------------------------------*/\n\
  CREATE VIEW dbo.AvailableMeal\nAS\nSELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity,\
  \ ing.IngredientName\nFROM dbo.Recipe rec\nINNER JOIN dbo.MealType meal\nON rec.MealTypeID\
  \ = meal.MealTypeID\nINNER JOIN dbo.RecipeIngredient recing\nON rec.RecipeID = recing.RecipeID\n\
  INNER JOIN dbo.Ingredient ing\nON recing.IngredientID = ing.IngredientID\nListing\
  \ 3-28\n创建带注释标题的视图\n```\n\n有时，编写简单易读的 T-SQL 可能就足够了。然而，在其他情况下，数据库对象可能包含难以一眼看懂的 T-SQL\
  \ 代码。我发现在编写代码后进行注释的一个挑战是，我的注释往往过于技术化，难以轻松描述我试图实现的目标。你需要确保不熟悉你代码的人能够轻松理解你的 T-SQL\
  \ 代码的目的。\n\n如果有任何复杂的逻辑，你需要清晰地解释该复杂逻辑是如何工作的。如果你使用的 T-SQL 编码实践并非最佳实践，这一点尤其重要。任何关于为何选择非标准实践的解释，都将有助于节省他人试图弄清为何使用非标准实践的时间。如果你已经确定标准的最佳实践在给定情况下性能不够好，这也可以节省你团队成员的时间。回顾清单\
  \ 3-3，`SELECT` 语句中有一个子查询。在初次编写此代码时，使用子查询的原因可能是显而易见的，但未来你可能会忘记这个原因。此外，阅读我代码的其他人可能也不明显我为何选择为该列包含一个子查询。在清单\
  \ 3-29 中，我展示了如何添加注释来帮助说明添加注释如何让你更容易快速理解所编写代码的目的或逻辑。\n\n```\nSELECT\n-- This subquery\
  \ pulls back the recipe name based on\n-- the ingredients in the recipe\n---- The\
  \ logic uses a correlated subquery between the\n---- where clause in the subquery\n\
  ---- and the table in the outer query\n(\nSELECT rec.RecipeName\nFROM dbo.Recipe\
  \ rec\nINNER JOIN dbo.RecipeIngredient recingr\nON rec.RecipeID = recingr.RecipeID\n\
  WHERE recingr.IngredientID = ingr.IngredientID\n) AS 'RecipeName',\ningr.IngredientName,\n\
  ingr.IsActive,\ningr.DateCreated,\ningr.DateModified\nFROM dbo.Ingredient ingr\n\
  WHERE IngredientName LIKE '%Tomato%'\nORDER BY RecipeName, ingr.IngredientName\n\
  Listing 3-29\n带子查询的查询\n```\n\n如果你甚至在开始编写任何 T-SQL 代码之前就开始为你的 T-SQL 代码添加注释，通常最容易将注释包含在代码中。在清单\
  \ 3-30 中，你可以看到标题信息和开头的注释。指定的注释表明了编写该存储过程背后的概念。\n\n```\n/*-------------------------------------------------------------*\\\
  \nName:             dbo.GetRecipeNutrition\nAuthor:           Elizabeth Noble\n\
  Created Date:     03/13/2019\nDescription: Lookup nutritional information for a\
  \ given recipe\nSample Usage:\nDECLARE @RecipeID INT\nSET @RecipeID = 1\nEXECUTE\
  \ dbo. GetRecipeNutrition @RecipeID\n\\*-------------------------------------------------------------*/\n\
  -- Get the nutrition information for a recipe\n-- Since nutrition information is\
  \ saved per ingredient\n-- This will be a summary of nutrition information\n-- per\
  \ ingredient that is specified in the recipe\nListing 3-30\n创建新的存储过程\n```\n\n一旦你指定了查询的总体逻辑，就可以继续编写\
  \ T-SQL 以满足这些要求。如果你通常发现自己是在重述已编写的代码，而不是解释代码的总体目的，那么这样做通常很有帮助。\n\n在编写任何 T-SQL 代码之前编写这些注释，可以确保注释解释的是存储过程的目的，而不是代码如何执行。\n\
  \n现在，你应该准备好开始为你自己和你所在的组织定义 SQL 格式化标准了。这将使你和你团队的其他成员能够快速审查你组织的 T-SQL 代码。此外，我还讨论了在为你的\
  \ T-SQL 代码提供附加文档时可以使用的策略。为你的 T-SQL 代码添加注释将使其他人能够理解 T-SQL 代码应该做什么，包括业务逻辑和高级技术逻辑。我还介绍了在为你的组织定义命名约定时可用的选项。定义良好的命名约定应使任何访问数据库模式的人更容易知道在哪里可以找到数据库对象。\n\
  \n你现在应该已经熟悉了 SQL Server 的数据类型以及它们的最佳使用场景。你也应该对编写 T-SQL 时可用的各种数据库对象感到得心应手。既然你对如何通过格式化代码来提高可读性和理解力有了更多了解，现在就可以学习如何使用参数、复杂逻辑和存储过程来设计\
  \ T-SQL 代码了。\n\n## 4. 设计 T-SQL\n\n在本节“构建可理解的 T-SQL”的前面章节中，我介绍了可用的各种数据类型以及如何选择正确的数据类型。我也讨论了编写\
  \ T-SQL 时可用的几种数据库对象，以及使用每种对象的优缺点。在上一章，我解释了为你自己和其他人使代码具有可读性的重要性。我将通过讲解设计 T-SQL 代码时的各种选项来结束本节。\n\
  \n在为应用程序编写 T-SQL 时，我非常推崇使用存储过程。使用存储过程有很多优点，包括使你的代码更具适应性和可重用性的可能性。同样，在代码中使用参数可以增加\
  \ T-SQL 代码的灵活性。在为更复杂的查询设计解决方案时，你可以使用存储过程和参数。此外，在解决复杂问题时，你可能需要考虑其他技术。设计 T-SQL 代码时有几个需要考虑的项目，包括存储过程、参数和复杂的查询逻辑。\n\
  \n### 使用存储过程\n\n在编写 T-SQL 代码时，你有几种可用选项。根据你使用的实现方式，我们将决定 SQL Server 如何处理该 T-SQL 代码。你可以编写即席\
  \ T-SQL，其中每个查询的编写都没有统一性。虽然这种代码可以重复使用，但你需要小心确保所有格式完全一致，包括空格。还有所谓的预处理语句。这种类型的 T-SQL\
  \ 代码使用参数。当使用预处理语句时，传递给参数的值会被更新。最后，还有存储过程。它们是持久的数据库对象。这些方法各有优缺点。然而，在编写 T-SQL 时，存储过程通常是最一致的。\n\
  \n在为应用程序编写 T-SQL 代码时，需要考虑几个方面。为了更好地理解你希望应用程序如何使用 T-SQL，最好先了解 SQL Server 如何处理每个可用的\
  \ T-SQL 选项。当 SQL Server 执行查询时，它必须决定如何执行该查询。在此之前，SQL Server 会检查是否已经存在该查询的执行计划。根据\
  \ T-SQL 的编写方式，会对 SQL Server 验证执行计划是否已存在的方式产生一些影响。\n\n为了展示存储过程、即席查询和预处理语句如何影响计划缓存，我将通过一些例子进行说明。在清单\
  \ 4-1 中，你可以看到创建存储过程的语句。\n\n```sql\n/*-------------------------------------------------------------*\\\
  \nName:             dbo.GetRecipe\nAuthor:           Elizabeth Noble\nCreated Date:\
  \     April 20, 2019\nDescription: Get a list of all recipes in the database\nSample\
  \ Usage:\nEXECUTE dbo.GetRecipe\n\\*-------------------------------------------------------------*/\n\
  CREATE PROCEDURE dbo.GetRecipe\nAS\nSELECT\nRecipeID,\nRecipeName,\nRecipeDescription,\n\
  ServingQuantity,\nMealTypeID,\nPreparationTypeID,\nIsActive,\nDateCreated,\nDateModified\n\
  FROM dbo.Recipe;\n```\n清单 4-1\n创建存储过程\n\n在这个例子中，我创建了一个不可配置的存储过程。每次执行此存储过程时，它都会拉回相同类型的数据。此存储过程将拉回已输入数据库的所有配方的信息。如果你想查看此存储过程的结果，可以如清单\
  \ 4-2 所示执行该存储过程。\n\n```sql\nEXECUTE dbo.GetRecipe;\n```\n清单 4-2\n执行存储过程\n\nSQL Server\
  \ 将创建此执行计划并将其保存到查询计划缓存中。如果将来再次运行此存储过程，SQL Server 将检查计划缓存，看看此存储过程是否已存在于缓存中。只要 SQL\
  \ Server 认为该计划相关，此计划就会保留在计划缓存中。在图 4-1 中，你可以看到与清单 4-2 中的存储过程相关的执行计划。\n\n![../images/480547_1_En_4_Chapter/480547_1_En_4_Fig1_HTML.jpg](img/480547_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1\n存储过程的执行计划\n\n如果计划在缓存中，SQL Server 将继续重用相同的执行计划。这对于存储过程很有效。然而，在 SQL Server\
  \ 中还有其他访问数据的方法。其中一种方法是编写即席查询。编写即席查询时，你可以选择硬编码值或对其进行参数化。清单 4-3 展示了这种查询的示例，其逻辑与清单\
  \ 4-1 中的存储过程相同。\n\n\n#### SQL 查询优化与执行计划缓存\n\n##### 即席查询逻辑\n\n```\nSELECT\nRecipeID,\n\
  RecipeName,\nRecipeDescription,\nServingQuantity,\nMealTypeID,\nPreparationTypeID,\n\
  IsActive,\nDateCreated,\nDateModified\nFROM dbo.Recipe;\n```\n**代码清单 4-3 即席查询逻辑**\n\
  \n代码清单 4-1 和 4-3 中的逻辑是相同的。最大的区别在于 SQL Server 处理这两者的方式。对于这两个查询，这一点可能不太明显。实际上，SQL\
  \ Server 会检查计划缓存以查看是否存在相同的执行计划。存储在计划缓存中的计划并非基于核心逻辑，而是基于实际的即席查询或存储过程执行的编写方式。\n\n\
  为了查看 SQL Server 中的计划缓存，可以使用代码清单 4-4 中提供的查询。此查询源自 Microsoft 在线文档。\n\n```\nSELECT\
  \ cplan.usecounts, cplan.objtype, qtext.text, qplan.query_plan\nFROM sys.dm_exec_cached_plans\
  \ AS cplan\nCROSS APPLY sys.dm_exec_sql_text(plan_handle) AS qtext\nCROSS APPLY\
  \ sys.dm_exec_query_plan(plan_handle) AS qplan\nORDER BY cplan.usecounts DESC\n\
  ```\n**代码清单 4-4 用于查看缓存中计划的查询**\n\n如下面的表格 4-1 所示，即席查询甚至作为“Ad hoc”对象类型存储，而 SQL Server\
  \ 能正确识别第二行是一个存储过程。在表格 4-1 中，您可以看到运行存储过程和运行相同代码作为即席查询后，计划缓存中的结果。\n\n###### 表格 4-1：即席查询与存储过程的计划缓存\n\
  \n| 使用次数 | 对象类型 | 查询文本 |\n| --- | --- | --- |\n| 1 | Ad hoc | SELECT          RecipeID,\
  \          RecipeName,          RecipeDescription,          ServingQuantity,   \
  \       MealTypeID,          PreparationTypeID,          IsActive,          DateCreated,\
  \          DateModified   FROM dbo.Recipe; |\n| 1 | Proc | CREATE PROCEDURE dbo.GetRecipe\
  \     AS           SELECT                RecipeID,                RecipeName,  \
  \              RecipeDescription,                ServingQuantity,              \
  \  MealTypeID,                PreparationTypeID,                IsActive,      \
  \          DateCreated,                DateModified         FROM dbo.Recipe; |\n\
  \n##### 格式不一致的影响\n\n当用户或应用程序的代码编写不一致时，问题就变得重要起来。在此示例中，我修改了代码清单 4-3 中的查询，将 `SELECT`\
  \ 子句后的第一列移到了同一行。修改查询后，运行代码清单 4-5 中的查询时，查询计划缓存会发生变化。\n\n```\nSELECT RecipeID,\nRecipeName,\n\
  RecipeDescription,\nServingQuantity,\nMealTypeID,\nPreparationTypeID,\nIsActive,\n\
  DateCreated,\nDateModified\nFROM dbo.Recipe;\n```\n**代码清单 4-5 修改后的即席查询**\n\n我希望\
  \ SQL Server 能识别代码清单 4-3 中的查询与代码清单 4-5 中的代码是相同的。唯一真正改变的是查询本身的格式。重新运行代码清单 4-4 中的查询，我可以在表格\
  \ 4-2 中检查计划缓存。\n\n###### 表格 4-2：修改后即席查询的计划缓存\n\n| 使用次数 | 对象类型 | 查询文本 |\n| --- |\
  \ --- | --- |\n| 1 | Ad hoc | SELECT          RecipeID,          RecipeName,   \
  \       RecipeDescription,          ServingQuantity,          MealTypeID,      \
  \    PreparationTypeID,          IsActive,          DateCreated,          DateModified\
  \   FROM dbo.Recipe; |\n| 1 | Ad hoc | SELECT RecipeID,          RecipeName,   \
  \       RecipeDescription,          ServingQuantity,          MealTypeID,      \
  \    PreparationTypeID,          IsActive,          DateCreated,          DateModified\
  \   FROM dbo.Recipe; |\n| 1 | Proc | CREATE PROCEDURE dbo.GetRecipe     AS     \
  \      SELECT                RecipeID,                RecipeName,              \
  \  RecipeDescription,                ServingQuantity,                MealTypeID,\
  \                PreparationTypeID,                IsActive,                DateCreated,\
  \                DateModified         FROM dbo.Recipe; |\n\n在表格 4-2 中可以看到，计划缓存中现在有三个条目。SQL\
  \ Server 并没有重用第一次调用即席查询时的执行计划，而是生成了一个全新的执行计划。每次 SQL Server 创建新的执行计划时，都需要消耗额外的资源。这可能导致\
  \ SQL Server 返回查询结果需要多花几秒钟。每个执行的查询计划都会保存在计划缓存中。为每个查询保存多个执行计划可能会填满执行计划缓存，从而导致其他查询的执行计划被过早地从缓存中移除。查询计划从缓存中移除后，SQL\
  \ Server 将需要消耗额外的资源为该查询创建新的执行计划。在确定应用程序将如何调用 T-SQL 代码时，这是需要考虑的一个重要因素。\n\n##### 结论\n\
  \n虽然存储过程为我们提供了一种一致的方式来多次调用相同类型的代码，但如果每个场景都要使用完全相同的基础查询，存储过程可能会相当受限。我通常希望编写一段通用的\
  \ T-SQL 代码，可用于各种场景。在这种情况下，我发现自己想要编写使用参数的查询或存储过程。\n\n\n## 使用参数\n\n除了使用存储过程来帮助 T-SQL\
  \ 代码实现更高的可重用性外，你还可以在 T-SQL 代码中使用参数。参数可用于即席查询、预处理语句或存储过程。参数也可以用作输入或输出。无论参数在何处使用，它们都使得你能够编写可在多种情况下使用的查询。\n\
  \n在代码清单 4-6 中，你可以看到这是一个存储过程，它将根据提供给存储过程的 `RecipeID` 返回食谱信息。\n\n```sql\n/*-------------------------------------------------------------*\\\
  \nName:             dbo.GetRecipeByRecipeID\nAuthor:           Elizabeth Noble\n\
  Created Date:     April 20, 2019\nDescription: Get recipe information when a recipe\
  \ ID is provided\nSample Usage:\nDECLARE @RecipeID INT;\nSET @RecipeID = 1;\nEXECUTE\
  \ dbo.GetRecipeByRecipeID @RecipeID\n\\*-------------------------------------------------------------*/\n\
  CREATE PROCEDURE dbo.GetRecipeByRecipeID\n    @RecipeID   INT\nAS\n    SELECT\n\
  \        RecipeID,\n        RecipeName,\n        RecipeDescription,\n        ServingQuantity,\n\
  \        MealTypeID,\n        PreparationTypeID,\n        IsActive,\n        DateCreated,\n\
  \        DateModified\n    FROM dbo.Recipe\n    WHERE RecipeID = @RecipeID;\n```\n\
  \n**代码清单 4-6**\n创建带有参数的存储过程\n\n前面的存储过程允许你传入任何 `RecipeID`，存储过程将根据该 `RecipeID` 返回一组预定义的食谱信息。这也使得\
  \ T-SQL 代码能够以一种简单得多的方法被调用。查看代码清单 4-7，我编写了代码来执行存储过程，并将一个硬编码值作为执行的一部分传入。\n\n```sql\n\
  EXECUTE dbo.GetRecipeByRecipeID 1;\n```\n\n**代码清单 4-7**\n使用硬编码值执行存储过程\n\n虽然可以使用此方法来调用存储过程，但使用变量将是执行此存储过程更为动态的方式。其中一种方法是声明一个具有特定数据类型的变量，然后将该变量设置为特定值。这更接近于模拟应用程序可能调用存储过程的方式。应用程序代码通常已经声明了一个变量，并在执行存储过程时使用相同的变量。声明变量、将该变量设置为某个值以及使用该变量执行存储过程的过程可以在代码清单\
  \ 4-8 中看到。\n\n```sql\nDECLARE @RecipeID INT;\nSET @RecipeID = 1\nEXECUTE dbo.GetRecipeByRecipeID\
  \ @RecipeID;\n```\n\n**代码清单 4-8**\n使用变量执行存储过程\n\n为了比较代码清单 4-6 中存储过程的计划缓存与即席查询的计划缓存，我将执行一个即席查询，该查询将使用与代码清单\
  \ 4-6 相同的整体逻辑。但是，此值不会被参数化。在代码清单 4-9 中，你可以看到带有 `RecipeID` 硬编码值的查询。\n\n```sql\nSELECT\n\
  \    RecipeID,\n    RecipeName,\n    RecipeDescription,\n    ServingQuantity,\n\
  \    MealTypeID,\n    PreparationTypeID,\n    IsActive,\n    DateCreated,\n    DateModified\n\
  FROM dbo.Recipe\nWHERE RecipeID = 1;\n```\n\n**代码清单 4-9**\n运行带有硬编码值的即席查询\n\n执行相同存储过程的另一种方法是使用类似代码清单\
  \ 4-9 中的查询，但在 WHERE 子句中使用参数。这将执行与代码清单 4-7、4-8 和 4-9 相同的整体逻辑。在代码清单 4-10 中，我使用了相同的代码，声明了一个变量并对整个查询进行了参数化。\n\
  \n```sql\nDECLARE @RecipeID INT;\nSET @RecipeID = 1\nSELECT\n    RecipeID,\n   \
  \ RecipeName,\n    RecipeDescription,\n    ServingQuantity,\n    MealTypeID,\n \
  \   PreparationTypeID,\n    IsActive,\n    DateCreated,\n    DateModified\nFROM\
  \ dbo.Recipe\nWHERE RecipeID = @RecipeID;\n```\n\n**代码清单 4-10**\n运行带有参数的即席查询\n\n\
  虽然所有这些查询都返回相同的数据，但 SQL Server 处理这四种查询的方式可能会大不相同。在我的测试案例中，我清除了计划缓存，然后执行了代码清单 4-7、4-8、4-9\
  \ 和 4-10 中的 T-SQL 代码。尽管每个查询返回的结果相同，但你将在表 4-3 中看到 SQL Server 如何为每个查询计算或使用执行计划。\n\n\
  **表 4-3**\n变量与硬编码值的计划缓存比较\n\n| 使用次数 | 对象类型 | 文本 |\n| --- | --- | --- |\n| 2 | 存储过程\
  \ | `CREATE PROCEDURE dbo.GetRecipeByRecipeID        @RecipeID   INT  AS       \
  \   SELECT               RecipeID,               RecipeName,               RecipeDescription,\
  \               ServingQuantity,               MealTypeID,               PreparationTypeID,\
  \               IsActive,               DateCreated,               DateModified\
  \        FROM dbo.Recipe        WHERE RecipeID = @RecipeID;` |\n| 1 | 即席 | `DECLARE\
  \ @RecipeID INT;    SET @RecipeID = 1    EXECUTE dbo.GetRecipeByRecipeID @RecipeID;`\
  \ |\n| 1 | 即席 | `DECLARE @RecipeID INT;    SET @RecipeID = 1    SELECT         \
  \ RecipeID,          RecipeName,          RecipeDescription,          ServingQuantity,\
  \          MealTypeID,          PreparationTypeID,          IsActive,          DateCreated,\
  \          DateModified  FROM dbo.Recipe  WHERE RecipeID = @RecipeID;` |\n| 1 |\
  \ 即席 | `SELECT          RecipeID,          RecipeName,          RecipeDescription,\
  \          ServingQuantity,          MealTypeID,          PreparationTypeID,   \
  \       IsActive,          DateCreated,          DateModified  FROM dbo.Recipe \
  \ WHERE RecipeID = 1;` |\n| 1 | 预处理 | `(@1 tinyint)SELECT [RecipeID], [RecipeName],\
  \ [RecipeDescription], [ServingQuantity], [MealTypeID], [PreparationTypeID], [IsActive],\
  \ [DateCreated], [DateModified] FROM [dbo].[Recipe] WHERE [RecipeID]=@1` |\n\n在表\
  \ 4-3 中，你可以看到存储过程已执行了两次。带有硬编码值的 `SELECT` 语句和带有参数值的 `SELECT` 语句各自拥有自己的执行计划。当讨论的只是少数几个查询时，这可能不会有太大影响。然而，如果你的整个环境中存在大量非存储过程的查询，你可能需要检查你的计划缓存，看看它们是如何被处理的。\n\
  \n编写查询时，这不是你需要考虑的唯一主题。另一个可能的选项与通常被称为**参数嗅探**的问题有关。参数嗅听起来可能并不像它实际那么危险。理解参数嗅探是什么以及它如何影响你的关键要点是考虑你的数据是如何分布的。对于许多公司来说，存储在数据表中的数据并非都是均匀分布的。在代码清单\
  \ 4-11 中，你可以看到我为测试参数嗅探而创建的存储过程。\n\n#### 存储过程示例：按用餐类型获取食谱与食材\n\n```\n/*-------------------------------------------------------------*\\\
  \nName:             dbo.GetRecipeAndIngredientByMealTypeID\nAuthor:           Elizabeth\
  \ Noble\nCreated Date:     April 20, 2019\nDescription:     按用餐类型获取所有食谱及其食材\nSample\
  \ Usage:\nEXECUTE dbo.GetRecipeAndIngredientByMealTypeID 1\n\\*-------------------------------------------------------------*/\n\
  CREATE PROCEDURE dbo.GetRecipeAndIngredientByMealTypeID\n@MealTypeID     INT\nAS\n\
  SELECT\nrec.RecipeName,\ningr.IngredientName,\ningr.IsActive,\ningr.DateCreated,\n\
  ingr.DateModified\nFROM dbo.Recipe rec\nINNER JOIN dbo.RecipeIngredient recingr\n\
  ON rec.RecipeID = recingr.RecipeID\nLEFT OUTER JOIN dbo.Ingredient ingr\nON recingr.IngredientID\
  \ = ingr.IngredientID\nWHERE rec.MealTypeID = @MealTypeID\nORDER BY rec.RecipeName,\
  \ ingr.IngredientName;\n```\n*代码清单 4-11：用于按用餐类型查找食谱与食材的存储过程*\n\n##### 参数嗅探问题\n\n\
  对于食谱数据，表中存储的食谱类型数量可能存在显著差异。如果你有数百或数千个早餐食谱，但只有少数晚餐食谱，你可能会遇到**参数嗅探**（`parameter sniffing`）影响应用程序性能的场景。在我们这个用餐类型的场景中，你可能执行一个存储过程来获取早餐食谱。第一次调用存储过程时，`SQL\
  \ Server`会根据提供的参数生成一个执行计划。该执行计划最终会存储在计划缓存中。\n\n为了测试参数嗅探，你可能希望使用给定的参数执行存储过程，如代码清单\
  \ 4-12 所示。\n\n```\nEXECUTE dbo.GetRecipeAndIngredientByMealTypeID 3;\n```\n*代码清单\
  \ 4-12：使用具有较多记录的参数执行存储过程*\n\n对于此存储过程执行，我得到了如图 4-2 所示的执行计划。\n\n![../images/480547_1_En_4_Chapter/480547_1_En_4_Fig2_HTML.jpg](img/480547_1_En_4_Fig2_HTML.jpg)\n\
  *图 4-2：使用具有较多记录的参数的存储过程执行计划*\n\n如果你稍后想重新运行存储过程来获取晚餐食谱，`SQL Server`将重用原始的执行计划来检索数据。然而，`SQL\
  \ Server`最初创建的执行计划在尝试查找用餐类型为晚餐的食谱时，性能可能更差。如果我清除计划缓存并以不同的顺序重新运行存储过程，就可以验证该问题确实与参数嗅探有关。在代码清单\
  \ 4-13 中，你可以看到在计划缓存被清除后，用于生成新执行计划的`T-SQL`代码。\n\n```\nEXECUTE dbo.GetRecipeAndIngredientByMealTypeID\
  \ 2;\n```\n*代码清单 4-13：使用具有较少记录的参数执行存储过程*\n\n当我执行此存储过程时，我发现创建了一个不同的计划缓存。你可以在图 4-3\
  \ 中看到创建的另一个执行计划。\n\n![../images/480547_1_En_4_Chapter/480547_1_En_4_Fig3_HTML.jpg](img/480547_1_En_4_Fig3_HTML.jpg)\n\
  *图 4-3：使用具有较少记录的参数的存储过程执行计划*\n\n如果我运行与代码清单 4-12 中相同的`T-SQL`，我现在会得到相同的执行计划。这表明此查询遇到了参数嗅探问题。有几种可用选项来处理参数嗅探。理想情况下，你或许可以重新设计查询以使用不同的索引。\n\
  \n##### 解决方案：条件重编译\n\n不幸的是，可能并不总是能够以这种方式修改查询。这可能促使你寻找其他选项，例如使用`WITH RECOMPILE`查询提示更新查询。使用此方法的缺点是，每次执行查询时都必须编译它。这在硬件和每次查询执行的时间方面都产生了额外成本。这时你可能需要寻找更好的替代方案。可以针对某些更常见的参数修改查询以使用缓存的计划，而对于所有其他场景则重新编译存储过程。代码清单\
  \ 4-14 中的存储过程已修改为对某些值使用重编译。\n\n```\n/*-------------------------------------------------------------*\\\
  \nName:             dbo.GetRecipeAndIngredientByMealTypeID\nAuthor:           Elizabeth\
  \ Noble\nCreated Date:     April 20, 2019\nDescription:     按用餐类型获取所有食谱及其食材\nSample\
  \ Usage:\nEXECUTE dbo.GetRecipeAndIngredientByMealTypeID 1\n\\*-------------------------------------------------------------*/\n\
  CREATE PROCEDURE dbo.GetRecipeAndIngredientByMealTypeID\n@MealTypeID     INT\nAS\n\
  DECLARE @QueryString    NVARCHAR(1000);\n-- 待执行的原始查询\nSELECT @QueryString = N'\n\
  SELECT\nrec.RecipeName,\ningr.IngredientName,\ningr.IsActive,\ningr.DateCreated,\n\
  ingr.DateModified\nFROM dbo.Recipe rec\nINNER JOIN dbo.RecipeIngredient recingr\n\
  ON rec.RecipeID = recingr.RecipeID\nLEFT OUTER JOIN dbo.Ingredient ingr\nON recingr.IngredientID\
  \ = ingr.IngredientID\nWHERE rec.MealTypeID = @MelTypID\nORDER BY rec.RecipeName,\
  \ ingr.IngredientName'\n-- 如果参数无法提供稳定的执行计划\n---- 向查询添加 OPTION(RECOMPILE)\nIF (@MealTypeID\
  \ <> 2)\nBEGIN\nSELECT @QueryString = @QueryString + N' OPTION(RECOMPILE)';\nEND\n\
  -- 执行查询字符串\nEXECUTE [sp_executesql] @QueryString,\nN'@MelTypID INT',\n@MelTypID\
  \ = @MealTypeID;\nGO\n```\n*代码清单 4-14：条件性使用重编译选项执行存储过程的代码*\n\n在代码清单 4-14 中，当提供`MealTypeID`为\
  \ 2 时，执行计划被认为是稳定的。当存储过程以`MealTypeID`为 2 运行时，它将执行`T-SQL`代码而不会生成新的执行计划。但是，如果为`MealTypeID`提供了不同的值，则`SQL\
  \ Server`每次都会生成一个新的执行计划。这种场景在查询的大多数执行时间都接收到`MealTypeID`为 2 的参数时效果很好。这可以避免`SQL Server`在每次调用存储过程时都生成执行计划。如果每执行十次存储过程，有一两次参数未设置为`MealTypeID`为\
  \ 2，那么`SQL Server`将会生成新的执行计划。这种方法可以让你最小化重新编译执行的成本，并将其发生频率限制得更低。虽然`SQL Server`按预期工作，但正是数据的形态导致了性能问题。\n\
  \n\n### 使用复杂逻辑\n\nSQL Server 中有一些基本操作并不十分复杂。这些基本操作可能包括对单表进行插入、读取、更新和删除。其中一些操作可能涉及少量连接（join），但在某些时候，可能需要处理更复杂的逻辑。使用\
  \ T-SQL 时面临的挑战之一就是如何应对复杂的逻辑。\n\n#### 处理复杂逻辑的第一步\n\n处理复杂逻辑时，牢记几点很重要。第一步是将请求分解成更小的部分。其中一部分逻辑在于弄清楚你需要从哪些数据开始，以及如何将这些数据缩减成一个更小的数据集。你还需要专注于将所有需求拆解成简化的步骤。\n\
  \n#### 查询请求的挑战\n\n许多查询请求可能涉及以下情况：处理的数据库设计时并未考虑发挥关系型数据库的优势，或者系统设计时未考虑集成，亦或是需要与遗留应用程序交互。通常，我们无法控制被要求做什么，如果能由我们设计数据在数据库中的存储方式，那已经算是幸运了。\n\
  \n这类场景也可能涉及各种编码方法，而这些方法不一定符合最佳实践。这包括需要循环处理数据，包括递归。有时你也可能想使用关联子查询或处理各种字符串，如 XML 或\
  \ JSON。虽然这些选项中的许多看起来像是完美的解决方案，但它们往往过于复杂。这正是 T-SQL 代码易于理解与 T-SQL 代码性能良好之间需要权衡的棘手之处。我的目标是展示使用那些看似更高级的查询技术，可能正在导致你的应用程序性能不佳。\n\
  \n#### 过于具体代码的陷阱\n\n编写 T-SQL 时，常常会诱人地编写出完全匹配特定验收标准或业务需求的代码。有时这很有效，最终你会得到性能非常好的代码。但在其他情况下，试图编写代码来解决复杂问题不仅困难且令人沮丧，而且如果\
  \ T-SQL 代码的编写方式不适合 SQL Server，你可能会遇到严重的性能问题。我发现，如果你能让代码保持简单明了，SQL Server 通常能更好地工作。这也意味着，使用\
  \ SQL Server 的新功能可能并不总是在性能方面产生最佳结果，即使代码更容易编写。\n\n#### 最常见的案例：循环\n\n我见到的最常见的 T-SQL\
  \ 代码未考虑 SQL Server 如何运行得最佳的情况，就是涉及循环。SQL Server 提供了多种循环处理数据的选项，虽然代码会返回正确的结果，但我常常发现其在\
  \ SQL Server 上的开销，比找出与相同数据交互的其他方法要大得多。回顾清单 2-29，我在清单 4-15 中粘贴了相同的逻辑。\n\n```sql\n\
  SET NOCOUNT ON;\nDECLARE @RecipeID INT,\n        @RecipeName VARCHAR(25),\n    \
  \    @message VARCHAR(50);\nPRINT '-------- Recipe Listing --------';\nDECLARE recipe_cursor\
  \ CURSOR DYNAMIC\nFOR\nSELECT RecipeID, RecipeName\nFROM dbo.Recipe\nORDER BY RecipeID;\n\
  OPEN recipe_cursor\nFETCH NEXT FROM recipe_cursor\nINTO @RecipeID, @RecipeName\n\
  WHILE @@FETCH_STATUS = 0\nBEGIN\n    PRINT ' '\n    SELECT @message = '----- Ingredients\
  \ For Recipe: ' + @RecipeName + '-----'\n    PRINT @message\n    SELECT ing.IngredientName,\
  \ srv.ServingPortionQuantity, srv.ServingPortionUnit\n    FROM dbo.Ingredient ing\n\
  \    INNER JOIN dbo.RecipeIngredient recing\n        ON ing.IngredientID = recing.IngredientID\n\
  \    INNER JOIN dbo.ServingPortion srv\n        ON recing.ServingPortionID = srv.ServingPortionID\n\
  \    WHERE recing.RecipeID = @RecipeID\n    FETCH NEXT FROM recipe_cursor INTO @RecipeID,\
  \ @RecipeName\nEND\nCLOSE recipe_cursor;\nDEALLOCATE recipe_cursor;\n```\n\n**清单\
  \ 4-15**\n创建动态游标\n\n这个查询会给我们想要的精确结果，但 SQL Server 必须为游标分析的每一行重复游标内部的逻辑。如果游标内的查询逻辑编写良好，影响可能很小。然而，真正的挑战发生在游标内的\
  \ T-SQL 代码执行缓慢或占用大量硬件资源时。那么，每次执行游标内的代码时，服务器甚至应用程序都会感受到痛苦。虽然很容易责怪游标本身，但像 `WHILE`\
  \ 循环这样的其他场景也有同样的潜在问题。\n\n#### 随时间推移的性能下降\n\n这里另一个较大的难题是，即使代码在最初创建时性能良好，随着数据库增长或数据形态变化，其性能仍有可能随时间推移而下降。在这些情况下，曾经看似很棒的解决方案可能迅速变成最大的麻烦之一。有一些选项可以获得相同的输出，但以更高效、资源消耗更少的方式编写\
  \ T-SQL 代码。在清单 4-16 中，你会看到一些注释，试图概述获得与清单 4-15 相同数据输出所需的步骤。\n\n```sql\n-- 为所有食谱创建报告标题\n\
  -- 对每个食谱重复以下操作\n---- 为每个食谱创建章节小标题\n---- 列出每个食谱的所有配料\n```\n\n**清单 4-16**\n用注释简化 T-SQL\
  \ 代码逻辑\n\n#### 系统化重写方法\n\n当处理逻辑不直接的查询时，我会首先将整个请求分解成更小的部分。理想情况下，分解验收标准的过程能让我专注于哪些地方可以开始最小化数据。我会从两个不同的角度来看待查询。首先是确定如何开始将数据缩减到结果中只需要的数据。我通常会在查询设计中尽早尝试这样做。同时，我也会尝试寻找那些我知道所需\
  \ T-SQL 代码会比较简单的部分。\n\n参考清单 4-15，我可以看出我需要一种方法来提取每个食谱的所有配料。我还想找到一种方法在每个食谱之间插入某种标题。最终，我会想弄清楚如何插入标题行。不过，我将首先编写一个查询来获取所有食谱及其配料。我在清单\
  \ 4-17 中写好了这个查询。\n\n```sql\n-- 为所有食谱创建报告标题\n-- 对每个食谱重复以下操作\n---- 为每个食谱创建章节小标题\n\
  ---- 列出每个食谱的所有配料\nSELECT\n    rec.RecipeName,\n    ing.IngredientName,\n    srv.ServingPortionQuantity,\n\
  \    srv.ServingPortionUnit\nFROM dbo.Ingredient ing\nINNER JOIN dbo.RecipeIngredient\
  \ recing\n    ON ing.IngredientID = recing.IngredientID\nINNER JOIN dbo.Recipe rec\n\
  \    ON recing.RecipeID = rec.RecipeID\nINNER JOIN dbo.ServingPortion srv\n    ON\
  \ recing.ServingPortionID = srv.ServingPortionID\nORDER BY rec.RecipeName, ing.IngredientName\n\
  ```\n\n**清单 4-17**\n获取所有食谱的所有配料\n\n一旦我有了一个数据起点，就可以继续添加额外的逻辑部分。我将从我试图提取的主要数据部分开始，然后向外扩展。在这个例子中，我开始添加标题信息，如清单\
  \ 4-18 所示。\n\n```sql\n-- 为所有食谱创建报告标题\nPRINT '-------- Recipe Listing --------';\n\
  -- 对每个食谱重复以下操作\n---- 为每个食谱创建章节小标题\nSELECT\n    '----- Ingredients For Recipe: '\
  \ + rec.RecipeName + '-----' AS 'SectionHeader'\nFROM  dbo.Recipe rec\n---- 列出每个食谱的所有配料\n\
  SELECT\n    rec.RecipeID,\n    rec.RecipeName,\n    ing.IngredientName,\n    srv.ServingPortionQuantity,\n\
  \    srv.ServingPortionUnit\nFROM dbo.Ingredient ing\nINNER JOIN dbo.RecipeIngredient\
  \ recing\n    ON ing.IngredientID = recing.IngredientID\nINNER JOIN dbo.Recipe rec\n\
  \    ON recing.RecipeID = rec.RecipeID\nINNER JOIN dbo.ServingPortion srv\n    ON\
  \ recing.ServingPortionID = srv.ServingPortionID\nORDER BY rec.RecipeName, ing.IngredientName\n\
  ```\n\n**清单 4-18**\n将所有数据汇总到一起\n\n添加了一些标题信息后，我准备好开始使输出与当前输出匹配。在清单 4-19 中，你可以看到匹配原始输出所需的所有代码。\n\
  \n```sql\nSET NOCOUNT ON;\n-- 为所有食谱创建报告标题\nPRINT '-------- Recipe Listing --------';\n\
  PRINT '\n-- 创建临时表存储食谱信息\nCREATE TABLE #RecipeList\n(\n    OrderedList          \
  \   INT,\n    RecipeID                INT,\n    SectionHeader           VARCHAR(100)\n\
  );\n-- 对每个食谱重复以下操作\n---- 为每个食谱创建章节间距\nINSERT INTO #RecipeList (OrderedList, RecipeID,\
  \ SectionHeader)\nSELECT\n    0 AS 'OrderedList',\n    rec.RecipeID,\n    '' AS\
  \ 'SectionHeader'\nFROM  dbo.Recipe rec\nWHERE rec.RecipeID < 3\n---- 为每个食谱创建章节小标题\n\
  INSERT INTO #RecipeList (OrderedList, RecipeID, SectionHeader)\nSELECT\n    10 AS\
  \ 'OrderedList',\n    rec.RecipeID,\n    '----- Ingredients For Recipe: ' + rec.RecipeName\
  \ AS 'SectionHeader'\nFROM  dbo.Recipe rec\nWHERE rec.RecipeID < 3\n---- 为每个食谱添加配料的列标题\n\
  INSERT INTO #RecipeList (OrderedList, RecipeID, SectionHeader)\nSELECT\n    15 AS\
  \ 'OrderedList',\n    rec.RecipeID,\n    CAST(''IngredientName'' AS CHAR(25)) +\
  \ '' '' +\n    CAST(''ServingPortionQuantity'' AS CHAR(22)) + '' '' +\n    CAST(''ServingPortionUnit''\
  \ AS CHAR(19)) AS 'SectionHeader'\nFROM  dbo.Recipe rec\nWHERE rec.RecipeID < 3\n\
  INSERT INTO #RecipeList (OrderedList, RecipeID, SectionHeader)\nSELECT\n    20 AS\
  \ 'OrderedList',\n    rec.RecipeID,\n    ''------------------------- ----------------------\
  \ ------------------'' AS 'SectionHeader'\nFROM  dbo.Recipe rec\nWHERE rec.RecipeID\
  \ < 3\n---- 列出每个食谱的所有配料\nINSERT INTO #RecipeList\n(\n    OrderedList,\n    RecipeID,\n\
  \    SectionHeader\n)\nSELECT\n    25 AS 'OrderedList',\n    rec.RecipeID,\n   \
  \ CAST(ing.IngredientName AS CHAR(25)) + '' '' +\n    CAST(srv.ServingPortionQuantity\
  \ AS CHAR(22)) + '' '' +\n    CAST(srv.ServingPortionUnit AS CHAR(19)) AS 'SectionHeader'\n\
  FROM dbo.Ingredient ing\nINNER JOIN dbo.RecipeIngredient recing\n    ON ing.IngredientID\
  \ = recing.IngredientID\nINNER JOIN dbo.Recipe rec\n    ON recing.RecipeID = rec.RecipeID\n\
  INNER JOIN dbo.ServingPortion srv\n    ON recing.ServingPortionID = srv.ServingPortionID\n\
  WHERE rec.RecipeID < 3\nORDER BY rec.RecipeName, ing.IngredientName\nSELECT\n  \
  \  SectionHeader\nFROM #RecipeList\nORDER BY RecipeID, OrderedList\nDROP TABLE #RecipeList\n\
  ```\n\n**清单 4-19**\n为避免使用游标而重写的查询\n\n#### 比较输出结果\n\n当结果输出到文本时，原始游标给出了如图 4-4 所示的输出。\n\
  \n![../images/480547_1_En_4_Chapter/480547_1_En_4_Fig4_HTML.jpg](img/480547_1_En_4_Fig4_HTML.jpg)\n\
  \n**图 4-4**\n游标的输出结果\n\n为确认我们从清单 4-19 的重写是正确的，我在执行相同查询时将结果捕获为文本。图 4-5 中的输出看起来是一样的。\n\
  \n![../images/480547_1_En_4_Chapter/480547_1_En_4_Fig5_HTML.jpg](img/480547_1_En_4_Fig5_HTML.jpg)\n\
  \n**图 4-5**\n修改后查询的输出\n\n然而，这些输出仅在导出到文本时才相同。在处理小型数据集时，额外的代码和工作量可能看起来并非必要。通常情况是，大多数性能问题直到性能受到显著且负面影响时才会显现。就这两种方法而言，处理两条记录时，性能看起来相同。但是，当处理超过\
  \ 10,000 个食谱时，清单 4-19 中的查询性能明显好得多，这一点立刻变得清晰。\n\n#### 本章总结\n\n在本章中，我介绍了如何以及为何要使用存储过程。这包括创建可重用且一致的代码。我还向你展示了如何使用参数。在大多数情况下，参数将有助于使你的代码更具适应性和动态性。参数在许多不同场景中都很有用。虽然参数在许多不同情况下非常有用，但你还需要确保你的\
  \ T-SQL 没有受到参数嗅探的负面影响。我还介绍了一种常见情况，即你可能需要使用 T-SQL 来解决复杂问题。你常常会发现，当你的 T-SQL 代码保持更直接明了时，其性能会更好。这可能意味着代码的可读性或整洁度有所下降，但\
  \ SQL Server 会更清楚如何获得最优的执行计划。\n\n#### 本节结论\n\n这也结束了当前关于编写可理解的 T-SQL 的部分。可理解的 T-SQL\
  \ 是指针对每种情况使用最佳数据类型。这通常是占用最少空间并提供必要精度的数据类型。你还需要理解可用的各种 SQL Server 数据库对象，以便构建你的 T-SQL。你需要权衡使用一种数据库对象与另一种的益处和挑战。在某些情况下，你需要决定代码可读性与数据库性能哪个更重要。编写可理解的\
  \ T-SQL 的另一个方面是对 T-SQL 进行格式化、命名和添加注释，以便他人能快速理解你所写的内容。\n\n使用 T-SQL 时，会有你需要编写可多次一致调用的\
  \ T-SQL 的时候。使用参数也可以使这些 T-SQL 代码更加灵活。当面对编写不直接明了的 T-SQL 时，将代码分解成片段以简化需要编写的内容会对你有所帮助。一旦你对编写可理解的\
  \ T-SQL 感到得心应手，你就准备好开始专注于编写高效且最小化对 SQL Server 性能影响的 T-SQL 了。\n\n\n\n"
- "# 第二部分 构建高性能 T-SQL\n\n## 5. 基于集合的设计\n\n了解如何设计 T-SQL 是编写专业代码的基础之一。一旦你能够编写易于理解的 T-SQL\
  \ 代码，就可以开始专注于提升 T-SQL 代码的性能。如果你是在工作中非正式地学习的 T-SQL，或者你的主要职能是为软件应用程序编写代码，那么在编写 T-SQL\
  \ 代码时，你可能不会刻意考虑基于集合的设计。你或许是一位经验丰富的数据库开发人员，并希望了解更多关于基于集合设计的知识。\n\n在本章中，我将讨论如何处理数据。第一步是熟悉与数据交互的各种方式。一旦你理解了与数据交互的不同方式，就要开始思考如何为查询准备最佳格式的数据。然后，你应该能够以利用\
  \ SQL Server 天然优势的方式来编写这些查询。\n\n### 基于集合的设计简介\n\n我们生活在一个数据无处不在的世界里。我们所做的几乎任何事情都可能产生需要保存的数据。收集数据的第一个挑战是确定如何存储数据。第二个挑战是如何访问这些数据。你使用\
  \ SQL Server 的原因之一就是为了利用数据之间的关系。这是因为 SQL Server 是一个关系数据库管理系统（RDBMS）。虽然我们的重点是编写 T-SQL，但理解数据在\
  \ SQL Server 中的存储方式也很重要。\n\n回到我以食谱数据库为例，让我们看看这类信息可以关联哪些类型的数据：\n\n*   名称\n*   成本\n\
  *   配料\n*   份数\n*   准备时间\n*   烹饪时间\n*   菜系类型\n*   烹饪方法\n*   餐食类型\n\n我可以根据这些数据如何描述其他项目来对它们进行分组。例如，我可以像表\
  \ 5-1 那样将关于食谱的信息分组。\n\n表 5-1\n\n配料的通用属性\n\n| 食谱 | 配料 | 烹饪方法 |\n| --- | --- | ---\
  \ |\n| 名称 | 名称 | 名称 |\n| 菜系 | 计量单位 |   |\n| 份数 | 成本 |   |\n| 配料 |   |   |\n| 配料数量\
  \ |   |   |\n\n信息分组后，数据就可以按这些分组进行存储。如果我开始为配料填充数据，数据可以存储在一个表中，如表 5-2 所示。\n\n表 5-2\n\
  \n通用配料信息\n\n| 配料名称 | 单位 | 计量 | 成本 |\n| --- | --- | --- | --- |\n| 番茄丁 | 28 | 盎司\
  \ | $1.84 |\n| 番茄膏 | 10 | 汤匙 | $0.79 |\n| 番茄酱 | 8 | 盎司 | $0.55 |\n| 蒜末 | 60 | 汤匙\
  \ | $5.99 |\n\n表中整理的数据是一个数据集。查看第一列“配料名称”中的数据，有三条记录包含“番茄”这个词。还有两行是以“盎司”为单位计量的。\n\n\
  使用 SQL Server 时，可能困难的一点是基于集合的事务处理。人们从其他领域和职业转向 SQL Server，包括软件开发、网络、系统管理或一般业务运营。在所有这些情况下，一个人可能还没有培养出基于集合操作进行思考的技能。\n\
  \n什么是基于集合的操作？它们意味着什么？为什么如此重要？基于集合的操作是从块或段的角度来看待数据，而不是逐行查看记录或数据。为了向你展示一个对比，表 5-3\
  \ 单独显示了每条数据记录。\n\n表 5-3\n\n按单行显示的配料\n\n| 配料名称 |\n| --- |\n| 番茄丁 |\n\n| 配料名称 |\n\
  | --- |\n| 番茄膏 |\n\n| 配料名称 |\n| --- |\n| 番茄酱 |\n\n| 配料名称 |\n| --- |\n| 蒜末 |\n\n\
  如果我以这种方式从表 5-3 中选择数据，效率将远低于尝试将数据作为一个集合来选择。表 5-4 显示了将数据作为一个集合来选择的效果。\n\n表 5-4\n\n\
  作为一个数据集的配料\n\n| 配料名称 |\n| --- |\n| 番茄丁 |\n| 番茄膏 |\n| 番茄酱 |\n| 蒜末 |\n\n这样查看数据还可以让你看到数据之间的相似之处。\n\
  \n你需要弄清楚如何同时处理多行来实现一个过程或任务。你要考虑对所有这些行同时执行相同的操作。在上面的例子中，我可以快速确定哪些记录共同包含“番茄”这个词。数据给了我们一个提示，如果我们想要查看或更改与番茄配料相关的信息，可能不止一种方法可以实现这个目标。这种场景可能表明，你的逻辑应该以这样的方式构建：它能够通过使用代数逻辑而非硬编码值来正确运行。\n\
  \n\n\n### 过程式代码与集合式设计\n\n过程式代码不仅描述了要告诉系统做什么，还描述了怎么做。在许多公司中，软件开发人员或软件工程师负责编写 `T-SQL`\
  \ 代码。我发现的一件事是，在编写应用程序代码时，这种代码被设计为最适合过程式处理。大部分代码在迭代处理数据时表现良好。在过程式应用程序代码和数据库 `T-SQL`\
  \ 代码之间切换上下文的成本可能很高。总体而言，编写基于集合的代码所引发的思维过程与迭代处理代码非常不同。\n\n为什么我们甚至有兴趣使用基于集合的设计？为什么它值得这么麻烦？这与\
  \ `SQL Server` 引擎的工作方式以及如何检索查询数据有关。当发出查询时，`SQL Server` 需要检索数据记录。`SQL Server` 会前往缓冲区缓存查看这些数据是否可用。图\
  \ 5-1 显示了如果数据在缓冲池中缓存，`SQL Server` 作为查询请求的一部分检索数据所经历的过程。\n\n![../images/480547_1_En_5_Chapter/480547_1_En_5_Fig1_HTML.jpg](img/480547_1_En_5_Fig1_HTML.jpg)\n\
  \n**图 5-1** 从单个查询中检索数据\n\n如果查询是按过程式编写的，即每次检索新行时都执行，那么 `SQL Server` 将需要为每条记录都去访问缓冲区缓存。一次检索单行的过程会增加\
  \ `SQL Server` 的工作负载。在图 5-2 中，您可以看到一次检索一行所需的额外工作负载。\n\n![../images/480547_1_En_5_Chapter/480547_1_En_5_Fig2_HTML.jpg](img/480547_1_En_5_Fig2_HTML.jpg)\n\
  \n**图 5-2** 当查询一次检索一行时的数据检索\n\n图 5-2 显示了在数据存储在缓冲池中的情况下，一次检索单个记录的查询过程。但是，如果查询是为基于集合的设计编写的，那么将只有一次对缓冲池的调用。在小型数据集上，这可能不会产生很大的影响。当处理数千或数百万条记录的数据集时，执行时间的差异会非常显著。这里还涉及其他因素，这与数据如何存储在缓冲区缓存中有关。当\
  \ `SQL Server` 执行查询并取回数据时，它只取回存在于缓冲区缓存中的数据。从 `SQL Server 2019` 开始，有一个称为混合缓冲池的功能。混合缓冲池允许将存储在\
  \ `RAM` 和持久内存（`PMEM`）中的数据都视为缓冲区缓存的一部分。否则，如果数据在 `RAM` 或 `PMEM` 中不可用，那么 `SQL Server`\
  \ 将需要访问磁盘来检索数据。检索到的数据随后将被存储在内存中。图 5-3 显示了这些数据如何从磁盘检索并存储到缓冲区缓存中。\n\n![../images/480547_1_En_5_Chapter/480547_1_En_5_Fig3_HTML.jpg](img/480547_1_En_5_Fig3_HTML.jpg)\n\
  \n**图 5-3** 从磁盘到缓冲区缓存的数据检索\n\n当查询执行时，该数据在那个时间点可能甚至不在缓冲区缓存中。`SQL Server` 必须访问磁盘 `I/O`\
  \ 子系统来查找该数据。一旦找到该数据，该数据就会被存储在缓冲区缓存中。\n\n如果每一行都被单独拉取，那么对磁盘 `I/O` 的调用就必须为每条记录单独发生。从缓冲区缓存拉取数据并非瞬时完成。从磁盘\
  \ `I/O` 获取数据并将其放入缓冲区缓存以供查询检索，则更加耗费资源。最终，这创造了一种场景，您希望专注于基于集合的设计，以获得执行查询时尽可能最佳的性能。\n\
  \n#### 以数据集方式思考\n\n既然我已经讨论了什么是数据集，我希望您能习惯于以拥抱数据集的方式来思考数据。在开始编写 `T-SQL` 代码之前，首先理解存储了什么信息、数据如何存储，以及按相似特征分组选择或使用这些数据，可能会节省您的时间和精力。当底层表被设计为最适合数据集时，处理数据集也更容易完成。\n\
  \n真正的诀窍是学习如何以数据集的方式思考。这意味着如何考虑一次处理多条记录，而不是单条记录。这确实需要一种更少算术性、更多代数性的方法。通常，执行 `SELECT`\
  \ 语句是熟悉基于集合的事务的最简单方式。考虑表 5-5 中所示的数据。\n\n**表 5-5** 成分数据\n\n| 成分名称 | 单位数量 | 计量单位 |\
  \ 成本 |\n| --- | --- | --- | --- |\n| Diced Tomatoes | 28 | Ounces | $1.85 |\n| Tomato\
  \ Paste | 10 | Tablespoons | $0.79 |\n| Tomato Sauce | 8 | Ounces | $0.55 |\n| Minced\
  \ Garlic | 60 | Tablespoon | $5.99 |\n\n这是一个食谱可能成分的列表，以及单位数量、计量单位和每单位成本。通过查看前面的数据，我可以发现某些列中数据之间的相似性。\n\
  \n我可以创建一个数据集，获取所有计量单位为汤匙的记录。这些记录如表 5-6 所示。\n\n**表 5-6** 计量单位为汤匙的成分\n\n| 成分名称 | 单位数量\
  \ | 计量单位 | 成本 |\n| --- | --- | --- | --- |\n| Tomato Paste | 10 | Tablespoons |\
  \ $0.79 |\n| Minced Garlic | 60 | Tablespoon | $5.99 |\n\n我也可以获取所有成本低于 $1.00 的成分的数据集，如表\
  \ 5-7 所示。\n\n**表 5-7** 成本低于 $1.00 的成分\n\n| 成分名称 | 单位数量 | 计量单位 | 成本 |\n| --- | ---\
  \ | --- | --- |\n| Tomato Paste | 10 | Tablespoons | $0.79 |\n| Tomato Sauce | 8\
  \ | Ounces | $0.55 |\n\n现在我有了一个数据集，我可以考虑如何与该数据集进行交互。知道我可以将相似的数据分组并对整个数据集执行操作，是有效使用\
  \ `T-SQL` 代码的关键。如果我想找出每单位的成本，我可以将成本除以单位数量。要为每条记录计算每单位成本，我可以手动为每条记录计算。在这种情况下，番茄酱的每单位成本将是\
  \ $0.79/10。这将得到每汤匙 $0.08 的结果。或者，我可以使用数据集中的列进行相同的计算。要作为一个数据集计算每单位成本，我可以指定 `Cost/Unit(s)`。以这种方式处理数据的结果将是一个类似于表\
  \ 5-8 所示的输出。\n\n**表 5-8** 成分每单位成本的计算值\n\n| 成分名称 | 每单位成本 |\n| --- | --- |\n| Tomato\
  \ Paste | $0.08 per tablespoon |\n| Tomato Sauce | $0.07 per ounce |\n\n使用 `SQL\
  \ Server` 最大的挑战之一是学习如何以数据集的方式思考。思考数据集最简单的方法是将检索数据的过程视为对一个列或列子集执行操作。如果您能找到某种模式来对数据的子集执行该操作，那么您就是在以数据集的方式思考。\n\
  \n查看成分表，我可以创建一个数据集，其中所有成分名称中都包含“番茄”这个词。`Ingredient` 表中所有可用的值都在表 5-9 中。\n\n**表 5-9**\
  \ 成分的一般列表\n\n\n\n#### 用数据集进行查询\n\n| 食材 ID | 食材名称 | 单位 | 计量 | 成本 |\n| --- | --- |\
  \ --- | --- | --- |\n| 1 | 切碎的番茄 | 28 | 盎司 | $1.85 |\n| 2 | 番茄膏 | 10 | 汤匙 | $0.79\
  \ |\n| 3 | 番茄酱 | 8 | 盎司 | $0.55 |\n| 4 | 蒜末 | 60 | 汤匙 | $5.99 |\n\n我有几种不同的方法来完成这个任务。我可以编写一个查询，查找`食材\
