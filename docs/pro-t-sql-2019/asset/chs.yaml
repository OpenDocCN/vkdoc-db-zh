  \ $5.99 |\n| 5 | 番茄汤 | 10.75 | 盎司 | $1.58 |\n\n如果我仍然想显示所有包含“番茄”的记录，并且使用与之前相同的逻辑，即使用`食材\
  \ ID`来显示所需值，我将不会得到预期的结果。如果我没有改变获取数据的方式，并像之前在表中所做的那样使用相同的逻辑来获取记录，那么我将得到如表 5-12 所示的结果集。\n\
  \n**表 5-12：使用硬编码`食材 ID`查询含`番茄`的食材**\n\n| 食材 ID | 食材名称 | 单位 | 计量 | 成本 |\n| --- |\
  \ --- | --- | --- | --- |\n| 1 | 切碎的番茄 | 28 | 盎司 | $1.85 |\n| 2 | 番茄膏 | 10 | 汤匙\
