  清单 8-5 的部分执行计划


  如图 8-4 所示，占用执行计划最大百分比的步骤已经改变。根据实际执行计划，最大的百分比花费在对 `RecipeIngredient` 表的主键执行**聚集索引查找**上。由于这是涉及表主键的查找，似乎没有更好的替代方案来调整此查询的性能。


  还有其他因素可能导致查询运行缓慢。在许多情况下，优化这些查询的最佳方法涉及使用索引。你需要检查执行计划中的**键查找**。这些键查找表明 SQL Server
  必须从非聚集索引转到聚集索引以查找查询所需的其他字段。在某些情况下，你可能能够更改返回的值或查询的连接条件来解决键查找问题。否则，你将需要查看是否可以更改索引以提高性能。


  ### 创建和维护索引


  创建和维护索引本身就是一个可以单独成书的话题，但在处理索引时，有些事情你可以做。如果你认为可能需要考虑添加索引，首先需要了解相关表上当前存在哪些索引。虽然这超出了本书的范围，但你需要确定是否有不再使用并可以删除的索引。对于保留的索引，你需要仔细评估。其中一个索引可能可以通过修改，使其不仅继续对其他`T-SQL`代码有效，还能优化当前的查询。你可以创建或修改索引，以便将额外的列与索引一起存储。但是，索引不会按这些列排序。这些列可以被称为覆盖列。如果某一列需要用于连接或`WHERE`子句，我会考虑将其添加到索引中。在决定将列添加到索引之前，请确保你熟悉`SQL
  Server`如何使用索引来搜索数据。某些索引的处理方式是将列作为索引的包含列添加。这将允许`SQL Server`返回该列结果而无需`Key Lookup`，但它不会影响`SQL
  Server`如何使用索引来检索数据记录。


  优化`T-SQL`代码的执行时长可以带来诸多好处。其中包括提升应用程序的性能。在某些情况下，你可能通过以更高效的方式重写代码来改善查询的时长。在其他情况下，你可能需要考虑是否有不同的代码编写方式可以更好地利用现有索引。另一个选择是修改现有索引或创建新索引。如果选择修改索引，请谨慎行事，因为有时存在的索引可能弊大于利。定期检查`T-SQL`代码的执行时长，看看是否能找到任何需要性能调优的查询。


  ### 自动数据库调优


  在前面的章节中，我讨论了你可以做些什么来优化`T-SQL`代码的逻辑读取和执行时长。在过去几个版本的`SQL Server`中，发生了许多变化，这些变化可以帮助你自动优化`SQL
  Server`或优化你的查询。在某些情况下，这涉及记录查询性能的信息。在其他时候，这可以是`SQL Server`管理你的执行计划或索引。虽然本节涵盖的主题与`SQL
  Server`可以为你执行的优化相关，但理解这些概念是有帮助的，以便你能更清楚地了解`SQL Server`将如何处理你的`T-SQL`代码。


  #### 查询存储


  在`SQL Server`中执行查询时，关键优势之一是使用执行计划。在第[6]章中，我简要讨论了内存在`SQL Server`中的使用方式，在第[7]章中，我解释了执行计划如何保存在其自己的计划缓存中。执行计划面临的一个挑战是当执行计划从计划缓存中被清除时。生成新的执行计划不仅有关联成本，而且新的执行计划相比原始计划可能存在性能不佳的风险。


  从`SQL Server 2016`开始，有了关于如何管理执行计划的新功能。不再仅仅是在计划缓存中提供执行计划，而是可以选择保存有关已生成执行计划的历史信息。这个新功能被称为`Query
  Store`。要使用`Query Store`，你必须如清单[8-6]所示启用它。


  ```sql

  ALTER DATABASE Menu

  SET QUERY_STORE (OPERATION_MODE = READ_WRITE);

  ```

  *清单 8-6 启用查询存储的查询*


  启用`Query Store`允许`SQL Server`随时间跟踪执行计划。除了跟踪执行计划外，`Query Store`还记录执行统计信息。从`SQL Server
  2017`和`Azure SQL Database`开始，`Query Store`还跟踪有关特定查询执行的等待统计信息的信息。在`SQL Server 2016`中，你必须手动管理`Query
  Store`以确定你的`T-SQL`代码是否有更好的执行计划。如果你发现一个查询可以从`Query Store`中的执行计划中受益，则需要手动为该查询强制使用一个计划。这将导致随着时间的推移产生额外的维护，因为随着数据库中数据的可能变化，你需要返回并撤销强制计划。


  #### 自动计划修正


  建立在 SQL Server 2016 引入的 **查询存储** 功能之上，SQL Server 2017 引入了一项新特性。下一步是观察 SQL Server
  能否利用对执行计划、执行统计信息以及这些查询执行等待统计信息的历史信息的访问来使 SQL Server 本身获益。与查询存储类似，此功能可进行配置，从而无需人工干预。为了实现这一点，此新功能还必须包含一种验证结果的方法。


  既然 SQL Server 可以查看查询存储，它就能系统地判断一个新的执行计划是否比前一个执行计划表现得更好或更差。这项新功能被称为 **自动计划修正**。此功能默认不启用。在启用它之前，需要先启用查询存储，如清单
  8-6 所示。一旦启用了查询存储，你可以运行清单 8-7 中所示的代码来启用自动计划修正。


  ```sql

  ALTER DATABASE Menu

  SET AUTOMATIC_TUNING (FORCE_LAST_GOOD_PLAN = ON);

  ```

  **清单 8-7** 启用自动计划修正的查询


  启用自动计划修正后，SQL Server 可以比较新旧执行计划，以确定比较结果是否符合 SQL Server 可以强制使用执行计划的标准。为了确保 SQL Server
  不会花费额外的精力进行微调性能，阈值被设定为 CPU 成本减少 10 秒或更多。另一个选项是如果执行中的错误数量少于之前的版本。如果新的执行计划在 CPU 上花费的额外时间少于
  10 秒，那么 SQL Server 可以自动强制使用前一个计划。同样地，如果新的执行计划比之前的计划产生更多错误，那么 SQL Server 可以强制使用前一个执行计划。


  在 SQL Server 自动强制执行一个计划后，它将继续监控性能，以确认新强制的执行计划是否按预期工作。如果 SQL Server 确定强制的执行计划不再提供预期的性能收益，那么
  SQL Server 可以撤销对该执行计划的强制。自动计划修正不会更改你的 T-SQL 代码；此功能仅帮助管理当前用于你的 T-SQL 代码的执行计划。


  如果你更愿意手动管理执行计划，你也可以这样做。但你需要确保不要运行清单 7-8 中所示的 T-SQL 代码。如果你选择手动修正计划选择，那么你需要定期监控哪些查询需要强制执行计划。随着时间的推移，由于数据形态和相关统计信息可能会发生变化，你还需要手动撤销对查询执行计划的强制。从
  SQL Server 2016 开始，可以使用查询存储来长期监控执行计划。在 SQL Server 2017 中，还可以选择使用 DMV `sys.dm_tuning_recommendations`
  来查找可能从强制执行计划中受益的查询。


  虽然自动或手动计划修正超出了 T-SQL 的范畴，但了解 SQL Server 能用你的 T-SQL 查询做些什么是有帮助的。我仍然建议你设计的 T-SQL 代码能够高效地运行于各种场景，但知道当像参数嗅探这类问题不可避免时，SQL
  Server 内部还有其他选项来帮助提升整体查询性能，这总是件好事。


  #### 自动索引管理


  除了允许 SQL Server 管理你的执行计划并选择最佳可用计划之外，你还可以选择让 SQL Server 系统地监控和管理你的索引。此功能目前仅在 Azure
  SQL Database 中可用。启用自动索引管理允许 SQL Server 不仅创建其认为必要的新索引，还可以识别未使用的索引或似乎与其他已创建索引相似的索引。


  与自动计划修正类似，SQL Server 将监控新索引的性能。如果它们被认为效率较低，SQL Server 将删除这些索引。如果 SQL Server 修改或删除索引，也将使用相同的过程。使用
  Azure SQL Database 时，仍然可以手动管理你的索引。然而，允许 Azure SQL Database 及时发现并解决索引问题可能会为你节省成本，因为执行相同任务所需的资源可能会更少。


  ### 智能查询处理


  除了 SQL Server 能够自动管理执行计划和索引之外，还有其他新特性可以帮助自动优化 T-SQL 代码性能。如第 6 章所述，内存是 SQL Server
  使用的关键资源。在 SQL Server 中使用内存时，我们希望确保内存得到尽可能高效的利用。处理数据集对于使用 SQL Server 也至关重要。如果 SQL
  Server 能够将一组行转换为一个批次，然后执行任何必要的操作，这将有助于优化查询。数据表中的数据形态并不总是一致的。在这些场景下，一个能根据所拉回数据类型而灵活调整的执行计划可能会有所帮助。这些特性有助于提高正在执行的
  T-SQL 代码的效率。


  #### 内存授予反馈


  在执行查询时，SQL Server 会尝试估计该事务所需的内存量。基于估计分配给查询的内存量被称为内存授予。虽然 SQL Server 能够正确估计内存是理想情况，但有时估计的内存量与实际使用的内存量并不匹配。内存授予反馈功能最初在
  SQL Server 2017 中可用。最初的内存授予是针对批处理模式操作的。这是一种将记录作为整体（而不是逐行）进行处理的操作类型。


  为了确保内存授予得到正确管理，为内存授予和实际内存使用量之间的差异定义了阈值。如果使用的内存少于 1 MB，则不需要进行额外分析。如果内存授予是实际使用内存量的两倍，则可以重新计算特定查询的内存授予。同样地，如果执行查询所需的内存超过了内存授予，也可以重新计算内存授予。


  #### 行存储上的批处理模式


  拥有用于批处理模式操作的内存授予是批处理模式操作发展的下一个阶段所必需的基础。批处理模式操作是 SQL Server 可以一次性对一组记录执行操作，而不是一次一条记录。当批处理模式最初在
  SQL Server 2012 中引入时，它仅适用于列存储索引。从 SQL Server 2019 开始，批处理模式操作也被允许用于一组行。在这种情况下，一组行也被称为行存储。用于批处理模式操作的内存授予，使得批处理模式操作可用于堆和索引，这是另一种查询优化类型的基础。



  #### 自适应连接


  SQL Server 利用统计信息帮助估算最优执行计划。然而，数据在表中的分布并不总是均匀的。这可能导致 SQL Server 选择的执行计划并非最佳选项。在
  SQL Server 2019 中，由于引入了新功能，这种情况发生的概率有所降低。该功能允许 SQL Server 根据查询当前的执行情况，在 `嵌套循环` 和
  `哈希匹配` 这两种物理连接运算符之间进行选择。这项新功能被称为 `自适应连接`。


  `自适应连接` 最初在 SQL Server 2017 中引入。然而，自适应连接只能作为批处理模式操作的一部分使用。在 SQL Server 2017 中，批处理模式操作仅对列存储索引提供支持。既然现在批处理模式操作也支持堆和
  B 树索引，那么 `自适应连接` 也可以在这些数据库对象上使用。执行清单 8-5 中的查询会生成一个包含自适应连接的执行计划。当你查看执行计划时，你会看到一个代表
  `自适应连接` 的物理运算符。在图形化执行计划中，你无法分辨背后具体使用的是哪种类型的运算符。但是，如果你将鼠标悬停在执行计划中的 `自适应连接` 上，你会看到如图
  8-5 所示的属性列表。


  ![../images/480547_1_En_8_Chapter/480547_1_En_8_Fig5_HTML.jpg](img/480547_1_En_8_Fig5_HTML.jpg)


  *图 8-5 清单 8-5 对应的自适应连接属性*


  清单 8-5 中的原始查询是返回所有食谱列表、与食谱关联的餐食类型、配料列表以及配料的相关成本。在图 8-5 中，你可以看到属性下列出的 `自适应连接` 类型是
  `哈希匹配`。图 8-6 是清单 8-5 执行时的实时查询统计信息的部分截图。


  ![../images/480547_1_En_8_Chapter/480547_1_En_8_Fig6_HTML.jpg](img/480547_1_En_8_Fig6_HTML.jpg)


  *图 8-6 清单 8-5 对应的实时查询统计信息*


  你可以看到每个步骤处理的总记录数以及部分步骤所花费的时间。查看实时查询统计信息，你可以看到返回记录数与估算记录数的百分比。在这个案例中，某些操作（如表 `MealType`
  上的 `聚集索引扫描` 或表 `RecipeIngredient` 上的 `索引扫描`）被正确估算。而其他操作，如 `聚集索引扫描`、`哈希匹配` 和 `自适应连接`，则被低估了。虽然这些差异可能导致性能问题，但我指出这些值的原因，是为了将它们与我更改传递给
  `@RecipeID` 变量的值之后的查询执行情况进行比较。


  如果我将同一个查询限制为一个食谱，我可能会编写如清单 8-8 所示的 T-SQL。


  ```sql

  DECLARE @RecipeID INT = 1350;

  SELECT rec.RecipeName, meal.MealTypeName, ing.IngredientName, ingcos.Cost

  FROM dbo.Recipe rec

  INNER JOIN dbo.MealType meal

  ON rec.MealTypeID = meal.MealTypeID

  INNER JOIN dbo.RecipeIngredient recing

  ON rec.RecipeID = recing.RecipeID

  INNER JOIN dbo.Ingredient ing

  ON recing.IngredientID = ing.IngredientID

  LEFT JOIN dbo.IngredientCost ingcos

  ON ing.IngredientID = ingcos.IngredientID

  AND ingcos.IsActive = 1

  WHERE (rec.RecipeID = @RecipeID OR @RecipeID IS NULL)

  ORDER BY rec.RecipeName, ing.IngredientName;

  ```

  *清单 8-8 查询特定食谱信息的语句*


  清单 8-5 和清单 8-8 之间唯一的区别在于第一行。在清单 8-5 中，`@RecipeID` 被设为 `NULL`，以便返回所有食谱。在清单 8-8 中，`@RecipeID`
  被设置为一个特定的值。我们可以执行这个查询并查看执行计划，看看由于现在可能只影响一个食谱，SQL Server 是否会以不同的方式处理这个查询执行。在图 8-7
  中，你可以看到执行清单 8-8 时 `自适应连接` 的属性。


  ![../images/480547_1_En_8_Chapter/480547_1_En_8_Fig7_HTML.jpg](img/480547_1_En_8_Fig7_HTML.jpg)


  *图 8-7 清单 8-8 对应的自适应连接属性*


  图 8-7 中显示的实际连接类型是 `嵌套循环`。图 8-5 和图 8-7 中 `自适应连接` 类型的差异，展示了 `自适应连接` 如何帮助优化那些先前受参数嗅探影响的查询。清单
  8-8 对应的实时查询统计信息详情如图 8-8 所示。


  ![../images/480547_1_En_8_Chapter/480547_1_En_8_Fig8_HTML.jpg](img/480547_1_En_8_Fig8_HTML.jpg)


  *图 8-8 清单 8-8 对应的实时查询统计信息*


  在图 8-8 中，出现了与图 8-6 中相同的物理运算符。然而，实际处理的行数与估算行数相比有显著差异。在图 8-8 的案例中，几乎所有步骤都被严重高估了。不过，清单
  8-8 中的查询仍然会因使用 `自适应连接` 而受益于性能提升。


  你可以通过多种方式来优化 T-SQL 代码。除非你正在测试一个新查询，否则通常第一步是确定需要优化哪些 T-SQL 代码。确定了需要优化的查询后，你可能需要分析执行计划，以帮助确定是否有某个步骤明显需要优化。你可能还想分析与查询相关的信息，例如平均逻辑读取次数或平均执行时间。将这些信息结合起来，可能有助于你确定可以调优以提升性能的方面。


  此外，SQL Server 中还有一些功能可以帮助自动提升你的 T-SQL 代码性能。这包括允许 SQL Server 分析你新的执行计划，并确认它们是否比之前的执行计划性能更优。如果预计之前的执行计划性能更好，SQL
  Server 可以确保自动选择该计划。如果你使用的是 Azure SQL Database，在管理索引方面也有类似的选项可用。`自适应连接` 的使用使 SQL
  Server 能够让你的执行计划更加灵活。当执行计划中包含 `自适应连接` 时，SQL Server 可以根据该特定查询执行时传递的值来决定使用正确的物理运算符。无论你是手动优化
  T-SQL 代码，还是让 SQL Server 决定如何改进查询执行，你都可以使用多种工具来使你的 T-SQL 代码性能更佳。


  '
- "# 第三部分 构建可管理的 T-SQL\n\n\n\n## 9. 编码标准\n\n在本书前面的第 3 章中，我讨论了标准化你的 `T-SQL` 可以采取的各种步骤。这包括在格式化\
  \ `T-SQL` 代码、命名数据库对象以及为 `T-SQL` 代码添加注释时保持一致性。虽然制定在编写、命名和文档化 `T-SQL` 时允许保持一致性的标准很重要，但要创建一个全面的\
  \ `T-SQL` 编码标准，还有更多工作要做。\n\n在本章中，我将讨论实施编码标准的各种优势。我还将介绍在定义编码标准时应该考虑哪些类型的因素。在制定编码标准时，你还需要决定如何实施这些标准。我将涵盖制定这些编码标准所需的基本流程。\n\
  \n### 为何使用编码标准\n\n你可以做许多不同的事情来提高代码质量。在提高代码质量时，你需要思考最终目标。我希望我的 `T-SQL` 代码能够高效运行、便于快速调试且易于理解。这通常是你在设计和编写\
  \ `T-SQL` 代码时创建一致性的结果。其中一个选择就是实施编码标准。\n\n通常，有一些特定的 `T-SQL` 实践，你希望人们去遵循。其中一些行为很容易达成共识，并且大多数人默认就会使用。然而，也可能存在其他一些\
  \ `T-SQL` 最佳实践，你知道它们在普遍情况下或在你的组织中并不常见。你希望创建一套指导方针，让每个人都能轻松知道他们应该怎么做。\n\n在 `T-SQL`\
  \ 中，也有一些东西，你知道无论如何都不希望在 `T-SQL` 代码中看到。同样，其中一些主题并不常见，但另一些可能非常普遍。无论哪种情况，你都希望将这些明确地定义为编码标准的一部分。使用编码标准可以最大程度地减少关于允许哪些类型的\
  \ `T-SQL` 代码或哪种代码更可取而产生的反复争论。\n\n你可以使用编码标准来设定允许和不允许的界限。我遇到过这样的情况：软件工程师或数据库开发人员希望使用特定的\
  \ `T-SQL` 写法，因为它更易读易写。然而，有些时候，对人类来说容易理解的 `T-SQL` 代码在 `SQL Server` 中的性能表现却不尽如人意。虽然我希望这些人能够来询问我关于当前流程的问题，但有时我会有太多更高优先级的请求，而没有时间解决他们的顾虑。\n\
  \n最好能在需要标准之前就让这些指导方针得到认同。这也应该能提供一些保证，表明每个主题都经过了讨论，并且多方已经达成共识，认为某些 `T-SQL` 代码在许多场景下性能良好，或者存在引发性能问题的高风险。\n\
  \n我知道当我开始工作时，我的一天已经排满了。不仅来自我知道需要做的事情，还来自最后一刻的请求和零散的问题。实施编码标准的真正目标是让你的生活更轻松。这包括能够安心，知道你的数据库中运行着高质量的\
  \ `T-SQL` 代码。理想情况下，你应该能够将那些时间用于未来的数据库设计改进或消除技术债务。\n\n影响我们生活的另一个因素是决策疲劳。这是一个概念，指的是一个人在一天中不得不做出一个又一个决定而感到疲惫不堪。随着技术的出现，我们每天都会经历这种疲劳。当涉及到关于\
  \ `T-SQL` 编码的决策时，这种决策疲劳可能更加令人不堪重负。在 `SQL Server` 中，有很多方法可以实现相同的功能。实施 `T-SQL` 编码标准的另一个优势是，它可以最大限度地减少数据库开发人员在编写新代码时需要做出的决策。\n\
  \n当你首次实施编码标准时，确保获得所有相关方的认可。在许多情况下，你可能无法达成一致同意。如果可以的话，为你希望包含在编码标准中的任何变更争取多数票。另一种方法是确保在标准被批准和实施之前，每个人都同意最终的标准。\n\
  \n`T-SQL` 在工作场所面临的主要挑战之一是，许多负责编写 `T-SQL` 的人并非数据库专家。这不仅会导致挫败感，还可能导致查询性能不佳。`T-SQL`\
  \ 最好也是最难的方面之一，就是编写第一个查询是多么容易。`SQL` 是 `结构化查询语言` 的缩写，编写简单查询就是如此简单。你几乎可以像读句子一样阅读它们。\n\
  \n然而，这可能会造成一种错误的印象，认为 `SQL Server` 后台发生的事情同样简单。我们大多数人在高压力、快节奏的环境中工作。这通常意味着我们没有时间停下来解释我们做出的每一个决定。这可能包括为什么应该或不应该使用某些\
  \ `T-SQL` 代码。这正是 `T-SQL` 编码标准真正发挥优势的地方。它允许你进行一次对话来设定基本规则。一旦这些规则或标准到位，`T-SQL` 开发人员和工程师就可以按照他们想要的任何方式编写代码，只要它符合预定义的标准。\n\
  \n我听软件开发人员说过，在编写应用程序时定义编码标准非常有帮助。这使他们能够轻松地接手任何代码，无论是否是他们自己写的，并立即感到适应。这是因为虽然他们可能知道从未看过这组代码，但他们的大脑已经从中看到了与他们编写过的其他代码的相似之处。这消除了那种“眼前的代码不是我的”瞬间反应。好处是，他们可以立即着手审查代码或进行必要的修改。\n\
  \n既然你已经确定要定义编码标准，下一步就是实施这些标准。事情可能就会变得棘手。你可能会希望每一个经过脚本审查的存储过程都遵守这些标准。然而，你会看到的一些代码已经投入生产环境了。我发现有些时候，特别是当其他人面临严格的截止日期时，仅仅因为存储过程不符合编码标准而被拒绝，会让人特别沮丧。\n\
  \n一个可能的折中方案是给予有条件的批准，并请求创建一个新的用户故事，以便 `T-SQL` 代码可以更新以符合新的编码标准。这可以让开发人员放心，他们能够满足当前冲刺的截止日期，同时也让你知道这段\
  \ `T-SQL` 代码应该在未来的版本中进行修正以满足编码标准。\n\n处理这些新用户故事的一个简单方法是将它们添加到下一个冲刺中。这允许它们在你仍然记得需要更改的内容时得到清理。这也确保了其他进行脚本审查的人员知道，让所有\
  \ `T-SQL` 代码符合编码标准对各方都很重要。\n\n### 编码标准应包含什么\n\n理想情况下，制定编码标准将为你提供一个框架，最大限度地减少你在审查和部署\
  \ `T-SQL` 代码时遇到的整体挑战。你希望编码标准涵盖 `T-SQL` 代码应该如何呈现（外观）、`T-SQL` 代码应该如何运作（功能）、`T-SQL`\
  \ 代码应该如何表现（性能）以及 `T-SQL` 代码应该如何被理解（可读性）。\n\n编码标准的一些基础知识已经在第 3 章讨论过。这包括通过创建关于 `T-SQL`\
  \ 代码书写方式的标准来格式化 `T-SQL` 代码。你还需要关于如何命名 `T-SQL` 数据库对象的标准。制定关于 `T-SQL` 代码应如何注释的标准也很有用。\n\
  \n\n### T-SQL 设计\n\n使用 SQL 编码标准，您可以通过编码标准定义数据库设计。这可以包括数据库对象（包括架构）应如何组织。编码标准还可以指出数据应如何存储在数据库中。您可以指明哪些类型的列应包含在主键中。还可以指示表应如何聚簇，或者何时最好使用聚簇索引或非聚簇索引。\n\
  \n#### ANSI 标准\n\n一个考虑因素是是否让您的 T-SQL 代码符合 ANSI 标准。虽然 SQL Server 有一些可用的功能，但并非所有这些功能都符合\
  \ ANSI 标准。在许多情况下，SQL Server 特定的命令和函数可以使用 ANSI 标准代码重写。确保您编写 T-SQL 代码为 ANSI 标准，可以让您轻松迁移到另一个同样符合\
  \ ANSI 标准的关系数据库管理系统。\n\n#### 范式\n\n在涵盖 T-SQL 编码标准时，您可能还希望定义设计元素。这包括数据应如何分组到表中，以及这些表中应包含什么信息。存在不同级别的范式，您可以使用\
  \ T-SQL 编码标准来指明这些范式是什么。通常讨论的各种类型的数据库规范化包括第一范式 (1NF)、第二范式 (2NF)、第三范式 (3NF) 和第四范式\
  \ (4NF)。\n\n每种类型的范式都建立在前一种范式的基础上。最低级别的范式是第一范式。这包括要求每个表都有一个主键，并且每条记录只保存一个值。\n\n####\
  \ 表大小\n\n创建表时，很容易想把与特定项目相关的所有列都放在同一个表中。这可能导致表包含非常多列。拥有大量列的表面临的挑战之一是数据的存储方式。这最终可能导致性能问题。可以设计表来防止此类问题。此外，设计良好的表使整体数据库设计更能适应应用程序随时间发生的变化。\n\
  \n#### 名称-值对\n\n使用 SQL Server 时，目标是考虑基于集合的操作。牢记这一点，您在设计表时需要谨慎。您要确保不要为了保持表宽度小而最小化列的数量。您需要考虑哪些类型的列是有价值的。如果您使用一列来定义值类型，另一列来定义实际值，那么您就设计了一个名称-值对关系。\n\
  \n这种设计可能更容易理解并创建更简单的表，但这种设计并未充分利用 SQL Server 的优势。使用名称-值对时，使用索引变得越来越困难。因此，SQL Server\
  \ 需要查看更多数据才能提取必要的值。\n\n#### 主键\n\n在创建和设计表时，您需要考虑将存储什么类型的数据。这不仅与数据的排序方式有关，还与表与其他表的关系有关。在许多情况下，将主键作为编码标准的一部分是理想的做法。虽然主键并非在所有场景中都是必需的，但它应有助于澄清哪些字段用于定义与其他表的关系。\n\
  \n#### 外键\n\nSQL Server 是一个关系数据库管理系统，其主要优势之一是表之间的关系。但是，您需要指定表之间的关系，以便 SQL Server\
  \ 可以确保在表中保存有效数据。发生这种情况时，SQL Server 会检查存储值的表与引用表之间的关系。SQL Server 使用外键来实现这一点。因为 SQL\
  \ Server 知道它可以信任这种关系，所以通常可以更有效地过滤数据并更快地找到数据。因此，在 T-SQL 编码标准中指定外键关系可能是个好主意。\n\n####\
  \ 非聚簇索引\n\n我发现非聚簇索引比我预想的更具争议性。使用非聚簇索引的挑战之一是，将数据作为索引的一部分记录或在值更改时更新索引会产生成本。然而，SQL\
  \ Server 使用索引来快速查找各种查询引用的数据。您需要确保使用非聚簇索引的好处大于成本。\n\n您可以通过确保正确定义索引来实现这一点。由于维护索引有相关成本，您需要确保您创建的任何索引都被可用查询定期使用。您可能还希望定义如何确定哪些列应成为索引的一部分，哪些列应作为索引的一部分被提取回来。\n\
  \n#### 约束定义\n\n您的表可以包含一列或多列。每列都保存某种类型的信息。对于该信息，您可能知道只有某些值可以存储在该列中。在某些情况下，使用外键可以保持数据完整性，但在其他情况下，使用外键可能没有意义。在这些情况下，您可以指定记录上的约束。该约束可以限制可以在这些列中存储的信息类型。\n\
  \n但是，强制 SQL Server 管理这些约束会给 SQL Server 带来额外负担。因此，您可能需要考虑尽量减少使用约束来限制可以存储在数据库中的数据类型，并依赖应用程序代码来提供良好的数据。约束的另一个用途是为某些字段指定默认值。这可能适用于您知道创建记录时最可能存在值的列。例如，您可能希望为\
  \ `IsActive` 列指定默认值 `True`，因为大多数创建的记录在创建时都是活动的。同样，这可以由应用程序处理，但您也可以决定将此作为 T-SQL 编码标准的一部分来强制执行。\n\
  \n考虑鼓励良好设计实践的 T-SQL 编码标准非常重要。这包括确定您将多大程度上遵守 ANSI 标准。还有其他主题需要包括，例如选择作为数据库设计一部分允许的最小范式级别。此决定可能会影响\
  \ T-SQL 设计的其他方面，包括主键、外键和非聚簇索引。您可能还会考虑如何处理约束。一旦确定了为良好 T-SQL 设计实践而要强制执行的 T-SQL 编码标准，您可能还想决定关于\
  \ T-SQL 整体性能需要哪些编码标准。\n\n### T-SQL 性能\n\n确定了与数据库设计和实施相关的 T-SQL 编码标准后，您将需要确定需要哪些标准来帮助最小化和解决可能出现的任何性能问题。这包括创建有助于确保\
  \ SQL Server 不会被不必要信息拖累的 T-SQL 编码标准。您还需要考虑如何编写或不编写 T-SQL 代码以最小化性能开销。\n\n\n\n####\
  \ 选择必要数据\n\nSQL Server 能存储海量数据，也能检索大量数据。在许多应用场景中，应用程序都需要检索数据。初次学习数据库及相关表时，人们常常倾向于选择表中的所有列。尽管这是返回数据最简单的方法，但通常并非理想之选。\n\
  \n首先是使用星号 (`*`) 选择所有行的语法。这种方法的问题在于，如果基础对象中的列发生变化，代码可能无法按预期工作。更糟糕的是，代码可能不会报错，用户也就无从知晓他们获取的是错误数据。\n\
  \n第二个可能发生的问题更为常见。当你拉回所有列时，会给 SQL Server 带来相当大的额外工作量。SQL Server 不仅必须为返回的所有行返回所有数据，而且很可能无法使用任何索引来返回这些数据。这就好比每次想学习某个特定章节时，都要通读整本书。你固然能学到所需内容，但也会花费大量时间阅读那些当时很可能与你需求无关、因而会被忽略的主题。\n\
  \n#### 可搜索的 (Sargeable)\n\n你希望 SQL Server 能够轻松地搜索数据库以找到你试图访问的信息。有一些编写 T-SQL 的方式可以让\
  \ SQL Server 利用索引快速找到必要的数据。然而，也存在其他编写 T-SQL 的方法，它们能得到相同的结果，但可能耗时更长，并且需要 SQL Server\
  \ 扫描更多数据。这两种情况的区别在于，第一种情况指的是确保你的 T-SQL 是 **可搜索的 (sargeable)**，而第二种情况则是 T-SQL **不是可搜索的\
  \ (not sargeable)**。这通常发生在 T-SQL 语句的 `WHERE` 子句中。在 `代码清单 9-1` 中，我编写了一个查询，用于查找所有在\
  \ 2019 年 8 月创建的食谱。\n\n```sql\nSELECT RecipeName, RecipeDescription\nFROM dbo.Recipe\n\
  WHERE DATEPART(MM, DateCreated) = 8\nAND DATEPART(YY, DateCreated) = 2019\n```\n\
  \n`代码清单 9-1`\n使用不可搜索条件的查询\n\n你可以看到，我在创建日期 (`DateCreated`) 上使用了 `DATEPART` 函数来分别确定每条记录创建的月份和年份。为了让\
  \ SQL Server 判断哪些记录属于 2019 年 8 月，它将需要检查表中的每一条记录。你可以从 `图 9-1` 中的 `索引扫描 (Index Scan)`\
  \ 执行计划验证这一点。\n\n![../images/480547_1_En_9_Chapter/480547_1_En_9_Fig1_HTML.jpg](img/480547_1_En_9_Fig1_HTML.jpg)\n\
  \n`图 9-1`\n来自不可搜索条件的执行计划\n\n当执行计划如此简单时，有时很难直观地了解这些查询的实际性能如何。一个更好的方法是查看与此执行计划相关的属性。`图\
  \ 9-2` 包含大量信息，但我们将重点关注 **已读取行数 (Number of Rows Read)**。\n\n![../images/480547_1_En_9_Chapter/480547_1_En_9_Fig2_HTML.jpg](img/480547_1_En_9_Fig2_HTML.jpg)\n\
  \n`图 9-2`\n来自不可搜索条件的 `索引扫描` 属性\n\n`代码清单 9-1` 中 `索引扫描` 的已读取行数是 32,242。为了更好地判断这个查询的性能表现，我还会编写一个使用可搜索值的查询。在\
  \ `代码清单 9-2` 中，我仍然查询 `dbo.Recipe` 表中 2019 年 8 月创建的记录，但我现在使用大于等于 (`>=`) 和小于 (`<`)\
  \ 来指定一个确切的日期范围。\n\n```sql\nSELECT RecipeName, RecipeDescription\nFROM dbo.Recipe\n\
  WHERE DateCreated >= '8/1/19'\nAND DateCreated < '9/1/19'\n```\n\n`代码清单 9-2`\n使用可搜索条件的查询\n\
  \n虽然这看起来不够简洁或更难阅读，但重点在于编写一个查询，让 SQL Server 能够快速确定哪些记录满足查询中请求的条件。`图 9-3` 显示了 `代码清单\
  \ 9-2` 中查询的执行计划。\n\n![../images/480547_1_En_9_Chapter/480547_1_En_9_Fig3_HTML.jpg](img/480547_1_En_9_Fig3_HTML.jpg)\n\
  \n`图 9-3`\n来自可搜索条件的执行计划\n\n乍一看，`图 9-3` 中的执行计划与 `图 9-1` 中的执行计划非常相似。在比较外观相似的执行计划时，可以说它们具有相同的\
  \ **形状 (shape)**。虽然这些执行计划形状相似，但构成执行计划的具体项目却不同。在 `图 9-1` 中，我们看到有一个 `索引扫描 (Index Scan)`。在\
  \ `图 9-3` 中，我们可以看到这个执行计划使用的是 `索引查找 (Index Seek)`。此外，`图 9-3` 中 `SELECT` 的 `索引查找`\
  \ 之间的连线也比 `图 9-1` 中 `SELECT` 的 `索引扫描` 的连线更细。所有这些都以图形化的方式代表了每个查询的整体性能。不过，我们也可以获取一些事实和数据来比较\
  \ `代码清单 9-1` 和 `9-2` 中查询的性能。在 `图 9-2` 中，我们发现实际读取的行数是 32,242。我们可以将这个值与 `图 9-4` 中显示的`实际读取行数`进行比较。\n\
  \n![../images/480547_1_En_9_Chapter/480547_1_En_9_Fig4_HTML.jpg](img/480547_1_En_9_Fig4_HTML.jpg)\n\
  \n`图 9-4`\n来自可搜索条件的 `索引查找` 属性\n\n如 `图 9-4` 所示，`代码清单 9-2` 的实际读取行数是 1。将 `代码清单 9-2`\
  \ 读取的 1 行与 `代码清单 9-1` 读取的 32,242 行进行比较，哪个查询更高效就变得非常清楚了。\n\n我们还可以查看两个查询的总 CPU 使用率，以了解每个查询的性能表现。如果我同时运行\
  \ `代码清单 9-1` 和 `9-2` 中的两个查询，两者执行计划总时间的 98% 都消耗在 `代码清单 9-1` 的查询上。我也可以使用 `SET STATISTICS\
  \ TIME ON` 来查找 CPU 时间和已用时间。CPU 时间是查询执行在 CPU 上花费的总时间。已用时间是查询执行的总时间。我多次运行这两个查询，发现\
  \ `代码清单 9-1` 的平均 CPU 时间是 15 毫秒，平均已用时间是 17 毫秒。而 `代码清单 9-2` 每次的 CPU 时间和已用时间都是 0 毫秒。比较\
  \ CPU 时间和已用时间，我们可以清楚地看到 `代码清单 9-2` 的性能优于 `代码清单 9-1`。同样重要的是要注意，如果存在多个 CPU，总已用时间可能少于总\
  \ CPU 时间。\n\n\n\n\n#### 隐式转换\n\nSQL Server 中的数据都有其数据类型。这些数据类型将在第 1 章中进一步讨论。使用这些数据类型时，确保保持数据类型一致至关重要。否则，SQL\
  \ Server 将不得不进行隐式转换。这是指 SQL Server 在后台将一种数据类型转换为另一种数据类型的过程。这可能会给 SQL Server 带来额外的负载。此外，还存在隐式转换失败的风险。我最常见到的情况是，一个标识类型的列主要存储整数值，但偶尔也存储字符串值。\n\
  \n#### SET NOCOUNT ON\n\n你可以对 T-SQL 做许多小的调整，以获得一些微小的性能提升。默认情况下，当你运行 T-SQL 代码时，它会计算受影响的行数并进行报告。计算这些记录的成本可能是额外的几毫秒。因此，对编码标准的一个可能的改进是关闭此功能，尤其是在涉及存储过程时。实现这一点的方法是确保在存储过程内部包含\
  \ `SET NOCOUNT ON`。你可以在清单 9-3 中看到这一点。\n\n```\nCREATE PROCEDURE dbo.UpdateRecipeMenuType\n\
  @RecipeMeal RecipeMealType READONLY\nAS\nSET NOCOUNT ON\nUPDATE rec\nSET MealTypeID\
  \ = meal.MealTypeID\nFROM dbo.Recipe rec\nINNER JOIN @RecipeMeal recmeal\nON rec.RecipeName\
  \ = recmeal.RecipeName\nINNER JOIN dbo.MealType meal\nON recmeal.MealTypeName =\
  \ meal.MealTypeName\nListing 9-3\n使用 SET NOCOUNT ON 的存储过程\n```\n\n当在查询代码执行前包含了 `SET\
  \ NOCOUNT ON`，存储过程的执行时间可以减少几毫秒。\n\n#### NULL 值\n\n大多数 T-SQL 编码标准的存在是为了帮助提高 SQL Server\
  \ 的整体性能。然而，有些 T-SQL 编码标准的存在是为了帮助改进查询结果或使人们更容易编写出按预期工作的代码。`NULL` 的问题之一是它不能直观地工作。在\
  \ SQL Server 中，`NULL` 被视为未知值。这意味着 `NULL` 既不是 `True` 也不是 `False`。因此，在可能包含 `NULL`\
  \ 值的字段中，处理这些字段的方式必须有所不同。\n\n此外，`NULL` 值可能表明表的设计效率不高。在陷入这种情况之前，考虑如何设计表可能是有益的。你需要确保表确实需要包含可为空的列。这也与数据的存储方式以及索引的创建方式有关。你需要考虑这些数据将如何被使用。\n\
  \n#### NOLOCK\n\nT-SQL 编码标准还涉及其他因素。其中一些包括你可能认为的最佳实践。一些非常常见的最佳实践包括高度争议性的话题，例如是否或在何时在查询中使用\
  \ `NOLOCK` 提示。我特别提到这一点的原因之一是，至少存在两个关于 `NOLOCK` 的截然不同的群体。一方面，许多数据库管理员认为不使用 `NOLOCK`\
  \ 是一种最佳实践。另一方面，许多开发人员则持相反观点，认为使用 `NOLOCK` 是一种最佳实践。这种观点上的差异是基于数据准确性和性能之间的权衡。\n\n\
  `NOLOCK` 背后的想法是通过减少锁的数量来提高查询性能。在 `NOLOCK` 的情况下，减少的锁活动是针对 `SELECT` 语句的。`INSERT`、`UPDATE`\
  \ 和 `DELETE` 等操作不受 `NOLOCK` 的影响。然而，当数据修改操作持有 `SELECT` 语句试图访问的同一表上的锁时，在 `SELECT`\
  \ 语句上使用 `NOLOCK` 可以更快地返回结果。\n\n我们可以通过一个例子来了解这些观点为何是正确的。在清单 9-4 中，我编写了一个查询，在显式事务中将一条记录插入到\
  \ `dbo.Recipe` 表中。\n\n```\nBEGIN TRAN\nINSERT INTO dbo.Recipe\n(\nRecipeName,\n\
  RecipeDescription,\nServingQuantity,\nMealTypeID,\nPreparationTypeID,\nIsActive,\n\
  DateCreated,\nDateModified\n)\nVALUES\n(\n'Baked Acorn Squash',\n'Acorn squash with\
  \ butter and brown sugar',\n4,\n4,\n1,\n1,\nGETDATE(),\nGETDATE()\n)\nListing 9-4\n\
  向 dbo.Recipe 插入记录\n```\n\n在清单 9-4 中，我使用 `BEGIN TRAN` 启动了一个显式事务，但没有指定 `COMMIT` 或\
  \ `ROLLBACK`。这将使事务保持打开状态，并在 `dbo.Recipe` 上持有一个锁。为了模拟应用程序性能，我将打开一个单独的查询窗口并运行一个查询，尝试查找此表中在\
  \ 2019 年 8 月 1 日之后创建的所有记录。你可以在清单 9-5 中看到此查询的示例。\n\n```\nSELECT RecipeName, RecipeDescription\n\
  FROM dbo.Recipe\nWHERE DateCreated > '8/1/19';\nListing 9-5\n查询最近的食谱\n```\n\n由于清单\
  \ 9-4 中的查询对 `dbo.Recipe` 持有的锁，我的查询似乎一直在运行。清单 9-5 中的查询正在等待锁被释放，然后才能返回任何数据。为了更快地获得结果，我可以更改\
  \ SQL Server 处理表上锁的方式。在清单 9-6 中，我修改了清单 9-5 中的查询，并包含了一个查询提示 `WITH (NOLOCK)`。\n\n\
  ```\nSELECT RecipeName, RecipeDescription\nFROM dbo.Recipe WITH(NOLOCK)\nWHERE DateCreated\
  \ > '8/1/19';\nListing 9-6\n使用 NOLOCK 提示查询最近的食谱\n```\n\n当我在一个单独的查询窗口中运行清单 9-5 中的查询时，我几乎立即得到了结果。你可以在表\
  \ 9-1 中看到这些结果的示例。\n\n表 9-1\n2019 年 8 月 1 日后创建的食谱\n\n| RecipeName | RecipeDescription\
  \ |\n| --- | --- |\n| Lee’s Hamburgers | The best hamburgers |\n| Acorn Squash |\
  \ Acorn squash with butter and brown sugar |\n\n查看前面的结果，你可以看到清单 9-4 中插入的记录包含在结果中。但是，此记录尚未提交到\
  \ SQL Server。我可以回滚清单 9-4 中的事务并撤消插入操作。这将导致表 9-1 中的结果不准确。这种查询返回的结果未完全提交到数据库的差异被称为脏读。这是在查询中使用\
  \ `NOLOCK` 时的最大风险。在决定应在 T-SQL 代码中使用 `NOLOCK` 之前，请确保业务方（包括你的最终用户）了解使用此提示的潜在风险。\n\n\
  \n\n#### 重新编译\n\n除了 `NOLOCK`，另一个经常被考虑的查询提示是 `RECOMPILE`。你可能会遇到一个受到**参数探测**影响的查询，正如第\
  \ 4 章所讨论的。这意味着该查询创建的执行计划可能对某些参数值表现良好，但当使用其他参数值时，性能可能会显著下降。一个可以轻松快速实施的变通方法就是查询提示\
  \ `RECOMPILE`。在清单 9-7 中，你可以看到在创建存储过程以允许其在执行时重新编译时，所需的额外一行。\n\n```sql\n/*-------------------------------------------------------------*\\\
  \nName:             dbo.GetRecipeAndIngredientByMealTypeID\nAuthor:           Elizabeth\
  \ Noble\nCreated Date:     April 20, 2019\nDescription: Get all recipes and their\
  \ ingredients by meal type\nSample Usage:\nEXECUTE dbo.GetRecipeAndIngredientByMealTypeID\
  \ 1\n\\*-------------------------------------------------------------*/\nCREATE\
  \ PROCEDURE dbo.GetRecipeAndIngredientByMealTypeID\n    @MealTypeID     INT\nWITH\
  \ RECOMPILE\nAS\nSELECT\n    rec.RecipeName,\n    ingr.IngredientName,\n    ingr.IsActive,\n\
  \    ingr.DateCreated,\n    ingr.DateModified\nFROM dbo.Recipe rec\nINNER JOIN dbo.RecipeIngredient\
  \ recingr\n    ON rec.RecipeID = recingr.RecipeID\nLEFT OUTER JOIN dbo.Ingredient\
  \ ingr\n    ON recingr.IngredientID = ingr.IngredientID\nWHERE rec.MealTypeID =\
  \ @MealTypeID\nORDER BY rec.RecipeName, ingr.IngredientName;\n```\n\n**清单 9-7**\
  \ 在存储过程中添加 `WITH RECOMPILE`\n\n虽然这是一个快速解决方案，但它会增加服务器的 CPU 负载。我建议，如果可能的话，尝试重新设计查询。如果不行，你可能需要更改存储过程，使其仅针对那些偏离大多数情况的值进行重新编译。\n\
  \n对于你的 T-SQL 编码标准，包含与编写高性能 T-SQL 相关的指导原则非常重要。你还需要包含一些规则，规定哪些操作是允许的或不允许的，以尝试修复性能不佳的\
  \ T-SQL。T-SQL 编码标准的最后一部分是一个兜底条款，通常与安全性、面向未来和可维护性相关。\n\n### T-SQL 可用性\n\n拥有鼓励良好数据库设计和解决性能问题的\
  \ T-SQL 编码标准是一个好的开始。然而，你还需要一些编码标准来帮助处理 T-SQL 的其他方面。其中一些包括为潜在的安全问题制定 T-SQL 编码标准。还有一些编码标准属于最佳实践，可能不会影响性能。它们可能是为了帮助即使在底层数据结构发生变化时也能保持\
  \ T-SQL 功能正常，或者鼓励使用那些使 T-SQL 代码更易于阅读或理解的 T-SQL 命令。\n\n#### 链接服务器\n\n链接服务器是那些可能被忽视作为编码标准一部分的事物之一。看起来你不太可能需要使用链接服务器，但链接服务器总能在你最意想不到的时候显得必要。这就是为什么将关于如何处理链接服务器的规范包含在你的\
  \ T-SQL 编码标准中是个好主意。由于使用链接服务器存在普遍的安全风险，建议除非必要，否则不要使用。我建议明确定义什么情况被视为“必要”。这将有助于在你发现自己想要实现链接服务器时减少任何争议。\n\
  \n#### 列定义\n\n编写 T-SQL 的一个关键因素是明确说明你正在使用或影响哪些列。虽然这与确保你只与所需数据进行交互有关，但要求你的 T-SQL 代码显式说明列名还有其他好处。将数据插入\
  \ SQL Server 时，可以不说明列名或插入顺序。如果你正在向表中的每一列插入数据，并且插入数据的顺序与表中列的顺序相同，那么不会有任何问题。但是，如果将来从表中添加或删除列，或者更改了列的顺序，这可能会导致存储过程或其他\
  \ T-SQL 代码停止工作。因此，一个好的习惯是在所有 T-SQL 语句中显式说明列名。在这些示例中，这特别包括 `SELECT` 和 `INSERT` 语句。\n\
  \n#### `BETWEEN`\n\n还存在一些情况，你有多种编写 T-SQL 代码的选择，并且这些选项的性能看起来都差不多。当你试图获取覆盖一个连续范围的数据子集时，就可能发生这种情况。在这种情况下定义\
  \ T-SQL 编码标准不一定能改善 SQL Server 的性能，而更密切地关系到提高 T-SQL 代码的一致性。清单 9-8 展示了如何使用 `BETWEEN`\
  \ 编写 T-SQL 的示例。\n\n```sql\nSELECT *\nFROM dbo.Recipe\nWHERE RecipeID BETWEEN 100\
  \ AND 20000\n```\n\n**清单 9-8** 使用 `BETWEEN` 的查询\n\n就可读性而言，你可能会决定所有包含边界值的范围都应使用 `BETWEEN`\
  \ 来编写。这可能比使用大于等于和小于等于来获得相同范围更可取。\n\n#### 存储过程参数\n\n虽然提高代码可读性很重要，但在处理性能问题时，提高 T-SQL\
  \ 的可读性有时可能会使调试代码变得更加困难。这种类型的情况可能取决于你如何配置存储过程参数。你可以单独定义每个参数，也可以创建一个用户定义表来传递多个变量。如果你选择使用用户定义表，你的\
  \ T-SQL 代码可能更简洁，但今后调试性能问题可能需要更多时间。此外，你的存储过程工作方式也会不同，因为你是在使用表变量，而不是单独处理每个数据字段。\n\n\
  #### `UNION`\n\n有时你会希望将来自两个不同查询的数据组合起来。这种组合涉及将一个数据集附加到另一个数据集。当这两个数据集具有相同数量的列且数据类型相同时，就有可能使用\
  \ `UNION` 语句来组合这些数据。使用 `UNION` 的优势在于查询具有可读性，通过阅读 T-SQL 代码可以很容易地看出发生了什么。使用 `UNION`\
  \ 的挑战在于，`UNION` 的性能可能比每个查询单独执行时的性能更差。除了 `UNION`，还有 `UNION ALL` 功能。`UNION` 和 `UNION\
  \ ALL` 之间的主要区别在于返回数据的方式。在 `UNION` 语句中，返回的是一个唯一记录集，而在 `UNION ALL` 语句中，结果集中包含每个单独查询的实际记录数。在设计编码标准时，你需要决定是否允许使用\
  \ `UNION` 和 `UNION ALL` 语句。你可能还想决定是否存在特定的场景，在这些场景中允许或不允许使用它们。\n\n#### `CAST`\n\n\
  在编写代码时，你可能会遇到需要将一种数据类型的值更改为另一种数据类型的情况。对整数值执行数学函数时，更改数据类型可能很重要。由于 SQL Server 执行数学运算的方式，如果你将一个整数除以另一个整数，你会得到一个整数作为答案。如果你希望\
  \ SQL Server 提供一个十进制数作为结果，你需要将数据类型从整数更改为十进制数。同样，你可能希望在 SQL Server 查询中显示一串文本。但是，如果你在字符串中包含一个整数，当\
  \ SQL Server 尝试执行查询时会出现错误。然而，如果你将整数更改为 `varchar` 数据类型，你将能够正确解析该字符串。\n\n\n#### 游标（Cursor）\n\
  \n游标（`Cursor`）在数据库领域一直存在争议。在第 5 章中，我介绍了基于集合的操作，这是`SQL Server`性能最佳的方式。游标的问题在于它们无法利用这些基于集合的操作，这在处理数据时可能导致相当大的开销。雪上加霜的是，游标的编写方式更接近于应用程序代码，而非`T-SQL`。这使得使用游标变得非常诱人，因为理解如何编写代码以获得所需结果可能更容易。与制定`T-SQL`编码标准的其他因素一样，你可能无法完全排除游标。如果是这样，试着制定一些标准，在你认为游标有益的情况下，并将游标使用仅限于这些情况。\n\
  \n#### ORDER BY\n\n人们常常希望`SQL Server`能完全按照应用程序所需的方式获取所有数据。虽然`SQL Server`可以做到这一点，但你需要考虑为完成你所请求的所有工作，对`SQL\
  \ Server`而言是否值得。当你希望数据为应用程序排序时，就可能出现这种情况。`SQL Server`可以使用`ORDER BY`语句对数据进行排序，但让应用程序对这些数据进行排序可能是资源利用的更好方式。如果你决定这是处理数据排序的方式，那么在你的`T-SQL`编码标准中明确规定不应在`SQL\
  \ Server`中对数据进行排序，可能是一个好主意。如果你知道某些特定情况无法避免排序，那么你可以在编码标准中明确说明在`T-SQL`代码中允许使用`ORDER\
  \ BY`的确切场景。\n\n#### Case 语句（Case Statement）\n\n`T-SQL`代码用途广泛。虽然你可能选择将`T-SQL`代码的功能限制在应用程序内，但数据库代码也用于其他目的，例如报告。在许多应用程序中，你可能同时处理事务并允许用户搜索和筛选数据。这类活动可以视为报告活动。通常，用户不希望看到数据的存储方式。例如，你可能有一个包含状态类型的表。一条给定的记录可能随着时间的推移有几个状态。然而，用户可能希望看到一行显示该特定记录的所有状态。这正是你需要使用`Case\
  \ Statement`的地方，以便将多行转换为多个列。执行此类活动并非`T-SQL`纯粹的事务性用途，你可能希望在编码标准中限制此类行为。\n\n#### TRY…\
  \ CATCH\n\n在`T-SQL`代码中包含错误处理会很有帮助，可能被认为是你们工作场所的最佳实践。你希望你的应用程序能够优雅地处理失败的存储过程。你可能会遇到的一种不幸情况是，一个存储过程成为死锁的牺牲品。`TRY…\
  \ CATCH`块可以使该死锁的存储过程能够重新运行或优雅地退出。\n\n```sql\nDECLARE @IngredientID         INT =\
  \ 1;\nDECLARE @ServingPortionID     INT = 1;\nDECLARE @Cost                 DECIMAL(5,2)\
  \ = 5.98\nDECLARE @IsActive             BIT = 1;\nDECLARE @DateCreated         \
  \ DATETIME = GETDATE();\nDECLARE @DateModified         DATETIME = GETDATE();\nBEGIN\
  \ TRY\nBEGIN TRAN\nINSERT INTO dbo.IngredientCost\n(\nIngredientID,\nServingPortionID,\n\
  Cost,\nIsActive,\nDateCreated,\nDateModified\n)\nVALUES\n(\n@IngredientID,\n@ServingPortionID,\n\
  @Cost,\n@IsActive,\n@DateCreated,\n@DateModified\n)\nCOMMIT TRANSACTION\nEND TRY\n\
  BEGIN CATCH\nPRINT 'Insert Failed'\nROLLBACK TRANSACTION\nEND CATCH\n```\n\n一旦你决定了要在`T-SQL`编码标准中包含什么，下一步就是获得将编写`T-SQL`的同事或其他部门的认可。让每个人都同意一套标准可以解决许多问题。首先，它有助于新入职的员工。当他们审查代码时，会看到一致的代码风格。这将使他们能够专注于`T-SQL`在做什么，而不是试图解释`T-SQL`代码是如何编写的。\n\
  \n如果你创建了一个全面且定义良好的编码标准，在脚本审查期间，当出现被认为不是最佳实践的`T-SQL`时，应该会有更少的反复讨论。有了`T-SQL`编码标准，所有相关方都知道什么是允许的，什么代码被认为是不良或不良实践。新员工也会知道哪些`T-SQL`是可以接受的。每个人都可以遵循相同的标准，这让其他人看到编写`T-SQL`的规则是公平的。\n\
  \n#### 概述\n\n编写可管理的`T-SQL`代码是一个值得追求的目标，它建立在可理解、可维护代码的坚实基础之上。第 3 章讨论了如何标准化你的`T-SQL`代码。这在第\
  \ 9 章通过实现`SQL`编码标准的概念得以延续。这个基础的目的是为你的数据库创建一个一致的代码库。虽然开发一致的代码库有助于提高代码质量，但如果你无法维护`T-SQL`代码，这种效果就会减弱。\n\
  \n开发可管理的`T-SQL`代码涵盖了编写数据库代码的许多不同方面。前一章侧重于编码标准，以此作为指导你和他人编写性能良好的`T-SQL`代码的方法。拥有性能良好且易于阅读的数据库代码不仅可以帮助你的应用程序，还可以帮助你的开发过程。该路径的下一步是考虑如何存储你的代码。\n\
  \n一个选择是考虑使用`source control`（源代码管理）来保存与创建各种数据库对象相关的`T-SQL`代码。你可能想知道为什么源代码管理很重要，或者它能如何帮助改进`T-SQL`代码开发。知道你想实施源代码管理与定义管理源代码管理的过程是不同的。建立关于如何处理源代码管理的指导方针，使你处于一个良好的位置，可以开始在源代码管理中创建你的第一个数据库项目。\n\
  \n### 为何使用源代码控制\n\n维护代码涉及多个方面以确保其可维护性。这包括能够找到任何数据库对象的 T-SQL 代码，并知晓你正在修改的是正确的版本。如果修改并部署了错误的\
  \ T-SQL 代码版本，可能会引发严重问题。同时，了解在任何时间点需要部署哪个版本的代码也至关重要。所有这些方面都受益于为你的数据库引入源代码控制。\n\n\
  #### 代码组织与团队协作\n\n将 T-SQL 代码以易于访问的方式集中保存可能是个挑战。源代码控制有助于将你所有的 T-SQL 代码集中、有序地存放一处。虽然你可能认为源代码控制仅适用于软件开发者，但情况已不再如此。让开发团队和数据库管理员协同工作的最简单方法之一，就是采用相似的流程。当你的\
  \ T-SQL 代码保存在源代码控制中时，便有额外的工具可用，通过自动拒绝不符合格式或编码标准的代码，来简化编码和脚本审查过程。\n\n#### 协同工作与变更管理\n\
  \n编写 T-SQL 代码时还可能出现其他问题。多人或团队可能需要修改相同的数据库对象。根据你公司处理部署的方式，最终可能会出现数据库对象叠加了多层更改的情况。源代码控制可以帮助管理这些变更，并确保它们被正确实施。它允许你基于最新的代码进行工作。\n\
  \n#### 本地开发与构建验证\n\n在修改数据库代码时，你可以选择在本地工作。如果你使用 SQL Server Data Tools 并将所有数据库代码保存在同一个项目中，你可以构建你的代码以验证其可执行性。这相比于手动将代码部署到\
  \ SQL Server 更具优势。作为构建过程的一部分，数据库项目会验证你的视图、函数、存储过程或其他自定义对象中的字段是否存在于数据库中。\n\n####\
  \ 获取最新代码版本\n\n对 T-SQL 代码的某些更改可能很复杂，有时你可能在处理关键的数据库对象或代码。开始修改代码前，你需要确保使用的是最新的版本。在使用源代码控制之前，我会从生产环境拉取代码。然而，我正在审查的对象可能自上次生产部署后，已作为某个用户故事的一部分被修改。更糟的是，该代码可能尚未部署到开发环境，或者仍在等待脚本审查。使用源代码控制能让你持续获取到最新的\
  \ T-SQL 代码版本。\n\n#### 迭代修改与集中存储\n\n当你进行更改时，你可能需要一个地方来经历修改、测试并重复这一过程，直到达到预期的输出。源代码控制可以将最近保存的\
  \ T-SQL 代码拉取到你的本地计算机。然后你可以在本地进行修改。准备就绪后，你可以将更改保存到集中位置。这个代码库就成为了你所有数据库变更的权威记录源。\n\
  \n#### 依赖管理与代码重构\n\n如果你将所有数据库保存在同一解决方案中，可以在存在依赖关系的情况下添加数据库间的引用。这样，如果你修改了基础数据库对象，当任何依赖对象不再正常工作时，你会收到提醒。这在添加、删除或重命名列时尤其有用。有时你可能想要重构一个表或其他数据库对象。如果你的应用程序和数据库保存在同一解决方案中，你可以选择自动重构代码。当你的应用程序中直接保存有\
  \ SQL 代码时，这会很有帮助。\n\n#### 变更追踪与代码审查\n\n使用源代码控制的另一个好处是能够快速查找哪些 T-SQL 代码发生了变化。在源代码控制之前，我不得不手动审查整个数据库对象以确认变更。我发现的最佳流程是视觉对比当前生产环境的存储过程与新版本。虽然有一定效果，但很容易遗漏某些内容。我还必须从头到尾审查所有\
  \ T-SQL 代码，以确保理解每一行。\n\n在执行脚本审查前，我会通读相关的用户故事以理解预期功能。我曾倾向于只审查与用户故事明确相关的代码行。在将数据库纳入源代码控制后，我可以轻松查看作为审查一部分而更改的所有代码。这让我能快速看到所有的\
  \ T-SQL 代码修改。在那些不正式鼓励修复技术债务，但开发者在处理影响相同数据库代码的用户故事时有一定自由度去解决它的环境中，这尤其有帮助。\n\n我还可以使用源代码控制将\
  \ T-SQL 代码与之前的版本进行比较。在比较过程中，修改的部分会被高亮显示。更有帮助的是，新增的代码与被修改或删除的代码会用不同颜色高亮。源代码控制的一个缺点是，我不再审查整个脚本。任何未修改的\
  \ T-SQL 代码中存在的原有问题都没有机会得到纠正。这既适用于格式，也适用于编码标准。\n\n#### 部署准备与版本管理\n\n能够访问你的 T-SQL\
  \ 代码使得为部署准备脚本更加容易。源代码控制还有助于防止未经批准的 T-SQL 代码被错误部署。如果没有用于 T-SQL 的源代码控制，准备部署可能很麻烦。我曾与处理部署方式各异的各种公司合作过。我经历过从工单复制脚本并添加到发布页面的部署。我也参与过由开发团队打包和准备\
  \ SQL 脚本的部署。两种方法都可行，但各有其缺点。\n\n对于第一种方法，我曾有一次部署中，同一个存储过程在三个不同的用户故事中被修改。到了部署的时候，开发者和我都不知道应该部署哪个版本。对于第二种方法，实际的部署时间更短，并且有错误日志记录。然而，对于这两种方法，都没有单一的数据库代码可信源。在任何一种情况下，如果我需要撤销几个月前的一次部署，都需要花时间筛选部署脚本来找出回滚所需的\
  \ T-SQL 代码版本。\n\n### 数据库源代码控制：优势与实践\n\n#### 源代码控制的优势\n\n您需要能够访问不同数据库和部署的脚本，同时跟踪随时间的变化。您可能会修改某些应用程序或报表的`T-SQL`代码，而这些代码可能被新版本覆盖。然而，业务方可能决定希望回退到原始代码。当该代码保存在源代码控制中时，搜索特定数据库对象的不同版本并找到特定实例要容易得多。还有其他时候，一个生产问题可能在原始变更部署后好几个版本才被报告出来。在确定了导致错误的特定`T-SQL`代码后，我可能需要向管理层报告该问题随时间产生的影响。借助源代码控制，我可以节省时间，快速找到变更是在何时实施的。\n\
  \n源代码控制的另一个优势是为您提供了一个额外的工具，以帮助进行灾难恢复。如果您丢失了所有硬件和备份，您的业务需要多长时间才能恢复运行？虽然您可能知道需要定期测试备份，但您最近可能没有机会进行测试。根据贵公司制定的灾难恢复计划以及灾难发生时的情况，这可能意味着您将无法访问当前的生产服务器及所有相关数据。如果发生这种不太可能的情况，您可能会发现自己陷入困境，不知如何让应用程序重新运行。作为最后的手段，如果您的数据库与基础表中的必要数据一起处于源代码控制中，您就有机会让公司的系统重新启动并运行。\n\
  \n#### 如何使用源代码控制\n\n在首次实施源代码控制时，我发现的一件事是在实施之前需要进行内部讨论。我发现数据库团队、开发团队和质量保证团队需要就如何管理代码达成一致。其中一些讨论涉及到不同团队的工作方式。在管理数据库代码的方式上存在差异。这可能包括何时使用本地与集中式存储库、如何将更改保存到源代码控制、如何处理已部署的错误，以及数据库代码应包含哪些内容的指南。\n\
  \n在使用源代码控制之前，您可能编写了`T-SQL`脚本并将其保存在本地。在测试`T-SQL`脚本时，您可能在`SQL Server`机器上本地执行了它们。直到这一点，您的大部分工作都是在本地完成的。之后，您可能在这些脚本准备好部署到开发环境时执行了它们。然后，您可能修改了开发环境（一个更集中的位置）中的数据库架构对象。虽然这是编写代码时一个容易开始的地方，但它确实带来了一些风险。如果脚本保存在您的本地机器上，而您的机器损坏了，您可能丢失了与这些脚本相关的所有工作。还存在这样的可能性：当您将代码部署到开发环境时，它破坏了其他地方的功能。此外，如果您和一位同事同时处理同一个数据库对象，您可能会发现您的更改被同事的代码覆盖了。\n\
  \n这正是在本地编写代码然后将这些更改保存到集中式存储库的优势所在。在很大程度上，这就是源代码控制背后的理念。源代码控制允许您在本地机器上处理代码。您可以创建或更改数据库对象，并且当您在本地构建代码时，您有一个额外的检查点，确保数据库项目能够成功构建。一旦您测试并确认了您的数据库代码，就可以将其签入集中式服务器。这个中央存储库可以接收您以及团队中任何其他有权更改此数据库项目的成员的代码变更。这在您的工作环境、同事的工作环境以及所有代码更改的集合之间实现了一定程度的分离。\n\
  \n您使用的源代码控制软件类型将决定您管理和更新`T-SQL`代码的方式。当我刚开始使用数据库的源代码控制时，`Git`还没有成为主要的源代码控制软件。我从`Team\
  \ Foundation Server (TFS)`开始。在我工作的公司，我们通常不处理多个分支。数据库项目是我们第一次实现分支的地方。在实施时，所有开发都属于相同的报告结构和部署周期。\n\
  \n您可以对源代码控制进行更改。每次将这些更改保存到中央存储库时，称为一次`check-in`。在`check-in`代码时，您可以为此次`check-in`添加注释。在我的公司，我们通常会注明用户故事编号以及关于变更内容的简要说明。当您开始处理源代码控制中的代码时，可以让代码自动`checked\
  \ out`。这将使其他人知道您正在更改代码。\n\n\n就像在 `TFS` 中的签到一样，你也可以在 `Git` 中提交代码。这两种操作都会保存对你当前所用分支所做的更改。虽然功能看似相同，但根据你使用的版本控制软件以及与该软件配合使用的工具，它们的工作方式可能有所不同。`Git`\
  \ 和 `GitHub` 允许你在更改被永久提交到仓库之前保存它们。暂存更改是指你保存那些不立即提交到仓库的更改的操作。提交前的暂存更改可以通过命令行完成。\n\
  \n当我们讨论如何管理代码签入和分支时，其设计是基于我们内部的开发流程、脚本审查流程和部署周期。我们希望开发者能够频繁地签入 `T-SQL` 代码，并使这些代码在其开发环境中可用。我们也希望确保数据库管理员在代码部署到\
  \ QA 环境之前有时间进行审查。我们希望确保 QA 团队不会将时间浪费在测试未经批准的 `T-SQL` 代码上。\n\n由于开发和 QA 之间存在这种隔断，我们选择专门为经过脚本审查并获批的代码创建一个分支。作为脚本审查流程的一部分，数据库管理员负责合并代码。这个流程存在一些挑战。尽管所有代码本应在同一个\
  \ Sprint 内部署，但有时项目合并的顺序与它们在开发分支中的创建顺序不一致。这导致文件被覆盖。在团队拆分、开发周期错开之后，所有这些都变得更加难以管理。\n\
  \n随着越来越多的公司希望采用敏捷、看板、Scrum、持续集成或持续交付中的任何组合，拥有一个更灵活的源代码控制解决方案变得越来越重要。这个新解决方案需要允许多个不同的团队同时处理同一代码库，而不会对部署产生负面影响。这正是\
  \ `Git` 流行起来的原因。\n\n使用 `Git` 的理念在于，你可以更好地控制代码合并的方式和时机。在我的公司，每个团队很少与其他团队开发相同的应用程序，因此在代码管理方面的冲突很少。然而，几乎每个应用程序都依赖于共享数据库。此外，数据库团队经常在相同的数据库上工作。不同团队之间也存在不同的部署周期。这正是你可以看到\
  \ `Git` 强大之处的地方。\n\n不幸的是，使用源代码控制仍然存在挑战。这些挑战对于 `TFS`、`Git` 或任何其他版本控制软件都存在。使用版本控制在历史上并非数据专业人士的常见做法。虽然做出这种改变有其好处，但在使用和管理源代码控制方面也存在学习曲线。正如许多事情一样，顺利的情况工作良好，但当涉及到更复杂的场景时，源代码控制可能会变得让人难以招架。\n\
  \n`Git` 中有些功能需要比使用 `TFS` 更多的培训。正是这些功能使得 `Git` 的源代码控制更加灵活。因此，虽然增强的功能很好，但它也会使软件的使用更加复杂。有一个主仓库，可以在其中保存一组代码。如果你使用\
  \ `SQL Server Data Tools`，你可以选择是每个数据库项目拥有自己的仓库，所有数据库共享同一个仓库，还是所有应用程序和数据库共享同一个仓库。这些决策不仅基于偏好和期望的功能。正如你将在第\
  \ 12 章看到的，你组织仓库的方式也将决定你的代码如何部署。\n\n在仓库内部，存在一个或多个分支的概念。应该有一个主分支。可以把它想象成，如果你需要部署这些更改，你会定期去查看哪一组代码。这个分支被称为\
  \ `master`。任何时候你想对 `master` 分支进行更改，通常最好创建一个新分支来编写你的 `T-SQL` 代码。这样可以确保主分支不受正在开发且尚未准备好部署的代码影响。通过这种方式，`master`\
  \ 分支可以与当前部署到生产环境的代码保持一致。\n\n当你创建一个分支时，它会获取当前仓库的一个副本。你可以使用这个副本并进行任何必要的更改。使用 `Git`\
  \ 时，你可以决定每个人都在自己的分支上工作。这有助于每个人独立开发代码，而不受他人代码的影响。虽然这对于开发和测试特定功能是一个好处，但这同时也是源代码控制可能变得复杂的地方。\n\
  \n由于这些签入是按分支发生的，你可能会遇到需要在同一个部署中部署两个不同分支的情况。这时你会希望尝试合并这些代码。为了将这些代码合并在一起，你需要获取分支中的更改，并将这些更改添加回\
  \ `master` 分支。将一个功能分支合并到 `master` 分支的操作称为 `merge`。作为这个 `merge` 过程的一部分可能发生的一个方面称为冲突。当许多人在同一时间段内处理同一个数据库对象，或者之前的功能分支与\
  \ `master` 分支的合并被延迟时，就可能发生冲突。请务必与你的开发团队合作，以更好地理解如何避免合并冲突以及如何解决它们。\n\n一件发生得比我们有些人愿意承认的更频繁的事情是，代码部署后未能按预期工作。我遇到过在部署期间就发现那些缺陷的情况。其他时候，这些缺陷直到部署后几天、几周或几个月才被发现。无论哪种情况，关键是要找出如何快速将数据库恢复到功能更佳的状态。我曾与开发人员和\
  \ QA 讨论过在部署当晚如何处理这个问题。缺陷可以通过 `T-SQL` 脚本来手动修复。根据你管理数据库代码部署的方式，这个缺陷修复有可能在未来的部署中被撤销。如果你将缺陷修复放入源代码控制，你可以确保这个修复在将来不会被撤销。\n\
  \n\n#### 回滚策略与热修复方法\n\n因此，我们决定采用所谓的“前滚”策略。如果我们能快速找到并解决问题，那么我们会将这些更改签入源代码管理，并通过各个环境部署上去。这种前滚策略只允许在部署当晚采用。当我们采用该策略时，其概念是部署所有已合并到主分支的代码。如果你选择部署的数据库项目版本不是最新版本，你将无法使用此方法。\n\
  \n我们还采用了一种使用热修复的方法。这些是由于应用程序功能严重缺失而需要尽快进行的更改。由于开发中可能存在各种项目，我们不能直接部署最新的数据库代码。在这些情况下，我仍然会将修改后的`T-SQL`代码签入源代码管理。该代码可能已部署到开发环境并在我们的`QA`环境中测试过，但代码将手动部署到生产环境。其概念是下次部署数据库代码时，该数据库对象将已经存在。\n\
  \n设计如何保存数据库代码还涉及与开发、`QA`和发布管理团队的沟通。现有的各种方法各有优缺点。你可以将所有数据库项目与所有应用程序代码保存在同一个解决方案中。虽然这可能会使你的项目构建时间更长，但如果创建了正确的关系，你可以确保数据库的更改不会影响应用程序的功能。根据公司中存在的应用程序数量，这可能是一项艰巨的任务。也可以选择将所有数据库保存在同一个解决方案中。如果你有跨数据库依赖关系，此方法将有助于保护你的数据库。当你对一个数据库对象进行更改，并且不确定这些更改是否会破坏另一个数据库的功能时，这尤其有用。最后一个选项是每个数据库创建一个解决方案。此方法的优点是可以独立开发每个数据库。缺点是，你可能对数据库所做的更改会破坏另一个数据库的功能。\n\
  \n在将第一个数据库置于源代码管理之前，我建议与公司的其他团队讨论本节中的主题。你需要确保在编写、测试和保存数据库代码更改方面，每个人都达成一致。在如何修复已部署的数据库代码方面，也要让其他人参与进来。同时考虑你希望你的数据库项目之间以及它们与你的应用程序如何交互。一旦你考虑了所有这些因素，就可以创建数据库项目了。\n\
  \n#### 设置源代码管理\n\n既然你已决定为数据库实施源代码管理，并且已经就如何设置数据库项目制定了一些通用准则，那么你现在可以设置源代码管理了。首先要做的是让你使用的`IDE`连接到源代码管理。连接到版本控制后，你需要创建一种方式来存储数据库的源代码管理。在有了数据库源代码管理的位置后，你需要弄清楚如何制作和保存数据库代码的更改。\n\
  \n在本节中，我将使用`Visual Studio 2017`、`SQL Server Data Tools`、`Git`和`GitHub`将数据库纳入源代码管理。如果你使用的是`Visual\
  \ Studio 2015`或`2017`，你将无需任何额外步骤即可连接到`TFS`。如果你想在这两个版本的`Visual Studio`中使用`Git`和`GitHub`，则需要手动安装`GitHub`扩展。截至本文撰写时，以下`URL`可以指导你完成此过程：`https://social.technet.microsoft.com/wiki/contents/articles/38935.visual-studio-2017-install-and-use-GitHub-extension.aspx`。你可以通过使用团队资源管理器将`Visual\
  \ Studio`连接到版本控制，如图`10-1`所示。\n\n![`../images/480547_1_En_10_Chapter/480547_1_En_10_Fig1_HTML.jpg`](img/480547_1_En_10_Fig1_HTML.jpg)\n\
