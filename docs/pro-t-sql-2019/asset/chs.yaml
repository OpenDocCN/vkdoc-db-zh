- '# 第一部分 构建易于理解的 T-SQL


  ## 1. 数据类型


  数据类型是构建高效、高性能 `T-SQL` 的基础构件。虽然许多数据类型要么是数字，要么是字符串，但也存在多种不属于这两类的数据类型。选择正确的数据类型时，理解数据类型是什么以及何时使用它至关重要。


  ### 数字数据类型


  尽管数字看起来可能都一样，但 `T-SQL` 将数字划分为不同类型的数据类型。这些数据类型可以包括整数或带小数点的数字。数字也根据精确或近似进行分类。在执行数学计算时，了解如何处理各种数字数据类型对于确保应用程序按预期处理数据至关重要。


  虽然从每个类别中选择最常见的数据类型可能最简单，但在某些特定情况下，最好分析将要存储的数据并选择更合适的选项。选择数据类型时，需要考虑多种因素。最重要的一步是弄清楚将存储什么类型的数据。接下来逻辑上的步骤是考虑数据将如何使用和存储。此外，理解
  `T-SQL` 如何处理涉及各种数据类型的计算也很重要。


  #### 精确数字数据类型


  有些情况下，数字的值是确定且已知的。这类数字可称为精确数字。一些例子包括真或假、销售 units 数量、折扣百分比或美元和美分。编写优质 `T-SQL` 的关键之一是为给定字段选择正确的数据类型类别。在某些情况下，某个类别有多个可用的数据类型。


  在考虑使用何种数据类型时，您需要思考该数据类型的用途。这将有助于在确定应使用哪种数据类型时提供更清晰的思路。您需要考虑与每种数据类型相关的优点和缺点。您还需要考虑
  `SQL Server` 是否必须因为此数据类型与其他数据类型在计算中使用而执行任何隐式转换。最后要考虑的是该数据类型在 `SQL Server` 中的存储方式。



  ##### BIT


  `BIT`数据类型源自短语“二进制数字”。因此，`BIT`数据类型只能存储两个值之一。在 SQL Server 的情况下，还有第三个选项与未知值相关。这第三个选项被称为`NULL`。因此，`BIT`数据类型唯一允许的值是`0`、`1`和`NULL`。这导致`BIT`数据类型只能使用最小的一组可用值。


  `BIT`数据类型非常适用于“非此即彼”适用的数据类型。存储的信息可以是真或假、开或关、是或否。在真或假的情况下，`BIT`类型可用于指示数据记录是否已成功转换。使用`BIT`数据类型指示开或关的常见用途涉及指示某个特定功能是否已启用。一个表示是或否值的例子是记录客户选择是否接收公司的营销信息。


  使用`BIT`数据类型的一个挑战是确保以促进良好数据库设计的方式使用它们。这意味着有时在选择`BIT`数据类型时需要考虑整体目的。例如，指示某项是否具有特定特征似乎可能是`BIT`数据类型的一个好用途。一个例子可能是表中像`IsVegetarian`这样的列。然而，重新设计数据库以在另一个表中记录这些属性可能更好。`BIT`可用于指示事务的成功状态。然而，通常有更多的状态需要记录一段时间内事务的状态。如果随时间记录状态变化很重要，那么使用`BIT`来记录事务是否成功可能不是最佳选择。


  `BIT`数据类型的一个优点是数据库中保存`BIT`值所需的总存储空间。由于一个字节中有 8 位，这在数据库记录存储中同样适用。表中每 8 个`BIT`列，其值都存储在一个字节中。如果表中有
  9 到 16 个`BIT`列，所有`BIT`值将总共存储在 2 个字节中。所需存储空间如此之少，这意味着一个包含多达 8 个`BIT`列和 100 万条记录的表在数据库中仅使用
  1MB 的空间。


  ##### TINYINT, SMALLINT, INT, BIGINT


  SQL Server 还允许你存储整数，即没有小数或分数值的数字。这些数字被称为整数。以整数存储的数据的一个例子是给定项目的数量。SQL Server 中可以存储几种类型的整数值。第一种整数类型是`TINYINT`。`TINYINT`值可以包含
  0 到 255 之间的任何整数值。由于此数据类型的大小有限，它可能对有限的配置类型或位置数量有用。此数据类型类似于`BIT`数据类型，但其范围稍宽。此数据类型也可用于配置系统中的状态类型或对象类别。`TINYINT`非常适合存储这些状态类型，因为许多应用程序不需要超过
  256 种状态。


  既然我们已经介绍了`TINYINT`，让我们讨论一下`SMALLINT`的可能性。`SMALLINT`的范围涵盖大约 70,000 个可能的值。有了这个可用范围，你需要考虑在
  256 到 65,435 个唯一值之间你想要存储什么样的值。`SMALLINT`的范围从`-32,768`开始，到`32,767`结束。这种数据类型对于记录每一次活动的日志表来说并不实用。许多数据库或数据表在几年的时间里可能有超过
  70,000 条事务或记录。这可能导致此数据类型不适用于这些表。然而，也可能有其他表非常适合`SMALLINT`数据类型。


  如果你的数据表事务活动不高，但会在一段时间内增长，那么`SMALLINT`数据类型可能有益。了解你的业务将帮助你确定`SMALLINT`是否是存储该值的正确数据类型。


  如果你要创建一个表来持续为应用程序添加功能，你可能希望存储一条记录，指示向应用程序添加的每个新功能。一个例子是功能标志。你的应用程序在其生命周期内很可能会有超过
  256 个增强功能。你可能还想存储应用程序的配置值。在表中存储这些配置值可能会受益于`SMALLINT`数据类型。


  接下来是整数或`INT`。这是整数数据类型最常用的。许多数据库专门使用这种数字来跟踪任何类型的整数。其中一个原因是其整个范围涵盖了大约 54 亿条记录。`INT`数据类型的范围从`-2,147,483,648`到`2,147,483,647`。然而，当创建许多数据表时，它们的标识列通常从整数`1`开始，或称为种子。这导致表被限制为大约
  21.5 亿个唯一标识。如果你认为你的表将需要超过 21.5 亿个唯一标识记录，你可能希望从可能的最小数字`-2,147,483,648`开始标识。


  这通常是你需要执行一些数学计算的地方。一些企业每秒处理几百笔交易。其他企业每秒处理高达 10,000 或 20,000 笔交易。在这两种情况下，考虑持有此事务信息的表预期将有什么样的增长都很重要。如果你的应用程序在几年内每秒有数百笔交易，那么存储的记录数量将比应用程序在相同时间段内每秒有数万笔交易要少得多。


  ##### DECIMAL/NUMERIC


  既然我们已经讨论了各种整数，我们应该考虑如何处理需要小数的数字。在某些情况下，你会需要小数位。其中一些情况涉及使用美元和美分，其他时候你需要小数位来进行精确测量。这些场景中有几个选项可用。


  首先有`DECIMAL`选项，或者也称为`NUMERIC`数据类型。此值不保存任何货币信息；但是，它会记录小数位。这些小数位可以通过指明应存储的总位数和小数点右边的位数来指定。你会发现`DECIMAL`或`NUMERIC`数据类型对于几乎所有涉及数字的数据类型都是可接受的。这包括通用数字、小数、测量值和货币值。


  考虑到`DECIMAL`类型可以表示多种不同类型的数字，我们应该更仔细地研究这种数据类型。`DECIMAL`和`NUMERIC`之间没有区别。它们在 SQL Server
  中是相同的数据类型。`DECIMAL`数据类型有一些特定的术语。构成`DECIMAL`数据类型的值是精度和小数位数。精度与`DECIMAL`数据类型中保存的总位数相关。小数位数是指存储在小数点右边的位数。



  ##### SMALLMONEY, MONEY


  接下来讨论的数据类型是`MONEY`和`SMALLMONEY`。`MONEY`与`SMALLMONEY`数据类型类似于`DECIMAL`或`NUMERIC`数据类型。`SMALLMONEY`和`MONEY`数据类型同样可用于存储货币值。SQL
  Server 会保存数值，但会忽略与该值关联的具体货币种类。


  `MONEY`与`SMALLMONEY`数据类型最主要的区别在于数值范围和存储空间。`SMALLMONEY`数据类型的范围是从 -214,000 到 +214,000，仅占用
  4 字节存储空间；而`MONEY`数据类型的范围是从 -9220 亿 到 +9220 亿，占用 8 字节存储空间。


  `MONEY`数据类型最多可精确存储四位小数。小数点位数的限制会影响所存储货币值的精度，其精度只能达到万分之一。`MONEY`数据类型会将所有值都保存到四位小数。这种固定的小数点位数会影响涉及`MONEY`数据类型的计算中的舍入方式。


  #### 近似数值数据类型


  接下来，我们将讨论精确数与近似数之间的区别。精确数用于你确知其确切数量的事物，例如你在商店购买了多少件商品，或者精确到美元和美分的金额。而近似数则用于测量可能不精确的场景。近似数可用于存储非常大或非常小的数字。你可能还会发现你的应用程序正在记录一个不精确的测量值。例如，你剪下一块长度接近但并非完全等于特定值的布料。布料的长度可能在
  12 英寸左右。存储值 12（英寸）就是一个近似值。这个 12 英寸的测量值可能如此接近，以至于很难判断布料的实际长度并非精确的 12 英寸。


  处理近似数时会出现一些舍入问题。这是因为近似数本身已知就不是精确的测量值。在 SQL Server 中，近似数有一种对应的数据类型。这种数据类型称为`FLOAT`。如果浮点数有
  24 位有效数字，其同义的数据类型是`REAL`。


  使用`REAL`或`FLOAT`类型时，将此数据类型转换为其他数据类型可能会出现问题。将`FLOAT`数据类型转换为`INTEGER`时，小数点后的所有值都将被截断。你需要意识到，使用近似数可能会导致意外结果。一个例子是在使用`DECIMAL`或`NUMERIC`数据类型时。将`FLOAT`或`REAL`数字转换为`DECIMAL`或`NUMERIC`数据类型时，最多只能保留七位小数。


  #### 转换数值数据类型


  我们已经介绍了可用的数值类型，以及使用各种数值数据类型时会发生什么。除了存储数字，你还需要了解各种数值数据类型之间如何相互作用。首先，我们应该考虑当使用相同数据类型的字段进行计算时会发生什么。在这些场景中，如果计算涉及的所有字段都是相同的数据类型，那么结果的数据类型将保持不变。因此，如果你将“数量”乘以“价格”，并且两个值都存储为`DECIMAL(5,2)`类型的`NUMERIC`数据类型，那么结果将给出相同`DECIMAL`数据类型。SQL
  Server 将根据起始精度和小数位数以及所执行计算的类型来确定结果的精度和小数位数。你还需要考虑精度和小数位数在应用程序中的使用方式。应用程序可能期望接收一个`DECIMAL(5,2)`的值。根据所执行计算的不同，返回的数据值可能超出指定数据类型的范围，这可能导致计算溢出。


  当跨各种数据类型进行操作时，情况会变得更有趣一些。再次以“数量”乘以“价格”为例，我们可以检查如果你有一个`INT`数据类型与一个`DECIMAL(5,2)`数据类型进行计算会发生什么。SQL
  Server 将使用数据类型优先级的规则。首先，我们应该熟悉到目前为止所涵盖的数据类型的数据类型优先级顺序。以下列表按从高到低的顺序排列：


  1.  `FLOAT`

  2.  `REAL`

  3.  `DECIMAL`

  4.  `MONEY`

  5.  `SMALLMONEY`

  6.  `MONEY`

  7.  `BIGINT`

  8.  `INT`

  9.  `SMALLINT`

  10. `TINYINT`

  11. `BIT`


  在前面的场景中，我们同时使用了`INT`和`DECIMAL`数据类型。如你所见，`INT`和`DECIMAL`数据类型都在列表中。对于`INT`和`DECIMAL`数据类型，`INT`的优先级较低。由于优先级规则，SQL
  Server 将在内部将`INT`数据类型转换为`DECIMAL`数据类型。此转换不会更改原始数据值，只更改 SQL Server 如何将此值用作计算的一部分。转换完成后，SQL
  Server 将继续进行计算。这通常效果很好，除非你执行诸如尝试连接数字和字符串数据类型的操作。


  #### 字符串数据类型


  既然你知道了如何使用数值数据类型，我们应该花些时间了解各种字符串数据类型。这类数据类型用于存储字母、单词或字母与数字的组合。此外，字符串数据类型用于存储非 Unicode
  或 Unicode 的字符值。字符串数据类型的最后一个类别包括图像和二进制值。


  #### 字符串数据类型


  数据库中存储的信息并非都与数字直接相关。这些数据可以是名称、描述、地址或其他字符值。决定使用哪种数据类型将取决于所存储信息的类型以及需要存储的信息量。




  ##### CHAR 和 VARCHAR


  可用的两种字符串数据类型是 `CHAR` 和 `VARCHAR`。这些数据类型相似，仅在特定考虑上有所不同。可以配置数据字段以决定数据如何存储。可以配置列以切换大小写敏感性、重音敏感性、假名敏感性或宽度敏感性。所存储的敏感性称为排序规则。可存储的数据类型通常与数据库排序规则匹配。除非有特定覆盖设置，否则列的排序规则与数据库相同。两种数据类型都用于存储文本数据，这些字段中可存储的字符与列的排序规则所允许的字符相同。


  在决定使用哪种数据类型时，需要记住将存储的数据种类。如果数据长度相似，例如电话号码或邮政编码，那么 `CHAR` 可能是首选数据类型。但是，如果列宽度差异很大，例如地址行或备注列，那么
  `VARCHAR` 将是更好的选择。考虑将 `VARCHAR(MAX)` 的使用限制在你预计要保存超过 8000 个字符的情况。如果指定了 `VARCHAR(MAX)`，则最大存储大小为
  2 GB。


  在使用 `CHAR` 和 `VARCHAR` 时，还有一些额外的注意事项需要牢记。当使用 `CHAR` 和 `VARCHAR` 进行数据定义或变量声明时，请记住默认值是一个字符。但是，在使用
  `CAST` 或 `CONVERT` 函数时，默认字符数将是 30。为了最大程度地减少数据截断，在使用 `CHAR` 或 `VARCHAR` 数据类型时，请确保始终显式指定字符数。


  对于使用单字节编码字符（如 Latin）的排序规则，`CHAR` 的存储大小（以字节为单位）等于字符数。在使用 `VARCHAR` 时，字符数加上 2 个额外字节等于存储的总字节数。也可以在
  `CHAR` 和 `VARCHAR` 数据类型中保存多字节编码字符。对于这两种数据类型，保存的字符数可能小于总字节数。


  从 SQL Server 2019 开始，现在可以将 Unicode 值保存在 `CHAR` 或 `VARCHAR` 中。但是，这仅在启用 UTF-8 编码时才可能。


  ##### TEXT


  `TEXT` 数据类型以前在需要存储非常大的字符串时使用。但是，此数据类型已弃用。由于此数据类型已弃用，在新的开发中应避免使用 `TEXT` 数据类型。如果需要使用
  `TEXT` 数据，对于新的开发，应考虑使用数据类型 `VARCHAR(MAX)`。但是，请考虑你是否需要此功能，或者使用字符数较少的 `VARCHAR` 是否更合适。未来使用
  `TEXT` 数据类型的唯一考虑应该是为了应用程序的向后兼容性。`TEXT` 数据类型主要用于处理可变长度的非常大的字符串的情况。在许多情况下，这是指保存的数据长度超过
  8000 个字符的情况。可以保存到 `TEXT` 数据类型的最大字符数是 2,147,483,647。在某些情况下，可存储的总字符数可能小于此数字。


  #### Unicode 字符串数据类型


  在 SQL Server 2019 之前，任何 Unicode 文本数据都需要保存为特殊数据类型。在无法启用 UTF-8 编码的情况下，这仍然是正确的。


  ##### NCHAR 和 NVARCHAR


  使用 Unicode 值时，有几种可用选项。这些选项包括存储固定长度或可变长度的字符串。为了避免意外结果，如果未指定字符数或排序规则，你应该了解这些数据类型的工作原理。


  一旦确定需要使用 `NCHAR` 或 `NVARCHAR` 数据类型，选择它们就变得容易了。如果要存储的数据长度大致相似，那么 `NCHAR` 数据类型是正确的选择。但是，如果存储的值差异很大，那么
  `NVARCHAR` 数据类型可能是更好的选择。此外，如果要存储的字符数超过 4000，建议使用 `NVARCHAR(MAX)`。


  通常，在声明 `NCHAR` 或 `NVARCHAR` 数据类型时，指定字符数是最佳实践。对于数据定义或变量声明，`NCHAR` 或 `NVARCHAR` 的默认字符数是一个字符。但是，在使用
  `CAST` 或 `CONVERT` 函数时，如果未指定字符数，则默认为 30。如果未为 `NCHAR` 或 `NVARCHAR` 数据类型指定排序规则，将使用默认的数据库排序规则。


  了解存储此数据类型所需的空间量也可以让你更好地判断这是否是正确的数据类型以及需要存储的字符数。存储 `NCHAR` 占用的字节数是字节对字符串长度的两倍，而使用
  `NVARCHAR` 时，存储的字节数是字节对字符串长度的两倍加 2 字节。


  ##### NTEXT


  以前，使用 `NTEXT` 数据类型来存储非常大的可变长度 Unicode 数据。如果此数据类型仍在你的系统中使用，你可以期望它存储多达 1,073,741,823
  个字符。但是，由于 Unicode 值相关的大小，存储的总长度可能较小。展望未来，使用此数据类型不再是最佳实践。相反，请使用 `NVARCHAR(MAX)` 数据类型。


  #### 二进制字符串数据类型


  有时，你可能希望存储既不是数字也不是字符的数据。在这些情况下，使用二进制字符串可能是合适的。使用二进制字符串数据类型时有几种选择。


  ##### BINARY 和 VARBINARY


  可用于存储二进制字符串数据的选项涉及存储固定长度或可变长度的字符串。与讨论的其他字符串数据类型类似，处理这些数据类型时也有一些考虑因素。


  使用二进制字符串来存储没有字符的字符串项目可能很有用。这些可以包括音频、视频、图像或其他类似项目。可用的数据类型中有两种是 `BINARY` 和 `VARBINARY`。存储长度相似的二进制字符串的最佳选项是
  `BINARY` 数据类型。相反，当存储长度差异显著的二进制字符串时，`VARBINARY` 数据类型是更好的选择。如果二进制字符串的总长度预计超过 4000
  个字符，则建议使用 `VARBINARY(MAX)`。


  使用 `BINARY` 和 `VARBINARY` 数据类型进行数据定义或变量声明时，如果未指定字符数，则默认长度为一。当使用 `CAST` 或 `CONVERT`
  函数将 `BINARY` 转换为 `VARBINARY` 时，默认字符数将为 30。当从具有不同长度的变量转换为 `BINARY` 或 `VARBINARY`
  时要小心，因为 SQL Server 可能会根据需要填充或截断二进制数据。


  `BINARY` 数据类型存储的字节数与要存储的数据长度相同，而 `VARBINARY` 使用 2 字节加上要存储的数据长度的相同字节数。两种数据类型的长度最多可达
  8000。对于 `VARBINARY(MAX)`，最大存储大小为 2 GB。


  ##### IMAGE


  可以存储在二进制字符串中的项目之一是图像。处理图像时，重要的是考虑应如何存储这些数据，如果存储，应使用什么数据类型。


  此 `IMAGE` 数据类型以前用于存储大型可变长度二进制数据。虽然此数据类型长度可达 2,147,483,647，但有时允许的存储长度可能较小。对于 `IMAGE`
  数据类型，你应该在未来使用 `VARBINARY(MAX)` 数据类型，因为 `IMAGE` 数据类型已弃用。



  ### 日期和时间数据类型


  每个数据库事务都发生在特定的时间点。可能需要参考或知道事务发生的时间。您的应用程序可能需要记录个人的重要日期，例如生日或纪念日。日期和时间也可用于确定定价和功能。通过使用日期和时间，您可以确定功能应何时启用或禁用。日期和时间还可以显示用户帐户何时非活动，或对给定系统的访问权限何时启用或过期。定价和计费费率可能涵盖多个不同的日期范围。当一组定价失效时，另一组可能生效。由于法规要求，您的公司可能需要记录一段时间内的定价信息。这包括指出定价费率何时开始和停止。根据跟踪此信息的目的，您可能只需要知道事务发生的日期或时间。在其他情况下，最好同时知道与某个操作相关的日期和时间。


  #### DATE


  在处理事务时，可能存在特定情况需要记录某事发生的时间。在某些情况下，只需关心事务发生的日期。`DATE`数据类型也可用于存储特定日期的汇总数据。在记录活动日期时，关于如何显示该数据也可能有一些可用选项。在选择`DATE`数据类型是否适合您时，不仅要考虑为`DATE`数据类型存储多少数据，还要考虑数据存储方式可能存在的限制，这一点很重要。


  有时，应用程序或用户需要知道特定操作发生的时间。在决定`DATE`数据类型是否是正确选择时，您需要考虑用户和应用程序两方面对信息的需求。在某些情况下，考虑何时**不**使用`DATE`数据类型更容易。对于任何需要知道某事发生具体时间的操作，`DATE`数据类型都不是一个好的选择。但是，如果只需要知道操作发生的日期，那么`DATE`数据类型将是一个很好的选项。


  对于`DATE`数据类型，关于如何显示`DATE`有几种选项。日期格式默认为`YYYY-MM-DD`。其中`YYYY`表示四位数年份，范围为 0001 到 9999。`MM`表示月份编号，范围从
  01 到 12，`DD`表示日期，范围从 01 到 31（根据每月天数而定）。`DATE`可以以多种数字和字母格式显示。但是，不支持`ydm`格式。


  可存储的`DATE`值范围从 0001-01-01 到 9999-12-31。`DATE`数据类型具有 10 个字符的长度，精度为 10，小数位数为 0。`DATE`数据类型占用
  3 个字节，并作为`INT`存储。


  日期可以转换为`DATETIME`、`SMALLDATETIME`、`DATETIME2`或`DATETIMEOFFSET`。但是，时间值将被设置为午夜。然而，日期不能转换为`TIME`数据类型，任何尝试执行此转换的操作都将失败并报错。此外，日期没有时区偏移，也不感知夏令时。


  #### TIME


  另一个与操作发生时间相关的数据类型是`TIME`数据类型。了解时间的存储和格式非常重要。使用`TIME`数据类型时，了解将其转换为其他`DATE`和`DATETIME`数据类型的影响很有帮助。使用`TIME`数据类型也存在一些限制。


  `TIME`可用于记录事务或活动发生的具体时间。此时，时间独立于日期记录，未来可能无法确定日期。解决此问题的一种方法可能是将日期与时间分开存储。`TIME`的精度最高可达
  100 纳秒，`TIME`的默认值为 00:00:00。


  `TIME`的默认格式为`hh:mm:ss[.nnnnnnn]`。在此格式中，`hh`表示两位数小时，范围从 0 到 23；`mm`表示两位数分钟，范围从 0
  到 59；`ss`表示两位数秒，范围从 0 到 59。`TIME`数据类型允许不同的精度，如果指定，小数秒最多可使用七位数，由`nnnnnnn`表示。这些值的范围可以从
  0 到 9999999。


  由于`AM`和`PM`用于区分上午和下午，在使用`TIME`时需要额外注意。如果未提供`AM`或`PM`，且小时值在 00 到 11 之间，则时间将被记录为`AM`。对于
  12 到 23 点，时间将被保存为`PM`。写入`TIME`时，如果输入 12 `AM`，此值将被转换为 0 时。


  `TIME`的范围是 00:00:00.0000000 到 23:59:59.9999999。字符长度可以是 8 到 16 位数字，具体取决于为`TIME`指定的精度。无论哪种情况，`TIME`都将保存为固定的
  5 个字节。如果`TIME`转换为任何包含日期和时间的数据类型，日期值将表示为 1900-01-01。如果`TIME`的小数精度高于新数据类型，则值将被截断。任何将`TIME`数据类型转换为`DATE`的尝试都将失败。与`DATE`一样，`TIME`既不感知时区，也不感知夏令时。



  #### SMALLDATETIME、DATETIME、DATETIME2、DATETIMEOFFSET


  有些情况下，仅保存日期或时间可能不够。对于这些场景，最好将日期和时间值组合在一起。有时这些值可能相对简单，有时需要更高的精度，或者需要感知时区。


  其中一种数据类型是 `SMALLDATETIME`。该数据类型用于记录具体的日期和时间。其默认值为 `1900-01-01 00:00:00`。虽然该数据类型的精度列为
  1 秒，但需注意秒部分在数据库中始终保存为 00。


  与 `date` 数据类型类似，`SMALLDATETIME` 数据类型可以多种数字和字母格式显示。与其他 `DATE` 和 `DATETIME` 数据类型相比，`SMALLDATETIME`
  的范围有所限制。该数据类型的日期部分范围可从 `1900-01-01` 到 `2079-06-06`。虽然输入的时间范围可从 `00:00:00` 到 `23:59:59`，但在数据库中保存的值将是
  `00:00:00` 到 `23:59:00`。`SMALLDATETIME` 的总长度最多为 19 个字符，所需存储大小为固定的 4 字节。


  当将 `SMALLDATETIME` 转换为其他 `DATETIME` 数据类型时，请记住任何额外的精度都将记录为 0。虽然使用 `SMALLDATETIME`
  可能很诱人，但该数据类型不符合 ANSI 标准。如前所述，该数据类型的秒数将根据传递的秒数值进行四舍五入。如果传递的秒数小于或等于 29.998，分钟将向下舍入。否则，分钟将向上舍入。与
  `date` 和 `time` 数据类型类似，`SMALLDATETIME` 也不感知时区或夏令时。


  可用的选项不仅仅只有 `SMALLDATETIME`。`DATETIME` 一直提供比前述数据类型更高精度的选项。使用此数据类型时，也有几个关键的注意事项。


  虽然 `DATETIME` 数据类型可以记录具体的日期和时间，但它可能不符合 SQL 标准。此数据类型的一个关键问题与精度相关的限制有关。`DATETIME`
  数据类型可以记录小数秒的三位小数；第三位小数总是四舍五入到以 `.000`、`.003` 或 `.007` 结尾的增量。


  如果未指定值，`DATETIME` 的默认值为 `1900-01-01 00:00:00`。使用此数据类型时，有多种数字和字母格式可用。`DATETIME` 的年份范围是
  `1753-01-01` 到 `2999-12-31`，时间范围可从 `00:00:00.000` 到 `23:59:59.997`。此数据类型的大小为 8 字节，字符长度范围从
  19 到 26。


  虽然可以将其他数据类型转换为 `DATETIME`，但不建议这样做，因为此数据类型不符合 SQL 标准，也不符合 ANSI 标准。`DATETIME` 数据类型也因发生的四舍五入而受限，只允许
  `.000`、`.003` 和 `.007` 的增量。此数据类型也不感知时区或夏令时。


  `DATETIME2` 数据类型比前面提到的数据类型具有一些额外优势。虽然前面提到的一些数据类型具有固定大小，但此数据类型的工作方式略有不同。我们还将了解此数据类型的存储和可用格式。


  `DATETIME2` 数据类型允许记录具体的日期和时间，精度高达 100 纳秒。`DATETIME2` 的默认值为 `1900-01-01 00:00:00`。由于这种精度水平，对于需要精确到小数秒的场景，这是一个很好的数据类型。由于
  `DATETIME2` 没有与 `DATETIME` 相同的四舍五入问题，在编写代码时使用此数据类型也更直接。


  `DATETIME2` 数据类型支持多种数字和字母方式来显示信息。`DATETIME2` 的日期范围从 `1753-01-01` 到 `2999-12-31`，时间范围从
  `00:00:00` 到 `23:59:59.9999999`。允许多种精度选项，因此字符长度从精度到秒的 19 一直增加到精度到 0.0000001 纳秒的
  27。


  精度的变化也会影响 `DATETIME2` 数据类型的存储大小。使用一个字节来存储 `DATETIME2` 的精度，再加上根据时间精度所需的字节数。如果精度小于纳秒的三位小数，则另外使用
  6 个字节来存储 `DATETIME2` 值。如果精度为 3 或 4，则使用 1 个字节存储精度，7 个字节存储值，总共 8 字节。但是，对于精度超过四位小数的任何值，总数将为
  9 字节。


  由于高度的准确性，将值转换为 `DATETIME2` 的可能性很大。如果日期转换为 `DATETIME2`，时间组件将记录为 `00:00:00`。如果时间转换为
  `DATETIME2`，日期将是 `1900-01-01`。对于从 `SMALLDATETIME` 转换为 `DATETIME2`，日期和时间将被复制。任何额外的精度将用
  0 表示。从 `DATETIMEOFFSET` 转换为 `DATETIME2` 将导致时区被截断。当从 `DATETIME` 转换为 `DATETIME2` 时，请确保使用显式转换以避免意外结果。使用
  `DATETIME2` 的主要限制是该数据类型不感知时区或夏令时。


  最后一个用于日期和时间的数据类型是 `DATETIMEOFFSET`。在讨论 `DATETIMEOFFSET` 时，有一些之前在其他数据类型中未见过的额外功能。在格式化、存储或转换到此数据类型时，也有一些需要注意的事项。


  `DATETIMEOFFSET` 数据类型记录已发生的事务或操作的具体日期和时间，具有高精度。此数据类型的关键优势之一是能够对时间进行偏移，从而使来自多个地理位置的数据库不仅可以感知某事相对于其本地时间的发生时间，还可以感知相对于另一位置本地时间的发生时间。


  `DATETIMEOFFSET` 的精度为 100 纳秒，默认值为 `1900-01-01 00:00:00`。`DATETIMEOFFSET` 的格式为 `YYYY-MM-DD
  hh:mm:ss.nnnnnnn +|– hh:mm`。此数据类型的 `+|– hh:mm` 部分与偏移量相关。给定时间的偏移量范围可以从 +14 到 –14
  小时。与其他时间和 `DATETIME` 数据类型一样，此日期可以数字或字母格式格式化或显示。


  日期范围可以从 `0001-01-01` 到 `2999-12-31`。可保存的时间范围从 `00:00:00` 到 `23:59:59.9999999`。当精度保存为
  `YYYY-MM-DD hh:mm:ss {+|–} hh:mm` 时，字符长度为 26。当精度为 `YYYY-MM-DD hh:mm:ss.0000000 {+|–}
  hh:mm` 时，字符长度可达 34。`DATETIMEOFFSET` 数据类型所需的存储空间是固定的 10 字节。


  ### 其他数据类型


  除了前面讨论的数据类型外，SQL Server 还有其他几种可用的数据类型。其中一些数据类型可用于 `表定义` 并可能有特殊用途，而另一些数据类型可能只能用作
  `变量` 或在 `存储过程` 内部使用。




  ## SQL Server 特殊数据类型概述


  ### UNIQUEIDENTIFIER


  此数据类型可以作为表中的一列或用作变量。`UNIQUEIDENTIFIER` 占用 16 字节，该数据类型可存储的最大字符数为 36。虽然非 Unicode 字符串可以转换为
  `UNIQUEIDENTIFIER`，但如果字符总数超过 36，结果将被截断。


  此数据类型是 GUID（全局唯一标识符）。其概念是这些唯一值将仅被使用一次。然而，有报告表明情况并非总是如此。无论如何，`UNIQUEIDENTIFIER` 可以通过以下几种方式之一填充：包括使用函数
  `NEWID()` 和 `NEWSEQUENTIALID()`。或者，如果 GUID 的整体格式正确并使用有效的十六进制值 `0–9` 和 `a–f`，也可以手动填充这些值。


  虽然 `UNIQUEIDENTIFIER` 可以替代 `IDENTITY` 使用，但我只建议在绝对必需的场景下使用。它不仅比 `INT` 或 `BIGINT`
  占用更多空间，而且 `UNIQUEIDENTIFIER` 可与之使用的约束类型也有限制。`UNIQUEIDENTIFIER` 可以是一个 `IDENTITY`，但不允许其他表约束。


  ### XML


  各种系统和应用程序会发送、使用或存储 XML 数据。虽然可以选择解析此数据并将其保存在表中，但有时也可能需要完整地存储 XML 数据。存储 XML 数据时，还需要考虑
  XML 中包含的数据内容。


  对于 `XML` 数据类型，数据必须是有效的 XML 格式。为了有效，需要满足若干要求，包括所有起始标签必须有匹配的结束标签。此外，嵌套元素必须在同一个父元素内开始和结束。XML
  元素不能有多个属性，并且标记字符必须正确指定。如果 XML 数据满足所有前述要求，则认为该 XML 数据是格式良好的。


  允许存储的 XML 数据总量限制为 2 GB。数据可以包含非 Unicode 或 Unicode 数据。有时 XML 数据遵循一套既定指南并有指定的数据类型。在这种情况下，XML
  数据可能有一个定义的 XML 模式。对于有模式的 XML 数据，可被视为类型化的。通常类型化的 XML 数据占用空间更少，并且存储的数据可能具有附加功能。然而，这种类型化
  XML 的一个限制是 XML 必须通过验证。如果选择非类型化 XML 数据，则数据无需验证，也可能不会分配模式。


  ### 空间几何类型


  处理数据时，您可能希望在数据库中存储各种形状。虽然这不是常见请求，但有一种可用的数据类型可用于存储基于平面地图的形状或绘图。


  此数据类型可支持多种格式实例，包括点、线、圆形线、曲线、多边形、曲面多边形、多点、多线、多面，以及这些对象中任意或全部的集合。


  ### 空间地理类型


  虽然您可能希望在 SQL Server 中使用平面地球方法保存形状，但有时有必要根据地球形状存储信息。在这些情况下，使用 `geography` 数据类型将是更可取的。对于国家、道路或经度和纬度重要的地图，请使用此数据类型。


  与 `geometry` 数据类型类似，`geography` 数据类型也支持多种选项。这些选项包括与 `geometry` 数据类型相同的所有类型，例如点、线、圆形线、曲线、多边形、曲面多边形、多点、多线、多面，以及这些形状中任意或全部的集合。然而，`geography`
  数据类型还支持完整的地球实例。


  ### SQL_VARIANT


  有时您可能希望在一列中存储多种数据类型。虽然这通常不是最佳实践，但请确保了解此数据类型如何存储信息以及存在哪些限制。


  `SQL_VARIANT` 数据类型允许您在同一列中存储不同的数据类型。此列中保存的数据总最大长度为 8016 字节。然而，其中的 16 字节用于存储有关该记录中数据的信息。这为实际保存在列中的数据留下了总共
  8000 字节的可用空间。


  您可以直接将数据插入列中，或将数据转换为特定数据类型。如果在插入时未指定数据类型，`SQL_VARIANT` 将尝试确定正确的数据类型。这可能导致数据存储方式与预期不同。虽然
  `SQL_VARIANT` 在处理数字时似乎选择良好，但在某些情况下，如果未指定数据类型，日期可能被存储为 `VARCHAR(8000)`。


  所有可以存储在表中的数据类型都可用于 `SQL_VARIANT`，但以下类型除外：

  *   `VARCHAR(MAX)`

  *   `NVARCHAR(MAX)`

  *   `TEXT`

  *   `IMAGE`

  *   `SQL_VARIANT`

  *   `HIERARCHYID`

  *   `VARBINARY(MAX)`

  *   `XML`

  *   `NTEXT`

  *   `ROWVERSION`

  *   `GEOGRAPHY`

  *   `GEOMETRY`

  *   `DATETIMEOFFSET`

  *   用户定义类型


  `SQL_VARIANT` 列中数据的排序方式也与其他数据类型不同。`SQL_VARIANT` 将数据分组为相似的类型，称为数据类型族。这些数据类型族有自己的顺序，数据类型在较高族中的值将被视为大于较低族中的值。如果正在比较的数据存在于同一族中，`SQL_VARIANT`
  会将较低的数据类型隐式转换为较高的数据类型，然后完成比较。


  ### Rowversion


  有时您可能想知道表中某个操作发生的时间。虽然有一些方法可用于跟踪数据库更改，但也有一种特定的数据类型可用于记录记录何时被更新。


  `ROWVERSION` 数据类型可以让您大致了解特定记录或一组记录何时被更新。此值既没有日期也没有时间组件，而是一个二进制值。`ROWVERSION` 可以与其他
  `rowversion` 值或数据库中当前的 `rowversion` 值进行比较。我可以创建一个包含名为 `RowVersion` 且类型为 `ROWVERSION`
  的列的表。插入记录时，`ROWVERSION` 列可能被更新为值 `0x00000000000007D1`。我可以更新同一行中的某一列，`ROWVERSION`
  列可能被更新为 `0x00000000000007D2`。虽然我可以判断发生了更改，但我无法确定更改发生的时间或具体更改了什么。


  存储 `rowversion` 值时，所需的总存储空间为 8 字节。您可以指定 `ROWVERSION` 为非空或可空。如果该列不可空，则该列的行为类似于 `BINARY(8)`。否则，该列的行为类似于
  `VARBINARY(8)`。每个表只能添加一个 `ROWVERSION` 列。只要插入或更新一行或多行，该列就会被系统自动更新。


  ### HIERARCHYID


  有时，同一列中的数据与其他数据相关。这通常涉及作为其他数据父级或子级的数据。这可以包括位置（如国家、州和城市）或产品信息（如制造商、物品和生产日期）。


  对于这些场景，`HIERARCHYID` 可能有助于对数据的相互关系进行分类。`HIERARCHYID` 数据类型限制为 892 字节。然而，此数据类型是一种具有可变长度的系统数据类型。尽管此数据类型是系统数据类型，但使用此数据类型的应用程序负责确定应存储的正确层次结构。



  ### 表


  有些数据类型不能作为列存在于表中。`table` 数据类型就是其中之一。当你想要存储数据以供后续使用时，这可能是一个值得考虑的数据类型。然而，在使用表作为数据类型时，需要注意一些注意事项和限制。


  通常，最好将表变量的使用限制在返回数据量不会很大的场景中。历史上，SQL Server 并不总能准确估计表变量中的总行数。不过，从 SQL Server 2019
  开始，数据库引擎在处理表变量时应能给出更好的估计。


  虽然表变量可以在存储过程、批处理或函数中使用，但表变量仅存在于该对象的持续时间内。在函数或存储过程的情况下，函数或存储过程执行完成后，表变量就不再存在。在批处理的情况下，表将存在于整个批处理期间。由于表变量仅在一次更新的整个过程中持续存在，使用它们可能会减少更新过程中所需的锁。


  表作为数据类型的另一个限制是表变量上不会生成统计信息。这也意味着表变量使用索引非常受限。事实上，在 SQL Server 2014 之前，无法在表变量上创建索引。从
  SQL Server 2014 开始，创建表变量时可以包含一些索引。


  ### 游标


  另一种不能用作表中列的数据类型是 `cursor`。总的来说，这种数据类型可能非常有限，但在某些情况下，它是最适合任务的数据类型。在考虑使用这种数据类型时，最好了解使用
  `cursor` 数据类型可能带来的潜在性能影响。


  `cursor` 数据类型通常用作变量。但是，这种数据类型也可以用作存储过程的输出。无论哪种情况，`cursor` 数据类型都接收一组数据，并逐行与每条记录交互。由于
  `cursor` 数据类型可以保存一组数据，因此它也可能不包含任何数据。这表明 `cursor` 数据类型是可为空的。


  这种数据类型的大多数用途都与创建和使用游标有关。要创建游标，必须将局部变量声明为游标。与其他局部变量一样，可以声明游标并填充值，或者声明游标并使用 `SET`
  语句填充值。其他用于创建游标的函数也可以与此数据类型一起使用。这些函数包括 `OPEN`、`FETCH`、`CLOSE`、`DEALLOCATE` 和 `CURSOR_STATUS`。此外，还有一些系统存储过程具有
  `cursor` 数据类型。


  ## 2. 数据库对象


  理解可用的各种数据类型的一个关键因素是知道使用哪种数据类型。在某些情况下，使用正确的数据类型可能关系到节省空间。其他时候，使用不正确的数据类型可能导致严重的性能问题。你还需要在
  T-SQL 代码和数据库对象中保持使用和引用数据类型的方式一致。如果 SQL Server 需要比较两种不同的类型，SQL Server 将需要转换至少一种数据类型，以使两种数据类型相同。这个过程称为隐式转换。与隐式转换相关的
  CPU 开销可能很大，应尽可能避免。避免隐式转换的最佳方法是对要比较的字段使用相同的数据类型。最大的挑战是，有时需要几年时间才能意识到不正确的数据类型可能对应用程序性能产生的负面影响。


  通常，编写执行快速且高效使用硬件的 T-SQL，需要了解的不仅仅是正确的数据类型。数据类型将帮助你确定数据应如何存储，但下一步是设计访问该数据的过程。使用 T-SQL
  最大的好处和缺点之一是可用于访问数据的选项数量众多。期望是你已经熟悉如何编写 T-SQL 来读取、插入、更新或删除数据。


  在本章中，我将讨论可用于与数据交互的各种方法。有些对象可以让你一致且快速地整合信息。你可能还需要一个执行小型、快速操作并可以将该代码用于多种目的的数据库对象。一些数据库对象可以在同一批处理或连接内临时存储信息以供重用。其他数据库对象可以作为服务器或数据库对象上的活动的结果执行操作。虽然
  T-SQL 在基于集合的操作中表现最佳，但你可能也会发现自己需要逐条记录地循环遍历数据。


  根据你的目的，可能有一个或多个数据库对象可以满足你的需求。虽然这些数据库对象各有其适用之处，但在何时以及如何使用每个对象方面都有其优缺点。在本章中，我将通过各种场景，展示使用每个这些数据库对象的积极和消极后果。首先，我将从讨论
  T-SQL 中的视图开始。


  ### 视图


  什么是视图？就像“视图”这个词的定义一样，T-SQL 中的视图是一种将几个不同的项目组合在一起，形成一个统一图像的手段。在本节中，我将讨论使用视图时可用的一些选项。与任何工具一样，使用视图有其优势，但如果使用不当，也会带来与视图相关的风险。


  ```sql

  -- 原文中的示例 T-SQL 语句

  if (condVar > someVal) {console.log("xxx")}

  ```


  #### 用户定义视图


  术语“用户定义视图”是视图基本版本的全称。视图的成果之一是简化了操作。它为应用程序和用户提供了一种访问复杂信息集合的方式，而无需理解数据库中的所有关系。使用视图时，还具备一些额外的保护和安全功能。我将通过一些有助于提升性能的视图示例，以及一些视图可能不适用的情况来进行说明。


  对于标准的用户定义视图，SQL Server 不会物理存储视图返回的实际数据。因此，每次调用视图时，它都会使用视图内部的语句来拉取当前存在的数据。这种方法的一个优点是，它允许访问这些视图的用户查看更清晰、更易读的代码。视图的另一个特性是，可以授予用户访问视图的权限，但不授予其关联表的权限。这可以使用户能够访问组成视图的表中的部分数据，而不是全部数据。


  让我们首先比较一下视图与将相同查询作为即席查询或存储过程执行时的性能。清单 2-1 展示了将用作比较基础的查询。


  ```sql

  SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName

  FROM dbo.Recipe rec

  INNER JOIN dbo.MealType meal

  ON rec.MealTypeID = meal.MealTypeID

  INNER JOIN dbo.RecipeIngredient recing

  ON rec.RecipeID = recing.RecipeID

  INNER JOIN dbo.Ingredient ing

  ON recing.IngredientID = ing.IngredientID

  ```


  **清单 2-1** 用于分析的查询


  此查询将用作比较视图如何影响性能的基础。对于此查询，其逻辑很简单。清单 2-2 展示了如何使用以下 T-SQL 代码创建视图。


  ```sql

  CREATE VIEW dbo.AvailableMeal

  AS

  SELECT meal.MealTypeName, rec.RecipeName, rec.ServingQuantity, ing.IngredientName

  FROM dbo.Recipe rec

  INNER JOIN dbo.MealType meal

  ON rec.MealTypeID = meal.MealTypeID

  INNER JOIN dbo.RecipeIngredient recing

  ON rec.RecipeID = recing.RecipeID

  INNER JOIN dbo.Ingredient ing

  ON recing.IngredientID = ing.IngredientID

  ```


  **清单 2-2** 创建视图


  视图创建后，使用它来拉取与原始查询相同的信息就变得简单得多。清单 2-3 展示了如何使用视图来简化从 SQL Server 拉取数据的过程。


  ```sql

  SELECT MealTypeName, RecipeName, IngredientName

  FROM dbo.AvailableMeal

  ```


  **清单 2-3** 调用视图


  虽然拥有简化的数据访问方式很好，但另一个需要考虑的因素是视图与查询相比性能如何。通常，您可能期望视图的性能与视图内部存在的查询相同。图 2-1 显示了即席查询的实际查询执行计划。


  ![即席查询执行计划](img/480547_1_En_2_Fig1_HTML.jpg)


  **图 2-1** 即席查询执行计划


  将其与图 2-2 中视图的查询执行计划进行比较，您可以看到执行计划之间没有差异。


  ![视图的执行计划](img/480547_1_En_2_Fig2_HTML.jpg)


  **图 2-2** 视图的执行计划


  使用视图时可能出现的问题之一是，执行计划没有清晰地显示视图与基础表之间的关系。虽然视图可以使使用变得更简单，但您可能还想以其他方式使用视图。由于视图使与复杂查询的交互变得更简单，它也可能使修改数据更容易。但是，通过视图更新数据时，需要考虑一些注意事项。在清单
  2-4 中，您可以看到基于视图更新数据的查询。


  ```sql

  UPDATE dbo.AvailableMeal

  SET IngredientName = ''Spicy Italian Sausage''

  WHERE RecipeName = ''Spaghetti''

  ```


  **清单 2-4** 在视图中更新数据


  通过视图，您可以更新基础表中的数据。如果视图用于修改来自多个基础表的数据，则更新将失败。插入操作与更新操作的情况相同。在清单 2-5 中，您可以看到尝试为多个表中的数据插入记录时发生的情况。


  ```sql

  INSERT INTO dbo.AvailableMeal (MealTypeName, RecipeName)

  VALUES (''Lunch'', ''Spinach Quiche'')

  ```


  **清单 2-5** 通过视图插入数据


  尝试执行上述查询时，SQL Server 会返回错误：“视图或函数 ''dbo.AvailableMeal'' 不可更新，因为修改会影响多个基础表。” 使用视图时还有其他可用功能。有一种方法可以防止在引用视图时修改基础表。如果您想确保用户不会意外删除表，可以让视图通过
  `SCHEMABINDING` 引用表，这是一个可用的选项。您可以使用清单 2-6 中的查询来实现这种额外的安全级别。


  ```sql

  CREATE VIEW dbo.RecipeSecure

  WITH SCHEMABINDING

  AS

  SELECT RecipeName, RecipeDescription, IsActive

  FROM dbo.Recipe;

  ```


  **清单 2-6** 创建具有架构绑定的视图


  当向视图添加 `SCHEMABINDING` 时，我更改了 SQL Server 处理对视图所包含列更改的方式。具体来说，我不能以会影响视图 `dbo.RecipeSecure`
  的方式修改 `dbo.Recipe` 表中的列。清单 2-7 展示了一个查询，其中我尝试删除被 `dbo.RecipeSecure` 架构引用的 `dbo.Recipe`
  表中的列。


  ```sql

  ALTER TABLE dbo.Recipe

  DROP COLUMN RecipeDescription;

  ```


  **清单 2-7** 在架构绑定的视图中删除列


  尝试执行上述查询时，我收到以下错误：“对象 ''RecipeSecure'' 依赖于列 ''RecipeDescription''。ALTER TABLE DROP
  COLUMN RecipeDescription 失败，因为一个或多个对象访问了此列。” 然而，在保护数据方面还存在一个潜在的漏洞。一旦创建了视图，只要字段别名与原始列名相同，就可以替换原始列名以使用不同的列。回到清单
  2-2 中创建的视图，我可以尝试更改返回的值。这可能会造成用户能够访问他们本不应访问的数据的情况。在清单 2-8 中，我更改了原始的 `dbo.AvailableMeal`
  视图。


  ```sql

  ALTER VIEW dbo.AvailableMeal

  AS

  SELECT meal.MealTypeName,

  rec.RecipeName,

  rec.RecipeDescription AS ServingQuantity,

  ing.IngredientName

  FROM dbo.Recipe rec

  INNER JOIN dbo.MealType meal

  ON rec.MealTypeID = meal.MealTypeID

  INNER JOIN dbo.RecipeIngredient recing

  ON rec.RecipeID = recing.RecipeID

  INNER JOIN dbo.Ingredient ing

  ON recing.IngredientID = ing.IngredientID;

  ```


  **清单 2-8** 更改视图以修改列


  之前，我有一个用户只具有访问视图 `dbo.AvailableMeal` 内数据的权限。我的意图是仅允许此用户访问视图中的原始列。当同一个用户在稍后日期尝试查询该视图时，现在能够看到
  `RecipeDescription` 列中的数据了。



  在探讨所有这些特性时，最大的问题之一仍然围绕着**嵌套视图**。在典型的软件开发中，人们希望在多个场景中复用相同的软件代码。在创建视图时，很容易会想到去复用这些视图来构建其他视图。不幸的是，这可能会导致一个视图开始出现性能低下的情况。一旦视图性能不佳，就需要付出相当大的努力，穿梭于各个嵌套视图层之间，才能找到根本原因。


  ##### 索引视图


  我已经介绍了视图如何用于简化查询编写、修改数据以及保护数据库架构。我也谈到了复用视图来创建其他视图可能导致严重的性能问题。正如你在前一节所看到的，视图可以使 T-SQL
  更简洁，但对于临时查询和视图，其执行计划是相同的。在某些情况下，无论是作为查询还是视图，某些连接操作的表现都不尽如人意。这时就有可能考虑为视图添加索引。


  如果你发现自己需要提升视图的性能，可以选择为视图添加索引。当为视图添加索引后，该视图就被视为**索引视图**。添加到视图的第一个索引必须是聚集索引。在添加了聚集索引之后，还可以向该视图添加非聚集索引。然而，为视图添加索引是有代价的。每次数据被修改时，相关表上的任何索引以及索引视图也必须随之更新。


  创建索引视图的第一步是先创建一个视图。在这个例子中，我将使用在代码清单 2-2 中创建的视图。下一步是为这个视图添加一个索引。在代码清单 2-9 中，我将为这个视图添加一个聚集索引。


  ```sql

  CREATE UNIQUE CLUSTERED INDEX CX_AvailableMeal_RecipeNameIngredientName

  ON dbo.AvailableMeal (RecipeName, IngredientName);

  ```

  代码清单 2-9

  向视图添加聚集索引


  比较添加聚集索引前后视图的性能，总体上显示出性能有所提升。请记住，尽管索引视图在拉取数据时可以在某些情况下帮助提升性能，但当受影响的表发生数据插入、更新或删除操作时，仍然可能出现性能问题。在图
  2-3 中，可以看到向基表插入数据时的执行计划。


  ![../images/480547_1_En_2_Chapter/480547_1_En_2_Fig3_HTML.jpg](img/480547_1_En_2_Fig3_HTML.jpg)

  图 2-3

  向基表插入数据的执行计划


  如你所见，作为向基表插入数据的一部分，多出了一个更新视图索引的步骤。


  ### 函数


  在许多应用程序中，有些核心功能可能会被多次重新计算或复用。有时你可能希望编写一次简单的代码片段，然后在各种其他数据库对象中复用它。还有些情况下，你可能希望将复杂的逻辑封装起来，创建一个包含该逻辑并返回所需结果的数据库对象。这样做可以使
  T-SQL 代码看起来不那么复杂，从而不那么令人望而生畏。无论哪种方式，函数都能帮助你简化 T-SQL 代码。


  #### 标量函数


  你可能会遇到这样的情况：需要在许多不同的场景中重新运行同一段代码。你可能在查找一个配置值，或者希望在代码的多个不同部分重新运行相同的基本逻辑，其中只返回一个值。当你希望传递零个或多个参数，并且只想返回单个值时，你或许可以使用**标量函数**。不过，在使用标量函数时，你需要考虑其潜在的代价。


  在 SQL Server 2019 之前，标量函数在 SQL Server 中的运行方式大不相同。历史上，SQL Server 没有对标量函数进行基于成本的优化。这通常意味着标量函数不作为执行计划的一部分被考虑。既然
  SQL Server 2019 作为智能查询处理的一部分实现了额外的功能，包括标量用户定义函数 (UDF) 内联，函数的性能得到了提升。


  内联函数是可以作为执行计划一部分被包含的函数。内联标量 UDF 的最大优势之一是，在使用标量 UDF 时性能得到显著提升。当想要简化复杂流程并复用代码时，如果函数只需要返回一个结果，标量
  UDF 是理想的选择。


  早期版本的 SQL Server 与 SQL Server 2019 中的标量 UDF 在性能方面差异显著。为了比较这些执行计划，我将更改兼容性模式以匹配 SQL
  Server 2017 和 SQL Server 2019。兼容性级别 140 将使用 SQL Server 2017 中的优化器。将数据的兼容性级别设置为 150
  则会使用 SQL Server 2019 中可用的优化器。代码清单 2-10 展示了在 T-SQL 中创建标量 UDF 所需的代码。


  ```sql

  CREATE FUNCTION dbo.Ingredient_Price

  (

  @Cost DECIMAL(6,3),

  @Count DECIMAL(6,3)

  )

  RETURNS DECIMAL (6,3) AS

  BEGIN

  RETURN @Cost / @Count;

  END

  ```

  代码清单 2-10

  创建标量 UDF


