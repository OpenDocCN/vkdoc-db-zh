  \ SQL 语句的总耗时。我个人更倾向于在输出文件的开头而不是末尾看到这最后一部分信息。这是因为每次我打开 TKPROF 输出文件时，在做其他事情之前，我都会先瞥一眼这最后一行。了解整个跟踪文件花费了多少时间是至关重要的：没有它，您就无法判断一个\
