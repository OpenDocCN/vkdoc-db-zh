  \n以下是包 `dbms_stats` 中可用的函数：\n\n*   `diff_table_stats_in_stattab` 将在备份表（由参数 `ownname`\
  \ 和 `tabname` 指定）中找到的对象统计信息与当前对象统计信息或在另一个备份表中找到的另一组进行比较。参数 `stattab1`、`statid1`\
  \ 和 `stattab1own` 用于指定第一个备份表。第二个备份表（可选）由参数 `stattab2`、`statid2` 和 `stattab2own`\
  \ 指定。如果未指定第二个备份表或设置为 `NULL`，则将当前对象统计信息与第一个备份表中的对象统计信息进行比较。以下示例将表 `t` 的当前对象统计信息与存储在备份表\
  \ `mystats` 中的一组名为 `set1` 的对象统计信息进行比较：\n    ```\n    dbms_stats.diff_table_stats_in_stattab(ownname\
  \      => user,\n                                           tabname      => 'T',\n\
  \                                           stattab1     => 'MYSTATS',\n       \
  \                                    statid1      => 'SET1',\n                 \
  \                          stattab1own  => user,\n                             \
  \              pctthreshold => 10)\n    ```\n*   `diff_table_stats_in_history` 将一个表的当前对象统计信息，或来自历史记录的一组统计信息，与来自历史记录的其他对象统计信息进行比较。参数\
  \ `time1` 和 `time2` 用于指定使用哪些统计信息。如果未指定参数 `time2` 或设置为 `NULL`，则将当前对象统计信息与来自历史记录的另一组进行比较。以下示例将表\
  \ `t` 的当前对象统计信息与一天前的对象统计信息（例如，在夜间执行统计信息收集之前）进行比较：\n    ```\n    dbms_stats.diff_table_stats_in_history(ownname\
  \      => user,\n                                           tabname      => 'T',\n\
  \                                           time1        => systimestamp – 1,\n\
  \                                           time2        => NULL,\n            \
  \                               pctthreshold => 10)\n    ```\n*   `diff_table_stats_in_pending`\
  \ 将一个表的当前对象统计信息，或来自历史记录的一组统计信息，与待定统计信息进行比较。要指定存储在历史记录中的对象统计信息，请提供参数 `time_stamp`。如果此参数设置为\
  \ `NULL`（默认值），则将当前对象统计信息与待定统计信息进行比较。以下示例将表 `t` 的当前统计信息与待定统计信息进行比较：\n    ```\n  \
  \  dbms_stats.diff_table_stats_in_pending(ownname      => user,\n              \
  \                             tabname      => 'T',\n                           \
  \                time_stamp   => NULL,\n                                       \
  \    pctthreshold => 10)\n    ```\n\n\n\n#### 删除对象统计信息\n\n您可以从数据字典中删除对象统计信息。除测试目的外，通常无需这样做。然而，有时可能希望某张表不包含统计信息，以便利用**动态采样**（该功能在第\
  \ 5 章中介绍）。在这种情况下，`dbms_stats`包中提供了以下过程：\n* `delete_database_stats`\n* `delete_dictionary_stats`\n\
  * `delete_fixed_objects_stats`\n* `delete_schema_stats`\n* `delete_table_stats`\n\
  * `delete_column_stats`\n* `delete_index_stats`\n\n如您所见，对于每个`gather_*_stats`过程，都有一个对应的`delete_*_stats`过程。前者收集对象统计信息，后者删除对象统计信息。唯一的例外是`delete_column_stats`过程。顾名思义，它用于删除列统计信息和直方图。\n\
  \n表 4-10 总结了这些过程各自可用的参数。其中大多数参数是相同的，因此其含义与`gather_*_stats`过程使用的参数相同。这里我将只描述之前过程未描述过的参数：\n\
  * `cascade_parts` 指定是否删除所有底层分区的统计信息。此参数接受 `TRUE` 和 `FALSE` 值。默认值为 `TRUE`。\n* `cascade_columns`\
  \ 指定是否同时删除列统计信息。此参数接受 `TRUE` 和 `FALSE` 值。默认值为 `TRUE`。\n* `cascade_indexes` 指定是否同时删除索引统计信息。此参数接受\
  \ `TRUE` 和 `FALSE` 值。默认值为 `TRUE`。\n* `col_stat_type` 指定要删除的统计信息类型。如果设置为 `ALL`，则删除列统计信息和直方图。如果设置为\
  \ `HISTOGRAM`，则仅删除直方图。默认值为 `ALL`。此参数自 Oracle Database 11g 起可用。\n\n以下调用展示了如何仅删除单个列的直方图（完整示例见脚本\
  \ `delete_histogram.sql`），而不修改其他统计信息：\n\n```sql\ndbms_stats.delete_column_stats(ownname\
  \       => user,\n                               tabname       => 'T',\n       \
  \                        colname       => 'VAL',\n                             \
  \  col_stat_type => 'HISTOGRAM')\n```\n\n### 表 4-10. 用于删除对象统计信息的过程的参数\n\n| `参数`\
