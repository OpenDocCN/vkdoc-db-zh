  `SOURCE B     : Statistics as of 30-NOV-00 01.00.00.000000 AM +02:00`\n`PCTTHRESHOLD\
  \ : 10`\n`~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~`\n\
  \n`TABLE / (SUB)PARTITION STATISTICS DIFFERENCE:`\n`.............................................`\n\
  \n`OBJECTNAME                  TYP SRC ROWS    BLOCKS    ROWLEN     SAMPSIZE`\n\
  `...............................................................................`\n\
  \n`T                           T   A   10096   66        37         5099`\n`   \
