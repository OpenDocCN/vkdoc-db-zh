  \             |        |Q1,02| PCWP   |            |\n|   5|       PX SEND HASH\
  \          | :TQ10000|Q1,00| P->P   | HASH       |\n|   6|        PX PARTITION HASH\
  \ ALL|        |Q1,00| PCWC   |            |\n|   7|         TABLE ACCESS BY INDEX\
  \ ROWID|T1 |Q1,00| PCWP   |            |\n|*  8|          INDEX RANGE SCAN   | I1\
  \     |Q1,00| PCWP   |            |\n|   9|      PX RECEIVE             |      \
  \  |Q1,02| PCWP   |            |\n|  10|       PX SEND HASH          | :TQ10001|Q1,01|\
  \ P->P   | HASH       |\n|  11|        PX BLOCK ITERATOR    |        |Q1,01| PCWC\
  \   |            |\n|* 12|         TABLE ACCESS FULL   | T2     |Q1,01| PCWP   |\
  \            |\n--------------------------------------------------------------------------\n\
  \n   3 - access(\"T1\".\"ID\"=\"T2\".\"ID\"+1)\n   8 - access(\"T1\".\"ID\">9000)\n\
  \  12 - filter(\"T2\".\"ID\"+1>9000)\n```\n\n根据执行计划和图 11-9，使用了三组从属进程（因为请求的并行度是 2，总共六个从属进程）。实际上，只从池中分配了两组（换句话说，四个从属进程）。这是因为用于扫描表\
  \ `t1` 的集合（`Q1,00`）与用于扫描表 `t2` 的集合（`Q1,01`）从未同时工作。因此，查询协调器简单地（重新）为这两个集合使用了相同的从属进程。\n\
  \n![image](img/1109.jpg)\n\n**图 11-9.** *三组从属进程并行执行查询。*\n\n## 并行 DML 语句\n\n以下 DML\
  \ 语句可以并行执行：\n\n*   `DELETE`\n*   带子查询的 `INSERT`（因为并行执行单行 `INSERT` 语句没有意义，所以带有 `VALUES`\
  \ 子句的 `INSERT` 语句无法并行化）\n*   `MERGE`\n*   `UPDATE`\n\n***\n\n**注意** 并行执行的 `INSERT`\
  \ 语句和 `MERGE` 语句（用于插入数据的部分）使用直接路径插入。因此，它们受到直接路径插入利弊的影响。我将在本章后面的“直接路径插入”一节中描述它们。\n\
  \n***\n\n在以下情况下，DML 语句无法并行执行：\n\n*   表具有触发器；\n*   表具有引用自身的外键约束、具有删除级联的外键约束或延迟约束；\n\
  *   修改了对象列；或\n*   修改了聚簇表或临时表。\n\n并行 DML 语句默认是*禁用*的（请注意，这与并行查询相反）。在会话级别，可以使用以下 SQL\
  \ 语句启用和禁用它们：\n\n```sql\nALTER SESSION ENABLE PARALLEL DML\n```\n\n```sql\nALTER\
  \ SESSION DISABLE PARALLEL DML\n```\n\n此外，还可以使用以下 SQL 语句强制并行执行，并指定特定的并行度：\n\n```sql\n\
  ALTER SESSION FORCE PARALLEL DML PARALLEL 4\n```\n\n与并行查询的情况不同，仅使用 Hints 无法启用并行\
  \ DML 语句。换句话说，必须在会话级别绝对启用 DML 语句的并行处理才能利用它。要检查会话级别是否启用或禁用了并行 DML 语句，可以执行类似以下的查询（列\
  \ `pdml_status` 会被设置为 `ENABLED`、`DISABLED` 或 `FORCED`）：\n\n```sql\nSELECT pdml_status\n\
  FROM v$session\nWHERE sid = sys_context('userenv','sid')\n```\n\n除了 `INSERT` 语句外，还必须启用并行查询才能并行执行\
  \ DML 语句。实际上，DML 语句基本由两个操作组成：第一个操作查找要修改的行，第二个操作修改它们。问题在于，如果查找行的部分没有并行执行，那么修改行的部分就无法并行化。为了说明这种行为，让我们看几个基于\
  \ `px_dml.sql` 脚本的示例。\n\n*   当并行查询和 DML 语句都被禁用时，没有操作被并行化。\n    ```sql\n    SQL>\
  \ ALTER SESSION DISABLE PARALLEL QUERY;\n    SQL> ALTER SESSION DISABLE PARALLEL\
  \ DML;\n    SQL> ALTER TABLE t PARALLEL 2;\n    SQL> UPDATE t SET id = id + 1;\n\
  \    ```\n    ```\n    -----------------------------------\n    | Id | Operation\
  \           | Name |\n    -----------------------------------\n    |   0| UPDATE\
  \ STATEMENT    |      |\n    |   1|  UPDATE             | T    |\n    |   2|   TABLE\
  \ ACCESS FULL | T    |\n    -----------------------------------\n    ```\n*   当仅启用并行查询时，DML\
  \ 语句的更新部分未并行执行。实际上，只有操作 3 到 5 由从属进程执行。因此，操作 1 (`UPDATE`) 由查询协调器串行执行。\n    ```sql\n\
  \    SQL> ALTER SESSION ENABLE PARALLEL QUERY;\n    SQL> ALTER SESSION DISABLE PARALLEL\
  \ DML;\n    SQL> ALTER TABLE t PARALLEL 2;\n    SQL> UPDATE t SET id = id + 1;\n\
  \    ```\n    ```\n    ----------------------------------------------------------------\n\
  \    |Id |Operation             | Name     |   TQ |IN-OUT|PQ Distrib|\n    ----------------------------------------------------------------\n\
  \    |  0|UPDATE STATEMENT      |          |      |      |          |\n    |  1|\
  \ UPDATE               | T        |      |      |          |\n    |  2|  PX COORDINATOR\
  \      |          |      |      |          |\n    |  3|   PX SEND QC (RANDOM)| :TQ10000\
  \ |Q1,00 |P->S  |QC (RAND) |\n    |  4|    PX BLOCK ITERATOR |          |Q1,00 |\
  \ PCWC |          |\n    |  5|     TABLE ACCESS FULL| T        |Q1,00 | PCWP | \
  \         |\n    ----------------------------------------------------------------\n\
  \    ```\n*   当并行查询和 DML 语句都被启用时，更新部分（操作 3）也可以并行执行。在这种情况下，仅使用一组从属进程（操作 2 到 5 在 `TQ`\
  \ 列中的值相同）。这意味着同一个从属进程扫描表并修改行。\n    ```sql\n    SQL> ALTER SESSION ENABLE PARALLEL\
  \ QUERY;\n    SQL> ALTER SESSION ENABLE PARALLEL DML;\n    SQL> ALTER TABLE t PARALLEL\
  \ 2;\n    SQL> UPDATE t SET id = id + 1;\n    ```\n    ```\n    ---------------------------------------------------------------\n\
  \    |Id | Operation             | Name   |  TQ  |IN-OUT|PQ Distrib|\n    ---------------------------------------------------------------\n\
  \    |  0| UPDATE STATEMENT      |        |      |      |          |\n    |  1|\
  \  PX COORDINATOR       |        |      |      |          |\n    |  2|   PX SEND\
  \ QC (RANDOM) |:TQ10000|Q1,00 |P->S  |QC (RAND) |\n    |  3|    UPDATE         \
  \    | T      |Q1,00 | PCWP |          |\n    |  4|     PX BLOCK ITERATOR |    \
  \    |Q1,00 | PCWC |          |\n    |  5|      TABLE ACCESS FULL| T      |Q1,00\
  \ | PCWP |          |\n    ---------------------------------------------------------------\n\
  \    ```\n\n## 并行 DDL 语句\n\n表和索引支持并行 DDL 语句。以下是通常被并行化的操作：\n\n*   `CREATE TABLE AS\
  \ SELECT` (CTAS) 语句\n*   索引的创建和重建\n*   约束的创建和验证\n\n此外，对于分区表和索引，诸如 `SPLIT` 和 `MOVE`\
  \ 等分区管理操作可以并行化。通常，能够利用并行处理的 DDL 语句会提供 `PARALLEL` 子句（您稍后会看到，约束是个例外）来指定是否使用并行处理，如果使用，则指定并行度。Hints\
  \ 不能用于指定并行度。\n\n并行 DDL 语句默认是*启用*的。在会话级别，您可以使用以下 SQL 语句启用和禁用它们：\n\n```sql\nALTER\
  \ SESSION ENABLE PARALLEL DDL\n```\n\n```sql\nALTER SESSION DISABLE PARALLEL DDL\n\
  ```\n\n还可以使用以下 SQL 语句强制并行执行，并指定特定的并行度（对于支持此功能的 DDL 语句）：\n\n```sql\nALTER SESSION\
  \ FORCE PARALLEL DDL PARALLEL 4\n```\n\n要检查会话级别是否启用或禁用了并行 DDL 语句，可以执行类似以下的查询（列 `pddl_status`\
  \ 会被设置为 `ENABLED`、`DISABLED` 或 `FORCED`）：\n\n```sql\nSELECT pddl_status\nFROM v$session\n\
  WHERE sid = sys_context('userenv','sid')\n```\n\n以下各节针对三种主要类型的可并行执行的 DML 语句，展示了几个基于\
  \ `px_ddl.sql` 脚本的示例。\n\n### CTAS 语句\n\nCTAS 语句由两个处理数据的操作组成：用于从源表检索数据的查询和向目标表的插入。每个部分都可以独立于另一部分，以串行或并行方式执行。但是，如果使用了并行处理，通常会将两个操作都并行化。以下执行计划说明了这一点：\n\
  \n\n"
- '# 并行执行


  ## 插入操作的并行化

  仅操作 2 到 5 并行执行。查询协调器扫描表 `t1`，并使用循环（round-robin）方法将其内容分发给从属进程。由于查询协调器与多个从属进程通信，因此操作之间的关系为串行到并行（`S->P`）。一组从属进程接收数据并并行执行插入操作（操作
  `LOAD AS SELECT`）。


  ```sql

  CREATE TABLE t2 PARALLEL 2 AS SELECT /*+ no_parallel(t1) */ * FROM t1

  ```

  ```

  -------------------------------------------------------------------

  |Id | Operation                 | Name   |  TQ  |IN-OUT|PQ Distrib |

  -------------------------------------------------------------------

  |  0| CREATE TABLE STATEMENT    |        |      |      |           |

  |  1|  PX COORDINATOR           |        |      |      |           |

  |  2|   PX SEND QC (RANDOM)     |:TQ10001| Q1,01| P->S | QC (RAND) |

  |  3|    LOAD AS SELECT         |        | Q1,01| PCWP |           |

  |  4|     BUFFER SORT           |        | Q1,01| PCWC |           |

  |  5|      PX RECEIVE           |        | Q1,01| PCWP |           |

  |  6|       PX SEND ROUND-ROBIN |:TQ10000|      | S->P | RND-ROBIN |

  |  7|        TABLE ACCESS FULL  | T1     |      |      |           |

  -------------------------------------------------------------------

  ```


  ## 查询操作的并行化

  仅操作 3 到 5 并行执行。从属进程基于块范围粒度并行扫描表 `t1`，并将其内容发送给查询协调器，这是并行到串行（`P->S`）关系的原因。查询协调器执行插入操作（操作
  `LOAD AS SELECT`）。


  ```sql

  CREATE TABLE t2 NOPARALLEL AS SELECT /*+ parallel(t1 2) */ * FROM t1

  ```

  ```

  -----------------------------------------------------------------

  | Id | Operation               | Name   |  TQ  |IN-OUT|PQ Distrib|

  -----------------------------------------------------------------

  |   0| CREATE TABLE STATEMENT  |        |      |      |          |

  |   1|  LOAD AS SELECT         |        |      |      |          |

  |   2|   PX COORDINATOR        |        |      |      |          |

  |   3|    PX SEND QC (RANDOM)  |:TQ10000| Q1,00| P->S | QC (RAND)|

  |   4|     PX BLOCK ITERATOR   |        | Q1,00| PCWC |          |

  |   5|      TABLE ACCESS FULL  | T1     | Q1,00| PCWP |          |

  -----------------------------------------------------------------

  ```


  ## 两个操作的并行化

  从属进程基于块范围粒度并行扫描表 `t1`，并直接将他们获得的数据插入到目标表中。需要强调两点。首先，查询协调器不直接参与数据处理。其次，数据不通过表队列发送（除了操作
  2 发送给查询协调器的少量可忽略信息外，没有发生通信）。


  ```sql

  CREATE TABLE t2 PARALLEL 2 AS SELECT /*+ parallel(t1 2) */ * FROM t1

  ```

  ```

  -----------------------------------------------------------------

  | Id | Operation               | Name   |  TQ |IN-OUT| PQ Distrib|

  -----------------------------------------------------------------

  |   0| CREATE TABLE STATEMENT  |        |     |      |           |

  |   1|  PX COORDINATOR         |        |     |      |           |

  |   2|   PX SEND QC (RANDOM)   |:TQ10000|Q1,00| P->S | QC (RAND) |

  |   3|    LOAD AS SELECT       |        |Q1,00| PCWP |           |

  |   4|     PX BLOCK ITERATOR   |        |Q1,00| PCWC |           |

  |   5|      TABLE ACCESS FULL  | T1     |Q1,00| PCWP |           |

  -----------------------------------------------------------------

  ```


  '
- '# 索引的创建与重建


  你可以并行创建和重建索引。为此，两组从属进程协同工作。第一组读取要索引的数据。第二组对从第一组接收的数据进行排序并构建索引。以下 SQL 语句是一个示例。请注意第一组如何执行操作
  6 到 8（`Q1,00`），第二组执行操作 2 到 5（`Q1,01`）。数据使用范围方法在两组之间分发，并且具有并行到并行（`P->P`）的关系。


  ```sql

  CREATE INDEX i1 ON t1 (id) PARALLEL 4

  ```

  ```

  -------------------------------------------------------------------

  | Id | Operation                 | Name   | TQ  |IN-OUT|PQ Distrib |

  -------------------------------------------------------------------

  |   0| CREATE INDEX STATEMENT    |        |     |      |           |

  |   1|  PX COORDINATOR           |        |     |      |           |

  |   2|   PX SEND QC (ORDER)      |:TQ10001|Q1,01| P->S | QC (ORDER)|

  |   3|    INDEX BUILD NON UNIQUE | I1     |Q1,01| PCWP |           |

  |   4|     SORT CREATE INDEX     |        |Q1,01| PCWP |           |

  |   5|      PX RECEIVE           |        |Q1,01| PCWP |           |

  |   6|       PX SEND RANGE       |:TQ10000|Q1,00| P->P | RANGE     |

  |   7|        PX BLOCK ITERATOR  |        |Q1,00| PCWC |           |

  |   8|         TABLE ACCESS FULL | T1     |Q1,00| PCWP |           |

  -------------------------------------------------------------------

  ```


  重建索引会得到非常相似的执行计划：


  ```sql

  ALTER INDEX i1 REBUILD PARALLEL 4

  ```

  ```

  ----------------------------------------------------------------------

  | Id | Operation                    | Name   | TQ  |IN-OUT|PQ Distrib |

  ----------------------------------------------------------------------

  |   0| ALTER INDEX STATEMENT        |        |     |      |           |

  |   1|  PX COORDINATOR              |        |     |      |           |

  |   2|   PX SEND QC (ORDER)         |:TQ10001|Q1,01| P->S | QC (ORDER)|

  |   3|    INDEX BUILD NON UNIQUE    |I1      |Q1,01| PCWP |           |

  |   4|     SORT CREATE INDEX        |        |Q1,01| PCWP |           |

  |   5|      PX RECEIVE              |        |Q1,01| PCWP |           |

  |   6|       PX SEND RANGE          |:TQ10000|Q1,00| P->P | RANGE     |

  |   7|        PX BLOCK ITERATOR     |        |Q1,00| PCWC |           |

  |   8|         INDEX FAST FULL SCAN |I1      |Q1,00| PCWP |           |

  ----------------------------------------------------------------------

  ```


