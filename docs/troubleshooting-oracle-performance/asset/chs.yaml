  \ -------- -------------\n4         1.769  100.000        225  100.000   1,617 \
  \ 100.000         7,863\n```\n\n## 结论\n\n总而言之，即使执行了大量 SQL 语句（总共 182 条），SQL 语句 2\
  \ 也是响应时间的主要贡献者。因此，为了改进性能，应避免或优化该 SQL 语句的执行。\n\n\n### 分析 PL/SQL 代码\n\n要分析 PL/SQL\
  \ 代码，数据库引擎通过 `dbms_profiler` 包提供了一个 API。利用这个包，可以启用或禁用集成在 PL/SQL 引擎中的分析器，其作用范围限于当前会话。在启用期间，对于执行的每一行代码，会收集以下信息：\n\
  \n*   该行代码被执行的总次数\n*   执行该行代码所花费的总时间\n*   执行该行代码所花费的最少和最多时间\n\n收集操作在会话级别进行，适用于用户拥有\
  \ `CREATE` 权限的所有 PL/SQL 单元。换句话说，仅拥有执行某个 PL/SQL 单元的权限不足以使用分析器。为了最大化收集的信息量，应将 PL/SQL\
  \ 单元以调试模式编译。由于原生编译的 PL/SQL 单元不由 PL/SQL 引擎执行，因此不会为它们收集分析数据。\n\n分析数据存储在如 图 3-20 所示的数据库表中。`plsql_profiler_runs`\
  \ 表提供了有关已执行的分析会话的信息。`plsql_profiler_units` 表提供了每次运行所执行的单元列表。`plsql_profiler_data`\
  \ 表则提供了前面描述的、针对每一行已执行代码的分析数据。\n\n![image](img/0320.jpg)\n\n**图 3-20.** *分析器将收集的信息存储在三个数据库表中。注意，主键由带下划线的列组成。*\n\
  \n#### 安装分析器\n\n要安装 `dbms_profiler` 包，请以 `sys` 用户身份执行 `profload.sql` 脚本：\n\n`CONNECT\
  \ / AS SYSDBA`\n`@?/rdbms/admin/profload.sql`\n\n该脚本还会创建一个公共同义词，并将 `EXECUTE` 对象权限授予\
  \ `PUBLIC`。从 Oracle Database 10*g* 开始，`dbms_profiler` 包应该已经可用，因为用于创建新数据库的主要脚本之一（`catproc.sql`）会执行\
  \ `profload.sql` 脚本。\n\n#### 安装输出表\n\n该包以执行它的用户的权限运行。因此，输出表不一定需要由 `sys` 用户创建。可以像下面这样，由数据库管理员一次性安装输出表，并提供必要的同义词和权限供使用；也可以由每个用户在其自己的模式中安装：\n\
  \n`CONNECT / AS SYSDBA`\n`@?/rdbms/admin/proftab.sql`\n\n`CREATE PUBLIC SYNONYM\
  \ plsql_profiler_runs FOR plsql_profiler_runs;`\n`CREATE PUBLIC SYNONYM plsql_profiler_units\
  \ FOR plsql_profiler_units;`\n`CREATE PUBLIC SYNONYM plsql_profiler_data FOR plsql_profiler_data;`\n\
  `CREATE PUBLIC SYNONYM plsql_profiler_runnumber FOR plsql_profiler_runnumber;`\n\
  `GRANT SELECT, INSERT, UPDATE, DELETE ON plsql_profiler_runs TO PUBLIC;`\n`GRANT\
  \ SELECT, INSERT, UPDATE, DELETE ON plsql_profiler_units TO PUBLIC;`\n`GRANT SELECT,\
  \ INSERT, UPDATE, DELETE ON plsql_profiler_data TO PUBLIC;`\n`GRANT SELECT ON plsql_profiler_runnumber\
  \ TO PUBLIC;`\n\n#### 收集分析数据\n\n分析开始于调用 `start_profiler` 例程以启用分析器。在分析器启用期间，会为 PL/SQL\
  \ 引擎执行的代码收集分析数据。除非通过调用 `flush_data` 例程显式刷新，否则在分析器启用期间，分析数据不会存储到输出表中。调用 `stop_profiler`\
  \ 例程会禁用分析器，并执行一次隐式刷新。此外，可以通过分别调用 `pause_profiler` 和 `resume_profiler` 例程来暂停和恢复分析器。图\
  \ 3-21 展示了分析器的状态以及 `dbms_profiler` 中可用于触发状态变化的可用例程。\n\n![image](img/0321.jpg)\n\n\
  **图 3-21.** *分析器状态图。`dbms_profiler` 包提供了用于改变分析器状态——禁用、启用或暂停——的例程。*\n\n图 3-21 中显示的每个例程都以函数或过程的形式提供。函数返回处理结果状态（0\
  \ = 成功）。过程在出错时引发异常。除了 `start_profiler` 例程接受两个描述分析会话的注释作为参数外，所有其他例程都是无参数的。\n\n以下示例展示了一个针对分析\
  \ `perfect_triangles` 过程的最小化运行。该过程的代码可在 `perfect_triangles.sql` 脚本中找到。注意，在禁用分析器时选定的\
  \ `runid` 将在下一节中用于引用存储在输出表中的分析数据。\n\n```sql\nSQL> ALTER PROCEDURE perfect_triangles\
  \ COMPILE DEBUG;\n\nSQL> SELECT dbms_profiler.start_profiler AS status\n  2  FROM\
  \ dual;\n\n    STATUS\n----------\n         0\n\nSQL> execute perfect_triangles(1000)\n\
  SQL> SELECT dbms_profiler.stop_profiler() AS status,\n  2         plsql_profiler_runnumber.currval\
  \ AS runid\n  3  FROM dual;\n\n    STATUS      RUNID\n----------\n ----------\n\
  \         0         41\n```\n\n如果无法手动启动该包，也可以创建以下数据库事件触发器，为整个会话自动启用和禁用分析器。创建这些触发器的代码可在\
  \ `dbms_profiler_triggers.sql` 脚本中找到。为避免为所有用户启用分析器，我通常建议创建一个角色，并仅临时将权限授予需要测试的用户。当然，也可以仅为单个模式定义触发器，或者进行其他检查，例如基于\
  \ `userenv` 上下文。\n\n```sql\nCREATE ROLE profile;\n\nCREATE OR REPLACE TRIGGER start_profiler\
  \ AFTER LOGON ON DATABASE\nBEGIN\n  IF (dbms_session.is_role_enabled('PROFILE'))\n\
  \  THEN\n    dbms_profiler.start_profiler();\n  END IF;\nEND;\n/\n\nCREATE OR REPLACE\
  \ TRIGGER stop_profiler BEFORE LOGOFF ON DATABASE\nBEGIN\n  IF (dbms_session.is_role_enabled('PROFILE'))\n\
  \  THEN\n    dbms_profiler.stop_profiler();\n  END IF;\nEND;\n/\n```\n\n\n\n####\
