- "# FILTER 操作\n\n此操作的特定特点是它支持可变数量的子操作。如果它只有一个子操作，则被视为独立操作。如果它有两个或更多子操作，其功能类似于 `NESTED\
  \ LOOPS` 操作。第一个子操作驱动其他子操作的执行。\n\n为说明这一点，给出以下查询及其执行计划（其父子关系的图形化表示见 图 6-6）：\n\n```sql\n\
  SELECT *\nFROM emp\nWHERE NOT EXISTS (SELECT 0\n                  FROM dept\n  \
  \                WHERE dept.dname = 'SALES' AND dept.deptno = emp.deptno)\nAND NOT\
  \ EXISTS (SELECT 0\n                  FROM bonus\n                  WHERE bonus.ename\
  \ = emp.ename);\n```\n\n```\n------------------------------------------------------------------\n\
  | Id  | Operation                    | Name    | Starts | A-Rows |\n------------------------------------------------------------------\n\
  |*  1 |  FILTER                      |         |      1 |      8 |\n|   2 |   TABLE\
  \ ACCESS FULL          | EMP     |      1 |     14 |\n|*  3 |   TABLE ACCESS BY\
  \ INDEX ROWID| DEPT    |      3 |      1 |\n|*  4 |    INDEX UNIQUE SCAN       \
  \  | DEPT_PK |      3 |      3 |\n|*  5 |   TABLE ACCESS FULL          | BONUS \
  \  |      8 |      0 |\n------------------------------------------------------------------\n\
  \n   1 - filter( NOT EXISTS (SELECT 0 FROM \"DEPT\" \"DEPT\" WHERE \"DEPT\".\"DEPTNO\"\
  =:B1\n               AND \"DEPT\".\"DNAME\"='SALES') AND NOT EXISTS (SELECT 0 FROM\
  \ \"BONUS\"\n               \"BONUS\" WHERE \"BONUS\".\"ENAME\"=:B2))\n   3 - filter(\"\
  DEPT\".\"DNAME\"='SALES')\n   4 - access(\"DEPT\".\"DEPTNO\"=:B1)\n   5 - filter(\"\
  BONUS\".\"ENAME\"=:B1)\n```\n\n---\n\n**注意** 包 `dbms_xplan` 中的函数 `display_cursor`\
  \ 有时会显示错误的谓词。不过，问题不在于这个包。它实际上是由视图 `v$sql_plan` 和 `v$sql_plan_statistics_all` 显示错误信息引起的。在这种情况下，错误显示的谓词如下：\n\
  \n```\n1 - filter((`IS NULL AND IS NULL`))\n   3 - filter(\"DEPT\".\"DNAME\"='SALES')\n\
  \   4 - access(\"DEPT\".\"DEPTNO\"=:B1)\n   5 - filter(\"BONUS\".\"ENAME\"=:B1)\n\
  ```\n\n请注意，根据 Oracle 的说法，这不是一个 bug。这只是当前实现的一个限制。\n\n---\n\n![image](img/0606.jpg)\n\
  \n**图 6-6.** *关联组合操作 FILTER 的父子关系*\n\n在此执行计划中，关联组合操作 FILTER 的三个子操作是独立操作。应用前述规则，您可以看到执行计划按以下方式执行操作：\n\
  \n1.  操作 1 有三个子操作（2、3 和 5），其中操作 2 按升序排列是第一个。因此，执行从操作 2 开始。\n2.  操作 2 扫描表 `emp` 并向其父操作（1）返回\
  \ 14 行。\n3.  对于操作 2 返回的每一行，操作 `FILTER` 的第二个和第三个子操作应各执行一次。实际上，实现了一种缓存机制以将执行次数降至最低。这通过比较操作\
  \ 2 的 `A-Rows` 列与操作 3 和 5 的 `Starts` 列得到确认。操作 3 执行了三次，对于表 `emp` 中列 `deptno` 的每个不同值执行一次。操作\
  \ 5 执行了八次，对于在应用操作 3 施加的过滤器后表 `emp` 中列 `empno` 的每个不同值执行一次。以下查询显示开始次数与不同值的数量匹配：\n\
  \    ```sql\n    SQL> SELECT dname, count(*)\n      2  FROM emp, dept\n      3 \
  \ WHERE emp.deptno = dept.deptno\n      4  GROUP BY dname;\n    ```\n    ```\n \
  \   DNAME             COUNT(*)\n    --------------  ----------\n    ACCOUNTING \
  \              3\n    RESEARCH                 5\n    SALES                    6\n\
  \    ```\n4.  根据独立操作的规则，在操作 3 之前执行的操作 4，通过应用访问谓词 `\"DEPT\".\"DEPTNO\"=:B1` 扫描索引\
  \ `dept_pk`。绑定变量 (`B1`) 用于传递要由子查询检查的值。在三次执行中，它从索引中提取了三个 rowid 并将其传递给其父操作（3）。\n5.\
  \  操作 3 通过其子操作（4）传递过来的 rowid 访问表 `dept`，并应用过滤谓词 `\"DEPT\".\"DNAME\"='SALES'`。由于此操作仅用于应用限制，因此它不向其父操作（1）返回任何数据。无论如何，重要的是注意只找到了一行满足过滤谓词。因为使用了\
  \ `NOT EXISTS`，所以丢弃了这个匹配行。\n6.  操作 5 扫描表 `bonus` 并应用过滤谓词 `\"BONUS\".\"ENAME\"=:B1`。绑定变量\
  \ (`B1`) 用于传递要由子查询检查的值。由于此操作仅用于应用限制，因此它不向其父操作（1）返回任何数据。然而，重要的是注意没有找到满足过滤谓词的行。因为使用了\
  \ `NOT EXISTS`，所以没有行被丢弃。\n7.  操作 1 在应用了由操作 3 和 5 实现的过滤谓词后，将八行数据发送给调用者。\n\n"
- "# UPDATE 操作\n\n当执行 SQL 语句 `UPDATE` 时会使用此操作。其特定特点是它支持可变数量的子操作。大多数情况下，它只有一个子操作，因此被视为独立操作。仅当在\
  \ `SET` 子句中使用了子查询时，才会有两个或更多子操作可用。如果它有多个子操作，其行为与 `FILTER` 操作相同。换句话说，第一个子操作驱动其他子操作的执行。\n\
  \n以下是一个示例 SQL 语句及其执行计划（其父子关系的图形化表示见 图 6-7）：\n\n```sql\nUPDATE emp e1\nSET sal =\
  \ (SELECT avg(sal) FROM emp e2 WHERE e2.deptno = e1.deptno),\n    comm = (SELECT\
  \ avg(comm) FROM emp e3)\n```\n\n\n\n"
- "# 执行计划详解\n\n```plaintext\n`------------------------------------------------------`\n\
