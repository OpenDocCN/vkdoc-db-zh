  \ | ![image](img/P0001.jpg) | ![image](img/P0001.jpg) | ![image](img/P0001.jpg)\
  \ | ![image](img/P0001.jpg) | ![image](img/P0001.jpg) |\n\n#### 目标对象\n\n目标对象参数指定了您为其收集对象统计信息的对象。\n\
  \n\n\n\n以下是排版后的内容：\n\n`ownname` 指定要处理的方案名称。此参数是强制性的。\n`indname` 指定要处理的索引名称。此参数是强制性的。\n\
  `tabname` 指定要处理的表名称。此参数是强制性的。\n`partname` 指定要处理的分区或子分区名称。如果未指定值，则会收集所有分区的对象统计信息。默认值为\
  \ `NULL`。\n`comp_id` 指定要处理的组件的 ID。由于无法使用组件 ID 来收集统计信息，因此它会在内部转换为一个方案列表。要了解为给定组件处理了哪些方案，可以使用以下查询。⁴\
  \ 请注意，方案 `sys` 和 `system` 总是会被处理，与本参数无关。如果指定了无效值，则不会返回错误消息，并且方案 `sys` 和 `system`\
  \ 会按常规处理。使用默认值 `NULL` 时，会处理所有组件。\n\n```sql\nSQL> SELECT u.name AS schema_name, r.cid\
  \ AS comp_id, r.cname AS comp_name\n  2  FROM sys.user$ u,\n  3       (SELECT schema#,\
  \ cid, cname\n  4       FROM sys.registry$\n  5       WHERE status IN (1,3,5)\n\
  \  6       AND namespace = 'SERVER'\n  7       UNION ALL\n  8       SELECT s.schema#,\
  \ s.cid, cname\n  9       FROM sys.registry$ r, sys.registry$schemas s\n 10    \
  \   WHERE r.status IN (1,3,5)\n 11       AND r.namespace = 'SERVER'\n 12       AND\
  \ r.cid = s.cid) r\n 13  WHERE u.user# = r.schema#\n 14 ORDER BY u.name, r.cid;\n\
  \nSCHEMA_NAME        COMP_ID COMP_NAME\n------------------ ------- ------------------------------\n\
  CTXSYS             CONTEXT Oracle Text\nDMSYS              ODM     Oracle Data Mining\n\
  EXFSYS             EXF     Oracle Expression Filter\nEXFSYS             RUL    \
  \ Oracle Rule Manager\nOLAPSYS            AMD     OLAP Catalog\nORDPLUGINS     \
  \    ORDIM   Oracle interMedia\nORDSYS             ORDIM   Oracle interMedia\nSI_INFORMTN_SCHEMA\
  \ ORDIM   Oracle interMedia\nSYS                APS     OLAP Analytic Workspace\n\
  SYS                CATALOG Oracle Database Catalog Views\nSYS                CATJAVA\
  \ Oracle Database Java Packages\nSYS                JAVAVM  JServer JAVA Virtual\
  \ Machine\nSYS                XML     Oracle XDK\nSYS                XOQ     Oracle\
  \ OLAP API\nSYSMAN             EM      Oracle Enterprise Manager\nWKPROXY      \
  \      WK      Oracle Ultra Search\nWKSYS              WK      Oracle Ultra Search\n\
  WK_TEST            WK      Oracle Ultra Search\nWMSYS              OWM     Oracle\
  \ Workspace Manager\nXDB                XDB     Oracle XML Database\n```\n\n`granularity`\
  \ 指定处理分区对象统计信息的级别。此参数接受 表 4-6 中列出的值。直至 Oracle9*i*，默认值为 `DEFAULT`，而从 Oracle Database\
  \ 10*g* 开始，默认值为 `AUTO`（此默认值可以更改；请参阅本章后面的“配置 dbms_stats 包：10*g* 方式”和“配置 dbms_stats\
  \ 包：11*g* 方式”部分）。\n\n**表 4-6. 参数 `granularity` 接受的值**\n\n| **值** | **含义** |\n| ---\
  \ | --- |\n| `all` | 收集对象、分区和子分区统计信息。此值仅从 Oracle Database 10*g* 开始可用。 |\n| `auto`\
  \ | 收集对象和分区统计信息。仅当表按列表或范围进行子分区时，才会收集子分区统计信息。 |\n| `default` | 收集对象和分区统计信息。此值仅在 Oracle9*i*\
  \ 及之前版本可用。从 Oracle Database 10*g* 开始，它被 `global and partition` 取代。 |\n| `global`\
  \ | 仅收集对象统计信息。 |\n| `global and partition` | 收集对象和分区统计信息。此值仅从 Oracle Database 10*g*\
  \ 开始可用。 |\n| `partition` | 仅收集分区统计信息。 |\n| `subpartition` | 仅收集子分区统计信息。 |\n\n`cascade`\
  \ 指定是否处理索引。此参数接受值 `TRUE`、`FALSE` 和 `dbms_stats.auto_cascade`。后者是一个计算结果为 `NULL` 的常量，让数据库引擎决定是否收集索引统计信息。直至\
  \ Oracle9*i*，默认值为 `FALSE`，而从 Oracle Database 10*g* 开始，默认值为 `dbms_stats.auto_cascade`（此默认值可以更改；请参阅本章后面的“配置\
  \ dbms_stats 包：10*g* 方式”和“配置 dbms_stats 包：11*g* 方式”部分）。\n`gather_sys` 指定是否处理方案 `sys`。此参数接受值\
  \ `TRUE` 和 `FALSE`。默认值为 `FALSE`。\n`gather_temp` 指定是否处理临时表。由于包 `dbms_stats` 在处理开始时会执行\
  \ `COMMIT`，因此只能处理使用 `on commit preserve rows` 创建的临时表。此参数接受值 `TRUE` 和 `FALSE`。默认值为\
  \ `FALSE`。\n`options` 指定处理哪些对象以及是否处理对象。此参数接受 表 4-7 中列出的值。默认值为 `gather`。\n\n**表 4-7.\
  \ 参数 `options` 接受的值**\n\n| **值** | **含义** |\n| --- | --- |\n| `gather` | 处理所有对象。\
  \ |\n| `gather auto` | 让过程不仅确定要处理的对象，还确定如何处理它们。指定此值时，除 `ownname`、`objlist`、`stattab`、`statid`\
  \ 和 `statown` 外的所有参数都会被忽略。 |\n| `gather stale` | 仅处理对象统计信息已过时的对象。注意：没有对象统计信息的对象不被视为过时。\
  \ |\n| `gather empty` | 仅处理没有对象统计信息的对象。 |\n| `list auto` | 列出将使用 `gather auto` 选项处理的对象。\
  \ |\n| `list stale` | 列出将使用 `gather stale` 选项处理的对象。 |\n| `list empty` | 列出将使用 `gather\
  \ empty` 选项处理的对象。 |\n\n**对象统计信息的过时性**\n\n要识别对象统计信息是否过时，数据库引擎会计算每个对象通过 SQL 语句修改的行数。该计数的结果通过数据字典视图\
  \ `all_tab_modifications`、`dba_tab_modifications` 和 `user_tab_modifications` 对外提供。以下是一个查询示例：\n\
  \n```sql\nSQL> SELECT inserts, updates, deletes, truncated\n   2 FROM user_tab_modifications\n\
  \   3 WHERE table_name = 'T';\n\nINSERTS    UPDATES    DELETES TRUNCATED\n----------\
  \ ---------- ---------- ----------\n       775      16636         66 NO\n```\n\n\
  \n\n\n基于这些信息，`dbms_stats` 包能够判断与特定对象关联的统计信息是否已**过时**。在 Oracle Database 10*g* 及更早版本中，如果有至少\
  \ 10% 的行被修改，则认为统计信息已过时。从 Oracle Database 11*g* 开始，您可以通过参数 `stale_percent` 配置此阈值。其默认值为\
  \ 10%。本章后面的“配置 dbms_stats 包：11*g* 方法”一节将展示如何更改它。\n\n在 Oracle9*i* 中，计数功能仅在表级别显式指定时才会启用。具体来说，这是通过在\
  \ `CREATE TABLE` 或 `ALTER TABLE` 语句中指定 `monitoring` 选项来实现的。为了轻松地为整个模式（甚至整个数据库）启用此功能，`dbms_stats`\
  \ 包分别提供了 `alter_schema_tab_monitoring` 和 `alter_database_tab_monitoring` 过程。请注意，这些过程只是对所有可用表执行\
  \ `ALTER TABLE` 语句。换句话说，此设置对之后创建的表没有影响。\n\n从 Oracle Database 10*g* 开始，`monitoring`\
  \ 选项**已弃用**。计数功能由初始化参数 `statistics_level` 在数据库范围内控制。如果它设置为 `typical`（默认值）或 `all`，则会启用计数。\n\
  \n*   `objlist` 根据参数 `options` 的值，返回已处理或**将**处理的对象列表。这是一个基于 `dbms_stats` 包中定义的类型的输出参数。例如，以下\
  \ PL/SQL 块展示了如何显示已处理对象的列表：\n\n    ```sql\n    SQL> DECLARE\n      2    l_objlist\
  \ dbms_stats.objecttab;\n      3    l_index PLS_INTEGER;\n      4  BEGIN\n     \
  \ 5    dbms_stats.gather_schema_stats(ownname => 'HR',\n      6                \
  \                   objlist => l_objlist);\n      7    l_index := l_objlist.FIRST;\n\
  \      8    WHILE l_index IS NOT NULL\n      9    LOOP\n     10      dbms_output.put(l_objlist(l_index).ownname\
  \ || '.');\n     11      dbms_output.put_line(l_objlist(l_index).objname);\n   \
  \  12      l_index := l_objlist.next(l_index);\n     13    END LOOP;\n     14  END;\n\
  \     15  /\n    HR.COUNTRIES\n    HR.DEPARTMENTS\n    HR.EMPLOYEES\n    HR.JOBS\n\
  \    HR.JOB_HISTORY\n    HR.LOCATIONS\n    HR.REGIONS\n    ```\n\n*   `force` 指定是否覆盖已锁定的统计信息。如果此参数设置为\
  \ `FALSE`，而正在执行的设计用于处理单个表或索引的过程，则会引发错误 (`ORA-20005`)。此参数接受值 `TRUE` 和 `FALSE`。它仅从\
  \ Oracle Database 10*g* Release 2 开始可用。您将在本章后面的“锁定对象统计信息”一节中找到有关锁定统计信息的更多信息。\n\n\
  *   `obj_filter_list` 指定仅收集满足作为参数传递的过滤器中**至少一个**的对象的统计信息。它基于 `dbms_stats` 包本身定义的\
  \ `objecttab` 类型，并且仅从 Oracle Database 11*g* 开始可用。以下 PL/SQL 块展示了如何为模式 HR 的所有表以及模式\
  \ `SH` 中名称以字母 `C` 开头的所有表收集统计信息：\n\n    ```sql\n    DECLARE\n          l_filter dbms_stats.objecttab\
  \ := dbms_stats.objecttab();\n    BEGIN\n          l_filter.extend(2);\n       \
  \   l_filter(1).ownname := 'HR';\n          l_filter(2).ownname := 'SH';\n     \
  \     l_filter(2).objname := 'C%';\n          dbms_stats.gather_database_stats(obj_filter_list\
  \ => l_filter,\n                                           options         => 'gather');\n\
  \    END;\n    ```\n\n## 收集选项\n\n表 4-5 中列出的收集选项参数指定了统计信息收集的进行方式、收集哪些种类的列统计信息，以及相关的\
  \ SQL 游标是否失效。选项如下：\n\n*   `estimate_percent` 指定是否使用采样来收集统计信息。有效值是介于 0.000001 和 100\
  \ 之间的十进制数字。值 100 以及值 `NULL` 表示不采样。常量 `dbms_stats.auto_sample_size`（计算结果为 0）让过程自行确定样本大小。从\
  \ Oracle Database 11*g* 开始，推荐使用此值。顺便提一下，不支持对外部表进行采样。重要的是要理解，此参数指定的值仅是用于收集统计信息的最小百分比。事实上，如下例所示，如果指定的估计百分比被认为太小，该值可能会自动增加。在\
  \ Oracle9*i* 及更早版本中，默认值为 `NULL`；从 Oracle Database 10*g* 开始，默认值为 `dbms_stats.auto_sample_size`（此默认值可以更改；参见本章后面的“配置\
  \ dbms_stats 包：10*g* 方法”和“配置 dbms_stats 包：11*g* 方法”两节）。为了加快对象统计信息的收集，请使用较小的估计百分比；通常小于\
  \ 10% 的值是合适的。对于大表，即使是 0.5%、0.1% 或更少也可能合适。如果您不确定选择，只需尝试不同的估计百分比并比较收集到的统计信息。这样，您可能会找到性能和准确性之间的最佳折中方案。由于当在数据库或模式级别执行统计信息收集时，太小的值会自动增加，因此估计百分比应针对最大的表来选择。\n\
  \n    ```sql\n    SQL> BEGIN\n      2    dbms_stats.gather_schema_stats(ownname\
  \          => user,\n      3                                   estimate_percent\
  \ => 0.5);\n      4  END;\n      5  /\n    ```\n\n    ```sql\n    SQL> SELECT table_name,\
  \ sample_size, num_rows,\n      2         round(sample_size/num_rows*100,1) AS \"\
  %\"\n      3  FROM user_tables\n      4  WHERE num_rows > 0\n      5  ORDER BY table_name;\n\
  \n    TABLE_NAME                     SAMPLE_SIZE   NUM_ROWS       %\n    ------------------------------\
  \ ----------- ---------- -------\n    CAL_MONTH_SALES_MV                      48\
  \         48   100.0\n    CHANNELS                                 5          5\
  \   100.0\n    COSTS                                 5410      81799     6.6\n \
  \   COUNTRIES                               23         23   100.0\n    CUSTOMERS\
  \                             4700      55648     8.4\n    FWEEK_PSCAT_SALES_MV\
  \                  5262      11155    47.2\n    PRODUCTS                       \
  \         72         72   100.0\n    PROMOTIONS                             503\
  \        503   100.0\n    SALES                                 4602     920400\
  \     0.5\n    SUPPLEMENTARY_DEMOGRAPHICS            3739       4487    83.3\n \
  \   TIMES                                 1826       1826   100.0\n    ```\n\n*\
  \   `block_sample` 指定是使用行采样还是块采样来收集统计信息。行采样更准确，而块采样更快。因此，只有在确定数据是随机分布的情况下才应使用块采样。此参数接受值\
  \ `TRUE` 和 `FALSE`。默认值为 `FALSE`。\n\n*   `method_opt` 不仅指定是否收集直方图，还指定在创建直方图时应使用的最大桶数。此外，此参数也可用于完全禁用列统计信息的收集。提供了以下收集模式：⁵\n\
  \n\n\n"
- "# 收集列统计信息和直方图\n\n*   收集不包含直方图的列统计信息。为此，必须指定 `NULL` 或空字符串。\n    *   为所有⁶列收集列统计信息和直方图。所有直方图都使用参数\
  \ `size_clause` 的完全相同的值创建。语法如 图 4-8 所示。例如，使用值 `for all columns size 200` 将为每一列创建一个最多包含\
  \ 200 个桶的直方图。\n    *   仅为列的子集或为所有列收集列统计信息和直方图，但为参数 `size_clause` 指定不同的值。语法如 图 4-9\
  \ 所示。例如，使用值 `for columns size 200 col1, col2, col3, col4 size 1, col5 size 1`，将为五列收集列统计信息，但只为\
  \ `col1`、`col2` 和 `col3` 列收集最多包含 200 个桶的直方图。\n\n在 Oracle9*i* 及之前版本中，默认值为 `for all\
  \ columns size 1`；从 Oracle Database 10*g* 开始，默认值为 `for all columns size auto`（此默认值可以更改；参见本章后面的“配置\
  \ dbms_stats 包：10*g* 方式”和“配置 dbms_stats 包：11*g* 方式”部分）。为简便起见，请使用 `size skewonly`\
  \ 或 `size auto`。如果速度太慢或选择的桶数不合适（或根本未创建所需的直方图），请手动指定列列表。\n\n*   `degree` 指定在收集单个对象的统计信息时使用的从属进程数。要使用对象级别定义的并行度，请指定值\
  \ `NULL`。要让过程自行确定并行度，请指定常量 `dbms_stats.default_degree`。默认值为 `NULL`（从 Oracle Database\
  \ 10*g* 开始，此默认值可以更改；参见本章后面的“配置 dbms_stats 包：10*g* 方式”和“配置 dbms_stats 包：11*g* 方式”部分）。请注意，多个对象的处理是串行化的。这意味着并行化仅对加速大型对象的统计信息收集有用。要同时并行处理多个对象，需要手动并行化（即启动多个作业）。有关并行处理的详细信息，请参阅第\
  \ 11 章。对象统计信息的并行收集仅在企业版中可用。\n*   `no_invalidate` 指定是否使依赖于被处理对象的游标无效。此参数接受值 `TRUE`、`FALSE`\
  \ 和 `dbms_stats.auto_invalidate`。当参数设置为 `TRUE` 时，依赖于已更改对象统计信息的游标不会被无效化，因此可能会照常使用。另一方面，如果设置为\
  \ `FALSE`，则所有游标都会立即无效化。使用值 `dbms_stats.auto_invalidate`（这是一个计算结果为 `NULL` 的常量）时，游标会在一段时间内逐渐无效化。最后一种可能性对于避免重新解析峰值很有用。在\
  \ Oracle9*i* 及之前版本中，默认值为 `FALSE`；从 Oracle Database 10*g* 开始，默认值为 `dbms_stats.auto_invalidate`（此默认值可以更改；参见本章后面的“配置\
  \ dbms_stats 包：10*g* 方式”和“配置 dbms_stats 包：11*g* 方式”部分）。\n\n![image](img/0408.jpg)\n\
  \n**图 4-8.** 使用参数 `size_clause` 的单个值为所有列收集列统计信息和直方图（参见表 4-8）\n\n![image](img/0409.jpg)\n\
  \n**图 4-9.** 仅为列的子集或为所有列收集列统计信息和直方图，但为参数 `size_clause` 指定不同的值（参见表 4-8）。对于未明确指定 `size_clause`\
  \ 的列，将使用默认的 `size_clause`（第一个）。如果未指定任何列，则根本不收集任何列统计信息。`column_clause` 可以是列名、扩展名或扩展。如果指定了不存在的扩展，则会自动创建一个新的扩展。\n\
  \n**表 4-8.** 参数 `size_clause` 接受的值\n\n| **值** | **含义** |\n| --- | --- |\n| `size\
  \ 1..254` | 该值指定桶的最大数量。如果指定 `size 1`，则不创建直方图。在任何情况下，都会正常收集列统计信息。 |\n| `size skewonly`\
  \ | 仅为数据倾斜的列收集直方图。桶的数量由系统自动确定。 |\n| `size auto` | 仅为数据倾斜的列（如 `skewonly`）收集直方图，此外，这些列还必须在\
  \ `WHERE` 子句中被引用过。第二个条件基于 *列使用历史记录*。桶的数量由系统自动确定。 |\n| `size repeat` | 刷新可用的直方图。\
  \ |\n\n"
- "# 列使用历史记录\n\n查询优化器在生成新的执行计划时，会跟踪 `WHERE` 子句中引用了哪些列。然后，这些信息会不时地存储在数据字典表 `col_usage$`\
  \ 中。⁷ 通过如下查询（可在脚本 `col_usage.sql` 中找到），可以知道哪些列在 `WHERE` 子句中被引用过，以及用于何种谓词。`timestamp`\
  \ 列指示上次使用的时间。其他列是使用次数（注意，不是执行次数）的计数。从未在 `WHERE` 子句中被引用的列在表 `col_usage$` 中没有行，因此输出中除\
  \ `name` 外的所有列均为 `NULL`。\n\n```sql\nSQL> SELECT c.name, cu.timestamp,\n  2     \
  \    cu.equality_preds AS equality, cu.equijoin_preds AS equijoin,\n  3        \
  \ cu.nonequijoin_preds AS noneequijoin, cu.range_preds AS range,\n  4         cu.like_preds\
  \ AS \"LIKE\",cu.null_preds AS \"NULL\"\n  5  FROM sys.col$ c, sys.col_usage$ cu,\
  \ sys.obj$ o, sys.user$ u\n  6  WHERE c.obj# = cu.obj# (+)\n  7  AND c.intcol# =\
  \ cu.intcol# (+)\n  8  AND c.obj# = o.obj#\n  9  AND o.owner# = u.user#\n 10  AND\
  \ o.name = 'T'\n 11  AND u.name = user\n 12  ORDER BY c.col#;\n```\n\n```\nNAME\
  \       TIMESTAMP EQUALITY EQUIJOIN NONEEQUIJOIN  RANGE   LIKE   NULL\n----------\
  \ --------- -------- -------- ------------ ------ ------ ------\nID         14-MAY-07\
  \       14       17            0      0      0      0\nVAL1       14-MAY-07    \
  \   15        0            0      0      0      0\nVAL2\nVAL3       14-MAY-07  \
  \      7       18            0      0      0      0\nPAD        13-MAY-07      \
  \  0        7            0      1      0      0\n```\n\n`dbms_stats` 包使用此信息来确定哪些列适合创建直方图。\n\
  \n"
- "# 备份表\n\n表 4-5 中列出的备份表参数受所有用于收集对象统计信息的过程支持。它们指示 `dbms_stats` 包在用新的统计信息覆盖数据字典中的现有统计信息之前，先将当前统计信息备份到一个备份表中。参数如下：\n\
  \n\n\n*   `stattab` 指定一个位于数据字典之外的表，用于存储统计信息。默认值为 `NULL`。\n*   `statid` 是一个可选的标识符，用于识别存储在\
  \ `stattab` 参数指定的表中的多组对象统计信息。虽然过去支持使用任意字符串作为此标识符，但从 Oracle Database 10*g* Release\
  \ 2 开始，仅支持有效的 Oracle 标识符⁸。不过，此限制已被向后移植到之前的版本中。例如，它适用于 9.2.0.8 版本（但不适用于 9.2.0.7 或\
  \ 10.1.0.5）。默认值为 `NULL`。\n*   `statown` 指定 `stattab` 参数所指定表的所有者。默认值为 `NULL`，因此会使用当前用户。\n\
  \n如何创建和删除备份表在“创建和删除备份表”一节中描述。\n\n## 配置 dbms_stats 包：10*g* 方式\n\n在 Oracle Database\
  \ 10*g* 中，你可以更改参数 `cascade`、`estimate_percent`、`degree`、`method_opt`、`no_invalidate`\
  \ 和 `granularity` 的默认值。之所以可能，是因为这些默认值不再硬编码在过程的签名中，而是在运行时从数据字典中提取。过程 `set_param`\
  \ 可用于设置默认值。要执行它，你需要 `analyze any dictionary` 和 `analyze any` 系统权限。函数 `get_param`\
  \ 用于获取默认值。以下示例展示了如何使用它们。注意 `pname` 是参数名，`pval` 是参数值。\n\n```sql\nSQL> execute dbms_output.put_line(dbms_stats.get_param(pname\
  \ => 'CASCADE'))\nDBMS_STATS.AUTO_CASCADE\n\nSQL> execute dbms_stats.set_param(pname\
  \ => 'CASCADE',pval =>'TRUE')\n\nSQL> execute dbms_output.put_line(dbms_stats.get_param(pname\
  \ => 'CASCADE'))\nTRUE\n```\n\n另一个可以用此方法设置的参数是 `autostats_target`。此参数仅由作业 `gather_stats_job`（本章稍后描述）使用，以确定统计信息收集必须处理哪些对象。表\
  \ 4-9 列出了可用的值。默认值为 `AUTO`。\n\n### 表 4-9. `autostats_target` 参数接受的值\n\n| **值** |\
  \ **含义** |\n| --- | --- |\n| `ALL` | 处理所有对象。 |\n| `AUTO` | 由作业决定处理哪些对象。 |\n| `ORACLE`\
  \ | 仅处理属于数据字典的对象。 |\n\n要获取所有参数的默认值，而无需多次执行函数 `get_param`，你可以使用以下查询：⁹\n\n```sql\n\
  SQL> SELECT sname AS parameter, nvl(spare4,sval1) AS default_value\n  2  FROM sys.optstat_hist_control$\n\
  \  3  WHERE sname IN ('CASCADE','ESTIMATE_PERCENT','DEGREE',\n  4              \
  \    'METHOD_OPT','NO_INVALIDATE','GRANULARITY');\nPARAMETER        DEFAULT_VALUE\n\
  ---------------- ---------------------------\nCASCADE          DBMS_STATS.AUTO_CASCADE\n\
  ESTIMATE_PERCENT DBMS_STATS.AUTO_SAMPLE_SIZE\nDEGREE           NULL\nMETHOD_OPT\
  \       FOR ALL COLUMNS SIZE AUTO\nNO_INVALIDATE    DBMS_STATS.AUTO_INVALIDATE\n\
  GRANULARITY      AUTO\n```\n\n要将默认值恢复到原始设置，`dbms_stats` 包提供了过程 `reset_param_defaults`。\n\
  \n## 配置 dbms_stats 包：11*g* 方式\n\n在 Oracle Database 11*g* 中，设置参数默认值（称为 `preferences`）的概念相比\
  \ Oracle Database 10*g* 得到了显著增强。事实上，你不仅能够像在 Oracle Database 10*g* 中那样设置全局默认值，还能够设置模式和表级别的默认值。此外，对于全局默认值，数据字典对象和用户定义对象之间是分离的。这些增强的一个结果是，函数\
  \ `get_param` 以及过程 `set_param` 和 `reset_param_defaults`（在 Oracle Database 10*g*\
  \ 中引入并在上一节描述）已经过时。\n\n你可以更改参数 `cascade`、`estimate_percent`、`degree`、`method_opt`、`no_invalidate`、`granularity`、`publish`、`incremental`\
  \ 和 `stale_percent` 的默认值。要更改它们，`dbms_stats` 包中提供了以下过程：\n\n*   `set_global_prefs`\
  \ 设置全局首选项。它替代了过程 `set_param`。\n*   `set_database_prefs` 设置数据库首选项。全局和数据库首选项之间的区别在于，后者不用于数据字典对象。换句话说，数据库首选项仅用于用户定义对象。\n\
  *   `set_schema_prefs` 设置特定模式的首选项。\n*   `set_table_prefs` 设置特定表的首选项。\n\n重要的是要注意，过程\
  \ `set_database_prefs` 和 `set_schema_prefs` 并不直接将首选项存储在数据字典中。相反，它们在调用过程时被转换为数据库或模式中所有可用对象的表首选项。实际上，只存在全局和表首选项。基本上，过程\
  \ `set_database_prefs` 和 `set_schema_prefs` 只是过程 `set_table_prefs` 的简单封装。这意味着全局首选项将用于新表。\n\
  \n以下 PL/SQL 块展示了如何为参数 `cascade` 设置不同的值。注意 `pname` 是参数名，`pvalue` 是参数值，`ownname` 是所有者，`tabname`\
  \ 是表名。再次强调，要小心，因为在此类 PL/SQL 块中调用的顺序至关重要。实际上，每次调用都会覆盖先前调用所做的定义。\n\n```sql\nBEGIN\n\
  \  dbms_stats.set_database_prefs(pname  => 'CASCADE',\n                        \
  \        pvalue => 'DBMS_STATS.AUTO_CASCADE');\n  dbms_stats.set_schema_prefs(ownname\
  \ => 'SCOTT',\n                              pname   => 'CASCADE',\n           \
  \                   pvalue  => 'FALSE');\n  dbms_stats.set_table_prefs(ownname =>\
  \ 'SCOTT',\n                             tabname => 'EMP',\n                   \
  \          pname   => 'CASCADE',\n                             pvalue  => 'TRUE');\n\
  END;\n```\n\n要获取当前设置，可以使用函数 `get_prefs`，它替代了函数 `get_param`。以下查询展示了对前面 PL/SQL 块执行设置的效果。注意\
  \ `pname` 是参数名，`ownname` 是所有者名称，`tabname` 是表名称。如你所见，根据指定的参数，函数会返回特定级别的值。这种首选项的查找过程如图\
  \ 4-10 所示。\n\n```sql\nSQL> SELECT dbms_stats.get_prefs(pname => 'cascade') AS global,\n\
  \  2         dbms_stats.get_prefs(pname   => 'cascade',\n  3                   \
  \           ownname => 'SCOTT',\n  4                              tabname =>'EMP')\
  \ AS emp,\n  5         dbms_stats.get_prefs(pname   => 'cascade',\n  6         \
  \                     ownname => 'SCOTT',\n  7                              tabname\
  \ =>'DEPT') AS dept\n  8  FROM dual;\n\nGLOBAL                     EMP        DEPT\n\
  -------------------------  ---------- ----------\nDBMS_STATS.AUTO_CASCADE    TRUE\
  \       FALSE\n```\n\n![image](img/0410.jpg)\n\n\n\n**图 4-10.** 在查找首选项时，表设置优先于全局首选项。\n\
  \n要获取全局首选项而无需多次执行 `get_param` 函数（如前一节所述），可以查询内部数据字典表 `optstat_hist_control$`。要获取表的首选项，也可以运行以下查询。请注意，即使在前面的\
  \ PL/SQL 块中配置是在模式级别进行的，数据字典视图 `dba_tab_stat_prefs` 也会显示该设置。\n\n```sql\nSQL> SELECT\
  \ table_name, preference_name, preference_value\n  2  FROM dba_tab_stat_prefs\n\
  \  3  WHERE owner = 'SCOTT'\n  4  AND table_name IN ('EMP','DEPT')\n  5  ORDER BY\
  \ table_name, preference_name;\n\nTABLE_NAME PREFERENCE_NAME PREFERENCE_VALUE\n\
  ---------- --------------- ----------------\nDEPT       CASCADE         FALSE\n\
  EMP        CASCADE         TRUE\n```\n\n要清除首选项，`dbms_stats` 包提供了以下过程：\n\n*   `reset_global_pref_defaults`\
  \ 将全局首选项重置为默认值。\n*   `delete_database_prefs` 删除数据库级别的首选项。\n*   `delete_schema_prefs`\
  \ 删除模式级别的首选项。\n*   `delete_table_prefs` 删除表级别的首选项。\n\n以下调用展示了如何删除模式 `scott` 的首选项：\n\
  \n```sql\ndbms_stats.delete_schema_prefs(ownname => 'SCOTT',\n                 \
  \              pname   => 'CASCADE')\n```\n\n要在全局和数据库级别执行这些过程，您需要同时拥有系统权限 `analyze\
  \ any dictionary` 和 `analyze any`。要在模式或表级别执行这些过程，您需要以所有者身份连接或拥有系统权限 `analyze any`。\n\
  \n## 处理待处理统计信息\n\n通常，一旦统计信息收集完成，对象统计信息就会被发布（即提供）给查询优化器。这意味着无法（例如出于测试目的）在收集统计信息时不覆盖当前的对象统计信息。当然，测试数据库应用于测试目的，但有时可能无法做到这一点；您可能希望在生产环境中进行。一个例子是测试数据库中存储的数据与生产数据库中的数据不同。\n\
  \n从 Oracle Database *11g* 开始，可以将收集统计信息与发布它们分开，并且可以使用未发布的对象统计信息（称为 *pending statistics*）进行测试。以下是步骤（脚本\
  \ `pending_object_statistics.sql` 中提供了完整示例）：\n\n1.  通过将首选项 `publish` 设置为 `FALSE`（默认值为\
  \ `TRUE`）来禁用自动发布。如前一节所述，对于其他首选项，这可以在全局、数据库、模式或表级别完成。以下示例展示了如何为当前用户的表 `t` 进行设置：\n\
  \    ```sql\n    dbms_stats.set_table_prefs(ownname => user,\n                 \
  \              tabname => 'T',\n                               pname   => 'PUBLISH',\n\
  \                               pvalue  => 'FALSE')\n    ```\n2.  为当前用户的表 `t` 收集对象统计信息。由于此表的首选项\
  \ `publish` 设置为 `FALSE`，新收集的对象统计信息不会被发布。这意味着查询优化器将继续使用收集之前的可用统计信息。同时，依赖于该表的游标不会被失效。\n\
  \    ```sql\n    dbms_stats.gather_table_stats(ownname => user, tabname => 'T')\n\
  \    ```\n3.  要测试新对象统计信息对一组 SQL 语句或应用程序的影响，您可以在会话级别将动态初始化参数 `optimizer_use_pending_statistics`\
  \ 设置为 `TRUE`。在此设置下，待处理统计信息仅对当前会话可用。\n    ```sql\n    ALTER SESSION SET optimizer_use_pending_statistics\
  \ = TRUE\n    ```\n4.  如果测试成功，可以通过调用过程 `publish_pending_stats` 来发布待处理统计信息（换句话说，使其对所有用户可用）。以下示例展示了如何为单个表执行此操作。如果参数\
  \ `tabname` 设置为 `NULL`，则会发布指定模式的所有待处理统计信息。此过程还有两个附加参数。第三个参数 `no_invalidate` 控制依赖于修改后对象统计信息的游标是否失效。第四个参数\
  \ `force` 用于覆盖统计信息的潜在锁（本章后面的“锁定对象统计信息”一节描述了此类锁）。其默认值为 `FALSE`，这意味着默认情况下锁会被遵守。\n\
  \    ```sql\n    dbms_stats.publish_pending_stats(ownname => user, tabname => 'T')\n\
  \    ```\n5.  如果测试不成功，您可以通过调用过程 `delete_pending_stats` 删除待处理统计信息。如果未指定参数 `tabname`\
  \ 或其设置为 `NULL`，则会删除由 `ownname` 参数指定的整个模式的待处理统计信息。\n    ```sql\n    dbms_stats.delete_pending_stats(ownname\
  \ => user, tabname => 'T')\n    ```\n\n要执行过程 `publish_pending_stats` 和 `delete_pending_stats`，您需要以所有者身份连接或拥有系统权限\
  \ `analyze any`。\n\n如果您有兴趣了解待处理统计信息的值，以下数据字典视图提供了所有必要的信息。每个视图都有对应的 `dba` 和 `all`\
  \ 版本。\n\n*   `user_tab_pending_stats` 显示待处理的表统计信息。\n*   `user_ind_pending_stats`\
  \ 显示待处理的索引统计信息。\n*   `user_col_pending_stats` 显示待处理的列统计信息。\n*   `user_tab_histgrm_pending_stats`\
  \ 显示待处理的直方图。\n\n这些数据字典视图的内容和结构分别与 `user_tab_statistics`、`user_ind_statistics`、`user_tab_col_statistics`\
  \ 和 `user_tab_histograms` 相似。\n\n## 调度统计信息收集：10g 方式\n\n作业 `gather_stats_job` 是使用调度程序（Scheduler）进行调度的。¹⁰\
  \ 当前配置（在以下示例中是 Oracle Database 10*g* 的默认配置）可以通过以下查询显示。输出由脚本 `dbms_stats_job_10g.sql`\
  \ 生成。\n\n```sql\nSQL> SELECT program_name, schedule_name, schedule_type, enabled,\
  \ state\n  2  FROM dba_scheduler_jobs\n  3  WHERE owner = 'SYS'\n  4  AND job_name\
  \ = 'GATHER_STATS_JOB';\n```\n\n\n\n"
- "# Oracle 数据库统计信息收集调度配置\n\n## Oracle Database 10g\n\n以下查询展示了 Oracle Database 10g\
  \ 中默认的统计信息收集作业配置。\n\n```sql\nPROGRAM_NAME      SCHEDULE_NAME            SCHEDULE_TYPE\
  \   ENABLED STATE\n----------------- ------------------------ --------------- ---------\n\
  GATHER_STATS_PROG MAINTENANCE_WINDOW_GROUP WINDOW_GROUP    TRUE    SCHEDULED\n```\n\
  \n```sql\nSQL> SELECT program_action, number_of_arguments, enabled\n  2  FROM dba_scheduler_programs\n\
  \  3  WHERE owner = 'SYS'\n  4  AND program_name = 'GATHER_STATS_PROG';\n\nPROGRAM_ACTION\
  \                                   NUMBER_OF_ARGUMENTS ENABLED\n-----------------------------------------------\
  \ ------------------- -------\ndbms_stats.gather_database_stats_job_proc       \
  \                    0 TRUE\n```\n\n```sql\nSQL> SELECT w.window_name, w.repeat_interval,\
  \ w.duration, w.enabled\n  2  FROM dba_scheduler_wingroup_members m, dba_scheduler_windows\
  \ w\n  3  WHERE m.window_name = w.window_name\n  4  AND m.window_group_name = 'MAINTENANCE_WINDOW_GROUP';\n\
  \nWINDOW_NAME      REPEAT_INTERVAL                           DURATION      ENABLED\n\
  ---------------- ----------------------------------------- ------------- -------\n\
  WEEKNIGHT_WINDOW freq=daily;byday=MON,TUE,WED,THU,FRI; +000 08:00:00 TRUE\n    \
  \             byhour=22;byminute=0; bysecond=0\nWEEKEND_WINDOW   freq=daily;byday=SAT;byhour=0;byminut\
  \ +002 00:00:00 TRUE\n                 e=0;bysecond=0\n```\n\n### 配置摘要\n\n*   该作业执行程序`gather_stats_prog`，并能够运行在窗口组`maintenance_window_group`内。\n\
  *   程序`gather_stats_prog`无参数地调用包`dbms_stats`中的过程`gather_database_stats_job_proc`。由于没有向其传递参数，改变其行为的唯一方法是更改包`dbms_stats`的默认配置，如本章前面的“配置\
  \ dbms_stats 包：10g 方式”一节所述。请注意，此过程未记录在案，并标记为“仅供内部使用”。\n*   窗口组`maintenance_window_group`有两个成员：窗口`weeknight_window`和窗口`weekend_window`。前者每周一至周五每晚开放八小时。后者在周六和周日开放。对象统计信息的收集发生在这两个窗口之一打开时。\n\
  *   作业、程序和窗口均已启用。\n\n### 修改调度配置\n\n应检查默认调度的开放时间和持续时间，并在必要时进行更改以匹配预期的统计信息收集频率。如果可能，它们应与低利用率时间段匹配。\n\
  \n每次作业因窗口关闭而停止时，都会生成一个跟踪文件，其中包含所有未处理对象的列表。以下是此类跟踪文件的摘录：\n\n```\nGATHER_STATS_JOB:\
  \ Stopped by Scheduler.\nConsider increasing the maintenance window duration if\
  \ this happens frequently.\nThe following objects/segments were not analyzed due\
  \ to timeout:\n  TABLE: \"SH\".\"SALES\".\"SALES_1995\"\n  TABLE: \"SH\".\"SALES\"\
  .\"SALES_1996\"\n  TABLE: \"SH\".\"SALES\".\"SALES_H1_1997\"\n...\n  TABLE: \"SYS\"\
  .\"WRI$_OPTSTAT_AUX_HISTORY\"\"\"\n  TABLE: \"SYS\".\"WRI$_ADV_OBJECTS\".\"\n  TABLE:\
  \ \"SYS\".\"WRI$_OPTSTAT_HISTGRM_HISTORY\"\"\"\nerror 1013 in job queue process\n\
  ORA-01013:user requested cancel of current operation\n```\n\n### 启用或禁用作业\n\n要启用或禁用作业`gather_stats_job`，可以使用以下\
  \ PL/SQL 调用：\n\n```sql\ndbms_scheduler.enable(name => 'sys.gather_stats_job')\n\
  dbms_scheduler.disable(name => 'sys.gather_stats_job')\n```\n\n默认情况下，只有用户`sys`能够执行它们。其他用户需要`alter`对象特权。执行以下\
  \ SQL 语句后，用户`system`将能够更改或删除作业`gather_stats_job`：\n\n```sql\nGRANT ALTER ON gather_stats_job\
  \ TO system\n```\n\n## Oracle Database 11g\n\n### 调度统计信息收集：11g 方式\n\n从 Oracle Database\
  \ 11g 开始，对象统计信息的收集被集成到使用 Scheduler 安排的自动化维护任务中。因此，在 Oracle Database 10g 中使用的作业`gather_stats_job`不再存在。当前配置（在以下示例中是\
  \ Oracle Database 11g 的默认配置）可以通过以下查询查看。输出由脚本`dbms_stats_job_11g.sql`生成。\n\n```sql\n\
  SQL> SELECT task_name, status\n  2  FROM dba_autotask_task\n  3  WHERE client_name\
  \ = 'auto optimizer stats collection';\n\nTASK_NAME         STATUS\n-----------------\
  \ -------\ngather_stats_prog ENABLED\n```\n\n```sql\nSQL> SELECT program_action,\
  \ number_of_arguments, enabled\n  2  FROM dba_scheduler_programs\n  3  WHERE owner\
  \ = 'SYS'\n  4  AND program_name = 'GATHER_STATS_PROG';\n\nPROGRAM_ACTION      \
  \                             NUMBER_OF_ARGUMENTS ENABLED\n-----------------------------------------------\
  \ ------------------- -------\ndbms_stats.gather_database_stats_job_proc       \
  \                    0 TRUE\n```\n\n```sql\nSQL> SELECT w.window_name, w.repeat_interval,\
  \ w.duration, w.enabled\n  2  FROM dba_autotask_window_clients c, dba_scheduler_windows\
  \ w\n  3  WHERE c.window_name = w.window_name\n  4  AND c.optimizer_stats = 'ENABLED';\n\
  \nWINDOW_NAME      REPEAT_INTERVAL                             DURATION      ENABLED\n\
  ---------------- ------------------------------------------- ------------- -------\n\
  MONDAY_WINDOW    freq=daily;byday=MON;byhour=22;byminute=0; +000 04:00:00 TRUE\n\
  \                 bysecond=0\nTUESDAY_WINDOW   freq=daily;byday=TUE;byhour=22;byminute=0;\
  \ +000 04:00:00 TRUE\n                 bysecond=0\nWEDNESDAY_WINDOW freq=daily;byday=WED;byhour=22;byminute=0;\
  \ +000 04:00:00 TRUE\n                 bysecond=0\nTHURSDAY_WINDOW  freq=daily;byday=THU;byhour=22;byminute=0;\
  \ +000 04:00:00 TRUE\n                 bysecond=0\nFRIDAY_WINDOW    freq=daily;byday=FRI;byhour=22;byminute=0;\
  \ +000 04:00:00 TRUE\n                 bysecond=0\nSATURDAY_WINDOW  freq=daily;byday=SAT;byhour=6;byminute=0;\
  \  +000 20:00:00 TRUE\n                 bysecond=0\nSUNDAY_WINDOW    freq=daily;byday=SUN;byhour=6;byminute=0;\
  \  +000 20:00:00 TRUE\n                 bysecond=0\n```\n\n### 配置摘要\n\n*   程序`gather_stats_prog`无参数地调用包`dbms_stats`中的过程`gather_database_stats_job_proc`。由于没有向其传递参数，改变其行为的唯一方法是更改包`dbms_stats`的默认配置，如本章前面的“配置\
  \ dbms_stats 包：11g 方式”一节所述。请注意，此过程未记录在案，并标记为“仅供内部使用”。\n*   自动维护任务使用的窗口组有七个成员，每周一天。从周一到周五，它每天开放四小时。对于周六和周日，它每天开放\
  \ 20 小时。对象统计信息的收集发生在这些窗口之一打开时。\n*   维护任务、程序和窗口均已启用。\n\n### 修改调度配置\n\n应检查默认调度的开放时间和持续时间，并在必要时进行更改以匹配预期的统计信息收集频率。如果可能，它们应与低利用率时间段匹配。\n\
  \n### 启用或禁用维护任务\n\n要完全启用或禁用维护任务，可以使用以下 PL/SQL 调用。通过将参数`windows_name`设置为非`NULL`值，也可以仅针对单个窗口启用或禁用维护任务。\n\
  \n```sql\ndbms_auto_task_admin.enable(client_name => 'auto optimizer stats collection',\n\
  \                            operation   => NULL,\n                            window_name\
  \ => NULL)\n```\n\n```sql\ndbms_auto_task_admin.disable(client_name => 'auto optimizer\
  \ stats collection',\n                             operation   => NULL,\n      \
  \                       window_name => NULL)\n```\n\n\n\n#### 锁定对象统计信息\n\n在某些情况下，你希望确保数据库某部分的对象统计信息无法被更改，这可能是因为无法收集统计信息（例如由于缺陷），或者出于某些原因你必须使用非最新的对象统计信息。\n\
  \n自 Oracle Database 10*g* 起，可以显式地锁定对象统计信息。你可以通过执行 `dbms_stats` 包中的以下某个过程来实现。请注意，这些锁与常规的数据库锁无关。实际上，它们是在数据字典中设置于表级别的简单标志。\n\
  \n## 锁定统计信息\n\n*   `lock_schema_stats` 锁定属于某个模式的所有表的对象统计信息：\n    `dbms_stats.lock_schema_stats(ownname\
  \ => user)`\n*   `lock_table_stats` 锁定单个表的对象统计信息：\n    `dbms_stats.lock_table_stats(ownname\
  \ => user, tabname => 'T')`\n\n## 解锁统计信息\n\n自然，也可以移除这些锁。这是通过执行以下某个过程完成的：\n\n*  \
  \ `unlock_schema_stats` 移除属于某个模式的所有表的对象统计信息的锁；即使是通过 `lock_table_stats` 过程设置的锁也会被移除：\n\
  \    `dbms_stats.unlock_schema_stats(ownname => user)`\n*   `unlock_table_stats`\
  \ 移除单个表的对象统计信息的锁：\n    `dbms_stats.unlock_table_stats(ownname => user, tabname =>\
  \ 'T')`\n\n要执行这四个过程，你需要以所有者身份连接，或者拥有 `analyze any` 系统权限。\n\n## 行为和错误\n\n当表的对象统计信息被锁定时，所有依赖于该表的对象统计信息（包括表统计信息、列统计信息、直方图以及所有依赖索引上的索引统计信息）都被视为已锁定。\n\
  \n当表的对象统计信息被锁定时，`dbms_stats` 包中修改单个表对象统计信息的过程（例如 `gather_table_stats`）会引发错误（`ORA-20005`）。相比之下，操作多个表的过程（例如\
  \ `gather_schema_stats`）会跳过被锁定的表。自 Oracle Database 10*g* Release 2 起，大多数修改对象统计信息的过程可以通过将参数\
  \ `force` 设置为 `TRUE` 来覆盖锁定。\n\n## 示例：锁定与覆盖\n\n以下示例演示了此行为（完整示例请参见脚本 `lock_statistics.sql`）：\n\
  \n```\nSQL> BEGIN\n  2    dbms_stats.lock_schema_stats(ownname => user);\n  3  END;\n\
  \  4  /\n\nSQL> BEGIN\n  2    dbms_stats.gather_table_stats(ownname => user,\n \
  \ 3                                  tabname => 'T');\n  4  END;\n  5  /\nBEGIN\n\
  *\nERROR at line 1:\nORA-20005: object statistics are locked (stattype = ALL)\n\
  ORA-06512: at \"SYS.DBMS_STATS\",line 17806\nORA-06512: at \"SYS.DBMS_STATS\", line\
  \ 17827\nORA-06512: at line 2\n\nSQL> BEGIN\n  2    dbms_stats.gather_table_stats(ownname\
  \ => user,\n  3                                  tabname => 'T',\n  4          \
  \                        force   => TRUE);\n  5  END;\n  6  /\nSQL> BEGIN\n  2 \
  \   dbms_stats.gather_schema_stats(ownname => user);\n  3  END;\n  4  /\n```\n\n\
  ## 检查哪些表被锁定\n\n要了解哪些表被锁定，你可以使用类似以下的查询：\n\n```\nSQL> SELECT table_name\n  2  FROM\
  \ user_tab_statistics\n  3  WHERE stattype_locked IS NOT NULL;\n\nTABLE_NAME\n--------------------\n\
  T\n```\n\n## 对其他工具的影响\n\n请注意，`dbms_stats` 包并不是唯一收集对象统计信息并因此受对象统计信息锁定影响的工具。实际上，SQL\
  \ 命令 `ANALYZE`、`CREATE INDEX` 和 `ALTER INDEX` 也会收集对象统计信息。第一个命令在被显式指示时收集对象统计信息。后两个命令默认自\
  \ Oracle Database 10*g* 起（参见侧边栏 \"`COMPUTE STATISTICS CLAUSE`\"），每次构建索引时都会收集统计信息。因此，当表的对象统计信息被锁定时，这些\
  \ SQL 语句可能会失败。\n\n以下示例（是前一个示例的延续）展示了此行为：\n\n```\nSQL> ANALYZE TABLE t COMPUTE STATISTICS;\n\
  ANALYZE TABLE t COMPUTE STATISTICS\n*\nERROR at line 1:\nORA-38029: object statistics\
  \ are locked\n\nSQL> CREATE INDEX t_i ON t (pad) COMPUTE STATISTICS;\nCREATE INDEX\
  \ t_i ON t (pad) COMPUTE STATISTICS\n                        *\nERROR at line 1:\n\
  ORA-38029: object statistics are locked\n\nSQL> CREATE INDEX t_i ON t (pad);\n\n\
  SQL> ALTER INDEX t_pk REBUILD COMPUTE STATISTICS;\nALTER INDEX t_pk REBUILD COMPUTE\
  \ STATISTICS\n*\nERROR at line 1:\nORA-38029: object statistics are locked\n\nSQL>\
  \ ALTER INDEX t_pk REBUILD;\n```\n\n`COMPUTE STATISTICS CLAUSE`\n\n你可以将 `COMPUTE\
  \ STATISTICS` 子句添加到 SQL 语句 `CREATE INDEX` 和 `ALTER INDEX` 中。它指示它们在创建或重建索引时收集索引统计信息并将其存储在数据字典中。这很有用，因为在执行这些\
  \ SQL 语句时收集统计信息的开销可以忽略不计。在 Oracle9*i* 中，仅当指定了此子句时才执行统计信息的收集。自 Oracle Database 10*g*\
  \ 起，只要统计信息未被锁定，默认就会收集它们，这意味着 `COMPUTE STATISTICS` 子句已弃用，仅用于向后兼容。\n\n\n\n#### 比较对象统计信息\n\
  \n在以下三种常见情况下，您最终会为同一个对象拥有几组对象统计信息：\n\n*   当您指示包 `dbms_stats`（通过参数 `statown`、`stattab`\
  \ 和 `statid`）在用户自定义的表中备份当前统计信息时。\n*   从 Oracle Database `10g` 开始，每当使用包 `dbms_stats`\
  \ 收集统计信息时。在这种情况下，该包会自动保留对象统计信息的历史记录，而不是在收集到新集合时简单地覆盖它们。您可以在本章后面的“统计信息历史”一节中找到有关如何管理该历史的更多信息。\n\
  *   从 Oracle Database `11g` 开始，当您收集待定统计信息时。\n\n想要知道两组对象统计信息之间有什么不同是很正常的。从 Oracle\
  \ Database `10g` 补丁集 `10.2.0.4` 开始，您不再需要自己编写查询来进行此类比较。您可以简单地利用包 `dbms_stats` 中的新函数。\n\
  \n以下示例（摘自脚本 `comparing_object_statistics.sql` 的输出）展示了您将获得的报告类型。请注意，在第一部分中，您可以看到用于比较的参数：模式名和表名、两个源（A\
  \ 和 B）的定义以及一个阈值。最后一个参数指定是否仅显示两组统计信息之间差异（百分比）超过指定阈值的统计信息。例如，如果您有两个值 100 和 115，则仅当阈值设置为\
  \ 15 或更小时，它们才被视为不同。默认值为 `10`。要显示所有统计信息，可以使用值 `0`。\n\n`###############################################################################`\n\
