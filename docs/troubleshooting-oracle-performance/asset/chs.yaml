  S\".\"CUST_ID\"=\"C0\")\n   17 - access(\"P\".\"PROD_SUBCATEGORY\"='Cameras')\n\
  \   18 - access(\"S\".\"PROD_ID\"=\"P\".\"PROD_ID\")\n   23 - access(\"S\".\"CUST_ID\"\
  =\"C0\")\n```\n\n## 位图连接索引技术\n\n第二种优化技术基于位图连接索引 (`bitmap-join indexes`)。其核心思想是避免维表与事实表上相应位图索引之间的“连接”操作。为此，需要在事实表上创建位图连接索引，并索引维表中的一个或多个列。\n\
  \n例如，为了应用过滤条件 `c.cust_year_of_birth BETWEEN 1970 AND 1979` 和 `p.prod_subcategory='Cameras'`，需要创建以下索引：\n\
  \n```sql\nCREATE BITMAP INDEX sales_cust_year_of_birth_bix ON sales (c.cust_year_of_birth)\n\
  FROM sales s, customers c\nWHERE s.cust_id = c.cust_id\nLOCAL\n\nCREATE BITMAP INDEX\
  \ sales_prod_subcategory_bix ON sales (p.prod_subcategory)\nFROM sales s, products\
  \ p\nWHERE s.prod_id = p.prod_id\nLOCAL\n```\n\n应用这两个索引后，将得到如下执行计划。请注意，生成 `rowids`\
  \ 的方法（第 9 至 13 行）比之前的例子直接得多。实际上，它不再需要访问维表并与事实表上的位图索引进行连接，只需直接访问位图连接索引即可。这是因为关联维度行的值已经存储在事实表的位图连接索引中。\n\
  \n```\n -------------------------------------------------------------------------------\n\
  \ | Id  | Operation                              | Name                        \
  \ |\n -------------------------------------------------------------------------------\n\
  \ |   0 | SELECT STATEMENT                       |                             \
  \ |\n |   1 |  SORT ORDER BY                         |                         \
  \     |\n |   2 |   HASH GROUP BY                        |                     \
  \         |\n |*  3 |    HASH JOIN                           |                 \
  \             |\n |   4 |     TABLE ACCESS FULL                  | TIMES       \
  \                 |\n |*  5 |    HASH JOIN                           |         \
  \                     |\n |*  6 |     TABLE ACCESS FULL                  | CUSTOMERS\
  \                    |\n |   7 |     PARTITION RANGE ALL                |      \
  \                        |\n |   8 |      TABLE ACCESS BY LOCAL INDEX ROWID | SALES\
  \                        |\n |   9 |        BITMAP CONVERSION TO ROWIDS     |  \
  \                            |\n |  10 |         BITMAP AND                    \
  \ |                              |\n |* 11 |          BITMAP INDEX SINGLE VALUE\
  \     | SALES_PROD_SUBCATEGORY_BIX   |\n |  12 |         BITMAP MERGE          \
  \         |                              |\n |* 13 |           BITMAP INDEX RANGE\
  \ SCAN      | SALES_CUST_YEAR_OF_BIRTH_BIX |\n -------------------------------------------------------------------------------\n\
  ```\n\n```\n    3 - access(\"S\".\"TIME_ID\"=\"T\".\"TIME_ID\")\n    5 - access(\"\
  S\".\"CUST_ID\"=\"C\".\"CUST_ID\")\n    6 - filter(\"C\".\"CUST_YEAR_OF_BIRTH\"\
  >=1970 AND \"C\".\"CUST_YEAR_OF_BIRTH\"<=1979)\n   11 - access(\"S\".\"SYS_NC00009$\"\
  ='Cameras')\n   13 - access(\"S\".\"SYS_NC00008$\">=1970 AND \"S\".\"SYS_NC00008$\"\
  <=1979)\n```\n\n## 星型转换总结\n\n星型转换 (`star transformation`) 是一种基于代价的转换。因此，当启用时，查询优化器不仅会判断是否值得使用它，还会判断临时表和/或位图连接索引是否对高效执行\
  \ SQL 语句有用。此特性的使用也可以通过提示 `star_transformation` 和 `no_star_transformation` 来控制。但需注意，即使指定了提示\
  \ `star_transformation`，也不能保证一定会发生星型转换。此行为也有明确的文档说明。\n\n## 下一章预告\n\n### 前往 第 11\
  \ 章：超越数据访问与连接优化\n\n本章描述了与连接相关的两个主要内容。首先，介绍了数据库引擎执行连接的方法（嵌套循环连接、归并连接和哈希连接），以及何时适合使用每种方法。其次，介绍了一些查询优化器为扩大搜索空间而应用的转换技术。\n\
  \n既然已经讨论了基本的访问路径和连接方法，现在该看看高级优化技术了。在下一章中，我将讨论物化视图、结果缓存、并行处理和直接路径插入。虽然这些功能不常使用，但如果应用得当，它们可以极大地提升性能。是时候超越访问和连接优化了。\n\
  \n***\n\n1. 注意，这种类型的外连接未在 SQL:2003 标准中指定，但预计会在下一版 SQL 标准中包含。\n\n\n### 第 11 章\n####\
  \ 超越数据访问与连接优化\n\n在考虑本章介绍的高级优化技术之前，必须先优化好数据访问和连接操作。实际上，本章描述的技术仅用于在其他方法无法提升性能时进一步改善性能。换句话说，你应该先打好基础，如果性能仍不达标，再考虑采用特殊手段。\n\
  \n本章将介绍物化视图、结果缓存、并行处理、直接路径插入、行预取以及数组接口的工作原理及其提升性能的方法。每个描述优化技术的章节都采用相同的组织结构：先进行简要介绍，接着描述该技术的工作原理及适用场景，最后以常见陷阱和误区的讨论收尾。\n\
  \n***\n\n**注意** 本章的几条 SQL 语句包含提示（hints），目的是向你展示其用法示例。在任何情况下，这些语句都既非真实引用，也未提供完整语法。你可以在\
  \ `SQL 参考`手册的第 2 章中找到这些内容。\n\n***\n\n***\n\n**注意** 本章展示了不同性能测试的结果。性能数据仅用于帮助你比较不同类型的处理方式，并让你对其影响有所感受。请记住，每个系统和每个应用都有其自身特点。因此，根据应用环境的不同，每种技术的适用性可能差异很大。\n\
  \n***\n\n##### 物化视图\n\n`视图`是一种基于创建时指定的查询结果集返回的虚拟表。每次访问视图时，都会执行该查询。为了免于每次访问都执行查询，可以将查询结果集存储在`物化视图`中。换言之，物化视图只是对已存储在其他地方的数据进行转换和复制。\n\
  \n***\n\n**注意** 物化视图也可用于分布式环境，以在数据库之间复制数据。本书不涉及此种用法。\n\n***\n\n###### 工作原理\n\n以下章节描述了物化视图是什么及其工作原理。在描述了物化视图所基于的概念之后，将详细探讨查询重写和刷新。\n\
  \n#### 概念\n\n假设你需要优化以下查询（可在脚本 `mv.sql` 中找到）的性能，该查询基于示例模式 `sh`（`示例模式`手册对此有完整描述）。\n\
  \n```sql\nSELECT p.prod_category, c.country_id,\n       sum(s.quantity_sold) AS\
  \ quantity_sold,\n       sum(s.amount_sold) AS amount_sold\nFROM sales s, customers\
  \ c, products p\nWHERE s.cust_id = c.cust_id\nAND s.prod_id = p.prod_id\nGROUP BY\
  \ p.prod_category, c.country_id\nORDER BY p.prod_category, c.country_id\n```\n\n\
  如果你运用第 6 章和第 9 章中描述的方法和规则来评估执行计划的效率，你会发现一切良好。估算结果非常出色，而且不同访问路径每返回一行的逻辑读取次数都非常低。\n\
  \n```\n------------------------------------------------------------------------\n\
  | Id  | Operation               | Name      | E-Rows | A-Rows | Buffers|\n------------------------------------------------------------------------\n\
  |   1 |  SORT GROUP BY          |           |     68 |     81 |   3844 |\n|*  2\
  \ |   HASH JOIN             |           |    918K|    918K|   3844 |\n|   3 |  \
  \  TABLE ACCESS FULL    | PRODUCTS  |     72 |     72 |     11 |\n|*  4 |    HASH\
  \ JOIN            |           |    918K|    918K|   3833 |\n|   5 |     TABLE ACCESS\
  \ FULL   | CUSTOMERS |  55500 |  55500 |   1457 |\n|   6 |     PARTITION RANGE ALL\
  \ |           |    918K|    918K|   2376 |\n|   7 |      TABLE ACCESS FULL  | SALES\
  \     |    918K|    918K|   2376 |\n------------------------------------------------------------------------\n\
  \n   2 - access(\"S\".\"PROD_ID\"=\"P\".\"PROD_ID\")\n   4 - access(\"S\".\"CUST_ID\"\
  =\"C\".\"CUST_ID\")\n```\n\n问题在于聚合操作发生前处理的数据量太大。仅仅改变访问路径或连接方法无法提升性能，因为它们已经处于最优状态；换句话说，其潜力已完全发挥。现在是时候应用高级优化技术了。让我们基于待优化的查询创建一个物化视图。\n\
  \n物化视图通过 `CREATE MATERIALIZED VIEW` 语句创建。最简单的情况下，你需要指定名称及该物化视图所基于的查询。注意，物化视图所基于的表称为`基表`（又称`主表`）。以下\
  \ SQL 语句和图 11-1 对此进行了说明（请注意，原始查询中的 `ORDER BY` 子句被省略了）：\n\n```sql\nCREATE MATERIALIZED\
  \ VIEW sales_mv\nAS\nSELECT p.prod_category, c.country_id,\n       sum(s.quantity_sold)\
  \ AS quantity_sold,\n       sum(s.amount_sold) AS amount_sold\nFROM sales s, customers\
  \ c, products p\nWHERE s.cust_id = c.cust_id\nAND s.prod_id = p.prod_id\nGROUP BY\
  \ p.prod_category, c.country_id\n```\n\n![image](img/1101.jpg)\n\n**图 11-1.** *物化视图的创建*\n\
  \n***\n\n**注意** 当你基于包含 `ORDER BY` 子句的查询创建物化视图时，行仅在创建物化视图时按照 `ORDER BY` 子句进行排序。随后的刷新过程中，不会维持此排序标准。这也是因为存储在数据字典中的定义并未包含\
  \ `ORDER BY` 子句。\n\n***\n\n\n\n"
- "# 物化视图与查询重写\n\n## 容器表与基本查询\n\n当你执行前面的 SQL 语句时，数据库引擎会创建一个物化视图（它只是数据字典中的一个对象；换句话说，它只是元数据）和一个*容器表*。容器表是一个“常规”表，其名称与物化视图相同，用于存储查询返回的结果集。\n\
  \n你可以像查询任何其他表一样查询容器表。下面的 SQL 语句展示了一个示例。请注意，与原始查询相比，逻辑读的数量已从 3,844 降至 3。另请注意，访问路径\
  \ `MAT_VIEW ACCESS FULL` 清楚地表明正在访问物化视图。此访问路径仅在 Oracle Database 10*g* 及以上版本中存在。在早期版本中，会使用常规的\
  \ `TABLE ACCESS FULL`，但这只是一个命名约定，用于方便地指出正在使用物化视图。实际上，这两种访问路径是完全相同的。\n\n```sql\n\
  SELECT * FROM sales_mv ORDER BY prod_category, country_id\n```\n\n```\n----------------------------------------------------------------------\n\
  | Id  | Operation             | Name     | E-Rows | A-Rows | Buffers |\n----------------------------------------------------------------------\n\
  |   1 |  SORT ORDER BY        |          |     81 |     81 |       3 |\n|   2 |\
  \   MAT_VIEW ACCESS FULL| SALES_MV |     81 |     81 |       3 |\n----------------------------------------------------------------------\n\
  ```\n\n## 查询重写机制\n\n直接引用容器表总是一个选项。但是，如果你想在不修改 SQL 语句的情况下提高应用程序的性能，还有第二种强大的可能性：使用*查询重写*。\n\
  \n查询重写的概念很简单。当查询优化器收到要优化的查询时，它可以决定按原样使用它（换句话说，即*不*使用查询重写），也可以选择重写它以使用包含执行该查询所需的全部或部分数据的物化视图。当然，这一决定基于查询优化器对启用和不启用查询重写时执行计划的成本估算。成本较低的执行计划将用于执行查询。提示\
  \ `rewrite` 和 `no_rewrite` 可用于影响查询优化器的决策。\n\n![查询重写示意图](img/1102.jpg)\n\n**图 11-2.**\
  \ 查询优化器可以使用查询重写来自动使用物化视图。\n\n要利用查询重写，必须在两个级别启用它。首先，你必须将动态初始化参数 `query_rewrite_enabled`\
  \ 设置为 `TRUE`。其次，你必须为物化视图启用它。\n\n```sql\nALTER MATERIALIZED VIEW sales_mv ENABLE\
  \ QUERY REWRITE\n```\n\n一旦启用了查询重写，如果你提交原始查询，优化器会将物化视图视为查询重写的候选对象；在这种情况下，查询优化器实际上会重写查询以使用物化视图。请注意，访问路径\
  \ `MAT_VIEW REWRITE ACCESS FULL` 清楚地表明发生了查询重写。同样，此访问路径仅在 Oracle Database 10*g* 及以上版本中存在。在早期版本中，会使用常规的\
  \ `TABLE ACCESS FULL`，即使这只是一个用于方便地指示正在使用物化视图的命名约定；这两种访问路径是完全相同的。\n\n```sql\nSELECT\
  \ p.prod_category, c.country_id,\n       sum(s.quantity_sold) AS quantity_sold,\n\
  \       sum(s.amount_sold) AS amount_sold\nFROM sales s, customers c, products p\n\
  WHERE s.cust_id = c.cust_id\nAND s.prod_id = p.prod_id\nGROUP BY p.prod_category,\
  \ c.country_id\nORDER BY p.prod_category, c.country_id\n```\n\n```\n------------------------------------------------------------------------------\n\
  | Id  | Operation                     | Name     |  E-Rows |A-Rows | Buffers |\n\
  ------------------------------------------------------------------------------\n\
  |   1 |  SORT ORDER BY                |          |      81 |    81 |       3 |\n\
  |   2 |   MAT_VIEW REWRITE ACCESS FULL| SALES_MV |      81 |    81 |       3 |\n\
  ------------------------------------------------------------------------------\n\
  ```\n\n总之，通过查询重写，查询优化器能够自动使用包含执行查询所需数据的物化视图。打个比方，这类似于向表添加索引时发生的情况。你（通常）不必修改 SQL\
  \ 语句就能利用它。得益于数据字典，查询优化器知道这样的索引存在，并且如果它对更高效地执行 SQL 语句有用，查询优化器就会使用它。物化视图也是如此。\n\n\
  ## 数据刷新\n\n当通过 DML 或 DDL 语句修改基表时，物化视图（实际上是容器表）可能包含*陈旧*的数据（“陈旧”意味着“旧的”，即如果现在在新的基表内容上执行物化视图查询，其结果集不再相等的数据）。因此，如图\
  \ 11-3 所示，在修改基表后，必须对物化视图执行*刷新*。你可以选择物化视图刷新的方式和时间。\n\n![刷新示意图](img/1103.jpg)\n\n\
  **图 11-3.** 修改基表后，必须刷新物化视图。\n\n## 参数设置\n\n正如你在上一节看到的，你可以在不指定参数的情况下创建物化视图。但是，你可以完全自定义其创建：\n\
  \n*   你可以为容器表指定物理属性，如分区、压缩、表空间和存储参数。在这方面，容器表的处理方式与任何其他表相同。因此，你可以应用第 9 章中讨论的技术来进一步优化数据访问。\n\
  *   创建物化视图时，会执行查询，并将结果集插入容器表。这是因为默认使用了参数 `build immediate`。还存在两种额外的可能性：首先，通过指定参数\
  \ `build deferred` 将行的插入延迟到第一次刷新；其次，通过指定参数 `on prebuilt table` 将已有的表重用作容器表。\n* \
  \  默认情况下，查询重写是禁用的。要启用它，你必须指定参数 `enable query rewrite`。\n*   为了提高快速刷新（本章稍后描述）的性能，默认情况下会在容器表上创建索引。要禁止创建此索引，可以指定参数\
  \ `using no index`。例如，这对于避免索引维护开销非常有用，如果你永远不想执行快速刷新，这种开销可能相当可观。\n\n以下 SQL 语句展示了一个基于相同查询的示例，但指定了刚刚描述的几个参数：\n\
  \n```sql\nCREATE MATERIALIZED VIEW sales_mv\nPARTITION BY HASH (country_id) PARTITIONS\
  \ 8\nTABLESPACE users\nBUILD IMMEDIATE\nUSING NO INDEX\nENABLE QUERY REWRITE\nAS\n\
  SELECT p.prod_category, c.country_id,\n       sum(s.quantity_sold) AS quantity_sold,\n\
  \       sum(s.amount_sold) AS amount_sold\nFROM sales s, customers c, products p\n\
  WHERE s.cust_id = c.cust_id\nAND s.prod_id = p.prod_id\nGROUP BY p.prod_category,\
  \ c.country_id\n```\n\n\n\n此外，您还可以指定物化视图的刷新方式。“物化视图刷新”一节提供了关于此主题的详细信息。\n\n## 查询重写\n\
  \n每当 SQL 语句中存在 `SELECT` 子句时，或者更具体地说，在以下情况下，查询优化器能够利用查询重写功能：\n\n*   `SELECT ... FROM\
  \ ...`\n*   `CREATE TABLE ... AS SELECT ... FROM ...`\n*   `INSERT INTO ... SELECT\
  \ ... FROM ...`\n*   子查询\n\n另外，如前所述，查询重写仅在满足两个要求时才会被使用。首先，动态初始化参数 `query_rewrite_enabled`\
  \ 必须设置为 `TRUE`（仅从 Oracle Database 10*g* 开始，默认值才是 `TRUE`）。其次，创建物化视图时必须使用参数 `enable\
  \ query rewrite`。\n\n一旦满足这些要求，每次查询优化器生成执行计划时，都必须确定是否可以使用包含所需数据的物化视图来重写 SQL 语句。为此，它使用以下三种方法之一：\n\
  \n*   `全文匹配查询重写`：将传递给查询优化器的查询文本与每个可用物化视图的查询文本进行比较。如果它们匹配，则该物化视图显然包含所需数据。请注意，此比较不像数据库引擎通常使用的比较那样严格：它不区分大小写（字面值除外），并忽略空白（例如换行符和制表符）以及\
  \ `ORDER BY` 子句。\n*   `部分文本匹配查询重写`：比较方式类似于全文匹配查询重写。但不同之处在于，允许 `SELECT` 子句存在差异。例如，如果物化视图存储了三列，而待优化的查询只引用了其中两列，则该物化视图包含所有所需数据，因此可以进行查询重写。\n\
  *   `通用查询重写`：为了找到匹配的物化视图，通用查询重写会进行一种语义分析。为此，它广泛使用约束和维度来推断基础表中数据之间的语义关系。目的是即使传递给查询优化器的查询与匹配物化视图关联的查询差异很大，也能应用查询重写。事实上，设计良好的物化视图通常被用来重写许多（可能非常不同的）SQL\
  \ 语句。\n\n## 维度\n\n查询优化器使用存储在数据字典中的约束来推断数据关系，以便尽可能充分地利用通用查询重写。有时，同一表中甚至不同表中的列之间存在其他非常有用但约束未涵盖的关系。这对于反规范化表（例如\
  \ `sh` 模式中的 `times` 表）尤其如此。为了向查询优化器提供此类信息，可以使用 `维度`。通过它，可以使用 `层次结构` 指定 1:n 关系，并使用\
  \ `属性` 指定 1:1 关系。层次结构和属性都基于 `级别`，简单来说就是表中的列。以下 SQL 语句说明了这一点：\n\n```sql\nCREATE DIMENSION\
  \ times_dim\nLEVEL day IS times.time_id\nLEVEL month IS times.calendar_month_desc\n\
  LEVEL quarter IS times.calendar_quarter_desc\nLEVEL year IS times.calendar_year\n\
  HIERARCHY cal_rollup (day CHILD OF month CHILD OF quarter CHILD OF year)\nATTRIBUTE\
  \ day DETERMINES (day_name, day_number_in_month)\nATTRIBUTE month DETERMINES (calendar_month_number,\
  \ calendar_month_name)\nATTRIBUTE quarter DETERMINES (calendar_quarter_number)\n\
  ATTRIBUTE year DETERMINES (days_in_cal_year)\n```\n\n有关维度的详细信息，请参阅《数据仓库指南》手册。\n\n\
  全文匹配和部分文本匹配查询重写可以非常快速地应用。但由于它们的决策基于简单的文本匹配，因此灵活性不高。因此，它们只能重写有限数量的查询。相比之下，通用查询重写功能强大得多。缺点是应用它的开销要高得多。因此，查询优化器按复杂度（从而也是解析开销）递增的顺序应用这些方法，直到找到匹配的物化视图。此过程如图\
  \ 11-4 所示。\n\n![image](img/1104.jpg)\n\n**图 11-4.** *查询重写过程*\n\n以下示例基于脚本 `mv_rewrite.sql`，展示了通用查询重写的应用。请注意，该查询与前面章节中用于定义物化视图\
  \ `sales_mv` 的查询相似。存在三个不同之处。首先，`SELECT` 子句不同。无论如何，物化视图包含所有必要的数据。其次，指定了一个 `ORDER\
  \ BY` 子句。第三，没有引用表 `customers`。然而，由于表 `sales` 上存在一个已验证的、引用表 `customers` 的外键约束，查询优化器可以确定省略该连接不会导致数据丢失。因此，它可以使用物化视图\
  \ `sales_mv`。\n\n```sql\nSQL> SELECT upper(p.prod_category) AS prod_category,\n\
  \  2         sum(s.amount_sold) AS amount_sold\n  3  FROM sales s, products p\n\
  \  4  WHERE s.prod_id = p.prod_id\n  5  GROUP BY p.prod_category\n  6  ORDER BY\
  \ p.prod_category;\n\n--------------------------------------------------\n| Id \
  \ | Operation                       |Name    |\n--------------------------------------------------\n\
  |   1 |  SORT GROUP BY                  |        |\n|   2 |   MAT_VIEW REWRITE ACCESS\
  \ FULL  |SALES_MV|\n--------------------------------------------------\n```\n\n\
  重要的是要注意，默认情况下，查询优化器不会使用未经验证的约束。因此，如果存在此类未经验证的约束，查询优化器将无法使用通用查询重写。由于对于这个特定查询，无法使用全文匹配查询重写和部分文本匹配查询重写，因此不会发生查询重写。以下示例说明了这一点。请注意，这与前一个示例中使用的查询相同。只有约束\
  \ `sales_customer_fk` 的状态发生了变化。\n\n```sql\nSQL> ALTER TABLE sales MODIFY CONSTRAINT\
  \ sales_customer_fk NOVALIDATE;\n\nSQL> SELECT upper(p.prod_category) AS prod_category,\n\
  \  2         sum(s.amount_sold) AS amount_sold\n  3  FROM sales s, products p\n\
  \  4  WHERE s.prod_id = p.prod_id\n  5  GROUP BY p.prod_category\n  6  ORDER BY\
  \ p.prod_category;\n\n--------------------------------------------\n| Id  | Operation\
  \               | Name     |\n--------------------------------------------\n|  \
  \ 1 |  SORT GROUP BY          |          |\n|   2 |   HASH JOIN             |  \
  \        |\n|   3 |    VIEW                 | VW_GBC_5 |\n|   4 |     HASH GROUP\
  \ BY       |          |\n|   5 |      PARTITION RANGE ALL|          |\n|   6 | \
  \      TABLE ACCESS FULL | SALES    |\n|   7 |    TABLE ACCESS FULL    | PRODUCTS\
  \ |\n--------------------------------------------\n```\n\n特别是在数据集市中，使用一些虽然数据库引擎未验证、但由于我们（谨慎地）维护表的方式而知道数据满足这些条件的约束并不少见。同时，物化视图虽然被数据库引擎认为是过时的，但已知对于重写查询是安全的，这种情况也不少见。\n\
  \n\n\n"
- "# 查询重写完整性参数与示例\n\n为了在类似情况下利用通用查询重写，可以使用动态初始化参数`query_rewrite_integrity`。通过该参数，您可以指定是仅使用由数据库引擎验证过的强制约束，以及是否使用包含过时数据的物化视图。该参数可设置为以下三个值：\n\
  \n*   `enforced`：仅考虑包含新鲜数据的物化视图用于查询重写。此外，仅使用经过验证的约束进行通用查询重写。此为默认值。\n*   `trusted`：仅考虑包含新鲜数据的物化视图用于查询重写。此外，启用`novalidate`并标记为`rely`的维度和约束会被信任用于通用查询重写。\n\
  *   `stale_tolerated`：所有现有的物化视图，包括那些包含过时数据的，都会被考虑用于查询重写。此外，启用`novalidate`并标记为`rely`的维度和约束会被信任用于通用查询重写。\n\
  \n## 通用查询重写示例\n\n以下示例展示了如何在不验证约束的情况下使用通用查询重写。如示例所示，约束被标记为`rely`，完整性级别被设置为`trusted`。\n\
  \n```sql\nALTER TABLE sales MODIFY CONSTRAINT sales_customer_fk RELY;\nALTER SESSION\
  \ SET query_rewrite_integrity = trusted;\nSELECT upper(p.prod_category) AS prod_category,\n\
  \       sum(s.amount_sold) AS amount_sold\nFROM sales s, products p\nWHERE s.prod_id\
  \ = p.prod_id\nGROUP BY p.prod_category\nORDER BY p.prod_category;\n```\n\n对应的执行计划输出如下：\n\
  \n```\n--------------------------------------------------\n| Id  | Operation   \
  \                  | Name     |\n--------------------------------------------------\n\
  |   1 |  SORT GROUP BY                |          |\n|   2 |   MAT_VIEW REWRITE ACCESS\
  \ FULL| SALES_MV |\n--------------------------------------------------\n```\n\n\
  ## 使用过程分析查询重写失败原因\n\n如果您的某个 SQL 语句没有使用查询重写，并且您不理解原因，可以使用`dbms_mview`包中的过程`explain_rewrite`来找出问题所在。以下\
  \ PL/SQL 块展示了如何使用它。请注意，参数`query`指定了应被重写的查询，参数`mv`指定了应用于重写的物化视图，参数`statement_id`指定了一个任意字符串，用于标识存储在输出表`rewrite_table`中的信息。\n\
  \n```sql\nALTER SESSION SET query_rewrite_integrity = enforced;\nDECLARE\n    l_query\
  \ CLOB := 'SELECT upper(p.prod_category) AS prod_category,\n                   \
  \         sum(s.amount_sold) AS amount_sold\n                     FROM sales s,\
  \ products p\n                     WHERE s.prod_id = p.prod_id\n               \
  \      GROUP BY p.prod_category, p.prod_status\n                     ORDER BY p.prod_category';\n\
  BEGIN\n    dbms_mview.explain_rewrite(\n        query        => l_query,\n     \
  \   mv           => 'sales_mv',\n        statement_id => '42'\n    );\nEND;\n/\n\
  ```\n\n> **注意**\n> 默认情况下，表`rewrite_table`不存在。您可以通过执行存储在`$ORACLE_HOME/rdbms/admin`下的脚本`utlxrw.sql`，在用于分析的模式中创建它。\n\
  \n过程执行后，`rewrite_table`表中的输出给出了查询重写未发生的原因。输出由记录在《错误消息》手册中的消息组成。\n\n```sql\nSELECT\
  \ message\nFROM rewrite_table\nWHERE statement_id = '42';\n```\n\n对应的输出信息可能如下：\n\
  \n```\nMESSAGE\n------------------------------------------------------------------------\n\
  QSM-01150: query did not rewrite\nQSM-01110: query rewrite not possible with materialized\
  \ view SALES_MV\nbecause it contains a join between tables (SALES and CUSTOMERS)\
  \ that is\nnot present in the query and that potentially eliminates rows needed\
  \ by\nthe query\nQSM-01052: referential integrity constraint on table, SALES, not\
  \ VALID\nin ENFORCED integrity mode\n```\n\n## 理解物化视图的查询重写支持\n\n同样重要的是，并非所有查询重写方法都适用于所有物化视图。某些物化视图仅支持完全文本匹配查询重写。其他则仅支持完全文本匹配和部分文本匹配查询重写。通常，随着物化视图复杂度（例如，使用集合运算符和层次查询等结构）的增加，支持高级查询重写方法的频率会降低。限制也取决于\
  \ Oracle 数据库引擎版本。因此，与其提供一个支持列表（此类列表已在《数据仓库指南》手册中提供），我将向您展示如何针对特定案例找出支持哪些查询重写方法。\n\
  \n为了说明，让我们使用以下 SQL 语句重新创建物化视图。请注意，与之前的示例相比，我只是在`GROUP BY`子句中增加了`p.prod_status`（实际上，执行这样的\
  \ SQL 语句通常是无意义的，但正如您稍后将看到的，这是部分停用查询重写的一种简单方法）。\n\n```sql\nCREATE MATERIALIZED VIEW\
  \ sales_mv\nENABLE QUERY REWRITE\nAS\nSELECT p.prod_category, c.country_id,\n  \
  \     sum(s.quantity_sold) AS quantity_sold,\n       sum(s.amount_sold) AS amount_sold\n\
  FROM sales s, customers c, products p\nWHERE s.cust_id = c.cust_id\nAND s.prod_id\
  \ = p.prod_id\nGROUP BY p.prod_category, c.country_id, p.prod_status;\n```\n\n要显示物化视图支持的查询重写方法，您可以查询视图`user_mviews`，如下例所示。在这种情况下，根据列`rewrite_enabled`，在物化视图级别启用了查询重写；根据列`rewrite_capability`，仅支持文本匹配查询重写（换句话说，不支持通用查询重写）。\n\
  \n```sql\nSELECT rewrite_enabled, rewrite_capability\nFROM user_mviews\nWHERE mview_name\
  \ = 'SALES_MV';\n```\n\n输出结果：\n\n```\nREWRITE_ENABLED REWRITE_CAPABILITY\n---------------\
  \ ------------------\nY               TEXTMATCH\n```\n\n请注意，列`rewrite_capability`只能是以下值之一：`none`、`textmatch`或`general`。如果支持通用查询重写（因此也支持其他两种方法），则视图`user_mviews`提供的信息就足够了。然而，如本例所示，如果显示的值是`textmatch`，那么了解至少两件事将很有用。第一，支持两种文本匹配查询重写中的哪一种？仅支持完全文本匹配，还是也支持部分文本匹配？第二，为什么不支持通用查询重写？\n\
  \n## 使用 explain_mview 分析物化视图能力\n\n要回答这些问题，您可以使用`dbms_mview`包中的过程`explain_mview`，如下例所示。请注意，参数`mv`指定了物化视图的名称，参数`stmt_id`指定了一个任意字符串，用于标识存储在输出表`mv_capabilities_table`中的信息。\n\
  \n```sql\ndbms_mview.explain_mview(mv => 'sales_mv', stmt_id => '42')\n```\n\n>\
  \ **注意**\n> 默认情况下，表`mv_capabilities_table`不可用。您可以通过执行存储在`$ORACLE_HOME/rdbms/admin`下的脚本`utlxmv.sql`，在用于分析的模式中创建它。\n\
  \n\n\n过程的结果（见表 `mv_capabilities_table`）显示了物化视图 `sales_mv` 是否支持三种查询重写模式。如果不支持，`msgtxt`\
  \ 列会指出特定查询重写模式不受支持的原因。在这种情况下，请注意问题是由至少一个仅在 `GROUP BY` 子句中引用的列引起的。检查 SQL 语句后，你可以立即识别出该列：`p.prod_status`。\n\
  \n```sql\nSELECT capability_name, possible, msgtxt\n  FROM mv_capabilities_table\n\
  \ WHERE statement_id = '42'\n   AND capability_name IN ('REWRITE_FULL_TEXT_MATCH',\n\
  \                           'REWRITE_PARTIAL_TEXT_MATCH',\n                    \
  \       'REWRITE_GENERAL')\n ORDER BY seq;\n```\n\n```\nCAPABILITY_NAME        \
  \    POSSIBLE MSGTXT\n-------------------------- --------\nREWRITE_FULL_TEXT_MATCH\
  \    Y\nREWRITE_PARTIAL_TEXT_MATCH N        grouping column omitted from SELECT\
  \ list\nREWRITE_GENERAL            N        grouping column omitted from SELECT\
  \ list\n```\n\n"
- "# 刷新\n\n当表被修改时，其依赖的物化视图会变为过时状态。因此，需要执行刷新以使物化视图数据保持最新。创建物化视图时，你可以指定刷新的方式和时机。\n\n\
  ## 刷新方法\n\n要指定数据库引擎执行刷新的方式，你可以从以下方法中选择：\n\n*   `REFRESH COMPLETE`：容器表的全部内容被删除，所有数据从基表重新加载。显然，此方法始终受支持。仅当基表有相当一部分数据被修改时，才应使用此方法。\n\
  *   `REFRESH FAST`：重用容器表的内容，仅将修改传播到容器表。如果基表中修改的数据很少，则应使用此方法。此方法仅在满足若干要求时才可用。如果其中一项要求未满足，则\
  \ `REFRESH FAST` 会被拒绝作为物化视图的有效参数，或者会引发错误。快速刷新将在后续章节中详细介绍。\n*   `REFRESH FORCE`：首先尝试快速刷新。如果无法工作，则执行完全刷新。这是默认方法。\n\
  *   `NEVER REFRESH`：物化视图从不刷新。如果尝试刷新，则会以错误 `ORA-23538: cannot explicitly refresh\
  \ a NEVER REFRESH materialized view` 终止。你应使用此方法来确保永远不会执行刷新。\n\n## 刷新时机\n\n你可以通过两种不同的方式选择物化视图刷新发生的时间点：\n\
  \n*   `ON DEMAND`：当明确请求时（手动或通过定期运行作业）刷新物化视图。这意味着从基表修改到物化视图刷新之间的这段时间内，物化视图可能包含过时数据。\n\
  *   `ON COMMIT`：在修改基表的同一事务中自动刷新物化视图。换句话说，就其他会话而言，物化视图始终包含最新数据。\n\n你可以组合这些选项来指定物化视图的刷新方式和时机，并可在\
  \ `CREATE MATERIALIZED VIEW` 和 `ALTER MATERIALIZED VIEW` 语句中使用它们。以下是一个示例：\n\n```sql\n\
  ALTER MATERIALIZED VIEW sales_mv REFRESH FORCE ON DEMAND\n```\n\n甚至可以使用 `REFRESH\
  \ COMPLETE ON COMMIT` 选项创建物化视图。然而，这种配置在实践中不太可能有用。\n\n要显示与物化视图关联的参数、它是否最新，以及最后一次刷新的方式和时间，可以查询视图\
  \ `user_mviews`：\n\n```sql\nSELECT refresh_method, refresh_mode, staleness,\n  \
  \     last_refresh_type, last_refresh_date\n  FROM user_mviews\n WHERE mview_name\
  \ = 'SALES_MV';\n```\n\n```\nREFRESH_METHOD REFRESH_MODE STALENESS LAST_REFRESH_TYPE\
  \ LAST_REFRESH_DATE\n-------------- ------------ --------- ----------------- -------------------\n\
  FORCE          DEMAND       FRESH     COMPLETE          02.04.2008 20:38:31\n```\n\
  \n"
- "# 手动刷新过程\n\n当你选择手动刷新物化视图时，需要使用包 `dbms_mview` 中的以下过程之一：\n\n*   `refresh`：此过程通过参数\
  \ `list` 指定一个逗号分隔的列表来刷新其中的物化视图。例如，以下调用刷新模式 `sh` 中的物化视图 `sales_mv` 和 `cal_month_sales_mv`：\n\
  \    ```sql\n    dbms_mview.refresh(list => 'sh.sales_mv,sh.cal_month_sales_mv')\n\
  \    ```\n*   `refresh_all_mviews`：此过程刷新数据库中存储的所有物化视图，但标记为永不刷新的除外。输出参数 `number_of_failures`\
  \ 返回处理期间发生的失败次数。\n    ```sql\n    dbms_mview.refresh_all_mviews(number_of_failures\
  \ => :r)\n    ```\n*   `refresh_dependent`：此过程刷新依赖于通过参数 `list` 指定的基表（逗号分隔列表）的物化视图。输出参数\
  \ `number_of_failures` 返回处理期间发生的失败次数。例如，以下调用刷新模式 `sh` 中存储的所有依赖于表 `sales` 的物化视图：\n\
  \    ```sql\n    dbms_mview.refresh_dependent(number_of_failures => :r, list =>\
  \ 'sh.sales')\n    ```\n\n所有这些过程也支持参数 `method` 和 `atomic_refresh`。前者指定刷新的执行方式（'`c`'\
  \ 表示完全，'`f`' 表示快速，'`?`' 表示强制），后者指定刷新是否在单个事务中执行。如果参数 `atomic_refresh` 设置为 `FALSE`，则不使用单个事务。因此，对于完全刷新，物化视图将被截断而不是被删除。一方面，刷新速度更快。另一方面，如果在刷新运行期间另一个会话查询物化视图，查询可能会返回错误结果（未选择任何行）。\n\
  \n---\n\n**注意** 在 Oracle9*i* 中，由于错误 3168840，即使参数 `atomic_refresh` 设置为 `TRUE`（所有版本中的默认值），在对单个物化视图执行完全刷新期间，也会执行\
  \ `TRUNCATE` 语句。但是，如果同时刷新多个物化视图，则刷新会按预期以原子方式工作。因此，要解决此错误，可以创建一个刷新组，其中包含需要刷新的物化视图和一个仅为了拥有第二个视图而创建的“虚拟”物化视图。你可以使用脚本\
  \ `atomic_refresh.sql` 来重现此行为。\n\n---\n\n"
- "# 自动刷新调度\n\n如果你想自动化按需刷新，可以在 `CREATE MATERIALIZED VIEW` 和 `ALTER MATERIALIZED VIEW`\
  \ 中指定首次刷新的时间（`START WITH` 子句）以及计算后续刷新时间的表达式（`NEXT` 子句）。例如，在以下 SQL 语句中，从 SQL 语句执行之时起，每十分钟安排一次刷新：\n\
  \n```sql\nALTER MATERIALIZED VIEW sales_mv REFRESH COMPLETE ON DEMAND\nSTART WITH\
  \ sysdate NEXT sysdate+to_dsinterval('0 00:10:00')\n```\n\n为了调度刷新，会提交一个基于包 `dbms_job`\
  \ 的作业。请注意，这里使用了包 `dbms_refresh` 而不是包 `dbms_mview`。由于包 `dbms_refresh` 也受到错误 3168840\
  \ 的影响，此作业在 Oracle9*i* 中可能无效，你可能被迫调度自己的作业来绕过此错误。\n\n```sql\nSELECT what, interval\n\
  \  FROM user_jobs;\n```\n\n```\nWHAT                                     INTERVAL\n\
  ---------------------------------------- -----------------------------------\ndbms_refresh.refresh('\"\
  SH\".\"SALES_MV\"'); sysdate+to_dsinterval('0 00:10:00')\n```\n\n"
- "# 刷新组\n\n\n\n## `dbms_refresh` 包\n\n`dbms_refresh` 包用于管理**刷新组**。一个刷新组就是一个或多个物化视图的集合。使用\
  \ `dbms_refresh` 包中的 `refresh` 过程执行的刷新是在单个事务中完成的（`atomic_refresh` 被设置为 `TRUE`）。如果需要在多个物化视图之间保证一致性，这种行为是必要的。这也意味着，要么组内包含的所有物化视图都成功刷新，要么整个刷新操作被回滚。\n\
  \n### 使用物化视图日志的快速刷新\n\n在快速刷新期间，会重用容器表的内容，并且仅将修改从基表传播到容器表。显然，只有在数据库引擎知道这些修改的情况下才能进行传播。为此，您必须在每个基表上创建一个**物化视图日志**以启用快速刷新（下一节将讨论的分区变更跟踪快速刷新是一个例外）。例如，物化视图\
  \ `sales_mv` 需要在表 `sales`、`customers` 和 `products` 上创建物化视图日志，以便能够进行快速刷新。简单来说，物化视图日志是一个由数据库引擎自动维护的表，用于跟踪基表上发生的修改。\n\
  \n除了物化视图日志，直接路径插入还会使用一个内部日志表。您无需创建它，因为它在数据库创建时会自动安装。要显示其内容，您可以查询视图 `all_sumdelta`。\n\
  \n在最简单的情况下，您可以使用如下 SQL 语句创建物化视图日志（此示例基于脚本 `mv_refresh_log.sql`）。请注意，`WITH ROWID`\
  \ 子句用于指定如何在物化视图日志中识别行，即如何识别物化视图日志中每一行所跟踪修改的基表行。也可以创建使用主键或对象 ID 识别行的物化视图日志。但是，出于本章的目的，行必须通过其\
  \ rowid 来识别。\n\n```sql\nSQL> CREATE MATERIALIZED VIEW LOG ON sales WITH ROWID;\n\
  SQL> CREATE MATERIALIZED VIEW LOG ON customers WITH ROWID;\nSQL> CREATE MATERIALIZED\
  \ VIEW LOG ON products WITH ROWID;\n```\n\n正如有一个关联的容器表对应物化视图，每个物化视图日志也有一个关联的表，用于记录对基表的修改。以下查询展示了如何显示其名称：\n\
  \n```sql\nSQL> SELECT master, log_table\n  2  FROM user_mview_logs\n  3  WHERE master\
  \ IN ('SALES', 'CUSTOMERS', 'PRODUCTS');\n\nMASTER      LOG_TABLE\n----------  ----------------\n\
  CUSTOMERS   MLOG$_CUSTOMERS\nPRODUCTS    MLOG$_PRODUCTS\nSALES       MLOG$_SALES\n\
  ```\n\n对于大多数物化视图来说，这样一个基础的物化视图日志不足以支持快速刷新。还有额外的条件需要满足。由于这些条件与物化视图关联的查询以及 Oracle\
  \ 数据库引擎的版本密切相关，因此我不会提供一个列表（可在《数据仓库指南》手册中找到），而是向您展示如何针对特定情况找出这些要求。为此，您可以使用与找出支持的查询重写模式相同的方法（参见前面的“查询重写”部分）。换句话说，您可以使用\
  \ `dbms_mview` 包中的 `explain_mview` 过程，如下例所示：\n\n```sql\nSQL> execute dbms_mview.explain_mview(mv\
  \ => 'sales_mv', stmt_id => '42')\n```\n\n该过程的输出在表 `mv_capabilities_table` 中提供。要查看物化视图是否可以进行快速刷新，您可以使用如下查询。请注意，在输出中，`possible`\
  \ 列始终设置为 `N`。这意味着无法进行快速刷新。此外，`msgtxt` 和 `related_text` 列指出了问题的原因。\n\n```sql\nSQL>\
  \ SELECT capability_name, possible, msgtxt, related_text\n  2  FROM mv_capabilities_table\n\
  \  3  WHERE statement_id = '42'\n  4  AND capability_name LIKE 'REFRESH_FAST_AFTER%'\n\
  \  5  ORDER BY seq;\n\nCAPABILITY_NAME               POSSIBLE MSGTXT           \
  \                RELATED_TEXT\n--------------------------    -------- -------------------------------\
  \  -------------\nREFRESH_FAST_AFTER_INSERT     N        mv log must have new values\
  \      SH.PRODUCTS\nREFRESH_FAST_AFTER_INSERT     N        mv log does not have\
  \ all         SH.PRODUCTS\n                                         necessary columns\n\
  REFRESH_FAST_AFTER_INSERT     N        mv log must have new values      SH.CUSTOMERS\n\
  REFRESH_FAST_AFTER_INSERT     N        mv log does not have all         SH.CUSTOMERS\n\
  \                                         necessary columns\nREFRESH_FAST_AFTER_INSERT\
  \     N        mv log must have new values      SH.SALES\nREFRESH_FAST_AFTER_INSERT\
  \     N        mv log does not have all         SH.SALES\n                     \
  \                    necessary columns\nREFRESH_FAST_AFTER_ONETAB_DML N        SUM(expr)\
  \ without COUNT(expr)    AMOUNT_SOLD\nREFRESH_FAST_AFTER_ONETAB_DML N        SUM(expr)\
  \ without COUNT(expr)    QUANTITY_SOLD\nREFRESH_FAST_AFTER_ONETAB_DML N        see\
  \ the reason why REFRESH_FAST\n                                         _AFTER_INSERT\
  \ is disabled\nREFRESH_FAST_AFTER_ONETAB_DML N        COUNT(*) is not present in\
  \ the\n                                         select list\nREFRESH_FAST_AFTER_ONETAB_DML\
  \ N        SUM(expr) without COUNT(expr)\nREFRESH_FAST_AFTER_ANY_DML    N      \
  \  mv log does not have sequence  # SH.PRODUCTS\nREFRESH_FAST_AFTER_ANY_DML    N\
  \        mv log does not have sequence  # SH.CUSTOMERS\nREFRESH_FAST_AFTER_ANY_DML\
  \    N        mv log does not have sequence  # SH.SALES\nREFRESH_FAST_AFTER_ANY_DML\
  \    N        see the reason why REFRESH_FAST\n                                \
  \         _AFTER_ONETAB_DML is disabled\n```\n\n有些问题与物化视图日志有关，另一些则与物化视图有关。简而言之，数据库引擎需要更多信息来执行快速刷新。\n\
  \n要解决与物化视图日志相关的问题，您必须在 `CREATE MATERIALIZED VIEW LOG` 语句中添加一些选项。对于问题 `mv log does\
  \ not have all necessary columns`，您必须指定物化视图中引用的每个列都存储在物化视图日志中。对于问题 `mv log must\
  \ have new values`，您需要添加 `INCLUDING NEW VALUES` 子句。使用此选项，物化视图日志将存储旧值和新值（默认情况下仅存储旧值）。对于问题\
  \ `mv log does not have sequence`，必须添加 `SEQUENCE` 子句。使用此选项，一个序列号将与存储在物化视图日志中的每一行相关联。以下是重新定义后的物化视图日志：\n\
  \n```sql\nSQL> CREATE MATERIALIZED VIEW LOG ON sales WITH ROWID, SEQUENCE\n   2\
  \ (cust_id, prod_id, quantity_sold, amount_sold) INCLUDING NEW VALUES;\n\nSQL> CREATE\
  \ MATERIALIZED VIEW LOG ON customers WITH ROWID, SEQUENCE\n   2 (cust_id, country_id)\
  \ INCLUDING NEW VALUES;\n\nSQL> CREATE MATERIALIZED VIEW LOG ON products WITH ROWID,\
  \ SEQUENCE\n   2 (prod_id, prod_category) INCLUDING NEW VALUES;\n```\n\n为了解决物化视图的问题，在创建物化视图时，必须基于\
  \ `count` 函数添加一些新列。以下 SQL 语句展示了包含新列的定义：\n\n\n\n"
- "# 测试快速刷新\n\n在重新定义物化视图日志和物化视图之后，使用过程`explain_mview`进行进一步分析表明，在所有情况下都可以进行快速刷新（`possible`列始终设置为`Y`）。那么，让我们通过向两个表插入数据，然后执行快速刷新来测试其速度：\n\
  \n```sql\nSQL> CREATE MATERIALIZED VIEW sales_mv\n  2  REFRESH FORCE ON DEMAND\n\
  \  3  AS\n  4  SELECT p.prod_category, c.country_id,\n  5         sum(s.quantity_sold)\
  \ AS quantity_sold,\n  6         sum(s.amount_sold) AS amount_sold,\n         count(*)\
  \ AS count_star,\n         count(s.quantity_sold) AS count_quantity_sold,\n    \
  \     count(s.amount_sold) AS count_amount_sold\n 10  FROM sales s, customers c,\
  \ products p\n 11  WHERE s.cust_id = c.cust_id\n 12  AND s.prod_id = p.prod_id\n\
  \ 13  GROUP BY p.prod_category, c.country_id;\n```\n\n```sql\nSQL> INSERT INTO products\n\
  \  2  SELECT 619, prod_name, prod_desc, prod_subcategory, prod_subcategory_id,\n\
  \  3         prod_subcategory_desc, prod_category, prod_category_id,\n  4      \
  \   prod_category_desc, prod_weight_class, prod_unit_of_measure,\n  5         prod_pack_size,\
  \ supplier_id, prod_status, prod_list_price,\n  6         prod_min_price, prod_total,\
  \ prod_total_id, prod_src_id,\n  7         prod_eff_from, prod_eff_to, prod_valid\n\
  \  8  FROM products\n  9  WHERE prod_id = 136;\n```\n\n```\n已创建 1 行。\n```\n\n```sql\n\
  SQL> INSERT INTO sales\n  2  SELECT 619, cust_id, time_id, channel_id, promo_id,\
  \ quantity_sold, amount_sold\n  3  FROM sales\n  4  WHERE prod_id = 136;\n```\n\n\
  ```\n已创建 710 行。\n```\n\n```sql\nSQL> COMMIT;\n```\n\n```sql\nSQL> execute dbms_mview.refresh(list\
  \ => 'sh.sales_mv', method => 'f')\n```\n\n```\nPL/SQL 过程已成功完成。\n\n已用时间: 00:00:00.32\n\
  ```\n\n在这种情况下，快速刷新持续了 0.32 秒。这比完全刷新少了一个数量级以上，效果很好。如果你对快速刷新的性能不满意，应该使用 SQL 跟踪来调查为什么耗时过长。然后，通过应用第\
  \ 9 章中描述的技术，你可能能够通过添加索引或对段进行分区来加速。\n\n## 使用分区变更跟踪的快速刷新\n\n存储历史数据的表通常按天、周或月进行范围分区。换句话说，分区是基于存储时间信息的列。因此，经常会新增分区，向其中加载数据，并删除较旧的分区（通常只保留特定数量的分区在线）。执行这些操作后，所有依赖的物化视图都会过期，因此应该刷新。\n\
  \n问题在于，使用物化视图日志的快速刷新（前一节描述的那些）无法在诸如`CREATE PARTITION`或`DROP PARTITION`之类的分区管理操作之后执行。如果启动此类刷新，会引发错误`ORA-32313:\
  \ REFRESH FAST of \"SH\".\"SALES_MV\" unsupported after PMOPs`。当然，执行完全刷新总是可行的。但是，如果分区很多，而只有一两个被修改，刷新时间可能无法接受。\n\
  \n为了解决这个问题，可以使用带有分区变更跟踪（PCT）的快速刷新。其思想是数据库引擎能够跟踪分区级别的过期情况，而不仅仅是表级别。换句话说，它可以跳过所有未被更改的分区的刷新。要使用这种刷新方法，物化视图必须满足一些要求。基本上，数据库引擎必须能够将物化视图中存储的行映射到基表分区。如果物化视图包含以下内容之一，则可以实现：\n\
  \n*   分区键\n*   Rowid\n*   分区标记符\n*   依赖于连接的表达式（仅限 Oracle Database 10*g* 及以上）\n\n\
  前两个应该很明了；让我们看第三个和第四个的例子。\n\n分区标记符无非是由包`dbms_mview`中的函数`pmarker`生成的分区标识符。为了生成分区标记符，该函数使用作为参数传递的\
  \ rowid。以下示例基于脚本`mv_refresh_pct.sql`，展示了如何创建包含分区标记符的物化视图：\n\n```sql\nCREATE MATERIALIZED\
  \ VIEW sales_mv\nREFRESH FORCE ON DEMAND\nAS\nSELECT p.prod_category, c.country_id,\n\
  \       sum(s.quantity_sold) AS quantity_sold,\n       sum(s.amount_sold) AS amount_sold,\n\
  \       count(*) AS count_star,\n       count(s.quantity_sold) AS count_quantity_sold,\n\
  \       count(s.amount_sold) AS count_amount_sold,\n       dbms_mview.pmarker(s.rowid)\
  \ AS pmarker\nFROM sales s, customers c, products p\nWHERE s.cust_id = c.cust_id\n\
  AND s.prod_id = p.prod_id\nGROUP BY p.prod_category, c.country_id, dbms_mview.pmarker(s.rowid)\n\
  ```\n\n***\n\n**注意** 由于函数`pmarker`是为每一行调用的，所以不要低估调用它所需的时间。在我的系统上，使用分区标记符创建物化视图所需的时间是不使用它的\
  \ 2.5 倍。\n\n***\n\n当分区键用于连接另一个表时，物化视图包含一个*依赖于连接的表达式*。在本节使用的例子中，这意味着必须将与表`times`的连接添加到物化视图中。以下\
  \ SQL 语句提供了一个示例：\n\n```sql\nCREATE MATERIALIZED VIEW sales_mv\nREFRESH FORCE ON\
  \ DEMAND\nAS\nSELECT p.prod_category, c.country_id, t.fiscal_year,\n       sum(s.quantity_sold)\
  \ AS quantity_sold,\n       sum(s.amount_sold) AS amount_sold,\n       count(*)\
  \ AS count_star,\n       count(s.quantity_sold) AS count_quantity_sold,\n      \
  \ count(s.amount_sold) AS count_amount_sold\nFROM sales s, customers c, products\
  \ p, times t\nWHERE s.cust_id = c.cust_id\nAND s.prod_id = p.prod_id\nAND s.time_id\
  \ = t.time_id\nGROUP BY p.prod_category, c.country_id, t.fiscal_year\n```\n\n有了分区标记符或依赖于连接的表达式后，使用包`dbms_mview`中的函数`explain_mview`进行的分析表明，基于分区变更跟踪的快速刷新是可能的。然而，它仅对在表`sales`上执行的修改有效：\n\
  \n```sql\nSQL> SELECT capability_name, possible, msgtxt, related_text\n  2  FROM\
  \ mv_capabilities_table\n  3  WHERE statement_id = '42'\n  4  AND capability_name\
  \ IN ('PCT_TABLE','REFRESH_FAST_PCT')\n  5  ORDER BY seq;\n```\n\n```\nCAPABILITY_NAME\
  \  POSSIBLE MSGTXT                        RELATED_TEXT\n---------------- --------\
  \ ----------------------------- -------------\nPCT_TABLE        Y              \
  \                        SALES\nPCT_TABLE        N        关系不是分区表              \
  \   CUSTOMERS\nPCT_TABLE        N        关系不是分区表                 PRODUCTS\nREFRESH_FAST_PCT\
  \ Y\n```\n\n\n\n###### 何时使用\n\n物化视图是一种冗余访问结构。与所有冗余访问结构一样，它们对于高效访问数据很有用，但维护其最新状态会产生开销。如果将物化视图与索引进行比较，物化视图带来的性能提升和产生的开销都可能远高于索引。显然，这两个概念旨在解决不同的问题。简而言之，只有当改善数据访问带来的好处超过了管理数据冗余副本（当然也包括索引）的弊端时，才应该使用物化视图。\n\
  \n通常，我看到物化视图有两种用途：\n\n*   用于提升大型聚合和/或连接操作的性能，这类操作的逻辑读次数与返回行数之间的比率非常高。\n*   用于提升那些既无法通过全表扫描高效执行，也无法通过索引范围扫描高效执行的单表访问的性能。基本上，这些访问具有平均选择性，原本需要通过分区来优化，但如果无法利用分区（第\
  \ 9 章讨论了何时无法利用），物化视图可能会有所帮助。\n\n物化视图常用于数据仓库中以构建预存储的聚合。这有两个原因。首先，数据大多是只读的；因此，刷新物化视图的开销可以被最小化，并在数据库专用于修改表的特定时间窗口内完成。其次，在此类环境中，性能提升可能非常巨大。事实上，经常可以看到基于大型聚合或连接的查询，如果没有物化视图，处理它们所需的资源量是不可接受的。\n\
  \n尽管数据仓库是物化视图的主要应用环境，但我也在 OLTP 系统中成功实施过它们。这对于那些频繁被查询、但相比之下修改操作相对较少的表可能有益。在此类环境中，为了刷新物化视图，通常使用提交时快速刷新，以保证亚秒级的刷新时间和始终保持物化视图的新鲜度。\n\
  \n###### 陷阱与误区\n\n你不应将新的连接语法（即 ANSI 连接语法）与物化视图一起使用。如果使用了，某些查询重写和快速刷新功能将不受支持。因此，我建议你在可能的情况下，直接避免使用该语法。请注意，官方文档并未提及这些限制。\n\
  \n由于快速刷新并不总是比完全刷新更快，因此不应在所有情况下都使用它。一个特定情况是当基础表中大量数据被修改时。此外，你不应低估在修改基础表时维护物化视图日志的开销。因此，你需要仔细评估使用快速刷新的利弊。\n\
  \n在创建物化视图日志时，你必须非常小心逗号的使用。你能找出以下 SQL 语句的问题所在吗？\n\n```\nSQL> CREATE MATERIALIZED\
  \ VIEW LOG ON products WITH ROWID, SEQUENCE,\n  2  (prod_id, prod_category) INCLUDING\
  \ NEW VALUES;\nCREATE MATERIALIZED VIEW LOG ON products WITH ROWID, SEQUENCE,\n\
  *\nERROR at line 1:\nORA-12026: invalid filter column detected\n```\n\n问题在于关键字 `SEQUENCE`\
  \ 和过滤列表（即括号中的列列表）之间的逗号。如果存在这个逗号，则隐含了 `PRIMARY KEY` 选项，而在这种情况下不能指定该选项，因为主键（列 `prod_id`）已经在过滤列表中了。以下是正确的\
  \ SQL 语句。请注意，只删除了那个逗号。\n\n```\nSQL> CREATE MATERIALIZED VIEW LOG ON products WITH\
  \ ROWID, SEQUENCE\n  2  (prod_id, prod_category) INCLUDING NEW VALUES;\n\nMaterialized\
  \ view log created.\n```\n\n##### 结果缓存\n\n缓存是计算机系统中用于提高性能的最常用技术之一。硬件和软件都广泛使用它。Oracle\
  \ 数据库引擎也不例外。例如，它在缓冲区缓存中缓存数据文件块，在字典缓存中缓存数据字典信息，在库缓存中缓存游标。从 Oracle Database 11*g 开始，还提供了*结果缓存*。\n\
  \n* * *\n\n**注意** 结果缓存仅在企业版中可用。\n\n* * *\n\n\n\n###### 工作原理\n\nOracle 数据库引擎提供了三种结果缓存：\n\
  \n*   *服务器结果缓存*（亦称*查询结果缓存*）是一种服务器端缓存，用于存储查询结果集。\n*   *PL/SQL 函数结果缓存*是一种服务器端缓存，用于存储\
  \ PL/SQL 函数的返回值。\n*   *客户端结果缓存*是一种客户端缓存，用于存储查询结果集。\n\n接下来的章节将描述这些缓存的工作原理，以及你需要做些什么来利用它们。请注意，默认情况下不使用结果缓存。\n\
  \n## 服务器结果缓存\n\n服务器结果缓存用于避免重新执行查询。简而言之，首次执行查询时，其结果集会存储在共享池中。随后，对于同一查询的后续执行，结果集将直接从结果缓存中提供，而无需重新计算。请注意，只有当两个查询的文本完全相同时（允许空格和大小写差异），它们才被视为相同，因此可以使用同一缓存结果。此外，如果存在绑定变量，则所有绑定变量的值必须完全相同。这显然是必要的，因为绑定变量是传递给查询的输入参数，因此，对于不同的绑定变量值，结果集通常也不同。还需注意，结果缓存存储在共享池中，连接到给定实例的所有会话共享相同的缓存条目。\n\
  \n举个例子，让我们执行在物化视图部分已经使用过两次的查询。注意，查询中指定了提示 `result_cache` 以启用结果缓存。第一次执行耗时 1.78 秒。请注意，执行计划中的\
  \ `RESULT CACHE` 操作证实了该查询已启用结果缓存。然而，执行计划中的 `Starts` 列清楚地显示所有操作都至少执行了一次。所有操作都必须执行，因为这是查询的首次执行，因此结果缓存中尚未包含结果集。\n\
  \n```sql\nSQL> SELECT /*+ result_cache */ \n  2         p.prod_category, c.country_id,\n\
  \  3         sum(s.quantity_sold) AS quantity_sold,\n  4         sum(s.amount_sold)\
  \ AS amount_sold\n  5  FROM sales s, customers c, products p\n  6  WHERE s.cust_id\
  \ = c.cust_id\n  7  AND s.prod_id = p.prod_id\n  8  GROUP BY p.prod_category, c.country_id\n\
  \  9  ORDER BY p.prod_category, c.country_id;\n```\n\n`已用时间: 00:00:01.78`\n\n```sql\n\
  --------------------------------------------------------------------------------\n\
  | Id | Operation                  | Name                       | Starts |A-Rows\
  \ |\n--------------------------------------------------------------------------------\n\
  |   1|   RESULT CACHE             | fxtfk2w8kgrhm6c5j1y73twrgp |      1|     81\
  \ |\n|   2|    SORT GROUP BY           |                            |      1|  \
  \   81 |\n|*  3|     HASH JOIN              |                            |     \
  \ 1|    918K|\n|   4|      TABLE ACCESS FULL     | PRODUCTS                   |\
  \      1|     72 |\n|*  5|      HASH JOIN             |                        \
  \    |      1|    918K|\n|   6|       TABLE ACCESS FULL    | CUSTOMERS         \
  \         |      1|  55500 |\n|   7|       PARTITION RANGE ALL  |              \
  \              |      1|    918K|\n|   8|        TABLE ACCESS FULL   | SALES   \
  \                   |     28|    918K|\n--------------------------------------------------------------------------------\n\
  ```\n\n第二次执行耗时 0.07 秒。这次，执行计划中的 `Starts` 列显示，除 `RESULT CACHE` 外的所有操作都未执行。换句话说，查询的结果集是直接从结果缓存中提供的。\n\
  \n```sql\nSQL> SELECT /*+ result_cache */ \n  2         p.prod_category, c.country_id,\n\
  \  3         sum(s.quantity_sold) AS quantity_sold,\n  4         sum(s.amount_sold)\
  \ AS amount_sold\n  5  FROM sales s, customers c, products p\n  6  WHERE s.cust_id\
  \ = c.cust_id\n  7  AND s.prod_id = p.prod_id\n  8  GROUP BY p.prod_category, c.country_id\n\
  \  9  ORDER BY p.prod_category, c.country_id;\n```\n\n`已用时间: 00:00:00.07`\n\n```sql\n\
  --------------------------------------------------------------------------------\n\
  | Id | Operation                  | Name                       | Starts |A-Rows\
  \ |\n--------------------------------------------------------------------------------\n\
  |   1|   RESULT CACHE             | fxtfk2w8kgrhm6c5j1y73twrgp |      1|     81\
  \ |\n|   2|    SORT GROUP BY           |                            |      0|  \
  \    0 |\n|*  3|     HASH JOIN              |                            |     \
  \ 0|      0 |\n|   4|      TABLE ACCESS FULL     | PRODUCTS                   |\
  \      0|      0 |\n|*  5|      HASH JOIN             |                        \
  \    |      0|      0 |\n|   6|       TABLE ACCESS FULL    | CUSTOMERS         \
  \         |      0|      0 |\n|   7|       PARTITION RANGE ALL  |              \
  \              |      0|      0 |\n|   8|        TABLE ACCESS FULL   | SALES   \
  \                   |      0|      0 |\n--------------------------------------------------------------------------------\n\
  ```\n\n在执行计划中，有趣的是注意到与 `RESULT CACHE` 操作关联了一个名称，即 *缓存 ID*。如果你知道缓存 ID，就可以查询视图 `v$result_cache_objects`\
  \ 来显示有关缓存数据的信息。以下查询显示了缓存的结果集是否已发布（换句话说，可供使用）、结果缓存创建的时间、构建它花费了多少时间（以百分之一秒为单位）、其中存储了多少行数据以及它被引用了多少次。其他提供结果缓存信息的视图有\
  \ `v$result_cache_dependency`、`v$result_cache_memory` 和 `v$result_cache_statistics`。\n\
  \n```sql\nSQL> SELECT status, creation_timestamp, build_time, row_count, scan_count\n\
  \  2  FROM v$result_cache_objects\n  3  WHERE cache_id = 'fxtfk2w8kgrhm6c5j1y73twrgp';\n\
  ```\n\n```sql\nSTATUS    CREATION_TIMESTAMP   BUILD_TIME ROW_COUNT SCAN_COUNT\n\
  --------- -------------------- ---------- --------- ----------\nPublished 08.04.2008\
  \ 23:51:38         168        81          1\n```\n\n为了保证结果的一致性（即无论结果是从缓存提供还是根据数据库内容计算，结果集都相同），每当查询引用的对象发生任何变化时，依赖于它的缓存条目都会失效（远程对象的例外情况稍后讨论）。即使没有实际变化发生，情况也是如此。例如，即使是一个\
  \ `SELECT FOR UPDATE`，紧接着执行一个 `COMMIT`，也会导致依赖于被选择表的缓存条目失效。\n\n以下是控制服务器结果缓存的动态初始化参数：\n\
  \n*   `result_cache_max_size` 指定（以字节为单位）可用于结果缓存的共享池内存量。如果设置为 0，则禁用该功能。默认值大于 0，源自共享池的大小。内存分配是动态的，因此此初始化参数仅指定上限。你可以使用如下查询显示当前已分配的内存：\n\
  \n```sql\nSQL> SELECT name, sum(bytes)\n  2  FROM v$sgastat\n  3  WHERE name LIKE\
  \ 'Result Cache%'\n  4  GROUP BY rollup(name);\n```\n\n\n\n"
- "# Oracle 结果缓存详解\n\n| 名称                         | 字节总和   |\n|------------------------------|------------|\n\
  | 结果缓存                     | 196888     |\n| 结果缓存：布隆过滤器         | 2048       |\n\
  | 结果缓存：缓存管理器         | 152        |\n| 结果缓存：内存管理器         | 200        |\n| 结果缓存：状态对象\
  \           | 2896       |\n|                              | 202184     |\n\n##\
  \ 服务器结果缓存\n\n### 初始化参数\n\n*   `result_cache_mode` 指定了在何种情况下使用结果缓存。可以将其设置为 `manual`（默认值）或\
  \ `force`。在 `manual` 模式下，仅当使用了 `result_cache` 提示时才使用结果缓存。在 `force` 模式下，所有未包含 `no_result_cache`\
  \ 提示的查询都会使用结果缓存。由于大多数情况下你只希望对有限数量的查询使用结果缓存，建议保持此初始化参数的默认值，仅在必要时添加 `result_cache`\
  \ 提示。\n*   `result_cache_max_result` 指定了任何单个结果可以使用的 `result_cache_max_size` 的百分比。默认值为\
  \ 5。允许值范围为 0 到 100。超过此限制的结果将失效。\n*   `result_cache_remote_expiration` 指定了基于远程对象的结果的时间有效性（以分钟为单位）。这是必要的，因为当远程对象发生更改时，不会立即使其相关结果失效。相反，结果会在超过此初始化参数定义的时间有效性后失效。默认值为\
  \ 0，表示禁用基于远程对象的查询缓存。\n\n初始化参数 `result_cache_max_size` 和 `result_cache_max_result`\
  \ 只能在系统级别更改。另外两个，`result_cache_mode` 和 `result_cache_remote_expiration`，也可以在会话级别更改。\n\
  \n***\n\n**注意：** 将初始化参数 `result_cache_remote_expiration` 设置为大于 0 的值可能导致结果过时。因此，只有在你完全理解并接受其影响的情况下，才应使用大于\
  \ 0 的值。\n\n***\n\n### 使用限制\n\n结果缓存的使用有以下几个明显的限制：\n\n*   引用非确定性函数、序列和临时表的查询不会被缓存。\n\
  *   违反读一致性的查询不会被缓存。例如，由一个对引用表持有未提交事务的会话创建的结果集无法被缓存。\n*   引用数据字典视图的查询不会被缓存。\n\n***\n\
  \n### DBMS_RESULT_CACHE 包\n\n你可以使用 `dbms_result_cache` 包来管理结果缓存。它提供了以下子程序：\n\n*\
  \   `bypass` 临时禁用（或启用）会话或系统级别的结果缓存。\n*   `flush` 从结果缓存中移除所有对象。\n*   `invalidate`\
  \ 使所有依赖于给定数据库对象的结果集失效。\n*   `invalidate_object` 使单个缓存条目失效。\n*   `memory_report`\
  \ 生成关于内存使用情况的报告。\n*   `status` 显示结果缓存的状态。\n\n## PL/SQL 函数结果缓存\n\nPL/SQL 函数结果缓存与服务器结果缓存类似，但它支持\
  \ PL/SQL 函数。它也与服务器结果缓存共享相同的内存结构。其目的是将函数（仅限于函数——结果缓存不能用于过程）的返回值存储在结果缓存中。显然，具有不同输入值的函数会被缓存到不同的缓存条目中。以下示例（摘自\
  \ `result_cache_plsql.sql` 脚本的输出）显示了一个启用了结果缓存的函数。为启用它，指定了 `RESULT_CACHE` 子句。可选地，`RELIES_ON`\
  \ 子句还可以指定函数的返回值依赖于哪些表。此信息对于缓存条目的失效至关重要。\n\n```\nSQL> CREATE OR REPLACE FUNCTION\
  \ f(p IN NUMBER)\n  2    RETURN NUMBER\n  3    RESULT_CACHE RELIES_ON (t)\n  4 \
  \ IS\n  5    l_ret NUMBER;\n  6  BEGIN\n  7    SELECT count(*) INTO l_ret\n  8 \
  \   FROM t\n  9    WHERE id = p;\n 10    RETURN l_ret;\n 11  END;\n 12  /\n```\n\
  \n在以下示例中，在禁用结果缓存的情况下调用了该函数 10,000 次（使用 `bypass` 过程临时禁用缓存）。执行耗时 4.76 秒。\n\n```\n\
  SQL> execute dbms_result_cache.bypass(bypass_mode => TRUE, session => TRUE)\n\n\
  SQL> SELECT count(f(1)) FROM t;\n\nCOUNT(F(1))\n-----------\n      10000\n\nElapsed:\
  \ 00:00:04.76\n```\n\n现在，再次调用该函数 10,000 次，但这次启用了结果缓存。执行仅耗时 0.04 秒。\n\n```\nSQL>\
  \ execute dbms_result_cache.bypass(bypass_mode => FALSE, session => TRUE)\n\nSQL>\
  \ SELECT count(f(1)) FROM t;\n\nCOUNT(F(1))\n-----------\n      10000\n\nElapsed:\
  \ 00:00:00.04\n```\n\n***\n\n**注意：** 如果未指定 `RELIES_ON` 子句，或指定了错误信息，那么由于函数所依赖的对象发生修改而进行的失效操作将不会发生。因此，可能导致结果过时。\n\
  \n***\n\n### PL/SQL 函数结果缓存使用限制\n\n结果缓存不能用于以下函数：\n\n*   具有 `OUT` 和/或 `IN OUT` 参数的函数\n\
  *   以调用者权限定义的函数\n*   管道表函数\n*   从匿名块调用的函数\n*   具有 `IN` 参数或返回值类型为以下类型的函数：LOBs、`REF\
  \ CURSOR`、对象和记录\n\n此外，请注意未处理的异常不会存储在结果缓存中。换句话说，如果函数引发异常并且该异常传播给调用者，则下次调用同一函数时将再次执行。\n\
  \n## 客户端结果缓存\n\n客户端结果缓存是一个客户端缓存，用于存储查询的结果集。其目的和工作方式与服务器结果缓存类似。与服务器端实现相比，有两个重要区别。首先，它避免了执行\
  \ SQL 语句所需的客户端/服务器往返。这是一个巨大的优势。其次，失效基于轮询机制，因此无法保证一致性。这是一个巨大的劣势。\n\n为了实现轮询，客户端必须定期执行数据库调用来检查数据库引擎，以查看其缓存的结果集是否需要失效。为了最小化与轮询相关的开销，每次客户端因其他原因执行数据库调用时，它也会检查缓存结果集的有效性。这样，对于持续执行“常规”数据库调用的客户端，可以避免专门用于失效缓存结果集的数据库调用。\n\
  \n即使这是一个客户端缓存，你也必须在服务器端启用它。以下是控制客户端结果缓存的初始化参数：\n\n*   `client_result_cache_size`\
  \ 指定了每个客户端进程可用于结果缓存的最大内存量（以字节为单位）。如果设置为 0（默认值），则该功能被禁用。此初始化参数是静态的，只能在实例级别设置。因此需要重启实例才能更改它。\n\
  *   `client_result_cache_lag` 指定了两次数据库调用之间的最大时间滞后（以毫秒为单位）。换句话说，它指定了过时的结果集可以在客户端缓存中保留多长时间。默认值为\
  \ 3,000。此初始化参数是静态的，只能在实例级别设置。因此需要重启实例才能更改它。\n\n除了服务器端配置外，还可以在客户端的 `sqlnet.ora` 文件中指定以下参数：\n\
  \n\n\n*   `oci_result_cache_max_size` 会覆盖通过初始化参数 `client_result_cache_size` 指定的服务器端设置。但请注意，如果客户端结果缓存在服务器端被禁用，此参数无法启用它。\n\
  *   `oci_result_cache_max_rset_size` 指定（以字节为单位）任何单个结果集可使用的最大内存量。\n*   `oci_result_cache_max_rset_rows`\
  \ 指定任何单个结果集可存储的最大行数。\n\n###### 何时使用它\n\n如果你遇到的性能问题是由于应用程序反复执行相同操作导致的，那么你需要减少操作的执行频率或响应时间。理想情况下，你应该两者都做。然而，有时（例如，当应用程序的代码无法修改时）你只能实现后者。为了减少响应时间，你应该首先采用第\
  \ 9 章和第 10 章介绍的技术。如果这还不够，才应考虑高级优化技术，例如结果缓存。基本上，结果缓存在两个条件下是有效的。第一，相同数据的查询频率高于其修改频率。第二，有足够的内存来存储结果。\n\
  \n在大多数情况下，你不应该为所有查询启用结果缓存。事实上，大多数时候，只有特定的查询才能从结果缓存中受益。对于其他查询，结果缓存管理纯粹是开销，还可能使缓存负担过重。此外，请记住服务器端缓存由所有会话共享，因此它们的访问是同步的（它们可能像任何共享资源一样成为串行化点）。因此，你只应为需要它的查询启用结果缓存。换句话说，提示\
  \ `result_cache` 应选择性地添加，并且只有在真正需要提高性能时才使用。\n\n服务器结果缓存并不能完全避免执行查询的开销。这意味着，如果一个查询在不使用结果缓存的情况下每行执行的逻辑读已经相对较少（且没有物理读），那么使用它时速度不会快很多。请记住，缓冲区缓存和结果缓存都存储在相同的共享内存中。\n\
  \nPL/SQL 函数结果缓存对于在 SQL 语句中频繁使用的函数特别有用。事实上，此类函数为处理或返回的每一行都被调用，而只有少数行的输入参数不同的情况并不少见。但是，从\
  \ PL/SQL 中频繁调用的函数也可以利用结果缓存。\n\n由于一致性问题，客户端结果缓存应仅用于只读或主要是读取的表。\n\n最后，请注意，你可以同时利用服务器和客户端结果缓存。但是，对于由客户端执行的查询，你不能选择绕过客户端结果缓存而仅使用服务器结果缓存。换句话说，两个结果缓存都会被使用。\n\
  \n###### 陷阱与误区\n\n正如前几节所指出的，在以下情况下不保证结果的一致性：\n\n*   当初始化参数 `result_cache_remote_expiration`\
  \ 设置为大于 0 的值，并且通过数据库链接执行查询时\n*   当定义未指定（或错误指定）`RELIES_ON` 子句的 PL/SQL 函数时\n*   当使用客户端结果缓存时\n\
  \n在这种情况下，除非你完全理解并接受每种情况的含义，否则最好避免使用结果缓存。\n\n##### 并行处理\n\n当你向数据库引擎提交 SQL 语句时，默认情况下它由单个服务器进程串行执行。因此，即使运行数据库引擎的服务器有多个\
  \ CPU，你的 SQL 语句也只在单个 CPU 上运行。并行处理的目的是将单个 SQL 语句的执行分配到多个 CPU 上。\n\n* * *\n\n**注意**\
  \ 并行处理仅在企业版中可用。\n\n* * *\n\n###### 工作原理\n\n在描述查询、DML 语句和 DDL 语句如何并行执行的具体细节之前，理解并行处理的基础知识、了解如何配置实例以利用并行处理以及如何控制并行度非常重要。\n\
  \n* * *\n\n**注意** 因为从 Oracle Database 10*g* 开始，与并行处理相关的执行计划更具描述性，所以在以下章节中，我只展示在该版本上生成的执行计划。如果你想将它们与\
  \ Oracle9*i* 的执行计划进行比较，可以运行可下载的脚本。\n\n* * *\n\n**基础知识**\n\n没有并行处理时，SQL 语句由单个服务器进程串行执行，而该进程又在单个\
  \ CPU 上运行。这意味着执行 SQL 语句所使用的资源量受限于单个 CPU 能处理的量。例如，如图 11-5 所示，如果一个 SQL 语句执行扫描整个段的数据访问操作（如果大部分数据是从磁盘读取，这可能是\
  \ I/O 密集型操作），而不管 I/O 子系统可以提供的总吞吐量如何，响应时间都会受到单个 CPU 可用带宽的限制。当然，这种带宽可能因为 CPU 与磁盘之间数据访问路径的硬件限制而受限，但也因为执行是串行的：当服务器进程在\
  \ CPU 上时，根据定义它没有在访问磁盘（异步 I/O 是例外），因此无法利用 I/O 子系统可以提供的总吞吐量。\n\n![image](img/1105.jpg)\n\
  \n**图 11-5.** *串行执行的 SQL 语句由单个服务器进程处理。*\n\n以下 SQL 语句及其相关执行计划展示了图 11-5 所示处理的示例：\n\
  \n```\nSELECT * FROM t\n\n----------------------------------\n| Id  | Operation\
  \         | Name |\n----------------------------------\n|   0 | SELECT STATEMENT\
  \  |      |\n|   1 |  TABLE ACCESS FULL| T    |\n----------------------------------\n\
  ```\n\n并行处理的目的是将一个大任务拆分成若干个较小的子任务。如果有一个并行处理的 SQL 语句，这基本上意味着有多个*从属进程*协作执行一个 SQL 语句。从属进程的协调由提交\
  \ SQL 语句的会话关联的服务器进程控制。由于这个角色，它通常被称为*查询协调器*。查询协调器负责获取从属进程，为每个从属进程分配一个子任务，收集并组合它们交付的部分结果集，并将最终结果集返回给客户端。例如，在需要扫描整个段的\
  \ SQL 语句的情况下，查询协调器可以指示每个从属进程扫描段的一部分并将必要数据交付给它。图 11-6 说明了这一点。由于四个从属进程中的每一个都能在不同的\
  \ CPU 上运行，在这种情况下，响应时间不再受限于单个 CPU 可用的带宽。\n\n![image](img/1106.jpg)\n\n**图 11-6.**\
  \ *并行执行的 SQL 语句由一组从属进程处理，这些从属进程由一个服务器进程（即查询协调器）协调。*\n\n\n"
- '# 并行执行中的粒度与操作


  在如图 11-6 所示的并行扫描中，工作以称为*粒度*的工作单元分配给从属进程。每个从属进程在特定时间处理单个粒度。如果粒度数量多于从属进程，那么当一个从属进程完成一个粒度的工作后，它将接收另一个粒度，直到所有粒度都被处理完毕。数据库引擎可以使用两种类型的粒度：


  *   **分区粒度**：是整个分区或子分区。显然，这种粒度只能用于分区段。

  *   **块范围粒度**：是在运行时（而非解析时）动态定义的段的块范围。


  由于分区粒度的定义是静态的（只有数量可能因分区修剪而变化），块范围粒度在大多数情况下更常用。它们的主要优势在于，在大多数情况下，它们允许将工作均匀地分配给从属进程。实际上，使用分区粒度时，工作分配不仅高度依赖于从属进程数量与分区数量的比率，还依赖于每个分区中存储的数据量。如果工作分配不均，一些从属进程可能比其他进程工作得多得多，因此可能导致更长的响应时间。结果，并行执行的整体效率可能会受到影响。


  以下执行计划展示了图 11-6 中说明的处理示例。操作 4 (`TABLE ACCESS FULL`) 扫描表 `t` 的一部分。它扫描哪一部分取决于其父操作
  3 (`PX BLOCK ITERATOR`)。这是与块范围粒度相关的操作。然后，操作 2 (`PX SEND QC`) 将检索到的数据发送给查询协调器。请注意，在执行计划中，您可以通过查看列
  `TQ` 来识别由一组从属进程执行的操作。在此执行计划中，操作 2 到 4 具有相同的值 (`Q1,00`)，因此由同一组从属进程执行（注意，根据执行计划，您无法知道该组中有多少从属进程）。还要注意操作
  2 中从属进程与查询协调器 (`QC`) 之间的并行到串行 (`P->S`) 通信。这是必要的，因为如图 11-6 所示，四个从属进程向查询协调器发送数据。


  ```sql

  SELECT * FROM t


  ----------------------------------------------------------------------

  | Id  | Operation            | Name     |    TQ  |IN-OUT| PQ Distrib |

  ----------------------------------------------------------------------

  |   0 | SELECT STATEMENT     |          |        |      |            |

  |   1 |  PX COORDINATOR      |          |        |      |            |

  |   2 |   PX SEND QC (RANDOM)| :TQ10000 |  Q1,00 | P->S | QC (RAND)  |

  |   3 |    PX BLOCK ITERATOR |          |  Q1,00 | PCWC |            |

  |   4 |     TABLE ACCESS FULL| T        |  Q1,00 | PCWP |            |

  ----------------------------------------------------------------------

  ```


  数据访问操作并不是唯一可以并行执行的操作。实际上，除此之外，数据库引擎还能够并行化插入、连接、聚合和排序。当一条 SQL 语句执行两个或多个独立操作（例如，扫描和排序）时，数据库引擎通常使用两组从属进程。例如，如图
  11-7 所示，如果一条 SQL 语句执行扫描然后排序，则一组用于扫描，另一组用于排序。


  ![image](img/1107.jpg)


  **图 11-7.** *可以使用多组从属进程来执行一条 SQL 语句。*


  单个操作的并行化称为*操作内并行性*。例如，在图 11-7 中，操作内并行性（使用四个从属进程）被使用了两次：一次用于扫描，一次用于排序。当使用多组从属进程执行一条
  SQL 语句时，这种并行化称为*操作间并行性*。例如，在图 11-7 中，操作间并行性用于集合 1（扫描）和集合 2（排序）之间。


  当使用操作间并行性时，会发生从属进程组之间的通信。在图 11-7 中，集合 1 从段中读取数据并将其发送给集合 2 进行排序。发送数据的从属进程称为*生产者*。接收数据的从属进程称为*消费者*。根据生产者和消费者执行的操作，行使用以下方法之一进行分布：


  *   **广播**：每个生产者将所有行发送给每个消费者。

  *   **循环**：生产者像发牌一样，逐个将每行发送给单个消费者。结果，行被均匀地分布在消费者之间。

  *   **范围**：生产者将特定的行范围发送给不同的消费者。执行动态范围分区以确定哪一行必须发送给哪个消费者。例如，对于排序，此方法基于 `ORDER BY`
  子句中使用的列对行进行范围分区。

  *   **哈希**：生产者根据哈希函数的计算结果将行发送给消费者。执行动态哈希分区以确定哪一行要发送给哪个消费者。例如，对于聚合，此方法可以基于 `GROUP
  BY` 子句中使用的列对行进行哈希分区。

  *   **QC 随机**：每个生产者将所有行发送给查询协调器。顺序不重要（因此是随机的）。这是与查询协调器通信最常用的分布方式。

  *   **QC 顺序**：每个生产者将所有行发送给查询协调器。顺序很重要。例如，并行执行的排序使用此方法将数据发送给查询协调器。


  **并行操作之间的关系**


  在并行执行的执行计划中，使用以下并行操作之间的关系：


  *   **并行到串行 (`P->S`)**：一个并行操作将数据发送给串行操作。例如，在每个执行计划中，这用于将数据发送给查询协调器。

  *   **并行到并行 (`P->P`)**：一个并行操作将数据发送给另一个并行操作。当存在两组从属进程时使用此关系。

  *   **与父操作并行组合 (`PCWP`)**：一个操作由与执行计划中父操作相同的从属进程并行执行。因此，不发生通信。

  *   **与子操作并行组合 (`PCWC`)**：一个操作由与执行计划中子操作相同的从属进程并行执行。因此，不发生通信。

  *   **串行到并行 (`S->P`)**：一个串行操作将数据发送给并行操作。由于大多数情况下这是低效的，应避免使用。主要有两个原因。首先，单个进程可能无法像多个进程消费数据那样快地产生数据。如果是这种情况，消费者会花费大量时间等待数据，而不是做实际工作。其次，需要不必要的通信来将数据从串行执行的操作发送到并行执行的操作。


  在由包 `dbms_xplan` 生成的输出中，并行操作之间的关系在列 `IN-OUT` 中提供。



