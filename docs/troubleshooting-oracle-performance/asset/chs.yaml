- "# PL/SQL\n\nPL/SQL 提供了不同的方法来执行 SQL 语句。主要分为**静态 SQL** 和**动态 SQL** 两大类。动态 SQL 又可以进一步分为三个子类：`EXECUTE\
  \ IMMEDIATE`、`OPEN`/`FETCH`/`CLOSE` 以及 `dbms_sql` 包。所有这些方法中，唯一与解析相关的可用特性是使用绑定变量。实际上，语句重用和客户端语句缓存仅部分可用。它们并未在所有方法中实现。接下来的章节将描述这四类方法各自的特性。\n\
  \n## 注意\n\n由于 PL/SQL 在数据库引擎中运行，谈论客户端语句缓存可能看起来有些奇怪。然而，从 SQL 引擎的角度来看，PL/SQL 是一个客户端。在该客户端中，先前讨论的客户端语句缓存概念已经实现。\n\
  \n本节提供的 PL/SQL 块示例摘自脚本 `ParsingTest1.sql`、`ParsingTest2.sql` 和 `ParsingTest3.sql`，这些脚本分别实现了测试用例\
  \ 1、2 和 3。\n\n## 静态 SQL\n\n静态 SQL 集成在 PL/SQL 语言中。顾名思义，它是静态的，因此 SQL 语句必须在编译时完全已知。为此，如果\
  \ SQL 语句有参数，使用绑定变量是不可避免的。例如，使用静态 SQL 不可能编写一个重现测试用例 1 的代码片段。\n\n你可以用两种方式编写静态 SQL。第一种基于隐式游标，因此无法控制游标生命周期。以下\
  \ PL/SQL 块展示了一个实现测试用例 2 的示例：\n\n```sql\nDECLARE\n  l_pad VARCHAR2(4000);\nBEGIN\n\
  \  FOR i IN 1..10000\n  LOOP\n    SELECT pad INTO l_pad\n    FROM t\n    WHERE val\
  \ = i;\n  END LOOP;\nEND;\n```\n\n第二种方式基于显式游标。在这种情况下，可以对游标进行一些控制。然而，打开/解析/执行阶段被合并为单一操作（`OPEN`）。这意味着只有取数阶段可以被控制。以下\
  \ PL/SQL 块也展示了实现测试用例 2 的示例：\n\n```sql\nDECLARE\n  CURSOR c (p_val NUMBER) IS SELECT\
  \ pad FROM t WHERE val = p_val;\n  l_pad VARCHAR2(4000);\nBEGIN\n  FOR i IN 1..10000\n\
  \  LOOP\n    OPEN c(i);\n    FETCH c INTO l_pad;\n    CLOSE c;\n  END LOOP;\nEND;\n\
  ```\n\n从性能角度来看，这两种方法相似。虽然它们都防止了编写糟糕的代码（测试用例 1），但不允许编写非常高效的代码（测试用例 3）。这是因为无法完全控制游标。\n\
  \n为了解决这个问题，客户端游标缓存是可用的。在 Oracle9*i* 版本 9.2.0.4 之前，它始终启用，因为缓存游标的最大数量由初始化参数 `open_cursors`\
  \ 决定。因此，每个可以打开的游标也可以被缓存。从 Oracle9*i* 版本 9.2.0.5 开始，缓存游标的数量由初始化参数 `session_cached_cursors`\
  \ 决定。直到 Oracle Database 10*g* Release 1，该参数的默认值都是 0。但是，如果没有显式设置为 0，则默认的缓存游标数是 50。请注意，在这两种情况下，一个与客户端语句缓存无直接关系的初始化参数被“误用”来配置它！\n\
  \n## 原生动态 SQL：EXECUTE IMMEDIATE\n\n从游标管理的角度来看，基于 `EXECUTE IMMEDIATE` 的原生动态 SQL 与使用隐式游标的静态\
  \ SQL 类似。换句话说，无法控制游标的生命周期。以下 PL/SQL 块展示了一个实现测试用例 2 的示例：\n\n```sql\nDECLARE\n  l_pad\
  \ VARCHAR2(4000);\nBEGIN\n  FOR i IN 1..10000\n  LOOP\n    EXECUTE IMMEDIATE 'SELECT\
  \ pad FROM t WHERE val = :1' INTO l_pad USING i;\n  END LOOP;\nEND;\n```\n\n由于无法控制游标，因此无法编写实现测试用例\
  \ 3 的代码。为此，像静态 SQL 一样，使用了客户端游标缓存。然而，它仅从 Oracle Database 10*g* Release 1 开始可用。\n\n\
  ## 原生动态 SQL：OPEN/FETCH/CLOSE\n\n从游标管理的角度来看，基于 `OPEN`/`FETCH`/`CLOSE` 的原生动态 SQL 与使用显式游标的静态\
  \ SQL 类似。换句话说，只能控制取数阶段。以下 PL/SQL 块展示了一个实现测试用例 2 的示例：\n\n```sql\nDECLARE\n  TYPE\
  \ t_cursor IS REF CURSOR;\n  l_cursor t_cursor;\n  l_pad VARCHAR2(4000);\nBEGIN\n\
  \  FOR i IN 1..10000\n  LOOP\n    OPEN l_cursor FOR 'SELECT pad FROM t WHERE val\
  \ = :1' USING i;\n    FETCH l_cursor INTO l_pad;\n    CLOSE l_cursor;\n  END LOOP;\n\
  END;\n```\n\n由于无法完全控制游标，因此无法编写实现测试用例 3 的代码。此外，数据库引擎无法利用基于 `OPEN`/`FETCH`/`CLOSE`\
  \ 的原生动态 SQL 进行客户端语句缓存。这意味着解决由使用此方法的代码引起的解析问题的唯一方法是用 `EXECUTE IMMEDIATE` 或 `dbms_sql`\
  \ 包重写它。作为变通方案，你还应该考虑服务器端语句缓存。\n\n## 动态 SQL：dbms_sql 包\n\n`dbms_sql` 包提供了对游标生命周期的完全控制。在以下\
  \ PL/SQL 块（实现测试用例 2）中，请注意每个步骤是如何显式编码的：\n\n```sql\nDECLARE\n  l_cursor INTEGER;\n\
  \  l_pad VARCHAR2(4000);\n  l_retval INTEGER;\nBEGIN\n  FOR i IN 1..10000\n  LOOP\n\
  \    l_cursor := dbms_sql.open_cursor;\n    dbms_sql.parse(l_cursor, 'SELECT pad\
  \ FROM t WHERE val = :1', 1);\n    dbms_sql.define_column(l_cursor, 1, l_pad, 10);\n\
  \    dbms_sql.bind_variable(l_cursor, ':1', i);\n    l_retval := dbms_sql.execute(l_cursor);\n\
  \    IF dbms_sql.fetch_rows(l_cursor) > 0\n    THEN\n      NULL;\n    END IF;\n\
  \    dbms_sql.close_cursor(l_cursor);\n  END LOOP;\nEND;\n```\n\n由于可以完全控制游标，因此实现测试用例\
  \ 3 没有问题。以下 PL/SQL 块展示了一个示例。请注意，准备游标（`open_cursor`、`parse` 和 `define_column`）和关闭游标（`close_cursor`）的过程被放置在循环之外，以避免不必要的软解析。\n\
  \n```sql\nDECLARE\n  l_cursor INTEGER;\n  l_pad VARCHAR2(4000);\n  l_retval INTEGER;\n\
  BEGIN\n  l_cursor := dbms_sql.open_cursor;\n  dbms_sql.parse(l_cursor, 'SELECT pad\
  \ FROM t WHERE val = :1', 1);\n  dbms_sql.define_column(l_cursor, 1, l_pad, 10);\n\
  \  FOR i IN 1..10000\n  LOOP\n    dbms_sql.bind_variable(l_cursor, ':1', i);\n \
  \   l_retval := dbms_sql.execute(l_cursor);\n    IF dbms_sql.fetch_rows(l_cursor)\
  \ > 0\n    THEN\n      NULL;\n    END IF;\n  END LOOP;\n  dbms_sql.close_cursor(l_cursor);\n\
  END;\n```\n\n数据库引擎无法利用 `dbms_sql` 包进行客户端语句缓存。因此，为了优化一个因过多软解析（如测试用例 2）而性能不佳的应用程序，你必须修改它以重用游标（如测试用例\
  \ 3 所做）。作为变通方案，你可以考虑服务器端语句缓存。\n\n\n\n"
- "# OCI\n\nOCI 是一个低级的应用程序编程接口。因此，它提供了对游标生命周期的完全控制。例如，在下面实现测试用例 2 的代码片段中，请注意每一步都是显式编码的：\n\
  \n```\nfor (i=1 ; i<=10000 ; i++)\n{\n  OCIStmtPrepare2(svc, (OCIStmt **)&stm, err,\
  \ sql, strlen(sql), NULL, 0,\n                  OCI_NTV_SYNTAX, OCI_DEFAULT);\n\
  \  OCIDefineByPos(stm, &def, err, 1, val, sizeof(val), SQLT_STR, 0, 0, 0,\n    \
  \             OCI_DEFAULT);\n  OCIBindByPos(stm, &bnd, err, 1, &i, sizeof(i), SQLT_INT,\
  \ 0, 0, 0, 0, 0,\n               OCI_DEFAULT);\n  OCIStmtExecute(svc, stm, err,\
  \ 0, 0, 0, 0, OCI_DEFAULT);\n  if (r = OCIStmtFetch2(stm, err, 1, OCI_FETCH_NEXT,\
  \ 0, OCI_DEFAULT) == OCI_SUCCESS)\n  {\n    // do something with data...\n  }\n\
  \  OCIStmtRelease(stm, err, NULL, 0, OCI_DEFAULT);\n}\n```\n\n由于可以完全控制游标，因此也可以实现测试用例\
  \ 3。以下代码片段是一个示例。请注意，准备游标的函数 (`OCIStmtPrepare2` 和 `OCIDefineByPos`) 以及关闭游标的函数 (`OCIStmtRelease`)\
  \ 被放置在循环外部，以避免不必要的软解析。\n\n```\nOCIStmtPrepare2(svc, (OCIStmt **)&stm, err, sql,\
  \ strlen(sql), NULL, 0,\n                OCI_NTV_SYNTAX, OCI_DEFAULT);\nOCIDefineByPos(stm,\
  \ &def, err, 1, val, sizeof(val), SQLT_STR, 0, 0, 0, OCI_DEFAULT);\nfor (i=1 ; i<=10000\
  \ ; i++) {\n  OCIBindByPos(stm, &bnd, err, 1, &i, sizeof(i), SQLT_INT, 0, 0, 0,\
  \ 0, 0,\n               OCI_DEFAULT);\n  OCIStmtExecute(svc, stm, err, 0, 0, 0,\
  \ 0, OCI_DEFAULT);\n  if (r = OCIStmtFetch2(stm, err, 1, OCI_FETCH_NEXT, 0, OCI_DEFAULT)\
  \ == OCI_SUCCESS)\n  {\n    // do something with data...\n  }\n}\nOCIStmtRelease(stm,\
  \ err, NULL, 0, OCI_DEFAULT);\n```\n\nOCI 不仅能够完全控制游标，还支持客户端语句缓存。要使用它，只需启用语句缓存并使用函数\
  \ `OCIStmtPrepare2` 和 `OCIStmtRelease`（如前面的示例所示）。当调用函数 `OCIStmtRelease` 时，游标会被添加到缓存中。然后，当通过函数\
  \ `OCIStmtPrepare2` 创建新游标时，会查询缓存以查找是否存在具有相同文本的 SQL 语句。存在不同的方法来启用语句缓存。但基本上，只需在会话打开或从池中检索时指定即可。例如，如果通过函数\
  \ `OCILogon2` 打开非池化会话，则需要指定值 `OCI_LOGON2_STMTCACHE` 作为模式。\n\n```\nOCILogon2(env,\
  \ err, &svc, username, strlen(username), password, strlen(password),\ndbname, strlen(dbname),\
  \ OCI_LOGON2_STMTCACHE)\n```\n\n默认情况下，缓存的大小为 20。下面的代码片段展示了如何通过在服务上下文上设置属性 `OCI_ATTR_STMTCACHESIZE`\
  \ 将其更改为 50。请注意，将此属性设置为 0 会禁用语句缓存。\n\n```\nub4 size = 50;\nOCIAttrSet(svc, OCI_HTYPE_SVCCTX,\
  \ &size, 0, OCI_ATTR_STMTCACHESIZE, err);\n```\n\n本节提供的 C 代码示例摘自文件 `ParsingTest1.c`、`ParsingTest2.c`\
  \ 和 `ParsingTest3.c`，它们分别实现了测试用例 1、2 和 3。\n\n"
- "# JDBC\n\n`java.sql.Statement` 是 JDBC 提供的用于执行 SQL 语句的基本类。如表 8-1 所示，使用它时很可能会遇到解析问题。事实上，它不支持绑定变量、游标重用或客户端语句缓存。基本上，只能用它实现测试用例\
  \ 1。以下代码片段演示了这一点：\n\n```\nsql = \"SELECT pad FROM t WHERE val = \";\nfor (int i=0\
  \ ; i<10000; i++) {\n  statement = connection.createStatement();\n  resultset =\
  \ statement.executeQuery(sql + Integer.toString(i));\n  if (resultset.next())\n\
  \  {\n    pad = resultset.getString(\"pad\");\n  }\n  resultset.close();\n  statement.close();\n\
  }\n```\n\n为了避免前面代码片段执行的所有硬解析，您必须使用类 `java.sql.PreparedStatement`，它是 `java.sql.Statement`\
  \ 的子类。以下代码片段展示了如何使用它来实现测试用例 2。请注意，用于查找的值不是连接到变量 `sql`（如前面的示例），而是通过绑定变量（在 Java 中用问号定义，称为占位符）来定义的。\n\
  \n```\nsql = \"SELECT pad FROM t WHERE val = ?\";\nfor (int i=0 ; i<10000; i++)\n\
  {\n  statement = connection.prepareStatement(sql);\n  statement.setInt(1, i);\n\
  \  resultset = statement.executeQuery();\n  if (resultset.next())\n  {\n    pad\
  \ = resultset.getString(\"pad\");\n  }\n  resultset.close();\n  statement.close();\n\
  }\n```\n\n下一个改进是避免软解析，也就是说，实现测试用例 3。如下列代码片段所示，您可以通过将创建和关闭预处理语句的代码移到循环外部来实现这一点：\n\
  \n```\nsql = \"SELECT pad FROM t WHERE val = ?\";\nstatement = connection.prepareStatement(sql);\n\
  for (int i=0 ; i<10000; i++) {\n  statement.setInt(1, i);\n  resultset = statement.executeQuery();\n\
  \  if (resultset.next())\n  {\n     pad = resultset.getString(\"pad\");\n  }\n \
  \ resultset.close();\n}\nstatement.close();\n```\n\nJDBC 不仅允许正确处理预处理语句，还支持客户端语句缓存。根据\
  \ JDBC 3.0 规范，使用连接池时语句缓存应该是透明的。实际上，Oracle JDBC 驱动程序提供了两个扩展来支持没有连接池的情况：隐式和显式语句缓存。顾名思义，前者几乎不需要更改代码，而后者必须显式实现。\n\
  \n对于显式语句缓存，语句通过 Oracle 定义的方法打开和关闭。由于这对代码有很大影响，并且与隐式语句缓存相比，编写更快的代码更困难，因此此处不作描述。有关更多信息，请参阅\
  \ *JDBC Developer's Guide and Reference* 手册。\n\n对于隐式语句缓存，当调用 `close` 方法时，预处理语句会被添加到缓存中。然后，当通过\
  \ `prepareStatement` 方法实例化新的 `prepared statement` 时，会检查缓存以查找是否已存在具有相同文本的游标。\n\n\
  以下代码行显示了如何在连接级别启用语句缓存。请注意：将缓存大小设置为大于 0 的值是必需的。强制转换是必需的，因为这两个方法都是 Oracle 扩展。\n\n\
  ```\n((oracle.jdbc.OracleConnection)connection).setImplicitCachingEnabled(true);\n\
  ((oracle.jdbc.OracleConnection)connection).setStatementCacheSize(50);\n```\n\n另一种启用隐式语句缓存的方法是通过类\
  \ `OracleDataSource` 的方法 `setImplicitCachingEnabled` 和 `setMaxStatements`。请注意，从\
  \ Oracle Database 10*g* Release 2 开始，`setMaxStatements` 方法已弃用。\n\n默认情况下，所有预处理语句都使用隐式语句缓存进行缓存。当缓存已满时，最近最少使用的语句将被简单地丢弃。如果需要，也可以禁用特定语句的缓存。以下代码行展示了如何操作：\n\
  \n```\n((oracle.jdbc.OraclePreparedStatement)statement).setDisableStmtCaching(true);\n\
  ```\n\n本节示例中使用的 Java 代码摘自文件 `ParsingTest1.java`、`ParsingTest2.java` 和 `ParsingTest3.java`，它们分别实现了测试用例\
  \ 1、2 和 3。\n\n\n\n#### ODP.NET\n\nODP.NET 对游标生命周期的控制能力有限。在下面实现测试用例 1 的代码片段中，`ExecuteReader`\
  \ 方法会同时触发解析、执行和获取调用：\n\n```\nsql = \"SELECT pad FROM t WHERE val = \";\ncommand\
  \ = new OracleCommand(sql, connection);\nfor (int i = 0; i < 10000; i++)\n{\n  command.CommandText\
  \ = sql + i;\n  reader = command.ExecuteReader();\n  if (reader.Read())\n  {\n \
  \   pad = reader[0].ToString();\n  }\n  reader.Close();\n}\n```\n\n为避免前述代码片段执行的所有硬解析，必须使用\
  \ `OracleParameter` 类来传递参数（绑定变量）。以下代码片段展示了如何用它来实现测试用例 2。请注意，用于查找的值不是连接到变量 `sql`（如前一个示例所示），而是通过一个参数来定义。\n\
  \n```\nString sql = \"SELECT pad FROM t WHERE val = :val\";\nOracleCommand command\
  \ = new OracleCommand(sql, connection);\nOracleParameter parameter = new OracleParameter(\"\
  val\", OracleDbType.Int32);\ncommand.Parameters.Add(parameter);\nOracleDataReader\
  \ reader;\nfor (int i = 0; i < 10000; i++)\n{\n  parameter.Value = Convert.ToInt32(i);\n\
  \  reader = command.ExecuteReader();\n  if (reader.Read())\n  {\n    pad = reader[0].ToString();\n\
  \  }\n  reader.Close();\n}\n```\n\n使用 ODP.NET，无法实现测试用例 3。但是，要达到相同的结果，可以使用自 ODP.NET\
  \ 10.1.0.3 版本起的客户端语句缓存。启用它并设置缓存大小有两种方法。第一种是设置注册表中的以下值，它控制使用特定 Oracle 主目录的所有应用程序的语句缓存。如果设置为\
  \ 0，则禁用语句缓存。否则，启用语句缓存，该值指定缓存的大小（`<Assembly_Version>` 是 `Oracle.DataAccess.dll` 的完整版本号）。\n\
  \n```\nHKEY_LOCAL_MACHINE\\SOFTWARE\\ORACLE\\ODP.NET\\<Assembly_Version>\\StatementCacheSize\n\
  ```\n\n第二种方法通过 `OracleConnection` 类提供的 `Statement Cache Size` 属性在代码中直接控制语句缓存。基本上，它与注册表值作用相同，但只针对单个连接。以下代码片段展示了如何启用语句缓存并将其大小设置为\
  \ 10：\n\n```\nString connectString = \"User Id=\" + user +\n                   \
  \    \";Password=\" + password +\n                       \";Data Source=\" + dataSource\
  \ +\n                       \";Statement Cache Size=10\";\nOracleConnection connection\
  \ = new OracleConnection(connectString);\n```\n\n请注意，连接级别的设置会覆盖注册表中的设置。此外，当启用语句缓存时，可以通过将属性\
  \ `AddToStatementCache` 设置为 `false` 在命令级别禁用它。\n\n本节示例中使用的 C# 代码节选自文件 `ParsingTest1.cs`\
  \ 和 `ParsingTest2.cs`，它们分别实现了测试用例 1 和 2。\n\n### 转到 第 9 章\n\n本章描述了数据库引擎如何解析 SQL 语句，以及如何识别、解决和规避解析问题。关键信息是，通过了解应用程序的工作方式以及所用应用程序编程接口提供的可能性，你应该能够在开发阶段通过编写高效的代码来避免解析问题。\n\
  \n由于在游标生命周期中，执行阶段紧随 SQL 语句的解析和变量绑定之后，因此有必要概述数据库引擎用于执行单表访问的不同技术。下一章将讨论这一点，并描述如何利用不同类型的索引和分区方法，以帮助加速\
  \ SQL 语句的执行。\n\n## 第 9 章 优化数据访问\n\n正如第 6 章所述，一个执行计划由若干操作组成。最常用的操作是访问、过滤和转换数据的操作。本章专门讨论数据访问操作，或者换句话说，数据库引擎如何能够访问数据。在表中定位数据基本上只有两种方式。第一种是扫描整个表。第二种是基于冗余访问结构（例如索引）或表本身的结构（例如哈希集群）进行查找。此外，在分区的情况下，访问可能仅限于一部分分区。这与在本书中查找特定信息并无不同。你要么阅读整本书，要么阅读某一章，要么使用索引或目录来找到你所需的信息所在的位置。\n\
  \n本章第一部分描述了通过查看由 SQL 跟踪或动态性能视图提供的运行时统计信息来识别低效访问路径的方法。第二部分描述了可用的访问方法以及你应该在何时利用它们。对于每种访问路径，也描述了与之相关的提示和执行计划操作。\n\
  \n***\n\n**注意** 在本章中，几条 SQL 语句包含提示。这样做不仅是为了向你展示哪个提示会导致哪种访问路径，也是为了向你展示它们的使用示例。无论如何，既没有提供实际的引用，也没有提供完整的语法。你可以在\
  \ *SQL 参考* 手册的第 2 章中找到这些内容。\n\n***\n\n#### 识别次优访问路径\n\n第 6 章描述了如何通过检查查询优化器的估计以及限制是否被正确识别来判断执行计划的效率。重要的是要理解，即使查询优化器正确选择了执行计划，也并不意味着该特定执行计划一定会表现良好。可能是通过更改\
  \ SQL 语句或访问结构（例如添加索引），可以考虑采用更好的执行计划。以下部分描述了可执行的额外检查，以帮助识别低效的访问路径、其可能原因以及你可以避免该问题的方法。\n\
  \n\n\n## 标识\n\n最高效的访问路径能够以消耗最少的资源来处理数据。因此，要判断一条访问路径是否高效，你必须判断其处理所消耗的资源量是否可接受。要做到这一点，有必要定义如何衡量资源利用率以及“可接受”意味着什么。此外，你还需要考虑检查的可行性。换句话说，你还需要考虑实施一项检查需要多少工作量。它必须尽可能简单。实际上，一个需要太多时间来实施的完美检查在实践中是不可接受的，特别是当你需要处理数十甚至数百条作为优化候选的\
  \ `SQL` 语句时。\n\n附带说明一下，请记住本节关注的是效率，而不仅仅是速度。必须理解，最高效的访问路径并不总是最快的。正如你将在第 11 章中看到的，通过并行处理，有时即使资源使用量更高，也有可能获得更好的响应时间。当然，从整个系统来看，`SQL`\
  \ 语句使用的资源量越少（换句话说，效率越高），系统的可扩展性和速度就越快。这是必然的，因为资源是有限的。\n\n首先近似地说，当访问路径使用的资源量与返回的行数（即返回给执行计划中父操作的行数）成正比时，该资源量是可接受的。换句话说，当返回的行数很少时，预期的资源利用率很低；当返回的行数很多时，预期的资源利用率很高。因此，检查应基于返回单行所使用的资源量。\n\
  \n在理想情况下，你会希望考虑数据库引擎使用的四种主要资源类型来衡量资源消耗：`CPU`、`内存`、`磁盘`和`网络`。当然，这可以做到，但不幸的是，获取和评估所有这些数据需要大量的时间和精力，通常在调优会话中只能针对有限数量的\
  \ `SQL` 语句进行。你还应该考虑到，在处理一行数据时，`CPU` 处理时间取决于处理器的速度，这显然因系统而异。此外，使用的 `内存` 量远非与返回的行数成正比，而\
  \ `磁盘` 和 `网络` 资源也并非总是会被使用。事实上，经常能看到运行时间长的 `SQL` 语句只使用了适量的 `内存`，并且没有 `磁盘` 或 `网络`\
  \ 访问。\n\n幸运的是，有一个非常容易收集的单一数据库指标，能够告诉你很多关于数据库引擎完成工作量的信息：逻辑读的数量，即在 `SQL` 语句执行期间在缓冲区缓存中访问的块数。这有四个充分的理由。首先，逻辑读是一个\
  \ `CPU` 密集型操作，因此能很好地反映 `CPU` 利用率。其次，逻辑读可能导致物理读，因此，通过减少逻辑读的数量，很可能也会减少 `I/O` 操作。第三，逻辑读是一个受序列化约束的操作。因为你通常需要为多用户负载进行优化，最小化逻辑读有助于避免可扩展性问题。第四，逻辑读的数量在\
  \ `SQL` 语句和执行计划操作级别都很容易获得，无论是在 `SQL` 跟踪文件中还是在动态性能视图中。\n\n由于逻辑读非常擅长近似整体资源消耗，你可以（至少在第一轮优化中）专注于那些每返回行数逻辑读数量很高的访问路径。以下通常被认为是好的“经验法则”：\n\
  \n*   每返回行导致少于约 5 次逻辑读的访问路径可能是好的。\n*   每返回行导致约 10 到 15 次逻辑读的访问路径可能是可接受的。\n*   每返回行导致多于约\
  \ 15 到 20 次逻辑读的访问路径可能是低效的。换句话说，很可能存在改进空间。\n\n要检查每行的逻辑读数量，基本上有两种方法。第一种方法（仅在 Oracle\
  \ Database 10*g* 及以上版本可用）是利用动态性能视图提供的执行统计信息，并通过 `dbms_xplan` 包显示（第 6 章完整描述了此技术）。以下执行计划是使用该方法生成的。从中，对于每个操作，你可以看到返回了多少行（列\
  \ `A-Rows`）以及为了返回这些行执行了多少逻辑读（列 `Buffers`）。\n\n```\nSELECT * FROM t WHERE n1 BETWEEN\
  \ 6000 AND 7000 AND n2 = 19\n\n----------------------------------------------------------------------------\n\
  | Id | Operation                      | Name   | Starts | A-Rows | Buffers |\n----------------------------------------------------------------------------\n\
  |* 1 | TABLE ACCESS BY INDEX ROWID    | T      |      1 |      3 |      28 |\n|*\
  \ 2 |  INDEX RANGE SCAN              | T_N2_I |      1 |     24 |       4 |\n----------------------------------------------------------------------------\n\
  \n    1 - filter((\"N1\">=6000 AND \"N1\"<=7000))\n    2 - access(\"N2\"=19)\n```\n\
  \n第二种方法是利用 `SQL` 跟踪提供的信息（第 3 章完整描述了此技术）。以下是针对与前面示例中完全相同的查询，由 `TKPROF` 生成的输出摘录。请注意，返回的行数（列\
  \ `Rows`）和逻辑读数量（属性 `cr`）与前面的数字匹配。\n\n```\nRows     Row Source Operation\n-------\
  \ ---------------------------------------------------\n3      TABLE ACCESS BY INDEX\
  \ ROWID T (cr=28 pr=0 pw=0 time=2 us)\n24     INDEX RANGE SCAN T_N2_I (cr=4 pr=0\
  \ pw=0 time=73 us)(object id 13709)\n```\n\n基于前面提到的经验法则，用作示例的执行计划是可接受的。事实上，该访问路径每返回行的逻辑读数量约为\
  \ 9（28/3）。让我们看看针对同一条 `SQL` 语句的一个糟糕的执行计划是什么样子。请注意，它糟糕是因为该访问路径每返回行的逻辑读数量约为 130（391/3），而不是因为它包含了一个全表扫描！\n\
  \n```\n--------------------------------------------------------------\n| Id | Operation\
  \          | Name | Starts | A-Rows | Buffers |\n--------------------------------------------------------------\n\
  |* 1 | TABLE ACCESS FULL  | T    |      1 |      3 |     391 |\n--------------------------------------------------------------\n\
  \n  1 - filter((\"N2\"=19 AND \"N1\">=6000 AND \"N1\"<=7000))\n```\n\n\n\n必须强调的是，本节讨论的是访问路径。因此，您必须仅考虑访问路径级别的数据，而非整个\
  \ SQL 语句级别的数据。实际上，SQL 语句级别的数据可能会产生误导。为了理解问题所在，让我们分析下面的查询。如果错误地仅考虑 SQL 语句级别的数据（由操作\
  \ 1 提供），则返回单行需要执行 389 次逻辑读取。换句话说，这会被错误地归类为低效。然而，如果正确地考虑访问操作（操作 2）的数据，逻辑读取次数（389）与返回行数（160）之间的比值会将此访问路径归类为高效。此案例的问题在于，操作\
  \ 1 用于对操作 2 返回的行应用`sum`函数。因此，它总是返回单行，并掩盖了访问路径的性能数据。\n\n```sql\nSELECT sum(n1) FROM\
  \ t WHERE n2 > 246\n```\n\n```\n---------------------------------------------------------------\n\
  | Id | Operation          | Name | Starts | A-Rows | Buffers |\n---------------------------------------------------------------\n\
  |  1 | SORT AGGREGATE     |      |      1 |      1 |     389 |\n|* 2 |  TABLE ACCESS\
  \ FULL | T    |      1 |    160 |     389 |\n---------------------------------------------------------------\n\
  \n   2 - filter(\"N2\">246)\n```\n\n如果您确实别无选择，只能查看 SQL 语句级别的数据（例如，因为 SQL 跟踪文件不包含执行计划），那么您将很难应用之前提供的经验法则，原因很简单：您没有足够的可用数据。然而，在这种情况下，至少对于简单的\
  \ SQL 语句，您可以尝试猜测访问路径数据，并调整经验法则。例如，您可以仔细检查 SQL 语句以确认其中是否存在聚合操作，找出 SQL 语句中引用了多少张表，然后按引用表的数量比例增加经验法则中的限制值。\n\
  \n### 陷阱\n\n在检查逻辑读取次数时，您必须意识到两个可能扭曲数据的陷阱。第一个与读取一致性有关，第二个与行预取有关。\n\n### 读取一致性\n\n\
  对于每个 SQL 语句，数据库引擎都必须保证所处理数据的一致性。为此，基于当前数据块和撤销信息，可能会在运行时创建数据块的一致性副本。执行此操作需要进行多次逻辑读取。因此，SQL\
  \ 语句执行的逻辑读取次数在很大程度上取决于需要重建的数据块数量。由脚本`read_consistency.sql`生成的输出摘录展示了这种行为。请注意，该查询与上一节使用的查询相同。根据执行统计信息，返回的行数相同（实际上返回的是相同的数据）。然而，执行的逻辑读取次数却高得多（总计\
  \ 354 次，而不是 28 次）。这种效应是由于另一个会话修改了处理此查询所需的数据块造成的。由于在查询启动时这些更改尚未提交，数据库引擎必须重建数据块。这导致了逻辑读取次数的显著增加。\n\
  \n```sql\nSELECT * FROM t WHERE n1 BETWEEN 6000 AND 7000 AND n2 = 19\n```\n\n```\n\
  ----------------------------------------------------------------------------\n|\
  \ Id | Operation                      | Name   | Starts | A-Rows | Buffers |\n----------------------------------------------------------------------------\n\
  |* 1 | TABLE ACCESS BY INDEX ROWID    | T      |      1 |      3 |     354 |\n|*\
  \ 2 |  INDEX RANGE SCAN              | T_N2_I |      1 |     24 |     139 |\n----------------------------------------------------------------------------\n\
  \n   1 - filter((\"N1\">=6000 AND \"N1\"<=7000))\n   2 - access(\"N2\"=19)\n```\n\
  \n##### 行预取\n\n从性能角度来看，您应始终避免基于行的处理。例如，当客户端从数据库检索数据时，它可以逐行检索，或者更好一些，同时检索多行。这种技术称为*行预取*，将在第\
  \ 11 章中详细描述。目前，我们只关注其对逻辑读取次数的影响。简而言之，每次数据库引擎访问一个数据块，就会记录一次逻辑读取。对于全表扫描，存在两种极端情况。如果行预取设置为\
  \ 1，则每返回一行大约执行一次逻辑读取。如果行预取设置为大于每个表单数据块存储行数的数字，则逻辑读取次数接近表的数据块数量。由脚本`row_prefetching.sql`生成的输出摘录展示了这种行为。在第一次执行中，行预取设置为\
  \ 2（该值的选择将在第 11 章的“行预取”一节中解释），逻辑读取次数（5,389）大约是行数（10,000）的一半。在第二次执行中，由于预取行数（100）大于每个数据块的平均行数（25），逻辑读取次数（489）与数据块数量（401）大致相同。\n\
  \n```sql\nSQL> SELECT num_rows, blocks, round(num_rows/blocks) AS rows_per_block\n\
  \  2  FROM user_tables\n  3  WHERE table_name = 'T';\n\nNUM_ROWS BLOCKS   ROWS_PER_BLOCK\n\
  --------- -------- ---------------\n    10000      401              25\n\nSQL> set\
  \ arraysize 2\n\nSQL> SELECT * FROM t;\n```\n\n```\n--------------------------------------------------------------\n\
  | Id | Operation         | Name | Starts | A-Rows | Buffers |\n--------------------------------------------------------------\n\
  |  1 | TABLE ACCESS FULL | T    |      1 |  10000 |    5389 |\n--------------------------------------------------------------\n\
  ```\n\n```sql\nSQL> set arraysize 100\n\nSQL> SELECT * FROM t;\n```\n\n```\n--------------------------------------------------------------\n\
  | Id | Operation         | Name | Starts | A-Rows | Buffers |\n--------------------------------------------------------------\n\
  |  1 | TABLE ACCESS FULL | T    |      1 |  10000 |     489 |\n--------------------------------------------------------------\n\
  ```\n\n> **注意** 在 SQL*Plus 中，您通过系统变量 `arraysize` 管理预取行数。默认值是 15。\n\n鉴于逻辑读取次数对行预取的依赖性，每当您在\
  \ SQL*Plus 等工具中出于测试目的执行 SQL 语句时，都应仔细设置与应用程序相同的行预取值。换句话说，用于测试的工具应预取与应用程序相同数量的行。否则，可能会导致结果严重误导。\n\
  \n当执行聚合操作时，SQL 引擎会在内部使用行预取。因此，当聚合操作是执行计划的一部分时，访问路径的逻辑读取次数非常接近数据块的数量。换句话说，每次 SQL\
  \ 引擎访问一个数据块时，它会提取其中包含的所有行。以下示例说明了这一点：\n\n```sql\nSQL> set arraysize 2\n\nSQL> SELECT\
  \ sum(n1) FROM t;\n```\n\n```\n------------------------------------------------\n\
  | Operation         | Name | A-Rows | Buffers |\n------------------------------------------------\n\
  | SORT AGGREGATE    |      |      1 |     389 |\n|  TABLE ACCESS FULL| T    |  10000\
  \ |     389 |\n------------------------------------------------\n```\n\n\n#### 原因\n\
  \n访问路径效率低下的主要原因有以下几种：\n\n*   没有可用的合适访问结构（例如索引）。\n*   存在合适的访问结构，但 SQL 语句的语法不允许查询优化器使用它。\n\
  *   表或索引已分区，但无法进行修剪。结果是访问了所有分区。\n*   表或索引，或两者均未分区。\n\n除了前面列出的示例外，还有两种情况会导致访问路径效率低下：\n\
  \n*   当查询优化器因缺乏统计信息、统计信息未更新或配置了错误的查询优化器而做出错误估算时。这里不涉及此情况，因为我将假设必要的统计信息已就位且查询优化器已正确配置（第\
  \ 4 章和第 5 章已完整描述了这两个主题）。\n*   当查询优化器自身存在问题时，例如其工作方式中存在内部错误或限制。我也不讨论这一点，因为错误或查询优化器限制导致的问题非常有限。\n\
  \n#### 解决方案\n\n如前面章节所述，要高效执行 SQL 语句，目标是最小化逻辑读取次数，或者换句话说，确定哪种访问路径访问的块更少。为了实现这个目标，可能需要添加新的访问结构（例如索引）或更改物理布局（例如对某些表或其索引进行分区）。给定一条\
  \ SQL 语句，访问结构和物理布局的组合方式有很多。幸运的是，为了便于选择，可以根据选择性将 SQL 语句（或者更准确地说，数据访问操作）分为两大类：\n\n\
  *   选择性弱（高）的操作\n*   选择性强（低）的操作\n\n选择性很重要，因为对于选择性非常弱的操作效果良好的访问结构和布局，对于选择性非常强的操作效果很差，反之亦然。但要注意，这两类之间没有固定的界限。相反，它取决于操作、所处理的数据以及这些数据的存储方式。例如，数据分布和每块的行数都会强烈影响性能。换句话说，武断地说选择性低于\
  \ 0.1（或你能想到的任何其他值）必然是强选择性，而高于该值必然是弱选择性，这是绝对错误的。尽管如此，可以说在实践中，常见的界限范围在 0.05 到 0.25\
  \ 之间。正如图 9-1 所示，只有在值非常接近 0 或 1 时才能确定。\n\n![image](img/0901.jpg)\n\n`图 9-1.` 强选择性和弱选择性之间没有固定界限。\n\
  \n必须理解，对于确定操作的类别，其返回的行的绝对数量并不相关。只有选择性是相关的。例如，知道一个操作返回 500,000 行对于选择访问路径完全没有意义。相反，知道该操作的选择性为\
  \ 0.001 则明确将其归入强选择性类别。\n\n这个类别很重要，因为它为判断应采用哪种访问路径来获得高效的执行计划提供了线索。图 9-2 大致关联了选择性与通常最优的访问路径。当存在合适的索引时，具有强选择性的操作可以高效执行。正如本章后面将看到的，在某些情况下，`rowid`访问或哈希集群也可能有帮助。另一方面，选择性非常差的操作通过读取整个表来处理最为高效。介于这两种情况之间，分区表和哈希集群扮演着重要角色。\n\
  \n![image](img/0902.jpg)\n\n`图 9-2.` 特定的访问路径仅对特定范围的选择性有效。\n\n让我们通过两个测试来演示这一点。第一个测试检索单行，第二个测试检索数千行。\n\
  \n**检索单行**\n\n本测试基于脚本`access_structures_1.sql`，旨在比较在存在以下访问结构的情况下，检索单行所需的逻辑读取次数：\n\
  \n*   具有主键的堆表\n*   索引组织表\n*   以主键作为集群键的单表哈希集群\n\n* * *\n\n**注意** 本章仅描述如何利用不同类型的段（例如表、集群和索引）来最小化处理\
  \ SQL 语句期间执行的逻辑读取次数。关于它们的基本信息，你可以在 Oracle 手册《Oracle Database Concepts》的“Schema Objects”章节中找到。\n\
  \n* * *\n\n\n测试所使用的查询如下。请注意，`id`列是表的主键。存在值为`6`的行，变量`rid`存储了该行的 rowid。\n\n`SELECT\
  \ * FROM sales WHERE id = 6`\n\n`SELECT * FROM sales WHERE rowid = :rid`\n\n由于逻辑读取的数量取决于索引的高度，因此测试是在表中分别存储\
  \ 10 行、10,000 行和 1,000,000 行时进行的。图 9-3 总结了结果。它们阐明了四个主要事实：\n\n*   对于所有访问结构，都通过 rowid\
  \ 执行一次逻辑读取（显然，要读取存储该行的数据块，工作量不可能比这更少了）。\n*   对于堆表，至少需要两次逻辑读取：一次用于索引，一次用于表。随着行数的增加，索引的高度增加，逻辑读取的数量也随之增加。\n\
  *   通过索引组织表进行的访问比通过堆表进行的访问少一次逻辑读取。\n*   对于单表哈希聚簇，逻辑读取的数量不仅与行数无关，而且总是导致一次逻辑读取。\n\n\
  ![image](img/0903.jpg)\n\n`图 9-3.` *不同的访问结构导致不同的逻辑读取次数。*\n\n总之，对于检索单行数据，带有索引的“常规”表是性能最差的访问结构。然而，正如我将在本章后面描述的，“常规”表是最常用的，因为你只能在特定情况下利用其他访问结构的优势。\n\
  \n## 检索数千行数据\n\n此测试基于脚本`access_structures_1000.sql`，目的是比较在使用以下访问结构时，检索数千行数据所需的逻辑读取数量：\n\
  \n*   无索引的非分区表。\n*   列表分区表。`prod_category`列是分区键。\n*   单表哈希聚簇。`prod_category`列是聚簇键。\n\
  *   在`prod_category`列上建有索引的非分区表。对于此测试，测试了表段中行的两种不同物理分布（因此也测试了不同的聚簇因子）。\n\n测试数据集包含\
  \ 918,843 行。以下查询显示了`prod_category`列的值的分布情况：\n\n```sql\nSQL> SELECT prod_category,\
  \ count(*), ratio_to_report(count(*)) over() AS selectivity\n  2  FROM sales\n \
  \ 3  GROUP BY prod_category\n  4  ORDER BY count(*);\n\nPROD_CATEGORY    COUNT(*)\
  \ SELECTIVITY\n-------------- ---------- -----------\nHardware            15357\
  \        .017\nPhoto               95509        .104\nElectronics        116267\
  \        .127\nPeripherals        286369        .312\nSoftware/Other     405341\
  \        .441\n```\n\n测试所使用的查询如下：\n\n`SELECT sum(amount_sold) FROM sales WHERE prod_category\
  \ = 'Hardware'`\n`SELECT sum(amount_sold) FROM sales WHERE prod_category = 'Photo'`\n\
  `SELECT sum(amount_sold) FROM sales WHERE prod_category = 'Electronics'`\n`SELECT\
  \ sum(amount_sold) FROM sales WHERE prod_category = 'Peripherals'`\n`SELECT sum(amount_sold)\
  \ FROM sales WHERE prod_category = 'Software/Other'`\n`SELECT sum(amount_sold) FROM\
  \ sales`\n\n* * *\n\n**注意** 用于测试的查询基于聚合操作。因此，由于行预取机制，逻辑读取次数与行数的比例始终非常低。无论如何，此测试的目的是展示不同访问结构之间的差异。\n\
  \n* * *\n\n对于每种结构，都测量了逻辑读取的次数。图 9-4 总结了结果，得出了四个主要事实：\n\n*   读取无索引的非分区表所需的逻辑读取次数与选择性无关。因此，它仅在选择性较弱时才高效。\n\
  *   读取列表分区表的一个分区所需的逻辑读取次数与选择性成正比，因为表已根据`prod_category`列进行了分区。因此，在所有情况下，都执行了最少数量的逻辑读取。\n\
  *   读取单表哈希聚簇所需的逻辑读取次数仅与中高值的选择性成正比。（正如你将在后面看到的，当选择性非常强时，哈希聚簇可能非常有用。然而，在此测试中，由于数据分布不均匀，它们处于劣势。）\n\
  *   通过索引读取表所需的逻辑读取次数高度依赖于数据的物理分布。因此，仅知道选择性不足以判断此类访问路径是否能高效地处理数据。\n\n![image](img/0904.jpg)\n\
  \n`图 9-4.` *特定的访问路径仅在特定的选择性范围内才能高效工作。*\n\n现在你已经了解了在不同情况下能够高效访问数据的主要可用选项，接下来是时候详细描述用于处理具有弱选择性和强选择性的\
  \ SQL 语句的访问路径了。\n\n#### 具有弱选择性的 SQL 语句\n\n为了高效处理数据，具有弱（即高）选择性的 SQL 语句必须使用全表扫描或全分区扫描。然而，在很多情况下，只有全表扫描会发挥作用。这主要有三个原因。首先，分区是企业版选项。因此，如果你使用标准版，或者当然，如果你没有使用它的许可，你将无法利用它。其次，即使你被允许使用分区选项，实际上并非所有表都会被分区。第三，一个表可能只能由有限数量的列进行分区。因此，即使表是分区的，并非所有引用该表的\
  \ SQL 语句都能利用分区优势，除非它们都引用了分区键，而这在实践中通常并非如此。\n\n在某些特定情况下，可以通过用全索引扫描替代来避免全表扫描和全分区扫描。在这种情况下，想法是利用索引不是为了搜索特定值，而仅仅是因为它们比表更小。\n\
  \n\n\n##### 全表扫描\n\n可以对所有表执行全表扫描。尽管执行此类扫描没有特别要求，但在某些情况下，它可能是唯一可行的访问路径。以下查询即为一个示例。请注意，在执行计划中，操作\
  \ `TABLE ACCESS FULL` 对应于全表扫描。该示例还展示了如何使用提示 `full` 来强制进行全表扫描。\n\n```sql\nSELECT\
  \ /*+ full(t) */ * FROM t WHERE n2 = 19\n```\n\n```\n----------------------------------\n\
  | Id | Operation          | Name |\n----------------------------------\n|  1 | \
  \ TABLE ACCESS FULL | T    |\n----------------------------------\n```\n\n在全表扫描过程中，数据库引擎按顺序读取高水位线以下的所有表数据块。因此，逻辑读的次数取决于*块*的数量，而不是*行*的数量。这可能不是最优方案，特别是当表包含大量空块或接近空的块时。显然，必须读取一个块才能知道它是否包含数据。导致表包含大量稀疏填充块的最常见场景之一是表遭受的删除操作多于插入操作。以下示例（摘自脚本\
  \ `full_scan_hwm.sql` 的输出）说明了这一点：\n\n*   起初，一次查询需要 390 次逻辑读才能返回 24 行。\n    ```sql\n\
  \    SQL> SELECT * FROM t WHERE n2 = 19;\n\n    SQL> SELECT last_output_rows, last_cr_buffer_gets,\
  \ last_cu_buffer_gets\n      2  FROM v$session s, v$sql_plan_statistics p\n    \
  \  3  WHERE s.prev_sql_id = p.sql_id\n      4  AND s.prev_child_number = p.child_number\n\
  \      5  AND s.sid = sys_context('userenv','sid')\n      6  AND p.operation_id\
  \ = 1;\n\n    LAST_OUTPUT_ROWS LAST_CR_BUFFER_GETS LAST_CU_BUFFER_GETS\n    ----------------\
  \ ------------------- -------------------\n                 24                 390\
  \                   0\n    ```\n\n*   然后，几乎所有的行（10,000 行中的 9,976 行）都被删除了。然而，执行该查询所需的逻辑读次数并未改变。换句话说，大量完全为空的块被无谓地访问了。\n\
  \    ```sql\n    SQL> DELETE t WHERE n2 <> 19;\n\n    9976 rows deleted.\n\n   \
  \ SQL> SELECT * FROM t WHERE n2 = 19;\n\n    SQL> SELECT last_output_rows, last_cr_buffer_gets,\
  \ last_cu_buffer_gets\n      2  FROM v$session s, v$sql_plan_statistics p\n    \
  \  3  WHERE s.prev_sql_id = p.sql_id\n      4  AND s.prev_child_number = p.child_number\n\
  \      5  AND s.sid = sys_context('userenv','sid')\n      6  AND p.operation_id\
  \ = 1;\n\n    LAST_OUTPUT_ROWS LAST_CR_BUFFER_GETS LAST_CU_BUFFER_GETS\n    ----------------\
  \ ------------------- -------------------\n                 24                 390\
  \                   0\n    ```\n\n*   为了降低高水位线，有必要对表进行重组。从 Oracle Database 10*g*\
  \ 开始，您可以使用以下 SQL 语句来完成此操作。请注意，必须激活行移动功能，因为在重组过程中行可能会获得新的 rowid。\n    ```sql\n  \
  \  SQL> ALTER TABLE t ENABLE ROW MOVEMENT;\n\n    SQL> ALTER TABLE t SHRINK SPACE;\n\
  \    ```\n\n*   重组后，该查询仅执行四次逻辑读就返回了 24 行：\n    ```sql\n    SQL> SELECT * FROM t\
  \ WHERE n2 = 19;\n\n    SQL> SELECT last_output_rows, last_cr_buffer_gets, last_cu_buffer_gets\n\
  \      2  FROM v$session s, v$sql_plan_statistics p\n      3  WHERE s.prev_sql_id\
  \ = p.sql_id\n      4  AND s.prev_child_number = p.child_number\n      5  AND s.sid\
  \ = sys_context('userenv','sid')\n      6  AND p.operation_id = 1;\n\n    LAST_OUTPUT_ROWS\
  \ LAST_CR_BUFFER_GETS LAST_CU_BUFFER_GETS\n    ---------------- -------------------\
  \ -------------------\n                 24                   4                 \
  \  0\n    ```\n\n请记住，全表扫描执行的逻辑读次数在很大程度上取决于行预取的设置。有关此方面的示例，请参阅本章前面的“行预取”部分。\n\n#####\
  \ 全分区扫描\n\n当选择率非常弱（即接近 1）时，全表扫描是访问数据最有效的方式。一旦选择率降低，全表扫描就会不必要地访问许多块。由于在选择率弱的情况下使用索引没有益处，分区是唯一可用于减少逻辑读次数的选项。使用分区的目的是利用查询优化器能够先验地排除处理包含无关数据的分区的能力。此功能称为*分区修剪*。\n\
  \n要利用分区修剪来处理给定的 SQL 语句，有两个基本的先决条件。首先，显然，表必须是分区的。其次，必须在 SQL 语句的 `WHERE` 子句中指定对分区键的限制或连接条件。如果满足这两个要求，查询优化器就能够用一个或多个全分区扫描代替全表扫描。然而在实际中，事情并非如此简单。实际上，查询优化器必须处理几种特殊情况，这些情况可能导致也可能不会导致分区修剪。为了更好地理解这些情况，接下来的章节将详细介绍分区修剪的基础知识，以及更高级的修剪技术，如\
  \ `OR` 修剪、多列修剪、子查询修剪和连接过滤修剪。随后是关于如何实现分区的一些实用建议。请注意，分区索引也将在本章后面的“具有强选择性的 SQL 语句”部分中讨论。\n\
  \n\n\n### 范围分区\n\n为了说明分区修剪的工作原理，让我们基于脚本 `pruning_range.sql` 检查几个示例。测试表是按范围分区的，并使用以下\
  \ SQL 语句创建。为了能够展示所有类型的分区修剪，分区键由两列组成：`n1` 和 `d1`。该表按月分区（基于列 `d1`），并且每个月有四个不同的分区（基于列\
  \ `n1`）。这意味着每年有 48 个分区。图 9-5 是测试表的图形化表示。\n\n```sql\nCREATE TABLE t (\n  id NUMBER,\n\
  \  d1 DATE,\n  n1 NUMBER,\n  n2 NUMBER,\n  n3 NUMBER,\n  pad VARCHAR2(4000),\n \
  \ CONSTRAINT t_pk PRIMARY KEY (id)\n)\nPARTITION BY RANGE (n1, d1) (\n  PARTITION\
  \ t_jan_2007_1 VALUES LESS THAN (1, to_date('2007-02-01','yyyy-mm-dd')),\n  PARTITION\
  \ t_feb_2007_1 VALUES LESS THAN (1, to_date('2007-03-01','yyyy-mm-dd')),\n  PARTITION\
  \ t_mar_2007_1 VALUES LESS THAN (1, to_date('2007-04-01','yyyy-mm-dd')),\n  ...\n\
  \  PARTITION t_oct_2007_4 VALUES LESS THAN (4, to_date('2007-11-01','yyyy-mm-dd')),\n\
  \  PARTITION t_nov_2007_4 VALUES LESS THAN (4, to_date('2007-12-01','yyyy-mm-dd')),\n\
  \  PARTITION t_dec_2007_4 VALUES LESS THAN (4, to_date('2008-01-01','yyyy-mm-dd'))\n\
  )\n```\n![image](img/0905.jpg)\n\n**图 9-5.** 测试表每年由 48 个分区组成。\n\n每个分区可以通过其名称或其在表中的“位置”（后者在\
  \ 图 9-5 中显示）来标识。当然，这两者之间的映射关系可在数据字典中找到。以下查询展示了如何从数据字典视图 `user_tab_partitions` 中获取它：\n\
  \n```sql\nSQL> SELECT partition_name, partition_position\n  2  FROM user_tab_partitions\n\
  \  3  WHERE table_name = 'T'\n  4  ORDER BY partition_position;\n```\n```\nPARTITION_NAME\
  \      PARTITION_POSITION\n-------------------- ------------------\nT_1_JAN_2007\
  \                          1\nT_1_FEB_2007                          2\nT_1_MAR_2007\
  \                          3\n...\nT_4_OCT_2007                         46\nT_4_NOV_2007\
  \                         47\nT_4_DEC_2007                         48\n```\n\n对于这样的表，如果对分区键应用了限制条件，查询优化器会识别它，并在可能的情况下排除包含与处理无关数据的分区。这是可行的，因为数据字典包含了分区的边界，因此，查询优化器可以将它们与\
  \ `WHERE` 子句中指定的限制条件或连接条件进行比较。然而，由于一些限制，这并非总是可行。接下来的小节将展示不同的例子，指出查询优化器如何以及何时能够使用分区修剪。\n\
  \n***\n\n**注意** 在本节中，示例中仅使用了查询语句。这并不意味着分区修剪只对查询有效。实际上，它对于 `UPDATE` 和 `DELETE` 等\
  \ SQL 语句的工作方式是相同的。我在这里使用查询仅为方便起见。\n\n***\n\n**PARTITION RANGE SINGLE**\n\n在以下 SQL\
  \ 语句中，`WHERE` 子句包含两个限制条件：每个分区键列一个。在这种情况下，查询优化器识别出只有一个分区包含相关数据。结果，执行计划中出现了 `PARTITION\
  \ RANGE SINGLE` 操作。必须理解的是，它的子操作（`TABLE ACCESS FULL`）并非对整个表进行的全表扫描。相反，只访问了一个分区。列\
  \ `Starts` 的值也证实了这一点。访问的是哪个分区由列 `Pstart` 和 `Pstop` 指定。图 9-6 是此行为的图形化表示。\n\n```sql\n\
  SELECT * FROM t WHERE n1 = 3 AND d1 = to_date('2007-07-19','yyyy-mm-dd')\n```\n\
  ```\n----------------------------------------------------------------\n| Id | Operation\
  \               | Name | Starts | Pstart| Pstop |\n----------------------------------------------------------------\n\
  |   1 | PARTITION RANGE SINGLE  |      |      1 |    31 |    31 |\n|*  2 |  TABLE\
  \ ACCESS FULL      | T    |      1 |    31 |    31 |\n----------------------------------------------------------------\n\
  \n2 - filter(\"D1\"=TO_DATE('2007-07-19 00:00:00', 'yyyy-mm-dd hh24:mi:ss') AND\n\
  \           \"N1\"=3)\n```\n![image](img/0906.jpg)\n\n**图 9-6.** `PARTITION RANGE\
  \ SINGLE` 操作的表示。\n\n如下一个查询的输出所示，列 `Pstart` 和 `Pstop` 中的分区编号与数据字典视图 `user_tab_partitions`\
  \ 中列 `partition_position` 的值相匹配。\n\n```sql\nSQL> SELECT partition_name, partition_position,\
  \ num_rows\n  2  FROM user_tab_partitions\n  3  WHERE table_name = 'T'\n  4  ORDER\
  \ BY partition_position;\n```\n```\nPARTITION_NAME      PARTITION_POSITION   NUM_ROWS\n\
  -------------------- ------------------ ----------\nT_1_JAN_2007               \
  \           1        212\nT_1_FEB_2007                          2        192\nT_1_MAR_2007\
  \                          3        212\n...\nT_3_JUN_2007                     \
  \    30        206\nT_3_JUL_2007                         31        212\nT_3_AUG_2007\
  \                         32        213\n...\nT_4_OCT_2007                     \
  \    46        212\nT_4_NOV_2007                         47        206\nT_4_DEC_2007\
  \                         48        212\n```\n\n每当在限制条件中使用绑定变量时，查询优化器在解析时就不再能够确定需要访问哪些分区。在这种情况下，分区修剪在运行时执行。执行计划不会改变，但列\
  \ `Pstart` 和 `Pstop` 的值被设置为 `KEY`。这表明发生了分区修剪，但在解析时，查询优化器忽略了哪个分区包含相关数据。\n\n```sql\n\
  SELECT * FROM t WHERE n1 = :n1 AND d1 = to_date(:d1,'yyyy-mm-dd')\n```\n```\n----------------------------------------------------------------\n\
  | Id | Operation               | Name | Starts | Pstart| Pstop |\n----------------------------------------------------------------\n\
  |   1 | PARTITION RANGE SINGLE  |      |      1 |   KEY |   KEY |\n|*  2 |  TABLE\
  \ ACCESS FULL      | T    |      1 |   KEY |   KEY |\n----------------------------------------------------------------\n\
  \n  2 - filter(\"N1\"=TO_NUMBER(:N1) AND \"D1\"=TO_DATE(:D1,'yyyy-mm-dd'))\n```\n\
  \n如果你使用的是 Oracle9*i*，你应该非常小心，因为操作 `PARTITION RANGE SINGLE` 并不总是显示为执行计划的一部分。因此，执行计划很容易被误解。例如，在前面的查询中，如果你将绑定变量替换为字面值，会产生以下执行计划。从中，如果没有列\
  \ `Pstart` 和 `Pstop`，你会认为没有发生分区修剪，即使像本例中一样，只访问了一个分区！请注意，当同一个查询使用绑定变量而不是字面值时，执行计划按预期包含\
  \ `PARTITION RANGE SINGLE` 操作。\n\n```sql\nSELECT * FROM t WHERE n1 = 3 AND d1 =\
  \ to_date('2007-07-19','yyyy-mm-dd')\n```\n```\n------------------------------------------------------------\n\
  | Id | Operation                    | Name | Pstart| Pstop |\n------------------------------------------------------------\n\
  |*  1 |  TABLE ACCESS FULL           | T    |    31 |    31 |\n------------------------------------------------------------\n\
  \n  1 - filter(\"T\".\"D1\"=TO_DATE('2007-07-19 00:00:00', 'yyyy-mm-dd hh24:mi:ss')\
  \ AND\n             \"T\".\"N1\"=3)\n```\n\n**PARTITION RANGE ITERATOR**\n\n\n\n"
- "# Oracle 执行计划中的分区范围操作\n\n## PARTITION RANGE SINGLE\n\n前述执行计划包含操作 `PARTITION RANGE\
  \ SINGLE`。这是因为查询优化器识别出只有单个分区包含需要处理的数据。\n\n## PARTITION RANGE ITERATOR\n\n显然，在某些情况下需要访问多个分区。例如，在以下查询中，限制条件使用了小于条件\
  \ (`<`)，而非基于相等条件 (`=`)。因此，操作变为 `PARTITION RANGE ITERATOR`，列 `Pstart` 和 `Pstop` 显示了被访问的分区范围（参见图\
  \ 9-7）。此外，列 `Starts` 显示操作 1 只执行了一次，但操作 2 对每个分区执行了一次。换句话说，执行了七次完整的分区扫描。\n\n```sql\n\
  SELECT * FROM t WHERE n1 = 3 AND d1 < to_date('2007-07-19','yyyy-mm-dd')\n```\n\n\
  ```\n------------------------------------------------------------------\n| Id |\
  \ Operation                 | Name | Starts | Pstart| Pstop |\n------------------------------------------------------------------\n\
  |  1 |  PARTITION RANGE ITERATOR |      |      1 |    25 |    31 |\n|* 2 |   TABLE\
  \ ACCESS FULL       | T    |      7 |    25 |    31 |\n------------------------------------------------------------------\n\
  \n2 - filter(\"N1\"=3 AND\n           \"D1\"<TO_DATE('2007-07-19 00:00:00', 'yyyy-mm-dd\
  \ hh24:mi:ss'))\n```\n\n当限制条件仅基于分区键的前导部分时，也会使用 `PARTITION RANGE ITERATOR` 操作。以下查询说明了这一点，其中限制应用于分区键的第一列。注意，分区\
  \ 37 也被访问了。这是因为，如果列 `d1` 的值晚于 2007 年 1 月 31 日，那么列 `n1` 等于 3 的行将存储在该分区中。\n\n```sql\n\
  SELECT * FROM t WHERE n1 = 3\n```\n\n```\n------------------------------------------------------------------\n\
  | Id | Operation                 | Name | Starts | Pstart| Pstop |\n------------------------------------------------------------------\n\
  |  1 |  PARTITION RANGE ITERATOR |      |      1 |    25 |    37 |\n|* 2 |   TABLE\
  \ ACCESS FULL       | T    |     13 |    25 |    37 |\n------------------------------------------------------------------\n\
  \n  2 - filter(\"N1\"=3)\n```\n\n![image](img/0907.jpg)\n\n**图 9-7.** `PARTITION\
  \ RANGE ITERATOR` 操作的表示\n\n正如该操作名称所暗示的，它仅适用于连续的分区范围。当使用非连续范围时，下一节介绍的操作就会发挥作用。\n\n\
  ## PARTITION RANGE INLIST\n\n如果限制条件基于一个或多个包含多个元素的 `IN` 条件，执行计划中会出现一个特定的操作：`PARTITION\
  \ RANGE INLIST`。使用此操作时，列 `Pstart` 和 `Pstop` 不提供关于访问了哪些分区的精确信息。相反，它们显示值 `KEY(I)`。这表明分区修剪是针对\
  \ `IN` 条件中的每个值单独进行的。此外，列 `Starts` 显示访问了多少个分区（本例中是两次）。\n\n```sql\nSELECT * FROM t\
  \ WHERE n1 IN (1,3) AND d1 = to_date('2007-07-19','yyyy-mm-dd')\n```\n\n```\n----------------------------------------------------------------\n\
  | Id | Operation               | Name | Starts | Pstart| Pstop |\n----------------------------------------------------------------\n\
  |  1 |  PARTITION RANGE INLIST |      |      1 |KEY(I) |KEY(I) |\n|* 2 |   TABLE\
  \ ACCESS FULL     | T    |      2 |KEY(I) |KEY(I) |\n----------------------------------------------------------------\n\
  \n2 - filter(\"D1\"=TO_DATE('2007-07-19 00:00:00', 'yyyy-mm-dd hh24:mi:ss') AND\n\
  \           (\"N1\"=1 OR \"N1\"=3))\n```\n\n在这种特定情况下，基于 `WHERE` 子句，您可以推断出只访问了分区\
  \ 7 和 31。图 9-8 说明了这一点。\n\n当然，如果 `IN` 条件中的值分布足够广，可能访问大部分分区。在查询优化器识别出所有分区都被访问的情况下，将应用下一节的操作。\n\
  \n![image](img/0908.jpg)\n\n**图 9-8.** `PARTITION RANGE INLIST` 操作的表示\n\n## PARTITION\
  \ RANGE ALL\n\n如果未对分区键应用任何限制条件，则必须访问所有分区。在这种情况下，执行计划包含操作 `PARTITION RANGE ALL`，列\
  \ `Starts`、`Pstart` 和 `Pstop` 清晰地显示所有分区都被访问了。\n\n```sql\nSELECT * FROM t WHERE n3\
  \ BETWEEN 6000 AND 7000\n```\n\n```\n-------------------------------------------------------------\n\
  | Id | Operation            | Name | Starts | Pstart| Pstop |\n-------------------------------------------------------------\n\
  |  1 |  PARTITION RANGE ALL |      |      1 |     1 |    48 |\n|* 2 |   TABLE ACCESS\
  \ FULL  | T    |     48 |     1 |    48 |\n-------------------------------------------------------------\n\
  \n  2 - filter(\"N3\">=6000 AND \"N3\"<=7000)\n```\n\n当使用不等式作为分区键的限制时，也会使用完全相同的执行计划。以下查询是一个例子：\n\
  \n```sql\nSELECT * FROM t WHERE n1 != 3 AND d1 != to_date('2007-07-19','yyyy-mm-dd')\n\
  ```\n\n另一种使用完全相同执行计划的情况是，当对分区键的限制基于表达式或函数时。例如，在以下查询中，对列 `n1` 加 1，并通过函数 `to_char`\
  \ 修改了列 `d1`。\n\n```sql\nSELECT * FROM t WHERE n1 + 1 = 4 AND to_char(d1,'yyyy-mm-dd')\
  \ = '2007-07-19'\n```\n\n这意味着，为了利用分区修剪，不仅应该有基于分区键的限制，而且不应对其应用表达式或函数。如果必须应用表达式，从\
  \ Oracle 数据库 11*g*开始，可以选择虚拟列作为分区键。\n\n## PARTITION RANGE EMPTY\n\n当查询优化器识别到没有分区能够存储需要处理的数据时，执行计划中会出现一个特殊操作\
  \ `PARTITION RANGE EMPTY`。例如，以下查询寻找的数据没有可以存储的分区（列 `n1` 超出范围）。同样重要的是要注意，不仅列 `Pstart`\
  \ 和 `Pstop` 被设置为值 `INVALID`，而且只有操作 1 被执行（由于基本上是一个无操作，因此不消耗任何资源）。\n\n```sql\nSELECT\
  \ * FROM t WHERE n1 = 5 AND d1 = to_date('2007-07-19','yyyy-mm-dd')\n```\n\n```\n\
  ---------------------------------------------------------------\n| Id | Operation\
  \              | Name | Starts | Pstart| Pstop |\n---------------------------------------------------------------\n\
  |  1 |  PARTITION RANGE EMPTY |      |      1 |INVALID|INVALID|\n|* 2 |   TABLE\
  \ ACCESS FULL    | T    |      0 |INVALID|INVALID|\n---------------------------------------------------------------\n\
  \n  2 - filter(\"N1\"=5 AND\n             \"D1\"=TO_DATE('2008-07-19 00:00:00',\
  \ 'yyyy-mm-dd hh24:mi:ss'))\n```\n\n## PARTITION RANGE OR\n\n\n\n在 Oracle Database\
  \ 10*g* 第 1 版及之前，一个包含多个谓词（在分区键上）且通过 `OR` 条件组合的 `WHERE` 子句可能会导致全表扫描。换句话说，查询优化器并不总是能够利用分区剪枝。从\
  \ Oracle Database 10*g* 第 2 版开始，得益于 `OR 剪枝`，这一限制不再适用。以下查询便是一个这样的例子。当使用此类剪枝时，执行计划中会出现\
  \ `PARTITION RANGE OR` 操作。同时请注意，列 `Pstart` 和 `Pstop` 被设置为 `KEY(OR)` 值。在下面的示例中，根据\
  \ `Starts` 列，访问了 18 个分区。之所以是 18 个，是因为尽管应用于列 `n1` 的限制条件导致访问了分区 25 到 37，但应用于列 `d1`\
  \ 的限制条件却导致访问了分区 1、3、15、27 和 39（分区 1 是必需的，以便找出是否存在列 `n1` 值小于 1 的行）。\n\n```sql\nSELECT\
  \ * FROM t WHERE n1 = 3 OR d1 = to_date('2007-03-06','yyyy-mm-dd')\n```\n```\n------------------------------------------------------------\n\
  | Id | Operation           | Name | Starts | Pstart| Pstop |\n------------------------------------------------------------\n\
  |  1 |  PARTITION RANGE OR |      |      1 |KEY(OR)|KEY(OR)|\n|* 2 |   TABLE ACCESS\
  \ FULL | T    |     18 |KEY(OR)|KEY(OR)|\n------------------------------------------------------------\n\
  \n  2 - filter(\"N1\"=3 OR\n             \"D1\"=TO_DATE('2007-03-06 00:00:00', 'yyyy-mm-dd\
  \ hh24:mi:ss'))\n```\n\n## PARTITION RANGE SUBQUERY\n\n在之前的章节中，所有用于分区剪枝的限制条件都基于字面值或绑定变量。然而，限制条件实际上也可能是连接条件，这并不少见。每当连接基于分区键时，查询优化器必须在三种策略之间做出选择。自然，它应该选择能降低成本的那种策略。\n\
  \n* * *\n\n**注意** 第 10 章详细介绍了连接方法。\n\n* * *\n\n第一种策略是避开分区剪枝。以下查询（注意表 `tx` 是表 `t`\
  \ 的副本；唯一的区别是表 `tx` 没有分区）说明了这一点，其中没有对表 `t` 执行分区剪枝。实际上，由于操作 4 是 `PARTITION RANGE ALL`，操作\
  \ 5 会针对所有分区进行处理。在这个特定例子中，这个执行计划效率极低，尤其是因为该查询的选择性非常强。\n\n```sql\nSELECT * FROM tx,\
  \ t WHERE tx.d1 = t.d1 AND tx.n1 = t.n1 AND tx.id = 19\n```\n```\n-----------------------------------------------------------------------\n\
  | Id | Operation                     | Name  | Starts | Pstart| Pstop |\n-----------------------------------------------------------------------\n\
  |* 1 |  HASH JOIN                    |       |      1 |       |       |\n|  2 |\
  \   TABLE ACCESS BY INDEX ROWID | TX    |      1 |        |      |\n|* 3 |    INDEX\
  \ UNIQUE SCAN          | TX_PK |      1 |        |      |\n|  4 |   PARTITION RANGE\
  \ ALL         |       |      1 |      1 |   48 |\n|  5 |    TABLE ACCESS FULL  \
  \        | T     |     48 |      1 |   48 |\n-----------------------------------------------------------------------\n\
  \  1 - access(\"TX\".\"D1\"=\"T\".\"D1\" AND \"TX\".\"N1\"=\"T\".\"N1\")\n  3 -\
  \ access(\"TX\".\"ID\"=19)\n```\n\n这种策略始终可用。然而，如果连接条件的选择性不接近 1，或者换句话说，在应该使用分区剪枝的情况下，它可能导致性能不佳。\n\
  \n第二种策略是使用 `NESTED LOOPS` 操作执行连接，并将需要进行分区剪枝的表定义为第二个子操作。事实上，正如第 6 章所讨论的，`NESTED LOOPS`\
  \ 操作是一个关联组合操作，因此它的第一个子操作控制第二个子操作的执行。下面的例子展示了这种情况。请注意，`PARTITION RANGE ITERATOR`\
  \ 操作以及 `Pstart` 和 `Pstop` 列的值证实了分区剪枝的发生。根据 `Starts` 列，只访问了一个分区。因此，在这个具体案例中，下面的执行计划比第一种策略使用的那个要高效得多：\n\
  \n```sql\nSELECT * FROM tx, t WHERE tx.d1 = t.d1 AND tx.n1 = t.n1 AND tx.id = 19\n\
  ```\n```\n-----------------------------------------------------------------------\n\
  | Id | Operation                     | Name  | Starts | Pstart| Pstop |\n-----------------------------------------------------------------------\n\
  |  1 |  NESTED LOOPS                 |       |      1 |       |       |\n|  2 |\
  \   TABLE ACCESS BY INDEX ROWID | TX    |      1 |       |       |\n|* 3 |    INDEX\
  \ UNIQUE SCAN          | TX_PK |      1 |       |       |\n|  4 |   PARTITION RANGE\
  \ ITERATOR    |       |      1 |   KEY |   KEY |\n|* 5 |    TABLE ACCESS FULL  \
  \        | T     |      1 |   KEY |   KEY |\n-----------------------------------------------------------------------\n\
  \n  3 - access(\"TX\".\"ID\"=19)\n  5 - filter((\"TX\".\"D1\"=\"T\".\"D1\" AND \"\
  TX\".\"N1\"=\"T\".\"N1\"))\n```\n\n这种策略仅在 `NESTED LOOP` 操作（本例中是操作 2）的第一个子操作返回的行数较少时表现良好。否则，第二个子操作（本例中是操作\
  \ 4）甚至可能多次访问同一个分区。\n\n第三种策略是使用 `HASH JOIN` 或 `MERGE JOIN` 操作执行连接。然而，对于这些连接方法，无法实现基于连接条件的常规分区剪枝。实际上，正如第\
  \ 6 章所讨论的，它们是不关联的组合操作，因此两个子操作是分开执行的。在这种情况下，查询优化器可以利用另一种分区剪枝类型，即`子查询剪枝`。其核心思想是：通过执行一个递归查询（在第一个子操作访问的表上）来获取那些映射到第二个子操作分区键的连接条件列，从而找出第二个子操作应该访问哪些分区。然后，通过查阅存储在数据字典中的第二个子操作的分区定义，确定第二个子操作要访问的分区，从而实现仅扫描这些分区。下面的查询展示了这个例子。请注意，`PARTITION\
  \ RANGE SUBQUERY` 操作以及 `Pstart` 和 `Pstop` 列的值证实了分区剪枝的发生。根据 `Starts` 列，只访问了一个分区。\n\
  \n```sql\nSELECT * FROM tx, t WHERE tx.d1 = t.d1 AND tx.n1 = t.n1 AND tx.id = 19\n\
  ```\n```\n-----------------------------------------------------------------------\n\
  | Id | Operation                     | Name  | Starts | Pstart| Pstop |\n-----------------------------------------------------------------------\n\
  |* 1 |  HASH JOIN                    |       |      1 |       |       |\n|  2 |\
  \   TABLE ACCESS BY INDEX ROWID | TX    |      1 |       |       |\n|* 3 |    INDEX\
  \ UNIQUE SCAN          | TX_PK |      1 |       |       |\n|  4 |   PARTITION RANGE\
  \ SUBQUERY    |       |      1 |KEY(SQ)|KEY(SQ)|\n|  5 |    TABLE ACCESS FULL  \
  \        | T     |      1 |KEY(SQ)|KEY(SQ)|\n-----------------------------------------------------------------------\n\
  \n  1 - access(\"TX\".\"D1\"=\"T\".\"D1\" AND \"TX\".\"N1\"=\"T\".\"N1\")\n  3 -\
  \ access(\"TX\".\"ID\"=19)\n```\n\n\n\n实际发生的情况是，为了找出需要访问哪些分区，操作 `PARTITION RANGE\
  \ SUBQUERY` 会递归地执行以下查询。此递归查询通过函数 `tbl$or$idx$part$num` 检索包含相关数据的分区编号。利用这些信息，操作 5\
  \ 可以进行分区修剪。例如，在此案例中，只需扫描分区 37：\n\n```sql\nSQL> SELECT DISTINCT tbl$or$idx$part$num(\"\
  T\", 0, 1, 0, \"N1\", \"D1\") AS part_num\n  2  FROM (SELECT \"TX\".\"N1\" \"N1\"\
  , \"TX\".\"D1\" \"D1\"\n  3       FROM \"TX\" \"TX\"\n  4       WHERE \"TX\".\"\
  ID\"=19)\n  5  ORDER BY 1;\n\n  PART_NUM\n----------\n        37\n```\n\n显然，仅当执行递归查询带来的开销小于因分区修剪而获得的收益时，使用这第三种技术才有意义。对于本示例中的查询，由第二种和第三种策略产生的执行计划效率非常相似。然而，如果选择性较弱，由第三种策略产生的执行计划将更为高效。\n\
  \n请注意，操作 `PARTITION RANGE SUBQUERY` 是在 Oracle Database 10g Release 2 中引入的。在更早的版本中，子查询修剪也可用，但使用的是操作\
  \ `PARTITION RANGE ITERATOR`。在 Oracle Database 10g Release 1 及更早版本中，识别子查询修剪的唯一方法是检查列\
  \ `Pstart` 和 `Pstop` 是否包含值 `KEY(SQ)`。\n\n## PARTITION RANGE JOIN-FILTER\n\n子查询修剪是一种有用的优化技术。然而，如前一节所述，部分\
  \ SQL 语句会被执行两次。为了避免这种双重执行，Oracle Database 11g 提供了另一种分区修剪类型：连接过滤修剪（也称为布隆过滤器修剪）。为了理解其工作原理，让我们看一下由用于描述子查询修剪的相同查询生成的执行计划。注意，出现了一些新内容：操作\
  \ `PART JOIN FILTER CREATE`；操作 `PARTITION RANGE JOIN-FILTER`；以及在列 `Name`、`Pstart`\
  \ 和 `Pstop` 中出现的字符串 `:BF0000`。\n\n```sql\nSELECT * FROM tx, t WHERE tx.d1 = t.d1\
  \ AND tx.n1 = t.n1 AND tx.id = 19\n\n---------------------------------------------------------------------------\n\
  | Id | Operation                       | Name    | Starts | Pstart| Pstop |\n---------------------------------------------------------------------------\n\
  |* 1 |  HASH JOIN                      |         |      1 |       |       |\n| \
  \ 2 |   PART JOIN FILTER CREATE       | :BF0000 |      1 |       |       |\n|  3\
  \ |    TABLE ACCESS BY INDEX ROWID  | TX      |      1 |       |       |\n|* 4 |\
  \     INDEX UNIQUE SCAN           | TX_PK   |      1 |       |       |\n|  5 | \
  \   PARTITION RANGE JOIN-FILTER  |         |      1 |:BF0000|:BF0000|\n|  6 |  \
  \   TABLE ACCESS FULL           | T       |      1 |:BF0000|:BF0000|\n---------------------------------------------------------------------------\n\
  1 - access(\"TX\".\"N1\"=\"T\".\"N1\" AND \"TX\".\"D1\"=\"T\".\"D1\")\n  4 - access(\"\
  TX\".\"ID\"=19)\n```\n\n执行计划的执行过程如下：\n\n*   操作 3 和 4 通过索引 `tx_pk` 访问表 `tx`。\n* \
  \  基于操作 3 返回的数据，操作 2 根据 `tx.d1` 和 `tx.n1` 列的值创建一个内存结构（一个布隆过滤器）。\n*   基于操作 2 创建的内存结构，操作\
  \ 5 能够利用分区修剪，因此仅访问包含相关数据的分区。在此案例中，仅访问了一个分区（参见 `Starts` 列）。\n\n## PARTITION RANGE\
  \ MULTI-COLUMN\n\n如果分区键由多个列组成，观察当限制条件未定义在每一列上时会发生什么非常重要。主要问题是：查询优化器是否会利用分区修剪？答案取决于您使用的版本。实际上，在早期版本中，查询优化器仅当限制条件应用于分区键的前导部分时才使用分区修剪。例如，如果分区键由\
  \ `c1`、`c2` 和 `c3` 三列组成，则仅当指定了对 `c1` 的限制或对 `c1` 和 `c2` 的限制时，分区修剪才可能发生。这意味着对 `c2`\
  \ 和 `c3` 的限制不会导致分区修剪。此限制已在 Oracle Database 10g Release 2 中通过多列修剪被移除。随后，它也被回移植到补丁集\
  \ 9.2.0.8 和 10.1.0.5 中。多列修剪的概念相当简单：无论限制定义在哪些列上，分区修剪总是会发生。\n\n让我们在之前使用过的相同测试表上查看此功能的实际应用。由于测试表的分区键由两列组成，因此需要考虑两种情况：限制应用于第一列或应用于第二列。以下是前者的示例：\n\
  \n```sql\nSELECT * FROM t WHERE n1 = 3\n\n-------------------------------------------------------------------\n\
  | Id | Operation                 | Name | Starts | Pstart| Pstop |\n-------------------------------------------------------------------\n\
  |  1 |  PARTITION RANGE ITERATOR |      |      1 |    25 |    37 |\n|* 2 |   TABLE\
  \ ACCESS FULL       | T    |     13 |    25 |    37 |\n-------------------------------------------------------------------\n\
  \n  2 - filter(\"N1\"=3)\n```\n\n以下是后者的示例。注意，操作 `PARTITION RANGE MULTI-COLUMN` 以及列\
  \ `Pstart` 和 `Pstop` 的值确认发生了分区修剪；但是，未提供关于访问了哪些分区的信息。\n\n```sql\nSELECT * FROM t\
  \ WHERE d1 = to_date('2007-07-19','yyyy-mm-dd')\n\n-----------------------------------------------------------------------\n\
  | Id | Operation                  | Name | Starts | Pstart| Pstop |\n-----------------------------------------------------------------------\n\
  |  1 |  PARTITION RANGE MULTI-COLUMN |      |      1 |KEY(MC)|KEY(MC)|\n|* 2 | \
  \  TABLE ACCESS FULL           | T    |      8 |KEY(MC)|KEY(MC)|\n-----------------------------------------------------------------------\n\
  \n  2 - filter(\"D1\"=TO_DATE('2007-07-19 00:00:00', 'yyyy-mm-dd hh24:mi:ss'))\n\
  ```\n\n同样重要的是要注意，操作 `PARTITION RANGE MULTI-COLUMN` 首次在 Oracle Database 10g Release\
  \ 2 中引入。在更早的版本中，多列修剪也可用，但使用的是操作 `PARTITION RANGE ITERATOR`。因此，在更早版本中识别多列修剪的唯一方法是检查列\
  \ `Pstart` 和 `Pstop` 是否包含值 `KEY(MC)`。\n\n#### 哈希和列表分区\n\n上一节仅涵盖了范围分区。无论如何，对于哈希和列表分区，为范围分区描述的大部分技术同样可用。\n\
  \n以下是哈希分区中可用的操作。注意，仅缺少 `OR` 和多列修剪。脚本 `pruning_hash.sql` 提供了包含这些操作的执行计划示例：\n\n* \
  \  `PARTITION HASH SINGLE`\n*   `PARTITION HASH ITERATOR`\n*   `PARTITION HASH INLIST`\n\
  *   `PARTITION HASH ALL`\n*   `PARTITION HASH SUBQUERY`\n*   `PARTITION HASH JOIN-FILTER`\n\
  \n以下是列表分区中可用的操作。注意，仅缺少多列修剪。这很明显，因为在列表分区中，分区键始终由单列组成。脚本 `pruning_list.sql` 提供了包含这些操作的执行计划示例：\n\
  \n*   `PARTITION LIST SINGLE`\n*   `PARTITION LIST ITERATOR`\n*   `PARTITION LIST\
  \ INLIST`\n*   `PARTITION LIST ALL`\n*   `PARTITION LIST EMPTY`\n*   `PARTITION\
  \ LIST OR`\n*   `PARTITION LIST SUBQUERY`\n*   `PARTITION LIST JOIN-FILTER`\n\n\n\
  \n## 复合分区\n\n关于复合分区，可说的内容不多。基本上，适用于分区的原则同样适用于子分区。尽管如此，至少用一个例子来说明还是有意义的。下面的测试表按范围（基于列\
  \ `d1`）进行分区，按列表（基于列 `n1`）进行子分区。以下 SQL 语句（摘自脚本 `pruning_composite.sql`）用于创建该表。请注意，此处同样，每年有\
  \ 48 个分区。\n\n```sql\nCREATE TABLE t (\n  id NUMBER,\n  d1 DATE,\n  n1 NUMBER,\n\
  \  n2 NUMBER,\n  n3 NUMBER,\n  pad VARCHAR2(4000),\n  CONSTRAINT t_pk PRIMARY KEY\
  \ (id)\n)\nPARTITION BY RANGE (d1)\nSUBPARTITION BY LIST (n1)\nSUBPARTITION TEMPLATE\
  \ (\n  SUBPARTITION sp_1 VALUES (1),\n  SUBPARTITION sp_2 VALUES (2),\n  SUBPARTITION\
  \ sp_3 VALUES (3),\n  SUBPARTITION sp_4 VALUES (4)\n)(\n  PARTITION t_jan_2007 VALUES\
  \ LESS THAN (to_date('2007-02-01','yyyy-mm-dd')),\n  PARTITION t_feb_2007 VALUES\
  \ LESS THAN (to_date('2007-03-01','yyyy-mm-dd')),\n  PARTITION t_mar_2007 VALUES\
  \ LESS THAN (to_date('2007-04-01','yyyy-mm-dd')),\n  ...\n  PARTITION t_oct_2007\
  \ VALUES LESS THAN (to_date('2007-11-01','yyyy-mm-dd')),\n  PARTITION t_nov_2007\
  \ VALUES LESS THAN (to_date('2007-12-01','yyyy-mm-dd')),\n  PARTITION t_dec_2007\
  \ VALUES LESS THAN (to_date('2008-01-01','yyyy-mm-dd'))\n)\n```\n\n图 9-9 是此测试表的图形化表示。如果你将其与之前的表（见图\
  \ 9-5）进行比较，唯一的区别在于，没有一个单一的值可以唯一标识整个表中子分区的位置。实际上，子分区的位置是基于其“父”分区的。\n\n![image](img/0909.jpg)\n\
  \n**图 9-9.** *测试表每年由 48 个分区组成。*\n\n当然，在这种情况下，名称和位置之间的映射关系同样可以在数据字典中找到。以下查询展示了如何从数据字典视图\
  \ `user_tab_partitions` 和 `user_tab_subpartitions` 中获取该信息：\n\n```sql\nSQL> SELECT\
  \ subpartition_name, partition_position, subpartition_position\n  2  FROM user_tab_partitions\
  \ p, user_tab_subpartitions s\n  3  WHERE p.table_name = 'T'\n  4  AND s.table_name\
  \ = p.table_name\n  5  AND s.partition_name = p.partition_name\n  6  ORDER BY p.partition_position,\
  \ s.subpartition_position;\n```\n\n```\nSUBPARTITION_NAME  PARTITION_POSITION SUBPARTITION_POSITION\n\
  ------------------ ------------------ ---------------------\nT_JAN_2007_SP_1   \
  \                  1                     1\nT_JAN_2007_SP_2                    \
  \ 1                     2\nT_JAN_2007_SP_3                     1               \
  \      3\nT_JAN_2007_SP_4                     1                     4\nT_FEB_2007_SP_1\
  \                     2                     1\n...\nT_NOV_2007_SP_4            \
  \        11                     4\nT_DEC_2007_SP_1                    12       \
  \              1\nT_DEC_2007_SP_2                    12                     2\n\
  T_DEC_2007_SP_3                    12                     3\nT_DEC_2007_SP_4   \
  \                 12                     4\n```\n\n以下查询是同时在分区和子分区级别施加限制的示例。操作与之前章节描述的相同。操作\
  \ 1 在分区级别应用，操作 2 在子分区级别应用。在分区级别，访问的是分区 1 到 7。对于每个访问的分区，只访问其子分区 3。图 9-10 展示了这种行为。请注意，当针对数据字典执行时，`Pstart`\
  \ 和 `Pstop` 列中的值与上一个查询的结果是如何匹配的。\n\n```sql\nSELECT * FROM t WHERE d1 < to_date('2007-07-19','yyyy-mm-dd')\
  \ AND n1 = 3\n```\n\n```\n------------------------------------------------------------------\n\
  | Id | Operation                 | Name | Starts | Pstart| Pstop |\n------------------------------------------------------------------\n\
  |  1 |  PARTITION RANGE ITERATOR |      |      1 |     1 |     7 |\n|  2 |   PARTITION\
  \ LIST SINGLE   |      |      7 |     3 |     3 |\n|* 3 |    TABLE ACCESS FULL \
  \     | T    |      7 |   KEY |   KEY |\n------------------------------------------------------------------\n\
  \n  3 - filter(\"D1\"<TO_DATE(' 2007-07-19 00:00:00', 'syyyy-mm-dd hh24:mi:ss'))\n\
  ```\n![image](img/0910.jpg)\n\n**图 9-10.** *复合分区修剪的表示*\n\n\n## 设计考量\n\n正如你在前面章节中所见，查询优化器能在多种情况下利用分区修剪。表\
  \ 9-1 总结了每种分区方法和最常见的 SQL 条件下发生分区修剪的时机。\n\n**表 9-1.** 导致分区修剪的条件\n\n| **条件** | **范围**\
  \ | **列表** | **哈希** |\n| --- | --- | --- | --- |\n| 等于 (`=`) | ![image](img/P0001.jpg)\
  \ | ![image](img/P0001.jpg) | ![image](img/P0001.jpg) |\n| `IN` | ![image](img/P0001.jpg)\
  \ | ![image](img/P0001.jpg) | ![image](img/P0001.jpg) |\n| `BETWEEN`, `>`, `>=`,\
  \ `<`, 或 `<=` | ![image](img/P0001.jpg) | ![image](img/P0001.jpg) |  |\n| `IS NULL`\
  \ | ![image](img/P0001.jpg) | ![image](img/P0001.jpg) |  |\n| * 不等于 (`!=` 或 `<>`)、`NOT\
  \ IN` 和 `NOT NULL`* **基于表达式和函数的条件及限制不会导致分区修剪。*\n\n选择分区键和分区方法可能是你在设计分区表时需要做出的最重要决策。目标是为了利用分区修剪，以处理尽可能多的\
  \ SQL 语句。此外，理想情况下，一个分区应只包含你期望由单个 SQL 语句处理的数据。例如，如果有频繁的按天处理数据的 SQL 语句，你应该按天分区。或者，如果有频繁的按国家处理数据的\
  \ SQL 语句，你应该按国家对数据进行分区。如果做错了，你将永远无法利用分区修剪。必须非常仔细地考虑应用程序的以下四个特征，因为它们对分区策略的影响最大：\n\
  \n-   限制条件预计应用于哪些列，以及其应用频率\n-   这些列中将存储何种数据\n-   这些限制中将使用何种 SQL 条件\n-   是否需要定期清除数据，以及基于什么标准进行清除\n\
  \n第一和第四个特征对于选择分区键至关重要。第二和第三个特征则用于选择分区方法。让我们详细讨论它们。\n\n了解限制条件应用于哪些列是必不可少的，因为如果没有对分区键应用任何限制，则不可能进行分区修剪。换句话说，基于此标准，你只能在有限的几列中做选择。在实践中，不同的\
  \ SQL 语句应用多个（可能非常不同的）限制是相当常见的。因此，你还必须了解不同 SQL 语句的使用频率。这样，你就可以决定哪些限制是优化时最重要的。无论如何，你只应考虑那些选择性较弱的限制。事实上，选择性强的限制可以通过其他访问结构（例如索引）进行优化。\n\
  \n一旦确定了可能用于分区键的列，就该看看它们存储的数据了。目的是找出哪种分区方法适用于这些数据。为此，有两点至关重要。首先，只有范围和列表分区允许将“相关”数据（例如，整个七月的销售额或所有欧洲国家）分组在一起，或将特定值精确映射到特定分区。其次，每种分区方法仅适用于非常特定的数据类型：\n\
  \n-   `范围` 适用于本质上是顺序的值。典型例子是时间戳和序列生成的数字。\n-   `列表` 适用于不同值的数量既明确已知又有限的情况。典型例子是各种状态信息（例如，启用、禁用、已处理）以及描述人（例如，性别、婚姻状况）或物（例如，国家和邮政编码、货币、类别、格式）的属性。\n\
  -   `哈希` 适用于所有不同值的数量远大于分区数的数据类型（例如，客户编号）。\n\n分区方法必须既适合数据类型，又适合应用于组成分区键的列的限制条件。这里，应考虑表\
  \ 9-1 中描述的与哈希分区相关的限制。此外，请注意，尽管在技术上可以在列表分区表上使用范围条件，但此类条件*不一定*会导致分区修剪。事实上，列表分区表中的数据本质上不是顺序的。\n\
  \n如果存在定期清除活动，你还应考虑是否可以利用分区特性来实现这些活动。删除一个分区比删除其包含的数据要快得多。这种策略通常仅在使用范围分区时才可行。\n\n\
  一旦选择了分区键，就需要决定是否可以修改该分区键。这种修改通常意味着将行移动到另一个分区，从而更改其 rowid。通常，一行永远不会更改其 rowid。因此，如果存在这种可能性，不仅必须在表级别启用行移动以允许数据库引擎进行如此关键的修改，而且应用程序也需要特别小心地使用\
  \ rowid。\n\n最后，但以我之见非常重要的一点是，要防止我在实施分区的项目中遇到的最常见错误。这个错误是在没有实施分区的情况下设计并实现数据库和应用程序，然后再对其进行分区。这种方法十有八九会失败。\n\
  \n我强烈建议从项目一开始就规划分区的使用。如果你认为以后必要时可以轻松引入它，那你可能会大吃一惊。\n\n## 全索引扫描\n\n数据库引擎不仅可以使用索引来提取\
  \ rowid 列表，并将其用作指针来读取表中对应的行，还可以直接读取作为索引键一部分的列值，从而避免通过 rowid 访问表。由于这项非常重要的优化，当索引包含处理查询所需的所有数据时，全表扫描或全分区扫描可能会被**全索引扫描**\
  \ (`full index scan`) 取代。由于索引段通常比表段小得多，这对于减少逻辑读的数量非常有用。\n\n全索引扫描在三种主要情况下很有用。\n\n\
  第一种情况是当索引存储了查询使用的所有列时。例如，由于列 `n1` 在测试表中被索引，以下查询可以利用全索引扫描。以下执行计划确认没有执行表访问（请注意，本节中的所有示例都基于脚本\
  \ `index_full_scan.sql`）：\n\n```sql\nSELECT /*+ index(t t_n1_i) */ n1 FROM t WHERE\
  \ n1 IS NOT NULL\n```\n\n```\n-----------------------------------------------------\n\
  | Id | Operation        | Name   | Starts | Buffers |\n-----------------------------------------------------\n\
  |* 1 |   INDEX FULL SCAN | T_N1_I |      1 |     689 |\n-----------------------------------------------------\n\
  \n  1 - filter(\"N1\" IS NOT NULL)\n```\n\n必须理解，此执行计划是可能的，因为 `WHERE` 子句中的条件 (`n1\
  \ IS NOT NULL`) 确保存储了处理所需的所有数据（列 `n1` 上的 `NOT NULL` 约束具有相同的效果，因为它确保不会插入 `NULL` 值）。否则，由于单列\
  \ B 树索引不存储 `NULL` 值，将会执行全表扫描。\n\n操作 `INDEX FULL SCAN`（可以通过提示 `index` 强制使用，如前例所示）根据其结构扫描索引。这样做的优点是检索的数据根据索引键排序。缺点是，如果索引块不在缓冲区高速缓存中，则通过单块读取从数据文件中读取它们。由于全索引扫描可能读取大量数据，这通常是低效的。为了在此类情况下提高性能，可以使用**索引快速全扫描**\
  \ (`index fast full scans`)。以下执行计划显示了一个示例：\n\n```sql\nSELECT /*+ index_ffs(t t_n1_i)\
  \ */ n1 FROM t WHERE n1 IS NOT NULL\n```\n\n```\n---------------------------------------\n\
  | Id | Operation             | Name   |\n---------------------------------------\n\
  |* 1 |   INDEX FAST FULL SCAN | T_N1_I |\n---------------------------------------\n\
  \n  1 - filter(\"N1\" IS NOT NULL)\n```\n\n操作 `INDEX FAST FULL SCAN`（可以通过提示 `index_ffs`\
  \ 强制使用）的特点是，如果索引块不在缓冲区高速缓存中，则通过多块读取从数据文件中读取它们，就像全表扫描对表所做的那样。在此类扫描期间，根块和分支块可以简单地被丢弃，因为所有数据都存储在叶块中（通常根块和分支块仅占索引段的一小部分，因此即使它们被无用读取，开销通常也可以忽略不计）。因此，不考虑索引结构进行访问，因此检索的数据不会根据索引键排序。\n\
  \n第二种情况与前一种情况类似。唯一的区别是数据必须按照其在索引中存储的相同顺序交付。例如，如下列查询所示，因为指定了 `ORDER BY` 子句。由于顺序很重要，只能使用操作\
  \ `INDEX FULL SCAN` 来避免排序操作。\n\n```sql\nSELECT /*+ index(t t_n1_i) */ n1 FROM t\
  \ WHERE n1 IS NOT NULL ORDER BY n1\n```\n\n```\n----------------------------------\n\
  | Id | Operation        | Name   |\n----------------------------------\n|* 1 | \
  \  INDEX FULL SCAN | T_N1_I |\n----------------------------------\n\n  1 - filter(\"\
  N1\" IS NOT NULL)\n```\n\n由于操作 `INDEX FULL SCAN` 的效率低于操作 `INDEX FAST FULL SCAN`，因此仅当顺序重要时才使用前者。\n\
  \n默认情况下，索引扫描按升序执行。因此，提示 `index` 指示查询优化器也以这种方式运行。要明确指定扫描顺序，可以使用提示 `index_asc` 和 `index_desc`。以下查询展示了用法。执行计划显示了按降序扫描：\n\
  \n```sql\nSELECT /*+ index_desc(t t_n1_i) */ n1 FROM t WHERE n1 IS NOT NULL ORDER\
  \ BY n1 DESC\n```\n\n```\n---------------------------------------------\n| Id |\
  \ Operation                   | Name   |\n---------------------------------------------\n\
  |* 1 |   INDEX FULL SCAN DESCENDING | T_N1_I |\n---------------------------------------------\n\
  \n  1 - filter(\"N1\" IS NOT NULL)\n```\n\n第三种情况与函数 `count` 相关。如果查询包含它，查询优化器会尝试利用索引来避免全表扫描。以下查询是一个示例。请注意，操作\
  \ `SORT AGGREGATE` 用于执行函数 `count`。\n\n```sql\nSELECT /*+ index_ffs(t t_n1_i) */\
  \ count(n1) FROM t\n```\n\n```\n----------------------------------------\n| Id |\
  \ Operation              | Name   |\n----------------------------------------\n\
  |  1 |   SORT AGGREGATE       |        |\n|  2 |    INDEX FAST FULL SCAN | T_N1_I\
  \ |\n----------------------------------------\n```\n\n当针对*可为空* (`nullable`) 的列处理\
  \ `count` 时，查询优化器能够选择任何包含该列的索引。当处理 `count(*)` 或针对*不可为空* (`not-nullable`) 的列进行计数时，查询优化器能够选择任何包含至少一个不可为空列的索引（这是必要的，因为只有在这种情况下才能保证索引条目数与行数相同）。因此，它会选择不可为空列的最小索引。\n\
  \n尽管本节中的示例基于 B 树索引，但大多数技术也适用于位图索引。只有两个区别。首先，位图索引不能按降序扫描（这是由于实现导致的限制）。其次，位图索引始终存储\
  \ `NULL` 值。因此，它们可以用于比 B 树索引更多的情况。以下查询显示了与前面类似的示例：\n\n```sql\nSELECT /*+ index(t\
  \ t_n2_i) */ n2 FROM t WHERE n2 IS NOT NULL\n```\n\n```\n-------------------------------------\n\
  | Id | Operation                    |\n-------------------------------------\n|\
  \  1 |   BITMAP CONVERSION TO ROWIDS |\n|* 2 |    BITMAP INDEX FULL SCAN     |\n\
  -------------------------------------\n\n  2 - filter(\"N2\" IS NOT NULL)\n```\n\
  \n```sql\nSELECT /*+ index_ffs(t t_n2_i) */ n2 FROM t WHERE n2 IS NOT NULL\n```\n\
  \n```\n--------------------------------------\n| Id | Operation                \
  \     |\n--------------------------------------\n|  1 |   BITMAP CONVERSION TO ROWIDS\
  \  |\n|* 2 |    BITMAP INDEX FAST FULL SCAN |\n--------------------------------------\n\
  \n  2 - filter(\"N2\" IS NOT NULL)\n```\n\n```sql\nSELECT /*+ index(t t_n2_i) */\
  \ n2 FROM t WHERE n2 IS NOT NULL ORDER BY n2\n```\n\n```\n-------------------------------------\n\
  | Id | Operation                    |\n-------------------------------------\n|\
  \  1 |   BITMAP CONVERSION TO ROWIDS |\n|* 2 |    BITMAP INDEX FULL SCAN     |\n\
  -------------------------------------\n\n  2 - filter(\"N2\" IS NOT NULL)\n```\n\
  \n```sql\nSELECT /*+ index_ffs(t t_n2_i) */ count(n2) FROM t\n```\n\n```\n---------------------------------------\n\
  | Id | Operation                      |\n---------------------------------------\n\
  |  1 |   SORT AGGREGATE                |\n|  2 |    BITMAP CONVERSION TO ROWIDS\
  \  |\n|  3 |     BITMAP INDEX FAST FULL SCAN |\n---------------------------------------\n\
  ```\n\n\n#### 具有强选择性的 SQL 语句\n\n要高效处理具有强选择性的 SQL 语句，应通过 `rowid`、索引或单表哈希簇来访问数据。¹\
  \ 这三种可能性将在后续章节中描述。\n\n##### Rowid 访问\n\n访问一行的最有效方式是在 `WHERE` 子句中直接指定其 `rowid`。然而，要利用这种访问路径，你必须首先获取\
  \ `rowid`，将其存储起来，然后在后续访问中复用它。换句话说，只有在一行数据至少被访问两次时，才应考虑采用此方法。在实践中，当 SQL 语句具有强选择性时，这种情况相当常见。例如，用于手动维护数据的应用程序（即非批处理作业）通常至少访问相同的行两次：至少一次用于显示当前数据，至少第二次用于存储修改。在这种情况下，仔细利用\
  \ `rowid` 访问的效率是有意义的。\n\nOracle 的两个工具提供了演示此类实现的优秀示例：Forms 和 SQL Developer。例如，当 SQL\
  \ Developer 显示数据时，它会同时获取数据本身及其 `rowid`。对于用户 `scott` 的 `emp` 表，该工具执行以下查询。请注意，`SELECT`\
  \ 子句中的第一列是 `rowid`。\n\n```sql\nSELECT ROWID,\"EMPNO\",\"ENAME\",\"JOB\",\"MGR\"\
  ,\"HIREDATE\",\"SAL\",\"COMM\",\"DEPTNO\"\nFROM \"SCOTT\".\"EMP\"\n```\n\n之后，`rowid`\
  \ 可用于直接访问每个特定行。例如，如果你打开“单记录视图”对话框（参见图 9-11），编辑 `comm` 列并提交修改，则会执行以下 SQL 语句。如你所见，该工具使用\
  \ `rowid` 来引用已修改的行，而不是主键（从而节省了从主键索引中读取多个数据块的开销）。\n\n```sql\nUPDATE \"SCOTT\".\"\
  EMP\" SET COMM = '1000' WHERE ROWID = 'AAADGZAAEAAAAAoAAH'\n```\n\n![image](img/0911.jpg)\n\
  \n*图 9-11.* 用于显示、浏览和编辑数据的 SQL Developer 对话框\n\n从性能角度来看，使用 `rowid` 非常好，因为可以直接访问行，而无需借助索引等二级访问结构。以下是与此类\
  \ SQL 语句相关的执行计划：\n\n```\n-----------------------------------------------------\n\
  | Id | Operation                    | Name | Starts |\n-----------------------------------------------------\n\
  |  1 |  UPDATE                      | EMP  |      1 |\n|  2 |   TABLE ACCESS BY\
  \ USER ROWID | EMP  |      1 |\n-----------------------------------------------------\n\
  ```\n\n请注意，操作 `TABLE ACCESS BY USER ROWID` 专门在 `rowid` 作为参数或字面量直接传递时使用。在下一节中，你将看到当\
  \ `rowid` 从索引中提取时，将改用操作 `TABLE ACCESS BY INDEX ROWID`。这些表访问操作的效果是相同的；这两个操作仅用于区分\
  \ `rowid` 的来源。\n\n当 SQL 语句通过 `IN` 条件指定多个 `rowid` 时，执行计划中会出现一个附加操作 `INLIST ITERATOR`。以下查询是一个示例。请注意，操作\
  \ 1（父操作）仅表示操作 2（子操作）被多次处理。根据操作 2 的 `Starts` 列的值，它被处理了两次。换句话说，通过 `rowid` 访问了 `emp`\
  \ 表两次。\n\n```sql\nSELECT *\nFROM emp\nWHERE rowid IN ('AAADGZAAEAAAAAoAAH', 'AAADGZAAEAAAAAoAAI')\n\
  ```\n\n```\n-----------------------------------------------------\n| Id | Operation\
  \                    | Name | Starts |\n-----------------------------------------------------\n\
  | 1  |  INLIST ITERATOR               |      |    1 |\n| 2  |   TABLE ACCESS BY\
  \ USER ROWID   | EMP  |    2 |\n-----------------------------------------------------\n\
  ```\n\n* * *\n\n**注意** 操作 `INLIST ITERATOR` 并非 `rowid` 访问所特有。它是一个通用操作，在 `WHERE`\
  \ 子句中存在 `IN` 条件时使用。它意味着对 `IN` 子句中指定的对象列表进行迭代，并将其逐个传递给子操作。\n\n* * *\n\n总之，每当特定行至少被访问两次时，你应该考虑在第一次访问时获取\
  \ `rowid`，并在后续访问中加以利用。\n\n\n\n##### 索引访问\n\n索引访问是迄今为止对于具有高选择性的 SQL 语句最常用的访问路径。为了利用索引，必须通过索引来应用\
  \ `WHERE` 子句中存在的至少一个限制条件。为此，不仅要对提供高选择性的 `WHERE` 子句中使用的列进行索引，还要理解哪些类型的条件可以通过索引高效地应用。数据库引擎支持不同类型的索引。在详细描述\
  \ B 树和位图索引支持的属性和访问路径之前，讨论聚簇因子（或者换句话说，为什么数据分布会影响索引扫描的性能）非常重要（参见图 9-4）。\n\n***\n\n\
  注意：尽管数据库引擎支持针对复杂数据（如 PDF 文档或图像）的域索引，但本书不涵盖此内容。更多信息请参阅 `Oracle Database Documentation`。\n\
  \n***\n\n#### 聚簇因子\n\n如第 4 章所述，聚簇因子表示有多少相邻的索引键不引用表中的同一个数据块（位图索引是个例外，因为它们的聚簇因子始终设置为索引中的键数；参见第\
  \ 4 章）。这里有一个可能有帮助的心理图景。如果通过索引访问整个表，并且在缓冲区缓存中只有一个缓冲区来存储数据块，那么聚簇因子就是针对表执行的物理读取次数。例如，图\
  \ 9-12 所示索引的聚簇因子为 10（注意有 12 行，但只有两个高亮显示的相邻索引键引用了相同的数据块）。\n\n![image](img/0912.jpg)\n\
  \n**图 9-12.** 索引块与数据块之间的关系\n\n从性能角度来看，您应该避免基于行的处理。正如本章前面所讨论的，数据库引擎得益于行预取，也尽可能避免它。实际上，当需要从同一个块中提取多行时，数据库引擎不是每行访问一次该块（即进行一次逻辑读），而是在一次访问中提取所有行。为了强调这一点，让我们看一个基于脚本\
  \ `clustering_factor.sql` 的例子。以下是该脚本创建的测试表：\n\n```sql\nSQL> CREATE TABLE t (\n \
  \ 2       id NUMBER,\n  3       pad VARCHAR2(4000),\n  4       CONSTRAINT t_pk PRIMARY\
  \ KEY (id)\n  5  );\n\nSQL> INSERT INTO t\n  2     SELECT rownum AS id, dbms_random.string('p',500)\
  \ AS pad\n  3     FROM dual\n  4     CONNECT BY level <= 1000;\n```\n\n由于 `id` 列的值是按递增顺序插入的，支持主键的索引的聚簇因子接近表中的块数。换句话说，它非常好。\n\
  \n```sql\nSQL> SELECT blocks, num_rows\n  2  FROM user_tables\n  3  WHERE table_name\
  \ = 'T';\n\n     BLOCKS     NUM_ROWS\n  -----------  -----------\n          73 \
  \      1000\n\nSQL> SELECT blevel, leaf_blocks, clustering_factor\n  2  FROM user_indexes\n\
  \  3  WHERE index_name = 'T_PK';\n\n       BLEVEL LEAF_BLOCKS CLUSTERING_FACTOR\n\
  \   ---------- ----------- -----------------\n            1           2        \
  \        72\n```\n\n现在，看看当通过主键访问整个表时执行的逻辑读取次数是很有用的（使用一个提示来强制执行此执行计划）。第一次测试的行预取大小设置为\
  \ 2。因此，至少需要执行 500 次对数据库引擎的调用来检索 1,000 行。通过查看逻辑读取次数（`Buffers` 列）可以确认此行为：索引上为 503，表上为\
  \ 572（1,075 – 503）。基本上，每次调用从索引块中提取两个 rowid，并且由于良好的聚簇因子，几乎每次它们的数据都在同一个数据块中找到。\n\n\
  ```sql\nSQL> set arraysize 2\nSQL> SELECT /*+ index(t t_pk) */ * FROM t;\n\n---------------------------------------------------------------------\n\
  | Id | Operation                   | Name | Starts | A-Rows | Buffers |\n---------------------------------------------------------------------\n\
  |  1 | TABLE ACCESS BY INDEX ROWID| T    |      1 |   1000 |    1075 |\n|  2 | INDEX\
  \ FULL SCAN            | T_PK |      1 |   1000 |     503 |\n---------------------------------------------------------------------\n\
  ```\n\n第二次测试的行预取大小设置为 100。因此，至少 10 次对数据库引擎的调用就足以检索所有行。同样，通过查看逻辑读取次数可以确认此行为：索引上为\
  \ 13，表上为 82（95 – 13）。基本上，每次调用从索引块中提取 10 个 rowid，并且它们的数据通常在同一个数据块中找到。\n\n```sql\n\
  SQL> set arraysize 100\nSQL> SELECT /*+ index(t t_pk) */ * FROM t;\n\n---------------------------------------------------------------------\n\
  | Id | Operation                   | Name | Starts | A-Rows | Buffers |\n---------------------------------------------------------------------\n\
  |  1 | TABLE ACCESS BY INDEX ROWID| T    |      1 |   1000 |      95 |\n|  2 | INDEX\
  \ FULL SCAN            | T_PK |      1 |   1000 |      13 |\n---------------------------------------------------------------------\n\
  ```\n\n值得注意的是，在前两个例子中，表上执行的逻辑读取次数等于聚簇因子加上调用次数（即行数除以预取大小）的总和。然而，情况并非总是如此。\n\n现在让我们使用一个高得多的聚簇因子进行相同的测试。为此，在\
  \ `INSERT` 语句中添加了一个 `ORDER BY` 子句。唯一改变的统计信息是聚簇因子。注意它接近行数。换句话说，它非常差。\n\n```sql\n\
  SQL> INSERT INTO t\n  2  SELECT rownum AS id, dbms_random.string('p',500) AS pad\n\
  \  3  FROM dual\n  4  CONNECT BY level <= 1000\n  5  ORDER BY dbms_random.value;\n\
  \nSQL> SELECT blocks, num_rows\n  2  FROM user_tables\n  3  WHERE table_name = 'T';\n\
  \n       BLOCKS   NUM_ROWS\n   ---------- ----------\n          73       1000\n\n\
  SQL> SELECT blevel, leaf_blocks, clustering_factor\n  2  FROM user_indexes\n  3\
  \  WHERE index_name = 'T_PK';\n\n       BLEVEL LEAF_BLOCKS CLUSTERING_FACTOR\n \
  \  ---------- ----------- -----------------\n            1           2         \
  \      990\n```\n\n以下是两次测试的逻辑读取次数。一方面，两次测试中索引上的逻辑读取次数没有变化。这是合理的，因为它接近对数据库引擎的调用次数。另一方面，两次测试中表上的逻辑读取次数都接近行数。这也是合理的，因为索引中两个相邻的\
  \ rowid 几乎从不引用同一个块。\n\n```sql\nSQL> set arraysize 2\nSQL> SELECT /*+ index(t t_pk)\
  \ */ * FROM t;\n```\n\n"
- "# B 树索引与位图索引\n\n简而言之，在某些情况下只能考虑 B 树索引。如果你的情况不属于那些特定场景，那么大多数时候都应该考虑使用位图索引。表 9-2\
  \ 总结了在选择 B 树索引还是位图索引时需要考量的关键特性。\n\n**表 9-2.** B 树索引与位图索引支持的关键特性\n\n| **特性** | **B\
  \ 树索引** | **位图索引** |\n| --- | --- | --- |\n| 主键与唯一键 | ![image](img/P0001.jpg) |\
  \  |\n| 行级锁 | ![image](img/P0001.jpg) |  |\n| 处理 DML 语句时的高效空间管理 | ![image](img/P0001.jpg)\
  \ | ![image](img/P0001.jpg)^* |\n| 多索引高效组合 |  | ![image](img/P0001.jpg) |\n| 星型转换\
  \ |  | ![image](img/P0001.jpg) |\n| ** 仅从 Oracle 数据库 10g 版本开始支持。*与早期版本相关的问题记录在 MetaLink\
  \ 笔记“理解对表执行 DML 操作时位图索引的增长”(260330.1)中。* |\n\n* * *\n\n**注意** 位图索引仅在企业版中可用。\n\n\
  * * *\n\n位图索引的使用主要受两种情况限制。首先，主键和唯一键只能使用 B 树索引。这别无选择。其次，只有 B 树索引支持行级锁，因为（B 树和位图）索引中的锁在内部是针对索引条目设置的。由于单个位图索引条目可能索引数千行数据，修改一个被位图索引的列可能会阻止数千行其他行（由同一索引条目引用的行）的并发修改，这可能极大地限制可扩展性。第三个问题只出现在\
  \ Oracle 数据库 10g 版本之前，是因为位图索引存在空间管理问题。这导致（过于）频繁的索引重建。因此，直到 Oracle9i 版本，它们只用于极少修改的列。\n\
  \n此外，如果你想利用多索引的高效组合或星型转换，就需要使用位图索引。\n\n请注意，表 9-2 并未对索引的选择性或被索引列的基数提供评论。尽管许多关于位图索引的书籍和论文包含如下建议：\n\
  \n> 这些索引适用于低基数数据。通过压缩技术，它们可以用最少的 I/O 生成大量 rowid。组合非选择性列上的位图索引，可以高效地进行 AND 和 OR 操作，涉及大量\
  \ rowid 且 I/O 开销极小。\n>\n> — Oracle 数据库性能调优指南 11g 第 1 版\n\n老实说，在我看来，这样的信息至少是误导性的。事实是，一个选择性差的\
  \ SQL 语句永远无法通过从索引获取 rowid 列表来高效执行。这是因为，在此类情况下，构建 rowid 列表所需的时间（无论是 B 树索引还是位图索引）都远远小于使用这些\
  \ rowid 访问表所需的时间。话虽如此，位图索引在处理低基数数据时确实比 B 树索引表现更好。但要小心，*更好*并不一定意味着*高效*。例如，一个*差*的产品不会因为它比一个*非常差*的产品更好就变成*好*产品。也许组合位图索引非常高效，但重申一遍，构建\
  \ rowid 列表仅仅是开始。行数据仍然需要被访问。另外，我还得提一下`OR`。如果你仔细想想，会意识到用`OR`组合多个非选择性条件只会导致选择性更差，而如果你想使用索引，目标应该是提高选择性。总之，在\
  \ B 树索引和位图索引之间做选择时，忘掉选择性和基数吧。\n\n除了表 9-2 总结的差异外，B 树索引和位图索引在处理相同的 SQL 条件时效率并不相同。实际上，位图索引通常更强大。表\
  \ 9-3 总结了两种索引应对不同类型条件的能力。接下来的章节旨在提供一些相关示例。我还将描述不同的属性和限制。所有示例都基于脚本`conditions.sql`。测试表及其索引是使用以下\
  \ SQL 语句创建的：\n\n```sql\nCREATE TABLE t (\n  id NUMBER,\n  d1 DATE,\n  n1 NUMBER,\n\
  \  n2 NUMBER,\n  n3 NUMBER,\n  n4 NUMBER,\n  n5 NUMBER,\n  n6 NUMBER,\n  c1 VARCHAR2(20),\n\
  \  c2 VARCHAR2(20),\n  pad VARCHAR2(4000),\n  CONSTRAINT t_pk PRIMARY KEY (id)\n\
  );\n\nINSERT INTO t\nSELECT rownum AS id,\n       trunc(to_date('2007-01-01','yyyy-mm-dd')+rownum/27.4)\
  \ AS d1,\n       nullif(1+mod(rownum,19),10) AS n1,\n       nullif(1+mod(rownum,113),10)\
  \ AS n2,\n       nullif(1+mod(rownum,61),10) AS n3,\n       nullif(1+mod(rownum,19),10)\
  \ AS n4,\n       nullif(1+mod(rownum,113),10) AS n5,\n       nullif(1+mod(rownum,61),10)\
  \ AS n6,\n       dbms_random.string('p',20) AS c1,\n       dbms_random.string('p',20)\
  \ AS c2,\n       dbms_random.string('p',255) AS pad\nFROM dual\nCONNECT BY level\
  \ <= 10000\nORDER BY dbms_random.value;\n\nCREATE INDEX i_n1 ON t (n1);\nCREATE\
  \ INDEX i_n2 ON t (n2);\nCREATE INDEX i_n3 ON t (n3);\nCREATE INDEX i_n123 ON t\
  \ (n1, n2, n3);\nCREATE BITMAP INDEX i_n4 ON t (n4);\nCREATE BITMAP INDEX i_n5 ON\
  \ t (n5);\nCREATE BITMAP INDEX i_n6 ON t (n6);\nCREATE INDEX i_c1 ON t (c1);\nCREATE\
  \ BITMAP INDEX i_c2 ON t (c2);\n```\n\n**表 9-3.** 导致索引范围扫描的条件\n\n```\n---------------------------------------------------------------------\n\
  | Id | Operation                 | Name | Starts | A-Rows | Buffers |\n---------------------------------------------------------------------\n\
  |  1 | TABLE ACCESS BY INDEX ROWID| T    |      1 |   1000 | `1497`   |\n|  2 |\
  \ INDEX FULL SCAN            | T_PK |      1 |   1000 |    `502`  |\n---------------------------------------------------------------------\n\
  ```\n\n`SQL> set arraysize` `100`\n`SQL> SELECT /*+ index(t t_pk) */ * FROM t;`\n\
  \n```\n---------------------------------------------------------------------\n|\
  \ Id | Operation                 | Name | Starts | A-Rows | Buffers |\n---------------------------------------------------------------------\n\
  |  1 | TABLE ACCESS BY INDEX ROWID| T    |      1 |   1000 |  `1003`   |\n|  2 |\
  \ INDEX FULL SCAN            | T_PK |      1 |   1000 | `13`    |\n---------------------------------------------------------------------\n\
  ```\n\n总之，当聚簇因子较高时，行预取的效果较差，因此执行的逻辑读操作次数更多。聚簇因子对资源消耗的影响如此之大，以至于查询优化器（如第 5 章所述，特别是公式\
  \ 5-5）使用聚簇因子来计算与索引访问相关的成本。\n\n\n| 条件 | B 树索引 | 位图索引 |\n| --- | --- | --- |\n| 等值\
  \ (`=`) | ![image](img/P0001.jpg) | ![image](img/P0001.jpg) |\n| `IS NULL` | ![image](img/P0001.jpg)\
  \ | ![image](img/P0001.jpg) |\n| 不等 (`!=`, `<>`) 与 `IS NOT NULL` | | ![image](img/P0001.jpg)\
  \ |\n| 范围 (`BETWEEN`, `>`, `>=`, `<` 和 `<=`) | ![image](img/P0001.jpg) | ![image](img/P0001.jpg)\
  \ |\n| `IN` | ![image](img/P0001.jpg) | ![image](img/P0001.jpg) |\n| `LIKE` | ![image](img/P0001.jpg)\
  \ | ![image](img/P0001.jpg) |\n\n\\* 仅当至少一个条件不是基于 `IS NULL` 或不等式时，才适用于复合索引。\n+ 仅当组合多个位图时适用。\n\
  \n## 等值条件与 B 树索引\n\n对于 B 树索引，等值条件通过两种操作之一执行。第一种是 `INDEX UNIQUE SCAN`，专用于唯一索引。顾名思义，它最多返回一个\
  \ rowid。以下查询是一个示例。执行计划通过操作 2 的访问谓词确认，对列 `id` 的条件是使用索引 `t_pk` 应用的。然后，操作 1 使用从索引中提取的\
  \ rowid 访问表 `t`。这是通过 `TABLE ACCESS BY INDEX ROWID` 操作完成的。注意，这两个操作都只执行一次。\n\n```sql\n\
  SELECT /*+ index(t) */ * FROM t WHERE id = 6\n```\n\n```\n------------------------------------------------------------\n\
  | Id | Operation                   | Name | Starts | A-Rows |\n------------------------------------------------------------\n\
  |  1 | TABLE ACCESS BY INDEX ROWID | T    |      1 |      1 |\n|* 2 |   INDEX UNIQUE\
  \ SCAN         | T_PK |      1 |      1 |\n------------------------------------------------------------\n\
  \n    2 - access(\"ID\"=6)\n```\n\n> **注意** 在本节中，为了强制索引扫描，提示 `index` 仅通过指定表名来使用。当以这种方式使用时，查询优化器可以自由地从可用索引中选择一个。在所有示例中，`WHERE`\
  \ 子句中只存在一个谓词。因此，查询优化器总是根据该谓词中引用的列来选择索引。然而，最佳实践是明确指定应使用哪个索引。我将在下一节中给出一些示例。\n\n第二种操作是\
  \ `INDEX RANGE SCAN`，用于非唯一索引。此操作与前一个操作的唯一区别在于它可以提取多个 rowid（示例中为 527 个），而不仅仅是一个。\n\
  \n```sql\nSELECT /*+ index(t) */ * FROM t WHERE n1 = 6\n```\n\n```\n------------------------------------------------------------\n\
  | Id | Operation                   | Name | Starts | A-Rows |\n------------------------------------------------------------\n\
  |  1 | TABLE ACCESS BY INDEX ROWID | T    |      1 |    527 |\n|* 2 |   INDEX RANGE\
  \ SCAN         | I_N1 |      1 |    527 |\n------------------------------------------------------------\n\
  \n    2 - access(\"N1\"=6)\n```\n\n默认情况下，索引扫描按升序执行。因此，提示 `index` 指示查询优化器也以这种方式操作。要明确指定扫描顺序，可以使用提示\
  \ `index_asc` 和 `index_desc`。以下查询展示了如何操作。在执行计划中，降序扫描通过操作 `INDEX RANGE SCAN DESCENDING`\
  \ 显示。请注意，两个操作返回的数据相同，只是顺序不同。\n\n```sql\nSELECT /*+ index_desc(t) */ * FROM t WHERE\
  \ n1 = 6\n```\n\n```\n--------------------------------------------------------------------\n\
  | Id | Operation                          | Name | Starts | A-Rows |\n--------------------------------------------------------------------\n\
  |  1 | TABLE ACCESS BY INDEX ROWID        | T    |      1 |    527 |\n|* 2 |   INDEX\
  \ RANGE SCAN DESCENDING      | I_N1 |      1 |    527 |\n--------------------------------------------------------------------\n\
  \n    2 - access(\"N1\"=6)\n        filter(\"N1\"=6)\n```\n\n然而，从实际角度来看，为等值条件进行降序扫描是没有意义的。关于范围条件的章节将描述这种访问路径何时真正有用。\n\
  \n## 等值条件与位图索引\n\n对于位图索引，等值条件通过三种操作执行。按执行顺序，第一个操作是 `BITMAP INDEX SINGLE VALUE`，它扫描索引并应用限制。顾名思义，此操作查找单个值。第二个操作\
  \ `BITMAP CONVERSION TO ROWIDS` 将从第一个操作获得的位图转换为 rowid 列表。第三个操作使用第二个操作构建的 rowid 列表访问表。注意，所有三个操作都只执行一次。\n\
  \n```sql\nSELECT /*+ index(t i_n4) */ * FROM t WHERE n4 = 6\n```\n\n```\n----------------------------------------------------------------\n\
  | Id | Operation                      | Name | Starts | A-Rows |\n----------------------------------------------------------------\n\
  |  1 | TABLE ACCESS BY INDEX ROWID    | T    |      1 |    527 |\n|  2 |   BITMAP\
  \ CONVERSION TO ROWIDS  |      |      1 |    527 |\n|* 3 |   BITMAP INDEX SINGLE\
  \ VALUE    | I_N4 |      1 |      1 |\n----------------------------------------------------------------\n\
  \n    3 - access(\"N4\"=6)\n```\n\n> **注意** 在本节中，为了强制索引扫描，提示 `index` 同时指定了表名和索引名。换句话说，提示指定了应使用哪个索引。当以这种方式使用时，仅当存在具有该名称的索引时，提示才有效。由于索引的名称可以轻松更改（例如，使用\
  \ SQL 语句 `ALTER INDEX RENAME`），因此在实践中，具有该语法的提示也极易因错误而失效。\n\n## IS NULL 条件与 B 树索引\n\
  \n对于 B 树索引，`IS NULL` 条件只能通过复合 B 树索引应用，前提是应用了多个 SQL 条件且其中至少一个不是基于 `IS NULL` 或不等式。以下查询演示了这一点。执行计划通过操作\
  \ 2 的访问谓词确认，对列 `n2` 的条件是使用索引 `i_n123` 应用的。另请注意，操作 2 仅返回 5 行，而对于前面没有 `n2 IS NULL`\
  \ 限制的章节中的示例，范围扫描返回了 527 行。\n\n```sql\nSELECT /*+ index(t) */ * FROM t WHERE n1 =\
  \ 6 AND n2 IS NULL\n```\n\n```\n--------------------------------------------------------------\n\
  | Id | Operation                   | Name   | Starts | A-Rows |\n--------------------------------------------------------------\n\
  |  1 | TABLE ACCESS BY INDEX ROWID | T      |      1 |      5 |\n|* 2 |   INDEX\
  \ RANGE SCAN          | I_N123 |      1 |      5 |\n--------------------------------------------------------------\n\
  \n    2 - access(\"N1\"=6 AND \"N2\" IS NULL)\n```\n\n如下例所示，当为索引的引导列指定 `IS NULL`\
  \ 条件时，也会使用完全相同的执行计划。\n\n```sql\nSELECT /*+ index(t) */ * FROM t WHERE n1 IS NULL\
  \ AND n2 = 8\n```\n\n```\n--------------------------------------------------------------\n\
  | Id | Operation                   | Name   | Starts | A-Rows |\n--------------------------------------------------------------\n\
  |  1 | TABLE ACCESS BY INDEX ROWID | T      |      1 |      4 |\n|* 2 |   INDEX\
  \ RANGE SCAN          | I_N123 |      1 |      4 |\n--------------------------------------------------------------\n\
  \n    2 - access(\"N1\" IS NULL AND \"N2\"=8)\n        filter(\"N2\"=8)\n```\n\n\
  \n\n"
- "# 索引与条件操作\n\n单列索引无法用于应用 `IS NULL` 条件。这是因为 `NULL` 值不存储在索引中。因此，查询优化器在此类情况下无法利用索引。即使你尝试使用\
  \ `index` 提示强制使用它，也会执行全表扫描。\n\n```\nSELECT /*+ index(t i_n1) */ * FROM t WHERE n1\
  \ IS NULL\n```\n\n```\n-----------------------------------------------------\n|\
  \ Id | Operation          | Name  | Starts | A-Rows |\n-----------------------------------------------------\n\
  |* 1 | TABLE ACCESS FULL  | T     |      1 |    526 |\n-----------------------------------------------------\n\
  ```\n\n```\n    1-filter(\"N1\" IS NULL)\n```\n\n## IS NULL 条件与位图索引\n\n对于位图索引，`IS\
  \ NULL` 条件的处理方式与相等条件相同。这是因为位图索引以与任何其他值相同的方式存储 `NULL` 值。\n\n```\nSELECT /*+ index(t\
  \ i_n4) */ * FROM t WHERE n4 IS NULL\n```\n\n```\n--------------------------------------------------------------\n\
  | Id | Operation                  | Name   | Starts | A-Rows |\n--------------------------------------------------------------\n\
  |  1 | TABLE ACCESS BY INDEX ROWID| T      |      1 |    526 |\n|  2 |   BITMAP\
  \ CONVERSION TO ROWIDS |      |    526 |    526 |\n|* 3 | BITMAP INDEX SINGLE VALUE\
  \  | I_N4   |      1 |      1 |\n--------------------------------------------------------------\n\
  ```\n\n```\n    3 - access(\"N4\" IS NULL)\n```\n\n## 范围条件与 B 树索引\n\n对于 B 树索引，范围条件的处理方式与非唯一索引上的相等条件相同，或者换句话说，使用\
  \ `INDEX RANGE SCAN` 操作。对于范围条件，索引类型（即其唯一性）无关紧要。因为是范围扫描，总是可以返回多个 rowid。例如，下面的查询显示了一个应用于主键列的范围条件：\n\
  \n```\nSELECT /*+ index(t (t.id)) */ * FROM t WHERE id BETWEEN 6 AND 19\n```\n\n\
  ```\n-------------------------------------------------------------\n| Id | Operation\
  \                  | Name  | Starts | A-Rows |\n-------------------------------------------------------------\n\
  |  1 | TABLE ACCESS BY INDEX ROWID| T     |      1 |     14 |\n|* 2 |   INDEX RANGE\
  \ SCAN         | T_PK  |      1 |     14 |\n-------------------------------------------------------------\n\
  ```\n\n```\n    2 - access(\"ID\">=6 AND \"ID\"<=19)\n```\n\n> **注意** 本节中使用了多个提示来强制索引扫描，通过指定表名以及索引应创建在哪些列上。与指定索引名的方法相比，这种方法的优点是提示不依赖于索引名。这为提示提供了更强的健壮性。请注意，此语法从\
  \ Oracle Database 10*g* 开始可用。\n\n如前一节所述，默认情况下按升序执行索引扫描。这意味着当 `ORDER BY` 应用于与范围条件相同的列时，结果集已经排序。因此，不会执行显式排序。但是，当需要降序的\
  \ `ORDER BY` 时，需要执行显式排序，如下所示。排序由操作 1 `SORT ORDER BY` 执行。注意如何使用 `index_asc` 提示强制升序索引扫描。\n\
  \n```\nSELECT /*+ index_asc(t (t.id)) */ *\nFROM t\nWHERE id BETWEEN 6 AND 19\n\
  ORDER BY id DESC\n```\n\n```\n-------------------------------------------------------------\n\
  | Id | Operation                  | Name  | Starts | A-Rows |\n-------------------------------------------------------------\n\
  |  1 | SORT ORDER BY              |       |      1 |     14 |\n|  2 |   TABLE ACCESS\
  \ BY INDEX ROWID| T    |      1 |     14 |\n|* 3 |    INDEX RANGE SCAN        |\
  \ T_PK  |      1 |     14 |\n-------------------------------------------------------------\n\
  ```\n\n```\n    3 - access(\"ID\">=6 AND \"ID\"<=19)\n```\n\n同样的查询自然可以利用降序索引扫描来避免显式排序。这是一个例子，其中\
  \ `SORT ORDER BY` 操作不再出现在执行计划中：\n\n```\nSELECT /*+ index_desc(t (t.id)) */ *\nFROM\
  \ t\nWHERE id BETWEEN 6 AND 19\nORDER BY id DESC\n```\n\n```\n---------------------------------------------------------------------\n\
  | Id | Operation                           | Name | Starts | A-Rows |\n---------------------------------------------------------------------\n\
  |  1 | TABLE ACCESS BY INDEX ROWID         | T    | 1      |     14 |\n|* 2 |  \
  \ INDEX RANGE SCAN DESCENDING       | T_PK | 1      |     14 |\n---------------------------------------------------------------------\n\
  ```\n\n```\n  2 - access(\"ID\">=6 AND \"ID\"<=19)\n```\n\n## 范围条件与位图索引\n\n对于位图索引，范围条件的处理方式与相等条件相同。唯一的区别是使用\
  \ `BITMAP INDEX RANGE SCAN` 操作代替 `BITMAP INDEX SINGLE VALUE` 操作。\n\n```\nSELECT\
  \ /*+ index(t (t.n4)) */ * FROM t WHERE n4 BETWEEN 6 AND 19\n```\n\n```\n-------------------------------------------------------------\n\
  | Id | Operation                   | Name | Starts | A-Rows |\n-------------------------------------------------------------\n\
  |  1 | TABLE ACCESS BY INDEX ROWID | T    |      1 | 6840   |\n|  2 |   BITMAP CONVERSION\
  \ TO ROWIDS|      |      1 | 6840   |\n|* 3 |    BITMAP INDEX RANGE SCAN  | I_N4\
  \ |      1 |   13   |\n-------------------------------------------------------------\n\
  ```\n\n```\n  3 - access(\"N4\">=6 AND \"N4\"<=19)\n```\n\n对于位图索引，由于没有升序和降序扫描的概念，因此无法避免从而优化\
  \ `ORDER BY` 操作。\n\n## IN 条件\n\n`IN` 条件没有特定的访问路径。相反，在执行计划中，`INLIST ITERATOR` 操作指出部分执行计划由于\
  \ `IN` 条件而执行多次。以下三个查询显示了索引扫描本身使用的操作如何取决于索引类型。第一个是唯一索引，第二个是非唯一索引，第三个是位图索引。基本上，`IN`\
  \ 条件就是一系列相等条件。请注意，与索引和表访问相关的操作对于 `IN` 列表中的每个值都会执行一次（参见 `Starts` 列）。\n\n```\nSELECT\
  \ /*+ index(t t_pk) */ * FROM t WHERE id IN (6, 8, 19, 28)\n```\n\n```\n--------------------------------------------------------------------\n\
  | Id | Operation                          | Name | Starts | A-Rows |\n--------------------------------------------------------------------\n\
  | 1  | INLIST ITERATOR                    |      |      1 |      4 |\n| 2  |   TABLE\
  \ ACCESS BY INDEX ROWID      | T    |      4 |      4 |\n|* 3 |    INDEX UNIQUE\
  \ SCAN               | T_PK |      4 |      4 |\n--------------------------------------------------------------------\n\
  ```\n\n```\n  3 - access(\"ID\"=6 OR \"ID\"=8 OR \"ID\"=19 OR \"ID\"=28)\n```\n\n\
  ```\nSELECT /*+ index(t i_n1) */ * FROM t WHERE n1 IN (6, 8, 19, 28)\n```\n\n```\n\
  --------------------------------------------------------------------\n| Id | Operation\
  \                          | Name | Starts | A-Rows |\n--------------------------------------------------------------------\n\
  |  1 | INLIST ITERATOR                    |      |      1 |   1579 |\n|  2 |   TABLE\
  \ ACCESS BY INDEX ROWID      | T    |      4 |   1579 |\n|* 3 |    INDEX RANGE SCAN\
  \                | I_N1 |      4 |   1579 |\n--------------------------------------------------------------------\n\
  ```\n\n```\n  3 - access(\"N1\"=6 OR \"N1\"=8 OR \"N1\"=19 OR \"N1\"=28)\n```\n\n\
  ```\nSELECT /*+ index(t i_n4) */ * FROM t WHERE n4 IN (6, 8, 19, 28)\n```\n\n\n\
  ## LIKE 条件\n\n`-------------------------------------------------------------------`\n\
  `| Id | Operation                           | Name | Starts | A-Rows|`\n`-------------------------------------------------------------------`\n\
  `|  1 |` `INLIST ITERATOR`                   |      |      1|   1579 |`\n`|  2 |\
  \ TABLE ACCESS BY INDEX ROWID        | T    |      `**`4**` |   1579|`\n`|  3 |\
  \ BITMAP CONVERSION TO ROWIDS        |      |      `**`4**` |   1579|`\n`|* 4 |\
  \ BITMAP INDEX SINGLE VALUE          | I_N4 |      `**`4**` |      3|`\n`-------------------------------------------------------------------`\n\
  \n`  4 - access((\"N4\"=6 OR \"N4\"=8 OR \"N4\"=19 OR \"N4\"=28))`\n\n只要匹配模式不以通配符（下划线`_`和百分号`%`字符）开头，`LIKE`\
  \ 条件就会以与范围条件相同的方式执行。否则，就无法避免全表扫描或全索引扫描。以下示例展示了这种行为。前两个查询分别针对列 `c1` 和 `c2`，检索所有以字母\
  \ *A* 开头的行。因此，可以进行范围扫描。第三和第四个查询分别针对列 `c1` 和 `c2`，检索所有在任何位置包含字母 *A* 的行。因此，会执行全索引扫描。\n\
  \n`SELECT /* index(t i_c1) */ * FROM t WHERE` `c1` `LIKE '`**`A%`**`'`\n\n`--------------------------------------------------------------------`\n\
  `| Id | Operation                                   | Name | A-Rows |`\n`--------------------------------------------------------------------`\n\
  `|  1 | TABLE ACCESS BY INDEX ROWID                 | T    |    119 |`\n`|* 2 |`\
  \ `INDEX RANGE SCAN`                          | I_C1 |    119 |`\n`--------------------------------------------------------------------`\n\
  \n`  2 - access(\"C1\" LIKE 'A%')`\n`      filter(\"C1\" LIKE 'A%')`\n\n`SELECT\
  \ /* index(t i_c2) */ * FROM t WHERE` `c2` `LIKE '`**`A%`**`'`\n\n`--------------------------------------------------------------------`\n\
  `| Id | Operation                           | Name | Starts | A-Rows |`\n`--------------------------------------------------------------------`\n\
  `|  1 | TABLE ACCESS BY INDEX ROWID        | T    |      1 |    108 |`\n`|  2 |\
  \  BITMAP CONVERSION TO ROWIDS       |      |      1 |    108 |`\n`|* 3 |` `BITMAP\
  \ INDEX RANGE SCAN`          | I_C2 |      1 |    108 |`\n`--------------------------------------------------------------------`\n\
  \n`  3 - access(\"C2\" LIKE 'A%')`\n`      filter((\"C2\" LIKE 'A%' AND \"C2\" LIKE\
  \ 'A%'))`\n\n`SELECT /* index(t i_c1) */ * FROM t WHERE` `c1` `LIKE '`**`%A%`**`'`\n\
  \n`--------------------------------------------------------------------`\n`| Id\
  \ | Operation                           | Name | Starts | A-Rows |`\n`--------------------------------------------------------------------`\n\
  `|  1 | TABLE ACCESS BY INDEX ROWID        | T    |      1 |   1921 |`\n`|* 2 |`\
  \ `INDEX FULL SCAN`                  | I_C1 |      1 |   1921 |`\n`--------------------------------------------------------------------`\n\
  \n`  2 - filter(\"C1\" LIKE '%A%')`\n\n`SELECT /* index(t i_c2) */ * FROM t WHERE`\
  \ `c2` `LIKE '`**`%A%`**`'`\n\n`--------------------------------------------------------------------`\n\
  `| Id | Operation                           | Name | Starts | A-Rows |`\n`--------------------------------------------------------------------`\n\
  `|  1 | TABLE ACCESS BY INDEX ROWID        | T    |      1 |   1846 |`\n`|  2 |\
  \  BITMAP CONVERSION TO ROWIDS       |      |      1 |   1846 |`\n`|* 3 |` `BITMAP\
  \ INDEX FULL SCAN`           | I_C2 |      1 |   1846 |`\n`--------------------------------------------------------------------`\n\
  \n`  3 - filter(\"C2\" LIKE '%A%')`\n\n## Min/Max 函数与 B-tree 索引\n\n为了高效执行包含 `min`\
  \ 和 `max` 函数的查询，B-tree 索引提供了两种特定的操作。第一种是 `INDEX FULL SCAN (MIN/MAX)`，当查询未指定范围条件时使用。然而，尽管名称如此，它并不执行完整的索引扫描。它只是获取最右侧或最左侧的索引键。\n\
  \n`SELECT /*+ index(t t_pk) */` `min` `(id) FROM t`\n\n`--------------------------------------------------------------------`\n\
  `| Id | Operation                           | Name | Starts | A-Rows |`\n`--------------------------------------------------------------------`\n\
  `|  1 | SORT AGGREGATE                     |      |      1 |      1 |`\n`|  2 |`\
  \ `INDEX FULL SCAN (MIN/MAX)`        | T_PK |      1 |      1 |`\n`--------------------------------------------------------------------`\n\
  \n第二种是 `INDEX RANGE SCAN (MIN/MAX)`，当查询在函数使用的同一列上指定了条件时使用：\n\n`SELECT /*+ index(t\
  \ t_pk) */` `min` `(id) FROM t WHERE id > 42`\n\n`--------------------------------------------------------------------`\n\
  `| Id | Operation                           | Name | Starts | A-Rows |`\n`--------------------------------------------------------------------`\n\
  `|  1 | SORT AGGREGATE                     |      |      1 |      1 |`\n`|  2 |\
  \  FIRST ROW                         |      |      1 |      1 |`\n`|* 3 |` `INDEX\
  \ RANGE SCAN (MIN/MAX)`       | T_PK |      1 |      1 |`\n`--------------------------------------------------------------------`\n\
  \n`  3 - access(\"ID\">42)`\n\n不幸的是，当两个函数（`min` 和 `max`）在同一查询中使用时，无法应用此优化技术。在这种情况下，会执行全索引扫描。以下查询是一个示例：\n\
  \n`SELECT /*+ index(t t_pk) */ min(id), max(id) FROM t`\n\n`--------------------------------------------------------------------`\n\
  `| Id | Operation                           | Name | Starts | A-Rows|`\n`--------------------------------------------------------------------`\n\
  `|  1 | SORT AGGREGATE                     |      |      1 |      1|`\n`|  2 | \
  \ INDEX FULL SCAN                   | T_PK |      1 |  10000|`\n`--------------------------------------------------------------------`\n\
  \n### Min/Max 函数与位图索引\n\n对于位图索引，没有可用于执行 `min` 和 `max` 函数的特定操作。用于等值条件和范围条件的操作同样适用。\n\
  \n## 基于函数的索引\n\n为了利用索引，需要遵循的基本规则之一是：切勿在 `WHERE` 子句中修改索引列返回的值。否则，查询优化器将无法使用在引用列上创建的索引。例如，如果在列\
  \ `c1` 上存在索引，那么类似 `upper(c1)='SELDON'` 这样的限制条件无法通过 `c1` 列上的索引高效应用。这一点显而易见，因为你只能搜索存储在索引中的值，而不是其他内容。以下示例（与本节其他示例一样）基于脚本\
  \ `fbi.sql`：\n\n```\nSQL> CREATE INDEX i_c1 ON t (c1);\n```\n\n```\nSQL> SELECT\
  \ * FROM t WHERE upper(c1) = 'SELDON';\n```\n\n```\n-----------------------------------------\n\
  | Id | Operation               | Name  |\n-----------------------------------------\n\
  |* 1 |` `TABLE ACCESS FULL`    | T     |\n-----------------------------------------\n\
  ```\n\n```\n  1 - filter(UPPER(\"C1\")='SELDON')\n```\n\n换句话说，每次将索引列作为参数传递给函数或参与表达式时，都无法对该列上创建的索引进行索引范围扫描。唯一的例外是当约束条件确保索引包含必要信息时。在这个特定案例中，列\
  \ `c1` 上的两个约束为查询优化器提供了该信息：\n\n```\nSQL> ALTER TABLE t ADD CONSTRAINT t_c1_upper\
  \ CHECK (c1 = upper(c1));\n```\n\n```\nSQL> ALTER TABLE t MODIFY (c1 NOT NULL);\n\
  ```\n\n\n`SQL> SELECT * FROM t WHERE upper(c1) = 'SELDON';`\n\n```\n--------------------------------------------\n\
  | Id | Operation                    | Name |\n--------------------------------------------\n\
  |  0 | SELECT STATEMENT             |      |\n|  1 |  TABLE ACCESS BY INDEX ROWID\
  \ | T    |\n|* 2 |   INDEX RANGE SCAN           | I_C1 |\n--------------------------------------------\n\
  ```\n\n`2 - access(\"C1\"='SELDON')`\n`    filter(UPPER(\"C1\")='SELDON')`\n\n显然，当一个限制条件具有很高的选择性时，你会希望利用索引。为此，如果无法修改\
  \ `WHERE` 子句或指定约束，你可以创建一个 `基于函数的索引`。简而言之，这是在函数返回值或表达式结果上创建的索引。\n\n`SQL> CREATE INDEX\
  \ i_c1_upper ON t (upper(c1));`\n\n`SQL> SELECT * FROM t WHERE upper(c1) = 'SELDON';`\n\
  \n```\n-------------------------------------------------------\n| Id | Operation\
  \                           | Name       |\n-------------------------------------------------------\n\
  |  1 | TABLE ACCESS BY INDEX ROWID         | T          |\n|* 2 |  INDEX RANGE SCAN\
  \                   | I_C1_UPPER |\n-------------------------------------------------------\n\
  ```\n\n`2 - access(UPPER(\"C1\")='SELDON')`\n\n***\n\n`注意` 在 Oracle9*i* Release\
  \ 2 补丁集 9.2.0.3 之前，用户需要拥有 `query rewrite` 系统权限才能创建基于函数的索引。此外，查询优化器只有在初始化参数 `query_rewrite_enabled`\
  \ 设置为 `TRUE` 并且初始化参数 `query_rewrite_integrity` 设置为 `trusted` 或 `stale_tolerated`\
  \ 时，才会考虑使用此类索引。根据 MetaLink 说明 \"Bug 2799028\" (2799028.8) 中的描述，自补丁集 9.2.0.4 起，这些要求不再必要。\n\
  \n***\n\n从 Oracle Database 11*g* 开始，为了避免在索引以及可能很多条 SQL 语句中重复函数或表达式，可以基于该函数或表达式创建一个虚拟列。这样，索引可以直接在虚拟列上创建，并且代码可以透明地处理其定义。以下示例展示了如何添加、索引并使用一个对\
  \ `c1` 列应用 `upper` 函数的虚拟列：\n\n`SQL> ALTER TABLE t ADD (c1_upper AS (upper(c1)));`\n\
  \n`SQL> CREATE INDEX i_c1_upper ON t (c1_upper);`\n\n`SQL> SELECT * FROM t WHERE\
  \ c1_upper = 'SELDON';`\n\n```\n------------------------------------------------------------\n\
  | Id | Operation                                  | Name       |\n------------------------------------------------------------\n\
  |  1 | TABLE ACCESS BY INDEX ROWID                | T          |\n|* 2 |  INDEX\
  \ RANGE SCAN                          | I_C1_UPPER |\n------------------------------------------------------------\n\
  ```\n\n`2 - access(\"C1_UPPER\"='SELDON')`\n\n正如你在第 4 章中所见，使用虚拟列的另一个优点是，`dbms_stats`\
  \ 包会为它们收集对象统计信息。有了这些信息，查询优化器就能够正确估算基于虚拟列的限制条件的基数。\n\n尽管本章中的示例都是基于 B-tree 索引的，但基于函数的位图索引同样受到支持。\n\
  \n### 语言排序索引\n\n默认情况下，数据库引擎执行 `二进制比较` 来比较字符串。在这种方式下，字符是根据其二进制值进行比较的。因此，只有当每个对应字符的数字代码完全相同时，两个字符串才被认为是相等的。\n\
  \n自 Oracle Database 10*g* Release 2 起，数据库引擎还能够执行 `语言比较`。使用这些比较时，字符的数字代码不必完全相同也能匹配。例如，你可以指示数据库引擎将小写和大写字符视为相等，或者将带重音符号和不带重音符号的字符视为相等。\n\
  \n***\n\n\n\n**注意** 在先前版本中也部分提供了语言比较功能。然而，并非所有的运算符和函数都支持它们。因此，为避免产生不一致或误导性的结果，我建议仅在\
  \ Oracle Database 10g Release 2 或更高版本中使用它们。本节将不讨论 Oracle Database 10g Release 1\
  \ 及之前版本中可用的功能。\n\n***\n\n要管理 SQL 运算符的这种行为，可以使用初始化参数 `nls_comp`。它可以设置为以下值之一：\n\n\
  `binary`：使用二进制比较。这是默认值。\n\n`linguistic`：使用语言比较。初始化参数 `nls_sort` 指定了应用于比较的语言排序序列（从而也是规则）。可接受的值是\
  \ `binary`（这对语言比较没有用）以及初始化参数 `nls_language` 接受的大多数值。\n\n`ansi`：此值仅用于向后兼容。应使用 `linguistic`\
  \ 代替。\n\n动态初始化参数 `nls_comp` 和 `nls_sort` 可以在实例和会话级别设置。在会话级别，可以使用 SQL 语句 `ALTER SESSION`\
  \ 进行设置，也可以在操作系统级别的客户端定义（例如，在 Microsoft Windows 中通过注册表项）。\n\n例如，考虑一个存储以下数据的表（表和测试查询可在脚本\
  \ `linguistic_index.sql` 中找到）：\n\n```sql\nSQL> SELECT c1 FROM t;\n\nC1\n--------------------\n\
  Leon\nLéon\nLEON\nLÉON\n```\n\n默认情况下，执行二进制比较。要使用语言比较，必须将初始化参数 `nls_comp` 设置为 `linguistic`，并且用于比较的语言排序序列（从而也是规则）必须通过初始化参数\
  \ `nls_sort` 指定。以下示例使用 `generic_m`，这是一个基于拉丁字符的 ISO 标准：\n\n```sql\nSQL> ALTER SESSION\
  \ SET nls_comp = linguistic;\n\nSQL> ALTER SESSION SET nls_sort = generic_m;\n\n\
  SQL> SELECT c1 FROM t WHERE c = 'LEON';\n\nC1\n--------------------\nLEON\n```\n\
  \n正如预期的那样，之前的设置没有发生任何特别情况。有用的功能由 `generic_m` 的两个扩展提供。第一个是 `generic_m_ci`。如下面的查询所示，使用它时，比较是*大小写不敏感*的：\n\
  \n```sql\nSQL> ALTER SESSION SET nls_sort = generic_m_ci;\n\nSQL> SELECT c1 FROM\
  \ t WHERE c = 'LEON';\n\nC1\n--------------------\nLeon\nLEON\n```\n\n第二个是 `generic_m_ai`。如下面的查询所示，使用它时，比较是*大小写和音标不敏感*的：\n\
  \n```sql\nSQL> ALTER SESSION SET nls_sort = generic_m_ai;\n\nSQL> SELECT c1 FROM\
  \ t WHERE c = 'LEON';\n\nC1\n--------------------\nLeon\nLéon\nLEON\nLÉON\n```\n\
  \n从功能角度来看，这是极好的。通过设置两个初始化参数，您就能够控制 SQL 运算符的行为。不过，让我们看看在下面的示例中，当初始化参数 `nls_comp`\
  \ 设置为 `linguistic` 时会发生什么：\n\n```sql\nSQL> CREATE INDEX i_c1 ON t (c1);\n\nSQL>\
  \ ALTER SESSION SET nls_sort = generic_m_ai;\n\nSQL> ALTER SESSION SET nls_comp\
  \ = binary;\nSQL> SELECT /*+ index(t) */ * FROM t WHERE c1 = 'LEON';\n\n--------------------------------------------\n\
  | Id | Operation                    | Name |\n--------------------------------------------\n\
  |  1 | TABLE ACCESS BY INDEX ROWID  | T    |\n|* 2 |   INDEX RANGE SCAN        \
  \   | I_C1 |\n--------------------------------------------\n\n  2 - access(\"C1\"\
  ='LEON')\n\nSQL> ALTER SESSION SET nls_comp = linguistic;\n\nSQL> SELECT /*+ index(t)\
  \ */ * FROM t WHERE c1 = 'LEON';\n\n-----------------------------------------\n\
  | Id | Operation                 | Name |\n-----------------------------------------\n\
  |* 1 | TABLE ACCESS FULL         | T    |\n-----------------------------------------\n\
  \n  1 - filter(NLSSORT(\"C1\",'nls_sort=''GENERIC_M_AI''')=HEXTORAW('022601FE02380232'))\n\
  ```\n\n显然，当初始化参数 `nls_comp` 设置为 `linguistic` 时，索引不再被使用。原因由输出的最后一行指出。由于函数 `nlssort`\
  \ 被隐式地应用于索引列 `c1`，因此无法在索引中进行查找。因此，为此目的，需要创建一个基于函数的索引来避免全表扫描。必须认识到，索引的定义必须包含与初始化参数\
  \ `nls_sort` 相同的值。因此，如果使用多种语言，则应该创建多个索引。\n\n```sql\nSQL> CREATE INDEX i_c1_linguistic\
  \ ON t (nlssort(c1,'nls_sort=generic_m_ai'));\n\nSQL> ALTER SESSION SET nls_sort\
  \ = generic_m_ai;\n\nSQL> ALTER SESSION SET nls_comp = linguistic;\n\nSQL> SELECT\
  \ /*+ index(t) */ * FROM t WHERE c1 = 'LEON';\n\n------------------------------------------------------------------\n\
  | Id | Operation                               | Name            |\n------------------------------------------------------------------\n\
  |  1 | TABLE ACCESS BY INDEX ROWID             | T               |\n|* 2 |   INDEX\
  \ RANGE SCAN                      | I_C1_LINGUISTIC |\n------------------------------------------------------------------\n\
  \n  2 - access(NLSSORT(\"C1\",'nls_sort=''GENERIC_M_AI''')=HEXTORAW('022601FE02380232'))\n\
  ```\n\n直到 Oracle Database 10g Release 2，另一个限制是，为了应用 `LIKE` 运算符，数据库引擎无法利用语言索引。换句话说，无法避免全索引扫描或全表扫描。从\
  \ Oracle Database 11g 开始，此限制不再存在。\n\n尽管本节中的示例基于 B-tree 索引，但也支持语言位图索引。\n\n总之，语言比较是一个强大的功能，对于\
  \ SQL 语句是透明的。然而，只有当一组适配的索引可用时，数据库引擎才能高效地应用它们。由于客户端级别的设置可能影响索引的使用，因此仔细规划其使用至关重要。\n\
  \n## 复合索引\n\n到目前为止，除一个例外，我只讨论了索引键由单个列组成的索引。然而，索引可以包含多个列（B-tree 索引的限制是 32 列，位图索引是\
  \ 30 列）。具有多列的索引称为*复合索引*（有时也使用术语*连接索引*或*多列索引*）。在这方面，B-tree 索引和位图索引具有完全不同的行为。因此，将分别进行讨论。\n\
  \n### B-tree 索引\n\n复合索引的目的有两个。首先，它们可用于实施由多个列组成的主键或唯一键约束。其次，它们可用于实施由多个 SQL 条件组合 `AND`\
  \ 构成的限制。请注意，当多个 SQL 条件组合 `OR` 时，复合索引无法高效使用！\n\n自然，讨论如何使用复合索引来实施限制是很重要的。以下查询用于此目的：\n\
  \n`SELECT * FROM t WHERE n1 = 6 AND n2 = 42 AND n3 = 11`\n\n让我们首先看看使用单列索引时会发生什么。\n\
  \n使用在列 `n1` 上构建的索引，从索引扫描中返回 527 个 rowid。由于索引仅存储与列 `n1` 相关的数据，只有谓词 `n1=6` 可以通过操作\
  \ 2 高效地通过索引应用。另外两个谓词由操作 1 作为过滤器应用。由于操作 2 返回了大量 rowid，执行总共产生了 327 次逻辑读取。在检索单行时，这是不可接受的。\n\
  \n\n\n`-----------------------------------------------------------------------------`\n\
  `| Id | 操作                          | 名称    | 开始次数 | 返回行数 | 缓冲区 |`\n`-----------------------------------------------------------------------------`\n\
  `|* 1 | 通过索引 ROWID 访问表           | T       |        1 |        1 |    327 |`\n`|*\
  \ 2 |  索引范围扫描                 | `I_N1`    |        1 |      527 |      4 |`\n`-----------------------------------------------------------------------------`\n\
  \n```\n  1 - filter((\"N3\"=11 AND \"N2\"=42))\n  2 - access(`\"N1\"=6`)\n```\n\n\
  在列 `n2` 上建立索引后，情况与前一个示例基本相同。唯一的改进是索引扫描返回的 rowid 更少（89 个）。因此，总的逻辑读（85 次）也大幅减少。\n\n\
  `---------------------------------------------------------------------`\n`| Id |\
  \ 操作                      | 名称 | 开始次数 | 返回行数 | 缓冲区 |`\n`---------------------------------------------------------------------`\n\
  `|* 1 | 通过索引 ROWID 访问表       | T    |        1 |        1 |     85 |`\n`|* 2 | 索引范围扫描\
  \              |`I_N2`  |        1 |       89 |      4 |`\n`---------------------------------------------------------------------`\n\
  \n```\n  1 - filter((\"N3\"=11 AND \"N1\"=6))\n  2 - access(`\"N2\"=42`)\n```\n\n\
  在列 `n3` 上建立索引后，情况仍然与前几个类似。实际上，索引扫描返回了大量的 rowid（164 个）。总的逻辑读数（141 次）仍然过高。\n\n`---------------------------------------------------------------------`\n\
  `| Id | 操作                      | 名称 | 开始次数 | 返回行数 | 缓冲区 |`\n`---------------------------------------------------------------------`\n\
  `|* 1 | 通过索引 ROWID 访问表       | T    |        1 |        1 |    141 |`\n`|* 2 | \
  \ 索引范围扫描             |  `I_N3` |        1 |      164 |      4 |`\n`---------------------------------------------------------------------`\n\
  \n```\n  1 - filter((\"N2\"=42 AND \"N1\"=6))\n  2 - access(`\"N3\"=11`)\n```\n\n\
  总之，这三个索引都无法高效地应用谓词。这三个限制条件单独来看，其选择率都太高了。这一观察结果与数据字典中存储的对象统计信息一致。实际上，每个列的不同值的数量都很低，如下列查询所示：\n\
  \n```sql\nSQL> SELECT column_name, num_distinct\n  2 FROM user_tab_columns\n  3\
  \ WHERE table_name = 'T' AND column_name IN ('ID', 'N1', 'N2', 'N3');\n\nCOLUMN_NAME\
  \ NUM_DISTINCT\n------------ ------------\nID                 10000\nN1        \
  \            18\nN2                   112\nN3                    60\n```\n\n在这种情况下，使用一个建立在多个列上的索引来应用各种条件会更有效。例如，下面的执行计划显示了如果在这三列上创建一个复合索引会发生什么。关键要理解的是，使用此索引时，逻辑读数较低，因为索引扫描只返回满足整个\
  \ `WHERE` 子句的行。\n\n`---------------------------------------------------------------------`\n\
  `| Id | 操作                      | 名称 | 开始次数 | 返回行数 | 缓冲区 |`\n`---------------------------------------------------------------------`\n\
  `|  1 | 通过索引 ROWID 访问表       | T    |        1 |        1 |      4 |`\n`|* 2 | 索引范围扫描\
  \              |`I_N123`|        1 |        1 |      3 |`\n`---------------------------------------------------------------------`\n\
  \n```\n  2 - access(`\"N1\"=6 AND \"N2\"=42 AND \"N3\"=11`)\n```\n\n此时，必须认识到数据库引擎能够在并非所有建立索引的列都在\
  \ `WHERE` 子句中被引用时使用索引。基本要求是应对索引键的引导列应用条件。例如，在前一个示例中使用的索引 `i_n123`，对列 `n2` 或 `n3`\
  \ 的条件是可选的。以下查询显示了一个没有 `n2` 列条件的例子：\n\n```sql\nSELECT * FROM t WHERE n1 = 6 AND n3\
  \ = 11\n```\n\n`------------------------------------------------------------------------`\n\
  `| Id | 操作                      | 名称   | 开始次数 | 返回行数 | 缓冲区 |`\n`------------------------------------------------------------------------`\n\
  `|  1 | 通过索引 ROWID 访问表       | T      |        1 |        1 |      8 |`\n`|* 2 |\
  \  索引范围扫描             | I_N123 |        1 |        1 |      7 |`\n`------------------------------------------------------------------------`\n\
  \n```\n  2 - access(\"N1\"=6 AND \"N3\"=11)\n      filter(\"N3\"=11)\n```\n\n在某些情况下，即使在索引键的引导列上没有条件，也可以（高效地）使用索引。这种操作称为*索引跳跃扫描*。但是，只有当引导列的不同值数量非常少时，使用它才有意义，因为会对引导列的每个值执行一次独立的索引范围扫描。以下查询显示了这样一个例子。注意提示\
  \ `index_ss` 和操作 `INDEX SKIP SCAN`。\n\n```sql\nSELECT /*+ `index_ss`(t i_n123) */\
  \ * FROM t WHERE n2 = 42 AND n3 = 11\n```\n\n`------------------------------------------------------------------------`\n\
  `| Id | 操作                      | 名称   | 开始次数 | 返回行数 | 缓冲区 |`\n`------------------------------------------------------------------------`\n\
  `|  1 | 通过索引 ROWID 访问表       | T      |        1 |        2 |     33 |`\n`|* 2 |\
  \  `INDEX SKIP_SCAN`        | I_N123 |        1 |        2 |     31 |`\n`------------------------------------------------------------------------`\n\
  \n```\n  2 - access(\"N2\"=42 AND \"N3\"=11)\n      filter((\"N2\"=42 AND \"N3\"\
  =11))\n```\n\n由于支持对“常规”索引扫描（使用操作 `INDEX SKIP SCAN DESCENDING`）进行降序索引跳跃扫描，因此可以使用\
  \ `index_ss_asc` 和 `index_ss_desc` 两个提示来控制扫描顺序。\n\n谈到复合索引，我认为有必要提一下我在处理它们时遇到的最常见错误以及最常被问到的问题。这个错误与过度索引有关。一种误解是认为只有当索引键的所有列都在\
  \ `WHERE` 子句中使用时，数据库引擎才能利用索引。正如你刚刚在几个例子中看到的，事实并非如此。这种误解通常导致在同一张表上创建多个具有相同引导列的索引——例如，一个索引包含列\
  \ `n1, n2` 和 `n3`，另一个包含列 `n1` 和 `n3`。第二个索引通常是多余的。请注意，多余的索引是一个问题，因为它们不仅会降低修改索引数据的\
  \ SQL 语句的速度，还会不必要地浪费空间。\n\n\n\n## 如何选择索引列的顺序以及索引压缩技术\n\n最常见的问题是，如何选择列的顺序？例如，如果一个索引键由`n1`、`n2`和`n3`列组成，最佳顺序是什么？当所有被索引的列都出现在`WHERE`子句中时，索引的效率与列的顺序无关。因此，最佳顺序是能最大程度地增加在`WHERE`子句不完全包含所有索引列时使用该索引的机会。换句话说，应该让索引尽可能多的\
  \ SQL 语句能够使用。为确保这一点，最常（理想情况下）在`WHERE`子句中指定的列应该作为首列。当多个列的使用频率相同时，有两种相反的方法可以遵循：\n\n\
  *   首列应该是具有最多不同值的列。如果未来 SQL 语句的限制条件仅应用于该特定列，这将是有用的。换句话说，这最大化了查询优化器选择该索引的机会。\n* \
  \  首列应该是具有最少不同值的列。这可能有助于实现更好的索引压缩比。\n\n## 索引压缩\n\nB 树索引和位图索引的一个重要区别在于存储索引叶块中键时使用的压缩方式。位图索引总是被压缩的，而\
  \ B 树索引仅在被请求时才压缩。\n\n在未压缩的 B 树索引中，每个键都被完整存储。换句话说，如果多个键具有相同的值，则该值会为每个键重复存储。因此，在非唯一索引中，同一个值在同一个叶块中存储多次是很常见的。为消除这些重复出现，可以压缩索引键。可以通过使用`COMPRESS`参数（以及可选的，需要压缩的列数）来（重新）构建索引来实现这一点。例如，索引`i_n123`由三列组成：`n1`、`n2`和`n3`。使用`COMPRESS\
  \ 1`，指定仅压缩列`n1`；使用`COMPRESS 2`，指定压缩列`n1`和`n2`；使用`COMPRESS 3`，指定压缩所有三列。当未指定要压缩的列数时，对于非唯一索引，所有列都会被压缩；对于唯一索引，则压缩列数减一。\n\
  \n由于列是从左到右压缩的，因此列应按选择性递减排序以获得最佳压缩效果。但是，只有当重新排序索引列不会阻止查询优化器使用该索引时，才应重新排序。\n\n默认情况下，B\
  \ 树索引压缩并未激活，因为它并不总是能减小索引的大小。实际上，在某些情况下，索引在压缩后可能会变得更大！因此，仅当存在真正优势时才应启用压缩。有两种方法可以检查给定索引的预期压缩率。首先，可以先构建一次未压缩的索引，然后再构建一次压缩的索引，然后比较大小。其次，可以让\
  \ SQL 语句`ANALYZE INDEX`执行分析，以找出最优的压缩列数以及使用最优压缩可以节省多少空间。以下示例显示了对索引`i_n123`进行的此类分析。请注意，分析的输出被写入表`index_stats`中。在此情况下，你会得知通过压缩两列可以节省索引当前所占空间的\
  \ 17%。\n\n```sql\nSQL> ANALYZE INDEX i_n123 VALIDATE STRUCTURE;\nSQL> SELECT opt_cmpr_count,\
  \ opt_cmpr_pctsave FROM index_stats;\nOPT_CMPR_COUNT OPT_CMPR_PCTSAVE\n--------------\
  \ ----------------\n             2               17\n```\n\n以下 SQL 语句不仅展示了如何实现索引`i_n123`的压缩，还展示了如何检查压缩的结果：\n\
  \n```sql\nSQL> SELECT blocks FROM index_stats;\n    BLOCKS\n----------\n       \
  \ 40\nSQL> ALTER INDEX i_n123 REBUILD COMPRESS 2;\nSQL> ANALYZE INDEX i_n123 VALIDATE\
  \ STRUCTURE;\nSQL> SELECT blocks FROM index_stats;\n    BLOCKS\n----------\n   \
  \     32\n```\n\n从性能角度来看，压缩索引的关键优势在于，由于其尺寸更小，执行索引范围扫描和索引全扫描时需要的逻辑读取更少。然而，缺点是遭受块争用的可能性增加（此主题在第\
  \ 12 章中介绍）。\n\n## 位图索引\n\n很少创建复合位图索引。这是因为可以高效地组合多个索引来应用限制条件。为了了解位图索引的强大之处，让我们看几个查询。\n\
  \n第一个查询利用了三个位图索引，这些索引与`AND`组合以应用三个等式条件。请注意，提示`index_combine`强制执行此类计划。首先，操作 4 通过查找满足该列限制条件的行来扫描基于`n5`列的索引。结果位图被传递给操作\
  \ 3。然后，操作 5 和 6 分别对在`n6`和`n4`列上创建的索引执行相同的扫描。一旦完成三个索引扫描，操作 3 计算三个位图集合的`AND`。最后，操作\
  \ 2 将结果位图转换为 rowid 列表，然后操作 1 使用它们来访问表。\n\n```sql\nSELECT /*+ index_combine(t i_n4\
  \ i_n5 i_n6) */ *\nFROM t\nWHERE n4 = 6 AND n5 = 42 AND n6 = 11\n```\n```\n-------------------------------------------------------------------------\n\
  | Id | Operation                      | Name | Starts | A-Rows | Buffers |\n-------------------------------------------------------------------------\n\
  |  1 |  TABLE ACCESS BY INDEX ROWID   | T    |      1 |      1 |       7 |\n|  2\
  \ |   BITMAP CONVERSION TO ROWIDS  |      |      1 |      1 |       6 |\n|  3 |\
  \    BITMAP AND                  |      |      1 |      1 |       6 |\n|* 4 |  \
  \   BITMAP INDEX SINGLE VALUE  | I_N5 |      1 |      1 |       2 |\n|* 5 |    \
  \ BITMAP INDEX SINGLE VALUE  | I_N6 |      1 |      1 |       2 |\n|* 6 |     BITMAP\
  \ INDEX SINGLE VALUE  | I_N4 |      1 |      1 |       2 |\n-------------------------------------------------------------------------\n\
  \  4 - access(\"N5\"=42)\n  5 - access(\"N6\"=11)\n  6 - access(\"N4\"=6)\n```\n\
  \n第二个查询与第一个非常相似。唯一的区别是使用了`OR`而不是`AND`。请注意执行计划中只有操作 3 发生了变化。\n\n```sql\nSELECT /*+\
  \ index_combine(t i_n4 i_n5 i_n6) */ *\nFROM t\nWHERE n4 = 6 OR n5 = 42 OR n6 =\
  \ 11\n```\n```\n------------------------------------------------------------------------\n\
  | Id | Operation                     | Name | Starts | A-Rows | Buffers |\n------------------------------------------------------------------------\n\
  |  1 |  TABLE ACCESS BY INDEX ROWID  | T    |      1 |    767 |     396 |\n|  2\
  \ |   BITMAP CONVERSION TO ROWIDS |      |      1 |    767 |       7 |\n|  3 | \
  \   BITMAP OR                  |      |      1 |      1 |       7 |\n|* 4 |    \
  \ BITMAP INDEX SINGLE VALUE | I_N4 |      1 |      1 |       3 |\n|* 5 |     BITMAP\
  \ INDEX SINGLE VALUE | I_N6 |      1 |      1 |       2 |\n|* 6 |     BITMAP INDEX\
  \ SINGLE VALUE | I_N5 |      1 |      1 |       2 |\n------------------------------------------------------------------------\n\
  \  4 - access(\"N4\"=6)\n  5 - access(\"N6\"=11)\n  6 - access(\"N5\"=42)\n```\n\
  \n\n"
- "# 位图索引执行计划详解\n\n## 位图索引组合查询\n\n第三个查询与第一个类似。唯一的区别在于条件 `n4!=6` 代替了 `n4=6`。由于执行计划差异很大，我们来详细分析。\n\
  \n初始时，操作 6 扫描基于列 `n5` 的索引，查找满足条件 `n5=42` 的行。生成的位图传递给操作 5。接着，操作 7 对基于列 `n6` 的索引执行相同扫描，查找条件\
  \ `n6=11`。两次索引扫描完成后，操作 5 计算两组位图的 `AND` 操作，并将结果传递给操作 4。\n\n然后，操作 8 扫描基于列 `n4` 的索引，查找满足条件\
  \ `n4=6` 的行（这与 `WHERE` 子句中指定的条件相反）。生成的位图传递给操作 4，该操作将其从操作 5 传递的位图中减去。\n\n随后，操作 9\
  \ 和 3 执行相同的扫描以查找条件 `n4 IS NULL`。这是必要的，因为 `NULL` 值不满足条件 `n4!=6`。\n\n最后，操作 2 将结果位图转换为\
  \ rowid 列表，操作 1 使用这些 rowid 访问表。\n\n```sql\nSELECT /*+ index_combine(t i_n4 i_n5\
  \ i_n6) */ *\nFROM t\nWHERE n4 != 6 AND n5 = 42 AND n6 = 11\n```\n\n```\n-------------------------------------------------------------------------\n\
  | Id | Operation                     | Name | Starts | A-Rows | Buffers |\n-------------------------------------------------------------------------\n\
  |  1 |  TABLE ACCESS BY INDEX ROWID  | T    |      1 |      1 |       9 |\n|  2\
  \ |   BITMAP CONVERSION TO ROWIDS |      |      1 |      1 |       8 |\n|*  3 |\
  \    BITMAP MINUS              |      |      1 |      1 |       8 |\n|  4 |    BITMAP\
  \ MINUS              |      |      1 |      1 |       6 |\n|  5 |     BITMAP AND\
  \               |      |      1 |      1 |       4 |\n|*  6 |      BITMAP INDEX\
  \ SINGLE VALUE| I_N5 |      1 |      1 |       2 |\n|*  7 |      BITMAP INDEX SINGLE\
  \ VALUE| I_N6 |      1 |      1 |       2 |\n|*  8 |     BITMAP INDEX SINGLE VALUE\
  \ | I_N4 |      1 |      1 |       2 |\n|*  9 |     BITMAP INDEX SINGLE VALUE |\
  \ I_N4 |      1 |      1 |       2 |\n-------------------------------------------------------------------------\n\
  \n  6 - access(\"N5\"=42)\n  7 - access(\"N6\"=11)\n  8 - access(\"N4\"=6)\n  9\
  \ - access(\"N4\" IS NULL)\n```\n\n总之，位图索引可以高效组合，并能在组合过程中应用多个 SQL 条件。简言之，它们非常灵活。由于这些特性，它们在查询未知（非固定）的报告系统中至关重要。\n\
  \n## B 树索引的位图执行计划\n\n前一节描述的位图执行计划性能优异，同样适用于 B 树索引。其思想是数据库引擎能够基于 B 树索引扫描返回的数据构建一种内存中的位图索引。以下查询是一个示例，它与关于复合\
  \ B 树索引部分使用的查询相同。注意，执行计划中的 `BITMAP CONVERSION FROM ROWIDS` 操作负责转换。\n\n```sql\nSELECT\
  \ /*+ index_combine(t i_n1 i_n2 i_n3) */ *\nFROM t\nWHERE n1 = 6 AND n2 = 42 AND\
  \ n3 = 11\n```\n\n```\n-------------------------------------------------------------------------------------\n\
  | Id | Operation                                 | Name | Starts | A-Rows | Buffers\
  \ |\n-------------------------------------------------------------------------------------\n\
  |  1 |  TABLE ACCESS BY INDEX ROWID              | T    |      1 |      1 |    \
  \  10 |\n|  2 |   BITMAP CONVERSION TO ROWIDS             |      |      1 |    \
  \  1 |       9 |\n|  3 |    BITMAP AND                             |      |    \
  \  1 |      1 |       9 |\n|  4 |     BITMAP CONVERSION FROM ROWIDS         |  \
  \    |      1 |      1 |       3 |\n|*  5 |      INDEX RANGE SCAN              \
  \       | I_N2 |      1 |     89 |       3 |\n|  6 |     BITMAP CONVERSION FROM\
  \ ROWIDS         |      |      1 |      1 |       3 |\n|*  7 |      INDEX RANGE\
  \ SCAN                     | I_N3 |      1 |    164 |       3 |\n|  8 |     BITMAP\
  \ CONVERSION FROM ROWIDS         |      |      1 |      1 |       3 |\n|*  9 | \
  \     INDEX RANGE SCAN                     | I_N1 |      1 |    527 |       3 |\n\
  -------------------------------------------------------------------------------------\n\
  \n  5 - access(\"N2\"=42)\n  7 - access(\"N3\"=11)\n  9 - access(\"N1\"=6)\n```\n\
  \n***\n\n**注意**：查询优化器并不总能正确估计此转换的成本。与之相关的成本可能被低估。因此，即使转换不合适也可能被执行。如果这导致问题，您可以通过将未公开的初始化参数\
  \ `_b_tree_bitmap_plans` 设置为 `FALSE` 来禁用此功能。\n\n***\n\n## 索引全扫描\n\n与索引相关的一个有用优化技术是，数据库引擎可以从索引中提取\
  \ rowid 列表以访问表，并获取存储在索引中的列数据。因此，当索引包含处理查询所需的所有数据时，可以执行 *索引全扫描*。这有助于减少逻辑读的数量。事实上，索引全扫描不访问表。如果索引的聚簇因子很高，这可能特别有用。以下查询说明了这一点。注意，没有执行表访问。\n\
  \n```sql\nSELECT c1 FROM t WHERE c1 LIKE 'A%'\n```\n\n```\n-------------------------------------------------------------------\n\
  | Id | Operation               | Name | Starts | A-Rows | Buffers |\n-------------------------------------------------------------------\n\
  |*  1 |  INDEX RANGE SCAN       | I_C1 |      1 |    119 |       6 |\n-------------------------------------------------------------------\n\
  \n  1 - access(\"C1\" LIKE 'A%')\n      filter(\"C1\" LIKE 'A%')\n```\n\n如果 `SELECT`\
  \ 子句引用的是列 `n1` 而不是 `c1`，查询优化器则无法利用索引全扫描。请注意，在以下示例中，查询执行了 124 次逻辑读（5 次访问索引，119 次访问表；换句话说，每个从索引获取的\
  \ rowid 对应一次）来检索 119 行：\n\n```sql\nSELECT n1 FROM t WHERE c1 LIKE 'A%'\n```\n\n\
  ```\n-----------------------------------------------------------------------\n|\
  \ Id  | Operation                  | Name | Starts | A-Rows | Buffers |\n-----------------------------------------------------------------------\n\
  |   1 | TABLE ACCESS BY INDEX ROWID| T    |      1 |    119 |     124 |\n|*  2 |\
  \  INDEX RANGE SCAN          | I_C1 |      1 |    119 |       5 |\n-----------------------------------------------------------------------\n\
  \n  2 - access(\"C1\" LIKE 'A%')\n  filter(\"C1\" LIKE 'A%')\n```\n\n\n在这种情况下，为了利用**索引覆盖扫描**，你可能会向索引中添加列，即使这些列并未用于应用限制条件。其核心思想是创建一个复合索引，其索引键由\
  \ SQL 语句中引用的所有列组成，而不仅仅是`WHERE`子句中的列。换句话说，你是在“误用”索引来存储冗余数据，从而**最小化逻辑读取次数**。但请注意，索引的引导列必须是`WHERE`子句中引用的列之一。在本例中，这意味着创建了一个基于列`c1`和`n1`的复合索引。有了这个索引，完全相同的查询仅需**四次逻辑读取**即可检索到相同的行，而不是\
  \ 124 次。\n\n```\n-------------------------------------------------------------------------\n\
  | Id  | Operation                 | Name    | Starts | A-Rows | Buffers |\n-------------------------------------------------------------------------\n\
  |*  1 | INDEX RANGE SCAN          | I_C1_N1 |      1 |    119 |       4 |\n-------------------------------------------------------------------------\n\
  ```\n\n```\n  1 - access(\"C1\" LIKE 'A%')\n      filter(\"C1\" LIKE 'A%')\n```\n\
  \n尽管本节中的示例基于 B 树索引，但索引覆盖扫描同样适用于位图索引。\n\n## 索引组织表\n\n实现索引覆盖扫描的一种特殊方法是创建**索引组织表**。这类表的核心理念实际上是为了完全避免使用表段。相反，所有数据都存储在基于主键的索引段中。也可以将部分数据存储在溢出段中。然而，这样做会丧失使用索引组织表的优势（除非溢出段很少被访问）。当创建二级索引（即除主键外的另一个索引）时，也会发生同样的情况：需要访问两个段。因此，使用它没有好处。基于这些原因，你应该仅在满足两个条件时才考虑使用索引组织表。首先，表通常通过主键访问。其次，所有数据都可以存储在索引结构中（一行最多占用一个数据块的\
  \ 50%空间）。在所有其他情况下，使用它们意义不大。\n\n索引组织表中的一行不是通过物理 rowid 引用的，而是通过**逻辑 rowid**引用的。这种\
  \ rowid 由两部分组成：第一部分是一个“猜测”，指向该行（键）在插入时所在的数据块；第二部分是主键的值。通过逻辑 rowid 访问索引组织表时，首先遵循这个猜测，希望该行仍在插入时的数据块中。但是，由于当发生数据块拆分时这个猜测不会被更新，在执行\
  \ DML 语句后它可能会变得陈旧。如果猜测正确，使用逻辑 rowid 就可以**通过一次逻辑读取访问一行数据**（参见图 9-3）。如果猜测错误，逻辑读取的次数将等于或大于两次（一次是通过猜测进行的无效访问，另一次是使用主键的常规访问）。自然，为了获得最佳性能，**保持猜测正确至关重要**。为了评估此类猜测的正确性，视图`user_indexes`中提供了`pct_direct_access`列，该列由包`dbms_stats`更新。该值提供了特定索引的正确猜测百分比。以下示例（摘自脚本`iot_guess.sql`）不仅展示了陈旧猜测对逻辑读取次数的影响，还展示了如何纠正此类非最优情况（注意索引`i`是一个二级索引）：\n\
  \n```\nSQL> SELECT pct_direct_access\n  2 FROM user_indexes\n  3 WHERE index_name\
  \ = 'I';\n\nPCT_DIRECT_ACCESS\n-----------------\n               76\n\nSQL> SELECT\
  \ /*+ index(t i) */ count(pad) FROM t WHERE n > 0;\n\n------------------------------------------------------------------\n\
  | Id  | Operation                               | Name | Buffers |\n------------------------------------------------------------------\n\
  |   1 | SORT AGGREGATE                          |      |    1496 |\n|   2 |  INDEX\
  \ UNIQUE SCAN                      | T_PK |    1496 |\n|   3 |   INDEX RANGE SCAN\
  \                      | I    |       6 |\n------------------------------------------------------------------\n\
  \nSQL> ALTER INDEX i UPDATE BLOCK REFERENCES;\nSQL> execute dbms_stats.gather_index_stats(ownname=>user,\
  \ indname=>'i')\n\nSQL> SELECT pct_direct_access\n  2 FROM user_indexes\n  3 WHERE\
  \ index_name = 'I';\n\nPCT_DIRECT_ACCESS\n-----------------\n              100\n\
  \nSQL> SELECT /*+ index(t i) */ count(pad) FROM t WHERE n > 0;\n\n-----------------------------------------------------------------\n\
  | Id  | Operation                               | Name | Buffers |\n-----------------------------------------------------------------\n\
  |   1 | SORT AGGREGATE                          |      |    1006 |\n|   2 |  INDEX\
  \ UNIQUE SCAN                      | T_PK |    1006 |\n|   3 | INDEX RANGE SCAN\
  \                        | I    |       6 |\n-----------------------------------------------------------------\n\
  ```\n\n除了避免访问表段外，索引组织表还提供了两个不应低估的优势。第一，数据总是**聚簇存储**的，因此基于主键的范围扫描总能高效执行，而不像堆组织表那样仅在聚簇因子较低时才高效。第二个优势是，基于主键的范围扫描总是按照数据在主键索引中的存储顺序返回数据。这对于优化`ORDER\
  \ BY`操作可能很有用。\n\n## 全局、本地还是非分区索引？\n\n对于分区表，通常会创建**本地分区索引**。这样做的主要优点是减少了索引和表分区之间的依赖关系。例如，在添加、删除或交换新分区时，事情会变得容易得多。简而言之，创建本地索引通常是好的。然而，也存在一些不可能或不建议这样做的情况。\n\
  \n第一个问题与主键和唯一索引有关。事实上，要基于本地索引，其键必须包含分区键。虽然有时可能实现，但更多时候，如果不扭曲逻辑数据库设计，就没有这种可能性。当使用范围分区时尤其如此。因此，在我看来，这应仅作为最后的手段来考虑。你绝不应该搞乱逻辑设计。既然逻辑设计不能改变，就只剩下另外两种可能性了。第一种是创建**非分区索引**。第二种是创建**全局分区索引**。后者仅在确有实际优势时才应实施。不过，由于此类索引通常是哈希分区的（顺便说一句，这只从\
  \ Oracle 数据库 10*g*才开始可能），因此仅对非常大的索引或承受极高负载的索引这样做才有利。总之，为了支持主键和唯一键而创建非分区索引的情况**并不少见**。\n\
  \n\n## 本地分区索引的第二个问题\n\n本地分区索引的第二个问题是，对于无法利用分区修剪（partition pruning）的 SQL 语句，它们可能会使性能变得更差。这种情况的原因在本章前面的“Range\
  \ Partitioning”一节中已经描述过。其对索引扫描的影响可能非常大。下面的例子基于 Figure 9-5 中的范围分区表，展示了问题可能是什么。首先，创建了一个非分区索引。通过它，查询执行了四次逻辑读取来检索一行。这很好。请注意，操作`TABLE\
  \ ACCESS BY GLOBAL INDEX ROWID`表明`rowid`来自全局或非分区索引。\n\n```sql\nSQL> CREATE INDEX\
  \ i ON t (n3);\n\nSQL> SELECT * FROM t WHERE n3 = 3885;\n\n1 row selected.\n\n------------------------------------------------------------------------------------\n\
  | Id | Operation                               | Name | Starts | Pstart| Pstop |\
  \ Buffers |\n------------------------------------------------------------------------------------\n\
  |  1 | TABLE ACCESS BY GLOBAL INDEX ROWID      | T    |      1 | ROWID | ROWID |\
  \       4 |\n|* 2 |  INDEX RANGE SCAN                       | I    |      1 |  \
  \     |       |       3 |\n------------------------------------------------------------------------------------\n\
  \n  2 - filter(\"N3\"=3885)\n```\n\n对于这个测试的第二部分，索引被重新创建。这次它是一个本地索引。由于表有 48 个分区，索引也将有\
  \ 48 个分区。因为测试查询不包含基于分区键的限制，所以无法执行分区修剪。这不仅由操作`PARTITION RANGE ALL`所证实，也由列`Pstart`和`Pstop`所证实。还要注意，操作`TABLE\
  \ ACCESS BY LOCAL INDEX ROWID`表明`rowid`来自本地分区索引。此执行计划的问题在于，与前一种情况执行单次索引扫描不同，这次对每个分区都执行了一次索引扫描（注意操作\
  \ 2 和 3 的列`Starts`）。因此，即使只检索单行数据，也需要 50 次逻辑读取。\n\n```sql\nSQL> CREATE INDEX i ON\
  \ t (n3) LOCAL;\n\nSQL> SELECT * FROM t WHERE n3 = 3885;\n\n1 row selected.\n\n\
  ------------------------------------------------------------------------------------\n\
  | Id | Operation                               | Name | Starts | Pstart| Pstop |\
  \ Buffers |\n------------------------------------------------------------------------------------\n\
  |  1 | PARTITION RANGE ALL                     |      |      1 |     1 |    48 |\
  \      50 |\n|  2 |  TABLE ACCESS BY LOCAL INDEX ROWID      | T    |     48 |  \
  \   1 |    48 |      50 |\n|* 3 |   INDEX RANGE SCAN                      | I  \
  \  |     48 |     1 |    48 |      49 |\n------------------------------------------------------------------------------------\n\
  \n  3 - access(\"N3\"=3885)\n```\n\n总之，如果没有分区修剪，逻辑读取的数量会与分区数量成比例地增加。因此，如前所述，有时使用非分区索引可能比分区索引更好。或者，作为一个折衷方案，拥有有限数量的分区可能是好的。然而，请注意，有时你没有选择。例如，位图索引只能创建为本地索引。\n\
  \n## 单表哈希集群访问\n\n实际上，很少有数据库利用单表哈希集群。事实上，当它们被正确设置大小并通过集群键上的等值条件访问时，它们能提供出色的性能。这有两个原因。首先，它们不需要单独的访问结构（例如索引来定位数据）。实际上，集群键足以定位数据。其次，与一个集群键相关的所有数据都聚集在一起。这两个优势也在本章前面\
  \ Figure 9-3 和 9-4 中总结的测试中得到了证明。\n\n单表哈希集群专用于实现那些频繁（理想情况下是总是）通过特定键访问的查找表。基本上，这与你可以从索引组织表获得的使用方式相同。然而，两者之间存在一些主要差异。Table\
  \ 9-4 列出了与索引组织表相比，单表哈希集群的主要优点和缺点。关键的缺点是单表哈希集群需要精确地设置大小才能利用它们的优势。\n\n**Table 9-4.**\
  \ 单表哈希集群与索引组织表的比较\n\n| **优点** | **缺点** |\n| --- | --- |\n| 性能更好（如果通过集群键访问且大小设置正确）\
  \ | 需要仔细设置大小以避免哈希冲突和空间浪费 |\n| 集群键可以不同于主键 | 不支持分区，不支持`LOB`列 |\n\n当通过集群键访问单表哈希集群时，操作`TABLE\
  \ ACCESS HASH`会出现在执行计划中。它的作用是直接通过集群键访问包含所需数据的块。由脚本`hash_cluster.sql`生成的输出摘录说明了这一点：\n\
  \n```sql\nSELECT * FROM t WHERE id = 6\n\n----------------------------------------------------------------\n\
  | Id  | Operation           | Name | Starts | A-Rows | Buffers |\n----------------------------------------------------------------\n\
  |*  1 |  TABLE ACCESS HASH  | T    |      1 |      1 |       1 |\n----------------------------------------------------------------\n\
  \n  1 - access(\"ID\"=6)\n```\n\n除了等值条件，另一个能够通过集群键访问数据的条件是`IN`条件。当指定该条件时，操作`CONCATENATION`会出现在执行计划中。该操作的每个子节点执行一次以获取一个特定的集群键。\n\
  \n```sql\nSELECT * FROM t WHERE id IN (6, 8, 19, 28)\n\n--------------------------------------------------------------\n\
  | Id  | Operation         | Name | Starts | A-Rows | Buffers |\n--------------------------------------------------------------\n\
  |   1 | CONCATENATION     |      |      1 |      4 |       4 |\n|*  2 |  TABLE ACCESS\
  \ HASH| T    |      1 |      1 |       1 |\n|*  3 |  TABLE ACCESS HASH| T    | \
  \     1 |      1 |       1 |\n|*  4 |  TABLE ACCESS HASH| T    |      1 |      1\
  \ |       1 |\n|*  5 |  TABLE ACCESS HASH| T    |      1 |      1 |       1 |\n\
  --------------------------------------------------------------\n\n  2 - access(\"\
  ID\"=28)\n  3 - access(\"ID\"=19)\n  4 - access(\"ID\"=8)\n  5 - access(\"ID\"=6)\n\
  ```\n\n必须强调的是，所有其他条件，如果没有索引可用，将导致全表扫描。例如，下面这个在`WHERE`子句中包含范围条件的查询，使用了一个索引：\n\n```sql\n\
  SELECT * FROM t WHERE id < 6\n\n------------------------------------------------------------------------\n\
  | Id  | Operation                   | Name | Starts | A-Rows | Buffers |\n------------------------------------------------------------------------\n\
  |   1 |  TABLE ACCESS BY INDEX ROWID| T    |      1 |      5 |       5 |\n|*  2\
  \ |   INDEX RANGE SCAN          | T_PK |      1 |      5 |       3 |\n------------------------------------------------------------------------\n\
  \n  2 - access(\"ID\"<6)\n```\n\n\n### 前往 第 10 章\n\n本章不仅阐述了在选择高效访问路径时**选择性**的重要性，还介绍了处理存储在单表中数据的不同方法。为此，具有弱选择性的\
  \ SQL 语句应使用全表扫描、全分区扫描或全索引扫描。我还讨论了为了高效处理具有强选择性的 SQL 语句，首选的访问路径是基于 rowid、索引和单表哈希集群的。\n\
  到目前为止，我只讨论了处理单表的 SQL 语句。在实践中，将几个表连接在一起是相当常见的。为了解决这个问题，下一章将描述三种基本的连接方法及其优缺点，以便您了解何时以及如何使用适当的连接方法。\n\
  \n---\n\n1. 实际上，也存在多表哈希集群和索引集群。由于它们在实践中很少使用，此处不作描述。\n\n### 第 10 章\n#### 优化连接\n\n\
  当一个 SQL 语句引用多个表时，查询优化器除了要确定每个表的访问路径外，还必须确定表的连接顺序以及使用的连接方法。查询优化器的目标是通过尽早过滤掉不需要的数据来最小化处理量。\n\
  本章首先定义关键术语，并解释三种基本连接方法（`嵌套循环连接`、`合并连接` 和 `哈希连接`）的工作原理。接着提供一些关于如何选择连接方法的建议。最后，本章描述了一些优化技术，如分区连接和转换。\n\
  \n---\n\n**注意** 在本章中，几个 SQL 语句包含提示。这样做不仅是为了向您展示哪个提示会导向哪个执行计划，也是为了向您展示它们的使用示例。无论如何，文中既未提供真实引用，也未提供完整语法。您可以在\
  \ `SQL 参考` 手册的 第 2 章 中找到这些内容。\n\n---\n\n##### 定义\n\n为避免误解，以下各节定义了本章中使用的一些术语和概念。具体来说，我将涵盖不同类型的连接树、限制条件与连接条件之间的区别，以及不同类型的连接。\n\
  \n#### 连接树\n\n数据库引擎支持的所有连接方法一次只处理两组数据。这些被称为 `左输入` 和 `右输入`。之所以这样命名，是因为在使用图形化表示时（参见\
  \ 图 10-1），其中一个输入位于连接的左侧（`T1`），另一个位于右侧（`T2`）。请注意，在此图形化表示中，左侧的节点在右侧的节点之前执行。\n当需要连接两组以上的数据时，查询优化器会评估\
  \ `连接树`。查询优化器使用的连接树类型将在接下来的四节中描述。\n\n![image](img/1001.jpg)\n\n**图 10-1.** *两组数据之间连接的图形化表示*\n\
  \n#### 左深树\n\n如 图 10-2 所示，`左深树` 是一种连接树，其中每个连接的右输入是一个表（即，不是由先前连接生成的结果集）。这是查询优化器最常用的连接树。\n\
  \n![image](img/1002.jpg)\n\n**图 10-2.** *在左深树中，右输入始终是一个表。*\n\n以下执行计划说明了 图 10-2 中描述的连接树。请注意，每个连接操作（即第\
  \ 5、6、7 行）的第二个子节点（即右输入）都是一个表。\n\n```\n-------------------------------------\n| Id\
  \ | Operation            |  Name |\n-------------------------------------\n|  1\
  \ |   HASH JOIN           |      |\n|  2 |    HASH JOIN          |      |\n|  3\
  \ |    HASH JOIN          |      |\n|  4 |     TABLE ACCESS FULL | T1   |\n|  5\
  \ |     TABLE ACCESS FULL | T2   |\n|  6 |    TABLE ACCESS FULL  | T3   |\n|  7\
  \ |   TABLE ACCESS FULL   | T4   |\n-------------------------------------\n```\n\
  \n#### 右深树\n\n如 图 10-3 所示，`右深树` 是一种连接树，其中每个连接的左输入是一个表。查询优化器很少使用这种连接树。\n\n![image](img/1003.jpg)\n\
  \n**图 10-3.** *在右深树中，左输入始终是一个表。*\n\n以下执行计划说明了 图 10-3 中描述的连接树。请注意，每个连接操作（即第 2、4、6\
  \ 行）的第一个子节点（即左输入）都是一个表。\n\n```\n-------------------------------------\n| Id |  Operation\
  \            | Name |\n-------------------------------------\n|  1 | HASH JOIN \
  \            |      |\n|  2 |  TABLE ACCESS FULL    | T1   |\n|  3 |  HASH JOIN\
  \            |      |\n|  4 |   TABLE ACCESS FULL   | T2   |\n|  5 |   HASH JOIN\
  \           |      |\n|  6 |    TABLE ACCESS FULL  | T3   |\n|  7 |    TABLE ACCESS\
  \ FULL  | T4   |\n-------------------------------------\n```\n\n#### 之字形树\n\n如 图\
  \ 10-4 所示，`之字形树` 是一种连接树，其中每个连接至少有一个输入是表，但基于表的输入有时在左侧，有时在右侧。查询优化器不常使用这种类型的连接树。\n\n\
  ![image](img/1004.jpg)\n\n**图 10-4.** *在之字形树中，两个输入中至少有一个是表。*\n\n以下执行计划说明了 图 10-4\
  \ 中描述的连接树：\n\n```\n------------------------------------\n| Id | Operation      \
  \      | Name |\n------------------------------------\n|* 1 | HASH JOIN        \
  \    |      |\n|* 2 |  HASH JOIN           |      |\n|  3 |   TABLE ACCESS FULL\
  \  | T1   |\n|* 4 |   HASH JOIN          |      |\n|  5 |    TABLE ACCESS FULL |\
  \ T2   |\n|  6 |    TABLE ACCESS FULL | T3   |\n|  7 |   TABLE ACCESS FULL  | T4\
  \   |\n------------------------------------\n```\n\n#### 茂密树\n\n如 图 10-5 所示，`茂密树`\
  \ 是一种连接树，其连接可能有两个输入都不是表。换句话说，树的结构是完全自由的。查询优化器只有在没有其他可能性时才会选择这种类型的连接树。这通常发生在存在不可合并的视图或子查询时。\n\
  \n![image](img/1005.jpg)\n\n**图 10-5.** *茂密树的结构是完全自由的。*\n\n以下执行计划说明了 图 10-5 中描述的连接树。请注意，连接操作\
  \ 1 的子节点是另外两个连接操作的结果集。\n\n```\n-------------------------------------\n| Id | Operation\
  \              | Name|\n-------------------------------------\n|  1 |  HASH JOIN\
  \             |     |\n|  2 |   VIEW                 |     |\n|  3 |    HASH JOIN\
  \           |     |\n|  4 |     TABLE ACCESS FULL  | T1  |\n|  5 |     TABLE ACCESS\
  \ FULL  | T2  |\n|  6 |   VIEW                 |     |\n|  7 |    HASH JOIN    \
  \       |     |\n|  8 |     TABLE ACCESS FULL  | T3  |\n|  9 |     TABLE ACCESS\
  \ FULL  | T4  |\n-------------------------------------\n```\n\n\n\n##### 连接类型\n\n\
  指定连接有两种语法类型。传统语法由最早的 SQL 标准（SQL-86）规定，它同时使用 `FROM` 子句和 `WHERE` 子句来指定连接。而较新的语法（自\
  \ Oracle9*i* 起支持，并首次出现在 SQL-92 中）仅使用 `FROM` 子句来指定连接。这种较新的语法有时被称为 `ANSI 连接语法`。然而，从\
  \ SQL 标准的角度来看，这两种语法类型都是有效的。对于 Oracle 而言，由于历史原因，最常用的是传统语法。事实上，不仅许多开发人员和 DBA 习惯于使用它，许多应用程序也是使用它开发的。尽管如此，较新的语法提供了传统语法不支持的可能性。以下各节将提供基于这两种语法的示例。这里用作示例的所有查询都在脚本\
  \ `join_types.sql` 中提供。\n\n***\n\n**注意** 本节描述的连接类型并非互斥。一个给定的连接可能属于多个类别。例如，完全可以设想一个既是\
  \ θ 连接又是自连接的情况。\n\n***\n\n## 交叉连接\n\n`交叉连接`，也称为`笛卡尔积`，是将一个表的每一行与另一个表的每一行组合起来的操作。这种操作在以下查询说明的两种情况下执行。第一个查询使用了传统连接语法（未指定连接条件）：\n\
  \n```\nSELECT emp.ename, dept.dname\nFROM emp, dept\n```\n\n第二个查询使用了新的连接语法（使用了 `CROSS\
  \ JOIN`）：\n\n```\nSELECT emp.ename, dept.dname\nFROM emp CROSS JOIN dept\n```\n\n\
  实际上，交叉连接很少被需要。然而，后一种语法更能明确表达开发者的意图。交叉连接的优点在于它们是被显式指定的。事实上，对于前一种语法，无法确定编写 SQL 语句的人是否忘记了\
  \ `WHERE` 子句。\n\n## θ 连接\n\n`θ 连接` 等同于在交叉连接的结果集上执行选择操作。换句话说，它不是返回一个表的每一行与另一个表的每一行的所有组合，而是只返回满足连接条件的行。以下两个查询是此类连接的示例：\n\
  \n```\nSELECT emp.ename, salgrade.grade\nFROM emp, salgrade\nWHERE emp.sal BETWEEN\
  \ salgrade.losal AND salgrade.hisal\n```\n\n```\nSELECT emp.ename, salgrade.grade\n\
  FROM emp JOIN salgrade ON emp.sal BETWEEN salgrade.losal AND salgrade.hisal\n```\n\
  \nθ 连接也称为 `内连接`。在前面使用新连接语法的查询中，`INNER` 关键字是隐含的，但也可以像下面的例子那样显式地写出来：\n\n```\nSELECT\
  \ emp.ename, salgrade.grade\nFROM emp INNER JOIN salgrade ON emp.sal BETWEEN salgrade.losal\
  \ AND salgrade.hisal\n```\n\n## 等值连接\n\n`等值连接`（又称 `自然连接`）是 θ 连接的一种特殊类型，其连接条件中只使用等于运算符。以下两个查询是示例：\n\
  \n```\nSELECT emp.ename, dept.dname\nFROM emp, dept\nWHERE emp.deptno = dept.deptno\n\
  ```\n\n```\nSELECT emp.ename, dept.dname\nFROM emp JOIN dept ON emp.deptno = dept.deptno\n\
  ```\n\n## 自连接\n\n`自连接` 是 θ 连接的一种特殊类型，其中表与自身进行连接。以下是两个查询示例。注意，在 `FROM` 子句中引用了 `emp`\
  \ 表两次。\n\n```\nSELECT emp.ename, mgr.ename\nFROM emp, emp mgr\nWHERE emp.mgr = mgr.empno\n\
  ```\n\n```\nSELECT emp.ename, mgr.ename\nFROM emp JOIN emp mgr ON emp.mgr = mgr.empno\n\
  ```\n\n##### 外连接\n\n`外连接` 扩展了 θ 连接的结果集。实际上，使用外连接时，即使另一个表中没有匹配的值，也会返回一个表（`保留表`）的所有行。值\
  \ `NULL` 会与另一个表中没有匹配行的返回列关联。例如，上一节（自连接）中的查询并没有返回 `emp` 表的所有行，因为员工 `KING`（总裁）没有经理。要使用传统语法指定外连接，必须使用\
  \ Oracle 的扩展（基于 `(+)` 运算符）。以下查询是一个示例：\n\n```\nSELECT emp.ename, mgr.ename\nFROM\
  \ emp, emp mgr\nWHERE emp.mgr = mgr.empno(+)\n```\n\n要使用新语法指定外连接，有几种可能性。例如，以下两个查询与前面的查询是等效的：\n\
  \n```\nSELECT emp.ename, mgr.ename\nFROM emp LEFT JOIN emp mgr ON emp.mgr = mgr.empno\n\
  ```\n\n```\nSELECT emp.ename, mgr.ename\nFROM emp mgr RIGHT JOIN emp ON emp.mgr\
  \ = mgr.empno\n```\n\n下面的查询表明，与 θ 连接类似，可以添加 `OUTER` 关键字来显式指定它是外连接：\n\n```\nSELECT\
  \ emp.ename, mgr.ename\nFROM emp LEFT OUTER JOIN emp mgr ON emp.mgr = mgr.empno\n\
  ```\n\n此外，使用新的连接语法，可以通过 `全外连接` 指定返回两个表的所有行。换句话说，两个表中在另一个表中没有匹配行的行都会被保留。以下查询是一个示例：\n\
  \n```\nSELECT mgr.ename AS manager, emp.ename AS subordinate\nFROM emp FULL OUTER\
  \ JOIN emp mgr ON emp.mgr = mgr.empno\n```\n\n从 Oracle Database 10*g* 开始，还可以指定`分区外连接`。¹\
  \ 请注意，`分区`一词与第 9 章中讨论的对象的物理分区无关。相反，它的含义是在运行时将数据划分为若干个子集。其思路是在一个表与另一个表的子集之间执行外连接，而不是在两个表之间。例如，在下面的查询中，表\
  \ `emp` 根据 `job` 列被划分为子集。然后，每个子集与表 `dept` 进行外连接。\n\n```\nSELECT dept.dname, count(emp.empno)\n\
  FROM dept LEFT JOIN emp PARTITION BY (emp.job) ON emp.deptno = dept.deptno\nWHERE\
  \ emp.job = 'MANAGER'\nGROUP BY dept.dname\n```\n\n## 半连接\n\n两个表之间的 `半连接` 在另一个表中有匹配行时，返回一个表的行。与\
  \ θ 连接相反，左输入表的行最多只返回一次。此外，根本不返回右输入表的数据。连接条件使用 `IN` 或 `EXISTS` 编写。以下两个查询是示例：\n\n\
  ```\nSELECT deptno, dname, loc\nFROM dept\nWHERE deptno IN (SELECT deptno FROM emp)\n\
  ```\n\n```\nSELECT deptno, dname, loc\nFROM dept\nWHERE EXISTS (SELECT deptno FROM\
  \ emp WHERE emp.deptno = dept.deptno)\n```\n\n## 反连接\n\n`反连接` 是半连接的一种特殊类型，它只返回一个表中在另一个表中没有匹配行的行。连接条件通常使用\
  \ `NOT IN` 或 `NOT EXISTS` 编写。以下两个查询是示例：\n\n```\nSELECT deptno, dname, loc\nFROM\
  \ dept\nWHERE deptno NOT IN (SELECT deptno FROM emp)\n```\n\n```\nSELECT deptno,\
  \ dname, loc\nFROM dept\nWHERE NOT EXISTS (SELECT deptno FROM emp WHERE emp.deptno\
  \ = dept.deptno)\n```\n\n\n"
- "# 限制条件与连接条件\n\n要选择连接方法，理解 `限制条件`（又称 `过滤条件`）与 `连接条件` 之间的区别至关重要。从语法角度来看，只有在使用旧式连接语法时，两者才可能被混淆。事实上，在旧式连接语法中，`WHERE`\
  \ 子句同时用于指定限制条件和连接条件。而使用新式连接语法时，限制条件在 `WHERE` 子句中指定，连接条件则在 `FROM` 子句中指定。以下伪 SQL 语句说明了这一点：\n\
  \n```sql\nSELECT *\nFROM <table1> [OUTER] JOIN <table2> ON ( <join conditions> )\n\
  WHERE <restrictions>\n```\n\n从概念角度来看，包含连接条件和限制条件的 SQL 语句按以下方式执行：\n\n*   根据连接条件连接两个数据集。\n\
  *   将限制条件应用于连接返回的结果集。\n\n换句话说，指定连接条件是为了在连接两个数据集时避免产生笛卡尔积（交叉连接）。它的目的不是过滤结果集。而指定限制条件则是为了过滤前一个操作（例如，连接）返回的结果集。例如，在以下查询中，连接条件是\
  \ `emp.deptno=dept.deptno`，限制条件是 `dept.loc='DALLAS'`：\n\n```sql\nSELECT emp.ename\n\
  FROM emp, dept\nWHERE emp.deptno = dept.deptno\nAND dept.loc = 'DALLAS'\n```\n\n\
  从实现角度来看，查询优化器误用限制条件和连接条件的情况并不少见。一方面，连接条件可能被用来过滤数据。另一方面，限制条件可能在连接条件之前被求值，以最小化需要连接的数据量。例如，前面的查询可能会使用如下执行计划。请注意限制条件\
  \ `dept.loc='DALLAS'`（操作 2）如何在连接条件 `emp.deptno=dept.deptno`（操作 1）之前被应用。\n\n```\n\
  ----------------------------------\n| Id | Operation          | Name |\n----------------------------------\n\
  |* 1 |  HASH JOIN         |      |\n|* 2 |   TABLE ACCESS FULL| DEPT |\n|  3 | \
  \  TABLE ACCESS FULL| EMP  |\n----------------------------------\n\n   1 - access(\"\
  EMP\".\"DEPTNO\"=\"DEPT\".\"DEPTNO\")\n   2 - filter(\"DEPT\".\"LOC\"='DALLAS')\n\
  ```\n\n##### 嵌套循环连接\n\n以下部分描述了嵌套循环连接的工作原理。首先，我描述其一般行为，然后给出一些两表和四表连接的例子。最后，我描述一些优化技术（例如，块预取）。所有示例均基于脚本\
  \ `nested_loops_join.sql`。\n\n### 概念\n\n嵌套循环连接处理的两个数据集称为 `外循环`（又称 `驱动行源`）和 `内循环`。外循环是左侧输入，内循环是右侧输入。如\
  \ 图 10-6 所示，外循环执行一次，而内循环针对外循环返回的每一行都执行一次。\n\n![image](img/1006.jpg)\n\n**图 10-6.**\
  \ 嵌套循环连接执行的处理概览\n\n嵌套循环连接具有以下特定特征：\n\n*   左侧输入（外循环）仅执行一次。右侧输入（内循环）可能执行多次。\n*   它们能够在完全处理所有行之前返回结果集的第一行。\n\
  *   它们能够利用索引来应用限制条件和连接条件。\n*   它们支持所有类型的连接。\n\n### 两表连接\n\n以下是一个处理两个表之间嵌套循环连接的简单执行计划示例。该示例还展示了如何使用\
  \ `leading` 和 `use_nl` 提示来强制使用嵌套循环。前者指示首先访问表 `t1`。换句话说，它指定了哪个表在外循环中被访问。后者指定了使用哪种连接方法将内循环（即表\
  \ `t2`）返回的数据连接到表 `t1`。必须注意的是，`use_nl` 提示不包含对表 `t1` 的引用。\n\n```sql\nSELECT /*+ leading(t1)\
  \ use_nl(t2) full(t1) full(t2) */ *\nFROM t1, t2\nWHERE t1.id = t2.t1_id\nAND t1.n\
  \ = 19\n```\n\n```\n-----------------------------------\n| Id | Operation      \
  \     | Name |\n-----------------------------------\n|  0 | SELECT STATEMENT   \
  \ |      |\n|  1 |  NESTED LOOPS       |      |\n|* 2 |   TABLE ACCESS FULL | T1\
  \   |\n|* 3 |   TABLE ACCESS FULL | T2   |\n-----------------------------------\n\
  \n   2 - filter(\"T1\".\"N\"=19)\n   3 - filter(\"T1\".\"ID\"=\"T2\".\"T1_ID\")\n\
  ```\n\n如 第 6 章 所述，`NESTED LOOPS` 操作是类型相关的组合操作。这意味着第一个子节点（外循环）控制第二个子节点（内循环）的执行。在这种情况下，执行计划的处理可以总结如下：\n\
  \n*   通过全表扫描读取表 `t1` 中的所有行，然后应用限制条件 `n=19`。\n*   表 `t2` 的全表扫描执行的次数等于上一步返回的行数。\n\n\
  显然，当操作 2 返回多行时，这种执行计划效率低下，因此查询优化器几乎从不选择它。因此，在此特定示例中，必须指定两个访问提示（`full`）来强制查询优化器使用此执行计划。另一方面，如果外循环只返回一行且内循环的选择性很高，那么对表\
  \ `t2` 进行全表扫描可能是可行的。为了说明这一点，让我们为表 `t1` 的 `n` 列创建以下唯一索引：\n\n```sql\nCREATE UNIQUE\
  \ INDEX t1_n ON t1 (n)\n```\n\n有了这个索引，前面的查询可以使用如下执行计划执行。请注意，由于操作 3（`INDEX UNIQUE\
  \ SCAN`），内循环保证执行不超过一次。\n\n```sql\nSELECT /*+ ordered use_nl(t2) index(t1) full(t2)\
  \ */ *\nFROM t1, t2\nWHERE t1.id = t2.t1_id\nAND t1.n = 19\n```\n\n```\n--------------------------------------------\n\
  | Id | Operation                    | Name |\n--------------------------------------------\n\
  |  0 | SELECT STATEMENT             |      |\n|  1 |  NESTED LOOPS             \
  \   |      |\n|  2 |   TABLE ACCESS BY INDEX ROWID| T1   |\n|* 3 |    INDEX UNIQUE\
  \ SCAN         | T1_N |\n|* 4 |   TABLE ACCESS FULL          | T2   |\n--------------------------------------------\n\
  \n  3 - access(\"T1\".\"N\"=19)\n  4 - filter(\"T1\".\"ID\"=\"T2\".\"T1_ID\")\n\
  ```\n\n正如前一章所讨论的，如果内循环的选择性非常低，那么对内循环使用索引扫描是有意义的。由于嵌套循环连接是一个相关的组合操作，对于内循环，甚至可以为此目的利用连接条件。例如，在以下执行计划中，操作\
  \ 5 使用操作 3 返回的 `t1.id` 列的值进行查找：\n\n```sql\nSELECT /*+ ordered use_nl(t2) index(t1)\
  \ index(t2) */ *\nFROM t1, t2\nWHERE t1.id = t2.t1_id\nAND t1.n = 19\n```\n\n```\n\
  -------------------------------------------------\n| Id | Operation            \
  \         | Name      |\n-------------------------------------------------\n|  0\
  \ |  SELECT STATEMENT             |           |\n|  1 |   NESTED LOOPS         \
  \       |           |\n|  2 |    TABLE ACCESS BY INDEX ROWID| T1        |\n|* 3\
  \ |     INDEX UNIQUE SCAN         | T1_N      |\n|  4 |    TABLE ACCESS BY INDEX\
  \ ROWID| T2        |\n|* 5 |     INDEX RANGE SCAN          | T2_T1_ID  |\n-------------------------------------------------\n\
  \n  3 - access(\"T1\".\"N\"=19)\n  5 - access(\"T1\".\"ID\"=\"T2\".\"T1_ID\")\n\
  ```\n\n总之，如果内循环执行多次（或很多次），只有具有良好选择性且导致极少逻辑读的访问路径才有意义。\n\n#### 四表连接\n\n以下执行计划是一个典型的左深树示例，采用嵌套循环连接实现（图形化表示请参考图\
  \ 10-2）。请注意每个表是如何通过索引访问的。此示例还展示了如何通过使用提示 `ordered` 和 `use_nl` 来强制使用嵌套循环。前者指定按 `FROM`\
  \ 子句中出现的相同顺序访问表。后者指定使用哪种连接方法将其他表连接到第一个表或前一次连接操作的结果集。\n\n```sql\nSELECT /*+ ordered\
  \ use_nl(t2 t3 t4) */ t1.*, t2.*, t3.*, t4.*\nFROM t1, t2, t3, t4\nWHERE t1.id =\
  \ t2.t1_id\nAND t2.id = t3.t2_id\nAND t3.id = t4.t3_id\nAND t1.n = 19\n```\n\n```\n\
  ---------------------------------------------------\n| Id  | Operation         \
  \             | Name     |\n---------------------------------------------------\n\
  |   0 | SELECT STATEMENT               |          |\n|   1 |  NESTED LOOPS     \
  \             |          |\n|   2 |   NESTED LOOPS                 |          |\n\
  |   3 |    NESTED LOOPS                |          |\n|   4 |     TABLE ACCESS BY\
  \ INDEX ROWID| T1       |\n|*  5 |      INDEX RANGE SCAN          | T1_N     |\n\
  |   6 |     TABLE ACCESS BY INDEX ROWID| T2       |\n|*  7 |      INDEX RANGE SCAN\
  \          | T2_T1_ID |\n|   8 |   TABLE ACCESS BY INDEX ROWID  | T3       |\n|*\
  \  9 |    INDEX RANGE SCAN            | T3_T2_ID |\n|  10 |  TABLE ACCESS BY INDEX\
  \ ROWID   | T4       |\n|* 11 |   INDEX RANGE SCAN             | T4_T3_ID |\n---------------------------------------------------\n\
  \n   5 - access(\"T1\".\"N\"=19)\n   7 - access(\"T1\".\"ID\"=\"T2\".\"T1_ID\")\n\
  \   9 - access(\"T2\".\"ID\"=\"T3\".\"T2_ID\")\n  11 - access(\"T3\".\"ID\"=\"T4\"\
  .\"T3_ID\")\n```\n\n这类执行计划的处理过程可概括如下（此描述假设未使用行预取）：\n\n1.  当获取第一行时（换句话说，不是在查询被解析或执行时），处理开始于从表\
  \ `t1` 中获取满足条件 `t1.n=19` 的第一行。\n2.  基于在表 `t1` 中找到的数据，查找表 `t2`。请注意，数据库引擎利用连接条件 `t1.id=t2.t1_id`\
  \ 来访问表 `t2`。实际上，该表没有应用任何限制条件。只有满足连接条件的第一行被返回给父操作。\n3.  基于在表 `t2` 中找到的数据，查找表 `t3`。同样，数据库引擎利用连接条件\
  \ `t2.id=t3.t2_id` 来访问表 `t3`。只有满足连接条件的第一行被返回给父操作。\n4.  基于在表 `t3` 中找到的数据，查找表 `t4`。这里也是，数据库引擎利用连接条件\
  \ `t3.id=t4.t3_id` 来访问表 `t4`。满足连接条件的第一行会立即返回给客户端。\n5.  当获取后续行时，执行与第一次获取相同的操作。显然，处理会从上次匹配的位置重新开始（如果有的话，可能是表\
  \ `t4` 中匹配的第二行）。必须强调的是，一旦找到满足请求的行，数据就会立即返回。换句话说，不必在返回第一行之前完全执行连接。\n\n#### 块预取\n\n\
  在正常情况下，基于单块处理的每个访问路径（例如，`rowid` 访问和 `index range scan`）在缓存未命中时会导致单块物理读。对于嵌套循环连接，尤其是在处理大量行时，这可能效率非常低。事实上，嵌套循环连接通过多次单块物理读访问多个相邻块的情况并不少见。\n\
  \n为了提高嵌套循环连接的效率，数据库引擎能够利用块预取。这种优化技术的目标是用一次多块物理读替代对相邻块执行的多次单块物理读。这对于索引和表都适用。\n\n\
  观察访问路径无法判断数据库引擎是否会使用预取。唯一的方法是查看服务器进程执行的物理读，特别是与之相关的等待事件：\n\n-  事件 `db file sequential\
  \ read` 与单块物理读相关。因此，如果该事件发生，则说明要么没有使用块预取，要么无法使用它（例如，因为所需的块已在缓冲区缓存中）。\n-  事件 `db\
  \ file scattered read` 与多块物理读相关。因此，如果该事件在 `rowid` 访问或 `index range scan` 时发生，则意味着正在使用块预取。\n\
  \n重要的是要注意，您无法控制块预取的使用。数据库引擎决定是否利用它。\n\n***\n\n`注意` 正如 MetaLink 笔记 `Table Prefetching\
  \ Causes Intermittent Wrong Results in 9iR2,10gR1, and 10gR2` (406966.1) 中所述，直到\
  \ Oracle Database 10*g* Release 2，表预取可能会导致错误的结果。我强烈建议您查阅该笔记，以确定该问题是否适用于您正在使用的版本。\n\
  \n***\n\n## 替代执行计划\n\n正如`双表连接`章节所讨论的，可以使用以下执行计划来执行嵌套循环连接：\n\n```\n----------------------------------------------\n\
  | Id | Operation                  | Name      |\n----------------------------------------------\n\
  |  0 | SELECT STATEMENT           |           |\n|  1 | NESTED LOOPS           \
  \    |           |\n|  2 | TABLE ACCESS BY INDEX ROWID| T1        |\n|* 3 | INDEX\
  \ UNIQUE SCAN          | T1_N      |\n|  4 | TABLE ACCESS BY INDEX ROWID| T2   \
  \     |\n|* 5 | INDEX RANGE SCAN           | T2_T1_ID  |\n----------------------------------------------\n\
  ```\n\n```\n  3 - access(\"T1\".\"N\"=19)\n  5 - access(\"T1\".\"ID\"=\"T2\".\"\
  T1_ID\")\n```\n\n实际上，在近期的版本中，只有当外循环或内循环基于索引唯一扫描时，才会使用这种类型的执行计划。让我们看看如果列 `n` 上的索引\
  \ `t1_n` 被定义为非唯一索引时会发生什么：\n\n```\nCREATE INDEX t1_n ON t1 (n)\n```\n\n在此索引存在的情况下，将使用以下执行计划。请注意表\
  \ `t2` 中通过 rowid 访问的位置发生了变化。在前一个计划中，它是操作 4，而在下面的计划中，它是操作 1。特殊之处在于 rowid 访问（操作 1）的子节点是嵌套循环连接（操作\
  \ 2）。从我们的角度来看，这两个执行计划完成的工作是相同的。下面的执行计划可能是为了利用内部优化（如块预取）而实现的。\n\n```\n-------------------------------------------------\n\
  | Id | Operation                     | Name      |\n-------------------------------------------------\n\
  |  0 | SELECT STATEMENT              |           |\n|  1 |  TABLE ACCESS BY INDEX\
  \ ROWID  | T2        |\n|  2 |   NESTED LOOPS                |           |\n|  3\
  \ |    TABLE ACCESS BY INDEX ROWID| T1        |\n|* 4 |     INDEX RANGE SCAN   \
  \       | T1_N      |\n|* 5 |    INDEX RANGE SCAN           | T2_T1_ID  |\n-------------------------------------------------\n\
  ```\n\n```\n  4 - access(\"T1\".\"N\"=19)\n  5 - access(\"T1\".\"ID\"=\"T2\".\"\
  T1_ID\")\n```\n\n从 Oracle Database 11g 开始，可能会观察到以下执行计划，以替代之前的计划。请注意，即使查询始终相同（即双表连接），该执行计划却包含两个嵌套循环连接！一个简单的性能测试显示，使用它大约有\
  \ 10% 的性能提升。这可能是因为一个只适用于新执行计划的新的内部优化。为了控制这个新的执行计划，可以使用提示 `nlj_batching` 和 `no_nlj_batching`。\n\
  \n```\n--------------------------------------------------\n| Id |     Operation\
  \                  | Name      |\n--------------------------------------------------\n\
  |  0 | SELECT STATEMENT               |           |\n|  1 |  NESTED LOOPS      \
  \            |           |\n|  2 |   NESTED LOOPS                 |           |\n\
  |  3 |    TABLE ACCESS BY INDEX ROWID | T1        |\n|* 4 |     INDEX RANGE SCAN\
  \           | T1_N      |\n|* 5 |    INDEX RANGE SCAN            | T2_T1_ID  |\n\
  |  6 |    TABLE ACCESS BY INDEX ROWID | T2        |\n--------------------------------------------------\n\
  ```\n\n```\n  4 - access(\"T1\".\"N\"=19)\n  5 - access(\"T1\".\"ID\"=\"T2\".\"\
  T1_ID\")\n```\n\n##### 合并连接\n\n接下来的章节将描述合并连接（亦称排序合并连接）的工作原理。我将从描述其一般行为开始，并给出一些双表和四表连接的示例。最后，描述处理过程中使用的工作区。所有示例都基于脚本\
  \ `merge_join.sql`。\n\n### 概念\n\n在处理合并连接时，两组数据都会被读取，并根据连接条件的列进行排序。一旦这些操作完成，两个工作区中包含的数据就会被合并，如图\
  \ 10-7 所示。\n\n合并连接具有以下特性：\n\n*   每个子节点只执行一次。\n*   两个输入都必须根据连接条件的列进行排序。\n*   由于排序操作，在返回结果集的第一行之前，两个输入都必须完全读取并排序完毕。\n\
  *   支持所有类型的连接。\n\n**注意** 在某些情况下，例如当使用合并连接执行交叉连接时，上述两个特性并不适用。首先，两个输入不需要排序。其次，第一行可以立即返回。本章不进一步描述这些情况，因为它们并不常见。\n\
  \n合并连接并不常用。原因是在大多数情况下，嵌套循环连接或哈希连接的性能都优于合并连接。然而，这种连接方法至关重要，因为它是唯一支持所有类型的连接的方法。\n\n\
  ![image](img/1007.jpg)\n\n`图 10-7.` 合并连接执行处理的概述\n\n\n## 两表连接\n\n以下是一个简单的执行计划，处理两个表之间的归并连接。该示例还展示了如何通过使用\
  \ `ordered` 和 `use_merge` 提示来强制执行归并连接。\n\n```sql\nSELECT /*+ ordered use_merge(t2)\
  \ */ *\nFROM t1, t2\nWHERE t1.id = t2.t1_id\nAND t1.n = 19\n```\n\n```\n------------------------------------\n\
  | Id | Operation            | Name |\n------------------------------------\n|  0\
  \ | SELECT STATEMENT     |      |\n|  1 |  MERGE JOIN          |      |\n|  2 |\
  \   SORT JOIN          |      |\n|* 3 |    TABLE ACCESS FULL | T1   |\n|* 4 |  \
  \ SORT JOIN          |      |\n|  5 |    TABLE ACCESS FULL | T2   |\n------------------------------------\n\
  \n  3 - filter(\"T1\".\"N\"=19)\n  4 - access(\"T1\".\"ID\"=\"T2\".\"T1_ID\")\n\
  \      filter(\"T1\".\"ID\"=\"T2\".\"T1_ID\")\n```\n\n正如在第 6 章中所描述的，`MERGE JOIN`（归并连接）操作属于无关合并类型。这意味着两个子操作只会被处理一次，并且彼此独立。在这种情况下，执行计划的处理过程可以总结如下：\n\
  \n*   通过全表扫描读取表 `t1` 中的所有行，应用限制条件 `n=19`，然后根据用作连接条件的列（`id`）对结果行进行排序。\n*   通过全表扫描读取表\
  \ `t2` 中的所有行，并根据用作连接条件的列（`t1_id`）进行排序。\n*   将两个数据集连接在一起，并返回结果行。请注意，连接本身是直接的，因为两个数据集已根据相同的值（连接条件中使用的列）进行了排序。\n\
  \n`MERGE JOIN` 操作（以及其他无关合并操作）最重要的限制是其无法利用索引来应用连接条件。换句话说，索引只能作为访问路径，在排序输入之前用于评估限制条件（如果可用）。因此，为了选择访问路径，你必须将第\
  \ 9 章中讨论的方法应用于两个表。例如，如果限制条件 `n=19` 具有良好的选择性，创建索引来应用它可能是有用的。\n\n```sql\nCREATE INDEX\
  \ t1_n ON t1 (n)\n```\n\n实际上，有了这个索引，可能会使用以下执行计划。你应该注意到，表 `t1` 不再是通过全表扫描访问的。\n\n\
  ```\n----------------------------------------------\n| Id | Operation          \
  \                    | Name |\n----------------------------------------------\n\
  |  0 | SELECT STATEMENT                       |      |\n|  1 |  MERGE JOIN     \
  \                       |      |\n|  2 |   SORT JOIN                           \
  \ |      |\n|  3 |    TABLE ACCESS BY INDEX ROWID | T1   |\n|* 4 |     INDEX RANGE\
  \ SCAN           | T1_N |\n|* 5 |   SORT JOIN                            |     \
  \ |\n|  6 |    TABLE ACCESS FULL           | T2   |\n----------------------------------------------\n\
  \n  4 - access(\"T1\".\"N\"=19)\n  5 - access(\"T1\".\"ID\"=\"T2\".\"T1_ID\")\n\
  \      filter(\"T1\".\"ID\"=\"T2\".\"T1_ID\")\n```\n\n为了执行归并连接，可能会在排序操作上消耗不可忽略的资源。为了提高性能，查询优化器会在节省资源的情况下避免执行排序操作。但是，这只有在数据已经根据用作连接条件的列排好序时才可能。这在两种情况下会发生。第一种是当使用利用基于连接条件列构建的索引进行索引范围扫描时。第二种是当归并连接之前的步骤（例如，另一个归并连接）已经将数据按正确顺序排序时。例如，在下面的执行计划中，请注意表\
  \ `t1` 是如何通过索引 `t1_pk`（该索引是构建在用作连接条件的列 `id` 上的）访问的。因此，对于左侧输入，可以避免排序操作（`SORT JOIN`）。\n\
  \n```\n----------------------------------------------\n| Id | Operation        \
  \                      | Name  |\n----------------------------------------------\n\
  |  0 | SELECT STATEMENT                       |       |\n|  1 |  MERGE JOIN    \
  \                        |       |\n|* 2 |   TABLE ACCESS BY INDEX ROWID | T1  \
  \  |\n|  3 |    INDEX FULL SCAN            | T1_PK |\n|* 4 |   SORT JOIN       \
  \             |       |\n|  5 |    TABLE ACCESS FULL          | T2    |\n----------------------------------------------\n\
  \n  2 - filter(\"T1\".\"N\"=19)\n  4 - access(\"T1\".\"ID\"=\"T2\".\"T1_ID\")\n\
  \      filter(\"T1\".\"ID\"=\"T2\".\"T1_ID\")\n```\n\n## 四表连接\n\n以下执行计划是使用归并连接实现的典型左深树示例（关于图形化表示，请参阅图\
  \ 10-2）。该示例还展示了如何通过 `leading` 和 `use_merge` 提示来强制执行归并连接。请注意，`leading` 提示仅从 Oracle\
  \ Database 10*g* 开始支持多个表。\n\n```sql\nSELECT /*+ leading(t1 t2 t3) use_merge(t2 t3\
  \ t4) */ t1.*, t2.*, t3.*, t4.*\nFROM t1, t2, t3, t4\nWHERE t1.id = t2.t1_id\nAND\
  \ t2.id = t3.t2_id\nAND t3.id = t4.t3_id\nAND t1.n = 19\n```\n\n```\n----------------------------------------\n\
  | Id  | Operation               | Name |\n----------------------------------------\n\
  |  0  | SELECT STATEMENT        |      |\n|  1  |  MERGE JOIN             |    \
  \  |\n|  2  |   SORT JOIN             |      |\n|  3  |    MERGE JOIN          \
  \ |      |\n|  4  |     SORT JOIN           |      |\n|  5  |      MERGE JOIN  \
  \       |      |\n|  6  |       SORT JOIN         |      |\n|*  7  |        TABLE\
  \ ACCESS FULL| T1   |\n|*  8  |       SORT JOIN         |      |\n|  9  |      \
  \  TABLE ACCESS FULL| T2   |\n|* 10  |      SORT JOIN          |      |\n|  11 |\
  \        TABLE ACCESS FULL| T3   |\n|* 12 |      SORT JOIN          |      |\n|\
  \  13 |       TABLE ACCESS FULL | T4   |\n----------------------------------------\n\
  \n   7 - filter(\"T1\".\"N\"=19)\n   8 - access(\"T1\".\"ID\"=\"T2\".\"T1_ID\")\n\
  \       filter(\"T1\".\"ID\"=\"T2\".\"T1_ID\")\n  10 - access(\"T2\".\"ID\"=\"T3\"\
  .\"T2_ID\")\n       filter(\"T2\".\"ID\"=\"T3\".\"T2_ID\")\n  12 - access(\"T3\"\
  .\"ID\"=\"T4\".\"T3_ID\")\n       filter(\"T3\".\"ID\"=\"T4\".\"T3_ID\")\n```\n\n\
  其处理过程与上一节讨论的两表连接并无本质不同。然而，重要的是要强调数据被多次排序。事实上，每个连接条件都基于不同的列。例如，表 `t1` 和表 `t2` 连接产生的结果数据，已根据表\
  \ `t1` 的 `id` 列排序，现在又通过操作 4 根据表 `t2` 的 `id` 列再次排序。操作 3 返回的数据也是如此。事实上，它必须根据表 `t3`\
  \ 的 `id` 列进行排序。总之，为了处理这种类型的执行计划，必须执行六次排序，并且所有这些排序都必须在能够返回第一行数据之前完成。\n\n\n\n####\
  \ 工作区\n\n为了处理合并连接，内存中最多会使用两个工作区来对数据进行排序。如果排序完全在内存中处理，则称为*内存排序*。如果排序需要将临时数据溢出到磁盘，则称为*磁盘排序*。从性能角度来看，内存排序显然应该比磁盘排序更快。接下来的章节将讨论这两种排序的工作原理。我还将根据\
  \ `dbms_xplan` 包的输出，讨论如何识别用于处理 SQL 语句的是哪一种排序。\n\n我在第 5 章讨论过工作区配置（大小调整）。你可能还记得，那部分介绍了两种大小调整方法。使用哪一种方法取决于初始化参数\
  \ `workarea_size_policy` 的值。这两种方法如下：\n\n`auto`:\n数据库引擎自动调整工作区的大小。专用于一个实例的 PGA 总量由初始化参数\
  \ `pga_aggregate_target` 限制，或者从 Oracle Database 11*g* 开始，由初始化参数 `memory_target`\
  \ 限制。\n\n`manual`:\n初始化参数 `sort_area_size` 限制了单个工作区的最大大小。此外，初始化参数 `sort_area_retained_size`\
  \ 控制排序结束后如何释放 PGA。\n\n**内存排序**\n\n内存排序的处理过程是直接的。数据被加载到工作区中，然后进行排序。需要强调的是，所有数据都必须加载到工作区中，而不仅仅是作为连接条件引用的列。因此，为了避免浪费大量内存，`SELECT`\
  \ 子句中只应添加真正必需的列。为了说明这一点，让我们看两个基于上一节讨论的四表连接的例子。\n\n在下面的例子中，所有表中的所有列都在 `SELECT` 子句中被引用。在执行计划中，`OMem`\
  \ 和 `Used-Mem` 这两列提供了有关工作区的信息。前者是估计的内存排序所需内存量。后者是操作在执行期间实际使用的内存量。括号中的值（即零）表示排序完全在内存中处理。\n\
  \n```sql\nSELECT `t1.*, t2.*, t3.*, t4.*` FROM t1, t2, t3, t4\nWHERE t1.id = t2.t1_id\n\
  AND t2.id = t3.t2_id\nAND t3.id = t4.t3_id\nAND t1.n = 19\n```\n\n```\n--------------------------------------------------------\n\
  | Id | Operation              | Name | `OMem` | `Used-Mem` |\n--------------------------------------------------------\n\
  |  1 | MERGE JOIN             |      |       |            |\n|  2 |  SORT JOIN \
  \            |      | 24576 | 22528 (0)  |\n|  3 |   MERGE JOIN           |    \
  \  |       |            |\n|  4 |    SORT JOIN           |      |  4096 | 4096 (0)\
  \   |\n|  5 |     MERGE JOIN         |      |       |            |\n|  6 |     \
  \ SORT JOIN         |      |  2048 | 2048 (0)   |\n|  7 |       TABLE ACCESS FULL|\
  \ T1   |       |            |\n|  8 |      SORT JOIN         |      | 11264 | 10240\
  \ (0)  |\n|  9 |       TABLE ACCESS FULL| T2   |       |            |\n| 10 |  \
  \  SORT JOIN           |      |   106K| 96256 (0)  |\n| 11 |     TABLE ACCESS FULL\
  \  | T3   |       |            |\n| 12 |  SORT JOIN             |      |   974K|\
  \ 865K (0)   |\n| 13 |   TABLE ACCESS FULL    | T4   |       |            |\n--------------------------------------------------------\n\
  ```\n\n在下面的例子中，`SELECT` 子句中仅引用了 `WHERE` 子句中已引用的列之一。需要注意的是，除了操作 6 之外，所有其他排序都使用了更小的工作区，而且即使在两种情况下执行计划相同，这一点也成立。同时请注意，查询优化器的估算（`OMem`\
  \ 列）已经考虑到了这种差异。\n\n```sql\nSELECT `t1.id, t2.id, t3.id, t4.id` FROM t1, t2, t3,\
  \ t4\nWHERE t1.id = t2.t1_id\nAND t2.id = t3.t2_id\nAND t3.id = t4.t3_id\nAND t1.n\
  \ = 19\n```\n\n```\n-----------------------------------------------------------\n\
  | Id | Operation                | Name | `OMem` | `Used-Mem` |\n-----------------------------------------------------------\n\
  |  1 |  MERGE JOIN              |      |       |            |\n|  2 |   SORT JOIN\
  \              |      |  4096 | 4096   (0) |\n|  3 |    MERGE JOIN            |\
  \      |       |            |\n|  4 |     SORT JOIN            |      |  2048 |\
  \ 2048   (0) |\n|  5 |      MERGE JOIN          |      |       |            |\n\
  |  6 |       SORT JOIN          |      |  2048 | 2048   (0) |\n|  7 |        TABLE\
  \ ACCESS FULL | T1   |       |            |\n|  8 |       SORT JOIN          | \
  \     |  4096 | 4096   (0) |\n|  9 |        TABLE ACCESS FULL | T2   |       | \
  \           |\n| 10 |     SORT JOIN            |      | 36864 | 32768  (0) |\n|\
  \ 11 |      TABLE ACCESS FULL   | T3   |       |            |\n| 12 |   SORT JOIN\
  \              |      |   337K| 299K (0)   |\n| 13 |    TABLE ACCESS FULL     |\
  \ T4   |       |            |\n-----------------------------------------------------------\n\
  ```\n\n**磁盘排序**\n\n当工作区太小而无法容纳所有数据时，数据库引擎会分几个步骤处理排序。这些步骤在下面的列表中详细说明。显然，实际的步骤数不仅取决于数据量，还取决于工作区的大小。\n\
  \n1.  数据从表中读取并存储到工作区。在存储时，会构建一个根据排序条件组织数据的结构。在此示例中，数据根据 `id` 列排序。这是图 10-8 中的步骤 1。\n\
  2.  当工作区已满时，其部分内容会被溢出到用户临时表空间中的一个临时段。这种类型的数据批次称为*排序运行*。请注意，所有数据不仅存储在工作区中，也存储在临时段中。这是图\
  \ 10-8 中的步骤 2。\n\n![image](img/1008.jpg)\n\n**图 10-8.** *磁盘排序，第一次排序运行*\n\n3.  由于数据已溢出到临时段，工作区中释放出了一些可用空间。因此，可以继续读取输入数据并存储到工作区中。这是图\
  \ 10-9 中的步骤 3。\n4.  当工作区再次变满时，另一个排序运行被存储到临时段中。这是图 10-9 中的步骤 4。\n\n![image](img/1009.jpg)\n\
  \n**图 10-9.** *磁盘排序，第二次排序运行*\n\n5.  当所有数据都被排序并存储到临时段中时，就到了合并它们的时候了。合并阶段是必要的，因为每个排序运行都是独立排序的。为了执行合并，会从每个排序运行中读取一些数据。例如，当\
  \ id 等于 11 的行存储在排序运行 1 中时，id 等于 12 的行则存储在排序运行 2 中。换句话说，合并利用了数据在溢出到临时段之前已被排序这一事实，以便顺序读取每个排序运行。这是图\
  \ 10-10 中的步骤 5。\n6.  一旦有正确排序的数据可用，就可以将其返回给父操作。这是图 10-10 中的步骤 6。\n\n![image](img/1010.jpg)\n\
  \n**图 10-10.** *磁盘排序，合并阶段*\n\n\n\n在刚才描述的例子中，数据只被写入和从临时段读取了一次。这种排序称为 **`一次排序`**。当工作区的大小远小于待排序数据量时，则需要多个合并阶段。在这种情况下，数据会被多次写入和从临时段读取。这种排序称为\
  \ **`多次排序`**。显然，从性能角度看，一次排序应比多次排序更快。\n\n为了识别这两种排序类型，您可以使用 `dbms_xplan` 包生成的输出。让我们看一下基于上一节已使用的四表连接的输出示例。此输出中显示了两个额外的列：`1Mem`\
  \ 和 `Used-Tmp`。前者是一次排序所需估计的内存量。后者是该操作在执行期间使用的临时段实际大小。如果没有可用值，则表示已执行内存排序。另外，请注意，对于使用临时空间的操作，方括号中的值不再为\
  \ 0。它们的值被设置为为该排序执行的传递次数。换句话说，虽然操作 10 是一次排序，但操作 12 是多次（九次）排序。\n\n```sql\nSELECT t1.*,\
  \ t2.*, t3.*, t4.*\nFROM t1, t2, t3, t4\nWHERE t1.id = t2.t1_id\nAND t2.id = t3.t2_id\n\
  AND t3.id = t4.t3_id\nAND t1.n = 19\n```\n```\n-----------------------------------------------------------------------\n\
  | Id | Operation            | Name |  OMem | 1Mem | Used-Mem| Used-Tmp|\n| ---------------------------------------------------------------------\n\
  |   1|MERGE JOIN            |      |       |      |         |         |\n|   2|\
  \ SORT JOIN            |      | 37888 | 37888|32768 (0)|         |\n|   3|  MERGE\
  \ JOIN          |      |       |      |         |         |\n|   4|   SORT JOIN          |      |  5120\
  \ |  5120| 4096 (0)|         |\n|   5|   MERGE JOIN         |      |       |      |        \
  \ |         |\n|   6|    SORT JOIN         |      |  3072 |  3072| 2048 (0)|        \
  \ |\n|   7|     TABLE ACCESS FULL| T1   |       |      |         |         |\n|  \
  \ 8|    SORT JOIN         |      | 23552 |23552 |20480 (0)|         |\n|   9|    \
  \ TABLE ACCESS FULL| T2   |       |      |         |         |\n|  10|   SORT JOIN          |      |  108K\
  \ |  108K|74752 (1)|    1024 |\n|  11|    TABLE ACCESS FULL | T3   |       |      |        \
  \ |         |\n|  12|SORT JOIN             |      | 1251K |  576K|74752 (9)|    2048\
  \ |\n|  13| TABLE ACCESS FULL    | T4   |       |      |         |         |\n-----------------------------------------------------------------------\n\
  ```\n\n***\n\n`注意` 通常，`dbms_xplan` 包的输出显示的是以字节为单位的内存大小值。不幸的是，正如 第 6 章 中指出的，`Used-Tmp`\
  \ 列中的值必须乘以 `1,024` 才能得到字节数。例如，在前面的输出中，操作 10 和 12 分别使用了 1MB 和 2MB 的临时空间。\n\n***\n\
  \n##### 哈希连接\n\n本节描述哈希连接的工作原理。首先给出其一般行为描述以及两表和四表连接的一些示例，接着描述处理期间使用的工作区。最后，描述一种特殊的优化技术——索引连接。所有示例均基于脚本\
  \ `hash_join.sql`。\n\n#### 概念\n\n哈希连接处理的两组数据称为 **`构建输入`** 和 **`探测输入`**。构建输入是左侧输入，探测输入是右侧输入。如\
  \ 图 10-11 所示，使用构建输入的每一行，在内存中（或在内存不足时使用临时空间）构建一个哈希表。请注意，为此目的使用的哈希键是基于用作连接条件的列计算的。一旦哈希表包含了构建输入的所有数据，就开始处理探测输入。每一行都会针对哈希表进行探测，以查明其是否满足连接条件。显然，只返回匹配的行。\n\
  \n![image](img/1011.jpg)\n**图 10-11.** 哈希连接执行的处理概览\n\n哈希连接具有以下特性：\n\n*   每个子节点只执行一次。\n\
  *   哈希表仅在左侧输入上构建。因此，它通常在最小的输入上构建。\n*   在返回第一行之前，必须完全处理左侧输入。\n*   不支持交叉连接、theta 连接和分区外连接。\n\
  \n#### 两表连接\n\n以下是一个处理两表间哈希连接的简单执行计划示例。该示例还展示了如何通过 `leading` 和 `use_hash` 提示来强制使用哈希连接。\n\
  \n```sql\nSELECT /*+ leading(t1) use_hash(t2) */ *\nFROM t1, t2\nWHERE t1.id = t2.t1_id\n\
  AND t1.n = 19\n```\n```\n----------------------------------\n| Id | Operation          |\
  \ Name |\n----------------------------------\n|   0| SELECT STATEMENT   |      |\n\
  |*  1|  HASH JOIN         |      |\n|*  2|   TABLE ACCESS FULL| T1   |\n|   3|  \
  \ TABLE ACCESS FULL| T2   |\n----------------------------------\n```\n```\n   1\
  \ - access(\"T1\".\"ID\"=\"T2\".\"T1_ID\")\n   2 - filter(\"T1\".\"N\"=19)\n```\n\
  \n如 第 6 章 所述，`HASH JOIN` 操作属于非关联组合类型。这意味着两个子节点仅处理一次且彼此独立。在这种情况下，执行计划的处理过程可以总结如下：\n\
  \n*   通过全表扫描读取表 `t1` 的所有行，应用限制条件 `n=19`，并用结果行构建哈希表。为构建哈希表，对用作连接条件的列 `(id)` 应用哈希函数。\n\
  *   通过全表扫描读取表 `t2` 的所有行，对用作连接条件的列 `(t1_id)` 应用哈希函数，并探测哈希表。如果找到匹配项，则返回结果行。\n\n`HASH\
  \ JOIN` 操作（与其他非关联组合操作一样）最重要的限制是无法利用索引来应用连接条件。这意味着仅当存在限制条件时，索引才能用作访问路径。因此，为了选择访问路径，有必要对两个表都应用\
  \ 第 9 章 中讨论的方法。例如，如果限制条件 `n=19` 具有良好的选择性，则创建一个索引来应用它可能是有用的。\n\n```sql\nCREATE INDEX\
  \ t1_n ON t1 (n)\n```\n\n实际上，有了这个索引，可能会使用以下执行计划。请注意，表 `t1` 不再通过全表扫描访问。\n\n```\n\
  --------------------------------------------\n| Id | Operation                    |\
  \ Name |\n--------------------------------------------\n|   0| SELECT STATEMENT            \
  \ |      |\n|*  1|  HASH JOIN|                  |      |\n|   2|   TABLE ACCESS\
  \ BY INDEX ROWID| T1   |\n|*  3|    INDEX RANGE SCAN          | T1_N |\n|   4|  \
  \ TABLE ACCESS FULL          | T2   |\n--------------------------------------------\n\
  ```\n```\n   1 - access(\"T1\".\"ID\"=\"T2\".\"T1_ID\")\n   3 - access(\"T1\".\"\
  N\"=19)\n```\n\n\n\n#### 四表连接\n\n以下执行计划是一个典型的左深树示例，使用哈希连接实现（有关图形表示，请参考图 10-2）。此示例还展示了如何通过提示`leading`和`use_hash`来强制使用哈希连接。\n\
  \n```\nSELECT /*+ leading(t1 t2 t3) use_hash(t2 t3 t4) */ t1.*, t2.*, t3.*, t4.*\n\
  FROM t1, t2, t3, t4\nWHERE t1.id = t2.t1_id\nAND t2.id = t3.t2_id\nAND t3.id = t4.t3_id\n\
  AND t1.n = 19\n------------------------------------\n| Id | Operation          \
  \  | Name |\n------------------------------------\n|   0| SELECT STATEMENT     |\
  \      |\n|*  1|  HASH JOIN           |      |\n|*  2|   HASH JOIN          |  \
  \    |\n|*  3|    HASH JOIN         |      |\n|*  4|     TABLE ACCESS FULL| T1 \
  \  |\n|   5|     TABLE ACCESS FULL| T2   |\n|   6|    TABLE ACCESS FULL | T3   |\n\
  |   7|   TABLE ACCESS FULL  | T4   |\n------------------------------------\n   1\
  \ - access(\"T3\".\"ID\"=\"T4\".\"T3_ID\")\n   2 - access(\"T2\".\"ID\"=\"T3\".\"\
  T2_ID\")\n   3 - access(\"T1\".\"ID\"=\"T2\".\"T1_ID\")\n   4 - filter(\"T1\".\"\
  N\"=19)\n```\n\n此类执行计划的处理过程总结如下：\n\n* 表`t1`通过全表扫描读取，应用限制条件`n=19`，并创建一个包含结果行的哈希表。\n\
  * 表`t2`通过全表扫描读取，并探测前一步创建的哈希表。然后，创建一个包含结果行的哈希表。\n* 表`t3`通过全表扫描读取，并探测前一步创建的哈希表。然后创建一个包含结果行的哈希表。\n\
  * 表`t4`通过全表扫描读取，并探测前一步创建的哈希表。返回结果行。只有在表`t1`、`t2`和`t3`都已完全处理完毕后，才能返回第一行。相反，要返回第一行，则无需完全处理表`t4`。\n\
  \n哈希连接的一个独特性质是它们也支持右深树和锯齿形树。以下执行计划是前者的示例（有关图形表示，请参考图 10-3）。与上一个示例相比，只有 SQL 语句中指定的提示不同。\n\
  \n```\nSELECT /*+ leading(t3 t4 t2) use_hash(t1 t2 t4) */ t1.*, t2.*, t3.*, t4.*\n\
  FROM t1, t2, t3, t4\nWHERE t1.id = t2.t1_id\nAND t2.id = t3.t2_id\nAND t3.id = t4.t3_id\n\
  AND t1.n = 19\n-------------------------------------\n| Id  | Operation        \
  \    | Name |\n-------------------------------------\n|   0 | SELECT STATEMENT \
  \    |      |\n|*  1 |  HASH JOIN           |      |\n|*  2 |   TABLE ACCESS FULL\
  \  | T1   |\n|*  3 |   HASH JOIN          |      |\n|   4 |    TABLE ACCESS FULL\
  \ | T2   |\n|*  5 |    HASH JOIN         |      |\n|   6 |     TABLE ACCESS FULL|\
  \ T3   |\n|   7 |     TABLE ACCESS FULL| T4   |\n-------------------------------------\n\
  \   1 - access(\"T1\".\"ID\"=\"T2\".\"T1_ID\")\n   2 - filter(\"T1\".\"N\"=19)\n\
  \   3 - access(\"T2\".\"ID\"=\"T3\".\"T2_ID\")\n   5 - access(\"T3\".\"ID\"=\"T4\"\
  .\"T3_ID\")\n```\n\n两个执行计划（即左深树和右深树）之间的区别之一是在给定时间使用的活动工作区（即哈希表）的数量。对于左深树，最多同时有两个工作区可用。此外，当处理最后一个表时，只需要一个工作区。另一方面，在右深树中，在几乎整个执行过程中，分配和探测的工作区数量（等于连接的数量）。\n\
  \n动态性能视图`v$sql_workarea_active`提供有关活动工作区的信息。以下查询显示了当前正在执行上述执行计划的会话所使用的工作区。`operation_id`列用于将工作区与执行计划中的操作关联起来，`actual_mem_used`列显示大小（以字节为单位），`tempseg_size`和`tablespace`列提供了临时空间使用情况的信息。\n\
  \n```\nSQL> SELECT operation_id, operation_type, actual_mem_used, tempseg_size,\
  \ tablespace\n  2 FROM v$session s, v$sql_workarea_active w\n  3 WHERE s.sid = w.sid\n\
  \  4 AND s.sid = 87;\n\nOPERATION_ID OPERATION_TYPE ACTUAL_MEM_USED TEMPSEG_SIZE\
  \ TABLESPACE\n------------ -------------- --------------- ------------ ----------\n\
  \           1 HASH-JOIN                57344\n           3 HASH-JOIN           \
  \    178176\n           5 HASH-JOIN               196608      1048576 TEMP\n```\n\
  \n#### 工作区\n\n为了处理哈希连接，需要使用内存中的工作区来存储哈希表。如果工作区足够大以存储整个哈希表，则哈希连接完全在内存中处理。如果工作区不够大，数据会溢出到临时段中。本章前面已经解释了如何判断连接是否完全在内存中执行。\n\
  \n我在第 5 章中讨论了工作区配置（大小调整）。你可能还记得，有两种方法可以执行大小调整。你使用哪种方法取决于初始化参数`workarea_size_policy`的值。\n\
  \n`auto:`\n\n数据库引擎自动进行工作区的大小调整。专用于一个实例的 PGA 总量由初始化参数`pga_aggregate_target`限制，或者从\
  \ Oracle 数据库 11g 开始，由初始化参数`memory_target`限制。\n\n`manual:`\n\n初始化参数`hash_area_size`限制单个工作区的最大大小。\n\
  \n##### 索引连接\n\n索引连接只能使用哈希连接执行。因此，它们可以被视为哈希连接的一种特殊情况。它们的目的是通过连接属于同一个表的两个或多个索引来避免昂贵的全表扫描。当一个表有许多被索引的列，而\
  \ SQL 语句仅引用其中少数几列时，这可能非常有用。以下查询是一个示例。请注意该查询如何只引用一个表，但出乎意料的是，执行的是连接而不是单表访问。同样重要的是要注意，两个数据集之间的连接条件基于\
  \ rowid。此示例还展示了如何通过提示`index_join`来强制使用索引连接。\n\n```\nSELECT /*+ index_join(t4 t4_n\
  \ t4_pk) */ id, n\nFROM t4\nWHERE id BETWEEN 10\nAND 20\nAND n < 100\n\n-----------------------------------------------\n\
  | Id  | Operation          | Name             |\n-----------------------------------------------\n\
  |   0 | SELECT STATEMENT   |                  |\n|*  1 |  VIEW              | index$_join$_001\
  \ |\n|*  2 |   HASH JOIN        |                  |\n|*  3 |    INDEX RANGE SCAN|\
  \ T4_N             |\n|*  4 |    INDEX RANGE SCAN| T4_PK            |\n-----------------------------------------------\n\
  \    1 - filter(\"ID\"<=20 AND \"N\"<100 AND \"ID\">=10)\n    2 - access(ROWID=ROWID)\n\
  \    3 - access(\"N\"<100)\n    4 - access(\"ID\">=10 AND \"ID\"<=20)\n```\n\n\n\
  \n##### 外连接\n\n前面描述的三种基本连接方法都支持外连接。当执行外连接时，在执行计划中唯一可见的区别是连接操作附加了`OUTER`关键字。为了说明这一点，下面的\
  \ SQL 语句由于优化器提示的作用，执行的是外哈希连接。请注意，即使 SQL 语句使用了新的连接语法，其谓词仍然使用了基于操作符`(+)`的 Oracle 专有语法。\n\
  \n```sql\nSELECT /*+ leading(t1) use_hash(t2) */ *\nFROM t1 LEFT JOIN t2 ON (t1.id\
  \ = t2.t1_id)\n```\n\n```\n-----------------------------------\n| Id  | Operation\
  \          | Name |\n-----------------------------------\n|   0 | SELECT STATEMENT\
  \   |      |\n|*  1 |  HASH JOIN OUTER   |      |\n|   2 |   TABLE ACCESS FULL|\
  \  T1  |\n|   3 |   TABLE ACCESS FULL|  T2  |\n-----------------------------------\n\
  \n   1 - access(\"T1\".\"ID\"=\"T2\".\"T1_ID\"(+))\n```\n\n外连接的一个重要限制是，保留表（例如前面\
  \ SQL 语句中的表`t1`）必须是连接操作的左侧输入。然而，从 Oracle Database 10*g*开始，这个限制被部分解除了。实际上，数据库引擎支持*右*外哈希连接。下面的执行计划基于与前面相同的\
  \ SQL 语句，说明了这一点。实际上，查询优化器会选择在较小的结果集上构建哈希表。当然，这有助于限制工作区的大小。在本例中，由于表`t1`小于表`t2`，为了演示目的，需要使用提示`swap_join_inputs`来强制查询优化器交换两个连接输入。\n\
  \n```sql\nSELECT /*+ leading(t1) use_hash(t2) swap_join_inputs(t2) */ *\nFROM t1\
  \ LEFT JOIN t2 ON (t1.id = t2.t1_id)\n```\n\n```\n--------------------------------------\n\
  | Id  | Operation             | Name |\n--------------------------------------\n\
  |   0 | SELECT STATEMENT      |      |\n|*  1 |  HASH JOIN RIGHT OUTER|      |\n\
  |   2 |   TABLE ACCESS FULL   | T2   |\n|   3 |   TABLE ACCESS FULL   | T1   |\n\
  --------------------------------------\n\n   1 - access(\"T1\".\"ID\"=\"T2\".\"\
  T1_ID\"(+))\n```\n\n因此，每当查询优化器需要为包含外连接的 SQL 语句生成执行计划时，它的选择是有限的。唯一的例外是从 Oracle Database\
  \ 10*g*开始的哈希连接。\n\n##### 选择连接方法\n\n要选择连接方法，必须考虑以下问题：\n\n*   优化器目标，即首行优化（first-rows）和全行优化（all-rows）\n\
  *   待优化的连接类型以及谓词的选择性\n*   是否并行执行连接\n\n接下来的章节将基于这三个标准，讨论如何选择连接方法，或者更具体地说，如何在嵌套循环连接、合并连接和哈希连接之间做出选择。\n\
  \n#### 首行优化\n\n在首行优化下，总的响应时间是查询优化器的次要目标。返回第一行数据的响应时间才是其最重要的目标。因此，为了成功的首行优化，连接应该在找到第一个匹配行后立即返回，而不是在处理完所有行之后。为此，嵌套循环连接通常是最佳选择。哈希连接仅在一定程度上支持部分执行，偶尔有用。相比之下，合并连接很少适合首行优化。\n\
  \n#### 全行优化\n\n在全行优化下，返回整个结果集的响应时间是查询优化器最重要的目标。因此，为了成功的全行优化，连接应尽快完全执行。选择最佳连接方法时，处理/返回行的绝对数量并不重要。关键的是处理/返回行的相对数量，即选择性。可以区分两种主要情况：\n\
  \n*   当选择性高时，哈希连接通常是最佳选择。\n*   当选择性低时，嵌套循环连接通常是最佳选择。通常，只有当选择性是限制条件而非连接条件的结果时，才会考虑哈希连接和合并连接。\n\
  \n一般来说，只有当结果集已经排序，或者由于技术限制无法使用哈希连接时，才会考虑合并连接（见下一节）。\n\n##### 支持的连接方法\n\n要选择连接方法，了解需要执行哪种类型的连接至关重要。实际上，并非所有连接方法都支持所有类型的连接。表\
  \ 10-1 总结了在什么情况下可用哪些方法。\n\n**表 10-1.** *每种连接方法支持的连接类型*\n\n| **连接** | **嵌套循环连接**\
  \ | **哈希连接** | **合并连接** |\n| --- | --- | --- | --- |\n| 笛卡尔连接 | ![image](img/P0001.jpg)\
  \ |  | ![image](img/P0001.jpg) |\n| Theta 连接 | ![image](img/P0001.jpg) |  | ![image](img/P0001.jpg)\
  \ |\n| 等值连接 | ![image](img/P0001.jpg) | ![image](img/P0001.jpg) | ![image](img/P0001.jpg)\
  \ |\n| 半连接/反连接 | ![image](img/P0001.jpg) | ![image](img/P0001.jpg) | ![image](img/P0001.jpg)\
  \ |\n| 外连接 | ![image](img/P0001.jpg) | ![image](img/P0001.jpg) | ![image](img/P0001.jpg)\
  \ |\n| 分区外连接 | ![image](img/P0001.jpg) |  | ![image](img/P0001.jpg) |\n\n#### 并行连接\n\
  \n所有连接方法都可以并行执行。然而，如图 10-12 所示，它们的扩展性不同。根据并行度的不同，一种方法可能比另一种更快。因此，为了选出最佳连接方法，了解是否使用并行处理以及并行度是多少至关重要。请注意，第\
  \ 11 章 涵盖了并行处理。\n\n![image](img/1012.jpg)\n\n**图 10-12.** *不同并行度下的性能比较。此图显示了在具有\
  \ 8 个 CPU 的系统上执行的一个两表连接（50K 行和 94M 行）。*\n\n### 分区连接\n\n*分区连接*（不应与分区外连接混淆）是一种优化技术，查询优化器仅将其应用于合并连接和哈希连接。分区连接用于减少处理连接所使用的\
  \ CPU、内存，以及在 RAC 情况下的网络资源。基本思想是将一个大连接分解为几个小连接。分区连接可以是完全的，也可以是部分的。接下来的章节描述了这两种方案。所有示例查询均在脚本`pwj.sql`中提供。\n\
  \n* * *\n\n**注意** 分区连接需要分区表。因此，仅当使用企业版的分区选项时才可用。\n\n* * *\n\n\n## 全分区连接\n\n为了说明全分区连接的操作，让我们首先描述不使用此优化时连接是如何执行的。图\
  \ 10-13 显示了两个分区表之间的连接。所有两表行的单个连接由单个服务器进程执行。\n\n![image](img/1013.jpg)\n\n**图 10-13.**\
  \ 不使用分区连接的两个分区表连接\n\n当两个表在其连接键上进行等分区时，数据库引擎能够利用全分区连接。它不是执行一个大的连接，而是如图 10-14 所示，执行多个较小的连接（本例中为\
  \ 4 个）。请注意，这是可能的，因为表的分区方式相同。因此，例如存储在表 1 的分区 1 中的每一行，在表 2 的分区 1 中只能有匹配的行。\n\n将大连接分解为几个较小连接最有用的功能之一是能够并行化执行。实际上，数据库引擎能够为每个连接启动一个单独的从属进程。例如，在图\
  \ 10-14 中，服务器进程协调四个从属进程来执行全分区连接。（第 11 章提供了关于并行处理的更多信息。）\n\n![image](img/1014.jpg)\n\
  \n**图 10-14.** 使用全分区连接的两个表连接\n\n图 10-15 显示了基于脚本 `pwj_performance.sql` 的性能测试结果。该测试旨在重现如图\
  \ 10-14 所示的执行，具体来说，是连接具有四个分区的两个表。在此特定情况下，表分别包含 1,000,000 和 10,000,000 行。请注意，并行执行的程度等于分区数，即四个。\n\
  \n![image](img/1015.jpg)\n\n**图 10-15.** 使用和不使用全分区连接时，两表连接的响应时间\n\n要识别是否使用了全分区连接，需要查看执行计划。如果分区操作出现在连接操作之前，则意味着正在使用全分区连接。在下面的执行计划中，分区操作\
  \ `PARTITION HASH ALL` 出现在连接操作 `HASH JOIN` 之前。注意你可以使用提示 `pq_distribute` 来强制使用全分区连接。\n\
  \n```\nSELECT /*+ ordered use_hash(t2p) pq_distribute(t2p none none) */ *\nFROM\
  \ t1p, t2p\nWHERE t1p.id = t2p.id\n\n------------------------------------\n| Id\
  \  | Operation           | Name |\n------------------------------------\n|   0 |\
  \ SELECT STATEMENT    |      |\n|   1 |  PARTITION HASH ALL |      |\n|   2 |  \
  \ HASH JOIN         |      |\n|   3 |    TABLE ACCESS FULL| T1P  |\n|   4 |    TABLE\
  \ ACCESS FULL| T2P  |\n------------------------------------\n```\n\n上述执行计划显示了一个串行的全分区连接。下面显示的是相同\
  \ SQL 语句在并行处理时使用的执行计划。同样，分区操作 `PX PARTITION HASH ALL` 出现在连接操作 `HASH JOIN` 之前。（第\
  \ 11 章提供了关于用于并行处理的操作的更多信息。）\n\n```\n--------------------------------------------\n\
  | Id  | Operation               | Name     |\n--------------------------------------------\n\
  |   0 | SELECT STATEMENT        |          |\n|   1 |  PX COORDINATOR         |\
  \          |\n|   2 |   PX SEND QC (RANDOM)   | :TQ10000 |\n|   3 |    PX PARTITION\
  \ HASH ALL|          |\n|   4 |     HASH JOIN           |          |\n|   5 |  \
  \    TABLE ACCESS FULL  | T1P      |\n|   6 |      TABLE ACCESS FULL  | T2P    \
  \  |\n--------------------------------------------\n```\n\n由于全分区连接需要两个等分区的表，在物理数据库设计期间使用此优化技术需要特别注意。换句话说，对预期会频繁进行大规模连接的表进行等分区是至关重要的。如果你不对它们进行等分区，就无法从全分区连接中受益。\n\
  \n同样重要的是要注意，所有分区方法都受支持，并且全分区连接能够连接分区与子分区。为了说明，假设有两个表：`sales` 和 `customers`。连接键是\
  \ `customer_id`。如果两个表都进行哈希分区，具有相同数量的分区，并且都使用连接键作为分区键，就有可能利用全分区连接。请记住，像 `sales` 这样的表（换句话说，包含历史数据的表）通常需要用范围分区进行分区。在这种情况下，可以对\
  \ `sales` 表进行复合分区：分区级别使用范围，子分区级别使用哈希，以同时满足两个需求。因此，全分区连接在 `customers` 表的哈希分区与 `sales`\
  \ 表的子分区之间执行。\n\n## 部分分区连接\n\n与全分区连接相反，部分分区连接不需要两个等分区的表。此外，只需要一个表根据连接键进行分区；另一个表（可以是分区或未分区的）基于连接键动态分区。部分分区连接的另一个特点是它们只能并行执行。图\
  \ 10-16 说明了一个部分分区连接。在这种情况下，其中一个表根本没有分区。在执行期间，数据库引擎启动两组并行从属进程。第一组读取未分区的表（表 2）并根据连接键分发数据。第二组从第一组接收数据，每个从属进程读取分区表的一个分区，然后执行其那部分的连接。\n\
  \n![image](img/1016.jpg)\n\n**图 10-16.** 使用部分分区连接的两个表连接\n\n要识别是否使用了部分分区连接，需要查看执行计划。如果\
  \ `PX SEND` 操作的类型是 `PARTITION (KEY)`，则意味着正在使用部分分区连接。在以下示例中，操作 7 提供了该信息：\n\n```\n\
  SELECT /*+ ordered use_hash(t2p) pq_distribute(t2p none partition) */ *\nFROM t1p,\
  \ t2p\nWHERE t1p.id = t2p.id\n\n-----------------------------------------------\n\
  | Id  | Operation                   | Name    |\n-----------------------------------------------\n\
  |   0 | SELECT STATEMENT            |         |\n|   1 |  PX COORDINATOR       \
  \      |         |\n|   2 |   PX SEND QC (RANDOM)       | :TQ10001|\n|   3 |   \
  \ HASH JOIN BUFFERED       |         |\n|   4 |     PX PARTITION HASH ALL   |  \
  \       |\n|   5 |      TABLE ACCESS FULL      | T1P     |\n|   6 |     PX RECEIVE\
  \              |         |\n|   7 |      PX SEND PARTITION (KEY)| :TQ10000|\n| \
  \  8 |       PX BLOCK ITERATOR     |         |\n|   9 |        TABLE ACCESS FULL\
  \    | T2P     |\n-----------------------------------------------\n```\n\n在实践中，部分分区连接不一定会带来性能提升。实际上，常规连接可能比部分分区连接更快。换句话说，使用部分分区连接可能对性能有害。因此，你很少会看到查询优化器使用这种优化技术。\n\
  \n\n##### 转换\n\n查询优化器依靠转换来提升查询性能。其目标是生成语义等价的 SQL 语句（即产生相同结果的语句），这些语句要么更容易优化，要么具有更广阔的搜索空间。只要技术上可行，某些转换就会被执行，因为查询优化器假定它们总能带来更好的性能。另一些被称为*基于成本的转换*的操作，则仅在转换能带来更低开销时才会被应用。接下来的章节将描述与连接相关的四种转换：消除冗余连接、将外连接转换为内连接、子查询解嵌套和星型转换。\n\
  \n#### 连接消除\n\n在某些特定情况下，从 Oracle Database 10*g* Release 2 开始，查询优化器能够完全避免执行一个连接，即使\
  \ SQL 语句显式要求进行连接。这种优化技术被称为*连接消除*。当使用包含连接的视图时，这种转换特别有用。但请注意，连接消除不仅限于视图，它也可以应用于不带视图的\
  \ SQL 语句。\n\n让我们看一个基于脚本 `join_elimination.sql` 的示例，来阐释这种优化技术。以下 SQL 语句定义了该视图。请注意，表\
  \ `t1` 和表 `t2` 之间存在主从关系。事实上，表 `t2` 通过其列 `t1_id` 引用了表 `t1` 的主键。\n\n```sql\nCREATE\
  \ VIEW v AS\nSELECT t1.id AS t1_id, t1.n AS t1_n, t2.id AS t2_id, t2.n AS t2_n\n\
  FROM t1, t2\nWHERE t1.id = t2.t1_id\n```\n\n当引用了所有列时，如下面的示例所示，连接会正常执行。这并不意外。\n\n\
  ```sql\nSELECT * FROM v\n```\n\n```\n-----------------------------------\n| Id \
  \ | Operation          | Name |\n-----------------------------------\n|   0 | SELECT\
  \ STATEMENT   |      |\n|*  1 |  HASH JOIN         |      |\n|   2 |   TABLE ACCESS\
  \ FULL| T1   |\n|   3 |   TABLE ACCESS FULL| T2   |\n-----------------------------------\n\
  \n   1 - access(\"T1\".\"ID\"=\"T2\".\"T1_ID\")\n```\n\n然而，如下面的示例所示，当仅引用了子表中定义的列时，查询优化器便能够消除该连接。它可以这样做，是因为存在一个已验证的外键约束，该约束保证了表\
  \ `t2` 中的所有行都引用表 `t1` 中的一行。\n\n```sql\nSELECT t2_id, t2_n FROM v\n```\n\n```\n----------------------------------\n\
  | Id  | Operation         | Name |\n----------------------------------\n|   0 |\
  \ SELECT STATEMENT  |      |\n|   1 |  TABLE ACCESS FULL| T2   |\n----------------------------------\n\
  ```\n\n#### 外连接转内连接\n\n如果一个外连接是多余的，查询优化器可以将其转换为内连接。下面的示例基于脚本 `outer_to_inner.sql`，阐释了这种转换。第一条\
  \ SQL 语句对应的执行计划，由于使用了提示 `no_outer_join_to_inner`（此提示仅在 Oracle Database 11*g* 及以上版本可用），实现了一个外连接（`HASH\
  \ JOIN OUTER`）。换句话说，没有应用任何转换。而在第二条 SQL 语句对应的执行计划中，不仅连接不再是外连接，而且对于限制条件 `t2.id IS\
  \ NOT NULL` 也没有应用任何谓词。\n\n```sql\nSELECT /*+ no_outer_join_to_inner */ *\nFROM t1,\
  \ t2\nWHERE t1.id = t2.t1_id(+)\nAND t2.id IS NOT NULL\n```\n\n```\n-------------------------------------\n\
  | Id  | Operation            | Name |\n-------------------------------------\n|\
  \   0 | SELECT STATEMENT     |      |\n|*  1 |  FILTER              |      |\n|*\
  \  2 |  HASH JOIN OUTER     |      |\n|   3 |   TABLE ACCESS FULL  | T1   |\n| \
  \  4 |   TABLE ACCESS FULL  | T2   |\n-------------------------------------\n\n\
  \   1 - filter(\"T2\".\"ID\" IS NOT NULL)\n   2 - access(\"T1\".\"ID\"=\"T2\".\"\
  T1_ID\"(+))\n```\n\n```sql\nSELECT *\nFROM t1, t2\nWHERE t1.id = t2.t1_id(+)\nAND\
  \ t2.id IS NOT NULL\n```\n\n```\n-----------------------------------\n| Id  | Operation\
  \          | Name |\n-----------------------------------\n|   0 | SELECT STATEMENT\
  \   |      |\n|*  1 |  HASH JOIN         |      |\n|   2 |   TABLE ACCESS FULL|\
  \ T1   |\n|   3 |   TABLE ACCESS FULL| T2   |\n-----------------------------------\n\
  \n   1 - access(\"T1\".\"ID\"=\"T2\".\"T1_ID\")\n```\n\n显然，这类 SQL 语句的质量应该受到质疑。但无论如何，查询优化器能够识别此类异常情况并避免执行不必要的处理，这是一件好事。\n\
  \n\n\n## 子查询展开\n\n简而言之，子查询展开的目的是将半连接和反连接子查询转换为常规连接。这样一来，查询优化器就能利用所有可用的连接方法。实际上，如果不进行子查询展开，执行子查询的基本方法是基于\
  \ `FILTER` 操作。下面的示例（基于脚本 `subquery_unnesting.sql`）说明了这一点。正如第 6 章所述，`FILTER` 操作是一种关联组合操作。因此，子查询（第\
  \ 3 和第 4 行）对于主查询（第 2 行）返回的每一行（实际上，如第 6 章所述，对于列 `t2.t1_id` 的每一个不同值）都会执行一次。\n\n```sql\n\
  SELECT *\nFROM t2\nWHERE EXISTS (SELECT /*+ no_unnest */ 1\n             FROM t1\n\
  \             WHERE t2.t1_id = t1.id\n             AND t1.pad IS NOT NULL)\n```\n\
  \n```\n----------------------------------------------\n| Id  | Operation       \
  \             | Name  |\n----------------------------------------------\n|   0 |\
  \ SELECT STATEMENT             |       |\n|*  1 |  FILTER                      |\
  \       |\n|   2 |   TABLE ACCESS FULL          | T2    |\n|*  3 |   TABLE ACCESS\
  \ BY INDEX ROWID| T1    |\n|*  4 |    INDEX UNIQUE SCAN         | T1_PK |\n----------------------------------------------\n\
  \n   1 - filter( EXISTS (SELECT /*+ NO_UNNEST */ 0 FROM \"T1\" \"T1\" WHERE\n  \
  \            \"T1\".\"ID\"=:B1 AND \"T1\".\"PAD\" IS NOT NULL))\n   3 - filter(\"\
  T1\".\"PAD\" IS NOT NULL)\n   4 - access(\"T1\".\"ID\"=:B1)\n```\n\n要生成此执行计划，必须在子查询中指定提示\
  \ `no_unnest`。换句话说，我不得不强制查询优化器不使用本节介绍的优化技术——子查询展开。实际上，如果没有 `no_unnest` 提示，查询优化器会展开子查询并产生下面的执行计划。请注意，半连接是通过\
  \ `HASH JOIN SEMI` 操作实现的。因此，表 `t1`（第 3 行）只被访问了一次。\n\n```\n-----------------------------------\n\
  | Id  | Operation          | Name |\n-----------------------------------\n|   0\
  \ | SELECT STATEMENT   |      |\n|*  1 |  HASH JOIN SEMI    |      |\n|   2 |  \
  \ TABLE ACCESS FULL| T2   |\n|*  3 |   TABLE ACCESS FULL| T1   |\n-----------------------------------\n\
  \n   1 - access(\"T2\".\"T1_ID\"=\"T1\".\"ID\")\n   3 - filter(\"T1\".\"PAD\" IS\
  \ NOT NULL)\n```\n\n即使在此示例中使用了哈希连接，也请注意查询优化器也可能选择使用其他连接方法。\n\n展开子查询可以总结为两个步骤。第一步，如下面的查询所示，是将子查询重写为内联视图。请注意，这不是一个有效的\
  \ SQL 语句，因为实现半连接 `(s=)` 的运算符在 SQL 中不可用（它仅在查询优化器内部使用）。\n\n```sql\nSELECT *\nFROM\
  \ t2, (SELECT id FROM t1 WHERE pad IS NOT NULL) sq\nWHERE t2.t1_id s= sq.id\n```\n\
  \n第二步，如这里所示，是将内联视图重写为常规连接：\n\n```sql\nSELECT *\nFROM t2, t1\nWHERE t2.t1_id s= t1.id\n\
  AND t1.pad IS NOT NULL\n```\n\n虽然前面的示例基于半连接，但相同的优化技术也用于反连接。不过请注意，这类转换并非总是能应用。例如，如果子查询包含集合运算符、某些类型的聚合或伪列\
  \ `rownum`，则无法使用子查询展开。\n\n## 星型转换\n\n*星型转换*是一种用于*星型模式*（也称为维度模型）的优化技术。这种模式由一个大型中心表（*事实表*）和若干其他表（*维度表*）组成。其主要特征是事实表引用维度表。图\
  \ 10-17 是一个基于示例模式 SH 的示例（《*示例模式*》手册对此有完整描述）。\n\n![image](img/1017.jpg)\n\n**图 10-17.**\
  \ 一个典型的星型模式\n\n以下是一个针对星型模式执行的典型查询：\n\n```sql\nSELECT c.cust_state_province, t.fiscal_month_name,\
  \ sum(s.amount_sold) AS amount_sold\nFROM sales s, customers c, times t, products\
  \ p\nWHERE s.cust_id = c.cust_id\nAND s.time_id = t.time_id\nAND s.prod_id = p.prod_id\n\
  AND c.cust_year_of_birth BETWEEN 1970 AND 1979\nAND p.prod_subcategory = 'Cameras'\n\
  GROUP BY c.cust_state_province, t.fiscal_month_name\nORDER BY c.cust_state_province,\
  \ sum(s.amount_sold) DESC\n```\n\n为了优化针对此星型模式的查询，查询优化器应该执行以下操作：\n\n1.  开始评估每个带有约束条件的维度表。\n\
  2.  汇总结果维度键的列表。\n3.  使用此列表从事实表中提取匹配的行。\n\n不幸的是，这种方法无法用常规连接实现。一方面，查询优化器一次只能连接两个数据集。另一方面，连接两个维度表会导致笛卡尔积。为了解决这个问题，数据库引擎实现了星型转换。\n\
  \n* * *\n\n**注意** 尽管星型转换最初在 1997 年随 Oracle8 引入，并在两年后的 Oracle8*i*中得到了显著增强——也就是说，它已经存在一段时间了——但其稳定性一直是个问题。可能自引入以来发布的每一个补丁集都修复了与之相关的错误。每当出现问题时，就会产生\
  \ `ORA-07445`、`ORA-00600` 错误或错误的结果。也就是说，我从 Oracle8*i* Release 2 开始就成功使用了这个功能。我的建议只是仔细测试它。如果有效，性能提升将是相当可观的。如果无效，至少在投入生产之前你就会知道。\n\
  \n* * *\n\n要利用星型转换，你需要满足两个基本要求。首先，必须启用该功能。你使用初始化参数 `star_transformation_enabled`\
  \ 来控制它。请注意，默认情况下，该功能是禁用的，因为参数设置为 `FALSE`。要启用它，应将其设置为 `temp_disable` 或 `TRUE`。其次，事实表上的每个外键必须有一个单列的位图索引。实际上，查询优化器也能够将\
  \ B 树索引动态转换为位图索引。但是，如果你想使用星型转换，最好首先创建位图索引。\n\n当初始化参数 `star_transformation_enabled`\
  \ 设置为 `temp_disable` 时，示例 SQL 语句将使用以下执行计划。此示例及后续示例均基于脚本 `star_transformation.sql`。\n\
  \n\n```\n--------------------------------------------------------------------------\n\
  | Id  | Operation                          | Name                    |\n--------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT                   |                         |\n|   1 |\
  \  SORT ORDER BY                     |                         |\n|   2 |   HASH\
  \ GROUP BY                    |                         |\n|*  3 |    HASH JOIN\
  \                       |                         |\n|   4 |     TABLE ACCESS FULL\
  \              | TIMES                   |\n|*  5 |     HASH JOIN              \
  \        |                         |\n|   6 |     PARTITION RANGE ALL          \
  \  |                         |\n|   7 |      TABLE ACCESS BY LOCAL INDEX ROWID|\
  \ SALES                |\n|   8 |       BITMAP CONVERSION TO ROWIDS  |         \
  \                |\n|   9 |        BITMAP AND                  |               \
  \          |\n|  10 |         BITMAP MERGE               |                     \
  \    |\n|  11 |          BITMAP KEY ITERATION      |                         |\n\
  |  12 |           BUFFER SORT              |                         |\n|  13 |\
  \            TABLE ACCESS BY INDEX ROWID| PRODUCTS             |\n|* 14 |      \
  \       INDEX RANGE SCAN       | PRODUCTS_PROD_SUBCAT_IX |\n|* 15 |            BITMAP\
  \ INDEX RANGE SCAN | SALES_PROD_BIX          |\n|  16 |          BITMAP MERGE  \
  \            |                         |\n|  17 |           BITMAP KEY ITERATION\
  \     |                         |\n|  18 |            BUFFER SORT             |\
  \                         |\n|* 19 |             TABLE ACCESS FULL      | CUSTOMERS\
  \               |\n|* 20 |            BITMAP INDEX RANGE SCAN | SALES_CUST_BIX \
  \         |\n|* 21 |      TABLE ACCESS FULL             | CUSTOMERS            \
  \   |\n--------------------------------------------------------------------------\n\
  \n    3 - access(\"S\".\"TIME_ID\"=\"T\".\"TIME_ID\")\n    5 - access(\"S\".\"CUST_ID\"\
  =\"C\".\"CUST_ID\")\n   14 - access(\"P\".\"PROD_SUBCATEGORY\"='Cameras')\n   15\
  \ - access(\"S\".\"PROD_ID\"=\"P\".\"PROD_ID\")\n   19 - filter(\"C\".\"CUST_YEAR_OF_BIRTH\"\
  >=1970 AND \"C\".\"CUST_YEAR_OF_BIRTH\"<=1979)\n   20 - access(\"S\".\"CUST_ID\"\
  =\"C\".\"CUST_ID\")\n   21 - filter(\"C\".\"CUST_YEAR_OF_BIRTH\">=1970 AND \"C\"\
  .\"CUST_YEAR_OF_BIRTH\"<=1979)\n```\n\n由于这个执行计划包含一些特殊操作，让我们详细看看它的操作流程：\n\n1.  执行从操作\
  \ 4 开始，对维度表 `times` 进行全表扫描。利用从它返回的数据，构建一个哈希表。这对于操作 3，即哈希连接是必要的。\n2.  操作 13 和 14\
  \ 访问维度表 `products` 并应用限制条件 `p.prod_subcategory='Cameras'`。\n3.  操作 12，`BUFFER SORT`，将操作\
  \ 13 返回的数据存储在缓冲区中。\n4.  操作 11，`BITMAP KEY ITERATION`，是一个关联组合操作。对于其第一个子操作（操作 12）返回的每一行，第二个子操作（操作\
  \ 15）会执行一次。在这个案例中，执行的是基于事实表上定义的位图索引的查找。请注意，这种查找只能使用位图索引完成。这就是为什么你需要在事实表的每个外键列上建立位图索引。\n\
  5.  操作 10，`BITMAP MERGE`，合并其子操作传递给它的位图。这个操作是必要的，因为一个位图索引的索引键可能只覆盖了索引表的一部分。\n6. \
  \ 操作 16 到 20 以与操作 10 到 15 处理维度表 `products` 相同的方式处理维度表 `customers`。实际上，每个应用了限制条件的维度都以相同方式处理。\n\
  7.  操作 9，`BITMAP AND`，组合从其两个子操作（10 和 16）传递过来的位图，并只保留匹配的条目。\n8.  操作 8，`BITMAP CONVERSION\
  \ TO ROWIDS`，将其子操作（9）传递的位图转换为事实表 `sales` 的 rowid。\n9.  操作 7 使用其子操作（8）传递的 rowid 访问事实表。\n\
  10. 利用操作 7 返回的行，构建一个哈希表。这对于操作 5，即哈希连接是必要的。请注意，操作 6 仅是信息性的，告诉你所有分区都被处理了。\n11. 操作\
  \ 21 对维度表 `customers` 进行全表扫描，并应用限制条件 `c.cust_year_of_birth BETWEEN 1970 AND 1979`。对于结果中的每一行，都会探测两个哈希连接（操作\
  \ 3 和 5）的哈希表。如果找到匹配的行，则将它们传递给操作 2。\n12. 操作 2，`HASH GROUP BY`，处理 `GROUP BY` 子句，并将结果行传递给操作\
  \ 1。\n13. 最后，操作 1，`SORT ORDER BY`，处理 `ORDER BY` 子句。\n\n总之，执行星型转换需要执行以下步骤：\n\n* \
  \  维度表与事实表上对应的位图索引进行“连接”。这个操作仅对应用了限制条件的维度表是必要的，在本例中是表 `products` 和 `customers`。\n\
  *   生成的位图被合并并转换为 rowid。然后，通过 rowid 访问事实表。\n*   维度表与从事实表中选择的数据进行连接。这个操作仅对在 `WHERE`\
  \ 子句之外引用了列的维度是必要的，在本例中，是表 `times` 以及再次出现的表 `customers`（这就是为什么表 `customers` 在执行计划中出现了两次）。\n\
  \n### 两个额外的优化技术\n\n你可以对这种基本行为应用两种额外的优化技术：临时表和位图连接索引。\n\n临时表的目的是避免维度表的重复处理。例如，在前面的执行计划中，不仅维度表\
  \ `customers` 被访问了两次并进行了全表扫描（操作 19 和 21），而且应用于它的谓词也执行了两次。其思路是只访问维度表一次，应用谓词，并将结果行存储在临时表中。当初始化参数\
  \ `star_transformation_enabled` 设置为 `TRUE` 时，就会启用这种优化技术。以下的执行计划是基于与之前相同的 SQL 语句，就是一个例子。请注意临时表\
  \ `sys_temp_0fd9d6600_2d2eac` 的创建（操作 1 到 3）及其使用（操作 22 和 24）。\n\n"
