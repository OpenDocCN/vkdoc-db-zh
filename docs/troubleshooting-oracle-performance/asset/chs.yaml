  \    SRC NDV    DENSITY    HIST NULLS    LEN MIN   MAX    SAMPSIZ`\n`...............................................................................`\n\
  \n`ID             A   9902   .000100989 NO   0        4   C102  C302   5001`\n`\
  \               B   12546  .000079706 NO   0        5   C102  C3026  5316`\n`VAL1\
