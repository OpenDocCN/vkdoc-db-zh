- '# 关于 OakTable 网络


  就其本身而言，OakTable 网络不过是一群喜欢与志同道合的人交流、保持联系的人——即那些对 Oracle 数据库技术持有科学方法（和探究精神）的人。


  这一切始于 1998 年的某个时候。当时，包括 Anjo Kolk、Cary Millsap、James Morle 在内的几位 Oracle 专家，开始以各种借口每年聚会一两次。每个人会带一瓶苏格兰威士忌或波本威士忌，作为回报，他们可以在我家的某个地板上睡觉。


  我们大部分时间都围坐在我的餐桌旁，周围散落着电脑、线缆、纸张和其他东西，讨论 Oracle，讲述轶事，并试验新的、更好的数据库操作方法。到了 2002 年春天，整个事情发展壮大了。一天晚上，我意识到有
  16 位世界知名的 Oracle 专家围坐在我的餐桌旁。我们三四个人挤一个房间睡觉，甚至早上还得借用邻居的淋浴间。Anjo Kolk 建议我们称自己为"OakTable
  网络"（以我的餐桌命名），大约两分钟后，`http://www.OakTable.net`就被注册了。


  现在，James Morle 和他的妻子 Elain 共同维护这个网站。尽管它更新内容的速度可能不如应有的那么频繁，但至少在提供链接、名称等方面还是有用的。我们也用它来发布"挑战"问题及答案。


  "挑战"是我们偶尔在会议期间进行的活动。向我们提出任何（技术性的）关于 Oracle 的问题，如果我们无法在 24 小时内找到答案（无论是肯定、否定还是一个解决方案），那么提问者将获得一件
  T 恤，上面印着他或她战胜了 OakTable。


  然而，"挑战"的使用不如我们期望的那么频繁，可能是因为看起来我们想被那些找不到答案的问题挑战。但事实恰恰相反——我们的目的是回答任何人的问题，无论这些问题看起来多么"简单"或"容易"。


  ## 成员


  我最近读了《`Operation Certain Death`》这本书，讲的是英国特种部队在塞拉利昂的一次行动。我想非常明确地说明，OakTable 成员的身体素质绝对无法与特种部队相提并论。事实上，完全不能。


  但书中作者观察到，特种部队士兵都完全信奉一条格言：只要思考得足够长久和深入，任何事情都可以用两根橡皮筋和一段绳子完成。换句话说，永远、永远不要放弃。


  这让我想到我在 OakTable 成员身上也观察到的特质：他们都相信总存在多一个选择，总存在多一种看待事物的方式。这可能需要与另一位成员聊聊，甚至可能需要一次"中国式议会"（冗长辩论），但放弃一个问题的想法确实是不可接受的，除非你被命令这样做。


  所以，想象一下，让一群具有这种态度（并且对彼此怀有极大尊重）的人聚在一起，哪怕只有几天。这永远不会无聊，你很少会看到他们像我们所说的那样，处于"空闲等待事件"中。


  想象一下，站在哥本哈根 OracleWorld 展厅冰冷、灰色的水泥地上，意识到我们没有付费租用地毯或任何东西，只有 6 米乘 6 米的水泥地。嗯，结果英特尔的人有多余的超高质量的仿真草皮地毯，但他们需要啤酒。是
  Gary Goodman 在半小时内促成了这笔交易。


  然后，Johannes Djernes 看到 BMC 的人搬运他们所有先进的展览用品进来，放在两个每个尺寸为 2.5 米乘 1 米乘 1 米的板条箱里。两箱啤酒之后，我们借到了空箱子。接着
  Johannes 出去买了各种零碎物品，几小时内，我们就搭起了整个展览区最高的塔（5 米高）。它可能也是最丑的，但人们注意到了它。


  在同一活动中，James Morle 像狮子一样奋力拼搏，使用一台 NetApp 存储设备、一张 Linux 启动 CD 和任何碰巧路过的人的笔记本电脑，建立了世界上最大的笔记本电脑
  RAC 集群。这是一个巨大的成功，但如果没有 James 以及像 Michael Möller 和 Morten Egan 等其他人的"永不放弃"态度，这是绝对不可能完成的。


  由 James Morle、Cary Millsap、Anjo Kolk、Steve Adams、Jonathan Lewis 和我本人组成的委员会，审核新 OakTable
  成员的建议。现在成员数量已超过 70 人，我毫不怀疑我们将继续吸纳具有探究精神、科学态度、"永不放弃"精神的成员——这正是这个非凡人群的标志。


  ## 政治立场


  你多久听到一次"Oracle 说……"或者"Oracle Support 承诺……"这样的说法？嗯，大多数时候，并不是 Oracle 公司作为一个整体"说"了什么，而是某个有观点或想法的个体。我知道这一点，因为我在
  Oracle Support 工作了十年，听到自己的话后来被当作 Oracle 公司（或至少是 Oracle Denmark）的话重复，确实是一种奇怪的感觉。


  OakTable 也是一样。我们不作为一个单一实体行动，而是作为个体。一些（技术）观点可能是共享的，但这只是幸运的巧合。除了思想应该被分享、猜测应该通过不断测试和突破界限来消除之外，对成员的个人行为或态度没有任何指导方针。


  在同行之间公开分享思想并追求科学方法，这正是 OakTable 网络的全部意义所在。在这些目标上，不可能也不应该有任何妥协。


  ## 书籍


  在英国 Kenilworth 的一次 Oracle SIG 会议期间的一天，James Morle 在喝 Larson 干邑白兰地时，提出了 BAARF 党（反对任何
  RAID 五/四/呃……免费）的想法。就在同一天晚上，我们与 Apress 的 Tony Davis 共进晚餐，James 当时提出了这个名为 OakTable
  Press 的出版品牌的想法。Tony 认为这是个绝妙的主意，几天后它就成为了现实。


  其理念是让 OakTable 成员要么撰写书籍，要么至少在书籍在这个品牌下出版前进行审阅。一本书至少需要两位 OakTable 成员审阅并认可才能出版。


  除了您现在手中的这本书，目前的目录包括以下书籍：


  > *`Expert Oracle JDBC Programming`*：Oracle 和 Java 专家 R.M. Menon 展示了如何构建通过 JDBC
  访问 Oracle 的可扩展、高性能的 Java 应用程序。Menon 没有采取与数据库无关的方法，而是向您展示如何为 Oracle 编写特定的 JDBC 代码，并且写得很好，确保您能够利用
  Oracle 数据库平台所提供的全部丰富功能。

  >

  > *`Mastering Oracle PL/SQL: Practical Solutions`*：Connor McDonald 等人向您展示如何编写在重负载、多用户环境下运行快速且不会崩溃的
  PL/SQL 代码。

  >

  > *`Oracle Insights: Tales of the Oak Table`*：一群 OakTable 成员（包括我）讲述了一系列我们使用 Oracle
  软件的经历（好的和坏的）：它过去在哪里，将走向何方，如何（以及如何不）成功使用它，以及一些当基本设计原则被忽视时可能发生的可怕故事。

  >

  > *`Peoplesoft for the Oracle DBA`*：David Kurtz 为任何负责维护 PeopleSoft 应用程序的 Oracle
  DBA 提供了一份"生存指南"。本书向您展示了如何使用 PeopleSoft 工具集有效地实施常见的 Oracle 数据库管理技术，如何分析应用程序活动，以及如何获取关键数据以追踪性能不佳的原因。




  我们希望 OakTable Press 出版的每一本书都能具备我们所推崇的品质：科学、严谨、准确、创新且读来饶有趣味。归根结底，我们期望每一本书都能成为尽其所能助力您生活更轻松的实用工具。


  Miracle A/S ([`www.miracleas.dk`](http://www.miracleas.dk)) 董事总经理，OakTable 网络联合创始人

