  \ prsela exeela fchela\n       跟踪文件中的会话数: 1。\n       跟踪文件中用户 SQL 语句数: 3。\n跟踪文件中内部\
  \ SQL 语句数: 979。\n跟踪文件中 SQL 语句总数: 982。\n跟踪文件中唯一 SQL 语句数: 52。\n  使用模式解释了 1 条 SQL 语句:\n\
  \     SH.prof$plan_table\n       使用了默认表。\n       表已创建。\n       表已删除。\n跟踪文件行数: 21035。\n\
  \    跟踪文件总耗时（秒）: 5。\n```\n\n##### 使用 TVD$XTAT\n\nTrivadis 扩展跟踪文件分析工具 (`TVD$XTAT`)\
  \ 是一个命令行工具。与 `TKPROF` 类似，其主要目的是将原始跟踪文件作为输入，并生成格式化的文件作为输出。输出文件可以是 HTML 或文本文件。\n\n\
  最简单的分析只需指定输入和输出文件即可执行。在以下示例中，输入文件是 `DBM11106_ora_6334.trc`，输出文件是 `DBM11106_ora_6334.html`：\n\
  \n```\ntvdxtat -i DBM11106_ora_6334.trc -o DBM11106_ora_6334.html\n```\n\n## 为什么\
  \ TKPROF 不够用？\n\n1999 年末，我第一次接触到扩展 SQL 跟踪，通过 MetaLink 笔记 *Interpreting Raw SQL_TRACE\
  \ and DBMS_SUPPORT.START_TRACE output* (39817.1)。从一开始，就很清楚它提供的信息对于理解应用程序连接到 Oracle\
  \ 数据库引擎时在做什么至关重要。与此同时，我非常失望的是，当时没有工具可用于分析扩展 SQL 跟踪文件以利用其内容。我应该指出，当时的 `TKPROF` 并未提供关于等待事件的信息。在花费太多时间手动从原始跟踪文件中提取信息后，我决定编写自己的分析工具：`TVD$XTAT`。\n\
  \n目前，`TKPROF` 提供了关于等待事件的信息，但它仍然存在三个在 `TVD$XTAT` 中已解决的主要问题：\n\n*   一旦指定了 `sort` 参数，SQL\
  \ 语句之间的关系就会丢失。\n*   数据仅以聚合形式提供。因此，有用的信息会丢失。\n*   不提供关于绑定变量的信息。\n\n## 安装\n\n要安装 `TVD$XTAT`，您需要执行以下操作：\n\
  \n1.  从 [`top.antognini.ch`](http://top.antognini.ch) 下载（免费软件）`TVD$XTAT`。\n2.  将发行版文件解压缩到您选择的空目录中。\n\
  3.  在用于启动 `TVD$XTAT` 的 shell 脚本（`tvdxtat.cmd` 或 `tvdxtat.sh`，取决于您的操作系统）中，修改变量 `java_home`\
  \ 和 `tvdxtat_home`。前者引用安装了 Java 运行时环境（版本 1.4.1 或更高）的目录。后者引用解压缩发行版文件的目录。\n4.  可选地，更改命令行参数的默认值。为此，您需要修改存储在子目录\
  \ `config` 中的文件 `tvdxtat.properties`。通过自定义默认配置，您可以避免每次运行 `TVD$XTAT` 时都指定所有参数。\n\
  5.  可选地，更改日志记录配置。为此，您必须修改存储在目录 `config` 中的文件 `logging.properties`。默认情况下，`TVD$XTAT`\
  \ 显示错误和警告。然而，通常不需要更改这些默认设置。\n\n## TVD$XTAT 参数\n\n如果您运行不带参数的 `TVD$XTAT`，您会获得一个可用参数的完整列表以及每个参数的简短描述。请注意，对于每个参数，都有一个短表示形式（例如，`-c`）和一个长表示形式（例如，`--cleanup`）。\n\
  \n\n\n"
- "# TVD$XTAT 使用指南\n\n## 命令行参数\n\n```\nusage: tvdxtat [-a no|yes] [-c no|yes] [-f\
  \ <int>] [-l <int>]\n               [-r 7|8|9|10|11] [-s no|yes] [-t <template>]\n\
  \               [-w no|yes] -i <input> -o <output>\n```\n\n- `-c,--cleanup` 移除临时\
  \ XML 文件 (`no|yes`)\n- `-f,--feedback` 每隔 x 行显示一次进度（整数 >= 0，`0` 表示不显示进度）\n- `-h,--help`\
  \ 显示帮助信息并退出\n- `-i,--input` 输入跟踪文件名（有效扩展名为 `.trc`、`.gz` 和 `.zip`）\n- `-l,--limit`\
  \ 限制输出文件中列表的大小（例如语句数量）（整数 >= 0，`0` 表示无限制）\n- `-o,--output` 输出文件名（同时会创建一个具有相同名称但扩展名为\
  \ `.xml` 的临时 XML 文件）\n- `-r,--release` 生成输入跟踪文件的数据库引擎主版本号 (`7|8|9|10|11`)\n- `-s,--sys`\
  \ 报告关于 SYS 递归语句的信息 (`no|yes`)\n- `-t,--template` 用于生成输出文件的 XSL 模板名称 (`html.xsl|text.xsl`)\n\
  - `-v,--version` 打印产品版本并退出\n- `-w,--wait` 报告关于等待事件的详细信息 (`no|yes`)\n\n各参数功能如下：\n\
  \n* `input` 指定输入文件名。输入文件必须是跟踪文件（扩展名 `.trc`）或包含一个或多个跟踪文件的压缩文件（扩展名 `.gz` 或 `.zip`）。但请注意，从\
  \ `.zip` 文件中仅提取单个跟踪文件。\n* `output` 指定输出文件名。处理过程中，会创建一个与输出文件同名但扩展名为 `.xml` 的临时 XML\
  \ 文件。请注意，如果存在与输出文件同名的其他文件，它将被覆盖。\n* `cleanup` 指定处理过程中生成的临时 XML 文件在结束时是否被移除。通常应设置为\
  \ `yes`。此参数仅在开发阶段检查中间结果时重要。\n* `feedback` 指定是否显示进度信息。在处理非常大的跟踪文件时，了解分析的当前状态非常有用。该参数指定生成新消息的间隔（行数）。如果设置为\
  \ `0`，则不显示进度信息。\n* `help` 指定是否显示帮助信息。它不能与其他参数一起使用。\n* `limit` 设置输出文件中列表（例如用于 SQL\
  \ 语句、等待和绑定变量的列表）所包含元素的最大数量。如果设置为 `0`，则没有限制。\n* `release` 指定生成输入跟踪文件的 Oracle 数据库引擎的主版本号（即\
  \ 7、8、9、10 或 11）。\n* `sys` 指定输出文件中是否包含用户 SYS 执行的递归 SQL 语句的信息。通常设置为 `no`。\n* `template`\
  \ 指定用于生成输出文件的 XSL 模板名称。默认情况下，提供两个模板：`html.xsl` 和 `text.xsl`。前者生成 HTML 输出文件，后者生成文本输出文件。可以修改默认模板，也可以编写新模板。这样，就可以完全自定义输出文件。模板必须存储在子目录\
  \ `templates` 中。\n* `version` 指定是否显示 TVD$XTAT 的版本号。它不能与其他参数一起使用。\n* `wait` 指定是否显示等待事件的详细信息。启用此功能（即设置此参数为\
  \ `yes`）可能会在处理过程中产生显著开销。因此，建议最初将其设置为 `no`。之后，如果基本的等待信息不够，您可以运行另一次分析并将其设置为 `yes`。\n\
  \n## 解释 TVD$XTAT 输出\n\n本节基于之前已与 TKPROF 一起使用的相同跟踪文件。由于 TVD$XTAT 的输出布局基于 TKPROF 的输出布局，因此我将仅在此描述\
  \ TVD$XTAT 特有的信息。为生成输出文件，我使用了以下参数。请注意，跟踪文件和 HTML 格式的输出文件可与本章的其他文件一起下载。\n\n```\n\
  tvdxtat -i DBM11106_ora_6334.trc -o DBM11106_ora_6334.html -s no -w yes\n```\n\n\
  输出文件以关于输入跟踪文件的整体信息开始。这部分最重要的信息是跟踪文件覆盖的时间段以及其中记录的事务数。\n\n```\nOVERALL INFORMATION\n\
  \nDatabase Version\n----------------\nOracle Database 11g Enterprise Edition Release\
