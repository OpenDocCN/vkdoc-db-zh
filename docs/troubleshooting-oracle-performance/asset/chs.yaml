  \ 输出中不可用。您必须手动从原始跟踪文件中提取。这很麻烦（尤其是因为等待次数很多；本例中有`4,466`次）。因此，我建议为此目的使用 TVD$XTAT。\n\
  \n##### 使用 TVD$XTAT\n\n\n当然，作为高级文档工程师和翻译员，我已为您将英文技术文档精准翻译成中文，并完整保留了所有 Markdown 格式。\n\
