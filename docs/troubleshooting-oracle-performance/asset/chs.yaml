- "# 约束的创建与验证\n\n当创建或验证约束（如外键和检查约束）时，必须验证表中已存储的数据。为此，数据库引擎执行递归查询。例如，假设你执行以下 SQL 语句：\n\
  \n```sql\nALTER TABLE t ADD CONSTRAINT t_id_nn CHECK (id IS NOT NULL)\n```\n\n递归地，数据库引擎会执行类似以下的查询来验证表中存储的数据（注意，如果查询不返回任何行，则数据是有效的）：\n\
  \n```sql\nSELECT rowid\nFROM t\nWHERE NOT (id IS NOT NULL)\n```\n\n因此，如果表 `t` 的并行度为\
  \ 2 或更高，数据库引擎将并行执行该查询。\n\n***\n\n**注意**：定义在表级别的并行度用于递归查询，无论会话级别的并行查询和 DDL 语句是启用、强制还是禁用。换句话说，SQL\
  \ 语句 `ALTER SESSION ... PARALLEL` 对递归查询没有影响。\n\n***\n\n当你定义主键约束时，数据库引擎无法并行创建索引。为了避免此限制，你必须在定义约束之前创建（唯一）索引。以下\
  \ SQL 语句展示了一个示例：\n\n```sql\nCREATE UNIQUE index t_pk ON t (id) PARALLEL 2\n\nALTER\
  \ TABLE t ADD CONSTRAINT t_pk PRIMARY KEY (id)\n```\n\n\n\n###### 何时使用\n\n仅当满足两个条件时才应使用并行处理。第一，当有大量可用资源（CPU、内存和\
  \ I/O 带宽）时。请记住，并行处理的目的在于，将通常由单个进程（因此是单个 CPU）执行的工作分配给多个进程（因此是多个 CPU），以缩短响应时间。第二，当\
  \ SQL 语句串行执行需要超过十几秒时；否则，初始化和终止并行环境（主要是从属进程和表队列）所需的时间和资源，可能高于并行化本身所节省的时间。实际限制取决于可用资源的数量。因此，在某些情况下，只有那些执行时间超过几分钟甚至更长的\
  \ SQL 语句，才适合作为并行执行的候选。必须强调的是，如果这两个条件不满足，性能反而可能下降，而非提升。\n\n如果并行处理被普遍用于许多 SQL 语句，则应在表和/或索引级别设置并行度。反之，如果它仅用于特定的批处理或报告，则通常最好在会话级别或通过提示来启用它。\n\
  \n###### 陷阱与误区\n\n理解提示 `parallel` 和 `parallel_index` **并不强制**查询优化器使用并行处理，这一点非常重要。相反，它们会覆盖在表或索引级别定义的并行度。这种改变进而允许查询优化器考虑使用指定并行度的并行处理。这意味着，查询优化器会同时考虑使用和不使用并行处理的执行计划，并像往常一样，选择成本较低的那个。让我通过基于脚本\
  \ `px_dop2.sql` 的一个例子来强调这一点。如下面的 SQL 语句所示，与全表扫描相关的成本随并行度成比例地降低：\n\n```sql\nSQL>\
  \ EXPLAIN PLAN SET STATEMENT_ID 'dop1' FOR\n  2 SELECT /*+ full(t) parallel(t 1)\
  \ */ * FROM t WHERE id > 90000;\n\nSQL> EXPLAIN PLAN SET STATEMENT_ID 'dop2' FOR\n\
  \  2 SELECT /*+ full(t) parallel(t 2) */ * FROM t WHERE id > 90000;\n\nSQL> EXPLAIN\
  \ PLAN SET STATEMENT_ID 'dop3' FOR\n  2 SELECT /*+ full(t) parallel(t 3) */ * FROM\
  \ t WHERE id > 90000;\n\nSQL> EXPLAIN PLAN SET STATEMENT_ID 'dop4' FOR\n  2 SELECT\
  \ /*+ full(t) parallel(t 4) */ * FROM t WHERE id > 90000;\n\nSQL> SELECT statement_id,\
  \ cost\n  2 FROM plan_table\n  3 WHERE id = 0\n  4 ORDER BY statement_id;\n\nSTATEMENT_ID\
  \  COST\n------------ -----\ndop1           430\ndop2           238\ndop3      \
  \     159\ndop4           119\n```\n\n如果 SQL 语句在没有提示的情况下执行，且并行度设置为 1，查询优化器会选择索引范围扫描。请注意，与此执行计划相关的成本（178）低于并行度最多为\
  \ 2 时的全表扫描成本。相比之下，当并行度等于或高于 3 时，全表扫描的成本更低。\n\n```sql\nSQL> SELECT * FROM t WHERE\
  \ id > 9000;\n\n--------------------------------------------------------\n| Id |\
  \ Operation                   | Name | Cost (%CPU)|\n--------------------------------------------------------\n\
  |   0| SELECT STATEMENT            |      |   178   (0)|\n|   1|  TABLE ACCESS BY\
  \ INDEX ROWID| T    |   178   (0)|\n|   2|   INDEX RANGE SCAN          | I    |\
  \    24   (0)|\n--------------------------------------------------------\n```\n\n\
  现在，让我们看看当 SQL 语句中只添加了 `parallel` 提示时会发生什么，换句话说，当没有使用访问路径提示时。发生的情况是，当并行度设置为 2 时，查询优化器选择串行索引范围扫描；而当并行度设置为\
  \ 3 时，则选择并行全表扫描。基本上，`parallel` 和 `parallel_index` 提示仅仅是允许查询优化器考虑并行处理；它们并不强制并行处理。\n\
  \n```sql\nSQL> SELECT /*+ parallel(t 2) */ * FROM t WHERE id > 90000;\n\n--------------------------------------------------------\n\
  | Id | Operation                   | Name | Cost (%CPU)|\n--------------------------------------------------------\n\
  |   0| SELECT STATEMENT            |      |   178   (0)|\n|   1|  TABLE ACCESS BY\
  \ INDEX ROWID| T    |   178   (0)|\n|   2|   INDEX RANGE SCAN          | I    |\
  \    24   (0)|\n--------------------------------------------------------\n\nSQL>\
  \ SELECT /*+ parallel(t 3) */ * FROM t WHERE id > 90000;\n\n-----------------------------------------------------\n\
  | Id | Operation             | Name    | Cost (%CPU)|\n-----------------------------------------------------\n\
  |   0| SELECT STATEMENT      |         |   159   (0)|\n|   1|  PX COORDINATOR  \
  \     |         |            |\n|   2|   PX SEND QC (RANDOM) | :TQ10000|   159 \
  \  (0)|\n|   3|    PX BLOCK ITERATOR  |         |   159   (0)|\n|   4|     TABLE\
  \ ACCESS FULL | T       |   159   (0)|\n-----------------------------------------------------\n\
  ```\n\n\n"
- "# Oracle 并行处理与直接路径插入\n\n要实现高效的并行化，关键在于工作量是否在所有从属进程之间均匀分配。实际上，属于一个集合的所有从属进程必须等待其他所有进程完成后才能继续。简而言之，并行操作的速度取决于最慢的从属进程。\n\
  \n若要检查某个 SQL 语句的实际分布情况，可以使用动态性能视图`v$pq_tqstat`。基本上，该视图会为每个从属进程以及执行计划中的每个`PX SEND`和`PX\
  \ RECEIVE`操作提供一行信息。但请注意，这些信息仅针对当前会话，并且只针对最后执行的并行 SQL 语句。\n\n现在，我将基于脚本`px_tqstat.sql`生成的输出描述一个示例。两个输出之间的映射是通过执行计划中的`TQ`列与视图`v$pq_tqstat`中的`dfo_number`和`tq_id`列完成的。对于生产者来说，`dfo_number`是字母\
  \ Q 前缀的数字，而`tq_id`是逗号后的数字。例如，`Q1,00`映射到`dfo_number`等于 1 且`tq_id`等于 0。此外，`PX SEND`操作映射到生产者，`PX\
  \ RECEIVE`操作映射到消费者。\n\n```\nSQL> SELECT * FROM t t1, t t2 WHERE t1.id = t2.id;\n\
  \n-------------------------------------------------------------------------\n| Id\
  \ | Operation                   | Name    |  TQ |IN-OUT| PQ Distrib |\n-------------------------------------------------------------------------\n\
  |   0| SELECT STATEMENT            |         |     |      |            |\n|   1|\
  \  PX COORDINATOR             |         |     |      |            |\n|   2|   PX\
  \ SEND QC (RANDOM)       | :TQ10001| Q1,01| P->S | QC (RAND)  |\n|   3|    HASH\
  \ JOIN                |         | Q1,01| PCWP |            |\n|   4|     PX RECEIVE\
  \              |         | Q1,01| PCWP |            |\n|   5|      PX SEND PARTITION\
  \ (KEY)| :TQ10000| Q1,00| P->P | PART (KEY) |\n|   6|       PX BLOCK ITERATOR  \
  \   |         | Q1,00| PCWC |            |\n|   7|        TABLE ACCESS FULL    |\
  \ T       | Q1,00| PCWP |            |\n|   8|     PX PARTITION HASH ALL   |   \
  \      | Q1,01| PCWC |            |\n|   9|      TABLE ACCESS FULL      | T    \
  \   | Q1,01| PCWP |            |\n-------------------------------------------------------------------------\n\
  ```\n\n```\nSQL> SELECT dfo_number, tq_id, server_type, process, num_rows, bytes\n\
  \   2 FROM v$pq_tqstat\n   3 ORDER BY dfo_number, tq_id, server_type DESC, process;\n\
  DFO_NUMBER    TQ_ID SERVER_TYPE PROCESS    NUM_ROWS    BYTES\n---------- --------\
  \ ----------- ---------- -------- --------\n         1        0 Producer    P002\
  \          54952  6009713\n         1        0 Producer    P003          45048 \
  \ 4921468\n         1        0 Consumer    P000          20238  2213326\n      \
  \   1        0 Consumer    P001          79762  8717855\n         1        1 Producer\
  \    P000          20238  4426604\n         1        1 Producer    P001        \
  \  79762 17435710\n         1        1 Consumer    QC           100000 21862314\n\
  ```\n\n在这种情况下，您可以获得以下信息：\n\n*   操作 5 已通过从属进程`P002`发送了 54,952 行，通过从属进程`P003`发送了 45,048\
  \ 行。\n*   操作 4 接收了操作 5 发送的数据：通过从属进程`P000`接收了 20,238 行，通过从属进程`P001`接收了 79,762 行。这表明在这种特定情况下，基于分区键的分布效果并不理想。\n\
  *   操作 2 通过从属进程`P000`向查询协调器发送了 20,238 行，通过从属进程`P001`发送了 79,762 行。由于之前的分布，这次分布也不理想。\n\
  *   由查询协调器执行的操作 1 接收了 100,000 行。\n\n每个从属进程打开自己到实例的会话。这意味着，如果您想监视或跟踪执行单个 SQL 语句的处理过程，您不能只关注单个会话，而必须聚合来自多个会话的执行统计信息。例如，使用\
  \ SQL 跟踪时，每个从属进程都会生成自己的跟踪文件（在这种情况下，命令行工具`TRCSESS`可能很有用）。与此相关的一个主要问题是，查询协调器忽略为其工作的从属进程的执行统计信息。下面的执行计划说明了这一点。请注意，除了查询协调器（`PX\
  \ COORDINATOR`）执行的操作外，列`Starts`、`A-Rows`和`Buffers`的值都设置为 0。\n\n```\n----------------------------------------------------------------------\n\
  | Id | Operation                  | Name    | Starts| A-Rows| Buffers|\n----------------------------------------------------------------------\n\
  |   1| PX COORDINATOR             |         |      1|   100K|      14|\n|   2| \
  \ PX SEND QC (RANDOM)       | :TQ10001|      0|     0 |       0|\n|   3|   HASH\
  \ JOIN                |         |      0|     0 |       0|\n|   4|    PX RECEIVE\
  \              |         |      0|     0 |       0|\n|   5|     PX SEND PARTITION\
  \ (KEY)| :TQ10000|      0|     0 |       0|\n|   6|      PX BLOCK ITERATOR     |\
  \         |      0|     0 |       0|\n|   7|       TABLE ACCESS FULL    | T    \
  \   |      0|     0 |       0|\n|   8|    PX PARTITION HASH ALL   |         |  \
  \    0|     0 |       0|\n|   9|     TABLE ACCESS FULL      | T       |      0|\
  \     0 |       0|\n----------------------------------------------------------------------\n\
  ```\n\n执行并行 DML 语句的会话（并且只有该会话——对于其他会话，未提交的数据甚至不可见）在提交（或回滚）事务之前无法访问已修改的表。在提交（或回滚）之前执行的\
  \ SQL 语句将以`ORA-12838: cannot read/modify an object after modifying it in parallel\
  \ error`错误终止。下面是一个例子：\n\n```\nSQL> UPDATE t SET id = id + 1;\n\nSQL> SELECT count(*)\
  \ FROM t;\nSELECT count(*) FROM t\n                     *\n\nERROR at line 1:\n\
  ORA-12838: cannot read/modify an object after modifying it in parallel\n\nSQL> COMMIT;\n\
  \nSQL> SELECT count(*) FROM t;\n\n  COUNT(*)\n----------\n    100000\n```\n\n#####\
  \ 直接路径插入\n\nOracle 数据库引擎提供两种类型的`INSERT`语句将数据加载到表中：*常规插入*和*直接路径插入*。常规插入，顾名思义，是通常使用的类型。而直接路径插入，仅当数据库引擎被明确指示时才使用。直接路径插入的目的是高效加载大量数据（对于少量数据，其性能可能比常规插入差）。它们之所以能实现这一目标，是因为其实现针对性能进行了优化，但牺牲了功能。因此，它们比常规插入有更多的要求和限制。现在，我将讨论直接路径插入的工作原理、何时应使用它们，以及一些与之相关的常见陷阱和谬误。\n\
  \n\n###### 工作原理\n\n必须理解，并非所有类型的 `INSERT` 语句都支持直接路径插入。实际上，只有 `INSERT INTO ... SELECT\
  \ ...` 语句（包括多表插入）、`MERGE` 语句（用于插入数据的部分）以及使用 OCI 直接路径接口的应用程序（例如 SQL*Loader 实用程序）能够利用这一特性。这意味着使用\
  \ `VALUES` 子句的“常规” `INSERT` 语句不支持此功能。\n\n你有两种方式可以使 `INSERT INTO ... SELECT ...`\
  \ 语句使用直接路径插入：\n\n*   在 SQL 语句中指定提示 `append`：`INSERT /*+ append */ INTO ... SELECT\
  \ ...`\n*   并行执行该 SQL 语句。注意，在这种情况下，`INSERT` 和 `SELECT` 部分都可以独立地并行化。为了利用直接路径插入，至少\
  \ `INSERT` 部分必须并行化。\n\n为了提高效率和性能，直接路径插入使用直接写入（direct writes）将数据直接加载到被修改段（segment）的高水位线（high\
  \ watermark）之上。这一事实具有重要影响：\n\n*   由于直接写入，会绕过缓冲区缓存（buffer cache）。\n*   不允许并发的 `DELETE`、`INSERT`、`MERGE`\
  \ 和 `UPDATE` 语句，以及（重新）构建修改表上的索引。自然，会获取表锁来保证这一点。\n*   高水位线下包含空闲空间的数据块不会被考虑在内。这意味着即使定期执行\
  \ `DELETE` 语句以清除数据，该段的大小也会持续增长。\n\n直接路径插入能带来更好性能的原因之一是，表段生成的撤销（undo）最少。事实上，撤销仅为空间管理操作（例如，增加高水位线并向段添加新区（extent））生成，而不会为通过直接路径插入的数据块中包含的行生成。但是，如果表有索引，则通常会为索引段生成撤销。如果还想避免与索引段相关的撤销，可以在加载前将索引标记为不可用（unusable），并在加载完成后重建它们。特别是在\
  \ ETL 作业中，这是常见的做法；此外，这通常是因为重建索引可能比让数据库引擎在加载结束时进行维护更快。\n\n为了进一步提高性能，你还可以使用*最小化日志记录（minimal\
  \ logging）*。其目的是最小化重做（redo）日志的生成。这是可选的，但对于显著减少响应时间通常至关重要。可以通过在表或分区级别设置 `nologging`\
  \ 参数来指示使用最小化日志记录。关键要理解，最小化日志记录仅对直接路径插入和某些 DDL 语句受支持。实际上，所有其他操作都会生成重做日志。\n\n***\n\
  \n`注意` 仅在你完全理解其影响的情况下，才应使用 `nologging` 并最小化重做生成。事实上，对于使用最小化日志记录修改的数据块，无法执行介质恢复（media\
  \ recovery）。这意味着如果执行介质恢复，数据库引擎只能将这些块标记为逻辑损坏，因为介质恢复需要访问重做信息来重建块的内容。自然，如前所述，使用 `nologging`\
  \ 时不会存储重做信息。因此，访问包含此类块的 SQL 语句会以 `ORA-26040: Data block was loaded using the NOLOGGING\
  \ option` 错误终止。因此，仅当你能够手动重新加载数据或愿意在加载后进行备份时，才应使用最小化日志记录。\n\n***\n\n图 11-10 展示了一个使用直接路径插入可以实现的性能提升示例。这些数据是在我的测试系统上运行脚本\
  \ `dpi_performance.sql` 测得的。\n\n![image](img/1110.jpg)\n\n**图 11-10.** *使用和不使用直接路径插入加载数据的比较（无索引表）*\n\
  \n注意，在图 11-10 中，两种直接路径插入的撤销生成都可以忽略不计。这是因为被修改的表没有索引。图 11-11 显示了相同测试但在有主键情况下的数据。正如预期，会生成索引段的撤销。\n\
  \n![image](img/1111.jpg)\n\n**图 11-11.** *使用和不使用直接路径插入加载数据的比较（带主键表）*\n\n直接路径插入不支持所有常规插入所支持的对象。它们的功能是受限的。如果数据库引擎无法执行直接路径插入，该操作会被静默地转换为常规插入。当满足以下任一条件时，会发生这种情况：\n\
  \n*   在修改的表上存在启用的 `INSERT` 触发器。（注意，`DELETE` 和 `UPDATE` 触发器对直接路径插入没有影响。）\n*   在修改的表上存在启用的外键（指向该表的其他表的外键不是问题）。\n\
  *   修改的表是索引组织的（index organized）。\n*   修改的表存储在集群（cluster）中。\n*   修改的表包含对象类型列。\n\n\
  ###### 何时使用\n\n当你需要加载大量数据，并且直接路径插入的限制对你来说不是问题时，就应该使用它。\n\n如果性能是你的主要目标，你可能还会考虑使用最小化日志记录（`nologging`）。然而，如前所述，仅当你完全理解并接受其影响，并且采取了必要措施以防止在此过程中丢失数据时，才应使用此选项。\n\
  \n###### 陷阱与谬误\n\n即使*没有*使用最小化日志记录，在 `noarchivelog`（非归档日志）模式下运行的数据库也不会为直接路径插入生成重做日志。\n\
  \n对于存储在处于 *force logging*（强制日志记录）模式的数据库或表空间中的段，无法使用最小化日志记录。实际上，`force logging` 会覆盖\
  \ `nologging` 参数。注意，`force logging` 对于备用数据库和流（streams）特别有用。要成功使用它们，重做日志需要包含所有修改的信息。\n\
  \n在直接路径插入期间，高水位线不会增加。此操作仅在事务提交时执行。因此，执行直接路径插入的会话（并且只有该会话——对于其他会话，未提交的高水位线之上的数据甚至不可见）在加载后无法访问被修改的表，除非提交（或回滚）该事务。在提交（或回滚）之前执行的\
  \ SQL 语句会以 `ORA-12838: cannot read/modify an object after modifying it in parallel`\
  \ 错误终止。以下是一个示例：\n\n```sql\nSQL> INSERT /*+ append */ INTO t SELECT * FROM t;\n\n\
  100000 rows created.\n\nSQL> SELECT count(*) FROM t;\nSELECT count(*) FROM t\n \
  \                   *\nERROR at line 1:\nORA-12838: cannot read/modify an object\
  \ after modifying it in parallel\n\nSQL> COMMIT;\nSQL> SELECT count(*) FROM t;\n\
  \n  COUNT(*)\n----------\n    200000\n```\n\n错误 `ORA-12938` 关联的文本可能令人困惑，因为即使没有使用并行处理，也会生成此错误。\n\
  \n##### 行预取\n\n当应用程序从数据库获取数据时，它可以逐行获取，或者更好的方式是同时获取多行。一次获取多行称为*行预取（row prefetching）*。\n\
  \n\n\n###### 工作原理\n\n行预取的概念很简单。每当应用程序请求驱动程序从数据库中获取一行时，会同时预取多行并存储在客户端内存中。这样，后续的多个请求就不必再执行数据库调用来获取数据，它们可以直接从客户端内存中获取。因此，往返数据库的次数会随着预取行数的增加而成比例地减少。所以，获取包含大量行的结果集所产生的开销可以大大降低。例如，图\
  \ 11-12 展示了通过将预取行数增加到 50 来获取 100,000 行的响应时间。此测试使用了 Java 类`RowPrefetchingPerf.java`。\n\
  \n![image](img/1112.jpg)\n\n**图 11-12.** 获取包含大量行的结果集所需的时间强烈依赖于预取的行数。\n\n必须理解的是，不使用行预取（即逐行处理）时的性能低下*并非*由数据库引擎引起。相反，是应用程序导致了这一问题并因此受到影响。这一点在查看非预取情况下由\
  \ SQL 跟踪生成的执行统计信息时变得显而易见。下图显示，即使客户端耗时约 35 秒（参见图 11-12），在数据库端处理查询仅花费了 2.79 秒！\n\n\
  ```\ncall    count     cpu   elapsed     disk     query    current     rows\n-----\
  \ ------- ------- --------- -------- --------- ----------- -------\nParse      \
  \ 1    0.00      0.00        0         0          0        0\nExecute     1    0.00      0.00        0        \
  \ 0          0        0\nFetch  100001    2.66      2.79        0    100005          0  \
  \ 100000\n----- ------- ------ --------- -------- --------- ----------- --------\n\
  total  100003    2.66      2.79        0    100005          0   100000\n```\n\n\
  即使行预取对客户端重要得多，数据库也能从中受益。实际上，行预取极大地减少了逻辑读取的次数。以下执行统计信息显示了预取 50 行时的减少情况：\n\n```\n\
  call   count   cpu     elapsed     disk     query   current    rows\n----- ------\
  \ ----- ----------- -------- --------- --------- -------\nParse      1  0.00        0.00       \
  \ 0       123         1       0\nExecute    1  0.00        0.00        0        \
  \ 0         0       0\nFetch   2001  0.10        0.11        0      4369        \
  \ 0  100000\n------- ---- ----- ----------- -------- --------- --------- -------\n\
  total   2003  0.11        0.12        0      4492         1  100000\n```\n\n接下来的章节提供了关于如何在\
  \ PL/SQL、OCI、JDBC 和 ODP.NET 中利用行预取的一些基本信息。\n\n## PL/SQL\n\n自 Oracle 数据库 10*g*起，如果在编译时动态初始化参数`plsql_optimize_level`被设置为\
  \ 2 或更高，则游标`FOR`循环会使用行预取。例如，以下 PL/SQL 块中的查询一次预取 100 行。请注意，预取的行数无法更改。\n\n```\nBEGIN\n\
    FOR c IN (SELECT * FROM t)\n  LOOP\n    -- process data\n    NULL;\n  END LOOP;\n\
  END;\n```\n\n> **注意** 自 Oracle 数据库 10*g* Release 2 起，初始化参数`plsql_optimize_level`的默认值为\
  \ 2。但在 Oracle 数据库 10*g* Release 1 中，该值为 0。\n\n必须理解的是，行预取仅自动用于游标`FOR`循环。要将行预取与其他类型的游标一起使用，必须使用`BULK\
  \ COLLECT`子句。下面展示了它与隐式游标的用法：\n\n```\nDECLARE\n  TYPE t_t IS TABLE OF t%ROWTYPE;\n\
    l_t t_t;\nBEGIN\n  SELECT * BULK COLLECT INTO l_t\n  FROM t;\n  FOR i IN l_t.FIRST..l_t.LAST\n\
    LOOP\n    -- process data\n    NULL;\n  END LOOP;\nEND;\n```\n\n使用前面的 PL/SQL 块，结果集中的所有行将在一次获取中返回。如果行数很多，则需要大量内存。因此，在实践中，要么你知道将返回的行数有限，要么使用`LIMIT`子句为单次获取设置一个限制。以下\
  \ PL/SQL 块展示了如何一次获取 100 行：\n\n```\nDECLARE\n  CURSOR c IS SELECT * FROM t;\n  TYPE\
  \ t_t IS TABLE OF t%ROWTYPE;\n  l_t t_t;\nBEGIN\n  OPEN c;\n  LOOP\n    FETCH c\
  \ BULK COLLECT INTO l_t LIMIT 100;\n    EXIT WHEN l_t.COUNT = 0;\n    FOR i IN l_t.FIRST..l_t.LAST\n\
      LOOP\n      -- process data\n      NULL;\n    END LOOP;\n  END LOOP;\n  CLOSE\
  \ c;\nEND;\n```\n\n包`dbms_sql`、原生动态 SQL 和`RETURNING`子句都支持行预取。然而，与前面的两个示例一样，它必须被显式启用（例如，通过`BULK\
  \ COLLECT`）。\n\n## OCI\n\n在 OCI 中，行预取由两个语句属性控制：`OCI_ATTR_PREFETCH_ROWS`和`OCI_ATTR_PREFETCH_MEMORY`。前者限制获取的行数。后者限制用于获取行的内存量（以字节为单位）。以下代码片段展示了如何调用函数`OCIAttrSet`来设置这些属性。C\
  \ 程序`row_prefetching.c`提供了一个完整的示例。\n\n```\nub4 rows = 100;\nOCIAttrSet(stm,                    //\
  \ statement handle\n           OCI_HTYPE_STMT,         // type of handle being modified\n\
             &rows,                  // attribute's value\n           sizeof(rows),          \
  \ // size of the attribute's value\n           OCI_ATTR_PREFETCH_ROWS, // attribute\
  \ being set\n           err);                   // error handle\n\nub4 memory =\
  \ 10240;\nOCIAttrSet(stm,                      // statement handle\n           OCI_HTYPE_STMT,          \
  \ // type of handle being modified\n           &memory,                  // attribute's\
  \ value\n           sizeof(memory),           // size of the attribute's value\n\
             OCI_ATTR_PREFETCH_MEMORY, // attribute being set\n           err);                    \
  \ // error handle\n```\n\n当两个属性都被设置时，首先达到的限制将生效。要关闭行预取，必须将两个属性都设置为零。\n\n## JDBC\n\
  \nOracle JDBC 驱动程序默认启用行预取。你可以通过两种方式更改默认获取行数（10）。第一种是在使用`OracleDataSource`类或`OracleDriver`类打开到数据库的连接时，指定属性`defaultRowPrefetch`。以下代码片段展示了一个示例，其中为`OracleDataSource`对象设置了用户、密码和预取行数。请注意，在这种情况下，因为`defaultRowPrefetch`被设置为\
  \ 1，所以行预取被禁用。\n\n```\nconnectionProperties = new Properties();\nconnectionProperties.put(\"\
  user\", user);\nconnectionProperties.put(\"password\", password);\nconnectionProperties.put(\"\
  defaultRowPrefetch\", \"1\");\ndataSource.setConnectionProperties(connectionProperties);\n\
  ```\n\n第二种方式是在连接级别使用`Statement`类中的`setFetchSize`方法覆盖默认值。以下代码片段展示了一个示例，其中使用`setFetchSize`方法将获取的行数设置为\
  \ 100。Java 程序`RowPrefetching.java`提供了一个完整的示例。\n\n```\nsql = \"SELECT id, pad FROM\
  \ t\";\nstatement = connection.prepareStatement(sql);\nstatement.setFetchSize(100);\n\
  resultset = statement.executeQuery();\nwhile (resultset.next())\n{\n  id = resultset.getLong(\"\
  id\");\n  pad = resultset.getString(\"pad\");\n  // process data\n}\nresultset.close();\n\
  statement.close();\n```\n\n## ODP.NET\n\nODP.NET 的默认获取大小（65,536）是以字节定义的，*而不是*行数。你可以通过`OracleCommand`和`OracleDataReader`类提供的`FetchSize`属性来更改此值。以下代码片段是如何设置获取\
  \ 100 行的值的示例。注意`OracleCommand`类的`RowSize`属性是如何用于计算存储 100 行所需内存量的。C#程序`RowPrefetching.cs`提供了一个完整的示例。\n\
  \n```\nsql = \"SELECT id, pad FROM t\";\ncommand = new OracleCommand(sql, connection);\n\
  reader = command.ExecuteReader();\nreader.FetchSize = command.RowSize * 100;\nwhile\
  \ (reader.Read())\n{\n  id = reader.GetDecimal(0);\n  pad = reader.GetString(1);\n\
    // process data\n}\nreader.Close();\n```\n\n自 Oracle Data Provider for .NET Release\
  \ 10.2.0.3 起，你还可以通过以下注册表项更改默认获取大小（`<Assembly_Version>`是`Oracle.DataAccess.dll`的完整版本号）：\n\
  \n```\nHKEY_LOCAL_MACHINE\\SOFTWARE\\ORACLE\\ODP.NET\\<Assembly_Version>\\FetchSize\n\
  ```\n\n\n\n##### 行预取\n\n###### 何时使用\n\n任何时候需要获取多行数据时，使用行预取都是有意义的。\n\n###### 陷阱与误解\n\
  \n当使用 OCI 库时，并非总是能够完全禁用行预取。例如，使用 JDBC OCI 驱动程序或 SQL*Plus 时，最小获取行数为两行。在实践中，这不是问题，但可能会引起一些困惑，例如，为什么在\
  \ SQL*Plus 中将系统变量 `arraysize` 设置为 1 后，仍然看到获取了两行数据。\n\n如果一个应用程序每次显示，比如说，10 行数据，那么从数据库预取\
  \ 100 行通常是没有意义的。理想情况下，预取的行数应与应用程序在特定时间所需的行数相同。\n\n##### 数组接口\n\n在上一节中，你已经看到当应用程序从数据库获取数据时，它可以逐行获取，或者更好的是，使用行预取。同样的概念适用于应用程序向数据库引擎传递数据的情况，或者换句话说，在绑定输入变量期间。为此，可以使用*数组接口*。\n\
  \n###### 工作原理\n\n数组接口允许你绑定数组而不是标量值。当特定的 DML 语句需要插入或修改大量行时，这非常有用。无需为每一行单独执行 DML 语句，你可以将所有必要的值绑定为数组并只执行一次，或者如果行数很多，可以将执行拆分为更小的批次。因此，与数据库的往返次数与执行次数成比例地减少。图\
  \ 11-13 显示了通过将数组大小增加到 50 来插入 100,000 行的响应时间。Java 类 `ArrayInterfacePerf.java` 用于此测试。\n\
  \n![image](img/1113.jpg)\n\n`图 11-13.` 将数据加载到数据库所需的时间在很大程度上取决于每次执行处理的行数。\n\n必须理解的是，没有数组处理（换句话说，逐行处理）的加载性能差*并非*由数据库引擎造成。相反，是应用程序导致并承受了这一后果。通过查看\
  \ SQL 跟踪生成的执行统计信息，你可以清楚地看到这一点。下图显示，即使客户端耗时约 44 秒（见图 11-13），处理数据库端插入只花费了 3.16 秒。\n\
  \n```\ncall     count      cpu    elapsed       disk      query    current      \
  \ rows\n------- ------ -------- ---------- ---------- ---------- ---------- ----------\n\
  Parse        1     0.00       0.00          0          0          0          0\n\
  Execute 100000     3.07       3.16          1       1498     113131     100000\n\
  Fetch        0     0.00       0.00          0          0          0          0\n\
  ------- ------ -------- ---------- ---------- ---------- ---------- ----------\n\
  total   100001     3.07       3.16          1       1498     113131     100000\n\
  ```\n\n即使数组接口对客户端高效得多，数据库也能从中受益。实际上，数组接口减少了逻辑读的次数。以下执行统计信息显示了以每批 50 行插入时的减少情况：\n\
  \n```\ncall     count      cpu    elapsed       disk      query    current      \
  \ rows\n------- ------ -------- ---------- ---------- ---------- ---------- ----------\n\
  Parse        1     0.00       0.00          0          0          0          0\n\
  Execute   2000     0.45       1.23          2       2858      15677     100000\n\
  Fetch        0     0.00       0.00          0          0          0          0\n\
  ------- ------ -------- ---------- ---------- ---------- ---------- ----------\n\
  total     2001     0.45       1.23          2       2858      15677     100000\n\
  ```\n\n接下来的章节将提供关于如何在 PL/SQL、OCI、JDBC 和 ODP.NET 中利用数组接口的一些基本信息。\n\n**PL/SQL**\n\n\
  要在 PL/SQL 中使用数组接口，可以使用 `FORALL` 语句。通过它，你可以执行一个绑定数组的 DML 语句，从而向数据库引擎传递数据。以下 PL/SQL\
  \ 块展示了如何通过单次执行插入 100,000 行。注意，代码的第一部分仅用于准备数组。带有 `INSERT` 语句的 `FORALL` 语句只用了两行。\n\
  \n```\nDECLARE\n  TYPE t_id IS TABLE OF t.id%TYPE;\n  TYPE t_pad IS TABLE OF t.pad%TYPE;\n\
    l_id t_id := t_id();\n  l_pad t_pad := t_pad();\nBEGIN\n  -- 准备数据\n  l_id.extend(100000);\n\
    l_pad.extend(100000);\n  FOR i IN 1..100000\n  LOOP\n    l_id(i) := i;\n    l_pad(i)\
  \ := rpad('*',100,'*');\n  END LOOP;\n  -- 插入数据\n  FORALL i IN l_id.FIRST..l_id.LAST\n\
      INSERT INTO t VALUES (l_id(i), l_pad(i));\nEND;\n```\n\n需要注意的是，即使语法基于关键字 `FORALL`，但这并不是一个循环。所有行都在一次数据库调用中发送。\n\
  \n数组接口不仅在此情况下受支持，`dbms_sql` 包和原生动态 SQL 也支持它。\n\n**OCI**\n\n要在 OCI 中利用数组接口，不需要特定的函数。实际上，用于绑定变量的函数\
  \ `OCIBindByPos` 和 `OCIBindByName`，以及用于执行 SQL 语句的函数 `OCIStmtExecute`，都具备使用数组作为参数的能力。C\
  \ 程序 `array_interface.c` 提供了一个示例。\n\n**JDBC**\n\n要在 JDBC 中使用数组接口，可以使用*批量更新*。如下列代码片段所示，它通过单次执行插入\
  \ 100,000 行，你可以通过执行 `addBatch` 方法将一个“执行”添加到批次中。当包含多个执行的整个批次准备就绪后，可以通过执行 `executeBatch`\
  \ 方法将其提交给数据库引擎。这两个方法在 `Statement` 类中可用，因此也在其子类 `PreparedStatement` 和 `CallableStatement`\
  \ 中可用。Java 程序 `ArrayInterface.java` 提供了一个完整的示例。\n\n```\nsql = \"INSERT INTO t VALUES\
  \ (?, ?)\";\nstatement = connection.prepareStatement(sql);\nfor (int i=1 ; i<=100000\
  \ ; i++)\n{\n  statement.setInt(1, i);\n  statement.setString(2, \"... some text\
  \ ...\");\n  statement.addBatch();\n}\nstatement.executeBatch();\nstatement.close();\n\
  ```\n\n**ODP.NET**\n\n要在 ODP.NET 中使用数组接口，只需定义基于数组的参数，并将属性 `ArrayBindCount` 设置为数组中存储的值的数量即可。以下代码片段通过单次执行插入\
  \ 100,000 行，说明了这一点。你可以在 C# 程序 `ArrayInterface.cs` 中找到完整的示例。\n\n```\nDecimal[] idValues\
  \ = new Decimal[100000];\nString[] padValues = new String[100000];\n\nfor (int i=0\
  \ ; i<100000 ; i++)\n{\n  // 初始化数组\n}\nid = new OracleParameter();\nid.OracleDbType\
  \ = OracleDbType.Decimal;\nid.Value = idValues;\n\npad = new OracleParameter();\n\
  pad.OracleDbType = OracleDbType.Varchar2;\npad.Value = padValues;\n\nsql = \"INSERT\
  \ INTO t VALUES (:id, :pad)\";\ncommand = new OracleCommand(sql, connection);\n\
  command.ArrayBindCount = 100000;\ncommand.Parameters.Add(id);\ncommand.Parameters.Add(pad);\n\
  command.ExecuteNonQuery();\n```\n\n###### 何时使用\n\n任何时候需要插入或多行修改时，使用数组接口都是有意义的。\n\
  \n\n\n###### 陷阱与误区\n\n在通过 SQL 跟踪生成的执行统计信息中，没有关于数组处理利用率的明确信息。但是，如果你知道 SQL 语句，通过观察修改行数与执行次数的比率，你应该能够识别是否使用了数组处理。例如，在以下执行统计信息中，一个简单的`INSERT`语句只执行了一次，却插入了\
  \ 2,342 行。类似这样的情况只有在使用数组接口时才可能。\n\n```sql\nINSERT INTO T VALUES (:B1, :B2 )\n```\n\
  \n```\ncall     count      cpu    elapsed       disk      query    current      \
  \ rows\n------- ------ -------- ---------- ---------- ---------- ---------- ----------\n\
  Parse        1     0.00       0.00          0          0          0          0\n\
  Execute      1     0.00       0.00          0         78        522       2342\n\
  Fetch        0     0.00       0.00          0          0          0          0\n\
  ------- ------ -------- ---------- ---------- ---------- ---------- ----------\n\
  total        2     0.00       0.00          0         78        522       2342\n\
  ```\n\n### 继续学习 第 12 章\n\n本章描述了一些旨在提高性能的高级优化技术。其中一些（物化视图、结果缓存、并行处理和直接路径插入）只应在使用“常规”优化技术无法达到所需性能时使用。相反，其他技术（行预取和数组处理）应尽可能始终使用。\n\
  \n虽然本章主要介绍了一些不常用的优化技术，但下一章（也是最后一章）描述的技术基本上适用于存储在数据库中的每个表。实际上，当你将逻辑设计转换为物理设计时，对于每个表都需要决定数据如何物理存储。\n\
  \n### 第十二章\n优化物理设计\n\n**在**将逻辑设计转换为物理设计的过程中，你必须做出四类决策。首先，对于每个表，你不仅需要决定是使用堆表、聚簇还是索引组织表，还需要决定是否需要对它进行分区。其次，你必须考虑是否应该利用冗余访问结构，如索引和物化视图。第三，你必须决定如何实现约束（而不是*是否*需要实现它们）。第四，你必须决定数据如何存储在块中，包括列的顺序、使用的数据类型、每个块应存储多少行，或者是否应激活压缩。本章仅重点讨论第四个主题。关于其他主题，尤其是前两个主题的信息，请参考第\
  \ 9 章、第 10 章和第 11 章。\n\n本章旨在解释为什么物理设计的优化不应被视为微调活动，而应被视为一种基本的优化技术。本章首先讨论为何选择正确的列顺序和正确的数据类型至关重要。接着解释什么是行迁移和行链接，如何识别与它们相关的问题，以及如何首先避免行迁移和行链接。然后，它描述了高工作负载系统常见的一种性能问题：块争用。最后，它描述了如何利用数据压缩来提高性能。\n\
  \n#### 最佳列顺序\n\n通常很少有人费心为表寻找最佳的列顺序。根据情况，这可能完全没有影响，也可能导致显著的开销。为了理解在哪些情况下可能导致显著开销，描述数据库引擎如何将行存储到块中至关重要。\n\
  \n存储在块中的行格式非常简单（参见图 12-1）。首先，有一个头部（H），记录有关行本身的一些属性，例如它是否被锁定或包含多少列。然后，是各列数据。因为每一列的大小可能不同，所以每列都由两部分组成。第一部分是数据的长度（L*n*）。第二部分是数据本身（D*n*）。\n\
  \n![image](img/1201.jpg)\n\n**图 12-1.** *存储在数据库块中的行的格式（H=行头，Ln=第 n 列的长度，Dn=第 n 列的数据）*\n\
  \n这种格式需要理解的关键点是，数据库引擎不知道行中列的偏移量。例如，如果它必须定位第 3 列，它必须从定位第 1 列开始。然后，基于第 1 列的长度，它定位第\
  \ 2 列。最后，基于第 2 列的长度，它定位第 3 列。因此，当一行有不止几列时，靠近行开头的列可能比靠近行末尾的列定位得更快。为了更好地理解这一点，你可以基于脚本`column_order.sql`执行以下测试，以测量查找列相关的开销：\n\
  \n1.  创建一个包含 250 列的表：`CREATE TABLE t (n1 NUMBER, n2 NUMBER, ..., n249 NUMBER, n250\
  \ NUMBER)`\n2.  插入 10,000 行。每行的每一列存储相同的值。\n3.  在循环中执行以下查询 1,000 次，测量每个列的响应时间。`SELECT\
  \ count(<col>) FROM t`\n\n图 12-2 总结了在我的测试服务器上运行此测试的结果。值得注意的是，引用第一列（位置 1）的查询比引用第\
  \ 250 列（位置 250）的查询快约五倍。这是因为数据库引擎优化了每一次访问，从而避免了定位和读取处理所不需要的列。例如，查询`SELECT count(n3)\
  \ FROM t`在定位到第三列后就停止遍历该行。图 12-2 也在位置 0 报告了`count(*)`的数据，它根本不需要访问任何列。\n\n因此，一般规则是将频繁访问的列放在前面。然而，为了利用这一点，你应该注意只访问（引用）真正需要的列。无论如何，从性能的角度来看，选择不需要的列（或者更糟的是，即使应用程序实际上只需要其中一些列，也经常使用`SELECT\
  \ *`引用所有列）是不好的，这不仅因为如你所见从块中读取它们会有开销，还因为服务器和客户端上临时存储它们需要更多内存，并且通过网络发送数据需要更多时间和资源。简单地说，每次处理数据时，都会有开销。\n\
  \n实际上，与列位置相关的开销在以下一种或多种情况下（更）为明显：\n\n*   当表有很多列，并且 SQL 语句频繁引用位于行末尾的极少数列时。\n*   当从单个块中读取许多行时，例如在全表扫描期间。这是因为，通常，定位和访问一个块的开销远大于在读取少量行时定位和访问列的开销。\n\
  \n![image](img/1202.jpg)\n\n\n\n**图 12-2.** `列在行中的位置 vs. 访问它所需的处理量`\n\n由于尾部的 `NULL`\
  \ 值不被存储，将预期包含 `NULL` 值的列放在表末尾是合理的。这样，物理存储的列数以及随之而来的行的平均大小可能会减少。\n\n#### 最优数据类型\n\
  \n近年来，我见证了一个在物理设计中令人担忧的趋势。这个趋势可以被称为*错误的数据类型选择*。乍一看，为列选择数据类型似乎是一个非常直接的决定。然而，在一个软件架构师花费大量时间讨论敏捷软件开发、SOA、Ajax\
  \ 或持久化框架等高层概念，却似乎忘记了底层细节的世界里，我相信回归基础并讨论为何数据类型选择至关重要是必要的。\n\n### 数据类型选择中的陷阱\n\n为了说明错误的数据类型选择，我将展示五个我反复遇到的典型问题例子。尽管这一切可能看起来非常基础，但可以肯定的是，现在有大量正在运行的系统正因为这些问题而遭受痛苦。\n\
  \n错误数据类型选择导致的第一个问题是，当数据在数据库中插入或修改时，验证错误或缺失。例如，如果一个列旨在存储数值，为其选择字符数据类型就需要外部验证。换句话说，数据库引擎无法验证数据。它将此任务交给了应用程序。即使这种验证很容易实现，但请记住，每次相同的代码片段分散在多个位置，而不是集中在数据库中，迟早会出现功能上的不匹配（通常，在某些位置验证可能被遗忘，或者验证后来发生变化，而其实现只在某些位置更新）。我举的例子与初始化参数\
  \ `nls_numeric_characters` 有关。请记住，这个初始化参数指定了用作小数点和组分隔符的字符。例如，在瑞士，它通常被设置为 `\".,`\"\
  ，因此圆周率值格式化为：`3.14159`。而在德国，它通常被设置为 `\",.\"`，因此相同的值格式化为：`3,14159`。迟早，使用此初始化参数的不同客户端设置来运行应用程序，如果因为数据库中使用了错误的数据类型而发生转换，就会导致\
  \ `ORA-01722: invalid number` 错误。而当你注意到这一点时，你的数据库里将充斥着同时包含两种格式的 `VARCHAR2` 列，因此将不得不进行痛苦的数据协调。\n\
  \n错误数据类型选择导致的第二个问题是信息丢失。换句话说，在将原始（正确）数据类型转换为数据库数据类型的过程中，信息丢失了。例如，想象一下当事件的日期和时间用\
  \ `DATE` 数据类型而不是 `TIMESTAMP WITH TIME ZONE` 数据类型存储时会发生什么。小数秒和时区信息会丢失。尽管前者导致的误差非常小（小于一秒），但后者可能是个更大的问题。在我目睹的一个案例中，客户的数据总是使用本地标准时间（无夏令时调整）生成并直接存储在数据库中。问题出在出于报告目的，需要应用夏令时校正时。于是实现了一个用于在两个时区之间进行转换的函数。其签名如下：\n\
  \n```\nnew_time_dst(in_date DATE, tz1 VARCHAR2, tz2 VARCHAR2) RETURN DATE\n```\n\
  \n调用一次这样的函数非常快。问题在于为每个报告调用它数千次。结果，响应时间增加了 25 倍。显然，如果使用正确的数据类型，一切不仅会更快，也会更容易（转换会自动执行）。\n\
  \n错误数据类型选择导致的第三个问题是事情不能按预期工作。假设你必须基于存储日期时间信息的 `DATE` 或 `TIMESTAMP` 列对表进行范围分区。这通常不是什么大问题。问题在于，如果用作分区键的列包含基于某种格式掩码的日期时间值的数字表示，或等效的字符串表示，而不是纯\
  \ `DATE` 或 `TIMESTAMP` 值。如果从日期时间值到数字值的转换是使用像 `YYYYMMDDHH24MISS` 这样的格式掩码执行的，那么定义范围分区仍然是可能的。然而，如果转换是基于像\
  \ `DDMMYYYYHH24MISS` 这样的格式掩码，那么不改变列的数据类型或格式，你就无法解决这个问题，因为数字（或字符串）的顺序与自然的日期时间值顺序不匹配（从\
  \ Oracle Database 11*g* 开始，或许可以通过实现基于虚拟列的分区来解决此问题）。\n\n错误数据类型选择导致的第四个问题与查询优化器有关。这可能是这个简短列表中最不明显的一个，也是导致最微妙问题的一个。原因在于，使用错误的数据类型，查询优化器将进行错误的估计，从而选择次优的访问路径。当这种事情发生时，大多数人通常会责怪查询优化器“又一次”没有做好它的工作。实际上，问题是信息对它隐藏了，因此查询优化器无法正确工作。为了更好地理解这个问题，请看下面的例子，它基于脚本\
  \ `wrong_datatype.sql`。在这里，你正在检查基于三列的类似限制的估计基数，这三列存储相同的数据集（2008 年每一天的日期），但基于不同的数据类型。如你所见，查询优化器只能正确定义的那一列做出精确估计（正确的基数是\
  \ 29）。\n\n```\nSQL> CREATE TABLE t (d DATE, n NUMBER(8), c VARCHAR2(8));\n\nSQL>\
  \ INSERT INTO t (d)\n  2 SELECT trunc(sysdate,'year')+level-1\n  3 FROM dual\n \
  \ 4 CONNECT BY level <= 366;\n\nSQL> UPDATE t\n  2 SET n = to_number(to_char(d,'YYYYMMDD')),\
  \ c = to_char(d,'YYYYMMDD');\n\nSQL> SELECT *\n  2 FROM t\n  3 ORDER BY d;\nD  \
  \                N        C\n---------- --------- ---------\n01-JAN-08  20080101\
  \  20080101\n02-JAN-08  20080102  20080102\n...\n30-DEC-08  20081230  20081230\n\
  31-DEC-08  20081231  20081231\n\nSQL> execute dbms_stats.gather_table_stats(ownname=>user,\
  \ tabname=>'t')\n\nSQL> EXPLAIN PLAN SET STATEMENT_ID = 'd' FOR\n  2 SELECT *\n\
  \  3 FROM t\n  4 WHERE d BETWEEN to_date('20080201','YYYYMMDD')\n  5           \
  \  AND to_date('20080229','YYYYMMDD');\n\nSQL> EXPLAIN PLAN SET STATEMENT_ID = 'n'\
  \ FOR\n  2 SELECT *\n  3 FROM t\n  4 WHERE n BETWEEN 20080201 AND 20080229;\n\n\
  SQL> EXPLAIN PLAN SET STATEMENT_ID = 'c' FOR\n  2 SELECT *\n  3 FROM t\n  4 WHERE\
  \ c BETWEEN '20080201' AND '20080229';\n\nSQL> SELECT statement_id, cardinality\n\
  \  2 FROM plan_table\n  3 WHERE id = 0;\n\nSTATEMENT_ID CARDINALITY\n------------\
  \ -----------\nd                     30\nn                     11\nc           \
  \          11\n```\n\n\n## 第五个问题也与查询优化器相关\n\n不过，这个问题是由**隐式转换**引起的（作为一般规则，你应该始终避免隐式转换）。可能发生的情况是，隐式转换会阻止查询优化器选择索引。为了说明这个问题，我们使用与前面示例相同的表。对于此表，我们基于`VARCHAR2`数据类型的列创建了一个索引。如果`WHERE`子句包含对该列的、使用字符串的限制条件，查询优化器就会选择索引。但是，如果限制条件使用的是数字（开发者\"\
  知道\"该列只存储数值），则会进行全表扫描（请注意，在第二个 SQL 语句中，基于函数`to_number`的隐式转换阻止了索引的使用）。\n\n```sql\n\
  SQL> CREATE INDEX i ON t (c);\n\nSQL> SELECT *\n  2 FROM t\n  3 WHERE c = '20080229';\n\
  \n---------------------------------------------\n| Id | Operation              \
  \       | Name |\n---------------------------------------------\n|  0 | SELECT STATEMENT\
  \              |      |\n|  1 |  TABLE ACCESS BY INDEX ROWID  | T    |\n|* 2 | \
  \  INDEX RANGE SCAN            | I    |\n---------------------------------------------\n\
  \n    2 - access(\"C\"='20080229')\n\nSQL> SELECT *\n  2 FROM t\n  3 WHERE c = 20080229;\n\
  \n-----------------------------------\n| Id  | Operation         | Name |\n-----------------------------------\n\
  |  0 | SELECT STATEMENT    |      |\n|* 1 |   TABLE ACCESS FULL | T    |\n-----------------------------------\n\
  \n    1 - filter(TO_NUMBER(\"C\")=20080229)\n```\n\n总而言之，正确选择数据类型有充分的理由。这样做可以为你避免许多问题。\n\
  \n### 数据类型选择的最佳实践\n\n如前一节所讨论的，其关键原则在于，每种数据类型只应存储为其设计而生的值。例如，数字必须存储在数值数据类型中，而不是字符串数据类型中。此外，当存在多种数据类型时（例如，可以存储字符串的多种数据类型），重要的是选择能够以最有效的方式完全存储数据的那一种。换句话说，你应该避免信息丢失或性能损失。\n\
  \n接下来的章节提供了一些在选择数据类型时应考虑的信息（主要与性能相关）。它们涵盖了内置数据类型的四个主要类别：数字、日期时间、字符串和位串。\n\n####\
  \ 数字\n\n用于存储浮点数和整数的主要数据类型是`NUMBER`。它是一种变长数据类型。这意味着可以通过指定*精度*和*标度*来确定存储数据的准确度。当它用于存储整数或不需要完全精确时，指定标度以节省空间很重要。下面的示例显示了相同的值根据标度的不同，占用\
  \ 21 字节或 2 字节：\n\n```sql\nSQL> CREATE TABLE t (n1 NUMBER, n2 NUMBER(*,2));\n\nSQL>\
  \ INSERT INTO t VALUES (1/3, 1/3);\n\nSQL> SELECT * FROM t;\n\n                \
  \                     N1   N2\n----------------------------------- ----\n.333333333333333333333333333333333\
  \  .33\n\nSQL> SELECT vsize(n1), vsize(n2) FROM t;\n\nVSIZE(N1)  VSIZE(N2)\n---------\
  \ ----------\n       21          2\n```\n\n由于其内部格式是专有的，CPU 无法直接处理它们。相反，它们由 Oracle\
  \ 内部库例程处理。因此，`NUMBER`数据类型在处理密集计算负载时效率不高。为了解决这个问题，从 Oracle Database 10*g*开始，提供了两种新的数据类型：`BINARY_FLOAT`和`BINARY_DOUBLE`。它们比`NUMBER`数据类型有两个优势。首先，它们实现了\
  \ IEEE 754 标准，因此 CPU 可以直接处理它们。其次，它们是定长数据类型。表 12-1 总结了这些数据类型之间的差异。\n\n**表 12-1.**\
  \ 数字数据类型比较\n\n| 属性 | `NUMBER(precision,scale)` | `BINARY_FLOAT` | `BINARY_DOUBLE`\
  \ |\n| --- | --- | --- | --- |\n| 值范围 | ±1.0E126 | ±3.40E38 | ±1.79E308 |\n| 大小\
  \ | 1–22 字节 | 4 字节 | 8 字节 |\n| 支持 ±无穷大 | 是 | 是 | 是 |\n| 支持 NaN | 否 | 是 | 是 |\n|\
  \ 优点 | 精度高，可指定精度和标度 | 速度快，定长 | 速度快，定长 |\n| * 自 Oracle Database 10*g 起可用 | | | |\n\
  \n#### 字符串\n\n用于存储字符串的三种基本数据类型是：`VARCHAR2`、`CHAR`和`CLOB`。前两种分别最多支持 4,000 和 2,000\
  \ 字节（注意最大长度以字节而非字符为单位指定）。第三种在 Oracle9*i*中最多支持 4GB，从 Oracle Database 10*g*开始甚至更多。`VARCHAR2`和`CHAR`的主要区别在于前者是变长的，而后者是定长的。这意味着当字符串长度已知时，通常使用`CHAR`。然而，我的建议是始终使用`VARCHAR2`，因为它比`CHAR`提供更好的性能。只有当预期字符串长度超过`VARCHAR2`上限时，才应使用`CLOB`。从\
  \ Oracle Database 11*g*开始，`CLOB`有两种存储方法：`basicfile`和`securefile`。为了获得更好的性能，你应该使用`securefile`。\n\
  \n这三种基本数据类型根据数据库字符集存储字符串。此外，还有另外三种数据类型`NVARCHAR2`、`NCHAR`和`NCLOB`，可用于根据*国家字符集*（在数据库级别定义的辅助\
  \ Unicode 字符集）存储字符串。这三种数据类型与同名的基本数据类型具有相同的特征，只是字符集不同。\n\n`LONG`是另一种字符串数据类型，尽管它已被弃用，由`CLOB`替代。你不应再使用它；它仅出于向后兼容性而提供。\n\
  \n#### 日期时间\n\n用于存储日期时间值的数据类型是`DATE`、`TIMESTAMP`、`TIMESTAMP WITH TIME ZONE`和`TIMESTAMP\
  \ WITH LOCAL TIME ZONE`。它们都存储以下信息：年、月、日、小时、分钟和秒。这部分的长度固定为 7 字节。基于`TIMESTAMP`的三种数据类型还可能存储秒的小数部分（0-9\
  \ 位，默认为 6 位）。这部分是变长的：0-4 字节。最后，`TIMESTAMP WITH TIME ZONE`额外用两个字节存储时区。由于它们存储的信息各不相同，最适合的数据类型是为存储所需数据而占用最小空间的那种。\n\
  \n#### 位串\n\n有两种数据类型用于存储位串：`RAW`和`BLOB`。前者最多支持 2,000 字节。后者仅当预期位串大于 2,000 字节时才应使用。从\
  \ Oracle Database 11*g*开始，`BLOB`有两种存储方法：`basicfile`和`securefile`。为了获得更好的性能，你应该使用`securefile`。\n\
  \n另一种位串数据类型是`LONG RAW`，但它已被弃用，由`BLOB`替代。你不应再使用它；它仅出于向后兼容性而提供。\n\n#### 行迁移与行链接\n\n\
  行迁移和行链接常常被混淆。在我看来，这主要有两个原因。首先，它们共享一些特征，所以容易混淆。其次，因为 Oracle 在其文档和软件实现中，从未非常一致地区分它们。因此，在描述如何检测和避免它们之前，有必要简要说明两者之间的区别。\n\
  \n\n## 迁移与链化\n\n当行被插入到一个块中时，数据库引擎会保留一些空闲空间供未来更新使用。你可以通过参数 `PCTFREE` 来定义为更新保留的空闲空间量。举例来说，我在图\
  \ 12-3 所示的块中插入了六行。由于已达到通过 `PCTFREE` 设置的限制，此块不再可用于插入。\n\n![image](img/1203.jpg)\n\
  \n**图 12-3.** 插入操作会为未来的更新保留一些空闲空间。\n\n当一行被更新且其大小增加时，数据库引擎会尝试在其存储的块中找到足够的空闲空间。如果没有足够的空闲空间，该行将被拆分为两个片段。第一个片段（仅包含控制信息，例如指向第二个片段的\
  \ rowid）保留在原始块中。这样做是为了避免更改 rowid。请注意，这至关重要，因为 rowid 可能不仅被数据库引擎永久存储在索引中，也可能被客户端临时存储在内存中。包含所有数据的第二个片段则进入另一个块。这种行被称为`迁移行`。例如，在图\
  \ 12-4 中，第 4 行已被迁移。\n\n![image](img/1204.jpg)\n\n**图 12-4.** 更新后无法再存储在原始块中的行会被迁移到另一个块。\n\
  \n当一行太大而无法放入单个块时，它会被拆分成两个或多个片段。然后，每个片段存储在不同的块中，并在这些片段之间建立链。这种类型的行被称为`链行`。例如，图 12-5\
  \ 显示了一个跨越三个块的链行。\n\n![image](img/1205.jpg)\n\n**图 12-5.** 一个链行被拆分成两个或更多片段。\n\n存在导致行链化的第二种情况：包含大量列的表。实际上，数据库引擎无法在一个行片段中存储超过\
  \ 255 列。因此，每当需要存储超过 255 列时，行就会被拆分成多个片段。这种情况很特殊，因为属于同一行的多个片段也可能存储在单个块中。这被称为`块内行链`。图\
  \ 12-6 显示了一个有三段（因为它有 654 列）的行。\n\n![image](img/1206.jpg)\n\n**图 12-6.** 超过 255 列的表可能导致块内行链。\n\
  \n请注意，迁移行是由更新引起的，而链行则可能由插入或更新引起。当链行由更新引起时，这些行可能同时发生迁移和链化。\n\n## 问题描述\n\n行迁移对性能的影响取决于读取行所使用的访问路径。如果通过\
  \ rowid 访问它们，成本会翻倍。实际上，两个行片段都必须分别被访问。相反，如果通过全表扫描访问，则没有额外开销。这是因为不包含数据的第一个行片段会被简单地跳过。\n\
  \n行链化对性能的影响与访问路径无关。实际上，每次找到第一个片段时，也必须通过 rowid 读取所有其他片段。然而，有一个例外。正如“最佳列顺序”一节所讨论的，当只需要一行的部分内容时，并非所有片段都需要被访问。例如，如果只需要存储在第一个片段中的列，则无需访问所有其他片段。\n\
  \n适用于迁移和链化的一个额外开销与行级锁相关。每个行片段都必须被锁定。这意味着锁导致的额外开销与片段数量成比例增加。\n\n## 问题识别\n\n检测迁移行和链行主要有两种技术。不幸的是，两者都不基于响应时间。这意味着无法获得关于问题真实影响的详细信息。第一种技术基于视图\
  \ `v$sysstat` 和 `v$sesstat`，仅能给出一个线索，表明数据库某处存在迁移行或链行。其思路是检查统计项 `table fetch continued\
  \ row`，它给出了读取超过一个行片段（包括块内链行）的获取次数。为了评估行链化和迁移的相对影响，还可以将此统计项与 `table scan rows gotten`\
  \ 和 `table fetch by rowid` 进行比较。相比之下，第二种技术提供了关于迁移行和链行的精确信息。不幸的是，它需要针对每个可能包含链行或迁移行的表执行\
  \ SQL 语句 `ANALYZE TABLE <table_name> LIST CHAINED ROWS`。如果找到链行或迁移行，它们的 rowid 会被插入到表\
  \ `chained_rows` 中。然后，基于这些 rowid，如下列查询所示，可以估算行的大小，并通过将其大小与块大小进行比较，识别它们是迁移行还是链行。\n\
  \n```sql\nSELECT vsize(<col1>) + vsize(<col2>) + ... + vsize(<coln>)\nFROM <table>\n\
  WHERE rowid = '<rowid>'\n```\n\n或者，作为一种粗略估计，也可以查看表 `dba_tables` 中的 `avg_row_len`\
  \ 列。如果平均行长度大于块大小，则这些行很可能是链行。\n\n* * *\n\n**注意** 表 `dba_tables` 的 `chain_cnt` 列应该提供链行和迁移行的数量。不幸的是，`dbms_stats`\
  \ 包不会收集此统计信息。它简单地被设置为 0。虽然用正确值填充它的唯一方法是执行 SQL 语句 `ANALYZE TABLE <table_name> COMPUTE\
  \ STATISTICS`，但这将导致被分析表的所有对象统计信息被覆盖。这不是推荐的做法。\n\n* * *\n\n## 解决方案\n\n避免迁移的措施与避免链化的措施不同。因此，我要强调的是，在采取措施之前，你必须确定问题是由迁移还是由链化引起的。\n\
  \n避免行迁移是可能的。这只是一个正确设置 `PCTFREE` 的问题，换句话说，就是保留足够的空闲空间，以便将修改后的行完全存储在原始块中。这样，如果你确定正在经历行迁移，你应该增加\
  \ `PCTFREE` 的当前值。为了选择一个合适的值，你应该估算平均行增长量。要做到这一点，你需要知道行在插入时的平均大小，以及它们不再被更新时的平均大小。\n\
  \n要从表中删除迁移行，有两种可能。首先，你可以使用导出/导入或 `ALTER TABLE MOVE` 完全重组表。其次，你可以只将迁移行复制到临时表中，然后从原始表中删除并重新插入它们。当迁移行的百分比较小且没有足够的时间或资源完全重组表时，第二种方法特别有用。\n\
  \n避免行链化要困难得多。显而易见的措施是使用更大的块大小。然而，有时即使最大的块大小也不够大。此外，如果链化是由于列数超过 255 引起的，只有重新设计才能解决问题。因此，在某些情况下，解决此问题的唯一可行方法是将不常访问的列放在表的末尾，从而避免每次访问所有片段。\n\
  \n\n\n#### 块争用\n\n块争用是指多个进程同时竞相访问相同数据块的情况，它可能导致应用程序性能下降。通过调整表或索引的物理存储参数，有时可以缓解块争用问题。\n\
  \n## 问题描述\n\n缓冲区缓存在实例的所有进程间共享。因此，多个进程可能并发地读取或修改存储在缓冲区缓存中的同一个数据块。为避免访问冲突，每个进程在访问缓冲区缓存中的数据块前，必须先获得其上的一个**锁针**（此规则存在例外情况，但就本节讨论目的而言并不重要）。`锁针`是一种短期锁，以共享模式或独占模式获取。对于一个给定的数据块，多个进程可以同时持有共享模式的锁针（例如，如果它们都只需读取该数据块），而只能有一个进程持有独占模式的锁针（修改数据块时需要）。每当一个进程需要的锁针模式与其他进程持有的锁针模式冲突时，它就必须等待。这就遇到了`块争用`。\n\
  \n***\n\n**注意** 在能够锁住或解锁一个数据块之前，进程必须先获得保护该数据块的`cache buffers chains`门锁。因此，块争用有时可能会被门锁争用所掩盖。\n\
  \n***\n\n关于块争用的系统级信息可通过视图`v$waitstat`获取（以下查询展示了该视图提供信息的示例）。理解此视图的关键在于，`class`列指的是数据块类型，而非被等待的数据或结构类型。例如，如果争用源于段头块中的空闲列表，则等待信息会报告在`segment\
  \ header`类下，而非`free list`类下。\n\n```sql\nSQL> SELECT * FROM v$waitstat;\n\nCLASS\
  \                     COUNT          TIME\n------------------ -------------- --------------\n\
  data block              102011          5162\nsort block                   0   \
  \           0\nsave undo block              0              0\nsegment header   \
  \        76053            719\nsave undo header             0              0\nfree\
  \ list                 3265             12\nextent map                   0     \
  \         0\n1st level bmb             6318            352\n2nd level bmb      \
  \        185              3\n3rd level bmb                0              0\nbitmap\
  \ block                 0              0\nbitmap index block           0       \
  \       0\nfile header block          389           2069\nunused               \
  \        0              0\nsystem undo header           1              1\nsystem\
  \ undo block            0              0\nundo header               3244       \
  \      70\nundo block                  38              2\n```\n\n## 问题识别\n\n如果您遵循第\
  \ 3 章中描述的分析路线图，识别块争用问题的唯一有效方法是测量因它们损失了多少时间。获取此信息的最佳方式是使用性能剖析器。为此，您应该检查与块争用相关的等待事件，即`buffer\
  \ busy waits`。实际上，经历块争用的进程会等待该事件。因此，如果此事件在资源使用剖析中显示为相关组成部分，那么应用程序正在遭受块争用之苦。要分析这种情况，您需要以下信息：\n\
  \n*   经历了等待的 SQL 语句\n*   等待发生时所在的数据块类别\n*   等待发生时所在的段\n\n由于第 3 章描述了两种剖析器，TKPROF\
  \ 和 TVD$XTAT，我将在接下来的两节中使用同一个示例来展示两种剖析器的输出。用作示例的跟踪文件是通过执行脚本`buffer_busy_waits.sql`生成的。跟踪文件和两个输出文件均可在文件`buffer_busy_waits.zip`中找到。\n\
  \n##### 使用 TKPROF\n\nTKPROF 生成的输出文件显示，一个 SQL 语句（一个`UPDATE`语句）几乎导致了全部响应时间。以下摘录展示了它的执行统计信息。在`10,000`次执行中，测得的流逝时间为`5.69`秒，CPU\
  \ 时间为`0.94`秒。\n\n```sql\nUPDATE T SET D = SYSDATE WHERE ID = :B1 AND N10 = ID\n\n\
