  \ |  |\n\n\n\n#### 保持对象统计信息最新的策略\n\n`dbms_stats` 软件包提供了许多用于管理对象统计信息的功能。问题是，我们应该如何以及何时使用它们来实现成功的配置？这个问题很难回答。可能不存在确切的答案。换句话说，没有一种方法可以适用于所有情况。让我们探讨如何处理这个问题。\n\
  \n一般规则，也可能是最重要的规则是，查询优化器需要描述数据库中存储数据的对象统计信息。因此，当数据发生变化时，对象统计信息也应随之改变。正如你可能理解的那样，我是定期收集对象统计信息的倡导者。反对这种做法的人认为，如果数据库运行良好，就没有必要重新收集对象统计信息。这种方法的问题在于，对象统计信息往往依赖于实际数据。例如，一个经常变化的统计信息是列的低/高值。诚然，在典型表中，变化的统计信息并不多，但通常那些发生变化的统计信息至关重要，因为它们在应用程序中被反复使用。在实践中，我遇到的由过时的对象统计信息引起的问题，远比相反情况多得多。\n\
  \n显然，对从不变化的数据收集对象统计信息是没有意义的。只应该重新收集过时的对象统计信息。因此，利用记录每个表上发生修改次数的功能至关重要。这样，我们只为那些经历了大量修改的表重新收集对象统计信息。默认情况下，当超过\
  \ 10%的行发生变化时，表就被认为是过时的。这是一个不错的默认值。从 Oracle Database 11*g*开始，如果需要，可以更改此值。\n\n收集统计信息的频率也是一个见仁见智的问题。我见过从每小时到每月甚至更不频繁的成功案例。这实际上取决于你的数据。无论如何，当使用表的过时程度作为重新收集对象统计信息的依据时，间隔时间过长可能导致过时对象过多，进而导致收集统计信息所需时间过长。因此，我喜欢频繁安排它们（以分散负载）并尽可能缩短单次运行时间。如果你的系统有每日或每周的低使用率时段，那么在这些时段安排运行通常是个好主意。如果你的系统是真正的\
  \ 7×24 小时系统，那么使用非常频繁的日程安排（每天多次）以尽可能分散负载通常更好。\n\n如果由于某些充分的理由不应在某些表上收集对象统计信息，从 Oracle\
  \ Database 10*g*开始，你应该锁定它们。这样，定期收集对象统计信息的作业将直接跳过它们。这比完全停用整个数据库的作业要好得多。不幸的是，直到 Oracle9*i*，都没有一个简单的功能可以实现相同的目标。作为变通方法，如果你安排一个作业，利用表监控来触发整个模式甚至整个数据库的统计信息收集，你可以在特定表上禁用表监控。这样，统计信息收集将不会在它们上面进行。\n\
  \n如果你有加载或修改大量数据的作业，你不应该等待预定的统计信息收集。只需将针对已修改对象的统计信息收集作为作业本身的一部分。换句话说，如果你知道某些东西已经发生了重大变化，应立即触发统计信息收集。\n\
  \n从 Oracle Database 10*g*开始，你应该尽可能利用默认的收集作业。为了使其符合你的要求，你应该检查并在必要时更改默认配置。由于从 Oracle\
  \ Database 11*g*开始才能在对象级别进行配置，如果你对某些表有特殊要求，你应该安排一个作业在默认作业之前处理它们。这样，默认作业（只处理那些统计信息过时的表）就会直接跳过它们。锁定也有助于确保只有特定的作业才能在那些关键表上重新收集对象统计信息。\n\
  \n如果收集统计信息导致低效的执行计划，你可以做两件事。第一是通过恢复在收集统计信息之前成功使用的对象统计信息来解决问题。第二是找出查询优化器为何使用新的对象统计信息生成了低效的执行计划。为此，你首先应该检查新收集的统计信息是否正确地描述了数据。例如，采样结合新的数据分布可能会导致不同的直方图。如果对象统计信息本身不好，那么问题就出在收集过程本身，或者可能是收集时使用的某个参数。如果对象统计信息实际上是好的，那么还有另外两种可能的原因：要么是查询优化器配置不正确，要么是查询优化器出错了。你对后者几乎没有控制权，但你应该能够为前者找到解决方案。无论如何，你应该避免过于草率地认为收集对象统计信息本身就有问题，并因此停止定期收集它们。\n\
  \n最佳实践是使用`dbms_stats`软件包收集对象统计信息。然而，在某些情况下，正确的对象统计信息可能会误导查询优化器。一个常见的例子是需要长期在线保留历史数据的数据（例如，在瑞士，某些类型的数据必须至少保留十年）。在这种情况下，如果数据分布随时间变化不大，由`dbms_stats`软件包收集的对象统计信息应该是合适的。相反，如果数据分布强烈依赖于时间段，并且应用程序经常只访问数据的一个子集，那么手动修改（即，伪造）对象统计信息以描述最相关的数据可能是有意义的。换句话说，如果你知道`dbms_stats`软件包忽略或无法发现的信息，通过伪造对象统计信息来告知查询优化器是合理的。\n\
  \n## 公共服务\n\n以下部分描述了`dbms_stats`软件包的几个服务，这些服务既用于系统统计信息，也用于对象统计信息。\n\n\n\n## 统计信息历史记录\n\
  \n自 Oracle Database 10*g* 起，当通过 `dbms_stats` 包收集系统统计信息或对象统计信息时，系统不会简单地用新统计信息覆盖当前统计信息，而是将当前统计信息保存在其他数据字典表中。这些表会记录在保留期内发生的所有更改历史。其目的是，当新的统计信息导致低效的执行计划时，能够恢复旧的统计信息。\n\
  \n在 Oracle9*i* 之前，你也可以通过利用备份表来实现这种历史记录。尽管如此，`dbms_stats` 包能自动处理这一点，这是一件好事。\n\n###\
  \ 保留期与清除\n\n统计信息会在历史记录中保留一段指定的时间，称为保留期。默认值是 31 天。你可以通过调用 `dbms_stats` 包中的函数 `get_stats_history_retention`\
  \ 来显示当前值，如下所示：\n\n```sql\nSQL> SELECT dbms_stats.get_stats_history_retention() AS\
  \ retention\n  2  FROM dual;\n\nRETENTION\n----------\n        31\n```\n\n要更改保留期，`dbms_stats`\
  \ 包提供了过程 `alter_stats_history_retention`。以下示例将保留期设置为 14 天：\n\n```sql\ndbms_stats.alter_stats_history_retention(retention\
  \ => 14)\n```\n\n请注意，对于过程 `alter_stats_history_retention`，以下值具有特殊含义：\n\n*   `NULL`：将保留期设置为默认值。\n\
  *   `0`：禁用历史记录。\n*   `-1`：禁用历史记录的清除。\n\n当初始化参数 `statistics_level` 设置为 `typical`（默认值）或\
  \ `all` 时，超过保留期的旧统计信息会被自动清除。当需要手动清除时，`dbms_stats` 包提供了过程 `purge_stats`。以下调用会清除历史记录中超过\
  \ 14 天的所有统计信息：\n\n```sql\ndbms_stats.purge_stats(before_timestamp => systimestamp-14)\n\
  ```\n\n要执行过程 `alter_stats_history_retention` 和 `purge_stats`，你需要拥有系统权限 `analyze\
  \ any dictionary`。\n\n### 视图\n\n如果你有兴趣了解给定表的对象统计信息是何时被修改的，数据字典视图 `user_tab_stats_history`\
  \ 提供了所有必要的信息。当然，也存在该视图的 `dba` 和 `all` 版本。\n\n下面是一个例子。通过以下查询，可以显示 `sys` 模式中表 `tab$`\
  \ 的对象统计信息何时被修改：\n\n```sql\nSQL> SELECT stats_update_time\n  2  FROM dba_tab_stats_history\n\
  \  3  WHERE owner = 'SYS' and table_name = 'TAB$';\n\nSTATS_UPDATE_TIME\n-------------------------------------------------\n\
  05-MAY-07 06.58.48.005969 AM +02:00\n11-MAY-07 10.01.00.898243 PM +02:00\n```\n\n\
  ### 恢复统计信息\n\n在必要时，可以从历史记录中恢复统计信息。为此，`dbms_stats` 包提供了以下过程：\n\n*   `restore_database_stats`：恢复整个数据库的对象统计信息。\n\
  *   `restore_dictionary_stats`：恢复数据字典的对象统计信息。\n*   `restore_fixed_objects_stats`：恢复固定表的对象统计信息。\n\
  *   `restore_system_stats`：恢复系统统计信息。\n*   `restore_schema_stats`：恢复单个模式的对象统计信息。\n\
  *   `restore_table_stats`：恢复单个表的对象统计信息。\n\n除了指定目标的参数（例如，过程 `restore_table_stats`\
  \ 的模式名和表名参数）外，所有这些过程都提供以下参数：\n\n*   `as_of_timestamp`：恢复特定时间点正在使用的统计信息。\n*   `force`：指定是否应覆盖锁定的统计信息。请注意，统计信息上的锁是历史记录的一部分。这意味着关于统计信息是否被锁定的信息也会随恢复操作一起恢复。默认值为\
  \ `FALSE`。\n*   `no_invalidate`：指定依赖于被覆盖统计信息的游标是否失效。此参数接受值 `TRUE`、`FALSE` 和 `dbms_stats.auto_invalidate`。默认值为\
  \ `dbms_stats.auto_invalidate`。\n\n以下调用将模式 `SH` 的对象统计信息恢复到一天前正在使用的值。由于参数 `force`\
  \ 设置为 `TRUE`，即使统计信息当前被锁定，也会执行恢复。\n\n```sql\ndbms_stats.restore_schema_stats(ownname\
  \         => 'SH',\n                                as_of_timestamp => systimestamp\
  \ – 1,\n                                force           => TRUE)\n```\n\n## 创建和删除备份表\n\
  \n在本章中，我已经讨论了如何利用备份表。本节描述如何创建和删除一个备份表。\n\n要创建备份表，`dbms_stats` 包提供了过程 `create_stat_table`。如下例所示，创建过程只需指定备份表的所有者（通过参数\
  \ `ownname`）和名称（通过参数 `stattab`）。此外，可选参数 `tblspace` 指定了在哪个表空间中创建该表。如果未指定 `tblspace`\
  \ 参数，默认情况下，该表将创建在用户的默认表空间中。\n\n```sql\ndbms_stats.create_stat_table(ownname  =>\
  \ user,\n                             stattab  => 'MYSTATS',\n                 \
  \            tblspace => 'USERS')\n```\n\n由于备份表用于存储不同类型的信息，其大多数列都是通用的。例如，有 12 列用于存储数值，命名为\
  \ `n1` . . . `n12`，以及 5 列用于存储字符串值，命名为 `c1` . . . `c5`。\n\n要删除表，`dbms_stats` 包提供了过程\
  \ `drop_stat_table`。你也可以使用常规的 `DROP TABLE` 命令来删除它。\n\n```sql\ndbms_stats.drop_stat_table(ownname\
  \ => user,\n                           stattab => 'MYSTATS')\n```\n\n## 导出、导入、获取和设置操作\n\
  \n如图 4-1 所示，除了用于收集统计信息的过程外，`dbms_stats` 包还提供了其他几个过程和函数。我在这里不描述它们，因为它们在实践中并不常用。有关它们的信息，请参考\
  \ *PL/SQL Packages and Types Reference* 手册。\n\n## 日志记录\n\n自 Oracle Database 10*g*\
  \ 起，在数据库、数据字典或模式级别工作的 `dbms_stats` 包中的过程，会将其执行信息记录在数据字典中。此日志信息通过数据字典视图 `dba_optstat_operations`\
  \ 对外提供。基本上，你可以知道执行了哪些操作、它们是何时开始的以及耗时多久。以下示例摘自一个生产数据库，显示过程 `gather_database_stats`\
  \ 除了周日外每天都会启动，运行时间在 10 到 17 分钟之间：\n\n```sql\nSQL> SELECT operation, start_time,\n\
  \  2         (end_time-start_time) DAY(1) TO SECOND(0) AS duration\n  3  FROM dba_optstat_operations\n\
  \  4  ORDER BY start_time DESC;\n\nOPERATION                   START_TIME      \
  \  DURATION\n--------------------------- ----------------- -----------\ngather_database_stats(auto)\
  \ 07-MAY-2007 22:00 +0 00:10:44\ngather_database_stats(auto) 05-MAY-2007 06:00 +0\
  \ 00:12:03\ngather_database_stats(auto) 04-MAY-2007 22:00 +0 00:10:03\ngather_database_stats(auto)\
  \ 03-MAY-2007 22:00 +0 00:15:54\ngather_database_stats(auto) 02-MAY-2007 22:00 +0\
  \ 00:10:42\ngather_database_stats(auto) 01-MAY-2007 22:00 +0 00:16:40\ngather_database_stats(auto)\
  \ 30-APR-2007 22:00 +0 00:11:56\ngather_database_stats(auto) 28-APR-2007 06:00 +0\
  \ 00:13:56\ngather_database_stats(auto) 27-APR-2007 22:00 +0 00:10:50\n...\n```\n\
  \n日志表的内容与统计信息历史记录同时被清除，因此，它具有相同的保留期。\n\n\n### 转至 第 5 章\n\n本章介绍了系统统计信息和对象统计信息的概念。前者提供了关于\
  \ CPU 和 I/O 子系统的性能信息，而后者描述了数据库中存储的数据。换句话说，统计信息描述了查询优化器运行的环境。本章还介绍了如何使用 `dbms_stats`\
  \ 包收集统计信息，以及在数据字典中何处可以找到它们。\n\n本章关于系统统计信息和对象统计信息的使用介绍得不多。这些信息将在下一章中提供，同时还将介绍用于配置查询优化器的初始化参数。阅读完下一章后，您应该能够正确配置查询优化器，从而在大多数情况下从中获得高效的执行计划。\n\
  \n***\n\n1.  常识表明，读取单个数据块应该比读取多个数据块更快。奇怪的是，现实情况并非总是如此。无论如何，重要的是要认识到存在差异。\n2.  实际上，即使在\
  \ Oracle Database 10g 中，也有一种不受支持的方式来使用 I/O 成本模型。您可以将未公开的初始化参数 `_optimizer_cost_model`\
  \ 设置为 `io`。\n3.  该公式在手册 *Oracle9i Database Performance Tuning Guide and Reference*\
  \ 中可用（即使形式不同）。从 Oracle Database 10*g* 开始，它已从手册中消失。\n4.  不幸的是，Oracle 并未通过数据字典视图提供所有必要的信息。因此，此查询基于内部表。系统权限\
  \ `select any dictionary` 提供了访问必要视图的权限。\n5.  为简单起见，我没有描述所有可能的组合，因为其中许多是冗余的或在实践中无用。\n\
  6.  实际上，使用 `indexed` 和 `hidden` 选项，可以将统计信息收集限制在仅索引列和隐藏列。通常，对象统计信息应适用于所有列。因此，应避免使用这两个选项（因此它们在图中以灰色显示）。如果某些列不需要对象统计信息，则应使用\
  \ 图 4-9 中描述的语法。\n7.  不幸的是，Oracle 没有通过数据字典视图公开此信息，这意味着此查询基于内部表。系统权限 `select any dictionary`\
  \ 提供了对该表的访问权限。\n8.  有关 *标识符* 的定义，请参阅 Oracle 文档的 *SQL Language Reference* 手册。\n9.\
  \  不幸的是，Oracle 没有通过数据字典视图公开此信息，这意味着此查询基于内部表。系统权限 `select any dictionary` 提供了对该表的访问权限。\n\
  10. 这是自 Oracle Database 10*g* 起可用的新调度程序的名称。\n\n## 第 5 章 配置查询优化器\n\n`T` 查询优化器直接负责\
  \ SQL 语句的性能。因此，花些时间正确配置它是有意义的。事实上，如果没有最优配置，查询优化器可能会生成低效的执行计划，从而导致性能不佳。\n\n查询优化器的配置不仅包括多个初始化参数，还包括系统统计信息和对象统计信息。（我在\
  \ 第 4 章 中讨论了系统统计信息和对象统计信息。）本章将描述这些初始化参数和统计信息如何影响查询优化器，并提出一个直接且实用的路线图，以帮助您成功完成配置。\n\
  \n***\n\n**注意** 本章提供的公式（除一个例外）均未由 Oracle 公布。多项测试表明，它们能够描述查询优化器如何估算给定操作的成本。无论如何，它们既不声称精确，也不声称在所有情况下都正确。在此提供它们是为了让您了解初始化参数或统计信息如何影响查询优化器的估算。\n\
  \n***\n\n#### 配置与否，这是个问题……\n\n改编一句肯尼亚谚语¹ 以适应我们这里的情况，我想说“配置查询优化器成本高昂，但值得这笔开销。”在实践中，我见过太多低估良好配置重要性的站点。我甚至时不时地与人们进行激烈的讨论，他们对我说：“我们不需要为每个数据库单独花时间配置查询优化器。我们已经有一套初始化参数，并在所有数据库上反复使用。”我的第一个回答通常是这样的：“如果一套参数在所有数据库上都运行良好，Oracle\
  \ 为什么要引入近两打专门用于查询优化器的初始化参数？他们知道自己在做什么。如果存在这样一种神奇的配置，他们会默认提供它，并将这些初始化参数设为未公开。”然后我继续仔细解释，这种神奇的配置并不存在，因为\n\
  \n*   每个应用程序都有自己的要求和工作负载特征，并且\n*   每个系统（由不同的硬件和软件组件组成）都有自己的特点。\n\n如果相关人员是客户，我通常还会提醒他们：“您打电话给我是因为有性能问题，对吧？应用程序在某些情况下可能没有发挥最佳性能，但数据库也对目前的情况负有责任……所以，让我们来解决这个问题。”\n\
  \n话虽如此，至少自 Oracle9*i* 第 2 版以来，查询优化器工作良好，这意味着它为大多数² SQL 语句生成了良好的执行计划。不过要小心，因为这仅在查询优化器配置正确且数据库设计能够充分利用其所有功能的前提下才成立。这一点怎么强调都不为过。还要注意，查询优化器的配置不仅包括初始化参数，还包括系统统计信息和对象统计信息。\n\
  \n\n## 配置路线图\n\n既然不存在所谓的“神奇配置”，我们就需要一个稳固可靠的流程来辅助我们。图 5-1 总结了我所遵循的主要步骤。\n\n![image](img/0501.jpg)\n\
  \n**图 5-1.** 配置路线图的主要步骤\n\n以下是图 5-1 中编号步骤的说明。\n\n1.  始终应调整两个初始化参数：`optimizer_mode`\
  \ 和 `db_file_multiblock_read_count`。正如本章后面将看到的，后者对于查询优化器本身已不再那么重要。然而，某些操作的性能可能强烈依赖于它。\n\
  2.  由于此步骤中调整的初始化参数默认值通常不错，因此本步骤是可选的。无论如何，此步骤的目的是启用或禁用查询优化器的特定功能。\n3.  由于系统统计信息和对象统计信息为查询优化器提供了至关重要的信息，因此必须收集它们。\n\
  4.  通过初始化参数 `workarea_size_policy`，可以选择在手动和自动调整为在内存中存储数据的操作提供的工作区域大小之间做出选择。根据选择的方法，其他初始化参数将在步骤\
  \ 5 或步骤 6 中设置。\n5.  如果工作区域大小调整是自动的，则设置初始化参数 `pga_aggregate_target`。\n6.  如果工作区域大小调整是手动的，则实际大小取决于使用内存的操作类型。基本上，为每种操作类型设置一个特定的初始化参数。\n\
  7.  当配置的第一部分可用时，就该测试应用程序了。在测试期间，收集那些未提供所需性能的组件的执行计划。通过分析这些执行计划，你应该能够推断出问题所在。请注意，在此阶段，识别通用的（而非个别的）行为很重要。例如，你可能会注意到查询优化器使用过多或过少的索引，或者未能正确识别限制条件。\n\
  8.  如果查询优化器为大多数 SQL 语句生成了高效的执行计划，那么配置就是好的。如果没有，则进行步骤 9。\n9.  如果查询优化器倾向于使用过多或过少的索引或嵌套循环，通常可以通过调整初始化参数\
  \ `optimizer_index_caching` 和 `optimizer_index_cost_adj` 来解决问题。如果查询优化器在基数估算方面出错，则可能是某些直方图缺失或需要调整。从\
  \ Oracle Database 11*g* 开始，扩展统计信息也可能有所帮助。\n\n根据图 5-1，在步骤 1 至 6 中设置的初始化参数在之后无法更改。当然，这不是一成不变的。如果在步骤\
  \ 9 中通过调整与索引相关的初始化参数或直方图无法取得良好结果，可能有必要从头开始。同样值得一提的是，由于多个初始化参数会影响系统统计信息，更改它们后可能需要重新计算系统统计信息。\n\
  \n## 设置正确的参数！\n\n我相当确信 Oracle 并非随意提供新的初始化参数。相反，每个初始化参数的引入都是为了控制查询优化器中一个非常具体的功能或行为。冒着重复自己的风险，我必须提醒你，既然\
  \ Oracle 引入了某个参数，这就意味着没有一种值可以适用于所有情况。因此，对于每个初始化参数，你必须从应用程序工作负载概况和运行数据库引擎的系统两方面推断出一个合理的值。\n\
  \n为了成功配置查询优化器，理解其工作原理以及每个初始化参数对其产生的影响至关重要。有了这些知识，你应该做的是：\n\n*   理解当前状况。例如，为什么查询优化器选择了一个次优的执行计划？\n\
  *   确定要实现的目标。换句话说，你希望获得什么样的执行计划？\n*   找出应纠正哪些初始化参数（或可能是哪些统计信息）来实现你设定的目标。当然，在某些情况下，仅设置初始化参数是不够的。可能还需要修改\
  \ SQL 语句和/或数据库设计。\n\n以下部分描述了图 5-1 配置路线图中引用的初始化参数如何工作，并就如何为你的系统找到良好值提供建议。参数分为两组：一组只影响查询优化器的操作；另一组参数则与\
  \ *程序全局区* (`PGA`) 相关。\n\n\n\n"
- "# 查询优化器参数\n\n以下部分描述了与查询优化器操作相关的若干参数。\n\n## `optimizer_mode`\n\n初始化参数 `optimizer_mode`\
  \ 至关重要，因为它指定了查询优化器如何决定执行每条 SQL 语句最高效的执行计划。其关键性在于，它定义了“高效”一词的含义。它可能意味着“更快”、“使用更少资源”，或者其他什么。由于数据库处理的是数据，你通常会希望处理速度尽可能快。因此，“高效”的含义应该是以最快的方式执行\
  \ SQL 语句，同时不浪费不必要的资源。这对于总是完全执行的 SQL 语句（例如 `INSERT` 语句）来说是清晰的。而对于查询来说，则存在细微的差别。例如，应用程序没有义务获取查询返回的所有行。换句话说，查询可能只被部分执行。\n\
  \n让我举一个与 Oracle 无关的例子。当我用谷歌搜索“查询优化器”这个术语时，我立即得到一个包含前十条结果的页面。在同一页面上，我得知结果集中大约有 334,000\
  \ 个页面，搜索耗时 0.13 秒。这是一个很好的例子，展示了处理过程被优化以尽快提供初始数据。如果我想访问其中一个页面，我会点击链接。此时，我通常对只获取前几行不感兴趣。我需要整个页面可用且格式正确，然后我才会开始阅读。在这种情况下，处理应被优化为尽可能快地提供所有数据，而不仅仅是片段。每个应用程序都属于前面描述的两类情况之一：要么是快速交付结果集的第一部分很重要，要么是快速交付整个结果集很重要。\n\
  \n要选择初始化参数 `optimizer_mode` 的值，你必须自问：对于查询优化器来说，是生成用于快速交付首行的执行计划更重要，还是生成用于快速交付末行的执行计划更重要：\n\
  \n*   如果快速交付末行很重要，你应该使用 `all_rows` 这个值。此配置通常用于报表系统、OLAP 系统、数据仓库以及缓存数据的中间层组件。\n*\
  \   如果快速交付首行（或多行）很重要，你应该使用 `first_rows_n` 这个值（其中 `n` 是 1、10、100 或 1000 行）。此配置通常用于\
  \ OLTP 系统。注意，较旧的首行优化器（通过 `first_rows` 值配置）不应再使用。实际上，它仅为向后兼容而提供。\n\n在 Oracle9*i*\
  \ 及之前，默认值是 `choose`。这意味着，如果对于需要优化的 SQL 语句中引用的对象中，至少有一个对象的对象统计信息可用，则使用 `all_rows`\
  \ 值；否则，使用 `rule` 值。然而，在某些情况下，即使没有对象统计信息可用，数据库引擎也会强制使用 `all_rows`。这是因为，一般来说，基于规则的优化器不支持\
  \ Oracle7 之后添加的结构（例如，分区表）。从 Oracle Database 10*g* 开始，基于规则的优化器已被弃用，因此新的默认值是 `all_rows`。因此，`choose`\
  \ 和 `rule` 值不再受支持。\n\n初始化参数 `optimizer_mode` 是动态的，可以在实例和会话级别进行更改。此外，通过以下提示（hint），可以在语句级别进行设置：\n\
  \n*   `all_rows`\n*   `first_rows(n)`，其中 `n` 是任何自然数（大于 0）\n\n## `optimizer_features_enable`\n\
  \n在每个数据库版本中，Oracle 都会在查询优化器中引入或启用新特性。如果你要升级到新的数据库版本，并希望保留查询优化器的旧行为，可以将初始化参数 `optimizer_features_enable`\
  \ 设置为你要升级的数据库版本。也就是说，设置它只是一个短期的变通方法，应用程序迟早应该为新的数据库版本进行适配（优化）。此外，并非所有新特性都会被此初始化参数禁用。例如，如果你在\
  \ Oracle Database 10*g* 中将其设置为 `9.2.0`，你得到的并不是 `9.2.0` 版本的查询优化器。因此，我通常建议使用默认值，该值与数据库二进制文件版本相同。\n\
  \n初始化参数 `optimizer_features_enable` 的有效值是诸如 `9.2.0`、`10.1.0.5` 或 `10.2.0.3` 的数据库版本。由于文档（特别是\
  \ *Oracle Database Reference* 手册）并未针对该参数的每个补丁级别及时更新，从 Oracle Database 10*g* Release\
  \ 2 开始，可以使用以下 SQL 语句生成实际支持的值：\n\n```sql\nSQL> SELECT value\n  2  FROM v$parameter_valid_values\n\
  \  3  WHERE name = 'optimizer_features_enable';\nVALUE\n---------------------\n\
  8.0.0\n8.0.3\n8.0.4\n...\n10.2.0.2\n10.2.0.3\n10.2.0.3.1\n```\n\n在 Oracle Database\
  \ 10*g* Release 1 及之前，视图 `v$parameter_valid_values` 不存在。我知道的唯一获取最新列表的变通方法是让数据库引擎生成一条错误消息，如下例所示。你也可以将这个技巧用于其他接受预定义值的初始化参数。\n\
  \n```sql\nSQL> ALTER SESSION SET optimizer_features_enable = 'dummy';\nERROR:\n\
  ORA-00096: invalid value dummy for parameter optimizer_features_enable, must be\n\
  from among 10.1.0.5.1, 10.1.0.5, 10.1.0.4, 10.1.0.3, 10.1.0, 9.2.0, 9.0.1, 9.0.0,\n\
  8.1.7, 8.1.6, 8.1.5, 8.1.4, 8.1.3, 8.1.0, 8.0.7, 8.0.6, 8.0.5, 8.0.4, 8.0.3, 8.0.0\n\
  ```\n\n初始化参数 `optimizer_features_enable` 是动态的，可以在实例和会话级别更改。此外，从 Oracle Database\
  \ 10*g* 开始，可以使用提示 `optimizer_features_enable` 在语句级别指定一个值。以下两个示例分别展示了用于指定默认值和特定值的提示：\n\
  \n*   `optimizer_features_enable(default)`\n*   `optimizer_features_enable('9.2.0')`\n\
  \n需要注意的是，初始化参数 `optimizer_features_enable` 不仅会禁用新特性，也会禁用错误修复。脚本 `bug5015557.sql`\
  \ 提供了这样一个例子。如果你在 Oracle Database 10*g` 补丁集 `10.1.0.5` 或更高版本上运行它，你会看到，当参数设置为 `10.1.0.5`\
  \ 时查询正确运行，但当设置为 `10.1.0.4` 时，查询会因 ORA-03113 错误而失败。\n\n## `db_file_multiblock_read_count`\n\
  \n数据库引擎在多块读取（例如，全表扫描或索引快速全扫描）期间使用的最大 I/O 大小，是由初始化参数 `db_file_multiblock_read_count`\
  \ 和 `db_block_size` 的值相乘决定的。因此，多块读取期间读取的最大块数，是通过最大 I/O 大小除以块大小来确定的。换句话说，对于默认块大小，初始化参数\
  \ `db_file_multiblock_read_count` 指定了读取的最大块数。这“仅仅”是一个最大值，因为至少有三种常见情况会导致多块读取的块数小于此初始化参数指定的值：\n\
  \n*   段头是通过单块读取读取的。\n*   物理读取永远不会跨越多个区。\n*   除了直接读取外，已在缓冲区缓存中的块不会从 I/O 子系统重新读取。\n\
  \n\n\n"
- "# Oracle 数据库中的多块读操作与性能优化\n\n## 数据段的物理结构\n\n作为示例，图 5-2 展示了存储在数据库中的一个段的结构。和任何段一样，它由区组成（本例中是两个），每个区又由块组成（本例中是\
  \ 16 个）。第一个区的第一个块是段头。一些块（4、9、10、19 和 21）已被缓存在缓冲区缓存中。因此，执行此段串行全扫描（并行全扫描具有将在第 11 章中描述的特殊行为）的数据库引擎进程将无法执行任何物理读取，即使初始化参数\
  \ `db_file_multiblock_read_count` 被设置为大于或等于 32 的值。\n\n![image](img/0502.jpg)\n\n\
  **图 5-2.** *数据段的结构*\n\n## 物理读操作示例\n\n如果将初始化参数 `db_file_multiblock_read_count` 设置为\
  \ 8，那么将执行以下物理读取：\n\n*   一次段头（块 1）的单块读取。\n*   一次读取两个块（2 和 3）的多块读取。由于块 4 被缓存，无法读取更多块。\n\
  *   一次读取四个块（从 5 到 8）的多块读取。由于块 9 被缓存，无法读取更多块。\n*   一次读取六个块（从 11 到 16）的多块读取。由于块 16\
  \ 是该区的最后一个块，无法读取更多块。\n*   一次读取两个块（17 和 18）的多块读取。由于块 19 被缓存，无法读取更多块。\n*   一次块 20\
  \ 的单块读取。由于块 21 被缓存，无法读取更多块。\n*   一次读取八个块（从 22 到 29）的多块读取。由于初始化参数 `db_file_multiblock_read_count`\
  \ 设置为 8，无法读取更多块。\n*   一次读取三个块（从 30 到 32）的多块读取。\n\n总之，该进程执行了两次单块读取和六次多块读取。一次多块读取平均读取的块数约为四。平均值小于八这一事实解释了为什么\
  \ Oracle 在系统统计信息中引入了 `mbrc` 值。\n\n## 多块读操作的成本计算\n\n此时，了解查询优化器如何计算多块读操作（例如，全表扫描或索引快速全扫描）的成本也很重要。正如\
  \ Wolfgang Breitling 在论文\"A Look Under the Hood of CBO: The 10053 Event\"中指出的，当没有可用的系统统计信息时，成本计算可以很好地用公式\
  \ 5-1 建模。\n\n![images/U0501.jpg](img/U0501.jpg)\n\n**公式 5-1.** *无系统统计信息时的多块读操作 I/O\
  \ 成本*\n\n当有工作负载系统统计信息可用时，I/O 成本不再依赖于初始化参数 `db_file_multiblock_read_count` 的值。它通过公式\
  \ 5-2 计算。请注意，`mreadtim` 除以 `sreadtim` 是因为查询优化器根据单块读取对成本进行归一化，正如前一章（公式 4-2）已经讨论过的。\n\
  \n![images/U0502.jpg](img/U0502.jpg)\n\n**公式 5-2.** *有工作负载统计信息时的多块读操作 I/O 成本*\n\n\
  在公式 5-2 中，对于无工作负载统计信息的情况，`mbrc` 被替换为初始化参数 `db_file_multiblock_read_count` 的值，`sreadtim`\
  \ 被替换为由公式 4-3 计算的值，`mreadtim` 被替换为由公式 4-4 计算的值。\n\n这意味着只有在工作负载统计信息不可用时，初始化参数 `db_file_multiblock_read_count`\
  \ 才会直接影响多块读操作的成本。这也意味着过高的值可能导致过度的全表扫描，或者至少会低估多块读操作的成本。此外，这是工作负载统计信息优于无工作负载统计信息或完全没有系统统计信息的另一种情况。\n\
  \n## 如何设置 `db_file_multiblock_read_count`\n\n现在你已经看到了成本公式，我必须描述如何找出此参数应设置的值。最重要的是要认识到多块读是一项性能特性。因此，初始化参数\
  \ `db_file_multiblock_read_count` 应设置为能实现最佳性能的值。为此，必须认识到更高的值并非在所有情况下都能提供更好的性能。此外，超过操作系统支持的最大物理\
  \ I/O 大小是没有意义的。一个简单的全表扫描配合不同的值，可以提供关于此初始化参数影响的有用信息，从而帮助找到最优值。以下 PL/SQL 块（摘自脚本 `assess_dbfmbrc.sql`）可用于此目的：\n\
  \n```\nDECLARE\n  l_count PLS_INTEGER;\n  l_time PLS_INTEGER;\n  l_starting_time\
  \ PLS_INTEGER;\n  l_ending_time PLS_INTEGER;\nBEGIN\n  dbms_output.put_line('dbfmbrc\
  \ seconds');\n  FOR l_dbfmbrc IN 1..32\n  LOOP\n    EXECUTE IMMEDIATE 'ALTER SESSION\
  \ SET db_file_multiblock_read_count='||l_dbfmbrc;\n    l_starting_time := dbms_utility.get_time();\n\
  \    SELECT /*+ full(t) */ count(*) INTO l_count FROM big_table t;\n    l_ending_time\
  \ := dbms_utility.get_time();\n    l_time := round((l_ending_time-l_starting_time)/100);\n\
  \    dbms_output.put_line(l_dbfmbrc||' '||l_time);\n  END LOOP;\nEND;\n```\n\n如你所见，这并不难，因为初始化参数\
  \ `db_file_multiblock_read_count` 是动态的，可以在实例和会话级别更改。无论如何，请注意不要在数据库、操作系统和 I/O 子系统级别缓存测试表，这将使测试失效。最简单的避免方法是使用比系统中最大缓存还要大的表。请注意，这里避免了并行处理，因为数据库引擎通常使用不同的系统调用来执行并行全表扫描和串行全表扫描。\n\
  \n## 不同系统上的性能影响\n\n图 5-3 展示了使用上述 PL/SQL 块测量的几个系统的特性：\n\n*系统 1*：\n\n性能随着 I/O 大小的增大而提高。对于\
  \ 8 到 10 的值，增益显著。更大的值带来的好处很小。\n\n*系统 2*：\n\n高达 16 的值性能不佳（增益小于 10%）。从 16 切换到 17，增益增加了\
  \ 30%。大于 17 的值提供的益处很小。对于此系统，应避免小于 17 的值。\n\n*系统 3*：\n\n对于高达 8 的值，增益显著。对于 8 到 16\
  \ 之间的值，增益稳定。从 16 切换到 17，增益下降了 16%。对于此系统，应避免大于 16 的值。\n\n*系统 4*：\n\n此系统的性能与 I/O 大小无关。\n\
  \n## 自动配置\n\n从 Oracle Database 10*g* Release 2 开始，还可以指示数据库引擎自动配置初始化参数 `db_file_multiblock_read_count`\
  \ 的值。要使用此功能，只需不设置它即可。如公式 5-3 所示，数据库引擎随后会尝试将其设置为允许 1MB 物理读取的值。但同时，会应用一种完整性检查，如果缓冲区缓存的大小相对于数据库支持的会话数量相当小，则会减小该值。\n\
  \n![images/U0503.jpg](img/U0503.jpg)\n\n\n\n**公式 5-3.** `db_file_multiblock_read_count`\
  \ 初始化参数在 Oracle Database 10g Release 2 中的默认值\n\n![image](img/0503.jpg)\n\n**图 5-3.**\
  \ I/O 大小对四台不同系统上全表扫描性能的影响\n\n如前所述，由于使用最大 I/O 大小的物理读操作并非总是表现更好，因此不建议使用此功能。最好还是根据具体情况找出最优值。\n\
  \n请注意，如果在此自动配置中未使用工作负载统计信息，在公式 5-2 中，`mbrc` 不会被自动配置的值替换，而是使用值 8。\n\n## `optimizer_dynamic_sampling`\n\
  \n查询优化器过去仅基于存储在数据字典中的对象统计信息进行估计。随着动态采样的出现，这一情况发生了改变。事实上，一些统计信息也可能在解析阶段被动态收集。这意味着为了收集额外的信息，会对引用的对象执行一些查询。不幸的是，动态采样收集的统计信息既不存储在数据字典中，也不存储在其他任何地方。唯一能近乎重用它们的方式是直接重用共享游标本身。\n\
  \n初始化参数 `optimizer_dynamic_sampling` 的值（也称为*级别*）指定了动态采样的使用方式和时机。表 5-1 总结了可接受的值及其含义。请注意，默认值取决于初始化参数\
  \ `optimizer_features_enable`。\n\n*   如果 `optimizer_features_enable` 设置为 10.0.0\
  \ 或更高，默认为级别 2。\n*   如果 `optimizer_features_enable` 设置为 9.2.0，默认为级别 1。\n*   如果 `optimizer_features_enable`\
  \ 设置为 9.0.1 或更低，则禁用动态采样。\n\n该参数是动态的，可以在实例级别使用 SQL 语句 `ALTER SYSTEM` 更改，也可以在会话级别使用\
  \ SQL 语句 `ALTER SESSION` 更改。此外，还可以通过提示 `dynamic_sampling` 在语句级别指定一个值。该提示有两个可用选项：\n\
  \n*   可以为所有表设置一个值：`dynamic_sampling(`*`级别`*`)`\n*   可以为特定表设置一个值：`dynamic_sampling(`*`表名\
  \ 级别`*`)`\n\n**表 5-1.** 动态采样级别及其含义\n\n| 级别 | 动态采样何时使用？ | 块数^* |\n| --- | --- | ---\
  \ |\n| 0 | 禁用动态采样。 | 0 |\n| 1 | 动态采样用于没有对象统计信息的表。但是，这仅在满足以下三个条件时发生：表没有索引，是连接（也包括子查询或不可合并视图）的一部分，并且其块数多于用于采样的块数。\
  \ | 32 |\n| 2 | 动态采样用于所有没有对象统计信息的表。 | 64 |\n| 3 | 动态采样用于所有满足级别 2 标准的表，并且额外用于通过猜测来估计谓词选择性的表。\
  \ | 32 |\n| 4 | 动态采样用于所有满足级别 3 标准的表，并且额外用于在 `WHERE` 子句中引用了两个或更多列的表。 | 32 |\n| 5\
  \ | 与级别 4 相同。 | 64 |\n| 6 | 与级别 4 相同。 | 128 |\n| 7 | 与级别 4 相同。 | 256 |\n| 8 | 与级别\
  \ 4 相同。 | 1024 |\n| 9 | 与级别 4 相同。 | 4096 |\n| 10 | 与级别 4 相同。 | 全部 |\n| ** 这是通过初始化参数或不带表名（或别名）的提示激活动态采样时使用的采样块数。当使用带表名（或别名）的提示时，除级别\
  \ 10 外，块数通过以下公式计算：32*2^(级别-1)。 |\n\n以下是一些示例（摘自在 10.2.0.3 版本上运行的脚本 `dynamic_sampling_levels.sql`），说明了在哪些情况下级别\
  \ 1 到 4 会触发动态采样。测试所用的表通过以下 SQL 语句创建。最初，它们没有对象统计信息。请注意，表 `t_noidx` 和表 `t_idx` 之间的唯一区别是后者有一个主键。\n\
  \n```sql\nCREATE TABLE t_noidx (id, n1, n2, pad) AS\nSELECT rownum, rownum, round(dbms_random.value(1,100)),\
  \ dbms_random.string('p',1000)\nFROM all_objects\nWHERE rownum <= 1000\n```\n\n\
  ```sql\nCREATE TABLE t_idx (id PRIMARY KEY, n1, n2, pad) AS\nSELECT *\nFROM t_noidx\n\
  ```\n\n第一次测试查询如下。它们之间的唯一区别是第一个引用了表 `t_noidx`，而第二个引用了表 `t_idx`。\n\n```sql\nSELECT\
  \ *\nFROM t_noidx t1, t_noidx t2\nWHERE t1.id = t2.id AND t1.id < 19\n```\n\n```sql\n\
  SELECT *\nFROM t_idx t1, t_idx t2\nWHERE t1.id = t2.id AND t1.id < 19\n```\n\n如果级别设置为\
  \ 1，动态采样仅对第一个查询执行，因为第二个查询引用的表是索引的。以下是在我的测试数据库上为表 `t_noidx` 收集统计信息的递归查询。为便于阅读，删除了一些提示并将绑定变量替换为字面量。请注意，在执行测试查询之前激活了\
  \ SQL 跟踪。然后，我只需检查生成的跟踪文件以找出执行了哪些递归 SQL 语句。\n\n```sql\nSELECT NVL(SUM(C1),0),\n \
  \      NVL(SUM(C2),0),\n       COUNT(DISTINCT C3),\n       NVL(SUM(CASE WHEN C3\
  \ IS NULL THEN 1 ELSE 0 END),0)\nFROM (\n  SELECT 1 AS C1,\n         CASE WHEN \"\
  T1\".\"ID\"<19\" THEN 1 ELSE 0 END AS C2,\n         \"T1\".\"ID\" AS C3\n  FROM\
  \ \"T_NOIDX\" SAMPLE BLOCK (20,1) SEED (1) \"T1\"\n) SAMPLESUB\n```\n\n以下是一些需要注意的重要点：\n\
  \n*   查询优化器统计总行数、`WHERE` 子句中指定范围（`id < 19`）内的行数，以及列 `id` 的不同值数量和 `NULL` 值数量。\n*\
  \   查询中使用的值必须是已知的。如果使用了绑定变量，查询优化器必须能够窥视值才能执行动态采样。\n*   使用 `SAMPLE` 子句执行采样。在我的数据库中，表\
  \ `t_noidx` 有 155 个块，因此采样百分比为 20%（32/155）。\n\n如果级别设置为 2，两个测试查询都会执行动态采样，因为在该级别下，当缺少对象统计信息时总是使用动态采样。用于为两个表收集统计信息的递归查询与前面显示的相同。采样百分比增加了，因为在该级别下，它是基于\
  \ 64 个块而不是 32 个块。此外，对于表 `t_idx`，还会执行以下递归查询。其目的是扫描索引，而不是像前一个查询那样扫描表。这是因为对表的快速采样可能会错过\
  \ `WHERE` 子句中谓词指定的范围内的行。而快速扫描索引则肯定能定位到这些行（如果存在的话）。\n\n```sql\nSELECT NVL(SUM(C1),0),\
  \ NVL(SUM(C2),0), NVL(SUM(C3),0)\nFROM (\n  SELECT 1 AS C1, 1 AS C2, 1 AS C3\n \
  \ FROM \"T_IDX\" \"T1\"\n  WHERE \"T1\".\"ID\"<19 AND ROWNUM <= 2500\n) SAMPLESUB\n\
  ```\n\n下一个动态采样级别是 3。从该级别开始，即使数据字典中已有对象统计信息，也会使用动态采样。在执行进一步测试之前，使用以下 PL/SQL 块收集了对象统计信息：\n\
  \n\n\n"
- "# 动态采样与优化器参数\n\n## 动态采样的工作原理\n\n如果动态采样级别设置为 3 或更高，查询优化器将执行动态采样，通过测量表样本行的选择性来估计谓词的选择性，而不是使用数据字典统计信息和可能的硬编码值。以下两个查询说明了这一点：\n\
  \n```sql\nSELECT *\nFROM t_idx\nWHERE id = 19\n```\n\n```sql\nSELECT *\nFROM t_idx\n\
  WHERE round(id) = 19\n```\n\n对于第一个查询，查询优化器能够基于列统计信息和直方图估计谓词 `id=19` 的选择性，因此不需要动态采样。而对于第二个查询（除非为表达式\
  \ `round(id)` 设置了扩展统计信息），查询优化器无法推断谓词 `round(id)=19` 的选择性。实际上，列统计信息和直方图仅提供关于列 `id`\
  \ 本身的信息，而不是其四舍五入后的值。用于动态采样的查询如下所示。如你所见，它与之前讨论的查询具有相同的结构。列 `c2` 不同，因为导致动态采样的 SQL\
  \ 语句的 `WHERE` 子句不同。由于对索引列 (`id`) 应用了表达式，即使对于表 `t_idx`，在此特定情况下也不会对索引进行采样。\n\n```sql\n\
  SELECT NVL(SUM(C1),0), NVL(SUM(C2),0), COUNT(DISTINCT C3)\nFROM (\n  SELECT 1 AS\
  \ C1,\n         CASE WHEN ROUND(\"T_IDX\".\"ID\")=19 THEN 1 ELSE 0 END AS C2,\n\
  \         ROUND(\"T_IDX\".\"ID\") AS C3\n  FROM \"T_IDX\" SAMPLE BLOCK (20,1) SEED\
  \ (1) \"T_IDX\"\n) SAMPLESUB\n```\n\n如果级别设置为 4 或更高，当 `WHERE` 子句中引用了同一表的两个或多个列时，查询优化器会执行动态采样。这对于改善相关列的估计非常有用。以下查询提供了一个示例。回顾用于创建测试表的\
  \ SQL 语句，你会注意到列 `id` 和 `n1` 包含相同的数据。\n\n```sql\nSELECT *\nFROM t_idx\nWHERE id <\
  \ 19 AND n1 < 19\n```\n\n同样在这种情况下，查询优化器执行动态采样，使用的查询与之前的查询结构相同。主要区别再次源于导致动态采样的 SQL\
  \ 语句的 `WHERE` 子句。\n\n```sql\nSELECT NVL(SUM(C1),0), NVL(SUM(C2),0)\nFROM (\n  SELECT\
  \ 1 AS C1,\n         CASE WHEN \"T_IDX\".\"ID\"<19 AND \"T_IDX\".\"N1\"<19 THEN\
  \ 1 ELSE 0 END AS C2\n  FROM \"T_IDX\" SAMPLE BLOCK (20,1) SEED (1) \"T_IDX\"\n\
  ) SAMPLESUB\n```\n\n总而言之，级别 1 和 2 通常不太有用。实际上，表和索引应该具有最新的对象统计信息。一个常见的例外是使用临时表时。通常，临时表没有可用的对象统计信息。无论如何，请注意，即使它们的临时表包含非常不同的数据集，多个会话也可能共享完全相同的游标。级别\
  \ 3 及更高对于改善“复杂”谓词的选择性估计非常有用。因此，如果查询优化器由于“复杂”谓词而无法做出正确的估计，请将初始化参数 `optimizer_dynamic_sampling`\
  \ 设置为 4。否则，请保持其默认值。无论如何，如第 4 章所述，从 Oracle Database 11*g* 开始，可以收集表达式和列组上的统计信息。因此，在许多情况下应该可以避免动态采样。\n\
  \n## `optimizer_index_cost_adj`\n\n初始化参数 `optimizer_index_cost_adj` 用于更改通过索引扫描访问表的成本。有效值范围从\
  \ 1 到 10,000，默认值为 100。大于 100 的值会使索引扫描成本更高，从而有利于全表扫描。小于 100 的值会使索引扫描成本更低。\n\n为了理解此初始化参数对成本计算公式的影响，描述查询优化器如何基于*索引范围扫描*计算与表访问相关的成本是很有用的。\n\
  \n索引范围扫描是对多个键的索引查找。如图 5-4 所示，会执行以下操作。\n\n1. 访问索引的根块。\n2. 遍历分支块以定位包含第一个键的叶块。\n3.\
  \ 对于满足搜索条件的每个键，执行以下操作：\n   1. 提取引用数据块的 `rowid`。\n   2. 访问由 `rowid` 引用的数据块。\n\n![image](img/0504.jpg)\n\
  \n**图 5-4.** *基于索引范围扫描的表访问期间执行的操作*\n\n索引范围扫描执行的物理读取次数等于：为定位包含第一个键的叶块而访问的分支块数量（统计信息\
  \ `blevel`），加上扫描的叶块数量（统计信息 `leaf_blocks` 乘以操作的选择性），再加上通过 `rowid` 访问的数据块数量（`clustering_factor`\
  \ 乘以操作的选择性）。这给出了公式 5-4，其中还考虑了由初始化参数 `optimizer_index_cost_adj` 应用的校正。\n\n![images/U0504.jpg](img/U0504.jpg)\n\
  \n**公式 5-4.** *基于索引范围扫描的表访问的 I/O 成本*\n\n***\n\n**注意** 在公式 5-4 中，使用相同的选择性来计算索引访问成本和表访问成本。实际上，查询优化器可能会为这两种不同的成本使用两种不同的选择性。当只有部分过滤器通过索引访问应用时，这是必要的。例如，当一个索引由三列组成且第二列没有限制时，就会发生这种情况。\n\
  \n***\n\n总之，你看到初始化参数 `optimizer_index_cost_adj` 对索引访问的 I/O 成本有直接影响。当它设置为小于默认值时，所有成本都会成比例地降低。在某些情况下，这可能是个问题，因为查询优化器会对其估计结果进行四舍五入。这意味着，即使多个索引的对象统计信息不同，就查询优化器而言，它们可能具有相同的成本。如果多个成本值相等，查询优化器会根据索引的名称做出决定！它只是简单地采用字母顺序中的第一个。以下示例演示了这个问题。请注意，当初始化参数\
  \ `optimizer_index_cost_adj` 和索引名称更改时，用于 `INDEX RANGE SCAN` 操作的索引如何变化。这是由脚本 `optimizer_index_cost_adj.sql`\
  \ 生成的输出摘录：\n\n```sql\nSQL> ALTER SESSION SET optimizer_index_cost_adj = 100;\n\n\
  SQL> SELECT * FROM t WHERE val1 = 11 AND val2 = 11;\n\n------------------------------------------------\n\
  | Id  | Operation                   | Name     |\n------------------------------------------------\n\
  |   0 | SELECT STATEMENT            |          |\n|*  1 |  TABLE ACCESS BY INDEX\
  \ ROWID| T        |\n|*  2 |   INDEX RANGE SCAN          | T_VAL2_I |\n------------------------------------------------\n\
  \n   1 - filter(\"VAL1\"=11)\n   2 - access(\"VAL2\"=11)\n\nSQL> ALTER SESSION SET\
  \ optimizer_index_cost_adj = 10;\n\nSQL> SELECT * FROM t WHERE val1 = 11 AND val2\
  \ = 11;\n```\n\n\n"
- "# Oracle 查询优化器初始化参数\n\n## 表访问的 I/O 成本\n\n```\n------------------------------------------------\n\
  | Id  | Operation                    | Name     |\n------------------------------------------------\n\
  |   0 | SELECT STATEMENT             |          |\n|*  1 |  TABLE ACCESS BY INDEX\
  \ ROWID | T        |\n|*  2 |   INDEX RANGE SCAN           | T_VAL1_I |\n------------------------------------------------\n\
  \n   1 - filter(\"VAL2\"=11)\n   2 - access(\"VAL1\"=11)\n\nSQL> ALTER INDEX t_val1_i\
  \ RENAME TO t_val3_i;\n\nSQL> SELECT * FROM t WHERE val1 = 11 AND val2 = 11;\n------------------------------------------------\n\
  | Id  | Operation                    | Name     |\n------------------------------------------------\n\
  |   0 | SELECT STATEMENT             |          |\n|*  1 |  TABLE ACCESS BY INDEX\
  \ ROWID | T        |\n|*  2 |   INDEX RANGE SCAN           | T_VAL2_I |\n------------------------------------------------\n\
  \n   1 - filter(\"VAL1\"=11)\n   2 - access(\"VAL2\"=11)\n```\n\n为了避免这种不稳定性，通常不建议将初始化参数\
  \ `optimizer_index_cost_adj` 设置为较低的值。同样重要的是要提到，系统统计信息提供了与此参数类似的调整。这意味着，如果系统统计信息已就绪，通常默认值就是合适的。同时请注意，系统统计信息没有此参数的缺点，因为它们增加成本而不是降低成本。\n\
  \n初始化参数 `optimizer_index_cost_adj` 是动态的，可以在实例和会话级别进行更改。\n\n## `optimizer_index_caching`\n\
  \n初始化参数 `optimizer_index_caching` 用于指定在执行 in-list 迭代器和嵌套循环连接期间，预计缓存在缓冲区高速缓存中的索引块数量（百分比）。值得注意的是，此初始化参数的值被查询优化器用于调整其估计值。换句话说，它并不指定数据库引擎实际缓存了每个索引的多少。有效值范围从\
  \ 0 到 100。默认值为 0。大于 0 的值会降低为 in-list 迭代器和嵌套循环连接的内部循环执行的索引扫描的成本。因此，它被用来推动这些操作的使用。\n\
  \n公式 5-5 展示了应用于上一节（公式 5-4）中提出的索引范围扫描成本公式的修正。\n\n![images/U0505.jpg](img/U0505.jpg)\n\
  \n**公式 5-5.** 基于索引范围扫描的表访问的 I/O 成本\n\n此初始化参数与我前面谈到的初始化参数 `optimizer_index_cost_adj`\
  \ 有一些共同的缺点。然而，它的影响范围较小，主要有两个原因。首先，它仅用于嵌套循环和 in-list 迭代器。其次，在用于索引范围扫描的成本公式（公式 5-5）中，它对聚类因子没有影响。由于聚类因子通常是成本公式中最大的因素，因此此初始化参数导致错误决策的可能性较小。总之，此初始化参数对查询优化器的影响小于初始化参数\
  \ `optimizer_index_cost_adj`。尽管如此，默认值通常就是合适的。\n\n初始化参数 `optimizer_index_caching`\
  \ 是动态的，可以在实例和会话级别进行更改。\n\n## `optimizer_secure_view_merging`\n\n初始化参数 `optimizer_secure_view_merging`\
  \ 从 Oracle Database 10*g* Release 2 开始可用，用于控制视图合并。它可以设置为 `FALSE` 或 `TRUE`。默认值为 `TRUE`。\n\
  \n-   `FALSE` 允许查询优化器始终进行视图合并。\n-   `TRUE` 仅当进行视图合并不会导致安全问题时，才允许查询优化器进行视图合并。\n\n\
  要理解此初始化参数的影响，更一般地描述视图合并，让我们看下面的示例（完整示例在脚本 `optimizer_secure_view_merging.sql` 中提供）。\n\
  \n假设你有一个非常简单的表，包含一个主键和另外两列：\n\n```sql\nCREATE TABLE t (\n  id NUMBER(10) PRIMARY\
  \ KEY,\n  class NUMBER(10),\n  pad VARCHAR2(10)\n)\n```\n\n出于安全原因，你希望通过以下视图提供对该表的访问。注意通过函数应用的过滤器，以部分显示表的内容。该函数如何实现以及其具体作用并不重要。\n\
  \n```sql\nCREATE OR REPLACE VIEW v AS\nSELECT *\nFROM t\nWHERE f(class) = 1\n```\n\
  \n另一个有权访问该视图的用户使用如下查询。注意对主键的限制，确保最多返回五行。\n\n```sql\nSELECT id, pad\nFROM v\nWHERE\
  \ id BETWEEN 1 AND 5\n```\n\n从性能角度来看，查询优化器现在有两个选择。第一个选项是从视图中选择所有行，然后应用过滤器 `id BETWEEN\
  \ 1 AND 5`。当然，如果视图返回大量数据，即使用户执行的查询提供了对主键的限制，性能也会非常差。第二个选项是将视图的查询与用户的查询合并，如下所示：\n\
  \n```sql\nSELECT id, pad\nFROM t\nWHERE f(class) = 1\nAND id BETWEEN 1 AND 5\n```\n\
  \n使用此查询，可以立即应用对主键的限制。因此，无论表中存储的数据量如何，性能都会很好。只要有可能，查询优化器就会利用视图合并。然而，这并不适用于所有情况。例如，当视图在\
  \ `SELECT` 子句中包含分组函数、集合运算符或层次查询时，查询优化器无法使用视图合并。这样的视图被称为**不可合并视图**。\n\n现在你理解了视图合并，是时候看看为什么视图合并可能从安全角度来看是危险的。假设，有权访问视图的用户创建了以下\
  \ PL/SQL 函数。如你所见，它只是通过调用包 `dbms_output` 来显示输入参数的值：\n\n```sql\nCREATE OR REPLACE\
  \ FUNCTION spy (id IN NUMBER, pad IN VARCHAR2) RETURN NUMBER AS\nBEGIN\n  dbms_output.put_line('id='||id||'\
  \ pad='||pad);\n  RETURN 1;\nEND;\n```\n\n将初始化参数 `optimizer_secure_view_merging`\
  \ 设置为 `FALSE` 后，你可以运行两个测试查询。两个查询都只返回用户允许查看的值。然而，在第二个查询中，借助视图合并和添加到查询中的函数，你能够看到本不应访问的数据。\n\
  \n```sql\nSQL> SELECT id, pad\n  2  FROM v\n  3  WHERE id BETWEEN 1 AND 5;\n\n \
  \       ID PAD\n---------- ----------\n         1 DrMLTDXxxq\n         4 AszBGEUGEL\n\
  \nSQL> SELECT id, pad\n  2  FROM v\n  3  WHERE id BETWEEN 1 AND 5\n  4  AND spy(id,\
  \ pad) = 1;\n\n        ID PAD\n---------- ----------\n         1 DrMLTDXxxq\n  \
  \       4 AszBGEUGEL\n\nid=1 pad=DrMLTDXxxq\nid=2 pad=XOZnqYRJwI\nid=3 pad=nlGfGBTxNk\n\
  id=4 pad=AszBGEUGEL\nid=5 pad=qTSRnFjRGb\n```\n\n将初始化参数 `optimizer_secure_view_merging`\
  \ 设置为 `TRUE`，第二个查询返回以下输出。如你所见，函数和查询显示了相同的数据。\n\n```sql\nSQL> SELECT id, pad\n  2\
  \  FROM v\n  3  WHERE id BETWEEN 1 AND 5\n  4  AND spy(id, pad) = 1;\n\n       \
  \ ID PAD\n---------- ----------\n         1 DrMLTDXxxq\n         4 AszBGEUGEL\n\n\
  id=1 pad=DrMLTDXxxq\nid=4 pad=AszBGEUGEL\n```\n\n\n总之，当初始化参数 `optimizer_secure_view_merging`\
  \ 设置为 `TRUE` 时，查询优化器会检查视图合并是否可能导致安全问题。如果存在这种情况，将不会执行视图合并，因此性能可能不是最优。基于此原因，如果您并非出于安全目的使用视图，最好将此初始化参数设置为\
  \ `FALSE`。\n\n初始化参数 `optimizer_secure_view_merging` 是动态的，可以在实例级别更改。它不能在会话级别更改。但是，拥有对象权限\
  \ `MERGE VIEW` 或系统权限 `MERGE ANY VIEW` 的用户不受此初始化参数所施加的限制。\n\n## PGA 管理\n\n将数据存储在内存中的操作（通常是排序操作和哈希连接）使用\
  \ *工作区* 来执行。这些工作区分配在每个服务器进程的私有内存中（PGA）。以下部分将描述专门用于配置这些工作区的初始化参数。\n\n通常，更大的工作区能提供更好的性能。因此，您应该将系统上可用的未使用内存分配给\
  \ PGA。不过，更改时需要小心。工作区的大小也会影响查询优化器的估计。您应该预期到不仅性能会改变，执行计划也会变化。换句话说，如果您想避免意外情况，任何修改都应经过仔细测试。\n\
  \n一般来说，本节不会为其描述的初始化参数提供具体数值。为特定应用程序找到合适值的唯一方法是测试并衡量需要多少 PGA 才能获得良好的性能。事实上，内存量仅影响性能，而不影响操作的执行方式。\n\
  \n### workarea_size_policy\n\n初始化参数 `workarea_size_policy` 指定了如何执行这些工作区的大小调整。它可以设置为以下两个值之一：\n\
  \n`auto`:\n\n单个工作区的大小调整委托给 `memory manager`（内存管理器）。通过初始化参数 `pga_aggregate_target`，仅指定整个系统的\
  \ PGA 总量。这是自 Oracle Database *10g* 起的默认值。\n\n`manual`:\n\n通过初始化参数 `bitmap_merge_area_size`、`hash_area_size`、`sort_area_size`\
  \ 和 `sort_area_retained_size`，您可以完全控制工作区的大小。这是 Oracle9*i* 中的默认值。\n\n在大多数情况下，`memory\
  \ manager` 都能很好地工作，因此强烈建议将 PGA 管理委托给它。以下是例外情况：\n\n*   在 Oracle9*i* 中，自动 PGA 管理在共享服务器（以前称为\
  \ `multithreaded server`）上不受支持。仅支持手动 PGA 管理。自 Oracle Database *10g* 起，自动 PGA 管理在共享服务器上同样得到支持。\n\
  *   截至 Oracle Database *10g* Release 1，工作区的最大大小被人为限制（例如，对于串行操作限制为 100MB），并且只能通过更改未文档化的参数来增加。如果工作区的大小需要远大于这些限制，这是一个重要的限制。自\
  \ Oracle Database *10g* Release 2 起，限制会随着可用内存的增加而自动提高。\n*   在极少数情况下，手动微调能比自动 PGA\
  \ 管理提供更好的结果。\n\n初始化参数 `workarea_size_policy` 是动态的，可以在实例和会话级别更改。也可以在系统级别启用自动 PGA\
  \ 管理，然后针对特殊需求，在会话级别切换到手动 PGA 管理。\n\n### pga_aggregate_target\n\n如果启用了自动 PGA 管理，初始化参数\
  \ `pga_aggregate_target` 指定（以字节为单位）专用于一个实例的 PGA 总量。支持从 10MB 到 4TB 的值。在 Oracle9*i*\
  \ 中，默认值为 0。自 Oracle Database *10g* 起，默认值是 `system global area`（SGA）大小的 20%。很难给出任何关于应使用何种具体数值的建议。然而，在大多数系统上，每个并发用户至少需要几兆字节。\n\
  \n* * *\n\n**注意** 自 Oracle Database *11g* 起，可以使用初始化参数 `memory_target` 和 `memory_max_target`\
  \ 来指定实例使用的总内存量（即 SGA + PGA）。当设置它们时，实例会在 SGA 和 PGA 之间根据需要自动重新分配内存。在此类配置中，初始化参数 `pga_aggregate_target`\
  \ 仅用于设置 PGA 的最小大小。\n\n* * *\n\n\n\n理解初始化参数 `pga_aggregate_target` 的值不是一个硬性限制，而是一个目标，这一点非常重要。因此，如果指定的值过小，数据库引擎可以自由分配比初始化参数\
  \ `pga_aggregate_target` 指定值更多的内存。为了说明这种行为，我执行了一个需要大约 60MB PGA 的查询，并逐步增加并发用户数（从\
  \ 1 到 50）。初始化参数 `pga_aggregate_target` 被设置为 1GB。这意味着最多应该有 17 个用户（1GB/60MB）能够在内存中获得执行完整语句所需的\
  \ PGA。图 5-5 显示了测试结果。如你所见，系统 PGA 增加到了 1.6GB，这高于配置的值。正如预期的那样，系统 PGA 仅在并发用户数达到 17 之前与用户数成比例增加。当用户数超过\
  \ 17 时，系统开始减少分配给每个用户的 PGA 量。\n\n![image](img/0505.jpg)\n\n图 5-5. 内存管理器会自动调整提供给用户的\
  \ PGA 量。\n\n要了解你的系统是否正在经历 PGA 的过度分配，可以使用以下查询。如果 `maximum PGA allocated` 的值远高于 `aggregate\
  \ PGA target parameter` 的值，那么初始化参数 `pga_aggregate_target` 的值可能不合适。\n\n```sql\nSELECT\
  \ name, value, unit\n  FROM v$pgastat\n WHERE name IN ('aggregate PGA target parameter','maximum\
  \ PGA allocated');\n```\n\n```\nNAME                              VALUE        UNIT\n\
  -------------------------------- ------------ -----\naggregate PGA target parameter\
  \    1073741824   bytes\nmaximum PGA allocated             1648665600   bytes\n\
  ```\n\n初始化参数 `pga_aggregate_target` 是动态的，只能在实例级别更改。\n\n`sort_area_size`\n\n如果启用了手动\
  \ PGA 管理，初始化参数 `sort_area_size` 以字节为单位指定用于合并连接、排序和聚合（包括哈希分组）的工作区的大小。请注意：这是一个工作区的大小，而单个会话可能会分配多个工作区。这意味着整个系统使用的\
  \ PGA 总量取决于分配的工作区数量，而不是会话数量。默认值是 64KB。尽管很难给出关于建议值的一般性建议，但默认值非常小，通常应至少使用 512KB/1MB。重要的是，工作区并不总是完全分配的。换句话说，初始化参数\
  \ `sort_area_size` 指定的值只是一个限制。因此，指定一个比实际需要更大的值不一定是问题。\n\n初始化参数 `sort_area_size`\
  \ 是动态的，可以在实例和会话级别更改。\n\n`sort_area_retained_size`\n\n在上一节中，你看到初始化参数 `sort_area_size`\
  \ 指定了用于排序操作的工作区的大小。然而，严格来说，初始化参数 `sort_area_size` 仅指定排序操作进行时用作临时工作区的内存量。在获取最后一行并将其包含在存储于工作区中的排序结果后，仍然只需要内存作为缓冲区将排序结果返回给父操作。初始化参数\
  \ `sort_area_retained_size` 以字节为单位指定了为该读取缓冲区保留的内存量。此初始化参数仅在启用手动 PGA 管理时使用。默认值源自初始化参数\
  \ `sort_area_size`。请注意，默认情况下，动态性能视图 `v$parameter` 显示为 0。\n\n要设置此初始化参数，你必须注意，如果将其设置为低于初始化参数\
  \ `sort_area_size` 的值，并且结果集无法放入保留的内存中，则在排序操作完成时，数据将溢出到临时段中。即使排序操作本身完全在内存中执行，也可能发生这种情况！因此，为了获得更好的性能，建议使用默认值。只有在系统确实内存不足时，设置此参数才有意义。\n\
  \n初始化参数 `sort_area_retained_size` 是动态的，可以在实例和会话级别更改。\n\n`hash_area_size`\n\n如果启用了手动\
  \ PGA 管理，初始化参数 `hash_area_size` 以字节为单位指定用于哈希连接的工作区的大小。请注意，这是一个工作区的大小，而单个会话可能会分配多个工作区。这意味着整个系统使用的\
  \ PGA 总量取决于分配的工作区数量，而不是会话数量。默认值是初始化参数 `sort_area_size` 值的两倍。同样，很难建议具体值。无论如何，对于高达\
  \ 4MB 的值，它应至少设置为初始化参数 `sort_area_size` 值的四到五倍。否则，查询优化器可能会高估哈希连接的成本，从而倾向于合并连接。再次强调，工作区并不总是完全分配的。换句话说，初始化参数\
  \ `hash_area_size` 指定的值只是一个限制。指定一个比实际需要更大的值不一定是问题。\n\n初始化参数 `hash_area_size` 是动态的，可以在实例和会话级别更改。\n\
  \n`bitmap_merge_area_size`\n\n如果启用了手动 PGA 管理，初始化参数 `bitmap_merge_area_size` 以字节为单位指定用于合并与位图索引相关的位图的工作区的大小。默认值是\
  \ 1MB。再次强调，很难给出关于建议值的一般性建议。显然，如果使用大量位图索引（例如，由于星型转换——参见第 10 章），更大的值可能会提高性能。\n\n初始化参数\
  \ `bitmap_merge_area_size` 是静态的，不能在系统或会话级别更改。因此，需要重启实例才能更改它。\n\n### 进入第 6 章\n\n\
  本章描述了如何通过设置初始化参数来实现查询优化器的良好配置。你看到，不仅理解初始化参数如何工作很重要，理解对象和系统统计信息如何影响查询优化器也很关键。\n\n\
  即使配置得当，查询优化器也可能无法找到高效的执行计划。当 SQL 语句的性能受到质疑时，首先要做的就是查看执行计划。下一章将讨论如何获取执行计划，更重要的是，如何解读它们。我还将介绍一些识别低效执行计划的规则。\n\
  \n* * *\n\n1. 肯尼亚谚语是“和平代价高昂，但物有所值。”你可以在 [`www.quotationspage.com/quote/38863.html`](http://www.quotationspage.com/quote/38863.html)\
  \ 找到这句引言。\n\n2. 完美在软件开发中如同在你所能想象的几乎所有其他活动中一样，是无法实现的。这条规则，即使你和 Oracle 都不喜欢它，也同样适用于查询优化器。因此，你应该预期一小部分\
  \ SQL 语句将需要手动干预（此主题在第 7 章中讨论）。\n\n\n\n### 第 6 章\n执行计划\n\n`An` *执行计划* 描述了 SQL 引擎为执行一条\
  \ SQL 语句所执行的操作。每当你要分析一条 SQL 语句相关的性能问题，或者仅仅是想质疑查询优化器做出的决策时，你都必须了解其执行计划。没有它，你就像一个在撒哈拉沙漠中央、拄着拐杖的盲人，摸索着试图找到方向。我再怎么强调也不为过：在分析或质疑一条\
  \ SQL 语句的性能时，首先要做的就是获取其执行计划。\n\n每当处理一个执行计划时，你需要执行三个基本动作：获取它、解读它、判断其效率。本章的目的就是详细描述你应如何执行这三个动作。\n\
  \n#### 获取执行计划\n\n基本上，Oracle 提供四种方法来获取执行计划：\n\n*   执行 SQL 语句 `EXPLAIN PLAN`，然后查询输出写入的表。\n\
  *   查询一个动态性能视图，该视图显示缓存在库缓存中的执行计划。\n*   查询一个自动工作负载信息库（Automatic Workload Repository）或\
  \ Statspack 表，该表显示存储在信息库中的执行计划。\n*   激活一个提供执行计划的跟踪功能。\n\n不存在其他方法。由于所有显示执行计划的工具都利用了上述方法之一，接下来的章节将只描述基础知识，而不是专注于诸如\
  \ Oracle Enterprise Manager 或 Quest TOAD 之类的特定工具。我在此也不讨论这类工具，因为通常它们并不能提供你进行彻底分析所需的所有信息。\n\
  \n#### SQL 语句 EXPLAIN PLAN\n\nSQL 语句 `EXPLAIN PLAN` 的目的是以一条 SQL 语句作为输入，并在*计划表*中输出其执行计划及相关信息。换句话说，通过它可以询问查询优化器，对于给定的\
  \ SQL 语句，将会使用哪个执行计划。\n\n**语法与权限**\n\n图 6-1 展示了 SQL 语句 `EXPLAIN PLAN` 的语法。可用参数如下：\n\
  \n*   `statement` 指定应提供哪条 SQL 语句的执行计划。支持以下 SQL 语句：`SELECT, INSERT, UPDATE, MERGE,\
  \ DELETE, CREATE TABLE, CREATE INDEX` 和 `ALTER INDEX`。\n*   `id` 指定一个名称，用于区分存储在计划表中的多个执行计划。支持最多\
  \ 30 个字符的任何字符串。此参数可选。默认值为 `NULL`。\n*   `table` 指定计划表的名称，有关执行计划的信息将被插入该表。此参数可选。默认值为\
  \ `plan_table`。必要时，可以使用常规语法指定模式名以及数据库链接名：`schema.table@dblink`。\n\n![image](img/0601.jpg)\n\
  \n**图 6-1.** *SQL 语句 `EXPLAIN PLAN` 的语法*\n\n重要的是要认识到，SQL 语句 `EXPLAIN PLAN` 是一条 DML\
  \ 语句，而不是 DDL 语句。这意味着它不会对当前事务执行隐式提交。它只是向计划表中插入行。\n\n要执行 SQL 语句 `EXPLAIN PLAN`，需要具备执行作为参数传递的\
  \ SQL 语句的权限。注意，当处理视图时，还需要对所有底层表和视图具有适当的权限。由于这一点可能违反直觉，让我们看下面的例子。注意该用户能够执行引用视图 `user_objects`\
  \ 的查询，但却无法为完全相同的查询执行 SQL 语句 `EXPLAIN PLAN`。\n\n```\nSQL> SELECT count(*) FROM user_objects;\n\
  \n  COUNT(*)\n----------\n        10\n\nSQL> EXPLAIN PLAN FOR SELECT count(*) FROM\
  \ user_objects;\nEXPLAIN PLAN FOR SELECT count(*) FROM user_objects\n          \
  \                           *\nERROR at line 1:\nORA-01039: insufficient privileges\
  \ on underlying objects of the view\n```\n\n如错误信息所指出的，该用户缺少对视图 `user_objects` 引用的一个或多个数据字典表的\
  \ `SELECT` 权限。\n\n**计划表**\n\n计划表是 SQL 语句 `EXPLAIN PLAN` 写入输出的地方。它必须存在；否则会引发错误。从\
  \ Oracle Database 10*g* 开始，默认情况下，在 `SYS` 模式下提供了一个计划表和一个向所有用户公开它的同义词 `plan_table`。在之前的版本中，或当需要私有表时，最佳实践是使用\
  \ `$ORACLE_HOME/rdbms/admin` 下的脚本 `utlxplan.sql` 手动创建它。如果手动创建了计划表，在数据库升级时不要忘记重新创建它。事实上，新版本中经常会添加新的属性。\n\
  \n有趣的是，从 Oracle Database 10*g* 开始创建的默认计划表是一个全局临时表，其数据存储直到会话结束。¹ 这样，多个并发使用它的用户就不会相互干扰。\n\
  \n要将计划表与 SQL 语句 `EXPLAIN PLAN` 一起使用，你至少需要 `INSERT` 和 `SELECT` 权限。尽管没有 `DELETE` 权限也可以执行基本操作，但通常也会授予该权限。\n\
  \n我不会在这里完整描述计划表，原因很简单：你通常不需要直接查询它。有关其列的详细描述，请参阅 *Performance Tuning Guide* 手册。²\n\
  \n**查询计划表**\n\n\n\n"
- "# 使用 `dbms_xplan.display` 函数获取执行计划\n\n你当然可以通过直接查询计划表来获取执行计划。然而，自 Oracle9*i* Release\
  \ 2 起，有一种更简单、更好的方法——使用 `dbms_xplan` 包中的 `display` 函数。如下面的示例所示，它的用法非常简单。实际上，只需调用该函数就能显示由\
  \ `EXPLAIN PLAN` SQL 语句生成的执行计划。请注意，该函数的返回值（是一个集合）是如何通过 `table` 函数进行转换的。\n\n`SQL>\
  \ EXPLAIN PLAN FOR SELECT * FROM emp WHERE deptno = 10 ORDER BY ename;`\n\n`SQL>\
  \ SELECT * FROM table(dbms_xplan.display);`\n\n```\nPLAN_TABLE_OUTPUT\n---------------------------------------------------------------------------\n\
  \nPlan hash value: 150391907\n\n---------------------------------------------------------------------------\n\
  | Id  | Operation          | Name | Rows  | Bytes | Cost (%CPU)| Time     |\n---------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT   |      |     5 |   185 |     4  (25)| 00:00:01 |\n| \
  \  1 |  SORT ORDER BY     |      |     5 |   185 |     4  (25)| 00:00:01 |\n|* \
  \ 2 |   TABLE ACCESS FULL| EMP  |     5 |   185 |     3   (0)| 00:00:01 |\n---------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \n   2 - filter(\"DEPTNO\"=10)\n```\n\n`display` 函数并不仅限于无参数使用。因此，在本章后面，我将详细介绍 `dbms_xplan`\
  \ 包，探索其所有功能，包括对生成输出的描述。\n\n"
- "# 绑定变量陷阱\n\n在使用 `EXPLAIN PLAN` SQL 语句时，我遇到的最常见错误是指定的 SQL 语句与实际要分析的语句不同。这自然可能导致错误的执行计划。由于格式本身对执行计划没有影响，这种差异通常是由替换绑定变量引起的。让我们检查以下\
  \ PL/SQL 过程中查询所使用的执行计划：\n\n```sql\nCREATE OR REPLACE PROCEDURE p (p_value IN NUMBER)\
  \ IS\nBEGIN\n  FOR i IN (SELECT * FROM emp WHERE empno = p_value)\n  LOOP\n    --\
  \ do something\n  END LOOP;\nEND;\n```\n\n一个常用的技术是复制/粘贴查询，并将 PL/SQL 变量替换为一个具体的值。然后你以如下方式执行\
  \ SQL 语句：\n\n`EXPLAIN PLAN FOR SELECT * FROM emp WHERE empno = 7788`\n\n问题在于，通过用常量替换绑定变量，你向查询优化器提交了一个不同的\
  \ SQL 语句。这种改变——可能是由于 SQL profiles、stored outlines、SQL plan baselines 或查询优化器用于估算\
  \ `WHERE` 子句中谓词选择性的方法——可能会影响查询优化器所做的决策。\n\n正确的方法是使用相同的 SQL 语句。这是可行的，因为绑定变量可以与 `EXPLAIN\
  \ PLAN` SQL 语句一起使用。例如，你应该执行类似以下内容的 SQL 语句。请注意，在 PL/SQL 变量前添加了一个冒号，以将其转换为 `EXPLAIN\
  \ PLAN` SQL 语句的变量。\n\n`EXPLAIN PLAN FOR SELECT * FROM emp WHERE empno = :p_value`\n\
  \n尽管如此，将绑定变量与 `EXPLAIN PLAN` SQL 语句一起使用有两个问题。第一个问题是，默认情况下，绑定变量被声明为 `VARCHAR2` 类型。因此，为了避免隐式转换，数据库引擎会自动添加显式转换。你可以通过包\
  \ `dbms_xplan` 中 `display` 函数生成的输出末尾显示的谓词信息来检查这一点。在下面的输出示例中，函数 `to_number` 就用于此目的：\n\
  \n`SQL> SELECT * FROM table(dbms_xplan.display);`\n\n```\nPLAN_TABLE_OUTPUT\n------------------------------------------------------------------------------------\n\
  Plan hash value: 4024650034\n\n------------------------------------------------------------------------------------\n\
  | Id | Operation                   | Name   | Rows | Bytes | Cost (%CPU)| Time \
  \    |\n------------------------------------------------------------------------------------\n\
  |  0 | SELECT STATEMENT            |        |    1 |    37 |     1   (0)| 00:00:01\
  \ |\n|  1 |  TABLE ACCESS BY INDEX ROWID| EMP    |    1 |    37 |     1   (0)| 00:00:01\
  \ |\n|* 2 |   INDEX UNIQUE SCAN         | EMP_PK |    1 |       |     0   (0)| 00:00:01\
  \ |\n------------------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \n   2 - access(\"EMPNO\"=TO_NUMBER(:P_VALUE))\n```\n\n通常良好的做法是检查数据类型是否得到正确处理，例如，对所有非\
  \ `VARCHAR2` 类型的绑定变量使用显式转换。\n\n将绑定变量与 `EXPLAIN PLAN` SQL 语句一起使用的第二个问题是，不会使用绑定变量窥探（bind\
  \ variable peeking）。由于该问题没有解决方案，因此不能保证 `EXPLAIN PLAN` SQL 语句生成的执行计划就是运行时选择的计划。换句话说，每当涉及绑定变量时，`EXPLAIN\
  \ PLAN` SQL 语句生成的输出是不可靠的。\n\n\n#### 动态性能视图\n\n四个动态性能视图显示库缓存中存在的游标信息：\n\n*   `v$sql_plan`\
  \ 提供的信息基本上与计划表相同。换句话说，它提供由查询优化器生成的执行计划及其他相关信息。该视图与计划表之间唯一的显著差异在于，该视图中有一些列用于标识库缓存中与执行计划相关的游标。\n\
  *   `v$sql_plan_statistics` 为 `v$sql_plan` 视图中的每个操作（*行源操作*）提供执行统计信息，例如耗时和产生的行数。本质上，它提供了执行计划的运行时行为。这是一个重要的信息片段，因为\
  \ `v$sql_plan` 视图仅显示查询优化器在解析时所做的估算和决策。由于收集执行统计信息会产生不可忽略的开销，默认情况下它们不会被收集。要激活收集，必须将初始化参数\
  \ `statistics_level` 设置为 `all`，或者在 SQL 语句中指定提示 `gather_plan_statistics`。\n*   `v$sql_workarea`\
  \ 提供有关执行游标所需的内存工作区的信息。它提供运行时内存使用情况，以及对高效执行操作所需内存量的估算。\n*   `v$sql_plan_statistics_all`\
  \ 在单个视图中显示由视图 `v$sql_plan`、`v$sql_plan_statistics` 和 `v$sql_workarea` 提供的所有信息。使用它，你可以轻松避免手动连接多个视图。\n\
  \n库缓存中的游标（因此也存在于这些视图中）由三个列标识：`address`、`hash_value` 和 `child_number`。使用 `address`\
  \ 和 `hash_value` 列，你可以标识父游标。使用所有三个列，你可以标识子游标。此外，从 Oracle Database 10*g* 开始，也可以并且更常见的是使用\
  \ `sql_id` 列来代替 `address` 和 `hash_value` 列来标识游标。使用 `sql_id` 列的优势在于，其值仅取决于 SQL 语句本身。换句话说，对于给定的\
  \ SQL 语句，它永远不会改变。另一方面，`address` 列是指向内存中 SQL 语句句柄的指针，可能会随时间变化。要标识一个游标，基本上你面临两种搜索方法：要么你知道正在执行\
  \ SQL 语句的会话，要么你知道 SQL 语句的文本。在这两种情况下，一旦游标被标识，你就可以显示有关它的信息。\n\n### 标识子游标\n\n你面临的第一个常见情况是尝试获取与当前连接到实例的会话相关的\
  \ SQL 语句的信息。在这种情况下，你在视图 `v$session` 上执行搜索。当前执行的 SQL 语句由 `sql_id`（或 `sql_address`\
  \ 和 `sql_hash_value`）以及 `sql_child_number` 列标识。最后执行的 SQL 语句由 `prev_sql_id`（或 `prev_sql_addr`\
  \ 和 `prev_hash_value`）以及 `prev_child_number` 列标识。请注意，`sql_id`、`sql_child_number`\
  \ 和 `prev_child_number` 列仅在 Oracle Database 10*g* 及以上版本可用。显然，在 Oracle9*i* 中，由于缺少与子游标的关系，如果存在多个子游标，则无法实现会话与游标之间的直接映射。为了说明此方法的使用，假设用户\
  \ Curtis 打电话给你，抱怨他正在等待几分钟前用应用程序提交的一个请求。对于此问题，直接查询视图 `v$session` 非常有用，如下例所示。根据该输出，你知道他当前正在运行一个\
  \ SQL 语句（否则状态不会是 `ACTIVE`），并且知道哪个游标与他的会话相关。\n\n```sql\nSQL> SELECT status, sql_id,\
  \ sql_child_number\n  2  FROM v$session\n  3  WHERE username = 'CURTIS';\n\nSTATUS\
  \   SQL_ID        SQL_CHILD_NUMBER\n-------- ------------- ----------------\nACTIVE\
  \   1hqjydsjbvmwq                0\n```\n\n第二种常见情况是，你确实知道要查找更多信息的 SQL 语句的文本。在这种情况下，你在视图\
  \ `v$sql` 上执行搜索。与游标关联的文本可在 `sql_text` 和 `sql_fulltext` 列中获得。第一列仅通过 `VARCHAR2(1000)`\
  \ 显示文本的第一部分，第二列通过 `CLOB` 显示完整文本。例如，如果你知道要查找的 SQL 语句包含文本为 \"online discount\" 的字面量，可以使用以下查询来找出游标的标识符：\n\
  \n```sql\nSQL> SELECT sql_id, child_number, sql_text\n  2  FROM v$sql\n  3  WHERE\
  \ sql_text LIKE '%online discount%' AND sql_text NOT LIKE '%v$sql%';\n\nSQL_ID \
  \       CHILD_NUMBER SQL_TEXT\n------------- ------------ ------------------------------------------------------\n\
  1hqjydsjbvmwq            0 SELECT SUM(AMOUNT_SOLD) FROM SALES S, PROMOTIONS P\n\
  \                           WHERE S.PROMO_ID = P.PROMO_ID AND PROMO_SUBCATEGORY\
  \ =\n                           'online discount'\n```\n\n### 查询动态性能视图\n\n要获取执行计划，你可以直接对动态性能视图\
  \ `v$sql_plan` 和 `v$sql_plan_statistics_all` 运行查询。然而，从 Oracle Database 10*g* 开始，有一种更简单且更好的方法——你可以使用包\
  \ `dbms_xplan` 中的函数 `display_cursor`。如下例所示，其用法与之前讨论的函数 `display` 类似。唯一的区别是，传递给函数的两个参数用于标识要显示的子游标。\n\
  \n```sql\nSQL> SELECT * FROM table(dbms_xplan.display_cursor('1hqjydsjbvmwq',0));\n\
  \nPLAN_TABLE_OUTPUT\n------------------------------------------------------------------------------------\n\
  SQL_ID 1hqjydsjbvmwq, child number 0\n-------------------------------------\nSELECT\
  \ SUM(AMOUNT_SOLD) FROM SALES S, PROMOTIONS P WHERE S.PROMO_ID =\nP.PROMO_ID AND\
  \ PROMO_SUBCATEGORY = 'online discount'\n\nPlan hash value: 265338492\n\n------------------------------------------------------------------------------------\n\
  | Id  | Operation             | Name       | Rows  | Bytes | Cost (%CPU)| Time \
  \    |\n------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT      |            |       |       |   517 (100)|      \
  \    |\n|   1 |  SORT AGGREGATE       |            |     1 |    30 |           \
  \ |          |\n|*  2 |   HASH JOIN           |            |   913K|    26M|   517\
  \   (4)| 00:00:07 |\n|*  3 |    TABLE ACCESS FULL  | PROMOTIONS |    23 |   483\
  \ |    17   (0)| 00:00:01 |\n|   4 |    PARTITION RANGE ALL|            |   918K|\
  \  8075K|   494   (3)| 00:00:06 |\n|   5 |     TABLE ACCESS FULL | SALES      |\
  \   918K|  8075K|   494   (3)| 00:00:06 |\n------------------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \n   2 - access(\"S\".\"PROMO_ID\"=\"P\".\"PROMO_ID\")\n   3 - filter(\"PROMO_SUBCATEGORY\"\
  ='online discount')\n```\n\n函数 `display_cursor` 并非仅限于无参数使用。因此，在本章后面，我将介绍包 `dbms_xplan`，探索所有可能性，包括对生成输出的描述。\n\
  \n"
