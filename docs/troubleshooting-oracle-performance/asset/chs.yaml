  \ 的 SQL 配置文件从数据字典复制到暂存表中：\n\n\n\n## 重新划分标题层级并优化格式\n\n## 删除 SQL 配置文件\n\n可以使用 `dbms_sqltune`\
  \ 包中的 `drop_sql_profile` 过程从数据字典中删除 SQL 配置文件。参数 `name` 指定 SQL 配置文件的名称。参数 `ignore`\
  \ 指定在 SQL 配置文件不存在时是否引发错误。它默认为 `FALSE`。\n\n```\ndbms_sqltune.drop_sql_profile(\n\
  \  name   => 'first_rows',\n  ignore => TRUE\n);\n```\n\n## 权限\n\n要创建、更改和删除 SQL\
  \ 配置文件，分别需要系统权限 `create any sql profile`、`drop any sql profile` 和 `alter any sql\
  \ profile`。自 Oracle Database 11*g* 起，这三个系统权限已被弃用，取而代之的是系统权限 `administer sql management\
  \ object`。SQL 配置文件不存在对象权限。要使用 SQL 调优顾问，需要系统权限 `advisor`。\n\n最终用户不需要特定权限来使用 SQL 配置文件。\n\
  \n## 未文档化的特性\n\nSQL 配置文件如何影响查询优化器？Oracle 在其文档中并未真正回答这个问题。我相信，高效使用特性的最佳方式是了解其工作原理。那么，让我们深入了解一下。简而言之，SQL\
  \ 配置文件存储了一组提示，代表查询优化器要执行的调整。其中一些提示是有文档记载的，并且在 Oracle9*i* 中已可用。另一些是未文档化的，仅在 Oracle\
  \ Database 10*g* 及更高版本中可用。换句话说，它们很可能是为此目的而实现的。所有这些提示都是常规提示，因此也可以直接添加到 SQL 语句中。\n\
  \n数据字典中存储的提示无法通过数据字典视图显示。事实上，唯一提供有关 SQL 配置文件信息的视图 `dba_sql_profiles` 提供了除提示之外的所有信息。如果你想知道\
  \ SQL 配置文件使用了哪些提示，有两种方法。第一种是直接查询数据字典表 `sqlprof$attr`。以下查询展示了如何对前面示例中使用的 SQL 配置文件执行此操作。在此特定情况下，只有一个提示\
  \ `first_rows`，它指示查询优化器切换优化器模式。当然，这只针对与 SQL 配置文件关联的 SQL 语句执行。\n\n```\nSQL> SELECT\
  \ attr_val\n  2  FROM sys.sqlprof$ p, sys.sqlprof$attr a\n  3  WHERE p.sp_name =\
  \ 'first_rows'\n  4  AND p.signature = a.signature\n  5  AND p.category  = a.category;\n\
  \nATTR_VAL\n--------------------------------------------\nFIRST_ROWS(6)\n```\n\n\
  如果你使用 Oracle Database 10*g* Release 2 或更高版本，第二种方法是将 SQL 配置文件移动到暂存表中，如前一节所述。然后，使用类似下面的查询，你将从暂存表中获取提示。请注意，通过函数\
  \ `table` 进行了展开（unnesting），因为提示存储在 `VARCHAR2` 的可变数组（varray）中。\n\n```\nSQL> SELECT\
  \ *\n  2  FROM table(SELECT attributes\n  3             FROM mystgtab\n  4     \
  \        WHERE profile_name = 'first_rows');\n\nCOLUMN_VALUE\n----------------------------------------\n\
  FIRST_ROWS(6)\n```\n\n为了向你展示优化器模式切换的另一个示例，让我们考虑以下查询，其中提示 `rule` 强制查询优化器在基于规则的模式下工作：\n\
  \n```\nSQL> SELECT /*+ rule */ * FROM t ORDER BY id;\n\n--------------------------------------------\n\
  | Id  | Operation                   | Name |\n--------------------------------------------\n\
  |   0 | SELECT STATEMENT            |      |\n|   1 |  TABLE ACCESS BY INDEX ROWID|\
  \ T    |\n|   2 |   INDEX FULL SCAN           | T_PK |\n--------------------------------------------\n\
  \nNote\n-----\n- rule based optimizer used (consider using cbo)\n```\n\n如果你让 SQL\
  \ 调优顾问分析这样的查询，就像脚本 `all_rows.sql` 所做的那样，它就会给出创建 SQL 配置文件的建议。接受该建议后，将创建一个包含以下提示的\
  \ SQL 配置文件。请注意，使用了两个初始化参数提示（`all_rows` 和 `optimizer_features_enable`）。此外，为了指示查询优化器忽略\
  \ SQL 语句中存在的提示（本例中为提示 `rule`），使用了提示 `ignore_optim_embedded_hints`。\n\n```\nALL_ROWS\n\
  OPTIMIZER_FEATURES_ENABLE(default)\nIGNORE_OPTIM_EMBEDDED_HINTS\n```\n\n切换优化器模式并不是\
  \ SQL 配置文件唯一能做的事情。它们有用的另一种情况是纠正查询优化器执行的错误基数估计。脚本 `opt_estimate.sql` 展示了这样一个案例。通过使用第\
  \ 6 章中描述的识别错误估计的技术，你可以在以下示例中看到，几个操作的估计基数（`E-Rows`）与实际基数（`A-Rows`）完全不同：\n\n```\n\
  --------------------------------------------------------------------------\n| Id\
  \  | Operation                     | Name          | Starts | E-Rows | A-Rows |\n\
  --------------------------------------------------------------------------\n|  \
  \ 1 |  HASH UNIQUE                  |               |      1|      1|      1|\n\
  |   2 |   NESTED LOOPS                |               |      1|      3|  26985|\n\
  |*  3 |    TABLE ACCESS BY INDEX ROWID| CH            |      1|    680|  26985|\n\
  |*  4 |     INDEX RANGE SCAN          | CH_LANGUAGE_I |      1|  26985|  26985|\n\
  |   5 |    TABLE ACCESS BY INDEX ROWID| T             |  26985|      1|  26985|\n\
  |*  6 |     INDEX UNIQUE SCAN         | T_PK          |  26985|      1|  26985|\n\
  --------------------------------------------------------------------------\n```\n\
  \n如果你让 SQL 调优顾问分析这种情况并接受其建议，就像脚本 `opt_estimate.sql` 所做的那样，就会创建一个包含以下提示的 SQL 配置文件。在这种情况下需要注意的重要一点是存在未文档化的提示\
  \ `opt_estimate`。使用该特定提示，可以通知查询优化器其某些估计是错误的，以及错误的程度。实际上，第一个提示告诉查询优化器将第 3 行的操作估计值放大大约\
  \ 39 倍（26,985/680）。第二个提示告诉它将第 2 行的操作（两个表之间的连接）的估计值放大大约 275 倍（26,985/3/39——这不是很精确，因为\
  \ 3 被四舍五入了）。\n\n```\nOPT_ESTIMATE(@\"SEL$1\", TABLE, \"CH\"@\"SEL$1\", SCALE_ROWS=39.10326263)\n\
  OPT_ESTIMATE(@\"SEL$1\", JOIN, (\"T\"@\"SEL$1\", \"CH\"@\"SEL$1\"), SCALE_ROWS=275.1560562)\n\
  ```\n\n有了 SQL 配置文件后，估计就精确了。另请注意，查询优化器选择了另一个执行计划，这正是创建 SQL 配置文件的初衷。\n\n\n\n### SQL\
  \ 配置文件\n\n以下是一个执行计划示例，展示了`SQL 配置文件`的应用：\n\n```\n---------------------------------------------------------------------------------\n\
  | Id  | Operation                     | Name          | Starts | E-Rows | A-Rows\
  \ |\n---------------------------------------------------------------------------------\n\
  |   1 | HASH UNIQUE                   |               |      1|      1|      1 |\n\
  |*  2 |  HASH JOIN                    |               |      1|  26985 |  26985\
  \ |\n|*  3 |   TABLE ACCESS BY INDEX ROWID | CH            |      1|  26602 |  26985\
  \ |\n|*  4 |    INDEX RANGE SCAN           | CH_LANGUAGE_I |      1|  26985 |  26985\
  \ |\n|   5 |    TABLE ACCESS FULL          | T             |      1|  27268 |  26985\
  \ |\n---------------------------------------------------------------------------------\n\
  ```\n\n`SQL 配置文件`的另一个应用场景是当对象统计信息不准确或缺失时。当然，这不应该发生，但当这种情况出现且动态采样无法为查询优化器提供所需信息时，就可以使用`SQL\
  \ 配置文件`。脚本`object_stats.sql`提供了一个这样的示例。该脚本生成的`SQL 配置文件`所包含的`提示`如下所示。正如`提示`的名称所暗示的，其思路是为表、索引或列提供对象统计信息。\n\
  \n```\nTABLE_STATS(\"SH\".\"AMOUNT_SOLD_MV\", scale, blocks=7 rows=1460)\nCOLUMN_STATS(\"\
  SH\".\"AMOUNT_SOLD_MV\", \"TIME_ID\", scale, length=7 distinct=1460\n          \
  \   nulls=0 min=2450815 max=2452275)\nCOLUMN_STATS(\"SH\".\"AMOUNT_SOLD_MV\", \"\
  SUMSLD\", scale, length=5)\nINDEX_STATS(\"SH\".\"AMOUNT_SOLD_MV\", \"I_SNAP$_AMOUNT_SOLD_MV\"\
  , scale, blocks=8\n             index_rows=1460)\n```\n\n在本节关于未公开特性中，我要描述的最后一个领域是手动创建`SQL\
  \ 配置文件`的可能性。换句话说，你可以自己构建一个`SQL 配置文件`，而不是让`SQL 调优顾问`进行分析并在建议时接受它。不过，要小心。正如我之前提到的，我不知道这种技术是否受支持。老实说，我认为使用它没有问题，因为创建`SQL\
  \ 配置文件`的方法与当你接受`SQL 调优顾问`提供的建议时数据库引擎使用的方法相同。实际上，`SQL 配置文件`是通过调用包`dbms_sqltune`中未公开的过程`import_sql_profile`来创建的。以下调用是一个示例。参数`sql_text`指定了`SQL\
  \ 配置文件`所绑定的 SQL 语句，参数`profile`指定了`提示`列表。所有其他参数的含义与前面描述的过程`accept_sql_profile`的参数相同。\n\
  \n```\ndbms_sqltune.import_sql_profile(\n  name        => 'import_sql_profile',\n\
  \  description => 'SQL profile created manually',\n  category    => 'TEST',\n  sql_text\
  \    => 'SELECT * FROM t ORDER BY id',\n  profile     => sqlprof_attr('first_rows(42)',\n\
  \                              'optimizer_features_enable(default)'),\n  replace\
  \     => FALSE,\n  force_match => FALSE\n);\n```\n\n###### 何时使用\n\n当你正在对一条特定的 SQL\
  \ 语句进行调优，并且无法在应用程序中更改它时（例如，无法添加`提示`），应考虑使用此技术。不幸的是，要使用`SQL 调优顾问`，必须获得`调优包`和`诊断包`的许可。同样不幸的是，这些组件仅适用于企业版。\n\
  \n###### 陷阱与谬误\n\n`SQL 配置文件`最重要的特性之一是它们与代码分离。与此同时，这也可能导致问题。事实上，由于`SQL 配置文件`和 SQL\
  \ 语句之间没有直接引用，开发人员可能完全忽略`SQL 配置文件`的存在。此外，如果开发人员修改 SQL 语句导致其签名发生变化，`SQL 配置文件`将不再被使用。同样地，当你部署一个需要某些`SQL\
  \ 配置文件`才能正常运行的应用程序时，必须记住在数据库设置过程中安装它们。\n\n如果你需要生成一个`SQL 配置文件`，最佳实践是在生产环境（如果可用）中生成，然后将其移动到另一个环境中进行必要的测试。问题在于，在移动`SQL\
  \ 配置文件`之前，你必须先接受它。由于你不希望在未经测试的情况下在生产环境中启用它，你应该确保通过使用与初始化参数`sqltune_category`激活的类别不同的类别来接受它。这样，`SQL\
  \ 配置文件`在生产数据库中就不会被使用。无论如何，之后更改`SQL 配置文件`的类别总是可行的。\n\n你必须意识到，当`SQL 配置文件`所依赖的对象被删除时，`SQL\
  \ 配置文件`并不会被删除。这不一定是问题。例如，如果一个表或索引需要被重组或移动而必须重新创建，`SQL 配置文件`不被删除是件好事；否则，就需要重新创建它们。\n\
  \n两个文本相同的 SQL 语句具有相同的签名。即使它们引用不同模式中的对象，这也是正确的。这意味着一个`SQL 配置文件`可以用于两个名称相同但位于不同模式中的表！你应该非常小心，特别是当你的数据库中有多个相同对象的副本时。\n\
  \n当一条 SQL 语句同时具有`SQL 配置文件`和存储大纲时（注意，存储大纲将在下一节介绍），查询优化器会优先使用存储大纲，而不是使用`SQL 配置文件`。当然，这只在使用存储大纲被激活的情况下才成立。\n\
  \n从 Oracle 数据库 10*g*第 2 版开始，为了了解查询优化器是否使用了`SQL 配置文件`，你可以利用包`dbms_xplan`中提供的函数。如下例所示，其输出的`注释`部分明确地提供了所需的信息：\n\
  \n```\nSQL> EXPLAIN PLAN FOR SELECT * FROM t ORDER BY id;\n\nSQL> SELECT * FROM\
  \ table(dbms_xplan.display(NULL,NULL,'basic +note'));\n\n--------------------------------------------\n\
  |  Id | Operation                   | Name |\n--------------------------------------------\n\
  |   0 | SELECT STATEMENT            |      |\n|   1 |  TABLE ACCESS BY INDEX ROWID|\
  \ T    |\n|   2 |   INDEX FULL SCAN           | T_PK |\n--------------------------------------------\n\
  \nNote\n-----\n-  SQL profile \"import_sql_profile\" used for this statement\n```\n\
  \n### 存储大纲\n\n存储大纲旨在为执行环境或对象统计信息发生变化时提供稳定的执行计划。因此，此功能也被称为*计划稳定性*。Oracle 文档中提到了两个可以受益于此功能的重要场景。第一个是从基于规则的优化器迁移到基于成本的优化器。第二个是将\
  \ Oracle 版本升级到较新的版本。在这两种情况下，其思路是在应用程序使用旧配置或旧版本时存储有关执行计划的信息，然后使用该信息在较新的版本上提供相同的执行计划。实际上，不幸的是，即使使用了存储大纲，你也可能观察到执行计划的变化。可能正是这个原因，我从未见过一个大规模使用存储大纲的数据库。存储大纲并不总是适合提供稳定执行计划的最终确认是由\
  \ Oracle 数据库 11*g*本身给出的，因为从该版本开始，存储大纲已被弃用，转而支持*SQL 计划基线*（将在下一节介绍）。因此，在实践中，存储大纲仅用于特定的\
  \ SQL 语句。\n\n\n###### 工作原理\n\n以下章节将描述存储大纲是什么以及如何使用它们。要管理存储大纲（除了 Oracle9*i* 版本），企业管理器中没有提供图形界面。\n\
  \n### 什么是存储大纲？\n\n一个 `存储大纲` 是与 SQL 语句相关联的对象，旨在查询优化器生成执行计划时对其产生影响。更具体地说，存储大纲是一组提示，或者更准确地说，是所有必要提示的集合，用以强制查询优化器为给定的\
  \ SQL 语句始终生成特定的执行计划。\n\n存储大纲的优势之一是它应用于特定的 SQL 语句，但使用它时，你无需修改 SQL 语句。实际上，存储大纲存储在数据字典中，查询优化器会自动选择它们。图\
  \ 7-6 展示了此选择过程中执行的基本步骤。首先，SQL 语句被规范化——移除空白并将非字面字符串转换为大写。然后计算所得 SQL 语句的签名。接着，基于该签名，在数据字典中进行查找。一旦找到具有相同签名的存储大纲，就会执行检查以确保待优化的\
  \ SQL 语句与存储大纲关联的 SQL 语句是等效的。这是必要的，因为签名是一个哈希值，因此可能存在冲突。如果测试成功，则组成存储大纲的提示将被纳入执行计划的生成过程中。\n\
  \n![image](img/0706.jpg)\n\n**图 7-6.** 选择存储大纲期间执行的主要步骤\n\n### 创建存储大纲\n\n你可以使用两种主要方法来创建存储大纲：让数据库自动创建或手动创建。如果你想为某个会话甚至整个系统执行的每条\
  \ SQL 语句创建存储大纲，第一种方法很有用。然而，如前所述，这通常并不可取。因此，你通常会手动创建它们。\n\n要启用自动创建，你必须将初始化参数 `create_stored_outlines`\
  \ 设置为 `TRUE` 或另一个指定 `类别` 的值。类别的目的是将多个存储大纲分组以便管理。当初始化参数设置为 `TRUE` 时使用的默认类别名为 `default`。该初始化参数是动态的，可以在会话和系统级别进行更改。要禁用自动创建，你必须将初始化参数设置为\
  \ `FALSE`。\n\n要手动创建存储大纲，你必须使用 SQL 语句 `CREATE OUTLINE`。以下 SQL 语句（摘自脚本 `outline_from_text.sql`）展示了创建一个名为\
  \ `outline_from_text` 的存储大纲，它关联到类别 `test`，并基于 `ON` 子句中指定的查询：\n\n```sql\nCREATE OR\
  \ REPLACE OUTLINE outline_from_text\nFOR CATEGORY test\nON SELECT * FROM t WHERE\
  \ n = 1970\n```\n\n创建后，你可以通过视图 `user_outlines` 和 `user_outline_hints`（两者也都存在 `all`\
  \ 和 `dba` 视图）显示有关存储大纲及其属性的信息。视图 `user_outlines` 显示除提示外的所有信息。以下查询显示了由前面的 SQL 语句创建的存储大纲所提供的信息：\n\
  \n```sql\nSQL> SELECT category, sql_text, signature\n  2  FROM user_outlines\n \
  \ 3  WHERE name = 'OUTLINE_FROM_TEXT';\n\nCATEGORY SQL_TEXT                    \
  \   SIGNATURE\n-------- ------------------------------ --------------------------------\n\
  TEST     SELECT * FROM t WHERE n = 1970 73DC40455AF10A40D84EF59A2F8CBFFE\n```\n\n\
  ```sql\nSQL> SELECT hint\n  2  FROM user_outline_hints\n  3  WHERE name = 'OUTLINE_FROM_TEXT';\n\
  \nHINT\n------------------------------------------------------------------------\n\
  FULL(@\"SEL$1\" \"T\"@\"SEL$1\")\nOUTLINE_LEAF(@\"SEL$1\")\nALL_ROWS\nOPTIMIZER_FEATURES_ENABLE('10.2.0.2')\n\
  IGNORE_OPTIM_EMBEDDED_HINTS\n```\n\n从 Oracle Database 10*g* 开始，你还可以通过引用共享池中的游标来手动创建存储大纲。以下示例（摘自脚本\
  \ `outline_from_sqlarea.sql` 的输出）展示了如何在共享池中选择游标，并通过包 `dbms_outln` 中的过程 `create_outline`\
  \ 创建存储大纲。\n\n```sql\nSQL> SELECT hash_value, child_number\n  2  FROM v$sql\n  3\
  \  WHERE sql_text = 'SELECT * FROM t WHERE n = 1970';\n\nHASH_VALUE CHILD_NUMBER\n\
  ---------- ------------\n308120306             0\n```\n\n```sql\nSQL> BEGIN\n  2\
  \   dbms_outln.create_outline(\n  3     hash_value => '308120306',\n  4     child_number\
  \ => 0,\n  5     category => 'test'\n  6   );\n  7 END;\n  8 /\n```\n\n过程 `create_outline`\
  \ 仅接受示例中所示的三个参数。这意味着存储大纲的名称是自动生成的。要找出系统生成的名称，你必须查询视图 `user_outlines`。这里有一个示例，以下查询返回最后创建的存储大纲的名称：\n\
  \n```sql\nSQL> SELECT name\n  2  FROM user_outlines\n  3  WHERE timestamp = (SELECT\
  \ max(timestamp) FROM user_outlines);\n\nNAME\n------------------------------\n\
  SYS_OUTLINE_07072608011150604\n```\n\n建议将系统生成的名称更改为更有用的名称。下一节将描述如何执行此操作以及其他内容。\n\
  \n### 更改存储大纲\n\n要更改存储大纲的名称，你必须执行 SQL 命令 `ALTER OUTLINE`：\n\n```sql\nALTER OUTLINE\
  \ sys_outline_07072614532024107 RENAME TO outline_from_sqlarea\n```\n\n使用 SQL 命令\
  \ `ALTER OUTLINE` 或包 `dbms_outln` 中的过程 `update_by_cat`，你也可以更改存储大纲的类别。前者更改单个存储大纲的类别，而后者将一个类别的所有存储大纲移动到另一个类别。但是，由于错误\
  \ 5759631，使用 `ALTER OUTLINE` 无法将存储大纲的类别更改为 `default`（对于所有其他类别，这不是问题）。以下示例不仅展示了尝试更改时会发生什么，还展示了如何使用过程\
  \ `update_by_cat` 来完成：\n\n```sql\nSQL> ALTER OUTLINE outline_from_text CHANGE CATEGORY\
  \ TO DEFAULT;\nALTER OUTLINE outline_from_text CHANGE CATEGORY TO DEFAULT\n\n  \
  \                                         *\nERROR at line 1:\nORA-00931: missing\
  \ identifier\n```\n\n```sql\nSQL> execute dbms_outln.update_by_cat(oldcat => 'TEST',\
  \ newcat => 'DEFAULT')\n```\n\n```sql\nSQL> SELECT category\n  2  FROM user_outlines\n\
  \  3  WHERE name = 'OUTLINE_FROM_TEXT';\n\nCATEGORY\n--------\nDEFAULT\n```\n\n\
  最后，使用 SQL 命令 `ALTER OUTLINE`，你还可以重新生成存储大纲。重新生成存储大纲类似于重新创建它。通常，如果你希望查询优化器生成一组新的提示，你会使用此功能。如果你更改了与存储大纲相关的对象的访问结构，这可能是必要的。\n\
  \n```sql\nALTER OUTLINE outline_from_text REBUILD\n```\n\n### 激活存储大纲\n\n查询优化器仅考虑活动的存储大纲。要处于活动状态，存储大纲必须满足两个条件。第一个是存储大纲必须已启用。这是它们创建时的默认状态。要启用和禁用存储大纲，你使用\
  \ SQL 语句 `ALTER OUTLINE`：\n\n```sql\nALTER OUTLINE outline_from_text DISABLE\n```\n\
  \n```sql\nALTER OUTLINE outline_from_text ENABLE\n```\n\n\n第二个条件是，必须通过会话或系统级别的初始化参数\
  \ `use_stored_outlines` 来激活该类别。该初始化参数可接受的值为 `TRUE`、`FALSE` 或一个类别名称。如果指定为 `TRUE`，则默认使用\
  \ `default` 类别。以下 SQL 语句在会话级别激活属于 `test` 类别的存储大纲：\n\n```sql\nALTER SESSION SET use_stored_outlines\
  \ = test\n```\n\n由于该初始化参数仅支持单个类别，因此在给定时间，一个会话只能激活一个类别。\n\n## 移动存储大纲\n\n没有提供专门的功能来移动存储大纲。基本上，你需要自己将数据从一个数据字典复制到另一个。这很简单，因为存储大纲的数据存储在\
  \ `outln` 模式下的三个表中：`ol$`、`hints$` 和 `ol$nodes`。你可以使用以下命令导出和导入所有可用的存储大纲：\n\n```bash\n\
  exp tables=(outln.ol$,outln.ol$hints,outln.ol$nodes) file=outln.dmp\nimp full=y\
  \ ignore=y file=outln.dmp\n```\n\n要移动单个存储大纲（本例中名为 `outline_from_text`），可以在导出命令中添加以下参数：\n\
  \n```bash\nquery=\"WHERE ol_name='OUTLINE_FROM_TEXT'\"\n```\n\n要移动属于某个类别的所有存储大纲（本例中类别名为\
  \ `test`），可以在导出命令中添加以下参数：\n\n```bash\nquery=\"WHERE category='TEST'\"\n```\n\n请注意，根据你的操作系统，你可能需要添加一些转义字符才能成功传递所有参数。例如，在我的\
  \ Linux 服务器上，我必须执行以下命令：\n\n```bash\nexp tables=(outln.ol\\$,outln.ol\\$hints,outln.ol\\\
  $nodes) file=outln.dmp \\\n    query=\\\"WHERE ol_name=\\'OUTLINE_FROM_TEXT\\'\\\
  \"\n```\n\n## 编辑存储大纲\n\n利用存储大纲，可以锁定执行计划。然而，这只有在查询优化器能够生成一个高效的执行计划，并且该计划随后能被捕获并由存储大纲冻结时才有用。如果不是这种情况，你首先应该调查是否有可能修改执行环境、访问结构或对象统计信息，以便创建一个存储高效执行计划的存储大纲。例如，如果某个给定\
  \ SQL 语句的执行计划使用了你想避免的索引扫描，你可以在测试系统上删除该索引，在那里生成一个存储大纲，然后将该存储大纲移动到生产环境中。\n\n当你发现无法强制查询优化器自动生成高效的执行计划时，最后的手段就是自己编辑存储大纲。简单来说，你必须修改与存储大纲关联的提示。然而，在实践中，你不能仅仅对存储在数据字典表中的公共存储大纲（即迄今为止讨论的类型）执行几条\
  \ SQL 语句来进行编辑。相反，你必须按照图 7-7 中总结的步骤进行编辑。这个过程基于对私有存储大纲的修改。私有存储大纲类似于公共存储大纲，但它们不是存储在数据字典中，而是存储在工作表中。使用这些工作表的目的是避免直接修改数据字典表。因此，要编辑一个存储大纲，你必须创建、修改和测试一个私有存储大纲。然后，当私有存储大纲正常工作后，再将其发布为公共存储大纲。可以使用\
  \ `dbms_outln_edit` 包以及 SQL 语句 `CREATE OUTLINE` 的几个扩展来进行存储大纲的编辑。\n\n基于脚本 `outline_editing.sql`\
  \ 中的示例，我将描述图 7-7 总结的整个过程。目的是创建和编辑一个存储大纲，使以下查询执行全表扫描而不是索引扫描：\n\n```sql\nSQL> EXPLAIN\
  \ PLAN FOR SELECT * FROM t WHERE n = 1970;\n\nSQL> SELECT * FROM table(dbms_xplan.display(NULL,NULL,'basic\
  \ +note'));\n```\n\n```text\n--------------------------------------------\n| Id\
  \ | Operation                   |  Name |\n--------------------------------------------\n\
  |  0 | SELECT STATEMENT            |       |\n|  1 |  TABLE ACCESS BY INDEX ROWID|\
  \ T     |\n|  2 |   INDEX RANGE SCAN          | I     |\n--------------------------------------------\n\
  ```\n\n![image](img/0707.jpg)\n\n**图 7-7.** 编辑存储大纲时执行的步骤\n\n首先，你必须创建一个私有存储大纲。为此，你有两种选择。第一种是使用如下\
  \ SQL 语句从头开始创建私有存储大纲。关键字 `PRIVATE` 指定了要创建的存储大纲类型。\n\n```sql\nSQL> CREATE OR REPLACE\
  \ PRIVATE OUTLINE p_outline_editing\n  2  ON SELECT * FROM t WHERE n = 1970;\n```\n\
  \n第二种选择是通过如下 SQL 语句复制数据字典中已有的公共存储大纲。关键字 `PRIVATE` 和 `PUBLIC` 分别指定了要复制和创建的存储大纲类型。\n\
  \n```sql\nSQL> CREATE PRIVATE OUTLINE p_outline_editing FROM PUBLIC outline_editing;\n\
  ```\n\n要成功执行此命令，工作表必须可用。如果不可用，将引发以下错误：\n\n```text\nORA-18009: one or more outline\
  \ system tables do not exist\n```\n\n自 Oracle Database 10*g* 起，这些表默认可用。如果你使用的是 Oracle9*i*，则需要手动创建它们。脚本\
  \ `outline_edit_tables.sql` 的以下摘录展示了如何在 `system` 模式中创建它们并向 `public` 授予必要权限的示例：\n\
  \n```sql\nCONNECT / AS SYSDBA\n\nALTER SESSION SET current_schema = system;\n\n\
  execute dbms_outln_edit.create_edit_tables\n\nCREATE OR REPLACE PUBLIC SYNONYM ol$\
  \ FOR system.ol$;\nCREATE OR REPLACE PUBLIC SYNONYM ol$hints FOR system.ol$hints;\n\
  CREATE OR REPLACE PUBLIC SYNONYM ol$nodes FOR system.ol$nodes;\n\nGRANT SELECT,INSERT,UPDATE,DELETE\
  \ ON system.ol$ TO public;\nGRANT SELECT,INSERT,UPDATE,DELETE ON system.ol$hints\
  \ TO public;\nGRANT SELECT,INSERT,UPDATE,DELETE ON system.ol$nodes TO public;\n\
  ```\n\n两种方法都会在工作表中创建一个私有存储大纲。以下是与之关联的提示列表：\n\n```sql\nSQL> SELECT hint#, hint_text\n\
  \  2     FROM ol$hints\n  3     WHERE ol_name = 'P_OUTLINE_EDITING';\n```\n\n```text\n\
  \  HINT# HINT_TEXT\n------- ----------------------------------------\n      1 INDEX(@\"\
  SEL$1\" \"T\"@\"SEL$1\" (\"T\".\"N\"))\n      2 OUTLINE_LEAF(@\"SEL$1\")\n     \
  \ 3 ALL_ROWS\n      4 OPTIMIZER_FEATURES_ENABLE('10.2.0.2')\n      5 IGNORE_OPTIM_EMBEDDED_HINTS\n\
  ```\n\n创建私有存储大纲后，你可以使用常规 SQL 语句对其进行修改。在此示例中，包含 `index` 提示的行被替换为 `full` 提示：\n\n```sql\n\
  SQL> UPDATE ol$hints\n  2     SET hint_text = 'FULL(@SEL$1 T)'\n  3     WHERE hint#\
  \ = 1\n  4     AND ol_name = 'P_OUTLINE_EDITING';\n```\n\n为确保存储大纲的内存副本与更改同步，你应该执行以下\
  \ PL/SQL 调用：\n\n```sql\nSQL> execute dbms_outln_edit.refresh_private_outline('P_OUTLINE_EDITING')\n\
  ```\n\n然后，要激活和测试私有存储大纲，需将初始化参数 `use_private_outlines` 设置为 `TRUE` 或私有存储大纲所属的类别名称。请注意，执行计划中的全表扫描和\
  \ `Note` 部分的信息确认了私有存储大纲的使用。\n\n```sql\nSQL> ALTER SESSION SET use_private_outlines\
  \ = TRUE\n```\n\n\n\n## 删除存储大纲\n\n通过 SQL 命令`DROP OUTLINE`或程序包`dbms_outln`中的过程`drop_by_cat`，您可以删除存储大纲。前者删除单个存储大纲，而后者删除属于某个类别的所有存储大纲。\n\
  \n```\nDROP OUTLINE outline_from_text\n```\n\n```\ndbms_outln.drop_by_cat(cat =>\
  \ 'TEST')\n```\n\n要删除私有存储大纲，必须使用 SQL 语句`DROP PRIVATE OUTLINE`。\n\n## 权限\n\n创建、更改和删除存储大纲所需的系统权限分别是`create\
  \ any outline`、`drop any outline`和`alter any outline`。存储大纲不存在对象权限。\n\n默认情况下，只有具有`dba`或`execute_catalog_role`角色的用户才能使用程序包`dbms_outln`。而程序包`dbms_outln_edit`对所有用户可用（`execute`权限已授予`PUBLIC`）。\n\
  \n最终用户使用存储大纲不需要特定权限。\n\n###### 何时使用\n\n当您正在对特定的 SQL 语句进行性能调优，却无法在应用程序中对其进行修改时（例如，无法添加提示），您应考虑使用此技术。\n\
  \n###### 陷阱与谬误\n\n奇怪的是，初始化参数`use_stored_outlines`无法在初始化文件（`init.ora`或`spfile.ora`）中指定。因此，该参数必须在每次实例启动时在系统级别设置，或在每次会话创建时在会话级别设置。在这两种情况下，您都可以通过数据库触发器进行设置。\n\
  \n存储大纲最重要的特性之一是它们与代码是分离的。然而，这可能导致问题。事实上，由于存储大纲和 SQL 语句之间没有直接引用，开发人员可能会完全忽略存储大纲的存在。此外，如果开发人员修改\
  \ SQL 语句导致其签名（signature）发生变化，该存储大纲将不再被使用。同样，当您部署一个需要某些存储大纲才能正确运行的应用程序时，在数据库设置期间切勿忘记安装它们。\n\
  \n您必须意识到，当存储大纲所依赖的对象被删除时，存储大纲本身并不会被删除。不过，这不一定是个问题。例如，如果某个表或索引因为需要重组或移动而必须重新创建，那么存储大纲不被删除是件好事；否则，就需要重新创建它们。\n\
  \n两条文本相同的 SQL 语句具有相同的签名。即使它们引用不同模式（schema）中的对象，情况也是如此。这意味着单个存储大纲可能被用于名称相同但位于不同模式中的两个表！再次强调，您必须非常小心，尤其是当您的数据库中存在多个相同对象的副本时。\n\
  \n直至 Oracle Database 10*g*第 1 版，存储大纲都无法覆盖初始化参数`optimizer_features_enable`、`query_rewrite_enabled`和`star_transformation_enabled`的设置。要成功使用存储大纲，这些设置在各个执行环境中必须保持一致。\n\
  \n从 Oracle Database 10*g*第 2 版开始，要了解查询优化器是否正在使用存储大纲，您可以利用`dbms_xplan`程序包中的可用函数。事实上，如下面的示例所示，其输出的`Note`部分明确地提供了所需信息：\n\
  \n```\nSQL> EXPLAIN PLAN FOR SELECT * FROM t WHERE n = 1970;\n\nSQL> SELECT * FROM\
  \ table(dbms_xplan.display(NULL,NULL,'basic +note'));\n\n--------------------------------------------\n\
  | Id  | Operation                   | Name |\n--------------------------------------------\n\
  |   0 | SELECT STATEMENT            |      |\n|   1 |  TABLE ACCESS BY INDEX ROWID|\
  \ T    |\n|   2 |   INDEX RANGE SCAN          | I    |\n--------------------------------------------\n\
  \nNote\n-----\n- outline \"OUTLINE_FROM_TEXT\" used for this statement\n```\n\n\
  另一种适用于所有版本的方法是，使用`dbms_outln`程序包中的`clear_used`过程重置存储大纲的利用标志。然后，通过在使用了存储大纲的执行前后检查该标志，您可以确定存储大纲是否确实被使用了。\n\
  \n```\nSQL> execute dbms_outln.clear_used(name => 'OUTLINE_FROM_TEXT')\n\nSQL> SELECT\
  \ used\n  2  FROM user_outlines\n  3  WHERE name = 'OUTLINE_FROM_TEXT';\n\nUSED\n\
  ------\nUNUSED\n```\n\n```\nSQL> SELECT * FROM t WHERE n = 1970;\n\nSQL> SELECT\
  \ used\n  2  FROM user_outlines\n  3  WHERE name = 'OUTLINE_FROM_TEXT';\n\nUSED\n\
  ------\nUSED\n```\n\n您通常不需要使用`outln`账户登录。因此，出于安全考虑，您应锁定该账户或更改其默认密码。这一点尤为重要，因为该账户拥有一个危险的系统权限：`execute\
  \ any procedure`。\n\n## SQL 计划基线\n\n从 Oracle Database 11*g*开始，SQL 计划基线取代了存储大纲。实际上，它们可以被视为存储大纲的增强版本。事实上，它们不仅与存储大纲共享多个特性，而且像存储大纲一样，其设计目的是在执行环境或对象统计信息发生变化时提供稳定的执行计划。此外，像存储大纲一样，它们可用于在不修改应用程序的情况下对其进行调优。\n\
  \n***\n\n**注** Oracle 文档中提到的唯一用途是稳定执行计划。出于某些未知的原因，文档并未提及可以使用 SQL 计划基线来改变当前执行计划（针对给定的\
  \ SQL 语句），而无需修改提交它的应用程序。\n\n\n###### 工作原理\n\n以下章节描述了 SQL 计划基线是如何工作的。为了管理它们，企业管理器中集成了一个图形界面。我们不会在这里花时间研究它，因为在我看来，如果你理解了后台发生的事情，使用图形界面就完全没有问题。\n\
  \n##### 什么是 SQL 计划基线？\n\nSQL 计划基线是一个与 SQL 语句关联的对象，旨在查询优化器生成执行计划时影响其行为。更具体地说，一个 SQL\
  \ 基线包含一系列提示（hints）等信息。基本上，SQL 计划基线用于强制查询优化器为给定的 SQL 语句始终生成特定的执行计划。\n\nSQL 计划基线的优势之一是它应用于特定的\
  \ SQL 语句，但使用它时无需修改 SQL 语句本身。实际上，SQL 计划基线存储在数据字典中，查询优化器会自动选择它们。图 7-9 展示了在此选择过程中执行的基本步骤。首先，SQL\
  \ 语句按常规方式处理。换句话说，查询优化器在没有 SQL 计划基线支持的情况下生成一个执行计划。然后，SQL 语句被标准化，使其不区分大小写，并且与文本中的空格无关。接着计算得到的\
  \ SQL 语句的签名（signature）。之后，基于该签名，在数据字典中进行查找。每当找到一个被接受（可信）且已启用的、具有相同签名的 SQL 计划基线时，就会执行一个检查，以确保要优化的\
  \ SQL 语句与 SQL 计划基线关联的 SQL 语句是等效的。这是必要的，因为签名是一个哈希值，因此可能存在冲突。当测试成功时，存储在 SQL 计划基线中的信息将用于生成执行计划。请注意，如果有多个有效的\
  \ SQL 计划基线可用，查询优化器会选择成本最低的那一个。\n\n![image](img/0709.jpg)\n\n**图 7-9.** 选择 SQL 计划基线期间执行的主要步骤\n\
  \n##### 捕获 SQL 计划基线\n\n你可以通过多种方式捕获新的 SQL 计划基线。基本上，它们是由数据库引擎自动创建，或由数据库管理员手动创建。接下来的三个小节将描述其中三种方法。\n\
  \n###### 自动捕获\n\n当动态初始化参数 `optimizer_capture_sql_plan_baselines` 设置为 `TRUE` 时，查询优化器会自动生成新的\
  \ SQL 计划基线。默认情况下，该初始化参数设置为 `FALSE`。你可以在会话和系统级别更改它。\n\n当启用自动捕获时，查询优化器会为每个重复执行（即至少执行两次）的\
  \ SQL 语句存储一个新的 SQL 计划基线。为此，它管理一个日志，将每个处理的 SQL 语句的签名插入其中。这意味着特定 SQL 语句第一次执行时，其签名仅被插入日志。然后，当相同的\
  \ SQL 语句再次执行时，如果尚未为其存在 SQL 计划基线，则会存储一个新的基线。如果 SQL 语句已经关联了一个 SQL 计划基线，查询优化器还会将当前执行计划与借助\
  \ SQL 计划基线生成的执行计划进行比较。如果它们不匹配，则会存储一个描述当前执行计划的新 SQL 计划基线。然而，如你之前所见，当前执行计划无法被使用。查询优化器被强制使用借助\
  \ SQL 计划基线生成的执行计划。图 7-10 总结了整个过程。\n\n![image](img/0710.jpg)\n\n**图 7-10.** 自动捕获\
  \ SQL 计划基线期间执行的主要步骤\n\n当存储一个新的 SQL 计划基线时，区分两种情况很重要：\n\n*   如果这是与该 SQL 语句关联的第一个 SQL\
  \ 计划基线，则该基线将被存储为“已接受”，因此查询优化器将能够使用它。\n*   如果该 SQL 语句已经至少存在一个 SQL 计划基线，则新的基线将被存储为“未接受”，因此查询优化器将无法使用它。“演进\
  \ SQL 计划基线”一节将描述如何验证 SQL 计划基线以使其可供查询优化器使用。\n\n##### 从库缓存加载\n\n要基于存储在库缓存中的游标手动将 SQL\
  \ 计划基线加载到数据字典中，可以使用包 `dbms_spm` 中的函数 `load_plans_from_cursor_cache`。实际上，该函数被多次重载以支持识别需要处理哪些游标的不同方法。存在以下两种主要可能性：\n\
  \n*   通过指定以下属性之一来识别多个 SQL 语句：\n    *   `sql_text`：SQL 语句的文本。此属性支持通配符（例如 `%`）。\n\
  \    *   `parsing_schema_name`：用于解析游标的模式名称。\n    *   `module`：执行 SQL 语句的模块名称。\n\
  \    *   `action`：执行 SQL 语句的操作名称。\n\n举例说明，以下调用（摘自脚本 `baseline_from_sqlarea1.sql`）为库缓存中每个在其文本中包含字符串\
  \ `MySqlStm` 的 SQL 语句创建一个 SQL 计划基线：\n\n```\nret := dbms_spm.load_plans_from_cursor_cache(\n\
  \         attribute_name      => 'sql_text',\n         attribute_value     => '%MySqlStm%'\n\
  \       );\n```\n\n*   通过其 SQL 标识符以及可选的执行计划哈希值来识别单个 SQL 语句。如果未指定哈希值或设置为 `NULL`，则会加载指定\
  \ SQL 语句的所有可用执行计划。以下调用（摘自脚本 `baseline_from_sqlarea2.sql`）说明了这一点：\n\n```\nret :=\
  \ dbms_spm.load_plans_from_cursor_cache(\n         sql_id          => '2y5r75r8y3sj0',\n\
  \         plan_hash_value => NULL\n       );\n```\n\n使用这些函数加载的 SQL 计划基线将存储为“已接受”，因此查询优化器可能会立即利用它们。\n\
  \n在前面的例子中，SQL 计划基线是基于在库缓存中找到的 SQL 语句文本。这仅在你想确保当前执行计划将来也会被使用时才相关。有时，使用 SQL 计划基线的目的是在不修改应用程序的情况下调整\
  \ SQL 语句。让我们看一个基于脚本 `baseline_from_sqlarea3.sql` 的此类情况示例。\n\n假设你的一个应用程序执行以下 SQL\
  \ 语句。查询优化器生成的执行计划基于全表扫描。这是因为 SQL 语句包含一个提示，强制查询优化器进行此操作。\n\n`SQL> SELECT /*+ full(t)\
  \ */ count(pad) FROM t WHERE n = 42;`\n\n```\nSQL> SELECT * FROM table(dbms_xplan.display_cursor);\n\
  -----------------------------------\n| Id  | Operation         | Name |\n-----------------------------------\n\
  |   0 | SELECT STATEMENT  |      |\n|   1 |  SORT AGGREGATE   |      |\n|   2 |\
  \ TABLE ACCESS FULL | T    |\n-----------------------------------\n```\n\n你注意到应用限制的列（`n`）上有索引。于是你想知道使用索引时的性能如何。因此，如以下示例所示，你通过指定一个提示来执行\
  \ SQL 语句，以确保使用索引：\n\n`SQL> SELECT /*+ index(t) */ count(pad) FROM t WHERE n = 42;`\n\
  \n\n"
- "# 使用 SQL 计划基线覆盖执行计划\n\n```sql\nSQL> SELECT * FROM table(dbms_xplan.display_cursor);\n\
  ```\n\n```\nSQL_ID dat4n4845zdxc, child number 0\n---------------------------------------------\n\
  | Id  | Operation                    | Name |\n---------------------------------------------\n\
  |   0 | SELECT STATEMENT             |      |\n|   1 |  SORT AGGREGATE         \
  \     |      |\n|   2 |   TABLE ACCESS BY INDEX ROWID| T    |\n|   3 |    INDEX\
  \ RANGE SCAN          | I    |\n---------------------------------------------\n\
  ```\n\n如果第二个执行计划比第一个更高效，你的目标就是让应用程序使用它。如果无法修改应用程序来移除或修改提示，你可以利用 SQL 计划基线来解决此问题。为此，你可以像前面描述的那样，自动或手动创建\
  \ SQL 计划基线。本例中，你决定使用初始化参数 `optimizer_capture_sql_plan_baselines`。\n\n```sql\nSQL>\
  \ ALTER SESSION SET optimizer_capture_sql_plan_baselines = TRUE;\n\nSQL> SELECT\
  \ /*+ full(t) */ count(pad) FROM t WHERE n = 42;\n\nSQL> SELECT /*+ full(t) */ count(pad)\
  \ FROM t WHERE n = 42;\n\nSQL> ALTER SESSION SET optimizer_capture_sql_plan_baselines\
  \ = FALSE;\n```\n\nSQL 计划基线创建后，你需要验证它是否被实际使用。注意包 `dbms_xplan` 如何清晰地显示生成执行计划时使用了一个\
  \ SQL 计划基线（通过一个 *SQL 计划名称* 来标识）。\n\n```sql\nSQL> SELECT /*+ full(t) */ count(pad)\
  \ FROM t WHERE n = 42;\n\nSQL> SELECT * FROM table(dbms_xplan.display_cursor);\n\
  ```\n\n```\n-----------------------------------\n| Id  | Operation         | Name\
  \  |\n-----------------------------------\n|   0 | SELECT STATEMENT  |       |\n\
  |   1 |  SORT AGGREGATE   |       |\n|   2 |   TABLE ACCESS FULL| T    |\n-----------------------------------\n\
  ```\n\n```\nNote\n-----\n- SQL plan baseline \"SYS_SQL_PLAN_8fb2691f3fdbb376\" used\
  \ for this statement\n```\n\n然后，根据先前输出提供的 SQL 计划名称，你可以通过数据字典视图 `dba_sql_plan_baselines`\
  \ 查找 SQL 计划基线的标识符，即 *SQL 句柄*：\n\n```sql\nSQL> SELECT sql_handle\n  2  FROM dba_sql_plan_baselines\n\
  \  3  WHERE plan_name = 'SYS_SQL_PLAN_8fb2691f3fdbb376';\n```\n\n```\nSQL_HANDLE\n\
  ------------------------------\nSYS_SQL_3d1b0b7d8fb2691f\n```\n\n最后，你替换 SQL 计划基线使用的执行计划。为此，你需要加载与导致索引扫描的\
  \ SQL 语句相关的执行计划，并移除与全表扫描相关的那个。前者通过 SQL 标识符和哈希值引用，后者通过 SQL 句柄和 SQL 计划名称引用。\n\n```sql\n\
  ret := dbms_spm.load_plans_from_cursor_cache(\n         sql_id             => 'dat4n4845zdxc',\n\
  \         plan_hash_value    => '3694077449',\n         sql_handle         => 'SYS_SQL_3d1b0b7d8fb2691f'\n\
  \       );\n\nret := dbms_spm.drop_sql_plan_baseline(\n         sql_handle     =>\
  \ 'SYS_SQL_3d1b0b7d8fb2691f',\n         plan_name      => 'SYS_SQL_PLAN_8fb2691f3fdbb376'\n\
  \       );\n```\n\n要检查替换是否正确生效，你需要测试新的 SQL 计划基线。注意，即使 SQL 语句包含 `full` 提示，执行计划也不再使用全表扫描。\n\
  \n> **注意** 不恰当的提示是实践中导致低效执行计划的常见原因。能够使用本节介绍的技术覆盖它们是非常有用的。\n\n```sql\nSQL> SELECT\
  \ /*+ full(t) */ count(pad) FROM t WHERE n = 42;\n\nSQL> SELECT * FROM table(dbms_xplan.display_cursor);\n\
  ```\n\n```\n---------------------------------------------\n| Id  | Operation   \
  \                 | Name  |\n---------------------------------------------\n|  \
  \ 0 | SELECT STATEMENT             |       |\n|   1 |  SORT AGGREGATE          \
  \    |       |\n|   2 |   TABLE ACCESS BY INDEX ROWID| T     |\n|   3 |    INDEX\
  \ RANGE SCAN          | I     |\n---------------------------------------------\n\
  ```\n\n```\nNote\n-----\n   - SQL plan baseline SYS_SQL_PLAN_8fb2691f59340d78 used\
  \ for this statement\n```\n\n要了解某个特定 SQL 语句是否使用了 SQL 计划基线，也可以检查动态性能视图 `v$sql` 中的\
  \ `sql_plan_baseline` 列。\n\n## 从 SQL 调优集加载\n\n要从 SQL 调优集加载 SQL 计划基线，可以使用包 `dbms_spm`\
  \ 中的函数 `load_plans_from_sqlset`。加载过程只需指定 SQL 调优集的所有者和名称即可。以下调用（摘自脚本 `baseline_from_sqlset.sql`）说明了这一点：\n\
  \n```sql\nret := dbms_spm.load_plans_from_sqlset(\n         sqlset_name  => 'test_sqlset',\n\
  \         sqlset_owner => user\n       );\n```\n\n通过此函数加载的 SQL 计划基线将存储为“已接受”状态，因此查询优化器能够立即利用它们。\n\
  \n该函数最重要的用途是升级到 Oracle Database 11*g*。实际上，它也可以加载由 Oracle Database 10*g* 创建的 SQL\
  \ 调优集。脚本 `baseline_upgrade_10g.sql` 和 `baseline_upgrade_11g.sql` 展示了这种用法。\n\n##\
  \ 显示 SQL 计划基线\n\n关于可用 SQL 计划基线的通用信息可以通过数据字典视图 `dba_sql_plan_baselines` 显示。要显示它们的详细信息，可以使用包\
  \ `dbms_xplan` 中的函数 `display_sql_plan_baseline`。请注意，它的工作方式与第 6 章中讨论的包 `dbms_xplan`\
  \ 的其他函数类似。以下示例展示了使用它可以显示的信息类型：\n\n```sql\nSQL> SELECT *\n  2  FROM table(dbms_xplan.display_sql_plan_baseline(\n\
  \  3              sql_handle => 'SYS_SQL_492bdb47e8861a89'\n  4            ));\n\
  ```\n\n```\n-------------------------------------------------------------------------\n\
  SQL handle: SYS_SQL_3d1b0b7d8fb2691f\nSQL text: SELECT count(pad) FROM t WHERE n\
  \ = 42\n-------------------------------------------------------------------------\n\
  \n-------------------------------------------------------------------------\nPlan\
  \ name: SYS_SQL_PLAN_8fb2691f3fdbb376\nEnabled: YES     Fixed: NO      Accepted:\
  \ YES Origin: MANUAL-LOAD\n-------------------------------------------------------------------------\n\
  \nPlan hash value: 2966233522\n\n-------------------------------------------------------------------------\n\
  | Id  | Operation         | Name | Rows | Bytes | Cost (%CPU)| Time     |\n-------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT  |      |    1 |   505 |    27   (0)| 00:00:01 |\n|   1\
  \ |  SORT AGGREGATE   |      |    1 |   505 |            |          |\n|*  2 | \
  \  TABLE ACCESS FULL| T   |    1 |   505 |    27   (0)| 00:00:01 |\n-------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \n   2 - filter(\"N\"=42)\n```\n\n不幸的是，要显示与 SQL 计划基线关联的提示列表，必须查询未公开的数据字典表。以下 SQL\
  \ 语句显示了一个示例。请注意，由于提示以 XML 格式存储，需要进行转换才能获得可读的输出。\n\n```sql\nSQL> SELECT extractValue(value(h),'.')\
  \ AS hint\n  2  FROM sys.sqlobj$data od, sys.sqlobj$ so,\n  3       table(xmlsequence(extract(xmltype(od.comp_data),'/outline_data/hint')))\
  \ h\n  4  WHERE so.name = 'SYS_SQL_PLAN_8fb2691f3fdbb376'\n  5  AND so.signature\
  \ = od.signature\n  6  AND so.category = od.category\n  7  AND so.obj_type = od.obj_type\n\
  \  8  AND so.plan_id = od.plan_id;\n```\n\n```\nHINT\n-------------------------------------------\n\
  FULL(@\"SEL$1\" \"T\"@\"SEL$1\")\nOUTLINE_LEAF(@\"SEL$1\")\nALL_ROWS\nDB_VERSION('11.1.0.6')\n\
  OPTIMIZER_FEATURES_ENABLE('11.1.0.6')\nIGNORE_OPTIM_EMBEDDED_HINTS\n```\n\n## 演化\
  \ SQL 计划基线\n\n\n\n当查询优化器识别出某个执行计划可能比 SQL 计划基线强制使用的执行计划更高效时，新的、未被接受的 SQL 计划基线会被自动添加。即使查询优化器无法立即使用它们，这一操作也会发生。这样做的目的是为了告知用户存在其他可能更优的执行计划。为了验证某个未被接受的执行计划是否真的比基于已接受\
  \ SQL 计划基线生成的计划执行得更好，需要进行一次*演进*尝试。这其实就是请求查询优化器使用不同的执行计划运行 SQL 语句，并判断某个未被接受的 SQL\
  \ 计划基线是否能带来比已接受基线更好的性能。如果确实如此，该未被接受的 SQL 计划基线就会被设置为已接受状态。要执行一次演进，可以使用`dbms_spm`包中的`evolve_sql_plan_baseline`函数。要调用此函数，除了通过`sql_handle`和/或`plan_name`参数标识目标\
  \ SQL 计划基线外，还可以指定以下参数：\n\n`time_limit`:\n\n演进允许持续的时间，以分钟为单位。此参数接受一个自然数或常量`dbms_spm.auto_limit`与`dbms_spm.no_limit`。\n\
  \n`verify`:\n\n如果设置为`yes`（默认值），则执行 SQL 语句以验证性能。如果设置为`no`，则不执行验证，直接接受 SQL 计划基线。\n\
  \n`commit`:\n\n如果设置为`yes`（默认值），则根据演进结果修改数据字典。如果设置为`no`，并且参数`verify`也设置为`yes`，则会执行验证，但不会修改数据字典。\n\
  \n函数的返回值是一份详细描述演进过程的报告。以下 SQL 语句是一个示例。在此特定案例中，SQL 计划基线已成功演进。\n\n```sql\nSQL> SELECT\
  \ dbms_spm.evolve_sql_plan_baseline(\n  2           sql_handle => 'SYS_SQL_492bdb47e8861a89',\n\
  \  3           plan_name => NULL,\n  4           time_limit => 10,\n  5        \
  \   verify => 'yes',\n  6           commit => 'yes'\n  7         )\n  8     FROM\
  \ dual;\n\n-------------------------------------------------------------------------\n\
  \                     Evolve SQL Plan Baseline Report\n-------------------------------------------------------------------------\n\
  \nInputs:\n-------\n  SQL_HANDLE = SYS_SQL_492bdb47e8861a89\n  PLAN_NAME  =\n  TIME_LIMIT\
  \ = 10\n  VERIFY     = yes\n  COMMIT     = yes\nPlan: SYS_SQL_PLAN_e8861a8959340d78\n\
  -----------------------------------\n  Plan was verified: Time used .01 seconds.\n\
  \  Passed performance criterion: Compound improvement ratio >= 25.\n  Plan was changed\
  \ to an accepted plan.\n\n                       Baseline Plan      Test Plan  \
  \  Improv. Ratio\n                       -------------      ---------    -------------\n\
  \  Execution Status:        COMPLETE       COMPLETE\n  Rows Processed:         \
  \        1               1\n  Elapsed Time(ms):               0               0\n\
  \  CPU Time(ms):                   0               0\n  Buffer Gets:           \
  \        75               3                25\n  Disk Reads:                   \
  \  0               0\n  Direct Writes:                  0               0\n  Fetches:\
  \                        0               0\n  Executions:                     1\
  \               1\n\n---------------------------------------------------------------------------\n\
  \                                 Report Summary\n---------------------------------------------------------------------------\n\
  Number of SQL plan baselines verified: 1.\nNumber of SQL plan baselines evolved:\
  \ 1.\n```\n\n除了上述手动演进方式，通过调优包还支持 SQL 计划基线的自动演进。其思路很简单：一个自动化任务会定期检查是否有未被接受的 SQL 计划基线需要被演进。\n\
  \n## 修改 SQL 计划基线\n\n你可以使用`dbms_spm`包中的`alter_sql_plan_baseline`过程，不仅能修改创建 SQL 计划基线时指定的部分属性，还能更改其状态（启用或禁用）。参数`sql_handle`和`plan_name`用于标识要修改的\
  \ SQL 计划基线，两者至少需要指定一个。参数`attribute_name`和`attribute_value`分别指定要修改的属性及其新值。`attribute_name`参数接受以下值：\n\
  \n`enabled`:\n\n此属性可设置为`yes`或`no`。注意，SQL 计划基线只有在设置为`yes`时才能被查询优化器使用。\n\n`fixed`:\n\
  \n将此属性设置为`yes`后，SQL 计划基线将无法随时间演进，并且会优先于未固定的 SQL 计划基线被选用。它可以被设置为`yes`或`no`。\n\n`autopurge`:\n\
  \n将此属性设置为`yes`的 SQL 计划基线，如果在一段保留期内（保留期的配置将在后面的“删除 SQL 计划基线”章节讨论）未被使用，将会被自动移除。它可以被设置为`yes`或`no`。\n\
  \n`plan_name`:\n\n此属性用于更改 SQL 计划的名称。它可以是最多 30 个字符的任意字符串。\n\n`description`:\n\n此属性用于为\
  \ SQL 计划基线附加一段描述。它可以是最多 500 个字符的任意字符串。\n\n在下面的调用中，一个 SQL 计划基线被禁用：\n\n```sql\nret\
  \ := dbms_spm. alter_sql_plan_baseline(\n         sql_handle      => 'SYS_SQL_3d1b0b7d8fb2691f',\n\
  \         plan_name       => 'SYS_SQL_PLAN_8fb2691f3fdbb376',\n         attribute_name\
  \  => 'enabled',\n         attribute_value => 'no'\n       );\n```\n\n## 激活 SQL\
  \ 计划基线\n\n只有当动态初始化参数`optimizer_use_sql_plan_baselines`设置为`TRUE`时，查询优化器才会使用可用的 SQL\
  \ 计划基线。其默认值为`TRUE`。你可以在会话和系统级别修改此参数。\n\n## 迁移 SQL 计划基线\n\n`dbms_spm`包提供了多个用于在数据库间迁移\
  \ SQL 计划基线的过程。当需要在开发或测试数据库上生成 SQL 计划基线，然后将其迁移到生产数据库时，此功能非常有用。如图 7-11 所示，它提供了以下功能：\n\
  \n*   你可以使用`create_stgtab_baseline`过程创建一个暂存表。\n*   你可以通过`pack_stgtab_baseline`函数将\
  \ SQL 计划基线从数据字典复制到暂存表中。\n*   你可以通过`unpack_stgtab_baseline`函数将 SQL 计划基线从暂存表复制到数据字典中。\n\
  \n请注意，在数据库间移动暂存表需要通过数据移动实用程序（例如 Data Pump 或传统的导出导入实用程序）来完成，而不是使用`dbms_spm`包本身（参见图\
  \ 7-11）。\n\n下面的示例摘自脚本`clone_baseline.sql`，展示了如何将 SQL 计划基线从一个数据库复制到另一个数据库。首先，在当前模式下创建暂存表`mystgtab`。\n\
  \n```sql\ndbms_spm.create_stgtab_baseline(\n  table_name          => 'MYSTGTAB',\n\
  \  table_owner         => user,\n  tablespace_name     => 'USERS'\n);\n```\n\n![image](img/0711.jpg)\n\
  **图 7-11.** 使用`dbms_spm`包迁移 SQL 计划基线\n\n然后，将一个 SQL 计划基线从数据字典复制到暂存表中。你可以通过四种方式来标识要处理的\
  \ SQL 计划基线：\n\n\n## 识别与打包 SQL 计划基线\n\n可以通过以下几种方式识别 SQL 计划基线，以便将其打包到暂存表中：\n\n*  \
  \ 通过参数 `sql_handle` 和可选参数 `plan_name` 来精确识别特定的 SQL 计划基线。\n*   选择所有关联的 SQL 语句文本中包含特定字符串的\
  \ SQL 计划基线。为此，提供了支持通配符（例如 `%`）的参数 `sql_text`。注意，该参数区分大小写。\n*   选择匹配以下一个或多个参数的所有\
  \ SQL 计划基线：`creator`、`origin`、`enabled`、`accepted`、`fixed`、`module` 和 `action`。如果指定了多个参数，则必须满足所有条件。\n\
  *   处理所有 SQL 计划基线。为此，不指定任何参数。\n\n以下调用展示了一个精确识别 SQL 计划基线的示例：\n\n```sql\nret := dbms_spm.pack_stgtab_baseline(\n\
  \         table_name      => 'MYSTGTAB',\n         table_owner     => user,\n  \
  \       sql_handle      => 'SYS_SQL_3d1b0b7d8fb2691f',\n         plan_name     \
  \  => 'SYS_SQL_PLAN_8fb2691f3fdbb376'\n       );\n```\n\n此时，暂存表 `mystgtab` 通过数据移动工具从一个数据库复制到另一个数据库。\n\
  \n最后，SQL 计划基线从暂存表复制到目标数据库的数据字典中。与 `pack_stgtab_baseline` 函数一样，同样有几种方法可用于识别要处理的 SQL\
  \ 计划基线。以下调用展示了一个根据关联的 SQL 语句文本来识别 SQL 计划基线的示例：\n\n```sql\nret := dbms_spm.unpack_stgtab_baseline(\n\
  \         table_name  => 'MYSTGTAB',\n         table_owner => user,\n         sql_text\
  \    => '%FROM t%'\n       );\n```\n\n## 删除 SQL 计划基线\n\n可以使用 `dbms_spm` 包中的 `drop_sql_plan_baseline`\
  \ 过程从数据字典中删除 SQL 计划基线。参数 `sql_handle` 和 `plan_name` 用于标识要删除的 SQL 计划基线。两者中至少必须指定一个。以下调用对此进行了说明：\n\
  \n```sql\nret := dbms_spm.drop_sql_plan_baseline(\n         sql_handle => 'SYS_SQL_3d1b0b7d8fb2691f',\n\
  \         plan_name  => 'SYS_SQL_PLAN_8fb2691f3fdbb376'\n       );\n```\n\n未使用的、且\
  \ `fixed` 属性未设置为 `yes` 的 SQL 计划基线会在保留期过后被自动清除。默认保留期为 53 周。当前值可通过数据字典视图 `dba_sql_management_config`\
  \ 显示。\n\n```sql\nSQL> SELECT parameter_value\n  2  FROM dba_sql_management_config\n\
  \  3  WHERE parameter_name = 'PLAN_RETENTION_WEEKS';\n\nPARAMETER_VALUE\n---------------\n\
  \             53\n```\n\n可以通过调用 `dbms_spm` 包中的 `configure` 过程来更改保留期。支持 5 到 523 周的值。以下示例展示了如何将其更改为\
  \ 12 周。如果参数 `parameter_value` 设置为 `NULL`，则恢复默认值。\n\n```sql\ndbms_spm.configure(\n\
  \  parameter_name  => 'plan_retention_weeks',\n  parameter_value => 12\n);\n```\n\
  \n## 权限\n\n当 SQL 计划基线被自动捕获时（即通过将初始化参数 `optimizer_capture_sql_plan_baselines` 设置为\
  \ `TRUE`），创建它们不需要特殊权限。\n\n只有拥有系统权限 `administer sql management object` 的用户才能执行 `dbms_spm`\
  \ 包（`dba` 角色默认包含此权限）。SQL 计划基线不存在对象权限。\n\n最终用户使用 SQL 计划基线不需要特殊权限。\n\n## 使用场景\n\n\
  您应该考虑在两种情况下使用此技术。首先，当您正在对特定的 SQL 语句进行调优，且无法在应用程序中修改它时（例如，无法添加提示）。其次，当无论出于何种原因，您正经历执行计划不稳定的问题时。\n\
  \n遗憾的是，SQL 计划基线仅在企业版中可用。\n\n###### 陷阱与谬误\n\n您必须意识到，当 SQL 计划基线所依赖的对象被删除时，它们不会立即被删除。但这不一定是个问题。例如，如果需要因为重组或移动而重新创建表或索引，不删除\
  \ SQL 计划基线是件好事；否则，就需要重新创建它们。无论如何，未使用的 SQL 计划基线会在保留期结束时被清除。\n\n两个文本相同的 SQL 语句具有相同的签名。即使它们引用不同模式中的对象，也是如此。这意味着单个\
  \ SQL 计划基线可能会用于两个名称相同但位于不同模式中的表！您必须非常小心，尤其是在数据库中存在多个相同对象副本的情况下。\n\nSQL 计划基线存储在 `sysaux`\
  \ 表空间中。默认情况下，最多可以使用该表空间的 10%。当前值可通过数据字典视图 `dba_sql_management_config` 显示：\n\n```sql\n\
  SQL> SELECT parameter_value\n  2  FROM dba_sql_management_config\n  3  WHERE parameter_name\
  \ = 'SPACE_BUDGET_PERCENT';\n\nPARAMETER_VALUE\n---------------\n             10\n\
  ```\n\n当超过阈值时，警报日志中会写入一条警告消息。要更改默认阈值，可以使用 `dbms_spm` 包中的 `configure` 过程。支持 1% 到\
  \ 50% 之间的值。以下示例展示了如何将其更改为 5%。如果参数 `parameter_value` 设置为 `NULL`，则恢复默认值。\n\n```sql\n\
  dbms_spm.configure(\n  parameter_name  => 'space_budget_percent',\n  parameter_value\
  \ => 5\n);\n```\n\n## 接下来是第 8 章\n\n本章描述了几种 SQL 调优技术。选择其中一种并不总是容易的。然而，如果您了解使用它们的优缺点，选择就会容易得多。话虽如此，在实践中，您的选择是有限的，因为您不能在所有情况下应用所有技术。这可能是由于技术限制，也可能是由于许可问题。\n\
  \n本章是最后一章完全专注于查询优化器。从下一章开始，第 4 部分就开始了。终于到了不仅可以学习如何高效地访问和连接数据，还可以学习如何利用旨在提高 SQL 语句性能的众多特性的时候了。\n\
  \n第 4 部分的第一章专门讨论解析，这无疑是 SQL 语句执行的核心步骤。它之所以如此重要，是因为查询优化器在此时生成执行计划。为了始终拥有高效的执行计划，您需要解析数据库引擎执行的每条\
  \ SQL 语句，但反过来，解析本身是一个非常昂贵的操作。因此，必须将其最小化，并且应尽可能多地重用执行计划——但也不能过度。这可能意味着执行计划并非总是高效的。再次强调，为了以最佳方式利用数据库引擎，您必须了解其工作原理以及不同特性的优缺点。\n\
  \n\n## 第四部分\n优化\n\n*性能即是现实，忘掉其他一切*。\n\n—哈罗德·吉宁[¹]\n\n只有当你确定了性能问题的根本原因后，才应该尝试去解决它。如`第\
  \ 3 章`所述，存在几种不同类型的问题。无论你面临的是哪种问题，核心目标都是减少——甚至最好是消除——最耗时操作所花费的时间。请注意，单个操作可能由一连串按顺序执行的动作组成。例如，为了完整处理一个返回大量数据的查询，需要进行多次获取操作。\n\
  \n`第 8 章`描述了解析如何工作、如何识别解析问题，以及如何在不影响性能的前提下最小化解析带来的影响。`第 9 章`介绍如何利用可用的访问结构来高效访问存储在单表中的数据。`第\
  \ 10 章`则更进一步，超越单表访问，描述如何将来自多个表的数据连接在一起。`第 11 章`涉及并行处理以及用于加速流插入和最小化组件间交互的技术。最后，`第\
  \ 12 章`描述了一些物理存储参数也可能对性能产生可观察到的影响。简而言之，本部分各章旨在展示如何通过利用数据库引擎为此目的提供的众多特性，来改善与 SQL\
  \ 引擎交互操作的响应时间。\n\n[¹]: 该引言出处见 [`www.quotationspage.com/quote/4442.html`](http://www.quotationspage.com/quote/4442.html)。\n\
  \n### 第 8 章\n解析\n\n解析对整体性能的影响差异极大。在某些情况下，它几乎察觉不到。在其他情况下，它却是导致性能问题的主要原因之一。如果你遇到解析问题，通常意味着应用程序没有正确处理它。这是一个大问题，因为要改变应用程序的行为，往往需要大量修改代码。开发者需要了解解析的含义，并学会如何编写代码以尽可能避免与之相关的问题。\n\
  \n`第 2 章`描述了游标的生命周期以及解析的工作原理。本章将阐述如何识别、解决和规避解析问题。我还将讨论与解析相关的开销。最后，我将介绍常见应用程序编程接口所提供的、用于减少解析活动的特性。\n\
  \n#### 识别解析问题\n\n在识别解析问题时，很容易陷入“强迫性调优紊乱”的状态。问题在于，多个动态性能视图包含了详细记录软解析、硬解析和执行次数的计数器。这些计数器以及基于它们计算出的比率是无用的，因为它们没有提供关于解析所花费时间的信息。请注意，对于解析而言，这是一个真正的问题，因为解析没有典型的持续时间。事实上，根据\
  \ SQL 语句的复杂程度及其引用的对象，解析的持续时间通常会相差几个数量级。简而言之，这类计数器只能告诉你数据库引擎执行了解析操作，次数是多还是少，但没有提供这是否是问题的任何信息。因此，在实践中，它们可能仅对趋势分析有用。\n\
  \n如果你遵循`第 3 章`描述的分析路线图，就应该清楚，你应该考虑的识别解析问题的唯一有效方法是测量解析操作花费了多少时间。对于这类分析，如果你寻找的是确凿证据而不仅仅是线索，那么只有一个信息来源可以使用：SQL\
  \ 跟踪生成的输出。请注意，我认为基于动态性能视图（如`v$sesstat`和`v$sess_time_model`）中找到的解析时间的方法价值不大，因为它们通常无法找出哪些\
  \ SQL 语句是导致高解析时间的罪魁祸首。\n\n主要有两种解析问题。第一种与持续时间极短的解析相关。我们称之为快速解析。当然，要使其引人注目，需要执行大量的快速解析。第二种解析问题与持续时间很长的解析相关。我们称之为长时解析。这种情况通常发生在\
  \ SQL 语句相当复杂，查询优化器需要很长时间来生成高效执行计划时。此时，执行次数就不那么重要了。\n\n我将在接下来的两节中描述识别这两种解析问题的方法。由于它们的识别方法没有本质区别，我将只详细描述第一种。\n\
  \n\n\n##### 快速解析\n\n以下章节描述了如何识别由快速解析导致的性能问题。由于第 3 章介绍了两种性能分析工具——TKPROF 和 TVD$XTAT，我将使用相同的示例来展示这两种工具的输出文件。本节用作示例的跟踪文件是通过执行存储在文件\
  \ `ParsingTest1.java` 中的 Java 类生成的。跟踪文件和两个输出文件都可以在文件 `ParsingTest1.zip` 中找到。同样处理过程的\
  \ PL/SQL、C (OCI) 和 C# (ODP.NET) 实现版本也一并提供。\n\n##### 使用 TKPROF\n\n如第 3 章所建议，使用以下选项执行\
  \ TKPROF：\n\n```bash\ntkprof <跟踪文件> <输出文件> sys=no sort=prsela,exeela,fchela\n```\n\
  \n开始分析输出文件时，先查看最后几行总是有益的。在这个特定案例中，重要的是要注意：处理过程持续了大约 13 秒，应用程序执行了 10,000 条 SQL 语句，并且很可能几乎所有\
  \ SQL 语句彼此都不相同（`SQL 语句 ≍ 唯一 SQL 语句`）。\n\n```\n跟踪文件中有一个会话。\n跟踪文件中有 10000 条用户 SQL\
  \ 语句。\n跟踪文件中有 62 条内部 SQL 语句。\n跟踪文件中共有**`10062 条 SQL 语句`**。\n跟踪文件中共有**`10013 条唯一\
  \ SQL 语句`**。\n跟踪文件中有 110627 行。\n跟踪文件中耗时**`13 秒`**。\n```\n\n接下来，该检查输出文件中列出的第一条 SQL\
  \ 语句持续了多长时间。请记住，由于您指定了 `sort` 选项，SQL 语句已根据其响应时间排序。有趣的是，第一个游标的响应时间（`elapsed` 列）少于\
  \ 0.01 秒（`0.00`）。换句话说，所有 SQL 语句的执行时间都少于 0.01 秒。实际上，平均每次执行耗时 1.3 毫秒（`13/10,000`）。这意味着响应时间肯定不是由少数运行时间长的\
  \ SQL 语句造成的，而是由短时间内处理的大量 SQL 语句导致的。\n\n```\n调用        次数       CPU 耗时    经过时间  \
  \     磁盘读       一致性读       当前读       行数\n------- ------ -------- ---------- ----------\
  \ ---------- ---------- ----------\n解析        1     0.00       0.00          0 \
  \         0          0          0\n执行        1     0.00       0.00          0  \
  \        0          0          0\n获取        1     0.00       0.00          0   \
  \       2          0          0\n------- ------ -------- ---------- ---------- ----------\
  \ ---------- ----------\n总计        3     0.00 **`0.00`**          0          2 \
  \         0          0\n```\n\n在这种情况下，要了解解析是否是问题，必须检查提供总体汇总的部分。根据执行统计，解析时间约占总处理时间的\
  \ 95%（`4.83/5.10`）。这清楚地表明数据库引擎除了进行解析之外，几乎没有做其他任何事情。\n\n```\n调用        次数       CPU\
  \ 耗时    经过时间       磁盘读       一致性读       当前读       行数\n------- ------ -------- ----------\
  \ ---------- ---------- ---------- ----------\n解析    10000     4.83 **`4.83`** \
  \         0          0          0          0\n执行  10000     0.12       0.13    \
  \      0          0          0          0\n获取    10000     0.20       0.13     \
  \     0      23051          0       3048\n------- ------ -------- ---------- ----------\
  \ ---------- ---------- ----------\n总计    30000     5.10 **`5.10`**          0 \
  \     23051          0       3048\n```\n\n以下行也显示，10,000 次解析中的每一次都是硬解析。请注意，尽管高比例的硬解析通常不受欢迎，但它不一定是个问题。它只是一个线索，表明某些地方可能不是最优的。\n\
  \n```\n解析期间库缓存未命中次数：**`10000`**\n```\n\n执行统计的问题在于，它们遗漏了大约 61%（`1–5.10/13`）的响应时间。实际上，通过查看等待事件汇总表，可以看到有\
  \ 5.94 秒用于等待客户端。然而，这仍然留给我们大约两秒（`13–5.94–5.10`）的时间未被解释清楚。\n\n```\n等待事件          \
  \                 等待次数   最大等待时间   总等待时间\n----------------------------------------\
  \ ------------ ------------\nSQL*Net message to client             10000       0.00\
  \         0.00\nSQL*Net message from client           10000       0.02 **`5.94`**\n\
  latch: shared pool                        1       0.00         0.00\n```\n\n既然您知道解析是个问题，明智的做法是查看一下\
  \ SQL 语句。在这个案例中，通过查看其中一些 SQL 语句（以下是前五条），很明显它们非常相似。只有`WHERE`子句中使用的字面量不同。这是一个未使用绑定变量的典型案例。\n\
  \n```sql\nSELECT pad FROM t WHERE val = 7650\nSELECT pad FROM t WHERE val = 8977\n\
  SELECT pad FROM t WHERE val = 3233\nSELECT pad FROM t WHERE val = 7777\nSELECT pad\
  \ FROM t WHERE val = 3234\n```\n\n这种情况下的问题在于，TKPROF 无法识别仅在字面量值上有所不同的 SQL 语句。事实上，即使将\
  \ `aggregate` 选项设置为 `yes`（这是默认设置），也只有文本完全相同的 SQL 语句才会被分组在一起。这是一个重大缺陷，在实际案例中使得使用\
  \ TKPROF 分析解析问题变得困难。为了使其稍微容易一些，可以指定 TKPROF 的 `record` 选项。这样，会生成一个仅包含 SQL 语句的文件。\n\
  \n```bash\ntkprof <跟踪文件> <输出文件> sys=no sort=prsela,exeela,fchela record=<SQL 文件>\n\
  ```\n\n然后，您可以使用命令行实用程序（如 `grep` 和 `wc`）来找出有多少相似的 SQL 语句。例如，以下命令返回值 10,000：\n\n```bash\n\
  grep \"SELECT pad FROM t WHERE val =\" <SQL 文件> | wc -l\n```\n\n##### 使用 TVD$XTAT\n\
  \n执行 TVD$XTAT 时无需指定特定选项：\n\n```bash\ntvdxtat –i <跟踪文件> -o <输出文件>\n```\n\n分析输出文件从查看整体资源使用概况开始。这里的处理过程持续了大约\
  \ 13 秒。其中，大约 45%的时间用于等待客户端，大约 39%的时间在 CPU 上运行。这些数据与上一节描述的数据基本一致。只是精度不同。第一部分唯一的附加信息是，明确给出了未解释清楚的时间。\n\
  \n```\n组件                      总耗时       占比    事件次数       单次事件耗时\n----------------------------\
  \ --------- -------- ---------- -------------\nSQL*Net message from client     \
  \ 5.946 **`45.353`**     10,000         0.001\nCPU                             \
  \ 5.132 **`39.147`**        n/a           n/a\n**`未解释清楚`**                    2.024\
  \   15.436        n/a           n/a\nSQL*Net message to client        0.007    0.054\
  \     10,000         0.000\nlatch: shared pool               0.001    0.010    \
  \      1         0.001\n---------------------------- --------- --------\n总计 **`13.110`**\
  \  100.000\n```\n\n仅通过查看非递归 SQL 语句的汇总，您就可以看到单个 SQL 语句对整个处理过程负责。这是 TKPROF 和 TVD$XTAT\
  \ 之间的一个显著差异。事实上，TVD$XTAT 能够识别相似的 SQL 语句并将它们一并报告。\n\n```\n语句 ID   类型       总耗时  \
  \     占比    执行次数       单次执行耗时\n------------- ------- --------- ------- -----------\
  \ -------------\n1             SELECT     11.086  84.564      10,000         0.001\n\
  ------------- ------- --------- -------\n总计                    11.086  84.564\n\
  ```\n\n\n"
- "# SQL 性能分析文档\n\n## 输出文件概述\n在输出文件中，仅显示分析期间发现的第一条 SQL 语句。此外，一条消息会告知发现的相似 SQL 语句数量：\n\
  \n`检测到 10000 条相似的 SQL 语句`\n\n## 执行统计分析\n根据执行统计信息，对于 SQL 语句编号 1（不包括递归语句），解析时间约占处理时间的\
  \ 95%（4.835/5.106）。这清楚地表明数据库引擎除了解析外几乎没有做其他事情。TKPROF 和 TVD$XTAT 输出文件之间执行统计的细微差别在于，TVD$XTAT\
  \ 在解析调用次数旁边显示了未命中次数（换句话说，硬解析次数）。\n\n```\n调用类型    计数    未命中次数    CPU 耗时    已用时间 \
  \   物理读    逻辑读    一致性读    当前行数    返回行数\n--------  -------  ----------  --------\
  \  --------  ------  -------  ---------  --------  -----\n解析        10,000     \
  \ 10,000      4.835      4.835       0        0          0         0      0\n执行\
  \        10,000          0      0.122      0.139       0        0          0   \
  \      0      0\n提取        10,000          0      0.150      0.131       0   23,051\
  \     23,051         0  3,048\n--------  -------  ----------  --------  --------\
  \  ------  -------  ---------  --------  -----\n总计        30,000      10,000   \
  \   5.107      5.106       0   23,051     23,051         0  3,048\n```\n\n这些执行统计的问题在于，响应时间中约有\
  \ 54%（1–5.106/11.086）未在其中体现。无论如何，你可以通过查看此处显示的 SQL 语句级别的资源使用情况配置文件来查看缺失的时间；具体来说，有\
  \ 5.946 秒用于等待客户端。\n\n```\n组件类型                       持续时间      占比    事件次数    单次事件持续时间\n\
  ----------------------------  ---------  -------  ----------  -------------\nSQL*Net\
  \ message from client      5.946   53.631       10,000         0.001\nCPU      \
  \                        5.107   46.067         n/a           n/a\n递归语句        \
  \                 0.025    0.225         n/a           n/a\nSQL*Net message to client\
  \        0.007    0.064       10,000         0.000\nlatch: shared pool         \
  \      0.001    0.012           1         0.001\n----------------------------  ---------\
  \  -------\n总计                           11.086  100.000\n```\n\n## 问题总结\nTKPROF\
  \ 和 TVD$XTAT 执行的分析表明，数据库引擎执行的处理完全归因于解析。然而，在数据库端，解析仅占整体响应时间的约 37%（4.835/13.110）。这意味着消除它应该大约可以使整体响应时间减半。分析还显示，有\
  \ 10,000 条类似于以下内容的 SQL 语句被解析并执行了一次：\n\n`SELECT pad FROM t WHERE val = 3233`\n\n\
  由于使用了不断变化的字面值，库缓存中的共享游标无法被重用。换句话说，每次解析都是一次硬解析。图 8-1 展示了此处理过程的图形化表示。\n\n---\n\n**注意**\
  \ 图 8-1 中所示的处理过程在后文中被称为*测试用例 1*。\n\n---\n\n不言而喻，这样的处理是低效的。有关此类问题的可能解决方案，请参阅本章后面的“解决解析问题”部分。\n\
  \n![image](img/0801.jpg)\n\n**图 8-1.** *测试用例 1 执行的处理过程*\n\n##### 长解析\n以下各节描述了如何识别由长解析引起的性能问题。由于第\
  \ 3 章描述了两种性能分析器 TKPROF 和 TVD$XTAT，我将针对两种分析器的输出文件讨论同一个例子。本节中用作示例的跟踪文件是通过执行脚本 `long_parse.sql`\
  \ 生成的。跟踪文件和输出文件可在文件 `long_parse.zip` 中找到。\n\n##### 使用 TKPROF\n与快速解析一样，分析从 TKPROF\
  \ 输出的末尾开始。在此特定情况下，值得注意的是处理持续了大约一秒钟，并且应用程序只执行了三条 SQL 语句。所有其他 SQL 语句都是由数据库引擎递归执行的。\n\
  \n```\n跟踪文件中有 1 个会话。\n跟踪文件中有 3 条用户 SQL 语句。\n跟踪文件中有 612 条内部 SQL 语句。\n跟踪文件中共有 615\
  \ 条 SQL 语句。\n跟踪文件中有 16 条唯一的 SQL 语句。\n跟踪文件共有 4931 行。\n跟踪文件中总耗时 1 秒。\n```\n\n通过查看输出文件中第一条\
  \ SQL 语句的执行统计信息，不仅可以看到它对整个响应时间（约一秒）负全责，而且所有时间都花在了一次解析上：\n\n```\n调用类型  计数      CPU\
  \ 耗时    已用时间      物理读    查询次数    当前行数    返回行数\n-------  ------  ----------  ----------\
  \  ----------  ----------  ----------  ----------\n解析       1      1.07        \
  \ 1.05            0          0          0          0\n执行       1      0.00     \
  \    0.00            0          0          0          0\n提取       2      0.00  \
  \       0.00            0         19          0          1\n-------  ------  ----------\
  \  ----------  ----------  ----------  ----------  ----------\n总计       4      1.08\
  \         1.06            0         19          0          1\n```\n\n##### 使用 TVD$XTAT\n\
  与快速解析一样，TVD$XTAT 输出的分析始于查看整体资源使用情况配置文件。处理持续了大约 1.6 秒。其中，约 71%的时间用于在 CPU 上运行，29%的时间用于等待客户端。另请注意，在这种情况下，未计入的时间非常短，因此完全可以忽略不计。\n\
  \n```\n组件类型                       持续时间      占比    事件次数    单次事件持续时间\n----------------------------\
  \  ---------  -------  ----------  -------------\nCPU                          \
  \    1.139   71.281         n/a           n/a\nSQL*Net message from client     \
  \ 0.471   29.478           5         0.094\nSQL*Net message to client        0.000\
  \    0.001           5         0.000\nSQL*Net more data from client    0.000   \
  \ 0.001           1         0.000\n未计入时间                       -0.012   -0.761 \
  \        n/a           n/a\n----------------------------  ---------  -------\n总计\
  \                            1.598  100.000\n```\n\n仅通过查看非递归 SQL 语句的摘要，你就可以看到执行了三条\
  \ SQL 语句。其中，第一条几乎承担了全部的响应时间。\n\n```\n语句 ID    类型      持续时间    占比    执行次数    单次执行耗时\n\
  -------------  -------  ---------  -------  -----------  -------------\n1      \
  \       SELECT     1.138   71.230           1         1.138\n5             PL/SQL\
  \     0.003    0.201           1         0.003\n13            PL/SQL     0.001 \
  \   0.063           1         0.001\n-------------  -------  ---------  -------\n\
  总计                    1.142   71.493\n```\n\n请注意，在前面的表格中，总计不是 100%，因为一次长时间的 `SQL*Net\
  \ message from client` 等待未与任何游标关联。确认这一点的唯一方法是打开跟踪文件并搜索属于任何游标的等待（此类等待在跟踪文件中与游标#0\
  \ 关联）。\n\n\n`...`\n`WAIT #0:   nam='SQL*Net   message to client' ela= 1 driver id=1413697536\
  \ ...`\n`WAIT #0:   nam='SQL*Net   message from client' ela= 465535 driver id=1413697536\
  \ ...`\n`WAIT #0:   nam='SQL*Net more data from client' ela= 16 driver id=1413697536\
  \ ...`\n`...`\n\n您可以通过查看该类事件的以下详细统计数据来确认这一点。尤其请注意，有一个事件持续了大约 0.5 秒，而归属于 SQL 语句的总体等待时间为\
  \ 3 毫秒。\n\n```\nTotal           Number of           Duration per\nDuration [μs]\
  \   Duration        %     Events        %    Event [μs]\n-------------- ---------\
  \ -------- ---------- -------- -------------\n< 1024             0.001    0.131\
