  \     B   9      .000039482 YES  0        3   C10C  C114   5366`\n`~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~`\n\
  \n`INDEX / (SUB)PARTITION STATISTICS DIFFERENCE:`\n`.............................................`\n\
  \n`OBJECTNAME    TYP SRC ROWS    LEAFBLK DISTKEY LF/KY DB/KY CLF       LVL SAMPSIZ`\n\
  `...............................................................................`\n\
  \n`                           INDEX: T_PK`\n`                           ...........`\n\
  \n`T_PK          I   A   10000   20      10000   1     1     9820      1   10000`\n\
