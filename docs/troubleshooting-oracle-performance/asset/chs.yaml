  END;\n```\n\n### 执行统计信息\n\n执行统计信息以表格形式提供了按数据库调用类型聚合的数据。由于表格布局基于 TKPROF 生成的格式，各列的含义相同。然而，此处有两个额外的列：`Misses`\
