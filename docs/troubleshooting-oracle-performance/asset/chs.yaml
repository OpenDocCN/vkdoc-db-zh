- "# 执行计划列\n\n## 基本信息（始终可用）\n\n| **列** | **描述** |\n| --- | --- |\n| `Id` | 执行计划中每个操作（行）的标识符。如果数字前带有星号，表示稍后将提供该行的谓词信息。\
  \ |\n| `Operation` | 要执行的操作。这也被称为行源操作。 |\n| `Name` | 执行操作的对象。 |\n\n## 查询优化器估算值\n\
  \n| **列** | **描述** |\n| --- | --- |\n| `Rows (E-Rows)` | 操作预计返回的行数。 |\n| `Bytes\
  \ (E-Bytes)` | 操作预计返回的数据量。 |\n| `TempSpc` | 操作预计使用的临时空间量。 |\n| `Cost (%CPU)` | 操作的估算成本。括号内给出的是\
  \ CPU 成本的百分比。请注意，此值在执行计划中是累积的。换句话说，父操作的成本包含了其子操作的成本。 |\n| `Time` | 执行操作预计所需的时间（HH:MM:SS）。\
  \ |\n\n## 分区处理\n\n| **列** | **描述** |\n| --- | --- |\n| `Pstart` | 要访问的第一个分区的编号。如果在解析时未知，则设置为\
  \ `KEY, KEY(I), KEY(MC), KEY(OR)` 或 `KEY(SQ)`。 |\n| `Pstop` | 要访问的最后一个分区的编号。如果在解析时未知，则设置为\
  \ `KEY, KEY(I), KEY(MC), KEY(OR)` 或 `KEY(SQ)`。 |\n\n## 并行与分布式处理\n\n| **列** | **描述**\
  \ |\n| --- | --- |\n| `Inst` | 对于分布式处理，指操作所使用的数据库链接的名称。 |\n| `TQ` | 对于并行处理，指用于从属进程间通信的表队列。\
  \ |\n| `IN-OUT` | 并行或分布式操作之间的关系。 |\n| `PQ Distrib` | 对于并行处理，指生产者向消费者发送数据时所使用的分发方式。\
  \ |\n\n## 运行时统计信息*\n\n| **列** | **描述** |\n| --- | --- |\n| `Starts` | 特定操作被执行的次数。\
  \ |\n| `A-Rows` | 操作实际返回的行数。 |\n| `A-Time` | 执行操作实际花费的时间（HH:MM:SS.FF）。 |\n\n## I/O\
  \ 统计信息*\n\n| **列** | **描述** |\n| --- | --- |\n| `Buffers` | 执行期间执行的逻辑读操作次数。 |\n\
  | `Reads` | 执行期间执行的物理读操作次数。 |\n| `Writes` | 执行期间执行的物理写操作次数。 |\n\n## 内存利用统计信息\n\n\
  | **列** | **描述** |\n| --- | --- |\n| `OMem` | 最优执行所需的估计内存量。 |\n| `1Mem` | 单次通过执行所需的估计内存量。\
  \ |\n| `O/1/M` | 以最优/单次通过/多次通过模式执行的次数。 |\n| `Used-Mem` | 上次执行期间操作使用的内存量。 |\n| `Used-Tmp`\
  \ | 上次执行期间操作使用的临时空间量。此值必须乘以 1,024 才能与其他内存利用列保持一致（例如，32K 表示 32MB）。 |\n| `Max-Tmp`\
  \ | 操作使用的最大临时空间量。此值必须乘以 1,024 才能与其他内存利用列保持一致（例如，32K 表示 32MB）。 |\n\n*仅在启用执行统计信息时可用。\n\
  \n下一节显示查询块名称和对象别名：\n\n```\nQuery Block Name / Object Alias (identified by operation\
  \ id):\n-------------------------------------------------------------\n\n   1 -\
  \ SEL$1\n   2 - SEL$1 / T2@SEL$1\n   3 - SEL$1 / T2@SEL$1\n   4 - SEL$1 / T1@SEL$1\n\
  ```\n\n对于执行计划中的每个操作，您都可以看到它关联到哪个查询块，以及可选地，它在哪个对象上执行。当 SQL 语句像本示例中多次引用同一表时，此信息至关重要。此节从\
  \ Oracle 数据库 10*g*版本开始可用。查询块名称将与提示一起在第 7 章中更详细地讨论。\n\n第四节仅从 Oracle 数据库 10*g*第 2\
  \ 版开始可用。它显示了强制该特定执行计划所需的一组提示。这组提示称为*大纲*。第 7 章描述了如何使用存储的大纲和 SQL 计划基线来存储和利用这样的大纲。\n\
  \n```\nOutline Data\n-------------\n\n  /*+\n      BEGIN_OUTLINE_DATA\n      IGNORE_OPTIM_EMBEDDED_HINTS\n\
  \      OPTIMIZER_FEATURES_ENABLE('10.2.0.3')\n      ALL_ROWS\n      OUTLINE_LEAF(@\"\
  SEL$1\")\n      INDEX_RS_ASC(@\"SEL$1\" \"T2\"@\"SEL$1\" (\"T\".\"ID\"))\n     \
  \ FULL(@\"SEL$1\" \"T1\"@\"SEL$1\")\n      LEADING(@\"SEL$1\" \"T2\"@\"SEL$1\" \"\
  T1\"@\"SEL$1\")\n      USE_HASH(@\"SEL$1\" \"T1\"@\"SEL$1\")\n      END_OUTLINE_DATA\n\
  \  */\n```\n\n下一节显示应用了哪些谓词。对于每个谓词，会显示其位置（行号）和应用方式（访问或过滤）。\n\n```\nPredicate Information\
  \ (identified by operation id):\n---------------------------------------------------\n\
  \n   1 - access(\"T1\".\"N\"=\"T2\".\"N\")\n   3 - access(\"T2\".\"ID\">=6 AND \"\
  T2\".\"ID\"<=19)\n   4 - filter(\"T1\".\"ID\">6)\n```\n\n访问谓词用于通过利用高效的访问结构（例如，像操作\
  \ 1 中那样的内存中的哈希表，或像操作 3 中那样的索引）来定位行，而过滤谓词仅在行已从存储它们的结构中提取之后才应用。请注意，此部分既包含 SQL 语句本身中存在的谓词，也可能包含由查询优化器或虚拟专用数据库生成的谓词。在上面的示例中，您有以下谓词：\n\
  \n*   第 1 行的哈希连接使用谓词 `\"T1\".\"N\"=\"T2\".\"N\"` 来连接两个表。换句话说，访问谓词也可能显示连接条件。在此特定情况下，访问谓词用于指定将使用访问表\
  \ `t2` 返回的值来探测包含表 `t1` 数据的内存中的哈希表（哈希连接的工作原理在第 10 章中有详细描述）。\n*   第 3 行的索引扫描访问索引 `t_pk`\
  \ 以查找表 `t1` 的 `id` 列。在这种情况下，访问谓词显示了执行查找所依据的键。\n*   在第 4 行，通过全表扫描读取表 `t3` 中的所有行。然后，当行从数据块中提取出来后，应用谓词\
  \ `\"T1\".\"ID\">6` 对它们进行过滤。\n\n以下部分显示了执行每个操作时作为输出返回的哪些列。此功能仅从 Oracle 数据库 10*g*开始可用。示例如下：\n\
  \n```\nColumn Projection Information (identified by operation id):\n-----------------------------------------------------------\n\
  \n   1 - (#keys=1) \"T2\".\"N\"[NUMBER,22], \"T2\".\"ID\"[NUMBER,22],\n       \"\
  T2\".\"PAD\"[VARCHAR2,1000]\n   2 - \"T2\".\"ID\"[NUMBER,22], \"T2\".\"N\"[NUMBER,22],\
  \ \"T2\".\"PAD\"[VARCHAR2,1000]\n   3 - \"T2\".ROWID[ROWID,10], \"T2\".\"ID\"[NUMBER,22]\n\
  \   4 - \"T1\".\"N\"[NUMBER,22]\n```\n\n在这种情况下，值得注意的是，第 2 行的表访问返回 `id, n` 和 `pad`\
  \ 列，而第 4 行的全表扫描只返回 `n` 列。因此，第 2 行每行返回的估算数据量（列 `Bytes`）(7,392/14 = 528 字节) 远大于第 4\
  \ 行 (25,844/994 = 26 字节)。第 12 章 提供了关于数据库引擎部分读取行的能力的更多信息。\n\n最后，有一个部分提供关于优化阶段、环境或\
  \ SQL 语句本身的注释和警告：\n\n```\nNote\n-----\ndynamic sampling used for this statement\n\
  ```\n\n\n在此告知，查询优化器使用了动态采样来收集对象统计信息。在 Oracle9*i*第 2 版中，此部分没有标题，并且包含的信息比 Oracle Database\
  \ 10*g*版本更少（例如，未给出是否使用了动态采样）。\n\n## 函数显示\n\n函数 `display` 返回存储在计划表中的执行计划。返回值是集合 `dbms_xplan_type_table`\
  \ 的一个实例。该集合的元素是对象类型 `dbms_xplan_type` 的实例。此对象类型的唯一属性名为 `plan_table_output`，其类型为\
  \ `VARCHAR2`。³ 该函数具有以下输入参数：\n\n*   `table_name` 指定计划表的名称。默认值为 `plan_table`。如果指定为\
  \ `NULL`，则使用默认值。\n*   `statement_id` 指定在执行 SQL 语句 `EXPLAIN PLAN` 时可选提供的 SQL 语句名称。默认值为\
  \ `NULL`。如果使用默认值，则显示最近插入计划表的执行计划（前提是未指定 `filter_preds` 参数）。\n*   `format` 指定输出中提供哪些信息。有基本值（`basic,\
  \ typical, serial, all`, 和 `advanced`），并且为了更精细的控制，可以向它们添加额外的修饰符（`alias, bytes, cost,\
  \ note, outline, parallel, partition, peeked_binds, predicate, projection, remote`,\
  \ 和 `rows`）。如果要添加信息，修饰符可选择以 `+` 字符为前缀（例如，`basic +predicate`）。如果要移除信息，修饰符以 `–` 字符为前缀（例如，`typical\
  \ –bytes`）。可以同时指定多个修饰符（例如，`typical +alias –bytes –cost`）。表 6-2 和 表 6-3 分别完整描述了基本值和修饰符。默认值为\
  \ `typical`。基本值 `advanced` 和修饰符仅在 Oracle Database 10*g* 第 2 版及以后版本中可用。\n*   `filter_preds`\
  \ 指定查询计划表时应用的限制条件。该限制是基于计划表某一列的常规 SQL 谓词（例如，`statement_id='test3'`）。默认值为 `NULL`。如果使用默认值，则显示最近插入计划表的执行计划。此参数在\
  \ Oracle Database 10*g* 第 2 版及以后版本中可用。\n\n要使用函数 `display`，调用者只需要对该包具有 `EXECUTE`\
  \ 权限，并且对计划表具有 `SELECT` 权限。\n\n**表 6-2.** *`format` 参数接受的基本值*\n\n| **值** | **描述**\
  \ |\n| --- | --- |\n| `basic` | 仅显示最少的信息，基本上只有操作及其执行的对象 |\n| `typical` | 显示最相关的信息，基本上包含除别名、大纲和列投影信息外的所有内容\
  \ |\n| `serial` | 与 `typical` 类似，但不显示并行处理信息 |\n| `all` | 显示除大纲外的所有可用信息 |\n| `advanced`\
  \ | 显示所有可用信息 |\n\n**表 6-3.** *参数 `format` 接受的修饰符*\n\n| **值** | **描述** |\n| --- |\
  \ --- |\n| `alias` | 控制包含查询块名称和对象别名的部分的显示。 |\n| `bytes` | 控制执行计划表中 `Bytes` 列的显示。\
  \ |\n| `cost` | 控制执行计划表中 `Cost` 列的显示。 |\n| `note` | 控制包含注释的部分的显示。 |\n| `outline`\
  \ | 控制包含大纲的部分的显示。 |\n| `parallel` | 控制并行处理信息的显示，特别是执行计划表中的 `TQ, IN-OUT`, 和 `PQ Distrib`\
  \ 列。 |\n| `partition` | 控制分区信息的显示，特别是执行计划表中的 `Pstart` 和 `Pstop` 列。 |\n| `peeked_binds`\
  \ | 控制包含窥探到的绑定变量的部分的显示。由于当前 SQL 语句 `EXPLAIN PLAN` 的实现不执行绑定变量窥探，此部分未在之前的示例中显示。 |\n\
  | `predicate` | 控制包含过滤和访问谓词的部分的显示。 |\n| `projection` | 控制包含列投影信息的部分的显示。 |\n| `remote`\
  \ | 控制远程执行的 SQL 语句的显示。 |\n| `rows` | 控制执行计划表中 `Rows` 列的显示。 |\n\n以下查询显示了相同的执行计划，它们展示了基本值\
  \ `basic`, `typical`, 和 `advanced` 之间的主要区别。以下是脚本 `display.sql` 生成的输出摘录：\n\n```\n\
  SQL> SELECT * FROM table(dbms_xplan.display(NULL,NULL,'basic'));\n\nPLAN_TABLE_OUTPUT\n\
  -----------------------------------\n\nPlan hash value: 2966233522\n\n-----------------------------------\n\
  | Id  | Operation         | Name |\n-----------------------------------\n|   0 |\
  \ SELECT STATEMENT  |      |\n|   1 |  SORT AGGREGATE   |      |\n|   2 |   TABLE\
  \ ACCESS FULL| T    |\n-----------------------------------\n\nSQL> SELECT * FROM\
  \ table(dbms_xplan.display(NULL,NULL,'typical'));\nPLAN_TABLE_OUTPUT\n---------------------------------------------------------------------------\n\
  \nPlan hash value: 2966233522\n\n---------------------------------------------------------------------------\n\
  | Id  | Operation         | Name | Rows  | Bytes | Cost (%CPU)| Time     |\n---------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT  |      |     1 |    13 |     5   (0)| 00:00:01 |\n|  \
  \ 1 |  SORT AGGREGATE   |      |     1 |    13 |            |          |\n|*  2\
  \ |   TABLE ACCESS FULL| T    |    14 |   182 |     5   (0)| 00:00:01 |\n---------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \n   2 - filter(\"N\">=6 AND \"N\"<=19)\n\nNote\n-----\n   - dynamic sampling used\
  \ for this statement\n\nSQL> SELECT * FROM table(dbms_xplan.display(NULL,NULL,'advanced'));\n\
  \nPLAN_TABLE_OUTPUT\n---------------------------------------------------------------------------\n\
  \nPlan hash value: 2966233522\n\n---------------------------------------------------------------------------\n\
  | Id  | Operation         | Name | Rows  | Bytes | Cost (%CPU)| Time     |\n---------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT  |      |     1 |    13 |     3   (0)| 00:00:01 |\n|  \
  \ 1 |  SORT AGGREGATE   |      |     1 |    13 |            |          |\n|*  2\
  \ |   TABLE ACCESS FULL| T    |    14 |   182 |     3   (0)| 00:00:01 |\n---------------------------------------------------------------------------\n\
  \nQuery Block Name / Object Alias (identified by operation id):\n-------------------------------------------------------------\n\
  \n   1 - SEL$1\n   2 - SEL$1 / T@SEL$1\n```\n\n\n"
- "# 大纲数据\n\n```sql\n/*+\n      BEGIN_OUTLINE_DATA\n      FULL(@\"SEL$1\" \"T\"@\"\
  SEL$1\")\n      OUTLINE_LEAF(@\"SEL$1\")\n      ALL_ROWS\n      OPTIMIZER_FEATURES_ENABLE('10.2.0.3')\n\
  \      IGNORE_OPTIM_EMBEDDED_HINTS\n      END_OUTLINE_DATA\n  */\n```\n\n## 谓词信息（由操作\
  \ ID 识别）\n\n```text\n   2 - filter(\"N\">=6 AND \"N\"<=19)\n```\n\n## 列投影信息（由操作\
  \ ID 识别）\n\n```text\n   1 - (#keys=0) COUNT(*)[22]\n```\n\n## 注释\n\n```text\n  \
  \ - 此语句使用了动态采样\n```\n\n以下查询展示了如何使用修饰符，从由原始值 `basic` 和 `typical` 生成的默认输出中添加或移除信息。由于它们基于与前面示例相同的查询，您可以比较输出以查看有何不同。以下是脚本\
  \ `display.sql` 生成的输出摘录：\n\n```sql\nSQL> SELECT * FROM table(dbms_xplan.display(NULL,NULL,'basic\
  \ +predicate',NULL));\n```\n\n```text\nPLAN_TABLE_OUTPUT\n---------------------------------------------------\n\
  \nPlan hash value: 2966233522\n\n-----------------------------------\n| Id  | Operation\
  \         | Name |\n-----------------------------------\n|   0 | SELECT STATEMENT\
  \  |      |\n|   1 |  SORT AGGREGATE   |      |\n|*  2 |   TABLE ACCESS FULL| T\
  \    |\n-----------------------------------\n\nPredicate Information (identified\
  \ by operation id):\n---------------------------------------------------\n2 - filter(\"\
  N\">=6 AND \"N\"<=19)\n```\n\n```sql\nSQL> SELECT *\n  2 FROM table(dbms_xplan.display(NULL,NULL,'typical\
  \ -bytes -note',NULL));\n```\n\n```text\nPLAN_TABLE_OUTPUT\n-------------------------------------------------------------------\n\
  \nPlan hash value: 2966233522\n\n-------------------------------------------------------------------\n\
  | Id  | Operation         | Name | Rows  | Cost (%CPU)| Time     |\n-------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT  |      |     1 |     5   (0)| 00:00:01 |\n|   1 |  SORT\
  \ AGGREGATE   |      |     1 |            |          |\n|*  2 |   TABLE ACCESS FULL|\
  \ T    |    14 |     5   (0)| 00:00:01 |\n-------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \n   2 - filter(\"N\">=6 AND \"N\"<=19)\n```\n\n"
- "# 函数 display_cursor\n\n函数 `display_cursor()` 返回存储在库缓存中的执行计划。它从 Oracle Database\
  \ 10*g* 开始可用。与函数 `display()` 一样，其返回值是集合 `dbms_xplan_type_table` 的一个实例。该函数具有以下输入参数：\n\
  \n*   `sql_id` 指定要返回其执行计划的父游标。默认值为 `NULL`。如果使用默认值，则返回当前会话最后执行的 SQL 语句的执行计划。\n* \
  \  `cursor_child_no` 指定子游标号，它与 `sql_id` 共同标识要返回其执行计划的子游标。默认值为 0。如果指定为 `NULL`，则返回由参数\
  \ `sql_id` 标识的父游标的所有子游标。\n*   `format` 指定显示哪些信息。支持与函数 `display()` 的 `format` 参数相同的值。此外，如果执行统计信息可用（换句话说，如果初始化参数\
  \ `statistics_level` 设置为 `all` 或在 SQL 语句中指定了提示 `gather_plan_statistics`），则也支持 表\
  \ 6-4 中描述的修饰符。默认值为 `typical`。\n\n要使用 `display_cursor()` 函数，调用者需要在以下动态性能视图上具有 `SELECT`\
  \ 权限：`v$session`、`v$sql`、`v$sql_plan` 和 `v$sql_plan_statistics_all`。角色 `select_catalog_role`\
  \ 和系统权限 `select any dictionary` 等提供这些权限。\n\n## 表 6-4. 参数 `format` 接受的修饰符\n\n| **值**\
  \ | **描述** |\n| --- | --- |\n| `allstats`* | 这是 `iostats memstats` 的简写。 |\n| `iostats`*\
  \ | 控制 I/O 统计信息的显示。 |\n| `last`* | 默认情况下，显示所有执行的累计统计信息。如果指定了此值，则仅显示最后一次执行的统计信息。\
  \ |\n| `memstats`* | 控制与 PGA 相关的统计信息的显示。 |\n| `runstats_last` | 与 `iostats last`\
  \ 相同。仅在 Oracle Database 10*g* Release 1 中可用。 |\n| `runstats_tot` | 与 `iostats` 相同。仅在\
  \ Oracle Database 10*g* Release 1 中可用。 |\n| \\* 此值仅在 Oracle Database 10*g* Release\
  \ 2 及以上版本中可用*。 |\n\n以下示例展示了一个使用提示 `gather_plan_statistics` 来启用生成执行统计信息的查询。然后，函数\
  \ `display_cursor()` 被指示显示最后一次执行的 I/O 统计信息。请注意，由于没有物理读写操作，因此只显示了逻辑读操作（`Buffers`）。以下是脚本\
  \ `display_cursor.sql` 生成的输出摘录：\n\n```sql\nSQL> SELECT /*+ gather_plan_statistics\
  \ */ count(*)\n  2  FROM t\n  3  WHERE mod(n,19) = 0;\n```\n\n```text\n  COUNT(*)\n\
  ----------\n        52\n```\n\n```sql\nSQL> SELECT * FROM table(dbms_xplan.display_cursor(NULL,NULL,\
  \ 'iostats last'));\n```\n\n```text\nPLAN_TABLE_OUTPUT\n------------------------------------------------------------------------------------\n\
  \nEXPLAINED SQL STATEMENT:\n------------------------\nSELECT /*+ gather_plan_statistics\
  \ */ count(*) FROM t WHERE mod(n,19) = 0\n\nPlan hash value: 2966233522\n\n------------------------------------------------------------------------------------\n\
  | Id | Operation         | Name | Starts | E-Rows | A-Rows |   A-Time   | Buffers\
  \ |\n------------------------------------------------------------------------------------\n\
  |  1 |  SORT AGGREGATE   |      |      1 |      1 |      1 |00:00:00.01 |     147\
  \ |\n|* 2 |   TABLE ACCESS FULL| T    |      1 |     10 |     52 |00:00:00.01 |\
  \     147 |\n------------------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \n   2 - filter(MOD(\"N\",19)=0)\n```\n\n"
- "# 函数 display_awr\n\n函数 `display_awr()` 返回存储在 AWR 中的执行计划。它从 Oracle Database 10*g*\
  \ 开始可用。与函数 `display()` 一样，其返回值是集合 `dbms_xplan_type_table` 的一个实例。该函数具有以下输入参数：\n\n\
  *   `sql_id` 指定要返回其执行计划的父游标。该参数没有默认值。\n*   `plan_hash_value` 指定要返回的执行计划的哈希值。默认值为\
  \ `NULL`。如果使用默认值，则返回与参数 `sql_id` 标识的父游标相关的所有执行计划。\n*   `db_id` 指定在哪个数据库上执行要返回的执行计划。默认值为\
  \ `NULL`。如果使用默认值，则使用当前数据库。\n*   `format` 指定显示哪些信息。支持与函数 `display()` 的 `format` 参数相同的值。默认值为\
  \ `typical`。\n\n要使用函数 `display_awr()`，调用者至少需要在以下数据字典视图上具有 `SELECT` 权限：`dba_hist_sql_plan`\
  \ 和 `dba_hist_sqltext`。如果未指定参数 `db_id`，则还需要在视图 `v$database` 上具有 `SELECT` 权限。角色 `select_catalog_role`\
  \ 等提供这些权限。\n\n以下查询展示了参数 `plan_hash_value` 在给定游标存在多个执行计划时的用处。请注意，第一个查询返回两个执行计划，而第二个查询仅返回一个。以下是脚本\
  \ `display_awr.sql` 生成的输出摘录：\n\n```\nSQL> SELECT *\n  2  FROM table(dbms_xplan.display_awr('48vuyqjwpf9wg',NULL,NULL,'basic'));\n\
  \nPLAN_TABLE_OUTPUT\n--------------------------------------\n\nSQL_ID 48vuyqjwpf9wg\n\
  --------------------\nSELECT COUNT(N) FROM T\n\nPlan hash value: 2966233522\n-----------------------------------\n\
  | Id  | Operation         | Name |\n-----------------------------------\n|   0 |\
  \ SELECT STATEMENT  |      |\n|   1 |  SORT AGGREGATE   |      |\n|   2 |   TABLE\
  \ ACCESS FULL| T    |\n-----------------------------------\n\nSQL_ID 48vuyqjwpf9wg\n\
  --------------------\nSELECT COUNT(N) FROM T\n\nPlan hash value: 3776247601\n\n\
  --------------------------------------\n| Id  | Operation             | Name |\n\
  --------------------------------------\n|   0 | SELECT STATEMENT      |      |\n\
  |   1 |  SORT AGGREGATE       |      |\n|   2 |   INDEX FAST FULL SCAN| I    |\n\
  --------------------------------------\n\nSQL> SELECT *\n  2  FROM table(dbms_xplan.display_awr('48vuyqjwpf9wg',2966233522,NULL,'basic'));\n\
  \nPLAN_TABLE_OUTPUT\n-----------------------------------\n\nSQL_ID 48vuyqjwpf9wg\n\
  --------------------\nSELECT COUNT(N) FROM T\n\nPlan hash value: 2966233522\n\n\
  -----------------------------------\n| Id  | Operation         | Name |\n-----------------------------------\n\
  |   0 | SELECT STATEMENT  |      |\n|   1 |  SORT AGGREGATE   |      |\n|   2 |\
  \   TABLE ACCESS FULL| T    |\n-----------------------------------\n```\n\n多种情况会导致给定游标出现多个执行计划，例如添加了索引，或者仅仅是因为数据（及其对象统计信息）发生了变化。基本上，每当查询优化器所处的环境发生变化时，就可能生成不同的执行计划。当您质疑一条您认为已稳定运行一段时间的\
  \ SQL 语句的性能时，这样的输出非常有用。其思路是检查一条 SQL 语句在一段时间内是否使用了多个执行计划来执行。如果是这种情况，则根据可用信息推断可能导致变化的原因。\n\
  \n### 解读执行计划\n\n我一直感到惊讶的是，关于如何解读执行计划的文档如此之少，尤其是考虑到似乎有那么多人无法正确地解读它们。我将尝试通过描述我在解读执行计划时所采用的方法来解决这个问题。请注意，此处不提供有关不同操作的细节；相反，我提供理解如何解读执行计划所需的基础知识。关于最常见操作的详细信息，我将在第\
  \ 4 部分中给出。以下各节提供的所有示例都是脚本 `execution_plans.sql` 生成的输出摘录。\n\n#### 父子关系\n\n执行计划是一个树形结构，它不仅描述了\
  \ SQL 引擎执行操作的顺序，还描述了操作之间的关系。树中的每个节点都是一个操作，例如表访问、连接或排序。操作（节点）之间存在父子关系。理解这些关系对于正确解读执行计划至关重要。父子关系遵循以下规则：\n\
  \n*   一个父节点有一个或多个子节点。\n*   一个子节点只有一个父节点。\n*   唯一没有父节点的操作是树的根节点。\n*   当显示执行计划时，子节点相对于其父节点向右缩进。根据显示执行计划的方法不同，缩进可能是一个空格、两个空格或其他形式。这并不重要。关键在于，特定父节点的所有子节点都具有完全相同的缩进。\n\
  *   父节点位于其子节点之前（父节点的 ID 小于子节点的 ID）。如果子节点前面有多个具有相同缩进的操作，则最近的操作是父节点。\n\n以下是一个执行计划示例。请注意，虽然只有\
  \ `Operation` 列是解读执行计划所必需的，但此处显示了 `Id` 列以帮助您更轻松地识别操作。生成此计划的 SQL 语句被故意省略，因为它不服务于本节的目的。\n\
  \n```\n---------------------------------------\n| Id  | Operation              \
  \       |\n---------------------------------------\n|   1 |  UPDATE            \
  \           |\n|   2 |   NESTED LOOPS                |\n|*  3 |    TABLE ACCESS\
  \ FULL          |\n|*  4 |    INDEX UNIQUE SCAN          |\n|   5 |   SORT AGGREGATE\
  \              |\n|   6 |    TABLE ACCESS BY INDEX ROWID|\n|*  7 |     INDEX RANGE\
  \ SCAN          |\n|   8 |   TABLE ACCESS BY INDEX ROWID |\n|*  9 |    INDEX UNIQUE\
  \ SCAN          |\n---------------------------------------\n```\n\n图 6-2 提供了该执行计划的图形化表示。使用前面描述的规则，您可以得出以下结论。\n\
  \n*   操作 1 是树的根节点。它有三个子节点：2、5 和 8。\n*   操作 2 有两个子节点：3 和 4。\n*   操作 3 和 4 没有子节点。\n\
  *   操作 5 有一个子节点：6。\n*   操作 6 有一个子节点：7。\n*   操作 7 没有子节点。\n*   操作 8 有一个子节点：9。\n* \
  \  操作 9 没有子节点。\n\n![image](img/0602.jpg)\n\n**图 6-2.** 执行计划操作之间的父子关系\n\n#### 操作类型\n\
  \n可能的操作数量很多（大约 200 个）。当然，要完全理解一个执行计划，您应该知道构成它的每个操作的作用。为了实现我们解读执行计划的目的，您只需要考虑三种主要的操作类型：`stand-alone\
  \ operations`（独立操作）、`unrelated-combine operations`（非关联组合操作）和 `related-combine operations`（关联组合操作）。基本上，每种类型都有特定的行为，了解它对于解读执行计划来说就足够了。\n\
  \n* * *\n\n**注意** 这里使用的三种操作类型的术语是我在几年前撰写关于查询优化器的演示文稿时创造的。不要期望在其他地方找到这些术语。\n\n* *\
  \ *\n\n除了这三种类型，操作还可以分为阻塞操作和非阻塞操作。简单地说，阻塞操作批量处理数据，而非阻塞操作逐行处理数据。例如，排序操作是阻塞的，因为它只有在所有输入行都完全处理（排序）完毕后才能返回输出行——第一个输出行可能位于输入集中的任何位置。另一方面，应用简单限制的过滤器是非阻塞的，因为它独立评估每一行。不言而喻，对于阻塞操作，数据必须在内存（PGA）或磁盘（临时表空间）中进行缓冲。为简单起见，在解读执行计划时，您可以认为所有操作都是阻塞的。然而，请记住，大多数操作实际上是非阻塞的，并且出于显而易见的原因，SQL\
  \ 引擎会尽可能避免数据缓冲。\n\n\n##### 独立操作\n\n我将所有最多只有一个子节点的操作称为 `独立操作`。大多数操作都属于此类。这使得执行计划的解读更为容易，因为不属于此类型的操作少于\
  \ 20 个。管理独立操作运作的规则如下：\n\n*   子节点在它们的父节点之前执行。然而，本章稍后介绍的两种优化技术会导致此规则的例外情况。\n*   每个子节点最多执行一次。\n\
  *   每个子节点为其父节点提供数据。\n\n以下是一个查询及其执行计划的示例（图 6-3 以图形方式展示了其父子关系）：\n\n```\nSELECT deptno,\
  \ count(*) FROM emp WHERE job = 'CLERK' AND sal < 1200 GROUP BY deptno\n```\n\n\
  ```\n--------------------------------------------------------------------\n| Id\
  \  | Operation                    | Name      | Starts | A-Rows |\n--------------------------------------------------------------------\n\
  |   1 |  HASH GROUP BY               |           |      1 |      2 |\n|*  2 |  \
  \ TABLE ACCESS BY INDEX ROWID| EMP       |      1 |      3 |\n|*  3 |    INDEX RANGE\
  \ SCAN          | EMP_JOB_I |      1 |      4 |\n--------------------------------------------------------------------\n\
  \   2 - filter(\"SAL\"<1200)\n   3 - access(\"JOB\"='CLERK')\n```\n\n![image](img/0603.jpg)\n\
  \n**图 6-3.** `独立操作`之间的父子关系\n\n此执行计划仅由 `独立操作` 组成。通过应用前面描述的规则，你可以发现执行计划按以下方式执行操作：\n\
  \n1.  操作 1 和 2 各有一个子节点（分别为 2 和 3）；因此它们不可能是最先执行的操作。所以，执行从操作 3 开始。\n2.  操作 3 通过应用访问谓词\
  \ `\"JOB\"='CLERK'` 来扫描索引 `emp_job_i`。在此过程中，它从索引中提取了四个 rowid（此信息在 `A-Rows` 列中给出）并将其传递给它的父操作（操作\
  \ 2）。\n3.  操作 2 通过操作 3 传递的四个 rowid 访问表 `emp`。对于每个 rowid，读取一行。然后，它应用过滤谓词 `\"SAL\"\
  <1200`。这个过滤导致一行被排除。剩余三行的数据被传递给它的父操作（操作 1）。\n4.  操作 1 对从操作 2 传递过来的行执行 `GROUP BY`\
  \ 操作。结果集被缩减为两行。由于这是最后一个操作，数据被发送给调用者。\n\n请注意 `Starts` 列清楚地显示每个操作只执行一次。其中一条规则规定子操作在父操作之前执行。这通常是正确的，但在某些情况下会引入智能优化。可能发生的情况是，父操作判断完全执行子操作没有意义，甚至判断执行子操作完全没有意义。换句话说，父操作控制子操作的执行。让我们看两个常见案例。\n\
  \n#### `COUNT STOPKEY` 操作的优化\n\n`COUNT STOPKEY` 操作通常用于执行 top-n 查询。它的目标是，一旦所需的行数已返回给调用者，就停止处理。例如，以下查询的目标是仅返回在表\
  \ `emp` 中找到的前十行：\n\n```\nSELECT * FROM emp WHERE rownum <= 10\n```\n\n```\n-----------------------------------------------------\n\
  | Id  | Operation          | Name | Starts | A-Rows |\n-----------------------------------------------------\n\
  |*  1 |  COUNT STOPKEY     |      |      1 |     10 |\n|   2 |   TABLE ACCESS FULL|\
  \ EMP  |      1 |     10 |\n-----------------------------------------------------\n\
  \   1 - filter(ROWNUM<=10)\n```\n\n这个执行计划中需要注意的重要一点是，操作 2 返回的行数被限制为十行。即使操作 2 是对一个包含超过十行（实际上该表包含\
  \ 14 行）的表的全表扫描，情况也是如此。发生的情况是，操作 1 在必要数量的行被处理后立即停止了操作 2 的处理。不过，要小心，因为非阻塞操作无法被停止。事实上，它们需要在将行返回给父操作之前被完全处理。例如，在以下查询中，由于\
  \ `ORDER BY` 子句，表 `emp` 的所有行都被读取：\n\n```\nSELECT * FROM (SELECT * FROM emp ORDER\
  \ BY sal DESC) WHERE rownum <= 10\n```\n\n```\n----------------------------------------------------------\n\
  | Id  | Operation               | Name | Starts | A-Rows |\n----------------------------------------------------------\n\
  |*  1 |  COUNT STOPKEY          |      |      1 |     10 |\n|   2 |   VIEW     \
  \             |      |      1 |     10 |\n|*  3 |    SORT ORDER BY STOPKEY|    \
  \  |      1 |     10 |\n|   4 |     TABLE ACCESS FULL   | EMP  |      1 |     14\
  \ |\n----------------------------------------------------------\n```\n\n#### `FILTER`\
  \ 操作的优化\n\n`FILTER` 操作不仅在其子节点向其传递数据时应用过滤器，而且它还可能决定完全避免执行某个子节点以及所有依赖操作（孙节点等）。例如，在以下查询中存在一个永远不可能为\
  \ `TRUE` 的谓词。在实践中，当应用程序动态生成部分 SQL 语句时，会发现此类谓词。通常，它们的目标是在特定情况下完全停用部分 SQL 语句。\n\n\
  ```\nSELECT * FROM emp WHERE job = 'CLERK' AND 1 = 2\n```\n\n```\n--------------------------------------------------------------------\n\
  | Id  | Operation                    | Name      | Starts | A-Rows |\n--------------------------------------------------------------------\n\
  |*  1 |  FILTER                      |           |      1 |      0 |\n|   2 |  \
  \ TABLE ACCESS BY INDEX ROWID| EMP       |      0 |      0 |\n|*  3 |    INDEX RANGE\
  \ SCAN          | EMP_JOB_I |      0 |      0 |\n--------------------------------------------------------------------\n\
  1 - filter(NULL IS NOT NULL)\n  3 - access(\"JOB\"='CLERK')\n```\n\n根据前面描述的规则，这样的执行计划应该从处理操作\
  \ 3 开始执行。实际上，查看 `Starts` 列可以告诉你只有操作 1 被执行了。这种优化简单地避免了处理操作 2 和 3，因为无论如何数据都没有机会通过操作\
  \ 1 应用的过滤器。\n\n\n\n## 无关联组合操作\n\n我将所有拥有多个子操作且这些子操作被独立执行的操作称为**无关联组合操作**。以下操作属于此类型：`AND-EQUAL`、`BITMAP\
  \ AND`、`BITMAP OR`、`BITMAP MINUS`、`CONCATENATION`、`CONNECT BY WITHOUT FILTERING`、`HASH\
  \ JOIN`、`INTERSECTION`、`MERGE JOIN`、`MINUS`、`MULTI-TABLE INSERT`、`SQL MODEL`、`TEMP\
  \ TABLE TRANSFORMATION` 和 `UNION-ALL`。\n\n无关联组合操作的特点如下：\n\n- 子操作在父操作之前执行。\n- 子操作按顺序执行，从\
  \ ID 最小的操作开始，到 ID 最大的操作结束。在开始处理下一个子操作之前，必须完全执行完当前子操作。\n- 每个子操作最多执行一次，并且独立于所有其他子操作。\n\
  - 每个子操作都向其父操作提供数据。\n\n以下是一个查询示例及其执行计划（其父子关系的图形化表示见 图 6-4）：\n\n```sql\nSELECT ename\
  \ FROM emp\nUNION ALL\nSELECT dname FROM dept\nUNION ALL\nSELECT '%' FROM dual\n\
  ```\n\n```\n---------------------------------------------------------\n|  Id  |\
  \ Operation         |  Name  |  Starts | A-Rows  |\n---------------------------------------------------------\n\
  |   1  | UNION-ALL         |        |       1 |      19 |\n|   2  |  TABLE ACCESS\
  \ FULL|  EMP   |       1 |      14 |\n|   3  |  TABLE ACCESS FULL|  DEPT  |    \
  \   1 |       4 |\n|   4  |  FAST DUAL        |        |       1 |       1 |\n---------------------------------------------------------\n\
  ```\n\n![image](img/0604.jpg)\n\n**图 6-4.** `无关联组合操作 UNION-ALL 的父子关系`\n\n在这个执行计划中，无关联组合操作是\
  \ `UNION-ALL`。其他三个是独立操作。通过应用上述规则，你可以看到执行计划按如下方式执行操作：\n\n1. 操作 1 有三个子操作，其中操作 2 按升序排列第一。因此，执行从操作\
  \ 2 开始。\n2. 操作 2 扫描 `emp` 表，并返回 14 行数据给其父操作（操作 1）。\n3. 当操作 2 完全执行完毕后，操作 3 开始执行。\n\
  4. 操作 3 扫描 `dept` 表，并返回 4 行数据给其父操作（操作 1）。\n5. 当操作 3 完全执行完毕后，操作 4 开始执行。\n6. 操作 4\
  \ 扫描 `dual` 表，并返回 1 行数据给其父操作（操作 1）。\n7. 操作 1 基于从其所有子操作接收到的数据，构建一个包含 19 行的单一结果集，并将数据发送给调用者。\n\
  \n请注意 `Starts` 列清楚地显示了每个操作仅执行一次。对于执行计划的遍历，前面列出的所有其他操作都具有与此示例中显示的 `UNION-ALL` 操作相同的行为。简而言之，一个无关联组合操作会按顺序执行其每个子操作一次。显然，无关联组合操作本身执行的处理是不同的。\n\
  \n## 有关联组合操作\n\n我将所有拥有多个子操作，且其中一个子操作控制所有其他子操作执行的操作称为**有关联组合操作**。以下操作属于此类型：`NESTED\
  \ LOOPS`、`UPDATE`、`FILTER`、`CONNECT BY WITH FILTERING` 和 `BITMAP KEY ITERATION`。\n\
  \n有关联组合操作的特点如下：\n\n- 子操作在父操作之前执行。\n- ID 最小的子操作控制其他子操作的执行。\n- 子操作从 ID 最小的执行到 ID 最大的。然而，与无关联组合操作相反，它们不是按顺序执行的，而是以一种交织的方式进行。\n\
  - 只有第一个子操作最多执行一次。所有其他子操作可能被执行多次，或根本不执行。\n- 并非每个子操作都向其父操作提供数据。有些子操作仅用于应用限制条件。\n\n\
  即使此类操作共享相同的特点，但每个操作在某种程度上都有其自身的行为。那么，让我们来看一下除 `BITMAP KEY ITERATION`（将在 第 10 章 中介绍）之外，每种操作的一个示例。\n\
  \n### 操作 NESTED LOOPS\n\n此操作用于连接两组行。因此，它总是有两个子操作，不多不少。ID 最小的子操作称为 `外循环` 或 `驱动行源`。第二个子操作称为\
  \ `内循环`。此操作的特定之处在于，对于外循环返回的每一行，内循环都会执行一次。\n\n以下是一个查询示例及其执行计划（其父子关系的图形化表示见 图 6-5）：\n\
  \n```sql\nSELECT *\nFROM emp, dept\nWHERE emp.deptno = dept.deptno\nAND emp.comm\
  \ IS NULL\nAND dept.dname != 'SALES'\n```\n\n```\n------------------------------------------------------------------\n\
  | Id  | Operation                    | Name    | Starts | A-Rows |\n------------------------------------------------------------------\n\
  |   1 |  NESTED LOOPS                |         |      1 |      8 |\n|*  2 |   TABLE\
  \ ACCESS FULL          | EMP     |      1 |     10 |\n|*  3 |   TABLE ACCESS BY\
  \ INDEX ROWID| DEPT    |     10 |      8 |\n|*  4 |    INDEX UNIQUE SCAN       \
  \  | DEPT_PK |     10 |     10 |\n------------------------------------------------------------------\n\
  \n   2 - filter(\"EMP\".\"COMM\" IS NULL)\n   3 - filter(\"DEPT\".\"DNAME\"<>'SALES')\n\
  \   4 – access(\"EMP\".\"DEPTNO\"=\"DEPT\".\"DEPTNO\")\n```\n\n![image](img/0605.jpg)\n\
  \n**图 6-5.** `有关联组合操作 NESTED LOOPS 的父子关系`\n\n在这个执行计划中，有关联组合操作 `NESTED LOOPS` 的两个子操作都是独立操作。通过应用上述规则，你可以看到执行计划按如下方式执行操作：\n\
  \n\n\n"
- '# 操作


  1.  操作 1 有两个子操作（2 和 3），其中操作 2 按升序排列是第一个。因此，执行从操作 2（外部循环）开始。

  2.  操作 2 扫描表 `emp`，应用过滤谓词 `"EMP"."COMM" IS NULL`，并向其父操作（1）返回 10 行数据。

  3.  对于操作 2 返回的每一行，操作 `NESTED LOOPS` 的第二个子操作（内部循环）执行一次。这通过比较操作 2 的 `A-Rows` 列与操作
  3 和 4 的 `Starts` 列得到确认。

  4.  内部循环由两个独立的操作组成。根据适用于此类操作的规则，操作 4 在操作 3 之前执行。

  5.  操作 4 通过应用访问谓词 `"EMP"."DEPTNO"= "DEPT"."DEPTNO"` 来扫描索引 `dept_pk`。在此过程中，它在十次执行中从索引中提取了十个
  rowid 并将其传递给其父操作（3）。

  6.  操作 3 通过从操作 4 传递过来的十个 rowid 访问表 `dept`。对于每个 rowid，读取一行。然后它应用过滤谓词 `"DEPT"."DNAME"<>''SALES''`。此过滤导致排除了两行。它将剩余八行的数据传递给其父操作（1）。

  7.  操作 1 将八行数据发送给调用者。


