  \ tim=1156387084610301\nWAIT #1: nam='db file sequential read' ela= 2962 file#=4\
  \ block#=219 blocks=1 obj#=10294 tim=1156387084613517\n...\n...\nWAIT #2: nam='SQL*Net\
  \ message from client' ela= 978 driver id=1413697536#bytes=1 p3=0 obj#=10320 tim=1156387086475763\n\
  STAT #1 id=1 cnt=16348 pid=0 pos=1 obj=0 op='HASH GROUP BY (cr=1720 pr=2588 pw=941\
  \ time=1830257 us)'\nSTAT #1 id=2 cnt=540328 pid=1 pos=1 obj=0 op='PARTITION RANGE\
  \ ALL PARTITION: 1 28 (cr=1720 pr=1647 pw=0 time=1129471 us)'\nSTAT #1 id=3 cnt=540328\
  \ pid=2 pos=1 obj=10292 op='TABLE ACCESS FULL SALES PARTITION: 1 28 (cr=1720 pr=1647\
  \ pw=0 time=635959 us)'\nWAIT #0: nam='SQL*Net message to client' ela= 1 driver\
  \ id=1413697536#bytes=1 p3=0 obj#=10320 tim=1156387086475975\n```\n\n## 跟踪文件中的关键标记\n\
  \n在此摘录中，一些描述所提供信息类型的标记以粗体显示：\n\n*   `PARSING IN CURSOR` 和 `END OF STMT` 围绕着 SQL\
  \ 语句的文本。\n*   `PARSE`、`EXEC` 和 `FETCH` 分别代表解析、执行和获取调用。\n*   `BINDS` 表示绑定变量的定义和值。\n\
  *   `WAIT` 表示处理过程中发生的等待事件。\n*   `STAT` 表示发生的执行计划和相关的统计信息。\n\n您可以在 MetaLink 注释 **Interpreting\
  \ Raw SQL_TRACE and DBMS_SUPPORT.START_TRACE output** (39817.1) 中找到跟踪文件格式的简短描述。如果您对此主题的详细描述和讨论感兴趣，Millsap/Holt\
  \ 的书 **Optimizing Oracle Performance** (O'Reilly, 2003) 值得一读。\n\n## SQL 跟踪的内部机制与调试事件\n\
  \n在内部，SQL 跟踪基于调试事件 10046。表 3-2 描述了支持的级别，这些级别定义了跟踪文件中提供信息的数量。当 SQL 跟踪在高于 1 的级别使用时，它也被称为\
  \ **扩展 SQL 跟踪**。\n\n**表 3-2. 调试事件 10046 的级别**\n\n| 级别 | 描述 |\n| --- | --- |\n| 0\
  \ | 调试事件被禁用。 |\n| 1 | 启用调试事件。对于每个处理的数据库调用，提供以下信息：SQL 语句、响应时间、服务时间、处理的行数、逻辑读次数、物理读和写次数、执行计划以及少量额外信息。\
  \ |\n| 4 | 与级别 1 相同，包含关于绑定变量的附加信息。主要是每个执行使用的数据类型、其精度和值。 |\n| 8 | 与级别 1 相同，加上关于等待时间的详细信息。对于处理过程中经历的每个等待，提供以下信息：等待事件的名称、持续时间和一些标识所等待资源的附加参数。\
  \ |\n| 12 | 同时是级别 4 和级别 8。 |\n\n接下来的章节将描述如何启用和禁用 SQL 跟踪，如何配置环境以获得最佳优势，以及如何找到它生成的跟踪文件。\n\
  \n## 调试事件\n\n调试事件由数字标识，是用于在运行的数据库引擎进程中设置一种标志的方式。其目的是改变其行为，例如，通过启用或禁用某个功能、通过测试或模拟损坏或崩溃，或通过收集跟踪或调试信息。一些调试事件不是简单的标志，可以在多个级别启用。每个级别都有其自己的行为。在某些情况下，级别是块或内存结构的地址。\n\
  \n您应谨慎使用调试事件，并且仅在 Oracle 支持人员指示或您知道并理解调试事件将要更改什么时才设置它。调试事件会启用特定的代码路径。因此，如果在设置调试事件时出现问题，值得检查在不设置调试事件的情况下是否可以重现相同的问题。\n\
  \nOracle 文档中记录的调试事件很少。如果存在文档，通常通过 MetaLink 注释提供。换句话说，调试事件通常不会在关于数据库引擎的官方 Oracle\
  \ 文档中描述。您可以在文件 `` `$ORACLE_HOME/rdbms/mesg/oraus.msg` `` 中找到可用调试事件的完整列表。请注意，此文件并非在所有平台上都分发。从\
  \ 10000 到 10999 的范围保留给调试事件。\n\n## 传统方式启用 SQL 跟踪\n\n直到 Oracle9*i*，文档（特别是 **Database\
  \ Performance Tuning Guide and Reference** 手册）描述了三种启用 SQL 跟踪的方法：初始化参数 `sql_trace`、包\
  \ `dbms_session` 中的过程 `set_sql_trace` 以及包 `dbms_system` 中的过程 `set_sql_trace_in_session`。关于这三种方法需要注意的重要一点是，它们都只能在级别\
  \ 1 启用 SQL 跟踪。不幸的是，这在实践中是不够的。事实上，在大多数情况下，您需要完全分解响应时间以了解瓶颈在哪里。因此，我不会在这里描述这三种方法。相反，我将介绍其他未文档化⁵的方法，用于在任何级别启用\
  \ SQL 跟踪。请注意，从 Oracle Database 10*g* 开始，引入了一种有文档记录且官方支持的启用和禁用 SQL 跟踪的方法。因此，从 Oracle\
  \ Database 10*g* 开始，不再需要使用本节中描述的方法。但是，如果您使用的是早期版本，您可以放心地利用这些方法，因为它们多年来已被成功使用。\n\n\
  要在任何级别启用和禁用 SQL 跟踪，有两种主要方法。要么通过执行 SQL 语句 `ALTER SESSION` 来设置参数 `events`，要么调用包 `dbms_system`\
  \ 中的过程 `set_ev`。前者显然只能为执行它的会话启用 SQL 跟踪，而后者能够通过会话 ID 和序列号在任何会话中启用 SQL 跟踪。以下是一些使用示例。\n\
  \n以下 SQL 语句为执行它的会话在级别 12 启用 SQL 跟踪。注意事件号和级别是如何指定的。\n\n```sql\nALTER SESSION SET\
  \ events '10046 trace name context forever, level 12'\n```\n\n以下 SQL 语句为执行它的会话禁用\
  \ SQL 跟踪。注意，这是通过指定级别 0 来实现的。\n\n```sql\nALTER SESSION SET events '10046 trace name\
  \ context off'\n```\n\n以下 PL/SQL 调用为 ID 为 127、序列号为 29 的会话在级别 12 启用 SQL 跟踪。没有参数具有默认值。因此，最后一个参数，即使在此情况下不相关，也必须指定。\n\
  \n```sql\ndbms_system.set_ev(si => 127,    -- session id\n                   se\
  \ => 29,     -- serial number\n                   ev => 10046,  -- event number\n\
  \                   le => 12,     -- level\n                   nm => NULL)\n```\n\
  \n\n以下 PL/SQL 调用为 ID 为 127、序列号为 29 的会话禁用 SQL 跟踪。请注意，与之前的情况相比，仅指定了跟踪级别的参数值发生了变化。\n\
  \n```\ndbms_system.set_ev(si => 127,    -- 会话 ID\n                   se => 29, \
  \    -- 序列号\n                   ev => 10046,  -- 事件号\n                   le => 0,\
  \      -- 级别\n                   nm => NULL)\n```\n\n你可以通过执行以下查询，列出连接到实例的每个用户的会话\
  \ ID 和序列号：\n\n```\nSELECT sid, serial#, username, machine\nFROM v$session\nWHERE\
  \ type != 'BACKGROUND'\n```\n\n你也可以通过执行 SQL 语句 `ALTER SYSTEM` 来设置初始化参数 `events`。其语法与\
  \ SQL 语句 `ALTER SESSION` 相同。无论如何，在实例级别启用 SQL 跟踪通常没有意义。另外请注意，它仅对执行后创建的会话生效。\n\n默认情况下，只有用户\
  \ `sys` 可以执行包 `dbms_system`。如果需要将该执行权限提供给其他用户，请务必小心，因为该包包含其他过程，而且过程 `set_ev` 本身也可用于设置其他事件。如果你确实需要为其他用户提供在任何会话中启用和禁用\
  \ SQL 跟踪的能力，建议使用另一个专门包含用于启用和禁用 SQL 跟踪所需过程的包。Oracle 提供了这样一个包 `dbms_support`，但默认不安装。你应该注意到，它仅在\
  \ MetaLink 注释 *The DBMS_SUPPORT Package* (62294.1) 和 *Tracing Sessions in Oracle\
  \ Using the DBMS_SUPPORT Package* (62160.1) 中有文档说明，并且不受官方支持。以下是一些示例。\n\n要安装包 `dbms_support`，为其创建一个公共同义词，并授予角色\
  \ `dba` 执行它的权限。你可以使用以下命令：\n\n```\nCONNECT / as sysdba\n@?/rdbms/admin/dbmssupp.sql\n\
  CREATE PUBLIC SYNONYM dbms_support FOR dbms_support;\nGRANT EXECUTE ON dbms_support\
  \ TO dbma;\n```\n\n从 Oracle Database 10*g* 开始，确实不应再使用此包。你应该转而使用下一节中解释的技术。不过，如果你在启用\
  \ PL/SQL 警告的情况下安装它（例如，通过将初始化参数 `plsql_warnings` 设置为 `enable:all`），则在创建包主体时会生成以下警告。你可以简单地忽略它。\n\
  \n```\nPLW-05005: 函数 CURRENT_SERIAL 在第 29 行返回时没有值\n```\n\n以下 PL/SQL 调用为 ID 为 127、序列号为\
  \ 29 的会话在级别 8 启用 SQL 跟踪。请注意，你无需指定要启用 SQL 跟踪的级别，而是通过第三和第四个参数分别指定是否需要等待事件和绑定变量。虽然前两个参数没有默认值，但参数\
  \ `waits` 默认为 `TRUE`，参数 `binds` 默认为 `FALSE`。\n\n```\ndbms_support.start_trace_in_session(sid\
  \     => 127,\n                                    serial  => 29,\n            \
  \                        waits   => TRUE,\n                                    binds\
  \   => FALSE)\n```\n\n以下 PL/SQL 调用为 ID 为 127、序列号为 29 的会话禁用 SQL 跟踪。两个参数均没有默认值。\n\n\
  ```\ndbms_support.stop_trace_in_session(sid    => 127,\n                       \
  \            serial => 29)\n```\n\n`启用 SQL 跟踪：现代方法`\n\n从 Oracle Database 10*g* 开始，提供了包\
  \ `dbms_monitor` 用于启用和禁用 SQL 跟踪。有了这个包，你不仅终于有了一个官方的方式来充分利用 SQL 跟踪，更重要的是，你可以基于会话属性（参见\"\
  数据库调用\"部分）来启用和禁用 SQL 跟踪：客户端标识符、服务名、模块名和操作名。这意味着，如果应用程序被正确地插桩，你可以独立于用于执行数据库调用的会话来启用和禁用\
  \ SQL 跟踪。如今，这尤其有用，因为在许多情况下会使用连接池，因此用户并不绑定于特定的会话。\n\n以下是使用包 `dbms_monitor` 在会话、客户端、组件和数据库级别启用和禁用\
  \ SQL 跟踪的一些示例。请注意，默认情况下，只有启用了 `dba` 角色的用户才允许执行包 `dbms_monitor` 提供的过程。\n\n`会话级别`\n\
  \n要为会话启用和禁用 SQL 跟踪，包 `dbms_monitor` 分别提供了过程 `session_trace_enable` 和 `session_trace_disable`。\n\
  \n以下 PL/SQL 调用为 ID 为 127、序列号为 29 的会话在级别 8 启用 SQL 跟踪。所有参数都有默认值。如果未指定标识会话的两个参数，则将为执行\
  \ PL/SQL 调用的会话启用 SQL 跟踪。参数 `waits` 默认为 `TRUE`，参数 `binds` 默认为 `FALSE`。\n\n```\ndbms_monitor.session_trace_enable(session_id\
  \  => 127,\n                                  serial_num  => 29,\n             \
  \                     waits       => TRUE,\n                                  binds\
  \       => FALSE)\n```\n\n从 Oracle Database 10*g* Release 2 开始，当使用过程 `session_trace_enable`\
  \ 启用 SQL 跟踪时，视图 `v$session` 的列 `sql_trace`、`sql_trace_waits` 和 `sql_trace_binds`\
  \ 会相应地设置。警告：这仅在使用过程 `session_trace_enable` 并且被跟踪的会话至少执行了一条 SQL 语句时才会发生。例如，使用前面的\
  \ PL/SQL 调用启用 SQL 跟跟踪将导致给出以下信息：\n\n```\nSQL> SELECT sql_trace, sql_trace_waits,\
  \ sql_trace_binds\n  2  FROM v$session\n  3  WHERE sid = 127;\n\nSQL_TRACE     \
  \  SQL_TRACE_WAITS SQL_TRACE_BINDS\n--------------- --------------- ---------------\n\
  ENABLED         TRUE            FALSE\n```\n\n以下 PL/SQL 调用为 ID 为 127、序列号为 29 的会话禁用\
  \ SQL 跟踪。请注意，两个参数均有默认值。如果未指定，则将为执行 PL/SQL 调用的会话禁用 SQL 跟踪。\n\n```\ndbms_monitor.session_trace_disable(session_id\
  \ => 127,\n                                   serial_num => 29)\n```\n\n请注意，如果使用了真正应用集群，则必须在会话所在的实例上执行过程\
  \ `session_trace_enable` 和 `session_trace_disable`。\n\n`客户端级别`\n\n要为客户端启用和禁用 SQL\
  \ 跟踪，包 `dbms_monitor` 分别提供了过程 `client_id_trace_enable` 和 `client_id_trace_disable`。当然，这些过程仅在设置了会话属性客户端标识符时才能使用。\n\
  \n以下 PL/SQL 调用为所有具有作为参数指定的客户端标识符的会话在级别 8 启用 SQL 跟踪。参数 `client_id` 没有默认值，而参数 `waits`\
  \ 默认为 `TRUE`，参数 `binds` 默认为 `FALSE`。请注意，因为参数 `client_id` 是区分大小写的。\n\n```\ndbms_monitor.client_id_trace_enable(client_id\
  \ => 'helicon.antognini.ch',\n                                    waits     => TRUE,\n\
  \                                    binds     => FALSE)\n```\n\n\n"
- "# Oracle SQL 跟踪的启用与禁用\n\n## 客户端级别\n\n视图 `dba_enabled_traces` 显示了为哪个客户端标识符启用了 SQL\
  \ 跟踪，以及通过过程 `client_id_trace_enable` 启用它时使用的参数。例如，在通过之前的 PL/SQL 调用启用 SQL 跟踪后，会得到以下信息：\n\
  \n```sql\nSQL> SELECT primary_id AS client_id, waits, binds\n  2  FROM dba_enabled_traces\n\
  \  3  WHERE trace_type = 'CLIENT_ID';\n\nCLIENT_ID             WAITS BINDS\n---------------------\
  \ ----- -----\nhelicon.antognini.ch  TRUE  FALSE\n```\n\n以下 PL/SQL 调用会为所有具有指定客户端标识符的会话禁用\
  \ SQL 跟踪。参数 `client_id` 没有默认值。\n\n```sql\ndbms_monitor.client_id_trace_disable(client_id\
  \ => 'helicon.antognini.ch')\n```\n\n## 组件级别\n\n要为通过服务名、模块名和操作名指定的组件启用和禁用 SQL 跟踪，包\
  \ `dbms_monitor` 分别提供了过程 `serv_mod_act_trace_enable` 和 `serv_mod_act_trace_disable`。为了充分利用这些过程，您必须设置会话属性、模块名和操作名。\n\
  \n以下 PL/SQL 调用在级别 8 为所有使用指定属性的会话启用 SQL 跟踪。唯一没有默认值的参数是第一个：`service_name`。[⁶] 参数 `module_name`\
  \ 和 `action_name` 的默认值分别是 `any_module` 和 `any_action`。对于两者，`NULL` 都是有效值。如果指定了参数\
  \ `action_name`，则也必须指定参数 `module_name`。否则将引发 ORA-13859 错误。参数 `waits` 默认为 `TRUE`，参数\
  \ `binds` 默认为 `FALSE`。如果使用 Real Application Clusters，可以通过参数 `instance_name` 将跟踪限制在单个实例上。默认情况下，SQL\
  \ 跟踪对所有实例启用。请注意，参数 `service_name`、`module_name`、`action_name` 和 `instance_name`\
  \ 是区分大小写的。\n\n```sql\ndbms_monitor.serv_mod_act_trace_enable(service_name   => 'DBM10203.antognini.ch',\n\
  \                                       module_name   => 'mymodule',\n         \
  \                              action_name   => 'myaction',\n                  \
  \                     waits         => TRUE,\n                                 \
  \      binds         => FALSE,\n                                       instance_name\
  \ => NULL)\n```\n\n与客户端级别的 SQL 跟踪一样，视图 `dba_enabled_traces` 显示了为哪个组件启用了 SQL 跟踪，以及通过过程\
  \ `serv_mod_act_trace_enable` 启用它时使用的参数。使用之前的 PL/SQL 调用启用 SQL 跟踪后，您会获得以下信息。请注意，如果在启用\
  \ SQL 跟踪时未指定所有三个属性（即服务名、模块名和操作名），则列 `trace_type` 将根据使用的参数设置为 `SERVICE` 或 `SERVICE_MODULE`。\n\
  \n```sql\nSQL> SELECT primary_id AS service_name, qualifier_id1 AS module_name,\n\
  \  2         qualifier_id2 AS action_name, waits, binds\n  3  FROM dba_enabled_traces\n\
  \  4  WHERE trace_type = 'SERVICE_MODULE_ACTION';\n\nSERVICE_NAME           MODULE_NAME\
  \   ACTION_NAME WAITS BINDS\n---------------------- ------------ ------------ -----\
  \ -----\nDBM10203.antognini.ch  mymodule     myaction     TRUE  FALSE\n```\n\n以下\
  \ PL/SQL 调用会禁用所有使用指定会话属性的会话的 SQL 跟踪。所有参数都具有与过程 `serv_mod_act_trace_enable` 相同的默认值和行为。\n\
  \n```sql\ndbms_monitor.serv_mod_act_trace_disable(service_name   => 'DBM10203.antognini.ch',\n\
  \                                        module_name    => 'mymodule',\n       \
  \                                 action_name    => 'myaction',\n              \
  \                          instance_name  => NULL)\n```\n\n## 数据库级别\n\n从 Oracle\
  \ Database 10*g* Release 2 开始，为了为连接到数据库的所有会话（后台进程创建的会话除外）启用和禁用 SQL 跟踪，包 `dbms_monitor`\
  \ 分别提供了过程 `database_trace_enable` 和 `database_trace_disable`。\n\n以下 PL/SQL 调用为数据库在级别\
  \ 12 启用 SQL 跟踪。所有参数都有默认值。参数 `waits` 默认为 `TRUE`，参数 `binds` 默认为 `FALSE`。在 Real Application\
  \ Clusters 的情况下，通过使用参数 `instance_name`，可以将跟踪限制在单个实例上。如果参数 `instance_name` 设置为 `NULL`（这也是默认值），则\
  \ SQL 跟踪对所有实例启用。再次注意，参数 `instance_name` 是区分大小写的。\n\n```sql\ndbms_monitor.database_trace_enable(waits\
  \ =>          TRUE,\n                                   binds =>          TRUE,\n\
  \                                   instance_name =>  NULL)\n```\n\n与客户端和组件级别的 SQL\
  \ 跟踪一样，视图 `dba_enabled_traces` 显示了为哪个实例启用了 SQL 跟踪，以及通过过程 `database_trace_enable`\
  \ 启用它时使用的参数。\n\n```sql\nSQL> SELECT instance_name, waits, binds\n  2  FROM dba_enabled_traces\n\
  \  3  WHERE trace_type = 'DATABASE';\n\nINSTANCE_NAME     WAITS BINDS\n-----------------\
  \ ----- -----\n                  TRUE  TRUE\n```\n\n以下 PL/SQL 调用为数据库禁用 SQL 跟踪。如果参数\
  \ `instance_name` 设置为 `NULL`（这也是默认值），则所有实例的 SQL 跟踪都会被禁用。\n\n```sql\ndbms_monitor.database_trace_disable(instance_name\
  \ => NULL)\n```\n\n## 触发 SQL 跟踪\n\n在前面的章节中，您已经看到了启用和禁用 SQL 跟踪的不同方法。在最简单的情况下，您手动在\
  \ SQL*Plus 中执行所示的 SQL 语句或 PL/SQL 调用。然而，有时需要自动触发 SQL 跟踪。这里的“自动”意味着必须在某个地方添加代码。\n\n\
  最简单的方法是在数据库级别创建一个登录触发器。为了避免为所有用户启用 SQL 跟踪，我通常建议创建一个角色（在以下示例中名为 `sql_trace`）并仅临时授予用于测试的用户。自然地，也可以为单个模式定义触发器，或执行其他检查，例如基于\
  \ `userenv` 上下文。请注意，除了启用 SQL 跟踪外，最好也设置与 SQL 跟踪相关的其他参数（本章后面将详细介绍）。\n\n```sql\nCREATE\
  \ ROLE sql_trace;\n\nCREATE OR REPLACE TRIGGER enable_sql_trace AFTER LOGON ON DATABASE\n\
  BEGIN\n  IF (dbms_session.is_role_enabled('SQL_TRACE'))\n  THEN\n    EXECUTE IMMEDIATE\
  \ 'ALTER SESSION SET timed_statistics = TRUE';\n    EXECUTE IMMEDIATE 'ALTER SESSION\
  \ SET max_dump_file_size = unlimited';\n    dbms_monitor.session_trace_enable;\n\
  \  END IF;\nEND;\n/\n```\n\n另一种方法是在应用程序中直接添加一些启用 SQL 跟踪的代码。还需要添加某种参数化来触发该代码。胖客户端应用程序的命令行参数或\
  \ Web 应用程序的额外 HTTP 参数就是例子。\n\n## 跟踪文件中的时间信息\n\n动态初始化参数 `timed_statistics` 可以设置为\
  \ `TRUE` 或 `FALSE`，它控制跟踪文件中时间信息（如耗时和 CPU 时间）的可用性。如果设置为 `TRUE`，则时间信息会添加到跟踪文件中。如果设置为\
  \ `FALSE`，则应该没有这些信息；但是，根据您所使用的端口，它们可能部分可用。`timed_statistics` 的默认值取决于另一个初始化参数：`statistics_level`。如果\
  \ `statistics_level` 设置为 `basic`，`timed_statistics` 默认为 `FALSE`。否则，`timed_statistics`\
  \ 默认为 `TRUE`。\n\n\n一般来说，如果时间信息不可用，跟踪文件就没什么用。因此，在启用 SQL 跟踪之前，请确保将参数设置为 `TRUE`。例如，您可以通过执行以下\
  \ SQL 语句来做到这一点：\n\n`ALTER SESSION SET timed_statistics = TRUE`\n\n## 动态初始化参数\n\n\
  有些初始化参数是静态的，另一些则是动态的。当参数是动态的时，意味着它们可以在不重启实例的情况下更改。在动态初始化参数中，有些只能在会话级别更改，有些只能在系统级别更改，还有一些则可以在会话和系统级别更改。要分别在会话和系统级别更改初始化参数，需使用\
  \ SQL 语句 `ALTER SESSION` 和 `ALTER SYSTEM`。在实例级别更改的初始化参数会立即生效，或者仅对修改后创建的会话生效。视图 `v$parameter`，或者更准确地说，其列\
  \ `isses_modifiable` 和 `issys_modifiable`，提供了关于初始化参数可在何种情况下被更改的信息。\n\n## 限制跟踪文件的大小\n\
  \n通常，您可能不太关心限制跟踪文件的大小。但如果确实有必要，可以在会话或系统级别设置动态初始化参数 `max_dump_file_size`。一个数值后跟 *K*\
  \ 或 *M* 后缀，用于以千字节或兆字节为单位指定跟踪文件的最大尺寸。如果不需要限制，可以如下面的 SQL 语句所示，将该参数设置为 `unlimited`：\n\
  \n`ALTER SESSION SET max_dump_file_size = unlimited`\n\n## 查找跟踪文件\n\n跟踪文件由在数据库服务器上运行的数据库引擎服务器进程生成。这意味着它们被写入到数据库服务器可访问的磁盘上。根据生成跟踪文件的进程类型，它们被写入两个不同的目录：\n\
  \n*   专用服务器进程在通过初始化参数 `user_dump_dest` 配置的目录中创建跟踪文件。\n*   后台进程在通过初始化参数 `background_dump_dest`\
  \ 配置的目录中创建跟踪文件。\n\n请注意，以下被认为是后台进程：列在 `v$bgprocess` 中的进程、调度程序进程（D*nnn*）、共享服务器进程（S*nnn*）、并行从属进程（P*nnn*）、作业队列进程（J*nnn*）、高级队列进程（Q*nnn*）、MMON\
  \ 从属进程（M*nnn*）以及 ASM 相关进程（O*nnn*）。进程类型可在视图 `v$session` 的 `type` 列中找到。\n\n从 Oracle\
  \ 数据库 11*g* 开始，随着自动诊断资料库的引入，初始化参数 `user_dump_dest` 和 `background_dump_dest` 已被弃用，转而使用初始化参数\
  \ `diagnostic_dest`。由于新的初始化参数仅设置基础目录，您可以使用视图 `v$diag_info` 来获取跟踪文件的确切位置。以下查询展示了初始化参数的值与跟踪文件位置之间的差异：\n\
  \n`SQL> SELECT value FROM v$parameter WHERE name = 'diagnostic_dest';`\n\n`VALUE`\n\
  `----------------------------------------------------------------------`\n`/u00/app/oracle`\n\
  \n`SQL> SELECT value FROM v$diag_info WHERE name = 'Diag Trace';`\n\n`VALUE`\n`----------------------------------------------------------------------`\n\
  `/u00/app/oracle/diag/rdbms/dbm11106/DBM11106/trace`\n\n跟踪文件本身的名称曾经是版本和平台相关的。然而，自\
  \ Oracle9*i* 起，对于最常见的平台，它具有以下结构：\n\n`{实例名}_{进程名}_{进程 ID}.trc`\n\n分解如下：\n\n`实例名`:\n\
  \n这是初始化参数 `instance_name` 的小写形式。请注意，在真正的应用集群环境中，这与初始化参数 `db_name` 不同。它可在视图 `v$instance`\
  \ 的 `instance_name` 列中找到。\n\n`进程名`:\n\n这是生成跟踪文件的进程名称的小写形式。对于专用服务器进程，使用名称 `ora`。对于共享服务器进程，它可在视图\
  \ `v$dispatcher` 或 `v$shared_server` 的 `name` 列中找到。对于并行从属进程，它可在视图 `v$px_process`\
  \ 的 `server_name` 列中找到。对于大多数其他后台进程，它可在视图 `v$bgprocess` 的 `name` 列中找到。\n\n`进程 ID`:\n\
  \n这是操作系统级别的进程标识符。其值可在视图 `v$process` 的 `spid` 列中找到。\n\n基于这里提供的信息，可以编写一个类似下面的查询，以找出每个用户会话关联的跟踪文件名（您可以在脚本\
  \ `map_session_to_tracefile.sql` 中找到此查询）。请注意，在下面的输出中，有一行的服务器类型等于 `NONE`。当通过共享服务器进程连接的会话没有执行\
  \ SQL 语句时，就会发生这种情况。因此，它没有与共享服务器进程关联，而是与调度程序服务器进程关联。\n\n```sql\nSQL> SELECT s.sid,\n\
  \  2         s.server,\n  3         lower(\n  4           CASE\n  5            \
  \ WHEN s.server IN ('DEDICATED','SHARED') THEN\n  6               i.instance_name\
  \ || '_' ||\n  7               nvl(pp.server_name, nvl(ss.name, 'ora')) || '_' ||\n\
  \  8               p.spid || '.trc'\n  9             ELSE NULL\n10           END\n\
  11         ) AS trace_file_name\n12  FROM v$instance i,\n13       v$session s,\n\
  14       v$process p,\n15       v$px_process pp,\n16       v$shared_server ss\n\
  17  WHERE s.paddr = p.addr\n18  AND s.sid = pp.sid (+)\n19  AND s.paddr = ss.paddr(+)\n\
  20  AND s.type = 'USER'\n21  ORDER BY s.sid;\n```\n\n```\n      SID  SERVER    TRACE_FILE_NAME\n\
  ---------- --------- --------------------------------------\n       145 DEDICATED\
  \ dbm10203_ora_24387.trc\n       146 DEDICATED dbm10203_ora_24380.trc\n       147\
  \ NONE\n       149 DEDICATED dbm10203_ora_24260.trc\n       150 SHARED dbm10203_s000_24374.trc\n\
  ```\n\n从 Oracle 数据库 11*g* 开始，对于当前会话，使用视图 `v$diag_info` 会容易得多，如下所示：\n\n`SQL> SELECT\
  \ value FROM v$diag_info WHERE name = 'Default Trace File';`\n\n```\nVALUE\n------------------------------------------------------------------------\n\
  /u00/app/oracle/diag/rdbms/dbm11106/DBM11106/trace/DBM11106_ora_9429.trc\n```\n\n\
  为了更容易找到正确的跟踪文件，也可以使用初始化参数 `tracefile_identifier`。实际上，通过该参数，您可以向跟踪文件名添加最多 255 个字符的自定义标识符。有了它，跟踪文件名结构变为：\n\
  \n`{实例名}_{进程名}_{进程 ID}_{跟踪文件标识符}.trc`\n\n请注意，此方法仅适用于专用服务器进程。同样值得注意的是，每次会话动态更改该参数的值时，都会自动创建一个新的跟踪文件。参数\
  \ `tracefile_identifier` 的值可在视图 `v$process` 的 `traceid` 列中找到。不过要小心：这只对设置该参数的同一个会话成立。所有其他会话看到的该值都是\
  \ `NULL`。\n\n既然您已经了解了什么是 SQL 跟踪、如何配置、启用和禁用它，以及在哪里找到它生成的跟踪文件，接下来让我们讨论它们的结构以及一些用于分析并利用其内容的工具。\n\
  \n## 跟踪文件是否包含机密信息？\n\n\n\n默认情况下，并非所有人都能访问跟踪文件。这是合理的，因为它们可能包含机密信息。实际上，跟踪文件中既会包含可能带有数据（字面值）的\
  \ SQL 语句，也会包含绑定变量的值。从根本上说，这意味着存储在数据库中的每一段数据都有可能被写入跟踪文件。\n\n例如，在 Unix/Linux 系统上，跟踪文件属于运行数据库引擎二进制文件的用户和组，默认权限是\
  \ `-rw-r-----`。换句话说，只有与运行数据库引擎的用户属于同一个组的用户才能读取这些跟踪文件。\n\n然而，如果某些用户为了完成某项任务已经需要访问数据库中的数据，那么阻止他们访问跟踪文件实在没有充分的理由。事实上，从安全角度来看，跟踪文件仅对那些无法访问数据库的用户才是有用的信息来源。因此，数据库引擎提供了一个名为\
  \ `_trace_files_public` 的未公开参数。默认情况下，该参数设置为 `FALSE`。如果设置为 `TRUE`，则跟踪文件将对所有能够访问系统的用户设置为可读。由于该参数不是动态的，更改其值需要重启实例。\n\
  \n例如，在 Unix/Linux 系统上，如果 `_trace_files_public` 设置为 `TRUE`，默认权限将变为 `-rw-r--r--`。这样，所有用户都能读取跟踪文件。\n\
  \n从安全角度来看，只有在访问数据库服务器不受限制的情况下，将参数 `_trace_files_public` 设置为 `TRUE` 才会带来问题。在提供对跟踪文件的简单访问时，通常还会通过\
  \ SMB、NFS 或 HTTP 接口共享包含这些文件的目录。无论哪种情况，出于显而易见的原因，应尽可能避免每次需要跟踪文件时都要求 DBA 手动发送。\n\n\
  ### 跟踪文件的结构\n\n一个跟踪文件包含有关特定进程执行的数据库调用的信息。实际上，当操作系统级别的进程 ID 被重用时，一个跟踪文件也可能包含来自多个进程的信息。由于一个进程可能用于不同的会话（例如，对于共享服务器或并行从属进程），并且每个会话可能具有不同的会话属性（例如，模块名和操作名），因此一个跟踪文件可以分成几个逻辑部分。图\
  \ 3-19 提供了一个示例（两个跟踪文件均可与其他本章文件一起下载）。\n\n![image](img/0319.jpg)\n\n图 3-19. 跟踪文件可能由几个逻辑部分组成。左侧是一个包含来自三个会话信息的共享服务器跟踪文件。右侧是一个包含来自一个客户端、两个模块和五个动作信息的专用服务器跟踪文件。\n\
  \n图 3-19 中右侧所示跟踪文件的结构可以通过以下 PL/SQL 块生成：\n\n```\nBEGIN\n  dbms_session.set_identifier(client_id=>'helicon.antognini.ch');\n\
  \  dbms_application_info.set_module(module_name=>'Module 1',\n                 \
  \                  action_name=>'Action 11');\n  -- code module 1, action 11\n \
  \ dbms_application_info.set_module(module_name=>'Module 1',\n                  \
  \                 action_name=>'Action 12');\n  -- code module 1, action 12\n  dbms_application_info.set_module(module_name=>'Module\
  \ 1',\n                                   action_name=>'Action 13');\n  -- code\
  \ module 1, action 13\n  dbms_application_info.set_module(module_name=>'Module 2',\n\
  \                                   action_name=>'Action 21');\n-- code module 2,\
  \ action 21\n  dbms_application_info.set_module(module_name=>'Module 2',\n     \
  \                              action_name=>'Action 22');\n  -- code module 2, action\
  \ 22\nEND;\n```\n\n在 图 3-19 中用来标记各部分的、以三个星号（`***`）开头的标签，正是跟踪文件中使用的标签。与跟踪文件的不同之处在于，数据库引擎不仅会为每个部分重复其中一些标签，而且还会添加一个时间戳。下面的跟踪文件片段展示了由上述\
  \ PL/SQL 块生成的内容示例：\n\n```\n...\n*** ACTION NAME:(Action 11) 2007-07-11 10:59:01.582\n\
  *** MODULE NAME:(Module 1) 2007-07-11 10:59:01.582\n*** CLIENT ID:(helicon.antognini.ch)\
  \ 2007-07-11 10:59:01.582\n...\n...\n*** ACTION NAME:(Action 12) 2007-07-11 10:59:03.583\n\
  *** MODULE NAME:(Module 1) 2007-07-11 10:59:03.583\n...\n...\n*** ACTION NAME:(Action\
  \ 13) 2007-07-11 10:59:04.585\n*** MODULE NAME:(Module 1) 2007-07-11 10:59:04.585\n\
  ...\n...\n*** ACTION NAME:(Action 21) 2007-07-11 10:59:05.585\n*** MODULE NAME:(Module\
  \ 2) 2007-07-11 10:59:05.585\n...\n...\n*** ACTION NAME:(Action 22) 2007-07-11 10:59:06.586\n\
  *** MODULE NAME:(Module 2) 2007-07-11 10:59:06.586\n...\n...\n```\n\n从 Oracle Database\
  \ 10*g* 开始，跟踪文件在这方面的格式发生了变化。在之前的版本中，不仅客户端 ID 完全缺失，而且用于模块名和操作名的标签也不同。下面的跟踪文件片段展示了在\
  \ Oracle9*i* 及更早版本中，对于相同的 PL/SQL 块，信息是如何提供的：\n\n```\n...\nAPPNAME mod='Module 1'\
  \ mh=262111370 act='Action 11' ah=810452301\n...\n...\nAPPNAME mod='Module 1' mh=262111370\
  \ act='Action 12' ah=3880529476\n...\n...\nAPPNAME mod='Module 1' mh=262111370 act='Action\
  \ 13' ah=3117839477\n...\n...\nAPPNAME mod='Module 2' mh=2889377500 act='Action\
  \ 21' ah=3726166056\n...\n...\nAPPNAME mod='Module 2' mh=2889377500 act='Action\
  \ 22' ah=1514258714\n...\n...\n```\n\n您之前看到的逻辑会话标签非常有用，因为借助它们，可以提取与您需求相关的信息。例如，如果您正在调查与特定操作相关的性能问题，您可以隔离出跟踪文件中与其相关的部分。您可以使用下一节介绍的工具\
  \ `TRCSESS` 来完成此操作。\n\n\n\n### 使用 TRCSESS\n\n您可以使用命令行工具 `TRCSESS`（自 Oracle 数据库 10*g*\
  \ 起可用），它可根据前面描述的逻辑节区，从一个或多个跟踪文件中提取部分信息。要获取其参数的完整列表，请在不带参数的情况下运行它。\n\n```\ntrcsess\
  \ [output=<输出文件名>] [session=<会话 ID>] [clientid=<客户端 ID>]\n        [service=<服务名>]\
  \ [action=<操作名>] [module=<模块名>]\n        <跟踪文件名>\n```\n\n```\noutput=<输出文件名> 输出目标，默认为标准输出。\n\
  session=<会话 ID> 要跟踪的会话。\n会话 ID 是会话索引和会话序列号的组合，例如 8.13。\nclientid=<客户端 ID> 要跟踪的客户端\
  \ ID。\nservice=<服务名> 要跟踪的服务。\naction=<操作名> 要跟踪的操作。\nmodule=<模块名> 要跟踪的模块。\n<trace_file_names>\
  \ 空格分隔的跟踪文件列表，支持通配符 '*'。\n```\n\n如您所见，可以指定会话、客户端 ID、服务名、模块名和操作名作为参数。例如，要从跟踪文件 `dbm10203_ora_24433.trc`\
  \ 中提取关于 *操作 12* 的信息，并将输出写入名为 `action12.trc` 的新跟踪文件，您可以使用以下命令：\n\n```\ntrcsess output=action12.trc\
  \ action=\"操作 12\" dbm10203_ora_24433.trc\n```\n\n请记住，参数 `clientid`、`service`、`action`\
  \ 和 `module` 是**区分大小写**的。此工具也支持早期版本生成的跟踪文件。然而，正如您在前一节所见，问题在于直到 Oracle9*i*，只有会话标识使用了与\
  \ Oracle Database 10*g* 及更高版本相同的标签。要解决此问题，您可以使用首选的脚本语言将旧标签转换为新格式。例如，您可以使用某个有用的 Unix\
  \ 命令行工具来完成此操作。在这种情况下，我个人会选择 `awk`。以下脚本的目的非常简单：如果一行以标签 `APPNAME` 开头，则将该行转换为新格式；否则，输入将直接回显到输出。\n\
  \n```\nBEGIN {\n   FS = \"=\"\n}\n/^APPNAME/ {\n   module = substr($2,2,index($2,\"\
  ' mh\")-2)\n   action = substr($4,2,index($4,\"' ah\")-2)\n   if (action) printf\
  \ \"*** 操作名:(%s) 0\\n\", action\n   if (module) printf \"*** 模块名:(%s) 0\\n\", module\n\
  }\n!/^APPNAME/ {\n   print $0\n}\n```\n\n这个名为 `trcsess.awk` 的脚本执行起来如下所示：\n\n```\n\
  awk -f trcsess.awk m9208_ora_5823.trc > m9208_ora_5823.trc2\n```\n\n### 分析器\n\n\
  一旦您确定了正确的跟踪文件，或者可能已经使用 `TRCSESS` 截取了其中一部分，就该分析内容了。为此，您需要使用分析器。它的目的是基于原始跟踪文件的内容生成格式化的输出。Oracle\
  \ 随数据库和客户端二进制文件分发了这样一个分析器。它的名字是 `TKPROF`（代表*跟踪内核分析器*）。尽管它提供的输出在几种情况下可能有用，但有时对于快速识别性能问题并不够充分。奇怪的是，Oracle\
  \ 低估了此类工具的重要性，因此自 Oracle7 引入以来，对其改进甚微。不过，现在有许多商业和免费的分析器可用。我自己也开发了一个免费的分析器，名为 `TVD$XTAT`。其他您可能考虑的分析器包括\
  \ Hotsos Profiler、itfprof SQL Analyzer 和 `OraSRP`。甚至 Oracle（通过 MetaLink）也提出了另一个分析器，名为\
  \ Trace Analyzer。\n\n在接下来的两节中，我将描述其中两种分析器。首先，我将介绍 `TKPROF`。尽管存在不足，它是唯一一个总是可用的分析器。事实上，在并非所有情况下您都允许在数据库服务器上安装另一个分析器或将跟踪文件下载到另一台机器。在这种情况下，它可能很有用。介绍完\
  \ `TKPROF` 后，我将描述我自己的分析器。解释基于以下 PL/SQL 块执行期间生成的跟踪文件：\n\n```\nDECLARE\n   l_channel_id\
  \ sh.sales.channel_id%TYPE := 3;\nBEGIN\n   FOR c IN (SELECT cust_id, extract(YEAR\
  \ FROM time_id), sum(amount_sold)\n             FROM sh.sales\n             WHERE\
  \ channel_id = l_channel_id\n             GROUP BY cust_id, extract(YEAR FROM time_id))\n\
  \   LOOP\n      NULL;\n   END LOOP;\nEND;\n```\n\n##### 使用 TKPROF\n\n`TKPROF` 是一个命令行工具。它的主要目的是接受原始跟踪文件作为输入，并生成格式化的文本文件作为输出。此外，它还能够生成用于将数据加载到数据库中的\
  \ SQL 脚本，尽管此功能很少使用。\n\n最简单的分析仅需指定输入和输出文件即可执行。在以下示例中，输入文件是 `DBM11106_ora_6334.trc`，输出文件是\
  \ `DBM11106_ora_6334.txt`。即使输出文件的默认扩展名是 `prf`，我个人总是使用 `txt`。在我看来，最好使用对每个人都有意义并且通常能被任何操作系统正确识别的扩展名。\n\
  \n```\ntkprof DBM11106_ora_6334.trc DBM11106_ora_6334.txt\n```\n\n不带其他参数进行分析仅在处理非常小的跟踪文件时有帮助。在大多数情况下，为了获得更好的输出，您必须指定几个参数。\n\
  \n**TKPROF 参数**\n\n如果您不带参数运行 `TKPROF`，您将获得其参数的完整列表以及每个参数的简短描述：\n\n```\n用法: tkprof\
  \ 跟踪文件 输出文件 [explain= ] [table= ]\n              [print= ] [insert= ] [sys= ] [sort=\
  \ ]\n   table=模式名.表名   与 'explain=' 选项一起使用 '模式名.表名'。\n   explain=用户/密码    连接到 ORACLE\
  \ 并执行 EXPLAIN PLAN。\n   print=整数    仅列出前 '整数' 个 SQL 语句。\n   aggregate=yes|no\n \
  \  insert=文件名  在 INSERT 语句内列出 SQL 语句和数据。\n   sys=no           TKPROF 不列出作为用户 SYS\
  \ 运行的 SQL 语句。\n   record=文件名  记录在跟踪文件中找到的非递归语句。\n   waits=yes|no     记录在跟踪文件中找到的任何等待事件的摘要。\n\
  \   sort=选项      以下排序选项中的零个或多个的组合：\n      prscnt  解析被调用的次数\n      prscpu  解析占用的\
  \ CPU 时间\n      prsela  解析用时\n      prsdsk  解析期间的磁盘读次数\n      prsqry  解析期间一致性读的缓冲区数量\n\
  \      prscu   解析期间当前读的缓冲区数量\n      prsmis  解析期间库缓存未命中的次数\n      execnt  执行被调用的次数\n\
  \      execpu  执行占用的 CPU 时间\n      exeela  执行用时\n      exedsk  执行期间的磁盘读次数\n    \
  \  exeqry  执行期间一致性读的缓冲区数量\n      execu   执行期间当前读的缓冲区数量\n      exerow  执行期间处理的行数\n\
  \      exemis  执行期间库缓存未命中的次数\n      fchcnt  提取被调用的次数\n      fchcpu  提取占用的 CPU 时间\n\
  \      fchela  提取用时\n      fchdsk  提取期间的磁盘读次数\n      fchqry  提取期间一致性读的缓冲区数量\n  \
  \    fchcu   提取期间当前读的缓冲区数量\n      fchrow  提取的行数\n      userid  解析游标的用户的用户 ID\n```\n\
  \n每个参数的功能如下：\n\n\n\n*   `explain` 指示 TKPROF 为在跟踪文件中找到的每条 SQL 语句提供执行计划。这是通过执行 SQL\
  \ 语句 `EXPLAIN PLAN` 来完成的（关于此 SQL 语句的详细信息，请参见第 6 章）。显然，为了执行 SQL 语句，需要连接到数据库。因此，该参数用于指定用户、密码，以及（如果需要）连接字符串。可接受的格式是\
  \ `explain=user/password@connect_string` 和 `explain=user/password`。请注意，为了最大化获得正确执行计划的机会，您应该指定一个能够访问相同对象的用户，并确保所有查询优化器初始化参数都设置为与生成跟踪文件时所用相同的值。您还应该警惕被应用程序或登录触发器在运行时更改的初始化参数。不言而喻，如果能使用相同的用户，那就更好了。无论如何，即使满足了所有前述条件，由于\
  \ `EXPLAIN PLAN` 生成的执行计划不一定与实际执行计划匹配（原因将在第 6 章中解释），因此**不建议**指定 `explain` 参数。如果指定了无效的用户、密码或连接字符串，跟踪文件将被处理，但不会出现任何交互式错误消息。相反，紧接着输出文件头部之后，会发现类似下面的错误：\n\
  \    ```\n    error connecting to database using: scott/lion\n    ORA-01017: invalid\
  \ username/password; logon denied\n    EXPLAIN PLAN option disabled.\n    ```\n\
  *   `table` 参数仅与 `explain` 参数一起使用。其目的实际上是指定 SQL 语句 `EXPLAIN PLAN` 用来生成执行计划的表。通常可以避免指定它，因为\
  \ TKPROF 会在用于分析的模式中自动创建并删除一个名为 `prof$plan_table` 的计划表。无论如何，如果用户无法创建表（例如，因为缺少 `CREATE\
  \ TABLE` 权限），则必须指定 `table` 参数。例如，要指定必须使用用户 `system` 拥有的表 `plan_table`，则该参数必须设置为\
  \ `table=system.plan_table`。执行分析的用户必须对指定表拥有 `SELECT, INSERT` 和 `DELETE` 权限。同样，在这种情况下，错误也只会在输出文件中提供。\n\
  \n`Caution` 在 Oracle Database 10*g* Release 1 中，由于 bug 3451410，TKPROF 无法自动创建计划表。相反，紧接着输出文件头部之后，会发现错误\
  \ ORA-00922。此问题在 MetaLink 注意事项 `Tkprof Fails With Error In Create Table Of Explain\
  \ Plan: Ora-922` (293481.1) 中有描述。\n\n*   `print` 用于限制输出文件中提供的 SQL 语句数量。默认情况下没有限制。只有与\
  \ `sort` 参数（稍后描述）一起指定此参数才有意义。例如，若只想获取 10 条 SQL 语句，则必须将参数设置为 `print=10`。\n*   `aggregate`\
  \ 指定 TKPROF 是否分别处理具有相同文本的 SQL 语句。默认情况下，情况并非如此。换句话说，所有属于特定 SQL 语句的信息都会被聚合。请注意，无论跟踪文件中存在多少条\
  \ SQL 语句，都会执行此聚合操作。如同任何聚合操作一样，这会导致信息丢失。在这种情况下，一个拥有多个具有不同执行计划的子游标的游标也将被视为单个 SQL 语句处理。尽管默认值在许多情况下是好的，但有时指定\
  \ `aggregate=no` 并能够查看单个 SQL 语句会更好。\n*   `insert` 指示 TKPROF 生成一个 SQL 脚本，该脚本可用于将所有信息存储到数据库中。SQL\
  \ 脚本的名称由参数本身指定，如 `insert=load.sql`。\n*   `sys` 指定由用户 `sys` 执行的 SQL 语句（例如，在解析操作期间针对数据字典的递归查询）是否写入输出文件。默认值为\
  \ `yes`，但大多数时候我更喜欢将其设置为 `no`，以避免输出文件中出现不必要的信息。之所以不必要，是因为您通常无法控制由用户 `sys` 递归执行的 SQL\
  \ 语句。\n*   `record` 指示 TKPROF 生成一个 SQL 脚本，其中包含在跟踪文件中找到的所有非递归语句。SQL 脚本的名称由参数本身指定（例如，`record=replay.sql`）。根据文档，此功能可用于手动重放\
  \ SQL 语句。由于不处理绑定变量，这通常是不可行的。\n*   `waits` 决定有关等待事件的信息是否添加到输出文件中。默认情况下会添加。就个人而言，我认为没有充分的理由指定\
  \ `waits=no`，从而导致输出文件中缺少非常重要的等待事件。\n*   `sort` 指定 SQL 语句写入输出文件的顺序。默认情况下，是它们在跟踪文件中出现的顺序。基本上，通过指定提供的选项之一，您可以根据资源利用率（例如，调用次数、CPU\
  \ 时间和物理读取次数）或响应时间（即，耗时）对输出进行排序。正如您可以从大多数选项（例如，耗时）中看到的，每种数据库调用类型都有一个可用的值：例如，`prsela`\
  \ 表示解析游标所花费的时间，`exeela` 表示执行游标所花费的时间，`fchela` 表示从游标中获取行所花费的时间。即使您有许多选择和组合，但只有一种排序方式对于调查性能问题真正有用：响应时间。因此，您应该指定\
  \ `sort=prsela,exeela,fchela`。当您指定一个逗号分隔的值列表时，TKPROF 会对作为参数传递的选项的值进行求和。即使这些选项彼此不兼容，也会发生这种情况。请注意，当一个跟踪文件包含多个会话并指定了\
  \ `aggregate=no` 时，SQL 语句会针对每个会话独立排序。\n\n基于刚刚提供的信息，我个人通常运行 TKPROF 时使用的参数如下例所示：\n\
  \n`tkprof {输入跟踪文件} {输出文件} sys=no sort=prsela,exeela,fchela`\n\n既然您已经了解了如何使用 TKPROF\
  \ 分析跟踪文件，接下来让我们看一下它生成的输出文件。\n\n**解读 TKPROF 输出**\n\n\n\n分析工作通过指定以下参数完成。请注意，这并非您刚才被建议采用的操作方式。此举仅用于展示特定输出结果。需注意，此跟踪文件、输出文件及本章其他相关文件均可下载。\n\
  \n```\ntkprof DBM11106_ora_9813.trc DBM11106_ora_9813.txt\n       sort=prsela,exeela,fchela\
  \ print=3 explain=sh/sh aggregate=no\n```\n\n输出文件以一个头部信息开头。其中大部分信息是*静态的*，但仍包含有用内容：跟踪文件的名称、用于生成输出文件的\
  \ `sort` 参数值，以及标识被跟踪会话的一行信息。最后这项信息仅在指定了 `aggregate=no` 参数时才会提供。请注意，当跟踪文件包含多个会话且指定了\
  \ `aggregate=no` 参数时，此头部信息会重复出现，并用作不同会话 SQL 语句之间的分隔符。\n\n```\nTKPROF: Release 11.1.0.6.0\
  \ - Production on Tue Feb 29 10:37:08 2008\n\nCopyright (c) 1982, 2007, Oracle.\
  \ All rights reserved.\n\nTrace file: DBM11106_ora_6334.trc\nSort options: prsela\
  \ exeela fchela\n********************************************************************************\n\
  count     = number of times OCI procedure was executed\ncpu       = cpu time in\
  \ seconds executing\nelapsed   = elapsed time in seconds executing\ndisk      =\
  \ number of physical reads of buffers from disk\nquery     = number of buffers gotten\
  \ for consistent read\ncurrent   = number of buffers gotten in current mode (usually\
  \ for update)\nrows      = number of rows processed by the fetch or execute call\n\
  --------------------------------------------------------------------------------\n\
  \n*** SESSION ID:(90.6) 2008-02-29 07:43:11.461\n```\n\n在连接数据库或生成执行计划时发生的任何错误都会紧接在此头部信息之后添加。\n\
  \n头部信息之后，针对每条 SQL 语句会给出以下信息：SQL 语句文本、执行统计信息、解析相关信息、执行计划以及等待事件。执行计划和等待事件是可选的，仅当它们存储在跟踪文件中时才会被报告。请记住，执行计划仅在游标关闭时存储，而等待事件仅当其发生且等待事件跟踪功能启用时才会存储。\n\
  \n在某些情况下，SQL 语句的文本会被格式化。遗憾的是，负责此操作的代码并非在所有情况下都能提供正确的格式。例如，在本例中，函数 `extract` 的关键字\
  \ `FROM` 就与 SQL 语句的 `FROM` 子句混淆了。请注意，SQL 语句的 ID 仅在 Oracle Database 11g 及更高版本中才提供。\n\
  \n```\nSQL ID : g4h8jndhd8vst\nSELECT CUST_ID, EXTRACT(YEAR\nFROM\nTIME_ID), SUM(AMOUNT_SOLD)\
  \ FROM SH.SALES WHERE CHANNEL_ID = :B1 GROUP BY\n  CUST_ID, EXTRACT(YEAR FROM TIME_ID)\n\
  ```\n\n执行统计信息以表格形式提供了按数据库调用类型聚合的数据。对于每种调用类型，会给出以下性能指标：\n\n*   `count` 是数据库调用执行的次数。\n\
  *   `cpu` 是处理数据库调用所消耗的总 CPU 时间（以秒为单位）。\n*   `elapsed` 是处理数据库调用所消耗的总耗时（以秒为单位）。如果此值高于\
  \ CPU 时间，则下方执行统计信息中关于等待事件的部分会提供有关所等待的资源或同步点的信息。\n*   `disk` 是通过物理读取读取的块数。请注意，这不是物理\
  \ I/O 操作的次数。物理 I/O 操作的次数在关于等待事件的部分给出。如果此值大于逻辑读取数（`disk` > `query` + `current`），则意味着块溢出到了临时表空间。在这种情况下，您可以看到至少有\
  \ 870 个块（2,590–1,720–0）是从临时表空间中读取的。这一点稍后将由行源操作统计信息和等待事件统计信息证实。\n*   `query` 是在一致模式下通过逻辑读取从缓冲区高速缓存中读取的块数。通常，此类逻辑读取由查询使用。\n\
  *   `current` 是在当前模式下通过逻辑读取从缓冲区高速缓存中读取的块数。通常，此类逻辑读取由 `INSERT`、`DELETE`、`MERGE` 和\
  \ `UPDATE` 语句使用。\n*   `rows` 是处理的行数。对于查询，这是提取的行数。对于 `INSERT`、`DELETE`、`MERGE` 和\
  \ `UPDATE` 语句，这是受影响的行数。在本例中，值得注意的是在 164 次提取调用中总共提取了 16,348 行。这意味着平均每次调用提取了约 100\
  \ 行。请注意，100 是自 Oracle Database 10g 起在 PL/SQL 中使用的预取大小。（关于预取大小的详细信息，请参阅第 11 章。）\n\
  \n```\ncall     count      cpu    elapsed       disk      query    current      \
  \ rows\n------- ------ -------- ---------- ---------- ---------- ---------- ----------\n\
  Parse        1     0.00       0.00          0          0          0          0\n\
  Execute      1     0.04       0.19          0          0          0          0\n\
  Fetch      164     1.09       4.50       2590       1720          0      16348\n\
  ------- ------ -------- ---------- ---------- ---------- ---------- ----------\n\
  total      166     1.13       4.70       2590       1720          0      16348\n\
  ```\n\n接下来的几行总结了关于解析的基本信息。前两个值（`Misses in library cache`）提供了在解析和执行调用期间发生的硬解析次数。如果在执行调用期间未发生硬解析，则该特定行将不会出现。同时会显示优化器模式以及解析\
  \ SQL 语句的用户。请注意，在本例中用户名 `ops$cha` 仅在指定了 `explain` 参数时才会提供，否则只显示用户 ID（本例中为 33）。最后一项信息是递归深度，它仅针对递归\
  \ SQL 语句提供。由应用程序直接执行的 SQL 语句深度为 0。深度 `n`（本例中为 1）仅表示另一条深度为 `n-1`（本例中为 0）的 SQL 语句执行了此语句。在我们的示例中，深度为\
  \ 0 的 SQL 语句是由 SQL*Plus 执行的 PL/SQL 块。\n\n```\nMisses in library cache during parse:\
  \ 1\nMisses in library cache during execute: 1\nOptimizer mode: ALL_ROWS\nParsing\
  \ user id: 33  (OPS$CHA)   (recursive depth: 1)\n```\n\n\n\n在了解了关于解析的一般信息之后，您可能会看到执行计划。实际上，如果指定了参数\
  \ `explain`，则有可能看到两种执行计划。第一种被不准确地称为“行源操作”，它是当游标关闭时写入跟踪文件的执行计划——并且前提是游标在跟踪处于活动状态时关闭。这意味着，如果应用程序在不关闭的情况下重用游标，那么被重用的游标的执行计划将不会写入跟踪文件。第二种称为“执行计划”，仅在指定参数\
  \ `explain` 时由 TKPROF 生成。由于它是稍后生成的，因此不一定与第一个匹配。无论如何，如果您看到两者之间存在差异，第一个是正确的。\n\n第\
  \ 6 章 描述了如何读取执行计划；这里我只描述 TKPROF 的特殊性。两个执行计划都在 `Rows` 列中提供了执行计划中每个操作返回的行数（注意：不是处理的行数——请务必小心）。在这个例子中，知道表\
  \ `sales` 包含 918,843 行，而根据跟踪文件只有 540,328 行被返回，这意味着 `WHERE` 子句中的谓词过滤了大约 41% 的行。之后，`GROUP\
  \ BY` 子句将结果集进一步减少到 16,348 行。\n\n对于每个行源操作，还可能提供以下运行时统计信息：\n*   `cr` 是以一致模式通过逻辑读取读取的块数。\n\
  *   `pr` 是通过磁盘物理读取读取的块数。\n*   `pw` 是通过磁盘物理写入写入的块数。\n*   `time` 是处理该操作所花费的总耗时（以微秒为单位）。请注意，此统计信息提供的值并非总是非常精确。实际上，为了减少开销，可能会对其使用采样。\n\
  *   `cost` 是该操作的估计成本。此值仅在 Oracle Database 11*g* 及以上版本可用。\n*   `size` 是该操作返回的数据量的估计值（以字节为单位）。此值仅在\
  \ Oracle Database 11*g* 及以上版本可用。\n*   `card` 是该操作返回的行数的估计值。此值仅在 Oracle Database\
  \ 11*g* 及以上版本可用。\n\n请注意，除 `card` 外，这些值都是累积的；也就是说，它们包含了子行源操作的值。例如，在操作 `HASH GROUP\
  \ BY` 期间溢出到临时表空间的块数是 941 (2,590–1,649)。根据之前的执行统计信息（参见关于 \"disk\" 列的讨论），您只能估计至少有\
  \ 870。由于多出了 71 个块 (941–870)，这意味着有 71 个与溢出到临时表空间无关的块未在缓冲区缓存中找到。这个数字也与操作 `TABLE ACCESS\
  \ FULL` 提供的运行时统计信息相符。实际上，逻辑读取和物理读取之间的差是 71 (1,720–1,649)。\n\n```\nRows   Row Source\
  \ Operation\n------ ---------------------------------------------------\n16348 \
  \  HASH GROUP BY (cr=1720 pr=2590 pw=2590 time=79 us cost=9990 size=11217129\n \
  \                       card=534149)\n540328   PARTITION RANGE ALL PARTITION: 1\
  \ 28 (cr=1720 pr=1649 pw=1649 time=7744 us\n                                   \
  \            cost=496 size=11217129 card=534149)\n540328    TABLE ACCESS FULL SALES\
  \ PARTITION: 1 28 (cr=1720 pr=1649 pw=1649\n                                   \
  \                 time=4756 us cost=496\n                                      \
  \              size=11217129 card=534149)\n```\n\n```\nRows   Execution Plan\n------\
  \ ---------------------------------------------------\n     0 SELECT STATEMENT MODE:\
  \ ALL_ROWS\n16348  HASH (GROUP BY)\n540328   PARTITION RANGE (ALL) PARTITION: START=1\
  \ STOP=28\n540328    TABLE ACCESS MODE: ANALYZED (FULL) OF 'SALES' (TABLE)\n   \
  \            PARTITION: START=1 STOP=28\n```\n\n下一节总结了 SQL 语句等待的等待事件。为每种类型的等待事件提供以下值：\n\
  *   `Times Waited` 是等待事件发生的次数。\n*   `Max. Wait` 是单次等待事件的最大等待时间（秒）。\n*   `Total Waited`\
  \ 是等待事件的总等待时间（秒）。理想情况下，所有等待事件的等待时间之和应等于执行统计信息提供的耗时与 CPU 时间之差。如果可用，这个差值被称为 *未计入时间*。\n\
  \n**未计入时间**\n\nSQL 跟踪提供了数据库在执行每个操作上花费多少时间的信息。理想情况下，计算应该非常精确。不幸的是，很少能找到一个为每一秒都提供确切信息的跟踪文件。每当实际耗时与跟踪文件中记录的时间之间存在差异时，就存在\
  \ *未计入时间*：\n`未计入时间 = 实际耗时 – 已计入时间`\n\n未计入时间最常见的原因如下：\n*   最明显的是跟踪文件中缺少计时信息或等待事件。当参数\
  \ `timed_statistics` 设置为 `FALSE` 时会发生前者。当 SQL 跟踪在级别 1 或 4 被激活时会发生后者。在这两种情况下，未计入时间始终为正值。自然，正确启用扩展\
  \ SQL 跟踪将有助于您避免这些问题。\n*   一般来说，一个进程可能处于三种状态：在 CPU 上运行、等待对设备发出的请求得到满足，或在运行队列中等待 CPU。插桩代码能够计算在前两种状态下花费的时间，但对在运行队列中等待花费了多少时间没有线索。因此，在\
  \ CPU 资源匮乏的情况下，未计入时间（始终为正值）可能会相当长。基本上，您只能通过两种方式避免此问题：要么增加可用的 CPU 时间，要么降低 CPU 利用率。\n\
  *   插桩代码执行的时间测量是精确的。然而，由于计算机系统中计时器的实现，每次测量都存在微小的量化误差。特别是当被测量的事件非常短时，这些量化误差可能导致明显的未计入时间。就其性质而言，量化误差可能导致未计入时间为正值或负值。不幸的是，您对此无能为力。然而，在实践中，这个问题很少是造成大量未计入时间的原因，因为正误差倾向于抵消负误差。\n\
  *   如果您可以消除这里列出的其他三个可能的原因，那么问题很可能是因为插桩代码没有覆盖整个代码。例如，写入跟踪文件本身就没有被计入。这通常不是问题。但是，如果跟踪文件被写入到性能不佳的设备，或者生成的跟踪信息量非常大，这可能会导致显著的开销。在这种情况下，未计入时间将始终为正值。要避免此问题，您应该简单地将跟踪文件写入能够承受必要吞吐量的设备上。在某些罕见情况下，您可能被迫将跟踪文件放在\
  \ RAM 磁盘上。\n\n\n\n## 等待事件分析与执行统计\n\n由于这些值是高度聚合的，它们只能帮助你了解你正在等待哪种资源类型。例如，根据以下信息，几乎所有的等待时间都花在了执行物理读上。事实上，`db\
  \ file sequential read`是与单块读相关的等待事件，而`db file scattered read`是与多块读相关的等待事件（关于多块读的更多信息在第\
  \ 5 章中给出）。此外，`direct path write temp`和`direct path read temp`等待与溢出到临时表空间的操作相关。请注意，等待次数（941）恰好与之前在行源操作中提供的`HASH\
  \ GROUP BY`操作的物理写次数相匹配。\n\n```\nElapsed times include waiting on following events:\n\
  \  Event waited on                             Times  Max. Wait  Total Waited\n\
  \  ----------------------------------------   Waited  ----------  ------------\n\
  \  db file sequential read                       32       0.02         0.13\n  db\
  \ file scattered read                       225       0.04         1.76\n  direct\
  \ path write temp                       941       0.04         0.40\n  direct path\
  \ read temp                        941       0.03         1.00\n```\n\n在分析等待事件时，关键是要知道它们与哪些操作相关。幸运的是，即使有数百种等待事件类型，最常出现的通常也只有少数几种。你可以在*Oracle\
  \ Database Reference*手册的附录中找到其中大多数的简要描述。\n\n分析继续进行到下一个 SQL 语句。由于信息的结构与之前相同，我只在输出文件中出现新的或本质不同的内容时才进行注释。\n\
  \n```\nDECLARE\n  l_channel_id sh.sales.channel_id%TYPE := 3;\nBEGIN\n  FOR c IN\
