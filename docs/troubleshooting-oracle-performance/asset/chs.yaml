  \ 1 |     14 |`\n`------------------------------------------------------`\n```\n\
  \n`   4 - 过滤(\"E2\".\"DEPTNO\"=:B1)` ![image](img/0607.jpg)\n\n**图 6-7.** `相关-组合操作\
  \ 更新 的父子关系`\n\n在此执行计划中，相关-组合操作`更新`的所有三个子节点都是独立操作。前面描述的规则表明，执行计划按如下方式执行操作：\n\n1.\
  \  操作 1 有三个子节点（2、3 和 5），操作 2 是这三个中升序排列的第一个。因此，执行从操作 2 开始。\n2.  操作 2 扫描表`emp`并向其父操作（1）返回\
  \ 14 行。\n3.  对于列`deptno`中的每个不同值，其两个子节点（3 和 5）被执行一次。由于这两个操作都是独立的，并且每个都有一个子节点，因此它们的执行从子节点操作（4\
  \ 和 6）开始。\n4.  操作 4 扫描表`emp`并应用过滤谓词`\"E2\".\"DEPTNO\"=:B1`。在三次执行过程中，它提取了 14 行并将其传递给其父操作（3）。\n\
  5.  操作 3 计算从操作 4 传递给它的行的平均工资，并将结果返回给其父操作（1）。\n6.  操作 6 扫描表`emp`，提取 14 行，并将其传递给其父操作（5）。请注意，此子查询仅执行一次，因为它与主查询不相关。\n\
  7.  操作 5 计算从操作 6 传递给它的行的平均佣金，并将结果返回给其父操作（1）。\n8.  操作 1 使用其其他子节点（3 和 5）返回的值更新由操作\
  \ 2 传递的每一行。请注意，即使`更新`语句修改了 14 行，此操作的列`行数`也显示为 0。\n\n## 操作 带过滤的连接遍历\n\n此操作用于处理层次查询。它的特点是具有两个子操作。第一个用于获取层次结构的根，第二个为层次结构中的每一级执行一次。\n\
  \n以下是一个示例查询及其执行计划（图 6-8 显示了其父子关系的图形化表示）。请注意，该执行计划是在 Oracle Database 11*g* 上生成的（原因将在后面解释）。\n\
  \n```sql\nSELECT level, rpad('-',level-1,'-')||ename AS ename, prior ename AS manager\n\
  FROM emp\nSTART WITH mgr IS NULL\nCONNECT BY PRIOR empno = mgr\n```\n\n```plaintext\n\
  ---------------------------------------------------------------------\n| Id  | 操作\
  \                        | 名称      | 开始次数 | 行数   |\n---------------------------------------------------------------------\n\
  |*  1 |  带过滤的连接遍历           |           |      1 |     14 |\n|*  2 |    全表扫描   \
  \              | EMP       |      1 |      1 |\n|   3 |    嵌套循环                \
  \ |           |      4 |     13 |\n|   4 |     连接遍历泵              |           |\
  \      4 |     14 |\n|   5 |     通过索引行 ID 访问表       | EMP       |     14 |     13\
  \ |\n|*  6 |      索引范围扫描           | EMP_MGR_I |     14 |     13 |\n---------------------------------------------------------------------\n\
  ```\n\n`   1 - 访问(\"MGR\"=PRIOR \"EMPNO\")`\n`   2 - 过滤(\"MGR\" IS NULL)`\n`   6\
  \ - 访问(\"MGR\"=PRIOR \"EMPNO\")`\n\n* * *\n\n**注意** 此查询是视图`v$sql_plan`和`v$sql_plan_statistics_all`提供错误信息的另一种情况。在这种情况下，错误显示的谓词如下：\n\
  \n```plaintext\n1 - 访问(\"MGR\"=PRIOR NULL)\n   2 - 过滤(\"MGR\" IS NULL)\n6 - 访问(\"\
  MGR\"=PRIOR NULL)\n```\n\n* * *\n\n![image](img/0608.jpg)\n\n**图 6-8.** `相关-组合操作\
  \ 带过滤的连接遍历 的父子关系`\n\n在此执行计划中，相关-组合操作`带过滤的连接遍历`的第一个子节点是一个独立操作。而第二个子节点本身是一个相关-组合操作。要阅读这种情况下的执行计划，您只需在下降树的同时递归地应用基本规则。\n\
  \n为了帮助您更轻松地理解层次查询的执行计划，查看查询返回的数据也很有用：\n\n```plaintext\n层级 员工姓名   经理\n----------\
  \ ---------- ----------\n         1 KING\n         2 -JONES     KING\n         3\
  \ --SCOTT    JONES\n         4 ---ADAMS   SCOTT\n         3 --FORD     JONES\n \
  \        4 ---SMITH   FORD\n         2 -BLAKE     KING\n         3 --ALLEN    BLAKE\n\
  \         3 --WARD     BLAKE\n         3 --MARTIN   BLAKE\n         3 --TURNER \
  \  BLAKE\n         3 --JAMES    BLAKE\n         2 -CLARK     KING\n         3 --MILLER\
  \   CLARK\n```\n\n应用前面描述的规则，您可以看到执行计划按如下方式执行操作：\n\n1.  操作 1 有两个子节点（2 和 3），操作 2 是其中升序排列的第一个。因此，执行从操作\
  \ 2 开始。\n2.  操作 2 扫描表`emp`，应用过滤谓词`\"MGR\" IS NULL`，并将层次结构的根返回给其父操作（1）。\n3.  操作 3\
  \ 是操作 1 的第二个子节点。因此，它为层次结构的每一级执行——在本例中为四次。自然，前面讨论的关于`嵌套循环`操作的规则适用于操作 3。首先执行第一个子节点操作\
  \ 4，对于它返回的每一行，内层循环（由操作 5 及其子节点操作 6 组成）执行一次。请注意，正如预期的那样，操作 4 的列`行数`与操作 5 和 6 的列`开始次数`相匹配。\n\
  4.  对于第一次执行，操作 4 通过`连接遍历泵`操作获取层次结构的根。在本例中，级别 1 只有一行（KING）。使用列`mgr`中的值，操作 6 通过应用访问谓词`\"\
  MGR\"=PRIOR \"EMPNO\"`对索引`emp_mgr_i`进行扫描，提取 rowid 并将其返回给其父操作（5）。操作 5 使用 rowid 访问表`emp`并将行返回给其父操作（3）。\n\
  5.  对于操作 4 的第二次执行，所有工作都与第一次执行相同。唯一的区别是来自级别 2（JONES、BLAKE 和 CLARK）的数据被传递给操作 4 进行处理。\n\
  6.  对于操作 4 的第三次执行，所有工作都与第一次类似。唯一的区别是级别 3 数据（SCOTT、FORD、ALLEN、WARD、MARTIN、TURNER、JAMES\
  \ 和 MILLER）被传递给操作 4 进行处理。\n7.  对于操作 4 的第四次也是最后一次执行，所有工作都与第一次类似。唯一的区别是级别 4 数据（ADAMS\
  \ 和 SMITH）被传递给操作 4 进行处理。\n8.  操作 3 获取从其子节点传递的行，并将其返回给其父操作（1）。\n9.  操作 1 应用访问谓词`\"\
  MGR\"=PRIOR \"EMPNO\"`并将 14 行发送给调用者。\n\n\n## Oracle Database 10*g* 执行计划差异\n\n在 Oracle\
  \ Database 10*g* 上生成的执行计划略有不同。可以看出，操作 `CONNECT BY WITH FILTERING` 有了第三个子操作（操作 8）。不过，这个操作在本例中并未执行。操作\
  \ 8 对应的 `Starts` 列的值证实了这一点。实际上，只有当 `CONNECT BY` 操作使用临时空间时，才会执行第三个子操作。发生这种情况时，性能可能会显著下降。这个在版本\
  \ 10.2.0.4 中修复的问题被称为 bug 5065418。\n\n```\n---------------------------------------------------------------------\n\
  | Id  | Operation                     | Name      | Starts | A-Rows |\n---------------------------------------------------------------------\n\
  |*  1 |  CONNECT BY WITH FILTERING    |           |      1 |     14 |\n|*  2 | \
  \  TABLE ACCESS FULL           | EMP       |      1 |      1 |\n|   3 |   NESTED\
  \ LOOPS                |           |      4 |     13 |\n|   4 |    BUFFER SORT \
  \               |           |      4 |     14 |\n|   5 |     CONNECT BY PUMP   \
  \        |           |      4 |     14 |\n|   6 |    TABLE ACCESS BY INDEX ROWID|\
  \ EMP       |     14 |     13 |\n|*  7 |     INDEX RANGE SCAN          | EMP_MGR_I\
  \ |     14 |     13 |\n|   8 |   TABLE ACCESS FULL           | EMP       |     \
  \ 0 |      0 |\n---------------------------------------------------------------------\n\
  ```\n\n### 分治法\n\n在前面的章节中，你了解了如何阅读构成执行计划的三种类型的操作。到目前为止，你看到的所有执行计划都相当简单（简短）。然而，更多时候，你不得不处理复杂（冗长）的执行计划。这并非因为大多数\
  \ SQL 语句都很复杂，而是因为简单的 SQL 语句很可能已被查询优化器正确优化，因此你永远无需质疑它们的性能。\n\n关键是要认识到，阅读长的执行计划与阅读短的并无不同。你需要做的就是系统地应用前面章节中提供的规则。有了这些规则，执行计划有多少行并不重要。你只需以相同的方式继续即可。\n\
  \n为了向你展示如何处理超过几行的执行计划，让我们看一下图 6-9（图 6-9）所示执行计划所执行的操作（图 6-10 展示了其父子关系的图形化表示）。我故意没有提供用于生成它的\
  \ SQL 语句。就我们的目的而言，你完全不需要关心 SQL 语句。另一方面，执行计划才是关键。\n\n![image](img/0609.jpg)\n\n**图\
  \ 6-9.** 按块分解的执行计划。左侧的数字标识操作，右侧的字母标识块。\n\n![image](img/0610.jpg)\n\n**图 6-10.**\
  \ 如图 6-9 所示执行计划的父子关系。\n\n首先，需要将执行计划分解为基本块并识别执行顺序。为此，你需要执行以下步骤。要阅读一个执行计划，首先必须识别它所包含的合并操作（相关和不相关的）。换句话说，识别出每个拥有多个子操作的操作。在图\
  \ 6-9 的例子中，合并操作如下：3、4、5、6 和 14。然后，对于每个合并操作的每个子操作，你定义一个块。由于在图 6-9 中有五个合并操作，且每个都有两个子操作，因此总共有十个块。例如，对于操作\
  \ 3，第一个子操作由第 4 至 12 行组成（块 G），第二个子操作由第 13 至 16 行组成（块 J）。请注意，在图 6-9 中，每个块都由一个框架界定。最后，你需要弄清楚块的执行顺序。为了了解如何操作，让我们逐步分析图\
  \ 6-9 中显示的执行计划，并应用前面讨论的规则：\n\n\n"
- "# 执行计划执行流程\n\n## 概述\n\n1.  操作 1 是一个独立操作，它的子操作（2）在它之前执行。\n2.  操作 2 是一个独立操作，它的子操作（3）在它之前执行。\n\
  3.  操作 3 是一个关联组合操作，它的子操作在它之前执行。由于第一个子块（G）在第二个子块（J）之前执行，我们继续第一个子块（G）的第一个操作（4）。\n\
  4.  操作 4 是一个非关联组合操作，它的子操作在它之前执行。由于第一个子块（E）在第二个子块（F）之前执行，我们继续第一个子块（E）的第一个操作（5）。\n\
  5.  操作 5 是一个关联组合操作，它的子操作在它之前执行。由于第一个子块（C）在第二个子块（D）之前执行，我们继续第一个子块（C）的第一个操作（6）。\n\
  6.  操作 6 是一个关联组合操作，它的子操作在它之前执行。由于第一个子块（A）在第二个子块（B）之前执行，我们继续第一个子块（A）的第一个操作（7）。\n\
  7.  操作 7 是一个独立操作，没有子操作。这意味着你终于找到了第一个要执行的操作（因此它在块 A 中）。该操作扫描一个表并将行返回给它的父操作（6）。\n\
  8.  块 B 针对块 A 返回的每一行执行。在此块中，操作 9 首先扫描一个索引，然后操作 8 使用返回的行 ID 访问一个表，最后将行返回给它的父操作（6）。\n\
  9.  操作 6 执行块 A 和块 B 返回的行之间的连接，然后将结果返回给它的父操作（5）。\n10. 块 D 针对块 C 返回的每一行执行。换句话说，它针对操作\
  \ 6 返回给父操作（5）的每一行执行。在此块中，操作 11 首先扫描一个索引。然后，操作 10 使用返回的行 ID 访问一个表，并将行返回给它的父操作（5）。\n\
  11. 操作 5 执行块 C 和块 D 返回的行之间的连接，然后将结果返回给它的父操作（4）。\n12. 操作 12（块 F）只执行一次。它扫描一个表并将结果返回给它的父操作（4）。\n\
  13. 操作 4 执行块 E 和块 F 返回的行之间的连接，然后将结果返回给它的父操作（3）。\n14. 基本上，块 J 针对块 G 返回的每一行执行。换句话说，它针对操作\
  \ 4 返回给父操作（3）的每一行执行。在此块中，操作 15 首先扫描一个表并将行返回给它的父操作（14）。然后，操作 16 扫描一个表并将行返回给它的父操作（14）。之后，操作\
  \ 14 将其子操作返回的行合并在一起，并将结果返回给它的父操作（13）。最后，操作 13 删除一些重复的行。请注意，此块不向其父操作返回数据。实际上，父操作是一个`FILTER`操作，第二个子操作仅用于应用限制条件。\n\
  15. 一旦操作 3 应用了来自块 J 的过滤器，它将结果返回给它的父操作（2）。\n16. 操作 2 执行一个`GROUP BY`并将结果返回给它的父操作（1）。\n\
  17. 操作 1 应用一个过滤器并将结果返回给调用者。\n\n总之，请注意块是根据它们的标识符（从 A 到 J）执行的。一些块（A、C、E、F 和 G）最多执行一次，而其他块（B、D、H、I\
  \ 和 J）根据驱动它们的操作返回的行数执行多次。\n\n## 特殊案例\n\n前面部分描述的规则适用于几乎所有的执行计划。然而，有一些特殊情况。通常，通过查看操作、它们所执行的表以及它们的运行时行为（特别是`Starts`和`A-Rows`列），你就能弄清楚发生了什么。这里有两个例子。\n\
  \n第一个例子使用了一个在`SELECT`子句中包含子查询的查询。查询及其执行计划如下：\n\n```sql\nSELECT ename, (SELECT dname\
  \ FROM dept WHERE dept.deptno = emp.deptno)\nFROM emp\n\n-----------------------------------------------------------------\n\
  | Id  | Operation                    | Name    | Starts | A-Rows |\n-----------------------------------------------------------------\n\
  |   1 |  TABLE ACCESS BY INDEX ROWID| DEPT    |      3 |      3 |\n|*  2 |   INDEX\
  \ UNIQUE SCAN         | DEPT_PK |      3 |      3 |\n|   3 |  TABLE ACCESS FULL\
  \          | EMP     |      1 |     14 |\n-----------------------------------------------------------------\n\
  \n   2 - access(\"DEPT\".\"DEPTNO\"=:B1)\n```\n\n这个执行计划中奇怪的地方是操作 1 和 3 缺少父操作。如果你仔细查看`Starts`列，你会发现尽管操作\
  \ 1 和 2 执行了三次，但操作 3 只执行了一次。这个不寻常的执行计划按如下方式执行操作：\n\n1.  操作 3 扫描表`emp`并返回所有行。基本上，对于操作\
  \ 3 返回的每一行，子查询都应该执行一次。然而，同样在这种情况下，SQL 引擎会缓存结果，因此子查询只针对列`deptno`中的每个不同值执行一次。\n2.\
  \  为了执行子查询，操作 2 通过应用访问谓词`\"DEPT\".\"DEPTNO\"=:B1`扫描索引`dept_pk`，提取行 ID，并将它们返回给它的父操作（1）。绑定变量（`B1`）用于将要检查的值传递给子查询。然后操作\
  \ 1 使用这些行 ID 访问表`dept`。\n\n第二个例子使用了一个包含`NOT IN`的查询。查询及其执行计划如下：\n\n```sql\nSELECT\
  \ deptno\nFROM dept\nWHERE deptno NOT IN (SELECT deptno FROM emp)\n\n--------------------------------------------------------\n\
  | Id  | Operation          | Name    | Starts | A-Rows |\n--------------------------------------------------------\n\
  |*  1 |  INDEX FULL SCAN   | DEPT_PK |      1 |      1 |\n|*  2 |   TABLE ACCESS\
  \ FULL| EMP     |      4 |      3 |\n--------------------------------------------------------\n\
  \n   1 - filter( NOT EXISTS (SELECT /*+ */ 0 FROM \"EMP\" \"EMP\" WHERE\n      \
  \         LNNVL(\"DEPTNO\"<>:B1)))\n   2 - filter(LNNVL(\"DEPTNO\"<>:B1))\n```\n\
  \n***\n\n**注意** 这是另一个视图`v$sql_plan`和`v$sql_plan_statistics_all`显示错误信息的案例。在这种情况下，错误显示的谓词如下：\n\
  \n```text\n1 - filter(IS NULL)\n2 - filter(LNNVL(\"DEPTNO\"<>:B1))\n```\n\n***\n\
  \n乍一看，这个执行计划由两个独立操作组成。如果你仔细查看`Starts`列，会发现一些奇怪之处。事实上，尽管父操作（1）只执行了一次，但子操作（2）执行了四次。实际上，这个执行计划按如下方式执行操作：\n\
  \n1.  操作 1 是第一个被执行的，它扫描索引`dept_pk`。\n2.  针对列`deptno`中的每个值，执行操作 2。如谓词所示，此操作是由于子查询`NOT\
  \ EXISTS (SELECT 0 FROM \"EMP\" \"EMP\" WHERE LNNVL(\"DEPTNO\"<>:B1))`而执行的。注意，查询优化器将`NOT\
  \ IN`转换成了`NOT EXISTS`。绑定变量（`B1`）用于将要检查的值传递给子查询。\n\n请注意，这些只是许多可能情况中的两个例子。基本上，每次你看到奇怪的事情时，都应该小心，不要过早下结论。\n\
  \n\n\n### 识别低效执行计划\n\n不幸的是，要确认一个执行计划并非最优的唯一方法，就是找到另一个更快的执行计划。尽管如此，一些简单的检查仍可能揭示出执行计划低效的线索。接下来的章节将描述我用于此目的的两种检查方法。\n\
  \n#### 错误估算\n\n这项检查背后的思路非常简单。查询优化器通过计算成本来决定应使用哪些访问路径、连接顺序和连接方法，以生成高效的执行计划。如果成本计算错误，查询优化器很可能选出次优的执行计划。换句话说，错误的估算很容易导致执行计划的选择出现失误。\n\
  \n在实践中，直接判断一条 SQL 语句本身的成本是不可行的。更简便的方法是检查查询优化器执行的其他估算——这些估算构成了成本计算的基础：操作返回行数的估计值（基数）。检查估计基数相当容易，因为你可以借助例如\
  \ `dbms_xplan` 包中的 `display_cursor` 函数，直接将其与实际基数进行比较。正如你刚刚看到的，只有当这两个基数接近时，查询优化器才算完成了出色的工作。这种方法的一个核心特点是，判断执行计划质量无需关于\
  \ SQL 语句或数据库结构的额外信息。你只需专注于将估算值与实际数据进行比较。\n\n让我用一个例子来阐明这个概念。脚本 `wrong_estimations.sql`\
  \ 生成的输出摘录展示了一个执行计划及其估计行数 (`E-Rows`) 和实际行数 (`A-Rows`)。如你所见，操作 4 的估算（进而操作 2 和 3 的估算）完全错误。查询优化器估计操作\
  \ 4 仅返回 32 行，但实际返回了 80,016 行。更糟的是，操作 2 是一个关联组合操作。这意味着操作 5 和 6 实际执行了 80,016 次，而非估算的\
  \ 32 次。这一点也由 `Starts` 列的值所证实。需要注意的是，操作 5 和 6 的估算本身是正确的。实际上，在比较之前，必须将实际基数 (`A-Rows`)\
  \ 除以执行次数 (`Starts`)。\n\n```sql\nSELECT count(t2.col2)\nFROM t1 JOIN t2 USING (id)\n\
  WHERE t1.col1 = 666\n```\n\n```\n----------------------------------------------------------------------------\n\
  | Id  | Operation                     | Name    | Starts | E-Rows | A-Rows |\n----------------------------------------------------------------------------\n\
  |   1 |  SORT AGGREGATE               |         |      1 |      1 |      1 |\n|\
  \   2 |   NESTED LOOPS                |         |      1 |     32 |  75808 |\n|\
  \   3 |    TABLE ACCESS BY INDEX ROWID| T1      |      1 |     32 |  80016 |\n|*\
  \  4 |     INDEX RANGE SCAN          | T1_COL1 |      1 |     32 |  80016 |\n| \
  \  5 |    TABLE ACCESS BY INDEX ROWID| T2      |  80016 |      1 |  75808 |\n|*\
  \  6 |     INDEX UNIQUE SCAN         | T2_PK   |  80016 |      1 |  75808 |\n----------------------------------------------------------------------------\n\
  \n   4 - access(\"T1\".\"COL1\"=666)\n   6 - access(\"T1\".\"ID\"=\"T2\".\"ID\"\
  )\n```\n\n要理解问题所在，必须仔细分析为何查询优化器无法计算出良好的估算值。基数是通过将选择性乘以表中的行数计算得出的。因此，如果基数出错，问题可能仅由三个原因造成：错误的选择性、错误的行数，或是查询优化器中的一个错误。\n\
  \n在本例中，我们的分析应从查看操作 4 的估算开始。换句话说，就是与谓词 `\"T1\".\"COL1\"=666` 相关的估算。由于查询优化器的估算基于对象统计信息，我们来看看这些统计信息是否描述了当前数据。通过以下查询，你可以获取操作\
  \ 4 所使用的索引 `t1_col1` 的对象统计信息，同时还可以计算每个键的平均行数。在没有直方图的情况下，这基本上就是查询优化器所使用的值。\n\n```sql\n\
  SQL> SELECT num_rows, distinct_keys, num_rows/distinct_keys AS avg_rows_per_key\n\
  \  2 FROM user_indexes\n  3 WHERE index_name = 'T1_COL1';\n\n  NUM_ROWS  DISTINCT_KEYS\
  \ AVG_ROWS_PER_KEY\n----------  ------------- ----------------\n     160000    \
  \      5000               32\n```\n\n值得注意的是，在本例中，平均行数 32 与之前执行计划中的估计基数相同。要检查这些对象统计信息是否准确，需要将它们与实际数据进行比较。因此，让我们在表\
  \ `t1` 上执行以下查询。如你所见，该查询不仅计算了前一个查询的对象统计信息，还统计了列 `col1` 不等于 666 的行数。\n\n```sql\nSQL>\
  \ SELECT count(*) AS num_rows, count(DISTINCT col1) AS distinct_keys,\n  2     \
  \    count(nullif(col1,666)) AS rows_per_key_666\n  3  FROM t1;\n\nNUM_ROWS  DISTINCT_KEYS\
  \ ROWS_PER_KEY_666\n---------  ------------- ----------------\n  160000        \
  \    5000            79984\n```\n\n从输出结果可以确认，对象统计信息不仅正确，而且数据分布存在严重的倾斜。因此，要获得准确的估算，直方图是绝对必要的。通过以下查询，可以确认本例中不存在直方图：\n\
  \n```sql\nSQL> SELECT histogram, num_buckets\n  2  FROM user_tab_col_statistics\n\
  \  3  WHERE table_name = 'T1' AND column_name = 'COL1';\n\nHISTOGRAM       NUM_BUCKETS\n\
  --------------- -----------\nNONE                      1\n```\n\n在收集了缺失的直方图后，查询优化器成功地准确估计了基数，并因此认为另一个执行计划是最高效的。\n\
  \n```\n---------------------------------------------------------------\n| Id  |\
  \ Operation           | Name | Starts | E-Rows | A-Rows |\n---------------------------------------------------------------\n\
  |   1 |  SORT AGGREGATE     |      |      1 |      1 |      1 |\n|*  2 |   HASH\
  \ JOIN         |      |      1 |  80000 |  75808 |\n|*  3 |    TABLE ACCESS FULL|\
  \ T1   |      1 |  80000 |  80016 |\n|   4 |    TABLE ACCESS FULL| T2   |      1\
  \ |    151K|    151K|\n---------------------------------------------------------------\n\
  ```\n\n\n\n### 限制未被识别\n\n我必须提醒你，前一节介绍的检查方法优于本节这一种。通常，只有在无法应用第一种方法时，我才会使用这第二种检查。例如，当读取由\
  \ TKPROF 生成的输出，而其中仅提供了实际基数时，就可能发生这种情况。当然，总是可以生成估计基数并应用前一节描述的检查。然而，如果执行计划的数量很多，这就很麻烦了。\n\
  \n这种检查的思路是验证查询优化器是否正确识别了 SQL 语句中的限制，并因此尽早应用了它。换句话说，你需要确认执行计划不会导致不必要的处理。\n\n让我用一个例子来说明这个概念。这里，通过脚本\
  \ `restriction_not_recognized.sql` 生成一个跟踪文件，然后用 TKPROF 进行分析。以下是 TKPROF 输出的一个摘录。从中你可以看到，查询优化器决定开始将表\
  \ `t1` 与表 `t2` 进行连接。这第一个连接返回了一个包含 40,000 行的结果集。之后，该结果集与表 `t3` 进行了连接。最终生成的结果集只有 100\
  \ 行，尽管读取表 `t3` 的操作返回了 80,000 行。这仅仅意味着查询优化器未能识别出那个限制，并在已经执行了大量处理后过晚地应用了它。\n\n```\n\
  Rows     Row Source Operation\n-------  ---------------------------------------------------\n\
  \      1  SORT AGGREGATE (cr=2337 pr=4254 pw=2133 time=1594879 us)\n    100   HASH\
  \ JOIN  (cr=2337 pr=4254 pw=2133 time=1541152 us)\n  40000    HASH JOIN  (cr=1018\
  \ pr=1453 pw=645 time=597110 us)\n  20000     TABLE ACCESS FULL T1 (cr=329 pr=125\
  \ pw=0 time=140064 us)\n  40000     TABLE ACCESS FULL T2 (cr=689 pr=683 pw=0 time=640647\
  \ us)\n  80000    TABLE ACCESS FULL T3 (cr=1319 pr=1313 pw=0 time=321009 us)\n```\n\
  \n在这个特定案例中，问题似乎与连接基数的估计有关。顺便提一下，这是查询优化器必须执行的最困难的任务之一。为了验证这个假设，你可以使用 `EXPLAIN PLAN`\
  \ 这条 SQL 语句，例如，来生成以下输出。从中你可以看到，查询优化器期望第二次连接返回 79,800 行，而运行时实际只有 100 行。\n\n```\n\
  ---------------------------------------------\n| Id  | Operation            | Name\
  \ | Rows  |\n---------------------------------------------\n|   0 | SELECT STATEMENT\
  \     |      |     1 |\n|   1 |  SORT AGGREGATE      |      |     1 |\n|*  2 | \
  \  HASH JOIN          |      | 79800 |\n|*  3 |    HASH JOIN         |      | 40000\
  \ |\n|   4 |     TABLE ACCESS FULL| T1   | 20000 |\n|   5 |     TABLE ACCESS FULL|\
  \ T2   | 40000 |\n|   6 |    TABLE ACCESS FULL | T3   | 80000 |\n---------------------------------------------\n\
  ```\n\n当你遇到这类问题时，你能做的很少。实际上，没有描述两个表之间关系的**对象统计信息**。纠正这类情况的一种可能方法是使用 SQL 配置文件。在此案例中应用一个\
  \ SQL 配置文件，将为你带来以下执行计划。（我将在第 7 章介绍 SQL 配置文件是什么以及它是如何工作的。）眼下，重要的是认识到存在解决方案。注意，不仅连接的顺序改变了（`t2`\
  \ ![images/U001.jpg](img/U001.jpg) `t3` ![images/U001.jpg](img/U001.jpg) `t1`），而且对表\
  \ `t1` 的访问方式也不同了。\n\n```\nRows     Row Source Operation\n-------  ---------------------------------------------------\n\
  \      1  SORT AGGREGATE (cr=2210 pr=2708 pw=713 time=561754 us)\n    100   NESTED\
  \ LOOPS  (cr=2210 pr=2708 pw=713 time=336045 us)\n    100    HASH JOIN  (cr=2008\
  \ pr=2708 pw=713 time=335609 us)\n  40000     TABLE ACCESS FULL T2 (cr=689 pr=683\
  \ pw=0 time=320792 us)\n  80000     TABLE ACCESS FULL T3 (cr=1319 pr=1312 pw=0 time=560235\
  \ us)\n    100    TABLE ACCESS BY INDEX ROWID T1 (cr=202 pr=0 pw=0 time=5632 us)\n\
  \    100     INDEX UNIQUE SCAN T1_PK (cr=102 pr=0 pw=0 time=2428 us)\n```\n\n值得注意的是，这个检查可以与前一节描述的检查同时应用。无论如何，两者都应该指出，针对同一操作的估计存在一些问题。由于两项检查都揭示了相同的问题，所以在可能的情况下，最好只使用前一节描述的检查。以下是输出的一个摘录，比较了估计值与实际值：\n\
  \n```\n----------------------------------------------------------------\n| Id  |\
  \ Operation            | Name | Starts | E-Rows | A-Rows |\n----------------------------------------------------------------\n\
  |   1 |  SORT AGGREGATE      |      |      1 |      1 |      1 |\n|*  2 |   HASH\
  \ JOIN          |      |      1 |  79800 |    100 |\n|*  3 |    HASH JOIN      \
  \   |      |      1 |  40000 |  40000 |\n|   4 |     TABLE ACCESS FULL| T1   | \
  \     1 |  20000 |  20000 |\n|   5 |     TABLE ACCESS FULL| T2   |      1 |  40000\
  \ |  40000 |\n|   6 |    TABLE ACCESS FULL | T3   |      1 |  80000 |  80000 |\n\
  ----------------------------------------------------------------\n```\n\n### 接下来是第\
  \ 7 章\n\n在本章中，我描述了如何通过 SQL 语句 `EXPLAIN PLAN`、动态性能视图以及一些跟踪工具来获取执行计划。正如对前两种技术的讨论，包\
  \ `dbms_xplan` 是提取和格式化执行计划的首选工具。通过它，你可以轻松地获取所需的所有信息，从而理解执行计划。同时还讨论了一些解读执行计划以及判断它们是否高效的规则。\n\
  \n显然，低效的执行计划需要进行调整。下一章将描述可用于此目的的 SQL 调整技术。请注意，有多种技术，因为每种技术只能应用于特定情况或仅用于调整特定问题。\n\
  \n* * *\n\n1. 换句话说，它是一个使用 `on commit preserve rows` 选项创建的全局临时表。\n2. 在 Oracle9*i*\
  \ 中，该手册名为 *《数据库性能调整指南与参考》*。\n3. 截至 Oracle Database 10*g* 第 1 版，它是一个 `VARCHAR2(200)`。从\
  \ Oracle Database 10*g* 第 2 版开始，它是一个 `VARCHAR2(300)`。\n\n\n\n### 第七章\n#### SQL 调优技术\n\
  \n当查询优化器无法自动生成高效的执行计划时，就需要进行一些手动调优。为此，Oracle 提供了多种技术。表 7-1 对它们进行了总结。本章的目标不仅是详细描述这些技术，还要解释每种技术能为你做什么，以及你可以在哪些情况下利用它们。要选择其中一种，必须问自己三个基本问题：\n\
  \n*   SQL 语句是否已知且静态？\n*   采取的措施应该影响单个 SQL 语句，还是单个会话（甚至整个系统）执行的所有 SQL 语句？\n*   是否可以更改\
  \ SQL 语句？\n\n让我解释一下为什么这三个问题如此重要。首先，有时 SQL 语句根本未知，因为它们是在运行时生成的，并且实际上每次执行都可能不同。在其他情况下，查询优化器无法正确处理特定结构（例如无法通过索引应用的\
  \ `WHERE` 子句中的限制条件），而这些结构被大量 SQL 语句使用。在这两种情况下，你都必须使用能在会话或系统层面解决问题的技术，而不是在 SQL 语句层面。这导致了两个主要问题。一方面，如表\
  \ 7-1 所示，几种技术只能用于特定的 SQL 语句，它们根本无法在会话或系统层面应用。另一方面，正如第 5 章所解释的，一旦你的数据库模式良好且查询优化器配置正确，通常只需要调优少量的\
  \ SQL 语句。因此，你希望避免使用会影响那些查询优化器自动提供高效执行计划的 SQL 语句的技术。\n\n其次，当你处理一个无法控制其 SQL 语句的应用程序时（无论是由于代码不可用，如打包的应用程序，还是由于它在运行时生成\
  \ SQL 语句），你就不能使用需要修改代码的技术。总而言之，很多时候，你的选择是受限的。\n\n**表 7-1.** *SQL 调优技术及其影响*\n\n|\
  \ **技术** | **系统** | **会话** | **SQL 语句** | **可用性** |\n| :--- | :--- | :--- | :---\
  \ | :--- |\n| 更改访问结构 | ![image](img/P0001.jpg) |  |  | 所有版本 |\n| 更改 SQL 语句 |  |\
  \  | ![image](img/P0001.jpg)^* | 所有版本 |\n| 提示 |  |  | ![image](img/P0001.jpg)^*\
  \ | 所有版本 |\n| 更改执行环境 |  | ![image](img/P0001.jpg) | ![image](img/P0001.jpg)^* |\
  \ 所有版本 |\n| SQL 配置文件 |  |  | ![image](img/P0001.jpg) | 自 *10g*^+ 起 |\n| 存储的大纲 |\
  \  |  | ![image](img/P0001.jpg) | 所有版本 |\n| SQL 计划基线 |  |  | ![image](img/P0001.jpg)\
  \ | 自 *11g*^+ 起 |\n| ** 使用此技术需要更改 SQL 语句*。 |\n| *+ 需要调优包，因此也需要企业版*。 |\n| *+ 需要企业版*。\
  \ |\n\n本章的目的不是描述如何找出给定 SQL 语句的最佳执行计划（例如，解释在什么情况下应使用特定的访问或连接方法）。这方面的分析将在第 4 部分中介绍。本章的目的仅仅是描述可用的\
  \ SQL 调优技术。值得一提的是，除了更改访问结构和更改执行环境之外，所有 SQL 调优技术都基于这样一个事实：由于查询优化器的局限性，它无法确定高效的执行计划。当然，这只有在配置正确的情况下才成立。在本章中，将假设初始化参数已正确设置，并且所有必需的系统和对象统计信息都已到位。\n\
  \n描述每种 SQL 调优技术的各节都以相同的方式组织。简短的介绍之后是技术工作原理的描述以及你应在何时使用它。所有章节最后都讨论了一些常见的陷阱和误区。\n\n\
  ### 更改访问结构\n\n这项技术并不绑定于某个特定功能。SQL 语句的响应时间不仅取决于处理数据的存储方式，还取决于处理数据的访问方式，这是一个基本事实。\n\
  \n###### 工作原理\n\n在质疑 SQL 语句的性能时，你首先要做的是验证哪些访问结构已经就位。根据你在数据字典中找到的信息，你应该回答以下问题：\n\n\
  *   涉及的表的组织类型是什么？是堆表、索引组织表，还是外部表？或者表是否存储在集群中？\n*   包含所需数据的物化视图是否可用？\n*   表、集群和物化视图上存在哪些索引？索引包含哪些列，顺序如何？\n\
  *   所有这些段是如何分区的？\n\n接下来，你必须评估可用的访问结构是否足以高效地处理你正在调优的 SQL 语句。例如，在此分析过程中，你可能会发现需要额外的索引来有效支持\
  \ SQL 语句的 `WHERE` 子句。假设你正在调查以下查询的性能：\n\n```sql\nSELECT *\nFROM emp\nWHERE empno\
  \ = 7788\n```\n\n基本上，查询优化器可能会考虑以下执行计划来执行它。第一个执行计划进行全表扫描，而第二个则通过索引访问表。当然，只有索引存在时，才会考虑第二个计划。\n\
  \n```\n-------------------------------\n| Id | Operation       | Name |\n-------------------------------\n\
  |  0 | SELECT STATEMENT |      |\n|  1 |  TABLE ACCESS FULL| EMP  |\n-------------------------------\n\
  ```\n\n```\n-------------------------------------------\n| Id | Operation      \
  \             | Name   |\n-------------------------------------------\n|  0 | SELECT\
  \ STATEMENT             |        |\n|  1 |  TABLE ACCESS BY INDEX ROWID | EMP  \
  \  |\n|  2 |   INDEX UNIQUE SCAN          | EMP_PK |\n-------------------------------------------\n\
  ```\n\n关于此主题的更多信息在此不再提供，因为第 4 部分将详细讨论何时以及如何使用不同的访问结构。目前，只需认识到这是一项基本的 SQL 调优技术就足够了。\n\
  \n###### 何时使用它\n\n如果没有必要的访问结构，可能无法调优 SQL 语句。因此，只要你能更改访问结构，就应该考虑使用此技术。不幸的是，这并不总是可行的，例如当你使用打包的应用程序且供应商不支持更改访问结构时。\n\
  \n\n\n###### 陷阱与误区\n\n在修改访问结构时，必须仔细考虑可能的副作用。一般而言，每个被修改的访问结构都会同时带来正面和负面影响。实际上，这种措施的影响不太可能仅限于单个\
  \ SQL 语句。很少有情况不是这样。例如，如果你像之前的例子那样添加了一个索引，就必须考虑到该索引会减慢对索引表的每一次 `INSERT` 和 `DELETE`\
  \ 语句的执行，以及每一次修改了索引列的 `UPDATE` 语句的执行。还应检查是否有足够的可用空间来添加访问结构。综合考虑，在修改访问结构之前，有必要仔细权衡利弊。\n\
  \n### 修改 SQL 语句\n\nSQL 是一种非常强大且灵活的查询语言。通常，你可以用许多不同的方式提交相同的请求。这对开发者来说特别有用。然而，对于查询优化器来说，为所有种类的\
  \ SQL 语句提供高效的执行计划是一个真正的挑战。请记住，灵活性是性能的敌人。\n\n###### 工作原理\n\n假设你在模式 `scott` 中选择所有没有员工的部门。以下四条\
  \ SQL 语句（可以在脚本 `depts_wo_emps.sql` 中找到）都能返回你要查找的信息：\n\n`SELECT deptno FROM dept\
  \ WHERE deptno NOT IN (SELECT deptno FROM emp)`\n\n`SELECT deptno FROM dept WHERE\
  \ NOT EXISTS (SELECT 1 FROM emp WHERE emp.deptno = dept.deptno)`\n\n`SELECT deptno\
  \ FROM dept MINUS SELECT deptno FROM emp`\n\n`SELECT dept.deptno FROM dept, emp\
  \ WHERE dept.deptno = emp.deptno(+) AND emp.deptno IS NULL`\n\n这些 SQL 语句的目的是相同的。它们返回的结果也是一样的。因此，你可能期望查询优化器在所有情况下都提供相同的执行计划。然而，事实并非如此。实际上，只有第二条和第四条语句使用了相同的执行计划。其他的则大不相同。请注意，这些执行计划是在\
  \ Oracle Database 10*g* Release 2 上生成的。其他版本可能会生成不同的执行计划。\n\n```\n-----------------------------------\n\
  | Id | Operation        | Name    |\n-----------------------------------\n|  0 |\
  \ SELECT STATEMENT |         |\n|  1 |  INDEX FULL SCAN | DEPT_PK |\n|  2 |   TABLE\
  \ ACCESS FULL| EMP   |\n-----------------------------------\n```\n\n```\n------------------------------------\n\
  | Id | Operation         | Name    |\n------------------------------------\n|  0\
  \ | SELECT STATEMENT  |         |\n|  1 | HASH JOIN ANTI    |         |\n|  2 |\
  \  INDEX FULL SCAN  | DEPT_PK |\n|  3 |  TABLE ACCESS FULL| EMP     |\n------------------------------------\n\
  ```\n\n```\n---------------------------------------\n| Id  | Operation         \
  \  | Name    |\n---------------------------------------\n|   0 | SELECT STATEMENT\
  \    |         |\n|   1 |  MINUS              |         |\n|   2 |   SORT UNIQUE\
  \ NOSORT|         |\n|   3 |    INDEX FULL SCAN  | DEPT_PK |\n|   4 |   SORT UNIQUE\
  \       |         |\n|   5 |    TABLE ACCESS FULL| EMP     |\n---------------------------------------\n\
  ```\n\n```\n--------------------------------------\n| Id  | Operation          |\
  \ Name    |\n--------------------------------------\n|   0 | SELECT STATEMENT  \
  \ |         |\n|   1 |  HASH JOIN ANTI    |         |\n|   2 |   INDEX FULL SCAN\
  \  | DEPT_PK |\n|   3 |   TABLE ACCESS FULL| EMP     |\n--------------------------------------\n\
  ```\n\n基本上，尽管访问数据的方法始终相同，但用于组合数据以生成结果集的方法却不同。在这个特定案例中，两个表都非常小，因此，使用这三种执行计划你不会注意到任何真实的性能差异。自然，如果你处理的是大得多的表，情况可能就不一定如此了。一般来说，当你处理大量数据时，执行计划中的每一个微小差异都可能导致响应时间或资源利用率上的显著差异。\n\
  \n这里的要点是意识到，相同的数据可以通过不同的 SQL 语句来提取。每当你在调优一条 SQL 语句时，都应该问问自己是否存在其他等效的 SQL 语句。如果存在，请仔细比较它们，以评估哪一个能提供最佳性能。\n\
  \n#### 适用时机\n\n每当你能够修改 SQL 语句时，都应该考虑使用此技术。没有理由不这么做。\n\n###### 陷阱与误区\n\nSQL 语句就是代码。编写代码的第一条规则是使其易于维护。首先，这意味着它应该可读且简洁。不幸的是，对于\
  \ SQL 而言，由于前述原因，编写 SQL 语句最简单或最可读的方式并不总是能带来最高效的执行计划。因此，在某些情况下，你可能会为了性能而被迫放弃可读性和简洁性，尽管这只有在确有必要且有利可图时才应为之。\n\
  \n### 提示\n\n根据 Merriam-Webster 在线词典，`hint` 是一个间接的或概括性的建议。在 Oracle 的术语中，提示的定义略有不同。简而言之，提示是添加到\
  \ SQL 语句中以影响查询优化器决策的指令。换句话说，它是促使采取某种行动的东西，而不仅仅是提出建议。在我看来，Oracle 在命名此特性时选择这个词并不是最佳的。无论如何，名称并不那么重要。重要的是提示能为你做什么。只是别让这个名字误导你。\n\
  \n* * *\n\n`注意` 仅仅因为提示是一个指令，并不意味着查询优化器总会使用它。或者，换一个角度看，仅仅因为查询优化器没有使用某个提示，也并不意味着提示仅仅是一个建议。正如我将要描述的，有些情况下提示根本就不相关或不合法，因此它对查询优化器生成的执行计划没有影响。\n\
  \n* * *\n\n\n\n###### 工作原理\n\n## 什么是提示？\n\n以下部分将阐述提示的定义、存在的提示类别以及如何使用它们。在查看细节之前，需要注意的一个关键点是：使用提示并不像你想象的那么简单。实际上，在实践中，看到被错误应用的提示是相当常见的。\n\
  \n在优化一条 SQL 语句时，查询优化器可能需要考虑大量的执行计划。理论上，它应该考虑所有可能的执行计划。但在实践中，除了简单的 SQL 语句外，为了保持优化时间合理，考虑太多组合是不可行的。因此，查询优化器会先验地排除掉一些执行计划。当然，完全忽略其中一些执行计划的决定可能是关键性的，查询优化器的可信度在此过程中会受到影响。\n\
  \n每当你指定一个提示时，你的目标都是减少查询优化器考虑的执行计划数量。基本上，你通过一个提示告诉查询优化器，对于一条特定的 SQL 语句，哪些操作应该或不应该被考虑。例如，假设查询优化器需要为以下查询生成执行计划：\n\
  \n```sql\nSELECT *\nFROM emp\nWHERE empno = 7788\n```\n\n如果表 `emp` 是一个堆表，并且其列 `empno`\
  \ 建有索引，查询优化器至少会考虑两种执行计划。第一种是通过全表扫描来完整读取 `emp` 表：\n\n```\n---------------------------------\n\
  | Id  | Operation        | Name |\n---------------------------------\n|   0 | SELECT\
  \ STATEMENT |      |\n|   1 | TABLE ACCESS FULL| EMP  |\n---------------------------------\n\
  ```\n\n第二种是基于 `WHERE` 子句中的谓词 (`empno = 7788`) 进行索引查找，然后通过索引中找到的 rowid 来访问表：\n\n\
  ```\n---------------------------------------------\n| Id  | Operation          \
  \         | Name   |\n---------------------------------------------\n|   0 | SELECT\
  \ STATEMENT            |        |\n|   1 | TABLE ACCESS BY INDEX ROWID | EMP   \
  \ |\n|   2 | INDEX UNIQUE SCAN           | EMP_PK |\n---------------------------------------------\n\
  ```\n\n在这种情况下，为了控制查询优化器提供的执行计划，你可以添加一个提示，指定使用全表扫描或索引扫描。需要理解的重要一点是，你不能告诉查询优化器：“我想要对表\
  \ `emp` 进行全表扫描，所以请搜索包含它的执行计划。”然而，你可以告诉它：“如果你必须在表 `emp` 的全表扫描和索引扫描之间做决定，请选择全表扫描。”这是一个细微但根本性的区别。当查询优化器必须在几种可能性之间选择时，提示可以让你影响它。\n\
  \n为了进一步强调这个关键点，让我们以 图 7-1 中展示的决策树为例。请注意，即使查询优化器使用决策树工作，这也是一个不直接与 Oracle 相关的通用示例。在\
  \ 图 7-1 中，目标是从根节点 (1) 开始，下降到叶节点 (111–123)。换句话说，目标是选择一条从点 A 到点 B 的路径。假设由于某种原因，必须经过节点\
  \ 122。为此，按照 Oracle 的术语，添加了两个提示来剪除从节点 12 到节点 121 和 123 的路径。这样，从节点 12 继续的唯一路径就通向节点\
  \ 122。但这还不足以确保路径经过节点 122。事实上，如果在节点 1 它走的是节点 11 而不是节点 12，那么这两个提示将永远不会生效。因此，为了引导路径经过节点\
  \ 122，你应该添加另一个提示来剪除从节点 1 到节点 11 的路径。\n\n查询优化器也可能发生类似的情况。实际上，提示只在它们适用于查询优化器必须做出的决策时才会被评估。不多也不少。因此，一旦你指定了一个提示，你可能被迫添加多个提示才能确保它有效。而且，在实践中，随着执行计划复杂性的增加，找到所有能导向期望执行计划的必要提示变得越来越困难。\n\
  \n![image](img/0701.jpg)\n\n`图 7-1.` 决策树的剪枝\n\n## 指定提示\n\n提示是 Oracle 的扩展功能。为了不破坏\
  \ SQL 语句与其他数据库引擎的兼容性，Oracle 决定将它们作为一种特殊的注释来添加。注释和提示之间的唯一区别如下：\n\n*   提示必须紧跟在 `DELETE`、`INSERT`、`MERGE`、`SELECT`\
  \ 和 `UPDATE` 关键字之后。换句话说，它们不能像注释那样可以指定在 SQL 语句的任何位置。\n*   注释分隔符后的第一个字符必须是加号 (`+`)。\n\
  \n提示中的语法错误不会引发错误。如果解析器无法解析它们，它们就会被视为真正的注释。也可以混合使用注释和提示。以下是两个示例，展示了如何为前面部分讨论的查询强制对表\
  \ `emp` 进行全表扫描：\n\n```sql\nSELECT /*+ full(emp) */ *\nFROM emp\nWHERE empno = 7788\n\
  ```\n\n```sql\nSELECT --+ full(emp) you can also add a real comment without invalidating\
  \ the hint\n       *\nFROM emp\nWHERE empno = 7788\n```\n\n## 提示的类别\n\n有几种方法（角度）可以对提示进行分类。我个人喜欢将它们分为以下几类：\n\
  \n\n\n"
- "# Oracle SQL 提示的分类与使用\n\n## 提示分类\n\n*   *初始化参数提示* 会覆盖在系统或会话级别定义的一些初始化参数设置。我将以下提示归为此类：`all_rows`、`cursor_sharing_exact`、`dynamic_sampling`、`first_rows`、`gather_plan_statistics`、`no_cpu_costing`、`optimizer_features_enable`、`opt_param`、`no_result_cache`、`result_cache`\
  \ 和 `rule`。我将在本章后面的“更改执行环境”一节中介绍这些提示，并在第 6 章中介绍了 `gather_plan_statistics` 提示。请注意，当指定这些提示时，它们总是会覆盖在实例或会话级别设置的值。\n\
  *   *查询转换提示* 在逻辑优化阶段控制查询转换技术的使用。我将以下提示归为此类：`no_eliminate_join`、`eliminate_join`、`no_expand`、`no_merge`、`merge`、`no_outer_join_to_inner`、`outer_join_to_inner`、`no_push_pred`、`push_pred`、`no_push_subq`、`push_subq`、`no_query_transformation`、`no_rewrite`、`rewrite`、`no_unnest`、`unnest`、`no_xmlindex_rewrite`、`no_xml_query_rewrite`\
  \ 和 `use_concat`。我将在本章后面介绍其中一些提示，并在第 10 章和第 11 章中介绍另一些提示。\n*   *访问路径提示* 控制访问数据的方法（例如，是否使用索引）。我将以下提示归为此类：`cluster`、`full`、`hash`、`no_index`、`index`、`index_asc`、`index_combine`、`index_desc`、`no_index_ffs`、`index_ffs`、`index_join`、`no_index_ss`、`index_ss`、`index_ss_asc`\
  \ 和 `index_ss_desc`。我将在第 9 章中结合访问方法介绍这些提示。\n*   *连接提示* 不仅控制连接方法，还控制连接表的顺序。我将以下提示归为此类：`leading`、`no_nlj_batching`、`nlj_batching`、`ordered`、`no_star_transformation`、`star_transformation`、`no_swap_join_inputs`、`swap_join_inputs`、`no_use_hash`、`use_hash`、`no_use_merge`、`use_merge`、`use_merge_cartesian`、`no_use_nl`、`use_nl`\
  \ 和 `use_nl_with_index`。我将在第 10 章中结合连接方法介绍这些提示。\n*   *并行处理提示* 控制如何使用并行处理。我将以下提示归为此类：`no_parallel`、`parallel`、`no_parallel_index`、`parallel_index`、`pq_distribute`、`no_px_join_filter`\
  \ 和 `px_join_filter`。我将在第 11 章中结合并行处理介绍这些提示。提示 `pq_distribute` 的一个可能用法与第 10 章中的分区智能连接一起提供。\n\
  *   *其他提示* 控制与前述类别无关的其他功能的使用。我将以下提示归为此类：`no_append`、`append`、`no_cache`、`cache`、`driving_site`、`model_min_analysis`、`no_monitor`、`monitor`\
  \ 和 `qb_name`。我将在本章后面介绍 `qb_name` 提示，并在第 11 章中介绍另一些提示。\n\n尽管在本书中我描述或展示了许多关于这些提示的示例，但我既不会提供实际的参考资料，也不会提供它们的完整语法。此类参考资料在\
  \ *SQL 参考手册*的第 2 章中给出。\n\n值得指出的是，有许多用于禁用特定操作或功能的提示（以 `no_` 为前缀的提示）可用。这很好，因为有时指定不应使用的操作或功能比指定应使用的操作或功能更容易。\n\
  \n上面提供的提示列表并不完整。事实上，还有一些未被记录且仅供 Oracle 内部使用的提示。你将在本章后面的“SQL 配置文件”一节中看到一些示例。截至 Oracle\
  \ Database 11*g*，你可以查询视图 `v$sql_hint` 来获取可能是完整的提示列表。\n\n## 提示的有效性\n\n简单的 SQL 语句只有一个查询块。每当使用视图或子查询、内联视图和集合运算符等构造时，就会存在多个查询块。例如，以下查询有两个查询块（我仅出于说明目的使用子查询因子化子句，而不是定义真实的视图）。第一个是引用表\
  \ `dept` 的主查询。第二个是引用表 `emp` 的子查询：\n\n```sql\nWITH emps AS (SELECT deptno, count(*)\
  \ AS cnt\n              FROM emp\n              GROUP BY deptno)\nSELECT dept.dname,\
  \ emps.cnt\nFROM dept, emps\nWHERE dept.deptno = emps.deptno\n```\n\n初始化参数提示对整个\
  \ SQL 语句有效。所有其他提示仅对单个查询块有效。对单个查询块有效的提示必须指定在它们控制的块中。例如，如果想为前面查询中的两个表指定访问路径提示，则必须将一个提示添加到主查询中，另一个添加到子查询中。两者的有效性都限制在定义它们的查询块内。\n\
  \n```sql\nWITH\nemps AS (SELECT /*+ full(emp) */ deptno, count(*) AS cnt\n     \
  \      FROM emp\n           GROUP BY deptno)\nSELECT /*+ full(dept) */ dept.dname,\
  \ emps.cnt\nFROM dept, emps\nWHERE dept.deptno = emps.deptno\n```\n\n此规则的例外是*全局提示*。通过它们，可以使用点表示法引用其他查询块中包含的对象（前提是这些对象已命名）。例如，在下面的\
  \ SQL 语句中，主查询包含一个用于子查询的提示。注意子查询名称是如何用于引用的。\n\n```sql\nWITH\n  emps AS (SELECT deptno,\
  \ count(*) AS cnt\n           FROM emp\n           GROUP BY deptno)\nSELECT /*+\
  \ full(dept) full(emps.emp) */ dept.dname, emps.cnt\nFROM dept, emps\nWHERE dept.deptno\
  \ = emps.deptno\n```\n\n全局提示的语法支持两级以上的引用（例如，对另一个视图中引用的视图）。对象只需用点分隔即可。\n\n由于 `WHERE`\
  \ 子句中的子查询没有命名，因此无法使用全局提示引用它们的对象。为了解决这个问题，从 Oracle Database 10*g* 开始，有另一种方法可以实现相同的结果。实际上，大多数提示都接受一个参数来指定它们对哪个查询块有效。通过这种方式，提示可以分组放在\
  \ SQL 语句的开头，并简单地引用它们所应用的查询块。为了允许这些引用，查询优化器不仅为每个查询块生成一个*查询块名称*，还允许你通过 `qb_name` 提示指定自己的名称。例如，在以下查询中，两个查询块分别称为\
  \ `main` 和 `sq`。然后，在 `full` 提示中，通过在查询块名称前加上“at”符号（`@`）来引用它们。注意，子查询中表 `emp` 的访问路径提示是在主查询中指定的。\n\
  \n```sql\nWITH\nemps AS (SELECT /*+ qb_name(sq) */ deptno, count(*) AS cnt\n   \
  \        FROM emp\n           GROUP BY deptno)\nSELECT /*+ qb_name(main) full(@main\
  \ dept) full(@sq emp) */ dept.dname, emps.cnt\nFROM dept, emps\nWHERE dept.deptno\
  \ = emps.deptno\n```\n\n前面的例子展示了如何指定你自己的名称。现在让我们看看如何使用查询优化器生成的名称。首先，你必须知道它们是什么。为此，你可以使用\
  \ SQL 语句 `EXPLAIN PLAN` 和包 `dbms_xplan`，如下面的示例所示。注意，将选项 `alias` 传递给函数 `display`\
  \ 以确保查询块名称和别名是输出的一部分。\n\n```sql\nSQL> EXPLAIN PLAN FOR\n  2  WITH\n  3    emps AS\
  \ (SELECT deptno, count(*) AS cnt\n  4             FROM emp\n  5             GROUP\
  \ BY deptno)\n  6  SELECT dept.dname, emps.cnt\n  7  FROM dept, emps\n  8  WHERE\
  \ dept.deptno = emps.deptno;\n```\n\n\n\n```sql\nSQL> SELECT * FROM table(dbms_xplan.display(NULL,\
  \ NULL, 'basic `+alias`'));\n\n-------------------------------------------------------\n\
  | Id  | Operation                       | Name        |\n-------------------------------------------------------\n\
  |   0 | SELECT STATEMENT                |             |\n|   1 |    MERGE JOIN \
  \                  |             |\n|   2 |     TABLE ACCESS BY INDEX ROWID | DEPT\
  \        |\n|   3 |      INDEX FULL SCAN            | DEPT_PK     |\n|   4 |   \
  \  SORT JOIN                   |             |\n|   5 |      VIEW              \
  \         |             |\n|   6 |       HASH GROUP BY             |           \
  \  |\n|   7 |        TABLE ACCESS FULL        | EMP         |\n------------------------------------------------------\n\
  \n   1 - SEL$2\n   2 - SEL$2 / DEPT@SEL$2\n   3 - SEL$2 / DEPT@SEL$2\n   5 - SEL$1\
  \ / EMPS@SEL$2\n   6 - SEL$1\n   7 - SEL$1 / EMP@SEL$1\n```\n\n系统生成的查询块名称由一个前缀后接一个字母数字字符串组成。前缀基于查询块中包含的操作。表\
  \ 7-2 对其进行了总结。字母数字字符串是根据 SQL 语句解析期间查询块的位置（从左到右）对其进行的编号。在上面的示例中，主查询块被命名为 `SEL$2`，子查询块被命名为\
  \ `SEL$1`。\n\n**表 7-2.** *查询块名称中使用的前缀*\n\n| **前缀** | **用于** |\n| --- | --- |\n|\
  \ `CRI$` | `CREATE INDEX` 语句 |\n| `DEL$` | `DELETE` 语句 |\n| `INS$` | `INSERT` 语句\
  \ |\n| `MISC$` | 其他 SQL 语句，如 `LOCK TABLE` |\n| `MRG$` | `MERGE` 语句 |\n| `SEL$` |\
  \ `SELECT` 语句 |\n| `SET$` | 集合操作符，如 `UNION` 和 `MINUS` |\n| `UPD$` | `UPDATE` 语句\
  \ |\n\n如上所示，系统生成的查询块名称的使用方式与用户定义的查询块名称并无不同。\n\n```sql\nWITH\n  emps AS (SELECT deptno,\
  \ count(*) AS cnt\n           FROM emp\n           GROUP BY deptno)\nSELECT /*+\
  \ `full(@sel$2 dept) full(@sel$1 emp)` */ dept.dname, emps.cnt\nFROM dept, emps\n\
  WHERE dept.deptno = emps.deptno\n```\n\n关于查询转换阶段生成的查询块命名，我还有最后一点要说明。由于它们在解析时不属于\
  \ SQL 语句的一部分，因此无法像其他查询块那样进行编号。在这种情况下，查询优化器会为它们生成一个八字符的哈希值。下面的例子展示了这种情况。其中，系统生成的查询块名称是\
  \ `SEL$5DA710D3`。\n\n```sql\nSQL> EXPLAIN PLAN FOR\n  2  SELECT deptno\n  3  FROM\
  \ dept\n  4  WHERE NOT EXISTS (SELECT 1 FROM emp WHERE emp.deptno = dept.deptno);\n\
  \nSQL> SELECT * FROM table(dbms_xplan.display(NULL,NULL,'basic +alias'));\n\n--------------------------------------\n\
  | Id  | Operation          | Name    |\n--------------------------------------\n\
  |   0 | SELECT STATEMENT   |         |\n|   1 |  HASH JOIN ANTI    |         |\n\
  |   2 |   INDEX FULL SCAN  | DEPT_PK |\n|   3 |   TABLE ACCESS FULL| EMP     |\n\
  --------------------------------------\n1 - `SEL$5DA710D3`\n2 - `SEL$5DA710D3` /\
  \ DEPT@`SEL$1`\n3 - `SEL$5DA710D3` / EMP@`SEL$2`\n```\n\n在上面的输出中，有趣的是，当发生此类转换时，执行计划中的某些行会显示两个查询块名称。这两个名称都可以在提示中使用。然而，从查询优化器的角度来看，转换后的查询块名称（本例中为\
  \ `SEL$5DA710D3`）仅在发生完全相同的转换时才可用。\n\n###### 何时使用它\n\n提示的目的是双重的。首先，当查询优化器无法自动生成高效的执行计划时，它们可以作为方便的变通方法。在这种情况下，你会使用它们来获得更好的执行计划。需要强调的重要一点是，提示是变通方法，因此不应作为长期解决方案使用。然而，在某些情况下，它们是解决问题的唯一可行方法。其次，提示对于评估查询优化器的决策很有用，因为它们可以生成替代的执行计划。在这种情况下，你会使用它们来进行一种假设分析（what-if\
  \ analysis）。\n\n\n###### 陷阱与谬误\n\n每次你希望通过访问路径提示、连接提示或并行处理提示来锁定某个特定的执行计划时，都必须谨慎地指定足够多的提示以达到稳定性。这里的稳定性意味着，即使对象统计信息以及（在某种程度上）访问结构发生变化，计划也不会改变。为了锁定特定的执行计划，不仅需要在\
  \ SQL 语句中为每个表添加访问路径提示，还需要添加多个连接提示来控制连接方法和顺序，这种情况并不少见。请注意，其他类型的提示（例如，初始化参数提示和查询转换提示）通常不受此问题影响。\n\
  \n在处理 SQL 语句时，解析器会检查提示的语法。尽管如此，当发现语法无效的提示时，并不会引发错误。这意味着解析器将这个特定的伪提示视为注释。从某个角度看，如果这是由于打字错误造成的，这很烦人。但另一方面，这也有好处，因为它避免了因访问结构（提示中经常引用，例如，提示`index`可能引用索引名）的更改或升级到较新的数据库版本而导致已部署的应用程序中断。话虽如此，我希望能有一种方法来验证\
  \ SQL 语句中包含的提示。例如，通过`EXPLAIN PLAN`语句，应该能够简单地在这方面提供警告（例如，在`dbms_xplan`输出中添加一个新的注释）。我知道唯一能部分做到这一点的方法是设置事件`10132`。实际上，从\
  \ Oracle 数据库`10g`开始，在此事件生成的输出末尾，有一个专门介绍提示的部分。你可以在此部分检查两件事。首先，应该列出每个提示。如果某个提示缺失，则意味着它未被识别。其次，检查是否存在提示有误的通知。（在这种情况下，字段`err`的值会被设置为大于`0`。）请注意，为了获得以下输出，指定了两个相互冲突的初始化参数提示。\n\
  \n```\nDumping Hints\n=============\natom_hint=(@=0x2a96c1b err=6 resol=1 used=0\
  \ token=453 org=1 lvl=2 txt=FIRST_ROWS ())\natom_hint=(@=0x2a96c1f err=6 resol=1\
  \ used=0 token=454 org=1 lvl=2 txt=ALL_ROWS ())\n********** WARNING: SOME HINTS\
  \ HAVE ERRORS *********\n```\n\n请注意，使用这种方法，语法正确但引用了错误对象的提示不会被报告为错误。因此，这并不能最终确认一切正常。\n\
  \n在使用提示时最常见的错误之一与表别名有关。规则是：当在提示中引用一个表时，只要该表有别名，就应该使用别名而不是表名。在下面的例子中，你可以看到如何为表`emp`定义表别名(`e`)。在这种情况下，当引用该表的提示`full`使用表名时，提示无效。注意第一个例子中，使用的是索引扫描而不是想要的全表扫描：\n\
  \n```\nSQL> EXPLAIN PLAN FOR SELECT /*+ full(emp) */ * FROM emp e WHERE empno =\
  \ 778;\n\nSQL> SELECT * FROM table(dbms_xplan.display(NULL,NULL,'basic +alias'));\n\
  \n-----------------------------------------------\n| Id | Operation            \
  \         | Name   |\n-----------------------------------------------\n|   0 | SELECT\
  \ STATEMENT             |        |\n|   1 |  TABLE ACCESS BY INDEX ROWID | EMP \
  \   |\n|   2 |   INDEX UNIQUE SCAN          | EMP_PK |\n-----------------------------------------------\n\
  \n1 - SEL$1 / E@SEL$1\n2 - SEL$1 / E@SEL$1\n\nSQL> EXPLAIN PLAN FOR SELECT /*+ full(e)\
  \ */ * FROM emp e WHERE empno = 7788;\nSQL> SELECT * FROM table(dbms_xplan.display(null,null,'basic'));\n\
  \n----------------------------------\n| Id  | Operation         | Name |\n----------------------------------\n\
  |   0 | SELECT STATEMENT  |      |\n|   1 |  TABLE ACCESS FULL|  EMP |\n----------------------------------\n\
  ```\n\n应该检查但经常被遗忘的一点是升级时提示的影响。由于提示是在查询优化器无法自动提供高效执行计划的情况下方便的变通方法，但其效果取决于查询优化器所使用的决策树类型（参见图\
  \ 7-1），因此，每当包含提示的 SQL 语句在另一个数据库版本（因而也是另一个查询优化器版本）上执行时，都应仔细检查。换句话说，在针对新数据库版本验证应用程序时，最佳实践是重新检查和重新测试所有包含提示的\
  \ SQL 语句。\n\n由于视图可能在不同的上下文中使用，通常不建议在视图中指定提示。如果你确实必须在视图中添加提示，请确保这些提示对所有使用它们的模块都有意义。\n\
  \n### 更改执行环境\n\n第 5 章描述了如何配置查询优化器。该配置是所有连接到数据库引擎的用户使用的默认执行环境。因此，它必须适合大多数用户。当数据库被多个应用程序使用（例如，由于数据库服务器整合）或被一个具有不同需求（取决于所使用的模块，例如，白天是\
  \ OLTP，夜间是批处理）的应用程序使用时，单一环境在所有情况下都不合适的情况并不少见。在这种情况下，在会话级别甚至 SQL 语句级别更改执行环境可能是合适的。\n\
  \n\n###### 工作原理\n\n在会话级更改执行环境与在 SQL 语句级操作完全不同。因此，我将在两个独立的小节中分别描述这两种情况。此外，我还将介绍几个动态性能视图，这些视图显示与实例、单个会话或子游标相关的环境信息。\n\
  \n## 会话级\n\n第 5 章中描述的大多数初始化参数都可以通过 SQL 语句 `ALTER SESSION` 在会话级进行更改。因此，如果你有用户或模块需要特定的配置，你只需在会话级更改默认值即可。例如，要根据连接到数据库的用户设置执行环境，你可以使用一个配置表和一个数据库触发器，如下例所示。你可以在脚本\
  \ `exec_env_trigger.sql` 中找到这些 SQL 语句。\n\n```\nCREATE TABLE exec_env_conf (\n  username\
  \  VARCHAR2(30),\n  parameter VARCHAR2(80),\n  value     VARCHAR2(512) );\n\nCREATE\
  \ OR REPLACE TRIGGER execution_environment AFTER LOGON ON DATABASE\nBEGIN\n  FOR\
  \ c IN (SELECT parameter, value\n            FROM exec_env_conf\n            WHERE\
  \ username = sys_context('userenv','session_user'))\n  LOOP\n    EXECUTE IMMEDIATE\
  \ 'ALTER SESSION SET ' || c.parameter || '=' || c.value;\n  END LOOP;\nEND;\n/\n\
  ```\n\n然后，对于每个需要特定配置的用户，你可以为每个初始化参数在配置表中插入一行。例如，下面的两条 `INSERT` 语句在用户 `ops$cha` 登录时，在会话级更改并定义了两个参数。\n\
  \n```\nINSERT INTO exec_env_conf VALUES ('OPS$CHA', 'optimizer_mode', 'first_rows_10');\n\
  INSERT INTO exec_env_conf VALUES ('OPS$CHA', 'optimizer_dynamic_sampling', '0');\n\
  ```\n\n当然，你也可以为单个模式定义触发器，或者执行其他检查，例如基于 `userenv` 上下文进行检查。\n\n## SQL 语句级\n\nSQL 语句级的执行环境通过初始化参数提示来更改。由于使用了提示，先前描述的提示的行为和属性在此情况下同样适用。\n\
  \n并非所有构成查询优化器配置的初始化参数都可以在 SQL 语句级更改。表 7-3 总结了哪些参数和值具有对应的初始化参数提示，以便在 SQL 语句级实现相同的配置。请注意，对于某些初始化参数（例如\
  \ `cursor_sharing`），并非所有值都可以通过提示设置。\n\n**表 7-3.** 在 SQL 语句级更改查询优化器配置的提示\n\n| **初始化参数**\
  \ | **提示** |\n| --- | --- |\n| `cursor_sharing=exact` | `cursor_sharing_exact` |\n\
  | `optimizer_dynamic_sampling=x` | `dynamic_sampling(x)` |\n| `optimizer_features_enable=x.y.z`\
  \ | `optimizer_features_enable('x.y.z')` |\n| `optimizer_features_enable` 未设置 |\
  \ `optimizer_features_enable(default)` |\n| `optimizer_index_caching=x` | `opt_param('optimizer_index_caching'\
  \ x)` |\n| `optimizer_index_cost_adj=x` | `opt_param('optimizer_index_cost_adj'\
  \ x)` |\n| `optimizer_mode=all_rows` | `all_rows` |\n| `optimizer_mode=first_rows`\
  \ | `first_rows` |\n| `optimizer_mode=first_rows_x` | `first_rows(x)` |\n| `optimizer_mode=rule`\
  \ | `rule` |\n| `optimizer_secure_view_merging=x` | `opt_param('optimizer_secure_view_merging','x')`\
  \ |\n| `result_cache_mode=manual` | `no_result_cache` |\n| `result_cache_mode=force`\
  \ | `result_cache` |\n| `star_transformation_enabled=x` | `opt_param('star_transformation_enabled','x')`\
  \ |\n\n提示 `opt_param` 和 `optimizer_features_enable` 仅从 Oracle Database *10g* 开始可用。提示\
  \ `result_cache` 和 `no_result_cache` 仅从 Oracle Database *11g* 开始可用。\n\n使用提示 `dynamic_sampling`，不仅可以覆盖初始化参数\
  \ `optimizer_dynamic_sampling` 在 SQL 语句级的设置，还可以指定动态采样仅限于特定查询块中的单个表。完整的语法如下：`dynamic_sampling(@qbname\
  \ table level)`，其中 `qbname` 是查询块名称，`table` 是表别名，`level` 是动态采样级别。\n\n#### 动态性能视图\n\
  \n从 Oracle Database *10g* 开始，有三个动态性能视图提供关于执行环境的信息：\n\n*   `v$sys_optimizer_env`\
  \ 提供关于实例级执行环境的信息。例如，可以找出哪些初始化参数未设置为默认值。\n\n```\nSQL> SELECT name, value, default_value\n\
  \  2  FROM v$sys_optimizer_env\n  3  WHERE isdefault = 'NO';\n\nNAME           \
  \                VALUE  DEFAULT_VALUE\n------------------------------ ------ --------------\n\
  db_file_multiblock_read_count  16     8\n```\n\n*   `v$ses_optimizer_env` 提供关于每个会话执行环境的信息。由于没有列提供初始化参数是在系统级还是在会话级被修改的信息，因此可以使用如下查询来实现该目的：\n\
  \n```\nSQL> SELECT name, value\n  2  FROM v$ses_optimizer_env\n  3  WHERE sid =\
  \ 161 AND isdefault = 'NO'\n  4  MINUS\n  5  SELECT name, value\n  6  FROM v$sys_optimizer_env;\n\
  \nNAME            VALUE\n--------------- --------------\ncursor_sharing  force\n\
  optimizer_mode  first_rows_10\n```\n\n*   `v$sql_optimizer_env` 提供关于库缓存中每个子游标执行环境的信息。例如，使用如下查询，可以找出属于同一个父游标的两个子游标是否具有不同的执行环境。\n\
  \n```\nSQL> SELECT e0.name, e0.value AS value_child_0, e1.value AS value_child_1\n\
  \  2  FROM v$sql_optimizer_env e0, v$sql_optimizer_env e1\n  3  WHERE e0.sql_id\
  \ = e1.sql_id\n  4  AND e0.sql_id = 'gqpw5sv948u96'\n  5  AND e0.child_number =\
  \ 0\n  6  AND e1.child_number = 1\n  7  AND e0.name = e1.name\n  8  AND e0.value\
  \ <> e1.value;\n\nNAME                  VALUE_CHILD_0        VALUE_CHILD_1\n---------------------\
  \ -------------------- --------------\nhash_area_size        33554432          \
  \   131072\noptimizer_mode        first_rows_10        all_rows\ncursor_sharing\
  \        force                exact\nworkarea_size_policy  manual              \
  \ auto\n```\n\n###### 何时使用\n\n当默认配置不适用于应用程序的某部分或某部分用户时，对其进行更改是件好事。虽然在会话级更改初始化参数应该总是可行的，但只有在也可以更改\
  \ SQL 语句的情况下，才能使用提示。\n\n\n\n###### 陷阱与谬误\n\n当设置可以集中存储在数据库或应用程序中时，在会话级别更改执行环境是容易的。如果您正在使用由需要不同执行环境的应用程序共享的连接池，请格外小心。实际上，会话参数与物理连接相关联。由于物理连接可能已被另一个应用程序使用，因此每次从池中获取连接时，都必须设置执行环境（这当然是昂贵的，因为需要额外的数据库往返）。因此，如果您有需要不同执行环境的应用程序，也应该使用不同的连接池。这样，您可以为每个连接池设置单一的配置，并通过定义不同的用户连接到数据库，您或许可以将配置集中到一个简单的数据库触发器中。\n\
  \n在 SQL 语句级别更改执行环境，会面临先前针对提示描述的相同陷阱和谬误。\n\n### SQL 配置文件\n\n从 Oracle Database 10*g*\
  \ 开始，您可以将 SQL 调优委托给查询优化器的一个扩展，称为 `Automatic Tuning Optimizer`。将这个任务委托给最初无法找到高效执行计划的同一个组件，似乎有些奇怪。实际上，这两种情况非常不同。事实上，在正常情况下，查询优化器被限制必须非常快地生成执行计划，通常在亚秒级范围内。相反，可以给\
  \ `Automatic Tuning Optimizer` 更多的时间来制定一个高效的执行计划。此外，它还能够使用耗时的技术，例如假设分析，并充分利用动态采样技术来验证其估计。\n\
  \n`Automatic Tuning Optimizer` 通过 `SQL Tuning Advisor` 暴露出来。它的目的是分析 SQL 语句，并建议如何通过收集缺失或过时的对象统计信息、创建新索引、修改\
  \ SQL 语句或接受 SQL 配置文件来提升其性能。接下来的章节将专门讨论与 SQL 配置文件相关的建议。\n\n必须理解的是，官方上，SQL 配置文件只能通过\
  \ `SQL Tuning Advisor` 生成。然而，正如我在本节后面描述的，您也可以手动创建它们。您应该意识到，Oracle 可能不支持此技术。如需更多信息，请联系\
  \ Oracle 支持。\n\n###### 工作原理\n\n以下部分描述了 SQL 配置文件是什么以及如何使用它们；还将提供关于其内部工作原理的信息。要管理它们，您可以使用集成到\
  \ `Enterprise Manager` 中的图形界面。我们不会在这里花时间讲解它，因为我认为，如果您了解后台发生了什么，使用图形界面将不成问题。\n\n\
  ##### 什么是 SQL 配置文件？\n\n一个 `SQL 配置文件` 是一个包含信息的对象，这些信息帮助查询优化器为特定 SQL 语句找到高效的执行计划。它提供关于执行环境、对象统计信息以及针对查询优化器所做估计的校正信息。它的主要优势之一是能够在不修改\
  \ SQL 语句或执行该语句的会话的执行环境的情况下影响查询优化器。换句话说，它对连接到数据库引擎的应用程序是透明的。要理解 SQL 配置文件如何工作，让我们看看它们是如何生成和利用的。\n\
  \n`图 7-2` 说明了生成 SQL 配置文件期间执行的步骤。简单来说，用户请求 `SQL Tuning Advisor` 对一条 SQL 语句进行调优，当提出\
  \ SQL 配置文件时，用户接受它。\n\n![image](img/0702.jpg)\n\n**图 7-2.** `生成 SQL 配置文件期间执行的主要步骤`\n\
  \n详细步骤如下：\n\n1.  用户将性能不佳的 SQL 语句传递给 `SQL Tuning Advisor`。\n2.  `SQL Tuning Advisor`\
  \ 请求 `Automatic Tuning Optimizer` 提供旨在调优该 SQL 语句的建议。\n3.  查询优化器获取系统统计信息、与 SQL 语句引用的对象相关的对象统计信息，以及设置执行环境的初始化参数。\n\
  4.  分析 SQL 语句。在此阶段，`Automatic Tuning Optimizer` 执行假设分析并部分执行 SQL 语句以确认其猜测。\n5.  `Automatic\
  \ Tuning Optimizer` 将 SQL 配置文件返回给 `SQL Tuning Advisor`。\n6.  用户接受该 SQL 配置文件。\n7.\
  \  SQL 配置文件被存储在数据字典中。\n\n`图 7-3` 说明了利用 SQL 配置文件期间执行的步骤。重要的是，这种利用对用户是完全透明的。\n\n![image](img/0703.jpg)\n\
  \n**图 7-3.** `执行 SQL 语句期间执行的主要步骤`\n\n详细步骤如下：\n\n1.  用户向 SQL 引擎发送要执行的 SQL 语句。\n2.\
  \  SQL 引擎请求查询优化器提供执行计划。\n3.  查询优化器获取系统统计信息、与 SQL 语句引用的对象相关的对象统计信息、SQL 配置文件以及设置执行环境的初始化参数。\n\
  4.  查询优化器分析 SQL 语句并生成执行计划。\n5.  执行计划被传递给 SQL 引擎。\n6.  SQL 引擎执行该 SQL 语句。\n\n接下来的章节将详细描述生成和利用\
  \ SQL 配置文件期间执行的核心步骤。重点将放在涉及用户的步骤上。让我们从描述 `SQL Tuning Advisor` 开始。\n\n##### SQL 调优顾问\n\
  \n`SQL Tuning Advisor` 的核心接口可通过 `dbms_sqltune` 包获得。此外，`Enterprise Manager` 中还集成了一个图形界面。这两个接口都允许您执行一个\
  \ `调优任务`。它们还允许您查看生成的建议并接受它。我不会在这里向您展示图形用户界面是如何工作的，因为理解幕后发生的事情更为重要。\n\n\n\n要启动一个调优任务，你必须调用函数\
  \ `create_tuning_task` 并传递以下参数之一作为参数（该函数被重载了四次以接受不同类型的参数）：\n\n*   SQL 语句的文本\n* \
  \  存储在共享池中的 SQL 语句的引用 (`sql_id`)\n*   存储在自动工作量资料档案库中的 SQL 语句的引用 (`sql_id`)\n*  \
  \ SQL 调优集的名称\n\n"
- "# SQL 调优集\n\n简而言之，SQL 调优集是存储一组 SQL 语句及其关联的执行环境、执行统计信息，以及可选的执行计划的对象。它们从 Oracle Database\
  \ 10g 开始可用。SQL 调优集使用包 `dbms_sqltune` 进行管理。你可以在*性能调优指南*手册中找到有关它们的更多信息。\n\n为了简化函数\
  \ `create_tuning_task` 的执行，使其能够接受单个 SQL 语句作为参数，我编写了脚本 `tune_last_statement.sql`。思路是你在\
  \ SQL*Plus 中执行你想要分析的 SQL 语句，然后无参数调用该脚本。该脚本从视图 `v$session` 中获取当前会话最后执行的 SQL 语句的引用\
  \ (`sql_id`)，然后创建并执行一个引用它的调优任务。脚本的核心部分是以下匿名 PL/SQL 块：\n\n```sql\nDECLARE\n  l_sql_id\
  \ v$session.prev_sql_id%TYPE;\n  l_tuning_task VARCHAR2(30);\nBEGIN\n  SELECT prev_sql_id\
  \ INTO l_sql_id\n  FROM v$session\n  WHERE audsid = sys_context('userenv','sessionid');\n\
  \  l_tuning_task := dbms_sqltune.create_tuning_task(sql_id => l_sql_id);\n  dbms_sqltune.execute_tuning_task(:tuning_task);\n\
  \  dbms_output.put_line(l_tuning_task);\nEND;\n```\n\n调优任务将其分析结果输出到多个数据字典视图中。与其直接查询这些视图（这有点麻烦），你可以使用包\
  \ `dbms_sqltune` 中的函数 `report_tuning_task` 来生成关于分析的详细报告。以下查询展示了其使用示例。注意，为了引用调优任务，使用了前面\
  \ PL/SQL 块返回的调优任务名称。\n\n```sql\nSELECT dbms_sqltune.report_tuning_task('TASK_16467')\n\
  FROM dual\n```\n\n由前面查询生成的、建议使用 SQL 配置文件的报告如下所示。请注意，这是脚本 `first_rows.sql` 生成的输出的一个摘录。\n\
  \n## 常规信息部分\n\n```sql\n调优任务名称                : TASK_16467\n调优任务所有者             \
  \  : OPS$CHA\n作用域                           : 综合\n时间限制(秒)             : 42\n完成状态\
  \               : 已完成\n开始于                      : 07/19/2007 12:45:55\n完成于     \
  \               : 07/19/2007 12:45:55\nSQL 配置文件发现数  : 1\n```\n\n## 方案名称与 SQL 文本\n\
  \n```sql\n方案名称: OPS$CHA\nSQL ID     : f3cq1hxz2d041\nSQL 文本   : SELECT * FROM T\
  \ ORDER BY ID\n```\n\n## 发现部分 (1 项发现)\n\n### 1- SQL 配置文件发现 (参见下面的执行计划部分)\n\n为此语句找到了一个可能更好的执行计划。\n\
  \n#### 建议 (估计收益：97.21%)\n\n- 考虑接受推荐的 SQL 配置文件。\n    ```sql\n    execute dbms_sqltune.accept_sql_profile(task_name\
  \ => 'TASK_16467',\n            replace => TRUE);\n    ```\n\n## 执行计划部分\n\n### 1-\
  \ 调整成本后的原始计划\n\n```sql\nPlan hash value: 961378228\n-------------------------------------------------------------------------------\n\
  | Id  | Operation        | Name| Rows  | Bytes|TempSpc| Cost (%CPU)| Time     |\n\
  -------------------------------------------------------------------------------\n\
  |   0 |SELECT STATEMENT  |     | 10000 | 1015K|       |   287   (1)| 00:00:04 |\n\
  |   1 | SORT ORDER BY    |     | 10000 | 1015K|  2232K|   287   (1)| 00:00:04 |\n\
