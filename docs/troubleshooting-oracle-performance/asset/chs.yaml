- "# 接受 SQL 配置文件\n\n包 `dbms_sqltune` 中的过程 `accept_sql_profile` 用于接受 SQL 调优顾问建议的 SQL\
  \ 配置文件。要接受前面报告中建议的 SQL 配置文件，你可以使用以下 PL/SQL 调用。参数 `task_name` 和 `task_owner` 引用建议\
  \ SQL 配置文件的调优任务。参数 `name` 和 `description` 指定 SQL 配置文件本身的名称和描述。在示例中，我使用生成它的脚本名称作为名称。参数\
  \ `category` 用于将多个 SQL 配置文件分组以便于管理。其默认值为 `default`。参数 `replace` 指定是否应替换已存在的 SQL\
  \ 配置文件。它默认为 `FALSE`。最后，参数 `force_match` 指定如何执行文本规范化。它默认为 `FALSE`。下一节提供了关于文本规范化的更多信息。唯一必需的参数是\
  \ `task_name`。注意，参数 `replace` 和 `force_match` 仅从 Oracle Database 10g Release 2 开始存在。\n\
  \n```sql\ndbms_sqltune.accept_sql_profile(\n  task_name       => 'TASK_16467',\n\
  \  task_owner      => 'OPS$CHA',\n  name            => 'first_rows',\n  description\
  \     => 'switch from ALL_ROWS to FIRST_ROWS_n',\n  category        => 'TEST',\n\
  \  replace         => TRUE,\n  force_match     => TRUE\n);\n```\n\n一旦被接受，SQL 配置文件就存储在数据字典中。视图\
  \ `dba_sql_profiles` 显示有关它的信息。由于 SQL 配置文件不绑定到特定用户，因此视图 `all_sql_profiles` 和 `user_sql_profiles`\
  \ 不存在。\n\n```sql\nSQL> SELECT category, sql_text, force_matching\n  2  FROM dba_sql_profiles\n\
  \  3  WHERE name = 'first_rows';\n```\n\n\n\n`类别`      `SQL 文本`                 `强制匹配`\n\
  `--------` `----------------------------` `---------------`\n`测试`       `SELECT\
  \ * FROM T ORDER BY ID` `是`\n\n与过程 `accept_sql_profile` 功能相同的函数 `accept_sql_profile`\
  \ 同样可用。唯一的区别是，该函数会返回 SQL 配置文件的名称。当名称未被指定为输入参数，而必须由系统生成时，这非常有用。实际上，在 Oracle Database\
  \ 10g Release 1 中，只有该函数是可用的。\n\n## 修改 SQL 配置文件\n\n你可以使用 `dbms_sqltune` 包中的过程 `alter_sql_profile`，不仅修改创建\
  \ SQL 配置文件时指定的一些属性，还可以更改其状态（启用或禁用）。通过以下 PL/SQL 调用，上一示例创建的 SQL 配置文件将被禁用。参数 `name`\
  \ 标识要修改的 SQL 配置文件。参数 `attribute_name` 和 `value` 分别指定要修改的属性及其新值。注意，参数 `attribute_name`\
  \ 接受 `name, description, category` 和 `status` 这些值。这三个参数是必需的。\n\n```\ndbms_sqltune.alter_sql_profile(\n\
  \  name           => 'first_rows',\n  attribute_name => 'status',\n  value     \
  \     => 'disabled'\n);\n```\n\n## 文本标准化\n\nSQL 配置文件的一个主要优点是，尽管它应用于特定的 SQL 语句，但使用它并不需要修改\
  \ SQL 语句本身。实际上，SQL 配置文件存储在数据字典中，查询优化器会自动选择它们。图 7-4 展示了在此选择过程中执行的基本步骤。首先，对 SQL 语句进行标准化，使其不仅对大小写不敏感，而且与使用的空格无关。然后根据得到的\
  \ SQL 语句计算签名。接着，基于该签名在数据字典中进行查找。每当找到具有相同签名的 SQL 配置文件时，就会执行一项检查，以确保要优化的 SQL 语句与附加到\
  \ SQL 配置文件的 SQL 语句是等效的。这是必要的，因为签名是一个哈希值，因此可能存在冲突。如果测试成功，则会将 SQL 配置文件纳入执行计划的生成过程中。\n\
  \n![image](img/0704.jpg)\n\n**图 7-4.** 选择 SQL 配置文件期间执行的主要步骤\n\n如果 SQL 语句包含会变化的字面量，那么作为哈希值的签名也很可能随之改变。因此，SQL\
  \ 配置文件可能会因为绑定在一个可能永远不会再次执行的、非常具体的 SQL 语句上而变得无用。从 Oracle Database 10g Release 2 开始，为避免此问题，数据库引擎能够在标准化阶段移除字面量。这是在接受\
  \ SQL 配置文件时，通过将参数 `force_match` 设置为 `TRUE` 来实现的。\n\n要研究文本标准化如何工作，可以使用 `dbms_sqltune`\
  \ 包中的函数 `sqltext_to_signature`。它接受两个参数 `sql_text` 和 `force_match` 作为输入。前者指定 SQL\
  \ 语句，后者指定要使用的文本标准化类型。以下摘自脚本 `sqltext_to_signature.sql` 生成的输出展示了参数 `force_match`\
  \ 对不同但相似的 SQL 语句签名的影响：\n\n*   `force_match` 设置为 `FALSE`：对空格和大小写不敏感。\n\n```\nSQL_TEXT\
  \                                                          SIGNATURE\n-------------------------------------------------------------------------\n\
  SELECT * FROM dual WHERE dummy = 'X'                             7181225531830258335\n\
  select  *  from dual where dummy='X'                             7181225531830258335\n\
  SELECT * FROM dual WHERE dummy = 'x'                            18443846411346672783\n\
  SELECT * FROM dual WHERE dummy = 'Y'                              909903071561515954\n\
  SELECT * FROM dual WHERE dummy = 'X'  OR dummy = :b1           14508885911807130242\n\
  SELECT * FROM dual WHERE dummy = 'Y'  OR dummy = :b1            816238779370039768\n\
  ```\n\n*   `force_match` 设置为 `TRUE`：对空格、大小写和字面量不敏感。但是，如果 SQL 语句中存在绑定变量，则不会执行字面量替换。\n\
  \n```\nSQL_TEXT                                                          SIGNATURE\n\
  --------------------------------------------------- ---------------------\nSELECT\
  \ * FROM dual WHERE dummy = 'X'                            10668153635715970930\n\
  select * from dual where dummy='X'                              10668153635715970930\n\
  SELECT * FROM dual WHERE dummy = 'x'                            10668153635715970930\n\
  SELECT * FROM dual WHERE dummy = 'Y'                            10668153635715970930\n\
  SELECT * FROM dual WHERE dummy = 'X'  OR dummy = :b1           14508885911807130242\n\
  SELECT * FROM dual WHERE dummy = 'Y'  OR dummy = :b1            816238779370039768\n\
  ```\n\n通过 Enterprise Manager 接受 SQL 配置文件时，只有在 Oracle Database 11g 中才能设置参数 `force_match`\
  \ 的值。在 Oracle Database 10g 中，始终使用默认值 (`FALSE`)。\n\n## 激活 SQL 配置文件\n\nSQL 配置文件的激活是在系统和会话级别由初始化参数\
  \ `sqltune_category` 控制的。它接受 `TRUE`、`FALSE` 或在接受 SQL 配置文件时指定的类别名称作为值。如果设置为 `TRUE`，则类别默认为\
  \ `default`。例如，以下 SQL 语句在会话级别激活属于 `test` 类别的 SQL 配置文件：\n\n```\nALTER SESSION SET\
  \ sqltune_category = test\n```\n\n该初始化参数支持单个类别。显然，这意味着一个会话在给定时间只能激活一个类别。\n\n## 移动\
  \ SQL 配置文件\n\n从 Oracle Database 10g Release 2 开始，`dbms_sqltune` 包提供了多个过程用于在数据库之间移动\
