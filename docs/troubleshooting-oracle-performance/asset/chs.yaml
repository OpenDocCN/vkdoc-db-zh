  \ SQL 语句 2 的等待事件 `db file scattered read` 相关。请注意等待事件是如何按其持续时间（`Duration` 列）分组的。例如，您可以看到约\
  \ 49% 的等待事件持续时间在 256 到 512 微秒之间。由于磁盘物理读取一些块至少需要几毫秒，这意味着大约一半的 I/O 操作是由操作系统或 I/O 子系统缓存服务的。由于等待事件\
