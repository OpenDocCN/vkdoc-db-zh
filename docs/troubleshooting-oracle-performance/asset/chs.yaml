  \n\n## 第三部分\n查询优化器\n\n*善用你掌控之力，接受其余发生之事。*\n爱比克泰德¹\n\n在 SQL 引擎处理之前，发送到数据库的每一条 SQL\
  \ 语句都必须被转换为一个执行计划。实际上，应用程序仅通过 SQL 语句指定**需要处理什么数据**，而非**如何处理**。查询优化器的目标不仅是向 SQL 引擎交付描述如何处理数据的执行计划，更重要的是，交付高效的执行计划。若未能做到这一点，可能导致极差的性能。正是由于这个原因，一本关于数据库性能的书籍必须讨论查询优化器。\n\
  \n然而，本部分的目的并非全面介绍查询优化器的内部工作原理。其他资源，如乔纳森·刘易斯的《*基于成本的 Oracle*》(Apress, 2006)，已在这方面做得非常出色。相反，这里提出了一种非常实用的方法，旨在描述你必须了解的查询优化器核心特性。第四章讨论查询优化器使用的统计信息。第五章描述影响查询优化器行为的初始化参数以及如何设置它们。由于你迟早会遇到性能不佳的\
  \ SQL 语句，第六章概述了获取执行计划的不同方法，以及如何阅读它们并识别低效的计划。最后，第七章描述了几种 SQL 调优技术。\n\n在继续阅读第四章之前，有一个非常重要的说明：直至\
  \ Oracle9*i*，主要有两种优化器可用，即*基于规则的优化器*（RBO）和*基于成本的优化器*（CBO）。自 Oracle Database 10*g*起，不再支持基于规则的优化器，因此，本书将不作介绍。在本书中，当你看到术语*查询优化器*时，我始终指的是基于成本的优化器。\n\
  \n* * *\n\n1. [`www.quotationspage.com/quote/2525.html`](http://www.quotationspage.com/quote/2525.html)\n\
  \n### 第四章\n系统与对象统计信息\n\n系统与对象统计信息至关重要，因为它们描述了运行数据库引擎的系统以及存储在数据库中的数据。事实上，一个只知晓待处理\
  \ SQL 语句和 SQL 语句所引用对象结构的查询优化器，是无法提供高效的执行计划的。简而言之，它必须能够量化待处理数据的数量。\n\n本章的目标有两方面。首先，描述可用的系统与对象统计信息。关于查询优化器如何利用它们，这里仅针对少数情况进行说明。大多数统计信息的用途将在第五章中解释。这是因为查询优化器会同时使用统计信息和初始化参数。其次，本章描述如何收集系统与对象统计信息。在实践中，这意味着描述包\
  \ `dbms_stats`。\n\n#### 包 `dbms_stats` 概览\n\n过去，对象统计信息是通过 SQL 语句 `ANALYZE` 来收集的。现在情况已非如此。为了向后兼容，SQL\
  \ 语句 `ANALYZE` 仍可用于收集对象统计信息。自 Oracle9*i*起，建议你使用包 `dbms_stats`。事实上，包 `dbms_stats`\
  \ 不仅提供了更多功能，在某些情况下还能提供更好的统计信息。例如，SQL 语句 `ANALYZE` 对统计信息收集的控制较少，不支持外部表，并且对于分区对象，它仅收集每个段的统计信息，并在对象（表或索引）级别估算统计信息。基于这些原因，本章将不介绍\
  \ SQL 语句 `ANALYZE`。\n\n重要的是要认识到，包 `dbms_stats` 提供了一套全面的程序和函数来管理**系统统计信息**和**对象统计信息**。对于对象统计信息，由于数据库中存在大量对象，你还可以在不同粒度级别上管理它们。实际上，你可以选择管理整个数据库、数据字典、单个模式、单个表、单个索引或单个表/索引分区的对象统计信息。\n\
  \n默认情况下，包 `dbms_stats` 会修改数据字典。然而，对于它的大多数程序和函数，也可以在数据字典之外操作用户定义的表。这就是我所说的*备份表*。由于管理统计信息远不止是简单地收集它们，包\
  \ `dbms_stats` 具有以下特性（参见图 4-1）：\n\n*   收集统计信息并将其存储在数据字典或备份表中\n*   锁定和解锁存储在数据字典中的统计信息\n\
  *   恢复数据字典中的统计信息\n*   删除存储在数据字典或备份表中的统计信息\n*   将统计信息从数据字典导出到备份表\n*   将统计信息从备份表导入到数据字典\n\
  *   获取（提取）存储在数据字典或备份表中的统计信息\n*   设置（修改）存储在数据字典或备份表中的统计信息\n\n请注意，在数据库之间移动统计信息是通过通用的数据移动工具（例如，Data\
  \ Pump）执行的，而不是通过包 `dbms_stats` 本身。\n\n![image](img/0401.jpg)\n\n**图 4-1.** 包 `dbms_stats`\
  \ 提供了一套管理统计信息和对象统计信息的全面功能。\n\n根据你想要执行的操作和粒度，表 4-1 显示了包 `dbms_stats` 提供了不同的程序和函数。例如，如果你想操作单个模式，包\
