  \n## 自动工作负载库与 Statspack\n\n当创建快照时，自动工作负载库（AWR）和 Statspack 能够收集执行计划。为了获取执行计划，会执行针对前一节所述动态性能视图的查询。一旦可用，执行计划可以在报告中显示，或者对于\
  \ AWR，可以通过 Enterprise Manager 显示。对于 AWR 和 Statspack，存储执行计划的仓库表与视图`v$sql_plan`基本相同。因此，前一节描述的技术同样适用于此。\n\
  \n### AWR AND STATSPACK\n\n从 Oracle Database 10g 开始，用于存储性能相关信息的 AWR 仓库是自动安装的。在正常操作期间，数据库引擎不仅负责维护其内容，还负责利用它进行自我调整。其目的是保留过去几周数据库工作负载的历史记录。有关\
  \ AWR 的信息，请参阅《性能调优指南》手册的第 5 章。\n\nAWR 的前身称为*Statspack*，既不会自动安装，也不会自动维护。它只是一个 DBA\
  \ 可以在数据库中安装的外接组件。无论如何，其目的与 AWR 类似。有关 Statspack 的信息，请参阅 Oracle9i 手册《数据库性能调优指南与参考》的第\
  \ 21 章。\n\n存储在 AWR 中的执行计划可通过视图`dba_hist_sql_plan`获取。要查询它们，`dbms_xplan`包提供了`display_awr`函数。与该包的其他函数一样，它们的使用方法是直接的。以下查询是一个示例。注意，传递给`display_awr`函数的参数通过其`sql_id`来标识\
  \ SQL 语句。\n\n```sql\nSQL> SELECT * FROM table(dbms_xplan.display_awr('1hqjydsjbvmwq'));\n\
  \nPLAN_TABLE_OUTPUT\n------------------------------------------------------------------------------\n\
  SELECT SUM(AMOUNT_SOLD) FROM SALES S, PROMOTIONS P WHERE S.PROMO_ID =\nP.PROMO_ID\
  \ AND PROMO_SUBCATEGORY = 'online discount'\n\nPlan hash value: 265338492\n\n------------------------------------------------------------------------------------\n\
  | Id  | Operation             | Name       | Rows  | Bytes | Cost (%CPU)| Time \
  \    |\n------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT      |            |       |       |   517 (100)|      \
  \    |\n|   1 |  SORT AGGREGATE       |            |     1 |    30 |           \
  \ |          |\n|   2 |   HASH JOIN           |            |   913K|    26M|   \
  \  517 (4)| 00:00:07 |\n|   3 |    TABLE ACCESS FULL  | PROMOTIONS |    23 |   483\
  \ |      17 (0)| 00:00:01 |\n|   4 |    PARTITION RANGE ALL|            |   918K|\
  \  8075K|   494   (3)| 00:00:06 |\n|   5 |     TABLE ACCESS FULL | SALES      |\
  \   918K|  8075K|   494   (3)| 00:00:06 |\n```\n\n`display_awr`函数不仅可以无参数使用。因此，在本章后面，我将详细介绍`dbms_xplan`包，探讨所有的可能性，包括对生成输出的描述。\n\
  \n当使用等于或大于 6 的级别创建快照时，Statspack 会将执行计划存储在`stats$sql_plan`仓库表中。不幸的是，`dbms_xplan`包没有提供查询它的功能。我建议将执行计划复制到一个计划表中，并使用`dbms_xplan`包中的`display`函数来显示它（参见前一节中关于\
  \ Oracle9i 中`v$sql_plan`视图的技术描述）。\n\n\n## AWR 和 Statspack 报告\n\n此外，对于 AWR 和 Statspack，Oracle\
  \ 提供了有用的报告，用于突出显示特定 SQL 语句在一段时间内的执行计划变更和资源消耗变化。它们的脚本名称分别是`awrsqrpt.sql`和`sprepsql.sql`。你可以在`$ORACLE_HOME/rdbms/admin`目录下找到它们。请注意，AWR\
