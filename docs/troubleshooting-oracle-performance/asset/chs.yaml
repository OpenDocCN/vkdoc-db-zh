- '# 成本模型演进


  查询优化器过去基于执行 SQL 语句所需的物理读取次数来估算成本。这种方法被称为*I/O 成本模型*。其主要缺点在于单块读取和多块读取的成本被视为相同。¹ 因此，多块读取操作（如全表扫描）在成本估算上被人为地赋予了优势。在
  Oracle8*i*之前，尤其是在 OLTP 系统中，初始化参数`optimizer_index_caching`和`optimizer_index_cost_adj`曾用于解决此问题（关于这两个初始化参数的详细信息，请参见第
  5 章）。事实上，这些参数的默认值过去只适用于报表系统和数据仓库。从 Oracle9*i*开始，引入了一种新的成本计算方法，称为*CPU 成本模型*，以解决此缺陷。要使用
  CPU 成本模型，需要向查询优化器提供关于数据库引擎运行所在系统的性能信息，称为*系统统计信息*。本质上，系统统计信息提供以下信息：


  *   I/O 子系统的性能

  *   CPU 的性能


  尽管名为 CPU 成本模型，但它同样会考虑物理读取的成本。不过，它不仅仅基于物理读取的次数，还会考虑 I/O 子系统的性能。不要被其名称误导。


  在 Oracle9*i*中，默认情况下没有可用的系统统计信息。这意味着默认使用的是 I/O 成本模型。从 Oracle Database 10*g*开始，默认总是存在一组系统统计信息。因此，默认使用的是
  CPU 成本模型。实际上，从 Oracle Database 10*g*开始，使用 I/O 成本模型的唯一方法是在 SQL 语句级别指定提示`no_cpu_costing`。在所有其他情况下，查询优化器都会使用
  CPU 成本模型。²


  系统统计信息有两种：*非工作负载统计信息*和*工作负载统计信息*。两者的主要区别在于衡量 I/O 子系统性能的方法。前者运行合成基准测试，而后者使用应用程序基准测试。在详细讨论这两种方法的差异之前，让我们先看看系统统计信息是如何存储在数据字典中的。


  ## 应用程序基准测试与合成基准测试


  *应用程序基准测试*，也称为*真实基准测试*，基于真实应用程序正常运行产生的负载。虽然它通常能提供关于系统真实性能的非常好的信息，但由于其性质，并非总是能够以可控的方式应用。


  *合成基准测试*是由一个不执行实际工作的程序产生的负载。其主要思想是通过执行类似的操作来模拟（建模）应用程序负载。虽然它可以很容易地以可控的方式应用，但通常产生的性能数据不如应用程序基准测试。尽管如此，它对于比较不同系统可能还是有用的。


  '
- "# 系统统计信息\n\n## 数据字典\n\n系统统计信息存储在数据字典表`aux_stats$`中。遗憾的是，没有可用的数据字典视图来公开这些信息。在此表中，最多可能存在三组行，通过`sname`列的以下值进行区分：\n\
  \n*   `SYSSTATS_INFO` 是包含系统统计信息状态及其收集时间的集合。如果收集正确，状态设置为`COMPLETED`。如果在收集统计信息过程中出现问题，状态设置为`BADSTATS`，此时查询优化器将不使用这些系统统计信息。在收集工作负载统计信息期间，还可能看到另外两个值：`MANUALGATHERING`和`AUTOGATHERING`。此外，直至\
  \ Oracle9*i*，当收集了非工作负载统计信息时，状态设置为`NOWORKLOAD`。\n    ```\n    SQL> SELECT pname,\
  \ pval1, pval2\n      2 FROM sys.aux_stats$\n      3 WHERE sname = 'SYSSTATS_INFO';\n\
  \    \n    PNAME                PVAL1 PVAL2\n    --------------- ---------- --------------------\n\
  \    STATUS                     COMPLETED\n    DSTART                     04-04-2007\
  \ 14:26\n    DSTOP                      04-04-2007 14:36\n    FLAGS            \
  \        1\n    ```\n*   `SYSSTATS_MAIN` 是包含系统统计信息本身的集合。关于它们的详细信息将在接下来的两节中提供。\n\
  \    ```\n    SQL> SELECT pname, pval1\n      2 FROM sys.aux_stats$\n      3 WHERE\
  \ sname = 'SYSSTATS_MAIN';\n    \n    PNAME                  PVAL1\n    ---------------\
  \ ------------\n    CPUSPEEDNW            1617.6\n    IOSEEKTIM               10.0\n\
  \    IOTFRSPEED            4096.0\n    SREADTIM                 1.3\n    MREADTIM\
  \                 7.8\n    CPUSPEED              1620.0\n    MBRC              \
  \       7.0\n    MAXTHR           473982976.0\n    SLAVETHR           1781760.0\n\
  \    ```\n*   `SYSSTATS_TEMP` 是包含用于计算系统统计信息的值的集合。仅在收集工作负载统计信息期间可用。\n\n由于单个数据库只存在一组统计信息，因此\
  \ RAC 系统的所有实例都使用相同的系统统计信息。因此，如果节点的规模或负载不均衡，必须仔细决定在哪个节点上收集系统统计信息。\n\n系统统计信息是使用包`dbms_stats`中的过程`gather_system_stats`收集的。默认情况下，执行此过程的权限授予`public`。因此，每个用户都可以收集系统统计信息。然而，要更改存储在数据字典中的系统统计信息，需要`gather_system_statistics`角色，或对数据字典表`aux_stats$`的直接授权。默认情况下，`gather_system_statistics`角色是通过`dba`角色提供的。\n\
  \n\n## 无负载统计信息\n\n如前所述，数据库引擎支持两种类型的系统统计信息：无负载统计信息和负载统计信息。从 Oracle Database *10g*\
  \ 开始，无负载统计信息始终可用。如果您显式删除了它们，它们会在下一次数据库启动时自动重新收集。在 Oracle9*i* 中，即使收集了统计信息，也不会有统计数据存储在数据字典中。只有\
  \ `aux_stats$` 表中的 `status` 列会被设置为 `NOWORKLOAD`。\n\n您在空闲系统上收集无负载统计信息，因为数据库引擎使用一个合成基准测试来生成用于衡量系统性能的负载。为了测量\
  \ CPU 速度，很可能在循环中执行某种校准操作。为了测量 I/O 性能，会对数据库的几个数据文件执行不同大小的读取操作。\n\n要收集无负载统计信息，您需要将过程\
  \ `gather_system_stats` 的参数 `gathering_mode` 设置为 `noworkload`，如下例所示：\n\n`dbms_stats.gather_system_stats(gathering_mode\
  \ => 'noworkload')`\n\n收集统计信息通常需要不到一分钟的时间，并且会计算表 4-2 中列出的统计信息。奇怪的是，有时需要多次重复收集统计信息；否则，将使用默认值（这些默认值同样在表\
  \ 4-2 中列出）。虽然很难确切知道这里发生了什么，但我推测这是一种合理性检查，会丢弃那些意义不大的统计信息。\n\n**表 4-2.** *存储在数据字典中的无负载统计信息*\n\
  \n| **名称** | **描述** |\n| --- | --- |\n| `CPUSPEEDNW` | 单个 CPU 每秒能够处理的操作次数（以百万计）。\
  \ |\n| `IOSEEKTIM` | 在磁盘上定位数据所需的平均时间（以毫秒为单位）。默认值为 10。 |\n| `IOTFRSPEED` | 从磁盘传输数据的平均速率（字节/毫秒）。默认值为\
  \ 4,096。 |\n\n## 负载统计信息\n\n负载统计信息仅在显式收集时才可用。要收集它们，您不能使用空闲系统，因为数据库引擎必须利用常规的数据库负载来测量\
  \ I/O 子系统的性能。另一方面，测量 CPU 速度的方法与无负载统计信息的方法相同。如图 4-2 所示，收集负载统计信息是一个三步活动。其思路是，要计算某个操作的平均耗时，需要知道该操作执行的次数以及执行它所花费的时间。例如，使用以下\
  \ SQL 语句，我能够以与 `dbms_stats` 包相同的方式，从我的一个测试数据库中计算出单块读取的平均时间（6.2 毫秒）：\n\n```sql\n\
  SQL> SELECT sum(singleblkrds) AS count, sum(singleblkrdtim)*10 AS time_ms\n   2\
  \ FROM v$filestat;\n\n     COUNT    TIME_MS\n---------- ----------\n     22893 \
  \     36760\n\nSQL> REMARK 运行基准测试以生成一些 I/O 操作...\n\nSQL> SELECT sum(singleblkrds)\
  \ AS count, sum(singleblkrdtim)*10 AS time_ms\n   2 FROM v$filestat;\n\n     COUNT\
  \    TIME_MS\n---------- ----------\n     54956     236430\n\nSQL> SELECT round((236430-36760)/(54956-22893),1)\
  \ AS avg_tim_singleblkrd\n   2 FROM dual;\n\nAVG_TIM_SINGLEBLKRD\n-------------------\n\
  \                 6.2\n```\n\n![image](img/0402.jpg)\n\n**图 4-2.** *要收集（计算）系统统计信息，需要使用多个性能指标的两次快照。*\n\
  \n图 4-2 中说明的三个步骤如下：\n\n1.  获取多个性能指标的快照并将其存储在数据字典表 `aux_stats$` 中（对于这些行，`sname` 列被设置为\
  \ `SYSSTATS_TEMP`）。此步骤通过将过程 `gather_system_stats` 的参数 `gathering_mode` 设置为 `start`\
  \ 来完成，如下列命令所示：\n    `dbms_stats.gather_system_stats(gathering_mode => 'start')`\n\
  2.  数据库引擎不控制数据库负载。因此，在进行下一次快照之前，必须等待足够的时间以覆盖一个具有代表性的负载期。很难提供关于这个等待时间的通用建议，但通常至少等待\
  \ 30 分钟。\n3.  进行第二次快照。此步骤通过将过程 `gather_system_stats` 的参数 `gathering_mode` 设置为 `stop`\
  \ 来完成，如下列命令所示：\n    `dbms_stats.gather_system_stats(gathering_mode => 'stop')`\n\
  4.  然后，基于两次快照的性能统计信息，计算出表 4-3 中列出的系统统计信息。如果某个 I/O 统计信息无法计算，则将其设置为 `NULL`（从 Oracle\
  \ Database *10g* 开始）或 -1（在 Oracle9*i* 中）。\n\n**表 4-3.** *存储在数据字典中的负载统计信息*\n\n| **名称**\
  \ | **描述** |\n| --- | --- |\n| `CPUSPEED` | 单个 CPU 每秒能够处理的操作次数（以百万计） |\n| `SREADTIM`\
  \ | 执行单块读取操作所需的平均时间（以毫秒为单位） |\n| `MREADTIM` | 执行多块读取操作所需的平均时间（以毫秒为单位） |\n| `MBRC`\
  \ | 在一次多块读取操作中读取的平均块数 |\n| `MAXTHR` | 整个系统的最大 I/O 吞吐量（字节/秒） |\n| `SLAVETHR` | 并行处理从进程的平均\
  \ I/O 吞吐量（字节/秒） |\n\n\n\n为避免手动获取结束快照，也可以将过程 `gather_system_stats` 的参数 `gathering_mode`\
  \ 设置为 `interval`。使用此参数，起始快照会立即获取，而结束快照则计划在由第二个名为 `interval` 的参数指定的分钟数之后执行。以下命令指定统计信息的收集应持续\
  \ 30 分钟：\n\n```\ndbms_stats.gather_system_stats(gathering_mode => 'interval',\n\
  \                               interval       => 30)\n```\n\n请注意，执行上述命令并不需要花费 30\
  \ 分钟。它只是获取起始快照并调度一个作业来获取结束快照。在 Oracle Database 10g Release 1 及更早版本中，使用的是旧版调度器（由\
  \ `dbms_job` 包管理）。从 Database 10g Release 2 开始，使用的是新版调度器（由 `dbms_scheduler` 包管理）。你可以分别通过查询视图\
  \ `user_jobs` 和 `user_scheduler_jobs` 来查看该作业。\n\n我们收集系统统计信息时的主要问题是选择收集时段。事实上，大多数系统的负载都不是恒定不变的，因此，除了\
  \ `cpuspeed` 之外，工作负载统计信息的演变同样不稳定。图 4-3 展示了我在一个生产系统上测量到的工作负载统计信息演变情况。为了生成这些图表，我以大约一小时的间隔收集了四天的工作负载统计信息。有关我为此目的使用的\
  \ SQL 语句示例，请查阅脚本 `system_stats_history.sql` 和 `system_stats_history_job.sql`。\n\n\
  ![image](img/0403.jpg)\n\n**图 4-3.** 在大多数系统上，工作负载统计信息的演变绝非恒定。\n\n为避免在无法代表负载的时段收集工作负载统计信息，我认为只有两种方法。要么我们在一个持续数天的时段内收集工作负载统计信息，要么我们可以像图\
  \ 4-3 那样生成图表以获取有意义的数值。我通常建议采用后者，因为同时我们也能获得对系统的有用视图。例如，基于图 4-3 所示的图表，我建议对 `mbrc`、`mreadtim`、`sreadtim`\
  \ 和 `cpuspeed` 使用平均值，而对 `maxthr` 和 `slavethr` 使用最大值。然后，可以使用类似以下的 PL/SQL 块来手动设置工作负载统计信息。请注意，在用过程\
  \ `set_system_stats` 设置工作负载统计信息之前，需先用过程 `delete_system_stats` 删除旧的系统统计信息集。\n\n```\n\
  BEGIN\n   dbms_stats.delete_system_stats();\n   dbms_stats.set_system_stats(pname\
  \ => 'CPUSPEED', pvalue => 772);\n   dbms_stats.set_system_stats(pname => 'SREADTIM',\
  \ pvalue => 5.5);\n   dbms_stats.set_system_stats(pname => 'MREADTIM', pvalue =>\
  \ 19.4);\n   dbms_stats.set_system_stats(pname => 'MBRC',     pvalue => 53);\n \
  \  dbms_stats.set_system_stats(pname => 'MAXTHR',   pvalue => 1136136192);\n   dbms_stats.set_system_stats(pname\
  \ => 'SLAVETHR', pvalue => 16870400);\nEND;\n```\n\n如果一天或一周的不同时间段需要不同的工作负载统计信息集，也可以使用此方法。然而，必须指出的是，我从未遇到过需要一套以上工作负载统计信息的情况。\n\
  \n你可能已经察觉到，我不建议定期收集 noworkload 统计信息。我觉得最好固定它们的值，并将其视为初始化参数。\n\n#### 对查询优化器的影响\n\n\
  当系统统计信息可用时，查询优化器会计算两个成本：I/O 成本和 CPU 成本。第 5 章描述了如何为最重要的访问路径计算 I/O 成本。关于 CPU 成本的计算，可用的信息很少。不过，我们可以想象，查询优化器会为每个操作关联一个\
  \ CPU 成本。例如，正如 Joze Senegacnik 所指出的，从 Oracle Database 10g Release 2 开始，使用公式 4-1\
  \ 来计算访问一个列的 CPU 成本。\n\n```\ncpu_cost = column_position · 20\n```\n\n**公式 4-1.**\
  \ 访问一个列的估计 CPU 成本取决于它在表中的位置。该公式给出的是访问一行的成本。如果访问多行，CPU 成本会成比例增加。第 12 章提供了关于为什么列的位置相关的进一步信息。\n\
  \n下面的示例（摘自脚本 `cpu_cost_column_access.sql`）展示了公式 4-1 的实际应用。创建了一个有九列的表，插入了一行，然后使用\
  \ SQL 语句 `EXPLAIN PLAN` 显示独立访问这九列的 CPU 成本。有关此 SQL 语句的详细信息，请参阅第 6 章。请注意，访问表有一个初始\
  \ CPU 成本 35,757，然后对于每个后续列，CPU 成本增加 20。同时，I/O 成本是恒定的。这是合理的，因为所有列都存储在同一个数据库块中，因此读取它们所需的物理读取次数对于所有查询都是相同的。\n\
  \n```\nSQL> CREATE TABLE t (c1 NUMBER, c2 NUMBER, c3 NUMBER,\n   2             \
  \    c4 NUMBER, c5 NUMBER, c6 NUMBER,\n   3                 c7 NUMBER, c8 NUMBER,\
  \ c9 NUMBER);\n\nSQL> INSERT INTO t VALUES (1, 2, 3, 4, 5, 6, 7, 8, 9);\nSQL> EXPLAIN\
  \ PLAN SET STATEMENT_ID 'c1' FOR SELECT c1 FROM t;\nSQL> EXPLAIN PLAN SET STATEMENT_ID\
  \ 'c2' FOR SELECT c2 FROM t;\nSQL> EXPLAIN PLAN SET STATEMENT_ID 'c3' FOR SELECT\
  \ c3 FROM t;\nSQL> EXPLAIN PLAN SET STATEMENT_ID 'c4' FOR SELECT c4 FROM t;\nSQL>\
  \ EXPLAIN PLAN SET STATEMENT_ID 'c5' FOR SELECT c5 FROM t;\nSQL> EXPLAIN PLAN SET\
  \ STATEMENT_ID 'c6' FOR SELECT c6 FROM t;\nSQL> EXPLAIN PLAN SET STATEMENT_ID 'c7'\
  \ FOR SELECT c7 FROM t;\nSQL> EXPLAIN PLAN SET STATEMENT_ID 'c8' FOR SELECT c8 FROM\
  \ t;\nSQL> EXPLAIN PLAN SET STATEMENT_ID 'c9' FOR SELECT c9 FROM t;\n\nSQL> SELECT\
  \ statement_id, cpu_cost AS total_cpu_cost,\n   2        cpu_cost-lag(cpu_cost)\
  \ OVER (ORDER BY statement_id) AS cpu_cost_1_coll,\n   3        io_cost\n   4 FROM\
  \ plan_table\n   5 WHERE id = 0\n   6 ORDER BY statement_id;\n\nSTATEMENT_ID TOTAL_CPU_COST\
  \ CPU_COST_1_COLL IO_COST\n------------ -------------- --------------- -------\n\
  c1                    35757                       3\nc2                    35777\
  \                  20   3\nc3                    35797                  20   3\n\
  c4                    35817                  20   3\nc5                    35837\
  \                  20   3\nc6                    35857                  20   3\n\
  c7                    35877                  20   3\nc8                    35897\
  \                  20   3\nc9                    35917                  20   3\n\
  ```\n\nI/O 成本和 CPU 成本使用不同的度量单位表示。显然，不能简单地将两者相加来计算 SQL 语句的总成本。为了解决这个问题，查询优化器使用工作负载统计信息代入公式\
  \ 4-2³。简单来说，就是将 CPU 成本转换为每秒可执行的单块读取次数。\n\n![images/U0401.jpg](img/U0401.jpg)\n\n\
  \n### 对象统计\n\n**公式 4-2.** *总体成本基于 I/O 成本和 CPU 成本。*\n\n要计算无工作负载统计信息时的总体成本，公式 4-2\
  \ 中的 `cpuspeed` 会被替换为 `cpuspeednw`，而 `sreadtim` 则根据公式 4-3 计算得出。\n\n![images/U0402.jpg](img/U0402.jpg)\n\
  \n**公式 4-3.** *如有必要，`sreadtim` 基于无工作负载统计信息和数据库的块大小计算得出。*\n\n一般来说，如果存在工作负载统计信息，查询优化器会使用它们，而忽略无工作负载统计信息。您应该注意，查询优化器会执行多项完整性检查，这些检查可能会禁用或部分替换工作负载统计信息。\n\
  \n*   当 `sreadtim`、`mreadtim` 或 `mbrc` 中任一项不可用时，查询优化器会忽略工作负载统计信息。\n*   当 `mreadtim`\
  \ 小于或等于 `sreadtim` 时，`sreadtim` 和 `mreadtim` 的值将分别使用公式 4-3 和公式 4-4 重新计算。\n\n![images/U0403.jpg](img/U0403.jpg)\n\
  \n**公式 4-4.** *基于无工作负载统计信息和数据库块大小计算 `mreadtim`。*\n\n系统统计信息使查询优化器能够感知数据库引擎运行所在的系统环境。这意味着它们对于成功配置至关重要。换句话说，强烈建议始终使用它们。我还建议冻结它们以保持稳定性。当然，在发生重大硬件或软件变更时，应重新计算系统统计信息，因此需要检查整个配置。出于检查目的，也可以定期将它们收集到备份表中（即使用\
  \ `gather_system_stats` 过程的 `statown` 和 `stattab` 参数），并验证当前值与数据字典中存储的值是否存在重大差异。\n\
  \n### 对象统计\n\n对象统计信息描述了存储在数据库中的数据。例如，它们会告诉查询优化器表中存储了多少行数据。没有这些定量信息，查询优化器永远无法做出正确的决策，例如为小表或大表（结果集）找到合适的连接方法。为了说明这一点，请考虑以下示例。假设我问您，从特定地点回家最快的交通方式是什么。是开车、坐火车还是坐飞机？为什么不骑自行车呢？关键在于，如果不考虑我的实际位置和我的家在哪里，您无法得出有意义的答案。同样，没有对象统计信息，查询优化器也面临同样的问题。它根本无法生成有意义的执行计划。\n\
  \n接下来的章节将首先描述有哪些对象统计信息可用，以及在数据字典中的哪些位置可以找到它们。然后，我将介绍用于收集、比较、锁定和删除统计信息的 `dbms_stats`\
  \ 包的功能。接着，我将根据可用功能描述一些我用来管理对象统计信息的策略。\n\n***\n\n**注意：** 数据库引擎通过 `ASSOCIATE STATISTICS`\
  \ SQL 语句，允许将用户定义的统计信息与列、函数、包、类型、域索引和索引类型关联起来。虽然在实践中这项技术很少使用，但在需要时，这是一个非常强大的功能。因此，此处将不作介绍。有关信息，请参考\
  \ *Data Cartridge Developer's Guide* 手册。\n\n***\n\n#### 有哪些可用的对象统计信息？\n\n对象统计信息分为三种类型：表统计信息、列统计信息和索引统计信息。每种类型又最多有三个子类型：表/索引级统计信息、分区级统计信息和子分区级统计信息。显而易见，分区和子分区统计信息仅当对象分别进行了分区和子分区时才存在。\n\
  \n对象统计信息显示在表 4-4 列出的数据字典视图中。当然，每个视图也有对应的 `dba` 和 `all` 版本，例如 `dba_tables` 和 `all_tables`。\n\
  \n**表 4-4.** *显示关系表对象统计信息的数据字典视图*\n\n| **对象** | **表/索引级统计信息** | **分区级统计信息** | **子分区级统计信息**\
  \ |\n| --- | --- | --- | --- |\n| 表 | `user_tab_statistics`, `user_tables`^* | `user_tab_statistics`,\
  \ `user_tab_partitions`^* | `user_tab_statistics`, `user_tab_subpartitions`^* |\n\
  | 列 | `user_tab_col_statistics`, `user_tab_histograms` | `user_part_col_statistics`,\
  \ `user_part_histograms` | `user_subpart_col_statistics`, `user_subpart_histograms`\
  \ |\n| 索引 | `user_ind_statistics`, `user_indexes`^* | `user_ind_statistics`, `user_ind_partitions`^*\
  \ | `user_ind_statistics`, `user_ind_subpartitions`^* |\n| *^* 这些视图主要在 Oracle9i\
  \ 及之前的版本中使用。这是因为视图 `user_tab_statistics` 和 `user_ind_statistics` 仅从 Oracle Database\
  \ 10g 开始才可用。* |\n\n本节的其余部分将描述数据字典中可用的最重要的对象统计信息。为此，我使用以下 SQL 语句创建了一个测试表。这些 SQL 语句以及本节中的所有其他查询，都可以在脚本\
  \ `object_statistics.sql` 中找到。\n\n```sql\nCREATE TABLE t\nAS\nSELECT rownum AS id,\n\
  \       round(dbms_random.normal*1000) AS val1,\n       100+round(ln(rownum/3.25+2))\
  \ AS val2,\n       100+round(ln(rownum/3.25+2)) AS val3,\n       dbms_random.string('p',250)\
  \ AS pad\nFROM all_objects\nWHERE rownum <= 1000\nORDER BY dbms_random.value;\n\n\
  UPDATE t SET val1 = NULL WHERE val1 < 0;\n\nALTER TABLE t ADD CONSTRAINT t_pk PRIMARY\
  \ KEY (id);\n\nCREATE INDEX t_val1_i ON t (val1);\nCREATE INDEX t_val2_i ON t (val2);\n\
  \nBEGIN\n   dbms_stats.gather_table_stats(ownname          => user,\n          \
  \                       tabname          => 'T',\n                             \
  \    estimate_percent => 100,\n                                 method_opt     \
  \  => 'for all columns size skewonly',\n                                 cascade\
  \          => TRUE);\nEND;\n/\n```\n\n#### 表统计信息\n\n以下查询展示了如何获取表最重要的表统计信息：\n\n```sql\n\
  SQL> SELECT num_rows, blocks, empty_blocks, avg_space, chain_cnt, avg_row_len\n\
  \   2 FROM user_tab_statistics\n   3 WHERE table_name = 'T';\n\n   NUM_ROWS    \
  \ BLOCKS EMPTY_BLOCKS  AVG_SPACE  CHAIN_CNT AVG_ROW_LEN\n---------- ---------- ------------\
  \ ---------- ---------- -----------\n      1000         44            0        \
  \  0          0         265\n```\n\n以下是对该查询返回的表统计信息的解释：\n\n*   `num_rows` 是表中的行数。\n\
  *   `blocks` 是表中高水位线以下的块数。\n*   `empty_blocks` 是表中高水位线以上的块数。此值不由 `dbms_stats` 包计算，被设置为\
  \ 0。\n*   `avg_space` 是表数据块中的平均空闲空间（以字节为单位）。此值不由 `dbms_stats` 包计算，被设置为 0。\n*   `chain_cnt`\
  \ 是表中被链接或迁移到另一个块的行的总数（链接行和迁移行将在第 12 章 中描述）。此值不由 `dbms_stats` 包计算，被设置为 0。\n*   `avg_row_len`\
  \ 是表中一行的平均大小（以字节为单位）。\n\n\n"
- '# 高水位线


  `高水位线`是段中已用空间与未用空间的分界。已使用的块位于高水位线之下，因此，未使用的块位于高水位线之上。高水位线之上的块从未被使用或初始化。


  在正常情况下，需要空间的操作（例如 `INSERT` 语句）仅当在高水位线之下没有更多可用空间时才会提升高水位线。一个常见的例外是直接插入操作，因为它们专门使用高水位线之上的块（参见第
  11 章）。


  释放空间的操作（例如 `DELETE` 语句）不会降低高水位线。它们只是将空间释放出来供其他操作使用。如果以等于或低于空间重用的速率释放空闲空间，那么使用高水位线之下的块应该是最优的。否则，高水位线之下的空闲空间会稳步增加。长期来看，这不仅会导致段大小不必要地增大，还会导致性能不达最优。实际上，全表扫描会访问高水位线之下的所有块。即使这些块是空的，扫描也会发生。要解决此问题，应对段进行重组。


  '
- "# 列统计信息\n\n以下查询展示了如何获取表中最重要的列统计信息：\n\n```sql\nSQL> SELECT column_name AS \"NAME\"\
  ,\n  2        num_distinct AS \"#DST\",\n  3        low_value,\n  4        high_value,\n\
  \  5        density AS \"DENS\",\n  6        num_nulls AS \"#NULL\",\n  7      \
  \  avg_col_len AS \"AVGLEN\",\n  8        histogram,\n  9        num_buckets AS\
  \ \"#BKT\"\n 10 FROM user_tab_col_statistics\n 11 WHERE table_name = 'T';\n```\n\
  \n```\nNAME  #DST LOW_VALUE      HIGH_VALUE        DENS #NULL AVGLEN HISTOGRAM \
  \       #BKT\n---- ----- -------------- -------------- ------- ----- ------ ---------------\
  \ -----\nID    1000 C102           C20B            .00100     0      4 NONE    \
  \            1\nVAL1   431 C103           C2213E          .00254   503      3 HEIGHT\
  \ BALANCED   254\nVAL2     6 C20202         C20207          .00050     0      4\
  \ FREQUENCY           6\nVAL3     6 C20202         C20207          .00050     0\
  \      4 FREQUENCY           6\nPAD   1000 202623436F2943 7E79514A202D49  .00100\
  \     0    251 HEIGHT BALANCED   254\n           7334237B426574 4649366C744E25\n\
  \           336E4A5B302E4F 3F36264C692755\n           4B53236932303A 7A57737C6D4B22\n\
  \           21215F46       59414C44\n```\n\n## LOW_VALUE 和 HIGH_VALUE 格式\n\n不幸的是，`low_value`\
  \ 和 `high_value` 这两个列的值不易解读。实际上，它们显示的值是根据数据库引擎用于存储数据的内部表示形式。要将它们转换为人类可读的值，有两种可能性。\n\
  \n首先，包 `utl_raw` 提供了函数 `cast_to_binary_double`、`cast_to_binary_float`、`cast_to_binary_integer`、`cast_to_number`、`cast_to_nvarchar2`、`cast_to_raw`\
  \ 和 `cast_to_varchar2`。正如函数名所示，对于每种特定的数据类型，都有一个对应的函数用于将内部值转换为实际值。要获取列 `val1` 的最小值和最大值，可以使用以下查询：\n\
  \n```sql\nSQL> SELECT utl_raw.cast_to_number(low_value) AS low_value,\n  2     \
  \   utl_raw.cast_to_number(high_value) AS high_value\n 3 FROM user_tab_col_statistics\n\
  \ 4 WHERE table_name = 'T'\n 5 AND column_name = 'VAL1';\n```\n\n```\nLOW_VALUE\
  \ HIGH_VALUE\n--------- ----------\n        2       3261\n```\n\n其次，包 `dbms_stats`\
  \ 提供了过程 `convert_raw_value`（该过程被多次重载）、`convert_raw_value_nvarchar` 和 `convert_raw_value_rowid`。由于过程不能直接在\
  \ SQL 语句中使用，因此通常仅在 PL/SQL 程序中使用。在以下示例中，PL/SQL 块的目的与前一个查询相同：\n\n```sql\nSQL> DECLARE\n\
  \  2   l_low_value user_tab_col_statistics.low_value%TYPE;\n  3   l_high_value user_tab_col_statistics.high_value%TYPE;\n\
  \  4   l_val1 t.val1%TYPE;\n  5 BEGIN\n  6   SELECT low_value, high_value\n  7 \
  \  INTO l_low_value, l_high_value\n  8   FROM user_tab_col_statistics\n  9   WHERE\
  \ table_name = 'T'\n 10   AND column_name = 'VAL1';\n 11\n 12   dbms_stats.convert_raw_value(l_low_value,\
  \ l_val1);\n 13   dbms_output.put_line('low_value: ' || l_val1);\n 14   dbms_stats.convert_raw_value(l_high_value,\
  \ l_val1);\n 15   dbms_output.put_line('high_value: ' || l_val1);\n 16 END;\n 17\
  \ /\n```\n\n```\nlow_value: 2\nhigh_value: 3261\n```\n\n以下是此查询返回的列统计信息的解释：\n\n*\
  \   `num_distinct` 是列中不同值的数量。\n*   `low_value` 是列中的最低值。它以内部表示形式显示。请注意，对于字符串列（在示例中为\
  \ `pad` 列），仅使用前 32 个字节。\n*   `high_value` 是列中的最高值。它以内部表示形式显示。请注意，对于字符串列（在示例中为 `pad`\
  \ 列），仅使用前 32 个字节。\n*   `density` 是一个介于 0 和 1 之间的十进制数。接近 0 的值表示对该列的限制会过滤掉大多数行。接近\
  \ 1 的值表示对该列的限制几乎不会过滤掉任何行。如果没有直方图，`density` 是 `1/num_distinct`。如果存在直方图，则计算方式不同，并取决于直方图的类型。\n\
  *   `num_nulls` 是列中存储的 `NULL` 值的数量。\n*   `avg_col_len` 是列的平均大小（以字节为单位）。\n*   `histogram`\
  \ 指示列是否可用直方图，如果可用，则指示其类型。有效值为 `NONE`（表示无直方图）、`FREQUENCY` 和 `HEIGHT BALANCED`。此列自\
  \ Oracle Database 10*g* 起可用。\n*   `num_buckets` 是直方图中的桶数。桶（在统计学中也称为 `category`）是同类值的分组。正如我们将在下一节中看到的，直方图由至少一个桶组成。如果没有可用的直方图，则设置为\
  \ 1。最大桶数为 254。\n\n"
- "# 直方图\n\n查询优化器始于数据均匀分布的假设。均匀分布数据的一个例子是测试表中 `id` 列存储的数据（该测试表在前几节中使用）。实际上，它恰好存储了从\
  \ 1 到 1,000 的所有数字各一次。在这种情况下，要找出基于该列的谓词（例如 `id BETWEEN 6 AND 19`）过滤掉的行数，查询优化器仅需要上一节描述的对象统计信息：最小值、最大值和不同值的数量。\n\
  \n如果数据分布不均匀，查询优化器没有额外信息就无法计算出可接受的估计值。例如，给定存储在列 `val2` 中的数据集（参见以下查询的输出），查询优化器如何对\
  \ `val2=105` 这样的谓词做出有意义的估计？它不能，因为它不知道大约 50% 的行满足该谓词。\n\n```sql\nSQL> SELECT val2\
  \ AS val2, count(*)\n  2 FROM t\n  3 GROUP BY val2\n  4 ORDER BY val2;\n```\n\n\
  ```\nVAL2   COUNT(*)\n---------- ----------\n       101          8\n       102 \
  \        25\n       103         68\n       104        185\n       105        502\n\
  \       106        212\n```\n\n查询优化器需要的关于数据非均匀分布的额外信息称为 `直方图`。有两种类型的直方图可用：`频率直方图`\
  \ 和 `高度平衡直方图`。\n\n\n\n"
- "# 直方图：频率直方图与高度平衡直方图\n\n## 频率直方图\n\n频率直方图是大多数人理解术语“直方图”时所指的概念。图 4-4 是这种类型的一个示例，它展示了上一个查询返回数据的常见图形化表示。\n\
  \n![image](img/0404.jpg)\n\n**图 4-4.** 基于存储在列 `val2` 中的数据集的频率直方图的图形化表示。\n\n数据字典中存储的频率直方图与此表示类似。主要区别在于，它使用的是累积频率而非频率。以下查询展示了这两种值之间的区别（注意列\
  \ `endpoint_number` 就是累积频率）：\n\n```sql\nSQL> SELECT endpoint_value, endpoint_number,\n\
  \  2        endpoint_number - lag(endpoint_number,1,0)\n  3                    \
  \      OVER (ORDER BY endpoint_number) AS frequency\n  4 FROM user_tab_histograms\n\
  \  5 WHERE table_name = 'T'\n  6 AND column_name = 'VAL2'\n  7 ORDER BY endpoint_number;\n\
  \nENDPOINT_VALUE ENDPOINT_NUMBER  FREQUENCY\n-------------- --------------- ----------\n\
  \           101               8          8\n           102              33     \
  \    25\n           103             101         68\n           104             286\
  \        185\n           105             788        502\n           106        \
  \    1000        212\n```\n\n频率直方图的基本特征如下：\n\n*   桶的数量（换句话说，类别的数量）与不同值的数量相同。对于每个桶，在视图\
  \ `user_tab_histograms` 中都有一行可用。\n*   列 `endpoint_value` 提供了值本身。由于此列的数据类型是 `NUMBER`，因此基于非数字数据类型（如\
  \ `VARCHAR2, CHAR, NVARCHAR2, NCHAR, RAW`）的列必须进行转换。为此，仅使用前导的 6 个字节（而不是字符！）。这意味着直方图中存储的值仅根据前导部分进行区分。因此，固定前缀可能会影响直方图的有效性。对于多字节字符集尤其如此，其中\
  \ 6 个字节可能仅对应 3 个字符。\n*   列 `endpoint_number` 提供了该值的累积频率。要获得频率本身，必须从前一行的 `endpoint_number`\
  \ 列值中减去。\n\n以下示例展示了当存在频率直方图时，查询优化器如何利用它来精确估计查询（*基数*）在列 `val2` 上带有谓词时返回的行数。关于 SQL\
  \ 语句 `EXPLAIN PLAN` 的详细信息在第 6 章中提供。\n\n```sql\nSQL> EXPLAIN PLAN SET STATEMENT_ID\
  \ '101' FOR SELECT * FROM t WHERE val2 = 101;\nSQL> EXPLAIN PLAN SET STATEMENT_ID\
  \ '102' FOR SELECT * FROM t WHERE val2 = 102;\nSQL> EXPLAIN PLAN SET STATEMENT_ID\
  \ '103' FOR SELECT * FROM t WHERE val2 = 103;\nSQL> EXPLAIN PLAN SET STATEMENT_ID\
  \ '104' FOR SELECT * FROM t WHERE val2 = 104;\nSQL> EXPLAIN PLAN SET STATEMENT_ID\
  \ '105' FOR SELECT * FROM t WHERE val2 = 105;\nSQL> EXPLAIN PLAN SET STATEMENT_ID\
  \ '106' FOR SELECT * FROM t WHERE val2 = 106;\n\nSQL> SELECT statement_id, cardinality\n\
  \  2 FROM plan_table\n  3 WHERE id = 0;\n\nSTATEMENT_ID CARDINALITY\n------------\
  \ -----------\n101                    8\n102                   25\n103         \
  \          68\n104                  185\n105                  502\n106         \
  \         212\n```\n\n## 高度平衡直方图\n\n当不同值的数量大于允许的最大桶数（254）时，就不能使用频率直方图，因为它们每个桶只支持一个值。这就是高度平衡直方图变得有用的地方。\n\
  \n要创建高度平衡直方图，可以思考以下过程。首先，创建一个频率直方图。然后，如图 4-5 所示，将频率直方图的值堆叠起来。最后，将这堆值分成若干个高度完全相同的桶。例如，在图\
  \ 4-5 中，这堆值被分成五个桶。\n\n![image](img/0405.jpg)\n\n**图 4-5.** 将频率直方图转换为高度平衡直方图\n\n\
  以下查询是如何为列 `val2` 生成这样一个高度平衡直方图的示例。图 4-6 展示了它返回数据的图形化表示。注意每个桶的端点值是分割发生点的值。此外，还添加了一个桶\
  \ 0 来存储最小值。\n\n```sql\nSQL> SELECT count(*), max(val2) AS endpoint_value, endpoint_number\n\
  \  2 FROM (\n  3   SELECT val2, ntile(5) OVER (ORDER BY val2) AS endpoint_number\n\
  \  4   FROM t\n  5 )\n  6 GROUP BY endpoint_number\n  7 ORDER BY endpoint_number;\n\
  \nCOUNT(*) ENDPOINT_VALUE ENDPOINT_NUMBER\n-------- -------------- --------------\n\
  \     200            104              1\n     200            105              2\n\
  \     200            105              3\n     200            106              4\n\
  \     200            106              5\n```\n\n![image](img/0406.jpg)\n\n**图 4-6.**\
  \ 基于存储在列 `val2` 中的数据集的直方图的图形化表示\n\n对于图 4-6 的情况，以下查询显示了数据字典中存储的高度平衡直方图。有趣的是，并非所有桶都被存储。发生这种情况是因为几个具有相同端点值的相邻桶没有用处。结果是一种压缩。实际上，从这些数据可以推断出桶\
  \ 2 的端点值是 105，桶 4 的端点值是 106。在直方图中出现多次的值被称为*流行值*。\n\n```sql\nSQL> SELECT endpoint_value,\
  \ endpoint_number\n  2 FROM user_tab_histograms\n  3 WHERE table_name = 'T'\n  4\
  \ AND column_name = 'VAL2'\n  5 ORDER BY endpoint_number;\n\nENDPOINT_VALUE ENDPOINT_NUMBER\n\
  -------------- ---------------\n           101               0\n           104 \
  \              1\n           105               3\n           106               5\n\
  ```\n\n以下是高度平衡直方图的主要特征：\n\n*   桶的数量少于不同值的数量。对于每个桶（除非它们被压缩），在视图 `user_tab_histograms`\
  \ 中都有一行带有端点号可用。此外，端点号 0 表示最小值。\n*   列 `endpoint_value` 给出了值本身。由于列的数据类型是 `NUMBER`，因此非数字数据类型（如\
  \ `VARCHAR2, CHAR, NVARCHAR2, NCHAR, RAW`）必须进行转换。为此，仅使用前导的 6 个字节（而不是字符！）。\n*   列\
  \ `endpoint_number` 给出了桶号。\n*   直方图不存储值的频率。\n\n以下示例显示了当高度平衡直方图就位时，查询优化器执行的估计。请注意，与频率直方图相比，其精度较低。\n\
  \n\n"
- "# 直方图类型比较与查询优化\n\n`SQL> EXPLAIN PLAN SET STATEMENT_ID '101' FOR SELECT * FROM t\
  \ WHERE val2 = 101;`\n`SQL> EXPLAIN PLAN SET STATEMENT_ID '102' FOR SELECT * FROM\
  \ t WHERE val2 = 102;`\n`SQL> EXPLAIN PLAN SET STATEMENT_ID '103' FOR SELECT * FROM\
  \ t WHERE val2 = 103;`\n`SQL> EXPLAIN PLAN SET STATEMENT_ID '104' FOR SELECT * FROM\
  \ t WHERE val2 = 104;`\n`SQL> EXPLAIN PLAN SET STATEMENT_ID '105' FOR SELECT * FROM\
  \ t WHERE val2 = 105;`\n`SQL> EXPLAIN PLAN SET STATEMENT_ID '106' FOR SELECT * FROM\
  \ t WHERE val2 = 106;`\n\n```\nSQL> SELECT statement_id, cardinality\n  2 FROM plan_table\n\
  \  3 WHERE id = 0;\n\nSTATEMENT_ID CARDINALITY\n------------ -----------\n101  \
  \                  50\n102                    50\n103                    50\n104\
  \                    50\n105                   400\n106                   300\n\
  ```\n\n考虑到这两种直方图类型的基本特性，显然**频率直方图**比**高度平衡直方图**更准确。高度平衡直方图的主要问题是，有时一个值是否被识别为常见值可能是偶然的。例如，在图\
  \ 4-6 所示的直方图中，桶 4 和桶 5 之间的分点恰好位于值从 105 变为 106 的点附近。\n\n因此，即使数据分布的微小变化也可能导致不同的直方图和不同的估计值。以下示例说明了这种情况：\n\
  \n`SQL> UPDATE t SET val2 = 105 WHERE val2 = 106 AND rownum <= 13;`\n\n```\nSQL>\
  \ SELECT endpoint_value, endpoint_number\n  2 FROM user_tab_histograms\n  3 WHERE\
  \ table_name = 'T'\n  4 AND column_name = 'VAL2'\n  5 ORDER BY endpoint_number;\n\
  \nENDPOINT_VALUE ENDPOINT_NUMBER\n-------------- ---------------\n           101\
  \               0\n           104               1\n           105              \
  \ 4\n           106               5\n```\n\n`SQL> EXPLAIN PLAN SET STATEMENT_ID\
  \ '101' FOR SELECT * FROM t WHERE val2 = 101;`\n`SQL> EXPLAIN PLAN SET STATEMENT_ID\
  \ '102' FOR SELECT * FROM t WHERE val2 = 102;`\n`SQL> EXPLAIN PLAN SET STATEMENT_ID\
  \ '103' FOR SELECT * FROM t WHERE val2 = 103;`\n`SQL> EXPLAIN PLAN SET STATEMENT_ID\
  \ '104' FOR SELECT * FROM t WHERE val2 = 104;`\n`SQL> EXPLAIN PLAN SET STATEMENT_ID\
  \ '105' FOR SELECT * FROM t WHERE val2 = 105;`\n`SQL> EXPLAIN PLAN SET STATEMENT_ID\
  \ '106' FOR SELECT * FROM t WHERE val2 = 106;`\n\n```\nSQL> SELECT statement_id,\
  \ cardinality\n  2 FROM plan_table\n  3 WHERE id = 0;\n\nSTATEMENT_ID CARDINALITY\n\
  ------------ -----------\n101                    80\n102                    80\n\
  103                    80\n104                    80\n105                   600\n\
  106                    80\n```\n\n因此，在实践中，高度平衡直方图不仅可能产生误导，还可能导致查询优化器估计的不稳定。\n\n\
  同样值得注意的是，视图`user_tab_histograms`会为每个没有直方图的列显示两行。这是因为最小值和最大值分别存储在端点号 0 和 1 中。例如，没有直方图的列`id`的内容如下：\n\
  \n```\nSQL> SELECT endpoint_value, endpoint_number\n  2 FROM user_tab_histograms\n\
  \  3 WHERE table_name = 'T'\n  4 AND column_name = 'ID'\n  5 ORDER BY endpoint_number;\n\
  \nENDPOINT_VALUE ENDPOINT_NUMBER\n--------------- ---------------\n            \
  \  1               0\n           1000               1\n```\n\n"
- "# 扩展统计\n\n前两节描述的列统计信息和直方图仅在列的**在谓词中使用时未被修改**的情况下才有帮助。例如，如果使用谓词`country='Switzerland'`，并且列`country`具有列统计信息和直方图，那么查询优化器应该能够正确估计其选择性。这是因为列统计信息和直方图描述了列`country`本身。另一方面，如果使用谓词`upper(country)='SWITZERLAND'`，查询优化器就不再能够直接从对象统计信息和直方图中推断选择性。当谓词引用多个列时，也会出现类似的问题。例如，如果我对一个包含来自世界各地人员的表应用谓词`country='Denmark'\
  \ AND language='Danish'`，那么对于该表中的大多数行来说，这两个限制很可能适用于相同的行。事实上，大多数讲丹麦语的人住在丹麦，而大多数住在丹麦的人讲丹麦语。换句话说，这两个限制几乎是冗余的。这样的列通常被称为`correlated\
  \ columns`，这对查询优化器构成了挑战。这是因为没有对象统计信息或直方图描述数据之间的这种依赖关系，换句话说，查询优化器实际上假设存储在不同列中的数据是相互独立的。\n\
  \n从 Oracle 数据库 11g 开始，可以收集表达式或列组上的对象统计信息和直方图来解决这类问题。这些新的统计信息被称为`扩展统计`。基本上，其过程是基于表达式或列组创建一个隐藏列，称为`扩展`。然后，在其上收集常规的对象统计信息和直方图。\n\
  \n定义是通过`dbms_stats`包中的`create_extended_stats`函数完成的。例如，以下查询创建了两个扩展。第一个基于`upper(pad)`，第二个是由列`val2`和`val3`组成的列组。在测试表中，这些列包含完全相同的值；换句话说，这些列是高度相关的。在定义时，如下所示，表达式或列组必须用括号括起来。注意，该函数返回一个系统生成的扩展名称（一个以`SYS_STU`开头的\
  \ 30 字节名称）。\n\n```\nSELECT dbms_stats.create_extended_stats(ownname => user,\n \
  \                                       tabname => 'T',\n                      \
  \                  extension => '(upper(pad))'),\n       dbms_stats.create_extended_stats(ownname\
  \ => user,\n                                        tabname => 'T',\n          \
  \                              extension => '(val2,val3)')\nFROM dual\n```\n\n显然，一旦创建了扩展，数据字典就会提供有关它们的信息。以下基于视图`user_stat_extensions`的查询显示了测试表的现有扩展。也存在`dba`和`all`版本。\n\
  \n```\nSQL> SELECT extension_name, extension\n  2 FROM user_stat_extensions\n  3\
  \ WHERE table_name = 'T';\n\nEXTENSION_NAME                     EXTENSION\n----------------------------------\
  \ ---------------\nSYS_STU0KSQX64#I01CKJ5FPGFK3W9     (UPPER(\"PAD\"))\nSYS_STUPS77EFBJCOTDFMHM8CHP7Q1\
  \     (\"VAL2\",\"VAL3\")\n```\n\n如下一个查询的输出所示，隐藏列与扩展具有相同的名称。还要注意扩展的定义是如何添加到列信息中的。\n\
  \n```\nSQL> SELECT column_name, data_type, hidden_column, data_default\n  2 FROM\
  \ user_tab_cols\n  3 WHERE table_name = 'T'\n  4 ORDER BY column_id;\n```\n\n\n\
  `COLUMN_NAME                     DATA_TYPE HIDDEN DATA_DEFAULT`\n`------------------------------\
  \ --------- ------ -------------------------`\n`ID                             NUMBER\
  \    NO`\n`VAL1                           NUMBER    NO`\n`VAL2                 \
  \          NUMBER    NO`\n`VAL3                           NUMBER    NO`\n`PAD  \
  \                          VARCHAR2  NO`\n`SYS_STU0KSQX64#I01CKJ5FPGFK3W9 VARCHAR2\
  \  YES    UPPER(\"PAD\")`\n`SYS_STUPS77EFBJCOTDFMHM8CHP7Q1 NUMBER    YES    SYS_OP_COMBINED_HASH(\"\
  VAL2\",\"VAL3\")`\n\n***\n\n**注意** 由于针对一组列的扩展统计信息是基于哈希函数 (`sys_op_combined_hash`)\
  \ 的，因此它们仅对基于相等性的谓词有效。换句话说，查询优化器无法利用它们来处理基于 `BETWEEN`、`<` 或 `>` 等运算符的谓词。\n\n***\n\
  \n要删除一个扩展，可以使用 `dbms_stats` 包中提供的 `drop_extended_stats` 过程。在以下示例中，PL/SQL 块删除了先前创建的两个扩展：\n\
  ```\nBEGIN\n   dbms_stats.drop_extended_stats(ownname   => user,\n             \
  \                     tabname   => 'T',\n                                  extension\
  \ => '(upper(pad))');\n   dbms_stats.drop_extended_stats(ownname   => user,\n  \
  \                                tabname   => 'T',\n                           \
  \       extension => '(val2,val3)');\nEND;\n```\n\n值得注意的是，扩展统计基于 Oracle Database\
  \ 11g 的另一项特性，称为*虚拟列*。虚拟列是不存储数据，而仅根据其他列的表达式生成其内容的列。在应用程序频繁使用给定表达式的情况下，这很有帮助。一个典型的例子是对\
  \ `VARCHAR2` 列应用 `upper` 函数或对 `DATE` 列应用 `trunc` 函数。如果这些表达式被频繁使用，那么直接在表中定义它们是合理的，如以下示例所示。正如你将在第\
  \ 9 章中看到的，虚拟列也可以被索引。\n```\nSQL> CREATE TABLE persons (\n   2   name VARCHAR2(100),\n\
  \   3   name_upper AS (upper(name))\n   4 );\n```\n```\nSQL> INSERT INTO persons\
  \ (name) VALUES ('Michelle');\n```\n```\nSQL> SELECT name\n   2 FROM persons\n \
  \  3 WHERE name_upper = 'MICHELLE';\n```\n```\nNAME\n----------\nMichelle\n```\n\
  \n重要的是要认识到，无论虚拟列如何定义，对象统计信息和直方图通常都会被收集。这样，查询优化器就能获得关于数据的额外统计信息。\n\n**索引统计信息**\n\n\
  在描述索引统计信息之前，让我们根据图 4-7 简要回顾一下索引的结构。顶部的块称为*根块*。这是每次查找开始的地方。根块引用*分支块*。请注意，根块也被视为一个分支块。每个分支块又引用另一级分支块，或者像图\
  \ 4-7 中那样，引用*叶块*。叶块存储键（在本例中，是一些介于 6 和 89 之间的数值）以及引用数据的 rowid。对于给定的索引，从根块到每个叶块之间的分支块数量总是相同的。换句话说，索引总是平衡的。请注意，为了支持对值范围的查找（例如，所有介于\
  \ 25 和 45 之间的值），叶块是链接在一起的。\n\n并非所有索引都有这三种类型的块。事实上，只有当根块无法存储所有叶块的引用时，分支块才会存在。此外，如果索引非常小，它可能只包含一个块，该块包含了通常存储在根块和叶块中的所有数据。\n\
  \n![image](img/0407.jpg)\n\n**图 4-7.** *索引结构基于 B^+-树。*\n\n以下查询展示了如何获取表的最重要索引统计信息：\n\
  ```\nSQL> SELECT index_name AS name,\n   2        blevel,\n   3        leaf_blocks\
  \ AS leaf_blks,\n   4        distinct_keys AS dst_keys,\n   5        num_rows,\n\
  \   6        clustering_factor AS clust_fact,\n   7        avg_leaf_blocks_per_key\
  \ AS leaf_per_key,\n   8        avg_data_blocks_per_key AS data_per_key\n   9 FROM\
  \ user_ind_statistics\n  10 WHERE table_name = 'T';\n```\n```\nNAME       BLEVEL\
  \ LEAF_BLKS DST_KEYS NUM_ROWS CLUST_FACT LEAF_PER_KEY DATA_PER_KEY\n---------- ------\
  \ --------- -------- -------- ---------- ------------ ------------\nT_VAL2_I   \
  \     1         2        6     1000        153            1           25\nT_VAL1_I\
  \        1         2      431      497        479            1            1\nT_PK\
  \            1         2     1000     1000        980            1            1\n\
  ```\n\n此查询返回的索引统计信息如下：\n\n*   `blevel` 是为了访问一个叶块而需要读取的分支块数量（包括根块）。\n*   `leaf_blocks`\
  \ 是索引的叶块数量。\n*   `distinct_keys` 是索引中不同键的数量。\n*   `num_rows` 是索引中的键数量。对于主键，此值与 `distinct_keys`\
  \ 相同。\n*   `clustering_factor` 表示有多少相邻的索引条目不指向表中的同一个数据块。如果表和索引的排序方式相似，则聚簇因子较低。最小值是表中非空数据块的数量。如果表和索引的排序方式不同，则聚簇因子较高。最大值是索引中的键数量。我将在第\
  \ 9 章中讨论这些统计信息对性能的影响。以下 PL/SQL 函数（可在脚本 `clustering_factor.sql` 中找到）说明了其计算方式。请注意，此函数仅适用于单列\
  \ B 树索引。\n```\nCREATE OR REPLACE FUNCTION clustering_factor (\n   p_owner IN VARCHAR2,\n\
  \   p_table_name IN VARCHAR2,\n   p_column_name IN VARCHAR2\n) RETURN NUMBER IS\n\
  \   l_cursor             SYS_REFCURSOR;\n   l_clustering_factor  BINARY_INTEGER\
  \ := 0;\n   l_block_nr           BINARY_INTEGER := 0;\n   l_previous_block_nr  BINARY_INTEGER\
  \ := 0;\n   l_file_nr            BINARY_INTEGER := 0;\n   l_previous_file_nr   BINARY_INTEGER\
  \ := 0;\nBEGIN\n   OPEN l_cursor FOR\n     'SELECT dbms_rowid.rowid_block_number(rowid)\
  \ block_nr, '||\n     '       dbms_rowid.rowid_to_absolute_fno(rowid, '''||\n  \
  \                                    p_owner||''','''||\n                      \
  \                p_table_name||''') file_nr '||\n     'FROM '||p_owner||'.'||p_table_name||'\
  \ '||\n     'WHERE '||p_column_name||' IS NOT NULL '||\n     'ORDER BY ' || p_column_name;\n\
  LOOP\n   FETCH l_cursor INTO l_block_nr, l_file_nr;\n   EXIT WHEN l_cursor%NOTFOUND;\n\
  \   IF (l_previous_block_nr <> l_block_nr OR l_previous_file_nr <> l_file_nr)\n\
  \   THEN\n     l_clustering_factor := l_clustering_factor + 1;\n   END IF;\n   \
  \  l_previous_block_nr := l_block_nr;\n     l_previous_file_nr := l_file_nr;\n \
  \  END LOOP;\n   CLOSE l_cursor;\n   RETURN l_clustering_factor;\nEND;\n```\n\n\
  注意它生成的值与数据字典中存储的统计信息如何匹配：\n```\nSQL> SELECT i.index_name, i.clustering_factor,\n\
  \   2        clustering_factor(user, i.table_name, ic.column_name) AS my_clstf\n\
  \   3 FROM user_indexes i, user_ind_columns ic\n   4 WHERE i.table_name = 'T'\n\
  \   5 AND i.index_name = ic.index_name;\n```\n```\n   INDEX_NAME   CLUSTERING_FACTOR\
  \  MY_CLSTF\n------------- ------------------- ---------\nT_PK                 \
  \          980       980\nT_VAL1_I                       479       479\nT_VAL2_I\
  \                       153       153\n```\n\n\n\n值得一提的是，对于位图索引，并不会计算真正的聚簇因子。实际上，它被设置为索引中的键数量（即统计信息\
  \ `num_rows`）。\n\n*   `avg_leaf_blocks_per_key` 是指存储单个键的平均叶块数量。该值是使用公式 4-5 从其他统计信息推导而来的。\n\
  \n![images/U0404.jpg](img/U0404.jpg)\n\n**公式 4-5。** *计算存储单个键的平均叶块数量*\n\n*   `avg_data_blocks_per_key`\
  \ 是指单个键所引用的表中数据块的平均数量。该值是使用公式 4-6 从其他统计信息推导而来的。\n\n![images/U0405.jpg](img/U0405.jpg)\n\
  \n**公式 4-6。** *计算单个键所引用的平均数据块数量*\n\n#### 收集对象统计信息\n\n直到 Oracle9*i*，都是由 DBA 负责收集对象统计信息。实际上，默认情况下，没有可用的对象统计信息。从\
  \ Oracle Database 10*g* 开始，在创建数据库时，会创建并调度一个旨在自动收集对象统计信息的作业。这是一件好事，因为拥有最新的对象统计信息应该是常态，而非例外。\n\
  \n#### 使用包 `dbms_stats` 收集统计信息\n\n要收集对象统计信息，包 `dbms_stats` 包含了多个过程。之所以有多个过程，是因为根据情况不同，收集统计信息的过程应针对整个数据库、数据字典、某个方案或单个对象进行。\n\
  \n*   `gather_database_stats` 为整个数据库收集对象统计信息。\n*   `gather_dictionary_stats` 为数据字典收集对象统计信息。请注意，数据字典不仅包括存储在\
  \ `sys` 方案中的对象，还包括 Oracle 为可选组件安装的其他方案。此过程仅在 Oracle Database 10*g* 及以上版本可用。\n* \
  \  `gather_fixed_objects_stats` 为数据字典中包含的称为*固定表*的特定对象收集对象统计信息。要了解此过程处理哪些表，您可以使用以下查询。此过程仅在\
  \ Oracle Database 10*g* 及以上版本可用。\n    ```sql\n    SELECT name\n    FROM v$fixed_table\n\
  \    WHERE type = 'TABLE'\n    ```\n*   `gather_schema_stats` 为整个方案收集对象统计信息。\n*\
  \   `gather_table_stats` 为一个表收集对象统计信息，并可选择为其索引也收集统计信息。\n*   `gather_index_stats`\
  \ 为一个索引收集对象统计信息。\n\n这些过程提供了多个参数，这些参数可以分为三大类。第一组参数用于指定目标对象，第二组用于指定收集选项，第三组用于指定在覆盖当前统计信息之前是否备份它们。表\
  \ 4-5 总结了哪些参数可用于哪些过程。接下来的三个小节将详细描述每个参数的范围和用法。\n\n**表 4-5。** *用于收集对象统计信息的过程参数*\n\n\
  | **参数** | **数据库** | **字典** | **固定对象** | **方案** | **表** | **索引** |\n| --- | ---\
  \ | --- | --- | --- | --- | --- |\n| **目标对象** |  |  |  |  |  |  |\n| `ownname` |\
  \  |  |  | ![image](img/P0001.jpg) | ![image](img/P0001.jpg) | ![image](img/P0001.jpg)\
  \ |\n| `indname` |  |  |  |  |  | ![image](img/P0001.jpg) |\n| `tabname` |  |  |\
  \  |  | ![image](img/P0001.jpg) |  |\n| `partname` |  |  |  |  | ![image](img/P0001.jpg)\
  \ | ![image](img/P0001.jpg) |\n| `comp_id` |  | ![image](img/P0001.jpg) |  |  |\
  \  |  |\n| `granularity` | ![image](img/P0001.jpg) | ![image](img/P0001.jpg) | \
  \ | ![image](img/P0001.jpg) | ![image](img/P0001.jpg) | ![image](img/P0001.jpg)\
  \ |\n| `cascade` | ![image](img/P0001.jpg) | ![image](img/P0001.jpg) |  | ![image](img/P0001.jpg)\
  \ | ![image](img/P0001.jpg) |  |\n| `gather_sys` | ![image](img/P0001.jpg) |  |\
  \  |  |  |  |\n| `gather_temp` | ![image](img/P0001.jpg) |  |  | ![image](img/P0001.jpg)\
  \ |  |  |\n| `options` | ![image](img/P0001.jpg) | ![image](img/P0001.jpg) |  |\
  \ ![image](img/P0001.jpg) |  |  |\n| `objlist` | ![image](img/P0001.jpg) | ![image](img/P0001.jpg)\
  \ |  | ![image](img/P0001.jpg) |  |  |\n| `force` |  |  |  | ![image](img/P0001.jpg)\
  \ | ![image](img/P0001.jpg) | ![image](img/P0001.jpg) |\n| `obj_filter_list` | ![image](img/P0001.jpg)\
  \ | ![image](img/P0001.jpg) |  | ![image](img/P0001.jpg) |  |  |\n| **收集选项** | \
  \ |  |  |  |  |  |\n| `estimate_percent` | ![image](img/P0001.jpg) | ![image](img/P0001.jpg)\
  \ |  | ![image](img/P0001.jpg) | ![image](img/P0001.jpg) | ![image](img/P0001.jpg)\
