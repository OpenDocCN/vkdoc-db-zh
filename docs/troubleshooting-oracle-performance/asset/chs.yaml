- "# Oracle SQL 跟踪文件分析报告\n\n## 执行摘要\n\n首先，我们观察到 PL/SQL 块（`Statement ID` 1）占据了绝大部分的处理时间。\n\
  \n`Total` | `Number of` | `Duration per`\n`Statement ID` `Type` | `Duration` | `%`\
  \ | `Executions` | `Execution`\n------------ | ------------- | -------- | -------\
  \ | ----------- | ------------\n`1` | PL/SQL | 5.333 | `94.119` | 1 | 5.333\n`35`\
  \ | PL/SQL | 0.010 | 0.184 | 1 | 0.010\n------------ | ------------- | --------\
  \ | -------\n`Total` | | 5.343 | 94.303\n\n## 深入分析 SQL 语句\n\n下一步自然是获取关于处理时间最长的 SQL\
  \ 语句的详细信息。为了便于引用，TVD$XTAT 为每个 SQL 语句生成一个 ID（即上文摘录中的 `Statement ID` 列）。在输出文件的 HTML\
  \ 版本中，您可以直接点击该 ID 跳转到对应的 SQL 语句详情。而在纯文本版本中，则需要搜索字符串 `\"STATEMENT 1\"`。\n\n每个 SQL\
  \ 语句会提供以下信息：执行环境的通用信息、SQL 语句文本、执行统计信息、执行计划、执行中使用的绑定变量以及等待事件。其中，执行计划、绑定变量和等待事件是可选的，仅当它们在跟踪文件中被记录时才会显示。\n\
  \n### SQL 语句 1 详情\n\n首先显示的是执行环境的通用信息和 SQL 语句文本。请注意，会话属性信息仅在可用时才显示。例如，此处未显示属性 `action\
  \ name`，因为应用程序未设置它。还需注意，`SQL ID` 仅在 Oracle Database 11*g* 及以上版本中才可用。\n\n`STATEMENT\
  \ 1`\n\n`Session ID` | `90.6`\n--- | ---\n`Service Name` | `DBM11106.antognini.ch`\n\
  `Module Name` | `SQL*Plus`\n`Parsing User` | `33`\n`Hash Value` | `2276506700`\n\
