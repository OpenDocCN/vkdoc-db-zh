  \ 第五部分 附录\n\n## 附录 A 可下载文件\n## 附录 B 参考文献\n## 索引\n\n\n\n## 卡里·米尔斯帕的前言\n\n`我`认为过去十年里，Oracle\
  \ 性能领域发生的最棒的事情，就是如今在书店里能买到的信息质量发生了质的飞跃。\n\n在以往，你买到的关于 Oracle 性能的书籍看起来都大同小异。它们暗示你的\
  \ Oracle 系统不可避免地遭受着过多 I/O 的困扰（这其实`并非`必然），或者内存不足（它们声称这与 I/O 过多是同一回事，这也不正确）。它们会向你展示大量你可能会运行的\
  \ SQL 脚本，并告诉你应该调整你的 SQL。它们说，这样就能解决一切问题。\n\n那是一个黑暗的时代。\n\n克里斯的这本书是那个给我们带来……光明的家族谱系中的一员。黑暗与光明之间的区别，归结为一个简单的概念。这个概念大约从你十岁起，数学老师就要求你掌握：`展示你的计算过程`。\n\
  \n我指的不是那种“展示与讲述”——有人声称他在数百个客户现场将性能提升了数百个百分点，因此他就是专家。我指的是`展示你的计算过程`，这意味着记录一个相关的基线测量，进行一个受控实验，记录第二个相关的测量结果，然后公开透明地展示你的结果，以便你的读者能够理解，甚至在他们愿意时复现你的测试。\n\
  \n这非常重要。当作者们开始这样做时，Oracle 社区的听众们开始变得聪明得多。自 2000 年以来，Oracle 社区中有越来越多的人提出关于性能的明智问题并要求明智的答案。同时，那些许多人曾经深信不疑的糟糕想法，其被淹没的速度也加快了。\n\
  \n在这本书中，克里斯遵循了行之有效的模式。他告诉你有用的东西。但他不止于此。他向你展示`他是如何知道的`，也就是说，他向你展示`你自己如何能够发现`。他展示了他计算的过程。\n\
  \n这给你带来两大好处。首先，展示计算过程帮助你更深入地理解他所展示的内容，这使他的课程更容易被你记住和应用。其次，通过理解他的例子，你不仅能理解克里斯向你展示的东西，还将能够回答克里斯尚未涵盖的其他好问题……比如在本书付印之后，Oracle\
  \ 的下一个版本中会发生什么。\n\n对我来说，这本书既是一本技术参考，也是一本“说服性”参考。它包含了大量有完整记录的、我可以复用的功课。它还包含了一些雄辩的新论点，涉及我与克里斯持有相同观点和热情的几个方面。克里斯在这本书中使用的论点将帮助我说服更多人去做正确的事情。\n\
  \n克里斯是一个聪明、充满活力的人，他站在戴夫·恩索尔、莱克斯·德·哈恩、安乔·科尔克、史蒂夫·亚当斯、乔纳森·刘易斯、汤姆·凯特以及其他几位我认为为我们这个领域带来严谨性的英雄们的肩膀上。现在，我们也有克里斯的肩膀可以站立了。\n\
  \n卡里·米尔斯帕\n\n卡里·米尔斯帕是软件性能公司 Method R Corporation 的首席执行官。他于 2003 年与杰夫·霍尔特合著了《*优化\
  \ Oracle 性能*》，并因此获得了《Oracle 杂志》2004 年度最佳作者奖。你可以在[`method-r.com`](http://method-r.com)或[`carymillsap.blogspot.com`](http://carymillsap.blogspot.com)找到卡里。\n\
  \n## 乔纳森·刘易斯的前言\n\n我开始使用 Oracle RDBMS 是在 20 多年前，大约花了三年时间，我才意识到故障排除和调优已经被赋予了一种近乎神秘的声誉。\n\
  \n一位开发人员曾将一个查询交给 DBA 小组，因为它运行得不好。我检查了执行计划，检查了数据模式，并指出通过给其中一个表添加索引可以消除大部分工作。开发人员的回应是：“但它不需要索引；这是一个小表。”（顺便说一句，那是在\
  \ 6.0.36 版本的时代，当时“短”表的定义是“不超过四个块长”。）尽管如此，我还是创建了索引，查询运行速度提高了大约 30 倍——然后我不得不进行大量的解释。\n\
  \n故障排除不依赖于魔法、神秘或神话；它依赖于理解、观察和解释。正如理查德·费曼曾经说过的：“你的理论有多美无关紧要；你有多聪明也无关紧要。如果你的理论与实验不符，那它就是错的。”关于\
  \ Oracle 性能，有许多“理论”是错误的，本应在多年前就从集体记忆中删除——而克里斯蒂安·安托尼尼是帮助清除它们的人之一。\n\n在这本书中，克里斯蒂安·安托尼尼旨在描述事情是如何真实运作的，你应该注意哪些类型的症状，以及这些症状意味着什么。最重要的是，他鼓励你在观察和分析中保持条理，并坚持相关的细节。有了这些建议，你应该能够在性能问题出现时识别出真正的问题，并以最合适的方式处理它们。\n\
  \n虽然这是一本可能应该从头到尾仔细阅读的书，但我认为不同的读者会以不同的方式从中受益。有些读者可能在浏览时捕捉到零星的特别见解，就像我在第四章中对`高度平衡直方图`的解释所做的那样——多年来我一直试图为这个名字找到一个直观清晰的理由，克里斯蒂安的描述突然让它变得显而易见。\n\
  \n有些读者可能会发现对某些功能的简短描述有助于他们理解 Oracle 为何实现该功能，并允许他们从示例中推断出与其应用相关的场景。对我而言，第五章中关于`安全视图合并`的描述就是这样一个例子。\n\
  \n其他读者可能会发现他们有一部分书会反复阅读，因为它涵盖了他们正在使用的某些特别重要且相关的功能的许多细节。我确信，第九章中关于`分区`的广泛讨论是许多人会反复研读的内容。\n\
  \n这本书内容丰富——都值得一读。谢谢你，克里斯蒂安。\n\n乔纳森·刘易斯\n\n乔纳森·刘易斯是《*基于成本的 Oracle：基础*》的作者，该书也由 Apress\
  \ 出版。你可以在[`jonathanlewis.wordpress.com`](http://jonathanlewis.wordpress.com)找到他更多的作品示例。\n\
  \n\n\n## 关于作者\n\n![image](img/U0001.jpg)\n\n自 1995 年以来，**克里斯蒂安·安托尼尼（CHRISTIAN ANTOGNINI）**\
  \ 一直致力于理解 Oracle 数据库引擎的工作原理。他的主要兴趣包括逻辑与物理数据库设计、数据库与 Java 应用程序的集成、查询优化器，以及几乎所有与应用性能管理和优化相关的事务。他目前在瑞士苏黎世的\
  \ Trivadis 公司（[`www.trivadis.com`](http://www.trivadis.com)）担任首席顾问和培训师。\n\n如果克里斯蒂安不是在帮助他的客户充分利用\
  \ Oracle，那么他一定是在某处为开发者讲授应用性能管理或 Oracle 数据库新特性。除了 Trivadis 组织的课程和研讨会，他还定期在各种会议和用户组会议上发表演讲。他是\
  \ Trivadis 性能团队和 OakTable Network（[`www.oaktable.net`](http://www.oaktable.net)）的骄傲成员。\n\
  \n克里斯蒂安与妻子米歇尔以及他们的两个孩子索菲亚和伊利亚居住在瑞士提契诺州。他将大量的业余时间用于陪伴美好的家人，并在可能的时候，阅读书籍、欣赏好电影、骑他的一辆\
  \ BMX 小轮车，或踩着单板滑雪板滑下瑞士的阿尔卑斯山。\n\n## 关于技术审校者\n\n![image](img/U0002.jpg)\n\n**阿尔贝托·戴尔埃拉（ALBERTO\
