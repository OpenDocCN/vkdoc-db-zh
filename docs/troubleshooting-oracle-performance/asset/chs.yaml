  \ Data Mining\nand Real Application Testing options\n\nAnalyzed Trace File\n-------------------\n\
  /u00/app/oracle/diag/rdbms/dbm11106/DBM11106/trace/DBM11106_ora_6334.trc\n\nInterval\n\
  --------\nBeginning 29 Feb 2008 07:43:11\nEnd       29 Feb 2008 07:43:17\nDuration\
  \  5.666\n\nTransactions\n------------\nCommitted 1\nRollbacked 0\n```\n\n对输出文件的分析始于查看整体资源使用情况。这里的处理持续了\
  \ 5.666 秒。大约 44% 的时间用于读取数据文件（`db file scattered read` 和 `db file sequential read`），大约\
  \ 26% 的时间用于 CPU 运行，大约 25% 的时间用于读写临时文件（`direct path read temp` 和 `direct path write\
  \ temp`）。总之，大部分时间花费在 I/O 操作上，其余时间花费在 CPU 上。请注意，未计入的时间已被明确给出。\n\n```\nResource Usage\
