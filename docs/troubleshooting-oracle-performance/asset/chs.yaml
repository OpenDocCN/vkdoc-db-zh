  \ 00:00:01 |\n| 2   |   INDEX FULL SCAN           | T_PK  |     6 |       |    2\
  \    (0)| 00:00:01 |\n-------------------------------------------------------------------------------------\n\
  ```\n\n要使用 SQL 调优顾问建议的 SQL 配置文件，你必须接受它。下一节描述了如何操作。无论是否接受 SQL 配置文件，一旦你不再需要调优任务，都可以通过调用包\
