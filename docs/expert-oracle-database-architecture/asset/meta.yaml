- - '#'
  - 本节前面提到的 `COUNT(*)` 让我想到一个功能，它允许你仅访问外部文件中查询引用到的字段，从而优化外部表的访问。也就是说，如果定义的外部表有 100
    个数字字段，但你只选出其中一个，你可以指示 Oracle 绕过将其余 99 个字符串转换为数字的过程。这听起来很棒，但它可能导致每次查询返回的行数不同。假设外部表中包含
    100 行数据。对于列 `C1` 的所有数据都是“有效的”并能转换为数字。而对于列 `C2` 的数据都“无效”，无法转换为数字。如果你从该外部表中选取 `C1`，你会得到
    100 行返回。如果你选取 `C2`，则会得到 0 行返回。
