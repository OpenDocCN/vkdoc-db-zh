  \     72105\n...\nRows (1st) Rows (avg) Rows (max)  Row Source Operation\n----------\
  \ ---------- ----------  -----------------------------------------\n1          1\
  \          1  TABLE ACCESS BY INDEX ROWID T_HEAP (cr=3 pr=0 pw=0 ...\n1        \
  \  1          1  INDEX UNIQUE SCAN T_HEAP_PK (cr=2 pr=0 pw=0 time=14...\n```\n\n\
  ## 原理分析\n\n`HASHED` 实现简单地将查询传入的 `OBJECT_ID` 转换为要读取的 `FILE`/`BLOCK` 并直接读取——没有索引。而\
  \ `HEAP` 表则必须对每一行进行两次索引 I/O。`TKPROF Row Source Operation` 行中的 `cr=2` 精确地显示了对索引执行了多少次一致读。每次我查找\
  \ `OBJECT_ID = :B1` 时，Oracle 都必须获取索引的根块，然后找到包含该行位置的叶块。接着，我必须获取叶块信息（其中包含该行的 `ROWID`）并访问表中的那一行，进行第三次\
  \ I/O。`HEAP` 表执行的 I/O 是 `HASHED` 实现的三倍。\n\n## 关键结论\n\n这里的要点如下：\n\n*   哈希集群做的 I/O\
  \ 显著更少（`query` 列）。这正是我们所预期的。查询只是获取随机的 `OBJECT_ID`，对它们执行哈希运算，然后直接定位到数据块。哈希集群至少需要做一次\
  \ I/O 来获取数据。而带有索引的传统表则必须执行索引扫描，然后通过 `rowid` 访问表才能得到相同的答案。在这种情况下，索引表至少需要做三次 I/O 才能获取数据。\n\
  \n*   尽管哈希集群查询访问 `buffer cache` 的次数只有索引表的三分之一，但其消耗的 CPU 时间在本质上是一样的。这一点也可以预见。执行哈希运算是非常消耗\
  \ CPU 的，而执行索引查找则是 I/O 密集型的。这是一种权衡。然而，随着用户数量的增加，我们预计哈希集群查询会表现出更好的可扩展性，因为它需要排队访问 `buffer\
  \ cache` 的频率更低。\n\n\n最后一点是至关重要的。在计算机工作中，一切关乎资源及其利用。如果我们遇到 **I/O 受限** 的情况，并执行大量键控读取的查询（正如我刚才所做的），那么哈希集群可能会提升性能。如果我们已经\
  \ **CPU 受限**，那么哈希集群反而可能降低性能，因为哈希计算需要更多的 CPU 算力。然而，如果我们消耗的额外 CPU 是由于在高速缓存缓冲区链的闩锁上自旋导致的，那么哈希集群则能显著减少所需的\
  \ CPU 资源。这就是为什么经验法则在真实系统中行不通的主要原因之一：对你有效的方法，在类似但不尽相同的条件下，可能对他人并不适用。\n\n## 单表哈希集群\n\
  \n有一种特殊的哈希集群称为 `单表哈希集群`。这是对我们已经了解的一般哈希集群的优化版本。它一次只支持在集群中包含一个表（在单表哈希集群中创建另一个表之前，你必须先\
  \ `DROP` 掉现有的表）。此外，如果哈希键与数据行之间存在一对一的映射关系，那么访问行的速度也会稍快一些。这些哈希集群专为那些你想通过主键访问一个表，且不关心将其他表与之集群的场景而设计。如果你需要通过\
  \ `EMPNO` 快速访问员工记录，可能就需要使用单表哈希集群。我也在单表哈希集群上进行了前面的测试，发现其性能甚至比普通的哈希集群更好。你甚至可以在此示例的基础上更进一步，利用\
  \ Oracle 允许你编写自己的专用哈希函数（而非使用 Oracle 提供的默认函数）这一特性。你仅限使用表中的可用列，并且在编写这些哈希函数时只能使用 Oracle\
  \ 内置函数（例如，不能使用 PL/SQL 代码）。通过利用示例中 `OBJECT_ID` 是介于 1 到 75,000 之间的数字这一事实，我让我的哈希函数简单地就是\
  \ `OBJECT_ID` 列本身。这样，我可以保证永远不会发生哈希冲突。综合所有这些，我将通过以下方式创建一个使用我自己哈希函数的单表哈希集群：\n\n###\
  \ 创建集群\n\n```sql\nSQL> create cluster hash_cluster\n( hash_key number(10) )\nhashkeys\
  \ 75000\nsize 150\nsingle table\nhash is HASH_KEY;\nCluster created.\n```\n\n我只需添加了关键字\
  \ `SINGLE TABLE` 将其指定为单表哈希集群。在此例中，我的 `HASH IS` 子句使用了 `HASH_KEY` 集群键。这是一个 SQL 函数，所以如果我愿意，我本可以使用\
  \ `trunc(mod(hash_key/324+278,555)/abs(hash_key+1))`（并非说这是一个好的哈希函数——它只是为了演示我们可以在此处使用复杂函数）。我使用了\
  \ `NUMBER(10)` 而不仅仅是 number。因为哈希值必须是整数，所以它不能有任何小数部分。然后，我在该集群中创建表以构建哈希化的表：\n\n###\
  \ 创建哈希表\n\n```sql\nSQL> create table t_hashed\ncluster hash_cluster(object_id)\n\
  as\nselect OWNER, OBJECT_NAME, SUBOBJECT_NAME,\ncast( OBJECT_ID as number(10) )\
  \ object_id,\nDATA_OBJECT_ID, OBJECT_TYPE, CREATED,\nLAST_DDL_TIME, TIMESTAMP, STATUS,\
  \ TEMPORARY,\nGENERATED, SECONDARY\nfrom all_objects;\nTable created.\n```\n\n注意使用了\
  \ `CAST` 内置函数来使 `OBJECT_ID` 的数据类型符合要求。我像之前一样运行了测试（每个代码块运行三次），这次 `runstats` 的输出结果持续显示出更积极的结果：\n\
  \n### Runstats 输出对比\n\n```\nRun1 在 99 个 CPU 百分秒内完成\nRun2 在 132 个 CPU 百分秒内完成\n运行\
