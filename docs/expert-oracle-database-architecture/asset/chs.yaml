  `IN_ROW`列的检索速度明显更快，消耗的资源也少得多。可以看到它使用了 54，720 次逻辑 I/O（查询模式获取），而`OUT_ROW`列使用的逻辑 I/O
  要多得多。起初，不清楚这些额外的逻辑 I/O 从何而来，但如果你记得 LOB 是如何存储的，就会变得显而易见。这些是对 LOBINDEX 段的 I/O 操作，目的是找到
  LOB 的各个片段。那些额外的逻辑 I/O 都是针对这个 LOBINDEX 的。


  此外，你可以看到，使用行外存储检索 18，240 行数据产生了 18，240 次物理 I/O，并导致了 18，240 次 *direct path read*
  I/O 等待。这些是对非缓存 LOB 数据的读取。在这种情况下，我们可能通过启用 LOB 数据的缓存来减少它们，但那样就必须确保有足够的额外缓冲区缓存可用于此。而且，如果其中有非常大的
  LOB，我们可能并不真正希望这些数据被缓存。


