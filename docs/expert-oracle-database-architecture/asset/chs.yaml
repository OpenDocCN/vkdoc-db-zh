  ## 查询分析


  在分析结果之前，先看看我用于报告的查询。我的查询使用了一个名为`pivot`的功能来对结果集进行透视。以下是该 SQL 查询第 11 到 22 行（不使用`pivot`功能）的另一种写法：


  ```

  select active,

  max( decode(name,''session pga memory'',val) ) pga,

  max( decode(name,''total: session pga memory'',val) ) as "tot PGA",

  max( decode(name,

  ''physical writes direct temporary tablespace'',

  val) ) as "temp write",

  max( decode(name,

  ''total: physical writes direct temporary tablespace'',

  val) ) as "tot writes temp"

  from (

  select active,

  name,

  case when name like ''%ga mem%'' then round(value/1024/1024,1) else value end val

  from sess_stats

  where active < 275

  )

  group by active

  ))

  ```


  这部分查询从指标表中检索了活动会话数少于 275 条的记录，将内存（UGA/PGA 内存）指标从字节转换为兆字节，然后对四个关键指标进行了透视——将行转换为列。一旦我们将这四个指标整合到单条记录中，我们就使用了分析函数（特别是`LAG()`函数）为每一行添加了先前观察到的总
  PGA 和总临时 I/O，以便于查看这些值的增量差异。


  回到数据本身——正如你所看到的，当只有几个活动会话时，排序完全在内存中进行。对于 1 到略少于 50 的活动会话数，我可以完全在内存中排序。然而，当我有 50
  个用户登录并积极进行排序时，数据库开始限制我一次可以使用的内存量。可能需要几分钟时间，PGA 的使用量才会回落到可接受的限制内（300MB 的请求），但在这些低并发用户级别下，最终还是会回落。我们观察的会话分配的
  PGA 内存从 15.2MB 下降到 7.7MB，最终稳定在约 5.2MB 左右（请记住，那部分 PGA 中有些并非用于工作区（排序）分配，而是用于其他操作；仅仅是登录行为就创建了
  0.5MB 的 PGA 分配）。系统使用的总 PGA 一直保持在可容忍的范围内，直到大约 126 个用户左右。此时，我开始经常性地超出`PGA_AGGREGATE_TARGET`，并一直持续到测试结束。我给这个数据库实例分配了一项不可能完成的任务；拥有
  126 个用户（大多数在执行 PL/SQL）以及他们都在请求的排序操作，根本无法放入我设定的 300MB RAM 中。这根本无法实现。因此，每个会话都尽可能使用最少的内存，但又必须分配其所需的内存量。到我完成这个测试时，活动会话总共使用了大约
  560MB 的 PGA 内存——这是它们能使用的最小量了。


  自动 PGA 内存管理正是为了让一个小规模的用户群在资源可用时能尽可能多地使用 RAM 而设计的。在这种模式下，随着负载增加，它会随时间推移逐渐减少分配；随着负载降低，它会随时间推移增加分配给单个操作的
  RAM 量。



  ## 使用 PGA_AGGREGATE_TARGET 控制内存分配


  之前，我提到“理论上”我们可以使用 `PGA_AGGREGATE_TARGET` 来控制实例使用的 PGA 内存总量。但从上一个例子中我们看到，这并非一个硬性限制。实例会试图保持在
  `PGA_AGGREGATE_TARGET` 的范围内，但如果无法做到，它不会停止处理；而只会被迫超出该阈值。


  这个限制之所以是“理论”上的，另一个原因是工作区虽然是 PGA 内存的主要贡献者，但并非唯一贡献者。许多因素都会影响 PGA 内存分配，而只有工作区是受数据库实例控制的。如果你创建并执行了一个
  `PL/SQL` 代码块，在专用服务器模式下（`UGA` 位于 `PGA` 中）用大量数据填充一个大数组，`Oracle` 除了允许你这样做之外，别无他法。


  考虑下面这个简单的例子。我们将在服务器中创建一个可以存储一些持久（全局）数据的包：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> create or replace package demo_pkg

  as

  type array is table of char(2000) index by binary_integer;

  g_data array;

  end;

  /

  Package created.

  ```


  现在，我们将测量当前会话在 `PGA`/`UGA` 中使用的内存量（本例中我使用了专用服务器，因此 `UGA` 是 `PGA` 内存的一个子集）：


