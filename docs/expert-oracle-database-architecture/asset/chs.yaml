  ```

  SQL> exec hash_proc( 6, :x );

  PL/SQL 过程已成功完成。

  PN        CNT HG

  -- ---------- ------------------------------

  p1       6104 **************

  p2       6175 ***************

  p3      12420 ******************************

  p4      12106 *****************************

  p5       6040 **************

  p6       6009 **************

  已选择 6 行。

  SQL> exec hash_proc( 7, :x );

  PL/SQL 过程已成功完成。

