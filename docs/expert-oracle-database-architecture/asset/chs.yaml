  现在，这是在 `PGA` 中分配的、实例本身无法控制的内存。我们已经*仅在这个单一会话中*就超过了为整个实例设置的 `PGA_AGGREGATE_TARGET`
  —— 数据库对此简直无能为力。如果它对此采取任何措施，那只能是拒绝我们的请求，而它只有在操作系统报告没有更多内存可分配时（`ORA-04030`）才会这样做。如果我们愿意，我们可以在该数组中分配更多空间并放入更多数据，而实例只能照办。


  然而，实例知道我们做了什么。它不会忽略它无法控制的内存；它只是认识到内存正在被使用，并相应地缩减为工作区分配的内存大小。因此，如果我们重新运行相同的排序查询，会发现这次我们排序到磁盘了——实例没有给我们大约
  12MB 的 `RAM` 来在内存中执行此操作，因为我们已经超出了 `PGA_AGGREGATE_TARGET`：


