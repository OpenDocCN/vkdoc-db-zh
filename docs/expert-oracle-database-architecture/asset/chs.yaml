  因此，由于部分 `PGA` 内存不在 `Oracle` 的控制之下，仅仅通过在我们的 `PL/SQL` 代码中分配大量非常大的数据结构，就很容易超出 `PGA_AGGREGATE_TARGET`。我绝不是在建议你这样做。我只是指出，`PGA_AGGREGATE_TARGET`
  更像一个请求，而非硬性限制。


  ### PGA 与 UGA 总结


  到目前为止，我们已经研究了两种内存结构：`PGA` 和 `UGA`。你现在应该理解，`PGA` 对一个进程是私有的。它是 `Oracle` 专用或共享服务器需要独立于会话而拥有的一组变量。`PGA`
  是一个内存“堆”，可以在其中分配其他结构。`UGA` 也是一个内存堆，可以在其中定义各种会话特定的结构。当你使用专用服务器连接到 `Oracle` 时，`UGA`
  是从 `PGA` 分配的；而在共享服务器连接下，则是从 `SGA` 分配的。这意味着在使用共享服务器时，你必须将 `SGA` 的大型池调整得足够大，以容纳所有可能同时连接到你的数据库的用户。因此，支持共享服务器连接的数据库的
  `SGA` 通常比配置相似的、仅使用专用服务器模式的数据库的 `SGA` 要大得多。接下来，我们将更详细地介绍 `SGA`。



  '
- '# 系统全局区


  每个 Oracle 实例都有一个被称为 `系统全局区` (`SGA`) 的大型内存结构。这是一个庞大、共享的内存结构，每个 Oracle 进程在某个时间点都会访问它。它的大小从小型测试系统中的几十
  MB，到中大型系统中的几 GB，再到真正大型系统中的数百 GB 不等。


  在 UNIX/Linux 上，`SGA` 是一个物理实体，你可以从操作系统命令行“看到”它。它在物理上被实现为一个共享内存段——一个进程可以附加的独立内存块。系统上有可能存在
  `SGA` 而没有任何 Oracle 进程；该内存是独立存在的。然而，应该注意的是，如果你有 `SGA` 却没有任何 Oracle 进程，这表明数据库以某种方式崩溃了。这是一种不常见的情况，但它可能发生。这就是
  `SGA` 在 Oracle Linux 上的“样子”：


  ```

  $ ipcs -m | grep ora

  0x00000000 32768      oracle     600        9138176    116

  0x00000000 32769      oracle     600        1560281088 58

  0x00000000 32770      oracle     600        7639040    58

  0x322379e0 32771      oracle     600        12288      58

  ```


  这里表示一个 `SGA`，报告显示了拥有 `SGA` 的操作系统账户（本例中均为 `oracle`）以及 `SGA` 的大小。在 Windows 上，你无法像在
  UNIX/Linux 中那样将其视为一个独立的实体来看到 `SGA`。因为在 Windows 平台上，Oracle 作为具有单一地址空间的单个进程执行，所以 `SGA`
  被作为私有内存分配给 `oracle.exe` 进程。如果你使用 Windows 任务管理器或其他性能工具，你可以看到 `oracle.exe` 分配了多少内存，但你无法区分出
  `SGA` 与任何其他已分配的内存块。


  > 注意

  > 除非你使用我的参数设置，并且在与我完全相同的操作系统上运行完全相同的 Oracle 版本，否则你几乎肯定会看到与我不同的数字。`SGA` 的大小确定非常依赖于版本/操作系统/参数。


  在 Oracle 内部，无论什么平台，你都可以使用另一个神奇的 `V$` 视图，名为 `V$SGASTAT`，来查看 `SGA`。它可能看起来像这样：


  ```

  SQL> compute sum of bytes on pool

  SQL> break on pool skip 1

  SQL> select pool, name, bytes from v$sgastat order by pool, name;

  POOL           NAME                            BYTES

  -------------- -------------------------- ----------

  java pool      free memory                  16777216

  **************                            ----------

  sum                                         16777216

  large pool     PX msg pool                    491520

  free memory                  66617344

  **************                            ----------

  sum                                         67108864

  shared pool    kghrcx RO latch director           16

  1105.kgght                      36784

  POOL           NAME                            BYTES

  -------------- -------------------------- ----------

  shared pool    11G QMN so                       1248


  sum                                        469762048

  buffer_cache                956301312

  fixed_sga                     9135680

  log_buffer                    7639040

  POOL           NAME                            BYTES

  -------------- -------------------------- ----------

  shared_io_pool               67108864

  **************                            ----------

  sum                                       1040184896

  ```


  `SGA` 被划分为多个不同的池。以下是你将看到的主要池：


  *   `共享池`：共享池包含共享游标、存储过程、状态对象、数据字典缓存以及许多其他数据片段。如果用户执行 SQL 语句，那么 Oracle 将使用共享池。

  *   `数据库缓冲区高速缓存（块缓冲区）`：作为用户查询和修改数据时从磁盘读取的数据块。包含最近最常使用的数据块。

  *   `固定 SGA`：包含有关实例和数据库状态的内部管理信息。

  *   `重做日志缓冲区`：一个循环缓冲区，包含有关数据库更改的信息。这些更改被写入磁盘上的联机重做日志。此信息用于数据库恢复。

  *   `Java 池`：Java 池是为在数据库中运行的 JVM 分配的固定内存量。Java 池可以在数据库在线运行时调整大小。

  *   `大池`：可选内存区域，供共享服务器连接用作会话内存，并行执行功能用作消息缓冲区，以及 RMAN 备份用作磁盘 I/O 缓冲区。此池可在线调整大小。

  *   `流池`：这是供数据共享工具（如 Oracle GoldenGate、Oracle Streams 和 Data Pump）使用的内存池。此池可在线调整大小。如果未配置流池但你使用了
  Streams 功能，Oracle 将使用最多百分之十的共享池内存作为流内存。

  *   `闪回缓冲区`：启用闪回数据库时使用的可选内存区域。恢复写入进程会将修改过的块从缓冲区高速缓存复制到闪回缓冲区，这些块随后被写入磁盘上的闪回数据库日志。

  *   `共享 I/O 池`：用于对 SecureFile 大型对象进行 I/O 操作。此区域用于 SecureFile 去重、加密和压缩。

  *   `内存中区域`：可选内存区域，允许以列式格式存储表和分区。对于处理少数列并返回许多行的分析操作非常有用（与返回少数行但包含许多列的 OLTP 应用程序相对）。

  *   `内存优化池`：可选的内存组件，用于优化基于键的查询。

  *   `可选的数据库智能闪存高速缓存`：针对 Linux 和 Solaris 系统的数据库缓冲区高速缓存的可选内存扩展。驻留在使用闪存的固态存储设备上。


  一个典型的 `SGA` 可能如图 4-1 所示。可选的内存组件由虚线轮廓标出。


  ![../images/319655_4_En_4_Chapter/319655_4_En_4_Fig1_HTML.jpg](img/319655_4_En_4_Fig1_HTML.jpg)


  **图 4-1** 典型的 `SGA`


  对 `SGA` 整体大小影响最大的参数如下：


  *   `JAVA_POOL_SIZE`：控制 Java 池的大小。

  *   `SHARED_POOL_SIZE`：控制共享池的大小（在一定程度上）。

  *   `LARGE_POOL_SIZE`：控制大池的大小。

  *   `STREAMS_POOL_SIZE`：控制流池的大小。

  *   `DB_*_CACHE_SIZE`：这八个 `CACHE_SIZE` 参数控制各种可用缓冲区高速缓存的大小。

  *   `LOG_BUFFER`：控制重做日志缓冲区的大小（在一定程度上）。

  *   `SGA_TARGET`：用于自动 `SGA` 内存管理，可以在线更改。

  *   `SGA_MAX_SIZE`：用于控制 `SGA` 的大小。

  *   `MEMORY_TARGET`：用于自动内存管理（PGA 和 `SGA` 的大小都会自动调整）。

  *   `MEMORY_MAX_SIZE`：用于控制在自动内存管理下，Oracle 应努力使用的 PGA 和 `SGA` 大小之和的最大内存量。这实际上只是一个目标；如果用户数量增加到超过某个水平，或者一个或多个会话分配了如前所述的大块不可调优的内存，PGA
  可能会超过最佳大小。

  *   `INMEMORY_SIZE`：设置 `SGA` 中用于内存中列存储的内存中区域的大小。默认值为零，表示未使用内存中功能。

  *   `MEMOPTIMIZE_POOL_SIZE`：为内存优化行存储功能设置内存大小。

  *   `DB_FLASH_CACHE_SIZE`：设置与 `DB_FLASH_CACHE_FILE` 结合使用的闪存高速缓存的大小。




  使用 ASMM 只需将 `SGA_TARGET` 参数设置为所需的 SGA 大小，完全忽略其他与 SGA 相关的参数即可。数据库实例会自行处理后续事宜，根据需要为各个内存池分配内存，甚至可以随时间推移从某个内存池取走内存给予另一个池。这是调整
  SGA 大小的最常用方式。


  当使用 AMM 时，您只需设置 `MEMORY_TARGET`。数据库实例随后会决定最优的 SGA 大小和 PGA 大小——这些组件将被适当地设置，并在各自范围内进行自身的自动内存管理。此外，数据库可以并且将会随着工作负载随时间的变化而调整
  SGA 和 PGA 的分配。


  无论您使用哪种类型的内存管理，您都会发现内存是以称为 `granule` 的单位分配到 SGA 的各个池中的。单个粒度是一个 4MB、8MB 或 16MB 大小的内存区域。粒度是最小的分配单位，因此，如果您请求一个
  5MB 的 Java 池，而您的粒度大小是 4MB，Oracle 实际上会为 Java 池分配 8MB（8 是大于或等于 5 的最小数字，且是粒度大小 4 的倍数）。粒度的大小由您的
  SGA 大小决定（这听起来有点递归，因为 SGA 的大小依赖于粒度大小）。您可以通过查询 `V$SGA_DYNAMIC_COMPONENTS` 来查看用于每个池的粒度大小。实际上，我们可以利用这个视图来了解总
  SGA 大小如何影响粒度大小。首先，让我们将 SGA 设置为一个较小的值，然后重启实例，并观察粒度大小。在运行以下命令时，我将连接到数据库的根容器：


  注意：如果您的实例当前正在运行，`STARTUP FORCE` 命令将以中止模式关闭实例并重新启动它。


  ```

  $ sqlplus / as sysdba

  SQL> alter system set sga_target=800M scope=spfile;

  SQL> startup force;

  SQL> show parameter sga_target

  NAME                                 TYPE        VALUE

