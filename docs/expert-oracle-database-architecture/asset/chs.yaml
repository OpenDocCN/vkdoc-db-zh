  如果我们继续这个实验直到 16 个分区，我们会看到第 9 到第 15 个分区出现相同的效果——数据向内部的分区倾斜，远离边缘分区——然后当达到第 16 个分区时，你会再次看到分布变得平坦。对于
  32 个分区、64 个分区等等，情况也是如此。这个例子恰恰指出了将二的幂作为哈希分区数的重要性。


  ## 列表分区


  列表分区提供了基于离散的值列表来指定某一行将驻留在哪个分区的能力。通常，根据某些代码（如州或地区代码）进行分区非常有用。例如，我们可能希望将缅因州（ME）、新罕布什尔州（NH）、佛蒙特州（VT）和马萨诸塞州（MA）所有人的记录都归入一个分区，因为这些州彼此相邻或靠近，并且我们的应用程序按地理区域查询数据。同样，我们可能希望将康涅狄格州（CT）、罗德岛州（RI）和纽约州（NY）的记录归为一组。


  我们无法使用范围分区，因为第一个分区的范围将是 ME 到 VT，而第二个范围将是 CT 到 RI。这些范围有重叠。我们也不能使用哈希分区，因为我们无法控制任何给定的行进入哪个分区；这是由
  Oracle 提供的内置哈希函数控制的。使用列表分区，我们可以轻松地实现这种自定义分区方案：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> create table list_example

  ( state_cd   varchar2(2),

  data       varchar2(20)

  )

  partition by list(state_cd)

  ( partition part_1 values ( ''ME'', ''NH'', ''VT'', ''MA'' ),

  partition part_2 values ( ''CT'', ''RI'', ''NY'' )

  );

  表已创建。

  ```


  图 13-3 显示了 Oracle 将检查 `STATE_CD` 列，并根据其值将行放入正确的分区。


  ![../images/319655_4_En_13_Chapter/319655_4_En_13_Fig3_HTML.jpg](img/319655_4_En_13_Fig3_HTML.jpg)


  图 13-3 列表分区插入示例


  正如我们在范围分区中看到的，如果我们尝试插入一个值，该值未在列表分区中指定，Oracle 将向客户端应用程序返回一个适当的错误。换句话说，一个没有 `DEFAULT`
  分区的列表分区表会隐式地对表施加一个类似于检查约束的约束：


  ```

  SQL> insert into list_example values ( ''VA'', ''data'' );

  insert into list_example values ( ''VA'', ''data'' )

  *

  第 1 行出现错误:

  ORA-14400: 插入的分区键未映射到任何分区

  ```


  如果我们想将这七个州划分到它们各自的分区中，就像我们已经做的那样，但让所有剩余的州代码（或者实际上，任何碰巧被插入的、不具有这七个代码之一的其他行）都进入第三个分区，那么我们可以使用
  `VALUES ( DEFAULT )` 子句。这里，我们将修改表来添加这个分区（我们也可以在 `CREATE TABLE` 语句中使用它）：


  ```

  SQL1> alter table list_example add partition part_3 values ( DEFAULT );

  表已更改。

  SQL> insert into list_example values ( ''VA'', ''data'' );

  已创建 1 行。

  ```


  所有未明确出现在我们的值列表中的值都将进入这里。关于使用 `DEFAULT` 的一点警告：一旦一个列表分区表有了 `DEFAULT` 分区，你就不能再向它添加任何分区了，所以


  ```

  SQL> alter table list_example add partition part_4 values( ''CA'', ''NM'' );

  alter table list_example

  *

  第 1 行出现错误:

  ORA-14323: 当存在 DEFAULT 分区时无法添加分区

  ```


  我们必须先移除 `DEFAULT` 分区，然后添加 `PART_4`，然后再把 `DEFAULT` 分区加回来。其背后的原因是，`DEFAULT` 分区可能已经包含了列表分区键值为
  `CA` 或 `NM` 的行——在添加了 `PART_4` 之后，这些行就不属于 `DEFAULT` 分区了。


  ### 区间分区


  区间分区与先前描述的范围分区非常相似——实际上，它始于一个范围分区表，但在定义中添加了一条规则（区间），以便数据库知晓未来应如何添加分区。区间分区的目标是**为数据创建新分区**——如果，并且仅当，数据存在于某个特定分区时，并且是在该数据到达数据库时才创建。换言之，其目的是消除预先为数据创建分区的需求，允许数据在插入时自行创建分区。要使用区间分区，你从一个没有
  `MAXVALUE` 分区的范围分区表开始，并指定一个要添加到该分区表**上限**（最高值）的区间，以创建新的范围。你需要有一个在**单列**上进行范围分区的表，并且该列允许向其添加
  `NUMBER` 或 `INTERVAL` 类型（例如，按 `VARCHAR2` 字段分区的表无法进行区间分区；你无法对 `VARCHAR2` 执行加法操作）。你可以将区间分区与任何合适的现有范围分区表结合使用；也就是说，你可以通过
  `ALTER` 命令将现有的范围分区表更改为区间分区表，或者使用 `CREATE TABLE` 命令创建一个区间分区表。


  例如，假设你有一个范围分区表，其规则是“任何严格小于 `01-JAN-2021` 的数据”（即 2020 年及以前的数据）都存入分区 `P1`——仅此而已。因此，它只有一个分区来存放
  2020 年及以前的所有数据。如果你尝试将 2022 年的数据插入该表，正如先前在范围分区部分所演示的，插入操作将会失败。使用区间分区，你可以创建一个表，同时指定一个范围（严格小于
  `01-JAN-2020`）和一个区间——比如一个月的时长——那么数据库就会在数据到达时，按月创建分区（一个恰好能容纳一个月数据的分区）。数据库不会预先创建所有可能的分区，因为这不切实际。但是，随着每一行数据的到来，数据库会检查对应月份的分区是否存在。如果需要，数据库将创建该分区。以下是语法示例：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> create table audit_trail

  ( ts    timestamp,

  data  varchar2(30)

  )

  partition by range(ts)

  interval (numtoyminterval(1,''month''))

  store in (users, example )

  (partition p0 values less than

  (to_date(''01-01-1900'',''dd-mm-yyyy''))

  );

  Table created.

  ```


  **注意**


  你心中可能会有个疑问，尤其是如果你刚读完前面关于数据类型的章节。你可以看到我们是按 `TIMESTAMP` 进行分区的，并且向其添加了一个月的 `INTERVAL`。在第
  12 章中，我们看到向一个落在 1 月 31 日的 `TIMESTAMP` 添加一个月的 `INTERVAL` 会导致错误，因为不存在 2 月 31 日。同样的问题会发生在区间分区上吗？答案是肯定的；如果你尝试使用诸如
  `''29-01-1990''`（任何月份中 28 号之后的日期）这样的日期，你将收到错误 "`ORA-14767: Cannot specify this interval
  with existing high bounds`"。数据库将不允许你使用一个在添加区间时不安全的边界值。


  在第 8 和第 9 行，你看到了这个表的范围分区方案；它从一个单独的、空的分区开始，该分区将包含任何早于 `01-JAN-1900` 的数据。由于该表保存的是审计跟踪，可以推测这个分区将永远保持较小且为空。它是一个必需的分区，被称为
  `过渡` 分区。所有严格小于此当前高值分区的数据都将使用传统的范围分区。只有在过渡分区高值之上的数据才会使用区间分区。如果我们查询数据字典，可以看到目前已创建的内容：


  ```

  SQL> select a.partition_name, a.tablespace_name, a.high_value,

  decode( a.interval, ''YES'', b.interval ) interval

  from user_tab_partitions a, user_part_tables b

  where a.table_name = ''AUDIT_TRAIL''

  and a.table_name = b.table_name

  order by a.partition_position;

  PARTITION_ TABLESPACE HIGH_VALUE                      INTERVAL

  ---------- ---------- ------------------------------- --------------------

  P0         USERS      TIMESTAMP'' 1900-01-01 00:00:00''

  ```


  到目前为止，我们只有一个分区，并且它不是一个 `INTERVAL` 分区，如空白的 `INTERVAL` 列所示。相反，它目前只是一个常规的 `RANGE` 分区；它将容纳任何严格小于
  `01-JAN-1900` 的数据。


  再次查看 `CREATE TABLE` 语句，我们可以在第 6 和第 7 行看到新区间分区的具体信息：


  ```

  interval (numtoyminterval(1,''month''))

  store in (users, example )

  ```


  在第 6 行，我们有实际的区间定义 `NUMTOYMINTERVAL(1,''MONTH'')`。我们的目标是存储按月分区——每个月的数据一个新分区——这是一个非常常见的目标。通过使用一个可以安全地增加一个月的日期（关于为何向时间戳增加一个月在某些情况下容易出错，请参阅第
  12 章）——例如每月的第一日——我们可以让数据库在数据到达时动态地为我们创建按月分区。


  在第 7 行，我们有具体说明：`store in (users,example)`。这使我们能够告诉数据库在何处创建这些新分区——使用哪些表空间。当数据库确定需要创建哪些分区时，它会使用此列表来决定在哪个表空间中创建每个分区。这允许数据库管理员控制期望的最大表空间大小：他们可能不想要一个
  500GB 的单一表空间，但会乐于接受十个 50GB 的表空间。在这种情况下，他们会设置十个表空间，并允许数据库使用所有这些表空间来创建分区。现在让我们插入一行数据，看看会发生什么：


  ```

  SQL> insert into audit_trail (ts,data) values ( to_timestamp(''27-feb-2020'',''dd-mon-yyyy''),
  ''xx'' );

  1 row created.

  SQL> select a.partition_name, a.tablespace_name, a.high_value,

  decode( a.interval, ''YES'', b.interval ) interval

  from user_tab_partitions a, user_part_tables b

  where a.table_name = ''AUDIT_TRAIL''

  and a.table_name = b.table_name

  order by a.partition_position;

  PARTITION_ TABLESPACE HIGH_VALUE                      INTERVAL

  ---------- ---------- ------------------------------- ---------------------

  P0         USERS      TIMESTAMP'' 1900-01-01 00:00:00''

  SYS_P1623  USERS      TIMESTAMP'' 2020-03-01 00:00:00'' NUMTOYMINTERVAL(1,''MONTH'')

  ```


  如果你还记得范围分区部分的内容，你会预期那个 `INSERT` 会失败。然而，由于我们使用的是区间分区，它成功了，并且实际上创建了一个新的分区 `SYS_P1623`。此分区的
  `HIGH_VALUE` 是 `01-MAR-2020`，如果我们使用的是范围分区，这将意味着任何严格小于 `01-MAR-2020` 且大于等于 `01-JAN-1900`
  的数据都会进入此分区，但因为我们有一个区间，规则就不同了。当设置了区间时，此分区的范围是任何大于等于 `HIGH_VALUE-INTERVAL` 且严格小于 `HIGH_VALUE`
  的数据。因此，这个分区的范围是


  ```

  SQL> select TIMESTAMP'' 2020-03-01 00:00:00''-NUMTOYMINTERVAL(1,''MONTH'') greater_than_eq_to,

  TIMESTAMP'' 2020-03-01 00:00:00'' strictly_less_than

  from dual;

  GREATER_THAN_EQ_TO               STRICTLY_LESS_THAN

  -------------------------------- --------------------------------

  01-FEB-20 12.00.00.000000000 AM  01-MAR-20 12.00.00.000000000 AM

  ```


  也就是说——2020 年 2 月整月的所有数据。如果我们在其他月份再插入一行，如下所示，我们可以看到另一个分区 `SYS_P1624` 被添加，它包含了 2020
  年 6 月整月的所有数据：



  ## 问题发现与分析


  ```

  SQL> insert into audit_trail (ts,data) values ( to_date(''25-jun-2020'',''dd-mon-yyyy''),
  ''xx'' );

  1 row created.

  SQL> select a.partition_name, a.tablespace_name, a.high_value,

  decode( a.interval, ''YES'', b.interval ) interval

  from user_tab_partitions a, user_part_tables b

  where a.table_name = ''AUDIT_TRAIL''

  and a.table_name = b.table_name

  order by a.partition_position;

  PARTITION_ TABLESPACE HIGH_VALUE                      INTERVAL

  ---------- ---------- ------------------------------- --------------------

  P0         USERS      TIMESTAMP'' 1900-01-01 00:00:00''

  SYS_P1623  USERS      TIMESTAMP'' 2020-03-01 00:00:00'' NUMTOYMINTERVAL(1,''MONTH'')

  SYS_P1624  USERS      TIMESTAMP'' 2020-07-01 00:00:00'' NUMTOYMINTERVAL(1,''MONTH'')

  ```


  你可能会看着这个输出，并询问为什么所有数据都在 `USERS` 表空间中。我们明确要求将数据分布在 `USERS` 表空间和 `EXAMPLE` 表空间上，那么为什么所有数据都在单个表空间中呢？这与数据库在确定数据应进入哪个分区时，同时计算它应进入哪个表空间的事实有关。由于我们的每个分区之间相隔偶数月，并且我们只使用了两个表空间，因此我们最终反复使用同一个表空间。如果我们只向该表中加载“每隔一个月”的数据，最终只会使用一个表空间。我们可以通过添加一些与我们现有数据相隔“奇数”月的数据行来观察
  `EXAMPLE` 表空间是否可以被使用：


  ## 解决方案与验证


  ```

  SQL> insert into audit_trail (ts,data) values ( to_date(''15-mar-2020'',''dd-mon-yyyy''),
  ''xx'' );

  1 row created.

  SQL> select a.partition_name, a.tablespace_name, a.high_value,

  decode( a.interval, ''YES'', b.interval ) interval

  from user_tab_partitions a, user_part_tables b

  where a.table_name = ''AUDIT_TRAIL''

  and a.table_name = b.table_name

  order by a.partition_position;

  PARTITION_ TABLESPACE HIGH_VALUE                      INTERVAL

  ---------- ---------- ------------------------------- --------------------

  P0         USERS      TIMESTAMP'' 1900-01-01 00:00:00''

  SYS_P1623  USERS      TIMESTAMP'' 2020-03-01 00:00:00'' NUMTOYMINTERVAL(1,''MONTH'')

  SYS_P1625  EXAMPLE    TIMESTAMP'' 2020-04-01 00:00:00'' NUMTOYMINTERVAL(1,''MONTH'')

  SYS_P1624  USERS      TIMESTAMP'' 2020-07-01 00:00:00'' NUMTOYMINTERVAL(1,''MONTH'')

  ```


  现在我们已经使用了 `EXAMPLE` 表空间。这个新分区被插入在两个现有分区之间，并将包含我们所有的 2020 年 3 月的数据。


  你可能会问，“如果我此时回滚会发生什么？”如果我们回滚，很明显我们刚刚插入的 `AUDIT_TRAIL` 行会消失：


  ```

  SQL> select * from audit_trail;

  TS                                  DATA

  ----------------------------------- ------------------------------

  27-FEB-20 12.00.00.000000 AM        xx

  15-MAR-20 12.00.00.000000 AM        xx

  25-JUN-20 12.00.00.000000 AM        xx

  SQL> rollback;

  Rollback complete.

  SQL> select * from audit_trail;

  no rows selected

  ```


  但立即不清楚的是，我们添加的分区会发生什么：它们会保留还是会一起消失？一个快速的查询将验证它们会保留：


  ```

  SQL> select a.partition_name, a.tablespace_name, a.high_value,

  decode( a.interval, ''YES'', b.interval ) interval

  from user_tab_partitions a, user_part_tables b

  where a.table_name = ''AUDIT_TRAIL''

  and a.table_name = b.table_name

  order by a.partition_position;

  PARTITION_ TABLESPACE HIGH_VALUE                      INTERVAL

  ---------- ---------- ------------------------------- ---------------------

  P0         USERS      TIMESTAMP'' 1900-01-01 00:00:00''

  SYS_P1623  USERS      TIMESTAMP'' 2020-03-01 00:00:00'' NUMTOYMINTERVAL(1,''MONTH'')

  SYS_P1625  EXAMPLE    TIMESTAMP'' 2020-04-01 00:00:00'' NUMTOYMINTERVAL(1,''MONTH'')

  SYS_P1624  USERS      TIMESTAMP'' 2020-07-01 00:00:00'' NUMTOYMINTERVAL(1,''MONTH'')

  ```


  一旦它们被创建，它们就会被提交并可见。这些分区是使用一个*递归*事务创建的，这是一个独立于你可能已经在执行的任何事务而执行的事务。当我们插入行并且数据库发现所需的分区不存在时，数据库立即启动一个新事务，更新数据字典以反映新分区的存在，并提交其工作。它必须这样做，否则在许多插入操作上会出现严重的争用（串行化），因为其他事务将不得不等待我们提交才能看到这个新分区。因此，这个
  DDL 是在你现有事务之外完成的，分区将持续存在。


  ## 分区命名与管理


  你可能已经注意到数据库为我们命名了分区；`SYS_P1625` 是最新分区的名称。这些名称不可排序，而且大多数人可能也不觉得它们很有意义。它们显示了分区添加到表中的顺序（尽管你不能总是依赖这一点；这可能会改变），但除此之外没有太多信息。通常，在范围分区表中，DBA
  会使用某种命名方案来命名分区，并且在大多数情况下会使分区名称可排序。例如，二月份的数据可能在名为 `PART_2020_02` 的分区中（使用 `PART_yyyy_mm`
  格式），三月份的数据可能在 `PART_2020_03` 中，依此类推。对于区间分区，你无法控制分区的创建名称，但如果你愿意，可以在之后轻松重命名它们。例如，我们可以查询出
  `HIGH_VALUE` 字符串，并使用动态 SQL 将其转换为格式良好、有意义的名称。我们之所以可以这样做，是因为我们了解我们希望名称如何格式化；数据库并不知道。例如：


  ```

  SQL> declare

  l_str varchar2(4000);

  begin

  for x in ( select a.partition_name, a.tablespace_name, a.high_value

  from user_tab_partitions a

  where a.table_name = ''AUDIT_TRAIL''

  and a.interval = ''YES''

  and a.partition_name like ''SYS\_P%'' escape ''\'' )

  loop

  execute immediate

  ''select to_char( '' || x.high_value ||

  ''-numtodsinterval(1,''''second''''), ''''"PART_"yyyy_mm'''' ) from dual''

  into l_str;

  execute immediate

  ''alter table audit_trail rename partition "'' ||

  x.partition_name || ''" to "'' || l_str || ''"'';

  end loop;

  end;

  /

  PL/SQL procedure successfully completed.

  ```


  所以，我们所做的是获取 `HIGH_VALUE` 并从中减去一秒。我们知道 `HIGH_VALUE` 代表*严格小于*的值，因此比其值早一秒的值将是一个范围内的值。一旦我们有了那个值，我们就将格式
  `"PART_"yyyy_mm` 应用于生成的 `TIMESTAMP`，并得到一个字符串，例如三月份的 `PART_2020_03`。我们在重命名命令中使用该字符串，现在我们的数据字典如下所示：


  ```

  SQL> select a.partition_name, a.tablespace_name, a.high_value,

  decode( a.interval, ''YES'', b.interval ) interval

  from user_tab_partitions a, user_part_tables b

  where a.table_name = ''AUDIT_TRAIL''

  and a.table_name = b.table_name

  order by a.partition_position;

  PARTITION_NAME TABLESPACE HIGH_VALUE                      INTERVAL

  -------------- ---------- ------------------------------- -----------------

  P0             USERS      TIMESTAMP'' 1900-01-01 00:00:00''

  PART_2020_02   USERS      TIMESTAMP'' 2020-03-01 00:00:00'' NUMTOYMINTERVAL(1,''MONTH'')

  PART_2020_03   EXAMPLE    TIMESTAMP'' 2020-04-01 00:00:00'' NUMTOYMINTERVAL(1,''MONTH'')

  PART_2020_06   USERS      TIMESTAMP'' 2020-07-01 00:00:00'' NUMTOYMINTERVAL(1,''MONTH'')

  ```


  我们只需时不时地运行该脚本来重命名任何新添加的分区，以保持良好的命名约定。请记住，为避免任何 SQL 注入问题（我们使用的是字符串连接，而不是绑定变量；我们不能在
  DDL 中使用绑定变量），我们应将此脚本保留为匿名块或调用者权限例程（如果我们决定将其创建为存储过程）。这将防止其他人在我们的模式中以我们的身份运行 SQL，这可能是一场灾难。




  '
- '# 参考分区


  参考分区解决了父/子表等分区的问题；即，当你需要子表以这样的方式进行分区，使得每个子表分区与一个父表分区具有一一对应的关系。这在诸如数据仓库等情况下非常重要，在那里你希望保持特定数量的数据在线（比如最近五年的
  `ORDER` 信息），并且需要确保相关的子数据（`ORDER_LINE_ITEMS` 数据）也在线。在这个经典的例子中，`ORDERS` 表通常会有一个列 `ORDER_DATE`，从而可以轻松地按月分区，进而便于保持最近五年的数据在线。随着时间推移，你只需准备好下个月的分区用于加载，并丢弃最旧的分区。然而，当你考虑
  `ORDER_LINE_ITEMS` 表时，你会发现你会遇到一个问题。它没有 `ORDER_DATE` 列，并且在 `ORDER_LINE_ITEMS` 表中没有任何内容可以用来对其进行分区；因此，它不利于清除旧信息或加载新信息。


  在过去，在参考分区出现之前，开发人员不得不对数据进行反规范化，实际上就是将 `ORDER_DATE` 属性从父表 `ORDERS` 复制到子表 `ORDER_LINE_ITEMS`
  表中。这带来了典型的数

  据冗余问题，即增加了存储开销、增加了数据加载资源、级联更新问题（如果你修改了父表，你必须确保更新父数据的所有副本），等等。此外，如果你在数据库中启用了外键约束（你应该这样做），你会发现你失去了截断或丢弃父表中旧分区的能力。例如，让我们从
  `ORDERS` 表开始，建立传统的 `ORDERS` 和 `ORDER_LINE_ITEMS` 表：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> create table orders

  (

  order#      number primary key,

  order_date  date,

  data       varchar2(30)

  )

  enable row movement

  PARTITION BY RANGE (order_date)

  (

  PARTITION part_2020 VALUES LESS THAN (to_date(''01-01-2021'',''dd-mm-yyyy'')) ,

  PARTITION part_2021 VALUES LESS THAN (to_date(''01-01-2022'',''dd-mm-yyyy''))

  );

  Table created.

  SQL> insert into orders values (1, to_date( ''01-jun-2020'', ''dd-mon-yyyy'' ),
  ''xxx'' );

  1 row created.

  SQL> insert into orders values (2, to_date( ''01-jun-2021'', ''dd-mon-yyyy'' ),
  ''xxx'' );

  1 row created.

  ```


  现在，我们将创建 `ORDER_LINE_ITEMS` 表——包含一些指向 `ORDERS` 表的数据：


  ```

  SQL> create table order_line_items

  (

  order#      number,

  line#       number,

  order_date  date, -- 手动从 ORDERS 复制而来！

  data       varchar2(30),

  constraint c1_pk primary key(order#,line#),

  constraint c1_fk_p foreign key(order#) references orders

  )

  enable row movement

  PARTITION BY RANGE (order_date)

  (

  PARTITION part_2020 VALUES LESS THAN (to_date(''01-01-2021'',''dd-mm-yyyy'')) ,

  PARTITION part_2021 VALUES LESS THAN (to_date(''01-01-2022'',''dd-mm-yyyy''))

  );

  Table created.

  SQL> insert into order_line_items values ( 1, 1, to_date( ''01-jun-2020'', ''dd-mon-yyyy''
  ), ''yyy'' );

  1 row created.

  SQL> insert into order_line_items values ( 2, 1, to_date( ''01-jun-2021'', ''dd-mon-yyyy''
  ), ''yyy'' );

  1 row created.

  ```


  现在，如果我们要删除包含 2020 年数据的 `ORDER_LINE_ITEMS` 分区，你我都知道，相应的 2020 年 `ORDERS` 分区也可以被删除，而不会违反引用完整性约束。你我知道这一点，但数据库并不知道这个事实：


  ```

  SQL> alter table order_line_items drop partition part_2020;

  Table altered.

  SQL> alter table orders drop partition part_2020;

  alter table orders drop partition part_2020

  *

  ERROR at line 1:

  ORA-02266: unique/primary keys in table referenced by enabled foreign keys

  ```


  因此，这种方法不仅笨重、资源密集，并且可能损害我们的数据完整性，它还阻止了我们做管理分区表时经常需要做的事情：清除旧信息。


  引入参考分区。使用参考分区，子表将继承其父表的分区方案，而无需对分区键进行反规范化，*并且*它允许数据库理解子表与父表是等分区的。也就是说，当我们截断或删除相应的子表分区时，我们将能够截断或删除父表分区。


  重新实现我们前面例子的简单语法可以如下所示。我们将重用现有的父表 `ORDERS`，并且只截断该表：


  ```

  SQL> drop table order_line_items cascade constraints;

  Table dropped.

  SQL> truncate table orders;

  Table truncated.

  SQL> insert into orders values ( 1, to_date( ''01-jun-2020'', ''dd-mon-yyyy'' ),
  ''xxx'' );

  1 row created.

  SQL> insert into orders values ( 2, to_date( ''01-jun-2021'', ''dd-mon-yyyy'' ),
  ''xxx'' );

  1 row created.

  ```


  并创建一个新的子表：


  ```

  SQL> create table order_line_items

  (

  order#      number,

  line#       number,

  data       varchar2(30),

  constraint c1_pk primary key(order#,line#),

  constraint c1_fk_p foreign key(order#) references orders

  )

  enable row movement

  partition by reference(c1_fk_p);

  Table created.

  SQL> insert into order_line_items values ( 1, 1, ''yyy'' );

  1 row created.

  SQL> insert into order_line_items values ( 2, 1, ''yyy'' );

  1 row created.

  ```


  神奇之处在于 `CREATE TABLE` 语句的第 10 行。在这里，我们用 `PARTITION BY REFERENCE` 替换了范围分区语句。这允许我们指定要使用的外键约束名称，以确定我们的分区方案将是什么。在这里，我们看到外键指向
  `ORDERS` 表——数据库读取了 `ORDERS` 表的结构并确定它有两个分区——因此，我们的子表也将有两个分区。事实上，如果我们现在查询数据字典，我们可以看到这两个表具有完全相同的分区结构：


  ```

  SQL> select table_name, partition_name

  from user_tab_partitions

  where table_name in ( ''ORDERS'', ''ORDER_LINE_ITEMS'' )

  order by table_name, partition_name;

  TABLE_NAME           PARTITION_NAME

  -------------------- --------------------

  ORDERS               PART_2020

  ORDERS               PART_2021

  ORDER_LINE_ITEMS     PART_2020

  ORDER_LINE_ITEMS     PART_2021

  ```


  此外，由于数据库理解这两个表是相关的，我们可以删除父表分区，并让它自动清理相关的子表分区（因为子表从父表继承，任何对父表分区结构的更改都会级联下去）：


  ```

  SQL> alter table orders drop partition part_2020 update global indexes;

  Table altered.

  SQL> select table_name, partition_name

  from user_tab_partitions

  where table_name in ( ''ORDERS'', ''ORDER_LINE_ITEMS'' )

  order by table_name, partition_name;

  TABLE_NAME           PARTITION_NAME

  -------------------- --------------------

  ORDERS               PART_2021

  ORDER_LINE_ITEMS     PART_2021

  ```


  因此，之前我们无法执行的 `DROP` 操作现在被允许了，并且它会自动级联到子表。此外，如果我们 `ADD` 一个分区，如下所示，我们可以看到该操作也会级联；父表和子表之间将存在一对一的对应关系：


  ```

  SQL> alter table orders add partition

  part_2022 values less than

  (to_date( ''01-01-2023'', ''dd-mm-yyyy'' ));

  Table altered.

  SQL> select table_name, partition_name

  from user_tab_partitions

  where table_name in ( ''ORDERS'', ''ORDER_LINE_ITEMS'' )

  order by table_name, partition_name;

  TABLE_NAME           PARTITION_NAME

  -------------------- ---------------

  ORDERS               PART_2021

  ORDERS               PART_2022

  ORDER_LINE_ITEMS     PART_2021

  ORDER_LINE_ITEMS     PART_2022

  ```




  '
- '# 引用分区


  之前讨论的 `CREATE TABLE` 语句中未涉及的部分是 `ENABLE ROW MOVEMENT`。简言之，该语法允许执行 `UPDATE` 操作，使得
  `UPDATE` 修改了分区键值，并导致行从其当前分区移动到其他分区。


  由于我们在最初定义父表时允许了行移动，因此我们不得不将所有子表（及其子表等）也定义为具有此功能。因为如果父行移动，并且我们使用的是引用分区，那么子行也必须移动。例如：


  ```

  SQL> select ''2021'', count(*) from order_line_items partition(part_2021)

  union all

  select ''2022'', count(*) from order_line_items partition(part_2022);

  ''202   COUNT(*)

  ---- ----------

  2021          1

  2022          0

  ```


  我们可以看到，目前子表 `ORDER_LINE_ITEMS` 中的数据位于 2021 分区中。通过对父表 `ORDERS` 执行如下简单的更新，可以看到数据发生了移动——在子表中：


  ```

  SQL> update orders set order_date = add_months(order_date,12);

  1 row updated.

  SQL> select ''2021'', count(*) from order_line_items partition(part_2021)

  union all

  select ''2022'', count(*) from order_line_items partition(part_2022);

  ''202   COUNT(*)

  ---- ----------

  2021          0

  2022          1

  ```


  对父表的更新会级联到子表，并导致子表移动一行或多行（根据需要）。


  总结一下，引用分区消除了在对父表和子表进行分区时对数据进行反规范化的需求。此外，当删除父分区时，它会自动删除被引用的子分区。这些功能在数据仓库环境中非常有用。


  ### 区间引用分区


  Oracle 灵活地允许您结合使用区间分区和引用分区。例如，如果您创建一个区间范围分区的父表，如下所示：


  ```

  SQL> create table orders

  (order#      number primary key,

  order_date  timestamp,

  data        varchar2(30))

  PARTITION BY RANGE (order_date)

  INTERVAL (numtoyminterval(1,''year''))

  (PARTITION part_2020 VALUES LESS THAN (to_date(''01-01-2021'',''dd-mm-yyyy'')) ,

  PARTITION part_2021 VALUES LESS THAN (to_date(''01-01-2022'',''dd-mm-yyyy'')));

  Table created.

  ```


  接下来是创建引用分区子表的代码：


  ```

  SQL> create table order_line_items

  ( order#      number,

  line#       number,

  data        varchar2(30),

  constraint c1_pk primary key(order#,line#),

  constraint c1_fk_p foreign key(order#) references orders)

  partition by reference(c1_fk_p);

  Table created.

  ```


  为了查看区间引用分区的实际操作，让我们插入一些数据。首先，插入将适合现有范围分区的行：


  ```

  SQL> insert into orders values (1, to_date( ''01-jun-2020'', ''dd-mon-yyyy'' ),
  ''xxx'');

  1 row created.

  SQL> insert into orders values (2, to_date( ''01-jun-2021'', ''dd-mon-yyyy'' ),
  ''xxx'');

  1 row created.

  SQL> insert into order_line_items values( 1, 1, ''yyy'' );

  1 row created.

  SQL> insert into order_line_items values( 2, 1, ''yyy'' );

  1 row created.

  ```


  所有前面的行都符合创建表时指定的分区。以下查询显示当前分区：


  ```

  SQL> select table_name, partition_name from user_tab_partitions

  where table_name in ( ''ORDERS'', ''ORDER_LINE_ITEMS'' )

  order by table_name, partition_name;

  TABLE_NAME                PARTITION_NAME

  ------------------------- -------------------------

  ORDERS                    PART_2020

  ORDERS                    PART_2021

  ORDER_LINE_ITEMS          PART_2020

  ORDER_LINE_ITEMS          PART_2021

  ```


  接下来，插入不适合现有范围分区的行；因此，Oracle 会自动创建分区来保存新插入的行：


  ```

  SQL> insert into orders values (3, to_date( ''01-jun-2022'', ''dd-mon-yyyy'' ),
  ''xxx'');

  1 row created.

  SQL> insert into order_line_items values(3, 1, ''zzz'' );

  1 row created.

  ```


  以下查询显示自动创建了两个区间分区，一个用于父表，一个用于子表：


  ```

  SQL> select a.table_name, a.partition_name, a.high_value,

  decode( a.interval, ''YES'', b.interval ) interval

  from user_tab_partitions a, user_part_tables b

  where a.table_name IN (''ORDERS'', ''ORDER_LINE_ITEMS'')

  and a.table_name = b.table_name

  order by a.table_name;

  TABLE_NAME         PARTITION_ HIGH_VALUE                        INTERVAL

  ------------------ ---------- --------------------------------- --------

  ORDERS             PART_2020  TIMESTAMP'' 2021-01-01 00:00:00''

  ORDERS             PART_2021  TIMESTAMP'' 2022-01-01 00:00:00''

  ORDERS             SYS_P1640  TIMESTAMP'' 2023-01-01 00:00:00''   NUMTOYMINTERVAL(1,''YEAR'')

  ORDER_LINE_ITEMS   PART_2020

  ORDER_LINE_ITEMS   PART_2021

  ORDER_LINE_ITEMS   SYS_P1640                                    YES

  ```


  创建了两个名为 `SYS_P1640` 的分区，父表分区的高值为 2023-01-01。如果需要，可以通过 `ALTER TABLE` 命令重命名分区：


  ```

  SQL> alter table orders rename partition sys_p1640 to part_2022;

  Table altered.

  SQL> alter table order_line_items rename partition sys_p1640 to part_2022;

  Table altered.

  ```


  > 提示

  >

  > 有关通过 PL/SQL 自动重命名分区的示例，请参阅本章的“区间分区”部分。




  ### 虚拟列分区


  虚拟列分区允许你基于 SQL 表达式进行分区。当表中的一列承载了多种业务值，而你希望基于该列的一部分进行分区时，这种分区方式非常有用。例如，假设你的一个表中有一个
  `RESERVATION_CODE` 列：

  ```sql

  $ sqlplus eoda/foo@PDB1

  SQL> create table res(reservation_code varchar2(30));

  Table created.

  ```

  并且 `RESERVATION_CODE` 列的第一个字符定义了预订来源的区域。在本例中，假设首字符为 `A` 或 `C` 映射到 `NE` 区域，值为 `B`
  映射到 `SW` 区域，值为 `D` 映射到 `NW` 区域。


  在这种场景下，我们知道第一个字符代表区域，并且希望能够按区域进行列表分区。按数据现状来看，直接按 `RESERVATION_CODE` 列进行列表分区并不实际，而虚拟分区允许我们对该列应用一个
  SQL 函数，然后按其首字符进行列表分区。以下是采用虚拟分区定义的表结构：

  ```sql

  SQL> drop table res;

  SQL> create table res(

  reservation_code varchar2(30),

  region as

  (decode(substr(reservation_code,1,1),''A'',''NE''

  ,''C'',''NE''

  ,''B'',''SW''

  ,''D'',''NW'')

  )

  )

  partition by list (region)

  (partition NE values(''NE''),

  partition SW values(''SW''),

  partition NW values(''NW''));

  Table created.

  ```

  我们可以通过以下查询查看分区信息：

  ```sql

  SQL> select a.table_name, a.partition_name, a.high_value

  from user_tab_partitions a, user_part_tables b

  where a.table_name = ''RES''

  and a.table_name = b.table_name

  order by a.table_name;

  TABLE_NAME       PARTITION_ HIGH_VALUE

  ---------------- ---------- -------------------------------

  RES              NE         ''NE''

  RES              NW         ''NW''

  RES              SW         ''SW''

  ```

  接下来，向表中插入一些随机测试数据（你的随机结果将与此示例不同）：

  ```sql

  SQL> insert into res (reservation_code)

  select chr(64+(round(dbms_random.value(1,4)))) || level

  from dual connect by level < 10;

  9 rows created.

  ```

  现在我们来看看数据是如何被分区的：

  ```sql

  SQL> select ''NE'', reservation_code, region from res partition(NE)

  union all

  select ''SW'', reservation_code, region from res partition(SW)

  union all

  select ''NW'', reservation_code, region from res partition(NW);

  ''N RESERVATION_CODE               RE

  -- ------------------------------ --

  NE C3                             NE

  NE C5                             NE

  NE A6                             NE

  NE C8                             NE

  SW B2                             SW

  SW B7                             SW

  SW B9                             SW

  NW D1                             NW

  NW D4                             NW

  ```

  因此，当业务需求要求对一列中的部分数据或来自不同列的数据组合进行分区时（尤其是在没有明显方式进行列表或范围分区的情况下），虚拟列分区通常是合适的选择。虚拟列背后的表达式可以是复杂的计算、返回列字符串的子集、组合列值等等。


  ### 组合分区


  最后，我们来看一些组合分区的示例，它是范围、哈希和/或列表分区的混合体。表 13-1 列出了你可以混合搭配分区类型的各种方式。换句话说，该表显示了目前可用的九种不同的组合分区方案。


  **表 13-1 Oracle 数据库按版本支持的组合分区方案**


  |          | 范围 | 列表 | 哈希 |

  | --- | --- | --- | --- |

  | 范围 | 是 | 是 | 是 |

  | 列表 | 是 | 是 | 是 |

  | 哈希 | 是 | 是 | 是 |


  有趣的是，当你使用组合分区时，将不会存在分区段；只会有子分区段。使用组合分区时，分区本身没有段（就像分区表本身没有段一样）。数据物理上存储在子分区段中，分区则成为一个*逻辑容器*，即一个指向实际子分区的容器。


  在我们的示例中，我们将研究范围-哈希组合分区。这里，我们为范围分区和哈希分区使用了不同的列。这不是强制性的；我们也可以对两者使用相同的列集：

  ```sql

  $ sqlplus eoda/foo@PDB1

  SQL> CREATE TABLE composite_example

  ( range_key_column   date,

  hash_key_column    int,

  data               varchar2(20)

  )

  PARTITION BY RANGE (range_key_column)

  subpartition by hash(hash_key_column) subpartitions 2

  (

  PARTITION part_1

  VALUES LESS THAN(to_date(''01/01/2021'',''dd/mm/yyyy''))

  (subpartition part_1_sub_1,

  subpartition part_1_sub_2

  ),

  PARTITION part_2

  VALUES LESS THAN(to_date(''01/01/2022'',''dd/mm/yyyy''))

  (subpartition part_2_sub_1,

  subpartition part_2_sub_2

  )

  );

  Table created.

  ```

  在范围-哈希组合分区中，Oracle 会首先应用范围分区规则来确定数据属于哪个范围。然后，它将应用哈希函数来决定数据最终应放置在哪个物理分区中。这个过程如图 13-4
  所述。


  ![../images/319655_4_En_13_Chapter/319655_4_En_13_Fig4_HTML.jpg](img/319655_4_En_13_Fig4_HTML.jpg)


  **图 13-4 范围-哈希组合分区示例**


  因此，组合分区使你能够按范围拆分数据，并且当某个给定的范围被认为太大或进一步分区消除可能有用时，再通过哈希或列表对其进行更细粒度的拆分。有趣的是，每个范围分区不一定具有相同数量的子分区；例如，假设你正在按日期列进行范围分区以支持数据清除（以便快速轻松地删除所有旧数据）。在
  2020 年及之前，你在 `CODE_KEY_COLUMN` 中的奇数代码编号和偶数代码编号的数据量相等。但在此之后，你知道与奇数代码编号相关的记录数量增加了一倍多，并且你希望为奇数代码值设置更多的子分区。你可以通过简单地定义更多的子分区来轻松实现这一点：

  ```sql

  SQL> CREATE TABLE composite_range_list_example

  ( range_key_column   date,

  code_key_column    int,

  data               varchar2(20)

  )

  PARTITION BY RANGE (range_key_column)

  subpartition by list(code_key_column)

  (

  PARTITION part_1

  VALUES LESS THAN(to_date(''01/01/2021'',''dd/mm/yyyy''))

  (subpartition part_1_sub_1 values( 1, 3, 5, 7 ),

  subpartition part_1_sub_2 values( 2, 4, 6, 8 )

  ),

  PARTITION part_2

  VALUES LESS THAN(to_date(''01/01/2022'',''dd/mm/yyyy''))

  (subpartition part_2_sub_1 values ( 1, 3 ),

  subpartition part_2_sub_2 values ( 5, 7 ),

  subpartition part_2_sub_3 values ( 2, 4, 6, 8 )

  )

  );

  Table created.

  ```

  在这里，你最终总共有五个分区：分区 `PART_1` 有两个子分区，分区 `PART_2` 有三个子分区。



  ### 行移动


  你可能会好奇，如果在上述任一分区方案中，用于确定分区的列值被修改了，会发生什么。这里有两种情况需要考虑：

  *   修改不会导致使用不同的分区；该行仍属于当前分区。所有情况都支持此操作。

  *   修改会导致该行在分区之间“移动”。*如果*为该表启用了行移动，则支持此操作；否则，将引发错误。


  我们可以轻松观察到这些行为。在前面的“范围分区”部分示例中，我们向 `RANGE_EXAMPLE` 表的 `PART_1` 分区插入了一对行：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> CREATE TABLE range_example

  ( range_key_column date,

  data             varchar2(20)

  )

  PARTITION BY RANGE (range_key_column)

  ( PARTITION part_1 VALUES LESS THAN

  (to_date(''01/01/2021'',''dd/mm/yyyy'')),

  PARTITION part_2 VALUES LESS THAN

  (to_date(''01/01/2022'',''dd/mm/yyyy''))

  );

  表已创建。

  SQL> insert into range_example

  ( range_key_column, data )

  values

  ( to_date( ''15-dec-2020 00:00:00'',  ''dd-mon-yyyy hh24:mi:ss'' ),

  ''application data...'' );

  已创建 1 行。

  SQL> insert into range_example

  ( range_key_column, data )

  values

  ( to_date( ''01-jan-2021 00:00:00'', ''dd-mon-yyyy hh24:mi:ss'' )-1/24/60/60,

  ''application data...'' );

  已创建 1 行。

  SQL> select * from range_example partition(part_1);

  RANGE_KEY DATA

  --------- --------------------

  15-DEC-20 application data...

  31-DEC-20 application data...

  ```


  我们选取其中一行，更新其 `RANGE_KEY_COLUMN` 的值，使其可以保留在 `PART_1` 中：


  ```

  SQL> update range_example set range_key_column = trunc(range_key_column)

  where range_key_column =

  to_date( ''31-dec-2020 23:59:59'', ''dd-mon-yyyy hh24:mi:ss'' );

  已更新 1 行。

  ```


  如预期，此操作成功：该行保留在分区 `PART_1` 中。接下来，我们将 `RANGE_KEY_COLUMN` 更新为一个会导致它属于 `PART_2` 的值：


  ```

  SQL> update range_example

  set range_key_column = to_date(''01-jan-2021'',''dd-mon-yyyy'')

  where range_key_column = to_date(''31-dec-2020'',''dd-mon-yyyy'');

  update range_example

  *

  第 1 行出现错误:

  ORA-14402: 更新分区键列将导致分区更改

  ```


  由于我们没有显式启用行移动，因此立即引发错误。我们可以在此表上启用行移动，以允许行在分区之间移动。但是，你应该意识到这样做有一个微妙的副作用，即行的 `ROWID`
  将因更新而改变：


  ```

  SQL> select rowid  from range_example

  where range_key_column = to_date(''31-dec-2020'',''dd-mon-yyyy'');

  ROWID

  ----------------

  AAAtzXAAGAAAaO6AAB

  SQL> alter table range_example enable row movement;

  表已更改。

  SQL> update range_example

  set range_key_column = to_date(''01-jan-2021'',''dd-mon-yyyy'')

  where range_key_column = to_date(''31-dec-2020'',''dd-mon-yyyy'');

  已更新 1 行。

  SQL> select rowid  from range_example

  where range_key_column = to_date(''01-jan-2021'',''dd-mon-yyyy'');

  ROWID

  ----------------

  AAAtzYAAGAAAae6AAA

  ```


  只要理解在此更新操作中行的 `ROWID` 会发生变化，启用行移动就可以让你更新分区键。


  注意


  在其他情况下，更新也可能导致 `ROWID` 发生变化。例如，更新索引组织表的主键时，该行的通用 `ROWID` 也会改变。`FLASHBACK TABLE`
  命令以及 `ALTER TABLE SHRINK` 命令也可能改变行的 `ROWID`。


  你需要理解，从内部机制上看，行移动的执行方式相当于你实际上删除了该行并重新插入了它。它会更新此表上的每一个索引，删除旧条目并插入新条目。它会执行 `DELETE`
  加上 `INSERT` 的物理工作。然而，Oracle 将其视为一个更新操作，即使它在物理上删除并插入了该行——因此，它不会触发 `INSERT` 和 `DELETE`
  触发器，只会触发 `UPDATE` 触发器。此外，那些可能因外键约束而阻止 `DELETE` 的子表，在此情况下不会阻止。但是，你必须准备好应对将要执行的额外工作；它比普通的
  `UPDATE` 开销大得多。因此，设计一个系统，其中分区键被频繁修改，并且这种修改会导致分区移动，将是一个糟糕的设计决策。



  ## 表分区方案总结


  通常，当你拥有按某些值逻辑隔离的数据时，范围分区非常有用。基于时间的数据立即成为经典示例——按“销售季度”、“财政年度”或“月份”进行分区。范围分区在许多情况下能够利用分区消除，包括使用精确相等性和范围（小于、大于、介于等等）。


  哈希分区适用于没有自然范围可用于分区的数据。例如，如果你需要加载一个充满人口普查相关数据的表，可能没有一个属性适合进行范围分区。但是，你仍然希望利用分区提供的管理、性能和可用性增强功能。此时，你可以简单地选择一个唯一或几乎唯一的列集进行哈希。这将实现数据在任意数量分区上的均匀分布。哈希分区对象在使用精确相等或
  `IN ( value, value, ... )` 时能够利用分区消除，但在使用数据范围时则无法利用。


  列表分区适用于某一列具有离散值集的数据，并且基于应用程序的使用方式，按该列进行分区是有意义的（例如，它便于在查询中进行分区消除）。经典示例是州或地区代码——或者，实际上，许多通用的代码类型属性。


  间隔分区扩展了范围分区功能，允许在插入表的数据不适合现有分区时自动添加分区。此功能极大地增强了范围分区，因为涉及的维护工作更少（因为 `DBA` 不必必须监控范围并手动添加分区）。


  引用分区简化了通过引用完整性约束相关的分区表的实现。这使得子表能够以与父表相同的逻辑方式进行分区，而无需将父表列复制到子表。


  间隔引用分区允许你结合间隔和引用分区功能。当你需要同时使用间隔和引用分区功能时，此功能非常有用。


  虚拟列分区允许你使用虚拟列作为键进行分区。此功能为你提供了灵活性，可以在常规列值的子字符串（或任何其他 `SQL` 表达式）上进行分区。当无法使用现有列作为分区键，但可以基于现有列中包含的值的子集进行分区时，这非常有用。


  当你有逻辑依据可以进行范围分区，但产生的范围分区仍然太大而无法有效管理时，复合分区非常有用。你可以应用范围、列表或哈希分区，然后进一步通过哈希函数划分每个范围，或者使用列表进行分区，甚至再次使用范围。这将允许你将
  `I/O` 请求分散到任何给定大型分区中的多个设备上。此外，你现在可以在三个级别实现分区消除。如果你在分区键上进行查询，`Oracle` 能够消除不符合你条件的所有分区。如果你在查询中添加子分区键，`Oracle`
  可以消除该分区内的其他子分区。如果你仅在子分区键上进行查询（不使用分区键），`Oracle` 将仅查询每个分区中适用的那些哈希或列表子分区。


  建议：如果有依据可以合理地对数据进行范围分区，则应优先使用范围分区，而不是哈希或列表分区。哈希和列表分区增加了许多显著的分区优势，但在涉及分区消除时，它们不如范围分区分区有用。当产生的范围分区太大而无法管理，或者你想对单个范围分区使用所有
  `PDML` 功能或并行索引扫描时，建议在范围内使用哈希或列表子分区。


  ### 分区索引


  索引和表一样，可以被分区。有两种可能的方法对索引进行分区：


  *   使索引与表`均匀分区`：这也被称为`本地索引`。对于每个表分区，将有一个索引分区，该分区仅索引该表分区。给定索引分区中的所有条目都指向单个表分区，而单个表分区中的所有行都在单个索引分区中表示。


  *   按范围或哈希`分区`索引：这也被称为`全局分区索引`。在这里，索引按范围分区，或者可选地按哈希分区，并且单个索引分区可能指向*任何*（以及所有）表分区。


  图 13-5 展示了`本地`索引和`全局`索引之间的区别。


  ![../images/319655_4_En_13_Chapter/319655_4_En_13_Fig5_HTML.jpg](img/319655_4_En_13_Fig5_HTML.jpg)


  图 13-5


  `本地`和`全局`索引分区


  在`全局分区索引`的情况下，请注意索引分区的数量可能与表分区的数量不同。


  由于`全局索引`只能按范围或哈希分区，如果你希望拥有列表或复合分区索引，则必须使用`本地索引`。`本地索引`将使用与底层表相同的方案进行分区。


  #### 本地索引与全局索引


  根据我的经验，数据仓库系统中的大多数分区实现都使用`本地索引`。在 `OLTP` 系统中，`全局索引`更为常见，我们很快会看到原因。这与需要在索引结构上执行分区消除，以在分区后保持与分区前相同的查询响应时间有关。


  `本地索引`具有某些特性，使其成为大多数数据仓库实现的最佳选择。它们支持可用性更高的环境（停机时间更少），因为问题将被隔离到某个范围或哈希的数据。另一方面，由于`全局索引`可以指向多个表分区，它可能成为故障点，导致某些查询无法访问所有分区。


  在分区维护操作方面，`本地索引`更加灵活。如果 `DBA` 决定移动一个表分区，则只需重建或维护相关的`本地索引`分区。使用`全局索引`时，所有索引分区都必须实时重建或维护。滑动窗口实现也是如此，其中旧数据从分区中过期，新数据进入。没有任何`本地索引`需要重建，但所有`全局索引`都将在分区操作期间被重建或维护。在某些情况下，`Oracle`
  可以利用索引在本地与表分区一起分区的事实，并基于此制定优化的查询计划。对于`全局索引`，索引和表分区之间没有这种关系。


  `本地索引`还便于执行分区时间点恢复操作。如果由于某种原因需要将单个分区恢复到比表的其余部分更早的时间点，所有`本地分区索引`都可以恢复到相同的时间点。该对象上的所有`全局索引`都需要重建。这并不意味着“避免使用`全局索引`”——事实上，它们出于性能原因至关重要，你很快就会了解到——你只需要意识到使用它们的含义。



  ### 本地索引


  Oracle 对以下两种类型的本地索引有所区分：


  *   `本地前缀索引`：这类索引的分区键位于索引定义的前导边缘。例如，如果一个表按名为 `LOAD_DATE` 的列进行了范围分区，那么该表上的一个本地前缀索引会将
  `LOAD_DATE` 作为其列列表中的第一列。


  *   `本地非前缀索引`：这类索引的列列表前导边缘上`不`包含分区键。索引中可能包含分区键列，也可能不包含。


  两种类型的索引都能够利用分区消除，都能支持唯一性（只要非前缀索引包含分区键），等等。事实是，使用本地前缀索引的查询总是`允许`索引分区消除，而使用本地非前缀索引的查询可能无法实现。这就是为什么有些人说本地非前缀索引更慢——它们不`强制`分区消除（但它们确实支持该功能）。


  当索引在查询中作为访问表的初始路径时，本地前缀索引相比本地非前缀索引并没有什么固有的优势。我的意思是，如果查询可以以“`扫描索引`”作为第一步开始，那么前缀索引和非前缀索引之间没有太大区别。


  #### 分区消除行为


  对于从索引访问开始的查询，它是否能排除某些分区，实际上完全取决于查询中的谓词。一个小例子将有助于说明这一点。以下代码创建了一个表 `PARTITIONED_TABLE`，该表按数值列
  `A` 进行范围分区，使得小于 2 的值在分区 `PART_1` 中，小于 3 的值在分区 `PART_2` 中：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> CREATE TABLE partitioned_table

  ( a int,

  b int,

  data char(20)

  )

  PARTITION BY RANGE (a)

  (

  PARTITION part_1 VALUES LESS THAN(2) tablespace p1,

  PARTITION part_2 VALUES LESS THAN(3) tablespace p2

  );

  Table created.

  ```


  然后我们创建一个本地前缀索引 `LOCAL_PREFIXED` 和一个本地非前缀索引 `LOCAL_NONPREFIXED`。请注意，非前缀索引的定义中，`A`
  不在前导边缘上，这就是它成为非前缀索引的原因：


  ```

  SQL> create index local_prefixed on partitioned_table (a,b) local;

  Index created.

  SQL> create index local_nonprefixed on partitioned_table (b) local;

  Index created.

  ```


  接下来，我们向一个分区中插入一些数据并收集统计信息：


  ```

  SQL> insert into partitioned_table

  select mod(rownum-1,2)+1, rownum, ''x''

  from dual connect by level < 1000;

  999 rows created.

  SQL> begin

  dbms_stats.gather_table_stats (user, ''PARTITIONED_TABLE'', cascade=>TRUE );

  end;

  /

  PL/SQL procedure successfully completed.

  ```


  我们将表空间 `P2` 置为离线，该表空间包含了表和索引的 `PART_2` 分区：


  ```

  SQL> alter tablespace p2 offline;

  Tablespace altered.

  ```


  将表空间 `P2` 置为离线将阻止 Oracle 访问那些特定的索引分区。这就好像我们遭遇了媒体故障，导致它们变得不可用。现在我们将查询该表，看看不同的查询需要哪些索引分区。这个第一个查询被设计为允许使用本地前缀索引：


  ```

  SQL> select * from partitioned_table where a = 1 and b = 1;

  A          B DATA

  ---------- ---------- --------------------

  1          1 x

  ```


  这个查询成功了，我们可以通过查看执行计划来理解原因。我们将使用内置包 `DBMS_XPLAN` 来查看此查询访问了哪些分区。输出中的 `PSTART`（分区起始）和
  `PSTOP`（分区终止）列确切地向我们展示了此查询为了成功需要哪些分区处于在线可用状态：


  ```

  SQL> explain plan for select * from partitioned_table where a = 1 and b = 1;

  Explained.

  ```


  现在访问 `DBMS_XPLAN.DISPLAY` 并指示其显示基本的执行计划详情以及分区信息：


  ```

  SQL> select * from table(dbms_xplan.display(null,null,''BASIC +PARTITION''));


  | Id | Operation                                  | Name              | Pstart|
  Pstop |


  |  0 | SELECT STATEMENT                           |                   |       |       |

  |  1 |  PARTITION RANGE SINGLE                    |                   |     1 |     1
  |

  |  2 |   TABLE ACCESS BY LOCAL INDEX ROWID BATCHED| PARTITIONED_TABLE |     1 |     1
  |

  |  3 |    INDEX RANGE SCAN                        | LOCAL_PREFIXED    |     1 |     1
  |

  ```


  因此，使用 `LOCAL_PREFIXED` 的查询成功了。优化器能够将 `LOCAL_PREFIXED` 的 `PART_2` 排除在考虑之外，因为我们在查询中指定了
  `A=1`，我们可以从计划中清楚地看到 `PSTART` 和 `PSTOP` 都等于 1。分区消除为我们发挥了作用。然而，第二个查询失败了：


  ```

  SQL> select * from partitioned_table where b = 1;

  ERROR:

  ORA-00376: file 23 cannot be read at this time

  ORA-01110: data file 23: ''/opt/oracle/oradata/CDB/C217E68DF48779E1E0530101007F73B9/datafile/o1_mf_p2_jc8bg9py_.dbf''

  ```


  使用相同的技术，我们可以看到原因：


  ```

  SQL> explain plan for select * from partitioned_table where b = 1;

  Explained.

  SQL> select * from table(dbms_xplan.display(null,null,''BASIC +PARTITION''));

  ```


  '
- "# Oracle 数据库本地索引技术详解\n\n## 本地索引的分区消除\n\n| Id | Operation                      \
  \            | Name               | Pstart| Pstop |\n|----|--------------------------------------------|--------------------|-------|-------|\n\
  |  0 | SELECT STATEMENT                           |                    |       |\
  \       |\n|  1 |  PARTITION RANGE ALL                       |                 \
  \   |     1 |     2 |\n|  2 |   TABLE ACCESS BY LOCAL INDEX ROWID BATCHED| PARTITIONED_TABLE\
  \  |     1 |     2 |\n|  3 |    INDEX RANGE SCAN                        | LOCAL_NONPREFIXED\
  \  |     1 |     2 |\n\n```\n\n这里，优化器*无法*将 `LOCAL_NONPREFIXED` 索引的 `PART_2` 分区排除在考虑范围之外——它需要查看索引的\
  \ `PART_1` 和 `PART_2` 两个分区，以确定 `B=1` 是否存在于其中。这正是本地非前缀索引的一个性能问题所在：它们不像前缀索引那样*强制*你在谓词中使用分区键。这并不是说前缀索引更好；只是要想使用前缀索引，你必须使用一个允许分区消除的查询。\n\
  \n如果我们删除 `LOCAL_PREFIXED` 索引并重新运行最初成功的查询，如下所示：\n\n```\nSQL> drop index local_prefixed;\n\
  Index dropped.\n\nSQL> select * from partitioned_table where a = 1 and b = 1;\n\
  A          B DATA\n---------- ----------\n1          1 x\n```\n\n查询成功了，但正如我们将看到的，它使用了刚刚导致查询失败的同一个索引。执行计划显示\
  \ Oracle 在这里能够应用分区消除——谓词 `A=1` 提供了足够的信息让数据库将索引分区 `PART_2` 排除在考虑范围之外：\n\n```\nSQL>\
  \ explain plan for select * from partitioned_table where a = 1 and b = 1;\nExplained.\n\
  \nSQL> select * from table(dbms_xplan.display(null,null,'BASIC +PARTITION'));\n\n\
  | Id | Operation                                  | Name              | Pstart|\
  \ Pstop |\n|----|--------------------------------------------|-------------------|-------|-------|\n\
  |  0 | SELECT STATEMENT                           |                   |       |\
  \       |\n|  1 |  PARTITION RANGE SINGLE                    |                 \
  \  |     1 |     1 |\n|  2 |   TABLE ACCESS BY LOCAL INDEX ROWID BATCHED| PARTITIONED_TABLE\
  \ |     1 |     1 |\n|  3 |    INDEX RANGE SCAN                        | LOCAL_NONPREFIXED\
  \ |     1 |     1 |\n\n```\n\n注意 `PSTART` 和 `PSTOP` 列的值均为 1。这证明了优化器即使对于非前缀的本地索引也能够执行分区消除。\n\
  \n如果你经常使用以下查询来查询前面的表，那么可以考虑在 (`b`,`a`) 上创建一个本地非前缀索引：\n\n```\nselect ... from partitioned_table\
  \ where a = :a and b = :b;\nselect ... from partitioned_table where b = :b;\n```\n\
  \n该索引对于上述两个查询都有用。而 (`a`,`b`) 上的本地前缀索引仅对第一个查询有用。\n\n这里的核心观点是，你不应该害怕非前缀索引，或者认为它们是主要的性能障碍。如果你的许多查询可以像前面概述的那样从非前缀索引中受益，那么你应该考虑使用一个。主要问题是确保你的查询尽可能包含允许索引分区消除的谓词。使用前缀本地索引强制了这种考虑。使用非前缀索引则没有。同时也要考虑索引将如何被使用。如果它将被用作查询计划的第一步，那么两种索引类型之间的差异不大。\n\
  \n#### 本地索引与唯一约束\n\n要强制唯一性——包括 `UNIQUE` 约束或 `PRIMARY KEY` 约束——如果你想使用本地索引来强制约束，那么你的分区键*必须包含在约束本身中*。在我看来，这是本地索引最大的限制。Oracle\
  \ 只在索引分区内强制唯一性——永远不会跨分区强制。这意味着什么？例如，你不能在 `TIMESTAMP` 字段上进行范围分区，同时在一个使用本地分区索引强制的\
  \ `ID` 列上拥有主键。Oracle 将转而使用*全局*索引来强制唯一性。\n\n在下一个例子中，我们将创建一个按名为 `TIMESTAMP` 的列进行范围分区的表，但该表在\
  \ `ID` 列上有一个主键。我们可以通过在没有任何其他对象的 schema 中执行以下 `CREATE TABLE` 语句来实现，这样我们就可以轻松地通过查看该用户拥有的每个段来确切地看到创建了哪些对象：\n\
  \n```\nSQL> CREATE TABLE partitioned\n  2  ( timestamp date,\n  3    id        int,\n\
  \  4    constraint partitioned_pk primary key(id)\n  5  )\n  6  PARTITION BY RANGE\
  \ (timestamp)\n  7  (\n  8    PARTITION part_1 VALUES LESS THAN\n  9      ( to_date('01/01/2021','dd/mm/yyyy')\
  \ ) ,\n 10    PARTITION part_2 VALUES LESS THAN\n 11      ( to_date('01/01/2022','dd/mm/yyyy')\
  \ )\n 12  );\nTable created.\n```\n\n并插入一些数据以便创建段：\n\n```\nSQL> insert into partitioned\
  \ values(to_date('01/01/2020','dd/mm/yyyy'),1);\n1 row created.\n\nSQL> insert into\
  \ partitioned values(to_date('01/01/2021','dd/mm/yyyy'),2);\n1 row created.\n```\n\
  \n假设我们在一个没有其他对象的 schema 中运行此命令，我们将看到以下内容：\n\n```\nSQL > select segment_name, partition_name,\
  \ segment_type from user_segments;\n\nSEGMENT_NAME              PARTITION_NAME \
  \           SEGMENT_TYPE\n------------------------- ------------------------- ---------------\n\
  PARTITIONED               PART_1                    TABLE PARTITION\nPARTITIONED\
  \               PART_2                    TABLE PARTITION\nPARTITIONED_PK      \
  \                                INDEX\n```\n\n`PARTITIONED_PK` 索引甚至不是分区的，更不用说是本地分区的了，正如我们将看到的，它不能是本地分区的。即使我们试图通过意识到主键可以由非唯一索引以及唯一索引来强制，从而“欺骗”\
  \ Oracle，我们也会发现这种方法也不起作用：\n\n```\nSQL> drop table partitioned;\n\nSQL> CREATE TABLE\
  \ partitioned\n  2  ( timestamp date,\n  3    id        int\n  4  )\n  5  PARTITION\
  \ BY RANGE (timestamp)\n  6  (\n  7    PARTITION part_1 VALUES LESS THAN\n  8  \
  \    ( to_date('01-jan-2021','dd-mon-yyyy') ) ,\n  9    PARTITION part_2 VALUES\
  \ LESS THAN\n 10      ( to_date('01-jan-2022','dd-mon-yyyy') )\n 11  );\nTable created.\n\
  \nSQL> create index partitioned_idx on partitioned(id) local;\nIndex created.\n\
  ```\n\n并插入一些数据以便创建段：\n\n```\nSQL> insert into partitioned values(to_date('01/01/2020','dd/mm/yyyy'),1);\n\
  1 row created.\n\nSQL> insert into partitioned values(to_date('01/01/2021','dd/mm/yyyy'),2);\n\
  1 row created\n\nSQL> select segment_name, partition_name, segment_type from user_segments;\n\
  \nSEGMENT_NAME              PARTITION_NAME            SEGMENT_TYPE\n-------------------------\
  \ ------------------------- ---------------\nPARTITIONED               PART_1  \
  \                  TABLE PARTITION\nPARTITIONED               PART_2           \
  \         TABLE PARTITION\nPARTITIONED_IDX           PART_1                    INDEX\
  \ PARTITION\nPARTITIONED_IDX           PART_2                    INDEX PARTITION\n\
  \nSQL> alter table partitioned\n  2  add constraint\n  3  partitioned_pk\n  4  primary\
  \ key(id);\nalter table partitioned\n*\nERROR at line 1:\nORA-01408: such column\
  \ list already indexed\n```\n\n在这里，Oracle 尝试在 `ID` 上创建一个全局索引，但发现无法创建，因为已经存在一个索引。如果之前创建的索引不是分区的，前面的语句将会工作，因为\
  \ Oracle 会使用该索引来强制约束。\n\n# 为何没有分区键就无法强制实施唯一性\n\n无法强制实施唯一性（除非分区键是约束的一部分）的原因有两个。首先，如果\
  \ Oracle 允许这样做，将会使分区的大部分优势失效。可用性和可扩展性将会丧失，因为每个分区都必须始终处于`可用`状态并被`扫描`才能执行任何插入和更新操作。分区越多，数据的可用性就越低。分区越多，需要扫描的索引分区也越多，分区的可扩展性就越差。这样做非但不能提供可用性和可扩展性，反而会同时降低这两者。\n\
  \n此外，Oracle 必须在事务级别有效地`序列化`对此表的插入和更新。这是因为，如果我们将`ID=1`添加到`PART_1`，Oracle 将必须设法`阻止`其他人将`ID=1`添加到`PART_2`。实现这一点的唯一方法是阻止其他人修改索引分区`PART_2`，因为在该分区中实际上没有什么可以锁定的。\n\
  \n在`OLTP`系统中，唯一约束必须由系统强制实施（即由 Oracle 强制实施），以确保数据的完整性。这意味着你应用的逻辑模型将对物理设计产生影响。唯一性约束将要么驱动底层表的分区方案，决定分区键的选择；要么引导你使用`全局`索引。我们接下来将更深入地了解全局索引。\n\
  \n## 全局索引\n\n全局索引使用的分区方案与底层表的分区方案不同。表可能按`TIMESTAMP`列分区为十个分区，而该表上的全局索引则可能按`REGION`列分区为五个分区。与本地索引不同，全局索引只有一类，那就是`前缀全局索引`。Oracle\
  \ 不支持索引键不以*该索引的*分区键开头的全局索引。这意味着，无论你使用什么属性来分区索引，该属性都将位于索引键本身的前端。\n\n基于我们之前的例子，这里是一个使用全局索引的快速示例。它展示了全局分区索引可用于为主键强制实施唯一性，因此你可以拥有强制实施唯一性但不包含表分区键的分区索引。以下示例创建了一个按`TIMESTAMP`分区的表，其索引按`ID`分区：\n\
  \n```sql\n$ sqlplus eoda/foo@PDB1\nSQL> drop table partitioned;\nSQL> CREATE TABLE\
  \ partitioned\n( timestamp date,\nid        int\n)\nPARTITION BY RANGE (timestamp)\n\
  (\nPARTITION part_1 VALUES LESS THAN\n( to_date('01-jan-2021','dd-mon-yyyy') ) ,\n\
  PARTITION part_2 VALUES LESS THAN\n( to_date('01-jan-2022','dd-mon-yyyy') )\n);\n\
  Table created.\nSQL> create index partitioned_index\non partitioned(id)\nGLOBAL\n\
  partition  by range(id)\n(\npartition part_1 values less than(1000),\npartition\
  \ part_2 values less than (MAXVALUE)\n);\nIndex created.\n```\n\n请注意此索引中`MAXVALUE`的使用。`MAXVALUE`可用于任何按范围分区的表以及索引中。它代表范围上的`无限上界`。在我们目前的例子中，我们对范围使用了硬性上界（值小于<*某个值*>）。然而，全局索引有一个要求，即最高分区（最后一个分区）的分区边界值必须是`MAXVALUE`。这确保了底层表中的所有行都能被放置到索引中。\n\
  \n现在，为了完成这个示例，我们将主键添加到表中：\n\n```sql\nSQL> alter table partitioned add constraint\
  \ partitioned_pk  primary key(id);\nTable altered.\n```\n\n仅从这段代码中并不明显看出 Oracle\
  \ 正在使用我们创建的索引来强制实施主键（对我来说是明显的，因为我知道 Oracle 在使用它），我们可以通过尝试删除该索引来证明它：\n\n```sql\n\
  SQL> drop index partitioned_index;\ndrop index partitioned_index\n*\nERROR at line\
  \ 1:\nORA-02429: cannot drop index used for enforcement of unique/primary key\n\
  ```\n\n为了展示 Oracle 不允许我们创建`非前缀`的全局索引，我们只需要尝试以下操作：\n\n```sql\nSQL> create index partitioned_index2\n\
  on partitioned(timestamp,id)\nGLOBAL\npartition  by range(id)\n(\npartition part_1\
  \ values less than(1000),\npartition part_2 values less than (MAXVALUE)\n);\npartition\
  \  by range(id)\n*\nERROR at line 4:\nORA-14038: GLOBAL partitioned index must be\
  \ prefixed\n```\n\n错误信息相当清楚。全局索引*必须*是前缀的。那么，何时你会使用全局索引呢？我们将考察两种系统类型，数据仓库和 OLTP，看看它们可能在什么时候适用。\n\
  \n### 数据仓库与全局索引\n\n许多数据仓库采用滑动窗口方法来管理数据——即删除表中最旧的分区并为新加载的数据添加一个新分区。在接下来的章节中，我们将了解`数据的滑动窗口`意味着什么，以及全局索引对其`潜在`的影响。\n\
  \n#### 滑动窗口与索引\n\n以下示例实现了一个经典的数据滑动窗口。在许多实现中，数据会随着时间推移被添加到仓库中，而最旧的数据则会被清除（老化）。很多时候，这些数据会按日期属性进行范围分区，这样最旧的数据就存储在一个单独的分区中，而新加载的数据同样也存储在一个新的分区中。每月的加载过程包括：\n\
  \n*   *分离旧数据*：最旧的分区要么被删除，要么与一个空表交换（将最旧的分区变成一个表），以便对旧数据进行归档。\n*   *加载和索引新数据*：新数据被加载到一个工作表中，并进行索引和验证。\n\
  *   *附加新数据*：一旦新数据加载并处理完毕，其所在的表会与分区表中的一个空分区进行交换，从而将这张表中新加载的数据转变为大型分区表的一个分区。\n\n这个过程每个月重复一次，或者根据加载过程执行的频率进行；可能是每天或每周。我们将在本节中实现这个非常典型的过程，以展示全局分区索引的影响，并演示我们在分区操作期间可用的选项，以提高可用性，使我们能够实现数据的滑动窗口并保持数据的持续可用。\n\
  \n在这个示例中，我们将处理年度数据，并加载了 2020 和 2021 财年。该表将按 `TIMESTAMP` 列进行分区，并将创建两个索引——一个是 `ID`\
  \ 列上的本地分区索引，另一个是 `TIMESTAMP` 列上的全局索引（在此例中为非分区索引）：\n\n```sql\n$ sqlplus eoda/foo@PDB1\n\
  SQL> drop table partitioned;\nSQL> CREATE TABLE partitioned\n( timestamp date,\n\
  id        int\n)\nPARTITION BY RANGE (timestamp)\n(\nPARTITION fy_2020 VALUES LESS\
  \ THAN\n( to_date('01-jan-2021','dd-mon-yyyy') ) ,\nPARTITION fy_2021 VALUES LESS\
  \ THAN\n( to_date('01-jan-2022','dd-mon-yyyy') ) );\nTable created.\nSQL> insert\
  \ into partitioned partition(fy_2020)\nselect to_date('31-dec-2020','dd-mon-yyyy')-mod(rownum,360),\
  \ rownum\nfrom dual connect by level<360*5;\nSQL> insert into partitioned partition(fy_2021)\n\
  select to_date('31-dec-2021','dd-mon-yyyy')-mod(rownum,360), rownum\nfrom dual connect\
  \ by level<360*5;\nSQL> create index partitioned_idx_local on partitioned(id) LOCAL;\n\
  Index created.\nSQL> create index partitioned_idx_global on partitioned(timestamp)\
  \  GLOBAL;\nIndex created.\n```\n\n这就设置好了我们的仓库表。数据按财年分区，我们保留了最近两年的数据在线。该表有两个索引：一个是\
  \ `LOCAL`（本地）索引，另一个是 `GLOBAL`（全局）索引。现在已到年底，我们希望执行以下操作：\n\n1.  *移除最旧的财年数据*：我们并非要永久丢失这些数据；只是希望将其老化并归档。\n\
  2.  *添加最新的财年数据*：加载、转换、索引等操作需要一些时间。如果可能，我们希望在不影响当前数据可用性的情况下完成这些工作。\n\n第一步是为 2020\
  \ 财年创建一个与分区表结构相同的空表。我们将使用此表与分区表中的 `FY_2020` 分区进行交换，从而将该分区转变为一张表，进而清空分区表中的对应分区。最终效果是，交换后，分区表中最旧的数据实际上已被移除：\n\
  \n```sql\nSQL> create table fy_2020 ( timestamp date, id int );\nTable created.\n\
  SQL> create index fy_2020_idx on fy_2020(id);\nIndex created.\n```\n\n我们将对要加载的新数据执行相同操作。我们将创建并加载一个在结构上类似于现有分区表（但其本身并非分区表）的表：\n\
  \n```sql\nSQL> create table fy_2022 ( timestamp date, id int );\nTable created.\n\
  SQL> insert into fy_2022\nselect to_date('31-dec-2022','dd-mon-yyyy')-mod(rownum,360),\
  \ rownum\nfrom dual connect by level<360*5;\nSQL> create index fy_2022_idx on fy_2022(id)\
  \ nologging;\nIndex created.\n```\n\n我们将把当前已满的分区变为空分区，并创建一个包含 `FY_2020` 数据的完整表。同时，我们已经完成了使\
  \ `FY_2022` 数据准备就绪所需的所有工作。这包括验证数据、进行转换——任何为了使其准备就绪而需要执行的复杂任务。现在，我们准备好使用交换分区来更新实时数据：\n\
  \n```sql\nSQL> alter table partitioned\nexchange partition fy_2020\nwith table fy_2020\n\
  including indexes\nwithout validation;\nTable altered.\nSQL> alter table partitioned\
  \ drop partition fy_2020;\nTable altered.\n```\n\n这就是我们清除旧数据所需要做的全部工作。我们将该分区变成了一张完整的表，并将空表变成了一个分区。这只是一个简单的数据字典更新。没有发生大量的\
  \ I/O 操作——它瞬间就完成了。我们现在可以将该 `FY_2020` 表（也许使用可传输表空间）从数据库中导出以用于归档目的。如果需要，我们可以快速地将其重新附加回来。\n\
  \n接下来，我们希望滑入新数据：\n\n```sql\nSQL> alter table partitioned add partition fy_2022\n\
  values less than ( to_date('01-jan-2023','dd-mon-yyyy') );\nTable altered.\nSQL>\
  \ alter table partitioned\nexchange partition fy_2022\nwith table fy_2022\nincluding\
  \ indexes\nwithout validation;\nTable altered.\n```\n\n同样，这也是瞬间完成的；它是通过简单的数据字典更新实现的——`WITHOUT\
  \ VALIDATION` 子句使我们能够做到这一点。当你使用该子句时，数据库将信任你放入该分区的数据实际上对于该分区是有效的。添加空分区几乎不需要处理时间。然后，我们将新创建的空分区与完整的表进行交换，完整的表与空分区进行交换，该操作执行得也很快。新数据已经在线可用。\n\
  \n然而，查看我们的索引，会发现以下情况：\n\n```sql\nSQL> select index_name, status from user_indexes;\n\
  \nINDEX_NAME                STATUS\n------------------------- --------\nPARTITIONED_IDX_LOCAL\
  \     N/A\nPARTITIONED_IDX_GLOBAL    UNUSABLE\nFY_2020_IDX               VALID\n\
  FY_2022_IDX               VALID\n```\n\n全局索引在此操作后当然是不可用的（`UNUSABLE`）。因为每个索引分区可以指向任何表分区，*而且*我们刚刚移除并添加了一个分区，所以该索引是无效的。它包含指向已删除分区的条目。它*没有*指向刚刚添加分区的条目。任何使用此索引的查询都会失败而无法执行，或者如果我们跳过不可用的索引，查询性能会因无法使用该索引而受到负面影响：\n\
  \n```sql\nSQL> select /*+ index( partitioned PARTITIONED_IDX_GLOBAL ) */ count(*)\n\
  \  from partitioned\n  where timestamp between to_date( '01-mar-2022', 'dd-mon-yyyy'\
  \ )\n                      and to_date( '31-mar-2022', 'dd-mon-yyyy' );\nselect\
  \ /*+ index( partitioned PARTITIONED_IDX_GLOBAL ) */ count(*)\n*\nERROR at line\
  \ 1:\nORA-01502: index 'EODA.PARTITIONED_IDX_GLOBAL' or partition of such index\
  \ is in unusable state\nSQL> explain plan for select count(*)\n  from partitioned\n\
  \  where timestamp between to_date( '01-mar-2022', 'dd-mon-yyyy' )\n           \
  \           and to_date( '31-mar-2022', 'dd-mon-yyyy' );\nSQL> select * from table(dbms_xplan.display(null,null,'BASIC\
  \ +PARTITION'));\n\n| Id | Operation               | Name        | Pstart| Pstop\
  \ |\n|  0 | SELECT STATEMENT        |             |       |       |\n|  1 |  SORT\
  \ AGGREGATE         |             |       |       |\n|  2 |   PARTITION RANGE SINGLE|\
  \             |     2 |     2 |\n|  3 |    TABLE ACCESS FULL    | PARTITIONED |\
  \     2 |     2 |\n```\n\n因此，在执行了包含全局索引的此分区操作后，我们的选择是\n\n\n*   确保 `SKIP_UNUSABLE_INDEXES=TRUE`（默认值为\
  \ `TRUE`），这样 Oracle 就不会使用这个不可用的索引。但这样一来，我们就失去了该索引原本带来的性能提升。\n\n*   重建此索引，使其再次可用。\n\
  \n*   在执行分区维护时（本章下一节的重点），使用 `UPDATE GLOBAL INDEXES` 子句。\n\n到目前为止几乎实现零停机的滑动窗口过程，在重建全局索引时将花费非常长的时间才能完成。在此期间，依赖这些索引的查询的运行时性能将受到负面影响——要么根本无法运行，要么会在没有索引优势的情况下运行。所有数据都必须被扫描，整个索引需要根据表数据重新构建。如果表的大小达到数百千兆字节，这将消耗大量资源。\n\
  \n#### \"在线\"全局索引维护\n\nOracle 有能力在分区操作期间使用 `UPDATE GLOBAL INDEXES` 子句来`维护全局索引`。这意味着当你删除一个分区、拆分一个分区或对分区执行任何必要操作时，Oracle\
  \ 会对全局索引执行必要的修改以使其保持最新。由于大多数分区操作都会导致这种全局索引失效，因此此功能对于需要持续提供数据访问的系统来说是一个福音。你会发现，你牺牲了分区操作的原始速度（以及之后立即发生的、因重建索引导致的不可用窗口），换来了分区操作整体响应时间变慢但数据可用性达到\
  \ 100%。简而言之，如果你有一个不能停机但又必须支持这种常见数据仓库技术（即数据的滑入滑出）的数据仓库，那么这个功能就是为你准备的——但你必须理解其含义。\n\
  \n回顾我们之前的例子，如果我们的分区操作在相关时使用了 `UPDATE GLOBAL INDEXES` 子句（在此示例中，`ADD PARTITION` 语句不需要它，因为新添加的分区中不包含任何行），我们会发现索引在操作期间和之后都完全有效且可用：\n\
  \n```\nSQL> alter table partitioned\nexchange partition fy_2020\nwith table fy_2020\n\
  including indexes\nwithout validation\nUPDATE GLOBAL INDEXES;\nTable altered.\n\
  SQL> alter table partitioned drop partition fy_2020 update global indexes;\nTable\
  \ altered.\nSQL> alter table partitioned add partition fy_2022\nvalues less than\
  \ ( to_date('01-jan-2023','dd-mon-yyyy') );\nTable altered.\nSQL> alter table partitioned\n\
  exchange partition fy_2022\nwith table fy_2022\nincluding indexes\nwithout validation\n\
  UPDATE GLOBAL INDEXES;\nTable altered.\n```\n\n请注意下面的输出，`PARTITIONED_IDX_LOCAL`\
  \ 索引的状态显示为 `N/A`，这仅仅表示该状态与该索引关联的索引分区有关，而不是索引本身。说本地分区索引是否有效是没有意义的；它只是一个逻辑上容纳索引分区本身的容器：\n\
  \n```\nSQL> select index_name, status from user_indexes;\nINDEX_NAME           \
  \     STATUS\n------------------------- --------\nPARTITIONED_IDX_LOCAL     N/A\n\
  PARTITIONED_IDX_GLOBAL    VALID\nFY_2020_IDX               VALID\nFY_2022_IDX  \
  \             VALID\nSQL> explain plan for select count(*) from partitioned\nwhere\
  \ timestamp between to_date( '01-mar-2022', 'dd-mon-yyyy' )\nand to_date( '31-mar-2022',\
  \ 'dd-mon-yyyy' );\nSQL> select * from table(dbms_xplan.display(null,null,'BASIC\
  \ +PARTITION'));\n\n| Id | Operation         | Name                   |\n|  0 |\
  \ SELECT STATEMENT  |                        |\n|  1 |  SORT AGGREGATE   |     \
  \                   |\n|  2 |   INDEX RANGE SCAN| PARTITIONED_IDX_GLOBAL |\n```\n\
  \n但这需要权衡取舍：我们正在对全局索引结构执行逻辑上等同于 `DELETE` 和 `INSERT` 的操作。当我们删除一个分区时，必须删除所有可能指向该分区的全局索引条目。当我们执行表与分区的交换操作时，必须删除所有指向原始数据的全局索引条目，然后插入所有新滑入数据的条目。因此，`ALTER`\
  \ 命令执行的工作量显著增加。\n\n对于考虑全局索引维护的情况，你应该预期，不采用索引维护的方法会消耗更少的数据库资源，因此执行速度更快，但会产生一段可衡量的停机时间。第二种方法涉及维护索引，将消耗更多资源，整体耗时可能更长，但不会导致停机。对于最终用户来说，他们的工作能力从未中断。他们处理速度可能稍慢（因为我们与他们竞争资源），但他们仍在处理，从未停止。\n\
  \n考虑到所用时间和 CPU 时间，索引重建方法几乎肯定会运行得更快。这个事实让许多 DBA 停下来说：“嘿，我不想用 `UPDATE GLOBAL INDEXES`——它太慢了。”然而，这种观点过于简单化了。你需要记住的是，虽然操作整体耗时更长，但系统上的处理并未必然中断。当然，作为\
  \ DBA，你可能会盯着屏幕看更长时间，但系统上真正重要的工作仍在进行。你需要看看这种权衡对你是否有意义。如果你有一个八小时的夜间维护窗口来加载新数据，那么请务必使用重建方法（如果合理的话）。然而，如果你的任务是要求持续可用，那么维护全局索引的能力将至关重要。\n\
  \n还需要考虑的一点是每种方法生成的重做日志量。你会发现 `UPDATE GLOBAL INDEXES` 会生成相当多的重做日志（由于索引维护），并且你应该预期，随着你在表上添加越来越多的全局索引，这个量只会增加。`UPDATE\
  \ GLOBAL INDEXES` 处理生成的重做日志是不可避免的，并且无法通过 `NOLOGGING` 关闭，因为全局索引的维护不是其结构的完整重建，而更像是增量维护。此外，由于你维护的是活动的索引结构，你必须为其生成回滚数据——万一分区操作失败，你必须准备好将索引恢复原状。记住，回滚数据本身受重做日志保护，因此你看到生成的一些重做日志来自索引更新，另一些来自回滚操作。再添加一两个全局索引，你就有理由预期这些数字会增加。\n\
  \n因此，`UPDATE GLOBAL INDEXES` 是一个允许你用可用性换取资源消耗的选项。如果你需要提供持续可用性，那么它就是适合你的选项。但你必须理解其影响，并相应地调整系统其他组件的规模。具体来说，许多数据仓库经过精心设计，长期使用批量直接路径操作，绕过回滚数据生成，并且在允许的情况下也绕过重做日志生成。使用\
  \ `UPDATE GLOBAL INDEXES` 无法绕过这两个要素。在使用此功能之前，你需要检查用于确定重做日志和回滚数据需求规模的规则，以确保它可以在你的系统上工作。\n\
  \n\n#### 异步全局索引维护\n\n如前一节所示，您可以在删除或截断分区时通过 `UPDATE GLOBAL INDEXES` 子句来维护全局索引。然而，如前所述，此类操作在时间和资源消耗方面是有代价的。\n\
  \n在删除或截断表分区时，Oracle 会推迟删除与已删除或截断分区相关联的全局索引条目。这被称为异步全局索引维护。Oracle 将全局索引的维护推迟到未来的某个时间，同时保持全局索引可用。其理念是，这提高了删除/截断分区的性能，同时使任何全局索引保持可用状态。索引条目的实际清理工作会稍后（异步地）由\
  \ DBA 或由自动调度的 Oracle 作业完成。这并不是说工作量减少了，而是将索引条目的清理工作与 `DROP/TRUNCATE` 语句解耦了。\n\n一个小例子将演示异步全局索引维护。为此，我们创建一个表，用测试数据填充它，并创建一个全局索引：\n\
  \n```sql\n$ sqlplus eoda/foo@PDB1\nSQL> drop table partitioned;\nSQL> CREATE TABLE\
  \ partitioned\n( timestamp date,\nid        int\n)\nPARTITION BY RANGE (timestamp)\n\
  (PARTITION fy_2020 VALUES LESS THAN\n(to_date('01-jan-2021','dd-mon-yyyy')),\nPARTITION\
  \ fy_2021 VALUES LESS THAN\n( to_date('01-jan-2022','dd-mon-yyyy')));\nSQL> insert\
  \ into partitioned partition(fy_2020)\nselect to_date('31-dec-2020','dd-mon-yyyy')-mod(rownum,364),\
  \ rownum\nfrom dual connect by level < 100000;\nSQL> insert into partitioned partition(fy_2021)\n\
  select to_date('31-dec-2021','dd-mon-yyyy')-mod(rownum,364), rownum\nfrom dual connect\
  \ by level < 100000;\nSQL> create index partitioned_idx_global on partitioned(timestamp)\
  \ GLOBAL;\nIndex created.\n```\n\n接下来，我们将运行一个查询来获取当前会话的 `redo size` 和 `db block\
  \ gets` 统计信息的当前值：\n\n```sql\nSQL> col r1 new_value r2\nSQL> col b1 new_value b2\n\
  SQL> select * from\n(select b.value r1\nfrom v$statname a, v$mystat b\nwhere a.statistic#\
  \ = b.statistic#\nand a.name = 'redo size'),\n(select b.value b1\nfrom v$statname\
  \ a, v$mystat b\nwhere a.statistic# = b.statistic#\nand a.name = 'db block gets');\n\
  R1         B1\n---------- ----------\n56928036      80829\n```\n\n接下来，删除一个分区，并指定\
  \ `UPDATE GLOBAL INDEXES` 子句：\n\n```sql\nSQL> alter table partitioned drop partition\
  \ fy_2020 update global indexes;\nTable altered.\n```\n\n现在，我们将计算生成的重做量和访问的当前块数：\n\
  \n```sql\nSQL> select * from\n(select b.value - &r2 redo_gen\nfrom v$statname a,\
  \ v$mystat b\nwhere a.statistic# = b.statistic#\nand a.name = 'redo size'),\n(select\
  \ b.value - &b2 db_block_gets\nfrom v$statname a, v$mystat b\nwhere a.statistic#\
  \ = b.statistic#\nand a.name = 'db block gets');\nold   2: (select b.value - &r2\
  \ redo_gen\nnew   2: (select b.value - 4816712 redo_gen\nold   6: (select b.value\
  \ - &b2 db_block_gets\nnew   6: (select b.value - 4512 db_block_gets\nREDO_GEN DB_BLOCK_GETS\n\
  ---------- -------------\n16864           103\n```\n\n只生成了少量的重做日志，并且访问了很少的数据块。其背后的原因是，Oracle\
  \ 不会立即执行从已删除分区中移除索引条目的索引维护操作。相反，这些条目被标记为孤儿，稍后将由 Oracle 进行清理。可以通过以下查询验证孤儿条目的存在：\n\
  \n```sql\nSQL> select index_name, orphaned_entries, status from user_indexes where\
  \ table_name='PARTITIONED';\nINDEX_NAME                ORP STATUS\n-------------------------\
  \ --- --------\nPARTITIONED_IDX_GLOBAL    YES VALID\n```\n\n这些孤儿条目如何被清理？Oracle 有一个自动调度的\
  \ `PMO_DEFERRED_GIDX_MAINT_JOB` 作业，它在每晚的维护窗口中运行：\n\n```sql\nSQL> select job_name\
  \ from dba_scheduler_jobs where job_name like 'PMO%';\nJOB_NAME\n------------------------------\n\
  PMO_DEFERRED_GIDX_MAINT_JOB\n```\n\n如果您不想等待该作业，可以手动清理这些条目：\n\n```sql\nSQL> exec\
  \ dbms_part.cleanup_gidx;\nPL/SQL procedure successfully completed.\n```\n\n现在检查孤儿行，显示已不存在：\n\
  \n```sql\nSQL> select index_name, orphaned_entries, status from user_indexes where\
  \ table_name='PARTITIONED';\nINDEX_NAME                 ORP STATUS\n--------------------------\
  \ --- --------------------\nPARTITIONED_IDX_GLOBAL     NO  VALID\n```\n\n通过这种方式，您可以执行诸如删除和截断分区等操作，并且仍然使您的全局索引保持可用状态，而无需在删除/截断操作中立即承担清理索引条目的开销。\n\
  \n> **提示**\n>\n> 有关异步全局索引维护的更多详细信息，请参阅 Oracle 支持说明 1482264.1。\n\n# OLTP 与全局索引\n\n\
  OLTP 系统的特点是频繁发生许多小型的读写事务。通常，快速访问所需的行（或多行）至关重要。数据完整性至关重要。可用性也非常重要。全局索引在 OLTP 系统的许多情况下具有合理性。\n\
  \n表数据只能按一个键（一组列）进行分区。但是，您可能需要以多种不同的方式访问数据。您可能按 `LOCATION` 在表中对 `EMPLOYEE` 数据进行分区，但仍需要快速通过以下方式访问\
  \ `EMPLOYEE` 数据：\n\n*   `DEPARTMENT`：部门在地理上是分散的。部门与位置之间没有关系。\n*   `EMPLOYEE_ID`：虽然员工\
  \ ID 能决定一个位置，但您不希望必须按 `EMPLOYEE_ID` 和 `LOCATION` 进行搜索；因此，无法在索引分区上进行分区消除。此外，`EMPLOYEE_ID`\
  \ 本身必须是 `unique`（唯一的）。\n*   `JOB_TITLE`：`JOB_TITLE` 与 `LOCATION` 之间没有关系。所有的 `JOB_TITLE`\
  \ 值都可能出现在任何 `LOCATION` 中。\n\n在应用程序的不同位置，需要通过许多不同的键访问 `EMPLOYEE` 数据，而且速度至关重要。在数据仓库中，我们可能只会在这些键上使用本地分区索引，并使用并行索引范围扫描来快速收集大量数据。在这些情况下，我们不一定需要使用索引分区消除。然而，在\
  \ OLTP 系统中，我们确实需要使用它。并行查询不适用于这些系统；我们需要适当地提供索引。因此，我们将需要在某些字段上使用全局索引。\n\n## OLTP 索引的目标\n\
  \n以下是我们需要满足的目标：\n\n*   快速访问\n*   数据完整性\n*   可用性\n\n全局索引可以帮助我们在 OLTP 系统中实现这些目标。我们很可能不会执行滑动窗口操作（暂且不谈审计）。我们不会拆分分区（除非有计划停机），不会移动数据，等等。通常在实时\
  \ OLTP 系统上不会执行我们在数据仓库中进行的操作。\n\n这里有一个小例子，展示了我们如何使用全局索引实现上述三个目标。我将使用简单的、`单分区` 全局索引，但使用多分区的全局索引结果不会有所不同（除了随着我们添加索引分区，可用性和可管理性会\
  \ `增加`）。我们首先创建表空间 `P1`、`P2`、`P3` 和 `P4`，然后创建一个表，该表根据我们的规则按位置 `LOC` 进行范围分区，规则将所有小于\
  \ `'C'` 的 `LOC` 值放入分区 `P1`，小于 `'D'` 的放入分区 `P2`，依此类推：\n\n```\n$ sqlplus eoda/foo@PDB1\n\
  SQL> create tablespace p1 datafile size 1m autoextend on next 1m;\nTablespace created.\n\
  SQL> create tablespace p2 datafile size 1m autoextend on next 1m;\nTablespace created.\n\
  SQL> create tablespace p3 datafile size 1m autoextend on next 1m;\nTablespace created.\n\
  SQL> create tablespace p4 datafile size 1m autoextend on next 1m;\nTablespace created.\n\
  SQL> create table emp\n(EMPNO             NUMBER(4) NOT NULL,\nENAME           \
  \  VARCHAR2(10),\nJOB               VARCHAR2(9),\nMGR               NUMBER(4),\n\
  HIREDATE          DATE,\nSAL               NUMBER(7,2),\nCOMM              NUMBER(7,2),\n\
  DEPTNO            NUMBER(2) NOT NULL,\nLOC               VARCHAR2(13) NOT NULL\n\
  )\npartition by range(loc)\n(\npartition p1 values less than('C') tablespace p1,\n\
  partition p2 values less than('D') tablespace p2,\npartition p3 values less than('N')\
  \ tablespace p3,\npartition p4 values less than('Z') tablespace p4\n);\nTable created.\n\
  ```\n\n我们修改表以在主键列上添加约束：\n\n```\nSQL> alter table emp add constraint emp_pk primary\
  \ key(empno);\nTable altered.\n```\n\n这样做的一个副作用是，在 `EMPNO` 列上存在了一个唯一索引。这表明我们可以支持并强制执行数据完整性（这是我们的目标之一）。最后，我们在\
  \ `DEPTNO` 和 `JOB` 上再创建两个全局索引，以便通过这些属性快速访问记录：\n\n```\nSQL> create index emp_job_idx\
  \ on emp(job) GLOBAL;\nIndex created.\nSQL> create index emp_dept_idx on emp(deptno)\
  \ GLOBAL;\nIndex created.\nSQL> insert into emp\nselect e.*, d.loc\nfrom scott.emp\
  \ e, scott.dept d\nwhere e.deptno = d.deptno;\n14 rows created.\n```\n\n让我们看看每个分区中有什么：\n\
  \n```\nSQL> break on pname skip 1\nSQL> select 'p1' pname, empno, job, loc from\
  \ emp partition(p1)\nunion all\nselect 'p2' pname, empno, job, loc from emp partition(p2)\n\
  union all\nselect 'p3' pname, empno, job, loc from emp partition(p3)\nunion all\n\
  select 'p4' pname, empno, job, loc from emp partition(p4);\nPN      EMPNO JOB  \
  \     LOC\n-- ---------- --------- -------------\np2       7499 SALESMAN  CHICAGO\n\
  7521 SALESMAN  CHICAGO\n7654 SALESMAN  CHICAGO\n7698 MANAGER   CHICAGO\n7844 SALESMAN\
  \  CHICAGO\n7900 CLERK     CHICAGO\np3       7369 CLERK     DALLAS\n7566 MANAGER\
  \   DALLAS\n7788 ANALYST   DALLAS\n7876 CLERK     DALLAS\n7902 ANALYST   DALLAS\n\
  p4       7782 MANAGER   NEW YORK\n7839 PRESIDENT NEW YORK\n7934 CLERK     NEW YORK\n\
  14 rows selected.\n```\n\n这显示了数据按位置到各个分区的分布情况。我们现在可以查看一些查询计划，看看在性能方面我们可以期待什么：\n\n\
  ```\nSQL> variable x varchar2(30);\nSQL> begin\ndbms_stats.set_table_stats\n( user,\
  \ 'EMP', numrows=>100000, numblks => 10000 );\nend;\n/\nPL/SQL procedure successfully\
  \ completed.\nSQL> explain plan for select empno, job, loc from emp where empno\
  \ = :x;\nExplained.\nSQL> select * from table(dbms_xplan.display(null,null,'BASIC\
  \ +PARTITION'));\n\n| Id | Operation                          | Name   | Pstart|\
  \ Pstop |\n\n|  0 | SELECT STATEMENT                   |        |       |      \
  \ |\n|  1 |  TABLE ACCESS BY GLOBAL INDEX ROWID| EMP    | ROWID | ROWID |\n|  2\
  \ |   INDEX UNIQUE SCAN                | EMP_PK |       |       |\n```\n\n这里的计划显示了对我们为主键支持而创建的非分区索引\
  \ `EMP_PK` 进行了 `INDEX UNIQUE SCAN`（索引唯一扫描）。然后是 `TABLE ACCESS BY GLOBAL INDEX ROWID`（通过全局索引\
  \ ROWID 访问表），其 `PSTART` 和 `PSTOP` 为 `ROWID/ROWID`，这意味着当我们从索引中获取 `ROWID` 时，它将准确地告诉我们读取哪个索引分区来获取这一行。这种索引访问的效率将与在非分区表上一样，并执行相同数量的\
  \ I/O 来完成。它只是一个简单的、单索引唯一扫描，后跟“通过 rowid 获取此行”。现在，让我们看看另一个全局索引，即 `JOB` 上的那个：\n\n```\n\
  SQL> explain plan for select empno, job, loc from emp where job = :x;\nExplained.\n\
  SQL> select * from table(dbms_xplan.display);\n\n| Id | Operation              \
  \                    | Name        | Pstart| Pstop |\n\n|  0 | SELECT STATEMENT\
  \                           |             |       |       |\n|  1 |  TABLE ACCESS\
  \ BY GLOBAL INDEX ROWID BATCHED| EMP         | ROWID | ROWID |\n|  2 |   INDEX RANGE\
  \ SCAN                         | EMP_JOB_IDX |       |       |\n```\n\n果然，我们看到了\
  \ `INDEX RANGE SCAN` 的类似效果。我们的索引被使用，并且可以为底层数据提供高速的 OLTP 访问。如果它们是分区的，它们将必须是前缀的，并强制执行索引分区消除；因此，它们也是可扩展的，这意味着我们可以对它们进行分区并观察到相同的行为。稍后，我们将看看如果只使用\
  \ `LOCAL`（本地）索引会发生什么。\n\n最后，让我们看看可用性方面。Oracle 文档声称，全局分区索引比本地分区索引的数据可用性更低。我完全不同意这种笼统的描述。我相信，在\
  \ OLTP 系统中，它们与本地分区索引一样具有高可用性。考虑以下情况：\n\n\n# 部分索引\n\n```sql\nSQL> alter tablespace\
  \ p1 offline;\nSQL> alter tablespace p2 offline;\nSQL> alter tablespace p3 offline;\n\
  SQL> select empno, job, loc from emp where empno = 7782;\nEMPNO JOB       LOC\n\
  ---------- --------- -------------\n7782 MANAGER   NEW YORK\n```\n\n在这里，即使表中的大部分底层数据不可用，我们仍然可以通过该索引访问到任何可用的数据片段。只要我们想要的\
  \ `EMPNO` 位于一个可用的表空间中，并且我们的 `GLOBAL` 索引可用，我们的 `GLOBAL` 索引就能为我们服务。另一方面，如果我们*在前一种情况下使用了*高可用的本地索引，我们可能反而无法访问数据！这是一个副作用，源于我们按\
  \ `LOC` 分区但需要按 `EMPNO` 查询的事实。我们本将不得不探测每一个本地索引分区，并且在那些不可用的索引分区上失败。\n\n然而，其他类型的查询在当前时间点将无法（且不能）运行：\n\
  \n```sql\nSQL> select empno, job, loc from emp where job = 'CLERK';\nERROR at line\
  \ 1:\nORA-00376: file 38 cannot be read at this time\nORA-01110: data file 38: '/opt/oracle/oradata/CDB/C217E68DF48779E1E0530101007F73B9/datafile/o1_mf_p2_jcbnhfh2_.dbf'\n\
  ```\n\n`CLERK` 数据分布在所有分区中，而三个表空间离线这一事实确实影响了我们。这是不可避免的，除非我们当初按 `JOB` 分区，但那样一来，需要按\
  \ `LOC` 查询数据又会面临同样的问题。任何时候，当你需要访问来自许多不同*键*的数据时，你都会遇到这个问题。Oracle 会在可能的情况下为你提供数据。\n\
  \n然而请注意，如果查询可以从索引中得到解答，从而避免了 `TABLE ACCESS BY ROWID`，那么数据不可用的事实就显得不那么重要了：\n\n```sql\n\
  SQL> select count(*) from emp where job = 'CLERK';\nCOUNT(*)\n```\n\n由于 Oracle 在这种情况下不需要访问表，大部分分区离线的事实并不影响此查询（当然，前提是索引不在那些离线的表空间中）。由于这种优化（即仅使用索引来回答查询）在\
  \ OLTP 系统中很常见，因此会有许多应用程序不受离线数据的影响。我们现在需要做的就是尽快让离线数据可用（将其恢复并 Recover）。\n\nOracle\
  \ 允许你在表的分区子集上创建本地或全局索引。如果你已经预创建了分区，但尚未有映射到未来日期的范围分区的数据，你可能会想这样做——思路是在分区加载后（在未来的某个日期）再构建索引。\n\
  \n你通过首先为表中的每个分区指定 `INDEXING ON|OFF` 来设置部分索引的使用。在下一个例子中，`PART_1` 的索引功能开启，`PART_2`\
  \ 的索引功能关闭：\n\n```sql\n$ sqlplus eoda/foo@PDB1\nSQL> CREATE TABLE p_table (a int)\n\
  PARTITION BY RANGE (a)\n(PARTITION part_1 VALUES LESS THAN(1000) INDEXING ON,\n\
  PARTITION part_2 VALUES LESS THAN(2000) INDEXING OFF);\nTable created.\n```\n\n\
  接下来，创建一个部分本地索引：\n\n```sql\nSQL> create index pi1 on p_table(a) local indexing partial;\n\
  Index created.\n```\n\n在此场景中，`INDEXING PARTIAL` 子句指示 Oracle 仅为那些定义为 `INDEXING ON`\
  \ 的表分区构建并启用指向它们的本地索引分区。在这种情况下，将创建一个可用的索引分区，其索引条目指向 `PART_1` 表分区中的数据：\n\n```sql\n\
  SQL> select a.index_name, a.partition_name, a.status\nfrom user_ind_partitions a,\
  \ user_indexes b\nwhere b.table_name = 'P_TABLE'\nand a.index_name = b.index_name;\n\
  INDEX_NAME           PARTITION_NAME       STATUS\n-------------------- --------------------\
  \ --------\nPI1                  PART_2               UNUSABLE\nPI1            \
  \      PART_1               USABLE\n```\n\n接下来，我们将插入一些测试数据，生成统计信息，设置 autotrace on，并运行一个应该定位到\
  \ `PART_1` 分区中数据的查询：\n\n```sql\nSQL> insert into p_table select rownum from dual\
  \ connect by level < 1000;\nSQL> commit;\nSQL> exec dbms_stats.gather_table_stats(user,'P_TABLE');\n\
  PL/SQL procedure successfully completed.\nSQL> explain plan for select * from p_table\
  \ where a = 20;\nExplained.\nSQL> select * from table(dbms_xplan.display(null,null,'BASIC\
  \ +PARTITION'));\n\n| Id | Operation              | Name | Pstart| Pstop |\n\n|\
  \  0 | SELECT STATEMENT       |      |       |       |\n|  1 |  PARTITION RANGE\
  \ SINGLE|      |     1 |     1 |\n|  2 |   INDEX RANGE SCAN     | PI1  |     1 |\
  \     1 |\n```\n\n正如预期，优化器能够生成一个利用索引的执行计划。接下来，发出一个查询，选择定义为 `INDEXING OFF` 的分区中的数据：\n\
  \n```sql\nSQL> explain plan for select * from p_table where a = 1500;\nExplained.\n\
  SQL> select * from table(dbms_xplan.display(null,null,'BASIC +PARTITION'));\n\n\
  | Id | Operation              | Name    | Pstart| Pstop |\n\n|  0 | SELECT STATEMENT\
  \       |         |       |       |\n|  1 |  PARTITION RANGE SINGLE|         | \
  \    2 |     2 |\n|  2 |   TABLE ACCESS FULL    | P_TABLE |     2 |     2 |\n```\n\
  \n输出显示需要对 `PART_2` 进行全表扫描，因为没有可用的索引包含指向 `PART_2` 中数据的条目。我们可以通过重建与 `PART_2` 分区关联的索引分区，来指示\
  \ Oracle 创建指向 `PART_2` 中数据的索引条目：\n\n```sql\nSQL> alter index pi1 rebuild partition\
  \ part_2;\nIndex altered.\n```\n\n重新运行之前的 select 查询显示，优化器现在正在利用指向 `PART_2` 表分区的本地分区索引：\n\
  \n```sql\nSQL> explain plan for select * from p_table where a = 1500;\nExplained.\n\
  SQL> select * from table(dbms_xplan.display(null,null,'BASIC +PARTITION'));\n\n\
  | Id | Operation              | Name | Pstart| Pstop |\n\n|  0 | SELECT STATEMENT\
  \       |      |       |       |\n|  1 |  PARTITION RANGE SINGLE|      |     2 |\
  \     2 |\n|  2 |   INDEX RANGE SCAN     | PI1  |     2 |     2 |\n```\n\n通过这种方式，部分索引允许你在加载表分区时禁用索引（从而提高加载速度），然后你可以在之后重建部分索引以使其可用。\n\
  \n\n\n## 分区与性能，再探讨\n\n我常听人说：“我对分区感到非常失望。我们对最大的表进行了分区，结果查询*慢了很多*。分区也不过如此，并不是什么能提升性能的功能！”分区对整体查询性能可能产生以下三种影响之一：\n\
  \n*   使你的查询运行更快\n\n*   对查询性能完全没有影响\n\n*   使你的查询运行得慢得多，并且消耗的资源是非分区实现的许多倍\n\n在数据仓库环境中，如果清楚了解针对数据提出的问题，那么第一点是完全可以实现的。通过排除大量不需要考虑的数据，分区可以积极影响那些经常对大型数据库表进行全表扫描的查询。假设你有一个包含十亿行数据的表，其中有一个时间戳属性。你的查询需要从这个表中检索一年的数据（而该表有十年的数据），并且使用全表扫描来获取数据。如果之前已经按照这个时间戳条目进行了分区——比如每月一个分区——那么你只需要全扫描十分之一的数据（假设数据在各年份分布均匀）。分区消除机制会将其余\
  \ 90%的数据排除在考虑范围之外，你的查询很可能会运行得更快。\n\n现在，考虑一个 OLTP 系统中的类似表。在这类应用中，你绝不会去检索一个十亿行表中 10%的数据。因此，数据仓库中所见的这种巨大速度提升在事务处理系统中是无法实现的。你执行的不是同类型的工作，同样的性能改进潜力也就不切实际。所以，总的来说，在你的\
  \ OLTP 系统中，第一点是无法实现的，你也不会主要为了提升性能而应用分区。提高可用性——绝对可以。管理便利性——非常显著。但在 OLTP 系统中，我认为你必须努力确保实现第二点：即完全不影响查询性能，无论是负面还是正面影响。很多时候，你的目标是在不影响查询响应时间的前提下应用分区。\n\
  \n我见过很多次，实施团队看到自己有一个中等大小的表，比如一亿行。一亿这个数字*听起来*非常庞大（五到十年前确实如此，但时过境迁）。于是团队决定对数据进行分区。但审视数据后，发现没有适合`RANGE`分区的逻辑属性，也没有合理的`LIST`分区属性。这个表中找不到任何适合作为分区键的字段。于是，团队选择在主键上进行哈希分区，而该主键恰好是由一个\
  \ Oracle 序列号填充的。这看起来很完美，它唯一且易于哈希，并且很多查询都是`SELECT * FROM T WHERE PRIMARY_KEY = :X`这种形式。\n\
  \n但问题在于，针对此对象的许多其他查询并非这种形式。为说明问题，假设该表实际上是`ALL_OBJECTS`数据字典视图。虽然内部很多查询是`WHERE OBJECT_ID\
  \ = :X`的形式，但最终用户也经常向应用提出如下请求：\n\n*   显示`SCOTT`的`EMP`表的详情 (`where owner = :o and\
  \ object_type = :t and object_name = :n`)。\n\n*   显示`SCOTT`拥有的所有表 (`where owner\
  \ = :o and object_type = :t`)。\n\n*   显示`SCOTT`拥有的所有对象 (`where owner = :o`)。\n\n\
  为了支持这些查询，你有一个建立在`(OWNER,OBJECT_TYPE,OBJECT_NAME)`上的索引。但你又了解到本地索引的可用性更高，而你希望系统具有更高的可用性，因此你决定实现本地索引。最终，你这样重新创建了你的表，包含\
  \ 16 个哈希分区：\n\n```\n$ sqlplus eoda/foo@PDB1\nSQL> create table t\n( OWNER, OBJECT_NAME,\
  \ SUBOBJECT_NAME, OBJECT_ID, DATA_OBJECT_ID,\nOBJECT_TYPE, CREATED, LAST_DDL_TIME,\
  \ TIMESTAMP, STATUS,\nTEMPORARY, GENERATED, SECONDARY )\npartition by hash(object_id)\n\
  partitions 16\nas\nselect OWNER, OBJECT_NAME, SUBOBJECT_NAME, OBJECT_ID, DATA_OBJECT_ID,\n\
  OBJECT_TYPE, CREATED, LAST_DDL_TIME, TIMESTAMP, STATUS,\nTEMPORARY, GENERATED, SECONDARY\n\
  from all_objects;\nTable created.\nSQL> create index t_idx on t(owner,object_type,object_name)\
  \ LOCAL;\nIndex created.\nSQL> exec dbms_stats.gather_table_stats( user, 'T' );\n\
  PL/SQL procedure successfully completed.\n```\n\n然后你执行你知道会频繁运行的典型 OLTP 查询：\n\n```\n\
  SQL> variable o varchar2(30)\nSQL> variable t varchar2(30)\nSQL> variable n varchar2(30)\n\
  SQL> exec :o := 'SCOTT'; :t := 'TABLE'; :n := 'EMP';\nSQL> select *\nfrom t\nwhere\
  \ owner = :o\nand object_type = :t\nand object_name = :n;\nSQL> select *\nfrom t\n\
  where owner = :o\nand object_type = :t;\nSQL> select *\nfrom t\nwhere owner = :o;\n\
  ```\n\n然而，当你开启`autotrace`运行这些查询并查看输出时，你注意到了以下性能特征：\n\n```\nSQL> set autotrace on\n\
  SQL> select * from t where owner = :o and object_type = :t and object_name = :n;\n\
  ```\n\n这是输出的部分片段：\n\n```\nStatistics\n\n2  recursive calls\n0  db block gets\n36\
  \  consistent gets\n0  physical reads\n0  redo size\n```\n\n你将其与*未实施分区*的同一张表进行比较，发现如下结果：\n\
  \n```\nSQL> set autotrace on\nSQL> select * from t where owner = :o and object_type\
  \ = :t and object_name = :n;\n```\n\n这是输出的部分片段：\n\n```\nStatistics\n\n2  recursive\
  \ calls\n0  db block gets\n7  consistent gets\n0  physical reads\n0  redo size\n\
  ```\n\n你可能会立即得出（错误的）结论，认为分区导致了 I/O 增加。该查询在未分区时有 7 次一致读，分区后有 36 次。如果你的系统之前存在高一致读（逻辑\
  \ I/O）问题，那么现在情况更糟了。如果之前没有，现在很可能就会出现。根本原因是什么？是索引分区方案。看看下面针对此表分区版本`explain plan`的输出：\n\
  \n```\nSQL> explain plan for select * from t where owner = :o and object_type =\
  \ :t and object_name = :n;\nExplained.\nSQL> select * from table(dbms_xplan.display(null,null,'BASIC\
  \ +PARTITION'));\n\n| Id  | Operation                                  | Name  |\
  \ Pstart| Pstop |\n\n|   0 | SELECT STATEMENT                           |      \
  \ |       |       |\n|   1 |  PARTITION HASH ALL                        |      \
  \ |     1 |    16 |\n|   2 |   TABLE ACCESS BY LOCAL INDEX ROWID BATCHED| T    \
  \ |     1 |    16 |\n|   3 |    INDEX RANGE SCAN                        | T_IDX\
  \ |     1 |    16 |\n\n```\n\n这个查询必须查看这里的*每一个*索引分区。原因是`SCOTT`的条目很可能存在于*每一个*索引分区中，而且很可能确实如此。该索引在逻辑上是按`OBJECT_ID`进行哈希分区的；任何使用此索引但谓词中没有引用`OBJECT_ID`的查询都必须考虑*每一个*索引分区！那么，解决方案是什么？你应该对索引进行全局分区。以上述情况为例，我们可以选择对索引进行哈希分区：\n\
  \n注意\n\n关于哈希分区索引对范围扫描的影响，有一些需要考虑的因素，我们将在本节后面讨论。\n\n```\nSQL> drop index t_idx;\n\
  SQL> create index t_idx\non t(owner,object_type,object_name)\nglobal\npartition\
  \ by hash(owner)\npartitions 16;\nIndex created.\n```\n\n\n# 分区索引与数据访问\n\n与我们之前研究过的哈希分区表非常相似，Oracle\
  \ 会获取`OWNER`值，将其哈希到一个介于 1 到 16 之间的分区中，并将索引条目放入该分区。现在，当我们查看自动跟踪的输出时，它与早期非分区表执行的工作非常接近——也就是说，我们没有对查询执行的工作产生负面影响：\n\
  \n```\nSQL> set autotrace on;\nSQL> select * from t where owner = :o and object_type\
  \ = :t and object_name = :n;\nStatistics\n\n5  recursive calls\n0  db block gets\n\
  5  consistent gets\n0  physical reads\n0  redo size\n```\n\n然而，应该注意的是，哈希分区索引无法进行范围扫描；一般来说，它最适合精确相等（等于或\
  \ in 列表）。如果您使用前述索引查询“`WHERE OWNER > :X`”，它将无法利用分区消除来执行简单的范围扫描。您将不得不重新检查所有 16 个哈希分区。\n\
  \n## 使用 ORDER BY\n\n这个例子让我们想起了一个无关但非常重要的事实。在查看哈希分区索引时，我们面临另一种情况：使用索引检索数据*不会*自动使数据有序。许多人假设如果查询计划显示使用了索引来检索数据，那么数据将按顺序检索。*这从来都不是真的。*\
  \ 检索数据使其有序的唯一方法是在查询中使用`ORDER BY`子句。如果您的查询不包含`ORDER BY`语句，您就不能对数据的排序顺序做任何假设。\n\n\
  一个简单的例子证明了这一点。我们创建一个作为`ALL_USERS`副本的小表，并在`USER_ID`列上创建一个包含四个分区的哈希分区索引：\n\n```\n\
  SQL> create table t  as select * from all_users;\nSQL> create index t_idx on t(user_id)\
  \ global partition by hash(user_id) partitions 4;\n```\n\n现在，我们将查询该表并使用提示让 Oracle\
  \ 使用索引。注意数据的顺序（实际上是无序）：\n\n```\nSQL> set autotrace on explain\nSQL> select /*+ index(\
  \ t t_idx ) */ user_id from t where user_id > 0;\n```\n\n这是输出的一部分片段：\n\n```\nUSER_ID\n\
  \n...\n\n43 rows selected.\n\n| Id | Operation          | Name  | Rows | Bytes |\
  \ Cost (%CPU)| Time     | Pstart|Pstop |\n\n|  0 | SELECT STATEMENT   |       |\
  \   43 |   172 |     4   (0)| 00:00:01 |       |      |\n|  1 |  PARTITION HASH\
  \ ALL|       |   43 |   172 |     4   (0)| 00:00:01 |     1 |  4   |\n|* 2 |   INDEX\
  \ RANGE SCAN | T_IDX |   43 |   172 |     4   (0)| 00:00:01 |     1 |  4   |\n\n\
  ```\n\n因此，即使 Oracle 在范围扫描中使用了索引，数据显然没有排序。事实上，您可能会观察到这些数据中的某种模式。这里有四个排序的结果：`...`代替了值递增的那些值；在`USER_ID\
  \ = 13`和`97`的行之间，输出中的值是递增的。然后出现了`USER_ID = 22`的行。我们观察到的是 Oracle 从四个哈希分区中的每一个依次返回“已排序的数据”。\n\
  \n这只是一个警告，除非您的查询有`ORDER BY`，否则您没有任何理由期望数据以任何排序顺序返回给您。（而且不，`GROUP BY`也并非必须排序！`ORDER\
  \ BY`是无可替代的。）\n\n## 对 OLTP 性能的影响\n\n这是否意味着分区完全不会对 OLTP 性能产生积极影响？不，并非完全如此——您只需要从不同的角度来看。一般来说，它不会对您在\
  \ OLTP 中数据检索的性能产生积极影响；相反，需要小心确保数据检索不会受到负面影响。但在数据修改方面，分区在高并发环境中可能会提供显著的好处。\n\n考虑前面这个包含单个表和单个索引的简单例子，并再加入一个主键。不分区的情况下，只有一个表：所有插入都进入这个单一的表。可能存在对该表的空闲列表的争用。此外，位于`OBJECT_ID`列上的主键索引将是一个重右端索引，正如我们在第\
  \ 11 章讨论的那样。假定它由序列填充；因此，所有插入都会发生在最右边的块之后，导致缓冲区忙等待。而且，还会存在一个人们将要争用的单一索引结构`T_IDX`。到目前为止，都是单一项目。\n\
  \n引入分区。您按`OBJECT_ID`将表哈希分区为 16 个分区。现在有 16 个表需要争用，并且每个表同时命中它的用户数是之前的十六分之一。您将主键索引在`OBJECT_ID`上本地分区为\
  \ 16 个分区。现在您有了 16 个右端，每个索引结构将接收之前工作量的十六分之一。以此类推。也就是说，您可以在高并发环境中使用分区来减少争用，就像我们在第\
  \ 11 章使用反键索引来减少缓冲区忙等待一样。但是，您必须意识到分区数据本身的过程比不分区消耗更多的 CPU。也就是说，确定数据存放位置比数据只有一个地方可去需要更多的\
  \ CPU。\n\n因此，与所有事情一样，在将分区应用于系统以提高性能之前，请确保您了解该系统*需要*什么。如果您的系统当前受 CPU 限制，但这种 CPU 使用并非由于争用和锁存等待，那么引入分区可能会使问题变得更糟，而不是更好！\n\
  \n## 易于维护的特性\n\n在本章的开头，我陈述的目标是提供一个关于如何使用分区实现应用程序的实用指南，并且我不会过多地关注管理。然而，有一些新的管理功能值得讨论，即：\n\
  \n*   多分区维护操作\n\n*   级联交换\n\n*   级联删除\n\n这些功能在易于维护、数据完整性和性能方面具有积极影响。因此，在实施分区时，了解这些功能非常重要。\n\
  \n\n## **多分区维护操作**\n\n此特性**简化了**分区操作的管理，并在某些场景下减少了执行维护操作所需的数据库资源。Oracle 允许您在一条 DDL\
  \ 语句中组合多个分区维护操作。请看以下示例：\n\n```sql\n$ sqlplus eoda/foo@PDB1\nSQL> create table p_table\n\
  (a int)\npartition by range (a)\n(partition p1 values less than (1000),\npartition\
  \ p2 values less than (2000));\nTable created.\n```\n\n现在，假设你想为刚刚创建的表添加多个分区。Oracle\
  \ 允许你在一条语句中执行多个分区操作：\n\n```sql\nSQL> alter table p_table add\npartition p3 values\
  \ less than (3000),\npartition p4 values less than (4000);\nTable altered.\n```\n\
  \n**注意**\n\n除了添加分区，多分区维护操作还可应用于**删除、合并、拆分和截断**。\n\n在一条 DDL 语句中执行多个分区维护操作，对于拆分分区尤其有利，因此值得进一步讨论。一个小例子将阐明这一点。让我们通过创建一个表并加载数据来设置环境：\n\
  \n```sql\nSQL> CREATE TABLE sales(\nsales_id int\n,s_date   date)\nPARTITION BY\
  \ RANGE (s_date)\n(PARTITION P2021 VALUES LESS THAN (to_date('01-jan-2022','dd-mon-yyyy')));\n\
  Table created.\nSQL> insert into sales\nselect level, to_date('01-jan-2021','dd-mon-yyyy')\
  \ + ceil(dbms_random.value(1,364))\nfrom dual connect by level < 100000;\n99999\
  \ rows created.\n```\n\n接下来，我们创建一个小的工具函数来帮助我们衡量执行操作时消耗的资源：\n\n```sql\nSQL> create\
  \ or replace function get_stat_val( p_name in varchar2 ) return number\nas\nl_val\
  \ number;\nbegin\nselect b.value\ninto l_val\nfrom v$statname a, v$mystat b\nwhere\
  \ a.statistic# = b.statistic#\nand a.name = p_name;\nreturn l_val;\nend;\n/\nFunction\
  \ created.\n```\n\n接着，我们将在一条 DDL 语句中将 `P2021` 分区拆分为四个分区，并测量所消耗的资源：\n\n```sql\nSQL>\
  \ var r1 number\nSQL> exec :r1 := get_stat_val('redo size');\nPL/SQL procedure successfully\
  \ completed.\nSQL> var c1 number\nSQL> exec :c1 := dbms_utility.get_cpu_time;\n\
  PL/SQL procedure successfully completed.\nSQL> alter table sales split partition\
  \ P2021\ninto (partition Q1 values less than (to_date('01-apr-2021','dd-mon-yyyy')),\n\
  partition Q2 values less than (to_date('01-jul-2021','dd-mon-yyyy')),\npartition\
  \ Q3 values less than (to_date('01-oct-2021','dd-mon-yyyy')),\npartition Q4);\n\
  Table altered.\nSQL> set serverout on\nSQL> exec dbms_output.put_line(get_stat_val('redo\
  \ size') - :r1);\n\nSQL> exec dbms_output.put_line(dbms_utility.get_cpu_time - :c1);\n\
  \n```\n\n通过单条 DDL 语句产生的重做量相对较低。根据要拆分的分区数量以及是否同时更新索引，所产生的重做量和消耗的 CPU 资源可能远低于将维护操作拆分为多条语句的情况。\n\
  \n## **级联截断**\n\nOracle 允许你将父/子表作为一个原子的 DDL 语句一起截断。在级联截断进行时，针对父/子表组合发出的任何查询总是呈现数据的**读一致视图**，这意味着父/子表中的数据要么看起来都已填充，要么看起来都已被截断。\n\
  \n级联截断功能通过在父表上使用 `TRUNCATE ... CASCADE` 语句来启动。要使级联截断发生，任何子表必须定义有 `ON DELETE CASCADE`\
  \ 的外键关系约束。级联截断与分区有什么关系？在引用分区表中，你可以在一个事务中截断父表分区并使其级联到子表分区。\n\n让我们看一个这方面的例子。将 `TRUNCATE\
  \ ... CASCADE` 功能应用于引用分区表，这里创建了父表 `ORDERS`，并且 `ORDER_LINE_ITEMS` 表在创建时对其外键约束应用了\
  \ `ON DELETE CASCADE`：\n\n```sql\n$ sqlplus eoda/foo@PDB1\nSQL> create table orders\n\
  (\norder#      number primary key,\norder_date  date,\ndata       varchar2(30)\n\
  )\nPARTITION BY RANGE (order_date)\n(\nPARTITION part_2020 VALUES LESS THAN (to_date('01-01-2021','dd-mm-yyyy'))\
  \ ,\nPARTITION part_2021 VALUES LESS THAN (to_date('01-01-2022','dd-mm-yyyy'))\n\
  );\nTable created.\nSQL> insert into orders values ( 1, to_date( '01-jun-2020',\
  \ 'dd-mon-yyyy' ), 'xyz' );\n1 row created.\nSQL> insert into orders values  ( 2,\
  \ to_date( '01-jun-2021', 'dd-mon-yyyy' ), 'xyz' );\n1 row created.\n```\n\n现在，我们将创建\
  \ `ORDER_LINE_ITEMS` 表，确保包含 `ON DELETE CASCADE` 子句：\n\n```sql\nSQL> create table\
  \ order_line_items\n(\norder#      number,\nline#       number,\ndata       varchar2(30),\n\
  constraint c1_pk primary key(order#,line#),\nconstraint c1_fk_p foreign key(order#)\
  \ references orders on delete cascade\n)  partition by reference(c1_fk_p);\nSQL>\
  \ insert into order_line_items values ( 1, 1, 'yyy' );\n1 row created.\nSQL> insert\
  \ into order_line_items values ( 2, 1, 'yyy' );\n1 row created.\n```\n\n现在我们可以发出一条\
  \ `TRUNCATE ... CASCADE`，将父表分区和子表分区作为一个事务截断：\n\n```sql\nSQL> alter table orders\
  \ truncate partition PART_2020 cascade;\nTable truncated.\n```\n\n换句话说，`TRUNCATE\
  \ ... CASCADE` 功能可防止应用程序在父表被截断之前看到子表已被截断。\n\n你也可以通过以下方式截断父表和子表中的所有分区：\n\n```sql\n\
  SQL> truncate table orders cascade;\nTable truncated.\n```\n\n再次澄清一点，级联截断父/子表的能力并非分区独有。此特性也适用于非分区的父/子表。这允许你使用一条\
  \ DDL 语句来启动截断操作，并确保数据库应用程序总是呈现父/子分区的一致视图。\n\n\n\n\n## 级联交换\n\nOracle 允许你通过一条原子性的\
  \ DDL 语句来交换由父/子表组成的引用分区表组合。下面用一个简单示例来演示。首先，创建引用分区的父表和子表以建立基础环境：\n\n```\n$ sqlplus\
  \ eoda/foo@PDB1\nSQL> create table orders\n( order#      number primary key,\norder_date\
  \  date,\ndata        varchar2(30))\nPARTITION BY RANGE (order_date)\n(PARTITION\
  \ part_2020 VALUES LESS THAN (to_date('01-01-2021','dd-mm-yyyy')) ,\nPARTITION part_2021\
  \ VALUES LESS THAN (to_date('01-01-2022','dd-mm-yyyy')));\nSQL> insert into orders\
  \ values (1, to_date( '01-jun-2014', 'dd-mon-yyyy' ), 'xyz');\nSQL> insert into\
  \ orders values (2, to_date( '01-jun-2015', 'dd-mon-yyyy' ), 'xyz');\nSQL> create\
  \ table order_line_items\n(order#      number,\nline#       number,\ndata      \
  \ varchar2(30),\nconstraint c1_pk primary key(order#,line#),\nconstraint c1_fk_p\
  \ foreign key(order#) references orders\n) partition by reference(c1_fk_p);\nSQL>\
  \ insert into order_line_items values ( 1, 1, 'yyy' );\nSQL> insert into order_line_items\
  \ values ( 2, 1, 'yyy' );\n```\n\n接下来，向这个引用分区表添加一个空分区：\n\n```\nSQL> alter table\
  \ orders add partition part_2022  values less than (to_date('01-01-2023','dd-mm-yyyy'));\n\
  ```\n\n然后，创建并加载数据到一组新的父表和子表中。这组表将用于与引用分区表中的空分区进行交换：\n\n```\nSQL> create table part_2022\n\
  ( order#      number primary key,\norder_date  date,\ndata        varchar2(30));\n\
  SQL> insert into part_2022 values (3, to_date('01-jun-2022', 'dd-mon-yyyy' ), 'xyz');\n\
  SQL> create table c_2022\n(order#      number,\nline#       number,\ndata      \
  \ varchar2(30),\nconstraint ce1_pk primary key(order#,line#),\nconstraint ce1_fk_p\
  \ foreign key(order#) references part_2022);\nSQL> insert into c_2022 values(3,\
  \ 1, 'xyz');\n```\n\n现在，我们可以通过一个事务将前面两张表交换到引用分区表中。注意这里指定了 `CASCADE` 选项：\n\n```\n\
  SQL> alter table orders\nexchange partition part_2022\nwith table part_2022\nwithout\
  \ validation\nCASCADE\nupdate global indexes;\n```\n\n就这样。通过一条 DDL 语句，我们同时交换了通过外键约束关联的两张表到一个引用分区表中。任何访问数据库的人都会看到父表和子表分区作为一个无缝的工作单元被添加进去。\n\
  \n## 审计与段空间压缩\n\n就在几年前，像 HIPAA (`www.hhs.gov/ocr/hipaa`) 这样的美国政府强制性约束还不存在。安然（Enron）这样的公司仍在运营，而另一项美国政府要求——萨班斯-奥克斯利法案合规——也尚未出台。那时，审计被认为是“我们某天可能会做，也许吧”的事情。然而，如今审计已处于最前沿，许多数据库管理员面临挑战，需要为其金融、业务和医疗保健数据库保留长达七年的在线审计追踪信息。\n\
  \n审计追踪信息是你数据库中一类可能只插入而通常在操作过程中永不检索的数据。它主要是作为一种取证用的、事后证据链而存在。我们需要拥有它，但从许多角度来看，它只是占据磁盘空间的东西——非常非常多的空间。然后每个月、每年或其他时间间隔，我们必须清理或归档它。审计功能如果从一开始没有妥善设计，最终可能会让你付出沉重代价。当七年后你第一次面临清理或归档旧数据时，才去思考如何实现它，那可不是好时机。除非你一开始就为此进行了设计，否则提取那些旧信息将会非常痛苦。\n\
  \n这里引入两项技术，它们不仅使审计变得可以忍受，而且更易于管理并占用更少的空间。这些技术就是分区和段空间压缩，正如我们在第 10 章讨论的。第二项技术可能不那么明显，因为*基本*段空间压缩仅适用于像直接路径加载这样的大型批量操作（OLTP\
  \ 压缩是高级压缩选项的一项功能——并非所有数据库版本都可用），而审计追踪通常是随着事件发生而逐行插入的。诀窍在于将滑动窗口分区与段空间压缩结合起来。\n\n\
  假设我们决定按月对审计追踪进行分区。在业务开展的第一个月，我们只是向分区表插入数据；这些插入使用常规路径而非直接路径进行，因此不会被压缩。现在，在本月底之前，我们将向表添加一个新分区，以容纳下个月的审计活动。下个月初不久，我们将对上个月的审计追踪执行一个大型批量操作——具体来说，我们将使用\
  \ `ALTER TABLE` 命令移动上个月的分区，这也将产生压缩数据的效果。如果我们实际上更进一步，可以将这个分区从它必须所在的读写表空间，移动到一个通常是只读的表空间（该表空间包含此审计追踪的其他分区）。这样，我们可以在每月将分区移入该表空间后备份一次；确保我们拥有一个良好、干净、当前可读的表空间副本；然后当月就不再备份它了。我们的审计追踪可能会使用如下表空间：\n\
  \n*   一个当前的在线、读写表空间，像系统中其他普通表空间一样定期备份：该表空间中的审计追踪信息未经压缩，并且持续有新数据插入。\n*   一个包含“本年至今”审计追踪分区（以压缩格式存储）的只读表空间：在每个月初，我们将此表空间改为读写，移动并压缩上个月的审计信息到此表空间，再将其改回只读，然后进行备份。\n\
  *   一系列用于去年、前年等年份的表空间：这些都是只读的，甚至可能存储在速度慢、成本低的介质上。发生介质故障时，我们只需要从备份中恢复。我们会偶尔从备份集中随机选择一个年份进行恢复测试，以确保它们仍然可恢复（磁带有时会损坏）。\n\
  \n通过这种方式，我们使清理变得容易（即删除一个分区）。我们也使归档变得容易——我们可以直接传送一个表空间走，并在以后恢复它。我们通过实施压缩减少了空间利用率。我们还减少了备份量，因为在许多系统中，*审计追踪数据*是单一最大的数据集。如果你能将其部分或全部从日常备份中移除，效果将是显著的。\n\
  \n简而言之，审计追踪需求与分区是相辅相成的，无论底层系统类型是数据仓库还是 OLTP。\n\n**提示**\n\n考虑为审计需求使用 Oracle 的闪回数据归档功能。当为一张表启用此功能时，闪回数据归档将自动创建一个底层的分区表来记录事务信息。\n\
  \n\n## 总结\n\n分区对于扩展数据库中的大型数据库对象极其有用。这种扩展体现在性能扩展、可用性扩展和管理扩展三个方面。这三者对不同的人来说都极其重要。数据库管理员（DBA）关注的是管理扩展。系统拥有者关心可用性，因为停机时间意味着金钱损失，任何能够减少停机时间（或降低停机影响）的措施都能提高系统的投资回报。系统的最终用户则关心性能扩展。毕竟，没有人喜欢使用一个缓慢的系统。\n\
  \n我们还了解到，在一个`OLTP`系统中，分区可能不会提升性能，尤其是在应用不当的情况下。分区可以提升某些类别查询的性能，但这些查询通常不会在`OLTP`系统中使用。理解这一点很重要，因为许多人将分区与“免费的性能提升”联系起来。这并不意味着分区不应该在`OLTP`系统中使用——它们在此环境中确实提供了许多其他显著的好处——只是不要期望吞吐量的大幅提升。应该期待减少的停机时间。期望同样良好的性能（在应用适当时，分区不会拖慢你的速度）。期望更易于管理，这可能通过更频繁地执行某些维护操作来间接提升性能，因为它们现在变得可行了。\n\
  \n我们研究了`Oracle`提供的各种表分区方案——范围（range）、哈希（hash）、列表（list）、间隔（interval）、引用（reference）、间隔引用（interval\
  \ reference）、虚拟列（virtual column）和复合（composite）——并讨论了它们最适用的场景。我们将大部分时间用于查看分区索引，并研究了前缀（prefixed）与非前缀（nonprefixed）、本地（local）与全局（global）索引之间的差异。我们探讨了结合全局索引的数据仓库中的分区操作，以及资源消耗与可用性之间的权衡。我们还了解了易于维护的特性，例如同时对多个分区执行维护操作、级联截断（cascade\
  \ truncate）和级联交换（cascade exchange）的能力。`Oracle`在每个新版本中都在持续更新和改进分区功能。\n\n随着时间的推移，随着数据库应用程序规模和体量的增长，我看到这个特性会变得对更广泛的受众更具相关性。互联网及其对数据库的渴求本性，加上要求保留更长时间审计数据的法规，正导致出现越来越多极其庞大的数据集合，而分区是帮助管理这一问题的自然工具。\n\
  \n## 14. 并行执行\n\n**并行执行**是`Oracle Enterprise Edition`的一个功能（标准版中不可用），它能够将一个大型的串行任务（任何`DML`或`DDL`）物理地分解成多个可以同时处理的小片段。`Oracle`中的并行执行模拟了我们日常生活中经常看到的真实过程。例如，你不会期望看到一个人建造一栋房子；相反，是许多人协同工作，并发地快速组装房子。同样，某些操作可以被分解为更小的任务并并发执行；例如，管道工程和电气布线可以同时进行，以减少整个工作所需的总时间。\n\
  \n`Oracle`中的并行执行遵循大致相同的逻辑。`Oracle`通常可以将某个大型作业分解为更小的部分，并发地执行每个部分。换句话说，如果需要对一个大表进行全表扫描，那么没有理由不能让四个并行会话（`P001`–`P004`）共同完成这个全表扫描，每个会话读取表的不同部分。如果`P001`–`P004`扫描的数据需要排序，这可以由另外四个并行会话（`P005`–`P008`）执行，它们最终可以将结果发送给一个总体协调查询的会话。\n\
  \n并行执行是一种工具，如果运用得当，可以使某些操作的响应时间提升数个数量级。但如果将其当作一个“快速=true”的开关来使用，结果通常恰恰相反。在本章中，目标不是精确解释并行查询在`Oracle`中是如何实现的、并行操作可能产生的无数计划组合等等；这些内容在《Oracle\
  \ Database Administrator’s Guide》、《Oracle Database Concepts》手册、《Oracle VLDB and\
  \ Partitioning Guide》，特别是《Oracle Database Data Warehousing Guide》中已有很好的阐述。本章的目标是让你理解并行执行适用和不适用哪一类问题。具体来说，在了解何时使用并行执行之后，我们将介绍：\n\
  \n### 14.1 并行查询\n这是`Oracle`使用多个操作系统进程或线程来执行单个查询的能力。`Oracle`会找到可以并行执行的操作（例如全表扫描或大型排序），并创建一个并行执行这些操作的查询计划。\n\
  \n### 14.2 并行 DML (PDML)\n这在本质上与并行查询非常相似，但它指的是使用并行处理来执行修改（`INSERT`、`UPDATE`、`DELETE`和`MERGE`）。在本章中，我们将查看`PDML`并讨论其固有的一些限制。\n\
  \n### 14.3 并行 DDL\n并行`DDL`是`Oracle`并行执行大型`DDL`操作的能力。例如，索引重建、创建新索引、通过`CREATE TABLE\
  \ AS SELECT`加载数据以及大表的重组都可能使用并行处理。我相信这是数据库中并行的“最佳应用场景”，因此我们将把大部分讨论集中在这个主题上。\n\n###\
  \ 14.4 并行加载\n外部表和`SQL*Loader`能够并行加载数据。本章和第 15 章将简要提及这个主题。\n\n### 14.5 过程并行化\n这是并行运行我们开发的代码的能力。在本章中，我将讨论两种实现方法。第一种方法涉及`Oracle`以一种对开发人员透明的方式并行运行我们开发的`PL/SQL`代码（开发人员不是在编写并行代码，而是`Oracle`在为他们透明地并行化代码）。另一种是我称之为“自己动手并行”的方法，即开发的代码本身就被设计为可以并行执行。\n\
  \n### 14.6 并行恢复\n`Oracle`中另一种形式的并行执行是执行并行恢复的能力。并行恢复可以在实例级别执行，也许是为了加速在软件、操作系统或一般系统故障（例如意外断电）后需要执行的恢复。并行恢复也可能应用于介质恢复（例如，从备份中恢复）。本书的目的不是涵盖与恢复相关的主题，所以我只是顺便提及并行恢复的存在。关于此主题的进一步阅读，请参阅《Oracle\
  \ Database Backup and Recovery User’s Guide》。\n\n现在你对并行执行有了一个简要的介绍，让我们开始了解何时适合使用此功能。\n\
  \n\n## 何时使用并行执行\n\n并行执行效果可能非常显著。它能让你将一个需要执行数小时甚至数天的过程，在几分钟内完成。在某些情况下，将一个庞大的问题分解为小的组件，可以显著减少处理时间。然而，在考虑并行执行时，有一个基本概念需要牢记，正如\
  \ Oracle 专家 Jonathan Lewis 的这句简短引述所总结的：\n\n> `PARALLEL QUERY` 选项本质上是不可扩展的。\n\n尽管在撰写本文时，这句引述已有些年头，但它的有效性与当时相比，即使没有增强，也丝毫不减。并行执行本质上是一个不可扩展的解决方案。它的设计初衷是允许单个用户或特定的\
  \ `SQL` 语句消耗数据库的所有资源。如果你有一个特性允许个人利用所有可用资源，然后让两个个人使用该特性，你显然会遇到资源争用问题。随着系统上并发用户数量开始超过你拥有的资源数量（内存、`CPU`\
  \ 和 `I/O`），部署并行操作的能力就变得值得怀疑了。例如，如果你有一台四核 `CPU` 的机器，平均有 32 个用户同时执行查询，那么你很可能*不*希望并行化他们的操作。如果你允许每个用户只执行一个“并行度\
  \ 2”的查询，那么在一台仅有四个 `CPU` 的机器上，现在将有 64 个并发操作在进行。如果机器在并行执行之前没有过载，那么现在几乎肯定会过载。\n\n简而言之，并行执行也可能是个糟糕的主意。在许多情况下，应用并行处理只会导致资源消耗增加，因为并行执行试图使用*所有可用资源*。在资源必须由许多并发事务共享的系统中，例如\
  \ `OLTP` 系统中，你可能会因此观察到*增加的*响应时间。它会避免在串行执行计划中能够高效使用的某些执行技术，而采用像全表扫描这样的执行路径，希望通过并行执行这个更大批量操作的多个部分，来优于串行计划。并行执行如果应用不当，可能正是导致你性能问题的原因，而非解决方案。\n\
  \n因此，在应用并行执行之前，你需要确保以下两点成立：\n\n*   你必须有一个非常庞大的任务，例如全表扫描 500GB 的数据。\n*   你必须有充足的*可用*资源。在并行全表扫描\
  \ 500GB 数据之前，你需要确保有足够的空闲 `CPU` 来容纳并行进程，以及充足的 `I/O`。这 500GB 数据应该分布在不止一个物理磁盘上，以便允许多个并发读取请求同时发生，从磁盘到计算机应该有足够的\
  \ `I/O` 通道来并行检索数据，等等。\n\n如果你的任务很小，就像 `OLTP` 系统中执行的典型查询那样，或者你没有足够的*可用*资源——这在 `OLTP`\
  \ 系统中也很典型，因为 `CPU` 和 `I/O` 资源通常已经被用到极致——那么并行执行就不是你应该考虑的选项。为了让你更好地理解这个概念，我提供以下类比。\n\
  \n### 一个并行处理的比喻\n\n我经常用一个比喻来描述并行处理，以及为什么在数据库中你需要一个庞大的任务*并且*有充足的空闲资源。比喻是这样的：假设你有两个任务要完成。第一个是撰写一份关于新产品的一页摘要。另一个是撰写一份十章的综合报告，每一章都非常独立。例如，考虑本书：本章“并行执行”与题为“重做与撤销”的章节是完全独立且不同的——它们不需要按顺序写完。\n\
  \n你会如何处理每一项任务？你认为哪一项会从并行处理中受益？\n\n#### 一页摘要\n\n在这个比喻中，分配给你的一页摘要并不是一个大任务。你要么自己完成，要么分配给单个人。为什么？因为并行化这个过程所需的工作量，将超过你自己写这篇论文所需的工作量。你必须坐下来，确定应该有\
  \ 12 个段落，确定每个段落不依赖于其他段落，召开团队会议，挑选 12 个人，向他们解释问题并给每人分配一个段落，担任协调员收集所有段落，将它们按正确顺序排列，验证无误，然后打印报告。所有这些加起来，很可能比你*自己串行写完这篇论文*花的时间还要长。管理一个大团队来完成这种规模的项目所产生的开销，将远远超过让\
  \ 12 个段落并行写作带来的任何收益。\n\n完全相同的原则适用于数据库中的并行执行。如果你有一个串行执行只需几秒或更短时间就能完成的任务，那么引入并行执行及其相关的管理开销很可能会让整个事情花费更长时间。\n\
  \n#### 十章报告\n\n但考虑第二个任务。如果你想要那份十章报告尽快完成——越快越好——最慢的方法就是把所有工作交给一个人（相信我，我知道——看看这本书！有时我真希望有\
  \ 15 个我同时在写它）。所以你会召开会议，审查流程，分配工作，担任协调员，收集结果，装订完成的报告，并交付。这可能无法在十分之一的时间内完成，但也许能在八分之一左右。同样，我这么说是有前提的，即*你有足够的空闲资源*。如果你有一支目前无事可做的庞大团队，那么拆分工作完全合理。\n\
  \n然而，请考虑到作为管理者，你的团队正在处理多项任务，他们手头已经有很多事情了。在这种情况下，对于那个大项目你必须非常小心。你需要确保不会让他们不堪重负；你不想让他们工作到精疲力竭。你不能委派超出你的资源（你的人手）承受能力的工作；否则，他们会辞职。如果你的团队已经满负荷工作，增加更多工作将导致所有进度延误，所有项目延期。\n\
  \n`Oracle` 中的并行执行与此非常相似。如果你有一个需要花费几分钟、几小时或几天的任务，那么引入并行执行可能是让它运行速度快八倍的关键。但如果你的资源已经严重不足（团队人手已过度劳累），那么就应该避免引入并行执行，因为系统会变得更加停滞不前。虽然\
  \ `Oracle` 服务器进程不会以罢工来抗议，但它们可能会耗尽 `RAM` 而失败，或者仅仅因为等待 `I/O` 或 `CPU` 的时间过长，而显得好像根本没有在工作。\n\
  \n如果你牢记这一点，永远记住不要将类比推到不合逻辑的极端，那么你就拥有了判断并行性是否能派上用场的常识性指导原则。如果你的任务只需几秒钟完成，那么并行执行很可能无法让它变得更快——反之则更有可能。如果你的资源已经不足（即你的资源已被充分利用），增加并行执行很可能会让情况变得更糟，而不是更好。并行执行在你有一个真正庞大的任务并且有大量空闲资源时效果极佳。在本章中，我们将看看一些利用这些资源的方法。\n\
  \n\n\n## 并行查询\n\n并行查询允许将一条 SQL `SELECT` 语句划分为许多较小的查询，让每个组成部分查询并发运行，然后将来自每个部分的结果合并以提供最终答案。例如，在连接到我的可插拔数据库后，考虑以下查询：\n\
  \n```\n$ sqlplus eoda/foo@PDB1\nSQL> select count(status) from big_table;\n```\n\
  \n使用并行查询，此查询可以利用若干并行会话，将 `BIG_TABLE` 拆分为小的、不重叠的切片，然后要求每个并行会话读取表并统计其分片的行数。然后，此会话的并行查询协调器将从各个并行会话接收每个聚合计数，并进一步聚合它们，将最终答案返回给客户端应用程序。从图示上看，它可能如图\
  \ 14-1 所示。\n\n![../images/319655_4_En_14_Chapter/319655_4_En_14_Fig1_HTML.jpg](img/319655_4_En_14_Fig1_HTML.jpg)\n\
  \n图 14-1\n\n并行 `select count (status)` 示意图\n\n注意\n\n如图 14-1 所示，进程和文件之间并非一一对应的关系。实际上，`BIG_TABLE`\
  \ 的所有数据可能都在一个文件中，由四个并行进程处理。或者，也可能有两个文件由这四个进程处理，或者通常情况下是任意数量的文件。\n\n`p000`、`p001`、`p002`\
  \ 和 `p003` 进程被称为 `并行执行服务器`，有时也称为 `并行查询 (PQ slaves)`。这些并行执行服务器中的每一个都是一个独立的会话，其连接方式就像一个专用服务器进程一样。每个服务器负责扫描\
  \ `BIG_TABLE` 的一个不重叠区域，聚合它们的结果子集，并将输出发送回协调服务器——即原始会话的服务器进程——该服务器进程会将子结果聚合成最终答案。\n\
  \n我们可以在执行计划中看到这一点。使用一个包含一千万行的 `BIG_TABLE`（关于创建 `BIG_TABLE` 的详细信息，请参阅本书开头的“设置环境”部分），我们将逐步了解如何为该表启用并行查询，并探索如何观察并行查询的运行情况。此示例在具有四个\
  \ CPU 的机器上执行，所有并行参数均使用默认值；也就是说，这是一个开箱即用的安装，仅设置了必要的参数，包括 `SGA_TARGET`（设置为 1GB）、`DB_BLOCK_SIZE`（设置为\
  \ 8KB）和 `PGA_AGGREGATE_TARGET`（设置为 512MB）。最初，我们预期会看到如下计划：\n\n```\nSQL> explain plan\
  \ for select count(status) from big_table;\nExplained.\nSQL> select * from table(dbms_xplan.display(null,\
  \ null, 'TYPICAL -ROWS -BYTES -COST'));\n\n|  Id | Operation          | Name   \
  \   | Time     |\n\n|   0 | SELECT STATEMENT   |           | 00:00:03 |\n|   1 |\
  \  SORT AGGREGATE    |           |          |\n|   2 |   TABLE ACCESS FULL| BIG_TABLE\
  \ | 00:00:03 |\n\n```\n\n注意\n\nOracle 的不同版本对各种并行功能的默认设置不同——有时差异巨大。如果您在旧版本上测试其中一些示例并看到不同的输出，请不要感到惊讶。\n\
  \n这是一个典型的 `串行` 计划。不涉及并行，因为我们没有请求启用并行查询，而默认情况下它是不启用的。我们可以通过多种方式启用并行查询，包括在查询中直接使用提示（hint），或者通过更改表以启用对并行执行路径的考虑（这是我们在本例中使用的方法）。我们可以特别指定在针对此表创建执行路径时应考虑的并行度。例如，我们可以告诉\
  \ Oracle：“我们希望您在针对此表创建执行计划时使用并行度 4。” 这转化为以下代码：\n\n```\nSQL> alter table big_table\
  \ parallel 4;\nTable altered.\n```\n\n我更喜欢这样告诉 Oracle：“请考虑并行执行，但您应根据当前系统工作负载和查询本身来确定适当的并行度。”\
  \ 也就是说，让并行度随着系统上工作负载的增减而随时间变化。如果我们有大量空闲资源，并行度会升高；在可用资源有限时，并行度会降低。这种方法不是使用固定的并行度使机器过载，而是允许\
  \ Oracle 动态地增加或减少查询所需的并发资源量。\n\n我们只需通过 `ALTER TABLE` 命令为此表启用并行查询：\n\n```\nSQL> alter\
  \ table big_table parallel;\nTable altered.\n```\n\n就这样——现在针对此表的操作将会考虑并行查询。当我们重新运行解释计划时，这次我们看到：\n\
  \n```\nSQL> explain plan for select count(status) from big_table;\nExplained.\n\
  SQL> select * from table(dbms_xplan.display(null, null, 'TYPICAL -ROWS -BYTES -COST'));\n\
  \n|  Id | Operation              | Name      | Time     |    TQ  |IN-OUT| PQ Distrib\
  \ |\n\n|   0 | SELECT STATEMENT       |           | 00:00:01 |        |      | \
  \           |\n|   1 |  SORT AGGREGATE        |           |          |        |\
  \      |            |\n|   2 |   PX COORDINATOR       |           |          | \
  \       |      |            |\n|   3 |    PX SEND QC (RANDOM) | :TQ10000  |    \
  \      |  Q1,00 | P->S | QC (RAND)  |\n|   4 |     SORT AGGREGATE     |        \
  \   |          |  Q1,00 |PCWP |            |\n|   5 |      PX BLOCK ITERATOR | \
  \          | 00:00:01 |  Q1,00 | PCWC |            |\n|   6 |       TABLE ACCESS\
  \ FULL| BIG_TABLE | 00:00:01 |  Q1,00 | PCWP |            |\n\n```\n\n请注意，以并行方式运行的查询的聚合时间为\
  \ 00:00:01，而之前串行计划的估计时间为 00:00:03。请记住，这些是 `估计值`，而不是承诺！\n\n如果您从下往上阅读此计划，从 `ID=6`\
  \ 开始，它显示了图 14-1 中描述的步骤。全表扫描将被拆分为许多较小的扫描（步骤 5）。每个扫描将聚合其 `COUNT(STATUS)` 值（步骤 4）。这些子结果将被传输到并行查询协调器（步骤\
  \ 2 和 3），协调器将进一步聚合这些结果（步骤 1）并输出答案。\n\n默认并行执行服务器\n\n当实例启动时，Oracle 使用 `PARALLEL_MIN_SERVERS`\
  \ 初始化参数的值来确定应自动启动多少并行执行服务器。这些进程用于为并行执行语句提供服务。`PARALLEL_MIN_SERVERS` 的最小值由 `CPU_COUNT`\
  \ * `PARALLEL_THREADS_PER_CPU` * 2 计算得出。在 Linux/UNIX 环境中，您可以使用 `ps` 命令查看这些进程：\n\n\
  ```\n$ ps -aef | grep '^oracle.*ora_p00._'\noracle    1198     1  0 17:20 ?    \
  \    00:00:02 ora_p000_CDB\noracle    1200     1  0 17:20 ?        00:00:02 ora_p001_CDB\n\
  oracle    1215     1  0 17:20 ?        00:00:00 ora_p002_CDB\noracle    1217   \
  \  1  0 17:20 ?        00:00:00 ora_p003_CDB\noracle    1569     1  0 17:21 ?  \
  \      00:00:00 ora_p004_CDB\noracle    1571     1  0 17:21 ?        00:00:00 ora_p005_CDB\n\
  ```\n\n如果我们出于好奇想要观察并行查询，使用两个会话可以轻松做到。在我们要运行并行查询的会话中，我们首先确定我们的 `SID`：\n\n```\nSQL>\
  \ select sid from v$mystat where rownum = 1;\nSID\n\n```\n\n在另一个会话中，我们准备好运行此查询（但先不要运行，只需输入它！）：\n\
  \n```\nSQL> select sid, qcsid, server#, degree from v$px_session where qcsid = 258\n\
  ```\n\n现在，回到我们查询 `SID` 的原始会话，我们将启动并行查询。在已设置好查询的会话中，我们现在可以运行它并看到类似于以下内容的输出：\n\n\n\
  \n# Oracle 并行查询工作原理\n\n## 并行查询的协调机制\n\n我们在此看到，并行查询会话 (`SID=258`) 是此动态性能视图中九行的查询协调器\
  \ SID (QCSID)。我们的会话现在正在**协调**或控制这些并行查询资源。我们可以看到每个资源都有自己的 SID；事实上，每个都是一个独立的 Oracle\
  \ 会话，在并行查询执行期间显示在 `V$SESSION` 中：\n\n```sql\nSQL> select sid, username, program from\
  \ v$session\nwhere sid in ( select sid\nfrom v$px_session\nwhere qcsid = 258 );\n\
  SID USERNAME   PROGRAM\n---------- --------   ---------------------------\n12 EODA\
  \       oracle@orclvm (P007)\n23 EODA       oracle@orclvm (P004)\n26 EODA      \
  \ oracle@orclvm (P000)\n94 EODA       oracle@orclvm (P001)\n102 EODA       oracle@orclvm\
  \ (P005)\n169 EODA       oracle@orclvm (P006)\n177 EODA       oracle@orclvm (P002)\n\
  258 EODA       sqlplus@orclvm (TNS V1-V3)\n267 EODA       oracle@orclvm (P003)\n\
  9 rows selected.\n```\n\n> **注意**\n> 如果您的系统中没有发生并行执行，不要期望在 `V$SESSION` 中看到并行执行服务器。它们会存在于\
  \ `V$PROCESS` 中，但除非被使用，否则不会建立会话。并行执行服务器将连接到数据库，但不会建立会话。有关会话和连接之间区别的详细信息，请参见第 5 章。\n\
  \n简而言之，这就是并行查询——事实上，也是通用的并行执行——的工作方式。它需要一系列并行执行服务器协同工作，以生成子结果，这些子结果要么被馈送到其他并行执行服务器进行进一步处理，要么被馈送给并行查询的协调器。\n\
  \n## 资源分配与性能考虑\n\n在这个特定的示例中，如图所示，`BIG_TABLE` 分布在一个表空间（具有四个数据文件的表空间）中的四个独立设备上。在实现并行执行时，通常最佳做法是将数据分散在尽可能多的物理设备上。您可以通过多种方式实现这一点：\n\
  \n*   使用跨磁盘的 RAID 条带化\n*   使用具有内置条带化功能的 ASM\n*   使用分区在物理上将 `BIG_TABLE` 隔离到多个磁盘上\n\
  *   在单个表空间中使用多个数据文件，从而允许 Oracle 为 `BIG_TABLE` 段在许多文件中分配区\n\n通常，并行执行在获得对尽可能多的资源（CPU、内存和\
  \ I/O）的访问时效果最佳。然而，这并不是说如果所有数据都在单个磁盘上，从并行查询中就无法获得任何收益，但您获得的收益可能不如使用多个磁盘时那么多。即使使用单个磁盘，响应时间也可能获得一些加速，原因在于，当一个给定的并行执行服务器在计数行时，它并不在读取它们，反之亦然。因此，两个并行执行服务器很可能在比串行计划更短的时间内完成对所有行的计数。\n\
  \n同样，即使在单 CPU 机器上，您也能从并行查询中受益。串行的 `SELECT COUNT(*)` 很可能不会用尽单 CPU 机器上 100% 的 CPU——它会花费部分时间执行（并等待）到磁盘的物理\
  \ I/O。并行查询将允许您充分利用机器上的资源（在这种情况下是 CPU 和 I/O），无论这些资源是什么。\n\n最后一点将我们带回到之前的陈述：**并行查询本质上是不可扩展的**。如果您允许四个会话在单\
  \ CPU 机器上同时使用两个并行执行服务器执行查询，您可能会发现它们的响应时间比它们串行处理时更长。争夺稀缺资源的进程越多，满足所有请求所需的时间就越长。\n\
  \n请记住，并行查询需要满足两个条件。首先，您需要有一个大的任务来执行——例如，一个运行时间以分钟、小时或天（而不是秒或亚秒）计算的长时间运行的查询。这意味着并行查询不是适用于典型\
  \ OLTP 系统的解决方案，因为在这些系统中您不执行长时间运行的任务。在这些系统上启用并行执行通常会带来灾难性的后果。\n\n其次，您需要充足的空闲资源，如\
  \ CPU、I/O 和内存。如果您缺乏其中任何一项，那么并行查询很可能会将该资源的利用率推过临界点，从而对整体性能和运行时产生负面影响。\n\nOracle 引入了一些功能来尝试限制这种资源的过度使用：并行语句排队（Parallel\
  \ Statement Queuing，`PSQ`）。使用 `PSQ` 时，数据库将限制并发执行的并行查询数量，并将任何后续的并行请求放入执行队列。当 CPU\
  \ 资源耗尽时（通过并发使用的并行执行服务器数量来衡量），数据库将阻止新请求变为活动状态。这些请求不会失败——相反，它们的启动将被延迟；它们将被排队。随着资源变得可用（当正在使用的并行执行服务器完成任务并变为空闲时），数据库将开始执行队列中的查询。通过这种方式，尽可能多的有意义的并行查询可以并发运行，而不会压垮系统，同时后续请求礼貌地等待轮到它们。总之，每个人都能更快地得到答案，但需要排一个等候队列。\n\
  \n如今，数据仓库几乎无处不在，支持的用户社区规模与许多事务处理系统相当。这意味着在任何给定的时间点，您可能没有足够的空闲资源来在这些系统上启用并行查询。这并不意味着并行执行在这种情况下没有用——正如我们将在“并行\
  \ DDL”一节中看到的，它可能更多地是一种 DBA 工具，而不是并行查询工具。\n\n\n\n## 并行 DML\n\n### 概述\nOracle 文档将并行\
  \ DML (PDML) 的范围限制为仅包括 `INSERT`、`UPDATE`、`DELETE` 和 `MERGE`（它不像普通 DML 那样包括 `SELECT`）。在\
  \ PDML 期间，Oracle 可能会使用多个并行执行服务器来执行你的 `INSERT`、`UPDATE`、`DELETE` 或 `MERGE` 操作，而不是单个串行进程。在具有充足\
  \ I/O 带宽的多 CPU 机器上，对于大规模 DML 操作，速度的潜在提升可能很大。\n\n### 使用场景\n然而，你不应将 PDML 视为加速基于 OLTP（*联机事务处理*）应用程序的功能。如前所述，并行操作旨在完全、彻底地最大化机器的利用率。它们的设计目标是让单个用户能够完全使用机器上的所有磁盘、CPU\
  \ 和内存。在某个数据仓库（数据量大、用户少）中，这可能是你希望实现的目标。而在 OLTP 系统（大量用户都在进行简短、快速的事务处理）中，你*不希望*赋予单个用户完全接管机器资源的能力。\n\
  \n这听起来有些矛盾：我们使用并行查询来提升扩展性，那它怎么可能不具可扩展性呢？当应用于 OLTP 系统时，这个说法非常准确。并行查询并不会随着并发用户数量的增加而扩展。并行查询的设计目的是让单个会话产生相当于\
  \ 100 个并发会话的工作量。在我们的 OLTP 系统中，我们确实不希望单个用户产生 100 个用户的工作量。\n\n### 执行机制\nPDML 在大型数据仓库环境中对于批量更新海量数据非常有用。PDML\
  \ 操作的执行方式与 Oracle 执行分布式查询非常相似，每个并行执行服务器就像一个独立数据库实例中的进程。表的每个片段由一个独立的线程修改，每个线程拥有自己独立的事务（因此也有自己的回滚段，但愿如此）。当它们全部完成后，会执行一个相当于快速两阶段提交的操作，来提交这些独立的事务。图\
  \ 14-2 描述了使用四个并行执行服务器的并行更新。每个并行执行服务器都有自己独立的事务，所有事务要么在 PDML 协调会话中全部提交，要么全部不提交。\n\n\
  ![../images/319655_4_En_14_Chapter/319655_4_En_14_Fig2_HTML.jpg](img/319655_4_En_14_Fig2_HTML.jpg)\n\
  \n图 14-2 并行更新 (PDML) 示意图\n\n### 操作示例\n我们实际上可以观察到为并行执行服务器创建了独立事务这一事实。我们将再次使用两个会话。在\
  \ `SID=258` 的会话中，我们显式启用并行 DML。在这方面，PDML 与并行查询不同；除非你显式请求，否则你不会得到它：\n\n```\n$ sqlplus\
  \ eoda/foo@PDB1\nSQL> alter session enable parallel dml;\n```\n\n你可以通过以下查询验证你的会话是否已启用并行\
  \ DML：\n\n```\nSQL> select pdml_enabled from v$session where sid = sys_context('userenv','sid');\n\
  PDM\n----\nYES\n```\n\n仅表是“并行”的这一事实是不够的（对于并行查询是足够的）。需要在会话中显式启用 PDML 的原因在于 PDML 有某些相关的限制，我将在本示例之后列出。\n\
  \n在同一个会话中，我们执行一个批量 `UPDATE`，由于该表是“并行启用”的，这实际上将并行完成：\n\n```\nSQL> update big_table\
  \ set status = 'done';\n```\n\n在另一个会话中，我们将 `V$SESSION` 与 `V$TRANSACTION` 连接，以显示\
  \ PDML 操作的活动会话及其独立的事务信息：\n\n```\nSQL> select a.sid, a.program, b.start_time, b.used_ublk,\n\
  \  2  b.xidusn ||'.'|| b.xidslot || '.' || b.xidsqn trans_id\n  3  from v$session\
  \ a, v$transaction b\n  4  where a.taddr = b.addr\n  5  and a.sid in ( select sid\n\
  \  6                 from v$px_session\n  7                 where qcsid = 258)\n\
  \  8  order by sid;\nSID 程序                            START_TIME           USED_UBLK\
  \ 事务 ID\n----- ---------------------------- -------------------- --------- ---------\n\
  17 sqlplus@orclvm (TNS V1-V3)      02/28/21 17:25:45            1 9.5.715\n19 oracle@orclvm\
  \ (P000)            02/28/21 17:25:45            1 4.30.689\n20 oracle@orclvm (P006)\
  \            02/28/21 17:25:45        30903 6.4.720\n138 oracle@orclvm (P003)  \
  \         02/28/21 17:25:45            1 2.9.718\n140 oracle@orclvm (P007)     \
  \      02/28/21 17:25:45        29086 5.11.711\n253 oracle@orclvm (P001)       \
  \    02/28/21 17:25:45            1 3.24.805\n260 oracle@orclvm (P004)         \
  \  02/28/21 17:25:45        31386 7.4.693\n366 oracle@orclvm (P002)           02/28/21\
  \ 17:25:45            1 1.31.707\n370 oracle@or (P005)               02/28/21 17:25:45\
  \        29114 8.4.766\n9 rows selected\n```\n\n如你所见，这里发生了很多事情。这是因为所生成的计划包含一个更新表的步骤，以及独立的更新索引条目的步骤。看一下来自\
  \ `DBMS_XPLAN` 的带有 `BASIC` 和 `PARALLEL` 启用的解释计划输出：\n\n```\nSQL> explain plan for\
  \ update big_table set status = 'done';\nExplained.\nSQL> select * from table(dbms_xplan.display(null,null,'BASIC\
  \ +PARALLEL'));\n```\n\n我们看到如下内容：\n\n```\n|  Id | Operation                | Name\
  \      |    TQ  |IN-OUT| PQ Distrib |\n|   0 | UPDATE STATEMENT         |      \
  \     |        |      |            |\n|   1 |  PX COORDINATOR          |       \
  \    |        |      |            |\n|   2 |   PX SEND QC (RANDOM)    | :TQ10001\
  \  |  Q1,01 | P->S | QC (RAND)  |\n|   3 |    INDEX MAINTENANCE     | BIG_TABLE\
  \ |  Q1,01 | PCWP |            |\n|   4 |     PX RECEIVE           |           |\
  \  Q1,01 | PCWP |            |\n|   5 |      PX SEND RANGE       | :TQ10000  | \
  \ Q1,00 | P->P | RANGE      |\n|   6 |       UPDATE             | BIG_TABLE |  Q1,00\
  \ | PCWP |            |\n|   7 |        PX BLOCK ITERATOR |           |  Q1,00 |\
  \ PCWC |            |\n|   8 |         TABLE ACCESS FULL| BIG_TABLE |  Q1,00 | PCWP\
  \ |            |\n```\n\n### 限制条件\n由于 PDML 的这种伪分布式实现方式，它有以下一些限制：\n\n*   在 PDML 操作期间不支持触发器。在我看来，这是一个合理的限制，因为触发器往往会增加大量的更新开销，而你使用\
  \ PDML 是为了追求速度——这两个特性并不相容。\n*   在 PDML 期间不支持某些声明性 RI（参照完整性）约束，因为表的每个片段都是在独立的会话中作为独立事务进行修改的。例如，不支持自参照完整性。试想一下，如果支持它，将会发生死锁和其他锁定问题。\n\
  *   在提交或回滚之前，无法访问你已通过 PDML 修改的表。\n*   PDML 不支持高级复制（因为高级复制的实现是基于触发器的）。\n*   不支持延迟约束（即处于延迟模式的约束）。\n\
  *   PDML 只能对具有位图索引或 LOB 列的表执行，前提是该表已分区，并且并行度将被限制为分区的数量。在这种情况下，无法在分区内并行化操作，因为每个分区将获得一个并行执行服务器来操作。我们应当注意，从\
  \ Oracle 12*c*开始，你可以在不分区的情况下对 SecureFiles LOB 运行 PDML。\n*   执行 PDML 时不支持分布式事务。\n\
  *   PDML 不支持聚簇表。\n\n\n# Oracle 并行操作：DML、验证与 DDL\n\n## 违反并行 DML 限制的后果\n\n如果违反了上述任何限制，会发生两种情况之一：要么语句将串行执行（不涉及并行），要么引发错误。例如，如果你已经对表`T`执行了并行\
  \ DML，然后在事务结束前尝试查询表`T`，你将收到错误`ORA-12838: cannot read/modify an object after modifying\
  \ it in parallel`。\n\n还值得注意的是，在本节前一个例子中，如果你`没有`为`UPDATE`语句启用并行 DML，那么执行计划输出看起来会大不相同，例如：\n\
  \n```\n| Id  | Operation             | Name      |    TQ  |IN-OUT| PQ Distrib |\n\
  |   0 | UPDATE STATEMENT      |           |        |      |            |\n|   1\
  \ |  UPDATE               | BIG_TABLE |        |      |            |\n|   2 |  \
  \ PX COORDINATOR      |           |        |      |            |\n|   3 |    PX\
  \ SEND QC (RANDOM)| :TQ10000  |  Q1,00 | P->S | QC (RAND)  |\n|   4 |     PX BLOCK\
  \ ITERATOR |           |  Q1,00 | PCWC |            |\n|   5 |      TABLE ACCESS\
  \ FULL| BIG_TABLE |  Q1,00 | PCWP |            |\n```\n\n在外行人看来，这看起来像是`UPDATE`是并行执行的，但实际上并非如此。上面的输出显示`UPDATE`是串行的，而表的扫描（读取）是并行的。所以这里涉及并行查询，但没有并行\
  \ DML。\n\n## 验证并行操作\n\n你可以通过查询数据字典来快速验证会话中发生的并行操作。例如，这里有一个并行 DML 操作：\n\n```\nSQL>\
  \ alter session enable parallel dml;\nSQL> update big_table set status='AGAIN';\n\
  Next, verify the type and number of parallel activities via\nSQL> select name, value\
  \ from v$statname a, v$mystat b\nwhere a.statistic# = b.statistic# and name like\
  \ '%parallel%';\nHere is some sample output for this session:\nNAME            \
  \                                     VALUE\n-----------------------------------------------\
  \ ----------\nDBWR parallel query checkpoint buffers written           0\nqueries\
  \ parallelized                                     0\nDML statements parallelized\
  \                              1\nDDL statements parallelized                  \
  \            0\nDFO trees parallelized                                   1\n```\n\
  \n上面的输出证实，此会话中已执行了一条并行 DML 语句。\n\n### 并行 DDL\n\n我相信并行 DDL 是 Oracle 并行技术的真正亮点。正如我们所讨论的，并行执行通常不适用于\
  \ OLTP 系统。事实上，对于许多数据仓库而言，并行查询也正变得越来越不是唯一的选择。过去，数据仓库是为非常小且专注的用户社区构建的——有时仅由一两名分析师组成。然而，在过去的十年左右，我看着它们从小型用户社区发展成为拥有成百上千用户的社区。考虑一个由\
  \ Web 应用程序前端化的数据仓库：它可能同时可供成千上万甚至更多的用户访问。\n\n但执行大型批处理操作的 DBA，可能是在维护窗口期间，则是另一回事。DBA\
  \ 仍然是单个个体，他们可能拥有一台具有大量计算资源的大型机器。DBA 只需要做一件事，例如加载这些数据，或重组那个表，或重建那个索引。如果没有并行执行，DBA\
  \ 很难真正充分利用硬件的全部能力。有了并行执行，他们就可以。以下 SQL DDL 命令允许并行化：\n\n*   `CREATE INDEX`：多个并行执行服务器可以扫描表、对数据进行排序，并将排序后的段写入索引结构。\n\
  *   `CREATE TABLE AS SELECT`：执行`SELECT`的查询可以使用并行查询来执行，而表加载本身也可以并行完成。\n*   `ALTER\
  \ INDEX REBUILD`：索引结构可以并行重建。\n*   `ALTER TABLE MOVE`：表可以并行移动。\n*   `ALTER TABLE\
  \ SPLIT|COALESCE PARTITION`：单个表分区可以并行拆分或合并。\n*   `ALTER INDEX SPLIT PARTITION`：索引分区可以并行拆分。\n\
  *   `CREATE/ALTER MATERIALIZED VIEW`：使用并行进程创建物化视图或更改默认的并行度。\n\n注意\n\n请参阅 *Oracle\
  \ Database SQL Language Reference* 手册以获取支持并行操作的完整语句列表。\n\n这些命令中的前四个也适用于单个表/索引分区——也就是说，你可以并行`MOVE`表的单个分区。\n\
  \n对我来说，并行 DDL 是 Oracle 并行执行中可衡量效益最大的地方。当然，它也可以与并行查询一起使用以加速某些长时间运行的操作，但从维护和管理的角度来看，并行\
  \ DDL 是并行操作对我们 DBA 和开发人员影响最大的地方。如果你认为并行查询主要面向最终用户，那么并行 DDL 就是为 DBA/开发人员设计的。\n\n\n\
  ### 并行 DDL\n\nOracle 提供了执行并行直接路径加载的能力，允许多个会话绕过缓冲区缓存，直接写入 Oracle 数据文件，可能完全绕过表数据的撤销（undo）生成，甚至可能绕过重做（redo）生成。通过并行\
  \ DDL 或并行 DML 加上外部表，我们可以实现一个并行直接路径加载，这通过一个简单的 `CREATE TABLE AS SELECT` 或 `INSERT\
  \ /*+ APPEND */` 语句来完成。\n\n让我们看看实际操作。我们将使用之前相同的 `BIG_TABLE`，它是并行启用的并包含一千万条记录。我们将把它连接到第二个表\
  \ `USER_INFO`，该表包含从 `ALL_USERS` 字典视图中获取的 `OWNER` 相关信息。首先，我们将创建 `USER_INFO` 表，为其启用并行操作，然后收集其统计信息：\n\
  \n```sql\n$ sqlplus eoda/foo@PDB1\nSQL> create table user_info as select * from\
  \ all_users;\nTable created.\nSQL> alter table user_info parallel;\nTable altered.\n\
  SQL> exec dbms_stats.gather_table_stats( user, 'USER_INFO' );\nPL/SQL procedure\
  \ successfully completed.\n```\n\n现在，我们想要使用这些信息并行直接路径加载一个新表。我们将使用的查询很简单：\n\n```sql\n\
  SQL> create table new_table parallel as\nselect a.*, b.user_id, b.created user_created\n\
  from big_table a, user_info b\nwhere a.owner = b.username;\n```\n\n该 `CREATE TABLE\
  \ AS SELECT` 语句的执行计划如下：\n\n```\n| Id  | Operation                          | Name\
  \      |    TQ  |IN-OUT| PQ Distrib |\n|   0 | CREATE TABLE STATEMENT          \
  \   |           |        |      |            |\n|   1 |  PX COORDINATOR        \
  \            |           |        |      |            |\n|   2 |   PX SEND QC (RANDOM)\
  \              | :TQ10000  |  Q1,00 | P->S | QC (RAND)  |\n|   3 |    LOAD AS SELECT\
  \ (HYBRID TSM/HWMB)| NEW_TABLE |  Q1,00 | PCWP |            |\n|   4 |     OPTIMIZER\
  \ STATISTICS GATHERING |           |  Q1,00 | PCWP |            |\n|   5 |     \
  \ HASH JOIN                     |           |  Q1,00 | PCWP |            |\n|  \
  \ 6 |       TABLE ACCESS FULL            | USER_INFO |  Q1,00 | PCWP |         \
  \   |\n|   7 |       PX BLOCK ITERATOR            |           |  Q1,00 | PCWC |\
  \            |\n|   8 |        TABLE ACCESS FULL           | BIG_TABLE |  Q1,00\
  \ | PCWP |            |\n```\n\n如果你从步骤 5 往下看，这是查询（`SELECT`）部分。对 `BIG_TABLE` 的扫描和与\
  \ `USER_INFO` 的哈希连接是并行执行的，每个子结果都被加载到表的一部分中（步骤 3，`LOAD AS SELECT`）。在每个并行执行服务器完成其连接和加载部分后，它会将其结果发送给查询协调器。在这个案例中，结果只是指示“成功”或“失败”，因为工作已经完成了。\n\
  \n这就是全部内容——让并行直接路径加载变得简单。对于这些操作，最重要的考虑因素是如何使用（或不使用）空间。一个特别重要的副作用被称为 `extent trimming`。我们现在花些时间来研究一下这个问题。\n\
  \n### 并行 DDL 与区修剪\n\n并行 DDL 依赖于直接路径操作。也就是说，数据不会传递到缓冲区缓存以便稍后写入；相反，像 `CREATE TABLE\
  \ AS SELECT` 这样的操作会创建新的区（extent）并直接写入它们，数据从查询直接进入那些新分配区的磁盘。执行 `CREATE TABLE AS SELECT`\
  \ 一部分的每个并行执行服务器将写入自己的区。`INSERT /*+ APPEND */`（直接路径插入）在段的高水位标记（HWM）之上写入，每个并行执行服务器将再次写入自己的区集，从不与其他并行执行服务器共享。因此，如果你执行一个并行\
  \ `CREATE TABLE AS SELECT` 并使用四个并行执行服务器来创建表，那么你将*至少*有四个区——可能更多。但是每个并行执行服务器将分配自己的区，写入它，并且当它填满时，分配另一个新区。并行执行服务器永远不会使用由其他并行执行服务器分配的区。\n\
  \n图 14-3 描绘了这个过程。我们有一个由四个并行执行服务器执行的 `CREATE TABLE NEW_TABLE AS SELECT`。在图中，每个并行执行服务器由不同的颜色表示。磁鼓中的方框代表由这个\
  \ `CREATE TABLE` 语句在某些数据文件中创建的区。每个区以不同的颜色呈现，原因很简单：任何给定区中的所有数据仅由四个并行执行服务器之一加载——例如，`p003`\
  \ 被描绘为创建并加载了这些区中的四个，依此类推。\n\n![../images/319655_4_En_14_Chapter/319655_4_En_14_Fig3_HTML.jpg](img/319655_4_En_14_Fig3_HTML.jpg)\n\
  \n图 14-3\n\n并行 DDL 区分配图示\n\n这乍听起来不错，但在数据仓库环境中，这可能在大量加载后导致浪费。假设你要加载 1010MB 的数据（大约\
  \ 1GB），并且你使用的是具有 100MB 区的表空间。你决定使用十个并行执行服务器来加载这些数据。每个服务器将首先分配自己的 100MB 区（总共将有十个）并填满它。由于每个服务器有\
  \ 101MB 的数据要加载，它们会填满第一个区，然后继续分配另一个 100MB 区，其中只使用 1MB。你现在有 20 个区（其中 10 个是满的，10 个各有\
  \ 1MB），剩余的 990MB 是“已分配但未使用”。这个空间可以在下次加载更多数据时使用，但目前你有 990MB 的死空间。这就是 `extent trimming`\
  \ 的用武之地。Oracle 将尝试将每个并行执行服务器的最后一个区修剪到尽可能小的大小。\n\n#### 区修剪与本地管理表空间\n\n这里引出了本地管理的表空间。有两种类型：`UNIFORM\
  \ SIZE`，其中表空间中的每个区总是完全相同的大小；和 `AUTOALLOCATE`，其中 Oracle 使用内部算法决定每个区应该多大。这两种方法都很好地解决了*99MB\
  \ 的空闲空间/后面跟着 1MB 的已用空间/后面跟着 99MB 的空闲空间*的问题。然而，它们各自解决的方式非常不同。`UNIFORM SIZE` 方法完全排除了对\
  \ `extent trimming` 的考虑。当你使用 `UNIFORM SIZE` 时，Oracle 无法执行 `extent trimming`。所有区都是那个单一大小——没有区可以比那个单一大小更小（或更大）。另一方面，`AUTOALLOCATE`\
  \ 区确实支持 `extent trimming`，但以一种智能的方式进行。它们使用几种特定大小的区，并有能力使用不同大小的空间——也就是说，该算法允许随着时间的推移使用表空间中的所有空闲空间。与字典管理的表空间不同，如果你请求一个\
  \ 100MB 的区，而 Oracle 只能找到 99MB 的空闲区（如此接近，却又如此遥远），它会使请求失败；而具有 `AUTOALLOCATE` 区的本地管理表空间可以更灵活。它可能会减小它正在发出的请求的大小，以尝试使用所有的空闲空间。\n\
  \n现在让我们看看两种本地管理表空间方法之间的区别。为此，我们需要一个实际的例子来操作。我们将设置一个能够在并行直接路径加载情况中使用的外部表，这是我们经常做的事情。即使你仍然使用\
  \ SQL*Loader 来并行直接路径加载数据，本节内容也完全适用——你只需要手动编写脚本来实际加载数据。因此，为了研究 `extent trimming`，我们需要设置我们的示例加载，然后在不同条件下执行加载并检查结果。\n\
  \n\n\n#### 为本地管理表空间做准备\n\n首先，我们需要一个外部表。我一次又一次地发现，我手上有一个过去用于加载数据的 `SQL*Loader` 控制文件，它看起来像是这样的：\n\
  \n```\nLOAD DATA\nINFILE '/tmp/big_table.dat'\nINTO TABLE big_table\nREPLACE\nFIELDS\
  \ TERMINATED BY '|'\n( id ,owner ,object_name ,subobject_name ,object_id\n,data_object_id\
  \ ,object_type ,created ,last_ddl_time\n,timestamp ,status ,temporary ,generated\
  \ ,secondary\n,namespace ,edition_name\n)\n```\n\n我们可以使用 `SQL*Loader` 本身轻松地将其转换为外部表定义：\n\
  \n```\n$ sqlldr eoda/foo@PDB1 big_table.ctl external_table=generate_only\n...\n\
  使用的路径：      外部表\n```\n\n注意\n\n如果你对 `SQLLDR` 命令及其使用的选项感到好奇，我们将在下一章详细讨论。\n\n你的当前工作目录中应该有一个\
  \ `big_table.log` 文件。打开它。注意传递给 `SQL*Loader` 的 `EXTERNAL_TABLE` 参数。在这种情况下，它导致 `SQL*Loader`\
  \ 不加载数据，而是为我们生成一个 `CREATE TABLE` 语句。这个 `CREATE TABLE` 语句如下所示（这是一个删减版；我已编辑掉重复的元素以使示例更简短）：\n\
  \n```\nCREATE TABLE \"SYS_SQLLDR_X_EXT_BIG_TABLE\"\n(\n\"ID\" NUMBER,\n\"OWNER\"\
  \ VARCHAR2(128),\n\"OBJECT_NAME\" VARCHAR2(128),\n\"SUBOBJECT_NAME\" VARCHAR2(128),\n\
  \"OBJECT_ID\" NUMBER,\n\"DATA_OBJECT_ID\" NUMBER,\n\"OBJECT_TYPE\" VARCHAR2(23),\n\
  \"CREATED\" DATE,\n\"LAST_DDL_TIME\" DATE,\n\"TIMESTAMP\" VARCHAR2(19),\n\"STATUS\"\
  \ VARCHAR2(7),\n\"TEMPORARY\" VARCHAR2(1),\n\"GENERATED\" VARCHAR2(1),\n\"SECONDARY\"\
  \ VARCHAR2(1),\n\"NAMESPACE\" NUMBER,\n\"EDITION_NAME\" VARCHAR2(128)\n)\nORGANIZATION\
  \ external\n(\nTYPE oracle_loader\nDEFAULT DIRECTORY SYS_SQLLDR_XT_TMPDIR_00000\n\
  ACCESS PARAMETERS\n(\nRECORDS DELIMITED BY NEWLINE CHARACTERSET US7ASCII\nBADFILE\
  \ 'SYS_SQLLDR_XT_TMPDIR_00001':'big_table.bad'\nLOGFILE 'SYS_SQLLDR_XT_TMPDIR_00001':'big_table.log_xt'\n\
  READSIZE 1048576\nFIELDS TERMINATED BY \"|\" LDRTRIM\n...\n\"EDITION_NAME\" CHAR(255)\n\
  TERMINATED BY \"|\"\n)\n)\nlocation\n(\n'big_table.dat'\n)\n)REJECT LIMIT UNLIMITED\n\
  ```\n\n我们只需要编辑它，按我们想要的方式命名外部表，可能更改目录等等：\n\n```\n$ sqlplus eoda/foo@PDB1\nSQL> create\
  \ or replace directory my_dir as '/tmp/';\n```\n\n之后，我们只需要实际创建外部表：\n\n```\nCREATE\
  \ TABLE BIG_TABLE_ET\n(\n\"ID\" NUMBER,\n\"OWNER\" VARCHAR2(128),\n\"OBJECT_NAME\"\
  \ VARCHAR2(128),\n\"SUBOBJECT_NAME\" VARCHAR2(128),\n\"OBJECT_ID\" NUMBER,\n\"DATA_OBJECT_ID\"\
  \ NUMBER,\n\"OBJECT_TYPE\" VARCHAR2(23)\n)\nORGANIZATION external\n(\nTYPE oracle_loader\n\
  DEFAULT DIRECTORY my_dir\nACCESS PARAMETERS\n(\nRECORDS DELIMITED BY NEWLINE CHARACTERSET\
  \ US7ASCII\nREADSIZE 1048576\nFIELDS TERMINATED BY \"|\" LDRTRIM\nREJECT ROWS WITH\
  \ ALL NULL FIELDS\n(\n\"ID\" CHAR(255)\nTERMINATED BY \"|\",\n\"OWNER\" CHAR(255)\n\
  TERMINATED BY \"|\",\n\"OBJECT_NAME\" CHAR(255)\nTERMINATED BY \"|\",\n\"SUBOBJECT_NAME\"\
  \ CHAR(255)\nTERMINATED BY \"|\",\n\"OBJECT_ID\" CHAR(255)\nTERMINATED BY \"|\"\
  ,\n\"DATA_OBJECT_ID\" CHAR(255)\nTERMINATED BY \"|\",\n\"OBJECT_TYPE\" CHAR(255)\n\
  TERMINATED BY \"|\"\n)\n)\nlocation\n(\n'big_table.dat'\n)\n)REJECT LIMIT UNLIMITED\
  \ parallel;\n表已创建。\n```\n\n然后我们使这个表支持并行。这是关键的一步——这将促进轻松的并行直接路径加载：\n\n```\nSQL> alter\
  \ table big_table_et PARALLEL;\n表已更改。\n```\n\n注意\n\n`PARALLEL` 子句也可以直接用在 `CREATE\
  \ TABLE` 语句本身上。紧跟在 `REJECT LIMIT UNLIMITED` 之后，添加关键词 `PARALLEL`。我使用 `ALTER` 语句只是为了强调外部表实际上是支持并行的这一点。\n\
  \n#### 比较 UNIFORM 与 AUTOALLOCATE 本地管理表空间的区修剪\n\n关于设置加载组件，我们需要做的就是这些。现在，我们想研究使用 `UNIFORM`\
  \ 区大小的本地管理表空间 (LMT) 与使用 `AUTOALLOCATE` 分配区的 LMT 中空间管理的对比。在本例中，我们将使用 100MB 的区。首先，我们创建一个名为\
  \ `LMT_UNIFORM` 的表空间，它使用统一的区大小：\n\n```\n$ sqlplus eoda/foo@PDB1\nSQL> create tablespace\
  \ lmt_uniform\ndatafile '/opt/oracle/oradata/CDB/PDB1/uniform.dbf'\nsize 1048640K\
  \ reuse\nautoextend on next 100m\nextent management local\nUNIFORM SIZE 100m;\n\
  ```\n\n接下来，我们创建一个名为 `LMT_AUTO` 的表空间，它使用 `AUTOALLOCATE` 来确定区大小：\n\n```\nSQL> create\
  \ tablespace lmt_auto\ndatafile '/opt/oracle/oradata/CDB/PDB1/auto.dbf'\nsize 1048640K\
  \ reuse\nautoextend on next 100m\nextent management local\nAUTOALLOCATE;\n```\n\n\
  每个表空间开始时都有一个 1GB 的数据文件（加上本地管理表空间用于管理存储的 64KB；如果使用 32KB 块大小，则额外多出 128KB 而不是 64KB）。我们允许这些数据文件每次自动扩展\
  \ 100MB。\n\n对于本次练习的设置，使用本书开头“设置环境”部分中的 `big_table.sql` 脚本创建了包含 10,000,000 行的 `BIG_TABLE`\
  \ 表。然后，该表被轻松卸载到一个 CSV 文件中，如下所示：\n\n```\nSQL> set verify off feedback off termout\
  \ off echo off trimspool on pagesize 0 head off\nSQL> set markup csv on quote off\
  \ delimiter |\nSQL> spo /tmp/big_table.dat\nSQL> select * from big_table;\nSQL>\
  \ spo off;\n```\n\n我们将加载刚刚创建的文件，这是一个包含 10,000,000 条记录的文件：\n\n```\n$  ls -lag /tmp/big_table.dat\n\
  - -rw-r--r--. 1 oinstall 1407984520 May 22 19:03 /tmp/big_table.dat\n```\n\n接下来，我们将此文件并行直接路径加载到每个表空间中：\n\
  \n```\nSQL> create table uniform_test  parallel\ntablespace lmt_uniform\nas select\
  \ * from big_table_et;\n表已创建。\nSQL> create table autoallocate_test parallel\ntablespace\
  \ lmt_auto  as\nselect * from big_table_et;\n表已创建。\n```\n\n在我的四 CPU 系统上，这些 `CREATE\
  \ TABLE` 语句由多个并行执行服务器和一个协调器执行。我通过查询与并行执行相关的动态性能视图之一 `V$PX_SESSION` 在语句运行时验证了这一点：\n\
  \n```\nSQL> select sid, serial#, qcsid, qcserial#, degree from v$px_session;\nSID\
  \      SERIAL#      QCSID  QCSERIAL#     DEGREE\n----- ---------- ---------- ----------\
  \ ----------\n19      57630         21      25039          4\n253      14721   \
  \      21      25039          4\n370      58100         21      25039          4\n\
  140      64104         21      25039          4\n21      25039         21\n```\n\
  \n注意\n\n在创建 `UNIFORM_TEST` 和 `AUTOALLOCATE_TEST` 表时，我们只是在每个表上指定了“parallel”，由 Oracle\
  \ 选择并行度。在本例中，我是该机器的唯一用户（所有资源可用），Oracle 根据 CPU 数量（四个）和 `PARALLEL_THREADS_PER_CPU`\
  \ 参数设置（值为 1）默认将其设为四。对于你的系统，你可能有不同的设置，因此会以不同的并行度执行。\n\n`SID`, `SERIAL#` 是并行执行会话的标识符，而\
  \ `QCSID`, `QCSERIAL#` 是并行执行查询协调器的标识符。因此，在并行执行会话运行的情况下，我们想看看空间是如何使用的。对 `USER_SEGMENTS`\
  \ 的快速查询给了我们一个很好的了解：\n\n```\nSQL> select segment_name, blocks, extents  from user_segments\n\
  where segment_name in ( 'UNIFORM_TEST', 'AUTOALLOCATE_TEST' );\nSEGMENT_NAME   \
  \               BLOCKS    EXTENTS\n------------------------- ---------- ----------\n\
  AUTOALLOCATE_TEST             102936        101\nUNIFORM_TEST                  115200\
  \          9\n```\n\n\n\n由于我们使用的是 8KB 块大小，这显示了大约 100MB 的差异；从比例角度来看，就分配的空间而言，`AUTOALLOCATE_TEST`大约是`UNIFORM_TEST`大小的\
  \ 90%。实际使用空间的结果如下：\n\n```sql\nSQL> set serverout on;\nSQL> exec show_space('UNIFORM_TEST'\
  \ );\nUnformatted Blocks .....................               0\nFS1 Blocks (0-25)\
  \  .....................               0\nFS2 Blocks (25-50) .....................\
  \               0\nFS3 Blocks (50-75) .....................               0\nFS4\
  \ Blocks (75-100).....................               0\nFull Blocks        .....................\
  \         102,442\nTotal Blocks............................         115,200\nTotal\
  \ Bytes.............................     943,718,400\nTotal MBytes............................\
  \             900\nUnused Blocks...........................          12,305\nUnused\
  \ Bytes............................     100,802,560\nLast Used Ext FileId....................\
  \              13\nLast Used Ext BlockId...................         102,528\nLast\
  \ Used Block.........................             495\nSQL> exec show_space('AUTOALLOCATE_TEST'\
  \ );\nUnformatted Blocks .....................               0\nFS1 Blocks (0-25)\
  \  .....................               0\nFS2 Blocks (25-50) .....................\
  \               0\nFS3 Blocks (50-75) .....................               0\nFS4\
  \ Blocks (75-100).....................               3\nFull Blocks        .....................\
  \         102,442\nTotal Blocks............................         102,936\nTotal\
  \ Bytes.............................     843,251,712\nTotal MBytes............................\
  \             804\nUnused Blocks...........................               0\nUnused\
  \ Bytes............................               0\nLast Used Ext FileId....................\
  \              14\nLast Used Ext BlockId...................         102,528\nLast\
  \ Used Block.........................             536\n```\n\n注意\n\n`SHOW_SPACE`过程在本卷开头的“Setting\
  \ Up Your Environment”部分有描述。\n\n请注意，自动分配的表显示使用了 843MB 空间，而统一区段的表使用了 943MB。这完全是由于未发生区段修剪所致。如果我们查看`UNIFORM_TEST`，可以清楚地看到这一点：\n\
  \n```sql\nSQL> select segment_name, extent_id, blocks from user_extents where segment_name\
  \ = 'UNIFORM_TEST';\nSEGMENT_NAME               EXTENT_ID     BLOCKS\n-------------------------\
  \ ---------- ----------\nUNIFORM_TEST                       0      12800\nUNIFORM_TEST\
  \                       1      12800\nUNIFORM_TEST                       2     \
  \ 12800\nUNIFORM_TEST                       3      12800\nUNIFORM_TEST         \
  \              4      12800\nUNIFORM_TEST                       5      12800\nUNIFORM_TEST\
  \                       6      12800\nUNIFORM_TEST                       7     \
  \ 12800\nUNIFORM_TEST                       8      12800\n9 rows selected.\n```\n\
  \n每个区段大小为 100MB。现在，列出分配给`AUTOALLOCATE_TEST`表空间的所有 100 多个区段会浪费纸张，所以我们以聚合方式查看它们：\n\
  \n```sql\nSQL> select segment_name, blocks, count(*)\nfrom user_extents\nwhere segment_name\
  \ = 'AUTOALLOCATE_TEST'\ngroup by segment_name, blocks\norder by blocks;\nSEGMENT_NAME\
  \                  BLOCKS   COUNT(*)\n------------------------- ---------- ----------\n\
  AUTOALLOCATE_TEST                536          1\nAUTOALLOCATE_TEST             \
  \  1024        100\n```\n\n这通常符合使用`AUTOALLOCATE`的本地管理表空间观察到的空间分配方式（先前查询的结果会因数据量和\
  \ Oracle 版本而异）。1024 和 8192 块区段这样的值是正常的；我们总是会观察到它们。其他值则不正常；我们通常不会观察到它们。它们是由于发生的区段修剪造成的。一些并行执行服务器完成了它们的加载任务——它们取走了最后一个\
  \ 64MB（1024 块）区段并进行修剪，导致留下了一些零散空间。另一个并行执行会话在需要空间时，就可以使用这个零散空间。反过来，当这些其他并行执行会话完成它们自己的加载处理时，它们也会修剪它们的最后一个区段，并留下零散的空间。\n\
  \n那么，你应该使用哪种方法？如果你的目标是尽可能频繁地执行并行直接路径加载，我建议将`AUTOALLOCATE`作为你的区段管理策略。像这样的并行直接路径操作不会使用对象高水位线（HWM）下的空间——即空闲列表上的空间。因此，除非你也对这些表进行一些常规路径插入，否则`UNIFORM`分配将永久包含它永远不会使用的额外空闲空间。除非你能够将`UNIFORM`本地管理表空间的区段大小调整得小得多，否则随着时间的推移，你会看到我称之为过度浪费的情况，并且记住，这些空间与段相关联，并将包含在表的完全扫描中。\n\
  \n为了演示这一点，让我们使用相同的输入对现有表进行另一次并行直接路径加载：\n\n```sql\nSQL> alter session enable parallel\
  \ dml;\nSession altered.\nSQL> insert /*+ append */ into UNIFORM_TEST select * from\
  \ big_table_et;\n10000000 rows created.\nSQL> insert /*+ append */ into AUTOALLOCATE_TEST\
  \ select * from big_table_et;\n10000000 rows created.\nSQL> commit;\nCommit complete.\n\
  ```\n\n如果我们在该操作后比较两个表的空间利用率，如下所示，我们可以看到，随着我们使用并行直接路径操作将越来越多的数据加载到表`UNIFORM_TEST`中，空间利用率会随着时间的推移而变差：\n\
  \n```sql\nSQL> exec show_space( 'UNIFORM_TEST' );\nUnformatted Blocks .....................\
  \               0\nFS1 Blocks (0-25)  .....................               0\nFS2\
  \ Blocks (25-50) .....................               0\nFS3 Blocks (50-75) .....................\
  \               0\nFS4 Blocks (75-100).....................          24,610\nFull\
  \ Blocks        .....................         204,884\nTotal Blocks............................\
  \         230,400\nTotal Bytes.............................   1,887,436,800\nTotal\
  \ MBytes............................           1,800\nUnused Blocks...........................\
  \               0\nUnused Bytes............................               0\nLast\
  \ Used Ext FileId....................              13\nLast Used Ext BlockId...................\
  \         217,728\nLast Used Block.........................          12,800\nSQL>\
  \ exec show_space( 'AUTOALLOCATE_TEST' );\nUnformatted Blocks .....................\
  \               0\nFS1 Blocks (0-25)  .....................               0\nFS2\
  \ Blocks (25-50) .....................               0\nFS3 Blocks (50-75) .....................\
  \               0\nFS4 Blocks (75-100).....................               4\nFull\
  \ Blocks        .....................         204,886\nTotal Blocks............................\
  \         205,872\nTotal Bytes.............................   1,686,503,424\nTotal\
  \ MBytes............................           1,608\nUnused Blocks...........................\
  \               0\nUnused Bytes............................               0\nLast\
  \ Used Ext FileId....................              14\nLast Used Ext BlockId...................\
  \         205,568\nLast Used Block.........................             536\n```\n\
  \n\n\n我们希望使用显著更小的统一扩展大小，或使用 `AUTOALLOCATE` 子句。`AUTOALLOCATE` 子句可能会随着时间的推移生成更多的扩展，但由于发生了扩展修剪，空间利用率更优。\n\
  \n> 注意\n> 本章前面提到过，执行前述并行示例时，您的结果可能会有所不同。这一点值得再次强调：您的结果会因 Oracle 版本、使用的并行度以及加载的数据量而异。本节前面的输出是在一个拥有四个\
  \ CPU 的机器上，使用 Oracle 21c 的最新版本以及默认并行度生成的。\n\n## 过程式并行\n\n我想讨论两种类型的過程式并行：\n\n*  \
  \ 并行管道函数，这是 Oracle 的一个特性\n*   自助式 (DIY) 并行，这是将 Oracle 应用于并行全表扫描的相同技术，应用到您自己的应用程序中\n\
  \n通常，您会发现应用程序——通常是批量处理程序——如果设计为串行执行，其形式会类似于下面的过程：\n\n```sql\nCreate procedure process_data\n\
  As\nBegin\nFor x in ( select * from some_table )\nPerform complex process on X\n\
  Update some other table, or insert the record somewhere else\nEnd loop\nend\n```\n\
  \n在这种情况下，Oracle 的并行查询或 PDML（并行 DML）将无济于事（事实上，Oracle 在此处并行执行 SQL 可能只会导致数据库消耗更多资源并花费更长时间）。如果\
  \ Oracle 并行执行简单的 `SELECT * FROM SOME_TABLE`，它不会为这个算法带来任何明显的速度提升。如果 Oracle 在复杂处理后并行执行\
  \ `UPDATE` 或 `INSERT`，也不会产生积极效果（毕竟这是单行的 `UPDATE`/`INSERT`）。\n\n这里有一个显而易见的措施可以采取：在复杂处理后，对\
  \ `UPDATE`/`INSERT` 使用数组处理。然而，这并不能给您带来 50% 或更多的运行时间缩减，而这通常正是您所寻求的。别误会，您肯定希望在此处的修改操作中实现数组处理，但它不会使这个过程运行速度提高两倍、三倍、四倍或更多。\n\
  \n现在，假设这个过程在夜间运行在一台拥有四个 CPU 的机器上，并且是当时唯一的活动。您观察到系统上只有一个 CPU 被部分使用，磁盘系统的使用率也非常低。此外，这个过程需要花费数小时，并且随着更多数据的添加，每天耗时都在增加。您需要显著减少运行时间——它需要运行速度提高四倍或八倍——因此渐进式的百分比提升是不够的。您能做什么？\n\
  \n有两种方法可以采用。一种方法是实现并行管道函数，由 Oracle 决定合适的并行度（假设您选择了这种方式，这是推荐的做法）。Oracle 将创建会话、协调它们并运行它们，非常类似于前面并行\
  \ DDL 或并行 DML 的例子，通过使用 `CREATE TABLE AS SELECT` 或 `INSERT /*+ APPEND */`，Oracle\
  \ 为我们完全自动化了并行直接路径加载。另一种方法是 DIY 并行。我们将在接下来的章节中探讨这两种方法。\n\n### 并行管道函数\n\n我们希望将之前那个非常串行的\
  \ `PROCESS_DATA` 过程交给 Oracle 来并行执行。为了实现这一点，我们需要将这个例程“由内向外”翻转。我们不再从某个表中选择行、处理它们然后插入到另一个表中，而是将获取某些行并处理它们的结果插入到另一个表中。我们将移除该循环底部的\
  \ `INSERT`，并在代码中用 `PIPE ROW` 子句替代。`PIPE ROW` 子句允许我们的 PL/SQL 例程将其输出生成为表数据，因此我们将能够从我们的\
  \ PL/SQL 过程中 `SELECT`。原本用于程序化处理数据的 PL/SQL 例程实际上变成了一个 `table`，而我们获取和处理的行就是输出。在本书中，每次我们执行以下操作时，我们都多次看到过这种情况：\n\
  \n```sql\nSelect * from table(dbms_xplan.display);\n```\n\n这就是一个 PL/SQL 例程，它读取 `PLAN_TABLE`；重构输出，甚至到了添加行的程度；然后使用\
  \ `PIPE ROW` 将此数据发送回客户端。实际上，我们在这里要做同样的事情，但我们将允许它被并行处理。\n\n在此示例中，我们将使用两个表：`T1` 和\
  \ `T2`。`T1` 是我们之前在 `PROCESS_DATA` 过程的 `select * from some_table` 行中读取的表；`T2` 是我们需要将信息移入的表。假设这是我们运行的一种\
  \ ETL 过程，用于获取当天的事务数据并将其转换为明天的报告信息。我们将使用的两个表如下：\n\n```sql\nSQL> create table t1 as\
  \ select object_id id, object_name text from all_objects;\nTable created.\nSQL>\
  \ exec dbms_stats.set_table_stats( user, 'T1', numrows=>10000000,numblks=>100000\
  \ );\nPL/SQL procedure successfully completed.\nSQL> create table t2 as select t1.*,\
  \ 0 session_id from t1 where 1=0;\nTable created.\n```\n\n我们使用 `DBMS_STATS` 来“欺骗”优化器，使其认为输入表中有\
  \ 10,000,000 行，并且占用了 100,000 个数据库块。我们想在这里模拟一个大表。第二个表 `T2` 是第一个表结构的副本，并添加了一个 `SESSION_ID`\
  \ 列。该列对于实际查看发生的并行性将非常有用。\n\n接下来，我们需要为管道函数的返回值设置对象类型。对象类型是我们正在转换的过程的输出的结构定义。在本例中，它看起来与\
  \ `T2` 一模一样：\n\n```sql\nSQL> CREATE OR REPLACE TYPE t2_type\nAS OBJECT (\nid   \
  \      number,\ntext       varchar2(4000),\nsession_id number\n)\n/\nType created.\n\
  SQL> create or replace type t2_tab_type\nas table of t2_type\n/\nType created.\n\
  ```\n\n现在来创建管道函数，它只是原始 `PROCESS_DATA` 过程的重写版本。该过程现在是一个生成行的函数。它接受一个 ref 游标作为输入数据进行处理。该函数返回一个\
  \ `T2_TAB_TYPE`，这是我们刚刚创建的类型。它是一个 `PARALLEL_ENABLED` 的管道函数。我们使用的 partition 子句告诉 Oracle：“请以最合适的方式对数据进行分区或切片。我们不需要对数据的顺序做任何假设。”\n\
  \n您还可以在 ref 游标中的特定列上使用哈希或范围分区。这将涉及使用强类型的 ref 游标，以便编译器知道有哪些列可用。哈希分区将基于所提供列的哈希值，将相等的行发送到每个并行执行服务器进行处理。范围分区将基于分区键，将不重叠的数据范围发送到每个并行执行服务器。例如，如果您在\
  \ `ID` 上进行范围分区，每个并行执行服务器可能会获得范围 1–1000、1001–20000、20001–30000 等（该范围内的 `ID` 值）。\n\
  \n\n\n在此，我们仅需将数据拆分。数据如何拆分与我们的处理无关，因此我们的定义如下：\n\n注意\n\n在尝试创建下一个过程之前，请确保您所使用的用户在连接的插接式数据库中已被授予对\
  \ `sys.v_$mystat` 的选择权限。\n\n```\nSQL> create or replace\nfunction parallel_pipelined(\
  \ l_cursor in sys_refcursor )\nreturn t2_tab_type\npipelined\nparallel_enable (\
  \ partition l_cursor by any )\n```\n\n我们希望能看到哪些行由哪些并行执行服务器处理，因此我们将声明一个局部变量 `L_SESSION_ID`\
  \ 并从 `V$MYSTAT` 初始化它：\n\n```\nis\nl_session_id number;\nl_rec        t1%rowtype;\n\
  begin\nselect sid into l_session_id\nfrom v$mystat\nwhere rownum =1;\n```\n\n现在我们已准备好处理数据。我们只需取出一行（或几行，因为我们当然可以在此使用\
  \ `BULK COLLECT` 来对引用游标进行数组处理），对其进行复杂处理，然后通过管道输出。当引用游标的数据耗尽时，我们关闭游标并返回：\n\n```\n\
  loop\nfetch l_cursor into l_rec;\nexit when l_cursor%notfound;\n-- 在此处进行复杂处理\npipe\
  \ row(t2_type(l_rec.id,l_rec.text,l_session_id));\nend loop;\nclose l_cursor;\n\
  return;\nend;\n/\n函数已创建。\n```\n\n就是这样。我们已准备好并行处理数据，让 Oracle 根据可用资源确定最合适的并行度：\n\n\
  ```\nSQL> alter session enable parallel dml;\n会话已更改。\nSQL> insert /*+ append */\
  \ into t2(id,text,session_id)\nselect * from table(parallel_pipelined\n(CURSOR(select\
  \ /*+ parallel(t1) */ *\nfrom t1 )\n));\n已创建 17914 行。\nSQL> commit;\n提交完成。\n```\n\
  \n为了查看这里发生了什么，我们可以查询新插入的数据，并按 `SESSION_ID` 分组，以查看使用了多少并行执行服务器以及每个服务器处理了多少行：\n\n\
  ```\nSQL> select session_id, count(*)  from t2 group by session_id;\nSESSION_ID\
  \   COUNT(*)\n---------- ----------\n366      14253\n140      16188\n251      15693\n\
  19      20983\n```\n\n显然，我们为此并行操作的 `SELECT` 部分使用了四个并行执行服务器，每个处理了大约 16,000 条记录。您的结果可能因系统上的\
  \ CPU 数量和 Oracle 版本而异。\n\n如您所见，Oracle 并行化了我们的过程，但我们对过程进行了相当彻底的改写。这与原始实现相去甚远。因此，虽然\
  \ Oracle 可以并行处理我们的例程，但我们可能根本没有编写为可并行化的例程。如果对您的过程进行相当大的改写不可行，您可能对下一个实现感兴趣：DIY 并行化。\n\
  \n## 自助并行化\n\n假设我们拥有与前一节相同的流程：串行、简单的过程。我们无法承担对实现进行相当广泛的改写，但我们希望并行执行它。我们能做什么？\n\n\
  Oracle 提供了一种通过内置包 `DBMS_PARALLEL_EXECUTE` 实现并行化的机制。使用它，您可以通过将要处理的数据拆分为多个较小的数据流来并行执行\
  \ SQL 或 PL/SQL 语句。这个包的美妙之处在于它消除了您原本需要执行的许多繁琐工作。\n\n让我们从这样一个前提出发：我们有一个 `SERIAL` 例程，希望针对某个大表并行执行。我们希望以尽可能少的工作来完成；换句话说，尽可能少地修改代码，并负责生成非常少的新代码。这时就用到了\
  \ `DBMS_PARALLEL_EXECUTE`。我们不会涵盖此包的所有可能用途（它在 *Oracle Database PL/SQL Packages and\
  \ Types Reference* 手册中有完整记录），但我们将使用刚好足够的部分来实现我刚刚描述的过程。\n\n假设我们从一个空的表 T2 开始，现在我们将串行过程修改如下：\n\
  \n```\n$ sqlplus eoda/foo@PDB1\nSQL> create or replace\nprocedure serial( p_lo_rid\
  \ in rowid, p_hi_rid in rowid )\nis\nbegin\nfor x in ( select object_id id, object_name\
  \ text\nfrom big_table\nwhere rowid between p_lo_rid\nand p_hi_rid )\nloop\n-- 在此处进行复杂处理\n\
  insert into t2 (id, text, session_id )\nvalues ( x.id, x.text, sys_context( 'userenv',\
  \ 'sessionid' ) );\nend loop;\nend;\n/\n过程已创建。\n```\n\n就是这样：只需添加 `ROWID` 输入和谓词。修改后的代码几乎没有变化。我使用\
  \ `SYS_CONTEXT` 来获取 `SESSIONID`，以便我们可以监控每个线程、每个并行会话完成了多少工作。\n\n现在，要启动该过程，我们首先需要将表拆分为小块。我们可以通过某种数值范围（对于使用\
  \ `SEQUENCE` 填充其主键的表很有用）、任何您想编写的任意 SQL 或 `ROWID` 范围来实现。我们将使用 `ROWID` 范围。我发现它是最有效的，因为它创建了表的非重叠范围（无争用），并且不需要查询表来决定范围；它只使用数据字典。因此，我们将进行以下\
  \ API 调用：\n\n```\nSQL> begin\ndbms_parallel_execute.create_task('PROCESS BIG TABLE');\n\
  dbms_parallel_execute.create_chunks_by_rowid\n( task_name   => 'PROCESS BIG TABLE',\n\
  table_owner => user,\ntable_name  => 'BIG_TABLE',\nby_row      => false,\nchunk_size\
  \  => 10000 );\nend;\n/\nPL/SQL 过程已成功完成。\n```\n\n我们首先创建一个命名任务：本例中为 `'PROCESS BIG\
  \ TABLE'`。这只是我们用于引用大型过程的唯一名称。其次，我们调用了 `CREATE_CHUNKS_BY_ROWID` 过程。这个过程完全按照其名称的含义执行：它按\
  \ `ROWID` 范围“分块”表，方式与我们刚刚所做的类似。我们告诉该过程读取当前登录用户的名为 `BIG_TABLE` 的表的信息，并将其拆分为不超过约 10,000\
  \ 个块（`CHUNK_SIZE`）的块。参数 `BY_ROW` 设置为 false，在此情况下意味着 `CHUNK_SIZE` 不是要创建 `ROWID` 范围的行数，而是要创建范围的块数。\n\
  \n在此代码块执行后，我们可以通过查询 `DBA_PARALLEL_EXECUTE_CHUNKS` 立即查看块数以及有关每个块的信息：\n\n\n\n```\n\
  SQL> select *  from (\nselect chunk_id, status, start_rowid, end_rowid\nfrom dba_parallel_execute_chunks\n\
  where task_name = 'PROCESS BIG TABLE'\norder by chunk_id\n)\nwhere rownum <= 5;\n\
  CHUNK_ID STATUS               START_ROWID        END_ROWID\n---------- --------------------\
  \ ------------------ ------------------\n1 UNASSIGNED           AAAR1MAAMAAAACAAAA\
  \ AAAR1MAAMAAACePH//\n2 UNASSIGNED           AAAR1MAAMAAACeQAAA AAAR1MAAMAAAE6fH//\n\
  3 UNASSIGNED           AAAR1MAAMAAAE6gAAA AAAR1MAAMAAAHWvH//\n4 UNASSIGNED     \
  \      AAAR1MAAMAAAHWwAAA AAAR1MAAMAAAJy/H//\n5 UNASSIGNED           AAAR1MAAMAAAJzAAAA\
  \ AAAR1MAAMAAAMPPH//\n```\n\n此示例中的查询显示了视图的前五行；在我的案例中，针对相关表总共有 18 行，每一行代表一个待处理的、不重叠的表数据块。这并不意味着我们将以“18\
  \ 路并行”来处理该表，只是说明我们总共有 118 个块需要处理。现在，我们已准备好通过此 API 调用来运行我们的任务：\n\n```\nSQL> begin\n\
  dbms_parallel_execute.run_task\n( task_name      => 'PROCESS BIG TABLE',\nsql_stmt\
  \       => 'begin serial( :start_id, :end_id ); end;',\nlanguage_flag  => DBMS_SQL.NATIVE,\n\
  parallel_level => 4 );\nend;\n/\nPL/SQL procedure successfully completed.\n```\n\
  \n在这里，我们要求运行任务 `'PROCESS BIG TABLE'`——该任务指向我们的数据块。我们想要执行的 SQL 语句是 `'begin serial(\
  \ :start_id, :end_id ); end;'`——这是一个对存储过程的简单调用，传入了要处理的 `ROWID` 范围。我决定使用的 `PARALLEL_LEVEL`\
  \ 是四，这意味着将有四个并行线程/进程来执行此操作。尽管有 218 个块，但我们一次只处理四个。在内部，此包使用 `DBMS_SCHEDULER` 包来并行运行这些线程。\n\
  \n一旦我们的任务开始运行，它将创建四个作业；每个作业被告知处理由键值 `'PROCESS BIG TABLE'` 标识的数据块，并对每个块运行存储过程 `SERIAL`。因此，这四个会话启动，每个会话从\
  \ `DBA_PARALLEL_EXECUTE_CHUNKS` 视图中读取一个块，处理它，并更新 `STATUS` 列。如果块处理成功，该行将被标记为 `PROCESSED`；如果因任何原因失败，或者给定块无法处理，则将被标记为\
  \ `PROCESSED_WITH_ERROR`，其他列将包含指示错误原因的详细错误消息。无论哪种情况，该会话随后都会检索另一个块并进行处理，依此类推。最终，这四个作业将处理完所有块，任务即告完成。\n\
  \n如果有任何块失败，你可以纠正错误的根本原因并恢复任务。这将导致它重新处理失败的块。当所有块都成功处理完毕时，你就完成了。\n\n```\nSQL> select\
  \ *  from (\nselect chunk_id, status, start_rowid, end_rowid\nfrom dba_parallel_execute_chunks\n\
  where task_name = 'PROCESS BIG TABLE'\norder by chunk_id\n)\nwhere rownum <= 5;\n\
  CHUNK_ID STATUS               START_ROWID        END_ROWID\n---------- --------------------\
  \ ------------------ ------------------\n1 PROCESSED            AAAR1MAAMAAAACAAAA\
  \ AAAR1MAAMAAACePH//\n2 PROCESSED            AAAR1MAAMAAACeQAAA AAAR1MAAMAAAE6fH//\n\
  3 PROCESSED            AAAR1MAAMAAAE6gAAA AAAR1MAAMAAAHWvH//\n4 PROCESSED      \
  \      AAAR1MAAMAAAHWwAAA AAAR1MAAMAAAJy/H//\n5 PROCESSED            AAAR1MAAMAAAJzAAAA\
  \ AAAR1MAAMAAAMPPH//\n```\n\n你可以保留任务以供历史记录，也可以将其删除。以下示例展示了如何删除任务：\n\n```\nSQL> begin\n\
  dbms_parallel_execute.drop_task('PROCESS BIG TABLE' );\nend;\n/\nPL/SQL procedure\
  \ successfully completed.\n```\n\n如果我们查看自己的应用表，可以看到该作业是以 4 路并行完成的，并且四个会话各自处理的行数大致相同：\n\
  \n```\nSQL> select session_id, count(*) from t2  group by session_id order by session_id;\n\
  SESSION_ID   COUNT(*)\n---------- ----------\n22603    2521812\n22604    2485273\n\
  22605    2529386\n22606    2463529\n4 rows selected.\n```\n\n`DBMS_PARALLEL_EXECUTE`\
  \ 包提供了一个丰富的 API（我们在此只是浅尝辄止）。如果你需要并行处理，那么你应该熟悉这个包。\n\n### 老派的自力更生式并行处理\n\n你也可以手动实现并行。我的方法通常是使用行\
  \ ID 范围将表划分为一定数量的、不重叠（但完全覆盖表）的范围。\n\n**注意**\n\n有关使用 `DBMS_PARALLEL_EXECUTE` 包的示例，请参见前一节。如果它对你可用，你真的应该使用该包，而不是此处描述的手动方法。\n\
  \n这种手动密集型方法与 Oracle 执行并行查询的概念非常相似。如果你考虑一次全表扫描，Oracle 是通过某种方法将表分解为多个小表来处理的，每个小表由一个并行执行服务器处理。我们将使用行\
  \ ID 范围做同样的事情。\n\n我们再次使用一个包含 1,000,000 行的 `BIG_TABLE`，因为我所描述的技术在具有大量区（extent）的大表上效果最佳，而我用于创建行\
  \ ID 范围的方法依赖于区边界。使用的区越多，数据分布就越好。因此，在创建了包含 1,000,000 行的 `BIG_TABLE` 之后，我们将像这样创建 `T2`：\n\
  \n```\n$ sqlplus eoda/foo@PDB1\nSQL> drop table t2;\nTable dropped.\nSQL> create\
  \ table t2 as\nselect object_id id, object_name text, 0 session_id\nfrom big_table\n\
  where 1=0;\nTable created.\n```\n\n我们将使用数据库内置的作业队列来并行处理我们的过程。我们将调度一定数量的作业。每个作业都是我们的过程，稍作修改以仅处理给定行\
  \ ID 范围内的行。为了有效支持作业队列，我们将使用一个参数表来向作业传递输入：\n\n```\nSQL> create table job_parms\n\
  ( job        number primary key,\nlo_rid  rowid,\nhi_rid  rowid\n);\nTable created.\n\
  ```\n\n这将允许我们只将作业 ID 传递给我们的 `SERIAL` 过程，以便它可以查询此表以获取要处理的行 ID 范围。现在，这是添加了新代码的过程：\n\
  \n```\nSQL> create or replace\nprocedure serial( p_job in number )\nis\nl_rec  \
  \      job_parms%rowtype;\nbegin\nselect * into l_rec\nfrom job_parms\nwhere job\
  \ = p_job;\nfor x in ( select object_id id, object_name text\nfrom big_table\nwhere\
  \ rowid between l_rec.lo_rid\nand l_rec.hi_rid )\nloop\n-- 此处为复杂处理过程\ninsert into\
  \ t2 (id, text, session_id )\nvalues ( x.id, x.text, p_job );\nend loop;\ndelete\
  \ from job_parms where job = p_job;\ncommit;\nend;\n/\nProcedure created.\n```\n\
  \n如你所见，这不是一个重大的改动。大部分添加的代码只是为了获取我们的输入和要处理的行 ID 范围。对我们 `逻辑` 的唯一更改是第 12 行和第 13 行谓词的变化。\n\
  \n现在让我们调度我们的作业。我们将使用一个相当复杂的查询，利用分析函数来划分表。第 19 行到第 26 行的最内层查询在此案例中将数据分成八组。第 22 行的第一个求和计算的是块的累计总和；第\
  \ 23 行的第二个求和是块的总数。如果我们将累计总和整除以所需的块大小（在此案例中是总大小除以 8），就可以创建覆盖大致相同数据量的文件/块组。第 8 行到第\
  \ 28 行的查询按 `GRP` 查找最高和最低的文件号及块数，并返回不同的条目。它构建了输入，然后我们可以将其发送给 `DBMS_ROWID` 以创建 Oracle\
  \ 所需的行 ID。我们获取该输出，并使用 `DBMS_JOB` 提交一个作业来处理该行 ID 范围：\n\n\n# 使用行 ID 和主键范围实现并行处理\n\n\
  ```sql\nSQL> declare\nl_job number;\nbegin\nfor x in (\nselect dbms_rowid.rowid_create\n\
  ( 1, data_object_id, lo_fno, lo_block, 0 ) min_rid,\ndbms_rowid.rowid_create\n(\
  \ 1, data_object_id, hi_fno, hi_block, 10000 ) max_rid\nfrom (\nselect distinct\
  \ grp,\nfirst_value(relative_fno)\nover (partition by grp order by relative_fno,\
  \ block_id\nrows between unbounded preceding and unbounded following) lo_fno,\n\
  first_value(block_id    )\nover (partition by grp order by relative_fno, block_id\n\
  rows between unbounded preceding and unbounded following) lo_block,\nlast_value(relative_fno)\n\
  over (partition by grp order by relative_fno, block_id\nrows between unbounded preceding\
  \ and unbounded following) hi_fno,\nlast_value(block_id+blocks-1)\nover (partition\
  \ by grp order by relative_fno, block_id\nrows between unbounded preceding and unbounded\
  \ following) hi_block,\nsum(blocks) over (partition by grp) sum_blocks\nfrom (\n\
  select relative_fno,\nblock_id,\nblocks,\ntrunc( (sum(blocks) over (order by relative_fno,\
  \ block_id)-0.01) /\n(sum(blocks) over ()/8) ) grp\nfrom dba_extents\nwhere segment_name\
  \ = upper('BIG_TABLE')\nand owner = user order by block_id\n)\n),\n(select data_object_id\n\
  from user_objects where object_name = upper('BIG_TABLE') )\n)\nloop\ndbms_job.submit(\
  \ l_job, 'serial(JOB);' );\ninsert into job_parms(job, lo_rid, hi_rid)\nvalues (\
  \ l_job, x.min_rid, x.max_rid );\nend loop;\nend;\n/\nPL/SQL 过程已成功完成。\n```\n\n这个\
  \ PL/SQL 块最多为我们调度了八个作业（如果表由于范围不足或大小无法分成八块，则会更少）。我们可以查看调度了多少作业以及它们的输入参数，如下所示：\n\n\
  ```sql\nSQL> select * from job_parms;\nJOB LO_RID             HI_RID\n----------\
  \ ------------------ ------------------\n1 AAAEzwAAEAAABKAAAA AAAEzwAAEAAABl/CcQ\n\
  2 AAAEzwAAEAAACyAAAA AAAEzwAAEAAADR/CcQ\n3 AAAEzwAAEAAAAuAAAA AAAEzwAAEAAABJ/CcQ\n\
  4 AAAEzwAAEAAACCAAAA AAAEzwAAEAAACR/CcQ\n5 AAAEzwAAEAAADSAAAA AAAEzwAAEAABGUnCcQ\n\
  6 AAAEzwAAEAAAAQoAAA AAAEzwAAEAAAAt/CcQ\n7 AAAEzwAAEAAABmAAAA AAAEzwAAEAAACB/CcQ\n\
  8 AAAEzwAAEAAACSAAAA AAAEzwAAEAAACx/CcQ\n8 行已选择。\nSQL> commit;\n提交完成。\n```\n\n这次提交释放了我们的作业以进行处理。我们在参数文件中将\
  \ `JOB_QUEUE_PROCESSES` 设置为 1000，因此所有八个作业都开始运行并很快完成。它们全部完成后，结果如下：\n\n```sql\nSQL>\
  \ select session_id, count(*)  from t2  group by session_id;\nSESSION_ID   COUNT(*)\n\
  ---------- ----------\n1     127651\n6     124431\n2     147606\n5     124590\n\
  4      72961\n8     147544\n3     127621\n7     127596\n8 行已选择。\n```\n\n然而，假设你不想使用行\
  \ ID 处理——也许查询不像 `SELECT * FROM T` 那么简单，并且涉及连接和其他使得使用行 ID 不切实际的结构。你可以改用某个表的主键。例如，假设你想将同一个\
  \ `BIG_TABLE` 分成十个部分，通过主键并发处理。你可以使用内置分析函数 `NTILE` 轻松完成此操作。过程相当直接：\n\n```sql\nSQL>\
  \ select nt, min(id), max(id), count(*)  from (\nselect id, ntile(10) over (order\
  \ by id) nt\nfrom big_table)\ngroup by nt;\nNT    MIN(ID)    MAX(ID)   COUNT(*)\n\
  ---------- ---------- ---------- ----------\n1          1     100000     100000\n\
  6     500001     600000     100000\n2     100001     200000     100000\n5     400001\
  \     500000     100000\n4     300001     400000     100000\n8     700001     800000\
  \     100000\n3     200001     300000     100000\n7     600001     700000     100000\n\
  9     800001     900000     100000\n10     900001    1000000     100000\n10 行已选择。\n\
  ```\n\n现在你有了十个不重叠的主键范围（大小都相等），你可以使用与前面相同的 `DBMS_JOB` 技术来并行化你的处理过程。\n\n## 总结\n\n\
  在本章中，我们探讨了 Oracle 中并行执行的概念。我首先通过一个类比来帮助理解并行执行适用的场景和时机——即当你有长时间运行的语句或过程，并且有充足的可用资源时。\n\
  \n接着我们了解了 Oracle 如何实现并行。我们从并行查询开始，介绍了 Oracle 如何将大型串行操作（例如全表扫描）分解为可以并发运行的更小的部分。然后我们讨论了并行\
  \ DML（PDML），并介绍了它附带的一系列相当广泛的限制。\n\n接着我们探讨了并行操作的甜点：并行 DDL。并行 DDL 是 DBA 和开发人员快速执行那些通常在资源可用的非高峰时段进行的大型维护操作的工具。接下来我们研究了过程并行化，并看到了两种并行化过程的技术：一种是\
  \ Oracle 自动完成，另一种是我们自己手动完成。\n\n如果我们从头设计一个过程，我们很可能会考虑设计它以允许 Oracle 自动并行化，因为未来资源的增加或减少可以轻松地改变并行度。然而，如果现有代码需要快速修改为并行，我们可能会选择自行实现并行化，我们通过检查手动和自动两种技术来介绍。两者都使用行\
  \ ID 范围或主键范围，这两种方法都使用 `DBMS_JOB` 或 `DBMS_SCHEDULER` 在后台为我们并行执行任务。\n\n# 15. 数据加载与卸载\n\
  \n在本章中，我们将讨论数据加载和卸载——换句话说，如何将数据*导入*和*导出* Oracle 数据库。本章的主要重点是以下批量数据加载工具：\n\n*   **外部表**：此功能允许将操作系统文件当作数据库表进行访问，甚至允许将表提取为操作系统文件。\n\
  \n*   ***SQL*Loader（发音为“sequel loader”，以下简称 SQLLDR）**：这是 Oracle 历史上的数据加载器，目前仍是常用的数据加载方法。\n\
  \n在数据卸载方面，我们将介绍以下技术：\n\n*   ***数据泵卸载***：数据泵是 Oracle 专有的二进制格式，可通过数据泵工具和外部表访问。\n\n\
  *   ***平面文件卸载***：平面文件卸载将使用 SQL*Plus 和 PL/SQL。这些将为你提供一个输出文件（例如 CSV 文件），该文件可移植到其他类型的系统，如电子表格。\n\
  \n## 外部表\n\n外部表允许我们将操作系统文件视为一个只读的数据库表。它们并非旨在替代“真实”的表，或用作真实表的替代品；相反，它们旨在作为一种工具，用于简化数据的加载与卸载。\n\
  \n当外部表功能首次亮相时，我常称其为“SQLLDR 的替代品”。这个观点在大多数情况下仍然成立。说到这，你可能会疑惑为什么本章还有涉及 SQLLDR 的内容。原因在于\
  \ SQLLDR 已存在很长时间，并且周围留存着大量、大量的旧控制文件。SQLLDR 仍然是一种常用工具；它是许多人了解并使用过的东西。我们目前正处于从使用 SQLLDR\
  \ 向使用外部表过渡的时期；因此，SQLLDR 仍然具有其现实意义。\n\n许多 DBA 没有意识到的是，他们对 SQLLDR 控制文件的知识可以很容易地转化到外部表的使用上。随着我们学习本章此部分的示例，你会发现外部表融合了\
  \ SQLLDR 的许多语法和技巧。\n\n话虽如此，在以下情况下应选择 SQLLDR 而非外部表：\n*   你必须通过网络加载数据——换句话说，当输入文件不在数据库服务器本身上时。外部表的一个限制是输入文件必须在数据库服务器上可访问。\n\
  *   多个用户必须并发处理不同的输入文件来操作同一个外部表。\n\n考虑到这些例外情况，总的来说，我强烈建议使用外部表，因为它们的功能更强大。SQLLDR 是一个相当简单的工具，它生成`INSERT`语句并加载数据。它使用\
  \ SQL 的能力仅限于逐行调用 SQL 函数。外部表则为数据加载开放了整套 SQL 功能。根据我的经验，外部表相对于 SQLLDR 的一些关键功能特性如下：\n\
  *   能够使用复杂的`WHERE`条件来有选择地加载数据。SQLLDR 有一个`WHEN`子句来选择要加载的行，但你仅限于使用`AND`表达式和使用等号的表达式——不能使用范围（大于、小于）、`OR`表达式、`IS\
  \ NULL`等。\n*   能够`MERGE`数据。你可以获取一个充满数据的操作系统文件，并用它来更新现有的数据库记录。\n*   能够执行高效的代码查找。你可以将外部表与其他数据库表连接，作为加载过程的一部分。\n\
  *   能够通过在`CREATE TABLE`或`INSERT`语句中包含`ORDER BY`语句来加载已排序的数据。\n*   使用`INSERT`进行更简单的多表插入。一个`INSERT`语句可以使用复杂的`WHEN`条件插入到一个或多个表中。虽然\
  \ SQLLDR 可以加载到多个表中，但其语法的构建可能相当复杂。\n*   能够指定一个或多个操作系统命令，作为从外部表中选择数据时的第一步（预处理）执行。\n\
  *   新开发人员的学习曲线更平缓。除了编程语言、开发工具、SQL 语言等之外，SQLLDR 是又一个需要学习的工具。只要开发人员懂 SQL，他们就可以立即将该知识应用于批量数据加载，而无需学习一个新工具（SQLLDR）。\n\
  \n那么，考虑到这一点，让我们来看看如何使用外部表。\n\n### 外部表简介\n\n要创建一个外部表，你需要执行三个任务：\n1.  创建一个目录对象。\n\
  2.  将一个格式化的操作系统文件（例如 CSV 文件）放置在第 1 步中定义的目录对象所指向的位置。\n3.  执行带有`ORGANIZATION EXTERNAL`子句的`CREATE\
  \ TABLE`语句。\n\n第一个任务是创建一个目录对象。以下示例创建了一个指向`/tmp`目录的目录对象：\n```\n$ sqlplus eoda/foo@PDB1\n\
  SQL> create or replace directory ext_tab_dir as '/tmp';\n```\n\n接下来，我将把一个 CSV 文件放到操作系统的`/tmp`目录中。该\
  \ CSV 文件名为`dept_ext.csv`，包含以下数据：\n```\n10,ACCOUNTING,NEW YORK\n20,RESEARCH,DALLAS\n\
  30,SALES,CHICAGO\n40,OPERATIONS,BOSTON\n```\n\n现在，我将创建一个引用该目录对象和文本文件的外部表。通过`DEFAULT\
  \ DIRECTORY`子句引用目录对象，并在`LOCATION`中引用 CSV 文件名。例如：\n```\nSQL> CREATE TABLE dept_ext\n\
  (DEPTNO     number(2),\nDNAME  varchar2(14),\nLOC      varchar2(13))\nORGANIZATION\
  \ EXTERNAL\n(default directory ext_tab_dir\nlocation ('dept_ext.csv'));\nTable created.\n\
  ```\n\n外部表创建后，你可以直接在 SQL*Plus 中查询它，如下所示：\n```\nSQL> select * from dept_ext;\nDEPTNO\
  \ DNAME          LOC\n---------- -------------- -------------\n10 ACCOUNTING   \
  \  NEW YORK\n20 RESEARCH       DALLAS\n30 SALES          CHICAGO\n40 OPERATIONS\
  \     BOSTON\n```\n\n通过这种方式，你可以像查询数据库中的表对象一样轻松地查询文本文件中的数据。\n\n前面的例子很简单，但如果你在加载时需要转换数据怎么办？例如，CSV\
  \ 文件包含一个字符字段，其数据格式为`mm/dd/yyyy`，而你需要将其加载到数据库的`DATE`数据类型中？另外，如果你需要使用不同的列分隔符字符怎么办？对于下一个例子，CSV\
  \ 文件中的数据如下所示：\n```\n10|ACCOUNTING|NEW YORK|12/04/1962\n20|RESEARCH|DALLAS|08/10/1966\n\
  30|SALES|CHICAGO|09/04/1996\n40|OPERATIONS|BOSTON|06/15/1992\n```\n\n如下修改外部表定义，我们就可以加载上述数据（运行此命令前请先删除之前创建的表）：\n\
  ```\nSQL> CREATE TABLE dept_ext\n(DEPTNO     number(2),\nDNAME  varchar2(14),\n\
  LOC      varchar2(13),\nCRE_DATE date)\nORGANIZATION EXTERNAL\n(\ntype ORACLE_LOADER\n\
  default directory ext_tab_dir\naccess parameters\n(\nrecords delimited by newline\n\
  fields terminated by '|'\n(DEPTNO,\nDNAME,\nLOC,\nCRE_DATE char date_format date\
  \ mask \"mm/dd/yyyy\")\n)\nlocation ('dept_ext.csv')\n);\nTable created.\n```\n\n\
  以下是新创建的外部表的内容：\n```\nSQL> select * from dept_ext;\nDEPTNO DNAME          LOC   \
  \        CRE_DATE\n---------- -------------- ------------- ---------\n10 ACCOUNTING\
  \     NEW YORK      04-DEC-62\n20 RESEARCH       DALLAS        10-AUG-66\n30 SALES\
  \          CHICAGO       04-SEP-96\n40 OPERATIONS     BOSTON        15-JUN-92\n\
  ```\n\n通过这种方式，你可以在外部表中格式化并转换字符数据为`DATE`数据类型。\n\n### 使用传统 SQLLDR 控制文件创建外部表\n\n本节详细介绍如何将传统的\
  \ SQLLDR 控制文件转换为创建外部表的语句。如果你需要从使用 SQLLDR 迁移到外部表，此技术将非常合适。作为第一个简单演示，以下 SQLLDR 控制文件文本被放置于名为\
  \ `demo1.ctl` 的文件中：\n\n```sql\nLOAD DATA\nINFILE *\nINTO TABLE DEPT\nFIELDS TERMINATED\
  \ BY ','\n(DEPTNO, DNAME, LOC)\nBEGINDATA\n10,Sales,Virginia\n20,Accounting,Virginia\n\
  30,Consulting,Virginia\n40,Finance,Virginia\n```\n\n接下来，确保 `DEPT` 表存在：\n\n```bash\n\
  $ sqlplus eoda/foo@PDB1\nSQL> create table dept as select * from scott.dept;\nTable\
  \ created.\n```\n\n现在，以下 SQLLDR 命令将为我们生成外部表的 `CREATE TABLE` 语句：\n\n```bash\n$ sqlldr\
  \ eoda/foo@PDB1 demo1.ctl external_table=generate_only\n```\n\n`EXTERNAL_TABLE`\
  \ 参数有以下三个可选值：\n\n*   `NOT_USED`：顾名思义，这是默认值。\n*   `EXECUTE`：此值意味着 SQLLDR 不会生成 SQL\
  \ `INSERT` 语句并执行它，而是会创建一个外部表，并使用单个批量 SQL 语句来加载数据。\n*   `GENERATE_ONLY`：此值导致 SQLLDR\
  \ 实际上不加载任何数据，而仅将其将要执行的 SQL DDL 和 DML 语句生成到它创建的日志文件中。\n\n当使用 `GENERATE_ONLY` 时，我们可以在\
  \ `demo1.log` 文件中看到以下内容：\n\n```sql\nCREATE DIRECTORY statements needed for files\n\
  \nCREATE DIRECTORY SYS_SQLLDR_XT_TMPDIR_00000 AS '/home/oracle'\n```\n\n我们可能会，也可能不会在日志文件中看到\
  \ `CREATE DIRECTORY` 语句。SQLLDR 在生成外部表脚本期间连接到数据库，并查询数据字典以查看是否已存在合适的目录。在本例中，由于没有现成的合适目录，SQLLDR\
  \ 为我们生成了 `CREATE DIRECTORY` 语句。接下来，它为我们的外部表生成了 `CREATE TABLE` 语句：\n\n```sql\nCREATE\
  \ TABLE statement for external table:\n\nCREATE TABLE \"SYS_SQLLDR_X_EXT_DEPT\"\n\
  (\n\"DEPTNO\" NUMBER(2),\n\"DNAME\" VARCHAR2(14),\n\"LOC\" VARCHAR2(13)\n)\n```\n\
  \nSQLLDR 登录了数据库；因此它知道在此外部表定义中使用的确切数据类型（例如，`DEPTNO` 是一个 `NUMBER(2)`）。它是直接从数据字典中获取的。接下来，我们看到外部表定义的开始部分：\n\
  \n```sql\nORGANIZATION external\n(\nTYPE oracle_loader\nDEFAULT DIRECTORY SYS_SQLLDR_XT_TMPDIR_00000\n\
  ```\n\n`ORGANIZATION EXTERNAL` 子句告诉 Oracle 这不是一个“普通”表。我们在第 10 章讨论 IOT 时见过这个子句。目前，有三种组织类型：`HEAP`\
  \ 表示普通表，`INDEX` 表示 IOT，`EXTERNAL` 表示外部表。接下来的文本开始告诉 Oracle 更多关于此外部表的信息。`ORACLE_LOADER`\
  \ 类型是两种受支持类型之一。另一种类型是 `ORACLE_DATAPUMP`，即专有的 Data Pump 格式。我们将在后续关于数据卸载的部分中了解该类型——它是一种既可用于加载数据也可用于卸载数据的格式。外部表既可用于创建\
  \ Data Pump 格式文件，也可随后读取该文件。\n\n我们遇到的下一部分是外部表的 `ACCESS PARAMETERS` 部分。在这里，我们向数据库描述如何处理输入文件。看这部分时，你应该会注意到它与\
  \ SQLLDR 控制文件的相似性；这并非巧合。在很大程度上，SQLLDR 和外部表使用非常相似的语法：\n\n```sql\nACCESS PARAMETERS\n\
  (\nRECORDS DELIMITED BY NEWLINE CHARACTERSET US7ASCII\nBADFILE 'SYS_SQLLDR_XT_TMPDIR_00000':'demo1.bad'\n\
  LOGFILE 'demo1.log_xt'\nREADSIZE 1048576\nSKIP 6\nFIELDS TERMINATED BY \",\" LDRTRIM\n\
  REJECT ROWS WITH ALL NULL FIELDS\n(\n\"DEPTNO\" CHAR(255)\nTERMINATED BY \",\",\n\
  \"DNAME\" CHAR(255)\nTERMINATED BY \",\",\n\"LOC\" CHAR(255)\nTERMINATED BY \",\"\
  \n)\n)\n```\n\n这些访问参数展示了如何设置外部表，使其处理文件的方式与 SQLLDR 几乎完全相同：\n\n*   `RECORDS`：默认情况下，记录由换行符终止，与\
  \ SQLLDR 相同。\n*   `BADFILE`：在我们刚创建的目录中设置了一个坏文件（用于记录处理失败的记录的文件）。\n*   `LOGFILE`：在当前工作目录中设置了一个等同于\
  \ SQLLDR 日志文件的日志文件。\n*   `READSIZE`：这是 Oracle 用于读取输入数据文件的默认缓冲区。本例中为 1MB。在专用服务器模式下，此内存来自\
  \ PGA；在共享服务器模式下，来自 SGA。它用于为会话缓冲输入数据文件中的信息（请参阅第 4 章，我们讨论了 PGA 和 SGA 内存）。如果你正在使用共享服务器，请记住这个事实：内存是从\
  \ SGA 分配的。\n*   `SKIP 6`：这决定了输入文件中应该跳过多少条记录。你可能会问，“为什么是 ‘skip 6’？” 好吧，我们在本例中使用了\
  \ `INFILE *`；`SKIP 6` 用于跳过控制文件本身以获取嵌入的数据。如果我们没有使用 `INFILE *`，则根本不会有 `SKIP` 子句。\n\
  *   `FIELDS TERMINATED BY`：这与我们在控制文件中使用的完全相同。但是，外部表添加了 `LDRTRIM`，它代表 *LoaDeR TRIM*。这是一种修剪模式，模拟了\
  \ SQLLDR 默认修剪数据的方式。其他选项包括 `LRTRIM`、`LTRIM` 和 `RTRIM`（用于左/右修剪空白）以及 `NOTRIM` 以保留所有前导/尾随空白。\n\
  *   `REJECT ROWS WITH ALL NULL FIELDS`：这会导致外部表将任何完全空白的行记录到坏文件中，并且不加载该行。\n*   *列定义本身*：这是关于预期输入数据值的元数据。它们在要加载的数据文件中都是字符串，长度最多可达\
  \ 255 个字符（SQLLDR 的默认大小），由逗号分隔，并可选择用引号括起来。\n\n> **注意**\n>\n> 有关使用外部表时所有可用选项的完整列表，请查阅\
  \ *Oracle Utilities Guide*。该参考资料包含一个专门介绍外部表的章节。*Oracle SQL Language Reference Guide*\
  \ 提供了基本语法，但不包含 `ACCESS PARAMETERS` 部分的详细信息。\n\n最后，我们来到外部表定义的 `LOCATION` 部分：\n\n\
  ```sql\nlocation\n(\n'demo1.ctl'\n)\n) REJECT LIMIT UNLIMITED\n```\n\n这告诉 Oracle\
  \ 要加载的文件的名称，本例中是 `demo1.ctl`，因为我们在原始控制文件中使用了 `INFILE *`。控制文件中的下一条语句是默认的 `INSERT`，可用于从外部表本身加载内部表：\n\
  \n```sql\nINSERT statements used to load internal tables:\n\nINSERT /*+ append */\
  \ INTO DEPT\n(\nDEPTNO,\nDNAME,\nLOC\n)\nSELECT\n\"DEPTNO\",\n\"DNAME\",\n\"LOC\"\
  \nFROM \"SYS_SQLLDR_X_EXT_DEPT\"\n```\n\n如果可能的话，这将执行与直接路径加载逻辑等效的操作（假设 `APPEND` 提示可能被遵循；触发器或外键约束的存在可能会阻止直接路径操作的发生）。\n\
  \n最后，在日志文件中，我们将看到可用于在加载完成后删除 SQLLDR 让我们创建的对象的语句：\n\n```sql\nstatements to cleanup\
  \ objects created by previous statements:\n\nDROP TABLE \"SYS_SQLLDR_X_EXT_DEPT\"\
  \nDROP DIRECTORY SYS_SQLLDR_XT_TMPDIR_00000\n```\n\n就是这样。如果我们获取该日志文件，并在适当的位置插入 `/`\
  \ 使其成为一个有效的 SQL*Plus 脚本，那么我们应该就可以执行了——或者根据权限情况也可能无法执行。例如，假设我登录的模式具有 `CREATE ANY\
  \ DIRECTORY` 特权，或对现有目录具有 `READ` 和 `WRITE` 访问权限，我可能会观察到以下情况：\n\n\n```\nSQL> INSERT\
  \ /*+ append */ INTO DEPT\n(\nDEPTNO,\nDNAME,\nLOC\n)\nSELECT\n\"DEPTNO\",\n\"DNAME\"\
  ,\n\"LOC\"\nFROM \"SYS_SQLLDR_X_EXT_DEPT\"\n/\nINSERT /*+ append */ INTO DEPT\n\
  *\nERROR at line 1:\nORA-29913: error in executing ODCIEXTTABLEOPEN callout\nORA-29400:\
  \ data cartridge error\nKUP-04063: unable to open log file demo1.log_xt\nOS error\
  \ Permission denied\nORA-06512: at \"SYS.ORACLE_LOADER\", line 19\nORA-06512: at\
  \ line 1\n```\n\n嗯，这乍一看似乎不对劲。我以 `TKYTE` 身份登录操作系统，登录的目录是 `/home/tkyte`，而且我拥有该目录，因此我肯定能写入它（毕竟我之前还在那里创建了\
  \ SQLLDR 日志文件）。发生了什么？事实是，外部表代码是在我的专用或共享服务器中的 Oracle 服务器软件中运行的。尝试读取输入数据文件的进程是 Oracle\
  \ 软件所有者，而不是我的账户。尝试创建日志文件的进程也是 Oracle 软件所有者，而不是我的账户。显然，Oracle 没有获得写入我的目录所需的权限，因此对外部表的访问尝试失败了。\n\
  \n这是一个重要的问题。要读取一个表，数据库运行所使用的账户（即 Oracle 软件所有者）必须能够：\n\n*   `读取` 我们指向的文件。在 UNIX/Linux\
  \ 中，这意味着 Oracle 软件所有者必须对所有通向该文件的目录路径拥有读取和执行权限。在 Windows 中，Oracle 软件所有者必须能够读取该文件。\n\
  \n*   `写入` 日志文件将被写入到的目录（或者完全绕过日志文件的生成，但这通常不推荐）。实际上，如果日志文件已经存在，Oracle 软件所有者必须能够写入该现有文件。\n\
  \n*   `写入` 我们指定的任何错误文件，与日志文件类似。\n\n回到示例，以下命令授予 Oracle 写入我的目录的能力：\n\n```\nSQL> host\
  \ chmod a+rw .\n```\n\n### 注意\n\n此命令实际上授予了每个人写入我们目录的权限！这只是一个演示；通常，我们会使用一个特殊的目录——也许是由\
  \ Oracle 软件所有者本身拥有的目录——来完成此操作。\n\n接下来，我重新运行我的 `INSERT` 语句：\n\n```\nSQL> INSERT /*+\
  \ append */ INTO DEPT\n(\nDEPTNO,\nDNAME,\nLOC\n)\nSELECT\n\"DEPTNO\",\n\"DNAME\"\
  ,\n\"LOC\"\nFROM \"SYS_SQLLDR_X_EXT_DEPT\"\nSQL> /\n4 rows created.\nSQL> host ls\
  \ -l demo1.log_xt\n-rw-r----- 1 oracle dba 687 Mar 8 14:35 demo1.log_xt\n```\n\n\
  你可以看到，这次我成功访问了文件，成功加载了四行数据，并且日志文件被创建，实际上其所有者是 “oracle”，而不是我的操作系统账户。\n\n## 处理错误\n\
  \n在理想世界中，不会有错误。输入文件中的数据将是完美的，并且全部都能正确加载。但这几乎从不发生。那么，我们如何跟踪此过程中的错误呢？\n\n最常见的方法是使用\
  \ `BADFILE` 选项。在这里，Oracle 将记录所有处理失败的记录。例如，如果我们的控制文件包含一条 `DEPTNO` 为 `'ABC'` 的记录，该记录将因为\
  \ `'ABC'` 无法转换为数字而失败，并最终进入错误文件。我们将在以下示例中演示这一点。\n\n首先，我们将以下内容添加到 `demo1.ctl` 的最后一行（这将向我们的输入中添加一条无法加载的数据行）：\n\
  \n```\nABC,XYZ,Hello\n```\n\n接下来，我们运行以下命令，以证明 `demo1.bad` 文件尚不存在：\n\n```\nSQL> host\
  \ ls -l demo1.bad\nls: demo1.bad: No such file or directory\n```\n\n然后我们查询外部表以显示内容：\n\
  \n```\nSQL> select * from SYS_SQLLDR_X_EXT_DEPT;\nDEPTNO DNAME          LOC\n----------\
  \ -------------- -------------\n10 Sales          Virginia\n20 Accounting     Virginia\n\
  30 Consulting     Virginia\n40 Finance        Virginia\n```\n\n现在我们会发现该文件已存在，并且可以查看其内容：\n\
  \n```\nSQL> host ls -l demo1.bad\n-rw-r----- 1 oracle dba 14 Mar 9 10:38 demo1.bad\n\
  SQL> host cat demo1.bad\nABC,XYZ,Hello\n```\n\n但是，我们如何以编程方式检查这些错误记录和生成的日志呢？幸运的是，这可以通过使用另一个外部表轻松完成。假设我们设置这个外部表：\n\
  \n```\nSQL> create table et_bad\n( text1 varchar2(4000) ,\ntext2 varchar2(4000)\
  \ ,\ntext3 varchar2(4000)\n)\norganization external\n(type oracle_loader\ndefault\
  \ directory SYS_SQLLDR_XT_TMPDIR_00000\naccess parameters\n(\nrecords delimited\
  \ by newline\nfields\nmissing field values are null\n( text1 position(1:4000),\n\
  text2 position(4001:8000),\ntext3 position(8001:12000)\n)\n)\nlocation ('demo1.bad')\n\
  )\n/\nTable created.\n```\n\n这只是一个可以读取任何文件的表，只要文件中的每行少于 12,000 个字符，就不会因数据类型错误而失败。如果它们超过\
  \ 12,000 个字符，那么我们可以简单地添加更多文本列来容纳它们。\n\n我们可以通过一个简单的查询清楚地看到被拒绝的记录：\n\n```\nSQL> select\
  \ * from et_bad;\nTEXT1           TEXT2           TEXT3\n--------------- ---------------\
  \ ---------------\nABC,XYZ,Hello\n```\n\n一个 `COUNT(*)` 可以告诉我们有多少记录被拒绝。另一个基于与此外部表关联的日志文件创建的外部表可以告诉我们记录被拒绝的原因。\n\
  \n然而，我们需要更进一步，使这成为一个可重复的过程。原因是，如果我们在使用外部表时没有错误，错误文件不会被清空。因此，如果之前存在一个包含数据的错误文件，而我们的外部表没有生成错误，我们就会被误导，以为存在错误。\n\
  \n我过去采用过四种方法来解决这个问题：\n\n*   使用 `UTL_FILE` 并重置错误文件——实际上，通过简单地以写入模式打开它然后关闭它来截断它。\n\
  \n*   使用 `UTL_FILE` 重命名任何预先存在的错误文件，保留其内容，但允许我们创建一个新的。\n\n*   将 PID 纳入错误文件（和日志文件）名中。我们将在后面的“多用户问题”部分演示这一点。\n\
  \n*   手动使用操作系统命令来解决问题（例如重命名文件、删除文件等）。\n\n这样，我们就能够判断错误文件中的错误记录是我们最近生成的，还是某个旧版本文件遗留下来的，从而不具备参考意义。\n\
  \n\n\n# 本节前面提到的 `COUNT(*)` 让我想到一个功能，它允许你仅访问外部文件中查询引用到的字段，从而优化外部表的访问。也就是说，如果定义的外部表有\
  \ 100 个数字字段，但你只选出其中一个，你可以指示 Oracle 绕过将其余 99 个字符串转换为数字的过程。这听起来很棒，但它可能导致每次查询返回的行数不同。假设外部表中包含\
  \ 100 行数据。对于列 `C1` 的所有数据都是“有效的”并能转换为数字。而对于列 `C2` 的数据都“无效”，无法转换为数字。如果你从该外部表中选取 `C1`，你会得到\
  \ 100 行返回。如果你选取 `C2`，则会得到 0 行返回。\n\n你必须显式启用此优化，并且应该考虑使用它是否安全（只有你对自己的应用程序及其处理足够了解，才能回答“是否安全？”这个问题）。使用前面添加了错误数据行的例子，我们查询外部表时期望看到以下输出：\n\
  \n```sql\nSQL> select dname from SYS_SQLLDR_X_EXT_DEPT;\nDNAME\n----------------------------------------\n\
  Sales\nAccounting\nConsulting\nFinance\n\nSQL> select deptno from SYS_SQLLDR_X_EXT_DEPT;\n\
  DEPTNO\n----------------------------------------\n```\n\n我们知道坏记录已被记录到 `BADFILE`\
  \ 中。但如果我们只是简单地 `ALTER` 外部表，并告诉 Oracle 仅投影（处理）被引用的列，如下所示，我们会从每个查询中得到不同的行数：\n\n```sql\n\
  SQL> alter table SYS_SQLLDR_X_EXT_DEPT\n  2  project column referenced\n  3  /\n\
  Table altered.\n\nSQL> select dname from SYS_SQLLDR_X_EXT_DEPT;\nDNAME\n----------------------------------------\n\
  Sales\nAccounting\nConsulting\nFinance\nXYZ\n\nSQL> select deptno from SYS_SQLLDR_X_EXT_DEPT;\n\
  DEPTNO\n----------------------------------------\n```\n\n`DNAME` 字段对于输入文件中的每条记录都是有效的，但\
  \ `DEPTNO` 列则不是。如果我们不检索 `DEPTNO` 列，它就不会使记录失败——结果集被实质性地改变了。\n\n## 使用外部表加载不同文件\n\n\
  一个常见的需求是使用外部表在一段时间内加载不同名称文件的数据。例如，本周我们必须加载 `file1.dat`，下周则是 `file2.dat`，依此类推。到目前为止，我们一直是从固定文件名\
  \ `demo1.ctl` 加载。如果我们之后需要从第二个文件 `demo2.ctl` 加载怎么办？\n\n幸运的是，这很容易实现。可以使用 `ALTER TABLE`\
  \ 命令重新指向外部表的位置设置：\n\n```sql\nSQL> alter table SYS_SQLLDR_X_EXT_DEPT location( 'demo2.ctl'\
  \ );\nTable altered.\n```\n\n基本上就是这样——对该外部表的下一次查询就会访问 `demo2.ctl` 文件。\n\n## 多用户问题\n\
  \n在本节的介绍中，我描述了三种外部表可能不如 SQLLDR 有用的情况。其中之一是一个特定的多用户问题。我们刚刚看到了如何更改外部表的位置——如何让它读取文件\
  \ 2 而不是文件 1 等等。当多个用户各自尝试并发地使用该外部表，并让其每个会话指向不同文件时，问题就出现了。\n\n这是无法实现的。在任何给定时间，外部表只会指向一个文件（或一组文件）。如果我登录并将表更改为指向文件\
  \ 1，而你大约在同一时间做同样的事情，然后我们都查询该表，我们将处理的是同一个文件。\n\n这个问题通常不应该是你遇到的——外部表不是数据库表的替代品；它们是加载数据的一种手段，因此你不会在日常应用中将其作为一部分使用。它们通常是\
  \ DBA 或开发人员用于加载信息的工具，要么是一次性事件，要么是周期性的，比如数据仓库加载。如果 DBA 有十个文件要使用同一个外部表加载到数据库中，他们*不会*顺序执行——即先指向文件\
  \ 1 并处理，然后是文件 2 并处理，等等。相反，他们只会将外部表指向*这两个文件*，让数据库处理它们两者：\n\n```sql\nSQL> alter table\
  \ SYS_SQLLDR_X_EXT_DEPT\n  2  location( 'file1.dat', 'file2.dat' )\n  3  /\nTable\
  \ altered.\n```\n\n如果需要*并行处理*，那么数据库已经内置了这种能力，如上一章所示。\n\n因此，唯一的多用户问题可能是两个会话大约同时尝试更改位置（假设它们有\
  \ `ALTER` 表的权限）——而这只是一种需要注意的可能性，我认为你实际上不会经常遇到。\n\n另一个多用户考虑因素是坏文件和日志文件的命名。如果你有许多会话同时查看同一个外部表或使用并行处理（在某种程度上，这也是一个多用户情况）怎么办？如果能按会话隔离这些文件就太好了，幸运的是你可以做到。你可以包含以下特殊字符串：\n\
  \n*   `%p`: PID（进程 ID）。\n*   `%a`: 并行执行服务器代理 ID。并行执行服务器被分配编号 001、002、003 等等。\n\n\
  通过这种方式，每个会话往往会生成自己的坏文件和日志文件。例如，假设你在之前的 `CREATE TABLE` 语句中使用了如下 `BADFILE` 语法：\n\n\
  ```\nRECORDS DELIMITED BY NEWLINE CHARACTERSET US7ASCII\nBADFILE 'SYS_SQLLDR_XT_TMPDIR_00000':'demo1_%p.bad'\n\
  LOGFILE 'demo1.log_xt'\n```\n\n如果有任何记录加载失败，你会期望找到一个文件名类似于以下内容的文件：\n\n```bash\n$\
  \ ls *.bad\ndemo1_7108.bad\n```\n\n然而，在较长时间内，你仍然可能会遇到问题。在大多数操作系统上，PID 会被重用。因此，处理错误中概述的技术可能仍然适用——如果你确定这是个问题，就需要重置你的坏文件或在它存在时重命名它。\n\
  \n## 预处理\n\n*预处理*是外部表的一项功能，允许你在从外部表中选择数据时，首先执行一个或多个操作系统命令。通过指定 `PREPROCESSOR` 子句来调用预处理。此子句的输入可以是一个\
  \ OS 命令或一个 shell 脚本。\n\n有时，预处理的用途并不直观。考虑以下用例：\n\n*   通过从外部表中选择数据，动态显示 OS 命令（或命令组合）的输出\n\
  *   在显示数据前搜索文件并过滤列和/或行\n*   在返回数据前处理并修改文件内容\n\n以下是这些场景的示例。\n\n\n# 通过 SQL 监控文件系统\n\
  \n## 引言\n\n在一些客户的数据库中，DBA 们使用具有自动扩展功能的数据文件，但许多数据文件共享同一个文件系统，如下所示：\n\n```\ntablespace\
  \ A, datafiles /u01/oradata/ts_A_file01.dbf autoextend unlimited\ntablespace B,\
  \ datafiles /u01/oradata/ts_B_file01.dbf autoextend unlimited\n```\n\n要求是，所有数据文件必须能够增长至少其当前大小的\
  \ 20%；因此，例如，如果 `ts_A_file01.dbf` 当前为 100GB，`ts_B_file01.dbf` 为 200GB，我们必须确保在 `/u01/oradata`\
  \ 文件系统中至少有 20GB + 40GB = 60GB 的可用空间。\n\n问题是：如何在数据库内通过一个简单的查询来监控这一点？目前，我们有一个复杂的脚本，从\
  \ `df` 命令收集空闲空间到文本文件中，打开游标，从 `DBA_DATA_FILES` 计算当前分配的空间，并通过外部表读取 `df` 数据。\n\n这可以通过单个\
  \ SQL 查询完成。为了实现这一点，我需要能够交互式地查询磁盘空闲空间（`df`）——无需复杂的操作，如运行脚本或重定向输出。我将首先使 `df` 的输出可以像表一样被查询。我将使用预处理器指令来实现这一点。\n\
  \n## 为 `df` 创建外部表\n\n首先，我将创建一个目录，用于放置一个能产生 `df` 输出的小型 shell 脚本：\n\n```\n$ sqlplus\
  \ system/foo@PDB1\nSQL> create or replace directory exec_dir as '/orahome/oracle/bin';\n\
  Directory created.\n```\n\n为了安全地执行此操作，我们需要对我们希望调用的程序所在的目录对象授予 `EXECUTE` 权限。这使我们能够精确控制\
  \ Oracle 数据库将执行哪个程序，避免意外执行“特洛伊木马”程序。作为特权账户，我授予 `EODA` 用户以下权限：\n\n```\nSQL> grant\
  \ execute on directory exec_dir to eoda;\n```\n\n接下来，我将在该目录中创建一个名为 `run_df.bsh`\
  \ 的 shell 脚本。该脚本仅包含以下内容：\n\n```\n#!/bin/bash\n/bin/df -Pl\n```\n\n同时，我将该 shell 脚本设置为可执行：\n\
  \n```\n$ chmod +x run_df.bsh\n```\n\n该脚本的输出大致如下：\n\n```\nSQL> !./run_df.bsh\nFilesystem\
  \                  1024-blocks      Used Available Capacity  Mounted on\ndevtmpfs\
  \                        1855072         0   1855072       0%  /dev\ntmpfs     \
  \                      1867208         0   1867208       0%  /dev/shm\ntmpfs   \
  \                        1867208      8632   1858576       1%  /run\ntmpfs     \
  \                      1867208         0   1867208       0%  /sys/fs/cgroup\n/dev/mapper/vg_main-lv_root\
  \    34070268  32283904   1786364      95%  /\n/vagrant                      999543804\
  \ 342296544 657247260      35%  /vagrant\n/dev/sda1                        508588\
  \    132016    376572      26%  /boot\ntmpfs                            373444 \
  \        0    373444       0%  /run/user/54321\n```\n\n注意，在 `run_df.bsh` 脚本中，我使用了显式路径名来运行\
  \ `df`；我没有依赖环境和 `PATH` 环境变量。这一点非常重要：在为外部表编写脚本时——在编写任何脚本时——你总是应该使用显式路径来运行你实际想要运行的程序。你无法真正控制脚本运行的环境，因此依赖环境的特定设置是灾难的根源。\n\
  \n现在，我有了脚本和目录，就可以创建外部表了。从下面的代码可以看出，我只需要让外部表跳过第一条记录，然后解析后续每一行，使用空白作为分隔符。这是外部表可以轻松完成的，如下所示：\n\
  \n```\nSQL> create table df\n(\n  fsname   varchar2(100),\n  blocks   number,\n\
  \  used     number,\n  avail    number,\n  capacity varchar2(10),\n  mount    varchar2(100)\n\
  )\norganization external\n(\n  type oracle_loader\n  default directory exec_dir\n\
  \  access parameters\n  (\n    records delimited\n    by newline\n    preprocessor\n\
  \    exec_dir:'run_df.bsh'\n    skip 1\n    fields terminated by\n    whitespace\
  \ ldrtrim\n  )\n  location\n  (\n    exec_dir:'run_df.bsh'\n  )\n)\n/\nTable created.\n\
  ```\n\n## 查询 `df` 数据\n\n创建了 `df` 外部表后，我现在可以轻松地在查询中查看 `df` 输出，如下所示：\n\n```\nSQL>\
  \ select * from df;\nFSNAME                             BLOCKS       USED      AVAIL\
  \ CAPACITY   MOUNT\n----------------------------- ---------- ---------- ----------\
  \ ------------------\ndevtmpfs                          1855072          0    1855072\
  \ 0%       /dev\ntmpfs                             1867208          0    1867208\
  \ 0%       /dev/shm\ntmpfs                             1867208       8632    1858576\
  \ 1%       /run\ntmpfs                             1867208          0    1867208\
  \ 0%       /sys/fs/cgroup\n/dev/mapper/vg_main-lv_root      34070268   32284176\
  \    1786092 95%      /\n/vagrant                        999543804  342294336  657249468\
  \ 35%      /vagrant\n/dev/sda1                          508588     132016     376572\
  \ 26%      /boot\ntmpfs                              373444          0     373444\
  \ 0%       /run/user/54321\n```\n\n**提示**：希望你明白这种方法可以轻松应用于 `ps`、`ls`、`du` 等命令——现在所有的\
  \ UNIX/Linux 实用程序都可以轻松地被视为“表”！\n\n## 构建监控查询\n\n有了这个在 `df` 外部表中可用的数据，开始编写查询就变得容易了。我只需要将\
  \ `df` 与 `DBA_DATA_FILES` 连接起来，连接条件是将最长的挂载点匹配到每个文件名。下面代码中展示的是针对本例中问题的单查询解决方案。以下是对部分代码行的解释：\n\
  \n```\nSQL> with fs_data\nas\n  (select /*+ materialize */ *\n   from df\n  )\n\
  select mount,\n       file_name,\n       bytes/1024/1024 mbytes,\n       tot_bytes/1024/1024\
  \ tot_mbytes,\n       avail_bytes/1024/1024 avail_mbytes,\n       case\n       \
  \  when 0.2 * tot_bytes < avail_bytes\n           then 'OK'\n         else '磁盘空间不足'\n\
  \       end status\nfrom (\n  select file_name, mount, avail_bytes, bytes,\n   \
  \      sum(bytes) over\n           (partition by mount) tot_bytes\n  from (\n  \
  \  select a.file_name,\n           b.mount,\n           b.avail*1024 avail_bytes,\
  \ a.bytes,\n           row_number() over\n             (partition by a.file_name\n\
  \              order by length(b.mount) DESC) rn\n    from dba_data_files a,\n \
  \        fs_data b\n    where a.file_name\n          like b.mount || '%'\n    )\n\
  \  where rn = 1\n  )\norder by mount, file_name\n/\nMOUNT  FILE_NAME           \
  \                              MBYTES TOT_MBYTES AVAIL_MBYTES STATUS\n------ ---------------------------------------------\
  \ ---------- ---------- ------------- -------------------\n/      /opt/oracle/oradata/CDB/PDB1/auto.dbf\
  \          2824.0625  10120.625     1744.375 磁盘空间不足\n/      /opt/oracle/oradata/CDB/PDB1/sysaux01.dbf\
  \            380  10120.625     1744.375 磁盘空间不足\n/      /opt/oracle/oradata/CDB/PDB1/system01.dbf\
  \            280  10120.625     1744.375 磁盘空间不足\n/      /opt/oracle/oradata/CDB/PDB1/undotbs01.dbf\
  \           695  10120.625     1744.375 磁盘空间不足\n/      /opt/oracle/oradata/CDB/PDB1/uniform.dbf\
  \       3024.0625  10120.625     1744.375 磁盘空间不足\n/      /opt/oracle/oradata/CDB/PDB1/users01.dbf\
  \          2917.5  10120.625     1744.375 磁盘空间不足\n```\n\n在代码的第 3 和第 4 行，我查询了 `df`\
  \ 外部表。我特意使用了 `materialize` 提示，强制优化器将 `df` 数据加载到类似于全局临时表的结构中，因为查询倾向于反复读取外部表，并且 `df`\
  \ 表的结果可能会在查询运行过程中发生变化。这提供了对 `df` 数据的一致性读取的逻辑等价物。此外，如果查询计划确实涉及重新读取外部表，我将在运行时收到错误消息：\n\
  \n```\nKUP-04108 unable to reread file string\n```\n\n文档解释了这个错误：\n\n### 查询操作系统输出\n\
  \n*   `原因`：当前执行的查询需要多次读取外部表的数据源。然而，该数据源是顺序设备，无法重复读取。此类数据源的例子有磁带或管道。\n\n*   `解决方法`：有几种方法可以解决此问题。一是重写查询，使外部表只被引用一次。另一个选项是将数据源移动到可重复读取的设备（如磁盘文件）。第三个选项是将外部表的数据加载到临时表中，并更改查询以引用该临时表。\n\
  \n在第 27-30 行，我使用`LIKE`子句将`DBA_DATA_FILES`与`df`数据进行连接。这将把`DBA_DATA_FILES`中的每个文件与`df`输出中的每个可能挂载点连接起来。然而，我知道目标是要找到“最长”的匹配挂载点，因此为了实现这一点，我在第\
  \ 24-26 行为每一行分配了一个`ROW_NUMBER`。这个`ROW_NUMBER`将被顺序分配给`DBA_DATA_FILES`中的每个重复行，因此如果`FILE_NAME`匹配多个`MOUNT`，则每个`FILE_NAME`的出现都会被分配一个唯一且递增的`ROW_NUMBER`值。此`ROW_NUMBER`将在数据根据`MOUNT`的长度从大到小排序后分配。\n\
  \n一旦拥有了这些数据，我应用一个`WHERE`子句，只为每个`FILE_NAME`值保留第一个条目——该谓词是第 32 行的`WHERE rn = 1`。同时，我在第\
  \ 18-19 行添加了另一个列——`TOT_MBYTES`。这将使我能够验证 20%的阈值。\n\n最后一步是格式化和输出数据。我打印感兴趣的列，并在第 11-15\
  \ 行添加了一个`CASE`语句，以验证在给定挂载点上分配的存储总字节数的 20%不超过剩余的可用空闲存储字节数。\n\n所以，现在你知道了如何使用外部表来查询操作系统输出，例如`df`、`ps`、`find`和`ls`。此外，你还可以使用它们来查询任何写入标准输出的内容，包括`gunzip`、`sed`等。\n\
  \n#### 读取和过滤压缩文件\n\n在处理大型数据加载时，使用压缩文件很常见。通常，在作为数据加载过程的一部分处理压缩文件时，你会有一个初始步骤来解压缩文件，然后另一步骤将其加载到暂存表中。使用外部表，你可以通过指示外部表在从压缩文件读取时解压缩数据来简化这一过程。\n\
  \n一个例子将说明这一点。为了进行设置，假设你有一个要从中选择的 zip 文件。首先，创建一个目录：\n```\n$ mkdir /tmp/base\n```\n\
  \n接下来，在目录中创建一个压缩文件：\n```\n$ echo 'base row1 col1, base row1 col2' | gzip > /tmp/base/filebase.csv.gz\n\
  $ echo 'base row2 col1, base row2 col2' | gzip >> /tmp/base/filebase.csv.gz\n```\n\
  \n接下来，创建两个目录对象——一个指向将包含 shell 脚本的目录，另一个指向作为搜索待处理文件起始点的基础目录：\n```\nSQL> create or\
  \ replace directory exec_dir as '/orahome/oracle/bin';\nDirectory created.\nSQL>\
  \ create or replace directory data_dir as '/tmp/base';\nDirectory created.\n```\n\
  \n接下来，创建一个名为`search_dir.bsh`的 shell 脚本。在此示例中，该文件位于`/oracle/home/bin`目录中。将以下代码放入脚本中：\n\
  ```\n#!/bin/bash\n/usr/bin/find $* -name \"*.gz\" -exec /bin/zcat {} \\; | /usr/bin/cut\
  \ -f1 -d,\n```\n\n前面的脚本将从传递给脚本的目录开始搜索；它将搜索基础目录及其下的所有子目录，查找扩展名为`.gz`的文件。然后对于找到的每个文件，使用`zcat`查看解压缩的数据。最后，`cut`仅显示数据的第一列。\n\
  \n这将使 shell 脚本可执行：\n```\n$ chmod +x search_dir.bsh\n```\n\n现在我们需要的是一个使用`search_dir.bsh`来显示压缩文件中数据的外部表：\n\
  ```\nS create table csv\n( col1 varchar2(20)\n)\norganization external\n(\ntype\
  \ oracle_loader\ndefault directory data_dir\naccess parameters\n(\nrecords delimited\
  \ by newline\npreprocessor exec_dir:'search_dir.bsh'\nfields terminated by ',' ldrtrim\n\
  )\nlocation\n(\ndata_dir:'filebase.csv.gz'\n)\n)\n/\nTable created.\n```\n\n现在请注意，在输出中只显示了压缩文件的第一列；这是因为`search_dir.bsh`中的代码使用`cut`只显示第一列：\n\
  ```\nSQL> select * from csv;\nCOL1\n\nbase row1 col1\nbase row2 col1\n```\n\n所以这不是一个使用外部表的典型例子，而是展示了使用预处理器选项所能实现的功能。\n\
  \n\n## 从文件中修剪字符\n\n我曾与一位数据库管理员（DBA）共事，他时常会收到某些“火警”经理发来的紧急邮件，附件是一个电子表格，并询问：“你能把这个电子表格加载到生产数据库中吗？”在这种环境下，没有直接访问生产数据库的网络途径；因此，DBA\
  \ 无法通过像`SQLLDR`这样的工具经由网络进行加载。在这种情况下，加载数据的步骤如下：\n\n1.  在 Windows 笔记本电脑上将电子表格保存为 CSV\
  \ 文件。\n2.  将 CSV 文件复制到专门为向生产服务器传输文件而配置的安全服务器，然后再将 CSV 文件复制到生产服务器。\n3.  使用操作系统实用程序删除\
  \ CSV 文件中嵌入的隐藏 DOS 字符。\n4.  以 Oracle 用户身份，基于 CSV 文件创建一个外部表。\n5.  使用 SQL 通过从外部表中选择数据来插入到生产表中。\n\
  \n上述列表中的第 3 步将是此处的重点，因为预处理器正是消除了对这一步的需求（至于其他步骤，DBA 将不得不长期寻找其他解决方案）。\n\n假设要加载的文件名为`load.csv`，位于`/tmp`目录下，并包含以下数据：\n\
  \n```\nemergency data|load now^M\nmore data|must load data^M\n```\n\n`^M`字符是 Windows\
  \ 环境中的回车符，应在数据加载前被移除。为了实现这一点，我们将设置几个目录，然后使用带有`PREPROCESSOR`指令的外部表，该指令调用一个 shell\
  \ 脚本，在数据被检索之前移除特殊的`^M`字符：\n\n```\nSQL> create or replace directory data_dir as '/tmp';\n\
  目录已创建。\nSQL> create or replace directory exec_dir as '/orahome/oracle/bin';\n目录已创建。\n\
  ```\n\n现在，创建一个名为`run_sed.bsh`的 shell 脚本，它使用`sed`来移除文件中的`^M`字符。此示例将`run_sed.bsh`脚本放在`/orahome/oracle/bin`目录中：\n\
  \n```\n#!/bin/bash\n/bin/sed -e 's/^M//g' $*\n```\n\n提示：从 Windows/DOS 传输到 UNIX/Linux\
  \ 时，也可考虑使用`dos2unix`实用程序来移除不需要的字符。\n\n`run_sed.bsh`脚本中的`^M`字符是通过按下`Ctrl+V`，然后按下`Ctrl+M`（或者，也可以在这里按回车键代替`Ctrl+M`）来输入的；你不能简单地输入`^`然后输入`M`。它必须是那个特殊字符`^M`。\n\
  \n然后使脚本可执行：\n\n```\n$ chmod +x run_sed.bsh\n```\n\n接下来是外部表的定义：\n\n```\nSQL> create\
  \ table csv2\n( col1 varchar2(20)\n,col2 varchar2(20)\n)\norganization external\n\
  (\ntype oracle_loader\ndefault directory data_dir\naccess parameters\n(\nrecords\
  \ delimited by newline\npreprocessor exec_dir:'run_sed.bsh'\nfields terminated by\
  \ '|' ldrtrim\n)\nlocation\n(\ndata_dir:'load.csv'\n)\n)\n/\n表已创建。\n```\n\n现在从外部表中查询：\n\
  \n```\nSQL> select * from csv2;\nCOL1                 COL2\n--------------------\
  \ --------------------\nemergency data       load now\nmore data            must\
  \ load data\n```\n\n我们如何知道每行中多余的`^M`已被移除？检查`COL2`的长度：\n\n```\nSQL> select length(col2)\
  \ from csv2;\nLENGTH(COL2)\n------------\n          11\n```\n\n如果隐藏的`^M`字符没有被移除，`COL2`的长度至少会比列中的字符数据长\
  \ 1 字节（更不用说我们在搜索和连接时可能会遇到一些意外情况）。\n\n## 预处理总结\n\n前面的例子展示了外部表`PREPROCESSOR`指令的强大功能。当然，你也可以在没有预处理的情况下实现相同的结果，但那样步骤会更多，需要维护的代码更多，并且出现故障的地方也可能更多。\n\
  \n选择的具体示例是为了说明预处理的强大和灵活性。在第一个例子中，操作的对象是一个 shell 脚本；没有数据文件。操作系统的命令输出就是从外部表中选择时返回的数据。\n\
  \n在第二个例子中，预处理器脚本操作了一个压缩文件。这提供了一种即时解压内容的方法，然后可以使用`find`、`cut`和`zgrep`等命令对列和/或行进行额外的过滤。\n\
  \n第三个例子展示了一个脚本操作 CSV 文件，在显示数据之前使用`sed`移除不需要的字符。这是在 DOS 和 UNIX/Linux 平台之间传输文件时的常见需求。\n\
  \n这三个例子展示了使用`PREPROCESSOR`指令的独特方式。这为你提供了关于其可能用途的基础知识，并允许你在此基础上进行扩展，以简化你的数据加载需求。\n\
  \n### 外部表总结\n\n在本节中，我们探讨了外部表。它们是 Oracle 9*i*及更高版本提供的一项功能，在很大程度上可以取代`SQLLDR`。我们研究了开始使用外部表的最快方法：使用`SQLLDR`将我们过去经验中的控制文件进行转换的技巧。我们演示了一些通过错误文件检测和处理错误的技术，还探讨了关于外部表的一些多用户问题。最后，我们演示了预处理技术，以便在从外部表中选择数据时，将执行操作系统命令作为第一步。\n\
  \n我们现在已准备好进入本章的下一节，该节将涉及从数据库中卸载数据。\n\n\n\n# 数据泵卸载\n\nOracle 能够以专有的二进制格式（称为 `数据泵格式`）提取（来自表的）数据，该格式与\
  \ Oracle 提供的用于在数据库间移动数据的 `EXPDP` 和 `IMPDP` 工具所使用的格式相同。Oracle 使用外部表和 `CREATE TABLE`\
  \ 语句来执行此数据卸载功能。\n\n外部表卸载实际上相当简单——就像一个 `CREATE TABLE AS SELECT` 语句一样简单。首先，我们需要一个\
  \ `DIRECTORY` 对象：\n\n```\n$ sqlplus eoda/foo@PDB1\nSQL> create or replace directory\
  \ tmp as '/tmp';\nDirectory created.\n```\n\n现在，我们可以使用一个简单的 `SELECT` 语句将数据卸载到此目录，例如：\n\
  \n```\nSQL> create table all_objects_unload\norganization external\n( type oracle_datapump\n\
  default directory TMP\nlocation( 'allobjects.dat' )\n)\nas\nselect *  from all_objects;\n\
  Table created.\n```\n\n我特意选择了 `ALL_OBJECTS` 视图，因为它是一个相当复杂的视图，包含大量的连接和谓词。这表明你可以使用这种数据泵卸载技术从数据库中提取任意数据。我们可以添加谓词或其他任何条件来提取数据的一个子集。\n\
  \n注意\n\n此示例表明你可以用它来从数据库中提取任意数据。是的，这是重复的文本。从安全角度来看，这确实使得有权限访问信息的人很容易将信息带到其他地方。你需要控制能够创建\
  \ `DIRECTORY` 对象并具有写入权限、以及具备访问物理服务器以获取卸载数据所需权限的人员。\n\n最后一步是将 `allobjects.dat` 复制到另一台服务器（可能是一台用于测试的开发机器），并在那里提取\
  \ DDL 以重新创建此表：\n\n```\nSQL> set serverout on long 100000 pages 100\nSQL> select\
  \ dbms_metadata.get_ddl( 'TABLE', 'ALL_OBJECTS_UNLOAD' ) from dual;\nDBMS_METADATA.GET_DDL('TABLE','ALL_OBJECTS_UNLOAD')\n\
  \nCREATE TABLE \"EODA\".\"ALL_OBJECTS_UNLOAD\"\n(    \"OWNER\" VARCHAR2(128) NOT\
  \ NULL ENABLE,\n\"OBJECT_NAME\" VARCHAR2(128) NOT NULL ENABLE,\n\"SUBOBJECT_NAME\"\
  \ VARCHAR2(128),\n\"OBJECT_ID\" NUMBER NOT NULL ENABLE,\n\"DATA_OBJECT_ID\" NUMBER,\n\
  \"OBJECT_TYPE\" VARCHAR2(23),\n\"CREATED\" DATE NOT NULL ENABLE,\n\"LAST_DDL_TIME\"\
  \ DATE NOT NULL ENABLE,\n\"TIMESTAMP\" VARCHAR2(19),\n\"STATUS\" VARCHAR2(7),\n\"\
  TEMPORARY\" VARCHAR2(1),\n\"GENERATED\" VARCHAR2(1),\n\"SECONDARY\" VARCHAR2(1),\n\
  \"NAMESPACE\" NUMBER NOT NULL ENABLE,\n\"EDITION_NAME\" VARCHAR2(128),\n\"SHARING\"\
  \ VARCHAR2(18),\n\"EDITIONABLE\" VARCHAR2(1),\n\"ORACLE_MAINTAINED\" VARCHAR2(1),\n\
  \"APPLICATION\" VARCHAR2(1),\n\"DEFAULT_COLLATION\" VARCHAR2(100),\n\"DUPLICATED\"\
  \ VARCHAR2(1),\n\"SHARDED\" VARCHAR2(1),\n\"CREATED_APPID\" NUMBER,\n\"CREATED_VSNID\"\
  \ NUMBER,\n\"MODIFIED_APPID\" NUMBER,\n\"MODIFIED_VSNID\" NUMBER\n)\nORGANIZATION\
  \ EXTERNAL\n( TYPE ORACLE_DATAPUMP\nDEFAULT DIRECTORY \"TMP\"\nLOCATION\n( 'allobjects.dat'\n\
  )\n)\nREJECT LIMIT 0\n```\n\n这使得将此提取内容加载到另一个数据库变得相当容易，只需执行以下操作就完成了——数据已加载：\n\n```\n\
  SQL> insert /*+ append */ into some_table select * from all_objects_unload;\n```\n\
  \n注意\n\n你可以创建压缩和加密的转储文件。这些功能需要 Oracle 企业版，以及高级压缩选项（用于压缩）和高级安全选项（用于加密）。\n\n# SQLLDR\n\
  \n`SQLLDR` 是 Oracle 的高速批量数据加载器。它是一个极其有用的工具，用于将数据从各种平面文件格式加载到 Oracle 数据库中。`SQLLDR`\
  \ 可以在极短的时间内加载大量数据。它有两种操作模式：\n\n*   常规路径：`SQLLDR` 将代表我们使用 SQL 插入来加载数据。\n*   直接路径：`SQLLDR`\
  \ 在此模式下不使用 SQL；它直接格式化数据库块。\n\n直接路径加载允许你从平面文件读取数据并直接写入格式化的数据库块，绕过整个 SQL 引擎、撤销生成，并且可以选择同时跳过重做生成。并行直接路径加载是从无数据到完全加载数据库的最快方法之一。\n\
  \n需要注意的是，Oracle 调用接口 (`OCI`) 允许你使用 `C` 语言编写自己的直接路径加载器。这在你想要执行的操作在 `SQLLDR` 中不可行，或者希望与你的应用程序无缝集成时非常有用。`SQLLDR`\
  \ 是一个命令行工具（即，它是一个独立的程序）。它不是一个 API，也不是可以“从 PL/SQL 调用”的东西，例如。\n\n如果你在没有任何输入的情况下从命令行执行\
  \ `SQLLDR`，它会给出以下帮助信息：\n\n```\n$ sqlldr\nUsage: SQLLDR keyword=value [,keyword=value,...]\n\
  Valid Keywords:\nuserid -- ORACLE username/password\ncontrol -- control file name\n\
  log -- log file name\nbad -- bad file name\ndata -- data file name\ndiscard -- discard\
  \ file name\n\n```\n\n要使用 `SQLLDR`，你将需要一个 *控制文件*。一个 `SQLLDR` 控制文件仅包含描述输入数据的信息——其布局、数据类型等——以及关于目标表的信息。\n\
  \n注意\n\n不要混淆 `SQLLDR` 控制文件和数据库控制文件。回想一下第 3 章，数据库控制文件是一个小的二进制文件，它存储 Oracle 所需文件的目录以及检查点数据、数据库名称等其他信息。\n\
  \n控制文件甚至可以包含要加载的数据。在下面的例子中，我们将逐步构建一个简单的控制文件，并对命令进行解释。（请注意，左侧括号中的数字*不是*此控制文件的一部分；它们仅用于参考。）我稍后将此文件称为\
  \ `demo1.ctl`。\n\n*   `LOAD DATA` (1)：这告诉 `SQLLDR` 要做什么（在此案例中，是加载数据）。`SQLLDR` 另一件能做的事是\
  \ `CONTINUE_LOAD` 以恢复加载。你只会在继续多表直接路径加载时使用后一个选项。\n*   `INFILE *` (2)：这告诉 `SQLLDR`\
  \ 要加载的数据实际上包含在控制文件本身内，如第 6 到 10 行所示。或者，你可以指定包含数据的另一个文件的名称。如果你愿意，可以使用命令行参数覆盖此 `INFILE`\
  \ 语句。请注意，*命令行选项会覆盖控制文件设置*。\n*   `INTO TABLE DEPT` (3)：这告诉 `SQLLDR` 你要将数据加载到哪个表（在此案例中，是\
  \ `DEPT` 表）。\n*   `FIELDS TERMINATED BY ','` (4)：这告诉 `SQLLDR` 数据将以逗号分隔值的形式存在。有几十种方法可以向\
  \ `SQLLDR` 描述输入数据；这只是更常见的方法之一。\n*   `(DEPTNO, DNAME, LOC)` (5)：这告诉 `SQLLDR` 你要加载哪些列、它们在输入数据中的顺序以及它们的数据类型。这些数据类型是针对*输入*流中的数据，而不是数据库中的数据类型。在此案例中，它们默认为\
  \ `CHAR(255)`，这已经足够。\n*   `BEGINDATA` (6)：这告诉 `SQLLDR` 你已完成描述输入数据，接下来的第 7 到 10 行是实际要加载到\
  \ `DEPT` 表的数据。\n\n\n# Oracle SQL*Loader 基础：控制文件与数据加载\n\n## 控制文件示例\n以下是一个简单且常见的控制文件格式，用于将分隔符数据加载到表中：\n\
  ```\n(1)  LOAD DATA\n(2)  INFILE *\n(3)  INTO TABLE DEPT\n(4)  FIELDS TERMINATED\
  \ BY ','\n(5)  (DEPTNO, DNAME, LOC)\n(6)  BEGINDATA\n(7)  10,Sales,Virginia\n(8)\
  \  20,Accounting,Virginia\n(9)  30,Consulting,Virginia\n(10) 40,Finance,Virginia\n\
  ```\n\n## 准备目标表\n要使用这个控制文件（我们将其命名为`demo1.ctl`），首先需要创建一个空的`DEPT`表：\n```\nSQL> create\
  \ table dept\n( deptno  number(2) constraint dept_pk primary key,\ndname   varchar2(14),\n\
  loc     varchar2(13));\nTable created.\n```\n\n## 执行加载命令\n运行以下命令：\n```\n$ sqlldr\
  \ userid=eoda/foo@PDB1 control=demo1.ctl\nPassword:\nPath used: Conventional\nCommit\
  \ point reached - logical record count 4\nTable DEPT:\n4 Rows successfully loaded.\n\
  Check the log file:\ndemo1.log\n```\n\n## 加载选项说明\n如果表非空，会收到类似以下的错误信息：\n```\nSQL*Loader-601:\
  \ For INSERT option, table must be empty. Error on table DEPT\n```\n\n这是因为我们在控制文件中几乎使用了所有默认设置，默认的加载选项是`INSERT`（与`APPEND`、`TRUNCATE`或`REPLACE`相对）。使用`INSERT`时，`SQLLDR`会假设表是空的。如果我们想要向`DEPT`表中*添加*记录，可以指定`APPEND`；要替换`DEPT`表中的数据，可以使用`REPLACE`或`TRUNCATE`。\n\
  \n`REPLACE`使用常规的`DELETE FROM TABLE`语句来删除记录；因此，如果目标表已经包含大量记录，执行起来可能会相当慢。`TRUNCATE`使用`TRUNCATE`\
  \ SQL 命令，通常更快，因为它不需要物理删除每一行。\n\n## 日志文件分析\n每次加载都会生成日志文件。我们这次简单加载的日志如下所示：\n```\n\
  Control File:   demo1.ctl\nData File:      demo1.ctl\nBad File:     demo1.bad\n\
  Discard File:  none specified\n(Allow all discards)\nNumber to load: ALL\nNumber\
  \ to skip: 0\nErrors allowed: 50\nBind array:     250 rows, maximum of 1048576 bytes\n\
  Continuation:    none specified\nPath used:      Conventional\nTable DEPT, loaded\
  \ from every logical record.\nInsert option in effect for this table: INSERT\nColumn\
  \ Name                  Position   Len  Term Encl Datatype\n------------------------------\
  \ ---------- ----- ---- ---- -----------------\nDEPTNO                         \
  \     FIRST     *   ,       CHARACTER\nDNAME                                NEXT\
  \     *   ,       CHARACTER\nLOC                                  NEXT     *   ,\
  \       CHARACTER\nTable DEPT:\n4 Rows successfully loaded.\n0 Rows not loaded due\
  \ to data errors.\n0 Rows not loaded because all WHEN clauses were failed.\n0 Rows\
  \ not loaded because all fields were null.\nSpace allocated for bind array:    \
  \             193500 bytes(250 rows)\nRead   buffer bytes: 1048576\nTotal logical\
  \ records skipped:          0\nTotal logical records read:             4\nTotal\
  \ logical records rejected:         0\nTotal logical records discarded:        0\n\
  ...\nElapsed time was:     00:00:00.21\nCPU time was:         00:00:00.02\n```\n\
  \n日志文件揭示了加载过程的诸多细节。我们可以看到所使用的选项（无论是默认还是指定的）。我们可以查看读取了多少记录、加载了多少记录等。日志文件指定了所有`BAD`和`DISCARD`文件的位置。它们甚至告诉我们耗时多久。这些日志文件对于验证加载是否成功以及诊断错误至关重要。\n\
  \n如果加载的数据导致了 SQL 错误（即输入数据是“坏”的并在`BAD`文件中创建了记录），这些错误也会被记录在此。日志文件中的信息基本上是自解释的，因此我们将不再花更多时间讨论它。\n\
  \n\n# 在快速模式下运行 SQLLDR\n\nSQLLDR 快速模式允许您快速将数据从 CSV 文件加载到常规数据库表中。如果您使用的模式具有 `CREATE\
  \ ANY DIRECTORY` 权限，那么快速模式将尝试使用外部表来加载数据。否则，快速模式将使用 SQLLDR 的直接路径模式来加载数据。\n\n一个简单的例子将说明这一点。假设您创建了一个表，如下所示：\n\
  \n```\n$ sqlplus eoda/foo@PDB1\nSQL> create table dept\n( deptno number(2) constraint\
  \ dept_pk primary key,\ndname  varchar2(14),\nloc    varchar2(13) );\n```\n\n并且您有以下数据存储在名为\
  \ `dept.dat` 的 CSV 文件中：\n\n```\n10,Sales,Virginia\n20,Accounting,Virginia\n30,Consulting,Virginia\n\
  40,Finance,Virginia\n```\n\n首先，我们将在用户**没有** `CREATE ANY DIRECTORY` 权限时运行此示例。SQLLDR\
  \ 快速模式通过 `TABLE` 关键字调用：\n\n```\n$ sqlldr eoda/foo@PDB1 table=dept\nExpress Mode\
  \ Load, Table: DEPT\nPath used:      External Table, DEGREE_OF_PARALLELISM=AUTO\n\
  SQL*Loader-816: error creating temporary directory object SYS_SQLLDR_XT_TMPDIR_00000\
  \ for file dept.dat\nORA-01031: insufficient privileges\nSQL*Loader-579: switching\
  \ to direct path for the load\nSQL*Loader-583: ignoring trim setting with direct\
  \ path, using value of LDRTRIM\nSQL*Loader-584: ignoring DEGREE_OF_PARALLELISM setting\
  \ with direct path, using value of NONE\nExpress Mode Load, Table: DEPT\nPath used:\
  \      Direct\nLoad completed - logical record count 4.\nTable DEPT:\n4 Rows successfully\
  \ loaded.\n```\n\n之前的输出告诉我们，该模式没有创建目录对象的权限；因此，SQLLDR 使用了其直接路径方法来加载数据。查询表确认数据已成功加载：\n\
  \n```\nSQL> select * from dept;\nDEPTNO DNAME          LOC\n---------- --------------\
  \ -------------\n10 Sales          Virginia\n20 Accounting     Virginia\n30 Consulting\
  \     Virginia\n40 Finance        Virginia\n```\n\n现在我们向用户授予 `CREATE ANY DIRECTORY`\
  \ 权限：\n\n```\n$ sqlplus system/foo@PDB1\nSQL> grant create any directory to eoda;\n\
  Grant succeeded.\n```\n\n为了再次进行设置，首先从 `DEPT` 表中删除记录：\n\n```\n$ sqlplus eoda/foo@PDB1\n\
  SQL> truncate table dept;\n```\n\n现在我们从操作系统命令行以快速模式调用 SQLLDR：\n\n```\n$ sqlldr eoda/foo@PDB1\
  \ table=dept\nExpress Mode Load, Table: DEPT\nPath used:      External Table, DEGREE_OF_PARALLELISM=AUTO\n\
  Table DEPT:\n4 Rows successfully loaded.\n```\n\n由于快速模式能够创建目录对象，一个使用 `dept.dat`\
  \ 作为其数据源的外部表通过 `INSERT` 语句被访问，以将数据加载到 `DEPT` 表中。加载完成后，外部表被删除。\n\n执行上述步骤所需的所有代码都会生成并记录在\
  \ `dept.log` 文件中。当以快速模式运行 SQLLDR 时，此文件会自动为您生成。如果您只希望 SQL*Loader 生成日志文件而不执行其内容，则指定\
  \ `EXTERNAL_TABLE=GENERATE_ONLY` 选项。例如：\n\n```\n$ sqlldr eoda/foo@PDB1 table=dept\
  \ external_table=generate_only\n```\n\n如果您检查 `dept.log` 文件，您将看到生成的代码。首先，是一个 SQLLDR\
  \ 控制文件（SQLLDR 控制文件在本章的“SQLLDR”部分有详细描述）：\n\n```\nOPTIONS(EXTERNAL_TABLE=EXECUTE,\
  \ TRIM=LRTRIM)\nLOAD DATA\nINFILE 'dept'\nAPPEND\nINTO TABLE DEPT\nFIELDS TERMINATED\
  \ BY \",\"\n(\nDEPTNO,\nDNAME,\nLOC\n)\n```\n\n接下来是用于创建外部表的 SQL：\n\n```\nCREATE\
  \ TABLE \"SYS_SQLLDR_X_EXT_DEPT\"\n(\n\"DEPTNO\" NUMBER(2),\n\"DNAME\" VARCHAR2(14),\n\
  \"LOC\" VARCHAR2(13)\n)\nORGANIZATION external\n(\nTYPE oracle_loader\nDEFAULT DIRECTORY\
  \ SYS_SQLLDR_XT_TMPDIR_00000\nACCESS PARAMETERS\n(\nRECORDS DELIMITED BY NEWLINE\
  \ CHARACTERSET US7ASCII\nBADFILE 'SYS_SQLLDR_XT_TMPDIR_00000':'dept_%p.bad'\nLOGFILE\
  \ 'dept_%p.log_xt'\nREADSIZE 1048576\nFIELDS TERMINATED BY \",\" LRTRIM\nREJECT\
  \ ROWS WITH ALL NULL FIELDS\n(\n\"DEPTNO\" CHAR(255),\n\"DNAME\" CHAR(255),\n\"\
  LOC\" CHAR(255)\n)\n)\nlocation\n(\n'dept.dat'\n)\n)REJECT LIMIT UNLIMITED\n```\n\
  \n然后是一个直接路径 `INSERT` 语句，可用于将数据从外部表加载到常规数据库表中（在此示例中为 `DEPT`）：\n\n```\nINSERT /*+\
  \ append parallel(auto) */ INTO DEPT\n(\nDEPTNO,\nDNAME,\nLOC\n)\nSELECT\n\"DEPTNO\"\
  ,\n\"DNAME\",\n\"LOC\"\nFROM \"SYS_SQLLDR_X_EXT_DEPT\"\n```\n\n最后，临时表和目录对象被删除：\n\
  \n```\nDROP TABLE \"SYS_SQLLDR_X_EXT_DEPT\"\nDROP DIRECTORY SYS_SQLLDR_XT_TMPDIR_00000\n\
  ```\n\n思路是，当您使用 `EXTERNAL_TABLE=GENERATE_ONLY` 以快速模式运行 SQLLDR 时，您可以使用日志文件的内容手动从\
  \ SQL 运行这些 SQL 语句（如果需要）。\n\n提示\n\n有关 SQLLDR 快速模式可用所有选项的完整详细信息，请参阅《*Oracle Database\
  \ Utilities*》手册。\n\n# 使用 SQLLDR 加载数据的常见问题解答\n\n我们现在将介绍我发现的关于使用 SQLLDR 在 Oracle 数据库中加载数据时最常被问到的问题。\n\
  \n## 为什么我的日志文件中会出现 “exceeds maximum length”？\n\n这也许是我听到的关于 SQLLDR 最常重复出现的问题：为什么我的日志文件包含类似以下内容？\n\
  \n```\nRecord 4: Rejected - Error on table DEPT, column DNAME.\nField in data file\
  \ exceeds maximum length\n```\n\n这是由于 SQLLDR 处理输入记录的默认数据类型是 `char(255)`。如果您的表中有任何字符串数据类型超过该长度，您必须明确告诉\
  \ SQLLDR 输入记录可以包含超过 255 个字符。\n\n例如，假设您添加了一个可以容纳超过 255 个字符的列：\n\n```\nSQL> alter\
  \ table dept modify dname varchar2(1000);\nTable altered.\n```\n\n并且您有一个如下所示的控制文件（其中包含更多重复文本的行是该输入文件中的单行）：\n\
  \n```\nLOAD DATA\nINFILE *\nINTO TABLE DEPT\nFIELDS TERMINATED BY ','\n(DEPTNO,\
  \ DNAME, LOC)\nBEGINDATA\n10,Sales,Virginia\n20,Accounting,Virginia\n30,Consulting,Virginia\n\
  40,Finance more text more text more text more ...  ...more text,Virginia\n```\n\n\
  当您运行 SQLLDR 时，您会收到之前的错误消息。解决方案相当简单：\n\n```\nLOAD DATA\nINFILE *\nINTO TABLE DEPT\n\
  FIELDS TERMINATED BY ','\n(DEPTNO, DNAME char(1000), LOC)\nBEGINDATA ...\n```\n\n\
  就是这样！只需告诉 SQLLDR 输入记录中字段的最大宽度——在本例中为 1000。\n\n\n\n# 如何加载分隔数据？\n\n分隔数据（即由特定字符分隔并可能用引号括起的数据）是当今平面文件最流行的数据格式。在大型机上，固定长度、固定格式的文件可能是最广为人知的文件格式，但在\
  \ UNIX/Linux 和 Windows 系统上，分隔文件才是常态。本节中，我们将探讨用于加载分隔数据的常用选项。\n\n分隔数据最流行的格式是逗号分隔值（CSV）格式。在此文件格式中，数据的每个字段都以逗号与下一个字段分隔。文本字符串可以用引号括起来，从而允许字符串本身包含逗号。如果字符串还必须包含引号，惯例是使用双写引号（在下面的代码中，我们用\
  \ `\"\"` 代替单个 `\"`）。一个典型的加载分隔数据的控制文件将类似于我们前面第一个例子，但 `FIELDS TERMINATED BY` 子句通常会这样指定：\n\
  \n```\nFIELDS TERMINATED BY ',' OPTIONALLY ENCLOSED BY '\"'\n```\n\n它指定数据字段由逗号分隔，并且每个字段*可能*被双引号括起来。假设我们要将此控制文件的底部修改为如下内容：\n\
  \n```\nFIELDS TERMINATED BY ',' OPTIONALLY ENCLOSED BY '\"'\n(DEPTNO, DNAME, LOC)\n\
  BEGINDATA\n10,Sales,\"Virginia,USA\"\n20,Accounting,\"Va, \"\"USA\"\"\"\n30,Consulting,Virginia\n\
  40,Finance,Virginia\n```\n\n当我们使用此控制文件运行 `SQLLDR` 时，结果如下：\n\n```\nSQL> select *\
  \ from dept;\nDEPTNO DNAME          LOC\n---------- -------------- -------------\n\
  10 Sales          Virginia,USA\n20 Accounting     Va, \"USA\"\n30 Consulting   \
  \  Virginia\n40 Finance        Virginia\n```\n\n请特别注意以下几点：\n\n*   部门 `10` 中的 `Virginia,USA`：这是由输入数据\
  \ `\"Virginia,USA\"` 导致的。此输入数据字段必须用引号括起来，以保留逗号作为数据的一部分。否则，逗号将被视为字段结束标记，`Virginia`\
  \ 将在加载时不包含 `USA` 文本。\n\n*   `Va, \"USA\"`：这是由输入数据 `\"Va, \"\"USA\"\"\"` 导致的。`SQLLDR`\
  \ 将双写的 `\"` 视为括起字符串内的单个 `\"`。要加载包含可选括起字符的字符串，必须确保该括起字符是双写的。\n\n另一种流行的格式是制表符分隔数据，即数据由制表符而非逗号分隔。使用\
  \ `TERMINATED BY` 子句加载此数据有两种方法：\n\n*   `TERMINATED BY X'09'`（使用十六进制格式的制表符；在 ASCII\
  \ 中，`9` 是制表符）\n\n*   `TERMINATED BY WHITESPACE`\n\n两者在实现上非常不同，如下所示。使用之前相同的 `DEPT`\
  \ 表，我们将使用以下控制文件进行加载：\n\n```\nLOAD DATA\nINFILE *\nINTO TABLE DEPT\nREPLACE\nFIELDS\
  \ TERMINATED BY WHITESPACE\n(DEPTNO, DNAME, LOC)\nBEGINDATA\n10 Sales Virginia\n\
  ```\n\n虽然在页面上不易看出，但这里每个数据项之间有*两个*制表符。数据行实际如下，其中 `\\t` 是通用的制表符转义序列：\n\n```\n10\\\
  t\\tSales\\t\\tVirginia\n```\n\n当您使用前面这样的带有 `TERMINATED BY WHITESPACE` 子句的控制文件时，表\
  \ `DEPT` 中的结果数据如下：\n\n```\nSQL> select * from dept;\nDEPTNO DNAME          LOC\n\
  ---------- -------------- -------------\n10 Sales          Virginia\n```\n\n`TERMINATED\
  \ BY WHITESPACE` 通过查找第一个空白字符（制表符、空格或换行符）来解析字符串，然后继续直到找到下一个*非*空白字符。因此，在解析数据时，`DEPTNO`\
  \ 被赋值为 `10`，随后的两个制表符被视为空白，`Sales` 被赋值给 `DNAME`，依此类推。\n\n另一方面，假设您使用 `FIELDS TERMINATED\
  \ BY X'09'`，如下修改后的控制文件所示：\n\n```\n...\nFIELDS TERMINATED BY X'09'\n(DEPTNO, DNAME,\
  \ LOC)\n...\n```\n\n您会发现 `DEPT` 加载了以下数据：\n\n```\nSQL> select * from dept;\nDEPTNO\
  \ DNAME          LOC\n---------- -------------- -------------\n10              \
  \  Sales\n```\n\n这里，`SQLLDR` 一旦遇到制表符就输出一个值。因此，`10` 被赋值给 `DEPTNO`，而 `DNAME` 得到 `NULL`，因为在第一个制表符和下一个制表符出现之间没有数据。`Sales`\
  \ 被赋值给 `LOC`。\n\n这正是 `TERMINATED BY WHITESPACE` 和 `TERMINATED BY <character>` 的预期行为。哪种更合适取决于输入数据以及您需要如何解释它。\n\
  \n最后，加载此类分隔数据时，通常需要跳过输入记录中的各个列。例如，您可能想加载第 1、3 和 5 个字段，跳过第 2 和第 4 列。为此，`SQLLDR` 提供了\
  \ `FILLER` 关键字。它允许您映射输入记录中的列，但不将其放入数据库。例如，给定 `DEPT` 表和前面最后一个控制文件，我们可以使用 `FILLER`\
  \ 关键字修改控制文件以正确加载数据（跳过制表符）：\n\n```\nLOAD DATA\nINFILE *\nINTO TABLE DEPT\nREPLACE\n\
  FIELDS TERMINATED BY x'09'\n(DEPTNO, dummy1 filler, DNAME, dummy2 filler, LOC)\n\
  BEGINDATA\n10      Sales       Virginia\n```\n\n生成的 `DEPT` 表现在如下所示：\n\n```\nSQL>\
  \ select * from dept;\nDEPTNO DNAME          LOC\n---------- -------------- -------------\n\
  10 Sales          Virginia\n```\n\n\n\n## 如何加载固定格式数据？\n\n通常，你会拥有一个由某些外部系统生成的平面文件，该文件是具有位置数据的定长文件。例如，`NAME`字段位于第\
  \ 1 到第 10 字节，`ADDRESS`字段位于第 11 到第 35 字节，依此类推。我们将了解 SQLLDR 如何为此类数据进行导入。\n\n这种固定宽度的位置数据是\
  \ SQLLDR 加载的最佳数据格式。由于输入数据流的解析相对简单，这将是最快速的处理方式。SQLLDR 会存储数据记录中的固定字节偏移量和长度，提取给定字段非常简单。如果你有极大数量的数据需要加载，将其转换为固定位置格式通常是最好的方法。当然，固定宽度文件的缺点是，它可能比简单的、带分隔符的文件格式大得多。\n\
  \n要加载固定宽度的位置数据，你需要在控制文件中使用`POSITION`关键字，例如：\n\n```\nLOAD DATA\nINFILE *\nINTO TABLE\
  \ DEPT\nREPLACE\n( DEPTNO position(1:2),\nDNAME  position(3:16),\nLOC    position(17:29)\n\
  )\nBEGINDATA\n10Accounting    Virginia,USA\n```\n\n这个控制文件没有使用`FIELDS TERMINATED\
  \ BY`子句；而是使用`POSITION`来告诉 SQLLDR 字段的起始和结束位置。请注意，使用`POSITION`子句时，我们可以使用重叠的位置并在记录中前后移动。例如，假设我们如下修改`DEPT`表：\n\
  \n```\nSQL> alter table dept add entire_line varchar2(29);\nTable altered.\n```\n\
  \n然后使用以下控制文件：\n\n```\nLOAD DATA\nINFILE *\nINTO TABLE DEPT\nREPLACE\n( DEPTNO  \
  \    position(1:2),\nDNAME       position(3:16),\nLOC         position(17:29),\n\
  ENTIRE_LINE position(1:29)\n)\nBEGINDATA\n10Accounting    Virginia,USA\n```\n\n\
  字段`ENTIRE_LINE`被定义为`POSITION(1:29)`。它从全部 29 个字节的输入数据中提取数据，而其他字段是输入数据的子字符串。这个控制文件的结果如下：\n\
  \n```\nSQL> select * from dept;\nDEPTNO DNAME          LOC           ENTIRE_LINE\n\
  ---------- -------------- ------------- -----------------------------\n10 Accounting\
  \     Virginia,USA  10Accounting    Virginia,USA\n```\n\n使用`POSITION`时，我们可以使用相对或绝对偏移量。在前面的例子中，我们使用了绝对偏移量。我们特别指明了字段的开始和结束位置。我们也可以将前面的控制文件改写如下：\n\
  \n```\nLOAD DATA\nINFILE *\nINTO TABLE DEPT\nREPLACE\n( DEPTNO      position(1:2),\n\
  DNAME       position(*:16),\nLOC         position(*:29),\nENTIRE_LINE position(1:29)\n\
  )\nBEGINDATA\n10Accounting    Virginia,USA\n```\n\n`*`指示控制文件从上一个字段结束的地方继续。因此`(*:16)`在这种情况下与`(3:16)`完全相同。请注意，你可以在控制文件中混合使用相对和绝对位置。此外，当使用`*`符号时，你可以对偏移量进行加减。例如，如果`DNAME`在`DEPTNO`结束**之后**2\
  \ 个字节开始，我们可以使用`(*+2:16)`。在这个例子中，效果与使用`(5:16)`相同。\n\n`POSITION`子句中的结束位置必须是数据结束的绝对列位置。有时，特别是当字段连续时（如前面的例子），仅指定每个字段的长度会更容易。这样，我们只需告诉\
  \ SQLLDR 记录从第 1 字节开始，然后指定每个字段的长度。这将省去计算记录中起始和结束字节偏移量的麻烦，而这有时可能很困难。为了做到这一点，我们将省略结束位置，改为在定长记录中指定每个字段的*长度*，如下所示：\n\
  \n```\nLOAD DATA\nINFILE *\nINTO TABLE DEPT\nREPLACE\n( DEPTNO      position(1)\
  \ char(2),\nDNAME       position(*) char(14),\nLOC         position(*) char(13),\n\
  ENTIRE_LINE position(1) char(29)\n)\nBEGINDATA\n10Accounting    Virginia,USA\n```\n\
  \n在这里，我们只需告诉 SQLLDR 第一个字段的开始位置及其长度。每个后续字段都从上一个字段结束的地方开始，并持续指定的长度。直到最后一个字段，我们才需要再次指定位置，因为该字段回到了记录的开始。\n\
  \n## 如何加载日期？\n\n使用 SQLLDR 加载日期相当简单，但这似乎是一个常见的混淆点。你只需要在控制文件中使用`DATE`数据类型，并指定要使用的日期掩码。这个日期掩码与你在数据库中与`TO_CHAR`和`TO_DATE`一起使用的掩码相同。SQLLDR\
  \ 会将此日期掩码应用于你的数据并为你加载。\n\n例如，假设我们再次修改`DEPT`表，如下所示：\n\n```\nSQL> alter table dept\
  \ add last_updated date;\nTable altered.\n```\n\n我们可以使用以下控制文件加载它：\n\n```\nLOAD DATA\n\
  INFILE *\nINTO TABLE DEPT\nREPLACE\nFIELDS TERMINATED BY ','\n(DEPTNO,\nDNAME,\n\
  LOC,\nLAST_UPDATED date 'dd/mm/yyyy'\n)\nBEGINDATA\n10,Sales,Virginia,1/5/2014\n\
  20,Accounting,Virginia,21/6/2014\n30,Consulting,Virginia,5/1/2013\n40,Finance,Virginia,15/3/2014\n\
  ```\n\n结果`DEPT`表将如下所示：\n\n```\nSQL> select * from dept;\nDEPTNO DNAME          LOC\
  \           LAST_UPDA\n---------- -------------- ------------- ---------\n10 Sales\
  \          Virginia      01-MAY-14\n20 Accounting     Virginia      21-JUN-14\n\
  30 Consulting     Virginia      05-JAN-13\n40 Finance        Virginia      15-MAR-14\n\
  ```\n\n就是这么简单。只需在控制文件中提供格式，SQLLDR 就会为我们转换日期。在某些情况下，使用更强大的 SQL 函数可能是合适的。例如，你的输入文件可能包含多种不同格式的日期：有时带时间组件，有时不带；有时是`DD-MON-YYYY`格式；有时是`DD/MM/YYYY`格式；等等。你将在下一节中学习如何在\
  \ SQLLDR 中使用函数来应对这些挑战。\n\n\n# 如何使用函数加载数据？\n\n## 在 SQLLDR 中使用函数\n\n在本节中，您将看到如何在加载数据时引用函数。但请记住，此类函数（包括数据库序列）的使用需要\
  \ SQL 引擎，因此在直接路径加载中无法工作。\n\n一旦理解了 `SQLLDR` 如何构建其 `INSERT` 语句，在 `SQLLDR` 中使用函数就非常容易。要在\
  \ `SQLLDR` 脚本中对某个字段应用函数，只需将其以双引号添加到控制文件中。例如，假设您有之前的 `DEPT` 表，并且您希望确保加载的数据为大写形式。您可以使用以下控制文件来加载它：\n\
  \n```\nLOAD DATA\nINFILE *\nINTO TABLE DEPT\nREPLACE\nFIELDS TERMINATED BY ','\n\
  (DEPTNO,\nDNAME        \"upper(:dname)\",\nLOC          \"upper(:loc)\",\nLAST_UPDATED\
  \ date 'dd/mm/yyyy'\n)\nBEGINDATA\n10,Sales,Virginia,1/5/2014\n20,Accounting,Virginia,21/6/2014\n\
  30,Consulting,Virginia,5/1/2013\n40,Finance,Virginia,15/3/2014\n```\n\n数据库中的结果数据将如下所示：\n\
  \n```\nSQL> select * from dept;\nDEPTNO DNAME          LOC           LAST_UPDA ENTIRE_LINE\n\
  ---------- -------------- ------------- --------- -----------\n10 SALES        \
  \  VIRGINIA      01-MAY-14\n20 ACCOUNTING     VIRGINIA      21-JUN-14\n30 CONSULTING\
  \     VIRGINIA      05-JAN-13\n40 FINANCE        VIRGINIA      15-MAR-14\n```\n\n\
  请注意，通过将 `UPPER` 函数应用于绑定变量，您可以轻松地将数据转换为大写。值得注意的是，SQL 函数可以引用任何列，而不受该函数实际应用列的限制。这意味着一个列可以是基于另外两个或多个列的函数计算结果。\n\
  \n## 使用 `TRAILING NULLCOLS`\n\n例如，如果您想加载 `ENTIRE_LINE` 列，可以使用 SQL 连接运算符。不过，在这种情况下，它比那要稍微复杂一些。当前，输入数据集中有四个数据元素。假设您只是像这样将\
  \ `ENTIRE_LINE` 添加到控制文件中：\n\n```\nLOAD DATA\nINFILE *\nINTO TABLE DEPT\nREPLACE\n\
  FIELDS TERMINATED BY ','\n(DEPTNO,\nDNAME        \"upper(:dname)\",\nLOC       \
  \   \"upper(:loc)\",\nLAST_UPDATED date 'dd/mm/yyyy',\nENTIRE_LINE  \":deptno||:dname||:loc||:last_updated\"\
  \n)\nBEGINDATA\n10,Sales,Virginia,1/5/2014\n20,Accounting,Virginia,21/6/2014\n30,Consulting,Virginia,5/1/2013\n\
  40,Finance,Virginia,15/3/2014\n```\n\n您会发现日志文件中每条输入记录都出现此错误：\n\n```\nRecord 1: Rejected\
  \ - Error on table DEPT, column ENTIRE_LINE.\nColumn not found before end of logical\
  \ record (use TRAILING NULLCOLS)\n```\n\n这里，`SQLLDR` 是在告诉您，它在用完列之前就已用完记录中的数据。在这种情况下，解决方案很简单，实际上\
  \ `SQLLDR` 甚至告诉了我们该怎么做：使用 `TRAILING NULLCOLS`。如果输入记录中没有数据，这将使 `SQLLDR` 为该列绑定一个 `NULL`\
  \ 值。在这种情况下，添加 `TRAILING NULLCOLS` 将导致绑定变量 `:ENTIRE_LINE` 为 `NULL`。因此，您使用此控制文件重试：\n\
  \n```\nLOAD DATA\nINFILE *\nINTO TABLE DEPT\nREPLACE\nFIELDS TERMINATED BY ','\n\
  TRAILING NULLCOLS\n(DEPTNO,\nDNAME        \"upper(:dname)\",\nLOC          \"upper(:loc)\"\
  ,\nLAST_UPDATED date 'dd/mm/yyyy',\nENTIRE_LINE  \":deptno||:dname||:loc||:last_updated\"\
  \n)\nBEGINDATA\n10,Sales,Virginia,1/5/2014\n20,Accounting,Virginia,21/6/2014\n30,Consulting,Virginia,5/1/2013\n\
  40,Finance,Virginia,15/3/2014\n```\n\n现在表中的数据如下：\n\n```\nSQL> select * from dept;\n\
  DEPTNO DNAME          LOC           LAST_UPDA ENTIRE_LINE\n---------- --------------\
  \ ------------- --------- -------------------------\n10 SALES          VIRGINIA\
  \      01-MAY-14 10SalesVirginia1/5/2014\n20 ACCOUNTING     VIRGINIA      21-JUN-14\
  \ 20AccountingVirginia21/6/2014\n30 CONSULTING     VIRGINIA      05-JAN-13 30ConsultingVirginia5/1/2013\n\
  40 FINANCE        VIRGINIA      15-MAR-14 40FinanceVirginia15/3/2014\n```\n\n##\
  \ `SQLLDR` 如何构建 `INSERT`\n\n实现这一功能的关键在于 `SQLLDR` 构建其 `INSERT` 语句的方式。`SQLLDR` 会查看前面的控制文件，看到\
  \ `DEPTNO`、`DNAME`、`LOC`、`LAST_UPDATED` 和 `ENTIRE_LINE` 列。它将设置五个以这些列命名的绑定变量。通常，在没有任何函数的情况下，它构建的\
  \ `INSERT` 语句很简单：\n\n```\nINSERT INTO DEPT ( DEPTNO, DNAME, LOC, LAST_UPDATED, ENTIRE_LINE\
  \ )\nVALUES ( :DEPTNO, :DNAME, :LOC, :LAST_UPDATED, :ENTIRE_LINE );\n```\n\n然后，它会解析输入流，将值分配给其绑定变量，并执行该语句。当您开始使用函数时，`SQLLDR`\
  \ 会将它们纳入其 `INSERT` 语句中。在前面的示例中，`SQLLDR` 构建的 `INSERT` 语句将如下所示：\n\n```\nINSERT INTO\
  \ T (DEPTNO, DNAME, LOC, LAST_UPDATED, ENTIRE_LINE)\nVALUES ( :DEPTNO, upper(:dname),\
  \ upper(:loc), :last_updated,\n:deptno||:dname||:loc||:last_updated );\n```\n\n\
  然后，它准备此语句，将输入绑定到该语句并执行它。因此，几乎所有您能想到的 SQL 操作，都可以整合到您的 `SQLLDR` 脚本中。\n\n## 使用 `CASE`\
  \ 处理复杂逻辑\n\n随着 SQL 中 `CASE` 语句的加入，执行此类操作变得极其强大且简单。例如，假设您的输入文件中的日期可能有以下格式：\n\n* \
  \  `HH24:MI:SS`：仅时间；日期应默认为当月第一天。\n*   `DD/MM/YYYY`：仅日期；时间应默认为午夜。\n*   `HH24:MI:SS\
  \ DD/MM/YYYY`：日期和时间都明确提供。\n\n您可以使用这样的控制文件：\n\n```\nLOAD DATA\nINFILE *\nINTO TABLE\
  \ DEPT\nREPLACE\nFIELDS TERMINATED BY ','\nTRAILING NULLCOLS\n(DEPTNO,\nDNAME  \
  \      \"upper(:dname)\",\nLOC          \"upper(:loc)\",\nLAST_UPDATED\n\"case\n\
  when length(:last_updated) > 9\nthen to_date(:last_updated,'hh24:mi:ss dd/mm/yyyy')\n\
  when instr(:last_updated,':') > 0\nthen to_date(:last_updated,'hh24:mi:ss')\nelse\
  \ to_date(:last_updated,'dd/mm/yyyy')\nend\"\n)\nBEGINDATA\n10,Sales,Virginia,12:03:03\
  \ 17/10/2014\n20,Accounting,Virginia,02:23:54\n30,Consulting,Virginia,01:24:00 21/10/2014\n\
  40,Finance,Virginia,17/8/2014\n```\n\n这会产生以下结果：\n\n```\nSQL> alter session set nls_date_format\
  \ = 'dd-mon-yyyy hh24:mi:ss';\nSession altered.\nSQL> select deptno, dname, loc,\
  \ last_updated from dept;\nDEPTNO DNAME                          LOC           LAST_UPDATED\n\
  ------ ------------------------------ ------------- --------------------\n10 SALES\
  \                          VIRGINIA      17-oct-2014 12:03:03\n20 ACCOUNTING   \
  \                  VIRGINIA      01-mar-2014 02:23:54\n30 CONSULTING           \
  \          VIRGINIA      21-oct-2014 01:24:00\n40 FINANCE                      \
  \  VIRGINIA      17-aug-2014 00:00:00\n```\n\n现在，将对输入字符串应用三种日期格式之一（请注意，您*不再*加载 `DATE`；您只是在加载一个字符串）。`CASE`\
  \ 函数将根据字符串的长度和内容来确定应使用哪种格式掩码。\n\n## 调用用户定义函数\n\n有趣的是，您可以编写*自己的*函数供 `SQLLDR` 调用。这是\
  \ PL/SQL 可以从 SQL 中调用这一事实的直接应用。\n\n#### 如何加载包含换行符的数据？\n\n这在历史上一直是 `SQLLDR` 的一个难题：如何加载可能包含换行符的自由格式数据。换行符是\
  \ `SQLLDR` 默认的行结束符，而过去的解决方法灵活性有限。加载包含换行符数据的选项如下：\n\n*   在数据中使用某个其他字符来代表换行符（例如，在文本中应出现换行符的位置放置字符串\
  \ `\\n`），并在加载时使用 SQL 函数将该文本替换为 `CHR(10)`。\n*   在 `INFILE` 指令上使用 `FIX` 属性，并加载定长平面文件。这种情况下，没有记录终止符；而是利用每条记录长度都与其他记录完全相同这一事实来确定记录的开始和结束位置。\n\
  *   在 `INFILE` 指令上使用 `VAR` 属性，并加载可变宽度文件。这种文件采用一种格式，其中每行的前几个字节指定了后续行的字节长度。\n*   在\
  \ `INFILE` 指令上使用 `STR` 属性来加载可变宽度文件，该文件使用某个字符序列表示行尾，而不是仅用换行符来表示。\n\n以下各节将依次演示每种方法。\n\
  \n##### 使用换行符以外的字符\n\n如果您能控制输入数据的生成方式，这是一种简单的方法。如果在创建数据文件时转换数据足够容易，这种方法会很有效。其思路是在数据进入数据库的过程中应用\
  \ SQL 函数，将某个字符串替换为换行符。让我们为 `DEPT` 表添加另一列：\n\n```sql\nSQL> alter table dept add comments\
  \ varchar2(4000);\nTable altered.\n```\n\n我们将使用这一列来加载文本。一个包含内联数据的示例控制文件可能如下所示：\n\
  \n```\nLOAD DATA\nINFILE *\nINTO TABLE DEPT\nREPLACE\nFIELDS TERMINATED BY ','\n\
  TRAILING NULLCOLS\n(DEPTNO,\nDNAME        \"upper(:dname)\",\nLOC          \"upper(:loc)\"\
  ,\nCOMMENTS     \"replace(:comments,'\\\\n',chr(10))\"\n)\nBEGINDATA\n10,Sales,Virginia,This\
  \ is the Sales\\nOffice in Virginia\n20,Accounting,Virginia,This is the Accounting\\\
  nOffice in Virginia\n30,Consulting,Virginia,This is the Consulting\\nOffice in Virginia\n\
  40,Finance,Virginia,This is the Finance\\nOffice in Virginia\n```\n\n请注意，在调用 `replace`\
  \ 函数时，我们不得不使用 `\\\\n`，而不仅仅是 `\\n`。这是因为 `\\n` 被 `SQLLDR` 识别为换行符，`SQLLDR` 会将其转换为真正的换行符，而不是一个两字符的字符串。当我们使用前面的控制文件执行\
  \ `SQLLDR` 时，`DEPT` 表的加载结果如下：\n\n```sql\nSQL> select deptno, dname, comments from\
  \ dept;\nDEPTNO DNAME          COMMENTS\n---------- -------------- ------------------------------\n\
  10 SALES          This is the Sales\nOffice in Virginia\n20 ACCOUNTING     This\
  \ is the Accounting\nOffice in Virginia\n30 CONSULTING     This is the Consulting\n\
  Office in Virginia\n40 FINANCE        This is the Finance\nOffice in Virginia\n\
  ```\n\n##### 使用 FIX 属性\n\n`FIX` 属性是另一种可用的方法。如果我们使用它，输入数据必须以定长记录的形式出现。每条记录必须与输入数据集中的任何其他记录具有完全相同的字节数。当使用*位置型*数据时，使用\
  \ `FIX` 属性尤其有效。这些文件通常一开始就是定长输入文件。当使用自由格式的分隔数据时，我们不太可能拥有定长文件，因为这些文件通常长度可变（这正是分隔文件的目的：使每行只占据其所需的大小）。\n\
  \n使用 `FIX` 属性时，我们必须使用 `INFILE` 子句，因为它是 `INFILE` 子句的一个选项。此外，使用此选项时，数据必须存储在外部，不能存储在控制文件本身中。因此，假设我们有定长输入记录，可以使用如下控制文件：\n\
  \n```\nLOAD DATA\nINFILE demo.dat \"fix 80\"\nINTO TABLE DEPT\nREPLACE\nFIELDS TERMINATED\
  \ BY ','\nTRAILING NULLCOLS\n(DEPTNO,\nDNAME        \"upper(:dname)\",\nLOC    \
  \      \"upper(:loc)\",\nCOMMENTS\n)\n```\n\n此文件指定输入数据文件的记录长度将为 80 字节。*这包括末尾可能存在的换行符*。在这种情况下，换行符在输入数据文件中并不特殊。它只是另一个要加载或忽略的字符。需要理解的是：记录末尾的换行符（如果存在）将成为记录的一部分。为了完全理解这一点，我们需要一个工具在屏幕上转储文件内容，以便查看其中的实际内容。在任何\
  \ `UNIX`/`Linux` 变体上，使用 `od` 程序（一个以八进制和其他格式将文件转储到屏幕的程序）很容易做到这一点。我们将使用以下 `demo.dat`\
  \ 文件。请注意，以下输出中的第一列实际上是八进制（基数 8），因此第二行的数字 `0000012` 是八进制，代表十进制数字 `10`。这告诉我们正在查看文件中的哪个字节。我已将输出格式化为每行显示十个字符（使用\
  \ `-w10`），因此 `0`、`12`、`24` 和 `36` 实际上是 `0`、`10`、`20` 和 `30`：\n\n```bash\n$ od -c\
  \ -w10 -v demo.dat\n0000000   1   0   ,   S   a   l   e   s   ,   V\n0000012   i\
  \   r   g   i   n   i   a   ,   T   h\n0000024   i   s       i   s       t   h \
  \  e\n0000036   S   a   l   e   s  \\n   O   f   f   i\n0000050   c   e       i\
  \   n       V   i   r   g\n0000062   i   n   i   a\n\n0000120   2   0   ,   A  \
  \ c   c   o   u   n   t\n0000132   i   n   g   ,   V   i   r   g   i   n\n0000144\
  \   i   a   ,   T   h   i   s       i   s\n0000156       t   h   e       A   c \
  \  c   o   u\n0000170   n   t   i   n   g  \\n   O   f   f   i\n0000202   c   e\
  \       i   n       V   i   r   g\n0000214   i   n   i   a\n\n0000240   3   0  \
  \ ,   C   o   n   s   u   l   t\n0000252   i   n   g   ,   V   i   r   g   i   n\n\
  0000264   i   a   ,   T   h   i   s       i   s\n0000276       t   h   e       C\
  \   o   n   s   u\n0000310   l   t   i   n   g  \\n   O   f   f   i\n0000322   c\
  \   e       i   n       V   i   r   g\n0000334   i   n   i   a\n\n0000360   4  \
  \ 0   ,   F   i   n   a   n   c   e\n0000372   ,   V   i   r   g   i   n   i   a\
  \   ,\n0000404   T   h   i   s       i   s       t   h\n0000416   e       F   i\
  \   n   a   n   c   e  \\n\n0000430   O   f   f   i   c   e       i   n\n0000442\
  \   V   i   r   g   i   n   i   a\n```\n\n请注意，在此输入文件中，换行符 (`\\n`) 并非用于指示 `SQLLDR`\
  \ 记录的结束位置；相反，在此情况下它们只是要加载的数据。`SQLLDR` 使用 `FIX` 宽度 80 字节来确定要读取的数据量。事实上，如果我们查看输入数据，`SQLLDR`\
  \ 的记录甚至不是由 `\\n` 终止的。部门 20 的记录之前的字符是一个空格，而不是换行符。\n\n现在我们知道每条记录都是 80 字节长，就可以使用前面列出的带有\
  \ `FIX 80` 子句的控制文件来加载它。执行后，我们可以看到以下结果：\n\n```sql\nSQL> select '\"' || comments ||\
  \ '\"' comments from dept;\nCOMMENTS\n--------------------------------------------------------------------------------\n\
  \"This is the Sales\nOffice in Virginia                          \"\n\"This is the\
  \ Accounting\nOffice in Virginia                \"\n\"This is the Consulting\nOffice\
  \ in Virginia                \"\n\"This is the Finance\nOffice in Virginia     \
  \                 \"\n```\n\n您可能需要*修剪*这些数据，因为尾部空白符被保留了下来。您可以在控制文件中使用内置的 `SQL` 函数\
  \ `TRIM` 来完成此操作。\n\n给那些有幸同时在 `Windows` 和 `UNIX`/`Linux` 上工作的人一个提醒：这些平台上的行尾标记是不同的。在\
  \ `UNIX`/`Linux` 上，它只是 `\\n`（SQL 中的 `CHR(10)`）。在 `Windows`/`DOS` 上，它是 `\\r\\n`（SQL\
  \ 中的 `CHR(13)||CHR(10)`）。一般来说，如果您使用 `FIX` 方法，请确保在同构平台（`UNIX`/`Linux` 和 `UNIX`/`Linux`，或者\
  \ `Windows` 和 `Windows`）上*创建和加载*文件。\n\n\n### 使用 VAR 属性\n\n另一种加载包含嵌入式换行符的数据的方法是使用\
  \ `VAR` 属性。使用此格式时，每条记录都将以一些固定数量的字节开始，这些字节代表传入记录的总长度。通过这种格式，我们可以加载包含嵌入式换行符的变长记录，但前提是我们需要在`每条`记录的开头有一个`记录长度字段`。因此，假设我们使用如下的控制文件：\n\
  \n```\nLOAD DATA\nINFILE demo.dat \"var 3\"\nINTO TABLE DEPT\nREPLACE\nFIELDS TERMINATED\
  \ BY ','\nTRAILING NULLCOLS\n(DEPTNO,\nDNAME        \"upper(:dname)\",\nLOC    \
  \      \"upper(:loc)\",\nCOMMENTS\n)\n```\n\n那么，`VAR 3` 表示每条输入记录的前 3 个字节包含了该输入记录的长度。如果我们使用如下所示的数据文件，就可以使用该控制文件加载它：\n\
  \n```\n$ cat demo.dat\n05510,Sales,Virginia,This is the Sales\nOffice in Virginia\n\
  06520,Accounting,Virginia,This is the Accounting\nOffice in Virginia\n06530,Consulting,Virginia,This\
  \ is the Consulting\nOffice in Virginia\n05940,Finance,Virginia,This is the Finance\n\
  Office in Virginia\n```\n\n在我们的输入数据文件中，有四行数据。第一行以 `055` 开头，表示接下来的 55 个字节代表第一条输入记录。这\
  \ 55 个字节包括了单词 `Virginia` 之后的终止换行符。下一行以 `065` 开头。它有 65 个字节的文本，依此类推。使用这种格式的数据文件，我们可以轻松加载包含嵌入式换行符的数据。\n\
  \n同样，如果您使用的是 UNIX/Linux 和 Windows（前面的示例是针对 UNIX/Linux 的，其换行符长度为一个字符），您将需要为每条记录调整长度字段。在\
  \ Windows 上，前面示例中的 `.dat` 文件在长度字段中的值必须包含 56、66、66 和 60。\n\n### 使用 STR 属性\n\n这可能是加载包含嵌入式换行符数据最灵活的方法。使用\
  \ `STR` 属性，我们可以指定一个新的行尾字符（或字符序列）。这使我们能够创建一个输入数据文件，其中每行末尾都有某个特殊字符——换行符不再是“特殊的”。\n\
  \n我倾向于使用一个字符序列，通常是一些特殊标记，然后是一个换行符。这使得在文本编辑器或某些实用程序中查看输入数据时，很容易看到行尾字符，因为每条记录的末尾仍然有一个换行符。`STR`\
  \ 属性以十六进制指定，而获取我们需要的确切十六进制字符串的最简单方法可能是使用 SQL 和 `UTL_RAW` 来为我们生成。例如，假设我们在 UNIX/Linux\
  \ 上，其行尾标记是 `CHR(10)`（换行符），并且我们的特殊标记字符是管道符号 (`|`)，我们可以这样写：\n\n```\nSQL> select utl_raw.cast_to_raw(\
  \ '|'||chr(10) ) from dual;\nUTL_RAW.CAST_TO_RAW('|'||CHR(10))\n\n7C0A\n```\n\n\
  它向我们展示了在 UNIX/Linux 上需要使用的 `STR` 是 `X'7C0A'`。\n\n注意：在 Windows 上，您应使用 `UTL_RAW.CAST_TO_RAW(\
  \ '|'||chr(13)||chr(10) )`。\n\n要使用这个，我们可能会有一个像这样的控制文件：\n\n```\nLOAD DATA\nINFILE\
  \ demo.dat \"str X'7C0A'\"\nINTO TABLE DEPT\nREPLACE\nFIELDS TERMINATED BY ','\n\
  TRAILING NULLCOLS\n(DEPTNO,\nDNAME        \"upper(:dname)\",\nLOC          \"upper(:loc)\"\
  ,\nCOMMENTS\n)\n```\n\n因此，如果我们的输入数据如下所示，其中数据文件中的每条记录都以 `|\\n` 结尾，那么前面的控制文件将正确加载它：\n\
  \n```\n$ cat demo.dat\n10,Sales,Virginia,This is the Sales\nOffice in Virginia|\n\
  20,Accounting,Virginia,This is the Accounting\nOffice in Virginia|\n30,Consulting,Virginia,This\
  \ is the Consulting\nOffice in Virginia|\n40,Finance,Virginia,This is the Finance\n\
  Office in Virginia|\n```\n\n### 嵌入式换行符小结\n\n在本节中，我们探讨了至少四种加载包含嵌入式换行符数据的方法。在接下来的“平面文件卸载”部分，我们将使用其中一种技术，即\
  \ `STR` 属性，在一个通用的卸载实用程序中，以避免文本中换行符带来的问题。\n\n此外，需要非常注意的一点——我之前已经提到过几次——是在 Windows（所有版本）中，文本文件可能以\
  \ `\\r\\n` 结尾（ASCII `13` + ASCII `10`，回车/换行）。您的控制文件必须适应这一点：那个 `\\r` 是记录的一部分。`FIX`\
  \ 和 `VAR` 中的字节数，以及与 `STR` 一起使用的字符串，都必须考虑到这一点。例如，如果您获取任何前面包含仅 `\\n` 的 `.dat` 文件，并使用\
  \ ASCII 传输（默认）将它们 FTP 到 Windows，每个 `\\n` 都会变成 `\\r\\n`。在 UNIX/Linux 上刚能正常工作的同一个控制文件，将无法再加载数据。这是您在设置控制文件时必须意识到并加以考虑的事情。\n\
  \n## 如何加载 LOB？\n\n我们现在将考虑一些加载到 LOB 字段的方法。这不是 `LONG` 或 `LONG RAW` 字段，而是首选的数据类型 `BLOB`\
  \ 和 `CLOB`。正如在 `第 12 章` 中所讨论的，这些数据类型比传统的 `LONG` 和 `LONG RAW` 类型支持更丰富的接口/功能集。\n\n\
  我们将研究两种加载这些字段的方法：`SQLLDR` 和 `PL/SQL`。其他方法也存在，例如 Java 流、`Pro*C` 和 `OCI`。我们将首先使用 `PL/SQL`\
  \ 方法加载 LOB，然后我们再看看如何使用 `SQLLDR` 来加载它们。\n\n\n\n# 通过 PL/SQL 加载大型对象 (LOB)\n\n`DBMS_LOB`包提供了名为`LoadFromFile`、`LoadBLOBFromFile`和`LoadCLOBFromFile`的入口点。这些过程允许我们使用`BFILE`（可用于读取操作系统文件）来填充数据库中的`BLOB`或`CLOB`。`LoadFromFile`和`LoadBLOBFromFile`例程之间没有太大区别，除了后者返回指示`BLOB`列加载数据进度的`OUT`参数。然而，`LoadCLOBFromFile`例程提供了一个重要特性：字符集转换。如果您还记得，在第\
  \ 12 章中，我们讨论了 Oracle 数据库的国家语言支持（NLS）特性以及字符集的重要性。`LoadCLOBFromFile`允许我们告知数据库，即将加载的文件采用与数据库不同的字符集，数据库应执行所需的字符集转换。例如，您可能有一个`UTF8`兼容的数据库，但接收到的要加载的文件是以`WE8ISO8859P1`字符集编码的，反之亦然。此函数使您能够成功加载这些文件。\n\
  \n> 注意\n> 有关`DBMS_LOB`包中可用过程的完整详细信息及其完整的输入和输出，请参阅*Oracle PL/SQL Packages and Types\
  \ Reference*。\n\n要使用这些过程，我们需要在数据库中创建一个`DIRECTORY`对象。此对象将允许我们创建`BFILES`（并打开它们），指向数据库服务器可以访问的文件系统上存在的文件。最后一句话“数据库服务器可以访问的”是使用\
  \ PL/SQL 加载 LOB 时的关键点。`DBMS_LOB`包完全在服务器中执行。它只能看到服务器可以看到的文件系统。特别是，如果您通过网络访问 Oracle，它无法看到您的本地文件系统。\n\
  \n因此，我们首先需要在数据库中创建一个`DIRECTORY`对象。这是一个简单的过程。我们将为此示例创建两个目录（请注意，这些示例在 UNIX/Linux 环境中执行；您将使用适合您操作系统的目录引用语法）：\n\
  \n```sql\nSQL> create or replace directory dir1 as '/tmp/';\nDirectory created.\n\
  SQL> create or replace directory \"dir2\" as '/tmp/';\nDirectory created.\n```\n\
  \n> 注意\n> Oracle `DIRECTORY`对象是逻辑目录，意味着它们是指向操作系统中已存在的物理目录的指针。`CREATE DIRECTORY`命令*并不*在文件系统中实际创建目录——您必须单独执行该操作。\n\
  \n执行此操作的用户需要具有`CREATE ANY DIRECTORY`权限。我们创建两个目录的原因是为了演示与`DIRECTORY`对象相关的一个常见大小写问题（“大小写”指大写与小写字符）。当\
  \ Oracle 创建第一个目录`DIR1`时，它默认将对象名`DIR1`以*大写*形式存储。在第二个示例中使用`dir2`时，它创建的`DIRECTORY`对象将保留我们名称中使用的大小写。这一点的重要性将在我们稍后使用`BFILE`对象时展示。\n\
  \n现在，我们想将一些数据加载到`BLOB`或`CLOB`中。实现这一点的方法相当简单，例如：\n\n```sql\nSQL> create table demo\n\
  \  2  ( id        int primary key,\n  3    theClob   clob);\nTable created.\nSQL>\
  \ host echo 'Hello World!' > /tmp/test.txt\nSQL> declare\n  2    l_clob    clob;\n\
  \  3    l_bfile   bfile;\n  4  begin\n  5    insert into demo values ( 1, empty_clob()\
  \ )\n  6    returning theclob into l_clob;\n  7    l_bfile := bfilename( 'DIR1',\
  \ 'test.txt' );\n  8    dbms_lob.fileopen( l_bfile );\n  9    dbms_lob.loadfromfile(\
  \ l_clob, l_bfile,\n 10                            dbms_lob.getlength( l_bfile )\
  \ );\n 11    dbms_lob.fileclose( l_bfile );\n 12  end;\n 13  /\nPL/SQL procedure\
  \ successfully completed.\nSQL> select dbms_lob.getlength(theClob), theClob from\
  \ demo;\nDBMS_LOB.GETLENGTH(THECLOB) THECLOB\n--------------------------- ---------------\n\
  \                       13 Hello World!\n```\n\n逐步分析前面的代码，我们看到：\n\n*   在第 5 和第 6\
  \ 行，我们在表中创建一行，将`CLOB`设置为`EMPTY_CLOB()`，并在一次调用中检索其值。除了临时 LOB 外，LOB 都存在于数据库中——我们无法在没有指向临时\
  \ LOB 或已存在于数据库中的 LOB 的指针的情况下写入 LOB 变量。`EMPTY_CLOB()`不是`NULL CLOB`；它是指向空结构的、有效的非`NULL`指针。这为我们做的另一件事是获取一个\
  \ LOB 定位器，它指向一行中被锁定的数据。如果我们选择此值时没有锁定底层行，那么我们尝试写入它的操作将会失败，因为 LOB 在写入前必须被锁定（与其他结构化数据不同）。通过插入该行，我们当然已经锁定了该行。如果我们是在修改现有行而不是插入，我们将使用`SELECT\
  \ FOR UPDATE`来检索并锁定该行。\n\n*   在第 8 行，我们创建了一个`BFILE`对象。请注意我们如何大写使用`DIR1`——这一点很关键，我们稍后会看到。这是因为我们传递给`BFILENAME()`的是对象的*名称*，而不是对象本身。因此，我们必须确保名称与\
  \ Oracle 为此对象存储的大小写匹配。\n\n*   在第 9 行，我们打开了 LOB。这将允许我们读取它。\n\n*   在第 11 和第 12 行，我们将操作系统文件`/tmp/test.txt`的全部内容加载到我们刚插入的\
  \ LOB 定位器中。我们使用`DBMS_LOB.GETLENGTH()`来告诉`LOADFROMFILE()`例程要加载`BFILE`的多少字节（全部）。\n\
  \n*   最后，在第 14 行，我们关闭了打开的`BFILE`，`CLOB`即加载完成。\n\n如果我们在前面的示例中尝试使用`dir1`而不是`DIR1`，将会遇到以下错误：\n\
  \n```sql\nSQL> declare\n  2  ...\n  3  returning theclob into l_clob;\n  4  l_bfile\
  \ := bfilename( 'dir1', 'test.txt' );\n  5  dbms_lob.fileopen( l_bfile );\n  6 \
  \ ...\n  7  end;\n  8  /\ndeclare\n*\nERROR at line 1:\nORA-22285: non-existent\
  \ directory or file for FILEOPEN operation\nORA-06512: at \"SYS.DBMS_LOB\", line\
  \ 523\nORA-06512: at line 9\n```\n\n这是因为目录`dir1`不存在——`DIR1`才存在。如果您更喜欢使用混合大小写的目录名称，您应该在创建它们时使用带引号的标识符，就像我们为`dir2`所做的那样。这将允许您编写如下所示的代码：\n\
  \n```sql\nSQL> declare\n  2    l_clob    clob;\n  3    l_bfile   bfile;\n  4  begin\n\
  \  5    insert into demo values ( 1, empty_clob() )\n  6    returning theclob into\
  \ l_clob;\n  7    l_bfile := bfilename( 'dir2', 'test.txt' );\n  8    dbms_lob.fileopen(\
  \ l_bfile );\n  9    dbms_lob.loadfromfile( l_clob, l_bfile,\n 10              \
  \              dbms_lob.getlength( l_bfile ) );\n 11    dbms_lob.fileclose( l_bfile\
  \ );\n 12  end;\n 13  /\nPL/SQL procedure successfully completed.\n```\n\n我在本节前面提到过，`LoadCLOBFromFile`允许我们告知数据库，即将加载的文件采用与数据库不同的字符集，数据库应执行所需的字符集转换。如果您运行前面的示例，得到如下输出：\n\
  \n```sql\nDBMS_LOB.GETLENGTH(THECLOB) THECLOB\n--------------------------- ------------------------------\n\
  \                          6 ??????\n```\n\n那么您很可能遇到了数据库与文件编码之间的字符集不匹配问题。下一个示例使用`LoadCLOBFromFile`来处理编码为`WE8ISO8859P1`的文件：\n\
  \n```sql\nSQL> declare\n```\n\n```\nl_clob    clob;\nl_bfile   bfile;\ndest_offset\
  \ integer   := 1;\nsrc_offset integer    := 1;\nsrc_csid number       := NLS_CHARSET_ID('WE8ISO8859P1');\n\
  lang_context integer := dbms_lob.default_lang_ctx;\nwarning integer;\nbegin\ninsert\
  \ into demo values ( 1, empty_clob() )\nreturning theclob into l_clob;\nl_bfile\
  \ := bfilename( 'dir2', 'test.txt' );\ndbms_lob.fileopen( l_bfile );\ndbms_lob.loadclobfromfile(\
  \ l_clob, l_bfile, dbms_lob.getlength( l_bfile ), dest_offset, src_offset,\nsrc_csid,\
  \ lang_context,warning );\ndbms_lob.fileclose( l_bfile );\nend;\n/\nPL/SQL 过程已成功完成。\n\
  ```\n\n现在从表中选择数据，我们会在输出中看到：\n\n```\nSQL> select dbms_lob.getlength(theClob), theClob\
  \ from demo;\nDBMS_LOB.GETLENGTH(THECLOB) THECLOB\n--------------------------- ------------------------------\n\
  13 Hello World!\n```\n\n除了`从文件加载`例程之外，还有其他方法可以使用 PL/SQL 来填充 LOB。如果你要加载整个文件，使用`DBMS_LOB`及其提供的例程是迄今为止最简单的方法。如果在加载时需要处理文件内容，你也可以对`BFILE`使用`DBMS_LOB.READ`来读取数据。如果你读取的数据是文本而非`RAW`类型，那么使用`UTL_RAW.CAST_TO_VARCHAR2`在这里会很方便。然后，你可以使用`DBMS_LOB.WRITE`或`WRITEAPPEND`将数据放入`CLOB`或`BLOB`。\n\
  \n## 通过 SQLLDR 加载 LOB 数据\n\n现在我们将研究如何通过 SQLLDR 将数据加载到 LOB 中。有不止一种方法可以做到这一点，但我们将研究两种最常见的方法：\n\
  \n*   当数据与其他数据内联时。\n*   当数据存储在行外，并且输入数据包含要与行一起加载的文件名时。在 SQLLDR 术语中，这些也称为辅助数据文件（`SDF`）。\n\
  \n我们将从内联数据开始。\n\n### 加载内联的 LOB 数据\n\n这些 LOB 通常嵌入了换行符和其他特殊字符。因此，你几乎总是会使用“如何加载带有嵌入换行符的数据？”一节中详述的四种方法之一来加载这些数据。让我们首先修改`DEPT`表，将`COMMENTS`列从大的`VARCHAR2`字段改为`CLOB`：\n\
  \n```\nSQL> truncate table dept;\n表被截断。\nSQL> alter table dept drop column comments;\n\
  表已更改。\nSQL> alter table dept add comments clob;\n表已更改。\n```\n\n例如，假设我们有一个数据文件（`demo.dat`），其内容如下：\n\
  \n```\n10, Sales,Virginia,This is the Sales\nOffice in Virginia|\n20,Accounting,Virginia,This\
  \ is the Accounting\nOffice in Virginia|\n30,Consulting,Virginia,This is the Consulting\n\
  Office in Virginia|\n40,Finance,Virginia,\"This is the Finance\nOffice in Virginia,\
  \ it has embedded commas and is\nmuch longer than the other comments field. If you\n\
  feel the need to add double quoted text in here like\nthis: \"\"You will need to\
  \ double up those quotes!\"\" to\npreserve them in the string. This field keeps\
  \ going for up to\n1000000 bytes (because of the control file definition I used)\n\
  or until we hit the magic end of record marker,\nthe | followed by an end of line\
  \ - it is right here ->\"|\n```\n\n每条记录以管道符号（`|`）结束，后跟行尾标记。部门 40 的文本比其他部门长得多，包含许多换行符、嵌入的引号和逗号。给定这个数据文件，我们可以创建如下控制文件：\n\
  \n```\nLOAD DATA\nINFILE demo.dat \"str X'7C0A'\"\nINTO TABLE DEPT\nREPLACE\nFIELDS\
  \ TERMINATED BY ',' OPTIONALLY ENCLOSED BY '\"'\nTRAILING NULLCOLS\n(DEPTNO,\nDNAME\
  \        \"upper(:dname)\",\nLOC          \"upper(:loc)\",\nCOMMENTS     char(1000000)\n\
  )\n```\n\n注意：此示例来自 UNIX/Linux 系统，其行尾标记是 1 个字节，因此前面的控制文件中设置了`STR`。在 Windows 上，则必须是\
  \ `'7C0D0A'`。\n\n要加载数据文件，我们在`COMMENTS`列上指定`CHAR(1000000)`，因为正如前面讨论的，SQLLDR 对任何输入字段默认使用`CHAR(255)`。`CHAR(1000000)`将允许\
  \ SQLLDR 处理最多 1,000,000 字节的输入文本。你必须将此值设置为大于输入文件中任何预期文本块的大小。检查加载的数据后，我们看到以下内容：\n\n\
  ```\nSQL> select comments from dept;\nCOMMENTS\n--------------------------------------------------------------------------------\n\
  This is the Sales\nOffice in Virginia\nThis is the Accounting\nOffice in Virginia\n\
  This is the Consulting\nOffice in Virginia\nThis is the Finance\nOffice in Virginia,\
  \ it has embedded commas and is\nmuch longer than the other comments field. If you\n\
  feel the need to add double quoted text in here like\nthis: \"You will need to double\
  \ up those quotes!\" to\npreserve them in the string. This field keeps going for\
  \ up to\n1000000 bytes or until we hit the magic end of record marker,\nthe | followed\
  \ by an end of line - it is right here ->\n```\n\n这里需要注意的一点是，成对的引号不再成对出现。SQLLDR\
  \ 移除了我们放置在那里的额外引号。\n```\n\n## 加载非内联的 LOB 数据\n\n一种常见情形是：数据文件包含要加载到 LOB 中的文件名，而不是将\
  \ LOB 数据与结构化数据混合在一起。这种方式提供了更大的灵活性，因为提供给 `SQLLDR` 的数据文件无需使用四种方法之一来处理输入数据中嵌入的换行符——而这在大量文本或二进制数据中经常发生。`SQLLDR`\
  \ 将这种类型的附加数据文件称为 `LOBFILE`。\n\n`SQLLDR` 也支持加载一个指向另一个单一数据文件的结构化数据文件。我们可以告诉 `SQLLDR`\
  \ 如何从这个其他文件中解析 LOB 数据，以便结构化数据中的每一行都加载其中一部分数据。我发现这种模式用途有限（事实上，至今我从未找到其用武之地），因此这里不作讨论。`SQLLDR`\
  \ 将这些外部引用的文件称为 `complex secondary datafiles`（复杂辅助数据文件）。\n\n`LOBFILE` 是相对简单的数据文件，旨在简化\
  \ LOB 加载。`LOBFILE` 与主数据文件的区别在于：在 `LOBFILE` 中，没有记录的概念，因此 `换行符永远不会构成障碍`。在 `LOBFILE`\
  \ 中，数据可以是以下任何一种格式：\n\n*   固定长度字段（例如，从 `LOBFILE` 加载第 100 至 1000 字节）\n*   定界字段（由某字符终止或由某字符包围）\n\
  *   长度/值对，一种可变长度字段\n\n其中最常见的类型是定界字段——实际上是由文件结束符（`EOF`）终止的字段。通常，您有一个目录，其中包含要加载到 LOB\
  \ 列的多个文件，每个文件的完整内容将存入一个 `BLOB`。您将使用的正是带有 `TERMINATED BY EOF` 子句的 `LOBFILE` 语句。\n\
  \n假设我们有一个目录，内含多个要加载到数据库的文件。我们希望加载文件的 `OWNER`（所有者）、`TIME_STAMP`（时间戳）、`NAME`（文件名）以及文件本身。我们要加载的目标表创建如下：\n\
  \n```sql\nSQL> create table lob_demo\n( owner      varchar2(255),\ntime_stamp date,\n\
  filename   varchar2(255),\ndata       blob);\nTable created.\n```\n\n在 `UNIX/Linux`\
  \ 上使用简单的 `ls –l`，在 `Windows` 上使用 `dir /q /n`，并捕获其输出，我们可以生成输入文件，并使用如下在 `UNIX/Linux`\
  \ 上的控制文件进行加载：\n\n```sql\nLOAD DATA\nINFILE *\nREPLACE\nINTO TABLE LOB_DEMO\n( owner\
  \       position(14:19),\ntime_stamp  position(31:42) date \"Mon DD HH24:MI\",\n\
  filename    position(44:100),\ndata        LOBFILE(filename) TERMINATED BY EOF\n\
  )\nBEGINDATA\n-rwxr-xr-x 1 oracle dba 14889 Jul 22 22:01 demo1.log_xt\n-rwxr-xr-x\
  \ 1 oracle dba   123 Jul 22 20:07 demo2.ctl\n-rwxr-xr-x 1 oracle dba   712 Jul 23\
  \ 12:11 demo.bad\n-rwxr-xr-x 1 oracle dba  8136 Mar  9 12:36 demo.control_files\n\
  -rwxr-xr-x 1 oracle dba   825 Jul 23 12:26 demo.ctl\n-rwxr-xr-x 1 oracle dba  1681\
  \ Jul 23 12:26 demo.log\n-rw-r----- 1 oracle dba   118 Jul 23 12:52 dl.sql\n-rwxr-xr-x\
  \ 1 oracle dba   127 Jul 23 12:05 lob_demo.sql\n-rwxr-xr-x 1 oracle dba   171 Mar\
  \ 10 13:53 p.bsh\n-rwxr-xr-x 1 oracle dba   327 Mar 10 11:10 prime.bsh\n-rwxr-xr-x\
  \ 1 oracle dba    24 Mar  6 12:09 run_df.sh\n```\n\n现在，如果在运行 `SQLLDR` 后检查 `LOB_DEMO`\
  \ 表的内容，我们会发现如下结果：\n\n```sql\nSQL> select owner, time_stamp, filename, dbms_lob.getlength(data)\
  \ from lob_demo;\nOWNER      TIME_STAM FILENAME             DBMS_LOB.GETLENGTH(DATA)\n\
  ---------- --------- -------------------- ------------------------\noracle     22-JUL-14\
  \ demo1.log_xt                            14889\noracle     22-JUL-14 demo2.ctl\
  \                                 123\noracle     23-JUL-14 demo.bad           \
  \                       712\noracle     09-MAR-14 demo.control_files           \
  \            8136\noracle     23-JUL-14 demo.ctl                               \
  \   825\noracle     23-JUL-14 demo.log                                    0\noracle\
  \     23-JUL-14 dl.sql                                    118\noracle     23-JUL-14\
  \ lob_demo.sql                              127\noracle     10-MAR-14 p.bsh    \
  \                                 171\noracle     10-MAR-14 prime.bsh          \
  \                       327\noracle     06-MAR-14 run_df.sh                    \
  \              24\n```\n\n注意：您可能会问，“为什么 `demo.log` 的大小显然是 0？” 在 `SQLLDR` 运行期间，它会打开\
  \ `demo.log` 文件以供写入，这将导致该文件长度归零并被重置。因此，在加载 `demo.log` 文件时，它是空的。\n\n这种方法对 `CLOB`\
  \ 和 `BLOB` 都适用。以这种方式使用 `SQLLDR` 加载一个目录中的文本文件非常简单。\n\n"
- '# 将 LOB 数据加载到对象列中


  现在我们已经了解了如何加载到我们自己创建的简单表中，我们可能也会发现需要加载到一个包含 LOB 的复杂对象类型的表中。这在使用图像功能时最为常见。图像功能是通过一个复杂的对象类型
  `ORDSYS.ORDIMAGE` 来实现的。我们需要能够告诉 `SQLLDR` 如何加载到这个类型中。


  要将 LOB 加载到 `ORDIMAGE` 类型列中，我们必须更深入地了解 `ORDIMAGE` 类型的结构。使用我们要加载到的表，并在 `SQL*Plus`
  中对该表执行 `DESCRIBE` 命令，我们发现我们有一个名为 `IMAGE` 的列，其类型为 `ORDSYS.ORDIMAGE`，我们最终希望加载到 `IMAGE.SOURCE.LOCALDATA`
  中。以下示例仅在您安装并配置了 Oracle Text 的情况下才有效；否则，数据类型 `ORDSYS.ORDIMAGE` 将是一个未知类型：


  ```sql

  SQL> create table image_load(

  id number,

  name varchar2(255),

  image ordsys.ordimage);

  Table created.

  SQL> desc image_load

  Name                                     Null?    Type

  ---------------------------------------- -------- ------------------------

  ID                                                NUMBER

  NAME                                              VARCHAR2(255)

  IMAGE                                             ORDSYS.ORDIMAGE

  SQL> desc ordsys.ordimage

  Name                                             Null?    Type

  ------------------------------------------------ -------- ----------------

  SOURCE                                                    ORDSYS.ORDSOURCE

  HEIGHT                                                    NUMBER(38)

  WIDTH                                                     NUMBER(38)

  CONTENTLENGTH                                             NUMBER(38)

  FILEFORMAT                                                VARCHAR2(4000)

  ...

  SQL> desc ordsys.ordsource

  Name                                             Null?      Type

  ------------------------------------------------ ---------- --------------

  LOCALDATA                                                   BLOB

  SRCTYPE                                                     VARCHAR2(4000)

  SRCLOCATION                                                 VARCHAR2(4000)

  SRCNAME                                                     VARCHAR2(4000)

  UPDATETIME                                                  DATE

  ...

  ```


  > 注意

  >

  > 您可以在 `SQL*Plus` 中执行 `SET DESC DEPTH ALL` 或 `SET DESC DEPTH <n>` 命令来一次性显示整个层次结构。考虑到描述
  `ORDSYS.ORDIMAGE` 类型的输出会很长，我选择分步进行。


  因此，加载数据的控制文件可能如下所示：


  ```

  LOAD DATA

  INFILE *

  INTO TABLE image_load

  REPLACE

  FIELDS TERMINATED BY '',''

  ( ID,

  NAME,

  file_name FILLER,

  IMAGE column object

  (

  SOURCE column object

  (

  LOCALDATA LOBFILE (file_name) TERMINATED BY EOF

  NULLIF file_name = ''NONE''

  )

  )

  )

  BEGINDATA

  1,icons,icons.gif

  ```


  我在这里引入了两个新的结构：


  *   `COLUMN OBJECT`：这告诉 `SQLLDR` 这不是一个列名；相反，它是一个列名的一部分。它不映射到输入文件中的字段，而是用于构建加载期间要使用的正确对象列引用。在上面的文件中，我们有两个
  column object 标签，一个嵌套在另一个里面。因此，将使用的列名是 `IMAGE.SOURCE.LOCALDATA`，这正是我们需要的。请注意，我们没有加载这两个对象类型的其他任何属性（例如，`IMAGE.HEIGHT`、`IMAGE.CONTENTLENGTH`
  和 `IMAGE.SOURCE.SRCTYPE`）。我们很快会看到如何填充它们。


  *   `NULLIF FILE_NAME = ''NONE''`：这告诉 `SQLLDR`，如果 `FILE_NAME` 字段包含单词 `NONE`，则将一个
  `NULL` 加载到对象列中。


  一旦加载了 Oracle Text 类型，通常需要使用 `PL/SQL` 对加载的数据进行后处理，以便 Oracle Text 对其进行操作。例如，对于前面的数据，您可能需要运行以下命令来正确设置图像的属性：


  ```sql

  begin

  for c in ( select * from image_load ) loop

  c.image.setproperties;

  end loop;

  end;

  /

  ```


  `SETPROPERTIES` 是由 `ORDSYS.ORDIMAGE` 类型提供的一个对象方法，它处理图像本身，并使用适当的值更新对象的其余属性。


  ## 如何从存储过程中调用 SQLLDR？


  简短的答案是：您无法做到。`SQLLDR` 不是一个 `API`；它不是可以调用的东西。`SQLLDR` 是一个命令行程序。您当然可以用 `Java` 或 `C`
  编写一个运行 `SQLLDR` 的外部过程，但这与“调用” `SQLLDR` 不同。加载将在另一个会话中进行，并且不受您的事务控制。此外，您将必须解析生成的日志文件以确定加载是否成功以及成功程度（即，在错误终止加载之前加载了多少行）。我不建议从存储过程中调用
  `SQLLDR`。


  过去，您可能已经实现了自己类似 `SQLLDR` 的过程。例如，选项可能如下：


  *   用 `PL/SQL` 编写一个迷你 `SQLLDR`。它既可以使用 `BFILES` 读取二进制数据，也可以使用 `UTL_FILE` 读取文本来进行解析和加载。


  *   用 `Java` 编写一个迷你 `SQLLDR`。这可以比基于 `PL/SQL` 的加载器更复杂，并且可以利用许多可用的 `Java` 例程。


  *   用 `C` 编写一个 `SQLLDR`，并将其作为外部过程调用。


  我想通过讨论几个不是立即显而易见的话题来结束关于 `SQLLDR` 的话题。


  ## SQLLDR 注意事项


  在本节中，我们将讨论使用 `SQLLDR` 时需要注意的一些事项。


  ### TRUNCATE 的行为似乎不同


  `SQLLDR` 的 `TRUNCATE` 选项可能看起来与 `SQL*Plus` 或其他任何工具中的 `TRUNCATE` 工作方式不同。`SQLLDR` 假设您将使用类似数量的数据重新加载表，因此使用了
  `TRUNCATE` 的扩展形式。具体来说，它执行以下操作：


  ```sql

  truncate table t reuse storage

  ```


  `REUSE STORAGE` 选项不会释放已分配的区间——它只是将它们标记为空闲空间。如果这不是期望的结果，您可以在执行 `SQLLDR` 之前截断表。


  ### SQLLDR 默认为 CHAR(255)


  这个问题经常出现，我决定在本章中讨论两次。输入字段的默认长度是 255 个字符。如果您的字段长于此值，您将收到错误消息：


  ```

  Record N: Rejected - Error on table T, column C.

  Field in data file exceeds maximum length

  ```


  这并不意味着数据无法放入数据库列；而是表明 `SQLLDR` 期望输入数据为 255 字节或更少，但它收到的数据量略多于此。解决方案很简单，就是在控制文件中使用
  `CHAR(N)`，其中 `N` 足够大以容纳输入文件中最大的字段长度。请参阅前面“使用 SQLLDR 加载数据常见问题解答”部分中的第一个示例。


  ### 命令行覆盖控制文件


  许多 `SQLLDR` 选项可以放在控制文件中，也可以在命令行上使用。例如，我可以使用 `INFILE FILENAME`，也可以使用 `SQLLDR ...
  DATA=FILENAME`。命令行会覆盖控制文件中的任何选项。您不能指望控制文件中的选项一定会被使用，因为执行 `SQLLDR` 的人可以覆盖它们。


  '
- '# SQLLDR 总结


  在本节中，我们探讨了数据加载的诸多领域。我们涵盖了将会遇到的典型日常问题：加载分隔符文件、加载定长文件、加载充满图像文件的目录、使用函数处理输入数据以进行转换，等等。我们没有详细涉及使用直接路径加载器进行海量数据加载的内容；相反，我们只是浅尝辄止。我们的目标是解答使用
  SQLLDR 时经常出现并影响最广泛用户群的问题。


  ## 平面文件导出


  有许多实用程序可用于将数据导出到平面文件。例如，以下工具可以使用数据库表作为源生成文本文件：APEX、SQL Workshop、SQL Developer、TOAD
  和 SQL\*Plus。或者，如果你需要更好的性能，可以编写 PL/SQL、Pro\*C、C++ 或 Java 程序来导出数据。


  从上述工具列表中，我将展示如何使用 SQL\*Plus 和 PL/SQL 将数据导出到平面文件。我主要关注这两种工具，因为大多数开发人员和 DBA 都熟悉 SQL\*Plus
  和 PL/SQL，并且这些实用程序相当易于使用。


  ### 使用 SQL\*Plus


  如果数据量较小（例如小于 100GB），那么可以使用 SQL\*Plus 通过 `SET MARKUP CSV ON` 设置轻松地导出数据。例如，将以下代码放在一个名为
  `unload_big_table.sql` 的文件中：


  ```sql

  set verify off feedback off termout off echo off trimspool on pagesize 0 head off

  set markup csv on

  spo /tmp/big_table.dat

  select * from big_table;

  spo off;

  ```


  然后你可以从操作系统命令行执行该脚本，如下所示：


  ```bash

  $ sqlplus eoda/foo@PDB1 @unload_big_table.sql

  ```


  你也可以从 SQL\*Plus 命令行启用 CSV 选项。此示例执行时启用 CSV 输出，分隔符为竖线，且字符列没有引号包围：


  ```bash

  $ sqlplus -m ''csv on delimiter | quote off'' eoda/foo@PDB1

  SQL> select * from dept;

  DEPTNO|DNAME|LOC

  10|Sales|Virginia

  20|Accounting|Virginia

  30|Consulting|Virginia

  40|Finance|Virginia

  ```


  前述技术为你提供了一种简单易用的方法，可以快速将表中的大量数据导出到平面文件。此外，文本文件是在你的 SQL\*Plus 客户端所在的位置生成的。例如，如果你从笔记本电脑上的客户端连接到数据库，输出文件就会在你的笔记本电脑上创建。这使得最终用户和客户端对生成平面文件有更大的控制权。


  ### 使用 PL/SQL


  在本节中，我们将开发一个小的 PL/SQL 实用程序，可用于在服务器上以 SQLLDR 友好的格式导出数据。该 PL/SQL 实用程序在大多数小型场景中都能正常工作，但使用
  Pro\*C 会获得更好的性能。请注意，如果你需要在客户端而不是服务器上生成文件，Pro\*C 和 SQL\*Plus 也很有用，而 PL/SQL 会在服务器上创建文件。


  我们将创建的包规范如下：


  ```sql

  $ sqlplus eoda/foo@PDB1

  SQL> create or replace package unloader

  AUTHID CURRENT_USER

  as

  /* Function run -- unloads data from any query into a file

  and creates a control file to reload that

  data into another table

  p_query      = SQL query to "unload". May be virtually any query.

  p_tname      = Table to load into. Will be put into control file.

  p_mode       = REPLACE|APPEND|TRUNCATE -- how to reload the data

  p_dir        = directory we will write the ctl and dat file to.

  p_filename   = name of file to write to. I will add .ctl and .dat

  to this name

  p_separator  = field delimiter. I default this to a comma.

  p_enclosure  = what each field will be wrapped in

  p_terminator = end of line character. We use this so we can unload

  and reload data with newlines in it. I default to

  "|\n" (a pipe and a newline together) and "|\r\n" on NT.

  You need only to override this if you believe your

  data will have that default sequence of characters in it.

  I ALWAYS add the OS "end of line" marker to this sequence, you should not

  */

  function run( p_query      in varchar2,

  p_tname      in varchar2,

  p_mode       in varchar2 default ''REPLACE'',

  p_dir        in varchar2,

  p_filename   in varchar2,

  p_separator  in varchar2 default '','',

  p_enclosure  in varchar2 default ''"'',

  p_terminator in varchar2 default ''|'' )

  return number;

  end;

  /

  Package created.

  ```


  注意 `AUTHID CURRENT_USER` 的使用。这允许该包在数据库中安装`一次`，并可由任何人用来导出数据。该人员只需要对其想要导出的表拥有 `SELECT`
  权限，并对本包拥有 `EXECUTE` 权限即可。如果在此情况下我们不使用 `AUTHID CURRENT_USER`，那么该包的所有者将需要对要导出的所有表拥有直接的
  `SELECT` 权限。此外，由于此例程完全容易受到“SQL 注入”攻击（它接受任意 SQL 语句作为输入），`CREATE` 语句必须指定 `AUTHID CURRENT_USER`。如果它是一个默认的
  `definer` 权限例程，那么任何拥有其 `EXECUTE` 权限的人都将能够使用所有者的权限执行*任何* SQL 语句。如果你知道一个例程容易受到 SQL
  注入攻击，那它最好是一个调用者权限例程！


  **注意**

  SQL 将使用调用此例程的用户的权限执行。但是，所有 PL/SQL 调用将使用被调用例程的 `definer` 的权限运行；因此，使用 `UTL_FILE` 写入目录的能力被隐式授予任何拥有对此包执行权限的人。


  包体如下。我们使用 `UTL_FILE` 来写入控制文件和数据文件。`DBMS_SQL` 用于动态处理任何查询。我们在查询中只使用一种数据类型：`VARCHAR2(4000)`。这意味着我们不能使用此方法导出
  LOB，如果 LOB 大于 4000 字节，情况确实如此。然而，我们可以使用此方法通过 `SUBSTR` 导出最多 4000 字节的任何 LOB。此外，由于我们使用
  `VARCHAR2` 作为唯一的输出数据类型，我们可以处理长度达 2000 字节的 `RAW`（4000 个十六进制字符），这对于除 `LONG RAW` 和
  `LOB` 之外的所有内容都足够了。另外，任何引用非标量属性（复杂对象类型、嵌套表等）的查询都无法与此简单实现一起使用。以下是一个解决 90% 问题的方案，意味着它在
  90% 的情况下都能解决问题：


  '
- '# PL/SQL 包体 `unloader` 文档


  ## 包体声明

  ```sql

  SQL> create or replace package body unloader

  as

  g_theCursor     integer default dbms_sql.open_cursor;

  g_descTbl       dbms_sql.desc_tab;

  g_nl            varchar2(2) default chr(10);

  ```


  这些是此包体中使用的一些全局变量。全局游标在首次引用此包时打开，并将保持打开状态直到我们登出。这避免了每次调用此包时获取新游标的开销。`g_descTbl` 是一个
  PL/SQL 表，用于保存 `DBMS_SQL.DESCRIBE` 调用的输出。`g_nl` 是一个换行符。我们将其用于需要嵌入换行符的字符串中。我们不需要为
  Windows 调整此设置——`UTL_FILE` 会在字符字符串中看到 `CHR(10)` 并自动将其转换为回车/换行符。


  ## 辅助函数


  接下来，我们有一个用于将字符转换为十六进制的小型便捷函数。它使用内置函数来完成此操作：


  ```sql

  function to_hex( p_str in varchar2 ) return varchar2

  is

  begin

  return to_char( ascii(p_str), ''fm0x'' );

  end;

  ```


  最后，我们再创建一个便捷函数 `is_windows`，它根据我们是否在 Windows 平台上返回 `TRUE` 或 `FALSE`，因此行尾是一个双字符字符串，而不是大多数其他平台上的单个字符。我们使用内置的
  `DBMS_UTILITY` 函数 `GET_PARAMETER_VALUE`，它可以读取大多数任何参数。我们检索 `CONTROL_FILES` 参数并查找其中是否存在
  `\`——如果找到，我们就在 Windows 上：


  ```sql

  function is_windows return boolean

  is

  l_cfiles varchar2(4000);

  l_dummy  number;

  begin

  if (dbms_utility.get_parameter_value( ''control_files'', l_dummy, l_cfiles )>0)

  then

  return instr( l_cfiles, ''\'' ) > 0;

  else

  return FALSE;

  end if;

  end;

  ```


  > **注意**

  > `is_windows` 函数确实依赖于你在 `CONTROL_FILES` 参数中使用 `\`。请注意，你也可以使用 `/`，但这非常不寻常。


  ## 控制文件生成过程


  以下是一个过程，用于创建一个控制文件以重新加载卸载的数据，它使用 `DBMS_SQL.DESCRIBE_COLUMNS` 生成的 `DESCRIBE` 表。它为我们处理了操作系统细节，例如操作系统是否使用回车/换行符（用于
  `STR` 属性）：


  ```sql

  procedure  dump_ctl( p_dir        in varchar2,

  p_filename   in varchar2,

  p_tname      in varchar2,

  p_mode       in varchar2,

  p_separator  in varchar2,

  p_enclosure  in varchar2,

  p_terminator in varchar2 )

  is

  l_output        utl_file.file_type;

  l_sep           varchar2(5);

  l_str           varchar2(5) := chr(10);

  begin

  if ( is_windows )

  then

  l_str := chr(13) || chr(10);

  end if;

  l_output := utl_file.fopen( p_dir, p_filename || ''.ctl'', ''w'' );

  utl_file.put_line( l_output, ''load data'' );

  utl_file.put_line( l_output, ''infile '''''' ||

  p_filename || ''.dat'''' "str x'''''' ||

  utl_raw.cast_to_raw( p_terminator ||

  l_str ) || ''''''"'' );

  utl_file.put_line( l_output, ''into table '' || p_tname );

  utl_file.put_line( l_output, p_mode );

  utl_file.put_line( l_output, ''fields terminated by X'''''' ||

  to_hex(p_separator) ||

  '''''' enclosed by X'''''' ||

  to_hex(p_enclosure) || '''''' '' );

  utl_file.put_line( l_output, ''('' );

  for i in 1 .. g_descTbl.count

  loop

  if ( g_descTbl(i).col_type = 12 )

  then

  utl_file.put( l_output, l_sep || g_descTbl(i).col_name ||

  '' date ''''ddmmyyyyhh24miss'''' '');

  else

  utl_file.put( l_output, l_sep || g_descTbl(i).col_name ||

  '' char('' ||

  to_char(g_descTbl(i).col_max_len*2) ||'' )'' );

  end if;

  l_sep := '',''||g_nl ;

  end loop;

  utl_file.put_line( l_output, g_nl || '')'' );

  utl_file.fclose( l_output );

  end;

  ```


  ## 引号处理函数


  这是一个简单的函数，用于使用选定的围栏字符返回带引号的字符串。请注意，它不仅用围栏字符包围字符，而且如果字符串中存在围栏字符，还会将其加倍，以便保留它们：


  ```sql

  function quote(p_str in varchar2, p_enclosure in varchar2)

  return varchar2

  is

  begin

  return p_enclosure ||

  replace( p_str, p_enclosure, p_enclosure||p_enclosure ) ||

  p_enclosure;

  end;

  ```


  ## 主函数 `run`


  接下来，我们有主函数 `run`。由于它相当大，我将边讲解边注释：


  ```sql

  function run( p_query      in varchar2,

  p_tname      in varchar2,

  p_mode       in varchar2 default ''REPLACE'',

  p_dir        in varchar2,

  p_filename   in varchar2,

  p_separator  in varchar2 default '','',

  p_enclosure  in varchar2 default ''"'',

  p_terminator in varchar2 default ''|'' ) return number

  is

  l_output        utl_file.file_type;

  l_columnValue   varchar2(4000);

  l_colCnt        number default 0;

  l_separator     varchar2(10) default '''';

  l_cnt           number default 0;

  l_line          long;

  l_datefmt       varchar2(255);

  l_descTbl       dbms_sql.desc_tab;

  begin

  ```


  ### 日期格式处理与异常块设置

  我们将把 `NLS_DATE_FORMAT` 保存到一个变量中，以便将其更改为在将数据转储到磁盘时保留日期和时间的格式。通过这种方式，我们将保留日期的时间组件。然后我们设置一个异常块，以便在任何错误时重置
  `NLS_DATE_FORMAT`：


  ```sql

  select value

  into l_datefmt

  from nls_session_parameters

  where parameter = ''NLS_DATE_FORMAT'';

  /*

  将日期格式设置为一个长数字字符串。避免了

  所有 NLS 问题并同时保存了时间和日期。

  */

  execute immediate

  ''alter session set nls_date_format=''''ddmmyyyyhh24miss'''' '';

  /*

  设置一个异常块，以便在发生任何错误时，

  我们至少可以重置日期格式。

  */

  begin

  ```


  ### 查询解析、描述与控制文件创建

  接下来，我们将解析和描述查询。将 `g_descTbl` 设置为 `l_descTbl` 是为了重置全局表；否则，它可能包含来自先前 `DESCRIBE` 的数据以及当前查询的数据。完成后，我们调用
  `dump_ctl` 来实际创建控制文件：


  ```sql

  /*

  解析并描述查询。我们将 descTbl 重置为空表，

  这样在其上使用 .count 才会可靠。

  */

  dbms_sql.parse( g_theCursor, p_query, dbms_sql.native );

  g_descTbl := l_descTbl;

  dbms_sql.describe_columns( g_theCursor, l_colCnt, g_descTbl );

  /*

  创建一个控制文件，用于将此数据重新加载到目标表中。

  */

  dump_ctl( p_dir, p_filename, p_tname, p_mode, p_separator,

  p_enclosure, p_terminator );

  /*

  将每一列都绑定到一个 varchar2(4000)。我们不关心

  我们提取的是数字、日期还是其他类型。

  所有东西都可以是字符串。

  */

  ```


  ### 数据提取准备

  我们准备将实际数据转储到磁盘。我们首先将每个列定义为用于提取的 `VARCHAR2(4000)`。所有 `NUMBER`、`DATE`、`RAW`——每种类型都将转换为
  `VARCHAR2`。在此之后，我们立即执行查询以准备提取阶段：


  ```sql

  for i in 1 .. l_colCnt loop

  dbms_sql.define_column( g_theCursor, i, l_columnValue, 4000);

  end loop;

  /*

  运行查询 - 忽略执行的输出。它只在

  DML 是插入/更新或删除时才有效。

  */

  ```


  ### 数据提取与写入文件

  现在我们打开数据文件进行写入，从查询中获取所有行，并将其打印到数据文件：


  ```sql

  l_cnt := dbms_sql.execute(g_theCursor);

  /*

  打开文件以写入输出，然后将

  分隔的数据写入其中。

  */

  l_output := utl_file.fopen( p_dir, p_filename || ''.dat'', ''w'',

  32760 );

  loop

  exit when ( dbms_sql.fetch_rows(g_theCursor) <= 0 );

  l_separator := '''';

  l_line := null;

  for i in 1 .. l_colCnt loop

  dbms_sql.column_value( g_theCursor, i,

  l_columnValue );

  l_line := l_line || l_separator ||

  quote( l_columnValue, p_enclosure );

  l_separator := p_separator;

  end loop;

  l_line := l_line || p_terminator;

  utl_file.put_line( l_output, l_line );

  l_cnt := l_cnt+1;

  end loop;

  utl_file.fclose( l_output );

  ```


  最后，我们将日期格式设置回来（如果前面的代码因任何原因失败，异常块也会执行相同的操作）并返回：



