- "# 9. 重做日志与撤销\n\n本章将向你介绍 Oracle 数据库中两个最重要的数据片段：重做日志和撤销。*重做日志* 是 Oracle 为了在发生故障时能够“重放”你的事务而记录在在线（和归档）重做日志文件中的信息。*撤销*\
  \ 是 Oracle 记录在撤销段中以便撤销或回滚你的事务的信息。\n\n在本章中，我们将讨论诸如重做日志和撤销（回滚）是如何产生的，以及它们如何融入事务等主题。我们还将讨论\
  \ `COMMIT` 和 `ROLLBACK` 语句的性能影响。我将介绍 Oracle 中这些机制的伪代码以及实际发生情况的概念性解释。我不会涵盖关于哪些文件用哪些数据字节更新的每一个内部细节。实际发生的情况稍微复杂一些，但对其工作流程有良好的理解是很有价值的，并且将帮助你理解你的操作所带来的影响。\n\
  \n一次又一次，我收到关于重做日志和撤销的确切数据细节的问题。人们似乎想要一个非常详细的规范，精确地了解里面到底有什么。我从不回答这些问题。相反，我专注于重做日志和撤销的意图，即它们背后的概念。我专注于重做日志和撤销的使用——而不是数据位和字节。我自己并不“转储”重做日志文件或撤销段。我确实使用提供的工具，比如\
  \ LogMiner 来读取重做日志，以及 flashback 事务历史来读取撤销，但这些都是以人类可读的格式向我呈现信息。因此，在本章中，我们不会深入探讨内部细节，而是构建一个坚实的基础。\n\
  \n\n\n## 什么是重做日志？\n\n重做日志文件对 Oracle 数据库至关重要。它们是数据库的事务日志。Oracle 维护两种类型的重做日志文件：`联机`日志和`归档`日志。它们用于恢复目的；其主要用途是在发生实例或介质故障时发挥作用。\n\
  \n如果数据库服务器意外断电导致实例故障，Oracle 将使用联机重做日志将系统精确恢复到断电前已提交的状态。如果磁盘驱动器发生故障（介质故障），Oracle\
  \ 将同时使用归档重做日志和联机重做日志，将该驱动器上数据的备份恢复到正确的时间点。此外，如果您“意外地”截断了某个表或删除了某些关键信息并提交了操作，您还可以使用联机和归档重做日志文件，将受影响数据的备份还原并恢复到“意外”发生前的那一刻。\n\
  \n我需要指出，现代版本的 Oracle 还提供了闪回技术。这使我们可以执行闪回查询（查询过去某个时间点的数据）、取消删除数据库表、将表恢复到之前某个时间点的状态等等。因此，我们需要执行常规恢复（使用数据库备份和归档重做日志）的情况已经减少。然而，能够执行恢复仍然是数据库管理员最重要的工作。\n\
  \n> **注意** 数据库还原与恢复是数据库管理员不容有失的唯一要务。\n\n归档重做日志文件其实就是完整的旧联机重做日志文件的副本。随着系统写满日志文件，Oracle\
  \ 归档器（`ARCn`）进程会将联机重做日志文件复制到另一个位置，并且可选地将其他几个副本也存放到本地和远程位置。这些归档重做日志文件用于在因磁盘驱动器损坏或其他物理故障导致故障时执行介质恢复。Oracle\
  \ 可以获取这些归档重做日志文件，并将它们应用到数据文件的备份上，使其与数据库的其他部分保持同步。它们是数据库的事务历史记录。\n\n每个 Oracle 数据库至少有两个联机重做日志组，每个组至少包含一个成员（重做日志文件）。这些联机重做日志组由日志写入器（`LGWR`）后台进程以循环方式写入。Oracle\
  \ 会写入第 1 组的日志文件，当写完第 1 组的文件末尾时，它会切换到第 2 组日志文件并开始写入该组。当第 2 组日志文件写满后，它会切换回第 1 组日志文件（假设您只有两个重做日志文件组；如果您有三个，Oracle\
  \ 自然会继续写入第三组）。\n\n重做日志，或称事务日志，是构成数据库的主要特性之一。它们可能是数据库最重要的恢复结构，尽管没有其他部分（如撤销段、分布式事务恢复等）也无法运作。它们是数据库区别于常规文件系统的主要组成部分之一。联机重做日志使我们能够有效地从断电故障中恢复——这种故障可能发生在\
  \ Oracle 数据库写入器（`DBWR`）后台进程正在向磁盘写入的过程中。归档重做日志则让我们能够从介质故障中恢复，例如硬盘损坏或人为错误导致数据丢失的情况。没有重做日志，数据库提供的保护不会比文件系统更多。\n\
  \n关于重做日志，我还想提及一点。在 Oracle RAC 环境中，通常有两个或更多实例。RAC 配置共享一组公共的数据文件（意味着每个实例都针对同一组公共数据文件进行事务处理）。然而，参与\
  \ RAC 集群的每个实例都有自己的内存结构和后台进程（例如，日志写入器和归档器）。此外，每个实例都有自己的重做流（或常称为重做线程）。相应地，每个实例也将拥有自己的撤销段。这一点很重要，因为您可能会遇到需要排查与重做相关的性能问题，而准确识别是哪个或哪些实例可能存在重做瓶颈问题至关重要。\n\
  \n\n## 什么是撤销？\n\n从概念上讲，撤销与重做相反。当你修改数据时，数据库会生成撤销信息，以便能将数据恢复到修改前的状态。这样做可能是为了支持多版本机制，或者因为正在执行的事务或语句因任何原因失败，又或者当我们使用\
  \ `ROLLBACK` 语句请求回滚时。重做用于在发生故障时重放事务——以恢复事务；而撤销则用于逆转一条语句或一组语句的影响。与重做不同，撤销存储在数据库内部的一组特殊的段中，称为撤销段。\n\
  \n注意\n\n“回滚段”和“撤销段”被视为同义词。\n\n一个常见的误解是，撤销用于将数据库 `物理上` 恢复到执行语句或事务之前的状态，但事实并非如此。数据库是\
  \ `逻辑上` 恢复到之前的状态——任何更改都在逻辑上被撤销——但数据结构，即数据库块本身，在回滚后可能已经不同。原因在于，在任何多用户系统中，都会存在几十、几百或几千个并发事务。数据库的主要功能之一是协调对其数据的并发访问。我们的事务所修改的块，通常也正被许多其他事务修改。因此，我们不能简单地将一个块完全恢复到事务开始时的状态——那可能会撤销其他人的工作！\n\
  \n例如，假设我们的事务执行了一条 `INSERT` 语句，导致分配了一个新的区（即，导致表增长）。我们的 `INSERT` 会使我们获得一个新块，将其格式化以供使用，并在其中放入一些数据。此时，其他某个事务可能会来向这个块中插入数据。如果我们回滚事务，显然我们不能取消格式化并释放这个块。因此，当\
  \ Oracle 回滚时，它实际上做的是在逻辑上执行与我们最初操作相反的操作。对于每一个 `INSERT`，Oracle 会执行一个 `DELETE`。对于每一个\
  \ `DELETE`，Oracle 会执行一个 `INSERT`。对于每一个 `UPDATE`，Oracle 会执行一个“反向 `UPDATE`”，或者一个将行恢复到修改前状态的\
  \ `UPDATE`。\n\n注意\n\n对于直接路径操作，这种撤销生成方式不成立，因为它们能够绕过表的撤销生成。我们稍后将更详细地讨论这些操作。\n\n我们如何看到这个过程呢？最简单的方法大概是遵循以下步骤：\n\
  \n1.  创建一个空表。\n2.  全表扫描该表，并观察执行读取所执行的 I/O 量。\n3.  向表中插入许多行数据（不提交）。\n4.  回滚该工作并将其撤销。\n\
  5.  第二次全表扫描该表，并观察所执行的 I/O 量。\n\n那么，让我们创建一个空表：\n\n```\n$ sqlplus eoda/foo@PDB1\n\
  SQL> create table t as select * from all_objects where 1=0;\n表已创建。\n```\n\n现在我们将查询它，在\
  \ SQL*Plus 中启用 `AUTOTRACE` 来测量 I/O。\n\n注意\n\n在此示例中，我们将每次全表扫描两次。目的是在每种情况下仅测量第二次扫描时执行的\
  \ I/O。这样可以避免优化器在可能发生的任何解析和优化期间执行的额外 I/O。\n\n最初全表扫描该表消耗 *零* I/O：\n\n```\nSQL> select\
  \ * from t;\n未选定行\nSQL> set autotrace traceonly statistics\nSQL> select * from t;\n\
  未选定行\nStatistics\n----------------------------------------------------------\n \
  \         0  recursive calls\n          0  db block gets\n          0  consistent\
  \ gets\n          0  physical reads\nSQL> set autotrace off\n```\n\n现在，起初这可能会让您惊讶——对表的\
  \ I/O 为 *零*。这是由于延迟段创建造成的。\n\n注意\n\n延迟段创建功能仅在 Oracle 企业版中可用。此功能默认启用。您可以在创建表时覆盖此默认行为。\n\
  \n接下来，我们将向表中添加大量数据。我们将使其“增长”，然后全部回滚：\n\n```\nSQL> insert into t select * from all_objects;\n\
  已创建 72516 行。\nSQL> rollback;\n回退完成。\n```\n\n现在，如果我们再次查询该表，会发现这次读取表消耗了相当多的 I/O：\n\
  \n```\nSQL> select * from t;\n未选定行\nSQL> set autotrace traceonly statistics\nSQL>\
  \ select * from t;\n未选定行\nStatistics\n----------------------------------------------------------\n\
  \          0  recursive calls\n          0  db block gets\n       1451  consistent\
  \ gets\n          0  physical reads\nSQL> set autotrace off\n```\n\n我们的 `INSERT`\
  \ 导致添加到表高水位线下的那些块仍然存在——已格式化，但是空的。我们的全表扫描必须读取它们以查看它们是否包含任何行。此外，我们第一次运行查询时，观察到 *零*\
  \ I/O。那是由于使用延迟段创建的默认表创建模式造成的。当我们执行 `CREATE TABLE` 时，没有分配任何存储空间，甚至连一个区都没有分配。段创建被推迟到执行\
  \ `INSERT` 时，而当我们回滚时，该段仍然存在。您可以通过一个更小的例子轻松看到这一点；虽然默认是启用的，但这次我将显式请求延迟段创建：\n\n```\n\
  SQL> drop table t purge;\n表已删除。\nSQL> create table t ( x int )  segment creation\
  \ deferred;\n表已创建。\nSQL> select extent_id, bytes, blocks\n  2  from user_extents\n\
  \  3  where segment_name = 'T'\n  4  order by extent_id;\n未选定行\nSQL> insert into\
  \ t(x) values (1);\n已创建 1 行。\nSQL> rollback;\n回退完成。\nSQL> select extent_id, bytes,\
  \ blocks\n  2  from user_extents\n  3  where segment_name = 'T'\n  4  order by extent_id;\n\
  EXTENT_ID      BYTES     BLOCKS\n---------- ---------- ----------\n         0  \
  \    65536          8\n```\n\n如您所见，表最初创建后没有分配存储空间——该表没有使用任何区。在执行 `INSERT` 后立即执行\
  \ `ROLLBACK`，我们可以看到 `INSERT` 分配了存储空间——但 `ROLLBACK` 并没有“释放”它。这两件事共同表明——该段确实由 `INSERT`\
  \ 创建，但并未被 `ROLLBACK` “撤销创建”，并且由 `INSERT` 创建的新格式化块在第二次扫描时被扫描了——回滚是一个逻辑上的“将数据库恢复到之前状态”的操作。数据库不会完全恢复原样，只是逻辑上相同。\n\
  \n## 重做与撤销如何协同工作\n\n现在让我们来看看重做和撤销在各种场景下如何协同工作。例如，我们将讨论在处理 `INSERT` 时关于重做和撤销生成的情况，以及\
  \ Oracle 如何在不同时间点发生故障时使用这些信息。\n\n一个值得注意的有趣点是，存储在撤销表空间或撤销段中的撤销信息也受到重做的保护。换句话说，撤销数据就像表数据或索引数据一样对待——对撤销的更改会生成一些重做，这些重做会被记录（到日志缓冲区，然后到重做日志文件）。为什么是这样，在我们讨论系统崩溃时会发生什么之后，就会变得清晰。撤销数据被添加到撤销段中，并缓存在缓冲区高速缓存中，就像任何其他数据一样。\n\
  \n### 示例 INSERT-UPDATE-DELETE-COMMIT 场景\n\n对于这个示例，假设我们创建了一个带索引的表，如下所示：\n\n```\n\
  create table t(x int, y int);\ncreate index ti on t(x);\n```\n\n然后我们将研究执行以下语句时可能发生的情况：\n\
  \n```\ninsert into t (x,y) values  (1,1);\nupdate t set x = x+1 where x = 1;\ndelete\
  \ from t where x = 2;\n```\n\n我们将跟踪这个事务的不同路径，并找出以下问题的答案：\n\n*   在处理这些语句的不同时间点，如果系统发生故障会发生什么？\n\
  *   如果缓冲区高速缓存填满了会发生什么？\n*   如果我们在任何时刻 `ROLLBACK` 会发生什么？\n*   如果我们成功并 `COMMIT` 会发生什么？\n\
  \n\n"
- '# INSERT 操作


  初始的 `INSERT INTO T` 语句将同时生成重做（redo）和撤销（undo）数据。生成的撤销数据将包含使该 `INSERT` 操作“消失”所需的全部信息。而由
  `INSERT INTO T` 生成的重做数据将包含使该 `INSERT` 操作“再次发生”所需的全部信息。


  在 `INSERT` 操作发生后，我们得到如图 9-1 所示的情景。


  ![../images/319655_4_En_9_Chapter/319655_4_En_9_Fig1_HTML.jpg](img/319655_4_En_9_Fig1_HTML.jpg)


  **图 9-1**

  执行 INSERT 后的系统状态


  系统中存在一些被缓存的、已修改的撤销块、索引块和表数据块。这些块中的每一个都受到 `重做日志缓冲区` 中条目的保护。


  ## 假设情景：此时系统崩溃


  在此情景下，系统在发出 `COMMIT` 命令之前或在重做条目写入磁盘之前崩溃。一切都没问题。`SGA` 内存区域被清空，但我们不需要 `SGA` 中的任何内容。当系统重启时，就好像此事务从未发生过一样。没有任何包含更改的块被刷新到磁盘，也没有任何重做数据被刷新到磁盘。我们不需要任何这些撤销或重做数据来从实例故障中恢复。


  ## 假设情景：此时缓冲区缓存已满


  情况是 `DBWn` 进程必须腾出空间，而我们的修改块将被从缓存中刷新出去。在这种情况下，`DBWn` 会首先要求 `LGWR` 刷新保护这些数据库块的重做条目。在
  `DBWn` 能够将任何已更改的块写入磁盘之前，`LGWR` 必须将与这些块相关的重做信息刷新（到磁盘）。


  这是合理的：如果我们刷新了表 `T` 的修改块（但没有刷新与这些修改关联的撤销块），同时也没有刷新与撤销块关联的重做条目，并且系统发生了故障，那么我们将得到一个修改过的表
  `T` 块，但没有与之关联的撤销信息。我们需要在写出这些块之前刷新 `重做日志缓冲区`，以便我们可以重做所有必要的更改，将 `SGA` 恢复到当前的状态，从而能够执行回滚操作。


  这第二种情景显示了为此设计的深谋远虑。“如果我们刷新了表 `T` 块 *并且* 没有刷新撤销块的重做数据 *并且* 系统发生了故障”这组条件描述开始变得复杂。随着我们增加用户、更多对象、并发处理等等，情况只会变得更加复杂。


  此时，我们得到如图 9-1 所描绘的情况。我们已经生成了一些已修改的表块和索引块。这些块有关联的撤销段块，并且这三种类型的块都生成了重做数据来保护它们。`重做日志缓冲区`
  *至少* 每三秒刷新一次，或者当它填满三分之一时，或包含 1MB 缓冲数据时，或者每当发生 `COMMIT` 或 `ROLLBACK` 时，都会被刷新。在我们的处理过程中的某个时刻，`重做日志缓冲区`
  很可能被刷新。在那种情况下，情况将如图 9-2 所示。


  ![../images/319655_4_En_9_Chapter/319655_4_En_9_Fig2_HTML.jpg](img/319655_4_En_9_Fig2_HTML.jpg)


  **图 9-2**

  重做日志缓冲区刷新后的系统状态


  也就是说，缓冲区缓存中将有代表未提交更改的修改块，而磁盘上则存有这些未提交更改的重做数据。这是一个非常正常且频繁发生的情景。


  '
- '# UPDATE 操作


  `UPDATE` 操作将引发与 `INSERT` 大部分相同的工作。这次，撤销数据量会更大；由于 `UPDATE` 操作，我们需要保存一些“前镜像”。现在我们得到如图
  9-3 所示的情景（重做日志文件中的深色矩形代表由 `INSERT` 生成的重做；`UPDATE` 的重做仍在 `SGA` 中，尚未写入磁盘）。


  ![../images/319655_4_En_9_Chapter/319655_4_En_9_Fig3_HTML.jpg](img/319655_4_En_9_Fig3_HTML.jpg)


  **图 9-3**

  执行 UPDATE 后的系统状态


  块缓冲区缓存中有了更多新的撤销段块。为了在必要时撤销 `UPDATE` 操作，缓存中有了已修改的数据库表块和索引块。我们还生成了更多的 `重做日志缓冲区` 条目。让我们假设，由
  `INSERT` 语句（在上一节中讨论过）生成的重做数据已经在磁盘上（在重做日志文件中），而由 `UPDATE` 生成的重做数据仍在缓存中。


  ## 假设情景：此时系统崩溃


  在启动时，Oracle 会读取重做日志文件并发现我们事务的一些重做日志条目。根据我们离开系统时的状态，重做日志文件中存有由 `INSERT` 生成的重做条目（这包括与
  `INSERT` 关联的撤销段的重做）。然而，`UPDATE` 的重做数据只存在于日志缓冲区中，从未到达磁盘（并在系统崩溃时被清除了）。这没关系；该事务从未提交，磁盘上的数据文件反映的是
  `UPDATE` 操作发生之前的系统状态。


  但是，`INSERT` 的重做数据已经被写入了重做日志文件。因此，Oracle 将“向前滚动”该 `INSERT` 操作。我们最终会得到一个与图 9-1 非常相似的图景，包含已修改的撤销块（关于如何撤销
  `INSERT` 的信息）、已修改的表块（刚执行完 `INSERT` 后的状态）和已修改的索引块（刚执行完 `INSERT` 后的状态）。Oracle 将发现我们的事务从未提交，并且由于系统正在执行崩溃恢复，而我们的会话已不再连接，因此它会回滚该事务。


  为了回滚未提交的 `INSERT` 操作，Oracle 将使用它刚刚向前滚动的撤销数据（来自重做数据，现在位于缓冲区缓存中），并将其应用于数据和索引块，使它们看起来像在
  `INSERT` 发生之前的样子。现在一切都恢复原状了。磁盘上的块可能反映也可能不反映该 `INSERT` 操作（这取决于我们的块是否在崩溃前被刷新过）。如果磁盘上的块确实反映了
  `INSERT` 操作，那么当这些块从缓冲区缓存中刷新时，该 `INSERT` 将被撤销。如果它们没有反映被撤销的 `INSERT`，那也没关系——反正它们稍后会被覆盖。


  这个情景涵盖了崩溃恢复的基本细节。系统将此作为一个两步过程来执行。首先，它向前滚动，将系统带到故障发生前的时刻，然后继续回滚所有尚未提交的操作。此操作将使数据文件重新同步。它重放了正在进行的工作，并撤销任何尚未完成的操作。




  ##### 假设场景：应用回滚事务


  此时，Oracle 将在缓存的撤销段块（最有可能）中查找此事务的撤销信息，如果这些块已被刷新到磁盘（对于非常大的事务更有可能），则会从磁盘读取。它会将撤销信息应用到缓冲区高速缓存中的数据块和索引块上；如果这些块已不在高速缓存中，则会从磁盘读取到高速缓存中，然后应用撤销操作。之后，这些块将被刷新到数据文件中，并恢复其原始行值。


  这个场景比系统崩溃更常见。值得注意的是，在回滚过程中，**从不涉及重做日志**。重做日志仅在恢复和归档期间才会被读取。这是一个关键的调优概念：重做日志是**写入**的。Oracle
  在正常处理过程中不会读取它们。只要你有足够的设备，使得 `ARCn` 读取一个文件时，`LGWR` 可以写入另一个不同的设备，那么重做日志就不会发生争用。许多其他数据库将日志文件视为“事务日志”。它们没有这种重做与撤销的分离。对于这些系统，回滚操作可能是灾难性的——回滚过程必须读取其日志写入器正在写入的日志。它们在系统中最无法承受争用的部分引入了竞争。Oracle
  的目标是使重做日志被顺序写入，并且在写入过程中没有人读取它们。


  #### DELETE 操作


  同样，`DELETE` 操作会产生撤销信息，数据块被修改，重做信息被发送到重做日志缓冲区。这与之前没有太大不同。事实上，它与 `UPDATE` 非常相似，因此我们将直接进入
  `COMMIT`。


  #### COMMIT 操作


  我们已经研究了各种故障场景和不同的路径，现在终于来到了 `COMMIT`。在这里，Oracle 将把重做日志缓冲区刷新到磁盘，状态图将如图 9-4 所示。


  ![../images/319655_4_En_9_Chapter/319655_4_En_9_Fig4_HTML.jpg](img/319655_4_En_9_Fig4_HTML.jpg)


  图 9-4


  COMMIT 后的系统状态


  已修改的块位于缓冲区高速缓存中；其中一些可能已经被刷新到磁盘。*所有*重放此事务所需的重做信息都已安全写入磁盘，更改现在是永久性的。如果我们直接从数据文件读取数据，很可能看到的是事务发生*之前*的数据块状态，因为
  `DBWn` 很可能还没有写入它们。这没问题——在发生故障时，可以使用重做日志文件将这些块更新到最新状态。撤销信息将一直保留，直到撤销段回绕并重用这些块。Oracle
  将使用该撤销数据，为任何需要它们的会话提供受影响对象的**一致读**。


  ## 提交与回滚处理


  理解重做日志文件如何影响我们作为开发人员是很重要的。我们将研究编写代码的不同方式如何影响重做日志的使用。我们在本章前面已经了解了重做的机制，现在将探讨一些具体问题。你可能会发现许多此类场景，但它们会由
  DBA 解决，因为它们影响整个数据库实例。我们将从 `COMMIT` 期间发生的事情开始，然后讨论围绕联机重做日志的常见问题和议题。


  ### COMMIT 做了什么？


  作为开发人员，你应该清楚地理解 `COMMIT` 期间究竟发生了什么。在本节中，我们将探讨 Oracle 中执行 `COMMIT` 语句时发生的情况。`COMMIT`
  通常是一个非常快的操作，与事务大小无关。你可能会认为事务越大（换句话说，影响的数据越多），`COMMIT` 所需的时间就越长。事实并非如此。`COMMIT` 的响应时间通常是“平坦的”，与事务大小无关。这是因为
  `COMMIT` 实际上没有太多工作要做，但它所做的工作至关重要。


  理解并接受这一事实的重要原因之一是，它将引导你让事务保持应有的规模。正如我们在上一章讨论的，许多开发人员人为地限制其事务的大小，每隔若干行就提交一次，而不是在完成一个逻辑工作单元时才提交。他们这样做是错误地认为这是在保护稀缺的系统资源，而实际上他们正在增加资源消耗。如果提交一行需要
  X 单位时间，而提交 1000 行也需要同样的 X 单位时间，那么以 1000 次单行提交的方式执行工作，将额外消耗 1000*X 单位时间。只有在必要时（即逻辑工作单元完成时）才提交，不仅可以提高性能，还可以减少对共享资源（日志文件、各种内部闩锁等）的争用。一个简单的例子证明这必然会花费更长时间。我们将使用
  Java 应用程序，尽管大多数客户端都会得到类似的结果——除了本例中的 PL/SQL（我们将在示例之后讨论原因）。首先，这是我们将要插入数据的示例表：


  ```sql

  $ sqlplus eoda/foo@PDB1

  SQL> create table test

  ( id          number,

  code        varchar2(20),

  descr       varchar2(20),

  insert_user varchar2(30),

  insert_date date);

  Table created.

  ```


  我们的 Java 程序（存储在名为 `perftest.java` 的文件中）将接受两个输入：要插入的行数 (`iters`) 和每次提交之间的行数 (`commitCnt`)。它首先连接到数据库，将自动提交设置为
  *关闭*（这应在所有 Java 代码中完成），然后总共调用两次 `doInserts()` 方法：


  *   一次只是为了预热例程（确保所有类都已加载）


  *   第二次，开启 SQL 跟踪，指定要插入的行数以及一次提交多少行（即，每 N 行提交一次）


  然后它关闭连接并退出。`main` 方法如下（你需要为你的环境修改连接字符串）：


  ```java

  import java.sql.*;

  import java.sql.DriverManager;

  import java.sql.Connection;

  import java.sql.SQLException;

  import java.io.*;

  public class perftest

  {

  public static void main (String arr[]) throws Exception

  {

  DriverManager.registerDriver(new oracle.jdbc.OracleDriver());

  Connection con = DriverManager.getConnection

  ("jdbc:oracle:thin:@//localhost.localdomain:1521/PDB1", "eoda", "foo");

  Integer iters = new Integer(arr[0]);

  Integer commitCnt = new Integer(arr[1]);

  con.setAutoCommit(false);

  doInserts( con, 1, 1 );

  Statement stmt = con.createStatement ();

  stmt.execute( "begin dbms_monitor.session_trace_enable(waits=>true); end;" );

  doInserts( con, iters.intValue(), commitCnt.intValue() );

  con.close();

  }

  ```


  注意


  用于测试的 `SCOTT` 帐户或你使用的任何帐户都需要被授予在 `DBMS_MONITOR` 包上的 `EXECUTE` 权限。


  现在，`doInserts()` 方法相当直接。它首先准备（解析）一个 `INSERT` 语句，以便我们可以重复绑定/执行它：




  '
- "# JDBC 插入操作与 COMMIT 性能分析\n\n## 执行插入操作的代码\n\n```java\nstatic void doInserts(Connection\
  \ con, int count, int commitCount )\nthrows Exception\n{\nPreparedStatement ps =\n\
  con.prepareStatement\n(\"insert into test \" +\n\"(id, code, descr, insert_user,\
  \ insert_date)\"\n+ \" values (?,?,?, user, sysdate)\");\n```\n\n然后，代码循环执行指定行数的插入操作，反复绑定并执行`INSERT`语句。同时，它在循环内检查一个行计数器，以判断是否需要执行`COMMIT`操作：\n\
  \n```java\nint  rowcnt = 0;\nint  committed = 0;\nfor (int i = 0; i < count; i++\
  \ )\n{\nps.setInt(1,i);\nps.setString(2,\"PS - code\" + i);\nps.setString(3,\"PS\
  \ - desc\" + i);\nps.executeUpdate();\nrowcnt++;\nif ( rowcnt == commitCount )\n\
  {\ncon.commit();\nrowcnt = 0;\ncommitted++;\n}\n}\ncon.commit();\nSystem.out.println\n\
  (\"pstatement rows/commitcnt = \" + count + \" / \" +  committed );\n}\n}\n```\n\
  \n**提示**\n\n有关如何使用 Java 连接到 Oracle 数据库的更多详细信息，请参阅 *《Oracle Database JDBC 开发指南》*。\n\
  \n## 环境配置与编译运行\n\n在编译 Java 代码之前，我们需要设置 `CLASSPATH` 环境变量（以下命令应写在一行，中间无空格，但此处因页面宽度限制而换行）：\n\
  \n```bash\n$ export CLASSPATH=$CLASSPATH:$ORACLE_HOME/jdbc/lib/ojdbc8.jar:\n$ORACLE_HOME/jlib/orai18n.jar\n\
  ```\n\n同时确保 Java 可执行文件位于 `PATH` 变量中（请根据您的 `ORACLE_HOME` 进行调整）：\n\n```bash\n$ export\
  \ PATH=$PATH:/opt/oracle/product/19c/dbhome_1/jdk/bin\n```\n\n接下来，我们从操作系统命令行编译 Java\
  \ 代码：\n\n```bash\n$ javac perftest.java\n```\n\n现在，我们将使用不同的输入重复运行此代码，并查看生成的 `TKPROF`\
  \ 文件。我们将运行插入 100,000 行数据——每次提交 1 行，然后是 10 行，依此类推。以下是从命令行运行第一个测试的示例：\n\n```bash\n\
  $ java perftest 100000 1\n```\n\n前面的代码执行插入并生成一个跟踪文件。您可以通过以下查询找到跟踪文件所在的目录：\n\n```sql\n\
  SQL> select value from v$diag_info where name='Diag Trace';\nVALUE\n------------------------------------\n\
  /opt/oracle/diag/rdbms/cdb/CDB/trace\n```\n\n导航到您的跟踪目录，并在该目录中查找最近生成的、包含“insert into\
  \ test”字符串的跟踪文件：\n\n```bash\n$ grep \"insert into test\" *.trc\nCDB_ora_7660.trc:insert\
  \ into test (id, code, descr, insert_user, insert_date)...\n```\n\n使用 `TKPROF` 实用程序处理该文件（这将生成一个人类可读的输出文件）：\n\
  \n```bash\n$ tkprof CDB_ora_7660.trc output.txt sys=no\n```\n\n运行上述命令后，文件 `output.txt`\
  \ 包含了插入测试的人类可读的性能输出。生成的 `TKPROF` 文件产生了表 9-1 中的结果。\n\n**表 9-1 插入 100,000 行的结果**\n\
  \n| 需插入的行数 | 每 N 行提交一次，N= | INSERT 语句的 CPU 时间（秒） | 等待“log file sync”的时间（秒） |\n|\
  \ :--- | :--- | :--- | :--- |\n| 100,000 | 1 | 1.42 | 34.87 |\n| 100,000 | 10 |\
  \ 1.35 | 4.05 |\n| 100,000 | 100 | 1.63 | 0.61 |\n| 100,000 | 1000 | 1.65 | 0.21\
  \ |\n| 100,000 | 10,000 | 1.66 | 0.04 |\n| 100,000 | 100,000 | 1.65 | 0.00 |\n\n\
  如您所见，提交得越频繁，等待时间就越长（具体数据可能有所不同）。并且等待时间与您提交的次数大致成正比。请记住，这只是单用户场景；如果多个用户执行相同的工作并且都过于频繁地提交，数字将迅速上升。\n\
  \n我们在类似的情况下反复听到同样的故事。例如，我们已经看到，不使用绑定变量并频繁进行硬解析，会由于库缓存争用和过度的 CPU 使用而严重降低并发性。即使我们改用绑定变量，过于频繁的软解析——由于在短期内会重用它们却仍关闭游标——也会带来巨大的开销。我们必须只在需要时才执行操作——`COMMIT`就是这样的操作之一。最好根据业务需求来确定事务的大小，而不是基于试图减少数据库资源使用的错误想法。\n\
  \n## COMMIT 的开销分析\n\n在此示例中，导致 `COMMIT` 开销大的有两个因素：\n\n*   我们显然增加了与数据库的往返通信。如果每次记录都提交，就会产生更多来回的网络流量。我甚至没有测量这一点，这会增加总的运行时间。\n\
  *   每次提交时，我们都必须等待重做日志（redo）被写入磁盘。这将导致一次“等待”。在这种情况下，该等待事件被命名为“log file sync”。\n\n\
  因此，我们在每次 `INSERT` 后提交；每次都等待一小段时间——如果你每次等待一点点时间，但等待次数很多，时间就会累积起来。当我们提交了 100,000 次时，有整整\
  \ 30 秒的运行时间花在了等待 `COMMIT` 完成上——换句话说，就是等待 `LGWR` 将重做日志写入磁盘。与此形成鲜明对比的是，当我们只提交一次时，我们等待的时间并不长（实际上无法测量）。这证明了\
  \ `COMMIT` 是一个快速操作；我们预期响应时间大致是平稳的，而不是我们所做工作量的函数。\n\n那么，为什么 `COMMIT` 的响应时间相对平稳，而与事务大小无关呢？这是因为在我们甚至执行\
  \ `COMMIT` 之前，真正困难的工作已经完成了。我们已经修改了数据库中的数据，所以已经完成了 99.9%的工作。例如，以下操作已经发生：\n\n*   在\
  \ SGA 中生成了撤销（Undo）块。\n*   在 SGA 中生成了被修改的数据块。\n*   为上述两项在 SGA 中生成了缓冲的重做日志。\n*   根据前三项的大小以及所花费的时间，之前数据的某种组合可能已经被刷新到磁盘。\n\
  *   所有的锁都已获取。\n\n当我们执行 `COMMIT` 时，剩下的事情如下：\n\n*   为我们的事务生成一个系统更改号（SCN）。如果您不熟悉，SCN\
  \ 是 Oracle 用来保证事务顺序并支持故障恢复的一个简单计时机制。它还用于保证数据库中的读一致性和检查点。可以将 SCN 想象成一个计数器；每次有人 `COMMIT`，SCN\
  \ 就递增 1。\n*   `LGWR` 将我们所有*剩余的*缓冲重做日志条目写入磁盘，并将 SCN 记录在在线重做日志文件中。这一步实际上就是 `COMMIT`。如果这一步发生了，我们就提交成功了。我们的事务条目从\
  \ `V$TRANSACTION` 中“移除”——这表明我们已经提交。\n*   我们会话持有的、记录在 `V$LOCK` 中的所有锁都被释放，所有正在排队等待我们持有锁的进程将被唤醒，并允许继续它们的工作。\n\
  *   我们事务修改过的一些块，如果仍在缓冲区缓存中，将被访问并以快速模式“清理”。*块清理*指的是我们存储在数据库块头中的锁相关信息。基本上，我们是在清理块上的事务信息，这样下一个访问该块的人就不必做了。我们这样做不需要生成重做日志信息，从而为以后节省了大量工作（本章后面将详细讨论这一点）。\n\
  \n如您所见，处理 `COMMIT` 几乎没什么可做的。最耗时的操作过去是、将来也永远是由 `LGWR` 执行的活动，因为这是物理磁盘 I/O。`LGWR` 在这里花费的时间将因其已经定期刷新重做日志缓冲区的内容而大大减少。`LGWR`\
  \ 不会像您做工作那样长时间地缓冲所有工作。相反，它会在您操作的过程中，在后台增量地刷新重做日志缓冲区的内容。这是为了避免在 `COMMIT` 时一次性刷新您的所有重做日志而等待很长时间。\n\
  \n\n\n因此，即使我们有一个长时间运行的事务，它所生成的大部分缓冲重做日志在提交前也早已被刷新到磁盘。另一方面，当我们执行 `COMMIT` 时，通常必须等待*所有*尚未写入的缓冲重做日志安全落盘。也就是说，对\
  \ `LGWR` 的调用默认情况下是*同步*的。虽然 `LGWR` 可能使用异步 I/O 并行写入我们的日志文件，但我们的事务通常会等待 `LGWR` 完成所有写入操作并收到数据已存在于磁盘上的确认后才返回。\n\
  \n### 注意\n\nOracle 11g 及以上版本支持一种异步等待。然而，那种提交方式在通用场景下的用途有限。任何面向最终用户的应用程序中的提交都应该是同步的。\n\
  \n## PL/SQL 提交时优化\n\n现在，我之前提到我们使用的是 Java 程序而不是 PL/SQL 是有原因的——这个原因就是 PL/SQL 的提交时优化。我说过，默认情况下对\
  \ `LGWR` 的调用是同步的，我们会等待它完成写入。这对于 Oracle 数据库的每个版本和每种编程语言都是成立的，*除了 PL/SQL*。PL/SQL 引擎意识到客户端在\
  \ PL/SQL 例程完成之前并不知道其中是否发生了 `COMMIT`，因此它会执行异步提交。它不等待 `LGWR` 完成，而是立即从 `COMMIT` 调用返回。然而，当\
  \ PL/SQL 例程完成，当我们从数据库返回到客户端时，PL/SQL 例程将等待 `LGWR` 完成所有未完成的 `COMMIT` 操作。因此，如果你在 PL/SQL\
  \ 中提交了 100 次然后返回客户端，你可能会发现你只等待了 `LGWR` 一次——不是 100 次——这要归功于这项优化。这是否意味着在 PL/SQL 中频繁提交是个好主意或者可以接受？不，完全不是——只是说这不像在其他语言中那样是个*糟糕的主意*。指导原则是：在你的逻辑工作单元完成后才提交——而不是提前。\n\
  \n### 注意\n\n当你执行分布式事务或 Data Guard 的最大可用性模式时，PL/SQL 中的这种提交时优化可能会被暂停。由于有两个参与者，PL/SQL\
  \ 必须等待提交实际完成才能继续。此外，通过直接在 PL/SQL 中调用 `COMMIT WORK WRITE WAIT` 也可以暂停此优化。\n\n## 演示\
  \ COMMIT 时机\n\n为了演示 `COMMIT` 是一个“固定响应时间”的操作，我们将生成不同数量的重做日志，并测量 `INSERT` 和 `COMMIT`\
  \ 操作的时间。在进行这些 `INSERT` 和 `COMMIT` 操作时，我们将使用这个小的实用函数来测量会话生成的重做量：\n\n```sql\nSQL>\
  \ create or replace function get_stat_val( p_name in varchar2 ) return number\n\
  as\nl_val number;\nbegin\nselect b.value\ninto l_val\nfrom v$statname a, v$mystat\
  \ b\nwhere a.statistic# = b.statistic#\nand a.name = p_name;\nreturn l_val;\nend;\n\
  /\nFunction created.\n```\n\n### 注意\n\n上述函数的所有者需要被直接授予对 `V$` 视图 `V_$STATNAME` 和\
  \ `V_$MYSTAT` 的 `SELECT` 权限。\n\n删除表 `T`（如果存在）并创建一个与 `BIG_TABLE` 结构相同的空表 `T`：\n\n\
  ```sql\nSQL> drop table t purge;\nSQL> create table t\nas\nselect *\nfrom big_table\n\
  where 1=0;\nTable created.\n```\n\n##注意\n\n如何在本书开头的“设置你的环境”部分创建并填充 `BIG_TABLE` 表的说明在本书最前面。\n\
  \n我们将使用 `DBMS_UTILITY` 包中的 `GET_CPU_TIME` 和 `GET_TIME` 例程来测量提交事务所使用的 CPU 时间和耗时。用于生成工作负载并报告结果的实际\
  \ PL/SQL 块是：\n\n```sql\nSQL> set serverout on\nSQL> declare\nl_redo number;\nl_cpu\
  \  number;\nl_ela  number;\nbegin\ndbms_output.put_line\n( '-' || '      Rows' ||\
  \ '        Redo' ||\n'     CPU' || ' Elapsed' );\nfor i in 1 .. 6\nloop\nl_redo\
  \ := get_stat_val( 'redo size' );\ninsert into t select * from big_table  where\
  \ rownum <= power(10,i);\nl_cpu  := dbms_utility.get_cpu_time;\nl_ela  := dbms_utility.get_time;\n\
  commit work write wait;\ndbms_output.put_line\n( '-' ||\nto_char( power( 10, i ),\
  \ '9,999,999') ||\nto_char( (get_stat_val('redo size')-l_redo), '999,999,999' )\
  \ ||\nto_char( (dbms_utility.get_cpu_time-l_cpu), '999,999' ) ||\nto_char( (dbms_utility.get_time-l_ela),\
  \ '999,999' ) );\nend loop;\nend;\n/\n-      Rows        Redo     CPU Elapsed\n\
  -        10       6,552       2      17\n-       100      10,336       0       5\n\
  -     1,000     114,684       0       8\n-    10,000   1,156,452       0      25\n\
  -   100,000  13,184,820       1      28\n- 1,000,000  67,356,624       2      58\n\
  PL/SQL procedure successfully completed.\n```\n\n### 注意\n\n时间单位是百分之一秒。你的结果可能会因 `BIG_TABLE`\
  \ 中的记录数、日志缓冲区大小、重做日志文件的大小和数量、日志写入器进程数量以及 I/O 子系统等变量而有所不同。\n\n## 结论\n\n正如你所看到的，当我们生成的重做日志量从大约\
  \ 6500 字节变化到 67MB 时，使用分辨率为百分之一秒的计时器无法测量出 `COMMIT` 时间的差异。在我们处理并生成重做日志时，`LGWR` 在后台不断地将我们缓冲的重做信息刷新到磁盘。因此，当我们生成了\
  \ 67MB 的重做日志信息时，`LGWR` 正忙于每生成大约 1MB 就进行一次刷新。当执行到 `COMMIT` 时，已经没有多少工作需要做了——甚至比生成十行数据时还要少。无论生成多少重做日志，你都应该期望看到类似（但并非完全相同）的结果。\n\
  \n\n\n### ROLLBACK 的作用\n\n将 `COMMIT` 改为 `ROLLBACK` 后，我们可以预期得到完全不同的结果。回滚所需的时间绝对是修改数据量的函数。我修改了上一节开发的脚本来执行\
  \ `ROLLBACK`（只需将 `COMMIT` 改为 `ROLLBACK`），计时结果大不相同。现在看看结果：\n\n```\n$ sqlplus eoda/foo@PDB1\n\
  SQL> set serverout on\nSQL> declare\n    l_redo number;\n    l_cpu  number;\n  \
  \  l_ela  number;\nbegin\n    dbms_output.put_line\n    ( '-' || '      Rows' ||\
  \ '        Redo' ||\n      '     CPU' || ' Elapsed' );\n    for i in 1 .. 6\n  \
  \  loop\n        l_redo := get_stat_val( 'redo size' );\n        insert into t select\
  \ * from big_table where rownum <= power(10,i);\n        l_cpu  := dbms_utility.get_cpu_time;\n\
  \        l_ela  := dbms_utility.get_time;\n        --commit work write wait;\n \
  \       rollback;\n        dbms_output.put_line\n        ( '-' ||\n          to_char(\
  \ power( 10, i ), '9,999,999') ||\n          to_char( (get_stat_val('redo size')-l_redo),\
  \ '999,999,999' ) ||\n          to_char( (dbms_utility.get_cpu_time-l_cpu), '999,999'\
  \ ) ||\n          to_char( (dbms_utility.get_time-l_ela), '999,999' ) );\n    end\
  \ loop;\nend;\n/\n-      Rows        Redo     CPU Elapsed\n-        10       6,672\
  \       0       1\n-       100      10,884       1       1\n-     1,000     122,840\
  \       1       0\n-    10,000   1,239,080       1       2\n-   100,000  14,098,264\
  \       7      92\n- 1,000,000  71,917,008      36     121\nPL/SQL procedure successfully\
  \ completed.\n```\n\nCPU 时间和耗时的差异是意料之中的，因为 `ROLLBACK` 必须撤销我们已完成的工作。与 `COMMIT` 类似，它需要执行一系列操作。甚至在我们执行\
  \ `ROLLBACK` 之前，数据库已经做了大量工作。回顾一下，会发生以下情况：\n\n*   撤销段记录已在 SGA 中生成。\n*   修改过的数据块已在\
  \ SGA 中生成。\n*   前两项的缓冲重做日志已在 SGA 中生成。\n*   根据前三项的大小以及花费的时间量，之前的部分数据可能已经被刷新到磁盘。\n\
  *   所有锁都已被获取。\n\n当我们 `ROLLBACK` 时：\n\n*   我们撤销所有已做的更改。这是通过从撤销段读回数据，有效地逆转我们的操作，然后将撤销条目标记为已应用来实现的。如果我们插入了一行，`ROLLBACK`\
  \ 将删除它。如果我们更新了一行，回滚将逆转该更新。如果我们删除了一行，回滚将重新插入它。\n*   我们会话持有的所有锁都被释放，所有在等待我们持有的锁的队列都会被释放。\n\
  \n另一方面，`COMMIT` 只是将重做日志缓冲区中剩余的任何数据刷新。与 `ROLLBACK` 相比，它做的工作非常少。这里的要点是，除非必要，否则你不想回滚。这很昂贵，因为你花了大量时间做工作，还要花大量时间撤销工作。除非你确定要\
  \ `COMMIT`，否则不要做工作。这听起来是常识——当然，除非我想 `COMMIT`，否则我不会做所有这些工作。然而，我经常看到开发人员使用一个“真实”表作为临时表，用数据填充它，生成报告，然后回滚以清除临时数据。稍后，我们将讨论真正的临时表以及如何避免此问题。\n\
  \n## 研究重做\n\n作为处理事务的一部分，Oracle 会捕获数据如何被修改（重做）并将该信息写入日志缓冲区内存区域。接下来，日志写入器后台进程会频繁地将重做信息写入磁盘（在线重做日志）。如果你的数据库启用了归档，一旦一个在线重做日志被填满，归档器进程会将该在线重做日志复制到一个归档重做日志中。处理事务及后续重做流的架构如图\
  \ 9-5 所示。\n\n![图 9-5](img/319655_4_En_9_Fig5_HTML.jpg)\n\n图 9-5\n\nOracle 事务数据并写入重做\n\
  \n重做管理可能成为数据库中的一个序列化点（瓶颈）。这是因为最终所有事务都到达 `LGWR`（或其某个工作进程），要求它管理它们的重做并 `COMMIT` 它们的事务。生成的重做量也会影响归档器进程必须处理的工作量。如果你有一个备用数据库，这些重做还必须传输并应用到备用数据库上。日志写入器和归档器需要做的工作越多，系统就会越慢。\n\
  \n因此，作为开发人员，能够衡量你的操作产生多少重做是很重要的。你产生的重做越多，你的操作可能耗时越长，整个系统也可能越慢。你不仅影响*你的*会话，还影响*每一个*会话。通过观察一个操作倾向于产生多少重做，并对一个问题测试多种方法，你可以找到做事情的最佳方式。\n\
  \n注意\n\nOracle 至少会启动一个 LGWR 后台进程。在多处理器系统上，Oracle 会生成额外的日志写入器工作进程（LG00）以帮助提高将重做写入磁盘的性能。\n\
  \n### 测量重做\n\n在第一个示例中，我们将使用 AUTOTRACE 来观察生成的重做量。在后续示例中，我们将使用 `GET_STAT_VAL` 函数（本章前面已介绍）。\n\
  \n注意\n\n当你在你的环境中运行这些示例时，不会看到完全相同的结果。你的结果可能会因变量而异，例如 `BIG_TABLE` 中的记录数、内存配置、CPU 以及系统上运行的其他进程。\n\
  \n让我们看看常规路径 `INSERT`（你我每天进行的普通 `INSERT`）和直接路径 `INSERT`（用于将大量数据加载到数据库中）在生成的重做量上的差异。我们将在此简单示例中使用\
  \ AUTOTRACE 和先前创建的表 `T` 和 `BIG_TABLE`。首先，我们使用常规路径 `INSERT` 加载表：\n\n```\n$ sqlplus\
  \ eoda/foo@PDB1\nSQL> set autotrace traceonly statistics;\nSQL> truncate table t;\n\
  Table truncated.\nSQL> insert into t select * from big_table;\n1000000 rows created.\n\
  Statistics\n\n          90  recursive calls\n      123808  db block gets\n     \
  \  39407  consistent gets\n       13847  physical reads\n   113875056  redo size\n\
  \        1177  bytes sent via SQL*Net to client\n        1354  bytes received via\
  \ SQL*Net from client\n           4  SQL*Net roundtrips to/from client\n       \
  \    2  sorts (memory)\n           0  sorts (disk)\n     1000000  rows processed\n\
  ```\n\n如你所见，该 `INSERT` 产生了大约 113MB 的重做。\n\n注意\n\n本节中的示例是在 `NOARCHIVELOG` 模式的数据库上执行的。如果你在\
  \ `ARCHIVELOG` 模式下，表必须被创建或设置为 `NOLOGGING` 才能观察到这种显著变化。我们将在“在 SQL 中设置 NOLOGGING”一节中更详细地研究\
  \ `NOLOGGING` 属性。请确保在“真实”系统上与你的 DBA 协调所有非记录操作。\n\n当我们在 `NOARCHIVELOG` 模式数据库中使用直接路径加载时，得到以下结果：\n\
  \n```\nSQL> truncate table t;\nTable truncated.\nSQL> insert /*+ APPEND */ into\
  \ t  select * from big_table;\n1000000 rows created.\nStatistics\n\n        551\
  \  recursive calls\n      16645  db block gets\n      15242  consistent gets\n \
  \     13873  physical reads\n     220504  redo size\n        1160  bytes sent via\
  \ SQL*Net to client\n        1368  bytes received via SQL*Net from client\n    \
  \       4  SQL*Net roundtrips to/from client\n          86  sorts (memory)\n   \
  \        0  sorts (disk)\n     1000000  rows processed\nSQL> set autotrace off\n\
  ```\n\n该 `INSERT` 仅产生了约 220KB——是*千字节，不是兆字节*——的重做。如你所见，直接路径插入产生的重做量远少于常规插入。\n\n\n\
  \n### 我能否关闭重做日志的生成？\n\n这是一个经常被问到的问题。简单简短的答案是**不能**，因为重做日志对数据库至关重要；它不是开销，也不是浪费。无论你认为自己是否需要它，你都确实需要它。这是既定事实，是数据库的工作方式。如果你关闭了重做日志，那么磁盘驱动器、电源的任何临时故障，或软件崩溃，都会导致整个数据库变得不可用且无法恢复。话虽如此，但在某些情况下，有些操作可以在不生成重做日志的情况下完成。\n\
  \n> **注意**\n>\n> Oracle 允许你将数据库置于 `FORCE LOGGING` 模式。在这种情况下，*所有*操作都会被记录，无论你是否指定了\
  \ `NOLOGGING`。查询 `SELECT FORCE_LOGGING FROM V$DATABASE` 将显示日志记录是否被强制开启。此功能用于支持 Data\
  \ Guard，这是 Oracle 的一个灾难恢复功能，它依赖重做日志来维护一个备用数据库副本。\n\n#### 在 SQL 中设置 NOLOGGING\n\n\
  一些 SQL 语句和操作支持使用 `NOLOGGING` 子句。这并不意味着对该对象的所有操作都将执行而不生成重做日志，只是某些非常*特定*的操作将生成比正常情况*显著更少*的重做日志。请注意，我说的是“显著更少的重做日志”，而不是“没有重做日志”。所有操作都会生成一些重做日志——所有数据字典操作都将被记录，无论日志记录模式如何。但是，生成的重做日志量可以显著减少。对于这个\
  \ `NOLOGGING` 子句的例子，我在一个运行在 `ARCHIVELOG` 模式且未启用强制日志记录的数据库中执行了以下操作：\n\n```\n$ sqlplus\
  \ eoda/foo@PDB1\nSQL> select log_mode, force_logging from v$database;\nLOG_MODE\
  \     FORCE_LOGGING\n------------ -----------------\nARCHIVELOG   NO\nSQL> drop\
  \ table t purge;\nTable dropped.\nSQL> variable redo number\nSQL> exec :redo :=\
  \ get_stat_val( 'redo size' );\nPL/SQL procedure successfully completed.\nSQL> create\
  \ table t  as  select * from all_objects;\nTable created.\nSQL> exec dbms_output.put_line(\
  \ (get_stat_val('redo size')-:redo) &#xF0C9;\n|| ' bytes of redo generated...' );\n\
  4487796 bytes of redo generated...\nPL/SQL procedure successfully completed.\n```\n\
  \n这个 `CREATE TABLE` 生成了大约 4MB 的重做日志信息（你的结果将根据插入到表 `T` 中的行数而有所不同）。我们将删除并重新创建该表，这次使用\
  \ `NOLOGGING` 模式：\n\n```\nSQL> drop table t;\nTable dropped.\nSQL> variable redo\
  \ number\nSQL> exec :redo := get_stat_val( 'redo size' );\nPL/SQL procedure successfully\
  \ completed.\nSQL> create table t NOLOGGING as  select * from all_objects;\nTable\
  \ created.\nSQL> exec dbms_output.put_line( (get_stat_val('redo size')-:redo) &#xF0C9;\n\
  || ' bytes of redo generated...' );\n90108 bytes of redo generated...\nPL/SQL procedure\
  \ successfully completed.\n```\n\n这次，我们只生成了 90KB 的重做日志。如你所见，这造成了巨大的差异——4MB 的重做日志对\
  \ 90KB。第一个例子中写入的 4MB 是实际表数据本身的副本；当创建表时没有使用 `NOLOGGING` 子句，它被写入了重做日志。\n\n如果你在 `NOARCHIVELOG`\
  \ 模式数据库上测试此操作，你将看不到两者之间的任何差异。在 `NOARCHIVELOG` 模式数据库中，`CREATE TABLE` 不会被记录，数据字典修改除外。此外，如果你在启用了强制日志记录的数据库中运行此测试，无论\
  \ `NOLOGGING` 子句如何，你总会得到记录的重做日志。\n\n这些事实指出了一个有价值的提示：在你的系统将运行于生产的模式下进行测试，*因为行为可能有所不同*。你的生产系统将运行在\
  \ `ARCHIVELOG` 模式下；如果你在此模式下执行大量生成重做日志的操作，但在 `NOARCHIVELOG` 模式下不会，你会希望在测试期间发现这一点，而不是在向用户推出期间！\n\
  \n当然，现在很明显你会尽你所能地使用 `NOLOGGING`，对吗？事实上，答案是一个响亮的***不***。你必须非常小心地使用此模式，并且只有在负责备份和恢复的人员讨论过相关问题后才能使用。假设你创建了这个表，它现在已成为你应用程序的一部分（例如，你在升级脚本中使用了\
  \ `CREATE TABLE AS SELECT NOLOGGING`）。你的用户在白天修改此表。当晚，该表所在的磁盘发生故障。“没问题”，DBA 说。“我们运行在\
  \ `ARCHIVELOG` 模式下，可以执行介质恢复。” 然而，问题在于，最初创建的表由于没有被记录，无法从归档重做日志中恢复。此表是不可恢复的，这引出了关于\
  \ `NOLOGGING` 操作最重要的点：它们必须与你的 DBA 和整个系统协调使用。如果你使用了它们而其他人不知道这一事实，你可能会损害 DBA 在介质故障后完全恢复数据库的能力。`NOLOGGING`\
  \ 操作必须谨慎而小心地使用。\n\n关于 `NOLOGGING` 操作需要注意的重要事项如下：\n\n*   *实际上会生成一定量的重做日志*。此重做日志用于保护数据字典。这完全无法避免。它可能比以前的数量显著减少，但总会有一些。\n\
  \n*   ***`NOLOGGING` 并不能阻止所有后续操作生成重做日志。*** 在前面的例子中，我并没有创建一个永远不会被记录的表。只有创建表的单个操作未被记录。所有后续的“正常”操作，如\
  \ `INSERT`、`UPDATE`、`DELETE` 和 `MERGE` 都将被记录。其他特殊操作，例如使用 `SQL*Loader` 的直接路径加载或使用\
  \ `INSERT /*+ APPEND */` 语法的直接路径 `INSERT`，将不会被记录（除非并且直到你 `ALTER` 该表并再次启用完全日志记录）。然而，一般来说，你的应用程序对此表执行的操作*将被记录*。\n\
  \n*   在 `ARCHIVELOG` 模式数据库中执行 `NOLOGGING` 操作后，*你必须尽快对受影响的数据文件进行一次新的基线备份*，以避免由于介质故障而丢失由\
  \ `NOLOGGING` 操作创建的数据。由于 `NOLOGGING` 操作创建的数据不在重做日志文件中，也尚未包含在备份中，你无法恢复它！\n\n\n\n"
- '# 在索引上设置 NOLOGGING


  使用 `NOLOGGING` 选项有两种方法。你已经见过一种——在 SQL 命令中嵌入 `NOLOGGING` 关键字。另一种方法涉及在段（索引或表）上设置 `NOLOGGING`
  属性，它允许某些操作在 `NOLOGGING` 模式下隐式执行。例如，我可以将索引或表的默认模式更改为 `NOLOGGING`。这意味着对于该索引，后续的索引重建操作将不会被记录（索引不会产生重做日志；其他索引和表本身可能会产生，但这个索引不会）。使用我们刚刚创建的表
  `T`，我们可以观察到：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> select log_mode, force_logging from v$database;

  LOG_MODE     FORCE_LOGGING

  ------------ -----------------

  ARCHIVELOG   NO

  SQL> create index t_idx on t(object_name);

  Index created.

  SQL> variable redo number

  SQL> exec :redo := get_stat_val( ''redo size'' );

  PL/SQL procedure successfully completed.

  SQL> alter index t_idx rebuild;

  Index altered.

  SQL> exec dbms_output.put_line( (get_stat_val(''redo size'')-:redo)

  || '' bytes of redo generated...'');

  672264 bytes of redo generated...

  PL/SQL procedure successfully completed.

  ```


  注意


  再次强调，此示例是在 `ARCHIVELOG` 模式数据库中执行的。在 `NOARCHIVELOG` 模式数据库中，你不会看到重做日志大小的差异，因为索引的 `CREATE`
  和 `REBUILD` 操作在 `NOARCHIVELOG` 模式下不会被记录。


  当索引处于 `LOGGING` 模式时（默认），重建它会产生大约 600KB 的重做日志。但是，我们可以更改索引：


  ```

  SQL> alter index t_idx nologging;

  Index altered.

  SQL> exec :redo := get_stat_val( ''redo size'' );

  PL/SQL procedure successfully completed.

  SQL> alter index t_idx rebuild;

  Index altered.

  SQL> exec dbms_output.put_line( (get_stat_val(''redo size'')-:redo)

  || '' bytes of redo generated...'');

  39352 bytes of redo generated...

  PL/SQL procedure successfully completed.

  ```


  现在它只产生了 39KB 的重做日志。但该索引现在是“无保护”的。如果它所在的数据库文件发生故障并需要从备份中恢复，我们将丢失该索引数据。理解这一点至关重要。该索引目前是不可恢复的——我们需要进行备份。或者，DBA
  可以直接重新创建索引，因为我们也能够直接从表数据重新创建索引。


  '
- '# NOLOGGING 总结


  可以在 `NOLOGGING` 模式下执行的操作如下：


  *   索引的创建和 `ALTER`（重建）。

  *   使用直接路径 `INSERT`（例如通过 `/*+ APPEND */` 提示或 SQL*Loader 直接路径加载）对表进行的批量 `INSERT`。表数据不会生成重做日志，但所有索引修改都会生成（此非日志记录表上的索引将生成重做日志）。

  *   `LOB` 操作（对大对象的更新不必记录）。

  *   通过 `CREATE TABLE AS SELECT` 创建表。

  *   各种 `ALTER TABLE` 操作，例如 `MOVE` 和 `SPLIT`。


  在 `ARCHIVELOG` 模式数据库中适当使用 `NOLOGGING`，可以通过显著减少生成的重做日志量来加速许多操作。假设你有一个需要从一个表空间移动到另一个表空间的表。你可以将此操作安排在备份发生之前立即进行——你可以先将表
  `ALTER` 为 `NOLOGGING`，然后移动它，重建索引（同样不记录日志），然后再将表 `ALTER` 回 `LOGGING` 模式。现在，一个可能需要
  X 小时的操作可能只需要 X/2 小时（我并非承诺运行时间减少 50%！）。适当使用此功能需要让 DBA 或负责数据库备份与恢复或任何备用数据库的人员参与进来。如果该人员不知道你正在使用此功能，并且发生了媒体故障，你可能会丢失数据，或者备用数据库的完整性可能会受到损害。这是需要认真考虑的事情。


  ## 为什么我无法分配新日志？


  我经常收到这个问题。你可能会收到类似这样的警告信息（这可以在你服务器的 `alert.log` 中找到）：


  ```

  Thread 1 cannot allocate new log, sequence 1466

  Checkpoint not complete

  Current log# 3 seq# 1465 mem# 0: /.../...redo03.log

  ```


  它可能显示 `Archival required` 而不是 `Checkpoint not complete`，但效果基本相同。这实际上是 DBA 应该注意的事情。每当数据库尝试重用一个在线重做日志文件但发现无法重用时，此信息就会被写入服务器的
  `alert.log`。当 `DBWn` 尚未完成检查点写入受重做日志保护的数据，或者 `ARCn` 尚未完成将重做日志文件复制到归档目标时，就会发生这种情况。此时，从最终用户的角度来看，数据库实际上停止了。它完全停止。`DBWn`
  或 `ARCn` 将被优先处理，以将数据块刷新到磁盘。检查点或归档完成后，一切恢复正常。数据库暂停用户活动的原因很简单：没有地方记录用户正在做的更改。Oracle
  正在尝试重用一个在线重做日志文件，但由于要么该文件在发生故障时用于恢复数据库（`Checkpoint not complete`），要么归档器尚未完成复制（`Archival
  required`），Oracle 必须等待（最终用户也将等待），直到该重做日志文件可以安全地重用。


  如果你的会话花费大量时间等待 "log file switch"、"log buffer space" 或 "log file switch checkpoint
  or archival incomplete"，你很可能遇到了这个问题。如果你的日志文件大小设置不当，或者需要由 DBA 或系统管理员调整 `DBWn` 和 `ARCn`，你可能会在数据库长时间修改期间注意到它。我经常在未经定制的
  "starter" 数据库中看到此问题。"starter" 数据库通常将重做日志文件设置得非常小，无法满足任何显著的工作量（包括数据字典本身的初始数据库构建）。一旦开始向数据库加载数据，你会注意到前
  1000 行加载很快，然后事情开始时快时慢：快 1000 行，然后挂起，再快 1000 行，再挂起，如此反复。这些都是你遇到此情况的迹象。


  你可以采取以下几件事来解决此问题：


  *   让 `DBWn` 更快：让你的 DBA 通过启用 `ASYNC` I/O、使用 `DBWn` I/O 从属进程或使用多个 `DBWn` 进程来调整 `DBWn`。检查系统上的
  I/O，看看是否有一个磁盘或一组磁盘很“热”，因此你需要分散数据。同样的通用建议也适用于 `ARCn`。这种方法的优点是，你在这里“免费获得了一些东西”——无需真正更改任何逻辑/结构/代码即可提高性能。这种方法确实没有缺点。

  *   添加更多重做日志文件：在某些情况下，这将推迟 `Checkpoint not complete`，并且过一段时间后，它会将 `Checkpoint not
  complete` 推迟到可能不再发生（因为你给了 `DBWn` 足够的空间进行检查点操作）。这同样适用于 `Archival required` 消息。这种方法的好处是消除了系统中的“暂停”。缺点是消耗更多磁盘空间，但好处远大于任何缺点。




  '
- '# 数据库性能优化与块清除机制


  ## 重做日志与检查点优化


  *   **重新创建更大尺寸的日志文件**：这将延长填满联机重做日志到需要重用它之间的时间。如果重做日志文件的使用是“突发性的”，同样适用于 `Archival
  required` 消息。如果你有一段时间会生成大量日志（夜间加载、批处理过程），随后是一段相对平静的时期，那么拥有更大的联机重做日志可以在平静时期为 `ARCn`
  进程争取足够的时间来追上。这种方法的利弊与前述添加更多文件的方法完全相同。此外，它可能会将检查点推迟到更晚发生，因为检查点至少在每次日志切换时发生，而现在日志切换的间隔将变得更长。


  *   **使检查点发生得更频繁、更连续**：使用更小的块缓冲区缓存（并不完全可取）或各种参数设置，例如 `FAST_START_MTTR_TARGET`、`LOG_CHECKPOINT_INTERVAL`
  和 `LOG_CHECKPOINT_TIMEOUT`。这将迫使 `DBWn` 更频繁地将脏块写出。这种方法的好处是故障恢复时间会减少。联机重做日志中需要应用的工作量总会更少。缺点是，如果块被频繁修改，它们可能会更频繁地写入磁盘。缓冲区缓存将无法达到它应有的效果，并且可能会破坏下一节将要讨论的块清除机制。


  你采取的方法将取决于你的具体情况。这是必须在数据库级别、考虑整个实例情况下来解决的问题。


  ## 块清除


  在本节中，我们将讨论**块清除**，即移除我们修改过的数据库块上的“锁”相关信息。当我们讨论下一节臭名昭著的 `ORA-01555: snapshot too
  old` 错误时，理解这个概念很重要。


  如果你回顾一下第 6 章我们关于数据锁及其管理方式的讨论。我描述了它们实际上是数据的属性，存储在块头中。这样做的一个副作用是，下次访问该块时，我们可能需要对其进行清除——换句话说，移除事务信息。这个操作会生成重做，并且如果块还不是脏的，会导致该块变脏，这意味着一个简单的
  `SELECT` *可能生成重做*，并可能导致在下一个检查点时大量块被写入磁盘。然而，在大多数正常情况下，这不会发生。如果你的事务大多是中小型事务（OLTP），或者你有一个在加载操作后执行直接路径加载或使用
  `DBMS_STATS` 来分析表的数据仓库，你会发现块通常已经被为你清除了。如果你回顾本章前面“COMMIT 做什么？”一节，`COMMIT` 时处理的步骤之一是，如果修改的块仍在
  SGA 中且可访问（没有其他人在修改它们），则重新访问这些块并清除它们。此活动称为**提交清除**，它是清除我们修改块上事务信息的活动。最优情况下，我们的 `COMMIT`
  可以清除块，以便后续的 `SELECT`（读取）无需再进行清除。只有对该块的 `UPDATE` 才会真正清除我们残留的事务信息，并且由于 `UPDATE` 已经生成重做，清除操作就不再显眼。


  我们可以通过理解提交清除的工作原理来强制清除*不*发生，从而观察其副作用。在与我们的事务相关的提交列表中，Oracle 会记录我们修改过的块列表。每个这样的列表长度是
  20 个块，Oracle 会根据需要分配任意多个这样的列表——但有一个上限。如果我们修改的块的总和超过块缓冲区缓存大小的 10%，Oracle 将停止分配新列表。例如，如果我们的缓冲区缓存设置为缓存
  3000 个块，Oracle 将维护最多 300 个块（3000 的 10%）的列表。在 `COMMIT` 时，Oracle 将处理这 20 个块指针的列表，如果块仍然可用，它将执行快速清除。因此，只要我们修改的块数量不超过缓存中块数量的
  10%*并且*我们的块仍在缓存中且对我们可用，Oracle 就会在 `COMMIT` 时清除它们。否则，它就直接跳过它们（即不清除它们）。


  理解这一点后，我们可以设置人为条件来观察清除如何工作。我将 `DB_CACHE_SIZE` 设置为较低的 16MB，这足以容纳 2048 个 8KB 的块（我的块大小是
  8KB）。接下来，我创建一个表，使得一行正好适合一个块——我永远不会在一个块中放两行。然后我用 10,000 行填充这个表并 `COMMIT`。我们知道 10,000
  个块远远超过 2048 的 10%，所以数据库将无法在提交时清除所有这些脏块——其中大多数甚至可能已经不在缓冲区缓存中了。我将测量到目前为止生成的重做量，运行一个将访问每个块的
  `SELECT`，然后测量该 `SELECT` 生成的重做量。


  > **注意**

  >

  > 为了使此示例可重复和可预测，你需要禁用 SGA 自动内存管理。如果启用了该功能，数据库有可能增加你的缓冲区缓存大小——这会破坏我推算的“数学”。



  '
- "# 块清除与重做日志生成\n\n令人惊讶的是，`SELECT` 语句也会生成重做日志（redo）。不仅如此，它还会“弄脏”这些被修改过的数据块，导致 `DBWn`\
  \ 进程再次将它们写入磁盘。这是由于“块清除”（block cleanout）机制导致的。\n\n## 现象观察\n\n接下来，我将再次运行 `SELECT`\
  \ 语句以访问每一个数据块，会发现没有生成重做日志。这是符合预期的，因为此时所有数据块都是“干净”的。我们将从创建表开始：\n\n```\n$ sqlplus\
  \ eoda/foo@PDB1\nSQL> create table t\n  2  ( id number primary key,\n  3  x char(2000),\n\
  \  4  y char(2000),\n  5  z char(2000));\nTable created.\n\nSQL> exec dbms_stats.set_table_stats(\
  \ user, 'T', numrows=>10000, numblks=>10000 );\nPL/SQL procedure successfully completed.\n\
  ```\n\n我使用 `DBMS_STATS` 来设置表统计信息，以避免后续硬解析可能带来的副作用（Oracle 在硬解析时倾向于扫描没有统计信息的对象，这个副作用会干扰我的示例！）。这样，我的表就创建好了，每个数据块包含一行数据（在我的\
  \ 8KB 块大小的数据库中）。接下来，我们将检查将要针对此表执行的代码块：\n\n```\nSQL> declare\n  2    l_rec t%rowtype;\n\
  \  3  begin\n  4    for i in 1 .. 10000\n  5    loop\n  6      select * into l_rec\
  \ from t where id=i;\n  7    end loop;\n  8  end;\n  9  /\ndeclare\n*\nERROR at\
  \ line 1:\nORA-01403: no data found\nORA-06512: at line 6\n```\n\n这个代码块执行失败了，但这没关系——我们知道它会失败，因为表里还没有数据。我运行这个代码块只是为了提前完成\
  \ SQL 和 PL/SQL 的硬解析，这样稍后我们再次运行它时，就不必担心硬解析的副作用被计入测量结果。现在，我们准备将数据加载到表中并提交：\n\n```\n\
  SQL> insert into t\n  2  select rownum, 'x', 'y', 'z'\n  3    from all_objects\n\
  \  4   where rownum <= 10000;\n10000 rows created.\n\nSQL> commit;\nCommit complete.\n\
  ```\n\n最后，我准备测量第一次读取数据时生成的重做日志量：\n\n```\nSQL> variable redo number\nSQL> exec :redo\
  \ := get_stat_val( 'redo size' );\nPL/SQL procedure successfully completed.\n\n\
  SQL> declare\n  2    l_rec t%rowtype;\n  3  begin\n  4    for i in 1 .. 10000\n\
  \  5    loop\n  6      select * into l_rec from t where id=i;\n  7    end loop;\n\
  \  8  end;\n  9  /\nPL/SQL procedure successfully completed.\n\nSQL> exec dbms_output.put_line(\
  \ (get_stat_val('redo size')-:redo) || ' bytes of redo generated...');\n802632 bytes\
  \ of redo generated...\nPL/SQL procedure successfully completed.\n```\n\n因此，这个 `SELECT`\
  \ 语句在处理过程中生成了大约 802KB 的重做日志。这代表了它在读取主键索引以及随后读取表 `T` 时所修改的块头信息。`DBWn` 会在未来的某个时间点将这些被修改的数据块写回磁盘（实际上，由于表无法完全放入缓存，我们知道\
  \ `DBWn` 至少已经写出了其中的一部分）。\n\n现在，如果我再次运行这个查询：\n\n```\nSQL> exec :redo := get_stat_val(\
  \ 'redo size' );\nPL/SQL procedure successfully completed.\n\nSQL> declare\n  2\
  \    l_rec t%rowtype;\n  3  begin\n  4    for i in 1 .. 10000\n  5    loop\n  6\
  \      select * into l_rec from t where id=i;\n  7    end loop;\n  8  end;\n  9\
  \  /\nPL/SQL procedure successfully completed.\n\nSQL> exec dbms_output.put_line(\
  \ (get_stat_val('redo size')-:redo) || ' bytes of redo generated...');\n0 bytes\
  \ of redo generated...\nPL/SQL procedure successfully completed.\n```\n\n我看到没有生成重做日志——所有数据块都是“干净”的了。\n\
  \n## 技术细节与影响\n\n如果我们重新运行前面的示例，但将缓冲区缓存（buffer cache）设置为能容纳略多于 100,000 个块，我们会发现任何一次\
  \ `SELECT` 都几乎不会生成重做日志——在两次 `SELECT` 语句中，我们都不需要清理脏块。这是因为我们修改的 10,000 多个块（记住索引也被修改了）可以轻松放入缓冲区缓存的百分之十中，而且我们是唯一的用户。没有其他人干扰数据，也没有其他人导致我们的数据被刷新到磁盘或访问那些块。在一个活跃的系统中，至少有时部分块未被清理干净是正常现象。\n\
  \n这种行为在你执行大型的 `INSERT`（如刚才演示的）、`UPDATE` 或 `DELETE` 之后对你影响最大——即影响了数据库中许多块的操作（任何超过缓存大小百分之十的操作肯定会造成影响）。你会注意到，在此之后第一次访问该块的查询会生成一些重做日志并弄脏该块，如果\
  \ `DBWn` 已经将其刷出或实例已经关闭并清空了缓冲区缓存，还可能导致它被重写。对此你没有太多办法。这是正常且可预期的。如果 Oracle 不做这种延迟的块清除，那么一个\
  \ `COMMIT` 可能需要和事务本身一样长的时间来处理。`COMMIT` 将不得不重新访问每一个块，甚至可能需要再次从磁盘读入它们（因为它们可能已经被刷出了）。\n\
  \n如果你不了解块清除及其工作原理，它们就会成为那些神秘莫测、似乎无缘无故发生的事情之一。例如，假设你 `UPDATE` 了大量数据并 `COMMIT`。现在你运行一个查询来验证结果。这个查询似乎产生了大量的写\
  \ I/O 和重做日志。如果你不了解块清除，这看起来是不可能的；我第一次看到时也这么觉得。你去找人来一起观察这个行为，但它在第二次查询时无法重现，因为块现在是“干净”的了。你只能把它当作一个只有你独自一人时才会发生的数据库谜团而置之不理。\n\
  \n在 OLTP 系统中，你可能永远看不到块清除的发生，因为这些系统的特点是小型、短暂的事务，只影响少数几个块。根据设计，所有或大多数事务都是简短而精炼的。修改几个块，它们就全部被清除了。在数据仓库中，你在加载后对数据进行大规模的\
  \ `UPDATE` 操作，块清除可能会成为你设计中的一个因素。\n\n某些操作会在“干净”的块上创建数据。例如，`CREATE TABLE AS SELECT`、直接路径加载的数据以及直接路径插入（使用\
  \ `/* +APPEND */` 提示）的数据都将创建干净的块。而一个 `UPDATE`、普通的 `INSERT` 或 `DELETE` 可能会创建需要在第一次读取时被清除的块。如果你的处理流程包括以下步骤，这可能会真正影响到你：\n\
  \n*   将大量新数据批量加载到数据仓库中。\n*   对刚刚加载的所有数据运行 `UPDATE`（产生需要被清除的块）。\n*   让人们查询这些数据。\n\
  \n你必须意识到，如果块需要被清除，那么第一次接触数据的查询将产生一些额外的处理开销。认识到这一点后，你自己应该在 `UPDATE` 后“接触”这些数据。你刚刚加载或修改了大量数据——至少你需要分析它。也许你需要运行一些报告来验证加载结果。这将清除块，使得下一个查询不必再做这件事。更好的是，既然你刚刚批量加载了数据，你现在就需要刷新统计信息。运行\
  \ `DBMS_STATS` 工具来收集统计信息很可能会清除所有的块，因为它只是使用 SQL 来查询信息，并且自然会在进行过程中清除块。\n\n\n"
- '# 日志争用


  这与`无法分配新日志`的消息类似，是数据库管理员（DBA）必须解决的问题，通常需要与系统管理员协作。然而，如果 DBA 监控不够仔细，开发人员也可能察觉到这个问题。


  如果您面临日志争用，可能观察到 Statspack 报告中“log file sync”事件的等待时间很长，以及“log file parallel write”事件显示出的写入时间过长。如果您看到这些情况，您可能遇到了重做日志的争用；它们写入的速度不够快。这可能由多种原因导致。其中一个应用程序方面的原因（这是
  DBA 无法解决的，但开发人员必须解决）是您提交得过于频繁——例如，在执行`INSERT`操作的循环内部提交。正如之前在“`COMMIT`做什么？”一节中所演示的那样，过于频繁地提交，除了是一种不良的编程实践外，还是引入大量`log
  file sync`等待的必然方式。假设您的所有事务大小都是正确的（您没有比业务规则规定的更频繁地提交），根据我的经验，日志等待的最常见原因如下：


  *   将重做日志放在速度慢的设备上：磁盘性能不佳。是时候购买更快的磁盘了。


  *   将重做日志与其他频繁访问的文件放在同一设备上：重做日志被设计为使用顺序写入并放置在专用设备上。如果系统的其他组件——甚至是其他 Oracle 组件——在`LGWR`写入的同时尝试读取和写入该设备，您将遇到一定程度的争用。在这里，您要尽可能确保`LGWR`独占访问这些设备。


  *   以缓冲方式挂载日志设备：这里您使用的是“cooked”文件系统（不是 RAW 磁盘）。操作系统在缓冲数据，数据库也在缓冲数据（重做日志缓冲区）。双重缓冲会降低速度。如果可能，请以“直接”方式挂载设备。具体方法因操作系统和设备而异，但通常是可行的。


  *   将重做日志放在速度慢的技术上，例如`RAID-5`：`RAID-5`对读取操作很好，但对写入操作通常很糟糕。正如我们之前关于`COMMIT`期间发生什么所见，我们必须等待`LGWR`确保数据写入磁盘。使用任何会减慢此速度的技术都不是好主意。


  如果可能的话，您真的需要至少五个专用设备用于日志记录，最优是六个设备来镜像您的归档日志。在如今拥有 200GB、300GB、1TB 及更大磁盘的时代，这变得越来越难，但如果您能留出四个能找到的最小、最快的磁盘和一个或两个大磁盘，您就可以对`LGWR`和`ARCn`产生积极影响。为了布置磁盘，您需要将它们分成三组（见图
  9-6）：


  ![../images/319655_4_En_9_Chapter/319655_4_En_9_Fig6_HTML.jpg](img/319655_4_En_9_Fig6_HTML.jpg)


  图 9-6 最佳重做日志配置


  *   重做日志组 1：磁盘 1 和 3

  *   重做日志组 2：磁盘 2 和 4

  *   归档：磁盘 5，以及可选的磁盘 6（大磁盘）


  您将把包含成员 A 和 B 的重做日志组 1 放在磁盘 1 和 3 上。您将把包含成员 C 和 D 的重做日志组 2 放在磁盘 2 和 4 上。如果您有组 3、4
  等，它们将分别放在奇数和偶数磁盘组上。这样做的效果是，当数据库当前使用组 1 时，`LGWR`将同时写入磁盘 1 和 3。当此组写满后，`LGWR`将移动到磁盘
  2 和 4。当它们写满后，`LGWR`将返回磁盘 1 和 3。与此同时，`ARCn`将处理已满的在线重做日志并将其写入磁盘 5 和 6，即大磁盘。最终效果是`ARCn`和`LGWR`都不会读取正在被写入的磁盘，也不会写入正在被读取的磁盘，因此不存在争用（见图
  9-7）。


  ![../images/319655_4_En_9_Chapter/319655_4_En_9_Fig7_HTML.jpg](img/319655_4_En_9_Fig7_HTML.jpg)


  图 9-7 重做日志流


  因此，当`LGWR`写入组 1 时，`ARCn`正在读取组 2 并写入归档磁盘。当`LGWR`写入组 2 时，`ARCn`正在读取组 1 并写入归档磁盘。这样，`LGWR`和`ARCn`各自拥有专用设备，不会与任何人争用，甚至彼此之间也不会争用。


  ## 临时表与重做日志


  Oracle 提供两种类型的临时表：全局临时表和私有临时表。全局临时表是 Oracle 中存在已久的功能。全局临时表是持久的数据库对象，保存在磁盘上，并且对所有会话可见。它们之所以被称为临时表，是因为其中的数据仅在事务或会话的持续时间内存在。


  从 Oracle 18c 开始，您可以创建私有临时表。与全局临时表不同，私有临时表仅存在于内存中，并且仅对创建它的会话可见。您可以将私有临时表定义为按事务或按会话持续存在，之后临时表会被自动删除。


  **注意**


  如果您使用过其他数据库技术，如 SQL Server 或 MySQL，那么私有临时表更符合您在这些环境中使用的临时表概念。


  尽管全局临时表已经存在一段时间，但围绕它们仍然存在一些困惑，特别是在日志记录方面。在本节中，我们还将探讨“临时表在更改日志记录方面是如何工作的？”这个问题。




  ## 全局临时表


  你可以通过 `TEMP_UNDO_ENABLED` 参数指示 Oracle 将临时表的 undo 信息存储在临时表空间中。当在临时表空间中修改数据块时，不会产生重做日志。因此，当
  `TEMP_UNDO_ENABLED` 设置为 `TRUE` 时，针对临时表发出的任何 DML 操作将产生很少甚至不产生重做日志。


  ### 注意

  默认情况下，`TEMP_UNDO_ENABLED` 设置为 `FALSE`。


  为了充分理解 `TEMP_UNDO_ENABLED` 对重做日志生成的影响，我们首先来看看当 `TEMP_UNDO_ENABLED` 设置为 `FALSE` 时的行为。我设置了一个小测试来演示处理临时表时生成的重做日志量，这也间接反映了为临时表生成的
  undo 量，因为只有 undo 会被记录到日志中。为了演示，我将使用结构相同的永久表和临时表，然后对每个表执行相同的操作，测量每次生成的重做日志量。我使用的表如下：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> create table perm

  ( x char(2000) ,

  y char(2000) ,

  z char(2000)  );

  Table created.

  SQL> create global temporary table temp

  ( x char(2000) ,

  y char(2000) ,

  z char(2000)  )

  on commit preserve rows;

  Table created.

  ```


  我编写了一个小的存储过程，允许我执行任意的 SQL 并报告该 SQL 生成的重做日志量。我将使用此例程对临时表和永久表执行 `INSERT`、`UPDATE`
  和 `DELETE` 操作：


  ```

  SQL> create or replace procedure do_sql( p_sql in varchar2 )

  as

  l_start_redo    number;

  l_redo          number;

  begin

  l_start_redo := get_stat_val( ''redo size'' );

  execute immediate p_sql;

  commit;

  l_redo := get_stat_val( ''redo size'' ) - l_start_redo;

  --

  dbms_output.put_line

  ( to_char(l_redo,''99,999,999'') ||'' bytes of redo generated for "'' ||

  substr( replace( p_sql, chr(10), '' ''), 1, 25 ) || ''"...'' );

  end;

  /

  Procedure created.

  ```


  然后我针对 `PERM` 和 `TEMP` 表运行了等效的 `INSERT`、`UPDATE` 和 `DELETE` 操作：


  ```

  SQL> set serveroutput on format wrapped

  SQL> begin

  do_sql( ''insert into perm

  select 1,1,1

  from all_objects

  where rownum <= 500'' );

  do_sql( ''insert into temp

  select 1,1,1

  from all_objects

  where rownum <= 500'' );

  dbms_output.new_line;

  do_sql( ''update perm set x = 2'' );

  do_sql( ''update temp set x = 2'' );

  dbms_output.new_line;

  do_sql( ''delete from perm'' );

  do_sql( ''delete from temp'' );

  end;

  /

  3,313,088 bytes of redo generated for "insert into perm"...

  72,584 bytes of redo generated for "insert into temp"...

  3,268,384 bytes of redo generated for "update perm set x = 2"...

  1,946,432 bytes of redo generated for "update temp set x = 2"...

  3,245,112 bytes of redo generated for "delete from perm"...

  3,224,460 bytes of redo generated for "delete from temp"...

  PL/SQL procedure successfully completed.

  ```


  如你所见：

  *   对“真实”表的 `INSERT` 操作生成了大量重做日志，而对临时表几乎没生成重做日志。这是合理的——`INSERT` 操作生成的 undo 数据非常少，并且只有
  undo 数据会被记录到临时表的日志中。

  *   对真实表的 `UPDATE` 操作生成的重做日志大约是临时表的两倍。同样，这很合理。该 `UPDATE` 操作中大约一半的数据，即“前映像”，必须被保存。临时表的“后映像”（redo）则无需保存。

  *   两次 `DELETE` 操作占用的重做日志空间大致相同。这是合理的，因为 `DELETE` 的 undo 很大，但被修改数据块的 redo 却非常小。因此，对临时表的
  `DELETE` 操作与对永久表的 `DELETE` 操作方式非常相似。


  因此，关于临时表上的 DML 活动，可以得出以下一般性结论：

  *   `INSERT` 操作将产生很少甚至不产生 undo/redo 活动。

  *   `UPDATE` 操作产生的 redo 量大约是永久表的一半。

  *   `DELETE` 操作产生的 redo 量与永久表相同。


  现在，我将在 `TEMP_UNDO_ENABLED` 设置为 `TRUE` 的情况下运行之前的测试。`TEMP_UNDO_ENABLED` 参数可以在会话或系统级别设置。以下是在会话级别将其设置为
  `TRUE` 的示例：


  ```

  SQL> alter session set temp_undo_enabled=true;

  ```


  一旦在会话中启用，该会话中对临时表数据的任何修改，其后续的 undo 信息都将记录到临时表空间。对永久表的修改，其 undo 信息仍将记录到 undo 表空间。为了查看其影响，我将运行一些代码，显示针对永久表和临时表发出事务时生成的重做日志量——唯一的不同是
  `TEMP_UNDO_ENABLED` 被设置为 `TRUE`。输出如下：


  ```

  3,312,148 bytes of redo generated for "insert into perm"...

  376 bytes of redo generated for "insert into temp"...

  2,203,788 bytes of redo generated for "update perm set x = 2"...

  376 bytes of redo generated for "update temp set x = 2"...

  3,243,412 bytes of redo generated for "delete from perm"...

  376 bytes of redo generated for "delete from temp"...

  ```


  结果非常显著：临时表上的 `INSERT`、`UPDATE` 和 `DELETE` 语句生成的 redo 量微乎其微。对于执行涉及临时表的大型批处理操作的环境，你可以预期会看到生成的
  redo 量显著减少。


  ### 注意

  你可能想知道为什么在之前的示例输出中生成了 376 字节的 redo。当进程在数据库内消耗空间时，Oracle 会进行一些内部维护。这些更改会记录在数据字典中，从而产生一些
  redo 和 undo。


  值得注意的是，在 Oracle Active Data Guard 配置中，你可以直接对存在于备用数据库中的临时表发出 DML 语句。我们可以通过针对备用数据库再次运行相同的代码，来查看为临时表生成的
  redo 量。唯一的区别是，必须移除针对永久表发出事务的语句（因为你不能在备用数据库中对永久表发出 DML）。以下输出显示生成了 0 字节的 redo：


  ```

  0 bytes of redo generated for "insert into temp"...

  0 bytes of redo generated for "update temp set x = 2"...

  0 bytes of redo generated for "delete from temp"...

  ```


  ### 注意

  无需在备用数据库中设置 `TEMP_UNDO_ENABLED`。这是因为临时表的 undo 在 Oracle Active Data Guard 备用数据库中始终是启用的。


  全局临时表通常用于报告目的——例如生成和存储中间查询结果。Oracle Active Data Guard 常用于将报告应用程序负载转移到备用数据库。将全局临时表与
  Oracle Active Data Guard 结合使用，你就拥有了一个更强大的工具来满足你的报告需求。



  ## 私有临时表


  关于撤销的生成，私有临时表的行为与全局临时表相似。我们可以通过运行与上一节相同的测试来测量使用临时表时生成的撤销量。首先，我们来创建永久表和私有临时表：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> alter session set temp_undo_enabled=false;

  SQL> create table perm

  ( x char(2000) ,

  y char(2000) ,

  z char(2000)  );

  SQL> CREATE PRIVATE TEMPORARY TABLE ora$ptt_temp

  ( x char(2000) ,

  y char(2000) ,

  z char(2000))

  ON COMMIT PRESERVE DEFINITION;

  ```


  接下来，我们来测量对上述两个表进行事务处理时生成的重做量：


  ```

  SQL> set serveroutput on format wrapped

  SQL> begin

  do_sql( ''insert into perm

  select 1,1,1

  from all_objects

  where rownum <= 500'' );

  do_sql( ''insert into ora$ptt_temp

  select 1,1,1

  from all_objects

  where rownum <= 500'' );

  dbms_output.new_line;

  do_sql( ''update perm set x = 2'' );

  do_sql( ''update ora$ptt_temp set x = 2'' );

  dbms_output.new_line;

  do_sql( ''delete from perm'' );

  do_sql( ''delete from ora$ptt_temp'' );

  end;

  /

  ```


  如您所见，生成的重做量与`TEMP_UNDO_ENABLED`设置为`FALSE`时全局临时表的行为相同：


  ```

  3,324,888 bytes of redo generated for "insert into perm         "...

  72,548 bytes of redo generated for "insert into ora$ptt_temp "...

  5,408,292 bytes of redo generated for "update perm set x = 2"...

  1,937,060 bytes of redo generated for "update ora$ptt_temp set x"...

  3,252,296 bytes of redo generated for "delete from perm"...

  3,225,464 bytes of redo generated for "delete from ora$ptt_temp"...

  ```


  如果我们在`TEMP_UNDO_ENABLED`设置为`TRUE`的情况下运行相同的测试，可以看到撤销生成量的巨大差异：


  ```

  3,324,828 bytes of redo generated for "insert into perm         "...

  384 bytes of redo generated for "insert into ora$ptt_temp "...

  2,201,092 bytes of redo generated for "update perm set x = 2"...

  384 bytes of redo generated for "update ora$ptt_temp set x"...

  3,251,936 bytes of redo generated for "delete from perm"...

  384 bytes of redo generated for "delete from ora$ptt_temp"...

  ```


  结论是，当你使用全局临时表或私有临时表时，如果希望最小化撤销生成，请将`TEMP_UNDO_ENABLED`设置为`TRUE`。


  ## 探究撤销


  Oracle 数据库创建并管理用于回滚（或撤销）数据库更改的信息。撤销最明显的用途是当你发出`ROLLBACK`语句以撤销你不想提交的数据更改时。以下是撤销用途的完整列表：


  *   通过`ROLLBACK`语句回滚事务

  *   实现读一致性

  *   恢复数据库

  *   使用 Oracle 闪回查询分析过去某个时间点的数据

  *   使用 Oracle 闪回功能从逻辑损坏中恢复


  我们已经讨论了前面几个关于撤销段的主题。我们已经了解了它们在恢复期间如何使用、如何与重做日志交互，以及如何用于数据的非阻塞读和一致读。在本节中，我们将探讨与撤销段最常被提及的问题。


  我们将主要讨论臭名昭著的`ORA-01555: snapshot too old`错误，因为这个单一问题在整个数据库主题集合中引起的困惑比任何其他主题都多。然而，在此之前，我们将先探究另一个与撤销相关的问题：哪种类型的
  DML 操作生成最多和最少的撤销（鉴于上一节临时表的示例，你可能已经可以自己回答这个问题）。


  ### 什么操作生成最多和最少的撤销？


  这是一个常被问到但容易回答的问题。索引的存在（或者表是索引组织表这一事实）可能会显著影响生成的撤销量，因为索引是复杂的数据结构，可能会产生大量的撤销信息。


  也就是说，`INSERT`操作通常会生成最少的撤销，因为 Oracle 为此需要记录的只是一个用于“删除”的 rowid。`UPDATE`操作通常在比赛中排名第二（在大多数情况下）。需要记录的只是更改的字节。通常你只会`UPDATE`整行数据中的一小部分。因此，只需在撤销中记住该行的一小部分。之前的许多示例与这个经验法则相悖，但那是因为它们更新的是大型、固定大小的行，并且更新了整行。更常见的情况是`UPDATE`一行并更改总行的一小部分百分比。`DELETE`操作通常会生成最多的撤销。对于`DELETE`，Oracle
  必须将整行的前映像记录到撤销段中。之前的关于重做生成的临时表示例就证明了这一点：`DELETE`生成的重做最多，并且由于临时表 DML 操作中唯一记录的元素是撤销，我们实际上观察到`DELETE`生成的撤销也最多。`INSERT`生成的需要记录的撤销非常少。`UPDATE`生成的量等于被更改数据的前映像，而`DELETE`生成的则是写入撤销段的整个数据集。


  如前所述，你还必须考虑在索引上执行的工作。你会发现，更新未索引的列不仅执行速度快得多，而且生成的撤销通常也比更新已索引的列少得多。例如，我们将创建一个包含两列的表，两列包含相同的信息，并为其中一列建立索引：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> create table t

  as

  select object_name unindexed,

  object_name indexed

  from all_objects;

  Table created.

  SQL> create index t_idx on t(indexed);

  Index created.

  SQL> exec dbms_stats.gather_table_stats(user,''T'');

  PL/SQL procedure successfully completed.

  ```


  注意：当你在自己的数据库上运行这些测试时，不会看到完全相同的结果。这将取决于你数据库中的对象数量，而不同数据库之间这个数量是不同的。


  现在我们将更新该表，首先更新未索引的列，然后更新已索引的列。我们需要一个新的`V$`查询来测量每种情况下生成的撤销量。以下查询为我们实现了这一点。它通过从`V$MYSTAT`获取我们的会话
  ID（`SID`），用它在`V$SESSION`视图中查找我们的记录，并检索事务地址（`TADDR`）。它使用`TADDR`调出我们的`V$TRANSACTION`记录（如果有的话）并选择`USED_UBLK`列——已使用的撤销块数。由于我们当前不在事务中，我们预计它现在会返回零行：


  ```

  SQL> select used_ublk

  from v$transaction

  where addr = (select taddr

  from v$session

  where sid = (select sid

  from v$mystat

  where rownum = 1

  )

  );

  no rows selected

  ```


  但在`UPDATE`开始一个事务后，查询将返回一行：


  ```

  SQL> update t set unindexed = lower(unindexed);

  72522 rows updated.

  SQL> select used_ublk

  from v$transaction

  where addr = (select taddr

  from v$session

  where sid = (select sid

  from v$mystat

  where rownum = 1

  )

  );

  USED_UBLK

  ----------

  1369

  SQL> commit;

  Commit complete.

  ```


  该`UPDATE`使用了 1369 个块来存储其撤销。提交会释放这些块，因此如果我们重新运行对`V$TRANSACTION`的查询，它将再次显示`no rows
  selected`。当我们更新相同的数据——只是这次带有索引——我们将观察到以下情况：


  ```

  SQL> update t set indexed = lower(indexed);

  72522 rows updated.

  SQL> select used_ublk

  from v$transaction

  where addr = (select taddr

  from v$session

  where sid = (select sid

  from v$mystat

  where rownum = 1

  )

  );

  USED_UBLK


  ```

  正如你所见，在这个例子中，更新`indexed`列产生的 undo 量是之前的好几倍。这是由于索引结构本身的内在复杂性以及我们更新了表中的每一行这一事实造成的——这移动了该结构中的每一个索引键值。


  ### ORA-01555: 快照过旧错误


  在上一章，我们简要研究了`ORA-01555`错误，并探讨了其成因之一：提交过于频繁。这里，我们将更详细地探究`ORA-01555`错误的成因和解决方案。`ORA-01555`是一种令人困惑的错误。它是许多神话、不准确说法和假设的基础。


  > **注意**

  >

  > `ORA-01555`错误与数据损坏或数据丢失完全无关。在这方面，它是一个“安全”的错误；唯一的后果是收到此错误的查询无法继续处理。


  这个错误其实很直接，只有两个真正的原因，但由于其中一个原因有一种非常频繁发生的特殊情况，我会说有三个：


  *   对于系统上执行的操作，`undo`段太小了。

  *   你的程序在`COMMIT`之间进行获取（实际上是第一点的变体）。我们在第 8 章中介绍过这一点。

  *   块清理。


  前两点与 Oracle 的读一致性模型直接相关。正如你在第 7 章中所回忆的，你的查询结果是*预先注定*的，这意味着在 Oracle 甚至检索第一行之前，结果就已经明确定义了。Oracle
  通过使用`undo`段来回滚自你的查询开始以来已更改的块，从而提供这种一致的时间点数据库“快照”。你执行的每条语句，例如以下


  ```

  SQL> update t set x = 5 where x = 2;

  SQL> insert into t select * from t where x = 2;

  SQL> delete from t where x = 2;

  SQL> select * from t where x = 2;

  ```


  都将看到`T`表以及`X=2`的行集的一个读一致性视图，而不管数据库中的任何其他并发活动。


  > **注意**

  >

  > 这里展示的四条语句只是说明哪些类型的语句会看到`T`表的读一致性视图。它们并不意味着要在数据库中作为单个事务运行，因为第一条`update`语句会导致后面的三条语句看不到任何记录。它们纯粹是说明性的。


  所有“读取”表的语句都利用了这种读一致性。在刚刚展示的例子中，`UPDATE`语句读取表以查找`x=2`的行（然后更新它们）。`INSERT`语句读取表以查找`X=2`的行，然后插入它们，依此类推。正是`undo`段的这种双重用途——既用于回滚失败的事务，又用于提供读一致性——导致了`ORA-01555`错误。


  前面列表中的第三点是`ORA-01555`更隐蔽的一个原因，因为它可能发生在只有一个会话的数据库中，并且当引发`ORA-01555`错误时，这个会话并没有修改正在被查询的表！这似乎是不可能的——为什么我们需要一个我们保证没有被修改的表的`undo`数据呢？我们很快就会知道。


  在我们通过图示查看所有三种情况之前，我想与你分享`ORA-01555`错误的通用解决方案：


  *   如果你的`undo`表空间启用了自动扩展，请正确设置`UNDO_RETENTION`参数（大于执行最长事务所需的时间或预期的最长闪回操作所需的时间）。`V$UNDOSTAT`可用于确定长时间运行查询的持续时间。另外，确保在磁盘上预留了足够的空间，以便`undo`段能够根据请求的`UNDO_RETENTION`增长到所需的大小。

  *   如果你的`undo`表空间是固定大小的，那么`UNDO_RETENTION`参数将被忽略，Oracle 会自动调整`undo`。对于固定大小的`undo`表空间，选择一个足够大的大小以容纳长时间运行的查询和闪回操作。

  *   减少查询的运行时间（对其进行优化）。如果可能，这始终是一件好事，所以它可能是你首先尝试的方法。它减少了对更大`undo`段的需求。此方法有助于解决前面的几点。

  *   收集相关对象的统计信息。这有助于避免前面列出的块清理问题。由于块清理是大规模`UPDATE`或`INSERT`操作的结果，因此无论如何都需要在一次大规模`UPDATE`或大加载之后收集统计信息。


  我们将回到这些解决方案，因为了解它们很重要。在开始之前，先将它们突出展示似乎是合适的。


  '
- '# 回滚段实际上太小了


  场景是这样的：你有一个系统，其中的事务都很小。因此，只需要分配很少的回滚段空间。例如，假设以下情况属实：


  *   每个事务平均产生 8KB 的回滚数据。

  *   你平均每秒执行五笔这样的事务（即每秒 40KB 回滚数据，每分钟 2400KB）。

  *   你有一个产生 1MB 回滚数据的事务，平均每分钟发生一次。总的来说，你每分钟产生约 3.5MB 的回滚数据。

  *   你的系统配置了极其少量的回滚空间。


  对于处理这些事务而言，这个数据库的回滚空间是绰绰有余的。回滚段大约平均每三到四分钟就会回绕并重用空间。如果你是基于执行数据修改的事务来调整回滚段大小的，那你的做法是正确的。


  然而，在同一个环境中，你可能还有一些报表需求。其中一些查询需要运行很长时间——可能需要五分钟。问题就出在这里。如果这些查询需要运行五分钟*并且*需要看到查询开始时存在的数据视图，那么你遇到
  `ORA-01555` 错误的概率就非常高。由于你的回滚段会在查询执行期间回绕，你知道自查询开始以来生成的一些回滚信息已经消失——它被覆盖了。如果你访问到一个在你开始查询前不久被修改过的数据块，该块的回滚信息将丢失，你就会收到
  `ORA-01555` 错误。


  这里有一个小例子。假设我们有一个表，其中包含块 1, 2, 3, …, 1,000,000。表 9-2 展示了一系列可能发生的时间。


  ## 长时间运行查询的时间线


  | 时间 (分钟:秒) | 操作 |

  | --- | --- |

  | 0:00 | 我们的查询开始。 |

  | 0:01 | 另一个会话 `UPDATE` 了块 1,000,000。该操作的回滚信息被记录到某个回滚段中。 |

  | 0:01 | 这个 `UPDATE` 会话执行了 `COMMIT`。它生成的回滚数据仍然存在，但现在如果需要空间，它就可能被覆盖。 |

  | 1:00 | 我们的查询仍在继续。当前读到块 200,000。 |

  | 1:01 | 系统活动频繁。到目前为止我们已经生成了略多于 14MB 的回滚数据。 |

  | 3:00 | 我们的查询仍在进行。当前大约在块 600,000 处。 |

  | 4:00 | 我们的回滚段开始回绕，并重用在 0:00 查询开始时处于活动状态的空间。具体来说，我们刚刚重用了在 0:01 更新块 1,000,000 时所使用的回滚段空间。
  |

  | 5:00 | 我们的查询终于到达了块 1,000,000。它发现该块自查询开始以来已被修改。它去回滚段中查找该块的回滚信息，试图获取一致读。此时，它发现所需的信息已不存在。`ORA-01555`
  错误被抛出，查询失败。 |


  这就是问题产生的全部条件。如果你的回滚段大小使得它们在查询执行期间很有可能被重用，并且你的查询访问的数据很可能被修改，那么你反复遇到 `ORA-01555` 错误的可能性就非常高。如果出现这种情况，你必须将
  `UNDO_RETENTION` 参数设置得更高，让 Oracle 自行计算需要保留多少回滚数据（这是推荐的方法；比你自己尝试计算完美的回滚段大小要容易得多），或者重新调整回滚段大小使其更大（或者数量更多）。你需要配置足够的回滚空间，使其持续时间能覆盖你的长时间运行查询。系统当初是为修改数据的事务调整大小的——你忘记了为系统的其他组件调整大小。


  有两种方法来管理系统中的回滚：


  ### 自动回滚管理

  在此方法中，通过 `UNDO_RETENTION` 参数告知 Oracle 需要保留回滚数据多长时间。Oracle 将根据并发工作负载决定创建多少个回滚段以及每个回滚段应该多大。数据库甚至可以在运行时在单个回滚段之间重新分配区，以满足
  DBA 设置的 `UNDO_RETENTION` 目标。这是推荐的回滚管理方法。


  ### 手动回滚管理

  不要使用这种方法。这是 Oracle 早期版本遗留下来的方式。


  使用手动回滚管理时，DBA 必须手动设置回滚段的大小和数量。不要使用手动方法。了解这个主题的知识主要是为了在团队中给资深 DBA 留下深刻印象时有用。


  在自动回滚管理下，从 `ORA-01555` 的角度看，事情就简单多了。DBA 首先创建一个可自动扩展的回滚表空间，然后告诉数据库运行时间最长的查询（或闪回操作）需要多长时间，并将该值设置在
  `UNDO_RETENTION` 参数中。Oracle 将尝试至少保留回滚数据达到该时长。如果分配了足够的空间用于增长，Oracle 将扩展回滚段而不是回绕——以努力遵守
  `UNDO_RETENTION` 周期。这与手动管理的回滚形成鲜明对比，后者会在可能的情况下尽快回绕并重用回滚空间。主要就是出于这个原因——对 `UNDO_RETENTION`
  参数的支持——我强烈建议尽可能使用 `自动回滚管理`。这个单一参数大大降低了 `ORA-01555` 错误的可能性（当它设置得当时）。


  如果你有一个固定大小的回滚表空间，那么 Oracle 会忽略 `UNDO_RETENTION` 参数。在这种配置下，你可以使用诸如“回滚指导”之类的工具来帮助你合理调整回滚表空间的大小。可以通过
  Enterprise Manager 或 `DBMS_ADVISOR` PL/SQL 包访问回滚指导。调整回滚段大小时，最重要的两个考虑因素是运行时间最长的查询的长度以及你为闪回操作所需的最长间隔。


  我有点过于深入 DBA 的角色了，所以我们接下来会讨论下一个案例。重要的是你要理解，这种情况下的 `ORA-01555` 错误是由于系统没有根据你的工作负载正确调整大小造成的。唯一的解决方案就是根据你的工作负载正确调整大小。这不是你的错，但既然你遇到了它，那就是你的问题。这就像在查询过程中临时空间用完一样。你要么为系统配置足够的临时空间，要么重写查询，使它们使用不需要临时空间的执行计划。


  为了演示这个效应，我们可以设置一个小而有点人为的测试。我们将创建一个非常小的回滚表空间，并使用一个会话产生许多小事务，几乎可以保证它会多次回绕并重用其分配的空间——无论
  `UNDO_RETENTION` 设置如何，因为我们不允许回滚表空间增长。使用这个回滚段的会话将修改一个表 `T`。它将对 `T` 进行全表扫描，并从“头”到“尾”读取它。在另一个会话中，我们将执行一个通过索引读取表
  `T` 的查询。这样，它将以某种随机的方式读取表：它会读第 1 行，然后是第 1000 行，接着是第 500 行，然后是第 20,001 行，依此类推。通过这种方式，我们往往会非常随机地访问数据块，并且可能在查询处理过程中多次访问。在这种情况下，遇到
  `ORA-01555` 错误的概率几乎是百分之百。


  因此，在一个会话中，我们首先连接到可插拔数据库（而不是根容器），并在其中创建一个新的回滚表空间：


  ```sql

  $ sqlplus eoda/foo@PDB1

  SQL> create undo tablespace undo_small

  datafile ''/tmp/undo.dbf'' size 2m

  autoextend off;

  Tablespace created.

  SQL> alter system set undo_tablespace = undo_small;

  System altered.

  ```



  ## ORA-01555


  现在，我们将设置要查询和修改的表 `T`。注意，我们在这个表中是随机排序数据的。`CREATE TABLE AS SELECT` 倾向于将从查询中获取的行按顺序放入数据块中。我们只是把行打乱，这样它们就不会被人为地按任何顺序排序，从而随机化它们的分布：


  ```

  SQL> drop table t purge;

  Table dropped.

  SQL> create table t

  as

  select *

  from all_objects

  order by dbms_random.random;

  Table created.

  SQL> alter table t add constraint t_pk primary key(object_id);

  Table altered.

  SQL> exec dbms_stats.gather_table_stats( user, ''T'', cascade=> true );

  PL/SQL procedure successfully completed.

  ```


  现在我们准备好进行修改了：


  ```

  SQL> begin

  for x in ( select rowid rid from t )

  loop

  update t set object_name = lower(object_name) where rowid = x.rid;

  commit;

  end loop;

  end;

  /

  ```


  当这个 PL/SQL 代码块运行时，我们将在另一个会话中运行一个查询。那个查询将读取表 `T` 并处理每条记录。它将在获取下一条记录之前花费大约 1/100 秒来处理每条记录（使用
  `DBMS_LOCK.SLEEP(0.01)` 模拟）。我们将在查询中使用 `FIRST_ROWS` 提示，让它使用我们创建的索引，通过索引按 `OBJECT_ID`
  排序从表中读取行。由于数据是随机插入到表中的，我们往往会相当随机地查询表中的数据块。这个块只会运行几秒钟就会失败：


  ```

  SQL> declare

  cursor c is

  select /*+ first_rows */ object_name

  from t

  order by object_id;

  l_object_name t.object_name%type;

  l_rowcnt      number := 0;

  begin

  open c;

  loop

  fetch c into l_object_name;

  exit when c%notfound;

  dbms_lock.sleep( 0.01 );

  l_rowcnt := l_rowcnt+1;

  end loop;

  close c;

  exception

  when others then

  dbms_output.put_line( ''rows fetched = '' || l_rowcnt );

  raise;

  end;

  /

  rows fetched = 191

  declare

  *

  ERROR at line 1:

  ORA-01555: snapshot too old: rollback segment number 39 with name

  "_SYSSMU39_2997928315$" too small

  ```


  如你所见，它在处理了少量记录后就失败了，出现了 `ORA-01555: snapshot too old` 错误。为了纠正这个问题，我们要确保完成两件事：


  *   数据库中的 `UNDO_RETENTION` 设置至少要足够长，以便这个读取过程能够完成。这将允许数据库增长撤销表空间，以保存足够的撤销数据供我们完成操作。

  *   允许撤销表空间增长，或者你手动为其分配更多的磁盘空间。


  对于这个例子，我确定我的长时间运行过程大约需要 720 秒完成（我的表中有大约 72,000 条记录，所以每行 0.01 秒，总共 720 秒）。我的 `UNDO_RETENTION`
  设置为 900（单位是秒，所以撤销保留时间约为 15 分钟）。我修改了撤销表空间的数据文件，允许它一次增长 1MB，最大到 2GB：


  ```

  SQL> alter database

  datafile ''/tmp/undo.dbf''

  autoextend on

  next 1m

  maxsize 2048m;

  Database altered.

  ```


  当我再次同时运行这些过程时，两者都运行完成了。这次撤销表空间的数据文件增长了，因为它被允许增长，而且我设置的撤销保留策略也要求这样做。


  ```

  SQL> select bytes/1024/1024

  from dba_data_files

  where tablespace_name = ''UNDO_SMALL'';

  BYTES/1024/1024

  ```


  所以，我们没有收到错误，而是成功完成了，并且撤销增长到足以满足我们的需求。确实，在这个例子中，出现错误纯粹是因为我们通过索引读取表 `T` 并在整个表中进行了随机读取。如果我们当时快速进行了全表扫描，很可能*在这种特定情况下*不会收到
  `ORA-01555` 错误。这是因为 `SELECT` 和 `UPDATE` 都会对 `T` 进行全表扫描，并且 `SELECT` 在扫描过程中很可能可以领先于
  `UPDATE`（`SELECT` 只需要读取，但 `UPDATE` 必须读取、更新，因此可能更慢）。通过进行随机读取，我们增加了 `SELECT` 需要读取一个数据块的可能性，而这个数据块是
  `UPDATE` 在很久之前修改并提交的。这正好展示了 `ORA-01555` 错误有些阴险的特性。它的出现取决于并发会话如何访问和操作底层表。


  ### 延迟块清除 (Delayed Block Cleanout)


  `ORA-01555` 错误的这个原因很难完全消除，但它也很少发生，因为其发生的条件并不经常出现。我们已经讨论过块清除机制，但总结一下，它是这样一个过程：在一个块被修改后，下一个访问该块的会话可能必须检查上次修改该块的事务是否仍然处于活动状态。一旦该过程确定事务不再活动，它就会清除该块，以便下一个访问它的会话不必再经历相同的过程。为了清除块，Oracle
  会确定先前事务使用的撤销段（从块的头中），然后确定撤销头是否指示事务已提交，以及（如果已提交）是何时提交的。这种确认通过两种方式之一完成。一种方式是，Oracle
  可以确定事务是在很久以前提交的，即使其事务槽在撤销段事务表中已被覆盖。另一种方式是，`COMMIT` SCN 仍然在撤销段的事务表中，这意味着事务是不久前提交的，其事务槽尚未被覆盖。


  要因延迟块清除而收到 `ORA-01555` 错误，必须满足以下所有条件：


  *   进行了一次修改并 `COMMIT` 提交，并且块没有被自动清除（例如，该事务修改的块数超过了 SGA 块缓冲区缓存的百分之十）。

  *   这些块没有被另一个会话接触，并且在我们的不幸查询（稍后显示）访问到它之前也不会被接触。

  *   一个长时间运行的查询开始。这个查询最终将读取一些来自先前的那些块。该查询开始于 SCN `t1`，即它必须回滚数据以达到读一致性的读一致 SCN。当我们开始时，修改事务的事务条目仍在撤销段事务表中。

  *   在查询期间，系统中进行了许多提交。这些事务不会触及有问题的块（如果它们触及了，就不会有即将发生的问题，因为它们会清除旧事务——解决了清除问题）。

  *   由于大量的 `COMMIT` 操作，撤销段中的事务表循环并重用了槽。最重要的是，原始修改事务的事务条目被循环覆盖和重用。此外，系统重用了撤销段区，从而阻止了对撤销段头块本身进行一致读。

  *   另外，由于大量的提交，现在记录在撤销段中的最低 SCN 已经超过了 `t1`（它高于查询的读一致 SCN）。


  当我们的查询访问到在它开始之前已被修改并提交的块时，它就遇到了麻烦。通常，它会前往该块指向的撤销段，并找到修改它的事务的状态（换句话说，它会找到该事务的 `COMMIT`
  SCN）。如果 `COMMIT` SCN 小于 `t1`，我们的查询就可以使用这个块。如果 `COMMIT` SCN 大于 `t1`，我们的查询就必须回滚那个块。然而，问题在于，在这种情况下，我们的查询无法确定该块的
  `COMMIT` SCN 是大于还是小于 `t1`。它不确定是否可以使用那个块映像。于是就导致了 `ORA-01555` 错误。



  '
- '# 实验重现由延迟块清理引起的 ORA-01555 错误


  为了说明这一点，我们将创建一个包含许多需要清理的数据块的表。然后，我们将在该表上打开一个游标，并允许许多小事务对另一个表（不是我们刚刚更新并打开了游标的那个表）执行操作。最后，我们将尝试获取游标的数据。现在，我们*知道*游标所需的数据将是“OK”的——我们应该能够看到所有数据，因为对表的修改*在*我们打开游标之前就已经发生并提交了。当我们这次遇到
  `ORA-01555` 错误时，那将是由先前描述的延迟块清理问题导致的。为此示例做准备，我们将使用：


  *   4MB 的 `UNDO_SMALL` UNDO 表空间。

  *   300MB 的 SGA，这样我们可以将一些脏块刷写到磁盘以观察此现象。


  在此之前，我们将创建 UNDO 表空间和我们将要查询的“大”表：


  ```sql

  $ sqlplus eoda/foo@PDB1

  SQL> create undo tablespace undo_small

  datafile ''/tmp/undo.dbf'' size 4m

  autoextend off;

  Tablespace created.

  SQL> create table big  as

  select a.*, rpad(''*'',1000,''*'') data

  from all_objects a;

  Table Created.

  SQL> alter table big add constraint big_pk  primary key(object_id);

  Table altered.

  SQL> exec dbms_stats.gather_table_stats( user, ''BIG'' );

  PL/SQL procedure successfully completed.

  ```


  注意


  你可能想知道为什么在收集统计信息的调用中，我没有使用 `CASCADE=>TRUE` 来收集主键约束默认创建的索引的统计信息。这是因为每当被索引的表不为空时，`CREATE
  INDEX` 或 `ALTER INDEX REBUILD` 已经隐含地添加了计算统计信息。因此，创建索引这一行为本身就会产生收集自身统计信息的副作用。没有必要重新收集我们已经拥有的统计信息。


  由于我们使用那个大的数据字段，每个块大约能得到六到七行，并且我的 `ALL_OBJECTS` 表有超过 70,000 行，所以之前的表会有很多块。接下来，我们将创建许多小事务将要修改的小表：


  ```sql

  SQL> create table small ( x int, y char(500) );

  Table created.

  SQL> insert into small select rownum, ''x'' from all_users;

  25 rows created.

  SQL> commit;

  Commit complete.

  SQL> exec dbms_stats.gather_table_stats( user, ''SMALL'' );

  PL/SQL procedure successfully completed.

  ```


  现在，我们要弄脏那个大表。我们有一个非常小的 UNDO 表空间，因此我们希望尽可能多地更新这个大表的数据块，同时生成尽可能少的 UNDO。我们将使用一个巧妙的
  `UPDATE` 语句来实现这一点。基本上，下面的子查询正在查找每个块上某一行的“第一个”rowid。该子查询将为每个数据库块返回一个 rowid，标识其上的一行。我们将更新该行，设置一个
  `VARCHAR2(1)` 字段。这将让我们更新表中的所有块（示例中大约 8000 多个），用将被写出的脏块淹没缓冲区缓存。我们也将确保使用那个小的 UNDO
  表空间。为了实现这一点且不超过 UNDO 表空间的容量，我们将设计一个 `UPDATE` 语句，只更新每个块上的“第一行”。内置分析函数 `ROW_NUMBER()`
  在此操作中至关重要；它按数据库块为表中的“第一行”分配编号 1，这将是我们要更新的单行：


  ```sql

  SQL> alter system set undo_tablespace = undo_small;

  System altered.

  SQL> update big

  set temporary = temporary

  where rowid in

  (

  select r

  from (

  select rowid r, row_number() over

  (partition by dbms_rowid.rowid_block_number(rowid) order by rowid) rn

  from big

  )

  where rn = 1

  );

  3064 rows updated.

  SQL> commit;

  Commit complete.

  ```


  好的，现在我们知道磁盘上有很多脏块。我们肯定写出了一些，因为我们根本没有空间容纳所有这些块。接下来，我们将打开一个游标，但暂时不会获取任何一行。请记住，当我们打开游标时，结果集是预先确定的，因此即使
  Oracle 没有实际处理任何数据行，打开该结果集这一行为就固定了结果必须“截至”的时间点。现在，由于我们将要获取的是我们刚刚更新并提交的数据，并且我们知道没有其他人修改这些数据，我们应该能够检索这些行而根本不需要任何
  UNDO。但这就是延迟块清理问题显露头角的地方。修改这些块的事务太新了，Oracle 在我们开始之前必须验证它是否已提交，如果我们覆盖了这些信息（也存储在 UNDO
  表空间中），查询就会失败。所以，下面是打开游标的操作：


  ```sql

  SQL> variable x refcursor

  SQL> exec open :x for select * from big where object_id  !./run.sh

  ```


  `run.sh` 文件是一个 shell 脚本；它只是使用一个命令启动了几个 SQL*Plus 会话：


  ```bash

  $ORACLE_HOME/bin/sqlplus eoda/foo@localhost:1521/PDB1 @test2 1  &

  $ORACLE_HOME/bin/sqlplus eoda/foo@localhost:1521/PDB1 @test2 2  &

  $ORACLE_HOME/bin/sqlplus eoda/foo@localhost:1521/PDB1 @test2 3  &

  ...

  ```


  在前面的代码中，每个 SQL*Plus 会话被传递了一个不同的数字（那是数字 1；还有 2、3 等等）。在前面的脚本中，请确保用你环境中的用户名和密码替换用户名和密码。它们每个运行的脚本
  `test2.sql` 如下：


  ```sql

  begin

  for i in 1 .. 5000

  loop

  update small set y = i where x= &1;

  commit;

  end loop;

  end;

  /

  exit

  ```


  所以，我们有几个会话在紧密循环中发起了许多事务。`run.sh` 脚本等待这几个 SQL*Plus 会话完成工作，然后我们返回到我们的会话，即那个带有打开游标的会话。在尝试打印它时，我们观察到以下内容：


  ```sql

  SQL> print x

  ORA-01555: snapshot too old: rollback segment number 44 with name

  "_SYSSMU44_3913812538$" too small

  no rows selected

  ```


  正如我所说，上述情况是罕见的。它需要满足很多条件，所有这些条件必须同时存在才会发生。我们需要存在需要清理的块，而这些块是稀缺的。`DBMS_STATS` 调用收集统计信息会清除它们，因此最常见的原因——大规模批量更新和批量加载——应该不是问题，因为无论如何，在此类操作后都需要分析表。大多数事务倾向于触及缓冲区缓存中不到百分之十的块；因此，它们不会产生需要清理的块。如果你认为你遇到了这个问题，即对一个没有其他
  DML 操作应用的表执行 `SELECT` 时引发了 `ORA-01555 error` ，请尝试以下解决方案：


  *   首先确保你使用的是“大小合适”的事务。确保你没有比应该的更频繁地提交。

  *   使用 `DBMS_STATS` 扫描相关对象，在加载后清理它们。由于块清理是非常大的批量 `UPDATE` 或 `INSERT` 的结果，无论如何都需要这样做。

  *   通过给予 UNDO 表空间扩展的空间并增加 `undo_retention` ，允许其增长。这降低了在你的长时间运行查询过程中 UNDO 段事务表槽被覆盖的可能性。这与
  `ORA-01555` 错误的另一个原因（两者密切相关；你在查询处理过程中经历了 UNDO 段重用）的解决方案相同。事实上，我重新运行了前面的示例，将 UNDO
  表空间设置为每次自动扩展 1MB，`undo_retention` 设置为 900 秒。针对表 `BIG` 的查询成功完成。

  *   减少查询的运行时间——对其进行优化。如果可能，这总是好的，所以它可能是你首先尝试的事情。


  最后一点建议：在你运行先前实验的数据库中，别忘了将 undo 表空间设回原来的那个。例如：


  ```sql

  SQL> alter system set undo_tablespace=undotbs2;

  SQL> drop tablespace undo_small including contents and datafiles;

  ```


  这样能确保你的数据库不是在一个极小的 undo 表空间下运行的。


  ## 总结


  在本章中，我们探讨了如何度量重做（redo）。我们也查看了 `NOLOGGING` 对重做生成的影响。当与直接路径操作（例如，直接路径插入）结合使用时，重做的生成可以显著减少。然而，对于常规的
  DML 语句，`NOLOGGING` 子句没有效果。


  我们探究了日志切换可能延迟的原因。如果 `DBWn` 还未完成对重做日志所保护数据的检查点操作，或者 `ARCn` 还未完成将重做日志文件复制到归档目的地，Oracle
  就不允许覆盖重做日志。这主要是 DBA 需要检测（检查 `alert.log`）和管理的问题。


  我们讨论了在临时表中发生的事务如何处理重做。在 12c 及以上版本中，重做量可以减少到几乎为零。对于使用临时表的应用程序，这可能对性能产生积极影响。


  在本章中，我们还调查了哪些语句生成最少和最多的 undo。通常，`INSERT` 生成的 undo 量最少，`UPDATE` 生成的比 `INSERT` 多，而
  `DELETE` 生成的 undo 最多。


  最后，我们探讨了臭名昭著的 `ORA-01555` 错误（快照过旧）的成因。该错误可能因为 undo 表空间大小设置过小而发生。DBA 必须确保 undo 表空间足够大，主要是为了消除这是错误的一个原因。我们还查看了延迟的块清除如何导致问题。如果你正确设置了你的事务大小和
  undo 表空间大小，你可能很少会遇到这个错误。调整引发 `ORA-01555` 错误的查询应始终是解决该问题的首选方法之一。


  '
- '# 10. 数据库表


  在本章中，我们将讨论各种类型的数据库表，并介绍何时可能希望使用每种类型（即，何时一种表类型比另一种更合适）。我们将集中讨论表的物理存储特性：数据如何组织和存储。


  曾几何时，实际上只有一种类型的表：普通表。它的管理方式就像一堆东西的管理（其定义出现在下一节）。随着时间的推移，Oracle 增加了更复杂的表类型。现在，除了堆组织表之外，还有索引聚簇表（三种类型）、索引组织表、嵌套表、临时表、外部表和对象表。每种表类型都有不同的特性，使其适用于不同的应用领域。


  ## 表的类型


  在深入细节之前，我们将定义每种表类型。Oracle 中有九种主要的表类型，如下所示：


  *   **堆组织表**：这些是普通的、标准的数据库表。数据以类似堆的方式管理。随着数据的添加，将使用在段中找到的第一个可以容纳该数据的可用空间。随着数据从表中移除，它允许空间可供后续的
  `INSERT` 和 `UPDATE` 操作重新使用。这就是“堆”这个名称的由来，它指的是这种类型的表。堆是一堆空间，并且它以一种有些随机的方式被使用。


  *   **索引组织表**：这些表存储在索引结构中。这为行本身强加了物理顺序。在堆中，数据被塞进任何可以容纳的地方，而在索引组织表（IOT）中，数据根据主键按排序顺序存储。


  *   **索引聚簇表**：聚簇是一个或多个表的组，物理存储在相同的数据库块上，所有共享相同聚簇键值的行在物理上彼此靠近存储。这种结构实现了两个目标。首先，许多表可以物理地连接存储在一起。通常，你会期望在一个数据库块上只找到一个表的数据，但使用聚簇表，来自多个表的数据可能存储在同一个块上。其次，所有包含相同聚簇键值的数据（例如
  `DEPTNO = 10`）将在物理上存储在一起。数据围绕着聚簇键值聚集。聚簇键是使用 B*树索引构建的。索引聚簇表的优点是，当访问经常在聚簇键上连接的表时，可以减少磁盘
  I/O 并提高查询性能。


  *   **哈希聚簇表**：这些表类似于索引聚簇表，但不是使用 B*树索引来通过聚簇键定位数据，哈希聚簇将键哈希到聚簇中，以找到数据应该所在的数据库块。在哈希聚簇中，数据就是索引（打个比方）。这些表适用于通过键上的相等比较频繁读取的数据。


  *   **排序哈希聚簇表**：这种表类型结合了哈希聚簇表和索引组织表的某些方面。概念如下：你有一个键值，行将根据它进行哈希（例如，`CUSTOMER_ID`），然后是一系列与该键相关的、按排序顺序到达的记录（基于时间戳的记录），并按该排序顺序处理。例如，客户在你的订单录入系统中下订单，这些订单以先进先出（FIFO）的方式被检索和处理。在这样的系统中，排序哈希聚簇可能是适合你的数据结构。


  *   **嵌套表**：这些是 Oracle 对象关系扩展的一部分。它们简单来说是系统生成和维护的、处于父/子关系中的子表。它们的工作方式与 `SCOTT` 模式中的
  `EMP` 和 `DEPT` 表类似，其中 `EMP` 表是嵌套表。`EMP` 被认为是 `DEPT` 表的子表，因为 `EMP` 表有一个指向 `DEPT`
  的外键——`DEPTNO`。主要区别在于，它们不是独立的堆组织表。


  *   **临时表**：这些表在事务或会话的生命周期内存储临时数据。这些表根据需要从当前用户的临时表空间分配临时区。每个会话只会看到该会话分配的区；它永远不会看到在任何其他会话中创建的任何数据。临时表允许你临时持久化数据，好处是比常规堆组织表生成少得多的重做（并且从
  Oracle 12*c* 开始也生成更少的撤销）。关于临时表的重做和撤销行为的完整讨论，请参见第 9 章。




  ## 表类型


  *   **对象表**：这些表基于对象类型创建。它们具有非对象表所没有的特殊属性，例如为每一行生成一个系统级的 `REF`。对象表实际上是堆表、索引组织表和临时表的特例，并且它们的结构中也可能包含嵌套表作为其一部分。


  *   **区块链表**：区块链表是不可变的（仅可插入）表。随着行被插入，它们被组织成多个链。每行（除了链中的第一行）都链接到前一行。这些行是防篡改的，意味着不能被移除或更新。每一行都使用一个加密哈希值进行签名，该哈希值基于新插入数据的哈希值和链中前一行的哈希值。这使得公司能够维护一个关于当前行和任何历史交易的防篡改审计跟踪。


  *   **外部表**：这些表中的数据并不存储在数据库本身中；相反，它们驻留在数据库外部的普通操作系统文件中（文件中的列数据通常由分隔符或位置界定）。外部表使你能够像查询数据库内部的普通堆组织表一样，查询驻留在数据库外部的文件。它们是将数据导入数据库的最有用的手段（它们是非常强大的数据加载工具）。此外，外部表具有卸载功能；这提供了一种在
  Oracle 数据库之间移动数据而无需使用数据库链接的简便方法。我们将在第 15 章详细探讨外部表。


  以下是一些关于表的通用信息，无论其类型如何：


  *   一个表最多可以有 1000 列，但我建议不要设计包含最大列数的表，除非有迫切需要。当列数远少于 1000 时，表的效率最高。Oracle 在内部会将超过
  254 列的行存储在相互指向的独立行片段中，必须重新组装这些片段才能生成完整的行映像。


  *   一个表可以有几乎无限数量的行，但你会遇到其他限制来阻止这种情况发生。例如，通常一个表空间最多可以有 1022 个文件（尽管有 `BIGFILE` 表空间可以让你超越这些文件大小限制）。假设你有一个典型的表空间，并且使用的是
  32GB 大小的文件——也就是说，总大小为 32,704GB。这将是 2,143,289,344 个块，每个块大小为 16KB。你可能能够在一个块中容纳 160
  行，每行 80 到 100 字节。这将给你带来 342,926,295,040 行。然而，如果你对表进行分区，你可以轻松地将这个数字乘以很多倍。例如，考虑一个有
  1024 个哈希分区的表——那将是 1024 * 342,926,295,040 行。虽然存在限制，但在你甚至接近一个表中拥有 351,156,526,120,960
  行之前，你就会遇到其他实际限制。


  *   一个表可以拥有的索引数量与列的排列组合数一样多（以及这些列上的函数的排列组合，以及你能想到的任何唯一表达式的排列组合）。随着基于函数的索引的出现，理论上你可以创建的索引数量变得无限！然而，实际的限制，例如整体性能（你添加的每个索引都会给对该表的
  `INSERT` 操作增加开销），将限制你实际创建和维护的索引数量。


  *   即使在单个数据库内，你可以拥有的表数量也没有限制。但同样，实际的限制会将这个数字保持在合理的范围内。你不会拥有数百万个表（因为这么多表不切实际地创建和管理），但你可能拥有数千个表。


  在下一节中，我们将介绍与表相关的一些参数和术语。之后，我们将开始讨论基本的堆组织表，然后继续探讨其他类型。


  ### 术语


  在本节中，我们将介绍与表相关的各种存储参数和术语。并非所有参数都用于每种表类型。例如，`PCTUSED` 参数在 IOT 的上下文中没有意义（原因将在第 11
  章变得显而易见）。我们将作为每种表类型讨论的一部分来涵盖相关参数。目标是介绍并定义这些术语。在适当的情况下，关于使用特定参数的更多信息将在后续章节中介绍。




  '
- '# Oracle 数据库中的段


  ## 段（Segment）


  Oracle 中的`Segment`是一种在磁盘上消耗存储空间的对象。虽然段类型众多，但最常见的有如下几种：


  *   `Cluster`（簇）：这种段类型能够存储表。簇有两种类型：B*Tree 簇和哈希簇。簇通常用于将来自多个表的相关数据预连接并存储在同一个数据库块中，以及将单个表的相关信息存储在一起。名称“cluster”指的是该段能够将相关信息物理地聚集在一起的能力。

  *   `Table`（表）：表段保存数据库表的数据，可能是与索引段一起使用的最常见的段类型。

  *   `Table partition`（表分区）或`subpartition`（子分区）：这种段类型用于分区，与表段非常相似。表分区或子分区段仅保存表中的一部分数据。一个分区表由一个或多个表分区段组成，而一个复合分区表则由一个或多个表子分区段组成。

  *   `Index`（索引）：这种段类型保存索引结构。

  *   `Index partition`（索引分区）：类似于表分区，这种段类型包含索引的某个部分。一个分区索引由一个或多个索引分区段组成。

  *   `Lob partition`（LOB 分区）、`lob subpartition`（LOB 子分区）、`lobindex`和`lobsegment`：`lobindex`和`lobsegment`段保存`large
  object`（大对象），或称`LOB`的结构。当包含`LOB`的表被分区时，`lobsegment`也会被分区——`lob partition`段就是用于此目的。有趣的是，并不存在`lobindex
  partition`这种段类型——无论出于何种原因，Oracle 将分区后的 LOB 索引标记为索引分区。`LOB`将在第 12 章中详细讨论。

  *   `Nested table`（嵌套表）：这是分配给嵌套表的段类型，嵌套表是主/细目关系中一种特殊的子表，我们稍后会讨论。

  *   `Rollback`（回滚）和`Type2 undo`（类型 2 撤销）：这是存放撤销（undo）数据的地方。回滚段是由 DBA 手动创建的。`Type2
  undo`段则由 Oracle 自动创建和管理。


  因此，举例来说，一个表可能是一个段。一个索引也可能是一个段。我强调“可能是”这个词，是因为我们可以将一个索引分区到独立的段中。因此，索引对象本身可能只是一个定义，而不是一个物理段——该索引将由许多索引分区组成，而每个`index
  partition`（索引分区）本身是一个段。一个表可能是一个段，也可能不是。出于同样的原因，我们可能因为分区而拥有许多表段，或者我们可能在一个名为`cluster`的段中创建一个表。这个表将驻留于此，可能与同一簇段中的其他表共存。


  然而，最常见的情况是，一个表是一个段，一个索引也是一个段。就目前而言，这样考虑是最简单的方式。当你创建一个表时，你通常是在创建一个新的表段，并且如第 3 章所述，该段由区（extent）组成，区又由块（block）组成。这是正常的存储层次结构。但重要的是要注意，只有一对一的关系是常见情况。例如，考虑这个简单的`CREATE
  TABLE`语句：

  ```sql

  $ sqlplus eoda/foo@PDB1

  SQL> create table t ( x int primary key, y clob, z blob );

  ```

  这条语句会创建六个段，假设是在 Oracle 11g Release 1 及更早版本中；在 Oracle 11g Release 2 及更高版本中，默认情况下段创建会延迟到插入第一行时才进行（我们将在下面使用语法让段立即创建）。如果在没有任何对象的模式（schema）中执行此`CREATE
  TABLE`语句，你将观察到以下情况：

  ```sql

  SQL> select segment_name, segment_type from user_segments;

  no rows selected

  SQL> create table t

  ( x int primary key,

  y clob,

  z blob )

  SEGMENT CREATION IMMEDIATE;

  Table created.

  SQL> select segment_name, segment_type from user_segments;

  SEGMENT_NAME                   SEGMENT_TYPE

  ------------------------------ ---------------

  T                              TABLE

  SYS_LOB0000021096C00003$$      LOBSEGMENT

  SYS_LOB0000021096C00002$$      LOBSEGMENT

  SYS_IL0000021096C00003$$       LOBINDEX

  SYS_IL0000021096C00002$$       LOBINDEX

  SYS_C005958                    INDEX

  6 rows selected.

  ```

  在本例中，表本身创建了一个段：输出中的第一行。此外，主键约束在此情况下创建了一个索引段以强制唯一性。


  注：唯一约束或主键约束可能会也可能不会创建新的索引。如果在被约束列上存在现有索引，并且这些列位于该索引的引导端（leading edge），那么约束可以并且将会使用该索引。


  此外，每个`LOB`列创建了两个段：一个段用于存储字符大对象（`CLOB`）或二进制大对象（`BLOB`）指针所指向的实际数据块，另一个段用于组织它们。`LOB`支持非常大的信息块，最大可达数千兆字节。它们以块的形式存储在`lobsegment`中，而`lobindex`用于跟踪`LOB`块的位置以及访问它们的顺序。


  注：延迟段创建功能仅在 Oracle 的企业版（Enterprise Edition）中可用。如果你在一个同时拥有企业版和标准版数据库的环境中工作，那么从`EE`数据库导出对象到`SE`数据库时要格外小心。如果你尝试导出尚未创建段的对象，或者尝试将对象导入到`SE`数据库，可能会收到此错误：`ORA-00439
  feature not enabled`。一个解决方法是最初在`EE`数据库中使用`SEGMENT CREATION IMMEDIATE`创建表。更多详情请参阅
  Oracle 支持说明 1087325.1。


  ## 段空间管理


  管理段中的空间有两种方法：


  *   `Manual Segment Space Management`（手动段空间管理）：你设置各种参数，如`FREELISTS`、`FREELIST GROUPS`、`PCTUSED`等，以控制段中的空间随时间如何分配、使用和重用。在本章中，我将这种空间管理方法称为`MSSM`，但请记住，这是一个虚构的缩写，在
  Oracle 文档中并不广泛使用。

  *   `Automatic Segment Space Management (ASSM)`（自动段空间管理）：你控制一个与空间使用相关的参数：`PCTFREE`。其他参数在段创建时被接受，但会被忽略。


  `MSSM`是 Oracle 中的传统实现。它已经存在多年，跨越多个版本。本书中我将不再进一步讨论这种空间管理类型。


  `ASSM`消除了微调无数用于控制空间分配的参数的需要（正如旧的`MSSM`方法所要求的），并提供了高并发性。适用于`ASSM`段的唯一存储设置如下：

  *   `BUFFER_POOL`

  *   `PCTFREE`

  *   `INITRANS`


  段空间管理是从段所在表空间继承的属性（段从不跨越表空间）。要让一个段使用`ASSM`，它必须驻留在支持这种空间管理方法的表空间中。



  ### 高水位标记


  此术语用于描述存储在数据库中的表段。可以将一个表想象为一个扁平结构，或是一系列从左到右依次排列的数据块。*高水位标记*（*HWM*）就是曾经包含过数据的最右边的块，如图
  10-1 所示。


  ![../images/319655_4_En_10_Chapter/319655_4_En_10_Fig1_HTML.jpg](img/319656_4_En_10_Fig1_HTML.jpg)


  图 10-1 HWM 示意图


  图 10-1 显示，对于一个新创建的表，HWM 起始于第一个块。随着时间推移，数据被放入表中，更多的块被使用，HWM 会上升。如果我们删除了表中的部分（甚至*全部*）行，可能会有很多块不再包含数据，但它们仍然位于
  HWM 之下，并且在对象被重建、截断或收缩之前（收缩段仅在该段位于 ASSM 表空间中时才支持），它们将保持在 HWM 之下。


  HWM 之所以重要，是因为在全表扫描期间，Oracle 会扫描 HWM 之下的所有块，即使它们不包含任何数据。这将影响全表扫描的性能——特别是当 HWM 之下的大多数块都是空的时候。要理解这一点，只需创建一个包含
  1,000,000 行的表（或任何包含大量行的表），然后执行 `SELECT COUNT(*)`。现在，`DELETE` 表中的每一行，你会发现 `SELECT
  COUNT(*)` 统计 *0* 行所花费的时间与统计 1,000,000 行一样长（甚至更长，取决于是否需要清理块；请参阅第 9 章的“块清理”部分）。这是因为
  Oracle 正在忙于读取 HWM 之下的所有块，以查看它们是否包含数据。你应该将此与使用 `TRUNCATE` 而不是逐行删除表时的结果进行比较。`TRUNCATE`
  会将表的 HWM 重置为零，并同时截断表上的关联索引。出于这个原因，如果你打算删除表中的每一行，`TRUNCATE`（如果可以使用）将是首选方法。


  **注意**


  请记住，`TRUNCATE` 语句不能回滚，并且表上的任何触发器（如果存在）也不会被触发。因此，在截断之前，请确保你希望永久删除数据，因为此操作无法撤销。


  在 ASSM 表空间中，存在一个 HWM *和*一个低 HWM。当 HWM 推进时，Oracle 并不会立即格式化*所有*块——它们仅在第一次实际使用时才被格式化并变得可以安全读取。第一次实际使用发生在数据库决定向给定块插入记录时。在
  ASSM 下，数据可以插入到低 HWM 和 HWM 之间的任何块中，因此这两个点之间的许多块可能尚未被格式化。低 HWM 被定义为这样一个点：其下方的所有块都已格式化（因为它们当前包含数据或之前包含过数据）。


  因此，在全扫描一个段时，我们需要知道要读取的块是安全的还是未格式化的（这意味着它们不包含任何有用信息，我们无需处理它们）。为了避免让表中的每个块都进行安全/不安全检查，Oracle
  维护了一个低 HWM 和一个 HWM。Oracle 将全扫描表至 HWM——对于低 HWM 之下的所有块，它将直接读取并处理。对于低 HWM 和 HWM 之间的块（见图
  10-2），它必须更加小心，并参考用于管理这些块的 ASSM 位图信息，以确定哪些块应该读取，哪些应该忽略。


  ![../images/319655_4_En_10_Chapter/319655_4_En_10_Fig2_HTML.jpg](img/319656_4_En_10_Fig2_HTML.jpg)


  图 10-2 低 HWM 示意图


  ### PCTFREE


  通常，`PCTFREE` 参数告诉 Oracle 应该在块上为将来的更新保留多少空间。默认值是百分之十。如果块上的空闲空间百分比高于 `PCTFREE` 中指定的值，则该块被视为*空闲*。`PCTFREE`
  告诉 Oracle 应该为将来的更新在块上保留多少空间。这意味着，如果我们使用 8KB 的块大小，一旦向块添加新行导致块上的空闲空间降至约 800 字节以下，Oracle
  将使用 `FREELIST` 中的另一个块，而不是现有的块。块上数据空间的这百分之十是为该块上行的更新而预留的。当你使用 ASSM 时，`PCTFREE` 限制新行是否可以插入到块中，但它不控制块是否在
  `FREELIST` 上，因为 ASSM 根本不使用 `FREELIST`。


  **注意**


  在 ASSM 中，`PCTUSED` 被直接忽略。


  `PCTFREE` 有三种设置：过高、过低和恰到好处。如果你为块设置的 `PCTFREE` 过高，你将浪费空间。如果你将 `PCTFREE` 设置为 50%，并且从不更新数据，那么你只是浪费了每个块
  50% 的空间。然而，对于另一个表，50% 可能非常合理。如果行开始时很小，并且倾向于增长到两倍大小，将 `PCTFREE` 设置得太小将在你更新行时导致行迁移。


  ```text

  # PCTFREE 设置示例

  PCTFREE = 10   # 适用于默认情况

  PCTFREE = 50   # 适用于行会显著增长的表

  PCTFREE = 0    # 适用于静态、只读的表

  ```



  #### 行迁移


  什么是行迁移？`Row migration`（行迁移）是指一行数据因增长过大而无法与同一块中的其他行共存，被迫离开其初始创建的块。为了说明行迁移，我们从一个类似于图
  10-3 的块开始。


  ![../images/319655_4_En_10_Chapter/319655_4_En_10_Fig3_HTML.jpg](img/319655_4_En_10_Fig3_HTML.jpg)


  图 10-3


  更新前的数据块


  大约有七分之一的块是空闲空间。然而，我们希望通过一个 `UPDATE` 操作将第 4 行数据占用的空间增加一倍以上（它目前占用了块空间的七分之一）。在这种情况下，即使
  Oracle 合并了块上的空间，如图 10-4 所示，仍然没有足够的空间来使第 4 行的大小翻倍，因为空闲空间的大小小于第 4 行当前的大小。


  ![../images/319655_4_En_10_Chapter/319655_4_En_10_Fig4_HTML.jpg](img/319655_4_En_10_Fig4_HTML.jpg)


  图 10-4


  合并空闲空间后的数据块外观


  如果这行数据能放入合并后的空间，它就会留在原地。但这次，Oracle 不会执行这种合并，块将保持原状。由于第 4 行如果留在这个块上就必须跨越多个块，Oracle
  将会移动（或迁移）这一行。然而，Oracle 不能只是移动行；它必须留下一个转送地址。可能有索引物理指向第 4 行的这个地址。一个简单的更新操作不会同时修改这些索引。


  **注意**


  在分区表中有一个特殊情况，即 `rowid`（行的地址）会改变。我们将在第 13 章中讨论这种情况。此外，其他管理操作，如 `FLASHBACK TABLE`
  和 `ALTER TABLE SHRINK`，也可能改变分配给行的 `rowid`。


  因此，当 Oracle 迁移行时，它会留下一个指向行真实位置的指针。更新后，这些块可能如图 10-5 所示。


  ![../images/319655_4_En_10_Chapter/319655_4_En_10_Fig5_HTML.jpg](img/319655_4_En_10_Fig5_HTML.jpg)


  图 10-5


  迁移行的描绘


  所以，一个 `migrated row`（迁移行）是指必须从它被插入的块移动到其他某个块的一行。为什么这是个问题？你的应用程序永远不会知道；你使用的 SQL 也没有什么不同。这仅仅关系到性能原因。如果你通过索引去读取这一行，索引会指向原始块。那个块会指向新块。原本读取索引大约需要两到三次
  I/O，再读取表需要一次 I/O，现在你需要额外再多一次 I/O 才能获取到实际的行数据。在孤立情况下，这没什么大不了的——你甚至不会注意到它。然而，当你的表中很大比例的行处于这种状态，并且有许多用户访问它们时，你就会开始注意到这个副作用。访问这些数据的速度会开始变慢（额外的
  I/O 及其相关的锁存增加了访问时间），缓冲区缓存效率会下降（如果行没有迁移，你只需要缓冲一个块，现在你需要缓冲两个块），并且你的表在大小和复杂性上都会增长。基于这些原因，你通常不希望有迁移行（但如果一个包含数千或更多行的表中只有几百/几千行是迁移的，也不必为此过分担忧）。


  有趣的是，我们可以看看 Oracle 会如何处理图 10-5 中从左边块迁移到右边块的行，如果它在未来某个时间点必须再次迁移。这可能是由于其他行被添加到它迁移到的块中，然后更新这一行使其变得更大。Oracle
  实际上会将这一行迁移回原始块，并且如果有足够空间，就将其留在那里（该行可能变得 `unmigrated`）。如果没有足够空间，Oracle 会将该行完全迁移到另一个块，并更改
  `original` 块上的转送地址。因此，行迁移总是涉及一级间接寻址。


  那么，现在我们回到 `PCTFREE` 及其用途：当设置得当时，它就是帮助你最小化行迁移的设置。


  #### 设置 PCTFREE 值


  设置 `PCTFREE` 有时会被忽视。一方面，你需要使用它来避免太多行发生迁移。另一方面，你需要使用它来避免浪费太多空间。你需要审视你的对象，描述它们将如何被使用，然后才能为设置这些值制定一个合理的计划。关于这个设置的经验法则很可能失效；它确实需要根据实际使用情况来设定。


  *   **高** `PCTFREE`：此设置适用于当你插入大量将要被更新的数据，并且更新会频繁增加行的大小时。此设置在插入后在块上保留大量空间（高 `PCTFREE`）。


  *   **低** `PCTFREE`：此设置适用于你倾向于只对表执行 `INSERT` 或 `DELETE` 操作，或者如果你执行 `UPDATE`，而该 `UPDATE`
  倾向于缩小行的大小时。


  同样，对于这些参数什么是高、什么是低，没有硬性规定。在设置 `PCTFREE` 时，你必须考虑应用程序的行为。`PCTFREE` 值的范围可以从 0 到 99。一个较高的
  `PCTFREE` 设置可能是 70，这意味着块中 70% 的空间将被保留用于更新。一个较低的 `PCTFREE` 值可能是 5，意思是你在块上留下很少的空间用于未来的更新（这些更新会使行增长）。较高的
  `PCTFREE` 设置可能在 70 到 80 的范围内。较低的 `PCTFREE` 设置大约在 10 左右。


  #### LOGGING 和 NOLOGGING


  通常，对象是以 `LOGGING` 方式创建的，这意味着针对它们执行的所有可以生成重做的操作都会生成重做。`NOLOGGING` 允许针对该对象执行某些操作而不生成重做；我们在第
  9 章详细讨论过这一点。`NOLOGGING` 只影响少数特定操作，例如对象的初始创建、使用 SQL*Loader 的直接路径加载或重建（请参阅你正在使用的数据库对象的
  *Oracle Database SQL Language Reference* 手册以了解哪些操作适用）。


  此选项不会全局禁用对象的日志文件生成——仅针对非常具体的操作。例如，如果我使用 `SELECT NOLOGGING` 创建一个表，然后执行 `INSERT INTO
  THAT_TABLE VALUES ( 1 )`，则该 `INSERT` 操作会被记录，但表的创建可能不会被记录（DBA 可以在数据库或表空间级别强制启用日志记录）。


  #### INITRANS


  段中的每个块都有一个块头。块头的一部分是一个事务表。事务表中的条目将描述哪些事务锁定了块上的哪些行/元素。此事务表的初始大小由对象的 `INITRANS` 设置指定（对于表和索引，默认值为
  2）。


  **注意**


  请注意，有一个遗留的 `MAXTRANS` 参数。此参数会被忽略，因为所有段的 `MAXTRANS` 均为 255。




  ## 堆组织表


  堆组织表在应用程序中的使用率大概达到 99%（甚至更高）。堆组织表是当你执行 `CREATE TABLE` 语句时默认获得的表类型。如果你想要任何其他类型的表结构，你需要在
  `CREATE` 语句本身中指定。


  `堆` 是计算机科学中研究的一种经典数据结构。它本质上是一个巨大的空间区域，位于磁盘或内存中（对于数据库表而言当然是磁盘），以看似随机的方式进行管理。数据会被放在最合适的地方，而不是按照任何特定的顺序排列。许多人期望数据能按照插入时的顺序从表中返回，但对于堆来说，这绝对无法保证。事实上，相反的情况几乎是必然的：行将以完全不可预测的顺序出现。这一点很容易演示。


  在这个例子中，我将建立一个表，使得在我的数据库中，每个数据块（我使用的是 8KB 的块大小）能恰好容纳一整行。你不必非得是每个数据块只有一行的情况——我只是利用这个设定来演示一个可预测的事件序列。以下这种行为（即行没有顺序）可以在所有大小的表中观察到，无论数据库的块大小如何：

  ```sql

  SQL> create table t ( a int,

  b varchar2(4000) default rpad(''*'',4000,''*''),

  c varchar2(3000) default rpad(''*'',3000,''*''));

  Table created.

  SQL> insert into t (a) values ( 1);

  1 row created.

  SQL> insert into t (a) values ( 2);

  1 row created.

  SQL> insert into t (a) values ( 3);

  1 row created.

  SQL> delete from t where a = 2 ;

  1 row deleted.

  SQL> insert into t (a) values ( 4);

  1 row created.

  SQL> select a from t;

  A

  ---

  ```

  如果你想重现这个例子，请根据你的块大小调整列 `B` 和 `C`。例如，如果你的块大小是 2KB，你就不需要列 `C`，而列 `B` 应该是一个 `VARCHAR2(1500)`，默认值为
  1500 个星号。因为数据在这样的表中是以堆的方式管理的，所以当空间变得可用时，它就会被重用。


  对表进行全表扫描时，数据会按照其被发现的顺序检索出来，而不是插入的顺序。这是理解数据库表的一个关键概念：总的来说，它们本质上是**无序的数据集合**。你还应该注意到，我不需要使用
  `DELETE` 来观察这种效果；我也可以只用 `INSERT` 来达到同样的结果。如果我先插入一个小行，接着插入一个大到无法与小行共享同一个数据块的大行，然后再次插入一个小行，我完全可能观察到，默认情况下行是以“小行、小行、大行”的顺序出现的。它们不会按照插入顺序被检索——Oracle
  会把数据放在合适的地方，而不是按照日期或事务的任何顺序。


  如果你的查询需要按插入顺序检索数据，你必须在表中添加一个列，以便在检索时使用该列对数据进行排序。例如，这个列可以是一个数字列，通过一个递增的序列（使用 Oracle
  的 `SEQUENCE` 对象）来维护。然后，你可以在 `SELECT` 语句中对该列进行 `ORDER BY`，从而*近似*获得插入顺序。之所以说是近似，是因为序列号为
  `55` 的行很可能在序列号为 `54` 的行提交之前就已经提交了；因此，它在数据库中是正式的第一条记录。


  你应该将堆组织表视为一个庞大的、无序的行集合。这些行将以看似随机的顺序出现，并且根据使用的其他选项（并行查询、不同的优化器模式等），同一个查询的结果顺序也可能不同。除非你的查询中有
  `ORDER BY` 语句，否则永远不要指望查询返回行的顺序！


  撇开这点不谈，关于堆表有什么是需要了解的呢？好吧，`CREATE TABLE` 的语法在 Oracle 提供的 *Oracle Database SQL Language
  Reference* 手册中占了 100 多页，所以有很多与之相关的选项。选项如此之多，要全部掌握是相当困难的。光是连接图（或称*铁轨图*）就占了 20 页。我自己使用的一个技巧是，为某个给定的表创建尽可能简单的
  `CREATE TABLE` 语句，例如：

  ```sql

  $ sqlplus eoda/foo@PDB1

  SQL> set long 100000

  SQL> create table t

  ( x int primary key,

  y date,

  z clob);

  Table created.

  ```

  然后，使用标准提供的包 `DBMS_METADATA`，我查询它的定义，就能看到冗长的语法：

  ```sql

  SQL> select dbms_metadata.get_ddl( ''TABLE'', ''T'' ) from dual;

  DBMS_METADATA.GET_DDL(''TABLE'',''T'')


  CREATE TABLE "EODA"."T"

  (    "X" NUMBER(*,0),

  "Y" DATE,

  "Z" CLOB,

  PRIMARY KEY ("X")

  USING INDEX PCTFREE 10 INITRANS 2 MAXTRANS 255

  TABLESPACE "USERS"  ENABLE

  ) SEGMENT CREATION DEFERRED

  PCTFREE 10 PCTUSED 40 INITRANS 1 MAXTRANS 255

  NOCOMPRESS LOGGING

  TABLESPACE "USERS"

  LOB ("Z") STORE AS SECUREFILE (

  TABLESPACE "USERS" ENABLE STORAGE IN ROW CHUNK 8192

  NOCACHE LOGGING  NOCOMPRESS  KEEP_DUPLICATES )

  ```

  这个技巧的好处在于，它显示了我 `CREATE TABLE` 语句的许多选项。我只需要选择数据类型等；Oracle 会为我生成冗长的版本。现在我可以对这个冗长的版本进行定制，例如将
  `ENABLE STORAGE IN ROW` 改为 `DISABLE STORAGE IN ROW`，这将禁止在行内与结构化数据一起存储 `LOB` 数据，导致其存储在另一个段中。我自己一直在用这个技巧，以避免去解读那些巨大的连接图。我也使用这个技术来学习在不同的情况下
  `CREATE TABLE` 语句有哪些可用的选项。


  既然你知道了如何查看给定 `CREATE TABLE` 语句的大部分选项，那么对于堆表，有哪些重要的选项是你需要注意的呢？在我看来，结合 ASSM（自动段空间管理），有三个很重要：


  *   `PCTFREE`：衡量在 `INSERT` 过程中块可以被填满的程度。如前所示，它用于根据块当前的满度来控制是否可以向块中添加行。此选项还用于控制后续更新引起的行迁移，需要根据你如何使用表来设置。

  *   `INITRANS`：最初分配给一个块的事务插槽数量。如果设置过低（默认为 2），此选项可能导致被许多用户访问的块出现并发问题。如果一个数据库块几乎已满，并且事务列表无法动态扩展，会话将会为此块排队，因为每个并发事务都需要一个事务插槽。如果你认为同一块上会有很多并发更新，请考虑增加此值。

  *   `COMPRESS/NOCOMPRESS`：在直接路径操作或常规路径（即“常规”）操作（如 `INSERT`）期间启用或禁用表数据压缩。使用 `COMPRESS`
  或 `NOCOMPRESS` 来指定仅在直接路径操作期间使用（或不使用）表压缩。可用的选项有 `NOLOGGING`、`COMPRESS FOR OLTP` 和
  `COMPRESS BASIC`。`NOLOGGING` 禁用任何压缩，`COMPRESS FOR OLTP` 为所有操作（直接或常规路径）启用压缩，而 `COMPRESS
  BASIC` 仅对直接路径操作启用压缩。从 Oracle 12c 开始，这些压缩选项现在在语法上被指定为 `ROW STORE COMPRESS BASIC`（在直接路径操作期间启用压缩）和
  `ROW STORE COMPRESS ADVANCED`（为所有操作启用压缩）。


  注意

  存储在 LOB 段中的脱机 LOB 数据不使用为表设置的 `PCTFREE`/`PCTUSED` 参数。这些 LOB 块的管理方式不同：它们总是被填满，只有在完全清空时才会返回到
  `FREELIST`。



  ## 索引组织表


  ``索引组织表`` (``IOTs``) 本质上就是存储在索引结构中的表。存储在堆中的表是无组织的（即数据存放在任何有可用空间的地方），而 ``IOT`` 中的数据则按照
  ``主键`` 进行存储和排序。从应用程序的角度来看，``IOTs`` 的行为与“常规”表完全一样；你照常用 ``SQL`` 访问它们。它们对于信息检索、空间数据和
  OLAP 应用尤其有用。


  ``IOT`` 的意义何在？实际上，你可能想反过来问：``堆组织表`` 的意义何在？既然关系数据库中的所有表都应该有一个 ``主键``，那么使用 ``堆组织表``
  不就是一种空间浪费吗？使用 ``堆组织表`` 时，我们必须同时为表本身和表的 ``主键`` 索引预留空间。而使用 ``IOT``，``主键`` 索引的空间开销就被消除了，因为索引即数据，数据即索引。事实上，索引是一种复杂的数据结构，需要大量工作来管理和维护，并且随着待存储行宽度的增加，维护需求也会增加。相比之下，堆的管理则非常简单。``堆组织表``
  相比 ``IOT`` 确实存在一些效率优势。话虽如此，``IOTs`` 相对于其堆表对应物也有其明确的优势。例如，我曾经在一些文本数据上构建过倒排列表索引（这早于
  interMedia 及相关技术的引入）。我有一张满是文档的表，我会解析这些文档并在其中查找单词。我的表结构如下：


  ```sql

  SQL> create table keywords

  ( word  varchar2(50),

  position   int,

  doc_id int,

  primary key(word,position,doc_id));

  ```


  在这里，我的表完全由 ``主键`` 列组成。我的开销超过了 100%；我的表和 ``主键`` 索引的大小相当（实际上，``主键`` 索引更大，因为它物理地存储了所指向行的
  ``rowid``，而 ``rowid`` 并不存储在表中——它是被推断出来的）。我只会在 ``WHERE`` 子句中针对 ``WORD`` 列或 ``WORD``
  和 ``POSITION`` 列使用这张表。也就是说，我从未使用这张表——我只使用了表上的索引。表本身无非是开销。我想查找包含给定单词（或靠近另一个单词等）的所有文档。这个
  ``KEYWORDS`` 堆表毫无用处，它在维护 ``KEYWORDS`` 表时只会拖慢应用程序速度，并使存储需求翻倍。这正是 ``IOT`` 的完美应用场景。


  另一个非常适合使用 ``IOT`` 的实现是代码查找表。例如，你可能有一个从 ``ZIP_CODE`` 到 ``STATE`` 的查找关系。现在，你可以摒弃堆表，直接使用
  ``IOT`` 本身。任何时候，只要你有一张完全通过其 ``主键`` 来访问的表，它就有可能成为 ``IOT`` 的候选。


  当你希望强制数据的同置存储，或者希望数据按照特定的物理顺序存储时，``IOT`` 就是为你准备的结构。对于 Sybase 和 SQL Server 的用户来说，这正是你会使用聚集索引的地方，但
  ``IOTs`` 更胜一筹。在这些数据库中，聚集索引可能产生高达 110% 的开销（类似于之前的 ``KEYWORDS`` 表示例）。而在这里，我们的开销是 0%，因为数据只存储一次。一个经典的可能需要这种物理同置数据的例子是父子关系。假设
  ``EMP`` 表有一个包含地址的子表。当员工最初收到工作录用通知时，你可能会在系统中输入他的家庭住址。之后，他们添加了工作地址。随着时间的推移，他们搬家了，将家庭住址改为以前的地址，并添加了一个新的家庭住址。然后，他们又添加了一个学校地址，那是他们回去攻读学位时用的，等等。也就是说，该员工有三个、四个（或更多）详细记录，但这些详细信息是随时间随机到达的。在普通的基于堆的表中，它们会被放在任何地方。在堆表中，两条或多条地址记录位于同一个数据库块上的概率几乎为零。然而，当你查询一个员工的信息时，你总是会同时拉取地址详细记录。这些随时间到达的行总是需要一起被检索。为了使检索更高效，你可以对子表使用
  ``IOT``，使得在插入时，给定员工的所有记录都彼此靠近地存放，这样当你一遍又一遍地检索它们时，所做的工作就更少。


  一个例子可以轻松展示使用 ``IOT`` 来物理同置子表信息的效果。让我们创建并填充一个 ``EMP`` 表：


  ```sql

  $ sqlplus eoda/foo@PDB1

  SQL> create table emp  as

  select object_id   empno,

  object_name ename,

  created     hiredate,

  owner       job

  from all_objects;

  Table created.

  SQL> alter table emp add constraint emp_pk primary key(empno);

  Table altered.

  SQL> begin

  dbms_stats.gather_table_stats( user, ''EMP'', cascade=>true );

  end;

  /

  PL/SQL procedure successfully completed.

  ```


  接下来，我们将两次实现这个子表，一次作为常规的堆表，另一次作为 ``IOT``：


  ```sql

  SQL> create table heap_addresses

  ( empno     references emp(empno) on delete cascade,

  addr_type varchar2(10),

  street    varchar2(20),

  city      varchar2(20),

  state     varchar2(2),

  zip       number,

  primary key (empno,addr_type));

  Table created.

  SQL> create table iot_addresses

  ( empno     references emp(empno) on delete cascade,

  addr_type varchar2(10),

  street    varchar2(20),

  city      varchar2(20),

  state     varchar2(2),

  zip       number,

  primary key (empno,addr_type) )

  ORGANIZATION INDEX;

  Table created.

  ```


  我通过向这些表中插入每个员工的工作地址，然后是家庭地址，然后是以前的地址，最后是学校地址来填充它们。堆表倾向于将数据放在表的末尾；由于数据只是到达，并且没有数据被删除，堆表会简单地将其附加到末尾。随着时间的推移，如果地址被删除，插入操作将变得在整个表中更加随机。可以说，在堆表中，员工的工作地址与其家庭地址位于同一个块上的机会几乎为零。然而，对于
  ``IOT`` 来说，由于键是 ``EMPNO, ADDR_TYPE``，我们可以相当确定，给定 ``EMPNO`` 的所有地址都位于一个或也许两个索引块中。用于填充此数据的插入操作是：


  ```sql

  SQL> insert into heap_addresses

  select empno, ''WORK'', ''123 main street'', ''Washington'', ''DC'', 20123

  from emp;

  72075 rows created.

  SQL> insert into iot_addresses

  select empno, ''WORK'', ''123 main street'', ''Washington'', ''DC'', 20123

  from emp;

  72075 rows created.

  ```


  我又重复了三次，依次将 ``WORK`` 更改为 ``HOME``、``PREV`` 和 ``SCHOOL``。然后我收集了统计信息：



  '
