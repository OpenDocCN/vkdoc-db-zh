  CPU 时间多了一个数量级以上。对于每一个不使用绑定变量的插入操作，我们花费绝大部分时间仅仅是在**解析**语句！但情况还会更糟。当我们查看其他信息时，可以看到两种方法在资源利用方面存在显著差异：


