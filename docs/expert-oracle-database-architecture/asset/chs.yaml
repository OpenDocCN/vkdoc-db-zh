  ## 使用建议


  请注意观察到的 I/O 使用率增加，包括读取和写入。总而言之，这表明如果你使用`CLOB`，并且许多字符串预期能放入行内（即小于 4000 字节），那么使用默认的`ENABLE
  STORAGE IN ROW`是个好主意。


  ### CHUNK 子句


  LOB 以块为单位存储；指向 LOB 数据的索引指向单个数据块。*块*是逻辑上连续的块集合，是 LOB 分配的最小单位，而通常一个块是最小的分配单位。`CHUNK`大小必须是你的
  Oracle 块大小的整数倍——这是唯一有效的值。


  > **注意**

  >

  > `CHUNK`子句仅适用于 BasicFiles。`CHUNK`子句出现在 SecureFiles 的语法中只是为了向后兼容。


  你必须从两个角度仔细选择`CHUNK`大小。首先，每个 LOB 实例（每个存储在行外的 LOB 值）将至少消耗一个`CHUNK`。一个`CHUNK`由一个 LOB
  值使用。如果一个表有 100 行，每行有一个包含 7KB 数据的 LOB，那么可以肯定将分配 100 个块。如果你将`CHUNK`大小设置为 32KB，你将分配
  100 个 32KB 的块。如果你将`CHUNK`大小设置为 8KB，你将（可能）分配 100 个 8KB 的块。关键在于，一个块只被一个 LOB 条目使用（两个
  LOB 不会使用同一个`CHUNK`）。如果你选择的块大小不符合你预期的 LOB 大小，最终可能会浪费大量空间。例如，如果你有一个平均 LOB 大小为 7KB
  的表，并使用了 32KB 的`CHUNK`大小，你将为每个 LOB 实例浪费大约 25KB 的空间。另一方面，如果你使用 8KB 的`CHUNK`，你将最小化任何类型的浪费。


  当你要最小化每个 LOB 实例的`CHUNK`数量时，也需要小心。正如你所看到的，有一个`LOBINDEX`用于指向各个块，你拥有的块越多，这个索引就越大。如果你有一个
  4MB 的 LOB 并使用 8KB 的`CHUNK`，你将需要至少 512 个`CHUNK`来存储该信息。这意味着你需要至少足够的`LOBINDEX`条目来指向这些块。直到你记住这是每个
  LOB 实例的，这听起来可能不多；如果你有数千个 4MB 的 LOB，你现在就有成千上万的条目。这也将影响你的检索性能，因为读取和管理许多小块比读取较少但较大的块需要更长时间。最终目标是使用一个`CHUNK`大小，既能最小化浪费，又能高效地存储你的数据。


  ### RETENTION 子句


  `RETENTION`子句根据你使用的是 SecureFiles 还是 BasicFiles 而有所不同。如果你回顾“内部 LOB”部分开头`DBMS_METADATA`的输出，请注意，对于
  SecureFiles LOB 的`CREATE TABLE`语句中没有`RETENTION`子句，而对于 BasicFiles LOB 则有一个。这是因为`RETENTION`对于
  SecureFiles 是自动启用的。


  `RETENTION`用于控制 LOB 的读一致性。在后续的小节中，我将详细介绍`RETENTION`在 SecureFiles 和 BasicFiles 之间的处理方式有何不同。




  '
- "# 大型对象的读一致性\n\n在前几章中，我们讨论了读一致性、多版本机制以及撤销在其中所扮演的角色。那么，当涉及到大型对象时，读一致性的实现方式就发生了变化。`LOBSEGMENT`\
  \ 不使用撤销来记录其更改；相反，它直接在 `LOBSEGMENT` 本身中对信息进行版本控制。`LOBINDEX` 会像任何其他段一样生成撤销，但 `LOBSEGMENT`\
  \ 则不会。取而代之的是，当你修改一个大型对象时，Oracle 会分配一个新的 `CHUNK`，并让旧的 `CHUNK` 保留在原处。如果你回滚事务，对大型对象索引的更改也会被回滚，索引将再次指向旧的\
  \ `CHUNK`。因此，撤销维护操作是在 `LOBSEGMENT` 自身内部完成的。当你修改数据时，旧数据被保留在原地，而新数据被创建出来。\n\n这一点在读取大型对象数据时也发挥作用。大型对象具有一致性，就像所有其他段一样。如果你在上午\
  \ 9:00 获取了一个大型对象定位器，那么你从中检索到的大型对象数据将是“截至上午 9:00 的状态”。就像如果你在上午 9:00 打开一个游标（结果集），它产生的行也将是该时间点的状态一样。即使其他人修改了大型对象数据并提交（或未提交），你的大型对象定位器也将是“截至上午\
  \ 9:00 的状态”，就像你的结果集一样。在这里，Oracle 结合使用 `LOBSEGMENT` 和 `LOBINDEX` 的读一致性视图来撤销对大型对象的更改，以便向你呈现获取大型对象定位器时该数据存在的状态。它不会使用\
  \ `LOBSEGMENT` 的撤销信息，因为 `LOBSEGMENT` 本身并未生成这些信息。\n\n我们可以很容易地看出大型对象具有一致性。考虑下面这个包含一个非行内存储的大型对象（它存储在\
  \ `LOBSEGMENT` 中）的小表：\n\n```\n$ sqlplus eoda/foo@PDB1\nSQL> create table t\n( id\
  \ int   primary key,\ntxt      clob )\nlob( txt) store as ( disable storage in row\
  \ );\nTable created.\nSQL> insert into t values ( 1, 'hello world' );\n1 row created.\n\
  SQL> commit;\nCommit complete.\n```\n\n如果我们获取大型对象定位器并按如下方式在表上打开一个游标：\n\n```\nSQL>\
  \ declare\nl_clob  clob;\ncursor c is select id from t;\nl_id    number;\nbegin\n\
  select txt into l_clob from t;\nopen c;\n```\n\n然后我们修改该行并提交\n\n```\nupdate t set\
  \ id = 2, txt = 'Goodbye';\ncommit;\n```\n\n在操作大型对象定位器和已打开的游标时，我们将看到数据是“截至我们获取或打开它们的时间点的状态”：\n\
  \n```\ndbms_output.put_line( dbms_lob.substr( l_clob, 100, 1 ) );\nfetch c into\
  \ l_id;\ndbms_output.put_line( 'id = ' || l_id );\nclose c;\nend;\n/\nhello world\n\
  id = 1\nPL/SQL procedure successfully completed.\n```\n\n但数据在数据库中无疑已经被更新/修改了：\n\n\
  ```\nSQL> select * from t;\nID TXT\n---------- ---------------\n2 Goodbye\n```\n\
  \n游标 `C` 的读一致映像来源于撤销段，而大型对象的读一致映像则来源于 `LOBSEGMENT` 本身。那么，这就给了我们一个担忧的理由：如果撤销段不用于存储大型对象的回滚信息，*并且*大型对象支持读一致性，我们如何防止可怕的\
  \ `ORA-01555: 快照过旧` 错误发生呢？同样重要的是，我们如何控制这些旧版本所使用的空间量？这就是 `RETENTION` 以及 `PCTVERSION`\
  \ 发挥作用的地方。\n\n## BasicFiles 的 RETENTION\n\n`RETENTION` 指示数据库根据数据库的 `UNDO_RETENTION`\
  \ 设置，在 LOB 段中保留已修改的 LOB 段数据。如果你将 `UNDO_RETENTION` 设置为两天，Oracle 将尝试不重用由修改操作释放的 LOB\
  \ 段空间。也就是说，如果你删除了所有指向 LOB 的行，Oracle 将尝试在 LOB 段中保留被删除的数据两天，以满足你的 `UNDO_RETENTION`\
  \ 策略，就像它会尝试在 `UNDO` 表空间中为结构化数据（你的关系型行和列）保留撤销信息两天一样。你需要理解这一点：LOB 段中释放的空间不会被后续的 `INSERT`\
  \ 或 `UPDATE` 立即重用。这是经常导致诸如“为什么我的 LOB 段不断增长？”这类问题的原因。大规模清理后重新加载信息往往会导致 LOB 段持续增长，因为保留期尚未到期。\n\
  \n或者，BasicFiles LOB 存储子句可以使用 `PCTVERSION`，它控制应分配的（曾被 LOB 使用过且位于 `LOBSEGMENT` 的 HWM\
  \ 之下的）LOB 空间中，有多少百分比应用于 LOB 数据的版本控制。默认的百分之十对于许多用途来说是足够的，因为很多时候你只是 `INSERT` 和检索 LOB（通常不进行\
  \ LOB 的更新；LOB 往往是一次插入，多次检索）。因此，不需要预留太多空间（如果有的话）用于 LOB 版本控制。\n\n但是，如果你的应用程序确实频繁修改\
  \ LOB，并且你经常在读取 LOB 的同时，有其他会话正在修改它们，那么默认的百分之十可能太小了。如果你在处理 LOB 时遇到 `ORA-22924` 错误，解决方案不是增加撤销表空间的大小，或增加撤销保留时间，或者如果你使用的是手动撤销管理，则添加更多的回滚段。相反，你应该使用以下语句：\n\
  \n```\nALTER TABLE tabname MODIFY LOB (lobname) ( PCTVERSION n );\n```\n\n并增加在该\
  \ `LOBSEGMENT` 中用于数据版本控制的空间量。\n\n## SecureFiles 的 RETENTION\n\nSecureFiles 使用 `RETENTION`\
  \ 来控制读一致性（与 BasicFiles 类似）。在 SecureFiles LOB 的 `DBMS_METADATA` 的 `CREATE TABLE`\
  \ 输出中，没有 `RETENTION` 子句。这是因为默认的 `RETENTION` 被设置为 `AUTO`，它指示 Oracle 保留撤销足够长的时间以用于读一致性目的。\n\
  \n如果你想更改默认的 `RETENTION` 行为，可以通过以下参数进行调整：\n\n*   使用 `MAX` 表示撤销应保留，直到 LOB 段达到存储子句中指定的\
  \ `MAXSIZE`（因此，`MAX` 必须与存储子句中的 `MAXSIZE` 子句结合使用）。\n*   如果启用了闪回数据库，设置 `MIN N` 以将\
  \ LOB 的撤销持续时间限制为 `N` 秒。\n*   如果一致读或闪回操作不需要撤销，则设置 `NONE`。\n\n如果你没有为 SecureFiles 设置\
  \ `RETENTION` 参数，或者指定了 `RETENTION` 但不带任何参数，那么它将被设置为 `DEFAULT`（这等同于 `AUTO`）。\n\n\n\
  #### CACHE 子句\n\n当 `CREATE TABLE` 语句从 `DBMS_METADATA` 返回时，之前对于 SecureFiles 和 BasicFiles\
  \ 都会包含以下内容：\n\n```sql\nLOB (\"TXT\") STORE AS (...   NOCACHE ... )\n```\n\n`NOCACHE`\
  \ 的替代选项是 `CACHE` 或 `CACHE READS`。此子句控制 LOBSEGMENT 数据是否存储在缓冲区缓存中。默认的 `NOCACHE` 意味着每次访问都将从磁盘直接读取，每次写入/修改也将从磁盘直接读取。`CACHE\
  \ READS` 允许从磁盘读取的 LOB 数据被缓冲，但 LOB 数据的写入将直接写入磁盘。`CACHE` 则允许在读取和写入时都缓存 LOB 数据。\n\n\
  在许多情况下，默认设置可能并非你所期望的。如果你有中小型 LOB（例如，仅用于存储几千字节的描述性字段），缓存它们是非常有意义的。如果不缓存，当用户更新描述字段时，用户还必须等待将数据写入磁盘的\
  \ I/O 操作（将执行大小为 `CHUNK` 的 I/O，用户将等待此 I/O 完成）。如果你正在执行大量 LOB 的加载，你将不得不在加载每一行时等待 I/O\
  \ 完成。为这些 LOB 启用缓存是合理的。你可以轻松地开启和关闭缓存：\n\n```sql\nALTER TABLE tabname MODIFY LOB (lobname)\
  \ ( CACHE );\nALTER TABLE tabname MODIFY LOB (lobname) ( NOCACHE );\n```\n\n以查看这可能对你的系统产生的影响。对于大型初始加载，启用\
  \ LOB 的缓存并让 `DBWR` 在后台将 LOB 数据写出到磁盘，同时你的客户端应用程序继续加载更多数据，是有意义的。对于频繁访问或修改的中小型 LOB，缓存是有意义的，这样最终用户就不必实时等待物理\
  \ I/O 完成。然而，对于一个 50MB 大小的 LOB，将其放在缓存中可能没有意义。\n\n> 提示\n>\n> 请记住，你可以在此处充分利用 `keep`\
  \ 或 `recycle` 池（在第 4 章讨论）。你可以使用 `keep` 或 `recycle` 池将 LOBSEGMENT 数据与所有常规数据分开，而不是将其缓存在默认缓存中。通过这种方式，你可以在不影响系统中现有数据缓存的情况下，实现缓存\
  \ LOB 数据的目标。\n\n#### LOB STORAGE 子句\n\n最后，当 `CREATE TABLE` 语句从 `DBMS_METADATA` 返回时，之前对于\
  \ SecureFiles 会包含以下内容：\n\n```sql\nLOB (\"TXT\") STORE AS SECUREFILE (...\nSTORAGE(INITIAL\
  \ 106496 NEXT 1048576 MINEXTENTS 1 MAXEXTENTS 2147483645\nPCTINCREASE 0\nBUFFER_POOL\
  \ DEFAULT FLASH_CACHE DEFAULT CELL_FLASH_CACHE DEFAULT))\n```\n\n以下是 BasicFiles\
  \ 对应的输出：\n\n```sql\nLOB (\"TXT\") STORE AS BASICFILE ( ...\nSTORAGE(INITIAL 65536\
  \ NEXT 1048576 MINEXTENTS 1 MAXEXTENTS 2147483645\nPCTINCREASE 0 FREELISTS 1 FREELIST\
  \ GROUPS 1\nBUFFER_POOL DEFAULT FLASH_CACHE DEFAULT CELL_FLASH_CACHE DEFAULT))\n\
  ```\n\nSecureFiles 和 BasicFiles 都有一个完整的存储子句，你可以用来控制物理存储特性。应该注意的是，此存储子句同时应用于 LOBSEGMENT\
  \ 和 LOBINDEX——对一个的设置也用于另一个。\n\nSecureFiles 的存储管理比 BasicFiles 简单。回想一下，SecureFiles\
  \ LOB 必须在 ASSM 管理的表空间中创建，因此以下属性不再适用：`FREELISTS`、`FREELIST GROUPS` 和 `FREEPOOLS`。\n\
  \n对于 BasicFiles LOB，相关的 LOB 设置是 `FREELISTS` 和 `FREELIST GROUPS`（当不使用 ASSM 时，如第 10\
  \ 章所讨论）。同样的规则适用于 LOBINDEX 段，因为 LOBINDEX 的管理方式与任何其他索引段相同。如果你有高度并发的 LOB 修改操作，建议在索引段上使用多个\
  \ `FREELISTS`。\n\n如前一节所述，对 LOB 段使用 `keep` 或 `recycle` 池可能是一种有用的技术，它允许你缓存 LOB 数据，而不会损害你现有的默认缓冲区缓存。与其让\
  \ LOB 从普通表中淘汰块缓冲区，你可以在 SGA 中为这些对象预留一块专用的内存。`BUFFER_POOL` 子句可用于实现此目的。\n\n### BFILEs\n\
  \n最后要讨论的 LOB 类型是 `BFILE` 类型。`BFILE` 类型简单来说就是一个指向操作系统中文件的指针。它用于提供对这些操作系统的只读访问。\n\n\
  > 注意\n>\n> 内置包 `UTL_FILE` 也提供了对操作系统文件的读写访问。然而，它不使用 `BFILE` 类型。\n\n当你使用 `BFILE` 时，你还将使用\
  \ Oracle 的 `DIRECTORY` 对象。`DIRECTORY` 对象只是将操作系统目录映射到数据库中的字符串或名称（提供了可移植性；你在 `BFILE`\
  \ 中引用的是一个字符串，而不是操作系统特定的文件命名约定）。因此，举个简单的例子，让我们创建一个带有 `BFILE` 列的表，创建一个 `DIRECTORY`\
  \ 对象，并插入一行引用文件系统中的文件：\n\n```sql\n$ sqlplus eoda/foo@PDB1\nSQL> create table t\n\
  ( id       int primary key,\nos_file  bfile);\nTable created.\nSQL> create or replace\
  \ directory my_dir as '/tmp/';\nDirectory created.\nSQL> insert into t values (\
  \ 1, bfilename( 'MY_DIR', 'test.dmp' ) );\n1 row created.\n```\n\n在这个例子中，我将使用 UNIX/Linux\
  \ 的 `dd` 命令在 `/tmp` 目录中创建一个 test.dmp 文件：\n\n```bash\ndd if=/dev/zero of=/tmp/test.dmp\
  \ bs=1056768 count=1\n```\n\n现在，`BFILE` 可以像 LOB 一样对待——因为它就是。例如：\n\n```sql\nSQL>\
  \ select dbms_lob.getlength(os_file) from t;\nDBMS_LOB.GETLENGTH(OS_FILE)\n---------------------------\n\
  \                   1056768\n```\n\n我们可以看到指向的文件是 1MB 大小。注意，在 `INSERT` 语句中使用 `MY_DIR`\
  \ 是故意的。如果我们使用混合大小写或小写，我们将得到以下结果：\n\n```sql\nSQL> update t set os_file = bfilename(\
  \ 'my_dir', 'test.dmp' );\n1 row updated.\nSQL> select dbms_lob.getlength(os_file)\
  \ from t;\nselect dbms_lob.getlength(os_file) from t\n*\nERROR at line 1:\nORA-22285:\
  \ non-existent directory or file for GETLENGTH operation\nORA-06512: at \"SYS.DBMS_LOB\"\
  , line 850\n```\n\n这个例子指出，Oracle 中的 `DIRECTORY` 对象是标识符，而标识符默认以大写形式存储。`BFILENAME`\
  \ 内置函数接受一个字符串，这个字符串的大小写必须与数据字典中存储的 `DIRECTORY` 对象的大小写完全匹配。因此，我们必须在 `BFILENAME` 函数中使用大写，或者在创建\
  \ `DIRECTORY` 对象时使用带引号的标识符：\n\n```sql\nSQL> create or replace directory \"my_dir\"\
  \ as '/tmp/';\nDirectory created.\nSQL> select dbms_lob.getlength(os_file) from\
  \ t;\nDBMS_LOB.GETLENGTH(OS_FILE)\n---------------------------\n               \
  \    1056768\n```\n\n我建议不要使用带引号的标识符；而是在 `BFILENAME` 调用中使用大写名称。带引号的标识符不常见，并且往往会为后续操作带来混淆。\n\
  \n`BFILE`（数据库中的指针对象，而不是磁盘上的实际二进制文件）在磁盘上占用的空间量是变化的，这取决于 `DIRECTORY` 对象名称和文件名的长度。在前面的例子中，生成的\
  \ `BFILE` 长度约为 35 字节。通常，你会发现 `BFILE` 消耗大约 20 字节的开销，加上 `DIRECTORY` 对象名称的长度，再加上文件名本身的长度。\n\
  \n> 注意\n>\n> `BFILE` 数据不像其他 LOB 数据那样具有读一致性。由于 `BFILE` 是在数据库外部管理的，当你解引用 `BFILE` 时，文件中恰好是什么内容，你就会得到什么。因此，对同一个\
  \ `BFILE` 的重复读取可能会产生不同的结果——这与用于 `CLOB`、`BLOB` 或 `NCLOB` 的 LOB 定位符不同。\n\n\n## ROWID/UROWID\
  \ 类型\n\n最后要讨论的数据类型是 `ROWID` 和 `UROWID` 类型。`ROWID` 是表中一行的地址（请回想第 10 章，唯一标识数据库中的一行需要一个\
  \ `ROWID` 和一个表名）。`ROWID` 中编码了足够的信息来定位磁盘上的行，并识别 `ROWID` 所指向的对象（表等）。`ROWID` 的近亲 `UROWID`\
  \ 是一个通用 `ROWID`，用于诸如索引组织表（IOT）以及通过网关访问的异构数据库中的表等没有固定 `ROWID` 的表。`UROWID` 表示行的主键值，因此其大小会根据其指向的对象而变化。\n\
  \n每个表中的每一行都关联一个 `ROWID` 或 `UROWID`。当从表中检索时，它们被视为*伪列*，这意味着它们实际上并不与行一起存储，而是行的派生属性。`ROWID`\
  \ 是根据行的物理位置生成的；它并不与行一起存储。`UROWID` 是根据行的主键生成的，所以在某种意义上它是随行存储的，但又不完全是，因为 `UROWID`\
  \ 并不是作为一个离散的列存在，而是作为现有列的一个函数。\n\n过去，对于拥有 `ROWID` 的行（Oracle 中最常见的行类型；除了 IOT 中的行，所有行都有\
  \ `ROWID`），`ROWID` 是不可变的。当一行被插入时，它会与一个 `ROWID`（一个地址）相关联，并且该 `ROWID` 将一直与该行关联，直到它被删除，即从数据库中物理移除。随着时间的推移，这种情况变得不那么真实了，因为现在有些操作可能导致行的\
  \ `ROWID` 发生变化，例如：\n\n*   更新分区表中行的分区键，导致该行必须从一个分区移动到另一个分区\n*   使用 `FLASHBACK` 表命令将数据库表恢复到之前的某个时间点\n\
  *   `MOVE` 操作以及许多分区操作，如拆分或合并分区\n*   使用 `ALTER TABLE SHRINK SPACE` 命令执行段收缩\n\n现在，由于\
  \ `ROWID` 会随时间变化（因为它们不再是不可变的），因此不建议将它们作为列物理存储在数据库表中。也就是说，使用 `ROWID` 作为数据库列的数据类型被认为是糟糕的做法，应该避免。应改为使用行的主键（应该是不可变的），并且可以实施参照完整性来确保数据完整性得以保留。你无法对\
  \ `ROWID` 类型执行此操作——你不能通过 `ROWID` 从子表到父表创建外键，也无法像那样跨表强制完整性。你必须使用主键约束。\n\n那么，`ROWID`\
  \ 类型有什么用呢？它在允许最终用户与数据交互的应用程序中仍然有用——`ROWID` 作为行的物理地址，是访问任何表中单行的最快方式。从数据库读取数据并呈现给最终用户的应用程序可以在尝试更新该行时使用\
  \ `ROWID`。应用程序必须将 `ROWID` 与其他字段或校验和结合使用（有关应用程序锁定的更多信息，请参阅第 7 章）。通过这种方式，你可以以最少的工作量（例如，无需再次查找索引来定位该行）更新目标行，并通过验证列值是否未更改来确保该行就是你最初读取的行。因此，在采用乐观锁定的应用程序中，`ROWID`\
  \ 很有用。\n\n## JSON 类型\n\nOracle 21c 新增了 `JSON` 数据类型。此数据类型允许你以二进制格式在数据库中原生存储 `JSON`\
  \ 数据。它是一种优化的二进制存储，使用 `OSON` 格式。`OSON` 格式是 Oracle 优化的二进制 `JSON` 格式。使用此格式，查询性能得到极大提升，因为不再需要解析文本\
  \ `JSON` 数据。`JSON` 数据类型可以为表、物化视图和 PL/SQL 参数声明。\n\n以下是如何创建带有 `JSON` 数据类型列的表示例：\n\n\
  ```\n$ sqlplus eoda/foo@PDB1\nSQL> create table t (\nid         number generated\
  \ always as identity,\njson_data  json,\nconstraint t_pk primary key (id));\nSQL>\
  \ desc t;\nName                                      Null?    Type\n-----------------------------------------\
  \ -------- -----------------------\nID                                        NOT\
  \ NULL NUMBER\nJSON_DATA                                          UNDEFINED\n```\n\
  \n`VARCHAR2`、`CLOB` 和 `BLOB` 数据类型支持 JSON 数据。为了说明这一点，我将使用一些 PL/SQL 代码，该代码定义了三个变量：一个\
  \ `VARCHAR2`、一个 `CLOB` 和一个 `BLOB`。这些变量将被填充值并用于插入到 `JSON` 数据类型中。例如：\n\n```\ndeclare\n\
  l_varchar2  varchar2(32767);\nl_clob      clob;\nl_blob      blob;\nbegin\nl_varchar2\
  \ := '{\"car\":\"tesla\",\"quantity\":100}';\nl_clob     := '{\"car\":\"chevy\"\
  ,\"quantity\":2}';\nl_blob     := utl_raw.cast_to_raw('{\"car\":\"volvo\",\"quantity\"\
  :10}');\n--\ninsert into t (json_data) values (json(l_varchar2));\ninsert into t\
  \ (json_data) values (json(l_clob));\ninsert into t (json_data) values (json(l_blob));\n\
  end;\n/\n```\n\n你可以以与访问数据库中其他数据相同的方式检索 `JSON` 数据（包括 OCI 和 JDBC）。`JSON` 数据以二进制格式存储，因此如果不使用\
  \ `JSON` 函数来选择数据，将显示原始数据：\n\n```\nSQL> select * from t;\nID JSON_DATA\n----------\
  \ ----------------------------------------------------------------\n1 7B22636172223A227465736C61222C227175616E74697479223A3130307D\n\
  2 7B22636172223A226368657679222C227175616E74697479223A327D\n3 7B22636172223A22766F6C766F222C227175616E74697479223A31307D\n\
  ```\n\n接下来，我将使用 `JSON_SERIALIZE` 函数将 `JSON` 数据转换为文本格式：\n\n```\nSQL> select id, json_serialize(json_data)\
  \ as json_data from t;\nID JSON_DATA\n---------- ----------------------------------------------------------------\n\
  1 {\"car\":\"tesla\",\"quantity\":100}\n2 {\"car\":\"chevy\",\"quantity\":2}\n3\
  \ {\"car\":\"volvo\",\"quantity\":10}\n```\n\n其他 JSON 函数可用于检索和显示文本数据。此示例使用 `JSON_VALUE`\
  \ 函数：\n\n```\nSQL> select t.id,\njson_value(t.json_data, '$.car') car,\njson_value(t.json_data,\
  \ '$.quantity' returning number) quantity\nfrom t;\nID CAR               QUANTITY\n\
  ---------- --------------- ----------\n1 tesla                  100\n2 chevy   \
  \                 2\n3 volvo                   10\n```\n\n通过这种方式，你可以在数据库中以其原生二进制格式存储和检索\
  \ `JSON` 数据。当处理 `JSON` 数据时，这允许改进查询性能。这是因为数据不是以文本形式存储的，因此不需要被解析。\n\n\n## 总结\n\n在本章中，我们考察了\
  \ Oracle 提供的许多基本数据类型；了解了它们的物理存储方式以及每种类型的可用选项。我们从最基本的字符串类型开始，探讨了围绕多字节字符和原始二进制数据的注意事项。然后我们讨论了扩展数据类型（在\
  \ Oracle 12c 及以上版本可用），以及这一特性如何允许你将 `VARCHAR2`、`NVARCHAR2` 和 `RAW` 数据类型的大小定义为最大 32,727\
  \ 字节。接下来，我们研究了数值类型，包括非常精确的 Oracle `NUMBER` 类型以及 Oracle 提供的浮点类型。\n\n我们还考虑了遗留的 `LONG`\
  \ 和 `LONG RAW` 类型，重点讨论了如何规避它们的存在，因为这些类型提供的功能远远不及 `LOB` 类型。接着，我们查看了能够存储日期和时间的数据类型。我们涵盖了日期运算的基础知识，这是一个在理解之前令人困惑的问题。最后，在关于日期和时间戳的部分，我们考察了\
  \ `INTERVAL` 类型以及如何最佳地使用它。\n\n从物理存储的角度来看，本章最详细的部分是 `LOB` 部分。`LOB` 类型经常被开发人员和 DBA\
  \ 误解，因此这部分的大部分内容都用于探讨它们的物理实现方式、某些性能考虑因素以及 `SecureFiles` 与 `BasicFiles` 之间的区别。\n\n\
  我们还介绍了 `ROWID`/`UROWID` 类型。出于现在应该显而易见的原因，你不应将此数据类型用作数据库列，因为 `ROWID` 不是不可变的，并且没有完整性约束能够强制执行父/子关系。相反，如果你需要指向另一行，应该存储主键。\n\
  \n我们考察的最后一个数据类型是 `JSON` 数据类型。这个新数据类型在 Oracle 21c 中引入。它允许你在数据库中以原生二进制格式存储 `JSON`\
  \ 数据。这提高了查询性能，因为检索数据时你无需解析它（如果以文本存储则需要解析）。\n\n"
- '# 13. `分区`


  `分区` 是将一个表或索引在物理上分解成许多更小、更易管理片段的过程。就访问数据库的应用程序而言，逻辑上只有一个表或一个索引，但物理上该表或索引可能由数十个物理分区组成。每个分区都是一个独立的对象，可以单独操作或作为更大对象的一部分进行操作。


  > **注意**

  >

  > 分区是 Oracle 数据库企业版的额外付费选项。标准版中不可用。


  在本章中，我们将探讨为什么你可能会考虑使用分区。原因包括数据可用性提高、管理（DBA）负担减轻，以及在某些情况下性能提升。一旦你充分理解了使用分区的原因，我们将看看如何对表及其对应的索引进行分区。本讨论的目标不是教你管理分区的细节，而是提供一个关于在应用程序中实施分区的实用指南。


  我们还将讨论一个重要事实：对表和索引进行分区并不能保证数据库的 `fast = true` 设置。根据我的经验，许多开发人员和 DBA 认为分区对象会自动带来性能提升。分区只是一个工具，当你对索引或表进行分区时，会发生以下三种情况之一：使用这些分区表的应用程序可能运行得更慢，可能运行得更快，或者可能不受影响。我认为，如果你只是应用分区而不理解它的工作原理以及你的应用程序如何利用它，那么仅仅开启它很可能对性能产生负面影响。


  最后，我们将探讨当今世界中分区的一种非常常见的用途：在 OLTP 和其他操作系统中支持大型联机审计跟踪。我们将讨论如何结合使用分区和段空间压缩，以高效地在线存储大型审计跟踪，并提供以最小工作量将旧记录从该审计跟踪中归档出去的能力。


  ## 分区概述


  分区利用 `分而治之` 的逻辑，便于管理超大型表和索引。分区引入了 `分区键` 的概念，用于根据某个范围值、特定值列表或哈希函数的值来隔离数据。如果要我将分区的好处按某种顺序排列，那将如下：


  1.  `提高数据可用性`：此属性适用于所有系统类型，无论是 OLTP 系统还是数据仓库系统。

  2.  `通过将大型段移出数据库来简化其管理`：对一个 100GB 的表执行管理操作（例如重组以清除迁移行或回收因清除旧信息而在表中留下的“空白空间”），要比对十个单独的
  10GB 表分区执行相同操作繁重得多。此外，使用分区，我们或许能够执行清除例程而根本不留下空白空间，从而完全免去重组的需要！

  3.  `提高某些查询的性能`：这主要在大型仓库环境中有益，我们可以利用分区来排除需要考虑的大量数据范围，从而完全避免访问这些数据。这在事务处理系统中不太适用，因为我们在那种系统中访问的数据量本来就不大。

  4.  `可能通过将修改分散到多个独立分区来减少高流量 OLTP 系统的争用`：如果你有一个争用度很高的段，将其拆分为多个段可能会产生按比例减少该争用的副作用。


  让我们逐一看看使用分区的这些潜在好处。


  ### 可用性提升


  可用性提升源于每个分区的独立性。对象中单个分区的可用（或不可用）并不意味着对象本身不可用。优化器知晓当前的分区方案，并会据此从查询计划中移除未被引用的分区。如果一个大型对象中某个分区不可用，而你的查询能够排除对此分区的考虑，那么
  Oracle 将成功处理该查询。


  为了演示这种提升的可用性，我们将设置一个包含两个分区的哈希分区表，每个分区位于独立的表空间中。我们将创建一个 `EMP` 表，并在 `EMPNO` 列上指定分区键；`EMPNO`
  将作为我们的分区键。在这种情况下，此结构意味着对于插入此表的每一行，`EMPNO` 列的值会被哈希计算以确定该行将被放置到哪个分区（从而确定表空间）。首先，我们创建两个表空间
  (`P1` 和 `P2`)，然后创建一个包含两个分区 (`PART_1` 和 `PART_2`) 的分区表，每个分区位于一个表空间中：


  **注意**


  此示例中的表空间使用 Oracle 托管文件，初始化参数 `DB_CREATE_FILE_DEST` 设置为 `/opt/oracle/oradata`。


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> create tablespace p1 datafile size 1m autoextend on next 1m;

  Tablespace created.

  SQL> create tablespace p2 datafile size 1m autoextend on next 1m;

  Tablespace created.

  SQL> CREATE TABLE emp

  ( empno   int,

  ename   varchar2(20)

  )

  PARTITION BY HASH (empno)

  ( partition part_1 tablespace p1,

  partition part_2 tablespace p2

  )

  /

  Table created.

  ```


  接下来，我们向 `EMP` 表插入一些数据，然后使用分区扩展表名来检查每个分区的内容：


  ```

  SQL> insert into emp select empno, ename from scott.emp;

  14 rows created.

  SQL> select * from emp partition(part_1);

  EMPNO ENAME

  ---------- --------------------

  7369 SMITH

  7499 ALLEN

  7654 MARTIN

  7698 BLAKE

  7782 CLARK

  7839 KING

  7876 ADAMS

  7934 MILLER

  8 rows selected.

  SQL> select * from emp partition(part_2);

  EMPNO ENAME

  ---------- --------------------

  7521 WARD

  7566 JONES

  7788 SCOTT

  7844 TURNER

  7900 JAMES

  7902 FORD

  6 rows selected.

  ```


  你应该注意到数据是随机分配的。这是此处的设计意图。使用哈希分区，我们要求 Oracle 随机地——但希望是均匀地——将数据分布到多个分区中。我们无法控制数据进入哪个分区；Oracle
  根据哈希键值本身的哈希计算来决定。稍后，当我们查看范围分区和列表分区时，将了解如何控制哪些分区接收哪些数据。


  现在，我们将其中一个表空间离线（模拟，例如，磁盘故障），从而使该分区中的数据不可用：


  ```

  SQL> alter tablespace p1 offline;

  Tablespace altered.

  ```


  接下来，我们运行一个访问每个分区的查询，看到此查询失败了：


  ```

  SQL> select * from emp;

  select * from emp

  *

  ERROR at line 1:

  ORA-00376: file 22 cannot be read at this time

  ORA-01110: data file 22:

  ''/opt/oracle/oradata/CDB/C217E68DF48779E1E0530101007F73B9/datafile/o1_mf_p1_jc8b

  g9nm_.dbf''

  ```


  但是，一个不访问离线表空间的查询将正常运行；Oracle 会从考虑范围中排除离线的分区。我在此特定示例中使用绑定变量是为了证明，即使 Oracle 在查询优化时不知道将访问哪个分区，它仍然能够在运行时执行这种消除：


  ```

  SQL> variable n number

  SQL> exec :n := 7844;

  PL/SQL procedure successfully completed.

  SQL> select * from emp where empno = :n;

  EMPNO ENAME

  ---------- --------------------

  7844 TURNER

  ```


  总之，当优化器能够从计划中消除分区时，它就会这样做。这一事实为那些在查询中使用分区键的应用程序提高了可用性。


  分区还通过减少停机时间来提高可用性。例如，如果你有一个 100GB 的表，并将其划分为 50 个 2GB 的分区，那么你就可以更快地从错误中恢复。如果一个 2GB
  的分区损坏，恢复所需的时间就是恢复一个 2GB 分区所需的时间，而不是一个 100GB 的表。因此，可用性通过两种方式得到提升：


  *   优化器进行分区消除意味着许多用户甚至可能不会注意到部分数据不可用。


  *   由于恢复所需的工作量显著减少，发生错误时的停机时间得以缩短。


  ## 减轻管理负担


  管理负担的减轻源于一个基本事实：对小对象进行操作通常比对大对象进行相同操作更容易、更快且资源消耗更少。


  例如，假设数据库中有一个 10GB 的索引。如果需要重建此索引且它未被分区，那么你将不得不把整个 10GB 索引作为一个工作单元来重建。虽然可以在线重建索引，但这需要海量资源来完全重建整个
  10GB 索引。你至少需要 10GB 的额外可用空间来保存两个索引的副本，需要一个临时事务日志表来记录重建索引期间对基表所做的更改，等等。


  另一方面，如果索引本身被划分为十个 1GB 的分区，那么你可以逐个重建每个索引分区。现在，你需要的可用空间只是之前的百分之十。同样地，单个索引重建会快得多（也许快十倍），因此在线索引重建期间需要合并到新索引中的事务更改也会少得多，等等。


  另外，考虑一下在即将完成 10GB 索引重建时，系统或软件发生故障的情况。整个工作将全部丢失。通过分解问题并将索引分区为 1GB 的分区，你最多只会损失重建索引所需总工作的百分之十。


  最后但同样重要的是，可能你只需要重建总聚合索引的百分之十——例如，只有“最新”数据（活动数据）需要重组，而所有“较旧”数据（相对静态）则不受影响。


  另一个例子可能是，你发现表中 50% 的行是“迁移”行（有关迁移行的详细信息，请参见第 10 章），并且你想修复这个问题。拥有一个分区表将便于此操作。要“修复”迁移行，通常必须重建对象——在本例中是表。如果你有一个
  100GB 的表，你将需要以单个非常大的块串行执行此操作，使用 `ALTER TABLE MOVE`。另一方面，如果你有 25 个分区，每个分区大小为 4GB，那么你可以逐个重建每个分区。或者，如果你在非高峰时间执行此操作并且有充足的资源，你甚至可以在单独的会话中并行执行
  `ALTER TABLE MOVE` 语句，从而可能减少整个操作所需的时间。几乎任何可以对非分区对象执行的操作，都可以对分区对象的单个分区执行。你甚至可能会发现你的迁移行集中在非常小的一部分分区中；因此，你可以重建一两个分区，而不是整个表。


  下面是一个快速示例，演示如何重建一个包含许多迁移行的表。`BIG_TABLE1` 和 `BIG_TABLE2` 都是从一个包含 10,000,000 行的 `BIG_TABLE`
  实例创建的（有关 `BIG_TABLE` 的创建脚本，请参见本书开头的“设置环境”部分）。`BIG_TABLE1` 是一个常规的、未分区的表，而 `BIG_TABLE2`
  是一个包含八个分区的哈希分区表（我们将在后续章节中详细介绍哈希分区；简单来说，它将数据相当均匀地分布到了八个分区中）。此示例创建两个表空间，然后创建两个表：


  ```sql

  SQL> create tablespace big1 datafile size 1500M;

  Tablespace created.

  SQL> create tablespace big2 datafile size 1500m;

  Tablespace created.

  SQL> create table big_table1

  ( ID, OWNER, OBJECT_NAME, SUBOBJECT_NAME,

  OBJECT_ID, DATA_OBJECT_ID,

  OBJECT_TYPE, CREATED, LAST_DDL_TIME,

  TIMESTAMP, STATUS, TEMPORARY,

  GENERATED, SECONDARY )

  tablespace big1

  as

  select ID, OWNER, OBJECT_NAME, SUBOBJECT_NAME,

  OBJECT_ID, DATA_OBJECT_ID,

  OBJECT_TYPE, CREATED, LAST_DDL_TIME,

  TIMESTAMP, STATUS, TEMPORARY,

  GENERATED, SECONDARY

  from big_table;

  Table created.

  SQL> create table big_table2

  ( ID, OWNER, OBJECT_NAME, SUBOBJECT_NAME,

  OBJECT_ID, DATA_OBJECT_ID,

  OBJECT_TYPE, CREATED, LAST_DDL_TIME,

  TIMESTAMP, STATUS, TEMPORARY,

  GENERATED, SECONDARY )

  partition by hash(id)

  (partition part_1 tablespace big2,

  partition part_2 tablespace big2,

  partition part_3 tablespace big2,

  partition part_4 tablespace big2,

  partition part_5 tablespace big2,

  partition part_6 tablespace big2,

  partition part_7 tablespace big2,

  partition part_8 tablespace big2

  )

  as

  select ID, OWNER, OBJECT_NAME, SUBOBJECT_NAME,

  OBJECT_ID, DATA_OBJECT_ID,

  OBJECT_TYPE, CREATED, LAST_DDL_TIME,

  TIMESTAMP, STATUS, TEMPORARY,

  GENERATED, SECONDARY

  from big_table;

  Table created.

  ```


  现在，每个表都在自己的表空间中，因此我们可以轻松查询数据字典以查看每个表空间的已分配和可用空间：


  ```sql

  SQL> select b.tablespace_name,

  mbytes_alloc,

  mbytes_free

  from ( select round(sum(bytes)/1024/1024) mbytes_free,

  tablespace_name

  from dba_free_space

  group by tablespace_name ) a,

  ( select round(sum(bytes)/1024/1024) mbytes_alloc,

  tablespace_name

  from dba_data_files

  group by tablespace_name ) b

  where a.tablespace_name (+) = b.tablespace_name

  and b.tablespace_name in (''BIG1'',''BIG2'')

  /

  TABLESPACE_NAME                MBYTES_ALLOC MBYTES_FREE

  ------------------------------ ------------ -----------

  BIG1                                   1500         219

  BIG2                                   1500         219

  ```


  `BIG1` 和 `BIG2` 的大小约为 1500MB，每个大约有 219MB 的可用空间。我们将尝试重建第一个表 `BIG_TABLE1`：


  ```sql

  SQL> alter table big_table1 move;

  alter table big_table1 move

  *

  ERROR at line 1:

  ORA-01652: unable to extend temp segment by 1024 in tablespace BIG1

  ```


  操作失败——我们需要在表空间 `BIG1` 中有足够的可用空间，以便在旧副本还在的情况下同时保存整个 `BIG_TABLE1` 的副本——简而言之，我们需要大约两倍于表大小的存储空间（可能更多，也可能更少，这取决于重建后表的大小）。我们现在尝试在
  `BIG_TABLE2` 上执行相同的操作：


  ```sql

  SQL> alter table big_table2 move;

  alter table big_table2 move

  *

  ERROR at line 1:

  ORA-14511: cannot perform operation on a partitioned object

  ```


  这是 Oracle 告诉我们不能对*表*执行 `MOVE` 操作；我们必须改为对表的每个*分区*执行该操作。我们可以逐个移动（从而重建和重组）每个分区：


  ```sql

  SQL> alter table big_table2 move partition part_1;

  Table altered.

  SQL> alter table big_table2 move partition part_2;

  Table altered.

  SQL> alter table big_table2 move partition part_3;

  Table altered.

  SQL> alter table big_table2 move partition part_4;

  Table altered.

  SQL> alter table big_table2 move partition part_5;

  Table altered.

  SQL> alter table big_table2 move partition part_6;

  Table altered.

  SQL> alter table big_table2 move partition part_7;

  Table altered.

  SQL> alter table big_table2 move partition part_8;

  Table altered.

  ```



  每一次移动操作只需要足够的可用空间来保存数据八分之一的副本！因此，在与之前相同数量的可用空间下，这些命令就能成功执行。我们需要的临时资源显著减少，而且，更进一步地，如果系统在我们移动
  `PART_4` 之后、但 `PART_5` 移动完成之前发生故障（例如，由于断电），我们也不会丢失所有已完成的工作。系统恢复时，前四个分区仍将被移动，我们可以从分区
  `PART_5` 继续处理。


  有些人看到这里可能会说：“哇，八个语句——这需要输入好多内容”，这确实如此，如果你有数百个或更多分区，这种事情会变得不切实际。幸运的是，编写脚本实现解决方案非常容易，之前的八个语句可以简化为


  ```sql

  SQL> begin

  for x in ( select partition_name

  from user_tab_partitions

  where table_name = ''BIG_TABLE2'' )

  loop

  execute immediate

  ''alter table big_table2 move partition '' ||

  x.partition_name;

  end loop;

  end;

  /

  PL/SQL procedure successfully completed.

  ```


  所有你需要的信息都存在于 Oracle 数据字典中，大多数已经实施分区的站点也拥有一系列存储过程，用于轻松管理大量分区。此外，像 Enterprise Manager
  这样的许多 GUI 工具也内置了执行这些操作的能力，无需你手动输入单个命令。


  关于分区和管理需要考虑的另一个因素是在数据仓库和归档中使用数据的 `sliding windows`（滑动窗口）。在许多情况下，你需要保留最近 N 个时间单位内的在线数据。例如，假设你需要保留最近
  12 个月或最近 5 年的数据在线。如果没有分区，这通常是一次大规模的 `INSERT` 操作后跟一次大规模的 `DELETE` 操作，导致产生两个大型事务。大量的
  DML 操作，以及生成大量的 redo 和 undo。现在有了分区，你可以简单地执行以下步骤：


  1.  将新月份（或年份，或任何时间单位）的数据加载到一个单独的表中。


  2.  对该表进行完全索引。（这些步骤甚至可以在另一个实例中完成，然后传输到该数据库）。


  3.  使用快速的 DDL 命令 `ALTER TABLE EXCHANGE PARTITION`，将这个新加载并索引好的表附加到分区表的末尾。


  4.  从分区表的另一端分离出最旧的分区。


  因此，你现在可以非常容易地支持包含时间敏感信息的超大对象。旧数据可以很容易地从分区表中移除，如果你不需要它，可以简单地 `dropped`（删除），或者可以将其归档到其他地方。新数据可以加载到单独的表中，这样在加载、索引等操作完成之前不会影响分区表。稍后我们将查看一个完整的滑动窗口示例。


  简而言之，分区可以使原本艰巨的、或者在某些情况下不可行的操作，变得像在小型数据库中一样容易。


  ## 提升语句性能


  分区的第三个普遍（潜在）益处在于增强语句（`SELECT`、`INSERT`、`UPDATE`、`DELETE`、`MERGE`）性能的领域。我们将考察两类语句——那些修改信息的语句和那些只读取信息的语句——并讨论在每种情况下我们可能期望从分区中获得什么好处。


  ## 并行 DML


  修改数据库中数据的语句有可能执行 `parallel DML`（并行 DML）（`PDML`）。在 PDML 期间，Oracle 使用多个线程或进程来执行你的
  `INSERT`、`UPDATE`、`DELETE` 或 `MERGE` 操作，而不是单个串行进程。在具有充足 I/O 带宽的多 CPU 机器上，对于大规模 DML
  操作，潜在的提速可能很大。


  注意


  我们将在第 14 章更详细地讨论并行操作。


  ### 查询性能


  在严格的只读查询性能（`SELECT` 语句）领域，分区通过两种特殊类型的操作发挥作用：


  *   `Partition elimination`（分区消除）：数据的某些分区在查询处理过程中不被考虑。我们已经看到了一个分区消除的例子。


  *   `Parallel operations`（并行操作）：例如并行全表扫描和并行索引范围扫描。


  然而，你能从中获得多少益处在很大程度上取决于你所使用的系统类型。


  #### OLTP 系统


  你不应该指望分区能大幅提高 OLTP 系统中的查询性能。事实上，在传统的 OLTP 系统中，你必须谨慎应用分区，以免对运行时性能产生*负面*影响。在传统的 OLTP
  系统中，大多数查询期望几乎瞬间返回，并且大多数从数据库的检索期望是通过非常小的索引范围扫描完成的。因此，前面列出的主要性能优势不会显现出来。分区消除在对大对象进行全表扫描时很有用，因为它允许你避免扫描对象的大部分。然而，在
  OLTP 环境中，*你并不会*对大对象进行全表扫描（如果你这么做了，说明存在严重的设计缺陷）。即使你对索引进行了分区，通过扫描更小的索引所获得的任何性能提升都将是微乎其微的——如果你真的获得了速度提升的话。如果你的某些查询使用索引*并且*它们无法排除除一个分区以外的所有分区，你可能会发现你的查询在分区后实际上运行得更慢，因为现在你需要探测
  5、10 或 20 个小索引，而不是 1 个较大的索引。稍后在我们研究可用的分区索引类型时，我们将更详细地探讨这一点。


  至于并行操作，正如我们将在下一章更详细探讨的，你不希望在 OLTP 系统中进行并行查询。你会将并行操作的使用保留给 DBA 用于重建、创建索引、收集统计信息等。事实是，在
  OLTP 系统中，你的查询应该已经以非常快的索引访问为特征，而分区不会（或几乎不会）加速这一点。这并不意味着你应该避免在 OLTP 中使用分区；它的意思是，你不应该期望分区能带来性能上的巨大提升。大多数
  OLTP 应用程序无法利用分区能够提升查询性能的场景，但你仍然可以从其他可能的分区优势中获益：管理便捷、更高可用性和减少竞争。



  '
- '# 数据仓库系统


  在数据仓库/决策支持系统中，分区不仅是一项出色的管理工具，还是能够加快处理速度的技术。例如，你可能有一个需要执行即席查询的大表。你总是按销售季度进行即席查询，因为每个销售季度包含数十万条记录，而你总共拥有数百万条在线记录。因此，你希望查询整个数据集中相对较小的一个切片，但基于销售季度为其建立索引并不真正可行。这种索引将指向数十万条记录，以这种方式进行索引范围扫描效果会很差（有关此点的更多详细信息，请参阅第
  11 章）。你的许多查询需要进行全表扫描，但最终你不得不扫描数百万条记录，其中大部分记录并不符合你的查询条件。使用智能分区方案，你可以按季度隔离数据，这样当你查询任何特定季度的数据时，只会对该季度的数据进行全扫描。这是所有可能方案中的最佳选择。


  此外，在数据仓库/决策支持系统环境中，并行查询被频繁使用。在这里，诸如并行索引范围扫描或并行快速全索引扫描等操作不仅有意义，而且对我们有益。我们希望最大化利用所有可用资源，而并行查询就是实现这一目标的一种方法。因此，在这种环境中，分区极有可能加快处理速度。


  ## 在 OLTP 系统中减少争用


  分区最后一个普遍的好处是，可能通过减少 OLTP 系统中的争用来提高并发性。分区可用于将单个表的修改操作分散到多个物理分区上。其思路是，如果你有一个经历高争用的段，将其转换为多个段可能会按比例减少争用，从而产生副作用。


  例如，你可能拥有 20 个表分区和 20 个索引分区，而不是拥有 1 个表段和 1 个索引段。这就像拥有 20 个表而不是 1 个（以及 20 个索引而不是 1
  个）；因此，在修改操作期间，对这个共享资源的争用将会减少。


  '
- '# 表分区方案


  目前在 Oracle 中，有九种方法可以对表进行分区：


  *   `Range partitioning（范围分区）`：你可以指定应存储在一起的数据范围。例如，时间戳在`Jan-2014`月份内的所有数据将存储在分区
  1 中，时间戳在`Feb-2014`内的所有数据存储在分区 2 中，依此类推。这可能是 Oracle 中最常用的分区机制。


  *   `Hash partitioning（哈希分区）`：你在本章第一个示例中已经见过。对一个列（或多个列）应用哈希函数，行将根据该哈希值被放置到某个分区中。


  *   `List partitioning（列表分区）`：你指定一个离散的值集合，这些值决定了哪些数据应存储在一起。例如，你可以指定`STATUS`列值在`(
  ''A'', ''M'', ''Z'' )`中的行进入分区 1，`STATUS`值在`( ''D'', ''P'', ''Q'' )`中的行进入分区 2，依此类推。


  *   `Interval partitioning（间隔分区）`：这与范围分区非常相似，不同之处在于数据库本身可以在新数据到来时创建新的分区。使用传统的范围分区，DBA
  的任务是预先创建分区以容纳现在和未来的所有可能数据值。这通常意味着 DBA 需要按计划创建分区——以容纳下个月或下周的数据。使用间隔分区，当新数据到达且无法根据
  DBA 指定的规则放入任何现有分区时，数据库本身将创建分区。


  *   `Reference partitioning（引用分区）`：这允许在由外键强制实施的父子关系中，子表继承父表的分区方案。这使得无需对数据模型进行反规范化即可实现子表与父表的等分区。过去，表只能基于其物理存储的属性进行分区；引用分区实际上允许你基于父表的属性对表进行分区。


  *   `Interval reference partitioning（间隔引用分区）`：顾名思义，这是间隔分区和引用分区的组合。它允许自动向父/子引用分区表添加分区。


  *   `Virtual column partitioning（虚拟列分区）`：这允许基于表中一个或多个现有列的表达式进行分区。该表达式仅作为元数据存储。


  *   `Composite partitioning（复合分区）`：这是范围、哈希和列表分区的组合。它允许你首先对某些数据应用一种分区方案，然后，在每个生成的分区内，使用其他分区方案将该分区再细分为子分区。


  *   `System partitioning（系统分区）`：由应用程序显式决定将一行插入到哪个分区。这种分区类型用途有限，本章不予讨论；我们在此提及只是为了完整列出
  Oracle 支持的分区类型。有关系统分区的更多详细信息，请参阅 Oracle *Database Cartridge Developer''s Guide*。


  在接下来的章节中，我们将探讨每种分区类型的益处以及它们之间的差异。我们还将讨论何时对不同类型的应用采用何种方案。本节并非旨在全面展示分区语法及所有可用选项。相反，示例是简单且具有说明性的，旨在让你了解分区的工作原理以及不同类型的分区设计用来实现的功能。


  **注意**


  有关分区语法的完整细节，请参阅*Oracle Database SQL Language Reference*手册或*Oracle Database Administrator''s
  Guide*。此外，*Oracle Database VLDB and Partitioning Guide*和*Oracle Database Data Warehousing
  Guide*都是关于分区选项的极佳信息来源，对于任何计划实施分区的人来说都是必读之物。



  ### 范围分区


  我们要看的第一种类型是范围分区表。下面的 `CREATE TABLE` 语句创建了一个使用列 `RANGE_KEY_COLUMN` 的范围分区表。所有 `RANGE_KEY_COLUMN`
  严格小于 `01-JAN-2021` 的数据将被放入分区 `PART_1`，所有值严格小于 `01-JAN-2022`（且大于或等于 `01-JAN-2021`）的数据将进入分区
  `PART_2`。任何不满足这两个条件之一的数据（例如，`RANGE_KEY_COLUMN` 值为 `01-JAN-2022` 或更大的行）在插入时都会失败，因为它无法映射到任何分区：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> CREATE TABLE range_example

  ( range_key_column date NOT NULL,

  data             varchar2(20)

  )

  PARTITION BY RANGE (range_key_column)

  ( PARTITION part_1 VALUES LESS THAN

  (to_date(''01/01/2021'',''dd/mm/yyyy'')),

  PARTITION part_2 VALUES LESS THAN

  (to_date(''01/01/2022'',''dd/mm/yyyy''))

  );

  Table created.

  ```


  注意


  我们使用了 `DD/MM/YYYY` 日期格式来创建 `CREATE TABLE` 语句，以使其国际化。如果我们使用 `DD-MON-YYYY` 格式，那么如果一月的缩写在您的系统上不是
  Jan，`CREATE TABLE` 将会因 `ORA-01843: not a valid month` 而失败。`NLS_LANGUAGE` 设置会影响这一点。然而，为了避免对哪个部分是日、哪个部分是月产生任何歧义，我在正文和插入语句中使用了三字符月份缩写。


  图 13-1 显示了 Oracle 将检查 `RANGE_KEY_COLUMN` 的值，并根据该值将其插入到两个分区之一。


  ![../images/319655_4_En_13_Chapter/319655_4_En_13_Fig1_HTML.jpg](img/319655_4_En_13_Fig1_HTML.jpg)


  图 13-1


  范围分区插入示例


  插入的行是特意选择的，目的是演示分区范围是严格小于，而不是小于或等于。我们首先插入值 `15-DEC-2020`，它肯定会进入分区 `PART_1`。我们还插入一行日期/时间为
  `01-JAN-2021` 前一秒的行——该行也将进入分区 `PART_1`，因为它小于 `01-JAN-2021`。然而，下一个在 `01-JAN-2021`
  午夜的插入会进入分区 `PART_2`，因为该日期/时间并不严格小于 `PART_1` 的分区范围边界。最后一行显然属于分区 `PART_2`，因为它大于或等于
  `PART_1` 的分区范围边界，并且小于 `PART_2` 的分区范围边界。


  我们可以通过从各个分区执行 `SELECT` 语句来确认这一点：


  ```

  SQL> select to_char(range_key_column,''dd-mon-yyyy hh24:mi:ss'')

  from range_example partition (part_1);

  TO_CHAR(RANGE_KEY_COLUMN,''DD-


  15-dec-2020 00:00:00

  31-dec-2020 23:59:59

  SQL> select to_char(range_key_column,''dd-mon-yyyy hh24:mi:ss'')

  from range_example partition (part_2);

  TO_CHAR(RANGE_KEY_COLUMN,''DD-


  01-jan-2021 00:00:00

  31-dec-2021 23:59:59

  ```


  您可能想知道如果您插入一个超出上限的日期会发生什么。答案是 Oracle 会引发错误：


  ```

  SQL> insert into range_example

  ( range_key_column, data )

  values

  ( to_date( ''01-jan-2022 00:00:00'',

  ''dd-mon-yyyy hh24:mi:ss'' ),

  ''application data...'' );

  insert into range_example

  *

  ERROR at line 1:

  ORA-14400: inserted partition key does not map to any partition

  ```


  对于前述情况，有两种处理方法——一种是使用后面描述的间隔分区，另一种是使用一个全捕获分区，我们现在将演示后者。假设您想像之前那样将 2020 和 2021 年的日期隔离到各自的分区中，但您希望所有其他日期都进入第三个分区。使用范围分区，您可以使用
  `MAXVALUE` 子句来实现这一点，如下所示：


  ```

  SQL> drop table range_example purge;

  SQL> CREATE TABLE range_example

  ( range_key_column date,

  data             varchar2(20)

  )

  PARTITION BY RANGE (range_key_column)

  ( PARTITION part_1 VALUES LESS THAN

  (to_date(''01/01/2021'',''dd/mm/yyyy'')),

  PARTITION part_2 VALUES LESS THAN

  (to_date(''01/01/2022'',''dd/mm/yyyy'')),

  PARTITION part_3 VALUES LESS THAN

  (MAXVALUE)

  );

  Table created.

  ```


  现在，当您向该表中插入一行时，它将进入三个分区之一——没有任何行会被拒绝，因为分区 `PART_3` 可以接受任何未进入 `PART_1` 或 `PART_2`
  的 `RANGE_KEY_COLUMN` 值（即使是 `RANGE_KEY_COLUMN` 的 null 值也会被插入到这个新分区中）。


  '
- '# 哈希分区


  当对表进行哈希分区时，Oracle 会对分区键应用一个哈希函数，以确定数据应放置在 N 个分区中的哪一个。Oracle 建议 N 是 2 的幂（2、4、8、16
  等），以实现最佳的整体分布，我们很快就会看到，这绝对是一个非常好的建议。



  ### 哈希分区的工作原理


  哈希分区旨在实现数据在不同设备（磁盘）之间的良好分布，或将数据隔离成更易管理的块。为表选择的哈希键应是一个或多个具有唯一性（或至少具有尽可能多的不同值）的列，以确保行在各分区间得到良好分布。如果选择一个仅有四个值的列，并使用两个分区，那么所有行很可能最终都哈希`到同一个分区`，这完全违背了分区的初衷！


  在本例中，我们将创建一个包含两个分区的哈希表。我们将使用名为`HASH_KEY_COLUMN`的列作为分区键。Oracle 会获取此列中的值，通过哈希计算来确定该行将存储在哪个分区中：


  ```sql

  $ sqlplus eoda/foo@PDB1

  SQL> CREATE TABLE hash_example

  ( hash_key_column   date,

  data              varchar2(20)

  )

  PARTITION BY HASH (hash_key_column)

  ( partition part_1 tablespace p1,

  partition part_2 tablespace p2

  );

  表已创建。

  ```


  图 13-2 显示，Oracle 将检查`HASH_KEY_COLUMN`中的值，对其进行哈希计算，并确定给定行将出现在两个分区中的哪一个。


  ![../images/319655_4_En_13_Chapter/319655_4_En_13_Fig2_HTML.jpg](img/319655_4_En_13_Fig2_HTML.jpg)


  图 13-2 哈希分区插入示例


  如前所述，哈希分区无法控制行最终落入哪个分区。Oracle 应用哈希函数，该哈希函数的结果决定了行的去向。如果你希望某一行因任何原因进入分区`PART_1`，那么你*不应该*——事实上，你*不能*——使用哈希分区。该行将进入哈希函数指定的任何分区。如果更改哈希分区的数量，数据将在所有分区间重新分布（向哈希分区表添加或删除分区将导致所有数据被重写，因为每一行现在可能属于不同的分区）。


  哈希分区在你拥有大型表时最为有用，例如“减轻管理负担”一节中展示的表，并且你希望对其进行*分而治之*。与其管理一个大表，不如拥有 8 个或 16 个更小的表进行管理。哈希分区也有助于在一定程度上提高可用性，如“提高可用性”一节所示；单个哈希分区的临时丢失允许访问所有剩余分区。一些用户可能会受到影响，但很多人很可能不会受到影响。此外，现在的恢复单位要小得多。你无需恢复和修复一个大的表；你只需恢复该表的一个片段。最后，正如“减少
  OLTP 系统中的竞争”一节所提到的，哈希分区在高更新竞争环境中很有用。我们不再拥有一个单一的热点段，而是可以将一个段哈希分区成 16 块，每一块现在都在接收修改。


  ### 使用 2 的幂次进行哈希分区


  我之前提到过分区数量应该是 2 的幂。这很容易被证明是正确的。为了演示，我们将设置一个存储过程来自动创建包含 N 个分区的哈希分区表（N 将是一个参数）。此过程将构造一个动态查询，按分区检索行数，然后显示计数和按分区计数的简单直方图。最后，它将打开此查询并让我们查看结果。此过程从创建哈希表开始。我们将使用名为`T`的表：


  ```sql

  SQL> create or replace

  procedure hash_proc

  ( p_nhash in number,

  p_cursor out sys_refcursor )

  authid current_user

  as

  l_text     long;

  l_template long :=

  ''select $POS$ oc, ''''p$POS$'''' pname, count(*) cnt '' ||

  ''from t partition ( $PNAME$ ) union all '';

  table_or_view_does_not_exist exception;

  pragma exception_init( table_or_view_does_not_exist, -942 );

  begin

  begin

  execute immediate ''drop table t'';

  exception when table_or_view_does_not_exist

  then null;

  end;

  execute immediate ''

  CREATE TABLE t ( id )

  partition by hash(id)

  partitions '' || p_nhash || ''

  as

  select rownum

  from all_objects'';

  ```


  接下来，我们将动态构造一个查询来按分区检索行数。它使用之前定义的模板查询来实现。对于每个分区，我们将使用分区扩展表名收集计数，并将所有计数用`union all`合并：


  ```sql

  for x in ( select partition_name pname,

  PARTITION_POSITION pos

  from user_tab_partitions

  where table_name = ''T''

  order by partition_position )

  loop

  l_text := l_text ||

  replace(

  replace(l_template,

  ''$POS$'', x.pos),

  ''$PNAME$'', x.pname );

  end loop;

  ```


  现在，我们将使用该查询选择出分区位置（`PNAME`）和该分区中的行数（`CNT`）。使用`RPAD`，我们将构建一个相当原始但有效的直方图：


  ```sql

  open p_cursor for

  ''select pname, cnt,

  substr( rpad(''''*'''',30*round( cnt/max(cnt)over(),2),''''*''''),1,30) hg

  from ('' || substr( l_text, 1, length(l_text)-11 ) || '')

  order by oc'';

  end;

  /

  过程已创建。

  ```


  如果我们以输入 4（四个哈希分区）运行此过程，我们期望看到类似于以下输出的结果：


  ```sql

  SQL> variable x refcursor

  SQL> set autoprint on

  SQL> exec hash_proc( 4, :x );

  PL/SQL 过程已成功完成。

  PN        CNT HG

  -- ---------- ------------------------------

  p1      12141 *****************************

  p2      12178 *****************************

  p3      12417 ******************************

  p4      12105 *****************************

  ```


  所示的简单直方图显示数据在四个分区上分布良好且均匀。每个分区中的行数几乎相同。但是，如果我们从四个哈希分区简单地改为五个，我们将看到以下情况：


  ```sql

  SQL> exec hash_proc( 5, :x );

  PL/SQL 过程已成功完成。

  PN        CNT HG

  -- ---------- ------------------------------

  p1       6102 **************

  p2      12180 *****************************

  p3      12419 ******************************

  p4      12106 *****************************

  p5       6040 **************

  ```


  这个直方图指出，第一个和最后一个分区的行数只有中间分区的一半。数据分布一点也不均匀。对于六个和七个哈希分区，我们将看到这种趋势持续：


  '
