  ```


  在 `.dat` 文件中需要注意以下几点：


  *   每个字段都被我们的包围符包裹。

  *   `DATES` 被卸载为大数字。

  *   该文件中的每一行数据都以要求的 `~` 结尾。


  我们现在可以使用 SQLLDR 轻松地重新加载这些数据。你可以根据需要向 SQLLDR 命令行添加选项。


  如前所述，卸载包的逻辑可以用多种语言和工具实现。PL/SQL 是一个很好的全能型实现（无需在客户端工作站上编译和安装），但它总是写入服务器文件系统。SQL*Plus
  是一个很好的折中方案，提供了不错的性能和写入客户端文件系统的能力。


  ## 总结


  在本章中，我们涵盖了数据加载和卸载的许多细节。首先，我们讨论了外部表相对于 SQLLDR 的优势。接着，我们探讨了轻松上手外部表的简单技术。我们还展示了使用 `PREPROCESSOR`
  指令在加载数据前执行操作系统命令的示例。


  然后，我们研究了外部表卸载功能，以及轻松创建和在不同数据库间移动数据提取物的能力。最后，我们通过研究如何将表中的数据卸载到转储文件中来结束本章，这种文件可用于在数据库之间移动数据。


  我们讨论了在大多数情况下，你应该使用外部表而不是 SQLLDR。然而，有些情况可能需要使用 SQLLDR，例如通过网络加载数据。随后，我们检查了加载分隔数据、固定宽度数据、LOB
  等的许多基本技术。


  最后，我们探讨了逆向过程——数据卸载，以及如何以电子表格或其他工具可以使用的格式将数据从数据库中导出。在该讨论过程中，我们审视了使用 SQL*Plus 的方法。之后，我们开发了一个
  PL/SQL 工具来演示该过程——它能以 SQLLDR（或外部表）友好的格式卸载数据，但可以轻松修改以满足你的需求。




