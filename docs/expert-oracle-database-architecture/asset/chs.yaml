  ## 锁查询示例


  ```

  SQL> select username,

  v$lock.sid,

  trunc(id1/power(2,16)) rbs,

  bitand(id1,to_number(''ffff'',''xxxx''))+0 slot,

  id2 seq,

  lmode,

  request

  from v$lock, v$session

  where v$lock.type = ''TX''

  and v$lock.sid = v$session.sid

  and v$session.username = USER;

  USERNAME            SID      RBS     SLOT        SEQ      LMODE    REQUEST

  ------------ ---------- -------- -------- ---------- ---------- ----------

  EODA                 17        2       27      21201          0          6

  EODA                 22        2       27      21201          6          0

  EODA                 17        8       17      21403          6          0

  SQL> select XIDUSN, XIDSLOT, XIDSQN from v$transaction;

  XIDUSN    XIDSLOT     XIDSQN

  ---------- ---------- ----------

  2         27      21201

  8         17      21403

  ```


  我们在这里看到，一个新事务开始了，其事务 ID 为 `(8,17,21403)`。我们的新会话 `SID=17` 这次在 `V$LOCK` 中有两行。一行表示它拥有的锁（`LMODE=6`）。另一行显示了一个值为
  6 的 `REQUEST`。这是对一个排他锁的请求。需要注意的有趣之处是，这个请求行的 `RBS/SLOT/SEQ` 值是锁持有者的事务 ID。`SID=22`
  的事务正在阻塞 `SID=17` 的事务。我们可以通过对 `V$LOCK` 进行自连接来更明确地看到这一点：


  ```

  SQL> select

  (select username from v$session where sid=a.sid) blocker,

  a.sid,

  '' is blocking '',

  (select username from v$session where sid=b.sid) blockee,

  b.sid

  from v$lock a, v$lock b

  where a.block = 1

  and b.request > 0

  and a.id1 = b.id1

  and a.id2 = b.id2;

  BLOCKER                SID ''ISBLOCKING''  BLOCKEE                SID

  --------------- ---------- ------------- --------------- ----------

  EODA                    22  is blocking  EODA                    17

  ```


  现在，如果我们提交原始事务 `SID=22`，并重新运行锁查询，我们会发现请求行消失了：


  ```

  SQL> select username,

  v$lock.sid,

  trunc(id1/power(2,16)) rbs,

  bitand(id1,to_number(''ffff'',''xxxx''))+0 slot,

  id2 seq,

  lmode,

  request

  from v$lock, v$session

  where v$lock.type = ''TX''

  and v$lock.sid = v$session.sid

  and v$session.username = USER;

  USERNAME             SID      RBS       SLOT        SEQ     LMODE   REQUEST

  ------------- ---------- -------- ---------- ---------- --------- ---------

  EODA                  17        8         17      21403         6         0

  SQL> select XIDUSN, XIDSLOT, XIDSQN from v$transaction;

  XIDUSN    XIDSLOT     XIDSQN

  ---------- ---------- ----------

  8         17      21403

  ```


  请求行在其他会话释放锁的瞬间就消失了。那个请求行就是排队机制。数据库能够在事务完成的瞬间唤醒被阻塞的会话。各种 GUI 工具可以提供更美观的显示，但紧急情况下，了解你需要查看哪些表是非常有用的。


  ## 块头事务表


  然而，在我们说已经很好地理解了 Oracle 中行锁如何工作之前，我们必须看最后一个主题：锁和事务信息如何与数据本身一起管理。它是块头开销的一部分。在第 10
  章中，我们将详细介绍块格式，但可以简单地说，在数据库块的顶部有一些前置开销空间，用于存储该块的事务表。这个事务表包含每个在该块中锁定了数据的真实事务的一个条目。这个结构的大小由对象的
  `CREATE` 语句上的两个物理属性参数控制：


  *   `INITRANS`：此结构的初始预分配大小。索引和表默认为 2。

  *   `MAXTRANS`：此结构可以增长到的最大尺寸。在 Oracle 的近期版本中，`MAXTRANS` 总是设置为 255。


  每个块在诞生时默认有两个事务槽。一个块能同时拥有的活动事务数量受 `MAXTRANS` 的值和块上空间可用性的限制。如果没有足够的空间来增长这个结构，你可能无法在一个块上实现
  255 个并发事务。


  我们可以通过创建一个表来人为地演示这是如何工作的，将许多行打包到一个块中，使得块从一开始就很满；在我们初始加载数据后，块上将只剩下很少的空间。这些行的存在将限制事务表可以增长的大小，因为缺乏空间。我当时使用了
  8KB 的块大小（所以，如果你有 8KB 的块大小，你应该能够重现这个）。我们将从创建打包表开始。我尝试了不同的数据长度，最终得到了这个非常特殊的大小：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> set serverout on

  SQL> create table t

  ( x int primary key,

  y varchar2(4000)

  );

  Table created.

  SQL> insert into t (x,y)

  select rownum, rpad(''*'',148,''*'')

  from dual

  connect by level < 47;

  46 rows created.

  SQL> commit;

  Commit complete.

  SQL> select length(y),

  dbms_rowid.rowid_block_number(rowid) blk,

  count(*), min(x), max(x)

  from t

  group by length(y), dbms_rowid.rowid_block_number(rowid);

  LENGTH(Y)         BLK   COUNT(*)     MIN(X)     MAX(X)

  ---------- ---------- ---------- ---------- ----------

  148      23470         46          1         46

  ```


  所以，我们的表有 46 行，都在同一个块上。我选择了 148 个字符，因为如果再多一个字符，就需要两个块来保存这 46 条记录。现在，我们需要一种方法来观察当许多事务试图同时在该单个块上锁定数据时会发生什么。为此，我们将再次使用
  `AUTONOMOUS_TRANSACTION`，这样我们就可以使用单个会话，而不必运行许多并发的 SQL*Plus 会话。我们的存储过程将通过主键锁定表中的一行，从主键值
  1 开始（插入的第一条记录）。如果我们的过程无需等待（不会被阻塞）就获得了该行的锁，它将简单地将主键值增加 1，并使用递归重复整个过程。因此，第二次调用将尝试锁定记录
  2，第三次调用锁定记录 3，依此类推。如果该过程被强制等待，它将引发一个 ORA-54 资源忙错误，我们将打印出“locked out trying to select
  row <主键值>”。这将表明我们在锁定所有行之前就已经用完了该块上的事务槽。另一方面，如果我们没有找到要锁定的行，那就意味着我们已经锁定了该块上的每一行，我们将打印出成功（意味着块头中的事务表能够增长以容纳所有事务）。以下是该存储过程：


  ```

  SQL> create or replace procedure do_update( p_n in number )

  as

  pragma autonomous_transaction;

  l_rec t%rowtype;

  resource_busy exception;

  pragma exception_init( resource_busy, -54 );

  begin

  select *

  into l_rec

  from t

  where x = p_n

  for update NOWAIT;

  do_update( p_n+1 );

  commit;

  exception

  when resource_busy

  then

  dbms_output.put_line( ''locked out trying to select row '' || p_n );

  commit;

  when no_data_found

  then

  dbms_output.put_line( ''we finished - no problems'' );

  commit;

  end;

  /

  Procedure created.

  ```


  关键在第 14 行，我们在那里递归地调用自身，用新的主键值一遍又一遍地尝试锁定。如果你在用 148 个字符的字符串填充表后运行该过程，你应该观察到：


  ```

  SQL> exec do_update(1);

  locked out trying to select row 38

  PL/SQL procedure successfully completed.

  ```


  这个输出表明我们能够锁定 37 行，但在尝试锁定第 38 行时用完了事务槽。对于这个给定的块，最多可以有 37 个事务并发访问它。如果我们用稍小一点的字符串重做这个例子，我们会看到它顺利完成：


  ```

  SQL> exec do_update(1);

  we finished - no problems

  PL/SQL procedure successfully completed.

  ```


  在这个例子中，使用 146 个字符的字符串，我们能够在块上存储 47 行，并且事务表可以增长到足够大以支持 47 个并发事务。




  '
- '# Oracle 事务与锁机制详解


  SQL> truncate table t;

  Table truncated.

  SQL> insert into t (x,y)

  select rownum, rpad(''*'',147,''*'')

  from dual

  connect by level  select length(y),

  dbms_rowid.rowid_block_number(rowid) blk,

  count(*), min(x), max(x)

  from t

  group by length(y), dbms_rowid.rowid_block_number(rowid);

  LENGTH(Y)         BLK   COUNT(*)     MIN(X)     MAX(X)

  ---------- ---------- ---------- ---------- ----------

  147      23470         46          1         46

  SQL> exec do_update(1);

  we finished - no problems

  PL/SQL procedure successfully completed.


  这次我们成功完成了——这就是一个字节所带来的差异！在这个案例中，块上多出的 46 字节可用空间（因为 46 个字符串每个都小了 1 字节）允许我们在该块上多执行至少九个并发事务。


  这个例子演示了当多个事务尝试同时访问同一个块时会发生的情况——如果并发事务数量极高，就可能发生在事务表上的等待。如果 `INITRANS` 设置得太低，并且块上没有足够的空间来动态扩展事务，就可能发生阻塞。在大多数情况下，默认值
  2 是足够的，因为空闲事务表插槽会动态增长（前提是空间允许），但在某些环境中，你可能需要增加这个设置（以预留更多插槽空间）来提高并发性并减少等待。


  你可能需要增加此设置的一个例子是，对于一张表，或者更常见地，对于一个索引（因为索引块通常能比表块容纳更多的行），如果它被频繁修改且平均每块行数很多。你可能需要增加
  `PCTFREE`（在第 10 章讨论）或 `INITRANS`，以便预先在块上为预期的并发事务数量预留足够的空间。如果你预计这些块一开始就会接近填满，意味着没有空间用于块上事务结构的动态扩展，那么这一点尤其重要。


  最后关于 `INITRANS` 的一点说明。我有几次提到该属性的默认值是 2。然而，如果你在创建表后检查数据字典，会发现 `INITRANS` 显示的值是 1：


  ```

  SQL> create table t ( x int );

  SQL> select ini_trans from user_tables where table_name = ''T'';

  INI_TRANS

  ----------

  ```


  那么，默认的事务插槽数量到底是 1 还是 2？尽管数据字典显示的值是 1，我们可以证明它实际上是 2。考虑这个实验。首先，为表 `T` 生成一个事务，插入一条记录：


  ```

  SQL>  insert into t values ( 1 );

  ```


  现在验证表 `T` 消耗了一个块：


  ```

  SQL>  select dbms_rowid.ROWID_BLOCK_NUMBER(rowid)  from t;

  DBMS_ROWID.ROWID_BLOCK_NUMBER(ROWID)

  ------------------------------------

  ```


  接下来，将表 `T` 所使用块的块号和数据文件号放入变量 `B` 和 `F` 中：


  ```

  SQL>  column b new_val B

  SQL>  column f new_val F

  SQL>  select dbms_rowid.ROWID_BLOCK_NUMBER(rowid) B,

  dbms_rowid.ROWID_TO_ABSOLUTE_FNO( rowid, user, ''T'' ) F

  from t;

