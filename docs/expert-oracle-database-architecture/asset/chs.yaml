  \ New York Plaza, New York, NY 10004, U.S.A.\n\n## 引言\n\n本书所包含材料的灵感来源于我开发 `Oracle`\
  \ 软件的经验，以及与 `Oracle` 开发人员和 `DBA`（数据库管理员）合作，帮助他们基于 `Oracle` 数据库构建可靠且健壮的应用程序的经历。本书基本上反映了我日常所做的工作，以及我每天看到人们遇到的问题。\n\
  \n我涵盖了我认为最相关的内容，即 `Oracle` 数据库及其架构。我本可以写一本标题类似的书，解释如何使用特定的语言和架构开发应用程序——例如，一本使用 `JavaServer\
  \ Pages` 与 `Enterprise JavaBeans` 对话，然后使用 `JDBC` 与 `Oracle` 通信的书。然而，归根结底，为了成功构建这样的应用程序，你确实需要理解本书涵盖的主题。本书探讨了我认为成功使用\
  \ `Oracle` 开发所需普遍了解的知识，无论你是使用 `ODBC` 的 `Visual Basic` 程序员、使用 `EJB` 和 `JDBC` 的 `Java`\
  \ 程序员，还是使用 `DBI Perl` 的 `Perl` 程序员。本书不推崇任何特定的应用程序架构；它不比较三层架构与客户端/服务器架构。相反，它涵盖了数据库能做什么以及你必须了解其工作方式的内容。由于数据库是任何应用程序架构的核心，因此本书应该拥有广泛的读者群。\n\
  \n正如书名所示，*Expert Oracle Database Architecture* 专注于数据库架构以及数据库本身的工作原理。我深入探讨了 `Oracle`\
  \ 数据库架构：构成 `Oracle` 数据库和实例的文件、内存结构和进程。接着，我讨论了重要的数据库主题，如锁、并发控制、事务工作原理、重做与撤销，以及为什么了解这些内容对你很重要。最后，我研究了数据库中的物理结构，如表、索引和数据类型，并涵盖了优化利用这些结构的技术。\n\
  \n## 本书内容\n\n拥有众多开发选项的一个问题是，有时很难确定哪个选项最适合你的特定需求。每个人都希望有尽可能多的灵活性（尽可能多的选择），但他们也希望事情非常**简单明了**——换句话说，就是容易。`Oracle`\
  \ 为开发人员提供了几乎**无限的选择**。从来没有人说，“你在 `Oracle` 中不能那样做。” 相反，他们会说，“你希望在 `Oracle` 中用多少种不同的方式来做这件事？”\
  \ 我希望本书能帮助你做出正确的选择。\n\n本书面向那些欣赏选择权，但也希望获得有关 `Oracle` 功能和特性的指导原则和实用实现细节的人。例如，`Oracle`\
  \ 有一个非常棒的功能，叫做 `parallel execution`（并行执行）。`Oracle` 文档告诉你如何使用这个功能以及它的作用。然而，`Oracle`\
  \ 文档并没有告诉你何时应该使用这个功能，或许更重要的是，何时不应该使用这个功能。它并不总是告诉你这个功能的实现细节，如果你没有意识到这些，可能会带来麻烦（我指的不是\
  \ bug，而是该功能应有的工作方式及其真正的设计目的）。\n\n在本书中，我努力不仅描述事物的工作原理，还要解释何时以及为何考虑使用某个特定功能或实现。我觉得理解事物背后的“如何”很重要，同时理解“何时”、“为何”、“何时不”以及“为何不”也同样重要！\n\
  \n\n\n## 本书适合谁阅读\n\n本书的目标读者是所有使用 Oracle 作为数据库后端来开发应用程序的人员。这是一本为职业 Oracle 开发人员准备的书，他们需要了解如何在数据库中完成工作。本书的实用性意味着许多章节对数据库管理员（DBA）来说也会非常有趣。书中的大多数示例使用\
  \ `SQL*Plus` 来演示关键特性，因此你不会在这里学到如何开发一个非常酷的图形用户界面（GUI）——但你会了解到 Oracle 数据库的工作原理、其关键特性能做什么，以及何时应该（和不应该）使用它们。\n\
  \n本书适合任何希望用更少的工作从 Oracle 中获得更多收益的人。适合任何想要看到使用现有特性新方法的人。适合任何想要了解这些特性如何在现实世界中应用的人（不仅仅是展示如何使用某个特性，还包括该特性为何首先具有相关性）。另一类会对本书感兴趣的读者是负责\
  \ Oracle 项目开发人员的技术经理。在某些方面，他们理解为什么了解数据库对成功至关重要也同样重要。本书可以为那些希望让员工接受正确技术培训或确保员工已掌握所需知识的经理们提供论据。\n\
  \n为了从本书中获得最大收益，读者应具备：\n\n*   `SQL 知识`：你不必是史上最优秀的 SQL 编码人员，但良好的实用知识会有所帮助。\n*   `对\
  \ PL/SQL 的理解`：这不是先决条件，但它将帮助你吸收书中的示例。例如，本书不会教你如何编写 `FOR` 循环或声明 `record` 类型；Oracle\
  \ 文档和众多书籍对此已有详尽介绍。然而，这并不意味着通过阅读本书你学不到很多关于 `PL/SQL` 的知识。你将学到很多。你会非常熟悉 `PL/SQL` 的许多特性，你会看到做事的新方法，并且你会了解到一些可能你不知道存在的包/特性。\n\
  *   `接触过某种第三代语言（3GL），例如 C 或 Java`：我相信任何能够读写 3GL 语言代码的人都能成功阅读并理解本书中的示例。\n*   `熟悉\
  \ Oracle 数据库概念手册。`\n\n关于最后一点说几句：由于 Oracle 文档集体量庞大，许多人觉得它有些令人生畏。如果你刚刚起步或者尚未阅读过任何\
  \ Oracle 文档，我可以告诉你，《Oracle 数据库概念》手册正是最佳的起点。它大约有 600 多页（我知道这点是因为我撰写并编辑了其中的每一页），涉及许多你需要了解的主要\
  \ Oracle 概念。它可能不会提供每一个技术细节（那是其他 10,000 到 20,000 页文档的用途），但它会让你了解所有重要的概念。这本手册涵盖了以下主题（仅举几例）：\n\
  \n*   数据库中的结构以及数据如何被组织和存储\n*   分布式处理\n*   Oracle 的内存架构\n*   Oracle 的进程架构\n*   你将使用的模式对象（表、索引、集群等）\n\
  *   内置数据类型和用户定义数据类型\n*   `SQL` 存储过程\n*   事务如何工作\n*   优化器\n*   数据完整性\n*   并发控制\n\n\
  我自己将反复回到这些主题。这些是基础。不了解它们，你将创建出容易失败的 Oracle 应用程序。我鼓励你通读这本手册，并理解其中的一些主题。\n\n## 本书结构\n\
  \n本书共有 15 章，每一章都像一本“小书”——一个几乎独立的组件。偶尔，我会引用其他章节的示例或特性，但你基本上可以挑出书中的某一章单独阅读。例如，你不必先阅读关于数据库表的第\
  \ 10 章，才能理解或利用关于并行处理的第 14 章。\n\n许多章节的格式和风格几乎完全相同：\n\n*   对特性或功能的介绍。\n*   你可能希望使用（或不使用）该特性或功能的原因。我概述了何时应考虑使用此特性，以及何时不应使用。\n\
  *   如何使用此特性。这里的信息不仅仅是 SQL 参考手册中材料的复制；而是以循序渐进的方式呈现：这是你需要的，这是你必须做的，这些是你开始时需要了解的开关。本节涵盖的主题将包括：\n\
  \    *   如何实现该特性\n    *   示例，示例，还是示例\n    *   如何调试此特性\n    *   使用此特式的注意事项\n    *\
  \   如何（主动）处理错误\n*   总结，将所有内容汇集在一起。\n\n书中将有大量的示例和代码，所有这些都可以从 GitHub 网站下载。接下来的部分将详细列出每章的内容。\n\
