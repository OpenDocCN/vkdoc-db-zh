  ## TM (DML 排队) 锁


  TM 锁用于确保在你修改表的内容时，表的结构不被更改。例如，如果你更新了一张表，你将在该表上获得一个 TM 锁。这将阻止另一个用户对该表执行 `DROP` 或
  `ALTER` 命令。如果另一个用户在你持有 TM 锁期间尝试对该表执行 DDL，他们将收到以下错误消息：


  ```

  drop table dept

  *

  ERROR at line 1:

  ORA-00054: resource busy and acquire with NOWAIT specified

  ```


  > 注意

  >

  > 你可以设置 `DDL_LOCK_TIMEOUT` 来让 DDL 语句等待。这通常通过 `ALTER SESSION` 命令实现。例如，你可以在执行 `DROP
  TABLE` 命令之前，先执行 `ALTER SESSION SET DDL_LOCK_TIMEOUT=60;`。这样，发出的 `DROP TABLE` 命令将等待
  60 秒，然后才返回错误（当然，它也可能在这期间内成功执行）。


  ORA-00054 错误消息起初令人困惑，因为根本没有直接的方法在 `DROP TABLE` 上指定 `NOWAIT` 或 `WAIT`。它只是一个通用消息，当你尝试执行一个会被阻塞、但该操作本身又不允许被阻塞的操作时就会收到。正如你之前看到的，这与你对锁定的行执行
  `SELECT FOR UPDATE NOWAIT` 时得到的错误消息是相同的。


  以下展示了这些锁在 `V$LOCK` 表中的显示方式：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> create table t1 ( x int );

  Table created.

  SQL> create table t2 ( x int );

  Table created.

  SQL> insert into t1 values ( 1 );

  1 row created.

  SQL> insert into t2 values ( 1 );

  1 row created.

  SQL> select (select username

  from v$session

  where sid = v$lock.sid) username,

  sid,

  id1,

  id2,

  lmode,

  request, block, v$lock.type

  from v$lock

  where sid = sys_context(''userenv'',''sid'');

  USERNAME      SID        ID1        ID2      LMODE    REQUEST      BLOCK TY

  -------- -------- ---------- ---------- ---------- ---------- ---------- --

  EODA           22        133          0          4          0          0 AE

  EODA           22     244271          0          3          0          0 TM

  EODA           22     244270          0          3          0          0 TM

  EODA           22    1966095        152          6          0          0 TX

  SQL> select object_name, object_id  from user_objects where object_id in (244271,244270);

  OBJECT_NAM  OBJECT_ID

  ---------- ----------

  T2             244271

  T1             244270

  ```


  > 注意

  >

  > `AE` 锁是一个版本锁，在 Oracle 11*g* 及以上版本可用。它是基于版本的重定义功能的一部分（本书不涉及）。`ID1` 是 `SID` 当前所使用版本的对象
  ID。这个版本锁以类似于 `TM` 锁保护它们所指向的表免受结构修改的方式，来保护被引用的版本免受修改（例如，删除版本）。


  我们每个事务只能获得一个 `TX` 锁，但我们可以获得与我们修改的对象数量一样多的 `TM` 锁。这里有趣的是，TM 锁的 `ID1` 列是 DML 锁定对象的对象
  ID，因此很容易找到持有锁的对象。



  '
- '# TM 锁配置


  关于 TM 锁的一个有趣补充：系统中允许的 TM 锁总数是可由您配置的（详情请参阅 *Oracle Database Reference* 手册中的 `DML_LOCKS`
  参数定义）。实际上，它可以被设置为零。这并不意味着您的数据库变成了只读数据库（无锁），而是意味着不允许执行 DDL。这在非常专业的应用场景中很有用，例如 RAC
  实现，可以减少原本会发生的实例内协调量。您也可以使用 `ALTER TABLE <TABLENAME> DISABLE TABLE LOCK` 命令，以逐对象为基础移除获取
  TM 锁的能力。这是一种快速降低意外删除表风险的方法，因为您在删除表之前必须重新启用表锁。它也可用于检测因我们之前讨论过的未索引外键而导致的表级锁。


  ## DDL 锁


  在 DDL 操作期间，系统会自动对对象施加 DDL 锁，以防止其他会话对其进行更改。例如，如果我执行 DDL 操作 `ALTER TABLE T`，那么表 `T`
  *通常*会被放置一个排他 DDL 锁，阻止其他会话获取该表的 DDL 锁和 TM 锁。


  > **注意**

  >

  > 在旧版本的 Oracle 中，`ALTER TABLE T` 会对其施加排他 DDL 锁。在此示例中，表 `T` 阻止其他会话执行 DDL 和获取 TM 锁（用于修改表内容）。现在，许多
  `ALTER` 命令可以在线执行——不会阻止修改。


  DDL 锁在 DDL 语句执行期间持有，并在执行完成后立即释放。这实际上是通过始终将 DDL 语句包裹在隐式提交（或提交/回滚对）中来完成的。因此，在 Oracle
  中，DDL 总是会提交。每个 `CREATE`、`ALTER` 等语句的执行过程都类似于以下伪代码：


  ```

  Begin

  Commit;

  DDL-STATEMENT

  Commit;

  Exception

  When others then rollback;

  End;

  ```


  所以，即使 DDL 执行不成功，它也总是会提交。请注意，DDL 以提交开始。它首先提交，这样如果需要回滚，它不会回滚您的事务。如果您执行了 DDL，它将使您执行的所有未完成工作永久生效，即使
  DDL 未成功。如果您需要执行 DDL，但又不希望它提交现有事务，您可以使用自治事务。


  DDL 锁有三种类型：


  *   *排他 DDL 锁*：这些锁阻止其他会话获取 DDL 锁或 `TM` (DML) 锁。这意味着您可以在 DDL 操作期间查询表，但不能以任何方式修改它。


  *   *共享 DDL 锁*：这些锁保护被引用对象的结构不被其他会话修改，但允许修改数据。


  *   *可中断的解析锁*：这些锁允许对象（例如共享池中缓存的查询计划）注册其对其他某个对象的依赖。如果您对该对象执行 DDL，Oracle 将检查已注册依赖关系的对象列表，并使它们无效。因此，这些锁是可中断的——它们不会阻止
  DDL 发生。


  大多数 DDL 会获取排他 DDL 锁。如果您发出类似这样的语句：


  ```

  SQL> alter table t move;

  ```


  在该语句执行期间，表 `T` 将不可用于修改。在此期间可以使用 `SELECT` 查询该表，但大多数其他操作将被阻止，包括所有其他 DDL 语句。在 Oracle
  中，现在某些 DDL 操作可以在不获取 DDL 锁的情况下进行。例如，我可以执行以下操作：


  ```

  SQL> create index t_idx on t(x) ONLINE;

  ```


  `ONLINE` 关键字修改了实际构建索引的方法。Oracle 不再获取阻止数据修改的排他 DDL 锁，而只是尝试在表上获取一个低级别（模式 2）的 `TM`
  锁。这将有效地阻止其他 DDL 发生，但会允许 DML 正常执行。Oracle 通过记录 DDL 语句执行期间对表所做的修改，并在 `CREATE` 操作完成时将这些更改应用到新索引来实现这一特性。这大大提高了数据的可用性。为了亲自验证这一点，您可以创建一个具有一定规模的表：


  ```

  SQL> create table t as select * from all_objects;

  表已创建。

  SQL> select object_id from user_objects where object_name = ''T'';

  OBJECT_ID

  ```


  然后针对该表运行创建索引：


  ```

  SQL> create index t_idx on t(owner,object_type,object_name) ONLINE;

  ```


  同时在另一个会话中运行此查询，以查看针对该新创建表所获取的锁（请记住，`ID1=244277` 是我示例中特有的，您需要使用*您自己的*对象 ID）：


  ```

  SQL> select (select username

  from v$session

  where sid = v$lock.sid) username,

  sid,

  id1,

  id2,

  lmode,

  request, block, v$lock.type

  from v$lock

  where id1 = 244277;

  USERNAME            SID        ID1      ID2    LMODE    REQUEST    BLOCK TY

  ------------ ---------- ---------- -------- -------- -------- -------- --

  EODA                 22     244277        0        3          0        0 DL

  EODA                 22     244277        0        3          0        0 DL

  EODA                 22     244277        0        2          0        0 TM

  EODA                 22     244277        0        4          0        0 OD

  ```


  因此，这里我们看到对我们的对象获取了四个锁。两个 `DL` 锁是*直接路径加载*锁。它们用于在索引创建期间防止对基础表进行直接路径加载（这当然意味着您不能同时进行直接路径加载*和*创建索引）。`OD`
  锁是允许真正在线 DDL 的锁。在过去（旧版本的 Oracle），在线 DDL 如 `CREATE INDEX ONLINE` 并非 100% 在线。它会在 `CREATE`
  语句的开始和结束时获取一个锁——阻止其他并发活动（对基础表数据的修改）。它*大部分在线*但并非*完全在线*。从 11g 开始，`CREATE INDEX ONLINE`
  命令是完全在线的；它不需要在命令开始/结束时获取排他锁。实现这一特性的一部分工作就是引入了 `OD`（在线 DDL）锁；它在内部用于实现真正的在线 DDL 操作。


  其他类型的 DDL 会获取共享 DDL 锁。当您创建存储的编译对象（如过程和视图）时，会对依赖对象获取这些锁。例如，如果您执行以下命令，在处理 `CREATE
  VIEW` 命令期间，将对 `EMP` 和 `DEPT` 都放置共享 DDL 锁：


  ```

  Create view MyView

  as

  select emp.empno, emp.ename, dept.deptno, dept.dname

  from emp, dept

  where emp.deptno = dept.deptno;

  ```


  您可以修改这些表的内容，但不能修改它们的结构。


  最后一种类型的 DDL 锁是可中断的解析锁。当您的会话解析语句时，会针对该语句引用的每个对象获取一个解析锁。获取这些锁是为了允许在共享池中，如果被引用的对象以某种方式被删除或更改，那么已解析的、缓存的语句可以被作废（刷新）。


  用于查看此信息的宝贵视图是 `DBA_DDL_LOCKS`。没有对应的 `V$` 视图。`DBA_DDL_LOCKS` 视图构建在更神秘的 `X$` 表之上，并且默认情况下可能未安装在您的数据库中。您可以通过运行位于目录
  `[ORACLE_HOME]/rdbms/admin` 中的 `catblock.sql` 脚本来安装此视图和其他锁定视图。此脚本必须以用户 `SYS` 身份执行才能成功。一旦执行了此脚本，您就可以针对该视图运行查询。例如，在新连接的会话中，我可能会看到以下内容：



  $ `sqlplus eoda/foo@PDB1`

