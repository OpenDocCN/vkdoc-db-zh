  \ `customerservice@springernature.com`。\n\n\n## 设置您的环境\n\n在本节中，我将介绍如何搭建一个能够执行本书示例的环境。具体包括：\n\
  \n*   访问 Oracle 数据库\n*   如何设置本书许多示例中使用的 `EODA` 账户\n*   如何正确设置 `SCOTT`/`TIGER` 演示模式\n\
  *   安装 Statspack\n*   安装并运行 `runstats`、创建 `BIG_TABLE`，以及本书中使用的其他自定义实用程序\n\n如之前“在哪里可以找到本书的源代码？”一节所述，本书中使用的所有脚本均可从\
  \ GitHub 站点下载。有一个 `chNN` 文件夹包含了每一章的脚本（其中 `NN` 是章节编号）。`ch00` 文件夹则包含了本节“设置您的环境”中列出的脚本。\n\
  \n本书中的大多数示例都设计为 100% 在 SQL*Plus 环境中运行。如果您已有访问 Oracle 数据库的权限，则可以直接跳到在您的数据库中创建 `EODA`\
  \ 和 `SCOTT` 模式的步骤。您还需要设置 Statspack 和自定义脚本。这些组件在本书中被广泛使用。\n\n### 访问 Oracle 数据库\n\n\
  本书包含大量实践数据库示例。因此，在您学习每一章的示例时，能够访问一个 Oracle 数据库至关重要。如果您想使用安装在个人电脑上的 Oracle 数据库，有几种免费且简单的方法。下面列出的两种技术都涉及使用\
  \ Oracle VM VirtualBox：\n\n*   安装 Oracle VM VirtualBox 和一个预构建的数据库虚拟机\n*   安装 Oracle\
  \ VM VirtualBox，克隆 Git 仓库，并使用 Vagrant 构建您的环境\n\n我将在以下各节简要描述这两种方法。\n\n#### Oracle\
  \ VM VirtualBox 和预构建的数据库虚拟机\n\n获取功能齐全的 Oracle 数据库最快、免费且简单的方法之一是下载并安装 Oracle VM VirtualBox，然后配合使用一个预构建的数据库虚拟机。在下载并安装所需软件后的几分钟内，您就可以拥有一个正常工作的数据库。\n\
  \n首先，您必须下载并安装 VirtualBox。请访问此链接下载并安装软件：\n\n[`www.virtualbox.org/wiki/Downloads`](https://www.virtualbox.org/wiki/Downloads)\n\
  \n下载并安装 VirtualBox 后，再下载一个预构建的数据库虚拟机，并按照说明将该 appliance 虚拟机导入 VirtualBox。使用此链接下载预构建的虚拟机：\n\
  \n[`www.oracle.com/downloads/developer-vm/community-downloads.html`](https://www.oracle.com/downloads/developer-vm/community-downloads.html)\n\
  \n`Database App Development VM` 包含一个名为 `CDB$ROOT` 的容器数据库。在此容器数据库内，有一个名为 `ORCL` 的可插拔数据库。登录到\
  \ Database App Development VM 时，请使用 `oracle` 操作系统账户（启动虚拟机后，应该会默认为您打开一个终端窗口）。在默认的终端窗口中，您可以如下访问\
  \ SQL*Plus：\n\n```bash\n$ sqlplus / as sysdba\n```\n\n如果系统提示您输入用户名和密码，请退出 SQL*Plus\
  \ 会话，并在操作系统提示符下设置以下环境变量：\n\n```bash\n$ export TWO_TASK=\n```\n\n设置完上述环境变量后，您应该能够通过以下方式访问\
  \ SQL*Plus：\n\n```bash\n$ sqlplus / as sysdba\n```\n\n使用 Oracle VM VirtualBox 和预构建的虚拟机是迄今为止获取功能齐全的\
  \ Oracle 数据库的最简单方法。如果您技术稍好一些，那么我建议您使用下一节描述的 Vagrant box 来构建一个可以在个人电脑上访问 Oracle 数据库的环境。\n\
  \n#### Oracle VM VirtualBox、Git 和 Vagrant\n\n这种方法需要您下载并安装 Oracle VM VirtualBox、Git\
  \ 和 Vagrant。您还需要下载 Oracle 安装介质。安装完这些软件后，使用 Git 克隆一个 Vagrant 仓库，然后使用 Vagrant box\
  \ 在您的笔记本电脑上构建一个虚拟机。这种方法一开始可能看起来有点令人望而生畏，所以我建议您查找 Tim Hall 的 YouTube 视频，标题为 “Vagrant:\
  \ Oracle Database Build”。该视频会引导您完成整个过程。\n\n以下是构建 Oracle 环境的高级步骤。首先，导航到 Oracle 的数据库下载站点并下载\
  \ Oracle 安装软件：\n\n[`www.oracle.com/database/technologies/oracle-database-software-downloads.html`](http://www.oracle.com/database/technologies/oracle-database-software-downloads.html)\n\
  \n现在导航到此链接，在您的笔记本电脑上下载并安装 Oracle VM VirtualBox：\n\n[`www.virtualbox.org/wiki/Downloads`](http://www.virtualbox.org/wiki/Downloads)\n\
  \n接下来，导航到 Git 下载页面，在您的笔记本电脑上下载并安装 Git：\n\n[`https://git-scm.com/downloads`](https://git-scm.com/downloads)\n\
  \n接下来，导航到 Vagrant 下载页面，在您的笔记本电脑上下载并安装 Vagrant：\n\n[`www.vagrantup.com/docs/installation`](https://www.vagrantup.com/docs/installation)\n\
  \n现在启动 `git bash` shell。在 Windows 上，您可以通过在“开始”框中输入 “git bash” 来完成此操作。使用 `git bash`\
  \ shell 窗口，创建一个目录：\n\n```bash\nmkdir c:\\vagrantboxes\n```\n\n切换到该目录：\n\n```bash\n\
  cd c:\\vagrantboxes\n```\n\n现在使用 `git` 克隆 Vagrant box 仓库：\n\n```bash\ngit clone\
  \ https://github.com/oracle/vagrant-boxes\n```\n\n接下来，切换到您要安装的 Oracle 数据库版本的目录：\n\
  \n```bash\ncd c:\\vagrant-boxes\\OracleDatabase\\\n```\n\n将 Oracle 安装介质也复制到此目录：\n\
  \n```bash\ncp  c:\\vagrant-boxes\\OracleDatabase\\\n```\n\n现在输入 `vagrant up`：\n\n\
  ```bash\nvagrant up\n```\n\n虚拟机启动后，您应该能够通过安全 Shell 会话访问它：\n\n```bash\nvagrant ssh\n\
  ```\n\n一旦登录到虚拟机，您应该能够访问 `root` 和 `oracle` 操作系统账户。例如：\n\n```bash\n$ sudo su - oracle\n\
  ```\n\n使用 Vagrant box 是创建包含 Oracle 数据库的虚拟机的极其强大的方式。您甚至可以使用这些技术从头开始轻松构建一个 RAC 数据库环境。\n\
  \n\n## 数据库设置\n\n本书中的所有示例都是针对一个名为`CDB`的容器数据库运行的。我将连接到根`CDB`容器来执行任务，例如修改初始化参数、停止/启动数据库等。`CDB`容器数据库包含两个可插拔数据库`PDB1`和`PDB2`。在演示应用程序类型的示例时，我将以`EODA`或`SCOTT`的身份连接到`PDB1`可插拔数据库。作为参考，以下是我用于创建`CDB`多租户数据库的数据库创建助手代码：\n\
  \n```\ndbca -silent -createDatabase \\\n-templateName General_Purpose.dbc \\\n-createAsContainerDatabase\
  \ true \\\n-pdbName PDB -numberOfPDBs 2 \\\n-sid CDB -gdbName CDB \\\n-characterset\
  \ AL32UTF8 \\\n-sysPassword foo \\\n-systemPassword foo \\\n-pdbAdminUserName pdbadmin\
  \ \\\n-pdbAdminPassword foo \\\n-initParams sga_target=1024M,pga_aggregate_target=512M\n\
  ```\n\n数据库创建后，我可以以`SYS`身份连接到 CDB 根容器：\n\n```\n$ sqlplus / as sysdba\nSQL> show con_name\n\
  CON_NAME\n\nCDB$ROOT\n```\n\n作为`SYS`，如果我想切换容器到可插拔数据库，可以按如下方式操作：\n\n```\nSQL> alter\
  \ session set container=PDB1;\n```\n\n要以`SYSTEM`、`EODA`和/或`SCOTT`的身份连接到可插拔数据库，我将使用可插拔数据库的默认服务进行连接，例如：\n\
  \n```\n$ sqlplus eoda/foo@PDB1\nSQL> show con_name\nCON_NAME\n\nPDB1\n```\n\n作为参考，我笔记本电脑上的`tnsnames.ora`文件内容如下：\n\
  \n```\nCDB =\n(DESCRIPTION =\n(ADDRESS = (PROTOCOL = TCP)(HOST = localhost)(PORT\
  \ = 1521))\n(CONNECT_DATA =\n(SERVER = DEDICATED)\n(SERVICE_NAME = CDB)\n)\n)\n\
  PDB1 =\n(DESCRIPTION =\n(ADDRESS = (PROTOCOL = TCP)(HOST = localhost)(PORT = 1521))\n\
  (CONNECT_DATA =\n(SERVER = DEDICATED)\n(SERVICE_NAME = PDB1)\n)\n)\nPDB2 =\n(DESCRIPTION\
  \ =\n(ADDRESS = (PROTOCOL = TCP)(HOST = localhost)(PORT = 1521))\n(CONNECT_DATA\
  \ =\n(SERVER = DEDICATED)\n(SERVICE_NAME = PDB2)\n)\n)\n```\n\n如果你无法访问容器/可插拔数据库来运行示例，请不要担心。如果你使用的不是多租户数据库，那么代码示例中的所有连接都将直接连接到数据库本身（因为在较早的单租户\
  \ Oracle 数据库架构中没有可插拔数据库的概念）。\n\n> **提示**：Oracle 数据库架构类型，如单租户和多租户，在第[2]章中解释。\n\n\
  ### 本书中的数据库用户\n\n本书中的所有概念都通过实践示例来解释。为了执行这些示例，我使用笔记本电脑上的 Oracle 数据库。根据示例的不同，我将在数据库中使用以下四个用户之一：\n\
  - `SYS`：这是一个 Oracle 创建的用户，拥有所有数据库权限。我将使用它来启动/停止数据库、添加表空间、修改初始化参数等。\n- `SYSTEM`：这是一个\
  \ Oracle 创建的用户，拥有提升的数据库权限。我将使用它来创建用户、授予权限等。\n- `EODA`：这是我创建的一个用户，被授予了各种特殊的数据库权限。这些权限是演示各种概念所必需的。\n\
  - `SCOTT`：这是我使用 Oracle 提供的脚本创建的一个用户。历史上，这个用户一直用于解释简单的数据库概念，并且是`EMP`和`DEPT`表的所有者。\n\
  \n#### 设置 EODA 模式\n\n`EODA`用户用于本书中的大多数示例。这只是一个被授予了 DBA 角色，并被授予了对`SYS`拥有的某些对象的执行和选择权限的模式。此示例假设你使用的是包含一个可插拔数据库的容器数据库。我在本书中使用的可插拔数据库名为`PDB1`。在以下代码中，你需要指定你正在使用的可插拔数据库的名称：\n\
  \n```\n-- Script name: creeoda.sql\n-- Define the PDB you want to connect to in\
  \ your database.\n-- If you’re using a non-container database, then leave the PDB\
  \ variable blank.\n-- But you really should be using a container database going\
  \ forward.\ndefine PDB=PDB1\nconnect / as sysdba\n-- Switch containers to the PDB\n\
  alter session set container=&&PDB;\ndefine username=eoda\ndefine usernamepwd=foo\n\
  create user &&username identified by &&usernamepwd;\ngrant dba to &&username;\n\
  grant execute on dbms_stats      to &&username;\ngrant select  on sys.V_$STATNAME\
  \ to &&username;\ngrant select  on sys.V_$MYSTAT   to &&username;\ngrant select\
  \  on sys.V_$LATCH    to &&username;\ngrant select  on sys.V_$TIMER    to &&username;\n\
  conn &&username/&&usernamepwd@&&PDB\nshow user\n```\n\n在前面的代码中，如果你没有使用容器/可插拔数据库，则无需将会话更改为容器。此外，如果不使用容器/可插拔数据库，则可以直接通过以下方式连接到你创建的用户：\n\
  \n```\nSQL> conn &&username/&&usernamepwd\n```\n\n> **注意**：你可以设置任何用户（模式）来运行本书中的示例。我选择用户名`EODA`仅仅因为它是书名首字母的缩写。\n\
  \n#### 设置 SCOTT/TIGER 模式\n\n`SCOTT/TIGER`模式有时可能已经存在于你的数据库中。这个模式经常用于展示基本示例，特别是当你需要几个具有主键和外键关系的表（`EMP`和`DEPT`表）时。使用`SCOTT`账户并没有什么特别之处。如果你愿意，可以将`EMP/DEPT`表直接安装到你自己的数据库账户中。\n\
  \n话虽如此，本书中的许多示例都使用了`SCOTT`模式中的表。如果你想能够跟着示例操作，你将需要这些表。如果你在一个共享数据库上工作，建议在`SCOTT`之外的某个账户中安装你自己的这些表副本，以避免其他用户修改相同数据所带来的副作用。\n\
  \n你可以使用以下脚本在可插拔数据库中创建`SCOTT`用户。你需要更改可插拔数据库名称和连接字符串以匹配你的环境（在此示例中，我的可插拔数据库名称是`PDB1`）：\n\
  \n\n\n```\n-- 脚本名称：crescott.sql\n-- 如果使用的是容器数据库，则需要在 PDB 中创建 SCOTT。\n-- 如果您使用的是非容器数据库，请将\
  \ PDB 留空。\n-- 用于创建 SCOTT 的相同代码也位于 $ORACLE_HOME/rdbms/admin/utlsampl.sql 中\n-- 将此项设置为您数据库中的\
  \ PDB。\ndefine PDB=PDB1\ndefine scott_pwd=tiger\nconn / as sysdba\nalter session\
  \ set container=&&PDB;\n-- 删除用户时请小心。请确保这是一个开发/测试环境。\ndrop user scott cascade;\n\
  create user scott identified by &&scott_pwd;\ngrant create session       to scott;\n\
  grant create table         to scott;\ngrant unlimited tablespace to scott;\ngrant\
  \ create procedure     to scott;\ngrant execute on dbms_lock to scott;\ngrant execute\
  \ on dbms_flashback to scott;\nconn scott/&&scott_pwd@&&PDB\nCREATE TABLE EMP\n\
  (EMPNO NUMBER(4) NOT NULL,\nENAME VARCHAR2(10),\nJOB VARCHAR2(9),\nMGR NUMBER(4),\n\
  HIREDATE DATE,\nSAL NUMBER(7, 2),\nCOMM NUMBER(7, 2),\nDEPTNO NUMBER(2)\n);\nINSERT\
  \ INTO EMP VALUES (7369, 'SMITH',  'CLERK',     7902,\nTO_DATE('1980-12-17', 'YYYY-MM-DD'),\
  \  800, NULL, 20);\nINSERT INTO EMP VALUES (7499, 'ALLEN',  'SALESMAN',  7698,\n\
  TO_DATE('1981-02-20', 'YYYY-MM-DD'), 1600,  300, 30);\nINSERT INTO EMP VALUES (7521,\
  \ 'WARD',   'SALESMAN',  7698,\nTO_DATE('1981-02-22', 'YYYY-MM-DD'), 1250,  500,\
  \ 30);\nINSERT INTO EMP VALUES (7566, 'JONES',  'MANAGER',   7839,\nTO_DATE('1981-04-02',\
  \ 'YYYY-MM-DD'),  2975, NULL, 20);\nINSERT INTO EMP VALUES (7654, 'MARTIN', 'SALESMAN',\
  \  7698,\nTO_DATE('1981-09-28', 'YYYY-MM-DD'), 1250, 1400, 30);\nINSERT INTO EMP\
  \ VALUES (7698, 'BLAKE',  'MANAGER',   7839,\nTO_DATE('1981-05-01', 'YYYY-MM-DD'),\
  \  2850, NULL, 30);\nINSERT INTO EMP VALUES (7782, 'CLARK',  'MANAGER',   7839,\n\
  TO_DATE('1981-06-09', 'YYYY-MM-DD'),  2450, NULL, 10);\nINSERT INTO EMP VALUES (7788,\
  \ 'SCOTT',  'ANALYST',   7566,\nTO_DATE('1982-12-09', 'YYYY-MM-DD'), 3000, NULL,\
  \ 20);\nINSERT INTO EMP VALUES (7839, 'KING',   'PRESIDENT', NULL,\nTO_DATE('1981-11-17',\
  \ 'YYYY-MM-DD'), 5000, NULL, 10);\nINSERT INTO EMP VALUES (7844, 'TURNER', 'SALESMAN',\
  \  7698,\nTO_DATE('1981-09-08', 'YYYY-MM-DD'),  1500,    0, 30);\nINSERT INTO EMP\
  \ VALUES (7876, 'ADAMS',  'CLERK',     7788,\nTO_DATE('1983-01-12', 'YYYY-MM-DD'),\
  \ 1100, NULL, 20);\nINSERT INTO EMP VALUES (7900, 'JAMES',  'CLERK',     7698,\n\
  TO_DATE('1981-12-03', 'YYYY-MM-DD'),   950, NULL, 30);\nINSERT INTO EMP VALUES (7902,\
  \ 'FORD',   'ANALYST',   7566,\nTO_DATE('1981-12-03', 'YYYY-MM-DD'),  3000, NULL,\
  \ 20);\nINSERT INTO EMP VALUES (7934, 'MILLER', 'CLERK',     7782,\nTO_DATE('1982-01-23',\
  \ 'YYYY-MM-DD'), 1300, NULL, 10);\nCREATE TABLE DEPT\n(DEPTNO NUMBER(2),\nDNAME\
  \ VARCHAR2(14),\nLOC VARCHAR2(13)\n);\nINSERT INTO DEPT VALUES (10, 'ACCOUNTING',\
  \ 'NEW YORK');\nINSERT INTO DEPT VALUES (20, 'RESEARCH',   'DALLAS');\nINSERT INTO\
  \ DEPT VALUES (30, 'SALES',      'CHICAGO');\nINSERT INTO DEPT VALUES (40, 'OPERATIONS',\
  \ 'BOSTON');\nCREATE TABLE BONUS\n(\nENAME VARCHAR2(10)      ,\nJOB VARCHAR2(9)\
  \  ,\nSAL NUMBER,\nCOMM NUMBER\n) ;\nCREATE TABLE SALGRADE\n( GRADE NUMBER,\nLOSAL\
  \ NUMBER,\nHISAL NUMBER );\nINSERT INTO SALGRADE VALUES (1,700,1200);\nINSERT INTO\
  \ SALGRADE VALUES (2,1201,1400);\nINSERT INTO SALGRADE VALUES (3,1401,2000);\nINSERT\
  \ INTO SALGRADE VALUES (4,2001,3000);\nINSERT INTO SALGRADE VALUES (5,3001,9999);\n\
  alter table emp add constraint emp_pk primary key(empno);\nalter table dept add\
  \ constraint dept_pk primary key(deptno);\nalter table emp add constraint emp_fk_dept\
  \ foreign key(deptno) references dept;\nalter table emp add constraint emp_fk_emp\
  \ foreign key(mgr) references emp;\n```\n\n运行上述代码后，您应该能够以 `SCOTT` 身份连接到您的可插拔数据库并描述表，例如：\n\
  \n```\n$ sqlplus scott/tiger@localhost:1521/PDB1\nSQL> desc dept\nName         \
  \                       Null?    Type\n----------------------------------- --------\
  \ ----------------------------\nDEPTNO                                       NOT\
  \ NULL NUMBER(2)\nDNAME                                        VARCHAR2(14)\nLOC\
  \                                          VARCHAR2(13)\n```\n\n本书中的许多示例都基于 `SCOTT`\
  \ 模式中的表。如果您希望能够同步操作，您将需要这些表。如果您正在共享数据库上工作，建议在您自己的某个账户（而不是 `SCOTT`）中安装这些表的副本，以避免其他用户操作相同数据而产生的副作用。\n\
  \n## 设置 Statspack\n\nStatspack 设计为在以 `SYS` (`CONNECT / AS SYSDBA`) 身份连接到根容器数据库时，或由被授予\
  \ `SYSDBA` 权限的用户安装。在许多安装中，安装 Statspack 将是您必须要求 DBA 或管理员执行的任务。\n\n安装 Statspack 很简单。您只需运行\
  \ `@spcreate.sql`。该脚本位于 `$ORACLE_HOME/rdbms/admin` 中，应通过 SQL*Plus 以 `SYS` 身份连接到根容器数据库时执行。在运行\
  \ `spcreate.sql` 脚本之前，您需要知道以下三条信息：\n\n*   您希望为将要创建的 `PERFSTAT` 模式使用的密码\n\n*   您希望为\
  \ `PERFSTAT` 使用的默认表空间\n\n*   您希望为 `PERFSTAT` 使用的临时表空间\n\n运行脚本的过程大致如下：\n\n```\n$\
  \ cd $ORACLE_HOME/rdbms/admin\n$ sqlplus / as sysdba\nSQL> @spcreate\n输入 perfstat_password\
  \ 的值:\n...  ...\n```\n\n脚本将在执行时提示您输入所需信息。如果您输入错误或不小心取消了安装，则应在尝试重新安装 Statspack 之前，使用位于\
  \ `$ORACLE_HOME/rdbms/admin` 中的 `spdrop.sql` 来删除用户和已安装的视图。Statspack 安装将创建一个名为 `spcpkg.lis`\
  \ 的文件。您应该查看此文件，了解可能发生的任何错误。只要您提供了有效的表空间名称（并且尚未存在用户 `PERFSTAT`），用户、视图和 PL/SQL 代码应该能干净利落地安装完成。\n\
  \n提示\n\nStatspack 的文档记录在以下文本文件中：`$ORACLE_HOME/rdbms/admin/spdoc.txt`。\n\n## 自定义脚本\n\
  \n在本节中，我将描述本书中使用的各种脚本所需的要求（如果有的话）。同时，我们也将探究这些脚本背后的代码。\n\n\n\n#### Runstats\n\nRunstats\
  \ 是我开发的一个工具，用于比较执行同一任务的两种不同方法，并展示哪种方法更优。你只需提供两种不同的方法，剩下的工作由 Runstats 完成。Runstats\
  \ 主要衡量三个关键指标：\n\n*   *墙上时钟时间或总耗时*：了解这一点很有用，但并非最重要的信息。\n*   *系统统计信息*：并列显示每种方法执行某项操作（例如解析调用）的次数以及两者之间的差异。\n\
  *   *闩锁活动*：这是本报告的核心输出。\n\n正如我们将在本书中看到的，闩锁是一种轻量级锁。锁是串行化设备。串行化设备会抑制并发性。抑制并发性的应用程序可扩展性较差，能支持的用户更少，并且需要更多资源。我们的目标始终是构建具有扩展潜力的应用程序——能够像服务\
  \ 1 个用户一样，轻松地服务 1000 或 10000 个用户。我们方法中产生的闩锁越少，情况就越好。我可能会选择一个在墙上时钟时间上运行更长，但只使用十分之一闩锁的方法。我知道，使用较少闩锁的方法比使用较多闩锁的方法具有显著更好的可扩展性。\n\
  \nRunstats 最好在隔离环境中使用，即在单用户数据库上。我们将测量由我们的方法产生的统计信息和闩锁（锁）活动。在此期间，我们不希望其他会话增加系统负载或产生闩锁活动。小型测试数据库非常适合这类测试。例如，我经常使用我的台式机或笔记本电脑。\n\
  \n注意\n\n我认为所有开发人员都应该拥有一个自己控制的测试数据库，用于尝试各种想法，而不必总是需要请求数据库管理员（DBA）做某些事情。开发人员绝对应该在自己的台式机上拥有一个数据库，因为个人开发人员版本的许可协议很简单——“用于开发和测试，不用于部署，你可以直接拥有它”。这样，没有任何损失！此外，我在会议和研讨会上做过一些非正式调查。几乎所有的\
  \ DBA 最初都是从开发人员开始的！开发人员通过拥有自己的数据库所获得的经验和培训——能够看到数据库的真实运作方式——从长远来看会带来丰厚的回报。\n\n要使用\
  \ Runstats，你需要设置对几个 V$视图的访问权限，创建一个用于保存统计信息的表，并创建 Runstats 包。创建 Runstats 包的代码包含在\
  \ `runstats.sql script` 中。你需要访问四个 V$表（那些神奇的动态性能表）：`V$STATNAME`、`V$MYSTAT`、`V$TIMER`\
  \ 和 `V$LATCH`。以下是我使用的一个视图：\n\n```\n$ sqlplus eoda/foo@PDB1\nSQL> create or replace\
  \ view stats\nas select 'STAT...' || a.name name, b.value\nfrom v$statname a, v$mystat\
  \ b\nwhere a.statistic# = b.statistic#\nunion all\nselect 'LATCH.' || name,  gets\n\
  from v$latch\nunion all\nselect 'STAT...Elapsed Time', hsecs from v$timer;\n```\n\
  \n注意\n\n你实际需要获得访问权限的对象名称将是 `V_$STATNAME`、`V_$MYSTAT` 等——也就是说，在授予权限时使用的对象名以 `V_$`\
  \ 开头，而不是 `V$`。`V$` 名称是指向底层视图（名称以 `V_$` 开头）的同义词。因此，`V$STATNAME` 是一个指向 `V_$STATNAME`（一个视图）的同义词。你需要被授予对该视图的访问权限。\n\
  \n你可以选择直接获得对 `V$STATNAME`、`V$MYSTAT`、`V$TIMER` 和 `V$LATCH` 的 `SELECT` 权限（这样你就可以自己创建视图），或者让拥有这些对象\
  \ `SELECT` 权限的人为你创建该视图，并授予你对该视图的 `SELECT` 权限。\n\n一旦完成上述设置，你只需要一个收集统计信息的小表：\n\n```\n\
  SQL> create global temporary table run_stats\n( runid varchar2(15),\nname varchar2(80),\n\
  value int )\non commit preserve rows;\n```\n\n最后，你需要创建 Runstats 包。它包含三个简单的 API 调用：\n\
  \n*   `RS_START`（Runstats 启动）在 Runstats 测试开始时调用\n*   `RS_MIDDLE` 如你所料，在中间调用\n* \
  \  `RS_STOP` 用于结束并打印报告\n\n包规范如下：\n\n```\nSQL> create or replace package runstats_pkg\n\
  as\nprocedure rs_start;\nprocedure rs_middle;\nprocedure rs_stop( p_difference_threshold\
  \ in number default 0 );\nend;\n/\nPackage created.\n```\n\n参数 `p_difference_threshold`\
  \ 用于控制最终打印的数据量。Runstats 收集每次运行（每种方法）的统计信息和闩锁信息，然后打印一份报告，显示每种测试使用了多少资源以及它们之间的差异。你可以使用这个输入参数，只查看差异大于该数值的统计信息和闩锁。默认情况下，该值为\
  \ 0，你会看到所有输出。\n\n接下来，我们将逐个过程查看包体。包体以一些全局变量开始，这些变量将用于记录我们每次运行的已用时间：\n\n```\nSQL>\
  \ create or replace package body runstats_pkg\nas\ng_start number;\ng_run1 number;\n\
  g_run2 number;\n```\n\n接下来是 `RS_START` 例程。它将简单地清空我们的统计信息保存表，然后用“之前”的统计信息和闩锁数据填充它。接着，它会捕获当前的计时器值（一种时钟），我们可以用它来计算以百分之一秒为单位的已用时间：\n\
  \n```\nprocedure rs_start\nis\nbegin\ndelete from run_stats;\ninsert into run_stats\n\
  select 'before', stats.* from stats;\ng_start := dbms_utility.get_cpu_time;\nend;\n\
  ```\n\n接下来是 `RS_MIDDLE` 例程。这个过程简单地将测试第一次运行的已用时间记录在 `G_RUN1` 中。然后，它插入当前的统计信息和闩锁集合。如果我们将这些值与之前在\
  \ `RS_START` 中保存的值相减，我们就能发现第一种方法使用了多少闩锁、多少游标（一个统计项）等等。\n\n最后，它记录下一次运行的开始时间：\n\n\
  ```\nprocedure rs_middle\nis\nbegin\ng_run1 := (dbms_utility.get_cpu_time-g_start);\n\
  insert into run_stats\nselect 'after 1', stats.* from stats;\ng_start := dbms_utility.get_cpu_time;\n\
  end;\n```\n\n这个包中的下一个也是最后一个例程是 `RS_STOP` 例程。它的任务是打印每次运行的聚合 CPU 时间，然后打印两次运行之间统计信息/闩锁值的差异（只打印超过阈值的部分）：\n\
  \n\n\n```plsql\nprocedure rs_stop(p_difference_threshold in number default 0)\n\
  is\nbegin\ng_run2 := (dbms_utility.get_cpu_time-g_start);\ndbms_output.put_line(\
  \ '运行 1 耗时 ' || g_run1 || ' CPU 百分秒' );\ndbms_output.put_line( '运行 2 耗时 ' || g_run2\
  \ || ' CPU 百分秒' );\nif ( g_run2 != 0 )\nthen\ndbms_output.put_line\n( '运行 1 耗时占运行\
  \ 2 的 ' || round(g_run1/g_run2*100,2) ||\n'%' );\nend if;\ndbms_output.put_line(\
  \ chr(9) );\ninsert into run_stats\nselect '运行后 2', stats.* from stats;\ndbms_output.put_line\n\
  ( rpad( '名称', 30 ) || lpad( '运行 1', 16 ) ||\nlpad( '运行 2', 16 ) || lpad( '差异', 16\
  \ ) );\nfor x in\n( select rpad( a.name, 30 ) ||\nto_char( b.value-a.value, '999,999,999,999'\
  \ ) ||\nto_char( c.value-b.value, '999,999,999,999' ) ||\nto_char( ( (c.value-b.value)-(b.value-a.value)),\n\
  '999,999,999,999' ) data\nfrom run_stats a, run_stats b, run_stats c\nwhere a.name\
  \ = b.name\nand b.name = c.name\nand a.runid = '运行前'\nand b.runid = '运行后 1'\nand\
  \ c.runid = '运行后 2'\nand abs( (c.value-b.value) - (b.value-a.value) )\n> p_difference_threshold\n\
  order by abs( (c.value-b.value)-(b.value-a.value))\n) loop\ndbms_output.put_line(\
  \ x.data );\nend loop;\ndbms_output.put_line( chr(9) );\ndbms_output.put_line\n\
  ( '运行 1 门锁总数与运行对比 -- 差异及百分比' );\ndbms_output.put_line\n( lpad( '运行 1', 14 ) || lpad(\
  \ '运行 2', 19 ) ||\nlpad( '差异', 18 ) || lpad( '百分比', 11 ) );\nfor x in\n( select\
  \ to_char( run1, '9,999,999,999,999' ) ||\nto_char( run2, '9,999,999,999,999' )\
  \ ||\nto_char( diff, '9,999,999,999,999' ) ||\nto_char( round( run1/decode( run2,\
  \ 0, to_number(0), run2) *100,2 ), '99,999.99' ) || '%' data\nfrom ( select sum(b.value-a.value)\
  \ run1, sum(c.value-b.value) run2,\nsum( (c.value-b.value)-(b.value-a.value)) diff\n\
  from run_stats a, run_stats b, run_stats c\nwhere a.name = b.name\nand b.name =\
  \ c.name\nand a.runid = '运行前'\nand b.runid = '运行后 1'\nand c.runid = '运行后 2'\nand\
  \ a.name like 'LATCH%'\n)\n) loop\ndbms_output.put_line( x.data );\nend loop;\n\
  end;\nend;\n/\n```\n包体已创建。\n\n现在你可以使用 `Runstats` 了。这里举个例子，演示如何使用 `Runstats` 来查看哪种方式更高效：是单个批量\
  \ `INSERT` 还是逐行处理。我们先创建两个表，将向每个表插入 1,000,000 行数据（`BIG_TABLE` 表的创建脚本在本节后面提供）：\n\n\
  ```sql\nSQL> create table t1 as select * from big_table  where 1=0;\n表已创建。\nSQL>\
  \ create table t2 as select * from big_table  where 1=0;\n表已创建。\n```\n\n现在我们准备执行第一种插入记录的方法，使用单个\
  \ SQL 语句。我们首先调用 `RUNSTATS_PKG.RS_START`：\n\n```sql\nSQL> exec runstats_pkg.rs_start;\n\
  PL/SQL 过程已成功完成。\nSQL> insert into t1\nselect *\nfrom big_table\nwhere rownum <=\
  \ 1000000;\n已创建 1000000 行。\nSQL> commit;\n提交完成。\n```\n\n现在我们准备执行第二种方法，逐行插入数据：\n\n\
  ```sql\nSQL> exec runstats_pkg.rs_middle;\nPL/SQL 过程已成功完成。\nSQL> begin\nfor x in\
  \ ( select *\nfrom big_table\nwhere rownum <= 1000000 )\nloop\ninsert into t2 values\
  \ X;\nend loop;\ncommit;\nend;\n/\nPL/SQL 过程已成功完成。\n```\n\n最后，我们生成报告：\n\n```sql\n\
  SQL> set serverout on;\nSQL> exec runstats_pkg.rs_stop(1000000)\n运行 1 耗时 186 CPU\
  \ 百分秒\n运行 2 耗时 2209 CPU 百分秒\n运行 1 耗时占运行 2 的 8.42%\n名称                          \
  \            运行 1            运行 2            差异\nSTAT...获取快照的调用次数              \
  \   122       1,000,126       1,000,004\nSTAT...执行次数                           23\
  \       1,000,029       1,000,006\nSTAT...会话游标缓存命中                   12       1,000,023\
  \       1,000,011\nSTAT...打开游标累计次数                   23       1,000,035       1,000,012\n\
  STAT...从缓存获取的数据库块         113,703       1,115,364       1,001,661\nSTAT...从缓存获取的数据库块\
  \         130,907       1,140,704       1,009,797\nSTAT...数据库块获取               \
  \    130,907       1,140,704       1,009,797\nSTAT...递归调用次数                    \
  \ 180       1,010,311       1,010,131\nSTAT...会话逻辑读               155,498      \
  \ 1,178,758       1,023,260\nSTAT...数据库块更改数              122,869       2,094,734\
  \       1,971,865\nSTAT...文件 IO 等待时间             181,916       4,047,635       3,865,719\n\
  STAT...会话 PGA 内存最大值                0       3,866,624       3,866,624\nLATCH.cache\
  \ 缓冲区链             507,687       5,645,160       5,137,473\nSTAT...物理写总量字节     \
  \          0      21,684,224      21,684,224\nSTAT...UNDO 变更向量大小       4,079,104\
  \      67,922,592      63,843,488\nSTAT...物理读取字节数         276,627,456     343,220,224\
  \      66,592,768\nSTAT...物理读取总字节数     276,627,456     344,940,544      68,313,088\n\
  STAT...KFB 分配空间（块数）     147,456,000     217,055,232      69,599,232\nSTAT...单元物理\
  \ IO 交互       276,627,456     366,624,768      89,997,312\nSTAT...重做日志大小       \
  \            135,092,608     412,189,272     277,096,664\nSTAT...从缓存逻辑读取字节数   1,139,335,168\
  \   9,441,386,496   8,302,051,328\n运行 1 门锁总数与运行对比 -- 差异及百分比\n运行 1            运行\
  \ 2              差异          百分比\n628,686         6,099,913         5,471,227  \
  \   10.31%\nPL/SQL 过程已成功完成。\n```\n\n这证实了你已经安装了 `RUNSTATS_PKG` 包，并向你展示了为什么在开发应用程序时，只要可能就应该使用单个\
  \ SQL 语句，而不是一大堆过程式代码！\n\n#### Mystat\n\n`mystat.sql` 及其配套脚本 `mystat2.sql` 用于显示某个\
  \ Oracle “统计信息”在某个操作前后的增长情况。`mystat.sql` 脚本捕获某个统计信息的起始值：\n\n```sql\n$ sqlplus eoda/foo@PDB1\n\
  set echo off\nset verify off\ncolumn value new_val V\ndefine S=\"&1\"\nset autotrace\
  \ off\nselect a.name, b.value\nfrom v$statname a, v$mystat b\nwhere a.statistic#\
  \ = b.statistic#\nand lower(a.name) = lower('&S');\nset echo on\n```\n\n而 `mystat2.sql`\
  \ 报告差值（`&V` 由运行第一个脚本 `mystat.sql` 填充——它使用了 SQL*Plus 的 `NEW_VAL` 特性。它包含前一个查询中最后选择的\
  \ `VALUE`）：\n\n```sql\nset echo off\nset verify off\nselect a.name, b.value V, to_char(b.value-&V,'999,999,999,999')\
  \ diff\nfrom v$statname a, v$mystat b\nwhere a.statistic# = b.statistic#\nand lower(a.name)\
  \ = lower('&S');\nset echo on\n```\n\n例如，要查看一个 `UPDATE` 语句生成了多少重做日志，我们可以这样做：\n\n\
  ```sql\nSQL> @mystat \"redo size\"\nSQL> set echo off\n名称                      \
  \     值\n------------------------------ ---------\nredo size                   \
  \   491167892\nSQL> update big_table set owner = lower(owner) where rownum <= 1000;\n\
  已更新 1000 行。\nSQL> commit;\n提交完成。\nSQL> @mystat2\nSQL> set echo off\n名称         \
  \                  V           差异\n------------------------------ ----------- ----------------\n\
  redo size                      491265640   97,748\n```\n\n这显示我们对 1000 行数据的 `UPDATE`\
  \ 操作生成了 97,748 字节的重做日志。\n\n\n\n#### 显示空间\n\n`SHOW_SPACE`过程用于打印数据库段的空间利用详细信息。创建`SHOW_SPACE`过程的代码包含在`show_space.sql`脚本中。其接口如下：\n\
  \n```\n$ sqlplus eoda/foo@PDB1\nSQL> @show_space.sql\nProcedure created.\nSQL> desc\
  \ show_space\nPROCEDURE show_space\n Argument Name                  Type       \
  \             In/Out Default?\n ------------------------------ -----------------------\
  \ ------ --------\n P_SEGNAME                      VARCHAR2                IN\n\
  \ P_OWNER                        VARCHAR2                IN     DEFAULT\n P_TYPE\
  \                         VARCHAR2                IN     DEFAULT\n P_PARTITION \
  \                   VARCHAR2                IN     DEFAULT\n```\n\n参数说明如下：\n\n*\
  \   `P_SEGNAME`：段的名称，例如表名或索引名。\n*   `P_OWNER`：默认为当前用户，但你可以使用此过程查看其他模式。\n*   `P_TYPE`：默认为`TABLE`，表示你正在查看的对象类型。例如，`select\
  \ distinct segment_type from dba_segments`列出了有效的段类型。\n*   `P_PARTITION`：当显示分区对象的空间时，指定分区的名称。`SHOW_SPACE`一次只显示一个分区的空间。\n\
  \n当段位于自动段空间管理（ASSM）表空间中时，此过程的输出如下所示：\n\n```\nSQL> set serverout on;\nSQL> exec show_space('BIG_TABLE');\n\
  Unformatted Blocks .....................               0\nFS1 Blocks (0-25)  .....................\
  \               0\nFS2 Blocks (25-50) .....................               0\nFS3\
  \ Blocks (50-75) .....................               0\nFS4 Blocks (75-100).....................\
  \               0\nFull Blocks        .....................          14,469\nTotal\
  \ Blocks............................          15,360\nTotal Bytes.............................\
  \     125,829,120\nTotal MBytes............................             120\nUnused\
  \ Blocks...........................             728\nUnused Bytes............................\
  \       5,963,776\nLast Used Ext FileId....................               4\nLast\
  \ Used Ext BlockId...................          43,145\nLast Used Block.........................\
  \             296\nPL/SQL procedure successfully completed.\n```\n\n报告的项目说明如下：\n\
  \n*   `Unformatted Blocks`：已分配给表（在高水位线以下）但未使用的块数。在 ASSM 对象中，将未格式化和未使用的块相加，即可得到分配给表但从未用于保存数据的块总数。\n\
  *   `FS1 Blocks`–`FS4 Blocks`：已格式化并包含数据的块。其名称后的数字范围表示每个块的空置程度。例如，(0-25)表示空置率在 0\
  \ 到 25%之间的块的数量。\n*   `Full Blocks`：已满到不再作为未来插入候选的块的数量。\n*   `Total Blocks`, `Total\
  \ Bytes`, `Total Mbytes`：分配给该段的总空间，以数据库块、字节和兆字节为单位进行度量。\n*   `Unused Blocks`, `Unused\
  \ Bytes`：表示从未使用过的空间部分。这些是已分配给该段，但当前位于该段高水位线之上的块。\n*   `Last Used Ext FileId`：包含最后一个有数据的区的文件\
  \ ID。\n*   `Last Used Ext BlockId`：最后一个区的起始块 ID；即在最后使用的文件中的块 ID。\n*   `Last Used\
  \ Block`：最后一个区中最后使用的块的块 ID 偏移量。\n\n供参考，`SHOW_SPACE`的带注释代码如下。这个实用程序是数据库中`DBMS_SPACE`\
  \ API 之上的一个简单封装层：\n\n```\ncreate or replace procedure show_space\n( p_segname in\
  \ varchar2,\n  p_owner   in varchar2 default user,\n  p_type    in varchar2 default\
  \ 'TABLE',\n  p_partition in varchar2 default NULL )\n-- this procedure uses authid\
  \ current user so it can query DBA_*\n-- views using privileges from a ROLE and\
  \ so it can be installed\n-- once per database, instead of once per user that wants\
  \ to use it\nauthid current_user\nas\n    l_free_blks                 number;\n\
  \    l_total_blocks              number;\n    l_total_bytes               number;\n\
  \    l_unused_blocks             number;\n    l_unused_bytes              number;\n\
  \    l_LastUsedExtFileId         number;\n    l_LastUsedExtBlockId        number;\n\
  \    l_LAST_USED_BLOCK           number;\n    l_segment_space_mgmt        varchar2(255);\n\
  \    l_unformatted_blocks number;\n    l_unformatted_bytes number;\n    l_fs1_blocks\
  \ number; l_fs1_bytes number;\n    l_fs2_blocks number; l_fs2_bytes number;\n  \
  \  l_fs3_blocks number; l_fs3_bytes number;\n    l_fs4_blocks number; l_fs4_bytes\
  \ number;\n    l_full_blocks number; l_full_bytes number;\n    -- inline procedure\
  \ to print out numbers nicely formatted\n    -- with a simple label\n    procedure\
  \ p( p_label in varchar2, p_num in number )\n    is\n    begin\n        dbms_output.put_line(\
  \ rpad(p_label,40,'.') ||\n                              to_char(p_num,'999,999,999,999')\
  \ );\n    end;\nbegin\n    -- this query is executed dynamically in order to allow\
  \ this procedure\n    -- to be created by a user who has access to DBA_SEGMENTS/TABLESPACES\n\
  \    -- via a role as is customary.\n    -- NOTE: at runtime, the invoker MUST have\
  \ access to these two\n    -- views!\n    -- this query determines if the object\
  \ is an ASSM object or not\n    begin\n        execute immediate\n          'select\
  \ ts.segment_space_management\n           from dba_segments seg, dba_tablespaces\
  \ ts\n           where seg.segment_name      = :p_segname\n           and (:p_partition\
  \ is null or\n                seg.partition_name = :p_partition)\n           and\
  \ seg.owner = :p_owner\n           and seg.tablespace_name = ts.tablespace_name'\n\
  \          into l_segment_space_mgmt\n          using p_segname, p_partition, p_partition,\
  \ p_owner;\n    exception\n        when too_many_rows then\n            dbms_output.put_line\n\
  \                ( 'This must be a partitioned table, use p_partition => ');\n \
  \           return;\n    end;\n    -- if the object is in an ASSM tablespace, we\
  \ must use this API\n    -- call to get space information, else we use the FREE_BLOCKS\n\
  \    -- API for the user managed segments\n    if l_segment_space_mgmt = 'AUTO'\n\
  \    then\n        dbms_space.space_usage\n          ( p_owner, p_segname, p_type,\
  \ l_unformatted_blocks,\n            l_unformatted_bytes, l_fs1_blocks, l_fs1_bytes,\n\
  \            l_fs2_blocks, l_fs2_bytes, l_fs3_blocks, l_fs3_bytes,\n           \
  \ l_fs4_blocks, l_fs4_bytes, l_full_blocks, l_full_bytes, p_partition);\n      \
  \  p( 'Unformatted Blocks ', l_unformatted_blocks );\n        p( 'FS1 Blocks (0-25)\
  \  ', l_fs1_blocks );\n        p( 'FS2 Blocks (25-50) ', l_fs2_blocks );\n     \
  \   p( 'FS3 Blocks (50-75) ', l_fs3_blocks );\n        p( 'FS4 Blocks (75-100)',\
  \ l_fs4_blocks );\n        p( 'Full Blocks        ', l_full_blocks );\n    else\n\
  \        dbms_space.free_blocks(\n            segment_owner     => p_owner,\n  \
  \          segment_name      => p_segname,\n            segment_type      => p_type,\n\
  \            freelist_group_id => 0,\n            free_blks         => l_free_blks);\n\
  \        p( 'Free Blocks', l_free_blks );\n    end if;\n    -- and then the unused\
  \ space API call to get the rest of the\n    -- information\n    dbms_space.unused_space(\n\
  \        segment_owner     => p_owner,\n        segment_name      => p_segname,\n\
  \        segment_type      => p_type,\n        partition_name    => p_partition,\n\
  \        total_blocks      => l_total_blocks,\n        total_bytes       => l_total_bytes,\n\
  \        unused_blocks     => l_unused_blocks,\n        unused_bytes      => l_unused_bytes,\n\
  \        LAST_USED_EXTENT_FILE_ID => l_LastUsedExtFileId,\n        LAST_USED_EXTENT_BLOCK_ID\
  \ => l_LastUsedExtBlockId,\n        LAST_USED_BLOCK => l_LAST_USED_BLOCK );\n  \
  \  p( 'Total Blocks', l_total_blocks );\n    p( 'Total Bytes', l_total_bytes );\n\
  \    p( 'Total MBytes', trunc(l_total_bytes/1024/1024) );\n    p( 'Unused Blocks',\
  \ l_unused_blocks );\n    p( 'Unused Bytes', l_unused_bytes );\n    p( 'Last Used\
  \ Ext FileId', l_LastUsedExtFileId );\n    p( 'Last Used Ext BlockId', l_LastUsedExtBlockId\
  \ );\n    p( 'Last Used Block', l_LAST_USED_BLOCK );\nend;\n/\n```\n\n\n\n#### 大表\n\
  \n在本书的所有示例中，我使用了一个名为 `BIG_TABLE` 的表。创建该表的代码包含在 `big_table.sql` 脚本中。根据我所使用的系统，该表包含一条到四百万条记录不等，大小从\
  \ 200MB 到 800MB 不等。在所有情况下，表的结构都是相同的。\n\n要创建 `BIG_TABLE`，我编写了一个脚本，该脚本执行以下操作：\n* \
  \  基于 `ALL_OBJECTS` 创建一个空表。这个数据字典视图用于填充 `BIG_TABLE`。\n*   将该表设置为 `NOLOGGING`。这是可选的。我这样做是为了提高性能。对测试表使用\
  \ `NOLOGGING` 模式是安全的；你不会在生产系统中使用它，因此像 Oracle Data Guard 这样的特性不会被启用。\n*   通过用 `ALL_OBJECTS`\
  \ 的内容填充表，然后反复向自身插入数据来填充表，每次迭代大约使表的大小翻倍。\n*   在表上创建一个主键约束。\n*   收集统计信息。\n\n要构建 `BIG_TABLE`\
  \ 表，你可以在 SQL*Plus 提示符下运行以下脚本，并传入你希望表中包含的行数。当达到该行数时，脚本将停止运行。\n\n```\n$ sqlplus eoda/foo@PDB1\n\
  create table big_table\nas\nselect rownum id, OWNER, OBJECT_NAME, SUBOBJECT_NAME,\
  \ OBJECT_ID,\nDATA_OBJECT_ID, OBJECT_TYPE, CREATED, LAST_DDL_TIME, TIMESTAMP,\n\
  STATUS, TEMPORARY, GENERATED, SECONDARY, NAMESPACE, EDITION_NAME\nfrom all_objects\n\
  where 1=0\n/\nalter table big_table nologging;\ndeclare\nl_cnt number;\nl_rows number\
  \ := &numrows;\nbegin\ninsert /*+ append */\ninto big_table\nselect rownum id, OWNER,\
  \ OBJECT_NAME, SUBOBJECT_NAME, OBJECT_ID,\nDATA_OBJECT_ID, OBJECT_TYPE, CREATED,\
  \ LAST_DDL_TIME, TIMESTAMP,\nSTATUS, TEMPORARY, GENERATED, SECONDARY, NAMESPACE,\
  \ EDITION_NAME\nfrom all_objects\nwhere rownum <= l_rows;\nl_cnt := sql%rowcount;\n\
  \nwhile (l_cnt < l_rows)\nloop\n    insert /*+ append */\n    into big_table\n \
  \   select rownum + l_cnt id, OWNER, OBJECT_NAME, SUBOBJECT_NAME, OBJECT_ID,\n \
  \   DATA_OBJECT_ID, OBJECT_TYPE, CREATED, LAST_DDL_TIME, TIMESTAMP,\n    STATUS,\
  \ TEMPORARY, GENERATED, SECONDARY, NAMESPACE, EDITION_NAME\n    from big_table\n\
  \    where rownum <= (l_rows-l_cnt);\n    l_cnt := l_cnt + sql%rowcount;\nend loop;\n\
  end;\n/\n\nalter table big_table add constraint big_table_pk primary key(id);\n\n\
  exec dbms_stats.gather_table_stats( user, 'BIG_TABLE', cascade=>true );\n```\n\n\
  我预估了表的基线统计信息。与主键关联的索引在创建时会自动计算统计信息。\n\n## 编码约定\n\n我在本书中使用的一个值得注意的编码约定是我在 PL/SQL\
  \ 代码中如何命名变量。例如，考虑这样一个包体：\n\n```\ncreate or replace package body my_pkg\nas\ng_variable\
  \ varchar2(25);\nprocedure p( p_variable in varchar2 )\nis\nl_variable varchar2(25);\n\
  begin\nnull;\nend;\nend;\n/\n```\n\n这里，我有三个变量：一个全局包变量 `G_VARIABLE`；过程的一个形式参数 `P_VARIABLE`；以及一个局部变量\
  \ `L_VARIABLE`。我根据变量所在的作用域来命名它们。所有全局变量以 `G_` 开头，参数以 `P_` 开头，局部变量以 `L_` 开头。这样做的主要原因是区分\
  \ PL/SQL 变量和数据库表中的列。例如，下面这样的过程总是会打印出 `EMP` 表中 `ENAME` 不为空的每一行：\n\n```\ncreate procedure\
  \ p( ENAME in varchar2 )\nas\nbegin\nfor x in ( select * from emp where ename =\
  \ ENAME ) loop\nDbms_output.put_line( x.empno );\nend loop;\nend;\n```\n\nSQL 会看到\
  \ `ename = ENAME`，并比较 `ENAME` 列与其自身（当然）。我们可以使用 `ename = P.ENAME`，即用过程名限定对 PL/SQL\
  \ 变量的引用，但这太容易忘记，会导致错误。\n\n我只是始终根据作用域来命名我的变量。这样，除了消除列名和变量名之间的任何歧义外，我还可以轻松地区分参数、局部变量和全局变量。\n\
