  \ | --- |\n| 系统，表，t5 | 系统，表，t6 | 系统，表，t7 | 系统，表，t8 |\n| … | … | … | … |\n| 系统，表，t100\
  \ | 系统，表，t101 | 系统，表，t102 | 系统，表，t103 |\n\n也就是说，值 `SYS` 和 `TABLE` 只出现一次，然后存储第三列。通过这种方式，我们可以从每个索引块中获得比原本多得多的条目。这并不会降低并发性（在所有情况下我们仍然在行级别操作）或任何功能性。它*可能*会使用稍多的\
  \ CPU 算力，因为 Oracle 需要做更多的工作来重新组合键。另一方面，它可能显著减少 I/O，并允许更多数据缓存在缓冲区缓存中，因为每个块能容纳更多数据。这是一个相当不错的权衡。\n\
