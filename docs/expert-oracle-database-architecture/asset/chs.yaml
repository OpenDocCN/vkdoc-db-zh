  如您所见，在 SGA 为 1.5GB 时，我的池将使用 16MB 的粒度进行分配，因此任何给定的池大小都将是 16MB 的某个倍数。考虑到这一点，让我们依次查看每个主要的
  SGA 组件。


  ### 固定 SGA


  `固定 SGA` 是 SGA 的一个组件，其大小因平台和版本而异。它在安装时被“编译”到 Oracle 二进制文件本身中（因此得名“固定”）。固定 SGA 包含一组指向
  SGA 其他组件的变量，以及包含各种参数值的变量。固定 SGA 的大小是我们无法控制的，而且通常非常小。可以将此区域视为 SGA 的“引导”部分——Oracle
  在内部用来查找 SGA 其他组成部分的东西。



  ### 重做缓冲区


  `redo buffer`是需要写入在线重做日志的数据在写入磁盘前的临时缓存区域。由于内存到内存的传输比内存到磁盘的传输快得多，使用重做日志缓冲区可以加速数据库操作。数据在重做缓冲区中停留的时间通常不长。实际上，`LGWR`会在以下情况之一发起将此区域刷新到磁盘的操作：


  *   每三秒一次

  *   每当发出`COMMIT`或`ROLLBACK`命令时

  *   当`LGWR`被要求切换日志文件时

  *   当重做缓冲区填满三分之一或包含 1MB 的缓存重做日志数据时


  Oracle 建议将重做日志缓冲区大小设置为至少 8MB。如果您正在使用闪回功能且 SGA 大于 4GB，则 Oracle 建议将日志缓冲区设置为至少 64MB。如果您正在使用带有异步重做传输的数据卫士且重做生成率很高，则
  Oracle 建议将其设置为至少 256MB。


  拥有大量并发事务的大型系统可能会从一个较大的重做日志缓冲区中获得一定好处，因为当`LGWR`（负责将重做日志缓冲区刷新到磁盘的进程）正在写入日志缓冲区的一部分时，其他会话可能正在填充它。通常，生成大量重做数据的长时间运行事务将从比正常情况更大的日志缓冲区中受益最多，因为它会持续填充部分重做日志缓冲区，而`LGWR`正忙于写出其中一部分（我们将在第
  9 章详细讨论写入未提交数据的现象）。事务越大、越长，它可能从一个慷慨的日志缓冲区中获得的益处就越多。


  重做缓冲区的默认大小由`LOG_BUFFER`参数控制，因操作系统、数据库版本和其他参数设置而异。与其尝试解释最常见的默认大小是什么（实际上没有所谓的“最常见”），我会请您参考您的
  Oracle 版本文档（*Oracle Database Reference*指南）。我的默认`LOG_BUFFER`——基于我们之前启动的拥有 1.5GB SGA
  的实例——由以下查询显示：


  ```

  SQL> select value, isdefault from v$parameter where name = ''log_buffer'';

  VALUE                ISDEFAULT

  -------------------- ---------

  7036928              TRUE

  ```


  这个大小约为 7MB。默认日志缓冲区的最小大小取决于操作系统。如果您想找出这个最小值，只需将您的`LOG_BUFFER`设置为 1 字节并重启数据库即可。例如，在我的
  Oracle Linux 实例上，我看到以下结果：


  ```

  SQL> alter system set log_buffer=1 scope=spfile;

  SQL> startup force;

  SQL> show parameter log_buffer

  NAME                                 TYPE        VALUE

  ------------------------------------ ----------- --------------------------

  log_buffer                           integer     1680K

  ```


  在这个系统上，无论我的设置如何，我能拥有的最小日志缓冲区都是 1.680MB。


  > **注意**

  >

  > 对于大多数数据库应用，`LOG_BUFFER`参数的默认值是足够的。如果您看到大量与`log buffer space`事件相关的等待，那么请考虑增加`LOG_BUFFER`参数。


  ### 数据库块缓冲区缓存


  到目前为止，我们已经了解了 SGA 中相对较小的组件。现在我们要看一个潜在巨大的组件。块缓冲区缓存是 Oracle 在将数据库块写入磁盘前以及从磁盘读入后存储它们的地方。这对我们来说是
  SGA 的一个关键区域。设置太小，我们的查询将运行得非常慢。设置太大，我们会使其他进程资源匮乏（例如，没有为专用服务器创建其 PGA 留出足够的空间，甚至可能无法启动）。


  我们在 SGA 中有三个地方可以存储来自单个段的缓存块：


  *   `Default pool`：通常是所有段块被缓存的位置。这是最初的——并且在以前是唯一的——缓冲池。

  *   `Keep pool`：一个备用缓冲池，按照约定，您将那些访问相当频繁，但由于其他段需要空间而仍会从默认缓冲池中老化出去的段分配到此处。

  *   `Recycle pool`：一个备用缓冲池，按照约定，您将那些访问非常随机、从而会导致许多段的许多块被大量刷新的大型段分配到此处。缓存这些段没有好处，因为当您再次需要该块时，它可能已经从缓存中老化出去了。您将这些段与默认池和保留池中的段分开，以便它们不会导致那些块老化出缓存。


  请注意，在保留池和回收池的描述中，我使用了“按照约定”这个短语。没有任何机制能确保您按照描述的方式使用保留池或回收池。事实上，这三个池以几乎相同的方式管理块；它们的块老化或缓存算法并没有根本性的不同。这里的目标是让
  DBA 能够将段隔离到热、温以及“不关心缓存”的区域。理论是默认池中的对象本身就足够热（即使用足够频繁），可以保证它们自己留在缓存中。缓存会将它们保留在内存中，因为它们是非常受欢迎的块。如果您有一些相当受欢迎但不是特别热的段，这些被认为是温块。这些段的块可能会被从缓存中刷新，以便为您不频繁使用的块（“不关心缓存”的块）腾出空间。为了保持这些温段的块被缓存，您可以执行以下操作之一：


  *   将这些段分配到保留池，试图让温块在缓冲区缓存中停留更长时间。

  *   将“不关心缓存”的段分配到回收池，并保持回收池相当小，以使块能快速进入和离开缓存（减少管理它们的开销）。


  必须执行这两项操作之一，增加了 DBA 需要执行的管理工作，因为现在有三个缓存需要考虑、调整大小和分配对象。还要记住，它们之间不共享空间，所以如果保留池有大量未使用的空间，它不会将其给予超负荷工作的默认池或回收池。总而言之，这些池通常被认为是一种非常精细的低级调优工具，只有在考虑了大多数其他调优方案之后才使用（如果我能通过重写查询来减少十分之一的
  I/O，而不是设置多个缓冲池，那将是我的选择）。


  除了默认池、保留池和回收池之外，还有最多四个可选缓存`DB_nK_CACHE_SIZE`需要考虑。这些缓存是为了支持数据库中的多个块大小而添加的。数据库可以有一个默认块大小（存储在默认池、保留池或回收池中的块的大小），以及最多四个非默认块大小，如第
  3 章所述。


  这些缓冲区缓存中的块的管理方式与原始默认池中的块相同——它们也没有特殊的算法更改。现在让我们继续看看这些池中的块是如何管理的。



  ## 在缓冲区缓存中管理块


  为简单起见，假设只有一个默认池。由于其他池的管理方式相同，我们只需讨论其中一个。缓冲区缓存中的块基本上在同一个位置管理，由两个不同的列表指向它们：


  *   脏块列表，这些块需要由数据库块写入器（`DBWn`；我们稍后会看一下这个进程）写入磁盘

  *   非脏块列表


  最初，非脏块列表曾经是一个最近最少使用（LRU）列表。块按照使用顺序排列。在后续版本的 Oracle 中，算法稍有修改。Oracle 不再维护某种物理顺序的块列表，而是采用了一种接触计数算法，当你在缓存中访问一个块时，会有效地增加与该块关联的计数器。这个计数器并非每次访问块时都会增加，但如果你持续访问它，大约每三秒会增加一次。你可以在一组真正神奇的表中看到这个算法在工作：即
  `X$` 表。`X$` 表完全未经 Oracle 文档化，但关于它们的信息不时会泄露出来。


  > **注意：** 在以下示例中，我使用具有 SYSDBA 权限的用户连接，因为默认情况下只有该帐户才能看到 `X$` 表。在实际操作中，你不应该使用具有 SYSDBA
  权限的帐户来运行查询。需要查询关于缓冲区缓存中块的信息是这条规则的一个罕见例外。


  `X$BH` 表显示了块缓冲区缓存中块的信息（它比有文档记载的 `V$BH` 视图提供更多信息）。在这里，我们可以看到当我们访问块时，接触计数是如何增加的。我们可以对该视图运行以下查询，以找到五个"当前最热的块"，并将该信息与
  `DBA_OBJECTS` 视图连接，以查看它们属于哪些段。该查询按 `TCH`（接触计数）列对 `X$BH` 中的行进行排序并保留前五个。然后，我们通过 `X$BH.OBJ`
  到 `DBA_OBJECTS.DATA_OBJECT_ID` 将 `X$BH` 信息与 `DBA_OBJECTS` 连接起来：


  ```sql

  $ sqlplus / as sysdba

  SQL> select tch, file#, dbablk,

  case when obj = 4294967295

  then ''rbs/compat segment''

  else (select max( ''(''||object_type||'') '' ||

  owner || ''.'' || object_name  ) ||

  decode( count(*), 1, '''', '' maybe!'' )

  from dba_objects

  where data_object_id = X.OBJ )

  end what

  from (

  select tch, file#, dbablk, obj

  from x$bh

  where state  0

  order by tch desc

  ) x

  where rownum <= 5;

  TCH      FILE#     DBABLK WHAT

  ---------- ---------- ---------- ------------------------------

  60          3      11653 (TABLE) SYS.WRM$_WR_CONTROL

  59          9        321 (INDEX) SYS.I_UNDO1

  59          1        321 (INDEX) SYS.I_UNDO1

  58          3       3011 (INDEX) SYS.I_ILMOBJ$

  58         10      38803 (INDEX) SYS.I_ILMOBJ_POL$

  ```


  > **注意：** `CASE` 语句中引用的 (2³² - 1) 或 4,294,967,295 是一个魔术数字，用于表示"特殊"块。如果你想了解该情况下底层块与什么关联，可以使用查询
  `select * from dba_extents where file_id = <FILE#> and block_id <= <DBABLK> and
  block_id+blocks-1 >= <DBABLK>`。


  你可能会问前面标量子查询中的"maybe!"和 `MAX()` 的使用是什么意思。这是由于 `DATA_OBJECT_ID` 在 `DBA_OBJECTS` 视图中并非"主键"，这可以从以下得到证明：


  ```sql

  SQL> select data_object_id, count(*)

  from dba_objects

  where data_object_id is not null

  group by data_object_id

  having count(*) > 1;

  DATA_OBJECT_ID   COUNT(*)

  -------------- ----------

  337          2

  6          3

  29          3

  620          7

  2         18

  781          3

  8          3

  750          3

  64          2

  10          3

  10 rows selected.

  ```


  这是由于簇（在第 10 章讨论）可能包含多个表。因此，当从 `X$BH` 连接到 `DBA_OBJECTS` 以打印段名时，从技术上讲，我们必须列出簇中所有对象的所有名称，因为一个数据库块并不总是属于单个表。


  我们甚至可以观察 Oracle 在我们反复查询某个块时增加其接触计数。在这个例子中，我们将使用神奇的表 `DUAL`——我们知道它是一个单行单列的表。所以每次我们运行以下查询时，都应该会命中真正的
  `DUAL` 表（因为我们显式引用了 `DUMMY` 列）：


  ```sql

  SQL> select tch, file#, dbablk, DUMMY

  from x$bh, (select dummy from dual)

  where obj = (select data_object_id

  from dba_objects

  where object_name = ''DUAL''

  and data_object_id is not null);

  TCH      FILE#     DBABLK D

  ---------- ---------- ---------- -

  5          9       1185 X

  10          1       1425 X

  5          9       1184 X

  10          1       1424 X

  SQL> exec dbms_lock.sleep(3.2);

  SQL> /

  TCH      FILE#     DBABLK D

  ---------- ---------- ---------- -

  5          9       1185 X

  14          1       1425 X

  5          9       1184 X

  14          1       1424 X

  SQL> exec dbms_lock.sleep(3.2);

  SQL> /

  TCH      FILE#     DBABLK D

  ---------- ---------- ---------- -

  5          9       1185 X

  18          1       1425 X

  5          9       1184 X

  18          1       1424 X

  SQL> exec dbms_lock.sleep(3.2);

  SQL> /

  TCH      FILE#     DBABLK D

  ---------- ---------- ---------- -

  5          9       1185 X

  19          1       1425 X

  5          9       1184 X

  19          1       1424 X

  ```


  我预计输出会因 Oracle 版本而异；你很可能看到返回的行数不止两行。你可能会观察到 `TCH` 并非每次都增加。在多用户系统上，结果将更加不可预测。Oracle
  会尝试每三秒增加一次 `TCH`（有一个 `TIM` 列显示 `TCH` 列的最后更新时间），但确保这个数字 100% 准确并不被认为是重要的，只要它接近即可。此外，Oracle
  会有意地让块"冷却"，并随着时间的推移减少 `TCH` 计数。所以，如果你在自己的系统上运行这个查询，请准备好看到可能不同的结果。


  块缓冲区在列表中保持在其位置，并且其接触计数增加。然而，随着时间的推移，块自然会在列表中"移动"。我把"移动"放在引号中，因为块并不物理移动；而是维护了多个指向这些块的列表，块将从一个列表"移动"到另一个列表。例如，修改过的块由一个脏列表指向（以便由
  `DBWn` 写入磁盘）。另外，随着它们随时间被重用，当缓冲区缓存实际上已满，并且某个接触计数较小的块被释放时，它将带着新数据块被"放置"到列表的大致中间位置。


  用于管理这些列表的整个算法相当复杂，并且随着 Oracle 的改进，每个版本都有细微的变化。对我们开发者而言，实际完整的细节并不重要，重要的是频繁使用的块将被缓存，而使用不频繁的块不会被缓存太久。




  '
- "# 多块大小\n\n你可以在同一个数据库中使用多种数据库块大小。你可以混合使用\"默认\"块大小（即你最初创建数据库时使用的块大小；`SYSTEM`和所有`TEMPORARY`表空间所用的大小）和最多其他四种块大小。每种唯一的块大小都必须有其自己的缓冲区缓存区域。默认池（default\
  \ pool）、保留池（keep pool）和回收池（recycle pool）只会缓存默认大小的块。为了在数据库中使用非默认块大小，你需要配置一个缓冲池来容纳它们。\n\
  \n在这个示例中，我的默认块大小是 8KB。我将尝试创建一个块大小为 16KB 的表空间：\n\n```\n$ sqlplus / as sysdba\nSQL>\
  \ create tablespace ts_16k datafile '/tmp/ts_16k.dbf'  size 5m blocksize 16k;\n\
  create tablespace ts_16k\n*\nERROR at line 1:\nORA-29339: tablespace block size\
  \ 16384 does not match configured block sizes\nSQL> show parameter 16k\nNAME   \
  \                              TYPE        VALUE\n------------------------------------\
  \ ----------- --------------------------\ndb_16k_cache_size                    big\
  \ integer 0\n```\n\n目前，由于我还没有配置 16KB 缓存，我无法创建这样的表空间。我现在可以采取几种措施来纠正这种情况。我可以设置`DB_16K_CACHE_SIZE`参数并重启数据库。我可以缩小其他\
  \ SGA 组件之一，以便为现有 SGA 中的 16KB 缓存腾出空间。或者，如果`SGA_MAX_SIZE`参数大于我当前的 SGA 大小，我也许可以直接分配一个\
  \ 16KB 缓存。\n\n注意\n\n在数据库启动并运行时，调整各种 SGA 组件的大小是可能的。如果你希望 SGA 的大小能够\"增长\"到超出其初始分配值，你必须将`SGA_MAX_SIZE`参数设置为某个大于已分配\
  \ SGA 的值。例如，如果启动后你的 SGA 大小为 800MB，而你想为缓冲区缓存额外增加 200MB，那么你必须事先将`SGA_MAX_SIZE`设置为\
  \ 1GB 或更大，以允许这种增长。\n\n在这个示例中，由于我使用的是 ASMM（自动共享内存管理），并且不希望手动设置其他缓存，我将设置`DB_16K_CACHE_SIZE`并重启：\n\
  \n```\nSQL> alter system set db_16k_cache_size = 16m scope=spfile;\nSQL> startup\
  \ force\nSQL> show parameter 16k\nNAME                                 TYPE    \
  \    VALUE\n------------------------------------ ----------- --------------------------\n\
  db_16k_cache_size                    big integer 16M\n```\n\n所以，现在我已经建立了另一个缓冲区缓存：一个用于缓存所有大小为\
  \ 16KB 的块。默认池将占用剩余的缓冲区缓存空间，这可以通过查询`V$SGASTAT`看到。这两个缓冲区缓存是互斥的；如果一个\"满了\"，它不能使用另一个的空间。这为\
  \ DBA 提供了对内存使用的非常精细的控制，但这是有代价的。代价就是复杂性和管理。这些多块大小最初并非作为性能或调优功能而设计（如果你需要多个缓存，你已经有了`default`、`keep`和`recycle`池），而是为了支持可传输表空间——将格式化数据文件从一个数据库取出并传输或附加到另一个数据库的能力。它们是为了将使用\
  \ 8KB 块大小的事务处理系统中的数据文件，传输到使用 16KB 或 32KB 块大小的数据仓库而实现的。\n\n然而，多块大小在测试理论方面确实能起到很好的作用。如果你想看看你的数据库在使用不同块大小时如何运作——例如，如果使用\
  \ 4KB 块而不是 8KB 块，某个特定表将消耗多少空间——你现在可以轻松地进行测试，而无需创建一个全新的数据库实例。\n\n你也可以将多块大小用作针对特定段集合的非常聚焦的调优工具，通过为它们提供自己的私有缓冲池。或者，在混合系统中，事务处理用户可以使用一组数据，而报告/仓库用户可以查询另一组独立的数据。事务处理数据将受益于更小的块大小，因为块上的争用更少（每个块的数据/行更少，意味着通常更少的人会同时争抢同一个块），并且缓冲区缓存利用率更高（用户只将他们感兴趣的数据——单行或小行集——读入缓存）。基于事务处理数据的报告/仓库数据，则可能受益于更大的块大小，部分原因是块开销更小（整体存储占用更少）以及可能更大的逻辑\
  \ I/O 尺寸。并且由于报告/仓库数据没有相同的更新争用问题，每个块有更多行这一事实不是问题而是优势。此外，事务处理用户实际上拥有了自己的缓冲区缓存；他们不必担心报告查询会占用他们的缓存。\n\
  \n但一般来说，默认池、保留池和回收池应该足以对块缓冲区缓存进行微调，而多块大小将主要用于在数据库之间传输数据，或许也用于混合报告/事务处理系统。\n\n\n\
  ### 共享池\n\n共享池是 SGA 中最关键的内存区域之一，尤其关乎性能与可扩展性。共享池过小可能严重损害性能，甚至导致系统看似挂起。共享池过大也可能产生同样的效果。而使用不当的共享池同样会带来灾难。\n\
  \n共享池究竟是什么？它是 Oracle 缓存众多“程序”数据片段的地方。当我们解析一条查询时，其解析后的表示形式会被缓存在此。在执行完整查询解析工作之前，Oracle\
  \ 会先搜索共享池，查看该工作是否已完成。您运行的 PL/SQL 代码也缓存在共享池中，因此下次运行时，Oracle 无需再次从磁盘读取。PL/SQL 代码不仅在此缓存，也在此共享。如果您有\
  \ 1000 个会话都执行相同的代码，则只会加载一份代码副本并在所有会话间共享。Oracle 将系统参数存储在共享池中。数据字典缓存（关于数据库对象的缓存信息）也存储于此。简而言之，几乎所有重要数据都存储在共享池中。\n\
  \n共享池的特点是包含大量小（通常为 4KB 或更小）的内存块。请注意，4KB 并非硬性限制。偶尔也会有超过此大小的分配，但总体目标是使用小内存块，以防止因分配大小从极小到极大剧烈变化而导致的碎片化。共享池中的内存基于\
  \ LRU（最近最少使用）机制管理。在这方面，它与缓冲区缓存类似——如果不使用，就会被淘汰。一个名为 `DBMS_SHARED_POOL` 的内置包可用于改变此行为——强制将对象固定在共享池中。您可以使用此过程在数据库启动时加载常用的过程和包，使其不会因老化而被清除。但通常情况下，如果一段时间内共享池中的某块内存未被重用，它将面临老化清除。即使是可能相当庞大的\
  \ PL/SQL 代码，也通过分页机制管理，因此当您执行一个非常大的包中的代码时，只有需要的代码才会以小块形式加载到共享池中。如果您在很长一段时间内未使用它，并且共享池已满且需要空间给其他对象时，它将被老化清除。\n\
  \n破坏 Oracle 共享池的最简单方法是不使用绑定变量。正如您在第 1 章所见，不使用绑定变量可能使系统陷入困境，原因有二：\n\n*   系统消耗大量 CPU\
  \ 时间来解析查询。\n*   由于查询从未被重用，系统需消耗大量资源来管理共享池中的对象。\n\n如果提交给 Oracle 的每条查询都是唯一的（因为硬编码了唯一值），那么共享池的概念就基本被破坏了。共享池的设计初衷是让查询计划被反复使用。如果每条查询都是全新的、前所未见的，那么缓存只会增加开销。共享池反而成了性能的阻碍。许多人试图用一种常见但错误的技术来解决此问题，即向共享池添加更多空间，这通常只会使情况比之前更糟。随着共享池不可避免地再次填满，它所带来的开销甚至比更小的共享池还要大，原因很简单：管理一个大的、满的共享池比管理一个小的、满的共享池需要更多的工作。\n\
  \n解决此问题的唯一真正方法是使用共享 SQL 来重用查询。之前在第 1 章中，我们简要了解了 `CURSOR_SHARING` 参数，它可以在该领域充当临时的“拐杖”。然而，真正解决此问题的唯一方法是首先使用可重用的\
  \ SQL。即使在超大规模的系统上，我发现通常最多也只有 10,000 到 20,000 条唯一的 SQL 语句。大多数系统只执行几百条唯一的查询。\n\n下面的真实示例展示了如果共享池使用不当，情况会变得多糟糕。我曾被要求处理一个系统，其标准操作程序是每晚关闭数据库，清除\
  \ SGA，然后重新启动。这样做的原因是系统在白天会出现问题，CPU 完全饱和，如果让数据库运行超过一天，性能确实开始下降。他们在一个 1.1GB 的 SGA\
  \ 中使用了 1GB 的共享池。这是真实的：0.1GB 专用于块缓冲区缓存和其他元素，而 1GB 专用于缓存那些永远不会再次执行的唯一查询。他们进行冷启动的原因是，如果让系统运行超过一天，共享池中的空闲内存就会耗尽。此时，老化结构（尤其是从如此大的结构中）清除的开销会压垮系统，导致性能严重下降（尽管性能本来也不怎么样，因为他们还要管理\
  \ 1GB 的共享池）。此外，使用该系统的人员不断想要为机器添加越来越多的 CPU，因为硬解析 SQL 非常消耗 CPU。通过修正应用程序并让其使用绑定变量，不仅物理机需求下降了（他们后来拥有的\
  \ CPU 能力是所需的数倍），而且分配给各个池的内存也反转了过来。共享池不再是 1GB，而是分配了不到 100MB——并且在连续运行数周内，他们从未用完所有空间。\n\
  \n注意\n\n对于可插拔数据库，`SHARED_POOL_SIZE` 是可选的。如果为可插拔数据库设置了此参数，则它会设置该可插拔数据库共享池的最小大小。当此参数在可插拔数据库级别未设置时，则该可插拔数据库可使用的共享池量没有限制，仅受容器数据库共享池最大大小的约束。\n\
  \n`SHARED_POOL_SIZE` 通常是共享池中 `SUM(BYTES)` 报告的最大贡献者，但它并非唯一贡献者。例如，参数 `CONTROL_FILES`\
  \ 为共享池的“杂项”部分贡献了每个文件 264 字节。不幸的是，`V$SGASTAT` 中的“共享池”和参数 `SHARED_POOL_SIZE` 的命名方式如此，因为该参数确实贡献了共享池的大小，但它不是唯一的贡献者。假设您使用的是手动共享内存管理（即您自行设置了\
  \ `SHARED_POOL_SIZE` 参数），您应该看到两者之间存在一一对应的关系：\n\n```\nSQL> select sum(bytes)/1024/1024\
  \ mbytes from v$sgastat where pool = 'shared pool';\nMBYTES\n\nSQL> show parameter\
  \ shared_pool_size;\nNAME                                 TYPE        VALUE\n------------------------------------\
  \ ----------- --------------------------\nshared_pool_size                     big\
  \ integer 128M\n```\n\n注意\n\n在此示例中，我使用的是手动共享内存管理！\n\n\n## 大型池\n\n大型池之所以如此命名，并非因为其结构“庞大”（尽管其物理尺寸可能确实很大），而是因为它用于分配那些共享池无法处理的大块内存。大型池是一种回收式内存空间，而共享池则更像保留缓冲池——如果某些内容被频繁使用，你就会将其保留在缓存中。\n\
  \n在大型池中分配的内存以**堆**的方式管理，其方式类似于 C 语言通过`malloc()`和`free()`管理内存。一旦你“释放”了一块内存，它就可以被其他进程使用。在共享池中，实际上并没有“释放”内存块的概念。你会分配内存，使用它，然后停止使用。过一段时间，如果需要重用那块内存，Oracle\
  \ 会将你的内存块**老化换出**。仅使用共享池的问题在于，一种尺寸并不总是适合所有情况。\n\n大型池专门被以下功能使用：\n\n*   *共享服务器连接*，用于在\
  \ SGA 中分配 UGA 区域\n*   *语句的并行执行*，用于分配进程间消息缓冲区，这些缓冲区用于协调并行查询服务器\n*   *备份*，在某些情况下用于\
  \ RMAN 磁盘 I/O 缓冲区\n\n如你所见，这些内存分配都不应该在一个设计用于管理小内存块的 LRU 缓冲池中管理。例如，对于共享服务器连接内存，一旦会话注销，这部分内存就永远不会被重用，因此应该立即返回给池。此外，共享服务器\
  \ UGA 的内存分配往往“很大”。将共享服务器内存放入共享池会导致它分裂成大小不一的碎片，而且，你会发现那些永远不会被重用的大块内存会老化换出那些可能被重用的内存。这迫使数据库稍后做更多的工作来重建那个内存结构。\n\
  \n并行查询消息缓冲区也是如此，因为它们不是 LRU 可管理的。它们被分配，在使用完成前无法被释放。一旦它们传递了消息，就不再需要，应该立即释放。对于备份缓冲区，这一点更加突出——它们很大，一旦\
  \ Oracle 使用完毕，它们就应该直接“消失”。\n\n使用共享服务器连接时，大型池并非强制要求，但强烈建议配置。如果你没有大型池并且使用了共享服务器连接，那么分配将来自共享池。这肯定会在一段时间内导致性能下降，应该避免。\n\
  \n如果设置了`SGA_TARGET`，但没有为`LARGE_POOL_SIZE`设置值，则默认为零（意味着由 Oracle 数据库内部决定）。如果设置了`LARGE_POOL_SIZE`，则该值将用作内存池的最小值。\n\
  \n## Java 池\n\n添加 Java 池是为了支持在数据库中运行 Java。如果你用 Java 编写了一个存储过程，Oracle 在处理该代码时将使用这块内存。参数`JAVA_POOL_SIZE`用于为所有会话特定的\
  \ Java 代码和数据固定分配给 Java 池的内存量。\n\nJava 池的使用方式取决于 Oracle 服务器的运行模式。在专用服务器模式下，Java 池包含每个\
  \ Java 类的共享部分，这部分实际上是每个会话使用的。这些基本上是只读部分（执行向量、方法等），每个类大约 4KB 到 8KB。因此，在专用服务器模式下，Java\
  \ 池所需的总内存相当适中，可以根据你将使用的 Java 类数量来确定。请注意，在专用服务器模式下，没有会话状态存储在 SGA 中，因为此信息存储在 UGA 中，并且，如你所记得的，在专用服务器模式下，UGA\
  \ 包含在 PGA 中。\n\n当使用共享服务器连接连接到 Oracle 时，Java 池包含以下两部分：\n\n*   每个 Java 类的共享部分。\n*\
  \   部分用于每个会话状态的 UGA，这部分从 SGA 内的 Java 池中分配。剩余的 UGA 将照常位于共享池中，或者，如果配置了大型池，则将位于大型池中。\n\
  \n如果设置了`SGA_TARGET`而没有设置`JAVA_POOL_SIZE`，则默认为零（意味着由 Oracle 内部决定）。如果指定了`JAVA_POOL_SIZE`，则该值表示内存池的最小值。\n\
  \n## 流池\n\n流池是 Oracle 产品使用的 SGA 结构，这些产品包括 Oracle GoldenGate、XStream、Oracle Streams、Oracle\
  \ 高级队列和 Oracle 数据泵。\n\n流池的大小通过设置`STREAMS_POOL_SIZE`参数来控制。如果`SGA_TARGET`是一个非零值，那么自动\
  \ SGA 内存管理将使用`STREAMS_POOL_SIZE`的设置作为流池的最小值。如果`SGA_TARGET`和`STREAMS_POOL_SIZE`都设置为零，那么流池最多使用共享池的百分之十。\n\
  \n使用流池的产品将缓冲队列消息。这些功能使用内存队列，而不是使用永久的基于磁盘的队列及其伴随的开销。如果这些队列被填满，它们最终会溢出到磁盘。如果使用内存队列的\
  \ Oracle 实例由于某种原因（实例故障（软件崩溃）、断电或其他原因）失败，这些内存队列将从重做日志中重建。\n\n流池仅在那些使用需要此内存区域空间的功能（如\
  \ GoldenGate、Streams 等）的系统中才重要。在这些环境中，应设置`STREAMS_POOL_SIZE`以避免“窃取”共享池的百分之十。\n\n\
  ## 内存池\n\n数据库**内存中**特性包含一个高度优化的**内存中列存储**，它与现有的行格式缓冲缓存协同工作。内存中列存储的主要目的是提高分析操作所执行的列式数据访问的性能。你可以将其视为为表中的每一列都有一个常规索引（用于分析）。但是，它与常规索引不同，不需要日志记录或任何对数据库的写入。如果你的应用程序执行大量的分析，那么实施此内存特性可能会让你受益。\n\
  \n**内存中**特性需要额外的 Oracle 许可证才能使用。然而，从 Oracle 21c 开始，当以有限的“基础级别”方式实施时，此功能无需额外费用即可使用。通过将`INMEMORY_FORCE`设置为`BASE_LEVEL`来实例化基础级别内存中功能。此基础级别允许你在不购买内存中选件的情况下试验内存中功能。启用基础级别时，内存中列存储对于一个容器数据库限制为\
  \ 16GB。此外，在基础级别中，内存中对象的压缩级别自动设置为`QUERY LOW`。*Oracle 数据库许可信息用户手册*详细说明了哪些内存中功能可用于不同的版本和服务。\n\
  \n由于内存中是一个额外付费的选件，并且有大量功能可用，我将指引你参考*Oracle 数据库内存中指南*（截至本书撰写时为 281 页）以获取有关此功能的更多详细信息。描述所有功能和实现细节超出了本书的范围。\n\
  \n注意\n\n可以在可插拔数据库中设置`INMEMORY_SIZE`，以限制该可插拔数据库的内存中列存储的最大大小。可插拔数据库的值之和不必等于容器数据库的设置（可插拔数据库设置的总和可以大于容器数据库设置）。\n\
  \n\n### 系统全局区（SGA）内存管理\n\nSGA 是一组共享内存结构，包含 Oracle 实例的数据和控制结构。当多个用户并发访问实例内存时，数据可以在用户之间共享。这就是为什么\
  \ SGA 有时被称为共享内存区。管理 SGA 内存有三种方式：\n\n*   `自动内存管理 (AMM)`：设置 `MEMORY_TARGET` 参数。通过设置\
  \ `MEMORY_TARGET` 参数，您允许实例调整 SGA 和 PGA 内存区域的大小。\n*   `自动共享（或 SGA）内存管理 (ASMM)`：设置\
  \ `SGA_TARGET` 参数。通过设置 `SGA_TARGET` 参数，您允许实例调整各个 SGA 组件的大小。\n*   `手动共享内存管理`：设置所有必要的池和缓存参数。\n\
  \n在本节深入之前，我想先说明，调整 SGA 内存可能会让人困惑。之所以困惑，是因为 Oracle 使用了非常相似但含义截然不同的缩写词，例如 AMM 和 ASMM。同样令人困惑的是，在\
  \ Oracle 关于调整 SGA 的文档中，您会发现相互矛盾且互斥的建议。例如，看看 Oracle 对 AMM 的建议：\n\n*   *Oracle 性能调优指南*\
  \ 指出，Oracle 强烈建议使用 AMM。\n*   *Oracle 数据库管理指南* 也建议您启用 AMM。\n*   *Oracle 数据库管理指南*\
  \ 同时指出，使用 AMM 仅适用于 SGA 和 PGA 内存大小小于 4GB 的数据库。\n*   Oracle 支持文档 `749851.1` 指出，使用\
  \ HugePages 的 Linux 环境与 AMM 不兼容。这一点很有趣，因为 Oracle 的大部分客户都在启用了 HugePages 的 Linux 服务器上运行数据库。\n\
  \n那么，该用哪种呢？在理想环境下，每个人都应该使用 AMM，对吧？只需设置一个参数（`MEMORY_TARGET`）就完成了。然而，在现实世界中，事情并非如此非黑即白。有时，您环境的某些方面（例如，使用\
  \ Linux 操作系统）会引导您选择某个方向。尽管如此，内存管理可以归结为以下简单建议：\n\n*   对于大型数据库和/或 Linux 环境中的数据库，请使用\
  \ ASMM 来管理您的 SGA，并使用自动 PGA 内存管理来设置您的 PGA。在此模式下，您将 `MEMORY_TARGET` 设置为零，然后将 `SGA_TARGET`\
  \ 和 `PGA_AGGREGATE_TARGET` 设置为非零值。\n*   对于小型数据库和/或非 Linux 环境中的数据库，请使用 AMM。对于此方法，您将\
  \ `MEMORY_TARGET` 设置为非零值，并将 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET` 设置为零。然后，Oracle\
  \ 将根据需要调整内存池的大小。在此模式下，您可以选择将 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET` 设置为非零值，Oracle\
  \ 将使用这些设置作为分配给这两个值的最小内存量。\n*   不要对您的 SGA 和 PGA 使用过时的手动内存管理方法（除非您有非常充分的理由，例如您运行的是旧版\
  \ Oracle 且没有其他内存管理选项可用）。\n\n如果您处于 Linux 环境中，那么在大多数情况下（Linux 环境），您应该使用 ASMM。我想在本节开头指出这一点，以便明确您应该使用什么进行内存管理。说完这些，接下来我将讨论每种\
  \ SGA 管理技术。\n\n#### 自动内存管理\n\nAMM 有点像一站式解决您所有内存设置的方案。DBA 现在可以通过设置一个内存参数——`MEMORY_TARGET`——来轻松应对。这个\
  \ `MEMORY_TARGET` 代表了组合的 SGA 和 PGA 分配应该努力保持在内的总内存量（请记住，PGA 内存可能有些难以控制）。数据库将根据工作负载历史记录动态确定合适的\
  \ SGA 大小和 PGA 大小。随着时间的推移，随着数据库中执行的工作负载发生变化，分配给 SGA 和 PGA 的内存也会发生变化。例如，如果您白天是繁重的\
  \ OLTP（在线事务处理），晚上是繁重的批处理，您可能会发现白天的 SGA 远大于 PGA，而晚上的 SGA 远小于 PGA。这反映了这两种应用程序类型不同的内存需求。\n\
  \n**注意：** 如果您在使用 HugePages 的 Linux 环境中运行 Oracle 数据库，请阅读 Oracle 支持文档 ID `749851.1`。该说明指出，使用\
  \ AMM 与 Linux HugePages 不兼容。使用 Linux HugePages 是 Oracle 数据库的标准做法，因为它可以提高性能。\n\n\
  DBA 可以通过设置 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET` 为每个内存区域设置下限，或者通过将其值设置为该下限来为 SGA\
  \ 中的每个池设置下限。如果您使用的是存储的参数文件，数据库将记住池以及 SGA 和 PGA 的最佳设置。例如，在我的一个测试系统上，我设置了\n\n```\n\
  SQL> alter system set memory_target = 756m scope=spfile;\nSQL> alter system set\
  \ sga_target = 300m scope=spfile;\nSQL> alter system set pga_aggregate_target=300\
  \ scope=spfile;\n```\n\n接下来，我重启（停止/启动）实例以使参数生效：\n\n```\nSQL> startup force;\n```\n\
  \n检查 spfile，它当前具有以下设置：\n\n```\nSQL> create pfile='/tmp/pfile' from spfile;\nFile\
  \ created.\nSQL> !cat /tmp/pfile;\nCDB.__db_cache_size=71303168\nCDB.__inmemory_ext_roarea=0\n\
  CDB.__inmemory_ext_rwarea=0\nCDB.__java_pool_size=0\nCDB.__large_pool_size=4194304\n\
  CDB.__oracle_base='/opt/oracle'#ORACLE_BASE set from environment\nCDB.__pga_aggregate_target=478150656\n\
  CDB.__sga_target=314572800\nCDB.__shared_io_pool_size=8388608\nCDB.__shared_pool_size=213909504\n\
  CDB.__streams_pool_size=0\nCDB.__unified_pga_pool_size=0\n*.memory_target=792723456\n\
  *.pga_aggregate_target=314572800\n*.sga_target=314572800\n... \n```\n\n如您所见，双下划线参数包括了\
  \ `__sga_target` 和 `__pga_aggregate_target` 设置以及各个池。这些值是基于 spfile 中的内存参数设置以及观察到的服务器工作负载推导出来的。通过这种方式，Oracle\
  \ 会记住您上次最佳的 SGA/PGA 设置，并在下次启动时使用它们。\n\n**注意：** 最后这个功能，即存储池的推荐值，仅在您使用 spfile 作为初始化文件（而不是基于文本的\
  \ `init.ora` 文件）时才有效。\n\n\n## 自动共享内存管理 (ASMM)\n\n在近期所有的 DBA 经验中（包括 Oracle 云中的数据库），这是管理\
  \ SGA 内存最常见的方法。在 ASMM 下，用于调整自动调优组件总大小的主要参数是 `SGA_TARGET`。该参数可以在数据库运行时动态调整，最大可达 `SGA_MAX_SIZE`\
  \ 参数的设置值。`SGA_MAX_SIZE` 参数默认与 `SGA_TARGET` 相等，因此，如果您计划增加 `SGA_TARGET`，必须在启动数据库实例之前将\
  \ `SGA_MAX_SIZE` 设置得更大。如果当前正在使用 `MEMORY_TARGET`，请先将其设为零，然后将 `SGA_TARGET` 设置为一个非零值，例如：\n\
  \n```\nSQL> alter system set memory_target=0 scope=spfile;\nSQL> alter system set\
  \ sga_target = 1600m scope=spfile;\n```\n\n设置 `SGA_TARGET` 后，我将重新启动数据库并验证设置：\n\n\
  ```\nSQL> startup force;\nSQL> show parameter sga_target\nNAME                 \
  \                TYPE        VALUE\n------------------------------------ -----------\
  \ --------------------------\nsga_target                           big integer 1600M\n\
  ```\n\n如果设置了 `SGA_TARGET`，则 Oracle 会自动调整以下内存组件的大小：\n\n*   缓冲区缓存 (`DB_CACHE_SIZE`)\n\
  *   共享池 (`SHARED_POOL_SIZE`)\n*   大池 (`LARGE_POOL_SIZE`)\n*   Java 池 (`JAVA_POOL_SIZE`)\n\
  *   流池 (`STREAMS_POOL_SIZE`)\n*   数据传输缓存 (`DATA_TRANSFER_CACHE_SIZE`)\n\n如果您将这些参数设置为非零值（同时设置了\
  \ `SGA_TARGET`），则这些值将作为对应内存区域的最小值。通常，如果您知道使用数据库的应用程序需要较大的最小值才能正常运行，才会为这些参数设置非零值。\n\
  \n数据库将使用 `SGA_TARGET` 值减去任何其他手动调整大小的组件（如 `DB_KEEP_CACHE_SIZE`、`DB_RECYCLE_CACHE_SIZE`\
  \ 等）的大小，并用该内存量来调整默认缓冲池、共享池、大池和 Java 池的大小。在运行时，实例将根据需要在这四个内存区域之间动态分配和重新分配内存。当共享池内存不足时，实例可以选择将缓冲区缓存缩小若干兆字节（一个粒度大小），并相应增加共享池，而不是向用户返回\
  \ ORA-04031“无法为共享内存分配 N 字节”错误。\n\n> 注意\n> 要使用 ASMM，参数 `STATISTICS_LEVEL` 必须设置为 `TYPICAL`（默认值）或\
  \ `ALL`。如果未启用统计信息收集，数据库将没有做出必要大小调整决策所需的历史信息。\n\n随着时间的推移，随着实例的内存需求被确定，各种 SGA 组件的大小会变得或多或少固定下来。数据库还会在数据库启动和关闭之间记住这四个组件的大小，这样就不必每次从头开始为您的实例计算合适的大小。它通过四个双下划线参数来实现这一点：`__db_cache_size`、`__java_pool_size`、`__large_pool_size`\
  \ 和 `__shared_pool_size`。在正常或立即关闭期间，数据库会将这些值记录到 spfile 中，并在启动时使用它们来设置每个区域的默认大小。我们可以通过以下方式查看这些参数：\n\
  \n```\nSQL> create pfile='/tmp/tmp.ora' from spfile;\nSQL> !cat /tmp/tmp.ora\n```\n\
  \n以下是输出片段：\n\n```\nCDB.__data_transfer_cache_size=0\nCDB.__db_cache_size=872415232\n\
  CDB.__inmemory_ext_roarea=0\nCDB.__inmemory_ext_rwarea=0\nCDB.__java_pool_size=16777216\n\
  CDB.__large_pool_size=33554432\nCDB.__oracle_base='/opt/oracle'#ORACLE_BASE set\
  \ from environment\nCDB.__pga_aggregate_target=318767104\nCDB.__sga_target=1677721600\n\
  CDB.__shared_io_pool_size=83886080\nCDB.__shared_pool_size=637534208\nCDB.__streams_pool_size=0\n\
  CDB.__unified_pga_pool_size=0\n```\n\n此外，如果您知道希望为这五个区域中的某个区域使用特定的最小值，可以在设置 `SGA_TARGET`\
  \ 的同时设置该参数。实例将使用您的设置作为下限，即该特定区域可能的最小尺寸。\n\n> 注意\n> `SGA_TARGET` 参数对于可插拔数据库是可选的。当为可插拔数据库设置此参数时，它指定了该可插拔数据库在任何时候可以使用的最大\
  \ SGA。如果在可插拔数据库级别未设置此参数，则它使用的 SGA 大小没有限制，但受根容器数据库 SGA 大小的约束。\n\n## 手动共享内存管理\n\n\
  手动共享内存管理应该很少使用；因此，我不打算详细讨论此技术。这主要是因为使用前面描述的方法（由 Oracle 为您管理 SGA 内存）更为简单。但是，如果您需要对\
  \ SGA 内存的自动调优区域进行一定程度的控制，则可以将 `MEMORY_TARGET` 和 `SGA_TARGET` 设置为零。当 `MEMORY_TARGET`\
  \ 设置为零时，会禁用 AMM；当 `SGA_TARGET` 设置为零时，会禁用 ASMM。\n\n当禁用自动内存管理技术时，您可以通过指定以下内存参数的大小来手动设置\
  \ SGA 的大小：`DB_CACHE_SIZE`、`SHARED_POOL_SIZE`、`LARGE_POOL_SIZE`、`JAVA_POOL_SIZE`\
  \ 和 `STREAMS_POOL_SIZE`。这些参数中的每一个都有一个默认值，如果您没有显式设置它们，Oracle 将使用该默认值。例如，`DB_CACHE_SIZE`\
  \ 将被设置为 48MB 或 4MB 乘以 CPU 数量（取两者中较大的一个）。\n\n请注意，即使您已关闭此功能，Oracle 仍可能执行一定程度的自动 SGA\
  \ 内存重新分配。Oracle 这样做是为了防止进程在共享池中空间不足。\n\n> 提示\n> 有关使用手动共享内存管理时自动调整 SGA 大小的更多详细信息，请参阅\
  \ Oracle 支持说明 1269139.1。\n\n## 总结\n\n在本章中，我们了解了 Oracle 的内存结构。我们从进程和会话级别开始，检查了 PGA\
  \ 和 UGA 及其关系。我们看到了连接到 Oracle 的模式如何决定内存的组织方式。专用服务器连接意味着在服务器进程中使用的内存比共享服务器连接下更多，但使用共享服务器连接则意味着需要显著更大的\
  \ SGA。然后我们讨论了 SGA 本身的主要结构。我们发现了共享池和大池之间的区别，并探讨了为什么可能需要一个大池来“拯救”我们的共享池。我们介绍了 Java\
  \ 池及其在各种条件下的使用方式，还研究了块缓冲区缓存以及如何将其细分为更小、更专注的池。\n\n现在，我们已准备好转向构成 Oracle 实例其余部分的物理进程。\n\
  \n\n\n"
- '# 5. Oracle 进程


  我们已经来到了架构拼图的最后一块。我们已经研究了数据库以及构成数据库的一组物理文件。在探讨 Oracle 使用的内存时，我们已经了解了实例的一半。最后一个需要涵盖的架构问题，就是构成实例另一半的进程集合。Oracle
  中的每个进程都将执行特定的任务或一组任务，并且每个进程都会有为执行其工作而分配的内部内存（PGA 内存）。一个 Oracle 实例大致有三类进程：


  *   **服务器进程**：这些进程根据客户端的请求执行工作。我们已经对专用服务器和共享服务器有了一定程度的了解。这些就是服务器进程。

  *   **后台进程**：这些进程随数据库启动而启动，并执行各种维护任务，例如将块写入磁盘、维护在线重做日志、清理异常终止的进程、维护自动工作量存储库（AWR）等。

  *   **从属进程**：这些进程类似于后台进程，但它们代表后台或服务器进程执行额外的工作。


  其中一些进程，例如数据库块写入器（`DBWn`）和日志写入器（`LGWR`），已经出现过，但在这里我们将更仔细地研究每个进程的功能、作用及其原因。


  > **注意**

  >

  > 在本章中，当我使用术语 `process` 时，在 Oracle 使用线程实现的操作系统（如 Windows）上，请将其视为与术语 `thread` 同义。在本章的上下文中，我使用术语
  `process` 来涵盖进程和线程。如果您使用的是多进程实现的 Oracle（如在 UNIX/Linux 上看到的），那么术语 `process` 是完全合适的。如果您使用的是单进程实现的
  Oracle（如在 Windows 上看到的），那么术语 `process` 实际上将意味着 Oracle 进程内的 `thread`。所以，例如，当我谈到 `DBWn`
  进程时，Windows 上的等效项就是 Oracle 进程内的 `DBWn` 线程。


  ## 服务器进程


  服务器进程是代表客户端会话执行工作的进程。它们是最终接收并处理我们的应用程序发送给数据库的 SQL 语句的进程。


  在第 2 章中，我们简要介绍了连接到 Oracle 的两种主要连接类型，即：


  *   **专用服务器**：服务器上有一个专门为您的连接服务的进程。数据库连接与服务器进程或线程之间是一对一的映射。

  *   **共享服务器**：多个会话共享一组由 Oracle 实例生成和管理的服务器进程。您的连接是连接到数据库调度程序，而不是专门为您的连接创建的专用服务器进程。


  > **注意**

  >

  > 理解 Oracle 术语中 `connection`（连接）和 `session`（会话）之间的区别非常重要。`connection` 只是客户端进程和 Oracle
  实例之间的物理路径（例如，您与实例之间的网络连接）。而 `session` 则是数据库中的一个逻辑实体，客户端进程可以在其中执行 SQL 等操作。多个独立的会话可以关联到单个连接，并且这些会话甚至可以独立于连接而存在。我们稍后将进一步讨论这一点。


  专用服务器进程和共享服务器进程的工作是相同的：它们处理您交给它们的所有 SQL。当您向数据库提交一个 `SELECT * FROM EMP` 查询时，一个 Oracle
  专用/共享服务器进程会解析该查询并将其放入共享池中（或者，希望已经在共享池中找到了它）。该进程会制定查询计划（如果需要），并执行查询计划，可能在缓冲区缓存中找到所需的数据，或者将数据从磁盘读入缓冲区缓存。


  这些服务器进程是主力进程。通常，您会发现这些进程是您系统上 CPU 时间的最大消耗者，因为它们执行您的排序、求和、连接——几乎所有操作。


  ### 专用服务器连接


  在专用服务器模式下，客户端连接与服务器进程（或线程，视情况而定）之间是一对一的映射。如果您在 UNIX/Linux 机器上有 100 个专用服务器连接，那么将会有
  100 个进程代表它们执行。图形化表示如图 5-1 所示。


  ![图 5-1：典型的专用服务器连接](img/319655_4_En_5_Fig1_HTML.jpg)


  您的客户端应用程序将链接有 Oracle 库。这些库提供了您与数据库通信所需的 API。这些 API 知道如何向数据库提交查询以及如何处理返回的游标。它们知道如何将您的请求打包成网络调用，而专用服务器将知道如何解包。这个软件组件称为
  `Oracle Net`，尽管在之前的版本中您可能知道它叫 `SQL*Net`。这是 Oracle 用来实现客户端/服务器处理（即使在 *n* 层架构中，也潜藏着客户端/服务器程序）的网络软件/协议。即使
  `Oracle Net` 在技术上不参与其中，Oracle 也采用相同的架构。也就是说，即使客户端和服务器在同一台机器上，仍然采用这种双进程（也称为 *双任务*）架构。这种架构有两个好处：


  *   **远程执行**：客户端应用程序在数据库本身以外的机器上执行是非常自然的。

  *   **地址空间隔离**：服务器进程对 SGA 具有读写访问权限。如果客户端进程和服务器进程在物理上链接在一起，客户端进程中的一个错误指针很容易损坏 SGA
  中的数据结构。


  在第 2 章中，我们看到了这些专用服务器如何由 Oracle 监听器进程生成或创建。我不会再次介绍那个过程；相反，我们将快速了解一下当监听器不参与时会发生什么。其机制与监听器参与时基本相同，但专用服务器不是由监听器在
  UNIX/Linux 中通过 `fork()`/`exec()` 创建或在 Windows 中通过进程间通信（IPC）调用创建，而是由客户端进程本身创建。


  > **注意**

  >

  > `fork()` 和 `exec()` 调用有许多变体，例如 `vfork()` 和 `execve()`。Oracle 使用的调用可能因操作系统和实现而异，但最终效果是相同的。`fork()`
  创建一个新的进程，该进程是父进程的克隆；在 UNIX/Linux 上，这是创建新进程的唯一方法。`exec()` 用新的程序映像覆盖内存中现有的程序映像，从而启动一个新程序。因此，SQL*Plus
  可以 *fork*（复制自身），然后 *exec* Oracle 二进制文件，即专用服务器，用这个新程序覆盖自身的副本。


  当我们在同一台机器上运行客户端和服务器，以 SYS 用户连接到根容器时，可以清楚地看到这种父/子进程的创建：


  ```sql

  $ sqlplus / as sysdba

  SQL> select a.spid dedicated_server, b.process clientpid

  from v$process a, v$session b

  where a.addr = b.paddr

  and   b.sid = sys_context(''userenv'',''sid'');

  DEDICATED_SERVER         CLIENTPID

  ------------------------ ------------------------

  12380                    12379

  SQL> !/bin/ps -fp  12380 12379

  UID        PID  PPID  C STIME TTY      STAT   TIME CMD

  oracle   12379 14523  0 01:57 pts/0    Sl+    0:00 sqlplus   as sysdba

  oracle   12380 12379  1 01:57 ?        Ss     0:00 oracleCDB (DESCRIPTION=(LOCAL=YES)...

  ```




  这里，我使用了一条查询来发现与我的专用服务器相关联的进程 ID（PID）（来自 `V$PROCESS` 的 SPID 就是该查询执行期间所使用进程的操作系统 PID）。`/bin/ps
  –fp` 的输出包含了父进程 ID（PPID），并显示专用服务器进程 12380 是我的 `SQL*Plus` 进程（进程 ID 12379）的子进程。


  ### 共享服务器连接


  现在，让我们更详细地了解共享服务器进程。这种类型的连接强制要求使用 Oracle Net，即使客户端和服务器位于同一台机器上——如果不使用 Oracle TNS
  监听器，就无法使用共享服务器。如前所述，客户端应用程序将连接到 Oracle TNS 监听器，并被重定向或移交给一个调度程序。调度程序充当客户端应用程序和共享服务器进程之间的管道。图
  5-2 是共享服务器连接到数据库的架构示意图。


  ![../images/319655_4_En_5_Chapter/319655_4_En_5_Fig2_HTML.jpg](img/319655_4_En_5_Fig2_HTML.jpg)


  图 5-2 典型的共享服务器连接


  在这里，我们可以看到，链接了 Oracle 库的客户端应用程序将物理连接到一个调度程序进程。对于任何给定的实例，我们可能配置了许多调度程序，但仅使用一个调度程序来服务数百甚至数千个用户也很常见。调度程序简单地负责接收来自客户端应用程序的入站请求，并将它们放入
  SGA 中的一个请求队列。来自预创建共享服务器进程池的第一个可用共享服务器进程将从队列中取出请求，并附加相关会话的 UGA（图 5-2 中标记为“S”的方框）。共享服务器将处理该请求，并将任何输出放入响应队列。调度程序持续监控响应队列以获取结果，并将其传输回客户端应用程序。就客户端而言，它无法真正分辨自己是通过专用服务器连接还是共享连接——它们看起来是一样的。只有在数据库层面，差异才显而易见。


  数据库驻留连接池（DRCP）是一种可选的连接到数据库并建立会话的方法。它被设计为一种更高效的连接池方法，适用于那些本身不支持高效连接池的应用程序接口——例如 PHP，一种通用的
  Web 脚本语言。DRCP 是专用服务器和共享服务器概念的混合体。它继承了共享服务器的服务器进程池概念，只不过被池化的进程将是专用服务器，而不是共享服务器；它也继承了专用服务器的概念——嗯——也就是专用性。


  在共享服务器连接中，共享服务器进程在许多会话之间共享，并且单个会话往往会使用多个共享服务器。使用 DRCP 时，情况并非如此；从池中选择的专用服务器进程将在其会话的生命周期内专用于该客户端进程。在共享服务器中，如果我在我的会话中对数据库执行三条语句，这三条语句很有可能由三个不同的共享服务器进程执行。而使用
  DRCP，相同的这三条语句将由从池中分配给我的专用服务器执行——该专用服务器将专属于我，直到我的会话将其释放回池中。因此，DRCP 具有共享服务器的池化能力和专用服务器的性能特性。我们将在本章后面更详细地探讨专用服务器与共享服务器的性能。


  ### 连接 vs. 会话


  许多人惊讶地发现连接（connection）与会话（session）并非同义词。在大多数人看来，它们是一样的，但现实是它们不必相同。一个连接上可以建立零个、一个或多个会话。每个会话都是独立和分离的，即使它们都共享到数据库的同一物理连接。在一个会话中的提交（commit）不会影响该连接上的任何其他会话。事实上，使用该连接的每个会话都可以使用不同的用户身份！


  在 Oracle 中，连接仅仅是你的客户端进程和数据库实例之间的一条物理通路——最常见的是网络连接。连接可能连到一个专用服务器进程或一个调度程序。如前所述，一个连接可以有零个或多个会话，这意味着一个连接可以存在而没有对应的会话。此外，一个会话*可能*有也可能没有连接。使用
  Oracle Net 的高级特性（如连接池），客户端可以断开物理连接，同时保持会话完整（但空闲）。当客户端想要在该*会话*中执行某些操作时，它会重新建立物理*连接*。让我们更详细地定义这些术语：


  *   *连接*：连接是从客户端到 Oracle 实例的物理路径。连接通过网络或 IPC（进程间通信）机制建立。连接通常位于客户端进程与专用服务器或调度程序之间。但是，使用
  Oracle 的连接管理器（CMAN），连接可能位于客户端与 CMAN 之间，以及 CMAN 与数据库之间。CMAN 的介绍超出了本书的范围，但 *Oracle
  Database Net Services Administrator''s Guide*（可从 [`http://otn.oracle.com`](http://otn.oracle.com)
  免费获取）对此有详细说明。

  *   *会话*：会话是存在于实例中的逻辑实体。它是你的*会话状态*，或内存中代表你唯一会话的数据结构集合。当人们想到数据库连接时，这很可能是最先想到的东西。它是你在服务器上的会话，在那里你执行
  SQL、提交事务并运行存储过程。


  我们可以使用 `SQL*Plus` 来查看连接和会话的实际情况，并认识到一个连接拥有多个会话是非常常见的现象。我们将简单地使用 `AUTOTRACE` 命令，并发现我们有两个会话！通过一个单一连接，使用一个单一进程，我们将建立两个会话。这是第一个：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> select username, sid, serial#, server, paddr, status

  from v$session

  where username = USER;

  USERNAME            SID    SERIAL# SERVER    PADDR            STATUS

  ------------ ---------- ---------- --------- ---------------- --------

  EODA                 22        692 DEDICATED 000000007850D488 ACTIVE

  ```


  现在，这显示我们当前有一个会话：一个单一的专用服务器连接的会话。`PADDR` 列是我们唯一的专用服务器进程的地址。接下来，我们打开 `AUTOTRACE` 来查看我们在
  `SQL*Plus` 中执行语句的统计信息：


  ```

  SQL> set autotrace on statistics

  SQL> select username, sid, serial#, server, paddr, status

  from v$session

  where username = USER;

  USERNAME            SID    SERIAL# SERVER    PADDR            STATUS

  ------------ ---------- ---------- --------- ---------------- --------

  EODA                 22        692 DEDICATED 000000007850D488 ACTIVE

  EODA                 23      24389 DEDICATED 0000000078528008 INACTIVE

  Statistics


  0  recursive calls

  0  db block gets

  0  consistent gets

  0  physical reads

  0  redo size

  1054  bytes sent via SQL*Net to client

  462  bytes received via SQL*Net from client

  2  SQL*Net roundtrips to/from client

  0  sorts (memory)

  0  sorts (disk)

  2  rows processed

  SQL> set autotrace off

  ```





  如此一来，我们现在有两个会话，但 `两者` 都使用同一个专用的服务器进程，这一点可以从它们具有相同的 `PADDR` 值得到证明。我们可以在操作系统中确认，没有创建新的进程，并且我们正在使用一个单一进程——即一个单一连接——来处理这两个会话。请注意，其中一个会话（原始会话）的状态是
  `ACTIVE`。这很合理：它正在运行查询以显示此信息，因此当然处于活动状态。但是那个 `INACTIVE` 的会话——它又是做什么的呢？那就是 AUTOTRACE
  会话。它的任务是监视我们真实的会话并报告其活动情况。


  ## 针对 DML 操作的 AUTOTRACE 行为


  当我们在 SQL*Plus 中启用 AUTOTRACE 后，执行 DML 操作（`INSERT`、`UPDATE`、`DELETE`、`SELECT` 和 `MERGE`）时，SQL*Plus
  将执行以下操作：


  1.  如果辅助会话尚不存在，它将使用当前连接创建一个新会话。

  2.  它会要求这个新会话去查询 `V$SESSTAT` 视图，以记住我们将要在其中运行 DML 的那个会话的初始统计值。

  3.  它将在原始会话中运行 DML 操作。

  4.  该 DML 语句完成后，SQL*Plus 会请求另一个会话再次查询 `V$SESSTAT`，并生成前面看到的报告，显示执行 DML 的会话在统计信息上的差异。


  如果你关闭 AUTOTRACE，SQL*Plus 将终止这个附加会话，你将不再能在 `V$SESSION` 中看到它。为什么 SQL*Plus 要耍这个花招呢？答案相当直接。SQL*Plus
  这样做的原因，与我们在第 4 章使用第二个 SQL*Plus 会话来监视内存和临时空间使用情况的原因相同：如果我们使用单个会话来监视内存使用，那么我们就会消耗内存来进行监视。通过观察单个会话中的统计信息，我们必然会改变这些统计信息。如果
  SQL*Plus 使用单个会话来报告执行的 I/O 次数、通过网络传输的字节数以及发生的排序次数，那么用于查找这些细节的查询本身就会增加到统计数据中。它们可能会进行排序、执行
  I/O、通过网络传输数据（可以假设它们会这样做）等等。因此，我们需要使用另一个会话来正确地进行测量。


  ## 没有活动会话的连接


  到目前为止，我们看到的连接都带有一个或两个会话。现在，我们想使用 SQL*Plus 来查看一个没有会话的连接。这个就相当简单了。在用于上一个示例的同一个 SQL*Plus
  窗口中，只需输入那个名称容易误导的命令，`DISCONNECT`：


  ```

  SQL> disconnect

  ```


  从技术上讲，这个命令应该叫做 `DESTROY_ALL_SESSIONS` 而不是 `DISCONNECT`，因为我们实际上并没有物理断开连接。


  **注意**

  SQL*Plus 中真正的断开连接是 "exit"，因为你必须退出才能完全销毁连接。


  然而，我们已经关闭了所有会话。如果我们使用其他用户账户打开另一个会话并进行查询（当然，将 `EODA` 替换为你的账户名）：


  ```

  $ sqlplus / as sysdba

  SQL> select * from v$session where username = ''EODA'';

  no rows selected

  ```


  我们可以看到我们没有任何会话了——但我们仍然有一个进程，一个物理连接（使用之前的 `ADDR` 值）：


  ```

  SQL> select username, program from v$process where addr = hextoraw( ''000000007850D488''
  );

  USERNAME        PROGRAM

  --------------- ------------------------------------------------

  oracle          oracle@orclvm

  ```


  所以，这里我们有一个没有任何关联会话的连接。我们可以使用同样名称容易误导的 SQL*Plus `CONNECT` 命令，在这个现有进程（这个 `CONNECT`
  命令或许应该叫做 `CREATE_SESSION`）中创建一个新会话。使用我们刚刚断开连接的 SQL*Plus 实例，我们将执行以下操作：


  ```

  SQL> connect eoda/foo@PDB1

  SQL> select username, sid, serial#, server, paddr, status

  from v$session

  where username = USER;

  USERNAME               SID    SERIAL# SERVER    PADDR            STATUS

  --------------- ---------- ---------- --------- ---------------- --------

  EODA                    10         25 DEDICATED 000000007850D488 ACTIVE

  ```


  注意，我们的 `PADDR` 和之前相同，所以我们使用的是同一个物理连接，但我们（可能）有一个不同的 SID。我说 `可能`，是因为我们可能被分配相同的 SID——这取决于我们注销期间是否有其他人登录，以及我们原来的
  SID 是否可用。


  **注意**

  在 Windows 或其他基于线程的操作系统上，你可能会看到不同的结果——进程地址可能会改变，因为你连接的是一个线程化的进程，而不是像在 UNIX/Linux
  上那样只是一个单一用途的进程。


  ## 共享服务器连接示例


  到目前为止，这些测试都是使用专用服务器连接执行的，因此 `PADDR` 是我们专用服务器进程的进程地址。如果我们使用共享服务器会怎样呢？我将按如下方式配置我的数据库以使用共享服务器：


  ```

  SQL> alter system set shared_servers=4;

  SQL> alter system set max_dispatchers=8 scope=spfile;

  SQL> alter system set shared_server_sessions=4 scope=spfile;

  SQL> alter system set circuits=200 scope=spfile;

  SQL> alter system set dispatchers="(protocol=TCP)(dispatchers=3)(connections=100)"
  scope=spfile;

  ```


  并且我们需要重启数据库以实例化先前设置的参数：


  ```

  $ sqlplus / as sysdba

  SQL> startup force;

  ```


  现在，让我们重新建立到可插拔数据库的用户连接：


  ```

  $ sqlplus eoda/foo@PDB1

  ```


  我们可以按如下方式验证连接正在使用共享服务器：


  ```

  SQL> select a.username, a.sid, a.serial#, a.server,

  a.paddr, a.status, b.program

  from v$session a left join v$process b

  on (a.paddr = b.addr)

  where a.username = ''EODA'';

  USERNAME     SID    SERIAL# SERVER    PADDR            STATUS   PROGRAM

  ---------- ----- ---------- --------- ---------------- -------- -----------

  EODA          41      12900 SHARED    000000007B10D488 ACTIVE   oracle@orclvm (S003)

  ```


  我们的共享服务器连接关联到一个进程——`PADDR` 在那里，我们可以连接到 `V$PROCESS` 来获取这个进程的名称。在这个例子中，我们看到它是一个共享服务器，由文本
  `S003` 标识。


  但是，如果我们使用另一个 SQL*Plus 窗口来查询相同的信息，同时让我们的共享服务器会话处于空闲状态，我们会看到类似这样的情况：


  ```

  $ sqlplus / as sysdba

  SQL> select a.username, a.sid, a.serial#, a.server,

  a.paddr, a.status, b.program

  from v$session a left join v$process b

  on (a.paddr = b.addr)

  where a.username = ''EODA'';

  USERNAME    SID    SERIAL# SERVER    PADDR            STATUS   PROGRAM

  ---------- ---- ---------- --------- ---------------- -------- ------------

  EODA         41      12900  NONE      000000007B1069A8 INACTIVE oracle@orclvm (D001))

  ```


  注意，我们的 `PADDR` 不同了，我们关联的进程名称也改变了。我们空闲的共享服务器连接现在关联到一个调度程序，`D001`。因此，我们有了另一种观察指向单一进程的多个会话的方法。一个调度程序可能有数百甚至数千个会话指向它。


  共享服务器连接的一个有趣属性是，我们使用的共享服务器进程可以在每次调用之间改变。如果我是这个系统的唯一使用者（就像在这些测试中一样），反复以 `EODA` 身份运行该查询往往会产生相同的
  `PADDR`。然而，如果我打开更多的共享服务器连接并开始在其他会话中使用这些共享服务器连接，那么我可能会注意到我使用的共享服务器会发生变化。





  请看这个示例。我将查询当前的会话信息，显示我正在使用的共享服务器。然后，在另一个共享服务器会话中，我将执行一个长时间运行的操作（即，我将独占该共享服务器）。当我再次询问数据库我正在使用哪个共享服务器时，（在我的当前会话中）我很可能会看到一个不同的服务器（如果原来那个正忙于为其他会话服务的话）。以下示例代表一个通过共享服务器连接的第二个
  SQL*Plus 会话：


  ```

  SQL> select a.username, a.sid, a.serial#, a.server,

  a.paddr, a.status, b.program

  from v$session a left join v$process b

  on (a.paddr = b.addr)

  where a.username = ''EODA'';

  USERNAME     SID    SERIAL# SERVER    PADDR            STATUS   PROGRAM

  ---------- ----- ---------- --------- ---------------- -------- ------------

  EODA          41      12900 SHARED    000000007B10D488 ACTIVE   oracle@orclvm (S003)

  ```


  从另一个终端会话，以用户 `SCOTT` 的身份连接到数据库（以下连接字符串中的 `shared` 映射到 `tnsnames.ora` 文件中的一个条目，该条目指示
  SQL*Plus 通过共享服务器连接进行连接）。作为参考，这是我 `tnsnames.ora` 文件中的 `shared` 条目：


  ```

  shared =

  (DESCRIPTION =

  (ADDRESS = (PROTOCOL = TCP)(HOST = localhost)(PORT = 1521))

  (CONNECT_DATA =

  (SERVER = SHARED)

  (SERVICE_NAME = PDB1)

  )

  )

  ```


  现在我通过共享服务器连接到 `SCOTT`：


  ```

  $ sqlplus scott/tiger@shared

  SQL> exec dbms_lock.sleep(20);

  PL/SQL procedure successfully completed.

  ```


  从最初的 `EODA` 连接，再次运行查询以显示 `PROGRAM` 信息：


  ```

  SQL> select a.username, a.sid, a.serial#, a.server,

  a.paddr, a.status, b.program

  from v$session a left join v$process b

  on (a.paddr = b.addr)

  where a.username = ''EODA'';

  USERNAME     SID    SERIAL# SERVER    PADDR            STATUS   PROGRAM

  ---------- ----- ---------- --------- ---------------- -------- ------------

  EODA          41      12900 SHARED    000000007B109468 ACTIVE   oracle@orclvm (S000)

  ```


  注意：你需要使用一个对 `DBMS_LOCK` 包具有执行权限的账户。我为了实现这一点，授予了我的演示账户 `SCOTT` 对 `DBMS_LOCK` 包的执行权限：`SQL>
  grant execute on dbms_lock to scott;`


  请注意，我第一次查询时，使用的是 `S003` 作为共享服务器。然后，在另一个会话中（以 `SCOTT` 身份），我执行了一个长时间运行的语句，该语句独占了共享服务器，这次碰巧是
  `S003`。第一个不忙的共享服务器会被分配来执行工作，在此情况下没有其他人请求使用 `S003` 共享服务器，因此 `DBMS_LOCK` 命令占用了它。当我在第一个
  SQL*Plus 会话中再次查询时，我被分配到了另一个共享服务器进程 `S000`，因为 `S003` 共享服务器正忙。


  有趣的是，一个查询的解析（尚未返回任何行）可能由共享服务器 `S000` 处理，第一行的提取由 `S001` 处理，第二行的提取由 `S002` 处理，而游标的关闭由
  `S003` 完成。也就是说，一个单独的语句可能会被许多共享服务器逐段处理。


  因此，我们在本节中看到，一个连接——从客户端到数据库实例的一条物理通道——可以在其上建立零个、一个或多个会话。我们在使用 SQL*Plus 的 AUTOTRACE
  功能时已经看到了一个这样的用例。许多其他工具也采用了这种能力。例如，Oracle Forms 在单个连接上使用多个会话来实现其调试功能。Oracle 的 *n*
  层代理认证特性（用于提供从浏览器到数据库的端到端用户标识）大量使用了单个连接承载多个会话的概念，但每个会话可能会使用一个潜在不同的用户账户。我们已经看到，会话随着时间的推移可以使用许多进程，尤其是在共享服务器环境中。此外，如果我们使用
  Oracle Net 的连接池，那么我们的会话可能根本不与任何进程关联；客户端会在空闲时间后丢弃连接，并在检测到活动时透明地重新建立它。


  简而言之，连接和会话之间存在多对多的关系。然而，最常见的、我们大多数人日常看到的情况，是一个专用服务器与单个会话之间的一对一关系。


  ## 专用服务器 vs. 共享服务器 vs. DRCP


  在我们研究其余的进程之前，让我们讨论一下为什么有三种主要的连接模式，以及何时一种模式比另一种更合适。


  ### 何时使用专用服务器


  如前所述，在专用服务器模式下，客户端连接和服务器进程之间存在一一对应的映射。这是迄今为止所有基于 SQL 的应用程序连接到 Oracle 数据库的最常用方法。它设置最简单，提供了建立连接的最简便方式，几乎不需要配置。


  由于是一一映射，你不必担心一个长时间运行的事务会阻塞其他事务。那些其他事务将通过它们自己的专用进程继续进行。因此，在可能存在长时间运行事务的非 OLTP 环境中，这是你应该考虑使用的唯一模式。专用服务器是
  Oracle 的推荐配置，其扩展性相当好。只要你的服务器有足够的硬件（CPU 和 RAM）来服务你的系统所需的专用服务器进程数量，一个专用服务器就可以用于数千个并发连接。


  某些操作必须在专用服务器模式下完成，例如数据库的启动和关闭，因此每个数据库要么同时配备两种服务器，要么只配置一个专用服务器。




  ## 何时使用共享服务器


  共享服务器的设置和配置虽然并不复杂，但相比专用服务器设置多了一个额外的步骤。然而，两者的主要区别并不在于设置，而在于其运行模式。使用专用服务器时，客户端连接与服务器进程之间是一一对应的关系。而使用共享服务器时，则存在一种*多对一*的关系：多个客户端对应一个共享服务器。


  顾名思义，共享服务器是一种共享资源，而专用服务器则不是。使用共享资源时，你必须小心，不要长时间独占它。正如前面所见，在一个会话中使用简单的 `DBMS_LOCK.SLEEP(20)`
  就会独占一个共享服务器进程长达 20 秒。独占这些共享服务器资源可能导致系统看起来像是挂起。


  图 5-2 描述了两个共享服务器。假设有三个客户端，并且它们都试图在大致相同的时间运行一个需要 45 秒的进程，那么其中两个客户端将在 45 秒后得到响应，而第三个客户端将在
  90 秒后得到响应。这是共享服务器的第一条规则：确保你的事务持续时间短。它们可以频繁，但应该简短（正如 `OLTP` 系统的特点）。如果事务不短，由于少数进程独占了共享资源，你将遇到看起来像是整个系统变慢的情况。在极端情况下，如果所有共享服务器都很忙，系统对所有用户来说都会显得像是挂起了，除了那些幸运地独占了共享服务器的少数用户。


  使用共享服务器时，你可能观察到的另一个有趣情况是*人为死锁*。在共享服务器模式下，一定数量的服务器进程由一个潜在庞大的用户群共享。设想一个场景：你有五个共享服务器和一百个已建立的用户会话。在任何时间点，最多只有五个用户会话可以处于活动状态。假设其中一个用户会话更新了一行数据但没有提交。当该用户坐在那里思考其修改时，另外五个用户会话试图锁定同一行数据。它们当然会被阻塞，并会耐心等待该行数据变为可用。现在，持有该行锁的用户会话尝试提交其事务（从而释放该行上的锁）。该用户会话会发现所有共享服务器都被那五个等待的会话独占了。这里我们遇到了一个人为死锁的情况：持有锁的会话将永远无法获得一个共享服务器来允许提交，除非其中一个等待会话放弃其共享服务器。但是，除非等待会话在等待锁时设置了超时，否则它们永远不会放弃其共享服务器（当然，你也可以让管理员通过专用服务器来终止它们的会话，以打破这种僵局）。


  由于这些原因，共享服务器仅适用于以简短、频繁事务为特征的 `OLTP` 系统。在 `OLTP` 系统中，事务在毫秒内执行；任何操作都不会超过几分之一秒。共享服务器非常不适合数据仓库。在那里，你可能会执行一个需要一分钟、两分钟、五分钟或更长时间的查询。在共享服务器下，这将是致命的。如果你的系统
  90%是 `OLTP`，10%是“不完全是 `OLTP`”，那么你可以在同一个实例上混合使用专用服务器和共享服务器。这样，你可以大幅减少为 `OLTP` 用户提供的服务器进程数量，并确保那些“不完全是
  `OLTP`”的用户不会独占他们的共享服务器。此外，DBA 可以使用内置的资源管理器来进一步控制资源利用。


  当然，使用共享服务器的一个重要原因是当你别无选择时。许多高级连接功能需要使用共享服务器。如果你想使用 Oracle Net 连接池，你必须使用共享服务器。如果你想使用数据库之间的数据库链接集中器，那么你必须为这些连接使用共享服务器。


  > 注意

  >

  > 如果你已经在应用程序中使用了连接池功能（例如，你正在使用 `J2EE` 连接池），并且你的连接池大小设置得当，那么使用共享服务器只会抑制性能。你已经根据在任何时间点将获得的并发连接数调整了连接池大小；你希望每个连接都是直接的专用服务器连接。否则，你只是让一个连接池功能连接到另一个连接池功能。


  ## 共享服务器的潜在优势


  考虑到你必须对允许使用它的事务类型有所谨慎，共享服务器有哪些好处呢？共享服务器做了三件事：它减少了操作系统进程/线程的数量，它人为地限制了并发程度，并且它减少了系统所需的内存。让我们更详细地讨论这些要点。


  ### 减少操作系统进程/线程的数量


  在一个拥有数千用户的系统上，操作系统可能很快就不堪重负，试图管理数千个进程。在典型系统中，在任何时间点，只有数千用户中的一部分是并发活跃的。例如，我曾处理过有
  5000 个并发用户的系统。在任何时间点，最多只有 50 个是活跃的。这个系统使用 50 个共享服务器进程就能有效工作，将操作系统需要管理的进程数量减少了两个数量级（100
  倍）。现在，操作系统在很大程度上可以避免上下文切换。



  ## 人为限制并发程度


  作为一名参与过众多基准测试的人，这其中的益处似乎显而易见。运行基准测试时，人们常常要求尽可能增加用户数量，直到系统崩溃为止。这类基准测试的输出结果之一，总是一张显示并发用户数与交易数量关系的图表（参见图
  5-3）。


  ![../images/319655_4_En_5_Chapter/319655_4_En_5_Fig3_HTML.jpg](img/319655_4_En_5_Fig3_HTML.jpg)


  图 5-3


  并发用户数与每秒交易数


  最初，随着并发用户的增加，交易数量也增加。然而，在某个时间点之后，增加更多用户并不会提高每秒可执行的交易数量；图表趋于平缓。吞吐量已达峰值，此时响应时间开始增加。换句话说，你每秒执行的交易数量相同，但终端用户感知到的响应时间变慢了。如果你继续增加用户，会发现吞吐量实际上开始下降。在这个下降点之前的并发用户数，就是你希望在系统上允许的最大并发程度。超过这个点，系统会过载，开始形成执行工作的队列。就像收费站前的拥堵一样，系统再也跟不上了。此时不仅响应时间急剧上升，系统的吞吐量也可能下降，因为仅仅是上下文切换以及在过多消费者之间共享资源所产生的开销本身就需要额外的资源。如果我们将最大并发程度限制在下降点之前，我们就能维持最大吞吐量，并为大多数用户最小化响应时间的增加。共享服务器允许我们将系统上的最大并发程度限制在这个数值。


  对这个过程的一个简单类比是一扇门。门的宽度和人的宽度限制了每分钟通过的最大人数（吞吐量）。在低负载下，没有问题；然而，随着更多人靠近，就会出现一些被迫的等待（CPU
  时间片）。如果很多人想通过这扇门，就会出现倒退效应——太多人说“您先请”以及太多假起步，导致吞吐量下降。每个人都被延迟通过。使用队列意味着吞吐量增加；一些人通过门的速度几乎和没有队列时一样快，而另一些人（被排在队列末尾的人）则经历了最大的延迟，并可能担心“这是个坏主意”。但当你测量每个人（包括最后一个人）通过门的速度时，排队模型（共享服务器）的表现优于自由竞争式方法（即使是礼貌的人；想象一下商店大减价开门时的情景，每个人都使劲往前挤）。


  ## 减少系统所需内存


  这是使用共享服务器被高度宣扬的原因之一：它减少了所需内存量。它确实减少了，但不像你想象的那么显著，特别是考虑到第 4 章讨论的自动 PGA 内存管理——工作区被分配给一个进程，使用后释放，其大小根据并发工作负载而变化。因此，在
  Oracle 的旧版本中，这曾经是`更真实`的事实，但在今天已不那么重要了。另外，请记住，当使用共享服务器时，UGA 位于 SGA 中。这意味着切换到共享服务器时，你必须能够准确预期你的
  UGA 内存需求，并通过`LARGE_POOL_SIZE`参数在 SGA 中适当分配。共享服务器配置的 SGA 需求通常非常大。这部分内存通常必须预先分配，因此只能由数据库实例使用。


  注意


  虽然通过可调整大小的 SGA，你可以随时间增长和收缩这部分内存，但在大多数情况下，它将由数据库实例拥有，不能被其他进程使用。


  与专用服务器对比，在专用服务器中，任何人可以使用任何未分配给 SGA 的内存。如果由于 UGA 位于其中而导致 SGA 大得多，那么节省的内存从何而来？它来自于分配更少的
  PGA。每个专用/共享服务器都有一个 PGA。这是进程信息。包括排序区、哈希区和其他与进程相关的结构。通过使用共享服务器，你从系统中移除的正是这种内存需求。如果你从使用
  5000 个专用服务器变为使用 100 个共享服务器，那么你通过共享服务器节省的，就是那 4900 个不再需要的 PGA（不包括它们的 UGA）的累积大小。


  #### DRCP


  那么，DRCP 特性呢？它具有共享服务器的许多优点，例如减少进程（我们正在进行池化），可能节省内存，而没有那些缺点。它没有人为死锁的风险；例如，在前面的例子中持有资源锁的会话，会从池中获得一个*专用*于它的专用服务器，该会话最终将能够释放锁。它不具备共享服务器的多线程能力；当客户端进程从池中获得一个专用服务器时，它就*拥有*该进程，直到客户端进程释放它。因此，它最适合频繁连接、执行一些相对简短的处理、然后断开连接——一遍又一遍的客户端应用程序；简而言之，适合那些
  API 自身没有高效连接池的客户端进程。


  ### 专用/共享服务器总结


  除非你的系统过载，或者你需要使用共享服务器来实现特定功能，否则专用服务器可能最适合你。专用服务器设置简单（实际上，无需设置），并且使调优更容易。


  注意


  使用共享服务器连接时，会话的跟踪信息（`SQL_TRACE=TRUE`输出）可能分散在许多单独的跟踪文件中；因此，重构该会话所做的操作更加困难。随着`DBMS_MONITOR`包的出现，大部分困难已被消除，但它仍然使事情复杂化。此外，如果一个会话生成了多个相关的跟踪文件，你可以使用`TRCSESS`实用程序来合并这些跟踪文件。


  如果你拥有非常庞大的用户群体，并且*知道*你将使用共享服务器进行部署，我强烈建议你使用共享服务器进行*开发和测试*。如果你只在专用服务器下开发，而从未在共享服务器上测试，这将增加你失败的风险。对系统施加压力，进行基准测试，并确保你的应用程序在共享服务器下行为良好。即，确保它不会长时间独占共享服务器。如果你在开发阶段发现这种情况，修复起来要比在部署阶段容易得多。你可以使用诸如高级队列（AQ）之类的功能，将长时间运行的过程转变为表面上很短的过程，但你必须在设计应用程序时将其*设计*进去。这类事情最好在开发时完成。此外，从历史上看，共享服务器连接和专用服务器连接可用的功能集存在差异。我们已经讨论过
  Oracle 9*i*中缺乏自动 PGA 内存管理，例如，在过去的版本中，即使是像两个表之间的哈希连接这样基本的功能，在共享服务器连接中也不可用。（在当前 9*i*及更高版本中，哈希连接在共享服务器中可用！）



  ## 后台进程


  Oracle 实例由两部分组成：SGA 和一组后台进程。后台进程执行保持数据库运行所需的常规维护任务。例如，有一个进程为我们维护块缓冲区缓存，根据需要将块写入数据文件。另一个进程负责在在线重做日志文件填满时将其复制到归档目标。还有一个进程负责清理已终止的进程等。这些进程中的每一个都专注于自己的工作，但与其他所有进程协同工作。例如，当负责写入日志文件的进程填满一个日志并转向下一个时，它会通知负责归档该已满日志文件的进程有工作要做。


  有一个`V$`视图可以用来查看所有*可能的*Oracle 后台进程，并确定当前系统中正在使用哪些：


  ```

  SQL> select paddr, name, description from v$bgprocess order by paddr desc;

  PADDR            NAME DESCRIPTION

  ---------------- ---- ----------------------------------------

  0000000072FD44C8 MMON Manageability Monitor Process

  00000000727FD850 MMNL Manageability Monitor Process 2

  00000000723FE138 LREG Listener Registration

  00000000723FCFD8 SMON System Monitor Process

  00000000723F9BB8 CKPT checkpoint

  00000000723F8A58 LGWR Redo etc.

  00000000723F78F8 DBW0 db writer process 0

  ...

  00               VMB0 Volume Membership 00

  00               ACFS ACFS CSS

  00               SCRB ASM Scrubbing Master

  00               XDMG cell automation manager

  00               XDWK cell automation worker actions

  401 rows selected.

  ```


  此视图中`PADDR`非`00`的行是配置并在系统上运行的进程（线程）。


  > **提示**

  > 另一种查看当前运行的后台进程的方法是查询`V$PROCESS`，其中`PNAME`不为空。


  后台进程有两类：一类有专门的工作要做（如上所述），另一类执行各种其他工作（即实用进程）。例如，有一个实用后台进程用于通过`DBMS_JOB/DBMS_SCHEDULER`包访问的内部作业队列。此进程监控作业队列并运行其中的任何作业。在许多方面，它类似于专用服务器进程，但没有客户端连接。让我们逐一检查这些后台进程，从有专门工作的开始，然后研究实用进程。


  ### 专注型后台进程


  专门后台进程的数量、名称和类型因版本而异。图 5-4 描述了一个有专门用途的 Oracle 后台进程的*典型集合*。


  ![../images/319655_4_En_5_Chapter/319655_4_En_5_Fig4_HTML.jpg](img/319655_4_En_5_Fig4_HTML.jpg)


  图 5-4


  专注型后台进程


  例如，这是一个使用最少数量的`init.ora`参数启动的数据库：


  ```

  $ sqlplus / as sysdba

  SQL> create pfile=''/tmp/pfile'' from spfile;

  File created.

  SQL> !cat /tmp/pfile

  ```


  `以下是输出片段：`


  ```

  *.audit_file_dest=''/opt/oracle/admin/CDB/adump''

  *.audit_sys_operations=false

  *.audit_trail=''none''

  *.commit_logging=''batch''

  *.commit_wait=''nowait''

  *.compatible=''21.0.0''

  *.control_files=''/opt/oracle/oradata/CDB/control01.ctl'',''/opt/oracle/oradata/CDB/control02.ctl''

  *.db_block_size=8192

  *.db_name=''CDB''

  ```


  启动的后台进程数量因 Oracle 版本而异。一般来说，每个新的主要版本都会比之前的版本多几个后台进程。例如，使用最新版本的 Oracle，大约会启动 60 个后台进程：


  ```

  SQL> select paddr, name, description from v$bgprocess  where paddr  ''00''

  order by paddr desc;

  000000007353FE60 SMON       System Monitor Process

  000000007353E900 LG00       Log Writer Slave

  000000007353D3A0 CKPT       checkpoint

  000000007353BE40 LGWR       Redo etc.

  000000007353A8E0 DBW0       db writer process 0

  0000000073539380 DIA0       diagnosibility process 0

  0000000073537E20 PMAN       process manager


  ```


  请注意，启动实例时可能不会看到所有这些进程，但大部分都会出现。只有当处于`ARCHIVELOG`模式并启用自动归档时，才会看到`ARCn`（归档进程）。只有在运行
  Oracle RAC（一种允许集群中不同机器上的多个实例装入并打开同一个物理数据库的 Oracle 配置）时，才会看到`LMD0`、`LCKn`、`LMON`和`LMSn`（稍后将详细介绍这些进程）进程。


  > **注意**

  > 在一些 UNIX/Linux 平台上，可以混合使用进程和线程。通过将初始化参数`THREADED_EXECUTION`设置为`TRUE`（默认为`FALSE`）来启用此功能。根本没有任何改变——所有“进程”仍然存在；只是可能无法通过操作系统`ps`命令看到它们，因为它们现在作为一个更大进程中的线程运行。


  因此，图 5-4 大致描述了启动 Oracle 实例并装入和打开数据库后可能看到的情况。在 Oracle 实现多进程架构的操作系统上，例如 UNIX/Linux
  系统，您可以物理地看到这些进程。启动实例后，我观察到了以下情况：


  ```

  $ ps -aef | grep ora_...._$ORACLE_SID | grep -v grep

  oracle   24704     1  0 18:55 ?        00:00:00 ora_pmon_CDB

  oracle   24706     1  0 18:55 ?        00:00:00 ora_clmn_CDB

  oracle   24708     1  0 18:55 ?        00:00:00 ora_psp0_CDB

  oracle   24711     1  0 18:55 ?        00:00:02 ora_vktm_CDB

  oracle   24716     1  0 18:55 ?        00:00:00 ora_gen0_CDB

  oracle   24718     1  0 18:55 ?        00:00:00 ora_mman_CDB

  oracle   24722     1  0 18:55 ?        00:00:00 ora_gen1_CDB


  ```


  注意到这些进程使用的命名约定很有趣。进程名以`ora_`开头。后面是代表进程实际名称的四个字符，然后是`_CDB`。碰巧，我的`ORACLE_SID`（站点标识符）是`CDB`。在
  UNIX/Linux 上，这使得识别 Oracle 后台进程并将它们与特定实例关联起来变得非常容易（在 Windows 上，没有简单的方法可以做到这一点，因为后台是更大、单一进程中的线程）。也许最有趣但从前述代码中不容易看出的是，*它们都实际上是同一个二进制可执行程序——每个“程序”并没有单独的可执行文件。*
  尽管努力搜索，但你不会在磁盘上找到`ora_pmon_CDB`二进制可执行文件。你也找不到`ora_lgwr_CDB`或`ora_reco_CDB`。这些进程实际上都是`oracle`（这是运行的可执行文件的名称）。它们只是在启动时给自己起了别名，以便更容易识别哪个是哪个。这使得大量的目标代码可以在
  UNIX/Linux 平台上高效共享。在 Windows 上，这就不那么有趣了，因为它们只是进程内的线程，所以它们当然是一个大的二进制文件。


  现在让我们来看一下每个*主要*进程所执行的功能，从主要的 Oracle 后台进程开始。有关可能的后台进程及其功能的完整列表，请参阅可在[`http://otn.oracle.com/`](http://otn.oracle.com/)免费获取的《Oracle
  数据库参考手册》的附录。



  #### PMON：进程监控器


  该进程负责清理异常终止的连接。例如，如果您的专用服务器因某些原因“故障”或被终止，`PMON` 是负责进行修复（恢复或撤销工作）并释放您资源的进程。`PMON`
  将启动未提交工作的回滚，释放锁，并释放分配给故障进程的 SGA 资源。


  除了清理中止的连接外，`PMON` 还负责监控其他 Oracle 后台进程，并在必要且可能时重新启动它们。如果共享服务器或调度程序失败（崩溃），`PMON` 会介入并重新启动另一个（在为故障进程清理后）。`PMON`
  会监视所有 Oracle 进程，并根据情况重启它们或终止实例。例如，在数据库日志写入器进程 `LGWR` 失败的情况下，终止实例是适当的。这是一个严重的错误，最安全的行动路径是立即终止实例，让正常的恢复来修复数据。（请注意，这种情况很少发生，应立即报告给
  Oracle 支持部门。）


  #### LREG：监听器注册进程


  `LREG` 负责向 Oracle TNS 监听器注册实例和服务。实例启动时，除非另有指示，`LREG` 进程会轮询众所周知的端口地址，以查看监听器是否已启动并正在运行。Oracle
  使用的众所周知/默认端口是 1521。那么，如果监听器在某个不同的端口上启动会怎样？在这种情况下，机制是相同的，只是监听器地址需要通过 `LOCAL_LISTENER`
  参数设置显式指定。您也可以使用 `REMOTE_LISTENER` 参数来指示 `LREG` 向远程监听器注册服务（这在 Oracle RAC 环境中很常见）。


  如果在数据库实例启动时监听器正在运行，`LREG` 会与监听器通信，并向其传递相关参数，如实例的服务名称和负载指标。如果监听器未启动，`LREG` 将定期尝试（通常每
  60 秒）联系它以进行注册。您也可以通过 `ALTER SYSTEM REGISTER` 命令指示 `LREG` 立即尝试向监听器注册服务（这在高可用性环境中很有用）。


  #### SMON：系统监控器


  `SMON` 是执行所有系统级工作的进程。`PMON` 关注单个进程，而 `SMON` 则从系统层面看待事物，是数据库的一种垃圾回收器。它执行的一些工作包括：


  *   清理临时空间：随着真正的临时表空间的出现，清理临时空间的工作有所减少，但并未完全消失。例如，在构建索引期间，为索引分配的区在创建期间被标记为 `TEMPORARY`。如果
  `CREATE INDEX` 会话因某种原因中止，`SMON` 负责清理它们。其他操作也会创建临时区，`SMON` 也将负责清理。


  *   合并空闲空间：如果您使用字典管理的表空间，`SMON` 负责获取表空间中相互连续的空闲区，并将它们合并为一个更大的空闲区。这只发生在默认存储子句的 `PCTINCREASE`
  设置为非零值的字典管理表空间上。


  *   针对不可用文件恢复活动事务：这类似于它在数据库启动期间的角色。在这里，`SMON` 恢复那些因文件不可用而被跳过的失败事务。例如，该文件可能位于不可用或未挂载的磁盘上。当文件变得可用时，`SMON`
  将恢复它。


  *   执行 RAC 中失败节点的实例恢复：在 Oracle RAC 配置中，当集群中的某个数据库实例失败（例如，运行该实例的机器故障）时，集群中的其他节点将打开该失败实例的重做日志文件，并对该失败实例的所有数据执行恢复。


  *   清理 `OBJ$`：`OBJ$` 是一个低级数据字典表，几乎包含数据库中每个对象（表、索引、触发器、视图等）的条目。很多时候，这里面有代表已删除对象的条目，或者代表
  Oracle 依赖机制中使用的“不存在”对象的条目。`SMON` 是移除这些不再需要的行的进程。


  *   管理撤销段：`SMON` 将执行撤销段的自动联机、脱机和收缩。


  *   使回滚段脱机：使用手动回滚段管理（不推荐，您应该使用自动撤销管理）时，DBA 可能使具有活动事务的回滚段 `offline`（脱机）或使其不可用。活动事务可能正在使用此脱机的回滚段。在这种情况下，回滚段并未真正脱机；它被标记为“待脱机”。在后台，`SMON`
  会定期尝试真正使其脱机，直到成功。


  这应该让您了解了 `SMON` 的作用。它还执行许多其他任务，例如刷新出现在 `DBA_TAB_MODIFICATIONS` 视图中的监控统计信息，刷新 `SMON_SCN_TIME`
  表中的 SCN 到时间戳映射信息，等等。`SMON` 进程可能会随着时间的推移积累大量的 CPU，这应被视为正常现象。`SMON` 会定期唤醒（或被其他后台进程唤醒）以执行这些内务管理任务。



  #### RECO：分布式数据库恢复


  `RECO` 的职责非常明确：它负责恢复那些由于崩溃或连接中断而停留在“已准备”状态的 `两阶段提交`（`2PC`）事务。`2PC` 是一种分布式协议，它允许多个独立数据库上的修改能够原子性地提交。它试图在提交前尽可能缩小分布式故障的发生窗口。在涉及
  N 个数据库的 `2PC` 过程中，其中一个数据库——通常是（但不总是）客户端最初登录的那个——将担任协调者。这个站点会询问其他 N-1 个站点是否已准备好提交。实际上，这个站点会去访问其他
  N-1 个站点，要求它们做好提交准备。每个 N-1 的站点会报告其准备状态，结果为 YES 或 NO。如果任何一个站点投票 NO，则整个事务将被回滚。如果所有站点都投票
  YES，那么协调者站点会向其他 N-1 个站点广播消息，使提交永久生效。


  假设某个站点投票 YES 并已准备好提交，但在收到协调者发出的实际提交指令之前，网络发生故障或其他错误，那么该事务就会变成一个 `未确定分布式事务`。`2PC`
  试图限制可能发生这种情况的时间窗口，但无法完全消除它。如果此时恰好发生故障，该事务将成为 `RECO` 的责任。`RECO` 会尝试联系该事务的协调者以查明其结果。在联系到之前，事务将保持未提交状态。当事务协调者再次可联系上时，`RECO`
  将决定提交该事务或将其回滚。


  需要注意的是，如果中断持续很长时间，并且您有一些未完成的事务，您可以手动提交/回滚它们。您可能希望这样做，因为一个 `未确定分布式事务` 可能导致 `写入者阻塞读取者`——这是
  Oracle 中唯一可能发生这种情况的情况。您的 DBA 可以致电其他数据库的 DBA，请求他们查询这些未确定事务的状态。然后您的 DBA 可以提交或回滚它们，从而让
  `RECO` 免除此任务。


  #### CKPT：检查点进程


  检查点进程顾名思义，并不执行检查点操作（检查点操作在第 3 章关于重做日志的部分讨论过）——那主要是 `DBWn` 的工作。它只是通过更新数据文件的文件头来协助检查点过程。`CKPT`
  是一个强制进程，总是会被启动，因此如果您在 UNIX/Linux 上执行 `ps` 命令，通常会看到它（我说“通常”是因为从 Oracle 12*c* 开始，检查点进程有可能在操作系统线程内运行，因此不会显示为一个独立进程）。


  用检查点信息更新数据文件头的工作过去属于 `LGWR`；然而，随着时间的推移，文件数量和数据库规模不断增加，这项额外任务对 `LGWR` 来说负担过重。如果 `LGWR`
  需要更新几十个、几百个甚至上千个文件，那么等待提交这些事务的会话很可能需要等待过长时间。`CKPT` 从 `LGWR` 手中接过了这项职责。


  #### DBWn：数据库块写入器


  数据库块写入器（`DBWn`）是负责将脏块写入磁盘的后台进程。`DBWn` 会从缓冲区缓存中写出脏块，通常是为了腾出更多缓存空间（为读取其他数据释放缓冲区）或推进检查点（将
  Oracle 在实例恢复时需要开始读取的联机重做日志文件的位置向前移动）。正如我们在第 3 章讨论的，当 Oracle 切换日志文件时，会发出一个检查点信号。Oracle
  需要推进检查点，这样它就不再需要刚刚填满的联机重做日志文件。如果在我们需要重用该重做日志文件之前未能完成此操作，我们就会收到“检查点未完成”的消息，并且必须等待。


  注意


  推进日志文件只是检查点活动发生的多种方式之一。还有由参数（如 `FAST_START_MTTR_TARGET`）控制的增量检查点，以及其他触发脏块刷新到磁盘的机制。


  如您所见，`DBWn` 的性能至关重要。如果它写出块的速度不够快，无法为我们释放缓冲区（可以重用以缓存其他块的缓冲区），我们将看到 `空闲缓冲区等待` 和 `写入完成等待`
  的次数和持续时间开始增长。


  我们可以配置多个 `DBWn`；实际上，在 Oracle 的后期版本中，我们可以配置多达 100 个，如下列查询所示：


  ```sql

  SQL> select name, description from v$bgprocess  where description like ''db writer
  process%'';

  NAME  DESCRIPTION

  ----- ----------------------------------------------------------------

  DBW0  db writer process 0

  DBW1  db writer process 1

  DBW2  db writer process 2

  ...

  BW97  db writer process 97

  BW98  db writer process 98

  BW99  db writer process 99

  100 rows selected.

  ```


  大多数系统运行一个数据库块写入器，但更大、多 CPU 的系统可以利用多个。这样做通常是为了分散维护 SGA 中大型块缓冲区缓存为“干净”状态以及将脏（已修改）块刷新到磁盘的工作负载。


  最优情况下，`DBWn` 使用异步 I/O 将块写入磁盘。通过异步 I/O，`DBWn` 收集一批要写入的块并将其交给操作系统。`DBWn` 不等待操作系统实际写出这些块；相反，它返回并收集下一批要写入的块。随着操作系统完成写入操作，它会异步通知
  `DBWn` 已完成写入。这使得 `DBWn` 的工作速度比必须串行执行所有操作快得多。我们将在后面的“从属进程”部分看到，如何在平台或配置不支持异步 I/O
  时使用 I/O 从属进程来模拟异步 I/O。


  关于 `DBWn`，我想最后再说明一点。根据其定义，它几乎总是会写出散布在磁盘各处的块——`DBWn` 进行大量的分散写入。当您执行更新时，您会修改存储在四处且在磁盘上也随机分布的索引块和数据块。另一方面，`LGWR`
  则对重做日志进行大量的顺序写入。这是一个重要的区别，也是 Oracle 为什么除了 `DBWn` 进程外还需要重做日志和 `LGWR` 进程的原因之一。分散写入明显慢于顺序写入。通过让
  SGA 缓冲脏块并让 `LGWR` 进行可以重新创建这些脏缓冲区的大型顺序写入，我们实现了性能的提升。`DBWn` 在后台执行其较慢的工作，而 `LGWR` 在用户等待时执行其较快的工作，这一事实为我们带来了更好的整体性能。即使
  Oracle 在技术上可能做了比需要更多的 I/O（写入日志和数据文件），这也成立；理论上，如果在提交时 Oracle 直接将修改的块物理写入磁盘，就可以跳过对联机重做日志的写入。但实际上，情况并非如此。`LGWR`
  为每个事务将重做信息写入联机重做日志，而 `DBWn` 在后台将数据库块刷新到磁盘。




  ## LGWR：日志写入器


  `LGWR`进程负责将位于 SGA 中的重做日志缓冲区内容刷新到磁盘。当满足以下任一条件时，它会执行此操作：


  *   每三秒

  *   当发出`COMMIT`或`ROLLBACK`时

  *   当`LGWR`被要求切换日志文件时

  *   当重做缓冲区满三分之一或包含 1MB 的缓存重做日志数据时


  因此，拥有一个巨大（数百/数千 MB）的重做日志缓冲区并不实际；Oracle 永远无法完全使用它，因为它基本上在持续刷新它。与`DBWn`必须执行的分散 I/O
  相比，日志是以顺序写入的方式写入的。像这样进行批量写入比对文件各个部分执行许多分散写入要高效得多。这正是首先拥有`LGWR`和重做日志的主要原因之一。仅使用顺序
  I/O 写出更改字节的效率，超过了由此产生的额外 I/O 开销。Oracle 本可以在您提交时直接将数据库块写入磁盘，但这将导致大量完整块的分散 I/O，这将比让`LGWR`顺序写出更改要慢得多。


  > 注意

  >

  > 从 Oracle 12*c*开始，Oracle 将在多处理器机器上启动额外的日志写入器工作进程（`LG0`），以提高写入联机重做日志文件的性能。


  ## ARCn：归档进程


  `ARCn`进程的工作是在`LGWR`填满一个联机重做日志文件后将其复制到另一个位置。这些归档重做日志文件随后可用于执行介质恢复。联机重做日志用于在电源故障（实例终止时）修复数据文件，而归档重做日志用于在硬盘故障时修复数据文件。如果我们丢失了包含数据文件的磁盘驱动器，例如`/u01/dbfile/CDB/system01.dbf`，我们可以从上周的备份中恢复该文件的旧副本，并要求数据库应用自该备份以来生成的所有归档和联机重做日志。这将使该文件与数据库中的其他数据文件保持同步，我们可以继续处理而不会丢失数据。


  `ARCn`通常将联机重做日志文件复制到至少另外两个位置（冗余是不丢失数据的关键）。这些其他位置可能是本地机器上的磁盘，或者更合适的是，至少一个位于完全不同的机器上，以防发生灾难性故障。在许多情况下，这些归档重做日志文件会被某个其他过程复制到某些三级存储设备，例如磁带。它们也可能被发送到另一台计算机以应用到备用数据库，这是
  Oracle 提供的一种故障转移选项。我们稍后将讨论其中涉及的进程。


  ## DIAG：可诊断性进程


  `DIAG`进程监控实例的整体健康状况，并捕获处理实例故障或进程故障所需的信息。`DIAG`进程还在其他进程请求时执行诊断转储。这适用于单实例配置和多实例 RAC
  配置。


  ## FBDA：闪回数据归档进程


  闪回数据归档进程是闪回数据归档功能的核心组件——该功能允许查询“截至”很久以前的数据（例如，查询一年前、五年前等时间点表中的数据）。这种长期历史查询能力是通过维护表中每一行随时间变化的历史记录来实现的。而这一历史记录，则由后台的`FBDA`进程维护。该进程在事务提交后不久开始工作。`FBDA`进程将读取该事务生成的
  UNDO 并回滚事务所做的更改。然后，它会将这些回滚后（原始值）的行记录到我们的闪回数据归档中。


  ## DBRM：数据库资源管理器进程


  此进程实现可为数据库实例配置的资源计划。它设置资源计划并执行与强制/实施这些资源计划相关的各种操作。资源管理器允许数据库管理员对数据库实例、访问数据库的应用程序或访问数据库的单个用户所使用的资源进行细粒度控制。


  ## GEN0：通用任务执行进程


  如其名所示，此进程为数据库提供通用任务执行线程。此进程的主要目标是将潜在的阻塞处理（会导致进程在该处理期间停止的处理）从其他一些进程中卸载，并在后台执行。例如，如果主
  ASM 进程需要执行某个阻塞文件操作，但该操作可以安全地在后台完成（ASM 可以在操作完成之前安全地继续处理），那么 ASM 进程可以请求`GEN0`进程执行此操作，并让`GEN0`在完成后通知它。它的性质类似于本章后面进一步描述的从属进程。


  例如，`if (condVar > someVal) {console.log("xxx")}`。




  #### 其他常见的聚焦进程


  根据您所使用的 Oracle 功能，可能还会看到其他聚焦进程。此处列出了一些，并附有其功能的简要说明。


  完整的后台进程及其功能列表，请参阅《*Oracle Database 参考*》手册的附录 F（后台进程），该手册可在 [`http://otn.oracle.com/`](http://otn.oracle.com/)
  上获取。


  前面描述的大部分进程是**必须的**——只要您有 Oracle 实例在运行，就会有这些进程。（`ARCn` 从技术上讲是可选的，但在我看来，对于所有生产数据库都是**必须的**！）以下进程是可选的，仅在您使用特定功能时才会出现。以下进程是使用
  ASM 的数据库实例所独有的，如第 3 章所述：


  *   *自动存储管理后台*（`ASMB`）*进程*：`ASMB` 进程运行在利用 ASM 的数据库实例中。它负责与管理存储的 ASM 实例通信，向 ASM 实例提供更新的统计信息，并向
  ASM 实例提供心跳信号，让 ASM 实例知道它仍然存活且正常运行。


  *   *再平衡*（`RBAL`）*进程*：`RBAL` 进程也运行在利用 ASM 的数据库实例中。当磁盘被添加到 ASM 磁盘组或从 ASM 磁盘组移除时，它负责处理再平衡请求（即重新分布请求）。


  以下进程在 Oracle RAC 实例中出现。RAC 是 Oracle 的一种配置，允许集群中运行在不同节点（通常是不同的物理计算机）上的多个实例挂载并打开单个数据库。它使您能够拥有多个实例以完全读写方式访问同一组数据库文件。RAC
  的主要目标有两个：


  *   *高可用性*：借助 Oracle RAC，如果集群中的一个节点/计算机因软件、硬件或人为错误而发生故障，其他节点可以继续运行。数据库将通过其他节点保持可访问。您可能会损失一些计算能力，但不会失去对数据库的访问。


  *   *可扩展性*：与其购买越来越大的机器来处理不断增加的工作负载（称为*纵向扩展*），RAC 允许您以在集群中添加更多机器的形式增加资源（称为*横向扩展*）。与其将
  4 CPU 的机器换成可以扩展到 8 或 16 CPU 的机器，RAC 为您提供了添加另一台相对廉价的 4 CPU 机器（或不止一台）的选项。


  以下进程是 RAC 环境所独有的。在其他情况下您不会看到它们：


  *   *锁监控器*（`LMON`）*进程*：`LMON` 进程监控集群中的所有实例以检测实例故障。然后，它协助恢复故障实例持有的全局锁。当实例离开集群或被添加到集群时（例如实例故障后重新上线，或新实例实时添加到集群），它还负责重新配置锁和其他资源。


  *   *锁管理器守护程序*（`LMD0`）*进程*：`LMD` 进程处理全局缓存服务的锁管理器服务请求（保持实例间块缓冲区一致）。它主要充当代理，将资源请求发送到由
  `LMSn` 进程处理的队列。`LMD` 处理全局死锁检测/解决，并监控全局环境中的锁超时。此外，从 Oracle 12*c* 开始，可能会有由 `LMD0`
  进程生成的 `LDDn` 从属进程来协助处理工作负载。


  *   *锁管理器服务器*（`LMSn`）*进程*：如前所述，在 RAC 环境中，Oracle 的每个实例都运行在集群中的不同机器上，并且它们都以读写方式访问完全相同的数据库文件集。为实现这一点，SGA
  块缓冲区缓存必须彼此保持一致。这是 `LMSn` 进程的主要目标之一。在早期的 Oracle 并行服务器（OPS）版本中，这是通过*ping*来完成的。也就是说，如果集群中的一个节点需要某个块的读一致性视图，而该块已被另一个节点以独占模式锁定，那么数据交换是通过磁盘刷新（该块被
  ping）完成的。这仅仅是为了读取数据而进行的一项非常昂贵的操作。现在，借助 `LMSn`，这种交换是通过集群高速连接上的非常快速的缓存到缓存交换完成的。每个实例最多可以有十个
  `LMSn` 进程。


  *   *锁*（`LCK0`）*进程*：此进程在功能上与前面描述的 `LMD` 进程非常相似，但它处理除数据库块缓冲区之外的所有全局资源的请求。


  以下是大多数单实例或 RAC 实例中常见的后台进程：


  *   *进程生成器*（`PSP0`）*进程*：此进程负责生成（启动/创建）各种后台进程。它是为 Oracle 实例创建新进程/线程的进程。它在实例启动期间完成大部分工作。


  *   *虚拟时间守护程序*（`VKTM`）*进程*：为 Oracle 实例实现一个一致、细粒度的时钟。它负责提供挂钟时间（人类可读的）和用于测量持续时间和间隔的极高分辨率计时器（不一定使用挂钟时间构建，更像是一个对极小时间单位递增的计时器）。


  *   *资源管理器的虚拟调度器*（`VKRM`）*进程*：资源管理器的调度器。管理 CPU 调度和具有活动资源计划的托管进程。


  *   *空间管理协调器*（`SMCO`）*进程*：此进程是可管理性基础设施的一部分。它协调数据库的主动空间管理功能，例如发现可回收空间的进程和执行回收操作的进程。


  ### 实用工具后台进程


  这些后台进程完全是可选的，取决于您对它们的需求。它们提供的设施对于日常运行数据库并非必需，除非您自己在使用它们（例如作业队列），或者正在使用利用它们的功能（例如诊断功能）。


  在 UNIX/Linux 中，这些进程会像任何其他后台进程一样可见。如果您执行 `ps` 命令，您会看到它们。在我之前“聚焦后台进程”部分开头的 `ps` 列表中（此处部分转载），您可以看到我有：


  *   配置了作业队列。`CJQ0` 进程是作业队列协调器。


  *   配置了 Oracle AQ，证据是 `Qnnn`（AQ 队列进程）和 `QMNC`（AQ 监控进程）。


  *   启用了自动内存管理，证据是内存管理器（`MMAN`）进程。


  *   启用了 Oracle 可管理性/诊断功能，证据是可管理性监视器（`MMON`）和轻量级可管理性监视器（`MMNL`）进程。


  让我们来看看根据您使用的功能，可能会看到哪些不同的进程。




  ## CJQ0 与 Jnnn 进程：作业队列


  在最初的 7.0 版本中，Oracle 以一种称为 `snapshots` 的数据库对象形式提供复制功能。作业队列是刷新或更新这些 `snapshots` 的内部机制。


  作业队列进程监控一个作业表，该表告知它何时需要刷新系统中的各种 `snapshots`。在 Oracle 7.1 中，Oracle 公司通过一个名为 `DBMS_JOB`
  的数据库包公开了此功能供所有人使用。因此，在 7.0 版本中仅为 `snapshots` 所独有的进程，在 7.1 及更高版本中成为了“作业队列”。随着时间的推移，控制作业队列行为的参数（应检查的频率以及应有多少个队列进程）名称从
  `SNAPSHOT_REFRESH_INTERVAL` 和 `SNAPSHOT_REFRESH_PROCESSES` 更改为 `JOB_QUEUE_INTERVAL`
  和 `JOB_QUEUE_PROCESSES`。在当前版本中，只有 `JOB_QUEUE_PROCESSES` 参数作为用户可调整的设置公开。


  你最多可以拥有 1000 个作业队列进程。它们的名字将是 `J000` … `J999`。这些进程在作为物化视图刷新过程一部分的复制中被大量使用。基于 Streams
  的复制使用 AQ 进行复制，因此不使用作业队列进程。开发人员也经常使用作业队列来安排一次性（后台）作业或定期作业，例如在后台发送电子邮件或在后台处理长时间运行的批处理过程。通过在后台做一些工作，你可以让一个长任务在不耐烦的最终用户看来花费的时间少得多（他们感觉速度变快了，即使任务可能尚未完成）。这类似于
  Oracle 使用 `LGWR` 和 `DBWn` 进程的方式；它们在后台完成了大部分工作，因此你无需实时等待它们完成所有任务。


  `Jnnn` 进程（其中 `nnn` 代表一个数字）非常类似于共享服务器，但具有专用服务器的某些方面。它们的共享性体现在它们一个接一个地处理作业，但它们管理内存的方式更像专用服务器（它们的
  UGA 内存位于 PGA 中，而不是 SGA 中）。每个作业队列进程一次将正好运行一个作业，依次运行直至完成。这就是为什么如果我们希望同时运行作业，可能需要多个进程。没有线程或作业抢占。一旦作业开始运行，它将运行至完成（或失败）。


  你会注意到 `Jnnn` 进程会随着时间的推移而出现和消失。也就是说，如果你配置了最多 1000 个，你不会看到 1000 个进程随数据库启动。相反，只有一个进程——作业队列协调器（`CJQ0`）——会启动，当它在作业队列表中看到需要运行的作业时，它会启动
  `Jnnn` 进程。当 `Jnnn` 进程完成工作并发现没有新作业要处理时，它们将开始退出、消失。因此，如果你安排大多数作业在凌晨 2 点无人时运行，你可能永远看不到这些
  `Jnnn` 进程。


  ## QMNC 与 Qnnn：高级队列


  `QMNC` 进程之于 AQ 表，正如 `CJQ0` 进程之于作业表。它监控高级队列，并向等待消息的 `dequeuers` 发出消息已可用的警报。`QMNC`
  和 `Qnnn` 还负责队列*传播*——即在一个数据库中入队（添加）的消息能够移动到另一个数据库的队列中以便出队的能力。


  `Qnnn` 进程之于 `QMNC` 进程，正如 `Jnnn` 进程之于 `CJQ0` 进程。它们由 `QMNC` 进程通知需要执行的工作，并处理这些工作。


  `QMNC` 和 `Qnnn` 进程是可选的后台进程。参数 `AQ_TM_PROCESSES` 指定了最多创建 40 个名为 `Qnnn`（其中 `nn` 是数字
  0-15 或字母 a-z）的进程和一个单独的 `QMNC` 进程。


  与作业队列使用的 `Jnnn` 进程不同，`Qnnn` 进程是持久的。如果你将 `AQ_TM_PROCESSES` 设置为 10，你会在数据库启动时以及实例的整个生命周期内看到十个
  `Q0nn` 进程和 `QMNC` 进程。


  Oracle 会自动调整队列进程的数量，因此你很少需要手动设置 `AQ_TM_PROCESSES`。如果你确实设置了此参数，Oracle 仍会自动调整生成的进程数量，并使用
  `AQ_TM_PROCESSES` 的值作为要创建的最小进程数。


  注意


  从 Oracle 12*c* 开始，引入了一个高级队列进程协调器（`AQPC`）进程。其目的是创建和管理主高级队列进程（启动、停止等）。与该进程相关的统计信息可以从
  `GV$AQ_BACKGROUND_COORDINATOR` 视图中查询。


  ## EMNC：事件监视器进程


  `EMNC` 进程是 AQ 架构的一部分。它用于通知队列订阅者他们可能感兴趣的消息。此通知是异步执行的。有可用的 Oracle 调用接口（OCI）函数可用于注册用于消息通知的回调。回调是
  OCI 程序中的一个函数，每当队列中有感兴趣的消息可用时，它将被自动调用。`EMNn` 后台进程用于通知订阅者。当实例发出第一个通知时，`EMNC` 进程会自动启动。然后，应用程序可以发出显式的
  `message_receive(dequeue)` 来检索消息。


  ## MMAN：内存管理器


  此进程由自动 SGA 大小调整功能使用。`MMAN` 进程协调共享内存组件（默认缓冲池、共享池、Java 池和大池）的大小调整和重新调整。


  ## MMON、MMNL 与 Mnnn：可管理性监视器


  这些进程用于填充自动工作量存储库（AWR），这是一项功能。`MMNL` 进程按计划将统计信息从 SGA 刷新到数据库表中。`MMON` 进程用于自动检测数据库性能问题并实施自调整功能。`Mnnn`
  进程类似于作业队列的 `Jnnn` 或 `Qnnn` 进程；`MMON` 进程将请求这些从属进程代表其执行工作。`Mnnn` 进程本质上是瞬态的——它们会根据需要出现和消失。


  ## CTWR：更改跟踪进程


  这是一个可选进程。`CTWR` 进程负责维护更改跟踪文件，如第 [3] 章所述。


  ## RVWR：恢复写入器


  此进程负责维护用于 `FLASHBACK DATABASE` 命令的快速恢复区（如第 [3] 章所述）中块的*之前*映像。


  ## DMnn/DWnn：数据泵主/工作进程


  Data Pump 完全在服务器中运行，其 API 通过 PL/SQL 提供。由于 Data Pump 在服务器中运行，因此添加了执行各种 Data Pump
  操作的支持。Data Pump 主进程（`DMnn`）收集来自客户端进程的所有输入（它是接收 API 输入的进程），然后协调工作进程（`DWnn`），这些进程执行实际工作——`DMnn`
  进程实际处理元数据和数据。




  ## TMON/TT00：传输监控器与重做传输从属进程


  从 Oracle 12*c* 开始，两个与 Data Guard 相关的进程会在实例启动时自动启动：传输监控器进程 (`TMON`) 和重做传输从属进程 (`TT00`)。`TMON`
  将启动并监控多个 `TT00` 进程。`TT00` 进程用于在需要时通知 `LGWR` 进程生成心跳重做。即使您没有实施 Data Guard，也可能看到这些进程启动。您无需担心这些进程，只需知道它们存在，并且在您实施
  Data Guard 时会被使用。


  如果您确实实施了 Data Guard，将会启动许多其他进程以促进重做信息从一个数据库传输到另一个数据库并应用。有关完整详情，请参阅 Oracle 的 *Data
  Guard Concepts and Administration* 手册。


  ## 剩余的实用后台进程


  那么，这是完整的列表吗？不，远非如此，根据您实施的功能，还有许多其他进程。例如，当您实施诸如 Oracle RAC、Oracle GoldenGate、Oracle
  Data Guard 等产品时，会存在 Streams 应用和捕获进程。然而，前面的列表涵盖了您将遇到的大多数常见后台进程。


  ## 从属进程


  现在，我们准备查看 Oracle 进程的最后一类：`slave` 进程。Oracle 有两种类型的从属进程：I/O 从属和并行查询从属。


  ### I/O 从属


  I/O 从属用于为那些不支持异步 I/O 的系统或设备模拟异步 I/O。例如，磁带设备（众所周知速度慢）不支持异步 I/O。通过使用 I/O 从属，我们可以为磁带驱动器模拟操作系统通常为磁盘驱动器提供的功能。与真正的异步
  I/O 一样，写入设备的进程批处理大量数据并将其移交以供写入。当数据成功写入后，写入者（这次是我们的 I/O 从属，*不是*操作系统）会通知原始调用者，后者从其待写入数据列表中移除该批数据。通过这种方式，我们可以实现更高的吞吐量，因为是
  I/O 从属在等待慢速设备，而它们的调用者则在执行其他重要工作，为下一次写入准备数据。


  I/O 从属在 Oracle 的几个地方使用。`DBWn` 和 `LGWR` 可以利用它们来模拟异步 I/O，而 RMAN 在写入磁带时也会使用它们。


  两个参数控制 I/O 从属的使用：


  *   `BACKUP_TAPE_IO_SLAVES`：此参数指定 RMAN 是否使用 I/O 从属来备份、复制或还原数据到磁带。由于此参数是围绕 *磁带* 设备设计的，并且磁带设备在任何时候可能仅由一个进程访问，因此此参数是一个布尔值，而不是您可能期望的要使用的从属进程数量。RMAN
  将根据所使用的物理设备数量启动尽可能多的从属进程。当 `BACKUP_TAPE_IO_SLAVES = TRUE` 时，会使用 I/O 从属进程写入或读取磁带设备。如果此参数为
  `FALSE`（默认值），则备份时不使用 I/O 从属。相反，参与备份的专用服务器进程将直接访问磁带设备。


  *   `DBWR_IO_SLAVES`：此参数指定 `DBW0` 进程使用的 I/O 从属数量。`DBW0` 进程及其从属进程始终执行缓冲区高速缓存中脏块的磁盘写入。默认情况下，该值为零，不使用
  I/O 从属。请注意，如果将此参数设置为非零值，`LGWR` 和 `ARCn` 也将使用它们自己的 I/O 从属；最多允许为 `LGWR` 和 `ARCn` 分配四个
  I/O 从属。


  `DBWn` I/O 从属以 `I1nn` 名称出现，而 `LGWR` I/O 从属以 `I2nn` 名称出现。


  ### Pnnn：并行查询执行服务器


  并行查询是将诸如 `SELECT`、`CREATE TABLE`、`CREATE INDEX`、`UPDATE` 等 SQL 语句转化为包含许多可以同时执行的子执行计划的执行计划的能力。每个子计划的输出被合并成一个更大的结果集。目标是以串行方式所需时间的一小部分来完成操作。例如，假设您有一个分布在十个不同文件上的超大表。您有
  16 个 CPU 可用，并且需要对该表执行即席查询。将查询计划分解为 32 个小片段并真正利用该机器可能比仅使用一个进程串行读取和处理所有数据更有优势。


  使用并行查询时，您会看到名为 `Pnnn` 的进程——这些就是并行查询执行服务器本身。在处理并行语句期间，您的服务器进程将被称为 *并行查询协调器*。它在操作系统级别的名称不会改变，但当您阅读有关并行查询的文档时，如果提到协调器进程，请知道它只是您原始的服务器进程。


  对于最新版本的 Oracle，您的实例将自动创建几个并行服务器进程。这是因为 `PARALLEL_MIN_SERVERS` 参数被设置为非零值（由 `CPU_COUNT
  * PARALLEL_THREADS_PER_CPU * 2` 得出）。例如，在我的双 CPU 机器上（`CPU_COUNT` 参数为 2，`PARALLEL_THREADS_PER_CPU`
  参数为 1），我们可以看到以下四个并行执行服务器在运行：


  ```

  $ ps -ef | grep ora_p00 | grep -v grep

  oracle   24790     1  0 18:55 ?        00:00:00 ora_p000_CDB

  oracle   24792     1  0 18:55 ?        00:00:00 ora_p001_CDB

  oracle   24811     1  0 18:55 ?        00:00:00 ora_p002_CDB

  oracle   24813     1  0 18:55 ?        00:00:00 ora_p003_CDB

  ```


  **提示**


  有关并行处理的完整详情，请参见第 14 章。


  ## 总结


  我们已经介绍了 Oracle 使用的文件，从不起眼但重要的参数文件到数据文件、重做日志文件等等。我们查看了 Oracle 使用的内存结构内部，包括服务器进程和
  SGA 中的结构。我们已经看到不同的服务器配置（例如连接模式是共享服务器还是专用服务器）将对系统如何使用内存产生巨大影响。最后，我们查看了使 Oracle 能够运行其功能的进程（或线程，取决于操作系统）。现在，我们准备查看
  Oracle 其他一些功能的实现，例如锁、并发控制和事务。



  '
- '# 6. 锁定与栓锁


  开发多用户、数据库驱动应用程序的一个关键挑战是最大化并发访问，同时确保每个用户都能以一致的方式读取和修改数据。实现这一点的锁定机制是任何数据库的关键特性，而 Oracle
  在提供这些机制方面表现出色。然而，Oracle 对这些功能的实现是特定于 Oracle 的——就像 SQL Server 的实现是特定于 SQL Server
  一样——这取决于你，作为应用程序开发人员，要确保当你的应用程序执行数据操作时，它正确地使用了这些机制。如果你未能做到这一点，你的应用程序将表现出意外的行为，并且不可避免地，你的数据完整性将受到损害（如第
  1 章所演示）。


  在本章中，我们将详细探讨 Oracle 如何锁定数据（例如，`表中的行`）和共享数据结构（例如，在 `SGA` 中的结构）。我们将研究 Oracle 锁定数据的粒度以及这对作为开发人员的你意味着什么。在适当的时候，我会将
  Oracle 的锁定方案与其他流行实现进行对比，主要是为了破除行级锁定增加开销的迷思；实际上，只有当实现本身增加开销时，它才会增加开销。在下一章中，我们将继续这个讨论，研究
  Oracle 的多版本技术以及锁定策略如何与之交互。


  ## 什么是锁？


  `锁` 是用于调节并发访问共享资源的机制。请注意我使用了术语“共享资源”而不是“数据库行”。确实，Oracle 在行级锁定表数据，但它也在许多其他级别使用锁，以提供对各种资源的并发访问。例如，当一个
  `存储过程` 正在执行时，该过程本身会被锁定在一种模式中，允许其他人执行它，但不会允许另一个用户以任何方式更改该 `存储过程` 的那个实例。在数据库中，锁用于允许并发访问这些共享资源，同时提供数据完整性和一致性。


  在单用户数据库中，锁不是必需的。根据定义，只有一个用户在修改信息。然而，当多个用户访问和修改数据或数据结构时，拥有一个机制来防止对同一信息的并发修改至关重要。这正是锁定的意义所在。


  理解这一点非常重要：数据库中实现锁定的方式与数据库的种类一样多。仅仅因为你有某个特定关系数据库管理系统（`RDBMS`）锁定模型的经验，并不意味着你了解关于锁定的一切。例如，在我深入接触
  Oracle 之前，我使用过其他数据库，包括 Sybase、Microsoft SQL Server 和 Informix。所有这三个数据库都提供了用于并发控制的锁定机制，但在每个数据库中实现锁定的方式存在深刻而根本的差异。


  为了说明这一点，我将概述我从 Sybase SQL Server 开发人员，到 Informix 用户，最终成为 Oracle 开发人员的历程。这是很多年前的事了，SQL
  Server 的粉丝们现在可能会告诉我：“但是我们现在有行级锁定！” 确实如此：SQL Server 现在可能使用行级锁定，但其实现方式与 Oracle 中的实现方式完全不同。这是苹果和橘子的比较，而这正是关键点。


  作为一名 SQL Server 程序员，我几乎从不考虑多个用户并发向一个表插入数据的可能性。在那个数据库中，这种情况很少发生。当时，SQL Server 仅提供页级锁定，而且由于所有数据往往都插入到非聚簇表的最后一页，两个用户的并发插入根本不会发生。


  > **注意**

  > SQL Server 聚簇表（具有聚簇索引的表）在某些方面与 Oracle 集群相似，但非常不同。SQL Server 过去只支持页（块）级锁定；如果每一行插入都去到表的“末尾”，那么在那个数据库中永远不会有并发插入或并发事务。SQL
  Server 中的聚簇索引用于将行插入到整个表中，按聚簇键排序，从而提高了该数据库的并发性。


  同样的问影响了并发更新（因为在 SQL Server 中，一个 `` `UPDATE` `` 实际上是一个 `` `DELETE` `` 后跟一个 `` `INSERT`
  ``）。也许这就是为什么 SQL Server 默认在执行每一条语句后立即提交或回滚，以牺牲事务完整性为代价来尝试获得更高的并发性。


  因此，在大多数情况下，使用页级锁定，多个用户无法同时修改同一个表。雪上加霜的是，当一个表正在被修改时，许多查询实际上也被该表阻塞了。如果我尝试查询一个表，而需要的一个页被一个更新锁定了，我就会等待（并且等待，再等待）。锁定机制非常糟糕，以至于支持持续超过一秒的事务是致命的——整个数据库看起来就像冻结了一样。因此，我养成了很多坏习惯。我了解到事务是“坏的”，你应该快速提交，永远不要持有数据锁。并发是以一致性为代价的。你要么想做对，要么想快。我开始相信你无法两者兼得。


  当我转向 Informix 时，情况好了一些，但好得不多。只要我记住创建一个启用了行级锁定的表，那么我实际上可以让两个人同时向该表插入数据。不幸的是，这种并发性代价高昂。Informix
  实现中的行级锁在时间和内存方面都很昂贵。获取和释放它们需要时间，而且每个锁都消耗实际内存。此外，系统可用的锁总数必须在启动数据库之前计算好。如果你超过了那个数字，那你就只能自认倒霉了。因此，大多数表无论如何都是用页级锁定创建的，而且和
  SQL Server 一样，行级和页级锁都会立即阻止查询。结果，我发现我再次想要尽可能快地提交。我使用 SQL Server 时养成的坏习惯只是得到了强化，此外，我还学会了将锁视为一种非常稀缺的资源——值得觊觎的东西。我了解到你应该手动将锁从行级升级到表级，试图避免获取太多锁而导致系统崩溃，而我确实让它崩溃了——很多次。


  当我开始使用 Oracle 时，我并没有真正费心去阅读手册来了解锁定在这个特定数据库中是如何工作的。毕竟，我已经使用数据库相当长一段时间了，并且被认为是这个领域的某种专家（除了
  Sybase、SQL Server 和 Informix，我还使用过 Ingress、DB2、Gupta SQLBase 和各种其他数据库）。我陷入了这样一个陷阱：相信我知道事情
  `应该` 如何运作，所以我认为它们 `当然` 会以那种方式运作。`我大错特错了。`


  正是在一次基准测试中，我发现了自己错得有多离谱。在这些数据库的早期，供应商为非常大的采购项目进行基准测试以看看谁能最快、最简单、功能最齐全地完成工作是很常见的。



  '
- '# 数据库基准测试与 Oracle 锁机制观察


  基准测试是在 `informix`、`Sybase SQL Server` 和 `Oracle` 之间进行的。`Oracle` 率先出场。他们的技术人员来到现场，通读了基准测试规范，然后开始着手设置。我注意到的第一件事是，来自
  `Oracle` 的技术人员准备使用一个数据库表来记录他们的计时数据，尽管我们将有数十个连接在执行操作，每个连接都会频繁地需要在这个日志表中插入和更新数据。不仅如此，他们还打算在基准测试期间`读取`这个日志表！出于善意，我把其中一个
  `Oracle` 技术人员拉到一边，问他是不是疯了。他们为什么要故意在系统中引入另一个争用点？基准测试的所有进程难道不会因为对这个单一表的操作而全部串行化吗？当其他人正在大量修改这个表时，他们试图从中读取，不会把基准测试搞堵塞吗？他们为什么想引入所有这些需要额外管理的锁？我有几十个类似“你们怎么会考虑那样做？”的问题。当时，`Oracle`
  的技术人员觉得我有点傻。直到我打开一个 `Sybase SQL Server` 或 `informix` 的窗口，向他们展示了两个人向一个表插入数据，或者当有人试图查询一个表而其他人正在插入行时的效果（查询每秒返回零行）。`Oracle`
  的处理方式与几乎其他所有数据库的处理方式之间的差异是巨大的——简直是天壤之别。


  不用说，`informix` 和 `SQL Server` 的技术人员在他们的尝试中，都不太热衷于在基准测试期间使用数据库日志表的方法。他们更倾向于将计时数据记录到操作系统的平面文件中。`Oracle`
  的人离开时，对如何与 `Sybase SQL Server` 和 `informix` 竞争有了更清晰的认识：只需问观众“你们当前的数据库在数据被锁定时每秒返回多少行？”然后就此展开。


  这个故事的寓意有两点。首先，`所有数据库在根本上都是不同的`。其次，当你为一个新的数据库平台设计应用程序时，你绝不能对该数据库的工作方式做出任何假设。`你必须像从未使用过数据库一样去对待每一个新数据库。`
  你在一种数据库中会做的事情，在另一种数据库中要么不必要，要么根本就行不通。


  在 `Oracle` 中，你会了解到：


  *   事务是数据库的核心。它们是件好事。

  *   你应该将提交推迟到正确的时刻。你不应该为了减轻系统压力而快速提交，因为拥有长或大的事务并不会给系统带来压力。规则是 `必须提交时才提交，不要提前`。你的事务应该只根据你的业务逻辑来决定其大小。（一个有趣的旁注：就在今天早上，我刚刚在
  `http://asktom.oracle.com` 上写下了这个提交规则——“必须提交时才提交，不要提前”——可能已经是第一百万次了。有些事情永远不会改变。）

  *   你应该在需要的时间内持有数据上的锁。它们是供你使用的工具，而不是需要避免的东西。锁不是一种稀缺资源。相反，你也应该只在需要的时间内持有数据上的锁。锁可能并不稀缺，但它们可能会阻止其他会话修改信息。

  *   在 `Oracle` 中，行级锁没有额外开销——`完全没有`。无论你有一个行锁还是一百万个行锁，用于锁定此信息的资源数量都是相同的。当然，修改一百万行比修改一行要做更多的工作，但锁定一百万行所需的资源与锁定一行相同；它是一个固定常量。

  *   你绝不应该为了“对系统更好”而升级锁（例如，使用表锁代替行锁）。在 `Oracle` 中，这对系统并不会更好——它不会节省任何资源。有些时候需要使用表锁，例如在批处理过程中，当你知道将更新整个表并且不希望其他会话锁定行时。但你使用表锁并非是为了通过避免分配行锁来让系统更轻松；在这种情况下，你使用表锁是为了确保你能获得批处理程序所需的所有资源。

  *   并发性和一致性可以同时实现。你可以每次都快速且正确地获得它。数据的读取者*不会*被数据的写入者阻塞。数据的写入者*不会*被数据的读取者阻塞。这是 `Oracle`
  与大多数其他关系数据库之间的根本区别之一。


  随着我们涵盖本章及下一章的其余组件，我将强化这些要点。


  ## 锁定问题


  在我们讨论 `Oracle` 使用的各种类型的锁之前，先看一下一些锁定问题是有益的，其中许多问题源于设计糟糕的应用程序，这些程序没有正确使用（或根本没有使用）数据库的锁定机制。




  ## 更新丢失


  更新丢失是一个经典的数据库问题。实际上，它是所有多用户计算机环境中都会出现的问题。简单来说，当以下事件按此处呈现的顺序发生时，就会发生更新丢失：


  1.  会话 1 中的一个事务将一行数据检索（查询）到本地内存中，并将其显示给终端用户 User1。

  2.  会话 2 中的另一个事务检索同一行数据，但将其显示给不同的终端用户 User2。

  3.  User1 使用应用程序修改该行，并让应用程序更新数据库并提交。会话 1 的事务现已完成。

  4.  User2 也修改了该行，并让应用程序更新数据库并提交。会话 2 的事务现已完成。


  这个过程被称为更新丢失，因为在步骤 3 中所做的所有更改都将丢失。例如，考虑一个允许用户更改地址、工作电话号码等的员工更新屏幕。应用程序本身非常简单：一个用于生成员工列表的小型搜索屏幕，然后能够深入了解每位员工的详细信息。这应该是小菜一碟。于是，我们编写应用程序时不使用任何锁定，只使用简单的`SELECT`和`UPDATE`命令。


  然后，一个终端用户（User1）导航到详细信息屏幕，更改屏幕上的地址，点击“保存”，并收到更新成功的确认。好的，但当 User1 第二天检查记录以发送税表时，旧地址仍然在列。这怎么可能发生？不幸的是，这太容易发生了。在这种情况下，另一个终端用户（User2）在
  User1 之后查询了同一条记录——在 User1 读取数据之后，但在 User1 修改数据之前。然后，在 User2 查询数据之后，User1 执行了他们的更新，收到了确认，甚至重新查询以亲眼看到更改。然而，User2
  随后更新了工作电话号码字段并点击了保存，**全然不知**他们刚刚用旧数据覆盖了 User1 对地址字段所做的更改！*在这种情况下*会发生这种事的原因是，应用程序开发人员编写的程序在更新某个特定字段时，会刷新该记录的所有字段（仅仅因为更新所有列比弄清楚到底哪些列发生了更改并只更新那些列更容易）。


  请注意，要发生这种情况，User1 和 User2 甚至不需要在同一时间处理该记录。他们只需要在*大约*相同的时间处理该记录。


  当几乎没有或没有数据库培训的 GUI 程序员被分配编写数据库应用程序的任务时，我一次又一次地看到这个数据库问题出现。他们掌握了`SELECT`、`INSERT`、`UPDATE`和`DELETE`的工作知识，然后就开始编写应用程序。当最终的应用程序表现出刚才描述的行为时，它会完全摧毁用户对它的信心，特别是因为它看起来如此随机、如此偶发，并且在受控环境中完全无法复现（导致开发人员相信这一定是用户错误）。


  许多工具，如 Oracle Forms 和 APEX（Application Express，我们用来创建 AskTom 网站的工具），通过确保记录在您查询时保持不变，并在您对其进行任何更改之前锁定它（称为*乐观锁*），来透明地保护您免受此行为的影响；但许多其他工具（如手写的
  Visual Basic 或 Java 程序）则不会。那些保护您的工具在幕后所做的，或者开发人员自己必须做的，是使用两种锁定策略之一：*悲观锁*或*乐观锁*。


  ## 悲观锁


  悲观锁方法将在用户修改屏幕上的值之前立即启用。例如，一旦用户表明其打算对他们已选择并显示在屏幕上的特定行执行更新（比如通过点击屏幕上的按钮），就会放置一个行锁。该行锁将*持续存在*，直到应用程序将用户的修改应用到数据库中的行并提交为止。


  悲观锁仅在有状态或连接的环境中才有用——也就是说，在这种环境中，您的应用程序与数据库保持持续连接，并且在您的事务生命周期内，您是该连接的唯一使用者。这是 20
  世纪 90 年代早中期客户端/服务器应用程序的普遍做法。每个应用程序都会获得一个直接连接，该连接仅由该应用程序实例使用。这种以有状态方式连接的方法已变得不太常见（尽管并未消失），尤其是在
  20 世纪 90 年代中后期应用程序服务器出现之后。


  假设您使用的是有状态连接，您可能有一个应用程序查询数据而不锁定任何内容：


  ```

  $ sqlplus scott/tiger@PDB1

  SQL> select empno, ename, sal from emp where deptno = 10;

  EMPNO ENAME             SAL

  ---------- ---------- ----------

  7782 CLARK            2450

  7839 KING             5000

  7934 MILLER           1300

  ```


  最终，用户选择一行他们想要更新的记录。比方说在这种情况下，他们选择更新`MILLER`行。我们的应用程序将在那时（在用户对屏幕进行任何更改之前，但在行从数据库中取出一段时间后），绑定用户选择的值，以便我们可以查询数据库并确保数据尚未更改。在
  SQL*Plus 中，要模拟应用程序将进行的绑定调用，我们可以执行以下操作：


  ```

  SQL> variable empno number

  SQL> variable ename varchar2(20)

  SQL> variable sal number

  SQL> exec :empno := 7934; :ename := ''MILLER''; :sal := 1300;

  PL/SQL procedure successfully completed.

  ```


  现在，除了简单地查询值并验证它们没有被更改之外，我们还将使用`FOR UPDATE NOWAIT`锁定该行。应用程序将执行以下查询：


  ```

  SQL> select empno, ename, sal

  from emp

  where empno = :empno

  and decode( ename, :ename, 1 ) = 1

  and decode( sal, :sal, 1 ) = 1

  for update nowait;

  EMPNO ENAME             SAL

  ---------- ---------- ----------

  7934 MILLER           1300

  ```


  注意

  我们为什么使用`decode( column, :bind_variable, 1 ) = 1`？它只是表达`where (column = :bind_variable
  OR (column is NULL and :bind_variable is NULL)`的一种简写方式。你可以编写任一种方式；在这种情况下，`decode()`只是更紧凑，并且由于在
  SQL 中`NULL = NULL`既不为真（也不为假！），如果任一列允许`NULL`值，则两种方式之一将是必需的。


  应用程序从屏幕上的数据为绑定变量提供值（本例中为`7934`、`MILLER`和`1300`），并从数据库中重新查询这同一行，这次锁定该行以防止其他会话更新；因此，这种方法被称为*悲观*锁。我们在尝试更新之前锁定该行，因为我们怀疑——*我们很悲观*——否则该行将不会保持不变。


  由于所有表*应该*都有一个主键（前面的`SELECT`最多会检索一条记录，因为它包含了主键`EMPNO`），并且主键应该是不可变的（我们永远不应该更新它们），我们将从该语句中得到三种结果之一：


  *   如果底层数据没有更改，我们将取回我们的`MILLER`行，并且该行将被锁定，防止其他人更新（但可以读取）。

  *   如果另一个用户正在修改该行，我们将得到一个`ORA-00054 resource busy`错误。我们必须等待另一个用户完成操作。



  ## 悲观锁定与乐观锁定


  如果在我们选择数据到我们表示要更新之间的时间里，有人已经更改了这一行，那么我们将查不到任何数据。这意味着我们屏幕上显示的数据是过时的。为了避免之前描述的丢失更新场景，应用程序需要在允许最终用户修改之前*重新查询*并锁定数据。采用悲观锁定后，当用户
  2 试图更新电话字段时，应用程序现在会识别出地址字段已被更改，并将*重新查询*数据。因此，用户 2 不会用该字段中的旧数据覆盖用户 1 的更改。


  一旦我们成功锁定了该行，应用程序将绑定新值，执行更新并提交更改：


  ```sql

  SQL> update emp

  set ename = :ename, sal = :sal

  where empno = :empno;

  1 row updated.

  SQL> commit;

  Commit complete.

  ```


  我们现在非常安全地更改了那一行。我们不可能覆盖其他人的更改，因为我们已经验证了数据在我们最初读取它和锁定它之间没有发生变化——我们的验证确保在我们操作之前没有其他人更改它，而我们的锁确保在我们处理它时没有其他人能够更改它。


  ### 乐观锁定


  第二种方法，称为*乐观*锁定，将所有锁定延迟到执行更新之前的时刻。换句话说，我们将在不获取锁的情况下修改屏幕上的信息。我们*乐观*地认为数据不会被其他用户更改；因此，我们等到最后一刻再确认我们是否正确。


  这种锁定方法适用于所有环境，但它确实会增加执行更新的用户失败的概率。也就是说，当该用户去更新他们的行时，他们发现数据已被修改，必须重新开始。


  乐观锁定的一种流行实现方式是在应用程序中保留旧值和新值，并在更新数据时使用如下更新语句：


  ```sql

  Update table

  Set column1 = :new_column1, column2 = :new_column2, ....

  Where primary_key = :primary_key

  And decode( column1, :old_column1, 1 ) = 1

  And decode( column2, :old_column2, 1 ) = 1

  ...

  ```


  在这里，我们乐观地认为数据没有被更改。在这种情况下，如果我们的更新影响了一行，那我们很幸运；数据在我们读取它和提交更新之间没有变化。如果我们更新了零行，我们就失败了；其他人更改了数据，现在我们必须决定如何继续在应用程序中操作。我们是否应该让最终用户在查询行的新值后重新输入事务（可能会导致用户沮丧，因为行有可能再次更改）？我们是否应该通过基于业务规则执行更新冲突解决来尝试合并两次更新的值（这需要大量代码）？


  前面提到的`UPDATE`语句实际上会避免丢失更新，但它确实有可能被阻塞，在等待另一个会话对该行的`UPDATE`完成时挂起。如果您的所有应用程序都使用乐观锁定，那么直接使用`UPDATE`通常是没问题的，因为更新被应用和提交时，行被锁定的时间非常短。但是，如果您的某些应用程序使用悲观锁定（这将相对较长时间地持有行锁），或者如果有任何应用程序（例如批处理进程）可能长时间锁定行（超过一两秒被认为是长的），那么您应该考虑使用`SELECT
  FOR UPDATE NOWAIT`来验证行未被更改，并在`UPDATE`之前立即锁定它，以避免被另一个会话阻塞。


  实现乐观并发控制的方法有很多种。我们已经讨论过一种，即应用程序将在其自身存储行的所有前镜像。在接下来的部分中，我们将探讨另外两种，即：


  *   使用由数据库触发器或应用程序代码维护的特殊列来告诉我们记录的“版本”

  *   使用基于原始数据计算的校验和或哈希值


  ### 使用版本列实现乐观锁


  这是一个简单的实现方法，涉及为您希望防止更新丢失的每个数据库表添加一个单独的列。此列通常为 `NUMBER` 或 `DATE/TIMESTAMP` 类型。它通常通过表上的行触发器来维护，该触发器负责在每次修改行时递增
  `NUMBER` 列或更新 `DATE/TIMESTAMP` 列。


  ### 注意


  我说它是通过行触发器维护的。然而，我并没有说这是维护它的最佳或正确方式。我个人更倾向于让 `UPDATE` 语句本身来维护此列，而不是通过触发器，因为除非绝对必要（如同此例），否则应避免使用触发器。关于我为何避免使用触发器的背景，请参阅我在
  *Oracle Magazine* 上发表的“触发器之困”一文，可在 Oracle 技术网络上找到：[`https://blogs.oracle.com/oraclemagazine/post/the-trouble-with-triggers`](https://blogs.oracle.com/oraclemagazine/post/the-trouble-with-triggers)。


  想要实现乐观并发控制的应用程序只需保存此额外列的值，而无需保存其他所有列的前镜像。应用程序只需验证在请求更新时，数据库中此列的值是否与最初读取的值匹配。如果这些值相同，则说明该行未被更新过。


  让我们看一个使用 `SCOTT.DEPT` 表的副本实现乐观锁的例子。我们可以使用以下数据定义语言（DDL）来创建表：


  ```sql

  $ sqlplus eoda/foo@PDB1

  SQL> create table dept

  ( deptno     number(2),

  dname      varchar2(14),

  loc        varchar2(13),

  last_mod   timestamp with time zone

  default systimestamp

  not null,

  constraint dept_pk primary key(deptno) );

  Table created.

  ```


  然后，我们使用 `INSERT` 语句将 `DEPT` 数据的副本插入此表：


  ```sql

  SQL> insert into dept( deptno, dname, loc )

  select deptno, dname, loc  from scott.dept;

  4 rows created.

  SQL> commit;

  Commit complete.

  ```


  上述代码重新创建了 `DEPT` 表，但增加了一个 `LAST_MOD` 列，该列使用了 `TIMESTAMP WITH TIME ZONE` 数据类型。我们将此列定义为
  `NOT NULL` 以便必须填充它，其默认值为当前系统时间。


  这种 `TIMESTAMP` 数据类型在 Oracle 中具有最高的精度，通常精确到微秒（百万分之一秒）。对于涉及用户思考时间的应用程序，`TIMESTAMP`
  的这种精度级别是绰绰有余的，因为数据库检索一行数据，以及人类查看、修改它并向数据库发回更新的过程，几乎不可能在几分之一秒内完成。两人在同一瞬间读取并修改同一行的可能性确实非常小。


  接下来，我们需要一种方法来维护此值。我们有两个选择：要么应用程序通过在更新记录时将其值设置为 `SYSTIMESTAMP` 来维护 `LAST_MOD` 列，要么使用触发器/存储过程来维护它。让应用程序维护
  `LAST_MOD` 绝对比基于触发器的方法性能更好，因为触发器会在 Oracle 已完成的处理之上增加额外的处理。然而，这确实意味着您依赖所有应用程序在修改此表的任何地方都一致地维护
  `LAST_MOD`。因此，如果每个应用程序都负责维护此字段，它就需要一致地验证 `LAST_MOD` 列是否未被更改，并将该列设置为当前的 `SYSTIMESTAMP`。例如，如果一个应用程序查询
  `DEPTNO=10` 的行：


  ```sql

  SQL> variable deptno   number

  SQL> variable dname    varchar2(14)

  SQL> variable loc      varchar2(13)

  SQL> variable last_mod varchar2(50)

  SQL>

  SQL> begin

  :deptno := 10;

  select dname, loc, to_char( last_mod, ''DD-MON-YYYY HH.MI.SSXFF AM TZR'' )

  into :dname,:loc,:last_mod

  from dept

  where deptno = :deptno;

  end;

  /

  PL/SQL procedure successfully completed.

  ```


  我们可以看到其当前值是


  ```sql

  SQL> select :deptno dno, :dname dname, :loc loc, :last_mod lm  from dual;

  DNO DNAME        LOC        LM

  ------- ------------ ---------- ----------------------------------------

  10 ACCOUNTING   NEW YORK   15-APR-2014 07.04.01.147094 PM -06:00

  ```


  我们将使用下面的更新语句来修改信息。最后一行执行了非常重要的检查，以确保时间戳没有改变，并使用内置函数 `TO_TIMESTAMP_TZ`（`tz` 是时区的缩写）将我们在
  `SELECT` 语句中保存的字符串转换回正确的数据类型。此外，`UPDATE` 语句的第 3 行在发现行被更新时，将 `LAST_MOD` 列更新为当前时间：


  ```sql

  SQL> update dept

  set dname = initcap(:dname),

  last_mod = systimestamp

  where deptno = :deptno

  and last_mod = to_timestamp_tz(:last_mod, ''DD-MON-YYYY HH.MI.SSXFF AM TZR'' );

  1 row updated.

  ```


  如您所见，更新了一行，正是我们关心的那行。我们通过主键 (`DEPTNO`) 更新了该行，并验证了在首次读取它和执行更新之间的时间段内，`LAST_MOD` 列没有被任何其他会话修改过。如果我们尝试再次更新同一条记录，使用相同的逻辑但不获取新的
  `LAST_MOD` 值，我们将观察到以下情况：


  ```sql

  SQL> update dept

  set dname = upper(:dname),

  last_mod = systimestamp

  where deptno = :deptno

  and last_mod = to_timestamp_tz(:last_mod, ''DD-MON-YYYY HH.MI.SSXFF AM TZR'' );

  0 rows updated.

  ```


  注意，这次报告 `0 rows updated`，因为 `LAST_MOD` 上的谓词条件未满足。虽然 `DEPTNO 10` 仍然存在，但在我们希望更新时，该值已不再与查询该行时的时间戳值匹配。因此，应用程序知道数据库中的数据已被更改——基于没有行被修改这一事实——并且它现在必须决定如何处理这种情况。


  您不会依赖每个应用程序来维护此字段，原因有很多。其一，它增加了应用程序的代码量，而且这些代码必须在修改此表的任何地方重复并正确实现。在一个大型应用程序中，这可能在很多地方出现。此外，未来开发的每个应用程序也必须遵守这些规则。应用程序代码中有很多可能遗漏的地方，从而导致此字段未被正确使用。因此，如果应用程序代码本身不负责维护这个
  `LAST_MOD` 字段，那么我认为应用程序也不应该负责检查这个 `LAST_MOD` 字段（如果它能进行检查，它当然也能执行更新）。所以，在这种情况下，我建议*将更新逻辑封装在存储过程中*，根本不允许应用程序直接更新表。如果它不值得信任去维护此字段中的值，那么它也不值得信任去正确地检查它。因此，存储过程将把我们在之前的更新中使用的绑定变量作为输入，并执行完全相同的更新。在检测到更新了零行时，存储过程可以向客户端引发一个异常，以告知客户端更新实际上失败了。



  ## 使用校验和进行乐观锁定


  另一种实现方式是使用触发器来维护`LAST_MOD`字段，但对于如此简单的功能，我的建议是避免使用触发器，而让 DML 语句来处理它。触发器会引入可测量的开销，并且在当前场景下是不必要的。此外，触发器无法确认行是否未被修改（它只能为`LAST_MOD`提供值，无法在更新时检查它）；因此，应用程序必须痛苦地意识到这个列以及如何正确使用它。所以，触发器本身并不足够。


  ## 使用校验和进行乐观锁定


  这种方法与之前的版本列方法非常相似，但它使用基础数据本身来计算一个“虚拟”版本列。在展示如何使用其中一个提供的包之前，我将引用*Oracle 数据库 PL/SQL
  包和类型参考*手册来帮助解释校验和或哈希函数背后的目标和概念：


  > *单向哈希函数接收一个可变长度的输入字符串（数据），并将其转换为一个固定长度（通常更小）的输出字符串，称为哈希值。哈希值作为输入数据的唯一标识符（类似于指纹）。您可以使用哈希值来验证数据是否已被更改。*


  > *请注意，单向哈希函数是一种不易逆转的哈希函数。从输入数据计算哈希值很容易，但生成哈希到特定值的数据却很困难。*


  我们可以像使用版本列一样使用这些哈希或校验和。我们只需将从数据库读取数据时获得的哈希或校验和值与修改数据前获得的值进行比较。如果在我们读取数据之后、更新数据之前，有人修改了行的值，那么哈希或校验和几乎肯定会不同。


  计算哈希或校验和的方法有很多。我将列出几种并在本节演示其中一种。所有这些方法都基于数据库提供的功能：


  *   `DBMS_CRYPTO.HASH`：此方法能够计算安全哈希算法 1（SHA-1）或 MD4/MD5 消息摘要。建议使用 SHA-1 算法。

  *   `DBMS_SQLHASH.GETHASH`：此方法支持 SHA-1、MD4 和 MD5 哈希算法。作为`SYSDBA`特权用户，您必须先将此包的执行权限授予用户，然后他们才能访问它。此包在*Oracle
  数据库安全指南*中有文档说明。

  *   `ORA_HASH`：此方法是一个内置的 SQL 函数，它接受一个`VARCHAR2`值作为输入，并（可选地）接受另一个控制返回值的输入对。返回值是一个数字——默认情况下是
  0 到 4294967295 之间的数字。

  *   `STANDARD_HASH`：这是一个内置的 SQL 函数，它使用标准哈希算法（如`SHA1`（默认）、`SHA256`、`SHA384`、`SHA512`和`MD5`）对表达式计算哈希值。返回值是一个`RAW`数据类型。


  **注意**


  许多编程语言都提供了一系列哈希和校验和函数，因此数据库之外可能还有其他可用的方法。也就是说，如果使用内置的数据库功能，您将提高未来（针对新语言、新方法）的可移植性。


  以下示例展示了如何使用`ORA_HASH`内置函数来计算这些哈希/校验和。该技术也适用于其他列出的方法；逻辑不会有太大不同，但您调用的 API 会有所不同。首先，我们移除上一个示例中使用的列：


  ```sql

  $ sqlplus eoda/foo@PDB1

  SQL> alter table dept drop column last_mod;

  Table altered.

  ```


  然后让我们的应用程序查询并显示部门 10 的信息。请注意，在查询信息时，我们使用`ORA_HASH`内置函数计算哈希。这是我们保留在应用程序中的版本信息。以下是我们查询和显示的代码：


  ```sql

  SQL> variable deptno number

  SQL> variable dname varchar2(14)

  SQL> variable loc varchar2(13)

  SQL> variable hash number

  SQL> begin

  select deptno, dname, loc,

  ora_hash( dname || ''/'' || loc ) hash

  into :deptno, :dname, :loc, :hash

  from dept

  where deptno = 10;

  end;

  /

  PL/SQL procedure successfully completed.

  SQL> select :deptno, :dname, :loc, :hash from dual;

  :DEPTNO :DNAME     :LOC            :HASH

  ---------- ---------- ---------- ----------

  10 Accounting NEW YORK   2721972020

  ```


  如您所见，哈希只是某个数字。这是我们更新前想要使用的值。要更新该行，我们需要在数据库中锁定当前存在的该行，然后将该行的哈希值与我们从数据库读取数据时计算的哈希值进行比较。执行此操作的逻辑可能如下所示：


  ```sql

  SQL> exec :dname := lower(:dname);

  PL/SQL procedure successfully completed.

  SQL> update dept

  set dname = :dname

  where deptno = :deptno

  and ora_hash( dname || ''/'' || loc ) = :hash

  /

  1 row updated.

  SQL> select dept.*,

  ora_hash( dname || ''/'' || loc ) hash

  from dept

  where deptno = :deptno;

  DEPTNO DNAME      LOC              HASH

  ---------- ---------- ---------- ----------

  10 accounting NEW YORK   2818855829

  ```


  在更新后重新查询数据并再次计算哈希后，我们可以看到哈希值不同了。如果在我们之前有人修改了该行，我们的哈希值将无法匹配。我们可以通过使用第一次读取时的*旧*哈希值再次尝试更新来观察这一点：


  ```sql

  SQL> update dept

  set dname = :dname

  where deptno = :deptno

  and ora_hash( dname || ''/'' || loc ) = :hash

  /

  0 rows updated.

  ```


  如您所见，由于我们的哈希值与数据库中的当前数据不匹配，因此更新了零行。


  为了使这种基于哈希的方法正常工作，我们必须确保每个应用程序在计算哈希时使用相同的方法；具体来说，它们必须按`dname`、“`/`”、`loc`的顺序连接。为了使这种方法通用化，我建议向表添加一个虚拟列或使用视图来添加一列，从而将函数对应用程序本身隐藏。添加列如下所示：


  ```sql

  SQL> alter table dept

  add hash as

  ( ora_hash(dname || ''/'' || loc ) );

  Table altered.

  SQL> select *  from dept where deptno = :deptno;

  DEPTNO DNAME      LOC              HASH

  ---------- ---------- ---------- ----------

  10 accounting NEW YORK   2818855829

  ```


  添加的列是一个虚拟列，因此不会产生存储开销。该值不是在磁盘上计算和存储的，而是在从数据库检索数据时计算的。


  此示例展示了如何使用哈希或校验和实现乐观锁定。您应该记住，计算哈希或校验和是某种程度上 CPU 密集型的操作；它的计算成本很高。在 CPU 带宽是稀缺资源的系统上，您必须考虑这一事实。然而，这种方法对网络更友好，因为通过网络传输相对较小的哈希值，而不是传输行的前后映像（逐列比较），将消耗少得多的网络资源。




  ### 乐观锁还是悲观锁？


  那么，哪种方法最好呢？根据我的经验，悲观锁在 Oracle 中表现非常好（但在其他数据库中可能没那么好），并且相比乐观锁有许多优势。然而，它需要与数据库建立有状态的连接，比如客户端/服务器连接。这是因为锁不会跨连接保持。仅这一事实就使得悲观锁在当今许多情况下变得不切实际。在过去，对于客户端/服务器应用程序和几十或几百个用户来说，这曾经是我的首选也是唯一的选择。然而今天，对于大多数应用程序，我会推荐采用**乐观并发控制**。为整个事务持续时间保持一个连接，代价实在太高了。


  在可用的方法中，我使用哪一种？我倾向于使用带有时间戳列的版本列方法。从长远来看，它为我提供了额外的更新信息。此外，它比哈希或校验和的计算开销更小，而且在处理 `LONG`、`LONG
  RAW`、`CLOB`、`BLOB` 和其他非常大的列时，不会遇到哈希或校验和可能遇到的问题（`LONG` 和 `LONG RAW` 已过时；我在这里提到它们只是因为它们仍然在
  Oracle 数据字典中频繁使用）。


  如果我必须为一个仍在使用悲观锁定方案（例如，该表同时在客户端/服务器应用程序和 Web 上被访问）的表添加乐观并发控制，我会选择 `ORA_HASH` 方法。原因是现有的遗留应用程序可能不欢迎出现一个新列。即使我们采取额外步骤来隐藏这个额外的列，应用程序也可能因必要的触发器带来的开销而受到影响。在这方面，`ORA_HASH`
  技术将是**非侵入式且轻量级的**。哈希/校验和方法可以做到非常独立于数据库，特别是当我们在数据库外部计算哈希或校验和时。然而，通过在中间层而非数据库中执行计算，我们将在
  CPU 使用率和网络传输方面招致更高的资源使用惩罚。


  ### 阻塞


  `阻塞` 发生在一个会话持有一个资源锁，而另一个会话正在请求该资源时。结果，请求会话将被阻塞——它会挂起，直到持有会话放弃被锁定的资源。在几乎所有情况下，阻塞都是可以避免的。事实上，如果你确实在交互式应用程序中发现你的会话被阻塞了，那么你很可能也一直遭受着丢失更新错误，或许自己还没意识到。也就是说，你的应用程序逻辑存在缺陷，而这正是阻塞的起因。


  在数据库中会造成阻塞的五种常见 DML 语句是 `INSERT`、`UPDATE`、`DELETE`、`MERGE` 和 `SELECT FOR UPDATE`。解决被阻塞的
  `SELECT FOR UPDATE` 很简单：只需添加 `NOWAIT` 子句，它就不会再阻塞。相反，你的应用程序会向最终用户返回一条消息，提示该行已被锁定。有趣的情况是剩下的四种
  DML 语句。我们将逐一查看它们，看看它们为什么不应该阻塞，以及如果发生阻塞该如何纠正。


  #### 被阻塞的插入操作


  有几种情况 `INSERT` 会阻塞。最常见的场景是，当你的表上设置了主键或唯一约束，并且两个会话试图插入具有相同值的行时。其中一个会话将被阻塞，直到另一个会话要么提交（在这种情况下，被阻塞的会话将收到关于重复值的错误），要么回滚（在这种情况下，被阻塞的会话成功插入）。另一种情况涉及通过引用完整性约束链接的表。如果子表所依赖的父行正在被创建或删除，那么对子表的
  `INSERT` 可能会被阻塞。


  被阻塞的 `INSERT` 通常发生在允许最终用户生成主键/唯一列值的应用程序中。这种情况最容易通过使用序列或 `SYS_GUID()` 内置函数来生成主键/唯一列值来避免。序列/`SYS_GUID()`
  被设计为在多用户环境中生成唯一键的高度并发的方法。万一你不能使用这两者，并且必须允许最终用户生成可能重复的键，你可以使用以下技术，该技术通过使用内置的 `DBMS_LOCK`
  包实现手动锁来避免该问题。


  > **注意**

  >

  > 以下示例演示了如何防止会话因主键或唯一约束而在插入语句上发生阻塞。需要强调的是，这里演示的修复方法应被视为一种短期解决方案，同时应检查应用程序架构本身。这种方法会增加明显的开销，不应轻易实施。一个设计良好的应用程序不会遇到此问题（例如，在并发环境中，你不会有持续数小时的事务）。这应该被视为最后的手段，绝对不是你希望为了“以防万一”而对应用程序中的每个表都做的事情。


  对于插入操作，没有现有的行可供选择和锁定；无法防止其他人插入具有相同值的行，从而阻塞我们的会话并导致无限期等待。这就是 `DBMS_LOCK` 发挥作用的地方。为了演示这种技术，我们将创建一个带有主键的表和一个触发器，该触发器将防止两个（或更多）会话同时插入相同的值。触发器将使用
  `DBMS_UTILITY.GET_HASH_VALUE` 将主键哈希到 0 到 1,073,741,823 之间的一个数字（Oracle 允许我们使用的锁 ID
  号范围）。在这个例子中，我选择了大小为 1024 的哈希表，意味着我们将把主键哈希到 1024 个不同的锁 ID 之一。然后，我们将使用 `DBMS_LOCK.REQUEST`
  基于该 ID 分配一个排他锁。一次只有一个会话能够做到这一点，所以如果其他人试图向我们的表中插入具有相同主键的记录，该人的锁请求将失败（并引发 `resource
  busy` 错误）：


  > **注意**

  >

  > 要成功编译此触发器，必须直接向您的模式授予 `DBMS_LOCK` 的执行权限。执行 `DBMS_LOCK` 的权限可能无法通过角色获得。


  ```

  $ sqlplus scott/tiger@PDB1

  SQL> create table demo ( x int primary key );

  Table created.

  SQL> create or replace trigger demo_bifer

  before insert on demo

  for each row

  declare

  l_lock_id   number;

  resource_busy   exception;

  pragma exception_init( resource_busy, -54 );

  begin

  l_lock_id :=

  dbms_utility.get_hash_value( to_char( :new.x ), 0, 1024 );

  if ( dbms_lock.request

  (  id                => l_lock_id,

  lockmode          => dbms_lock.x_mode,

  timeout           => 0,

  release_on_commit => TRUE ) not in (0,4) )

  then

  raise resource_busy;

  end if;

  end;

  /

  Trigger created.

  SQL> insert into demo(x) values (1);

  1 row created.

  ```



  ## 死锁


  *死锁*发生当你有两个会话，每个会话都持有对方想要的资源时。例如，如果我的数据库中有两个表 `A` 和 `B`，每个表中都只有一行数据，我可以轻松演示一个死锁。我只需要打开两个会话（例如，两个
  `SQL*Plus` 会话）。在会话 `A` 中，我更新表 `A`。在会话 `B` 中，我更新表 `B`。现在，如果我在会话 `B` 中尝试更新表 `A`，我将被阻塞。因为会话
  `A` 已经锁定了这一行。这不是死锁；这仅仅是阻塞。我尚未造成死锁，因为有机会会话 `A` 会提交或回滚，然后会话 `B` 在那时继续执行。


  如果我回到会话 `A` 并尝试更新表 `B`，我就会造成死锁。两个会话中的一个将被选为受害者，其语句将被回滚。例如，会话 `B` 更新表 `A` 的尝试可能会被回滚，并出现类似以下的错误：


  ```

  update a set x = x+1

  *

  ERROR at line 1:

  ORA-00060: deadlock detected while waiting for resource

  ```


  会话 `A` 更新表 `B` 的尝试将保持阻塞状态——`Oracle` 不会回滚整个事务。只有导致死锁的其中一条语句被回滚。会话 `B` 仍然锁定了表 `B`
  中的行，而会话 `A` 正在耐心地等待该行变得可用。在收到死锁消息后，会话 `B` 必须决定是提交在表 `B` 上未完成的工作、回滚它，还是走另一条路径并在稍后提交。一旦该会话提交或回滚，另一个被阻塞的会话就会像什么都没发生过一样继续执行。


  `Oracle` 认为死锁非常罕见且不寻常，以至于每次发生时都会在服务器上创建一个跟踪文件。跟踪文件的内容大致如下：


  ```

  DEADLOCK DETECTED ( ORA-00060 )

  See Note 60.1 at My Oracle Support for Troubleshooting ORA-60 Errors

  [Transaction Deadlock]

  The following deadlock is not an ORACLE error. It is a

  deadlock due to user error in the design of an application

  or from issuing incorrect ad-hoc SQL. The following

  information may aid in determining the deadlock:

  ...

  ```


  显然，`Oracle` 认为这些应用程序死锁是应用程序自身引发的错误，而且在大多数情况下，`Oracle` 是对的。与许多其他 `RDBMS` 不同，死锁在 `Oracle`
  中非常罕见，几乎可以认为不存在。通常，你必须人为地构造条件才能引发一个。


  根据我的经验，`Oracle` 数据库中死锁的首要原因是**未索引的外键**。（第二个原因是针对可能并发更新的表上的位图索引，我们将在第 11 章介绍。）在三种场景下，`Oracle`
  会在修改父表后对子表放置一个全表锁：


  *   如果你更新了父表的主键（如果你遵循关系数据库的规则——主键应该是不可变的，这种情况就非常罕见），在没有外键索引的情况下，子表将被锁定。

  *   如果你删除了父表的一行，在没有外键索引的情况下，整个子表也将被锁定。


  在 `Oracle 9*i*` 及以上版本中，这些全表锁是短期存在的，意味着它们只需要在 `DML` 操作期间持有，而不是整个事务期间。即便如此，它们能够也确实会导致严重的锁问题。作为第一点的演示，如果我们设置如下一对表，暂时还不会发生异常：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> create table p ( x int primary key );

  Table created.

  SQL> create table c ( x references p );

  Table created.

  SQL> insert into p values ( 1 );

  1 row created.

  SQL> insert into p values ( 2 );

  1 row created.

  SQL> commit;

  Commit complete.

  SQL> insert into c values ( 2 );

  1 row created.

  ```


  现在，为了在一个会话中演示我们捕获到这个阻塞的 `INSERT` 问题，我们将使用一个 `AUTONOMOUS_TRANSACTION`，使得下一段代码的执行看起来像是在另一个
  `SQL*Plus` 会话中进行的。实际上，如果你使用另一个会话，行为将是一样的。开始演示：


  ```

  SQL> declare

  pragma autonomous_transaction;

  begin

  insert into demo(x) values (1);

  commit;

  end;

  /

  declare

  *

  ERROR at line 1:

  ORA-00054: resource busy and acquire with NOWAIT specified or timeout expired

  ORA-06512: at "SCOTT.DEMO_BIFER", line 14

  ORA-04088: error during execution of trigger ''SCOTT.DEMO_BIFER''

  ORA-06512: at line 4

  ```


  这里的核心概念是，将受触发器保护的表的给定主键值放入一个字符串中。然后我们可以使用 `DBMS_UTILITY.GET_HASH_VALUE` 为该字符串生成一个基本唯一的哈希值。只要我们使用的哈希表大小小于
  1,073,741,823，我们就可以使用 `DBMS_LOCK` 独占锁定该值。


  哈希处理后，我们获取该值并使用 `DBMS_LOCK` 请求以超时时间 `ZERO` 独占锁定该锁 ID（如果其他人已锁定该值，此操作会立即返回）。如果我们超时或因任何原因失败，我们就抛出
  `ORA-54 Resource Busy` 错误。否则，我们什么都不做——可以插入，我们不会阻塞。在提交我们的事务时，所有的锁，包括此 `DBMS_LOCK`
  调用分配的锁，都将被释放。


  当然，如果你的表的主键是 `INTEGER` 并且你预计键值不会超过十亿，你可以跳过哈希步骤，直接使用该数字作为锁 ID。


  你需要调整哈希表的大小（本例中为 1024）以避免因不同的字符串哈希到相同数字而产生人为的“资源忙”消息。哈希表的大小将取决于应用程序（数据）特性，并且也会受到并发插入数量的影响。你还可以在触发器中添加一个标志，允许人们打开或关闭此检查。例如，如果我打算插入数百或数千条记录，我可能就不希望启用此检查。


  ### 被阻塞的合并、更新和删除


  在一个交互式应用程序中——即从数据库查询一些数据，允许最终用户操作它，然后将其放回数据库——一个被阻塞的 `UPDATE` 或 `DELETE` 表明你的代码中可能存在**丢失更新**问题。（如果你的代码中出现了这种情况，我会称之为一个缺陷。）你正尝试更新一个其他人已经在更新的行（换句话说，一个其他人已经锁定的行）。你可以通过使用
  `SELECT FOR UPDATE NOWAIT` 查询来避免阻塞问题，以便：


  *   验证自你查询出数据以来数据未更改（防止丢失更新）

  *   锁定该行（防止 `UPDATE` 或 `DELETE` 被阻塞）


  如前所述，无论你采用哪种锁定方法，你都可以这样做。悲观锁定和乐观锁定都可以采用 `SELECT FOR UPDATE NOWAIT` 查询来验证行是否未更改。悲观锁定会在用户表示其想要修改数据的那一刻就使用该
  `SELECT FOR UPDATE NOWAIT` 语句。乐观锁定则会在更新数据库中的数据之前立即使用该语句。这不仅会解决应用程序中的阻塞问题，还会纠正数据完整性问题。


  由于 `MERGE` 本质上就是一个 `INSERT` 和 `UPDATE`（并且在较新版本的 `Oracle` 中，使用增强的 `MERGE` 语法，它还包含
  `DELETE`），因此你需要同时使用这两种技术。



  '
- '# 删除父表记录导致的阻塞与索引外键解决方案


  但是，如果我们进入另一个会话并尝试删除第一个父记录，我们会发现该会话立即被阻塞：


  ```

  SQL> delete from p where x = 1;

  ```


  它在执行删除操作之前，试图获取表 `C` 上的完全表锁。此时，任何其他会话都无法对 `C` 表发起新的 `DELETE`、`INSERT` 或 `UPDATE`
  操作（已经启动的会话可以继续，但不能开始修改 `C` 的新会话）。


  这种阻塞问题在更新主键值时也会发生。由于在关系数据库中更新主键是一个大忌，这通常不是更新操作的问题。然而，我曾见过这种主键更新成为一个严重问题，特别是当开发人员使用自动生成
  SQL 的工具时，这些工具会更新每一列，无论最终用户是否实际修改了该列。例如，假设我们使用 `Oracle Forms` 并在任何表上创建默认布局。默认情况下，`Oracle
  Forms` 会生成一个修改我们选择显示的表中的每一列的更新语句。如果我们在 `DEPT` 表上构建一个默认布局并包含所有三个字段，那么无论我们修改 `DEPT`
  表的哪一列，`Oracle Forms` 都会执行以下命令：


  ```

  update dept set deptno=:1,dname=:2,loc=:3 where rowid=:4

  ```


  在这种情况下，如果 `EMP` 表有一个指向 `DEPT` 的外键，并且 `EMP` 表中的 `DEPTNO` 列上没有索引，那么对 `DEPT` 表的一次更新将导致整个
  `EMP` 表被锁定。如果您使用任何自动生成 SQL 的工具，这一点需要特别注意。即使主键的值没有改变，子表 `EMP` 也会在上述 SQL 语句执行后被锁定。对于
  `Oracle Forms`，解决方案是将该表的 `UPDATE CHANGED COLUMNS ONLY` 属性设置为 `YES`。`Oracle Forms`
  将生成一个仅包含已更改列（不包括主键）的 `UPDATE` 语句。


  由删除父表行引起的问题要常见得多。正如我所演示的，如果我在表 `P` 中删除一行，那么在 DML 操作期间，子表 `C` 将被锁定，从而在事务持续期间阻止其他针对
  `C` 的更新操作（当然，假设没有其他人正在修改 `C`，否则删除操作会等待）。这就是阻塞和死锁问题的根源。通过锁定整个表 `C`，我严重降低了数据库的并发性，以至于没有人能够修改
  `C` 中的任何内容。此外，我增加了死锁的可能性，因为我现在持有大量数据直到提交。其他会话在 `C` 上被阻塞的可能性现在要高得多；任何试图修改 `C` 的会话都会被阻塞。因此，我将开始看到许多持有其他资源上已有锁的会话在数据库中被阻塞。如果其中任何被阻塞的会话实际上正在锁定我的会话也需要的资源，我们就会发生死锁。这种情况下，死锁是由我的会话阻止访问远多于其实际需要的资源（在这里，是单个表中的所有行）造成的。当有人抱怨数据库中出现死锁时，我会让他们运行一个查找未索引外键的脚本；99%的时间我们都能定位到问题表。通过简单地为该外键创建索引，死锁以及许多其他争用问题就会消失。以下示例演示了使用此脚本来定位表
  `C` 中的未索引外键：


  ```

  SQL> column columns format a30 word_wrapped

  SQL> column table_name format a15 word_wrapped

  SQL> column constraint_name format a15 word_wrapped

  SQL> select table_name, constraint_name,

  cname1 || nvl2(cname2,'',''||cname2,null) ||

  nvl2(cname3,'',''||cname3,null) || nvl2(cname4,'',''||cname4,null) ||

  nvl2(cname5,'',''||cname5,null) || nvl2(cname6,'',''||cname6,null) ||

  nvl2(cname7,'',''||cname7,null) || nvl2(cname8,'',''||cname8,null)

  columns

  from ( select b.table_name,

  b.constraint_name,

  max(decode( position, 1, column_name, null )) cname1,

  max(decode( position, 2, column_name, null )) cname2,

  max(decode( position, 3, column_name, null )) cname3,

  max(decode( position, 4, column_name, null )) cname4,

  max(decode( position, 5, column_name, null )) cname5,

  max(decode( position, 6, column_name, null )) cname6,

  max(decode( position, 7, column_name, null )) cname7,

  max(decode( position, 8, column_name, null )) cname8,

  count(*) col_cnt

  from (select substr(table_name,1,30) table_name,

  substr(constraint_name,1,30) constraint_name,

  substr(column_name,1,30) column_name,

  position

  from user_cons_columns ) a,

  user_constraints b

  where a.constraint_name = b.constraint_name

  and b.constraint_type = ''R''

  group by b.table_name, b.constraint_name

  ) cons

  where col_cnt > ALL

  ( select count(*)

  from user_ind_columns i,

  user_indexes     ui

  where i.table_name = cons.table_name

  and i.column_name in (cname1, cname2, cname3, cname4,

  cname5, cname6, cname7, cname8 )

  and i.column_position <= cons.col_cnt

  and ui.table_name = i.table_name

  and ui.index_name = i.index_name

  and ui.index_type IN (''NORMAL'',''NORMAL/REV'')

  group by i.index_name

  );

  TABLE_NAME      CONSTRAINT_NAME COLUMNS

  --------------- --------------- ------------------------------

  C               SYS_C0061427    X

  ```


  这个脚本适用于最多包含八列的外键约束（如果您有更多列，您可能需要重新考虑您的设计）。它首先在之前的查询中构建了一个名为 `CONS` 的内联视图。这个内联视图将约束中适当的列名从行转置为列，结果是每个约束一行，最多有八列包含约束中的列名。此外，还有一个列
  `COL_CNT`，它包含外键约束本身的列数。对于从内联视图返回的每一行，我们执行一个关联子查询，该子查询检查当前正在处理的表上的所有索引。它计算该索引中与外键约束列匹配的列数，然后按索引名称进行分组。因此，它生成一组数字，每个数字是该表上某个索引中匹配列的计数。如果原始的
  `COL_CNT` 大于所有这些数字，则表示该表上没有索引支持该约束。如果 `COL_CNT` 小于所有这些数字，则表示至少有一个索引支持该约束。注意 `NVL2`
  函数的使用，我们用它来将列名列表“粘合”成一个逗号分隔的列表。该函数接受三个参数：`A`，`B`，`C`。如果参数 `A` 不为空，则返回参数 `B`；否则返回参数
  `C`。这个查询假设约束的所有者也是表和索引的所有者。如果另一个用户索引了该表或者表位于另一个模式中（这两种情况都很少见），它将无法正确工作。


  先前的脚本还会检查索引类型是否为 B*Tree 索引（`NORMAL` 或 `NORMAL/REV`）。我们检查它是否是 B*Tree 索引，因为外键列上的位图索引不能防止锁定问题。


  Note




  在数据仓库环境中，通常在事实表的外键列上创建位图索引。然而，数据仓库环境中的数据加载通常通过计划的 ETL 过程有序进行，因此不会遇到像 OLTP 应用中可能遇到的那样：一个进程向子表插入数据的同时，另一个进程从父表删除数据。


  因此，之前的脚本显示表`C`在列`X`上有一个外键但没有索引。通过在`X`上创建一个 B*Tree 索引，我们可以完全消除这个锁定问题。除了这个表锁之外，未索引的外键在以下情况下也可能出现问题：


  *   当你有`ON DELETE CASCADE`约束但没有在子表上创建索引时。例如，`EMP`是`DEPT`的子表。`DELETE DEPTNO = 10`应级联到`EMP`。如果`EMP`中的`DEPTNO`未被索引，你将对`EMP`进行全表扫描，以对应从`DEPT`表中删除的每一行。这种全表扫描通常是不可取的，并且如果你从父表中删除多行，子表将为每个被删除的父行扫描一次。


  *   当你从父表查询到子表时。再次考虑`EMP/DEPT`示例。在`DEPTNO`的上下文中查询`EMP`表非常常见。如果你经常运行以下查询（例如，生成报告），你会发现缺少索引会减慢查询速度：


  ```sql

  select * from dept, emp

  where emp.deptno = dept.deptno and dept.deptno = :X;

  ```


  何时不需要为外键创建索引？一般来说，当满足以下条件时：


  *   你不从父表删除数据。

  *   你不更新父表的唯一/主键值（注意工具对主键的意外更新）。

  *   你不从父表连接到子表（如从`DEPT`到`EMP`）。


  如果你满足所有三个条件，可以放心地跳过索引；它不是必需的。如果你满足上述任何一个条件，请注意其后果。这是 Oracle 倾向于过度锁定数据的罕见情况之一。


  ### 锁升级


  当发生锁升级时，系统会降低锁的粒度。一个例子是数据库系统将针对一个表的 100 个行级锁转换为一个表级锁。你现在使用一个锁来锁定所有内容，而且通常，你锁定的数据量也比以前多得多。锁升级在认为锁是稀缺资源且应避免开销的数据库中经常使用。


  注意


  Oracle 永远不会升级锁。永远不会。


  Oracle 永远不会升级锁，但它确实执行锁转换或锁提升，这些术语经常与锁升级混淆。


  注意


  术语*锁转换*和*锁提升*是同义词。Oracle 通常将该过程称为*锁转换*。


  Oracle 会在尽可能低的级别（即限制性最小的锁）上获取锁，并在必要时将该锁转换为限制性更强的级别。例如，如果你使用`FOR UPDATE`子句从表中选择一行，将创建两个锁。一个锁放置在你选择的行上（这将是一个排他锁；其他人不能以排他模式锁定该特定行）。另一个锁，一个`ROW
  SHARE TABLE`锁，放置在表本身上。这将阻止其他会话在表上放置排他锁，从而防止他们更改表的结构。另一个会话可以修改此表中的任何其他行而不会冲突。在表中有一行被锁定的情况下，尽可能多地允许可以成功执行的命令。


  锁升级不是数据库的“功能”。它不是一个理想的属性。数据库支持锁升级这一事实意味着其锁定机制存在一些固有的开销，并且需要执行大量工作来管理数百个锁。在 Oracle
  中，持有一个锁或一百万个锁的开销是相同的：没有。


  ## 锁类型


  Oracle 中的三大类锁如下：


  *   **DML 锁**：DML 代表*数据操作语言*。通常，这指的是`SELECT`、`INSERT`、`UPDATE`、`MERGE`和`DELETE`语句。DML
  锁是允许多个数据修改并发进行的机制。例如，DML 锁可以是特定数据行上的锁，也可以是表级别的锁，锁定表中的每一行。

  *   **DDL 锁**：DDL 代表*数据定义语言*（`CREATE`和`ALTER`语句等）。DDL 锁保护对象结构的定义。

  *   **内部锁和门**：Oracle 使用这些锁来保护其内部数据结构。例如，当 Oracle 解析查询并生成优化的查询计划时，它会门住库缓存以将该计划放入其中供其他会话使用。门是
  Oracle 使用的一种轻量级、低级别的序列化设备，功能类似于锁。不要被*轻量级*这个术语所混淆或误导；正如你将看到的，门是数据库争用的常见原因。它们在实现上是轻量级的，但在效果上并非如此。


  我们现在将更详细地了解这些通用类别中的具体锁类型及其使用的影响。锁的种类比我能在这里涵盖的要多。我在后续章节中涵盖的是最常见的并且持有时间较长的锁。其他类型的锁通常持有时间非常短。


  ### DML 锁


  DML 锁用于确保一次只有一个人修改一行，并且没有人可以删除你正在使用的表。Oracle 会或多或少地为你透明地放置这些锁。




  '
- '# TX（事务）锁


  `TX` 锁（事务锁）是在事务发起其首次更改时获取的。此时事务会自动启动（在 Oracle 中你不需要显式启动事务）。该锁会一直保持，直到事务执行 `COMMIT`
  或 `ROLLBACK`。它被用作一种排队机制，以便其他会话可以等待事务完成。在一个事务中，你修改或通过 `SELECT FOR UPDATE` 选中的每一行，都会指向与该事务关联的
  `TX` 锁。虽然这听起来开销很大，但其实不然。要理解原因，你需要从概念上理解锁的存储位置和管理方式。在 Oracle 中，锁被存储为数据的一个属性（有关 Oracle
  块格式的概述，请参见第 10 章）。Oracle 没有一个传统的锁管理器来维护系统中每一行被锁定的长列表。许多其他数据库采用那种方式，因为对他们来说，锁是稀缺资源，其使用需要被监控。使用的锁越多，这些系统需要管理的就越多，因此如果使用了太多锁，在这些系统中就是一个问题。


  在一个具有基于内存的传统锁管理器的数据库中，锁定一行的过程类似于以下步骤：


  1.  找到你想要锁定的行的地址。

  2.  在锁管理器处排队（这必须被序列化，因为它是一个公共的内存结构）。

  3.  锁定列表。

  4.  搜索列表，查看是否有人已经锁定了这行。

  5.  在列表中创建一个新条目，以确立你已经锁定了该行的事实。

  6.  解锁列表。


  现在你已经锁定了该行，可以对其进行修改。之后，当你提交更改时，你必须继续执行以下过程：


  1.  再次排队。

  2.  锁定锁列表。

  3.  搜索列表并释放你所有的锁。

  4.  解锁列表。


  如你所见，获取的锁越多，在修改数据前后花费在此操作上的时间就越多。Oracle 不是这样做的。Oracle 的流程如下：


  1.  找到你想要锁定的行的地址。

  2.  前往该行。

  3.  就在那里，就在那时锁定该行——在行所在的位置，而不是在某个大列表里（如果该行已被锁定，则等待持有该锁的事务结束，除非你使用 `NOWAIT` 选项）。


  就这样。由于锁是作为数据的属性存储的，Oracle 不需要传统的锁管理器。事务只需直接前往数据并锁定它（如果尚未锁定）。有趣的是，即使数据实际上未被锁定，当你到达时它也可能看起来是锁定的。当你在
  Oracle 中锁定数据行时，该行会指向一个存储在包含该数据的块中的事务 ID 副本，当锁被释放时，该事务 ID 会被留下。这个事务 ID 对你的事务是唯一的，代表撤销段号、槽和序列号。你将它留在包含你的行的块上，以告知其他会话你拥有此数据（不是块上的所有数据，只是你正在修改的那一行）。当另一个会话到来时，它会看到该事务
  ID，并利用它代表一个事务这一事实，可以快速查看持有锁的事务是否仍然活动。如果锁不活动，则允许会话访问数据。如果锁仍然活动，该会话将请求在锁释放时立即收到通知。因此，你就有了一个排队机制：请求锁的会话将排队等待该事务完成，然后它将获得数据。


  下面是一个使用三个 `V$` 表的小例子，展示了这是如何发生的：


  *   `V$TRANSACTION`，其中包含每个活动事务的条目。

  *   `V$SESSION`，显示已登录的会话。

  *   `V$LOCK`，其中包含所有正在持有的入队锁以及正在等待锁的会话的条目。你不会在这个视图中看到会话锁定的每一行对应的一行。如前所述，行级别的主锁列表并不存在。如果一个会话锁定了
  `EMP` 表中的一行，则此视图中将有一行指示该事实。如果一个会话锁定了 `EMP` 表中的数百万行，此视图中仍然只有一行。此视图显示各个会话持有的入队锁。


  首先，让我们获取 `EMP` 和 `DEPT` 表的副本。如果你的模式中已有它们，请使用以下定义替换它们：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> create table dept as select * from scott.dept;

  Table created.

  SQL> create table emp as select * from scott.emp;

  Table created.

  SQL> alter table dept

  add constraint dept_pk

  primary key(deptno);

  Table altered.

  SQL> alter table emp

  add constraint emp_pk

  primary key(empno);

  Table altered.

  SQL> alter table emp

  add constraint emp_fk_dept

  foreign key (deptno)

  references dept(deptno);

  Table altered.

  SQL> create index emp_deptno_idx on emp(deptno);

  Index created.

  ```


  现在让我们启动一个事务：


  ```

  SQL> update dept set dname = initcap(dname);

  4 rows updated.

  ```


  现在，让我们看看此时系统的状态。此示例假设是单用户系统；否则，你可能会在 `V$TRANSACTION` 中看到多行。即使在单用户系统中，如果在 `V$TRANSACTION`
  中看到多行也不要惊讶，因为许多后台 Oracle 进程可能也在执行事务。


  ```

  SQL> select username,

  v$lock.sid,

  trunc(id1/power(2,16)) rbs,

  bitand(id1,to_number(''ffff'',''xxxx''))+0 slot,

  id2 seq,

  lmode,

  request

  from v$lock, v$session

  where v$lock.type = ''TX''

  and v$lock.sid = v$session.sid

  and v$session.username = USER;

  USERNAME             SID       RBS      SLOT       SEQ     LMODE    REQUEST

  --------------- -------- --------- --------- --------- --------- ----------

  EODA                  22         2        27     21201         6          0

  SQL> select XIDUSN, XIDSLOT, XIDSQN from v$transaction;

  XIDUSN    XIDSLOT     XIDSQN

  ---------- ---------- ----------

  2         27      21201

  ```


  这里需要注意的要点如下：


  *   `V$LOCK` 表中的 `LMODE` 是 6，`REQUEST` 是 0。如果你参考 *Oracle Database Reference* 手册中对
  `V$LOCK` 表的定义，你会发现 `LMODE=6` 是一个排他锁。请求列中的值 `0` 表示你没有提出请求；你已经持有了锁。

  *   此表中只有一行。这个 `V$LOCK` 表更像是一个排队表而不是锁表。许多人期望在 `V$LOCK` 中有四行，因为我们锁定了四行。但请记住，Oracle
  没有在任何地方存储所有被锁定行的主列表。要确定一行是否被锁定，我们必须前往该行。

  *   我对 `ID1` 和 `ID2` 列进行了一些操作。Oracle 需要保存三个 16 位数字，但只有两列来做到这一点。因此，第一列 `ID1` 保存了其中两个数字。通过使用
  `trunc(id1/power(2,16)) rbs` 除以 2¹⁶，并使用 `bitand(id1,to_number(''ffff'',''xxxx''))+0
  slot` 屏蔽高位，我能够取回隐藏在那个数字中的两个数字。

  *   `RBS`、`SLOT` 和 `SEQ` 值与 `V$TRANSACTION` 信息匹配。这就是我的事务 ID。


