- '# 7. 并发与多版本控制


  开发多用户、数据库驱动应用程序的关键挑战之一是最大化并发访问，同时确保每个用户能够以一致的方式读取和修改数据。在本章中，我们将详细探讨 Oracle 如何实现*多版本读取一致性*，以及这对您——开发人员和
  DBA——意味着什么。我还将引入一个新术语，*写入一致性*，并用它来描述 Oracle 如何在具有读取一致性的读取环境中工作，以及在混合读取和写入环境中如何工作。



  ## 什么是并发控制？


  并发控制（Concurrency controls）是数据库提供的一系列功能，允许多人同时访问和修改数据。正如前两章所述，锁（lock）是 Oracle 用来调节对共享数据库资源的并发访问并防止并发数据库事务之间相互干扰的核心机制之一。简而言之，Oracle
  使用各种锁，包括以下类型：


  *   `TX`（事务）锁：这些锁在数据修改事务期间被获取。

  *   `TM`（DML 队列）和 `DDL` 锁：这些锁用于确保在修改对象内容时（`TM` 锁）或修改对象本身时（`DDL` 锁），对象的结构不会被更改。

  *   `Latches` 和 `mutexes`：这些是 Oracle 用来协调对其共享数据结构访问的内部锁。在本章中，我们会将两者统称为 `latches`，尽管根据
  Oracle 版本的不同，它们在你的操作系统上可能通过 `mutex` 来实现。


  在每种情况下，获取锁的开销都很小。`TX` 事务锁在性能和基数方面都具有极高的可扩展性。`TM` 和 `DDL` 锁会在可能的情况下以限制性最小的模式应用。`Latches`
  和 `enqueues` 都非常轻量且快速（`enqueues` 稍重一些，但功能更丰富）。问题只出现在设计不佳的应用程序中，它们会持有锁的时间**超过必要**，从而导致数据库阻塞。如果你设计良好，Oracle
  的锁定机制将允许构建可扩展、高度并发的应用程序。


  > 注意

  > 我用了“超过必要”这个说法。这并不意味着你应该尽快提交（结束你的事务）。事务应该恰好是它们所需的长度——不要更长。也就是说，你的事务是你的工作单元；它是全有或全无的。你应该在工作单元完成时提交，而不是之前——也不要晚于该提交的时候！


  但 Oracle 对并发的支持远不止高效的锁定。它实现了一个**多版本**（multiversioning）架构，提供了对数据的受控且高度并发的访问。多版本描述了
  Oracle 能够同时物化数据的多个版本的能力，也是 Oracle 提供数据读一致视图（即，相对于某个时间点的一致结果）的机制。多版本一个相当令人愉快的副作用是，数据的读取者永远不会被数据的写入者阻塞。换句话说，写操作不会阻塞读操作。这是
  Oracle 与其他数据库之间的根本区别之一。在 Oracle 中，只读信息的查询永远不会被阻塞；它永远不会与另一个会话发生死锁，也永远不会得到一个在数据库中不存在的答案。


  > 注意

  > 在分布式**两阶段提交**（two-phase commit）的处理过程中，有一小段时间 Oracle 会阻止对信息的读访问。由于这种处理相对罕见且是例外情况（该问题仅影响那些在准备阶段和提交阶段之间启动、并试图在提交到达之前读取数据的查询），我将不在此详细讨论。


  Oracle 用于读一致性的多版本模型默认在**语句级别**（对每个查询）应用，也可以在**事务级别**应用。这意味着提交给数据库的每个 SQL 语句至少能看到数据库的一个读一致视图——如果你希望这个读一致视图达到事务级别（一组
  SQL 语句），你也可以做到，正如我们将在本章的“SERIALIZABLE”部分中看到的那样。


  数据库中事务的基本目的是将数据库从一个一致状态带到下一个一致状态。ISO SQL 标准定义了各种**事务隔离级别**（transaction isolation
  levels），这些级别定义了一个事务对另一个事务所做更改的**敏感程度**（sensitive）。敏感度越高，你的应用程序执行的事务之间数据库必须提供的隔离程度就越高。在下一节中，我们将看看
  Oracle 如何通过其多版本架构以及绝对最小化的锁定来支持每一个定义的隔离级别。


  ## 事务隔离级别


  ANSI/ISO SQL 标准定义了四种事务隔离级别，相同的事务场景可能产生不同的结果。也就是说，以相同的方式、使用相同的输入执行相同的工作，可能会根据你的隔离级别得到不同的答案。这些隔离级别是根据三个“现象”来定义的，这些现象在给定的隔离级别下是否被允许：


  *   **脏读**（Dirty read）：这个术语的含义与其字面意思一样糟糕。它允许你读取未提交的，或**脏**（dirty）数据。你可以通过打开他人正在写入的操作系统文件并读取碰巧在那里的任何数据来达到这种效果。这会损害数据完整性，违反外键，并忽略唯一约束。

  *   **不可重复读**（Nonrepeatable read）：这简单地意味着，如果你在时间 `T1` 读取了一行，并尝试在时间 `T2` 重新读取该行，该行可能已更改、可能已消失、可能已被更新等等。

  *   **幻像读**（Phantom read）：这意味着如果你在时间 `T1` 执行了一个查询，并在时间 `T2` 重新执行它，可能已有额外的行被添加到数据库中，这将影响你的结果。这与不可重复读的不同之处在于，对于幻像读，你已经读取的数据并未被更改，而是有*更多*的数据满足了你的查询条件。


  > 注意

  > ANSI/ISO SQL 标准定义的是**事务级别**的特性，而不仅仅是单独的语句级别特性。在接下来的内容中，我们将检查事务级别的隔离，而不仅仅是语句级别的隔离。


  SQL 隔离级别是根据是否允许上述每种现象来定义的。我注意到一个有趣的现象，SQL 标准并不强制特定的锁定方案或规定特定的行为，而是通过这些现象来描述这些隔离级别，从而允许存在许多不同的锁定/并发机制（见表
  7-1）。


  表 7-1

  ANSI 隔离级别


  | 隔离级别 | 脏读 | 不可重复读 | 幻像读 |

  | --- | --- | --- | --- |

  | `READ UNCOMMITTED` | 允许 | 允许 | 允许 |

  | `READ COMMITTED` | – | 允许 | 允许 |

  | `REPEATABLE READ` | – | – | 允许 |

  | `SERIALIZABLE` | – | – | – |


  Oracle 明确支持标准中定义的 `READ COMMITTED` 和 `SERIALIZABLE` 隔离级别。然而，这并未揭示全部情况。SQL 标准试图建立隔离级别，以允许在每个级别执行的查询具有不同程度的一致性。`REPEATABLE
  READ` 是 SQL 标准声称能保证查询结果读一致性的隔离级别。根据其定义，`READ COMMITTED` 不会给你一致的结果，而 `READ UNCOMMITTED`
  是用于获取非阻塞读取的级别。


  然而，在 Oracle 中，`READ COMMITTED` 具有实现读一致查询所需的所有属性。在许多其他数据库中，`READ COMMITTED` 查询可能且将会返回那些在数据库的任何时间点都从未存在过的答案。此外，Oracle
  也支持 `READ UNCOMMITTED` 的**精神**。提供脏读的目的是为了提供非阻塞读取，使得查询不会被相同数据的更新阻塞，也不会阻塞这些更新。然而，Oracle
  不需要脏读来实现这一目标，也不支持它们。脏读是其他数据库为了提供非阻塞读取而必须使用的一种实现方式。




  '
- '# Oracle 事务隔离级别与多版本并发控制


  除了四个标准的 SQL 隔离级别外，Oracle 还提供了另一个级别，即`READ ONLY`。`READ ONLY`事务等同于在 SQL 中无法执行任何修改的`REPEATABLE
  READ`或`SERIALIZABLE`事务。使用`READ ONLY`隔离级别的事务只看到那些*在事务开始时*已提交的更改，但在此模式下不允许插入、更新和删除（其他会话可以更新数据，但`READ
  ONLY`事务本身不能）。使用此模式，你可以实现`REPEATABLE READ`和`SERIALIZABLE`级别的隔离。


  现在，让我们继续详细讨论多版本并发控制和读一致性如何融入隔离方案，以及不支持多版本并发控制的数据库如何实现相同的结果。这些信息对于使用过其他数据库并认为自己理解隔离级别工作原理的人很有指导意义。有趣的是，一个旨在消除数据库之间差异的标准，即
  ANSI/ISO SQL 标准，实际上允许了差异的存在。该标准虽然非常详细，但可以用非常不同的方式来实现。


  ### READ UNCOMMITTED


  `READ UNCOMMITTED`隔离级别允许脏读。Oracle 不使用脏读，甚至不允许脏读。`READ UNCOMMITTED`隔离级别的基本目标是提供一个基于标准的定义，以支持非阻塞读。正如我们所看到的，Oracle
  默认就提供了非阻塞读。在数据库中，你很难让一个`SELECT`查询阻塞（如前所述，分布式事务是一个特例）。每一个查询，无论是`SELECT`、`INSERT`、`UPDATE`、`MERGE`还是`DELETE`，都以读一致的方式执行。将`UPDATE`语句称为查询可能看起来有点奇怪，但它确实是。`UPDATE`语句有两个组成部分：由`WHERE`子句定义的读组件和由`SET`子句定义的写组件。`UPDATE`语句读写数据库；所有
  DML 语句都有这个能力。使用`VALUES`子句的单行`INSERT`是唯一的例外，因为此类语句没有读组件，只有写组件。


  在第 1 章中，通过一个简单的单表查询演示了 Oracle 获取读一致性的方法，该查询检索了在游标打开后被删除的行。现在，我们将探索一个真实世界的例子，看看 Oracle
  使用多版本并发控制时会发生什么，以及其他许多数据库中会发生什么。


  让我们从一个基本的表和查询开始：


  ```

  SQL> create table accounts

  ( account_number number primary key,

  account_balance number not null);

  SQL> select sum(account_balance) from accounts;

  ```


  在查询开始之前，假设我们有表 7-2 所示的数据。


  表 7-2 修改前的 ACCOUNTS 表


  | 行 | 账户号码 | 账户余额 |

  | --- | --- | --- |

  | 1 | 123 | $500.00 |

  | 2 | 456 | $240.25 |

  | … | … | … |

  | 342,023 | 987 | $100.00 |


  现在，我们的`select`语句开始执行，并读取第 1 行、第 2 行，依此类推。


  > 注意

  >

  > 在这个例子中，我并不是说磁盘上的行有任何物理排序。表中实际上没有第一行、第二行或最后一行。只有一组行。我们这里假设第 1 行的意思是“我们碰巧读到的第一行”，第
  2 行是“我们碰巧读到的第二行”，依此类推。


  在我们查询执行过程中的某个时刻，一个事务将$400.00 从账户 123 转移到账户 987。该事务执行了两个更新操作但并未提交。此时表看起来如表 7-3 所示。


  表 7-3 修改期间的 ACCOUNTS 表


  | 行 | 账户号码 | 账户余额 | 锁定？ |

  | --- | --- | --- | --- |

  | 1 | 123 | ($500.00) 变为 $100.00 | X |

  | 2 | 456 | $240.25 | -- |

  | … | … | … | -- |

  | 342,023 | 987 | ($100.00) 变为 $500.00 | X |


  因此，这两行被锁定了。如果有人试图更新它们，该用户将被阻塞。到目前为止，我们在所有数据库中看到的行为大致相同。区别将出现在查询遇到被锁定的数据时。


  当我们执行的查询到达表底部包含被锁定行（第 342,023 行）的数据块时，它会注意到其中的数据自查询开始执行以来已经改变。为了提供一致（正确）的答案，Oracle
  此时会创建包含此行的数据块的副本，*该副本是查询开始时该块存在的状态*。也就是说，它将读取$100.00 的值，即查询开始时存在的值。实际上，Oracle 绕过了修改后的数据；它从回滚段（也称为*撤销段*）中读取并重建数据。无需等待事务提交，就能返回一个一致且正确的答案。


  现在，一个允许脏读的数据库会直接返回它在读取时看到的账户 987 的值，在这个例子中是$500.00。该查询将把转移的$400 计算两次。因此，它不仅返回了错误的答案，而且返回了一个在表中任何已提交时间点都从未存在过的总数。在多用户数据库中，脏读可能是一个危险的功能，就我个人而言，我从未见过它的用处。假设该交易不是转移，而实际上只是向账户
  987 存入$400.00。脏读会计算这$400 并得到“正确”的答案，不是吗？但是，假设未提交的交易被回滚了。我们刚刚计算了一个从未实际存在于数据库中的$400。


  这里的要点是，脏读不是一个特性；相反，它是一个负担。在 Oracle 中，根本不需要它。你获得了脏读的所有优点（无阻塞），却没有任何不正确的结果。




  ### 已提交读 (`READ COMMITTED`)


  `READ COMMITTED` 隔离级别规定，事务只能读取数据库中已提交的数据。**不存在脏读**。但可能存在**不可重复读**（即，在同一事务中重新读取同一行可能返回不同结果）和**幻读**（即，事务执行过程中，之前不可见的新插入并已提交的行对查询变得可见）。`READ
  COMMITTED` 可能是全球数据库应用中最常用的隔离级别，它是 Oracle 数据库的默认模式；很少看到使用其他隔离级别。


  然而，实现 `READ COMMITTED` 隔离并不像听起来那么简单明了。如果你查看表 7-1，它看起来很直接。显然，根据之前的规则，在任何使用 `READ
  COMMITTED` 隔离级别的数据库中执行的查询，其行为方式应该是相同的，不是吗？***并非如此。*** 如果你在一条语句中查询多行数据，那么在几乎所有其他数据库中，`READ
  COMMITTED` 隔离的效果可能糟糕得如同脏读，具体取决于实现方式。


  在 Oracle 中，利用多版本机制和读一致性查询，我们从 `ACCOUNTS` 查询得到的结果与 `READ UNCOMMITTED` 示例中相同。Oracle
  会重构数据，使其看起来如同查询开始时那样，返回查询开始时数据库中存在的答案。


  现在，让我们看看我们之前的示例在其他数据库的 `READ COMMITTED` 模式下可能如何工作——你可能会对答案感到惊讶。我们从前面表格描述的时点继续我们的示例：


  *   我们正处于表格处理的中途。我们已经读取并汇总了前 N 行。

  *   另一个事务已将 $400.00 从账户 123 转移到账户 987。

  *   该事务尚未提交，因此包含账户 123 和 987 信息的行被锁定。


  我们知道当 Oracle 处理到账户 987 时会发生什么——它会绕过被修改的数据读取，查明其值应为 $100.00，然后完成查询。表 7-4 展示了另一个运行在某种默认
  `READ COMMITTED` 模式的数据库可能如何得出答案。


  表 7-4


  非 Oracle 数据库使用 READ COMMITTED 隔离级别的时间线


  | 时间 | 查询 | 账户转账事务 |

  | --- | --- | --- |

  | T1 | 读取第 1 行，账户 123，值=$500。当前总和=$500.00。 | -- |

  | T2 | 读取第 2 行，账户 456，值=$240.25。当前总和=$740.25。 | -- |

  | T3 | -- | 更新第 1 行（账户 123）并对第 1 行施加排他锁，阻止其他更新和读取。第 1 行原为 $500.00，现在为 $100.00。 |

  | T4 | 读取第 N 行。总和 = … | -- |

  | T5 | -- | 更新第 342,023 行（账户 987）并对该行施加排他锁。该行原为 $100；现在为 $500.00。 |

  | T6 | 尝试读取第 342,023 行，账户 987。发现该行已被锁定。此会话将阻塞并等待该行的数据块变为可用。*此查询上的所有处理停止。* | -- |

  | T7 | -- | 提交事务。 |

  | T8 | 读取第 342,023 行，账户 987，看到 $500.00，并呈现一个最终答案，其中 $400.00 被重复计算。 | -- |


  首先要注意的是，这个其他数据库在处理到账户 987 时，会阻塞我们的查询。此会话必须等待该行，直到持有排他锁的事务提交。这就是为什么许多人养成了每条语句都提交的坏习惯，而不是处理由将数据库从一个一致状态转移到下一个一致状态所需的所有语句组成、结构良好的事务。*在大多数其他数据库中，更新会干扰读取。*
  在此场景中，真正糟糕的消息是，我们让最终用户等待一个***错误***的答案。我们仍然收到了一个答案，这个答案在数据库已提交状态的任何时间点都从未存在过，如同脏读一样，但这次我们让用户等待了一个错误的答案。在下一节中，我们将探讨这些其他数据库需要做什么才能实现读一致、正确的结果。


  这里的重要教训是，在相同、看似安全的隔离级别下运行的各种数据库，在完全相同的情况下可能并且将会返回非常不同的答案。重要的是要理解，在 Oracle 中，非阻塞读取并非以牺牲正确答案为代价。有时，你可以两者兼得。


  ### 可重复读 (`REPEATABLE READ`)


  `REPEATABLE READ` 的目标是提供一个能给出一致、正确答案并防止丢失更新的隔离级别。我们将分别查看两者的示例，了解在 Oracle 中实现这些目标需要做什么，并考察其他系统中发生的情况。




  '
- "# 获取一致的答案\n\n如果我们采用 `REPEATABLE READ` 隔离级别，那么给定查询的结果必须相对于某个时间点保持一致。大多数数据库（Oracle\
  \ 除外）通过使用行级共享读锁来实现可重复读。共享读锁可防止其他事务修改我们已读取的数据。当然，这会降低并发性。Oracle 则选择了并发性更高的多版本模型来提供读一致的答案。\n\
  \n在 Oracle 中，通过多版本机制，我们得到的答案与查询开始执行的时间点是一致的。而在其他使用共享读锁的数据库中，我们得到的答案与查询完成的时间点是一致的——也就是说，当我们最终能拿到答案时（这一点稍后会详细说明）。\n\
  \n在一个使用共享读锁来提供可重复读的系统中，我们会观察到随着查询处理数据，表中的行会被锁定。因此，使用前面的例子，当我们的查询读取 `ACCOUNTS` 表时，它会在每一行上留下共享读锁，如表\
  \ 7-5 所示。\n\n表 7-5\n非 Oracle 数据库中使用 READ REPEATABLE 隔离级别的时间线 1\n\n| 时间 | 查询 | 账户转账事务\
  \ |\n| --- | --- | --- |\n| T1 | 读取第 1 行。当前累计金额=$500.00。第 1 行上有一个共享读锁。 | -- |\n\
  | T2 | 读取第 2 行。当前累计金额=$740.25。第 2 行上有一个共享读锁。 | -- |\n| T3 | -- | 尝试更新第 1 行但被阻塞。事务挂起，直到能够获取到排他锁。\
  \ |\n| T4 | 读取第 N 行。累计金额 = … | -- |\n| T5 | 读取第 342,023 行，看到 $100.00，并呈现最终答案。 |\
  \ -- |\n| T6 | 提交事务。 | -- |\n| T7 | -- | 更新第 1 行并在该行上放置排他锁。该行现在有 $100.00。 |\n| T8\
  \ | -- | 更新第 342,023 行并在该行上放置排他锁。该行现在有 $500.00。提交事务。 |\n\n表 7-5 显示我们现在得到了正确的答案，但代价是物理上阻塞了一个事务，并且两个事务是顺序执行的。这是使用共享读锁来获得一致性答案的副作用之一：*数据的读取者会阻塞数据的写入者*。除此之外，在这些系统中，数据的写入者也会阻塞数据的读取者。想象一下现实生活中的自动取款机（ATM）如果以这种方式工作会怎样。\n\
  \n所以，你可以看到共享读锁如何抑制并发性，但它们还可能导致虚假错误的发生。在表 7-6 中，我们从原始表开始，但这次的目标是从账户 987 向账户 123 转账\
  \ $50.00。\n\n表 7-6\n非 Oracle 数据库中使用 READ REPEATABLE 隔离级别的时间线 2\n\n| 时间 | 查询 | 账户转账事务\
  \ |\n| --- | --- | --- |\n| T1 | 读取第 1 行。当前累计金额=$500.00。第 1 行上有一个共享读锁。 | -- |\n\
  | T2 | 读取第 2 行。当前累计金额=$740.25。第 2 行上有一个共享读锁。 | -- |\n| T3 | -- | 更新第 342,023 行并在第\
  \ 342,023 行上放置排他锁，阻止其他更新和共享读锁。该行现在有 $50.00。 |\n| T4 | 读取第 N 行。累计金额 = … | -- |\n\
  | T5 | -- | 尝试更新第 1 行但被阻塞。事务挂起，直到能够获取到排他锁。 |\n| T6 | 尝试读取第 342,023 行但无法读取，因为已经存在一个排他锁。\
  \ | -- |\n\n我们刚刚遇到了经典的死锁情况。我们的查询持有了更新事务所需的资源，反之亦然。我们的查询与我们的更新事务发生了死锁。其中一个事务将被选为牺牲品并被终止。我们花费了大量时间和资源，结果却在最后失败并被回滚。这是共享读锁的第二个副作用：*数据的读取者和写入者能够并且经常会发生死锁*。\n\
  \n在 Oracle 中，我们实现了语句级读一致性，而不会出现读阻塞写或死锁的情况。Oracle 从不——*绝不*——使用共享读锁。Oracle 选择了实现难度更高但并发性无限的多版本方案。\n\
  \n## 丢失的更新：另一个可移植性问题\n\n在采用共享读锁的数据库中，`REPEATABLE READ` 的一个常见用途可能是防止丢失更新。\n\n注意\n\
  丢失更新的检测和解决方法在前一章中已讨论。\n\n如果我们在一个*采用共享读锁*（而非多版本机制）的数据库中启用了 `REPEATABLE READ`，则丢失更新错误不会发生。在这些数据库中丢失更新不会发生的原因是，仅仅选择数据这一操作*就会在数据上留下锁，一旦我们的事务读取了数据，该数据就不能被任何其他事务修改。*\
  \ 现在，如果你的应用程序假设 `REPEATABLE READ` 意味着“丢失更新不会发生”，那么当你将应用程序迁移到不使用共享读锁作为底层并发控制机制的数据库时，你将会遭遇痛苦的意外。\n\
  \n注意\n在无状态环境（例如基于 Web 的应用程序）中，即使是在 `REPEATABLE READ` 隔离级别下，丢失更新也很可能是一个值得关注的问题。这是因为单个数据库会话通过连接池被许多客户端使用，并且锁不会跨调用保持。`REPEATABLE\
  \ READ` 隔离级别仅在有状态环境（例如客户端-服务器应用程序所观察到的）中才能防止丢失更新。\n\n虽然这听起来不错，但你必须记住，在读取数据时将共享读锁留在所有数据上，当然会严重限制并发读取和修改。因此，虽然在这些数据库中这个隔离级别提供了丢失更新的预防，但它是通过移除执行并发操作的能力来实现这一点的！你不可能两全其美。\n\
  \n\n\n### 可串行化（SERIALIZABLE）\n\n这通常被认为是最严格的事务隔离级别，但它提供了最高程度的隔离。`SERIALIZABLE`事务在其运行环境中，仿佛没有其他用户在修改数据库中的数据。我们读取的任何行在重新读取时都保证是相同的，并且任何查询在事务生命周期内都保证返回相同的结果。例如，如果我们执行以下操作，即使我们刚刚休眠了\
  \ 24 小时（或者可能会得到一个`ORA-01555, snapshot too old`错误，这将在下一章讨论），从`T`返回的答案也将是相同的：\n```\n\
  SQL> select * from T;\nSQL> begin dbms_lock.sleep( 60*60*24 ); end;\nSQL> select\
  \ * from T;\n```\n\n隔离级别`SERIALIZABLE`确保这两个查询总是返回相同的结果。无论查询运行了多久，其他事务所做的副作用（更改）对这个查询都是不可见的。\n\
  \n在 Oracle 中，`SERIALIZABLE`事务的实现方式，是将通常我们在语句级别获得的读一致性扩展到了事务级别。\n\n> **注意**\n> 如前所述，在\
  \ Oracle 中还有一个用`READ ONLY`表示的隔离级别。它具有`SERIALIZABLE`隔离级别的所有特性，但禁止修改。需要注意的是，`SYS`用户（或使用`SYSDBA`权限连接的用户）*不能*拥有`READ\
  \ ONLY`或`SERIALIZABLE`事务。`SYS`在这方面是特殊的。\n\n结果不是相对于语句开始时间保持一致，而是在您开始事务时就已经被预定了。换句话说，Oracle\
  \ 使用回滚段来重建我们的事务开始时存在的数据，而不仅仅是语句开始时的数据。\n\n这是一个相当深刻的想法：在你提问之前，数据库就已经知道你可能问的任何问题的答案了。\n\
  \n#### 可能的错误：ORA-08177\n这种程度的隔离是有代价的，这个代价就是可能出现的以下错误：\n```\nERROR at line 1:\nORA-08177:\
  \ can't serialize access for this transaction\n```\n每当您尝试更新自事务开始以来已更改的行时，就会收到此消息。\n\
  \n> **注意**\n> Oracle 尝试在行级别纯粹地实现这一点，但即使您感兴趣的行尚未被修改，您也可能收到`ORA-08177`错误。`ORA-08177`错误可能由于包含您所在行的块上的某些其他行被修改而发生。\n\
  \nOracle 对串行化采取了一种乐观的方法——它赌您的事务想要更新的数据不会被任何其他事务更新。这通常是实际情况，而且通常赌注会得到回报，尤其是在快速事务的\
  \ OLTP 类系统中。如果在您的事务期间没有其他人更新您的数据，这种在其他系统中通常会降低并发性的隔离级别，将提供与没有`SERIALIZABLE`事务时相同的并发程度。这样做的缺点是，如果赌注没有得到回报，您可能会得到`ORA-08177`错误。然而，仔细想想，这个风险是值得的。如果您使用`SERIALIZABLE`事务，您不应该期望与其他事务更新相同的信息。如果您确实需要这样做，您应该使用第[1]章中描述的`SELECT\
  \ ... FOR UPDATE`，这将会串行化访问。\n\n#### 何时使用 SERIALIZABLE\n因此，如果您满足以下条件，使用`SERIALIZABLE`隔离级别将是可行且有效的：\n\
  *   没有其他人修改相同数据的可能性很高\n*   需要事务级别的读一致性\n*   将进行短事务（以帮助使第一个要点成为现实）\n\nOracle 发现这种方法具有足够的可扩展性来运行其所有的\
  \ TPC-C 测试（一种行业标准的 OLTP 基准测试；详见[`www.tpc.org`](http://www.tpc.org)）。在许多其他实现中，您会发现这是通过共享读锁及其相应的死锁和阻塞来实现的。在\
  \ Oracle 中，我们不会得到任何阻塞，但如果其他会话也更改了我们想要更改的数据，我们将得到`ORA-08177`错误。然而，我们遇到这种错误的频率，不会像在其他系统中遇到死锁和阻塞那样高。\n\
  \n但是——总有一个“但是”——您必须注意理解这些不同的隔离级别及其含义。请记住，当隔离设置为`SERIALIZABLE`时，在您提交之前，您将看不到事务开始后数据库中所做的任何更改。试图强制执行自身数据完整性约束的应用程序在这方面必须格外小心。使用`SERIALIZABLE`，您将看不到未提交的更改；此外，您也看不到事务开始后所做的已提交更改。\n\
  \n#### 澄清一个误解\n最后一点，要注意`SERIALIZABLE`*并不*意味着用户执行的所有事务都会表现得好像它们是一个接一个以串行方式执行的一样。它并不意味着存在某种事务的串行排序会导致相同的结果。SQL\
  \ 标准先前描述的现象并不能使这一点发生。这最后一点是一个经常被误解的概念，一个小的演示将澄清它。下表代表两个会话随时间执行工作。数据库表`A`和`B`开始为空，创建如下：\n\
  ```\nSQL> create table a ( x int );\nSQL> create table b ( x int );\n```\n现在，我们有表[7-7]所示的一系列事件。\n\
  \n表 7-7\n可串行化事务示例\n| 时间 | 会话 1 执行 | 会话 2 执行 |\n| --- | --- | --- |\n| T1 | `SQL>\
  \ alter session set isolation_level=serializable;` | -- |\n| T2 | -- | `SQL> alter\
  \ session set isolation_level=serializable;` |\n| T3 | `SQL> insert into a select\
  \ count(*) from b;` | -- |\n| T4 | -- | `SQL> insert into b select count(*) from\
  \ a;` |\n| T5 | `SQL> commit;` | -- |\n| T6 | -- | `SQL> commit;` |\n\n现在，当这一切都完成后，表`A`和`B`将各有一行值为\
  \ 0 的记录。如果存在某种事务的串行排序，我们不可能让两个表都包含值 0。如果会话 1 在会话 2 之前*完整执行*，那么表`B`将有一行值为 1 的记录。如果会话\
  \ 2 在会话 1 之前*完整执行*，那么表`A`将有一行值为 1 的记录。然而，按此处执行的方式，两个表都将包含值为*0*的行。它们只是执行得好像在当时是数据库中唯一的事务。无论会话\
  \ 1 查询表`B`多少次，也无论会话 2 的提交状态如何，计数都将是在时间 T1 提交到数据库中的计数。同样，无论会话 2 查询表`A`多少次，计数都将与时间\
  \ T2 时相同。\n\n\n\n### 只读\n\n`READ ONLY` 事务与 `SERIALIZABLE` 事务非常相似，唯一的区别是它们不允许修改，因此不受\
  \ `ORA-08177` 错误的影响。`READ ONLY` 事务旨在支持报表需求，确保报表内容相对于单一时间点是一致的。在其他系统中，你可能会使用 `REPEATABLE\
  \ READ` 并承受共享读锁带来的相关影响。而在 Oracle 中，你将使用 `READ ONLY` 事务。在此模式下，你使用 50 条 `SELECT` 语句来收集数据生成报表，其输出将相对于单一时间点——即事务开始的时间——保持一致。你将能够在不锁住任何数据的情况下完成此操作。\n\
  \n此目标通过使用与单条语句相同的多版本机制来实现。数据会根据需要从回滚段中重建，并以报表开始时存在的状态呈现给你。然而，`READ ONLY` 事务并非没有问题。在\
  \ `SERIALIZABLE` 事务中你可能会看到 `ORA-08177` 错误，而在 `READ ONLY` 事务中，你预期会看到 `ORA-01555 snapshot\
  \ too old`（快照过旧）错误。这会在其他人正在积极修改你所读取信息的系统上发生。对这些信息的更改（撤销）被记录在回滚段中。但回滚段是以循环方式使用的，类似于重做日志。报表运行的时间越长，你需要的、用于重建数据的某些撤销信息可能已不复存在的几率就越大。回滚段可能已经回绕，而你所需的部分可能已被其他事务重用。此时，你将收到\
  \ `ORA-01555` 错误并必须重新开始。\n\n解决这个棘手问题的唯一方法是为你的系统正确调整回滚表空间的大小。我一次又一次地看到人们试图通过设置尽可能小的回滚表空间来节省几兆字节的磁盘空间（“为什么要为我不真正需要的东西‘浪费’空间？”是他们的想法）。问题在于回滚表空间是数据库工作方式的关键组件，除非它大小合适，否则你将遇到此错误。在使用\
  \ Oracle 6、7、8、9、10、11 和 12 的多年里，我可以说我从未在测试或开发系统之外遇到过 `ORA-01555` 错误。在这种情况下，你知道你没有正确调整回滚表空间的大小，并且你会修复它。我们将在下一章重新讨论这个问题。\n\
  \n## 多版本读一致性的含义\n\n到目前为止，我们已经看到多版本控制如何为我们提供非阻塞读取，并且我已强调这是一件好事：提供一致（正确）的答案同时具有高并发性。这能有什么问题？嗯，除非你理解它的存在及其含义，否则你很可能在错误地执行某些事务。但它会以其他方式影响我们吗？答案绝对是肯定的。我们将在接下来的章节中深入探讨具体细节。\n\
  \n### 一种常见的数据仓库技术失败案例\n\n我见过人们采用的一种常见的数据仓库技术如下：\n\n1.  他们使用触发器来维护源表中的一个 `LAST_UPDATED`\
  \ 列，非常类似于前一章“乐观锁定”部分描述的方法。\n2.  为了初始填充数据仓库表，他们通过在源系统上选择 `SYSDATE` 来记住当前时间。例如，假设现在正好是上午\
  \ 9:00。\n3.  然后，他们从事务系统中拉取所有行——一个完整的 `SELECT * FROM TABLE`——以初始填充数据仓库。\n4.  为了刷新数据仓库，他们再次记住当前时间。例如，假设一个小时过去了——源系统上现在是上午\
  \ 10:00。他们会记住这个事实。然后，他们拉取自上午 9:00（他们开始第一次拉取前的时刻）以来所有更改的记录，并将它们合并进去。\n\n注意\n\n由于时钟的粒度，此技术可能在连续两次刷新中*拉取*同一条记录。这是不可避免的。`MERGE`\
  \ 操作不会受此影响（即，在数据仓库中更新现有记录或插入新记录）。\n\n他们相信现在数据仓库中包含了自他们进行初始拉取以来修改的所有记录。他们可能确实拥有所有记录，但也同样可能没有。此技术在某些其他数据库上有效——那些采用锁系统的数据库，其中读取会被写入阻塞，反之亦然。但在具有非阻塞读取的系统中，此逻辑是有缺陷的。\n\
  \n要看到此示例中的缺陷，我们只需假设在上午 9:00 至少有一个未提交的打开事务。在上午 8:59:30，它更新了我们即将复制的表中的某一行。在上午 9:00，当我们开始拉取数据并读取该表中的数据时，我们不会看到对该行的修改；我们将看到它最后提交的版本。如果在查询中遇到它时它被锁定，我们将绕过锁进行读取。如果在我们读到它时它已经提交，由于读一致性允许我们只读取在语句开始时已提交在数据库中的数据，我们仍然会绕过它读取。我们不会在上午\
  \ 9:00 的初始拉取中读取该行的新版本，也不会在上午 10:00 的刷新中读取已修改的行。原因是什么？上午 10:00 的刷新只会拉取该日上午 9:00 之后修改的记录，但此记录是在上午\
  \ 8:59:30 修改的。我们永远无法拉取这条已更改的记录。\n\n在许多其他读取会被写入阻塞并实现已提交但不一致读取的数据库中，此刷新过程将完美运行。如果在上午\
  \ 9:00 我们进行初始数据拉取时遇到该行并且它被锁定，我们将被阻塞并等待它，然后读取已提交的版本。如果它没有被锁定，我们将直接读取当时存在的任何已提交数据。\n\
  \n那么，这是否意味着前面的逻辑完全不能使用？不，这意味着我们需要以稍微不同的方式获取“当前”时间。我们需要查询 `V$TRANSACTION` 并找出当前时间与该视图\
  \ `START_TIME` 列中记录的时间中最早的一个。我们需要拉取自最旧事务开始时间（或者如果没有活动事务则为当前 `SYSDATE` 值）以来所有更改的记录：\n\
  \n```\nSQL> select nvl( min(to_date(start_time,'mm/dd/rr hh24:mi:ss')),sysdate)\n\
  from v$transaction;\n```\n\n注意\n\n无论 `V$TRANSACTION` 中是否存在任何数据，前面的查询都有效。也就是说，即使\
  \ `V$TRANSACTION` 为空（因为当前没有事务），此查询也会返回一条记录。带有聚合函数且没有 `WHERE` 子句的查询总是返回*至少*一行和*至多*一行。\n\
  \n在此示例中，那将是修改行的事务开始时的上午 8:59:30。当我们在上午 10:00 去刷新数据时，我们拉取自该时间以来发生的所有更改；当我们将这些合并到数据仓库中时，我们将拥有我们需要的一切。\n\
  \n\n\n### 关于热门表上超出预期的 I/O 的解释\n\n当你面临一个在生产环境（负载沉重时）的查询，其使用的 I/O 远多于在测试或开发系统中观察到的，且你无法解释原因时，理解读一致性和多版本机制就变得至关重要。你检查查询执行的\
  \ I/O，发现它高得离谱——远超可能的范围。你在测试环境上恢复了生产实例，发现 I/O 大幅下降。但在生产环境中，I/O 仍然非常高（但似乎波动：有时高，有时低，有时中等）。原因在于，正如我们将看到的，在测试系统中，你是独立运行的，无需撤销其他事务的更改。然而，在生产环境中，当你读取一个特定的数据块时，你可能需要撤销（回滚）许多事务的更改，而每次回滚都可能涉及检索\
  \ undo 数据并应用它的 I/O 操作。\n\n这很可能是一个针对正在发生大量并发修改的表的查询；你看到的是对 undo 段的读取，这是 Oracle 为了将数据块恢复到你查询开始时的状态所做的工作。你可以在单个会话中轻松地观察到这种效果，以理解发生了什么。我们从一个很小的表开始：\n\
  \n```sql\n$ sqlplus eoda/foo@PDB1\nSQL> drop table t purge;\nSQL> create table t\
  \ ( x int );\n表已创建。\nSQL> insert into t values ( 1 );\n已创建 1 行。\nSQL> exec dbms_stats.gather_table_stats(\
  \ user, 'T' );\nPL/SQL 过程已成功完成。\nSQL> select * from t;\nX\n----------\n        \
  \ 1\n```\n\n现在，我们将我们的会话设置为使用 `SERIALIZABLE` 隔离级别，这样无论在我们的会话中运行查询多少次，结果都将“截至”该事务开始的时间：\n\
  \n```sql\nSQL> alter session set isolation_level=serializable;\n会话已更改。\n```\n\n\
  现在，我们查询这个小表并观察执行的 I/O 量：\n\n```sql\nSQL> set autotrace on statistics\nSQL> select\
  \ * from t;\nX\n----------\n         1\n\n统计信息\n----------------------------------------------------------\n\
  \          0  递归调用\n          0  db 块获得\n          7  一致读\n          ...\n```\n\n\
  所以，该查询为了完成进行了七次 I/O（`一致读`）。在*另一个会话*中，我们将反复修改这个表：\n\n```sql\nSQL> begin\n  2  for\
  \ i in 1 .. 10000\n  3  loop\n  4      update t set x = x+1;\n  5      commit;\n\
  \  6  end loop;\n  7  end;\n  8  /\nPL/SQL 过程已成功完成。\n```\n\n然后回到我们的 `SERIALIZABLE`\
  \ 会话，我们重新运行相同的查询：\n\n```sql\nSQL> select * from t;\nX\n----------\n     10001\n\n\
  统计信息\n----------------------------------------------------------\n          0  递归调用\n\
  \          0  db 块获得\n      10004  一致读\n          ...\n```\n\n那次它做了 10,004 次 I/O——一个显著的差异。那么，这些\
  \ I/O 从何而来？那是 Oracle 在回滚对该数据库块所做的更改。当我们运行第二个查询时，Oracle 知道该查询检索和处理的所有块都必须是“截至”事务开始时间的状态。当我们到达缓冲区缓存时，我们发现缓存中的块“太新”了——另一个会话已经修改了它大约\
  \ 10,000 次。我们的查询无法看到那些更改，于是它开始遍历 undo 信息并撤销了最后一次更改。它发现这个回滚后的块仍然太新，于是再次回滚该块。它反复这样做，直到最终找到在我们的事务开始时数据库中已提交的那个块版本。那个块我们才可以使用——也确实使用了。\n\
  \n> **注意**\n>\n> 有趣的是，如果你重新运行 `SELECT * FROM T`，你可能会看到 I/O 再次下降到 7 左右；它不会是 10,004。原因是什么？Oracle\
  \ 有能力在缓冲区缓存中存储同一个块的多个版本。当你为那个执行了 10,004 次 I/O 的查询回滚对此块的更改时，你将该版本留在了缓存中，随后执行的查询就能够访问它。\n\
  \n那么，我们是否只在使用 `SERIALIZABLE` 隔离级别时才遇到这个问题？不，完全不是。考虑一个运行五分钟的查询。在查询运行的五分钟内，它从缓冲区缓存中检索块。每次从缓冲区缓存中检索一个块时，它都会执行这个检查：“这个块是否太新？如果是，就回滚它。”\
  \ 请记住，查询运行的时间越长，它需要的块随时间被修改的可能性就越大。\n\n现在，数据库预期会发生这种检查（即，检查块是否“太新”以及随后的更改回滚），正因为这个原因，缓冲区缓存实际上可能在内存中包含同一个块的多个版本。这样，你所需的版本很可能就在那里，随时可用，而无需使用\
  \ undo 信息来物化。可以使用类似以下的查询来查看这些块：\n\n```sql\nSQL> select file#, block#, count(*)\n\
  \  2  from v$bh\n  3  group by file#, block#\n  4  having count(*) > 3\n  5  order\
  \ by 3;\n```\n\n通常，你在任何时候在缓存中找到的一个块的版本不会超过大约六个，但这些版本可以被任何需要它们的查询使用。\n\n通常，正是这些小型的*热*表会遇到由于读一致性导致的\
  \ I/O 膨胀问题。其他经常受此问题影响的查询是针对易变表的长时间运行的查询。它们运行的时间越长，运行时间就越长，因为随着时间的推移，它们可能需要执行更多工作才能从缓冲区缓存中检索一个块。\n\
  \n## 写一致性\n\n到目前为止，我们研究的是读一致性：Oracle 使用 undo 信息来提供非阻塞查询和一致（正确）读取的能力。我们理解，当 Oracle\
  \ 从缓冲区缓存中为查询读取块时，它会确保块的版本“足够旧”，可以被该查询看到。\n\n但这引出了以下问题：写入/修改呢？当你运行如下所示的 `UPDATE`\
  \ 语句，并且在该语句运行时，有人更新了它尚未读取的一行，将 `Y=5` 改为 `Y=6` 并提交，会发生什么？\n\n```sql\nUpdate t Set\
  \ x = 2 Where y = 5;\n```\n\n也就是说，当你的 `UPDATE` 开始时，某行值为 `Y=5`。当你的 `UPDATE` 使用一致读读取表时，它看到该行在\
  \ `UPDATE` 开始时是 `Y=5`。但是，`Y` 的当前值现在是 6（不再是 5 了），在更新 `X` 的值之前，Oracle 会检查 `Y` 是否仍然是\
  \ 5。现在会发生什么？更新会如何受到此影响？\n\n显然，我们不能修改块的旧版本；当我们去修改一行时，我们必须修改该块的当前版本。此外，Oracle 不能简单地跳过这一行，因为那将是一个不一致的读取且不可预测。我们将发现，在这种情况下，Oracle\
  \ 将从头重新启动写入修改。\n\n\n### 一致性读取与当前读取\n\nOracle 在处理修改语句时确实会执行两种类型的块获取操作。它会执行：\n\n*\
  \   `一致性读取`：在“查找”要修改的行时执行\n*   `当前读取`：在获取数据块以实际更新目标行时执行\n\n我们可以通过`TKPROF`轻松观察到这一点。考虑这个小型单行示例，它读取并更新了之前表`T`中的单行：\n\
  \n```\nSQL> exec dbms_monitor.session_trace_enable\nPL/SQL procedure successfully\
  \ completed.\nSQL> select * from t;\nX\n\nSQL> update t t1 set x = x+1;\n1 row updated.\n\
  SQL> update t t2 set x = x+1;\n1 row updated.\n```\n\n在退出 SQL*Plus 之前，显示刚生成的跟踪文件的名称和位置：\n\
  \n```\nSQL>  select i.value || '/' || d.instance_name || '_ora_' || a.spid || '.trc'\
  \ trace\nfrom v$process a, v$session b, v$diag_info i , v$instance d\nwhere a.addr\
  \ = b.paddr\nand b.audsid = userenv('sessionid')\nand i.name='Diag Trace';\nTRACE\n\
  \n/opt/oracle/diag/rdbms/cdb/CDB/trace/CDB_ora_9000.trc\n```\n\n接下来，我们导航到跟踪文件目录，定位刚生成的跟踪文件，并使用`TKPROF`工具处理它：\n\
  \n```\n$ cd /opt/oracle/diag/rdbms/cdb/CDB/trace\n$ tkprof CDB_ora_9000.trc sys=no\
  \ output=myfile.txt\n```\n\n运行`TKPROF`并检查结果（在`myfile.txt`中）后，我们会看到类似以下内容（注意我从此报告中移除了`ELAPSED`、`CPU`和`DISK`列）：\n\
  \n```\nselect * from t\ncall     count   query    current        rows\n------- ------\
  \  ------ ----------  ----------\nParse        1       0          0           0\n\
  Execute      1       0          0           0\nFetch        2       7          0\
  \           1\n------- ------  ------ ----------  ----------\ntotal        4   \
  \    7          0           1\nupdate t t1 set x = x+1\ncall     count   query \
  \   current        rows\n------- ------  ------ ----------  ----------\nParse  \
  \      1       0          0           0\nExecute      1       7          3     \
  \      1\nFetch        0       0          0           0\n------- ------  ------\
  \ ----------  ----------\ntotal        2       7          3           1\nupdate\
  \ t t2 set x = x+1\ncall     count   query    current        rows\n------- ------\
  \  ------ ----------  ----------\nParse        1       0          0           0\n\
  Execute      1       7          1           1\nFetch        0       0          0\
  \           0\n------- ------  ------ ----------  ----------\ntotal        2   \
  \    7          1           1\n```\n\n因此，仅仅在一次常规查询中，我们就产生了七次`查询（一致性）模式获取`。在第一次`UPDATE`期间，除了相同的七次\
  \ I/O（更新的搜索组件涉及查找更新开始时表中存在的所有行，在本例中如此）之外，还产生了三次`当前模式获取`。执行当前模式获取是为了检索`表块`（它此刻存在的状态，即包含目标行的那个块）、获取一个`回滚段块`以启动我们的事务，以及一个`回滚块`。第二次更新恰好有一次当前模式获取；由于我们不必再次执行回滚工作，我们只需要对包含要更新的行的数据块执行一次当前获取。当前模式获取的出现本身就表明发生了某种修改操作。Oracle\
  \ 在使用新信息修改数据块之前，必须获取其最新的副本。\n\n#### 读一致性如何影响修改操作\n\n那么，读一致性如何影响修改操作呢？想象一下，您正在针对某个数据库表执行以下`UPDATE`语句：\n\
  \n```\nUpdate t Set x = x+1 Where y = 5;\n```\n\n我们理解`WHERE Y=5`部分，即查询的读一致阶段，将使用一致性读取（`TKPROF`报告中的查询模式获取）来处理。它将看到的是该语句开始执行时表中已提交的、满足`WHERE\
  \ Y=5`条件的记录集合（假设隔离级别为`READ COMMITTED`；如果隔离级别是`SERIALIZABLE`，则看到的将是事务开始时存在的、满足`WHERE\
  \ Y=5`条件的记录集合）。这意味着，如果该`UPDATE`语句从开始到结束需要五分钟处理，并且在此期间有人向表中添加并提交了一条`Y`列值为五的新记录，那么该`UPDATE`将看不到这条新记录，因为一致性读取不会看到它。这是预期且正常的行为。但问题是，如果两个会话按顺序执行以下语句，会发生什么：\n\
  \n```\nUpdate t Set y = 10 Where y = 5;\nUpdate t Set x = x+1 Where y = 5;\n```\n\
  \n表 7-8 展示了时间线。\n\n表 7-8 更新顺序\n\n| 时间 | 会话 1 | 会话 2 | 说明 |\n| --- | --- | --- |\
  \ --- |\n| T1 | `Update t Set y=10 Where y=5;` | | 这会更新符合该条件的一行。 |\n| T2 | | `Update\
  \ t Set x=x+1 Where y=5;` | 使用一致性读取，这将找到会话 1 修改的记录，但由于会话 1 已锁定该行，它将无法更新。会话 2 将阻塞并等待此行。\
  \ |\n| T3 | `Commit;` | | 这会释放会话 2；会话 2 解除阻塞。它最终可以对该行所在的数据块执行当前读取，该行在会话 1 开始更新时\
  \ Y 值等于 5。当前读取将显示 Y 现在等于 10，不再是 5 了。 |\n\n因此，在您开始`UPDATE`时`Y=5`的记录，现在不再是`Y=5`了。`UPDATE`的一致性读取部分说，“你想更新这条记录，因为我们开始时`Y`是\
  \ 5”，但数据块的当前版本让您想，“哦，不，我不能更新这行了，因为`Y`不再是 5 了。那样做是错误的。”\n\n如果我们此时跳过这条记录并忽略它，那么我们将得到一个非确定性的更新。这相当于将数据的一致性和完整性抛之脑后。更新的结果（有多少行以及哪些行被修改）将取决于表中各行被访问的顺序以及碰巧正在发生的其他活动。您可以在两个不同的数据库中使用完全相同的行集合，每个数据库以完全相同的混合方式运行这些事务，但可能观察到不同的结果，仅仅因为行在磁盘上的位置不同。\n\
  \n在这种情况下，Oracle 会选择`重启`更新。当发现您开始时`Y=5`的行现在包含值`Y=10`时，Oracle 会悄悄回滚您的更新（仅回滚更新部分，而非事务的其他部分）并重新开始，假设您使用的是`READ\
  \ COMMITTED`隔离级别。如果您使用的是`SERIALIZABLE`隔离级别，那么此时您将收到`ORA-08177: can't serialize access\
  \ for this transaction`错误。在`READ COMMITTED`模式下，事务回滚您的更新后，数据库将重新启动更新（即，更改更新“参照”的时间点），并且它不会再次直接更新数据，而是进入`SELECT\
  \ FOR UPDATE`模式，尝试为您的会话锁定所有`WHERE Y=5`的行。完成此操作后，它将针对该锁定的数据集运行`UPDATE`，从而确保这次能够完成而无需重启。\n\
  \n但是，让我们继续沿着“但是会发生什么……”的思路思考下去，如果在重启更新并进入`SELECT FOR UPDATE`模式（该模式具有与更新相同的一致性读取和当前块获取操作）后，当您去获取某行的当前版本时，发现该行在您开始`SELECT\
  \ FOR UPDATE`时是`Y=5`，但现在是`Y=11`，会发生什么？那个`SELECT FOR UPDATE`将会重启，然后循环重新开始。\n\n这引出了几个有趣的问题。我们能观察到这个过程吗？我们能看到这实际发生吗？如果可以，那又怎样？这对我们开发者意味着什么？我们现在将依次探讨这些问题。\n\
  \n\n### 观察重启\n\n### 观察重启\n\n要观察重启，其实比你想象的要容易。实际上，我们将使用一个简单的单行表来观察它。这是我们用来测试的表：\n\
  \n```sql\nSQL> create table t ( x int, y int );\nTable created.\nSQL> insert into\
  \ t values ( 1, 1 );\n1 row created.\nSQL> commit;\nCommit complete.\n```\n\n为了观察重启，我们只需要一个触发器来打印一些信息。我们将使用一个\
  \ `BEFORE UPDATE FOR EACH ROW` 触发器，在更新时打印出行更新前后的镜像：\n\n```sql\nSQL> create or replace\
  \ trigger t_bufer\nbefore update on t for each row\nbegin\ndbms_output.put_line\n\
  ( 'old.x = ' || :old.x ||\n', old.y = ' || :old.y );\ndbms_output.put_line\n( 'new.x\
  \ = ' || :new.x ||\n', new.y = ' || :new.y );\nend;\n/\nTrigger created.\n```\n\n\
  现在，我们来更新那一行：\n\n```sql\nSQL> set serveroutput on\nSQL> update t set x = x+1;\nold.x\
  \ = 1, old.y = 1\nnew.x = 2, new.y = 1\n1 row updated.\n```\n\n到目前为止，一切都如我们所料：触发器触发了一次，我们看到了旧值和新值。请注意，我们尚未提交——那一行仍然被锁定。在另一个会话中，我们将执行这个更新：\n\
  \n```sql\nSQL> set serveroutput on\nSQL> update t set x = x+1 where x > 0;\n```\n\
  \n这当然会立即阻塞，因为第一个会话锁定了该行。如果我们现在回到第一个会话并提交，在第二个会话中将看到此输出（为清晰起见重复了更新操作）：\n\n```sql\n\
  SQL> update t set x = x+1 where x > 0;\nold.x = 1, old.y = 1\nnew.x = 2, new.y =\
  \ 1\nold.x = 2, old.y = 1\nnew.x = 3, new.y = 1\n1 row updated.\n```\n\n如你所见，该行触发器在这里看到了该行的两个版本。该行触发器被触发了两次：一次是行的原始版本以及我们希望将其修改成的版本，另一次是实际被更新后的最终行。由于这是一个\
  \ `BEFORE FOR EACH ROW` 触发器，Oracle 看到了记录的一致性读版本以及我们希望对其所做的修改。然而，Oracle 是在 `BEFORE\
  \ FOR EACH ROW` 触发器触发后，以当前模式检索数据块来实际执行更新的。它等待此触发器触发后才以当前模式获取数据块，因为触发器可以修改 `:NEW`\
  \ 值。因此，Oracle 无法在此触发器执行前修改数据块，而触发器可能需要很长时间才能执行。因为一次只有一个会话可以当前模式持有数据块，Oracle 需要限制我们在该模式下持有它的时间。\n\
  \n在此触发器触发后，Oracle 以当前模式检索数据块，并注意到用于定位此行的列 `X` 已被修改。因为 `X` 用于定位此记录且 `X` 被修改了，数据库决定重启我们的查询。注意，将\
  \ `X` 从 1 更新为 2 并未使该行超出范围；我们仍要通过此 `UPDATE` 语句更新它。相反，事实是 `X` 用于定位行，且 `X` 的一致性读值（此处为\
  \ 1）与 `X` 的当前模式读值（2）不同。现在，重启后，触发器将 `X=2`（由其他会话修改后）视为 `:OLD` 值，将 `X=3` 视为 `:NEW`\
  \ 值。\n\n所以，这显示了这些重启确实会发生。需要一个触发器才能在操作中看到它们；否则，它们通常是**不可检测的**。这并不意味着你无法看到其他症状——例如一个大型\
  \ `UPDATE` 语句在更新了许多行后回滚工作，然后发现一行导致其重启——只是很难明确地说“此症状是由重启引起的”。\n\n一个有趣的观察是，即使语句本身不需要，触发器本身也可能导致重启发生。通常，`UPDATE`\
  \ 或 `DELETE` 语句的 `WHERE` 子句中引用的列用于确定修改是否需要重启。Oracle 将使用这些列执行一致性读，并且在以当前模式检索数据块时，如果检测到其中任何列已更改，它将重启语句。通常，行中的其他列不会被检查。例如，让我们简单地重新运行前面的例子，并在两个会话中都使用\
  \ `WHERE Y>0` 来查找行；我们在第一个会话（被阻塞的那个）中看到的输出将是：\n\n```sql\nSQL> update t set x = x+1\
  \ where y > 0;\nold.x = 1, old.y = 1\nnew.x = 2, new.y = 1\nold.x = 2, old.y = 1\n\
  new.x = 3, new.y = 1\n1 row updated.\n```\n\n那么，为什么当 Oracle 在查看 `Y` 值时触发了触发器两次？它检查了整行吗？从输出可以看出，更新实际上被重启了，触发器再次触发了两次，即使我们是在搜索\
  \ `Y>0` 且根本没有修改 `Y`。但是，如果我们重新创建触发器，让它只打印出触发的事实，而不是引用 `:OLD` 和 `:NEW` 值，如下所示，然后再次进入第二个会话运行更新，我们观察到它被阻塞了（当然）：\n\
  \n```sql\nSQL> create or replace trigger t_bufer\nbefore update on t for each row\n\
  begin\ndbms_output.put_line( 'fired' );\nend;\n/\nTrigger created.\nSQL> update\
  \ t set x = x+1;\nfired\n1 row updated.\n```\n\n提交阻塞会话后，我们将看到：\n\n```sql\nSQL> update\
  \ t set x = x+1 where y > 0;\nfired\n1 row updated.\n```\n\n这次触发器只触发了一次，而不是两次。因此，在触发器中引用的\
  \ `:NEW` 和 `:OLD` 列值，也会被 Oracle 用于进行重启检查。当我们在触发器中引用 `:NEW.X` 和 `:OLD.X` 时，`X` 的一致性读值和当前读值被比较并发现不同。于是发生了重启。当我们从触发器中移除对该列的引用时，就没有重启了。\n\
  \n所以规则是：用于在 `WHERE` 子句中查找行的列集合，加上在行触发器中引用的列，将被比较。该行的一致性读版本将与该行的当前读版本进行比较；如果其中任何值不同，修改将会重启。\n\
  \n### 注意\n\n你可以利用这一点信息来进一步理解为什么使用 `AFTER FOR EACH ROW` 触发器比使用 `BEFORE FOR EACH ROW`\
  \ 更高效。`AFTER` 触发器不会有同样的效果——到那时，我们已经以当前模式检索了数据块。\n\n这就引出了“我们为什么要在乎？”这个问题。\n\n\n\n\
  ### 为什么重启对我们很重要？\n\n首先浮现在脑海的应该是“我们的触发器触发了两次！”。我们有一个表，上面定义了一个`BEFORE FOR EACH ROW`触发器。我们更新了一行数据，但触发器却执行了两次。\n\
  \n想想这可能带来的影响。如果你的触发器执行了任何非事务性的操作，这可能是一个相当严重的问题。例如，考虑一个发送邮件的触发器，邮件内容是“这是数据之前的样子。它已被修改为现在的样子。”如果你直接从触发器中发送邮件（例如，使用`UTL_MAIL`），那么用户将收到两封邮件，其中一封报告的是从未实际发生的更新。\n\
  \n你在触发器中所做的任何非事务性操作都会受到重启的影响。考虑以下影响：\n\n*   考虑一个维护某些 PL/SQL 全局变量的触发器，例如用于记录已处理行数的变量。当一条语句重启并回滚时，对\
  \ PL/SQL 变量的修改不会回滚。\n\n*   任何以`UTL_`开头的函数（`UTL_FILE`、`UTL_HTTP`、`UTL_SMTP`等等）都应该被认为容易受到语句重启的影响。当语句重启时，`UTL_FILE`不会*回写*到它正在写入的文件中。\n\
  \n*   任何属于自治事务的触发器都必须被怀疑。当语句重启并回滚时，自治事务无法回滚。\n\n所有这些后果都必须谨慎处理，并确信它们可能会为每一行触发多次，或者为一个最终不会被该语句更新的行触发。\n\
  \n你应该关心潜在重启的第二个原因是性能相关。我们使用了一个单行例子，但如果你开始一个大型批处理更新，并在处理了前 100,000 条记录后重启，会发生什么？它将回滚这\
  \ 100,000 行更改，然后以`SELECT FOR UPDATE`模式重启，并在之后再次进行这 100,000 行更改。\n\n你可能会注意到，在添加了那个简单的审计跟踪触发器（读取`:NEW`和`:OLD`值的那个）之后，性能变得比你能解释的差得多，即使除了新触发器之外什么都没有改变。可能是你正在重启过去从未使用过的查询。或者，添加一个只是偶尔更新单行的小程序，可能导致一个过去一小时就能运行完的批处理作业，因为从未发生过的重启而突然需要运行好几个小时。\n\
  \n这不是 Oracle 的新特性——自从引入读一致性的 4.0 版本以来，它就一直存在于数据库中。我自己直到 2003 年夏天才完全意识到它是如何工作的，在我发现它所隐含的意义之后，我就能解答许多过去“这怎么可能发生？”的问题了。这让我几乎完全放弃了在触发器中使用自治事务，也让我重新思考了一些应用程序的实现方式。例如，我永远不会直接从触发器发送邮件；相反，我总是使用`DBMS_JOB`或类似的东西，在我的事务提交后发送邮件。这使得邮件的发送是*事务性*的；也就是说，如果导致触发器触发并发送邮件的语句被重启，它执行的回滚也会回滚`DBMS_JOB`的请求。我在触发器中做的几乎所有非事务性操作都被修改为在事后通过作业完成，从而使它们都具有事务一致性。\n\
  \n## 总结\n\n在本章中，我们涵盖了很多材料，其中一些可能并不总是显而易见的。然而，理解这些问题至关重要。例如，如果你没有意识到语句级重启，你可能无法弄清楚某些特定的情况是如何发生的。也就是说，你将无法解释你日常经验观察到的一些现象。事实上，如果你没有意识到重启，你可能会错误地怀疑实际的错误是由于环境或最终用户错误造成的。这将是那些无法重现的问题之一，因为观察到它需要许多事情按特定顺序发生。\n\
  \n我们了解了 SQL 标准中定义的隔离级别的含义，以及 Oracle 如何实现它们；有时，我们将 Oracle 的实现与其他数据库进行了对比。我们看到，在其他实现中（即采用读锁来提供一致数据的实现），并发性和一致性之间存在巨大的权衡。为了获得高度的并发数据访问，你将不得不降低对一致性结果的需求。为了获得一致、正确的答案，你将不得不忍受并发性的降低。在\
  \ Oracle 中，由于其多版本机制，情况并非如此。\n\n表 7-9 总结了在采用读锁的数据库与 Oracle 的多版本方法中，你可能期望看到的行为。\n\n\
  表 7-9\n\nOracle 与采用读锁的数据库在事务隔离级别和锁行为方面的比较\n\n| 隔离级别 | 实现方式 | 写入是否阻塞读取 | 读取是否阻塞写入\
  \ | 死锁敏感的读取 | 错误的查询结果 | 丢失更新 | 锁升级或限制 |\n| --- | --- | --- | --- | --- | --- | ---\
  \ | --- |\n| `READ UNCOMMITTED` | 非 Oracle | 否 | 否 | 否 | 是 | 是 | 是 |\n| `READ COMMITTED`\
  \ | 非 Oracle | 是 | 否 | 否 | 是 | 是 | 是 |\n| `READ COMMITTED` | Oracle | 否 | 否 | 否\
  \ | 否 | 否* | 否 |\n| `REPEATABLE READ` | 非 Oracle | 是 | 是 | 是 | 否 | 否 | 是 |\n| `SERIALIZABLE`\
  \ | 非 Oracle | 是 | 是 | 是 | 否 | 否 | 是 |\n| `SERIALIZABLE` | Oracle | 否 | 否 | 否 |\
  \ 否 | 否 | 否 |\n\n**使用* `SELECT FOR UPDATE NOWAIT`。\n\n并发控制以及数据库如何实现它们绝对是你希望理解的东西。我一直在赞扬多版本和读一致性，但就像世界上的其他一切一样，它们是双刃剑。如果你不理解多版本的存在以及它的工作原理，你将在应用程序设计中犯错。除非你了解多版本如何工作，否则你将编写出破坏数据的程序。事情就是这么简单。\n\
  \n\n\n"
- "# 8. 事务\n\n事务是将数据库与文件系统区分开来的特性之一。在文件系统中，如果你在写入文件的过程中操作系统崩溃，该文件很可能会损坏，尽管存在“日志式”文件系统等可能将文件恢复到某个时间点的机制。然而，如果你需要保持两个文件同步，这样的系统就无济于事了——如果你更新了一个文件，而系统在完成第二个文件更新之前就发生了故障，你的文件将无法保持同步。\n\
  \n这便是*事务*的主要目的——它们将数据库从一个一致的状态转移到下一个一致的状态。这就是它们的功能。当你在数据库中提交工作时，可以确保你的所有更改都已被保存，或者（在失败的情况下）一个更改都没有被保存。此外，还可以确保用于保护数据完整性的各种规则和检查都已被执行。\n\
  \n在上一章中，我们从并发控制的角度讨论了事务，以及作为 Oracle 多版本、读一致性模型的结果，Oracle 事务如何在高度并发的数据访问条件下每次都能提供一致的数据。Oracle\
  \ 中的事务展现出所有必需的 ACID 特性：\n\n*   *原子性*：一个事务要么全部发生，要么全不发生。\n*   *一致性*：事务将数据库从一个一致状态转移到下一个一致状态。\n\
  *   *隔离性*：在事务提交之前，其效果可能对其他事务不可见。\n*   *持久性*：一旦事务提交，它就是永久的。\n\n特别是在上一章，我们讨论了 Oracle\
  \ 如何获得*一致性*和*隔离性*。在这里，我们将主要关注*原子性*的概念及其在 Oracle 中的应用。\n\n在本章中，我们将讨论原子性的影响及其如何影响\
  \ Oracle 中的语句。我们将涵盖 `COMMIT`、`SAVEPOINT` 和 `ROLLBACK` 等事务控制语句，并讨论事务中如何强制执行完整性约束。我们还将探讨如果你一直在其他数据库中开发，可能会有一些不良的事务习惯。我们将了解分布式事务和两阶段提交（2PC）。最后，我们将审视自治事务，它们是什么以及扮演的角色。\n\
  \n## 事务控制语句\n\n在 Oracle 中，你不需要一个 \"begin transaction\"（开始事务）语句。事务由第一个修改数据的语句（第一个获取\
  \ `TX` 锁的语句）隐式开始。你可以使用 `SET TRANSACTION` 或 `DBMS_TRANSACTION` 包显式地开始一个事务，但这并非必需步骤，这与某些其他数据库不同。发出\
  \ `COMMIT` 或 `ROLLBACK` 语句会显式结束一个事务。\n\n**注意**\n\n并非所有的 `ROLLBACK` 语句都是等同的。需要注意的是，`ROLLBACK\
  \ TO SAVEPOINT` 命令**不会**结束一个事务！只有完整的、正式的 `ROLLBACK` 才会结束事务。\n\n你应该始终使用 `COMMIT`\
  \ 或 `ROLLBACK` 显式地终止你的事务；否则，你使用的工具或环境将替你选择其一。如果你正常退出 `SQL*Plus` 会话，没有提交或回滚，`SQL*Plus`\
  \ 会认为你希望提交工作并执行提交。另一方面，如果你只是从 `Pro*C` 程序中退出，则会发生隐式回滚。永远不要依赖隐式行为，因为它将来可能会改变。总是显式地\
  \ `COMMIT` 或 `ROLLBACK` 你的事务。\n\n**注意**\n\n作为一个未来可能发生变化的例子，Oracle `11*g*` Release\
  \ 2 及以上版本的 `SQL*Plus` 包含一个设置 \"exitcommit\"。该设置控制 `SQL*Plus` 在退出时是发出 `COMMIT` 还是\
  \ `ROLLBACK`。所以当你使用 `11*g*` Release 2 时，自 `SQL*Plus` 发明以来一直存在的默认行为很可能会不同！\n\n在 Oracle\
  \ 中，事务是*原子的*，这意味着构成事务的每条语句要么全部提交（变为永久），要么所有语句全部回滚。这种保护也延伸到单个语句。一条语句要么完全成功，要么完全回滚。请注意，我说的是“语句”被回滚。一条语句的失败**不会**导致先前执行的语句自动回滚。它们的工作会被保留，并且必须由你来提交或回滚。在我们深入探讨语句和事务的原子性究竟意味着什么之前，让我们先看一下可用的各种事务控制语句：\n\
  \n*   `COMMIT`：使用此语句最简单的形式，你只需发出 `COMMIT`。你可以更详细地使用 `COMMIT WORK`，但两者是等效的。`COMMIT`\
  \ 结束你的事务并使任何更改成为永久（持久）。在分布式事务中，`COMMIT` 语句有扩展功能，允许你用一些有意义的注释标记一个 `COMMIT`（标记事务），并强制提交一个处于不确定状态的分布式事务。还有一些扩展允许你执行异步提交——这实际上打破了*持久性*的概念。我们稍后会看一下这种情况，看看何时适合使用。\n\
  *   `ROLLBACK`：使用此语句最简单的形式，你只需发出 `ROLLBACK`。同样，你可以更详细地使用 `ROLLBACK WORK`，但两者是等效的。回滚结束你的事务并撤销任何未提交的更改。它通过读取存储在回滚/撤销段（从现在开始，我将专门称之为*撤销段*）中的信息，并将数据库块恢复到事务开始之前的状态来实现这一点。\n\
  *   `SAVEPOINT`：`SAVEPOINT` 允许你在事务中创建一个标记点。你可以在单个事务中拥有多个 `SAVEPOINT`。\n*   `ROLLBACK\
  \ TO <SAVEPOINT>`：此语句与 `SAVEPOINT` 命令配合使用。你可以将事务回滚到该标记点，而无需回滚其之前所做的任何工作。因此，你可以发出两条\
  \ `UPDATE` 语句，后跟一个 `SAVEPOINT`，然后再发出两条 `DELETE` 语句。如果在执行 `DELETE` 语句期间发生错误或某种异常情况，并且你捕获该异常并发出\
  \ `ROLLBACK TO SAVEPOINT` 命令，事务将回滚到命名的 `SAVEPOINT`，撤销 `DELETE` 语句所做的任何工作，但保留 `UPDATE`\
  \ 语句所做的工作不变。\n*   `SET TRANSACTION`：此语句允许你设置各种事务属性，例如事务的隔离级别，以及它是只读还是读写。你还可以使用此语句指示事务在使用手动撤销管理时使用特定的撤销段，但不推荐这样做。我们将在下一章更详细地讨论手动和自动撤销管理。\n\
  \n就这样——没有其他事务控制语句了。最常用的控制语句是 `COMMIT` 和 `ROLLBACK`。`SAVEPOINT` 语句有一个比较特殊的用途。在内部，Oracle\
  \ 经常使用它；实际上，Oracle 在你执行任何 `SQL` 或 `PL/SQL` 语句时都会使用它，你可能会在应用程序中发现它的某些用途。\n\n## 原子性\n\
  \n现在，我们准备看看语句、过程和事务的原子性意味着什么。\n\n\n### 语句级原子性\n\n考虑以下语句：\n\n```\nSQL> Insert into\
  \ t values ( 1 );\n```\n\n乍看之下似乎很清楚，如果该语句因约束违反而失败，则该行不会被插入。然而，请考虑以下示例，其中对表 `T` 执行的\
  \ `INSERT` 或 `DELETE` 操作会触发一个触发器，该触发器相应地调整表 `T2` 中的 `CNT` 列：\n\n```\n$ sqlplus eoda/foo@PDB1\n\
  SQL> create table t2 ( cnt int );\n表已创建。\nSQL> insert into t2 values ( 0 );\n已创建\
  \ 1 行。\nSQL> commit;\n提交完成。\nSQL> create table t ( x int check ( x>0 ) );\n表已创建。\n\
  SQL> create trigger t_trigger\nbefore insert or delete on t for each row\nbegin\n\
  if ( inserting ) then\nupdate t2 set cnt = cnt +1;\nelse\nupdate t2 set cnt = cnt\
  \ -1;\nend if;\ndbms_output.put_line( 'I fired and updated '  ||\nsql%rowcount ||\
  \ ' rows' );\nend;\n/\n触发器已创建。\n```\n\n在这种情况下，应该发生什么就不太清楚了。如果错误发生在触发器触发*之后*，触发器的效果应该保留还是取消？也就是说，如果触发器触发并更新了\
  \ `T2`，但行没有插入到 `T` 中，结果应该是什么？显然，答案是，如果行实际上没有插入到 `T` 中，我们不希望 `T2` 中的 `CNT` 列递增。幸运的是，在\
  \ Oracle 中，来自客户端的原始语句——本例中是 `INSERT INTO T`——要么完全成功，要么完全失败。这个语句是原子的。我们可以确认这一点，如下所示：\n\
  \n```\nSQL> set serveroutput on\nSQL> insert into t values(1);\nI fired and updated\
  \ 1 rows\n已创建 1 行。\nSQL> insert into t values(-1);\nI fired and updated 1 rows\n\
  insert into t values(-1)\n*\n第 1 行出现错误:\nORA-02290: 违反约束条件 (EODA.SYS_C0013023)\n\
  SQL> select * from t2;\nCNT\n----------\n1\n```\n\n因此，一行成功插入到 `T` 中，我们正确地收到了消息 `I\
  \ fired and updated 1 rows`。下一条 `INSERT` 语句违反了我们在 `T` 上设置的完整性约束。`DBMS_OUTPUT` 消息出现了——`T`\
  \ 上的触发器实际上确实触发了，我们有证据证明这一点。触发器成功地执行了其对 `T2` 的更新操作。我们可能预期 `T2` 现在的值是 2，但我们看到它的值是\
  \ 1。Oracle 使*原始*的 `INSERT` 操作具有原子性——原始的 `INSERT INTO T` 就是这个语句，而该原始 `INSERT INTO\
  \ T` 的任何副作用都被视为该语句的一部分。\n\nOracle 通过为我们对数据库的每次调用静默地包装一个 `SAVEPOINT` 来实现这种语句级原子性。前面的两个\
  \ `INSERT` 实际上是这样处理的：\n\n```\nSavepoint statement1;\nInsert into t values ( 1 );\n\
  If error then rollback to statement1;\nSavepoint statement2;\nInsert into t values\
  \ ( -1 );\nIf error then rollback to statement2;\n```\n\n对于习惯于 Sybase 或 SQL Server\
  \ 的程序员来说，这起初可能令人困惑。在那些数据库中，*情况恰恰相反*。那些系统中的触发器独立于触发它的语句执行。如果它们遇到错误，触发器必须显式地回滚自己的工作，然后引发另一个错误来回滚触发语句。否则，触发器所做的工作可能会持续存在，即使触发语句或该语句的其他部分最终失败。\n\
  \n在 Oracle 中，这种语句级原子性会根据需要延伸到任意深度。在前面的例子中，如果 `INSERT INTO T` 触发了一个更新另一个表的触发器，而该表又有一个删除另一个表的触发器（如此层层递进），那么要么*所有*工作都成功，要么*全部*都不成功。你不需要编写任何特殊代码来确保这一点；它就是这样工作的。\n\
  \n### 过程级原子性\n\n有趣的是，Oracle 将 PL/SQL 块也视为语句。考虑以下存储过程和示例表的重置：\n\n```\n$ sqlplus eoda/foo@PDB1\n\
  SQL> create or replace procedure p\nas\nbegin\ninsert into t values ( 1 );\ninsert\
  \ into t values (-1 );\nend;\n/\n过程已创建。\nSQL> delete from t;\nI fired and updated\
  \ 1 rows\n已删除 1 行。\nSQL> update t2 set cnt = 0;\n已更新 1 行。\nSQL> commit;\n提交完成。\n\
  SQL> select * from t;\n未选定行\nSQL> select * from t2;\nCNT\n----------\n0\n```\n\n\
  因此，我们有一个已知会失败的存储过程，在这种情况下，第二个 `INSERT` 总是会失败。让我们看看运行该存储过程时会发生什么：\n\n```\nSQL> begin\n\
  p;\nend;\n/\nI fired and updated 1 rows\nI fired and updated 1 rows\nbegin\n*\n\
  第 1 行出现错误:\nORA-02290: 违反约束条件 (EODA.SYS_C0013025)\nORA-06512: 在 \"EODA.P\", 第 5\
  \ 行\nSQL> select * from t;\n未选定行\nSQL> select * from t2;\nCNT\n----------\n0\n```\n\
  \n如你所见，Oracle 将存储过程调用视为一个原子语句。客户端提交了一个代码块——`BEGIN P; END;`——而 Oracle 在其周围包装了一个 `SAVEPOINT`。由于\
  \ `P` 失败了，Oracle 将数据库恢复到了调用它之前的状态。\n\n**注意**\n\n前面的行为——语句级原子性——依赖于 PL/SQL 例程不执行任何提交或回滚操作。我认为在\
  \ PL/SQL 中通常不应使用 `COMMIT` 和 `ROLLBACK`；只有 PL/SQL 存储过程的调用者才知道事务何时完成。在你开发的 PL/SQL\
  \ 例程中发出 `COMMIT` 或 `ROLLBACK` 是不好的编程习惯。\n\n现在，如果我们提交一个稍有不同的代码块，我们将得到完全不同的结果：\n\n\
  ```\nSQL> begin\np;\nexception\nwhen others then\ndbms_output.put_line( 'Error!!!!\
  \ ' || sqlerrm );\nend;\n/\nI fired and updated 1 rows\nI fired and updated 1 rows\n\
  Error!!!! ORA-02290: 违反约束条件 (EODA.SYS_C0013025)\nPL/SQL 过程已成功完成。\nSQL> select *\
  \ from t;\nX\n----------\n1\nSQL> select * from t2;\nCNT\n----------\n1\nSQL> rollback;\n\
  回退完成。\n```\n\n在这里，我们运行了一个忽略任何和所有错误的代码块，结果差异巨大。第一次调用 `P` 没有产生任何更改，而这次第一个 `INSERT`\
  \ 成功了，`T2` 中的 `CNT` 列也相应递增。\n\nOracle 将客户端提交的代码块视为“语句”。这个语句通过捕获并忽略错误本身而成功了，所以 `If\
  \ error then rollback...` 没有生效，Oracle 在执行后也没有回滚到 `SAVEPOINT`。因此，`P` 所执行的部分工作得以保留。之所以最初会保留这部分工作，是因为我们在\
  \ `P` 内部具有语句级原子性：`P` 中的每个语句都是原子的。当 `P` 提交它的两个 `INSERT` 语句时，`P` 就成为了 Oracle 的客户端。每个\
  \ `INSERT` 要么完全成功，要么完全失败。这一点可以从以下事实得到证明：我们可以看到 T 上的触发器触发了两次，并更新了 `T2` 两次，但 `T2`\
  \ 中的计数只反映了一次 `UPDATE`。在 `P` 中执行的第二个 `INSERT` 周围隐式地包装了一个 `SAVEPOINT`。\n\n**“WHEN\
  \ OTHERS” 子句**\n\n我认为，几乎所有包含 `WHEN OTHERS` 异常处理器但没有同时包含 `RAISE` 或 `RAISE_APPLICATION_ERROR`\
  \ 来重新引发异常的代码都是一个缺陷。它会静默地忽略错误，并改变了事务的语义。捕获 `WHEN OTHERS` 并将异常转换为旧式的返回码，改变了数据库应有的行为方式。\n\
  \n\n事实上，当 Oracle 11g Release 1 还处于规划阶段时，我获准提交三项 PL/SQL 新功能请求。我立即抓住了这个机会，而我的第一个建议就是“从语言中移除\
  \ `WHEN OTHERS` 子句”。我的理由很简单：我所见到的由开发者引入的最常见错误根源——*最常见原因*——就是一个 `WHEN OTHERS` 后面没有跟上\
  \ `RAISE` 或 `RAISE_APPLICATION_ERROR`。我认为如果没有这个语言特性，世界会更安全。当然，PL/SQL 实现团队无法做到这一点，但他们做了次优的选择。他们让\
  \ PL/SQL 在遇到一个 `WHEN OTHERS` 后面没有跟 `RAISE` 或 `RAISE_APPLICATION_ERROR` 调用时，生成一个编译器警告。例如：\n\
  \n```\nSQL> alter session set\n  2  PLSQL_Warnings = 'enable:all'\n  3  /\nSession\
  \ altered.\n\nSQL> create or replace procedure some_proc( p_str in varchar2 )\n\
  \  2  as\n  3  begin\n  4     dbms_output.put_line( p_str );\n  5  exception\n \
  \ 6     when others\n  7     then\n  8        -- call some log_error() routine\n\
  \  9        null;\n 10  end;\n 11  /\nSP2-0804: Procedure created with compilation\
  \ warnings\n\nSQL> show errors procedure some_proc\nErrors for PROCEDURE P:\nLINE/COL\
  \ ERROR\n-------- -----------------------------------------------------------------\n\
  1/1      PLW-05018: unit SOME_PROC omitted optional AUTHID clause; default\n   \
  \      value DEFINER used\n6/10     PLW-06009: procedure \"SOME_PROC\" OTHERS handler\
  \ does not end in\n         RAISE or RAISE_APPLICATION_ERROR\n```\n\n因此，如果你在代码中包含了\
  \ `WHEN OTHERS`，且其后没有跟 `RAISE` 或 `RAISE_APPLICATION_ERROR`，那么请注意，你*几乎可以肯定*是在看一段自己开发的代码中的错误，一个由你放置在那里的错误。\n\
  \n包含 `WHEN OTHERS` 异常块的代码与不包含它的代码之间的差异是微妙的，这是你在应用程序中必须考虑的一点。为 PL/SQL 代码块添加异常处理程序会从根本上改变其行为。另一种编码方式——一种能恢复整个\
  \ PL/SQL 块的语句级原子性的方式——如下所示：\n\n```\nSQL> begin\n  2     savepoint sp;\n  3     p;\n\
  \  4  exception\n  5     when others then\n  6        rollback to sp;\n  7     \
  \   dbms_output.put_line( 'Error!!!! ' || sqlerrm );\n  8  end;\n  9  /\nI fired\
  \ and updated 1 rows\nI fired and updated 1 rows\nError!!!! ORA-02290: check constraint\
  \ (EODA.SYS_C0013025) violated\nPL/SQL procedure successfully completed.\n\nSQL>\
  \ select * from t;\nno rows selected\n\nSQL> select * from t2;\n       CNT\n----------\n\
  \         0\n```\n\n**注意**\n前面的代码代表了一种极其糟糕的做法。一般来说，你既不应该捕获 `WHEN OTHERS`，也不应该显式编码\
  \ Oracle 在事务语义方面已经提供的内容。\n\n在这里，通过模拟 Oracle 通常为我们使用 `SAVEPOINT` 所做的工作，我们能够在捕获并“忽略”错误的同时恢复原始行为。我提供这个例子仅用于说明；这是一种极其糟糕的编码实践。\n\
  \n## 事务级原子性\n\n一个事务，即一组作为工作单元一起执行的 SQL 语句，其整个目标是将数据库从一个一致状态带到另一个一致状态。为了实现这个目标，事务也是原子的——事务执行的所有成功的工作要么全部提交并永久化，要么回滚并撤销。就像一条语句一样，事务是一个原子工作单元。在提交事务后收到数据库返回的“成功”消息时，你就知道该事务执行的所有工作都已被持久化。\n\
  \n## DDL 与原子性\n\n值得注意的是，Oracle 中有一类特定的语句是原子的——但仅在语句级别。数据定义语言语句的实现方式使得：\n\n1.  它们首先提交任何未完成的工作，结束你可能已有的任何事务。\n\
  2.  它们执行 DDL 操作，例如 `CREATE TABLE`。\n3.  如果 DDL 操作成功，它们就提交该操作；否则就回滚该操作。\n\n这意味着，每当你发出一条\
  \ DDL 语句（如 `CREATE`、`ALTER` 等）时，你必须预期你现有的事务会立即被提交，并且随后的 DDL 命令会被执行，然后要么被提交并持久化，要么在出现任何错误时被回滚。DDL\
  \ 并不会以任何方式破坏 ACID 概念，但它会提交的事实是你绝对需要意识到的。\n\n## 持久性\n\n通常，当事务被提交时，它的更改是永久性的；你可以依赖这些更改存在于数据库中，即使数据库在提交完成的瞬间崩溃。然而，在两种特定情况下，这并不成立：\n\
  \n*   你使用了 `COMMIT` 语句中可用的 `WRITE` 扩展。\n*   你在非分布式（仅访问单个数据库，没有数据库链接）的 PL/SQL 代码块中发出\
  \ `COMMIT`。\n\n我们将依次查看每种情况。\n\n\n\n### 写入对提交的扩展\n\nOracle 允许你在 `COMMIT` 语句中添加一个\
  \ `WRITE` 子句。`WRITE` 子句允许提交操作要么 `WAIT`（等待）你生成的重做日志被写入磁盘（默认行为），要么 `NOWAIT`（不等待）重做日志被写入。`NOWAIT`\
  \ 选项是一种能力——一种必须谨慎、深思熟虑且完全理解其含义后才能使用的能力。\n\n通常，`COMMIT` 是一个同步过程。你的应用程序调用 `COMMIT`，然后\
  \ `等待` 整个 `COMMIT` 处理完成。这是 Oracle 10*g* Release 2 之前所有数据库版本中 `COMMIT` 的行为，也是 Oracle\
  \ 10*g* Release 2 及以上版本的默认行为。\n\n在当前版本的数据库中，你可以选择让提交在后台执行，而无需等待其完成（因为提交涉及对存储在磁盘上的重做日志文件进行物理写入——物理\
  \ I/O——这可能需要可计量的时间），而不必等待提交完成。这带来的副作用是 *你的提交不再保证是持久的*。也就是说，你的应用程序可能会从数据库收到响应，表明你提交的异步提交已被接收；其他会话可能能够看到你的更改，但随后可能发现你以为已提交的事务并未提交。这种情况只会发生在非常罕见的情况下，并且总是涉及硬件或软件的严重故障。它需要数据库异常关闭才能导致异步提交不持久，这意味着数据库实例或运行数据库实例的计算机必须遭受完全故障。\n\
  \n那么，如果事务旨在保持持久性，一个可能使它们不再持久的功能有什么潜在用途呢？原始性能。当你在应用程序中发出 `COMMIT` 时，你是在要求 `LGWR`\
  \ 进程获取你生成的重做日志并确保其被写入联机重做日志文件。执行物理 I/O（此过程所涉及的）速度相对较慢；将数据写入磁盘需要相对较长的时间。因此，`COMMIT`\
  \ 可能比事务本身的 DML 语句花费的时间还要长！如果你将 `COMMIT` 变为异步，就消除了客户端应用程序等待该物理 I/O 的需要，或许能使客户端应用程序显得更快——尤其是当它执行大量\
  \ `COMMIT` 操作时。\n\n这可能会让你想一直使用这个 `COMMIT WRITE NOWAIT`——毕竟，性能难道不是世界上最重要的事情吗？不，并非如此。大多数时候，你需要通过默认的\
  \ `COMMIT` 实现的持久性。当你 `COMMIT` 并向最终用户报告“我们已经提交”时，你需要确保更改是永久的。即使提交后数据库/硬件立即发生故障，它也会被记录在数据库中。如果你向最终用户报告“订单\
  \ 12352 已下达”，你需要确保订单 12352 确实已下达并持久存在。因此，对于几乎所有的应用程序，默认的 `COMMIT WRITE WAIT` 是唯一正确的选项（注意，你只需说\
  \ `COMMIT`——默认设置就是 `WRITE WAIT`）。\n\n那么，你何时会想要使用这种无需等待即可提交的能力呢？有三种场景可以考虑：\n\n* \
  \  一个自定义的数据加载程序。它必须是自定义的，因为它需要包含额外的逻辑来处理提交可能无法在系统故障中持久化的情况。\n*   处理某种实时数据流的应用程序，例如从股票市场插入大量时效性信息的股票行情馈送。如果数据库离线，数据流会继续，系统故障期间生成的数据将永远不会被处理（毕竟，纳斯达克不会因为你的数据库崩溃而关闭！）。这些数据不被处理是可以接受的，因为股票数据时效性极强；几秒钟后，它就会被新数据覆盖。\n\
  *   实现自身“排队”机制的应用程序，例如，一个在表中存储数据并带有 `PROCESSED_FLAG` 列的应用程序。新数据到达时，以 `PROCESSED_FLAG='N'`（未处理）的值插入。另一个例程负责读取\
  \ `PROCESSED_FLAG='N'` 的记录，执行一些小的、快速的事务，并将 `PROCESSED_FLAG` 从 `'N'` 更新为 `'Y'`。如果它提交了，但该提交后来被撤销（由于系统故障），这是可以接受的，因为处理这些记录的应用程序只会再次处理该记录——它是“可重新处理的”。\n\
  \n如果你看看这些应用程序类别，你会注意到这三类都是后台、非交互式应用程序。它们不直接与人交互。任何与人交互的应用程序——向人报告“提交完成”的应用程序——都应该使用同步提交。异步提交不是为面向在线客户的应用程序准备的调优手段。异步提交仅适用于面向批处理的应用程序，即那些在故障后可以自动重新启动的应用程序。交互式应用程序在故障后无法自动重新启动——必须由人工重新执行该事务。因此，你还有另一个标志告诉你是否可以考虑使用此功能——你拥有的是批处理应用程序还是交互式应用程序？除非它是面向批处理的，否则同步提交是正确的方式。\n\
  \n因此，除了那三类批处理应用程序之外，这个功能——`COMMIT WRITE NOWAIT`——可能不应该被使用。如果你确实使用了它，你需要问自己：如果你的应用程序被告知\
  \ *提交已处理*，但后来提交被撤销了，会发生什么？你需要能够回答这个问题并得出结论：如果这种情况发生，结果是可以接受的。如果你无法回答这个问题，或者如果已提交的更改丢失会产生严重后果，你就不应该使用异步提交功能。\n\
  \n\n"
- "# 非分布式 PL/SQL 块中的 COMMIT 操作\n\n自 PL/SQL 在 Oracle 第 6 版中首次引入以来，它一直透明地使用异步提交。这种方法之所以有效，是因为在某种程度上所有\
  \ PL/SQL 都像批处理程序一样——最终用户在过程完全结束之前并不知道其结果。这也是为什么这种异步提交仅用于非分布式 PL/SQL 代码块；如果我们涉及多个数据库，那么就有两个事物——两个数据库——依赖于提交的持久性。当两个数据库都依赖于提交具有持久性时，我们必须使用同步协议，否则更改可能在一个数据库中提交而在另一个中未提交。\n\
  \n**注意**\n\n当然，流水线 PL/SQL 函数与“普通”PL/SQL 函数有所不同。在普通 PL/SQL 函数中，直到存储过程调用结束才知道结果。流水线函数通常能够在完成之前很早就向客户端返回数据（它们将数据“块”一点一点地返回给客户端）。但由于流水线函数是从`SELECT`语句调用的，并且无论如何都不会提交，因此它们在讨论中不涉及。\n\
  \n因此，PL/SQL 被开发为利用异步提交，允许 PL/SQL 中的`COMMIT`语句不必等待物理 I/O 完成（避免“log file sync”等待）。这并不意味着你不能依赖一个提交并返回控制权给你的应用程序的\
  \ PL/SQL 例程对其更改的持久性——PL/SQL 会等待它生成的重做日志写入磁盘后再返回给客户端应用程序——但它只会等待一次，就在它返回之前。\n\n**注意**\n\
  \n以下示例展示了一个不良实践——我称之为“逐行慢速处理”或“逐行处理”，因为在关系数据库中，逐行等同于慢速。这只是为了说明 PL/SQL 如何处理`COMMIT`语句。\n\
  \n首先，我们创建表`T`：\n\n```\n$ sqlplus eoda/foo@PDB1\nSQL> create table t\n  2  as\n \
  \ 3  select *\n  4  from all_objects\n  5  where 1=0;\nTable created.\n```\n\n现在考虑这个\
  \ PL/SQL 过程：\n\n```\nSQL> create or replace procedure p\n  2  as\n  3  begin\n \
  \ 4    for x in ( select * from all_objects )\n  5    loop\n  6      insert into\
  \ t values X;\n  7      commit;\n  8    end loop;\n  9  end;\n 10  /\nProcedure\
  \ created.\n```\n\n该 PL/SQL 代码从`ALL_OBJECTS`一次读取一条记录，将记录插入表`T`，并在每次插入后提交。从逻辑上讲，该代码与此相同：\n\
  \n```\nSQL> create or replace procedure p\n  2  as\n  3  begin\n  4    for x in\
  \ ( select * from all_objects )\n  5    loop\n  6      insert into t values X;\n\
  \  7      commit write NOWAIT;\n  8    end loop;\n  9    -- make internal call here\
  \ to ensure\n 10    -- redo was written by LGWR\n 11  end;\n 12  /\nProcedure created.\n\
  ```\n\n因此，例程中执行的提交是使用`WRITE NOWAIT`完成的，并且在 PL/SQL 代码块返回给客户端应用程序之前，PL/SQL 确保它生成的最后一部分重做日志已安全记录到磁盘——从而使\
  \ PL/SQL 代码块及其更改具有持久性。\n\n## 完整性约束与事务\n\n有趣的是，需要确切了解完整性约束何时被检查。默认情况下，完整性约束在整个 SQL\
  \ 语句处理完毕后进行检查。还有可延迟约束，允许将完整性约束的验证推迟到应用程序通过发出`SET CONSTRAINTS ALL IMMEDIATE`命令请求验证，或者在发出`COMMIT`时进行验证。\n\
  \n### 即时约束\n\n对于本讨论的第一部分，我们将假设约束处于`IMMEDIATE`模式，这是常规情况。在这种情况下，完整性约束在整个 SQL 语句处理后立即检查。请注意，我使用了“SQL\
  \ 语句”这一术语，而不仅仅是“语句”。如果我在一个 PL/SQL 存储过程中有许多 SQL 语句，每个 SQL 语句将在其单独执行后立即验证其完整性约束，而不是在存储过程完成时。\n\
  \n那么，为什么约束在 SQL 语句执行*之后*验证，而不是*执行过程中*验证？这是因为单个语句使表中的个别行暂时不一致是非常自然的。查看语句的部分工作会导致\
  \ Oracle 拒绝结果，即使最终结果可能是正常的。例如，假设我们有一个这样的表：\n\n```\n$ sqlplus eoda/foo@PDB1\nSQL>\
  \ create table t ( x int unique );\nTable created.\nSQL> insert into t values (\
  \ 1 );\n1 row created.\nSQL> insert into t values ( 2 );\n1 row created.\nSQL> commit;\n\
  Commit complete.\n```\n\n然后我们想执行一个多行`UPDATE`：\n\n```\nSQL> update t set x=x-1;\n\
  2 rows updated.\n```\n\n如果 Oracle 在每行更新后检查约束，那么在任何时候我们都有 50%的机会让`UPDATE`失败。`T`表中的行以*某种*顺序被访问，如果\
  \ Oracle 先更新`X=1`的行，我们会暂时出现`X`值重复，从而拒绝`UPDATE`。由于 Oracle 会耐心地等到语句结束，因此该语句会成功，因为到完成时，就没有重复值了。\n\
  \n\n"
- '# 可延迟约束与级联更新


  在 Oracle 中，我们还能够延迟约束检查，这对于各种操作来说可能相当有利。首先想到的就是需要将主键的 `UPDATE` 操作级联到子键的要求。许多人声称你永远不应该需要这样做——因为主键是不可变的（我就是其中之一），但许多人仍然坚持希望拥有级联
  `UPDATE` 功能。可延迟约束使这成为可能。


  ### 注意


  执行更新级联来修改主键被认为是**极其糟糕的做法**。它违反了主键的设计意图。如果你必须这样做一次来纠正错误信息，那是一回事，但如果你发现它作为应用程序的一部分在持续进行，你将需要回过头去重新思考那个过程——你选择了错误的属性作为键！


  在 Oracle 的早期版本中，是有可能进行 `CASCADE UPDATE` 的，但这样做涉及大量工作并且存在某些限制。有了可延迟约束，这就变得几乎轻而易举了。代码可能如下所示：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> create table parent ( pk  int primary key );

  Table created.

  SQL> create table child

  ( fk  constraint child_fk_parent

  references parent(pk)

  deferrable

  initially immediate

  );

  Table created.

  SQL> insert into parent values ( 1 );

  1 row created.

  SQL> insert into child values ( 1 );

  1 row created.

  ```


  我们有一个父表 `PARENT` 和一个子表 `CHILD`。表 `CHILD` 引用了表 `PARENT`，用于强制实施该规则的约束名为 `CHILD_FK_PARENT`（子外键到父键）。这个约束被创建为
  `DEFERRABLE`（可延迟），但它被设置为 `INITIALLY IMMEDIATE`（初始为立即）。这意味着我们可以将该约束延迟到 `COMMIT`（提交）或其他某个时间。然而，默认情况下，它将在语句级别进行验证。这是可延迟约束最常见的用法。大多数现有应用程序不会在
  `COMMIT` 语句上检查约束违反，最好不要让它们感到意外。按照定义，表 `CHILD` 的行为方式与以往一样，但它给了我们显式改变其行为的能力。现在让我们尝试对表进行一些
  DML 操作，看看会发生什么：


  ```

  SQL> update parent set pk = 2;

  update parent set pk = 2

  *

  ERROR at line 1:

  ORA-02292: integrity constraint (EODA.CHILD_FK_PARENT) violated - child record

  found

  ```


  由于约束处于 `IMMEDIATE`（立即）模式，此 `UPDATE` 失败。我们将更改模式并重试：


  ```

  SQL> set constraint child_fk_parent deferred;

  Constraint set.

  SQL> update parent set pk = 2;

  1 row updated.

  ```


  现在它成功了。为了说明目的，我将展示如何在提交前显式检查延迟约束，以查看我们所做的修改是否符合业务规则（换句话说，检查约束当前是否没有被违反）。在提交或将控制权交给程序的其他部分（可能不期望延迟约束）之前，这样做是个好主意：


  ```

  SQL> set constraint child_fk_parent immediate;

  set constraint child_fk_parent immediate

  *

  ERROR at line 1:

  ORA-02291: integrity constraint (EODA.CHILD_FK_PARENT) violated - parent key

  not found

  ```


  它如预期那样立即失败并返回错误，因为我们知道约束已经被违反。对 `PARENT` 的 `UPDATE` 操作并未被回滚（那会违反语句级原子性）；它仍然未决。另外请注意，由于
  `SET CONSTRAINT` 命令失败，我们的事务仍在使用延迟的 `CHILD_FK_PARENT` 约束。现在让我们继续，将 `UPDATE` 级联到 `CHILD`：


  ```

  SQL> update child set fk = 2;

  1 row updated.

  SQL> set constraint child_fk_parent immediate;

  Constraint set.

  SQL> commit;

  Commit complete.

  ```


  这就是它的工作方式。请注意，要延迟约束，你必须以这种方式创建它——你必须删除并重新创建约束，才能将其从不可延迟更改为可延迟。这可能会让你认为，应该将所有约束都创建为“可延迟初始立即”，以防你将来某个时候想延迟它们。一般来说，事实并非如此。你只应在确实需要延迟约束时才允许这样做。通过创建延迟约束，你会在物理实现（数据结构）中引入可能不明显的变化。例如，如果你创建了一个可延迟的
  `UNIQUE`（唯一）或 `PRIMARY KEY`（主键）约束，Oracle 为支持该约束强制实施而创建的索引将是一个非唯一索引。通常，你期望一个唯一索引来强制实施唯一约束，但由于你指定了该约束可以被暂时忽略，因此它不能使用该唯一索引。还会观察到其他细微的变化，例如，对于
  `NOT NULL`（非空）约束。如果你允许你的 `NOT NULL` 约束可延迟，优化器将开始将该列视为支持 `NULL`（空值）——因为事实上在你的事务期间它确实支持
  `NULL`。例如，假设你有一个包含以下列和数据的表：


  ```

  SQL> create table t

  ( x int constraint x_not_null not null deferrable,

  y int constraint y_not_null not null,

  z varchar2(30)

  );

  Table created.

  SQL> insert into t(x,y,z)

  select rownum, rownum, rpad(''x'',30,''x'')

  from all_users;

  61 rows created.

  SQL> exec dbms_stats.gather_table_stats( user, ''T'' );

  PL/SQL procedure successfully completed.

  ```


  在这个例子中，列 `X` 被创建为：当你 `COMMIT` 时，`X` 将不为空。然而，在你的事务期间，`X` 被允许为空，因为约束是可延迟的。另一方面，列 `Y`
  始终是 `NOT NULL`。假设你为列 `Y` 创建索引：


  ```

  SQL> create index t_idx on t(y);

  Index created.

  ```


  然后你运行一个可以利用 `Y` 上这个索引的查询——但仅当 `Y` 是 `NOT NULL` 时，如下列查询所示：


  ```

  SQL> explain plan for select count(*) from t;

  Explained.

  SQL> select * from table(dbms_xplan.display(null,null,''BASIC''));


  | Id  | Operation        | Name  |


  |   0 | SELECT STATEMENT |       |

  |   1 | SORT AGGREGATE   |       |

  |   2 | INDEX FULL SCAN  | T_IDX |

  ```


  你会很高兴看到优化器选择使用 `Y` 上的小索引来计算行数，而不是全扫描整个表 `T`。然而，假设你删除了该索引并改为索引列 `X`：


  ```

  SQL> drop index t_idx;

  Index dropped.

  SQL> create index t_idx on t(x);

  Index created.

  ```


  然后你再次运行查询来计算行数；你会发现数据库没有使用你的索引，事实上也无法使用：


  ```

  SQL> explain plan for select count(*) from t;

  Explained.

  SQL> select * from table(dbms_xplan.display(null,null,''BASIC''));


  | Id  | Operation          | Name |


  |   0 | SELECT STATEMENT   |      |

  |   1 | SORT AGGREGATE     |      |

  |   2 | TABLE ACCESS FULL  | T    |

  ```


  它全扫描了表。为了计算行数，它不得不全扫描表。这是由于在 Oracle B*树索引中，完全为 null 的索引键条目不会被创建。也就是说，对于表 `T` 中索引列全为
  null 的任何行，索引将不包含其条目。由于 `X` 被允许暂时为空，优化器必须假设 `X` 可能为空，因此不会出现在 `X` 的索引中。因此，从索引返回的计数可能与对表的计数不同（错误）。


  我们可以看到，如果 `X` 上有一个不可延迟的约束，这个限制就被解除了；也就是说，如果 `NOT NULL` 约束不可延迟，列 `X` 实际上和列 `Y` 一样好：




  '
- '# SQL> alter table t drop constraint x_not_null;

  表已变更。

  SQL> alter table t modify x constraint x_not_null not null;

  表已变更。

  SQL> explain plan for select count(*) from t;

  已解释。

  SQL> select * from table(dbms_xplan.display(null,null,''BASIC''));


  | 标识 | 操作            | 名称  |

  |------|----------------|-------|

  | 0    | SELECT STATEMENT |       |

  | 1    | SORT AGGREGATE   |       |

  | 2    | INDEX FULL SCAN  | T_IDX |


  所以，底线是，仅在你有明确需求的地方使用可延迟约束。它们会引入微妙的副作用，可能导致物理实现（非唯一索引与唯一索引）或查询计划上的差异——正如刚刚演示的！


  ## 不良的事务习惯


  许多开发人员在处理事务时有一些不良习惯。我经常在那些曾使用过“支持”但不“提倡”使用事务的数据库的开发人员身上看到这一点。例如，在 Informix（默认情况下）、Sybase
  和 SQL Server 中，你必须显式地 `BEGIN` 一个事务；否则，每条单独的语句本身就是一个事务。与 Oracle 在离散语句周围包装 `SAVEPOINT`
  的方式类似，这些数据库会在每条语句周围包装一个 `BEGIN WORK`/`COMMIT` 或 `ROLLBACK`。这是因为，在这些数据库中，锁是宝贵的资源，并且读者会阻塞写者，反之亦然。为了尝试提高并发性，这些数据库希望你将事务尽可能缩短——有时甚至以牺牲数据完整性为代价。


  Oracle 采取了相反的方法。事务总是隐式的，除非应用程序自己实现，否则没有办法实现“自动提交”（有关更多详细信息，请参阅本章后面的“使用自动提交”部分）。在
  Oracle 中，每个事务都应在必须提交时提交，且绝不应提前提交。事务应该根据需要尽可能长。诸如锁、阻塞等问题不应真正被视为决定事务大小的驱动力——数据完整性才是你事务大小的*驱动力*。锁不是稀缺资源，并发的数据读者和写者之间也不存在争用问题。这使你能够在数据库中拥有健壮的事务。这些事务的持续时间不必很短——它们应该正好是需要的长度（但不再更长）。事务不是为了方便计算机及其软件；它们是为了保护你的数据。


  ### 在循环中提交


  面对更新多行的任务，大多数程序员会尝试找出某种过程化方式在循环中执行，以便每更新若干行就提交一次。我听过两个*（错误的！）*这样做的理由：


  *   频繁提交许多小事务比处理和提交一个大事务更快、更高效。

  *   我们没有足够的回滚空间。


  这两个理由都是被误导的。此外，过于频繁地提交会使你在更新中途失败时，面临数据库处于“未知”状态的危险。要编写一个在失败时能够顺利重启的进程，需要复杂的逻辑。迄今为止，最好的选择是仅根据业务流程的需要来提交，并相应地调整回滚段的大小。


  让我们更详细地看看这些问题。


  #### 性能影响


  频繁提交通常不会更快——几乎总是单条 SQL 语句执行更快。举个小例子，假设我们有一个包含大量行的表 `T`，我们要更新该表中每一行的一个列值。我们将用以下语句来设置这样一个表（在以下三种情况之前运行这四个设置步骤）：


  ```bash

  $ sqlplus eoda/foo@PDB1

  ```

  ```sql

  SQL> drop table t;

  表已删除。

  SQL> create table t as select * from all_objects;

  表已创建。

  SQL> exec dbms_stats.gather_table_stats( user, ''T'' );

  PL/SQL 过程已成功完成。

  SQL> variable n number

  ```


  那么，当我们去更新时，我们可以简单地在一个 `UPDATE` 语句中完成，像这样：


  ```sql

  SQL> set serverout on

  SQL> exec :n := dbms_utility.get_cpu_time;

  PL/SQL 过程已成功完成。

  SQL> update t set object_name = lower(object_name);

  72614 行已更新。

  SQL> set serverout on;

  SQL> exec dbms_output.put_line((dbms_utility.get_cpu_time-:n)|| '' cpu hsecs...''
  );

  117 cpu hsecs...

  ```


  许多人，无论出于什么原因，都觉得必须像这样做——慢速/逐行处理——以便每 N 条记录提交一次：


  ```sql

  SQL> exec :n := dbms_utility.get_cpu_time;

  PL/SQL 过程已成功完成。

  SQL> begin

  for x in ( select rowid rid, object_name, rownum r

  from t )

  loop

  update t

  set object_name = lower(x.object_name)

  where rowid = x.rid;

  if ( mod(x.r,100) = 0 ) then

  commit;

  end if;

  end loop;

  commit;

  end;

  /

  PL/SQL 过程已成功完成。

  SQL> exec dbms_output.put_line((dbms_utility.get_cpu_time-:n)||'' cpu hsecs...''
  );

  323 cpu hsecs...

  ```


  在这个简单的例子中，为了频繁提交而在循环中处理要慢*很多*倍。如果你能用*单条* SQL 语句完成，就这样做，因为它几乎肯定更快。即使我们“优化”过程化代码，对更新使用批量处理（如下所示），它确实快得多，但仍然比它本可以达到的速度慢得多：


  ```sql

  SQL> exec :n := dbms_utility.get_cpu_time;

  PL/SQL 过程已成功完成。

  SQL> declare

  type ridArray is table of rowid;

  type vcArray is table of t.object_name%type;

  l_rids  ridArray;

  l_names vcArray;

  cursor c is select rowid, object_name from t;

  begin

  open c;

  loop

  fetch c bulk collect into l_rids, l_names LIMIT 100;

  forall i in 1 .. l_rids.count

  update t

  set object_name = lower(l_names(i))

  where rowid = l_rids(i);

  commit;

  exit when c%notfound;

  end loop;

  close c;

  end;

  /

  PL/SQL 过程已成功完成。

  SQL> exec dbms_output.put_line((dbms_utility.get_cpu_time-:n)||'' cpu hsecs...''
  );

  67 cpu hsecs...

  PL/SQL 过程已成功完成。

  ```


  不仅如此，你还应该注意到代码变得越来越复杂。从单条 `UPDATE` 语句的极致简单，到过程化代码，再到更复杂的过程化代码——我们正朝着错误的方向前进！此外（是的，还有更多可抱怨的），前面的过程化代码还没完。它没有处理“当我们失败时会发生什么”（不是*如果我们*，而是*当我们*）。如果这段代码执行到一半然后系统失败了怎么办？你如何带着一个已提交的点来重启这个过程化代码？你将不得不添加更多的代码，以便知道从哪里继续处理。而使用单条
  `UPDATE` 语句，我们只需重新发出 `UPDATE`。我们知道它要么完全成功，要么完全失败；不会有需要担心的部分工作。我们在“可重启的进程需要复杂逻辑”一节中会更详细地讨论这一点。




  '
- '# 大型事务与锁策略


  现在，为了给这个讨论提供一个反面观点，回想一下我们在上一章讨论的写一致性概念，以及一个 `UPDATE` 语句如何可能需要重启。如果前面的 `UPDATE` 语句是针对行的一个子集执行的（它有一个
  `WHERE` 子句，并且其他用户正在修改这个 `UPDATE` 的 `WHERE` 子句中使用的列），那么要么需要使用一系列较小的事务而不是一个大事务，要么在执行批量更新之前锁定表。这里的目标是减少发生重启的机会。


  如果我们要 `UPDATE` 表中绝大多数行，这会引导我们使用 `LOCK TABLE` 命令。然而，根据我的经验，这种大规模的批量更新或批量删除（唯一真正会面临重启风险的语句类型）都是在隔离状态下完成的。那种大型的一次性批量更新或旧数据清除，通常不是在高活动期间进行的。确实，数据清除根本不应该受此影响，因为你通常会使用某个日期字段来定位要清除的信息，而其他应用程序不会修改这些数据。


  '
- '# 快照过旧错误


  现在让我们看看开发者倾向于在过程循环中提交更新的第二个原因，这源于他们（被误导的）试图节俭地使用“有限资源”（回滚段）。这是一个配置问题；你*需要*确保你有足够的回滚空间来正确设定你的事务大小。在循环中提交，除了通常更慢之外，也是导致令人畏惧的
  `ORA-01555` 错误的最常见原因。让我们更详细地看看这个问题。


  正如你在阅读前一章后将理解的，Oracle 的多版本模型使用回滚段数据来重构块在语句或事务开始时（取决于隔离模式）的样子。如果必要的回滚信息不再存在，你将收到
  `ORA-01555: snapshot too old` 错误消息，并且你的查询将无法完成。所以，如果你正在修改你正在读取的表（如前面的例子），你正在生成你的查询所需的回滚信息。你的
  `UPDATE` 生成了回滚信息，你的查询很可能会利用这些信息来获取它需要更新的数据的读一致视图。如果你提交了，你就允许系统重用你刚刚填满的回滚段空间。如果它确实重用了回滚空间，擦除了你的查询随后需要的旧回滚数据，那你就麻烦大了。你的
  `SELECT` 会失败，而你的 `UPDATE` 会中途停止。你有一个部分完成的逻辑事务，并且很可能没有好的方法来重启它（稍后会详细讨论）。


  让我们通过一个小演示来看看这个概念是如何发生的。在一个小型测试数据库中，我们建立了一个表：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> create table t as select * from all_objects;

  Table created.

  SQL> create index t_idx on t(object_name);

  Index created.

  SQL> exec dbms_stats.gather_table_stats( user, ''T'', cascade=>true );

  PL/SQL procedure successfully completed.

  ```


  然后我创建了一个非常小的回滚表空间，并更改系统以使用它。注意，通过设置 `AUTOEXTEND` 为关闭，我将此系统中所有 `UNDO` 的大小限制为 10MB
  或更小：


  ```

  SQL> create undo tablespace undo_small

  datafile ''/tmp/undo_small.dbf''

  size 10m reuse

  autoextend off;

  Tablespace created.

  SQL> alter system set undo_tablespace = undo_small;

  System altered.

  ```


  现在，只使用这个小的回滚表空间，我运行了这个代码块来执行 `UPDATE`：


  ```

  SQL> begin

  for x in ( select /*+ INDEX(t t_idx) */ rowid rid, object_name, rownum r

  from t

  where object_name > '' '' )

  loop

  update t

  set object_name = lower(x.object_name)

  where rowid = x.rid;

  if ( mod(x.r,100) = 0 ) then

  commit;

  end if;

  end loop;

  commit;

  end;

  /

  begin

  *

  ERROR at line 1:

  ORA-01555: snapshot too old: rollback segment number  with name "" too small

  ORA-06512: at line 2

  ```


  我得到了这个错误。我应该指出，我在查询中添加了一个索引提示和一个 `WHERE` 子句，以确保我是在随机读取表（它们共同导致基于成本的优化器按索引键“排序”读取表）。当我们通过索引处理表时，我们倾向于读取一个块来获取一行，然后我们想要的下一行会在另一个块上。最终，我们将处理块
  1 上的所有行，只是不是同时处理。块 1 可能包含，比如说，所有 `OBJECT_NAME` 以字母 A、M、N、Q 和 Z 开头的行的数据。因此，我们会多次访问这个块，因为我们是按
  `OBJECT_NAME` 排序读取数据，并且可能有许多 `OBJECT_NAME` 以 A 和 M 之间的字母开头。由于我们频繁提交并重用回滚空间，我们最终会重访一个我们已经无法回滚到查询开始时状态的块，此时我们就得到了错误。


  这是一个非常人为的例子，只是为了可靠地展示它是如何发生的。我的 `UPDATE` 语句正在生成回滚。我有一个非常小的回滚表空间（10MB）可以操作。我的回滚段多次回绕，因为它们是循环使用的。每次我提交，我都允许
  Oracle 覆盖我生成的回滚数据。最终，我需要一些我生成的数据片段，但它已不复存在，于是我收到了 `ORA-01555` 错误。


  你可能会正确地指出，在这个例子中，如果我没有在第 10 行提交，我会收到以下错误：


  ```

  begin

  *

  ERROR at line 1:

  ORA-30036: unable to extend segment by 8 in undo tablespace ''UNDO_SMALL''

  ORA-06512: at line 6

  ```


  这两个错误的主要区别如下：


  *   `ORA-01555` 例子*将我的更新置于一个完全未知的状态*。部分工作已完成；部分未完成。

  *   鉴于我在游标 `FOR` 循环中提交了，*我绝对无法避免 `ORA-01555` 错误*。

  *   `ORA-30036` *错误可以通过在系统中分配适当的资源来避免*。这个错误可以通过正确的大小调整来避免；第一个错误则不行。此外，即使我没有避免这个错误，至少更新会被回滚，数据库保持在一个已知的、一致的状态——而不是半途停滞在某个大更新中。


  这里的底线是，你不能通过频繁提交来“节省”回滚空间——你需要那些回滚数据。我收到 `ORA-01555` 错误时是在一个单用户系统中。只需要一个会话就能导致那个错误，并且很多时候即使在真实环境中，也是一个会话导致了其自身的
  `ORA-01555` 错误。开发人员和 DBA 需要共同努力，为需要完成的工作充分设定这些段的大小。这里不能有任何短缺。你必须通过分析你的系统来发现你最大的事务是什么，并相应地为它们设定大小。动态性能视图
  `V$UNDOSTAT` 对于监控你生成的回滚量和最长运行查询的持续时间非常有用。许多人认为像临时表空间、回滚表空间和重做日志这样的东西是开销——要分配尽可能少的存储。这让人想起计算机行业在
  2000 年 1 月 1 日遇到的一个问题，那完全是由于试图在日期字段中节省 2 个字节造成的。这些数据库组件不是开销，而是系统的关键组成部分。它们必须被适当地设定大小（不能太大也不能太小）。


  说到 `UNDO` 段太小，在运行这些测试后，务必将你的回滚表空间设置回常规的那个，例如：


  ```

  SQL> alter system set undo_tablespace=undotbs2;

  SQL> drop tablespace undo_small including contents and datafiles;

  ```


  如果你不把回滚表空间改回一个正常大小的，本书的其余部分你都会遇到 `ORA-30036` 错误！




  #### 可重启的进程需要复杂的逻辑


  “在逻辑事务结束前提交”这种方法最严重的问题在于，如果 `UPDATE` 操作中途失败，它常常会使你的数据库处于一个未知状态。除非你预先为此做了规划，否则很难重启失败的进程并让其从中断处继续执行。例如，假设我们不是像前面的例子那样对列应用
  `LOWER()` 函数，而是应用其他函数，比如这样：


  ```

  last_ddl_time = last_ddl_time + 1;

  ```


  如果我们中途停止了 `UPDATE` 循环，该如何重启它？我们不能简单地重新运行它，因为那样会导致某些日期的值加了 2，而另一些只加了 1。如果我们再次失败，就会出现一些加了
  3，一些加了 2，其余的加了 1，如此往复。我们需要更复杂的逻辑——某种“分区”数据的方法。例如，我们可以先处理所有以 `A` 开头的 `OBJECT_NAME`，然后是
  `B`，依此类推：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> create table to_do

  as

  select distinct substr( object_name, 1,1 ) first_char

  from T

  /

  Table created.

  SQL> set serverout on

  SQL> begin

  for x in ( select * from to_do )

  loop

  update t set last_ddl_time = last_ddl_time+1

  where object_name like x.first_char || ''%'';

  dbms_output.put_line( sql%rowcount || '' rows updated'' );

  delete from to_do where first_char = x.first_char;

  commit;

  end loop;

  end;

  /

  238 rows updated

  5730 rows updated

  1428 rows updated

  ...

  262 rows updated

  1687 rows updated

  PL/SQL procedure successfully completed.

  ```


  现在，如果这个进程失败了，我们可以重启它，因为我们不会处理任何已经成功处理过的对象名。然而，这种方法的问题在于，除非我们有某个能均匀分区数据的属性，否则最终会导致行的分布非常不均。第二次
  `UPDATE` 处理的工作量比其他所有次加起来还要多。此外，如果有其他会话正在访问这张表并修改数据，他们也可能更新 `OBJECT_NAME` 字段。假设在我们处理完所有以
  `A` 开头的对象*之后*，另一个会话将某个名为 `Z` 的对象更新为 `A`。我们就会错过那条记录。而且，与 `UPDATE T SET LAST_DDL_TIME
  = LAST_DDL_TIME+1` 相比，这是一个非常低效的过程。我们很可能在使用索引来读取表中的每一行，或者对表进行了 *n* 次全表扫描，这两种情况都不可取。这种方法有很多缺点。


  最好的方法是力求简单。如果能在 SQL 中完成，就在 SQL 中完成。SQL 无法完成的，再在 PL/SQL 中完成。使用尽可能少的代码来实现。分配足够的资源。始终考虑发生错误时的情况。我曾多次看到人们编写的更新循环在测试数据上运行良好，但在应用于真实数据时中途失败。然后他们就真的陷入困境了，因为他们不知道循环处理到哪里停止了。正确地估算
  undo 空间大小，比重写一个可重启的程序要容易得多。如果你确实有需要更新的大型表，你应该使用分区，这样你可以单独更新每个分区。你甚至可以使用并行 DML 来执行更新，或者在
  Oracle 11*g* Release 2 及以上版本中，使用 `DBMS_PARALLEL_EXECUTE` 包。


  ### 使用自动提交


  关于不良事务习惯，我最后要讨论的是使用流行的编程 API ODBC 和 JDBC 时产生的问题。这些 API 默认是“自动提交”的。考虑以下语句，它们将 1000
  美元从支票账户转到储蓄账户：


  ```

  update accounts set balance = balance - 1000 where account_id = 123;

  update accounts set balance = balance + 1000 where account_id = 456;

  ```


  如果你的程序在使用 ODBC 或 JDBC 提交这些语句时，它们会在*每条* `UPDATE` 语句之后（静默地）注入一个提交。想想看，如果系统在第一个 `UPDATE`
  之后、第二个 `UPDATE` 之前发生故障，会有什么影响。你刚刚损失了 1000 美元！


  我大概能理解为什么 ODBC 这样做。SQL Server 的开发者设计了 ODBC，而这个数据库由于其并发模型（写阻塞读，读阻塞写，并且锁是稀缺资源）要求你使用非常短的事务。我无法理解的是，这怎么会延续到
  JDBC 中，一个本应支持“企业级”应用的 API。我认为，在 JDBC 中打开连接后的下一行代码，应该总是这样的：


  ```

  Connection conn = DriverManager.getConnection

  ("jdbc:oracle:oci:@database","scott","tiger");

  conn.setAutoCommit (false);

  ```


  这样就把事务的控制权交还给你——开发者，而这正是它应有的归属。然后你就可以安全地编写账户转账事务，并在两条语句都成功执行后再提交。在这种情况下，不了解你的 API
  可能是致命的。我见过不止一个开发者没有意识到这个自动提交“特性”，当错误发生时，他们的应用程序陷入了大麻烦。



  '
- '# 分布式事务


  Oracle 的一个非常出色的特性是能够透明地处理分布式事务。我可以在单个事务范围内更新许多不同数据库中的数据。当我提交时，要么更新在所有实例中都提交，要么一个都不提交（它们都会被回滚）。我不需要额外的代码来实现这一点；我只需执行
  "commit"。


  ## 数据库链接与访问


  Oracle 中分布式事务的关键是 `database link`（数据库链接）。`database link` 是一个数据库对象，它描述了如何从你的实例登录到另一个实例。然而，本节的目的不是涵盖
  `database link` 命令的语法（这在 *Oracle Database SQL Language Reference* 手册中有完整记录），而是让你了解它的存在。一旦你设置好了
  `database link`，访问远程对象就很简单了：


  ```sql

  select * from T@another_database;

  ```


  这将从由数据库链接 `ANOTHER_DATABASE` 定义的数据库实例中的表 `T` 进行选择。通常，你会通过为其创建视图或同义词来"隐藏" `T` 是远程表的事实。例如，我可以执行以下命令，然后像访问本地表一样访问
  `T`：


  ```sql

  create synonym T for T@another_database;

  ```


  ## 执行分布式事务


  现在，我已经设置好了这个 `database link`，并且可以读取一些表了，我也能够修改它们（当然，前提是我拥有适当的权限）。执行分布式事务现在与本地事务没有什么不同。我只需这样做：


  ```sql

  update local_table set x = 5;

  update remote_table@another_database set y = 10;

  commit;

  ```


  就是这样。Oracle 将在两个数据库中都提交，或者都不提交。它使用两阶段提交协议（2PC）来实现这一点。2PC 是一种分布式协议，允许影响多个不同数据库的修改被原子性地提交。它试图在提交之前尽可能缩小分布式故障的窗口。


  ## 两阶段提交（2PC）协议


  在涉及多个数据库的 2PC 中，其中一个数据库——通常是客户端最初登录的那个——将充当分布式事务的**协调者**。这个站点将询问其他站点是否准备好提交。实际上，这个站点会去找其他站点，要求它们做好提交准备。其他每个站点都会将其"准备就绪状态"报告为
  `YES` 或 `NO`。如果任何一个站点投票 `NO`，则整个事务回滚。如果所有站点都投票 `YES`，则站点协调者向每个站点广播一条消息，使提交永久生效。


  这限制了可能发生严重错误的窗口期。在 2PC 的"投票"阶段之前，任何分布式错误都会导致所有站点回滚。事务的结果是确定无疑的。在提交或回滚的命令发出之后，分布式事务的结果再次变得确定无疑。只有在协调者收集投票的那个非常短暂的窗口期内，如果发生故障，结果才可能是不确定的。


  ## 处理不确定的事务


  假设，例如，我们有三个站点参与事务，其中站点 1 是协调者。站点 1 已要求站点 2 准备提交，站点 2 已照做。然后站点 1 要求站点 3 准备提交，站点 3
  也照做了。此时，只有站点 1 知道事务的结果，它现在负责将结果广播给其他站点。如果此时发生错误——网络故障、站点 1 断电，无论什么情况——站点 2 和 3 将被挂起。它们将拥有一个所谓的
  `in-doubt distributed transaction`（不确定的分布式事务）。2PC 协议试图尽可能缩小错误窗口，但无法完全消除它。站点 2 和
  3 必须保持该事务打开，等待来自站点 1 的结果通知。


  `RECO` 后台进程的功能就是解决这个问题。这也是带 `FORCE` 选项的 `COMMIT` 和 `ROLLBACK` 发挥作用的地方。如果问题的原因是站点
  1、2 和 3 之间的网络故障，那么站点 2 和 3 的 DBA 实际上可以致电站点 1 的 DBA，询问结果，然后酌情手动应用提交或回滚。


  ## 分布式事务的限制


  在分布式事务中可以做的事情有一些限制，但不是很多，而且这些限制是合理的（至少对我来说似乎合理）。主要限制如下：


  *   你不能通过 `database link` 发出 `COMMIT`。也就是说，你不能执行 `COMMIT@remote_site`。你只能从事务发起的站点提交。


  *   你不能通过 `database link` 执行 DDL。这是前一个问题的直接结果。DDL 会提交事务。你只能从事务发起的站点提交；因此，你不能通过 `database
  link` 执行 DDL。


  *   你不能通过 `database link` 发出 `SAVEPOINT`。简而言之，你不能通过 `database link` 发出任何事务控制语句。所有事务控制都继承自最初打开
  `database link` 的会话；在分布式事务的各个实例中，你不能有不同的事务控制。


  缺乏通过 `database link` 进行事务控制是合理的，因为只有发起站点才拥有参与事务的所有方的列表。在我们的三站点配置中，如果站点 2 尝试提交，它将无法知道站点
  3 也参与了。在 Oracle 中，只有站点 1 可以发出提交命令。此时，允许站点 1 将分布式事务控制的责任委托给另一个站点。


  我们可以通过设置站点的 `COMMIT_POINT_STRENGTH`（一个参数）来影响哪个站点将成为实际的提交站点。`COMMIT_POINT_STRENGTH`
  将一个相对重要性级别与分布式事务中的服务器关联起来。服务器越重要（数据需要越高的可用性），它协调分布式事务的可能性就越大。如果你需要在生产机和测试机之间执行分布式事务，你可能希望这样做。由于事务协调者对事务结果*从不*存在疑问，所以最好让生产机协调分布式事务。你不太关心测试机是否有一些未完成的事务和锁定的资源。但你肯定关心生产机是否这样。


  ## 在分布式环境中执行 DDL


  无法通过 `database link` 执行 DDL 实际上并没有那么糟糕。首先，DDL 很少见。你在安装或升级时做一次。生产系统不执行 DDL（嗯，它们*不应该*执行
  DDL）。其次，有一种方法可以通过 `database link` 执行 DDL，某种意义上，使用作业队列工具 `DBMS_SCHEDULER`。你不必尝试通过链接执行
  DDL，而是使用链接调度一个远程作业，在你提交后立即执行。这样，作业在远程机器上运行，不是分布式事务，并且可以执行 DDL。事实上，Oracle 复制服务执行分布式
  DDL 进行模式复制就是使用这种方法。


  ## 自治事务


  自治事务允许你创建一个“事务中的事务”，该事务可以独立于其父事务提交或回滚更改。它们使你能够暂停当前正在执行的事务，启动一个新事务，执行一些工作，然后提交或回滚——所有这些都不会影响当前正在执行的事务状态。自治事务为
  PL/SQL 中的事务控制提供了一种新方法，可用于：


  *   顶层匿名块

  *   局部（过程中的过程）、独立或打包的函数和过程

  *   对象类型的方法

  *   数据库触发器


  在我们探讨自治事务如何工作之前，我想强调一点：这种类型的事务功能强大，因此如果使用不当，也是危险的工具。真正需要自治事务的情况确实非常罕见。对于任何使用了它们的代码，我都会持高度怀疑态度——这类代码需要接受额外审查。使用它们时，很容易无意中在系统中引入逻辑数据完整性问题。在接下来的章节中，我们将在了解其工作原理之后，讨论何时可以安全地使用它们。


  ### 自治事务如何工作


  演示自治事务的行为及其后果的最佳方式是通过示例。我们将创建一个简单的表来保存一条消息：


  ```

  SQL> create table t ( msg varchar2(25) );

  Table created.

  ```


  接下来，我们将创建两个过程，每个过程都简单地将其名称 `INSERT` 到消息表并提交。然而，其中一个过程是常规过程，另一个则被编码为自治事务。我们将使用这些对象来展示在不同情况下哪些工作会持久化（被提交）在数据库中。


  首先是 `AUTONOMOUS_INSERT` 过程：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> create or replace procedure Autonomous_Insert

  as

  pragma autonomous_transaction;

  begin

  insert into t values ( ''Autonomous Insert'' );

  commit;

  end;

  /

  Procedure created.

  ```


  注意这里使用了编译指示 `AUTONOMOUS_TRANSACTION`。这个指令告诉数据库，该过程在执行时，应作为一个新的自治事务执行，独立于其父事务。


  注意


  *编译指示*（pragma）只是一个编译器指令，一种指示编译器执行某些编译选项的方法。还有其他可用的编译指示。请参考 *Oracle Database PL/SQL
  Language Reference* 手册；你可以在其索引中找到它们的列表。


  然后是“常规的” `NONAUTONOMOUS_INSERT` 过程：


  ```

  SQL> create or replace procedure NonAutonomous_Insert

  as

  begin

  insert into t values ( ''NonAutonomous Insert'' );

  commit;

  end;

  /

  Procedure created.

  ```


  现在，让我们观察 *非自治* 事务在 PL/SQL 匿名块中的行为：


  ```

  SQL> begin

  insert into t values ( ''Anonymous Block'' );

  NonAutonomous_Insert;

  rollback;

  end;

  /

  PL/SQL procedure successfully completed.

  SQL> select * from t;

  MSG

  --------------------------------------------------------------------------------

  Anonymous Block

  NonAutonomous Insert

  ```


  如你所见，匿名块执行的工作（它的 `INSERT`）被 `NONAUTONOMOUS_INSERT` 过程 *提交* 了。两行数据都被提交了，因此 `ROLLBACK`
  命令没有可以回滚的内容。将此与自治事务过程的行为进行对比：


  ```

  SQL> delete from t;

  2 rows deleted.

  SQL> commit;

  Commit complete.

  SQL> begin

  insert into t values ( ''Anonymous Block'' );

  Autonomous_Insert;

  rollback;

  end;

  /

  PL/SQL procedure successfully completed.

  SQL> select * from t;

  MSG

  --------------------------------------------------------------------------------

  Autonomous Insert

  ```


  在这里，只有在自治事务中执行并提交的工作才持久化。匿名块中的 `INSERT` 被第 4 行的 `ROLLBACK` 语句回滚了。自治事务过程的 `COMMIT`
  对匿名块中启动的父事务没有影响。简而言之，这概括了自治事务的本质及其作用。


  总结一下，如果你在“常规”过程中执行 `COMMIT`，它不仅会使该过程自己的工作持久化，还会使该会话中所有未提交的工作持久化。然而，在具有自治事务的过程中执行
  `COMMIT`，只会使该过程自身的工作持久化。


  ### 何时使用自治事务


  Oracle 数据库在内部支持自治事务已有相当长的时间。我们经常以递归 SQL 的形式看到它们。例如，当从序列中选择时，可能会执行一个递归事务，以便你能够立即在
  `SYS.SEQ$` 表中递增序列。为支持你的序列而对 `SYS.SEQ$` 表的更新会立即提交并对其他事务可见，但你的事务尚未提交。此外，如果你回滚你的事务，序列的递增仍然保留；它不会随你的事务一起回滚，因为它已经被提交了。空间管理、审计和其他内部操作也以类似的递归方式执行。


  现在这个功能已开放供所有人使用。然而，我发现自治事务在现实世界中的合法用途 *非常有限*。我一次又一次地看到它们被用作解决诸如触发器中的变异表约束等问题的变通方法。然而，这几乎总是导致数据完整性问题，因为变异表的原因是尝试读取触发器正在触发的表。嗯，通过使用自治事务，你可以查询该表，但你现在查询该表时无法看到你自己的更改（这正是变异表约束最初试图阻止的；该表正处于修改过程中，因此查询结果会不一致）。你基于该触发器中的查询所做出的任何决策都将是可疑的——你当时读取的是“旧”数据。


  自治事务一个潜在的有效用途是在自定义审计中，但我强调“潜在有效”这几个字。在数据库中审计信息有比通过自定义编写触发器更高效的方法。例如，你可以使用 `DBMS_FGA`
  包或直接使用 `AUDIT` 命令本身。


  应用程序开发人员经常向我提出的一个问题是：“我如何才能以一种即使我的 PL/SQL 例程的工作被回滚也能持久化的方式，在我的 PL/SQL 例程中记录错误？”之前，我们描述了
  PL/SQL 语句是 *原子性* 的——它们要么完全成功，要么完全失败。如果我们在 PL/SQL 例程中记录错误，默认情况下，我们记录的错误信息会在 Oracle
  回滚我们的语句时一起回滚。自治事务允许我们改变这种行为，使得我们的错误日志信息即使在其余部分工作被回滚时也能持久保存。


  让我们首先设置一个要使用的简单错误日志表；我们将记录错误的时间戳、错误消息和 PL/SQL 错误堆栈（用于精确定位错误来源）：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> create table error_log

  ( ts   timestamp,

  err1 clob,

  err2 clob )

  /

  Table created.

  ```


  现在我们需要将错误记录到该表的 PL/SQL 例程。我们可以使用这个小例子：


  ```

  SQL> create or replace

  procedure log_error

  ( p_err1 in varchar2, p_err2 in varchar2 )

  as

  pragma autonomous_transaction;

  begin

  insert into error_log( ts, err1, err2 )

  values ( systimestamp, p_err1, p_err2 );

  commit;

  end;

  /

  Procedure created.

  ```


  这个例程的“魔力”在于第 5 行，我们使用了 `pragma autonomous_transaction` 指令来通知 PL/SQL，我们希望这个子程序启动一个新的事务，在其中执行一些工作并提交——而不影响当前正在处理的任何其他事务。第
  9 行的 `COMMIT` 只能影响这个 `LOG_ERROR` 过程执行的 SQL。


  现在让我们来测试一下。为了让它更有趣，我们将创建几个相互调用的过程：



  ```

  SQL> create table t ( x int check (x>0) );

  表已创建。

  SQL> create or replace procedure p1( p_n in number )

  as

  begin

  -- 此处为某些代码

  insert into t (x) values ( p_n );

  end;

  /

  过程已创建。

  SQL> create or replace procedure p2( p_n in number )

  as

  begin

  -- 代码

  -- 代码

  p1(p_n);

  end;

  /

  过程已创建。

  ```


  然后我们将从一个匿名块调用这些例程：


  ```

  SQL> begin

  p2( 1 );

  p2( 2 );

  p2( -1);

  exception

  when others

  then

  log_error( sqlerrm, dbms_utility.format_error_backtrace );

  RAISE;

  end;

  /

  begin

  *

  第 1 行出现错误:

  ORA-02290: 违反检查约束条件 (EODA.SYS_C007751)

  ORA-06512: 在第 9 行

  ORA-06512: 在 "EODA.P1", 第 5 行

  ORA-06512: 在 "EODA.P2", 第 6 行

  ORA-06512: 在第 4 行

  ```


  现在，我们可以看到代码执行失败了（你希望那个错误被返回，因此第 9 行的 `RAISE`）。我们可以验证 Oracle 撤销了我们的操作（我们知道对过程 `P2`
  的前两次调用是成功的；值 1 和 2 已成功插入到表 `T` 中）：


  ```

  SQL> select * from t;

  未选中任何行

  ```


  但我们也能够验证我们的错误日志信息已经持久化，并且实际上已经被提交：


  ```

  SQL> rollback;

  回退完成。

  SQL> set long 1000000

  SQL> select * from error_log;

  TS


  ERR1


  ERR2


  2021 年 5 月 30 日 下午 02.59.41.969061

  ORA-02290: 违反检查约束条件 (EODA.SYS_C0013043)

  ORA-06512: 在 "EODA.P1", 第 5 行

  ORA-06512: 在 "EODA.P2", 第 6 行

  ORA-06512: 在第 4 行

  ```


  根据我的经验，这是自治事务唯一真正有效的用途——以可以独立于父事务提交的方式记录错误或信息性消息。


  ## 总结


  在本章中，我们探讨了 Oracle 中事务管理的诸多方面。事务是将数据库与文件系统区分开来的主要特性之一。理解它们的工作原理以及如何使用它们，对于在任何数据库中正确实现应用程序都是必要的。理解
  Oracle 中所有语句都是原子性的（包括其副作用），并且这种原子性被扩展到了存储过程，这一点至关重要。我们看到了在 PL/SQL 块中 `WHEN OTHERS`
  异常处理程序的位置如何能极大地影响数据库中发生的变化。作为数据库开发人员，深入理解事务的工作原理至关重要。


  我们审视了完整性约束（唯一键、检查约束等）与 Oracle 中事务之间有些复杂的交互。我们讨论了 Oracle 通常如何在语句执行后立即处理完整性约束，但如果我们希望，也可以将此约束验证推迟到事务结束时进行。当被修改的表彼此都相互依赖时，这个特性对于实现复杂的多表更新至关重要——级联更新就是一个例子。


  我们接着探讨了人们从那些“支持”而非“促进”使用事务的数据库工作中容易沾染的一些不良事务习惯。我们审视了事务的基本规则：它们应尽可能短，但也要根据需要尽可能长。*数据完整性驱动事务大小*——这是从本章中要带走的一个关键概念。唯一应该驱动你事务大小的是支配你系统的业务规则。不是回滚空间，不是锁——是业务规则。


  我们介绍了分布式事务，以及它们与单数据库事务的不同之处。我们探讨了分布式事务中施加给我们的限制，并讨论了它们存在的原因。在构建分布式系统之前，你需要理解这些限制。在单实例中有效的方法在分布式数据库中可能行不通。


  本章最后探讨了自治事务，涵盖了它们是什么，更重要的是，何时应该以及何时不应该使用它们。我想再次强调，自治事务在现实世界中的合法用例极为罕见。如果你发现它成了你经常使用的一个特性，你需要非常仔细地审视原因。


