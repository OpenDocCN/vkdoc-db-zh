  SQL> exec proc1

  PL/SQL procedure successfully completed.

  SQL> exec runstats_pkg.rs_middle

  PL/SQL procedure successfully completed.

  SQL> exec proc2

  PL/SQL procedure successfully completed.

  SQL> exec runstats_pkg.rs_stop(9500)

  Run1 ran in 20 cpu hsecs

  Run2 ran in 709 cpu hsecs

  run 1 ran in 2.82% of the time

  ```


