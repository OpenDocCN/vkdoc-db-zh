  我包含了 SGA 配置以供参考，但相关的统计信息如下：


  *   消耗时间（DB 时间）约为 10 秒（0.16 分钟）

  *   每秒 1796.9 次硬解析

  *   使用了 9 秒 CPU 时间


  现在，如果我们同时运行两个这样的程序，我们可能会预期硬解析次数跳升至每秒约 3600 次（毕竟我们有多个 CPU 可用），CPU 时间翻倍至大约 22 秒。让我们看一下：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> @nobind.sql 2

  Elapsed:       0.20 (mins) Av Act Sess:       1.8

  DB time:       0.36 (mins)      DB CPU:       0.35 (mins)

  ...

  Load Profile             Per Second    Per Transaction    Per Exec    Per Call

  ~~~~~~~~~~~~     ------------------  ----------------- ----------- -----------

  ...

  Parses:            4,178.3           16,713.0

  Hard parses:            4,167.7           16,670.7

  ...

  Top 5 Timed Events                                               Avg %Total

  ~~~~~~~~~~~~~~~~~~                                              wait   Call

  Event                                       Waits    Time (s)   (ms)   Time

  ------------------------------------ ------------ ----------- ------ ------

  CPU time                                                   21          61.8

  pman timer                                      4          12   3000   35.6

  latch: shared pool                         17,586           1      0    2.0

  log file parallel write                        19           0      4     .2

  library cache: dependency mutex X               2           0     19     .1

  ```


  我们发现硬解析次数上升了一点，但 CPU 时间增加了一倍多。这怎么可能呢？答案在于 Oracle 对闩锁的实现方式。在这台多 CPU 机器上，当我们无法立即获得一个闩锁时，我们会自旋（spin）。自旋这个动作本身就会消耗
  CPU。进程 1 多次尝试获取共享池的闩锁，却发现进程 2 持有该闩锁，因此进程 1 必须自旋并等待（消耗 CPU）。反过来对进程 2 也是如此；它会多次发现进程
  1 持有它所需资源的闩锁。因此，我们的大部分处理时间并非用于实际工作，而是等待资源变得可用。如果我们向下翻阅 Statspack 报告到“闩锁睡眠细分”（Latch
  Sleep Breakdown）报告，我们会发现以下信息：


  ```

  Latch Name                 Requests      Misses     Sleeps      Gets

  ----------- ------------------------ ----------- ---------- ---------

  shared pool               2,151,856     131,050     17,789   113,513

  ```


  注意这里的 `SLEEPS` 列中出现的数字 17,789 吗？这个数字与前面的“前 5 大计时事件”报告中报告的 `WAITS` 数量非常接近。


  **注意**


  睡眠次数与等待次数`紧密`对应；这可能会让人感到疑惑。为什么不是`完全`对应？原因是获取快照的操作不是原子的；在 Statspack 快照期间，会执行一系列查询将统计信息收集到表中，而每个查询都是`在`一个稍微不同的时间点执行的。因此，等待事件指标是在获取闩锁详细信息之前稍早的时间收集的。


  我们的“闩锁睡眠细分”报告向我们显示了尝试获取闩锁但在自旋循环中失败的次数。这意味着前 5 大报告只向我们展示了冰山一角——在前 5 大报告中，并未显示那 131,050
  次未命中（这意味着我们曾自旋尝试获取闩锁）。检查完前 5 大报告后，我们可能不会想到这里存在严重的硬解析问题，尽管实际上问题非常严重。为了执行两个单位的工作，我们不得不使用超过两个单位的
  CPU。这完全是由于我们需要那个共享资源——共享池。这就是闩锁的本质。


  你可以看到，除非你了解其实现机制，否则诊断与闩锁相关的问题可能非常困难。仅通过使用前 5 大部分快速浏览 Statspack 报告，可能会导致我们忽视这样一个事实：我们面临一个相当糟糕的扩展性问题。只有通过深入研究
  Statspack 报告的闩锁部分，我们才能看到手头的问题。



  此外，通常无法确定系统使用的 CPU 时间中有多少是由于这种自旋（spinning）造成的——在查看双用户测试时，我们只知道使用了 21 秒的 CPU 时间，并且有
  131,050 次未能获取共享池的闩锁（latch）。我们不知道每次获取闩锁失败时尝试自旋了多少次，因此我们无法真正衡量有多少 CPU 时间花在了自旋上，又有多少花在了处理上。我们需要多个数据点来推导这些信息。


  在我们的测试中，由于有单用户示例可供比较，我们可以得出结论：大约有 3 秒左右的 CPU 时间花在了自旋等待闩锁、等待该资源上。我们能得出这个结论是因为我们知道单用户只需要
  9 秒的 CPU 时间，那么两个单用户就需要 18 秒，而 21（总 CPU 秒数）减去 18 等于 3。


  ### 使用绑定变量


  现在，我想探讨与上一节相同的情况，但这次使用一个在处理过程中显著减少闩锁使用的程序。我们将采用那个 PL/SQL 程序，并使用绑定变量对其进行编码。为了实现这一点，我们只需将硬编码的变量替换为绑定变量：


  ```sql

  declare

  begin

  for i in 1 .. 25000 loop

  begin

  execute immediate

  ''insert into t1 values(:i)'' using i;

  exception

  when no_data_found then null;

  end;

  end loop;

  end;

  /

  ```


  此测试的所有代码都放在一个名为 `bind.sql` 的文件中（您可以从 GitHub 网站下载此代码），并按如下方式运行：


  ```bash

  $ sqlplus eoda/foo@PDB1

  SQL> @bind.sql 1

  ```


  让我们像处理无绑定变量示例那样，查看单用户和双用户的 Statspack 报告。我们将在这里看到显著的差异。以下是单用户报告：


