  ASMM 和自动 PGA 内存管理，而不是 AMM 设置，后者本应为我们调整 PGA/SGA 设置的大小。


  在此示例中，我使用了 ASMM 并通过单一参数 `SGA_TARGET` 控制 SGA 的大小。当我的 SGA 大小低于约 1GB 时，粒度为 4MB。当 SGA
  大小增加到超过 1GB 的某个阈值时（该阈值会因操作系统甚至版本而略有不同），我看到粒度大小增加了：


