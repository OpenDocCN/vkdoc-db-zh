  \ Oracle 的存储结构，从表空间到段和区，最后到数据库块（最小的存储单元）。我们简要回顾了数据库中检查点的工作原理，甚至开始展望 Oracle 的某些物理进程或线程的作用。我们还介绍了很多可选的文件类型，如密码文件、变更跟踪文件、`Data\
