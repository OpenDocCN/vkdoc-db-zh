  允许你在同一个模式中同时拥有同一个存储过程的多个版本。这使你可以在一个新版本（edition）中处理该过程的副本，而不会与其他用户当前使用的过程版本产生冲突。然而，本书不会涵盖
  EBR，只是在它改变规则时提及一下。


  ## Latches


  `Latches`（闩）是轻量级的序列化设备，用于协调多用户对共享数据结构、对象和文件的访问。


  闩是设计为持有时间极短的锁——例如，修改内存中数据结构所需的时间。它们用于保护某些内存结构，例如数据库块缓冲区高速缓存或共享池中的库高速缓存。闩通常在内部以 `willing
  to wait`（愿意等待）模式请求。这意味着如果闩不可用，请求会话将休眠一小段时间，稍后重试该操作。其他闩可能以 `immediate`（立即）模式请求，这在概念上类似于
  `SELECT FOR UPDATE NOWAIT`，意味着该进程将去做其他事情，例如尝试获取可能空闲的等效同级闩，而不是坐着等待此闩变为可用。由于许多请求者可能同时等待一个闩，你可能会看到一些进程比其他进程等待更长时间。闩的分配相当随机，可以说基于运气的好坏。哪个会话在闩刚被释放后请求它，它就会获得它。没有闩等待者队列——只有一群等待者不断重试。


  Oracle 使用原子指令如“test and set”（测试并设置）和“compare and swap”（比较并交换）来操作闩。由于设置和释放闩的指令是原子的，操作系统本身保证只有一个进程能够测试并设置闩，即使许多进程可能同时去获取它。由于该指令只有一条指令，因此可以非常快（但整个闩定算法本身是许多
  CPU 指令）。闩的持有时间很短，并提供了一种在闩持有者异常死亡时进行清理的机制。这个清理过程将由 `PMON` 执行。


  `Enqueues`（队列锁），我们之前讨论过，是另一种更复杂的序列化设备，在更新数据库表中的行等情况时使用。它们与闩的不同之处在于，它们允许请求者排队等待资源。对于闩请求，请求会话会立即被告知是否获得了闩。而对于队列锁，请求会话将被阻塞，直到它实际获得该锁。


  注意


  使用 `SELECT FOR UPDATE NOWAIT` 或 `WAIT [n]`，你可以选择不等待队列锁，如果你的会话将被阻塞的话，但如果你确实阻塞并等待了，你将在队列中等待。


  因此，队列锁不如闩快，但它提供了闩无法提供的功能。队列锁可以在不同级别获取，因此你可以拥有许多共享锁和具有不同程度可共享性的锁。




  #### 锁存“自旋”


  关于锁存（Latch），我想强调的一点是：锁存是一种锁，锁是序列化设备，而序列化设备会抑制可扩展性。如果你的目标是构建一个在 Oracle 环境中扩展性良好的应用程序，就必须寻找并采用那些能将所需执行的锁存操作降至最低的方法与解决方案。


  即便是看似简单的活动，例如解析一条 SQL 语句，也会在库缓存（Library Cache）以及共享池（Shared Pool）的相关结构上获取并释放成百上千次锁存。如果我们持有一个锁存，那么可能就有其他进程正在等待它。而当我们去获取一个锁存时，我们自己也很可能不得不等待。


  等待锁存可能是一项代价高昂的操作。如果锁存无法立即获得，并且我们愿意等待它（大多数情况下我们确实会等待），那么在多 CPU 机器上，我们的会话将会进入“自旋”状态，在一个循环中反复尝试获取锁存。这样做的理由是上下文切换（即被踢出
  CPU 然后必须重新回到 CPU）代价很高。因此，如果进程无法立即获得锁存，我们会保持在 CPU 上并立即重试，而不是直接休眠、放弃 CPU，等到以后需要重新被调度到
  CPU 上时再尝试。我们希望锁存的持有者正在另一个 CPU 上忙于处理（并且因为锁存被设计为持有时间极短，这很有可能），并且会很快释放它。如果经过自旋并不断尝试后，我们仍然未能获得锁存，此时进程才会进入休眠，即脱离
  CPU，让其他工作得以执行。这种休眠行为通常是由于多个会话同时请求同一个锁存所致；并非单个会话长时间持有它，而是因为太多会话在同一时刻需要它，而每个会话持有它的持续时间都很短。如果你频繁地执行某些短暂（快速）的操作，其累积效应是巨大的！获取一个锁存的伪代码可能如下所示：


  ```

  Loop

  for i in 1 .. 2000

  loop

  try to get latch

  if got latch, return

  if i = 1 then misses=misses+1

  end loop

  INCREMENT WAIT COUNT

  sleep

  Add WAIT TIME

  End loop;

  ```


  其逻辑是尝试获取锁存，如果失败，则增加未命中计数（miss count），这是一个我们可以在 Statspack 报告中或通过直接查询 `V$LATCH` 视图看到的统计信息。一旦进程发生未命中，它将循环尝试一定次数（一个未公开的参数控制着尝试次数，通常设为
  2000 次），反复尝试获取锁存。如果在这期间某次尝试成功，则返回并继续处理。如果全部失败，进程将在增加该锁存的睡眠计数后，进入短暂休眠。醒来后，进程将重新开始整个过程。这意味着获取锁存的成本不仅仅是发生的“测试并设置”类型的操作，还包括我们在尝试获取锁存过程中消耗的大量
  CPU。我们的系统会显得非常繁忙（消耗大量 CPU），但实际完成的工作却不多。


  #### 衡量锁存共享资源的成本


  作为一个例子，我们将研究锁存共享池的成本。我们会对比一个编写良好的程序（使用绑定变量）和一个编写得不那么好的程序（使用字面量 SQL 或每个语句使用唯一的 SQL）。为此，我们将使用一个非常小的
  PL/SQL 程序，该程序只是登录到 Oracle 并在一个循环中执行 25,000 条不同的 `INSERT` 语句。我们将进行两组测试：第一组测试中，我们的
  PL/SQL 程序不使用绑定变量；第二组测试中则使用。


  为了评估这些程序在多用户环境中的行为，我选择使用 Statspack 来收集指标，步骤如下：


  1.  执行一次 Statspack 快照，收集系统当前状态。

  2.  运行 N 份程序副本，让每份程序 `INSERT` 到其自己的数据库表中，以避免因所有程序都尝试向单个表插入而产生的争用。

  3.  在最后一个程序副本完成后，立即再获取一次快照。


  然后，只需打印出 Statspack 报告，就能了解 N 份程序副本完成所需的时间、消耗了多少 CPU、发生了哪些主要的等待事件等等。


  注意


  为什么不使用 AWR（自动工作负载存储库）进行此分析？答案是因为每个人都能访问 Statspack，每个人都可以。它可能需要由你的 DBA 安装，但每个 Oracle
  客户都可以使用它。我希望呈现的结果是每个人都能复现的。


  这些测试是在启用了超线程的双 CPU 机器上进行的（使其看起来像是有四个 CPU）。既然有两个物理 CPU，你可能期望这里会有非常好的线性扩展性——也就是说，如果一个用户消耗一个单位的
  CPU 来处理其插入操作，那么你可能期望两个用户将需要两个单位的 CPU。你会发现，这个前提听起来合理，但很可能并不准确（具体有多不准确取决于你的编程技术，你将看到）。如果我们的处理过程不需要任何共享资源，那么这个前提是正确的，但我们的过程将使用一个共享资源，即共享池。我们需要锁存共享池来解析
  SQL 语句，并且我们需要锁存共享池，因为它是一个共享数据结构，我们不能在他人读取它时修改它，也不能在它被修改时读取它。


  注意


  我已经使用 Java、PL/SQL、Pro*C 和其他语言执行过这些测试。最终结果每次都基本相同。这个演示和讨论适用于所有语言和所有与数据库的接口。


  ##### 测试准备


  为了进行测试，我们需要一个模式（一组表）来工作。我们将使用多个用户进行测试，并且最主要的是要测量由于锁存引起的争用，这意味着我们对测量由于多个会话向同一个数据库表插入而产生的争用不感兴趣。因此，我们将为每个用户创建一个表，并将这些表命名为
  `T1` ... `T10`。例如：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> begin

  for i in 1 .. 10

  loop

  for x in (select * from user_tables where table_name = ''T''||i )

  loop

  execute immediate ''drop table '' || x.table_name;

  end loop;

  execute immediate ''create table t'' || i || '' ( x int )'';

  end loop;

  end;

  /

  PL/SQL procedure successfully completed.

  ```


  注意


  必须安装 Statspack 才能运行本节中的示例。请确保你阅读了本书“引言”中“设置环境”部分的材料。其中包含安装 Statspack 的说明。


  我们将在接下来的每次测试迭代之前运行此脚本，以重置我们的模式，并在多次运行同一测试时强制进行硬解析。在我们的测试中，将遵循以下步骤：


  1.  运行 `statspack.snap`。

  2.  立即启动 N 份我们的 PL/SQL 代码，N 的值从 1 到 10 不等，代表 1 到 10 个并发用户。

  3.  等待所有 N 份副本完成。

  4.  再次运行 `statspack.snap`。

  5.  为最后两个 Statspack ID 生成 Statspack 报告。


  以下测试运行所呈现的数字就是使用此技术收集的。



  ## 不使用绑定变量


  首先，我们的 PL/SQL 代码将不使用绑定变量，而是使用字符串拼接来插入数据：


  ```

  declare

  begin

  for i in 1 .. 25000 loop

  begin

  execute immediate

  ''insert into t'' || &1 || '' values('' || i || '')'';

  exception

  when no_data_found then null;

  end;

  end loop;

  end;

  /

  ```


  为了实现自动化，前面的代码被放置在一个名为 `nb.sql` 的文本文件中。然后，下一段 SQL 会自动生成一个 shell 脚本，用于调用前面的 PL/SQL
  以及调用 Statspack：


  ```

  define NumUsers=&1

  -- 创建用于运行并行会话的临时 shell 脚本 temp.sh

  set echo off

  set verify off

  set feedback off

  set serverout on

  spool temp.sh

  begin

  dbms_output.put_line( ''echo exec statspack.snap | sqlplus / as sysdba'' );

  for i in 1 .. &NumUsers

  loop

  dbms_output.put_line( ''sqlplus eoda/foo@PDB1 @nb.sql '' || i ||'' '' || chr(38)
  );

  end loop;

  dbms_output.put_line( ''wait'' );

  dbms_output.put_line( ''echo exec statspack.snap | sqlplus / as sysdba'' );

  end;

  /

  spool off

  ```


  生成的 shell 脚本内容包含以下内容（根据你传递给前面代码的变量数量而变化）：


  ```

  echo exec statspack.snap | sqlplus / as sysdba

  sqlplus eoda/foo@PDB1 @nb.sql 1 &

  wait

  echo exec statspack.snap | sqlplus / as sysdba

  ```


  然后，从生成该脚本的同一个 SQL*Plus 会话中执行 shell 脚本：


  ```

  host /bin/bash temp.sh

  ```


  你可以从本书的 GitHub 网站下载封装了此示例逻辑和代码的脚本（查看 `ch06` 文件夹下的 `nobinds` 子文件夹）。包含此代码的脚本名为 `nobind.sql`，执行方式如下：


  ```

  $ sqlplus eoda/foo@PDB1

  SQL> @nobind.sql 1

  ```


  我首先在单用户模式下运行了测试，只有一个会话（即单独运行，没有其他活动的数据库会话）。Statspack 报告返回了以下信息：


  ```

  Elapsed:       0.23 (mins) Av Act Sess:       0.7

  DB time:       0.16 (mins)      DB CPU:       0.16 (mins)

  Cache Sizes            Begin        End

  ~~~~~~~~~~~       ---------- ----------

  Buffer Cache:     5,920M              Std Block Size:         8K

  Shared Pool:     1,168M                  Log Buffer:     7,344K

  Load Profile             Per Second    Per Transaction    Per Exec    Per Call

  ~~~~~~~~~~~~     ------------------  ----------------- ----------- -----------

  ...

  Parses:            1,825.2           12,776.5

  Hard parses:            1,796.9           12,578.0

  ...

