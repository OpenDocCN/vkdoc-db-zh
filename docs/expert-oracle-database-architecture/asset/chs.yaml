  那么，四次 I/O 意味着什么呢？在这个案例中，它占了查询执行的 I/O 的三分之一以上，如果我们重复执行这个查询，这些开销会累积起来。每次 I/O 和每次一致性获取都需要访问缓冲区缓存，虽然从缓冲区缓存中读取数据确实比磁盘快，但缓冲区缓存获取也**并非免费，也并不完全廉价**。每次获取都需要多次获取缓冲区缓存的闩锁，而闩锁是序列化设备，会限制我们的扩展能力。我们可以通过运行如下所示的
  PL/SQL 块来衡量 I/O 减少和闩锁减少：

