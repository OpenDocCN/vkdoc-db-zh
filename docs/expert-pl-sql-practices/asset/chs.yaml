  \     LAST_NAME     FIRST_NAME   EMAIL      PHONE_NUMBER\n        114     Raphaely\
  \      Den          DRAPHEAL   515.127.4561\n        115     Khoo          Alexander\
  \    AKHOO      515.127.4562\n        116     Baida         Shelli       SBAIDA\
  \     515.127.4563\n        117     Tobias        Sigal        STOBIAS    515.127.4564\n\
  \        118     Himuro        Guy          GHIMURO    515.127.4565\n        119\
