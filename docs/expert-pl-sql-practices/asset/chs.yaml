  \ 函数产生的 I/O 相比，这微不足道。销售报告仍然比使用 PL/SQL 函数的版本快得多，并且业务逻辑已被封装。\n\n清单 9-28 演示了列消除。我已从报告中排除了\
  \ `AMOUNT_SOLD_GBP` 列，并再次捕获了统计信息。\n\n### 利用视图中的列消除\n\n```sql\nSQL> SELECT t.calendar_year\n\
