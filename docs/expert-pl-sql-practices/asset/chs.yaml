- "# 批量收集的性能与内存开销\n\n## 集合类型性能比较\n\n再回到应使用哪种集合类型的问题上，从批量收集性能来看，所有类型似乎都差不多。以下演示（`bulk_which_collection_type.sql`）对三种集合类型的运行结果几乎完全相同：\n\
  \n```sql\nSQL> set timing on\nSQL> declare\n  2    type t_va is varray(1000) of\
  \ number;\n  3    type t_nt is table of number;\n  4    type t_aa is table of number\
  \ index by pls_integer;\n  5\n  6    va t_va;\n  7    nt t_nt;\n  8    aa t_aa;\n\
  \  9  begin\n 10    for i in 1 .. 10000 loop\n 11\n 12      select rownum\n 13 \
  \     --\n 14      -- 注释掉你想测试的集合类型\n 15      --\n 16      bulk collect into va\n\
  \ 17      --bulk collect into nt\n 18      --bulk collect into aa\n 19\n 20    \
  \  from dual\n 21      connect by level <= 1000 ;\n 22    end loop;\n 23  end;\n\
  \ 24  /\n```\n\n```\nPL/SQL 过程已成功完成。\n```\n\n## 监控批量收集的开销\n\n在你急于将所有 PL/SQL 游标转换为使用批量收集操作之前，了解批量收集将对数据库会话产生的一项重要影响至关重要。如本章开头所述，数组处理是关于将数据检索到`缓冲区`中。该缓冲区必须存放在某处，而那个地方就在你会话的内存中。用\
  \ Oracle 的术语来说，你会话的内存是会话的用户全局区（UGA）。根据数据库的配置方式，会话 UGA 可能私有地保存在连接会话的进程全局区（PGA）中，也可能在系统全局区（SGA）中跨进程共享。关于\
  \ Oracle 专用服务器与共享服务器架构优缺点的讨论超出了本书范围；只需知道 PL/SQL 集合会消耗会话内存，如果你的集合很大或数据库中有大量并发会话，这很容易成为一个重要的考虑因素。\n\
  \n对于接下来的示例，将假设最常见的配置，即专用服务器连接，因此内存消耗的重点将放在 PGA 上。让我们探讨一下随着为批量收集使用越来越大的集合尺寸，内存消耗的变化情况。我还将介绍可用于`BULK\
  \ COLLECT`语句的`LIMIT`子句。\n\n![images](img/square.jpg) **注意** 接下来的示例将文本与代码交错呈现。你可以在名为`bulk_collect_memory.sql`的文件中找到完整的代码。\n\
  \n首先，我将重新连接以重置会话级别统计信息（包括 PGA 消耗）。\n\n```sql\nSQL> connect\nEnter user-name: *****\n\
  Enter password:  *****\n\nSQL> set serverout on\nSQL> declare\n  2    type t_row_list\
  \ is table of hardware.descr%type;\n  3    l_rows t_row_list;\n  4\n  5    l_pga_ceiling\
  \  number(10);\n```\n\n接下来，我将定义一个不同获取大小的数组，用于从 HARDWARE 表中检索一组行。因此，在第一次迭代中，将获取 5\
  \ 行，然后是 10 行，接着是 50 行，依此类推。\n\n```sql\n  7    type t_fetch_size is table of pls_integer;\n\
  \  8    l_fetch_sizes t_fetch_size := t_fetch_sizes(5,10,50,100,500,1000,10000,100000,1000000);\n\
  \  9\n 10    rc      sys_refcursor;\n 11  begin\n 12    select value\n 13    into\
  \   l_pga_ceiling\n 14    from   v$mystat m, v$statname s\n 15    where  s.statistic#\
  \ = m.statistic#\n 16    and    s.name = 'session pga memory max';\n 17\n 18   \
  \ dbms_output.put_line('初始 PGA: '||l_pga_ceiling);\n 19\n 20    for i in 1 .. l_fetch_sizes.count\n\
  \ 21    loop\n```\n\n对于每个获取大小，我将使用`LIMIT`子句从表中获取一组行。\n\n```sql\n 22      open rc\
  \ for select descr from hardware;\n 23      loop\n 24         fetch rc bulk collect\
  \ into l_rows limit l_fetch_sizes(i);\n 25         exit when rc%notfound;\n 26 \
  \     end loop;\n 27      close rc;\n 28\n```\n\n然后，执行获取后，我将捕获会话级别的 PGA 统计信息，以查看该获取操作是否影响了数据库服务器上会话消耗的内存。以下是执行此操作的代码：\n\
  \n```sql\n 29      select value\n 30      into   l_pga_ceiling\n 31      from  \
  \ v$mystat m, v$statname s\n 32      where  s.statistic# = m.statistic#\n 33   \
  \   and    s.name = 'session pga memory max';\n 34\n 35      dbms_output.put_line('获取大小:\
  \ '||l_fetch_sizes(i));\n 36      dbms_output.put_line('- PGA 最大值: '||l_pga_ceiling);\n\
  \ 37\n 38    end loop;\n 39\n 40  end;\n 41  /\n```\n\n```\n初始 PGA: 3175904\n获取大小:\
  \ 5\n- PGA 最大值: 3175904\n获取大小: 10\n- PGA 最大值: 3175904\n获取大小: 50\n- PGA 最大值: 3241440\n\
  获取大小: 100\n- PGA 最大值: 3306976\n获取大小: 500\n- PGA 最大值: 3306976\n获取大小: 1000\n- PGA\
  \ 最大值: 3372512\n获取大小: 10000\n- PGA 最大值: 4224480\n获取大小: 100000\n- PGA 最大值: 12482016\n\
  获取大小: 1000000\n- PGA 最大值: 95122912\n```\n\n\n`PL/SQL 过程已成功完成。`\n\n## 内存消耗与可扩展性问题\n\
  \n一旦提取的大小超过 1,000 行，PGA 消耗会从 3MB 增长到 95MB（当在单个提取调用中批量收集完整的 1,000,000 行数据集时）。如果你有数百个会话，每个会话都消耗数百兆字节的内存，这无疑会成为一个可扩展性威胁。除非你持有内存芯片公司的股票期权，否则使用过大的批量收集大小可能是个坏主意。因此，建议在不知道结果集大小（或近似大小）的情况下，永远不要在没有\
  \ `LIMIT` 子句的情况下对结果集执行 `FETCH BULK COLLECT`。\n\n## 极端情况演示\n\n极端情况下，一个失控的集合可能会耗尽服务器上的所有内存，并可能导致其崩溃。例如，下面的演示试图将十亿行数据批量收集到一个\
  \ PL/SQL 集合中；这个过程挂起了我的笔记本电脑（这就是为什么在本书的下载目录中找不到这个演示的脚本！）。\n\n```sql\nSQL> declare\n\
  \  2    type t_huge_set is table of number;\n  3    l_the_server_slaminator t_huge_set;\n\
  \  4  begin\n  5    select rownum\n  6    bulk collect into l_the_server_slaminator\n\
  \  7    from\n  8      ( select level from dual connect by level <= 1000 ),\n  9\
  \      ( select level from dual connect by level <= 1000 ),\n 10      ( select level\
  \ from dual connect by level <= 1000 );\n 11  end;\n 12  /\n```\n\n```\nERROR at\
  \ line 1:\nORA-04030: out of process memory when trying to allocate 16396 bytes\n\
  ```\n\n## 关于 `pga_aggregate_target` 参数的说明\n\n你可能会认为数据库初始化参数 `pga_aggregate_target`\
  \ 能使你的系统免受此类问题的影响。这种想法并不正确。该参数仅适用于数据库可以按需内部调整的内存分配，例如用于排序或哈希的内存。如果你为 PL/SQL 集合内存请求\
  \ 100GB 的 PGA，数据库将尝试满足该请求，无论这可能带来多大的麻烦。\n\n## 利用自动优化进行性能权衡\n\n因此，表面上看，在使用批量操作时，需要在性能和内存消耗之间取得平衡。让我们通过利用隐式游标循环中的自动批量收集优化来探讨这个问题（当\
  \ `plsql_optimize_level` 设置为 2 或更高时，这在 10g 及以后版本中是默认设置）。我将重新连接以重置会话级别统计信息，然后从 `HARDWARE`\
  \ 表中提取全部 1,000,000 行，这相当于上一个消耗了 95MB PGA 的示例的最后一次迭代。以下示例（`bulk_collect_perf_test_2.sql`）演示了使用自动批量收集优化提取\
  \ 1,000,000 行：\n\n```sql\nSQL> connect\nEnter user-name: *****\nEnter password:\
  \  *****\nSQL> alter session set plsql_optimize_level = 2;\n\nSession altered.\n\
  \nSQL> begin\n  2    for i in (\n  3      select descr d3\n  4      from   hardware\
  \ )\n  5    loop\n  6      null;\n  7    end loop;\n  8  end;\n  9  /\n```\n\n```\n\
  PL/SQL procedure successfully completed.\n\nElapsed: 00:00:01.78\n```\n\n请注意，其性能与完整批量收集示例相当。通过检查会话跟踪，可以确定自动批量收集的提取大小。以下是先前\
  \ PL/SQL 块的跟踪输出：\n\n```\nSELECT DESCR D3\nFROM   HARDWARE\n\ncall     count    \
  \   cpu    elapsed       disk      query    current        rows\n------- ------\
  \  -------- ---------- ---------- ---------- ----------  ----------\nParse     \
  \   1      0.00       0.00          0          1          0           0\nExecute\
  \      1      0.00       0.00          0          0          0           0\nFetch\
  \    10001      1.03       1.13          0      18907          0     1000000\n-------\
  \ ------  -------- ---------- ---------- ---------- ----------  ----------\ntotal\
  \    10003      1.03       1.14          0      18908          0     1000000\n```\n\
  \n通过 10,001 次提取调用获取 1,000,000 行，表明提取大小为 100 行。尽管发出了 10,000 次提取调用而不是 1 次，但性能大致相同。一旦你的提取数组大小超过数据库块中的行数，收益就会递减，因此\
  \ 100 左右的提取大小通常是最佳平衡点。与其仔细基准测试每一段代码来确定最佳批量收集大小，仅仅通过重构游标循环来利用编译器中的自动批量收集优化，其效果就已经接近最优了。\n\
  \n#### 重构代码以使用批量收集\n\n到目前为止，将代码转换为使用批量收集听起来好得令人难以置信。非常简单的代码更改（或者如果你已经在使用隐式提取游标循环，则无需更改）就能带来巨大的性能提升。然而，在重构代码时，你需要防范几个陷阱。\n\
  \n\n## 未引发异常\n\n传统的隐式游标在结果集中没有行时会引发 `no_data_found` 异常，你的应用程序可能依赖这一事实来采取补救措施。在以下示例\
  \ (`bulk_ndf_1.sql`) 中，`no_data_found` 用于指示查询谓词无效：\n\n```sql\nSQL> set serverout\
  \ on\nSQL> declare\n  2    l_descr hardware.descr%type;\n  3  begin\n  4    select\
  \ descr\n  5    into   l_descr\n  6    from   hardware\n  7    where  aisle = 0\n\
  \  8    and    item = 0;\n  9    dbms_output.put_line('Item was found');\n 10  exception\n\
  \ 11    when no_data_found then\n 12      dbms_output.put_line('Invalid item specified');\n\
  \ 13  end;\n 14  /\nInvalid item specified\n\nPL/SQL procedure successfully completed.\n\
  ```\n\n然而，当此示例转换为使用批量收集时（若不加以适当注意），代码中就会引入一个错误。请执行以下版本 (`bulk_ndf_2.sql`) 并在你自己的系统上检查结果：\n\
  \n```sql\nSQL> set serverout on\nSQL> declare\n  2    type t_descr_list is table\
  \ of hardware.descr%type;\n  3    l_descr_list t_descr_list;\n  4  begin\n  5  \
  \  select descr\n  6    bulk collect\n  7    into   l_descr_list\n  8    from  \
  \ hardware\n  9    where  aisle = 0\n 10    and    item = 0;\n 11    dbms_output.put_line('Item\
  \ was found');\n 12  exception\n 13    when no_data_found then\n 14      dbms_output.put_line('Invalid\
  \ item specified');\n 15  end;\n 16  /\nItem was found  <==== 错误！\n\nPL/SQL procedure\
  \ successfully completed.\n```\n\n该过程运行成功但返回了错误的结果！这是因为一个批量收集获取调用将 **不会** 引发 `no_data_found`\
  \ 异常。你可以将这种异常的缺失解释为 PL/SQL 声明它已成功地将可用行（本例中为零行）填充到了目标数组中。即使目标数组不包含任何数据，它也确实被初始化了。这一最终结果与目标数组完全未被初始化有细微差别。\n\
  \n以下示例 (`bulk_ndf_3.sql`) 展示了批量收集将零行返回到集合中，与完全在批量收集调用中不使用集合，这两者之间存在重要区别：\n\n```sql\n\
  SQL> set serverout on\nSQL> declare\n  2    type t_descr_list is table of hardware.descr%type;\n\
  \  3    l_descr_list t_descr_list;\n  4  begin\n  5    select descr\n  6    bulk\
  \ collect\n  7    into   l_descr_list\n  8    from   hardware\n  9    where  aisle\
  \ = 0\n 10    and    item = 0;\n 11    dbms_output.put_line(l_descr_list.count||'\
  \ rows found');\n 12  end;\n 13  /\n0 rows found\n\nPL/SQL procedure successfully\
  \ completed.\n```\n\n注释掉 `SELECT` 语句并再次执行相同的代码。批量收集永远不会运行。因此，目标数组永远不会被初始化。这种未初始化会导致错误。例如，`bulk_ndf_4.sql`\
  \ 现在会在尝试引用集合内容时崩溃。\n\n```sql\nSQL> declare\n  2    type t_descr_list is table of\
  \ hardware.descr%type;\n  3    l_descr_list t_descr_list;\n  4  begin\n  5  -- \
  \ select descr\n  6  --  bulk collect\n  7  --  into   l_descr_list\n  8  --  from\
  \   hardware\n  9  --  where  aisle = 0\n 10  --  and    item = 0;\n 11    dbms_output.put_line(l_descr_list.count||'\
  \ rows found');\n 12  end;\n 13  /\ndeclare\n*\nERROR at line 1:\nORA-06531: Reference\
  \ to uninitialized collection\nORA-06512: at line 11\n```\n\n了解到即使没有返回行，批量收集操作也会初始化目标数组，这使得你可以重构现有代码而不会有太大困难。只需检查数组中的记录数，并在集合为空时显式引发\
  \ `no_data_found` 异常，即可保持其余代码像以前一样工作。例如，以下代码 (`bulk_ndf_5.sql`) 添加了一个条件检查，当集合为空时引发\
  \ `no_data_found`：\n\n```sql\nSQL> set serverout on\nSQL> declare\n  2    type t_descr_list\
  \ is table of hardware.descr%type;\n  3    l_descr_list t_descr_list;\n  4  begin\n\
  \  5    select descr\n  6    bulk collect\n  7    into   l_descr_list\n  8    from\
  \   hardware\n  9    where  aisle = 0\n 10    and    item = 0;\n 11\n 12    if l_descr_list.count\
  \ = 0 then\n 13       raise no_data_found;\n 14    end if;\n 15\n 16    dbms_output.put_line('Item\
  \ was found');\n 17  exception\n 18    when no_data_found then\n 19      dbms_output.put_line('Invalid\
  \ item specified');\n 20  end;\n 21  /\nInvalid item specified\n\nPL/SQL procedure\
  \ successfully completed.\n```\n\n\n"
- "# 退出循环\n\n当使用传统的逐行机制在游标循环中执行提取时，结果集中没有更多行时会隐式退出。你发出一个提取调用；如果失败，就表示已完成。而当你进行批量提取时，情况会稍微复杂一些——一次提取调用可能检出足以填满数组的行，可能检出零行，也可能检出一些行但不足以完全填满数组。这导致在使用\
  \ `LIMIT` 子句时出现一个常见的程序错误。\n\n首先，这是本章前面展示的逐行代码 (`bulk_limit_exit_1.sql`)：\n\n```sql\n\
  SQL> set serverout on\nSQL> declare\n  2    cursor c_tool_list is\n  3      select\
  \ descr\n  4      from   hardware\n  5      where  aisle = 1\n  6      and    item\
  \ between 1 and 25;\n  7\n  8    l_descr hardware.descr%type;\n  9  begin\n 10 \
  \   open c_tool_list;\n 11    loop\n 12      fetch c_tool_list into l_descr;\n 13\
  \      exit when c_tool_list%notfound;\n 14      dbms_output.put_line('Fetched '||l_descr);\n\
  \ 15    end loop;\n 16    close c_tool_list;\n 17  end;\n 18  /\nFetched Description\
  \ 1\nFetched Description 2\nFetched Description 3\n[snip]\nFetched Description 23\n\
  Fetched Description 24\nFetched Description 25\n\nPL/SQL procedure successfully\
  \ completed.\n```\n\n注意，提取了 25 行并显示在屏幕上。现在代码被转换为使用 `LIMIT` 子句的批量收集，看起来是直观的方式，但结果证明是错误的方式。这是不正确的解决方案\
  \ (`bulk_limit_exit_2.sql`) 及其输出：\n\n```sql\nSQL> set serverout on\nSQL> declare\n\
  \  2    cursor c_tool_list is\n  3      select descr\n  4      from   hardware\n\
  \  5      where  aisle = 1\n  6      and    item between 1 and 25;\n  7\n  8   \
  \ type t_descr_list is table of c_tool_list%rowtype;\n  9    l_descr_list t_descr_list;\n\
  \ 10\n 11  begin\n 12    open c_tool_list;\n 13    loop\n 14      fetch c_tool_list\n\
  \ 15      bulk collect into l_descr_list limit 10;\n 16      exit when c_tool_list%notfound;\n\
  \ 17\n 18      for i in 1 .. l_descr_list.count loop\n 19        dbms_output.put_line('Fetched\
  \ '||l_descr_list(i).descr);\n 20      end loop;\n 21    end loop;\n 22\n 23   \
  \ close c_tool_list;\n 24  end;\n 25  /\nFetched Description 1\nFetched Description\
  \ 2\nFetched Description 3\n[snip]\nFetched Description 18\nFetched Description\
  \ 19\nFetched Description 20\n\nPL/SQL procedure successfully completed.\n```\n\n\
  注意，游标循环过早退出了：应该输出 25 行（与逐行示例完全相同），但代码在输出 20 行后就停止了。问题出在第 16 行：`exit when c_tool_list%notfound`。`LIMIT`\
  \ 子句指定了每次提取调用获取 10 行。在第三次循环时，只剩下 5 行可供提取。因为所有行都已被提取，`%NOTFOUND` 属性变为真，循环在 `没有` 处理数组中剩余\
  \ 5 行的情况下退出。\n\n解决方案很简单：要么将游标属性的检查推迟到处理完提取数组中找到的任何行之后，要么将退出条件改为 `<array>.count =\
  \ 0`（这也意味着需要额外遍历一次提取循环）。\n\n以下是第一种解决方案的示例，代码将游标属性的检查推迟到处理完数组中的任何行之后 (`bulk_limit_exit_3.sql`)：\n\
  \n```sql\nSQL> set serverout on\nSQL> declare\n  2    cursor c_tool_list is\n  3\
  \      select descr\n  4      from   hardware\n  5      where  aisle = 1\n  6  \
  \    and    item between 1 and 25;\n  7\n  8    type t_descr_list is table of c_tool_list%rowtype;\n\
  \  9    l_descr_list t_descr_list;\n 10\n 11  begin\n 12    open c_tool_list;\n\
  \ 13    loop\n 14      fetch c_tool_list\n 15      bulk collect into l_descr_list\
  \ limit 10;\n 16\n```\n注意，因为有可能没有提取到行，所以不能对数组中是否存在行做任何假设。所有处理都必须考虑到这一事实，并且必须遵守数组的\
  \ `count` 属性的值，否则可能会因非法引用数组索引而出现错误。在以下代码中，使用 `l_descr_list.count` 确保如果数组中没有条目，甚至不会进入循环：\n\
  \n```sql\n 17      for i in 1 .. l_descr_list.count loop\n 18        dbms_output.put_line('Fetched\
  \ '||l_descr_list(i).descr);\n 19      end loop;\n 20      exit when c_tool_list%notfound;\n\
  \ 21    end loop;\n 22\n 23    close c_tool_list;\n 24  end;\n 25  /\nFetched Description\
  \ 1\nFetched Description 2\nFetched Description 3\n[snip]\nFetched Description 23\n\
  Fetched Description 24\nFetched Description 25\n\nPL/SQL procedure successfully\
  \ completed.\n```\n\n## 过度批量处理\n\n这种情况虽然罕见，但有时批量处理（bulking up）*并非*从数据库检索数据的合适方式。回到五金店的比喻，假设我口袋里只有几美元就开车去商店。我的购买能力会受限于现金，只有几美元显然买不了多少东西。如果我盲目遵循“一定要推购物车（即批量收集）”的建议，直到结账才停止，结果会怎样？\n\
  \n*   我需要先花时间在商店入口取一辆购物车。\n*   我的购物车只装了几件商品，我就不得不停止——因为我超出了消费限额。\n*   我为商品付款。\n\
  *   我需要花更多时间将商品从购物车卸到袋子里，然后把购物车还回商店入口。\n\n在数据库术语中也是一样。如果你事先知道某些情况下可能不会处理获取到的整批数据，那么费力去获取它们实际上可能会损害而非提升性能。一个非常常见的原因是处理结果集时可能需要提前退出。考虑以下示例（`bulk_early_exit_1.sql`）。首先，我定义一个游标，从`HARDWARE`表中获取一些行，如下所示：\n\
  \n```\nSQL> set timing on\nSQL> declare\n  2    cursor c_might_exit_early is\n \
  \ 3      select aisle, item\n  4      from   hardware\n  5      where  item between\
  \ 400000 and 400050\n  6        or   descr like '%10000%';\n  7  begin\n```\n\n\
  根据`HARDWARE`表中的数据，这个游标将返回 72 行。这里使用了隐式获取（fetch）结构，以自动获取批量收集的抓取大小，即 100 行。但是，这个游标被命名为`c_might_exit_early`是有原因的。\n\
  \n```\n  8    for i in c_might_exit_early\n  9    loop\n 10      `if c_might_exit_early%rowcount\
  \ = 40 then`\n 11         `exit;`\n 12      `end if;`\n```\n\n一旦获取了 40 行，游标循环就会退出。当然，可以在定义游标的\
  \ SQL 中添加`rownum <= 40`的谓词，但在现实世界场景中，条件可能更复杂。例如，每获取一行，都可能将其传递给一个网络服务，该服务可能返回一个标志，指示不应再发送更多行。这里的关键是，游标循环存在提前退出的可能性，而这个退出条件不容易整合回游标\
  \ SQL 语句中。\n\n```\n 13    end loop;\n 14  end;\n 15  /\n```\n\n```\nPL/SQL procedure\
  \ successfully completed.\n\nElapsed: 00:00:00.38\n```\n\n这个例程运行得相当快，但 0.38 秒对于仅处理\
  \ 40 行来说显得有些迟缓，这归因于自动批量收集。代码实际上执行了检索全部 72 行的工作，因为第一次获取调用试图检索 100 行。PL/SQL 编译器并不知道游标处理可能会提前结束。一个会话跟踪证实所有\
  \ 72 行都被检索了。\n\n```\nSELECT AISLE, ITEM\nFROM\n HARDWARE WHERE ITEM BETWEEN 400000\
  \ AND 400050 OR DESCR LIKE '%10000%'\n\ncall     count       cpu    elapsed    \
  \   disk      query    current        rows\n------- ------  -------- ----------\
  \ ---------- ---------- ----------  ----------\nParse        1      0.00       0.00\
  \          0          0          0           0\nExecute      1      0.00       0.00\
  \          0          0          0           0\nFetch        1      0.17       0.17\
  \          0      10100          0          72\n------- ------  -------- ----------\
  \ ---------- ---------- ----------  ----------\ntotal        3      0.17       0.17\
  \          0      10100          0          72\n```\n\n识别这类情况并相应编码是开发者的责任；PL/SQL\
  \ 编译器并不能未卜先知。在上面的例子中，事实证明根本不使用批量收集效率更高。例如（`bulk_early_exit_2.sql`）是使用更传统的逐行方法编写的相同例程。\n\
  \n```\nSQL> set timing on\nSQL> declare\n  2    cursor c_might_exit_early is\n \
  \ 3      select aisle, item\n  4      from   hardware\n  5      where  item between\
  \ 400000 and 400050\n  6        or   descr like '%10000%';\n  7    l_row c_might_exit_early%rowtype;\n\
  \  8  begin\n  9    open c_might_exit_early;\n 10    loop\n 11      fetch c_might_exit_early\n\
  \ 12      into l_row;\n 13      exit when c_might_exit_early%notfound;\n 14\n 15\
  \      if c_might_exit_early%rowcount = 40 then\n 16         exit;\n 17      end\
  \ if;\n 18\n 19    end loop;\n 20    close c_might_exit_early;\n 21  end;\n 22 \
  \ /\n```\n\n```\nPL/SQL procedure successfully completed.\n\nElapsed: 00:00:00.17\n\
  ```\n\n即使有 40 次单独获取调用的开销，性能也提升了一倍。原因在于本例中的 SQL 被设计成最后几行很难找到；也就是说，它们很可能位于表的高水位标记附近。因此，虽然这是一个稍微有些人工的例子，但它确实表明你不能简单地假设批量收集总会带来好处。对于这个特定的例子，精明的开发者会意识到，通过一些额外的编码，你可以通过明确指定获取大小，而不是交给\
  \ PL/SQL 编译器，来兼顾两者的优点。\n\n下面的例子来自`bulk_early_exit_3.sql`；它明确指定了一个获取大小，作为逐行获取和 100\
  \ 行自动批量收集获取大小之间的折中方案：\n\n```\nSQL> set timing on\nSQL> declare\n  2    cursor c_might_exit_early\
  \ is\n  3      select aisle, item\n  4      from   hardware\n  5      where  item\
  \ between 400000 and 400050\n  6        or   descr like '%10000%';\n  7    type\
  \ t_rows is table of c_might_exit_early%rowtype;\n  8    l_rows t_rows;\n  9\n 10\
  \    l_row_cnt pls_integer := 0;\n 11\n 12  begin\n 13    open c_might_exit_early;\n\
  \ 14    <<cursor_loop>>\n 15    loop\n 16      fetch c_might_exit_early\n```\n\n\
  显然，对于这个演示，我们知道处理会在 40 行后停止，因此 40 的获取大小是最优的。然而，我选择了 20 的获取大小来反映一个现实世界的场景，即无法精确知道处理何时会提前终止，因此开发者会在“从每次获取调用中获得良好价值”和“不获取可能最终不需要的过多行”之间寻求一个折中方案。\n\
  \n```\n 17      bulk collect into l_rows `limit 20;`\n 18\n 19      for i in 1 ..\
  \ l_rows.count\n 20      loop\n 21         l_row_cnt := l_row_cnt + 1;\n 22    \
  \     if l_row_cnt = 40 then\n 23            exit cursor_loop;\n 24         end\
  \ if;\n 25      end loop;\n 26\n 27      exit when c_might_exit_early%notfound;\n\
  \ 28    end loop;\n 29    close c_might_exit_early;\n 30  end;\n 31  /\n```\n\n\
  ```\nPL/SQL procedure successfully completed.\n\nElapsed: 00:00:00.09\n```\n\n对于这个例子，仅仅通过在代码中加入一些我自己的智慧，而不是依赖\
  \ PL/SQL 编译器的智慧，周转时间就从 0.38 秒减少到了 0.09 秒。\n\n\n### 批量绑定\n\n使用`BULK COLLECT`批量获取数据，完成了优化\
  \ PL/SQL 与数据库交互的一半图景。另一半则是尽可能高效地处理从 PL/SQL 发送到数据库表的数据。每当 PL/SQL 程序需要向数据库插入、更新或删除数据时，在大多数情况下，最好通过单次数据库访问来完成。对于某些应用需求（例如，更新已知主键的属性），修改将只针对单行。然而，当需要操作数据库中的多行时，PL/SQL\
  \ 仍然可以在单次访问中完成该工作。这被称为“批量绑定”，与批量收集一样，都是从逐行处理转向集合处理（通过 PL/SQL 集合）。\n\n![images](img/square.jpg)\
  \ **注意** 我的妻子慷慨地提出扩展这个比喻：“批量绑定是不是指这一章中你把所有不需要且本不该买的垃圾带回五金店的部分？”如果这有助于你理解批量绑定，那就这样吧。\n\
  \n一个常见的误解是，如果应用需求是修改单行，那么批量绑定就一定不合适。然而，编写高效 PL/SQL 的艺术部分就在于能够识别出看似单行处理的过程可能并非如此。例如，考虑一个显示员工表格列表的网页，操作员可以在其中更新每位员工的详细信息。虽然从操作员的角度来看，每位员工的更新是独立于其他所有人的，但这并不能成为将其实现为一系列单行更新\
  \ SQL 语句的理由（无论是直接调用还是在 PL/SQL 块中调用）。\n\n变更后的记录集可以存储在一个数组中，并通过单次调用传递给 PL/SQL 程序，然后执行适当的批量绑定。请始终留意应用程序中可能受益于此方法的部分。\n\
  \n#### 批量绑定入门\n\n与批量收集类似，将现有的常规 DML 代码转换为其等效的批量绑定 DML 是简单而直接的。在常规 DML 中，通常会有一个填充了值的变量，该变量在\
  \ DML 语句中使用。以下示例 (`bulk_bind_1.sql`) 展示了一个简单的插入，其中 PL/SQL 变量通过`FOR`循环重复 100 次：\n\
  \n```sql\nSQL> declare\n  2    l_row hardware%rowtype;\n  3  begin\n  4    for i\
  \ in 1 .. 100 loop\n  5      l_row.aisle := 1;\n  6      l_row.item  := i;\n  7\
  \      insert into hardware values l_row;\n  8    end loop;\n  9  end;\n 10  /\n\
  \nPL/SQL procedure successfully completed.\n```\n\n在批量绑定 DML 中，仍然有一个填充了值的变量，但该变量现在是一个数组，并且\
  \ DML 操作被延迟到数组被填满用于批量绑定的值之后才执行。`FORALL`关键字表明这是一个批量绑定 DML。例如 (`bulk_bind_2.sql`)\
  \ 等效于上面逐行插入的示例，但它通过一次调用插入 100 行，而不是 100 次调用：\n\n```sql\nSQL> declare\n  2    type\
  \ t_row_list is table of hardware%rowtype;\n  3    l_row t_row_list := t_row_list();\n\
  \  4  begin\n  5    for i in 1 .. 100 loop\n  6      l_row.extend;\n  7      l_row(i).aisle\
  \ := 1;\n  8      l_row(i).item  := i;\n  9    end loop;\n 10\n 11    forall i in\
  \ 1 .. 100\n 12      insert into hardware values l_row(i);\n 13  end;\n 14  /\n\n\
  PL/SQL procedure successfully completed.\n```\n\n![images](img/square.jpg) **注意**\
  \ 尽管`FORALL`看起来暗示某种循环处理，但它实际上是对数据库执行 DML 的单次调用。这可以通过会话级别的跟踪轻松确认。\n\n```sql\nINSERT\
  \ INTO HARDWARE\nVALUES  (:B1 ,:B2 ,:B3 ,:B4 )\n\ncall     count       cpu    elapsed\
  \       disk      query    current        rows\n------- ------  -------- ----------\
  \ ---------- ---------- ----------  ----------\nParse        1      0.00       0.00\
  \          0          0          0           0\nExecute      1      0.00       0.00\
  \          0          1          6         100\nFetch        0      0.00       0.00\
  \          0          0          0           0\n------- ------  -------- ----------\
  \ ---------- ---------- ----------  ----------\ntotal        2      0.00       0.00\
  \          0          1          6         100\n```\n\n\n\n## 测量批量绑定性能\n\n与批量收集一样，使用批量绑定的动机是为了提升性能，这可以通过简单的基准测试来量化。我将从一个简单的\
  \ PL/SQL 程序开始，该程序通过逐行插入的方式向表中插入大量行。以下示例 (`bulk_insert_conventional.sql`) 逐行向 `HARDWARE`\
  \ 表添加了 100,000 行数据：\n\n```\nSQL> set timing on\nSQL> declare\n  2    l_now date\
  \ := sysdate;\n  3  begin\n  4   for i in 1 .. 100000 loop\n  5     insert into\
  \ HARDWARE\n  6     values (i/1000, i, to_char(i), l_now);\n  7   end loop;\n  8\
  \  end;\n  9  /\n\nPL/SQL procedure successfully completed.\n\nElapsed: 00:00:04.52\n\
  ```\n\n在转向批量绑定版本之前，值得注意的是，即使是一行一行地插入，Oracle 的插入性能也相当出色。但数据库可以做得更好。让我们看看批量绑定版本 (`bulk_insert_bind.sql`)，它通过一次调用插入那\
  \ 100,000 行数据。\n\n```\nSQL> set timing on\nSQL> declare\n  2    l_now date := sysdate;\n\
  \  3\n  4    type t_rows is table of hardware%rowtype;\n  5\n  6    l_rows t_rows\
  \ := t_rows();\n  7  begin\n  8   l_rows.extend(100000);\n  9   for i in 1 .. 100000\
  \ loop\n 10     l_rows(i).aisle := i/1000;\n 11     l_rows(i).item := i;\n 12  \
  \   l_rows(i).descr := to_char(i);\n 13     l_rows(i).stocked := l_now;\n 14   end\
  \ loop;\n 15\n 16   forall i in 1 .. 100000\n 17     insert into hardware values\
  \ l_rows(i);\n 18\n 19  end;\n 20  /\n\nPL/SQL procedure successfully completed.\n\
  \nElapsed: 00:00:00.31\n```\n\n从 4.52 秒降到了仅仅 0.31 秒！就像批量收集一样，将代码迁移到批量绑定方法来处理数据集合，能带来显著的性能提升。但这里还有其他一些不那么明显的好处。每次开始一个新的\
  \ DML 语句时，数据库都必须分配撤销结构，以确保在需要时（无论是由于错误还是显式请求）可以回滚该 DML 语句。使用批量绑定会减少 DML 调用次数，这意味着对撤销基础设施的压力更小。以下示例\
  \ (`bulk_bind_undo.sql`) 检查了会话级别的统计信息，以比较使用逐行插入与批量绑定插入时所需的撤销量：\n\n```\nSQL> set\
  \ serverout on\nSQL> declare\n  2    type t_row_list is table of hardware.descr%type\n\
  \  3       index by pls_integer;\n  4    l_rows t_row_list;\n  5\n  6    l_stat1\
  \ int;\n  7    l_stat2 int;\n  8    l_stat3 int;\n  9\n 10  begin\n 11    select\
  \ value\n 12    into   l_stat1\n 13    from   v$mystat m, v$statname s\n 14    where\
  \  s.statistic# = m.statistic#\n 15    and    s.name = 'undo change vector size';\n\
  \ 16\n 17    for i in 1 .. 1000 loop\n 18       l_rows(i) := rpad('x',50);\n 19\
  \       insert into hardware ( descr )  values ( l_rows(i) );\n 20    end loop;\n\
  \ 21\n 22    select value\n 23    into   l_stat2\n 24    from   v$mystat m, v$statname\
  \ s\n 25    where  s.statistic# = m.statistic#\n 26    and    s.name = 'undo change\
  \ vector size';\n 27\n 28    forall i in 1 .. l_rows.count\n 29       insert into\
  \ hardware ( descr )  values ( l_rows(i) );\n 30\n 31    select value\n 32    into\
  \   l_stat3\n 33    from   v$mystat m, v$statname s\n 34    where  s.statistic#\
  \ = m.statistic#\n 35    and    s.name = 'undo change vector size';\n 36\n 37  \
  \  dbms_output.put_line('Row at a time: '||(l_stat2-l_stat1));\n 38    dbms_output.put_line('Bulk\
  \ bind:     '||(l_stat3-l_stat2));\n 39\n 40  end;\n 41  /\nRow at a time: 64556\n\
  Bulk bind:     3296\n\nPL/SQL procedure successfully completed.\n```\n\n因此，批量绑定产生的撤销量少得多。类似地，这些撤销结构需要由重做日志条目保护，以使数据库实例可恢复。如果重复前面的示例，但收集的是\
  \ `redo size` 统计信息而非 `undo change vector size` (`bulk_bind_redo.sql`)，输出也显示重做量有所减少。\n\
  \n```\nRow at a time: 295448\nBulk bind:     69552\n\nPL/SQL procedure successfully\
  \ completed.\n```\n\n![images](img/square.jpg) **提示** 在制作用于基准测试的示例时，你需要确保隔离你的代码，以纯粹检查当前测试。当我最初执行上述基准测试时，我为正在处理的\
  \ 100,000 行中的每一行都显式引用了 `sysdate`，即：\n\n```\nfor i in 1 .. 100000 loop\n  insert\
  \ into DEMO values (i, sysdate, to_char(i));\nend loop;\n\nfor i in 1 .. 100000\
  \ loop\n   l_rows(i).x := i;\n   l_rows(i).y := sysdate;\n   l_rows(i).z := to_char(i);\n\
  ```\n\n![images](img/square.jpg) **注意** 两个测试运行得都非常慢，而且批量绑定测试的结果并没有像我预期的那样，以数量级优势超越单行测试。更仔细的实验表明，事实上，对\
  \ `sysdate` 的 100,000 次调用是测试中的主导因素。实际上，如果我在更早版本的 Oracle 上执行该测试（其中对 ‘sysdate’ 的引用会静默地发出\
  \ ‘select sysdate from dual’ 语句），那么测试结果可能表明批量绑定毫无益处。在得出结论之前，请务必仔细检查你的测试。\n\n\n\n\
  \n#### 监控内存使用\n\n与批量收集类似，如果你有大量行需要进行批量绑定，这并不一定意味着你应该在将它们传递给数据库之前，将它们全部预存储在数组中。随着绑定行数的增加，性能收益会递减，同时\
  \ PGA 内存的成本也在不断增加。你可以分批进行批量绑定，以确保不会耗尽会话内存。下面是一个示例（`bulk_bind_pga.sql`），它与批量收集内存演示类似，展示了随着批量绑定大小的增加，PGA\
  \ 消耗的情况：\n\n```\nSQL> set serverout on\nSQL> declare\n  2    type t_row_list is\
  \ table of hardware.descr%type;\n  3    l_rows t_row_list;\n  4\n  5    l_start_of_run\
  \ timestamp;\n  6\n  7    l_pga_ceiling  number(10);\n  8\n  9    type t_bulk_sizes\
  \ is table of pls_integer;\n 10    l_bulk_sizes t_bulk_sizes := t_bulk_sizes(10,100,1000,10000,100000,1000000);\n\
  \ 11\n 12    tot_rows pls_integer := 10000000;\n 13\n 14  begin\n 15    select value\n\
  \ 16    into   l_pga_ceiling\n 17    from   v$mystat m, v$statname s\n 18    where\
  \  s.statistic# = m.statistic#\n 19    and    s.name = 'session pga memory max';\n\
  \ 20\n 21    dbms_output.put_line('Initial PGA: '||l_pga_ceiling);\n 22\n 23   \
  \ for i in 1 .. l_bulk_sizes.count\n 24    loop\n 25\n 26      execute immediate\
  \ 'truncate table hardware';\n 27\n 28      l_start_of_run := systimestamp;\n 29\n\
  \ 30      l_rows := t_row_list();\n 31      l_rows.extend(l_bulk_sizes(i));\n 32\
  \      for j in 1 .. l_bulk_sizes(i)\n 33      loop\n 34         l_rows(j) := rpad('x',50);\n\
  \ 35      end loop;\n 36\n 37      for iter in 1 .. tot_rows / l_bulk_sizes(i) loop\n\
  \ 38        forall j in 1 .. l_bulk_sizes(i)\n 39          insert into hardware\
  \ ( descr )  values (l_rows(j));\n 40      end loop;\n 41\n 42      select value\n\
  \ 43      into   l_pga_ceiling\n 44      from   v$mystat m, v$statname s\n 45  \
  \    where  s.statistic# = m.statistic#\n 46      and    s.name = 'session pga memory\
  \ max';\n 47\n 48      dbms_output.put_line('Bulk size: '||l_bulk_sizes(i));\n 49\
  \      dbms_output.put_line('- Elapsed: '||( systimestamp - l_start_of_run));\n\
  \ 50      dbms_output.put_line('- PGA Max: '||l_pga_ceiling);\n 51\n 52    end loop;\n\
  \ 53\n 54  end;\n 55  /\nInitial PGA: 3470120\nBulk size: 10\n- Elapsed: +000000000\
  \ 00:00:53.478000000\n- PGA Max: 4042888\nBulk size: 100\n- Elapsed: +000000000\
  \ 00:00:14.760000000\n- PGA Max: 4042888\nBulk size: 1000\n- Elapsed: +000000000\
  \ 00:00:10.588000000\n- PGA Max: 4042888\nBulk size: 10000\n- Elapsed: +000000000\
  \ 00:00:11.872000000\n- PGA Max: 4108424\nBulk size: 100000\n- Elapsed: +000000000\
  \ 00:00:16.431000000\n- PGA Max: 12890248\nBulk size: 1000000\n- Elapsed: +000000000\
  \ 00:00:17.507000000\n- PGA Max: 99266696\n\nPL/SQL procedure successfully completed.\n\
  ```\n\n与批量收集类似，一旦每个数组绑定的行数超过 1000 行，其好处就微不足道了。如果你的应用程序由成百上千个会话组成，并且每个会话都在服务器上消耗大量内存，那么内存消耗的增加肯定会对可扩展性构成威胁。在这个例子中，当批量绑定大小超过\
  \ 1000 时，性能实际上变得更差了。\n\n#### 11g 中的改进\n\n本章中的示例代码是针对 11 版本的数据库编写的。如果你在更早的版本上运行批量绑定示例，可能会看到如下错误：\n\
  \n```\nSQL> create table DEMO ( x int, y int);\n\nTable created.\n\nSQL> declare\n\
  \  2    type t_rows is\n  3      table of demo%rowtype\n  4      index by pls_integer;\n\
  \  5    l_rows t_rows;\n  6  begin\n  7    l_rows(1).x := 1;\n  8    l_rows(1).y\
  \ := 1;\n  9\n 10    l_rows(2).x := 2;\n 11    l_rows(2).y := 2;\n 12\n 13    forall\
  \ i in 1 .. l_rows.count\n 14       insert into DEMO\n 15       values ( l_rows(i).x,\
  \ l_rows(i).y );\n 16  end;\n 17  /\n\nPL/SQL procedure successfully completed.\n\
  \n values ( l_rows(i).x, l_rows(i).y );\n              *\nERROR at line 15:\nPLS-00436:\
  \ implementation restriction: cannot reference\n              fields of BULK In-BIND\
  \ table of records\n```\n\n在 Oracle 11g 之前的版本中，批量绑定操作无法访问关联数组内记录或对象类型的单个元素。然而，并非无计可施——只是需要多写一点代码。你仍然可以对简单数据类型的数组进行批量绑定，因此可以为需要批量绑定的*每个*属性使用一个关联数组。前面的例子可以改写成一个适用于早期\
  \ Oracle 版本的版本。\n\n```\nSQL>  declare\n  2    type t_x_list is table of demo.x%type\n\
  \  3      index by pls_integer;\n  4\n  5    type t_y_list is table of demo.y%type\n\
  \  6      index by pls_integer;\n  7\n  8    l_x_rows t_x_list;\n  9    l_y_rows\
  \ t_y_list;\n 10  begin\n 11    l_x_rows(1) := 1;\n 12    l_x_rows(2) := 2;\n 13\n\
  \ 14    l_y_rows(1) := 1;\n 15    l_y_rows(2) := 2;\n 16\n 17    forall i in 1 ..\
  \ l_x_rows.count\n 18       insert into DEMO\n 19       values ( l_x_rows(i), l_y_rows(i)\
  \ );\n 20  end;\n 21  /\n\nPL/SQL procedure successfully completed.\n```\n\n![images](img/square.jpg)\
  \ 提示：关于在早期 Oracle 版本上规避此限制的其他技术，请参见 `www.oracle-developer.net/display.php?id=410`\n\
  \n\n\n\n"
- "# 使用批量绑定时的错误处理\n\n使用批量绑定能带来巨大的好处。但在一个需要格外注意的方面是错误处理。在逐行修改行的开发模型中，当某条 SQL 语句执行失败时，有问题的行是隐含的——它就是你正在处理的那一行。\n\
  \n## 逐行处理 vs. 批量错误的模糊性\n\n例如，在下面这个包含两条 `insert` 语句的简单 PL/SQL 块 (`bulk_error_1.sql`)\
  \ 中，很容易看出是哪条 `insert` 语句出了问题：\n\n```sql\nSQL> alter table hardware\n  2    add constraint\n\
  \  3    hardware_chk check ( item > 0 );\n\nTable altered.\n\nSQL> begin\n  2  \
  \  insert into hardware ( item )  values (1);\n  3    insert into hardware ( item\
  \ ) values (-1);\n  4    insert into hardware ( item ) values (2);\n  5    insert\
  \ into hardware ( item ) values (3);\n  6    insert into hardware ( item ) values\
  \ (4);\n  7    insert into hardware ( item ) values (-2);\n  8  end;\n  9  /\nbegin\n\
  *\nERROR at line 1:\nORA-02290: check constraint (MCDONAC.HARDWARE_CHK) violated\n\
  ORA-06512: at line 3\n```\n\n当你转向以批量方式修改行时，情况会变得稍微复杂一些，因此需要更加谨慎。单个 `FORALL` 语句可能涉及处理数百行数据。当将前面的例子用批量模式重复时\
  \ (`bulk_error_2.sql`)，就无法立即看出是哪一行导致了错误。\n\n```sql\nSQL> declare\n  2    type t_list\
  \ is table of hardware.item%type;\n  3    l_rows t_list := t_list(1,-1,2,3,4,-2);\n\
  \  4  begin\n  5    forall i in 1 .. l_rows.count\n  6      insert into hardware\
  \ ( item ) values (l_rows(i));\n  7  end;\n  8  /\ndeclare\n*\nERROR at line 1:\n\
  ORA-02290: check constraint (MCDONAC.HARDWARE_CHK) violated\nORA-06512: at line\
  \ 5\n```\n\n与正常的语句级操作一样，默认行为是回滚整个批量绑定操作。因此，即使数组中的一行数据是有效的，目标表中也不会有任何行存在。\n\n```sql\n\
  SQL> select count(*) from HARDWARE;\n\nno rows selected.\n```\n\n## PL/SQL 中的隐式回滚行为\n\
  \n请注意，更改的回滚本身并不是批量绑定的属性；它是 PL/SQL 事务管理的一个标准部分。关于 PL/SQL 的一个常见误解是，它只是一系列独立 SQL 语句的包装器。因此，在第一个例子中，当第二条\
  \ `insert` 语句失败时，\n\n```sql\nbegin\n  insert into DEMO values (1);\n  insert into\
  \ DEMO values (-1);\nend;\n```\n\n开发者会感到有必要采取补救措施来撤销第一条 `insert`。在 PL/SQL 模块中，经常可以看到类似下面这样的异常处理代码：\n\
  \n```sql\nbegin\n  insert into DEMO values (1);\n  insert into DEMO values (-1);\n\
  exception\n  when others then\n    rollback;\n    raise;\nend;\n```\n\n**没有要求执行这样的回滚**。此外，这种回滚通常会导致应用程序中的数据损坏。PL/SQL\
  \ 块会隐式创建一个保存点。因此，无论错误发生在 PL/SQL 块中的哪个位置，块中的所有更改都会自动回滚到一个点，就好像这个 PL/SQL 例程从未被调用过一样。这种行为是\
  \ PL/SQL 真正强大的特性之一。很少有其他语言能让事务管理变得如此简单。\n\n## 使用 `SAVE EXCEPTIONS` 子句\n\n现在回到批量绑定的例子，通过简单的代码检查可以看出是值为\
  \ -1 的第二个数组条目导致了问题。然而，这是因为这个例子非常简单。错误信息本身并没有揭示是哪个数组条目引起的——只说明有一个或多个条目违反了约束。\n\n\
  在 Oracle 9 中，通过扩展批量绑定语法来添加 `SAVE EXCEPTIONS` 子句解决了这个问题。错误仍然会发生，但会提供额外的信息，以便诊断出哪些数组条目出错。让我们如下修改示例\
  \ (`bulk_error_3.sql`) 来演示如何使用 `SAVE EXCEPTIONS`：\n\n```sql\nSQL> declare\n  2 \
  \   type t_list is table of hardware.item%type;\n  3    l_rows t_list := t_list(1,-1,2,3,4,-2);\n\
  \  4  begin\n  5    forall i in 1 .. l_rows.count save exceptions\n  6      insert\
  \ into hardware ( item ) values (l_rows(i));\n  7  end;\n  8  /\nERROR:\nORA-24381:\
  \ error(s) in array DML\nORA-06512: at line 5\n```\n\n乍一看，似乎没取得什么进展，但这个例子表明，现在抛出的是一个新的异常\
  \ (`ORA-24381`)，而不是之前的约束违反错误 (`ORA-02290`)。通过处理这个特定的批量绑定异常，我可以访问一些特殊的属性，从而深入探究错误原因。\n\
  \n## 访问错误集合\n\n例如，下面的代码 (`bulk_error_4.sql`) 在异常处理器中引入了更多代码，以揭示错误的真正原因：\n\n```sql\n\
  SQL> set serverout on\nSQL> declare\n  2    type t_list is table of hardware.item%type;\n\
  \  3    l_rows t_list := t_list(1,-1,2,3,4,-2);\n  4\n  5    bulk_bind_error exception;\n\
  \  6    pragma exception_init(bulk_bind_error,-24381);\n  7\n  8  begin\n  9   \
  \ forall i in 1 .. l_rows.count save exceptions\n 10      insert into hardware (\
  \ item ) values (l_rows(i));\n 11\n 12  exception\n 13    when bulk_bind_error then\n\
  \ 14      dbms_output.put_line(\n 15          'There were '||sql%bulk_exceptions.count||'\
  \ errors in total');\n 16      for i in 1 .. sql%bulk_exceptions.count loop\n 17\
  \         dbms_output.put_line(\n 18            'Error '||i||' occurred at array\
  \ index:'||\n 19             sql%bulk_exceptions(i).error_index);\n 20         dbms_output.put_line('-\
  \ error code:'||\n 21             sql%bulk_exceptions(i).error_code);\n 22     \
  \    dbms_output.put_line('- error text:'||\n 23             sqlerrm(-sql%bulk_exceptions(i).error_code));\n\
  \ 24      end loop;\n 25\n 26  end;\n 27  /\nThere were 2 errors in total\nError\
  \ 1 occurred at array index:2\n- error code:2290\n- error text:ORA-02290: check\
  \ constraint (.) violated\nError 2 occurred at array index:6\n- error code:2290\n\
  - error text:ORA-02290: check constraint (.) violated\n\nPL/SQL procedure successfully\
  \ completed.\n```\n\n当在 `FORALL` 中使用 `SAVE EXCEPTIONS` 语法时，任何错误都会在一个名为 `SQL%BULK_EXCEPTIONS`\
  \ 的新集合中可用，该集合为每个错误包含一行。该新集合中的每一行包含以下内容：\n\n*   `error_index:` 在 `FORALL` 中使用的集合的索引\n\
  *   `error_code:` Oracle 错误代码；请注意错误代码是正数（与 PL/SQL 中的 `SQLCODE` 内置函数不同）。\n\n> **提示**\
  \ 注意 Oracle 文档的旧版本。一些代码示例将 `SQL%BULK_EXCEPTIONS` 的引用直接内联在代码中，紧接在 `FORALL` 语句下面，这暗示着不会引发异常。如前一个演示所示，你必须在异常处理代码部分编写对\
  \ `SQL%BULK_EXCEPTIONS` 集合的引用。\n\n此外，由于 `SQL%BULK_EXCEPTIONS` 属性是一个集合，可以捕获和处理多个错误。在前面的例子中，因为异常处理器没有将错误重新抛回调用环境，所以成功插入的行仍然保留在表中。\n\
  \n```sql\nSQL> select item from HARDWARE;\n\n         X\n----------\n         1\n\
  \         2\n         3\n         4\n```\n\n\n\n#### 使用批处理保存异常\n\n如前所述，当批量绑定大量行时，你将以较小的块来处理这些行，以避免消耗过多的会话\
  \ PGA 内存。但是，如果你是分批进行批量绑定，那么每个 `FORALL` 调用都会重新初始化 `SQL%BULK_EXCEPTIONS` 结构。因此，在这种情况下，该结构无法在一系列批量绑定调用中容纳整个被拒绝的行集。一种可能的解决方法是捕获每次批量绑定调用中的任何错误，将它们保存到表中，然后处理下一个\
  \ 1000 行的批次。下面展示了这种方法的一个示例 (`bulk_error_5.sql`)：\n\n```sql\nSQL> create table ERRS\n\
  \  2    ( error_index   number(6),\n  3      error_code    number(6),\n  4     \
  \ item          number );\n\nTable created.\n\nSQL> set serverout on\nSQL> declare\n\
  \  2    type t_list is table of hardware.item%type;\n  3    l_rows t_list := t_list(1,-1,2,3,4,-2);\n\
  \  4\n  5    bulk_bind_error exception;\n  6    pragma exception_init(bulk_bind_error,-24381);\n\
  \  7\n  8    type t_err_list is table of ERRS%rowtype index by pls_integer;\n  9\
  \    l_err_list t_err_list;\n 10\n 11  begin\n 12    forall i in 1 .. l_rows.count\
  \ save exceptions\n 13      insert into hardware ( item ) values (l_rows(i));\n\
  \ 14\n 15  exception\n 16    when bulk_bind_error then\n```\n\n如果有行出错，那么一个新的结构 (`l_err_list`)\
  \ 将被填充，其中包含来自 `sql%bulk_exceptions` 集合的所有信息。\n\n```sql\n 17      for i in 1 .. sql%bulk_exceptions.count\
  \ loop\n 18         l_err_list(i).error_index := sql%bulk_exceptions(i).error_index;\n\
  \ 19         l_err_list(i).error_code := sql%bulk_exceptions(i).error_code;\n 20\
  \         l_err_list(i).item := l_rows(sql%bulk_exceptions(i).error_index);\n 21\
  \      end loop;\n```\n\n然后，这些信息当然会使用批量绑定保存到 `ERRS` 表中！\n\n```sql\n 22      forall\
  \ i in 1 .. l_err_list.count\n 23         insert into ERRS values l_err_list(i);\n\
  \ 24\n 25  end;\n 26  /\n\nPL/SQL procedure successfully completed.\n\nSQL> select\
  \ * from errs;\n\nERROR_INDEX ERROR_CODE       ITEM\n----------- ---------- ----------\n\
  \          2       2290          -1\n          6       2290          -2\n```\n\n\
  #### LOG ERRORS 子句\n\n或者，你可以通过将代码转换为纯 SQL 方法并利用 `LOG ERRORS` 子句来实现类似的效果。从 10g 版本开始，如果你打算使用批量绑定的\
  \ DML 操作可以在 SQL 中原生表达，你可以以类似于 `SAVE EXCEPTIONS` 子句的方式捕获错误。下面的 DDL 和代码包含在 `bulk_log_errors.sql`\
  \ 文件中。\n\n首先，使用提供的 `DBMS_ERRLOG` 包创建一个表来捕获错误。\n\n```sql\nSQL> exec DBMS_ERRLOG.CREATE_ERROR_LOG('HARDWARE');\n\
  \nPL/SQL procedure successfully completed.\n```\n\n此执行创建了一个表，该表包含来自 `HARDWARE` 表的列，以及用于指示发生了何种错误的额外列。生成的表结构如下：\n\
  \n```sql\nSQL> desc err$_HARDWARE\n Name                       Null?    Type\n --------------------------\
  \ -------- ----------------\n ORA_ERR_NUMBER$                     NUMBER\n ORA_ERR_MESG$\
  \                       VARCHAR2(2000)\n ORA_ERR_ROWID$                      ROWID\n\
  \ ORA_ERR_OPTYP$                      VARCHAR2(2)\n ORA_ERR_TAG$               \
  \         VARCHAR2(2000)\n AISLE                               VARCHAR2(4000)\n\
  \ ITEM                                VARCHAR2(4000)\n DESCR                   \
  \            VARCHAR2(4000)\n STOCKED                             VARCHAR2(4000)\n\
  ```\n\n然后，使用附加的日志错误子句执行 SQL 语句以捕获错误，如下所示：\n\n```sql\nSQL> insert\n  2  into HARDWARE\
  \ ( item )\n  3  with SRC_ROWS as\n  4    ( select -3 + rownum     x from dual\n\
  \  5      connect by level <= 6 )\n  6  select x\n  7  from SRC_ROWS\n  8  log errors\
  \ reject limit unlimited;\n\n3 rows created.\n```\n\n你会发现，与批量绑定示例 (`bulk_bind_error_5.sql`)\
  \ 类似，错误行及其错误原因已被捕获。\n\n```sql\nSQL> select\n  2   item\n  3  ,ora_err_number$\n\
  \  4  ,ora_err_mesg$\n  5  from err$_HARDWARE;\n\nITEM  ORA_ERR_NUMBER$ ORA_ERR_MESG$\n\
  ----- --------------- ------------------------------------------------------------\n\
  -2               2290 ORA-02290: check constraint (MCDONAC.HARDWARE_CHK) violated\n\
  -1               2290 ORA-02290: check constraint (MCDONAC.HARDWARE_CHK) violated\n\
  0                2290 ORA-02290: check constraint (MCDONAC.HARDWARE_CHK) violated\n\
  ```\n\n全面介绍 `LOG ERRORS` 扩展超出了本书的范围，但前面的示例演示了如何以与 PL/SQL 中 `SAVE EXCEPTIONS` 功能非常相似的方式使用它，并且还有一个额外的好处：错误数据可直接在一个表中获得，以便进一步处理。\n\
  \n#### 健壮的批量绑定\n\n当你使用 `bulk collect` 收集数据到集合中时，数组是从索引 1 开始填充的。标准文档中的几乎所有示例都基于此假设，代码通常类似于：\n\
  \n```sql\nbegin\n  select ...\n  bulk collect into <array>\n  from ...\n\n  for\
  \ i in 1 .. <array>.count loop\n    <processing>\n  end loop;\nend;\n```\n\nOracle\
  \ 不太可能改变这种行为，因此可以合理地假设任何使用 `bulk collect` 初始化的集合将始终从数组索引 1 开始。然而，集合并不完全属于 PL/SQL\
  \ 中 `bulk collect`/`bulk bind` 功能的范畴。事实上，集合的出现早于批量操作，可以一直追溯到 Oracle 7。一旦数据被提取到集合中，开发人员可以自由地对集合内容进行任何操作。那么，如果集合不再包含一组从\
  \ `index=1` 开始的元素，批量绑定操作会发生什么？让我们探讨一些场景。\n\n##### 场景 1：元素不从 1 开始\n\n只要数组的索引是连续的，你就可以使用数组本身的属性来继续使用批量绑定。考虑以下示例\
  \ (`bulk_bind_scenario1.sql`)，其中数组从 10 开始。可以使用数组属性 `FIRST` 和 `LAST` 来定义批量绑定的数组范围。\n\
  \n```sql\nSQL> declare\n  2    type t_num_list is table of hardware.item%type index\
  \ by pls_integer;\n  3\n  4    val t_num_list;\n  5  begin\n  6\n  7    val(10)\
  \ := 10;\n  8    val(11) := 20;\n  9    val(12) := 20;\n 10\n 11    FORALL i IN\
  \ val.first .. val.last\n 12       insert into hardware ( item ) values (val(i));\n\
  \ 13\n 14  end;\n 15  /\n\nPL/SQL procedure successfully completed.\n```\n\n事实上，采用一个标准，即优先使用\
  \ `.FIRST` 和 `.LAST` 属性而不是 `1` 和 `.COUNT`，可能是合理的。然而，接下来的场景表明，这样做并不能提供完全的保障。\n\n\n\
  ##### 场景二：元素不连续\n\n让我们对前面的例子稍作修改：数组中缺少一个条目。以下是该示例以及因缺失条目导致的错误 (`bulk_bind_scenario2a.sql`)：\n\
  \n```sql\nSQL> declare\n  2    type t_num_list is table of hardware.item%type index\
  \ by pls_integer;\n  3\n  4    val t_num_list;\n  5  begin\n  6\n  7    val(10)\
  \ := 10;\n  8  --  val(11) := 20;\n  9    val(12) := 20;\n 10\n 11    FORALL i IN\
  \ val.first .. val.last\n 12       insert into hardware ( item ) values (val(i));\n\
  \ 13\n 14  end;\n 15  /\ndeclare\n*\nERROR at line 1:\nORA-22160: element at index\
  \ [11] does not exist\nORA-06512: at line 11\n```\n\n一旦集合变得稀疏，批量绑定将无法自动使用高低边界索引值进行工作。然而，从版本\
  \ 10.2 开始，`FORALL` 语法被扩展，包含了 `INDICES OF` 和 `VALUES OF` 规范。使用 `INDICES OF` 可以解决上面遇到的\
  \ ORA-22160 问题，如下所示 (`bulk_bind_scenario2b.sql`)：\n\n```sql\nSQL> declare\n  2 \
  \   type t_num_list is table of hardware.item%type index by pls_integer;\n  3\n\
  \  4    val t_num_list;\n  5  begin\n  6\n  7    val(10) := 10;\n  8  --  val(11)\
  \ := 20;\n  9    val(12) := 20;\n 10\n 11    FORALL i IN INDICES OF val\n 12   \
  \    insert into hardware ( item ) values (val(i));\n 13\n 14  end;\n 15  /\n```\n\
  \n```\nPL/SQL procedure successfully completed.\n```\n\n我非常喜欢这个语法。它不依赖于数组属性，并且代码独立于数据在数组中的分布方式。我建议采用一个标准：每当您想要处理整个集合时，就使用\
  \ `INDICES OF` 子句，并且在您的 PL/SQL 代码中应弃用 `.FIRST`、`.LAST` 和 `.COUNT` 的使用。遗憾的是，`INDICES\
  \ OF` 扩展只能在 `FORALL` 语句中使用，而不能在标准的 `FOR` 循环中使用。\n\n然而，如果您需要执行的批量绑定更像是对现有集合进行切割和切片，那么\
  \ `VALUES OF` 语法就派上用场了。`VALUES OF` 子句允许一定程度的间接寻址，有点类似于指针，使您能够对较大集合的选定子集进行批量绑定。\n\
  \n在下一个示例中 (`bulk_bind_values_of.sql`)，将填充一个包含 `STATUS` 属性的集合：状态标记为 `NEW` 的行将被插入到\
  \ `HARDWARE` 表中，而状态标记为 `UPD` 的行将更新其在 `HARDWARE` 表中的匹配行。因此，该示例模拟了一个 `MERGE` 语句。将检查该集合以确定哪些索引应用于更新，哪些应用于插入。然后，`VALUES\
  \ OF` 子句将用于处理这些行。\n\n首先，我将创建一些表示输入数据的结构。变量 `src` 将是输入数据，包含 100 行，每行状态为 `NEW` 或 `UPD`。\n\
  \n```sql\nSQL> set serverout on\nSQL> declare\n  2    type t_input_row is record\
  \ (\n  3       item   hardware.item%type,\n  4       descr  hardware.descr%type,\n\
  \  5       status varchar2(3)\n  6       );\n  7\n  8    type t_input_list is\n\
  \  9       table of t_input_row\n 10       index by pls_integer;\n 11\n 12    src\
  \ t_input_list;\n```\n\n现在定义了两个变量 (`ind_new` 和 `ind_upd`)，它们将保存 `src` 中相应行的索引值。通过这种方式，不是将源数据复制到单独的集合中（一个用于\
  \ status = `NEW`，另一个用于 status = `UPD`），而是仅保留索引条目的记录。如果源数据量很大，避免复制尤为重要。\n\n```sql\n\
  \ 13\n 14    type t_target_indices is\n 15       table of pls_integer\n 16     \
  \  index by pls_integer;\n 17\n 18    ind_new  t_target_indices;\n 19    ind_upd\
  \  t_target_indices;\n 20\n 21  begin\n```\n\n现在，源数据被植入一些虚构的值（80 行状态为 `UPD`，20 行状态为\
  \ `NEW`）。在真实世界的例子中，数据可能在其他地方初始化并传递给应用程序进行处理。\n\n```sql\n 22    for i in 1 .. 100\
  \ loop\n 23       src(i).item   := i;\n 24       src(i).descr  := 'Item '||i;\n\
  \ 25       src(i).status :=  case when mod(i,5) = 0 then 'NEW' else 'UPD' end;\n\
  \ 26    end loop;\n 27\n```\n\n现在扫描数据，并用与两个不同状态值对应的索引来填充索引数组。\n\n```sql\n 28\n 29\
  \    for i in 1 .. 100 loop\n 30       if src(i).status = 'NEW' then\n 31      \
  \    ind_new(ind_new.count) := i;\n 32       else\n 33          ind_upd(ind_upd.count)\
  \ := i;\n 34       end if;\n 35    end loop;\n```\n\n最后，使用 `VALUES OF` 语法将更改传输到\
  \ `HARDWARE` 表中。即使与每个表相关的行在 `src` 集合中稀疏分布，`VALUES OF` 语法也提供了对它们进行批量绑定的直接访问。\n\n\
  ```sql\n 36\n 37    forall i in values of ind_new\n 38       insert into hardware\
  \ ( aisle, item)\n 39       values (1, src(i).item);\n 40    dbms_output.put_line(sql%rowcount||'\
  \ rows inserted');\n 41\n 42    forall i in values of ind_upd\n 43       update\
  \ hardware\n 44       set descr = src(i).descr\n 45       where aisle = 1\n 46 \
  \      and item = src(i).item;\n 47    dbms_output.put_line(sql%rowcount||' rows\
  \ updated');\n 48\n 49  end;\n 50  /\n```\n\n```\n20 rows inserted\n80 rows updated\n\
  ```\n\n`VALUES OF` 和 `INDICES OF` 语法完善了批量绑定的实现。数组内的任何条目排列都可以被操作并绑定到数据库表中。\n\n#####\
  \ Oracle 的早期版本\n\n如果您使用的是 Oracle 10.1 或更低版本，那么您的 Oracle 版本尚不支持 `VALUES OF` 或 `INDICES\
  \ OF` 扩展，但并非没有解决办法。如果一个集合可能是稀疏的，那么将其转换为密集集合即可解决问题。这并非可以轻率为之的事情，因为如果集合很大，那么在对数据进行密集化处理时，您将在内存中持有该集合的两个副本。我将回到本节的第一个示例，其中输入数组不包含连续条目，并在不使用\
  \ `VALUES OF` 的情况下解决该问题 (`bulk_bind_scenario_oldver.sql`)。\n\n首先，这里是声明第一个集合 `val`\
  \ 的代码，它将是一个稀疏集合：\n\n```sql\nSQL> declare\n  2    type t_num_list is table of hardware.item%type\n\
  \  3      index by pls_integer;\n  4\n  5    val t_num_list;\n```\n\n现在定义第二个数组，它将包含来自稀疏集合\
  \ `val` 的条目：\n\n```sql\n  6\n  7    dense_val t_num_list;\n  8    idx       pls_integer;\n\
  \  9\n 10  begin\n 11\n 12    val(10) := 10;\n 13    val(12) := 20;\n 14\n```\n\n\
  通过遍历 `val` 集合的条目（使用集合属性 `.FIRST` 和 `.NEXT`）来执行 `dense_val` 数组的填充。集合 `dense_val`\
  \ 将从 0 开始（因为 `dense_val.count` 初始为零），并增长到 `val` 中的元素数量。\n\n```sql\n 15    idx :=\
  \ val.first;\n 16    while idx is not null loop\n 17       dense_val(dense_val.count)\
  \ := val(idx);\n 18       idx := val.next(idx);\n 19    end loop;\n```\n\n然后使用 `dense_val`\
  \ 集合而不是稀疏的 `val` 来执行批量绑定：\n\n```sql\n 20\n 21    FORALL i IN dense_val.first ..\
  \ dense_val.last\n 22       insert into hardware ( item )\n 23       values (dense_val(i));\n\
  \ 24\n 25  end;\n 26  /\n```\n\n```\nPL/SQL procedure successfully completed.\n\
  ```\n\n### 对海量集合使用的合理性论证\n\n正如本章通篇所见，一旦开始使用集合，你就需要注意其对内存消耗的影响。然而，有时你的性能要求源于数据库基础设施的其他部分。\n\
  \n你看到的许多示例都涉及向表中插入大量行。虽然批量绑定比单行插入快得多，但由于插入仍然是通过常规路径发出的 DML，它仍然会消耗大量的重做日志，因此性能可能仍会受到轻微影响。例如，性能可能因为空闲列表或段空间位图管理而受到影响，或者因为推进了表的高水位线而受到影响。\n\
  \nOracle Database 11.2 引入了 `APPEND_VALUES` 提示，它会将常规路径插入语句转换为直接路径加载。以下是使用该提示的一个示例\
  \ (`bulk_bind_append_values_1.sql`)：\n\n```\nSQL> insert /*+ APPEND_VALUES */\n\
  \  2  into HARDWARE ( item ) values (1);\n\n1 row created.\n\nSQL> select item from\
  \ HARDWARE;\nselect item from HARDWARE\n                 *\nERROR at line 1:\nORA-12838:\
  \ cannot read/modify an object after modifying it in parallel\n\nSQL> commit;\n\n\
  Commit complete.\n\nSQL> select item from HARDWARE;\n\n      ITEM\n----------\n\
  \         1\n```\n\n当 `APPEND_VALUES` 提示发布时，其实用性受到了质疑。毕竟，谁会为了仅仅插入一个`单行`数据，就愿意锁定一个表、推进其高水位线并必须立即结束事务呢？然而，当与批量绑定结合使用时，该功能的实用性就变得更加明显。在下一个示例\
  \ (`bulk_bind_append_values_2.sql`) 中，测量了会话级别的统计数据，以比较常规插入与通过批量绑定进行的直接加载插入在重做日志消耗上的差异：\n\
  \n```\nSQL> declare\n  2    type t_list is table of hardware.descr%type;\n  3  \
  \  l_rows t_list := t_list();\n  4    l_now timestamp;\n  5    l_redo1 int;\n  6\
  \    l_redo2 int;\n  7    l_redo3 int;\n  8  begin\n  9\n 10    select value\n 11\
  \    into   l_redo1\n 12    from   v$mystat m, v$statname s\n 13    where  s.statistic#\
  \ = m.statistic#\n 14    and    s.name = 'redo size';\n 15\n\n    -- 准备一个包含 1,000,000\
  \ 行的数组，通过标准批量绑定插入，\n    -- 并捕获此会话在此操作前后的重做消耗。\n 16    for i in 1 .. 1000000 loop\n\
  \ 17       l_rows.extend;\n 18       l_rows(i) := i;\n 19    end loop;\n 20\n 21\
  \    l_now := systimestamp;\n 22    forall i in 1 .. l_rows.count\n 23      insert\
  \ into hardware ( descr )  values (l_rows(i));\n 24    dbms_output.put_line('Elapsed\
  \ = '||(systimestamp-l_now));\n 25\n 26    select value\n 27    into   l_redo2\n\
  \ 28    from   v$mystat m, v$statname s\n 29    where  s.statistic# = m.statistic#\n\
  \ 30    and    s.name = 'redo size';\n 31\n\n    -- 然后截断该表，并使用 APPEND_VALUES 进行直接路径加载来重新执行加载。\n\
  \ 32    execute immediate 'truncate table hardware';\n 33\n 34    dbms_output.put_line('Redo\
  \ conventional = '||(l_redo2-l_redo1));\n 35\n 36    l_now := systimestamp;\n 37\
  \    forall i in 1 .. l_rows.count\n 38      insert /*+ APPEND_VALUES */ into hardware\
  \ ( descr ) values (l_rows(i));\n 39    dbms_output.put_line('Elapsed = '||(systimestamp-l_now));\n\
  \ 40\n 41    select value\n 42    into   l_redo3\n 43    from   v$mystat m, v$statname\
  \ s\n 44    where  s.statistic# = m.statistic#\n 45    and    s.name = 'redo size';\n\
  \ 46\n 47    dbms_output.put_line('Redo direct load = '||(l_redo3-l_redo2));\n 48\n\
  \ 49  end;\n 50  /\nElapsed = +000000000 00:00:03.057000000\nRedo conventional =\
  \ 67599300\nElapsed = +000000000 00:00:02.668000000\nRedo direct load = 146912\n\
  \nPL/SQL procedure successfully completed.\n```\n\n正如预期的那样，直接路径加载操作更快，并且使用了少得多的重做日志。因此，虽然始终注意集合的内存消耗很重要，但当涉及到使用批量绑定进行直接加载插入时，如果数据库服务器上的内存允许，你可能会发现自己使用了比正常情况更大的集合大小。\n\
  \n### 真正的益处：客户端批量处理\n\n正如我在本章开头提到的，我在五金店里的反复徘徊正在损害我的效率。然而，有时情况要糟糕得多：我付了一件东西的钱，开车回家，*然后*才意识到我需要回到车上，开车返回五金店，再买点别的东西。（考虑到敏感的读者，我不会包含我妻子在这种情况下使用的“爱称”！）\n\
  \n本章描述了在 PL/SQL 中使用批量操作访问数据的效率，但这等同于*已经身处*五金店。从外部客户端应用程序到数据库（网络往返）以及在逐行处理数据的成本，等同于开车往返于商店。这种成本可以通过一些简单的演示来量化。首先，我将（当然是用\
  \ PL/SQL！）构建一个副本，模拟许多客户端应用程序在 3GL 代码中实现的内容，即一个打开表上游标的过程和一个获取单行的过程。以下是代码，你可以在 `bulk_network_1.sql`\
  \ 中找到：\n\n```\nSQL> create or replace\n  2  package PKG1 is\n  3\n  4   procedure\
  \ open_cur(rc in out sys_refcursor);\n  5\n  6   procedure fetch_cur(rc in out sys_refcursor,\
  \ p_row out hardware.item%type);\n  7\n  8  end;\n  9  /\n\nPackage created.\n\n\
  SQL> create or replace\n  2  package body PKG1 is\n  3\n  4   procedure open_cur(rc\
  \ in out sys_refcursor) is\n  5   begin\n  6     open rc for select item from hardware;\n\
  \  7   end;\n  8\n  9   procedure fetch_cur(rc in out sys_refcursor, p_row out hardware.item%type)\
  \ is\n 10   begin\n 11     fetch rc into p_row;\n 12   end;\n 13\n 14  end;\n 15\
  \  /\n\nPackage body created.\n```\n\nSQL*Plus 就足以作为调用此包的客户端应用程序。SQL*Plus 本身就是一个真正的\
  \ SQL 客户端，它每次获取调用所获取的行数是一个你可以显式控制的参数，所以上面的演示可以写成\n\n```\nset arraysize n  (n=1 代表单行获取，n=1000\
  \ 代表多行获取)\nselect item from HARDWARE;\n```\n\n但我想模拟 3GL 应用程序将要做的事情，即包含显式的打开游标、重复获取然后关闭游标的调用。为了打开游标，然后重复获取行直到结果集耗尽，我可以使用脚本\
  \ `bulk_single_fetch_100000.sql`，它执行以下操作：\n\n```\nvariable rc refcursor\nexec pkg1.open_cur(:rc)\n\
  variable n number\nexec     pkg1.fetch_cur(:rc,:n);\nexec     pkg1.fetch_cur(:rc,:n);\n\
  [重复 100000 次]\n```\n\n为了查看演示的已用时间，而无需滚动浏览 100,000 行输出，我关闭了终端输出并记录了前后时间戳。\n\n```\n\
  SQL> variable rc refcursor\nSQL> exec pkg1.open_cur(:rc)\nSQL> select to_char(systimestamp,'HH24:MI:SS.FF')\
  \ started from dual;\n\nSTARTED\n------------------\n12:11:18.779000\n\nSQL> set\
  \ termout off\nSQL> @bulk_single_fetch_1000.sql   -- 包含 1000 次获取调用\n[重复 100 次]\n\
  \nSQL> set termout on\nSQL> select to_char(systimestamp,'HH24:MI:SS.FF') ended from\
  \ dual;\n\nENDED\n------------------\n12:12:47.270000\n```\n\n你可以看到，100,000 次到数据库的往返大约花费了\
  \ 90 秒。我在启用会话跟踪的情况下重复了该演示，并检查了生成的 tkprof 格式化文件。结果如下：\n\n```\nSELECT ITEM\nFROM \
  \  HARDWARE\n```\n\n\n下面是排版后的内容：\n\n```\n调用     次数       CPU 耗时    总耗时       磁盘\
  \ I/O      查询次数    当前状态        行数\n------- ------  -------- ---------- ----------\
  \ ---------- ----------  ----------\nParse        1      0.00       0.05          0          1          0           0\n\
  Execute      1      0.00       0.00          0          0          0           0\n\
  Fetch   100000      1.17       0.94          0     100003          0      100000\n\
  ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
  total   100002      1.17       1.00          0     100004          0      100000\n\
  ```\n\n你可以看到，在这 90 秒中，只有一秒是真正在数据库中执行操作。另外 89 秒都花在了网络往返上。数据库什么也没做，但从客户端应用的角度看，它却是在等待数据库。用汽车术语来说，这就是*空转但毫无进展*。在我目前的工作中，每当我们在中间层服务器上遇到表现出这种行为的\
  \ 3GL 程序时，我们称之为“`中间件失败`”。用这种方式给劣质代码贴上标签，竟能如此有效地让开发团队*聚焦*问题，这真令人惊叹！\n\n现在，让我们应用刚刚学到的批量处理知识，从数据库中批量获取数据并批量传回客户端。下面的代码\
  \ (`bulk_network_2.sql`) 是新的实现方式，其性能将会好得多：\n\n```sql\nSQL> create or replace\n \
  \ 2  package PKG2 is\n  3\n  4   type t_num_list is table of hardware.item%type\
  \ index by pls_integer;\n  5\n  6   procedure open_cur(rc in out sys_refcursor);\n\
  \  7\n  8   procedure fetch_cur(rc in out sys_refcursor, p_rows out t_num_list);\n\
  \  9\n 10  end;\n 11  /\n```\n\n`Package created.`\n\n```sql\nSQL> create or replace\n\
  \  2  package body PKG2 is\n  3\n  4   procedure open_cur(rc in out sys_refcursor)\
  \ is\n  5   begin\n  6     open rc for select item from hardware;\n  7   end;\n\
  \  8\n  9   procedure fetch_cur(rc in out sys_refcursor, p_rows out t_num_list)\
  \ is\n 10   begin\n 11     fetch rc bulk collect into p_rows limit 1000;\n 12   end;\n\
  \ 13\n 14  end;\n 15  /\n```\n\n`Package body created.`\n\n重新运行演示。每次，将从数据库批量收集 1000\
  \ 行数据并传回客户端。因为 SQL Plus 本身不理解返回的数组，数据将简单地追加到一个大的`VARCHAR2`变量 (`the_data`) 中，以模拟客户端接收数组数据的过程。这是一个示例\
  \ (`bulk_multi_fetch_in_bulk.sql`)：\n\n```sql\nSQL> variable rc refcursor\nSQL>\
  \ exec pkg2.open_cur(:rc)\n\nPL/SQL procedure successfully completed.\n\nSQL> select\
  \ to_char(systimestamp,'HH24:MI:SS.FF') started from dual;\n\nSTARTED\n------------------\n\
  12:39:09.704000\n\nSQL> variable the_data varchar2(4000);\nSQL> set termout off\n\
  \nSQL> declare\n  2    n pkg2.t_num_list;\n  3  begin\n  4    :the_data := null;\n\
  \  5    pkg2.fetch_cur(:rc,n);\n  6    for i in 1 .. n.count loop\n  7      :the_data\
  \ := :the_data||n(i);\n  8    end loop;\n  9  end;\n[重复执行 100 次]\n\nSQL> select\
  \ to_char(systimestamp,'HH24:MI:SS.FF') ended from dual;\n\nENDED\n------------------\n\
  12:39:09.837000\n```\n\n差异是惊人的。直接周转时间从 90 秒下降到了 0.13 秒。启用跟踪重新运行演示，揭示了数据库访问次数的减少。\n\
  \n```sql\nSELECT ITEM\nFROM HARDWARE\n\n调用     次数       CPU 耗时    总耗时       磁盘 I/O     \
  \ 查询次数    当前状态        行数\n------- ------  -------- ---------- ---------- ----------\
  \ ----------  ----------\nParse        1      0.00       0.00          0          0          0           0\n\
  Execute      1      0.00       0.00          0          0          0           0\n\
  Fetch      100      0.04       0.04          0        256          0      100000\n\
  ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
  total      102      0.04       0.04          0        256          0      100000\n\
  ```\n\n仍然获取了 100,000 行数据（最右列），但只进行了 100 次获取调用。我无法过分强调这里所实现的好处，即使只是一个简单的演示。Oracle\
  \ 的客户花费大量资金进行优化工作，试图通过缓存、创建索引、SQL 调优等方法从系统中额外榨出 10-15`%`的性能，这种情况并不少见。有时，客户甚至会购买更多硬件，并伴随相应的许可证成本增加。但请考虑一下这个演示中所获得的性能提升：\n\
  \n> 从 90 秒降到 0.13 秒，提升了近 700 倍。\n\n作为一名应用程序开发者，如果你对代码的修改能让其速度提升数百倍，那将使你的应用程序更加成功，并让你广受欢迎！在客户端应用与数据库的交互中减少网络往返，很大程度上取决于开发者在其客户端应用语言中可用的工具、应用的设计（以智能地利用向数据库传递数据的方式）以及开发者的勤奋程度。但是，作为一名`数据库`开发者，如果你能确保你的\
  \ PL/SQL 数据库接口允许客户端应用程序批量发送和接收数据，那么你就离成功的应用程序性能更近了一步。\n\n\n\n### 概要\n\n我喜欢撰写、演示或谈论\
  \ PL/SQL 中的批量操作，原因之一在于使用它们几乎就是成功的保证。许多 Oracle 特性，无论新旧，只适用于特定的客户群或解决特定的技术问题，此外，还需要大量细致的测试，以确保使用这些特性不会对数据库或其应用程序的其他部分产生负面影响。另一方面，在\
  \ PL/SQL 中采用批量集合和批量绑定，在绝大多数情况下都能使应用程序受益。从以行为中心的数据提取转向以集合为中心的批量数据提取，所需付出的努力很小，甚至可能为零。你的选择相当简单。\n\
  \n*   如果你已经在使用 `FOR cursor_variable in (QUERY or CURSOR)` 语法，那么要实现批量集合，只需确保你使用的是较新版本的\
  \ Oracle，并且 PL/SQL 编译设置保持默认即可。\n*   如果你没那么幸运，也只需进行一些简单的重新编码，将 `FETCH CURSOR INTO`\
  \ 风格改为 `FETCH CURSOR BULK COLLECT INTO`。只需几个关键词和一些 PL/SQL 类型定义，就完成了！\n\n从以行为中心的数据修改转向以集合为中心的批量绑定数据修改，所需付出的努力同样很小。\n\
  \n*   如果你已经在循环中执行 DML（`insert`, `update`, `delete`），只需添加一些适当的类型定义，并将 FOR 循环重构为 `FORALL`，工作就完成了。\n\
  \n就是这么简单。应用程序的性能提升通常被描述为这里或那里几个百分点的改进，但在本章中你已经看到，转向批量操作可以带来`数量级`的性能提升。在过去的 Oracle\
  \ 版本中，PL/SQL 的某些元素不支持批量操作（例如，本地动态 SQL 和动态 ref 游标）。然而，所有这些限制在近期的数据库版本中都已被解除，因此永远没有理由不考虑使用批量操作。\n\
  \n所以，努力很小，风险很低，回报却巨大。一旦你在 PL/SQL 中的方法变得以集合为中心，你会惊讶于这种新获得的集合中心思维会迅速传播到你 Oracle 技能的其他领域。你会发现，你更多地通过\
  \ SQL 而非过程逻辑来实现目标，同时你也会开始利用那些能批量处理数据的机制，如管道函数。通过批量操作学到的相同技能，将成为你整个数据库开发中秉持集合中心思维的动力。\n\
  \n我希望你能分享我对批量操作的热情，并且能在你自己的工作中看到回报。至于我，我要去五金店了——这次是推着购物车去的。\n\n## 第 7 章：了解你的代码\n\
  \n**作者：Lewis Cunningham**\n\n本章的名称是“了解你的代码”。你可能会想，如果你写了一段代码，你应该很了解它。你很可能确实了解。至少你比其他人了解得更多。然而，即使代码是你写的，你仍然会基于记忆做出假设。这些假设很可能随着时间的推移而与现实渐行渐远。你有一个最佳猜测——一个有根据的假设——但这是主观的，并依赖于人的不可靠性。而如果你没有编写这段代码，那就完全没谱了。\n\
  \n既然能知道，为何要猜测？我第一次听到这个问题是在性能优化的语境下。我记得是 Cary Milsap（作家兼性能大师）说的（至少是我第一次听到他说的）。我稍后会从性能角度更多地谈谈了解你的代码，但这个概念适用的范围远不止性能。\n\
  \n如果你要进行一笔大额采购，需要开支票，你会只是希望（并假设）你的账户里有足够的钱吗？如果采购金额与你认为账户里有的钱只差几百美元呢？你会先用 ATM 或网页来核实一下吗？我的银行甚至允许我发送短信来查询余额。既然能知道，我为何要猜测？\n\
  \nOracle 就像是为你提供了访问代码的 ATM。关于你的 PL/SQL 代码，你可能需要知道的一切，都可以在 Oracle 数据字典中和/或通过使用 Oracle\
  \ 提供的工具找到。你甚至不需要 PIN 码（尽管你需要登录数据库，并且可能还需要获取一些权限）。\n\n本章将向你展示在哪里可以找到获取“账户更新”的最佳位置。你将发送一些\
  \ SQL 来代替短信。本章将从使用 Oracle 数据字典（与你的 PL/SQL 代码相关）和 `PL/Scope` 对代码进行静态分析开始。然后，它会转向基于时间和基于事件的性能剖析（11g\
  \ 版本之前），最后介绍上下文敏感、基于时间的性能剖析（11g 及以上版本）。\n\n到本章结束时，你将能够拿一段你从未见过的代码，了解其结构、使用的数据类型、哪些变量使用了它们以及它们在何处被使用。你将知道应用程序中的运行时消耗在何处（无论高效与否）。到本章结束时，你将拥有了解你的代码所需的工具。无需猜测；你将了解代码。\n\
  \n\n"
- "# 本章将（以及不会）涵盖的内容\n\n从架构师的视角（我指的是从设计正确性、代码正确性和标准符合性的角度）来看，当一个应用程序或程序单元投入生产时，绝对不应该有任何意外。所有设计都应该经过同行的早期评审——以确保符合业务需求和设计标准。所有代码都应该经过审查，以确保符合编码标准、性能标准、逻辑错误和基本文档。代码越符合标准，应用程序测试越充分，出现“哎呀”类错误的可能性就越小。无论应用程序多么符合标准，你都可能发现逻辑错误。测试应该能捕获大部分此类错误，但通常仍有一些会漏网。然而，漏网的错误不应该是常见错误。这些常见错误正是标准和回归测试旨在捕获的。\n\
  \n### 总体目标\n\n本章将为你提供工具，通过利用 Oracle 以数据字典、性能剖析和 `PL/SQL compiler` 形式提供的宝贵数据，帮助你做出最佳决策。许多验证工作可以自动化，本章将说明在何处可以实现这一点。任何可以卸载给计算机完成的工作都应该这样做。让人类专注于那些需要人类智能的任务。即使完整的分析/发现无法自动化，至少数据的收集可以自动化或简化。\n\
  \n## 自动化与手动验证\n\n有些事情不那么适合自动化。即使在今天，许多审查工作仍然需要人工验证。如果我能开发出一种自动化工具来捕获任何可能应用程序中的每一个逻辑错误，那将是非常有价值的东西，可以用来赚大钱。逻辑审查仍然属于人工执行手动检查的范畴，无论是通过代码审查还是通过测试。\n\
  \n文档也很棘手。很容易看到代码中有注释，但很难验证某个注释是否有用（甚至是否相关）。逻辑和注释都高度特定于手头的任务。本章不会试图涵盖逻辑或文档问题，因为 Oracle\
  \ 在这方面能提供的帮助很少。\n\n## 性能与分析\n\n了解应用程序的性能剖析对应用程序的成功至关重要。然而，其缺点是，性能检查需要人类智能来验证。虽然你可以自动化一个系统，在某个函数执行时间超过\
  \ x 秒时发出警报，但需要人工来验证这是否可以接受。\n\nOracle 提供了工具来帮助收集分析系统所需的信息，使开发人员能够做出明智的性能决策。调整应用程序远远超出了本章的范围。然而，第\
  \ 13 章 提供了解释性能剖析结果的方法。\n\n本章不会提供调优建议，而是从了解代码与性能关系的角度，提供以下内容：有哪些工具可用于收集这些性能指标（主要是剖析器）、数据存储在何处，以及如何将这些数据用于回归。回归测试是验证变更前正常工作的功能在变更后是否仍然有效的最简单方法。通过保存\
  \ Oracle 提供的数据，你可以长期关注性能表现，并比较不同版本之间的差异。你可以在测试中设定阈值，使得剖析器的自动运行仅在出现异常时才发出警报。人类必须在第一次运行时确保性能结果正确，但一旦收集到良好的度量标准，只有当某个度量标准超出阈值时才需要人工干预。\n\
  \n## 测试与覆盖\n\n除了回归测试，另一个测试好处是代码覆盖率。虽然并非绝对可靠，但代码覆盖率测试确实提供了一定保证，即代码至少会针对某些数据集执行。结合使用\
  \ Oracle 提供的工具和一些努力，可以验证程序中的每一行可执行代码都已被执行。这很有价值，但更有价值的是能够看到哪些行未被执行。这正是你希望尽可能自动化的地方。如果每一行都执行了，测试通过。如果并非每一行都执行了，测试失败。人工介入并创建一个或多个测试来覆盖每一行。\n\
  \n## 标准与自定义\n\n本章大部分内容将使用数据字典和 `PL/SQL compiler` 提供的数据来确保符合公司标准。标准几乎从来不是“标准”的，因此“一刀切”的解决方案是不可能的。相反，本章将为你提供工具和指导，让你能够根据需要创建自己的解决方案，无论详细程度如何。使用简单的\
  \ `SQL` 和数据字典，你可以验证命名标准、查找未使用的变量、查找定义在多个作用域的变量、执行影响分析、查找不可接受的数据类型用法等等。\n\n## 章节范围\n\
  \n我不会解释这些工具提供的每一个选项、列或报告。如果 Oracle 的文档很好（通常确实很好），我不会去复述它。本章不是关于这些工具的通用教程。它是关于你如何将这些工具整合到你的开发工作流程中，以实现更好应用程序的解释。\n\
  \n\n### 自动化代码分析\n\n代码分析，也称为程序分析，是对源代码进行的分析。手动代码分析是由人进行的代码审查。此类分析还可能包括审查来自运行程序的日志数据和系统输出。自动化分析可以让分析师（根据我的经验，通常是开发人员）跳过分析中枯燥的部分，直接进入更有趣的工作。你不再需要逐行人工审查，而是可以运行某种程序来为你完成这些繁琐的工作。\n\
  \n让我们举个例子。假设你是一名开发人员，正在工作中。你接到一些新的需求，这意味着你必须修改一个现有的过程。可能是某个计算逻辑发生了变化，这个过程需要增加一个变量。业务部门希望你评估一下完成这项改动所需的时间。更有趣的是，编写并维护这个过程多年的那位同事最近中了彩票辞职了。你甚至从未见过这段代码（在代码审查那天你请病假了）。\n\
  \n你如何提供这个估算？凭空猜测一个数字？根据我的经验，我见过不少这种方法，但从未真正成功过。\n\n我见过的第二种方法是手忙脚乱地找出源代码，进行紧急审查。快速浏览后，你认定这是个简单的改动，只需两个小时来编码和单元测试。\n\
  \n很好。快速分析之后，你准备开始编码了。一位业务人员对你能在 673 处调用此计算的地方（这是一个*非常*流行的计算）全部修改调用感到惊讶。现在你有点担心了。你在文件系统中快速执行了\
  \ `grep` 命令，查看所有调用该过程的地方。\n\n意识到你的过程被如此多的地方调用后，你将最初的估算时间乘以二。这通常比不乘更准确一些，但还有更好的方法。如果我说你可以通过运行几个简单的查询就能找到所有调用它的地方，你会相信吗？这些查询不仅能找到函数被调用的位置，还能涵盖影响分析、命名标准合规性检查，并展示代码和变量使用情况、作用域冲突以及测试的代码覆盖率。\n\
  \n你可以通过手动审查源代码、程序日志数据等获取所有这些信息，但通过自动化这个过程，你将获得一个可重复、可预测、不易出错且大大节省时间的流程。在解读自动化或手动分析提供的数据方面，优秀的开发人员是无法被替代的，但自动化能为你节省大量时间。\n\
  \n### 静态分析\n\n静态分析是指在不实际运行程序的情况下分析其源代码。你关注的是编译器在编译时已知的信息。静态分析根据程序中实际使用的功能提供有关程序的信息。\n\
  \n静态分析可以提供有关正在使用的数据类型、命名标准、安全性、访问的对象等方面的信息。静态分析可以直接利用源代码，也可以使用工具。如果你手动审查代码以确保符合命名标准，你就是在对该源代码进行手动静态分析。同行评审就是一种静态分析。如果你曾在审查同事的程序时发现一个\
  \ `SQL` 注入漏洞，你就理解了静态分析的重要性。\n\n在 `Oracle PL/SQL` 中，有多种途径可以获取分析所需的信息。你通常会从数据字典开始。随着每个版本的发布，Oracle\
  \ 都会用有价值的数据增强数据字典。稍后，在“执行静态分析”章节，我将带你了解一些重要的数据字典视图（以及一些分析查询），然后向你介绍一个将代码分析带入 21\
  \ 世纪的新数据字典视图。这个新视图由 `PL/Scope` 提供，它是 `11g` 版本中增加的编译器功能。\n\n### 动态分析\n\n动态分析告诉你程序运行时会发现什么。动态分析也称为程序性能剖析。通过性能剖析，你运行一个程序，并以侵入式或非侵入式的方式收集程序执行路径和行为的统计数据。\n\
  \n`DBMS_PROFILER` 和 `DBMS_TRACE` 是 `11g` 版本之前的性能剖析工具。`DBMS_PROFILER` 是一个平面性能剖析器。平面性能剖析器提供简单的时间信息，例如不同的过程和函数调用耗时，但不包含上下文信息，比如哪个函数被调用以及调用顺序是什么。Oracle\
  \ 通过 `DBMS_TRACE` 添加了调用上下文信息，但最终创建的工具具有侵入性（需要 `DEBUG` 权限）且输出繁杂（可能产生大量数据）。使用 `DBMS_PROFILER`\
  \ 要好得多。\n\n`DBMS_HPROF` 是 `11g` 版本及之后提供的一个层次化性能剖析工具，它非侵入且易于使用。`DBMS_HPROF` 像平面剖析器\
  \ `DBMS_PROFILER` 一样提供时间信息，但也包含了像 `DBMS_TRACE` 那样的上下文信息。它可以生成一些对性能调优非常有价值的报告，同时也会填充一些表，你可以随后对这些表编写查询。这对于随时间比较指标以及作为理解代码的额外工具非常有益。\n\
  \n\n### 何时进行分析？\n\n分析代码的整个目的，是为了理解你的代码。绝大多数使用这些分析工具的人（至少那些向我询问如何使用这些工具的人），都是在紧要关头才使用：一次升级失败、用户抱怨数据库缓慢、一个似乎隐藏起来的棘手逻辑错误。\n\
  \n如同性能调优一样，代码分析可以在出问题时被召唤。但您难道不认为，一个为性能而设计的系统，更少可能在半夜把您吵醒吗？对于一个经过良好分析、符合标准的系统也是如此：无论是静态（人工或自动化）还是动态分析。这两种分析都应该建立基线。\n\
  \n分析应该在编写应用程序时（或在您接手它时）进行。我毫不怀疑每个人都熟悉代码评审。如前所述，代码评审（或同行评审）是一种人力驱动的静态分析。而 Oracle\
  \ 提供的自动化分析（尤其是 `PL/Scope`）应被视为代码评审的延伸。\n\n这种生产前分析/评审应当被记录、进行版本控制并保留。自动化分析作为数据字典视图中的数据，非常容易存档，并且可以在需要时随时召回（尽管您需要自己构建该功能）。随着每一次变更，都需要收集并保存分析的新版本。除了保存分析结果，您还需要查看它。您真的应该研究它。\n\
  \n通过静态分析（正如在讨论数据字典和 `PL/SCOPE` 时所提到的），您将理解代码的依赖关系、代码使用的标识符，以及这些标识符在何处/如何被使用。通过动态分析，您可以看到代码中的瓶颈（可修复或不可修复）；您可以了解不同的输入数据如何改变代码的执行轮廓；您可以验证代码覆盖率；等等。\n\
  \n使用各种工具提供的报告（或您自己用 SQL 编写的），您将为调试任何可能在半夜出现的问题打下良好基础。您还将拥有可以与新开发人员共享的文档（或用来说服管理层您确实在做工作）。\n\
  \n一旦您的代码投入生产，您将能够利用旧信息来验证一切是否仍按预期运行。在开发过程中，您将使用性能分析器持续验证您的代码是否工作正确，无论是从代码路径角度还是性能角度。无需将每次分析器运行都保存到版本控制系统，但您应该保存在每次实施或升级前运行的版本。\n\
  \n### 代码分析与插桩\n\n有时会在分析与插桩之间产生混淆。术语 `插桩` 指的是为支持分析（特别是动态分析）而添加到系统中的代码。插桩使分析成为可能，但它本身并不是分析。\n\
  \n要决定应用程序需要哪种插桩（以及它是否需要插桩）或进行任何性能调优，您都必须（在某种程度上）分析代码。性能分析器是一种插桩，对于调优很有价值。同样地，理解应用程序或代码库的性能轮廓对于真正理解您的代码至关重要。应用程序将如何处理各种负载、数据输入等等？这些问题的答案是您在分析过程中想要捕捉的一些东西。\n\
  \n我讲这些是为了说明，没有哪种分析是在真空中完成的。执行代码分析是为了确保符合您想要遵循或被迫遵循的标准。一个无法运行的程序毫无价值。一个无法维护的程序同样毫无价值。在程序的生命周期中，绝大多数时间（和金钱）都将花在维护上。可维护性是在设计时决定的。\n\
  \n插桩是一种工具，在应用程序的整个生命周期中使用，用于记录有趣的信息。代码分析是一种工具，在程序投入生产运行之前，提供关于程序的有趣信息。两者对于成功、高性能、可维护的应用程序都至关重要。\n\
  \n### 执行静态分析\n\n您可以使用两种资源来执行静态分析。首先，您可以使用数据字典。每个数据库，无论版本如何，都实现了一个数据字典，您可以从中获得的信息对于分析您的代码非常有帮助。字典是您的第一道防线，并且它始终可用。\n\
  \n如果您运行的是 Oracle Database 11g 或更高版本，您还可以使用一个名为 `PL/Scope` 的功能。它使您能够看到原本无法从数据字典获得的编译时数据。我将在接下来的两个小节中讨论这两种资源——数据字典和\
  \ `PL/Scope`。\n\n#### 数据字典\n\n既然您在阅读本书，我假设您至少对 Oracle 的数据字典有些了解。如果不是，您可能在职业生涯的这个阶段阅读本章还为时过早。我不打算解释数据字典是什么；有很多其他书籍涵盖了这个主题。\n\
  \n但是，我将讨论与理解您的代码相关的视图。我不讨论 `DBA_*`、`ALL_*` 和 `USER_*` 的区别。在本次讨论中我将使用 `USER_*`，但您可以假定对应的\
  \ `ALL` 和 `DBA` 版本也存在。同样，我不会对这些视图做大量的 describe 操作。我将仅涵盖与本次讨论相关的列。\n\n![images](img/square.jpg)\
  \ `注意` 我提供的示例使用了部分字符串和字符串格式。在真实场景中，实现这些示例所示概念时，诸如 select 条件、where 子句中的内容、格式字符串等，应该存在于表中，而不是硬编码。为简洁起见，我将这些值硬编码到示例中。此外，在真实实现中，您可能会使用正则表达式来缩小查询结果范围。然而，我坚持使用常规的\
  \ PL/SQL 函数，因为大多数读者会更熟悉它们。\n\n如果您编译了本章提供的示例代码（可从本书在 `apress.com` 的目录页面获取），您将拥有我将作为示例结果展示的基本程序集。如果您拥有该代码，将更容易跟随正文。不过，如果您在自己的模式上运行它，看看会得到什么结果，可能会更有趣。\n\
  \n## USER_SOURCE\n\n这个视图自 PL/SQL 还处于**石刻时代**就已存在，`USER_SOURCE`视图非常简单，就是你代码的逐行列表。如果你想浏览或导出代码（有点像手动查看），`USER_SOURCE`就是适合你的视图。我曾使用这些数据对一段代码进行逆向工程（现在`DBMS_METADATA`是更好的方法），并且我经常使用它来快速分析某个对象在何处被使用。它非常简单，就是源代码的逐行副本。\n\
  \n以下是一个使用`USER_SOURCE`提取包含特定内容（本例中为“`jobs_api.validate_job`”）的代码行的示例：\n\n```sql\n\
  SELECT name, line\n  FROM user_source\n  WHERE lower(text) like '%jobs_api.validate_job%';\n\
  ```\n\n```\nNAME                           LINE\n------------------------------\
  \ ----------------------\nEMPLOYEE_API                   40\nTEST_CALLS_FNC    \
  \              5\nTEST_CALLS_PRC                  4\nTEST_CALLS_PRC            \
  \      8\n```\n\n这个查询曾经是数据库中代码分析的基本方法。它仍然适用于对数据库进行快速查找，但如果你看看这种查询的用例，你会发现通过使用其他视图可以获得更好的信息。\n\
  \n示例中的查询试图查找所有调用`JOBS_API.VAIDATE_JOB`程序单元的程序。不幸的是，该查询也会返回所有在注释中包含“`jobs_api.validate_job`”的调用。`USER_SOURCE`的主要问题在于它只是一个列表。我需要解析代码以丢弃注释（当你逐行查看代码时，注释可能隐藏在`/*\
  \ */`中），而且我需要解析和分离各种类型的变量、可执行语句等，以便从结果中获得任何真正的信息。我个人不想维护自己的 PL/SQL 解析器。\n\n## USER_DEPENDENCIES\n\
  \n当你想查看谁调用了谁时，`USER_DEPENDENCIES`是更好的方法。不幸的是，该视图粒度不够细，并且不允许动态依赖关系，例如`DBMS_SQL`或本地动态\
  \ SQL。分析人员必须具备特定的代码知识或手动审查代码。以下查询和结果显示了当前模式中的代码在何处引用了`JOBS_API`包：\n\n```sql\nSELECT\
  \ name, type\nFROM user_dependencies\nWHERE referenced_name = 'JOBS_API';\n```\n\
  \n```\nNAME                           TYPE\n------------------------------ ------------------\n\
  TEST_CALLS_PRC                 PROCEDURE\nTEST_CALLS_FNC                 FUNCTION\n\
  JOBS_API                       PACKAGE BODY\nEMPLOYEE_API                   PACKAGE\
  \ BODY\n```\n\n通过这些结果，你可以确切地看到哪些程序单元真正在调用`JOBS_API`，但该视图只在包级别提供。你不知道包内的哪个过程发出了调用，也不知道程序单元被调用了多少次。\n\
  \n![images](img/square.jpg) **注意** Oracle 正在添加细粒度依赖关系，未来可能会提供一个视图来给我们缺失的细粒度详细信息。\n\
  \n我讨论的其余视图都是使用存储在`USER_SOURCE`视图中的源代码（由编译器在编译时）创建的。要查看实际代码（在分析代码时经常需要），你可以回连到这个视图。\n\
  \n## USER_PROCEDURES\n\n对于许多目的，`USER_PROCEDURES`视图是比`USER_SOURCE`更好的了解一段代码的视图。该视图将提供有关代码的编译详细信息，例如它是何种类型的程序（函数、过程、包等），以及它是否是聚合的、确定性的等。可以说，与代码分析相关的最重要特性是，你可以将`USER_PROCEDURES`与下一节讨论的字典视图`USER_ARGUMENTS`结合起来，以获取程序所用参数的详细信息。\n\
  \n`USER_PROCEDURES`视图是分层的，因此你不仅可以识别所有程序，还可以识别包中存在哪些过程和函数。你还可以在此视图中看到实现方法的对象类型（关于对象和方法稍后详述）。\n\
  \n与`USER_ARGUMENTS`一样，`USER_PROCEDURES`包含与数据库中任何代码对象相关的信息。这意味着你可以找到与包、过程、函数、触发器和类型相关的信息。我将这些代码对象统称为程序和程序单元。我后面介绍的其他数据字典视图也是如此。\n\
  \n`USER_PROCEDURES`一开始可能有点令人困惑。`OBJECT_NAME`列标识对象。除非你查看的是存在于另一个对象（`PACKAGE`或`TYPE`）命名空间内的对象，否则`PROCEDURE_NAME`为空。例如，当你从`USER_PROCEDURES`中选择数据时，对于独立过程或函数，`PROCEDURE_NAME`将为空，而`OBJECT_NAME`将是该过程或函数的名称。对于包或类型，`PROCEDURE_NAME`将为空（对于包或类型对象），而`OBJECT_NAME`将是包或类型的名称。但是，每个包或类型在视图中还会有另一个条目，对应于每个函数、过程或方法。在这种情况下，`OBJECT_NAME`将是包的名称，`PROCEDURE_NAME`将是过程或函数（对于对象类型是方法）的名称。\n\
  \n以下查询显示，即使对象是一个过程，`PROCEDURE_NAME`列也为空。这是因为过程名称仅对包含多个程序单元（如包和类型）的对象进行填充。\n\n```sql\n\
  select object_name, procedure_name, object_type\n  from user_procedures\n  where\
  \ object_name = 'SECURE_DML';\n```\n\n```\nOBJECT_NAME     PROCEDURE_NAME    OBJECT_TYPE\n\
  --------------- ----------------- -------------------\nSECURE_DML              \
  \          PROCEDURE\n```\n\n另一方面，下一个查询显示，如果一个对象是包或类型，`OBJECT_NAME`是包的名称，`PROCEDURE_NAME`将包含包内过程或函数的名称：\n\
  \n```sql\nselect object_name, procedure_name, object_type\n  from user_procedures\n\
  \  where object_name = 'DEPARTMENTS_API';\n```\n\n```\nOBJECT_NAME      PROCEDURE_NAME\
  \          OBJECT_TYPE\n---------------- ----------------------- -------------------\n\
  DEPARTMENTS_API  DEPARTMENT_EXISTS       PACKAGE\nDEPARTMENTS_API  DEPARTMENT_MANAGER_ID\
  \   PACKAGE\nDEPARTMENTS_API  DEPARTMENT_MANAGER_ID   PACKAGE\nDEPARTMENTS_API \
  \                         PACKAGE\n```\n\n如果一个对象是用户定义聚合或管道函数的实现，`IMPLTYPEOWNER`和`IMPLTYPENAME`将是其底层基类型。下一个查询显示，内置聚合函数`SYS_NT_COLLECT`是实现一个类型的函数示例，而内置的`DM_CL_BUILD`是实现一个类型的管道函数。\n\
  \n```sql\nselect object_type, aggregate, pipelined, impltypeowner, impltypename\n\
  \  from all_procedures\n  where owner = 'SYS'\n    and (object_name = 'SYS_NT_COLLECT'\n\
  \        or\n        object_name = 'DM_CL_BUILD');\n```\n\n\n`对象类型 聚合 管道化 实现类型所有者\
  \       实现类型名称`\n`------------ --------- --------- --------------- ------------------------------`\n\
  `函数         是        否        SYS             SYS_NT_COLLECT_IMP`\n`函数         否\
  \        是        SYS             DMCLBIMP`\n\n此视图中的每个对象都有一个 `OBJECT_ID` 和一个 `SUBPROGRAM_ID`。`OBJECT_ID`\
  \ 可被视为此视图的主键（实际上是字典中对象的主键）。当与其他字典对象连接时（稍后我将用 `USER_ARGUMENTS` 做示例），`OBJECT_ID` 将是我用于连接的唯一\
  \ ID。如果代码是独立的，例如一个存储过程或函数，`SUBPROGRAM_ID` 始终为 1。如果代码属于一个包，则 `subprogram_id` 将为 0，包中的每个存储过程和函数将使\
  \ `subprogram_id` 递增 1。\n\n`OVERLOAD` 列对于理解一段代码非常有用。如果在一个包中重载了一个存储过程或函数，`OVERLOAD`\
  \ 将从 1 开始，并且对于该重载子程序的每个迭代递增 1。`SUBPROGRAM_ID` 始终递增，因此一个重载的存储过程将与该存储过程的重载版本具有不同的\
  \ `SUBPROGRAM_ID`。\n\n结合 `USER_ARGUMENTS` 视图，你可以准确地查询重载存储过程的区别。我将在下一节提供一个示例。单独来看，`USER_PROCEDURES`\
  \ 视图可用于命名标准检查，以及检查你可能感兴趣的编译信息，例如 `PIPELINED`、`AUTHID` 或 `DETERMINISTIC`。\n\n###\
  \ USER_ARGUMENTS\n\n当你将 `USER_ARGUMENTS` 视图纳入考虑时，你可以开始查找有关代码及其参数的精细细节。刚开始使用时，查询这些数据可能会令人困惑。其对象命名方式与\
  \ `USER_PROCEDURES` 视图截然不同。\n\n在此视图中，`OBJECT_NAME` 是拥有参数的程序的名称。无论该程序是独立的，还是位于包或类型中，存储过程或函数的名称都将出现在\
  \ `OBJECT_NAME` 字段中。如果 `PROCEDURE` 或 `FUNCTION` 位于包中，`PACKAGE_NAME` 将有值——否则将为 `NULL`。`ARGUMENT_NAME`\
  \ 是参数的实际名称。\n\n请注意，在 `USER_PROCEDURES` 中，`object_name` 是顶级对象。在包的情况下，它将是包或类型名称。对于独立代码，它将是存储过程名称、触发器名称或函数名称。在\
  \ `USER_ARGUMENTS` 中，`object_name` 是子程序名称。它始终是存储过程、函数或触发器的名称。在包的情况下，`object name`\
  \ 将是子程序，而 `package name` 将是包的名称。这对于连接这两个表非常重要（请参见下一个查询示例）。\n\n如果参数是一个锚定类型（`EMPLOYEES.EMPLOYEE_ID%TYPE`），你将看不到锚定类型。你会看到基础数据类型（例如\
  \ `NUMBER`）作为参数类型。但是，如果代码是使用锚定类型创建的，除了数据类型外，你还会看到该锚定值的精度和范围。通常你无法在参数中指定精度或范围，但由于\
  \ Oracle 知道基础对象的精度和范围，因此可以跟踪该信息。如果你想知道是*哪个*锚定类型，这并没有真正帮助。尽管如此，可用的信息仍然有用。\n\n作为数据库架构师，我关注的一个重要问题是标准合规性。命名是否正确？是否使用了正确的数据类型？以下示例是我在\
  \ PL/Scope 出现之前使用的一个查询。它是确保程序单元参数命名标准合规性的一种简单方法。\n\n```sql\nselect package_name,\
  \ object_name, argument_name,\n          position, in_out, data_type\n  from user_arguments\n\
  \  where argument_name not like 'P_%';\n```\n\n```\nPACKAGE_NAME  OBJECT_NAME  ARGUMENT_NAME\
  \  POSITION  IN_OUT DATA_TYPE\n------------- ------------ -------------- ---------\
  \ ----------- -----------------------\nJOBS_API      JOB_EXISTS   JOB_TITLE    \
  \  1         IN         VARCHAR2\n```\n\n下一个示例是一个查询，它显示了一个重载存储过程参数的差异。我本可以只基于 `USER_ARGUMENTS`\
  \ 视图来编写它，但我想展示一个连接两个视图的例子。\n\n```sql\nselect ua.package_name, up.procedure_name,\
  \ ua.argument_name, up.overload, position, IN_OUT\n  from user_procedures up\n \
  \ join user_arguments ua\n  on (ua.object_name = up.procedure_name\n  and ua.subprogram_id\
  \ = up.subprogram_id)\n  where up.overload is not null\n  order by overload, position;\n\
  ```\n\n```\nPACKAGE_NAME     PROCEDURE_NAME          ARGUMENT_NAME       OVERLOAD\
  \   POSITION IN_OUT\n---------------- ----------------------- -------------------\
  \ ---------- --------\nDEPARTMENTS_API  DEPARTMENT_MANAGER_ID                  \
  \     1          0        OUT\nDEPARTMENTS_API  DEPARTMENT_MANAGER_ID   P_DEPARTMENT_NAME\
  \   1          1        IN\nDEPARTMENTS_API  DEPARTMENT_MANAGER_ID             \
  \          2          0        OUT\nDEPARTMENTS_API  DEPARTMENT_MANAGER_ID   P_DEPARTMENT_ID\
  \     2          1        IN\n```\n\n注意 `POSITION` 和 `IN_OUT` 列。存储过程 `DEPARTMENT_MANAGER_ID`\
  \ 实际上是一个函数。`IN_OUT` 列是“OUT”，位置是 0。对于函数，位置 0 是返回值（函数必须始终有返回值）。通过查看位置，你可以推断出一个程序单元是函数。函数返回值也没有参数名。如果你在\
  \ `USER_ARGUMENTS` 表中有一条没有名称的记录，那就是 `RETURN`。如果一个程序单元没有参数，它在 `USER_ARGUMENTS` 视图中将没有记录。\n\
  \n以下查询显示存储过程 `SECURE_DML` 存在于 `USER_PROCEDURES` 视图中：\n\n```sql\nSELECT count(*)\
  \ FROM user_procedures\nWHERE object_name = 'SECURE_DML';\n```\n\n```\nCOUNT(*)\n\
  ----------------------\n1\n```\n\n然而，下一个查询显示，即使存储过程 `SECURE_DML` 作为一个过程存在，它也没有参数，因此在\
  \ `USER_ARGUMENTS` 视图中不会有任何记录：\n\n```sql\nSELECT count(*) FROM user_arguments\n\
  WHERE object_name = 'SECURE_DML';\n```\n\n```\nCOUNT(*)\n----------------------\n\
  0\n```\n\n另一个值得检查的标准，特别是因为它很容易自动化，就是验证你的标准禁止使用的数据类型（`CHAR`、`LONG`、`VARCHAR` 等）可以被轻松查询和质疑。尽管\
  \ PL/SQL 中的 `LONG` 现在只是 `VARCHAR2` 的子类型（与表中的 `LONG` 相对），但我见过许多标准要求 PL/SQL 代码使用 `VARCHAR2(32767)`\
  \ 代替。\n\n你可以使用以下查询相当容易地验证参数的数据类型信息：\n\n```sql\nSELECT object_name, argument_name,\
  \ data_type\n  FROM user_arguments\n  WHERE data_type IN ('CHAR', 'LONG', 'VARCHAR');\n\
  ```\n\n```\nOBJECT_NAME                    ARGUMENT_NAME                  DATA_TYPE\n\
  ------------------------------ ------------------------------ ------------------------------\n\
  BAD_DATA_TYPES_PRC             P_DATA_IN                      CHAR\nBAD_DATA_TYPES_PRC\
  \             P_DATA_OUT                     LONG\n```\n\n不幸的是，你*只能*从此视图获取参数的此类信息。当你验证这类信息时，你通常还希望验证变量以及参数。关于\
  \ PL/Scope 的部分将向你展示如何执行此操作。\n\n\n\n##### USER_TYPES\n\n`USER_TYPES` 视图提供关于你所拥有的类型的信息。虽然你可能不认为类型是\
  \ PL/SQL 对象，但许多（尽管不是全部）类型都有类型主体。类型主体就像其他任何程序单元一样是 PL/SQL。纯粹从 PL/SQL 的角度来看，此视图中重要的列是方法数量\
  \ (`METHODS`)、`LOCAL_METHODS`，以及超类型列 `SUPERTYPE_NAME` 和 `OWNER`。在接下来的几段中，我将假定读者对\
  \ Oracle 的对象类型系统有所了解。\n\n快速查询此视图可以确定该类型是否包含任何 PL/SQL。如果方法数量大于 0，则规格说明（spec）背后就会有代码（即，一个主体）。此外，如果超类型列不为空，这意味着这是一个子类型。它从其超类型继承了一个规格说明（以及可能继承了一个主体）。同样重要的是\
  \ `LOCAL_METHODS` 列；这是在子类型中定义的方法数量（如果不是子类型则为 0，或者如果没有覆盖或扩展任何内容，也可能为 0）。\n\n以下查询针对本章示例代码中提供的三个对象类型运行。这三个类型包括：一个没有主体（没有\
  \ PL/SQL）的类型、一个集合类型和一个带有主体的类型。\n\n```sql\nSELECT type_name, typecode, attributes,\
  \ methods, supertype_name, local_methods\nFROM user_types;\n```\n\n```\nTYPE_NAME\
  \          TYPECODE     ATTRIBUTES     METHODS    SUPERTYPE_NAME       LOCAL_METHODS\n\
  ------------------ ------------ -------------- ---------- -------------------- -------------\n\
  CODE_INFO          OBJECT       7              0\nCODE_INFOS         COLLECTION\
  \   0              0\nDEMO_TYPE          OBJECT       1              3\n```\n\n\
  从输出中你可以看到，`CODE_INFO` 有七个属性，没有代码（没有方法），不从超类型继承，这意味着没有本地方法。`CODE_INFOS` 是一个集合。注意，它自身没有属性。`DEMO_TYPE`\
  \ 有一个属性和三个方法。后者有 PL/SQL 供你查看。\n\n##### USER_TYPE_METHODS\n\n在调试类型体中的 PL/SQL 代码时，有一些重要的信息你需要知道——不仅在于代码如何编写，还在于方法如何定义。虽然所有列都有其价值，但对于了解你的代码来说，重要的列包括\
  \ `METHOD_NO`、`METHOD_TYPE`、`PARAMETERS`、`RESULTS`、`OVERRIDING` 和 `INHERITED`。\n\
  \n当你将 `USER_TYPE_METHODS` 与 `USER_PROCEDURES` 连接时，需将 `USER_TYPE_METHODS` 中的类型名连接到\
  \ `USER_PROCEDURES` 中的 `OBJECT_NAME`，并将 `METHOD_NO` 连接到 `SUBPROGRAM_ID`。`SUBPROGRAM_ID`\
  \ 也会流入 `USER_ARGUMENTS` 视图。\n\n如果你有重载的方法，`OVERLOAD` 列会有一个递增的序列号。如果 `OVERLOAD` 为空，则该方法未被重载。在使用\
  \ Oracle 类型系统时，重载方法非常常见，尤其是在构造函数中。\n\n以下查询显示 `DEMO_TYPE` 类型提供了三个方法。成员过程 `OVERLOAD_PROC`\
  \ 是重载的，而成员函数 `FUNC` 不是。\n\n```sql\nSELECT utm.type_name, utm.method_type, utm.method_name,\
  \ up.overload,\n       utm.parameters, utm.results\n  FROM user_type_methods utm\n\
  \  JOIN user_procedures up\n   ON (utm.type_name = up.object_name\n       AND\n\
  \       utm.method_no = up.subprogram_id)\n  WHERE utm.type_name = 'DEMO_TYPE';\n\
  ```\n\n```\nTYPE_NAME      METHOD_TYPE METHOD_NAME    OVERLOAD   PARAMETERS    RESULTS\n\
  -------------- ----------- -------------- ---------- ------------- ----------------------\n\
  DEMO_TYPE      PUBLIC      FUNC                      2             1\nDEMO_TYPE\
  \      PUBLIC      OVERLOAD_PROC  1          2             0\nDEMO_TYPE      PUBLIC\
  \      OVERLOAD_PROC  2          2             0\n```\n\n`METHOD_TYPE` 告诉你方法的基本信息。它是\
  \ `PUBLIC` 方法（常规用法），还是 `ORDER` 或 `MAP` 类型（用于等价性比较）？\n\n`PARAMETERS` 和 `RESULTS`\
  \ 提供了方法的输入和输出。这两列实际上分别提供了输入和输出值的数量。在接下来的示例中，我将展示如何使用此视图以及你对 `PARAMETERS` 的了解，通过\
  \ `USER_ARGUMENTS` 来查找参数。你可能想知道为什么所有方法都说有两个参数，而它们定义时只有一个参数。类型方法总是包含 `SELF` 参数，即使它没有包含在规格说明中，或者在方法体中被引用。它总是被传入的。\n\
  \n`INHERITED` 和 `OVERRIDING` 分别告诉你该方法是从超类型继承的，还是覆盖了超类型中的方法。在调试和分析时，知道代码是否来自超类型非常重要。确保你正在查看正确的代码是至关重要的。\n\
  \n`USER_TYPE_METHODS` 不仅可以与 `USER_PROCEDURES` 连接，还可以与 `USER_ARGUMENTS` 连接，以获取关于你的对象类型的更多详细信息。以下查询显示了连接后的几行结果。这是一个用于验证命名规范和/或捕捉无效数据类型使用情况的绝佳查询。\n\
  \n```sql\n  SELECT utm.type_name, utm.method_name, ua.argument_name,\n       position,\
  \ sequence, data_type\n  FROM user_type_methods utm\n  JOIN user_procedures up\n\
  \   ON (utm.type_name = up.object_name\n       AND\n       utm.method_name = up.procedure_name)\n\
  \  JOIN user_arguments ua\n  ON (up.procedure_name = ua.object_name\n      AND\n\
  \      up.object_name = ua.package_name)\n WHERE utm.type_name = 'DEMO_TYPE'\n \
  \  AND rownum < 5;  -- usign rownum just to keep the example short\n```\n\n```\n\
  TYPE_NAME   METHOD_NAME      ARGUMENT_NAME  POSITION   SEQUENCE  DATA_TYPE\n-----------\
  \ ---------------- -------------- ---------- --------- ------------\nDEMO_TYPE \
  \  FUNC                          0          1         NUMBER\nDEMO_TYPE   FUNC \
  \             SELF         1          2         OBJECT\nDEMO_TYPE   FUNC       \
  \       P_VALUE      2          3         VARCHAR2\nDEMO_TYPE   OVERLOAD_PROC  \
  \   SELF         1          1         OBJECT\n```\n\n##### USER_TRIGGERS\n\n`USER_TRIGGERS`\
  \ 包含有关在你的数据库中定义的触发器的信息。虽然它是查找代码的有用位置，并且确实包含有关触发器及其定义方式的有用信息，但它不包含太多关于代码本身的信息。请将此视图与遍历\
  \ `USER_SOURCE` 结合使用，以便逐行快速查看代码。\n\n\n\n"
- '# PL/SCOPE


  PL/SCOPE 是 PL/SQL 编译器的一项功能，它为数据字典扩展提供数据。该功能获取编译时收集的信息（编译器本就需要的信息）并将其放入一个视图（通常有三个：`USER_*`、`ALL_*`
  和 `DBA_*`）中，名为 `USER_IDENTIFIERS`。数据字典提供有关在 PL/SQL 代码中使用的变量和其他标识符的信息。除了显示所有标识符的名称外，它还能识别变量是什么（数据类型以及变量与参数等的区别）、它们如何被使用（声明、引用、赋值等）以及它们在何处被使用（声明、赋值等的上下文）。


  ![images](img/square.jpg) `注意` PL/Scope 是版本 11g 及以上的一个特性。如果您仍在使用低于 11.0 的版本，您将需要升级才能同时利用
  PL/Scope 和 `DBMS_HPROF`（动态分析将在后面讨论）。如果您使用的是早期版本，您可以从前面讨论的字典视图中获取部分此类信息。我建议升级，因为在
  11g 中您将受益于除代码分析之外的许多其他功能。


  您代码中使用的每个标识符（这对任何语言都适用，而不仅仅是 PL/SQL）都有一个上下文。这个上下文是使用分析中最重要的部分。一个变量可能在包（`DECLARATION`）内的一个过程（`DEFINITION`）中定义。值的赋值可能在定义时发生，也可能在后面的代码主体中作为赋值步骤发生。对于变量或迭代器，您将能够看到代码中任何未被引用（`REFERENCEd`）的变量。对于过程或函数，您可以发现它是否曾被调用（`CALLed`）。接下来我将更详细地展示这方面的示例。


  ## 什么是标识符？


  标识符是您可以在代码中使用的任何东西。您可以使用一个过程（您调用它）。您可以使用一个变量（您可以给它赋值或从中读取值）。您可以使用数据类型（看起来很奇怪，但当您声明变量、常量、迭代器等时就会用到它们）。您可以使用触发器、同义词、形式参数，甚至异常。标识符基本上是您可以在代码中使用或引用（嵌入式
  SQL 除外）的任何东西。


  以下是您在使用 PL/SQL 时会遇到的不同类型的标识符：


  *   使用的数据类型和子类型（包括集合）

  *   游标和 REF 游标

  *   过程

  *   函数

  *   包和包体

  *   触发器

  *   对象类型和类型体

  *   参数

  *   函数返回值

  *   变量、迭代器、常量

  *   异常

  *   同义词（不会解析为任何实际对象，没有验证）


  每个在 `USER_IDENTIFIERS` 视图中都有一个唯一的签名列。这个签名是由 Oracle 提供的十六进制字符串——它在数据库中是唯一的。如果您有一个名为
  `v_my_id` 的标识符在两个不同的包或独立过程中声明，那么签名在这些程序单元中将是唯一的。如果您在同一个程序单元内的多个作用域中标识了同一个变量，每个变量都将有自己的签名。包内重载的过程也会有两个不同的签名。


  ## 标识符的作用域


  PL/Scope 通过理解上下文，可以提供变量的作用域，因此得名 PL/Scope。这种能力在大多数情况下并非至关重要，但在某些情况下会有所帮助。一个例子是，当您在两个作用域中定义了同一个变量却没有意识到时。您可能认为您正在为较高作用域的变量赋值，但实际上是在为局部作用域的变量赋值。PL/Scope
  显示的赋值无法告诉您您原本想做什么，但至少您会看到同一个调用栈中在多个作用域声明了相同的变量（不良实践警示）。您可以通过始终引用变量的命名作用域来最小化这种危险，但我发现这会使代码更难以维护而不是更容易。我只是尽量不重用名称。


  同样地，PL/Scope 通过理解上下文，可以提供过程代码的调用栈。动态代码分析（稍后将介绍）的用途之一是验证代码覆盖率。代码覆盖率是在回归测试中实际执行所有代码。PL/Scope
  可以给您一个静态视图，至少显示每个程序单元被引用。如果您有一个定义了但从未被调用的过程，这不一定是坏事（它可能从外部上下文被调用），但它确实提供了可以审查的额外信息。


  说到外部上下文，PL/Scope 确实会显示在外部上下文中被调用（`CALLed`）或引用（`REFERENCEd`）的标识符。只要外部上下文是用 PL/Scope
  开启编译的，您就可以连接到该外部引用。例如，当您声明一个 `NUMBER` 类型的变量时，它会对外部的 `DATATYPE_NUMBER`（在 `DBMS_STANDARD`（一个
  Oracle 标准包）中声明的子类型）进行外部引用。这将是一个外部上下文（从当前程序单元的角度看是外部的）。


  如果一个程序单元中的一个过程调用了另一个程序单元中的一个过程，并且两个过程都使用了 PL/Scope，您就可以看到完整的调用栈。您无法跟踪栈进入外部 C 过程或
  Java 单元，因为它们不受 PL/Scope 覆盖。相反，您会看到调用（`CALL`），而栈将在此处终止（嗯，不是终止；当外部引用返回时，您会重新拾起栈）。



  '
- "# PL/Scope 数据收集与配置\n\n##### 收集的数据\n\nPL/Scope 收集的数据包括标识符的名称、用法及其使用上下文。它还包括定义标识符的对象、对象类型以及使用的行和列。\n\
  \n用法是指标识符被使用的方式。数据类型由变量定义使用；过程可以被声明、定义和调用。以下是 PL/Scope 跟踪的用法：\n\n*   **声明**：首次识别标识符，例如包。\n\
  *   **定义**：标识符的实现，例如包体中的过程。\n*   **赋值**：更改标识符的值，例如变量或迭代器。\n*   **引用**：检查标识符的值（包括引发异常）。\n\
  *   **调用**：执行标识符，例如过程、函数、游标。\n\n![images](img/square.jpg) **注意** 数据类型是标识符的上下文，而不是属性，因为并非所有标识符都有数据类型。过程是标识符但没有数据类型。\n\
  \n`USER_IDENTIFIERS` 视图中的所有列都很重要。表 7-1 包含了视图中的列及其简要描述。\n\n![images](img/t0701.jpg)\n\
  \n为了更好地理解用法列，你需要查看视图中的原始数据。以下是对该视图的一个示例查询。输出结果是你在自己的查询中会看到的典型情况。请注意，在你使用 PL/Scope\
  \ 编译代码（下一节“配置 PL/Scope”将解释）之前，该视图将为空。\n\n```sql\nSELECT * FROM (\n  SELECT object_name,\
  \ name, type, usage, usage_id, usage_context_id\n    FROM user_identifiers\n   \
  \ WHERE object_name = 'JOBS_API'\n      AND object_type = 'PACKAGE BODY'\n    ORDER\
  \ BY line, col, usage_id)\nWHERE rownum < 6; -- 保持小巧\n```\n\n```\nOBJECT_NAME  NAME\
  \          TYPE         USAGE       USAGE_ID   USAGE_CONTEXT_ID\n------------ -------------\
  \ ------------ ----------- ---------- ----------------------\nJOBS_API     JOBS_API\
  \      PACKAGE      DEFINITION  1          0\nJOBS_API     JOB_EXISTS    FUNCTION\
  \     DEFINITION  2          1\nJOBS_API     JOB_TITLE     FORMAL IN    DECLARATION\
  \ 3          2\nJOBS_API     V_JOB_ID      VARIABLE     DECLARATION 4          2\n\
  JOBS_API     V_JOB_ID      VARIABLE     ASSIGNMENT  5          2\n```\n\n第一个用法（`USAGE_ID\
  \ = 1`）是包定义。这个程序单元的上下文是 0。它是程序单元中的第一个用法，所以 `USAGE_CONTEXT_ID` 是 0。你不能在程序单元之间混合匹配用法或上下文，甚至在规范和包体之间也不行。\n\
  \n第二行是一个函数定义。`USAGE_ID` 是 2，上下文是 1。这意味着 `USAGE_ID` 2 是 `USAGE_ID` 1 的子项。该函数属于这个包。\n\
  \n第三行是一个参数，第四行是一个变量声明，第五行是对第四行定义的变量的赋值。所有这些用法都是该函数的子项，因此 `USAGE_CONTEXT_ID` 是 2（它们都位于函数体内）。\n\
  \n如果你有一个重载的程序单元，`SIGNATURE` 列将唯一标识正在调用的是哪个版本。签名始终是所引用标识符的签名，不一定是对象中的当前标识符。\n\n以下查询显示，重载的过程即使名称相同，也会有不同的签名：\n\
  \n```sql\nSELECT name, usage, signature\nFROM user_identifiers\nWHERE object_name\
  \ = 'PLSCOPE_SUPPORT_PKG'\n  AND object_type = 'PACKAGE'\n  AND name = 'SOURCE_LOOKUP'\n\
  ORDER BY line, col, usage_id;\n```\n\n```\nNAME                       USAGE    \
  \   SIGNATURE\n------------------------------ ----------- --------------------------------\n\
  SOURCE_LOOKUP              DECLARATION A633B1818ABD9AE3739E5A0B6D86EBB8\nSOURCE_LOOKUP\
  \              DECLARATION 3ED2FA822BD27B5B10F44226DCB93E0E\n```\n\n##### 配置 PL/Scope\n\
  \nOracle 文档指出，PL/Scope 面向应用开发人员，通常用于开发阶段。我对此持保留态度。它应该被任何编译 PL/SQL 的人使用，并且应该在你工作的任何数据库（开发、测试和生产）中使用。PL/Scope\
  \ 将其数据存储在 `SYSAUX` 表空间中，占用空间非常小（所以这不应该成为问题）。运行 PL/Scope 也是一项编译时活动，而不是运行时活动，因此没有性能损失（不像开启调试编译那样）。它可能会稍微增加编译时间，但我自己并未察觉到。\n\
  \nPL/Scope 非常容易配置。如前所述，它是一项编译时活动，因此在编译程序单元之前启用。使用的编译器设置称为 `PLSCOPE_SETTINGS`。用户，或者更可能是用户的\
  \ IDE，将使用 `ALTER SESSION` 命令来开启 PL/Scope。你也可以通过 `ALTER SYSTEM` 全局设置，或使用 `ALTER COMPILE`\
  \ 语句针对单个程序单元进行设置。下面我将展示每种方法的示例。\n\n目前，它只有一个开启（ALL）或关闭（NONE）的开关，但将来可能会允许一些粒度控制。在\
  \ 11.2 及更低版本中，默认值是 NONE。我预计随着时间的推移，ALL 会成为默认值，但这只是我的个人偏好。\n\n要在会话级别开启 PL/Scope 收集，请使用以下命令：\n\
  \n```sql\nALTER SESSION SET PLSCOPE_SETTINGS = 'IDENTIFIERS:ALL';\n```\n\n要关闭标识符收集，请使用以下命令：\n\
  \n```sql\nALTER SESSION SET PLSCOPE_SETTINGS = 'IDENTIFIERS:NONE';\n```\n\n在系统级别开启和关闭类似。我不打算详细介绍\
  \ `ALTER SYSTEM` 命令及其存储值的方式，但一个例子可能是：\n\n```sql\nALTER SYSTEM SET PLSCOPE_SETTINGS\
  \ = 'IDENTIFIERS:ALL';\n```\n\n要编译一个带有标识符收集的对象，请使用相应的 `ALTER` 命令（`PROCEDURE`、`PACKAGE`、`TRIGGER`、`FUNCTION`、`TYPE`\
  \ 等），如下所示：\n\n```sql\nALTER PACKAGE batch_overlord COMPILE PLSCOPE_SETTINGS = 'IDENTIFIERS:ALL';\n\
  ```\n\n编译程序单元后，你可以使用视图 `USER_PLSQL_OBJECT_SETTINGS` 来查看设置，如下所示：\n\n```sql\nSQL>\
  \ SELECT type, plscope_settings\n     FROM user_plsql_object_settings\n    WHERE\
  \ name = 'EMPLOYEE_API';\n```\n\n```\nTYPE         PLSCOPE_SETTINGS\n------------\
  \ ---------------------------------------------------------------------\nPACKAGE\
  \      IDENTIFIERS:ALL\nPACKAGE BODY IDENTIFIERS:ALL\n```\n\n就是这么简单。一旦设置完成，你就可以开始使用它了。别忘了在开启\
  \ PL/Scope 的情况下重新编译你的代码。\n\n\n"
- '# 变更影响分析


  变更影响分析允许开发人员或分析师评估代码中计划变更对其他代码区域的影响。根据我的经验，影响分析非常罕见。通常的做法似乎是进行变更，然后事后才发现影响。这在时间、金钱和声誉方面可能代价高昂。提前了解要好得多，这样可以分析和规划影响，而不是在将代码移动到测试（或更糟的生产）环境后才遇到问题。


  当完成影响分析时，您或进行分析的人员应该对需要更改的对象有相当深入的了解。您不仅会知道哪些对象需要更改，还可以为每个要更改的对象创建测试用例，并为所有已更改的对象规划和估算回归测试。通过提前知道要测试哪些对象，您还能安排时间进行适当的性能测试，以确保变更不会对应用程序性能产生负面影响。


  影响分析的问题在于，确实没有一种适用于所有情况的分析方法。在数据库应用程序中，可能发生多种类型的变更：数据变更（数据类型或数量的更改，例如添加新来源）、模式变更（数据库结构的更改）和代码变更。PL/SQL
  书籍无法为您提供太多处理数据变更的方法；这非常特定于应用程序。对于模式变更，`USER_DEPENDENCIES` 视图仍然是查看模式中哪些对象引用其他对象的最佳选择。本节的其余部分将讨论代码变更（这可能与数据或模式变更相关，或是其结果）。


  在我工作过的大多数组织中，进行影响分析的方式要么是假设你对应用程序及其所有使用情况拥有全知知识，要么是更改一个对象并查看它在下游对象中使哪些对象无效。这两种方法都很糟糕。首先，如果你已经在更改对象，那么你已经过了估算阶段，而这正是你真正想要开始这个过程的时候。其次，无法确切指示是什么导致了失效。这是一种高度繁琐且容易出错的方法。


  使用数据字典中的可用数据来运行报告并获取与变更相关的精确数据列表，这不是更好的方法吗？然后，人类可以利用这种（大部分，希望是）自动化的数据收集。


  开始进行影响变更分析的方法是将需求分解为组成部分。每个部分包含一个变更，该变更（通常）对应用程序有一些影响。下一步是确定所有将受到影响的单元。


  这种分解可以在对象级别（例如包级别）进行。然而，在那个高度上，你会遇到如前面在 `USER_SOURCE` 和 `USER_DEPENDENCIES` 部分中描述的所有问题。理想情况下，你可以在不依赖代码逐行扫描的情况下，对源代码有一个非常细粒度的视图。`PL/Scope`
  可以提供程序单元被其他程序单元调用的非常细粒度的视图。请注意，`PL/Scope` 对外部代码或从视图调用的代码没有帮助。对于视图支持，你会使用依赖视图；对于外部代码和
  Java，你会使用数据库外部的工具。


  我没有在本书中包含它，但我还经常提取相关信息并将其存储在我自己的表中。我会将父/子记录折叠为单条记录（例如，折叠行以组合 `package.function`
  调用）。这样，我有一个多遍系统，允许使用更易于维护的查询来处理更大范围的程序。在这里解释我使用的完整系统超出了范围，但当你开始编写自己的查询时，请记住，你可以编写查询的一部分，保存这些结果，然后针对保存的数据编写查询。


  本章提供的演示代码中有一个名为 `PLSCOPE_SUPPORT_PKG` 的包。这个包包含一些用于处理 `PL/Scope` 各个方面的有用代码。我将从过程
  `PRINT_IMPACTS` 开始，它是一个重载过程。我首先使用的版本接受程序单元所有者（`P_OWNER`）、名称（`P_OBJECT`）和子单元名称（`P_UNIT`）作为参数。


  让我们看一个例子。假设你计划更改 `HR.JOBS_API.VALIDATE_JOB` 过程，使其接受一个额外的参数或更改返回数据类型。你会想知道该函数的所有调用位置。对支持包的示例调用如下所示：


  ```sql

  SQL> exec plscope_support_pkg.print_impacts(''HR'', ''JOBS_API'', ''VALIDATE_JOB'');

  ```


  ```

  Impact to PACKAGE BODY HR.EMPLOYEE_API.CREATE_EMPLOYEE at line 40 and column 12

  Impact to PROCEDURE HR.TEST_CALLS_PRC at line 8 and column 8

  Impact to PROCEDURE HR.TEST_CALLS_PRC at line 4 and column 6

  Impact to FUNCTION HR.TEST_CALLS_FNC at line 5 and column 10


  PL/SQL procedure successfully completed.

  ```


  从这个视图中，你可以看到三个对象受到影响，其中一个对象（`HR.TEST_CALLS_PRC`）被影响了两次。在这个小的应用程序中，查询 `USER_SOURCE`
  或使用 `grep` 搜索代码仓库并目测结果可能同样容易。然而，在非常大的系统中，这种简洁性使分析变得容易得多。


  如果你想在输出中看到源文本，你可以向 `PRINT_IMPACTS` 调用传递一个可选的 `BOOLEAN` 参数，如下所示：


  ```sql

  SQL> set serveroutput on format wrapped

  SQL> exec plscope_support_pkg.print_impacts(''HR'', ''JOBS_API'', ''VALIDATE_JOB'',
  TRUE);

  ```


  ```

  Impact to PACKAGE BODY HR.EMPLOYEE_API.CREATE_EMPLOYEE at line 40 and column 12

      TEXT:

                IF NOT jobs_api.validate_job(p_job_t

            tle, p_department_name)


  Impact to PROCEDURE HR.TEST_CALLS_PRC at line 8 and column 8

      TEXT:

                IF JOBS_API.VALIDATE_JOB(''a'', ''b'')


  Impact to PROCEDURE HR.TEST_CALLS_PRC at line 4 and column 6

      TEXT:

              IF JOBS_API.VALIDATE_JOB(''a'', ''b'')


  Impact to FUNCTION HR.TEST_CALLS_FNC at line 5 and column 10

      TEXT:

              RETURN JOBS_API.VALIDATE_JOB(''a'', ''b'')


  PL/SQL procedure successfully completed.

  ```


  这段代码只是一个演示，但它展示了如何使用 `PL/Scope` 遍历标识符的层次结构，以找到关于你的代码的许多宝贵信息。这些影响分析过程的核心是来自 `PLSCOPE_SUPPORT_PKG.GET_IMPACT_INFO`
  的这个查询。（注意，我简化了过程和主要查询，以便它们能更好地作为示例。一个可以处理嵌套块的示例会稍微复杂一些，对于本节的目的来说是不必要的。只需知道此代码是一个演示和起点，而不是一个完整的影响分析程序。）以下代码来自
  `PLSCOPE_SUPPORT_PKG.GET_IMPACT_INFO`，是起始于第 54 行的 `FOR LOOP` 查询：



  '
- "# PL/Scope 代码分析与命名标准验证\n\n### 查询结构与说明\n\n```sql\nSELECT code_info( ai.owner,\n\
  \                  prior_object_name,\n                  CASE\n                \
  \  WHEN ai.object_type IN ('PROCEDURE', 'FUNCTION')\n                  THEN NULL\n\
  \                  ELSE\n                    ai.name\n                  END,\n \
  \                 ai.object_type,\n                  'CALL',\n                 \
  \ cnctby_vw.line,\n                  cnctby_vw.p_col ) code_value\n        FROM\
  \ all_identifiers ai, (\n   SELECT usage, level, usage_id, usage_context_id, PRIOR\
  \ usage_id p_usage_id,\n          PRIOR usage_context_id prior_usagectx_id,\n  \
  \        object_name, name, object_type, type, line, PRIOR col p_col,\n        \
  \  PRIOR object_name prior_object_name, PRIOR name p_name,\n          PRIOR object_type\
  \ prior_object_type\n      FROM all_identifiers\n      WHERE OWNER = p_owner\n \
  \       AND OBJECT_TYPE IN ('PACKAGE BODY', 'PROCEDURE', 'FUNCTION', 'TRIGGER',\
  \ 'TYPE BODY')\n        AND USAGE NOT IN ('DECLARATION', 'ASSIGNMENT', 'DEFINITION')\n\
  \        AND type IN ('PACKAGE BODY', 'FUNCTION', 'PROCEDURE', 'TYPE', 'TYPE BODY')\n\
  \      CONNECT BY PRIOR usage_id = usage_context_id\n         AND PRIOR name = p_object\n\
  \         AND name = p_unit\n         AND prior usage_context_id != 0 )  cnctby_vw\n\
  \  WHERE ai.usage_id = cnctby_vw.prior_usagectx_id\n    AND ai.object_name = cnctby_vw.prior_object_name\n\
  \    AND ai.object_type = cnctby_vw.prior_object_type  )\n```\n\n内部查询 (`cnctby_vw`)\
  \ 是一个层次查询，用于获取已更改的程序单元信息。此查询专门查找包调用。它很容易修改为查找任何类型的调用；这个练习留给您完成。将其修改为查找过程或函数调用比查找包调用或对象方法更容易。\n\
  \n外部查询将已更改的单元（被调用的程序单元）与子单元（包中的过程或函数）联系起来，或者如果它是独立的，则与独立单元联系起来。\n\n在使用此查询作为基础创建您自己的影响分析查询之前，我建议您从内部查询开始并试用一段时间。该基本查询可以修改为返回\
  \ PL/Scope 提供的几乎任何两个相关项。\n\n##### 验证命名标准合规性\n\n与 `USER_PROCEDURES`、`USER_ARGUMENTS`\
  \ 和 `USER_TYPE` 系列视图类似，PL/Scope 可以提供有关命名标准合规性的信息。不过，PL/Scope 更胜一筹，因为您可以验证包内部变量的命名以及过程和函数主体中的命名，而不仅仅是参数和程序单元的命名。\n\
  \n以下查询将查找所有不以 'V_' 开头的变量和不以 'P_' 开头的参数。它可以使用代码分析部分中的层次查询进行扩展，以验证全局变量和子类型。\n\n```sql\n\
  SELECT  ui_var.name, type, usage, line, col\n  FROM user_identifiers ui_var\n  WHERE\
  \ ui_var.object_name = 'JOBS_API'\n    AND ui_var.object_type = 'PACKAGE BODY'\n\
  \    AND (\n          (ui_var.type = 'VARIABLE' AND name NOT LIKE 'V_%')\n     \
  \ OR\n          (ui_var.type IN ('FORMAL IN', 'FORMAL OUT', 'FORMAL IN OUT')\n \
  \             AND name NOT LIKE 'P_%')\n        )\n    AND ui_var.usage = 'DECLARATION'\n\
  \  ORDER BY line, col;\n```\n\n```\nNAME                TYPE               USAGE\
  \       LINE       COL\n------------------- ------------------ ----------- ----------\
  \ -------\nJOB_TITLE           FORMAL IN          DECLARATION 4          5\n```\n\
  \n如果您查看 `JOBS_API` 中从第 4 行开始的代码，您将找到以下代码：\n\n```sql\n  FUNCTION job_exists(\n  \
  \  job_title  IN jobs.job_title%TYPE )\n  RETURN jobs.job_id%TYPE AS\n    v_job_id\
  \ jobs.job_id%TYPE;\n  BEGIN\n    SELECT job_id\n      INTO v_job_id\n      FROM\
  \ jobs\n      WHERE UPPER(job_title) = upper(job_title);\n```\n\n从这段代码中，您可以看到它确实有一个名为\
  \ `JOB_TITLE` 的参数。查看代码中的查询，您会发现该查询有一个问题。问题出在 `WHERE` 子句中，其中引用了相同的列名。编写该函数的人本意是将表列与参数进行比较，但实际发生的比较并非如此。以下是那个有问题的比较：\n\
  \n```sql\nWHERE UPPER(job_title) = UPPER(job_title);\n```\n\n如果有人运行该 `SELECT`，表中的每一条记录都会匹配（SQL\
  \ 解析器将使用表中的 `job_title` 而不是 `job_title` 参数）。修复方法是按如下方式重写函数规范，向参数名添加一个 `p_`：\n\n\
  ```sql\nFUNCTION job_exists(\n    p_job_title  IN jobs.job_title%TYPE )\n  RETURN\
  \ jobs.job_id%TYPE;\n```\n\n修改 `WHERE` 子句中的过滤条件，添加到参数上的 `p_`，像这样：\n\n```sql\nWHERE\
  \ UPPER(job_title) = upper(p_job_title);\n```\n\n该查询无法成功运行的原因是，就 Oracle 而言，过滤条件是在比较\
  \ `job_title` 列中的值与 `job_title` 列中的值。这等同于条件 `WHERE 1=1`。结果是表中的每一行都会被返回——这显然不是预期的结果。通过向参数及其使用添加\
  \ `p_` 前缀，过滤器将只返回表中职位名称与传入函数的 `job_title` 匹配的那一行。\n\n\n## 查找未使用的标识符\n\n许多组织对变量使用有标准，例如“禁止全局变量”和/或“所有变量必须被使用”。我个人并不完全赞同禁止全局变量的规则（尽管全局变量的使用应该被仔细考量）。然而，我确实同意，程序中存在未使用的变量会使维护变得更加复杂（主要是杂乱）。\n\
  \n使用 PL/Scope，很容易查看在任何作用域中，哪些变量没有被使用。这意味着你有一个声明但没有引用。接下来的几个查询将逐步构建，最终找到一个存储过程，该过程定义了一个未使用的全局受保护变量、一个未使用的参数和一个未使用的局部变量。\n\
  \n首先，列出包体中所有已声明的变量（注意，这不会获取规范中定义的全局变量，只会获取在体中定义的受保护全局变量），如下所示：\n\n```sql\nSELECT\
  \  ui_var.name, type, usage, line, col\n  FROM user_identifiers ui_var\n  WHERE\
  \ ui_var.object_name = 'VARIABLES_PKG'\n    AND ui_var.object_type = 'PACKAGE BODY'\n\
  \    AND ui_var.type IN ('VARIABLE', 'FORMAL IN', 'FORMAL OUT', 'FORMAL IN OUT')\n\
  \    AND ui_var.usage = 'DECLARATION'\n  ORDER BY line, col;\n```\n\n查询结果如下：\n```\n\
  NAME                         TYPE           USAGE       LINE     COL\n----------------------------\
  \ -------------- ----------- -------- -----\nG_PROTECTED_VARIABLE_USED    VARIABLE\
  \       DECLARATION 3        3\nG_PROTECTED_VARIABLE_UNUSED  VARIABLE       DECLARATION\
  \ 4        3\nP_KEYNUM                     FORMAL IN      DECLARATION 7        5\n\
  P_DATE                       FORMAL IN OUT  DECLARATION 8        5\nP_LOB      \
  \                  FORMAL OUT     DECLARATION 9        5\nV_USED_VARIABLE      \
  \        VARIABLE       DECLARATION 11       5\nV_UNUSED_VARIABLE            VARIABLE\
  \       DECLARATION 12       5\n```\n\n验证所有这些参数/变量是否被使用的最简单方法是检查它们是否被引用。然而，可能存在只进行赋值却从未引用变量的情况（这有什么用呢？），也存在变量在声明的同一步骤中被赋值的情况。对我来说，我想要确保所有变量都被使用（这意味着无论是否赋值，都必须有引用）。\n\
  \n要查看被引用的变量，只需将使用情况从 `DECLARATION` 更改为 `REFERENCE`，如下所示的查询：\n\n```sql\nSELECT  ui_var.name,\
  \ type, usage, line, col\n  FROM user_identifiers ui_var\n  WHERE ui_var.object_name\
  \ = 'VARIABLES_PKG'\n    AND ui_var.object_type = 'PACKAGE BODY'\n    AND ui_var.type\
  \ IN ('VARIABLE', 'FORMAL IN', 'FORMAL OUT', 'FORMAL IN OUT')\n    AND ui_var.usage\
  \ = 'REFERENCE'\n  ORDER BY line, col;\n```\n\n查询结果如下：\n```\nNAME              \
  \           TYPE        USAGE       LINE      COL\n----------------------------\
  \ ----------- ----------- --------- -----\nP_KEYNUM                     FORMAL IN\
  \   REFERENCE   14        24\nV_USED_VARIABLE              VARIABLE    REFERENCE\
  \   16        22\nG_PROTECTED_VARIABLE_USED    VARIABLE    REFERENCE   16      \
  \  40\nP_LOB                        FORMAL OUT  REFERENCE   17        39\n```\n\n\
  这显示有三个变量缺失。使用简单的 SQL，很容易找到它们。这个最终查询返回那些已声明但未被使用的变量：\n\n```sql\nSELECT  name, type,\
  \ usage, line, col\n  FROM user_identifiers\n  WHERE object_type = 'PACKAGE BODY'\n\
  \    AND usage = 'DECLARATION'\n    AND (name, type) IN (\nSELECT  ui_var.name,\
  \ type\n  FROM user_identifiers ui_var\n  WHERE ui_var.object_name = 'VARIABLES_PKG'\n\
  \    AND ui_var.object_type = 'PACKAGE BODY'\n    AND ui_var.type IN ('VARIABLE',\
  \ 'FORMAL IN', 'FORMAL OUT', 'FORMAL IN OUT')\n    AND ui_var.usage = 'DECLARATION'\n\
  MINUS\n  SELECT  ui_var.name, type\n  FROM user_identifiers ui_var\n  WHERE ui_var.object_name\
  \ = 'VARIABLES_PKG'\n    AND ui_var.object_type = 'PACKAGE BODY'\n    AND ui_var.type\
  \ IN ('VARIABLE', 'FORMAL IN', 'FORMAL OUT', 'FORMAL IN OUT')\n    AND ui_var.usage\
  \ = 'REFERENCE')\n  ORDER BY line, col;\n```\n\n查询结果如下：\n```\nNAME             \
  \            TYPE               USAGE       LINE     COL\n----------------------------\
  \ ------------------ ----------- -------- -------\nG_PROTECTED_VARIABLE_UNUSED \
  \ VARIABLE           DECLARATION 4        3\nP_DATE                       FORMAL\
  \ IN OUT      DECLARATION 8        5\nV_UNUSED_VARIABLE            VARIABLE    \
  \       DECLARATION 12       5\n```\n\n如果你移除外部查询中的条件（上面查询的第四行），即 `AND usage = 'DECLARATION'`，你可以添加额外的记录，表明那些被声明并赋值但从未被引用的变量（修改后的结果如下）。\n\
  \n```\nNAME                         TYPE               USAGE       LINE     COL\n\
  ---------------------------- ------------------ ----------- -------- --------\n\
  G_PROTECTED_VARIABLE_UNUSED  VARIABLE           ASSIGNMENT  4        3\nG_PROTECTED_VARIABLE_UNUSED\
  \  VARIABLE           DECLARATION 4        3\nP_DATE                       FORMAL\
  \ IN OUT      DECLARATION 8        5\nV_UNUSED_VARIABLE            VARIABLE    \
  \       DECLARATION 12       5\n```\n\n## 查找作用域问题\n\n另一个不良的编码实践是在程序的不同作用域中创建同名变量。如果你在引用时总是包含作用域，那么你可以确保访问的是正确的项。然而，这会导致痛苦的维护，通常是个坏主意。\n\
  \n为了举例说明，我使用了提供的 `SCOPE_PKG` 示例包。包规范和体如下，便于参考：\n\n```sql\ncreate or replace PACKAGE\
  \ SCOPE_PKG AS\n  i CONSTANT NUMBER := 0;\n\n  g_global_variable NUMBER := 10;\n\
  \n  PROCEDURE proc1 ;\nEND SCOPE_PKG;\n/\n\ncreate or replace PACKAGE BODY SCOPE_PKG\
  \ AS\n\n  PROCEDURE proc1\n  AS\n    i PLS_INTEGER := 30;\n  BEGIN\n    FOR i IN\
  \ 1..10\n    LOOP\n      DBMS_OUTPUT.PUT_LINE(i);\n    END LOOP;\n\n    DBMS_OUTPUT.PUT_LINE(i);\n\
  \  END;\n\nEND SCOPE_PKG;\n/\n```\n\n下一个查询显示在同一个程序（本例中是一个包）的不同作用域中声明的所有变量标识符（`VARIABLES`、`CONSTANTS`\
  \ 和 `ITERATORS`）。包可以在规范（spec）和体（body）中声明变量。是否认为这种作用域划分是一个错误，由你决定。\n\n```sql\nWITH\
  \ source_ids AS (\n  SELECT    *\n    FROM user_identifiers\n      WHERE object_name\
  \ = 'SCOPE_PKG'\n        AND object_type IN ('PACKAGE BODY', 'PACKAGE')\n)\nSELECT\
  \ name, type, usage, prior name, object_type, line, col\n  FROM source_ids si\n\
  \  WHERE type IN ('VARIABLE', 'ITERATOR', 'CONSTANT')\n    AND usage = 'DECLARATION'\n\
  \    AND EXISTS (\n      SELECT count(*), name\n        FROM user_identifiers\n\
  \        WHERE object_Name = si.object_name\n          AND name = si.name\n    \
  \      AND usage = si.usage\n        GROUP BY name\n        HAVING count(*) > 1\
  \ )\n  START WITH usage_context_id = 0\n  CONNECT BY PRIOR usage_id = usage_context_id\n\
  \    AND PRIOR object_type = object_type;\n```\n\n查询结果如下：\n```\nNAME     TYPE  \
  \      USAGE       PRIORNAME    OBJECT_TYPE   LINE     COL\n-------- -----------\
  \ ----------- ------------ ------------- -------- ------\nI        CONSTANT    DECLARATION\
  \ SCOPE_PKG    PACKAGE       3        3\nI        VARIABLE    DECLARATION PROC1\
  \        PACKAGE BODY  5        5\nI        ITERATOR    DECLARATION PROC1      \
  \  PACKAGE BODY  8        9\n```\n\n变量 `I` 在包规范中、体内的一个过程中、以及同一过程的循环迭代器中被声明。\n\n\
  你可以向查询中添加额外的条件，只返回那些明确冲突的值。你可以通过包含层级关系来实现——如果一个声明包含在一个 `USAGE_ID` 中，而这个 `USAGE_ID`\
  \ 又被一个更高的 `USAGE_CONTEXT_ID` 所覆盖，例如当这个使用（usage）是前一个使用的子项时。\n\n\n##### 数据类型检查\n\n\
  在 USER_ARGUMENTS 部分，我展示了如何验证数据类型，但也指出了其局限性——仅限于参数。通过 PL/Scope，我可以将验证扩展到程序中定义的任何变量。使用相同的过程示例\
  \ `BAD_DATA_TYPES_PRC`，以下查询展示了如何找到这些变量（和参数）：\n\n```sql\nSELECT * FROM (\nWITH source_ids\
  \ AS (\n  SELECT    line,\n            col,\n            name,\n            type,\n\
  \            usage,\n            usage_id,\n            usage_context_id,\n    \
  \        object_name\n    FROM user_identifiers\n      WHERE object_name = 'BAD_DATA_TYPES_PRC'\n\
  \        AND object_type = 'PROCEDURE')\nSELECT  prior name \"标识符\",\n        CASE\n\
  \        WHEN prior type IN ('FORMAL IN', 'FORMAL OUT', 'FORMAL IN OUT')\n     \
  \   THEN '参数'\n        WHEN prior type IN ('VARIABLE', 'CONSTANT', 'ITERATOR')\n\
  \        THEN '变量'\n        ELSE prior name\n        END \"标识符类型\",\n        Name\
  \ \"数据类型\",\n        Usage\n  FROM source_ids\n  START WITH usage_context_id = 0\n\
  \  CONNECT BY PRIOR usage_id = usage_context_id\n  ORDER SIBLINGS BY line, col\n\
  )\nWHERE usage =  'REFERENCE';\n```\n\n查询结果如下：\n\n```\n标识符            标识符类型    \
  \    数据类型        用法\n--------------- -------------------- ------------ -----------\n\
  P_DATA_IN       参数                 CHAR           REFERENCE\nP_DATA_OUT      参数\
  \                 LONG           REFERENCE\nV_CHAR          变量                 CHAR\
  \           REFERENCE\nV_VARCHAR       变量                 VARCHAR        REFERENCE\n\
  V_LONG          变量                 LONG           REFERENCE\n```\n\n目前仍然无法验证数据类型是否是锚定的。如果\
  \ PL/Scope 能将此作为标识符声明的子项提供，那就太好了。你可以推断（使用 `user_arguments`）数据长度或数据精度意味着参数是锚定的，但\
  \ `null` 并不意味着未锚定。例如，日期数据类型没有精度。\n\n### 执行动态分析\n\n从静态分析转向动态分析，让我们看看 Oracle 数据库（11g\
  \ 之前版本）中可用的工具（`DBMS_PROFILER` 和 `DBMS_TRACE`），以及 11g 之后版本中可用的工具（上述工具加上 `DBMS_HPROF`）。尽管\
  \ `DBMS_HPROF` 是用于性能指标的更好的工具（在我看来好得多），但 `DBMS_PROFILER` 和 `DBMS_TRACE` 在代码覆盖测试方面仍然提供了一些可用性。\n\
  \n本节并非关于如何使用这些内置包的教程，但会涵盖一些基础知识以帮助你入门。本节将指出这些内置包中哪些部分对于了解你的代码是有用的。\n\n使用这些 Oracle\
  \ 提供的工具进行动态分析有两个主要好处。首先是洞察应用程序的性能特征。通过分析，你可以在代码投入生产前识别瓶颈。其次，算是一个无意的附带好处，就是能够测试代码覆盖率（稍后会详细介绍）。\n\
  \n请注意，第 13 章 专门从性能角度介绍了性能剖析和插桩，但没有涵盖本章讨论的 Oracle 提供的包。关于这些包的完整介绍，请参阅 Oracle 文档，其中概述了所有参数等信息。\n\
  \n#### DBMS_PROFILER 和 DBMS_TRACE\n\n`DBMS_PROFILER` 是一个平面剖析器。它提供 PL/SQL 程序中两个过程调用之间的时间信息。你“打开”剖析器来启动计时器，然后在想停止计时时“关闭”它。“开启”和“关闭”之间的时间就是运行所需的时间（加上来自\
  \ `DBMS_PROFILER` 代码的一些最小开销）。\n\n从性能角度看，`DBMS_PROFILER` 与 `DBMS_TRACE` 结合使用时最为强大。`DBMS_TRACE`\
  \ 包为 `DBMS_PROFILER` 收集的计时提供了上下文。它提供了 PL/Scope 提供的静态层次结构的动态版本。PL/Scope 按可能发生的顺序向你显示标识符，并由此推断代码。PL/Scope\
  \ 向你展示了每一种可能性；`DBMS_TRACE` 向你展示的是*实际*执行的层次结构。\n\n`DBMS_TRACE` 要求所有要追踪的代码都必须使用 `DEBUG=TRUE`\
  \ 编译。不建议在生产环境中运行为调试而编译的过程，因此 `DBMS_TRACE` 包作为插桩工具是无用的。然而，作为一种了解代码的方式，该包仍然有价值。\n\n\
  `DBMS_TRACE` 会话的输出显示哪个过程调用了哪个过程，按顺序排列。`DBMS_TRACE` 的输出与 `DBMS_PROFILER` 的逐行剖析相结合，是我找到的进行半自动化代码覆盖的最简单方法。即使在\
  \ 11g 之后的世界里，`DBMS_TRACE` 和 `DBMS_PROFILER` 仍然具有一些无法以其他方式获得的价值。`DBMS_TRACE` 会为执行的每一行创建一条记录。当与\
  \ PL/Scope（仅限 11g+）结合使用时，你就得到了一个用于面向行的代码覆盖的强大工具。\n\n##### 配置 DBMS_PROFILER 和 DBMS_TRACE\n\
  \n设置这两个工具是一个相当简单的过程。你需要对 `DBMS_PROFILER` 和 `DBMS_TRACE` 都拥有 `EXECUTE` 权限。这些包应该已经存在于数据库中。\n\
  \n在使用这些工具之前，你（或 DBA）需要运行几个脚本来创建底层表。这些脚本位于 `$ORACLE_HOME/RDBMS/ADMIN` 目录中。`PROFTAB.sql`\
  \ 将为 `DBMS_PROFILER` 创建所需的表，`TRACETAB.sql` 为 `DBMS_TRACE` 创建表。注意，`TRACETAB.sql`\
  \ 必须以 `SYS` 身份运行。这些脚本中创建的表将在后面描述。\n\n如果你在单个服务器上运行多个应用程序，你可能想创建一个通用的 `PROFILER` 用户，并以该用户身份运行\
  \ `PROFTAB.sql`。这样，你可以授予对表的访问权限并为它们创建同义词，所有应用程序都可以共享相同的表。当你运行关于程序调用之间关系的报告时，可以跨越模式。如果你想保持每次运行分离，或者你只有一个应用程序模式，你可以在脚本所在的模式下运行它。\n\
  \n运行 `DBMS_PROFILER` 和 `DBMS_TRACE` 时，你必须具有特定的权限和编译器选项设置。对于任何要追踪或剖析的代码，你需要对被剖析的模式授予\
  \ `EXECUTE` 权限。此外，对于 `DBMS_PROFILER`，它需要对要剖析的任何程序单元拥有 `CREATE` 访问权限。最后，`DBMS_TRACE`\
  \ 要求程序单元必须使用 `DEBUG=TRUE` 编译。\n\n你需要对你连接的用户账户授予 `SELECT` 权限，以便查询 `DBMS_TRACE` 表。如果你连接的数据库用户是\
  \ `DBMS_PROFILER` 表的所有者，则不需要额外的授权。如果一个通用的剖析器用户拥有这些表，则该模式需要向你的模式授予 `SELECT` 权限。\n\
  \n配置就到此为止。完成这些设置步骤后，你就可以开始收集一些信息了。\n\n"
- "# DBMS_PROFILER 与 DBMS_TRACE 示例会话\n\n本节提供了一个同时使用 `DBMS_PROFILER` 和 `DBMS_TRACE`\
  \ 进行性能分析和跟踪的示例会话。本节中展示的所有跟踪和性能分析信息均通过此处提供的代码生成：\n\n```sql\nDECLARE\n  v_employee_id\
  \ employees.employee_id%TYPE;\nBEGIN\n  -- 启动性能分析会话\n  dbms_profiler.start_profiler;\n\
  \  dbms_trace.set_plsql_trace(\n                   DBMS_TRACE.trace_enabled_calls\n\
  \                   +\n                   DBMS_TRACE.trace_enabled_exceptions\n\
  \                   +\n                   DBMS_TRACE.trace_all_sql\n           \
  \        +\n                   DBMS_TRACE.trace_all_lines);\n\n  -- 调用要进行性能分析的顶级过程\n\
  \  v_employee_id := employee_api.create_employee(\n        p_first_name => 'Lewis',\n\
  \        p_last_name => 'Cunningham',\n        p_email => 'lewisc@yahoo.com',\n\
  \        p_phone_number => '888-555-1212',\n        p_job_title => 'Programmer',\n\
  \        p_department_name => 'IT',\n        p_salary => 99999.99,\n        p_commission_pct\
  \ => 0 );\n  -- 停止性能分析会话\n  dbms_trace.clear_plsql_trace;\n  dbms_profiler.stop_profiler;\n\
  \nEND;\n```\n\n`DBMS_PROFILER.start_profiler` 开始性能分析会话，`DBMS_TRACE.set_plsql_trace`\
  \ 启动事件跟踪。这两个过程都接受可选参数作为输入。`DBMS_TRACE` 的参数 `TRACE_LEVEL` 决定了收集信息的多少。在本例中，我需要为所有启用的调用（对使用\
  \ `DEBUG` 编译的程序单元的调用）、所有启用的异常、所有 SQL 调用以及所有行创建记录。这在大多数情况下确实有点过度了。输出如下所示。\n\n## DBMS_PROFILER\
  \ 与 DBMS_TRACE 输出\n\n运行时，`DBMS_TRACE` 将数据编译到两个表中。这些表如下：\n\n*   `PLSQL_TRACE_RUNS`\
  \ – `DBMS_TRACE`：标识每个独立运行的顶级表。\n*   `PLSQL_TRACE_EVENTS` – `DBMS_TRACE`：一个非常有用的表，可以记录跟踪会话中执行的每一行，可能迅速变得非常大，需要监控。\n\
  \n运行时，`DBMS_TRACE` 将数据编译到以下表中：\n\n*   `PLSQL_PROFILER_RUNS` – `DBMS_PROFILER`：标识每个独立性能分析会话的顶级表。\n\
  *   `PLSQL_PROFILER_UNITS` – `DBMS_PROFILER`：描述在性能分析会话期间执行的程序单元。\n*   `PLSQL_PROFILER_DATA`\
  \ – `DBMS_PROFILER`：会话期间每个单元运行的计时和执行统计信息。\n\n你可以通过 `RUN_DATE` 和 `RUN_COMMENT`（可选；默认为会话启动时的\
  \ `SYSDATE`）来标识一个 `DBMS_PROFILER` 运行。以下查询显示了两个性能分析会话后存储在 `PLSQL_PROFILER_RUNS` 表中的数据：\n\
  \n```sql\nselect runid, run_date, run_comment, run_total_time\nfrom plsql_profiler_runs;\n\
  ```\n\n```\nRUNID     RUN_DATE               RUN_COMMENT      RUN_TOTAL_TIME\n----------\
  \ --------------------- ---------------- ----------------------\n2          13-MAR-2011\
  \ 11:56:54  13-MAR-11        133000000\n3          13-MAR-2011 12:30:18  13-MAR-11\
  \        80000000\n```\n\n从该输出中，你可以识别出你正在寻找的运行。在分析性能时，你通常会对同一程序代码的多次运行取平均值。为了本示例的需要，我将使用一个特定的程序运行。\n\
  \n标识跟踪会话与标识性能分析会话非常相似。会话通过 `RUNID` 和 `RUN_DATE` 来标识。以下查询显示了跟踪会话后存储在 `PLSQL_TRACE_RUNS`\
  \ 表中的数据：\n\n```sql\nSELECT runid, run_date\nFROM plsql_trace_runs;\n```\n\n```\n\
  RUNID                  RUN_DATE\n---------------------- -------------------------\n\
  10                     26-MAR-2011 11:04:35\n```\n\n`DBMS_PROFILER` 提供关于运行中可执行行的计时信息。你收集这些信息，然后分析它以确定代码中是否存在瓶颈。运行时间长的代码可能是没问题的；但也可能不是。这个判断来自你的分析。性能分析器无法告诉你哪里有性能问题。性能分析器只能给你一个用于分析的性能剖析。一旦你分析了输出并进行了任何更改，你就需要运行另一个性能分析会话来验证你的更改。\n\
  \n以下查询逐行列出了性能分析器收集的计时信息。我删除了多行输出以控制篇幅。我忽略了 `ANONYMOUS BLOCK` 条目，因为它们是运行本身的噪声。\n\n\
  ```sql\nSELECT unit_name, unit_type, line#, total_occur, ppd.total_time, max_time\n\
  \  FROM plsql_profiler_units ppu\n  JOIN plsql_profiler_data ppd\n    ON (ppu.runid\
  \ = ppd.runid\n       AND\n       ppu.unit_number = ppd.unit_number)\nWHERE ppu.runid\
  \ = :RUNID\n  AND unit_type != 'ANONYMOUS BLOCK'  ;\n```\n\n```\nUNIT_NAME     \
  \      UNIT_TYPE      LINE#    TOTAL_OCCUR   TOTAL_TIME    MAX_TIME\n-------------------\
  \ -------------- -------- ------------- ------------- -------------\nEMPLOYEE_API\
  \        PACKAGE BODY   3        1             11982         9985\nEMPLOYEE_API\
  \        PACKAGE BODY   20       1             1997          1997\nEMPLOYEE_API\
  \        PACKAGE BODY   21       1             2995          2995\nDEPARTMENTS_API\
  \     PACKAGE BODY   3        1             7988          6989\nDEPARTMENTS_API\
  \     PACKAGE BODY   8        1             0             0\nJOBS_API          \
  \  PACKAGE BODY   3        1             7988          6989\nJOBS_API          \
  \  PACKAGE BODY   7        1             0             0\n.\n.\n.\n80 行 已选中\n```\n\
  \n\n此列表显示了每个被分析程序单元中执行的代码行。它提供了该行的执行次数以及在该行花费的总时间（包括对被调用程序单元的调用）。`max time` 是在任何特定调用上花费的最长时间。利用这些信息，你应该能够很好地了解从何处开始调查任何性能问题。\n\
  \n## 使用 DBMS_TRACE 查看调用层次\n\n虽然性能指标很棒，但如果你能知道这些时间数据的上下文或调用层次结构，那将会更好。`DBMS_TRACE`\
  \ 并不能完全提供这个，但它确实提供了调用结构。要查看已执行代码的层次结构（请记住，这是实际的执行，而非预期的或可能的执行），你可以运行以下这个非常简单的查询：\n\
  \n```sql\nSELECT event_unit, event_proc_name,\n       CASE\n         WHEN proc_unit\
  \ IS NOT NULL and proc_name IS NOT NULL\n           THEN proc_unit || '.' || proc_name\
  \ || '(' || proc_line || ')'\n         WHEN proc_unit IS NULL and proc_name IS NOT\
  \ NULL\n           THEN proc_name || '(' || proc_line || ')'\n         ELSE\n  \
  \         substr(event_comment,1,30)\n       END executed_code\nFROM plsql_trace_events\
  \ pse\nWHERE runid = :RUNID\n  AND event_unit NOT IN ('<anonymous>', 'DBMS_TRACE')\n\
  \  AND event_kind NOT IN (50, 51)\nORDER BY event_seq;\n```\n\n```\nEVENT_UNIT \
  \       EVENT_PROC_NAME                 EXECUTED_CODE\n---------------- -------------------------------\
  \ ------------------------------------------\nEMPLOYEE_API      CREATE_EMPLOYEE\
  \                 DEPARTMENTS_API.DEPARTMENT_EXISTS(3)\nDEPARTMENTS_API   DEPARTMENT_EXISTS\
  \               SELECT DEPARTMENT_ID FROM DEPA\nEMPLOYEE_API      CREATE_EMPLOYEE\
  \                 JOBS_API.JOB_EXISTS(3)\nJOBS_API          JOB_EXISTS         \
  \             SELECT JOB_ID FROM JOBS WHERE\nEMPLOYEE_API      CREATE_EMPLOYEE \
  \                JOBS_API.VALIDATE_JOB(21)\nEMPLOYEE_API      CREATE_EMPLOYEE  \
  \               DEPARTMENTS_API.DEPARTMENT_MANAGER_ID(29)\nDEPARTMENTS_API   DEPARTMENT_MANAGER_ID\
  \           SELECT MANAGER_ID FROM DEPARTM\nEMPLOYEE_API      CREATE_EMPLOYEE  \
  \               Select EMPLOYEES_SEQ.NEXTVAL f\nEMPLOYEE_API      CREATE_EMPLOYEE\
  \                 INSERT INTO EMPLOYEES (EMPLOYE\nEMPLOYEE_API      CREATE_EMPLOYEE\
  \                 EMPLOYEE_API.ASSIGN_SALARY(74)\nEMPLOYEE_API      ASSIGN_SALARY\
  \                   UPDATE EMPLOYEES SET SALARY =\n\n 11 rows selected\n```\n\n\
  此列表（以及查询）提供了从本次运行中得到的执行顺序。`EMLOYEE_API.CREATE_EMPLOYEE` 调用了 `DEPARTMENTS_API.DEPARTMENT_EXISTS`（它在\
  \ `DEPARTMENTS_API` 包体中定义于第 3 行）。被调用的程序单元在返回前运行了一个查询。\n\n## 可扩展性考量：DBMS_TRACE 与\
  \ DBMS_PROFILER\n\n`DBMS_TRACE` 可能会产生非常冗长的输出。本节中我使用的示例相当简单，属于后台办公类应用。当你拥有非常庞大的应用程序，或者需要运行较长时间并反复调用相同程序单元的应用程序时，随着复杂性的增加，`DBMS_TRACE`\
  \ 的价值就开始下降。\n\n例如，本章提供了一个名为 `TEST_CALLS_PRC` 的演示过程。它是一个简单的 `for` 循环（100 次迭代），每次迭代调用两个过程。使用与之前相同的选项运行\
  \ `DBMS_TRACE` 和 `DBMS_PROFILER`，比较两者输出行数的差异（较小的 `RUNID` 是之前两者计数的追踪记录）。以下查询比较了由\
  \ `DBMS_PROFILER` 产生的两次运行之间的输出行数：\n\n```sql\nSELECT ppd.runid, count(*)\n  FROM\
  \ plsql_profiler_units ppu\n  JOIN plsql_profiler_data ppd\n    ON(ppu.runid = ppd.runid\n\
  \    AND ppu.unit_number = ppd.unit_number)\n  WHERE ppu.runid IN (9,10)\n    AND\
  \ ppd.total_time != 0\n    AND unit_type != 'ANONYMOUS BLOCK'\n  GROUP BY ppd.runid;\n\
  ```\n\n```\nRUNID                  COUNT(*)\n---------------------- ----------------------\n\
  9                      29\n10                     15\n```\n\n下一个查询对两次 `DBMS_TRACE`\
  \ 会话产生相同的行数统计：\n\n```sql\n  SELECT runid, count(*)\n    FROM plsql_trace_events\n\
  \    WHERE runid IN (12,13)\n    GROUP BY runid;\n```\n\n```\nRUNID            \
  \      COUNT(*)\n---------------------- ----------------------\n12             \
  \        100\n13                     5545\n```\n\n对于不太复杂的代码，`DBMS_PROFILER` 的行数较少，但\
  \ `DBMS_TRACE` 的行数却多得多。在针对 `DBMS_TRACE` 表编写查询时，你需要考虑到这一点。使用选项只收集你真正想要的数据，然后计划创造性地过滤掉那些你不想要但无法通过选项排除的内容。\n\
  \n\n\n### 代码覆盖测试与性能指标\n\n代码覆盖测试是一种测试方法，用于验证程序中每一条`可执行`的代码行是否确实被执行了。这种测试属于**回归测试**，而非功能测试。某段代码被执行过，并不意味着它被正确地执行了。然而，如果它至少被执行过一次，那么你就知道它实际上在特定情况下能够无错误地运行。\n\
  \n代码覆盖测试本身意义不大。但作为自动化构建流程的一部分，或作为一个完整测试计划的一个组成部分，它确实有其用处。我喜欢使用代码覆盖测试，理由和我喜欢编译器错误一样——它能发现大量小错误。不过，如果没有合适的工具，进行这种测试会非常困难。幸运的是，Oracle\
  \ 已为我们提供了所需的大部分工具。\n\n我在这里并不特别关注性能指标（尽管没有理由不将其包括在内）。我希望看到的是，所有可执行的代码都被执行了。\n\n可以将\
  \ `DBMS_TRACE` 和 `DBMS_PROFILER` 的输出结合起来，以获取每行已执行代码及其上下文的一个清晰跟踪。要做到这一点，需要创建一个巧妙的查询，并了解哪些运行是相关的（因为它们是一起运行或在非常接近的时间运行的）。如果将不同版本代码的分析器运行和跟踪运行混在一起，你会得到一团非常混乱的输出。但如果你知道这些运行是匹配的，那么这些信息就非常有用。\n\
  \n下面的查询连接了 `DBMS_PROFILER` 的输出和 `DBMS_TRACE` 的输出。为了简化查询，我省略了 `PLSQL_TRACE_RUNS`\
  \ 和 `PLSQL_PROFILER_RUNS` 表——这些才是你实际应该开始的地方。我只是手动从两者中各选择了一次运行。我过滤掉了特定的事件类型，具体是 SQL\
  \ 调用 (54) 和过程调用返回 (50)。你可以从文档或 `tracetab.sql` 安装代码中获取所有事件类型的列表。在查看 `total_time`\
  \ 时，我喜欢了解谁被调用、从哪里调用以及代码具体做了什么。\"谁\"和\"哪里\"的信息来自 `DBMS_TRACE` 数据，而\"什么\"则来自 `USER_SOURCE`。查询如下：\n\
  \n```sql\nBREAK ON event_unit ON event_proc_name\nSELECT event_unit, event_proc_name,\
  \ line# line,\n       total_time time, pse.proc_unit, pse.proc_name,\n       substr(ltrim(rtrim(text)),1,30)\
  \ source_text\nFROM (\n  (SELECT ppu.runid, ppu.unit_type, ppu.unit_name,\n    \
  \      ppd.line#, ppd.total_time\n     FROM plsql_profiler_units ppu\n     JOIN\
  \ plsql_profiler_data ppd\n       ON(ppu.runid = ppd.runid\n       AND ppu.unit_number\
  \ = ppd.unit_number)\n     WHERE ppu.runid = :PROF_RUNID\n       AND ppd.total_time\
  \ != 0)) prof_data\nJOIN (\n    SELECT event_unit, event_proc_name, event_line,\n\
  \           proc_unit, proc_name, event_unit_kind,\n           event_kind, min(event_seq)\
  \ event_seq\n    FROM plsql_trace_events trace_data\n    WHERE runid = :TRACE_RUNID\n\
  \      AND event_kind NOT IN (50, 54)\n    GROUP BY  event_unit, event_proc_name,\
  \ event_line,\n           proc_unit, proc_name, event_unit_kind,\n           event_kind)\
  \ pse\n  ON (pse.event_unit = prof_data.unit_name\n  AND pse.event_line = prof_data.line#)\n\
  JOIN user_source us\n  ON (us.name = pse.event_unit\n  AND us.type = pse.event_unit_kind\n\
  \  AND us.line = pse.event_line)\nORDER BY event_seq;\n```\n\n```\nEVENT_UNIT  \
  \       EVENT_PROC_NAME          LINE    TIME PROC_UNIT\n------------------ -----------------------\
  \ ----- ------- -----------------\nPROC_NAME               SOURCE_TEXT\n-----------------------\
  \ ------------------------------\nEMPLOYEE_API       CREATE_EMPLOYEE           \
  \  3   12933\n                        FUNCTION create_employee(\n\n            \
  \                                 20    2984\n                        v_exception\
  \ BOOLEAN := FALSE;\n\n                                             21    3979\n\
  \                        v_exception_message CHAR(2048)\n\n                    \
  \                         24  247720\n                        v_department_id :=\
  \ departments\n\n                                             24  247720 DEPARTMENTS_API\n\
  DEPARTMENT_EXISTS       v_department_id := departments\n\nDEPARTMENTS_API    DEPARTMENT_EXISTS\
  \           3    7958\n                        FUNCTION department_exists(\n\n \
  \                                              9  185044\n                     \
  \   SELECT department_id\n\n                                              14   \
  \ 1989\n                        RETURN v_department_id;\n\nEMPLOYEE_API       CREATE_EMPLOYEE\
  \            24  247720\n                        v_department_id := departments\n\
  .\n.\n.\n38 rows selected.\n```\n\n将这个输出格式化以适应页面相当困难，但希望你能看出其中的端倪。输出从包体 `EMPLOYEE_API.CREATE_EMPLOYEE`\
  \ 的第 3 行开始。该行的执行时间是 12,933，实际执行的代码（至少其前 30 个字节）是 `FUNCTION create_employee`。\n\n\
  输出的第二行对应于包体的第 20 行，是一个赋值操作，耗时 2,984。你可以将此输出中的代码与实际源代码进行比较，可以看到第 20 行是第一个可执行行。它之前的所有内容都是参数和声明。这个赋值操作（虽然是在声明部分）使其成为可执行行。第\
  \ 20 行之后是第 21 行，这是另一个赋值操作。\n\n最后，在第 24 行，通过调用 `DEPARTMENTS_API.DEPARTMENT_EXISTS`\
  \ 进行了一次赋值。这使得 `EVENT_UNIT` 从 `EMPLOYEE_API` 变成了 `DEPARTMENTS_API`。接下来的几行是该程序单元中的可执行行，直到到达\
  \ `DEPARTMENTS_API` 包体的第 14 行的返回语句。显示的最后一行将控制权交还给 `EMPLOYEE_API`。为了节省空间，其余行被省略了。\n\
  \n在一份报告/查询中，你就得到了一份代码覆盖报告、一份代码分析报告（因为包含了可执行代码、行号、计时信息和实际源代码），以及性能指标。如果将此报告保存到一个表中（你自建的用户表），你可以在代码的任何更改之后重新运行此查询并比较输出。你只需要注意如何比较单个行，因为它们会随着时间的推移而改变。\n\
  \n\n\n"
- "# 未执行的代码\n\n如果有一种简单的方法可以选择所有未执行的、可执行的代码，那就太好了。`PL/Scope` 提供了部分你需要的信息，但 `DBMS_TRACE`\
  \ 执行查询的方式（它捕获包含 `select` 语句的行，但不捕获其他行）带来了一些问题。此外，`PL/Scope` 并不会捕获所有潜在的可执行行，它只捕获包含标识符的行。如果你查看下面的演示过程\
  \ `TEST_PLSCOPE`，你会看到这个 `PROCEDURE` 有两行可执行代码（忽略过程的声明和定义）：即 `IF 1=1` 和 `execute immediate`。\n\
  \n```sql\nCREATE OR REPLACE PROCEDURE TEST_PLSCOPE AS\nBEGIN\n  IF 1=1\n  THEN\n\
  \    execute immediate 'declare v1 number; begin select 1 into v1 from dual; end;';\n\
  \  END IF;\nEND TEST_PLSCOPE;\n```\n\n正如下一个查询所示，如果你查询 `USER_IDENTIFIERS`，你只会看到声明和定义：\n\
  \n```sql\n  SELECT object_name, line, usage\n  FROM user_identifiers\n  WHERE object_name\
  \ = 'TEST_PLSCOPE'\n    AND object_type = 'PROCEDURE'\nORDER BY usage_id;\n```\n\
  \n```\nOBJECT_NAME                    LINE                   USAGE\n------------------------------\
  \ ---------------------- -----------\nTEST_PLSCOPE                   1         \
  \             DECLARATION\nTEST_PLSCOPE                   1                    \
  \  DEFINITION\n```\n\n目前，你可以自动收集已执行代码的覆盖率，但无法自动收集未执行代码的信息。你能达到的最好程度是一个可以由人工仔细检查的自动化报告。这样的报告聊胜于无，但并不像我期望的那样完善。\n\
  \n下面的查询试图通过使用 `USER_IDENTIFIERS` 来检索未被 `DBMS_TRACE` 运行所包含的所有可执行行，从而使前面查询的代码覆盖率更加稳健：\n\
  \n```sql\nSELECT id_data.object_name, id_data.line, us.text\n  FROM (\n    SELECT\
  \ DISTINCT object_type, object_name, line\n      FROM user_identifiers ui\n    \
  \  WHERE (object_type, object_name) IN\n            (SELECT distinct event_unit_kind,\
  \ event_unit\n               FROM plsql_trace_events pse\n               WHERE pse.event_unit\
  \ = ui.object_name\n                 AND pse.event_unit_kind = ui.object_type\n\
  \                 AND pse.runid = :TRACE_RUNID\n                 AND pse.event_kind\
  \ NOT IN (50, 54))\n                 AND usage NOT IN ('DEFINITION', 'DECLARATION')\n\
  \    MINUS\n    SELECT event_unit_kind, event_unit, event_line\n      FROM plsql_trace_events\
  \ pse\n      WHERE pse.runid = :TRACE_RUNID\n        AND pse.event_kind NOT IN (50,\
  \ 54)\n        AND event_line IS NOT NULL) id_data\n  JOIN user_source us\n    ON\
  \ (us.name = id_data.object_name\n    AND us.type = id_data.object_type\n    AND\
  \ us.line = id_data.line)\n  ORDER BY id_data.object_name, id_data.line;\n```\n\n\
  在这一部分结果中（以下输出来自结果集的中间部分），你可以看到我希望 `PL/Scope` 数据能输出的内容：\n\n```\nOBJECT_NAME     \
  \                 LINE TEXT\n------------------------------- ----- ------------------------------\n\
  DEPARTMENTS_API                    42       WHEN NO_DATA_FOUND\nDEPARTMENTS_API\
  \                    44         RETURN v_manager_id;\nEMPLOYEE_API             \
  \          27       v_exception := TRUE;\nEMPLOYEE_API                       28\
  \       v_exception_message := v\n                                          _exception_message\
  \ || chr(10)\n                                          ||\n\nEMPLOYEE_API     \
  \                  29                  'Department '\n                         \
  \                  || p_department_name || ' not\n                             \
  \              found.';\n\nEMPLOYEE_API                       35       v_exception\
  \ := TRUE;\nEMPLOYEE_API                       36       v_exception_message := v\n\
  \                                          _exception_message || chr(10)\n     \
  \                                     ||\n```\n\n不幸的是，结果集开头包含一个我想过滤掉的例子。\n\n```\n\
  OBJECT_NAME                      LINE TEXT\n------------------------------- -----\
  \ ------------------------------\nDEPARTMENTS_API                    10       INTO\
  \ v_department_id\nDEPARTMENTS_API                    12       WHERE upper(department_n\n\
  \                                          ame) = upper(p_department_name\n    \
  \                                      );\n```\n\n这些行是作为从第 9 行开始的 `select` 语句的一部分执行的。`PL/Scope`\
  \ 包含第 10 和 12 行是因为它们包含标识符：`v_department_id` 和 `p_department_name`。第 11 行是 `FROM`\
  \ 子句，不包含任何标识符。\n\n前面示例中显示的所有其他行确实没有执行。它们嵌入在异常处理代码中，而这正是你希望代码覆盖率报告能显示的内容类型。理想情况下，你会看到这些行未被执行，并据此创建测试来执行这些代码。\n\
  \n"
- "# DBMS_HPROF\n\n`DBMS_HPROF` 是 Oracle 11g 及更高版本中用于 `PL/SQL` 代码性能分析的工具。这绝对是收集性能指标的首选工具。它提供了\
  \ `DBMS_PROFILER` 和 `DBMS_TRACE` 共同提供的所有功能，但不包含用于代码覆盖率的行信息；它更易于使用、更易于解读，并且不需要改变环境即可工作。`DBMS_HPROF`\
  \ 可以轻松地在生产环境中运行，这是 `DBMS_PROFILER` 和 `DBMS_TRACE` 所欠缺的。\n\n`DBMS_HPROF` 是一个分层分析器。它不仅告诉你什么代码运行了以及运行了多久，还提供了谁在什么顺序下调用了什么的层级上下文。你还可以比较\
  \ SQL 与 `PL/SQL` 所花费的时间（这对于性能调优至关重要）。结合正确的代码插桩，你将能够验证完整的代码覆盖率。\n\n当运行一个分析会话时，`PL/SQL`\
  \ 虚拟机会跟踪运行时信息。`DBMS_HPROF` 通过将这些信息写入操作系统文件，使其可供相关方使用。分析会话的输出称为原始输出。\n\n原始输出是人类可读的，但不太友好。对于原始输出，你可以走两条路线。有一个名为\
  \ `plshprof` 的命令行工具，它接收原始的 `DBMS_HPROF` 输出文件，并生成包含各种性能相关信息的 `HTML` 报告。使用该工具，你甚至可以比较两个分析会话的输出（例如，代码更改前后），以查看更改如何影响了代码的性能概况。（第\
  \ 13 章专门介绍了用于性能的插桩和分析，因此我将细节留给该章。）我更愿意讨论如何使用分析后的数据来编写你自己的报告。\n\n处理原始输出的第二条路线是使用\
  \ `DBMS_HPROF` 包中的函数：`DBMS_HPROF.ANALYZE`。`ANALYZE` 函数接受几个输入参数，最重要的是原始输出的目录和文件名，并返回一个\
  \ `RUN_ID`。当 `ANALYZE` 运行时，会填充三个表，`RUN_ID` 是父表的主键。\n\n被填充的三个表包含有关分析会话的信息、有关运行的信息以及运行会话内程序调用之间的关系。利用这些信息（暂时忽略性能信息），你可以准确地找到什么被调用了以及被谁调用。你无法直接得到的是什么没有被调用。将\
  \ `PL/Scope` 与 `DBMS_HPROF` 结合起来，你就可以找出什么没有被调用——这就是性能分析为代码覆盖率带来的价值。\n\n\n\n## 配置\
  \ DBMS_HPROF\n\n配置 DBMS_HPROF 只需要几个非常简单的步骤。第一步是您需要在 `DBMS_HPROF` 包上拥有 `EXECUTE`\
  \ 权限。第二步是您需要对一个操作系统目录拥有读/写权限。如果您有创建目录的权限，可以创建自己的目录。如果没有，请要求您的数据库管理员（DBA）创建一个目录，并授予您\
  \ `READ` 和 `WRITE` 权限。\n\n为了本次讨论的目的，我将以 `SYSTEM` 用户登录。在示例能够运行之前，必须执行以下 DDL 语句：\n\
  \n```\nCREATE DIRECTORY plshprof_dir AS 'c:\\temp';\nGRANT READ, WRITE ON DIRECTORY\
  \ PLSHPROF_DIR TO HR;\n```\n\n对于性能调优，拥有对该目录的访问权限就是您需要做的全部准备。运行 `plshprof` 实用程序（位于\
  \ `$ORACLE_HOME/bin`）来生成您的 HTML 报告并开始分析。我通常会将 HTML 输出复制到本地，并在浏览器中查看。\n\n然而，为了理解代码并实现分析自动化，我希望将原始输出保存在数据库中，以便能够查询它。Oracle\
  \ 通过三张表提供了这个功能（稍后会详细描述）。要创建这些表，您需要运行 Oracle 提供的脚本，该脚本位于 `$ORACLE_HOME/RDBMS/ADMIN`\
  \ 目录下，名为 `dbmshptab.sql`。\n\n与 `DBMS_PROFILER` 的脚本类似，您可以以应用程序用户身份运行此脚本，也可以创建一个公共的\
  \ `PROFILER` 方案。我通常倾向于拥有一个专用用户，该用户将包含数据库的所有性能分析数据；这样，您就可以将跨方案的分析会话存储在一起，便于查询，并且可以在所有数据库上创建相同的方案。这使您能够保持各实例间的一致性，从而增强了代码的可维护性。\n\
  \n以上就是配置 `DBMS_HPROF` 分析器所需的全部步骤。\n\n## DBMS_HPROF 示例会话\n\n运行分析器时，它非常类似于使用 `DBMS_TRACE`\
  \ 或 `DBMS_PROFILER`。使用 `START_PROFILING` 开始分析会话，并使用 `STOP_PROFILING` 结束会话。以下会话将使用完全相同的调用来执行\
  \ `create_employee`：\n\n```\nDECLARE\n  v_employee_id employees.employee_id%TYPE;\n\
  \  v_runid dbmshp_runs.runid%TYPE;\n  v_plshprof_dir all_directories.directory_name%TYPE\
  \ := 'PLSHPROF_DIR';\n  v_plshprof_file VARCHAR2(30) := 'create_employee.raw';\n\
  BEGIN\n  -- 开始分析会话\n  dbms_hprof.start_profiling(v_plshprof_dir, v_plshprof_file);\n\
  \n  -- 调用要分析的顶级过程\n  v_employee_id := employee_api.create_employee(\n        p_first_name\
  \ => 'Lewis',\n        p_last_name => 'Cunningham2',\n        p_email => 'lewisc2@yahoo.com',\n\
  \        p_phone_number => '888-555-1212',\n        p_job_title => 'Programmer',\n\
  \        p_department_name => 'IT',\n        p_salary => 99999.99,\n        p_commission_pct\
  \ => 0 );\n\n  -- 停止分析会话\n  dbms_hprof.stop_profiling;\n\n  -- 分析原始输出并创建表数据\n  v_runid\
  \ := dbms_hprof.analyze(v_plshprof_dir, v_plshprof_file);\n\n  DBMS_OUTPUT.PUT_LINE('本次运行\
  \ ID: ' || to_char(v_runid) );\n\nEND;\n```\n\n`DBMS_HPROF.ANALYZE` 返回一个 `RUNID`\
  \ 以标识特定的运行。但是，如果您需要在以后的某个时间点回溯，`DBMS_HPROF.START_PROFILING` 过程接受一个可选的 `COMMENT`\
  \ 参数，这是标识特定 `ANALYZED` 运行的最简单方法。\n\n## DBMS_HPROF 输出\n\n`DBMS_HPROF` 跟踪各种 PL/SQL\
  \ 调用，包括触发器和匿名块，以及 DML 和本地动态 SQL。它确实是一个强大的性能分析工具。`DBMS_HPROF.analyze` 会写入三张表。\n\n\
  - `DBMSRP_RUNS`：运行头信息。\n- `DBMSHP_FUNCTION_INFO`：存储的程序详细信息和计时。\n- `DBMSHP_PARENT_CHILD_INFO`：包含计时的调用层次结构。\n\
  \n这些表存储了生成完整跟踪报告所需的所有信息，计时精度可达到您想查看的任何详细级别。顺带一提，SQL Developer（Oracle 提供的免费 GUI IDE）原生支持\
  \ `DBMS_HPROF`。\n\n由 `plshprof` 命令行实用程序生成的 HTML 报告是您性能优化武器库中非常强大的工具。用一堆截图来复现它们会显得很愚蠢；然而，我确实希望您了解这些报告中可用的信息。\n\
  \n当您运行 `plshprof` 时，它会生成一组相关的 HTML 文件。您可以在各个报告之间导航，并可以层层深入，从顶级报告钻取到更详细的级别报告。图 7-1\
  \ 显示了由 `plshprof` 生成的索引页面。\n\n![images](img/0701.jpg)\n\n**图 7-1.** `PLSHPROF` 输出\
  \ — 报告索引\n\n从这里，点击第一个链接“Function Elapsed Time”，会打开图 7-2 所示的页面。\n\n![images](img/0702.jpg)\n\
  \n**图 7-2.** `PLSHPROF` 耗时报告\n\n图 7-2 中的报告按每个调用花费的时间排序，显示了进程的总耗时。该报告是快速检查进程中时间花费在何处的便捷方法。耗时最多的调用并非巧合，正是顶级的\
  \ `CREATE_EMPLOYEE`。从该报告中，我可以点击其中一个函数调用，钻取到该特定调用的详细报告，如图 7-3 所示。\n\n![images](img/0703.jpg)\n\
  \n**图 7-3.** `PLSHPROF` 函数钻取\n\n在图 7-3 中，您可以看到所示的过程都进行了静态 SQL 调用，以及 SQL 与 PL/SQL\
  \ 各自花费了多少时间。通常，我宁愿运行自己的查询来获取关于运行情况的简明信息，以获得性能的快照。如果在我自己编写的查询中发现异常，那么我可以运行 HTML 报告并更深入地探究。\n\
  \n以下查询是一个相当简单的报告，展示了谁调用了谁以及耗时多久。我通常会将此数据与先前运行的数据进行比较；这样，我可以非常快速地了解变更对性能的影响。\n\n\
  ```\nSELECT parent_info.owner || '.' || parent_info.module || '.' ||\n         \
  \          parent_info.function || '(' || parent_info.line# || ')' caller,\n   \
  \    child_info.owner || '.' || child_info.module || '.' ||\n                  \
  \ child_info.function || '(' || child_info.line# || ')' callee,\n       child_info.function_elapsed_time\
  \ elapsed\n  FROM dbmshp_parent_child_info dpci\n  JOIN dbmshp_function_info parent_info\n\
  \    ON parent_info.runid = dpci.runid\n  JOIN dbmshp_function_info child_info\n\
  \    ON child_info.runid = dpci.runid\n  WHERE dpci.runid = :HPROF_RUNID\n  START\
  \ WITH dpci.runid = :HPROF_RUNID\n    AND dpci.childsymid = child_info.symbolid\n\
  \    AND dpci.parentsymid = parent_info.symbolid\n    AND parent_info.symbolid =1\n\
  \  CONNECT BY dpci.runid = PRIOR dpci.runid\n    AND dpci.childsymid = child_info.symbolid\n\
  \    AND dpci.parentsymid = parent_info.symbolid\n    AND prior dpci.childsymid\
  \ = dpci.parentsymid;\n```\n\n\n\n```\n`调用者                                    \
  \       被调用者                                           耗时`\n`----------------------------------------\
  \ ---------------------------------------- --------------------`\n`..__anonymous_block(0)\
  \                           HR.EMPLOYEE_API.CREATE_EMPLOYEE(3)                 \
  \   189`\n`HR.EMPLOYEE_API.CREATE_EMPLOYEE(3)               HR.DEPARTMENTS_API.DEPARTMENT_EXISTS(3)\
  \               57`\n`HR.DEPARTMENTS_API.DEPARTMENT_EXISTS(3)          HR.DEPARTMENTS_API.__static_sql_exec_line9(9)\
  \         473`\n\n`HR.EMPLOYEE_API.CREATE_EMPLOYEE(3)               HR.DEPARTMENTS_API.DEPARTMENT_MANAGER_ID(29)\
  \          24`\n\n`HR.DEPARTMENTS_API.DEPARTMENT_MANAGER_ID(29)     HR.DEPARTMENTS_API.__static_sql_exec_line35(35)\
  \       99`\n\n`HR.EMPLOYEE_API.CREATE_EMPLOYEE(3)               HR.EMPLOYEE_API.ASSIGN_SALARY(74)\
  \                     51`\n`HR.EMPLOYEE_API.ASSIGN_SALARY(74)                 HR.EMPLOYEE_API.__static_sql_exec_line80(80)\
  \          2634`\n`.`\n`.`\n`.`\n```\n匿名块调用了 `CREATE_EMPLOYEE`，`CREATE_EMPLOYEE`\
  \ 又调用了 `DEPARTMENT_EXISTS`，依此类推。耗时是最右侧的列；它指的是函数自身耗时。在你自己的报告中，你可以包含任何对你重要的其他列。还有一种“子树耗时”也很有用。函数自身耗时仅指函数内部花费的时间；子树耗时则包括了所有后代函数花费的时间。`CALLS`\
  \ 列包含对子程序的调用次数（这在涉及重复调用和循环时很有用）。\n\n你可以针对这些表编写自己的查询，以返回你所需的性能信息。我强烈建议你运行 HTML 报告并浏览它们。如之前的截图所示，其中包含一些极其有用的信息。\n\
  \n### 总结\n\n本章阐述了如何最好地理解你所负责的代码。它介绍了 Oracle 原生提供的不同类型的代码分析方法，并展示了如何在日常开发中使用这些工具。你现在应该理解了静态代码分析和动态代码分析各自的优点。你也应该能够坐下来配置这些工具、使用它们并理解其输出。\n\
  \n我回顾了对静态分析最重要的数据字典视图，并展示了它们与 Oracle 在 11g 中提供的 `PL/Scope` 实用程序相比有何特点。本章随后转向动态分析，以及从这些工具中可以获取的数据类型。\n\
  \n实施本章建议的一个美妙之处在于，这里的内容本就应该是你已经在做的——本章只是向你展示如何更高效地完成这一切，以及如何避免人为错误。你应该已经有了标准；你应该已经在做代码审查；你应该在投产前智能地为代码添加插桩并进行性能分析，这样你就能确信当代码进入生产环境后，它将可靠运行且易于维护。\n\
  \n在你的环境中充分利用这些工具所付出的努力是一次性的前期投入，然后你会在今后的每个项目中持续受益。在根据本章信息创建你自己的报告和工具之前，我建议你创建或完善你的编码和测试标准。如果每个人在开发\
  \ `PL/SQL` 时都使用相同的标准，你将从这些工具中获得更多价值，并能够自动化更多的审查和测试。\n\n你不必使用 Oracle 提供的工具。有第三方工具也能提供大部分此功能，它们很可能使用的就是本章讨论的那些内容。重要的是，你决定将影响分析和其他代码分析纳入你的工作流程，以构建质量更高的应用程序。\n\
  \n同时，不要觉得你被“困在”开箱即用的功能里。创建你自己的查询表，并将 `PL/Scope` 之类的东西作为起点。对数据进行加工，直到你获得认为有价值的东西。不要把本章呈现的内容当作终点，它应被视为起点。\n\
  \n阅读本章后，我希望你“明白”了源代码分析为何有用。我也真诚地希望你不会认为代码审查和性能分析不值得付出努力。如果你真这么想，我只请求你阅读本书的其余部分（特别是第\
  \ 13 章）并思考一下。\n\n任何新事物都可能显得复杂，并会干扰你的常规流程。如果你从未参与过代码审查，第一次会令人望而生畏。一旦你开始享受到更少漏洞、更优代码的好处，你就会接受这个想法。代码分析也是如此：一旦你完成了第一次分析工作，此后它真的就不会很难，而且其收益会在程序的整个生命周期内持续带来回报。\n\
  \n不要将了解你的代码当作开发的附加项。将其内建于流程中。做到心中有数；而非凭空猜测。\n\n## 第 8 章\n\n## 面向契约编程\n\n作者：John\
  \ Beresniewicz\n\n本章将向你介绍一种强大的软件工程范式，称为**契约式设计**（Design by Contract），以及一种将其应用于 `PL/SQL`\
  \ 编程的方法。\n\n### 契约式设计\n\n2000 年的某天，我第一次读到以下引文时，它对我而言宛如一道软件真理的启示：\n\n> 契约式设计是一个强有力的隐喻……它使得设计出比以往可靠性高得多的软件系统成为可能；其关键在于理解可靠性问题（更常见的叫法是漏洞）主要发生在模块边界处，并且最常源于双方期望的不一致。契约式设计通过鼓励模块设计者基于精确定义的相互义务和权益声明来与其他模块沟通，而非寄希望于一切顺利的模糊愿望，从而为此问题提供了一种更为系统化的方法。\n\
  >\n> —Bertrand Meyer, *Object Success*\n\n当时我作为 DBA 的 Oracle 性能诊断工具开发工作的一部分，已经编写了大量\
  \ `PL/SQL` 代码，并开始厌恶追踪运行时漏洞，其中很多正是 Meyer 所指出的那类，即关于模块间 API 的误用或混淆。将这类漏洞从我的代码中工程化消除的承诺，激励我深入了解契约式设计并设法将其应用于\
  \ `PL/SQL` 编程。\n\n#### 软件契约\n\n契约式设计指出，软件模块之间存在客户-供应者关系，这种关系可以模仿法律合同来建模，即双方基于共同的自身利益和义务达成协议。每一方都期望从合同中以某种方式获益，而每一方通常也因合同而承担某些义务。在软件世界中，可以将契约视为调用模块与被调用模块之间\
  \ API 必须遵循的运行规则。调用模块在 API 被调用时提供一些输入值或其他系统状态，而被调用模块则被期望在完成时可靠地计算出某些输出或最终系统状态。如果管理这些输入输出的规则被打破，就构成契约违规，软件就存在缺陷，或者说漏洞。\n\
  \n软件契约管理 API 的概念之所以强大，原因有很多，但最主要的是因为高比例的漏洞源于 API 边界处的混淆或误用，正如 Meyer 引文所暗示的。如果我们能够以某种方式强制执行\
  \ API 契约，使得契约违规能被立即暴露，我们就能快速发现一整类漏洞，从而大幅提高软件的可靠性。\n\n\n\n#### 契约的基本要素\n\n定义软件契约条款时使用三种基本形式要素：`前置条件`、`后置条件`和`不变式`。这些抽象的契约要素通过通常称为`断言`的软件机制在代码中被记录和强制执行。\n\
  \n##### 前置条件\n\n`前置条件`是指为了使模块能计算出正确结果而必须为真的条件或状态。它们代表了在契约下调用方对模块的义务，并为模块本身带来益处。前置条件对模块有益，因为它们代表了模块算法可以依赖的确凿事实。前置条件对调用方构成了约束，因为确保在调用模块之前满足前置条件是调用方的责任。\n\
  \n未能满足前置条件而调用模块属于违反契约；因此，前置条件违规表明调用代码中存在错误。在这种情况下，模块甚至没有义务计算结果，因为“交易条款”并未得到满足。\n\
  \n在代码层面，理想情况下，前置条件应在模块入口处由执行环境本身进行检查。由于`PL/SQL`不提供对契约要素的原生支持，建议所有模块在进入模块后立即强制执行其前置条件，特别是那些管理输入变量值有效性的条件。\n\
  \n##### 后置条件\n\n`后置条件`规定了输出或计算结果的条件，只要前置条件得到满足，模块保证在其计算完成时这些条件为真。它们代表了模块计算正确结果的根本义务。后置条件对调用方的好处恰恰在于它们允许调用方信任模块的输出。\n\
  \n未能满足后置条件是模块本身的契约违反行为，并表明模块中存在缺陷。在代码层面的实际操作中，要断言模块输出的完全正确性可能非常困难，无论是在模块内部还是外部进行，因为这可能意味着需要独立实现模块的计算需求，并相互比较其相等性。\n\
  \n然而，通常可以对模块的输出施加有限或部分后置条件，这些条件足以表明契约违反。例如，如果一个函数旨在计算某个应始终为正数的结果，那么返回负数就是契约违反，这可以作为对该模块的后置条件来强制实施。\n\
  \n单元测试和回归测试可以看作是在已知前置条件和输入值下验证后置条件。\n\n##### 不变式\n\n`不变式`规定了应始终成立的状态或条件。例如，一个`PL/SQL`包可能会使用由该包模块访问（可能还会修改）的私有共享数据结构。可能存在针对这些数据结构的各种一致性或完整性要求，这些要求可以被定义并视为施加在整个包上的共享契约要素。\n\
  \n执行完成后导致不变式失效的模块存在错误。不变式可能难以通过编程方式识别和表达，并且强制执行它们的代价通常很高。\n\n### 断言\n\n`断言`是在代码中表达和强制执行软件契约要素的基本机制。断言基本上封装了关于系统状态必须为真的陈述，否则就是存在错误。也就是说，当断言测试结果为假时，已知系统处于错误状态；这应该被传达出去，通常以异常的形式。\n\
  \n从技术上讲，`前置条件`、`后置条件`和`不变式`都是不同类型的断言，因为它们捕获了不同的契约要素。在将契约设计应用于`PL/SQL`编程时，我建议构建一个简单且一致的断言机制，并使用该机制来表达和强制执行前置条件、后置条件以及（可能时）不变式。\n\
  \n断言本质上是直接内置于软件中的正确性测试，它们在运行时发现并发出错误信号，因此是确保软件可靠性的强大手段。\n\n### 实施 PL/SQL 契约\n\n\
  在建立了契约设计的概念框架之后，下一步是设计并实现一个（或多个）`PL/SQL`断言机制，用以强制执行`PL/SQL`程序之间的软件契约。\n\n\n### 基本断言过程\n\
  \n一个非常简单的断言机制可以在 PL/SQL 中实现为一个过程：它接受一个布尔型输入参数，当测试结果为 `TRUE` 时静默退出，或者当测试结果为 `FALSE`\
  \ 时通过引发异常来大声报错。`代码清单 8-1` 中的简单过程正好实现了这一逻辑。\n\n`代码清单 8-1.` 基本断言过程\n\n```sql\nPROCEDURE\
  \ assert (condition_in IN BOOLEAN)\nIS\nBEGIN\n   IF NOT NVL(condition_in,FALSE)\n\
  \   THEN\n      RAISE_APPLICATION_ERROR(-20999,'ASSERT FAILURE');\n   END IF;\n\
  END assert;\n```\n\n尽管这个过程非常简单，但有几点需要注意。首先，也是非常重要的一点是，该过程将 `NULL` 输入值视为 `FALSE`\
  \ 并引发异常。这意味着过程期望传入一个实际值，否则断言本身是无效的——换句话说，该过程被不正确地调用了。用契约术语来说，该过程有一个前置条件：输入参数 (`condition_in`)\
  \ 不能为 `NULL` (`NOT NULL`)。\n\n另一件需要注意的事情是，虽然该过程提供了一条消息表明异常指示断言失败，但这条消息并未传达有关失败条件本身的任何信息。由于断言失败总是指示存在缺陷（bug），因此若能获得特定于失败条件的附加信息用于调试将会很有帮助。\n\
  \n可以通过添加参数来改进该断言过程，在提供布尔条件的同时，提供上下文信息，用于创建更详尽的错误消息并与 `ASSERTFAIL` 异常一起返回。`代码清单 8-2`\
  \ 提供了一个示例。\n\n`代码清单 8-2.` 作为公共过程实现的改进版基本断言\n\n```sql\nCREATE OR REPLACE\nPROCEDURE\
  \ assert (condition_IN IN BOOLEAN\n                 ,msg_IN  IN VARCHAR2 := null\n\
  \                 ,module_IN IN VARCHAR2 := null)\nIS\n  ASSERTFAIL_C CONSTANT INTEGER\
  \ := -20999;\n  BEGIN\n    IF NOT NVL(condition_IN,FALSE) -- 空值时断言失败\n    THEN\n\
  \      RAISE_APPLICATION_ERROR      -- 根据文档接受 2048 字节\n              ( ASSERTFAIL_C,\
  \ 'ASSERTFAIL:'||SUBSTR(module_IN,1,30)||':'||\n                SUBSTR (msg_IN,1,2046)\
  \ ); -- 用消息填满 2048 字节\nEND IF;\nEND assert;\n/\nCREATE OR REPLACE PUBLIC SYNONYM\
  \ assert FOR assert;\nGRANT EXECUTE ON assert TO PUBLIC;\n```\n\n在这里，`assert` 过程通过公共同义词和执行权限实现了全局可用。在此示例中，`ASSERTFAIL`\
  \ 错误号通过引用示例中的局部常量 (`ASSERTFAIL_C`) 提供给 `RAISE_APPLICATION_ERROR`，但也可以引用包级别的常量。使用常量避免了在调用\
  \ `RAISE_APPLICATION_ERROR` 时硬编码字面数字，并且如果需要更改其值，可提供更好的可维护性。\n\n此 `assert` 的签名包含两个新参数：`module_IN`\
  \ 和 `msg_IN`。`module_IN` 参数允许调用断言的代码标识其来源模块。第二个参数 `msg_IN` 允许调用代码提供有关契约元素的诊断细节。\n\
  \n当 `condition_IN` 参数测试为 `FALSE` 时，即发生契约违反，并引发 `ASSERTFAIL` 异常。随 `ASSERTFAIL` 异常一起返回的实际消息被构建为由冒号分隔的复合字符串，包含字符串\
  \ `\"ASSERTFAIL\"`、程序名 (`module_IN`)，以及最后在调用 `assert` 时传入的消息 (`msg_IN`)。通过这种方式，`ASSERTFAIL`\
  \ 异常可以提供关于契约违反的位置和原因的非常具体的信息，极大地有助于缺陷的隔离和诊断。\n\n我可以在 SQL*Plus 中执行对该过程的简单测试，如下所示：\n\
  \n```sql\nSQL> l\n  1  declare\n  2  procedure my_proc(i number)\n  3  is\n  4 \
  \ begin\n  5    assert(i>3,'i>3','my_proc');\n  6  end;\n  7  begin\n  8  my_proc(1);\n\
  \  9* end;\nSQL> /\ndeclare\n*\nERROR at line 1:\nORA-20999: ASSERTFAIL:my_proc:i>3\n\
  ORA-06512: at \"APPL01.ASSERT\", line 9\nORA-06512: at line 5\nORA-06512: at line\
  \ 8\n```\n\n请注意异常消息如何告诉我们 `ASSERTFAIL` 被引发的位置和原因：参数 `i` 必须大于 3 的条件在模块 `my_proc`\
  \ 中失败了。这非常有用；`ASSERTFAIL` 表明代码中存在缺陷，而异常消息有助于隔离和分类该缺陷。调用栈显示起始代码行是匿名 PL/SQL 块的第 8\
  \ 行，该行调用了 `my_proc`，后者又在第 5 行调用了 `APPL01.ASSERT` 以断言输入参数的契约条件（即 `i>3`）。通过充分利用 `assert`\
  \ 的 `module_IN` 和 `msg_IN` 参数，具体的模块和失败条件在 `ASSERTFAIL` 错误消息中得以显露。如果断言强制执行的是一个前置条件，那么诊断未能通过断言的模块调用者将非常重要，因为前置条件缺陷会牵连到调用代码。\n\
  \n"
- "# 标准包-本地断言\n\nPL/SQL 中的大多数实质性编程都发生在包内部，因此决定如何在包的上下文中强制执行契约是一个重要的考量。我开发了一个简单、标准化的包本地断言实现，用于我所有的\
  \ PL/SQL 包中。仅使用这个相对简单的结构和相关的编码规范，就可以在定义和严格执行 PL/SQL 软件契约方面取得显著进展。\n\n首先需要标准化的是关于契约强制执行的机制和信号含义。所采用的机制是使用`RAISE_APPLICATION_ERROR`内置过程引发一个特定的异常（称为`ASSERTFAIL`）。代码清单\
  \ 8-3 中的 `DBC_example` 包规范展示了如何声明 `ASSERTFAIL` 异常，并使用 `PRAGMA` 编译器指令将其关联到一个特定的异常编号。\n\
  \n### 代码清单 8-3. 标准化的包规范模板\n```sql\nCREATE OR REPLACE PACKAGE DBC_example\nAS\n \
  \ ----------------------------------------------------------\n  -- SLPA 声明（标准化的本地包断言）\n\
  \  ----------------------------------------------------------\n  ASSERTFAIL    \
  \ EXCEPTION;\n  ASSERTFAIL_C   CONSTANT INTEGER := -20999;\n  PRAGMA EXCEPTION_INIT(ASSERTFAIL,\
  \ -20999);\n  ----------------------------------------------------------\nEND DBC_example;\n\
  /\n```\n\n应用程序作用域内的所有包都应标准化使用一个单一的错误编号作为 `ASSERTFAIL` 异常，以避免混淆。这样，`ASSERTFAIL` 在整个应用程序中就具有了共同的含义。这一点很重要，因为清晰的契约强制要求对契约违规有明确且普遍的解释，这正是\
  \ `ASSERTFAIL` 的全部目的。最后，`ASSERTFAIL` 的异常编号 (`-20999`) 也被分配给一个包常量，以便在断言过程内部引用。类似地，所有包都应以如\
  \ 代码清单 8-4 所示的标准化实现开头，该清单取自 `DBC_example` 包的主体。\n\n### 代码清单 8-4. 标准化的包主体示例\n```sql\n\
  CREATE OR REPLACE PACKAGE BODY DBC_example\nAS\n  -- 用于 assertfail 消息的包名\n  PKGNAME_C\
  \      CONSTANT VARCHAR2(20) := $$PLSQL_UNIT;  -- 注意：10g 构造\n  -- 前置声明 assert，以便所有模块实现都能引用它\n\
  \  PROCEDURE assert (condition_IN IN BOOLEAN\n                   ,msg_IN       IN\
  \ VARCHAR2 := NULL\n                   ,module_IN    IN VARCHAR2 := NULL);\n  ----------------------------------------------------------\n\
  \  -- 标准的本地包断言过程\n  ----------------------------------------------------------\n\
  \  PROCEDURE assert (condition_IN IN BOOLEAN\n                   ,msg_IN       IN\
  \ VARCHAR2 := NULL\n                   ,module_IN    IN VARCHAR2 := NULL)\nIS\n\
  \    l_assertmsg VARCHAR2(2048) := 'ASSERTFAIL:'||SUBSTR(PKGNAME_C,1,30)||'.'; --\
  \ 断言消息\n  BEGIN\n    -- 测试被断言的条件\n    IF NOT NVL(condition_IN,FALSE)   -- 输入为空时视为失败\n\
  \    THEN\n      -- 完成断言消息的初始化\n      l_assertmsg := l_assertmsg || SUBSTR(NVL(module_IN,'?MODULE?')||':'||msg_IN,1,2046);\n\
  \      -- 抛出标准化的异常\n      RAISE_APPLICATION_ERROR (ASSERTFAIL_C, l_assertmsg, FALSE);\
  \ -- FALSE\n    END IF;\n  END assert;\n\nBEGIN\n  assert(TRUE); -- 包初始化标记\nEND\
  \ DBC_example;\n/\n```\n\n代码清单 8-4 中的断言与之前在代码清单 8-2 中作为公共过程呈现的断言非常相似，略有不同的是，它使用了\
  \ Oracle 10g 查询指令 `$$PLSQL_UNIT` 来标识包，而不是依赖于单独声明（并且可能被错误初始化）的常量。对 `RAISE_APPLICATION_ERROR`\
  \ 的调用会将长消息截短至恰好适合 2048 个字符，其中为包名留出最多 30 个字符的空间。在实践中，挑战此限制的消息不一定那么有帮助，但使用子字符串有助于代码的正确性和健壮性。\n\
  \n代码清单 8-4 并不代表为了在所有包中提供本地断言（独立于其他过程）而需要付出太多代码代价。我更倾向于包在初始时能够完全独立编译的理念（并且甚至因此有点反感\
  \ `RAISE_APPLICATION_ERROR`）。\n\n因此，我个人的偏好是，所有 PL/SQL 包都使用像这样的标准规范和主体模板开始，以便在包内部和跨包采用标准化的契约强制用法。\n\
  \n或者，你也可以采用一个简单、标准化的 `PUBLIC` 断言过程，如代码清单 8-2 所示，并让所有契约强制都依赖于它。\n\n最后，我可以建议你创建一个真正精妙的共享包断言实现，带有花哨的调用栈处理来辅助错误诊断，但我不推荐这样做。本章的目的是教育和说服你在代码中以简单的方式强制执行契约，而不是用花哨的断言机制来让人印象深刻。\n\
  \n### 本地还是全局断言？\n\n熟悉传统 PL/SQL 智慧的精明读者很可能会质疑我推荐将标准化断言结构嵌入所有包，而不是创建一个使用独立过程或专用断言包的单一共享机制。\n\
  \n老实说，我更喜欢包本地断言的原因，与其说是技术性的，不如说是情感和政治上的，但我还是会尝试说明理由。\n\n首先，对我来说，采取面向契约的方法不仅仅是采用一项新技术。它更像是一种宗教皈依，因此可能会在未皈依者中遇到强烈的抵制。因此，在就部署和使用通用机制达成一致方面，可能会遇到相当大的政治阻力，而且宗教战争从来都是赢不了的。在本地包的安全范围内私下进行崇拜要容易得多，至少在群众皈依之前是如此。\n\
  \n其次，我喜欢假装并使用 assert，就好像它是 PL/SQL 语言原语一样，因此总是使用包限定的引用会不断提醒我事实并非如此。到处都拥有相同实现的本地断言有助于维持我的这种错觉。\n\
  \n第三，另一个个人偏好是总是从没有任何外部依赖项开始新包（尽管我开发的几乎没有几个包真正保持独立）。\n\n最后，让每个包都本地声明 `ASSERTFAIL`\
  \ 异常有一个微小的技术优势，那就是异常在包之间是可以区分的。所以，例如，如果某个代码块调用来自两个不同包的模块，它可以区分是哪个 `ASSERTFAIL` 被引发。然而，这很少有影响，因为\
  \ `ASSERTFAIL` 实际上永远不应该被处理，而应允许其一路向外传播。\n\n所以，情况就是这样：偏好并推荐包本地断言机制而非共享全局结构的四个真正不充分的理由。但正如已经提到的，尽管推理薄弱，偏好却很强烈。\n\
  \n幸运的是，Oracle 11g 引入了优化的 PL/SQL 编译器，这实际上为我的推荐提供了一个新的、相当有力的性能论据，即代码内联。本章末尾简要讨论了该主题及其支持包本地断言的含义。\n\
  \n### 使用 ASSERT 实现契约\n\n在决定标准化断言机制并将其嵌入每个程序包后，现在的问题是如何将其用于实现契约？为此需要一点规范；不过，根据我的经验，前期在编码上投入的额外精力，会因确保了一大类重要错误要么不存在、要么会被代码本身立即检测到而获得远超投入的回报。\n\
  \nListing 8-5 中的流程展示了如何在代码中直接使用标准化的 `assert` 来实现良好的前置条件和糟糕的后置条件。前置条件是输入参数不为 `NULL`，这无法以声明方式强制实现，并且往往是一个非常重要的要求，具体原因将在后文讨论。相比之下，后置条件则说明了在代码中使用\
  \ `assert` 时遵循调用规范的价值。该断言未能利用 `module_IN` 或 `msg_IN` 参数，因此在调试相关问题时几乎无法提供有效信息。\n\n\
  ## Listing 8-5. 正确与错误使用 Assert 的示例过程\n\n```\nPACKAGE BODY DBC_example\n…\n  ----------------------------------------------------------\n\
  \  -- 测试/示例过程和函数\n  ----------------------------------------------------------\n\
  \  PROCEDURE proc01 (p1 varchar2)\n  IS\n    -- 用于 assert 调用的本地模块名称\n    l_module\
  \ VARCHAR2(30) := 'PROC01';\n  BEGIN\n    -- 强制非空输入前置条件\n    assert(p1 IS NOT NULL,'p1\
  \ NOT NULL', l_module);\n\n    -- 过程逻辑\n    null;\n\n    -- 一个非常糟糕的后置条件！\n    assert(FALSE,'Boo\
  \ hoo on you');  -- 未传递 module 参数的 assert 失败\n  END proc01;\n```\n\n`Proc01` 接受一个输入参数\
  \ `p1`，并通过以下代码行断言契约前置条件，即它必须为 `NOT NULL`：\n\n```\nassert(p1 IS NOT NULL,'p1 NOT\
  \ NULL',l_module);\n```\n\n请注意，该前置条件是在模块主代码块的第一行进行测试的。请记住，在软件契约下，如果前置条件未满足，模块没有义务计算输出，因此立即测试它们可以让模块尽早失败，避免不必要地浪费计算周期。\n\
  \n另请注意通过参数 `msg_IN` 和 `module_IN` 向 `assert` 传递额外信息所采用的约定。对于第一个参数，消息仅仅是构成待断言契约条件的布尔表达式的字符串字面量。对于第二个参数，模块声明一个局部变量\
  \ `l_module`，并用其自身名称初始化它，该名称也会传递给 `assert`。\n\n除了针对 `NULL` 输入断言契约前置条件外，`proc01`\
  \ 还实现了一些有缺陷的说明性逻辑：它断言了一个最终的后置条件，该条件总是会抛出 `ASSERTFAIL` 异常，但没有传递任何有用的诊断信息以包含在错误消息中。\n\
  \n通过使用 `NULL` 输入值调用 `proc01` 进行测试，会从 SQL*Plus 中输出以下结果：\n\n```\nBEGIN DBC_example.proc01(null);\
  \ END;\n*\nERROR at line 1:\nORA-20999: ASSERTFAIL:DBC_EXAMPLE.PROC01:p1 NOT NULL\n\
  ORA-06512: at \"APPL01.DBC_EXAMPLE\", line 104\nORA-06512: at \"APPL01.DBC_EXAMPLE\"\
  , line 25\nORA-06512: at line 1\n```\n\n乍一看，这些结果似乎并不那么令人印象深刻，但对我来说，它们是纯金。例如，第一个\
  \ `ORA-20999` 错误表明：\n\n*   代码中存在契约违规错误，由 `ASSERTFAIL` 指示。\n*   该错误在 `DBC_EXAMPLE`\
  \ 包的 `PROC01` 模块中被捕捉到。\n*   契约违规是输入变量 `p1` 未能通过 `NOT NULL` 检查。\n*   调用堆栈表明 `DBC_EXAMPLE`\
  \ 包中第 25 行的断言检查失败。\n\n一个错误已被确定无疑地识别出来，捕捉到错误的代码位置已知，错误的性质也已揭示。回想一下你上次试图追踪涉及意外运行时数据值的错误的经历，然后告诉我这难道不酷毙了吗？\n\
  \n阅读调用堆栈并不直观，需要一些实现知识。从 `ORA-20999` 错误开始，这是本地 `assert` 中调用 `RAISE_APPLICATION_ERROR`\
  \ 的地方，堆栈中的下一个条目必定是 `assert` 过程本身，因此堆栈中的第三个条目是调用 `assert` 的代码位置。这一点很重要，因为堆栈中的下一个条目是调用\
  \ `assert` 的模块的调用者。当断言是前置条件时，表明这个调用者违反了契约条件，因此调用代码存在错误，错误位置在指示的行（在此简单示例中是第 1 行）暴露出来。执行\
  \ `proc01` 的第二次测试，这次传递了非 `NULL` 输入以满足前置条件，但在糟糕的断言上出错，得到以下输出：\n\n```\nBEGIN DBC_example.proc01('VALUE');\
  \ END;\n*\nERROR at line 1:\nORA-20999: ASSERTFAIL:DBC_EXAMPLE.?MODULE?:Boo hoo\
  \ on you\nORA-06512: at \"APPL01.DBC_EXAMPLE\", line 104\nORA-06512: at \"APPL01.DBC_EXAMPLE\"\
  , line 29\nORA-06512: at line 1\n```\n\n第二个 `ASSERTFAIL` 有助于说明为 `assert` 的模块名称和消息参数传递信息值所需的额外规范的价值。在这种情况下，仍然知道存在契约违规错误以及错误发生在哪个包中，但缺乏额外的诊断信息明显是不利的。\n\
  \n我强烈建议你花时间，在调用 `assert` 时始终包含模块名称和失败条件的信息性描述。许多模块可能有多个输入参数，其中每个参数都可能受一个甚至多个契约前置条件约束。如果不进一步考虑模块的计算目标，这看起来会像是大量的额外输入。相信我，第一次\
  \ `ASSERTFAIL` 异常在运行时跳出，并准确告知你先前未发现的错误的位置和内容时，你会非常高兴自己投入了这些精力。\n\n### 一项额外的改进\n\n\
  如前所述，前置条件违规表明调用模块中存在错误，而后置条件违规则是被调用模块中的错误。因此，对于确定契约违规错误的责任归属，了解 `ASSERTFAIL` 是来自前置条件还是后置条件断言至关重要。\n\
  \nListing 8-6 中的改进是由我的朋友 Steven Feuerstein 提出的，作为区分前置和后置条件违规的一种方法。\n\n## Listing\
  \ 8-6. 区分前置与后置条件\n\n```\n-- 用于前置条件的 assert\n  PROCEDURE assertpre (condition_IN\
  \ IN BOOLEAN\n                       ,msg_IN      IN VARCHAR2 := NULL\n        \
  \               ,module_IN    IN VARCHAR2 := NULL)\n  IS\n  BEGIN\n     assert (condition_IN,'Pre:'||msg_IN,module_IN);\n\
  \  END assertpre;\n-- 用于后置条件的 assert\n  PROCEDURE assertpost(condition_IN IN BOOLEAN\n\
  \                       ,msg_IN       IN VARCHAR2 := NULL\n                    \
  \   ,module_IN    IN VARCHAR2 := NULL)\n  IS\n  BEGIN\n     assert (condition_IN,'Post:'||msg_IN,module_IN);\n\
  \  END assertpost;\n```\n\n这个想法很简单：使用单独命名的过程来断言前置和后置条件，这些过程调用原始的 `assert`，但在消息中添加“Pre:”或“Post:”。这些额外的例程不会增加太多代码负担，并且显著改进了错误诊断，因此我已将它们添加到标准化的包模板中。当然，必须在正确的上下文中调用它们以避免混淆：切勿使用\
  \ `assertpost` 检查前置条件，也切勿使用 `assertpre` 检查后置条件。\n\n### 面向契约的函数原型\n\nPL/SQL 函数提供了额外的机会，可以将更多的契约规范引入代码中。请将清单\
  \ 8-7 中的函数视为所有 PL/SQL 函数的原型。\n\n***清单 8-7.** PL/SQL 函数原型*\n\n```sql\nFUNCTION  func01\
  \ (p1 varchar2) RETURN NUMBER\n  IS\n    l_return NUMBER;\n    l_module VARCHAR2(30)\
  \ := 'FUNC01';\n  BEGIN\n    -- 前置条件\n    assertpre(p1 IS NOT NULL,'p1 NOT NULL',l_module);\n\
  \n    -- 函数逻辑\n    null;\n\n    -- 后置条件检查与返回\n    assertpost(l_return IS NOT NULL,\
  \ 'RETURN NOT NULL',l_module);\n\n    RETURN l_return;\n  END func01;\n```\n\n关于此函数，请注意以下关键点：\n\
  \n*   它通过一个使用标准化名称（当然还有恰当类型）声明的局部变量来返回结果。\n*   它在开始处使用模块标识符和消息约定来断言前置条件。\n*   它仅在代码的最后一行使用\
  \ `RETURN` 语句退出。\n*   它在 `RETURN` 语句之前立即使用标准约定来断言后置条件。\n\n由于函数总是有一个返回值，因此可以并且应该将其编码为只有一个返回此值给调用模块的出口点。遵循这一约定，使得后置条件检查可以精确地在\
  \ `RETURN` 语句之前的一个地方指定。\n\n使用一个标准名称的局部变量专用于 `RETURN` 语句，这使得我能够知道函数逻辑何时正在操作返回值。那些在\
  \ `RETURN` 语句中直接使用复杂表达式计算输出的“聪明”函数，看起来可能很优雅，但它们削弱了通过遵循我的简单约定所能提供的对后置条件断言的控制级别。\n\
  \n遵守函数原型的编码约定对代码可靠性大有裨益，因为函数可以在明确定义的入口和出口点强制执行契约条款。具有多个可能出口点的函数（或过程）可能导致需要在多个地方重复后置条件断言，这本身在契约条款需要更改时就可能成为错误的来源。\n\
  \n### 示例：测试奇数和偶数整数\n\n到目前为止的例子都是简单的演示，用于调用前置和后置条件断言，而没有任何实际的计算需求。本节将提出一对具有实际计算需求的函数，尽管需求非常小，也许不太实用。\n\
  \n想象一个应用程序，其逻辑关键取决于特定数据值是奇数还是偶数整数。在此类应用程序中，拥有符合以下契约协议的模块可能是有用的：\n\n*   一个函数，接受一个非\
  \ NULL 整数作为输入，如果该整数是奇数则返回布尔值 `TRUE`，否则返回 `FALSE`。\n*   一个函数，类似地接受一个非 NULL 整数，当输入整数是偶数时返回\
  \ `TRUE`，否则返回 `FALSE`。\n\n这两个函数显然是相关的，因为对于任何给定的整数，它们应该返回完全相反的结果，因为整数只能是偶数或奇数，并且必须是两者之一。清单\
  \ 8-8 中的代码使用了前面介绍的函数原型和编码约定来满足第一个需求。\n\n***清单 8-8.** 用于测试数字是否为奇数的函数*\n\n```sql\n\
  FUNCTION  odd (p1 number) RETURN BOOLEAN\n  IS\n    l_return BOOLEAN;\n    l_module\
  \ VARCHAR2(30) := 'ODD';\n  BEGIN\n    -- 前置条件\n    assertpre(p1 IS NOT NULL,'p1\
  \ NOT NULL',l_module);\n    assertpre(p1 = TRUNC(p1), 'p1 INTEGER',l_module);\n\n\
  \    -- 函数逻辑：如果 p1 是奇数则返回 TRUE\n    l_return := MOD(p1,2)=1;\n    -- 后置条件检查与返回\n\
  \    assertpost(l_return IS NOT NULL, 'RETURN NOT NULL',l_module);\n\n    RETURN\
  \ l_return;\n  END odd;\n```\n\n清单 8-8 中的函数几乎与清单 8-7 中的函数原型完全相同。清单 8-8 中的函数分别在函数的开始和结束处断言前置和后置条件，在代码的最后一行返回计算结果。\n\
  \n该函数断言了两个前置条件：输入非 NULL，并且它还是一个整数。聪明的读者可能会观察到，第二个断言隐含了第一个断言，因为如果 `p1` 的输入值是 `NULL`，那么这第二个断言也会失败，因此第一个断言在某种意义上可能是多余的。在这种情况下，可能诱人只断言第二个条件；然而，这代表了一种捷径，它模糊了实际上有两个独立前置条件的事实：输入必须非\
  \ NULL 并且它必须是一个整数值的数字。采用面向契约编码方式的部分动机是希望在代码本身中对契约要求非常明确，因此即使复合表达式隐含了这些简单断言，也应在复合断言之前加上对其组成部分的任何简单断言。这说明了代码中断言的一个重要附加好处：它们既记录又强制执行软件契约。\n\
  \n`odd` 函数的计算需求仅用一行代码就满足了，但函数本身包含了五行可执行代码。我们功能需求的最简实现可以由清单 8-9 中的函数满足。\n\n***清单\
  \ 8-9.** 测试奇数的最简实现*\n\n```sql\nFUNCTION  odd2 (p1 number) RETURN BOOLEAN\n  IS\n\
  \  BEGIN\n    RETURN MOD(p1,2)=1;\n  END odd2;\n```\n\n\n虽然列表 8-9 中的实现满足了基本的计算要求，即当`p1`为奇数时返回`TRUE`，但它并未强制执行契约要求，即只接受非`NULL`的整数并且只返回`TRUE`或`FALSE`。如果传入`p1`为`NULL`，该函数将返回`NULL`作为输出，尽管它声称返回的是布尔值。这迫使调用模块要么自行对输入值断言非`NULL`，要么使用`NVL`或其他特殊情况结构来处理`NULL`输出。因此，为确保正确性所需的额外代码并未消失，而是被转移到了调用应用程序中，所有这些应用程序都必须正确实现它。\n\
  \n同样，该最小实现并未检查`p1`是否为整数，而`MOD`函数会欣然接受其参数的非整数值并返回结果，因此函数在此情况下不会失败；然而，一个依赖于整数奇偶性的系统不太可能满足于接受非整数输入并判断其奇偶性的例程。\n\
  \n现在，考虑列表 8-10 中互补函数`even`的实现，该函数用于计算输入整数是否为偶数。\n\n**列表 8-10.** 一个测试偶数性的函数\n\n```sql\n\
  FUNCTION  even (p1 number) RETURN BOOLEAN\n  IS\n    l_return BOOLEAN;\n    l_module\
  \ VARCHAR2(30) := 'EVEN';\n  BEGIN\n    -- 前置条件\n    assertpre(p1 IS NOT NULL,'p1\
  \ NOT NULL',l_module);\n    assertpre(p1 = TRUNC(p1), 'p1 INTEGER',l_module);\n\n\
  \    -- 函数逻辑：如果 p1 是偶数则返回 TRUE\n    l_return := p1/2 = TRUNC(p1/2);\n\n    -- 后置条件检查和返回\n\
  \    assertpost(l_return IS NOT NULL, 'RETURN NOT NULL',l_module);\n    assertpost(NOT(l_return\
  \ AND odd(p1)),'NOT(EVEN AND ODD)',l_module);\n    assertpost(l_return OR odd(p1),'EVEN\
  \ OR ODD',l_module);\n\n    RETURN l_return;\n  END even;\n```\n\n列表 8-10 的函数看起来与`odd`函数（列表\
  \ 8-8）非常相似，因为它紧密遵循了面向契约的函数原型，但仍有一些重要区别值得注意。一方面，该函数逻辑本可以轻松地使用取模逻辑，就像`odd`函数那样，使用`l_return\
  \ := MOD(p1,2)=0`，但它却使用了简单的除以 2 和`TRUNC`函数：\n\n```sql\nl_return := p1/2 = TRUNC(p1/2);\n\
  ```\n\n这引出了关于`even`函数最值得注意的一个特性，即对后置条件的广泛断言。首先是简单的期望，即`l_return`非`NULL`，随后是这些逻辑谜题：\n\
  \n```sql\nassertpost(NOT(l_return AND odd(p1)),'NOT(EVEN AND ODD)',l_module);\n\
  assertpost(l_return OR odd(p1),'EVEN OR ODD',l_module);\n```\n\n这两个复杂的断言实际上通过互补的`odd`函数来测试`even`函数即将返回值的正确性。第一个断言这两个函数`even`和`odd`不能同时对`p1`做出相同判断，如果一个为`FALSE`，则另一个必为`TRUE`，反之亦然。第二个断言对于任何给定的`p1`，它们中至少有一个必须为`FALSE`。\n\
  \n这些断言通过将计算结果与采用不同算法策略且计算上独立的函数的结果进行比对，来测试函数结果的正确性。这是极少数可以将计算结果的正确性作为后置条件进行断言的案例之一。\n\
  \n当然，没有什么是完全免费的，在这种情况下，断言复杂的后置条件实际上相当于将计算逻辑执行了三次——一次在`even`函数本身中，另外两次在调用`odd`函数进行后置条件断言时。与`odd`函数的紧密耦合也意味着，如果该函数存在错误，该错误也会延伸到`even`函数中。\n\
  \n### 有用的契约模式\n\n在我自己的代码中，我认识到并欣赏几种有用的契约模式，将在以下小节中描述。采用这些经过充分理解和商定的模式，可以提升代码的正确性和清晰度，因为某些契约根据模式被理解为适用，无需逐模块进行规范或分析。\n\
  \n#### 非空输入 / 非空输出\n\n在 PL/SQL 上下文中，最基本和最有用的软件契约也许是那些消除了围绕`NULL`值处理的问题性和通常模棱两可情况的契约。大多数算法期望基于实际数据进行计算，并且可能需要在数据缺失或为`NULL`值时提供特殊情况或替代的计算结果。这可能会给\
  \ API 引入不必要的歧义或复杂性，更好的做法是在可能的情况下简单地禁止`NULL`值。\n\n找出由`NULL`值导致的错误可能非常困难，特别是当计算因此并未显式失败时。计算机程序逻辑本质上是二元的，而`NULL`是一个不受欢迎的第三者。\n\
  \n因此，我最喜欢的契约之一可以简单地描述（从被调用模块的角度看）如下：如果你同意不传给我`NULL`输入值，你肯定将收到非`NULL`的输出值作为回报。只要能够实施，这种契约协议几乎普遍有价值。在实践中，大部分契约执行是验证输入前置条件，而这通常意味着只接受非`NULL`值。当然，模块随后也必须遵守并尽可能强制执行其在后置条件下的义务，即只生成非`NULL`输出。这种契约模式还具有内在的公平性：双方承担相同的义务，并获得相似的确定性收益。\n\
  \n#### 函数返回非空\n\n这种模式是前一种模式的特化，它认识到在模块必须向调用者返回输出时，使用函数而不是过程具有显著优势。基于函数的编程模型有助于实施有纪律的契约执行，如前面讨论的函数原型所示。此外，可靠地返回非`NULL`值的函数可以在调用代码中引用，以代替常量或变量。例如，想象一个名为`my_function`的函数，它接受一个输入参数`p1`，并保证返回一个非`NULL`的数字作为输出。这使我能够安全地编写如下代码：\n\
  \n```sql\nIF my_function(p1=>'X') > my_function(p1=>'Y')\nTHEN do_something;\nEND\
  \ IF;\n```\n\n这里的意图是清晰、明确的，并且可以直接从代码中读懂：比较`my_function`在参数值'X'和'Y'上的结果，如果前者大于后者则采取行动。\n\
  \n现在假设`my_function`不保证输出非`NULL`值。那么任何调用它的代码都必须自行决定在此情况下该怎么做，例如：\n\n```sql\nIF NVL(my_function(p1=>'X'),\
  \ 0) > NVL(my_function(p1=>'Y'), 1)\nTHEN do_something;\nEND IF;\n```\n\n这段代码由于引入了`NVL`函数调用对的干扰性语法噪音而变得难以阅读。此外，意图远不那么明显，特别是考虑到当输入值为'X'时`my_function`的`NULL`输出被转换为\
  \ 0，而当输入值为'Y'时转换为 1。为什么会这样？这是此代码中的错误，还是`my_function`内在目的的某种神秘后果？当函数契约薄弱且调用者必须适应模棱两可的输出时，就会发生这种情况。\n\
  \n\n\n"
- "# 函数返回布尔值且非空\n\n非空函数模式的一种特定情况是函数的 `RETURN` 数据类型为 `BOOLEAN`。这类函数可以安全地在条件语句中被引用，以实现强大且富有表现力的逻辑。\n\
  \n例如，假设存在一个过程，用于对某种类型 `my_rectype` 的记录执行某些复杂处理，但这些记录必须通过一些复杂的准则才能成功处理。这些准则实际上是处理过程的前置条件，或者可能是该过程不要求但程序逻辑希望强加的附加准则。这些准则可以封装在一个函数中，该函数的契约是测试这些准则并明确返回\
  \ `TRUE` 或 `FALSE`。\n\n```sql\nFUNCTION ready_to_process (rec1 my_rectype) RETURN\
  \ BOOLEAN;\n```\n\n执行记录处理的代码可能如下所示：\n\n```sql\nIF ready_to_process(rec1=>local_rec)\n\
  THEN\n  process_record(rec1=>local_rec);\nELSE\n  log_error;\nEND IF;\n```\n\n再次强调，无需处理\
  \ `NULL` 函数输出，再加上富有表现力的函数名，使得此类代码的意图清晰明了。\n\n"
- "# 检查函数：返回真值或断言失败\n\n前面的例子引出了一个关于断言返回 `BOOLEAN` 值的函数真值的有趣考量。例如，`process_record`\
  \ 过程是否应该将 `ready_to_process` 函数断言为一个前置条件？\n\n```sql\nPROCEDURE process_record (rec1\
  \ my_rectype)\nIS\n    l_module VARCHAR2(30) := 'PROCESS_RECORD';\nBEGIN\n  -- 前置条件：测试记录是否准备好处理\n\
  \  assertpre(ready_to_process(rec1), 'REC1 ready to process', l_module);\n```\n\n\
  这样做到底行不行，答案是“视情况而定”。Bertrand Meyer 对此有如下论述：\n\n> *如果你通过坚持使用简单且不言自明的正确函数来施加适当的注意，那么在断言中使用函数例程可以为你提供一种强大的抽象手段。*\n\
  >\n> Bertrand Meyer, *《面向对象的软件构造》*, 第二版\n\n我非常喜欢“简单且不言自明的正确”这个短语，因为它精辟地抓住了无缺陷代码的本质。在我自己的编程实践中，我有时发现同一个包中的多个模块可能都引用并操作某些私有的全局数据结构，并且都需要对这些结构断言一组共同的前置条件以保证正确性。在这种情况下，实现一个将这些断言组合在一起的函数可以消除大量的代码重复。\n\
  \n```sql\nFUNCTION check_all_ok(module_IN VARCHAR2) RETURN BOOLEAN\nIS\nBEGIN\n\
  \  assert(condition1, 'condition1', module_IN);\n  assert(condition2, 'condition2',\
  \ module_IN);\n  …\n  assert(conditionN, 'conditionN', module_IN);\n\n  RETURN TRUE;\n\
  END check_all_ok;\n```\n\n只要被测试的条件本身是局限于包变量或数据结构以及 `PL/SQL` 语言原语的简单表达式，那么这类“检查函数”就可以被认为是“简单且不言自明的正确”的，因为它们显然只能返回\
  \ `TRUE` 或抛出 `ASSERTFAIL` 异常。因此，`check_all_ok` 函数可以安全地在依赖它的各个模块中被断言。\n\n```sql\n\
  assertpre(check_all_ok(l_module), 'check_all_ok', l_module);\n```\n\n请注意，调用者的本地模块名称被传递给\
  \ `check_all_ok` 函数，这样生成的任何 `ASSERTFAIL` 异常都将被正确地标记上检查失败所在的模块名称。\n\n### 无缺陷代码的原则\n\
  \n本章实际上已经快速而简洁地涵盖了大量内容。本章开头附近引用的参考文献可以让你更全面地了解契约式设计的深度和丰富性。我提到自己对契约式编程的吸引力植根于对缺陷（尤其是我自己代码中的缺陷）的厌恶。软件契约的目的是通过明确假设和期望，并在代码本身中直接强制执行这些假设和期望，来消除软件接口的歧义。通过这些手段，一整类缺陷可以在程序中预先设计排除——或者至少被迅速暴露和处理。\n\
  \n这里介绍的机制和技术绝不意味着在 `PL/SQL` 中提供了对契约式设计的完整支持。事实上，Bertrand Meyer 创造了一种名为 Eiffel 的完整编程语言及其开发环境来支持它，正是因为现有的语言和工具不能完全支持这种范式。然而，我们必须与\
  \ `PL/SQL` 共存并尽力而为，我尝试提出了一种在 `PL/SQL` 环境中采用契约式设计哲学的实用方法。\n\n在结束之际，我将简要讨论几个用于开发无缺陷代码的契约式原则。\n\
  \n### 严格断言前置条件\n\n`PL/SQL` 程序通常在通过输入参数值传递给它们的或作为包全局变量可用的简单或复杂数据结构上执行其算法。在这方面，它们与其他任何语言编写的程序并无不同。程序算法通常对它们所操作的数据有非常具体的要求，当这些要求未得到满足时，算法很可能会失败或给出不可靠的结果。这些要求正是契约式设计所指的前置条件，严格强制执行前置条件要求是确保你的算法每次都能成功执行的首要且最佳步骤。这听起来可能显而易见，但是，有多少程序在编写时会详细关注识别其算法对输入的每一个假设，并明确地将它们记录下来？而在这些程序中，又有多少会在代码本身中实际强制执行这些要求，使得无效输入无法进入核心部分，可以这么说？\n\
  \n正如已经多次提到的，许多算法并非设计为在 `NULL` 输入上运行，或者当遇到 `NULL` 输入时，它们会采用特殊情形代码产生特殊情形输出。为什么不干脆完全排除\
  \ `NULL` 值，将这些程序限制在它们所设计的简单情形中呢？这并不是说 `NULL` 输入总是可以禁止的，但这也许正是契约谈判应该开始的地方。如果客户端确实无法遵守，那么可能需要放宽前置条件，并相应地调整程序，但至少那样你会知道原因所在。\n\
  \n另一个好的实践是梳理并明确强制执行每一个单独的前置条件，而不是将多个前置条件叠加在一个断言中。例如，如果两个输入参数 `x` 和 `y` 被要求具有非 `NULL`\
  \ 值，并且 `x` 必须大于 `y`，那么所有这三个前置条件都可以用\n\n```sql\nassertpre(x > y,'x > y', l_module)\n\
  ```\n\n来强制执行。如果 `x` 或 `y`（或两者都是）为 `NULL`，此断言将失败；然而，这些要求在断言中并不明确，必须被推断出来。契约式设计的核心在于明确和精确，不容忍推断和影射。因此，在这个例子中应该有三个前置断言。\n\
  \n前面的例子也说明了断言的一个我尚未强调的主要好处，即它们不仅强制执行，而且记录了软件契约。编写代码使用你的模块的程序员如果能够阅读源代码，就可以直接从前置条件中读取正确使用的要求。\n\
  \n明确要求良好的输入，那么良好的输出就更容易保证。\n\n\n\n#### 彻底模块化\n\n在要求调用者提供良好输入并在代码中强制执行这些要求之后，你的模块就有义务产生正确的输出。拥有成百上千行代码并对数据结构进行多次转换的程序，很难甚至不可能验证其正确性。然而，针对理解透彻且经过验证的数据结构、使用非常特定算法的紧凑计算单元，实际上可能具有“不证自明地正确”的特性。这只能通过模块化来实现，即将庞大复杂的计算分解为越来越小的、自包含的计算子组件，然后将它们串联起来以实现更大的目标。每个子组件在算法上应尽可能简单，以便通过检查和最少的脑力劳动就能获得对其正确性的信心。\n\
  \n请注意，模块化代码并不总是意味着将其分解为独立的可执行模块；它也可以是将单个大型程序组织成一组子转换，这些子转换从提供的输入逐步生成预期的输出。在这些情况下，你会希望在子转换结束、另一个开始时，对中间计算状态进行断言。\n\
  \n通过将代码模块化为更多、更小的组件，你创建了更多的接口和更多表达契约的机会。如果你坚持严格的前置条件测试这一原则，这意味着你的代码中将内置越来越多的断言，保护所有这些接口的契约要求。每个断言都是在运行时执行的正确性测试：你的代码就像在断言的烈火中淬炼过的钢一样变得坚韧。漏洞怎么可能存活？\n\
  \n在可信数据上运行的简单且不证自明的正确算法，是通往无漏洞代码的正途。\n\n#### 采用基于函数的接口\n\n在采用了前两个原则之后，你的简单且不证自明的正确的模块应该是什么样子？当模块必须将计算结果传回给调用者时，函数在强制执行契约方面提供了明显的优势。这些优势之前已经提到过，但值得重申。\n\
  \n*   函数提供单一输出，因此与单一目的一致。\n*   函数的编写方式可以使后置条件断言精确地定位在 `RETURN` 语句之前。\n*   函数可以与变量或条件测试互换使用，从而实现高度紧凑和富有表现力的代码，尤其是当它们断言\
  \ `NON NULL` 后置条件时。\n\n这并不是说过程没有其用武之地，也不是说你应该避免它们。然而，我见过的许多 PL/SQL 代码都是过程过多而函数过少。当需求是特定输入数据被计算转换并返回某些输出数据时，基于函数的接口为采用严格的契约导向提供了更好的机会。\n\
  \n#### 遇到 ASSERTFAIL 时崩溃\n\n在按契约设计中，断言失败就意味着漏洞，句号。捕获 `ASSERTFAIL` 异常并以某种方式掩盖或隐藏其发生的程序，实际上是在歪曲事实：一个正确性漏洞已被发现却未被报告。更好的做法是让程序崩溃，并利用异常消息中提供的诊断信息来查找和修复漏洞。\n\
  \n用安迪·亨特和戴夫·托马斯的话说（见上文参考文献）：\n\n> *死去的程序不会说谎*\n\n如果你发现自己被迫捕获和处理 `ASSERTFAIL`，因为尽管有它，正确的计算仍能进行，那么可能有一些契约问题需要理清。契约导向并不意味着通过不可协商的前置条件对客户端模块实施独裁控制。契约是双方之间的协议，条款需要双方都能接受。因此，与其捕获和处理\
  \ `ASSERTFAIL`，不如尽可能重新协商契约。\n\n#### 对你的后置条件进行回归测试\n\n人们非常强调对前置条件进行严格断言，而对后置条件则关注得少得多。在大多数情况下，要在给定前置条件的前提下绝对保证输出正确性，充其量是困难的，在某些情况下几乎不可能。函数\
  \ `even` 提供的例子是不寻常的，它拥有一个用于互补函数 `odd` 的替代算法，这提供了一种断言输出正确性的方法。即使可能，断言完整的后置条件正确性的计算成本也可能使计算输出本身的成本有效地翻倍。\n\
  \n然而，有一种常见情况，即对于给定输入的正确输出是众所周知的，那就是单元测试。典型的单元测试包括在特定输入集下将程序输出与众所周知的预期结果进行匹配。这实际上相当于断言程序在给定这些输入下满足了后置条件。所以，希望如果你在进行生产级的\
  \ PL/SQL 编程，你已经有一个测试框架就位，并通过定期的回归测试来验证模块的正确性。\n\n这里需要注意的一点是，只有外部声明的模块才能进行回归测试。一个可能的变通方法是准备两个版本的包规范：一个只暴露打算供外部使用的模块，另一个则同时暴露内部模块以用于回归测试。当然，两个版本都应该使用相同的包体，并且必须非常小心，除了声明的模块外，不要让规范发生分歧。这不是理想的，但它是可行的。\n\
  \n\n\n#### 避免正确性与性能的权衡陷阱\n\n最后，提出一条警示性原则：避免陷入我所谓的“错误的正确性-性能权衡陷阱”。如果你采纳本文推荐的面向契约的方法，你可能会发现，严格断言契约元素不仅会导致大量额外的键入工作，而且每次`assert`调用都是实际执行的代码，虽然其开销**极其微小**，但并非完全免费。在那些断言了长串复杂前置条件（可能在一个游标循环的数千行中）的模块中，当代码进行性能分析时，这些断言可能会显得“昂贵”。\n\
  \n在这种情况下，你可能会基于其计算成本而倾向于移除这些断言；我的建议是尽可能避免这种诱惑。断言关乎确保代码的正确性；而性能关乎快速执行代码。不存在所谓的“正确性-性能权衡”：快速获得的错误结果仍然是错误的，因此是无用的。\n\
  \n然而，如果契约断言带来的性能影响似乎高到无法容忍，并且所涉及的模块高度受信，那么放宽这条准则并停止测试某些断言可能是必要的。与其从源代码中完全移除它们，不如简单地将它们注释掉。请记住，源代码中的断言也是模块所遵循契约的重要文档工件。\n\
  \n或者，在 Oracle 10g 及更高版本中，你可以使用 PL/SQL 条件编译功能，在某种程度上鱼与熊掌兼得。考虑以下过程，当编译时设置了条件编译标志 `DBC`\
  \ 为 `TRUE`，则有条件地包含一个前置条件断言：\n\n```sql\nPROCEDURE proc02\n  IS\n    l_module VARCHAR2(30)\
  \ := 'PROC02';\n  BEGIN\n    -- 条件前置条件断言\n    $IF $$DBC $THEN\n    assertpre(FALSE,'Assert\
  \ FALSE precondition',l_module);\n    $END\n\n    -- 过程逻辑\n    null;\n  END proc02;\n\
  ```\n\n该过程可以设置标志为 `TRUE` 进行编译用于测试，并重新编译时将其设置为 `FALSE` 以发布到生产环境。在生产环境中，如果怀疑程序存在问题，可以将标志重新设为\
  \ `TRUE` 并重新编译代码，以重新启用断言测试来发现和诊断错误。再次强调，这并不推荐，因为生产环境中的正确性测试最为重要，但在性能影响高得无法接受的情况下，这是可能的。\n\
  \n#### Oracle 11g 优化编译\n\nOracle 11g 引入了 PL/SQL 的优化编译，包括子程序内联，这在小的局部程序被频繁调用时可以获得显著的性能优势。深入讨论该主题超出了本章范围，但基本上，内联可以用被调用模块代码的副本“内联”地替换对编译单元内局部模块的调用，从而消除调用栈开销。\n\
  \n内联优先针对较小、较简单的局部模块进行，这恰恰描述了我多年来一直使用和推荐的包局部断言机制。最终，我偏爱将断言局部化在每个包内的这种非传统做法得到了一些真正的验证！因此，采用包局部断言并启用完全优化，可以最大限度地降低在\
  \ PL/SQL 代码中强制实施软件契约的成本。在我看来，这听起来像是双赢。\n\n通过在编译前将 `PLSQL_OPTIMIZE_LEVEL` 参数设置为值\
  \ `3` 来启用 PL/SQL 内联，如下所示：\n\n```sql\nALTER SESSION SET PLSQL_OPTIMIZE_LEVEL=3;\n\
  ```\n\n你可以使用 `PLSQL_WARNINGS` 参数获知内联优化和其他编译器警告，如下所示：\n\n```sql\nALTER SESSION SET\
  \ PLSQL_WARNINGS='ENABLE:ALL';\n```\n\n对那些充斥着契约强制断言的包，通过实验来衡量 PL/SQL 内联带来的性能收益将会很有趣。\n\
  \n### 总结\n\n契约式设计是一种强大的软件工程范式，用于从你的代码中消除与模块接口（APIs）相关的缺陷。软件契约由前置条件（表示对调用模块施加的要求）和后置条件（表示对被调用模块施加的义务）来指定。这些契约元素通过一个称为\
  \ `assert` 的软件机制来强制实施。断言失败总是指示调用模块或被调用模块中的代码存在错误，具体取决于违反的是前置条件还是后置条件。\n\n在 PL/SQL\
  \ 中采用面向契约的方法，可以通过一个简单、标准化的断言机制，并在整个代码库中采用规范化、标准化的用法来实现。本章向你展示了我为此开发的具体技术，如果你选择采纳，我真诚地希望你发现这些技术很有价值。\n\
  \n## 第 9 章\n\n## 从 SQL 调用 PL/SQL\n\n作者：Adrian Billington\n\n函数是任何设计良好的 PL/SQL 应用程序不可或缺的部分。它们是编程最佳实践的体现，例如代码模块化、重用以及业务或应用逻辑的封装。当用作大型程序的简单构建块时，它们可以是一种优雅而简单的方式，以最低成本扩展功能，同时降低代码复杂度。\n\
  \n反之，当 PL/SQL 函数被大量使用时，特别是在 SQL 语句中，可能会带来一系列相关的成本，其中最显著的是性能成本。根据函数的性质，仅仅从 SQL 调用\
  \ PL/SQL 和/或过度的 I/O 就可能降低即使是最简单的查询的性能。\n\n鉴于此，我将描述从 SQL 调用 PL/SQL 函数所涉及的各种成本，更重要的是，演示一系列可用于减轻其影响的技术。到本章结束时，你将更清楚地意识到在应用程序中使用\
  \ PL/SQL 函数的成本。因此，你将能更好地为新的或重构的应用程序做出良好的设计决策，并改进对系统关键部分的性能调优工作。\n\n注意：本章中的示例均已在\
  \ Oracle Enterprise Linux 11.2.0.2 数据库上运行。完整的代码清单可从 Apress 网站下载。在许多情况下，我已将输出精简到传达信息和保持章节流畅所需的最低限度。所有示例均可在\
  \ SQL*Plus 中执行，下载包中包含了我使用的除 Oracle 数据库软件自带工具外的任何实用程序。\n\n\n\n### 在 SQL 中使用 PL/SQL\
  \ 函数的成本\n\nSQL 和 PL/SQL 语言是无缝集成的。自 `Oracle Database 9i` 起，这两种语言甚至共享同一个解析器。在我们编写的大多数代码中，我们利用这种互操作性来获益，例如在\
  \ PL/SQL 程序中使用 SQL 游标，或从 SQL 调用 PL/SQL 函数。我们这样做时，通常很少关心 Oracle Database 在底层需要做些什么来运行我们的程序。\n\
  \n尽管存在这种集成，但将它们结合起来使用仍会产生运行时成本，特别是在从 SQL 调用 PL/SQL 时（当然，这也是本章的重点）。在接下来的几页中，我将探讨其中的一些成本。有趣的是，Oracle\
  \ 一直在努力减少在多个版本中结合 SQL 和 PL/SQL 代码的影响，因此我所描述的问题可能并非其最终状态。\n\n我对在 SQL 中使用 PL/SQL 函数成本的调查可以分为三个主要领域：\n\
  \n*   性能\n*   可预测性（与性能相关）\n*   副作用\n\n![images](img/square.jpg) **注意** 我不涉及语法或操作限制（例如禁止在从\
  \ SQL 调用的 PL/SQL 函数中使用 DML）。这些本身并非运行时成本，并且在其他地方有详细记载。\n\n### 上下文切换\n\n上下文切换是一种几乎无法减少的计算成本，它发生在\
  \ CPU、操作系统和软件中。其机制根据发生位置而不同，但它通常是一种 CPU 密集型操作，设计人员会尽可能地对其进行优化。\n\n当我们考虑与 Oracle\
  \ Database 相关的“上下文切换”时，我们特指 SQL 引擎和 PL/SQL 引擎之间处理控制的交换（而不必理解在此过程中发生了什么）。这两个引擎是独立且不同的，但我们交替使用它们。这意味着，当从\
  \ PL/SQL 调用 SQL 或反之亦然时，调用上下文需要存储其处理状态，并将控制权和数据移交给对应的引擎（该引擎可能从之前的某个切换点继续，也可能不）。这种切换循环计算密集，并且通常可以重复多次，以至于其对响应时间的影响可能变得相当明显。\n\
  \n对许多人来说，第一次接触 Oracle Database 中的上下文切换可能是在 `Oracle Database 8i` 中引入 `BULK COLLECT`\
  \ 和 `FORALL` PL/SQL 特性时，这些特性 *专门* 旨在减少上下文切换。这些性能特性使得可以在单个上下文切换中在 SQL 和 PL/SQL 引擎之间绑定数据数组，极大地减少了当时流行的逐行\
  \ PL/SQL 技术所产生的上下文切换次数。在几个主要版本中，这些语言特性带来的几乎所有性能收益都可归因于它们促进的上下文切换减少。（在最近的版本中，当使用\
  \ PL/SQL 数组处理时，也可以实现一些进一步的收益，例如批量 INSERT 操作的重做优化。）\n\n![images](img/square.jpg)\
  \ **注意** 减少上下文切换是一种非常有效的性能技术，以至于 Oracle 设计人员在 `Oracle Database 10g` 引入的 PL/SQL 优化编译器中，为游标\
  \ FOR 循环添加了隐式的 `BULK COLLECT`。\n\n所有这些对 PL/SQL 程序员来说当然是好消息，但过度上下文切换的影响在其他地方仍然会遇到。特别是，从\
  \ SQL 调用 PL/SQL 函数需要支付性能代价。\n\n#### 测量上下文切换\n\n尽管 Oracle Database 的工具非常出色（确实非常出色），但上下文切换本身无法直接测量；它发生在内核的深处，没有简单的统计信息或计数器可供量化。但鉴于从\
  \ SQL 调用 PL/SQL（反之亦然，虽然我将不再提醒读者这一点）必然导致上下文切换，其影响可以通过一组简单的测量和提供的实用程序推断出来。\n\n代码清单\
  \ 9-1 展示了两个 SQL 语句的简单比较，其中一个语句为每一行调用一个 PL/SQL 函数。该函数除了返回输入参数外不执行任何操作，时间使用 `SQL*Plus`\
  \ 计时器进行比较。我使用了 500 的数组大小和 `Autotrace` 来抑制输出。\n\n***代码清单 9-1.** 从 SQL 调用 PL/SQL 函数的成本（基线）*\n\
  \n```sql\nSQL> SELECT ROWNUM AS r\n  2  FROM   dual\n  3  CONNECT BY ROWNUM <= 1e6;\n\
  \n1000000 rows selected.\n\nElapsed: 00:00:01.74\n\nStatistics\n----------------------------------------------------------\n\
  \          0  recursive calls\n          0  db block gets\n          0  consistent\
  \ gets\n          0  physical reads\n          0  redo size\n    6290159  bytes\
  \ sent via SQL*Net to client\n      40417  bytes received via SQL*Net from client\n\
  \       2001  SQL*Net roundtrips to/from client\n          1  sorts (memory)\n \
  \         0  sorts (disk)\n    1000000  rows processed\n```\n\n基线 SQL 语句在不到 2 秒的时间内生成了\
  \ 100 万行数据。从 `Autotrace` 输出可以看出，这种形式的 SQL 语句除了 CPU（以及更大的行数下的网络传输和内存）外，对资源消耗很小。在\
  \ SQL 中添加 PL/SQL 函数调用对经过时间有很大影响，如代码清单 9-2 所示。\n\n***代码清单 9-2.** 从 SQL 调用 PL/SQL\
  \ 函数的成本（使用函数）*\n\n```sql\nSQL> CREATE FUNCTION plsql_function(\n  2            \
  \       p_number IN NUMBER\n  3                   ) RETURN NUMBER AS\n  4  BEGIN\n\
  \  5     RETURN p_number;\n  6  END plsql_function;\n  7  /\n\nFunction created.\n\
  \nSQL> SELECT plsql_function(ROWNUM) AS r\n  2  FROM   dual\n  3  CONNECT BY ROWNUM\
  \ <= 1e6;\n\n1000000 rows selected.\n\nElapsed: 00:00:05.61\n```\n\n我省略了 `Autotrace`\
  \ 输出，因为它与基线 SQL 的输出几乎相同，但你可以看到，添加对这个最简单查询的函数调用几乎增加了 4 秒的运行时间。\n\n如前所述，无法直接测量上下文切换本身，但你可以使用诸如\
  \ `SQL trace`、`PL/SQL Hierarchical Profiler`（`Oracle Database 11g` 特性）或 `V$SESS_TIME_MODEL`\
  \ 视图等工具来测量在 PL/SQL 引擎中花费的总时间。代码清单 9-3 显示了针对先前 SQL 的 Hierarchical Profiler 会话的摘要结果。\n\
  \n***代码清单 9-3.** 从 SQL 调用 PL/SQL 函数的成本（Hierarchical Profiler 结果）*\n\n```text\nFUNCTION\
  \                     LINE#      CALLS SUB_ELA_US FUNC_ELA_US\n--------------------------\
  \ ------ ---------- ---------- -----------\n__plsql_vm                      0  \
  \  1000003    3122985     2006576\nPLSQL_FUNCTION                  1    1000000\
  \    1116012     1116012\n__anonymous_block               0          3        397\
  \         311\nDBMS_OUTPUT.GET_LINES         180          2         86         \
  \ 82\nDBMS_OUTPUT.GET_LINE          129          2          4           4\nDBMS_HPROF.STOP_PROFILING\
  \      59          1          0           0\n```\n\n\n\n此性能剖析文件清晰地显示，`PL/SQL` 函数被调用了\
  \ 100 万次，这占用了略高于 1 秒的耗时。同样有趣的是，`PL/SQL` 虚拟机（即 `PL/SQL` 引擎）在函数执行之外花费了 2 秒的处理时间。这部分时间中的一部分可归因于上下文切换。总体而言，`PL/SQL`\
  \ 引擎的耗时超过了 3 秒。（注意，`DBMS_OUTPUT` 调用是 `SQL*Plus` 中 `serveroutput` 设置的结果，在此实例中无异于背景噪音。）\n\
  \n![images](img/square.jpg) 注：关于 `PL/SQL` 层次化剖析器的详细讨论，请参见第 13 章。\n\n这些数据通过查询的扩展\
  \ `SQL` 跟踪得到了验证，正如清单 9-4 中的 `TKProf` 输出所展示的那样。\n\n**清单 9-4.** 从 SQL 调用 PL/SQL 函数的成本（tkprof\
  \ 输出）\n```\ncall     count       cpu    elapsed       disk      query    current\
  \        rows\n------- ------  -------- ---------- ---------- ---------- ----------\
  \  ----------\nParse        1      0.00       0.00          0          0       \
  \   0           0\nExecute      1      0.00       0.00          0          0   \
  \       0           0\nFetch     2001      4.92       5.08          0          0\
  \          0     1000000\n------- ------  -------- ---------- ---------- ----------\
  \ ----------  ----------\ntotal     2003      4.92       5.08          0       \
  \   0          0     1000000\n\n<snip>\n\nRows (1st)   Row Source Operation\n----------\
  \   ---------------------------------------------------\n   1000000   COUNT  (cr=0\
  \ pr=0 pw=0 time=3595520 us)\n   1000000    CONNECT BY WITHOUT FILTERING (cr=0 pr=0\
  \ pw=0 time=1693263 us)\n         1     FAST DUAL  (cr=0 pr=0 pw=0 time=28 us cost=2\
  \ size=0 card=1)\n```\n\n我删除了 Rows (max) 和 Rows (avg) 统计信息以缩减输出，但你可以从行源统计中看出，为结果集投射这\
  \ 100 万行大约花费了 3.6 秒（这包括了相关等待摘要中显示的一小部分网络传输时间），而生成这些行本身仅花费了 1.7 秒。\n\n这些例子尽可能简化，以展示从\
  \ `SQL` 调用 `PL/SQL` 函数的成本。尽管它们的耗时微不足道，但你可以清楚地看到 `PL/SQL` 函数为响应时间增加了显著的开销（超过 300%）。当然，那些耗时更长的\
  \ `PL/SQL` 函数（尤其是包含 `SQL` 的函数）将会比上下文切换问题导致更严重的性能问题。然而，对于纯 `PL/SQL` 函数（即函数体中没有 `SQL`），上下文切换可能是\
  \ `PL/SQL` 虚拟机总耗时中的主要部分。\n\n上下文切换对于那些本身就需要做大量其他工作（例如访问和连接数据集）的查询，也会产生性能影响。在清单 9-5\
  \ 中，我有一个轻量级的 `PL/SQL` 函数，并用它来格式化销售报告的一部分。和之前一样，我使用了 `Autotrace` 和 `SQL*Plus` 计时来记录运行时统计信息。\n\
  \n**清单 9-5.** 在更密集查询中的上下文切换\n```\nSQL> CREATE FUNCTION format_customer_name (\n\
  \  2                  p_first_name IN VARCHAR2,\n  3                  p_last_name\
  \  IN VARCHAR2\n  4                  ) RETURN VARCHAR2 AS\n  5  BEGIN\n  6     RETURN\
  \ p_first_name || ' ' || p_last_name;\n  7  END format_customer_name;\n  8  /\n\
  Function created.\n\nSQL> SELECT t.calendar_year\n  2  ,      format_customer_name(\n\
  \            c.cust_first_name, c.cust_last_name\n            )                \
  \ AS cust_name\n  3  ,      SUM(s.quantity_sold) AS qty_sold\n  4  ,      SUM(s.amount_sold)\
  \   AS amt_sold\n  5  FROM   sales     s\n  6  ,      customers c\n  7  ,      times\
  \     t\n  8  WHERE  s.cust_id = c.cust_id\n  9  AND    s.time_id = t.time_id\n\
  \ 10  GROUP  BY\n         t.calendar_year\n 11  ,      format_customer_name(\n \
  \           c.cust_first_name, c.cust_last_name\n            )\n 12  ;\n\n11604\
  \ rows selected.\n```\n\n**耗时: 00:00:06.94**\n```\nStatistics\n----------------------------------------------------------\n\
  \       3216  consistent gets\n          0  physical reads\n```\n\n注意，我修剪了 `Autotrace`\
  \ 输出，仅包含 I/O 统计信息。报告完成大约需要 7 秒。我在清单 9-6 中将其与纯 `SQL` 实现进行了比较。\n\n**清单 9-6.** 在更密集查询中的上下文切换（SQL\
  \ 实现）\n```\nSQL> SELECT t.calendar_year\n  2  ,      c.cust_first_name || ' ' ||\
  \ c.cust_last_name AS cust_name\n  3  ,      SUM(s.quantity_sold)              \
  \            AS qty_sold\n  4  ,      SUM(s.amount_sold)                       \
  \     AS amt_sold\n  5  FROM   sales     s\n  6  ,      customers c\n  7  ,    \
  \  times     t\n  8  WHERE  s.cust_id = c.cust_id\n  9  AND    s.time_id = t.time_id\n\
  \ 10  GROUP  BY\n         t.calendar_year\n 11  ,      c.cust_first_name || ' '\
  \ || c.cust_last_name\n 12  ;\n\n11604 rows selected.\n```\n\n**耗时: 00:00:01.40**\n\
  ```\nStatistics\n----------------------------------------------------------\n  \
  \     3189  consistent gets\n          0  physical reads\n```\n\n通过移除函数而使用 `SQL`\
  \ 表达式，报告的运行时间减少到 1.5 秒以下。因此你可以看到，即使在访问和连接多个行源时，`PL/SQL` 函数的存在仍然会影响查询的整体响应时间。\n\n\
  ##### 其他 PL/SQL 函数类型\n\n上下文切换的惩罚适用于任何从 `SQL` 调用的 `PL/SQL` 源（包括用户定义的聚合函数、类型方法或表函数）。一个很好的例子是\
  \ Tom Kyte 多年前编写的 `STRAGG` 函数，用于演示用户定义的聚合函数（当时是 Oracle 9*i*的新特性）。直到 Oracle 数据库 11*g*，都没有与\
  \ `STRAGG` 等效的内置函数，因此这个实用函数作为 Oracle 论坛上解决字符串聚合问题的方案变得极其流行。\n\n`LISTAGG` 内置函数的发布，通过简单地移除\
  \ `SQL` 引擎执行上下文切换的需要，提供了相对于 `STRAGG` 显著的性能提升。我在清单 9-7 中用一个简单的例子展示了这一点，该例子聚合了提供的\
  \ `SH.CUSTOMERS` 表中每个客户的 ID 范围。\n\n**清单 9-7.** 内置聚合函数 vs. 用户定义聚合函数\n```\nSQL> SELECT\
  \ cust_first_name\n  2  ,      cust_last_name\n  3  ,      LISTAGG(cust_id) WITHIN\
  \ GROUP (ORDER BY NULL)\n  4  FROM   customers\n  5  GROUP  BY\n         cust_first_name\n\
  \  6  ,      cust_last_name;\n\n5601 rows selected.\n```\n\n**耗时: 00:00:00.23**\n\
  ```\nSQL> SELECT cust_first_name\n  2  ,      cust_last_name\n  3  ,      STRAGG(cust_id)\n\
  \  4  FROM   customers\n  5  GROUP  BY\n         cust_first_name\n  6  ,      cust_last_name;\n\
  \n5601 rows selected.\n```\n\n**耗时: 00:00:01.40**\n\n我抑制了 `Autotrace` 输出，但两种方法都没有产生物理\
  \ I/O，且逻辑 I/O 是相同的。然而，用户定义的聚合函数耗时是内置等效函数的六倍以上。\n\n总而言之，我已经证明了仅仅从 `SQL` 调用 `PL/SQL`\
  \ 函数就可能是昂贵的，这与函数本身的性质无关。稍后，我将展示各种你可以应用的方法，以减少或完全消除 `SQL` 查询中的这部分成本。\n\n\n\n### 执行\n\
  \n常言道，最快完成某事的方式就是不去做它。同样普遍认为，即使某事快如纳米级，但只要执行次数足够多，其累积耗时就会开始攀升。这正是从 SQL 中调用 PL/SQL\
  \ 函数时常见的情况。因此，PL/SQL 函数被 SQL 语句调用的次数越多，在函数本身以及相关的上下文切换上所耗费的时间和资源就越多。\n\n当一个 PL/SQL\
  \ 函数被包含在 SQL 语句中时，该函数应该执行多少次呢？回答这个问题需要考虑诸多因素；即使你对该函数在查询中的使用有所了解，也无法确定。\n\nSQL 是一种非过程化语言，但试图预测\
  \ PL/SQL 函数被 SQL 查询执行的次数，却是一种典型的过程化思维方式。你无法控制 SQL 引擎的内部工作方式，因此也无法绝对控制 PL/SQL 函数被调用的次数。（我说“绝对”是因为有一些技术可以用来减少函数的执行次数，但你无法可靠地预测最终将其减少到的调用次数。）如果你不去尝试控制执行次数，那么随之而来的就是，你无法影响你的函数对\
  \ SQL 语句响应时间所做的贡献。\n\n### 查询重写与 CBO\n\n还需要考虑基于成本的优化器的影响。随着 Oracle 数据库的每个版本发布，CBO\
  \ 变得越来越复杂；特别是，它发现了更多通过转换技术来优化查询的方法。这意味着，你调用 PL/SQL 函数所在的查询块，可能不会出现在 CBO 生成的最终查询版本中。\n\
  \n这可以通过 CBO 的视图合并转换的一个小例子轻松证明。清单 9-8 包含一个模拟报告，该报告按客户和日历年汇总产品销售情况。此示例中的 PL/SQL 函数维护一个计数器来追踪执行次数。它从\
  \ CUSTOMERS 表的一个内联视图中被调用，旨在预计算并限制函数调用的次数。\n\n**清单 9-8.** CBO 查询转换与函数执行\n\n```sql\n\
  SQL> SELECT t.calendar_year\n  2  ,      c.cust_name\n  3  ,      SUM(s.quantity_sold)\
  \ AS qty_sold\n  4  ,      SUM(s.amount_sold)   AS amt_sold\n  5  FROM   sales \
  \    s\n  6  ,     (\n  7         SELECT cust_id\n  8         ,      format_customer_name\
  \ (\n  9                   cust_first_name, cust_last_name\n 10                \
  \   ) AS cust_name\n 11         FROM   customers\n 12        )          c\n 13 \
  \ ,      times     t\n 14  WHERE  s.cust_id = c.cust_id\n 15  AND    s.time_id =\
  \ t.time_id\n 16  GROUP  BY\n 17         t.calendar_year\n 18  ,      c.cust_name\n\
  \ 19  ;\n```\n\n```\n11604 rows selected.\n```\n\n执行完该报告后，我可以检索最新的计数器来查看函数执行了多少次，如清单\
  \ 9-9 所示。请注意，你可以参考 Apress 网站上的源代码，了解 `COUNTER` 包的实现细节及其在 `FORMAT_CUSTOMER_NAME`\
  \ 函数中的使用。\n\n**清单 9-9.** CBO 查询转换与函数执行（显示函数调用次数）\n\n```sql\nSQL> exec counter.show('Function\
  \ calls');\n```\n\n```\nFunction calls: 918843\n\nPL/SQL procedure successfully\
  \ completed.\n```\n\nPL/SQL 函数已被执行超过 918,000 次，尽管我的本意是内联视图会将函数执行次数限制在仅 55,500 次（即\
  \ CUSTOMERS 表每行一次）。然而，这并未奏效，因为 CBO 直接将内联视图与外部查询块合并了，结果我的 PL/SQL 函数被应用到了比我预期大得多的行源上。清单\
  \ 9-10 中的执行计划显示，内联视图已被分解（即被合并），并且投影信息清楚地表明函数调用被应用在计划的最后一步。\n\n**清单 9-10.** CBO 查询转换与函数执行（PL/SQL\
  \ 函数的投影）\n\n```text\n----------------------------------------------------\n| Id\
  \  | Operation                     | Name       |\n----------------------------------------------------\n\
  |   0 | SELECT STATEMENT              |            |\n|   1 |   HASH GROUP BY  \
  \             |            |\n|   2 |    HASH JOIN                  |          \
  \  |\n|   3 |     PART JOIN FILTER CREATE   | :BF0000    |\n|   4 |      TABLE ACCESS\
  \ FULL        | TIMES      |\n|   5 |     HASH JOIN                 |          \
  \  |\n|   6 |      TABLE ACCESS FULL        | CUSTOMERS  |\n|   7 |      PARTITION\
  \ RANGE JOIN-FILTER|            |\n|   8 |       TABLE ACCESS FULL       | SALES\
  \      |\n----------------------------------------------------\n\nColumn Projection\
  \ Information (identified by operation id):\n-----------------------------------------------------------\n\
  \n   1 - \"T\".\"CALENDAR_YEAR\"[NUMBER,22],\n       \"FORMAT_CUSTOMER_NAME\"(\"\
  CUST_FIRST_NAME\",\"CUST_LAST_NAME\")[4000],\n       SUM(\"S\".\"AMOUNT_SOLD\")[22],\
  \ SUM(\"S\".\"QUANTITY_SOLD\")[22]\n   2 - (#keys=1) \"T\".\"CALENDAR_YEAR\"[NUMBER,22],\n\
  \       \"CUST_LAST_NAME\"[VARCHAR2,40], \"CUST_FIRST_NAME\"[VARCHAR2,20],\n   \
  \    \"S\".\"AMOUNT_SOLD\"[NUMBER,22], \"S\".\"QUANTITY_SOLD\"[NUMBER,22]\n   3\
  \ - \"T\".\"TIME_ID\"[DATE,7], \"T\".\"TIME_ID\"[DATE,7],\n       \"T\".\"CALENDAR_YEAR\"\
  [NUMBER,22]\n   4 - \"T\".\"TIME_ID\"[DATE,7], \"T\".\"CALENDAR_YEAR\"[NUMBER,22]\n\
  \   5 - (#keys=1) \"CUST_LAST_NAME\"[VARCHAR2,40],\n       \"CUST_FIRST_NAME\"[VARCHAR2,20],\
  \ \"S\".\"AMOUNT_SOLD\"[NUMBER,22],\n       \"S\".\"TIME_ID\"[DATE,7], \"S\".\"\
  QUANTITY_SOLD\"[NUMBER,22]\n   6 - \"CUST_ID\"[NUMBER,22], \"CUST_FIRST_NAME\"[VARCHAR2,20],\n\
  \       \"CUST_LAST_NAME\"[VARCHAR2,40]\n   7 - \"S\".\"CUST_ID\"[NUMBER,22], \"\
  S\".\"TIME_ID\"[DATE,7],\n       \"S\".\"QUANTITY_SOLD\"[NUMBER,22], \"S\".\"AMOUNT_SOLD\"\
  [NUMBER,22]\n   8 - \"S\".\"CUST_ID\"[NUMBER,22], \"S\".\"TIME_ID\"[DATE,7],\n \
  \      \"S\".\"QUANTITY_SOLD\"[NUMBER,22], \"S\".\"AMOUNT_SOLD\"[NUMBER,22]\n```\n\
  \n视图合并、子查询非嵌套以及其他复杂的查询转换并不是唯一可能影响 PL/SQL 函数执行次数的 CBO 相关问题。CBO 也可以自由忽略你的表或谓词列出的顺序（尽管对于后者有一个显著的例外，专门针对\
  \ PL/SQL 函数，我稍后会描述）。连接和谓词的排序会对执行计划每一步的基数产生巨大影响；这反过来可能会导致你的 PL/SQL 函数执行次数比你预期的更多，或者更少。\n\
  \n\n\n##### 内部优化\n\n除了众多的 CBO 优化之外，Oracle 数据库还具有一系列在运行时应用的内部优化，试图揣测这些优化的行为往往徒劳无功。它们不仅可能随着数据库版本而变化，还可能取决于多种因素，其中一些您可以推导出来，而另一些则对您隐藏。\n\
  \nOracle 数据库对 `DETERMINISTIC` 函数的优化就是这样一个例子。因为根据定义，确定性函数对于特定的输入值总是返回相同的结果，所以如果遇到相同的输入，Oracle\
  \ 数据库可以避免重新执行 PL/SQL 函数。然而，这种优化的效率取决于其他因素，例如数据类型、数据长度、基数（即不同值的数量）、数据库版本，甚至环境设置（如数组提取大小）。关于这些因素如何导致函数执行次数大幅变化的精彩讨论，请参阅\
  \ Dom Brooks 在 [`http://orastory.wordpress.com`](http://orastory.wordpress.com)\
  \ 上的“[*确定性判定*]”系列文章。\n\n当 PL/SQL 函数调用被封装在标量子查询中时（一种减少函数在 SQL 中影响的常用技术，我将在本章后面演示），也会看到类似的行为。虽然标量子查询缓存似乎比确定性函数的优化更有效，但它仍然依赖于一些相同的因素（如数据类型、长度和顺序），此外还取决于内部缓存的大小（因数据库版本而异）。更深入地描述支持标量子查询缓存的内部哈希表，请参阅\
  \ Jonathan Lewis 的 *Cost-Based Oracle Fundamentals* (Apress, 2005)。这个哈希表相当小的事实意味着，除了最简单的输入值集合外，冲突（即缓存“未命中”）几乎不可避免。由于您无法预测这些冲突何时发生，因此您应该接受这样一个事实：使用标量子查询缓存通常可以获得*一些*好处，但无法精确量化其程度。\n\
  \n#### 次优数据访问\n\n当 PL/SQL 函数包含 SQL 语句时会发生什么？在大多数大型数据库应用程序中都可以找到一种极其常见的设计模式，即将 SQL\
  \ 查询包装在 PL/SQL 函数中。通常，此类“getter”函数背后的原则是合理的（即封装常见查找、可重用的数据访问方法等），但此类设计决策的性能影响可能是毁灭性的，尤其是当\
  \ PL/SQL 函数从 SQL 语句中调用时。\n\n当 SQL 语句被包装在 PL/SQL 函数中并从 SQL 查询调用时，上下文切换的成本会自动加倍——现在在函数内部和外部都会发生。然而，更关键的是，通过将\
  \ SQL 查询包装在函数中，如果查询位于调用 SQL 语句的主体中，CBO 本可以拥有的优化选择实际上被禁用了。这对您的查询经过时间可能产生严重影响（可以说，在这些场景下，上下文切换的成本相形见绌）。\n\
  \n考虑 清单 9-11 中的示例。我有一个 PL/SQL 函数，它返回给定日期两种货币之间的汇率。请注意，为了示例的目的，我故意保持了简单性。\n\n***清单\
  \ 9-11.** 将 SQL 查询封装在 PL/SQL 函数中（创建 PL/SQL 函数）*\n\n```sql\nSQL> CREATE FUNCTION\
  \ get_rate(\n  2                    p_rate_date IN rates.rate_date%TYPE,\n  3  \
  \                  p_from_ccy  IN rates.base_ccy%TYPE,\n  4                    p_to_ccy\
  \    IN rates.target_ccy%TYPE\n  5                    ) RETURN rates.exchange_rate%TYPE\
  \ AS\n  6     v_rate rates.exchange_rate%TYPE;\n  7  BEGIN\n  8     SELECT exchange_rate\
  \ INTO v_rate\n  9     FROM   rates\n 10     WHERE  base_ccy   = p_from_ccy\n 11\
  \     AND    target_ccy = p_to_ccy\n 12     AND    rate_date  = p_rate_date;\n 13\
  \     RETURN v_rate;\n 14  END get_rate;\n 15  /\nFunction created.\n```\n\n在清单\
  \ 9-12 所示的按产品和日历年份的销售报告中，我使用了此函数来计算以 GBP 和 USD 计价的收入。请注意，我使用了 Autotrace 来抑制结果集，并启用了\
  \ SQL*Plus 计时器。\n\n***清单 9-12.** 将 SQL 查询封装在 PL/SQL 函数中（使用 PL/SQL 的 SQL）*\n\n```sql\n\
  SQL> SELECT t.calendar_year\n  2  ,      p.prod_name\n  3  ,      SUM(s.amount_sold)\
  \                                      AS amt_sold_usd\n  4  ,      SUM(s.amount_sold\
  \ * get_rate(s.time_id, 'USD', 'GBP')) AS amt_sold_gbp\n  5  FROM   sales     s\n\
  \  6  ,      products  p\n  7  ,      times     t\n  8  WHERE  s.prod_id = p.prod_id\n\
  \  9  AND    s.time_id = t.time_id\n 10  GROUP  BY\n 11         t.calendar_year\n\
  \ 12  ,      p.prod_name\n 13  ;\n\n272 rows selected.\n\nElapsed: 00:01:05.71\n\
  ```\n\n这个查询的经过时间大约是 66 秒——对于一个少于 100 万行的聚合查询来说，这是一个糟糕的响应时间。此语句的 Autotrace 输出见清单\
  \ 9-13。\n\n***清单 9-13.** 将 SQL 查询封装在 PL/SQL 函数中（使用 PL/SQL 的 SQL 的 Autotrace 输出）*\n\
  \n```sql\nStatistics\n----------------------------------------------------------\n\
  \     918848  recursive calls\n         12  db block gets\n    1839430  consistent\
  \ gets\n          0  physical reads\n       3196  redo size\n      16584  bytes\
  \ sent via SQL*Net to client\n        449  bytes received via SQL*Net from client\n\
  \          2  SQL*Net roundtrips to/from client\n          0  sorts (memory)\n \
  \         0  sorts (disk)\n        272  rows processed\n```\n\n\n\n## **清单 9-14.**\
  \ 在 PL/SQL 函数中封装 SQL 查询（纯 SQL 解决方案）\n\n```sql\nSQL> SELECT t.calendar_year\n  2\
  \  ,      p.prod_name\n  3  ,      SUM(s.amount_sold)                 AS amt_sold_usd\n\
  \  4  ,      SUM(s.amount_sold*r.exchange_rate) AS amt_sold_gbp\n  5  FROM   sales\
  \      s\n  6  ,      times      t\n  7  ,      products   p\n  8  ,      rates\
  \      r\n  9  WHERE  s.time_id        = t.time_id\n 10  AND    s.prod_id      \
  \  = p.prod_id\n 11  AND    r.rate_date  (+) = s.time_id\n 12  AND    r.base_ccy\
  \   (+) = 'USD'\n 13  AND    r.target_ccy (+) = 'GBP'\n 14  GROUP  BY\n 15     \
