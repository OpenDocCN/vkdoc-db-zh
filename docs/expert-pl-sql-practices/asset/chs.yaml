  \ table(\nreduce_letter_count.result_set(\ncursor(select * from table(\nsingle_map_letter_count.result_set('Hello,\
  \ world!')\n))))\norder by key_item;\n```\n\n```\nKEY_ITEM                     \
  \     VALUE_ITEM\n-------------------------------- ----------------------\n    \
  \                              1\n!                                 1\n,       \
  \                          1\nH                                 1\nd           \
  \                      1\ne                                 1\nl               \
  \                  3\no                                 2\nr                   \
  \              1\nw                                 1\n\n10 rows selected\n```\n\
  \n成功了！现在，让我们用你的 100,000 个字符串及其产生的 110 万个键/值 Map 对来测试一下。\n\n## 大规模测试\n\n```sql\n\
  drop table documents;\n```\n\n```sql\ncreate table documents\nas\nselect rownum\
  \ doc_id, column_name text from dba_tab_columns;\n```\n\n```sql\nselect /*+ parallel\
  \ */ * from table(\nreduce_letter_count.result_set(\ncursor(select /*+ parallel\
  \ */ * from table(\nmap_letter_count.result_set(cursor(select * from documents))\n\
  ))))\norder by key_item;\n```\n\n```\nKEY_ITEM                          VALUE_ITEM\n\
  -------------------------------- ----------------------\n                      \
  \            11\n#                                 2522\n$                     \
  \            457\n-                                 4\n0                       \
  \          2104\n1                                 1755\n2                     \
  \            1679\n3                                 993\n4                    \
  \             798\n5                                 536\n6                    \
  \             348\n7                                 254\n8                    \
  \             241\n9                                 225\nA                    \
  \             83113\nB                                 20226\nC                \
  \                 44506\nD                                 47611\nE            \
  \                     131562\nF                                 13999\nG       \
  \                          19681\nH                                 12801\nI   \
  \                              72349\nJ                                 4564\nK\
  \                                 6081\nL                                 47635\n\
  M                                 45084\nN                                 71110\n\
  O                                 64789\nP                                 40780\n\
  Q                                 4763\nR                                 64882\n\
  S                                 66557\nT                                 94510\n\
  U                                 33837\nV                                 10060\n\
  W                                 10161\nX                                 7168\n\
  Y                                 16269\nZ                                 2083\n\
  _                                 84576\na                                 1\nb\
  \                                 1\nc                                 1\ne    \
  \                             5\ng                                 1\ni        \
  \                         2\nj                                 1\nl            \
  \                     1\nm                                 1\nn                \
  \                 1\no                                 1\np                    \
  \             1\nr                                 2\ns                        \
  \         1\nt                                 1\nu                            \
  \     1\nv                                 1\n\n58 rows selected\n```\n\n它成功了！计时测试表明，随着数据库并行运行各个步骤，我能够相对于服务器上的\
  \ CPU 数量实现并行加速。从这里开始，你应该能够使用这种技术在 PL/SQL 中编写你自己的并行 MapReduce 函数，或者将现有的 MapReduce\
  \ 算法转换为在你的 Oracle 数据库上运行。\n\n\n\n#### 指导\n\n仅仅因为您有能力在 PL/SQL 中编写并行 MapReduce 算法，并不总是意味着您应该使用它们。在许多情况下，使用单个\
  \ SQL 语句（包括使用并行性）来完成相同的结果所需的代码更少。您的整个示例可以写成如下形式：\n\n```sql\nselect    /*+ parallel\
  \ */\n          letter key_item,\n          count(*) value_item\nfrom\n(\nselect\
  \    substr(d.text,c.i,1) letter\nfrom      documents d,\n          (select level\
  \ i from dual connect by level <= 30) c\n)\nwhere     letter is not null\ngroup\
  \ by  letter\norder by  letter;\n```\n\n关键点在于，并非所有解决方案都需要通过像 MapReduce 这样的编程原语来实现。理解这种方法的真正价值在于，当您试图在其他并行编程环境之间来回转换时。通过理解如何在\
  \ PL/SQL 中实现并行算法，您可以更轻松地从其他语言和系统转换概念。\n\n#### 并行管道表函数总结\n\n您已经了解了如何编写像表一样工作的 PL/SQL\
  \ 函数，这些函数以编程方式生成行，以及如何以并行方式调用这些函数。值得注意的是，这些函数可以将数据传递给其他也可以并行运行的 PL/SQL 表函数，从而构建一个数据并行转换和操作链，类似于许多\
  \ MapReduce 循环。\n\n### 总结\n\nOracle 提供了许多不同的方法来使用 PL/SQL 实现并行编程算法。然而，如前所述，必须仔细考虑并行结构是否能为您提供所需的收益。并行选项`总是`比其串行对应版本消耗更多的系统资源，但在您有可用容量的情况下，它们提供了加速长时间运行活动或处理非常大数据集的能力。在将其他系统的并行算法进行转换时，这些功能也可能对您大有裨益。\n\
  \n截至 11gR2，并行管道表函数为您提供了最灵活和最成熟的方法，用于在独立的处理器之间以及在集群数据库环境中的集群节点之间分配工作。11gR2 中新增的 `DBMS_PARALLEL_EXECUTE`\
  \ 框架也是一个引人注目的选项，标准版用户可以利用它来获得更高程度的编程控制——代价是在为并行化划分和排序数据方面灵活性有所降低。\n\n## 第 4 章\n\n\
  ## 警告和条件编译\n\n作者：Torben Holm\n\n当 Oracle 在 RDBMS 内核中实现 Java 时，人们认为这将是 PL/SQL 的终结。然而，在\
  \ 10.2 版本中，Oracle 重写了 PL/SQL 编译器并实现了各种新功能，证明了 PL/SQL 是有未来的。本章将介绍首次出现在 Oracle 10.2\
  \ 中的两个特性：PL/SQL 警告和 PL/SQL 条件编译。\n\n### PL/SQL 警告\n\n在 Oracle 10.2 中，Oracle 实现了\
  \ PL/SQL 警告功能。此功能可以在编译 PL/SQL 时获得警告，如果某些代码实现了不良实践或与保留字或 Oracle 函数冲突。在 Oracle 10.2\
  \ 之前，您的 PL/SQL 有时会编译通过——却在运行时抛出错误。PL/SQL 警告的目的是在编译时更容易修复潜在错误时发出警告，从而确保应用于数据库的代码尽可能健壮和最优。\n\
  \n### 基础知识\n\n在您开始了解从 PL/SQL 警告中能获得什么之前，先来看一下该功能的一些基本方面。默认情况下，PL/SQL 警告是禁用的。PL/SQL\
  \ 警告可以在系统、会话或过程级别启用。PL/SQL 警告分为三类：\n\n> `Severe`（严重）：这些警告针对与 SYS.STANDARD 或 SQL\
  \ 函数中的函数存在冲突的代码。\n>\n> `Performance`（性能）：这些警告针对可能对性能产生影响的代码，例如在查询中使用错误的数据类型以及在适当情况下未使用\
  \ NOCOPY 编译指令。\n>\n> `Informational`（信息性）：这些警告与无害和/或甚至可能被移除的代码相关。\n\n当您创建或编译存储过程时，它默认继承您运行时所在会话的设置。PL/SQL\
  \ 警告级别由参数 `plsql_warnings` 的值决定。您可以按如下方式显示当前参数值：\n\n```sql\nSQL@V112> show parameter\
  \ plsql_warnings\n\nNAME                             TYPE        VALUE\n--------------------------------\
  \ ----------- ------------------------------\nplsql_warnings                   string\
  \      DISABLE:ALL\n\n默认值是 DISABLE:ALL\n```\n\n如果您无权执行 SHOW PARAMETER 命令，可以使用以下查询检查\
  \ `plsql_warnings` 的值：\n\n```sql\nSQL@V112> SELECT DBMS_WARNING.GET_WARNING_SETTING_STRING\
  \ FROM DUAL;\n\nGET_WARNING_SETTING_STRING\n----------------------------------------------------------------\n\
  DISABLE:ALL\n```\n\n要为当前会话启用所有警告，请执行以下操作：\n\n```sql\nSQL@V112> alter session set\
  \ plsql_warnings='ENABLE:ALL';\n\nSession altered.\n```\n\n![images](img/square.jpg)\
  \ `注意` 在大多数情况下，您需要 `ALTER SESSION` 权限才能更改会话参数。但在更改 `plsql_warnings` 参数时并非如此。\n\n\
  此外，`plsql_warnings` 字符串不区分大小写。\n\n要一次启用严重和性能警告并禁用信息性警告，请执行以下语句：\n\n```sql\nSQL@V112>\
  \ alter session set plsql_warnings='ENABLE:SEVERE,ENABLE:PERFORMANCE,\nDISABLE:INFORMATIONAL';\n\
  \nSession altered.\n```\n\n参数设置不是累积的。如果您先将 `plsql_warnings` 设置为 `ENABLE:SEVERE`，然后再设置\
  \ `ENABLE:PERFORMANCE`，那么只有与性能相关的警告会被启用。\n\n如果您想从 PL/SQL 内部设置参数，可以通过调用 `DBMS_WARNINGS.SET_WARNING_SETTING_STRING`\
  \ 来实现。启用一个设置将会禁用其他设置。此示例将在会话级别仅启用严重警告：\n\n```sql\nSQL@V112> EXEC DBMS_WARNING.SET_WARNING_SETTING_STRING('ENABLE:SEVERE',\
  \ 'SESSION');\n\nPL/SQL procedure successfully completed.\n```\n\n启用警告不会影响执行时间，但可能会稍微影响编译时间。如果您编译一个过程\
  \ 1000 次，您会发现启用警告编译和未启用警告编译之间的差异大约是一秒，未启用的编译更快。\n\n如果一个过程在编译时出现编译警告，该过程仍然可以执行。警告是为了提醒您，您的代码中可能存在问题。但编译器并非全知全能。并非所有警告都是问题。您始终可以自由执行您的代码。\n\
  \n![images](img/square.jpg) `提示` 如果您想检查可能遇到的警告类型，并且可以访问数据库服务器上的 Oracle 二进制文件，可以查看文件\
  \ `$ORACLE_HOME/plsql/mesg/plw<LANG>.msg`。此文件包含所有的警告信息。\n\n\n### 使用警告\n\n让我们来看几个例子。首先，创建一个名为\
  \ `T1` 的简单表，其中包含一个类型为 `VARCHAR2` 的 `KEY` 列和一个名为 `VALUE` 的 `VARCHAR2` 列。假设 `KEY`\
  \ 列虽然定义为 `VARCHAR2`，但只包含数字。不幸的是，你在现实世界的生产系统中有时会看到这种做法。以下是创建表的代码：\n\n```sql\nSQL@V112>\
  \ CREATE TABLE T1 (\n2 KEY VARCHAR2(10) CONSTRAINT PK_T1 PRIMARY KEY,\n3 VALUE VARCHAR2(10))\n\
  4 /\n\nTable Created.\n```\n\n现在，向表中加载测试数据。\n\n```sql\nSQL@V112> insert into t1\
  \ select rownum, substr(text,1,10) from all_source where rownum < 10000;\n\n9999\
  \ rows created.\n```\n\n然后启用严重和性能相关的 PL/SQL 警告。\n\n```sql\nSQL@V112> alter session\
  \ set plsql_warnings='ENABLE:SEVERE, ENABLE:PERFORMANCE';\n\nSession altered.\n\
  ```\n\n接下来，创建一个函数，该函数将根据给定的键返回对应的 `VALUE`。\n\n```sql\nSQL@V112> CREATE OR REPLACE\
  \ FUNCTION GET_T1_KEY (P_KEY NUMBER) RETURN VARCHAR2 IS\n2   l_value T1.VALUE%TYPE;\n\
  3  BEGIN\n4     SELECT VALUE INTO l_value FROM T1 WHERE KEY = P_KEY;\n5     RETURN\
  \ l_value;\n6     EXCEPTIONS\n7     WHEN NO_ROWS_FOUND THEN\n8       RETURN 'No\
  \ value found';\n9  END;\n10 /\n\nSP2-0804 Procedure created with compilation warnings.\n\
  ```\n\n该过程编译时带有警告。要在 SQL*Plus 中显示警告，只需执行 `show error`，如下所示：\n\n```sql\nSQL@V112>\
  \ show err\nLINE/COL ERROR\n-------- -----------------------------------------------------------------\n\
  1/1      PLW-05018: unit GET_T1_KEY omitted optional AUTHID clause;\n         default\
  \ value DEFINER used\n\n4/45     PLW-07204: conversion away from column type may\
  \ result in\n         sub-optimal query plan\n```\n\n![images](img/square.jpg) **注意**\
  \ 如果你检查 `USER_ERRORS` 表中的 `ATTRIBUTE` 和 `MESSAGE_NUMBER`，你会发现 `ATTRIBUTE` 要么是 `ERROR`\
  \ 要么是 `WARNING`，而错误/警告编号则在 `MESSAGE_NUMBER` 列中。\n\n尽管函数编译时带有警告，你仍然可以执行它。\n\n```sql\n\
  SQL@V112> var txt varchar2(10);\nSQL@V112> exec :txt := GET_T1_KEY(1);\n\nPL/SQL\
  \ procedure successfully completed.\n\nElapsed: 00:00:00.14\n```\n\n现在，`KEY` 列是否应该或不应该更改为\
  \ `NUMBER` 并不是当前的问题。在本例中，你需要修改函数。因此，将 `P_KEY` 参数更改为 `VARCHAR2`，并通过向函数添加 `AUTHID\
  \ DEFINER` 来消除 `PLW-05018` 警告。以下是函数的新版本：\n\n```sql\nSQL@V112> CREATE OR REPLACE\
  \ FUNCTION GET_T1_KEY (P_KEY VARCHAR2) RETURN VARCHAR2\n2  AUTHID DEFINER\n3  IS\n\
  4    L_value T1.VALUE%TYPE;\n5  BEGIN\n6     SELECT VALUE INTO l_value FROM T1 WHERE\
  \ KEY = P_KEY;\n7     RETURN l_value;\n8     EXCEPTIONS\n9     WHEN NO_ROWS_FOUND\
  \ THEN\n10      RETURN 'No value found';\n11 END;\n12 /\n\nFunction created\n```\n\
  \n这个新版本的函数创建时没有错误或警告。请注意，由于现在使用了正确的数据类型，并且函数使用索引来查找键，因此执行速度更快（在此例中快了一倍）。以下是一个执行示例：\n\
  \n```sql\nSQL@V112> exec :txt := GET_T1_KEY('1');\n\nPL/SQL procedure successfully\
  \ completed.\n\nElapsed: 00:00:00.07\nSQL@V112>\n```\n\n`PLW-7204` 警告告诉你，当从表 `T1`\
  \ 中选择时，Oracle 将不得不进行数据类型转换。当使用参数值时，Oracle 将不得不进行数据类型转换，因为参数的数据类型是 `NUMBER`，而列的数据类型是\
  \ `VARCHAR2`。当 Oracle 进行数据类型转换时（例如 `to_number`、`to_char`、`to_date` 等），可能会导致索引（如果查询列上存在索引的话）被忽略。这种忽略索引的情况解释了前面两个示例之间的时间差异。\n\
  \n你可以对代码进行性能分析，以检查在第一个示例中代码相对于第二个示例在哪些地方花费了更多时间，但由于代码很简单，你只需通过查看 `SELECT` 语句来了解发生了什么。首先为会话设置\
  \ `AUTOTRACE ON`，然后根据表中列的数据类型正确地将 `KEY` 值作为字符使用。\n\n```sql\nSQL@V112> select value\
  \ from T1 where key = '1';\n\nVALUE\n----------\npackage ST\n\nElapsed: 00:00:00.01\n\
  SQL@V112>\n```\n\n检查执行计划显示索引 `PK_T1` 被使用了。\n\n```sql\n-------------------------------------------------------------------------------------\n\
  | Id  | Operation                   | Name  | Rows  | Bytes | Cost (%CPU)| Time\
  \     |\n-------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT            |       |     1 |    14 |     1   (0)| 00:00:01\
  \ |\n|   1 |  TABLE ACCESS BY INDEX ROWID| T1    |     1 |    14 |     1   (0)|\
  \ 00:00:01 |\n|*  2 |   INDEX UNIQUE SCAN         | PK_T1 |     1 |       |    \
  \ 1   (0)| 00:00:01 |\n-------------------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \n   2 - access(\"KEY\"='1')\n```\n\n在下一个例子中，`KEY` 值没有根据表中列的数据类型正确使用，但如果我当初忽略了警告，它本应被正确使用。\n\
  \n```sql\nSQL@V112> select value from t1 where key = 1;\n\nVALUE\n----------\npackage\
  \ ST\n\nElapsed: 00:00:00.20\n```\n\n该语句的执行计划现在显示索引未被使用，Oracle 进行了全表扫描。注意谓词信息中的过滤器；Oracle\
  \ 向 `KEY` 列添加了一个 `TO_NUMBER`，因此索引未被使用。如果 `KEY` 列中存在字符（正如定义所允许的），该函数将因 `ORA-01722:\
  \ invalid number` 错误而失败。以下是计划输出：\n\n```sql\n--------------------------------------------------------------------------\n\
  | Id  | Operation         | Name | Rows  | Bytes | Cost (%CPU)| Time     |\n--------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT  |      |     1 |    14 |     2   (0)| 00:00:01 |\n|* \
  \ 1 |  TABLE ACCESS FULL| T1   |     1 |    14 |     2   (0)| 00:00:01 |\n--------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \n   1 - filter(TO_NUMBER(\"KEY\")=1)\n\nSQL@V112>\n```\n\n正如你在此示例中看到的，正确定义的函数比参数数据类型错误的函数大约快\
  \ 20 倍。如果警告没有被启用，你可能不会注意到错误的参数数据类型，因此也不会修正该函数。你可能会注意到，一开始你无法区分一个警告是信息性、性能性还是严重性警告。确定警告类别的方法是执行\
  \ `dbms_warning.get_category` 函数，如下所示：\n\n```sql\nSQL@V112> SELECT DBMS_WARNING.GET_CATEGORY(7204)\
  \ FROM DUAL;\n    DBMS_WARNING.GET_CATEGORY(7204)\n    -----------------------------------------------------------------------\n\
  \    PERFORMANCE\n```\n\n当你使用警告时，你会发现严重警告的范围是 5000 到 5999，信息性警告的范围是 6000 到 6249，性能性警告的范围是\
  \ 7000 到 7249。一旦你知道了这些范围，根据编号对警告进行分类就变得容易了。\n\n\n### 将警告提升为错误\n\n如前所述，即使您的函数或过程是在有警告的情况下编译的，您仍然可以执行它们。如果您希望确保包含特定警告的存储过程不会进入您的生产系统，您可以将这些警告提升为错误。\n\
  \n以下代码展示了将 `GET_T1_KEY` 函数的参数类型编译为 `NUMBER` 时的情况。请注意生成的警告。\n\n```\nSQL@V112> CREATE\
  \ OR REPLACE FUNCTION GET_T1_KEY (P_KEY NUMBER) RETURN VARCHAR2\n  2  AUTHID DEFINER\n\
  \  3  IS\n  4     L_value T1.VALUE%TYPE;\n  5  BEGIN\n  6      SELECT VALUE INTO\
  \ l_value FROM T1 WHERE KEY = P_KEY;\n  7      RETURN l_value;\n  8  EXCEPTIONS\n\
  \  9  WHEN NO_ROWS_FOUND THEN\n 10    RETURN 'No value found';\n 11 END;\n 12 /\n\
  SP2-0806: Function created with compilation warnings\n\nSQL@V112> show err\nLINE/COL\
  \ ERROR\n-------- -----------------------------------------------------------------\n\
  6/49     PLW-07204: conversion away from column type may result in\n         sub-optimal\
  \ query plan\n```\n\n为确保此类代码不被部署——至少不是在无错误的情况下部署——您可以将此警告提升为错误。首先，更改会话以禁用所有警告（在本例中这样做是为了专注于要提升的那个警告）。在同一语句中，将\
  \ `PLW-07204` 警告提升为错误而非警告，如下所示：\n\n```\nSQL@V112> alter session set plsql_warnings='DISABLE:ALL,\
  \ ERROR:7204';\n\nSession altered.\n```\n\n然后重新编译 `GET_T1_KEY` 函数。\n\n```\nSQL@V112>\
  \ alter function GET_T1_KEY compile;\n\nWarning: Function altered with compilation\
  \ errors.\n\nSQL@V112> show err\nErrors for FUNCTION GET_T1_KEY:\n\nLINE/COL ERROR\n\
  -------- -----------------------------------------------------------------\n6/45\
  \     PLS-07204: conversion away from column type may result in\n         sub-optimal\
  \ query plan\n```\n\n现在尝试执行该函数。这将导致错误。\n\n```\nSQL@V112> exec :txt := get_t1_key(1);\n\
  BEGIN :txt := get_t1_key(1); END;\n\n            *\nERROR at line 1:\nORA-06550:\
  \ line 1, column 13:\nPLS-00905: object ACME.GET_T1_KEY is invalid\nORA-06550: line\
  \ 1, column 7:\nPL/SQL: Statement ignored\n```\n\n请注意 `PLW-07204` 变成了 `PLS-07204`。该警告现在已成为错误，您将无法再执行该函数。要能够执行该函数，您必须通过将参数类型更改为\
  \ `VARCHAR2` 来消除此错误。\n\n如果您有一个现有的包含 PL/SQL 的应用程序，并且启用了警告并重新编译了 PL/SQL 代码，您可能会得到许多警告。尽管没有任何警告感觉很好，但由于这样或那样的原因，可能仍然无法消除所有警告。对于无法消除的警告，您可以自由选择忽略它们。\n\
  \n![images](img/square.jpg) **注意** 很容易将消除所有警告设定为一个硬性目标。非技术经理尤其容易陷入这种诱惑，因为他们常常不理解警告和错误之间的微妙区别。请记住，警告消息来自机器试图根据他人制定的一套最佳实践来解释您的代码。因此，警告指向的是值得更仔细检查的代码。然而，有时您确实需要执行某个特定操作，如果让编译器迫使您盲目遵循他人的最佳实践，那才真正是*糟糕的做法*。\n\
  \n警告的另一个小问题是它们会弄乱 `USER_ERRORS` 视图。警告和错误记录在同一个视图中。如果您习惯于通过检查 `USER_ERRORS` 视图是否为空来判断您刚刚编译的一段\
  \ PL/SQL 代码是否有错误，这可能会令人烦恼。您无法消除这种小困扰。您必须忍受它，但这是为警告功能带来的价值所付出的小小代价。\n\n### 忽略警告\n\
  \n您可能由于某种原因希望忽略特定的警告。在下一个例子中，启用了所有警告。但其中一个警告无法通过更改代码来消除，因为该警告涉及列名与保留字冲突，并且您希望忽略这个特定的信息性警告。要启用所有警告，请将\
  \ `plsql_warnings` 设置为 `ENABLE:ALL`，如下所示：\n\n```\nSQL@V112> alter session set plsql_warnings='ENABLE:ALL';\n\
  ```\n\n接下来，创建以下版本的 `GET_T1_KEY` 函数：\n\n```\nSQL@V112>CREATE OR REPLACE FUNCTION\
  \ GET_T1_KEY (P_KEY NUMBER) RETURN VARCHAR2\n2  AUTHID DEFINER\n3  IS\n       l_value\
  \ T1.VALUE%TYPE;\n       l_1 NUMBER :=1;\n       l_2 NUMBER :=2;\n5  BEGIN\n   \
  \     IF l_1 = l_2 THEN\n          SELECT VALUE INTO l_value FROM T1 WHERE KEY =\
  \ P_KEY;\n          RETURN l_value;\n       END IF;\n12  END;\n13  /\nSP2-0806:\
  \ Function created with compilation warnings\n\nSQL@V112> show err\nErrors for FUNCTION\
  \ GET_T1_KEY:\n\n0/0      PLW-06010: keyword \"VALUE\" used as a defined name\n\
  1/1      PLW-05005: subprogram GET_T1_KEY returns without value at line 11\n9/11\
  \     PLW-06002: Unreachable code\n9/51     PLW-07204: conversion away from column\
  \ type may result in\n         sub-optimal query plan\n```\n\n让我们逐一查看这些警告。\n\n*\
  \   `PLW-06010`：一个 PL/SQL 或 SQL 单词被用作定义的名称。这是合法的，但不推荐。可以在 `V$RESERVED_WORDS` 视图中查看保留字。\n\
  *   `PLW-05005`：Oracle 发现您从未进入 `IF` 语句，因此不会从函数中返回值。\n*   `PLW-06002`：同样，Oracle 发现您从未进入\
  \ `IF` 语句，因此将存在不可达代码。不可达代码本身无害，但这可能表明代码不当。执行 PL/SQL 时，过多的不可达代码会占用内存。\n*   `PLW-07204`：嗯，您现在已经知道该怎么处理它了。\n\
  \n那么，修复代码并消除这些警告。假设由于某种原因，您无法更改导致 `PLW-06010` 的列名 `VALUE`；例如，您的应用程序可能很旧，如果更改列名，将有太多代码需要修复。\n\
  \n首先要做的是准备会话。\n\n```\nSQL@V112> alter session set plsql_warnings='ENABLE:ALL, ERROR:7204,\
  \ DISABLE:6010';\n```\n\n在这种情况下，启用了所有警告，警告 `7204` 仍被提升为错误，而警告 `6010` 被禁用。现在可以重新应用该函数并进行编译，不再出现错误或警告。\n\
  \n如果您想检查某个存储过程编译时使用了哪些 PL/SQL 警告，可以发出以下查询：\n\n```\nSQL@V112> col plsql_warnings\
  \ for a40\nSQL@V112> SELECT NAME, PLSQL_WARNINGS FROM USER_PLSQL_OBJECT_SETTINGS;\n\
  \nNAME                         PLSQL_WARNINGS\n------------------------------ ----------------------------------------\n\
  GET_T1_KEY                     ENABLE:ALL,DISABLE:  6010,ERROR:  7204\n```\n\n这些结果显示了\
  \ `GET_T1_KEY` 编译时生效的 `PLSQL_WARNINGS` 参数值。\n\n\n## 编译与警告\n\n每当您创建或重新编译存储过程时，它们会继承当前会话的设置。因此，如果您在未设置警告的会话中意外编译了存储过程，该过程将正常编译，但设置会丢失。如果您的数据库配置了系统范围的警告（`ALTER\
  \ SYSTEM SET PLSQL_WARNINGS='ENABLE:ALL, ERROR:7204'`），并且其中一些警告已被提升为错误，结果可能会更麻烦，因为重新编译的过程将会失败。要使用当前设置重新编译过程，请执行以下命令：\n\
  \n```\nSQL@V112> ALTER FUNCTION GET_T1_KEY COMPILE REUSE SETTINGS;\n\nFunction Compiled.\n\
  ```\n\n您无需在每次想用特定`PL/SQL`警告编译存储过程时都执行一次`ALTER SESSION`，而是可以在编译时直接指定警告设置。\n\n```\n\
  SQL@V112> ALTER FUNCTION GET_T1_KEY COMPILE PLSQL_WARNINGS='ENABLE:ALL,\nDISABLE:6010,ERROR:\
  \ 7204';\n\nFunction Compiled.\n```\n\n如果您对所有存储过程有通用的警告设置，可以添加一个登录触发器在登录时设置`PLSQL_WARNINGS`。开发者共享同一个数据库用户来开发应用程序的情况并不少见。在这种情况下，触发器可以相当简单，并且仅限于该用户。\n\
  \n在这种情况下，触发器应在登录到`ACME`模式后触发。触发器的作用是执行`ALTER SESSION`，从而设置`PLSQL_WARNINGS`参数。\n\n\
  以`SYS`身份连接并创建触发器。\n\n```\nSQL@V112> CREATE OR REPLACE TRIGGER dev_logon_trigger\n\
  \  2  AFTER LOGON ON ACME.SCHEMA\n  3  BEGIN\n  4    EXECUTE IMMEDIATE q'\"ALTER\
  \ SESSION SET PLSQL_WARNINGS='ENABLE:SEVERE,ENABLE:PERFORMANCE,ERROR:7204'\"';\n\
  \  5  END;\n  6  /\n\nTrigger created.\n```\n\n然后以`Acme`用户身份连接。\n\n```\nSQL@V112>\
  \ conn ACME/acme\nConnected.\n```\n\n检查参数是否已设置。\n\n```\nSQL@V112> SELECT DBMS_WARNING.GET_WARNING_SETTING_STRING\
  \ FROM DUAL;\n\nGET_WARNING_SETTING_STRING\n------------------------------------------------------------------------\n\
  DISABLE:INFORMATIONAL,ENABLE:PERFORMANCE,ENABLE:SEVERE,ERROR:  7204\n```\n\n如果您的应用程序有许多存储过程且它们有不同的设置，构建一个框架来帮助您记住各自的设置并用于重新编译可能是个好主意（请参阅即将在“条件编译”一节中的小框架示例）。\n\
  \n如果您想使用`DBMS_UTILITY.COMPILE_SCHEMA`过程编译模式中的所有存储过程，您应该注意参数`reuse_settings`默认设置为`FALSE`。以下是`DBMS_UTILITY.COMPILE_SCHEMA`过程的描述：\n\
  \n```\nPROCEDURE COMPILE_SCHEMA\n Argument Name                  Type          \
  \          In/Out Default?\n ------------------------------ -----------------------\
  \ ------ --------\n SCHEMA                         VARCHAR2                IN\n\
  \ COMPILE_ALL                    BOOLEAN                 IN     DEFAULT\n REUSE_SETTINGS\
  \                 BOOLEAN                 IN     DEFAULT\n```\n\n如果您不应用`reuse_settings`参数并将其设置为`TRUE`，所有已编译的包将丢失任何警告设置。因此，在执行`DBMS_UTILITY.COMPILE_SCHEMA`时，请记得将`reuse_settings`设置为`TRUE`，如下所示：\n\
  \n```\nSQL@V112> exec DBMS_UTILITY.COMPILE_SCHEMA (schema=>'ACME', reuse_settings=>true);\n\
  \nPL/SQL procedure successfully completed.\n```\n\n![images](img/square.jpg) 注意\
  \ 如果在`SYSTEM`级别设置`plsql_warnings`，您应谨慎行事。尽管您不能使用`DBMS_UTILITY.COMPILE_SCHEMA`编译`SYS`，但您仍然可以编译单独的包。在`SYSTEM`级别设置`plsql_warnings`，然后只编译几个包，可能会导致数百条警告，或者，如果您已将某些警告提升为错误，则会引发错误。\n\
  \n作为`SYS`或`SYSTEM`，您可以运行实用程序`utlrp`（`@?/rdbms/admin/utlrp`），它将编译所有无效的存储过程。`Utlrp`调用`UTL_RECOMP.RECOMP_PARALLEL`并行编译存储过程。执行此操作时，被提升为错误的警告或被忽略的警告将被剥离，如下例所示。这是一个错误。\n\
  \n首先，设置会话`plsql_warnings`\n\n```\nSQL@V112> alter session set plsql_warnings='Enable:all,\
  \ ERROR:7204, DISABLE:6010';\n\nSession altered.\n```\n\n并编译选定的函数。\n\n```\nSQL@V112>\
  \ alter function GET_T1_KEY compile;\n\nWarning: Function altered with compilation\
  \ errors.\n```\n\n接下来，看看函数设置。\n\n```\nSQL@V112> SELECT NAME, PLSQL_WARNINGS FROM\
  \ USER_PLSQL_OBJECT_SETTINGS WHERE NAME =\n'GET_T1_KEY';\n\nNAME               \
  \          PLSQL_WARNINGS\n---------------------------- -------------------------------------------------------------\n\
  ---------------------------------------\nGET_T1_KEY                   ENABLE:ALL,DISABLE:\
  \  6010,ERROR:  7204\n```\n\n现在，以`SYS`身份连接\n\n```\nSQL@V112> conn / as sysdba\n\
  Connected.\n```\n\n并执行重新编译，通过调用`utlrp.sql`或直接执行`UTL_RECOMP.RECOMP_PARALLEL`。\n\n\
  ```\nSQL@V112> exec utl_recomp.recomp_parallel(1,'ACME');\n\nPL/SQL procedure successfully\
  \ completed.\n```\n\n现在重新连接\n\n```\nSQL@V112> conn ACME/ACME\nConnected.\n```\n\n\
  并检查对象设置。\n\n```\nSQL@V112> SELECT NAME, PLSQL_WARNINGS FROM USER_PLSQL_OBJECT_SETTINGS\n\
  WHERE NAME = 'GET_T1_KEY';\n\nNAME                         PLSQL_WARNINGS\n----------------------------\
  \ -------------------------------------------------------------\n---------------------------------------\n\
  GET_T1_KEY                   ENABLE:ALL\n\nACME@V112>\n```\n\n请注意，特定的警告设置已被删除；这一定是个错误。这不是灾难，因为一切仍然正常运行，但这很烦人，因为您现在不知道是否设置了特殊的警告。\n\
  \n如果您使用`exp`和`imp`导出和导入模式，任何存储的代码都将带着导出时的设置被导入。\n\n### 关于警告的最后说明\n\n您可能遇到的其他类型警告包括：当您将受益于`NOCOPY`编译器指令时，却没有使用它的警告。在\
  \ Oracle 11g 中，对于异常`WHEN OTHERS`没有导致`RAISE`或`RAISE_APPLICATION_ERROR`的情况，有一个新的、非常有用的警告。我个人曾花费数小时疑惑为什么在某些情况下没有得到错误，结果却发现有人写了`WHEN\
  \ OTHERS THEN NULL`。\n\n### 条件编译\n\n条件编译与`PL/SQL`警告无关，但它与`PL/SQL`警告在同一时间实现。条件编译是通过预处理源代码完成的，您可能从其他编程语言中了解这一点。简而言之，它使您能够在编译时打开或关闭代码，而无需编辑代码。这可能是打开或关闭调试选项，或者启用与某个`Oracle`版本相关的代码，或者您应用程序的两个不同版本，例如标准版和企业版。\n\
  \n![images](img/square.jpg) 注意 条件编译已向后移植到 Oracle 10.1.0.4 和 9.2.0.6，可以通过设置参数`_conditional_compilation`来启用。\n\
  \n\n### 基础知识\n\n条件编译仅包含少量指令。指令以 `$`（美元符号）开头，用于控制程序流程或引发错误。\n\n系统定义的指令包括：`$IF`、`$THEN`、`$ELSIF`、`$ELSE`\
  \ 和 `$END`。可以使用 `$ERROR … $END` 指令引发自定义的编译错误。可以查询静态布尔表达式或静态常量。除了创建自定义的查询变量外，Oracle\
  \ 还提供了一些可用的内置查询变量，后续将会看到。\n\n入门条件编译最简单的方法是从一个例子开始。此示例将展示如何为存储过程启用计时信息日志记录，该过程用于测量运行过程所需的时间以及过程运行的时间。以下是示例代码（行号已标出以便后续引用）：\n\
  \n```sql\n1 CREATE OR REPLACE PROCEDURE LEVEL2 AS\n2 $IF $$TIMING_ON $THEN\n3 $ELSIF\
  \ NOT $$TIMING_ON $THEN\n4 $ELSE\n5    $ERROR ' The PLSQL_CCFLAG TIMING_ON, Must\
  \ be set to either FALSE or TRUE before\ncompileing procedure ' ||  $$PLSQL_UNIT||'.'\n\
  6    $END\n7 $END\n8 $IF $$TIMING_ON $THEN\n9    L_start_time TIMESTAMP;\n10 $END\n\
  11 BEGIN\n12 DBMS_APPLICATION_INFO.SET_MODULE($$PLSQL_UNIT, 'RUN');\n13 $IF $$TIMING_ON\
  \ $THEN\n14    L_START_TIME:=CURRENT_TIMESTAMP;\n15 $END\n16 -- -----------------------------------------------\n\
  17 -- Application logic is left out\n18 -- -----------------------------------------------\n\
  19 $IF $$TIMING_ON $THEN\n20   LOGIT (P_PG=>$$PLSQL_UNIT, P_START_TIME=>l_start_time,\
  \ P_STOP_TIME=>CURRENT_TIMESTAMP);\n21 $END\n22 DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);\n\
  23 END LEVEL2;\n24 /\n```\n\n以下是对代码清单的解释：\n\n*   第 2-7 行：如果查询变量 `$$TIMING_ON` 在编译时未设置（即既不是\
  \ `FALSE` 也不是 `TRUE`），则将引发错误，并指出存储过程的名称以及发生错误的位置。注意，允许使用空语句——一个 `$IF … $THEN` 后面可以没有任何操作。\n\
  *   第 8 行：如果查询变量 `$$TIMING_ON` 等于 `TRUE`，则声明变量 `l_start_time`。注意，`$END` 后面没有像 PL/SQL\
  \ 中的 `END IF` 那样的 `IF`，也没有分号。\n*   第 12 行：这里调用 `DBMS_APPLICATION_INFO.SET_MODULE`\
  \ 过程，该过程将设置 `V$SESSION` 视图中的 `MODULE` 列；你使用 Oracle 查询变量 `$$PLSQL_UNIT` 来保存存储过程的名称，或者如果它在包（`PACKAGE`）中被引用，则保存包的名称。在之前的\
  \ Oracle 版本中，你必须创建一个函数来执行 `OWA_UTIL.WHO_CALLED_ME` 过程（该过程返回调用者的名称），然后调用该函数来获取名称。调用\
  \ `DBMS_APPLICATION_INFO.SET_MODULE` 非常有用，如果你需要查询 `V$SESSION` 来定位你的会话，或者你使用扩展跟踪（Extended\
  \ Trace）以便在过程启动时开始跟踪。\n\n**注意**：如果使用 SQL*Developer 开发存储过程，可以修改保存 `CREATE PROCEDURE/FUNCTION`\
  \ 模板的模板，以包含对 `DBMS_APPLICATION_INFO.SET_MODULE($$PLSQL_UNIT, '<action>')` 的调用，确保其始终被包含。这可以通过菜单\
  \ “Tools” -> “Preferences” -> “Database:SQL Code Editor Templates” 来完成。\n\n*   第\
  \ 13 行：如果查询变量 `$$TIMING_ON` 等于 `TRUE`，则在变量 `l_start_time` 中注册开始时间戳。\n*   第 16-18\
  \ 行：这里将是 PL/SQL 代码。\n*   第 19 行：如果查询变量 `$$TIMING_ON` 等于 `TRUE`，则调用第 20 行的 `LOGIT`\
  \ 过程。`LOGIT` 过程是记录计时信息的日志过程。该过程在此不描述，因为它并不重要。\n*   第 22 行：清除 `DBMS_APPLICATION_INFO`\
  \ 的调用。\n\n在将过程添加到数据库之前，需要设置编译器标志 `TIMING_ON`。可以在系统、会话或程序级别设置此标志。在此示例中，它在会话级别设置。在设置标志之前，尝试将代码添加到数据库以触发\
  \ `$ERROR` 错误（假设代码保存在名为 `level2.sql` 的文件中）。\n\n`SQL@V112> @level2`\n\n`Warning:\
  \ Procedure created with compilation errors.`\n\n执行 `show error` 来显示错误，如下所示：\n\n\
  `SQL@V102> show error`\n\n`Errors for PROCEDURE LEVEL2:`\n\n`LINE/COL ERROR`\n`--------\
  \ -----------------------------------------------------------------`\n`5/4     \
  \ PLS-00179: $ERROR:  The PLSQL_CCFLAG TIMING_ON, Must be set to`\n`         either\
  \ FALSE or TRUE before compileing procedure LEVEL2.`\n\n现在设置标志，如下所示：\n\n`SQL@V112>\
  \ ALTER SESSION SET plsql_ccflags='TIMING_ON:TRUE';`\n\n`plsql_ccflags` 的数据类型可以是布尔静态表达式、`PLS_INTEGER`\
  \ 静态表达式或 `VARCHAR2` 静态表达式，具体取决于你分配给它的值。注意，设置 `plsql_ccflags` 不会强制重新编译任何代码；必须发出 `ALTER\
  \ PROCEDURE … COMPILE` 命令。\n\n`SQL@V102> ALTER PROCEDURE LEVEL2 COMPILE;`\n\n`Procedure\
  \ altered.`\n\n**注意**：请记住，在设置了会话 `plsql_ccflags` 之后编译的每个存储过程都将继承该 `plsql_ccflags`\
  \ 设置。\n\n要检查在存储过程编译期间 `plsql_ccflags` 被设置为什么，请执行以下查询：\n\n`SQL@V102> col plsql_ccflags\
  \ for a80 wrap`\n`SQL@V102> select NAME, PLSQL_CCFLAGS FROM USER_PLSQL_OBJECT_SETTINGS;`\n\
  \n`NAME                         PLSQL_CCFLAGS`\n`------------------------------\
  \ --------------------------------------------`\n`LEVEL1`\n`LEVEL2             \
  \          TIMING_ON:TRUE`\n`LOGIT`\n`…`\n\n如下例所示，如果一次设置了多个 `plsql_ccflag`，它们必须用逗号分隔。`plsql_ccflag`\
  \ 值不区分大小写。\n\n`SQL@V112> ALTER SESSION SET plsql_ccflags='TIMING_ON:TRUE,Standard:True';`\n\
  \n\n\n#### 代码的哪一部分正在运行？\n\n在“基础”部分刚刚展示的简单过程中，无论 `TIMING_ON` 标志是设置为 `TRUE` 还是 `FALSE`，都很容易了解实际运行的是哪些代码的概览。`USER_SOURCE`\
  \ 视图会显示存储过程中的所有代码。您创建的条件编译代码可能非常复杂，因此要查看实际编译或未编译的代码，您应该调用 `DBMS_PREPROCESSOR.PRINT_POST_PROCESSED_SOURCE`\
  \ 过程。此过程会生成实际编译的代码（请记住设置 `serveroutput on`）。\n\n```sql\nSQL@V112> CALL DBMS_PREPROCESSOR.PRINT_POST_PROCESSED_SOURCE('PROCEDURE',\
  \ 'ACME','LEVEL2');\nPROCEDURE LEVEL2 AS\nL_start_time TIMESTAMP;\nBEGIN\nDBMS_APPLICATION_INFO.SET_MODULE(\
  \ 'LEVEL2'          , 'RUN');\nL_start_time:=CURRENT_TIMESTAMP;\n-- -----------------------------------------------\n\
  -- 应用逻辑部分已省略\n-- -----------------------------------------------\nLOGIT (P_PG=>\
  \ 'LEVEL2'         , P_START_TIME=>l_start_time, P_STOP_TIME=>CURRENT_TIMESTAMP);\n\
  DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);\nEND LEVEL2;\n\n调用完成。\n```\n\n呈现的代码不包含您可能应用于代码的任何格式。在预处理后的代码中不存在的数据库对象，在\
  \ `USER_DEPENDENCIES` 视图中将不可见。经过包装的代码保持包装状态，您无法使用此过程解包代码。（您可以在第 15 章中阅读更多关于依赖关系的内容。）\n\
  \n如果您想自己处理预处理后的代码，可以调用 `DBMS_PREPROCESSOR.GET_POST_PROCESSED_SOURCE` 函数，该函数将返回一个包含代码的\
  \ `VARCHAR2` 类型表。格式丢失的原因是该包使用了 `DBMS_OUTPUT.PUT_LINE`。`PUT_LINE` 过程会移除前导空格。如果您创建一个类似下面这样的过程，在代码左侧添加行号（或任何字符）将确保格式不会丢失。以下过程——`PRINT_SOURCE`——将根据给定的参数，打印带有格式和行号的预处理后代码：\n\
  \n```sql\nSQL@V112> CREATE OR REPLACE PROCEDURE PRINT_SOURCE (P_OBJECT_TYPE VARCHAR2,\
  \ P_SCHEMA_NAME\n  VARCHAR2, P_OBJECT_NAME VARCHAR2)  IS\n2   l_source_lines DBMS_PREPROCESSOR.source_lines_t;\n\
  3  BEGIN\n4    l_source_lines := DBMS_PREPROCESSOR.GET_POST_PROCESSED_SOURCE(P_OBJECT_TYPE,\n\
  P_SCHEMA_NAME, P_OBJECT_NAME);\n5    FOR I IN l_source_lines.FIRST .. l_source_lines.LAST\
  \ LOOP\n6        IF TRIM(SUBSTR(l_source_lines (i),1, length(l_source_lines (i))-1))\
  \ IS NOT NULL\nTHEN\n7          DBMS_OUTPUT.PUT_LINE(RPAD(I,4, ' ')||REPLACE(l_source_lines(i),\
  \ CHR(10),''));\n8        END IF;\n9    END LOOP;\n10  END;\n11  /\n```\n\n使用给定参数执行该过程会产生以下输出：\n\
  \n```sql\nSQL@V112> set serveroutput on\nSQL@V112> exec PRINT_SOURCE ('PROCEDURE','ACME','LEVEL2');\n\
  \n1   PROCEDURE LEVEL2 AS\n8      l_start_time TIMESTAMP;\n10  BEGIN\n11  DBMS_APPLICATION_INFO.SET_MODULE(\
  \ 'LEVEL2'          , 'RUN');\n13      l_start_time:=CURRENT_TIMESTAMP;\n15  --\
  \ -----------------------------------------------\n16  -- 应用逻辑部分已省略\n17  -- -----------------------------------------------\n\
  19    LOGIT (P_PG=> 'LEVEL2'         , P_START_TIME=> l_start_time,\nP_STOP_TIME=>CURRENT_TIMESTAMP);\n\
  21  DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);\n22  END LEVEL2;\n```\n\n#### 预处理代码的好处\n\
  \n通过预处理代码来排除部分代码的好处之一是，执行代码所使用的内存量可能会减少，从而在共享池中使用更少的内存。例如，假设过程 `LEVEL2` 的编码如下：\n\
  \n```sql\nSQL@V112> CREATE OR REPLACE PROCEDURE LEVEL2 (TIMING_ON BOOLEAN := FALSE)\
  \ AS\n2  l_start_time TIMESTAMP;\n3  BEGIN\n4  DBMS_APPLICATION_INFO.SET_MODULE('LEVEL2'\
  \ ,NULL);\n5     IF TIMING_ON THEN\n6        l_start_time:=CURRENT_TIMESTAMP;\n\
  7     END IF;\n8     -- -----------------------------------------------\n   -- 应用逻辑部分已省略\n\
  10  -- -----------------------------------------------\n11  IF TIMING_ON THEN\n\
  12     LOGIT (P_PG=>'LEVEL2', P_START_TIME=>l_start_time,\nP_STOP_TIME=>CURRENT_TIMESTAMP);\n\
  13  END IF;\n14  DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);\n15  END LEVEL2;\n\
  16  /\n```\n\n此示例展示了您可能如何编写一个普通的存储过程，其中您会启用一些计时测量。视图 `USER_OBJECT_SIZE` 将显示给定程序所需内存（以字节为单位）的估计值。但是，您无法看到程序在运行时需要多少内存，因为运行时内存使用取决于您如何编写代码、是否进行批量收集以及其他类似因素。以下是\
  \ `LEVEL2` 的内存使用估计：\n\n```sql\nSQL@V112> SELECT * FROM USER_OBJECT_SIZE WHERE NAME\
  \ = 'LEVEL2';\n\nNAME           TYPE          SOURCE_SIZE PARSED_SIZE  CODE_SIZE\
  \ ERROR_SIZE\n-------------- ------------- ----------- ----------- ---------- ----------\n\
  LEVEL2         PROCEDURE               521         996        510          0\n```\n\
  \n`SOURCE_SIZE` 列显示给定过程的源代码大小。源代码在编译期间必须加载到内存中。`PARSED_SIZE` 是当其他已编译的程序引用它时，给定程序所需的内存量。`CODE_SIZE`\
  \ 是程序执行所需内存的起始大小。最后，`ERROR_SIZE` 列是编译期间错误信息在内存中占用的字节数。在本例中，`ERROR_SIZE` 为 0，因为编译期间没有发生错误。\n\
  \n假设您创建了相同的过程，但让一个 PL/SQL 编译器标志来控制计时测量调用，使代码看起来像这样：\n\n```sql\nSQL@V112> CREATE\
  \ OR REPLACE PROCEDURE LEVEL2 AS\n2  $IF $$TIMING_ON $THEN\n3     l_start_time TIMESTAMP;\n\
  4  $END\n5  BEGIN\n6  DBMS_APPLICATION_INFO.SET_MODULE($$PLSQL_UNIT ,NULL);\n7 \
  \    $IF $$TIMING_ON $THEN\n8       l_start_time:=CURRENT_TIMESTAMP;\n9     $END\n\
  10     -- -----------------------------------------------\n11     -- 应用逻辑部分已省略\n\
  12     -- -----------------------------------------------\n13     $IF $$TIMING_ON\
  \ $THEN\n14       LOGIT (P_PG=>$$PLSQL_UNIT, P_START_TIME=>l_start_time,\nP_STOP_TIME=>CURRENT_TIMESTAMP);\n\
  15     $END\n16  DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);\n17  END LEVEL2;\n\
  18  /\n过程已创建。\n```\n\n将 PL/SQL 标志 `TIMING_ON` 设置为 `FALSE` 会导致以下代码大小：\n\n```sql\n\
  SQL@V112> SELECT * FROM USER_OBJECT_SIZE WHERE NAME = 'LEVEL2';\n\nNAME        \
  \  TYPE          SOURCE_SIZE PARSED_SIZE  CODE_SIZE ERROR_SIZE\n------------- -------------\
  \ ----------- ----------- ---------- ----------\nLEVEL2        PROCEDURE       \
  \        530         857        364          0\n```\n\n`SOURCE_SIZE` 与第一个示例中的大小几乎相同，尽管添加了\
  \ `$IF` 结构来控制变量 `l_start_time` 的定义和引用。第一个示例在代码中也包含参数解析，所以两者在那方面差异不大。但是 `PARSED_SIZE`\
  \ 和 `CODE_SIZE` 的值都减小了。\n\n现在让我们看看启用计时时的情况。将编译器标志 `TIMING_ON` 设置为 `TRUE` 来编译过程 `LEVEL2`\
  \ 会得到以下结果：\n\n```sql\nSQL@V112> SELECT * FROM USER_OBJECT_SIZE WHERE NAME = 'LEVEL2';\n\
  ```\n\n\n"
- "# Oracle 条件编译与对象失效\n\n```sql\nNAME          TYPE          SOURCE_SIZE PARSED_SIZE\
  \  CODE_SIZE ERROR_SIZE\n------------- ------------- ----------- ----------- ----------\
  \ ----------\nLEVEL2        PROCEDURE             530         917        478   \
  \       0\n```\n\n与将 `TIMING_ON` 设置为 `FALSE` 进行编译的代码相比，`SOURCE_SIZE` 没有差异，但 `PARSED_SIZE`\
  \ 和 `CODE_SIZE` 的值略有增加。这是由于调用了过程 `LOGIT`。\n\n现在来看看原始 `LEVEL2` 过程的大小，这是将 `TIMING_ON`\
  \ 设置为 `TRUE` 的情况。\n\n```sql\nSQL@V102> select * from USER_OBJECT_SIZE WHERE NAME\
  \ = 'LEVEL2';\n```\n\n```sql\nNAME          TYPE          SOURCE_SIZE PARSED_SIZE\
  \  CODE_SIZE ERROR_SIZE\n------------- ------------- ----------- ----------- ----------\
  \ ----------\nLEVEL2        PROCEDURE             730         917        497   \
  \       0\n```\n\n`SOURCE_SIZE` 比未使用条件编译的 `LEVEL2` 过程要大，但 `PARSED_SIZE` 和 `CODE_SIZE`\
  \ 与使用了条件编译的有限版本 `LEVEL2` 相同或几乎相同。这是因为在编译期间，条件编译代码被剥离了。因此，你可以看到，使用条件编译会导致在源代码中和编译期间（以及由依赖项触发的自动重新编译期间）占用更大的空间。如果\
  \ Oracle 执行自动重新编译，它会使用 `REUSE SETTINGS` 编译选项。\n\n所以，不使用条件编译，你会得到：\n\n```sql\nSQL@V102>\
  \ exec level2\n\nElapsed: 00:00:20.60\n```\n\n而使用条件编译（`TIMING_ON` 设置为 `TRUE`），你会得到：\n\
  \n```sql\nSQL@V102> exec level2\n\nElapsed: 00:00:20.49\n```\n\n这里的差异只有零点几秒。这样短的时间是为换取条件编译的好处而付出的微不足道的代价。\n\
  \n## 失效\n\n依赖于其他对象的对象，可能会在它们所依赖的对象发生变化或因某些原因失效时变得无效。让我们通过创建一个调用 `LEVEL2` 过程的 `LEVEL1`\
  \ 过程，来稍微扩展一下这个想法。第一个例子运行在 Oracle 10.2 上。\n\n```sql\nSQL@V102> CREATE OR REPLACE\
  \ PROCEDURE LEVEL1 AS\n2  BEGIN\n3    LEVEL2;\n4  END;\n5  /\nProcedure created.\n\
  ```\n\n当你必须编译一个较低层级的过程时，如果存在依赖关系，Oracle 将使较高层级的过程失效，从而在下次调用较高层级过程时强制进行自动重新编译——当然，前提是它之前没有被手动编译过。\n\
  \n创建 `LEVEL1` 过程后，重新编译 `LEVEL2` 过程。\n\n```sql\nSQL@V102> ALTER PROCEDURE LEVEL2\
  \ COMPILE REUSE SETTINGS;\n\nProcedure altered.\n```\n\n然后检查这些过程的 `STATUS`。\n\n\
  ```sql\nSQL@V102> SELECT OBJECT_NAME, STATUS FROM USER_OBJECTS WHERE OBJECT_NAME\
  \ IN\n ('LEVEL1','LEVEL2');\n\nOBJECT_NAME                    STATUS\n------------------------------\
  \ -------\nLEVEL1                         INVALID\nLEVEL2                      \
  \   VALID\n```\n\n执行 `LEVEL1` 过程将强制重新编译并验证该过程。\n\n```sql\nSQL@V102> exec LEVEL1\n\
  \nPL/SQL procedure successfully completed.\n\nSQL@V102> SELECT OBJECT_NAME, STATUS\
  \ FROM USER_OBJECTS WHERE OBJECT_NAME IN\n ('LEVEL1','LEVEL2');\n\nOBJECT_NAME \
  \                   STATUS\n------------------------------ -------\nLEVEL1     \
  \                    VALID\nLEVEL2                         VALID\n```\n\n`LEVEL1`\
  \ 过程已被动态重新编译，现在再次有效。这与条件编译无关——这只是它的工作方式。\n\n> **注意**\n> 在一个系统中有数百个存储过程相互调用，然后有意或间接地重新编译一个过程，可能是一场灾难。让我用一个真实的故事来强调这一点。在一家拥有数百并发用户的公司中，一次手动更新表的操作出了错误——一个列被设置成了错误的值。于是数据库管理员使用\
  \ `SELECT AS OF TIMESTAMP` 创建了该表的一个副本。到目前为止，一切正常。然后他重命名了原始表，并快速将副本的表重命名为原始名称。嗯，Oracle\
  \ 会注意到这种名称交换，如果存在任何依赖关系的话。在这个案例中，该表被一个低层级过程引用，该过程变为无效，导致所有依赖于此过程的所有过程也变为无效。这使得几乎所有的用户会话都排队等待重新编译代码。由于没有人能在系统上工作，数据库不得不重启。重启后，系统照常工作。\n\
  \n在 Oracle 11g 中，Oracle 放宽了对依赖对象失效的规则。如果你不更改过程参数的足迹，Oracle 不会强制使依赖对象失效，无论它遇到的是包中的过程还是独立过程。如果你在\
  \ Oracle 11g 而不是 Oracle 10g 中重新运行前面涉及 `LEVEL1` 和 `LEVEL2` 的例子，结果将如下所示：\n\n```sql\n\
  SQL@V112> SELECT OBJECT_NAME, STATUS FROM USER_OBJECTS WHERE OBJECT_NAME IN\n ('LEVEL1','LEVEL2');\n\
  \nOBJECT_NAME                    STATUS\n------------------------------ -------\n\
  LEVEL1                         VALID\nLEVEL2                         VALID\n\nSQL@V112>\
  \ ALTER PROCEDURE LEVEL2 COMPILE REUSE SETTINGS;\n\nProcedure altered.\n\nSQL@V112>\
  \ SELECT OBJECT_NAME, STATUS FROM USER_OBJECTS WHERE OBJECT_NAME IN\n ('LEVEL1','LEVEL2');\n\
  \nOBJECT_NAME                    STATUS\n------------------------------ -------\n\
  LEVEL1                         VALID\nLEVEL2                         VALID\n\nSQL@V112>\n\
  ```\n\n注意，两个过程最终都是有效的。因为你在 Oracle 11g 中，并且因为你的过程足迹没有改变，Oracle 不会强制重新编译。\n\n\n####\
  \ 控制编译\n\n为每个过程设置不同的 `plsql_ccflags`，从而产生大量编译器标志，可能会令人困惑。即使你可以执行 `ALTER PROCEDURE\
  \ <过程名> COMPILE REUSE SETTINGS` 命令，但在某个时候，你可能会在未设置适当编译器标志的情况下意外编译了一个过程。并且，如果你没有在条件编译代码中检查是否设置了某个\
  \ `ccflag`，你的代码可能会以“错误”的设置进行编译。避免这种情况的一个方法是构建一个小型框架来控制重新编译，如下例所示：\n\n```\nSQL@V112>\
  \ CREATE TABLE CC_FLAGS (\n2  OWNER        VARCHAR2(30),\n3  OBJECT_TYPE  VARCHAR2(30),\n\
  4  OBJECT_NAME  VARCHAR2(30),\n5  CCFLAGS      VARCHAR2(4000));\n\n表已创建。\n```\n\n\
  `添加包含每个过程信息的行。`\n\n```\nSQL@V112> INSERT INTO CC_FLAGS (OWNER, OBJECT_TYPE, OBJECT_NAME,\
  \ CCFLAGS) VALUES('ACME' ,\n![images](img/U003.jpg)\n 'PROCEDURE', 'LEVEL2', 'TIMING_ON:FALSE');\n\
  \n已创建 1 行。\n```\n\n```\nSQL@V112> INSERT INTO CC_FLAGS (OWNER, OBJECT_TYPE, OBJECT_NAME,\
  \ CCFLAGS) VALUES('ACME' ,\n![images](img/U003.jpg)\n'PROCEDURE', 'LEVEL1', '');\n\
  \n已创建 1 行。\n```\n\n```\nSQL@V112> COMMIT;\n\n提交完成。\n```\n\n```\nSQL@V112> BEGIN\n\
  2  FOR I IN (SELECT * FROM CC_FLAGS) LOOP\n3   EXECUTE IMMEDIATE 'ALTER ' ||I.OBJECT_TYPE||'\
  \ '||I.OWNER||'.'||I.OBJECT_NAME||' COMPILE PLSQL_CCFLAGS='''||I.CCFLAGS||'''';\n\
  4 END LOOP;\n5 END;\n6 /\n\nPL/SQL 过程已成功完成。\n```\n\n因此，运行完这个匿名 PL/SQL 块后，过程将按照它们各自的设置进行编译。这或许可以（或应该）是一个存储过程，甚至可以带参数来控制编译一个还是全部；如果是这样，不要把这个过程放在\
  \ `CC_FLAGS` 表中，否则当正在运行的过程尝试编译自身时，你会陷入死锁局面。\n\n手动编译带有特殊 `plsql_ccflags` 的存储过程如下例所示：\n\
  \n```\nSQL@V112> ALTER PROCEDURE SPECIAL1 COMPILE PLSQL_CCFLAGS='SPECIAL_ONE:42';\n\
  \n过程已变更。\n```\n\n在你的开发环境中，你可以使用这个框架，并从中生成部署脚本。如果某些存储过程在部署后需要使用特殊标志进行编译，比如说你需要调试某个过程，可以按所示的方法完成。\n\
  \n在创建部署脚本时，我会确保在添加存储过程之前设置好 `PLSQL_CCFLAGS`、`PLSQL_WARNINGS`；如果存在不同的标志和警告，我会在每个存储过程之前进行设置，如下列代码所示：\n\
  \n```\n…\nALTER SESSION SET PLSQL_CCFLAGS='TIMING_ON:FLASE';\nALTER SESSION SET\
  \ PLSQL_WARNINGS='ENABLE:SEVERE,ENABLE_PERFORMANCE,ERROR:7204';\n@@ GET_T1_KEY\n\
  ALTER SESSION SET PLSQL_WARNINGS='ENABLE:SEVERE,ENABLE:PERFORMANCE';\n@@ SET_T1_KEY\n\
  …\n```\n\n#### 查询变量\n\n到目前为止，我一直在讨论 `plsql_ccflags` 参数和条件编译。你可以在不设置 `plsql_ccflags`\
  \ 参数的情况下使用条件编译。方法是通过查询你自己的包常量或 Oracle 定义的常量。让我们通过一个例子来演示。\n\n首先，你创建一个 `PACKAGE`\
  \ 规范，其中包含一个名为 `TIMING_ON` 的常量，其值设置为 `FALSE`。\n\n```\nSQL@V112> CREATE OR REPLACE\
  \ PACKAGE TIMING AS\n2     TIMING_ON CONSTANT BOOLEAN := FALSE;\n3  END;\n4  /\n\
  ```\n\n然后你重新创建引用该 `PACKAGE` 常量的存储过程。\n\n`TIMING.TIMING_ON`\n\n```\nSQL@V112> CREATE\
  \ OR REPLACE PROCEDURE LEVEL2 AS\n2  $IF TIMING.TIMING_ON $THEN\n3     L_START_TIME\
  \ TIMESTAMP;\n4  $END\n5  BEGIN\n6  DBMS_APPLICATION_INFO.SET_MODULE($$PLSQL_UNIT\
  \ ,NULL);\n7  $IF TIMING.TIMING_ON $THEN\n8     L_START_TIME:=CURRENT_TIMESTAMP;\n\
  9  $END\n10  -- -----------------------------------------------\n11  -- 应用逻辑已省略\n\
  12  -- -----------------------------------------------\n13  $IF TIMING.TIMING_ON\
  \ $THEN\n14    LOGIT (P_PG=>$$PLSQL_UNIT, P_START_TIME=>L_START_TIME, P_STOP_TIME=>CURRENT_TIMESTAMP);\n\
  15  $END\n16  DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);\n17  END LEVEL2;\n18\
  \  /\n\n过程已创建。\n```\n\n调用 `DBMS_PREPROCESSOR.PRINT_POST_PROCESSED_SOURCE` 显示，代码已经过预处理，且\
  \ `TIMING_ON = FALSE`，符合预期。\n\n```\nSQL@V112> CALL DBMS_PREPROCESSOR.PRINT_POST_PROCESSED_SOURCE('PROCEDURE',\
  \ 'SCOTT','LEVEL2');\nPROCEDURE LEVEL2 AS\nBEGIN\nDBMS_APPLICATION_INFO.SET_MODULE(\
  \ 'LEVEL2'    ,NULL);\n-- -----------------------------------------------\n-- 应用逻辑已省略\n\
  -- -----------------------------------------------\nDBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);\n\
  END LEVEL2;\n\n调用完成。\n```\n\n将 `PACKAGE` 常量改为 `TRUE` 会使所有引用此包的存储过程变为无效状态。因此，它们都需要重新编译。\n\
  \n```\nSQL@V112> CREATE OR REPLACE PACKAGE TIMING AS\n2     TIMING_ON CONSTANT BOOLEAN\
  \ := TRUE;\n3  END;\n4  /\n```\n\n```\nSQL@V112> SELECT OBJECT_NAME, STATUS FROM\
  \ USER_OBJECTS WHERE OBJECT_NAME IN\n![images](img/U003.jpg)\n ('TIMING','LEVEL1','LEVEL2');\n\
  \nOBJECT_NAME                    STATUS\n------------------------------ -------\n\
  TIMING                         VALID\nLEVEL1                         INVALID\nLEVEL2\
  \                         INVALID\n```\n\n代码重新编译后，它将与 `TIMING_ON` 的值匹配。在这种情况下，你已在所有相关的存储过程中启用了计时测量功能。请记住我之前关于在生产环境中重新编译所有代码的警告。\n\
  \n\n\n#### 关于条件编译的最后说明\n\nOracle 提供了许多查询变量。除了 `$$PLSQL_UNIT` 查询变量外，`$$PLSQL_LINE`\
  \ 正逐渐成为我最喜欢的变量之一，因为它可以用于调试。\n\n*   `$$PLSQL_CCFLAGS` 保存当前的 `PLSQL_CCFLAGS` 设置。\n\
  *   `$$PLSQL_WARNINGS` 保存当前的 `plsql_warnings` 设置。\n*   `$$PLSQL_OPTIMIZE_LEVEL`\
  \ 保存 `PLSQL_OPTIMIZE_LEVEL` 参数值。\n*   `$$PLSQL_LINE` 保存 `$$PLSQL_LINE` 变量所在的行号。\n\
  *   `$$PLSCOPE_SETTING` 保存会话 `PLSCOPE_SETTINGS` 参数的当前值。\n*   `$$PLSQL_CODE_TYPE`\
  \ 保存参数 `plsql_code_type` 的当前值，值为 `NATIVE` 或 `INTERPRETED`。\n*   `$$NLS_LENGTH_SEMANTICS`\
  \ 保存 `NLS` 长度语义，值为 `BYTE` 或 `CHAR`。\n\n作为一名“普通”用户，你可能无法执行 `show parameter <parameter>`\
  \ 命令来显示诸如 `plsql_ccflags` 或 `plsql_warnings` 等参数的值。因此，这些查询变量可能会派上用场。创建一个包含匿名 PL/SQL\
  \ 块的脚本并执行它，即可显示当前会话中查询变量的值，如下所示：\n\n```sql\nset serveroutput on\nBEGIN\n  dbms_output.put_line('PLSQL\
  \ Unit      : ' ||$$PLSQL_UNIT);\n  dbms_output.put_line('PLSQL CCFLAGS   : ' ||$$PLSQL_CCFLAGS);\n\
  \  dbms_output.put_line('PLSQL Warnings  : ' ||$$PLSQL_Warnings);\n  dbms_output.put_line('Optimize\
  \ Level  : ' ||$$PLSQL_OPTIMIZE_LEVEL);\n  dbms_output.put_line('Line: ' ||$$PLSQL_LINE);\n\
  \  dbms_output.put_line('PLSCOPE setting: ' ||$$PLSCOPE_SETTING);\n  dbms_output.put_line('PLSQL\
  \ code type: ' ||$$PLSQL_CODE_TYPE);\n  dbms_output.put_line('NLS length semantics:\
  \ ' ||$$NLS_LENGTH_SEMANTICS);\n END;\n/\n```\n\n执行该脚本以查看查询变量的值。\n\n```sql\nSQL@V112>\
  \ @plsql_inqvar.sql\nPLSQL Unit     :\nPLSQL CCFLAGS  : TIMING_ON:TRUE\nPLSQL Warnings\
  \ : DISABLE:INFORMATIONAL,ENABLE:PERFORMANCE,ENABLE:SEVERE,ERROR:  7204\nOptimize\
  \ Level: 2\nLine           : 6\nPLSCOPE setting:\nPLSQL code type: INTERPRETED\n\
  NLS length semantics: BYTE\n\nPL/SQL procedure successfully completed.\n```\n\n\
  通过这个小程序，你就可以看到查询变量的当前值。`$$PLSQL_UNIT` 查询变量为空，因为它的值是从一个匿名块中查询的。\n\n![images](img/square.jpg)\
  \ `注意` PL/SQL 查询变量在编译时被评估和转换，因此，如果任何标志发生了更改，将其放在存储过程中将需要重新编译该过程才能显示正确的值。\n\n你可以执行以下命令来显示\
  \ `$$PLSQL_CCFLAGS` 的当前值：\n\n```sql\nSQL@V112> exec dbms_output.put_line($$PLSQL_CCFLAGS);\n\
  \nTIMING_ON:TRUE\n```\n\n条件编译的一个常见用途是根据 Oracle 版本来启用特定代码；换句话说，将变量定义为 `NUMBER` 或\
  \ `BINARY_FLOAT`，如下所示：\n\n```sql\n...\n$IF DBMS_DB_VERSION.VERSION >=11 $THEN\n\
  \   VAR BINARY_FLOAT;\n$ELSE\n  VAR NUMBER;\n$END;\n...\n```\n\n在 `DBMS_DB_VERSION`\
  \ 的包规范中，有许多布尔型“版本”常量，可用于包含或排除代码。\n\n```sql\n…\n$IF DBMS_DB_VERSION.VER_LE_11_2 $THEN\n\
  \  …\n$ELSE\n  …\n$END\n…\n```\n\n稍微极端一点，你可以让存储过程的参数成为条件化的，如下面的示例所示。\n\n```sql\n\
  SQL@V112> CREATE PROCEDURE EXTREME (P_PARAM VARCHAR2 $IF $$INQ_FLAG $THEN, P_PARAM2\
  \ VARCHAR2 $END) IS\n   2   BEGIN\n   3     NULL;\n   4   END;\n   5   /\n```\n\n\
  因此，根据 `$INQ_FLAG` 的值，过程将有一个或两个参数——这可以实现，但并不推荐。\n\n### 总结\n\n在本章中，你了解了启用警告可能带来的好处。你研究了如何在会话、系统或过程级别启用警告。你探索了如何将警告升级为错误，或者如何通过禁用它们来忽略它们。你看到了\
  \ PL/SQL 警告确实能帮助你提升代码性能并使其更加健壮。不过，它也会给你带来额外的管理任务，特别是如果你有太多需要启用、禁用或升级为错误的警告例外情况。\n\
  \n![images](img/square.jpg) `注意` 如果你的代码已经在开发环境中检查过，你不一定非要在生产系统上启用 PL/SQL 警告。\n\n\
  在研究条件编译时，你看到使用条件编译可以通过仅在需要时启用日志或调试信息来限制 PL/SQL 使用的内存大小。你还看到，通过使用条件编译、设置标志并执行重新编译，你可以在不编辑代码的情况下启用或禁用代码。条件编译在诸如\
  \ C++ 等语言中被广泛使用。现在，你也可以将它纳入你的 PL/SQL 工具箱中。\n\n## PL/SQL 单元测试\n\n**作者：Sue Harper**\n\
  \n任何访问 Oracle 数据库的开发人员都会使用 SQL，无论是运行自己开发的 SQL 报表和查询，还是运行其他开发人员提供的。虽然未必可以说每个开发人员在使用\
  \ Oracle 数据库时都会运行和使用 PL/SQL，但这个比例无疑非常高，因为任何对 Oracle 数据库的过程化访问最好都使用 PL/SQL 来完成。作为一名开发人员，如果你创建并使用\
  \ PL/SQL，那么你应该调试和测试 PL/SQL，以确保代码的准确性和效率。\n\n在本章中，你将学习 PL/SQL 单元测试：单元测试的含义、它在开发生命周期中的重要性，以及如何构建测试。有几种工具和实用程序可以帮助你构建测试。使用哪一个并不重要，重要的是你要养成针对代码构建和运行测试的习惯。我使用\
  \ Oracle SQL Developer 进行任何测试，因此我将使用该工具来说明构建和运行 PL/SQL 单元测试的方法。\n\n### 为什么要测试你的代码？\n\
  \n软件和应用程序开发人员都会编写代码；有些人编写的代码比其他人更好，但每个人都试图编写出能实现预期功能的代码，并希望它能很好地做到这一点。这对于编写好代码来说，几乎算不上是充满信心的表态！不仅你的代码必须准确且性能良好，知道它稳健且能经得起时间的考验也很重要。这意味着代码应该以相同的方式执行，随着时间的推移产生相同的结果，而不受其周围环境变化的影响。\n\
  \n你如何保证这一点？也许你无法保证，因为你无法 100% 确定未来可能发生的所有变化，但如果你编写了可以在你想要或需要时随时运行的回归测试，那么你就可以确定一个程序单元是否按预期运行并持续如此。你编写的测试越多，变化越多，你就越能确保程序单元是稳健的，并且仍然按预期工作。\n\
  \n至关重要的是，你不仅要知道你的代码今天能正常工作，还要能够*证明*它有效果——并且在未来任何时间你都能证明同样的效果。根据程序单元的需求，你的代码可能必须支持一系列场景或用例，你应该能够测试广泛的用例。如果你能通过数据表明你已经测试了广泛的用例，并重新运行这些测试用例，你就更接近于经验证明代码的稳健性。如果你能够随时重新运行测试并再次验证结果，你就可以快速确定故障点并加以解决。\n\
  \n没有回归测试，你无法知道你的代码是否在工作，或者它何时停止了工作。即使是最好的代码也可能不可靠，但你无法证明它是好是坏。\n\n\n\n### 什么是单元测试？\n\
  \n单元测试（*unit testing*）是 Java 和敏捷开发社区常用的术语，指编写小型、可重复的测试，用于测试一个“工作单元”或某个职责领域。编写单元测试在\
  \ Java 开发社区很常见，开发者通常在编写代码的同时编写测试。许多 Java 开发者使用 `JUnit`——一个用于编写单元测试的开发框架。大多数认真的 Java\
  \ 开发者都会在编写开发代码的同时编写单元测试。有些人甚至在开始编写代码之前就先写好测试。他们知道代码预期的输入类型，也知道预期的结果，因此可以提前构建测试。Java\
  \ 界的普遍理念是“写一点，测一点；再写一点，再测一点……”，这是明智的建议。\n\n尽管 `PL/SQL` 开发者多年来一直在开发 `PL/SQL` 程序单元，并采用基于纸面的测试或使用\
  \ `SQL*Plus`，但支持构建测试套件来支撑和测试代码的单元测试框架却非常少。一些开发者确实会构建回归测试，但如果没有框架，构建单元测试会耗费时间，而且很难向管理层证明额外投入的合理性，因此大多数人并未涉足这一领域。在会议和培训活动中就此主题进行演讲时，通常只有一两位听众在为其\
  \ `PL/SQL` 回归测试编写单元测试。\n\n作为 `PL/SQL` 开发者，你应该将单元测试视为开发周期的一部分，视为可交付成果的一部分。在编写 `PL/SQL`\
  \ 代码的同时编写单元测试，并将其与程序单元一起存储。你应该能够随时运行和重新运行测试，以验证代码是否仍然按预期和期望的方式工作。\n\n#### 调试还是测试？\n\
  \n调试一段代码和为其构建单元测试有什么区别？这不是一个非此即彼的情况：你确实需要调试代码以确保其完成所需功能，或者找出它为什么没有按你认为应该的方式工作。然而，如果考虑差异，其中一个区别在于可重复性。如果你编写了一个\
  \ `PL/SQL` 程序单元，并希望验证其是否执行了你期望的功能，一旦它成功编译，你就可以在代码的不同点插入检测代码，以验证状态、变量值、哪些过程调用了哪些过程等等。你可以传入不同的参数集并验证结果是否正确。但是，如果你想在一个月后验证同样的内容，就必须重复相同的过程。马丁·福勒（Martin\
  \ Fowler），这位撰写了多本关于敏捷开发、重构和极限编程书籍的作者，对此总结得非常完美：\n\n> 每当你想在打印语句或调试器表达式中键入内容时，不如将其写成一个测试。\n\
  \n#### 何时应该构建测试？\n\n考虑你的 `PL/SQL` 代码的生命周期。你需要解决一个问题，并且知道代码应该做什么。你可以使用纸笔、文本编辑器或更复杂的图形化\
  \ `SQL` 开发工具编辑器来编写代码。一旦编写好 `PL/SQL` 代码，你就编译它以验证语法是否正确。如果代码编译成功，你就可以在 `Oracle Database`\
  \ 中针对模式执行它。也许代码能立即按要求工作并成功得出结果。如果不能，你需要调试代码以确定问题出现的位置。这种编辑/编译/运行/编辑/编译/调试/编译/运行的循环可能会持续到你对程序单元满意，并准备交付代码为止。\n\
  \n许多单元测试的倡导者认为，你应该在开始编写代码之前就写好测试，并将其视为完整流程的一部分。其理念是，你已经知道代码的预期结果，并且知道结果是什么，因此你可以根据结果构建测试，然后编写代码以确保测试通过！我认为这是编写、规划和构建测试的结合，所以我敦促你将编写测试视为过程的一部分，无论是先编写代码然后添加一些测试，还是同时微调代码和测试。\n\
  \n### 构建单元测试的工具\n\n市场上用于编写 `PL/SQL` 单元测试的工具数量有限；因此，许多用户编写了自己的测试机制。我在这里列出了三个较受欢迎的选项；它们都有很多值得推荐的地方。如果你刚接触测试领域，值得花些时间研究一下现有工具。\n\
  \n#### utPLSQL：使用命令行代码\n\n`utPLSQL` 可能是已知最早的可用于 `PL/SQL` 单元测试的单元测试框架。它由 Steven Feuerstein\
  \ 编写，已面世多年。它是一个用于构建单元测试的开源 `PL/SQL` 测试框架。你通过运行一个脚本来安装 `utPLSQL`，该脚本会安装测试所需的所有表、包、过程和其他对象。你可以在\
  \ `SQL*Plus` 或命令行中创建和构建所有测试，因此不需要特定工具或额外的客户端。`utPLSQL` 托管在 Sourceforge 上，网址是 [`http://utplsql.sourceforge.net`](http://utplsql.sourceforge.net)，并提供了丰富的资源、文档和示例，介绍如何安装软件、构建测试以及充分利用该框架。\n\
  \n#### Quest Code Tester for Oracle\n\nQuest Code Tester for Oracle 是一款用于定义和运行测试的商业产品。你可以为单个程序或包构建测试，也可以构建单独的测试或套件。使用此类产品的一大优势是，你可以构建测试并在需要时重新运行它们，从而支持了为项目构建完整回归测试套件的论点。\n\
  \nCode Tester 与其他产品的不同之处在于，它允许你描述 `PL/SQL` 程序单元的预期行为，并将其存储在存储库中。然后，该工具基于这些定义生成测试代码。它根据你提供的代码提供一组可能的预期结果，你可以接受并包含或排除这些结果。这种代码生成是该工具中一个实用且强大的功能。当你开始构建测试时，可以使用“快速构建”选项向测试中添加测试用例。\n\
  \nCode Tester 是一个独立的产品（未集成到任何编辑环境中），允许你独立于开发环境构建和运行测试。缺点是，如果需要调试，你需要将代码导入到一个单独的\
  \ `PL/SQL` 环境中。不过，你可以从 Quest 的 Toad for Oracle 运行测试，并从该产品切换到 Code Tester 进行进一步工作。\n\
  \n\n\n"
- "# Oracle SQL Developer\n\nOracle SQL Developer 是一款免费产品，支持 PL/SQL 单元测试。Oracle SQL\
  \ Developer 单元测试功能最早在 SQL Developer 2.0 版本中引入，现已提供市面上其他工具的大部分功能；在 Oracle 资料库的支持下，它允许用户构建和保存测试。任何有权限的用户都可以运行这些测试，您还可以通过命令行运行测试和测试套件，从而将其集成到常规的构建流程中。Oracle\
  \ SQL Developer 提供了一系列报告，可随时运行以审查测试结果。它还允许您收集代码覆盖率统计数据，以便确定已编写的代码有多少已被测试。\n\n![images](img/square.jpg)\
  \ **注意** Oracle SQL Developer 3.0 可从 Oracle 技术网络免费下载，网址为 [`www.oracle.com/technetwork/developer-tools/sql-developer`](http://www.oracle.com/technetwork/developer-tools/sql-developer)。\n\
  \n了解如何将单元测试集成到开发生命周期中的最佳方式是查看一些示例。本章的其余部分将使用 Oracle SQL Developer 3.0 来构建单元测试，以展示创建单元测试以改进代码的强大功能；所有说明都与该产品相关。\n\
  \n### 准备和维护单元测试环境\n\nOracle SQL Developer 使用一个中央资料库，所有有权限的用户都可以在其中存储、共享和重用单元测试。在开始创建测试之前，您需要使用资料库向导创建单元测试资料库。该向导通过向资料库所有者授予所有必需的权限并运行脚本来创建构成资料库的对象，从而创建资料库。\n\
  \n在运行向导之前，您需要识别或创建一个将成为单元测试资料库所有者并对其进行管理的用户。最好为此创建一个新用户，以便仅将您的单元测试信息存储在此处。您只需创建该用户并授予其基本连接权限，如下例所示，因为向导会授予所有额外必需的权限：\n\
  \n```sql\nCREATE USER repos_owner IDENTIFIED BY repos_owner;\nGRANT CREATE SESSION\
  \ to repos_owner;\n```\n\n在运行资料库向导时，您还需要访问 `SYS` 的权限。使用 SQL Developer 为 `SYS` 和新用户创建数据库连接。\n\
  \n要创建连接，请确保“连接”导航器已打开，选择“连接”节点，右键单击以调用上下文菜单，然后选择`新建连接`；这将调用如图 5-1 所示的对话框。\n\n![images](img/0501.jpg)\n\
  \n**图 5-1.** 创建或更新数据库连接\n\n### 创建单元测试资料库\n\n要创建资料库，请选择`工具` ![images](img/U001.jpg)\
  \ `单元测试` ![images](img/U001.jpg) `选择当前资料库`，如图 5-2 所示。这将调用一个连接对话框并选择数据库连接——在本例中是为新创建的用户选择。如果不存在资料库，Oracle\
  \ SQL Developer 资料库向导将提示您为所选连接创建新资料库。\n\n![images](img/0502.jpg)\n\n**图 5-2.** 创建或选择单元测试资料库\n\
  \n您可以在单个实例中拥有多个资料库，因此向导需要验证新资料库用户所需的角色是否已存在于实例中。如果角色可用，则无需重建它们。如果不可用，则必须创建所需的角色。一旦您启动该过程，向导将通过一系列对话框提示您每组要求。在每种情况下，向导都会显示语法，以便您可以查看并决定是否继续。在此阶段，系统还会提示您输入\
  \ `SYS` 密码。\n\n最初，向导会验证资料库所有者是否拥有正确的权限；如果没有，则授予以下权限：\n\n```sql\nGRANT CONNECT, RESOURCE,\
  \ CREATE VIEW TO \"REPOS_OWNER\";\n```\n\n之后，向导授予用户访问以下必需角色的权限：\n\n```sql\nGRANT\
  \ SELECT ON dba_roles TO repos_owner;\nGRANT SELECT ON dba_role_privs TO repos_owner;\n\
  ```\n\n最后，如果单元测试角色不可用，向导将显示以下语法来创建角色并授予其余必需的权限：\n\n```sql\nCREATE ROLE ut_repo_administrator;\n\
  CREATE ROLE ut_repo_user;\nGRANT CREATE PUBLIC SYNONYM,DROP PUBLIC SYNONYM TO ut_repo_administrator;\n\
  GRANT SELECT ON dba_role_privs TO ut_repo_user;\nGRANT SELECT ON dba_role_privs\
  \ TO ut_repo_administrator;\nGRANT SELECT ON dba_roles TO ut_repo_administrator;\n\
  GRANT SELECT ON dba_roles TO ut_repo_user;\nGRANT SELECT ON dba_tab_privs TO ut_repo_administrator;\n\
  GRANT SELECT ON dba_tab_privs TO ut_repo_user;\nGRANT EXECUTE ON dbms_lock TO ut_repo_administrator;\n\
  GRANT EXECUTE ON dbms_lock TO ut_repo_user;\nGRANT ut_repo_user TO ut_repo_administrator\
  \ WITH ADMIN OPTION;\nGRANT ut_repo_administrator TO \"REPOS_OWNER\" WITH ADMIN\
  \ OPTION;\n```\n\n依次接受每个对话框以授予权限并创建资料库。创建完成后，您可以使用`工具` ![images](img/U001.jpg) `单元测试`\
  \ ![images](img/U001.jpg) `选择当前资料库`来选择该资料库。\n\n### 维护单元测试资料库\n\n资料库构建完成后，通过选择`视图`\
  \ ![images](img/U001.jpg) `单元测试`菜单浏览单元测试导航器。这将打开一个导航器，您可以在其中执行以下操作：\n\n*   浏览单元测试库。\n\
  *   创建可重用的查找值。\n*   运行报告以审查所有测试运行。\n*   构建单元测试套件。\n*   创建单元测试和单元测试实现。\n\n您现在可以使用单元测试菜单维护您的资料库，如图\
  \ 5-3 所示。\n\n![images](img/0503.jpg)\n\n**图 5-3.** 管理单元测试\n\nSQL Developer 3.0 提供了清除运行结果的选项。根据您运行测试的频率，尤其是在刚开始熟悉该工具时，您最终可能会积累大量运行结果，因此能够清除所有结果非常有用。还有一个进一步的选项，您可以在结果的上下文菜单中找到，它允许您删除不同日期之间的一组结果。\n\
  \n![images](img/square.jpg) **注意** `清除运行结果`（删除所有已运行测试的结果）与`清除资料库对象`（同时删除测试本身）是有区别的！\n\
  \n### 导入测试\n\n当您有一组测试后，可以将它们导出到文件，并将其置于版本控制之下作为备份，或将其包含在项目交付成果中。将测试导出到文件还允许您将其导入其他单元测试资料库（有关导入和导出测试的更多信息将在后面介绍）。\n\
  \n\n\n### 构建单元测试\n\n让我们从为一个简单的 PL/SQL 代码片段构建单元测试开始。我已经从代码体中移除了任何有趣的逻辑，因为我想专注于参数输入和测试构建，因此清单\
  \ 5-1 中的示例代码只是一个过程的骨架，它期望接收一个参数。通过此示例，你将了解如何创建一个测试、测试的组成部分以及如何运行测试；通过扩展此示例，你将了解如何扩展测试能力。\n\
  \n**清单 5-1.** 单元测试的骨架代码\n\n```sql\nCREATE OR REPLACE PROCEDURE simple_parameter\n\
  \ (p_x in NUMBER)\n AS\nBEGIN\n   NULL;\n   -- 在此处添加有用的 PL/SQL 代码\nEND simple_parameter;\n\
  ```\n\n许多过程都期望输入参数，因此编写一个测试，在其中可以传入一系列参数或值，并确保它们都产生正确的结果，这一点很重要。通过编写单元测试，你可以提供各种各样的测试值，并随着时间的推移更改和增加这些值。\n\
  \n要创建该过程，请打开一个新的 SQL 工作表并执行代码。对于这些示例，我使用一个与仓库所有者不同的数据库用户，名为 `repos_user`。请确保该过程编译成功并且你可以运行它。一旦你有了一个成功编译的过程，就可以开始了。\n\
  \n#### 使用单元测试向导\n\n开始创建单元测试最直接的方式是从“连接”导航器中的过程或函数列表直接操作。在 SQL Developer 中打开“连接”导航器，展开你为用户创建的连接，并找到你想要测试的\
  \ PL/SQL 程序单元。对于此示例，在你执行了创建过程的代码后，展开 `Procedures` 节点。\n\n找到并选中正确的过程，右键单击调出上下文菜单，然后选择\
  \ `创建单元测试`。这将调出你用来创建所有测试的单元测试向导。该向导引导你完成测试执行时各个阶段的创建。因为你正在处理一个 PL/SQL 骨架，它只期望一个参数且不执行任何其他操作，所以不需要额外的设置或验证，因此你可以接受默认的测试名称\
  \ `SIMPLE_PARAMETER`，选择“使用单一虚拟实现创建”选项，并单击 `完成`。\n\n你现在已经创建了你的第一个测试。选择 `视图` ![images](img/U001.jpg)\
  \ `单元测试` 菜单调出单元测试导航器，展开 `测试` 节点，然后选择你的测试。你现在可以查看测试的完整结构和测试组件。\n\n#### 创建第一个实现\n\n\
  一个 Oracle SQL Developer 单元测试包含一个或多个实现。如果你展开你的测试，你将看到单元测试向导创建的第一个实现。你可以为一个单元测试创建任意数量的实现，每个实现都有自己的参数集和预期结果。使用单元测试向导，你可以从创建单个实现开始，也可以为测试预置多个实现。对于这两种情况，你都可以在测试向导完成后继续添加实现。只需在测试名称上右键单击，然后从上下文菜单中选择\
  \ `添加实现`。这个单一的默认实现期望为每个输入参数提供一个值，你可以在向导中创建实现时添加，也可以在向导完成后添加。在图 5-4 中，`测试实现 1` 部分中的输入参数为\
  \ null，等待被填充。\n\n![images](img/0504.jpg)\n\n**图 5-4.** 单元测试详情\n\n利用图 5-4，下一节将根据\
  \ `详细信息` 选项卡中列出的内容，回顾单元测试的组成部分。\n\n#### 添加启动和拆除过程\n\n构建单元测试的主要优势之一是你可以运行并重新运行它们。你无法以完全相同的方式手动测试你的过程。如果你有一个会更改数据值、可能向表中插入行或更新表中记录的过程，这一点尤其重要；运行和重新运行它会持续更改数据。你需要能够在再次运行代码之前将环境或数据重置回起始点。启动过程的目的是评估当前状况；例如，你在测试执行该过程之前，为表和数据制作一个备份副本。然后你可以运行测试，从而运行该过程，让它按设计进行更新，然后运行拆除过程。拆除过程旨在重置或恢复状态，例如将表和数据返回到执行过程之前的状态。\n\
  \n此示例中的过程不会更新或影响任何数据，因此不需要启动或拆除过程，因此它们是空的。如果你只有一个测试，你可以在测试运行前后有启动和拆除过程。你可以向一个单元测试添加多个启动和拆除过程。你也可以向一个测试套件添加多个测试。在这种情况下，可以将所有启动和拆除过程移到顶层，这样你就可以在套件开始之前通过运行所有启动过程来准备环境。然后你运行测试套件，拆除过程在结束时将情况恢复到正常状态。这取决于过程本身、你正在开发的内容以及一个测试可能对下一个测试产生的影响。\n\
  \n#### 收集代码覆盖率统计\n\n收集代码覆盖率数据是一个好主意，尤其是随着项目中过程或函数数量的增长。你可以确定有多少代码以及你正在测试其中的多少。你可能有一个\
  \ 100% 成功的测试，但如果它只测试了过程的 10%，那么你很难称其为有用的测试。所有收集到的代码覆盖率统计信息都可在 `测试运行` 和 `套件运行` 代码覆盖率报告中找到，你可以在单元测试导航器的\
  \ `报告` 节点中找到它们。\n\n\n\n#### 指定参数\n\n使用`测试实现`部分中的`参数网格`来添加或更新过程或函数预期的输入参数。您可以在逐步完成`单元测试向导`的过程中添加这些输入值，也可以在运行测试前于`详细信息选项卡`中手动添加。向导会创建参数列表，这些参数派生自过程或函数中列出的输入参数。\n\
  \n图 5-5 展示了`单元测试向导`的参数页面。在这里，您可以看到可以使用静态输入值或`动态值查询`。通过`动态值查询`，您可以使用或查询一个值表，而不是硬编码一个值。单元测试会查询该表，并将结果传递回过程，依次使用每个值或值集合作为过程的输入参数。像本例中那样添加一个单一值来验证测试是否正常工作，是一个有用的起点，但您并未充分利用自动化测试的强大功能。再次强调构建单元测试的优势：您不仅可以自动化该过程，还可以使用`动态值查询`为单次测试运行传入更广泛的测试值集。此外，通过使用值表，您可以更改和更新表中的值，从而为测试传入一组不同的值，而无需更新测试本身。\n\
  \n过程执行的`预期结果`可能是成功或失败，您可以针对任一结果进行测试。在本例中，您期望成功的结果。如果您测试的是失败，那么预期结果就是失败，您可以在此处添加失败或错误编号。这种情况下，当您运行测试并遇到预期的错误时，测试即视为成功，最终报告将返回成功！\n\
  \n![images](img/0505.jpg)\n\n**图 5-5.** 向测试实现添加参数\n\n#### 添加过程验证\n\n测试详细信息页面的最后部分是过程验证。过程的执行通常会导致状态变更，无论您是更新表中的记录还是计算一个值。在这些情况下，您可以提供对预期结果的验证。图\
  \ 5-6 提供了可能的过程验证类型列表。例如，如果您正在更新表中的列值，您可能希望验证没有任何值超过某个特定金额。您可以通过针对该表编写一个 `select`\
  \ 语句并使用“查询不返回任何行”选项来验证这一点。在传入一组参数的情况下（允许过程为每个参数运行多次），您可能希望验证每次过程运行都通过所需的条件。\n\n\
  ![images](img/0506.jpg)\n\n**图 5-6.** 选择过程验证\n\n#### 保存测试\n\n一旦您运行了`单元测试向导`，测试及其实施即被保存到`单元测试存储库`中。您所做的任何更改，例如更改输入参数或从静态值切换到动态查询值，都需要在运行测试前保存到存储库中。如果您进行了更改然后尝试运行测试，`SQL\
  \ Developer`会提示您保存这些更改。\n\n#### 调试和运行测试\n\n您可以通过两种方式运行测试：从命令行，或使用图 5-7 所示的`单元测试详细信息`窗口。要在工具内部运行测试，请点击绿色的运行按钮或使用\
  \ `F9`。\n\n![images](img/0507.jpg)\n\n**图 5-7.** 运行测试\n\n测试结果会发送到`结果选项卡`；您可以先在那里进行初步查看，之后再查看测试报告。\n\
  \n我发现先调试测试再运行它很有用，因为这可以暴露在运行测试前您可能忽略的任何问题。例如，如果您忘记添加任何输入参数，这会在调试窗口中被标记出来，如图 5-8\
  \ 所示。\n\n![images](img/0508.jpg)\n\n**图 5-8.** 调试窗口\n\n### 扩展测试范围\n\n构建单元测试的另一个优势是，一旦构建了一个测试，您可以轻松扩展它以测试各种各样的输入参数。您可以通过运行相同的测试实现并手动更改输入值来做到这一点；或者，您可以为要测试的每个值创建新的实现。如果只需要测试少数几个案例，那么向测试中添加几个额外的实现是可以的，但如果您要测试的值随时间变化，或者您想测试一长串值，那么手动添加实现就不是一个实际可行的方法了。`Oracle\
  \ SQL Developer`的单元测试接受来自静态值列表和动态查询的参数值。您可以使用以下任何一种机制来添加输入参数：\n\n*   静态查找值列表，使用下拉列表为您创建的每个测试实现填充内容。\n\
  *   静态查找值列表，根据可用值的排列动态生成实现。\n*   动态查询以填充单个实现，使用查询返回的每个值作为输入参数。\n\n接下来的章节将展示每种方式的示例，以及它们如何为您的测试增添价值。\n\
  \n\n\n#### 创建查找值\n\n当你有一个小型已知数据集，或者有一套标准值集可在多个不同测试中使用时，可以使用静态查找值列表。通常，你会测试一个值的范围，包括几个极端值和中间值。因此，你可能会测试一组数字中的高值、低值和中值；或测试极端长度的字符串；或世纪之交的日期。在每种情况下，除了预期值集外，还要考虑边界情况。\n\
  \n要查看此静态值列表的实际应用，你可以创建一组查找值，用于与之前示例中使用的相同过程 `simple_parameter`。此过程期望一个数字作为输入参数，因此你需要创建一个静态数字列表。要创建查找值，请在单元测试导航器中展开\
  \ `Lookups` 节点。你可以创建一个新的查找类别，或使用现有的 `DEFAULT` 类别。对于本例，我建议你创建一个新类别，因为这样更容易看到非默认类别列表的影响。选中新类别后，右键单击以调用上下文菜单，单击\
  \ `Add Datatype`，然后在对话框的 `DataType` 下拉列表中选择 `Number`。现在你可以添加数字列表了。图 5-9 中有一组值的示例。添加值后，保存更改。\n\
  \n![images](img/0509.jpg)\n\n`图 5-9.` 添加静态查找值\n\n在使用新的静态列表之前，你需要确保 SQL Developer\
  \ 知晓你的列表，并确保这是新实现输入参数时默认使用的列表。为此，你需要设置单元测试参数首选项。选择 `Tools` ![images](img/U001.jpg)\
  \ `Preferences` 菜单，然后单击 `Unit Test Parameters` 以显示用于设置查找配置选项。使用下拉列表，选择新类别。如果你将静态值添加到了\
  \ `DEFAULT` 类别，则无需执行此步骤，因为该类别默认显示在列表中。当你拥有许多不同类别时，此首选项非常有用。选择类别并关闭首选项对话框。\n\n现在，你可以返回到创建的测试，选择测试，然后右键单击选择\
  \ `Add Implementation`。展开测试并选择新的实现，以在测试屏幕中显示详细信息。使用 `Lookup Category` 下拉列表，将值更改为你新的查找类别。现在，你可以使用静态列表来填充参数输入值来运行和重新运行实现，如\
  \ 图 5-10 所示。\n\n![images](img/0510.jpg)\n\n`图 5-10.` 使用静态下拉列表\n\n#### 播种测试实现\n\n\
  你已经看到，可以通过手动输入或从静态下拉列表中选择来更改输入参数。你还可以使用静态列表在测试中播种多个实现。\n\n要学习这种方法，你需要为你的过程创建一个新的测试。在单元测试导航器中选择\
  \ `Tests` 节点，右键单击调用上下文菜单，然后选择 `Create Test`。这将调用单元测试向导，比你之前看到的阶段更早，是创建测试的另一种方法。选择连接和你之前使用的过程。提供一个新的测试名称，并选择\
  \ `“Seed/Create implementations using lookup values.”`。此时你可以单击 `完成`，或跳过步骤以查看 `Specify\
  \ Parameters` 屏幕。请注意，你无法在此处修改或添加任何参数，但你应该会看到你创建的查找名称显示在查找类别中；该向导使用查找中的值创建一个新的实现。完成向导并展开新测试。注意，创建的实现数量与你查找列表中的值一样多。\n\
  \n要看到其真正效果，请返回你的过程，添加另一个输入参数，例如 `p_y IN NUMBER`，并编译代码。你的过程现在如下所示：\n\n```\nCREATE\
  \ OR REPLACE PROCEDURE simple_parameter\n(\n p_x IN NUMBER,\n p_y IN NUMBER\n)\n\
  \ AS\nBEGIN\n   NULL;\n   -- Add PL/SQL code to do something useful here\nEND simple_parameter;\n\
  ```\n\n返回单元测试导航器，并按照你刚刚完成的相同过程操作：创建一个新测试，选择 `“Seed/Create implementations using\
  \ lookup values”` 并完成单元测试向导。当你展开新测试时，注意查找列表已被用于填充两个参数，因此不是像单个参数那样创建 6 个实现，而是创建了\
  \ 6 × 6 个实现。这样做的好处是，你可以使用少量的静态值列表来测试广泛的数值范围。\n\n当你运行单元测试时，每个实现都会被执行。要使用所有实现运行测试，请在单元测试导航器中选择测试，并使用右键上下文菜单来运行测试。切换到\
  \ `Results` 选项卡以查看结果，如 图 5-11 所示。注意使用的输入参数是如何组合自查找列表中创建的静态值的。\n\n![images](img/0511.jpg)\n\
  \n`图 5-11.` 查看播种的实现结果\n\n#### 创建动态查询\n\n使用静态查找列表来播种多个实现是扩展测试范围的有用方法。然而，前面提到的动态查询提供了更大的灵活性。使用查询来提供填充实现的值，意味着值集可以随时间而变化，增加或减少。\n\
  \n要创建动态查询，你需要有一个可以针对其运行查询的值表。例如，创建表和数据如下：\n\n```\nCREATE TABLE double_param_val\n\
  (p_val1 NUMBER(2),\np_val2 Number(5));\n\nINSERT INTO double_param_val VALUES (2,\
  \ 0);\nINSERT INTO double_param_val VALUES (99, 20000);\nINSERT INTO double_param_val\
  \ values (0, 99999);\n```\n\n创建表后，你可以向测试添加一个新的实现。不要使用静态列表或手动添加参数，而是选择 `Dynamic Value\
  \ Query` 选项。这将打开一个包含示例查询的对话框：`“select ? as P_X, ? as P_Y from ? where ?”`。重写查询以查询新的值表，如下所示：`“select\
  \ p_val1 as P_X, p_val2 as P_Y from double_param_val;”`，然后保存并运行测试。请注意，对于动态查询，你只需要一个实现，即使表本身可能包含许多值。每个值或值集会依次传递给过程。当你运行测试时，`Results`\
  \ 选项卡中将显示一套完整的结果，为每组输入值显示一个实现。\n\n使用动态查询的优势在于表中的值可以变化，你可以继续添加和更新它们以测试更多选项，而无需添加额外的实现。这与静态查找值形成对比，静态查找值是为列表中的每个值创建一个实现。如果你想测试其他值，则必须添加额外的实现。\n\
  \n### 支持的单元测试功能\n\nSQL Developer 还提供了许多支持创建和运行单元测试的附加功能。以下部分将介绍其中一些。\n\n\n### 运行报告\n\
  \n创建并开始运行单元测试后，你可以运行为所有已运行测试创建的报告。报告包括以下内容：\n\n*   用户测试运行：所有运行过测试的用户的报告。\n*   代码覆盖率：运行的套件中的代码覆盖率报告和单个测试的代码覆盖率报告。覆盖率报告包括总行数以及测试覆盖的行数。\n\
  *   测试实现运行：测试和套件中运行的实现的报告。\n\n图 5-12 展示了一组所有已运行的测试。通过选择单个报告，可以查看运行详情和代码覆盖率。\n\n\
  ![images](img/0512.jpg)\n\n*图 5-12. 运行测试报告*\n\n![images](img/square.jpg) **注意**\
  \ 这些报告查询单元测试存储库中的结果，因此清除测试运行结果也会从报告中清除它们。\n\n### 创建组件库\n\n我之前谈到过单元测试的优势在于可重复性。如果能构建一套可重用的组件，就开始为组装更多测试建立资源。可以使用\
  \ Library 节点作为起点并在库中创建一组组件，但在创建测试时同步构建组件会容易得多。\n\n仍然坚持使用最基础的 PL/SQL 程序，使用以下示例来构建测试，同时创建一组库组件。使用以下代码，它创建了两个表（其中一个包含数据）以及一个过程：\n\
  \n```\nCREATE TABLE cities\n  (city_id NUMBER(4,0),\n   city VARCHAR2(30),\n   country_abrv\
  \ VARCHAR2(2)\n  ) ;\n```\n\n```\nCREATE OR REPLACE PROCEDURE insert_cities (\n\
  \    city_id NUMBER,\n    city       VARCHAR2,\n    country_abrv VARCHAR2)\n  IS\n\
  \  BEGIN\n    INSERT INTO cities (city_id, city,country_abrv)\n    VALUES (city_id,\
  \ city, country_abrv);\n  END;\n/\n```\n\n```\nCREATE TABLE places\n  (\n    location_id\
  \ NUMBER(4,0),\n    city VARCHAR2(30),\n    country_id  CHAR(2)\n  ) ;\n```\n\n\
  ```\nINSERT INTO places  VALUES (1000,'Roma','IT');\nINSERT INTO places  VALUES\
  \ (1100,'Venice','IT');\nINSERT INTO places  VALUES (1200,'Tokyo','JP');\nINSERT\
  \ INTO places  VALUES (1300,'Hiroshima','JP');\nINSERT INTO places  VALUES (1400,'Southlake','US');\n\
  INSERT INTO places  VALUES (1500,'South San Francisco','US');\nINSERT INTO places\
  \  VALUES (1600,'South Brunswick','US');\nINSERT INTO places  VALUES (1700,'Seattle','US');\n\
  INSERT INTO places  VALUES (1800,'Toronto','CA');\nINSERT INTO places  VALUES (1900,'Whitehorse','CA');\n\
  ```\n\n为过程 `insert_cities` 创建一个新的单元测试。你可以从连接导航器中操作（选择该过程，右键打开上下文菜单，然后选择“创建单元测试”），或者从单元测试菜单中操作（选择测试\
  \ ![images](img/U001.jpg) 从上下文菜单中选择“创建测试”）。打开向导后，给测试起个名字并选择“使用单个虚拟实现创建”。\n\n在启动过程中，你有一个选择：可以留空启动，插入记录，然后在拆卸时删除插入的记录；或者可以复制现有表，使用过程插入行，然后在拆卸中恢复状态。在本例中，添加一个新的启动，并从下拉列表中选择“表或行复制”。这将调用一个新对话框。浏览找到并选择要复制的表（本例中是\
  \ `CITIES`），然后单击“确定”返回到“启动过程”对话框。如果你只是构建单元测试而不将代码添加到库中，你会直接继续完成向导，但既然正在构建组件库，就在“发布到库”字段中添加一个名称，如图\
  \ 5-13 所示，然后单击“发布”。\n\n![images](img/0513.jpg)\n\n*图 5-13. 创建库组件*\n\n发布组件后，对话框会发生变化，你将无法再编辑值。只要你选择了“订阅”复选框，这状态就一直保持。只要单元测试仍订阅此库组件，对组件进行的任何更改都会反映在使用它的测试中。一旦构建了一组组件，你就可以使用同一个对话框从库中选择它们。如果库组件完成了大部分你需要的功能，但不是全部，你可以创建一个副本然后进行修改。这些修改由你正在处理的测试使用，不会影响任何其他使用该库组件的测试。\n\
  \n将启动发布到库后，继续到向导的下一页。你已经看到了处理参数的不同可用选项，因此选择“动态值查询”，因为此参数选项也提供了将详细信息作为组件保存到库中的机会。添加以下查询：\n\
  \n```\nSELECT LOCATION_ID AS CITY_ID,  CITY AS CITY,  COUNTRY_ID AS COUNTRY_ABRV\n\
  FROM PLACES\n```\n\n为了将查询发布到库中，像之前一样在“发布到库”字段中输入名称并单击“发布”。继续到“过程验证”屏幕并添加一个新的过程验证。在本例中，你需要检查是否已将行插入表中。有多种方法可以做到这一点，一种方法是查询更新后的表。在添加新的过程验证时，从下拉列表中选择**返回多行的查询**。输入以下代码：\n\
  \n```\nSELECT CITY FROM CITIES WHERE  CITY_ID IN    \n(SELECT  LOCATION_ID FROM\
  \ PLACES);\n```\n\n输入查询后，给新的过程验证起个名字并将其发布到库。图 5-14 显示了将详细信息发布到库后的对话框。\n\n![images](img/0514.jpg)\n\
  \n*图 5-14. 添加过程验证*\n\n向导的最后阶段是拆卸过程。在启动过程中，你将表复制到了临时表，所以现在你需要反向操作并恢复表。重置环境的另一种方法可能是删除插入的记录。从下拉列表中选择“表或行恢复”。向导会根据你在启动过程中做出的决定，用详细信息填充拆卸过程中的字段。你也可以将这个最终组件发布到库中。通过查看摘要页面来完成向导，然后单击“完成”关闭对话框。\n\
  \n现在测试已完成，你可以运行它并查看结果。`CITIES` 测试表应该保持为空，因为你的测试插入了新记录然后恢复了表。你的验证过程验证了 `PLACES` 表中的记录已插入到\
  \ `CITIES` 表中。如果你想测试该过程是否确实在执行插入操作，只需删除启动和拆卸过程，重新运行测试，然后查询 `CITIES` 表。你应该会看到新插入的记录。\n\
  \n通过展开单元测试导航器中的 Library 节点来查看库组件，如图 5-15 所示。每个组件区域现在都有一段可重用的代码。你可以编辑和更新这些组件；你所做的任何更改都会反映在任何使用它们的测试中。\n\
  \n![images](img/0515.jpg)\n\n*图 5-15. 库的展开视图*\n\n### 导出、导入和同步测试\n\n您可以通过 `单元测试存储库`\
  \ 与其他用户共享您的测试。这意味着任何有权访问 `单元测试存储库` 的用户都可以查看测试并运行它们。其他用户不仅可以查看测试，每个有权访问的用户还可以针对他们选择的数据库连接运行测试。换句话说，在有意义的情况下，您可以在开发环境和单独的缺陷测试环境中运行同一个测试。另一种方法是导出测试并在中央服务器上共享。然后其他用户可以导入这些测试。\n\
  \n当您最初为某个过程创建测试时，该过程所有者的详细信息会存储在测试详情中。您可以在如 图 5-16 所示的 `单元测试详情` 屏幕中看到这一点，其中列出了完全限定的过程名称。\n\
  \n![images](img/0516.jpg)\n\n图 5-16. 显示单元测试详情\n\n过程名称在导出测试时创建的 XML 文件中也可见。如果您导出并导入单元测试，则需要将其导入具有相同用户和过程的数据库，或者需要将测试指向新模式下的正确过程。因此，对于您想在不同数据库中针对不同用户和不同存储库测试同一过程的情况，您可以通过导出然后导入测试来实现。\n\
  \n要导出测试，只需右键单击测试并选择 `导出到文件`。对于导入测试，您需要使用主菜单中的 `工具` > `单元测试`，然后选择 `从文件导入`。\n\n导入测试后，您可能需要将其与新环境同步。同步测试不仅在将测试移动到不同环境时有用，而且在您自己场景中使用的过程或函数发生变化时也很有用。例如，您可能添加或更新了输入参数。您可能需要执行同步的原因有几种。\n\
  \n*   测试执行的过程具有相同的参数，但顺序不同。\n*   该过程与最初构建测试时所针对的过程具有不同的参数。\n*   该过程存在于与最初创建时不同的模式中。\n\
  \n要执行同步，请选择测试，右键单击并选择 `同步测试`。现在您可以浏览以选择正确的过程，如 图 5-17 所示。\n\n![images](img/0517.jpg)\n\
  \n图 5-17. 同步单元测试\n\n如果测试需要更改，这些更改会列在摘要屏幕中，如 图 5-18 所示。在此示例中，测试需要指向新模式中的过程，并且输入参数发生了变化。\n\
  \n![images](img/square.jpg) **提示** 同步测试后，请确保刷新测试详情以反映更改。您可能需要更新任何动态查询以匹配新的参数更改。\n\
  \n![images](img/0518.jpg)\n\n图 5–18. 同步单元测试摘要\n\n### 构建测试套件\n\n最终，您会希望建立一套回归测试，以便在\
  \ `SQL Developer` 环境之外运行。要创建测试套件，请选择 `套件` 节点，调用上下文菜单，然后选择 `创建套件`。您可以根据需要选择并添加任意多的测试到套件中。套件的好处在于，您只需选择套件即可运行它，并且可以将所有启动和拆解过程移动到顶层，让它们在测试开始时执行。您可以像审查单个测试的报告一样，在报告中查看套件的结果。\n\
  \n### 从命令行运行测试\n\n一旦您构建了测试或测试套件，就可以从命令行运行它们，并最终将其纳入您的构建过程。要从命令行运行 `SQL Developer`\
  \ 单元测试，请启动命令行会话并导航到 `\\sqldeveloper\\sqldeveloper\\bin` 目录。\n\n要获取有关单元测试命令行命令的帮助和详细信息，请在命令提示符下输入\
  \ `ututil`，不带任何附加参数。该工具将返回三个可用的命令选项：运行、导入或导出单元测试。要查看每个命令预期的参数，请输入查询命令 `ututil –exp\
  \ ?`\n\n一旦您知道预期的参数，就可以输入完整的命令，例如：\n\n```\nD:\\Builds\\SQL Dev\\3.0\\3.0.04.34\\\
  sqldeveloper\\sqldeveloper\\bin>ututil -exp -test -name SIMPLE_PARAMETER -repo UNIT_TEST_30\
  \ -file d:\\working\\myexptest.xml\n```\n\n您可以将完整的运行、导出或导入测试的命令构建到批处理文件中，如 图 5-19\
  \ 所示，并根据需要安排它们运行。\n\n![images](img/0519.jpg)\n\n图 5-19. 从命令行导出单元测试\n\n测试运行的结果像之前一样写入存储库，因此您可以在\
  \ `测试` 或 `套件` 部分查看报告。\n\n### 总结\n\n单元测试是构建应用程序的关键。Java 开发人员多年来一直将单元测试作为开发过程的一部分，而\
  \ PL/SQL 开发人员则较慢地将其作为开发过程的正式组成部分。单元测试可以构成回归测试套件的一部分，并从命令行运行以支持批处理过程。本章回顾了您应该构建单元测试的原因，以及何时和为何需要将它们视为整个\
  \ PL/SQL 开发周期的一部分。以 Oracle `SQL Developer` 3.0 作为示例基础，介绍了通过添加启动过程来准备测试环境以及通过拆解过程重置环境的概念。过程和函数通常期望一个或多个输入参数，因此有一节讨论了提供静态或动态输入参数的不同可用选项，以及验证测试过程和结果的重要性。通过从命令行运行测试来自动化测试过程，意味着测试和测试套件可以被纳入通用的应用程序构建周期。通过介绍单元测试并说明使用测试框架所获得的优势，我希望您能够快速轻松地构建测试，并在开发周期中开发出健壮的代码。\n\
  \n"
- "# 批量 SQL 操作\n\n*作者：Connor McDonald*\n\n本章介绍 PL/SQL 中可用的批量 SQL 操作。PL/SQL 中的批量操作使您能够一次操作和处理多行数据，而不是一次处理一行。在本章中，您将学习批量提取和批量绑定。批量提取是指通过单次调用将一组行从数据库检索到\
  \ PL/SQL 结构中的能力，而不是为要检索的每一行都调用数据库。批量绑定则允许您执行相反的操作：将存储在 PL/SQL 结构中的那些行集以高效的方式保存到数据库中。\n\
  \n您将看到使用批量 SQL 操作可能带来的巨大性能优势。要实现这些优势需要您的代码增加一点复杂性，尤其是在错误处理方面，但我会向您展示如何管理这种复杂性，以便在获得性能优势的同时不损害代码的可管理性。\n\
  \n## 五金店之旅\n\n我对批量操作益处的认识，始于一次五金店之旅——不是指计算机硬件店，而是那种可以购买工具、配件、油漆等物品，用于家庭住宅手工项目和维护的\
  \ DIY 风格商店。\n\n我**爱**五金店。当然，作为一名信息技术专业人士，我对任何与体力劳动稍微沾边的东西几乎一无所知。所以，每次我到收银台支付一个新工具或一罐新油漆后，大约\
  \ 5 秒钟内，我就会回到过道去拿一个配套物品；例如，一罐新油漆如果没有油漆刷就没什么用！当我真正拥有完成手头工作所需的所有工具时，我可能已经来回收银台六七次了，每次去收银台时，收银员的脏话都在不断升级。我妻子观察到我这样做——一次只买一件东西——她想出了一个昵称，那就是“白痴”。她说得对；我应该直接推一辆购物车，收集我需要的所有物品，然后一次性付清！\n\
  \n这就是最大的矛盾之处。出于某种奇怪的原因，那些在应对“挑战”（比如去五金店）时能应用简单常识的 IT 专业人士，在处理数据库时却难以应用同样的常识。就像五金店一样，如果你要拿多个（数据）项，使用购物车的编码等价物来收集这些数据会合理得多。\n\
  \n在本章中，我将经常回顾并扩展五金店购物的这个比喻，因为这对构建示例很有用，但也是为了强调一个事实：本章讨论的一切仍然仅仅是我们远离技术的日常生活中所用常识原则的反映。\n\
  \n## 本章示例的设置\n\n本章中的所有示例都可以从 Apress 网站上本书的目录页面下载，每个示例都标注了相应的文件名。对于每个示例，你会看到一个对脚本的初始调用，像这样：\n\
  \n`@@bulk_setup.sql [populate | empty]`\n\n这将创建一个代表“五金店”的表，所有示例都将使用它。\n\n```\nSQL>\
  \ desc HARDWARE\n Name                                      Null?    Type\n -----------------------------------------\
  \ -------- ----------------------------\n AISLE                                \
  \              NUMBER(5)\n ITEM                                               NUMBER(12)\n\
  \ DESCR                                              CHAR(50)\n```\n\n该表创建时为空，除非传递了'populate'关键字，之后将通过以下\
  \ SQL 向表中添加 1,000,000 行：\n\n```\nSQL> insert /*+ APPEND */ into  HARDWARE\n  2 \
  \ select trunc(rownum/1000)+1 aisle,\n  3         rownum item,\n  4         'Description\
  \ '||rownum descr\n  5  from\n  6    ( select 1 from dual connect by level <= 1000),\n\
  \  7    ( select 1 from dual connect by level <= 1000);\n\n1000000 rows created.\n\
  ```\n\n该脚本会删除并重新创建表，以便示例能在你的数据库上运行，并得到与你在本章中看到的相似的结果。显然，硬件平台和软件版本有如此多的变体，你的结果可能会有所不同，但这些示例都在最常见的默认设置上运行过，即位于\
  \ ASSM 表空间中的 8k 块大小。\n\n![images](img/square.jpg) **提示** 使用`DUAL`生成任意行数的技巧可以追溯到多年前\
  \ Mikito Harakiri 在`asktom.oracle.com`网站上的一篇帖子。从那时起，它几乎成为新闻组、书籍等中快速合成数据演示的实际标准。在推向极端时，必须注意不要过度消耗内存。详情请参考[`http://blog.tanelpoder.com/2008/06/08/generating-lots-of-rows-using-connect-by-safely/`](http://blog.tanelpoder.com/2008/06/08/generating-lots-of-rows-using-connect-by-safely/)。\n\
  \n## PL/SQL 中的批量操作\n\nOracle 中的批处理早于 PL/SQL，只是名称不同，即“数组处理”。从我接触 Oracle 开始（大约在 1990\
  \ 年代初的版本 6），数组处理的概念就已经可用。不是从数据库中获取单行数据，而是将一组行获取到缓冲区中，然后将该缓冲区作为数组传递回客户端。同样地，不是在数据库中修改或创建单行数据，而是填充一个包含行数组的缓冲区并传递给数据库。应用程序程序员可以通过\
  \ OCI 原生地进行数组处理，或者当时许多流行的 Oracle 工具（如 Forms）会透明地处理该任务。你很快就会看到这种策略在性能和可扩展性方面的好处。\n\
  \nOracle 的 PL/SQL 团队在版本 8.1 中引入原生数组处理时，大概面临了一个命名问题。到那时，“数组”一词在 PL/SQL 中已经根深蒂固，指的是`INDEX\
  \ BY`数组数据结构，也许正是由于这种冲突，才产生了“批量”这个术语。事实上，PL/SQL 中的数组处理甚至早于 8.1 版本；它早在 Oracle 7 中就可以通过`DBMS_SQL`包实现。下一个示例展示了来自版本\
  \ 7 的 PL/SQL 数组处理（我不会详细讲解代码，因为我很快会介绍更简单的机制）。\n\n以下示例（`bulk_dbms_sql_array.sql`）展示了如何在\
  \ 8.0 及以下版本中执行数组处理。它一次从`HARDWARE`表中获取 500 行。\n\n```\nSQL> set serverout on\nSQL>\
  \ declare\n  2    l_cursor   int  := dbms_sql.open_cursor;\n  3    l_num_row  dbms_sql.number_table;\n\
  \  4    l_exec     int;\n  5    l_fetched_rows    int;\n  6  begin\n  7   dbms_sql.parse(\n\
  \  8           l_cursor,\n  9           'select item from hardware where item <=\
  \ 1200',\n 10           dbms_sql.native);\n 11   dbms_sql.define_array(l_cursor,1,l_num_row,500,1);\n\
  \ 12   l_exec := dbms_sql.execute(l_cursor);\n 13   loop\n 14       l_fetched_rows\
  \ := dbms_sql.fetch_rows(l_cursor);\n 15       dbms_sql.column_value(l_cursor, 1,\
  \ l_num_row);\n 16       dbms_output.put_line('Fetched '||l_fetched_rows||' rows');\n\
  \ 17       exit when l_fetched_rows < 500;\n 18    end loop;\n 19    dbms_sql.close_cursor(l_cursor);\n\
  \ 20  end;\n 21  /\nFetched 500 rows\nFetched 500 rows\nFetched 200 rows\n\nPL/SQL\
  \ procedure successfully completed.\n```\n\n遗憾的是，即使在它们被引入十年后，PL/SQL 中的批量操作在现代以 PL/SQL\
  \ 为中心的应用程序中仍然是一种未被充分利用的功能。许多生产环境中的 PL/SQL 程序仍然以逐行方式处理数据库中的数据。特别是，由于我的大部分工作是在调优领域，我使用集合的主要动机是它鼓励开发者更多地从集合的角度思考，而不是从行的角度思考。虽然从功能上讲，没有理由禁止开发者一次处理一个结果集行，但从效率和性能的角度来看，这通常是坏消息。\n\
  \n同样，PL/SQL 在性能方面经常受到批评，但最常见的原因是逐行处理，而不是 PL/SQL 引擎本身固有的任何问题。PL/SQL 并非唯一受到这种错误指责的对象。开发者未能利用\
  \ Pro*C 中的宿主数组，促使 Oracle 添加了`PREFETCH`编译选项，该选项将运行时 Pro*C 代码转换为数组获取，即使开发者是以传统的逐行方式编写的代码。类似地，ODP.NET\
  \ 通过其`FetchSize`参数，默认情况下对大多数查询使用数组处理。\n\n#### 开始使用 BULK Fetch\n\n将代码迁移到利用 PL/SQL\
  \ 中的批量操作的一大优势在于，它易于实现，并且与现有代码有直接的映射关系。在 8.1 版本引入批量操作之前，你可以使用以下三种构造之一在 PL/SQL 中检索一行数据。\n\
  \n##### 1. 隐式游标\n\n一个标准的 SQL 查询 (`SELECT-INTO`) 用于从表中将单行数据或该行的某些列检索到目标变量中。如果没有检索到行或检索到的行超过一行，则会引发异常。示例如下\
  \ (`bulk_implicit_1.sql`)：\n\n```sql\nSQL> declare\n  2    l_descr hardware.descr%type;\n\
  \  3  begin\n  4    select descr\n  5    into   l_descr\n  6    from   hardware\n\
  \  7    where  aisle = 1\n  8    and    item = 1;\n  9  end;\n 10  /\n```\n`PL/SQL\
  \ 过程已成功完成。`\n\n##### 2. 显式提取调用\n\n在 PL/SQL 声明部分显式定义一个游标。然后打开该游标并从中提取数据，通常在一个循环中进行，直到耗尽所有可用行，此时关闭游标。示例如下\
  \ (`bulk_explicit_1.sql`)：\n\n```sql\nSQL> declare\n  2    cursor c_tool_list is\n\
  \  3      select descr\n  4      from   hardware\n  5      where  aisle = 1\n  6\
  \      and    item between 1 and 500;\n  7\n  8    l_descr hardware.descr%type;\n\
  \  9  begin\n 10    open c_tool_list;\n 11    loop\n 12      fetch c_tool_list into\
  \ l_descr;\n 13      exit when c_tool_list%notfound;\n 14    end loop;\n 15    close\
  \ c_tool_list;\n 16  end;\n 17  /\n```\n`PL/SQL 过程已成功完成。`\n\n##### 3. 隐式提取调用\n\n\
  第三种类型是前两种方法的混合。一个 `FOR` 循环负责游标管理，该游标要么是预先显式定义的，要么是直接在 `FOR` 循环内部编码的。示例如下 (`bulk_implicit_fetch_1.sql`)：\n\
  \n```sql\nSQL> begin\n  2    for i in (\n  3      select descr\n  4      from  \
  \ hardware\n  5      where  aisle = 1\n  6      and    item between 1 and 500 )\n\
  \  7    loop\n  8       `<处理每一行的代码>`\n  9    end loop;\n 10  end;\n 11  /\n```\n\
  `PL/SQL 过程已成功完成。`\n\n将上述每种构造转换为批量集合模型都简单直接。以下是与刚展示的非批量构造相对应的三种批量处理构造。\n\n##### 1.\
  \ 隐式游标批量模式\n\n通过简单地添加 `BULK COLLECT` 关键字，一个标准的 SQL 查询 (`SELECT-INTO`) 现在可以用来将多行数据检索到一个集合类型中。示例如下\
  \ (`bulk_implicit_2.sql`)：\n\n```sql\nSQL> declare\n  2    `type t_descr_list is\
  \ table of hardware.descr%type;`\n  3    l_descr_list t_descr_list;\n  4  begin\n\
  \  5    select descr\n  6    `bulk collect`\n  7    into   l_descr_list\n  8   \
  \ from   hardware\n  9    where  aisle = 1\n 10    and    item between 1 and 100;\n\
  \ 11  end;\n 12  /\n```\n`PL/SQL 过程已成功完成。`\n\n##### 2. 显式提取调用批量模式\n\n唯一需要的更改是定义一个集合类型来保存结果，并向\
  \ `FETCH` 命令添加 `BULK COLLECT` 子句。游标结果集中的所有行将在一次调用中被提取到集合类型变量中。示例如下 (`bulk_explicit_2.sql`)：\n\
  \n```sql\nSQL> declare\n  2    cursor c_tool_list is\n  3      select descr\n  4\
  \      from   hardware\n  5      where  aisle = 1\n  6      and    item between\
  \ 1 and 500;\n  7\n  8    type t_descr_list is table of c_tool_list%rowtype;\n \
  \ 9    l_descr_list t_descr_list;\n 10\n 11  begin\n 12    open c_tool_list;\n 13\
  \    fetch c_tool_list `bulk collect` into l_descr_list;\n 14    close c_tool_list;\n\
  \ 15  end;\n 16  /\n```\n`PL/SQL 过程已成功完成。`\n\n##### 3. 隐式提取调用批量模式\n\n将混合方法转换为批量收集甚至更容易，因为**无需**进行代码更改。Oracle\
  \ 10g 引入的最佳特性之一就是针对 `FOR` 循环的“自动批量收集”增强功能。因为游标上的 `FOR` 循环根据定义会提取游标中的**所有**行（除非循环内存在显式的\
  \ `EXIT` 命令），所以 PL/SQL 编译器可以安全地采用批量收集优化来尽可能高效地检索这些行。如果你使用的是至少 Oracle 10g 版本，并且数据库参数\
  \ `plsql_optimize_level` 设置为至少 2（默认值），你将自动获得此优化。以下示例 (`bulk_implicit_fetch_2.sql`)\
  \ 展示了数据库优化级别，随后是一个为你自动实现批量处理功能的 `FOR` 循环：\n\n```sql\nSQL> select banner from v$version\
  \ where rownum = 1;\n\nBANNER\n----------------------------------------------------------------------------\n\
  Oracle Database 11g Enterprise Edition Release 11.2.0.2.0 - 64bit Production\n\n\
  SQL> select value from v$parameter where name = 'plsql_optimize_level';\n\nVALUE\n\
  ----------------------------------------------------------------------------\n2\n\
  \nSQL> begin\n  2    for i in (\n  3      select descr\n  4      from   hardware\n\
  \  5      where  aisle = 1\n  6      and    item between 1 and 500 )\n  7    loop\n\
  \  8       null;\n  9    end loop;\n 10  end;\n 11  /\n```\n`PL/SQL 过程已成功完成。`\n\n\
  在之前的代码中，批量收集的发生并不明显。你很快将看到如何验证代码确实在一次调用中提取了多行数据。\n\n\n#### 三级集合风格数据类型\n\n前一节最后三个示例以嵌套表数据类型获取行。自\
  \ Oracle 8.1 以来，有三种集合风格的数据类型，可以批量获取行。\n\n*   `Varray`\n*   `Nested table`\n*   `Associative\
  \ array`\n\n决定使用哪种集合类型通常取决于哪种最适合您的应用程序。这些类型并非互斥。除了在 PL/SQL 程序之间传递集合外，您还可能在 PL/SQL\
  \ 与驻留在数据库服务器之外的基于 3GL 的应用程序之间来回传递这些集合。许多用于与 Oracle 数据库通信的流行 3GL 技术都有简单有效的接口与 PL/SQL\
  \ 例程交互，这些例程接受*关联数组*作为参数，但不一定接受*varray*或*嵌套表*。\n\n例如，\n\n*   在 JDBC 中，方法`setPlsqlIndexTable`和`registerIndexTableOutParameter`可用于通过\
  \ PL/SQL 关联数组向数据库传递数据和从数据库接收数据。\n*   在 Pro*C 中，C 语言中的主机数组可以直接映射到 PL/SQL 参数中的关联数组。\n\
  *   在 ODP.NET 中，Oracle 参数可以直接映射到关联数组，即 `Param1.CollectionType = OracleCollectionType.PLSQLAssociativeArray;`\n\
  \n相比之下，如果您选择“对象”路径，创建包含 varrays 和/或嵌套表的用户定义类型，那么通过相同的 3GL 与 PL/SQL 交互可能会变得更加复杂。需要转换工具，例如\
  \ Pro*C 的对象类型转换器或 ODP.Net 的自定义元数据映射。因此，如果您有强烈的 3GL 应用程序代码与 PL/SQL 的交互，那么关联数组很可能是最佳选择。或者，鉴于业界当前对面向服务的架构（SOA）的痴迷，其中数据交换媒介是\
  \ XML，3GL 应用程序可能更容易将 XML 传递到 PL/SQL 中，并利用 `XMLTYPE` 数据类型内的功能将传入的 XML 转换为 PL/SQL\
  \ 对象类型。以下是此类转换的示例（`bulk_xml_to_obj.sql`）：\n\n```sql\nSQL> create or replace\n  2\
  \  type COMING_FROM_XML as object\n  3     ( COL1 int,\n  4       COL2 int)\n  5\
  \  /\n\nType created.\n\nSQL> declare\n  2    source_xml xmltype;\n  3    target_obj\
  \ coming_from_xml;\n  4  begin\n  5    source_xml :=\n  6       xmltype('<DEMO>\n\
  \  7                  <COL1>10</COL1>\n  8                  <COL2>20</COL2>\n  9\
  \                </DEMO>');\n 10\n 11    source_xml.toObject(target_obj);\n 12 \
  \ end;\n 13  /\n\nPL/SQL procedure successfully completed.\n```\n\n相反，如果您的应用程序以\
  \ PL/SQL 为中心（Oracle 自己的 Application Express 就是一个完美的例子），那么使用嵌套表和 varray 类型可能是更好的选择，因为这些数据类型的变量有广泛的集合操作符可用。有关可以对嵌套表类型执行的各种集合操作的详细信息，请参阅《对象关系开发者指南》的第\
  \ 5 章。\n\n当然，您可以自由混合搭配。3GL 可以通过关联数组将数据传递给您的 PL/SQL，然后您可以在 PL/SQL 中将这些数组转换为更灵活的对象类型以进行后续处理。\n\
  \n#### 为什么我要费心？\n\n正如您所看到的，将逐行获取调用转换为使用批量集合的代码只需要额外几行代码。那么，您为什么要费心添加这几行代码呢？五金店的比喻表明，批量处理行是为了效率，那么让我们比较一下多次前往五金店（`HARDWARE`\
  \ 表）取每件物品与仅使用一个足够大的手推车（嵌套表）单次前往的结果。以下代码示例（`bulk_collect_ perf_test_1.sql`）比较了逐行代码及其批量收集等效代码的响应时间：\n\
  \n```sql\nSQL> declare\n  2    cursor c_tool_list is\n  3      select descr d1\n\
  \  4      from   hardware;\n  5\n  6    l_descr hardware.descr%type;\n  7  begin\n\
  \  8    open c_tool_list;\n  9    loop\n 10      fetch c_tool_list into l_descr;\n\
  \ 11      exit when c_tool_list%notfound;\n 12    end loop;\n 13    close c_tool_list;\n\
  \ 14  end;\n 15  /\n\nPL/SQL procedure successfully completed.\n```\n\n**`Elapsed:\
  \ 00:00:21.39`**\n\n```sql\nSQL> declare\n  2    cursor c_tool_list is\n  3    \
  \  select descr d2\n  4      from   hardware;\n  5\n  6    type t_descr_list is\
  \ table of c_tool_list%rowtype;\n  7    l_descr_list t_descr_list;\n  8\n  9  begin\n\
  \ 10    open c_tool_list;\n 11    fetch c_tool_list bulk collect into l_descr_list;\n\
  \ 12    close c_tool_list;\n 13  end;\n 14  /\n\nPL/SQL procedure successfully completed.\n\
  ```\n\n**`Elapsed: 00:00:02.20`**\n\n通过减少为获取数据而访问数据库的次数，速度提高了 10 倍。此外，如果启用会话跟踪重复前面的示例，您将从生成的跟踪数据中得到一些有趣的结果。现在让我们启用会话跟踪并重新运行演示：\n\
  \n```sql\nSQL> alter session set sql_trace = true;\nSQL> [repeat demo]\nSQL> alter\
  \ session set sql_trace = false;\n```\n\n在格式化的跟踪文件中，如果搜索列别名“`D1`”，您将找到受单行获取调用影响的\
  \ SQL 查询。\n\n```sql\nSELECT DESCR D1\nFROM   HARDWARE\n\ncall     count       cpu\
  \    elapsed       disk      query    current        rows\n------- ------  --------\
  \ ---------- ---------- ---------- ----------  ----------\nParse        1      0.00\
  \       0.00          0          1          0           0\nExecute      1      0.00\
  \       0.00          0          0          0           0\nFetch  1000001      8.17\
  \       8.15          0    1000010          0     1000000\n------- ------  --------\
  \ ---------- ---------- ---------- ----------  ----------\ntotal  1000003      8.17\
  \       8.15          0    1000011          0     1000000\n```\n\n在跟踪文件的后面部分，您将找到包含\
  \ `D2` 别名的查询，该查询是通过批量获取获取的：\n\n```sql\nSELECT DESCR D2\nFROM   HARDWARE\n\ncall\
  \     count       cpu    elapsed       disk      query    current        rows\n\
  ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
  Parse        1      0.00       0.00          0          1          0           0\n\
  Execute      1      0.00       0.00          0          0          0           0\n\
  Fetch        1      1.85       2.08          0       9001          0     1000000\n\
  ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
  total        3      1.85       2.09          0       9002          0     1000000\n\
  ```\n\n请注意，除了减少经过时间外，CPU 消耗也显著减少。使用批量收集，不仅应用程序性能得到提升，其 CPU 占用也会减少，这使得它们更具可扩展性。\n\
