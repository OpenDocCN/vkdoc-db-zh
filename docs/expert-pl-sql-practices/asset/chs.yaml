  \n一旦过程就位，您的重构工作就会改变并变得更加完整。这次您可以创建并填充新表，一旦确定数据已正确填充，就可以删除旧列，移除重复数据以及可能导致不一致条目的隐患。您还可以使用您的执行脚本来完成第一轮测试，验证过程是否执行并返回了预期的结果集。虽然您总能在数据库中测试一个查询，但如果应用程序可能包含自己版本的代码，该测试的价值就有限了。本章稍后，您将学习如何使用模式权限来确保整个应用程序中一致地使用这些过程，从而让您有信心，重构数据库不会影响应用层。现在，请执行清单\
  \ 12-7 中的代码。\n\n## 清单 12-7. 使用 PL/SQL API 的重构练习\n\n```sql\nSQL>  CREATE TABLE emp_phone_numbers\n\
  \        (employee_id    NUMBER(6)                   NOT NULL,\n         phone_number\
