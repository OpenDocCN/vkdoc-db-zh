  \n已用时间: 00:00:00.97\n```\n\n性能差异惊人！通过移除 PL/SQL 函数并直接连接到 `RATES` 表，响应时间已从 66 秒降至仅\
  \ 1 秒。\n\n**注意：** PL/SQL 函数在 SQL 中调用时有一个不寻常的“特性”：未处理的 `NO_DATA_FOUND` 异常会静默返回 `NULL`，而不是传播错误。我在清单\
  \ 9-11 的 `GET_RATE` 函数中没有显式处理 `NO_DATA_FOUND` 异常，因此即使我查找的汇率不存在，我在清单 9-12 中的查询也不会失败。相反，该函数将返回\
  \ `NULL`，我的查询在行数上将是无损的。为了在清单 9-14 的纯 SQL 查询版本中模拟这一点，我只是对 `RATES` 表使用了外连接。\n\n纯 SQL\
  \ 报告的 Autotrace 统计信息显示在清单 9-15 中。\n\n## **清单 9-15.** 在 PL/SQL 函数中封装 SQL 查询（纯 SQL\
  \ 报告的 Autotrace 输出）\n\n```text\n统计信息\n----------------------------------------------------------\n\
  \          0  递归调用\n          0  数据库块读取\n       1758  一致性读取\n          0  物理读取\n\
  \          0  重做大小\n      16584  通过 SQL*Net 发送到客户端的字节数\n        425  通过 SQL*Net\
  \ 从客户端接收的字节数\n          2  SQL*Net 往返次数\n          0  排序（内存）\n          0  排序（磁盘）\n\
  \        272  处理的行数\n```\n\nAutotrace 输出突显了满足两条 SQL 语句所需逻辑 I/O 的显著差异。PL/SQL 函数产生了超过\
  \ 180 万次 `一致性读取` 的开销。清单 9-16 中的 TKProf 报告清楚地显示了在函数中封装汇率查找的成本。\n\n## **清单 9-16.**\
  \ 在 PL/SQL 函数中封装 SQL 查询（tkprof 输出）\n\n```sql\nSELECT t.calendar_year\n,      p.prod_name\n\
  ,      SUM(s.amount_sold)                                     AS amt_sold_usd\n\
