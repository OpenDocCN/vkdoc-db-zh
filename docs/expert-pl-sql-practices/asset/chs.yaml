  \   v_dept_id := 90;`\n`  status_code=0  status_message=`\n`  ela=-000000000 00:00:00.002270000`\n\
  \n`PL/SQL procedure successfully completed.`\n\n`DEPT_ID DEPT_NAME   STREET_ADDRESS\
  \    CITY      STATE         EMP_CURSOR`\n`     90 Executive   2004 Charade Rd \
