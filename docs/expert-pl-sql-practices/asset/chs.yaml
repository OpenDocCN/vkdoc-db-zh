  \  ----------\n<输出已截断>\n\n********************************************************************************\n\
  SQL ID: ajp04ks60kqx9 执行计划哈希值: 139684570\n\nSELECT EXCHANGE_RATE\nFROM\n RATES WHERE\
  \ BASE_CCY = :B3 AND TARGET_CCY = :B2 AND RATE_DATE = :B1\n\n调用        次数      \
  \ CPU      耗时       磁盘      查询    当前        行数\n------- ------  -------- ----------\
  \ ---------- ---------- ----------  ----------\n解析        0      0.00       0.00\
  \          0          0          0           0\n执行   918843     12.50      13.85\
