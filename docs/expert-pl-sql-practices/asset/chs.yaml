  \n代码清单 1-1 中的代码还有另一个固有问题。SQL 语句在循环中被从 PL/SQL 中调用，因此执行会在 PL/SQL 引擎和 SQL 引擎之间来回切换。这两个环境之间的这种切换被称为***context\
  \ switch***（上下文切换）。上下文切换会增加程序的执行时间并引入不必要的 CPU 开销。您应该通过消除或减少这两个环境之间的切换来降低上下文切换的次数。\n\
  \n您通常应该避免逐行处理。更好的编码实践是将代码清单 1-1 中的程序改写成一条 SQL 语句。代码清单 1-2 重写了代码，完全避免了使用 PL/SQL。\n\
  \n**`代码清单 1-2`.** 重写的逐行处理\n\n```sql\n--\n-- 插入到目标表\n--\nINSERT\nINTO top_sales_customers\n\
