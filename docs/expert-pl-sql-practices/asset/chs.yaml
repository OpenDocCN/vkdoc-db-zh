  \nSQL> exec counter.show('Extended stats');\n```\n\n扩展统计调用次数: 237917\n\n```\nPL/SQL\
  \ 过程已成功完成。\n```\n\n得益于 PL/SQL 函数的扩展统计信息，CBO 做出了明智的决策来重写查询并预先对 SALES 和 TIMES 数据进行分组。这体现在执行计划的步骤\
  \ 3 中。由于这种预分组减少了结果集，PL/SQL 函数调用次数减少到 238,000 次以下。总体而言，对响应时间的影响是显著的。\n\n扩展统计是前面演示的`NO_MERGE`提示的一个良好替代方案。若没有扩展统计，清单\
  \ 9-48 中显示的查询会被 CBO 合并到主查询块中，导致 918,000 次函数执行。幸运的是，生成扩展统计可以很好地阻止这种转换，同样取得了良好效果。\n\
  \n## 清单 9-48. 扩展统计及对基于成本的查询转换的影响\n\n```sql\nSQL> SELECT t.calendar_year\n  2  ,\
  \      c.cust_name\n  3  ,      SUM(s.quantity_sold) AS qty_sold\n  4  ,      SUM(s.amount_sold)\
  \   AS amt_sold\n  5  FROM   sales     s\n  6  ,      (\n  7         SELECT cust_id\n\
  \  8         ,      format_customer_name (\n  9                   cust_first_name,\
  \ cust_last_name\n 10                   ) AS cust_name\n 11         FROM   customers\n\
  \ 12        )          c\n 13  ,      times     t\n 14  WHERE  s.cust_id = c.cust_id\n\
  \ 15  AND    s.time_id = t.time_id\n 16  GROUP  BY\n 17         t.calendar_year\n\
  \ 18  ,      c.cust_name\n 19  ;\n\n11604 rows selected.\n```\n\n耗时: 00:00:00.94\n\
  \n```\n执行计划\n----------------------------------------------------------\nPlan hash\
  \ value: 833790846\n\n---------------------------------------------------------------\n\
  | Id  | Operation                        | Name      | Rows  |\n---------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT                 |           | 19803 |\n|   1 |  HASH GROUP\
  \ BY                   |           | 19803 |\n|*  2 |   HASH JOIN              \
  \        |           | 24958 |\n|   3 |    VIEW                          | VW_GBC_9\
  \  | 24958 |\n|   4 |     HASH GROUP BY                |           | 24958 |\n|*\
  \  5 |      HASH JOIN                   |           |   918K|\n|   6 |       PART\
  \ JOIN FILTER CREATE    | :BF0000   |  1826 |\n|   7 |        TABLE ACCESS FULL\
  \         | TIMES     |  1826 |\n|   8 |       PARTITION RANGE JOIN-FILTER|    \
  \       |   918K|\n|   9 |        TABLE ACCESS FULL         | SALES     |   918K|\n\
  |  10 |    TABLE ACCESS FULL             | CUSTOMERS | 55500 |\n---------------------------------------------------------------\n\
  \nSQL> exec counter.show('Extended stats + inline view');\n```\n\n扩展统计 + 内联视图调用次数:\
  \ 17897\n\n\n\n有趣的是，对于这个重新排列的查询，CBO 生成了相同的执行计划，尽管函数执行次数已从 234,000 次大幅下降到仅 18,000\
  \ 次。这是函数执行具有不可预测性的又一个绝佳例证——我得到了相同的执行计划，但函数调用次数却存在超过一个数量级的差异。尽管如此，这些清单清晰地突显了针对 PL/SQL\
  \ 函数的统计信息对于 CBO 而言是多么重要，以及扩展统计信息是一种为其提供信息的绝佳机制。\n\n![images](img/square.jpg) 注意：扩展统计信息（或简称扩展）是通过系统生成的虚拟列（类似于基于函数的索引）实现的。要研究此功能的更多细节，请查询数据字典视图，如\
  \ `USER_TAB_COLS` 和 `USER_STAT_EXTENSIONS`。\n\n## 默认统计信息\n\n与扩展统计信息不同，默认统计信息是由用户生成的，并且仅适用于谓词中的\
  \ PL/SQL 函数。此外，CBO 不会使用默认统计信息来指导基于成本的查询转换，但如果你的 WHERE 子句中有多个函数调用，它将使用它们来确定谓词的排序。\n\
  \n默认统计信息使用 `ASSOCIATE STATISTICS` SQL 命令提供，通过这些命令，你可以为你的 PL/SQL 函数定义选择性、CPU 和 I/O\
  \ 成本的统计信息（从而改进 CBO 否则会采用的默认值）。\n\n在清单 9-19 中，当我引用查询中的两个函数（它们被恰当地命名为 `QUICK_FUNCTION`\
  \ 和 `SLOW_FUNCTION`）时，我强调了默认谓词排序的影响。清单 9-49 展示了应用默认统计信息如何确保 CBO 以最高效的顺序应用函数谓词。\n\
  \n**清单 9-49.** 为 PL/SQL 函数谓词设置默认统计信息\n```sql\nSQL> ASSOCIATE STATISTICS WITH FUNCTIONS\
  \ quick_function DEFAULT SELECTIVITY 0.1;\n\nStatistics associated.\n\nSQL> ASSOCIATE\
  \ STATISTICS WITH FUNCTIONS slow_function DEFAULT SELECTIVITY 50;\n\nStatistics\
  \ associated.\n\nSQL> SELECT *\n  2  FROM   thousand_rows\n  3  WHERE  slow_function(n1)\
  \ = 0\n  4  AND    quick_function(n1) = 0;\n\n1 row selected.\n\nElapsed: 00:00:00.02\n\
  Execution Plan\n----------------------------------------------------------\nPlan\
  \ hash value: 4012467810\n\n-----------------------------------------------------------------------------------\n\
  | Id  | Operation         | Name          | Rows  | Bytes | Cost (%CPU)| Time  \
  \   |\n-----------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT  |               |     1 |    55 |     5   (0)| 00:00:01\
  \ |\n|*  1 |  TABLE ACCESS FULL| THOUSAND_ROWS |     1 |    55 |     5   (0)| 00:00:01\
  \ |\n-----------------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \n   1 - filter(\"QUICK_FUNCTION\"(\"N1\")=0 AND \"SLOW_FUNCTION\"(\"N1\")=0)\n\
  ```\n\n由于与 `SLOW_FUNCTION` 和 `QUICK_FUNCTION` 相关的选择性统计信息，你可以看到 CBO 已选择重新排序谓词，效果良好。我已告知\
  \ Oracle 数据库，针对 `QUICK_FUNCTION` 的相等性谓词只有千分之一的几率为真，而 `SLOW_FUNCTION` 谓词则有二分之一的几率为真。显然，先应用\
  \ `QUICK_FUNCTION` 以尽早减少数据源是有意义的。清单 9-50 中 10053 跟踪文件的摘录显示了 CBO 对此查询的处理过程。\n\n**清单\
  \ 9-50.** 默认选择性统计信息的 10053 跟踪文件摘录\n```text\n***************************************\n\
  BASE STATISTICAL INFORMATION\n***********************\nTable Stats::\n  Table: THOUSAND_ROWS\
  \  Alias: THOUSAND_ROWS\n    #Rows: 1000  #Blks:  12  AvgRowLen:  55.00  ChainCnt:\
  \  0.00\nAccess path analysis for THOUSAND_ROWS\n***************************************\n\
  SINGLE TABLE ACCESS PATH\n  Single Table Cardinality Estimation for THOUSAND_ROWS[THOUSAND_ROWS]\n\
  \  No statistics type defined for function SLOW_FUNCTION\n  No default cost defined\
  \ for function SLOW_FUNCTION\n  No statistics type defined for function SLOW_FUNCTION\n\
  \  Default selectivity for function SLOW_FUNCTION: 50.00000000%\n  No statistics\
  \ type defined for function QUICK_FUNCTION\n  No default cost defined for function\
  \ QUICK_FUNCTION\n  No statistics type defined for function QUICK_FUNCTION\n  Default\
  \ selectivity for function QUICK_FUNCTION: 0.10000000%\n  Table: THOUSAND_ROWS \
  \ Alias: THOUSAND_ROWS\n    Card: Original: 1000.000000  Rounded: 1  Computed: 0.50\
  \  Non Adjusted: 0.50\n  Access Path: TableScan\n    Cost:  5.10  Resp: 5.10  Degree:\
  \ 0\n      Cost_io: 5.00  Cost_cpu: 3288527\n      Resp_io: 5.00  Resp_cpu: 3288527\n\
  \  Best:: AccessPath: TableScan\n         Cost: 5.10  Degree: 1  Resp: 5.10  Card:\
  \ 0.50  Bytes: 0\n```\n\n`ASSOCIATE STATISTICS` 命令也可用于为 PL/SQL 函数提供成本信息，这与上述选择性统计信息具有类似的影响。清单\
  \ 9-51 展示了如何为 `GET_RATE` PL/SQL 函数设置默认成本统计信息：\n\n**清单 9-51.** 为 PL/SQL 函数设置默认成本统计信息\n\
  ```sql\nSQL> ASSOCIATE STATISTICS WITH FUNCTIONS get_rate DEFAULT COST (403416,\
  \ 2, 0);\n\nStatistics associated.\n```\n\n我按如下方式计算这些成本统计信息（按参数顺序）：\n\n*   CPU 成本\
  \ (403416)：由 `DBMS_ODCI.ESTIMATE_CPU_UNITS(<ms>)` 函数计算，其中 `<ms>` 是执行一次 `GET_RATE`\
  \ 函数所需的毫秒数（由分层分析器报告）。\n*   I/O 成本 (2)：执行一次 `GET_RATE` 的逻辑和物理 I/O 总和（由 Autotrace\
  \ 报告）。\n*   网络成本 (0)：此功能尚未实现，因此可以保留为 0。\n\n可以在单个 `ASSOCIATE STATISTICS` 命令中同时设置选择性和成本，并且在使用此策略时同时提供两者是有意义的。\n\
  \n\n\n### 可扩展优化器\n\n我将通过简要概述可扩展优化器，来结束本次向 CBO 提供统计信息的讲解。此功能（Oracle Data Cartridge\
  \ 工具集的一部分）将默认统计信息提升到了一个新的阶段，它通过一种对象类型来关联选择率和成本，而不是像前面提到的那些硬编码的默认值。\n\n要用许多页的篇幅来描述可扩展优化器是可能的，因此我只提供对该技术的概览，向您展示如何构建一个用于估算您的\
  \ PL/SQL 函数统计信息的方法，该方法能够适应您的数据模式。\n\n请看代码清单 9-52。我有一个简单的函数，用于返回大写的产品代码。在没有统计信息的情况下，CBO\
  \ 会假定任何使用此函数的谓词都具有 1% 的选择率，如下所示。\n\n**代码清单 9-52.** PL/SQL 函数谓词的默认选择率\n\n```sql\n\
  SQL> CREATE FUNCTION format_prod_category(\n  2                    p_prod_category\
  \ IN VARCHAR2\n  3                    ) RETURN VARCHAR2 DETERMINISTIC IS\n  4  BEGIN\n\
  \  5     RETURN UPPER(p_prod_category);\n  6  END format_prod_category;\n  7  /\n\
  \nFunction created.\n\nSQL> SELECT *\n  2  FROM   products\n  3  WHERE  format_prod_category(prod_category)\
  \ = 'SOFTWARE/OTHER';\n\nExecution Plan\n----------------------------------------------------------\n\
  Plan hash value: 1954719464\n\n------------------------------------------------\n\
  | Id  | Operation         | Name     | Rows  |\n------------------------------------------------\n\
  |   0 | SELECT STATEMENT  |          |     1 |\n|*  1 |  TABLE ACCESS FULL| PRODUCTS\
  \ |     1 |\n------------------------------------------------\n```\n\nCBO 估计此谓词的基数仅为\
  \ 1 行，但我确切地知道，Software/Other 类别有更多的行，正如代码清单 9-53 中显示的数据概况所示。\n\n**代码清单 9-53.** PRODUCTS\
  \ 表的数据概况\n\n```sql\nSQL> SELECT prod_category\n  2  ,      c                   \
  \                        AS num_rows\n  3  ,      ROUND(RATIO_TO_REPORT(c) OVER\
  \ () * 100, 1) AS selectivity\n  4  FROM   (\n  5         SELECT prod_category\n\
  \  6         ,      COUNT(*) AS c\n  7         FROM   products\n  8         GROUP\
  \  BY\n  9                prod_category\n 10        )\n 11  ORDER  BY\n 12     \
  \    num_rows;\n\nPROD_CATEGORY                     NUM_ROWS SELECTIVITY\n--------------------------------\
  \ ---------- -----------\nHardware                                 2         2.8\n\
  Photo                                   10        13.9\nElectronics            \
  \                 13        18.1\nPeripherals and Accessories             21   \
  \     29.2\nSoftware/Other                          26        36.1\n```\n\n您可以看到此数据中的选择率范围很广，因此默认的统计信息解决方案不够灵活，无法覆盖所有类别。因此，您可以使用可扩展优化器为此函数谓词构建一个动态统计信息解析器。如前所述，这是使用一个对象类型实现的，其规范在代码清单\
  \ 9-54 中提供。\n\n**代码清单 9-54.** 为可扩展优化器创建统计信息类型\n\n```sql\nSQL> CREATE TYPE prod_stats_ot\
  \ AS OBJECT (\n  2  \n  3     dummy_attribute NUMBER,\n  4\n  5     STATIC FUNCTION\
  \ ODCIGetInterfaces (\n  6                      p_interfaces OUT SYS.ODCIObjectList\n\
  \  7                      ) RETURN NUMBER,\n  8  \n  9     STATIC FUNCTION ODCIStatsSelectivity\
  \ (\n 10                      p_pred_info       IN  SYS.ODCIPredInfo,\n 11     \
  \                 p_selectivity     OUT NUMBER,\n 12                      p_args\
  \            IN  SYS.ODCIArgDescList,\n 13                      p_start        \
  \   IN  VARCHAR2,\n 14                      p_stop            IN  VARCHAR2,\n 15\
  \                      p_prod_category   IN  VARCHAR2,\n 16                    \
  \  p_env             IN  SYS.ODCIEnv\n 17                      ) RETURN NUMBER,\n\
  \ 18  \n 19     STATIC FUNCTION ODCIStatsFunctionCost (\n 20                   \
  \   p_func_info       IN  SYS.ODCIFuncInfo,\n 21                      p_cost   \
  \         OUT SYS.ODCICost,\n 22                      p_args            IN  SYS.ODCIArgDescList,\n\
  \ 23                      p_prod_category   IN  VARCHAR2,\n 24                 \
  \     p_env             IN  SYS.ODCIEnv\n 25                      ) RETURN NUMBER\n\
  \ 26  );\n 27  /\n\nType created.\n```\n\n可扩展优化器使用定义良好的接口方法，代码清单 9-54 使用了生成选择率和成本统计信息所需的三种方法。您必须使用\
  \ Oracle 规定的确切方法名称，就像我这样。\n\n参数数据类型和顺序也由可扩展优化器规定，但您可以选择自己的参数名称，只有一个显著的例外。您必须在类型方法中使用与最终将与统计信息类型关联的\
  \ PL/SQL 函数中相同的参数名称。在本例中，我为其构建此统计信息类型的 `FORMAT_PROD_CATEGORY` 函数只有一个名为 `p_prod_category`\
  \ 的参数（因此我在相关方法中包含了它）。\n\n类型主体实现了统计信息类型，可以包含您喜欢的任何逻辑，以使 CBO 能够确定关联的 PL/SQL 函数的选择率和成本。`PROD_STATS_OT.ODCIStatsSelectivity`\
  \ 方法的类型主体在代码清单 9-55 中提供（其余方法可从 Apress 网站获取）。\n\n**代码清单 9-55.** 为可扩展优化器创建统计信息类型（类型主体节选）\n\
  \n```sql\nSQL> CREATE TYPE BODY prod_stats_ot AS\n  2  \n  3     STATIC FUNCTION\
  \ ODCIGetInterfaces ...\n<snip>\n 13     STATIC FUNCTION ODCIStatsSelectivity (\n\
  \ 14                      p_pred_info         IN  SYS.ODCIPredInfo,\n 15       \
  \               p_selectivity       OUT NUMBER,\n 16                      p_args\
  \              IN  SYS.ODCIArgDescList,\n 17                      p_start      \
  \       IN  VARCHAR2,\n 18                      p_stop              IN  VARCHAR2,\n\
  \ 19                      p_prod_category     IN  VARCHAR2,\n 20               \
  \       p_env               IN  SYS.ODCIEnv\n 21                      ) RETURN NUMBER\
  \ IS\n 22     BEGIN\n 23  \n 24        /* Calculate selectivity of predicate...\
  \ */\n 25        SELECT (COUNT(CASE\n 26                         WHEN UPPER(prod_category)\
  \ = p_start\n 27                         THEN 0\n 28                      END) /\
  \ COUNT(*)) * 100 AS selectivity\n 29        INTO   p_selectivity\n 30        FROM\
  \   sh.products;\n 31  \n 32        RETURN ODCIConst.success;\n 33     END ODCIStatsSelectivity;\n\
  \ 34\n 35     STATIC FUNCTION ODCIStatsFunctionCost ...\n<snip>\n 76  \n 77  END;\n\
  \ 78  /\n```\n\n\n\n正如其名称所示，`ODCIStatsSelectivity` 方法用于计算给定值集合对应 PL/SQL 函数谓词的选择性。它如何实现这一点才是有趣的部分。想象一下，我有这样一个谓词：`WHERE\
  \ format_prod_category(p.prod_category) = 'SOFTWARE/OTHER'`。当 CBO 优化此谓词时，它会调用 `ODCIStatsSelectivity`\
  \ 方法，并通过 `p_start` 和 `p_stop` 参数将值 'SOFTWARE/OTHER' 传递给统计方法。（如果您有一个范围谓词，`p_start`\
  \ 和 `p_stop` 将分别包含下界和上界。）因此，这意味着我可以专门计算 'SOFTWARE/OTHER' 在 `PRODUCTS` 表中出现的次数来确定选择性，如上所述。\n\
  \n## 清单 9-56. 关联并使用统计类型以进行动态 PL/SQL 函数统计\n\n一旦创建了统计类型，就可以将其与 PL/SQL 函数关联起来。清单 9-56\
  \ 展示了关联统计类型的语法以及两个显示其动态特性的小查询。\n\n```sql\nSQL> ASSOCIATE STATISTICS WITH FUNCTIONS\
  \ format_prod_category USING prod_stats_OT;\n\nStatistics associated.\n\nSQL> SELECT\
  \ *\n  2  FROM   products\n  3  WHERE  format_prod_category(prod_category) = 'SOFTWARE/OTHER';\n\
  \nExecution Plan\n----------------------------------------------------------\nPlan\
  \ hash value: 1954719464\n\n-----------------------------------------------\n| Id\
  \  | Operation         | Name     | Rows  |\n-----------------------------------------------\n\
  |   0 | SELECT STATEMENT  |          |    26 |\n|*  1 |  TABLE ACCESS FULL| PRODUCTS\
  \ |    26 |\n-----------------------------------------------\n\nSQL> SELECT *\n\
  \  2  FROM   products\n  3  WHERE  format_prod_category(prod_category) = 'HARDWARE';\n\
  \nExecution Plan\n----------------------------------------------------------\nPlan\
  \ hash value: 1954719464\n\n-----------------------------------------------\n| Id\
  \  | Operation         | Name     | Rows  |\n-----------------------------------------------\n\
  |   0 | SELECT STATEMENT  |          |     2 |\n|*  1 |  TABLE ACCESS FULL| PRODUCTS\
  \ |     2 |\n-----------------------------------------------\n```\n\n您可以看到，通过使用可扩展优化器，我为\
  \ CBO 提供了关于我的 PL/SQL 函数的准确且动态的统计信息（在此示例中，这些信息与 `PRODUCTS` 表的数据分布完全匹配）。请注意，`ODCI*`\
  \ 方法在 SQL 优化阶段（即“硬解析”）被调用*一次*，并且也支持绑定变量（只要启用了绑定变量窥探）。然而，您应该考虑执行统计方法所需的时间，并确保它们带来的性能提升，或者您多次重用共享游标所带来的好处，足以弥补这部分开销。\n\
  \n![images](img/square.jpg) **注意** 如果您想了解 CBO 如何调用统计类型方法来提取选择性和成本，可以运行 10053 跟踪并查看生成的跟踪文件。\n\
  \n### 调优 PL/SQL\n\n我已经描述了许多提高使用 PL/SQL 函数的查询性能的技术。然而，除非您打算消除或大幅减少 PL/SQL 函数调用，否则您还应该考虑对函数本身进行调优。\n\
  \n您有多种调优选项可供选择（尤其是在 Oracle 数据库的后期版本中），例如原生编译、子程序内联、新的整数数据类型、数组提取、关联数组缓存等等。对于关键查询和/或频繁执行的\
  \ PL/SQL 函数，您应该发现，通过使用大量可用的 PL/SQL 调优技术中的一些，可以减少它们的执行时间。\n\n话虽如此，我在此仅演示一种涉及数组缓存的调优技术，因为它与我之前演示的\
  \ Result Cache 选项密切相关，并且可能产生显著效果。\n\n## 用户定义的 PL/SQL 会话缓存\n\n我之前提到过，在关联数组中缓存查找数据是当内置功能（跨会话\
  \ PL/SQL 函数结果缓存）不可用时的一种替代方案。有几种方法可以实现这一点，在清单 9-57 中，我提供了其中一种方法。我为汇率数据创建了一个 PL/SQL\
  \ 数组缓存（使用私有的全局关联数组），并提供了一个单独的 `GET_RATES` 函数来加载和访问缓存的数据。\n\n### 清单 9-57. 用于汇率的用户定义\
  \ PL/SQL 缓存\n\n```sql\nSQL> CREATE OR REPLACE PACKAGE BODY rates_pkg AS\n  2  \n\
  \  4     /* 缓存的索引子类型... */\n  5     SUBTYPE key_st IS VARCHAR2(128);\n  7  \n  8\
  \     /* 汇率缓存... */\n  9     TYPE rates_aat IS TABLE OF rates.exchange_rate%TYPE\n\
  \ 10        INDEX BY key_st;\n 11     rates_cache rates_aat;\n 13  \n 14     /*\
  \ 支持缓存的函数... */\n 15     FUNCTION get_rate (\n 16              p_rate_date IN rates.rate_date%TYPE,\n\
  \ 17              p_from_ccy  IN rates.base_ccy%TYPE,\n 18              p_to_ccy\
  \    IN rates.target_ccy%TYPE\n 19              ) RETURN rates.exchange_rate%TYPE\
  \ IS\n 21  \n 22        v_rate rates.exchange_rate%TYPE;\n 23        v_key  key_st\
  \ := TO_CHAR(p_rate_date, 'YYYYMMDD')\n 24                         || '~' || p_from_ccy\
  \ || '~' || p_to_ccy;\n 26  \n 27     BEGIN\n 29  \n 30        IF rates_cache.EXISTS(v_key)\
  \ THEN\n 32  \n 33           /* 缓存命中... */\n 34           v_rate := rates_cache(v_key);\n\
  \ 36  \n 37        ELSE\n 39  \n 40           /* 缓存未命中。获取并缓存... */\n 41        \
  \   SELECT exchange_rate INTO v_rate\n 42           FROM   rates\n 43          \
  \ WHERE  rate_date  = p_rate_date\n 44           AND    base_ccy   = p_from_ccy\n\
  \ 45           AND    target_ccy = p_to_ccy;\n 46           rates_cache(v_key) :=\
  \ v_rate;\n 48\n 49        END IF;\n 51\n 52        RETURN v_rate;\n 54\n 55   \
  \  END get_rate;\n 57\n 58  END rates_pkg;\n 59  /\n```\n\n我省略了包规范（它只有 `GET_RATES`\
  \ 函数签名），只列出了包体。为了使示例简短，我省略了处理 `NO_DATA_FOUND` 等情况所需的异常处理。关于该实现需要注意的其他一些要点如下：\n\n\
  > *第 7-9 行：* 我创建了一个私有的全局关联数组类型和变量来存储缓存的数据。\n> \n> *第 19-20 行：* 数组的索引是 `RATES` 表主键的字符串表示形式。为了节省空间，我直接在函数的声明部分分配了这个键，但最佳实践是将所有赋值操作放在\
  \ PL/SQL 程序的可执行块中执行。\n> \n> *第 24-27 行：* 我测试汇率是否已经缓存。如果是，我直接从缓存中返回它。\n> \n> *第 32-37\
  \ 行：* 如果汇率不在缓存中，我从 `RATES` 表中获取它并将其添加到缓存中。我决定只缓存必要的内容，以减少潜在的 PGA 内存占用（作为替代方案，您可能更愿意在实例化时将小型查找表预加载到关联数组中）。\n\
  \n## 清单 9-58. 使用用户定义的 PL/SQL 会话缓存函数的查询性能\n\n在清单 9-58 中，我重复了在清单 9-40（演示 Result Cache\
  \ 时）中使用的销售报告，但将对结果缓存的 `GET_RATES` 函数的调用替换为我的新用户定义缓存等效函数。\n\n\n\n`SQL> SELECT t.calendar_year`\n\
  `  2  ,      p.prod_name`\n`  3  ,      SUM(s.amount_sold)                              \
  \ AS amt_sold_usd`\n`  4  ,      SUM(s.amount_sold *`\n`  5             rates_pkg.get_rate(s.time_id,\
  \ 'USD', 'GBP')) AS amt_sold_gbp`\n`  6  FROM   sales     s`\n`  7  ,      products  p`\n\
  `  8  ,      times     t`\n`  9  WHERE  s.prod_id = p.prod_id`\n` 10  AND    s.time_id\
  \ = t.time_id`\n` 11  GROUP  BY`\n` 12         t.calendar_year`\n` 13  ,      p.prod_name`\n\
  ` 14  ;`\n\n`272 rows selected.`\n`Elapsed: 00:00:11.93`\n\n`Statistics`\n`----------------------------------------------------------`\n\
  `       1591  recursive calls`\n`          0  db block gets`\n`       4729  consistent\
  \ gets`\n`          0  physical reads`\n`          0  redo size`\n`      16688  bytes\
  \ sent via SQL*Net to client`\n`        437  bytes received via SQL*Net from client`\n\
  `          2  SQL*Net roundtrips to/from client`\n`          9  sorts (memory)`\n\
  `          0  sorts (disk)`\n`        272  rows processed`\n\n与结果缓存示例类似，用户定义的缓存显著降低了查询的逻辑\
  \ I/O 和运行时，使其降至可接受的水平。实际上，用户定义会话缓存的统计数据与结果缓存相似（缓存未命中次数相同），尽管用户缓存整体上稍慢一些。清单 9-59\
  \ 展示了该查询的层级分析器报告，并说明了（相对于结果缓存示例）额外时间花费在何处。\n\n***清单 9-59.** 使用用户定义的 PL/SQL 会话缓存函数的查询性能（层级分析器报告）*\n\
  \n```\nFUNCTION                                  LINE#      CALLS SUB_ELA_US FUNC_ELA_US\n\
  ------------------------------------ ---------- ---------- ---------- -----------\n\
  __plsql_vm                                    0     918848    7734487     2202214\n\
  RATES_PKG.GET_RATE                           12     918843    5531933     5434184\n\
  RATES_PKG.__static_sql_exec_line32           32       1460      97749       97749\n\
  __anonymous_block                             0          3        328         270\n\
  DBMS_OUTPUT.GET_LINES                       180          2         58          58\n\
  RATES_PKG.__pkg_init                          0          1         12          12\n\
  DBMS_HPROF.STOP_PROFILING                    59          1          0          \
  \ 0\n```\n\n从`rates`函数内部 SQL 的调用情况可以看出，有 1,460 次缓存未命中，这与之前的标量子查询缓存和结果缓存示例相同。这大大减少了对`RATES`表的查找次数。但是，请记住，结果缓存也消除了对`GET_RATES`\
  \ PL/SQL 函数本身的调用。在这方面，用户定义的缓存效果较差，因为对`RATES_PKG.GET_RATES`函数的调用根本没有减少；事实上，函数调用占用了全部的额外运行时。\n\
  \n通过使用您自己的 PL/SQL 数组缓存（正如我所做的），您本质上是在优化函数，而不是减少或消除其使用。尽管如此，用户定义的 PL/SQL 会话缓存仍是一种有用的调优技术，用于降低嵌入\
  \ PL/SQL 函数中的 SQL 的成本。\n\n![images](img/square.jpg) `注意` 如果您选择自己的 PL/SQL 数组缓存而非结果缓存，您应当意识到三个潜在的缺点。首先，每个数组缓存仅对单个会话可见，不会被共享。其次，每个会话都需要缓存其自己的数据副本，这会消耗私有的\
  \ PGA 内存（相反，结果缓存将其结果的单个共享副本存储在 SGA 中）。第三点，也是最关键的一点是，如果您缓存的是经常更新的表的数据，您将需要某种形式的缓存管理，而这将难以实现。结果缓存“开箱即用”地提供了此功能，但在您的\
  \ PL/SQL 程序中，您将没有这种便利。\n\n### 总结\n\n作为本章的结尾，我演示了在将 PL/SQL 函数设计到您的应用程序和查询中时应考虑的一系列成本。此外，我还演示了您可以用来消除、减少或优化\
  \ SQL 语句中 PL/SQL 函数使用的各种技术。\n\n## 第 10 章\n\n### 选择正确的游标\n\n**作者：梅兰妮·卡弗里**\n\n任何曾编写过执行循环逻辑的\
  \ PL/SQL 函数或过程的人都深知选择恰当游标类型的痛苦——或者说选择*错误*游标类型的痛苦。本章旨在教导您如何根据具体的编程情境选择合适的游标类型。选择错误的游标类型可能导致您的用户、同事或管理者（或所有人）对您满足业务需求的技术能力失去信心。选择错误的游标类型还可能导致花费大量时间调试生产环境中的系统减速，而您可能认为最糟糕的情况是收入减少。鉴于这些潜在的陷阱和后果，每位\
  \ PL/SQL 程序员都应努力为所要解决的每个具体技术问题选择最适合的游标类型。\n\n本章重点介绍四种游标类型——并非因为它们是您唯一可用的四种游标类型，而是因为它们是大多数\
  \ PL/SQL 程序员通常实现的*最常见*类型。针对特定的业务需求正确实现它们，是拥有高性能和可扩展 PL/SQL 代码的关键。本章讨论的四种游标类型是\n\n\
  *   显式游标\n*   隐式游标\n*   静态 `REF` 游标\n*   动态 `REF` 游标\n\n您编写的任何用于程序化获取记录集以进行处理（无论是单个处理还是批量处理）的\
  \ PL/SQL 程序的目标，都是选择一种能让您和 Oracle 数据库以最少的工作量获得正确答案的游标类型。道理真的就这么简单。当然，在许多情况下，您*可以*使用多种类型的游标。但您*应该*吗？这是您每次编写\
  \ PL/SQL 程序时都需要问自己的问题。明智地选择。首先要弄清楚您试图回答的业务问题是什么，然后根据每个具体情况选择最佳的编程工具来快速、正确地回答它。\n\
  \n\n\n### 显式游标\n\n毫无疑问，在任何 PL/SQL 程序中，最常用的游标类型是**显式游标**。每个人在初次学习 PL/SQL 语言时都会学习显式游标，大多数\
  \ PL/SQL 程序员会立刻被其吸引，因为他们觉得显式游标能提供更多对处理过程的程序化控制。程序员（至少是新手）都热衷于控制；他们的印象往往是，如果不能控制程序的每个方面，程序就无法正确执行。\n\
  \n显式游标常被称为 `open`、`fetch`、`close` 游标，因为它们需要使用这些关键字：`OPEN`、`FETCH` 和 `CLOSE`。如果你编写一个显式游标，就必须显式地打开游标、从游标中提取数据并关闭游标。到目前为止，这听起来还不算太糟，甚至可能让追求控制的程序员感到安心。然而，重要的是不仅要弄清楚在哪些情况下合理使用这类游标，还要明确在哪些情况下它们可能弊大于利。请看下面清单\
  \ 10-1 中的显式游标示例：\n\n***清单 10-1.** 用于仅获取一个值的显式游标*\n\n```sql\nCREATE FUNCTION f_get_name\
  \ (ip_emp_id in number ) RETURN VARCHAR2\nAS\nCURSOR c IS SELECT ename FROM emp\
  \ WHERE emp_id = f_get_name.ip_emp_id;\nlv_ename emp.ename%TYPE;\nBEGIN\nOPEN c;\n\
  FETCH c INTO lv_ename;\nCLOSE c;\nRETURN lv_ename;\nEND;\n```\n\n![images](img/square.jpg)\
  \ `注意` 本章中参数名和变量名的命名约定如下：`ip_` 表示 `输入参数`，`op_` 表示 `输出参数`，`lv_` 表示 `局部变量`，`gv_` 表示\
  \ `全局变量`。当在函数或过程中引用输入和输出参数时，会加上函数或过程名作为前缀，以避免混淆并说明作用域。在上面的示例中，即清单 10-1，`ip_emp_id`\
  \ 被引用为 `f_get_name.ip_emp_id`。\n\n乍一看，这个函数看起来就像任何典型的 `get` 函数（其唯一目的是获取一行甚至一个值）。业务需求显然是根据输入的员工\
  \ ID `emp_id`，从 `emp` 表中获取至少一个（至多一个）员工姓名 `ename`。游标被打开；从打开的游标中提取单个值并放入变量 `lv_ename`；游标被关闭；最后函数将存储在\
  \ `lv_ename` 变量中的值返回给调用程序。那么，为什么这种游标可能不适合这类业务需求呢？因为函数 `f_get_name` 是一个潜在的错误。\n\n\
  在提取操作中，如果未能提取到任何数据，`lv_ename` 中最终会是什么？你将无法知道是否收到了值。此外，如果数据有问题怎么办？如果对于你输入的 `ip_emp_id`\
  \ 值，最终返回了多行数据怎么办？清单 10-2 展示了这个显式游标的一个更正确的版本：\n\n***清单 10-2.** 用于仅获取一个值的更正确的显式游标\
  \ (11.2.0.1)*\n\n```sql\nCREATE FUNCTION f_get_name (ip_emp_id IN NUMBER) RETURN\
  \ VARCHAR2\nAS\nCURSOR c IS SELECT ename FROM emp WHERE emp_id = f_get_name.ip_emp_id;\n\
  lv_ename emp.ename%TYPE;\nBEGIN\n   OPEN c;\n   FETCH c INTO lv_ename;\n      IF\
  \ (SQL%NOTFOUND) THEN\n         RAISE NO_DATA_FOUND;\n      ENDIF;\n   FETCH c INTO\
  \ lv_ename;\n      IF (SQL%FOUND) THEN\n         RAISE TOO_MANY_ROWS;\n      ENDIF;\n\
  \   CLOSE c;\n   RETURN lv_ename;\nEND;\n```\n\n然而，正如你所看到的，这变得非常复杂。这就是为什么在编写简单的\
  \ `get` 函数时，显式游标是一个糟糕的选择。很快就显而易见，你原本简单的函数突然变得不那么简单了。问题有两个方面：\n\n*   许多人只做打开/提取/关闭操作就完事了。这是一个潜在的错误。\n\
  *   另一方面，如果你正确编码，你需要写的代码*远远*多于必要的代码。更多的代码 = 更多的错误。仅仅因为你可以使用显式游标对之前的业务问题得出正确答案，并不意味着你应该这样做。在“隐式游标”一节中，你将看到使用隐式游标解决相同业务问题的示例。\n\
  \n#### 显式游标的剖析\n\n了解显式游标的工作方式可以帮助你决定它是否适合你的业务功能。前面提到显式游标具有语法：`open`、`fetch`、`close`。那么，这是什么意思？每一步实际发生了什么？下面概述了每一步执行的进程或程序功能：\n\
  \n1.  `OPEN`：此步骤初始化游标并标识结果集。注意，它实际上不必*组装*结果集。它只是设置结果集将“依据”的时间点。\n2.  `FETCH`：此步骤重复执行，直到所有行都被检索出来（除非你使用\
  \ `BULK COLLECT`（稍后描述），它一次性提取所有记录）。\n3.  `CLOSE`：此步骤在最后一行处理完毕后释放游标。\n\n此外，如清单 10-1\
  \ 所示，显式游标必须在从中提取数据之前*声明*。显式游标必须始终在过程或函数（或包，因为它可以在包规范或包体中全局声明）的声明部分中声明，然后才能实际调用。然而，使其成为*显式*的是你必须显式地打开/提取/关闭它。请注意，你可以声明一个游标然后隐式地使用它。声明游标并不会使其成为显式游标；关键在于你如何编写后续与之交互的代码。在“隐式游标”部分，你会看到使用隐式游标时，这个声明步骤不是必需的。隐式游标*可以*被声明，但与显式游标不同，它们*不必*被声明。\n\
  \n![images](img/square.jpg) `注意` `REF` 游标（稍后讨论）不是用实际的 `SELECT` 语句显式声明的。`SELECT`\
  \ 语句只有在它们被显式打开时才会发挥作用。\n\n使用游标涉及的细节很多，尤其是如果你碰巧有多个游标打开并处于提取记录的过程中。考虑到显式游标所经过的工作量（如前面三步概述所示），只在绝对必要时使用显式游标非常重要。那么，在哪些情况下可能需要显式游标呢？使用显式游标最明显的原因是当有要求批量处理记录时。\n\
  \n\n\n"
- "# 显式游标与批量处理\n\n在需要一次处理成千上万（或数百万）条记录的情况下，你无法一次性处理所有记录。当然，你或许会*尝试*。但性能下降会非常严重，以至于你不想这么做。当必须将一个非常大的数据集分成较小的块进行处理时，批量处理是满足这一需求的最佳方法之一。请参考清单\
  \ 10-3 中的批量处理示例。\n\n**清单 10-3.** 使用显式游标执行批量处理\n\n```sql\nCREATE OR REPLACE PROCEDURE\
  \ refresh_store_feed AS\n   TYPE prod_array      IS TABLE OF store_products%ROWTYPE\
  \ INDEX BY BINARY_INTEGER;\n   l_prod               prod_array;\n   CURSOR c IS\n\
  \      SELECT  product\n        FROM  listed_products@some_remote_site;\n   BEGIN\n\
  \   OPEN C;\n   LOOP\n   FETCH C BULK COLLECT INTO l_prod LIMIT 100;\n   FOR i IN\
  \ 1 .. l_csi.COUNT\n   LOOP\n      /*    ... 在这里对 l_csi(i) 执行一些无法用 SQL 完成的过程性代码\
  \ ... */\n   END LOOP;\n      FORALL i IN 1 .. l_csi.COUNT\n         INSERT INTO\
  \ store_products (product) VALUES (l_prod(i));\n   EXIT WHEN c%NOTFOUND;\n   END\
  \ LOOP;\n   CLOSE C;\n   END;\n   /\n```\n\n由于像清单 10-3 所示的那种包含分段处理的批量处理无法使用隐式游标完成，因此你必须使用显式游标来完成任务。在上面的例子中，你可能会问：“如果目标仅仅是从一个表查询并插入到另一个表，为什么不直接使用\
  \ `INSERT AS SELECT` 方法？”这是一个合理的问题，因为在不得不使用 PL/SQL 之前先使用 SQL 通常是完成任务的最快方式。但在清单 10-3\
  \ 概述的情况下并非如此。如果你必须在数据被选出来后——但在插入之前——对其进行某种中间处理，并且你希望以批量方式执行该任务，那么你将需要一个显式游标。此外，虽然可以使用隐式游标进行数组提取（从\
  \ Oracle10g 开始，隐式游标会自动执行 100 行的数组提取），并且可以处理它们（读取，然后执行 DML），但你无法批量执行 DML。只有在使用 `FORALL`\
  \ 功能时，才能批量执行 DML。而且只有在使用显式游标时，才能使用 `FORALL` 功能。\n\n另一个需要使用显式游标的情况本质上是有些动态的。这听起来可能违反直觉，但当你直到运行时才知道查询将是什么时，就需要一种特殊类型的显式游标来帮助你确定实际要处理的结果集。在这种情况下，你将使用的显式游标类型称为\
  \ REF（*reference* 的缩写）游标。如果你需要向客户端返回一个结果集，这是最简单的方法之一。REF 游标提供了常规 PL/SQL 游标无法提供的灵活性。\n\
  \n"
- "# REF 游标简述\n\n尽管本章还有另外两个更全面介绍 REF 游标的章节（“静态 REF 游标”和“动态 REF 游标”），但由于它们的结构——必须显式地打开、提取和关闭——值得在本节简要概述一下。如果你要向客户端返回一个结果集，使用\
  \ REF 游标是避免大量重复代码的好方法。本质上，你打开哪个游标通常取决于从请求客户端接收到的输入。清单 10-4 提供了一个 PL/SQL 中 REF 游标场景的简要示例：\n\
  \n**清单 10-4.** REF 游标动态工作，但需声明\n\n```sql\nDECLARE\n   prod_cursor sys_refcursor;\n\
  BEGIN\nIF ( input_param = 'C' )\nTHEN\n      OPEN prod_cursor FOR\n         SELECT\
  \ * FROM prod_concepts\n          WHERE concept_type = 'COLLATERAL'\n          \
  \  AND concept_dt   < TO_DATE( '01-JAN-2003', 'DD-MON-YYYY');\nELSE\n      OPEN\
  \ prod_cursor FOR\n         SELECT * FROM prod_concepts\n          WHERE concept_category\
  \ = 'ADVERTISING';\nEND IF;\nLOOP\n       FETCH prod_cursor BULK COLLECT INTO ....\
  \ LIMIT 500;\n       ...在这里处理结果的程序化代码...\n       EXIT WHEN prod_cursor%NOTFOUND;\n\
  END LOOP;\n   CLOSE prod_cursor;\nEND;\n```\n\n清单 10-4 说明了 REF 游标如何根据从客户端接收到的输入动态打开。在清单\
  \ 10-4 所示的示例中，如果接收到的输入是 ‘C’，则打开一个游标。但是，如果输入不是 ‘C’，则会打开一个完全不同的游标。只有在打开正确的游标后，才会从中提取数据并关闭它。这之所以可行，是因为游标变量的名称不会改变——改变的只是其内容。\n\
  \n需要注意的是，此 REF 游标是一个*静态* REF 游标的例子。它被称为静态 REF 游标，因为它与一个在编译时已知的查询相关联，这与*动态* REF 游标相反，后者的查询直到运行时才知晓。与静态\
  \ REF 游标关联的查询是*静态*的（永不改变）。使用 REF 游标时，如果可能，应使用静态 REF 游标。任何类型的动态代码都会破坏依赖关系，因为你需要等到运行时才能发现\n\
  \n*   你将要处理的列的数量或类型，或者\n*   你将要处理的绑定变量的数量或类型。\n\n如果你在创建 REF 游标之前*确实*知道这两件事，那么你应该选择创建静态\
  \ REF 游标。静态代码几乎总是优于动态代码，因为它在编译时对 RDBMS 是已知的，因此编译器可以为你捕获许多错误。动态代码在运行时才被 RDBMS 所知，因此可能不可预测且容易出错。\n\
  \nREF 游标将在后续章节中详细阐述。目前，知道 REF 游标是使用显式游标的又一个理由就足够了。实际上，只有少数几种情况下显式游标会比隐式游标成为更有用的编程选择。当执行无法使用\
  \ SQL 完成的批量处理或向客户端返回数据集时，你需要使用显式游标。在几乎所有其他情况下，在不得不使用显式游标之前，你应该尝试使用 SQL 或隐式 PL/SQL\
  \ 游标。\n\n\n\n### 隐式游标\n\n与显式游标不同，隐式游标在使用前无需声明（当然，如果你愿意，也可以声明，稍后你会看到声明隐式游标的一个示例）。此外，隐式游标也无需显式地打开、提取和关闭。它们不使用\
  \ `open, fetch, close` 语法，而是使用 `for … in` 语法或简单的 `select ... into` 语法。一个典型的隐式游标示例如清单\
  \ 10-5 所示。\n\n**清单 10-5.** 用于仅获取一个值的隐式游标\n\n```sql\nCREATE FUNCTION f_get_name (ip_emp_id\
  \ IN NUMBER) RETURN VARCHAR2\nAS\nlv_ename emp.ename%TYPE;\nBEGIN\n   SELECT ename\
  \ INTO lv_ename FROM emp WHERE emp_id = f_get_name.ip_emp_id;\n   RETURN lv_ename;\n\
  END;\n```\n\n你可能认出了这里询问的业务问题。它与清单 10-2 中询问的业务问题相同。两者的主要区别在于，显然，清单 10-5 中的解决方案采用了隐式游标。当你的目标仅仅是获取一个值时，应始终优先考虑使用隐式游标。将这段代码的简洁性与清单\
  \ 10-2 中显式游标示例的冗长和易错性进行比较。在这个隐式游标示例中，没有对 `SQL%FOUND` 或 `SQL%NOTFOUND` 进行检查。代码非常清晰。这是一个简单的\
  \ `select ... into` 游标。如果只选择了一个名字，那么就返回一个名字。可以编写一个异常处理部分来处理两种情况：一是输入的员工 ID 没有对应的姓名，二是由于数据错误存在多个姓名。\n\
  \n![images](img/square.jpg) **注意** 请注意，到目前为止的示例都省略了异常处理部分。这是有意为之。如果你的代码中存在错误，并且你没有异常处理部分，Oracle\
  \ 将会显示你的 PL/SQL 代码中发生错误的确切行号。如果有了异常处理部分，显示的错误行将是你的异常处理部分开始的地方。如果你正在向用户提供传递到堆栈的指令，以便用户在与你的程序交互时采取不同的操作，这可能是有用的。然而，如果错误信息是给你和其他程序员的，那么指出发生错误的确切行号对于你能够快速有效地进行调试至关重要。\n\
  \n当你提出的问题最多只有一个答案时，根本不需要 `for … in` 游标。在这种情况下，使用简单的 SQL `SELECT` 语句来检索一个可能包含零条或一条记录需要处理的答案。清单\
  \ 10-5 假设所提出的业务问题永远不会返回多条记录。如果是这种情况，简单的 SQL `select … into` 语句是实现该解决方案的最佳编程选择。如果存在多条记录，你的程序将返回一个错误。这是一件好事。你需要知道数据是否有误。同样，如果不存在任何记录，你的程序也会返回一个错误。你的程序期望有且仅有一个答案——任何其他结果都是错误，你的程序会立即失败。使用显式游标通常不会有第二次提取（如清单\
  \ 10-2 中描述的）来测试是否存在更多行，那将是一个错误。而 `select … into` 版本是“无错误的”。\n\n#### 隐式游标的剖析\n\n\
  如前所述，隐式游标可以采用两种形式之一。它可以使用 FOR LOOP 实现，或者更具体地说，使用 `for ... in` 形式实现；也可以使用简单的 SQL\
  \ `select … into` 语法实现。隐式游标不需要你显式打开它。当使用 `for … in` 形式实现隐式游标时，请牢记以下几点：\n\n*   一旦你的隐式游标进入其\
  \ for 循环结构，游标即被初始化，结果集也被确定。\n*   `IN` 步骤与“显式游标的剖析”一节中概述的 `FETCH` 步骤非常相似，但有一个关键区别。使用显式游标时，如果你想确保没有更多行需要处理，你需要添加类似下面的语法（示例见清单\
  \ 10-3 和 10-4）：\n    ```sql\n    EXIT WHEN cursor%NOTFOUND;\n    ```\n    这种额外的语法对于隐式游标不是必需的。它们不需要检查游标是否有更多数据要处理来知道何时退出。\n\
  *   同样，`CLOSE` 语法对于隐式游标也不是必需的，因为它会在 `FOR` 循环终止后自动退出。\n\n`select … into` 游标的行为方式与\
  \ `for … in` 游标不同。清单 10-6 说明了这两种实现之间的区别。\n\n将每个 `BEGIN … END` 匿名块与紧随其后的 `DECLARE\
  \ … BEGIN … END` 匿名块进行比较。\n\n**清单 10-6.** 一个 Select … Into 游标与一个 For … In 游标\n\n\
  ```sql\nBEGIN\n   FOR x IN (SELECT * FROM dual) LOOP ... END LOOP;\nEND;\n```\n\n\
  ```sql\nDECLARE\n   CURSOR c IS SELECT * FROM dual;\nBEGIN\n   OPEN c;\n   LOOP\n\
  \      FETCH c INTO …\n      EXIT WHEN c%NOTFOUND;\n       …\n   END LOOP;\n   CLOSE\
  \ c;\nEND;\n```\n\n```sql\nBEGIN\n   SELECT *INTO ...FROM dual;\nEND;\n```\n\n```sql\n\
  DECLARE\n   CURSOR c IS SELECT * FROM dual;\n   l_rec dual%ROWTYPE;\nBEGIN\n   OPEN\
  \ c;\n   FETCH c INTO l_rec;\n      IF (SQL%NOTFOUND)\n      THEN\n         RAISE\
  \ NO_DATA_FOUND;\n      END IF;\n   FETCH c INTO l_rec;\n      IF (SQL%FOUND)\n\
  \      THEN\n         RAISE TOO_MANY_ROWS;\n      END IF;\n   CLOSE c;\nEND;\n```\n\
  \n从概念上讲，`select … into` 就像清单中所示的两个过程块。然而，隐式游标的 `for … in` 处理执行的是数组提取（从 Oracle10g\
  \ 开始），因此实际上更像是批量提取和收集，使其比对应的显式游标高效得多。\n\n`select … into` 游标使用不同的关键字，应在你期望最多处理零条到一条记录时实现。而\
  \ `for … in` 游标应在你期望处理多条记录时实现。一旦你 `SELECT … INTO` 某个 PL/SQL 变量，游标就会随着 `SELECT` 关键字被初始化，它*隐式地*\
  \ `INTO` PL/SQL 变量进行*提取*，然后由于没有更多数据需要检索而*自动关闭*。\n\n\n\n\n### 隐式游标与额外获取理论\n\n一个常被讨论的、关于为何应避免使用隐式游标（尽管多年来已被证伪，但我仍会在奇怪的公司政策数据库编程指南中看到它被提及）的理论是：隐式游标通过执行一次额外的行获取来测试行是否存在，从而进行了无用功。该理论已在多本（为保持匿名）关于\
  \ Oracle RDBMS 的独立教育著作中提出。该理论的问题在于，它很少有实际证据支持。从 Oracle 7.1 版本开始，测试这个理论在任何版本上都相当容易。事实上，挑战任何被写入公司数据库编程政策的命令，应该是你的道德责任。如果它被陈述出来，那么它就应该是可证明的。如果它无法被证明，那么你就应该质疑它是否应该继续作为一条有效的命令。\n\
  \n使用你选择的任何隐式游标来测试这个理论都相当简单。出于说明目的，你可能想尝试一个更普遍可用的案例，比如从 Oracle 数据字典表中进行一个简单的 `SELECT`\
  \ 查询来测试这个理论。代码清单 10-7 概述了一个简单的测试案例：\n\n**代码清单 10-7.** 一个简单的隐式游标获取测试案例\n\n```sql\n\
  SQL> DECLARE\n  2      v_test NUMBER := 0;\n  3  BEGIN\n  4      SELECT user_id\
  \ INTO v_test FROM all_users WHERE username = 'SYS';\n  5  END;\n  6   /\nPL/SQL\
  \ 过程已成功完成。\n```\n\n这是一个易于执行的测试，因为它不包含任何循环结构。预期至少且最多返回一个值。如果 `SELECT` 语句需要执行一次额外的获取，那么在简单的\
  \ SQL 跟踪会话的 TKPROF 输出中应该可以看到这次额外获取。代码清单 10-8 展示了代码清单 10-7 中测试案例的 TKPROF 输出。\n\n\
  **代码清单 10-8.** 隐式游标额外获取测试的 TKPROF 输出（11.2.0.1）\n\n```\n********************************************************************************\n\
  \nSQL ID: bs5v1gp6hakdp\nPlan Hash: 3123615307\nSELECT USER_ID\nFROM\n ALL_USERS\
  \ WHERE USERNAME = 'SYS'\n\ncall     count       cpu    elapsed       disk     \
  \ query    current        rows\n------- ------  -------- ---------- ---------- ----------\
  \ ----------  ----------\nParse        1      0.00       0.00          0       \
  \   0          0           0\nExecute      1      0.00       0.00          0   \
  \       0          0           0\nFetch        1      0.00       0.00          0\
  \          6          0           1\n------- ------  -------- ---------- ----------\
  \ ---------- ----------  ----------\ntotal        3      0.00       0.00       \
  \   0          6          0           1\n\nMisses in library cache during parse:\
  \ 1\nOptimizer mode: ALL_ROWS\nParsing user id: 84     (recursive depth: 1)\n\n\
  Rows     Row Source Operation\n-------  ---------------------------------------------------\n\
  \      1  NESTED LOOPS  (cr=6 pr=0 pw=0 time=0 us cost=3 size=32 card=1)\n     \
  \ 1   NESTED LOOPS  (cr=4 pr=0 pw=0 time=0 us cost=2 size=29 card=1)\n      1  \
  \  TABLE ACCESS BY INDEX ROWID USER$ (cr=2 pr=0 pw=0 time=0 us cost=1 size=26 card=1)\n\
  \      1     INDEX UNIQUE SCAN I_USER1 (cr=1 pr=0 pw=0 time=0 us cost=0 size=0 card=1)(object\
  \ id 46)\n      1    TABLE ACCESS CLUSTER TS$ (cr=2 pr=0 pw=0 time=0 us cost=1 size=3\
  \ card=1)\n      1     INDEX UNIQUE SCAN I_TS# (cr=1 pr=0 pw=0 time=0 us cost=0\
  \ size=0 card=1)(object id 7)\n      1   TABLE ACCESS CLUSTER TS$ (cr=2 pr=0 pw=0\
  \ time=0 us cost=1 size=3 card=1)\n      1    INDEX UNIQUE SCAN I_TS# (cr=1 pr=0\
  \ pw=0 time=0 us cost=0 size=0 card=1)(object id 7)\n\n********************************************************************************\n\
  ```\n\n正如你从 TKPROF 输出中所看到的，并没有执行额外的获取。因此，我只能想到少数几个理由，说明你为什么不想尽一切努力确保使用隐式游标而非显式游标。如“显式游标和批量处理”小节中所述，当需要对从数据库获取的数据执行\
  \ `FORALL` 批量处理时，你将需要使用显式游标。换句话说，如果你只是选择数据并使用 `htp.p` 在 APEX 中输出数据，或者使用 `utl_file.put_line`\
  \ 将所选数据发送到文件等，则无需使用显式游标进行批量处理。在这些情况下，Oracle RDBMS 在后台*已经*在进行批量处理了。\n\n只有当你将数据取出，在过程中进行处理，然后使用\
  \ `FORALL` 更新、插入和/或删除将其放回数据库时，你才需要显式游标处理。在同一小节中，REF 游标被简要说明为另一个使用显式游标的原因——如果你的需求是将数据传递给位于数据库之外但连接至数据库的客户端应用程序。接下来的两节将向你介绍可用的两种\
  \ REF 游标类型。\n\n\n\n### 静态 REF 游标\n\n正如“REF 游标简介”一节所述，如果你需要将结果集返回给客户端，REF 游标（也称为\
  \ *reference* 游标或*游标变量*）是实现这一目标的最佳方式。REF 游标通常依赖于客户端的输入来决定具体打开哪个游标，从而决定返回哪个结果集。鉴于向客户端返回数据时可能存在的未知因素，能够在运行时选择（此处无意双关）要执行的查询，为你的程序提供了极大的灵活性。这种能力也有助于你避免编写重复代码。你已在“REF\
  \ 游标简介”一节中看到了一个静态 REF 游标的例子。清单 10-9 在此静态 REF 游标示例的基础上进行了扩展，加入了包参数规范：\n\n**清单 10-9.**\
  \ 在 PL/SQL 包中声明的静态 REF 游标 (11.2.0.1)\n\n```sql\nCREATE OR REPLACE PACKAGE product_pkg\n\
  AS\n   -- 在包规范中，声明游标变量类型\n   TYPE my_cv IS REF CURSOR;\n\n   PROCEDURE get_concepts\
  \ ( ip_input    IN  NUMBER,\n                            op_rc      OUT  my_cv);\n\
  \nEND product_pkg;\n\nCREATE OR REPLACE PACKAGE BODY product_pkg\nAS\n   -- 在包体的存储过程中，使用包规范中声明的类型来声明游标变量\n\
  \n   PROCEDURE get_concepts (ip_input    IN  NUMBER,\n                         \
  \  op_rc      OUT  my_cv)\n   IS\n   BEGIN\n      IF ( ip_input = 1 )\n      THEN\n\
  \         OPEN op_rc FOR\n             SELECT * FROM prod_concepts\n           \
  \   WHERE concept_type  = 'COLLATERAL'\n                AND concept_dt    < TO_DATE(\
  \ '01-JAN-2003', 'DD-MON-YYYY');\n      ELSE\n         OPEN op_rc FOR\n        \
  \     SELECT * FROM prod_concepts\n              WHERE concept_category = 'ADVERTISING';\n\
  \      END IF;\n   END get_concepts;\n\nEND product_pkg;\n```\n\n清单 10-9 中的包和包体展示了使用游标变量的代码。包规范声明了一个\
  \ REF 游标类型，如这行代码所示：\n\n```sql\nTYPE my_cv IS REF CURSOR;\n```\n\n请注意，这种游标变量是 `弱类型`\
  \ 的。`弱类型` 游标变量在返回结果集方面为你提供了更大的灵活性。然而，因为它不像下面这样被创建为特定类型的记录\n\n```sql\nTYPE my_cv\
  \ IS REF CURSOR RETURN prod_concepts%ROWTYPE;\n```\n\n或\n\n```sql\nTYPE ProdConTyp\
  \ IS RECORD (\n     prod_id                  NUMBER,\n     con_id              \
  \     NUMBER,\n     req_id                   NUMBER,\n     concept_type       VARCHAR2(30),\n\
  \     concept_category   VARCHAR2(30),\n     concept_dt                DATE);\n\
  \     TYPE my_cv IS REF CURSOR RETURN ProdConTyp;\n```\n\n所以它更容易出错。如果你发现自己不得不使用游标变量，应尽可能创建\
  \ `强类型` 的（如上所示），而不是 `弱类型` 的。包规范中声明的类型随后在包体中被引用，以声明实际的游标变量，如下列代码所示：\n\n```sql\nop_rc\
  \      OUT  my_cv)\n```\n\n从这一点开始，这个游标变量可以用于并重复用于任何你想要的结果集，如下面的代码所示，该代码打开 REF 游标并将其作为存储过程\
  \ `get_concepts` 中的输出参数返回：\n\n```sql\nIF ( ip_input = 1 )\nTHEN\n   OPEN op_rc FOR\n\
  \             SELECT * FROM prod_concepts\n              WHERE concept_type = 'COLLATERAL'\n\
  \                AND concept_dt   < TO_DATE( '01-JAN-2003', 'DD-MON-YYYY');\nELSE\n\
  \          OPEN op_rc FOR\n             SELECT * FROM prod_concepts\n          \
  \    WHERE concept_category = 'ADVERTISING';\nEND IF;\n```\n\n请注意，在此代码中，从 `PROD_CONCEPTS`\
  \ 表返回的所有列取决于最终执行的 `WHERE` 子句。在这种情况下，最好对用于返回这两个结果集的游标变量进行 `强类型化`，因为它们包含相同的列列表。然而，为了说明目的，如果可能存在第三种结果，如下扩展\
  \ `IF` 语句\n\n```sql\nELSIF ( ip_input = 2 )\nTHEN\n   OPEN op_rc FOR\n         \
  \    SELECT prod_name FROM products p, prod_concepts pc\n              WHERE p.prod_id\
  \    = pc.prod_id\n                AND concept_type = 'COLLATERAL'\n           \
  \     AND concept_dt   < TO_DATE( '01-JAN-2003', 'DD-MON-YYYY');\n```\n\n那么这个结果集将与其他两个完全不同。在这个特定情况下，在所有条件相同的情况下，如示例所示的\
  \ `弱类型` 游标变量将是唯一适用于此场景的游标变量类型。换句话说，因为示例中选择的游标变量类型几乎可以接受任何类型的结果集，所以它很可能会成功。\n\n但是，因为其结构在编译时对编译器是未知的，所以如果与此\
  \ REF 游标相关的故障发生，那将是在运行时。当你规避可能的编译器错误并允许它们（如果它们会发生的话）在运行时发生时，你总是要承担风险，因为这样的错误会影响你的用户。请记住，仅仅因为你*可以*使用某种特定类型的游标，并不意味着它是你最佳的选择。你的目标是尽可能高效地编写\
  \ PL/SQL。如果你正在使用 REF 游标，则假定你符合以下条件之一：\n\n*   你正在将结果集传递给客户端，并且/或者\n*   你直到运行时才知道查询会是什么，并且/或者\n\
  *   没有其他方法可用于实现你的目标，只能使用隐式游标。\n\n使用 REF 游标时，有几点需要牢记。REF 游标属于在当前时间点处理/获取其记录的任何一方（无论是客户端程序还是\
  \ PL/SQL 程序）。因为 REF 游标是指向游标的指针，并且实际上可以指向许多不同的游标，所以它不会被缓存在 PL/SQL 中。语句缓存对于减少总的解析调用次数并因此提高应用程序可扩展性至关重要。重复解析相同的\
  \ SQL 会降低你的可扩展性并增加你的工作量。通过在 PL/SQL 中使用非 REF 游标，你可以大大减少解析。关于 PL/SQL 游标缓存的更多讨论见“关于解析的几句话”一节。\n\
  \n这里有一个注意事项：你可以通过适当设置初始化文件中 `session_cached_cursors` 参数的值来限制必然会发生的软解析工作量（或者更准确地说，是限制软解析执行的工作量，因为你无法限制软解析）。对于\
  \ REF 游标，PL/SQL 在发出请求并运行相关代码之前，不会知道游标将是什么。因此，由于使用 REF 游标的开销稍高，最好先看看是否可以通过使用常规游标来实现你的目标。\n\
  \n为什么这些要点很重要？因为使用游标变量有大量限制。如果你认为通过使用 REF 游标而不是非 REF 游标来达成目标是选择了简单的方法，那么实际上你选择了一个长期管理起来会困难得多的方法。\n\
  \n"
- '# 游标变量限制清单


  关于游标变量，请务必考虑以下关键点：


  *   不能在包（无论是规范还是主体）中声明游标变量。它们只能在过程或函数中声明。

  *   不能通过数据库链接来回传递游标变量。如果您将宿主游标变量传递给 PL/SQL，则无法在服务器端从中提取数据，除非您在同一服务器调用中也打开它。

  *   游标和游标变量不兼容。不能在预期使用一种游标的地方使用另一种。

  *   不能使用比较运算符来测试游标变量是否相等、不等或为空。

  *   不能使用 `REF CURSOR` 类型来指定集合的元素类型。因此，集合元素无法存储游标变量的值。在计划使用 `REF` 游标辅助批量处理等场景时，这一点尤其需要考虑。

  *   同样，不能在 `CREATE TABLE` 或 `CREATE VIEW` 语句中使用 `REF CURSOR` 类型来指定列类型。换言之，数据库列无法存储游标变量的值。

  *   不能将 null 值赋给游标变量。


  需要考虑的限制确实很多。鉴于使用游标变量存在所有这些限制，因此在选择使用它们时必须经过深思熟虑。然而，使用游标变量绝对比将所有数据库访问逻辑直接放入应用程序中要好。因此，如果选择使用游标变量，重要的是不仅要考虑如何构建
  PL/SQL 代码部分，还要考虑如何构建 Java 代码部分。


  '
- "# 客户端与 REF 游标\n\n请记住，一旦 `REF` 游标被返回给客户端，客户端便 `拥有` 了它。您的 PL/SQL 程序打开 `REF` 游标（有时基于从客户端接收的输入），然后将打开的结果集返回给客户端。清单\
  \ 10-10 提供了一个 Java 程序的简要示例，该程序用于接收清单 10-9 中概述的 PL/SQL 程序返回的结果集。\n\n## 清单 10-10.\
  \ 用于处理 REF 游标的 Java 程序 (11.2.0.1)\n\n```java\nimport java.sql.*;\nimport java.io.*;\n\
  import oracle.jdbc.driver.*;\nclass ProdConRefCursor\n{\npublic static void main\
  \ (String args [ ])\nthrows SQLException, ClassNotFoundException\n{\n   String query\
  \  = \"BEGIN \" + \"product_pkg.get_concepts( ?, ?); \" + \"end;\";\n   DriverManager.registerDriver\n\
  \        (new oracle.jdbc.driver.OracleDriver());\n   Connection conn =\n      \
  \ DriverManager.getConnection\n       (\"jdbc:oracle:thin:@proximo-dev:1521:mozartora112dev\"\
  , \"mktg\", \"mktg\");\n   Statement trace = conn.createStatement();\n   CallableStatement\
  \  cstmt = conn.prepareCall(query);\n   cstmt.setInt(1, 37);\n   cstmt.registerOutParameter(2\
  \ ,OracleTypes.CURSOR);\n   cstmt.execute();\n   ResultSet rset = (ResultSet)cstmt.getObject(2);\n\
  \   for(int i = 0;  rset.next(); i++ )\n        System.out.println( \"rset \" +\
  \ rset.getString(1) );\n   rset.close();\n}\n}\n```\n\n这是一个相当简单但直截了当的客户端接受 `REF`\
  \ 游标返回结果集的示例。其关键部分是以下代码片段：\n\n`cstmt.registerOutParameter(2 ,OracleTypes.CURSOR);`\n\
  `cstmt.execute();`\n`ResultSet rset = (ResultSet)cstmt.getObject(2);`\n\n您的返回类型是一个\
  \ `OracleTypes` 类型的游标。一旦收到游标，您就在客户端迭代每条记录，直到没有更多记录可供处理，如下所示：\n\n`for(int i = 0;\
  \  rset.next(); i++ )`\n`        System.out.println( \"rset \" + rset.getString(1)\
  \ );`\n\n最后，关闭 `REF` 游标是客户端的责任。它不能将 `REF` 游标传回给您的 PL/SQL 程序。因此，一旦它处理完 `REF` 游标返回的记录，只需使用以下语句关闭游标：\n\
  \n`rset.close();`\n\n"
- "# 关于解析的几点说明\n\n虽然这听起来可能有点题外话，但在为每种编程情况选择最适合的游标类型时，解析问题应始终是您优先考虑的重要事项。如前所述，`REF`\
  \ 游标（即使是静态类型）通常在每次打开时执行一次软解析（请参阅前面提到的关于设置 `session_cached_cursors` 值的注意事项）。尽管软解析无限优于硬解析，但它\
  \ `远` 比完全不解析要糟糕。编写任何类型的 SQL 或 PL/SQL 时，您的目标都是尽可能减少解析。那么，您可以做些什么来减少解析呢？\n\n如果您使用\
  \ PL/SQL 隐式游标或显式（非 `REF`）游标，并且没有对谓词使用字面值，那么您就是在使用绑定变量。这意味着，默认情况下，您已经开启了减少解析的机会，因为您减少了唯一\
  \ SQL 语句的数量。您的游标查询将在首次访问时解析，并保留在共享池中以供多次访问重用，直到它们被老化清除。这对应用程序的运行时性能和可扩展性是一个巨大的节省。您的游标查询不会被视作单个、新的游标而被反复解析、执行、关闭和重新打开（周而复始）。\n\
  \n除了在共享池中被缓存外，PL/SQL 本身也可以“缓存”这些查询。它会将这些查询以 `打开` 状态缓存。这意味着以后可以再次执行它们，甚至无需打开（解析）它们。因此，您不仅在共享池中拥有出色的共享\
  \ SQL，而且还会在会话中为每条 SQL 语句消除除一次解析调用之外的所有解析调用。这是使用非 `REF` 游标的最佳理由之一。PL/SQL 不会关闭它们，而是保持它们打开状态，从而完全避免了解析。\n\
  \n另一方面，`REF` 游标总是执行软解析。一方面，它们为您提供了极大的编码灵活性，特别是在需要将结果集传递回客户端时（许多数据库应用程序都需要这样做）。另一方面，这种灵活性是以可能降低可扩展性和过度软解析为代价的。而过度的软解析又可能带来门闩争用。因此，如果您无法编写静态隐式游标而必须编写\
  \ `REF` 游标，您可以做些什么来努力减轻不可避免的软解析所带来的影响呢？\n\n考虑为您的 `session_cached_cursors` 初始化文件参数设置一个合适的值。您的目标是减轻过度软解析的影响（门闩争用）。在系统范围内缓存游标通常是一件非常好的事情，因为它将减少过多门闩的影响，并帮助您的应用程序避免门闩争用。使用\
  \ `session_cached_cursors` 有助于让软解析变得更“软”。它使软解析 `更容易`，因此，当您的应用程序使用 `REF` 游标时，这是一个值得设置的好参数。当您在\
  \ PL/SQL 中隐式或显式关闭游标时，PL/SQL 并不会真正关闭游标。它会将游标以打开状态缓存。而 PL/SQL 缓存的大小由为 `session_cached_cursors`\
  \ 参数提供的值控制。\n\n在 PL/SQL 中使用非 `REF` 游标的静态 SQL 有助于减少解析，这要归功于 PL/SQL 游标缓存。当应用程序多次解析查询时，就会发生多次解析。这些解析可能是硬解析或软解析。例如，假设您有一个类似于以下内容的脚本：\n\
  \n`ALTER SESSION SET SQL_TRACE = true;`\n\n```sql\nBEGIN\n    FOR i IN 1 .. 2000\
  \ LOOP\n        FOR x IN ( SELECT /*+ 隐式游标查询在此 */ * FROM dual )\n        LOOP\n\
  \            NULL;\n        END LOOP;\n    END LOOP;\nEND;\n/\n```\n\n```sql\nDECLARE\n\
  \    TYPE rc_type IS REF CURSOR;\n    rc rc_type;\nBEGIN\n    FOR i IN 1 .. 2000\
  \ LOOP\n        OPEN rc FOR SELECT /*+ REF 游标查询在此 */ * FROM dual;\n        CLOSE\
  \ rc;\n    END LOOP;\nEND;\n/\n```\n\n生成的 TKPROF 输出揭示了以下内容：\n\n```\n********************************************************\n\
  \nSQL ID: dybuvv2j10gxt\nPlan Hash: 272002086\nSELECT /*+ implicit cursor query\
  \ goes here */ *\nFROM\n DUAL\n\ncall     count       cpu    elapsed       disk      query    current        rows\n\
  ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
  Parse        1      0.00       0.00          0          0          0           0\n\
  Execute   2000      0.01       0.02          0          0          0           0\n\
  Fetch     2000      0.03       0.04          2       6000          0        2000\n\
  ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
  total     4001      0.05       0.07          2       6000          0        2000\n\
  \nMisses in library cache during parse: 1\nOptimizer mode: ALL_ROWS\nParsing user\
  \ id: 84     (recursive depth: 1)\n\nRows     Row Source Operation\n-------  ---------------------------------------------------\n\
  \      1  TABLE ACCESS FULL DUAL (cr=3 pr=2 pw=0 time=0 us cost=2 size=2 card=1)\n\
  \n********************************************************\n```\n\n此 TKPROF 输出展示了该查询被解析了\
  \ 1 次，执行了 2000 次。PL/SQL 缓存了该游标。输出中的“Misses in library cache during parse”行也证明这是一次硬解析。它在共享池中未被找到。这里是另一个例子：\n\
  \n```\n********************************************************************************\n\
  \nSQL ID: gc72r5wh91y0k\nPlan Hash: 272002086\nSELECT /*+ REF cursor query goes\
  \ here */ *\nFROM\n DUAL\n\ncall     count       cpu    elapsed       disk      query    current        rows\n\
  ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
  Parse     2000      0.02       0.02          0          0          0           0\n\
  Execute   2000      0.02       0.02          0          0          0           0\n\
  Fetch        0      0.00       0.00          0          0          0           0\n\
  ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
  total     4000      0.04       0.05          0          0          0           0\n\
  \nMisses in library cache during parse: 1\nOptimizer mode: ALL_ROWS\nParsing user\
  \ id: 84     (recursive depth: 1)\n\nRows     Row Source Operation\n-------  ---------------------------------------------------\n\
  \      0  TABLE ACCESS FULL DUAL (cr=0 pr=0 pw=0 time=0 us cost=2 size=2 card=1)\n\
  \n********************************************************************************\n\
  ```\n\n这次 TKPROF 输出表明该查询被解析了 2000 次。它是使用 REF 游标打开的，而 PL/SQL 无法缓存此类游标。输出还表明有一次硬解析和（因此）1999\
  \ 次软解析。第二次解析是通过在共享池的库缓存中找到已存在的执行计划完成的。最佳情况下，你应该看到 `parse =1`，但看到 `parse = execute\
  \ = N` 也并不罕见。\n\n### 动态 REF 游标\n\n从所有实际用途来看，动态 REF 游标与静态 REF 游标非常相似，只有几个显著的区别。动态\
  \ REF 游标的查询直到运行时才知晓，并且也是动态构建的。你可能会问，这与静态 REF 游标有何不同，因为静态 REF 游标的查询同样直到运行时才知晓。强类型\
  \ REF 游标无法被动态打开。弱类型 REF 游标则可以被动态打开。\n\n#### 示例与最佳实践\n\n考虑清单 10-11 中概述的使用动态 REF 游标的过程示例：\n\
  \n`清单 10-11.` 使用动态 REF 游标的过程 (11.2.0.1)\n\n```\nPROCEDURE get_concepts (ip_input      IN  NUMBER,\n\
                          ip_con_type   IN  VARCHAR2,\n                        ip_con_dt     IN  DATE,\n\
                          ip_con_cat    IN  VARCHAR2,\n                        op_rc        OUT  my_cv)\n\
  IS\n    lv_query VARCHAR2 (512) DEFAULT 'SELECT * FROM prod_concepts';\n    BEGIN\n\
           IF ( ip_con_type IS NOT NULL )\n            lv_query := lv_query ||\n            '  WHERE\
  \ concept_type LIKE ''%''||:ip_con_type||''%'' ';\n         ELSE\n            lv_query\
  \ := lv_query ||\n            ' WHERE (1 = 1 OR :ip_con_type IS NULL) ';\n         END\
  \ IF;\n         IF ( ip_con_dt IS NOT NULL )\n            lv_query := lv_query ||\n\
              '  AND concept_dt < :ip_con_dt ';\n         ELSE\n            lv_query\
  \ := lv_query ||\n            ' AND (1 = 1 OR :ip_con_dt IS NULL) ';\n         END\
  \ IF;\n         IF ( ip_con_cat IS NOT NULL )\n            lv_query := lv_query\
  \ ||\n            '  AND concept_category LIKE ''%''||:ip_con_cat||''%'' ';\n         ELSE\n\
              lv_query := lv_query ||\n            ' AND (1 = 1 OR :ip_con_cat IS\
  \ NULL) ';\n         END IF;\n            OPEN op_rc FOR\n                lv_query\
  \ USING ip_con_type, ip_con_dt, ip_con_cat;\n\n    END get_concepts;\n```\n\n那么，这个版本的\
  \ `get_concepts` 过程与清单 10-9 中展示的那个有何不同？首先，与静态的 `OPEN-FOR` 版本不同，动态版本有一个*可选的* `USING`\
  \ 子句——之所以说*可选*，是因为也可以使用字面量（而非绑定变量）来编码此过程，类似于下面这样：\n\n```\n'SELECT * FROM prod_concepts\n\
    WHERE concept_type  = ''||COLLATERAL||''\n    AND concept_dt    < ''||TO_CHAR(''''01-JAN-2003''',\
  \ '''DD-MON-YYYY''')||''';'\n```\n\n显然，这似乎是构建查询的一种非理想且笨重的方式。这也会导致可怕的硬解析，因为所有查询都将是唯一的，这会*扼杀*性能。如果必须构建任何形式的动态查询，请先问明原因。在以下情况下你需要动态\
  \ SQL：\n\n*   你想执行一条 SQL 数据定义语句（如 `CREATE`）、数据控制语句（如 `GRANT`）或会话控制语句（如 `ALTER SESSION`）。在\
  \ PL/SQL 中，此类语句无法通过静态 SQL 执行。\n*   你希望获得更大的灵活性。例如，你可能希望等到运行时再选择使用哪些模式对象。或者，你可能希望程序为\
  \ `SELECT` 语句的 `WHERE` 子句构建不同的搜索条件，正如清单 10-11 中所做的那样。动态构建 `WHERE` 子句是使用动态 SQL 的一个非常常见的原因。更复杂的程序可能会从各种\
  \ SQL 操作、子句等中进行选择。\n\n如果你不需要执行上述任何操作，但确实需要 REF 游标，那么你应该使用静态 REF 游标。如果你*确实*需要使用上述任何功能，请确保使用绑定变量，如清单\
  \ 10-11 中的第一个示例所示。\n\n\n## 关于 REF 游标与 SQL 注入风险的讨论\n\n现在，由于你使用的是 REF 游标结构，它仍然会执行软解析。但至少，如果你使用了绑定变量，它就不会执行硬解析。因为游标*可能*不同，Oracle\
  \ RDBMS 认为它可能是不同的（因为它是动态的），所以总会进行某种解析。在你必须选择的所有游标类型中，这一个绝对应该是你的最后手段。动态 SQL 极其脆弱，难以编码、难以调优，也难以维护。代码依赖链不复存在，因此你只能*希望*数据结构的改变不会对你的代码产生不利影响。\n\
  \n但你在前一节已经了解到，REF 游标至少会执行软解析。除了动态 REF 游标带来的繁琐编码之外，避免使用它们的其他原因可能是什么？我能想到的避免动态 REF\
  \ 游标的最大原因是 SQL 注入的可能性。SQL 注入是对你的应用程序，更重要的，是你的数据的一个真实威胁。如果你的应用程序代码允许恶意用户将他们自己的 SQL\
  \ 语句附加到你动态构建的查询中，此类攻击会对你的数据安全构成危险威胁。\n\n### SQL 注入的威胁\n\n允许用户在不使用绑定变量的情况下将字符串连接到语句中的动态\
  \ SQL，不仅是一个解析、可扩展性和可维护性的噩梦；它还带来了一个非常切实的安全威胁。每次你允许某人提供来自你控制范围之外的输入时，你的数据就不再安全。更糟糕的是，恶意用户因为他们使用的是*你的*代码，所以是以*你*的身份执行他们的语句。你打开了大门，让你的数据变得脆弱。考虑清单\
  \ 10-12 中的例子，它概述了一个看似无害但易受 SQL 注入影响的存储过程。\n\n**清单 10-12.** 一个易受 SQL 注入影响的过程 (11.2.0.1)\n\
  \n```\nPROCEDURE get_concepts (ip_input      IN  NUMBER,\n                     \
  \   ip_con_type   IN  VARCHAR2,\n                        ip_con_dt     IN  DATE,\n\
  \                        ip_con_cat    IN  VARCHAR2,\n                        op_rc\
  \        OUT  my_cv)\nIS\n    BEGIN\n       IF ( ip_input = 1 )\n       THEN\n \
  \      OPEN op_rc FOR\n             'SELECT * FROM prod_concepts\n             \
  \  WHERE concept_type  = ''||ip_con_type||''\n                 AND concept_dt  \
  \  < ''||ip_con_dt||''' ;\n       ELSE\n          OPEN op_rc FOR\n             'SELECT\
  \ * FROM prod_concepts\n               WHERE  concept_category = ''||ip_con_cat||'''\
  \ ;\n       END IF;\n    END get_concepts;\n```\n\n如果有人希望做一些他们不应该做的事情，例如获取访问权限或进行破坏，那么这些看似无害的参数（显然用于输入产品概念数据）很容易被操纵，以至于最终生成的动态\
  \ SQL 查询最终看起来类似于以下内容：\n\n```\nCREATE OR REPLACE\n    PROCEDURE get_concepts (ip_input\
  \      IN  NUMBER,\n                            ip_con_type   IN  VARCHAR2,\n  \
  \                          ip_con_dt     IN  DATE,\n                           \
  \ ip_con_cat    IN  VARCHAR2,\n                            op_rc        OUT  sys_refcursor\
  \ )\n    IS\n        BEGIN\n           IF ( ip_input = 1 )\n          THEN\n   \
  \                DBMS_OUTPUT.PUT_LINE(\n                'SELECT * FROM prod_concepts\n\
  \                  WHERE concept_type  = ''' ||ip_con_type|| '''\nAND concept_dt\
  \    < ''' || to_char(ip_con_dt, 'dd-mon-yyyy' )\n ||'''' );\n          ELSE\n \
  \                  DBMS_OUTPUT.PUT_LINE(\n                'SELECT * FROM prod_concepts\n\
  \                  WHERE  concept_category = ''' || ip_con_cat||'''' );\n      \
  \    END IF;\n       END get_concepts;\n   /\nscott%ORA11GR2> variable x refcursor\n\
  scott%ORA11GR2> exec get_concepts( ip_input => 2, ip_con_type => null, ip_con_dt\
  \ => null,\n ip_con_cat => '''||admin_pkg.change_app_passwd( ''INJECTED'' ) --',\
  \ op_rc => :x );\nSELECT * FROM prod_concepts\n WHERE concept_category =\n''||admin_pkg.change_app_passwd(\
  \ 'INJECTED' ) --'\n\nPL/SQL procedure successfully completed.\n```\n\n这里发生了什么？在这个过程的调用中，用户提供的输入不关心匹配\
  \ `concept_type` 或 `concept_dt`，而是提供了他们实际要执行的 SQL：`admin_pkg.change_app_passwd('INJECTED');`。在该输入的末尾添加符号\
  \ `--`，表示 SQL 注释的开始。这是一个巧妙的方法来*消耗*应用程序提供的最终引号，而无需担心匹配它。\n\n正如你所看到的，动态 SQL 为恶意入侵者敞开了大门。任何时候你不使用绑定变量，你不仅阻碍了应用程序性能，还将你的数据置于严重风险之中。因此，既然动态\
  \ REF 游标（以及任何形式的动态 SQL）是脆弱的，容易出错且具有风险，你需要问问自己，使用 REF 游标编码应用程序所带来的额外灵活性是否值得承担安全风险和可维护性的麻烦。如果你别无选择只能使用\
  \ REF 游标，请记住以下几点：\n\n*   如果必须使用 REF 游标，请使用强类型静态 REF 游标。\n*   如果无法使用静态 REF 游标，那么请确保你的动态\
  \ REF 游标使用绑定变量。\n\n### 描述 REF 游标的列\n\n在过去的 Oracle 版本中，描述 REF 游标的列是不可能的。如果你想拥有这个功能，必须使用数据库外部的客户端工具。这种情况从\
  \ Oracle 11.1 及更高版本开始发生了变化。从 Oracle 11.1 开始，`DBMS_SQL`（一个提供的包，允许你像 JDBC 一样以程序化方式处理结果集）与\
  \ REF 游标功能协同工作，使你能够在打开 REF 游标后以编程方式描述你的列。这种功能是可能的，因为 Oracle 11g 允许将 REF 游标转换为 `DBMS_SQL`，反之亦然。考虑清单\
  \ 10-13 中的例子。\n\n**清单 10-13.** 使用 `DBMS_SQL` 描述列的 REF 游标 (11.2.0.1)\n\n```\nDECLARE\n\
  \            lv_ref_cursor   SYS_REFCURSOR;\n            lv_col_cnt      NUMBER;\n\
  \            lv_desc_tab     DBMS_SQL.DESC_TAB;\nBEGIN\n            OPEN lv_rcursor\
  \ FOR SELECT * FROM prod_concepts;\n\n            DBMS_SQL.DESCRIBE_COLUMNS\n  \
  \          ( cur_id      => DBMS_SQL.TO_CURSOR_NUMBER(lv_ref_cursor),\n        \
  \      col_cnt     => lv_col_cnt,\n              desc_tab    => lv_desc_tab );\n\
  \n           FOR i IN 1 .. lv_col_cnt\n           LOOP\n                   DBMS_OUTPUT.PUT_LINE(\
  \ lv_desc_tab(i).col_name );\n           END LOOP;\nEND;\n/\n```\n\n这个例子的关键部分是以下代码片段：\n\
  \n```\ncur_id      => DBMS_SQL.TO_CURSOR_NUMBER(lv_ref_cursor)\n```\n\n函数 `TO_CURSOR_NUMBER`\
  \ 可以将任何 REF 游标（无论是强类型还是弱类型）转换为一个 SQL 游标号，然后可以将其传递给任何 `DBMS_SQL` 子程序。你可以在 REF 游标处理中利用\
  \ `DBMS_SQL` 的能力，为你的程序提供更大的灵活性。但请注意，一旦将 REF 游标转换为 `DBMS_SQL` 游标号，就不能再使用原生动态 SQL\
  \ 操作来访问它。你可以使用 `DBMS_SQL.TO_REFCURSOR` 函数将游标号切换回 REF 游标，但请注意，这个最新版本的 REF 游标将是弱类型的，即使它最初是强类型的。因此，与任何其他\
  \ PL/SQL 游标功能一样，在充分了解其副作用以及好处的前提下使用此功能。\n\n\n### 总结\n\n为应用需求选择合适的游标类型可能决定应用的成败。如果有机会使用静态\
  \ SQL，请务必使用，不要犹豫。在隐式游标和显式游标之间选择时，尽可能优先使用隐式游标。你的性能将得到提升，可扩展性将变得可衡量，你的用户也会表示赞赏。然而，如果你在执行需要同时以过程方式处理数据的批量处理，或者将结果集传递给客户端应用，那么你将别无选择，只能使用显式游标。\n\
  \n当需要选择`REF`游标（你的应用已确定不可避免）时，看看是否可以通过使用强类型的`REF`游标来实现目标。创建编译器可知的代码应是你的首要目标之一。请记住，动态代码本质上是脆弱且容易出错的。但如果你必须使用动态`REF`游标，请确保你使用了绑定变量——不仅仅是为了运行时的性能提升，也是为了安心于安全。SQL\
  \ 注入正伺机攻击任何掉以轻心的应用。\n\n作为开发者的职责，是为正确的工作使用正确的工具。所有这些游标类型都有其适用的特定场景。确保你对其风险和缺陷以及好处有充分的理解。你的游标选择应以最大化性能、减少担忧、并在应用用户群中提升你的受欢迎度的方式做出。所以，尝试用不同的方法实践。权衡一种方法与另一种方法。牢记优先顺序，并且当你不得不使用隐式游标之外的东西时，要明智而审慎地使用。\n\
  \n## 第 11 章\n\n## 大型 PL/SQL 编程\n\n**作者：Martin Büchi**\n\n大多数业务应用都是数据密集型的，因此其核心需要一个数据库。这些应用通常会使用数年甚至数十年。在此期间，用户界面有时会被完全替换或扩展以保持其先进性。而数据模型和业务逻辑，通常随着所支持的业务流程更稳定地演进。许多这类应用最终会变得庞大，无论它们是从小处起步（例如用\
  \ APEX 替代电子表格）还是从一开始就复杂。因此，我们需要一种适合开发和维护面向数据的业务逻辑、并能持续多年的架构和编程语言。Oracle 数据库中的`PL/SQL`理想地契合了这些需求。\n\
  \n`PL/SQL`中的业务逻辑可能导致大量的`PL/SQL`代码；例如，我公司的旗舰应用有 1100 万行代码，并由 170 名开发人员维护。这才是真正的大型编程。在任何语言中进行有效且高效的大型编程都需要良好的模块化和基于严格遵循编程规范的高度一致性。`PL/SQL`为实现和强制这些方面提供了坚实的基础。此外，它还支持面向对象编程，这显著提高了代码重用率，从而带来成本降低和质量提升。\n\
  \n本章首先描述在何时以及为何使用`PL/SQL`编写业务逻辑是一个好的选择，然后解释掌握大型`PL/SQL`编程关键成功因素的方法。\n\n### 作为基于`PL/SQL`的应用服务器的数据库\n\
  \n软件架构和编程语言必须选择以最好地满足业务需求。因此，用`PL/SQL`编码业务逻辑最有说服力的论据是基于此架构的长期成功的应用。Avaloq 银行业务系统就是这样一个应用，并作为案例研究。从这个案例研究中，我推导出这种架构的优势。因为没有一种架构是普遍适用的，了解其局限性也很重要。\n\
  \n#### 案例研究：Avaloq 银行业务系统\n\nAvaloq 银行业务系统（ABS）是一个完整的核⼼银行业系统，具备支付、投资和融资功能。它提供最终用户图形界面（GUI）以及对消息和文件的批处理。超过\
  \ 65 家银行，每家有 20 到 5000 个并发最终用户，在七个国家使用它。实时联机事务处理（OLTP）和报告都在同一个数据库中实现。\n\nABS 采用物理三层架构，如图\
  \ 11-1 所示。用`.NET`实现的瘦富客户端提供了高效的用户交互和最佳的`Windows`集成。中间层负责电话集成、外部认证以及`Oracle Net`与`Windows\
  \ Communication Foundation`之间的协议转换，这样桌面上就不需要`Oracle`客户端，防火墙可以禁止来自最终用户`PC`的直接`SQL`访问，并且客户端网络中的网络加密是免费可用的。客户端和中间层都不包含任何业务逻辑；事实上，它们可以不经修改地用于任意的`ERP`应用。\n\
  \n业务逻辑驻留在后端——即`Oracle`数据库中。数据库充当基于`PL/SQL`的应用服务器，并基于具有数据访问层、业务逻辑层和表示层的逻辑三层架构。相同的`PL/SQL`业务逻辑代码在批处理和图形界面会话中执行。例如，无论是从文件读入系统还是由职员在图形界面上输入，支付交易都以相同的方式处理。\n\
  \n在 Avaloq 银行业务系统中，图形界面会话的状态存储在`PL/SQL`包体全局变量中。每个字段值都被发送到服务器进行验证和派生字段的计算。业务事务在`PL/SQL`内存中构建，并在用户最终确定后持久化。会话状态的最佳存储位置（数据库表、数据库服务器内存、中间层或客户端）是一个常引发激烈争论的话题。因为即使会话状态不保存在数据库中，大部分业务逻辑也可以用`PL/SQL`实现，所以无论你的应用将会话状态存储在哪里，本章内容都具有相关性。\n\
  \n![images](img/1101.jpg)\n\n**图 11-1.** Avaloq 银行业务系统技术架构\n\nAvaloq 银行业务系统的开发始于\
  \ 1993 年，使用`Oracle 7`。将业务逻辑放在`Oracle`数据库中的基本架构自那时起一直保持不变。最初的图形界面是用`HyperCard`编写的；此后它被`Java\
  \ AWT`、`Java Swing`和基于`.NET`的实现替换过三次，并且未来很可能成为`Web`图形界面。\n\nAvaloq 是一家希望利润最大化的商业公司。我们选择所描述的架构是为了最大化客户满意度和开发者生产力，并定期对其进行重新评估。诚然，在\
  \ 1993 年 Avaloq 银行业务系统开发开始时，还没有商业应用服务器。然而，我们保留当前的架构是因为它运行良好，而不是因为迁移到应用服务器的成本会非常高昂。事实上，我们在\
  \ 2006 年，由一位具有`JEE`背景和`Java`认证的工程师设计数据库供应和持续集成系统时，选择了类似的架构。我们有时需要解释架构选择的原因，但在过去的\
  \ 17 年里，我们从未因架构问题而丢失一单销售。\n\n许多其他`ERP`和银行业应用，包括`IFS Applications`、`Oracle E-Business\
  \ Suite`和`Oracle Fusion Applications`，都包含数百万行`PL/SQL`代码。`Oracle`对`PL/SQL`的坚定承诺体现在其用`PL/SQL`实现`Application\
  \ Express (APEX)`上，以及对`PL/SQL`的持续增强，例如在 11gR2 中引入的基于版本的重定义。\n\n#### 业务逻辑置于数据库中的优势\n\
  \nAvaloq 从将业务逻辑编码于数据库中获得了以下优势：\n*   **简单性**：大多数开发人员只需为单一层次使用一种语言进行编码。他们可以编写完整的业务功能，而无需花费时间与其他层次的开发人员协调和等待他们完成工作。此外，并发模型使得开发与其他程序并行运行的程序变得容易。\n\
  *   **性能**：包括批量操作在内的数据访问在数据库内部直接执行是最快的。这与 Exadata 的基本思想相同：让处理更接近数据，并仅在网络上发送最少的数据。对于批处理（这是大多数\
  \ OLTP 银行业务活动），所有处理都可以在数据库中完成。\n*   **安全性**：定义者权限（definer rights）存储过程更容易确保未经授权的人员无法从数据库外部访问关键信息。所有数据都可以驻留在锁定的模式中，外部访问可以限制到少数几个包。不需要授予直接的表或视图访问权限。如果业务逻辑位于数据库外部，那么（至少在一段时间后）会有多个应用程序直接访问数据库。这使得难以强制执行一致的安全性。存储在应用服务器中的密码很容易被滥用来直接访问数据。此外，服务器中的会话状态可以防止欺骗攻击。\n\
  *   **一致性**：我信任 Oracle 的读一致性。如果我必须在繁重的 OLTP 活动的同时基于中间层缓存显示实时的客户投资组合，我会睡不安稳。\n* \
  \  **来自任何环境的可用性**：许多应用程序需要与其他应用程序交互。存储过程可以通过`JDBC`、`OCI`、`ODBC`等从任何语言调用。当然，这对于 Web\
  \ 服务也是如此。\n*   **参与分布式事务**：分布式事务对于业务系统中的接口至关重要，以确保只执行一次。Oracle 作为事务参与者的分布式事务设置简单，并且得到大多数事务协调器的支持。另一方面，在连接到多供应商环境中数据库的\
  \ Web 服务或`CORBA`中间层上，为任意接口设置分布式事务是一场噩梦。\n*   **集中的单层部署**：大多数增强功能和错误修复只需要在单个层次上进行更改，即使需要修改表和业务逻辑。\n\
  *   **可扩展性**：得益于日益强大的服务器和通过`Real Application Cluster`实现的水平扩展，Oracle 数据库在单机箱内扩展良好，并可横向扩展。\n\
  *   **稳定性和可靠性**：Oracle 数据库是一个异常稳定可靠的执行环境。\n\n三层架构的大部分优势源于数据访问、业务逻辑和呈现的逻辑分离而非物理分离。这种逻辑分离以及由此带来的好处，也可以通过数据库内部的模块化来实现，如下所述。\n\
  \n存储过程可以用`PL/SQL`、`Java`、`.NET`或几乎任何语言作为外部过程来编码。`PL/SQL`是我的默认选择。\n\n##### PL/SQL\
  \ 存储过程\n\n`PL/SQL`是一种命令式`3GL`语言，专为无缝处理`SQL`而设计，为编写业务逻辑提供了额外的好处。图 11-2 展示了其部分关键优势。\n\
  \n![images](img/1102.jpg)\n\n`图 11-2. PL/SQL 的部分关键优势`\n\n此外，基于版本的重定义（edition-based\
  \ redefinition）为`PL/SQL`代码与其他对象类型的在线应用升级提供了支持。`PL/SQL`也在`TimesTen`内存数据库中运行，从而将相同的优势带到缓存在内存中的数据，以实现更高的性能。\n\
  \n##### Java 存储过程\n\nJava 存储过程不像`PL/SQL`那样提供无缝的`SQL`集成。事实上，Java 没有`图 11-2`中列出的任何优势。此外，从\
  \ Oracle 11gR2 开始，从 Java 存储过程内部调用`SQL`的性能明显低于从`PL/SQL`或数据库外部运行的 Java。考虑到从数据库外部使用`JDBC`的性能非常出色，这种情况很可能会改善。另一方面，使用\
  \ 11g 即时编译器的算法性能优于`PL/SQL`，并且几乎与数据库外部的 Java 相当。\n\n如果某些功能在`PL/SQL`中无法实现（例如 Oracle\
  \ 10g 之前的`OS`调用），或者现有 Java 库能极大简化工作，Avaloq 会使用 Java。例如，Avaloq 安装程序使用 Java 检查`ZIP`文件的签名，数据库供应系统使用\
  \ Java 通过`JDBC`在数据库之间传输`LOB`——而不是使用仅在`DDL`中支持`LOB`而不支持`DML`的`PL/SQL`通过数据库链接传输。许多库的可用性绝对是\
  \ Java 生态系统的优势。然而，这一事实经常被高估。对于业务应用程序，通常只有基础设施库有用，而且即使这些库也可能不够。例如，没有一个 Java 日志框架支持每条目安全、将同一问题的日志调用分组到单个条目中，或在条目上进行工作流处理。此外，新库的不断出现可能导致“强迫性最新框架采用障碍”（Compulsive\
  \ Latest Framework Adoption Disorder），其典型表现是在一个产品中使用许多相似的库，因为对大型产品进行完整重构的努力是巨大的。最后但并非最不重要的一点是，`PL/SQL`也附带了大量的库：`PL/SQL\
  \ Packages and Types Reference`在 11gR2 中已增长到 5,900 页。\n\nJava 的一个好处是相同的代码，例如数据验证，可以在数据库和另一个层次中运行。后者的另一种选择是从领域特定语言生成`PL/SQL`和另一种语言的代码。在\
  \ Avaloq 银行系统中，超过一半的`PL/SQL`代码是从更高层次的领域特定语言生成的。\n\n虽然 Oracle 允许开发人员在基于子程序（过程或函数）的基础上决定使用`PL/SQL`或`Java`作为实现语言，但我尽量避免难以维护的混乱混合。\n\
  \n`Java stored procedure`（Java 存储过程）实际上是一个用词不当的术语。Oracle 数据库包含一个完整的 Java 虚拟机（`JVM`）。因此，可以用数十种能够生成\
  \ Java 字节码的编译器的语言来编写存储过程。然而，从使用`AspectJ`的面向切面编程到使用`Scala`的函数式编程，没有一种语言具备无缝的`SQL`嵌入。\n\
  \n`SQLJ`是 Java 的基于预处理器的扩展，为更简单的`SQL`集成和自动绑定变量添加了语法糖。然而，它缺乏对嵌入式`SQL`的编译时检查以及对引用对象修改后自动失效的依赖项跟踪。自动失效将需要对`JVM`进行增强，无法通过语言扩展的方式添加。\n\
  \n`SQLJ`的支持情况参差不齐。很少有`IDE`支持`SQLJ`。Oracle 自己在原始的 10g 版本中停止了对`SQLJ`的支持。在客户投诉之后，`SQLJ`在\
  \ 10.1.0.4 补丁集中重新出现。\n\n##### .NET 和基于 C 的外部过程\n\n外部过程（在 Oracle 文档中也互换地称为子程序）是具有`PL/SQL`调用规范并在另一种语言中实现的子程序。通过在`.NET`中编码存储过程，您将自己限制在\
  \ Windows 上运行 Oracle 数据库。用 C 或其他可从 C 调用的语言编写的外部过程会阻碍可移植性。此外，它们在自己的进程中运行。因此，基于 C\
  \ 的外部过程与在中间层中的业务逻辑相比没有显著优势，除了它们可以通过数据库调用。\n\n#### 作为基于 PL/SQL 的应用服务器的数据库的局限性\n\n\
  如果你只有一把锤子，那么所有问题看起来都像钉子。而作为软件工程师，另一方面，你应该意识到架构蓝图的适用范围限制。所描述的数据库解决方案中使用`PL/SQL`的业务逻辑，非常适用于以数据为中心的`ERP`应用程序。然而，它不太适用于计算密集且数据交互需求少的应用程序。\n\
  \n此外，对于以下任务，`PL/SQL`并非我的首选：\n\n*   `CPU`密集型任务：`PL/SQL`的算法性能低于`C`和`Java`。此外，`Oracle`许可证费用也适用于`PL/SQL`。商业应用服务器中的`Java`会产生类似的许可证费用，而运行`C`或独立的`Java`程序则不需要运行时许可证。在`Avaloq\
  \ Banking System`中，`CPU`使用率中不到 50%是`PL/SQL`；其余的是`SQL`。\n*   使用内存中非常大的集合的程序：`PL/SQL`集合可能比其`C`语言对应物需要显著更多的内存。我将在本章后面深入探讨内存使用问题。\n\
  *   非常复杂的数据结构：`PL/SQL`集合和记录对于大多数任务来说已经足够。然而，其他语言（具有泛型类型、内存引用和自动垃圾回收的语言）可以更轻松地表达这些结构。\n\
  \n![images](img/square.jpg) 注意：供应商无关性有时被引用为反对专有存储过程语言的理由。这个论点是无效的，因为大多数应用程序从未被移植到其他数据库，而且在不同数据库上实现良好性能和正确的并发处理需要多个特定的实现，而不是一个通用的实现。Tom\
  \ Kyte 在*Expert Oracle Database Architectures* (Apress, 2005)一书中详细论证了这一点。我完全支持他在这本书中关于这个主题的每句话（而且我的薪水不是来自`Oracle`）。如果你不喜欢某个特定的数据库供应商，那是另一回事。但你应该充分利用你选择的数据库。\n\
  \n#### 软性因素\n\n尽管`Java`可能比`PL/SQL`更有吸引力，但我发现，招聘`PL/SQL`程序员并不比招聘`Java`程序员更难（而且不幸的是，也不更容易）。学习曲线没有太大不同。`PL/SQL`很容易学习。大的挑战，尤其是对新毕业生来说，在于理解业务需求、学习大规模编程、掌握特定于应用程序的框架和模式，以及编写高效的`SQL`。\n\
  \n如果业务逻辑是用`Java`编写的，`SQL`也是一个问题。当然，简单的`SQL`语句可以由对象关系映射器生成。但是，遵循一些简单模式的`SQL`语句在`PL/SQL`中也不是问题——问题在于那些必须手动编码以获得最佳性能的复杂语句。\n\
  \n对于一个拥有数百万行应用程序的公司来说，让新员工轻松上手是成功的大规模编程的主要要求之一。\n\n### 大规模编程的要求\n\n既然已经确立了在数据库中处理业务逻辑的理由，让我们看看如何最好地掌握你将要编写的所有`PL/SQL`。大规模编程可能涉及由更庞大的人群进行编程，或者由较小的群体在更长的时间段内进行编程。通常，维护软件解决方案的人员会发生变化。一个典型的例子是，`Oracle\
  \ 6`中`PL/SQL`的创建者现在没有一个人还在`PL/SQL`小组工作。因为软件生命周期成本的三分之二以上通常用于维护，所以维护效率是一个关键要求。\n\n\
  大规模编程需要一种方法，能够在软件的初始创建和未来维护期间，及时、在预算内、并以外部产品质量交付给用户。忽略与架构和编程语言在很大程度上独立的过程方面，你需要高水平的内部产品质量来实现外部目标。内部产品质量的主要因素是简单性、易于理解性、可扩展性和可重用性。业务逻辑位于数据库中的架构是实现简单性的基石。其他目标则通过命名和编码约定、模块化和面向对象编程来实现。这些方面的实现方式因编程语言而异。在本章中，我将解释如何在`PL/SQL`中实现这些方面。由于篇幅限制，我将省略大规模编程的其他相关方面，例如工具，以及通常与之相关的处理海量数据的方法，例如信息生命周期管理以及为性能和可扩展性而进行的设计。\n\
  \n成功的大规模编程需要成功的小规模编程。如果别人五年前编写的代码崩溃了，如果他遵循了适当的异常处理和错误日志记录实践（为了简洁，我在本章中省略了这些内容），你会感到庆幸。同样，如果你修改的代码包含单元测试或以断言形式存在的契约，你也会很高兴，这样你就知道在更改子程序以修复\
  \ bug 时，不太可能破坏其 200 个调用者中的任何一个。任何类型的编程都需要逻辑思维和一丝不苟的严谨性。\n\n\n### 通过约定实现统一性\n\n统一性是大型编程所必需的，因为它能让开发者快速且彻底地理解彼此的代码。例如，如果每张表的主键列都称为\
  \ `id`，且所有对它的引用格式都是 `<table>_id`，那么任何人看到 `foo_id` 就能立即明白它引用的是 `foo.id`。统一性也确保开发者不会频繁地重新格式化他人的代码，从而避免浪费时间、引入回归问题，以及在代码差异中难以区分语义变更和格式变更。\n\
  \n统一性可以通过约定来实现。在大多数情况下，没有哪种约定天生优于其他约定；它们的唯一价值在于为统一性提供基础。例如，靠右行驶和靠左行驶同样合理，选择是任意的。但每个国家都必须采用其中一种约定以避免混乱。同理，使用尾逗号还是首逗号来分隔参数并无优劣之分，但在同一个程序中混合使用两者会损害可读性。\n\
  \n不幸的是，对于 PL/SQL，并没有像 Java 那样标准的命名和格式约定。第 14 章 提供了一套编码约定，Steven Feuerstein 在 `http://bit.ly/8WPRiy`\
  \ 提供了三套 PL/SQL 编码约定。无论你采用前述约定之一还是自创一套，这都不重要，只要你的组织内每个人遵循同一套约定即可。\n\n有三种方法可以保证对约定的遵守。最佳方法是使用一个\
  \ IDE，在你键入时或选择自动格式化时自动建立约定。任何无法通过此方式处理的情况都必须强制执行——理想情况下，通过自动化工具而非依赖人工审查。保证遵守的最后一个选项是希望，这在小项目中可能有效，但在大型编程中则行不通。\n\
  \n有时大型应用程序包含因历史原因遵循不同约定的源代码。在这种情况下，你必须决定是否值得努力使所有源代码符合一个标准；或者你是否希望为应用程序不同且清晰分隔的部分保留多个标准；或者所有新源代码是否都应遵循单一标准。无论如何，每个源代码文件必须始终遵循单一约定。如果选择的方法是过渡到单一约定，则必须一次性调整完整的源文件。为符合不同约定而进行的语法调整，不能与语义更改（如错误修复）混在同一个代码库提交中。否则，代码审计将变得非常困难。\n\
  \n约定背后的原理可能会因为 Oracle 新版本发布或其他变更而过时。例如，在 Oracle 10g 之前，PL/SQL 编译器接受包规范和包体中输入参数的不同默认值，并且只使用包规范中提供的值。为了避免错误的假设，Avaloq\
  \ 约定是在包体中不为导出的子程序指定任何默认值。从 10g 开始，编译器会检查如果规范和体中都列出了默认值，它们是否相同。因此，你可以无风险地复制默认值，这样开发者在处理包体时就不需要打开包规范了。这个故事的寓意是，你应该定期检查每个约定背后的原理，特别是当该约定也有缺点时。\n\
  \n对于约定规范的大多数方面，约定具体怎么规定并不重要，因为约定的唯一好处就是由此产生的统一性。然而，对于某些方面，有充分的理由选择一种方式而非另一种。例如，如果你的\
  \ IDE 只支持首逗号自动格式化，那么你的约定规定使用尾逗号就毫无意义。我在此列出一些 PL/SQL 特有的选定方面，这些方面有强有力的理由遵循特定实践。\n\
  \n#### 缩写词\n\nSQL 和 PL/SQL 中的标识符长度只能为 30 字节。要使一个描述性名称符合这些要求，你需要省略不必要的词（例如 “get”）并对长词进行缩写。你可以通过维护一个缩写词列表并对照该列表检查所有名称来实现缩写的一致性。你还必须在该列表中添加那些你特别选择永不缩写的词。你甚至可以添加一个同义词列表，在新增条目时进行检查，以避免同一概念出现多个条目。\n\
  \n为了检查缩写使用的 Consistency，所有标识符必须拆分成组成部分，并对照缩写词注册表进行检查。要检查的标识符可以在 Oracle 数据字典中找到，例如在\
  \ `user_objects` 和 `user_tab_columns` 等视图中。从 Oracle 11g 开始，如果单元是使用 `plscope_settings=\"\
  identifiers:all\"` 编译的，那么 PL/SQL 程序中使用的所有标识符都存储在 `user_identifiers` 中。你可能希望在系统级别启用这个名为\
  \ PL/Scope 的新功能，通过执行 `SQL> alter system set plscope_settings=\"identifiers:all\"\
  ;` 并重新编译所有用户 PL/SQL 单元。视图 `user_plsql_object_settings` 显示哪些对象对此设置生效。\n\n因为小写和混合大小写的标识符在\
  \ SQL 和 PL/SQL 中需要用双引号括起来，所以通常不使用。相反，标识符部分通常用下划线分隔。\n\n以下代码清单显示了一个简化版的缩写词检查器。表 `abbr_reg`\
  \ 保存已注册的缩写词。包 `abbr_reg#` 提供了一个过程 `ins_abbr` 用于插入新缩写词，以及 `chk_abbr` 用于检查标识符部分是否只使用了已注册的缩写词。你可以通过调用如\
  \ `abbr_reg#.ins_abbr('abbr', 'abbreviation')` 来填充注册表，并使用 `abbr_reg#.chk_abbr` 检查一致性使用。\n\
  \n```sql\ncreate table abbr_reg(\n  abbr                    varchar2(30)  primary\
  \ key  -- Abbreviation, e.g., ABBR\n ,text                    varchar2(100) not\
  \ null     -- Abbreviated text, e.g., ABBREVIATION\n ,descn                   varchar2(400)\
  \              -- Description, explain concept\n) organization index;\n\ncreate\
  \ unique index abbr_reg#u#1 on abbr_reg(text);\n\ncreate or replace package abbr_reg#\n\
  is\n  ------------------------------------------------------------------------------\n\
  \  -- Registry of abbreviations for SQL and PL/SQL identifier parts, such as\n \
  \ -- ABBR for ABBREVIATION and REG for REGISTRY. All identifiers must be made up\n\
  \  -- of registered abbreviations separated by underscores, e.g. abbr_reg.\n  --\
  \ Contains also terms not to be abbreviated.\n  ------------------------------------------------------------------------------\n\
  \n  ------------------------------------------------------------------------------\n\
  \  -- Insert an abbreviation into the registry.\n  ------------------------------------------------------------------------------\n\
  \  procedure ins_abbr(\n    i_abbr                    varchar2\n   ,i_text     \
  \               varchar2\n   ,i_descn                   varchar2 := null\n  );\n\
  \n  ------------------------------------------------------------------------------\n\
  \  -- Check whether only registered abbreviations are used as identifier parts.\n\
  \  ------------------------------------------------------------------------------\n\
  \  procedure chk_abbr;\nend abbr_reg#;\n\ncreate or replace package body abbr_reg#\n\
  is\n  procedure ins_abbr(\n    i_abbr                    varchar2\n   ,i_text  \
  \                  varchar2\n   ,i_descn                   varchar2\n  )\n  is\n\
  \  begin\n    insert into abbr_reg(abbr, text, descn)\n    values(upper(trim(i_abbr)),\
  \ upper(trim(i_text)), i_descn);\n  end ins_abbr;\n```\n\n\n\n"
- "# PL/SQL 标识符命名规范与作用域捕获\n\n## chk_ident 过程\n\n```plsql\n------------------------------------------------------------------------------\n\
  procedure chk_ident(\n  i_ident          varchar2\n ,i_loc            varchar2\n\
  )\nis\n  l_start_pos      pls_integer := 1;\n  l_end_pos        pls_integer := 1;\n\
  \  l_abbr_cnt       pls_integer;\n  l_part           varchar2(30);\n  c_ident_len\
  \ constant pls_integer := length(i_ident);\nbegin\n  while l_start_pos < c_ident_len\
  \ loop\n    -- 确定下一个部分 --\n    while     l_end_pos <= c_ident_len\n          and\
  \ substr(i_ident, l_end_pos, 1) not in ('_', '#', '$')\n    loop\n      l_end_pos\
  \ := l_end_pos + 1;\n    end loop;\n    l_part := upper(substr(i_ident, l_start_pos,\
  \ l_end_pos - l_start_pos));\n\n    -- 检查该部分是否为已注册的缩写 --\n    select count(*)\n\
  \    into   l_abbr_cnt\n    from   abbr_reg\n    where  abbr = l_part;\n\n    if\
  \ l_abbr_cnt = 0 then\n      dbms_output.put_line('标识符 ' || i_ident || ' 中存在未注册的部分\
  \ ' || l_part\n                           || '，位置：' || i_loc || '。');\n    end if;\n\
  \n    -- 初始化下一次循环的变量 --\n    l_end_pos := l_end_pos + 1;\n    l_start_pos := l_end_pos;\n\
  \  end loop;\nend chk_ident;\n\n------------------------------------------------------------------------------\n\
  procedure chk_abbr\nis\nbegin\n  -- 使用 PL/Scope 的 PL/SQL --\n  for c in (\n    select\
  \ name\n          ,object_type\n          ,object_name\n          ,line\n    from\
  \   user_identifiers\n    where  usage = 'DECLARATION'\n    order by object_name,\
  \ object_type, line\n  ) loop\n    chk_ident(\n      i_ident => c.name\n     ,i_loc\
  \   => c.object_type || ' ' || c.object_name || '，行 ' || c.line\n    );\n  end loop;\n\
  \  -- 其他项目：USER_OBJECTS, USER_TAB_COLUMNS 等 --\n  -- ...\nend chk_abbr;\n\nend abbr_reg#;\n\
  ```\n\n由于构建这个检查器只需要大约一百行 PL/SQL 代码，因此没有理由不去构建一个。PL/Scope 使得这个过程比尝试从 `user_source`\
  \ 或你的源代码存储库中解析源代码要容易得多。\n\n![images](img/square.jpg) **注意** Oracle 在数据字典中对缩写的使用并不一致。例如，“index”这个术语在视图\
  \ `user_indexes` 和 `user_ind_columns` 以及 `user_policies` 的列 `idx` 中被完整拼写了一次，却被以两种不同的方式缩写。Oracle\
  \ 不修复这个问题大概是因为公共 API 的向后一致性比缩写的一致性更重要。\n\n### PL/SQL 标识符的前后缀\n\n许多 PL/SQL 开发人员会给标识符添加前缀，以指示其作用域或类型。例如，局部变量以\
  \ `l_` 为前缀，常量以 `c_` 为前缀，输入参数以 `i_` 为前缀，类型以 `t_` 为前缀。为每个 PL/SQL 标识符添加前缀或后缀有两个很好的理由。两者都与避免作用域捕获有关。\n\
  \nPL/SQL 会自动将静态 SQL 语句中的 PL/SQL 变量转换为绑定变量。考虑以下函数，它应该从 Oracle 的 `demobld.sql` 脚本创建的\
  \ SCOTT 模式的 `emp` 表中返回指定员工编号的员工姓名。在这个例子中，我没有对参数 `empno` 和局部变量 `ename` 使用任何前缀。\n\n\
  ```plsql\ncreate or replace function emp#ename(empno emp.empno%type)\nreturn emp.ename%type\n\
  is\n  ename            emp.ename%type;\nbegin\n  select ename\n  into   ename\n\
  \  from   emp\n  where  empno = empno;\n\n  return ename;\nend emp#ename;\n```\n\
  \n这个函数并没有实现我想要的功能。`where` 子句中 `empno` 的两个出现都指的是表列 `empno`，而不是输入参数，因为每个标识符都被解析为最局部的声明。在这种情况下，最局部的作用域是包含表\
  \ `emp` 的 SQL 语句。因此，`where` 条件等价于 `emp.empno = emp.empno`，这与 `emp.empno is not null`\
  \ 相同。除非表 `emp` 中恰好有一条记录，否则该函数将抛出一个异常。\n\n```sql\nSQL> truncate table emp;\n表已截断。\n\
  SQL> insert into emp(empno, ename) values (7369, 'SMITH');\n已创建 1 行。\n```\n\n当表中只有一行时，该函数会返回该行的姓名，而不管实际的参数如何。我请求\
  \ `empno` 为 21 的员工姓名，却得到了 `empno` 为 7369 的员工的姓名。\n\n```sql\nSQL> select emp#ename(21)\
  \ from dual;\nEMP#ENAME(21)\n-----------------------------------------------------------------\n\
  SMITH\n已选择 1 行。\n```\n\n当表中有两行或更多行时，该函数总是返回 ORA-01422 错误。\n\n```sql\nSQL> insert\
  \ into emp(empno, ename) values (7499, 'ALLEN');\n已创建 1 行。\nSQL> select emp#ename(7369)\
  \ from dual;\nselect emp#ename(7369) from dual\n       *\n第 1 行出现错误:\nORA-01422:\
  \ 实际提取的行数超出请求的行数\nORA-06512: 在 \"K.EMP#ENAME\", 第 5 行\n```\n\n你可以通过为输入参数 `empno`\
  \ 添加前缀或后缀（例如 `i_empno`）来避免作用域捕获。让我们将此规则推广为：每个 PL/SQL 标识符都应该有一个在列名中未使用的前缀或后缀。前缀或后缀的最小长度是两个字节——即一个字母和一个作为分隔符的下划线。你可以使用这个前缀来传达额外的语义，例如变量的作用域或参数的模式，而无需浪费宝贵的三十字节限制中的另一个字节。\n\
  \n另一种替代前缀的方法是，在 SQL 语句中用声明块的名字来限定所有 PL/SQL 变量，例如 `empno = emp#ename.empno`。这种方法的优点是，当表中添加了列时，它可以防止不必要的失效，因为编译器知道不会发生作用域捕获。Bryn\
  \ Llewellyn 在 `http://bit.ly/dSMfto` 中描述了 Oracle 11g 细粒度依赖跟踪的这个方面。我不使用这种方法，因为基于版本的重定义是防止在线升级期间失效的更好解决方案，而且我觉得语法很笨拙。\n\
  \n当然，为每个局部变量添加 `l_` 前缀并不能避免嵌套 PL/SQL 块中的作用域捕获。对所有嵌套块中的所有 PL/SQL 标识符使用完全限定符号可以解决这个问题，但代价是冗长。\n\
  \n\n\n## 避免 PL/SQL 标识符与关键字冲突\n\n在 PL/SQL 标识符中包含前缀或后缀的第二个原因，是为了避免与 SQL 和 PL/SQL 中大量的关键字以及在`standard`和`dbms_standard`中声明的内置函数产生混淆。截至\
  \ Oracle 11gR2，有 1,844 个 SQL 关键字，例如`table`，以及内置函数的名称，例如`upper`，这些都列在`v$reserved_words`中。\n\
  \n```sql\nSQL> select count(distinct keyword)\n  2  from   v$reserved_words;\n\n\
  COUNT(DISTINCTKEYWORD)\n----------------------\n                  1844\n\n1 row\
  \ selected.\n```\n\nPL/SQL 关键字列在《PL/SQL 语言参考》的附录 D 中，但无法通过视图查看。如果不小心选择自己的标识符，就会遮蔽（shadow）Oracle\
  \ 的实现。在下面的例子中，`upper`的实现（它返回小写参数而不是 Oracle 提供的同名标准函数）被执行了：\n\n```sql\ncreate or\
  \ replace procedure test\n  authid definer\nis\n  function upper(i_text varchar2)\
  \ return varchar2\n  is\n  begin\n    return lower(i_text);\n  end upper;\nbegin\n\
  \  dbms_output.put_line(upper('Hello, world!'));\nend test;\n\nSQL> exec test\n\
  hello, world!\n\nPL/SQL procedure successfully completed.\n```\n\n这个小例子中显得有些人为的情况，在实际中很可能发生在一个由非原作者维护的大型包中。例如，当应用程序还在\
  \ 10g 下运行时，原作者可能实现了一个函数`regexp_count`。在升级到 11gR2 后，新的维护者可能在包的某个其他地方添加了对`regexp_count`的调用，期望调用同名（但语义可能不同）的新增\
  \ SQL 内置函数。\n\nOracle 提供了警告来防止滥用关键字。不幸的是，警告通常处于禁用状态。如果你启用所有警告并重新编译测试过程，你会得到期望的错误或警告，这取决于你将`plsql_warnings`设置为`error:all`还是`enable:all`。\n\
  \n```sql\nSQL> alter session set plsql_warnings='error:all';\n\nSession altered.\n\
  \nSQL> alter procedure test compile;\n\nWarning: Procedure altered with compilation\
  \ errors.\n\nSQL> show error\nErrors for PROCEDURE TEST:\n\nLINE/COL ERROR\n--------\
  \ -------------------------------------------------------------------------------\n\
  4/12      PLS-05004: identifier UPPER is also declared in STANDARD or is a SQL built-in\n\
  ```\n\n总之，为每个 PL/SQL 标识符添加前缀或后缀可以解决作用域捕获（scope capture）的问题。我使用变量和参数的前缀来避免静态 SQL\
  \ 中的作用域捕获，但我不费心为函数或过程添加前缀或后缀，因为与关键字的冲突很少见，而且带有参数的 SQL 函数不会发生作用域捕获。\n\n为了区分列表及其元素，通常为列表（如关联数组）添加复数后缀。或者，使用后缀来指示类型，例如`_rec`表示记录，`_tab`表示关联数组类型，以此来区分元素和列表，同时以几个字符为代价传达额外的语义信息。我在本章中使用类型后缀表示法是为了清晰，因为我将比较使用不同类型的实现。我使用井号（#）作为包的后缀，以避免与同名表发生名称冲突。\n\
  \n**注意**：前缀和后缀的正确使用也可以通过 PL/Scope 轻松检查。Lucas Jellema 在 [`http://technology.amis.nl/blog/?p=2584`](http://technology.amis.nl/blog/?p=2584)\
  \ 上有一个这方面的例子。\n\n### 代码与数据的模块化\n\n正确的模块化是开发团队可扩展性和应用程序可维护性的基础。模块化将“分而治之”的益处带入了软件工程。模块化的关键方面如下：\n\
  \n*   *可分解性*：必须能够将每个复杂问题分解为少量不太复杂的子问题，这些子问题可以分开处理。\n*   *模块可理解性*：在一个大型应用程序中，必须能够独立理解任何部分，而无需了解其余应用程序的太多或全部信息。这种特性称为模块可理解性。“大规模编程”通常意味着一个人加入公司时，需要处理一个已有数百万行代码的应用程序。显然，只有应用程序满足模块可理解性，才能以高效的方式完成这项工作。\n\
  *   *模块连续性*：连续性有两个方面。首先，对规范的小改动必须仅导致一个或几个模块的改动。其次，模块中的改动必须易于证明不会在其他模块中引起回归。模块连续性对于临时补丁尤其重要，由于其频率和紧迫性，可能无法像主要版本那样经过充分测试。\n\
  *   *可重用性*：应用程序某部分问题的解决方案必须能在另一部分重用。更通用的可组合性目标（即用现有组件构建新的、可能非常不同的系统）通常只对基础框架有要求。\n\
  \n**注意**：可分解性和可组合性通常是相互冲突的目标。可分解性是通过自顶向下设计实现的。它导致特定的模块，这些模块通常不适合通用的组合。另一方面，可组合性基于自底向上设计，这导致通用设计，但这些设计对于特殊情况通常效率低下且成本过高（除非一个模块可以被重用多次，从而证明大的投入是合理的）。\n\
  \n通过遵守以下规则，可以用模块实现模块化的这些方面：\n\n*   *信息隐藏（抽象）*：每个模块都明确地将其公共接口与其实现细节分离。这可以比作一台电视机：它的接口是带有几个按钮的遥控器，它的实现由复杂的电路和软件组成。电视观众不需要理解电视的实现。\n\
  *   *小接口*：接口尽可能小，以不限制实现的未来改进。\n*   *少量接口和分层*：每个模块尽可能少地使用来自其他模块的接口，以减少接口需要以不兼容方式更改时的连带损害，并普遍提高模块连续性。大多数架构是分层的，其中较高层（如业务逻辑）的模块可以调用较低层（如数据访问）的模块，反之则不行。\n\
  *   *直接映射*：每个模块代表一个专门的业务概念，并包含执行单个任务及其相关数据和操作，并力求做好该任务。\n\n这些通用需求和设计原则如何转化为 PL/SQL？模块在不同的粒度级别上映射到子程序、包、模式（schema）或它们中任何一项的集合。作为抽象单元的子程序在\
  \ PL/SQL 和大多数其他过程语言中是相同的，因此这里不作更详细的讨论。\n\n我将讨论限制在技术模块化上，并忽略源代码版本控制、部署、定制、营销和许可方面的模块化，技术模块化通常是这些方面的前提条件。我从包开始，然后描述如何实现包含模式和不包含模式的更大模块。\n\
  \n\n\n"
- "# 作为模块的包及相关表\n\nPL/SQL 明确地提供了包，可将其用作满足前述要求的模块。通过将包规范与其实施分离，支持信息隐藏。为确保客户端只需查阅规范，而不依赖于可能改变的实施细节，必须对包规范进行恰当的文档编写。对整个包以及每个接口元素（如子程序和类型）的语义和预期用途进行简要描述便已足够。目前没有类似于\
  \ `JavaDoc` 的标准 HTML API 生成工具可用于 `PL/SQL`，这不能成为不为包规范编写文档的借口。用户不会介意阅读包规范中的文档。事实上，在一项非正式调查中，大多数\
  \ `Java` 开发者告诉我，他们更倾向于查看 `Java` 源码中的 `JavaDoc`，而不是生成的 `HTML`。\n\n信息隐藏甚至可以通过字面意义上地封装主体而非规范来实现。Oracle\
  \ 对大多数公共 API 都采用此做法，例如 `dbms_sql`。不过要注意，封装的代码可以被反封装，在此过程中只会丢失注释。\n\n包规范中暴露的每个元素都可以被同一模式中的任何其他程序使用，也可以被另一个已获得该包\
  \ `execute` 权限的模式中的程序使用。`PL/SQL` 不支持像 `Java` 那样的受保护导出，也不支持像 `Oberon-2` 那样的变量只读导出。这没有必要：可以通过不同的包来实现针对不同类型客户端的\
  \ API。\n\n包还通过分离的、类型安全的编译来支持高效开发。客户端可以针对包规范进行编译，并且仅当包主体被修改时，它们也永远不会失效。随着 `11g` 中引入细粒度依赖跟踪，只有当包规范发生相关变更时，客户端才会失效。这种方法的缺点是，由于没有即时编译器（`PL/SQL`\
  \ 没有），无法进行跨单元内联（除了独立过程，而 `PL/SQL` 目前也不支持独立过程）。\n\n![images](img/square.jpg) **注意**\
  \ 为保持接口精简，生产代码中的大多数过程应只在包主体中声明，而不通过规范导出。为了测试它们，可以使用条件编译在测试构建中将它们导出，正如 Bryn Llewellyn\
  \ 在 `http://bit.ly/eXxJ9Q` 中所描述的那样。\n\n要将模块化从 `PL/SQL` 代码扩展到表数据，每个表都应仅由单个包修改。同样，所有仅引用单个表的\
  \ `select` 语句都应包含在此单一包中。另一方面，引用与不同包相关联的多个表的 `select` 语句则允许打破这种一对一映射。可以使用视图来引入额外的抽象层。然而，为与不同包关联的两个表之间的每个连接都引入一个视图通常是不切实际的。\n\
  \n有多种方法可以检测违反前述表访问规则的情况。此处描述的所有方法都必须视为在测试期间发现错误的软件工程工具，而不是执行安全性的手段。除了触发器和细粒度审计方法外，都需要传递闭包（例如使用层次查询）来通过视图深入到底层表。\n\
  \n我将在一个章节中以摘要形式描述两种编译时方法，并在单独的小节下详细描述三种运行时方法。运行时方法更复杂，并且包含超出特定案例的令人感兴趣的技术。运行时方法的主要问题是它们需要能够触发所有相关\
  \ `SQL` 语句执行的测试用例。\n\n### 通过静态分析检测表访问\n\n有两种基于静态分析的编译时方法：\n\n*   在源文本中搜索：如果工具良好，此方法通常出奇地快，除非存在大量视图，这些视图的出现也需要被搜索。然而，此方法需要\
  \ `PL/SQL` 解析器来实现自动化。\n*   依赖关系：视图 `user_dependencies` 仅列出静态依赖关系，不区分 `DML` 和只读访问。`PL/Scope`\
  \ 不包含关于 `SQL` 语句的信息。\n\n### 通过探测共享池检测表访问\n\n视图 `v$sql` 包含仍在共享池中最近执行的 `SQL`。`program_id`\
  \ 列引用导致硬解析的 `PL/SQL` 单元。例如，以下语句显示所有对上述表 `abbr_reg` 发出过 `DML` 的 `PL/SQL` 源码。要同时看到\
  \ `select` 语句，只需移除对 `command_type` 的条件即可。\n\n```sql\nSQL> select ob.object_name\n\
  \  2        ,sq.program_line#\n  3        ,sq.sql_text\n  4  from   v$sql      \
  \ sq\n  5        ,all_objects ob\n  6  where  sq.command_type in (2 /*insert*/,\
  \ 6 /*update*/, 7 /*delete*/, 189 /*merge*/)\n  7     and sq.program_id = ob.object_id\
  \ (+)\n  8     and upper(sq.sql_fulltext) like '%ABBR_REG%';\n```\n\n```\nOBJECT_NAME\
  \          PROGRAM_LINE# SQL_TEXT\n-------------------- ------------- ------------------------------------------------------\n\
  ABBR_REG#                       10 INSERT INTO ABBR_REG(ABBR, TEXT, DESCN) VALUES(UPPER(:\n\
  \n1 row selected.\n```\n\n共享池探测方法有几个缺点。\n\n*   只返回导致硬解析的 `PL/SQL` 单元。如果相同的 `SQL`\
  \ 出现在多个单元中（尽管在手写代码中不应出现），你将找不到其他的。如果硬解析是由匿名块触发的，你将得不到任何相关信息。\n*   你必须在 `SQL` 从共享池中刷出之前捕获它。关于\
  \ `SQL` 的 `Statspack`、`ASH` 和 `AWR` 视图不包含 `program_id` 列。\n*   你需要使用近似的字符串匹配，这可能返回过多数据，因为\
  \ `DML` 的目标表仅在 `SQL` 文本中可见。来自 `select` 子句的表可以通过连接 `v$sql_plan` 来精确匹配。或者，你可以动态创建包含\
  \ `SQL` 文本的包装过程，从 `all_dependencies` 获取引用，然后再次删除包装过程。\n*   `Truncate` 在 `SQL` 文本中被列为通用的\
  \ `lock table`。\n\n### 使用触发器检测表访问\n\n触发器是记录或阻止访问的另一种选择。以下触发器检查对表 `abbr_reg` 的所有\
  \ `DML` 操作是否来自包 `abbr_reg#` 或其调用的子程序：\n\n```sql\ncreate or replace trigger abbr_reg#b\n\
  before update or insert or delete or merge\non abbr_reg\nbegin\n  if dbms_utility.format_call_stack\
  \ not like\n       '%package body% K.ABBR_REG#' || chr(10) /*UNIX EOL*/|| '%' then\n\
  \    raise_application_error(-20999,'Table abbr_reg may only be modified by abbr_reg#.');\n\
  \  end if;\nend;\n```\n\n正如预期的那样，来自 `abbr_reg#` 的 `DML` 被允许，但直接的 `DML` 或来自另一个包的\
  \ `DML` 则不允许。\n\n```sql\nSQL> exec abbr_reg#.ins_abbr('descn', 'description')\n\n\
  PL/SQL procedure successfully completed.\n\nSQL> insert into abbr_reg(abbr, text)\
  \ values('reg', 'registry');\ninsert into abbr_reg(abbr, text) values('reg', 'registry')\n\
  \            *\nERROR at line 1:\nORA-20999: Table abbr_reg may only be modified\
  \ by abbr_reg#.\nORA-06512: at \"K.ABBR_REG#B\", line 3\nORA-04088: error during\
  \ execution of trigger 'K.ABBR_REG#B'\n```\n\n代替调用开销大的 `dbms_utility.format_call_stack`，你可以在\
  \ `abbr_reg#` 中使用一个包主体全局变量，在访问表 `abbr_reg` 之前将该变量设置为 `true`，之后设置为 `false`，并在触发器中调用\
  \ `abbr_reg#` 中的一个过程来检查该变量是否为 `true`。\n\n\n\n"
- "# 使用细粒度审计检测表访问\n\n由于 Oracle 不提供 `on-select` 触发器，您必须使用变通方法来检测读访问。三种可选方案是细粒度审计、RLS\
  \ 谓词和 Database Vault。这些都需要企业版。Database Vault 是一个需要额外付费的选项。这里介绍的是采用细粒度审计的方法。我将所有不同的调用者记录到\
  \ `call_log` 表中。\n\n```sql\ncreate table call_log(\n   object_schema           \
  \  varchar2(30)\n  ,object_name               varchar2(30)\n  ,policy_name     \
  \          varchar2(30)\n  ,caller                    varchar2(200)\n  ,sql_text\
  \                  varchar2(2000 byte)\n  ,constraint call_log#p primary key(object_schema,\
  \ object_name, policy_name\n                                    ,caller, sql_text)\n\
  ) organization index;\n```\n\n![images](img/square.jpg) **注意** Oracle 对索引条目的最大尺寸有限制，该限制基于数据块大小，详见\
  \ My Oracle Support (MOS) Note 136158.1。我在一个数据块大小为 8K、字符集为 AL32UTF8（每个字符最多可占用 4\
  \ 字节）的数据库上运行了此示例。为了在索引中容纳最多信息（该索引用于在创建时避免重复条目），我将 `sql_text` 列的长度语义指定为 `byte`。\n\
  \n该表由过程 `call_log_ins` 填充，细粒度审计框架会在每次 SQL 语句执行时调用此过程，大致相当于语句级触发器。\n\n```sql\ncreate\
  \ or replace procedure call_log_ins(\n  i_object_schema            varchar2\n ,i_object_name\
  \              varchar2\n ,i_policy_name              varchar2\n)\nis\n  pragma\
  \ autonomous_transaction;\n  l_caller                   call_log.caller%type;\n\
  \  l_current_sql              call_log.sql_text%type;\n\n  ----------------------------------------------------------------------------------\n\
  \  -- 返回触发器之下调用栈中直到第一个非匿名块的部分。\n  ----------------------------------------------------------------------------------\n\
  \  function caller(\n    i_call_stack             varchar2\n  ) return varchar2\n\
  \  as\n    c_lf            constant varchar2(1) := chr(10);\n    c_pfx_len     \
  \  constant pls_integer := 8;\n    c_head_line_cnt constant pls_integer := 5;\n\
  \    l_sol                    pls_integer;\n    l_eol                    pls_integer;\n\
  \    l_res                    varchar2(32767);\n    l_line                   varchar2(256);\n\
  \  begin\n    l_sol := instr(i_call_stack, c_lf, 1, c_head_line_cnt) + 1 + c_pfx_len;\n\
  \    l_eol := instr(i_call_stack, c_lf, l_sol);\n    l_line := substr(i_call_stack,\
  \ l_sol, l_eol - l_sol);\n    l_res := l_line;\n    while instr(l_line, 'anonymous\
  \ block') != 0 loop\n      l_sol := l_eol + 1 + c_pfx_len;\n      l_eol := instr(i_call_stack,\
  \ c_lf, l_sol);\n      l_line := substr(i_call_stack, l_sol, l_eol - l_sol);\n \
  \     l_res := l_res || c_lf || l_line;  \n    end loop;\n    return l_res;\n  end\
  \ caller;\n\nbegin\n  l_caller := nvl(substr(caller(dbms_utility.format_call_stack),\
  \ 1, 200), 'external');\n  l_current_sql := substrb(sys_context('userenv','current_sql'),\
  \ 1, 2000);\n  insert into call_log(\n    object_schema\n   ,object_name\n   ,policy_name\n\
  \   ,caller\n   ,sql_text\n  ) values (\n    i_object_schema\n   ,i_object_name\n\
  \   ,i_policy_name\n   ,l_caller\n   ,l_current_sql\n  );\n  commit;\nexception\n\
  \  when dup_val_on_index then\n    rollback;\nend call_log_ins;\n```\n\n最后，我需要添加策略。我希望对于\
  \ `abbr_reg` 表的每次 `select` 语句访问，都能调用过程 `call_log_ins`。为了也能审计 DML，我必须在调用时添加参数 `statement_types\
  \ => 'select,insert,update,delete'`，或者为 `select` 和 DML 分别创建策略。\n\n```sql\nbegin\n\
  \  dbms_fga.add_policy(\n    object_name     => 'ABBR_REG'\n   ,policy_name    \
  \ => 'ABBR_REG#SELECT'\n   ,handler_module  => 'CALL_LOG_INS'\n  );\nend;\n/\n```\n\
  \n我通过从我正在运行的示例中调用 `abbr_reg#.chk_abbr` 来测试此实现，如下所示：\n\n```sql\nSQL> exec abbr_reg#.chk_abbr\n\
  \nPL/SQL 过程已成功完成。\n\nSQL> select object_name, policy_name, caller, sql_text from\
  \ call_log;\n\nOBJECT_NAME POLICY_NAME     CALLER                         SQL_TEXT\n\
  ----------- --------------- ------------------------------ ---------------------------------\n\
  ABBR_REG    ABBR_REG#SELECT 35  package body K.ABBR_REG#   SELECT COUNT(*) FROM\
  \ ABBR_REG WHE\n\n已选择 1 行。\n```\n\n无论是 DML 触发器还是细粒度审计，都不会在截断（`truncate`）表或分区时触发。要记录或阻止这些操作，需要\
  \ DDL 触发器。\n\n\n## 包含多个包或子模块的模块\n\n子程序和包是必要的构建块。然而，在大型程序中，需要更高层级的模块来对成千上万的包进行分组。例如，Avaloq\
  \ 银行系统在功能上划分为核心银行、执行与运营以及前台模块。每个模块又被进一步细分，例如将执行与运营细分为财务和支付。在每个模块化层级上，都会声明可接受的依赖关系。\n\
  \n正交地，系统在技术上被划分为数据访问层、业务逻辑层和表示层。这两种模块化方式可以分开处理，也可以组合起来，如图 11-3 左侧所示。原子模块，例如财务用户界面，被定义为这两种模块化的交集。技术模块以包围框的形式展示，一级功能模块则通过相同的底色和属于同一模块的原子模块的名称前缀来标识。\n\
  \n![images](img/1103.jpg)\n\n**图 11-3.** 嵌套的层与模块架构，以及采用模式的平面化实现\n\n作为包和其他对象类型集合的模块，可以在\
  \ Oracle 中用模式和权限来表示。模式和权限都非常灵活，但层级较低。例如，模式不能嵌套。因此，图 11-3 左侧概念上的层级架构，必须映射到一组平面的模式，如右侧所示。此外，接口必须实现为对每个客户模式的单独权限授予。\n\
  \n因此，引入一种比 Oracle 模式和权限抽象层级更高的模块化模型，可以通过减少条目数量来提高可理解性。如果需要，可以从这个模型生成 Oracle 模式和权限，或者使用该模型来检查模式内的模块化情况。\n\
  \n元模型的精确要求取决于所选的模块化方式。通常，模型必须满足以下要求：\n\n1.  表示系统的模块，例如图 11-3 中的`支付逻辑`和`业务框架`。\n\
  2.  将每个数据库对象精确映射到一个模块，例如将 PL/SQL 包`pay_trx#`映射到`支付逻辑`模块。\n3.  声明模块之间的依赖关系，例如`支付逻辑`使用`业务框架`，但反之则不行。只应允许无环依赖。\n\
  4.  声明每个模块的接口（API）——即哪些对象可以被依赖模块引用。\n5.  提供一个扩展/向上调用机制，允许一个模块被依赖它的另一个模块扩展。例如，`表示框架`可以声明一个用于菜单项的扩展点，而`支付用户界面`可以创建一个菜单项。当该菜单项被选中时，`表示框架`必须对`支付用户界面`进行`向上调用`。此调用被称为`向上调用`，因为它与依赖链方向相反：`支付用户界面`依赖于`表示框架`，而非相反。\n\
  \n在 PL/SQL 中，`向上调用`通常通过生成的分发器或动态 SQL 来实现，如面向对象编程部分所述。如果模块是用模式实现的，则必须授予适当的`执行`对象权限。\n\
  \n通过将生成的代码（例如`向上调用`分发器）放入单独的模式中，可以将源自依赖关系的权限和为`向上调用`所需的权限分离开来。\n\n如果`向上调用`是使用用户定义类型提供的动态分发来实现的，则根本不需要额外的权限。\n\
  \n可选地，元模型还可以提供以下功能：\n\n6.  支持模块沿一个或多个维度（例如功能性和技术分层）的层级嵌套。或者，可以引入专用实体，如层和功能组件。专用实体可以用特定的语义来定义，例如层只允许向下的依赖关系。\n\
  7.  允许存在友元模块，它们可以使用普通客户端模块无法访问的额外 API。例如，`支付逻辑`模块可以只为`支付用户界面`模块提供额外的 API。同样，出于性能原因，可能需要拓宽选定模块之间的接口。友元关系可以单独声明，也可以从其他实体（例如功能域模块）派生。\n\
  8.  管理异常。在引入（新的）目标模块化方案时，可能无法立即移除所有非法依赖，但未来绝不能创建额外的非法依赖。因此，必须管理暂时容忍的非法依赖。\n\n应用程序的目标架构模型可以集中定义在一个文件中，也可以按模块定义。集中定义适用于全局的高层级实体，例如层。按模块的配置更具可扩展性，并且对于多个独立的模块提供者是必需的。OSGi\
  \ 模块（在 OSGi 术语中称为捆绑包）的清单文件就是按模块声明的示例。\n\n图 11-4 以实体关系图的形式展示了一个可能的元模型。我在满足该要求的元素后面的括号中列出了先前提到的要求。图\
  \ 11-4 顶部是模块（要求 1）和模块类型。下面是模块的层次结构（要求 6）和模块之间的依赖关系（要求 3）。利用这些实体，你可以对图 11-3 左侧描绘的架构进行建模。\n\
  \n接下来是对象（例如 PL/SQL 单元、表和视图）。每个对象恰好属于一个模块（要求 2）。每个对象要么对其所属模块是私有的，要么是某种类型的接口（要求 4）。在这个例子中有几种接口类型：供具有相同功能模块父级的其他原子模块使用的接口、供同一应用程序中其他模块使用的接口，以及可供外部应用程序使用的公共接口。额外的代码表`code_object_intf_mode`用于区分对表的只读访问和读写访问。\n\
  \n![images](img/1104.jpg)\n\n**图 11-4.** 目标模块化的元模型\n\n在图 11-4 的底部是表示两种异常类型的结构，如右下角的两个值所述。\n\
  \n*   待修复的遗留缺陷（要求 8）。如果应用程序是新模块化的，或者目标模块化方案发生变更，这些缺陷应只会暂时存在。\n*   可接受的`向上调用`异常（要求\
  \ 5）。\n\n友元模块（要求 7）仅由功能模块隐式支持。可以通过引入不同的模块依赖类型，或将友元建模为额外的异常类型，来支持显式的友元模块。\n\n作为 PL/SQL\
  \ 包和其他对象类型组的模块，可以用数据库模式或在模式内部实现。这两种方法可以结合使用，例如，为顶层模块使用模式，并在模式内为子模块进行分组。\n\n## 将模式作为模块\n\
  \n模式为所有类型的对象（从 PL/SQL 单元到表）提供了一种比包粒度更高的通用模块化方式。每个对象都属于一个模式。模式可用于将应用程序划分为多个部分。例如，一个应用程序可以划分为三个模式，分别包含数据访问层、业务逻辑层和表示层。\n\
  \n在 Oracle 中，模式与用户是同义词。我为三层架构创建模式的方式如下：\n\n```\nSQL> create user data_access identified\
  \ by pwd account lock;\n\n用户已创建。\n\nSQL> create user business_logic identified by\
  \ pwd account lock;\n\n用户已创建。\n\nSQL> create user presentation identified by pwd\
  \ account lock;\n\n用户已创建。\n```\n\n"
- "# 对象权限的授予\n\n要访问另一个方案中的对象，需要授予相应的对象权限。首先，我在`data_access`方案中创建了一个表和一个过程，以便有一个具体的示例。\n\
  \n```\nSQL> create table data_access.t(x number);\nTable created.\n\nSQL> create\
  \ or replace procedure data_access.d(\n  2    i_x                        number\n\
  \  3  )\n  4  is\n  5  begin\n  6    insert into t(x) values (abs(i_x));\n  7  end\
  \ d;\n  8  /\n```\n\n![images](img/square.jpg) 注意：要创建这些对象，你必须使用具有“Create any table”和“Create\
  \ any procedure”权限的用户登录，或者将`create session`、`table`和`procedure`权限授予`data_access`。\n\
  \n如果没有显式的授权，过程`data_access.d`无法从方案`business_logic`中的子程序访问：\n\n```\nSQL> create or\
  \ replace procedure business_logic.b(\n  2    i_x                        number\n\
  \  3  )\n  4  is\n  5  begin\n  6    data_access.d(trunc(i_x));\n  7  end b;\n \
  \ 8  /\nWarning: Procedure created with compilation errors.\n\nSQL> show error\n\
  Errors for PROCEDURE BUSINESS_LOGIC.B:\n\nLINE/COL ERROR\n-------- ------------------------------------------------------\n\
  6/3      PL/SQL: Statement ignored\n6/3      PLS-00201: identifier 'DATA_ACCESS.D'\
  \ must be declared\n```\n\n在授予执行权限后，我可以成功编译该过程。\n\n```\nSQL> grant execute on data_access.d\
  \ to business_logic;\nGrant succeeded.\n\nSQL> alter procedure data_access.d compile;\n\
  Procedure altered.\n```\n\n授权是一种灵活但属于底层的结构：\n\n*   授权总是针对单个对象。每个接口包都需要单独授权。\n* \
  \  授权总是授予特定的方案。仅仅因为`business_logic`可以访问`data_access.d`，并不意味着`presentation`也可以访问`data_access.d`。通过仅将`presentation`的权限授予`business_logic`而不授予`data_access`，你可以强制实施严格的分层，其中所有从`presentation`到`data_access`的调用都必须通过`business_logic`。授权提供了选择性的信息隐藏，而包要么将某个项导出给所有客户端，要么不导出给任何客户端。\n\
  *   如果两个方案需要在一组对象上获得相同的权限（例如，图 11-3 中的`Finance Logic`和`Payment Logic`对于`Business\
  \ Framework`），则必须分别进行授权，因为在定义者权限过程中不考虑角色。\n*   不可能授予一个方案（例如，包含生成代码的方案）访问另一个方案所有对象的权限。每个对象都需要单独授权。\n\
  *   对于表，`select`、`insert`、`update`和`delete`权限可以分别授予。因此，通过将 DML 限制在单个方案内，并允许其他模块直接读取以获得最佳性能，方案可以强制实施数据一致性。使用定义者权限过程访问其他方案中的对象没有性能开销。\n\
  \n由于授权是如此底层，并且一个大型应用程序可能需要成千上万的授权，因此最好从元模型生成授权，如图 11-4 所示。\n\n![images](img/square.jpg)\
  \ 注意：单个对象的所有权限可在视图`all_tab_privs`中查看。系统权限、角色权限和列权限可分别在`all_sys_privs`、`all_role_privs`和`all_column_privs`中找到。\n\
  \n"
- '# 访问其他方案中的对象


  与包类似，方案引入了命名空间。引用另一个方案中的对象有两种选择。完全限定表示法要求在每次引用时都指定方案名称（例如前面示例中的`data_access.d`）。或者，你可以在方案`business_logic`中为过程`d`创建一个同义词，然后直接作为`d`访问该过程。


  ```

  SQL> create or replace synonym business_logic.d for data_access.d;

  Synonym created.

  ```


  一些开发者更喜欢使用同义词的方法，以减少输入量并避免紧密耦合。由于接口应该少而明确，我更喜欢完全限定表示法，这可以防止名称冲突。


  ![images](img/square.jpg) 注意：如果一个方案包含与另一个方案同名的对象，那么使用完全限定表示法将无法引用该另一个方案中的对象，因为 PL/SQL
  的作用域规则会将引用解析为该对象。例如，如果在方案`business_logic`中添加了一个名为`data_access`的表，那么除了通过同义词之外，你将无法在`business_logic`中从
  PL/SQL 引用`data_access`中的任何对象。


  '
- '# 方案的优化使用


  一个应用程序的理想方案数量取决于架构。对于手写代码，每个方案包含 20-100 个包可能是一个理想的平均大小。包太少，模块数量以及接口的大小和数量可能会过多，这违反了上述模块化规则，并导致授权和结构更改的管理开销。包太多，则可理解的模块化单元又太大。


  方案有几个附加特性，在设计时应予以考虑。它们对于部署第三方组件很有用，因为它们的命名空间可以防止名称冲突。方案可用于强制实施安全性，因为在所有情况下（包括动态
  SQL）都会由数据库检查安全性。除了前面描述的对象权限外，方案还可以用于将关键操作集中到一个具有许多系统权限的小型、“微内核”式方案中。此外，方案具有各种属性（例如，表空间上的配额），并且是启用版本控制的单元。


  '
- "# 通过方案实现模块化的途径\n\n尽管有这些好处，我所知的大多数大型应用程序仅使用一个或少数几个方案。原因似乎是技术无关的或历史性的，与当前版本 Oracle\
  \ 中的方案问题无关。前面提到的用于引用其他方案中对象的同义词方法，提供了一个相对简单的迁移路径，以使用方案进行模块化。可能只需要适配 DDL 语句和对数据字典的查询，并且需要检查动态\
  \ SQL 以发现缺失的授权。当然，这样的迁移仅为未来的清理提供了一个起点，并不能神奇地立即改善模块化。\n\n迁移到方案后，不可能再出现引用先前未引用的方案私有对象的额外模块化违规。例如，如果迁移前新方案`business_logic`没有引用表`data_access.t`，则迁移不需要授予任何对象权限。如果开发人员后来试图在`business_logic`的一个包中引用`data_access.t`，PL/SQL\
  \ 编译器将捕获此错误。另一方面，对已使用的方案私有对象的额外引用是可能的，因为授权是授予方案而非其中的单个对象。如果在此示例中，`business_logic`的一个现有包体在迁移前访问了`data_access.t`，那么为了进行一对一的迁移，该授权是必须的，而编译器不会标记出额外的违规。因此，有必要维护一个预先存在的违规列表，并检查新的违规。可以使用`all_identifiers`检查\
  \ PL/SQL 单元之间的引用，并使用`all_dependencies`检查涉及其他对象类型的引用，从而进行细粒度的检查。\n\n对现有应用程序进行模块化非常昂贵，因为如果过去没有强制实施模块化，应用程序中将充满对不可引用模块和非接口对象的非法引用。更改这些引用的高成本归咎于过去的“罪过”，而非方案的任何缺点。应吸取的教训是：新应用程序必须从一开始就是模块化的，并且必须强制实施模块化。\n\
  \n\n## 模式（Schema）内的模块化\n\n如果一个应用程序由于向后兼容性或组织原因而局限于单一模式，或者模式仅用于顶层模块，该应用程序仍然可以在模式内细分为逻辑模块。\n\
  \n模式内的模块通常通过名称前缀隐式表示，例如数据访问层对象使用 `da_` 前缀。如之前针对作用域前缀所述，可以检查模块前缀的正确使用方式。\n\n由于没有强制性的模块化毫无价值，且数据库无法帮助实现模式内的模块化强制，因此你需要创建自己的检查机制。进行检查需要目标模块化和实际模块化。目标模块化由图\
  \ 11-4（先前已展示）的元模型实例给出。实际模块化存在于代码中。静态依赖关系列在 `all_dependencies` 和 `all_identifiers`\
  \ 中。我已经讨论过动态 SQL 中对表的引用的检测。对于动态 SQL 和 PL/SQL 中对 PL/SQL 的引用，你可以使用 SQL 区域或 Database\
  \ Vault。\n\nDatabase Vault 是一种安全选件，它限制对 Oracle 数据库中特定区域的访问，任何用户，包括拥有管理访问权限的用户，都无法访问。你利用访问限制来捕获模块化违规——即直接访问其他模块的非接口单元。在示例中，我假设每个\
  \ PL/SQL 单元在其名称中都有模块前缀，并且接口单元具有 `_intf#` 后缀。Database Vault 提供了一个选项，可以在规则中执行自定义的\
  \ PL/SQL 函数来检查每个 PL/SQL 调用（或其他对象使用）的有效性。该函数获取调用栈，并验证在要检查的模式（示例中为 `k`）中，最顶层的调用者/被调用单元对是否满足模块化引用要求。为了避免对检查函数进行检查，我在一个单独的模式\
  \ `x` 中创建它。\n\n```sql\ncreate or replace function x.valid_call\nreturn pls_integer\n\
  is\n  c_lf               constant varchar2(1)    := chr(10);    -- UNIX\n  c_intf_like\
  \        constant varchar2(8)    := '%\\_INTF#'; -- Interface unit suffix\n  c_owner_like\
  \       constant varchar2(5)    := '% K.%';    -- Schema to be checked\n  c_module_sep\
  \       constant varchar2(1)    := '_';        -- Separator of module prefix\n \
  \ c_head_line_cnt    constant pls_integer    := 4;          -- Ignored lines in\
  \ call stack\n  l_call_stack                varchar2(4000);               -- Call\
  \ stack\n  l_sol                       pls_integer;                  -- Start pos\
  \ of current line\n  l_eol                       pls_integer;                  --\
  \ End pos of current line\n  l_callee                    varchar2(200);        \
  \        -- Called unit\n  l_caller                    varchar2(200);          \
  \      -- Calling unit\n  l_res                       boolean;                 \
  \     -- Valid call?\nbegin\n  l_call_stack := dbms_utility.format_call_stack;\n\
  \  l_sol := instr(l_call_stack, c_lf, 1, c_head_line_cnt);\n  l_eol := instr(l_call_stack,\
  \ c_lf, l_sol + 1);\n  l_callee := substr(l_call_stack, l_sol, l_eol - l_sol);\n\
  \  -- ONLY CALLS TO NON INTERFACE UNITS OF K MAY BE INVALID --\n  if l_callee like\
  \ c_owner_like and l_callee not like c_intf_like escape '\\' then\n    l_callee\
  \ := substr(l_callee, instr(l_callee, '.') + 1);\n    -- FIND TOPMOST CALLER OF\
  \ SCHEMA K, IF ANY, AND CHECK FOR SAME MODULE PREFIX --\n    loop\n      l_sol :=\
  \ l_eol + 1;\n      l_eol := instr(l_call_stack, c_lf, l_sol + 1);\n      l_caller\
  \ := substr(l_call_stack, l_sol, l_eol - l_sol);\n      if l_caller like c_owner_like\
  \ then\n        l_caller := substr(l_caller, instr(l_caller, '.') + 1);\n      \
  \  l_res := substr(l_callee, 1, instr(l_callee, c_module_sep))\n               \
  \  = substr(l_caller, 1, instr(l_caller, c_module_sep));\n      end if;\n      exit\
  \ when l_eol = 0 or l_res is not null;\n    end loop;\n  end if;\n  return case\
  \ when not l_res then 0 else 1 end;\nend valid_call;\n```\n\n需要向 Database Vault\
  \ 模式授予此函数的执行特权，以便在规则中使用。\n\n```sql\nSQL> grant execute on x.valid_call to dvsys;\n\
  \nGrant succeeded.\n```\n\n然后，我创建规则集、规则和命令规则，以便在作为 Database Vault 所有者登录时，对每个 PL/SQL\
  \ 单元的执行执行 `valid_call` 函数。\n\n```sql\ndeclare\n  c_rule_set_name  varchar2(90) \
  \ := 'Modularization within schema check';\n  c_rule_name      varchar2(90)  :=\
  \ 'CHKUSER';\nbegin\n  -- RULE SET: CHECK RULES AND FLAG VIOLATIONS\n  dvsys.dbms_macadm.create_rule_set(\n\
  \    rule_set_name   => c_rule_set_name\n   ,description     => null\n   ,enabled\
  \         => dvsys.dbms_macutl.g_yes\n   ,eval_options    => dvsys.dbms_macutl.g_ruleset_eval_all\n\
  \   ,audit_options   => dvsys.dbms_macutl.g_ruleset_audit_off\n   ,fail_options\
  \    => dvsys.dbms_macutl.g_ruleset_fail_show\n   ,fail_message    => 'Modularization\
  \ check failed'\n   ,fail_code       => -20002\n   ,handler_options => dvsys.dbms_macutl.g_ruleset_handler_off\n\
  \   ,handler         => null\n  );\n  -- RULE: CHECK WHETHER CALL IS VALID\n  dvsys.dbms_macadm.create_rule(\n\
  \    rule_name => c_rule_name\n   ,rule_expr => 'X.VALID_CALL = 1'\n  );\n  -- ADD\
  \ RULE TO RULE SET\n  dvsys.dbms_macadm.add_rule_to_rule_set(\n    rule_set_name\
  \ => c_rule_set_name\n   ,rule_name     => c_rule_name\n  );\n  -- MATCH CRITERIA:\
  \ EXECUTE RULE SET ON PL/SQL EXECUTE OF OBJECTS OWNED BY USER K\n  dvsys.dbms_macadm.create_command_rule(\n\
  \    command         => 'EXECUTE'\n   ,rule_set_name   => c_rule_set_name\n   ,object_owner\
  \    => 'K'\n   ,object_name     => '%'\n   ,enabled         => dvsys.dbms_macutl.g_yes\n\
  \  );\n  commit;\nend;\n/\n```\n\n设置完成后，从 `k.m1_2` 到 `k.m1_1` 的调用是合法的，因为这两个单元具有相同的模块前缀\
  \ `m1`。另一方面，从 `k.m2_3` 到 `k.m1_1` 的调用被阻止，因为调用者属于模块 `m2`，而被调用者属于模块 `m1`。\n\n```sql\n\
  SQL> create or replace procedure k.m1_1 is begin null; end;\n  2  /\n\nProcedure\
  \ created.\n\nSQL> create or replace procedure k.m1_2 is begin execute immediate\
  \ 'begin m1_1; end;'; end;\n  2  /\n\nProcedure created.\n\nSQL> exec k.m1_2\n\n\
  PL/SQL procedure successfully completed.\n\nSQL> create or replace procedure k.m2_3\
  \ is begin execute immediate 'begin m1_1; end;'; end;\n  2  /\n\nProcedure created.\n\
  \nSQL> exec k.m2_3\nBEGIN k.m2_3; END;\n\n*\nERROR at line 1:\nORA-01031: insufficient\
  \ privileges\nORA-06512: at \"K.M1_1\", line 1\nORA-06512: at \"K.M2_3\", line 1\n\
  ORA-06512: at line 1\n```\n\n这种方法适用于静态和动态 SQL（原生和 `dbms_sql`）。除了阻止违规行为，也可以选择允许并记录它们。\n\
  \n![images](img/square.jpg) **注意** 要安装 Database Vault，必须重新链接二进制文件，如《Database Vault\
  \ 管理员指南》附录 B 所述，并使用数据库配置助理 `dbca` 添加 Oracle Label Security（前提条件）和 Oracle Database\
  \ Vault 选件。从 11.2.0.2 开始，安装过程中的易错点很少。该选件必须使用 `dbca` 安装，因为 SQL*Plus 脚本无法正确安装 NLS。DV\
  \ 所有者密码中所需的特殊字符不能是最后一个字符。如果使用延迟约束，则需要补丁 10330971。如果数据库字符集是 `AL32UTF8`，则由于前述基于块大小的索引条目最大尺寸，需要\
  \ 16K 或更大块大小的表空间。如果默认块大小较小，请设置 `db_16k_cache_size` 并为 Database Vault 创建一个具有 16K\
  \ 块大小的表空间。此外，Database Vault 有意引入了一些限制，你可能需要解除这些限制才能使你的应用程序正常工作。\n\n\n#### 模式内与跨模式的模块化\n\
  \n表 11-1 总结了跨模式和模式内模块化的优缺点。在这两种情况下，都需要一个目标模块化的抽象模型。\n\n![images](img/t1101.jpg)\n\
  \n### PL/SQL 中的面向对象编程\n\n通过模块化，你仍然缺少两个重要部分来高效创建大型程序。首先，你所有的内存结构都局限于单例的表示。然而，大多数应用程序必须支持同类型的多个实例，例如多个银行交易。其次，重用仅限于完全不变的重用。但在实践中，重用通常需要调整——而无需复制源代码并维护多个副本。例如，银行系统中的支付和证券交易有许多共同点，但在其他方面（如记账逻辑）又有所不同。目标是让共享功能只有一个实现，而不仅仅是重用想法和开发人员。面向对象编程解决了这些问题。\n\
  \n重用带来许多好处：它减少了上市时间、实施成本和维护工作，因为只有一个实现需要维护。由于只有一个实现，可以投入更多的专家资源来使其正确和高效。\n\n面向对象编程通过两种方式增加重用：\n\
  \n*   *带调整的重用*：继承和子类型多态允许你扩展一个数据类型，并将其子类型的实例视为超类型的实例。例如，你可以定义一个通用的银行交易类型作为超类型，以及支付和证券交易的子类型。动态绑定（也称为后期绑定、动态分派和虚拟方法）为此增添了最后一块拼图。你可以在超类型银行交易上声明一个过程\
  \ `book`（可能是没有实现的抽象过程），并为两个子类型对其进行适配。通用框架调用 `book` 过程，每个银行交易执行与其实际子类型相对应的逻辑。\n*\
  \   *数据及相关功能的重用*：面向对象分析提倡基于数据而非功能进行分解。因为数据比提供在其上的特定功能寿命更长，这通常能提供更好的重用。\n\nBertrand\
  \ Meyer 在其著作《*面向对象软件构造*》中总结了这两个方面：“面向对象软件构造是将软件系统构建为可能部分的抽象数据类型实现的结构化集合。”\n\n![images](img/square.jpg)\
  \ **注意** 泛型（F 有界多态）有时被错误地认为是面向对象编程的必备条件，尤其是在 Java 5 添加了泛型之后。然而，泛型是一个正交的概念，例如在非面向对象的\
  \ Ada 原始版本中也存在。泛型最常用于集合。PL/SQL 支持强类型集合，如关联数组，作为内置语言结构。这在大多数情况下已足够。\n\n虽然 PL/SQL\
  \ 本身不是面向对象编程语言，但可以使用用户定义类型（UDT）或 PL/SQL 记录以面向对象的方式进行编程。实例和带调整的重用实现如下：\n\n*   PL/SQL\
  \ 不直接支持内存引用（指针）。在运行时创建任意数量对象实例的唯一方法是将实例存储在集合（如关联数组）中。引用表示为集合索引。\n*   UDT 原生支持动态绑定。使用记录时，你可以使用动态\
  \ SQL 或静态分派器自己实现动态分派。\n\n我首先介绍 UDT，因为它们的别名“对象类型”表明它们是面向对象编程的自然选择，然后解释为什么在大多数情况下记录是更好的选择。\n\
  \n#### 使用用户定义类型进行面向对象编程\n\nOracle 在 Oracle 8 中的面向对象热潮中添加了用户定义类型（UDT），主要解决存储方面的问题，省略了一些有用的编程特性。UDT\
  \ 是模式级别的对象。我可以如下创建一个银行交易的基类型：\n\n![images](img/square.jpg) **注意** Oracle 对用户定义类型（UDT）使用两个同义词。在《*数据库对象关系开发者指南*》中，它们被称为\
  \ *对象类型*，因为 Oracle 想要支持数据库中的面向对象。同一个术语 *对象类型* 更早就被用作 `all_objects` 中条目的类型，例如包和表。第二个同义词\
  \ *抽象数据类型*（ADT）用于《*PL/SQL 语言参考*》，因为 UDT 可用于实现 ADT 的数学概念——即由一系列操作和这些操作的属性定义的数据结构。我在本章中使用明确的术语\
  \ *UDT*。UDT 包括 varrays 和嵌套表，这里不作讨论。UDT 作为外部调用的子程序参数类型很有用。\n\n```sql\ncreate or replace\
  \ type t_bank_trx_obj is object (\n  s_id                  integer\n ,s_amount \
  \             number\n\n  ------------------------------------------------------------------------------\n\
  \  -- 返回交易金额。\n  ------------------------------------------------------------------------------\n\
  \ ,final member function p_amount return number\n\n  ------------------------------------------------------------------------------\n\
  \  -- 记账交易。\n  ------------------------------------------------------------------------------\n\
  \ ,not instantiable member procedure book(\n   i_text               varchar2\n \
  \ )\n) not instantiable not final;\n```\n\n类型 `t_bank_trx_obj` 有两个属性 `s_id` 和 `s_amount`\
  \ 来保存状态。此外，它有两个方法。函数 `p_amount` 被声明为 `final`，意味着它不能在子类型中被覆盖。过程 `book` 被声明为不可实例化（抽象），意味着它只被声明和指定，但没有实现。类型体的语法是\
  \ PL/SQL 扩展了子程序的修饰符，如下所示：\n\n```sql\ncreate or replace type body t_bank_trx_obj\
  \ is\n  final member function p_amount return number\n  is\n  begin\n    return\
  \ s_amount;\n  end p_amount;\nend;\n```\n\n\n## 继承与 UDT 的动态调度\n\nUDT 支持继承。我可以将支付交易类型定义为通用银行交易类型的特化。\n\
  \n```sql\ncreate or replace type t_pay_trx_obj under t_bank_trx_obj (\n  ------------------------------------------------------------------------------\n\
  \  -- 创建支付交易。金额必须为正数。\n  ------------------------------------------------------------------------------\n\
  \  constructor function t_pay_trx_obj(\n   i_amount             number\n  ) return\
  \ self as result\n\n ,overriding member procedure book(\n   i_text             \
  \  varchar2\n  )\n);\n```\n\n我还可以添加一个显式构造函数，以禁止创建负金额的支付交易。构造函数仅将金额作为输入参数，假设 ID 是从序列初始化的。关键字\
  \ `self` 表示当前实例，类似于其他语言中的 `this`。\n\n![images](img/square.jpg) `注意` Oracle 会按声明顺序为所有属性创建一个默认构造函数，并以属性名作为输入参数。为了防止这种情况（例如，允许调用方创建负金额的支付），必须声明一个与默认构造函数签名相同的显式构造函数。\n\
  \n```sql\ncreate or replace type body t_pay_trx_obj is\n  constructor function t_pay_trx_obj(\n\
  \   i_amount             number\n  ) return self as result\n  is\n  begin\n    if\
  \ nvl(i_amount, -1) < 0 then\n      raise_application_error(-20000, '负金额或空金额');\n\
  \    end if;\n    self.s_amount := i_amount;\n    return;\n  end t_pay_trx_obj;\n\
  \n  ------------------------------------------------------------------------------\n\
  \  overriding member procedure book(\n   i_text               varchar2\n  )\n  is\n\
  \  begin\n    dbms_output.put_line('Booking t_pay_trx_obj \"' || i_text || '\" with\
  \ amount '\n     || self.p_amount);\n  end book;\nend;\n```\n\n现在我可以使用这两种类型来说明动态调度。我将一个支付交易赋值给一个类型为\
  \ `t_bank_trx_obj` 的变量，并调用 `book` 过程。即使该变量的静态类型是 `t_bank_trx_obj`，执行的是实际类型 `t_pay_trx_obj`\
  \ 的实现。\n\n```sql\nSQL> declare\n  2    l_bank_trx_obj             t_bank_trx_obj;\n\
  \  3  begin\n  4    l_bank_trx_obj := new t_pay_trx_obj(100);\n  5    l_bank_trx_obj.book('payroll\
  \ January');\n  6  end;\n  7  /\nBooking t_pay_trx_obj \"payroll January\" with\
  \ amount 100\n\nPL/SQL procedure successfully completed.\n```\n\n## UDT 的局限性\n\n\
  到目前为止，你已经看到了 UDT 在面向对象编程方面的优点。不幸的是，UDT 也有两个主要缺点。\n\n*   UDT 只能在其规范中使用 SQL 类型，而不能使用\
  \ PL/SQL 类型（如记录和 Boolean），因为 UDT 可以在 SQL 中持久化。\n*   与 PL/SQL 包不同，UDT 不支持信息隐藏。无法将任何属性或方法声明为\
  \ private，也无法在包体中添加更多属性和方法。任何客户端都可以访问所有成员，如下面的示例所示，我在其中直接修改了金额：\n\n```sql\ncreate\
  \ or replace procedure access_internal\nis\n  l_bank_trx_obj             t_bank_trx_obj;\n\
  begin\n  l_bank_trx_obj := new t_pay_trx_obj(100);\n  l_bank_trx_obj.s_amount :=\
  \ 200;\n  l_bank_trx_obj.book('cheating');\nend;\n```\n\n至少 PL/Scope 提供了一种检测此类访问的方法。以下查询列出了所有对声明类型及其子类型外部的属性和私有方法（以\
  \ `p_` 为前缀）的静态访问：\n\n```sql\nSQL> select us.name, us.type, us.object_name, us.object_type,\
  \ us.usage, us.line\n  2  from   all_identifiers pm\n  3        ,all_identifiers\
  \ us\n  4  where  pm.object_type  = 'TYPE'\n  5     and (\n  6              pm.type\
  \ = 'VARIABLE'\n  7           or (pm.type in ('PROCEDURE', 'FUNCTION') and pm.name\
  \ like 'P\\_%' escape '\\')\n  8         )\n  9     and pm.usage        = 'DECLARATION'\n\
  \ 10     and us.signature    = pm.signature\n 11     and (us.owner, us.object_name)\
  \ not in (\n 12           select ty.owner, ty.type_name\n 13           from   all_types\
  \ ty\n 14           start with ty.owner     = pm.owner\n 15                  and\
  \ ty.type_name = pm.object_name\n 16           connect by ty.supertype_owner = prior\
  \ ty.owner\n 17                  and ty.supertype_name  = prior ty.type_name\n 18\
  \         );\n```\n\n```\nNAME      TYPE      OBJECT_NAME      OBJECT_TYPE  USAGE\
  \       LINE\n--------  --------  ---------------  -----------  ----------  ----\n\
  S_AMOUNT  VARIABLE  ACCESS_INTERNAL  PROCEDURE    ASSIGNMENT     6\n\n1 row selected.\n\
  ```\n\nPL/Scope 区分了赋值和引用。不幸的是，以属性作为 `out` 或 `in out` 参数实际参数形式的隐藏赋值仅显示为引用。\n\n##\
  \ UDT 的持久化\n\n对象类型可以作为表列或对象表持久化。例如，所有交易可以存储在下表中：\n\n```sql\ncreate table bank_trx_obj\
  \ of t_bank_trx_obj(s_id primary key)\nobject identifier is primary key;\n```\n\n\
  此表可以存储任何子类型的对象，例如支付交易。\n\n```sql\nSQL> insert into bank_trx_obj values(t_pay_trx_obj(1,\
  \ 100));\n\n1 row created.\n```\n\n一开始看起来简单的事情，当类型规范发生变化时，会变得非常复杂和麻烦。细节超出了本章的范围。此外，对于具有表依赖项及其子类型的类型，基于版本的重定义类型（以及从\
  \ 11gR2 开始，类型体）是不可能的。将 UDT 存储在表中是一种不好的做法，可能只在高级队列表和某些 varrays 中是合理的。当然，也可以将 UDT\
  \ 的内容存储到关系表中，每个 UDT 属性对应一列，如下文对记录的描述。\n\n## 使用 PL/SQL 记录进行面向对象编程\n\nPL/SQL 记录类型为\
  \ UDT 提供了一种替代的实现基础，用于在 PL/SQL 中进行面向对象编程。我认识的大多数在 PL/SQL 中进行面向对象编程的人都使用记录。使用记录代替\
  \ UDT 解决了几个问题。\n\n*   PL/SQL 类型允许用作字段的类型和子程序的参数。\n*   多重继承和子类型化是可能的。\n\n使用记录的缺点是你必须自己实现动态调度。在我讲动态调度之前，我将描述如何在内存中运行时创建任意数量的对象实例以及如何引用它们。\n\
  \n\n## 子类型\n\n在说明动态分派的实现之前，我将介绍支付交易子类型。与 UDT 实现类似，以包形式存在的子类型包含一个构造函数及其 `book` 过程的专门实现。以下是子类型的代码：\n\
  \n```sql\ncreate or replace package body pay_trx#\nis\n  function pay_trx#new(\n\
  \    i_amount                  number\n  ) return bank_trx#.t_bank_trx\n  is\n \
  \ begin\n    if nvl(i_amount, -1) < 0 then\n      raise_application_error(-20000,\
  \ 'Negative amount');\n    end if;\n    return bank_trx#.bank_trx#new(\n      i_bank_trx_type_id\
  \ => bank_trx_type#.c_pay_trx\n     ,i_amount           => i_amount\n    );\n  end\
  \ pay_trx#new;\n\n  ------------------------------------------------------------------------------\n\
  \  procedure bank_trx#book(\n    i_bank_trx           bank_trx#.t_bank_trx\n   ,i_text\
  \                   varchar2\n  )\n  is\n  begin\n    dbms_output.put_line('Booking\
  \ t_pay_trx \"' || i_text || '\" with amount '\n                          || bank_trx#.bank_trx#amount(i_bank_trx));\n\
  \  end bank_trx#book;\nend pay_trx#;\n```\n\n包体 `pay_trx#` 引用了银行交易子类型的列表。常量声明包 `bank_trx_type#`\
  \ 可以手工编码或生成。\n\n```sql\ncreate or replace package bank_trx_type#\nis\n  -- 银行交易子类型列表。无主体。--\n\
  \  c_pay_trx        constant bank_trx#.t_bank_trx_type := 1;\nend bank_trx_type#;\n\
  ```\n\n## 动态分派\n\nUDT 原生支持动态分派。对于作为记录的对象，你需要自己实现动态分派。这可以通过动态 SQL 或静态分派器完成。\n\n###\
  \ 使用动态 SQL 进行动态分派\n\n针对每种银行交易类型调用的 `bank_trx#book` 语句存储在一个表中。\n\n```sql\nSQL> create\
  \ table bank_trx_dsp(\n  2    method_name                varchar2(30)\n  3   ,bank_trx_type_id\
  \           number(9)\n  4   ,stmt                       varchar2(200)\n  5   ,primary\
  \ key(method_name, bank_trx_type_id)\n  6  ) organization index;\n\nTable created.\n\
  \nSQL> begin\n  2    insert into bank_trx_dsp(\n  3      method_name\n  4     ,bank_trx_type_id\n\
  \  5     ,stmt\n  6    ) values (\n  7      'bank_trx#book'\n  8     ,bank_trx_type#.c_pay_trx\n\
  \  9     ,'begin pay_trx#.bank_trx#book(i_bank_trx => :1, i_text => :2); end;'\n\
  \ 10    );\n 11    commit;\n 12  end;\n 13  /\n\nPL/SQL procedure successfully completed.\n\
  ```\n\n过程 `bank_trx#.bank_trx#book` 的实现根据 `bank_trx_type_id` 执行正确的动态 SQL：\n\n```sql\n\
  \  procedure bank_trx#book(\n    i_bank_trx               t_bank_trx\n   ,i_text\
  \                   varchar2\n  )\n  is\n    l_stmt                   bank_trx_dsp.stmt%type;\n\
  \  begin\n    select stmt\n    into   l_stmt\n    from   bank_trx_dsp\n    where\
  \  method_name      = 'bank_trx#book'\n       and bank_trx_type_id = b_bank_trx_list(i_bank_trx).bank_trx_type_id;\n\
  \    execute immediate l_stmt\n    using i_bank_trx, i_text;\n  end bank_trx#book;\n\
  ```\n\n所有部分就绪后，我就可以创建并记账一笔支付交易。\n\n```sql\nSQL> declare\n  2    l_my_payment   \
  \            bank_trx#.t_bank_trx;\n  3  begin\n  4    l_my_payment := pay_trx#.pay_trx#new(100);\n\
  \  5    bank_trx#.bank_trx#book(l_my_payment, 'payroll');\n  6  end;\n  7  /\nBooking\
  \ t_pay_trx \"payroll\" with amount 100\n\nPL/SQL procedure successfully completed.\n\
  ```\n\n通过动态 SQL 进行的调用比静态 PL/SQL 调用更慢且可扩展性更差。得益于 10g 及更高版本中的单语句缓存，如果每个会话主要使用一种类型的银行交易，差异很小。与静态调用的另一个区别是，如果动态调用返回异常，则会回滚到调用前隐式设置的保存点。\n\
  \n### 使用静态分派器进行动态分派\n\n静态分派器（以 `if` 语句的形式）是动态 SQL 的替代方案。这种分派器可以从元数据生成或手工编码。过程 `bank_trx#.bank_trx#book`\
  \ 使用交易类型调用分派器。\n\n```sql\n  procedure bank_trx#book(\n    i_bank_trx           \
  \    t_bank_trx\n   ,i_text                   varchar2\n  )\n  is\n  begin\n   \
  \ bank_trx_dsp#.bank_trx#book(\n      i_bank_trx          => i_bank_trx\n     ,i_bank_trx_type_id\
  \  => b_bank_trx_list(i_bank_trx).bank_trx_type_id\n     ,i_text              =>\
  \ i_text\n    );\n  end bank_trx#book;\n```\n\n分派器（这里只展示其主体）简单地根据类型调用正确的实现。\n\n\
  ```sql\ncreate or replace package body bank_trx_dsp#\nis\n  procedure bank_trx#book(\n\
  \    i_bank_trx               bank_trx#.t_bank_trx\n   ,i_bank_trx_type_id     \
  \  bank_trx#.t_bank_trx_type\n   ,i_text                   varchar2\n  )\n  is\n\
  \  begin\n    if i_bank_trx_type_id = bank_trx_type#.c_pay_trx then\n      pay_trx#.bank_trx#book(\n\
  \        i_bank_trx => i_bank_trx\n       ,i_text          => i_text\n      );\n\
  \    else\n      raise_application_error(-20000, 'Unknown bank_trx_type_id: ' ||\
  \ i_bank_trx_type_id);\n    end if;\n  end bank_trx#book;\nend bank_trx_dsp#;\n\
  ```\n\n如果子类型非常多，分派器中的 `if` 语句就会有很多分支。在这种情况下，使用嵌套 `if` 语句的二分查找能提供最佳的运行时性能。如果分派器是手工编码的，它可以实现在\
  \ `bank_trx#` 中，而不是一个单独的包中。\n\n## 子类型中的附加属性和方法\n\n如果支付交易需要普通银行交易中不存在的额外方法，我只需将它们添加到包\
  \ `pay_trx#` 中。如果支付交易需要一个额外的属性（例如，结算类型），我会在 `pay_trx#` 的主体中创建对应的记录类型和关联数组，如下所示：\n\
  \n```sql\ncreate or replace package body pay_trx#\nis\n  type t_pay_trx_rec is record\
  \ (\n    settle_type_id          t_settle_type\n  );\n  type t_pay_trx_tab is table\
  \ of t_pay_trx_rec index by bank_trx#.t_bank_trx;\n  b_pay_trx_list            t_pay_trx_tab;\n\
  \n  function pay_trx#new(\n    i_amount                  number\n   ,i_settle_type_id\
  \          t_settle_type\n  ) return bank_trx#.t_bank_trx\n  is\n    l_idx     \
  \               bank_trx#.t_bank_trx;\n  begin\n    if nvl(i_amount, -1) < 0 then\n\
  \      raise_application_error(-20000, 'Negative amount');\n    end if;\n    l_idx\
  \ := bank_trx#.bank_trx#new(\n      i_bank_trx_type_id => bank_trx_type#.c_pay_trx\n\
  \     ,i_amount           => i_amount\n    );\n    b_pay_trx_list(l_idx).settle_type_id\
  \ := i_settle_type_id;\n    return l_idx;\n  end pay_trx#new;\n```\n\n为了释放额外的状态，我还需要\
  \ `bank_trx#.bank_trx#remv` 通过分派器调用 `pay_trx#` 中的移除方法。\n\n## 对象作为记录的持久化\n\n若要将内存中使用记录方法实现的银行交易持久化，我创建了一个包含相应列的普通表格。\n\
  \n```sql\ncreate table bank_trx(\n  id                          integer\n ,bank_trx_type_id\
  \            integer\n ,amount                      number\n ,constraint bank_trx#p\
  \ primary key(id)\n);\n```\n\n子类型的附加属性，例如支付交易的结算类型，可以存储在补充表中。\n\n```sql\ncreate\
  \ table pay_trx(\n  bank_trx_id                integer\n ,settle_type_id       \
  \      integer\n ,constraint pay_trx#p primary key(bank_trx_id)\n ,constraint pay_trx#f#1\
  \ foreign key(bank_trx_id) references bank_trx(id)\n);\n```\n\n这种方法的缺点是需要访问多个表。或者，您可以将额外的字段存储在基表中，如果字段数量不多且您不介意概念上的不美观，这是一个不错的解决方案。第三种方法是去掉基表\
  \ `bank_trx`，将所有属性存储在 `pay_trx` 中。这种对象关系映射形式的缺点有两方面：如果您只知道交易 ID，您必须创建一个针对所有子类型的联合视图才能找到交易，并且\
  \ Oracle 无法通过简单的主键约束在存储于多个表中的所有类型交易上强制执行唯一 ID。\n\n### 评估\n\n好消息是，与 C 和大多数其他过程编程语言一样，在\
  \ PL/SQL 中进行面向对象编程是可行的。坏消息是，要获得所有特性需要一些额外的粘合代码。幸运的是，这些粘合代码大部分可以自动生成。\n\n如果一个应用程序只需要少数几个类型层次结构，并且它们只有几层深，那么\
  \ PL/SQL 是合适的。另一方面，如果需要数百种带有子类型的不同类型，我会寻找不同的解决方案。本章开头描述的 Avaloq 银行系统有两个类型层次结构：银行交易和静态数据对象。每个层次结构只有两层：一个基类型和数百个子类型。此外，还有几十个没有任何子类型的独立类型。对于这些独立类型，不需要调度器，其实现可以像在面向对象语言中一样简单。\n\
  \n### 内存管理\n\n大型程序通常需要大量内存，无论对象是否如前所述存储在集合中，或者使用了其他模式。因此，您需要知道如何测量内存使用情况以检测问题，例如内存泄漏。集合消耗了大部分\
  \ PL/SQL 内存；因此您需要了解它们是如何分配内存的。\n\n大多数大型 PL/SQL 应用程序使用专用服务器进程而非共享服务器进程。因此，我将重点放在专用服务器进程上，并忽略共享服务器进程，在共享服务器进程中\
  \ UGA（因此大部分 PL/SQL 内存）驻留在 SGA 中。\n\n![images](img/square.jpg) **注意** 使用 PL/SQL 变量，您可以分配比`pga_aggregate_target`定义的更多的内存，该参数指定了实例上所有服务器进程可用的总\
  \ PGA 内存目标。PL/SQL 内存被认为是不可调整的。只要操作系统提供内存，Oracle 就会按需分配内存。\n\n### 测量内存使用情况\n\n有多种测量进程内存使用情况的方法，这些方法与连接一一对应，并且在大多数情况下也与会话一一对应。视图\
  \ `v$process` 通常用作起点。\n\n```sql\nSQL> select se.sid\n  2        ,se.username\n \
  \ 3        ,round(pr.pga_used_mem / power(1024, 2))     pga_used_mb\n  4       \
  \ ,round(pr.pga_alloc_mem / power(1024, 2))    pga_alloc_mb\n  5        ,round(pr.pga_freeable_mem\
  \ / power(1024, 2)) pga_freeable_mb\n  6        ,round(pr.pga_max_mem / power(1024,\
  \ 2))      pga_max_mb\n  7  from   v$session se\n  8        ,v$process pr\n  9 \
  \ where  se.paddr = pr.addr\n 10     and se.type != 'BACKGROUND'\n 11  order by\
  \ pr.pga_alloc_mem desc;\n```\n```\n  SID USERNAME PGA_USED_MB PGA_ALLOC_MB PGA_FREEABLE_MB\
  \ PGA_MAX_MB\n----- -------- ----------- ------------ --------------- ----------\n\
  \  173 K                   35           39               3         39\n   91 K \
  \                  16           28              10         28\n   50 K         \
  \          19           23               3         24\n  376 K                 \
  \  13           13               0         13\n```\n\n前三个内存数字分别表示当前已使用、已分配和可释放的内存，其中已使用加上可释放大致等于已分配。`pga_max_mem`列返回该进程曾达到的最大内存大小。请注意，对于本节中的所有实验，您的系统可能会显示略有不同的值，因为内存使用情况取决于确切的\
  \ Oracle 版本和操作系统。\n\n视图 `v$process_memory` 在 10g 中引入，但在 11g 之前存在错误，它提供了深入分析的功能。我用一个打印当前会话内存使用情况的存储过程来说明这一点。\n\
  \n```sql\ncreate or replace procedure print_session_mem\nis\nbegin\n  dbms_output.put_line('Category\
  \  Allocated KB     Used KB  Max all KB');\n  dbms_output.put_line('----------------------------------------------');\n\
  \  for c in (\n    select pm.*\n    from   v$session        se\n          ,v$process\
  \        pr\n          ,v$process_memory pm\n    where  se.sid   = sys_context('userenv',\
  \ 'sid')\n       and se.paddr = pr.addr\n       and pr.pid   = pm.pid\n  ) loop\n\
  \    dbms_output.put_line(rpad(c.category, 10)\n                      || to_char(round(c.allocated\
  \     / 1024), '999G999G999')\n                      || to_char(round(c.used   \
  \       / 1024), '999G999G999')\n                      || to_char(round(c.max_allocated\
  \ / 1024), '999G999G999'));\n  end loop;\nend print_session_mem;\n```\n\n然后我打印初始内存使用情况。\n\
  \n```sql\nSQL> set serveroutput on\nSQL> exec print_session_mem\nCategory  Allocated\
  \ KB     Used KB  Max all KB\n----------------------------------------------\nSQL\
  \                   44          38          44\nPL/SQL                38       \
  \   33          38\nOther                982         982\n\nPL/SQL procedure successfully\
  \ completed.\n```\n\n为了分配内存，我创建了一个包含全局关联数组的包。\n\n```sql\ncreate or replace package\
  \ mem#\nis\n  type t_char1000_tab is table of varchar2(1000) index by pls_integer;\n\
  \  g_list                         t_char1000_tab;\nend mem#;\n```\n\n接下来，我用数据填充全局变量，并再次打印内存使用情况。\n\
  \n```sql\nSQL> begin\n  2    select lpad('x', 1000, 'x')\n  3    bulk collect into\
  \ mem#.g_list\n  4    from   dual\n  5    connect by level <= 100000;\n  6  end;\n\
  \  7  /\n\nPL/SQL procedure successfully completed.\n\nSQL> exec print_session_mem\n\
  Category  Allocated KB     Used KB  Max all KB\n----------------------------------------------\n\
  SQL                   58          46       4,782\nPL/SQL           114,052     113,766\
  \     114,056\nOther              7,594       7,594\n\nPL/SQL procedure successfully\
  \ completed.\n```\n\nPL/SQL 内存使用量从 33 KB 跃升至 113,766 KB。包含杂项结构的类别 `Other` 也有所增加。接下来，我删除关联数组并再次测量内存使用情况。\n\
  \n```sql\nSQL> exec mem#.g_list.delete\n\nPL/SQL procedure successfully completed.\n\
  ```\n\n使用 `print_session_mem` 过程可以查看会话的内存分配情况。\n\n```sql\nSQL> exec print_session_mem\n\
  Category  Allocated KB     Used KB  Max all KB\n----------------------------------------------\n\
  SQL                 58          45       4,782\nPL/SQL         114,060         \
  \ 45     114,060\nOther            7,586       7,586\n\nPL/SQL procedure successfully\
  \ completed.\n```\n\n使用的 PL/SQL 内存几乎降回了初始值。分配的内存保持不变。可以通过在会话中调用 `dbms_session.free_unused_user_memory`\
  \ 过程将可释放的内存归还给操作系统。由于释放和分配的开销，不应过于频繁地调用它。\n\n```sql\nSQL> exec dbms_session.free_unused_user_memory\n\
  \nPL/SQL procedure successfully completed.\n```\n\n```sql\nSQL> exec print_session_mem\n\
  Category  Allocated KB     Used KB  Max all KB\n----------------------------------------------\n\
  SQL                 50          37       4,782\nPL/SQL              58         \
  \ 49     114,068\nFreeable         1,024           0\nOther            1,084   \
  \    1,830\n\nPL/SQL procedure successfully completed.\n```\n\n视图 `v$process_memory_detail`\
  \ 可以提供单个进程更详细的信息。通过执行 `alter session set events 'immediate trace name pga_detail_get\
  \ level <pid>'` 可以创建一个快照，其中 `<pid>` 从 `v$process` 获取。该视图对 PL/SQL 开发人员的实用性有限，因为返回的堆名称未完全文档化，并且细分不是按\
  \ PL/SQL 类型或编译单元进行的。详细的描述见 MOS Notes 822527.1 和 1278457.1。\n\n过程 `dbms_session.get_package_memory_utilization`（在\
  \ 10.2.0.5 和 11gR1 中引入）允许你下钻到使用内存的 PL/SQL 单元。这对于查找内存泄漏非常完美。此示例显示了填充 `mem#.g_list`\
  \ 后的内存使用情况：\n\n```sql\nSQL> declare\n  2    l_owner_names             dbms_session.lname_array;\n\
  \  3    l_unit_names              dbms_session.lname_array;\n  4    l_unit_types\
  \              dbms_session.integer_array;\n  5    l_used_amounts            dbms_session.integer_array;\n\
  \  6    l_free_amounts            dbms_session.integer_array;\n  7  begin\n  8 \
  \   dbms_session.get_package_memory_utilization(\n  9      owner_names  => l_owner_names\n\
  \ 10     ,unit_names   => l_unit_names  \n 11     ,unit_types   => l_unit_types\
  \  \n 12     ,used_amounts => l_used_amounts\n 13     ,free_amounts => l_free_amounts\n\
  \ 14    );\n 15    for i in 1..l_owner_names.count loop\n 16      dbms_output.put_line(\n\
  \ 17        case l_unit_types(i)\n 18          when  7 then 'PROCEDURE   '\n 19\
  \          when  8 then 'FUNCTION    '\n 20          when  9 then 'PACKAGE     '\n\
  \ 21          when 11 then 'PACKAGE BODY'\n 22          else         'TYPE     '\
  \ || lpad(l_unit_types(i), 3)\n 23        end || ' '\n 24      || rpad(l_owner_names(i)\
  \ || '.' || l_unit_names(i), 26)\n 25      || ' uses ' || to_char(round(l_used_amounts(i)\
  \ / 1024), '999G999G999')\n 26      || ' KB and has ' || to_char(round(l_free_amounts(i)\
  \ / 1024), '999G999G999')\n 27      || ' KB free.');\n 28    end loop;\n 29  end;\n\
  \ 30  /\nPACKAGE BODY SYS.DBMS_SESSION           uses            2 KB and has  \
  \          1 KB free.\nPACKAGE      SYS.DBMS_SESSION           uses            0\
  \ KB and has            1 KB free.\nPACKAGE BODY SYS.DBMS_OUTPUT            uses\
  \            2 KB and has            1 KB free.\nPACKAGE      SYS.DBMS_OUTPUT  \
  \          uses            0 KB and has            1 KB free.\nPACKAGE      K.MEM#\
  \                     uses      108,035 KB and has        5,414 KB free.\nPACKAGE\
  \ BODY SYS.DBMS_APPLICATION_INFO  uses            1 KB and has            0 KB free.\n\
  PACKAGE      SYS.DBMS_APPLICATION_INFO  uses            0 KB and has           \
  \ 1 KB free.\n\nPL/SQL procedure successfully completed.\n```\n\n缺点是该过程只能分析它运行所在会话的内存使用情况。\n\
  \n层次分析器 `dbms_hprof` 在 11g 中提供了一种未文档化的方法来分析内存分配和释放。过程 `start_profiling` 有两个新参数，`profile_pga`\
  \ 和 `profile_uga`。以下示例展示了如何使用后者：\n\n```sql\nSQL> create or replace directory hprof_dir\
  \ as '/tmp';\n\nDirectory created.\n\nSQL> begin\n  2    dbms_hprof.start_profiling(\n\
  \  3      location    => 'HPROF_DIR'\n  4     ,filename    => 'hprofuga'\n  5  \
  \   ,profile_uga => true\n  6    );\n  7  end;\n  8  /\n\nPL/SQL procedure successfully\
  \ completed.\n\nSQL> declare\n  2    procedure alloc\n  3    is\n  4    begin\n\
  \  5      select lpad('x', 1000, 'x')\n  6      bulk collect into mem#.g_list\n\
  \  7      from   dual\n  8      connect by level < 100000;\n  9    end alloc;\n\
  \ 10    procedure dealloc\n 11    is\n 12    begin\n 13      mem#.g_list.delete;\n\
  \ 14      dbms_session.free_unused_user_memory;\n 15    end dealloc;\n 16  begin\n\
  \ 17    alloc;\n 18    dealloc;\n 19  end;\n 20  /\n\nPL/SQL procedure successfully\
  \ completed.\n\nSQL> exec dbms_hprof.stop_profiling\n\nPL/SQL procedure successfully\
  \ completed.\n```\n\n要分析生成的配置文件，你可以在 `DBMS_HPROF.ANALYZE` 中使用相同的未文档化参数（它将字节输出存储在\
  \ `DBMSHP_PARENT_CHILD_INFO` 的 `_TIME` 列中），或者将参数 `-pga` 或 `-uga` 传递给 `plshprof`。\n\
  \n```sql\noracle@af230d:af230d > $ORACLE_HOME/bin/plshprof -uga -output hprofuga\
  \ hprofuga\nPLSHPROF: Oracle Database 11g Enterprise Edition Release 11.2.0.2.0\
  \ - 64bit Production\n[10 symbols processed]\n[Report written to 'hprofuga.html']\n\
  ```\n\n这会生成一个 HTML 报告，如 图 11-5 所示。\n\n![images](img/1105.jpg)\n\n*图 11-5. UGA 分配与释放内存分析*\n\
  \n该配置文件显示了 UGA 内存的分配和释放，而不是 UGA 内部的分配和释放。通过使用 `truss` 或类似工具跟踪 OS 调用可以收集到可比较的信息。请记住，层次分析器的这种用法是未文档化的，并且不受\
  \ Oracle 支持。\n\n我遇到过几次 Oracle 动态性能视图报告的内存与操作系统报告的数字不对应的情况。如果你遇到内存问题，也值得检查一下操作系统。分析进程内存错误的帮助可以在\
  \ MOS Notes 1088267.1 和 396940.1 中找到。\n\n`V$SYSSTAT` 和 `V$SESSTAT` 的历史 PGA 和 UGA\
  \ 快照值可以在工作负载仓库和 Statspack 视图 `DBA_HIST_SYSSTAT`、`PERFSTAT.STATS$SESSTAT` 和 `PERFSTAT.STATS$SYSSTAT`\
  \ 中找到。根据我的经验，这些信息不足以分析问题。因此，值得在外部循环中检查长时间运行的进程的内存使用情况，如果超过指定的阈值，则记录详细信息。如果可能，进程应定期重新启动自身，以从内存泄漏和未释放的锁中恢复。\n\
  \n\n#### 集合\n\n由于集合通常消耗大部分 PL/SQL 内存，因此了解如何为其分配内存以及如何减少其内存占用至关重要。Oracle 并未公开集合的实现细节，以便在未来版本中进行修改。因此，您必须自行测量内存分配情况，并注意通过这种方式收集的信息可能会因未来的\
  \ Oracle 版本而过时。\n\n许多数据类型在 Oracle 的 64 位版本上使用的空间比 32 位版本多出近一倍。我的测量是在 Solaris 10\
  \ x86-64 系统上进行的。\n\n我阐述以下几点，它们可能与您使用以 `pls_integer` 索引的关联数组进行编码时相关：\n\n*   关联数组的键（key）有大约\
  \ 27 字节的开销。对于 `pls_integer` 或 `Boolean` 数组来说，这个开销很显著，但对于更大的有效载荷（例如复杂记录或大字符串）则不然。在大多数情况下，就内存使用、性能和概念清晰度而言，使用记录的关联数组比使用多个基本类型的关联数组（如\
  \ `dbms_session.get_package_memory_utilization` 中那样）更好。对于行外分配的有效载荷，每个元素的总开销可能显著大于键的\
  \ 30 字节。\n*   空间是按大约 20 个连续索引一次性分配的。因此，就内存使用和性能而言，使用连续索引更好。\n*   从 11.2.0.2 版本开始，内存仅在删除数组的最后一个元素时才会被释放以供其他用途或返回给操作系统。这对于键和行内存储的小有效载荷都成立。行外存储的大有效载荷的内存通常立即释放。\n\
  *   将元素（例如 `varchar2`）定义得仅满足所需大小可能有好处，以避免过度分配。\n\n以 `varchar2` 索引的关联数组在除最后一点外的所有方面都不同。键的开销更大，并且取决于字符串的实际长度。空间一次只为一个元素分配，并且在某些情况下，删除后会立即释放。此外，以\
  \ `varchar2` 索引的数组比以 `pls_integer` 索引的对应数组慢得多。\n\n就内存使用和性能而言，使用其他集合类型（即 `varrays`\
  \ 和 嵌套表）并无优势。\n\n那么，让我通过以下过程来证明上述论断。我使用条件编译来改变集合中字符串的长度，并使用具有不同集合类型的过程。\n\n```sql\n\
  create or replace procedure coll_mem_usage(\n  i_step                         pls_integer\
  \ := 1\n ,i_elem_cnt                     pls_integer := 1000000\n)\nis\n  $IF $$COLL_TYPE\
  \ = 0 $THEN\n  type t_char_tab is table of varchar2($$string_len) index by pls_integer;\n\
  \  $ELSIF $$COLL_TYPE = 1 $THEN\n  type t_char_tab is table of varchar2($$string_len)\
  \ index by varchar2(10);\n  $ELSIF $$COLL_TYPE = 2 $THEN\n  type t_char_tab is table\
  \ of varchar2($$string_len);\n  $ELSIF $$COLL_TYPE = 3 $THEN\n  type t_char_tab\
  \ is varray(2147483647) of varchar2($$string_len);\n  $END\n  c_string_len     \
  \ constant pls_integer := $$string_len;\n  l_str             constant varchar2($$string_len)\
  \ := lpad('x', c_string_len, 'x');\n  l_list                     t_char_tab;\n\n\
  \  ------------------------------------------------------------------------------\n\
  \  procedure print_plsql_used_session_mem(\n    i_label                  varchar2\n\
  \  )\n  is\n    l_used                   number;\n  begin\n    $IF DBMS_DB_VERSION.VERSION\
  \ < 11 $THEN\n    select pr.pga_used_mem\n    $ELSE\n    select pm.used\n    $END\n\
  \    into   l_used\n    from   v$session        se\n          ,v$process       \
  \ pr\n          ,v$process_memory pm\n    where  se.sid      = sys_context('userenv',\
  \ 'sid')\n       and se.paddr    = pr.addr\n       and pr.pid      = pm.pid\n  \
  \     and pm.category = 'PL/SQL';\n    dbms_output.put_line(rpad(i_label, 18) ||\
  \ ' PL/SQL used '\n                         || to_char(round(l_used / 1024), '999G999G999')\
  \ || ' KB');\n  end print_plsql_used_session_mem;\nbegin\n  -- INIT --\n  dbms_output.put_line(i_elem_cnt\
  \ || ' elements of length ' || c_string_len || ' step '\n                      \
  \ || i_step || ' type ' || $$coll_type);\n  print_plsql_used_session_mem('Init');\n\
  \n  -- ALLOCATE ELEMENTS --\n  $IF $$COLL_TYPE = 2 OR $$COLL_TYPE = 3 $THEN /* NESTED\
  \ TABLE, VARRAY */\n  l_list := t_char_tab();\n  l_list.extend(i_elem_cnt * i_step);\n\
  \  $END\n  for i in 1..i_elem_cnt loop\n    l_list(i * i_step) := l_str;\n  end\
  \ loop;\n  print_plsql_used_session_mem('Allocated');\n\n  -- REMOVE ALL BUT 1 ELEMENT\
  \ --\n  for i in 2..i_elem_cnt loop\n    $IF $$COLL_TYPE != 3 $THEN /* ASSOCIATIVE\
  \ ARRAYS, NESTED TABLE */\n    l_list.delete(i * i_step);\n    $ELSE /* NO SINGLE\
  \ ELEMENT DELETE IN VARRAY */\n    l_list(i * i_step) := null;\n    $END\n  end\
  \ loop;\n  print_plsql_used_session_mem('1 element left');\n\n  -- ADD ANOTHER c_element_cnt\
  \ ELEMENTS --\n  $IF $$COLL_TYPE = 2 OR $$COLL_TYPE = 3 $THEN /* NESTED TABLE, VARRAY\
  \ */\n  l_list.extend(i_elem_cnt * i_step);\n  $END\n  for i in (i_elem_cnt + 1)..(2\
  \ * i_elem_cnt) loop\n    l_list(i * i_step) := l_str;\n  end loop;\n  print_plsql_used_session_mem('Allocated\
  \ on top');\n\n  -- DELETE ALL --\n  l_list.delete;\n  print_plsql_used_session_mem('All\
  \ deleted');  \nend coll_mem_usage;\n```\n\n该过程在创建时是无效的。它需要使用有效的条件编译标志进行编译，例如集合类型“以\
  \ pls_integer 索引的关联数组”，由 `coll_type` 等于 0 表示，以及 `string_len` 为 10。\n\n```sql\nSQL>\
  \ alter procedure coll_mem_usage compile plsql_ccflags='coll_type:0,string_len:10';\n\
  \nProcedure altered.\n```\n\n有效的过程可以被执行。\n\n```sql\nSQL> exec coll_mem_usage\n1000000\
  \ elements of length 10 step 1 type 0\nInit               PL/SQL used          \
  \  0 KB\nAllocated          PL/SQL used       36,144 KB\n1 element left     PL/SQL\
  \ used       36,144 KB\nAllocated on top   PL/SQL used       72,272 KB\nAll deleted\
  \        PL/SQL used           16 KB\n\nPL/SQL procedure successfully completed.\n\
  ```\n\n此输出显示键的开销为 27 字节。36,144 KB 除以 1,000,000 个条目得出每个条目 37 字节，其中 10 字节由字符串数组元素使用。删除除一个元素外的所有元素并不会释放任何空间，如“1\
  \ element left”列与“Allocated”列相比未发生变化所示。新元素无法重用已删除元素的空间，如“Allocated on top”使已用内存翻倍所示。\n\
  \n表 11-2 总结了使用不同参数运行该过程的结果。第二行显示，通过仅使用每第十个索引，内存使用量增加了十倍。进一步增加步长（step）将显示，大约二十个连续元素的空间是被一次性分配的。\n\
  \n当字符串长度为 100 时，字符串被行外分配，字符串（但不是索引）的已释放内存可以被重用，如第三行所示。在这种情况下，行外存储每个条目有 37 字节的开销和对齐损失。\n\
  \n对于连续索引，以 `varchar2` 索引的关联数组比以 `pls_integer` 索引的对应数组慢六倍，并且使用的内存是其两倍多。另一方面，它们的内存使用与步长无关。\n\
  \n嵌套表和变长数组的内存使用和性能与以 `pls_integer` 索引的关联数组大致相同。\n\n![images](img/t1102.jpg)\n\n\n\
  \n### 总结\n\n以数据为中心的应用程序的业务逻辑应属于数据库。这一主张有技术原因和成功的实践案例作为支撑。这种做法有许多技术优势，例如设计简单、高性能和安全性提升。此外，许多使用此设计的企业资源规划系统已成功运行多年，且新系统也基于此设计构建。\n\
  \n数据库中的 PL/SQL 业务逻辑会导致庞大的 PL/SQL 代码库。自然会产生一个问题：如何向用户交付一个满足时间、预算和外部产品质量要求，并能在未来进行维护的初始版本。在抽象层面上，任何架构的答案都是相同的。而\
  \ PL/SQL 的具体实现则在四个方面独具特色，我将在本章中阐述。\n\n*   **一致性**使得开发者能够更快、更透彻地理解彼此的代码。一致性比具体的约定更重要。尽管如此，仍有充分的理由将某些方面纳入您的\
  \ PL/SQL 编码规范中。\n*   **模块化**是开发团队可扩展性和应用程序可维护性的基础。模块化将分而治之的优势带入了软件工程。PL/SQL 以子程序、包和模式的形式提供了强大的模块化构造，并提供了基于依赖视图和\
  \ PL/Scope 的出色分析能力。\n*   **面向对象编程**允许增加复用性，这是在大型编程中降低成本和上市时间、提高质量的关键。虽然原样复用适用性有限，但面向对象编程提供的可适配复用能在更多情况下实现复用。PL/SQL\
  \ 不是一种面向对象语言，但可以通过所述模式集以面向对象的方式进行编程。\n*   大型应用程序的内存需求必须使用所述技术进行测量和优化。关于可扩展性和性能的设计有许多优秀资源，包括本书的若干章节。\n\
  \n"
- "# 演进式数据建模\n\n## 罗宾·桑兹\n\n大学刚毕业时，我为洛克希德公司工作。第一年，我所在的小组负责评估制造资源规划方法与工具。我对 MRP 很熟悉；它是我学士学位必修课程的一部分，而且我之前也有一些\
  \ MRP 系统的经验。然而，在洛克希德，MRP 是个非常新的概念，并且它与现有系统背后的理念截然相反。我的老板兼导师，斯基普·克里斯托弗森，在洛克希德工作的时间比我年纪还大，他了解洛克希德排程系统的方方面面，甚至是最微小的细节。我们下班后一起上\
  \ MRP 课程，那情景就像一个经典喜剧场景：伶牙俐齿的新手轻松掌握材料，而那位经验丰富、真正知道事物如何运作的老员工却费力地理解这种所有花哨功能的时髦技术的意义。每晚课程结束，我们走回那间没有窗户的办公室时，斯基普会谈论所有他认为这个愚蠢想法的错误之处——一个系统每晚都能处理变更并重新生成排程，而不会把装配线搞得一团糟。我在学习洛克希德如何处理排程的同时，也在上\
  \ MRP 课程，并开始理解并欣赏它的工作原理。斯基普是对的：MRP 与我们的流程模型完全相反，我们的模型是基于数学、统计和学习曲线的。利用数十年成功飞机项目积累的知识，你计算出装配过程特定阶段的边界，并将其与车间位置关联起来。这些位置和日期为每个工作组创造了一个时间窗口，以容纳他们对装配的贡献。在这些边界内，零件和排程可能会疯狂地调整，工作组也会疯狂加班，但流水线上的人都知道，满足下一个位置的计划移动日期至关重要，他们已经学会无论如何都要实现它。飞机总是向前移动，即使装配线上三个位置之后的工作组不得不拆掉四个位置的工作，以添加一个当时需要时还无法获得的预制零件。\n\
  \n随着课程的深入，斯基普对 MRP 的担忧加剧了，他课后的抱怨也更加激动。他现在知道装配线为了让排程得以执行所经历的一切。如果排程每晚都变，工人如何能跟上信息的涌入，更不用说跟上实际的零件和飞机了？一天晚上，我仔细斟酌了措辞，然后向我的导师说出了我的想法。鼓起勇气后，我说：“斯基普，排程现在已经在每天变化了。唯一的区别是，如果它在系统里，你就能看见了。”他突然变得非常安静，那是我最后一次听到他抱怨\
  \ MRP。后来，他成为了 MRP 系统实施的倡导者，并在该技术和实施过程中都成为了专家。\n\n变化总会发生，无论你是在制造飞机还是编写软件。你有一个选择：要么管理它，要么被它弄得措手不及。\n\
  \n\n### 从二十年的系统开发中学到的教训\n\n1989 年，斯吉普到我大学招聘时面试了我，在我为他工作期间，他教会了我许多东西。自那份大学毕业后的第一份工作以来，我参与了许多不同类型的软件系统项目。其中一些项目规模很小，我能够独自设计和构建整个应用程序；而另一些则涉及全球数百人的团队。我参与的大多数项目都很复杂，而且每一个项目都被期望遵循加速的设计和实施进度。尽管存在种种差异，但系统开发中有一些基本的现实始终如一。\n\
  \n## 客户不知道自己想要什么（直到他们看到它）\n\n客户只有在看到之后，才知道自己想要什么。只有当他们看到自己的数据能用来做什么时，他们才会开始理解一个新应用程序的真正可能性。也正是在这一刻，他们会开始向项目提出大量的变更请求。如果你想打造一款卓越的产品，最不该做的就是通过拒绝改变来扼杀他们的想法。\n\
  \n## 客户会撒谎（并非有意）\n\n套用格雷戈里·豪斯医生的话说，客户会撒谎。请客户描述他们的流程，大多数时候，他们会给出流程的文档化版本。客户并非有意误导我们，但\
  \ ISO 认证流程教会了他们通过描述当前文档化的步骤来回答流程相关的问题。然而，许多流程本身存在缺陷，并且很可能存在书面文档中未包含的额外步骤。**观察客户的实际操作**，你才会看到真正的流程。当你看到文档中没有的步骤时，那就是你找到构建创新产品的最佳机会。\n\
  \n## 系统必须让用户的工作更轻松\n\n如果你构建的系统能让用户的工作更轻松，他们就会使用它并提出更多要求：更多的选项、更多的功能和更高的性能。如果构建的应用程序只增加工作量却没有带来足够的益处，用户就会想办法绕过它，以从未设想过的方式使用它，或者完全避开它。这对他们来说是完全合理的反应：用户有工作要做，而对我们这些应用程序创建者来说至关重要的应用程序和代码，可能只是用户工作日中很小的一部分。当用户不得不绕过应用程序来完成工作时，就会报告更多的缺陷，数据也会随时间推移变得不准确。作为数据库和软件开发者，你需要记住，你的客户并不像你那样着迷于技术的细节。用户需要的是能够持续、可预测地工作的工具。\n\
  \n## 速度至关重要\n\n如果你不能快速提供工具或产品，别人就会提供。这既适用于最终产品，也适用于其构建所依赖的开发环境。如果产品上市迟了，潜在客户就会寻找其他解决方案和其他供应商。如果数据库不能及时支持应用程序开发人员，他们就会寻找其他解决方案来完成工作。即使该解决方案不如使用数据库可能达到的效果好，但以后要移除或优化它通常会非常困难。通常，此类解决方案会在应用程序功能、性能或两者上产生长远的负面影响。\n\
  \n## 数据库设计的挑战\n\n数据库管理系统擅长存储、搜索和转换数据。当与精心设计的数据模型相结合时，它们执行这些任务的速度将超过任何应用程序方法。挑战在于：数据库系统必须设计精良才能表现出色，并且能够在用户或数据量增长带来的日益增加的需求压力下持续表现出色。设计一个能够扩展以满足这些需求的数据库系统需要时间。如果在设计过程中走了捷径，数据库系统将无法满足性能要求；这通常会导致重大重新设计或硬件支出。这两种选择都代表了浪费和低效率：重新设计需要额外的时间和精力；即使硬件能够将系统性能提升到可接受的水平，试想一下，如果结合良好的设计和强大的硬件，系统的潜力将会有多大。\n\
  \n## 前进之路：拥抱变化\n\n这一切听起来相当令人沮丧：如果客户不知道自己想要什么，不能准确描述他们的流程，并且会误用工具来减少自己的工作量，那么软件开发者及其构建的应用程序似乎注定要失败。你无法在前期就做出好的设计，因为你不知道应用程序和数据最终会变成什么样子；即便你在项目开始时就掌握了关于最终需求的完整而准确的信息，当竞争对手也在瞄准相同客户群时，你也没有时间进行数据建模和系统设计。然而，如果数据库设计有缺陷，用户会对系统响应时间感到不满，你的项目也会因响应缓慢和系统崩溃而备受困扰。\n\
  \n还有另一个选择。你可以做一些革命性的事情：认识到变化是不可避免的，为之做好准备并加以管理。如果你预期变化，或者更好的是，鼓励变化并从中学习，你就打开了创造客户确切所需产品的可能性。如果你观察最终用户执行工作，而不是要求他们描述工作，你就会发现当前流程中的痛点，并且可能能够轻松地消除这些痛点。这给了你一个真正创新并构建用户需要但无人想到的工具的机会。如果你在客户参与的情况下构建应用程序，在开发早期就将新功能交到他们手中，征求反馈并利用这些反馈在开发早期改进应用程序，其结果将是一个协作的过程和一个更好的产品。如果你观察客户使用你构建的工具，你会发现更多改进产品的方法。这被称为*迭代式设计*，我相信它能带来更好的产品、更满意的客户以及软件开发者更愉悦的工作环境。\n\
  \n\n### 数据库与敏捷开发\n\n迭代开发并非新概念：已有大量书籍和专家探讨软件开发与迭代设计。但涉及数据库时，关于如何管理迭代数据库设计的有用信息却寥寥无几。与此同时，越来越多的应用数据库是在缺乏充分数据库设计的情况下创建的。无论是概念设计、逻辑设计还是物理设计，一个共同的主线是：在太多情况下，有意的设计规划是缺失的。这导致了一种极为常见的后果：数据库与应用未能达到预期性能。应用或许能通过功能测试要求，但一旦承受预期用户负载，其性能可能远不可接受。虽然让设计不佳的应用运行得更好是有可能的，但要构建一个能在并发用户不断增多、数据量持续增长的情况下依然满足性能预期的数据库，**必须**拥有一个设计精良的模式。你可以增加硬件资源来提升性能，但请思考一下：这些硬件资源中有多少仅仅是在弥补糟糕的设计？如果设计缺陷不存在，你本可以从硬件投资中获得多少额外收益？当模式存在缺陷时，应用代码所需的返工量会增加。这造成一个巨大的问题：数据库模式随时间推移被冻结，而应用功能却持续扩展。随着变更请求不断涌入，以及额外字段被强行添加到本已问题重重的模式设计中，性能问题变得越来越难以修复。\n\
  \n这类问题的最终结果是，架构师和开发者们得出结论：解决方案是尽可能在数据库中少放功能。这或许可以理解：因为他们已将数据库变更视为痛苦之事，于是试图通过避开数据库来规避这种痛苦。他们甚至避免使用数据库执行其最擅长的任务，因为他们担心未来可能需要变更它。对\"\
  **数据库无关性**\"的追求加剧了这一问题，导致 DBMS 中一些最佳特性和功能未被使用。不幸且颇具讽刺意味的结果是：一个非常昂贵的 DBMS 闲置着，而团队却费力地尝试重新创建那些在现有许可下已经可用且已付费的功能。选择授权一个强大的产品，然后却像购买了最低公分母一样来设计应用，这是开发团队可能犯下的最昂贵错误之一。无论\
  \ DBMS 是 Oracle、MySQL、Postgres 还是 SQL Server，都是如此。优秀的开发者很难得。为何要让他们花费时间去重新创建其他公司已构建、而你们公司已购买的功能？如果目标是构建一个有竞争力的产品，在最大化我们投资回报的同时满足客户需求，那么你应该充分利用你所购买的\
  \ DBMS 平台中每一个有用的功能。\n\n至此，我列举了软件开发项目中相互矛盾的目标：你需要快速构建；你需要在掌握足够知识之前就开始推进；你需要设计以支持长期性能目标，而这些性能目标很可能也是未知的。如果你还没有产品，你如何知道将来会吸引多少用户？如果你创造出令人惊叹和创新的东西，你将在比预期短得多的时间内获得比你想象中更多的用户。然后，你热情的用户将迅速使系统过载，导致又一个关于最新软件产品遭遇公开失败的头版新闻。你需要在追求稳定性的同时，通过迭代设计过程鼓励变更。你希望系统透明且易于使用，使用户无需每次连接都重新学习步骤就能完成工作，但你必须认识到，你对用户工作的理解可能并不准确。考虑到项目可能无法应对这些挑战的所有潜在方式，软件项目究竟如何才能成功？有一件事你不能做，那就是让时光倒流到开发速度没那么快的时代。相反，你必须预期设计将会变更，并配备数据库管理员、数据库开发者和应用开发者，以管理当今的变更，同时持续关注这些变更将对系统整体产生的长期影响。\n\
  \n![images](img/square.jpg`) **注意** 在本章中，将提及*数据库开发*和*应用开发*。这两个标签都可能指同一应用的开发，且一个开发者可能负责这两个层面的开发。本章旨在区分访问和处理数据的代码，与构建工具向终端用户展示数据的代码，而非暗示需要一个额外的组织层级或一组人员。\n\
  \n\n\n### 演化式数据建模\n\n## 理念阐述\n\n尽管前面描绘的图景充满挑战，但我相信你的目标是可以实现的——关键不是减少在数据库管理系统（DBMS）中的工作。要创建一个敏捷的开发环境和一个真正敏捷的应用程序数据库，最好的方法是在数据库内部编码更多功能，并充分利用\
  \ DBMS 最擅长的工作类型。你的数据库设计需要随着开发团队、客户和最终用户不断变化的需求而演进和适应。你需要在一条精细的线上行走：构建当前所需，同时放眼未来并为之准备。这就是为什么我更喜欢“演化式数据建模”这个术语，而非“迭代式数据建模”。“迭代”意味着设计周期在整个开发过程中重复：这是一个好的开始，但还不够。“演化”也意味着持续的变化，但伴随演化，每一次变化都建立在迄今已创建的基础之上。当设计演进时，你认识到它应该能够扩展以满足尚未完全定义的需求。你仍然不想在需求出现之前就构建功能，但也不应该以“你不会需要它”（YGANI）的名义做出限制未来选项的选择。你做出的一些设计决策会为后续设计阶段创造更多选项，而另一些则会移除选项，并限制下一轮开发中的潜在解决方案。在你确定接下来要发生什么之前，请做出尽可能保留更多开放选项的选择。\n\
  \n![images](img/square.jpg) `Note` 据我所知，“演化式数据建模”这个术语起源于 Scott W. Ambler 在其网站 `agiledata.org`\
  \ 上的内容。他还合著了一本书《重构数据库：演化式数据库设计》，其中包含了一些适用于敏捷开发的优秀方法论。本章描述的实现易于重构数据库的方法，与迄今为止我所看到的\
  \ Ambler 先生提出的任何建议都不同。\n\n## 案例分析\n\n例如，一个开发项目的数据库是从客户提供的 .csv 文件加载的。该文件中大约一半的列在第一轮功能规范中没有明确的用途。开发团队对于如何处理这些多余字段分成了两种观点。一方认为，所有不需要的列都应该被移除，因为它们没有被积极使用。另一方则认识到，尽管这些字段未被使用，但其值与应用程序核心数据值有明确的关系。他们认为这些字段可能有助于团队更好地理解所需数据以及最终用户如何处理这些数据。\n\
  \n这些不必要的字段被保留了下来。虽然它们看起来像是核心表中数据的父值，但解决方案是将这些字段保留为属性，以便可以进一步评估关系，而不会给数据库开发人员带来额外的工作（以及后续的返工）。这个决定打破了传统数据建模的几条规则：表中包含了不必要的数据，并且模式中的某些数据未被规范化。由于核心表仍然很小且宽度合理，违反规则的影响微乎其微。几个版本之后，客户开始提及这些未使用的字段，这证实了先前怀疑的关系。随着新功能的请求，这些数据值逐渐被整合到应用程序中，有些数据值移动到了父表，而另一些则作为属性保留下来。过早移除数据会限制团队的选择。如果过早地将数据正式整合到模式中，保留数据则可能造成返工。在这种情况下，以对影响最小化的形式保留数据，同时为日后使用敞开大门，是更好的决策。\n\
  \n## 后续内容预告\n\n在下一节，你将看到演示简单模式变更的代码，以及此类变更如何在典型的开发环境中产生连锁反应。接下来，你将研究为什么使用 PL/SQL\
  \ 作为 API 通过使得在不影响其他应用程序组件的情况下更轻松地重构数据库设计，从而支持演化式设计。之后，你将回顾一些敏捷开发概念，并讨论演化式数据建模和 PL/SQL\
  \ API 如何支持敏捷开发的价值观和原则。\n\n\n### 重构数据库\n\n你将使用 Oracle 示例数据库中的人力资源（HR）模式，来演示对数据库模式进行的一项简单变更，并展示这些变更可能如何对应用程序内的其他功能产生意外影响。Oracle\
  \ 提供的默认 HR 模式在员工表中包含一个电话号码字段。客户要求修改应用程序，以存储并显示每位员工的办公电话和移动电话号码。界面和报告将需要相应修改，因为有些仍需要特定的一个电话号码，而另一些则需要同时使用两个电话号码。例如，公司通讯录可能同时显示员工的座机和手机号码，而一份设施报告则只需要座机号码。\n\
  \nHR 模式的原始结构如图 12-1 所示。你需要确定新数据的存储位置以及如何向用户呈现信息。你应该考虑多种合理的解决方案，并决定哪一种（或哪几种）方案需要进行测试。\n\
  \n![图片](img/1201.jpg)\n\n**图 12-1.** 未变更的人力资源模式\n\n对于此类需求，一个常见的解决方案是向`EMPLOYEES`表中添加一个额外的列（`EMPLOYEES.MOBILE_NUMBER`）。虽然这可能解决了最初的需求，但解决该问题有更好的方法，因为这种方法只满足了眼前的需求。当人力资源部门决定还需要员工的家庭电话号码时怎么办？你可以继续添加列，但如果每个新增数据的需求都通过向`EMPLOYEES`表末尾添加一列来解决，你的表很快就会变得非常宽，且数据分布稀疏。这第一种方案也是一个相对局限的解决方案。如果一个员工在两个不同的办公室工作并拥有两个不同的办公电话号码怎么办？如果一位员工更倾向于通过手机联系，而另一位则更容易通过办公室电话联系，并且部门管理员需要一份包含所有员工及其最佳联系方式的报告怎么办？你可以再添加一列来存储员工偏好的电话类型指示符，然后让应用程序遍历数据，为一些员工提取办公电话号码，为另一些提取手机号码。这种类型的设计过程是性能问题如何产生的一个典型例子。列不断地被拼接到表上，并且需要更多的应用程序代码来处理这些列中的数据。最终，表变得非常宽，访问数据的代码因为数据库外部要做更多本应在`DBMS`中完成的排序和分组操作而变得越来越复杂，性能开始螺旋式下降。\n\
  \n更好的解决方案是创建另一个表来存储多个电话号码，并使用`EMPLOYEE_ID`关联回`EMPLOYEES`表。与第一种方案相比，这种方法有几个优点：数据库不会人为限制每个员工可存储的电话号码数量，而且你可以存储关于电话号码的额外属性，例如电话类型和首选电话。\n\
  \n清单 12-1 展示了如何添加一个表来存储员工 ID、电话号码、电话类型以及一个指示哪个电话号码是员工首选联系方式的标识。这段代码将创建新表并从现有表中填充数据。所有电话号码将被设置为默认类型“Office”（办公），首选标识将被设置为“Y”（是）。\n\
  \n然后，你将使用`EMPLOYEES`表中的数据填充新表。由于系统中所有员工之前都只有一个电话号码，你可以为所有员工设置默认的电话类型和首选标识为相同的值。\n\
  \n**清单 12-1.** 创建表并填充`EMP_PHONE_NUMBER`\n\n```sql\nSQL>  CREATE TABLE emp_phone_numbers\n\
  \        (employee_id    NUMBER(6)                  NOT NULL,\n         phone_number\
  \   VARCHAR2(20)               NOT NULL,\n         preferred      VARCHAR2(1)  \
  \ DEFAULT 'N' NOT NULL,\n         phone_type     VARCHAR2(10)               NOT\
  \ NULL,\n            CONSTRAINT  emp_phone_numbers_pk\n            PRIMARY KEY (employee_id,\
  \ phone_number)\n         ) ;\n\nTable created.\n\nSQL>  alter table EMP_PHONE_NUMBERS\
  \ add constraint emp_phone_numbers_fk1\n        foreign key (employee_id)\n    \
  \    references EMPLOYEES (employee_id) ;\n\nTable altered.\n\nSQL>  insert into\
  \ emp_phone_numbers (\n        select employee_id, phone_number, 'Y', 'Office' from\
  \ employees) ;\n\n107 rows created.\n\nSQL>  commit;\n\nCommit complete.\n```\n\n\
  一些数据库重构方法建议，你应该在数据库中保留旧列，在确定所有对旧列的引用都已解决之前，同时填充新旧两个数据点。任何时候，如果你在数据库的多个地方存储相同的数据，就存在数据不同步的风险。然后你就需要对其进行协调，确定哪些值是正确的，并修复数据。在一个真实的人力资源数据库中，数据协调和修复可能是一项巨大的工作。有一些选项可以最小化此类问题的风险，但它们通常涉及将数据从一个源复制到另一个源，而这可能无法防止目标列被独立更新。如果对数据库的所有更改都需要维护多个数据源（即使是临时的），最终结果将是一个非常难以管理的开发环境。当你意识到典型的开发团队在任何时候都在响应多个变更请求时，这种方法会变得更加复杂。当开发人员在处理其他变更请求时，他们是否必须构建新的代码来同时支持旧字段和新字段？这些遗留的数据值可能在系统中保留多久？良好性能的关键在于消除不必要的工作：这对于流程和系统同样适用。如果开发团队要保持敏捷，你必须尽量减少他们需要完成的工作量。维护多个代码路径数周、数月或数年，并不是对开发资源的最佳利用。\n\
  \n更新查询以使用新表所需的变更很简单：你在 from 子句中添加另一个表，并在 where 子句中通过`EMPLOYEE_ID`连接`EMPLOYEES`表和`EMP_PHONE_NUMBERS`表。如果应用程序是在应用程序代码层（如`Java`、`PHP`等）中直接使用`SQL`调用编写的，那么类似清单\
  \ 12-2 中显示的第一个查询可能会出现在应用程序中每个引用基本员工信息的模块代码中。清单 12-2 展示了一个在表设计变更前获取包含员工电话号码的员工信息的查询，以及该查询在表变更完成后如何被修改以请求相同的数据。\n\
  \n**清单 12-2.** 员工数据请求\n\n```sql\nSQL>  select dept.department_name,\n          \
  \   loc.street_address,\n             loc.city,\n             loc.state_province,\n\
  \             loc.postal_code,\n             cty.country_name ,\n             emp.employee_id\
  \ ,\n             emp.last_name,\n             emp.first_name,\n             emp.email,\n\
  \             emp.phone_number\n        from departments dept,\n             locations\
  \ loc,\n             countries cty,\n             employees emp\n       where dept.department_id\
  \ = &DepartmentID\n         and dept.location_id = loc.location_id\n         and\
  \ loc.country_id = cty.country_id\n         and dept.department_id = emp.department_id\n\
  \       order by dept.department_name, emp.last_name, emp.first_name ;\n```\n\n"
- "# SQL 查询与模式变更分析\n\n`SQL> select dept.department_name,\n             loc.street_address,\n\
  \             loc.city,\n             loc.state_province,\n             loc.postal_code,\n\
  \             cty.country_name,\n             emp.employee_id EMP_ID,\n        \
  \     emp.last_name,\n             emp.first_name,\n             emp.email,\n  \
  \           epn.phone_number\n      from departments dept,\n           locations\
  \ loc,\n           countries cty,\n           employees emp,\n           emp_phone_numbers\
  \ epn\n     where dept.department_id = &DepartmentID\n       and dept.location_id\
  \ = loc.location_id\n       and loc.country_id = cty.country_id\n       and dept.department_id\
  \ = emp.department_id\n       and emp.employee_id = epn.employee_id\n     order\
  \ by dept.department_name, emp.last_name, emp.first_name;`\n\n由于目前每个员工只填充了一个电话号码，采购部的两个查询的结果集是完全相同的。此时，任一查询都将返回如\
  \ 清单 12-3 所示的数据。\n\n### 清单 12-3. 部门 30（采购部）的简略员工数据\n\n```\nDEPT_NAME   EMP_ID LAST_NAME\
  \    FIRST_NAME    EMAIL       PHONE_NO\n采购部      114    Raphaely     Den      \
  \     DRAPHEAL    515.127.4561\n采购部      115    Khoo         Alexander     AKHOO\
  \       515.127.4562\n采购部      116    Baida        Shelli        SBAIDA      515.127.4563\n\
  采购部      117    Tobias       Sigal         STOBIAS     515.127.4564\n采购部      118\
  \    Himuro       Guy           GHIMURO     515.127.4565\n采购部      119    Colmenares\
  \   Karen         KCOLMENA    515.127.4566\n```\n\n![images](img/square.jpg) **注意**\
  \ 为保持示例可读性，结果集可能经过编辑，以缩短列名和/或移除对示例不重要的数据。对示例不关键的结果可能不会显示。\n\n## 潜在问题与疑问\n\n表结构的更改为您的应用程序带来了几个潜在问题，这些问题很可能影响用户界面并产生新的错误报告。解决这些问题将需要从业务的功能侧获得反馈，因为您需要了解客户希望应用程序如何行为。以下是您需要弄清楚的几个问题：\n\
  \n*   客户期望如何输入员工电话号码数据？这个问题的答案将帮助您确定在确保可以安全删除原始列之前，保持两个数据源同步的方案。\n*   您是否应该将电话类型和首选标志添加到相关查询中？在查询中包含此信息将为您处理界面和报告提供更多选择。\n\
  *   哪些查询需要为每个员工返回一个电话号码，哪些查询应返回多个电话号码？一旦员工的手机号码进入系统，清单 12-2 中查询的结果集将**不再相同**，因为原始查询只会返回一行，而新查询可能为一个员工返回多行。\n\
  *   如果存在基于此类查询构建的视图，向视图中添加额外字段是否会破坏应用程序？如果有人使用 `Select * from EMPLOYEES_BY_DEPT_VW`\
  \ 来请求数据，那么会的。\n\n## 后续步骤与挑战\n\n一旦您回答了这些问题，您需要为所有引用 `EMPLOYEES` 表并使用电话号码数据的查询或更新确认相同的信息。否则，您的微小更改可能会在客户初始请求未预期的地方影响应用程序前端。\n\
  \n在您的应用程序中可能存在许多相似但略有不同的查询：不同的列顺序、由于不同的 `where` 子句导致不同的结果集、所选列的不同组合。每一段使用了原始电话号码字段的代码都需要被找到、更新和测试。保留旧列并同步数据将为您争取更多时间来找到所有需要修正的代码，但所有这些工作仍然需要完成。\n\
  \n重构数据库模式的**最大**挑战是找到并更改所有引用您所修改表的组件。如果开发人员一直很尽职，也许他们已经构建了可重用模块来处理 `EMPLOYEE` 数据的请求，那么您需要查找的代码就会更少。但是，您真的能确定没有人编写过一个虽小但未知、会在表结构更改时失败的查询或更新吗？在这个例子中，您只考虑了一个\
  \ `select` 语句。在一个人力资源系统中，将会有大量的应用程序代码用于添加员工、更改员工数据以及生成使用电话号码数据的报告。查看图 12-1 中的模式图，您会注意到存在循环引用，因为员工的经理是通过经理的员工\
  \ ID 在员工记录中标识的。包含员工和经理电话号码的查询、更新和报告可能需要更复杂的更改。而且，为了使事情真正有趣起来，订单录入模式也使用了 `EMPLOYEES`\
  \ 表，使用 `EMPLOYEE_ID` 来指示完成销售的销售代表，因此您这个非常小的更改现在影响了多个模式和多个应用程序模块。当您想到这个模式是多么简单，并想象大多数数据存储可以有多复杂时，由提及模式变更所产生的恐惧就变得稍微可以理解一些了。\n\
  \n\n### 通过 PL/SQL 创建访问层\n\n如果您将模块化、可重用的代码直接创建在数据库本身中，使得对应用数据的所有访问都封装在 PL/SQL 包、过程和函数中，会怎么样？清单\
  \ 12-2 中引用的查询将被整合到一个过程中，如清单 12-4 所示。清单 12-5 展示了执行该过程的代码，而清单 12-6 则展示了一次示例执行的结果。此练习创建了一个可由数据库外部组件调用的过程，以返回与清单\
  \ 12-2 中第一个查询相同的数据。\n\n## 清单 12-4. 按部门返回员工数据的过程\n\n```sql\nCREATE OR REPLACE PROCEDURE\
  \ GetEmployeeData(\n       p_dept_id        IN  NUMBER,\n       p_emp_cursor   \
  \     OUT SYS_REFCURSOR,\n       p_status_code       OUT NUMBER,\n       p_status_message\
  \ OUT VARCHAR2) IS\n/********************************************************************************\n\
  \    NAME: GetEmployeeData\nPURPOSE: This procedure returns contact information\
  \ for employees by department\n\n  NOTES:\n\n      p_status_code  status_message\n\
  \      ==============  ======================================================\n\
  \                  0  Success\n             -20102  Input parameter p_dept_id must\
  \ not be null.\n\n***************************************************************************************/\n\
  BEGIN -- GetEmployeeData\n\n--validate parameters\nIF ((p_department_id) IS NULL\
  \ ) THEN\n   RAISE_APPLICATION_ERROR(-20102, Input parameter p_dept_id must not\
  \ be null.',TRUE);\nEND IF;\n\nOPEN p_emp_cursor FOR\n   SELECT\n         dept.department_id,\n\
  \         dept.department_name,\n         loc.street_address,\n         loc.city,\n\
  \         loc.state_province,\n         loc.postal_code,\n         cty.country_name,\n\
  \  CURSOR (select emp.employee_id,\n                 emp.last_name,\n          \
  \       emp.first_name,\n                 emp.email,\n                 emp.phone_number\n\
  \            from employees emp\n           where emp.department_id = dept.department_id)\
  \ emp_cursor\n      FROM\n           departments dept, locations loc, countries\
  \ cty\n     WHERE\n           dept.department_id = p_dept_id\n       AND dept.location_id\
  \ = loc.location_id\n       AND loc.country_id = cty.country_id\n     ORDER BY 2,3;\n\
  \n  p_status_code:= 0;\n  p_status_message:= NULL;\n\nEXCEPTION\n  WHEN OTHERS THEN\n\
  \    p_status_code:= SQLCODE;\n    p_status_message:= SQLERRM;\n\nEND GetEmployeeData;\n\
  /\n```\n\n## 清单 12-5. 过程执行脚本\n\n```sql\nset serveroutput on\n\n         var p_main_cursor\
  \ REFCURSOR\n\nDECLARE\n         v_dept_id         departments.department_id%TYPE;\n\
  \         v_status_code     NUMBER;\n         v_status_message  VARCHAR2(200);\n\
  \n         t0 timestamp;\n         t1 timestamp;\n\nBEGIN\n         t0:= systimestamp;\n\
  \n         v_dept_id := &Department_ID;\n\n  GetEmployeeData\n          (v_dept_id,\
  \ :p_main_cursor, v_status_code, v_status_message);\n\n  t1:= systimestamp;\n\n\
  DBMS_OUTPUT.PUT_LINE('Code=' || v_status_code || 'Message=' || v_status_message);\n\
  DBMS_OUTPUT.PUT_LINE('ela=' || (t0 - t1) );\n\nEND;\n/\n\n   print :p_main_cursor\n\
  ```\n\n## 清单 12-6. 过程执行及结果集\n\n```sql\nSQL> @exec_GetEmployeeData.prc\n\nEnter value\
