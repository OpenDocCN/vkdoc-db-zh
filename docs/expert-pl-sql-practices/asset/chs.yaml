- "# 扩展统计\n\n统计信息是基于函数的索引的优势之一。这些信息对于 CBO（基于成本的优化器）来说可能非常宝贵（即使它选择不使用该索引，也可以利用这些统计信息来决定连接或谓词的顺序）。然而，为\
  \ PL/SQL 函数谓词创建索引可能并不总是可行。在这种情况下，Oracle 数据库 11g 提供了一种替代方案，称为**扩展统计**。\n\n扩展统计可以在无需支持性索引的情况下，基于表达式创建。此类统计信息被称为**扩展**，它们相对于基于函数的索引有一个额外好处：可应用于查询中的所有\
  \ PL/SQL 函数表达式（即不仅限于谓词中的表达式）。\n\n为了演示这一点，我重新执行了按客户分类的销售报告，并启用了扩展统计。清单 9-46 重温了未使用扩展统计时的查询，以及来自清单\
  \ 9-5 的执行计划和函数调用输出。\n\n## 清单 9-46. 在投影的 PL/SQL 函数上使用扩展统计（无统计信息的执行计划，来自清单 9-5）\n\n\
  ```sql\nSQL> SELECT t.calendar_year\n  2  ,      format_customer_name(\n  3    \
  \        c.cust_first_name, c.cust_last_name\n  4            )                 AS\
  \ cust_name\n  5  ,      SUM(s.quantity_sold) AS qty_sold\n  6  ,      SUM(s.amount_sold)\
  \   AS amt_sold\n  7  FROM   sales     s\n  8  ,      customers c\n  9  ,      times\
  \     t\n 10  WHERE  s.cust_id = c.cust_id\n 11  AND    s.time_id = t.time_id\n\
  \ 12  GROUP  BY\n 13         t.calendar_year\n 14  ,      format_customer_name(\n\
  \ 15            c.cust_first_name, c.cust_last_name\n 16            )\n 17  ;\n\n\
  11604 rows selected.\n```\n\n耗时: 00:00:06.94\n\n```\n执行计划\n----------------------------------------------------------\n\
  Plan hash value: 3113689673\n\n-------------------------------------------------------------\n\
