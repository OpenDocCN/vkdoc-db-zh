  \n![images](img/square.jpg) **注意** 如果您将 PL/SQL 循环代码重写为连接语句，需要考虑重复记录的问题。如果 `customers`\
  \ 表中存在相同 `cust_id` 列的重复记录，那么重写的 SQL 语句将检出比预期更多的行。然而，在这个特定的例子中，`customers` 表的 `cust_id`\
  \ 列上存在主键，因此使用 `cust_id` 列上的等值谓词不会有重复数据的风险。\n\n\n### 逐行嵌套处理\n\n在 PL/SQL 语言中，您可以嵌套游标。一种常见的编码实践是：从一个游标中检索值，将这些值传递给另一个游标，再将第二级游标的值传递给第三级游标，以此类推。但是，如果游标嵌套层次很深，基于循环的代码的性能问题就会加剧。由于游标的嵌套，SQL\
  \ 执行次数会急剧增加，导致程序运行时间延长。\n\n在代码清单 1-3 中，游标`c1`、`c2`和`c3`是嵌套的。游标`c1`是顶级游标，从表`t1`中检索行；然后打开游标`c2`，传入来自游标`c1`的值；接着打开游标`c3`，传入来自游标`c2`的值。对于从游标`c3`检索到的每一行，都会执行一条`UPDATE`语句。即使`UPDATE`语句经过优化，执行只需\
  \ 0.01 秒，深层嵌套的游标仍会导致程序性能下降。假设游标`c1`、`c2`和`c3`分别检索 20 行、50 行和 100 行数据。那么代码将循环处理 100,000\
  \ 行，程序的总耗时将超过 1,000 秒。优化这类程序通常需要完全重写。\n\n**代码清单 1-3.** 使用嵌套游标进行逐行处理\n\n```sql\n\
  DECLARE\n  CURSOR c1 AS\n    SELECT n1 FROM t1;\n  CURSOR c2 (p_n1) AS\n    SELECT\
  \ n1, n2 FROM t2 WHERE n1=p_n1;\n  CURSOR c3 (p_n1, p_n2) AS\n    SELECT text FROM\
  \ t3 WHERE n1=p_n1 AND n2=p_n2;\nBEGIN\n  FOR c1_rec IN c1\n  LOOP\n    FOR c2_rec\
  \ IN c2 (c1_rec.n1)\n    LOOP\n      FOR c3_rec IN c3(c2_rec.n1, c2_rec.n2)\n  \
  \    LOOP\n        -- 在此处执行某些 SQL;\n        UPDATE … SET ..where n1=c3_rec.n1 AND\
  \ n2=c3_rec.n2;\n      EXCEPTION\n      WHEN no_data_found THEN\n        INSERT\
  \ into… END;\n      END LOOP;\n    END LOOP;\n  END LOOP;\nCOMMIT;\nEND;\n/\n```\n\
  \n代码清单 1-3 中的代码还存在另一个问题，即执行了`UPDATE`语句。如果`UPDATE`语句引发了`no_data_found`异常，则会执行`INSERT`语句。使用`MERGE`语句，可以将这类处理从\
  \ PL/SQL 转移到 SQL 引擎中执行。\n\n从概念上讲，代码清单 1-3 中的三个循环代表了表`t1`、`t2`和`t3`之间的等值连接。在代码清单\
  \ 1-4 中，该逻辑被重写为一个带别名`t`的 SQL 语句。`UPDATE`和`INSERT`的组合逻辑被替换为一条`MERGE`语句。`MERGE`语法提供了在行存在时更新、不存在时插入的能力。\n\
  \n**代码清单 1-4.** 使用 MERGE 语句重写的逐行处理逻辑\n\n```sql\nMERGE INTO fact1 USING\n(SELECT\
  \ DISTINCT c3.n1,c3.n2\n FROM t1, t2, t3\n WHERE t1.n1      = t2.n1\n AND t2.n1\
  \        = t3.n1\n AND t2.n2        = t3.n2\n) t\nON (fact1.n1=t.n1 AND fact1.n2=t.n2)\n\
  WHEN matched THEN\n  UPDATE SET .. WHEN NOT matched THEN\n  INSERT .. ;\n  COMMIT;\n\
  ```\n\n请不要在 PL/SQL 语言中编写具有深层嵌套游标的代码。检查一下，看看是否可以改用 SQL 来编写此类代码。\n\n### 查询（Lookup\
  \ Queries）\n\n查询通常用于填充变量或执行数据验证。在循环中执行查询会导致性能问题。\n\n在代码清单 1-5 中，高亮显示的查询使用查询来获取`country_name`。对于游标`c1`返回的每一行，都会执行一次获取`country_name`的查询。随着从游标`c1`检索到的行数增加，查询的执行次数也会增加，导致代码性能低下。\n\
