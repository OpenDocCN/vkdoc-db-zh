  \ `SALES` “表”中，并且你的 DML 语句不会受到影响，如 清单 9-30 所示。\n\n### 通过带有标量子查询的视图对表执行 DML\n\n```sql\n\
  SQL> RENAME sales TO sales_t;\n\nTable renamed.\n\nSQL> CREATE VIEW sales\n  2 \
  \ AS\n     SELECT s.prod_id, s.cust_id, s.time_id, s.channel_id,\n            s.promo_id,\
  \ s.quantity_sold, s.amount_sold,\n            s.amount_sold * (SELECT r.exchange_rate\n\
  \                             FROM   rates r\n                             WHERE\
  \  r.base_ccy   = 'USD'\n                             AND    r.target_ccy = 'GBP'\n\
  \                             AND    r.rate_date  = s.time_id) AS amount_sold_gbp\n\
  \     FROM   sales_t  s;\n\nView created.\n\nSQL> INSERT INTO sales\n     ( prod_id,\
  \ cust_id, time_id, channel_id, promo_id,\n       quantity_sold, amount_sold )\n\
  \  2  VALUES\n     ( 13, 987, DATE '1998-01-10', 3, 999, 1, 1232.16 );\n\n1 row\
  \ created.\n\nSQL> UPDATE sales\n  2  SET    amount_sold = 10000\n  3  WHERE  ROWNUM\
  \ = 1;\n\n1 row updated.\n\nSQL> DELETE\n  2  FROM   sales\n  3  WHERE  amount_sold\
  \ = 10000;\n\n1 row deleted.\n```\n\n要使用此方法，需要考虑任何现有的代码库，例如 `%ROWTYPE` 声明、基于 PL/SQL\
  \ 记录的 DML、未限定的 `INSERT` 或 `SELECT` 列表（即那些没有显式列引用的列表）等。幸运的是，视图中的派生列无法被修改，正如本节最后一个示例在\
  \ 清单 9-31 中演示的那样。\n\n### 通过带有标量子查询的视图对表执行 DML\n\n```sql\nSQL> INSERT INTO sales\n\
  \     ( prod_id, cust_id, time_id, channel_id, promo_id,\n       quantity_sold,\
  \ amount_sold, amount_sold_gbp )\n  2  VALUES\n     ( 13, 987, DATE '1998-01-10',\
  \ 3, 999, 1, 1232.16, 1000 );\n     quantity_sold, amount_sold, amount_sold_gbp\
  \ )\n                         *\nERROR at line 3:\nORA-01733: virtual column not\
  \ allowed here\n```\n\n\n##### 使用虚拟列\n\n为了总结本节关于使用 SQL 表达式替代 PL/SQL 函数的内容，我将演示如何用虚拟列替换\
  \ PL/SQL 函数。\n\n虚拟列是 Oracle Database 11g 的一项功能，它们是作为列元数据存储在表中的表达式（本身不占用任何存储空间）。它们在逻辑上类似于视图中的列，但灵活性要高得多，因为可以为其收集统计信息或创建索引。虚拟列是封装简单业务规则的绝佳工具，而且由于它们作为元数据存储在表旁，因此也是数据逻辑的自我文档化声明。\n\
  \n为了演示虚拟列作为 PL/SQL 函数的替代方案，我转换了清单 9-6 中的销售报告。回顾一下，该清单使用了 `FORMAT_CUSTOMER_NAME`\
  \ 函数来格式化客户名称，执行时间接近 7 秒（而纯 SQL 查询只需 1 秒）。为了开始转换，我向 `CUSTOMERS` 表添加了一个虚拟列，如清单 9-32\
  \ 所示。\n\n**清单 9-32.** 将 PL/SQL 函数转换为虚拟列（语法）\n\n```\nSQL> ALTER TABLE customers ADD\n\
  \  2  ( cust_name VARCHAR2(100) GENERATED ALWAYS AS (cust_first_name||' '||cust_last_name)\
  \ )\n  3  ;\n\nTable altered.\n```\n\n`GENERATED ALWAYS AS (expression)` 语法是虚拟列特有的（我省略了可选的\
  \ `VIRTUAL` 关键字以使显示保持在一行）。`CUSTOMERS` 表现在如清单 9-33 所示。\n\n**清单 9-33.** 将 PL/SQL 函数转换为虚拟列（表描述）\n\
  \n```\nSQL> SELECT column_name\n  2  ,      data_type\n  3  ,      data_default\n\
  \  4  FROM   user_tab_columns\n  5  WHERE  table_name = 'CUSTOMERS'\n  6  ORDER\
  \  BY\n  7         column_id;\n\nCOLUMN_NAME                    DATA_TYPE      \
  \ DATA_DEFAULT\n------------------------------ --------------- -----------------------------------------\n\
  CUST_ID                        NUMBER\nCUST_FIRST_NAME                VARCHAR2\n\
  CUST_LAST_NAME                 VARCHAR2\nCUST_GENDER                    CHAR\n<...output\
  \ removed...>\nCUST_VALID                     VARCHAR2\nCUST_NAME              \
  \        VARCHAR2        \"CUST_FIRST_NAME\"||' '||\"CUST_LAST_NAME\"\n```\n\n在\
  \ SQL 语句中使用虚拟列与使用任何其他表、视图或其他列没有区别。转换后的销售报告如清单 9-34 所示。\n\n**清单 9-34.** 将 PL/SQL\
  \ 函数转换为虚拟列（用法）\n\n```\nSQL> SELECT t.calendar_year\n  2  ,      c.cust_name\n  3\
  \  ,      SUM(s.quantity_sold) AS qty_sold\n  4  ,      SUM(s.amount_sold)   AS\
  \ amt_sold\n  5  FROM   sales     s\n  6  ,      customers c\n  7  ,      times\
  \     t\n  8  WHERE  s.cust_id = c.cust_id\n  9  AND    s.time_id = t.time_id\n\
  \ 10  GROUP  BY\n 11         t.calendar_year\n 12  ,      c.cust_name;\n\n11604\
  \ rows selected.\n\nElapsed: 00:00:01.20\n```\n\n从这个查询的执行时间可以看出，通过将客户名称格式化移至虚拟列，我消除了\
  \ PL/SQL 函数的开销，同时将业务逻辑的封装性与它所应用的实际数据保留在了一起。\n\n#### 减少执行次数\n\n在本章前面，我描述了无法可靠预测一条\
  \ SQL 语句将调用 PL/SQL 函数的次数这一事实。此外，每次执行除了 PL/SQL 函数本身要完成的工作外，还会带来上下文切换的开销。不过，有一些技术可以用来可靠地*减少*函数调用，接下来我将演示其中一些。\n\
  \n##### 使用 SQL 提示进行预/后计算\n\n我在清单 9-8 到清单 9-10 中给出了一个 CBO（基于成本的优化器）进行查询转换的例子，在该例中，我试图在内联视图中预计算格式化的客户名称，但因视图合并而被否定了。结果是\
  \ 918,000 次 PL/SQL 函数执行（即在较大的 `SALES` 表中每行执行一次），而不是预期的 55,500 次调用（即在 `CUSTOMERS`\
  \ 表中每行执行一次）。对于某些查询，这种数量级甚至更多的函数执行可能是灾难性的。\n\n我在清单 9-35 中重复了客户销售报告。然而，这次我使用了几个提示来确保在内联视图中对客户名称的预计算能够“坚持”，并且\
  \ CBO 不会合并查询块。\n\n**清单 9-35.** 通过 SQL 减少函数调用\n\n```\nSQL> SELECT /*+ NO_MERGE(@customers)\
  \ */\n  2         t.calendar_year\n  3  ,      c.cust_name\n  4  ,      SUM(s.quantity_sold)\
  \ AS qty_sold\n  5  ,      SUM(s.amount_sold)   AS amt_sold\n  6  FROM   sales \
  \    s\n  7  ,     (\n  8         SELECT /*+ QB_NAME(customers) */\n  9        \
  \        cust_id\n 10         ,      format_customer_name (\n 11               \
  \    cust_first_name, cust_last_name\n 12                   ) AS cust_name\n 13\
  \         FROM   customers\n 14        )          c\n 15  ,      times     t\n 16\
  \  WHERE  s.cust_id = c.cust_id\n 17  AND    s.time_id = t.time_id\n 18  GROUP \
  \ BY\n 19         t.calendar_year\n 20  ,      c.cust_name\n 21  ;\n\n11604 rows\
  \ selected.\n\nElapsed: 00:00:01.49\n\nSQL> exec counter.show('Function calls');\n\
  \nFunction calls: 55500\n```\n\n你可以看到，这次我使用了提示来指示 CBO 不要合并我的内联视图。目的是确保我的 PL/SQL\
  \ 函数只在 `CUSTOMERS` 数据集上执行，而不是在更大的 `SALES` 集上执行。我通过使用 `NO_MERGE` 提示，并采用 Oracle Database\
  \ 10g 引入的查询块命名语法来实现了这一点。`QB_NAME` 提示用于标记内联视图查询块；因此，我可以从主查询块引用该内联视图，正如你在 `NO_MERGE`\
  \ 提示中看到的那样。\n\n然而，对于这个查询，我还可以更进一步。在这个特定例子中，`FORMAT_CUSTOMER_NAME` 函数只需要应用到最终的 11,604\
  \ 行结果集上（远少于 55,500 条客户记录）。因此，我可以使用与之前相同的提示对整个结果集进行预分组，但只在最后阶段才调用 PL/SQL 函数。清单 9-36\
  \ 展示了这一做法的影响。\n\n**清单 9-36.** 通过 SQL 减少函数调用（重构后的查询）\n\n```\nSQL> SELECT /*+ NO_MERGE(@pregroup)\
  \ */\n  2         calendar_year\n  3  ,      format_customer_name(\n  4        \
  \    cust_first_name, cust_last_name\n  5            ) AS cust_name\n  6  ,    \
  \  qty_sold\n  7  ,      amt_sold\n  8  FROM  (\n  9           SELECT /*+ QB_NAME(pregroup)\
  \ */\n 10                  t.calendar_year\n 11           ,      c.cust_first_name\n\
  \ 12           ,      c.cust_last_name\n 13           ,      SUM(s.quantity_sold)\
  \ AS qty_sold\n 14           ,      SUM(s.amount_sold)   AS amt_sold\n 15      \
  \     FROM   sales     s\n 16           ,      customers c\n 17           ,    \
  \  times     t\n 18           WHERE  s.cust_id = c.cust_id\n 19           AND  \
  \  s.time_id = t.time_id\n 20           GROUP  BY\n 21                  t.calendar_year\n\
  \ 22           ,      c.cust_first_name\n 23           ,      c.cust_last_name\n\
  \ 24        );\n11604 rows selected.\n\nElapsed: 00:00:01.14\n\nSQL> exec counter.show('Function\
  \ calls');\n\nFunction calls: 11604\n```\n\n这效果更好，因为我设法在调用 PL/SQL 函数之前对所有数据进行了预聚合，将其调用次数减少到\
  \ 11,604 次，并在报告上节省了更多时间。\n\n\n这项技术可以应用于那些必须尽可能减少`PL/SQL`函数调用的特定场景。例如，通过对之前带有`GET_RATE`函数的销售报告采用此技术，我成功地将\
  \ 918,000 次函数执行减少到仅 36,000 次，从而使总体响应时间从 66 秒大幅缩短至 4 秒。\n\n然而，一种更策略性的减少函数调用的方法是利用缓存方案，我将在下文进行描述。\n\
  \n### 通过缓存减少函数调用\n\n根据您使用的 Oracle 数据库版本，有几种缓存数据的选项。我将简要描述两种您可能希望研究并/或应用到您应用程序中的、用于减少函数调用的缓存技术。它们是：\n\
  \n*   标量子查询缓存\n*   跨会话`PL/SQL`函数结果缓存\n\n### 标量子查询缓存\n\n此缓存功能是一项旨在减少嵌入在标量子查询中的`SQL`语句或`PL/SQL`函数执行次数的内部优化。尽管无法可靠预测此内部缓存的效率，但它可以在一定程度上用于减少`PL/SQL`函数调用。在清单\
  \ 9-37 中，我将包含`GET_RATES`查找函数的销售报告进行了转换，以利用标量子查询缓存。\n\n**清单 9-37.** 使用标量子查询缓存减少`PL/SQL`函数调用\n\
  \n```sql\nSQL> SELECT t.calendar_year\n  2  ,      p.prod_name\n  3  ,      SUM(s.amount_sold)\
  \                                             AS amt_sold_usd\n  4  ,      SUM(s.amount_sold\
  \ * (SELECT get_rate(s.time_id, 'USD', 'GBP')\n  5                             \
  \   FROM   dual))                           AS amt_sold_gbp\n  6  FROM   sales \
  \    s\n  7  ,      products  p\n  8  ,      times     t\n  9  WHERE  s.prod_id\
  \ = p.prod_id\n 10  AND    s.time_id = t.time_id\n 11  GROUP  BY\n 12         t.calendar_year\n\
  \ 13  ,      p.prod_name\n 14  ;\n\n272 rows selected.\n\nElapsed: 00:00:02.54\n\
  \nStatistics\n----------------------------------------------------------\n     \
  \ 19451  recursive calls\n          0  db block gets\n      40634  consistent gets\n\
  \          0  physical reads\n          0  redo size\n      16688  bytes sent via\
  \ SQL*Net to client\n        437  bytes received via SQL*Net from client\n     \
  \     2  SQL*Net roundtrips to/from client\n          0  sorts (memory)\n      \
  \    0  sorts (disk)\n        272  rows processed\n\nSQL> exec counter.show('Function\
  \ calls');\n\nFunction calls: 19450\n```\n\n通过将对`GET_RATE`的调用封装在标量子查询中，我成功地将查询的耗时从\
  \ 66 秒减少到不到 3 秒。计数器显示`PL/SQL`函数调用次数已降至仅 19,450 次（从超过 918,000 次），从而在时间和逻辑 I/O 上实现了巨大的节省（缓存阻止了超过\
  \ 180 万次的一致性读取）。\n\n如前所述，缓存的效率取决于多种因素，包括输入数据的顺序。考虑到这一点，我知道我的`SALES`数据中`GET_RATE`函数的输入值范围相当小，因此在清单\
  \ 9-38 中，我尝试通过排序输入到标量子查询的数据来进一步减少函数调用。\n\n**清单 9-38.** 使用标量子查询缓存减少`PL/SQL`函数调用（排序数据的效果）\n\
  \n```sql\nSQL> SELECT /*+ NO_MERGE(@inner) */\n  2         calendar_year\n  3  ,\
  \      prod_name\n  4  ,      SUM(amount_sold)                                 \
  \             AS amt_sold_usd\n  5  ,      SUM(amount_sold * (SELECT get_rate(time_id,\
  \ 'USD', 'GBP')\n  6                              FROM   dual))                \
  \            AS amt_sold_gbp\n  7  FROM  (\n  8         SELECT /*+ QB_NAME(inner)\
  \ NO_ELIMINATE_OBY */\n  9                t.calendar_year\n 10         ,      s.time_id\n\
  \ 11         ,      p.prod_name\n 12         ,      s.amount_sold\n 13         FROM\
  \   sales     s\n 14         ,      products  p\n 15         ,      times     t\n\
  \ 16         WHERE  s.prod_id = p.prod_id\n 17         AND    s.time_id = t.time_id\n\
  \ 18         ORDER  BY\n 19                s.time_id\n 20        )\n 21  GROUP \
  \ BY\n 22         calendar_year\n 23  ,      prod_name\n 24  ;\n\n272 rows selected.\n\
  \nElapsed: 00:00:02.14\n\nStatistics\n----------------------------------------------------------\n\
  \       1461  recursive calls\n          0  db block gets\n       4662  consistent\
  \ gets\n          8  physical reads\n          0  redo size\n      16688  bytes\
  \ sent via SQL*Net to client\n        437  bytes received via SQL*Net from client\n\
  \          2  SQL*Net roundtrips to/from client\n          2  sorts (memory)\n \
  \         0  sorts (disk)\n        272  rows processed\n\nSQL> exec counter.show('Function\
  \ calls: ordered inputs');\n\nFunction calls: ordered inputs: 1460\n```\n\n通过排序输入到标量子查询缓存的数据，我将`PL/SQL`函数调用次数进一步减少到仅\
  \ 1,460 次（从而将逻辑 I/O 降低了一个数量级，并略微缩短了总体耗时）。这表明，对输入到子查询缓存的调用进行排序（或聚类）可以影响其效率。在我的案例中，通过进一步减少`PL/SQL`函数调用所实现的节省，“抵消”了预排序`SALES`数据的成本。\n\
