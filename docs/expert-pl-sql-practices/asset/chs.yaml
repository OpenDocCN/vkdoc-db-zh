  1995 年，至今仍在使用——并且成功运行！除了钻研`PL/SQL`，斯蒂芬也喜欢时不时登上舞台，在`CERN`的摇滚夏日音乐节上担任摇滚乐队主唱，或在各种戏剧中扮演角色。




