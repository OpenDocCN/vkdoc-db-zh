  \ NOT NULL,\n            CONSTRAINT  emp_phone_numbers_pk\n            PRIMARY KEY\
  \ (employee_id, phone_number)\n         ) ;\n\nTable created.\n\nSQL>  alter table\
  \ EMP_PHONE_NUMBERS add constraint emp_phone_numbers_fk1\n        foreign key (employee_id)\n\
