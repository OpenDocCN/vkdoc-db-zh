  \n如果您无法通过重写代码来减少查询的执行次数，那么还有另一个选择。您可以定义一个关联数组来缓存查询的结果，并在后续执行中重用该数组，从而有效减少查询的执行次数。\n\
  \n代码清单 1-6 说明了数组缓存技术。程序不再为游标`c1`的每一行都执行查询来获取`country_name`，而是将一个键值对（在本例中是(`country_id`,\
  \ `country_name`)）存储在一个名为`l_country_names`的关联数组中。关联数组类似于索引，可以通过键值访问任何给定的值。\n\n在执行查询之前，使用`EXISTS`运算符检查数组中是否存在与`country_id`键值匹配的元素。如果数组中存在该元素，则直接从该数组中获取`country_name`，而无需执行查询。如果不存在，则执行查询，并将新元素添加到数组中。\n\
  \n您还应该理解，此技术适用于键的唯一值较少的情况。在此示例中，由于`country_id`列的唯一值较少，查询的执行次数*可能*会大大降低。使用示例模式，查询的最大执行次数将为\
  \ 23，因为`country_id`列只有 23 个不同的值。\n\n**代码清单 1-6.** 使用关联数组的查询示例\n\n\n"
- "# 过度访问 DUAL\n\n代码过度访问 `DUAL` 表的情况并不少见。您应避免过度使用 `DUAL` 表访问。从 PL/SQL 访问 `DUAL` 会导致上下文切换，从而影响性能。本节将回顾一些过度访问\
  \ `DUAL` 的常见原因，并讨论相应的缓解方案。\n\n## 日期算术运算\n\n没有理由为了执行算术运算或 `DATE` 操作而访问 `DUAL` 表，因为大多数操作都可以使用\
  \ PL/SQL 语言结构完成。甚至 `SYSDATE` 也可以在 PL/SQL 中直接访问，无需访问 SQL 引擎。在代码清单 1-7 中，高亮显示的 SQL\
  \ 语句使用 `SELECT.. from DUAL` 语法计算 UNIX 纪元时间（纪元时间定义为自 1970 年 1 月 1 日午夜以来经过的秒数）。虽然访问\
  \ `DUAL` 表很快，但执行该语句仍然会导致 SQL 和 PL/SQL 引擎之间的上下文切换。\n\n***代码清单 1-7.** 过度访问 DUAL —\
  \ 算术运算*\n\n```\nDECLARE\n  l_epoch INTEGER;\nBEGIN\n  SELECT ((SYSDATE-TO_DATE('01-JAN-1970\
  \ 00:00:00', 'DD-MON-YYYY HH24:MI:SS'))\n          * 24 *60 *60 )\n  INTO l_epoch\n\
  \  FROM DUAL;\n  dbms_output.put_line(l_epoch);\nEND;\n```\n\n您可以使用 PL/SQL 结构执行算术计算来避免不必要的\
  \ `DUAL` 表访问，就像这样：\n\n```\nl_epoch := (SYSDATE- TO_DATE('01-JAN-1970 00:00:00',\
  \ 'DD-MON-YYYY HH24:MI:SS'))\n          * 24 *60 *60 ;\n```\n\n根本没有必要调用 SQL 来执行数值运算。直接在\
  \ PL/SQL 中完成工作即可。您的代码将更易于阅读，性能也会更好。\n\n过度访问以查询当前日期或时间戳是导致 `DUAL` 表访问增加的另一个原因。考虑直接在\
  \ SQL 语句中编码调用 `SYSDATE`，而不是将 `SYSDATE` 选择到变量中，然后将该值传回 SQL 引擎。如果需要在插入行后访问列值，请使用 `returning`\
  \ 子句获取列值。如果需要在 PL/SQL 本身中访问 `SYSDATE`，请使用 PL/SQL 结构将当前日期获取到变量中。\n\n### 访问序列\n\n\
  不必要访问 `DUAL` 表的另一个常见原因是从序列中检索下一个值。代码清单 1-8 展示了一个代码片段，它从 `cust_id_seq` 中选择下一个值到一个变量中，然后使用该变量插入到\
  \ `customers` 表中。\n\n***代码清单 1-8.** 过度访问 DUAL — 序列*\n\n```\nDECLARE\n  l_cust_id\
  \ NUMBER;\nBEGIN\n  FOR c1 in (SELECT cust_first_name, cust_last_name FROM customers\n\
  \             WHERE cust_marital_status!='married')\n  LOOP\n    SELECT cust_hist_id_seq.nextval\
  \ INTO l_cust_id FROM dual;\n    INSERT INTO customers_hist\n      (cust_hist_id,\
  \ first_name, last_name )\n    VALUES\n      (l_cust_id, c1.cust_first_name, c1.cust_last_name)\n\
  \      ;\n  END LOOP;\nEND;\n/\nPL/SQL 过程已成功完成。\n\n已用时间: 00:00:01.89\n```\n\n更好的方法是避免将值检索到变量中，而是直接在\
  \ `INSERT` 语句本身中从序列获取值。以下代码片段演示了一个 `INSERT` 语句，它使用序列生成的值将行插入到 `customers` 表中。通过这种编码实践，您可以避免访问\
  \ `DUAL` 表，从而避免引擎之间的上下文切换。\n\n```\nInsert into customers (cust_id, ...)\nValues\
  \ (cust_id_seq.nextval,...);\n```\n\n更好的做法是将 PL/SQL 块重写为 SQL 语句。例如，下面的重写语句在 0.2\
  \ 秒内完成，而基于 PL/SQL 循环的处理运行时间为 1.89 秒：\n\n```\nINSERT INTO customers_hist\nSELECT\n\
  \   cust_hist_id_seq.nextval, cust_first_name, cust_last_name\nFROM customers  \n\
  WHERE cust_marital_status!='married';\n\n已创建 23819 行。\n已用时间: 00:00:00.20\n```\n\n\
  ## 填充主从关系行\n\n过度访问 `DUAL` 表的另一个常见原因是向涉及主从关系的表中插入数据。通常，在这种编码实践中，主表的主键值从序列获取到局部变量中。然后，在向主表*和*从表插入数据时使用该局部变量。之所以形成这种方法，是因为在向从表插入数据时需要用到主表的主键值。\n\
  \nOracle 数据库版本 9i 引入的一项新 SQL 功能通过允许您返回插入行的值提供了更好的解决方案。您可以使用 `DML RETURNING` 子句从新插入的主行中检索键值。然后，您可以在向从表插入时使用该键值。例如：\n\
  \n```\nINSERT INTO customers (cust_id, ...)\nVALUES (cust_id_seq.nextval,...)\n\
  RETURNING cust_id into l_cust_id;\n...\nINSERT INTO customer_transactions (cust_id,\
  \ ...)\nVALUES (l_cust_id,...)\n...\n```\n\n\n\n### 不必要的函数执行\n\n执行函数调用通常意味着必须将指令集的不同部分加载到\
  \ CPU 中。执行会从指令的一部分跳转到另一部分。这种执行跳转会引发性能问题，因为它需要清空并重新填充指令流水线。其结果是额外的 CPU 使用率。\n\n通过避免不必要的函数执行，你可以避免指令流水线无谓的清空与重填，从而最小化对\
  \ CPU 的需求。重申一下，我并非反对模块化的编码实践。我只反对过度和不必要的函数调用执行。我最好通过例子来解释。\n\n在清单 1-9 中，`log_entry`\
  \ 是一个调试函数，每次验证时都会被调用。但该函数本身会检查 `v_debug`，并且仅在调试标志设置为 true 时才插入消息。想象一个程序，在循环中执行数百个这样复杂的业务验证。本质上，即使\
  \ `v_debug` 标志设置为 false，`log_entry` 函数也会被不必要地调用数百万次。\n\n**清单 1-9. 不必要的函数调用**\n\n\
  ```sql\ncreate table log_table ( message_seq number, message varchar2(512));\ncreate\
  \ sequence message_id_seq;\n\nDECLARE\n l_debug BOOLEAN := FALSE;\n r1 integer;\n\
  \ FUNCTION log_entry( v_message IN VARCHAR2, v_debug in boolean)\n  RETURN number\n\
  \  IS\n  BEGIN\n    IF(v_debug) THEN\n      INSERT INTO log_table\n        (message_seq,\
  \ MESSAGE)\n        VALUES\n        (message_id_seq.nextval, v_message\n       \
  \ );\n    END IF;\n    return 0;\n  END;\nBEGIN\n FOR c1 IN (\n        SELECT s.prod_id,\
  \ s.cust_id,s.time_id,\n               c.cust_first_name, c.cust_last_name,\n  \
  \             s.amount_sold\n        FROM sales s,\n             customers c\n \
  \       WHERE s.cust_id    = c.cust_id and\n        s.amount_sold> 100)\n  LOOP\n\
  \    IF c1.cust_first_name IS NOT NULL THEN\n      r1 := log_entry ('first_name\
  \ is not null ', l_debug );\n    END IF;\n\n    IF c1.cust_last_name IS NOT NULL\
  \ THEN\n      r1 := log_entry ('Last_name is not null ', l_debug);\n    END IF;\n\
  \  END LOOP;\nEND;\n/\n\nPL/SQL procedure successfully completed.\nElapsed: 00:00:00.54\n\
  ```\n\n清单 1-9 中的代码可以重写，以仅在变量 `l_debug` 标志设置为 true 时才调用 `log_entry` 函数。此重写减少了 `log_entry`\
  \ 函数不必要的执行。重写后的程序在 0.43 秒内完成。执行次数越多，性能提升越明显。\n\n```sql\n...\nIF first_name IS NULL\
  \ AND l_debug=TRUE THEN\n  log_entry('first_name is null ');\nEND IF;\n...\n/\n\
  PL/SQL procedure successfully completed.\nElapsed: 00:00:00.43\n```\n\n对于一个更好的方法，可以考虑使用条件编译结构来完全避免执行此代码片段。在清单\
  \ 1-10 中，高亮显示的代码使用了 `$IF-$THEN` 结构和一个条件变量 `$$debug_on`。如果条件变量 `$$debug_on` 为 true，则执行代码块。在生产环境中，`$$debug_on`\
  \ 变量将为 FALSE，从而消除函数执行。注意，程序的耗时进一步减少到 0.34 秒。\n\n**清单 1-10. 使用条件编译避免不必要的函数调用**\n\n\
  ```sql\nDECLARE\n l_debug BOOLEAN := FALSE;\n r1 integer;\n FUNCTION log_entry(\
  \ v_message IN VARCHAR2, v_debug in boolean)\n  RETURN number\n  IS\n  BEGIN\n \
  \   IF(v_debug) THEN\n      INSERT INTO log_table\n        (message_seq, MESSAGE)\n\
  \        VALUES\n        (message_id_seq.nextval, v_message\n        );\n    END\
  \ IF;\n    return 0;\n  END;\n\nBEGIN\nFOR c1 IN (\n        SELECT s.prod_id, s.cust_id,s.time_id,\n\
  \               c.cust_first_name, c.cust_last_name,\n               s.amount_sold\n\
  \        FROM sales s,\n             customers c\n        WHERE s.cust_id    = c.cust_id\
  \ and\n        s.amount_sold> 100)\n  LOOP\n   $IF $$debug_on $THEN\n    IF c1.cust_first_name\
  \ IS NOT NULL  THEN\n      r1 := log_entry ('first_name is not null ', l_debug );\n\
  \    END IF;\n    IF c1.cust_last_name IS NOT NULL   THEN\n      r1 := log_entry\
  \ ('Last_name is not null ', l_debug);\n    END IF;\n   $END\n    null;\n  END LOOP;\n\
  END;\n/\nPL/SQL procedure successfully completed.\nElapsed: 00:00:00.34\n```\n\n\
  不必要地调用函数的问题往往在从另一个模板程序复制并修改的程序中频繁出现。请注意这个问题。如果一个函数不需要被调用，就避免调用它。\n\n### 解释型与原生编译\n\
  \n默认情况下，PL/SQL 代码作为解释型代码执行。在 PL/SQL 编译期间，代码被转换为中间格式并存储在数据字典中。在执行时，该中间代码由引擎执行。\n\n\
  Oracle Database 9i 版本引入了一个名为原生编译的新特性。PL/SQL 代码被编译成机器指令，并作为共享库存储。由于现代编译器可以内联子程序并避免指令跳转，使用原生编译时，过度的函数执行可能影响较小。\n\
  \n\n\n#### 昂贵的函数调用\n\n如果执行一个函数会消耗几秒钟的实际时间，那么在循环中调用该函数将导致代码性能低下。你应该对频繁执行的函数进行优化，使其尽可能高效地运行。\n\
  \n在清单 1-11 中，如果函数 `calculate_epoch` 在循环中被调用数百万次。即使该函数的执行仅消耗 0.01 秒，一百万次执行也会导致 2.7\
  \ 小时的耗时。解决此性能问题的一个选项是优化函数使其能在几毫秒内执行，但如此大幅度的优化并非总能实现。\n\n***清单 1-11.** 昂贵的函数调用*\n\
  \n```sql\nCREATE OR REPLACE FUNCTION calculate_epoch (d in date)\n RETURN NUMBER\
  \ DETERMINISTIC IS\n l_epoch number;\nBEGIN\nl_epoch := (d - TO_DATE('01-JAN-1970\
  \ 00:00:00', 'DD-MON-YYYY HH24:MI:SS'))\n          * 24 *60 *60 ;\n RETURN l_epoch;\n\
  END calculate_epoch;\n/\n\nSELECT  /*+ cardinality (10) */ max( calculate_epoch\
  \ (s.time_id))  epoch\nFROM sales s\n WHERE s.amount_sold> 100 and\n       calculate_epoch\
  \ (s.time_id) between 1000000000 and 1100000000;\n\n     EPOCH\n----------\n1009756800\n\
  \nElapsed: 00:00:01.39\n```\n\n另一个选项是预先存储函数执行的结果，从而避免在查询中执行函数。你可以通过使用基于函数的索引来实现这一点。在清单\
  \ 1-12 中，创建了一个基于函数 `calculate_epoch` 的函数索引。SQL 语句的性能从 1.39 秒提升到了 0.06 秒。\n\n***清单\
  \ 1-12.** 使用函数索引的昂贵函数调用*\n\n```sql\nCREATE INDEX compute_epoch_fbi ON sales\n(calculate_epoch(time_id))\n\
  Parallel (degree 4);\n\nSELECT  /*+ cardinality (10) */ max( calculate_epoch (s.time_id))\
  \  epoch\nFROM sales s\n WHERE s.amount_sold> 100 and\n       calculate_epoch (s.time_id)\
  \ between 1000000000 and 1100000000;\n     EPOCH\n----------\n1009756800\n\nElapsed:\
  \ 00:00:00.06\n```\n\n你也应该理解函数索引是有成本的。`INSERT`语句和`UPDATE`语句（更新`time_id`列时）将产生调用函数和维护索引的成本。需要仔细权衡\
  \ DML 操作中函数执行的成本与`SELECT`语句中函数执行的成本，以选择成本更低的方案。\n\n![images](img/square.jpg) **注意**\
  \ 从 Oracle Database 11g 版本开始，你可以创建一个虚拟列，然后在该虚拟列上创建索引。索引虚拟列的效果与函数索引相同。虚拟列相对于函数索引的一个优势是，你可以使用虚拟列对表进行分区，而仅使用函数索引是无法做到这一点的。\n\
  \n从 Oracle Database 11g 版本开始可用的`result_cache`函数，是调优昂贵 PL/SQL 函数执行的另一个选项。函数执行的结果会被记录在实例的共享全局区（SGA）中分配的结果缓存中。使用相同参数重复执行函数时，将直接从函数缓存中获取结果，而无需重复执行函数。清单\
  \ 1-13 展示了利用`result_cache`来提升性能的函数示例：SQL 语句在 0.81 秒内完成。\n\n***清单 1-13.** 使用 Result_cache\
  \ 的函数*\n\n```sql\nDROP INDEX compute_epoch_fbi;\nCREATE OR REPLACE FUNCTION calculate_epoch\
  \ (d in date)\n RETURN NUMBER  DETERMINISTIC RESULT_CACHE IS\n l_epoch number;\n\
  BEGIN\n l_epoch := (d - TO_DATE('01-JAN-1970 00:00:00', 'DD-MON-YYYY HH24:MI:SS'))\n\
  \          * 24 *60 *60 ;\n RETURN l_epoch;\nEND calculate_epoch;\n/\n\nSELECT \
  \ /*+ cardinality (10) */ max( calculate_epoch (s.time_id))  epoch\nFROM sales s\n\
  \ WHERE s.amount_sold> 100 and\n       calculate_epoch (s.time_id) between 1000000000\
  \ and 1100000000;\n\n     EPOCH\n----------\n1009756800\n\nElapsed: 00:00:00.81\n\
  ```\n\n总之，过度的函数执行会导致性能问题。如果你无法减少或消除函数执行，可以考虑采用函数索引或`result_cache`作为短期解决方案，以最小化函数调用带来的影响。\n\
  \n### 数据库链接调用\n\n过多的数据库链接调用会影响应用程序性能。在循环中通过数据库链接访问远程表或修改远程表并不是一种可扩展的方法。对于每次访问远程表，数据库链接所涉及的数据库之间会交换多个\
  \ SQL*Net 数据包。如果数据库位于地理位置上分离的数据中心，或者更糟，遍布全球，那么对 SQL*Net 流量的等待将导致程序性能问题。\n\n在清单 1-14\
  \ 中，对于游标返回的每一行，都访问了远程数据库中的`customer`表。假设网络往返调用需要 100 毫秒，那么 100 万次往返调用大约需要 27 小时才能完成。位于国内不同地区的数据库之间\
  \ 100 毫秒的响应时间并不少见。\n\n***清单 1-14.** 过多的数据库链接调用*\n\n```sql\nDECLARE\n  V_customer_name\
  \ VARCHAR2(32);\nBEGIN\n  ...\n  FOR c1 IN (SELECT …)\n  LOOP\n    ...\n    SELECT\
  \ customer_name\n    INTO v_customer_name\n    FROM customers@remotedb\n    WHERE\
  \ account_id = c1.account_id;\n    ...\n  END LOOP;\nEND;\n```\n\n明智地使用物化视图可以减少程序执行期间的网络往返调用。对于清单\
  \ 1-14 的情况，可以将`customer`表创建为物化视图。在程序执行前刷新物化视图，并在程序中访问该物化视图。将表物化在本地减少了 SQL*Net 往返调用的次数。当然，作为应用程序设计者，你需要比较将整张表物化的成本与在循环中访问远程表的成本，并选择最优解决方案。\n\
  \n将程序重写为与远程表连接的 SQL 语句是另一个选项。Oracle Database 中的查询优化器可以优化此类语句，以减少 SQL*Net 往返的开销。要使用此技术，你应该重写程序，使得\
  \ SQL 语句只执行一次，很可能不在循环中执行。\n\n将数据物化在本地或重写为带有远程连接的 SQL 语句，是调优清单 1-14 程序的初步步骤。然而，如果你连这些都无法做到，还有一个变通方法。作为临时措施，你可以将程序转换为使用多进程架构。例如，进程#1\
  \ 处理 1 到 100,000 号客户，进程#2 处理 100,001 到 200,000 号客户，以此类推。通过创建 10 个进程将此逻辑应用到示例程序中，你可以将程序的总运行时间减少到大约\
  \ 2.7 小时。使用`DBMS_PARALLEL_EXECUTE`是考虑将代码拆分为并行处理的另一个选项。\n\n\n\n### 过度使用触发器\n\n触发器通常用\
  \ PL/SQL 编写，但你也可以用 Java 编写触发器代码。从性能角度看，过度使用触发器并不理想。行变更在 SQL 引擎中执行，而触发器在 PL/SQL 引擎中执行。你又一次遇到了可怕的**上下文切换**问题。\n\
  \n在某些情况下，触发器是不可避免的。例如，无法避免触发器中的复杂业务验证。在这些场景中，你应该将那种复杂的验证逻辑用 PL/SQL 代码编写。应避免对简单的验证过度使用触发器。例如，使用检查约束（check\
  \ constraints）而不是触发器来检查列的有效值列表。\n\n此外，避免对同一触发操作使用多个触发器。与其为同一操作编写两个不同的触发器，不如将它们合并为一个，以最小化上下文切换的次数。\n\
  \n### 过度提交\n\n在 PL/SQL 循环中，每插入、修改（或删除）一行后都进行提交，这种情况并不少见。在每行后都提交的编码习惯会导致程序执行变慢。频繁提交会产生更多重做日志（redo），要求日志写入器（Log\
  \ Writer）频繁地将日志缓冲区内容刷新到日志文件，可能导致数据完整性问题，并消耗更多资源。PL/SQL 引擎经过优化以减少频繁提交的影响，但在减少提交方面，编写良好的代码是无可替代的。\n\
  \n你应该只在业务事务完成时提交。如果你在业务事务边界之前提交，可能会遇到数据完整性问题。如果你必须提交以提高可重启性，请考虑批量提交。例如，与其每行都提交，不如每\
  \ 1000 或 5000 行进行一次批量提交（具体批处理大小的选择取决于你的应用）。更少的提交将减少程序的运行时间。此外，应用提交次数减少也将提升数据库的性能。\n\
  \n### 过度解析\n\n不要在 PL/SQL 循环中使用动态 SQL 语句，因为这样做会导致过度解析问题。相反，应通过使用绑定变量来减少硬解析的数量。\n\n\
  在清单 1-15 中，访问 `customers` 表以检索客户详情，通过游标 `c1` 传递 `cust_id`。构造了一条带有字面值的 SQL 语句，然后使用原生动态\
  \ SQL 的 `EXECUTE IMMEDIATE` 结构来执行。问题在于，对于从游标 `c1` 检索到的每一行唯一值，都会构造一条新的 SQL 语句并发送到\
  \ SQL 引擎执行。\n\n执行时不存在于共享池中的语句会引发硬解析。过度的硬解析会给库缓存（library cache）带来压力，从而降低应用的可扩展性和并发性。随着从游标\
  \ `c1` 返回的行数增加，硬解析的数量会线性增长。这个程序在开发数据库中处理少量行时可能有效，但在生产环境中，这种方法很可能成为问题。\n\n`清单 1-15.\
  \ 过度解析`\n\n```sql\nDECLARE\n  ...\nBEGIN\n FOR c1_rec IN c1\n LOOP\n  -- 查询客户详情\n\
  \  EXECUTE IMMEDIATE\n   'SELECT cust_first_name, cust_last_name, country_id\n \
  \   FROM customers\n    WHERE cust_id= ' || c1_rec.cust_id  INTO l_cust_first_name,\
  \ l_cust_last_name,\nl_country_id;\n  ...\n END LOOP;\nCOMMIT;\nEND;\n/\n```\n\n\
  你应该尽可能减少硬解析。循环中的动态 SQL 语句往往会增加硬解析的影响，如果执行的并发度增加，这种影响会被放大。\n\n### 小结\n\n本章回顾了使用某些\
  \ PL/SQL 结构不当的各种情况。请记住，SQL 是一种集合语言，而 PL/SQL 是一种过程化语言，在设计程序时，应考虑以下建议作为指导原则：\n\n*\
  \   使用 SQL 解决查询问题。**以集合的方式思考！** 调优用 SQL 编写的查询比调优（比如）具有嵌套循环的 PL/SQL 程序更容易，后者本质上是以逐行处理的方式执行查询。\n\
  *   如果你必须用 PL/SQL 编写程序，尽量将工作**卸载到 SQL 引擎**。随着 Exadata 等新技术的出现，这一点变得越来越重要。Exadata\
  \ 数据库一体机提供的智能扫描（Smart Scan）功能可以将工作卸载到存储节点，从而提高用 SQL 编写的程序的性能。PL/SQL 结构无法从 Exadata\
  \ 数据库一体机中获得此类益处（至少截至 11gR2 版本）。\n*   如果你必须使用基于循环的处理，请使用 PL/SQL 中提供的**批量处理**机制。通过本章讨论的技术，减少\
  \ PL/SQL 中不必要的工作，例如不必要的函数执行或对 `DUAL` 表的过度访问。\n*   仅在最后手段时才使用基于单行、循环的处理。\n\n确实，用\
  \ PL/SQL 处理你所有的数据和业务逻辑。用 Java 或其他语言处理表示逻辑和用户验证。通过本章概述的技术，你可以编写出高度可扩展的 PL/SQL 语言程序。\n\
  \n## 第 2 章\n\n\n\n"
- "# 动态 SQL：应对未知\n\n作者：Michael Rosenblum\n\n过去十年，我参加了在美国各地举办的众多 Oracle 会议。一次又一次，我听到演讲者们谈论如何“更好、更快、更经济”地构建系统。但当这些演讲者走下讲台，与你一对一讨论同样问题时，他们传递的信息却远没有那么乐观。经常被引用的、约\
  \ 75%的大型 IT 项目失败率至今仍是现实。再加上那些“将失败宣布为成功”的案例（即没人有勇气承认错误），情况就更加明显：我们当代的软件开发流程正面临一场危机。\n\
  \n本章中，我将假设我们生活在一个稍好一点的世界：这里没有企业内部政治斗争，系统架构师清楚自己在做什么，开发者至少明白 OTN 的含义。但即使在这个改善后的世界里，系统开发过程中仍存在一些无法避免的固有风险：\n\
  \n*   清晰阐述待建系统的需求具有挑战性。\n*   构建一个真正满足所有既定需求的系统很困难。\n*   构建一个在短期内不需要大量修改的系统非常困难。\n\
  *   构建一个不会过时（迟早会过时）的系统是不可能的。\n\n如果最后一点可以被视作常识，那么我的许多同事会对前三点强烈反对。然而，现实情况是，永远不会有 100%完美的分析、100%完整的需求集、100%足够且永远不需要升级的硬件，等等。在\
  \ IT 行业，我们必须接受一个事实：我们随时都必须预料到意外情况。\n\n![images](img/square.jpg) `开发者信条` 整个开发过程的重点应该从我们已知的内容转向我们未知的内容。\n\
  \n不幸的是，未知的事情很多：\n\n*   涉及哪些元素？例如，系统需要一个季度报告机制，但没有季度汇总表。\n*   你该如何着手？这是 DBA 的噩梦：如果一个全局搜索屏幕包含来自不同表的数十个潜在条件，如何确保其性能足够好？\n\
  *   你能否继续？对于每一个限制，你通常至少有一个变通方案或“后门”。但如果这个后门的位置在下一个版本或更新中发生了变化呢？\n\n幸运的是，回答这些（以及类似）问题有多种不同的方法。本章将讨论一种名为动态\
  \ SQL 的功能如何帮助解决前面提到的一些问题，以及你如何避免导致系统失败和过时的一些主要陷阱。\n\n### 英雄登场\n\n动态 SQL 的概念相当直接。这个功能允许你将代码（包括\
  \ SQL 和 PL/SQL）作为文本来构建，并在运行时处理它——仅此而已。动态 SQL 提供了一个程序在执行过程中编写另一个程序的能力。也就是说，理解这个功能所带来的潜在影响和可能性至关重要。这些问题将在本章中讨论。\n\
  \n![images](img/square.jpg) `注` 我所说的“处理”是指在任何编程语言中启动一个程序所需的整个事件链——解析/执行/[获取]（最后一步是可选的）。详细讨论这个主题超出了本章的范围，但了解每个步骤的基础知识对于正确使用动态\
  \ SQL 至关重要。\n\n重要的是要认识到，有不同方式可以实现动态 SQL，需要讨论的有：\n\n*   原生动态 SQL\n*   动态游标\n*   `DBMS_SQL`包\n\
  \n线上和出版物中有许多优秀的参考资料解释了这些方法各自的语法方面。本书的目的是展示最佳实践，而非提供参考指南，但强调每种动态 SQL 的关键点作为进一步讨论的共同基础是很有用的。\n\
  \n![images](img/square.jpg) `技术说明 #1` 尽管“动态 SQL”这个术语已被整个 Oracle 社区接受，但它并非百分之百精确，因为它涵盖了构建\
  \ SQL 语句和 PL/SQL 块。但“动态 SQL 和 PL/SQL”听起来太拗口，因此全文将使用动态 SQL。\n\n![images](img/square.jpg)\
  \ `技术说明 #2` 截至本文撰写时，Oracle 10g 和 11g 的使用大致相当。除非所描述的功能仅存在于 11g（此类情况会明确提及），否则此处使用的示例均与\
  \ 10g 兼容。\n\n### 原生动态 SQL\n\n大约 95%的动态 SQL 实现都涉及以下`EXECUTE IMMEDIATE`命令的变体：\n\n\
  ```\nDECLARE\n   v_variable_tx VARCHAR2(<Length>)|CLOB;\nBEGIN\n   v_variable_tx:='whatever_you_want';\n\
  \   EXECUTE IMMEDIATE v_variable_tx [additional options];\nEND;\n```\n或\n\n```\n\
  BEGIN\n   EXECUTE IMMEDIATE 'whatever_you_want' [additional options];\nEND;\n```\n\
  或\n\n```\nBEGIN\n   EXECUTE IMMEDIATE 'whatever_you_want1'||'whatever_you_want2'||…\
  \ [additional options];\nEND;\n```\n\n在 Oracle 10g 及之前版本中，`EXECUTE IMMEDIATE`可以处理的代码总长度（包括拼接结果）是\
  \ 32KB（更大的代码集由`DBMS_SQL`包处理）。从 11g 开始，可以将`CLOB`作为输入参数传递。对架构师来说，一个很好的问题是：为什么会有人试图使用单个语句动态处理超过\
  \ 32KB 的代码？但根据我的经验，这种情况确实存在。\n\n\n##### 原生动态 SQL 示例 #1\n\n具体的语法细节可能需要另写 30 页来解释，但既然本书是为更有经验的用户编写的，可以合理地期望读者知道如何使用文档。与其深入探讨\
  \ PL/SQL，不如提供一个关于**为什么**需要动态 SQL 的典型示例。为此，假设以下需求：\n\n*   系统预计会有许多带有相关 LOV（值列表）查找表的查找字段，这些字段很可能在后续过程中扩展。与其单独构建每个\
  \ LOV，不如有一个集中式解决方案来处理所有内容。\n*   所有 LOV 都应遵循相同的格式，即两列（ID/DISPLAY），第一列是查找键，第二列是文本。\n\
  \n这些需求非常适合使用动态 SQL：在运行时定义操作的重复模式，其中一些在初始编码时可能未知。以下代码在此场景中很有用：\n\n```sql\nCREATE\
  \ TYPE lov_t IS OBJECT (id_nr NUMBER, display_tx VARCHAR2(256));\n```\n\n```sql\n\
  CREATE TYPE lov_tt AS TABLE OF lov_t;\n```\n\n```sql\nCREATE FUNCTION f_getlov_tt\
  \ (\n          i_table_tx    VARCHAR2,\n          i_id_tx       VARCHAR2,\n    \
  \      i_display_tx  VARCHAR2,\n          i_order_nr    VARCHAR2,\n          i_limit_nr\
  \    NUMBER:=100)\nRETURN lov_tt\nIS\n    v_out_tt lov_tt := lov_tt();\n    v_sql_tx\
  \ VARCHAR2(32767);\nBEGIN\n    v_sql_tx:='SELECT lov_item_t '||\n              \
  \      '(SELECT lov_t(' ||\n                                dbms_assert.simple_sql_name(i_id_tx)||',\
  \ '||\n                      dbms_assert.simple_sql_name(i_display_tx)||') lov_item_t\
  \ '||\n                    ' FROM '||dbms_assert.simple_sql_name(i_table_tx)||\n\
  \                       ' order by '||dbms_assert.simple_sql_name(i_order_nr)||\n\
  \                ')' ||\n             ' WHERE ROWNUM <= :limit';\n    EXECUTE IMMEDIATE\
  \ v_sql_tx BULK COLLECT INTO v_out_tt USING i_limit_nr;\n    RETURN v_out_tt;\n\
  END;\n```\n\n```sql\nSELECT * FROM TABLE(CAST(f_getlov_tt(:1,:2,:3,:4,:5) AS lov_tt))\n\
  ```\n\n这个示例包含了动态 SQL 的所有核心语法元素：\n\n*   要执行的代码由 PL/SQL 字符串变量表示。\n*   通过绑定变量传入或传出其他参数。绑定变量是逻辑占位符，在执行步骤与实际参数关联。\n\
  *   绑定变量用于值，而非结构元素。这就是为什么表名和列名被连接到语句中。\n*   `DBMS_ASSERT`包有助于防止代码注入（因为你必须使用连接），它强制要求表名和列名是“简单的\
  \ SQL 名称”（没有空格，没有分隔符等）。\n*   由于 SQL 语句有输出，输出被返回到匹配类型的 PL/SQL 变量（原生动态 SQL 允许用户定义的数据类型，包括集合）。\n\
  \n示例中的最后一条语句（调用`F_GETLOV_TT`的 SELECT 语句）应该提供给前端开发人员。这是他们集成到应用程序中所需的唯一信息。其他所有内容都可以由数据库开发人员处理，包括优化、权限、特殊处理逻辑等。对于这些项目中的每一项，都有一个单一的修改点和单一的控制点。这种“单点”概念是帮助最大限度地减少未来开发、调试和审计工作量的最关键特性之一。\n\
  \n##### 原生动态 SQL 示例 #2\n\n示例#1 针对的是构建新系统的开发人员。示例#2 适用于维护现有系统的人员。\n\n在某个时候，Oracle\
  \ 决定更改删除基于函数的索引时的默认行为：所有引用拥有此类索引的表的 PL/SQL 对象都会自动失效。正如预期的那样，这一改变在许多批处理例程中造成了严重破坏。因此，Oracle\
  \ 提供了一个通过设置跟踪事件来解决的变通方法。删除任何基于函数的索引的例程采用以下形式：\n\n```sql\nCREATE PROCEDURE p_dropFBIndex\
  \ (i_index_tx VARCHAR2) is\nBEGIN\n    EXECUTE IMMEDIATE\n        'ALTER SESSION\
  \ SET EVENTS ''10624 trace name context forever, level 12''';\n    EXECUTE IMMEDIATE\
  \ 'drop index '||i_index_tx;\n    EXECUTE IMMEDIATE\n        'ALTER SESSION SET\
  \ EVENTS ''10624 trace name context off''';\nEND;\n```\n\n这个示例说明了动态 SQL 的另一个关键元素。你不仅限于\
  \ DML。任何有效的 PL/SQL 匿名块或 SQL 语句，包括 DDL 或`ALTER SESSION`，都可以在运行时操作中执行。因此，DBA 不再需要他们最喜欢的脚本生成脚本的脚本，因为所有这些情况都可以在数据库中直接处理。\n\
  \n### 动态游标\n\n动态游标的想法与执行动态 SQL 类似。但不是运行整个语句，而是打开一个游标并将 SELECT 语句作为参数传递。例如：\n\n```sql\n\
  DECLARE\n    v_cur SYS_REFCURSOR;\n    v_sql_tx VARCHAR2(<长度>)|CLOB:='有效的 _SQL_\
  \ 查询';\n    v_rec ...<记录类型>;\n        或\n    v_tt ...<记录集合>;\nBEGIN\n    OPEN v_cur\
  \ FOR v_sql_tx [<附加参数>];\n\n    FETCH v_cur INTO v_rec;\n          或\n    FETCH\
  \ v_cur BULK COLLECT INTO v_tt [<限制 N>];\n\n   CLOSE v_cur;\nEND;\n```\n\n根据我之前的经验，有两种情况动态游标可能派上用场。两个示例如下。\n\
  \n## 动态游标示例 #1\n\n使用动态游标的第一个案例与那些大量使用 `REF CURSOR` 类型变量作为不同应用层之间通信机制的场景有关。不幸的是，在大多数情况下，这类变量是由中间层创建的，而数据库端专家的参与度往往极低。我见过太多案例，业务逻辑\
  \ 100%有效，但为了解决直接功能问题而进行的实现，却造成了维护、调试甚至安全方面的噩梦！\n\n修复此问题的正确方法是将构建 `REF CURSOR` 的过程下沉到数据库层，因为所有创建的逻辑在那里更容易控制（尽管，正确关闭所有打开的游标仍然是中间层开发人员的责任；否则系统容易发生“游标泄漏”）。基础层面的包装函数应如下所示：\n\
  \n```sql\nCREATE FUNCTION f_getRefCursor_REF (i_type_tx VARCHAR2)\nRETURN SYS_REFCURSOR\n\
  IS\n  v_out_ref SYS_REFCURSOR;\n  v_sql_tx VARCHAR2(32767);\nBEGIN\n    if i_type_tx\
  \ = 'A' then\n        v_sql_tx:=<some code to build query A>;  \n    elsif i_type_tx\
  \ = 'B' then\n        v_sql_tx:=<some other code to build query B>;  \n  ...\n \
  \   END IF;\n    OPEN v_out_ref FOR v_sql_tx;\n    RETURN v_out_ref;\nEND;\n```\n\
  \n当任务不仅仅是构建和执行查询，还要向其中传入一些绑定变量时，事情就变得稍微有趣一些了。解决这个问题有几种不同的方法。最简单的是创建一个包含多个全局变量和相应返回函数的包。因此，获取正确结果的整个过程包括：设置所有适当的变量，并在同一会话中立即调用\
  \ `F_GETREFCURSOR_REF`。然而，我刚才描述的解决方案并不完美，因为中间层通常以纯粹的无状态方式与数据库通信。在这种情况下，就不可能使用 `PL/SQL`\
  \ 包变量。\n\n![images](img/square.jpg) 注意：我所说的中间层无状态实现，是指每次数据库调用都获得一个独立的数据库会话（即使是在同一个逻辑操作的上下文中）。这个会话可以是从现有连接池中选取的，也可以是即时打开的，但实际来说，所有会话级资源在两次调用之间都应被视为“丢失”，因为无法确保后续调用会命中与前一次调用相同的会话。\n\
  \n尽管如此，Oracle 提供了足够的额外选项，可以使用对象集合或 `XMLType`（后者更加灵活）来克服这个限制。当然，这些方法都需要对查询进行一些不平凡的改动（如下面的示例所示），但结果是一个\
  \ 100%抽象的查询构建器。\n\n```sql\nCREATE FUNCTION f_getRefCursor_ref\n        (i_type_tx\
  \ VARCHAR2:='EMP',\n        i_param_xml XMLTYPE:= XMLTYPE(\n                '<param\
  \ col1_tx=\"DEPTNO\" value1_tx=\"20\" col2_tx=\"ENAME\" value2_tx=\"KING\"/>')\n\
  \        )\nRETURN SYS_REFCURSOR\nIS\n    v_out_ref SYS_REFCURSOR;\n    v_sql_tx\
  \ VARCHAR2(32767);\nBEGIN\n    IF i_type_tx = 'EMP' THEN\n        SELECT       \
  \       \n            'WITH param AS  ('||\n            '    SELECT   TO_NUMBER(EXTRACTVALUE\
  \ (in_xml, ''/param/@value1_tx'') value1, '||\n            '                   \
  \    EXTRACTVALUE (in_xml, ''/param/@value2_tx'') value2 '||\n            '    FROM\
  \ (SELECT :1 in_xml FROM DUAL) '||\n            '                             )\
  \ '||\n            ' SELECT count(*)'||\n            ' FROM scott.emp, '||\n   \
  \         '             param '||\n            ' WHERE emp.'|| dbms_assert.simple_sql_name(\n\
  \                                    EXTRACTVALUE (i_param_xml, '/param/@col1_tx')\n\
  \                                            )||'=param.value1 '||\n           \
  \ 'OR emp.'|| dbms_assert.simple_sql_name(\n                                   EXTRACTVALUE\
  \ (i_param_xml, '/param/@col2_tx')\n                                    )||'=param.value2'\n\
  \        INTO v_sql_tx  FROM DUAL;\n\n    ELSIF i_type_tx = 'B' THEN\n        v_sql_tx:='<queryB>';\
  \  \n  ...\n    END IF;\nOPEN v_out_ref FOR v_sql_tx USING i_param_xml;\n    RETURN\
  \ v_out_ref;\nEND;\n```\n\n在此示例中，单个 `XML` 变量的参数代表一组对，其中在每组中，第一个参数定义应过滤哪些列（`EMP.DEPTNO`\
  \ 和 `EMP.ENAME`），第二个参数设置此过滤器的值（`20` 和 `KING`）。列（`COL1_TX` 和 `COL2_TX`）在查询构建时进行评估，因为它们是结构元素，而值则作为\
  \ `XMLType` 的单个输入参数传递到创建的查询中。尽管最终的语法看起来有些复杂，但上面的示例证明，将所有与数据库相关的系统元素放在它们所属的位置（即数据库中）是可能的。\n\
  \n## 动态游标示例 #2\n\n如果我们接受 `EXECUTE IMMEDIATE` 的主要限制，那么动态游标的另一个有效利用案例就变得不言自明了。它是一个单一的\
  \ `PARSE/EXECUTE/FETCH` 事件序列，无法停止或暂停。因此，在通过 `BULK COLLECT` 进行多行提取的情况下，总是存在尝试将过多元素加载到输出集合中的严重风险。当然，可以通过添加\
  \ `WHERE ROWNUM <=:1` 来缓解此风险，如初始示例所示。但这个选项也不完美，因为它不允许从同一个源继续读取。动态游标可以解决这个问题。\n\n\
  对于此示例，假设你需要编写一个模块，该模块将从表中读取前 N 个值，如果未到达字母表中间则停止，否则继续直到末尾。解决方案如下所示：\n\n```sql\nCREATE\
  \ FUNCTION f_getlov_tt  (\n        i_table_tx    VARCHAR2,\n        i_id_tx    \
  \      VARCHAR2,\n        i_display_tx VARCHAR2,\n        i_order_nr   VARCHAR2,\n\
  \        i_limit_nr     NUMBER:=50)\nRETURN lov_tt\nIS\n    v_out1_tt lov_tt :=\
  \ lov_tt();\n    v_out2_tt lov_tt := lov_tt();\n    v_sql_tx VARCHAR2(32767);\n\
  \    v_cur SYS_REFCURSOR;\nBEGIN\n    v_sql_tx:='SELECT lov_t(' ||\n           \
  \                    dbms_assert.simple_sql_name(i_id_tx)||','||\n             \
  \     dbms_assert.simple_sql_name(i_display_tx)||')'||\n\n      ' FROM '||dbms_assert.simple_sql_name(i_table_tx)||\n\
  \      ' ORDER BY '||dbms_assert.simple_sql_name(i_order_nr);\n\n    OPEN v_cur\
  \ FOR v_sql_tx;\n    FETCH v_cur BULK COLLECT INTO v_out1_tt LIMIT i_limit_nr;\n\
  \    IF v_out1_tt.count=i_limit_nr AND UPPER(v_out1_tt(i_limit_nr).display_tx)>'N'\
  \ then\n           FETCH v_cur BULK COLLECT INTO v_out2_tt;\n           SELECT v_out1_tt\
  \ MULTISET UNION v_out2_tt INTO v_out1_tt FROM DUAL;\n    END IF;\n    CLOSE v_cur;\n\
  \n    RETURN v_out1_tt;\nEND;\n```\n\n此实现允许程序获取第一组记录（`V_OUT1_TT`），然后暂停，并在从已打开的游标提取数据的过程中应用逻辑规则：只有当定义的规则成功时，才会填充第二组记录（`V_OUT2_TT`），并且它只需通过继续提取即可从同一查询中填充，无需额外成本。这种“停走式”正是使此示例有价值的原因。\n\
  \n\n"
- "# DBMS_SQL\n\n`DBMS_SQL` 内置包是动态 SQL 思想的最初形态。尽管有传言称它可能被弃用，但该包随着 RDBMS 版本的更新持续进化。显然，保留\
  \ `DBMS_SQL` 有其充分理由，因为它提供了对**执行时定义的语句**所能达到的最低级别的控制。你可以将解析、执行、获取结果、定义输出以及处理绑定变量作为独立的命令随意执行。当然，这种粒度控制的代价是性能（但\
  \ Oracle 正在不断缩小这一差距）和复杂性。通常的经验法则是，除非你确定无法避免使用 `DBMS_SQL`，否则不要使用它。\n\n以下是除了使用 `DBMS_SQL`\
  \ 外别无选择的几种情况：\n\n*   你需要超过 `EXECUTE IMMEDIATE` 的 32K 限制（在 Oracle 10g 及更低版本中）。\n\
  *   你有未知数量或类型的输入/输出参数（在所有版本中）。\n*   你需要对流程进行细粒度控制（在所有版本中，但在 11g 中有更多可能性）。\n\n第一种情况非常直接。你要么触及了限制，要么没有。然而，从开发角度看，后两种情况要有趣得多。本节接下来将通过示例说明，通过低级别访问系统逻辑可以实现什么。\n\
  \n在大量使用 `REF CURSOR` 变量的环境中，迟早会有人问这个问题：如何知道某个游标变量传递的确切查询是什么？在 Oracle 11g 之前，答案要么在源代码中，要么需要在\
  \ DBA 级别检查 SGA 的 `v$` 视图。但从 Oracle 11g 开始，可以双向转换 `DBMS_SQL` 游标和 `REF CURSOR`。这一特性使得以下解决方案成为可能：\n\
  \n```\nCREATE PROCEDURE p_explainCursor (io_ref_cur IN OUT SYS_REFCURSOR)\nIS\n\
  \    v_cur      INTEGER := dbms_sql.open_cursor;\n    v_cols_nr NUMBER := 0;\n \
  \   v_cols_tt dbms_sql.desc_tab;\nBEGIN\n    v_cur:=dbms_sql.to_cursor_number(io_ref_cur);\n\
  \    dbms_sql.describe_columns (v_cur, v_cols_nr, v_cols_tt);\n    FOR i IN 1 ..\
  \ v_cols_nr LOOP\n        dbms_output.put_line(v_cols_tt (i).col_name);\n    END\
  \ LOOP;      \n    io_ref_cur:=dbms_sql.to_refcursor(v_cur);\nEND;\n```\n\n```\n\
  SQL> DECLARE\n  2    v_tx VARCHAR2(256):='SELECT * FROM dept';\n  3    v_cur SYS_REFCURSOR;\n\
  \  4  BEGIN\n  5    OPEN v_cur FOR v_tx;\n  6    p_explainCursor(v_cur);\n  7  \
  \  CLOSE v_cur;\n  8  END;\n  9  /\nDEPTNO\nDNAME\nLOC\nPL/SQL procedure successfully\
  \ completed.\nSQL>\n```\n\n此示例利用了过程 `DBMS_SQL.DESCRIBE_COLUMNS`，它接受任意已打开的游标并分析其结构。如果游标是为\
  \ SQL 查询打开的，信息包括输出中的列数、列名和列数据类型等。这让我们回到了管理 `UNKNOWN` 的概念。我们获取一些未知的内容，通过应用适当的工具，将这些潜在有用信息的原始材料转换为可用于解决实际业务需求的可靠数据。\n\
  \n### 动态思维示例\n\n在正式介绍了本章的主角之后，现在有必要展示一个恰当应用动态思维的“黄金标准”案例。本节的示例来自一个实际的生产问题，完美地说明了高级数据库开发人员当前面临的问题概念级别。从一开始，这个任务就极具挑战性。\n\
  \n*   存在大约 100 个表，以层次结构描述一个人：客户 A 有电话 B，由参考人 C 确认，而 C 又有地址 D，等等。\n*   整个客户及其相关子数据偶尔需要被克隆。\n\
  *   所有表都有一个从共享序列 (`OBJECT_SEQ`) 生成的单列合成主键；所有表通过外键链接。\n*   数据模型会相当频繁地更改，因此不允许硬编码。请求必须即时处理，因此无法禁用约束或使用任何其他数据转换变通方法。\n\
  \n在这种情况下，克隆过程涉及什么？很明显，克隆根元素（客户）将需要一些硬编码，但其他所有内容在概念上代表沿着依赖树的分层遍历。克隆过程肯定需要某种快速访问存储（本例中是关联数组），用于保存旧/新\
  \ ID 对的信息（使用旧 ID 查找新 ID）。此外，还需要一个嵌套表数据类型来保存要传递到下一层级的主键列表。因此，除了主过程的声明外，还创建了以下类型：\n\
  \n```\nCREATE PACKAGE clone_pkg\nIS\n    TYPE pair_tt IS TABLE OF NUMBER INDEX BY\
  \ BINARY_INTEGER;\n    v_Pair_t pair_tt;\n\n    PROCEDURE p_clone (in_table_tx VARCHAR2,\
  \ in_pk_tx VARCHAR2, in_id NUMBER);\nEND;\n```\n\n```\nCREATE TYPE id_tt IS TABLE\
  \ OF NUMBER;\n```\n\n注意，第二个类型 (`ID_TT`) 应创建为数据库对象，因为它将在 SQL 中被积极使用。第一个类型 (`PAIR_TT`)\
  \ 仅在 PL/SQL 代码上下文中用于存储旧/新值；这就是为什么我在包 (`CLONE_PKG`) 中创建它并立即声明一个该类型的变量。\n\n由于我试图识别潜在模式，我将忽略克隆客户的根过程（因为它将与其他所有过程不同）。同时，我将忽略向下第一层（属于客户的电话），因为它只涵盖了一个子情况（单个父级的多个子项）。让我们从向下两层开始，弄清楚如何克隆确认现有电话号码的参考人（假设新电话已经创建）。从逻辑上讲，操作流程如下：\n\
  \n1.  查找确认所有现有电话的所有参考人。\n    1.  现有电话作为电话 ID 集合 (`V_OLDPHONE_TT`) 传递。\n    2.  所有检测到的参考人被加载到暂存的\
  \ PL/SQL 集合 (`V_ROWS_TT`) 中。\n2.  处理每个检测到的参考人。\n    1.  存储所有检测到的参考人 ID (`V_PARENT_TT`)，这些\
  \ ID 将在层次树的后续层级中使用。\n    2.  从序列中检索一个新的 ID，并在全局包变量中记录旧/新 ID 对。\n    3.  在暂存集合 (`V_ROWS_TT`)\
  \ 中，用新值替换主键（参考人 ID）和外键（电话 ID）。\n3.  遍历暂存集合，并将新行插入到参考人表中。\n\n实现这些步骤的代码如下：\n\n```\n\
  DECLARE\nTYPE rows_tt IS TABLE of REF%ROWTYPE;\n    v_rows_tt rows_tt;\n    v_new_id\
  \ NUMBER;\n    v_parent_tt id_tt:=id_tt();\nBEGIN\n    SELECT * BULK COLLECT INTO\
  \ v_rows_tt\nFROM REF t WHERE PHONE_ID in\n        (SELECT column_value FROM TABLE\
  \ (CAST (v_oldPhone_tt AS id_tt)));\n\n    FOR i IN v_rows_tt.first..v_rows_tt.last\
  \ LOOP\n      v_parent_tt.extend;\n      v_parent_tt(v_parent_tt.last):=v_rows_tt(i).REF_ID;\n\
  ```\n\n\n"
- "# 使用动态 SQL 实现通用克隆\n\n有趣的是，如果仔细检查所生成的代码，会发现它包含三种元素：\n\n*   传入的父主键列表（`V_OLDPHONE_TT`）。\n\
  *   一个主要的逻辑处理过程。\n*   定义处理过程应作用对象的功能标识符：\n    *   子表名称（`REF`）。\n    *   子表的主键列名（`REF_ID`）。\n\
  \    *   子表的外键列名（`PHONE_ID`）。\n\n从技术角度讲，我试图构建一个具有结构化参数（表名、列名）和数据参数（父 ID）的模块，这正是利用动态\
  \ SQL 的完美案例，因为它能同时处理这两类参数。\n\n由于层级结构的每一层都可以通过检查外键关系来完整表示，因此显然可以使用 Oracle 数据字典来遍历父-子树（目前，我将假设系统中不存在循环依赖）。思路非常直接：以表名作为输入，返回其子表列表（包含相应的子表主键列和指向父表的外键列）。虽然以下代码不包含任何动态\
  \ SQL，但它足够有用，值得展示（同样摘自`CLONE_PKG`包）：\n\n```sql\nTYPE list_rec IS RECORD\n      \
  \  (table_tx VARCHAR2(50), fk_tx VARCHAR2(50), pk_tx VARCHAR2(50));\nTYPE list_rec_tt\
  \ IS TABLE OF list_rec;\n\nFUNCTION f_getChildrenRec (in_tablename_tx VARCHAR2)\n\
  RETURN list_rec_tt\nIS\n    v_out_tt list_rec_tt;\nBEGIN\n    SELECT fk_tab.table_name,\
  \ fk_tab.column_name fk_tx, pk_tab.column_name pk_tx\n    BULK COLLECT INTO v_Out_tt\n\
  \    FROM\n        (SELECT ucc.column_name, uc.table_name\n         FROM user_cons_columns\
  \ ucc,\n              user_constraints uc\n         WHERE ucc.constraint_name =\
  \ uc.constraint_name\n         AND   constraint_type = 'P') pk_tab,\n         (SELECT\
  \ ucc.column_name, uc.table_name\n          FROM   user_cons_columns ucc,\n    \
  \            (SELECT constraint_name, table_name\n                FROM user_constraints\n\
  \                WHERE r_constraint_name = (SELECT constraint_name\n           \
  \                                FROM user_constraints\n                       \
  \                    WHERE table_name = in_tablename_tx\n                      \
  \                     AND constraint_type = 'P'\n                              \
  \             )\n                   ) uc\n          WHERE ucc.constraint_name =\
  \ uc.constraint_name ) fk_tab\n    WHERE pk_tab.table_name = fk_tab.table_name;\n\
  \    RETURN v_out_tt;\nEND;\n```\n\n现在，我拥有了构建通用处理模块所需的所有信息片段，该模块将递归调用自身，直到达到父-子链的末端，如下所示。如定义所示，该模块将接收一个父主键\
  \ ID 集合和一个`CLONE_PKG.LIST_REC`类型的单一对象作为输入，该对象将描述要处理的父-子链接。\n\n```sql\nPROCEDURE\
  \ p_process (in_list_rec clone_pkg.list_rec, in_parent_list id_tt)\nIS\n    v_execute_tx\
  \ VARCHAR2(32767);\nBEGIN\n    v_execute_tx:=\n        'DECLARE '||\n        ' \
  \   TYPE rows_tt IS TABLE OF '||in_list_rec.table_tx||'%rowtype;'||\n        ' \
  \   v_rows_tt rows_tt;'||\n        '    v_new_id number;'||\n        '    v_list\
  \ clone_pkg.list_rec_tt;'||\n        '    v_parent_list id_tt:=id_tt();'||\n   \
  \     'BEGIN '||\n        '    SELECT * BULK COLLECT INTO v_rows_tt '||\n      \
  \  '    FROM '||in_list_rec.table_tx||' t WHERE '||in_list_rec.fk_tx||\n       \
  \ '       IN  (SELECT column_value FROM TABLE (CAST (:1 as id_tt)));'||\n      \
  \  '    IF v_rows_tt.count()=0 THEN RETURN; END IF;'||\n        '    FOR i IN v_rows_tt.first..v_rows_tt.last\
  \ LOOP '||\n        '       SELECT object_Seq.nextval INTO v_new_id FROM DUAL;'||\n\
  \        '       v_parent_list.extend;'||\n        '       v_parent_list(v_parent_list.last):=v_rows_tt(i).'||in_list_rec.pk_tx||';'||\n\
  \        '       clone_pkg.v_Pair_t(v_rows_tt(i).'||in_list_rec.pk_tx||'):=v_new_id;'||\n\
  \        '       v_rows_tt(i).'||in_list_rec.pk_tx||':=v_new_id;'||\n        ' \
  \      v_rows_tt(i).'||in_list_rec.fk_tx||\n                        ':=clone_pkg.v_Pair_t(v_rows_tt(i).'||in_list_rec.fk_tx||');'||\n\
  \        '    END LOOP;'||\n        '    FORALL i IN v_rows_tt.first..v_rows_tt.last\
  \ '||\n        '    INSERT INTO '||in_list_rec.table_tx||' VALUES v_rows_tt(i);'||\n\
  \        '    v_list:=clone_pkg.f_getchildrenRec('''||in_list_rec.table_tx||''');'||\n\
  \        '    IF v_list.count()=0 THEN RETURN; END IF;'||\n        '    FOR l IN\
  \ v_list.first..v_list.last LOOP '||\n        '        clone_pkg.p_process(v_list(l),v_parent_list);'||\n\
  \        '    END LOOP;'||\n        'END;';\n    EXECUTE IMMEDIATE v_execute_tx\
  \ USING in_parent_list;\nEND;\n```\n\n最后一块需要的是一个入口点，它将接收一个根对象并克隆它。要启动整个过程，你需要知道起始表、其主键列以及要克隆的根元素的主键。\n\
  \n```sql\nPROCEDURE p_clone (in_table_tx VARCHAR2, in_pk_tx VARCHAR2, in_id NUMBER)\n\
  IS\n    v_new_id NUMBER;    \n    PROCEDURE p_processRoot is\n        v_sql_tx VARCHAR2(32767);\n\
  \    BEGIN\n      v_sql_tx:=\n      'DECLARE '||\n      '   v_row '||in_table_tx||'%ROWTYPE;\
  \ '||\n      '   v_listDirectChildren_t clone_pkg.list_rec_tt; '||\n      '   v_parent_list\
  \ id_tt:=id_tt(); '||\n      '   v_old_id NUMBER:=:1; '||\n      '   v_new_id NUMBER:=:2;\
  \ '||\n      'BEGIN '||\n      '  SELECT * INTO v_row FROM '||in_table_tx||\n  \
  \    '    WHERE '||in_pk_tx||'=v_old_id;'||\n      '    v_row.'||in_pk_tx||':=v_new_id;'||\n\
  \      '    clone_pkg.v_Pair_t(v_old_id):=v_new_id;'||\n      '    v_parent_list.extend;'||\n\
  \      '    v_parent_list(v_parent_list.last):=v_old_id;'||\n      '    INSERT INTO\
  \ '||in_table_tx||' VALUES v_row;'||\n      '    v_listDirectChildren_t:=clone_pkg.f_getChildrenRec(:3);'||\n\
  \      '    FOR i IN v_listDirectChildren_t.first..v_listDirectChildren_t.last'||\n\
  \      '    LOOP'||\n      '        clone_pkg.p_process(v_listDirectChildren_t(i),v_parent_list);\
  \ '||\n      '     END LOOP;'||\n      'END; ';\n      EXECUTE IMMEDIATE v_sql_tx\
  \ USING in_id,v_new_id,UPPER(in_table_tx);\n    END;\nBEGIN\n    clone_pkg.v_Pair_t.delete;\n\
  \    SELECT object_seq.nextval INTO v_new_id FROM DUAL;\n    p_processRoot;\nEND;\n\
  ```\n\n剩下的唯一步骤就是将所有这些片段组装到一个包中，以创建一个完全通用的克隆模块。（完整的代码片段集可以在 Apress.com 上本书的目录页面下载）。\n\
  \n为什么前面的例子被认为是“黄金标准”？主要是因为该示例基于对代码中重复模式的分析，这些模式可以被泛化。识别这些模式是应用动态 SQL 解决日常问题并变得非常高效的关键技能之一。\n\
  \n### 安全问题\n\n## 安全理念\n\n从安全角度来看，“处理未知情况”需要一定程度的**健康的偏执**。任何优秀的开发者都应该假设，如果某样东西*可能*被滥用，那么它*终将*被滥用的几率就很大。同时，非常常见的情况是，“操作者失误”的后果比任何可想象的蓄意攻击都更具破坏性，这导向一个结论：一个系统不仅需要防范犯罪分子，还需要防范任何不幸的事件组合。\n\
  \n在使用动态 SQL 时，上述概念应转化为以下思想：在任何情况下，都不应该能动态生成任何非预期生成的代码。考虑到代码既包含结构元素（表、列等）也包含数据，适用以下规则：\n\
  \n*   结构元素不能替代数据被传入。\n*   只能传入允许的结构元素。\n\n## 两条指导原则\n\n满足这两个条件的解决方案可以通过遵循以下两条规则来实现：\n\
  \n*   当应用用户输入纯数据元素（如列的值等）时，这些值必须通过绑定变量传递给动态 SQL。不应允许将任何值拼接到代码的结构部分。\n*   当由于应用用户的操作需要更改代码的整体结构时，此类操作必须限于已知的存储库元素。整体系统安全性应通过以下角色分离来强制执行：\n\
  \    *   普通用户无权更改存储库。\n    *   能够更改存储库的人员是特别指定的管理员。\n    *   任何管理员不能同时担任普通用户角色。\n\
  \n### 第一条规则：绑定变量\n\n第一条规则很容易解释。因为绑定变量仅在查询结构解析后才被评估，意外的值（如著名的 `NULL OR 1=1`）根本无法影响任何事情，如下所示：\n\
  \n```sql\nSQL> DECLARE\n  2     v_tx VARCHAR2(256):='NULL OR 1=1';\n  3     v_count_nr\
  \ NUMBER:=0;\n  4  BEGIN\n  5     EXECUTE IMMEDIATE 'SELECT count(*) FROM emp WHERE\
  \ ename = :1'\n  6     INTO v_count_nr USING v_tx ;\n  7     dbms_output.put_line('Bind:\
  \ '||v_count_nr);\n  8 \n  9     EXECUTE IMMEDIATE 'select count(*) FROM emp WHERE\
  \ ename = '||v_tx\n 10     INTO v_count_nr;\n 11     dbms_output.put_line('Inject:\
  \ '||v_count_nr);\n 12  END;\n 13  /\nBind: 0\nInject: 14\nPL/SQL procedure successfully\
  \ completed.\nSQL>\n```\n\n### 第二条规则：基于存储库的配置\n\n第二条规则意味着使用存储库，这可能与大多数当代开发者的习惯相悖，但它为输入可用选项的人员和实际使用这些选项的人员之间提供了一个独特的角色分离机会。这种基于存储库的解决方案的另一个优势是部署成本。由于所有需要的更改都可以通过对存储库表执行\
  \ DML 来处理，因此没有服务中断，也没有停机时间。这些考虑有时可以真正挽救项目，如下文的真实世界案例所示。\n\n## 真实案例研究\n\n从前有一个经典的\
  \ 3 层 IT 系统，即使是对前端进行最小的更改，通常也需要大约 4-6 小时的停机时间来部署（外加至少一天的准备工作）。新模块的需求至少每周来两次。这些需求非常简单，例如获取少量输入，执行相关例程，并报告结果。不幸的是，每个需求最初都必须作为一个新的屏幕单独编码，并通过常规机制部署。结果，公司里总是有一群不开心的人，要么是无法及时获得所需数据的用户，要么是每周都要经历数次为了添加一个简单屏幕而让整个系统停机的痛苦的维护团队。\n\
  \n将处理未知的概念应用到这个问题中，应该能使可用的替代方案更加清晰。让我们将信息分成两组：\n\n*   已知：\n    *   每个屏幕都必须部署到 Web。\n\
  \    *   每个屏幕都基于一个单一的请求。\n    *   每个请求最多接受五个简单参数。\n    *   每个请求以文本形式返回一个摘要。\n* \
  \  未知：\n    *   标题信息（屏幕名称、备注、参数名称）\n    *   参数的数据类型（包括可空性和可能的格式掩码）\n    *   摘要的格式\n\
  \n通过以建议的结构阐明问题，现在所提议解决方案的格式就清晰了：\n\n*   每个屏幕由存储库中的一行表示，具有以下属性集：\n    *   通用名称（弹出屏幕的标题）\n\
  \    *   最多 5 个参数，每个包括：\n        *   标题\n        *   必填/非必填标识\n        *   数据类型（`NUMBER`/`DATE`/`TEXT`/`LOV`）\n\
  \        *   可选的转换表达式（例如 UI 中的默认日期格式，因为 Web 上的所有内容都是基于文本的）\n        *   值列表名称（用于\
  \ `LOV` 数据类型）\n    *   相应函数的名称，格式如下：\n        *   输入参数的顺序（和数量）必须与屏幕参数的顺序匹配\n   \
  \     *   函数应返回一个 `CLOB`\n*   所有注册函数返回的 `CLOB` 必须是完全格式化的 HTML 页面，可立即在前端显示。\n*  \
  \ 存储库中的所有活动只能由管理员访问，终端用户不可见。\n\n因此，从系统的角度来看，操作的逻辑流程现在变得非常简单。\n\n1.  用户从存储库中看到可用模块列表并选择一个。\n\
  2.  前端应用程序读取存储库，并动态构建一个弹出屏幕，包含适当的输入字段和必填指示器。如果输入字段的数据类型是值列表，该实用程序会请求通用的 `LOV` 机制提供现有的\
  \ `ID`/`DISPLAY` 对。\n3.  用户输入所需内容并按下 `SUBMIT`。前端通过将正在使用的模块的存储库 ID 和所有用户输入的值传递给它，来触发主（伞形）过程。\n\
  4.  伞形过程构建一个真实的函数调用，传入输入的值，并将生成的 `CLOB` 返回给前端（已经格式化为 HTML）。\n5.  前端显示生成的 HTML。\n\
  \n现在所有团队都会很高兴，因为从任何新模块被宣布为生产就绪，到它可从前端访问，只需要几秒钟。没有停机，也没有部署——只需复制一个新函数并在存储库中用一个 `INSERT`\
  \ 语句注册该函数。\n\n## 实现示例\n\n为了说明所有这些“奇迹”是什么样子，示例的准备部分是构建一个满足所有格式要求的函数，创建一个存储库表，并在存储库中注册该函数：\n\
  \n```sql\nCREATE FUNCTION f_getEmp_CL (i_job_tx VARCHAR2, i_hiredate_dt DATE)\n\
  RETURN CLOB\nIS\n    v_out_cl CLOB;\n    PROCEDURE p_add(pi_tx VARCHAR2) IS\n  \
  \  BEGIN\n        dbms_lob.writeappend(v_out_cl,length(pi_tx),pi_tx);\n    END;\n\
  BEGIN\n    dbms_lob.createtemporary(v_out_cl,true,dbms_lob.call);\n    p_add('<html><table>');\
  \    \n    FOR c IN (SELECT '<tr>'||'<td>'||empno||'</td>'||'<td>'||ename||'</td>'||'</tr>'\
  \ row_tx\n                     FROM emp\n                     WHERE job = i_job_tx\n\
  \                     AND hiredate >= NVL(i_hiredate_dt,add_months(sysdate,-36))\n\
  \                     )\n    LOOP\n        p_add(c.row_tx);\n    END LOOP;\n   \
  \ p_add('</table></html>');\n    RETURN v_out_cl;\nEND;\n```\n\n"
- "# Oracle 中的动态 SQL\n\n### 性能与资源利用\n\n除了安全风险，还有一个阻碍人们有效使用动态 SQL 的“拦路虎”：人们认为它在性能上代价过高。问题在于这种说法从未被完整阐述：所谓“代价高”是与什么相比？确实，直接运行同一条语句比将其包装在\
  \ `EXECUTE IMMEDIATE` 命令中要快。但这就像拿苹果和橘子作比较。单个任务运行所需的时间绝对无关紧要，因为唯一需要调优的关键点是模块的整体性能。\n\
  \n请再看一下上一节中使用动态 SQL 与仓库交互的示例。当然，这会带来一些开销，例如将结果预格式化为 HTML、使用封装模块、对底层函数进行动态调用等等。与手工构建的界面相比，这些因素中的每一个都会降低请求处理的速度。但关键问题依然存在：有人注意到这个减速吗？答案是“没有”，因为所有列出的“开销”最多只会导致毫秒级的时间消耗，相对于总处理时间而言可以忽略不计。\n\
  \n这意味着，实际需要评估的因素是，为使用动态 SQL 所付出的代价是否值得。每次的答案都将取决于对特定业务场景的详细分析。会有一些场景中这个代价是可以接受的（比如刚刚回顾的那个），而在另一些场景中代价会过高。下面的例子说明了后一种情况。\n\
  \n### 反模式\n\n有时，最终用户会在应用程序中要求一个多选选项。这通常意味着需要对一个未定义的元素列表执行某项操作。由于列表的长度未知，使用文本字符串作为通信机制就显得非常诱人，如以下流程所示：\n\
  \n1.  前端代码将所有选中的 ID 连接成一个逗号分隔的字符串。\n2.  该字符串被传递给 PL/SQL 函数。\n3.  PL/SQL 函数利用动态 SQL\
  \ 来构建 `IN` 子句。\n\n以下是该流程最后一步所需的 PL/SQL 函数：\n\n```sql\nCREATE FUNCTION f_getSumSal_nr\
  \ (i_empno_tx VARCHAR2)\nRETURN NUMBER\nIS\n    v_out_nr NUMBER:=0;\n    v_sql_tx\
  \ VARCHAR2(2000);\nBEGIN\n    IF i_empno_tx IS NOT NULL THEN\n        v_sql_tx:='SELECT\
  \ sum(sal) FROM emp WHERE empno IN ('||i_empno_tx||')';\n        EXECUTE IMMEDIATE\
  \ v_sql_tx INTO v_out_nr;\n    END IF;\n    RETURN v_out_nr;\nEND;\n```\n\n不幸的是，这个看似干净的解决方案存在一些缺点，通常只在应用程序部署到生产环境一段时间后才会显现。以下列举几点：\n\
  \n*   对可传递对象的总数有限制：`32K/(ID 长度+1)` 或 `4K/(ID 长度+1)`，取决于该函数是仅在 PL/SQL 中使用还是作为 SQL\
  \ 语句的一部分。将整个模块转换为 `CLOB` 而不是 `VARCHAR2` 代价非常高，因为 `CLOB` 的开销，特别是在物理 `I/O` 方面。\n*\
  \   如果值的列表不只是由 ID 构成，而是某种文本，这就引出了文本中引号数量是否正确的问题。\n*   由于列表中项目数量未知，可能会得到不同的执行计划。此外，此代码会非常容易受到列级统计信息变更的影响。\n\
  *   它不安全（传递 `SELECT empno FROM emp` 会立即提供不同级别的数据访问权限），但要使此模块防注入，需要进行非常复杂的字符串解析。\n\
  \n总的来说，根据我的经验，动态 SQL 在这种情况下产生的效果是负面的。替代方案如下所示：\n\n```sql\nCREATE TYPE id_tt IS TABLE\
  \ OF NUMBER;\n\nCREATE FUNCTION f_getSumSal_nr (i_tt id_tt)\nRETURN NUMBER IS\n\
  \    v_out_nr NUMBER:=0;\nBEGIN\n    IF i_tt IS NOT NULL AND i_tt.count>0 THEN\n\
  \        SELECT sum(sal) INTO v_out_nr\n        FROM emp\n        WHERE empno IN\
  \ (SELECT t.column_value FROM TABLE(CAST(i_tt as id_tt)) t);\n    END IF;\n    RETURN\
  \ v_out_nr;\nEND;\n```\n\n这个解决方案使用一个对象集合来传递列表。这种集合的开销，通过执行常规 SQL 而非动态 SQL，并且无需担心数据长度/数据结构，得到了很好的补偿。\n\
  \n\n\n#### 比较动态 SQL 的不同实现\n\n由于动态 SQL 存在不同的实现方式，哪种类型会更高效呢？接下来这个实际案例将说明为什么你需要了解 `DBMS_SQL`\
  \ 包。这个任务的起因是终端用户希望系统能够根据一系列预定义的模板上传 CSV 文件。以下是该系统的一些需求和特点：\n\n*   文件前缀定义了模板类型。列标题直接映射到表列（如果标题未注册，则将被忽略）。\n\
  *   文件中的一行代表一个包含 1 到 N 行的逻辑组。例如，一行可能同时包含操作记录和修正记录（你可以将其视为销售交易和取消交易——两者关联但独立）。\n\
  *   必须支持组级别验证。规则适用于整组行，而非每一次插入。\n\n该解决方案最初的实现方式非常直接：读取一行，使用标题信息构建一个文本字符串形式的 `INSERT`\
  \ 语句，然后执行 `EXECUTE IMMEDIATE` 命令。但当面对真实的数据量（单个文件超过 1 万行）时，数据库管理员开始抱怨 CPU 负载过高。同时，早期采用者也抱怨该模块的性能远低于最初预期（并且随着文件增大而恶化）。经过详细的数据库追踪，问题变得清晰：所有额外耗费的时间都源于解析\
  \ `INSERT` 语句。\n\n请记住以下关于解析的信息：\n\n*   不带绑定变量的 `EXECUTE IMMEDIATE`：N 次调用对应 N 次硬解析\n\
  *   带绑定变量的 `EXECUTE IMMEDIATE`：\n    *   10g 及以下版本：N 次调用对应 1 次硬解析 + N-1 次软解析\n \
  \   *   11g：仅当重复执行相同语句时，才进行一次硬解析。这是一种内部优化（不可见），并且如果存在多种调用类型，则不会生效。\n*   `DBMS_SQL`\
  \ 将解析和执行阶段分离：对于每种调用类型仅需一次硬解析，因为 `DBMS_SQL` 允许存储已解析的语句并多次复用。\n\n由于大多数模板包含多种类型的 `INSERT`\
  \ 语句，不幸的是 Oracle 11g 在这种情况下完全帮不上忙。然而，从 `EXECUTE IMMEDIATE` 切换到 `DBMS_SQL` 看起来很有希望，于是我进行了相应的修改。\n\
  \n第一步是准备 `INSERT` 语句，为每条语句分配自己的 `DBMS_SQL` 游标（已解析），并将这些游标存储在关联数组中以便后续访问，如下所示：\n\n\
  ```\nDECLARE\n    TYPE integer_tt IS TABLE OF integer;\n    v_cur_tt integer_tt;\n\
  \    ...\nBEGIN\n    ...\n    FOR r IN v_groupRow_tt.first..v_groupRow_tt.last LOOP\n\
  \        v_cur_tt(r):=dbms_sql.open_cursor;\n        FOR c IN c_cols(v_groupRow_tt(r))\
  \ LOOP\n            FOR i IN v_header_tt.first..v_header_tt.last LOOP\n        \
  \        IF v_header_tt(i).text=c.name_tx THEN\n                    v_col_tt(i):=c;\n\
  \                    v_columnRow_tt(r||'|'||v_col_tt(i).name_tx):=v_col_tt(i).viewcol_tx;\n\
  \                    v_col_tx:=v_col_tx||','||v_col_tt(i).viewcol_tx;\n        \
  \            v_val_tx:=v_val_tx||',:'||v_col_tt(i).viewcol_tx;\n               \
  \ END IF;\n            END LOOP;\n        END LOOP;\n        v_sql_tx:='INSERT INTO\
  \ '||v_map_rec.view_tx||'('||v_col_tx||') VALUES('||v_val_tx||')';\n        dbms_sql.parse(v_cur_tt(r),v_sql_tx,dbms_sql.native);\n\
  \    END LOOP;\n```\n\n现在只需遍历上传文件的所有行，找到对应的行类型（从数组中），绑定变量，然后执行 `INSERT` 语句。\n\n\
  ```\n    FOR i IN 2..v_row_tt.count LOOP -- first row is a header\n        FOR r\
  \ IN v_groupRow_tt.first..v_groupRow_tt.last LOOP\n            FOR c IN v_col_tt.first..v_col_tt.last\
  \ LOOP\n                IF v_columnRow_tt.exists(r||'|'||v_col_tt(c).name_tx)THEN\n\
  \                    dbms_sql.bind_variable\n                         (v_cur_tt(r),':'||v_col_tt(c).viewcol_tx,\
  \ v_data_tt(c).text);\n                END IF;\n            END LOOP;\n        \
  \    v_nr:=dbms_sql.execute(v_cur_tt(r));\n        END LOOP;\n    END LOOP;\n  \
  \  …\nEND;\n```\n\n想象一下，当处理 6 万行数据集的总时间降低了 50 倍时，我是多么惊讶！这无疑让用户们非常高兴。\n\n这个例子完美地说明了系统调优的复杂性。它不能简单地归结为底层技术分析，而必须始终包含对预期结果的全局视角。只有这种性能优化方法才能保证所选方案在此时此地是有效的。根本不存在普遍适用的最佳方法——只有特定情况下的最优解。\n\
  \n### 对象依赖性\n\n使用动态 SQL 时，第三个主要顾虑（仅次于安全性和性能）源于将硬编码解决方案转换为动态方案会导致 Oracle 无法追踪不同数据库对象之间的依赖关系。这个论点很难反驳，因为在编译阶段自动收集的大量“免费”信息确实不复存在了。真正的问题在于：缺少这种信息对系统开发过程究竟有何具体影响？\n\
  \n### 负面影响\n\n显然，可用数据减少并非好事。但在许多情况下，可以从略有不同的来源获取相同信息。让我们看看有哪些可用选项。以下是代码中丢失对象依赖记录可能导致的一些负面影响。\n\
  \n##### 没有依赖路径可追踪\n\n能够清晰记录对象依赖性的唯一可靠方法是使用基于代码库的解决方案，并且只使用一种（且唯一一种）从其生成代码的方式。此外，我强烈建议你以类似于\
  \ Oracle 数据字典的方式对代码库进行建模。将表、列和 PL/SQL 对象显式引用，而不是深埋在文本中，是很好的做法。这样一来，整个依赖性问题就简化为将\
  \ Oracle 数据字典与你自己的进行比较，这应该不是什么大问题。\n\n使用单一代码生成方法的需求也至关重要，因为它提供了 100% 的可预测性。由于将代码库转换为代码只有一种且唯一一种方式，所有操作都遵循相同的模式，不可能遇到意外的依赖关系。\n\
  \n##### 无法确定实际执行内容\n\n由于许多参数要么由用户输入，要么是动态构建的，如果不实际遇到，很难预测可能的语法错误。这个问题更难解决，但“采样器”概念可能非常有效。以下是一些你可以采取的方法来掌控实际将执行的内容：\n\
  \n*   生成所有可能（或尽可能多）的待执行代码排列组合，并用这些代码创建 PL/SQL 模块。此方法有助于识别初始代码问题。\n*   记录所有依赖关系，并保留一个引用相同对象集的简单模块。\n\
  *   如果采样模块变为无效状态，则表明代码存在问题。\n\n#### 正面影响\n\n任何特性（包括丢失对象依赖性）都可以被善用。以下是一些例子，说明缺乏依赖信息实际上如何能为你所用。\n\
  \n\n\n\n"
- "# PL/SQL 与并行处理\n\n## 你可以引用尚未存在于数据库中的对象\n\n如果你为每个月都有一个独立的生成过程（即年份和月份是过程名称的一部分），那么创建一个通用包装器比编写一个巨大的\
  \ CASE 语句更容易。以下是这样一个包装器的示例：\n\n```sql\nCREATE PROCEDURE p_runMonthly(i_dt date)\n\
  is\n    v_sql_tx VARCHAR2(256):='BEGIN p_run_'||to_char(i_dt,'YYYYMM')||'; END;';\n\
  BEGIN\n    EXECUTE IMMEDIATE v_sql_tx;\nEND;\n```\n\n甚至更好的是，当你必须向现有列表中添加另一个表时，这个通用调用器不需要任何维护。当然，有人可能会质疑在统一的命名模式上构建逻辑的安全性，但我见过太多这种类型的实现了。每次创建一个新对象都会给相关人员带来巨大的压力，除非所有引用都被包装进动态\
  \ SQL。\n\n## 让你的代码与失效的依赖项隔离开来\n\n有时，存在依赖关系并非好事，原因有很多：\n\n*   `代码生成器`：如果你将对生成模块的调用包装进动态\
  \ SQL，你就可以刷新这些模块而不会使所有依赖项失效。在使用 JDBC 连接数据库时，这可能是至关重要的，因为它们（与 Net8 调用相比）的容错性要低得多。\n\
  *   `远程对象`：因为你的维护周期可能与你项目中涉及的其他团队的维护周期不同，所以有可能当你通过数据库链接引用对象时，它们是不可访问或无效的。在这种情况下，唯一安全的方法是将所有远程调用包装进动态\
  \ SQL。\n*   `逻辑循环`：尽管非常困难，但你可能会创建一个对象引用链自身循环的情况。在这种情况下，唯一的解决方案是让其中一个步骤成为一个动态 SQL\
  \ 模块。\n\n### 总结\n\n总的来说，本章涵盖的材料表明，你不应该害怕偏离服务器端应用开发中那些久经考验的方法。当然，仍然会存在合理的学习曲线和隐藏的陷阱，但应用更高级技术（如动态\
  \ SQL）所带来的收益是巨大的，包括：\n\n*   开发人员可以实现更好的代码灵活性和可持续性。\n*   架构师可以构建需要更高级别抽象的解决方案，包括代码库和代码生成器。\n\
  *   管理员可以获得对现有系统更详细的控制，并提高代码的可管理性。\n\n所有这些积极影响最终都指向一个结论：有可能“更好、更快、更便宜”地构建现代 IT 项目（现在我保证在台下也会重复同样的故事！）。你只需要拥有合适的工具，并接受这样一个事实：除非你处理未知，否则它将违背你的意愿反过来处理你。\n\
  \n"
- '# 第 3 章


  ## PL/SQL 与并行处理


  作者：`Dominic Delmolino`


  想象一下，如果你去杂货店，一次只允许一个人进去。其他所有人都必须在外面排长队等待，直到每个人完成购物才能进入商店。更糟糕的是，想象一下你在店内只允许购买一件商品。如果你需要多件商品，你必须为每一件商品重新到店外排队。


  这种一次只进行一项活动的例子被称为 `串行处理`，虽然有可能加快这个活动，比如给每个购物者穿上轮滑鞋让他们在店里移动得更快，或者允许他们带购物车进去挑选多件商品，但它仍然受限于每次只让一个人购物的设计。


  谢天谢地，大多数商店都使用 `并行处理`——允许同时发生多个活动的能力。通过允许多人同时购物，商店在每一天能处理更多的订单。只要每个购物者购买的是不同的商品，他们的活动就是独特且独立的——这使它们非常适合并行处理。事实上，只有少数几次需要将这个活动串行化——通常是当两个或更多人想要购买货架上的同一件商品时。这时，购物者需要通过协商谁得到这件商品来
  `协调` 他们的活动。


  并行处理活动在自然界和社中很常见；我们都见过昆虫大军和鱼群将庞大的任务分而治之。随着收集和存储信息的成本持续降低，大型数据处理任务变得越来越普遍。随着公司开始积累海量数据，他们转向并行处理选项，作为在多个处理器和机器上分析和应对数据的方式。一种名为
  `MapReduce` 的并行编程技术作为一种通用构建可并行运行程序的方法而广受欢迎。在本章中，你将探索这些分而治之的技术，并使用 PL/SQL 将它们应用于数据库活动。在本章结束时，你将能够使用
  PL/SQL 和并行管道化函数编写你自己的并行 `MapReduce` 程序。但首先，让我们深入了解并行处理的历史。


  ### 为何需要并行处理？


  一言以蔽之：速度。我们所有人都希望事情进展得更快，工作完成得更迅速，能够按需获得答案。尽管计算机的速度越来越快，其电路数量成倍增加，时钟速度不断提高，片上能力也越来越多，我们仍然不满足。随着我们遇到单个处理器速度提升的物理限制，我们开始寻找其他加速程序的方法。


  如果计算机能自动找出将问题分解成更小部分并在这些更小的部分上并行运行程序的方法，那就太好了。自动识别并行性已经有了大量的研究，但事实证明，计算机很难理解哪里可以应用并行机会。人们曾尝试编写编译器，将高级编程语言转换为
  CPU 的显式并行指令流，但在这方面并没有太大成功，这使得我们需要自己手动设计并行处理策略。


  好消息是，如果实施得当，并行处理技术除了简单的加速之外，还为我们提供了若干好处，包括：


  *   更好的系统利用率，因为多处理器系统内的所有处理器都可以应用于一个任务。

  *   消除了“全有或全无”的过程，在部分子任务失败时允许部分完成。

  *   能够在固定时间内处理越来越大的数据集，而不是简单地将固定数据集加速到更短的时间内完成。


  事实证明，这些好处往往值得设计和实现并行程序所需的开销和艰苦工作。




  '
- "# 并行处理与大数据相关概念\n\n### 影响并行处理的定律\n\n解决问题的技术（或`算法`）由计算机科学家研究和实现，常常引出所谓的`计算定律`。其中一些定律与过去几年计算机架构和数据增长的趋势相互作用，影响了我们对并行处理的思考。\n\
  \n*   `摩尔定律`（1965）指出，可以容纳在集成电路上的晶体管数量每两年翻一番，并意味着计算机微处理器的速度和性能也将随之翻倍。从 1980 年代中期到大约\
  \ 2004 年，这种`加速`基本成立，因为处理器频率扩展保持了步伐。然而，功耗开始成为问题，导致了需要并行才能充分利用该定律的`多核`处理器的出现。\n* \
  \  `阿姆达尔定律`（1967）指出，在并行计算中使用多个处理器的程序，其加速受程序中顺序部分所需时间的限制。阿姆达尔定律对并行处理产生了冷却效应，因为它指出程序不可能比其顺序组件的执行速度更快。这意味着通过并行化程序所能获得的加速量是有限的，通常只能让程序比它们的串行对应物快\
  \ 10 到 20 倍。\n*   `古斯塔夫森定律`（1988）指出，具有非常大、重复数据集的问题可以有效地并行化，几乎是尴尬地并行（具有极小的顺序组件且易于划分为小的、独立单元的问题正式称为`尴尬并行`）。\n\
  \n这些定律之间的紧张关系在 2000 年代中期与另一个行业趋势——所谓“大数据”的兴起——相遇。\n\n### 大数据的兴起\n\n直到大约 2007 年，数据增长保持相当稳定和线性。然而，随着技术使捕获、存储和发送信息变得更容易，数据增长曲线出现了加速。2011\
  \ 年，世界产生的数据量将是 2006 年的十倍。其中大部分数据实际上是机器生成的，因为传感器和基于网络活动的捕获成本已经下降。我们过去可能认为千兆字节的数据是巨大的，而现在我们则以太字节、拍字节和艾字节的数据来衡量。\n\
  \n淹没在数据海洋中，我们开始看到，试图以串行方式利用这些数据是不可行的。一天只有 86，400 秒，如果我们一次处理一个比特，就需要极高的速度来处理这种数据。阿姆达尔定律旨在预测固定问题大小和顺序部分占比\
  \ 5%到 10%的加速情况，根本无法为处理这种以新速率增长的大型问题提供一个框架。10 到 20 倍的加速根本不够；我们需要超越串行加速，寻找处理越来越大的数据集的方法。古斯塔夫森定律包含了人们希望在相对较短的时间内解决越来越大的问题的观点，再加上\
  \ 2004 年处理器频率加速的衰退，导致了人们对并行编程重新产生了兴趣。\n\n## 并行处理与分布式处理\n\n在这一点上，你可能想知道如何在数据库环境中实现并行处理。你可能接触过一些较新的数据处理框架，它们使用许多通过网络连接在一起的廉价独立计算机来执行数据分析任务，听起来像是并行处理。毕竟，我们从自然中得到的例子似乎是这种架构的完美匹配。\n\
  \n这类环境通常被归类为分布式计算环境，其特点是缺乏对共享内存区域的访问，因此需要通过某种网络进行消息传递来通信。在分布式环境中，由于系统需要通过这种（与本地处理速度相比）缓慢的网络协调它们的活动，因此存在显著的开销。此外，在分布式系统中，假定每个进程只能看到一部分数据——没有一个进程可以访问整个数据集。这限制了分布式算法的适用性。当数据已经分布在节点之间，或者数据集如此之大以至于分割和分发数据的开销任务（包括节点间通信开销）与整个数据集大小相比微不足道时，它们工作良好。即便如此，并行处理和分布式处理之间存在显著重叠。一个并行系统可以被描述为紧耦合的分布式系统，而一个分布式系统可以被描述为松耦合的并行系统。\n\
  \n好消息是，大多数分布式算法很容易转化为并行过程，因此如果你遇到一个听起来很有前景的分布式过程，你应该能够修改它以在并行架构上运行。\n\n### 并行硬件架构\n\
  \n有几种硬件架构可能适用于并行处理。了解哪些架构特性使得系统不太适合并行过程的要求也是有用的。\n\n*   `单计算机，单处理器，单核`：作为基本情况，这种计算机很少遇到，但值得注意的是，单核、单处理器、独立的计算机一次只能做一件事。无法在此类系统上实现并行过程。\n\
  *   `单计算机，单处理器，多核`：如果系统将多个内核作为独立处理器暴露给操作系统，那么就有可能并行利用这些内核。通常，这些内核共享对芯片上高速内存缓存的访问，因此可以轻松共享协调信息。\n\
  *   `单计算机，多处理器，单核或多核`：通常称为对称多处理系统（SMP），这类计算机一直是开放系统的主力。这些系统的处理器可能不共享本地高速内存，但所有处理器都通过内存总线共享对主计算机内存的访问。这种共享内存访问使处理器能够协调它们的活动。在其中一些系统中，处理器被分组在包含大量内存的处理器板上。如果该内存是在处理器板之间共享的，则这种访问可能是`非均匀`的，导致内存访问时间不均。\n\
  *   `SMP 计算机的集群系统`：集群系统通常采用某种高速专用系统互连网络来促进计算机节点之间的通信。这类计算机集群可能共享也可能不共享磁盘访问。当它们共享磁盘访问时，它们被称为`共享一切`架构。当它们不共享时，则被称为`无共享`架构，更类似于分布式系统。在某些集群变体中，高速互连实际上允许从所有其他节点远程访问每个单独计算机节点的内存。虽然这种远程内存访问比本地内存访问慢得多，但它比使用磁盘子系统在节点之间传输信息要快得多。从版本\
  \ 9 开始，使用缓存融合的`Oracle Real Application Clustering`技术就利用了这一功能。\n*   `SMP 计算机的分布式或网络化系统`：这种架构的共享资源有限，因为每台计算机都被设计为独立的。虽然这种架构比集群系统具有更高的容错能力，但它依赖于消息传递进行活动协调，更适用于分布式算法。\n\
  \n\n\n### 明确目标\n\n现在，你已经对并行处理有了基本了解，知道它与分布式处理的区别，以及可能支持并行程序的底层计算机架构，接下来你需要理解你的问题集，以及你希望通过并行处理实现什么。首先需要考虑的事情之一是，你是想加快现有流程的处理速度，还是想处理规模不断增长的、多变的数据集。\n\
  \n#### 加速\n\n加速的概念是：将一个以串行方式运行的过程修改为并行运行，并评估其运行速度提升了多少。它的定义是串行运行时间与并行运行时间的比值。\n\n\
  `加速比 = 串行运行时间 / 并行运行时间`\n\n理想情况下，你希望并行化工作的效率尽可能高。例如，如果你编写的并行程序使用了五个处理器而不是一个，你可能期望该程序的完成时间是串行程序的\
  \ 1/5。不幸的是，将数据集和任务分割成可由并行程序处理的片段，以及汇总结果的活动，都会带来开销。这些任务增加了并行程序所需的时间，导致加速比相对于应用于该问题的处理器数量而言，并非\
  \ 100% 高效。如果这些任务占串行运行时间的 10%，那么最大可能的加速比就只有 10 倍。这就是阿姆达尔定律的基础。\n\n#### 扩展\n\n扩展的概念是在相对恒定的时间窗口内处理越来越大的任务。它可以定义为并行进程在时间窗口内可处理的任务规模与串行进程可处理的任务规模之比。\n\
  \n`扩展度 = 并行完成的任务总规模 / 串行完成的任务规模`\n\n理想情况下，你希望每增加一个处理器，就能增加需要处理的任务规模。例如，如果你编写了一个使用四个处理器可以处理\
  \ 100 个任务项的并行程序，那么你希望该程序在增加第五个处理器时能够处理 125 个任务项。100% 的可扩展性意味着，每增加一个新的处理器或计算节点，你能完成的增量任务项数量不会减少；这通常只适用于增量任务集完全独立于所有其他任务项的情况。如果情况并非如此，你将获得略低于\
  \ 100% 的可扩展性。然而，在许多情况下，任务项独立是可能的，你应该努力识别这些情况。这对于考虑如何设计系统以处理所需处理数据量级的增长特别有用。思考如何在合理固定的时间内处理数据集规模成倍增加的问题，将迫使你考虑如何将处理过程并行化。这就是古斯塔夫森定律的基础。\n\
  \n### 并行度\n\n当将串行任务拆分为并行任务项时，你可以决定希望同时运行多少个任务项。这种并发级别被称为 `并行度`，通常缩写为 `DOP`。\n\n\
  你可能会认为，直接将 `DOP` 设置为并行任务项的数量是个好主意；例如，如果你可以将一个串行进程划分为 12 个任务，你可能希望一次性运行所有 12 个任务。然而，在某些情况下，你可能希望一次只运行三个任务，分四批进行，也许是为了在并行任务运行时减少系统的资源消耗。你应该仔细考虑希望系统在处理并行任务时达到多繁忙的程度。如果你决定将\
  \ `DOP` 设置为小于任务项的数量，那么剩余的任务项将会等待——这种情况被称为 `并行排队`。\n\n### 并行处理的候选工作负载\n\n现在你已经掌握了特定进程的目标（加速或扩展），是时候看看你正在处理何种工作负载，以及将它们转换为并行进程将对系统整体产生什么影响。\n\
  \n重要的是要理解，将任何串行进程转换为并行进程都会在并行进程运行期间增加系统的资源消耗。这很容易通过引言中杂货店的例子想象出来。想象一个商店一次只允许一个人进入，你会发现任何给定时间段内，商店都不太繁忙。但如果你允许购物者并行购物，你可以看到在特定的时间窗口内，商店要繁忙得多。另一种看待这个问题的方式是，在串行进程运行时测量系统的\
  \ CPU 利用率等指标，并将其乘以你为任务考虑的并行度；你需要确保有足够的 CPU 来处理你期望的并行工作负载。在考虑将并行性引入已运行的系统时，这一点尤其重要。\n\
  \n### 并行性与 OLTP\n\n联机事务处理系统通常具有高吞吐量、高并发性、执行最小工作量的短事务的特点。这些工作单元通常是独立的，例如单个客户下的订单。在大多数情况下，客户的活动彼此独立，因此可以并行运行。\n\
  \n虽然这并非严格意义上的并行处理——因为你不是将一个大任务分解成更小的独立任务单元——但 OLTP 活动确实通过允许多个任务同时并发运行，实现了更高的系统资源利用率。设计良好的\
  \ OLTP 系统能充分利用 SMP 和集群数据库服务器上的所有 CPU 及 CPU 核心，几乎没有闲置的 CPU。然而，你可能会倾向于进一步将单个 OLTP\
  \ 事务分解为可并行化的子任务。\n\n例如，假设你有一个在线购物网站，部分客户向你批量采购；他们可能是批发商。这些客户的购物车中可能包含成千上万的商品——远多于普通消费者。处理这些购物车中的商品（例如计算每件商品的应税性质）可能需要比你期望更长的时间；你希望他们的体验与普通客户的体验相似。如果可能，你可能希望并行处理购物车中的商品，或许采用较低的并行度，以使购物车“感觉”比实际小\
  \ 4-5 倍。这当然是可能的，但你需要小心，不要让额外的并发工作负载压垮你的系统。检查你系统的 CPU 利用率，看看是否能处理与你的并行算法相关的额外并发量。对于超大型购物车，采用较低的并行度可能是可行的。\n\
  \n```pseudo\nif (cart.size() > threshold) {\n    parallel_process(cart.items, degree_of_parallelism=4);\n\
  }\n```\n\n\n### 并行性与非 OLTP 工作负载\n\n非 OLTP 工作负载，例如大型报告、统计分析（或许是为了衡量客户流失率等指标）或定期的全量数据处理活动（如为每位客户生成定期账单或向特定客户进行群发邮件），通常都非常适合并行处理活动。\n\
  \n这类活动可能包括并行检查大量数据以识别待处理的特定项目、构建中间汇总结果或批量更新多行数据。它们也可能执行诸如并行转换大量数据等活动。通常，这类活动会在专门为此类处理保留的系统或时间窗口中运行，因此有充足的\
  \ CPU 可用。如果串行作业运行时间很长，但系统的整体 CPU 利用率仍然很低，或者显示实际使用的可用处理器非常少，那么你就知道这些系统已经具备了并行开发的成熟条件。\n\
  \n### MapReduce 编程模型\n\nMapReduce 是一种用于并行处理大型数据集的编程模型。该编程模型简单明了，其原语被定义为以独立方式处理数据的`块`（chunks），从而能够并行处理这些数据块。该模型首先通过“分片”（sharding）或将数据拆分成集合，传递给\
  \ map 函数。一个 `map` 函数通常接收一组输入数据，并产生一组键/值对，然后这些键/值对可以交给一组 `reduce` 函数，由它们对映射后的列表执行聚合操作。该模型因其通用的原语而广受欢迎，这些原语已被用于执行与文本扫描和过滤相关的各种任务。\n\
  \n许多新的数据库系统支持 MapReduce 原语，以此作为执行大规模聚合和过滤任务的一种方式。如果你熟悉这种范式，我将在接下来的几页中带你了解如何在 PL/SQL\
  \ 中实现它。\n\n### 在考虑 PL/SQL 之前\n\n请务必记住，数据库通常可以自动并行化许多 SQL DML 和 DDL 操作，而无需任何特殊的 PL/SQL\
  \ 编程。在尝试手动并行化你的存储过程之前，你可能想先研究一下这些选项，看看自动并行化是否就能提供你所期望的收益。在接下来的例子中，你将利用自动并行化的一些架构基础，但首先，让你熟悉一下可用的功能可能会很有帮助。Oracle\
  \ 将此架构称为 `并行执行`（parallel execution），它可以应用于几种不同类型的操作。\n\n-   `并行查询`：涉及全表和分区扫描的大型查询可以让这些扫描并行执行，包括表扫描、索引快速全扫描和分区索引范围扫描。连接方法如嵌套循环、排序合并连接、哈希连接以及星型转换也可以并行化。包括\
  \ `GROUP BY`、`NOT IN`、`UNION`、`UNION ALL`、`CUBE` 和 `ROLLUP` 在内的聚合和集合处理方法同样可以并行化。\n\
  -   `并行 DML`：`INSERT AS SELECT`、`UPDATE`、`DELETE` 和 `MERGE` 操作都可以并行执行，包括使用单个 DML\
  \ 语句向多个表插入数据的能力。\n-   `并行 DDL`：`CREATE TABLE AS SELECT`、`CREATE INDEX`、`REBUILD\
  \ INDEX`、`REBUILD INDEX PARTITION` 以及 `MOVE`、`SPLIT` 或 `COALESCE PARTITION` 都可以并行运行。\n\
  \n一如既往，在考虑并行替代方案之前，你应该花时间确保你的串行操作尽可能高效。虽然并行执行可能会带来更快的执行时间，但你应该警惕与加速和纵向扩展相关的效率问题，正如本章前面所讨论的那样。由于大多数并行化技术的效率都低于\
  \ 100%，你会给系统引入额外的资源消耗，因此你需要确保这种额外消耗是值得的。这对于通常以接近 100%利用率运行的系统尤其重要；你可能想看看能否通过运行更高效的串行类型操作来弥补并行化的开销。\n\
  \n### 可用于并行活动的进程\n\n既然你已决定尝试在 PL/SQL 中实现并行流程，那么了解你的执行选项就很有用了。由于数据库通过通常映射到单独连接和操作系统进程的会话来支持并发活动，你需要熟悉哪些操作系统进程可以支持你的存储过程。有三种可用选项。\n\
  \n-   `并行执行服务器`：这些进程有时被称为并行查询从属进程，由数据库自动配置以支持 SQL 语句的并行执行。通常由参数 `parallel_min_servers`\
  \ 和 `parallel_max_servers` 设置，为每个数据库实例建立一组操作系统进程池。\n-   `作业队列进程`：使用 `DBMS_JOB` 或\
  \ `DBMS_SCHEDULER` 包，你可以提交 PL/SQL 例程，由服务器作业队列进程以异步方式运行。虽然无法保证任何时间点有多少进程可用，但最大数量由\
  \ `job_queue_processes` 参数控制。\n-   `用户会话进程`：通过手动创建自己的、建立到数据库连接的操作系统进程，你可以创建自己的并行处理支持框架。你将需要在数据库外部或使用数据库数据结构来控制并行度和任务管理。\n\
  \n在本章中，你将只研究使用 `并行执行服务器`（通过并行流水线函数）来支持你的并行 PL/SQL 例程。\n\n### 将并行执行服务器用于 MapReduce\n\
  \n到目前为止，你已经看到 Oracle（特别是企业版）为针对表的并行操作提供了几种不同的选项，特别是在并行查询领域，其中表数据被分配到并行执行服务器中进行过滤、连接和排序。虽然这个选项看起来很有吸引力，但如何将其与\
  \ PL/SQL 结合使用呢？\n\n答案在于数据库能够将返回值的 PL/SQL 函数视为一个伪表；这种能力被称为 PL/SQL `流水线函数`（pipelined\
  \ functions），首次出现在 Oracle 9i 中。在 Oracle9i 之前，可以将 PL/SQL 函数 `CAST`（转换）为集合并从中选择，但该过程需要在返回任何数据之前在内存中实例化整个结果集。保存完整结果集所需的内存使得它对于你考虑用于并行化的大型问题而言变得不可行。这个问题的答案就是流水线函数。\n\
  \n\n## 管道化表函数\n\n管道化表函数使你能够使用 `PL/SQL` 以编程方式生成数据，指定你希望在每一行中获得的内容，并使数据库能够像查询任何其他表一样从你的函数中进行选择。你是通过使用数据库对象类型或\
  \ `PL/SQL` 记录类型来声明记录的结构，然后创建一个描述该记录“表”的集合类型来实现这一点的。\n\n对于你的 `MapReduce` 示例，你将定义一个键/值对记录，然后定义一个描述此类记录列表的集合类型，如下所示：\n\
  \n```sql\ncreate or replace package map_reduce_type as\n  type key_value_pair is\
  \ record (\n    key_item    varchar2(32),\n    value_item  number\n  );\n  type\
  \ key_value_pairs is table of key_value_pair;\nend map_reduce_type;\n/\n```\n\n\
  你将尝试使用并行管道化函数解决的具体问题是统计字符串列表中字母的出现次数。对于你的字符串列表，你将使用标准 Oracle 数据库安装中的超过 100,000 个列名；从该列表中，你将尝试确定哪个字母是最常见的。\n\
  \n在 `MapReduce` 模型中，你将首先将每个字符串分解为其组成字母，并“发出”每个字符串中的字母列表，每个字母的计数为 1（你的 `Map` 函数）。一旦你完成了字母的映射，你将把它们交给一个\
  \ `Reduce` 函数进行计数。让我们深入这个例子，看看它是如何工作的：\n\n首先声明你的 `Map` 函数，表明它将使用管道化函数返回一个键/值对列表。你的函数将接受一个输入参数：一个要分解成单个字母的字符串。代码如下：\n\
  \n```sql\ncreate or replace package map_letter_count as\n  function result_set (p_input\
  \ in varchar2)\n    return map_reduce_type.key_value_pairs pipelined;\nend map_letter_count;\n\
  /\n```\n\n你的函数简单地接收输入字符串，逐个字符遍历它，并为每个字母“管道传输”一个值为 1 的行作为输出，像这样：\n\n```sql\ncreate\
  \ or replace package body map_letter_count as\n\n  function result_set (p_input\
  \ in varchar2)\n    return map_reduce_type.key_value_pairs pipelined is\n\n    l_key_value_pair\
  \ map_reduce_type.key_value_pair;\n\n    begin\n\n      for i in 1..length(p_input)\
  \ loop\n\n        l_key_value_pair.key_item := substr(p_input,i,1);\n        l_key_value_pair.value_item\
  \ := 1;\n\n        pipe row(l_key_value_pair);\n\n      end loop;\n\n      return;\n\
  \n    end result_set;\n\nend map_letter_count;\n/\n```\n\n现在，你可以通过在 `SELECT` 语句中使用此函数并将其转换为表来检索结果。\n\
  \n```sql\nselect * from table(\nmap_letter_count.result_set('Hello, world!')\n);\n\
  ```\n\n```\nKEY_ITEM                     VALUE_ITEM\n----------------------------\
  \ ----------------------\nH                            1\ne                    \
  \        1\nl                            1\nl                            1\no  \
  \                          1\n,                            1\n                 \
  \            1\nw                            1\no                            1\n\
  r                            1\nl                            1\nd              \
  \              1\n!                            1\n\n13 rows selected\n```\n\n到目前为止，你已经看到了如何使用管道化函数接收输入参数，并使用\
  \ `pipe row` 构造将其转换为 `MapReduce` 键/值对列表。这很好，但目前你的函数仅限于处理单个字符串。让我们看看如何扩展它以处理大量的字符串集合。\n\
  \n为此，你可以修改你的 `Map` 函数，使其以数据游标的形式接受字符串或文档列表作为输入，如下所示：\n\n```sql\ncreate or replace\
  \ package map_letter_count as\n  function result_set (p_documents in sys_refcursor)\n\
  \    return map_reduce_type.key_value_pairs pipelined;\nend map_letter_count;\n\
  /\n```\n\n要设置你的字符串列表，基于 `DBA_TAB_COLUMNS` 创建一个 `documents` 表；为了使你的测试易于管理，将其限制为 10\
  \ 行。\n\n```sql\ncreate table documents\nas\nselect rownum doc_id, column_name text\n\
  from dba_tab_columns\nwhere rownum <= 10;\n```\n\n现在你的 `Map` 函数将依次遍历每个文档以执行其映射函数。\n\
  \n```sql\ncreate or replace package body map_letter_count as\n\n  function result_set\
  \ (p_documents in sys_refcursor)\n    return map_reduce_type.key_value_pairs pipelined\
  \ is\n\n    type document_type is record (\n      doc_id number,\n      text   varchar2(4000)\n\
  \    );\n    l_document       document_type;\n    l_key_value_pair map_reduce_type.key_value_pair;\n\
  \n    begin\n\n      fetch p_documents into l_document;\n      loop\n        exit\
  \ when p_documents%notfound;\n\n        for i in 1..length(l_document.text) loop\n\
  \n           l_key_value_pair.key_item := substr(l_document.text,i,1);\n       \
  \    l_key_value_pair.value_item := 1;\n\n           pipe row(l_key_value_pair);\n\
  \n        end loop;\n\n        fetch p_documents into l_document;\n\n      end loop;\n\
  \n      return;\n\n    end result_set;\n\nend map_letter_count;\n/\n```\n\n现在从你的\
  \ `Map` 函数中进行选择，会返回表中所有文档的映射键和值。\n\n```sql\nselect * from table(\nmap_letter_count.result_set(\n\
  cursor(select doc_id, text from documents)\n)\n);\n```\n\n```\nKEY_ITEM        \
  \             VALUE_ITEM\n---------------------------- ----------------------\n\
  D                            1\n_                            1\nO              \
  \              1\nB                            1\nJ                            1\n\
  #                            1\nO                            1\nR              \
