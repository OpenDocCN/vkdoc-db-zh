  ```\n\n这看起来不对！字母‘l’和‘o’各有两行数据。可能是什么地方出错了？\n\n## 问题根源分析\n\n让我们查看一下 `Reduce` 代码，并特别注意你在编码时可能做出的任何假设。你应该立即注意到，你假设了传递给\
  \ `Reduce` 函数的数据是经过排序或聚集的，即来自 Map 输出的相同字母会连续出现。然而，你使用的 `PARTITION … BY ANY` 选项明确地告诉服务器，你不在乎哪些字母被发送到哪个\
  \ Reducer，你也没有告诉服务器，你希望发送到 Reducer 的数据集以某种方式确保数据项是聚集或排序的。\n\n你如何告诉 Oracle 你希望将相同的字母发送到同一个\
  \ Reducer？\n\n## 控制数据分布的方法\n\n通过用游标中列的信息（在这个例子中是实际的键/值对）替换通用的 `sys_refcursor`，你现在有多种方式将行分发到并行函数实例。指定分布的完整语法如下：\n\
  \n```\n{[ORDER | CLUSTER] BY `column_list`}\nPARALLEL_ENABLE({PARTITION p BY [ANY\
  \ | (HASH | RANGE) column_list]} )\n```\n\n使用这些关键字时，*分区 (partitioning)* 指的是将行分配到各个并行函数实例所使用的方法，而\
  \ *排序 (ordering)* 和 *聚集 (clustering)* 选项则指的是行如何被推送或“流式传输”到每个并行函数实例中。你应该意识到，对行的分布以及排序/聚集施加更多控制会给你的进程增加开销，并降低你的加速比和扩展性。以下是这些选项的一些描述和示例：\n\
  \n### 排序 (ORDERING) 与 聚集 (CLUSTERING)\n\n这些选项指的是数据在被分区或划分后，如何被传送到每个并行实例。可能通过例子解释最为清楚。\n\
  \n假设你的函数将处理来自数据集的以下数据子集：\n\n`5,4,5,6,8,3,2,3,4,5,6,1,2,4,6`\n\n*   **聚集 (Clustering)**\
  \ 会以这样的方式传送值：相同的值会直接一个接一个地出现，但不一定是排序的。\n\n    `6,6,6,3,3,8,1,4,4,4,5,5,5,2,2`\n\n\
  *   **排序 (Ordering)** 会对值进行完全排序。\n\n    `1,2,2,3,3,4,4,4,5,5,5,6,6,6,8`\n\n这两个选项都会给处理过程增加开销，因为它们是在并行函数实例接收数据之前执行的。对集合进行排序比聚集相同值需要更多时间。\n\
  \n### PARTITION BY ANY\n\n如前所述，这种方法只是为每个并行函数实例提供源集合中的一组随机行。每个函数实例获得大致相同数量的行，但它们无法对收到的行做任何假设。\n\
  \n从技术上讲，你可以指定希望这些行按特定列值进行 `CLUSTERED`（或分组），甚至可以要求分配给每个并行函数的整个数据集完全 `ORDERED`。然而，由于你不知道哪些行会被发送到哪个函数实例，这些选项的价值有限。在行的随机分发下，你无法假设你的聚集中会包含所有匹配该簇的值，而且虽然你可以要求对行进行排序，但你不知道是否有分配到其他并行实例的行被遗漏了。\n\
  \n### PARTITION BY HASH\n\n这种方法对你列出的列的值进行哈希运算，以创建要分配到各并行函数实例的数据子集。由于值的哈希结果是一致的，来自主数据集的各个值基本上会被分组在一起，并发送到每个函数实例。多个值可能会被发送到一个实例，并且它们可能不是相邻值，但你可以依赖这样一个事实：每个函数实例都将接收到全部的等价值集合。基本上，这就像在划分数据时使用了\
  \ `CLUSTERING` 选项。一个或多个完整的值簇将被发送到每个函数实例。这种方法在确保特定数据值保持在一起的同时，也提供了相对均匀的数据分布到每个函数。\n\
  \n数据被划分后，可以进一步进行 `CLUSTERED` 或 `ORDERED`，以供并行函数使用。\n\n### PARTITION BY RANGE\n\n\
  这种方法在将数据分配到各并行函数实例之前先对其进行排序。这就像使用 `ORDERED` 选项来分配数据。它确保数据值会为每个函数分组在一起，并且函数只处理相邻的数据值。这里的风险是，如果你的数据存在任何极端偏斜的分布，你将会遇到不均衡的并行性——一些并行函数实例将比其他实例执行多得多的工作。与\
  \ `PARTITION BY HASH` 选项类似，数据可以进一步进行 `CLUSTERED` 或 `ORDERED`，以供并行函数使用。\n\n## 选择并实施解决方案\n\
  \n在审视了这些选项后，你发现你需要确保特定字母的所有映射都被发送到同一个规约函数（为此你将使用 `PARTITION BY RANGE`），并且你希望在处理时字母是分组在一起的。为此，你将使用\
  \ `ORDERING` 或 `CLUSTERING`。首先，你将设置 `PARTITION BY RANGE`，并演示仅此一项是不够的。要做到这一点，你需要将你的\
  \ `SYS_REFCURSOR` 替换为强类型游标，该游标向数据库提供数据集中可用于区分哪些项可用于分发数据的信息。你将通过在类型包中声明一个类型化的 ref\
  \ 游标来完成此操作，该游标描述由键/值对组成的游标。\n\n```\ncreate or replace package map_reduce_type as\n\
