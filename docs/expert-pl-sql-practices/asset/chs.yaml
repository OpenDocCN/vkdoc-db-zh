  \ ---------- ---------- ----------  ----------\n```\n\nTKProf 报告显示，PL/SQL 函数中的 SQL\
  \ 被视为一个独立的查询；在本例中，它占用了销售查询产生的所有额外逻辑 I/O 以及几乎一半的额外运行时间（如果你好奇本例中剩余的运行时间花在了哪里，分层性能分析器报告显示，总共约有\
  \ 59 秒花在了 PL/SQL 引擎整体上。其中约 47 秒的 PL/SQL 时间由汇率查找 SQL 本身承担——是上述 SQL 跟踪报告数字的两倍——这意味着大约\
  \ 23 秒是 PL/SQL 开销）。基础查询本身的逻辑 I/O 开销很小，实际上与纯 SQL 实现相当。\n\n这种分离突显了一个重要观点。如果嵌入的 SQL\
  \ 被视为一个独立的查询，CBO 就无法在外层查询的上下文中对其进行优化。CBO 完全不知道函数实际做了什么，因此 `RATES` 表甚至没有进入 CBO 的决策考量。结果，如你所见，可能是灾难性的。\n\
  \n因此，你可以看到，从性能角度看，将 PL/SQL 查找函数转换为 SQL 是非常有意义的。如果性能至关重要，并且此类查找函数在你的应用程序中被大量使用，建议你尽可能移除它们。我将在本章后面演示一些替代的封装方法，可以帮助你解决这个问题。\n\
  \n然而，我认识到要“扫除”一个遗留应用程序以转换其 SQL 并不总是可行（它可能嵌入许多不同的应用层和技术中，或者回归测试开销可能过于巨大）。在这种情况下，有一些方法可以用来降低\
  \ PL/SQL 函数的成本，我也会在后面展示其中一些。\n\n### 优化器的难题\n\n到目前为止的许多示例展示了 PL/SQL 函数在 SQL 语句的 `SELECT`\
  \ 块（投影）中被调用，但在谓词中使用用户编写的函数同样常见。这可能引发一系列问题。首先，正如我之前演示的，在谓词中使用的 PL/SQL 函数将执行不可预测的次数。其次，应用于索引列的\
  \ PL/SQL 函数（或任何函数）将阻止索引的使用。第三，CBO 对 PL/SQL 函数知之甚少，因为它通常没有可用的统计数据。这可能导致次优的执行计划。我将在这里集中讨论第三个问题，因为我在前面已经描述了第一个问题，而第二个问题在\
  \ Oracle DBA/开发者社区中已被充分理解。\n\n\n\n"
- "# PL/SQL 函数与统计信息\n\n为什么代价优化器（CBO）难以处理 PL/SQL 函数？答案在于统计信息。你知道，CBO 依赖高质量的统计信息来做出合理的优化决策。然而，当涉及到\
  \ PL/SQL 函数时，CBO 几乎总是没有可用的统计信息，只能诉诸于默认的启发式方法。例如，当遇到 `WHERE plsql_function(expression-involving-some-column)\
  \ = value` 这种形式的谓词时，CBO 会默认将该谓词的选择率设定为仅 1%（由于没有该函数的统计信息，它别无选择）。\n\n在代码清单 9-17 中，我通过一个小表（包含\
  \ 1000 行）、一个 PL/SQL 函数以及一个启用了 CBO 跟踪（10053 事件）的简单查询，来演示这种启发式方法。\n\n## 代码清单 9-17.\
  \ PL/SQL 函数谓词的默认选择率\n\n```sql\nSQL> CREATE TABLE thousand_rows\n  2  AS\n  3   \
  \  SELECT ROWNUM           AS n1\n  4     ,      RPAD('x',50,'x') AS v1\n  5   \
  \  FROM   dual\n  6     CONNECT BY ROWNUM <= 1000;\n\n表已创建。\n\nSQL> BEGIN\n  2 \
  \    DBMS_STATS.GATHER_TABLE_STATS(user, 'THOUSAND_ROWS');\n  3  END;\n  4  /\n\n\
  PL/SQL 过程已成功完成。\n\nSQL> CREATE FUNCTION plsql_function (\n  2                  p_id\
  \ IN INTEGER\n  3                  ) RETURN INTEGER AS\n  4  BEGIN\n  5     RETURN\
  \ 0;\n  6  END plsql_function;\n  7  /\n\n函数已创建。\n\nSQL> ALTER SESSION SET EVENTS\
  \ '10053 trace name context forever, level 1';\n\n会话已更改。\n\nSQL> set autotrace traceonly\
  \ explain\n\nSQL> SELECT *\n  2  FROM   thousand_rows\n  3  WHERE  plsql_function(n1)\
  \ = 0;\n\n执行计划\n----------------------------------------------------------\nPlan\
  \ hash value: 4012467810\n\n-----------------------------------------------------------------------------------\n\
  | Id  | Operation         | Name          | Rows  | Bytes | Cost (%CPU)| Time  \
  \   |\n-----------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT  |               |    10 |   550 |     5   (0)| 00:00:01\
  \ |\n|*  1 |  TABLE ACCESS FULL| THOUSAND_ROWS |    10 |   550 |     5   (0)| 00:00:01\
  \ |\n-----------------------------------------------------------------------------------\n\
  \n谓词信息 (通过操作标示符识别):\n---------------------------------------------------\n\n   1\
  \ - filter(\"PLSQL_FUNCTION\"(\"N1\")=0)\n\nSQL> ALTER SESSION SET EVENTS '10053\
  \ trace name context off';\n\n会话已更改。\n```\n\n由于缺乏 PL/SQL 函数的统计信息，CBO 默认使用 1% 的选择率来确定该谓词的基数。你可以从上面执行计划中显示的基数（行数）看出这一点。代码清单\
  \ 9-18 中 10053 跟踪文件的节选也展示了 CBO 的计算过程。\n\n## 代码清单 9-18. PL/SQL 函数谓词的默认选择率（10053 跟踪文件）\n\
  \n```text\n***************************************\nBASE STATISTICAL INFORMATION\n\
  ***********************\nTable Stats::\n  Table: THOUSAND_ROWS  Alias: THOUSAND_ROWS\n\
  \    #Rows: 1000  #Blks:  12  AvgRowLen:  55.00  ChainCnt:  0.00\nAccess path analysis\
  \ for THOUSAND_ROWS\n***************************************\nSINGLE TABLE ACCESS\
  \ PATH\n  Single Table Cardinality Estimation for THOUSAND_ROWS[THOUSAND_ROWS]\n\
  \  `No statistics type defined for function PLSQL_FUNCTION`\n  `No default cost\
  \ defined for function PLSQL_FUNCTION`\n  `No statistics type defined for function\
  \ PLSQL_FUNCTION`\n  `No default selectivity defined for function PLSQL_FUNCTION`\n\
  \  Table: THOUSAND_ROWS  Alias: THOUSAND_ROWS\n  Card: Original: 1000.000000  Rounded:\
  \ 10  `Computed: 10.00`  Non Adjusted: 10.00\n  Access Path: TableScan\n    Cost:\
  \  5.10  Resp: 5.10  Degree: 0\n      Cost_io: 5.00  Cost_cpu: 3285657\n      Resp_io:\
  \ 5.00  Resp_cpu: 3285657\n  Best:: AccessPath: TableScan\n```\n\n我在这个跟踪文件中高亮了一些重要信息。它指出，对于\
  \ PL/SQL 函数的成本或选择率，没有定义默认的统计信息或统计信息类型。这向你表明，为 PL/SQL 函数提供统计信息是可能的；我将在后文演示如何做到这一点。\n\
  \n\n\n\n### 谓词顺序\n\n当 PL/SQL 函数的统计信息缺失时，由于谓词编码顺序的原因，可能会引发其他潜在问题。例如，如果你编写了一个包含两个\
  \ PL/SQL 函数谓词的 WHERE 子句，在缺乏统计信息的情况下，函数将仅仅按照它们在 SQL 中出现的顺序执行。\n\n我在代码清单 9-19 中展示了这一点，其中有一个\
  \ SQL 语句，它通过两个 PL/SQL 函数进行过滤：`SLOW_FUNCTION`和`QUICK_FUNCTION`。顾名思义，一个函数比另一个成本更高，因此我使用\
  \ Autotrace 和 SQL*Plus 计时器，以不同的谓词顺序执行了两次该 SQL 语句来比较结果。\n\n***代码清单 9-19.** PL/SQL\
  \ 函数与谓词顺序*\n\n```sql\nSQL> CREATE FUNCTION quick_function (\n  2               \
  \   p_id IN INTEGER\n  3                  ) RETURN INTEGER AS\n  4  BEGIN\n  5 \
  \    RETURN MOD(p_id, 1000);\n  6  END quick_function;\n  7  /\n\nFunction created.\n\
  \nSQL> CREATE FUNCTION slow_function (\n  2                  p_id IN INTEGER\n \
  \ 3                  ) RETURN INTEGER AS\n  4  BEGIN\n  5     DBMS_LOCK.SLEEP(0.005);\n\
  \  6     RETURN MOD(p_id, 2);\n  7  END slow_function;\n  8  /\n\nFunction created.\n\
  \nSQL> set autotrace traceonly\n\nSQL> SELECT *\n  2  FROM   thousand_rows\n  3\
  \  WHERE  quick_function(n1) = 0\n  4  AND    slow_function(n1) = 0;\n\n1 row selected.\n\
  \nElapsed: 00:00:00.02\n\nExecution Plan\n----------------------------------------------------------\n\
  Plan hash value: 4012467810\n\n-----------------------------------------------------------------------------------\n\
  | Id  | Operation         | Name          | Rows  | Bytes | Cost (%CPU)| Time  \
  \   |\n-----------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT  |               |     1 |    55 |     5   (0)| 00:00:01\
  \ |\n|*  1 |  TABLE ACCESS FULL| THOUSAND_ROWS |     1 |    55 |     5   (0)| 00:00:01\
  \ |\n-----------------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \   1 - filter(\"QUICK_FUNCTION\"(\"N1\")=0 AND \"SLOW_FUNCTION\"(\"N1\")=0)\n\n\
  SQL> SELECT *\n  2  FROM   thousand_rows\n  3  WHERE  slow_function(n1) = 0\n  4\
  \  AND    quick_function(n1) = 0;\n\n1 row selected.\n\nElapsed: 00:00:11.09\n\n\
  Execution Plan\n----------------------------------------------------------\nPlan\
  \ hash value: 4012467810\n\n-----------------------------------------------------------------------------------\n\
  | Id  | Operation         | Name          | Rows  | Bytes | Cost (%CPU)| Time  \
  \   |\n-----------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT  |               |     1 |    55 |     5   (0)| 00:00:01\
  \ |\n|*  1 |  TABLE ACCESS FULL| THOUSAND_ROWS |     1 |    55 |     5   (0)| 00:00:01\
  \ |\n-----------------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \   1 - filter(\"SLOW_FUNCTION\"(\"N1\")=0 AND \"QUICK_FUNCTION\"(\"N1\")=0)\n```\n\
  \n我移除了 Autotrace 统计信息，但保留了 Explain Plan 部分，以展示每个 SQL 语句中 PL/SQL 函数的执行顺序。你可以看到，这与它们被编码的顺序相匹配，并且这对两个语句的相对性能产生了显著影响。这就是关键所在。CBO\
  \ 不知道`SLOW_FUNCTION`具有较低的选择性，或者它比`QUICK_FUNCTION`执行时间更长。在缺乏所提供的统计信息的情况下，它怎么可能知道呢？CBO\
  \ 没有理由重新排序谓词，因为它没有这样做的依据。\n\n好消息是，有几种方法可以为 PL/SQL 函数生成或设置统计信息来缓解此问题。这些方法在标题为*“协助\
  \ CBO.”*的章节中进行了描述。\n\n#### 读一致性陷阱\n\n代码清单 9-13 清楚地展示了将 SQL 查找放入 PL/SQL 函数中的资源成本（并且这些成本很容易量化）。然而，使用这种设计还存在另一个重要的陷阱，尽管它更难量化其对你的应用程序可能产生的潜在影响。那就是，PL/SQL\
  \ 函数内部的 SQL 与调用该函数的主 SQL 语句不是读一致的。\n\n来自代码清单 9-12 的 TKProf 报告（如代码清单 9-16 所示）证明，PL/SQL\
  \ 函数内部的 SQL 被视为一个单独的语句。这意味着在 READ COMMITTED 隔离级别下，它有自己的读一致性，而不是调用它的 SQL 语句的读一致性。\n\
  \n在代码清单 9-20 到 9-23 中，我演示了这个读一致性陷阱。我有两个会话；第一个（*会话一*）执行一个长时间运行的查询，该查询包含对 PL/SQL 查找函数的调用。第二个会话（*会话二*）在随机时间点更新了一条查找记录，但重要的是，这是在第一个会话的查询仍在运行时发生的。\n\
  \n我将从代码清单 9-20 中的 PL/SQL 查找函数开始。\n\n***代码清单 9-20.** 读一致性陷阱（创建 PL/SQL 函数）*\n\n```sql\n\
  SQL> CREATE FUNCTION get_customer_name (\n  2                  p_cust_id IN customers.cust_id%TYPE\n\
  \  3                  ) RETURN VARCHAR2 AS\n  4     v_customer_name VARCHAR2(200);\n\
  \  5  BEGIN\n  6     SELECT cust_first_name || ' ' || cust_last_name\n  7     INTO\
  \   v_customer_name\n  8     FROM   customers\n  9     WHERE  cust_id = p_cust_id;\n\
  \ 10     RETURN v_customer_name;\n 11  END get_customer_name;\n 12  /\n\nFunction\
  \ created.\n```\n\n你可以看到，该查找函数通过主键获取客户名称。此外，我创建了一个小的`SLEEPER`函数，以便减慢*会话一*的查询速度，模拟一个长时间运行的\
  \ SQL 语句（该函数只是调用`DBMS_LOCK.SLEEP`并返回常数 0）。\n\n继续这个例子，*会话一* 发出了代码清单 9-21 中所示的查询。\n\
  \n***代码清单 9-21.** 读一致性陷阱（会话一的长时间运行查询）*\n\n**`会话一`**\n```sql\n22:47:23 SQL> SELECT\
  \ s.cust_id\n22:47:23   2  ,      get_customer_name(s.cust_id) AS cust_name\n22:47:23\
  \   3  ,      sleeper(1)                   AS sleep_time\n22:47:23   4  FROM   sales\
  \ s\n22:47:23   5  WHERE  ROWNUM <= 10;\n```\n\n请注意*会话一*发出此 SQL 的时间。返回 10 行结果集且每行睡眠\
  \ 1 秒意味着这个查询应该在 10 秒多一点的时间内完成。当它在执行时，*会话二*更新了*会话一*正在重复查询的一个客户名称，如代码清单 9-22 所示。\n\
  \n***代码清单 9-22.** 读一致性陷阱（会话二的客户更新）*\n\n**`会话二`**\n```sql\n22:47:26 SQL> UPDATE customers\n\
  22:47:26   2  SET    cust_last_name = 'Smith'\n22:47:26   3  WHERE  cust_id = 2;\n\
  \n1 row updated.\n\n22:47:26 SQL> COMMIT;\n\nCommit complete.\n```\n\n再次注意此更新被提交的时间（大约在*会话一*的长时间运行查询开始后\
  \ 3 秒）。代码清单 9-23 显示了这对*会话一*报告的影响。\n\n***代码清单 9-23.** 读一致性陷阱（会话一的结果集）*\n\n\n\n`会话一`\n\
  -----------\n\n`客户 ID 客户名称                      睡眠时间`\n`---------- ------------------------------\
  \ ----------`\n`         2 Anne Koch                               1`\n`       \
  \  2 Anne Koch                               1`\n`         2 Anne Koch         \
  \                      1`\n`         2 Anne Koch                               1`\n\
  `         2 Anne Smith                              1`\n`         2 Anne Smith \
  \                             1`\n`         2 Anne Smith                       \
  \       1`\n`         2 Anne Smith                              1`\n`         2\
  \ Anne Smith                              1`\n`         2 Anne Smith           \
  \                   1`\n\n`已选择 10 行。`\n\n`已用时间: 00:00:10.02`\n\n大约在`会话一`的结果集进行到一半时，`ID=2`的客户名称发生了变化，这是因为查询函数在主查询的数据读一致性映像之外运行。因此，报告本身就是不一致的。\n\
  \n如果你使用此类`PL/SQL`函数，这意味着什么？显然，每次在查询中包含该函数时，你都面临结果集不一致的风险，特别是当你的用户可能随时更新查询表时。当然，你需要在自身应用模式的背景下评估这种风险。收到不一致报告的用户自然会质疑他们所看到的内容，甚至更糟，会质疑你的应用程序。\n\
  \n不幸的是，保护自己免受此影响的选项都不太令人满意。除了移除所有`PL/SQL`查询函数，你还有几种选择，例如：\n\n*   使用`SERIALIZABLE`（可串行化）隔离级别。\n\
  *   使用`SET TRANSACTION READ ONLY`（设置事务为只读）。\n*   让你的`PL/SQL`函数使用给定的`SCN`（系统变更号）进行闪回查询，以匹配主查询的开始。\n\
  *   让你的读取者通过`FOR UPDATE`查询来阻塞写入者（即使这样，也只有在你的主查询中其他地方直接访问了查询表时才有效。此时，你首先需要质疑是否需要你的`PL/SQL`查询函数！）\n\
  \n这些选项中的任何一个都能解决问题，但更有可能因为严重限制应用程序的并发性和性能而给你带来更大的麻烦。\n\n### 其他问题\n\n我已经比较详细地描述了在`SQL`中使用`PL/SQL`函数时需要注意的主要问题。不用说，还有其他问题，也许你已经遇到了一个我没想到的特定极端情况。我将在本节最后简要提一下你在某些阶段可能遇到的其他问题。\n\
  \n#### 并行查询\n\n可以启用`PL/SQL`函数以配合 Oracle 数据库的并行查询选项（`PQ`）工作。虽然许多`PL/SQL`函数可以由`PQ`从属进程执行而不出问题，但有时引用未显式启用并行的`PL/SQL`函数可能会禁用`PQ`。如果你在并行化某个`SQL`语句时遇到麻烦，并且该语句包含`PL/SQL`函数，请检查该函数是否已启用并行。假设你的`PQ`提示、会话`PQ`设置和`PQ`系统参数对于并行查询是有效的，但它就是“不起作用”，那么请重新创建你的`PL/SQL`函数，包含`PARALLEL_ENABLE`子句，然后再试一次。请注意，要使`PL/SQL`函数支持并行，它不应引用`PQ`从属进程可能无法访问的会话状态变量（例如包状态）。\n\
  \n#### NO_DATA_FOUND（未找到数据）\n\n我在前面的代码清单 9-12 的注释中已经描述过这一点，但为了完整性，值得重申。在从`SQL`语句调用的`PL/SQL`函数中引发的`NO_DATA_FOUND`异常**不会**传播该异常！相反，函数将返回`NULL`。\n\
  \n### 降低 PL/SQL 函数的成本\n\n我刚刚用了几页的篇幅描述了在使用`PL/SQL`函数时可能遇到的许多困难、成本和陷阱。然而，这是一本面向`PL/SQL`专业人士的书，因此我将在本章的剩余部分描述一系列技术，以降低使用`PL/SQL`函数的影响。\n\
  \n#### 换个角度看问题\n\n在我继续之前，我认为给出一个客观的视角很重要。在 Oracle 开发和性能的世界里，没有什么东西是绝对的，而且幸运的是，有时基本实现的`PL/SQL`函数就绰绰有余了。代码清单\
  \ 9-24 和 9-25 展示了这样一个例子。我将创建一个`isNumber`检查器来验证传入的原始数据，并比较`PL/SQL`函数实现与纯`SQL`版本的实现。为此，我创建了一个包含七个字段的外部表（全部为`VARCHAR2(30)`类型），将`SALES`表中的数据转储到一个平面文件，并将每\
  \ 10,000 个`AMOUNT_SOLD`值中的一个修改为包含非数字字符（`AMOUNT_SOLD`映射到外部表中的`FIELD_07`）。最后，我创建了如代码清单\
  \ 9-24 所示的`IS_NUMBER`函数，用于验证字符串是否确实为数字格式。\n\n**代码清单 9-24.** 验证数字数据（`IS_NUMBER`函数）\n\
  \n```sql\nSQL> CREATE FUNCTION is_number (\n  2                    p_str IN VARCHAR2\n\
  \  3                    ) RETURN NUMBER IS\n  4       n NUMBER;\n  5    BEGIN\n\
  \  6       n := TO_NUMBER(p_str);\n  7       RETURN 1;\n  8    EXCEPTION\n  9  \
  \     WHEN VALUE_ERROR THEN\n 10          RETURN 0;\n 11    END;\n 12    /\n\n函数已创建。\n\
  ```\n\n在代码清单 9-25 中，我使用了两种替代方法来验证`FIELD_07`中的数据是否为数字格式。首先，我使用了`IS_NUMBER` `PL/SQL`函数（如果输入值是数字，则返回\
  \ 1）。其次，我使用了`SQL`内置的正则表达式，该示例取自`OTN`（Oracle 技术网）论坛的一个帖子。我使用`Autotrace`来抑制输出，并使用`SQL*Plus`计时器来记录时间。\n\
  \n**代码清单 9-25.** 验证数字数据（`PL/SQL`函数 vs. `SQL`内置函数）\n\n```sql\nSQL> SELECT *\n  2\
  \  FROM   external_table\n  3  WHERE  is_number(field_07) = 1;\n\n已选择 918752 行。\n\
  \n已用时间: 00:00:10.19\n\nSQL> SELECT *\n  2  FROM   external_table\n  3  WHERE  REGEXP_LIKE(\n\
  \  4             field_07,\n  5             '^( *)(\\+|-)?((\\d*[.]?\\d+)|(d+[.]?\\\
  d*)){1}(e(\\+|-)?\\d+)?(f|d)?$',\n  6             'i');\n\n已选择 918752 行。\n\n已用时间:\
  \ 00:00:28.25\n```\n\n你可以看到`PL/SQL`函数的实现比正则表达式快得多（几乎快三倍）。当反过来查找少量非数字记录时，效果仍然更好。正则表达式非常消耗`CPU`；比较`V$SQL`中两个`SQL`语句的`CPU`时间，或者使用`DBMS_UTILITY.GET_CPU_TIME`跟踪这两个查询，你就能亲眼看到差异。\n\
  \n这个例子表明，在`SQL`语句中使用`PL/SQL`函数的有效性不能一概而论地否定。你的需求、你对所开发系统的了解以及你的测试将帮助你判断一个`PL/SQL`函数是否可行。如果可行，那么我在本章剩余部分描述的技术应该能帮助你从实现中获得更多收益。\n\
  \n\n\n\n#### 使用 SQL 替代方案\n\n然而，PL/SQL 函数比纯 SQL 表达式或内置函数更快的情况相当罕见。你应该考虑是否可能或值得将应用程序中一些关键的（使用了\
  \ PL/SQL 函数的）查询更改为使用纯 SQL 替代方案。如果你正在开发新应用程序，那么你有一个很好的机会从一开始就内置高性能。\n\n当然，这里需要考虑一些因素，如果以下任何一项为真，你可能会决定倾向于使用某些\
  \ PL/SQL 函数而不是 SQL 实现：\n\n*   一个 PL/SQL 函数并不被频繁使用。\n*   一个 PL/SQL 函数过于复杂，难以用 SQL\
  \ 轻松表达。\n*   一个 SQL 语句并未展现出我描述的任何问题。\n*   你需要修改的 SQL 量太大，或者回归测试的成本过高。\n\n我将演示使用\
  \ SQL 带来的性能优势，并提供一些你可以用来重构那些关键 SQL 语句（甚至可以考虑作为新应用程序的标准）的替代技术。\n\n##### 使用 SQL\n\n\
  在清单 9-12 中，我运行了一个销售报告，该报告导致 `GET_RATE` PL/SQL 函数被执行了超过 918,000 次。我演示了同一报告的纯 SQL\
  \ 实现（即与 `RATES` 表的一个简单连接）将该查询的运行时间从 66 秒减少到了仅 1 秒（逻辑 I/O 也大幅减少）。纯 SQL 技术对于使用更快的\
  \ PL/SQL 函数（例如那些不包含任何 SQL 的函数）的查询的运行时间也能产生影响。\n\nSQL 是一种极其灵活且功能丰富的语言，用于快速处理数据集。假设性能是你的目标，你可以使用诸如分析函数、子查询分解以及内置函数的广泛运用等\
  \ SQL 技术来将你的 PL/SQL 函数重构为 SQL（有关 SQL 创新用法的示例，请访问 OTN SQL 和 PL/SQL 论坛或 [`http://oraqa.com/`](http://oraqa.com/)）。\n\
  \n##### 使用视图\n\n支持保留 PL/SQL 函数的一个论点是，它们封装并集中了应用程序逻辑，防止相同的规则在代码库中扩散。也存在其他的封装方法，例如使用视图，它额外提供了\
  \ SQL 性能的优势。在清单 9-26 中，我通过将按日历年和产品的销售报告从使用 `GET_RATE` PL/SQL 函数改为使用视图进行了转换，其中逻辑被封装在\
  \ SQL 表达式中。\n\n**清单 9-26.** 在视图中封装函数逻辑\n\n```sql\nSQL> CREATE VIEW sales_rates_view\n\
  \  2  AS\n  3     SELECT s.*\n  4     ,      s.amount_sold * (SELECT r.exchange_rate\n\
  \  5                             FROM   rates r\n  6                           \
  \  WHERE  r.base_ccy   = 'USD'\n  7                             AND    r.target_ccy\
  \ = 'GBP'\n  8                             AND    r.rate_date  = s.time_id) AS amount_sold_gbp\n\
  \  9     FROM   sales     s;\n\n视图已创建。\n```\n\n通过这个视图，我将 `GET_RATE` PL/SQL 函数转换成了一个标量子查询查找。整个汇率转换现在被投影为单个列。我使用了标量子查询而不是与\
  \ `RATES` 的简单连接，以利用视图的一个称为“列消除”的优化。有了这个优化，标量子查询只会在查询中引用 `AMOUNT_SOLD_GBP` 列时才会执行。这意味着不需要转换后汇率的查询也可以利用这个视图而没有性能损失，从而扩大了其重用范围。使用此视图时销售报告的计时和统计信息如清单\
  \ 9-27 所示。\n\n**清单 9-27.** 利用视图中的列消除（未使用列消除）\n\n```sql\nSQL> SELECT t.calendar_year\n\
