  \ BY                 |           |   918K|\n|*  2 |   HASH JOIN                \
  \    |           |   918K|\n|   3 |    PART JOIN FILTER CREATE     | :BF0000   |\
  \  1826 |\n|   4 |     TABLE ACCESS FULL          | TIMES     |  1826 |\n|*  5 |\
  \    HASH JOIN                   |           |   918K|\n|   6 |     TABLE ACCESS\
  \ FULL          | CUSTOMERS | 55500 |\n|   7 |     PARTITION RANGE JOIN-FILTER|\
  \           |   918K|\n|   8 |      TABLE ACCESS FULL         | SALES     |   918K|\n\
  -------------------------------------------------------------\n\n统计信息\n----------------------------------------------------------\n\
  \       3189  一致读\n          0  物理读\n\nSQL> exec counter.show('Function calls');\n\
  ```\n\n函数调用次数: 918843\n\n```\nPL/SQL 过程已成功完成。\n```\n\n如你所见，这执行了超过 918,000 次函数调用，并在大约\
  \ 7 秒内完成。在清单 9-47 中，我使用了`DBMS_STATS`在 PL/SQL 函数调用上生成扩展统计，并展示了重新执行查询后的执行计划。\n\n##\
  \ 清单 9-47. 生成并使用扩展统计\n\n```sql\nSQL> BEGIN\n  2     DBMS_STATS.GATHER_TABLE_STATS(\n\
