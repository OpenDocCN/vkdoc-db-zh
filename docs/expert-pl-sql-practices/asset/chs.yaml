  \ 12-2 展示了您的新模式设计。\n\n![images](img/1202.jpg)\n\n## 图 12-2. 人力资源模式，目标设计\n\n在填充新表并删除旧列后，请务必检查应用程序模式中是否有任何对象因您的更改而失效。清单\
