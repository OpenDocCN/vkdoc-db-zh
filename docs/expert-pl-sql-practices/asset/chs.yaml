- "# 引言\n\n我很少有机会为一本我参与编写的书作介绍。通常，我很满足于自己身处幕后——这确实是图书编辑应有的位置。但这次我破例了，因为本书的内容唤起了我作为开发者在往昔岁月中的许多回忆。\n\
  \n`Expert PL/SQL Practices` 这本书讲述的是如何有效地运用 PL/SQL。它不是一本关于语法的书，而是一本关于如何将语法和特性与良好的开发实践相结合，从而创建出可靠、可扩展且能长期维护的应用程序的书。\n\
  \n对于任何工具，首先需要了解的一点就是何时使用它。Riyaj Shamsudeen 在他的开篇章节 `Do Not Use!` 中巧妙地探讨了何时该使用 PL/SQL\
  \ 的问题。我把这一章放在本书开头，是基于我个人的经历：我最成功的一次性能优化案例发生在 1990 年代末，当时我用一条 SQL 语句取代了客户端 PC 上的一堆过程化代码，将一个耗时\
  \ 36 小时以上的任务缩短到只需几分钟。PL/SQL 并非罪魁祸首，但我从中学到的教训是：当可能时，基于集合的方法——通常比编写过程化代码更可取。\n\nMichael\
  \ Rosenblum 紧接着撰写了一章关于动态 SQL 的精彩内容，展示了当你直到运行时才知道 SQL 语句时该如何编写代码。这让我想起了 1990 年代初在陶氏化学公司的一段时光，当时我使用\
  \ Rdb 的扩展动态游标功能集为一个医疗记录系统编写数据加载应用程序。我仍然记得，那是我开发过的最有趣的应用程序之一。\n\nDominic Delmolino\
  \ 探讨了如何使用 PL/SQL 进行并行处理。他涵盖了你能获得的益处以及适合并行处理的工作负载类型。只是请务必小心，好吗？我作为 DBA 犯过的最大错误之一，就是有一次未经深思熟虑就为一个关键应用表设置了并行度，只为了让一个报表跑得更快。结果仿佛我的电话和回车键连在了一起，因为我改动后不到一分钟，电话就响了。电话那头的经理非常不满。不用说，我从那时起就意识到，实施并行处理值得比我之前投入的多那么一点点的思考。Dominic\
  \ 的章节将帮助你避免类似的窘境。\n\n书中有几章涉及代码规范和良好的编程实践。Stephan Petit 提供了一套有用的命名和编码约定。Torben Holm\
  \ 讲解了 PL/SQL 警告和条件编译。Lewis Cunningham 呈现了一章发人深省的内容，关于代码分析，以及真正理解你所编写代码及其使用方式的重要性。Robyn\
  \ Sands 在她关于演进式数据建模的章节中，帮助你思考灵活性与良好设计。Melanie Caffrey 则带你了解各种可用的游标类型，帮助你根据任何给定情况做出正确的游标选择。\n\
  \n其他章节涉及调试和故障排除。Sue Harper 介绍了 PL/SQL 单元测试，特别是现在已内置于 SQL Developer 中的相关功能集。（我记得当年我还在纸上编写单元测试脚本）。让你自己免受回归错误的尴尬吧。自动化单元测试让你能轻松方便地验证你在修复一个问题时，没有意外破坏两个新功能。\n\
  \nJohn Beresniewicz 接着撰写了一章关于契约式编程的内容。John 方法的一个关键部分是使用断言来验证在代码各个关键点处应为真的条件。我最早是在石器时代的\
  \ PowerBuilder 编程中了解到断言技术的。我一直很高兴看到 John 将这项技术推广到 PL/SQL 领域。\n\nArup Nanda 帮助你掌控依赖关系和失效问题。依赖性问题可能是应用程序出现看似随机、难以复现错误的一个根源。Arup\
  \ 展示了如何控制那些不可避免发生的情况，这样你就不会被意外错误搞得措手不及。\n\n我们几乎不可能将性能和可扩展性排除在讨论之外。Ron Crisco 讨论了如何分析代码以找到最大的优化机会。Adrian\
  \ Billington 探讨了从 SQL 语句中调用 PL/SQL 时涉及的性能方面。Connor McDonald 介绍了通过批量 SQL 操作可获得的巨大性能优势。\n\
  \n一个不常被想到的、关于可扩展性的独特方面，是应用程序规模和开发人员数量的问题。PL/SQL 是否适合涉及数十、甚至数百名程序员的大规模开发？Martin Büchi\
  \ 在他关于大规模 PL/SQL 编程的章节中，通过讲述他成功维护一个由超过 170 名开发人员维护的、代码量达 1100 万行的应用程序的经历，表明 PL/SQL\
  \ 完全能够胜任这项任务。\n\n你大概能感觉到我对这本书的兴奋之情。作者们都是顶尖高手。每人都撰写了自己充满热情且特别精通的 PL/SQL 方面。如果你已经过了学习语法的阶段，那么请坐下来，阅读这本书，提升你运用\
  \ PL/SQL 和 Oracle 数据库全部能力来交付应用程序的水平。\n\nJonathan Gennick\nApress 出版社助理编辑总监\n\n##\
  \ 第 1 章\n\n### 请勿使用\n\n**Riyaj Shamsudeen 著**\n\n恭喜你购买了本书。PL/SQL 是你工具箱中的一件利器；然而，你应该明白，PL/SQL\
  \ 的使用并不适合所有场景。本章将教你何时应该用 PL/SQL 编写应用程序，如何编写可扩展的代码，更重要的是，何时不应该用 PL/SQL 编写程序。滥用某些\
  \ PL/SQL 构造会导致代码无法扩展。在本章中，我将回顾各种误用 PL/SQL 导致不适用并造成应用程序不可扩展的案例。\n\n**PL/SQL 与 SQL**\n\
  \nSQL 是一种集处理语言，如果语句是基于集思考方式编写的，则 SQL 语句的扩展性更好。PL/SQL 是一种过程化语言，SQL 语句可以嵌入到 PL/SQL\
  \ 代码中。\n\nSQL 语句在 SQL 执行器（更通常称为 SQL 引擎）中执行。PL/SQL 代码则由 PL/SQL 引擎执行。PL/SQL 的强大之处在于它能够将\
  \ PL/SQL 的过程化能力与 SQL 的集处理能力相结合。\n\n\n### 逐行处理\n\n在一个典型的逐行处理程序中，代码会打开一个游标，循环遍历从该游标中检出的行，并对这些行进行处理。这种基于循环的处理结构**极不推荐**，因为它会导致代码无法扩展。代码清单\
  \ 1-1 展示了一个使用此结构的程序示例。\n\n**`代码清单 1-1`.** 逐行处理\n\n```sql\nDECLARE\n  CURSOR c1 IS\n\
  \    SELECT prod_id, cust_id, time_id, amount_sold\n    FROM sales\n    WHERE amount_sold\
  \ > 100;\n  c1_rec c1%rowtype;\n  l_cust_first_name customers.cust_first_name%TYPE;\n\
  \  l_cust_lasT_name customers.cust_last_name%TYPE;\nBEGIN\n  FOR c1_rec IN c1\n\
  \  LOOP\n    -- 查询客户详情\n    SELECT cust_first_name, cust_last_name\n    INTO l_cust_first_name,\
  \ l_cust_last_name\n    FROM customers\n    WHERE cust_id=c1_rec.cust_id;\n    --\n\
  \    -- 插入到目标表\n    --\n    INSERT INTO top_sales_customers (\n      prod_id, cust_id,\
  \ time_id, cust_first_name, cust_last_name,amount_sold\n      )\n      VALUES\n\
  \      (\n        c1_rec.prod_id,\n        c1_rec.cust_id,\n        c1_rec.time_id,\n\
  \        l_cust_first_name,\n        l_cust_last_name,\n        c1_rec.amount_sold\n\
  \      );\n  END LOOP;\n  COMMIT;\nEND;\n/\nPL/SQL 过程已成功完成。\n已用时间: 00:00:10.93\n\
  ```\n\n在代码清单 1-1 中，程序声明了一个游标 `c1`，并使用游标 FOR 循环语法隐式地打开该游标。对于从游标 `c1` 检索到的每一行，程序都会查询\
  \ `customers` 表，将 `first_name` 和 `last_name` 填充到变量中。随后，一行数据被插入到 `top_sales_customers`\
  \ 表中。\n\n代码清单 1-1 所例示的编码实践存在问题。即使循环中调用的 SQL 语句经过高度优化，程序的执行也可能消耗大量时间。假设查询 `customers`\
  \ 表的 SQL 语句耗时 0.1 秒，而 `INSERT` 语句耗时 0.1 秒，那么每次循环执行的总耗时就是 0.2 秒。如果游标 `c1` 检索了 100,000\
  \ 行，那么该程序的总耗时将是 100,000 乘以 0.2 秒：20,000 秒，大约 5.5 小时。优化这种程序结构并不容易。Tom Kyte 将这种类型的处理称为\
  \ ***slow-by-slow processing***（慢速处理），原因显而易见。\n\n![images](img/square.jpg) **注意**\
  \ 本章示例使用的是 SH 示例模式，这是甲骨文公司提供的示例模式之一。要安装示例模式，可以使用甲骨文提供的软件。您可以从 [`http://download.oracle.com/otn/solaris/oracle11g/R2/solaris.sparc64_11gR2_examples.zip`](http://download.oracle.com/otn/solaris/oracle11g/R2/solaris.sparc64_11gR2_examples.zip)\
