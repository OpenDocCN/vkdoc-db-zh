  \     515.123.4569`\n\n如果你将这个结果集与上面的结果集进行比较，你会注意到金先生列出的电话号码是他的手机号。在任何重构练习中，你的目标都应该是识别出现有应用程序的大多数屏幕和报表中期望的行为，并对原始过程进行编码以返回那些结果。对于特殊情况，可以通过添加新过程或添加额外参数（默认设置为常用请求值）来处理。这将最大限度地减少整合这些变更所需的应用程序代码更改数量。\n\
  \n通过采取数据库设计和重构步骤以最小化对前端应用程序开发的影响，你已经真正实现了数据库与应用程序的解耦。数据库开发和应用程序开发之间有一条清晰的界线；对于数据库来说，这条界线可以在包含应用程序对象的模式（一个或多个）中进行验证和测试。这使得应用程序开发人员能够按照自己的节奏整合新功能，根据他们的任务优先级独立于数据库变更进行工作。在开发人员选择调用返回新版本数据的过程之前，数据库变更不会对应用程序产生任何影响。\n\
  \n这是否意味着应用程序开发人员、数据库开发人员和 DBA 不再需要协同工作和沟通？远非如此。在下一节中，你将了解敏捷背后的价值观，并探讨一些在敏捷数据库开发环境中充分利用\
  \ PL/SQL 的指导原则。\n\n### 敏捷宣言\n\n几年前，我发现自己对“*敏捷开发*”这个短语感到非常困惑。我听到了许多新术语，如“*scrum*”和“*sprint*”，碰到一群群站在走廊里的人（通常挡住了我要去的地方），并且注意到关于构建候选版本的邮件持续泛滥。与此同时，解释规范、文档和培训不再需要，因为每个人都接受过“*敏捷*”培训的呆伯特漫画副本出现在办公隔间的各个角落。这一切对我来说都挺有意思，直到我注意到实体关系图（ERD）和精心设计的数据库模式在这个新世界中也消失了。在那一刻，我决定是时候了解一些关于敏捷的知识了。\n\
  \n不幸的是，我的大部分阅读发现关于数据库的信息很少。我找到的少数资料似乎对现代数据库产品中可用的所有选项以及这些选项的使用如何影响数据库性能的理解非常有限。我想知道，对数据库设计缺乏关注是敏捷运动发起者有意为之，因为他们认为这没有必要，还是因为数据库设计被忽视了，因为大多数书中的典型用例都是处理在预先存在的数据库上构建应用程序。\n\
  \n因此，我从头开始，查看图 12-3 所示的《敏捷宣言》。我发现我完全同意该宣言以及支持它的《十二项原则》中的每一条。我也没有发现任何关于 scrum、sprint、站立会议或任何想要抹杀数据库设计的迹象。我在下面复制了《敏捷宣言》，你可以在\
  \ `agilemanifesto.org` 找到《十二项原则》。\n\n![images](img/1203.jpg)\n\n**图 12-3.** 敏捷宣言\n\
  \n敏捷宣言列出了四个价值观：*个体和互动*、*工作的软件*、*客户协作*以及*响应变化*。这前四个价值观可与四个传统价值观相比较：*流程和工具*、*详尽的文档*、*合同谈判*以及*遵循计划*。注意每一行的措辞。宣言并没有说第二组价值观不再必要；它只是说第一组价值观更重要。宣言也没有确切地告诉你如何实现敏捷，这有一个原因。团队各不相同，对某个团队有效的方法可能对另一个团队有害。由于个体和互动比工具和流程更重要，并且是列在第一的价值对，你需要认识到工具和流程应该支持团队中的个体并鼓励团队成员之间的互动。当现有的工具和流程不符合这个目标时，就应该改变工具和流程。\n\
  \n\n听到我这么说的人通常会感到惊讶。毕竟，我在 2008 年写过一篇题为《工业工程师的数据库管理指南》的论文。在论文中，我指出了优秀的数据库管理实践与工业工程的相似之处，并非常强调流程和标准化。我仍然相信流程和标准化对于构建可靠、可重复构建的产品非常重要，但如果现有流程并未让团队更轻松地完成工作，那么缺陷在于流程本身，而非团队。正如用户会欣然使用能简化工作的应用程序一样，团队也会遵循能让工作更轻松的流程。流程存在缺陷的首要迹象就是人们不愿意遵循它。最佳解决方案是确保流程能创造价值且其效益显而易见。如果流程确有价值但执行过程令人痛苦，那么你需要工具来简化合规操作。当团队中每个人都持续遵循流程时，其效益才能最大化，而团队通常也非常愿意遵循那些易于满足已知要求的流程。\n\
  \n这当然是一个循环论证，但并非坏事。在这种情况下，你拥有一个良性的反馈循环：人们会遵循创造价值的流程；随着更多人遵循该流程，其价值也随之提升。早期的工业工程技术（即泰勒主义）认识到在流程（系统）优化中发现并消除瓶颈的重要性，但他们的做法是以牺牲流程中涉及的人员为代价的。后来的技术，如\
  \ W·爱德华兹·戴明博士提出的方法及精益制造中的应用，则认识到了流程中个体的价值。通过优化流程以提升团队以最简单、最便捷的方式完成工作的能力，丰田公司能够以更低的成本、更快地生产出比同时期遵循公认流程的公司质量更高的汽车。这正是敏捷的核心：聚焦于团队的价值和目标，定义支持这些目标的原则，然后创建能确保成员尽可能有效且高效地实现目标的流程（实践）。\n\
  \n## 在进化数据建模中使用 `PL/SQL`\n\n在本节中，我将列举一些我亲身经历或认为有效的技巧。这并非详尽无遗的清单，也无意成为必须遵循的教条。在阅读这些技巧时，请思考`《敏捷宣言》`中的价值。以下每项技巧都至少符合一项核心价值，并支持团队适应变更、保持变更可见性以及持续改进其软件产品的能力。\n\
  \n### 定义接口\n\n不要从设计数据库模式开始，而是先定义数据库与前端应用程序之间的接口。应用程序必须实现哪些功能？定义用户所需的数据以及他们为请求结果集将输入的值。定义他们需要更新的数据以及确认更新的方式。如果需要操作或转换数据，请确定需要对其执行的操作以及如何验证转换过程。此过程应包括数据库架构师、数据库开发人员和应用程序开发人员，完成后，最终达成关于数据库将为应用程序提供何种功能的共识。该协议必须包含应用程序团队将调用的任何对象的名称。如果需要视图，则应包括列名和数据类型。存储过程定义应包含所有必需的输入和输出参数。一旦达成共识，每个人都应获得所需信息，以便专注于其职责范围内的优化设计。任何变更都必须经过协商。如果后续发现表明数据库与应用程序不匹配的错误，审查接口协议将有助于确定如何解决该错误。定义接口的过程增加了团队成员之间的直接互动，并让他们聚焦于最重要的主题：最终用户所需的功能。\n\
  \n### 考虑可扩展性\n\n`《敏捷宣言》`背后的原则之一是简洁性，即最小化待完成工作。对敏捷的一些解读将最小化工作理解为仅应编写满足当前需求的最小限度代码。这种思维方式的问题在于，当客户注意到响应速度变慢时，性能和可扩展性无法后期添加到构建中。我曾听人说：“客户又不是在买单凯迪拉克。现在先造辆尤格就行。”然而，有人曾成功地将尤格改造成凯迪拉克吗？任何懂车——或懂软件——的人都知道这根本行不通。\n\
  \n相反，你需要从构建一个坚实且可扩展的框架开始。对于汽车、房屋或软件系统而言，结构性变更都是重大变更。如果你有一个坚实的基础，就可以添加功能，让你的尤格/凯迪拉克初具雏形，让客户初步了解其可能性。也许客户会对尤格感到满意；也许应用程序会非常成功，最终成为凯迪拉克。采用进化式的数据库设计方法，并使用`PL/SQL`作为`API`，可以使数据库适应不断变化的需求，同时控制变更在应用程序下一层中实现的方式和时间。\n\
  \n许多敏捷倡导者提到，当识别出新的客户需求时，后期进行变更非常容易。这取决于哪些系统组件被视为设计的一部分。如果团队有一位架构师，而该架构师仅负责应用程序的设计，那么这可能是真的。然而，`架构师`是当今广泛使用的术语，如果所讨论的架构师负责硬件或软件平台，后期进行变更可能会成为一项非常复杂且昂贵的选择。目标应该是聚焦于本质：提供客户所请求结果所需的功能特性，同时为最终产品的可能走向做好规划。短发布周期和迭代开发为你提供反馈，确保你准确理解客户的请求。当你收到反馈时，它就提供了产品方向是否需要转变的第一线索。\n\
  \n\n\n#### 测试驱动开发\n\n敏捷开发和极限编程中最有用的工具之一是测试驱动开发。其概念很简单：在编写任何代码之前，先设计好测试，以验证计划的代码变更已达成目标。有人可能会问，如何为尚不存在的软件功能编写测试？但不妨反过来思考：如果成败的标准尚未定义，又该如何编写代码呢？\n\
  \n当使用 `PL/SQL` 作为 `API` 时，确定必要测试的第一步是考虑约定的接口。接口提供了有关过程名称、参数和预期结果的信息。当然，对过程进行的变更测试应包括验证结果的准确性，但还有哪些其他类型的错误可能影响过程的行为呢？思考这个问题时，你会发现改进代码的机会。某些错误条件可以被捕获，然后过程可以向前端应用程序返回一条消息。如果应用程序传入了一个完全意想不到的值，会发生什么？当结果不符合预期时，会发生什么？当调用过程的应用程序会话在未完成任务的情况下消失时，又会发生什么？这些情况对于任何应用程序来说都是真实存在的可能性，但当代码能够捕获错误并以一种能帮助开发者识别输入为何无效或结果如何被影响的方式处理它们时，最终的应用程序对最终用户来说会更加健壮和稳定，从而显著提升软件的价值。\n\
  \n每个过程测试都应该是可编写脚本且可重复的。这些可重复的脚本构成了回归测试的基础，提供了一种工具来确认对一个过程的更改不会影响应用程序的其他部分。附带的好处是，这些脚本可以提供给其他人，作为故障排查或验证系统集成的工具。一旦测试可重复，它们就可以被整合到一个测试框架中，允许将整个测试序列作为一个包来执行。如果测试脚本可以使用\
  \ `shell` 脚本或 `PL/SQL` 代码执行，那么数据库开发者就能在应用程序开发端开始使用接口之前，确认接口协议要求的所有功能是否按预期工作。这将最小化前端开发团队在整合其变更与数据库变更时遇到的问题。更好的是，如果应用程序开发者确实遇到了错误，可以将数据库单级测试的结果与下一级开发中的参数和结果进行比较。这能加快故障排查和错误纠正，使开发过程的双方都更加敏捷。\n\
  \n#### 善用模式与用户\n\n使用 `PL/SQL` 作为接口层的一个优势是，可以更改结构对象、重新编译数据库代码，并检查数据字典以确认整个模式有效。如果新变更对其他包、过程或视图有任何影响，它将立即可见，并且可以在错误传播到其他应用层之前进行修复。为了能够做到这一点，应该有一个包含所有应用程序对象的单一应用程序模式。在复杂的应用程序中，功能可以划分为模块，允许独立测试部分代码子集。这并不意味着不应执行完整的系统集成测试，或者应该将其推迟到项目后期。但如果能缩小问题的范围，问题通常可以更轻松、更快地解决。\n\
  \n创建一个独立的应用程序用户，并授予该用户执行接口协议和中心模式中定义的过程的权限。如果授予该应用程序用户更多访问权限，就会有人在其他部分构建直接的 `SQL`\
  \ 语句的风险，这将使编译测试失效。这也会使识别拟议变更影响了多少应用程序代码变得更加困难，给规划过程增加复杂性和不确定性。\n\n虽然限制应用程序用户 `ID`\
  \ 的访问权限和权限有好处，但重要的是要注意，开发者需要访问模式对象，这不仅对数据库开发者是如此。前端应用程序开发者对 `DBMS` 及其内部数据了解得越多，他们就能越好地利用这个工具集。应鼓励开发者安全地探索数据库模式，有几个选项可以实现这一目标。在开发周期早期尽可能多地提供对数据库的访问，随着变更从开发数据库迁移到功能测试、系统集成测试和质量测试，逐步减少访问。如何提供这种访问取决于团队的技能。如果团队精通数据库知识，则允许直接访问模式。如果他们对\
  \ `DBMS` 和数据库技术缺乏经验，则创建具有不同权限类型的额外用户。这也为监控带来了好处：如果你发现一个失控的查询，但该进程是由只读用户发起的，而不是预期执行应用程序中过程的用户发起的，那么可以安全地终止该进程而不影响应用程序。如果开发者不值得信任，会在未经授权或在迁移过程的错误阶段更改代码或数据，则不应给予他们直接访问权限。审计提供了一种准确且简便的方法，使数据库内进行的所有更改都透明可见。\n\
  \n### 总结\n\n敏捷性是指能够快速适应不断变化的条件。不仅如此，能够适应和演变以满足变化的条件和需求，对于保持竞争力至关重要。`DBMS` 软件本身并不限制你实施变更的能力，但你如何选择使用该软件以及如何设计应用程序却会带来限制。首先，你需要承认并为即将到来的不可避免的变更做好准备。然后，你需要评估项目目标以及你为实现这些目标所拥有的工具。支持敏捷开发流程**同时**拥有设计良好的数据模型是可能的。使用\
  \ `PL/SQL` 作为 `API` 可以通过提供一种允许数据库和应用程序演进并支持不断变化的客户需求的方法，来缓冲一些需要进行的变更。\n\n## C H\
  \ A P T E R  13\n\n\n\n## 性能分析\n\n**作者：罗恩·克里斯科**\n\n*性能*和*性能分析*是我办公室日常交流、与客户互动以及教学中的关键词。这两个词同样适用于生活的方方面面，包括软件工程和我们当前的主题：`PL/SQL`。\n\
  \n我第一次接触`PL/SQL`是在其诞生之初，当时它是 Oracle 基于字符的交互式应用开发工具`SQL*Forms 3`的测试版。多年来，我学到了很多关于编写高性能`PL/SQL`代码的知识，我很高兴能与大家分享我的所学。\n\
  \n在`PL/SQL`的语境中，性能究竟意味着什么？本章结束时，我的目标是为你提供战胜性能低下代码所需的知识和理解。\n\n> *业余者练到做对为止。专业人士练到不会做错为止。*\n\
  >\n> ——佚名\n\n除了我的软件开发与教育职业生涯外，我还是一名古典音乐演奏家，演奏最富英雄气概的乐器——`圆号`。任何领域的专家都有许多共同点。音乐和软件工程也不例外——我思考得越多，发现的共同点就越多。例如，这两个领域共享一个共同的词：performance（演奏/性能）。尽管乍一看它在两种语境中的含义似乎大相径庭，但这个词暗示了关于我们如何进行音乐和软件开发工作的一些非常重要的事情。\n\
  \n在音乐中，performance（演奏）被定义为对音乐作品的诠释，并在观众面前呈现。在软件开发中，performance（性能）被定义为软件实现其预期目的的方式或效率。这两个定义都将\
  \ performance 解释为一种最终结果。在音乐中，准备工作的最终结果包括学习音乐家所选乐器的基本技巧、学习通用乐谱、学习所选作品的特定记谱法、练习该作品所需的特定技巧，然后为实际演奏进行心理和生理上的准备。但作为一名专业音乐家，我知道演奏并不仅仅是这个过程结束时的一个单一事件。\n\
  \n> *永远不要“练习”，永远要“演奏”！*\n>\n> ——巴德·赫瑟斯，芝加哥交响乐团\n\n换句话说，我意识到我的演奏听起来总会像我的练习一样，这是一个可怕的想法，除非我练习“演奏”。为了预先发现我的演奏听起来会怎样，我需要在练习时仿佛观众就在那里聆听一样去演奏音乐。只有通过这种方式练习，我才能评估作品中需要我集中精力改进的部分。\n\
  \n这一切如何与软件性能相关联，特别是`PL/SQL`代码的软件性能？真正的关键在于，能够在将软件投入生产之前，使用人们将在生产环境中看待它的相同视角来审视你的软件。专家的视角需要理解这些重要概念：性能、性能分析、插桩和问题诊断。\n\
  \n**一个音乐注记**\n\n许多英语使用者用*Horn*这个词来泛指包括小号、萨克斯管和长号在内的一类乐器。通常被称为*French Horn*（法国号）的乐器，其起源和设计均非法国，正确名称应为`圆号`。更多信息请参见\
  \ [`http://en.wikipedia.org/wiki/Corno`](http://en.wikipedia.org/wiki/Corno)。这可能看起来微不足道，但对许多`圆号`演奏者，包括我在内，这是一件大事。\n\
  \n我将`圆号`描述为最富英雄气概的乐器。当伟大的作曲家为`圆号`创作音乐时，他们会充分利用这种乐器所能实现的广泛多样的音乐表现力。音乐史上有一个模式不断重复——当英雄登场时，`圆号`最常被选来提供音乐主题。在古典曲目中，理查德·瓦格纳、理查德·施特劳斯、彼得·伊里奇·柴可夫斯基和古斯塔夫·马勒等作曲家创作出激动人心、栩栩如生的英雄主题。在二十世纪的电影音乐中，约翰·威廉姆斯、埃里希·科恩戈尔德和霍华德·肖继承并拓展了这一传统。\n\
  \n### 什么是性能？\n\n在软件语境中，*performance*这个词确实有几种不同的含义，因此我首先澄清一下我的用法。特别是在`PL/SQL`代码的语境下——实际上也适用于任何代码——性能可以从四个方面来考虑。\n\
  \n#### 功能需求\n\nPerformance 有时可用于描述软件执行满足所谓功能规格和定义的需求的程度。如果软件程序运行至完成而没有任何错误，准确地处理输入，并产生正确的输出，那么人们可能会说该软件性能良好。有多少次，你希望自己购买使用的软件能达到这个标准？这似乎是一个正常的期望，当然，但重要的是要看到这个定义的基本部分。\n\
  \n#### 响应时间\n\n需求撰写者已经意识到，性能远不止于此。性能还关乎时间。软件完成了你期望的工作——但却在你期望几分钟内完成的情况下用了 34 小时才完成——它就未能通过“性能良好”的定性描述。当我们描述性能良好的软件时，必须在描述中引入时间因素。软件需求通常以单个工作单元、一个业务任务来表述。因此，需求必须说明该任务的预期功能，以及软件完成该任务所需的预期时间。这通常被称为*响应时间*：以时间单位衡量的业务任务单次执行的持续时间。\n\
  \n#### 吞吐量\n\n但有时，以不同的方式衡量性能更有意义。*吞吐量*是指在指定持续时间内完成的业务任务执行次数。一个订单录入应用软件的需求可能会规定每小时至少录入\
  \ 1,000 个订单的最小吞吐量。该需求当然暗示了对任何一个特定订单响应时间的某种限制，但对于负责订单录入应用的业务经理来说，这个指标更有意义。\n\n对经理来说，只要达到了吞吐量目标，每个录入订单的单独响应时间就无关紧要。对于订单录入员和电话那头的客户来说，吞吐量则不予考虑。他们只关心一个特定的订单录入任务——他们自己的那个任务的响应时间。\n\
  \n优化响应时间是优化吞吐量的必要先决条件，但还不够充分。将每个订单的响应时间优化到 1/1,000 秒，并不能保证达到每秒 1,000 个订单的吞吐量。优化吞吐量还需要关注排队延迟和一致性延迟，但对这些内容的满意讨论超出了本章的范围。关于清晰的解释，我推荐\
  \ Cary Millsap 的论文《清晰思考性能问题》，可从 [`http://method-r.com/downloads/doc_download/44-thinking-clearly-about-performance`](http://method-r.com/downloads/doc_download/44-thinking-clearly-about-performance)\
  \ 下载。\n\n\n#### 资源利用率\n\n考量性能的另一种方式是测量软件在执行业务任务期间所使用的资源。常见的指标包括 CPU 利用率、内存使用情况和\
  \ I/O 延迟。典型的诊断通常只讨论这些指标的聚合形式——换句话说，与单个业务任务的执行分离开来。尽管这些指标对于整体描述系统健康状况很有用，但我发现它们作为性能问题诊断的起点并不那么有效。相反，我认为当它们与响应时间的测量紧密结合时，会实用得多。请看下面的例子。\n\
  \n内森抱怨月末销售报告运行得实在太慢了。上个月它只用了 5 分钟就完成了。而这个月，他 15 分钟前启动了报告，到现在还没完成。系统监控显示 CPU 利用率高达\
  \ 95%。平均磁盘 I/O 延迟看起来很好，只有 4 毫秒，网络管理员告诉我们吞吐量远低于容量，为 9,000 tx/s。表 13-1 展示了此信息的摘要。\n\
  \n![images](img/t1301.jpg)\n\n马特抱怨月末工资单报告运行得实在太慢。上个月它只用了 5 分钟就完成了。在这 5 分钟里，20%的时间用在了\
  \ CPU 上，70%用在了磁盘 I/O 操作上，10%用在了网络调用上。而这个月，他 15 分钟前启动了报告，到现在还没完成。响应时间指标显示，在这 15 分钟里，5%的时间用在了\
  \ CPU 上，25%用在了 I/O 操作上，70%用在了网络调用上。表 13-2 展示了此信息的摘要。\n\n![images](img/t1302.jpg)\n\
  \n考虑到所提供的信息，我更愿意处理马特的情况。这两张表格在视觉上相似，但传达的信息却截然不同。当试图根据表 13-1 来诊断内森的问题时，我只能*猜测*CPU\
  \ 利用率是否是销售报告的问题所在，因为数据的聚合掩盖了我需要的细节。我当然知道整个系统的 CPU 使用率很高，但为了给销售报告解决问题，我需要知道该任务是否真的在等待\
  \ CPU 资源才能完成。\n\n在马特的例子中，我获得了关于仅应用于其任务的资源利用率的宝贵信息。借助表 13-2，我可以*明确知道*该从哪里入手，并且充满信心地开始调查工资单报告如何以及为何在网络层消耗了时间。\n\
  \n#### 性能是一项功能\n\n你应该将性能视为一项功能。它不是你工作的一个偶然结果；相反，它是你在设计和交付产品时有意为之的东西。卡伦·莫顿真正抓住了这个概念的重要性，她说：\n\
  \n> 因此，首先也是最重要的，我认为管理性能就是将一个简单的原则融入你的思维模式：**我对自己编写或维护的代码的性能负责。**\n>\n> ——卡伦·莫顿，《Expert\
  \ Oracle Practices》（Apress 2010）\n\n无论你遵循敏捷还是瀑布，极限编程还是快速应用开发，原型法还是螺旋模型，性能都应该在过程开始时、进行中以及过程“完成”后，都作为一个突出的功能特性。\n\
  \n功能需求应当伴随着性能期望，在某些业务场景中，这些期望是作为服务水平协议（SLA）表达的正式需求。这些期望不能在软件交付后强行施加。这似乎是一个显而易见的陈述，但在实践中，现实世界中发生的恰恰是这种情况。卡伦·莫顿的引述描述了软件开发团队中每个角色、每个人所必需具备的基本思维模式。从一开始，性能就必须包含功能和时间这两个概念。\n\
  \n当马特打电话抱怨工资单报告的性能时，他会打给谁？很可能是负责该应用的 DBA。而这个 DBA 可能从未参与过软件开发过程。软件应用文档会手把手地引导 DBA\
  \ 完成问题诊断吗？很可能不会。它应该吗？绝对应该！软件本身会提供足够的信息来指引 DBA 找到可能的原因吗？很可能不会。它应该吗？当然应该！为什么性能问题在生产环境实现中被视为缺陷，而在开发和测试过程中却不是呢？\n\
  \n无论原因如何，最终解决问题的责任落在了 DBA 或性能分析师身上。他们解决问题的能力将取决于他们能收集到的关于该问题的信息质量。如果马特抱怨“整个系统都很慢”而没有指明具体问题，那么解决他的问题可能会令人痛苦。系统范围的、通常是抽样聚合的数据，可能无法揭示影响马特报告的问题。如果分析师仅依赖聚合数据，他们可能会花费无尽的时间和金钱去追逐错误的问题。他们可能会改进系统的某些部分，但在解决导致马特报告变慢的根本问题之前，他们并不算真正完成。\n\
  \n这并不是说优秀的 DBA 和性能分析师没有一直在解决像马特这样的问题——他们当然会。他们会提出能引向问题解决的好问题，例如：\n\n*   系统变慢时，你具体在做什么？\n\
  *   当我告诉你系统不再变慢之后，你会立即执行哪项业务任务，以测试我的判断？\n\n性能分析师使用各种工具来测量关键细节——在执行该业务任务期间，时间花在了哪里、消耗在了什么资源上。那么，你应该如何编写代码，才能真正帮助性能分析师——即编写出能提供超出功能需求之外的性能信息的代码？\n\
  \n### 什么是性能剖析？\n\n性能剖析是在代码步骤执行时记录其日志。在某些情况下，剖析不强调时间，而是更侧重于事件序列和迭代次数。在其他情况下，每个代码步骤都会记录一个耗时测量值。\n\
  \n性能剖析对于许多软件开发人员来说是一项常见活动，甚至是日常实践。性能剖析是在开发过程中了解代码的好方法。第 7 章 描述了如何使用 Oracle 提供的包来剖析\
  \ PL/SQL 代码。你可能从其他软件语言中认识这些剖析器：\n\n```\ngcc –pg …; gprof …\n```\n\n```\njava –prof\
  \ …; java ProfilerViewer …\n```\n\n```\nperl –d:Dprof …; dprofpp …\n```\n\n这些工具都以不同的方式展示剖析结果。为了能更清晰地描述最适合性能的剖析结果，我将首先快速解释一个能帮助开发人员更清晰地理解时间流逝的工具：序列图。\n\
  \n\n### 序列图\n\n作为统一建模语言的一部分，序列图主要用于按交互发生的顺序展示对象之间的交互。在软件架构中，这些对象通常定义为应用层，如数据库、Web\
  \ 服务器或浏览器。\n\n在软件开发中，这些对象有时定义为应用代码中的层级，高层过程调用连续的低层过程。在最底层，这些过程通常代表对基本系统资源的调用。\n\n\
  当引入时间元素时，序列图对性能优化的价值最大。可视化地查看每个消耗响应时间的层级或层，且每个交互按所耗时间的比例缩放，可以使您专注于能获得最大性能提升的代码区域。\n\
  \n图表对于高层次理解流程非常有效，但随着越来越多对象和交互被添加到图中，细节会如此拥挤以至于丢失了整体价值。当我迷失在细节中时，我发现最有帮助的方法是汇总或聚合数据以找到我需要的信息。\n\
  \n### 配置文件的魔力\n\n*配置文件*是序列图的表格化表示。它是对响应时间的分解，通常按组件响应时间贡献的降序列出。杂货店收据是类似的分解（虽然通常不按成本排序），在底部提供支付的总额，并列出所购每件商品的成本。表\
  \ 13-3 展示了一个任务消耗了 60 秒时间的配置文件，该任务被分解为其组成函数。\n\n![images](img/t1303.jpg)\n\n配置文件可以被聚合，使得对同一函数的所有调用都报告在一行中。在表中添加一列显示每个函数被调用的次数有时很有帮助，特别是如果您想知道每次调用的平均响应时间。\n\
  \n当您确切地看到慢任务将 60 秒花在了哪里时，魔力就发生了。您现在*知道*任务 70%的响应时间被`r`函数调用消耗。同样有帮助的是，您知道任务*没有*在哪里花费时间。\n\
  \n### 性能分析的好处\n\n以这种方式分析代码有许多好处。真正的关键是这种独特格式的配置文件所提供的可见性。好处包括：\n\n*   您*知道*代码的时间花在哪里。没有准确的响应时间测量，您只能*猜测*。\n\
  *   您只优化相关的代码路径。配置文件将您的注意力集中在响应时间的主要贡献者上。没有这些信息，您会陷入强迫性调优障碍（CTD），调优所有能调优的东西，并且永远不知道何时才足够。Gaja\
  \ Krishna Vaidyanatha 在第 7 章的《Oracle 洞见：橡木桌的故事》（Apress 2004）中定义并描述了 CTD。\n*   您将学习集中在当前对您重要的话题上。如果您的响应时间完全由\
  \ `latch: cache buffers chains` 调用主导，那么今天是您的幸运日：您只需要研究 Oracle 数据库中超过 1000 种可插桩调用类型中的一种。\n\
  *   当您的目标达成时，您可以停止优化。通过配置文件，您知道业务任务每个组件可能的改进。您使用真实数据来证明您的断言，从而做出关于改进的经济决策。\n*  \
  \ 您可以定量地*预测*您的补救措施将产生的影响。然后，您可以使用与预测时相同的度量单位直接验证结果。配置文件因此既是优化工具，也是所获收益的证明。\n\n以这些方式使用配置文件只会让您成为更好的软件开发人员。为了完全负责代码的性能，您必须养成进行性能分析的习惯。\n\
  \n### 插桩\n\n作为一名音乐家和软件开发人员，“插桩”这个词对我来说当然也有多种含义。当我思考音乐时，插桩被定义为特定音乐作品或编曲中要使用不同乐器的数量和种类。作曲家规定所需不同乐器的数量以及每种乐器所需的最少演奏者数量，记为独立的声部。作品的指挥和演奏者根据期望的音乐效果和可用的正确数量的音乐家，最终决定有多少演奏者将表演每个声部。\n\
  \n当我思考软件时，插桩具有不同的含义。如果配置文件是通过聚合顺序测量构建的，那么测量值从何而来？插桩是您代码中提供这些测量值的部分。就像音乐插桩一样，您的代码所提供的测量类型和数量会影响软件的整体性能。\n\
  \n考虑通常引发插桩主题的情况。当出现问题，程序的性能无法接受时，神奇的问题就出现了：“为什么这个程序这么慢？”\n\n\n\n#### 为何此程序运行缓慢？\n\
  \n从理论转向实践，我们来审视程序 `p`。为什么程序 `p` 运行缓慢？\n\n```\nSQL> exec p\nPL/SQL procedure successfully\
  \ completed.\nSQL>\n```\n\n显然，我缺少一个关键要素。没有更多信息，我只能猜测程序 `p` 运行缓慢的原因。在办公室里，我无数次听到类似我们公司信条的话。\n\
  \n> 当你能知道时，何必去猜？\n>\n> ——凯里·米勒萨\n\n我当然能知道——我只需要测量。“慢”是以时间单位来衡量的，因此我需要测量程序 `p` 的**已用时间**。\n\
  \n```\nSQL> set timing on\nSQL> exec p\nPL/SQL procedure successfully completed.\n\
  Elapsed 00:03:07.42\nSQL>\n```\n\n现在我知道程序 `p` 执行了 3 分 7.42 秒。这是个好的开始，但要想了解程序 `p`\
  \ 中哪些代码部分需要改进，我需要详细测量所有代码部分。（这是方法 R 的第二步，我稍后会详细说明）。详细的测量结果最好以性能剖析文件的形式呈现。那么，我如何获取正确的测量数据来创建剖析文件呢？我需要*插桩*。插桩就是你添加到代码中的东西，以使生成剖析文件成为可能。\n\
  \n首先，这是代码现在的样子：\n\n```\nCREATE OR REPLACE PROCEDURE p AS\nBEGIN\n  q;\n  r;\n  s;\n\
  END;\n```\n\n现在我添加插桩。\n\n```\nCREATE OR REPLACE PROCEDURE p AS\n  t0 NUMBER;\n \
  \ t1 NUMBER;\n  t2 NUMBER;\n  t3 NUMBER;\nBEGIN\n  t0 := DBMS_UTILITY.GET_TIME;\n\
  \  q;\n  t1 := DBMS_UTILITY.GET_TIME;\n  DBMS_OUTPUT.PUT_LINE ('Procedure q: ' ||\
  \ (t1 - t0)/100 || ' seconds');\n  r;\n  t2 := DBMS_UTILITY.GET_TIME;\n  DBMS_OUTPUT.PUT_LINE\
  \ ('Procedure r: ' || (t2 - t1)/100 || ' seconds');\n  s;\n  t3 := DBMS_UTILITY.GET_TIME;\n\
  \  DBMS_OUTPUT.PUT_LINE ('Procedure s: ' || (t3 - t2)/100 || ' seconds');\n  DBMS_OUTPUT.PUT_LINE\
  \ ('Total Elapsed: ' || (t3 - t0)/100 || ' seconds');\nEND;\n```\n\n这是执行此插桩代码后的结果：\n\
  \n```\nSQL> set timing on serveroutput on\nSQL> exec p\nProcedure q: 1.05 seconds\n\
  Procedure r: 172.59 seconds\nProcedure s: 14.11 seconds\nTotal Elapsed: 187.75 seconds\n\
  Elapsed 00:03:07.75\nSQL>\n```\n\n我现在知道了一个非常重要的信息，这是没有某种插桩就无法得知的。这些结果提供了一个*剖析文件*，一份时间花费明细，显示了我的时间在代码中被用在了哪里。我承认这里展示的插桩方式很笨拙，我不会建议将这样的代码称为“成品”，但即便如此笨拙的插桩也是强大的。我将在下一节讨论如何改进插桩方法。\n\
  \n现在我知道，花时间优化过程 `q` 将收益甚微——最多不超过 1.05 秒（占总时间 187.75 秒的 0.56%）。同样地，优化过程 `s` 最多也只能获得\
  \ 14.11 秒（7.52%）的提升。我的大部分时间花在了过程 `r` 上，所以我应该把优化的时间和精力集中在那里。如果我决定从过程 `q` 或 `s` 开始优化会怎样？我也许能极大地改进这些过程的个别响应时间，但如果我的目标是将整体响应时间减少\
  \ 1 分钟，我的努力将会是失败的。为何要*猜测*？你可以*知道*应该专注于哪里。\n\n插桩让你的代码更快、更易于维护、编写成本更低。插桩让代码更快，因为它向你展示了所有让代码更高效的机会，无论是在编写时还是完成后。插桩让代码更易于维护，因为它在你的分析人员说你的代码太慢时，确切地向他们展示了代码在做什么。插桩让编写代码成本更低，因为它让你的调优努力只集中在真正影响性能的代码部分。良好的插桩就是你的代码性能要求已得到满足的证明。\n\
  \n### 测量侵入性\n\n注意在我这个简短的例子中，添加插桩后的已用时间是 3 分 07.75 秒，比原来的 3 分 07.42 秒长了 0.33 秒。想象一下，如果这些测量是在一千次执行过程中计算的平均值。插桩也是代码，而所有代码都会影响一个工作单元的整体响应时间。聪明的开发者知道，移除多余和不必要的代码对于性能优化至关重要。\n\
  \n那么，你是否应该认为这段插桩代码是多余且不必要的？绝对不是！代码不仅必须满足任务的要求，还必须在软件的整个生命周期内表现良好。\n\n汤姆·凯特（Tom Kyte），`http://asktom.oracle.com/`\
  \ 背后的“汤姆”，曾在一次会议上被问及，Oracle 数据库中内置的所有插桩（通过各种 V$ 和 X$ 固定视图发布的数据、扩展的 SQL 跟踪数据等）的测量侵入效应有多大。他若有所思地停顿了一下，然后自信地回答说，测量侵入相当于*负*百分之十，甚至可能更少。他接着解释说，如果没有在\
  \ Oracle 数据库内核中编写的插桩，Oracle 服务器技术部门的开发者将无法有效地优化他们的代码。由于拥有了他们的插桩所提供的详细程度，开发者们能够在每个版本中改进代码的性能。\n\
  \n### 标识\n\n除了为单个程序单元提供响应时间值的代码外，插桩还可用于标识数据库中的应用程序代码。能够将数据库中消耗的资源直接与特定的业务任务关联起来，是性能优化的关键组成部分。Oracle\
  \ 提供了许多不同的方法来实现这一目标。\n\n\n\n\n## DBMS_SESSION.SET_IDENTIFIER\n\n应使用 `DBMS_SESSION.SET_IDENTIFIER`\
  \ 以简化运行时的性能分析。使用此命令可让数据库实例知道每个会话关联的是哪个最终用户。Oracle 在版本 10 中引入了这种“端到端应用跟踪”功能。例如，如果你的应用在数据库层面通过唯一账户验证用户，可以在登录触发器中将标识符设置为用户名和\
  \ IP 地址。\n\n```\nCREATE OR REPLACE TRIGGER LOGON_TRIGGER\nAFTER LOGON ON DATABASE\n\
  DECLARE\n  l_identifier VARCHAR2(64);\n\nBEGIN\n  L_identifier := SYS_CONTEXT('USERENV',\
  \ 'OS_USER') || ':' ||\n                  SYS_CONTEXT('USERENV', 'IP_ADDRESS');\n\
  \  DBMS_SESSION.SET_IDENTIFIER(l_identifier);\nEND;\n/\n```\n\n最终用户的标识信息现在可见于 `V$SESSION.CLIENT_IDENTIFIER`\
  \ 列、其他数十个视图以及为该会话生成的任何扩展 SQL 跟踪文件中。要为已知的最终用户标识符启用跟踪，请调用 Oracle 内置过程，如下所示：\n\n```\n\
  DBMS_MONITOR.CLIENT_ID_TRACE_ENABLE(client_id=>'HR:Claire:425542',\n           \
  \                         waits=>TRUE,\n                                    binds\
  \ => TRUE,\n                                    plan_stat => 'ALL_EXECUTIONS'  \
  \    -- 11g 及以后版本\n                                    );\n```\n\n跟踪文件将包含一行格式如下的内容：\n\
  \n```\n*** CLIENT ID:(HR:Claire:425542) 2011-03-16 01:59:13.317\n```\n\n如果你的应用在最终用户之间共享会话，则此信息需要从应用层而非数据库层设置。应使用应用级会话\
  \ ID 或用户名，而非 IP 地址。关键是要利用必要的信息来识别对数据库会话中执行的工作负责的最终用户。\n\n为最终用户标识符启用跟踪现在将把数据输出到多个跟踪文件，因为你的应用正在共享会话。Oracle\
  \ 实用工具 `trcsess` 可用于整合来自包含相同 `CLIENT ID` 的多个跟踪文件的信息。例如：\n\n```\ntrcsess output=425542.trc\
  \ clientid=HR:Claire:425542 *.trc\n```\n\n![images](img/square.jpg) `注意` 不要将 `V$SESSION.CLIENT_IDENTIFIER`\
  \ 与 `V$SESSION.CLIENT_INFO` 混淆，后者是使用 `DBMS_APPLICATION_INFO.SET_CLIENT_INFO` 过程设置的。尽管\
  \ `DBMS_MONITOR` 提供了基于从 `DBMS_APPLICATION_INFO` 设置的 `MODULE` 和 `ACTION` 来启用和禁用扩展\
  \ SQL 跟踪的过程，但 `CLIENT_INFO` 列在 `DBMS_MONITOR` 中没有对应项。\n\n## DBMS_APPLICATION_INFO.SET_SESSION_LONGOPS\n\
  \n如果你有一个预先可知将长时间运行的任务，请使用 `DBMS_APPLICATION_INFO.SET_SESSION_LONGOPS` 来标识该任务。此过程会在\
  \ `V$SESSION_LONGOPS` 视图中填充一行，该行可用于监视你的长时任务的进度。该过程的参数与视图中的列大致对应，因此可以轻松实现对应用程序特定细节的可见性，而且方式极其轻量。\n\
  \n请注意，Oracle 会在统计信息收集、并行查询执行和服务器管理恢复等任务期间自动填充此视图，因此你的数据将与那些数据交错在一起。以下代码展示了使用此过程的示例：\n\
  \n```\nDECLARE\n  l_rindex      BINARY_INTEGER;\n  l_slno        BINARY_INTEGER;\
  \ -- Oracle 内部使用\n  l_op_name     VARCHAR2(64)    := 'Month end posting';\n  l_target\
  \      BINARY_INTEGER; -- 正在处理的对象 ID\n  l_target_desc VARCHAR2(32);   -- 目标描述\n\
  \  l_context     BINARY_INTEGER; -- 与任务相关的数字，如已处理数量等\n  l_sofar       NUMBER(6,2);\
  \    -- 迄今已完成的工作量\n  l_totalwork   NUMBER := 100;  -- 预估的总工作量\n  l_units       VARCHAR2(32)\
  \    := 'records';\nBEGIN\n  -- rindex 用于标识 V$SESSION_LONGOPS 中的行\n  -- 使用 _nohint\
  \ 调用将为我们创建一个新的行和 rindex\n  l_rindex := DBMS_APPLICATION_INFO.SET_SESSION_LONGOPS_NOHINT;\n\
  \n  FOR i IN 1 .. l_totalwork LOOP\n\n    -- 在实践中，这将是一个更复杂的计算。\n    -- 这个简单示例假设每个子任务的处理时间是均匀的\n\
  \    l_sofar := i;\n\n    DBMS_APPLICATION_INFO.SET_SESSION_LONGOPS(rindex     \
  \ => l_rindex,\n                                              slno        => l_slno,\n\
  \                                              op_name     => l_op_name,\n     \
  \                                         target      => l_target,\n           \
  \                                   target_desc => l_target_desc,\n            \
  \                                  context     => l_context,\n                 \
  \                             sofar       => l_sofar,\n                        \
  \                      totalwork   => l_totalwork,\n                           \
  \                   units       => l_units);\n\n    -- 处理在此处发生\n\n    COMMIT;\n\
  \  END LOOP;\nEND;\n/\n```\n\n![images](img/square.jpg) `提示` Oracle 目前没有提供用于删除 `V$SESSION_LONGOPS`\
  \ 中行的过程。此视图代表 Oracle 底层固定大小表之一的数据，因此行实际上并不会被删除。达到最大行数后，旧行会被新行替换。对于由 Oracle 功能（如统计信息收集）插入的行，操作完成时\
  \ `TIME_REMAINING` 列将被设置为 0。对于你自己的数据，请确保在任务完成时将 `SOFAR` 和 `TOTALWORK` 设置为相同的值，因为无法通过该过程访问\
  \ `TIME_REMAINING` 列。\n\n\n\n\n## DBMS_APPLICATION_INFO.SET_MODULE\n\n虽然`DBMS_APPLICATION_INFO.SET_SESSION_LONG_OPS`过程专门用于识别长时间运行的任务，但\
  \ Oracle 确实提供了一种轻量级方法来识别当前在数据库中执行的所有应用程序任务。`module`和`action`的值可在`V$SESSION`及许多动态性能视图中查看。`DBMS_MONITOR.SERV_MOD_ACT_STAT_ENABLE`可用于查看视图`V$SERV_MOD_ACT_STATS`中任何模块和操作的实时统计信息。\n\
  \n正确设置`module`和`action`的值是将数据库中的性能统计信息与业务任务关联起来的**最佳方式**。例如：\n\n```\nCREATE OR REPLACE\
  \ PROCEDURE p AS\nBEGIN\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name => 'Month\
  \ End Posting',\n                                   action_name => 'p');\n  q;\n\
  \  r;\n  s;\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name => NULL,\n         \
  \                          action_name => NULL);\nEND;\n```\n\n请注意，就像`DBMS_SESSION.SET_IDENTIFIER`一样，Oracle（在\
  \ 10g 及更高版本中）提供了使用`DBMS_MONITOR`包根据模块和操作值开启扩展 SQL 跟踪的功能。要为已知的模块和操作启用跟踪，请调用 Oracle\
  \ 过程，如下所示：\n\n```\nDBMS_MONITOR.SERV_MOD_ACT_TRACE_ENABLE(service_name => 'V11202',\n\
  \                                       module_name => 'Month End Posting',\n  \
  \                                     action_name => 'p',\n                    \
  \                   waits => TRUE,\n                                       binds\
  \ => TRUE,\n                                       plan_stat => 'ALL_EXECUTIONS'\
  \     -- 11g 及更高版本\n                                       );\n```\n\n跟踪文件将包含格式如下的行：\n\
  \n```\n*** SERVICE NAME:(V11202) 2011-05-13 20:26:22.919\n*** MODULE NAME:(Month\
  \ End Posting) 2011-05-13 20:26:22.919\n*** ACTION NAME:(p) 2011-05-13 20:26:22.919\n\
  ```\n\n`module`和`action`应该使用什么值呢？模块名称应能唯一标识应用程序的一部分。操作名称应表示在该模块内正在执行的逻辑工作单元。模块和操作的名称都应尽可能贴近业务术语。\n\
  \n![images](img/square.jpg) `注意` Oracle 除了为 PL/SQL 提供钩子外，也为其他语言提供了对`module`和`action`标识符的挂钩。在\
  \ OCI 中，使用过程`OCIAttrSet`来设置`OCI_ATTR_MODULE`和`OCI_ATTR_ACTION`值。详情请参见[`http://download.oracle.com/docs/cd/E11882_01/appdev.112/e10646/ociaahan.htm`](http://download.oracle.com/docs/cd/E11882_01/appdev.112/e10646/ociaahan.htm)。\n\
  \n在 Java 中，使用 JDBC 方法`OracleConnection.setEndToEndMetrics()`，该方法首次在 Oracle 10g 中提供。详情请参见[`http://download.oracle.com/docs/cd/E11882_01/java.112/e16548/dmsmtrc.htm`](http://download.oracle.com/docs/cd/E11882_01/java.112/e16548/dmsmtrc.htm)。\n\
  \n在 Perl 中，使用`DBI->connect`函数（在`DBD::Oracle`中）来设置属性`ora_module_name`和`ora_action`。详情请参见[`http://kobesearch.cpan.org/htdocs/DBD-Oracle/DBD/Oracle.html`](http://kobesearch.cpan.org/htdocs/DBD-Oracle/DBD/Oracle.html)。\n\
  \n这些语言，以及任何其他可以访问数据库层的语言，也可以通过 PL/SQL 调用直接使用`DBMS_APPLICATION_INFO`来设置值。与 OCI、Java\
  \ 和 Perl 示例不同，这种方法会带来额外的网络往返开销，因此在代码循环内部进行这些 PL/SQL 调用之前需要仔细考虑。\n\n`DBMS_APPLICATION_INFO`包不跟踪嵌套的操作。当你使用`SET_MODULE`过程时，之前的`module`和`action`值会丢失，因此你需要在代码中正确处理这个问题。在代码的最高层级结束时将它们设置为`NULL`是合理的，但在内部过程`q()`、`r()`和`s()`中应如何使用`SET_MODULE`呢？一种选择是在被调用的过程中避免设置`module`和`action`，仅在最高层级的过程中设置它们。例如：\n\
  \n```\nCREATE OR REPLACE PROCEDURE p AS\nBEGIN\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name\
  \ => 'Month End Posting',\n                                   action_name => 'q');\n\
  \  q;\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name => 'Month End Posting',\n\
  \                                   action_name => 'r');\n  r;\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name\
  \ => 'Month End Posting',\n                                   action_name => 's');\n\
  \  s;\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name => NULL,\n               \
  \                    action_name => NULL);\nEND;\n```\n\n一个更好的选择是通过在对`set_module`进行调用前存储先前的值，并在完成时恢复它们来处理嵌套问题。每个被调用的过程都应包含类似的代码，而不仅仅在最高层级的代码中进行检测。过程的每个退出点，包括异常处理部分，都需要重置`module`和`action`。例如：\n\
  \n```\nCREATE OR REPLACE PROCEDURE p AS\n  l_module VARCHAR2(48);\n  l_action VARCHAR2(32);\n\
  \  l_sqlcode NUMBER;\n  l_sqlerrm VARCHAR2(512);\nBEGIN\n  DBMS_APPLICATION_INFO.READ_MODULE(module_name\
  \ => l_module,\n                                    action_name => l_action);\n\
  \  DBMS_APPLICATION_INFO.SET_MODULE(module_name => 'Month End Posting',\n      \
  \                             action_name => 'p');\n  q;\n  r;\n  s;\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name\
  \ => l_module,\n                                   action_name => l_action);\nEXCEPTION\
  \ WHEN OTHERS THEN\n  l_sqlcode := SQLCODE;\n  l_sqlerrm := SQLERRM;\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name\
  \ => l_module,\n                                   action_name => l_action);\n \
  \ -- 在此处处理异常\nEND;\n```\n\n我**无法过分强调**在您的应用程序中结合使用`DBMS_APPLICATION_INFO`的价值。维护`module`/`action`堆栈虽然麻烦，但我很快就会讨论一种简化它的方法。\n\
  \n### 条件编译\n\n第 4 章描述了如何使用 PL/SQL 的条件编译功能为 PL/SQL 代码添加计时信息检测。在性能分析师能够控制运行时应用程序并且性能问题易于重现的情况下，可以使用此方法。\n\
  \n如果问题可以在测试环境中重现，那么可以重新编译 PL/SQL 代码并开启计时检测。如果必须使用生产环境（让我们面对现实，这种情况发生得太频繁了），有办法将侵入性降至最低。不要在活动模式中重新编译\
  \ PL/SQL，而是将 PL/SQL 复制到一个单独的模式中。然后可以在新模式中重新编译代码，而不影响生产用户。\n\n要将特定用户重定向到新创建的模式，可以修改应用程序或创建一个登录触发器。然后重现问题。最后，根据计时代码提供的数据，构建问题任务的响应时间概况，并通过解决性能问题让您的朋友们惊叹不已。\n\
  \n\n\n#### 内置性能分析器\n\n第 7 章 鼓励你利用 Oracle 数据库附带的几个工具包来分析你的代码：`DBMS_HPROF`、`DBMS_TRACE`\
  \ 和 `DBMS_PROFILER`。这些包提供了分析你的 PL/SQL 代码的功能，每个包的关注点略有不同。我在此只作简要介绍，因为我更感兴趣的是能够覆盖整个软件生命周期的解决方案。\n\
  \n在开发过程中了解你的代码至关重要，因此能够轻松在代码行或子程序级别进行性能分析的工具是非常宝贵的。但是，这些工具能否轻松集成到你的应用程序中？测量的侵入性有多大？性能分析师能否在不招致对所有其他业务任务的侵入性惩罚的情况下，轻松获取特定业务任务的响应时间数据？\n\
  \n使用这些内置包可能正是你想要的，但我发现它们未能很好地回答这些问题。幸运的是，我找到了一个更好的答案：一个提供 `DBMS_APPLICATION_INFO`\
  \ 插桩标准并启用 Oracle 内部插桩的 PL/SQL 库。在我详细介绍这个库之前，我需要先介绍这种插桩。\n\n#### 扩展 SQL 跟踪数据 (事件\
  \ 10046)\n\nOracle 的内核插桩，即扩展 SQL 跟踪数据，最初被称为“伪错误调试事件 10046”。此插桩被添加到 Oracle 代码中，用于优化数据库应用程序以及内核本身。此插桩生成的跟踪文件恰好提供了开发人员想要的：其代码花费时间的线性顺序记录。\n\
  \n跟踪文件中包含的详细程度允许分析师深入了解数据库会话的内部工作方式。与内置性能分析器非常相似，有时这种细节程度可能令人难以招架。在正确级别进行插桩是真正的关键。Oracle\
  \ 的 `tkprof` 聚合数据以便理解细节，但这样做时，它隐藏了重要的关系。真正需要的是以配置文件格式聚合数据，以一种将你的注意力集中在特定业务任务中最大响应时间消耗点的方式来总结细节。\n\
  \n构建性能不佳的业务任务的配置文件是成功优化的关键。我使用 Method R Profiler 软件来生成配置文件，识别响应时间的最大贡献者，并解决性能问题。有时问题在于糟糕的\
  \ SQL，有时在于糟糕的 PL/SQL，有时在于配置问题，有时在于更复杂的情况。但在每种情况下，配置文件都是最佳的起点。有时，DBA 团队对启用跟踪或向开发团队提供访问权限有抵触情绪。\n\
  \n> *即使需要国会法案和医生的信才能让 DBA 给我必要的权限，我也会运行跟踪。*\n> \n> ——受挫的客户\n\n但是，获取那些跟踪文件是非常值得的。插桩非常好的应用程序可能会报告足够的详细计时信息来解决大多数问题。但在某些情况下，真正的性能问题隐藏在应用程序的数据库层中。在这些情况下，性能分析师需要插桩的关联性：包含所执行业务任务细节的扩展\
  \ SQL 跟踪文件。更好的是，智能应用程序应在需要时生成包含此关联信息的跟踪文件。\n\n#### Oracle 插桩库 (ILO)\n\n`ILO`，即 Oracle\
  \ 插桩库，是一个开源项目。我是当前的维护者，但其创建的荣誉属于 Eric Evans。`ILO` 由 PL/SQL 包组成，包含用于使用 Oracle 扩展\
  \ SQL 跟踪识别和测量任务的过程，以及用于收集和存储特定业务任务响应时间数据的过程。这些包被安装并编译在目标 Oracle 实例中，并且可以由任何能够访问\
  \ Oracle 数据库层的代码调用。`ILO` 与 Method R `SLA Manager` 完全集成，允许你组织和分析整个应用程序系统的响应时间数据。\n\
  \n![images](img/square.jpg) **注意** `ILO` 是在 SourceForge 上提供的开源软件，[`http://sourceforge.net/projects/ilo/`](http://sourceforge.net/projects/ilo/)。它需要\
  \ Oracle Database 9.2.0.1 或更高版本。它在 GNU 宽松通用公共许可证（LGPL）下免费发布，[`http://gnu.org/copyleft/lgpl.html`](http://gnu.org/copyleft/lgpl.html)。`SLA\
  \ Manager` 是来自 Method R Corporation [`http://method-r.com/software/slam`](http://method-r.com/software/slam)\
  \ 的商业软件。\n\n##### 为什么你应该使用 ILO？\n\n使用 `ILO` 为代码插桩的好处包括以下几点：\n\n*   对于运行 `ILO` 插桩应用程序的操作员和分析师来说，分析指定业务任务的确切持续时间非常容易。想象一下，用户抱怨人力资源系统中“添加员工”操作太慢。借助\
  \ `ILO` 插桩，性能分析师可以轻松获取其诊断和修复用户特定问题所需的 Oracle 扩展 SQL 跟踪数据。\n*   开发人员不再需要担心何时或为何使用\
  \ `DBMS_APPLICATION_INFO` 或 `DBMS_SESSION` 将其应用程序的部分注册到 Oracle 数据库。业务任务现在通过 `Module`\
  \ 和 `Action` 在 `V$` 视图中可见。\n*   开发人员不再需要担心在应用程序中插入代码行来管理 Oracle 的“扩展 SQL 跟踪”功能（也称为\
  \ 10046 跟踪、`DBMS_SUPPORT` 跟踪或 `DBMS_MONITOR` 跟踪）。\n*   使用 `ILO`，你的 Oracle 跟踪文件将被正确地限定时间范围，并将*仅*包含属于你响应时间的耗时描述。\n\
  *   `ILO` 包含钩子，允许你存储特定任务的响应时间历史记录。然后，你将能够报告性能趋势或违反服务级别协议的情况。\n*   `ILO` 经过真实世界测试。它轻量且可靠。\n\
  \n\n## 工作原理\n\nILO 非常易于使用。你用一行代码标记每个任务的开始和结束，为每个任务分配一个模块和操作名称。可以将操作视为任务本身的名称，而模块则代表该任务所对应的应用程序部分。\n\
  \n标记任何任务的开始，就像进行一次过程调用并包含模块、操作和注释的值一样简单。标记任务结束时，再次进行一次简单的过程调用。务必包含被标记任务的所有可能退出点，包括代码中的任何\
  \ `EXCEPTION` 部分。例如：\n\n```sql\nDECLARE\n  l_sqlcode NUMBER;\n  l_sqlerrm VARCHAR2(512);\n\
  BEGIN\n   ilo_task.begin_task(module  => '加载事务表',\n                       action\
  \  => '开始整体加载',\n                       comment => '执行过程 all_trx_table_loads');\n\
  \n   ... 你的任务代码放在这里\n\n   ilo_task.end_task;\nEXCEPTION\n   WHEN ex_insert_problem\
  \ THEN\n      l_sqlcode := SQLCODE;\n      l_sqlerrm := SQLERRM;\n      ilo_task.end_task(error_num\
  \ => l_sqlcode);\n      ... 处理异常\n   WHEN others THEN\n      l_sqlcode := SQLCODE;\n\
  \      l_sqlerrm := SQLERRM;\n      ilo_task.end_task(error_num => l_sqlcode);\n\
  \      … 处理异常\nEND;\n```\n\n![images](img/square.jpg) **提示** `SQLCODE` 和 `SQLERRM`\
  \ 在代码的 `EXCEPTION` 部分始终处于活动状态。如果你的异常处理引发了另一个异常，原始的 `SQLCODE` 将被新错误替换。请注意，几乎任何一行代码都可能引发异常。在引用这些内置函数之前，请将内容保存到局部变量中。然后，你的日志记录和插桩过程应使用这些局部变量来记录正确的错误。另请注意，ILO\
  \ 的异常处理是可配置的。默认情况下，ILO 过程会抑制自身异常，以避免对生产代码产生负面影响。\n\n扩展 SQL 跟踪的启用和禁用应在应用程序运行时执行，此时开发人员参与项目早已结束。`ilo_task.begin_task`\
  \ 调用会检查是否有人通过调用 `ilo_timer.get_config` 表达了跟踪特定模块/操作对的意图。该过程确定应跟踪哪些任务，通常在每个 ILO 安装中都会进行定制。\n\
  \n希望进行单元测试的开发人员可以调用特殊过程 `ilo_timer.set_mark_all_tasks_interesting(TRUE,TRUE);` 来覆盖正常的\
  \ `ilo_timer.get_config` 处理，但对此过程的调用通常不会出现在生产代码中，除非它们是作为菜单选项实现的（例如，帮助 ![images](img/U001.jpg)\
  \ 调试 ![images](img/U001.jpg) 跟踪所有）。使用 ILO 的最大好处在于，跟踪的选择是一个精确控制的运行时决策。无需 DBA 手动干预来为会话开启跟踪，ILO\
  \ 提供了一种机制，可以从应用程序表达开启跟踪的意图，并在无需干预的情况下实现任务特定的跟踪。\n\n## 示例\n\nPL/SQL 代码的一个常见用途是处理多代码路径的\
  \ DML 触发器。在以下示例中，触发器根据原始 DML 是 `INSERT` 还是 `UPDATE` 执行不同的操作。良好的插桩不仅应告知你代码覆盖率，还应帮助你衡量正确的事务。\n\
  \n```sql\nCREATE OR REPLACE TRIGGER insert_or_update_example\n    INSTEAD OF INSERT\
  \ OR UPDATE ON table_abc\nDECLARE\n  v_storage_value VARCHAR2(32000);\n  l_sqlcode\
  \       NUMBER;\nBEGIN\n  IF INSERTING THEN\n    ilo_task.begin_task(module => 'Table_ABC',\n\
  \                        action => 'Instead of insert',\n                      \
  \  comment => 'Table_ABC 上的插入或更新触发器');\n    example_package.create_value\n    (p_value_name\
  \     => :NEW.value_name\n     ,p_value         => :NEW.value\n     ,p_description\
  \   => :NEW.description\n     ,p_storage_value => v_storage_value\n    );\n    example_package.setup_something_else\n\
  \    (p_storage_value => v_storage_value\n    );        \n  ELSIF UPDATING THEN\n\
  \    example_package.update_value\n    (p_value_name     => :NEW.value_name\n  \
  \   ,p_value         => :NEW.value\n     ,p_description   => :NEW.description\n\
  \     ,p_storage_value => v_storage_value\n    );        \n  ENDIF;\n  ilo_task.end_task;\n\
  EXCEPTION WHEN OTHERS THEN\n  l_sqlcode := SQLCODE;\n  ilo_task.end_task(error_num\
  \ => l_sqlcode);\n  ... 处理异常\nEND;\n```\n\n假设你已经对 `example_package` 中的各个程序单元进行了插桩，你可能会认为在此触发器中进行进一步插桩是多余的。但如果你的插桩目标是为测试和诊断性能问题提供正确的性能指标，那么这个插桩就至关重要。\n\
  \n使用 ILO 的众多好处之一是，该库能正确处理模块/操作对的嵌套。想象一下如果情况并非如此，模块和操作会发生什么。最后一个设置值的过程或函数将承担直到值被再次设置之前所花费的所有时间的全部责任，从而导致你无法看到该任务的实际响应时间。\n\
  \n### 问题诊断\n\n你应如何解决性能问题？当某件事耗时过长时，问一个问题：“我的时间去哪儿了？”这就是方法 R。\n\n### 方法 R\n\n“方法\
  \ R”是 Cary Millsap 和 Jeff Holt 谦逊地命名的他们用于诊断和修复性能问题的四步方法，记录在《*优化 Oracle 性能*》（O'Reilly,\
  \ 2003）一书中。“R”代表响应时间，与他们称为“方法 C”的传统方法形成对比。\n\n方法 R 规定了四个简单的步骤。\n\n*   识别对你最重要的任务。\n\
  *   详细测量其响应时间。\n*   以经济高效的方式优化该响应时间。\n*   重复，直到你的系统达到经济最优。\n\n这就像优化生活中任何其他事物一样来优化软件。\n\
  \n#### 步骤 1：识别\n\n***识别***对你最重要的任务。向你的软件业务利益相关者提出以下问题：\n\n*   哪个执行缓慢的业务任务对业务的负面影响最大？\n\
  *   首先修复哪个任务会最令人满意？\n\n不可避免地，你会得到许多任务都极其重要的答案。不过别慌，这并非意料之外。只需接着问这个问题：“如果所有这些任务的优先级都相同，那么我们可以从任务\
  \ X 开始吗？”\n\n你会得到同意或进一步的澄清。也许任务 Y 确实需要先解决。无论哪种情况，关键是选择 ***一个*** 任务，然后继续方法 R 的下一步。如果整个系统确实很慢，并且存在一个根本原因，那么处理任何一个缓慢的任务都会迅速导向那个根本原因。修复该任务的性能问题也将有益于系统的其余部分。\n\
  \n相反，如果该任务有一个独特的根本原因，那么你解决这个问题也不会浪费时间，因为你从一个已知对业务重要的任务开始。任何流程或方法的关键在于正确地开始。正如玛丽·波平斯引用亚里士多德的话：\n\
  \n> *良好的开端是成功的一半。*\n>\n> ——亚里士多德\n\n\n## 第 2 步：测量\n\n详细`测量`任务的响应时间。在任何性能分析活动中，测量都应该是您关注的首要焦点。准确的测量能清晰地指出根本问题。不准确的测量则可能让您陷入徒劳的“兔洞”追猎中。\n\
  \n当我说“响应时间”时，我指的是最高优先级任务的响应时间，从最终用户发出工作请求开始，到最终用户收到所请求的信息或处理完成的通知为止。获取这些测量值有时很困难，但总是值得的。\n\
  \n当我说“详细”时，我指的是以性能剖析的形式。了解响应时间的每一刻消耗在何处，并聚焦于最大的时间消耗者。剖析可以详细展示程序代码单元或资源利用情况，但底部的总计`必须`是您所测量响应时间的\
  \ 100%。如果不是，您需要更准确地重新测量，或者重新考虑您构建剖析的方式。\n\n软件性能分析常被描绘成艺术而非科学，但我不同意这种说法。良好的性能分析完全关乎测量。\n\
  \n> *有两种可能的结果：如果结果证实了假设，那么你完成了一次测量。如果结果与假设相反，那么你完成了一次发现。*\n>\n> —恩里科·费米\n\n## 第\
  \ 3 步：优化\n\n以最具经济效益的方式`优化`该响应时间。首先，找到并消除不必要的工作。我反复发现，这是评估新性能问题的最佳起点。每天早上 8 点运行的那个\
  \ 600 页报告是绝对必要的吗？真的有人读它吗？每天晚上重建索引的作业最近评估过吗？从业务任务层面提出正确的问题是最好的起点。\n\n如果它确实需要，那么也许可以将报告安排到凌晨\
  \ 2 点运行？也许可以在数据中心用`SQL*Plus`执行，而不是在 2000 英里外的`Excel`中运行。如果您无法消除所有工作，次优选择是减少要完成的工作量。将业务规则从中层应用移到数据库层是实现此目标的一个好方法。第\
  \ 11 章提供了一个详细的案例研究，展示了在数据库中编写代码的好处。\n\n如果您的关键任务严重依赖某个资源，请考虑重新安排在同一时间竞争该资源的其他工作。负载管理是一个非常有效但常被忽视的工具。让业务相关方参与性能优化至关重要。如果您把皮卡车开到修理厂，让技术人员调试您的车辆，他们会如何调校？每位技术人员对“调校”的含义都有自己的理解。您是想开着皮卡车在陡坡上拉着一车床钢材跑\
  \ 2 小时？还是想在当地周五晚上的泥地赛道上赢得一场 200 英里的比赛？知道这些问题答案的技术人员会正确完成工作。同样，了解业务工作负载期望的性能分析师也会正确完成工作。\n\
  \n优化应用程序中的代码路径或优化单个 SQL 语句时，减少工作量也是目标。关键在于专注于效率，以最少的资源消耗完成适量的工作。手头有了正确的测量值，您就`知道`哪里需要改进。\n\
  \n> *完成任何事情最快的方法，就是完全不去做它。*\n>\n> —卡里·米尔萨普\n\n![images](img/square.jpg) **提示** 将业务规则移到数据库层是一个备受争议的话题，但\
  \ Toon Koppelaars 对此的论证比我听过的任何人都更有力。如果您渴望通过将代码移到尽可能低的层来获得性能收益，请查看 Toon 的构想以及他对“赫尔辛基宣言（IT\
  \ 版）”的解释：[`http://thehelsinkideclaration.blogspot.com/`](http://thehelsinkideclaration.blogspot.com/)。\n\
  \n## 第 4 步：重复\n\n`重复`以上步骤，直到您的系统达到经济最优。系统的性能总是可以提升的，但成本会越来越高。通过准确测量业务任务的响应时间，您可以预测对软件或硬件资源进行给定变更所带来的改进。然后，可以将量化的改进与实现该改进所需的成本进行权衡。当改进的成本超过所获得的业务价值时，调优过程就结束了。当球进洞时——就停止。\n\
  \n> *去打高尔夫吧。去高尔夫球场。击球。找球。重复直到球进洞。享受乐趣。就这样。*\n>\n> —查克·霍根\n\n\n\n"
- "# ILO 示例\n\n当你的代码被正确插桩时，诊断性能问题的过程是怎样的？这里我展示一个来自我们在 Method R 公司自身应用开发中的案例研究。这个例子源于我们正在为一个客户所做的工作，该客户专门因为我们承诺交付现在和未来都快速的代码而与我们签约。\n\
  \n在许多情况下，ILO 是通过用 Java 或其他数据库外部语言编写的应用程序调用来实现的。在这个例子中，应用程序是用 Java 编写的，但所有数据库访问都是通过一个\
  \ PL/SQL API 完成的。每个 API 过程都使用 ILO，通过适当的模块和操作名称进行了插桩。\n\n遵循 Method R 的方法，第一步是确定最需要性能改进的任务。根据最终用户的反馈，相关任务通过模块名称`assignment`被确定。\n\
  \n因为代码已经用 ILO 进行了插桩，所以第二步的测量变得微不足道。当我们遇到性能问题时，无需添加任何调试或日志记录代码。我们使用 ILO 为`assignment`任务发出性能数据并开启扩展\
  \ SQL 跟踪。在负载测试中执行生产代码后，我们使用以下查询分析了由 ILO 提供的响应时间数据：\n\n```sql\nSELECT\n  ilo_module,\n\
  \  ilo_action,\n  SUM(elapsed_seconds)                                    total_duration,\n\
  \  AVG(elapsed_seconds)                                    avg_duration,\n  COUNT(*)\
  \                                                cnt\nFROM ilo_run_vw\nGROUP by\
  \ ilo_module,\n         ilo_action\nORDER BY SUM(elapsed_seconds) DESC;\n```\n\n\
  ```\n                                            TOTAL DURATION   AVG DURATION \
  \     \nILO_MODULE      ILO_ACTION                    (SECONDS)      (SECONDS) COUNT\n\
  --------------  ---------------------- -------------- -------------- -----\nassignment\
  \      SetLocationData              9.064287     0.09064287   100\nSetLocationData\
  \ get_device                   8.315280     0.08315280   100\nSetLocationData get_location\
  \                 0.502014     0.00502014   100\nSetLocationData update_location\
  \              0.036686     0.00036686   100\nSetLocationData insert_reservation\
  \           0.035895     0.00035895   100\nSetLocationData update_device       \
  \         0.034592     0.00034592   100\nSetLocationData merge_device          \
  \       0.031978     0.00031978   100\n```\n\n所提供的信息正是我们定位性能问题所需要的。在查询结果中，你可以看到`get_device`过程是响应时间的最大贡献者，在\
  \ 9 秒的`SetLocationData`任务中占了超过 8 秒。借助此任务的扩展 SQL 跟踪数据，生成了一个性能剖析，进而导向了该过程的`优化`。此处省略优化的细节，以强调该方法的重要性。\n\
  \n在许多情况下，检查执行时间的差异可能是一种强大的性能分析技术。`get_device`过程的响应时间是本案例中我们主要关注点，但如果这不是一个当前的性能问题呢？我们可以使用\
  \ Oracle 的统计分析函数来查找差异最大的任务，如下所示：\n\n```sql\nSELECT\n  ilo_module,\n  ilo_action,\n\
  \  VARIANCE(elapsed_seconds)                               variance,\n  STDDEV(elapsed_seconds)\
  \                                 standard_deviation,\n  ROUND(VARIANCE(elapsed_seconds)/AVG(elapsed_seconds),3)\
  \ variance_to_mean_ratio,\n  ROUND(STDDEV(elapsed_seconds)/AVG(elapsed_seconds),3)\
  \   coefficient_of_variation\nFROM ilo_run_vw\nGROUP by ilo_module,\n         ilo_action\n\
  ORDER BY 5 DESC, 3 DESC;\n```\n\n```\n                                         \
  \           STANDARD VARIANCE TO  COEFFICIENT\nILO_MODULE      ILO_ACTION      \
  \         VARIANCE  DEVIATION  MEAN RATIO OF VARIATION\n--------------  ----------------------\
  \ ---------- ---------- ----------- ------------\nSetLocationData get_location \
  \          0.00004253 0.00652182       0.008        1.299\nSetLocationData get_device\
  \             0.00033352 0.01826257       0.004        0.243\nassignment      SetLocationData\
  \        0.00013663 0.01168871       0.002        0.129\nSetLocationData update_location\
  \        5.8995E-09 0.00007680       0.000        0.209\nSetLocationData insert_reservation\
  \     5.3832E-09 0.00007337       0.000        0.204\nSetLocationData update_device\
  \          3.7374E-09 0.00006113       0.000        0.177\nSetLocationData merge_device\
  \           7.8088E-09 0.00008837       0.000        0.276\n```\n\n查询结果显示，`get_location`和`get_device`两者都具有较高的方差与均值比率(VMR)和变异系数。如果这些过程每次调用执行的工作量相同，那么响应时间的差异就是一个值得深究的问题。关于在性能问题诊断中统计分析技术的进一步解释，我强烈推荐\
  \ Robyn Sands 在*Expert Oracle Practices*（Apress，2010）一书第 13 章中的工作。她在其中解释了上述输出中所示的变异系数和方差与均值比率计算的重要性。\n\
  \n以下代码摘录只是生成上述 ILO 数据的应用程序中的一小部分样本。我将代码放在这里是为了更清楚地展示插桩的简洁性。\n\n```sql\nPROCEDURE\
  \ SetLocationData(…) IS\n-- code omitted  \n\nPROCEDURE get_location(…) IS\nBEGIN\n\
  \  ilo_wrapper.begin_task(module => 'assignment',\n                         action\
  \ => 'get_location',\n                         comment => 'P_ID=' || p_id || ' p_key='\
  \ || p_key);\n\n    -- code omitted\n\n    ilo_wrapper.end_task(widget_count =>\
  \ p_data_count);\n  EXCEPTION WHEN OTHERS THEN\n    ilo_wrapper.end_task(error_num\
  \ => SQLCODE);\n  END get_location;\n\n  PROCEDURE get_device() IS\n  BEGIN --get_device\n\
  \    ilo_wrapper.begin_task(module => 'assignment', action => 'get_device');\n\n\
  \    -- code omitted\n\n    ilo_wrapper.end_task;\n  EXCEPTION WHEN OTHERS THEN\n\
  \    ilo_wrapper.end_task(error_num => SQLCODE);\n  END get_device;\n\nilo_wrapper.end_task(error_num\
  \ => status_code, widget_count => v_cnt);\n\nEXCEPTION WHEN OTHERS THEN\n  ilo_wrapper.end_task(error_num\
  \ => SQLCODE);\nEND SetLocationData;\n```\n\n这里真正的关键点是，性能优化，尤其是插桩，需要在你开发过程中的思维方式里占据首要位置。通过对代码进行插桩，我们能够排除所有与问题无关的代码部分。了解真正的问题是解决方案中最首要也是最重要的一步。\n\
  \n![images](img/square.jpg) **提示** 注意，对 ILO 的调用被包裹在一个名为`ilo_wrapper`的特定于应用程序的包中。这是一个好主意。如果你使用\
  \ ILO 或任何其他外部库，将该代码抽象出来是合理的。如果 ILO 的 API 发生变化，那么只需要更改你的包装器包即可与之匹配。\n\n\n\n### 性能分析示例\n\
  \n在实践中，性能分析的过程是什么样的？这里有一个我在 SQL*Plus 中执行的示例，用来回答我之前提出的同一个问题：为什么程序 `p` 运行缓慢？这次我将使用\
  \ ILO 进行插桩，而不是使用 `DBMS_OUTPUT.PUT_LINE`。\n\n```sql\nCREATE OR REPLACE PROCEDURE\
  \ q AS\n  l_sqlcode NUMBER;\n  l_sqlerrm VARCHAR2(512);\nBEGIN\n  ilo_task.begin_task(module\
  \ => 'Procedure P',\n                      action => 'q');\n  FOR rec IN (SELECT\
  \ * FROM V$SESSION) LOOP\n    NULL;\n  END LOOP;\n  ilo_task.end_task;\nEXCEPTION\
  \ WHEN OTHERS THEN\n  l_sqlcode := SQLCODE;\n  l_sqlerrm := SQLERRM;\n  ilo_task.end_task(error_num\
  \ => l_sqlcode);\n  -- handle exceptions here\nEND;\n/\n```\n\n```sql\nCREATE OR\
  \ REPLACE PROCEDURE r AS\n  l_sqlcode NUMBER;\n  l_sqlerrm VARCHAR2(512);\nBEGIN\n\
  \  ilo_task.begin_task(module => 'Procedure P',\n                      action =>\
  \ 'r');\n  FOR rec IN (SELECT * FROM ALL_OBJECTS) LOOP\n    NULL;\n  END LOOP;\n\
  \  ilo_task.end_task;\nEXCEPTION WHEN OTHERS THEN\n  l_sqlcode := SQLCODE;\n  l_sqlerrm\
  \ := SQLERRM;\n  ilo_task.end_task(error_num => l_sqlcode);\n  -- handle exceptions\
  \ here\nEND;\n/\n```\n\n```sql\nCREATE OR REPLACE PROCEDURE s AS\n  l_sqlcode NUMBER;\n\
  \  l_sqlerrm VARCHAR2(512);\nBEGIN\n  ilo_task.begin_task(module => 'Procedure P',\n\
  \                      action => 's');\n  FOR rec IN (SELECT * FROM USER_TABLES)\
  \ LOOP\n    NULL;\n  END LOOP;\n  ilo_task.end_task;\nEXCEPTION WHEN OTHERS THEN\n\
  \  l_sqlcode := SQLCODE;\n  l_sqlerrm := SQLERRM;\n  ilo_task.end_task(error_num\
  \ => l_sqlcode);\n  -- handle exceptions here\nEND;\n/\n```\n\n```sql\nCREATE OR\
  \ REPLACE PROCEDURE p AS\n  l_sqlcode NUMBER;\n  l_sqlerrm VARCHAR2(512);\nBEGIN\n\
  \  ilo_task.begin_task(module => 'Month End Posting',\n                      action\
  \ => 'p');\n  q;\n  r;\n  s;\n  ilo_task.end_task;\nEXCEPTION WHEN OTHERS THEN\n\
  \  l_sqlcode := SQLCODE;\n  l_sqlerrm := SQLERRM;\n  ilo_task.end_task(error_num\
  \ => l_sqlcode);\n  -- handle exceptions here\n  raise;\nEND;\n/\n```\n\n```sql\n\
  DELETE FROM ilo_run WHERE ilo_module IN ('Month End Posting', 'Procedure P');\n\
  ```\n\n```sql\nEXEC ilo_timer.set_mark_all_tasks_interesting(true,true);\n```\n\n\
  ```sql\nEXEC p;\n```\n\n```sql\nEXEC ilo_timer.flush_ilo_runs;\n```\n\n```sql\n\
  set pages 1000\nCOLUMN ILO_MODULE FORMAT A20\nCOLUMN ILO_ACTION FORMAT A10\nSELECT\
  \ ILO_MODULE, ILO_ACTION, ELAPSED_SECONDS\nFROM ilo_run_vw WHERE ilo_module IN ('Month\
  \ End Posting', 'Procedure P') ORDER BY 3 DESC;\n```\n\n```\nILO_MODULE        \
  \   ILO_ACTION ELAPSED_SECONDS\n-------------------- ---------- ---------------\n\
  Month End Posting    p                 8.566376\nProcedure P          r        \
  \         8.418068\nProcedure P          s                  .135682\nProcedure P\
  \          q                  .005708\n```\n\nSQL*Plus 脚本中的查询结果精确地向我展示了时间花费在哪里，这些时间与每个业务任务相关联，并通过模块和操作名称来标识。查询结果是一个性能剖析（假设我知道过程之间的层次关系，并且第一行代表了通常显示在底部的总计行），因此我可以轻松地看出，如果我的目标是优化响应时间，那么过程\
  \ `r` 需要我的关注。\n\n除了将耗时信息存储在数据库中，ILO 还开启了扩展 SQL 跟踪，因此生成了一个跟踪文件。Oracle 的跟踪数据流允许我深入挖掘过程\
  \ `p`，查看构成响应时间的所有数据库和系统调用。由于模块和操作名称也会在跟踪文件中输出，我还能够专门深入挖掘仅对应于过程 `r` 的调用。\n\n首先，我想看看每个模块/操作对的时间都花在了哪里。对跟踪文件中的响应时间数据进行汇总，结果如下：\n\
  \n```\nModule:Action        DURATION       %  CALLS      MEAN       MIN       MAX\n\
  -------------------  --------  ------  -----  --------  --------  --------\nProcedure\
  \ P:r        8.332521   98.4%    545  0.015289  0.000000  1.968123\nProcedure P:s\
  \        0.132008    1.6%      4  0.033002  0.000000  0.132008\nProcedure P:q  \
  \      0.000000    0.0%     16  0.000000  0.000000  0.000000\nMonth End Posting:p\
  \  0.000000    0.0%     66  0.000000  0.000000  0.000000\nSQL*Plus:            0.000000\
  \    0.0%      2  0.000000  0.000000  0.000000\n-------------------  --------  ------\
  \  -----  --------  --------  --------\nTOTAL (5)            8.464529  100.0%  \
  \  633  0.013372  0.000000  1.968123\n```\n\n在这个性能剖析中，为父过程 `p` 显示的数据并不包含其任何子过程的响应时间贡献。跟踪文件中显示的总耗时约为\
  \ 8.46 秒。这与我的 ILO 查询中显示的值并不完全匹配，但这不成问题，因为这些数字足够接近我的分析。关于差异原因的更多信息，请参阅《**优化 Oracle\
  \ 性能**》（O'Reilly，2003 年）。\n\n![images](img/square.jpg) **注意** 在此示例中，我使用了 Method\
  \ R 公司销售的 MR Tools 套件中的 `mrskew` 来生成汇总信息。Oracle 的 `tkprof` 和 Trace Analyzer 工具确实提供了一些聚合功能，但它们无法提供您所需的性能剖析。\n\
  \n接下来，我想看看在仅执行过程 `r` 时的时间花费情况。为此，我将深入挖掘跟踪文件数据，仅汇总模块和操作分别设置为 Month End Posting 和\
  \ `r` 时执行的调用：\n\n```\nCall        DURATION       %  CALLS      MEAN       MIN  \
  \     MAX\n----------  --------  ------  -----  --------  --------  --------\nFETCH\
  \       8.332521  100.0%    542  0.015374  0.000000  1.968123\nPARSE       0.000000\
  \    0.0%      1  0.000000  0.000000  0.000000\nCLOSE       0.000000    0.0%   \
  \   1  0.000000  0.000000  0.000000\nEXEC        0.000000    0.0%      1  0.000000\
  \  0.000000  0.000000\n----------  --------  ------  -----  --------  -------- \
  \ --------\nTOTAL (4)   8.332521  100.0%    545  0.015289  0.000000  1.968123\n\
  ```\n\n现在我清楚地看到数据库在花费的 8.33 秒期间做了什么。所有时间都花费在了 `FETCH` 数据库调用上。这并不奇怪，因为 `r` 所做的就是执行一个对\
  \ `ALL_OBJECTS` 的单一查询。但它的价值依然存在——我知道时间花在了哪里。但跟踪文件包含的详细信息远不止于此，因此进一步深入挖掘可以提供有价值的洞察。我想知道跟踪文件中的哪些行对我的过程\
  \ `r` 贡献了最大的时间。所有的 `FETCH` 调用持续时间都相同吗？以下是该问题的答案（同样由 `mrskew` 提供）：\n\n```\nLine Number\
  \  DURATION       %  CALLS      MEAN       MIN       MAX\n-----------  --------\
  \  ------  -----  --------  --------  --------\n       4231  1.968123   23.6%  \
  \    1  1.968123  1.968123  1.968123\n       2689  0.380023    4.6%      1  0.380023\
  \  0.380023  0.380023\n       4212  0.316020    3.8%      1  0.316020  0.316020\
  \  0.316020\n       4233  0.304019    3.6%      1  0.304019  0.304019  0.304019\n\
  \       2695  0.156010    1.9%      1  0.156010  0.156010  0.156010\n        281\
  \  0.144009    1.7%      1  0.144009  0.144009  0.144009\n        362  0.100007\
  \    1.2%      1  0.100007  0.100007  0.100007\n        879  0.064004    0.8%  \
  \    1  0.064004  0.064004  0.064004\n       1348  0.056003    0.7%      1  0.056003\
  \  0.056003  0.056003\n       2473  0.052003    0.6%      1  0.052003  0.052003\
  \  0.052003\n 532 others  4.792300   57.5%    532  0.009008  0.000000  0.044003\n\
  -----------  --------  ------  -----  --------  --------  --------\nTOTAL (542)\
  \  8.332521  100.0%    542  0.015374  0.000000  1.968123\n```\n\n\n事实上，所有的 `FETCH`\
  \ 调用并非具有相同的持续时间。在跟踪文件第 4231 行的那个单独的 `FETCH` 调用，几乎占用了 8.33 秒总响应时间的 24%。仪表化和性能分析使我能够精确地深入定位需要优化软件的代码位置。在这个经过简化的示例中，优化过程\
  \ `r` 就意味着优化查询 `SELECT * FROM ALL_OBJECTS`。这个例子中较长的 `FETCH` 调用是递归 SQL 导致的一个异常情况，但它很好地展示了这种方法。\n\
  \n### 总结\n\n在软件开发生命周期中，你应该像对待任何其他软件语言一样，遵循相同的规范来对待 PL/SQL——尤其是仪表化这一规范。为了编写出快速的代码，并确保其在应用程序的整个生命周期中持续保持快速，你必须在开发期间对代码进行正确的仪表化。用于底层调试和性能分析的工具在开发期间是存在且有用的，但它们并不太适合在生产环境中使用。\n\
  \n当生产环境中出现性能问题时，分析师需要快速找出对响应时间贡献最大的代码区域。正确的仪表化将为性能分析提供数据，清晰地展示这些信息，从而成功地分析和解决问题。当你能够生成实际运行代码的性能分析，并清晰地指出花费时间最多的代码部分时，你就可以\
  \ `知道` 你正在衡量正确的指标，并且采用了正确的方式进行仪表化。向你的代码中添加良好的仪表化并不困难，而 Oracle 的仪表化库 `ILO` 能让你轻松完成这项工作。\n\
  \n## 第 14 章：编码规范与错误处理\n\n**作者：Stephan Petit**\n\n你能同时穿晚礼服和勃肯鞋吗？是的，可以！任何在粒子物理实验室待过一段时间的人都知道这在技术上是可能的。然而，有人可能会说这样的穿着有悖于优雅的惯例。你也可能喜欢将绿色和蓝色衣服搭配在一起。（我个人更喜欢混搭红色和黑色）。关于各自的品味，我们可以无休止地争论：每个人都对；每个人都错。与此同时，无论成文与否，规范都有助于共同生活和协作。它们有自己的历史和原因。\n\
  \n编写代码通常很有趣，我们都希望它尽可能好：执行效率高、结构紧凑，如果可能的话，还要有风格。但我们通常不只是为了自己而写代码。如果你曾经为了详细了解某段代码的功能、调试它或修改它，而去阅读别人写的代码，你可能想过“嗯，我不会那样做。”它能运行，但可能很难理解——就像听一个带着浓重口音的表亲说话一样。本章的目标是提出一种编写\
  \ PL/SQL 的方法。我将首先讨论编码规范的优势，然后提出具体的格式规范。接着，我会讨论错误处理，并提供错误处理规范的示例。最后，你会找到一个模板，总结了本章概述的规范。\n\
  \n![images](img/square.jpg) **注意** 我绝不声称我所概述的规范是唯一可行的，但它们在我日常工作中已证明是高效的。我认为理解每个规范的原因，并看到一种方法相对于另一种方法的好处，是很重要的。\n\
  \n### 为何需要编码规范？\n\n为什么要费这个事？我们真的需要编码规范吗？让每个人自由发挥自己的艺术天赋，在变量命名、循环缩进等方面任其发挥，岂不是更好？这种自由听起来很诱人，但这是通往毁灭的道路——或者至少是导致你无法按时回家吃饭，因为你被困在办公室调试某些难以理解的代码。以下是建立结构并遵守一套良好规则所带来的好处：\n\
  \n> **快速理解**：遵循规范编写的代码更易于阅读，因此阅读速度更快。只需稍加练习，读者的眼睛就能立即识别代码中的模式。结构清晰可见，各种元素类型和逻辑块变得显而易见。它还有一个优势，就是能最大限度地减少误解的可能性。说“我喜欢巧克力”比说“我不否认我不讨厌巧克力”要好，即使两句话意思相同。\n\
  >\n> **可靠性**：一旦你的代码完成，让同事审阅一下以找出可能的错误、不一致之处，并确保其逻辑清晰，是件好事。易于阅读和理解的代码能够得到更好的审阅，因此可能更可靠。根据我的经验，我知道当同事知道阅读我的代码不会因为它是我的古怪风格的体现而成为一种痛苦时，也更容易为我的工作找到审阅者。\n\
  >\n> **可维护性**：随着时间的推移维护代码是一项挑战。当你几个月后重新审视自己的代码时，你可能会发现连自己的代码都难以理解。当整个软件包是由多人编写时，情况会更糟。确保在系统生命周期内使用统一的风格，对于维护工作大有裨益。\n\
  >\n> **安全性**：编码规范可以提升系统的安全水平。例如，系统地使用绑定变量可以抵御代码注入威胁。这一点将在后续段落中更详细地描述。\n>\n> **可培训性**：当负责一个系统的团队中几乎每年有一半成员更换时，尽快培训每一位新成员至关重要。当每个人都使用相同的方式表达时，培训会更快。新成员可能不愿意学习一种他/她已经掌握的语言的新使用方式。要敢于推行整个团队使用的标准，并在可能的情况下，让新成员参与现有模块的开发。随处都能发现相同的编码风格，这很快会显现为一个优势。\n\
  >\n> **编码速度**：为什么每次开始编写新模块时都要重新发明轮子？使用编码规范可以消除你可能会问自己的一些关于代码风格的问题。例如，在修改现有过程时，应该遵循原作者的风格，还是应该使用自己的风格？当每个人都使用相同的风格时，这种困境就消失了。\n\
  >\n> **错误处理**：确保所有错误都能被优雅地捕获并正确处理，是交付优秀软件的另一个棘手部分。因此，拥有系统化的错误处理方法和标准化的错误报告方式非常重要。编码规范可以为软件编程的这一方面提供强大的解决方案。\n\
  \n### 格式\n\n让我们首先看一下关于代码实际格式的详细规范。格式化是那些挑剔的人更偏好的规范的一个方面。敢于挑剔。遵循一些简单的规则可以使代码更易于阅读、重用和维护。\n\
  \n以下部分描述了一些多年来对我行之有效的格式规则。我遵循它们。我的团队也遵循它们。不过，请不要将它们奉为金科玉律。请随意采纳或调整它们，甚至发明你自己的！重要的是，大家步调一致。\n\
  \n#### 大小写\n\n对所有 SQL 和 PL/SQL 关键字、过程名、函数名、异常名和常量名使用大写。\n\n对 `变量`、注释、`表名` 和 `列名`\
  \ 使用小写。\n\n\n"
- "# 注释\n\n在代码中插入注释有两种方式：以 `--` 开头的单行注释，或用 `/*` 和 `*/` 包裹的整段注释块。我决定使用 `--` 语法。我认为它能很好地突显文本本身，因此你无需寻找注释的起始和结束位置。此外，它还具有一些技术优势：即使代码块中包含一些注释（以\
  \ `--` 开头），你仍然可以使用 `/*`... `*/` 来为调试目的而注释掉整块代码，而如果代码本身使用的是 `/*`... `*/` 语法，则无法做到这一点。它稍微繁琐一些，但可能非常方便。由你选择。有任何疑问吗？\n\
  \n以下是我如何在代码块中添加注释的示例：\n\n```\nl_book_author := NULL; -- 我确保此变量中没有旧值\n\nIF l_book_id\
  \ < 0 THEN\n  -- 除非书籍丢失，否则不应发生此情况。\n  -- 继续检查丢失书籍列表。\n  ...\nEND IF;\n```\n\n![images](img/square.jpg)\
  \ **注意** 尽可能多地使用注释！今天对你显而易见的事情，明天对其他人（甚至对你自己）来说可能难以理解。\n\n### 比较运算符\n\n使用 `<>` 而不是\
  \ `!=`。`<>` 语法可以避免在快速阅读时与 `=` 混淆。\n\n"
- "# 缩进\n\n如果说有什么编程话题能引起争议，那很可能是如何缩进代码的问题。所有语言的程序员几十年来一直就此争论不休。COBOL 程序员可能最轻松。至少在他们的语言中，许多关键的缩进是由语言规范规定的。\n\
  \n以下部分讨论了缩写 PL/SQL 代码的特定方面。总体目标是便于阅读代码并直观地识别逻辑块。我选择使用两个空格。有一点：避免使用制表符（tab），因为不同的软件开发环境和打印机会以不同的方式解释它们。\n\
  \n### 通用缩进\n\n使用两个空格表示一个代码块是另一个代码块的子块，如下所示：\n\n```\nBEGIN\n  l_author := 'Pierre\
  \ Boulle';\n  IF p_book_id = 123456 THEN\n    FOR l_counter IN 1..100 LOOP\n   \
  \   ...\n    END LOOP;\n  END IF;\nEXCEPTION\n  WHEN NO_DATA_FOUND THEN\n    --\
  \ 处理此错误\n    ...\nEND;\n```\n\n### Select 语句\n\n每个查询列占一行，每个变量占一行，语句的每个元素占一行。这种方法会占用一些空间，但便于阅读和理解整个语句。参见以下示例中对齐各种项目的有用方法：\n\
  \n```\nSELECT editor\n      ,publication_date\n  FROM books\nWHERE book_id = 12345\n\
  \   OR (book_title      = 'Planet of the Apes'\n       AND book_author = 'Pierre\
  \ Boulle'\n      );\n```\n\n![images](img/square.jpg) **注意** 此示例还展示了如何对齐括号以清楚地显示其起始和结束位置。也请注意等号（或者当编码变成绘画时！）的微妙对齐。\n\
  \n此示例展示了如何使用表别名：\n\n```\nSELECT b1.book_title\n      ,b1.book_id\n      ,b2.book_id\n\
  \  FROM books b1\n      ,books b2\n WHERE b1.book_title = b2.book_title\n   AND\
  \ b1.book_id <> b2.book_id;\n```\n\n### Insert 语句\n\n每个列占一行，每个值占一行。始终指明列名以避免歧义。此示例展示了如何对齐：\n\
  \n```\nINSERT INTO books (\n            book_id\n           ,title\n           ,author\n\
  \           )\n    VALUES (\n            12345\n           ,'Planet of the Apes'\n\
  \           ,'Pierre Boulle'\n           );\n```\n\n### Update 和 Delete 语句\n\n它们看起来非常相似。每个列和值占一行，语句的每个元素占一行。\n\
  \n```\nUPDATE books\n   SET publication_year = 1963\nWHERE book_id = 12345;\n```\n\
  \n```\nDELETE FROM books\n WHERE book_id = 12345;\n```\n\n### If 语句\n\n每个元素占一行。为了更好地阅读，在\
  \ `END IF` 关键字后添加注释很有用，特别是当它与匹配的 `IF` 之间间隔了许多行时。以下是一系列 `IF` 块的示例：\n\n```\nIF l_var\
  \ IS NULL THEN\n  ...\nELSE\n  IF l_var > 0 AND l_var < 100 THEN\n    ...\n\n  ELSE\n\
  \    ...\n  END IF; -- l_var 在 0 和 100 之间\nEND IF; -- l_var 为空\n```\n\n![images](img/square.jpg)\
  \ **注意** 在 `IF` 块中，确保你始终有一个 `ELSE` 部分，以避免未处理的情况，除非你确信根本无需做任何事情。那么，写一个简短的注释是件好事，只是为了记住\
  \ `ELSE` 并非被纯粹地遗忘。未显式处理的情况可能会使你的应用程序行为异常且难以调试。\n\n### Case 语句\n\n每个元素占一行，如下所示：\n\
  \n```\nCASE l_var\n  WHEN value_1 THEN\n    -- 解释\n    ...\n  WHEN value_2 THEN\n\
  \    -- 解释\n    ...\n  ELSE\n    -- 解释\n    ...\nEND CASE;\n```\n\n### 游标\n\n使用小写命名游标，并使用后缀\
  \ *_cursor*。注意关键字在左侧的对齐方式，如前面的示例所示，这提高了语句的可读性。\n\n```\nCURSOR books_cursor IS\n\
  \  SELECT book_id\n        ,title\n    FROM books\n   WHERE registration_date >=\
  \ TO_DATE('1971-01-01', 'YYYY-MM-DD')\n   ORDER BY title;\n```\n\n### For…loop 语句\n\
  \n使用 *l_* 前缀命名循环中使用的变量。当循环遍历游标时，使用游标的名称和后缀 *_rec*。这样在阅读代码时，更容易理解值的来源，如此示例所示：\n\n\
  ```\nFOR l_book_rec IN books_cursor LOOP\n  FOR l_counter IN 1..100 LOOP\n    ...\n\
  \  END LOOP; -- 计数器\n  ...\nEND LOOP; -- 书籍列表\n```\n\n### 字符串拼接\n\n每个被拼接的元素占一行。这样更易于阅读和修改。由多个部分构建字符串如下所示：\n\
  \n```\nl_text := 'Today, we are '||TO_DATE(SYSDATE, 'YYYY-MM-DD')\n            \
  \              ||' and the time is '\n                          ||TO_DATE(SYSDATE,\
  \ 'HH24:MI')\n                          ;\n```\n\n\n\n### 动态代码\n\n动态 SQL 可能为 SQL\
  \ 或语句注入敞开大门。使用编码模板有助于强制使用绑定变量，这是应对此类威胁的解决方案之一。下面的示例展示了通过拼接字符串（其中一个是最终用户提供的，例如作为参数）来构建并执行语句可能存在危险。\n\
  \n假设有一个在图书馆注册图书预约的模块。它可能包含一些动态代码，例如因为数据要插入的表取决于图书的类型。它可能如下所示：\n\n```sql\nl_statement\
  \ := 'BEGIN'\n             ||'  INSERT INTO book_reservations ('\n             ||'\
  \              res_date'\n             ||'             ,res_book_id'\n         \
  \    ||'              )'\n             ||'      VALUES ('\n             ||     \
  \          SYSDATE\n             ||'             ,'\n             ||           \
  \    p_book_id\n             ||'             );'\n             ||'END;'\n      \
  \       ;\nEXECUTE IMMEDIATE l_statement;\n```\n\n系统只是要求用户输入请求的图书 ID。对于一个善意且规范的用户，生成的语句将如下所示，其中\
  \ \"123456\" 是给定的输入：\n\n```sql\nBEGIN\n  INSERT INTO book_reservations (\n     \
  \         res_date\n             ,res_book_id\n              )\n\n      VALUES (\n\
  \              SYSDATE\n             ,123456\n              );\nEND;\n```\n\n但是，如果最终用户怀有恶意，他或她可以利用相同的输入注入恶意代码。输入\
  \ \"123456); delete from books where (1=1\"，生成的语句就变成了这样：\n\n```sql\nBEGIN\n  INSERT\
  \ INTO book_reservations (\n              res_date\n             ,res_book_id\n\
  \              )\n      VALUES (\n              SYSDATE\n             ,123456\n\
  \              );\n  DELETE FROM books where (1=1);\nEND;\n```\n\n那么要执行的操作就会由两条语句组成：一条无害的语句，后面跟着一条清空表的极其恶意的指令。\n\
  \n以下是使用绑定变量重写的代码。使用绑定变量可以防止任何用户输入的字符串被解释为语句本身的一部分。SQL 或语句注入的风险得以消除。\n\n```sql\n\
  l_statement := 'BEGIN'\n             ||'  INSERT INTO book_reservations ('\n   \
  \          ||'              res_date'\n             ||'             ,res_book_id'\n\
  \             ||'              )'\n             ||'      VALUES (:p_date'\n    \
  \         ||'             ,:p_book_id'\n             ||'             );'\n     \
  \        ||'END;'\n             ;\nEXECUTE IMMEDIATE l_statement\n  USING IN SYSDATE\n\
  \       ,IN p_requested_book_id\n       ;\n```\n\n### 包\n\n尽管可以在数据库中编译独立的存储过程和函数，但在一个庞大、扁平的列表中搜索单个模块很快会变成一场噩梦。相反，使用包（package）按语义字段或用途对过程和函数进行分组。扫描一个命名正确且很可能包含你所需内容的包，比扫描整个方案中所有函数和过程的列表要快得多。\n\
  \n将直接处理数据的 `内核` 包与负责 `用户界面` 的包分开。这不仅有助于管理和使用，还能让你精细调整执行权限，例如对接口包拥有广泛访问权限，对用作 API\
  \ 的内核包拥有更受限的访问权限，而对应用程序的核心部分则完全没有访问权限。\n\n使用大写字母（避免使用双引号包围对象名，使其区分大小写）和有意义的名称来命名你的包。使用前缀来指示包包含的模块类型。例如，你可以使用以下前缀：\n\
  \n> `KNL_` 用于包含内核模块的包。\n> \n> `GUI_` 用于包含处理用户界面的模块的包。\n\n你的包名可能如下所示：\n\n> `PACKAGE\
  \ KNL_BOOKS;` 用于包含处理图书的模块的包。\n> \n> `PACKAGE GUI_LIBRARY;` 用于包含处理图书馆用户界面的模块的包。\n\
  \n### 存储过程\n\n存储过程（独立的或在包中的）应被视为执行给定任务的黑盒子。术语“黑盒子”意味着它们应该能处理任何类型的输入（有效或无效的），然后完成其工作，或者在出错时使数据库保持与调用时相同的状态。通常你希望过程能报告在完成工作的过程中遇到的任何问题。\n\
  \n最好让一个过程专注于一项单一任务。这是应用程序良好模块化的基础。拥有多个可以当作基础构件来使用和重用的小模块，比拥有少数庞大而笨重、难以重用的大模块要好。\n\
  \n不同类型的任务可以分离如下：检索记录、检查信息、插入或修改数据，由内核或 API 包处理；为用户界面生成显示内容，由接口包处理。\n\n接下来，我将向你展示一种根据存储过程所执行的任务类型为其命名的方法。这种过程命名策略，结合包分离命名策略，将确保源代码更易于理解。此外，它还可以作为良好模块化的指南。\n\
  \n#### 命名\n\n使用大写字母和有意义的名称。使用一个表示过程类型的前缀（这里的 `$` 符号是一个装饰性元素，用于在视觉上与包名区分开，并将类型前缀与名称分开）。例如，以下是一些前缀示例：\n\
  \n> `CHK$` 用于检查数据的过程。\n> \n> `GET$` 用于从数据库检索信息或进行计算的过程。\n> \n> `EXE$` 用于插入、修改或删除数据的过程。\n\
  > \n> `DSP$` 用于在用户界面中显示信息的过程。\n\n以下是一些使用上述前缀列表开发的实际过程名称：\n\n> `PROCEDURE CHK$BOOK_AVAILABITLIY;`\
  \ 用于检查图书可用性的过程。\n> \n> `PROCEDURE GET$BOOK_AUTHOR;` 用于检索图书作者的过程。\n> \n> `PROCEDURE\
  \ EXE$STORE_BOOK;` 用于存储图书数据的过程。\n> \n> `PROCEDURE DSP$BOOK_INFO;` 用于在用户界面中显示图书信息的过程。\n\
  \n同时，养成在声明结束的 `END` 之后添加一个重复过程名称的注释的习惯。这样做可以简化阅读包含长模块列表的包的任务，正如你在这里看到的：\n\n```sql\n\
  PROCEDURE CHK$TITLE_LENGTH (\n                      p_title                    \
  \  IN          VARCHAR2\n                     ) IS\nBEGIN\n  ...\nEND; -- CHK$TITLE_LENGTH\n\
  ```\n\n\n\n## 参数\n\n使用小写字母并以 `p_` 为前缀来命名参数。这样可以更容易地将其与过程体内的局部变量区分开来。每个参数占用一行，并且名称、输入/输出属性、类型和默认赋值值之间保持固定的间距，如下所示：\n\
  \n```sql\nPROCEDURE GET$BOOK_AUTHOR (\n                      p_book_id         \
  \     IN      NUMBER   := NULL\n                    , p_book_title           IN\
  \      VARCHAR2 := NULL\n                    , p_author               OUT     VARCHAR2\n\
  \                    );\n```\n\n请注意，每个参数使用一行使得代码易于阅读。在必要时添加或删除一个参数也很容易，特别是当逗号位于每行的开头时。\n\
  \n![images](img/square.jpg) `注意` 我还建议您将默认参数值指定为 `NULL`。否则，很难确定某个参数值是实际传递的，还是保留了其默认值。如果一个参数的默认值是\
  \ `X`，并且在给定的过程调用中传递的值也确实是 `X`，您的代码将无法知道该值 `X` 是传递给了过程，还是参数使用了默认值。如果您确实需要一个非空的默认值，在使用该参数时，总会有时间使用一个好用的\
  \ `NVL` 函数。\n\n## 调用\n\n始终在过程名前加上其包名，即使在同一个包内调用过程也是如此。这有助于阅读和调试，并将代码片段重新定位到另一个包中变得轻而易举。\n\
  \n始终使用 `=>` 语法来传递参数值。每行列出一个参数值。`=>` 语法使调用在参数顺序方面清晰无误；每个参数接收到它预期接收的值。此外，该语法在调用重载模块（有些人称之为多态模块）时也避免了任何歧义。这是一个例子：\n\
  \n```sql\nKNL_BOOKS.GET$BOOK_AUTHOR (\n                      p_book_id    => 123456\n\
  \                    , p_author     => l_author\n                    );\n```\n\n\
  ## 局部变量\n\n使用小写字母并以 `l_` 为前缀来命名局部变量。这样可以更容易地将其与过程体内的参数区分开来。每个声明占用一行，名称和类型之间保持固定的间距，如下所示：\n\
  \n```sql\nl_author                                                VARCHAR2(50);\n\
  ```\n\n## 常量\n\n使用大写字母并以 `C_` 为前缀来命名您的常量，如下所示：\n\n```sql\nC_TITLE_HEADER       \
  \                                   CONSTANT VARCHAR2(50) := 'Title';\n```\n\n当某个值（字符串或数字）在代码中多次使用时，立即创建一个常量。换句话说，避免使用硬编码的值。使用常量代替多次出现的硬编码值可以避免拼写错误以及花费数小时试图理解模块行为不如预期的原因。例如，假设您想检查用户界面中是否按下了某个按钮。为按钮名称使用一个常量并用于检查被点击的内容，可以确保界面和应用程序行为之间的一致性。这是一个例子：\n\
  \n```sql\nIF p_button = 'Ok' THEN -- 糟糕的做法，如果按钮的名称是 'OK'（大写）\n```\n\n```sql\nC_OK_BUTTON\
  \                                        CONSTANT VARCHAR2(50) := 'OK';\nIF p_button\
  \ = C_OK_BUTTON THEN -- 好得多！\n```\n\n![images](img/square.jpg) `注意` 为常量字符串指定过短的长度（例如\
  \ `VARCHAR2(1) := 'Hello'`）是可能的，且不会触发编译错误。该错误只有在调用给定的常量时才会发生。调试这一点非常困难，因为问题的根源不在任何模块的主体中。因此，我总是为常量字符串声明一个足够长的长度，比如\
  \ 50，即使对于非常短的值也是如此（`VARCHAR2(50) := 'Y'`）。\n\n## 类型\n\n使用大写字母并以 `T_` 为前缀来命名您的类型，如下所示：\n\
  \n```sql\nTYPE T_SEARCH_RESULT IS TABLE OF NUMBER\n     INDEX BY BINARY_INTEGER;\n\
  ```\n\n## 全局变量\n\n使用小写字母并以 `g_` 为前缀来命名全局变量，如下例所示：\n\n```sql\ng_book_record     \
  \                                     BOOKS%ROWTYPE;\n```\n\n## 局部过程和函数\n\n可以声明属于给定过程局部的过程或函数。在其名称中使用大写字母并以\
  \ `LOCAL$` 为前缀。一个局部过程看起来像这样：\n\n```sql\nPROCEDURE KNL$REGISTER_AUTHOR (\n      \
  \                   p_name                       IN      VARCHAR2\n            \
  \            ) IS\n\n  PROCEDURE LOCAL$COMPUTE_CODE_NAME(\n                    \
  \     p_local_name                 IN      VARCHAR2\n                        ) IS\n\
  \  BEGIN\n    ...\n  END; -- LOCAL$COMPUTE_CODE_NAME\n\n  l_code_name          \
  \                                   VARCHAR2(80);\n\nBEGIN\n      l_code_name :=\
  \ LOCAL$COMPUTE_CODE_NAME(\n                         p_local_name => p_name\n  \
  \                      );\n  ...\n    END; -- KNL$REGISTER_AUTHOR\n```\n\n## 过程元数据\n\
  \n即使您使用软件版本管理工具（如 Subversion），在源代码中保留一些日期和姓名也可能是有用的。其他代码内文档也很有帮助。我建议在每个模块声明之前添加一个注释块，如下所示。记录谁进行了什么更改以及出于什么原因，可以在修改模块时提供帮助。它也作为系统技术文档的一部分。\n\
  \n```sql\n/*-----------------------------------------------------------------------*/\n\
  /*                                                                       */\n/*\
  \ 模块     : MODULE_NAME                                                */\n/* 目标\
  \     : 模块的简要描述。                                           */\n/* 关键词   : 描述模块功能的一些关键词。\
  \                                 */\n/*                                       \
  \                                */\n/*-----------------------------------------------------------------------*/\n\
  /* 描述:                                                                 */\n/*  \
  \                                                                     */\n/* 模块的详细描述：其目标。\
  \                                              */\n/* 关于参数（输入和输出）的解释。          \
  \                              */\n/* 过程如何工作，“技巧”等。                            \
  \                  */\n/*                                                      \
  \                 */\n/*-----------------------------------------------------------------------*/\n\
  /* 历史:                                                                 */\n/*  \
  \                                                                     */\n/* YYYY-MM-DD\
  \ : 名和姓 - 创建。                                         */\n/*                   \
  \                                                    */\n/* YYYY-MM-DD : 名和姓 - 审查。\
  \                                         */\n/*                               \
  \                                        */\n/* YYYY-MM-DD : 名和姓               \
  \                                   */\n/*              修改描述。                  \
  \                             */\n/*                                           \
  \                            */\n/*-----------------------------------------------------------------------*/\n\
  ```\n\n## 函数\n\n我的函数编码约定与过程相同。只有命名方式不同。我使用前缀 `STF$`（代表存储函数）来命名我的函数，如下所示：\n\n```sql\n\
  FUNCTION STF$IS_BOOK_AVAILABLE (\n                      p_book_id              IN\
  \      NUMBER\n                    ) RETURN BOOLEAN;\n```\n\n函数通常设计为返回单个值。定义一个表示出错的常量可能很有用。请注意，函数也可以有\
  \ `OUT` 参数，但我认为这混淆了函数与过程的角色。因此，我通常将函数的使用限制在非常安全的过程或绝对需要它们的情况。\n\n\n### 错误处理\n\n\
  健壮、可维护且可扩展的软件的关键要素之一是模块化和避免逻辑重复。一个强大的系统依赖于一系列基本的构件，每个构件都具有独特的功能。将这些构件组合在一起，便能实现更复杂的功能。如果一个模块失败，它不应导致调用它的模块崩溃。因此，错误处理的第一步是创建一个隔离舱，旨在防止任何损害扩散到失败的程序之外。第二步是向调用者报告此错误，以便其能被妥善处理并安全地传播到最高层级。第三步是确保在错误发生后系统状态保持一致；换句话说，就是没有操作被部分执行。\n\
  \n#### 错误捕获\n\nPL/SQL 拥有一个强大的错误捕获机制，其形式为 `异常`。其中适用范围最广的是 `OTHERS`。正如其名，它旨在捕获所有未被其他方式捕获的错误。我强烈建议使用针对\
  \ `OTHERS` 的异常处理器来保护所有存储过程。这样做有机会记录或输出任何有价值的调试信息，例如哪个模块在哪些参数值下失败。这虽不能阻止应用程序崩溃，但你将知晓问题发生的位置和方式。更多细节请参见“错误报告”部分。\n\
  \n如果需要添加用户自定义异常，请使用大写字母、有意义的名称以及前缀 `L_*`。如果你愿意，也可以使用不同的前缀。我个人的约定是使用 `L_*`。\n\n以下是一个展示我典型错误处理逻辑结构的框架过程：\n\
  \n```\nPROCEDURE GET$BOOK_AUTHOR (\n                   p_book_id              IN\
  \      NUMBER   := NULL\n                  ,p_book_title           IN      VARCHAR2\
  \ := NULL\n                  ,p_author                  OUT  VARCHAR2\n        \
  \          ) IS\n\n  L_MY_EXCEPTION                                EXCEPTION;\n\n\
  BEGIN\n   ...\nEXCEPTION\n  WHEN L_MY_EXCEPTION THEN\n    -- 特定错误的处理\n    ...\n\
  \  WHEN OTHERS THEN\n    -- 通用错误的处理\n    ...\nEND; -- GET$BOOK_AUTHOR\n```\n\n此外，虽然这本身不是编码约定，但请务必考虑检查所有输入参数。至少要确保不要完全信任它们。仅仅因为一个模块有一个名为\
  \ `p_book_id` 的参数，并不意味着传递给该参数的值总是一个有效的书籍 ID。\n\n#### 错误报告\n\n一旦你建立了一个模块系统，你就会希望在其中一个模块失败时能够知晓，以便正确处理问题。传输错误信息对于构建稳定的架构至关重要。\n\
  \n错误信息可以有两个方面：一个面向机器，一个面向人类。面向机器的错误信息基于易于解释的代码，例如 `(ORA-)01403` 代表“未找到数据”。面向人类的错误信息则基于解释特定错误的明文。我建议在特定表中创建你自己的错误集（代码和解释）。让你的错误特定于你的应用程序。例如，创建一条诸如“没有此标题的书籍”的消息，并将其与你选择的代码关联。这样的错误列表对程序员和最终用户都很有用。确保你的消息清晰且友好。\n\
  \n为了将错误从一个模块传播到另一个模块，我使用两个名为 `p_exitcode` 和 `p_exittext` 的输出参数。第一个用于机器；第二个用于人类。我确保在我编写的每一个存储过程中都存在这些参数。按照约定，退出代码等于\
  \ `0` 表示过程执行顺利。不同于 `0` 的代码表示发生了错误，其中的代码数字指示了具体是哪种错误。\n\n一旦检测到问题就立即停止执行；继续下去不值得。你可能想使用一个名为\
  \ `L_PB_FATAL` 的通用异常（代表 *Local Problem Fatal*，但你可以选择任何戏剧性的名称），只要没有理由继续，就引发此异常。\n\
  \n以下是上一节中过程框架的增强版本。此版本的框架实现了我刚才描述的附加参数以及异常。\n\n```\nPROCEDURE GET$BOOK_AUTHOR (\n\
  \                   p_book_id              IN      NUMBER   := NULL\n          \
  \        ,p_book_title           IN      VARCHAR2 := NULL\n                  ,p_author\
  \                  OUT  VARCHAR2\n                  ,p_exitcode                \
  \ OUT  NUMBER\n                  ,p_exittext                 OUT  VARCHAR2\n   \
  \               ) IS\n\n  L_PB_FATAL                                  EXCEPTION;\n\
  \nBEGIN\n  -- 初始化\n  p_exitcode := 0;\n  p_exittext := NULL;\n  ...\nEXCEPTION\n\
  \  WHEN L_PB_FATAL THEN\n    IF p_exitcode = 0 THEN -- 避免遗留值\n      p_exitcode :=\
  \ -1;    -- 返回非零值表示错误\n    END IF;\n  WHEN OTHERS THEN\n    p_exitcode := SQLCODE;\n\
  \    p_exittext := SUBSTR('Error in GET$BOOK_AUTHOR: '||SQLERRM, 1, 500);\nEND;\
  \ -- GET$BOOK_AUTHOR\n```\n\n任何调用遵循此框架所示约定的程序，都应随后检查退出代码，并在出现问题时采取适当行动。然后，你可以决定是采取适当的紧急措施，还是停止执行并使用相同机制传播错误，如下所示：\n\
  \n```\nPROCEDURE GET$BOOK_DATA (\n                   p_book_id              IN \
  \     NUMBER\n                  ,p_book_author              OUT  VARCHAR2\n    \
  \              ,p_book_editor              OUT  VARCHAR2\n                  ,p_exitcode\
  \                 OUT  NUMBER\n                  ,p_exittext                 OUT\
  \  VARCHAR2\n                  ) IS\n\n  L_PB_FATAL                            \
  \      EXCEPTION;\n\nBEGIN\n  -- 初始化\n  p_exitcode := 0;\n  p_exittext := NULL;\n\
  \n  -- 获取书籍的作者\n  KNL_BOOKS.GET$BOOK_AUTHOR (\n                   p_book_id  =>\
  \ p_book_id\n                  ,p_author   => p_book_author\n                  ,p_exitcode\
  \ => p_exitcode  -- 错误代码和文本的值\n                  ,p_exittext => p_exittext  -- 传播给调用者\n\
  \                  );\n  IF p_exitcode <> 0 THEN\n    RAISE L_PB_FATAL;\n  END IF;\n\
  \n  -- 获取书籍的编辑者\n  KNL_BOOKS.GET$BOOK_EDITOR (\n  ...    \nEXCEPTION\n  WHEN L_PB_FATAL\
  \ THEN\n    IF p_exitcode = 0 THEN -- 避免遗留值\n      p_exitcode := -1;    -- 返回非零值表示错误\n\
  \    END IF;\n  WHEN OTHERS THEN\n    p_exitcode := SQLCODE;\n    p_exittext :=\
  \ SUBSTR('Error in GET$BOOK_DATA: '||SQLERRM, 1, 500);\nEND; -- GET$BOOK_DATA\n\
  ```\n\n#### 错误恢复\n\n遵循黑盒范式，一个执行插入、更新或删除信息的操作，应使数据库保持在一致状态。如果该操作失败，则必须回滚到进入该操作时系统所处的状态。请使用大写字母为保存点命名，并确保在操作的全局异常处理中包含回滚调用，如下所示：\n\
  \n```sql\nPROCEDURE EXE$REGISTER_NEW_BOOK (\n                     p_title      \
  \          IN      VARCHAR2\n                    ,p_author               IN    \
  \  VARCHAR2\n                    ,p_book_id                  OUT  NUMBER\n     \
  \               ,p_exitcode                 OUT  NUMBER\n                    ,p_exittext\
  \                 OUT  VARCHAR2\n                    ) IS\n\n  L_PB_FATAL      \
  \                              EXCEPTION;\n\nBEGIN\n  -- 初始化\n  p_exitcode := 0;\n\
  \  p_exittext := NULL;\n\n  SAVEPOINT BEFORE_REGISTER_NEW_BOOK;\n\n  IF p_title\
  \ IS NULL OR p_author IS NULL THEN\n    p_exitcode := 12345;  -- 无效新书数据的错误代码\n \
  \   p_exittext := '缺少书名或作者信息';\n    RAISE L_PB_FATAL;\n  END IF;\n\n  ...\n\nEXCEPTION\n\
  \  WHEN L_PB_FATAL THEN\n    ROLLBACK TO BEFORE_REGISTER_NEW_BOOK;\n    IF p_exitcode\
  \ = 0 THEN -- 为避免值被遗漏\n      p_exitcode := -1;\n    END IF;\n  WHEN OTHERS THEN\n\
  \    ROLLBACK TO BEFORE_REGISTER_NEW_BOOK;\n    p_exitcode := SQLCODE;\n    p_exittext\
  \ := SUBSTR('KNL_BOOKS.EXE$REGISTER_NEW_BOOK 中出错: '||SQLERRM, 1, 500);\nEND; --\
  \ EXE$REGISTER_NEW_BOOK\n```\n\n#### 测试优先，显示其次\n\n如果你正在编写一个驱动用户界面的模块，最好先检查并获取所有必需的数据，然后再显示界面。这样，所有可能的错误在显示任何内容之前就被捕获了。你便可以轻松地避免在页面或屏幕中间出现“发生错误”之类的提示让用户看到。此外，如果你确实需要显示错误信息，你也可以在不使用户感到困惑的情况下进行。如果你开始显示数据，却中途被一个错误打断，用户可能会变得慌乱和沮丧。\n\
  \n### 总结\n\n编码规范并非旨在解决你在实现系统或维护软件时可能遇到的所有问题。然而，为了标准化大型源代码库以及简化模块的维护和共享，它们非常方便。遵循编码标准是对你作为同行的程序员和项目负责人的尊重。作为一名程序员，你可能在开始时觉得使用它们很困难，因为它们可能与你自己的风格不匹配。相信我；只需要很短的时间，给定的一套标准就会成为你自然的编码方式。此外，一旦你开始管理大量模块，能够以一致的方式“即插即用”它们来构建复杂的机制，是多么令人愉快！作为一名项目负责人，你可能会发现将标准强加给整个团队很困难，但质量上的提升是值得的。\n\
  \n以下是一个最终模板。它将许多本章描述的规范总结在一个地方。\n\n```sql\n/*-----------------------------------------------------------------------*/\n\
  /*                                                                       */\n/*\
  \ 模块     : MODULE_NAME                                                */\n/* 目标\
  \     : 模块的简短描述。                                           */\n/* 关键词   : 描述模块功能的几个关键词。\
  \                                 */\n/*                                       \
  \                                */\n/*-----------------------------------------------------------------------*/\n\
  /* 描述:                                                                 */\n/*  \
  \                                                                     */\n/* 模块的长描述：其目标。\
  \                                                */\n/* 关于参数的解释（输入和输出）。        \
  \                                */\n/* 操作如何工作，“技巧”等。                          \
  \                    */\n/*                                                    \
  \                   */\n/*-----------------------------------------------------------------------*/\n\
  /* 历史:                                                                 */\n/*  \
  \                                                                     */\n/* YYYY-MM-DD\
  \ : 名和姓 - 创建。                                          */\n/*                  \
  \                                                     */\n/* YYYY-MM-DD : 名和姓 -\
  \ 审查。                                          */\n/*                          \
  \                                             */\n/* YYYY-MM-DD : 名和姓          \
  \                                         */\n/*              修改描述。            \
  \                                    */\n/*                                    \
  \                                   */\n/*-----------------------------------------------------------------------*/\n\
  PROCEDURE TYPE$MODULE_NAME(\n                     p_param1              IN     \
  \ VARCHAR2 -- 此处为 p_param1 添加注释\n                    ,p_param2              IN \
  \     NUMBER   := NULL\n                    ,p_exitcode               OUT  NUMBER\n\
  \                    ,p_exittext               OUT  VARCHAR2\n                 \
  \   ) IS\n\n-- 声明部分\n\nCURSOR one_cursor IS\n  SELECT *\n    FROM table\n   WHERE\
  \ condition;\n\n  L_PB_FATAL                                    EXCEPTION;\n  l_variable\
  \                                    VARCHAR2(1);\n\nBEGIN\n  -- 初始化\n  p_exitcode\
  \ := 0;\n  p_exittext := NULL;\n\n  SAVEPOINT BEFORE_TYPE$MODULE_NAME;\n\n  -- 检查输入\n\
  \  PACKAGE.CHK$PARAM1 (\n                     p_value    => p_param1\n         \
  \           ,p_exitcode => p_exitcode\n                    ,p_exittext => p_exittext\n\
  \                    );\n  IF p_exitcode <> 0 THEN     -- 原文为 p_exittext，此处根据上下文逻辑调整为\
  \ p_exitcode\n     RAISE L_PB_FATAL;\n  END IF;\n\n  -- 收集所需数据\n  BEGIN\n    SELECT\
  \ col\n      INTO l_variable\n      FROM table\n     WHERE condition1\n       AND\
  \ condition2;\n  EXCEPTION\n     WHEN OTHERS THEN\n       p_exitcode := 123456;\n\
  \       p_exittext := '在 TYPE$MODULE_NAME 中获取信息时出错';\n       RAISE L_PB_FATAL;\n\
  \  END;\n\n  -- 从游标获取数据\n  FOR l_one_rec IN one_cursor LOOP    -- 原文为 FROM，应为 IN\n\
  \    IF l_one_rec.col <> PACKAGE.C_CONSTANT THEN\n      -- 关于上述测试的解释\n      ...\n\
  \    ELSE\n      ...\n    END IF;\n  END LOOP; -- One cursor\n\n  -- 显示\n  ...\n\
  \nEXCEPTION\n  WHEN L_PB_FATAL THEN\n    ROLLBACK TO BEFORE_TYPE$MODULE_NAME;\n\
  \    IF p_exitcode = 0 THEN          -- 为避免遗漏退出代码\n      p_exitcode := -1;     \
  \        -- 返回非 0 值表示错误\n    END IF;\n  WHEN OTHERS THEN\n    ROLLBACK TO BEFORE_TYPE$MODULE_NAME;\n\
  \    p_exitcode := SQLCODE;\n    p_exittext := SUBSTR('PACKAGE.TYPE$MODULE_NAME\
  \ 中出错: '||SQLERRM, 1, 500);\nEND TYPE$MODULE_NAME;\n```\n\n## 第 15 章\n\n## 依赖关系与失效机制\n\
  \n**作者：Arup Nanda**\n\nPL/SQL 包之间的依赖关系常常是应用程序错误的棘手来源。不熟悉依赖关系工作原理的数据库管理员和开发人员，可能会对一些偶发且无法复现、看似无因的错误感到困惑不解。例如，在执行你负责的一个包中的过程时，应用程序抛出以下错误：\n\
  \n`ORA-04068: 包的现有状态已被丢弃`\n\n这个特定的过程之前已经成功执行过无数次。你完全可以发誓保证，自己很久没修改过这个包，最近几秒钟内肯定没有，但应用程序却报了这个错，客户订单失败，公司因此蒙受损失。\n\
  \n找不到明显的原因，你便责怪同事乱动了这个包，引发了一场激烈的争吵，事后立刻感到后悔。你的经理介入，冷静地让你给她重现错误。你手动重新执行了包中的过程，然后（惊喜，惊喜）它竟然毫无错误地执行成功了！在被你指责的同事那怒目而视的目光，以及经理那“你需要帮助”的眼神注视下，你此刻对究竟发生了什么感到彻底困惑。是蓄意破坏，Oracle\
  \ Bug，运气不佳，还是都不是？\n\n这个错误是什么？为什么你没做什么它自己就好了？问题并非源于玄学，而在于 PL/SQL 代码的依赖关系工作机制。包中引用的某个对象被修改了，导致该包失效。随后包被重新验证（或重新编译），并且必须重新初始化。\n\
  \n在开发应用程序时，理解依赖链和失效原因至关重要。前述情景就是一个设计不佳的应用程序代码如何导致服务中断的实例。本章将解释依赖关系，以及如何通过编码来减少失效，从而在运行时减少甚至可能消除对应用程序的干扰。\n\
  \n### 依赖链\n\n首先，你必须理解依赖链及其对 PL/SQL 代码的影响。假设你有一个表 `ORDERS` 和一个用于更新 `QUANTITY` 列的过程\
  \ `UPD_QTY`。它们的定义如下（注意过程对表的依赖；这两个对象形成了一个依赖链）：\n\n```sql\nSQL> desc orders\n Name\
  \                                      Null?    Type\n -----------------------------------------\
  \ -------- ----------------------------\n ORDER_ID                             \
  \     NOT NULL NUMBER(5)\n CUST_ID                                   NOT NULL NUMBER(10)\n\
  \ QUANTITY                                           NUMBER(10,2)\n\ncreate or replace\
  \ procedure upd_qty (\n        p_order_id in orders.order_id%type,\n        p_quantity\
  \ in orders.quantity%type\n) as\nbegin\n     update orders\n     set quantity =\
  \ p_quantity\n     where order_id = p_order_id;\nend;\n```\n\n如果你删除了 `QUANTITY`\
  \ 列会怎样？当然，这个过程将失去意义，因此 Oracle 合理地将其标记为无效。之后，你可能进行了另一项修改，要么将该列添加回表中，要么从过程中移除该列并替换为其他内容，使得该过程在语法上重新有效。如果你将列添加回了表中，可以通过执行以下命令重新编译该过程：\n\
  \n```sql\nSQL> alter procedure upd_qty compile reuse settings;\n```\n\n![images](img/square.jpg)\
  \ **提示** 重新编译时的 `REUSE SETTINGS` 子句是一个便捷且强大的工具。之前为过程设置的任何特殊编译时参数，如 `plsql_optimize_level`\
  \ 或 `warning_level`，在重新编译后将保持不变。如果不使用该子句，则当前会话的设置将会生效。因此，除非你想更改这些设置，否则每次使用该子句都是一个好主意。\n\
  \n编译将检查过程中引用的所有组件是否存在。这种有效性确认仅在编译过程时进行——而不是在运行时。为什么？想象一下典型的存储代码库内容：长达数千行，包含数百个表、列、同义词、视图、序列和其他存储代码，如果在每次执行时都尝试验证每个对象，性能将会非常糟糕，使得此过程不可行。因此，验证在编译时完成，这很可能是一次性的操作。当一个对象（比如这个表）发生变化时，Oracle\
  \ 无法立即确定变更是否会影响依赖对象（比如这个过程），因此它通过将该对象标记为失效来做出反应。对象之间的依赖关系在数据字典视图 `DBA_DEPENDENCIES`（或其对应视图\
  \ `USER_DEPENDENCIES`）中清晰可见。\n\n```sql\nSQL> desc dba_dependencies\n Name      \
  \                                Null?    Type\n -----------------------------------------\
  \ -------- ----------------------------\n OWNER                                \
  \     NOT NULL VARCHAR2(30)\n NAME                                      NOT NULL\
  \ VARCHAR2(30)\n TYPE                                               VARCHAR2(18)\n\
  \ REFERENCED_OWNER                                   VARCHAR2(30)\n REFERENCED_NAME\
  \                                    VARCHAR2(64)\n REFERENCED_TYPE            \
  \                        VARCHAR2(18)\n REFERENCED_LINK_NAME                   \
  \            VARCHAR2(128)\n DEPENDENCY_TYPE                                   \
  \ VARCHAR2(4)\n```\n\n`REFERENCED_NAME` 显示被引用的对象——当前对象所依赖的另一个对象。以下针对该表的查询列出了 `UPD_QTY`\
  \ 的依赖项。每个这样的依赖项都代表 `UPD_QTY` 所依赖的一个对象。\n\n```sql\nselect referenced_owner, referenced_name,\
  \ referenced_type\nfrom dba_dependencies\nwhere owner = 'ARUP'\nand name = 'UPD_QTY'\n\
  /\n```\n\n\n`REFERENCED_OWNER               REFERENCED_NAME                REFERENCED_TYPE`\n\
  `------------------------------ ------------------------------ ------------------`\n\
  `SYS                            SYS_STUB_FOR_PURITY_ANALYSIS   PACKAGE`\n`ARUP \
  \                          ORDERS                         TABLE`\n\n此输出显示过程 `UPD_QTY`\
  \ 依赖于表 `ORDERS`，这符合我们的预期。如果该过程代码中引用了其他对象，它们也会在此列出。\n\n![images](img/square.jpg)\
  \ `注意` 有关此特定依赖关系的解释，请参见即将出现的侧栏“`SYS_STUB_FOR_PARITY_ANALYSIS` 是什么？”。\n\n每当表 `ORDERS`\
  \ 的结构发生改变时，过程的有效性就变得存疑，Oracle 会将其标记为无效。然而，存疑并不一定意味着无效。例如，当你向表中添加一个列时，这从技术上讲是对表的更改。这会使过程无效吗？\n\
  \n```sql\nSQL> alter table orders add (store_id number(10));\n```\n\n```\nTable\
  \ altered.\n```\n\n如果你检查 `UPD_QTY` 过程的状态，是的，它会无效。\n\n```sql\nSQL> select status\
  \ from user_objects where object_name = 'UPD_QTY';\n```\n\n```\nSTATUS\n-------\n\
  INVALID\n```\n\n但该过程实际上并未引用新列，因此本不应受到影响。然而，Oracle 不一定知道这一点。为了安全起见，它会抢先将该过程标记为无效。此时，你可以重新编译该过程；它会编译成功。否则，下次调用该过程时，Oracle\
  \ 会自动重新编译它。\n\n让我们看看新的过程如何运作，包括自动重新编译。\n\n```sql\nSQL> exec upd_qty (1,1)\n```\n\
  \n```\nPL/SQL procedure successfully completed.\n```\n\n该过程执行成功，尽管它被标记为无效。这是如何做到的？它之所以能成功执行，是因为执行操作强制了过程的重新编译（和重新验证）。重新编译之所以成功，是因为该过程实际上并未引用底层表中已更改的组件——新列\
  \ `STORE_ID`。该过程编译成功并被标记为有效。你可以通过再次检查状态来确认这一点。\n\n```sql\nSQL> select status from\
  \ user_objects\n  2  where object_name = 'UPD_QTY';\n```\n\n```\nSTATUS\n-------\n\
  VALID\n```\n\n到目前为止，这些事件似乎相当无害；这些强制重新编译处理了任何不影响程序有效性的更改，一切照常运行。你为什么应该关心？你应该非常关心。\n\
  \n### EXECUTED IMMEDIATE 是一种特殊情况\n\n如果一个表是在 `execute immediate` 字符串内被引用的，那么依赖性检查不会捕获该表作为引用对象。例如，考虑以下代码：\n\
  \n```sql\ncreate or replace procedure upd_qty as\nbegin\n   execute immediate 'update\
  \ orders set quantity = ...';\nend;\n```\n\n在这种情况下，`ORDERS` 表将不会显示为 `UP_QTY` 的引用对象，这是不使用动态\
  \ SQL 的又一个理由（或者，根据你的观点，也是使用它的理由）。\n\n存储代码的编译（以及依赖于它的其他对象，例如基于表的视图）会强制数据库中进行另一个称为解析的过程。解析类似于源代码的编译。当你执行一条\
  \ SQL 语句，例如 `select order_id from orders` 时，Oracle 不能直接执行该语句。它必须询问很多问题，其中一些是：\n\n\
  *   `orders` 是什么？是表、视图还是同义词？\n*   表中是否确实存在名为 `order_id` 的*列*？\n*   是否存在名为 `order_id`\
  \ 的*函数*？\n*   你是否有从该表（或函数）进行选择的*权限*？\n\n在确保你具备所有必要的先决条件后，Oracle 会生成该 SQL 语句的可执行版本，并将其放入库缓存中。这个过程被称为*解析*。随后对\
  \ SQL 的执行将仅使用已解析的版本，而不再经历解析过程。在执行阶段，Oracle 必须确保组件（表 `ORDERS`、过程 `UPD_QTY` 等）没有被更改。它通过在这些对象以及其他结构（如游标）上放置一个*解析锁*来实现这一点。\n\
  \n解析非常消耗 CPU。频繁的解析和重新编译会占用服务器的 CPU 周期，剥夺其他有用进程应得的 CPU 资源。你可以通过检查一个名为 `v$mystat`\
  \ 的视图中与解析相关的统计信息来审视其影响，该视图显示当前会话的统计信息。该视图仅以 `statistic#` 形式显示统计信息；它们的名称在另一个名为 `v$statname`\
  \ 的视图中提供。以下是一个连接两个视图并显示解析相关统计信息的查询。将该查询保存为 `ps.sql` 以检查重新解析和重新编译的影响。\n\n```sql\n\
  select name, value\nfrom v$mystat s, v$statname n\nwhere s.statistic# = n.statistic#\n\
  and n.name like '%parse%';\n```\n\n视图 `v$mystat` 是一个累积视图，因此其中的数值不显示当前数据；它们是累加的。要了解某段时间内的统计信息，你必须从该视图中选择两次并获取差值。要找出解析相关的统计信息，首先通过运行\
  \ `ps.sql` 收集统计信息，然后执行过程 `upd_qty()`，再次运行 `ps.sql` 收集统计信息，如下所示：\n\n```sql\nSQL>\
  \ @ps\n```\n\n```\nNAME                                VALUE\n------------------------------\
  \ ----------\nparse time cpu                           20\nparse time elapsed  \
  \                     54\nparse count (total)                     206\nparse count\
  \ (hard)                       16\nparse count (failures)                    1\n\
  ```\n\n```sql\nSQL> exec upd_qty(1,1)\n```\n\n```\nPL/SQL procedure successfully\
  \ completed.\n```\n\n```sql\nSQL> @ps\n```\n\n```\nNAME                        \
  \        VALUE\n------------------------------ ----------\nparse time cpu      \
  \                     20\nparse time elapsed                       54\nparse count\
  \ (total)                     208\nparse count (hard)                       16\n\
  parse count (failures)                    1\n```\n\n注意这些数值。没有任何增加；换句话说，执行过程 `upd_qty`\
  \ 并未导致解析。在一个*不同的*会话中，通过添加列来更改表，如下所示：\n\n```sql\nSQL> alter table orders add (amount\
  \ number(10,2));\n```\n\n```\nTable altered.\n```\n\n现在，在第一个会话中执行该过程并收集统计信息。\n\n\
  ```sql\nSQL> exec upd_qty(1,1)\n```\n\n```\nPL/SQL procedure successfully completed.\n\
  ```\n\n```sql\nSQL> @ps\n```\n\n```\nNAME                                VALUE\n\
  ------------------------------ ----------\nparse time cpu                      \
  \     26\nparse time elapsed                       60\nparse count (total)     \
  \                279\nparse count (hard)                       19\nparse count (failures)\
  \                    1\n```\n\n注意解析相关统计信息是如何增加的。硬解析（意味着 SQL 语句未在库缓存中找到，或者找到的任何版本不可用，因此必须重新解析）从\
  \ 16 跳升到 19——表明发生了 3 次硬解析。总解析次数从 208 跳升到 279，增加了 71。由于有 3 次硬解析，另外 68 次是软解析，这意味着在库缓存中找到了结构并进行了重新验证，而不是从头开始解析。解析的\
  \ CPU 时间从 20 跳升到 26，表明解析消耗了 6 厘秒的 CPU 时间。如果没有解析的需求，这些 CPU 周期本可以用于执行其他有用的工作。这听起来可能不多，但考虑一下在正常的数据库系统中发生成千上万次此类情况，导致大量\
  \ CPU 消耗的场景。\n\n\n"
- "# Oracle RAC 数据库中的解析与依赖管理\n\n![images](img/square.jpg) **注意** 在一个 RAC 数据库中，这种解析效果更为显著。由于存在多个实例，每个实例都有自己独立的库缓存，因此解析和失效过程必须被仔细协调。例如，当实例\
  \ `INST1` 中的表 `ORDERS` 被修改时，`UPD_QTY` 过程不仅需要在实例 `INST1` 中被失效；在 `INST2` 中也同样需要（假设是一个双节点的\
  \ RAC 数据库）。实例 `INST1` 会向 `INST2` 发送一条消息，立即标记 `UPD_QTY` 的已加载版本为无效。由于存在其他人可能错误访问 `UPD_QTY`\
  \ 过程的可能性，这条消息以高优先级作为**直接消息**发送。因为直接消息优先于其他类型的消息（例如请求一个数据块，这被称为**间接消息**），其他消息可能没有机会被传输。这导致获取数据块出现延迟；请求数据块的会话必须等待，从而加剧了性能问题。\n\
  \n问题不止于此。正如你所见，过程在执行时会自动重新编译。它被验证，然后该消息立即传输到 `INST2`。RAC 互联网络被此类消息淹没，影响了其他消息和数据块的流动，从而导致性能问题。随着实例数量的增加，这个问题会变得更加严重，因为需要协调的工作量呈指数级增长。与数据块不同，库缓存中的对象（游标、表、包等）没有“主实例”概念，因此\
  \ RAC 必须通知集群中的所有实例来失效（并验证）该对象。\n\n在一个典型的应用程序中，你可能有很多过程，这些过程又调用很多其他过程。假设过程 `P1` 调用过程\
  \ `P2`，`P2` 又调用 `P3`，而 `P3` 访问表 `T1`。我们可以用下图表示这种情况，其中 ![images](img/U002.jpg) 表示“依赖于”：\n\
  \n`P1` ![images](img/U002.jpg) `P2` ![images](img/U002.jpg) `P3` ![images](img/U002.jpg)\
  \ `T1`\n\n这被称为`依赖链`。如果 `T1` 被修改，链中位于其左侧的所有依赖对象都可能被失效，并且必须在使用前重新编译。重新编译必须按照依赖顺序进行，例如先编译\
  \ `P3`，然后是 `P2`，最后是 `P1`。这种重新编译可以是自动的，但它无论如何都会消耗解析所需的 CPU 周期，并且需要解析锁。`依赖链`越长，对解析的需求就越大，从而导致更多的\
  \ CPU 消耗和对解析锁的需求。在 RAC 数据库中，控制这一成本变得极其重要；否则，其影响将失控。因此，你的目标应该是减少重新验证的循环并缩短`依赖链`。\n\
  \n## 关于 SYS_STUB_FOR_PURITY_ANALYSIS?\n\n你注意到输出中那个命名奇怪的包 `SYS_STUB_FOR_PURITY_ANALYSIS`\
  \ 了吗？我很确定你没有创建它，而且你肯定没有在过程中使用它。如果你检查数据字典，你会看到只有包的规范（Specification），而没有包体。无论如何，你甚至没有引用这个包，那为什么它被列为\
  \ `UPD_QTY` 过程的父对象呢？\n\n这又是解析机制的另一个隐藏工作原理。还记得 PL/SQL 代码段的纯净度模型吗？总的来说，它规定了存储代码改变数据库和包状态的可能性，例如“不写数据库状态”（WNDS）或“不读包状态”（RNPS）。这些被称为存储代码的纯净度级别。在编译存储代码时，Oracle\
  \ 会假定其处于这些纯净状态之一。然而，考虑这个复杂的情况：有一个名为 `ORDERS` 的公共同义词。当你创建这个过程时，解析必须假定你指的是*你自己的*对象\
  \ `ORDERS`，而不是公共同义词 `ORDERS`。但假设另一个用户正在创建一个同名过程（使用相同的代码），而他没有名为 `ORDERS` 的表？在这种情况下，解析将指向公共同义词。这给解析器带来了一个有趣的问题——必须考虑对象的作用域和纯净度。Oracle\
  \ 通过访问一个特殊的包来解决这个问题，该包中定义了针对纯净度状态的过程。以下是该包的定义：\n\n```sql\nCreate or replace package\
  \ sys_stub_for_purity_analysis as\n  procedure prds;\n  pragma restrict_references(prds,\
  \ wnds, rnps, wnps);\n\n  procedure pwds;\n  pragma restrict_references(pwds, rnds,\
  \ rnps, wnps);\n\n  procedure prps;\n  pragma restrict_references(prps, rnds, wnds,\
  \ wnps);\n\n  procedure pwps;\n  pragma restrict_references(pwps, rnds, wnds, rnps);\n\
  end sys_stub_for_purity_analysis;\n```\n\n由于这些过程仅仅是为了提供指向纯净度级别的指针，没有其他用途，因此包体不存在。为什么依赖树可以只针对包规范而没有包体存在？这个有趣的话题将在本章后面讨论。就目前而言，我们希望你对这个奇怪引用的包\
  \ `sys_stub_for_purity_analysis` 的解释感到满意。\n\n\n### 缩短依赖链\n\n如何减少这种解析-失效-解析事件的恶性循环？有一个好消息是，Oracle\
  \ 开发团队已经注意到这个问题，并在 Oracle Database 11g 中改变了常规的依赖模型。Oracle Database 11g 不再依赖于对表或视图的修改来使依赖对象失效，而是采用了一种细粒度的依赖机制，同时检查列的变更。只有当所引用的列被修改时，依赖对象才会失效；否则，它们将保持有效状态。\n\
  \n那么，在你确实必须修改列的情况下呢？在 Oracle Database 11g 中，这可能会触发失效。完全避免它可能是不可能的，但你可以通过缩短依赖链来减少其影响。例如，如果上述依赖链只有两级而不是四级，那么需要重新编译的对象就会更少，从而减少\
  \ CPU 消耗和解析锁。如何实现这一目标呢？\n\n答案在于另一种类型的存储代码：包。包处理失效的方式不同，在遇到上游对象变更时，它们比过程和函数更不容易受到这种失效涟漪效应的影响。让我们通过一个例子来看看。首先，创建一系列表、包和过程。\n\
  \n```sql\n-- 创建两个表\ncreate table test1 (\n   col1  number;\n   col2  number\n)\n\
  /\ncreate table test2 (\n   col1  number;\n   col2  number\n)\n/\n-- 创建一个包来操作这些表\n\
  create or replace package pack1\nis\n    g_var1  number;\n    l_var1  number;\n\
  \    procedure p1 (p1_in test1.col1%TYPE);\n    procedure p2 (p1_in number);\nend;\n\
  /\ncreate or replace package body pack1\nas\n    procedure p1 (p1_in test1.col1%type)\
  \ is\n    begin\n        update test1\n        set col2 = col2 + 1\n        where\
  \ col1 = p1_in;\n    end;\n    procedure p2 (p1_in number) is\n    begin\n     \
  \   update test2\n        set col2 = col2 + 1\n        where col1 = p1_in;\n   \
  \ end;\nend;\n/\ncreate or replace package pack2\nis\n    procedure p1 (p1_in number);\n\
  \    procedure p2 (p1_in number);\nend;\n/\ncreate or replace package body pack2\n\
  as\n    procedure p1 (p1_in number) is\n    begin\n        pack1.p1(p1_in);\n  \
  \  end;\n    procedure p2 (p1_in number) is\n    begin\n        pack1.p2(p1_in);\n\
  \    end;\nend;\n/\n-- 创建两个调用这些包的过程\ncreate or replace procedure p1\n(\n    p1_in\
  \   in number\n)\nis\nbegin\n    pack2.p1 (p1_in);\nend;\n/\ncreate or replace procedure\
  \ p2\n(\n    p1_in   in number\n)\nis\nbegin\n    p1(p1_in);\nend;\n```\n\n你创建了两个表，然后是引用这些表的两个包（这些包随即成为表的依赖项），一个调用其中一个包的过程，以及最后另一个调用此过程的过程。从定义上看，依赖链*似乎*是这样的：\n\
  \n`P2` ![images](img/U002.jpg) `P1` ![images](img/U002.jpg) `PACK1,PACK2` ![images](img/U002.jpg)\
  \ `TEST1,TEST2`\n\n现在修改表`TEST2`的一个列：\n\n```sql\nSQL> alter table test2 modify (col2\
  \ number(9));\n\nTable altered.\n```\n\n根据依赖规则，所有对象（`PACK1`、`PACK2`、`P1`和`P2`）都应该失效，并且保持失效状态，直到手动或自动重新编译它们。通过检查所有相关对象的状态来确认这一点。\n\
  \n```sql\nselect object_type, object_name, status\nfrom user_objects;\n```\n\n```\n\
  OBJECT_TYPE         OBJECT_NAME                     STATUS\n-------------------\
  \ ------------------------------ -------\nPROCEDURE           P1               \
  \              VALID\nPROCEDURE           P2                             VALID\n\
  PACKAGE             PACK1                          VALID\nPACKAGE BODY        PACK1\
  \                          INVALID\nPACKAGE             PACK2                  \
  \        VALID\nPACKAGE BODY        PACK2                          VALID\nTABLE\
  \               TEST1                          VALID\nTABLE               TEST2\
  \                          VALID\n```\n\n有趣的是，唯一失效的对象是包体`PACK1`；所有其他对象仍然有效。这是怎么发生的？为什么所有依赖于表`TEST2`的对象都没有失效？\n\
  \n答案在于包的依赖工作方式。让我们通过运行一条 SQL 语句来检查这些依赖关系。由于需要多次运行它，请将以下内容保存为`dep.sql`：\n\n```sql\n\
  select referenced_type, referenced_owner, referenced_name\nfrom dba_dependencies\n\
  where owner = '&1'\nand name = '&2'\nand type = '&3'\n```\n\n现在你可以多次调用此脚本并使用适当的参数来获取依赖关系信息。\n\
  \n```sql\nSQL> @dep ARUP P2 PROCEDURE\n\nREFERENCED_TYPE   REFERENCED_OWNER    \
  \            REFERENCED_NAME\n----------------- ------------------------------ ------------------------------\n\
  PACKAGE           SYS                            SYS_STUB_FOR_PURITY_ANALYSIS\n\
  PACKAGE           SYS                            STANDARD\nPROCEDURE         ARUP\
  \                           P1\n\nSQL> @dep ARUP P1 PROCEDURE\n\nREFERENCED_TYPE\
  \   REFERENCED_OWNER                REFERENCED_NAME\n----------------- ------------------------------\
  \ ------------------------------\nPACKAGE           SYS                        \
  \    SYS_STUB_FOR_PURITY_ANALYSIS\nPACKAGE           SYS                       \
  \     STANDARD\nPACKAGE           ARUP                           PACK2\n\nSQL> @dep\
  \ ARUP PACK2 PACKAGE\n\nREFERENCED_TYPE   REFERENCED_OWNER                REFERENCED_NAME\n\
  ----------------- ------------------------------ ------------------------------\n\
  PACKAGE           SYS                            STANDARD\n\nSQL> @dep ARUP PACK2\
  \ 'PACKAGE BODY'\n\nREFERENCED_TYPE   REFERENCED_OWNER                REFERENCED_NAME\n\
  ----------------- ------------------------------ ------------------------------\n\
  PACKAGE           SYS                            STANDARD\nPACKAGE           ARUP\
  \                           PACK1\nPACKAGE           ARUP                      \
  \     PACK2\n\nSQL> @dep ARUP PACK1 PACKAGE\n\nREFERENCED_TYPE   REFERENCED_OWNER\
  \                REFERENCED_NAME\n----------------- ------------------------------\
  \ ------------------------------\nPACKAGE           SYS                        \
  \    STANDARD\n\nSQL> @dep ARUP PACK1 'PACKAGE BODY'\n\nREFERENCED_TYPE   REFERENCED_OWNER\
  \                REFERENCED_NAME\n----------------- ------------------------------\
  \ ------------------------------\nPACKAGE           SYS                        \
  \    STANDARD\nTABLE             ARUP                           TEST1\nPACKAGE \
  \          ARUP                           PACK1\nTABLE             ARUP        \
  \                   TEST2\n```\n\n如果你将这些依赖关系信息（实际上是一个依赖链）放入图表中，它将如图 15-1 所示。箭头从*依赖项*指向*引用项*。我更喜欢使用这些术语，而不是*子项*和*父项*，仅仅因为父项/子项暗示了外键关系。并非所有依赖关系都涉及引用完整性约束（这些约束是针对数据的）。依赖关系涉及对实际对象的引用，即使这些对象可能根本不包含任何数据。\n\
  \n\n\n## 包的依赖与失效\n\n仔细研究图 15-1，你可能会注意到一个有趣的事实：包体（package bodies）依赖于*包*（packages），而不是其他的包*体*。这是包的一个非常重要的特性，在依赖链中对象的失效过程中起着有益的作用。由于依赖的是包体而非包本身，所以被失效的是包体，而不是包本身。依赖于这些包的对象因为其引用的对象（包）仍然有效，所以也保持有效。在这个例子中，没有其他对象依赖于`PACK1`包体，所以没有其他对象被失效。\n\
  ![images](img/1501.jpg)\n*图 15-1. 一个复杂的依赖链*\n\n`PACK1`包体何时会重新验证（或重新编译）？由于修改表列并未从根本上改变任何内容，对象可以在被调用时自动重新编译。让我们执行位于依赖链顶端的过程`P2`（即它是最后一个，没有其他对象依赖它）。\n\
  ```\nSQL> exec p2 (1)\n\nPL/SQL procedure successfully completed.\n```\n执行后，检查对象的状态。\n\
  ```\nOBJECT_TYPE         OBJECT_NAME                     STATUS\n-------------------\
  \ ------------------------------ -------\nPROCEDURE           P1               \
  \               VALID\nPROCEDURE           P2                              VALID\n\
  PACKAGE             PACK1                           VALID\nPACKAGE BODY        PACK1\
  \                           VALID\nPACKAGE             PACK2                   \
  \        VALID\nPACKAGE BODY        PACK2                           VALID\nTABLE\
  \               TEST1                           VALID\nTABLE               TEST2\
  \                           VALID\n```\n注意包体是如何自动重新编译的。执行`P2`调用了过程`P1`，`P1`又执行了`PACK2.P1`，而`PACK2.P1`反过来执行了`PACK1.P1`。由于`PACK1`是无效的，这次执行强制进行了编译并使其重新验证。这里只编译了一个包体，而不是一整条依赖链的对象，这降低了\
  \ CPU 消耗和解析锁的需求。考虑一下如果这些包都是过程的情况。这将使所有依赖的过程都失效。强制重新编译将导致 CPU 消耗显著增加，并且需要更多的解析锁。\n\
  \n### 数据类型引用\n\n有时两个最佳实践本身是理想的，但一起使用时却会失败。依赖跟踪和 PL/SQL 代码中使用的某些数据类型就是这种情况。为了说明问题，我想展示一个略有不同的场景。不是修改表`TEST2`，让我们修改`TEST1`来添加一列，如下所示：\n\
  ```\nSQL> alter table test1 modify (col2 number(8,3));\n\nTable altered.\n```\n\
  如果检查对象状态，你将看到以下内容：\n```\nOBJECT_TYPE         OBJECT_NAME                     STATUS\n\
  ------------------- ------------------------------ -------\nPROCEDURE          \
  \ P1                              VALID\nPROCEDURE           P2                \
  \              VALID\nPACKAGE             PACK1                           INVALID\n\
  PACKAGE BODY        PACK1                           INVALID\nPACKAGE           \
  \  PACK2                           VALID\nPACKAGE BODY        PACK2            \
  \               INVALID\nTABLE               TEST1                           VALID\n\
  TABLE               TEST2                           VALID\n```\n注意这次修改导致失效的对象——这次更多了。在这种情况下，包和包体`PACK1`都被失效了，而在前一种情况下只有包体被失效。为什么呢？\n\
  \n要回答这个问题，请查看包规范中`P1`的声明。\n```\n    procedure p1 (p1_in test1.col1%type) is\n```\n\
  数据类型不是像`NUMBER`这样的基本类型；它是通过表`TEST1`中`COL1`的数据类型来引用的。以这种方式定义参数而不是使用基本类型，对于高性能代码来说是个好主意，因为编译会将其与对象组件绑定，使代码运行更快。然而，这也使它比`TEST2`更紧密地依赖于表`TEST1`。修改`TEST2`不会影响包`PACK1`内部的数据类型，但修改`TEST1`中`COL1`的数据类型会改变其中一个参数的数据类型。因此，当`TEST1`被修改时，Oracle\
  \ 检测到包规范也发生了变化，从而将包标记为无效。在修改表`TEST2`的情况下，传递给过程的参数没有被改变，包规范没有受到影响，因此包规范保持有效。\n\n\
  这种失效应该在下次执行最顶层对象时自动重新编译，对吗？不；这次自动重新编译实际上会失败。\n```\nSQL> exec p2 (1)\nBEGIN p1(1);\
  \ END;\n\n*\nERROR at line 1:\nORA-04068: existing state of packages has been discarded\n\
  ORA-04061: existing state of package \"ARUP.PACK1\" has been invalidated\nORA-04065:\
  \ not executed, altered or dropped package \"ARUP.PACK1\"\nORA-06508: PL/SQL: could\
  \ not find program unit being called: \"ARUP.PACK1\"\nORA-06512: at \"ARUP.PACK2\"\
  , line 5\nORA-06512: at \"ARUP.P1\", line 7\nORA-06512: at line 1\n```\n此时，如果检查对象的有效性，你会得到：\n\
  ```\nOBJECT_TYPE         OBJECT_NAME                     STATUS\n-------------------\
  \ ------------------------------ -------\nPROCEDURE           P1               \
  \               VALID\nPROCEDURE           P2                              VALID\n\
  PACKAGE             PACK1                           VALID\nPACKAGE BODY        PACK1\
  \                           INVALID\nPACKAGE             PACK2                 \
  \          VALID\nPACKAGE BODY        PACK2                           VALID\nTABLE\
  \               TEST1                           VALID\nTABLE               TEST2\
  \                           VALID\n```\n那两个无效的对象因为这次尝试执行而重新验证了。只有一个对象仍然无效：包`PACK1`的包体。如何解释这一点以及之前的错误呢？\n\
  \n问题在于一个称为*包状态*的概念。当一个包首次被调用时，它会在内存中初始化其状态。例如，包中的全局变量就是被初始化的组件之一。当包规范变得无效时，状态也随之失效。状态会被重新初始化，但这发生在错误产生*之后*，因此错误无论如何都会发生。如果你重新执行这个过程，将不会得到相同的错误，因为状态此时已经初始化了。当包第一次没有被重新编译时，它的包体也没有被重新编译。后来，当包状态被初始化且包被成功重新编译后，Oracle\
  \ 并没有回头去尝试*再次*重新编译包体，因此包体保持无效状态。\n\n此时，如果你重新执行过程`P2`，包体`PACK2`也将被重新编译并变为有效。遇到此错误的应用程序除了简单地重新执行它之前执行的过程外，无需做任何其他事情。然而，应用程序可能无法正确处理它，抛出异常并最终导致应用程序中断——这不是一个理想的结果。因此，你应该尝试避免这种类型的失效。你可以很容易地通过在声明部分对参数的数据类型使用基本类型（如`NUMBER`、`DATE`等）而不是`%type`声明来避免它。不幸的是，这样做会导致性能较低的代码。这就引出了一个有趣的难题：你会为了性能而编码，还是为了更高的可用性而编码？\n\
  \n是否有办法同时实现这两个目标：编写性能高且不易失效的代码？幸运的是，有，这将在下一节中描述。\n\n\n### 视图用于表修改\n\n正如你之前所见，避免或减少因表修改而导致级联失效机会的技巧之一，是在你的存储代码中使用视图来代替直接使用表。视图增加了另一层抽象，可以将表的变更与依赖代码隔离开来。让我们通过一个例子来看看这个好处的实际效果。假设有一个名为\
  \ `TRANS` 的表，你可以按如下方式创建：\n\n```sql\ncreate table trans\n(\n    trans_id        number(10),\n\
  \    trans_amt       number(12,2),\n    store_id        number(2),\n    trans_type\
  \      varchar2(1)\n);\n```\n\n现在构建以下包来操作此表中的数据：\n\n```sql\ncreate or replace package\
  \ pkg_trans\nis\n        procedure upd_trans_amt\n        (\n                p_trans_id\
  \      trans.trans_id%type,\n                p_trans_amt     trans.trans_amt%type\n\
  \        );\nend;\n/\ncreate or replace package body pkg_trans\nis\n        procedure\
  \ upd_trans_amt\n        (\n                p_trans_id      trans.trans_id%type,\n\
  \                p_trans_amt     trans.trans_amt%type\n        ) is\n        begin\n\
  \                update trans\n                set trans_amt = p_trans_amt\n   \
  \             where trans_id = p_trans_id;\n        end;\nend;\n/\n```\n\n你现在想使用这个包来编写其他几个业务代码单元。其中一个单元是一个名为\
  \ `ADJUST` 的函数，它用于按特定金额更新交易额。以下是创建此函数的代码：\n\n```sql\ncreate or replace function\
  \ adjust\n(\n        p_trans_id      trans.trans_id%type,\n        p_percentage\
  \    number\n)\nreturn boolean\nis\n        l_new_trans_amt number(12);\nbegin\n\
  \        select trans_amt * (1 + p_percentage/100)\n        into l_new_trans_amt\n\
  \        from trans\n        where trans_id = p_trans_id;\n        pkg_trans.upd_trans_amt\
  \ (\n                p_trans_id,\n                l_new_trans_amt\n        );\n\
  \        return TRUE;\nexception\n        when OTHERS then\n                return\
  \ FALSE;\nend;\n/\n```\n\n![images](img/square.jpg) 注意：某一编码实践流派的支持者会主张将所有操作特定表的代码放在一个单独的包中，而不是分散在许多存储代码段中，而另一些人则认为这种做法会使包变得冗长且难以管理。我认为正确的答案取决于具体情况，因此最好留待设计时决定。在这个例子中，我并非认可任何一种方法，而仅仅是出于说明目的才使用了一个单独的过程。\n\
  \n在添加了新对象后，让我们在表中添加一个列。\n\n```sql\nSQL> alter table trans add (vendor_id number);\n\
  \nTable altered.\n```\n\n现在检查对象的状态。\n\n```sql\nOBJECT_NAME     OBJECT_TYPE     \
  \     STATUS\n--------------- -------------------- -------\nPKG_TRANS       PACKAGE\
  \ BODY         INVALID\nPKG_TRANS       PACKAGE              INVALID\nADJUST   \
  \       FUNCTION             INVALID\n```\n\n函数失效并不令人意外。它失效是因为它所依赖的组件（包 `PKG_TRANS`\
  \ 的声明和主体）失效了。而这些失效是由表 `TRANS` 的修改引起的。下次执行这些无效组件时，它们将被自动重新编译，但这会导致解析，从而增加 CPU 消耗并放置解析锁。\n\
  \n为了避免这种情况，你可以基于该表创建一个视图。\n\n```sql\ncreate or replace view vw_trans\nas\nselect\
  \ trans_id, trans_amt, store_id, trans_type\nfrom trans\n/\n```\n\n改为在包和函数中使用此视图：\n\
  \n```sql\ncreate or replace package pkg_trans\nis\n        procedure upd_trans_amt\n\
  \        (\n                p_trans_id      vw_trans.trans_id%type,\n          \
  \      p_trans_amt     vw_trans.trans_amt%type\n        );\nend;\n/\ncreate or replace\
  \ package body pkg_trans\nis\n        procedure upd_trans_amt\n        (\n     \
  \           p_trans_id      vw_trans.trans_id%type,\n                p_trans_amt\
  \     vw_trans.trans_amt%type\n        ) is\n        begin\n                update\
  \ vw_trans\n                set trans_amt = p_trans_amt\n                where trans_id\
  \ = p_trans_id;\n        end;\nend;\n/\ncreate or replace function adjust\n(\n \
  \       p_trans_id      vw_trans.trans_id%type,\n        p_percentage    number\n\
  )\nreturn boolean\nis\n        l_new_trans_amt number(12);\nbegin\n        select\
  \ trans_amt * (1 + p_percentage/100)\n        into l_new_trans_amt\n        from\
  \ vw_trans\n        where trans_id = p_trans_id;\n        pkg_trans.upd_trans_amt\
  \ (\n                p_trans_id,\n                l_new_trans_amt\n        );\n\
  \        return TRUE;\nexception\n        when OTHERS then\n                return\
  \ FALSE;\nend;\n/\n```\n\n现在添加一列，然后检查对象的状态。\n\n```sql\nSQL> alter table trans add\
  \ (vendor_id number);\n\nTable altered.\n\nOBJECT_NAME     OBJECT_TYPE         \
  \ STATUS\n--------------- -------------------- -------\nPKG_TRANS       PACKAGE\
  \ BODY         VALID\nPKG_TRANS       PACKAGE              VALID\nADJUST       \
  \   FUNCTION             VALID\nVW_TRANS        VIEW                 VALID\n```\n\
  \n所有对象都是有效的。这是因为包主体依赖于视图，而不是表。新增的列没有在视图中被引用，因此视图本身不受表变更的影响，也未被失效，这要归功于 Oracle 11g\
  \ 中实现的细粒度依赖。\n\n![images](img/square.jpg) 注意：在 Oracle 10g 中，视图会被失效，因为该版本没有实现细粒度依赖控制。在\
  \ 10g 中，依赖关系是视图对表的依赖，表的任何更改，即使是在视图中甚至未被引用的列添加，都会导致视图失效。\n\n细粒度依赖的强大之处在于，它不仅查看命名列，也适用于隐式列。例如，如果你将视图定义为\
  \ `create or replace view vw_trans as select * from trans`（注意 `*`；它表示所有列，而不是之前的命名列），依赖关系也不会有影响，视图不会被失效。然而，如果你重新创建视图，新列将被添加到视图中，并使依赖对象（函数）失效。但是，如果你使用的是包函数而不是独立函数，它就不会被失效，正如你之前观察到的那样。\n\
  \n\n### 将组件添加到包中\n\n既然你已经理解了包在缩短依赖链和减少级联失效方面的巨大价值，你就应该始终在应用程序中使用**包**，而不是独立的代码段。你应该围绕功能逻辑地创建包。当你增强应用程序功能时，可能需要向现有包中添加新的函数和过程，而不是创建新包。这就引出了一个问题：既然你修改了现有包，这样做会影响依赖对象吗？\n\
  \n### 通过示例检查依赖性\n\n让我们用之前涉及表 `TRANS`、视图 `VW_TRANS`、包 `PKG_TRANS` 和函数 `ADJUST` 的例子来检验这个问题。假设根据修订后的需求，你需要向该包中添加一个新的过程\
  \ (`upd_trans_type`) 来更新交易类型。以下是你需要执行的包修改脚本：\n\n```sql\ncreate or replace package\
  \ pkg_trans\nis\n        procedure upd_trans_amt\n        (\n                p_trans_id\
  \      vw_trans.trans_id%type,\n                p_trans_amt     vw_trans.trans_amt%type\n\
  \        );\n        procedure upd_trans_type\n        (\n                p_trans_id\
  \      vw_trans.trans_id%type,\n                p_trans_type    vw_trans.trans_type%type\n\
  \        );\nend;\n/\ncreate or replace package body pkg_trans\nas\n        procedure\
  \ upd_trans_amt\n        (\n                p_trans_id      vw_trans.trans_id%type,\n\
  \                p_trans_amt     vw_trans.trans_amt%type\n        ) is\n       \
  \ begin\n                update vw_trans\n                set trans_amt = p_trans_amt\n\
  \                where trans_id = p_trans_id;\n        end;\n        procedure upd_trans_type\n\
  \        (\n                p_trans_id      vw_trans.trans_id%type,\n          \
  \      p_trans_type    vw_trans.trans_type%type\n        ) is\n        begin\n \
  \           update vw_trans\n            set trans_type = p_trans_type\n       \
  \     where trans_id = p_trans_id;\n        end;\nend;\n/\n```\n\n修改包后，请花时间检查对象的状态。\n\
  \n```\nOBJECT_TYPE          OBJECT_NAME                      STATUS\n--------------------\
  \ ------------------------------ -------\nVIEW                 VW_TRANS        \
  \                 VALID\nTABLE                TRANS                            VALID\n\
  PACKAGE BODY         PKG_TRANS                        VALID\nPACKAGE           \
  \   PKG_TRANS                        VALID\nFUNCTION             ADJUST        \
  \                   VALID\n```\n\n所有对象都是有效的。（请注意，在 11g 之前的版本中，由于缺乏细粒度依赖跟踪，你会发现某些对象会失效）。尽管包是通过添加一个新过程来修改的，但函数\
  \ `ADJUST` 本身并不调用该过程，因此无需失效——这是 11g 中细粒度依赖检查所识别出的一个事实。正如你所见，细粒度依赖模型不仅跟踪列引用，还跟踪存储代码中的组件。\n\
  \n### 当顺序很重要时：存根编号\n\n尽管 Oracle 11g 及以上版本似乎会自动处理失效问题，但请注意情况并非总是如此。考虑另一个场景，你想添加一个新过程来更新\
  \ `store_id`。\n\n```sql\ncreate or replace package pkg_trans\nis\nprocedure upd_store_id\n\
  (\np_trans_id      vw_trans.trans_id%type,\np_store_id      vw_trans.store_id%type\n\
  );\n        procedure upd_trans_amt\n        (\n                p_trans_id     \
  \ vw_trans.trans_id%type,\n                p_trans_amt     vw_trans.trans_amt%type\n\
  \        );\nend;\n/\ncreate or replace package body pkg_trans\nis\nprocedure upd_store_id\n\
  (\np_trans_id      vw_trans.trans_id%type,\np_store_id      vw_trans.store_id%type\n\
  ) is\nbegin\nupdate vw_trans\nset store_id = p_store_id\nwhere trans_id = p_trans_id;\n\
  end;\n        procedure upd_trans_amt\n        (\n                p_trans_id   \
  \   vw_trans.trans_id%type,\n                p_trans_amt     vw_trans.trans_amt%type\n\
  \        ) is\n        begin\n                update vw_trans\n                set\
  \ trans_amt = p_trans_amt\n                where trans_id = p_trans_id;\n      \
  \  end;\nend;\n/\n```\n\n请注意，新过程被插入到包的开头，而不是末尾。如果你检查有效性，会得到以下结果：\n\n```sql\nSQL>\
  \ select status from user_objects where object_name = 'ADJUST';\n```\n\n```\nSTATUS\n\
  -------\nINVALID\n```\n\n为什么函数 `ADJUST` 被失效了？有趣的是，如果你将该过程放在末尾，就不会使函数失效。这种看似奇怪行为的原因在于包解析版本中存根的放置位置。每个函数在包中都以一个存根的形式表示，并且存根的顺序与它们在包中的定义顺序一致。依赖组件通过其存根编号引用存根。当你在末尾添加函数或过程时，新组件会被赋予一个新的存根编号；现有组件的存根不受干扰，因此依赖对象不会失效。当你在顶部添加组件时，包内部的组件顺序发生变化，这会影响现有组件的存根编号。由于依赖组件引用的是存根编号，它们需要重新解析，因此会立即失效。\n\
  \n![images](img/square.jpg)\n\n**提示：** 为了避免在向包中添加新代码段时依赖对象失效，请将函数和过程等新组件添加到包规范和包体的**末尾**——而不是中间。这将保留包内部现有组件的存根编号，并且不会使其依赖项失效。\n\
  \n### 通过显式列引用避免无效化\n\n我将以另一个应影响你编码方式的重要特性来结束关于依赖模型的讨论。依赖跟踪检查列的更改。如果新添加的列未被使用，则依赖项不会失效。例如，考虑在存储代码中使用以下结构的情况。\n\
  \n```sql\nselect * into ... from test where ...;\ninsert into test1 values (...);\n\
  ```\n\n注意，这里没有列名。在第一种情况中，`*` 隐式选择了所有列。当你修改表添加新列时，即使你未在代码中使用该列，`*` 也会隐式引用那个新列，从而使存储代码失效。在第二种情况中，`insert`\
  \ 未指定列列表，因此默认认为所有列都被包含，在 `test1` 中添加新列将迫使该语句检查新列的值，从而强制存储代码失效。因此，你必须避免使用此类结构。你应该在存储代码中使用命名列。\n\
  \n此场景下导致失效的另一个原因是全包含的隐式定义列列表。一些开发人员在追求编写敏捷代码时，会使用这样的声明：\n\n```sql\ndeclare l_test1_rec\
  \ test1%rowtype;\n```\n\n由于未命名列列表，因此默认认为包含了 `test1` 的所有列。所以当你添加列时，会使变量 `l_test1_rec`\
  \ 失效，进而使存储代码失效。不要使用这样的声明。相反，应使用显式命名的列，如下所示：\n\n```sql\nl_trans_id      test1.trans_id%type;\n\
  l_trans_amt     test1.trans_amt%type;\n```\n\n这样，如果添加了新列，它不会影响任何已声明的变量，也不会使该存储代码失效。然而，在你做出决定之前，请理解非常重要的一点：使用\
  \ `%rowtype` 可能使代码维护更容易，因为你无需显式命名变量。另一方面，这样做会使代码更容易受到失效的影响。你应该根据自己的最佳判断来决定采用哪种方式。\n\
  \n\n## Synonyms in Dependency Chains\n\n大多数数据库都使用同义词，这是有充分理由的。与其使用完全限定名称如 *`<SchemaName>.<TableName>`*，创建一个同义词并使用它总是更简单。但请记住，同义词是依赖链中的另一个对象，并会影响级联失效。假设同义词\
  \ S1 位于依赖链中，如下所示：\n\n`P2` ![图片](img/U002.jpg) `P1` ![图片](img/U002.jpg) `PACK1` ![图片](img/U002.jpg)\
  \ `PACK2` ![图片](img/U002.jpg) `S1` ![图片](img/U002.jpg) `VW1` ![图片](img/U002.jpg)\
  \ `T1`\n\n在几乎所有情况下，同义词不会中断链条；它们只是简单地将其引用的对象的失效信息向下游传递，但有一个重要的例外。当你修改一个同义词时，你有两种选择。\n\
  \n*   *删除并重新创建*：你会执行 `drop synonym s1; create synonym s1 as …`\n*   *替换*：你会执行 `create\
  \ or replace synonym s1 as …`\n\n这两种方式的区别可能看起来微不足道，但第一种方法是致命的。当你删除一个同义词时，下游对象引用的就是一个无效对象。在依赖链中，从\
  \ `PACK2` 一直到 `P2` 的所有对象都将被失效。当你重新创建同义词时，这些对象将在下次调用时自动重新编译，但这并非没有代价——会消耗一些宝贵的 CPU\
  \ 周期并获取解析锁。第二种方法不会使任何依赖对象失效。当你修改同义词时，切勿删除并重新创建它——请替换它。\n\n![图片](img/square.jpg)\
  \ `注意` `OR REPLACE` 语法是在 Oracle 的近期版本中引入的。你的一些应用程序脚本可能仍在使用旧的方法。你应该主动寻找并修改这些脚本，将其改为使用更新的\
  \ `CREATE OR REPLACE` 语法。\n\n## Resource Locking\n\n变化是生活的常态。应用程序的需求和范围会发生变化，从而迫使存储代码发生改变。修改存储代码需要独占锁。如果当前有任何会话正在执行该对象或该更改对象所引用的另一个对象，这个独占锁将不可用。让我们用一个示例表和一个访问该表的存储过程来检验这一点：\n\
  \n`create table test1 (col1 number, col2 number);`\n\n`create or replace procedure\
  \ p1`\n`(`\n`     p1_in in number,`\n`     p2_in in number`\n`) as`\n`begin`\n`     update\
  \ test1 set col2 = p2_in where col1 = p1_in;`\n`end;`\n`/`\n\n创建完成后，执行该过程。不要退出该会话。\n\
  \n`SQL> exec p1 (1,1)`\n\n`PL/SQL procedure successfully completed.`\n\n在另一个会话中，尝试向该表添加一个新列。\n\
  \n`SQL> alter table test1 add (col3 number);`\n\n之前的 update 语句会对表中的一行施加一个事务锁。即使表\
  \ `test1` 中没有任何一行数据，这个锁也会存在。这个锁将阻止表的修改操作。在 Oracle 10g 中，这会立即报错：\n\n`alter table\
  \ test1 add (col3 number)`\n`*`\n`ERROR at line 1:`\n`ORA-00054: resource busy and\
  \ acquire with NOWAIT specified`\n\n在 Oracle 11g 中，`ALTER TABLE` 语句不会立即报错；它很可能会等待指定的时间。如果你检查该会话正在等待什么，你应该会得到类似以下的结果：\n\
  \n`SQL> select event from v$session where sid = <Sid>;`\n\n`EVENT`\n`-----------------------`\n\
  `blocking txn id for DDL`\n\n这个 `ddl_lock_timeout` 参数在繁忙的数据库中非常方便，这些数据库中的表被应用程序持续访问，因此几乎没有停机时间让修改命令完成。`ALTER\
  \ TABLE` 语句不会立即以 `ORA-54` 错误退出，而是会等待直到获取到锁。在第一个会话中，如果你执行 `rollback` 或 `commit`，这将结束事务并有效地释放锁，第二个会话将获取到表上的锁，并能够修改该表。在\
  \ 10g 的情况下，该语句必须重新发出。\n\n## Forcing Dependency in Triggers\n\n触发器是任何应用程序代码中不可或缺的一部分。由于它们属于数据库范畴，因此常被视为应用程序之外的东西。但事实绝非如此；支持业务功能的触发器就是应用程序代码的一部分，必须在整个应用程序的上下文中进行评估。触发器会自动执行，并与某些事件相关联，例如在插入前或表更改后。如果使用得当，它们为应用程序的功能提供了一种极好的扩展，而这些功能不受用户操作的控制。\n\
  \n代码设计的最佳实践建议你将代码模块化（构建可以被多次调用的小代码块，而不是创建一个庞大的单体代码）。这能实现许多目标，例如可读性、代码的可重用性、单元测试的能力等等。然而，对于触发器来说，这种策略带来了一个独特的问题。你可以在表上定义多个触发器，但\
  \ Oracle 不保证触发器的执行顺序。相同类型的触发器可以按任何顺序触发。如果它们彼此之间完全独立，这可能不是问题，但如果它们确实依赖于数据，并且一个触发器可能更新另一个触发器使用的数据呢？在这种情况下，执行顺序就极其重要。如果更改数据的触发器在使用该数据的触发器之后触发，那么执行结果将不如预期，可能导致不正确的结果。让我们用一个例子来检验这种情况。考虑以下名为\
  \ `PAYMENTS` 的表：\n\n`Name              Null? Type`\n`  -------------- -------- --------------`\n\
  `PAY_ID                  NUMBER(10)`\n`CREDIT_CARD_NO          VARCHAR2(16)`\n`AMOUNT\
  \                  NUMBER(13,2)`\n`PAY_MODE                VARCHAR2(1)`\n`RISK_RATING\
  \             VARCHAR2(6)`\n`FOLLOW_UP               VARCHAR2(1)`\n\n假设其中只有一行数据。\n\
  \n`SQL> select * from payments;`\n\n`    PAY_ID CREDIT_CARD_NO   AMOUNT P RISK_R\
  \ F`\n`    ------ ---------------- ------ - ------ -`\n`         1`\n\n这些列最初都是空的。`RISK_RATING`\
  \ 列的含义不言自明；它显示了处理该特定支付时的风险类型，有效值为 `LOW`（支付金额低于 1,000）、`MEDIUM`（介于 1,001 和 10,000\
  \ 之间）和 `HIGH`（超过 10,000）。风险较高的支付需要由经理稍后跟进。公司使用标准逻辑来定义风险。由于此风险评级需要自动分配，一个 `before\
  \ update row` 触发器可以很好地完成这项工作，如下所示：\n\n```\ncreate or replace trigger tr_pay_risk_rating\n\
  before update\non payments\nfor each row\nbegin\n        dbms_output.put_line ('This\
  \ is tr_pay_risk_rating');\n        if (:new.amount) < 1000 then\n             \
  \   :new.risk_rating := 'LOW';\n        elsif (:new.amount < 10000) then\n     \
  \           if (:new.pay_mode ='K') then\n                        :new.risk_rating\
  \ := 'MEDIUM';\n                else\n                        :new.risk_rating :=\
  \ 'HIGH';\n                end if;\n        else\n                :new.risk_rating\
  \ := 'HIGH';\n        end if;\nend;\n/\n```\n\n高风险支付原本需要被跟进，但由于经理工作量大，公司决定只跟进某些类型的高风险支付。跟进应针对使用信用卡支付的\
  \ `HIGH` 风险支付，或使用现金支付的 `MEDIUM` 风险支付。此外，来自特定银行（由卡号的第二到第六位数字表示）的信用卡支付也需要被跟进。现在设置了一个触发器，在这些条件下自动将\
  \ `FOLLOW_UP` 列设置为 `Y`，如下所示：\n\n\n"
- "# 触发器执行顺序的重要性\n\n## 问题再现\n\n考虑以下触发器 `tr_pay_follow_up`：\n\n```sql\ncreate or replace\
  \ trigger tr_pay_follow_up\nbefore update\non payments\nfor each row\nbegin\n  \
  \      dbms_output.put_line ('This is tr_pay_follow_up');\n        if (\n      \
  \          (:new.risk_rating = 'HIGH' and :new.pay_mode = 'C')\n               \
  \ or (:new.risk_rating = 'MEDIUM' and :new.pay_mode = 'K')\n                or (substr(:new.credit_card_no,2,5)\
  \ = '23456')\n        ) then\n                :new.follow_up := 'Y';\n        else\n\
  \                :new.follow_up := 'N';\n        end if;\nend;\n/\n```\n\n我特意放置了\
  \ `dbms_output` 行来显示触发器的执行情况。创建这两个触发器后，对表执行更新操作。\n\n```sql\nupdate payments\nset\
  \ credit_card_no = '1234567890123456',\n    amount = 100000,\n    pay_mode = 'K';\n\
  ```\n\n输出如下：\n\n```\nThis is tr_pay_follow_up\nThis is tr_pay_risk_rating\n1 row\
  \ updated.\n```\n\n之后，从表中查询数据。\n\n```sql\nSQL> select * from payments;\n```\n\n\
  ```\n    PAY_ID CREDIT_CARD_NO   AMOUNT P RISK_R F\n    ------ ----------------\
  \ ------ - ------ -\n         1 1234567890123456 100000 K HIGH   N\n```\n\n检查上述输出，您会注意到付款金额超过了\
  \ 10,000——这是 `RISK_RATING` 为 `HIGH` 的条件。触发器计算了该条件并正确设置了值。付款方式是现金（`PAY_MODE` 设置为\
  \ `K`），金额是 100,000，信用卡号也匹配了模式“23456”——这些都是 `FOLLOW_UP` 应为“Y”的条件；但结果却是“N”。难道触发器没有触发吗？不，它触发了，您在执行更新语句后的输出中看到了“`This\
  \ is tr_pay_follow_up`”。如果触发器触发了，为什么没有正确设置值呢？\n\n答案在于触发器的执行顺序。请注意执行更新语句后的输出。第一个触发的是\
  \ `tr_pay_follow_up`；而不是 `tr_pay_risk_rating`。当触发器触发时，所有列的值都满足 `follow_up` 的条件，但\
  \ `RISK_RATING` 是 `NULL`。因此，触发器没有找到满足 `follow-up` 条件的行。当另一个触发器触发后，它正确设置了 `RISK_RATING`\
  \ 列，但此时前一个触发器已经执行完毕，不会再次执行。然而，如果触发器的执行顺序相反（风险评级触发器在前，跟进触发器在后），情况就会如您所预期的那样。\n\n\
  这是一个很好的例子，说明了触发器执行顺序对应用程序逻辑至关重要。显然，当前示例会被视为应用程序代码中的一个错误。更糟糕的是，这个场景无法随意重现；有时执行顺序符合预期，有时则相反。如果您有大量的此类触发器，出现错误的可能性会更高。\n\
  \n您可以通过将所有代码放在单个更新前行触发器中来控制执行代码，从而解决此问题。您可以为每个触发器逻辑创建单独的过程，并在单个更新前行触发器中调用它们。这可能有效，但并不建议，因为您只有一个触发器。如果您想禁用其中一个触发器的功能怎么办？如果有多个触发器，您只需禁用该触发器，并在需要时重新启用。\n\
  \n## 解决方案：指定执行顺序\n\n在 Oracle Database 11g Release 1 中，有一个优雅的解决方案。您可以指定触发器的执行顺序。\n\
  \n```sql\ncreate or replace trigger tr_pay_follow_up\nbefore update\non payments\n\
  for each row\nfollows tr_pay_risk_rating\nbegin\n        dbms_output.put_line ('This\
  \ is tr_pay_follow_up');\n        if (\n                (:new.risk_rating = 'HIGH'\
  \ and :new.pay_mode = 'C')\n                or (:new.risk_rating = 'MEDIUM' and\
  \ :new.pay_mode = 'K')\n                or (substr(:new.credit_card_no,2,5) = '23456')\n\
  \        ) then\n                :new.follow_up := 'Y';\n        else\n        \
  \        :new.follow_up := 'N';\n        end if;\nend;\n/\n```\n\n注意子句 `follows\
  \ tr_pay_risk_rating`，它指定该触发器应在风险评级触发器之后执行。现在您可以保证触发器的执行顺序：风险评级触发器先触发，然后是跟进触发器。使用这个新设置后，如果您重新执行前面的示例，将看到以下结果：\n\
  \n```\n… perform the same update as before …\nThis is tr_pay_risk_rating\nThis is\
  \ tr_pay_follow_up\n1 row updated.\n```\n\n```sql\nSQL> select * from payments;\n\
  ```\n\n```\n    PAY_ID CREDIT_CARD_NO   AMOUNT P RISK_R F\n    ------ ----------------\
  \ ------ - ------ -\n         1 1234567890123456 100000 C HIGH   Y\n1 row selected.\n\
  ```\n\n现在的执行顺序是 `tr_pay_risk_rating` 然后是 `tr_pay_follow_up`——这是有保证的。第一个触发器正确设置了列值，这使得第二个触发器能够正确计算跟进标志。此功能现在允许您构建模块化代码，并可以随意开启和关闭。\n\
  \n\n\n### 初始创建时禁用触发器\n\n谈到触发器，还有一个问题甚至会困扰最有经验和最谨慎的开发者。在许多组织中，诸如新触发器代码之类的应用程序变更会在一个计划好且已批准的“变更窗口”内部署，这个窗口通常是影响应用程序最小的时间段，并且所有相关组件会一起部署。假设你正在为一个表创建一个新触发器（而不是修改现有的触发器）。应用程序变更已完美协调，你创建了新的触发器，如下所示：\n\
  \n```sql\ncreate or replace trigger tr_u_r_test1\nbefore update on test1\nfor each\
  \ row\ndeclare\n    l_col1 number;\nbegin\n    select col1 into l_col1 from test3\
  \ where col1 = :new.col1;\n    if (l_col1 > 10000) then\n        :new.col2 := :new.col2\
  \ * 2;\n    end if;\nend;\n/\n```\n\n然后它失败并显示此消息：\n\n```\nWarning: Trigger created\
  \ with compilation errors.\n```\n\n```\nSQL> show error\nErrors for TRIGGER TR_U_R_TEST1:\n\
  LINE/COL ERROR\n-------- -----------------------------------------------------------------\n\
  4/2      PL/SQL: SQL Statement ignored\n6/7      PL/SQL: ORA-00942: table or view\
  \ does not exist\n```\n\n令你震惊的是，你发现遗漏了一个小小的先决条件——用户未被授予在表 `TEST3` 上的 `select` 权限，因此触发器主体无效。然而，由于它是启用状态，更新语句仍会触发该触发器。你可以通过检查触发器状态来确认这一点。\n\
  \n```sql\nselect status from user_triggers where trigger_name = 'TR_U_R_TEST1';\n\
  ```\n\n```\nSTATUS\n--------\nENABLED\n```\n\n触发器处于启用状态这一事实造成了一个非常严重的情况。因为这是一个更新触发器，并且它是启用的，所以更新语句将在该表上失败。以下是一个示例：\n\
  \n```\nSQL> update test1 set col2 = 2;\nupdate test1 set col2 = 2\n       *\nERROR\
  \ at line 1:\nORA-04098: trigger 'ARUP.TR_U_R_TEST1' is invalid and failed re-validation\n\
  ```\n\n由于触发器已启用，它将为每一行被更新的行触发，但所有执行都会失败，因为代码无效。这种执行失败会导致应用程序中断。你可以通过删除触发器或禁用它来立即修复中断。\n\
  \n```sql\ndrop trigger tr_u_r_test1;\nalter trigger tr_u_r_test1 disable;\n```\n\
  \n然而，在一个繁忙的系统中，你可能无法获得锁来实施这两种解决方案中的任何一种，导致中断持续更长时间。为了解决这个问题，Oracle 11g 提供了一个更好的选项；你可以最初创建禁用的触发器，如下所示。注意\
  \ `disable` 子句。\n\n```sql\ncreate or replace trigger tr_u_r_test1\nbefore update\
  \ on test1\nfor each row\ndisable\ndeclare\n    l_col1 number;\nbegin\n    select\
  \ col1 into l_col1 from test3 where col1 = :new.col1;\n    if (l_col1 > 10000) then\n\
          :new.col2 := :new.col2 * 2;\n    end if;\nend;\n```\n\n在此触发器创建后，如果你检查其状态，它将处于禁用状态。如果触发器由于缺少对象或权限而无法编译，它不会引起任何应用程序问题，因为它不会被启用。如果触发器未能编译，你会立即知道，并能够通过添加引用的对象或授予必要的权限来纠正问题。这样，在启用触发器之前，你就拥有了所有必要的先决条件。你也可以以稍有不同的方式使用此功能；你可以在变更窗口之前创建触发器，并在窗口期间使用\
  \ `alter trigger … enable` 命令来启用它。\n\n### 总结\n\n由于父对象的更改而导致的依赖对象验证是不可避免的。在本章中，你学习了减少失效次数的不同技术。让我们总结一下开发失效机会更少、依赖链更短的应用程序所需了解的关键点。\n\
  \n*   依赖链显示了其他人如何引用对象。更改一个对象可能使依赖对象的有效性受到质疑。为了解决这种可能性，Oracle 可能会将它们标记为无效，强制稍后重新解析。\n\
  *   当对象变为无效时，可以手动重新编译它们以使其有效。当某些会话调用它们时，对象将在运行时被强制重新编译。\n*   解析需要解析锁和 CPU 周期，因此会影响性能。\n\
  *   在 RAC 数据库中，失效和重新验证必须在所有实例中发生。这导致实例间消息传递和锁定增加，加剧了性能问题。\n*   包提供不同类型的依赖。包体（而不是规范）依赖于在代码中引用的对象。因此，当引用的对象被更改时，规范不会失效（除非规范也引用了被更改的对象）。包的依赖项显示规范作为引用，而不是包体。因此，虽然对引用对象的更改可能会使包体失效，但包规范可能保持有效，不会导致下游失效。\n\
  *   使用包而不是独立的存储过程和函数，以缩短依赖链并减少失效。\n*   向包中添加新的存储过程和函数时，始终添加到末尾，而不是中间或顶部。\n*   考虑在包内使用视图而不是表，这将把表的变更与包隔离开来，减少失效。\n\
  *   更改同义词时，使用 `CREATE OR REPLACE synonym` 语法，而不是 `drop/create`。\n*   不要使用类似 `select\
  \ *` 或 `insert into <Table> values (…)` 的结构。明确使用列名以减少隐式列的使用，并降低失效的可能性。\n*   避免引用整个行的声明，例如\
  \ `TableName%rowtype`。而是使用 `TableName.ColumnName%type`。\n*   为不同类型的代码使用多个触发器。通过\
  \ `FOLLOWS` 子句建立依赖关系和执行顺序。\n*   始终创建禁用状态的触发器，并且仅在它编译良好后才启用它。\n*   当更改一个可能正在使用的对象时，与其关闭应用程序来获取锁，不如使用\
  \ `ddl_lock_timeout` 参数让 alter 语句等待合适的时间。\n\n所有这些建议都只是建议，而不是需要盲目遵循的教条。你必须根据你的特定场景仔细考虑它们，并在实际实施前权衡利弊。在本章中，你了解了依赖关系如何工作、失效如何发生以及如何避免它们，从而使你的应用程序具有高可用性，并通过减少不必要的工作（如强制解析）来提高应用程序性能。\n\
