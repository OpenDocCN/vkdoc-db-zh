  trans: "\n# 基于函数的索引\n\n应用于索引列的函数会完全禁用该索引在执行计划中的使用。为了解决这个问题，自 Oracle 8*i* 起就提供了基于函数的索引，允许对此类表达式进行索引。在下面的清单中，我演示了基于函数的索引在一个使用\
    \ PL/SQL 函数谓词的查询中的用法。清单 9-44 从一个应用于高选择性索引列的简单 PL/SQL 函数开始。\n\n## 清单 9-44. 应用于索引列的\
    \ PL/SQL 函数\n\n```sql\nSQL> CREATE FUNCTION promo_function(\n  2             \
    \     p_promo_category IN VARCHAR2\n  3                  ) RETURN VARCHAR2 DETERMINISTIC\
    \ IS\n  4  BEGIN\n  5     RETURN UPPER(p_promo_category);\n  6  END promo_function;\n\
    \  7  /\n```\n\n`Function created.`\n\n```sql\nSQL> SELECT *\n  2  FROM   sales\
    \       s\n  3  ,      promotions  p\n  4  ,      times       t\n  5  WHERE  s.promo_id\
    \ = p.promo_id\n  6  AND    s.time_id  = t.time_id\n  7  AND    t.time_id BETWEEN\
    \ DATE '2000-01-01' AND DATE '2000-03-31'\n  8  AND    `promo_function(p.promo_category)`\
    \ = 'AD NEWS';\n```\n\n```\nExecution Plan\n----------------------------------------------------------\n\
    \n-------------------------------------------------------------\n| Id  | Operation\
    \                       | Name       | Rows  |\n-------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT                |            | 51609 |\n|*  1 |  HASH\
    \ JOIN                      |            | 51609 |\n|   2 |   PART JOIN FILTER\
    \ CREATE       | :BF0000    |    92 |\n|   3 |    TABLE ACCESS BY INDEX ROWID|\
    \ TIMES      |    92 |\n|*  4 |     INDEX RANGE SCAN          | TIMES_PK   | \
    \   92 |\n|*  5 |   HASH JOIN                   |            | 52142 |\n|*  6\
    \ |    TABLE ACCESS FULL          | PROMOTIONS |     5 |\n|   7 |    PARTITION\
    \ RANGE SINGLE     |            | 62197 |\n|*  8 |     TABLE ACCESS FULL     \
    \    | SALES      | 62197 |\n-------------------------------------------------------------\n\
    ```\n\n你可以看到，尽管在 `PROMO_CATEGORY` 列上有一个索引，但对该列应用 PL/SQL 函数迫使 CBO 选择对 `PROMOTIONS`\
    \ 表进行 *全表扫描*（它别无选择）。幸运的是，我可以使用基于函数的索引来解决这个问题（*仅因为* `PROMO_FUNCTION` 是确定性的）。在清单\
    \ 9-45 中，我创建了基于函数的索引并包含了新的执行计划。\n\n## 清单 9-45. 使用基于函数的索引\n\n```sql\nSQL> CREATE\
    \ INDEX promotions_fbi\n  2     ON promotions (`promo_function(promo_category)`)\n\
    \  3     COMPUTE STATISTICS;\n```\n\n`Index created.`\n\n```\nExecution Plan\n\
    ----------------------------------------------------------\nPlan hash value: 3568243509\n\
    \n-----------------------------------------------------------------\n| Id  | Operation\
    \                       | Name           | Rows  |\n-----------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT                |                | 51609 |\n|*  1 |  HASH\
    \ JOIN                      |                | 51609 |\n|   2 |   PART JOIN FILTER\
    \ CREATE       | :BF0000        |    92 |\n|   3 |    TABLE ACCESS BY INDEX ROWID|\
    \ TIMES          |    92 |\n|*  4 |     INDEX RANGE SCAN          | TIMES_PK \
    \      |    92 |\n|*  5 |   HASH JOIN                   |                | 52142\
    \ |\n|   6 |    TABLE ACCESS BY INDEX ROWID| PROMOTIONS     |     5 |\n|*  7 |\
    \     INDEX RANGE SCAN          | PROMOTIONS_FBI |     2 |\n|   8 |    PARTITION\
    \ RANGE SINGLE     |                | 62197 |\n|*  9 |     TABLE ACCESS FULL \
    \        | SALES          | 62197 |\n-----------------------------------------------------------------\n\
    ```\n\n```\nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
    \n   1 - access(\"S\".\"TIME_ID\"=\"T\".\"TIME_ID\")\n   4 - access(\"T\".\"TIME_ID\"\
    >=TO_DATE(' 2000-01-01 00:00:00', 'syyyy-mm-dd hh24:mi:ss') AND\n            \
    \  \"T\".\"TIME_ID\"<=TO_DATE(' 2000-03-31 00:00:00', 'syyyy-mm-dd hh24:mi:ss'))\n\
    \   5 - access(\"S\".\"PROMO_ID\"=\"P\".\"PROMO_ID\")\n   7 - access(`\"SH\".\"\
    PROMO_FUNCTION\"(\"PROMO_CATEGORY\")`='AD NEWS')\n   9 - filter(\"S\".\"TIME_ID\"\
    <=TO_DATE(' 2000-03-31 00:00:00', 'syyyy-mm-dd hh24:mi:ss'))\n```\n\n这次 CBO 选择使用基于函数的索引。不仅因为索引存在，而且\
    \ CBO 还有一些统计数据可用于选择最优计划。\n\n如果你想研究基于函数的索引，可以在诸如 `USER_INDEXES`、`USER_IND_EXPRESSIONS`\
    \ 和 `USER_TAB_COLS`/`USER_IND_COLUMNS`（索引表达式作为被索引表中的隐藏虚拟列存储）等视图中找到关于其实现的元数据。\n"
- fmt: "# Extended Statistics\n\nStatistics are one of the benefits of function-based\
    \ indexes. These can be invaluable to the CBO (even if it chooses not to use the\
    \ index, it can make use of the statistics in deciding join or predicate orders).\
    \ However, indexing a PL/SQL function predicate might not always be possible.\
    \ In such cases, Oracle Database 11g provides an alternative known as extended\
    \ statistics.\n\nExtended statistics can be created on expressions without requiring\
    \ a supporting index. Such statistics are known as extensions and they have an\
    \ added benefit over function-based indexes of being applicable to all PL/SQL\
    \ function expressions in a query (i.e. not just those in predicates).\n\nTo demonstrate\
    \ this, I have re-executed the sales report by customer with extended statistics\
    \ in place. [Listing 9-46](#Chapter09.html#list_9_46) is a reminder of the query\
    \ without extended statistics, together with its execution plan and function call\
    \ output from [Listing 9-5](#Chapter09.html#list_9_5).\n\n## Listing 9-46. Using\
    \ Extended Statistics on a Projected PL/SQL Function (Plan without Statistics\
    \ from [Listing 9-5](#Chapter09.html#list_9_5))\n\n```sql\nSQL> SELECT t.calendar_year\n\
    \  2  ,      format_customer_name(\n  3            c.cust_first_name, c.cust_last_name\n\
    \  4            )                 AS cust_name\n  5  ,      SUM(s.quantity_sold)\
    \ AS qty_sold\n  6  ,      SUM(s.amount_sold)   AS amt_sold\n  7  FROM   sales\
    \     s\n  8  ,      customers c\n  9  ,      times     t\n 10  WHERE  s.cust_id\
    \ = c.cust_id\n 11  AND    s.time_id = t.time_id\n 12  GROUP  BY\n 13        \
    \ t.calendar_year\n 14  ,      format_customer_name(\n 15            c.cust_first_name,\
    \ c.cust_last_name\n 16            )\n 17  ;\n\n11604 rows selected.\n```\n\n\
    Elapsed: 00:00:06.94\n\n```\nExecution Plan\n----------------------------------------------------------\n\
    Plan hash value: 3113689673\n\n-------------------------------------------------------------\n\
    | Id  | Operation                      | Name      | Rows  |\n-------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT               |           |   918K|\n|   1 |  HASH GROUP\
    \ BY                 |           |   918K|\n|*  2 |   HASH JOIN              \
    \      |           |   918K|\n|   3 |    PART JOIN FILTER CREATE     | :BF0000\
    \   |  1826 |\n|   4 |     TABLE ACCESS FULL          | TIMES     |  1826 |\n\
    |*  5 |    HASH JOIN                   |           |   918K|\n|   6 |     TABLE\
    \ ACCESS FULL          | CUSTOMERS | 55500 |\n|   7 |     PARTITION RANGE JOIN-FILTER|\
    \           |   918K|\n|   8 |      TABLE ACCESS FULL         | SALES     |  \
    \ 918K|\n-------------------------------------------------------------\n\nStatistics\n\
    ----------------------------------------------------------\n       3189  consistent\
    \ gets\n          0  physical reads\n\nSQL> exec counter.show('Function calls');\n\
    ```\n\nFunction calls: 918843\n\n```\nPL/SQL procedure successfully completed.\n\
    ```\n\nAs you can see, this performs over 918,000 function calls and completes\
    \ in roughly 7 seconds. In [Listing 9-47](#Chapter09.html#list_9_47), I've used\
    \ `DBMS_STATS` to generate extended statistics on the PL/SQL function call and\
    \ show the execution plan from the re-executed query.\n\n## Listing 9-47. Generating\
    \ and Using Extended Statistics\n\n```sql\nSQL> BEGIN\n  2     DBMS_STATS.GATHER_TABLE_STATS(\n\
    \  3        ownname    => USER,\n  4        tabname    => 'CUSTOMERS',\n  5  \
    \      method_opt => 'FOR COLUMNS (format_customer_name(cust_first_name,cust_last_name))\
    \ SIZE AUTO'\n  6        );\n  7  END;\n  8  /\n\nPL/SQL procedure successfully\
    \ completed.\n\nSQL> SELECT t.calendar_year...\n\n11604 rows selected.\n```\n\n\
    Elapsed: 00:00:00.90\n\n```\nExecution Plan\n----------------------------------------------------------\n\
    Plan hash value: 833790846\n\n---------------------------------------------------------------\n\
    | Id  | Operation                        | Name      | Rows  |\n---------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT                 |           | 19803 |\n|   1 |  HASH\
    \ GROUP BY                   |           | 19803 |\n|*  2 |   HASH JOIN      \
    \                |           | 24958 |\n|   3 |    VIEW                      \
    \    | VW_GBC_9  | 24958 |\n|   4 |     HASH GROUP BY                |       \
    \    | 24958 |\n|*  5 |      HASH JOIN                   |           |   918K|\n\
