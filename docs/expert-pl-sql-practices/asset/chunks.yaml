- fmt: "#### Why is This Program Slow?\n\nMoving from theory to practice, let's examine\
    \ program `p`. Why is program `p` slow?\n\n```\nSQL> exec p\nPL/SQL procedure\
    \ successfully completed.\nSQL>\n```\n\nObviously, I'm missing a crucial element.\
    \ Without more information, I can only guess about why program `p` is slow. Around\
    \ the office, I have heard countless times what could be described as our corporate\
    \ mantra.\n\n> Why guess when you can know?\n>\n> —Cary Millsap\n\nOf course I\
    \ can know—I just need to measure. “Slow” is measured in units of time, so I need\
    \ to measure the elapsed time of program `p`.\n\n```\nSQL> set timing on\nSQL>\
    \ exec p\nPL/SQL procedure successfully completed.\nElapsed 00:03:07.42\nSQL>\n\
    ```\n\nNow I know that program `p` executed in 3 minutes, 7.42 seconds. That's\
    \ a good start, but in order to have any idea about what parts of the code in\
    \ program `p` I need to improve, I need to measure all of the parts of the code\
    \ in detail. (That's Step 2 in Method R, which I'll describe in detail later).\
    \ The detailed measurements are best presented in a profile. How then do I get\
    \ the right measurements to create a profile? I need *instrumentation*. Instrumentation\
    \ is what you add to the code to make generation of a profile possible.\n\nFirst,\
    \ here's what the code looks like now:\n\n```\nCREATE OR REPLACE PROCEDURE p AS\n\
    BEGIN\n  q;\n  r;\n  s;\nEND;\n```\n\nNow I add the instrumentation.\n\n```\n\
    CREATE OR REPLACE PROCEDURE p AS\n  t0 NUMBER;\n  t1 NUMBER;\n  t2 NUMBER;\n \
    \ t3 NUMBER;\nBEGIN\n  t0 := DBMS_UTILITY.GET_TIME;\n  q;\n  t1 := DBMS_UTILITY.GET_TIME;\n\
    \  DBMS_OUTPUT.PUT_LINE ('Procedure q: ' || (t1 - t0)/100 || ' seconds');\n  r;\n\
    \  t2 := DBMS_UTILITY.GET_TIME;\n  DBMS_OUTPUT.PUT_LINE ('Procedure r: ' || (t2\
    \ - t1)/100 || ' seconds');\n  s;\n  t3 := DBMS_UTILITY.GET_TIME;\n  DBMS_OUTPUT.PUT_LINE\
    \ ('Procedure s: ' || (t3 - t2)/100 || ' seconds');\n  DBMS_OUTPUT.PUT_LINE ('Total\
    \ Elapsed: ' || (t3 - t0)/100 || ' seconds');\nEND;\n```\n\nHere are the results\
    \ after execution of this instrumented code:\n\n```\nSQL> set timing on serveroutput\
    \ on\nSQL> exec p\nProcedure q: 1.05 seconds\nProcedure r: 172.59 seconds\nProcedure\
    \ s: 14.11 seconds\nTotal Elapsed: 187.75 seconds\nElapsed 00:03:07.75\nSQL>\n\
    ```\n\nI now know something very important that I could never have known without\
    \ instrumentation of some kind. The results provide a *profile*, an invoice of\
    \ where my time was spent in the code. I admit that the instrumentation shown\
    \ here is clunky, and I wouldn't recommend calling such code “finished,” but even\
    \ instrumentation as clunky as this is powerful. I'll discuss improvements to\
    \ the instrumentation method in the next section.\n\nNow I know that spending\
    \ my time optimizing procedure `q` will gain very little benefit—no more than\
    \ 1.05 seconds (0.56%) of 187.75 seconds total. Likewise, optimizing procedure\
    \ `s` will gain no more than 14.11 seconds (7.52%). The majority of my time was\
    \ spent in procedure `r`, so that's where I should spend my optimization time\
    \ and effort. What if I had decided to start working on procedure `q` or `s`?\
    \ I may have been able to improve the individual response times of those procedures\
    \ drastically, but if my objective had been to reduce the overall response time\
    \ by 1 minute, my efforts would have been unsuccessful. Why *guess*? You can *know*\
    \ where to focus your attention.\n\nInstrumentation makes your code faster, easier\
    \ to maintain, and cheaper to write. Instrumentation makes your code faster because\
    \ it shows you all of your opportunities for making your code more efficient,\
    \ both while you're writing it and after you're done. Instrumentation makes your\
    \ code easier to maintain because it shows you exactly what your analysts are\
    \ talking about when they say that your code is too slow. Instrumentation makes\
    \ your code cheaper to write because it focuses your tuning efforts only upon\
    \ the parts of your code where performance really matters. Good instrumentation\
    \ is your proof that the performance requirements for your code have been met.\n\
    \n### Measurement Intrusion\n\nNotice in my short example that the elapsed time\
    \ after adding instrumentation was 3:07.75 seconds, 0.33 seconds longer than the\
    \ original 3:07.42 seconds. Imagine that those measurements had been computed\
    \ as an average over the course of a thousand executions. Instrumentation is code,\
    \ and all code contributes to the overall response time of a unit of work. Smart\
    \ developers know that removing extraneous and unnecessary code is critical to\
    \ performance optimization.\n\nSo should you consider this instrumentation code\
    \ extraneous and unnecessary? Absolutely not! Code must not only fulfill the requirements\
    \ of the task but also perform well throughout the life of the software.\n\nTom\
    \ Kyte, the “Tom” behind `http://asktom.oracle.com/`, was once asked at a conference\
    \ how much the measurement intrusion effect was for all of the instrumentation\
    \ built into the Oracle database (the data published through the various V$ and\
    \ X$ fixed views, the extended SQL trace data, and so on). He paused thoughtfully\
    \ and then responded confidently that the measurement intrusion amounted to *negative*\
    \ ten percent or possibly less. He went on to explain that without the instrumentation\
    \ coded in the Oracle Database kernel, the developers in Oracle Server Technologies\
    \ would have been unable to optimize their code effectively. As a direct result\
    \ of having the level of detail their instrumentation provides, the developers\
    \ are able to improve the performance of the code in every release.\n\n### Identification\n\
    \nIn addition to code that provides response time values for individual program\
    \ units, instrumentation can also be used to identify application code in the\
    \ database. The ability to associate resources consumed in the database directly\
    \ with specific business tasks is a critical component of performance optimization.\
    \ Oracle provides many different ways to accomplish this goal."
