    本章阐述了如何最好地理解你所负责的代码。它介绍了 Oracle 原生提供的不同类型的代码分析方法，并展示了如何在日常开发中使用这些工具。你现在应该理解了静态代码分析和动态代码分析各自的优点。你也应该能够坐下来配置这些工具、使用它们并理解其输出。


    我回顾了对静态分析最重要的数据字典视图，并展示了它们与 Oracle 在 11g 中提供的 `PL/Scope` 实用程序相比有何特点。本章随后转向动态分析，以及从这些工具中可以获取的数据类型。


    实施本章建议的一个美妙之处在于，这里的内容本就应该是你已经在做的——本章只是向你展示如何更高效地完成这一切，以及如何避免人为错误。你应该已经有了标准；你应该已经在做代码审查；你应该在投产前智能地为代码添加插桩并进行性能分析，这样你就能确信当代码进入生产环境后，它将可靠运行且易于维护。


    在你的环境中充分利用这些工具所付出的努力是一次性的前期投入，然后你会在今后的每个项目中持续受益。在根据本章信息创建你自己的报告和工具之前，我建议你创建或完善你的编码和测试标准。如果每个人在开发
    `PL/SQL` 时都使用相同的标准，你将从这些工具中获得更多价值，并能够自动化更多的审查和测试。


    你不必使用 Oracle 提供的工具。有第三方工具也能提供大部分此功能，它们很可能使用的就是本章讨论的那些内容。重要的是，你决定将影响分析和其他代码分析纳入你的工作流程，以构建质量更高的应用程序。


    同时，不要觉得你被“困在”开箱即用的功能里。创建你自己的查询表，并将 `PL/Scope` 之类的东西作为起点。对数据进行加工，直到你获得认为有价值的东西。不要把本章呈现的内容当作终点，它应被视为起点。


    阅读本章后，我希望你“明白”了源代码分析为何有用。我也真诚地希望你不会认为代码审查和性能分析不值得付出努力。如果你真这么想，我只请求你阅读本书的其余部分（特别是第
    13 章）并思考一下。


    任何新事物都可能显得复杂，并会干扰你的常规流程。如果你从未参与过代码审查，第一次会令人望而生畏。一旦你开始享受到更少漏洞、更优代码的好处，你就会接受这个想法。代码分析也是如此：一旦你完成了第一次分析工作，此后它真的就不会很难，而且其收益会在程序的整个生命周期内持续带来回报。


    不要将了解你的代码当作开发的附加项。将其内建于流程中。做到心中有数；而非凭空猜测。


    ## 第 8 章


    ## 面向契约编程


    作者：John Beresniewicz


    本章将向你介绍一种强大的软件工程范式，称为**契约式设计**（Design by Contract），以及一种将其应用于 `PL/SQL` 编程的方法。


    ### 契约式设计


    2000 年的某天，我第一次读到以下引文时，它对我而言宛如一道软件真理的启示：


    > 契约式设计是一个强有力的隐喻……它使得设计出比以往可靠性高得多的软件系统成为可能；其关键在于理解可靠性问题（更常见的叫法是漏洞）主要发生在模块边界处，并且最常源于双方期望的不一致。契约式设计通过鼓励模块设计者基于精确定义的相互义务和权益声明来与其他模块沟通，而非寄希望于一切顺利的模糊愿望，从而为此问题提供了一种更为系统化的方法。

    >

    > —Bertrand Meyer, *Object Success*


    当时我作为 DBA 的 Oracle 性能诊断工具开发工作的一部分，已经编写了大量 `PL/SQL` 代码，并开始厌恶追踪运行时漏洞，其中很多正是 Meyer
    所指出的那类，即关于模块间 API 的误用或混淆。将这类漏洞从我的代码中工程化消除的承诺，激励我深入了解契约式设计并设法将其应用于 `PL/SQL` 编程。


    #### 软件契约


    契约式设计指出，软件模块之间存在客户-供应者关系，这种关系可以模仿法律合同来建模，即双方基于共同的自身利益和义务达成协议。每一方都期望从合同中以某种方式获益，而每一方通常也因合同而承担某些义务。在软件世界中，可以将契约视为调用模块与被调用模块之间
    API 必须遵循的运行规则。调用模块在 API 被调用时提供一些输入值或其他系统状态，而被调用模块则被期望在完成时可靠地计算出某些输出或最终系统状态。如果管理这些输入输出的规则被打破，就构成契约违规，软件就存在缺陷，或者说漏洞。


    软件契约管理 API 的概念之所以强大，原因有很多，但最主要的是因为高比例的漏洞源于 API 边界处的混淆或误用，正如 Meyer 引文所暗示的。如果我们能够以某种方式强制执行
    API 契约，使得契约违规能被立即暴露，我们就能快速发现一整类漏洞，从而大幅提高软件的可靠性。

    '
- fmt: '#### Basic Contract Elements


    Three basic formal elements are used to define the terms of software contracts:
    `preconditions`, `postconditions`, and `invariants`. These abstract contract elements
    are documented and enforced in the code by using software mechanisms typically
    called `assertions`.


    ##### Preconditions


    `Preconditions` are conditions or states that must be true in order for a module
    to compute correct results. They represent obligations on the callers of a module
    under the contract and accrue benefits to the module itself. Preconditions benefit
    the module because they represent hard facts that the module’s algorithms can
    rely on. Preconditions oblige callers because it is the responsibility of callers
    to make sure the preconditions are met prior to calling the module.


    It is a contract violation to call the module while failing to satisfy the preconditions;
    therefore precondition violations indicate bugs in the calling code. The module
    is not even under any obligation to compute a result in this case, as the “terms
    of the deal” have not been met.


    At the code level, preconditions are ideally checked prior to module entry by
    the execution environment itself. Since `PL/SQL` does not offer native support
    for contract elements, it is recommended that all modules enforce their preconditions
    immediately upon module entry, especially those that govern the validity of input
    variable values.


    ##### Postconditions


    `Postconditions` specify conditions on the output or computed results that the
    module guarantees will be true when it completes its computation, provided the
    preconditions have been met. They represent a fundamental obligation on the module
    to compute correct results. Postconditions are a benefit to the callers of the
    module precisely in that they allow callers to trust the module’s output.


    Failure to satisfy postconditions is a contract violation by the module itself,
    and indicates defects are present in the module. As a practical matter at the
    code level, it can be very difficult to assert the full correctness of a module’s
    outputs at runtime either from within or without the module, as doing so can imply
    having independent implementations of the module’s computational requirements
    to compare against each other for equality.


    However, it may often be the case that limited or partial postconditions can be
    imposed on the module’s outputs that are sufficient to indicate a contract violation.
    For instance, if a function is intended to compute some result that should always
    be a positive number, then it will be a contract violation for it to return a
    negative number, and this can be imposed as a postcondition on the module.


    Unit and regression testing can be thought of as validating postconditions under
    known preconditions and input values.


    ##### Invariants


    `Invariants` specify states or conditions that should always hold true. For instance,
    a `PL/SQL` package may make use of private shared data structures accessed and
    perhaps modified by the package’s modules. There may be various consistency or
    integrity requirements over these data structures that can be defined and considered
    shared contract elements imposed on the entire package itself.


    A module that completes execution and causes the invariants to become invalid
    has a bug. Invariants can be difficult to identify and express programmatically
    and are often expensive to enforce.


    ### Assertions


    `Assertions` are the basic mechanism for expressing and enforcing software contract
    elements in the code itself. Assertions basically encapsulate statements about
    system state that must be true or there is an error. That is, when an assertion
    tests false, the system is known to be in error; this should be communicated out,
    usually in the form of an exception.


    Technically, `preconditions`, `postconditions`, and `invariants` are all different
    kinds of assertions as they capture different contract elements. In applying Design
    by Contract to `PL/SQL` programming, I recommend building a simple and consistent
    assertion mechanism and using that mechanism to express and enforce preconditions,
    postconditions, and invariants (where possible.)


    Assertions are essentially correctness tests built directly into the software
    that find and signal bugs at runtime and as such are a powerful means of ensuring
    software reliability.


    ## Implementing PL/SQL Contracts


    With the conceptual framework for Design by Contract in place, the next step is
    to design and implement a `PL/SQL` assertion mechanism (or mechanisms) with which
    to enforce software contracts between `PL/SQL` programs.'
