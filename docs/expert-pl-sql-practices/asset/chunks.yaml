    With a procedure in place, your refactoring exercise changes and becomes more
    complete. This time you can create and populate the new table, and once you are
    sure the data has been correctly populated, drop the old column, removing the
    duplicate data and the potential for inconsistent entries. You can also use your
    execution script to complete the first round of testing, verifying that the procedure
    executes and returns the expected results set. While you can always test a query
    in the database, that test is of limited value if the application can contain
    its own version of the code. Later in this chapter you learn how to use schema
    permissions to ensure that the procedures have been used consistently throughout
    the application so you can remain confident that refactoring the database will
    not impact the application layer. For now, execute the code in [Listing 12-7](#Chapter12.html#list_12_7).


    ***Listing 12-7.** Refactoring Exercise Using a PL/SQL API*


