  trans: '

    ### 什么是单元测试？


    单元测试（*unit testing*）是 Java 和敏捷开发社区常用的术语，指编写小型、可重复的测试，用于测试一个“工作单元”或某个职责领域。编写单元测试在
    Java 开发社区很常见，开发者通常在编写代码的同时编写测试。许多 Java 开发者使用 `JUnit`——一个用于编写单元测试的开发框架。大多数认真的 Java
    开发者都会在编写开发代码的同时编写单元测试。有些人甚至在开始编写代码之前就先写好测试。他们知道代码预期的输入类型，也知道预期的结果，因此可以提前构建测试。Java
    界的普遍理念是“写一点，测一点；再写一点，再测一点……”，这是明智的建议。


    尽管 `PL/SQL` 开发者多年来一直在开发 `PL/SQL` 程序单元，并采用基于纸面的测试或使用 `SQL*Plus`，但支持构建测试套件来支撑和测试代码的单元测试框架却非常少。一些开发者确实会构建回归测试，但如果没有框架，构建单元测试会耗费时间，而且很难向管理层证明额外投入的合理性，因此大多数人并未涉足这一领域。在会议和培训活动中就此主题进行演讲时，通常只有一两位听众在为其
    `PL/SQL` 回归测试编写单元测试。


    作为 `PL/SQL` 开发者，你应该将单元测试视为开发周期的一部分，视为可交付成果的一部分。在编写 `PL/SQL` 代码的同时编写单元测试，并将其与程序单元一起存储。你应该能够随时运行和重新运行测试，以验证代码是否仍然按预期和期望的方式工作。


    #### 调试还是测试？


    调试一段代码和为其构建单元测试有什么区别？这不是一个非此即彼的情况：你确实需要调试代码以确保其完成所需功能，或者找出它为什么没有按你认为应该的方式工作。然而，如果考虑差异，其中一个区别在于可重复性。如果你编写了一个
    `PL/SQL` 程序单元，并希望验证其是否执行了你期望的功能，一旦它成功编译，你就可以在代码的不同点插入检测代码，以验证状态、变量值、哪些过程调用了哪些过程等等。你可以传入不同的参数集并验证结果是否正确。但是，如果你想在一个月后验证同样的内容，就必须重复相同的过程。马丁·福勒（Martin
    Fowler），这位撰写了多本关于敏捷开发、重构和极限编程书籍的作者，对此总结得非常完美：


    > 每当你想在打印语句或调试器表达式中键入内容时，不如将其写成一个测试。


    #### 何时应该构建测试？


    考虑你的 `PL/SQL` 代码的生命周期。你需要解决一个问题，并且知道代码应该做什么。你可以使用纸笔、文本编辑器或更复杂的图形化 `SQL` 开发工具编辑器来编写代码。一旦编写好
    `PL/SQL` 代码，你就编译它以验证语法是否正确。如果代码编译成功，你就可以在 `Oracle Database` 中针对模式执行它。也许代码能立即按要求工作并成功得出结果。如果不能，你需要调试代码以确定问题出现的位置。这种编辑/编译/运行/编辑/编译/调试/编译/运行的循环可能会持续到你对程序单元满意，并准备交付代码为止。


    许多单元测试的倡导者认为，你应该在开始编写代码之前就写好测试，并将其视为完整流程的一部分。其理念是，你已经知道代码的预期结果，并且知道结果是什么，因此你可以根据结果构建测试，然后编写代码以确保测试通过！我认为这是编写、规划和构建测试的结合，所以我敦促你将编写测试视为过程的一部分，无论是先编写代码然后添加一些测试，还是同时微调代码和测试。


    ### 构建单元测试的工具


    市场上用于编写 `PL/SQL` 单元测试的工具数量有限；因此，许多用户编写了自己的测试机制。我在这里列出了三个较受欢迎的选项；它们都有很多值得推荐的地方。如果你刚接触测试领域，值得花些时间研究一下现有工具。


    #### utPLSQL：使用命令行代码


    `utPLSQL` 可能是已知最早的可用于 `PL/SQL` 单元测试的单元测试框架。它由 Steven Feuerstein 编写，已面世多年。它是一个用于构建单元测试的开源
    `PL/SQL` 测试框架。你通过运行一个脚本来安装 `utPLSQL`，该脚本会安装测试所需的所有表、包、过程和其他对象。你可以在 `SQL*Plus`
    或命令行中创建和构建所有测试，因此不需要特定工具或额外的客户端。`utPLSQL` 托管在 Sourceforge 上，网址是 [`http://utplsql.sourceforge.net`](http://utplsql.sourceforge.net)，并提供了丰富的资源、文档和示例，介绍如何安装软件、构建测试以及充分利用该框架。


    #### Quest Code Tester for Oracle


    Quest Code Tester for Oracle 是一款用于定义和运行测试的商业产品。你可以为单个程序或包构建测试，也可以构建单独的测试或套件。使用此类产品的一大优势是，你可以构建测试并在需要时重新运行它们，从而支持了为项目构建完整回归测试套件的论点。


    Code Tester 与其他产品的不同之处在于，它允许你描述 `PL/SQL` 程序单元的预期行为，并将其存储在存储库中。然后，该工具基于这些定义生成测试代码。它根据你提供的代码提供一组可能的预期结果，你可以接受并包含或排除这些结果。这种代码生成是该工具中一个实用且强大的功能。当你开始构建测试时，可以使用“快速构建”选项向测试中添加测试用例。


    Code Tester 是一个独立的产品（未集成到任何编辑环境中），允许你独立于开发环境构建和运行测试。缺点是，如果需要调试，你需要将代码导入到一个单独的
    `PL/SQL` 环境中。不过，你可以从 Quest 的 Toad for Oracle 运行测试，并从该产品切换到 Code Tester 进行进一步工作。

    '
- fmt: '# Oracle SQL Developer


    Oracle SQL Developer is a free product that supports PL/SQL unit testing. Oracle
    SQL Developer unit testing was first introduced in SQL Developer 2.0 and already
    provides much of what the other tools on the market offer; supported by an Oracle
    Repository, it allows users to build and save tests. Anyone with access can run
    the tests and you can run the tests and suites from the command line and so incorporate
    them into the general build process. Oracle SQL Developer provides a set of reports
    that can be run at any time to review the test results. It also allows you gather
    code coverage statistics so that you can determine how much of the written code
    is tested.


    ![images](images/square.jpg) **Note** Oracle SQL Developer 3.0 is available as
    a free download from the Oracle Technology Network at [`www.oracle.com/technetwork/developer-tools/sql-developer`](http://www.oracle.com/technetwork/developer-tools/sql-developer).


    The best way to see how to incorporate unit tests into your development life cycle
    is to review a few examples. The rest of the chapter uses Oracle SQL Developer
    3.0 to build unit tests to demonstrate the power of creating unit tests to improve
    your code; all instructions are related to the product.


    ## Preparing and Maintaining the Unit Test Environment


    Oracle SQL Developer uses a central repository where all users with access can
    store unit tests, share, and reuse them. Before you can start creating tests,
    you need to create the unit test repository using the repository wizard. The wizard
    creates the repository by granting all the required privileges to a repository
    owner and runs the scripts to create the objects that make up the repository.


    Before you can run the wizard, you need to identify or create a user who will
    own and administrate the unit test repository. It is best to create a new user
    for this, so that only your unit test information is stored here. You need only
    create and grant the user basic connection privileges, as shown in the following
    example, as the wizard grants all additional privileges required:


    ```sql

    CREATE USER repos_owner IDENTIFIED BY repos_owner;

    GRANT CREATE SESSION to repos_owner;

    ```


    You also need access to `SYS` while running the repository wizard. Use SQL Developer
    to create database connections for both `SYS` and the new user.


    To create a connection, ensure you have the Connections navigator open, select
    the Connections node, right-click to invoke the context menu, and select `New
    Connection`; this invokes the dialog shown in [Figure 5-1](#Chapter05.html#fig_5_1).


    ![images](images/0501.jpg)


    **Figure 5-1.** Create or update database connection


    ### Creating the Unit Test Repository


    To create the repository, select `Tools` ![images](images/U001.jpg) `Unit Test`
    ![images](images/U001.jpg) `Select Current Repository`, as shown in [Figure 5-2](#Chapter05.html#fig_5_2).
    This invokes a connection dialog and selects the database connection—in this case
    for the new user created. If there is no repository present, the Oracle SQL Developer
    repository wizard will prompt you to create a new repository for the selected
    connection.


    ![images](images/0502.jpg)


    **Figure 5-2.** Create or select a Unit Test Repository


    You can have a number of repositories in a single instance, so the wizard needs
    to verify whether the unit testing roles required by the users of the new repository
    already exist within the instance. If the roles are available, there’s no need
    to rebuild them. If not, the required roles must be created. Once you have started
    the process, the wizard prompts you for each of the sets of requirements through
    a series of dialogs. In each case, the wizard displays the syntax, so you can
    review this and decide whether to proceed or not. You will also be prompted for
    the `SYS` password at this stage.


    Initially, the wizard verifies whether the repository owner has the correct privileges;
    if not, the following privileges are granted:


    ```sql

    GRANT CONNECT, RESOURCE, CREATE VIEW TO "REPOS_OWNER";

    ```


    After this, the wizard grants the user access to the following required roles:


    ```sql

    GRANT SELECT ON dba_roles TO repos_owner;

    GRANT SELECT ON dba_role_privs TO repos_owner;

    ```


    Finally, if the unit test roles are not available, the wizard displays the following
    syntax to create the roles and grant the rest of the required privileges:


    ```sql

    CREATE ROLE ut_repo_administrator;

    CREATE ROLE ut_repo_user;

    GRANT CREATE PUBLIC SYNONYM,DROP PUBLIC SYNONYM TO ut_repo_administrator;

    GRANT SELECT ON dba_role_privs TO ut_repo_user;

    GRANT SELECT ON dba_role_privs TO ut_repo_administrator;

    GRANT SELECT ON dba_roles TO ut_repo_administrator;

    GRANT SELECT ON dba_roles TO ut_repo_user;

    GRANT SELECT ON dba_tab_privs TO ut_repo_administrator;

    GRANT SELECT ON dba_tab_privs TO ut_repo_user;

    GRANT EXECUTE ON dbms_lock TO ut_repo_administrator;

    GRANT EXECUTE ON dbms_lock TO ut_repo_user;

    GRANT ut_repo_user TO ut_repo_administrator WITH ADMIN OPTION;

    GRANT ut_repo_administrator TO "REPOS_OWNER" WITH ADMIN OPTION;

    ```


    Accept each dialog in turn to grant access and create the repository. Once created,
    you can select the repository by using `Tools` ![images](images/U001.jpg) `Unit
    Test` ![images](images/U001.jpg) `Select Current Repository`.


    ### Maintaining the Unit Test Repository


    Once the repository has been built, browse the Unit Test navigator by selecting
    the `View` ![images](images/U001.jpg) `Unit Tests` menu. This opens a navigator
    where you can do the following:


    *   Browse the unit test library.

    *   Create reusable lookup values.

    *   Run reports to review all the test runs.

    *   Build unit test suites.

    *   Create unit tests and unit test implementations.


    You can now maintain your repository using the Unit Test menu, as shown in [Figure
    5-3](#Chapter05.html#fig_5_3).


    ![images](images/0503.jpg)


    **Figure 5-3.** Managing unit tests


    SQL Developer 3.0 provides the option to purge your run results. Depending on
    how often you run your tests, especially initially as you get to know the tool,
    you can end up with many run results, so having the ability to purge all results
    is very useful. There is a further option, which you will find in the context
    menu for the results, that allows you to delete sets of results between different
    dates.


    ![images](images/square.jpg) **Caution** There is a difference between `Purge
    Run Results`, which deletes the results of all the tests run, and `Purge Repository
    Objects`, which also deletes the tests themselves!


    ### Importing Tests


    Once you have a set of tests, you can export them to a file and place them under
    version control as a backup or include them with the rest of your project deliverables.
    Exporting tests to file also allows you to import them into other unit test repositories
    (more on importing and exporting tests later).'
  raw: '#### Oracle SQL Developer


    Oracle SQL Developer is a free product that supports PL/SQL unit testing. Oracle
    SQL Developer unit testing was first introduced in SQL Developer 2.0 and already
    provides much of what the other tools on the market offer; supported by an Oracle
    Repository, it allows users to build and save tests. Anyone with access can run
    the tests and you can run the tests and suites from the command line and so incorporate
    them into the general build process. Oracle SQL Developer provides a set of reports
    that can be run at any time to review the test results. It also allows you gather
    code coverage statistics so that you can determine how much of the written code
    is tested.


    ![images](images/square.jpg) **Note** Oracle SQL Developer 3.0 is available as
    a free download from the Oracle Technology Network at [`www.oracle.com/technetwork/developer-tools/sql-developer`](http://www.oracle.com/technetwork/developer-tools/sql-developer).


    The best way to see how to incorporate unit tests into your development life cycle
    is to review a few examples. The rest of the chapter uses Oracle SQL Developer
    3.0 to build unit tests to demonstrate the power of creating unit tests to improve
    your code; all instructions are related to the product.


    ### Preparing and Maintaining the Unit Test Environment


    Oracle SQL Developer uses a central repository where all users with access can
    store unit tests, share, and reuse them. Before you can start creating tests,
    you need to create the unit test repository using the repository wizard. The wizard
    creates the repository by granting all the required privileges to a repository
    owner and runs the scripts to create the objects that make up the repository.


    Before you can run the wizard, you need to identify or create a user who will
    own and administrate the unit test repository. It is best to create a new user
    for this, so that only your unit test information is stored here. You need only
    create and grant the user basic connection privileges, as shown in the following
    example, as the wizard grants all additional privileges required:


    `CREATE USER repos_owner IDENTIFIED BY repos_owner;`

    `GRANT CREATE SESSION to repos_owner;`


    You also need access to SYS while running the repository wizard. Use SQL Developer
    to create database connections for both SYS and the new user.


    To create a connection, ensure you have the Connections navigator open, select
    the Connections node, right-click to invoke the context menu, and select New Connection;
    this invokes the dialog shown in [Figure 5-1](#Chapter05.html#fig_5_1).


    ![images](images/0501.jpg)


    ***Figure 5-1.** Create or update database connection*


    #### Creating the Unit Test Repository


    To create the repository, select Tools ![images](images/U001.jpg) Unit Test ![images](images/U001.jpg)
    Select Current Repository, as shown in [Figure 5-2](#Chapter05.html#fig_5_2).
    This invokes a connection dialog and selects the database connection—in this case
    for the new user created. If there is no repository present, the Oracle SQL Developer
    repository wizard will prompt you to create a new repository for the selected
    connection.


    ![images](images/0502.jpg)


    ***Figure 5-2.** Create or select a Unit Test Repository*


    You can have a number of repositories in a single instance, so the wizard needs
    to verify whether the unit testing roles required by the users of the new repository
    already exist within the instance. If the roles are available, there’s no need
    to rebuild them. If not, the required roles must be created. Once you have started
    the process, the wizard prompts you for each of the sets of requirements through
    a series of dialogs. In each case, the wizard displays the syntax, so you can
    review this and decide whether to proceed or not. You will also be prompted for
    the SYS password at this stage.


    Initially, the wizard verifies whether the repository owner has the correct privileges;
    if not, the following privileges are granted:


    `GRANT CONNECT, RESOURCE, CREATE VIEW TO "REPOS_OWNER";`


    After this, the wizard grants the user access to the following required roles:


    `GRANT SELECT ON dba_roles TO repos_owner;`

    `GRANT SELECT ON dba_role_privs TO repos_owner;`


    Finally, if the unit test roles are not available, the wizard displays the following
    syntax to create the roles and grant the rest of the required privileges:


    `CREATE ROLE ut_repo_administrator;`

    `CREATE ROLE ut_repo_user;`

    `GRANT CREATE PUBLIC SYNONYM,DROP PUBLIC SYNONYM TO ut_repo_administrator;`

    `GRANT SELECT ON dba_role_privs TO ut_repo_user;`

    `GRANT SELECT ON dba_role_privs TO ut_repo_administrator;`

    `GRANT SELECT ON dba_roles TO ut_repo_administrator;`

    `GRANT SELECT ON dba_roles TO ut_repo_user;`

    `GRANT SELECT ON dba_tab_privs TO ut_repo_administrator;`

    `GRANT SELECT ON dba_tab_privs TO ut_repo_user;`

    `GRANT EXECUTE ON dbms_lock TO ut_repo_administrator;`

    `GRANT EXECUTE ON dbms_lock TO ut_repo_user;`

    `GRANT ut_repo_user TO ut_repo_administrator WITH ADMIN OPTION;`

    `GRANT ut_repo_administrator TO "REPOS_OWNER" WITH ADMIN OPTION;`


    Accept each dialog in turn to grant access and create the repository. Once created,
    you can select the repository by using Tools ![images](images/U001.jpg) Unit Test
    ![images](images/U001.jpg) Select Current Repository.


    #### Maintaining the Unit Test Repository


    Once the repository has been built, browse the Unit Test navigator by selecting
    the View ![images](images/U001.jpg) Unit Tests menu. This opens a navigator where
    you can do the following:


    *   Browse the unit test library.

    *   Create reusable lookup values.

    *   Run reports to review all the test runs.

    *   Build unit test suites.

    *   Create unit tests and unit test implementations.


    You can now maintain your repository using the Unit Test menu, as shown in [Figure
    5-3](#Chapter05.html#fig_5_3).


    ![images](images/0503.jpg)


    ***Figure 5-3.** Managing unit tests*


    SQL Developer 3.0 provides the option to purge your run results. Depending on
    how often you run your tests, especially initially as you get to know the tool,
    you can end up with many run results, so having the ability to purge all results
    is very useful. There is a further option, which you will find in the context
    menu for the results, that allows you to delete sets of results between different
    dates.


    ![images](images/square.jpg) **Caution** There is a difference between Purge Run
    Results, which deletes the results of all the tests run, and Purge Repository
    Objects, which also deletes the tests themselves!


    #### Importing Tests


    Once you have a set of tests, you can export them to a file and place them under
    version control as a backup or include them with the rest of your project deliverables.
    Exporting tests to file also allows you to import them into other unit test repositories
    (more on importing and exporting tests later).'
  trans: '

    # Oracle SQL Developer


    Oracle SQL Developer 是一款免费产品，支持 PL/SQL 单元测试。Oracle SQL Developer 单元测试功能最早在 SQL
    Developer 2.0 版本中引入，现已提供市面上其他工具的大部分功能；在 Oracle 资料库的支持下，它允许用户构建和保存测试。任何有权限的用户都可以运行这些测试，您还可以通过命令行运行测试和测试套件，从而将其集成到常规的构建流程中。Oracle
    SQL Developer 提供了一系列报告，可随时运行以审查测试结果。它还允许您收集代码覆盖率统计数据，以便确定已编写的代码有多少已被测试。


    ![images](img/square.jpg) **注意** Oracle SQL Developer 3.0 可从 Oracle 技术网络免费下载，网址为
    [`www.oracle.com/technetwork/developer-tools/sql-developer`](http://www.oracle.com/technetwork/developer-tools/sql-developer)。


    了解如何将单元测试集成到开发生命周期中的最佳方式是查看一些示例。本章的其余部分将使用 Oracle SQL Developer 3.0 来构建单元测试，以展示创建单元测试以改进代码的强大功能；所有说明都与该产品相关。


    ## 准备和维护单元测试环境


    Oracle SQL Developer 使用一个中央资料库，所有有权限的用户都可以在其中存储、共享和重用单元测试。在开始创建测试之前，您需要使用资料库向导创建单元测试资料库。该向导通过向资料库所有者授予所有必需的权限并运行脚本来创建构成资料库的对象，从而创建资料库。


    在运行向导之前，您需要识别或创建一个将成为单元测试资料库所有者并对其进行管理的用户。最好为此创建一个新用户，以便仅将您的单元测试信息存储在此处。您只需创建该用户并授予其基本连接权限，如下例所示，因为向导会授予所有额外必需的权限：


    ```sql

    CREATE USER repos_owner IDENTIFIED BY repos_owner;

    GRANT CREATE SESSION to repos_owner;

    ```


    在运行资料库向导时，您还需要访问 `SYS` 的权限。使用 SQL Developer 为 `SYS` 和新用户创建数据库连接。


    要创建连接，请确保“连接”导航器已打开，选择“连接”节点，右键单击以调用上下文菜单，然后选择`新建连接`；这将调用如图 5-1 所示的对话框。


    ![images](img/0501.jpg)


    **图 5-1.** 创建或更新数据库连接


    ### 创建单元测试资料库


    要创建资料库，请选择`工具` ![images](img/U001.jpg) `单元测试` ![images](img/U001.jpg) `选择当前资料库`，如图
    5-2 所示。这将调用一个连接对话框并选择数据库连接——在本例中是为新创建的用户选择。如果不存在资料库，Oracle SQL Developer 资料库向导将提示您为所选连接创建新资料库。


    ![images](img/0502.jpg)


    **图 5-2.** 创建或选择单元测试资料库


    您可以在单个实例中拥有多个资料库，因此向导需要验证新资料库用户所需的角色是否已存在于实例中。如果角色可用，则无需重建它们。如果不可用，则必须创建所需的角色。一旦您启动该过程，向导将通过一系列对话框提示您每组要求。在每种情况下，向导都会显示语法，以便您可以查看并决定是否继续。在此阶段，系统还会提示您输入
    `SYS` 密码。


    最初，向导会验证资料库所有者是否拥有正确的权限；如果没有，则授予以下权限：


    ```sql

    GRANT CONNECT, RESOURCE, CREATE VIEW TO "REPOS_OWNER";

    ```


    之后，向导授予用户访问以下必需角色的权限：


    ```sql

    GRANT SELECT ON dba_roles TO repos_owner;

    GRANT SELECT ON dba_role_privs TO repos_owner;

    ```


    最后，如果单元测试角色不可用，向导将显示以下语法来创建角色并授予其余必需的权限：


    ```sql

    CREATE ROLE ut_repo_administrator;

    CREATE ROLE ut_repo_user;

    GRANT CREATE PUBLIC SYNONYM,DROP PUBLIC SYNONYM TO ut_repo_administrator;

    GRANT SELECT ON dba_role_privs TO ut_repo_user;

    GRANT SELECT ON dba_role_privs TO ut_repo_administrator;

    GRANT SELECT ON dba_roles TO ut_repo_administrator;

    GRANT SELECT ON dba_roles TO ut_repo_user;

    GRANT SELECT ON dba_tab_privs TO ut_repo_administrator;

    GRANT SELECT ON dba_tab_privs TO ut_repo_user;

    GRANT EXECUTE ON dbms_lock TO ut_repo_administrator;

    GRANT EXECUTE ON dbms_lock TO ut_repo_user;

    GRANT ut_repo_user TO ut_repo_administrator WITH ADMIN OPTION;

    GRANT ut_repo_administrator TO "REPOS_OWNER" WITH ADMIN OPTION;

    ```


    依次接受每个对话框以授予权限并创建资料库。创建完成后，您可以使用`工具` ![images](img/U001.jpg) `单元测试` ![images](img/U001.jpg)
    `选择当前资料库`来选择该资料库。


    ### 维护单元测试资料库


    资料库构建完成后，通过选择`视图` ![images](img/U001.jpg) `单元测试`菜单浏览单元测试导航器。这将打开一个导航器，您可以在其中执行以下操作：


    *   浏览单元测试库。

    *   创建可重用的查找值。

    *   运行报告以审查所有测试运行。

    *   构建单元测试套件。

    *   创建单元测试和单元测试实现。


    您现在可以使用单元测试菜单维护您的资料库，如图 5-3 所示。


    ![images](img/0503.jpg)


    **图 5-3.** 管理单元测试


    SQL Developer 3.0 提供了清除运行结果的选项。根据您运行测试的频率，尤其是在刚开始熟悉该工具时，您最终可能会积累大量运行结果，因此能够清除所有结果非常有用。还有一个进一步的选项，您可以在结果的上下文菜单中找到，它允许您删除不同日期之间的一组结果。


    ![images](img/square.jpg) **注意** `清除运行结果`（删除所有已运行测试的结果）与`清除资料库对象`（同时删除测试本身）是有区别的！


    ### 导入测试


    当您有一组测试后，可以将它们导出到文件，并将其置于版本控制之下作为备份，或将其包含在项目交付成果中。将测试导出到文件还允许您将其导入其他单元测试资料库（有关导入和导出测试的更多信息将在后面介绍）。

    '
- fmt: '### Building Unit Tests


    Let’s start by building a unit test for a small piece of PL/SQL code. I have removed
    any interesting code from the body because I want to focus on the parameter input
    and building the test, so the example code in [Listing 5-1](#Chapter05.html#list_5_1)
    is just a skeleton of a procedure, which expects a parameter. Using the example,
    you see how to create a test, the components of the test, and how to run the test;
    by extending the example, you see how to extend the test capabilities.


    **Listing 5-1.** Skeleton Code for a Unit Test


    ```sql

    CREATE OR REPLACE PROCEDURE simple_parameter

     (p_x in NUMBER)

     AS

    BEGIN

       NULL;

       -- Add PL/SQL code to do something useful here

    END simple_parameter;

    ```


    Many procedures expect input parameters, so it is important to write a test where
    you can pass in a range of parameters or values and ensure they all produce the
    correct outcome. By writing a unit test, you can supply a wide variety of test
    values, and change and increase these over time.


    To create the procedure, open a new SQL Worksheet and execute the code. For these
    examples, I use a separate database user from that of the repository owner called
    `repos_user`. Be sure the procedure compiles and that you can run it. Once you
    have a successfully compiled procedure, you are ready to begin.


    #### Using the Unit Test Wizard


    The easiest way to start creating unit tests is directly from a procedure or function
    listing in the Connections navigator. Open the Connections navigator in SQL Developer,
    expand the connection you created for your user, and find the PL/SQL program unit
    you want to test. For this example, after you have executed the code to create
    the procedure, expand the `Procedures` node.


    Find and select the correct procedure, right-click to invoke the context menu,
    and select `Create Unit Test`. This invokes the Unit Test Wizard that you use
    to create all your tests. The wizard walks you through the various stages of the
    test in the order in which they are executed when you run the test. Because you
    are working with a PL/SQL skeleton, which only expects a single parameter and
    does nothing more, there are no additional setup or validations required, so you
    can accept the default test name, `SIMPLE_PARAMETER`, select the “Create with
    single Dummy implementation” option, and click `Finish`.


    You have now created your first test. Select the `View` ![images](images/U001.jpg)
    `Unit Test` menu to invoke the Unit Test navigator, expand the `Tests` node, and
    select your test. You can now review the full structure of the test and the test
    components.


    #### Creating the First Implementation


    An Oracle SQL Developer Unit Test comprises one or more implementations. If you
    expand your test, you’ll see the first implementation created by the Unit Test
    wizard. You can create any number of implementations for a unit test, each with
    its own parameter set and expected outcome. Using the Unit Test wizard, you can
    start by creating a single implementation or seed the test with multiple implementations.
    For either situation, you can continue to add implementations after the test wizard
    has completed. Simply right-click on the test name and select `Add Implementation`
    from the context menu. The single default implementation expects one value for
    each of the input parameters, which you can add as you create the implementation
    in the wizard, or after the wizard completes. In [Figure 5-4](#Chapter05.html#fig_5_4),
    the input parameter in the `Test Implementation 1` section is null and waiting
    to be populated.


    ![images](images/0504.jpg)


    **Figure 5-4.** Unit test details


    Using [Figure 5-4](#Chapter05.html#fig_5_4), the next section reviews the constituent
    parts of the unit test, as laid out in the `Details` tab.


    #### Adding Startup and Teardown Processes


    One of the main advantages of building unit tests is that you can run them and
    rerun them. You can’t test your procedure manually in quite the same way. This
    is particularly true if you have a procedure that changes the value of the data,
    possibly inserting rows into a table or updating records in a table; running and
    rerunning it will continually change the data. You need to be able to reset the
    environment or data back to the starting point before you run the code again.
    The purpose of the startup process is to take stock of the current situation;
    for example, you make a backup copy of the table and the data at the point before
    the test executes the procedure. You can then run the test, and hence the procedure,
    allowing it to do the updates as designed, and then run the teardown process.
    The teardown process is designed to reset or restore the status, such as returning
    the table and the data to the same state it was in before the procedure was executed.


    The procedure in this example doesn’t update or affect any data, so there is no
    need for either the startup or the teardown processes, thus they are empty. If
    you only have a single test, you may have startup and teardowns before and after
    the test run. You can add multiple startup and teardown processes to a unit test.
    You can also add a number of tests to a test suite. In this case, it is possible
    to move all the startup and teardown processes to the top level, so that you prepare
    the environment by running all the startup processes before the suite starts.
    Then you run the suite of tests and the teardown processes return the situation
    to normal at the end. This depends on the procedures themselves, what you are
    developing, and the impact one test may have on the next.


    #### Collecting Code Coverage Statistics


    Collecting the code coverage numbers is a good idea, especially as the number
    of procedures or functions in a project grows. You can ascertain how much of the
    code there is and how much of it you are testing. You may well have a test that
    is 100 percent successful, but if it only tests 10 percent of the procedure, then
    you can hardly call it a useful test. All code coverage statistics gathered are
    available in the `Test Runs` and `Suite Runs` code coverage reports, which you
    will find in the `Reports` node in the Unit Test navigator.'
