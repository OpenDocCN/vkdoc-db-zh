    \               EXCEPTION;\n  l_variable                                    VARCHAR2(1);\n\
    \nBEGIN\n  -- Init\n  p_exitcode := 0;\n  p_exittext := NULL;\n\n  SAVEPOINT BEFORE_TYPE$MODULE_NAME;\n\
    \n  -- Check the input\n  PACKAGE.CHK$PARAM1 (\n                     p_value \
