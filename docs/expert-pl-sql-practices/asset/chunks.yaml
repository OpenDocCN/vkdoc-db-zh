    与结果缓存示例类似，用户定义的缓存显著降低了查询的逻辑 I/O 和运行时，使其降至可接受的水平。实际上，用户定义会话缓存的统计数据与结果缓存相似（缓存未命中次数相同），尽管用户缓存整体上稍慢一些。清单
    9-59 展示了该查询的层级分析器报告，并说明了（相对于结果缓存示例）额外时间花费在何处。


    ***清单 9-59.** 使用用户定义的 PL/SQL 会话缓存函数的查询性能（层级分析器报告）*


    ```

    FUNCTION                                  LINE#      CALLS SUB_ELA_US FUNC_ELA_US

