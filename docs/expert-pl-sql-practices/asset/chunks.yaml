- fmt: "## Finding Unused Identifiers\n\n许多组织对变量使用有标准，例如“禁止全局变量”和/或“所有变量必须被使用”。我个人并不完全赞同禁止全局变量的规则（尽管全局变量的使用应该被仔细考量）。然而，我确实同意，程序中存在未使用的变量会使维护变得更加复杂（主要是杂乱）。\n\
    \n使用 PL/Scope，很容易查看在任何作用域中，哪些变量没有被使用。这意味着你有一个声明但没有引用。接下来的几个查询将逐步构建，最终找到一个存储过程，该过程定义了一个未使用的全局受保护变量、一个未使用的参数和一个未使用的局部变量。\n\
    \n首先，列出包体中所有已声明的变量（注意，这不会获取规范中定义的全局变量，只会获取在体中定义的受保护全局变量），如下所示：\n\n```sql\nSELECT\
    \  ui_var.name, type, usage, line, col\n  FROM user_identifiers ui_var\n  WHERE\
    \ ui_var.object_name = 'VARIABLES_PKG'\n    AND ui_var.object_type = 'PACKAGE\
    \ BODY'\n    AND ui_var.type IN ('VARIABLE', 'FORMAL IN', 'FORMAL OUT', 'FORMAL\
    \ IN OUT')\n    AND ui_var.usage = 'DECLARATION'\n  ORDER BY line, col;\n```\n\
    \n查询结果如下：\n```\nNAME                         TYPE           USAGE       LINE \
    \    COL\n---------------------------- -------------- ----------- -------- -----\n\
    G_PROTECTED_VARIABLE_USED    VARIABLE       DECLARATION 3        3\nG_PROTECTED_VARIABLE_UNUSED\
    \  VARIABLE       DECLARATION 4        3\nP_KEYNUM                     FORMAL\
    \ IN      DECLARATION 7        5\nP_DATE                       FORMAL IN OUT \
    \ DECLARATION 8        5\nP_LOB                        FORMAL OUT     DECLARATION\
    \ 9        5\nV_USED_VARIABLE              VARIABLE       DECLARATION 11     \
    \  5\nV_UNUSED_VARIABLE            VARIABLE       DECLARATION 12       5\n```\n\
    \n验证所有这些参数/变量是否被使用的最简单方法是检查它们是否被引用。然而，可能存在只进行赋值却从未引用变量的情况（这有什么用呢？），也存在变量在声明的同一步骤中被赋值的情况。对我来说，我想要确保所有变量都被使用（这意味着无论是否赋值，都必须有引用）。\n\
    \n要查看被引用的变量，只需将使用情况从 `DECLARATION` 更改为 `REFERENCE`，如下所示的查询：\n\n```sql\nSELECT\
    \  ui_var.name, type, usage, line, col\n  FROM user_identifiers ui_var\n  WHERE\
    \ ui_var.object_name = 'VARIABLES_PKG'\n    AND ui_var.object_type = 'PACKAGE\
    \ BODY'\n    AND ui_var.type IN ('VARIABLE', 'FORMAL IN', 'FORMAL OUT', 'FORMAL\
    \ IN OUT')\n    AND ui_var.usage = 'REFERENCE'\n  ORDER BY line, col;\n```\n\n\
    查询结果如下：\n```\nNAME                         TYPE        USAGE       LINE      COL\n\
    ---------------------------- ----------- ----------- --------- -----\nP_KEYNUM\
    \                     FORMAL IN   REFERENCE   14        24\nV_USED_VARIABLE  \
    \            VARIABLE    REFERENCE   16        22\nG_PROTECTED_VARIABLE_USED \
    \   VARIABLE    REFERENCE   16        40\nP_LOB                        FORMAL\
    \ OUT  REFERENCE   17        39\n```\n\n这显示有三个变量缺失。使用简单的 SQL，很容易找到它们。这个最终查询返回那些已声明但未被使用的变量：\n\
    \n```sql\nSELECT  name, type, usage, line, col\n  FROM user_identifiers\n  WHERE\
    \ object_type = 'PACKAGE BODY'\n    AND usage = 'DECLARATION'\n    AND (name,\
    \ type) IN (\nSELECT  ui_var.name, type\n  FROM user_identifiers ui_var\n  WHERE\
    \ ui_var.object_name = 'VARIABLES_PKG'\n    AND ui_var.object_type = 'PACKAGE\
    \ BODY'\n    AND ui_var.type IN ('VARIABLE', 'FORMAL IN', 'FORMAL OUT', 'FORMAL\
    \ IN OUT')\n    AND ui_var.usage = 'DECLARATION'\nMINUS\n  SELECT  ui_var.name,\
    \ type\n  FROM user_identifiers ui_var\n  WHERE ui_var.object_name = 'VARIABLES_PKG'\n\
    \    AND ui_var.object_type = 'PACKAGE BODY'\n    AND ui_var.type IN ('VARIABLE',\
    \ 'FORMAL IN', 'FORMAL OUT', 'FORMAL IN OUT')\n    AND ui_var.usage = 'REFERENCE')\n\
    \  ORDER BY line, col;\n```\n\n查询结果如下：\n```\nNAME                         TYPE\
    \               USAGE       LINE     COL\n---------------------------- ------------------\
    \ ----------- -------- -------\nG_PROTECTED_VARIABLE_UNUSED  VARIABLE        \
    \   DECLARATION 4        3\nP_DATE                       FORMAL IN OUT      DECLARATION\
    \ 8        5\nV_UNUSED_VARIABLE            VARIABLE           DECLARATION 12 \
    \      5\n```\n\n如果你移除外部查询中的条件（上面查询的第四行），即 `AND usage = 'DECLARATION'`，你可以添加额外的记录，表明那些被声明并赋值但从未被引用的变量（修改后的结果如下）。\n\
    \n```\nNAME                         TYPE               USAGE       LINE     COL\n\
    ---------------------------- ------------------ ----------- -------- --------\n\
    G_PROTECTED_VARIABLE_UNUSED  VARIABLE           ASSIGNMENT  4        3\nG_PROTECTED_VARIABLE_UNUSED\
    \  VARIABLE           DECLARATION 4        3\nP_DATE                       FORMAL\
    \ IN OUT      DECLARATION 8        5\nV_UNUSED_VARIABLE            VARIABLE  \
    \         DECLARATION 12       5\n```\n\n## Finding Scope Issues\n\n另一个不良的编码实践是在程序的不同作用域中创建同名变量。如果你在引用时总是包含作用域，那么你可以确保访问的是正确的项。然而，这会导致痛苦的维护，通常是个坏主意。\n\
    \n为了举例说明，我使用了提供的 `SCOPE_PKG` 示例包。包规范和体如下，便于参考：\n\n```sql\ncreate or replace PACKAGE\
    \ SCOPE_PKG AS\n  i CONSTANT NUMBER := 0;\n\n  g_global_variable NUMBER := 10;\n\
    \n  PROCEDURE proc1 ;\nEND SCOPE_PKG;\n/\n\ncreate or replace PACKAGE BODY SCOPE_PKG\
    \ AS\n\n  PROCEDURE proc1\n  AS\n    i PLS_INTEGER := 30;\n  BEGIN\n    FOR i\
    \ IN 1..10\n    LOOP\n      DBMS_OUTPUT.PUT_LINE(i);\n    END LOOP;\n\n    DBMS_OUTPUT.PUT_LINE(i);\n\
    \  END;\n\nEND SCOPE_PKG;\n/\n```\n\n下一个查询显示在同一个程序（本例中是一个包）的不同作用域中声明的所有变量标识符（`VARIABLES`、`CONSTANTS`\
    \ 和 `ITERATORS`）。包可以在规范（spec）和体（body）中声明变量。是否认为这种作用域划分是一个错误，由你决定。\n\n```sql\n\
    WITH source_ids AS (\n  SELECT    *\n    FROM user_identifiers\n      WHERE object_name\
    \ = 'SCOPE_PKG'\n        AND object_type IN ('PACKAGE BODY', 'PACKAGE')\n)\nSELECT\
    \ name, type, usage, prior name, object_type, line, col\n  FROM source_ids si\n\
    \  WHERE type IN ('VARIABLE', 'ITERATOR', 'CONSTANT')\n    AND usage = 'DECLARATION'\n\
    \    AND EXISTS (\n      SELECT count(*), name\n        FROM user_identifiers\n\
    \        WHERE object_Name = si.object_name\n          AND name = si.name\n  \
    \        AND usage = si.usage\n        GROUP BY name\n        HAVING count(*)\
    \ > 1 )\n  START WITH usage_context_id = 0\n  CONNECT BY PRIOR usage_id = usage_context_id\n\
    \    AND PRIOR object_type = object_type;\n```\n\n查询结果如下：\n```\nNAME     TYPE\
    \        USAGE       PRIORNAME    OBJECT_TYPE   LINE     COL\n-------- -----------\
    \ ----------- ------------ ------------- -------- ------\nI        CONSTANT  \
    \  DECLARATION SCOPE_PKG    PACKAGE       3        3\nI        VARIABLE    DECLARATION\
    \ PROC1        PACKAGE BODY  5        5\nI        ITERATOR    DECLARATION PROC1\
    \        PACKAGE BODY  8        9\n```\n\n变量 `I` 在包规范中、体内的一个过程中、以及同一过程的循环迭代器中被声明。\n\
    \n你可以向查询中添加额外的条件，只返回那些明确冲突的值。你可以通过包含层级关系来实现——如果一个声明包含在一个 `USAGE_ID` 中，而这个 `USAGE_ID`\
    \ 又被一个更高的 `USAGE_CONTEXT_ID` 所覆盖，例如当这个使用（usage）是前一个使用的子项时。"
  raw: '##### Finding Unused Identifiers


    Many organizations have standards about variable usage, such as “no global variables
    and/or all variables must be used.” I don''t particularly agree with the no globals
    rule (although the usage of globals should be carefully considered). However,
    I do agree that having unused variables in a program makes maintaining it more
    complex (cluttery mostly).


    With PL/Scope, it is easy to see which variables, at any scope, are not used.
    You will have a declaration and no reference. The next several queries will build
    up to a query that will find a procedure that defines an unused global protected
    variable, an unused parameter, and an unused local variable.


    First, list all of the declared variables in a package body (note that this will
    not pick up globals defined in the spec, only protected globals defined in the
    body), like so:


    `SELECT  ui_var.name, type, usage, line, col`

    `  FROM user_identifiers ui_var`

    `  WHERE ui_var.object_name = ''VARIABLES_PKG''`

    `    AND ui_var.object_type = ''PACKAGE BODY''`

    `    AND ui_var.type IN (''VARIABLE'', ''FORMAL IN'', ''FORMAL OUT'', ''FORMAL
    IN OUT'')`

    `    AND ui_var.usage = ''DECLARATION''`

    `  ORDER BY line, col;`


    `NAME                           TYPE           USAGE       LINE     COL`

    `------------------------------ -------------- ----------- -------- -----`

    `G_PROTECTED_VARIABLE_USED      VARIABLE       DECLARATION 3        3`

    `G_PROTECTED_VARIABLE_UNUSED    VARIABLE       DECLARATION 4        3`

    `P_KEYNUM                       FORMAL IN      DECLARATION 7        5`

    `P_DATE                         FORMAL IN OUT  DECLARATION 8        5`

    `P_LOB                          FORMAL OUT     DECLARATION 9        5`

    `V_USED_VARIABLE                VARIABLE       DECLARATION 11       5`

    `V_UNUSED_VARIABLE              VARIABLE       DECLARATION 12       5`


    The easiest way to validate that all of these parameters/variables are used is
    to check that they are referenced. However, you could do an assignment and never
    reference a variable (what would be the use of that?) and you can also assign
    a variable in the same step that it is declared. For me, I want to be sure all
    variables are being used (which means a reference regardless of assignment).


    To see the variables that are being referenced, it''s as easy as changing the
    usage from DECLARATION to REFERENCE, which the following query does:


    `SELECT  ui_var.name, type, usage, line, col`

    `  FROM user_identifiers ui_var`

    `  WHERE ui_var.object_name = ''VARIABLES_PKG''`

    `    AND ui_var.object_type = ''PACKAGE BODY''`

    `    AND ui_var.type IN (''VARIABLE'', ''FORMAL IN'', ''FORMAL OUT'', ''FORMAL
    IN OUT'')`

    `    AND ui_var.usage = ''REFERENCE''`

    `  ORDER BY line, col;`


    `NAME                           TYPE        USAGE       LINE      COL`

    `------------------------------ ----------- ----------- --------- -----`

    `P_KEYNUM                       FORMAL IN   REFERENCE   14        24`

    `V_USED_VARIABLE                VARIABLE    REFERENCE   16        22`

    `G_PROTECTED_VARIABLE_USED      VARIABLE    REFERENCE   16        40`

    `P_LOB                          FORMAL OUT  REFERENCE   17        39`


    This shows that there are three missing variables. Using a simple bit of SQL,
    they are easily findable. This final query returns the declared variables that
    are not being used:


    `SELECT  name, type, usage, line, col`

    `  FROM user_identifiers`

    `  WHERE object_type = ''PACKAGE BODY''`

    `    AND usage = ''DECLARATION''`

    `    AND (name, type) IN (`

    `SELECT  ui_var.name, type`

    `  FROM user_identifiers ui_var`

    `  WHERE ui_var.object_name = ''VARIABLES_PKG''`

    `    AND ui_var.object_type = ''PACKAGE BODY''`

    `    AND ui_var.type IN (''VARIABLE'', ''FORMAL IN'', ''FORMAL OUT'', ''FORMAL
    IN OUT'')`

    `    AND ui_var.usage = ''DECLARATION''`

    `MINUS`

    `  SELECT  ui_var.name, type`

    `  FROM user_identifiers ui_var`

    `  WHERE ui_var.object_name = ''VARIABLES_PKG''`

    `    AND ui_var.object_type = ''PACKAGE BODY''`

    `    AND ui_var.type IN (''VARIABLE'', ''FORMAL IN'', ''FORMAL OUT'', ''FORMAL
    IN OUT'')`

    `    AND ui_var.usage = ''REFERENCE'')`

    `  ORDER BY line, col;`


    `NAME                           TYPE               USAGE       LINE     COL`

    `------------------------------ ------------------ ----------- -------- -------`

    `G_PROTECTED_VARIABLE_UNUSED    VARIABLE           DECLARATION 4        3`

    `P_DATE                         FORMAL IN OUT      DECLARATION 8        5`

    `V_UNUSED_VARIABLE              VARIABLE           DECLARATION 12       5`


    If you remove the outer query where criteria (the fourth line in the previous
    query),


    `AND usage = ''DECLARATION''`


    you can add additional records indicating those variables that are declared and
    assigned a value but are never referenced (the results from that change follow).


    `NAME                           TYPE               USAGE       LINE     COL`

    `------------------------------ ------------------ ----------- -------- --------`

    `G_PROTECTED_VARIABLE_UNUSED    VARIABLE           ASSIGNMENT  4        3`

    `G_PROTECTED_VARIABLE_UNUSED    VARIABLE           DECLARATION 4        3`

    `P_DATE                         FORMAL IN OUT      DECLARATION 8        5`

    `V_UNUSED_VARIABLE              VARIABLE           DECLARATION 12       5`


    ##### Finding Scope Issues


    Another bad coding practice is creating variables of the same name at different
    scopes in a program. If you always include the scope in a reference, then you
    ensure you are accessing the correct item. However, it makes for painful maintenance
    and is generally a bad idea.


    To provide an example, I am using the SCOPE_PKG demo package provided. The package
    specification and body are listed here for easy reference:


    `create or replace PACKAGE SCOPE_PKG AS`

    `  i CONSTANT NUMBER := 0;`


    `  g_global_variable NUMBER := 10;`


    `  PROCEDURE proc1 ;`

    `END SCOPE_PKG;`

    `/`


    `create or replace PACKAGE BODY SCOPE_PKG AS`


    `  PROCEDURE proc1`

    `  AS`

    `    i PLS_INTEGER := 30;`

    `  BEGIN`

    `    FOR i IN 1..10`

    `    LOOP`

    `      DBMS_OUTPUT.PUT_LINE(i);`

    `    END LOOP;`


    `    DBMS_OUTPUT.PUT_LINE(i);`

    `  END;`


    `END SCOPE_PKG;`

    `/`


    The next query shows all variables identifiers (VARIABLES, CONSTANTS, and ITERATORS)
    that are declared at different scopes in the same program (in this case, a package).
    A package can declare variables in both a spec and a body. It''s up to you to
    decide if the scoping is an error.


    `WITH source_ids AS (`

    `  SELECT    *`

    `    FROM user_identifiers`

    `      WHERE object_name = ''SCOPE_PKG''`

    `        AND object_type IN (''PACKAGE BODY'', ''PACKAGE'')`

    `)`

    `SELECT name, type, usage, prior name, object_type, line, col`

    `  FROM source_ids si`

    `  WHERE type IN (''VARIABLE'', ''ITERATOR'', ''CONSTANT'')`

    `    AND usage = ''DECLARATION''`

    `    AND EXISTS (`

    `      SELECT count(*), name`

    `        FROM user_identifiers`

    `        WHERE object_Name = si.object_name`

    `          AND name = si.name`

    `          AND usage = si.usage`

    `        GROUP BY name`

    `        HAVING count(*) > 1 )`

    `  START WITH usage_context_id = 0`

    `  CONNECT BY PRIOR usage_id = usage_context_id`

    `    AND PRIOR object_type = object_type;`


    `NAME     TYPE        USAGE       PRIORNAME    OBJECT_TYPE   LINE     COL`

    `-------- ----------- ----------- ------------ ------------- -------- ------`

    `I        CONSTANT    DECLARATION SCOPE_PKG    PACKAGE       3        3`

    `I        VARIABLE    DECLARATION PROC1        PACKAGE BODY  5        5`

    `I        ITERATOR    DECLARATION PROC1        PACKAGE BODY  8        9`


    The variable `I` is declared in the package spec, in a procedure in the body,
    and as a loop iterator in the same procedure.


    You can include additional criteria to the query and only return values that are
    definite collisions. You would do that by including the hierarchy—if one declaration
    is included in a USAGE_ID that is also covered by a higher USAGE_CONTEXT_ID, such
    as if the usage is a child of a previous usage.'
  trans: "\n## 查找未使用的标识符\n\n许多组织对变量使用有标准，例如“禁止全局变量”和/或“所有变量必须被使用”。我个人并不完全赞同禁止全局变量的规则（尽管全局变量的使用应该被仔细考量）。然而，我确实同意，程序中存在未使用的变量会使维护变得更加复杂（主要是杂乱）。\n\
    \n使用 PL/Scope，很容易查看在任何作用域中，哪些变量没有被使用。这意味着你有一个声明但没有引用。接下来的几个查询将逐步构建，最终找到一个存储过程，该过程定义了一个未使用的全局受保护变量、一个未使用的参数和一个未使用的局部变量。\n\
    \n首先，列出包体中所有已声明的变量（注意，这不会获取规范中定义的全局变量，只会获取在体中定义的受保护全局变量），如下所示：\n\n```sql\nSELECT\
    \  ui_var.name, type, usage, line, col\n  FROM user_identifiers ui_var\n  WHERE\
    \ ui_var.object_name = 'VARIABLES_PKG'\n    AND ui_var.object_type = 'PACKAGE\
    \ BODY'\n    AND ui_var.type IN ('VARIABLE', 'FORMAL IN', 'FORMAL OUT', 'FORMAL\
    \ IN OUT')\n    AND ui_var.usage = 'DECLARATION'\n  ORDER BY line, col;\n```\n\
    \n查询结果如下：\n```\nNAME                         TYPE           USAGE       LINE \
    \    COL\n---------------------------- -------------- ----------- -------- -----\n\
    G_PROTECTED_VARIABLE_USED    VARIABLE       DECLARATION 3        3\nG_PROTECTED_VARIABLE_UNUSED\
    \  VARIABLE       DECLARATION 4        3\nP_KEYNUM                     FORMAL\
    \ IN      DECLARATION 7        5\nP_DATE                       FORMAL IN OUT \
