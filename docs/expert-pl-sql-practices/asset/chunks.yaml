    `SQL ID: ajp04ks60kqx9 Plan Hash: 139684570`


    `SELECT EXCHANGE_RATE`

    `FROM`

    ` RATES WHERE BASE_CCY = :B3 AND TARGET_CCY = :B2 AND RATE_DATE = :B1`


    `call     count       cpu    elapsed       disk      query    current        rows`

    `------- ------  -------- ---------- ---------- ---------- ----------  ----------`

    `Parse        0      0.00       0.00          0          0          0          
    0`

    `Execute 918843     12.50      13.85          0          0          0          
    0`

    `Fetch   918843      9.74      10.86          0    1837686          0      918843`

    `------- ------  -------- ---------- ---------- ---------- ----------  ----------`


    The TKProf report shows that the SQL inside the PL/SQL function is treated as
    a separate query; in this case it has accounted for all of the additional logical
    I/O that the sales query generated and almost half of the additional runtime (if
    you’re wondering where the remaining runtime was spent for this example, a Hierarchical
    Profiler report showed that almost 59 seconds were spent in the PL/SQL engine
    overall. Some 47 seconds of this PL/SQL time was accounted for by the rates-lookup
    SQL itself—double that reported by the SQL trace above—meaning that approximately
    23 seconds was PL/SQL overhead). The base query itself has incurred very little
    logical I/O and is in fact comparable to the SQL-only implementation.


    This separation highlights an important point. If the embedded SQL is treated
    as a query in its own right, the CBO cannot optimize it in the context of the
    outer query. The CBO is completely ignorant of what the function actually does,
    so the RATES table does not even feature in the CBO’s decision-making. The results,
    as you can see, can be catastrophic.


    You can see, therefore, that it makes good sense (from a performance perspective)
    to convert PL/SQL lookup functions to SQL. If performance is critical and such
    lookup functions are heavily used in your application, you are encouraged to remove
    them wherever possible. There are alternative encapsulation methods that I’ll
    demonstrate later in this chapter that can help you with this.


    However, I recognize that it’s not always possible to “sweep” a legacy application
    to convert its SQL (it might be embedded in many different application tiers and
    technologies, or the regression testing overhead might be too prohibitive). In
    such cases, there are methods you can use to reduce the costs of the PL/SQL functions
    and again I’ll show some of these later.


    #### Optimizer Difficulties


    Many of the examples so far have shown PL/SQL functions called from the SELECT
    block (projection) of SQL statements but it is equally common to see user-written
    functions being used in predicates. This can give rise to a range of issues. Firstly,
    as I demonstrated earlier, a PL/SQL function used in a predicate will be executed
    an unpredictable number of times. Secondly, a PL/SQL function (or indeed any function)
    applied to an indexed column will prevent the use of the index. Thirdly, the CBO
    knows very little about PL/SQL functions as it usually has no statistics with
    which to work. This can lead to suboptimal execution plans. I will concentrate
    on the third issue here, as I described the first issue earlier and the second
    is well understood by the Oracle DBA/developer community.'
  trans: "\n## **清单 9-14.** 在 PL/SQL 函数中封装 SQL 查询（纯 SQL 解决方案）\n\n```sql\nSQL> SELECT\
    \ t.calendar_year\n  2  ,      p.prod_name\n  3  ,      SUM(s.amount_sold)   \
    \              AS amt_sold_usd\n  4  ,      SUM(s.amount_sold*r.exchange_rate)\
    \ AS amt_sold_gbp\n  5  FROM   sales      s\n  6  ,      times      t\n  7  ,\
    \      products   p\n  8  ,      rates      r\n  9  WHERE  s.time_id        =\
    \ t.time_id\n 10  AND    s.prod_id        = p.prod_id\n 11  AND    r.rate_date\
    \  (+) = s.time_id\n 12  AND    r.base_ccy   (+) = 'USD'\n 13  AND    r.target_ccy\
    \ (+) = 'GBP'\n 14  GROUP  BY\n 15         t.calendar_year\n 16  ,      p.prod_name\n\
    \ 17  ;\n```\n```text\n272 行已选择。\n\n已用时间: 00:00:00.97\n```\n\n性能差异惊人！通过移除 PL/SQL\
    \ 函数并直接连接到 `RATES` 表，响应时间已从 66 秒降至仅 1 秒。\n\n**注意：** PL/SQL 函数在 SQL 中调用时有一个不寻常的“特性”：未处理的\
    \ `NO_DATA_FOUND` 异常会静默返回 `NULL`，而不是传播错误。我在清单 9-11 的 `GET_RATE` 函数中没有显式处理 `NO_DATA_FOUND`\
    \ 异常，因此即使我查找的汇率不存在，我在清单 9-12 中的查询也不会失败。相反，该函数将返回 `NULL`，我的查询在行数上将是无损的。为了在清单 9-14\
    \ 的纯 SQL 查询版本中模拟这一点，我只是对 `RATES` 表使用了外连接。\n\n纯 SQL 报告的 Autotrace 统计信息显示在清单 9-15\
    \ 中。\n\n## **清单 9-15.** 在 PL/SQL 函数中封装 SQL 查询（纯 SQL 报告的 Autotrace 输出）\n\n```text\n\
    统计信息\n----------------------------------------------------------\n          0\
    \  递归调用\n          0  数据库块读取\n       1758  一致性读取\n          0  物理读取\n        \
    \  0  重做大小\n      16584  通过 SQL*Net 发送到客户端的字节数\n        425  通过 SQL*Net 从客户端接收的字节数\n\
    \          2  SQL*Net 往返次数\n          0  排序（内存）\n          0  排序（磁盘）\n       \
    \ 272  处理的行数\n```\n\nAutotrace 输出突显了满足两条 SQL 语句所需逻辑 I/O 的显著差异。PL/SQL 函数产生了超过 180\
    \ 万次 `一致性读取` 的开销。清单 9-16 中的 TKProf 报告清楚地显示了在函数中封装汇率查找的成本。\n\n## **清单 9-16.** 在\
    \ PL/SQL 函数中封装 SQL 查询（tkprof 输出）\n\n```sql\nSELECT t.calendar_year\n,      p.prod_name\n\
    ,      SUM(s.amount_sold)                                     AS amt_sold_usd\n\
    ,      SUM(s.amount_sold * get_rate(s.time_id, 'USD', 'GBP')) AS amt_sold_gbp\n\
    FROM   sales      s\n,      products   p\n,      times      t\nWHERE  s.prod_id\
    \ = p.prod_id\nAND    s.time_id = t.time_id\nGROUP  BY\n       t.calendar_year\n\
    ,      p.prod_name\n```\n```text\n调用        次数       CPU      耗时       磁盘    \
    \  查询    当前        行数\n------- ------  -------- ---------- ---------- ----------\
    \ ----------  ----------\n解析        1      0.00       0.00          0        \
    \  0          0           0\n执行        1      0.00       0.00          0     \
    \     0          0           0\n获取        2    105.53     106.38          0  \
    \     1734          0         272\n------- ------  -------- ---------- ----------\
    \ ---------- ----------  ----------\n<输出已截断>\n\n********************************************************************************\n\
    SQL ID: ajp04ks60kqx9 执行计划哈希值: 139684570\n\nSELECT EXCHANGE_RATE\nFROM\n RATES\
    \ WHERE BASE_CCY = :B3 AND TARGET_CCY = :B2 AND RATE_DATE = :B1\n\n调用        次数\
    \       CPU      耗时       磁盘      查询    当前        行数\n------- ------  --------\
    \ ---------- ---------- ---------- ----------  ----------\n解析        0      0.00\
    \       0.00          0          0          0           0\n执行   918843     12.50\
    \      13.85          0          0          0           0\n获取    918843      9.74\
    \      10.86          0    1837686          0      918843\n------- ------  --------\
    \ ---------- ---------- ---------- ----------  ----------\n```\n\nTKProf 报告显示，PL/SQL\
    \ 函数中的 SQL 被视为一个独立的查询；在本例中，它占用了销售查询产生的所有额外逻辑 I/O 以及几乎一半的额外运行时间（如果你好奇本例中剩余的运行时间花在了哪里，分层性能分析器报告显示，总共约有\
    \ 59 秒花在了 PL/SQL 引擎整体上。其中约 47 秒的 PL/SQL 时间由汇率查找 SQL 本身承担——是上述 SQL 跟踪报告数字的两倍——这意味着大约\
    \ 23 秒是 PL/SQL 开销）。基础查询本身的逻辑 I/O 开销很小，实际上与纯 SQL 实现相当。\n\n这种分离突显了一个重要观点。如果嵌入的 SQL\
    \ 被视为一个独立的查询，CBO 就无法在外层查询的上下文中对其进行优化。CBO 完全不知道函数实际做了什么，因此 `RATES` 表甚至没有进入 CBO\
    \ 的决策考量。结果，如你所见，可能是灾难性的。\n\n因此，你可以看到，从性能角度看，将 PL/SQL 查找函数转换为 SQL 是非常有意义的。如果性能至关重要，并且此类查找函数在你的应用程序中被大量使用，建议你尽可能移除它们。我将在本章后面演示一些替代的封装方法，可以帮助你解决这个问题。\n\
    \n然而，我认识到要“扫除”一个遗留应用程序以转换其 SQL 并不总是可行（它可能嵌入许多不同的应用层和技术中，或者回归测试开销可能过于巨大）。在这种情况下，有一些方法可以用来降低\
    \ PL/SQL 函数的成本，我也会在后面展示其中一些。\n\n### 优化器的难题\n\n到目前为止的许多示例展示了 PL/SQL 函数在 SQL 语句的\
    \ `SELECT` 块（投影）中被调用，但在谓词中使用用户编写的函数同样常见。这可能引发一系列问题。首先，正如我之前演示的，在谓词中使用的 PL/SQL\
    \ 函数将执行不可预测的次数。其次，应用于索引列的 PL/SQL 函数（或任何函数）将阻止索引的使用。第三，CBO 对 PL/SQL 函数知之甚少，因为它通常没有可用的统计数据。这可能导致次优的执行计划。我将在这里集中讨论第三个问题，因为我在前面已经描述了第一个问题，而第二个问题在\
    \ Oracle DBA/开发者社区中已被充分理解。\n"
- fmt: "# PL/SQL Functions and Statistics\n\nWhy does the CBO have difficulties with\
    \ PL/SQL functions? The answer is statistics. You know that the CBO relies on\
    \ good-quality statistics to enable it to make sensible optimization decisions.\
    \ When it comes to PL/SQL functions, however, the CBO almost always has no statistics\
    \ to work with and has to resort to default heuristics instead. For example, when\
    \ encountering a predicate of the form `WHERE plsql_function(expression-involving-some-column)\
    \ = value`, the CBO defaults the predicate’s selectivity to just 1% (in the absence\
    \ of statistics for the function, it has no alternative).\n\nIn [Listing 9-17](#Chapter09.html#list_9_17),\
    \ I demonstrate this heuristic using a small table of 1,000 rows, a PL/SQL function,\
    \ and a simple query with CBO tracing enabled (10053 event).\n\n## Listing 9-17.\
    \ Default Selectivity for PL/SQL Function Predicate\n\n```sql\nSQL> CREATE TABLE\
    \ thousand_rows\n  2  AS\n  3     SELECT ROWNUM           AS n1\n  4     ,   \
    \   RPAD('x',50,'x') AS v1\n  5     FROM   dual\n  6     CONNECT BY ROWNUM <=\
    \ 1000;\n\nTable created.\n\nSQL> BEGIN\n  2     DBMS_STATS.GATHER_TABLE_STATS(user,\
    \ 'THOUSAND_ROWS');\n  3  END;\n  4  /\n\nPL/SQL procedure successfully completed.\n\
    \nSQL> CREATE FUNCTION plsql_function (\n  2                  p_id IN INTEGER\n\
    \  3                  ) RETURN INTEGER AS\n  4  BEGIN\n  5     RETURN 0;\n  6\
    \  END plsql_function;\n  7  /\n\nFunction created.\n\nSQL> ALTER SESSION SET\
    \ EVENTS '10053 trace name context forever, level 1';\n\nSession altered.\n\n\
    SQL> set autotrace traceonly explain\n\nSQL> SELECT *\n  2  FROM   thousand_rows\n\
    \  3  WHERE  plsql_function(n1) = 0;\n\nExecution Plan\n----------------------------------------------------------\n\
    Plan hash value: 4012467810\n\n-----------------------------------------------------------------------------------\n\
    | Id  | Operation         | Name          | Rows  | Bytes | Cost (%CPU)| Time\
    \     |\n-----------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT  |               |    10 |   550 |     5   (0)| 00:00:01\
    \ |\n|*  1 |  TABLE ACCESS FULL| THOUSAND_ROWS |    10 |   550 |     5   (0)|\
    \ 00:00:01 |\n-----------------------------------------------------------------------------------\n\
    \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
    \n   1 - filter(\"PLSQL_FUNCTION\"(\"N1\")=0)\n\nSQL> ALTER SESSION SET EVENTS\
    \ '10053 trace name context off';\n\nSession altered.\n```\n\nIn the absence of\
    \ statistics for the PL/SQL function, the CBO has defaulted to a 1% selectivity\
    \ to determine the cardinality of the predicate. You can see this reflected in\
    \ the cardinalities (Rows) displayed in the execution plan above. An excerpt from\
    \ the 10053 trace file in [Listing 9-18](#Chapter09.html#list_9_18) also demonstrates\
    \ the CBO’s calculations.\n\n## Listing 9-18. Default Selectivity for PL/SQL Function\
    \ Predicate (10053 Trace File)\n\n```text\n***************************************\n\
    BASE STATISTICAL INFORMATION\n***********************\nTable Stats::\n  Table:\
    \ THOUSAND_ROWS  Alias: THOUSAND_ROWS\n    #Rows: 1000  #Blks:  12  AvgRowLen:\
    \  55.00  ChainCnt:  0.00\nAccess path analysis for THOUSAND_ROWS\n***************************************\n\
    SINGLE TABLE ACCESS PATH\n  Single Table Cardinality Estimation for THOUSAND_ROWS[THOUSAND_ROWS]\n\
    \  `No statistics type defined for function PLSQL_FUNCTION`\n  `No default cost\
    \ defined for function PLSQL_FUNCTION`\n  `No statistics type defined for function\
    \ PLSQL_FUNCTION`\n  `No default selectivity defined for function PLSQL_FUNCTION`\n\
    \  Table: THOUSAND_ROWS  Alias: THOUSAND_ROWS\n  Card: Original: 1000.000000 \
    \ Rounded: 10  `Computed: 10.00`  Non Adjusted: 10.00\n  Access Path: TableScan\n\
    \    Cost:  5.10  Resp: 5.10  Degree: 0\n      Cost_io: 5.00  Cost_cpu: 3285657\n\
    \      Resp_io: 5.00  Resp_cpu: 3285657\n  Best:: AccessPath: TableScan\n```\n\
    \nI’ve highlighted some important information in this trace file. It states that\
    \ there are no default statistics or statistics types defined for either cost\
    \ or selectivity of the PL/SQL function. This shows you, therefore, that it is\
    \ possible to provide statistics on PL/SQL functions; I’ll demonstrate how to\
    \ do this later."
  raw: '##### PL/SQL Functions and Statistics


    Why does the CBO have difficulties with PL/SQL functions? The answer is statistics.
    You know that the CBO relies on good-quality statistics to enable it to make sensible
    optimization decisions. When it comes to PL/SQL functions, however, the CBO almost
    always has no statistics to work with and has to resort to default heuristics
    instead. For example, when encountering a predicate of the form `WHERE plsql_function(expression-involving-some-column)
    = value`, the CBO defaults the predicate’s selectivity to just 1% (in the absence
    of statistics for the function, it has no alternative).


    In [Listing 9-17](#Chapter09.html#list_9_17), I demonstrate this heuristic using
    a small table of 1,000 rows, a PL/SQL function, and a simple query with CBO tracing
    enabled (10053 event).


    ***Listing 9-17.** Default Selectivity for PL/SQL Function Predicate*


    `SQL> CREATE TABLE thousand_rows`

    `  2  AS`

    `  3     SELECT ROWNUM           AS n1`

    `  4     ,      RPAD(''x'',50,''x'') AS v1`

    `  5     FROM   dual`

    `  6     CONNECT BY ROWNUM <= 1000;`


    `Table created.`


    `SQL> BEGIN`

    `  2     DBMS_STATS.GATHER_TABLE_STATS(user, ''THOUSAND_ROWS'');`

    `  3  END;`

    `  4  /`


    `PL/SQL procedure successfully completed.`


    `SQL> CREATE FUNCTION plsql_function (`

    `  2                  p_id IN INTEGER`

    `  3                  ) RETURN INTEGER AS`

    `  4  BEGIN`

    `  5     RETURN 0;`

    `  6  END plsql_function;`

    `  7  /`


    `Function created.`

    `SQL> ALTER SESSION SET EVENTS ''10053 trace name context forever, level 1'';`


    `Session altered.`


    `SQL> set autotrace traceonly explain`


    `SQL> SELECT *`

    `  2  FROM   thousand_rows`

    `  3  WHERE  plsql_function(n1) = 0;`


    `Execution Plan`

    `----------------------------------------------------------`

    `Plan hash value: 4012467810`


    `-----------------------------------------------------------------------------------`

    `| Id  | Operation         | Name          | Rows  | Bytes | Cost (%CPU)| Time    
    |`

    `-----------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT  |               |    10 |   550 |     5   (0)| 00:00:01
    |`

    `|*  1 |  TABLE ACCESS FULL| THOUSAND_ROWS |    10 |   550 |     5   (0)| 00:00:01
    |`

    `-----------------------------------------------------------------------------------`


    `Predicate Information (identified by operation id):`

    `---------------------------------------------------`


    `   1 - filter("PLSQL_FUNCTION"("N1")=0)`


    `SQL> ALTER SESSION SET EVENTS ''10053 trace name context off'';`


    `Session altered.`


    In the absence of statistics for the PL/SQL function, the CBO has defaulted to
    a 1% selectivity to determine the cardinality of the predicate. You can see this
    reflected in the cardinalities (Rows) displayed in the execution plan above. An
    excerpt from the 10053 trace file in [Listing 9-18](#Chapter09.html#list_9_18)
    also demonstrates the CBO’s calculations.


    ***Listing 9-18.** Default Selectivity for PL/SQL Function Predicate (10053 Trace
    File)*


    `***************************************`

    `BASE STATISTICAL INFORMATION`

    `***********************`

    `Table Stats::`

    `  Table: THOUSAND_ROWS  Alias: THOUSAND_ROWS`

    `    #Rows: 1000  #Blks:  12  AvgRowLen:  55.00  ChainCnt:  0.00`

    `Access path analysis for THOUSAND_ROWS`

    `***************************************`

    `SINGLE TABLE ACCESS PATH`

    `  Single Table Cardinality Estimation for THOUSAND_ROWS[THOUSAND_ROWS]`

    **`  No statistics type defined for function PLSQL_FUNCTION`**

    **`  No default cost defined for function PLSQL_FUNCTION`**

    **`  No statistics type defined for function PLSQL_FUNCTION`**

    **`  No default selectivity defined for function PLSQL_FUNCTION`**

    `  Table: THOUSAND_ROWS  Alias: THOUSAND_ROWS`

    `Card: Original: 1000.000000  Rounded: 10  `**`Computed: 10.00`**`  Non Adjusted:
    10.00`

    `  Access Path: TableScan`

    `    Cost:  5.10  Resp: 5.10  Degree: 0`

    `      Cost_io: 5.00  Cost_cpu: 3285657`

    `      Resp_io: 5.00  Resp_cpu: 3285657`

    `  Best:: AccessPath: TableScan`


    I’ve highlighted some important information in this trace file. It states that
    there are no default statistics or statistics types defined for either cost or
    selectivity of the PL/SQL function. This shows you, therefore, that it is possible
    to provide statistics on PL/SQL functions; I’ll demonstrate how to do this later.'
  trans: "\n# PL/SQL 函数与统计信息\n\n为什么代价优化器（CBO）难以处理 PL/SQL 函数？答案在于统计信息。你知道，CBO 依赖高质量的统计信息来做出合理的优化决策。然而，当涉及到\
    \ PL/SQL 函数时，CBO 几乎总是没有可用的统计信息，只能诉诸于默认的启发式方法。例如，当遇到 `WHERE plsql_function(expression-involving-some-column)\
    \ = value` 这种形式的谓词时，CBO 会默认将该谓词的选择率设定为仅 1%（由于没有该函数的统计信息，它别无选择）。\n\n在代码清单 9-17\
    \ 中，我通过一个小表（包含 1000 行）、一个 PL/SQL 函数以及一个启用了 CBO 跟踪（10053 事件）的简单查询，来演示这种启发式方法。\n\
    \n## 代码清单 9-17. PL/SQL 函数谓词的默认选择率\n\n```sql\nSQL> CREATE TABLE thousand_rows\n\
    \  2  AS\n  3     SELECT ROWNUM           AS n1\n  4     ,      RPAD('x',50,'x')\
    \ AS v1\n  5     FROM   dual\n  6     CONNECT BY ROWNUM <= 1000;\n\n表已创建。\n\n\
    SQL> BEGIN\n  2     DBMS_STATS.GATHER_TABLE_STATS(user, 'THOUSAND_ROWS');\n  3\
    \  END;\n  4  /\n\nPL/SQL 过程已成功完成。\n\nSQL> CREATE FUNCTION plsql_function (\n\
    \  2                  p_id IN INTEGER\n  3                  ) RETURN INTEGER AS\n\
    \  4  BEGIN\n  5     RETURN 0;\n  6  END plsql_function;\n  7  /\n\n函数已创建。\n\n\
    SQL> ALTER SESSION SET EVENTS '10053 trace name context forever, level 1';\n\n\
    会话已更改。\n\nSQL> set autotrace traceonly explain\n\nSQL> SELECT *\n  2  FROM   thousand_rows\n\
    \  3  WHERE  plsql_function(n1) = 0;\n\n执行计划\n----------------------------------------------------------\n\
    Plan hash value: 4012467810\n\n-----------------------------------------------------------------------------------\n\
    | Id  | Operation         | Name          | Rows  | Bytes | Cost (%CPU)| Time\
    \     |\n-----------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT  |               |    10 |   550 |     5   (0)| 00:00:01\
    \ |\n|*  1 |  TABLE ACCESS FULL| THOUSAND_ROWS |    10 |   550 |     5   (0)|\
    \ 00:00:01 |\n-----------------------------------------------------------------------------------\n\
    \n谓词信息 (通过操作标示符识别):\n---------------------------------------------------\n\n \
    \  1 - filter(\"PLSQL_FUNCTION\"(\"N1\")=0)\n\nSQL> ALTER SESSION SET EVENTS '10053\
    \ trace name context off';\n\n会话已更改。\n```\n\n由于缺乏 PL/SQL 函数的统计信息，CBO 默认使用 1% 的选择率来确定该谓词的基数。你可以从上面执行计划中显示的基数（行数）看出这一点。代码清单\
    \ 9-18 中 10053 跟踪文件的节选也展示了 CBO 的计算过程。\n\n## 代码清单 9-18. PL/SQL 函数谓词的默认选择率（10053\
    \ 跟踪文件）\n\n```text\n***************************************\nBASE STATISTICAL\
    \ INFORMATION\n***********************\nTable Stats::\n  Table: THOUSAND_ROWS\
    \  Alias: THOUSAND_ROWS\n    #Rows: 1000  #Blks:  12  AvgRowLen:  55.00  ChainCnt:\
    \  0.00\nAccess path analysis for THOUSAND_ROWS\n***************************************\n\
    SINGLE TABLE ACCESS PATH\n  Single Table Cardinality Estimation for THOUSAND_ROWS[THOUSAND_ROWS]\n\
    \  `No statistics type defined for function PLSQL_FUNCTION`\n  `No default cost\
    \ defined for function PLSQL_FUNCTION`\n  `No statistics type defined for function\
    \ PLSQL_FUNCTION`\n  `No default selectivity defined for function PLSQL_FUNCTION`\n\
    \  Table: THOUSAND_ROWS  Alias: THOUSAND_ROWS\n  Card: Original: 1000.000000 \
