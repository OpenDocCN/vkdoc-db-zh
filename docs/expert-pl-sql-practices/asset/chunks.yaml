    This highlights the fact that views can be a higher-performing alternative to
    PL/SQL functions, without compromising the need for encapsulation and centralization.
    As a final consideration, you could rename the base table and allow the view to
    take on its name. With these actions, you will have “slotted in” the business
    logic columns into the SALES “table” and your DML statements will not be compromised,
