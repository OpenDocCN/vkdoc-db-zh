    `  l_current_sql              call_log.sql_text%type;`


    `  ----------------------------------------------------------------------------------`

    `  -- Returns the call stack below the trigger down to the first non-anonymous
    block.`

    `  ----------------------------------------------------------------------------------`

    `  function caller(`

    `    i_call_stack             varchar2`

    `  ) return varchar2`

    `  as`

    `    c_lf            constant varchar2(1) := chr(10);`

    `    c_pfx_len       constant pls_integer := 8;`

    `    c_head_line_cnt constant pls_integer := 5;`

    `    l_sol                    pls_integer;`

    `    l_eol                    pls_integer;`

    `    l_res                    varchar2(32767);`

    `    l_line                   varchar2(256);`

    `  begin`

    `    l_sol := instr(i_call_stack, c_lf, 1, c_head_line_cnt) + 1 + c_pfx_len;`

    `    l_eol := instr(i_call_stack, c_lf, l_sol);`

    `    l_line := substr(i_call_stack, l_sol, l_eol - l_sol);`

    `    l_res := l_line;`

    `    while instr(l_line, ''anonymous block'') != 0 loop`

    `      l_sol := l_eol + 1 + c_pfx_len;`

    `      l_eol := instr(i_call_stack, c_lf, l_sol);`

    `      l_line := substr(i_call_stack, l_sol, l_eol - l_sol);`

    `      l_res := l_res || c_lf || l_line;  `

    `    end loop;`

    `    return l_res;`

    `  end caller;`


    `begin`

    `  l_caller := nvl(substr(caller(dbms_utility.format_call_stack), 1, 200), ''external'');`

    `  l_current_sql := substrb(sys_context(''userenv'',''current_sql''), 1, 2000);`

    `  insert into call_log(`

    `    object_schema`

    `   ,object_name`

    `   ,policy_name`

    `   ,caller`

    `   ,sql_text`

    `  ) values (`

    `    i_object_schema`

    `   ,i_object_name`

    `   ,i_policy_name`

    `   ,l_caller`

    `   ,l_current_sql`

    `  );`

    `  commit;`

    `exception`

    `  when dup_val_on_index then`

    `    rollback;`

    `end call_log_ins;`


    Finally, I need to add the policy. I want the procedure call_log_ins to be called
    for every access to the table abbr_reg in a select statement. To audit DML as
    well, I must add the parameter `statement_types => ''select,insert,update,delete''`
    to the call or create separate policies for select and for DML.


    `begin`

    `  dbms_fga.add_policy(`

    `    object_name     => ''ABBR_REG''`

    `   ,policy_name     => ''ABBR_REG#SELECT''`

    `   ,handler_module  => ''CALL_LOG_INS''`

    `  );`

    `end;`

    `/`


    I test the implementation by calling abbr_reg#.chk_abbr from my running example,
    like so:


    `SQL> exec abbr_reg#.chk_abbr`


    `PL/SQL procedure successfully completed.`


    `SQL> select object_name, policy_name, caller, sql_text from call_log;`


    `OBJECT_NAME POLICY_NAME     CALLER                         SQL_TEXT`

    `----------- --------------- ------------------------------ ---------------------------------`

    `ABBR_REG    ABBR_REG#SELECT 35  package body K.ABBR_REG#   SELECT COUNT(*) FROM
    ABBR_REG WHE`


    `1 row selected.`


    Neither the DML trigger nor the fine-grained auditing fires on truncate of a table
    or partition. To log or block these, a DDL trigger is required.'
  trans: "\n# 使用细粒度审计检测表访问\n\n由于 Oracle 不提供 `on-select` 触发器，您必须使用变通方法来检测读访问。三种可选方案是细粒度审计、RLS\
    \ 谓词和 Database Vault。这些都需要企业版。Database Vault 是一个需要额外付费的选项。这里介绍的是采用细粒度审计的方法。我将所有不同的调用者记录到\
    \ `call_log` 表中。\n\n```sql\ncreate table call_log(\n   object_schema         \
    \    varchar2(30)\n  ,object_name               varchar2(30)\n  ,policy_name \
    \              varchar2(30)\n  ,caller                    varchar2(200)\n  ,sql_text\
    \                  varchar2(2000 byte)\n  ,constraint call_log#p primary key(object_schema,\
    \ object_name, policy_name\n                                    ,caller, sql_text)\n\
    ) organization index;\n```\n\n![images](img/square.jpg) **注意** Oracle 对索引条目的最大尺寸有限制，该限制基于数据块大小，详见\
    \ My Oracle Support (MOS) Note 136158.1。我在一个数据块大小为 8K、字符集为 AL32UTF8（每个字符最多可占用\
    \ 4 字节）的数据库上运行了此示例。为了在索引中容纳最多信息（该索引用于在创建时避免重复条目），我将 `sql_text` 列的长度语义指定为 `byte`。\n\
    \n该表由过程 `call_log_ins` 填充，细粒度审计框架会在每次 SQL 语句执行时调用此过程，大致相当于语句级触发器。\n\n```sql\n\
    create or replace procedure call_log_ins(\n  i_object_schema            varchar2\n\
    \ ,i_object_name              varchar2\n ,i_policy_name              varchar2\n\
    )\nis\n  pragma autonomous_transaction;\n  l_caller                   call_log.caller%type;\n\
    \  l_current_sql              call_log.sql_text%type;\n\n  ----------------------------------------------------------------------------------\n\
    \  -- 返回触发器之下调用栈中直到第一个非匿名块的部分。\n  ----------------------------------------------------------------------------------\n\
    \  function caller(\n    i_call_stack             varchar2\n  ) return varchar2\n\
    \  as\n    c_lf            constant varchar2(1) := chr(10);\n    c_pfx_len   \
    \    constant pls_integer := 8;\n    c_head_line_cnt constant pls_integer := 5;\n\
    \    l_sol                    pls_integer;\n    l_eol                    pls_integer;\n\
    \    l_res                    varchar2(32767);\n    l_line                   varchar2(256);\n\
    \  begin\n    l_sol := instr(i_call_stack, c_lf, 1, c_head_line_cnt) + 1 + c_pfx_len;\n\
    \    l_eol := instr(i_call_stack, c_lf, l_sol);\n    l_line := substr(i_call_stack,\
    \ l_sol, l_eol - l_sol);\n    l_res := l_line;\n    while instr(l_line, 'anonymous\
    \ block') != 0 loop\n      l_sol := l_eol + 1 + c_pfx_len;\n      l_eol := instr(i_call_stack,\
    \ c_lf, l_sol);\n      l_line := substr(i_call_stack, l_sol, l_eol - l_sol);\n\
    \      l_res := l_res || c_lf || l_line;  \n    end loop;\n    return l_res;\n\
    \  end caller;\n\nbegin\n  l_caller := nvl(substr(caller(dbms_utility.format_call_stack),\
    \ 1, 200), 'external');\n  l_current_sql := substrb(sys_context('userenv','current_sql'),\
    \ 1, 2000);\n  insert into call_log(\n    object_schema\n   ,object_name\n   ,policy_name\n\
    \   ,caller\n   ,sql_text\n  ) values (\n    i_object_schema\n   ,i_object_name\n\
    \   ,i_policy_name\n   ,l_caller\n   ,l_current_sql\n  );\n  commit;\nexception\n\
    \  when dup_val_on_index then\n    rollback;\nend call_log_ins;\n```\n\n最后，我需要添加策略。我希望对于\
    \ `abbr_reg` 表的每次 `select` 语句访问，都能调用过程 `call_log_ins`。为了也能审计 DML，我必须在调用时添加参数 `statement_types\
    \ => 'select,insert,update,delete'`，或者为 `select` 和 DML 分别创建策略。\n\n```sql\nbegin\n\
    \  dbms_fga.add_policy(\n    object_name     => 'ABBR_REG'\n   ,policy_name  \
    \   => 'ABBR_REG#SELECT'\n   ,handler_module  => 'CALL_LOG_INS'\n  );\nend;\n\
    /\n```\n\n我通过从我正在运行的示例中调用 `abbr_reg#.chk_abbr` 来测试此实现，如下所示：\n\n```sql\nSQL> exec\
    \ abbr_reg#.chk_abbr\n\nPL/SQL 过程已成功完成。\n\nSQL> select object_name, policy_name,\
    \ caller, sql_text from call_log;\n\nOBJECT_NAME POLICY_NAME     CALLER      \
    \                   SQL_TEXT\n----------- --------------- ------------------------------\
    \ ---------------------------------\nABBR_REG    ABBR_REG#SELECT 35  package body\
    \ K.ABBR_REG#   SELECT COUNT(*) FROM ABBR_REG WHE\n\n已选择 1 行。\n```\n\n无论是 DML\
    \ 触发器还是细粒度审计，都不会在截断（`truncate`）表或分区时触发。要记录或阻止这些操作，需要 DDL 触发器。\n"
- fmt: '## Modules Containing Multiple Packages or Submodules


    Subprograms and packages are necessary building blocks. Yet higher level modules
    are required to group the thousands of packages in large programs. For example,
    the Avaloq Banking System is divided functionally into core banking, execution
    & operation, and front modules. Each module is further subdivided, such as execution
    & operation into finance and payment. On each modularization level, accepted dependencies
    are declared.


    Orthogonally, the system is divided technically into data access, business logic,
    and presentation layers. The two modularizations can be treated separately or
    be combined as shown on the left side of [Figure 11-3](#Chapter11.html#fig_11_3).
    Atomic modules, such as Finance UI, are defined as intersections of the two modularizations.
    Technical modules are shown as enclosing boxes, first-level functional modules
    by identical shading and name prefixes of the atomic modules belonging together.


    ![images](images/1103.jpg)


    **Figure 11-3.** Nested layer and module architecture and a flat implementation
    with schemas


    Modules as sets of packages and other object types can be represented in Oracle
    with schemas and grants. Both schemas and grants are very flexible, yet low level.
    For example, schemas cannot be nested. Thus the conceptual hierarchical architecture
    on the left side of [Figure 11-3](#Chapter11.html#fig_11_3) must be mapped to
    a flat set of schemas, as shown on the right side. Furthermore, interfaces have
    to be implemented as individual grants to each client schema.


    Therefore, the introduction of a modularization model with a higher abstraction
    level than Oracle schemas and grants improves the understandability by reducing
    the number of items. Oracle schemas and grants can be generated from this model
    if desired or the model can be used to check the modularization within a schema.


    The precise requirements for the metamodel depend upon the chosen modularization.
    Typically, the model must meet the following requirements:


    1. Represent the modules of the system, such as `Payment Logic` and `Business
    Framework` in [Figure 11-3](#Chapter11.html#fig_11_3).

    2. Map every database object to exactly one module, such as the PL/SQL package
    `pay_trx#` to the module `Payment Logic`.

    3. Declare the dependencies between modules, such as `Payment Logic` using `Business
    Framework` but not vice versa. Only acyclic dependencies should be permitted.

    4. Declare the interfaces (APIs) of each module—that is, which objects may be
    referenced from depending modules.

    5. Provide an extension/upcall mechanism that allows a module to be extended by
    another module that depends on it. For example, the `Presentation Framework` may
    declare an extension point for menu items and the `Payment UI` may create a menu
    item. When this menu item is selected, the `Presentation Framework` must make
    an `upcall` to the `Payment UI`. This call is termed `upcall` because it goes
    against the dependency chain: the `Payment UI` depends on the `Presentation Framework`
    and not the other way around.


    In PL/SQL, `upcall`s are usually implemented with generated dispatchers or dynamic
    SQL as described in the section on object-oriented programming. If modules are
    implemented with schemas, the appropriate `execute` object privilege must be granted.


    Grants derived from dependencies and grants required for `upcall`s can be separated
    by placing generated code, such as `upcall` dispatchers, into a separate schema.


    No additional privileges are required at all if `upcall`s are implemented with
    dynamic dispatch as provided by user defined types.


    Optionally, the metamodel can provide the following:


    6. Support hierarchical nesting of modules along one or more dimensions, such
    as functionality and technical layering. Alternatively, dedicated entities, such
    as layers and functional components, can be introduced. Dedicated entities can
    be defined with specific semantics, such as layers allowing only downward dependencies.

    7. Allow for friend modules, which may use additional APIs not available to normal
    client modules. For example, the `Payment Logic` module may provide additional
    APIs only for the `Payment UI` module. Likewise, it may be justified to widen
    the interface between selected modules for performance reasons. Friendship can
    be declared individually or be derived from other entities, such as functional
    domain modules.

    8. Manage exceptions. Upon the introduction of a (new) target modularization,
    it may not be feasible to immediately remove all illegal dependencies, yet no
    additional illegal dependencies must be created going forward. Therefore, the
    temporarily tolerated illegal dependencies must be managed.


    The target architecture model of an application can be defined centrally in a
    single file and/or on a per-module basis. The central definition is suited for
    global high-level entities, such as layers. The per-module configuration is more
    scalable and is required for multiple independent module providers. The manifest
    files of OSGi modules (called bundles in OSGi terminology) are examples of a per-module
    declaration.


    [Figure 11-4](#Chapter11.html#fig_11_4) shows a possible metamodel in form of
    an entity-relationship diagram. I list the previously mentioned requirements in
    parentheses behind the element that satisfies it. At the top of [Figure 11-4](#Chapter11.html#fig_11_4)
    are the modules (requirement 1) and the module types. Hierarchies of modules (requirement
    6) and dependencies between modules (requirement 3) are shown below. With these
    entities you can model the architecture depicted on the left in [Figure 11-3](#Chapter11.html#fig_11_3).


    The objects (such as PL/SQL units, tables, and views) come next. Each object belongs
    to exactly one module (requirement 2). Each object is either private to its containing
    module or is an interface of some type (requirement 4). In the example are several
    types of interfaces: interfaces for other atomic modules with the same functional
    module parent, interfaces for other modules in the same application, and public
    interfaces that can be used by external applications. The additional code table
    `code_object_intf_mode` is used to differentiate between read-only access and
    read-write access to tables.


    ![images](images/1104.jpg)


    **Figure 11-4.** Metamodel for target modularization


    At the bottom of [Figure 11-4](#Chapter11.html#fig_11_4) are the structures to
    represent the two types of exceptions as described by the two values at the bottom
    right.


    * Legacy bugs to be fixed (requirement 8). These should occur only temporarily
    if an application is newly modularized or if the target modularization is changed.

    * Accepted exceptions for `upcall`s (requirement 5).


    Friend modules (requirement 7) are only supported implicitly by functional modules.
    Explicit friend modules could be supported by introducing different module dependency
    types or by modeling friends as additional exception type.


    Modules as groups of PL/SQL packages and other object types can be implemented
    with database schemas or within schemas. The two approaches can be combined, such
    as schemas for the top level modules and grouping within schemas for the submodules.


    ## Schemas as Modules


    Schemas provide a common modularization for all types of objects from PL/SQL units
    to tables at a higher granularity than packages. Every object belongs to a schema.
    Schemas can be used to divide an application into parts. For example, an application
    could be divided into three schemas containing the data access, business logic,
    and presentation layer, respectively.


    Schemas are synonymous with users in Oracle. I create the schemas for the three-layer
    architecture as follows:


    ```

    SQL> create user data_access identified by pwd account lock;


    User created.


    SQL> create user business_logic identified by pwd account lock;


    User created.


    SQL> create user presentation identified by pwd account lock;


    User created.

    ```'
