    ### 总结


    在软件开发生命周期中，你应该像对待任何其他软件语言一样，遵循相同的规范来对待 PL/SQL——尤其是仪表化这一规范。为了编写出快速的代码，并确保其在应用程序的整个生命周期中持续保持快速，你必须在开发期间对代码进行正确的仪表化。用于底层调试和性能分析的工具在开发期间是存在且有用的，但它们并不太适合在生产环境中使用。


    当生产环境中出现性能问题时，分析师需要快速找出对响应时间贡献最大的代码区域。正确的仪表化将为性能分析提供数据，清晰地展示这些信息，从而成功地分析和解决问题。当你能够生成实际运行代码的性能分析，并清晰地指出花费时间最多的代码部分时，你就可以
    `知道` 你正在衡量正确的指标，并且采用了正确的方式进行仪表化。向你的代码中添加良好的仪表化并不困难，而 Oracle 的仪表化库 `ILO` 能让你轻松完成这项工作。


    # 第 14 章：编码规范与错误处理


    **作者：Stephan Petit**


    你能同时穿晚礼服和勃肯鞋吗？是的，可以！任何在粒子物理实验室待过一段时间的人都知道这在技术上是可能的。然而，有人可能会说这样的穿着有悖于优雅的惯例。你也可能喜欢将绿色和蓝色衣服搭配在一起。（我个人更喜欢混搭红色和黑色）。关于各自的品味，我们可以无休止地争论：每个人都对；每个人都错。与此同时，无论成文与否，规范都有助于共同生活和协作。它们有自己的历史和原因。


    编写代码通常很有趣，我们都希望它尽可能好：执行效率高、结构紧凑，如果可能的话，还要有风格。但我们通常不只是为了自己而写代码。如果你曾经为了详细了解某段代码的功能、调试它或修改它，而去阅读别人写的代码，你可能想过“嗯，我不会那样做。”它能运行，但可能很难理解——就像听一个带着浓重口音的表亲说话一样。本章的目标是提出一种编写
    PL/SQL 的方法。我将首先讨论编码规范的优势，然后提出具体的格式规范。接着，我会讨论错误处理，并提供错误处理规范的示例。最后，你会找到一个模板，总结了本章概述的规范。


    ![images](img/square.jpg) **注意** 我绝不声称我所概述的规范是唯一可行的，但它们在我日常工作中已证明是高效的。我认为理解每个规范的原因，并看到一种方法相对于另一种方法的好处，是很重要的。


    ### 为何需要编码规范？


    为什么要费这个事？我们真的需要编码规范吗？让每个人自由发挥自己的艺术天赋，在变量命名、循环缩进等方面任其发挥，岂不是更好？这种自由听起来很诱人，但这是通往毁灭的道路——或者至少是导致你无法按时回家吃饭，因为你被困在办公室调试某些难以理解的代码。以下是建立结构并遵守一套良好规则所带来的好处：


    > **快速理解**：遵循规范编写的代码更易于阅读，因此阅读速度更快。只需稍加练习，读者的眼睛就能立即识别代码中的模式。结构清晰可见，各种元素类型和逻辑块变得显而易见。它还有一个优势，就是能最大限度地减少误解的可能性。说“我喜欢巧克力”比说“我不否认我不讨厌巧克力”要好，即使两句话意思相同。

    >

    > **可靠性**：一旦你的代码完成，让同事审阅一下以找出可能的错误、不一致之处，并确保其逻辑清晰，是件好事。易于阅读和理解的代码能够得到更好的审阅，因此可能更可靠。根据我的经验，我知道当同事知道阅读我的代码不会因为它是我的古怪风格的体现而成为一种痛苦时，也更容易为我的工作找到审阅者。

    >

    > **可维护性**：随着时间的推移维护代码是一项挑战。当你几个月后重新审视自己的代码时，你可能会发现连自己的代码都难以理解。当整个软件包是由多人编写时，情况会更糟。确保在系统生命周期内使用统一的风格，对于维护工作大有裨益。

    >

    > **安全性**：编码规范可以提升系统的安全水平。例如，系统地使用绑定变量可以抵御代码注入威胁。这一点将在后续段落中更详细地描述。

    >

    > **可培训性**：当负责一个系统的团队中几乎每年有一半成员更换时，尽快培训每一位新成员至关重要。当每个人都使用相同的方式表达时，培训会更快。新成员可能不愿意学习一种他/她已经掌握的语言的新使用方式。要敢于推行整个团队使用的标准，并在可能的情况下，让新成员参与现有模块的开发。随处都能发现相同的编码风格，这很快会显现为一个优势。

    >

    > **编码速度**：为什么每次开始编写新模块时都要重新发明轮子？使用编码规范可以消除你可能会问自己的一些关于代码风格的问题。例如，在修改现有过程时，应该遵循原作者的风格，还是应该使用自己的风格？当每个人都使用相同的风格时，这种困境就消失了。

    >

    > **错误处理**：确保所有错误都能被优雅地捕获并正确处理，是交付优秀软件的另一个棘手部分。因此，拥有系统化的错误处理方法和标准化的错误报告方式非常重要。编码规范可以为软件编程的这一方面提供强大的解决方案。


    ### 格式


    让我们首先看一下关于代码实际格式的详细规范。格式化是那些挑剔的人更偏好的规范的一个方面。敢于挑剔。遵循一些简单的规则可以使代码更易于阅读、重用和维护。


    以下部分描述了一些多年来对我行之有效的格式规则。我遵循它们。我的团队也遵循它们。不过，请不要将它们奉为金科玉律。请随意采纳或调整它们，甚至发明你自己的！重要的是，大家步调一致。


    #### 大小写


    对所有 SQL 和 PL/SQL 关键字、过程名、函数名、异常名和常量名使用大写。


    对 `变量`、注释、`表名` 和 `列名` 使用小写。'
- fmt: "# Comments\n\nThere are two ways of writing comments in the middle of some\
    \ code: every single line beginning with `--` or a whole block of text between\
    \ `/*` and `*/`. I decided to use the syntax `--`. I think it nicely highlights\
    \ the text itself, so you don't need to look for where it starts and where it\
    \ ends. Moreover, it has some technical advantage: you still can use `/*`... `*/`\
    \ to comment a block of code for debugging reasons, even when this block contains\
    \ some comments (prefixed with `--`) which you can't do if your code uses the\
    \ `/*`... `*/` syntax. It is slightly heavier to use but can be very handy. You\
    \ choose. Any comment?\n\nThe following is an example of how I comment code within\
    \ a block:\n\n```\nl_book_author := NULL; -- I make sure there is no old value\
    \ in this variable\n\nIF l_book_id < 0 THEN\n  -- This case should not happen\
    \ unless the book was lost.\n  -- Carry on by checking the list of lost books.\n\
    \  ...\nEND IF;\n```\n\n![images](images/square.jpg) **Note** Use comments as\
    \ often as you can! What is obvious to you today may be obscure to somebody else\
    \ (or even to you) tomorrow.\n\n### Comparisons\n\nUse `<>` instead of `!=`. The\
    \ `<>` syntax avoids confusion with `=` when quickly reading.\n\n# Indentation\n\
    \nIf ever there was a programming topic to cause controversy, it is probably the\
    \ topic of how to indent your code. Programmers in all languages have been doing\
    \ battle with this issue for decades. COBOL programmers perhaps have it easiest.\
    \ At least in their language, much of the critical indentation is proscribed by\
    \ the language specification.\n\nThe following sections address specific aspects\
    \ of indenting PL/SQL code. The overall goal is to ease the reading of the code\
    \ and visually identify logical blocks. I chose to use two blanks. One thing:\
    \ avoid tabulations as they can be interpreted in different ways by various software\
    \ development environments and printers.\n\n### General Indentation\n\nUse two\
    \ blanks to indicate that a block is a child of another one, like so:\n\n```\n\
    BEGIN\n  l_author := 'Pierre Boulle';\n  IF p_book_id = 123456 THEN\n    FOR l_counter\
    \ IN 1..100 LOOP\n      ...\n    END LOOP;\n  END IF;\nEXCEPTION\n  WHEN NO_DATA_FOUND\
    \ THEN\n    -- Deal with this error\n    ...\nEND;\n```\n\n### Select Statements\n\
    \nUse one line per fetched column, one line per variable, and one line per element\
    \ of the statement. This approach takes some space but eases the reading and the\
    \ understanding of the whole statement. See in the following example a useful\
    \ way of aligning various items:\n\n```\nSELECT editor\n      ,publication_date\n\
    \  FROM books\nWHERE book_id = 12345\n   OR (book_title      = 'Planet of the\
    \ Apes'\n       AND book_author = 'Pierre Boulle'\n      );\n```\n\n![images](images/square.jpg)\
    \ **Note** This example also shows how parenthesis can be aligned in order to\
    \ clearly show where they start and where they end. Please also note the subtle\
    \ alignment of the equal signs (or when coding becomes painting!)\n\nThis example\
    \ shows how table aliases can be used:\n\n```\nSELECT b1.book_title\n      ,b1.book_id\n\
    \      ,b2.book_id\n  FROM books b1\n      ,books b2\n WHERE b1.book_title = b2.book_title\n\
    \   AND b1.book_id <> b2.book_id;\n```\n\n### Insert Statements\n\nUse one line\
    \ per column and one line per value. Always indicate the names of the columns\
    \ in order to avoid ambiguity. This example shows how things can be aligned:\n\
    \n```\nINSERT INTO books (\n            book_id\n           ,title\n         \
    \  ,author\n           )\n    VALUES (\n            12345\n           ,'Planet\
    \ of the Apes'\n           ,'Pierre Boulle'\n           );\n```\n\n### Update\
    \ and Delete Statements\n\nThey look pretty much the same. Use one line per column\
    \ and value, and one line per element of the statement.\n\n```\nUPDATE books\n\
    \   SET publication_year = 1963\nWHERE book_id = 12345;\n```\n\n```\nDELETE FROM\
    \ books\n WHERE book_id = 12345;\n```\n\n### If Statements\n\nUse one line per\
    \ element. For better reading, it's useful to add a comment after the `END IF`\
    \ keyword, especially when many lines separate it from the matching `IF`. Here\
    \ is an example of a series of `IF` blocks:\n\n```\nIF l_var IS NULL THEN\n  ...\n\
    ELSE\n  IF l_var > 0 AND l_var < 100 THEN\n    ...\n\n  ELSE\n    ...\n  END IF;\
    \ -- l_var is between 0 and 100\nEND IF; -- l_var is null\n```\n\n![images](images/square.jpg)\
    \ **Note** In `IF` blocks, make sure you always have an `ELSE` part in order to\
    \ avoid non-handled cases, unless you are sure that there is nothing to do at\
    \ all. Then, a little comment is a nice thing to write, just to keep in mind that\
    \ the `ELSE` was not purely forgotten. Non-explicitly handled cases can make your\
    \ application behave oddly and difficult to debug.\n\n### Case Statements\n\n\
    Use one line per element, like so:\n\n```\nCASE l_var\n  WHEN value_1 THEN\n \
    \   -- Explanation\n    ...\n  WHEN value_2 THEN\n    -- Explanation\n    ...\n\
    \  ELSE\n    -- Explanation\n    ...\nEND CASE;\n```\n\n### Cursors\n\nUse lower\
    \ case for naming cursors and the suffix *_cursor*. Note the alignment of keywords\
    \ on the left, as in the previous examples, improving the readability of the statement.\n\
    \n```\nCURSOR books_cursor IS\n  SELECT book_id\n        ,title\n    FROM books\n\
    \   WHERE registration_date >= TO_DATE('1971-01-01', 'YYYY-MM-DD')\n   ORDER BY\
    \ title;\n```\n\n### For…loop Statements\n\nUse the *l_* prefix for naming the\
    \ variable used in the loop. When looping on a cursor, use the name of the cursor\
    \ and the suffix *_rec*. Understanding where values come from is then easier when\
    \ reading the code, as in this example:\n\n```\nFOR l_book_rec IN books_cursor\
    \ LOOP\n  FOR l_counter IN 1..100 LOOP\n    ...\n  END LOOP; -- Counter\n  ...\n\
    END LOOP; -- List of books\n```\n\n### String Concatenation\n\nUse one line per\
    \ concatenated element. Reading and modifying are easier this way. Building a\
    \ string from several parts looks like this:\n\n```\nl_text := 'Today, we are\
    \ '||TO_DATE(SYSDATE, 'YYYY-MM-DD')\n                          ||' and the time\
    \ is '\n                          ||TO_DATE(SYSDATE, 'HH24:MI')\n            \
    \              ;\n```"
