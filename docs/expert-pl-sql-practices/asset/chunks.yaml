    ` ORA_ERR_ROWID$                      ROWID`

    ` ORA_ERR_OPTYP$                      VARCHAR2(2)`

    ` ORA_ERR_TAG$                        VARCHAR2(2000)`

    ` AISLE                               VARCHAR2(4000)`

    ` ITEM                                VARCHAR2(4000)`

    ` DESCR                               VARCHAR2(4000)`

    ` STOCKED                             VARCHAR2(4000)`


    Then execute the SQL statement with the additional log error clause to capture
    errors, like so:


    `SQL> insert`

    `  2  into HARDWARE ( item )`

    `  3  with SRC_ROWS as`

    `  4    ( select -3 + rownum     x from dual`

    `  5      connect by level <= 6 )`

    `  6  select x`

    `  7  from SRC_ROWS`

    `  8  `***`log errors reject limit unlimited;`***


    `3 rows created.`


    You’ll find that, similar to the bulk bind example (`bulk_bind_error_5.sql`),
    the erroneous rows have been captured along with the reason for the error.


    `SQL> select`

    `  2   item`

    `  3  ,ora_err_number$`

    `  4  ,ora_err_mesg$`

    `  5  from err$_HARDWARE;`


    `ITEM  ORA_ERR_NUMBER$ ORA_ERR_MESG$`

    `----- --------------- ------------------------------------------------------------`

    `-2               2290 ORA-02290: check constraint (MCDONAC.HARDWARE_CHK) violated`

    `-1               2290 ORA-02290: check constraint (MCDONAC.HARDWARE_CHK) violated`

    `0                2290 ORA-02290: check constraint (MCDONAC.HARDWARE_CHK) violated`


    A complete coverage of the `LOG ERRORS` extension is beyond the scope of this
    book, but the previous example demonstrates how it can be used in a very similar
    fashion to the `SAVE EXCEPTIONS` feature in PL/SQL, with the added benefit of
    having the erroneous data readily available within a table for further processing.


    #### Robust Bulk Bind


    When you bulk collect into a collection, the array is populated from index 1\.
    Almost all of the examples in the standard documentation make this assumption,
    the code typically being along the lines of:


    `begin`

    `  select ...`

    `  bulk collect into <array>`

    `  from ...`


    `for i in` ***`1 .. <array>.count`*** `loop`

    `    <processing>`

    `  end loop;`

    `end;`


    It is very unlikely that Oracle will ever change this behavior, so its reasonably
    safe to assume that any collection initialized with bulk collect will always start
    at an array index of 1\. However, collections don’t fall solely under the domain
    of the bulk collect/bulk bind feature in PL/SQL. In fact, collections pre-date
    bulk operations, going all the way back to Oracle 7\. Once data has been fetched
    into a collection, the developer is free to do whatever they like to the contents
    of a collection. So what happens to a bulk bind operation if the collection no
    longer contains a set of elements starting from index=1\. Let’s explore some scenarios.


    ##### Scenario 1: Elements Do Not Start at 1


    As long as an array’s indices are contiguous, you can use the attributes of the
    array itself to continue to use bulk bind. Consider the following example (`bulk_bind_scenario1.sql`)
    where the array starts from 10\. The array attributes `FIRST` and `LAST` can be
    used to define the extrema of the array for bulk binding.


    `SQL> declare`

    `  2    type t_num_list is table of hardware.item%type index by pls_integer;`

    `  3`

    `  4    val t_num_list;`

    `  5  begin`

    `  6`

    `  7    val(10) := 10;`

    `  8    val(11) := 20;`

    `  9    val(12) := 20;`

    ` 10`

    `11    FORALL i IN` ***`val.first`*** `..` *`val.last`*

    ` 12       insert into hardware ( item ) values (val(i));`

    ` 13`

    ` 14  end;`

    ` 15  /`


    `PL/SQL procedure successfully completed.`


    In fact, it’s probably reasonable to adopt a standard that `.FIRST` and `.LAST`
    attributes should be used in preference to 1 and `.COUNT`. However, the next scenario
    demonstrates that doing so does not provide a total safeguard.'
  trans: "\n#### 使用批处理保存异常\n\n如前所述，当批量绑定大量行时，你将以较小的块来处理这些行，以避免消耗过多的会话 PGA 内存。但是，如果你是分批进行批量绑定，那么每个\
    \ `FORALL` 调用都会重新初始化 `SQL%BULK_EXCEPTIONS` 结构。因此，在这种情况下，该结构无法在一系列批量绑定调用中容纳整个被拒绝的行集。一种可能的解决方法是捕获每次批量绑定调用中的任何错误，将它们保存到表中，然后处理下一个\
    \ 1000 行的批次。下面展示了这种方法的一个示例 (`bulk_error_5.sql`)：\n\n```sql\nSQL> create table\
    \ ERRS\n  2    ( error_index   number(6),\n  3      error_code    number(6),\n\
    \  4      item          number );\n\nTable created.\n\nSQL> set serverout on\n\
    SQL> declare\n  2    type t_list is table of hardware.item%type;\n  3    l_rows\
    \ t_list := t_list(1,-1,2,3,4,-2);\n  4\n  5    bulk_bind_error exception;\n \
    \ 6    pragma exception_init(bulk_bind_error,-24381);\n  7\n  8    type t_err_list\
    \ is table of ERRS%rowtype index by pls_integer;\n  9    l_err_list t_err_list;\n\
    \ 10\n 11  begin\n 12    forall i in 1 .. l_rows.count save exceptions\n 13  \
    \    insert into hardware ( item ) values (l_rows(i));\n 14\n 15  exception\n\
    \ 16    when bulk_bind_error then\n```\n\n如果有行出错，那么一个新的结构 (`l_err_list`) 将被填充，其中包含来自\
    \ `sql%bulk_exceptions` 集合的所有信息。\n\n```sql\n 17      for i in 1 .. sql%bulk_exceptions.count\
    \ loop\n 18         l_err_list(i).error_index := sql%bulk_exceptions(i).error_index;\n\
    \ 19         l_err_list(i).error_code := sql%bulk_exceptions(i).error_code;\n\
    \ 20         l_err_list(i).item := l_rows(sql%bulk_exceptions(i).error_index);\n\
    \ 21      end loop;\n```\n\n然后，这些信息当然会使用批量绑定保存到 `ERRS` 表中！\n\n```sql\n 22    \
    \  forall i in 1 .. l_err_list.count\n 23         insert into ERRS values l_err_list(i);\n\
    \ 24\n 25  end;\n 26  /\n\nPL/SQL procedure successfully completed.\n\nSQL> select\
    \ * from errs;\n\nERROR_INDEX ERROR_CODE       ITEM\n----------- ---------- ----------\n\
    \          2       2290          -1\n          6       2290          -2\n```\n\
    \n#### LOG ERRORS 子句\n\n或者，你可以通过将代码转换为纯 SQL 方法并利用 `LOG ERRORS` 子句来实现类似的效果。从 10g\
    \ 版本开始，如果你打算使用批量绑定的 DML 操作可以在 SQL 中原生表达，你可以以类似于 `SAVE EXCEPTIONS` 子句的方式捕获错误。下面的\
    \ DDL 和代码包含在 `bulk_log_errors.sql` 文件中。\n\n首先，使用提供的 `DBMS_ERRLOG` 包创建一个表来捕获错误。\n\
    \n```sql\nSQL> exec DBMS_ERRLOG.CREATE_ERROR_LOG('HARDWARE');\n\nPL/SQL procedure\
    \ successfully completed.\n```\n\n此执行创建了一个表，该表包含来自 `HARDWARE` 表的列，以及用于指示发生了何种错误的额外列。生成的表结构如下：\n\
    \n```sql\nSQL> desc err$_HARDWARE\n Name                       Null?    Type\n\
    \ -------------------------- -------- ----------------\n ORA_ERR_NUMBER$     \
    \                NUMBER\n ORA_ERR_MESG$                       VARCHAR2(2000)\n\
    \ ORA_ERR_ROWID$                      ROWID\n ORA_ERR_OPTYP$                 \
    \     VARCHAR2(2)\n ORA_ERR_TAG$                        VARCHAR2(2000)\n AISLE\
    \                               VARCHAR2(4000)\n ITEM                        \
    \        VARCHAR2(4000)\n DESCR                               VARCHAR2(4000)\n\
    \ STOCKED                             VARCHAR2(4000)\n```\n\n然后，使用附加的日志错误子句执行\
    \ SQL 语句以捕获错误，如下所示：\n\n```sql\nSQL> insert\n  2  into HARDWARE ( item )\n  3 \
    \ with SRC_ROWS as\n  4    ( select -3 + rownum     x from dual\n  5      connect\
    \ by level <= 6 )\n  6  select x\n  7  from SRC_ROWS\n  8  log errors reject limit\
    \ unlimited;\n\n3 rows created.\n```\n\n你会发现，与批量绑定示例 (`bulk_bind_error_5.sql`)\
    \ 类似，错误行及其错误原因已被捕获。\n\n```sql\nSQL> select\n  2   item\n  3  ,ora_err_number$\n\
    \  4  ,ora_err_mesg$\n  5  from err$_HARDWARE;\n\nITEM  ORA_ERR_NUMBER$ ORA_ERR_MESG$\n\
    ----- --------------- ------------------------------------------------------------\n\
    -2               2290 ORA-02290: check constraint (MCDONAC.HARDWARE_CHK) violated\n\
    -1               2290 ORA-02290: check constraint (MCDONAC.HARDWARE_CHK) violated\n\
    0                2290 ORA-02290: check constraint (MCDONAC.HARDWARE_CHK) violated\n\
    ```\n\n全面介绍 `LOG ERRORS` 扩展超出了本书的范围，但前面的示例演示了如何以与 PL/SQL 中 `SAVE EXCEPTIONS` 功能非常相似的方式使用它，并且还有一个额外的好处：错误数据可直接在一个表中获得，以便进一步处理。\n\
    \n#### 健壮的批量绑定\n\n当你使用 `bulk collect` 收集数据到集合中时，数组是从索引 1 开始填充的。标准文档中的几乎所有示例都基于此假设，代码通常类似于：\n\
    \n```sql\nbegin\n  select ...\n  bulk collect into <array>\n  from ...\n\n  for\
    \ i in 1 .. <array>.count loop\n    <processing>\n  end loop;\nend;\n```\n\nOracle\
    \ 不太可能改变这种行为，因此可以合理地假设任何使用 `bulk collect` 初始化的集合将始终从数组索引 1 开始。然而，集合并不完全属于 PL/SQL\
    \ 中 `bulk collect`/`bulk bind` 功能的范畴。事实上，集合的出现早于批量操作，可以一直追溯到 Oracle 7。一旦数据被提取到集合中，开发人员可以自由地对集合内容进行任何操作。那么，如果集合不再包含一组从\
    \ `index=1` 开始的元素，批量绑定操作会发生什么？让我们探讨一些场景。\n\n##### 场景 1：元素不从 1 开始\n\n只要数组的索引是连续的，你就可以使用数组本身的属性来继续使用批量绑定。考虑以下示例\
    \ (`bulk_bind_scenario1.sql`)，其中数组从 10 开始。可以使用数组属性 `FIRST` 和 `LAST` 来定义批量绑定的数组范围。\n\
    \n```sql\nSQL> declare\n  2    type t_num_list is table of hardware.item%type\
    \ index by pls_integer;\n  3\n  4    val t_num_list;\n  5  begin\n  6\n  7   \
    \ val(10) := 10;\n  8    val(11) := 20;\n  9    val(12) := 20;\n 10\n 11    FORALL\
    \ i IN val.first .. val.last\n 12       insert into hardware ( item ) values (val(i));\n\
    \ 13\n 14  end;\n 15  /\n\nPL/SQL procedure successfully completed.\n```\n\n事实上，采用一个标准，即优先使用\
    \ `.FIRST` 和 `.LAST` 属性而不是 `1` 和 `.COUNT`，可能是合理的。然而，接下来的场景表明，这样做并不能提供完全的保障。\n"
- fmt: "##### Scenario 2: Elements Are Not Contiguous\n\nLet’s repeat the preceding\
    \ example with one slight alteration: a missing entry in the array. The following\
    \ is the example and the resulting error caused by the missing entry (`bulk_bind_scenario2a.sql`):\n\
    \n```sql\nSQL> declare\n  2    type t_num_list is table of hardware.item%type\
    \ index by pls_integer;\n  3\n  4    val t_num_list;\n  5  begin\n  6\n  7   \
    \ val(10) := 10;\n  8  --  val(11) := 20;\n  9    val(12) := 20;\n 10\n 11   \
    \ FORALL i IN val.first .. val.last\n 12       insert into hardware ( item ) values\
    \ (val(i));\n 13\n 14  end;\n 15  /\ndeclare\n*\nERROR at line 1:\nORA-22160:\
    \ element at index [11] does not exist\nORA-06512: at line 11\n```\n\nOnce collections\
    \ become sparse, bulk bind will not automatically work using low and high boundary\
    \ index values. However, from version 10.2 onwards, the `FORALL` syntax has been\
    \ extended to include the `INDICES OF` and `VALUES OF` specification. The use\
    \ of `INDICES OF` fixes the ORA-22160 issue encountered above as demonstrated\
    \ here (`bulk_bind_scenario2b.sql`):\n\n```sql\nSQL> declare\n  2    type t_num_list\
    \ is table of hardware.item%type index by pls_integer;\n  3\n  4    val t_num_list;\n\
    \  5  begin\n  6\n  7    val(10) := 10;\n  8  --  val(11) := 20;\n  9    val(12)\
    \ := 20;\n 10\n 11    FORALL i IN INDICES OF val\n 12       insert into hardware\
    \ ( item ) values (val(i));\n 13\n 14  end;\n 15  /\n```\n\n```\nPL/SQL procedure\
    \ successfully completed.\n```\n\nI really like this syntax. There is no dependency\
    \ on the array attributes, and the code is independent of how the data is spread\
    \ throughout the array. I recommend adopting a standard of using the `INDICES\
    \ OF` clause whenever you want to process an entire collection, and that use of\
    \ `.FIRST`, `.LAST`, and `.COUNT` should be deprecated in your PL/SQL code. Sadly,\
    \ the `INDICES OF` extension can only be used in a `FORALL` statement, not in\
    \ a standard `FOR` loop.\n\nIf, however, the bulk binding you need to perform\
    \ is more along the lines of cutting and slicing an existing collection, then\
    \ this is where the `VALUES OF` syntax can be useful. The `VALUES OF` clause allows\
    \ a level of indirection, somewhat similar to pointers, to allow you to bulk bind\
    \ selected subsets of a larger collection.\n\nIn this next example (`bulk_bind_values_of.sql`),\
    \ a collection will be populated that contains a `STATUS` attribute in that rows\
    \ flagged with a status of `NEW` will be inserted into the `HARDWARE` table and\
    \ rows flagged with status of `UPD` will update their matching rows in the `HARDWARE`\
    \ table. The example thus emulates a `MERGE` statement. The collection will be\
    \ examined to determine which indices should be used for update and which should\
    \ be used for insert. The `VALUES OF` clause will then be used to process the\
    \ rows.\n\nFirst, I’ll create some structures representing the input data. The\
    \ variable `src` will be the input data, containing 100 rows each with a status\
    \ of `NEW` or `UPD`.\n\n```sql\nSQL> set serverout on\nSQL> declare\n  2    type\
    \ t_input_row is record (\n  3       item   hardware.item%type,\n  4       descr\
    \  hardware.descr%type,\n  5       status varchar2(3)\n  6       );\n  7\n  8\
    \    type t_input_list is\n  9       table of t_input_row\n 10       index by\
    \ pls_integer;\n 11\n 12    src t_input_list;\n```\n\nNow two variables (`ind_new`\
    \ and `ind_upd`) are defined and will hold the index values of the appropriate\
    \ rows in `src`. In this way, rather than copying the source data into separate\
    \ collections (one for status = `NEW` and one for status = `UPD`), a record of\
    \ just the index entries is retained. Avoiding the need to copy is of particular\
    \ importance if the source data is large.\n\n```sql\n 13\n 14    type t_target_indices\
    \ is\n 15       table of pls_integer\n 16       index by pls_integer;\n 17\n 18\
    \    ind_new  t_target_indices;\n 19    ind_upd  t_target_indices;\n 20\n 21 \
    \ begin\n```\n\nNow the source data is seeded with some fictitious values (80\
    \ rows of status = `UPD`, and 20 rows of status = `NEW`). In a real world example,\
    \ the data would probably be initialized elsewhere and passed into the application\
    \ for processing.\n\n```sql\n 22    for i in 1 .. 100 loop\n 23       src(i).item\
    \   := i;\n 24       src(i).descr  := 'Item '||i;\n 25       src(i).status :=\
    \  case when mod(i,5) = 0 then 'NEW' else 'UPD' end;\n 26    end loop;\n 27\n\
    ```\n\nNow the data is scanned and the indices arrays are populated with the indices\
    \ that correspond to the two different status values.\n\n```sql\n 28\n 29    for\
    \ i in 1 .. 100 loop\n 30       if src(i).status = 'NEW' then\n 31          ind_new(ind_new.count)\
    \ := i;\n 32       else\n 33          ind_upd(ind_upd.count) := i;\n 34      \
    \ end if;\n 35    end loop;\n```\n\nAnd finally, the `VALUES OF` syntax is used\
    \ to transfer the changes into the `HARDWARE` table. Even though the rows relevant\
    \ to each table are sparsely distributed throughout the `src` collection, the\
    \ `VALUES OF` syntax gives direct access to them for bulk binding.\n\n```sql\n\
    \ 36\n 37    forall i in values of ind_new\n 38       insert into hardware ( aisle,\
    \ item)\n 39       values (1, src(i).item);\n 40    dbms_output.put_line(sql%rowcount||'\
    \ rows inserted');\n 41\n 42    forall i in values of ind_upd\n 43       update\
    \ hardware\n 44       set descr = src(i).descr\n 45       where aisle = 1\n 46\
    \       and item = src(i).item;\n 47    dbms_output.put_line(sql%rowcount||' rows\
    \ updated');\n 48\n 49  end;\n 50  /\n```\n\n```\n20 rows inserted\n80 rows updated\n\
    ```\n\nThe `VALUES OF` and `INDICES OF` syntax completes the bulk bind implementation.\
    \ Any permutation of entries within an array can be manipulated and bound into\
    \ a database table.\n\n##### Earlier Versions of Oracle\n\nIf you own Oracle 10.1\
    \ or below, then your version of Oracle does not yet support the `VALUES OF` or\
    \ `INDICES OF` extensions, but all is not lost. If a collection is possibly sparse,\
    \ then transferring that collection to one that is dense will solve the problem.\
    \ This is not something to done lightly, because if the collection is large in\
    \ size, then you will be holding two copies of the collection in memory while\
    \ you densify the data. I’ll return to the first example in this section where\
    \ the input array did not contain contiguous entries and solve the problem without\
    \ using `VALUES OF` (`bulk_bind_scenario_oldver.sql`).\n\nFirst, here is the code\
    \ to declare the first collection `val`, which will be the sparse collection:\n\
    \n```sql\nSQL> declare\n  2    type t_num_list is table of hardware.item%type\n\
    \  3      index by pls_integer;\n  4\n  5    val t_num_list;\n```\n\nNow a second\
    \ array is defined, which will contain the entries from the sparse collection\
    \ `val`:\n\n```sql\n  6\n  7    dense_val t_num_list;\n  8    idx       pls_integer;\n\
    \  9\n 10  begin\n 11\n 12    val(10) := 10;\n 13    val(12) := 20;\n 14\n```\n\
    \nPopulation of the `dense_val` array is performed by walking along the entries\
    \ of the `val` collection, using the collection attributes `.FIRST` and `.NEXT`.\
    \ The collection `dense_val` will start at 0 (because `dense_val.count` is initially\
    \ zero) and grows up to the number of elements in `val`.\n\n```sql\n 15    idx\
    \ := val.first;\n 16    while idx is not null loop\n 17       dense_val(dense_val.count)\
    \ := val(idx);\n 18       idx := val.next(idx);\n 19    end loop;\n```\n\nThe\
    \ `dense_val` collection is then used rather than sparse `val` to perform the\
    \ bulk bind:\n\n```sql\n 20\n 21    FORALL i IN dense_val.first .. dense_val.last\n\
    \ 22       insert into hardware ( item )\n 23       values (dense_val(i));\n 24\n\
    \ 25  end;\n 26  /\n```\n\n```\nPL/SQL procedure successfully completed.\n```"
