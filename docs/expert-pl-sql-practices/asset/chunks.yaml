    When combined with a well-designed data model, they will perform each of these
    tasks faster than any application method. Here is the challenge: a database system
    must be well designed to perform and to continue to perform even as it is placed
    under increasing demands of more users or more data. It takes time to design a
    database system that will scale to support these demands. When shortcuts are taken
    in the design process, the database system will fail to meet performance requirements;
    this usually leads to a major redesign or hardware expenditure. Both of these
    options represent waste and inefficiency: the redesign requires extra time and
    effort, and even if the hardware is able to bring the system up to acceptable
    performance levels, think of how much more capable the system could have been
    with a good design AND powerful hardware.


    This all sounds quite discouraging: if customers don''t know what they want, don''t
    accurately describe their processes, and will misuse a tool to minimize their
    workload, software developers and the applications they build seem doomed to fail.
    You can''t create a good design up front because you don''t have a complete picture
    of what the application and data will eventually become, and even if you did have
    complete and accurate information about the final requirements at the beginning
    of the project, you don''t have time for data modeling and system design when
    the competition is aiming for the same customer base. Yet if the database design
    is flawed, your users will be unhappy with system response time and your project
    will be plagued with slow response time and system crashes.


    There is another option. You can do something revolutionary: you can recognize
    that change is inevitable, prepare for it and manage it. If you expect change,
    or better yet, encourage it and learn from it, you open up the possibility that
    you will create exactly what the customer needs. If you watch the end user perform
    their work rather than ask them to describe it, you will find the pain points
    in the current process and you may be able to remove those pain points easily.
    This gives you an opportunity to truly innovate and build tools your users need
    but no one has thought of. If you build your applications with customer involvement,
    getting new functionality in their hands early in the process, requesting feedback
    and then using that feedback to improve the application early in the development
    process, the result is a collaborative process and a better product. If you watch
    the customer use the tools you build, you will find even more ways to improve
    your products. This is called *iterative design* and I believe it leads to better
    products, happier customers, and a more satisfying work environment for software
    developers.'
  trans: '# 从二十年的系统开发中学到的教训


    1989 年，斯吉普到我大学招聘时面试了我，在我为他工作期间，他教会了我许多东西。自那份大学毕业后的第一份工作以来，我参与了许多不同类型的软件系统项目。其中一些项目规模很小，我能够独自设计和构建整个应用程序；而另一些则涉及全球数百人的团队。我参与的大多数项目都很复杂，而且每一个项目都被期望遵循加速的设计和实施进度。尽管存在种种差异，但系统开发中有一些基本的现实始终如一。


    ## 客户不知道自己想要什么（直到他们看到它）


    客户只有在看到之后，才知道自己想要什么。只有当他们看到自己的数据能用来做什么时，他们才会开始理解一个新应用程序的真正可能性。也正是在这一刻，他们会开始向项目提出大量的变更请求。如果你想打造一款卓越的产品，最不该做的就是通过拒绝改变来扼杀他们的想法。


    ## 客户会撒谎（并非有意）


    套用格雷戈里·豪斯医生的话说，客户会撒谎。请客户描述他们的流程，大多数时候，他们会给出流程的文档化版本。客户并非有意误导我们，但 ISO 认证流程教会了他们通过描述当前文档化的步骤来回答流程相关的问题。然而，许多流程本身存在缺陷，并且很可能存在书面文档中未包含的额外步骤。**观察客户的实际操作**，你才会看到真正的流程。当你看到文档中没有的步骤时，那就是你找到构建创新产品的最佳机会。


    ## 系统必须让用户的工作更轻松


    如果你构建的系统能让用户的工作更轻松，他们就会使用它并提出更多要求：更多的选项、更多的功能和更高的性能。如果构建的应用程序只增加工作量却没有带来足够的益处，用户就会想办法绕过它，以从未设想过的方式使用它，或者完全避开它。这对他们来说是完全合理的反应：用户有工作要做，而对我们这些应用程序创建者来说至关重要的应用程序和代码，可能只是用户工作日中很小的一部分。当用户不得不绕过应用程序来完成工作时，就会报告更多的缺陷，数据也会随时间推移变得不准确。作为数据库和软件开发者，你需要记住，你的客户并不像你那样着迷于技术的细节。用户需要的是能够持续、可预测地工作的工具。


    ## 速度至关重要


    如果你不能快速提供工具或产品，别人就会提供。这既适用于最终产品，也适用于其构建所依赖的开发环境。如果产品上市迟了，潜在客户就会寻找其他解决方案和其他供应商。如果数据库不能及时支持应用程序开发人员，他们就会寻找其他解决方案来完成工作。即使该解决方案不如使用数据库可能达到的效果好，但以后要移除或优化它通常会非常困难。通常，此类解决方案会在应用程序功能、性能或两者上产生长远的负面影响。


    ## 数据库设计的挑战


    数据库管理系统擅长存储、搜索和转换数据。当与精心设计的数据模型相结合时，它们执行这些任务的速度将超过任何应用程序方法。挑战在于：数据库系统必须设计精良才能表现出色，并且能够在用户或数据量增长带来的日益增加的需求压力下持续表现出色。设计一个能够扩展以满足这些需求的数据库系统需要时间。如果在设计过程中走了捷径，数据库系统将无法满足性能要求；这通常会导致重大重新设计或硬件支出。这两种选择都代表了浪费和低效率：重新设计需要额外的时间和精力；即使硬件能够将系统性能提升到可接受的水平，试想一下，如果结合良好的设计和强大的硬件，系统的潜力将会有多大。


    ## 前进之路：拥抱变化


    这一切听起来相当令人沮丧：如果客户不知道自己想要什么，不能准确描述他们的流程，并且会误用工具来减少自己的工作量，那么软件开发者及其构建的应用程序似乎注定要失败。你无法在前期就做出好的设计，因为你不知道应用程序和数据最终会变成什么样子；即便你在项目开始时就掌握了关于最终需求的完整而准确的信息，当竞争对手也在瞄准相同客户群时，你也没有时间进行数据建模和系统设计。然而，如果数据库设计有缺陷，用户会对系统响应时间感到不满，你的项目也会因响应缓慢和系统崩溃而备受困扰。


    还有另一个选择。你可以做一些革命性的事情：认识到变化是不可避免的，为之做好准备并加以管理。如果你预期变化，或者更好的是，鼓励变化并从中学习，你就打开了创造客户确切所需产品的可能性。如果你观察最终用户执行工作，而不是要求他们描述工作，你就会发现当前流程中的痛点，并且可能能够轻松地消除这些痛点。这给了你一个真正创新并构建用户需要但无人想到的工具的机会。如果你在客户参与的情况下构建应用程序，在开发早期就将新功能交到他们手中，征求反馈并利用这些反馈在开发早期改进应用程序，其结果将是一个协作的过程和一个更好的产品。如果你观察客户使用你构建的工具，你会发现更多改进产品的方法。这被称为*迭代式设计*，我相信它能带来更好的产品、更满意的客户以及软件开发者更愉悦的工作环境。'
- fmt: '### The Database and Agile Development


    Iterative development is not a new concept: there are a multitude of books and
    experts covering software development and iterative design. However, when it comes
    to the database, there is little useful information about how to manage iterative
    database design. At the same time, more and more application databases are created
    without an adequate database design. Whether it is the conceptual, logical, or
    physical design, the one common thread is that intentional design is absent in
    far too many cases. This leads to a far-too-common end result: the database and
    application do not perform to expectations. The application might pass functional
    test requirements, but once it is placed under the expected user load, performance
    may be far from acceptable. While it is possible to make a poorly designed application
    perform better, to build a database that will continue to perform to expectations
    under an increasing number of concurrent users with an ever-growing amount of
    data, you MUST have a well designed schema. You may be able to add more hardware
    resources and improve performance, but think about it. What portion of those hardware
    resources are simply compensating for a bad design? And how much more could you
    get out of your hardware investment if the design flaws didn''t exist? When the
    schema is flawed, the amount of rework required in the application code increases.
    This creates a very big problem as the database schema remains frozen in time
    while the application functionality continues to expand. As change requests continue
    to flow in and additional fields are tacked on to the already problematic schema
    design, performance problems become increasingly difficult to repair.


    The net result of these kinds of problems is that architects and developers have
    come to the conclusion that the solution is to put as little functionality in
    the database as possible. Perhaps this is understandable: because they''ve learned
    to see database changes as painful, they attempt to avoid the pain by avoiding
    the database. They even avoid using the database for the tasks the database does
    best because they are afraid they may have to change it someday. The desire to
    be *database agnostic* adds to the problem as some of the best features and functions
    in the DBMS go unused. The unfortunate and somewhat ironic result is that a very
    expensive DBMS sits idle while teams of workers struggle to recreate functionality
    that is available and paid for under their existing license. Choosing to license
    a powerful product and then design the application as if you''d purchased the
    lowest common denominator is one of the most expensive mistakes a development
    team can make. This is true whether the DBMS is Oracle, MySQL, Postgres, or SQL
    Server. Good developers are hard to find. Why spend their time recreating what
    has already been built by another company and purchased by yours? If the goal
    is to build a competitive product, one that will give the customer what they need
    while maximizing the return on our investment, you should be fully exploiting
    every last useful feature available in the DBMS platform you''ve purchased.


    Thus far, I''ve listed the contradictory goals for software development projects:
    you need to build it fast, you need to proceed before you have sufficient knowledge,
    you need to design to support the long term performance goals and those performance
    goals are probably unknown as well. If you don''t have a product yet, how do you
    know how many users you will attract someday? If you create something amazing
    and innovative, you will have more users than you ever thought possible in a much
    shorter time frame than you expected. Then your enthusiastic users will promptly
    overload the system, resulting in one of those front-page stories about the latest
    software product experiencing a very public failure. You need to aim for stability
    and yet encourage change through an iterative design process. You want your systems
    to be transparent and simple to use so users are able to do their work without
    having to relearn the steps every time they connect, but you must recognize that
    your understanding of the user''s work may be inaccurate. Considering all the
    potential ways a project can fail to meet these challenges, how do software projects
    ever succeed? The one thing you can''t do is turn back the clock to times when
    development didn''t move so fast. Instead, you must expect that designs will change,
    and equip database administrators, database developers, and application developers
    to manage today''s change while remaining focused on the longer term impacts these
    changes will have on the system as a whole.


    ![images](`images/square.jpg`) **Note** In this chapter, there will be references
    to *database development* and *application development*. Both of these labels
    can refer to development of the same application, and one developer may be responsible
    for both layers of development. My intention for this chapter is to differentiate
    between the code that accesses and processes the data, and the code that builds
    the tool to present the data to the end user, not to suggest that an additional
    organizational layer or group of people is required.'
