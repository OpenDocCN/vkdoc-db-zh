    \n## 关于 SYS_STUB_FOR_PURITY_ANALYSIS?\n\n你注意到输出中那个命名奇怪的包 `SYS_STUB_FOR_PURITY_ANALYSIS`\
    \ 了吗？我很确定你没有创建它，而且你肯定没有在过程中使用它。如果你检查数据字典，你会看到只有包的规范（Specification），而没有包体。无论如何，你甚至没有引用这个包，那为什么它被列为\
    \ `UPD_QTY` 过程的父对象呢？\n\n这又是解析机制的另一个隐藏工作原理。还记得 PL/SQL 代码段的纯净度模型吗？总的来说，它规定了存储代码改变数据库和包状态的可能性，例如“不写数据库状态”（WNDS）或“不读包状态”（RNPS）。这些被称为存储代码的纯净度级别。在编译存储代码时，Oracle\
    \ 会假定其处于这些纯净状态之一。然而，考虑这个复杂的情况：有一个名为 `ORDERS` 的公共同义词。当你创建这个过程时，解析必须假定你指的是*你自己的*对象\
    \ `ORDERS`，而不是公共同义词 `ORDERS`。但假设另一个用户正在创建一个同名过程（使用相同的代码），而他没有名为 `ORDERS` 的表？在这种情况下，解析将指向公共同义词。这给解析器带来了一个有趣的问题——必须考虑对象的作用域和纯净度。Oracle\
    \ 通过访问一个特殊的包来解决这个问题，该包中定义了针对纯净度状态的过程。以下是该包的定义：\n\n```sql\nCreate or replace package\
    \ sys_stub_for_purity_analysis as\n  procedure prds;\n  pragma restrict_references(prds,\
    \ wnds, rnps, wnps);\n\n  procedure pwds;\n  pragma restrict_references(pwds,\
    \ rnds, rnps, wnps);\n\n  procedure prps;\n  pragma restrict_references(prps,\
    \ rnds, wnds, wnps);\n\n  procedure pwps;\n  pragma restrict_references(pwps,\
    \ rnds, wnds, rnps);\nend sys_stub_for_purity_analysis;\n```\n\n由于这些过程仅仅是为了提供指向纯净度级别的指针，没有其他用途，因此包体不存在。为什么依赖树可以只针对包规范而没有包体存在？这个有趣的话题将在本章后面讨论。就目前而言，我们希望你对这个奇怪引用的包\
    \ `sys_stub_for_purity_analysis` 的解释感到满意。"
- fmt: "### Shortening Dependency Chains\n\nHow can you reduce this vicious cycle\
    \ of parsing-invalidation-parsing events? One bit of good news is that Oracle\
    \ development has taken notice and the normal dependency model has been changed\
    \ in Oracle Database 11g. Instead of relying on modification of a table or view\
    \ to invalidate dependent objects, Oracle Database 11g adopts a fine-grained dependency\
    \ mechanism that looks at the column changes as well. The dependent objects are\
    \ invalidated only if the columns referenced in them are modified; otherwise,\
    \ they are left valid.\n\nWhat about the cases where you do have to modify a column?\
    \ In Oracle Database 11g, that could trigger invalidations. It may not be possible\
    \ to avoid it completely, but you can reduce the impact if you shorten the dependency\
    \ chain. For instance, if the above dependency chain had been just two levels\
    \ instead of four, there would be fewer recompilations, resulting in lesser CPU\
    \ consumption and parse locks. How can you accomplish this objective?\n\nThe answer\
    \ lies in another type of stored code: packages. Packages handle invalidation\
    \ differently and are much less susceptible than procedures and functions to this\
    \ ripple effect of invalidations in case of a change in an upstream object. Let's\
    \ see this with an example. First, you create a series of tables, packages, and\
    \ procedures.\n\n```sql\n-- Create two tables\ncreate table test1 (\n   col1 \
    \ number;\n   col2  number\n)\n/\ncreate table test2 (\n   col1  number;\n   col2\
    \  number\n)\n/\n-- Create a package to manipulate these tables\ncreate or replace\
    \ package pack1\nis\n    g_var1  number;\n    l_var1  number;\n    procedure p1\
    \ (p1_in test1.col1%TYPE);\n    procedure p2 (p1_in number);\nend;\n/\ncreate\
    \ or replace package body pack1\nas\n    procedure p1 (p1_in test1.col1%type)\
    \ is\n    begin\n        update test1\n        set col2 = col2 + 1\n        where\
    \ col1 = p1_in;\n    end;\n    procedure p2 (p1_in number) is\n    begin\n   \
    \     update test2\n        set col2 = col2 + 1\n        where col1 = p1_in;\n\
    \    end;\nend;\n/\ncreate or replace package pack2\nis\n    procedure p1 (p1_in\
    \ number);\n    procedure p2 (p1_in number);\nend;\n/\ncreate or replace package\
    \ body pack2\nas\n    procedure p1 (p1_in number) is\n    begin\n        pack1.p1(p1_in);\n\
    \    end;\n    procedure p2 (p1_in number) is\n    begin\n        pack1.p2(p1_in);\n\
    \    end;\nend;\n/\n-- Create two procedures calling these packages.\ncreate or\
    \ replace procedure p1\n(\n    p1_in   in number\n)\nis\nbegin\n    pack2.p1 (p1_in);\n\
    end;\n/\ncreate or replace procedure p2\n(\n    p1_in   in number\n)\nis\nbegin\n\
    \    p1(p1_in);\nend;\n```\n\nYou've created two tables, then two packages that\
    \ reference those tables (which then become dependents of the tables), a procedure\
    \ that calls one of the packages, and finally another procedure that calls this\
    \ procedure. From the definition the dependency chain *appears* to be like this:\n\
    \n`P2` ![images](images/U002.jpg) `P1` ![images](images/U002.jpg) `PACK1,PACK2`\
    \ ![images](images/U002.jpg) `TEST1,TEST2`\n\nNow to modify a column of the table\
    \ `TEST2`:\n\n```sql\nSQL> alter table test2 modify (col2 number(9));\n\nTable\
    \ altered.\n```\n\nAs per the dependency rules, all objects (`PACK1`, `PACK2`,\
    \ `P1`, and `P2`) should have been invalidated and remain so until they are recompiled\
    \ either manually or automatically. Confirm it by checking the status of all the\
    \ objects in question.\n\n```sql\nselect object_type, object_name, status\nfrom\
    \ user_objects;\n```\n\n```\nOBJECT_TYPE         OBJECT_NAME                 \
    \    STATUS\n------------------- ------------------------------ -------\nPROCEDURE\
    \           P1                             VALID\nPROCEDURE           P2     \
    \                        VALID\nPACKAGE             PACK1                    \
    \      VALID\nPACKAGE BODY        PACK1                          INVALID\nPACKAGE\
    \             PACK2                          VALID\nPACKAGE BODY        PACK2\
    \                          VALID\nTABLE               TEST1                  \
    \        VALID\nTABLE               TEST2                          VALID\n```\n\
    \nInterestingly, the only invalid object is package body `PACK1`; all others are\
    \ still valid. How did that happen? Why were all the objects dependent on table\
    \ `TEST2` not invalidated?\n\nThe answer lies in the way the dependencies work\
    \ for packages. Let's check these dependencies by running a SQL statement. Since\
    \ you have to run it multiple times, save the following as `dep.sql`:\n\n```sql\n\
    select referenced_type, referenced_owner, referenced_name\nfrom dba_dependencies\n\
    where owner = '&1'\nand name = '&2'\nand type = '&3'\n```\n\nNow you can call\
    \ this script several times with appropriate arguments to get the dependency information.\n\
    \n```sql\nSQL> @dep ARUP P2 PROCEDURE\n\nREFERENCED_TYPE   REFERENCED_OWNER  \
    \              REFERENCED_NAME\n----------------- ------------------------------\
    \ ------------------------------\nPACKAGE           SYS                      \
    \      SYS_STUB_FOR_PURITY_ANALYSIS\nPACKAGE           SYS                   \
    \         STANDARD\nPROCEDURE         ARUP                           P1\n\nSQL>\
    \ @dep ARUP P1 PROCEDURE\n\nREFERENCED_TYPE   REFERENCED_OWNER               \
    \ REFERENCED_NAME\n----------------- ------------------------------ ------------------------------\n\
    PACKAGE           SYS                            SYS_STUB_FOR_PURITY_ANALYSIS\n\
    PACKAGE           SYS                            STANDARD\nPACKAGE           ARUP\
    \                           PACK2\n\nSQL> @dep ARUP PACK2 PACKAGE\n\nREFERENCED_TYPE\
    \   REFERENCED_OWNER                REFERENCED_NAME\n----------------- ------------------------------\
    \ ------------------------------\nPACKAGE           SYS                      \
    \      STANDARD\n\nSQL> @dep ARUP PACK2 'PACKAGE BODY'\n\nREFERENCED_TYPE   REFERENCED_OWNER\
    \                REFERENCED_NAME\n----------------- ------------------------------\
    \ ------------------------------\nPACKAGE           SYS                      \
    \      STANDARD\nPACKAGE           ARUP                           PACK1\nPACKAGE\
    \           ARUP                           PACK2\n\nSQL> @dep ARUP PACK1 PACKAGE\n\
    \nREFERENCED_TYPE   REFERENCED_OWNER                REFERENCED_NAME\n-----------------\
    \ ------------------------------ ------------------------------\nPACKAGE     \
    \      SYS                            STANDARD\n\nSQL> @dep ARUP PACK1 'PACKAGE\
    \ BODY'\n\nREFERENCED_TYPE   REFERENCED_OWNER                REFERENCED_NAME\n\
    ----------------- ------------------------------ ------------------------------\n\
    PACKAGE           SYS                            STANDARD\nTABLE             ARUP\
    \                           TEST1\nPACKAGE           ARUP                    \
    \       PACK1\nTABLE             ARUP                           TEST2\n```\n\n\
    If you put this dependency information, which is really a dependency chain, into\
    \ a diagram, it would look like [Figure 15-1](Chapter15.html#fig_15_1). The arrows\
    \ point from *dependent* to *referenced*. I prefer those terms instead of *child*\
    \ and *parent* simply because parent/child connotes a foreign key relationship.\
    \ Not all dependencies are about referential integrity constraints (which are\
    \ on data). Dependencies are about the references to actual objects, even if the\
    \ objects may contain no data at all."
  raw: '### Shortening Dependency Chains


    How can you reduce this vicious cycle of parsing-invalidation-parsing events?
    One bit of good news is that Oracle development has taken notice and the normal
    dependency model has been changed in Oracle Database11g. Instead of relying on
    modification of a table or view to invalidate dependent objects, Oracle Database
    11g adopts a fine-grained dependency mechanism that looks at the column changes
    as well. The dependent objects are invalidated only if the columns referenced
    in them are modified; otherwise, they are left valid.


    What about the cases where you do have to modify a column? In Oracle Database
    11g, that could trigger invalidations. It may not be possible to avoid it completely,
    but you can reduce the impact if you shorten the dependency chain. For instance,
    if the above dependency chain had been just two levels instead of four, there
    would be fewer recompilations, resulting in lesser CPU consumption and parse locks.
    How can you accomplish this objective?


    The answer lies in another type of stored code: packages. Packages handle invalidation
    differently and are much less susceptible than procedures and functions to this
    ripple effect of invalidations in case of a change in an upstream object. Let''s
    see this with an example. First, you create a series of tables, packages, and
    procedures.


    `-- Create two tables`

    `create table test1 (`

    `   col1  number;`

    `   col2  number`

    `)`

    `/`

    `create table test2 (`

    `   col1  number;`

    `   col2  number`

    `)`

    `/`

    `-- Create a package to manipulate these tables`

    `create or replace package pack1`

    `is`

    `    g_var1  number;`

    `    l_var1  number;`

    `    procedure p1 (p1_in test1.col1%TYPE);`

    `    procedure p2 (p1_in number);`

    `end;`

    `/`

    `create or replace package body pack1`


    `as`

    `    procedure p1 (p1_in test1.col1%type) is`

    `    begin`

    `        update test1`

    `        set col2 = col2 + 1`

    `        where col1 = p1_in;`

    `    end;`

    `    procedure p2 (p1_in number) is`

    `    begin`

    `        update test2`

    `        set col2 = col2 + 1`

    `        where col1 = p1_in;`

    `    end;`

    `end;`

    `/`

    `create or replace package pack2`

    `is`

    `    procedure p1 (p1_in number);`

    `    procedure p2 (p1_in number);`

    `end;`

    `/`

    `create or replace package body pack2`

    `as`

    `    procedure p1 (p1_in number) is`

    `    begin`

    `        pack1.p1(p1_in);`

    `    end;`

    `    procedure p2 (p1_in number) is`

    `    begin`

    `        pack1.p2(p1_in);`

    `    end;`

    `end;`

    `/`

    `-- Create two procedures calling these packages.`

    `create or replace procedure p1`

    `(`

    `    p1_in   in number`

    `)`

    `is`

    `begin`

    `    pack2.p1 (p1_in);`

    `end;`

    `/`

    `create or replace procedure p2`

    `(`

    `    p1_in   in number`

    `)`

    `is`

    `begin`

    `    p1(p1_in);`

    `end;`


    You''ve created two tables, then two packages that reference those tables (which
    then become dependents of the tables), a procedure that calls one of the packages,
    and finally another procedure that calls this procedure. From the definition the
    dependency chain *appears* to be like this:


    `P2` ![images](images/U002.jpg) `P1` ![images](images/U002.jpg) `PACK1,PACK2`![images](images/U002.jpg)
    `TEST1,TEST2`


    Now to modify a column of the table TEST2:


    `SQL> alter table test2 modify (col2 number(9));`


    `Table altered.`


    As per the dependency rules, all objects (PACK1, PACK2, P1, and P2) should have
    been invalidated and remain so until they are recompiled either manually or automatically.
    Confirm it by checking the status of all the objects in question.


    `select object_type, object_name, status`

    `from user_objects;`


    `OBJECT_TYPE         OBJECT_NAME                    STATUS`

    `------------------- ------------------------------ -------`

    `PROCEDURE           P1                             VALID`

    `PROCEDURE           P2                             VALID`

    `PACKAGE             PACK1                          VALID`

    **`PACKAGE BODY        PACK1                          INVALID`**

    `PACKAGE             PACK2                          VALID`

    `PACKAGE BODY        PACK2                          VALID`

    `TABLE               TEST1                          VALID`

    `TABLE               TEST2                          VALID`


    Interestingly, the only invalid object is package body PACK1; all others are still
    valid. How did that happen? Why were all the objects dependent on table TEST2
    not invalidated?


    The answer lies in the way the dependencies work for packages. Let''s check these
    dependencies by running a SQL statement. Since you have to run it multiple times,
    save the following as `dep.sql`:


    `select referenced_type, referenced_owner, referenced_name`

    `from dba_dependencies`

    `where owner = ''&1''`

    `and name = ''&2''`

    `and type = ''&3''`


    Now you can call this script several times with appropriate arguments to get the
    dependency information.


    `SQL> @dep ARUP P2 PROCEDURE`


    `REFERENCED_TYPE   REFERENCED_OWNER               REFERENCED_NAME`

    `----------------- ------------------------------ ------------------------------`

    `PACKAGE           SYS                            SYS_STUB_FOR_PURITY_ANALYSIS`

    `PACKAGE           SYS                            STANDARD`

    `PROCEDURE         ARUP                           P1`


    `SQL> @dep ARUP P1 PROCEDURE`


    `REFERENCED_TYPE   REFERENCED_OWNER               REFERENCED_NAME`

    `----------------- ------------------------------ ------------------------------`

    `PACKAGE           SYS                            SYS_STUB_FOR_PURITY_ANALYSIS`

    `PACKAGE           SYS                            STANDARD`

    `PACKAGE           ARUP                           PACK2`


    `SQL> @dep ARUP PACK2 PACKAGE`


    `REFERENCED_TYPE   REFERENCED_OWNER               REFERENCED_NAME`

    `----------------- ------------------------------ ------------------------------`

    `PACKAGE           SYS                            STANDARD`


    `SQL> @dep ARUP PACK2 ''PACKAGE BODY''`


    `REFERENCED_TYPE   REFERENCED_OWNER               REFERENCED_NAME`

    `----------------- ------------------------------ ------------------------------`

    `PACKAGE           SYS                            STANDARD`

    `PACKAGE           ARUP                           PACK1`

    `PACKAGE           ARUP                           PACK2`


    `SQL> @dep ARUP PACK1 PACKAGE`


    `REFERENCED_TYPE   REFERENCED_OWNER               REFERENCED_NAME`

    `----------------- ------------------------------ ------------------------------`

    `PACKAGE           SYS                            STANDARD`


    `SQL> @dep ARUP PACK1 ''PACKAGE BODY''`


    `REFERENCED_TYPE   REFERENCED_OWNER               REFERENCED_NAME`

    `----------------- ------------------------------ ------------------------------`

    `PACKAGE           SYS                            STANDARD`

    `TABLE             ARUP                           TEST1`

    `PACKAGE           ARUP                           PACK1`

    `TABLE             ARUP                           TEST2`


    If you put this dependency information, which is really a dependency chain, into
    a diagram, it would look like [Figure 15-1](#Chapter15.html#fig_15_1). The arrows
    point from *dependent* to *referenced*. I prefer those terms instead of *child*
    and *parent* simply because parent/child connotes a foreign key relationship.
    Not all dependencies are about referential integrity constraints (which are on
    data). Dependencies are about the references to actual objects, even if the objects
    may contain no data at all.'
  trans: "\n### 缩短依赖链\n\n如何减少这种解析-失效-解析事件的恶性循环？有一个好消息是，Oracle 开发团队已经注意到这个问题，并在 Oracle\
    \ Database 11g 中改变了常规的依赖模型。Oracle Database 11g 不再依赖于对表或视图的修改来使依赖对象失效，而是采用了一种细粒度的依赖机制，同时检查列的变更。只有当所引用的列被修改时，依赖对象才会失效；否则，它们将保持有效状态。\n\
    \n那么，在你确实必须修改列的情况下呢？在 Oracle Database 11g 中，这可能会触发失效。完全避免它可能是不可能的，但你可以通过缩短依赖链来减少其影响。例如，如果上述依赖链只有两级而不是四级，那么需要重新编译的对象就会更少，从而减少\
    \ CPU 消耗和解析锁。如何实现这一目标呢？\n\n答案在于另一种类型的存储代码：包。包处理失效的方式不同，在遇到上游对象变更时，它们比过程和函数更不容易受到这种失效涟漪效应的影响。让我们通过一个例子来看看。首先，创建一系列表、包和过程。\n\
    \n```sql\n-- 创建两个表\ncreate table test1 (\n   col1  number;\n   col2  number\n\
    )\n/\ncreate table test2 (\n   col1  number;\n   col2  number\n)\n/\n-- 创建一个包来操作这些表\n\
    create or replace package pack1\nis\n    g_var1  number;\n    l_var1  number;\n\
    \    procedure p1 (p1_in test1.col1%TYPE);\n    procedure p2 (p1_in number);\n\
    end;\n/\ncreate or replace package body pack1\nas\n    procedure p1 (p1_in test1.col1%type)\
    \ is\n    begin\n        update test1\n        set col2 = col2 + 1\n        where\
    \ col1 = p1_in;\n    end;\n    procedure p2 (p1_in number) is\n    begin\n   \
    \     update test2\n        set col2 = col2 + 1\n        where col1 = p1_in;\n\
    \    end;\nend;\n/\ncreate or replace package pack2\nis\n    procedure p1 (p1_in\
    \ number);\n    procedure p2 (p1_in number);\nend;\n/\ncreate or replace package\
    \ body pack2\nas\n    procedure p1 (p1_in number) is\n    begin\n        pack1.p1(p1_in);\n\
    \    end;\n    procedure p2 (p1_in number) is\n    begin\n        pack1.p2(p1_in);\n\
    \    end;\nend;\n/\n-- 创建两个调用这些包的过程\ncreate or replace procedure p1\n(\n    p1_in\
    \   in number\n)\nis\nbegin\n    pack2.p1 (p1_in);\nend;\n/\ncreate or replace\
    \ procedure p2\n(\n    p1_in   in number\n)\nis\nbegin\n    p1(p1_in);\nend;\n\
    ```\n\n你创建了两个表，然后是引用这些表的两个包（这些包随即成为表的依赖项），一个调用其中一个包的过程，以及最后另一个调用此过程的过程。从定义上看，依赖链*似乎*是这样的：\n\
    \n`P2` ![images](img/U002.jpg) `P1` ![images](img/U002.jpg) `PACK1,PACK2` ![images](img/U002.jpg)\
    \ `TEST1,TEST2`\n\n现在修改表`TEST2`的一个列：\n\n```sql\nSQL> alter table test2 modify\
    \ (col2 number(9));\n\nTable altered.\n```\n\n根据依赖规则，所有对象（`PACK1`、`PACK2`、`P1`和`P2`）都应该失效，并且保持失效状态，直到手动或自动重新编译它们。通过检查所有相关对象的状态来确认这一点。\n\
    \n```sql\nselect object_type, object_name, status\nfrom user_objects;\n```\n\n\
    ```\nOBJECT_TYPE         OBJECT_NAME                     STATUS\n-------------------\
    \ ------------------------------ -------\nPROCEDURE           P1             \
    \                VALID\nPROCEDURE           P2                             VALID\n\
    PACKAGE             PACK1                          VALID\nPACKAGE BODY       \
    \ PACK1                          INVALID\nPACKAGE             PACK2          \
    \                VALID\nPACKAGE BODY        PACK2                          VALID\n\
    TABLE               TEST1                          VALID\nTABLE              \
    \ TEST2                          VALID\n```\n\n有趣的是，唯一失效的对象是包体`PACK1`；所有其他对象仍然有效。这是怎么发生的？为什么所有依赖于表`TEST2`的对象都没有失效？\n\
    \n答案在于包的依赖工作方式。让我们通过运行一条 SQL 语句来检查这些依赖关系。由于需要多次运行它，请将以下内容保存为`dep.sql`：\n\n```sql\n\
    select referenced_type, referenced_owner, referenced_name\nfrom dba_dependencies\n\
    where owner = '&1'\nand name = '&2'\nand type = '&3'\n```\n\n现在你可以多次调用此脚本并使用适当的参数来获取依赖关系信息。\n\
    \n```sql\nSQL> @dep ARUP P2 PROCEDURE\n\nREFERENCED_TYPE   REFERENCED_OWNER  \
    \              REFERENCED_NAME\n----------------- ------------------------------\
    \ ------------------------------\nPACKAGE           SYS                      \
    \      SYS_STUB_FOR_PURITY_ANALYSIS\nPACKAGE           SYS                   \
    \         STANDARD\nPROCEDURE         ARUP                           P1\n\nSQL>\
    \ @dep ARUP P1 PROCEDURE\n\nREFERENCED_TYPE   REFERENCED_OWNER               \
    \ REFERENCED_NAME\n----------------- ------------------------------ ------------------------------\n\
    PACKAGE           SYS                            SYS_STUB_FOR_PURITY_ANALYSIS\n\
    PACKAGE           SYS                            STANDARD\nPACKAGE           ARUP\
    \                           PACK2\n\nSQL> @dep ARUP PACK2 PACKAGE\n\nREFERENCED_TYPE\
    \   REFERENCED_OWNER                REFERENCED_NAME\n----------------- ------------------------------\
    \ ------------------------------\nPACKAGE           SYS                      \
    \      STANDARD\n\nSQL> @dep ARUP PACK2 'PACKAGE BODY'\n\nREFERENCED_TYPE   REFERENCED_OWNER\
    \                REFERENCED_NAME\n----------------- ------------------------------\
    \ ------------------------------\nPACKAGE           SYS                      \
    \      STANDARD\nPACKAGE           ARUP                           PACK1\nPACKAGE\
    \           ARUP                           PACK2\n\nSQL> @dep ARUP PACK1 PACKAGE\n\
    \nREFERENCED_TYPE   REFERENCED_OWNER                REFERENCED_NAME\n-----------------\
    \ ------------------------------ ------------------------------\nPACKAGE     \
    \      SYS                            STANDARD\n\nSQL> @dep ARUP PACK1 'PACKAGE\
    \ BODY'\n\nREFERENCED_TYPE   REFERENCED_OWNER                REFERENCED_NAME\n\
    ----------------- ------------------------------ ------------------------------\n\
    PACKAGE           SYS                            STANDARD\nTABLE             ARUP\
    \                           TEST1\nPACKAGE           ARUP                    \
    \       PACK1\nTABLE             ARUP                           TEST2\n```\n\n\
    如果你将这些依赖关系信息（实际上是一个依赖链）放入图表中，它将如图 15-1 所示。箭头从*依赖项*指向*引用项*。我更喜欢使用这些术语，而不是*子项*和*父项*，仅仅因为父项/子项暗示了外键关系。并非所有依赖关系都涉及引用完整性约束（这些约束是针对数据的）。依赖关系涉及对实际对象的引用，即使这些对象可能根本不包含任何数据。\n"
- fmt: "## 包的依赖与失效\n\n仔细研究[图 15-1](#Chapter15.html#fig_15_1)，你可能会注意到一个有趣的事实：包体（package\
    \ bodies）依赖于*包*（packages），而不是其他的包*体*。这是包的一个非常重要的特性，在依赖链中对象的失效过程中起着有益的作用。由于依赖的是包体而非包本身，所以被失效的是包体，而不是包本身。依赖于这些包的对象因为其引用的对象（包）仍然有效，所以也保持有效。在这个例子中，没有其他对象依赖于`PACK1`包体，所以没有其他对象被失效。\n\
    ![images](images/1501.jpg)\n*图 15-1. 一个复杂的依赖链*\n\n`PACK1`包体何时会重新验证（或重新编译）？由于修改表列并未从根本上改变任何内容，对象可以在被调用时自动重新编译。让我们执行位于依赖链顶端的过程`P2`（即它是最后一个，没有其他对象依赖它）。\n\
    ```\nSQL> exec p2 (1)\n\nPL/SQL procedure successfully completed.\n```\n执行后，检查对象的状态。\n\
    ```\nOBJECT_TYPE         OBJECT_NAME                     STATUS\n-------------------\
    \ ------------------------------ -------\nPROCEDURE           P1             \
    \                 VALID\nPROCEDURE           P2                              VALID\n\
    PACKAGE             PACK1                           VALID\nPACKAGE BODY      \
    \  PACK1                           VALID\nPACKAGE             PACK2          \
    \                 VALID\nPACKAGE BODY        PACK2                           VALID\n\
    TABLE               TEST1                           VALID\nTABLE             \
    \  TEST2                           VALID\n```\n注意包体是如何自动重新编译的。执行`P2`调用了过程`P1`，`P1`又执行了`PACK2.P1`，而`PACK2.P1`反过来执行了`PACK1.P1`。由于`PACK1`是无效的，这次执行强制进行了编译并使其重新验证。这里只编译了一个包体，而不是一整条依赖链的对象，这降低了CPU消耗和解析锁的需求。考虑一下如果这些包都是过程的情况。这将使所有依赖的过程都失效。强制重新编译将导致CPU消耗显著增加，并且需要更多的解析锁。\n\
    \n### 数据类型引用\n\n有时两个最佳实践本身是理想的，但一起使用时却会失败。依赖跟踪和PL/SQL代码中使用的某些数据类型就是这种情况。为了说明问题，我想展示一个略有不同的场景。不是修改表`TEST2`，让我们修改`TEST1`来添加一列，如下所示：\n\
    ```\nSQL> alter table test1 modify (col2 number(8,3));\n\nTable altered.\n```\n\
    如果检查对象状态，你将看到以下内容：\n```\nOBJECT_TYPE         OBJECT_NAME                     STATUS\n\
    ------------------- ------------------------------ -------\nPROCEDURE        \
    \   P1                              VALID\nPROCEDURE           P2            \
    \                  VALID\nPACKAGE             PACK1                          \
    \ INVALID\nPACKAGE BODY        PACK1                           INVALID\nPACKAGE\
    \             PACK2                           VALID\nPACKAGE BODY        PACK2\
    \                           INVALID\nTABLE               TEST1               \
    \            VALID\nTABLE               TEST2                           VALID\n\
    ```\n注意这次修改导致失效的对象——这次更多了。在这种情况下，包和包体`PACK1`都被失效了，而在前一种情况下只有包体被失效。为什么呢？\n\n要回答这个问题，请查看包规范中`P1`的声明。\n\
    ```\n    procedure p1 (p1_in test1.col1%type) is\n```\n数据类型不是像`NUMBER`这样的基本类型；它是通过表`TEST1`中`COL1`的数据类型来引用的。以这种方式定义参数而不是使用基本类型，对于高性能代码来说是个好主意，因为编译会将其与对象组件绑定，使代码运行更快。然而，这也使它比`TEST2`更紧密地依赖于表`TEST1`。修改`TEST2`不会影响包`PACK1`内部的数据类型，但修改`TEST1`中`COL1`的数据类型会改变其中一个参数的数据类型。因此，当`TEST1`被修改时，Oracle检测到包规范也发生了变化，从而将包标记为无效。在修改表`TEST2`的情况下，传递给过程的参数没有被改变，包规范没有受到影响，因此包规范保持有效。\n\
    \n这种失效应该在下次执行最顶层对象时自动重新编译，对吗？不；这次自动重新编译实际上会失败。\n```\nSQL> exec p2 (1)\nBEGIN p1(1);\
    \ END;\n\n*\nERROR at line 1:\nORA-04068: existing state of packages has been\
    \ discarded\nORA-04061: existing state of package \"ARUP.PACK1\" has been invalidated\n\
    ORA-04065: not executed, altered or dropped package \"ARUP.PACK1\"\nORA-06508:\
    \ PL/SQL: could not find program unit being called: \"ARUP.PACK1\"\nORA-06512:\
    \ at \"ARUP.PACK2\", line 5\nORA-06512: at \"ARUP.P1\", line 7\nORA-06512: at\
    \ line 1\n```\n此时，如果检查对象的有效性，你会得到：\n```\nOBJECT_TYPE         OBJECT_NAME     \
    \                STATUS\n------------------- ------------------------------ -------\n\
    PROCEDURE           P1                              VALID\nPROCEDURE         \
    \  P2                              VALID\nPACKAGE             PACK1          \
    \                 VALID\nPACKAGE BODY        PACK1                           INVALID\n\
    PACKAGE             PACK2                           VALID\nPACKAGE BODY      \
    \  PACK2                           VALID\nTABLE               TEST1          \
    \                 VALID\nTABLE               TEST2                           VALID\n\
    ```\n那两个无效的对象因为这次尝试执行而重新验证了。只有一个对象仍然无效：包`PACK1`的包体。如何解释这一点以及之前的错误呢？\n\n问题在于一个称为*包状态*的概念。当一个包首次被调用时，它会在内存中初始化其状态。例如，包中的全局变量就是被初始化的组件之一。当包规范变得无效时，状态也随之失效。状态会被重新初始化，但这发生在错误产生*之后*，因此错误无论如何都会发生。如果你重新执行这个过程，将不会得到相同的错误，因为状态此时已经初始化了。当包第一次没有被重新编译时，它的包体也没有被重新编译。后来，当包状态被初始化且包被成功重新编译后，Oracle并没有回头去尝试*再次*重新编译包体，因此包体保持无效状态。\n\
    \n此时，如果你重新执行过程`P2`，包体`PACK2`也将被重新编译并变为有效。遇到此错误的应用程序除了简单地重新执行它之前执行的过程外，无需做任何其他事情。然而，应用程序可能无法正确处理它，抛出异常并最终导致应用程序中断——这不是一个理想的结果。因此，你应该尝试避免这种类型的失效。你可以很容易地通过在声明部分对参数的数据类型使用基本类型（如`NUMBER`、`DATE`等）而不是`%type`声明来避免它。不幸的是，这样做会导致性能较低的代码。这就引出了一个有趣的难题：你会为了性能而编码，还是为了更高的可用性而编码？\n\
    \n是否有办法同时实现这两个目标：编写性能高且不易失效的代码？幸运的是，有，这将在下一节中描述。"
  raw: 'Studying [Figure 15-1](#Chapter15.html#fig_15_1) carefully, you may notice
    an interesting fact: the package bodies depend on the *packages*; not on other
    package *bodies*. This is a very important property of packages and plays a beneficial
    role in invalidation of the objects in the dependency chain. Since the package
    bodies are dependent, and not the packages, they get invalidated, not the packages
    themselves. Objects that depend on the packages are also left valid since their
    referenced object is valid. In this example, no other object depends on PACK1
    package body, so nothing else was invalidated.


    ![images](images/1501.jpg)


    ***Figure 15-1.** A complex dependency chain*


    When does the PACK1 body get revalidated (or recompiled)? Since the modification
    of the table column does not fundamentally change anything, the objects can be
    recompiled automatically when they are called. Let''s execute procedure P2, which
    is at the top of the dependency chain (i.e. it''s the last, so nothing else depends
    on it).


    `SQL> exec p2 (1)`


    `PL/SQL procedure successfully completed.`


    After execution, check the status of the objects.


    `OBJECT_TYPE         OBJECT_NAME                    STATUS`

    `------------------- ------------------------------ -------`

    `PROCEDURE           P1                             VALID`

    `PROCEDURE           P2                             VALID`

    `PACKAGE             PACK1                          VALID`

    `PACKAGE BODY        PACK1                          VALID`

    `PACKAGE             PACK2                          VALID`

    `PACKAGE BODY        PACK2                          VALID`

    `TABLE               TEST1                          VALID`

    `TABLE               TEST2                          VALID`


    Note how the package body was automatically recompiled. Execution of P2 executed
    procedure P1, which executed PACK2.P1, which in turn executed PACK1.P1\. Since
    PACK1 was invalid, this execution forced the compilation and revalidated it. Only
    one package body was compiled here, not an entire chain of objects, which reduced
    the CPU consumption and parse locks. Consider the same case if the packages were
    procedures. It would have invalidated all the dependent procedures. The forced
    recompilation would have resulted in significantly more CPU consumption and need
    for parse locks.


    ### Datatype Reference


    Sometimes two best practices are desirable on their own but fail when they are
    used together. Such is the case with dependency tracking and some datatypes used
    in PL/SQL code. To illustrate the issue, I want to demonstrate a slightly different
    scenario. Instead of modifying table TEST2, let''s modify TEST1 to add a column,
    like so:


    `SQL> alter table test1 modify (col2 number(8,3));`


    `Table altered.`


    If you check for the status of the objects, you will see the following:


    `OBJECT_TYPE         OBJECT_NAME                    STATUS`

    `------------------- ------------------------------ -------`

    `PROCEDURE           P1                             VALID`

    `PROCEDURE           P2                             VALID`

    **`PACKAGE`****`PACK1`****`INVALID`**

    **`PACKAGE BODY`****`PACK1`****`INVALID`**

    `PACKAGE             PACK2                          VALID`

    **`PACKAGE BODY`****`PACK2`****`INVALID`**

    `TABLE               TEST1                          VALID`

    `TABLE               TEST2                          VALID`


    Note the objects invalidated as a result of this modification—many more this time.
    Both the package and package body PACK1 are invalidated in this case, while only
    the package body was invalidated in the previous case. Why?


    To answer, look at the declaration of P1 in the package specification.


    `    procedure p1 (p1_in test1.col1%type) is`


    The datatype is a not a primitive such as NUMBER; it is referenced with the datatype
    of COL1 in the table TEST1\. Defining parameters this way instead of a primitive
    is a good idea for performant code since the compilation ties it to the object
    components and makes the code faster. However, it also makes it dependent on table
    TEST1 more intimately than TEST2\. Modifying TEST2 does not impact the datatype
    inside the package PACK1, but modifying datatype of COL1 in TEST1 changes the
    datatype of one of the parameters. Therefore, when TEST1 was modified, Oracle
    sensed that the package specification also changed and hence marked the package
    invalid. In case of the alteration of the table TEST2, the parameters passed to
    the procedures were not altered, the package specifications were not affected,
    and the package specification remained valid.


    This invalidation should be automatically recompiled next time the topmost object
    is executed, right? No; this time the automatic recompilation will actually fail.


    `SQL> exec p2 (1)`

    `BEGIN p1(1); END;`


    `*`

    `ERROR at line 1:`

    `ORA-04068: existing state of packages has been discarded`

    `ORA-04061: existing state of package "ARUP.PACK1" has been invalidated`

    `ORA-04065: not executed, altered or dropped package "ARUP.PACK1"`

    `ORA-06508: PL/SQL: could not find program unit being called: "ARUP.PACK1"`

    `ORA-06512: at "ARUP.PACK2", line 5`

    `ORA-06512: at "ARUP.P1", line 7`

    `ORA-06512: at line 1`


    At this point, if you check for the validity of objects, you get the following:


    `OBJECT_TYPE         OBJECT_NAME                    STATUS`

    `------------------- ------------------------------ -------`

    `PROCEDURE           P1                             VALID`

    `PROCEDURE           P2                             VALID`

    `PACKAGE             PACK1                          VALID`

    **`PACKAGE BODY`****`PACK1`****`INVALID`**

    `PACKAGE             PACK2                          VALID`

    `PACKAGE BODY        PACK2                          VALID`

    `TABLE               TEST1                          VALID`

    `TABLE               TEST2                          VALID`


    The two invalid objects were re-validated as a result of this attempted execution.
    Only one object remained invalid: the body of the package PACK1\. How do you explain
    this and the error earlier?


    The problem lies in a concept called *package state*. When a package is called
    for the very first time, it initializes its state in the memory. For instance,
    the global variables are one of the components in the package that are initialized.
    When the package specification becomes invalidated, the state is invalidated as
    well. The state is reinitialized, but right *after* the error, so the error occurs
    anyway. If you re-execute this procedure, you will not get the same error because
    the state has already been initialized this time. When the package was not recompiled
    the first time, its body was not recompiled either. Later, when the package state
    was initialized and the package recompiled fine, Oracle didn''t go back and attempt
    *another* recompilation of the body and the body was left with invalid status.


    At this point, if you re-execute procedure P2, package body PACK2 will be recompile
    and become valid, too. The application getting this error should do nothing other
    than simply re-executing the procedure it executed earlier. However, the application
    may not be able to handle it properly, throwing an exception and eventually causing
    an application outage—not a very desirable outcome. Therefore you should try to
    avoid this type of invalidation. You can easily avoid it by using primitives (such
    as NUMBER, DATE, etc.) for datatypes of parameters in the declaration section
    rather than the `%type` declaration. Unfortunately, doing so will result in less
    performing code. This brings up an interesting conundrum: would you code for performance
    or for more uptime?


    Is there a way to accomplish both goals: writing performant code that does not
    invalidate easily? Fortunately, there is and it''s described in the next section.'
