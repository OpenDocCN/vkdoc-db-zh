    *   When adding new procedures and functions to packages, always add to the end
    instead of in the middle or the top.

    *   Consider using views, not tables, inside the package, which will insulate
    the changes to the tables from the package and reduce invalidations.

    *   When altering synonyms, use CREATE OR REPLACE synonym syntax, not drop/create.

    *   Don''t use constructs like select * or insert into <Table> values (…). Use
    column names explicitly to reduce implicit use of columns and increasing the possibility
    of invalidation.

    *   Avoid declarations referencing entire row, such as TableName%rowtype. Instead,
    use TableName.ColumnName%type.

    *   Use multiple triggers for different types of code. Establish the dependency
    and execution order by FOLLOWS clause.

    *   Always create a trigger as disabled and enable it only after it compiles fine.

    *   When altering an object that might be in use, instead of shutting down the
    application to get the lock, use the ddl_lock_timeout parameter to let the alter
    statement and wait for a suitable time.


    All these recommendations are exactly that: *recommendations*, not gospel to be
    followed blindly. You must consider them carefully in the context of your specific
    scenario and weigh the pros and cons before actually implementing them. In this
    chapter, you learned how dependencies work, how invalidations occur, and how you
    can avoid them, thereby making your application highly available and increasing
    the performance of your application by reducing unnecessary work such as forced
    parsing.


