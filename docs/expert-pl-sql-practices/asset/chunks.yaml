- fmt: '### Creating Triggers Disabled Initially


    Speaking of triggers, there is another issue that bites even the most experienced
    and careful developers. In many organizations, application changes such as new
    trigger code are deployed within a planned and approved “change window,” which
    is usually a time considered to be least impacting for the application and all
    the dependent components are deployed together. Suppose you are creating a new
    trigger (not a change to an existing trigger) on a table. The application change
    is perfectly coordinated and you create the new trigger, like so:


    ```sql

    create or replace trigger tr_u_r_test1

    before update on test1

    for each row

    declare

        l_col1 number;

    begin

        select col1 into l_col1 from test3 where col1 = :new.col1;

        if (l_col1 > 10000) then

            :new.col2 := :new.col2 * 2;

        end if;

    end;

    /

    ```


    And it fails with this message:


    ```

    Warning: Trigger created with compilation errors.

    ```


    ```

    SQL> show error

    Errors for TRIGGER TR_U_R_TEST1:

    LINE/COL ERROR

    -------- -----------------------------------------------------------------

    4/2      PL/SQL: SQL Statement ignored

    6/7      PL/SQL: ORA-00942: table or view does not exist

    ```


    To your consternation, you find that there was a little pre-requisite missed—the
    user was not granted the select privileges on the table `TEST3`, so the trigger
    body was invalid. However, the trigger will fire for update statements since it
    is enabled. You can confirm that by checking the status of the trigger.


    ```sql

    select status from user_triggers where trigger_name = ''TR_U_R_TEST1'';

    ```


    ```

    STATUS

    --------

    ENABLED

    ```


    The fact that the trigger is enabled creates a very serious condition. Since this
    is an update trigger, and it is enabled, the update statements will fail on the
    table. Here is an example:


    ```

    SQL> update test1 set col2 = 2;

    update test1 set col2 = 2

           *

    ERROR at line 1:

    ORA-04098: trigger ''ARUP.TR_U_R_TEST1'' is invalid and failed re-validation

    ```


    Since the trigger is enabled it will be fired for each row updated but all the
    executions will fail since the code is invalid. This failure of execution causes
    an application outage. You can fix the outage immediately by either dropping the
    trigger or disabling it.


    ```sql

    drop trigger tr_u_r_test1;

    alter trigger tr_u_r_test1 disable;

    ```


    However, in a busy system, you may not get the locks to so implement either solution,
    causing the outage to extend for a longer time. To address this issue, Oracle
    11g has a better option; you can create the trigger initially disabled as shown
    below. Note the `disable` clause.


    ```sql

    create or replace trigger tr_u_r_test1

    before update on test1

    for each row

    disable

    declare

        l_col1 number;

    begin

        select col1 into l_col1 from test3 where col1 = :new.col1;

        if (l_col1 > 10000) then

            :new.col2 := :new.col2 * 2;

        end if;

    end;

    ```


    After this trigger is created, if you check the status, it will be disabled. If
    the trigger does not compile due to missing objects or grants, it will cause any
    application issue since it will not be enabled. If the trigger didn''t compile,
    you will know it immediately and be able to correct the problem by adding the
    referenced objects or granting necessary privileges. This way you will have all
    the necessary prerequisites before enabling the trigger. You can also use this
    functionality in a slightly different manner; you can create the trigger prior
    to the change window and enable it during the window using `alter trigger … enable`
    command.


    ### Summary


    Validation of dependent objects as a result of the change in the parent object
    is inevitable. In this chapter, you learned different techniques to reduce the
    number of invalidations. Let''s summarize the key points to know to develop applications
    that have fewer chances of invalidations and create shortened dependency chains.


    *   Dependency chains show how others reference objects. The alteration of an
    object may render the validity of the dependent objects questionable. To resolve
    that potential, Oracle may mark them invalid, forcing a reparse later.

    *   When objects become invalidated, they may be manually recompiled to be valid.
    Objects will be forced into recompiling during runtime when some session invokes
    them.

    *   Compilation requires parse locks and CPU cycles, so it affects performance.

    *   In a RAC database, the invalidation and revalidation must occur in all instances.
    This causes increased inter-instance messaging and locking exacerbating the performance
    issue.

    *   Packages offer different types of dependency. Package bodies, not specifications,
    depend on the objects referenced within the code. Therefore, the specification
    does not get invalidated when the referenced objects are altered (unless the specification
    refers to the altered objects as well). The dependents of the package display
    the specification as the reference, not the body. Therefore, while changes to
    a referenced object may invalidate the body, the package specification may remain
    valid, causing no downstream invalidation.

    *   Use packages instead of standalone procedures and functions to shorten the
    dependency chains and reduce invalidations.

    *   When adding new procedures and functions to packages, always add to the end
    instead of in the middle or the top.

    *   Consider using views, not tables, inside the package, which will insulate
    the changes to the tables from the package and reduce invalidations.

    *   When altering synonyms, use `CREATE OR REPLACE synonym` syntax, not `drop/create`.

    *   Don''t use constructs like `select *` or `insert into <Table> values (…)`.
    Use column names explicitly to reduce implicit use of columns and increasing the
    possibility of invalidation.

    *   Avoid declarations referencing entire row, such as `TableName%rowtype`. Instead,
    use `TableName.ColumnName%type`.

    *   Use multiple triggers for different types of code. Establish the dependency
    and execution order by `FOLLOWS` clause.

    *   Always create a trigger as disabled and enable it only after it compiles fine.

    *   When altering an object that might be in use, instead of shutting down the
    application to get the lock, use the `ddl_lock_timeout` parameter to let the alter
    statement and wait for a suitable time.


    All these recommendations are exactly that: recommendations, not gospel to be
    followed blindly. You must consider them carefully in the context of your specific
    scenario and weigh the pros and cons before actually implementing them. In this
    chapter, you learned how dependencies work, how invalidations occur, and how you
    can avoid them, thereby making your application highly available and increasing
    the performance of your application by reducing unnecessary work such as forced
    parsing.


