    ## 托尔本·霍尔姆


    **托尔本·霍尔姆**自 1987 年以来一直作为开发人员从事计算机行业工作。他自 1992 年起便与`Oracle`合作；最初的四年是作为系统分析师和应用程序开发人员（涉及`Oracle
    7`、`Forms 4.0/Reports 2.0`和`DBA`），之后两年是作为开发人员（涉及`Oracle 6/7`、`Forms 3.0`和`RPT`以及`DBA`）。他曾在`Oracle
    Denmark`的`Premium Services`部门工作了几年，担任高级首席顾问，执行应用程序开发和`DBA`任务。他还担任过`PL/SQL`、`SQL`和`DBA`课程的讲师。托尔本现在为`Miracle
    A/S` (<http://www.miracleas.dk>) 工作，是一名专注于应用程序开发（`PLSQL`、`mod_plsql`、`Forms`、`ADF`）和数据库管理的顾问。他已在`Miracle
    A/S`工作了 10 年。他是一名`Oracle Certified Developer`，也是<http://OakTable.net>的成员。


    ![images](img/square.jpg)

    ## 康纳·麦克唐纳


    **康纳·麦克唐纳**自 1990 年代初便开始使用`Oracle`，初露头角于`Oracle`的`6.0.36`和`7.0.12`版本。在过去的 11 年里，康纳曾在`澳大利亚`、`英国`、`东南亚`、`西欧`和`美国`的系统上工作。他逐渐认识到，尽管世界各地的系统和方法论多种多样，但在开发运行在`Oracle`上的系统时，往往存在两个共同主题：要么刻意避开`Oracle`特有的功能，要么以杂乱无章或不够优化的方式使用它们。正是这一观察，促使他创建了一个个人技巧与提示网站
    (<http://www.oracledba.co.uk>)，并更多地在`Oracle`演讲圈中发表演讲，以期改善业界对`PL/SQL`的认知和使用。


    ![images](img/square.jpg)

    ## 阿鲁普·南达


    **阿鲁普·南达**自 1993 年起便担任`Oracle DBA`，这让他接触了数据库管理的方方面面，从建模到灾难恢复。他目前领导着位于`纽约州白原市`的`喜达屋酒店`（`喜来登`和`威斯汀`等连锁酒店的母公司）的全球`DBA`团队。他担任`独立
    Oracle 用户组` (`IOUG`) 的出版物`SELECT Journal`的特约编辑；在`Oracle World`等众多`Oracle`技术活动以及`纽约
    Oracle 用户组`等本地用户组会议上发表演讲；并为`Oracle Magazine`等印刷出版物以及`Oracle Technology Network`等在线出版物撰写了许多文章。阿鲁普合著了两本书：`Oracle
    Privacy Security Auditing` (`Rampant`, 2003) 和 `Oracle PL/SQL for DBAs` (`O''Reilly`,
    2005)。鉴于其专业成就及对用户社区的贡献，`Oracle`于 2003 年授予他`年度 DBA`称号。阿鲁普与妻子`Anindita`和儿子`Anish`居住在`康涅狄格州丹伯里`。可通过
    <arup@proligence.com> 联系他。


    ![images](img/square.jpg)

    ## 斯蒂芬·珀蒂


    **斯蒂芬·珀蒂**于 1995 年在`瑞士日内瓦`的`欧洲核子研究组织`开始了他的职业生涯，该组织是欧洲粒子物理实验室。他现在负责带领一个由软件工程师和学生组成的团队，为实验室及更广泛的领域交付应用程序和工具。其中一种工具是`工程与设备数据管理系统`，也称为`CERN
    EDMS`。像`CERN`的`大型强子对撞机` (`LHC`) 这样的项目生命周期长达 40 年或更久。`EDMS`是实验室的数字工程记忆。超过一百万份与超过一百万件设备相关的文档存储在`EDMS`中，该系统也被用作`CERN`的`产品生命周期管理`
    (`PL/SQL`) 和`资产跟踪`系统。`EDMS`几乎完全基于`PL/SQL`构建，其预期寿命至少与`LHC`一样长。


    斯蒂芬和他的团队一直在打磨`PL/SQL`中的编码规范和最佳实践，以应对其所面对的非常有趣且混合的挑战：数十年的可维护性、可靠性、高效的错误处理、可扩展性以及模块的可复用性。这些挑战因团队成员的频繁轮换而加剧，其中大多数学生只是在`CERN`短暂工作。最古老的代码片段写于
    1995 年，至今仍在使用——并且成功运行！除了钻研`PL/SQL`，斯蒂芬也喜欢时不时登上舞台，在`CERN`的摇滚夏日音乐节上担任摇滚乐队主唱，或在各种戏剧中扮演角色。

    '
