- fmt: "In fact, all of the `FETCH` calls are not the same duration. The single `FETCH`\
    \ call on line 4231 of the trace file comprised almost 24% of the total response\
    \ time of 8.33 seconds. Instrumentation and profiling allow me to drill down exactly\
    \ where I need to be to make improvements to my software. In this contrived example,\
    \ optimizing procedure `r` means optimizing the query, `SELECT * FROM ALL_OBJECTS`.\
    \ The long `FETCH` call in this case was an anomaly due to the recursive SQL but\
    \ does serve well to show the method.\n\n### Summary\n\nIn the software development\
    \ lifecycle, you should treat PL/SQL with the same disciplines as any other software\
    \ language—especially the discipline of instrumentation. In order to write fast\
    \ code that continues to be fast throughout the life of the application, you must\
    \ properly instrument the code during development. Tools for low level debugging\
    \ and profiling exist and are useful during development, but these are not well\
    \ suited for use in production environments.\n\nWhen performance problems arise\
    \ in a production environment, an analyst needs to quickly find the area of code\
    \ that is the largest contributor to response time. Proper instrumentation will\
    \ provide data for a profile that clearly shows this information, leading to a\
    \ successful analysis and resolution of the problem. You can `know` that you're\
    \ measuring the right things and that you've instrumented the right way, when\
    \ you are able to generate profiles of your code in action that clearly point\
    \ to the portions of the code where the largest amount of time is being spent.\
    \ Adding good instrumentation to your code isn't difficult, and `ILO`, the Instrumentation\
    \ Library for Oracle, makes it painless.\n\n# Chapter 14: Coding Conventions and\
    \ Error Handling\n\n**by Stephan Petit**\n\nCan you wear a Tuxedo and Birkenstocks\
    \ at the same time? Yes, you can! Anyone who spent some time at a particle physics\
    \ laboratory knows it is technically possible. However, some may say that such\
    \ an outfit clashes with the conventions of elegance. You may also like to wear\
    \ a combination of green and blue clothes. (Personally I prefer mixing red and\
    \ black). We can argue endlessly about our respective taste: everyone is right;\
    \ everyone is wrong. At the same time, conventions, written or not, help with\
    \ living and working together. They have their own history and reasons.\n\nIt\
    \ is often fun to write code and we all want to make it as good as possible: efficient\
    \ in terms of execution, compact, and if possible, with style. But we do not usually\
    \ write code just for ourselves. If you ever had to read a piece of code written\
    \ by somebody else in order to understand in details what it does or to debug\
    \ it or to modify it, you probably thought “hmm, I wouldn't have done it that\
    \ way.” It works but it can be hard to understand—a bit like listening to a cousin\
    \ who speaks with a strong accent. The goal of this chapter is to propose one\
    \ way of writing PL/SQL. I will first discuss the advantages of coding conventions,\
    \ then propose specific formatting conventions. I will then discuss error handling\
    \ and provide examples of error handling conventions. At the end, you will find\
    \ a template summarizing the conventions outlined in this chapter.\n\n![images](images/square.jpg)\
    \ **Note** I definitely do not pretend that the conventions I have outlined are\
    \ the only possible ones, but they have proved their efficiency in my day-to-day\
    \ work. I think it's important to understand the reason of each convention and\
    \ see the benefits of one method compared to another.\n\n### Why coding conventions?\n\
    \nWhy even bother? Do we really need coding conventions? Wouldn't it be better\
    \ for each person to let their own artistic talents flourish, giving free reign\
    \ to everyone on naming of variables, indenting of loops, and more? Such freedom\
    \ may sound enticing, but it's the road to ruin—or at least the road to not getting\
    \ home for dinner on time because you're stuck in the office debugging some inscrutable\
    \ code. The following are some benefits that accrue from creating structure and\
    \ adhering to a good set of rules:\n\n> **Quick understanding**: It is easier,\
    \ hence quicker, to read code that was written following conventions. With just\
    \ a little bit of practice, the eyes of the reader immediately identify patterns\
    \ in the code. The structure appears clearly, the various types of elements and\
    \ the logical blocks become obvious. It also has the advantage of minimizing the\
    \ possibility of misunderstanding. It is better to say “I like chocolate” than\
    \ “I do not deny that I don't dislike chocolate,” even if both sentences mean\
    \ the same thing.\n> \n> **Reliability**: Once your code is complete, it is nice\
    \ to have it reviewed by a colleague in order to find possible bugs, inconsistencies,\
    \ and make sure that its logic is clear. Code that is easy to read and easy to\
    \ understand benefits from a better review and then is potentially more reliable.\
    \ From my experience, I know it is also easier to find a reviewer for my work\
    \ when he or she knows that reading my code won't be a pain because it is an expression\
    \ of my twisted style.\n> \n> **Maintainability**: Maintaining code over time\
    \ is a challenge. You may find even your own code to be difficult to understand\
    \ when you revisit it a few months later. It gets worse when a whole package has\
    \ been written by several individuals. Making sure a common style is being used\
    \ during the life of a system is of great help when it comes to maintain it.\n\
    > \n> **Security**: Coding conventions can enhance the level of security of a\
    \ system. For instance, a systematic use of bind variables can insulate against\
    \ code injection threats. This aspect is described in more detail in a following\
    \ paragraph.\n> \n> **Trainability**: When half of the team in charge of a system\
    \ changes almost every year, it is crucial to train every single newcomer as quickly\
    \ as possible. When everyone speaks the same way, training is faster. It may happen\
    \ that a newcomer is reluctant to learn a new way of using a language he or she\
    \ is already mastering. Dare to impose the standards used by the whole team and\
    \ if possible, ask the newcomer to work on existing modules. Finding the same\
    \ coding style everywhere will quickly appear as an advantage.\n> \n> **Speed\
    \ in coding**: Why reinvent the wheel every time you start coding a new module?\
    \ Using coding conventions removes several questions you may ask yourself about\
    \ the style of your code. For instance, when modifying an existing procedure,\
    \ should you follow the style used by the original author or should you use your\
    \ own? When everyone uses the same style, such a dilemma simply vanishes.\n> \n\
    > **Error handling**: Making sure that all errors are gracefully trapped and correctly\
    \ treated is another tricky part of delivering good software. Therefore, it is\
    \ important to have a systematic approach to errors and a standardized way of\
    \ reporting them. Coding conventions can bring a powerful solution to this aspect\
    \ of software programming.\n\n### Formatting\n\nLet's begin by looking at detailed\
    \ conventions concerning how code is physically formatted. Formatting is one aspect\
    \ of convention that picky people prefer. Dare to be picky. Following some simple\
    \ rules makes code easier to read, reuse, and maintain.\n\nThe following sections\
    \ describe some formatting rules that have worked well for me over the years.\
    \ I follow them. My team follows them. Please though, do not take them as gospel.\
    \ Feel free to adopt or adapt them, even invent your own! What is important is\
    \ that everyone walks the same way.\n\n#### Case\n\nUse upper case for all SQL\
    \ and PL/SQL keywords, names of procedures, functions, exceptions, and constants.\n\
    \nUse lower case for `variables`, comments, `table names`, and `column names`."
