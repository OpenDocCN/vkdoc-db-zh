    ### Summary


    This chapter explained how to best understand the code that you are responsible
    for. It explained the different types of code analysis available natively from
    Oracle and showed how to use those tools in your daily development. You should
    now understand the benefits of both static code analysis and dynamic code analysis.
    You should also be able to sit down to configure these tools, use them, and understand
    the output.


    I reviewed the data dictionary views that are most important for static analysis
    and showed how they compare to the `PL/Scope` utility provided by Oracle in 11g.
    The chapter then moved onto dynamic analysis and the type of data available to
    you from those tools.


    One of the beauties of implementing the suggestions in this chapter is that there
    is nothing here that you should not already be doing—this chapter just shows you
    how to it all more efficiently and how to avoid human errors. You should already
    have standards; you should already be doing code reviews; you should be intelligently
    instrumenting your code and profiling that code, before production, so that you
    know that when you get to production it will run reliably and be maintainable.


    The effort to make the best use of these tools in your environment is a onetime
    expense that you put out up front and then benefit from on every project going
    forward. Before creating your own reports and tools based on the information in
    this chapter, I suggest you either create or firm up your coding and testing standards.
    You will get much more value from these tools, as well as the ability to automate
    more of your reviews and tests, if everyone is using the same standards when developing
    their `PL/SQL`.


    You don''t have to use the tools provided by Oracle. There are third party tools
    that will provide much of this functionality, most probably using the items discussed
    in the chapter. The important thing is that you decide to incorporate impact analysis
    and other code analysis into your workflow for better quality applications.


    Also, don''t feel like you are “stuck” with the out-of-the-box functionality.
    Create your own tables for querying and use things like `PL/Scope` as a starting
    point. Massage the data until you get what you feel is valuable. Don''t take what
    is presented in this chapter as the end point. It is meant as the starting point.


    After having read this chapter, I hope you “get” why source code analysis is useful.
    I also sincerely hope that you are not thinking that code reviews and profiling
    are not worth the work. If you do think this, I only ask you to please read the
    rest of this book (especially [Chapter 13](#Chapter13.html#ch13)) and think about
    it.


    Anything new can seem complex and intrusive to your normal routine. If you have
    never participated in a code review, it is frightening the first time. Once you
    start getting the benefits of fewer bugs and better code, you will get on board
    with the idea. The same is true of code analysis: once you''ve done the work of
    analysis the first time, it''s really not very hard thereafter, and the benefits
    pays dividends for the life time of the program.


    Don''t make knowing your code an add-on to your development. Build it in. Know;
    don''t guess.


    ## C H A P T E R  8


    ## Contract-Oriented Programming


    by John Beresniewicz


    This chapter will introduce you to a powerful software engineering paradigm called
    Design by Contract and a method for applying it to `PL/SQL` programming.


    ### Design by Contract


    The following quote struck me as a revelation of software-truth when I first read
    it sometime in the year 2000:


    > Design by Contract is a powerful metaphor that…makes it possible to design software
    systems of much higher reliability than ever before; the key is understanding
    that reliability problems (more commonly known as bugs) largely occur at module
    boundaries, and most often result from inconsistencies in both sides’ expectations.
    Design by Contract promotes a much more systematic approach to this issue by encouraging
    module designers to base communication with other modules on precisely defined
    statements of mutual obligations and benefits, not on vague hopes that everything
    will go right.


    —Bertrand Meyer, *Object Success*


    I had written quite a lot of `PL/SQL` code as part of developing an Oracle performance
    diagnostic tool for DBAs and had come to loathe chasing down runtime bugs, many
    of which were of precisely the kind noted by Meyer, which is to say misuse or
    confusion regarding APIs between modules. The promise of engineering such bugs
    out of my code motivated me to learn more about Design by Contract and apply it
    somehow to `PL/SQL` programming.


    #### Software Contracts


    Design by Contract makes the observation that software modules have client-supplier
    relationships that can be modeled after legal contracts where two parties enter
    into an agreement of mutual self-interest and obligation. Each party expects to
    benefit somehow from the contract, and each party is usually also under some obligation
    from the contract. In the world of software, contracts can be thought of as the
    rules under which the APIs between calling and called modules must function. The
    calling module provides some input values or other system state when the API is
    invoked, and the called module is expected to reliably compute some output or
    resultant system state upon completion. If the rules governing these inputs and
    outputs are broken, there is a contract violation and the software has a defect,
    or bug.


    The concept of software contracts governing APIs is powerful for many reasons,
    but most especially because a high percentage of bugs are due to confusion or
    misuse at API boundaries, as suggested in the quote from Meyer. If we can enforce
    API contracts in some way such that contract violations are exposed immediately,
    we can discover an entire class of bugs quickly and improve the reliability of
    software greatly.

