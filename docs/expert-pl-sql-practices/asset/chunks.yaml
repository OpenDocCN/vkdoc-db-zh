  trans: "\n## 代码覆盖测试与性能指标\n\n代码覆盖测试是一种测试方法，用于验证程序中每一条`可执行`的代码行是否确实被执行了。这种测试属于**回归测试**，而非功能测试。某段代码被执行过，并不意味着它被正确地执行了。然而，如果它至少被执行过一次，那么你就知道它实际上在特定情况下能够无错误地运行。\n\
    \n代码覆盖测试本身意义不大。但作为自动化构建流程的一部分，或作为一个完整测试计划的一个组成部分，它确实有其用处。我喜欢使用代码覆盖测试，理由和我喜欢编译器错误一样——它能发现大量小错误。不过，如果没有合适的工具，进行这种测试会非常困难。幸运的是，Oracle\
    \ 已为我们提供了所需的大部分工具。\n\n我在这里并不特别关注性能指标（尽管没有理由不将其包括在内）。我希望看到的是，所有可执行的代码都被执行了。\n\n\
    可以将 `DBMS_TRACE` 和 `DBMS_PROFILER` 的输出结合起来，以获取每行已执行代码及其上下文的一个清晰跟踪。要做到这一点，需要创建一个巧妙的查询，并了解哪些运行是相关的（因为它们是一起运行或在非常接近的时间运行的）。如果将不同版本代码的分析器运行和跟踪运行混在一起，你会得到一团非常混乱的输出。但如果你知道这些运行是匹配的，那么这些信息就非常有用。\n\
    \n下面的查询连接了 `DBMS_PROFILER` 的输出和 `DBMS_TRACE` 的输出。为了简化查询，我省略了 `PLSQL_TRACE_RUNS`\
    \ 和 `PLSQL_PROFILER_RUNS` 表——这些才是你实际应该开始的地方。我只是手动从两者中各选择了一次运行。我过滤掉了特定的事件类型，具体是\
    \ SQL 调用 (54) 和过程调用返回 (50)。你可以从文档或 `tracetab.sql` 安装代码中获取所有事件类型的列表。在查看 `total_time`\
    \ 时，我喜欢了解谁被调用、从哪里调用以及代码具体做了什么。\"谁\"和\"哪里\"的信息来自 `DBMS_TRACE` 数据，而\"什么\"则来自 `USER_SOURCE`。查询如下：\n\
    \n```sql\nBREAK ON event_unit ON event_proc_name\nSELECT event_unit, event_proc_name,\
    \ line# line,\n       total_time time, pse.proc_unit, pse.proc_name,\n       substr(ltrim(rtrim(text)),1,30)\
    \ source_text\nFROM (\n  (SELECT ppu.runid, ppu.unit_type, ppu.unit_name,\n  \
    \        ppd.line#, ppd.total_time\n     FROM plsql_profiler_units ppu\n     JOIN\
    \ plsql_profiler_data ppd\n       ON(ppu.runid = ppd.runid\n       AND ppu.unit_number\
    \ = ppd.unit_number)\n     WHERE ppu.runid = :PROF_RUNID\n       AND ppd.total_time\
    \ != 0)) prof_data\nJOIN (\n    SELECT event_unit, event_proc_name, event_line,\n\
    \           proc_unit, proc_name, event_unit_kind,\n           event_kind, min(event_seq)\
    \ event_seq\n    FROM plsql_trace_events trace_data\n    WHERE runid = :TRACE_RUNID\n\
    \      AND event_kind NOT IN (50, 54)\n    GROUP BY  event_unit, event_proc_name,\
    \ event_line,\n           proc_unit, proc_name, event_unit_kind,\n           event_kind)\
    \ pse\n  ON (pse.event_unit = prof_data.unit_name\n  AND pse.event_line = prof_data.line#)\n\
    JOIN user_source us\n  ON (us.name = pse.event_unit\n  AND us.type = pse.event_unit_kind\n\
    \  AND us.line = pse.event_line)\nORDER BY event_seq;\n```\n\n```\nEVENT_UNIT\
    \         EVENT_PROC_NAME          LINE    TIME PROC_UNIT\n------------------\
    \ ----------------------- ----- ------- -----------------\nPROC_NAME         \
    \      SOURCE_TEXT\n----------------------- ------------------------------\nEMPLOYEE_API\
    \       CREATE_EMPLOYEE             3   12933\n                        FUNCTION\
    \ create_employee(\n\n                                             20    2984\n\
    \                        v_exception BOOLEAN := FALSE;\n\n                   \
    \                          21    3979\n                        v_exception_message\
    \ CHAR(2048)\n\n                                             24  247720\n    \
    \                    v_department_id := departments\n\n                      \
    \                       24  247720 DEPARTMENTS_API\nDEPARTMENT_EXISTS       v_department_id\
    \ := departments\n\nDEPARTMENTS_API    DEPARTMENT_EXISTS           3    7958\n\
    \                        FUNCTION department_exists(\n\n                     \
    \                          9  185044\n                        SELECT department_id\n\
    \n                                              14    1989\n                 \
    \       RETURN v_department_id;\n\nEMPLOYEE_API       CREATE_EMPLOYEE        \
    \    24  247720\n                        v_department_id := departments\n.\n.\n\
    .\n38 rows selected.\n```\n\n将这个输出格式化以适应页面相当困难，但希望你能看出其中的端倪。输出从包体 `EMPLOYEE_API.CREATE_EMPLOYEE`\
    \ 的第 3 行开始。该行的执行时间是 12,933，实际执行的代码（至少其前 30 个字节）是 `FUNCTION create_employee`。\n\
    \n输出的第二行对应于包体的第 20 行，是一个赋值操作，耗时 2,984。你可以将此输出中的代码与实际源代码进行比较，可以看到第 20 行是第一个可执行行。它之前的所有内容都是参数和声明。这个赋值操作（虽然是在声明部分）使其成为可执行行。第\
    \ 20 行之后是第 21 行，这是另一个赋值操作。\n\n最后，在第 24 行，通过调用 `DEPARTMENTS_API.DEPARTMENT_EXISTS`\
    \ 进行了一次赋值。这使得 `EVENT_UNIT` 从 `EMPLOYEE_API` 变成了 `DEPARTMENTS_API`。接下来的几行是该程序单元中的可执行行，直到到达\
    \ `DEPARTMENTS_API` 包体的第 14 行的返回语句。显示的最后一行将控制权交还给 `EMPLOYEE_API`。为了节省空间，其余行被省略了。\n\
    \n在一份报告/查询中，你就得到了一份代码覆盖报告、一份代码分析报告（因为包含了可执行代码、行号、计时信息和实际源代码），以及性能指标。如果将此报告保存到一个表中（你自建的用户表），你可以在代码的任何更改之后重新运行此查询并比较输出。你只需要注意如何比较单个行，因为它们会随着时间的推移而改变。\n"
- fmt: "# Unexecuted Code\n\nIt would be nice if there were an easy way to select\
    \ all of the executable code that was not executed. `PL/Scope` does some of the\
    \ information that you need but the way `DBMS_TRACE` executes a query (it captures\
    \ the line with the select but not any of the other lines) presents some issues.\
    \ Also, `PL/Scope` doesn't capture all potential executable lines, only lines\
    \ with identifiers. If you look at the demo procedure `TEST_PLSCOPE` that follows,\
    \ you'll see that the `PROCEDURE` has two executable lines (ignoring the declaration\
    \ and definition of the procedure): the `IF 1=1` and the `execute immediate`.\n\
    \n```sql\nCREATE OR REPLACE PROCEDURE TEST_PLSCOPE AS\nBEGIN\n  IF 1=1\n  THEN\n\
    \    execute immediate 'declare v1 number; begin select 1 into v1 from dual; end;';\n\
    \  END IF;\nEND TEST_PLSCOPE;\n```\n\nAs the next query shows, if you query `USER_IDENTIFIERS`,\
    \ you only see the declaration and definition:\n\n```sql\n  SELECT object_name,\
    \ line, usage\n  FROM user_identifiers\n  WHERE object_name = 'TEST_PLSCOPE'\n\
    \    AND object_type = 'PROCEDURE'\nORDER BY usage_id;\n```\n\n```\nOBJECT_NAME\
    \                    LINE                   USAGE\n------------------------------\
    \ ---------------------- -----------\nTEST_PLSCOPE                   1       \
    \               DECLARATION\nTEST_PLSCOPE                   1                \
    \      DEFINITION\n```\n\nRight now, you can automate the code coverage gathering\
    \ what was executed but you can't automate the gathering of what was not executed.\
    \ About the closest you can get is an automated report that can then be picked\
    \ over by human eyes. Such a report is better than nothing but not quite as sophisticated\
    \ as I would like it to be.\n\nThe following query attempts to make the code coverage\
    \ from the preceding query more robust by using `USER_IDENITIFERS` to retrieve\
    \ all executable rows that are not included in the `DBMS_TRACE` run:\n\n```sql\n\
    SELECT id_data.object_name, id_data.line, us.text\n  FROM (\n    SELECT DISTINCT\
    \ object_type, object_name, line\n      FROM user_identifiers ui\n      WHERE\
    \ (object_type, object_name) IN\n            (SELECT distinct event_unit_kind,\
    \ event_unit\n               FROM plsql_trace_events pse\n               WHERE\
    \ pse.event_unit = ui.object_name\n                 AND pse.event_unit_kind =\
    \ ui.object_type\n                 AND pse.runid = :TRACE_RUNID\n            \
    \     AND pse.event_kind NOT IN (50, 54))\n                 AND usage NOT IN ('DEFINITION',\
    \ 'DECLARATION')\n    MINUS\n    SELECT event_unit_kind, event_unit, event_line\n\
    \      FROM plsql_trace_events pse\n      WHERE pse.runid = :TRACE_RUNID\n   \
    \     AND pse.event_kind NOT IN (50, 54)\n        AND event_line IS NOT NULL)\
    \ id_data\n  JOIN user_source us\n    ON (us.name = id_data.object_name\n    AND\
    \ us.type = id_data.object_type\n    AND us.line = id_data.line)\n  ORDER BY id_data.object_name,\
    \ id_data.line;\n```\n\nIn this part of the results (the following output is from\
    \ the middle of the output), you can see what I would like to be the output from\
    \ the `PL/Scope` data:\n\n```\nOBJECT_NAME                      LINE TEXT\n-------------------------------\
    \ ----- ------------------------------\nDEPARTMENTS_API                    42\
    \       WHEN NO_DATA_FOUND\nDEPARTMENTS_API                    44         RETURN\
    \ v_manager_id;\nEMPLOYEE_API                       27       v_exception := TRUE;\n\
    EMPLOYEE_API                       28       v_exception_message := v\n       \
    \                                   _exception_message || chr(10)\n          \
    \                                ||\n\nEMPLOYEE_API                       29 \
    \                 'Department '\n                                           ||\
    \ p_department_name || ' not\n                                           found.';\n\
    \nEMPLOYEE_API                       35       v_exception := TRUE;\nEMPLOYEE_API\
    \                       36       v_exception_message := v\n                  \
    \                        _exception_message || chr(10)\n                     \
    \                     ||\n```\n\nUnfortunately, the result set starts with an\
    \ example that I would like to filter out.\n\n```\nOBJECT_NAME               \
    \       LINE TEXT\n------------------------------- ----- ------------------------------\n\
    DEPARTMENTS_API                    10       INTO v_department_id\nDEPARTMENTS_API\
    \                    12       WHERE upper(department_n\n                     \
    \                     ame) = upper(p_department_name\n                       \
    \                   );\n```\n\nThese lines were executed as part of the select\
    \ that started on line 9. `PL/Scope` includes lines 10 and 12 because they contain\
    \ identifiers: `v_department_id` and `p_department_name`. Line 11 is the `FROM`\
    \ clause that does not contain any identifiers.\n\nAll the other lines shown in\
    \ the preceding example really were not executed. They are embedded in exception\
    \ code, which is exactly the type of thing you want code coverage to show. Ideally,\
    \ you would see that those lines were not executed and create tests that would\
    \ exercise that code.\n\n# DBMS_HPROF\n\n`DBMS_HPROF` is the Oracle 11g and up\
    \ answer to `PL/SQL` code profiling. This is definitely the preferred tool for\
    \ gathering performance metrics. It provides everything `DBMS_PROFILER` and `DBMS_TRACE`\
    \ together provide, minus the line information for code coverage; it's easier\
    \ to use, easier to read, and doesn't require changes to the environment to work.\
    \ `DBMS_HPROF` can easily be run in a production environment, which is something\
    \ lacking in `DBMS_PROFILER` and `DBMS_TRACE`.\n\n`DBMS_HPROF` is a hierarchical\
    \ profiler. `DBMS_HPROF` gives you not only what ran and how long it ran, it gives\
    \ you the hierarchical context of who called what and in what order. You can also\
    \ compare time spent in SQL vs. `PL/SQL` (critical for performance tuning). When\
    \ combined with proper code instrumentation, you will be able to verify complete\
    \ code coverage.\n\nWhen a profiling session is run, the `PL/SQL` virtual machine\
    \ keeps track of runtime information. `DBMS_HPROF` makes that information available\
    \ to interested parties by writing the information to an operating system file.\
    \ The output from a profiling session is called the raw output.\n\nThe raw output\
    \ is human readable but not very friendly. With the raw output, you can take two\
    \ directions. There is a command line tool called `plshprof` that takes in raw\
    \ `DBMS_HPROF` output files and generates `HTML` reports that contain all kinds\
    \ of goodness related to performance. With that tool, you can even compare the\
    \ output of two profiling sessions (for example, before and after a code change)\
    \ to see how the change has impacted the performance profile of the code. (Chapter\
    \ 13 specifically covers instrumentation and profiling for performance so I will\
    \ leave the details to that chapter.) I would rather discuss using the analyzed\
    \ data for you to write your own reports.\n\nThe second path to take with the\
    \ raw output is a function in the `DBMS_HPROF` package: `DBMS_HPROF.ANALYZE`.\
    \ The `ANALYZE` function takes several input parameters, most importantly the\
    \ directory and file name of the raw output, and returns a `RUN_ID`. When `ANALYZE`\
    \ is run, three tables are populated and `RUN_ID` is the primary key of the parent\
    \ table.\n\nThe three tables that get populated contain information about the\
    \ profiling session, the information about the run, and the relationship between\
    \ program calls within the run session. With this information (ignoring the performance\
    \ information for now), you can find exactly what was called and by whom. What\
    \ you do not get is what was not called. When combined with `PL/Scope`, you can\
    \ find what was not called—this is the value that profiling adds to code coverage."
  raw: '##### Unexecuted Code


    It would be nice if there were an easy way to select all of the executable code
    that was not executed. PL/Scope does some of the information that you need but
    the way DBMS_TRACE executes a query (it captures the line with the select but
    not any of the other lines) presents some issues. Also, PL/Scope doesn''t capture
    all potential executable lines, only lines with identifiers. If you look at the
    demo procedure TEST_PLSCOPE that follows, you''ll see that the PROCEDURE has two
    executable lines (ignoring the declaration and definition of the procedure): the
    IF 1=1 and the “execute immediate.”


    `CREATE OR REPLACE PROCEDURE TEST_PLSCOPE AS`

    `BEGIN`

    `  IF 1=1`

    `  THEN`

    `    execute immediate ''declare v1 number; begin select 1 into v1 from dual;
    end;'';`

    `  END IF;`

    `END TEST_PLSCOPE;`


    As the next query shows, if you query USER_IDENTIFIERS, you only see the declaration
    and definition:


    `  SELECT object_name, line, usage`

    `  FROM user_identifiers`

    `  WHERE object_name = ''TEST_PLSCOPE''`

    `    AND object_type = ''PROCEDURE''`

    `ORDER BY usage_id;`


    `OBJECT_NAME                    LINE                   USAGE`

    `------------------------------ ---------------------- -----------`

    `TEST_PLSCOPE                   1                      DECLARATION`

    `TEST_PLSCOPE                   1                      DEFINITION`


    Right now, you can automate the code coverage gathering what was executed but
    you can''t automate the gathering of what was not executed. About the closest
    you can get is an automated report that can then be picked over by human eyes.
    Such a report is better than nothing but not quite as sophisticated as I would
    like it to be.


    The following query attempts to make the code coverage from the preceding query
    more robust by using USER_IDENITIFERS to retrieve all executable rows that are
    not included in the DBMS_TRACE run:


    `SELECT id_data.object_name, id_data.line, us.text`

    `  FROM (`

    `    SELECT DISTINCT object_type, object_name, line`

    `      FROM user_identifiers ui`

    `      WHERE (object_type, object_name) IN`

    `            (SELECT distinct event_unit_kind, event_unit`

    `               FROM plsql_trace_events pse`

    `               WHERE pse.event_unit = ui.object_name`

    `                 AND pse.event_unit_kind = ui.object_type`

    `                 AND pse.runid = :TRACE_RUNID`

    `                 AND pse.event_kind NOT IN (50, 54))`

    `                 AND usage NOT IN (''DEFINITION'', ''DECLARATION'')`

    `    MINUS`

    `    SELECT event_unit_kind, event_unit, event_line`

    `      FROM plsql_trace_events pse`

    `      WHERE pse.runid = :TRACE_RUNID`

    `        AND pse.event_kind NOT IN (50, 54)`

    `        AND event_line IS NOT NULL) id_data`

    `  JOIN user_source us`

    `    ON (us.name = id_data.object_name`

    `    AND us.type = id_data.object_type`

    `    AND us.line = id_data.line)`

    `  ORDER BY id_data.object_name, id_data.line;`


    In this part of the results (the following output is from the middle of the output),
    you can see what I would like to be the output from the PL/Scope data:


    `OBJECT_NAME                      LINE TEXT`

    `------------------------------- ----- ------------------------------`

    `DEPARTMENTS_API                    42       WHEN NO_DATA_FOUND`

    `DEPARTMENTS_API                    44         RETURN v_manager_id;`

    `EMPLOYEE_API                       27       v_exception := TRUE;`

    `EMPLOYEE_API                       28       v_exception_message := v`

    `                                      _exception_message || chr(10)`

    `                                      ||`


    `EMPLOYEE_API                       29                  ''Department ''`

    `                                       || p_department_name || '' not`

    `                                       found.'';`


    `EMPLOYEE_API                       35       v_exception := TRUE;`

    `EMPLOYEE_API                       36       v_exception_message := v`

    `                                      _exception_message || chr(10)`

    `                                      ||`


    Unfortunately, the result set starts with an example that I would like to filter
    out.


    `OBJECT_NAME                      LINE TEXT`

    `------------------------------- ----- ------------------------------`

    `DEPARTMENTS_API                    10       INTO v_department_id`

    `DEPARTMENTS_API                    12       WHERE upper(department_n`

    `                                      ame) = upper(p_department_name`

    `                                      );`


    These lines were executed as part of the select that started on line 9\. PL/Scope
    includes lines 10 and 12 because they contain identifiers: v_department_id and
    p_department_name. Line 11 is the FROM clause that does not contain any identifiers.


    All the other lines shown in the preceding example really were not executed. They
    are embedded in exception code, which is exactly the type of thing you want code
    coverage to show. Ideally, you would see that those lines were not executed and
    create tests that would exercise that code.


    #### DBMS_HPROF


    DBMS_HPROF is the Oracle 11g and up answer to PL/SQL code profiling. This is definitely
    the preferred tool for gathering performance metrics. It provides everything DBMS_PROFILER
    and DBMS_TRACE together provide, minus the line information for code coverage;
    it''s easier to use, easier to read, and doesn''t require changes to the environment
    to work. DBMS_HPROF can easily be run in a production environment, which is something
    lacking in DBMS_PROFILER and DBMS_TRACE.


    DBMS_HPROF is a hierarchical profiler. DBMS_HPROF gives you not only what ran
    and how long it ran, it gives you the hierarchical context of who called what
    and in what order. You can also compare time spent in SQL vs. PL/SQL (critical
    for performance tuning). When combined with proper code instrumentation, you will
    be able to verify complete code coverage.


    When a profiling session is run, the PL/SQL virtual machine keeps track of runtime
    information. DBMS_HPROF makes that information available to interested parties
    by writing the information to an operating system file. The output from a profiling
    session is called the raw output.


    The raw output is human readable but not very friendly. With the raw output, you
    can take two directions. There is a command line tool called plshprof that takes
    in raw DBMS_HPROF output files and generates HTML reports that contain all kinds
    of goodness related to performance. With that tool, you can even compare the output
    of two profiling sessions (for example, before and after a code change) to see
    how the change has impacted the performance profile of the code. ([Chapter 13](#Chapter13.html#ch13)
    specifically covers instrumentation and profiling for performance so I will leave
    the details to that chapter.) I would rather discuss using the analyzed data for
    you to write your own reports.


    The second path to take with the raw output is a function in the DBMS_HPROF package:
    DBMS_HPROF.ANALYZE. The ANALYZE function takes several input parameters, most
    importantly the directory and file name of the raw output, and returns a RUN_ID.
    When ANALYZE is run, three tables are populated and RUN_ID is the primary key
    of the parent table.


    The three tables that get populated contain information about the profiling session,
    the information about the run, and the relationship between program calls within
    the run session. With this information (ignoring the performance information for
    now), you can find exactly what was called and by whom. What you do not get is
    what was not called. When combined with PL/Scope, you can find what was not called—this
    is the value that profiling adds to code coverage.'
  trans: "\n# 未执行的代码\n\n如果有一种简单的方法可以选择所有未执行的、可执行的代码，那就太好了。`PL/Scope` 提供了部分你需要的信息，但\
    \ `DBMS_TRACE` 执行查询的方式（它捕获包含 `select` 语句的行，但不捕获其他行）带来了一些问题。此外，`PL/Scope` 并不会捕获所有潜在的可执行行，它只捕获包含标识符的行。如果你查看下面的演示过程\
    \ `TEST_PLSCOPE`，你会看到这个 `PROCEDURE` 有两行可执行代码（忽略过程的声明和定义）：即 `IF 1=1` 和 `execute\
    \ immediate`。\n\n```sql\nCREATE OR REPLACE PROCEDURE TEST_PLSCOPE AS\nBEGIN\n\
    \  IF 1=1\n  THEN\n    execute immediate 'declare v1 number; begin select 1 into\
    \ v1 from dual; end;';\n  END IF;\nEND TEST_PLSCOPE;\n```\n\n正如下一个查询所示，如果你查询 `USER_IDENTIFIERS`，你只会看到声明和定义：\n\
    \n```sql\n  SELECT object_name, line, usage\n  FROM user_identifiers\n  WHERE\
    \ object_name = 'TEST_PLSCOPE'\n    AND object_type = 'PROCEDURE'\nORDER BY usage_id;\n\
    ```\n\n```\nOBJECT_NAME                    LINE                   USAGE\n------------------------------\
    \ ---------------------- -----------\nTEST_PLSCOPE                   1       \
    \               DECLARATION\nTEST_PLSCOPE                   1                \
    \      DEFINITION\n```\n\n目前，你可以自动收集已执行代码的覆盖率，但无法自动收集未执行代码的信息。你能达到的最好程度是一个可以由人工仔细检查的自动化报告。这样的报告聊胜于无，但并不像我期望的那样完善。\n\
    \n下面的查询试图通过使用 `USER_IDENTIFIERS` 来检索未被 `DBMS_TRACE` 运行所包含的所有可执行行，从而使前面查询的代码覆盖率更加稳健：\n\
    \n```sql\nSELECT id_data.object_name, id_data.line, us.text\n  FROM (\n    SELECT\
    \ DISTINCT object_type, object_name, line\n      FROM user_identifiers ui\n  \
    \    WHERE (object_type, object_name) IN\n            (SELECT distinct event_unit_kind,\
    \ event_unit\n               FROM plsql_trace_events pse\n               WHERE\
    \ pse.event_unit = ui.object_name\n                 AND pse.event_unit_kind =\
    \ ui.object_type\n                 AND pse.runid = :TRACE_RUNID\n            \
    \     AND pse.event_kind NOT IN (50, 54))\n                 AND usage NOT IN ('DEFINITION',\
    \ 'DECLARATION')\n    MINUS\n    SELECT event_unit_kind, event_unit, event_line\n\
    \      FROM plsql_trace_events pse\n      WHERE pse.runid = :TRACE_RUNID\n   \
    \     AND pse.event_kind NOT IN (50, 54)\n        AND event_line IS NOT NULL)\
    \ id_data\n  JOIN user_source us\n    ON (us.name = id_data.object_name\n    AND\
    \ us.type = id_data.object_type\n    AND us.line = id_data.line)\n  ORDER BY id_data.object_name,\
    \ id_data.line;\n```\n\n在这一部分结果中（以下输出来自结果集的中间部分），你可以看到我希望 `PL/Scope` 数据能输出的内容：\n\
    \n```\nOBJECT_NAME                      LINE TEXT\n-------------------------------\
    \ ----- ------------------------------\nDEPARTMENTS_API                    42\
    \       WHEN NO_DATA_FOUND\nDEPARTMENTS_API                    44         RETURN\
    \ v_manager_id;\nEMPLOYEE_API                       27       v_exception := TRUE;\n\
    EMPLOYEE_API                       28       v_exception_message := v\n       \
    \                                   _exception_message || chr(10)\n          \
    \                                ||\n\nEMPLOYEE_API                       29 \
    \                 'Department '\n                                           ||\
    \ p_department_name || ' not\n                                           found.';\n\
    \nEMPLOYEE_API                       35       v_exception := TRUE;\nEMPLOYEE_API\
    \                       36       v_exception_message := v\n                  \
    \                        _exception_message || chr(10)\n                     \
    \                     ||\n```\n\n不幸的是，结果集开头包含一个我想过滤掉的例子。\n\n```\nOBJECT_NAME \
    \                     LINE TEXT\n------------------------------- ----- ------------------------------\n\
    DEPARTMENTS_API                    10       INTO v_department_id\nDEPARTMENTS_API\
    \                    12       WHERE upper(department_n\n                     \
    \                     ame) = upper(p_department_name\n                       \
    \                   );\n```\n\n这些行是作为从第 9 行开始的 `select` 语句的一部分执行的。`PL/Scope` 包含第\
    \ 10 和 12 行是因为它们包含标识符：`v_department_id` 和 `p_department_name`。第 11 行是 `FROM` 子句，不包含任何标识符。\n\
    \n前面示例中显示的所有其他行确实没有执行。它们嵌入在异常处理代码中，而这正是你希望代码覆盖率报告能显示的内容类型。理想情况下，你会看到这些行未被执行，并据此创建测试来执行这些代码。\n\
    \n# DBMS_HPROF\n\n`DBMS_HPROF` 是 Oracle 11g 及更高版本中用于 `PL/SQL` 代码性能分析的工具。这绝对是收集性能指标的首选工具。它提供了\
    \ `DBMS_PROFILER` 和 `DBMS_TRACE` 共同提供的所有功能，但不包含用于代码覆盖率的行信息；它更易于使用、更易于解读，并且不需要改变环境即可工作。`DBMS_HPROF`\
    \ 可以轻松地在生产环境中运行，这是 `DBMS_PROFILER` 和 `DBMS_TRACE` 所欠缺的。\n\n`DBMS_HPROF` 是一个分层分析器。它不仅告诉你什么代码运行了以及运行了多久，还提供了谁在什么顺序下调用了什么的层级上下文。你还可以比较\
    \ SQL 与 `PL/SQL` 所花费的时间（这对于性能调优至关重要）。结合正确的代码插桩，你将能够验证完整的代码覆盖率。\n\n当运行一个分析会话时，`PL/SQL`\
    \ 虚拟机会跟踪运行时信息。`DBMS_HPROF` 通过将这些信息写入操作系统文件，使其可供相关方使用。分析会话的输出称为原始输出。\n\n原始输出是人类可读的，但不太友好。对于原始输出，你可以走两条路线。有一个名为\
    \ `plshprof` 的命令行工具，它接收原始的 `DBMS_HPROF` 输出文件，并生成包含各种性能相关信息的 `HTML` 报告。使用该工具，你甚至可以比较两个分析会话的输出（例如，代码更改前后），以查看更改如何影响了代码的性能概况。（第\
    \ 13 章专门介绍了用于性能的插桩和分析，因此我将细节留给该章。）我更愿意讨论如何使用分析后的数据来编写你自己的报告。\n\n处理原始输出的第二条路线是使用\
    \ `DBMS_HPROF` 包中的函数：`DBMS_HPROF.ANALYZE`。`ANALYZE` 函数接受几个输入参数，最重要的是原始输出的目录和文件名，并返回一个\
    \ `RUN_ID`。当 `ANALYZE` 运行时，会填充三个表，`RUN_ID` 是父表的主键。\n\n被填充的三个表包含有关分析会话的信息、有关运行的信息以及运行会话内程序调用之间的关系。利用这些信息（暂时忽略性能信息），你可以准确地找到什么被调用了以及被谁调用。你无法直接得到的是什么没有被调用。将\
    \ `PL/Scope` 与 `DBMS_HPROF` 结合起来，你就可以找出什么没有被调用——这就是性能分析为代码覆盖率带来的价值。\n"
- fmt: "## Configuring DBMS_HPROF\n\nConfiguring DBMS_HPROF requires only a couple\
    \ of very simple steps. The first is that you need execute on the `DBMS_HPROF`\
    \ package. The second is that you need read/write access to an OS directory. If\
    \ you have permissions to create directories, you can create your own. If not,\
    \ ask you DBA to create one and give you `READ` and `WRITE`.\n\nFor the purpose\
    \ of this discussion, I will be logged in as `SYSTEM`. The following DDL has to\
    \ be executed before the examples will work:\n\n```\nCREATE DIRECTORY plshprof_dir\
    \ AS 'c:\\temp';\nGRANT READ, WRITE ON DIRECTORY PLSHPROF_DIR TO HR;\n```\n\n\
    For performance tuning, this access to the directory is all that you need. Run\
    \ the `plshprof`, available in `$ORACLE_HOME/bin`) utility to generate your HTML\
    \ reports and start your analysis. I generally copy the HTML output locally and\
    \ review it in my browser.\n\nHowever, for the purpose of understanding the code\
    \ and automating analysis, I want that raw output in the database so that I can\
    \ query it. Oracle provides that with three tables (described in more detail later).\
    \ To create these tables, you need to run a script supplied by Oracle and available\
    \ in `$ORACLE_HOME/RDBMS/ADMIN`, `dbmshptab.sql`.\n\nLike the script for `DBMS_PROFILER`,\
    \ you can run this script as an application user or you can create a common `PROFILER`\
    \ schema. I generally lean towards having a dedicated user that will contain all\
    \ of the profiling data for a database; this way you will have cross schema profiling\
    \ sessions stored together for easy querying and you can create the same schema\
    \ on all of your databases. This allows you to keep consistency across instances,\
    \ which enhances the maintainability of your code.\n\nThat's all that's required\
    \ to configure the `DBMS_HPROF` profiler.\n\n## DBMS_HPROF Example Session\n\n\
    When running the profiler, it's much like using `DBMS_TRACE` or `DBMS_PROFILER`.\
    \ A profiling session is started with `START_PROFILING` and the session is ended\
    \ with `STOP_PROFILING`. The following session will use the exact same call to\
    \ `create_employee`:\n\n```\nDECLARE\n  v_employee_id employees.employee_id%TYPE;\n\
    \  v_runid dbmshp_runs.runid%TYPE;\n  v_plshprof_dir all_directories.directory_name%TYPE\
    \ := 'PLSHPROF_DIR';\n  v_plshprof_file VARCHAR2(30) := 'create_employee.raw';\n\
    BEGIN\n  -- Start the profiling session\n  dbms_hprof.start_profiling(v_plshprof_dir,\
    \ v_plshprof_file);\n\n  -- call the top level procedure to be profiled\n  v_employee_id\
    \ := employee_api.create_employee(\n        p_first_name => 'Lewis',\n       \
    \ p_last_name => 'Cunningham2',\n        p_email => 'lewisc2@yahoo.com',\n   \
    \     p_phone_number => '888-555-1212',\n        p_job_title => 'Programmer',\n\
    \        p_department_name => 'IT',\n        p_salary => 99999.99,\n        p_commission_pct\
    \ => 0 );\n\n  -- Stop the profiling session\n  dbms_hprof.stop_profiling;\n\n\
    \  -- Analyze the raw output and create the table data\n  v_runid := dbms_hprof.analyze(v_plshprof_dir,\
    \ v_plshprof_file);\n\n  DBMS_OUTPUT.PUT_LINE('This Run: ' || to_char(v_runid)\
    \ );\n\nEND;\n```\n\nThe `DBMS_HPROF.ANALYZE` returns a `RUNID` to identify a\
    \ particular run. If, however, you need to come back at some later point in time,\
    \ the `DBMS_HPROF.START_PROFILING` procedure takes an optional `COMMENT` parameter,\
    \ which is the easiest way to identify a particular `ANALYZED` run.\n\n## DBMS_HPROF\
    \ Output\n\n`DBMS_HPROF` tracks all kinds of PL/SQL calls including triggers and\
    \ anonymous blocks, as well as DML and native dynamic SQL. It is truly a powerful\
    \ profiling tool. `DBMS_HPROF.analyze` writes to three tables.\n\n- `DBMSRP_RUNS`:\
    \ Run header info.\n- `DBMSHP_FUNCTION_INFO`: Stored program details and timings.\n\
    - `DBMSHP_PARENT_CHILD_INFO`: The hierarchy of calls with timing.\n\nThese tables\
    \ store all of the information you need to generate complete trace reports with\
    \ timing at whatever level of detail you want to see them. As a side note, SQL\
    \ Developer (the free GUI IDE from Oracle) supports `DBMS_HPROF` out of the box.\n\
    \nThe HTML reports generated by the `plshprof` command line utility are very powerful\
    \ tools in your performance arsenal. It would be silly for me to duplicate them\
    \ with a bunch of screen shots; however, I do want to make you aware of the information\
    \ available in these reports.\n\nWhen you run `plshprof`, it produces a set of\
    \ related HTML files. You navigate between the various reports and can drill down\
    \ from the top level to more detailed level reports. [Figure 7-1](#Chapter07.html#fig_7_1)\
    \ shows the index page produced by `plshprof`.\n\n![images](images/0701.jpg)\n\
    \n**Figure 7-1.** `PLSHPROF` Output—Report Index\n\nFrom here, a click on the\
    \ first link, Function Elapsed Time, brings up the page in [Figure 7-2](#Chapter07.html#fig_7_2).\n\
    \n![images](images/0702.jpg)\n\n**Figure 7-2.** `PLSHPROF` Elapsed Time Report\n\
    \nThe report in [Figure 7-2](#Chapter07.html#fig_7_2) shows the overall time of\
    \ the process sorted by the amount of time taken in each call. This report is\
    \ a quick sanity check for where the time in a process is spent. The call with\
    \ the most time, not coincidentally, is the top level `CREATE_EMPLOYEE`. From\
    \ this report, I can click on one of the function calls and drill down to a detail\
    \ report of that specific call, as shown in [Figure 7-3](#Chapter07.html#fig_7_3).\n\
    \n![images](images/0703.jpg)\n\n**Figure 7-3.** `PLSHPROF` Function Drilldown\n\
    \nYou can see in [Figure 7-3](#Chapter07.html#fig_7_3) that the procedures shown\
    \ all made static SQL calls and how much time was spent in SQL versus PL/SQL.\
    \ Generally, I would rather run my own queries to get concise information on my\
    \ runs to give me a snapshot of my performance. If something in my homegrown queries\
    \ stands out, then I can run the HTML reports and dig in a little deeper.\n\n\
    The following query is a fairly simple report of who called who and how long it\
    \ is taking. I will usually compare this data with the data from a previous run;\
    \ in that way I can get a very quick look at how the changes have impacted performance.\n\
    \n```\nSELECT parent_info.owner || '.' || parent_info.module || '.' ||\n     \
    \              parent_info.function || '(' || parent_info.line# || ')' caller,\n\
    \       child_info.owner || '.' || child_info.module || '.' ||\n             \
    \      child_info.function || '(' || child_info.line# || ')' callee,\n       child_info.function_elapsed_time\
    \ elapsed\n  FROM dbmshp_parent_child_info dpci\n  JOIN dbmshp_function_info parent_info\n\
    \    ON parent_info.runid = dpci.runid\n  JOIN dbmshp_function_info child_info\n\
    \    ON child_info.runid = dpci.runid\n  WHERE dpci.runid = :HPROF_RUNID\n  START\
    \ WITH dpci.runid = :HPROF_RUNID\n    AND dpci.childsymid = child_info.symbolid\n\
    \    AND dpci.parentsymid = parent_info.symbolid\n    AND parent_info.symbolid\
    \ =1\n  CONNECT BY dpci.runid = PRIOR dpci.runid\n    AND dpci.childsymid = child_info.symbolid\n\
    \    AND dpci.parentsymid = parent_info.symbolid\n    AND prior dpci.childsymid\
    \ = dpci.parentsymid;\n```"
  raw: '##### Configuring DBMS_HPROF


    Configuring DBMS_HPROF requires only a couple of very simple steps. The first
    is that you need execute on the DBMS_HPROF package. The second is that you need
    read/write access to an OS directory. If you have permissions to create directories,
    you can create your own. If not, ask you DBA to create one and give you READ and
    WRITE.


    For the purpose of this discussion, I will be logged in as SYSTEM. The following
    DDL has to be executed before the examples will work:


    `CREATE DIRECTORY plshprof_dir AS ''c:\temp'';`

    `GRANT READ, WRITE ON DIRECTORY PLSHPROF_DIR TO HR;`


    For performance tuning, this access to the directory is all that you need. Run
    the plshprof, available in $ORACLE_HOME/bin) utility to generate your HTML reports
    and start your analysis. I generally copy the HTML output locally and review it
    in my browser.


    However, for the purpose of understanding the code and automating analysis, I
    want that raw output in the database so that I can query it. Oracle provides that
    with three tables (described in more detail later). To create these tables, you
    need to run a script supplied by Oracle and available in $ORACLE_HOME/RDBMS/ADMIN,
    `dbmshptab.sql`.


    Like the script for DBMS_PROFILER, you can run this script as an application user
    or you can create a common PROFILER schema. I generally lean towards having a
    dedicated user that will contain all of the profiling data for a database; this
    way you will have cross schema profiling sessions stored together for easy querying
    and you can create the same schema on all of your databases. This allows you to
    keep consistency across instances, which enhances the maintainability of your
    code.


    That''s all that''s required to configure the DBMS_HPROF profiler.


    ##### DBMS_HPROF Example Session


    When running the profiler, it''s much like using DBMS_TRACE or DBMS_PROFILER.
    A profiling session is started with START_PROFILING and the session is ended with
    STOP_PROFILING. The following session will use the exact same call to create_employee:


    `DECLARE`

    `v_employee_id employees.employee_id%TYPE;`

    `  v_runid dbmshp_runs.runid%TYPE;`

    `  v_plshprof_dir all_directories.directory_name%TYPE := ''PLSHPROF_DIR'';`

    `  v_plshprof_file VARCHAR2(30) := ''create_employee.raw'';`

    `BEGIN`

    `  -- Start the profiling session`

    `  dbms_hprof.start_profiling(v_plshprof_dir, v_plshprof_file);`


    `  -- call the top level procedure to be profiled`

    `  v_employee_id := employee_api.create_employee(`

    `        p_first_name => ''Lewis'',`

    `        p_last_name => ''Cunningham2'',`

    `        p_email => ''lewisc2@yahoo.com'',`

    `        p_phone_number => ''888-555-1212'',`

    `        p_job_title => ''Programmer'',`

    `        p_department_name => ''IT'',`

    `        p_salary => 99999.99,`

    `        p_commission_pct => 0 );`


    `  -- Stop the profiling session`

    `  dbms_hprof.stop_profiling;`


    `  -- Analyze the raw output and create the table data`

    `  v_runid := dbms_hprof.analyze(v_plshprof_dir, v_plshprof_file);`


    `  DBMS_OUTPUT.PUT_LINE(''This Run: '' || to_char(v_runid) );`


    `END;`


    The DBMS_HPROF.ANALYZE returns a RUNID to identify a particular run. If, however,
    you need to come back at some later point in time, the DBMS_HPROF.START_PROFILING
    procedure takes an optional COMMENT parameter, which is the easiest way to identify
    a particular ANALYZED run.


    ##### DBMS_HPROF Output


    DBMS_HPROF tracks all kinds of PL/SQL calls including triggers and anonymous blocks,
    as well as DML and native dynamic SQL. It is truly a powerful profiling tool.
    DBMS_HPROF.analyze writes to three tables.


    *   DBMSRP_RUNS: Run header info.

    *   DBMSHP_FUNCTION_INFO: Stored program details and timings.

    *   DBMSHP_PARENT_CHILD_INFO: The hierarchy of calls with timing.


    These tables store all of the information you need to generate complete trace
    reports with timing at whatever level of detail you want to see them. As a side
    note, SQL Developer (the free GUI IDE from Oracle) supports DBMS_HPROF out of
    the box.


    The HTML reports generated by the plshprof command line utility are very powerful
    tools in your performance arsenal. It would be silly for me to duplicate them
    with a bunch of screen shots; however, I do want to make you aware of the information
    available in these reports.


    When you run plshprof, it produces a set of related HTML files. You navigate between
    the various reports and can drill down from the top level to more detailed level
    reports. [Figure 7-1](#Chapter07.html#fig_7_1) shows the index page produced by
    plshprof.


    ![images](images/0701.jpg)


    ***Figure 7-1.** PLSHPROF Output—Report Index*


    From here, a click on the first link, Function Elapsed Time, brings up the page
    in [Figure 7-2](#Chapter07.html#fig_7_2).


    ![images](images/0702.jpg)


    ***Figure 7-2.** PLSHPROF Elapsed Time Report*


    The report in [Figure 7-2](#Chapter07.html#fig_7_2) shows the overall time of
    the process sorted by the amount of time taken in each call. This report is a
    quick sanity check for where the time in a process is spent. The call with the
    most time, not coincidentally, is the top level CREATE_EMPLOYEE. From this report,
    I can click on one of the function calls and drill down to a detail report of
    that specific call, as shown in [Figure 7-3](#Chapter07.html#fig_7_3).


    ![images](images/0703.jpg)


    ***Figure 7-3.** PLSHPROF Function Drilldown*


    You can see in [Figure 7-3](#Chapter07.html#fig_7_3) that the procedures shown
    all made static SQL calls and how much time was spent in SQL versus PL/SQL. Generally,
    I would rather run my own queries to get concise information on my runs to give
    me a snapshot of my performance. If something in my homegrown queries stands out,
    then I can run the HTML reports and dig in a little deeper.


    The following query is a fairly simple report of who called who and how long it
    is taking. I will usually compare this data with the data from a previous run;
    in that way I can get a very quick look at how the changes have impacted performance.


    `SELECT parent_info.owner || ''.'' || parent_info.module || ''.'' ||`

    `                   parent_info.function || ''('' || parent_info.line# || '')''
    caller,`

    `       child_info.owner || ''.'' || child_info.module || ''.'' ||`

    `                   child_info.function || ''('' || child_info.line# || '')''
    callee,`

    `       child_info.function_elapsed_time elapsed`

    `  FROM dbmshp_parent_child_info dpci`

    `  JOIN dbmshp_function_info parent_info`

    `    ON parent_info.runid = dpci.runid`

    `  JOIN dbmshp_function_info child_info`

    `    ON child_info.runid = dpci.runid`

    `  WHERE dpci.runid = :HPROF_RUNID`

    `  START WITH dpci.runid = :HPROF_RUNID`

    `    AND dpci.childsymid = child_info.symbolid`

    `    AND dpci.parentsymid = parent_info.symbolid`

    `    AND parent_info.symbolid =1`

    `  CONNECT BY dpci.runid = PRIOR dpci.runid`

    `    AND dpci.childsymid = child_info.symbolid`

    `    AND dpci.parentsymid = parent_info.symbolid`

    `    AND prior dpci.childsymid = dpci.parentsymid;`'
  trans: "\n## 配置 DBMS_HPROF\n\n配置 DBMS_HPROF 只需要几个非常简单的步骤。第一步是您需要在 `DBMS_HPROF` 包上拥有\
    \ `EXECUTE` 权限。第二步是您需要对一个操作系统目录拥有读/写权限。如果您有创建目录的权限，可以创建自己的目录。如果没有，请要求您的数据库管理员（DBA）创建一个目录，并授予您\
    \ `READ` 和 `WRITE` 权限。\n\n为了本次讨论的目的，我将以 `SYSTEM` 用户登录。在示例能够运行之前，必须执行以下 DDL 语句：\n\
    \n```\nCREATE DIRECTORY plshprof_dir AS 'c:\\temp';\nGRANT READ, WRITE ON DIRECTORY\
    \ PLSHPROF_DIR TO HR;\n```\n\n对于性能调优，拥有对该目录的访问权限就是您需要做的全部准备。运行 `plshprof` 实用程序（位于\
    \ `$ORACLE_HOME/bin`）来生成您的 HTML 报告并开始分析。我通常会将 HTML 输出复制到本地，并在浏览器中查看。\n\n然而，为了理解代码并实现分析自动化，我希望将原始输出保存在数据库中，以便能够查询它。Oracle\
    \ 通过三张表提供了这个功能（稍后会详细描述）。要创建这些表，您需要运行 Oracle 提供的脚本，该脚本位于 `$ORACLE_HOME/RDBMS/ADMIN`\
    \ 目录下，名为 `dbmshptab.sql`。\n\n与 `DBMS_PROFILER` 的脚本类似，您可以以应用程序用户身份运行此脚本，也可以创建一个公共的\
    \ `PROFILER` 方案。我通常倾向于拥有一个专用用户，该用户将包含数据库的所有性能分析数据；这样，您就可以将跨方案的分析会话存储在一起，便于查询，并且可以在所有数据库上创建相同的方案。这使您能够保持各实例间的一致性，从而增强了代码的可维护性。\n\
    \n以上就是配置 `DBMS_HPROF` 分析器所需的全部步骤。\n\n## DBMS_HPROF 示例会话\n\n运行分析器时，它非常类似于使用 `DBMS_TRACE`\
    \ 或 `DBMS_PROFILER`。使用 `START_PROFILING` 开始分析会话，并使用 `STOP_PROFILING` 结束会话。以下会话将使用完全相同的调用来执行\
    \ `create_employee`：\n\n```\nDECLARE\n  v_employee_id employees.employee_id%TYPE;\n\
    \  v_runid dbmshp_runs.runid%TYPE;\n  v_plshprof_dir all_directories.directory_name%TYPE\
    \ := 'PLSHPROF_DIR';\n  v_plshprof_file VARCHAR2(30) := 'create_employee.raw';\n\
    BEGIN\n  -- 开始分析会话\n  dbms_hprof.start_profiling(v_plshprof_dir, v_plshprof_file);\n\
    \n  -- 调用要分析的顶级过程\n  v_employee_id := employee_api.create_employee(\n        p_first_name\
    \ => 'Lewis',\n        p_last_name => 'Cunningham2',\n        p_email => 'lewisc2@yahoo.com',\n\
    \        p_phone_number => '888-555-1212',\n        p_job_title => 'Programmer',\n\
    \        p_department_name => 'IT',\n        p_salary => 99999.99,\n        p_commission_pct\
    \ => 0 );\n\n  -- 停止分析会话\n  dbms_hprof.stop_profiling;\n\n  -- 分析原始输出并创建表数据\n\
    \  v_runid := dbms_hprof.analyze(v_plshprof_dir, v_plshprof_file);\n\n  DBMS_OUTPUT.PUT_LINE('本次运行\
    \ ID: ' || to_char(v_runid) );\n\nEND;\n```\n\n`DBMS_HPROF.ANALYZE` 返回一个 `RUNID`\
    \ 以标识特定的运行。但是，如果您需要在以后的某个时间点回溯，`DBMS_HPROF.START_PROFILING` 过程接受一个可选的 `COMMENT`\
    \ 参数，这是标识特定 `ANALYZED` 运行的最简单方法。\n\n## DBMS_HPROF 输出\n\n`DBMS_HPROF` 跟踪各种 PL/SQL\
    \ 调用，包括触发器和匿名块，以及 DML 和本地动态 SQL。它确实是一个强大的性能分析工具。`DBMS_HPROF.analyze` 会写入三张表。\n\
    \n- `DBMSRP_RUNS`：运行头信息。\n- `DBMSHP_FUNCTION_INFO`：存储的程序详细信息和计时。\n- `DBMSHP_PARENT_CHILD_INFO`：包含计时的调用层次结构。\n\
    \n这些表存储了生成完整跟踪报告所需的所有信息，计时精度可达到您想查看的任何详细级别。顺带一提，SQL Developer（Oracle 提供的免费 GUI\
    \ IDE）原生支持 `DBMS_HPROF`。\n\n由 `plshprof` 命令行实用程序生成的 HTML 报告是您性能优化武器库中非常强大的工具。用一堆截图来复现它们会显得很愚蠢；然而，我确实希望您了解这些报告中可用的信息。\n\
