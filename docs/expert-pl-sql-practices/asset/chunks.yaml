  trans: '

    ### 概要


    我喜欢撰写、演示或谈论 PL/SQL 中的批量操作，原因之一在于使用它们几乎就是成功的保证。许多 Oracle 特性，无论新旧，只适用于特定的客户群或解决特定的技术问题，此外，还需要大量细致的测试，以确保使用这些特性不会对数据库或其应用程序的其他部分产生负面影响。另一方面，在
    PL/SQL 中采用批量集合和批量绑定，在绝大多数情况下都能使应用程序受益。从以行为中心的数据提取转向以集合为中心的批量数据提取，所需付出的努力很小，甚至可能为零。你的选择相当简单。


    *   如果你已经在使用 `FOR cursor_variable in (QUERY or CURSOR)` 语法，那么要实现批量集合，只需确保你使用的是较新版本的
    Oracle，并且 PL/SQL 编译设置保持默认即可。

    *   如果你没那么幸运，也只需进行一些简单的重新编码，将 `FETCH CURSOR INTO` 风格改为 `FETCH CURSOR BULK COLLECT
    INTO`。只需几个关键词和一些 PL/SQL 类型定义，就完成了！


    从以行为中心的数据修改转向以集合为中心的批量绑定数据修改，所需付出的努力同样很小。


    *   如果你已经在循环中执行 DML（`insert`, `update`, `delete`），只需添加一些适当的类型定义，并将 FOR 循环重构为 `FORALL`，工作就完成了。


    就是这么简单。应用程序的性能提升通常被描述为这里或那里几个百分点的改进，但在本章中你已经看到，转向批量操作可以带来`数量级`的性能提升。在过去的 Oracle
    版本中，PL/SQL 的某些元素不支持批量操作（例如，本地动态 SQL 和动态 ref 游标）。然而，所有这些限制在近期的数据库版本中都已被解除，因此永远没有理由不考虑使用批量操作。


    所以，努力很小，风险很低，回报却巨大。一旦你在 PL/SQL 中的方法变得以集合为中心，你会惊讶于这种新获得的集合中心思维会迅速传播到你 Oracle 技能的其他领域。你会发现，你更多地通过
    SQL 而非过程逻辑来实现目标，同时你也会开始利用那些能批量处理数据的机制，如管道函数。通过批量操作学到的相同技能，将成为你整个数据库开发中秉持集合中心思维的动力。


    我希望你能分享我对批量操作的热情，并且能在你自己的工作中看到回报。至于我，我要去五金店了——这次是推着购物车去的。


    # 第 7 章：了解你的代码


    **作者：Lewis Cunningham**


    本章的名称是“了解你的代码”。你可能会想，如果你写了一段代码，你应该很了解它。你很可能确实了解。至少你比其他人了解得更多。然而，即使代码是你写的，你仍然会基于记忆做出假设。这些假设很可能随着时间的推移而与现实渐行渐远。你有一个最佳猜测——一个有根据的假设——但这是主观的，并依赖于人的不可靠性。而如果你没有编写这段代码，那就完全没谱了。


    既然能知道，为何要猜测？我第一次听到这个问题是在性能优化的语境下。我记得是 Cary Milsap（作家兼性能大师）说的（至少是我第一次听到他说的）。我稍后会从性能角度更多地谈谈了解你的代码，但这个概念适用的范围远不止性能。


    如果你要进行一笔大额采购，需要开支票，你会只是希望（并假设）你的账户里有足够的钱吗？如果采购金额与你认为账户里有的钱只差几百美元呢？你会先用 ATM 或网页来核实一下吗？我的银行甚至允许我发送短信来查询余额。既然能知道，我为何要猜测？


    Oracle 就像是为你提供了访问代码的 ATM。关于你的 PL/SQL 代码，你可能需要知道的一切，都可以在 Oracle 数据字典中和/或通过使用 Oracle
    提供的工具找到。你甚至不需要 PIN 码（尽管你需要登录数据库，并且可能还需要获取一些权限）。


    本章将向你展示在哪里可以找到获取“账户更新”的最佳位置。你将发送一些 SQL 来代替短信。本章将从使用 Oracle 数据字典（与你的 PL/SQL 代码相关）和
    `PL/Scope` 对代码进行静态分析开始。然后，它会转向基于时间和基于事件的性能剖析（11g 版本之前），最后介绍上下文敏感、基于时间的性能剖析（11g
    及以上版本）。


    到本章结束时，你将能够拿一段你从未见过的代码，了解其结构、使用的数据类型、哪些变量使用了它们以及它们在何处被使用。你将知道应用程序中的运行时消耗在何处（无论高效与否）。到本章结束时，你将拥有了解你的代码所需的工具。无需猜测；你将了解代码。

    '
- fmt: '# 本章将（以及不会）涵盖的内容


    从架构师的视角（我指的是从设计正确性、代码正确性和标准符合性的角度）来看，当一个应用程序或程序单元投入生产时，绝对不应该有任何意外。所有设计都应该经过同行的早期评审——以确保符合业务需求和设计标准。所有代码都应该经过审查，以确保符合编码标准、性能标准、逻辑错误和基本文档。代码越符合标准，应用程序测试越充分，出现“哎呀”类错误的可能性就越小。无论应用程序多么符合标准，你都可能发现逻辑错误。测试应该能捕获大部分此类错误，但通常仍有一些会漏网。然而，漏网的错误不应该是常见错误。这些常见错误正是标准和回归测试旨在捕获的。


    ## 总体目标


    本章将为你提供工具，通过利用 Oracle 以数据字典、性能剖析和 `PL/SQL compiler` 形式提供的宝贵数据，帮助你做出最佳决策。许多验证工作可以自动化，本章将说明在何处可以实现这一点。任何可以卸载给计算机完成的工作都应该这样做。让人类专注于那些需要人类智能的任务。即使完整的分析/发现无法自动化，至少数据的收集可以自动化或简化。


    ## 自动化与手动验证


    有些事情不那么适合自动化。即使在今天，许多审查工作仍然需要人工验证。如果我能开发出一种自动化工具来捕获任何可能应用程序中的每一个逻辑错误，那将是非常有价值的东西，可以用来赚大钱。逻辑审查仍然属于人工执行手动检查的范畴，无论是通过代码审查还是通过测试。


    文档也很棘手。很容易看到代码中有注释，但很难验证某个注释是否有用（甚至是否相关）。逻辑和注释都高度特定于手头的任务。本章不会试图涵盖逻辑或文档问题，因为 Oracle
    在这方面能提供的帮助很少。


    ## 性能与分析


    了解应用程序的性能剖析对应用程序的成功至关重要。然而，其缺点是，性能检查需要人类智能来验证。虽然你可以自动化一个系统，在某个函数执行时间超过 x 秒时发出警报，但需要人工来验证这是否可以接受。


    Oracle 提供了工具来帮助收集分析系统所需的信息，使开发人员能够做出明智的性能决策。调整应用程序远远超出了本章的范围。然而，[第 13 章](#Chapter13.html#ch13)
    提供了解释性能剖析结果的方法。


    本章不会提供调优建议，而是从了解代码与性能关系的角度，提供以下内容：有哪些工具可用于收集这些性能指标（主要是剖析器）、数据存储在何处，以及如何将这些数据用于回归。回归测试是验证变更前正常工作的功能在变更后是否仍然有效的最简单方法。通过保存
    Oracle 提供的数据，你可以长期关注性能表现，并比较不同版本之间的差异。你可以在测试中设定阈值，使得剖析器的自动运行仅在出现异常时才发出警报。人类必须在第一次运行时确保性能结果正确，但一旦收集到良好的度量标准，只有当某个度量标准超出阈值时才需要人工干预。


    ## 测试与覆盖


    除了回归测试，另一个测试好处是代码覆盖率。虽然并非绝对可靠，但代码覆盖率测试确实提供了一定保证，即代码至少会针对某些数据集执行。结合使用 Oracle 提供的工具和一些努力，可以验证程序中的每一行可执行代码都已被执行。这很有价值，但更有价值的是能够看到哪些行未被执行。这正是你希望尽可能自动化的地方。如果每一行都执行了，测试通过。如果并非每一行都执行了，测试失败。人工介入并创建一个或多个测试来覆盖每一行。


    ## 标准与自定义


    本章大部分内容将使用数据字典和 `PL/SQL compiler` 提供的数据来确保符合公司标准。标准几乎从来不是“标准”的，因此“一刀切”的解决方案是不可能的。相反，本章将为你提供工具和指导，让你能够根据需要创建自己的解决方案，无论详细程度如何。使用简单的
    `SQL` 和数据字典，你可以验证命名标准、查找未使用的变量、查找定义在多个作用域的变量、执行影响分析、查找不可接受的数据类型用法等等。


    ## 章节范围


    我不会解释这些工具提供的每一个选项、列或报告。如果 Oracle 的文档很好（通常确实很好），我不会去复述它。本章不是关于这些工具的通用教程。它是关于你如何将这些工具整合到你的开发工作流程中，以实现更好应用程序的解释。'
  raw: '### What This Chapter Will (and Will Not) Cover


    From an architect''s perspective (by that I mean from the viewpoint of correctness
    of design, correctness of code, and compliance to standards), by the time an application
    or program unit hits production, there should be absolutely no surprises. All
    designs should have been peer reviewed—early—for compliance to business requirements
    and design standards. All code should have been reviewed for compliance to coding
    standards, performance standards, logic errors, and basic documentation. The better
    code complies with standards and the better tested an application is, the less
    likely you are to find “oopsy” type errors. You may find logic errors regardless
    of how well an application complies with standards. Testing should catch most
    of these but a few usually still get through. But what does get through should
    not be a common error. Those common errors are exactly what standards and regression
    testing are designed to catch.


    This chapter will provide you with the tools to help make the best decisions possible
    by using the valuable data provided by Oracle in the form of the data dictionary,
    profiling, and the PL/SQL compiler. Much of the validation can be automated and
    this chapter will show where this is possible. Anything that can be offloaded
    to a computer should be. Let the humans concentrate on the things that require
    humans. Even if the full analysis/discovery can''t be automated, at least the
    gathering of the data can be automated or simplified.


    Some things are not so automation friendly. Even today, it still requires a human
    to validate much of a review. If I could develop an automated tool to catch every
    possible logic error in any possible application, I would have something very
    valuable to sell and would be raking in large amounts of money. Logic reviews
    are still in the domain of a human performing a manual check, either through reviewing
    code or through testing.


    Documentation is also difficult. It''s easy to see that there are comments in
    the code, but it''s difficult to verify that a given comment is useful (or even
    relevant). Logic and commenting are highly specific to the task at hand. This
    chapter will not try to cover logic or documentation issues as there is very little
    that Oracle can provide to help in that area.


    Understanding your application''s performance profile is critical to the success
    of the application. The downside to this, though, is that performance checks require
    human intelligence to validate. While you can automate a system to raise an alert
    if a function takes longer than x seconds to complete, a human will need to validate
    if this is or is not acceptable.


    Oracle provides tools to help gather the information required to analyze a system
    in a way that allows a developer to make intelligent performance decisions. Tuning
    an application is far beyond the scope of this chapter. However, [Chapter 13](#Chapter13.html#ch13)
    provide the means to interpret performance profiling results.


    Instead of tuning recommendations, what this chapter will provide, from the perspective
    of knowing your code as it relates to performance, is what tools are available
    to gather these performance metrics (primarily a profiler), where the data is
    stored, and how to use that data for regression. A regression test is the easiest
    way to validate that what worked before a change is still working after a change.
    By saving the data provided by Oracle, you can keep an eye on performance over
    time and compare one release to the next. You can program thresholds into your
    tests so that automated runs of the profiler will alert someone only on exception.
    A human must make sure the performance results are correct on the first run, but
    once a good metric has been gathered, a human only needs to intervene should a
    metric fall outside a threshold.


    Another testing benefit, beyond regression, is code coverage. While not infallible,
    code coverage testing does provide some assurance that at least the code will
    execute for some data set. Using a combination of Oracle-provided tools and a
    little sweat, it is possible to validate that every executable line in a program
    has been executed. As valuable as that is, even more valuable is the ability to
    see what lines have not been executed. This is where you want to automate as much
    as possible. If every line is executed, test passed. If every line is not executed,
    test failed. A human intervenes and creates a test, or tests, that do cover every
    line.


    The bulk of this chapter will use data provided by the data dictionary and the
    PL/SQL compiler to ensure compliance to corporate standards. Standards are anything
    but standard, so a one-size-fits-all solution is impossible. Instead, this chapter
    will provide the tools and guidance for you to create your own solution in whatever
    detail you require. Using plain SQL and the data dictionary, you can validate
    naming standards, find unused variables, find variables defined at multiple scopes,
    perform impact analysis, find unacceptable data type usage, and more.


    I will not explain every option, column, or report provided by, or for, these
    tools. If the documentation from Oracle is good, and it usually is, I will not
    regurgitate it. This chapter is not a general tutorial on using these tools. It
    is an explanation of how you can incorporate these tools into your development
    workflow to implement better applications.'
