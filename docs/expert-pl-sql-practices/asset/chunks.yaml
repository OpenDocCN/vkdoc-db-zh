    ` 11     fetch rc bulk collect into p_rows limit 1000;`

    ` 12   end;`

    ` 13`

    ` 14  end;`

    ` 15  /`


    `Package body created.`


    Rerun the demo. Each time, 1,000 rows will be bulk collected from the database
    and passed back to the client. Because SQL Plus does not natively understand the
    array that comes back, the data will simply be appended to a large VARCHAR2 variable
    (the_data) to simulate the client receiving the array data. Here is an example
    (`bulk_multi_fetch_in_bulk.sql`):


    `SQL> variable rc refcursor`

    `SQL> exec pkg2.open_cur(:rc)`


    `PL/SQL procedure successfully completed.`


    `SQL> select to_char(systimestamp,''HH24:MI:SS.FF'') started from dual;`


    `STARTED`

    `------------------`

    `12:39:09.704000`


    `SQL> variable the_data varchar2(4000);`

    `SQL> set termout off`


    `SQL> declare`

    `  2    n pkg2.t_num_list;`

    `  3  begin`

    `  4    :the_data := null;`

    `  5    pkg2.fetch_cur(:rc,n);`

    `  6    for i in 1 .. n.count loop`

    `  7      :the_data := :the_data||n(i);`

    `  8    end loop;`

    `  9  end;`

    `[repeated 100 times]`


    `SQL> select to_char(systimestamp,''HH24:MI:SS.FF'') ended from dual;`


    `ENDED`

    `------------------`

    `12:39:09.837000`


    The difference is astounding. Immediate turnaround time is down from 90 seconds
    to 0.13 seconds. Re-running the demo with trace enabled reveals the reduction
    in database trips.


    `SELECT ITEM`

    `FROM HARDWARE`


    `call     count       cpu    elapsed       disk      query    current        rows`

    `------- ------  -------- ---------- ---------- ---------- ----------  ----------`

    `Parse        1      0.00       0.00          0          0          0           0`

    `Execute      1      0.00       0.00          0          0          0           0`

    `Fetch      100      0.04       0.04          0        256          0      100000`

    `------- ------  -------- ---------- ---------- ---------- ----------  ----------`

    `total      102      0.04       0.04          0        256          0      100000`


    100,000 rows were still fetched (far right column), but 100 fetch calls were made.
    I cannot overstate the benefit that has been realized here, even with just this
    simple demo. It’s not uncommon for customers of Oracle to spend large sums of
    money performing optimization exercises in order to glean perhaps an extra 10-15
    ***percent*** performance out of their system through such methods as caching,
    index creation, SQL tuning, etc. Sometimes, customers even purchase more hardware
    along with associated license cost increases. But consider the performance benefits
    gained here in this demo:


    > *From 90 seconds down to 0.13 seconds, an almost 700-fold improvement.*


    As an application developer, if you’re making modifications to code that makes
    it hundreds of times faster, that’s going to make your applications that much
    more successful and you very popular! Reducing network trips in a client application’s
    interaction with the database comes down largely the tools at the disposal of
    the developer in the language of their client application, the design of the application
    to take advantage of passing data to the database in an intelligent fashion, and
    the diligence of the developer. But as a *database* developer, if you can ensure
    that your PL/SQL interfaces to the database are equipped to allow client applications
    to pass and receive data in bulk, then you are that much closer to successful
    application performance.'
