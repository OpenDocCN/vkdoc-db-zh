    `SELECT ILO_MODULE, ILO_ACTION, ELAPSED_SECONDS`

    `FROM ilo_run_vw WHERE ilo_module IN (''Month End Posting'', ''Procedure P'')
    ORDER BY 3 DESC;`


    `ILO_MODULE           ILO_ACTION ELAPSED_SECONDS`

    `-------------------- ---------- ---------------`

    `Month End Posting    p                 8.566376`

    `Procedure P          r                 8.418068`

