    如果你将这个结果集与上面的结果集进行比较，你会注意到金先生列出的电话号码是他的手机号。在任何重构练习中，你的目标都应该是识别出现有应用程序的大多数屏幕和报表中期望的行为，并对原始过程进行编码以返回那些结果。对于特殊情况，可以通过添加新过程或添加额外参数（默认设置为常用请求值）来处理。这将最大限度地减少整合这些变更所需的应用程序代码更改数量。


    通过采取数据库设计和重构步骤以最小化对前端应用程序开发的影响，你已经真正实现了数据库与应用程序的解耦。数据库开发和应用程序开发之间有一条清晰的界线；对于数据库来说，这条界线可以在包含应用程序对象的模式（一个或多个）中进行验证和测试。这使得应用程序开发人员能够按照自己的节奏整合新功能，根据他们的任务优先级独立于数据库变更进行工作。在开发人员选择调用返回新版本数据的过程之前，数据库变更不会对应用程序产生任何影响。


    这是否意味着应用程序开发人员、数据库开发人员和 DBA 不再需要协同工作和沟通？远非如此。在下一节中，你将了解敏捷背后的价值观，并探讨一些在敏捷数据库开发环境中充分利用
    PL/SQL 的指导原则。


    ## 敏捷宣言


    几年前，我发现自己对“*敏捷开发*”这个短语感到非常困惑。我听到了许多新术语，如“*scrum*”和“*sprint*”，碰到一群群站在走廊里的人（通常挡住了我要去的地方），并且注意到关于构建候选版本的邮件持续泛滥。与此同时，解释规范、文档和培训不再需要，因为每个人都接受过“*敏捷*”培训的呆伯特漫画副本出现在办公隔间的各个角落。这一切对我来说都挺有意思，直到我注意到实体关系图（ERD）和精心设计的数据库模式在这个新世界中也消失了。在那一刻，我决定是时候了解一些关于敏捷的知识了。


    不幸的是，我的大部分阅读发现关于数据库的信息很少。我找到的少数资料似乎对现代数据库产品中可用的所有选项以及这些选项的使用如何影响数据库性能的理解非常有限。我想知道，对数据库设计缺乏关注是敏捷运动发起者有意为之，因为他们认为这没有必要，还是因为数据库设计被忽视了，因为大多数书中的典型用例都是处理在预先存在的数据库上构建应用程序。


    因此，我从头开始，查看图 12-3 所示的《敏捷宣言》。我发现我完全同意该宣言以及支持它的《十二项原则》中的每一条。我也没有发现任何关于 scrum、sprint、站立会议或任何想要抹杀数据库设计的迹象。我在下面复制了《敏捷宣言》，你可以在
    `agilemanifesto.org` 找到《十二项原则》。


    ![images](img/1203.jpg)


    **图 12-3.** 敏捷宣言


    敏捷宣言列出了四个价值观：*个体和互动*、*工作的软件*、*客户协作*以及*响应变化*。这前四个价值观可与四个传统价值观相比较：*流程和工具*、*详尽的文档*、*合同谈判*以及*遵循计划*。注意每一行的措辞。宣言并没有说第二组价值观不再必要；它只是说第一组价值观更重要。宣言也没有确切地告诉你如何实现敏捷，这有一个原因。团队各不相同，对某个团队有效的方法可能对另一个团队有害。由于个体和互动比工具和流程更重要，并且是列在第一的价值对，你需要认识到工具和流程应该支持团队中的个体并鼓励团队成员之间的互动。当现有的工具和流程不符合这个目标时，就应该改变工具和流程。'
- fmt: 'People who hear me say this are usually surprised. After all, I wrote a paper
    back in 2008 called “An Industrial Engineer''s Guide to Database Management.”
    In my paper, I noted ways that good database management practices were similar
    to Industrial Engineering, and processes and standardization were very heavily
    emphasized. I still believe that process and standardization are very important
    to building a reliable product with a repeatable build but if the existing process
    is not making it easier for the team to get their job done, the process is flawed,
    not the team. Just like a user will readily use an application that makes it easier
    to do their job, a team will follow a process that makes it easier to do theirs.
    The first sign of a flawed process is that people don''t like to follow it. The
    best fix is to ensure that the process is adding value and that the benefits are
    visible. If the process is adding value but using the process is painful, then
    you need tools to make it easier to comply. Processes are most beneficial when
    they are consistently followed by everyone on the team, and teams are generally
    very willing to comply with processes that make it easy to comply with a known
    requirement.


    This is, of course, a circular argument but that''s not a bad thing. In this case,
    you have a healthy feedback loop in that people will follow a process that adds
    value; as more people follow the process, the more valuable it becomes. Early
    Industrial Engineering techniques, i.e. Taylorism, recognized the importance of
    finding and eliminating bottlenecks in process (system) optimization but they
    did so at the expense of the humans involved in the process. Later techniques,
    such as those proposed by Dr. W. Edwards Deming and used in Lean Manufacturing,
    recognized the value of the individuals within the process. By changing processes
    to optimize the team''s ability to get their job done in the simplest and most
    expedient way possible, Toyota was able to build better quality cars faster at
    a lower cost than the companies who followed the recognized processes of that
    time period. This is what agile is all about: focus on the values and the goals
    of the team, define the principals that support those goals, and then create the
    process (practices) that ensure members are able to achieve their goals as effectively
    and as efficiently as possible.


    ## Using `PL/SQL` with Evolutionary Data Modeling


    In this section, I''ll list some of the techniques that have I have either experienced
    or seen to be effective. This isn''t an exhaustive list, nor is it intended to
    be a list of commandments that must be followed. As you read through these techniques,
    consider the values in `The Agile Manifesto`. Each of the techniques below aligns
    with at least one of the core values and supports the team''s ability adapt to
    changes, keep change visible, and continuously improve their software products.


    ### Define the Interface


    Rather than beginning by designing a database schema, start by defining the interface
    between the database and the front-end application. What is the functionality
    the application must perform? Define the data needed by the users and the values
    they will enter to request the result set. Define the data they need to update
    and how they will confirm their updates. If data needs to be manipulated or transformed,
    determine what needs to happen to it and how the transformation can be verified.
    This process should include database architects, database developers, and application
    developers, and when it''s complete, the end result is an agreement of the functionality
    the database will provide for the application. The agreement must include names
    of any object the application team will call. If views are needed, column names
    and data types should be included. Procedure definitions should include all required
    input and output parameters. Once an agreement is reached, everyone should have
    what they need to focus on optimizing the design within their area of responsibility.
    Any changes must be negotiated. If bugs are identified later that indicate a mismatch
    between the database and application, a review of the interface agreement will
    help identify how the bug should be resolved. The process of defining the interface
    increases the direct interaction between team members and engages them on the
    most important topic: the functionality needed by the end user.


    ### Think Extensible


    One of the principles behind `The Agile Manifesto` is simplicity and minimizing
    the work to be done. Some interpretations of agile use the idea of minimizing
    work to insist that nothing but the minimal code to provide for the immediate
    needs should be written. The problem with this kind of thinking is that performance
    and scalability can''t be added to the build when the customer notices response
    time is slowing. I''ve heard people say “The customer isn''t paying for a Cadillac.
    Just build the Yugo for now.” However, has anyone ever successfully turned a Yugo
    into a Cadillac? Anyone who knows cars—or software—knows that it just doesn''t
    work that way.


    Instead, you need to start by building a solid and extensible frame. Structural
    changes are major changes for cars, houses, or software systems. If you have a
    solid foundation, you can add functionality so that your Yugo/Cadillac begins
    to take shape and gives the customer an initial feel for what is possible. Maybe
    the customer will be happy with a Yugo; maybe the application will be so successful
    it will eventually become a Cadillac. Using an evolutionary approach to database
    design and using `PL/SQL` as an `API` allows you to adapt the database to changing
    needs while controlling how and when changes are implemented in the next layer
    of the application.


    Many proponents of agile mention how easy it is to make the changes later when
    new customer needs are identified. This depends on which system components are
    considered part of the design. If the team has an architect and that architect
    is responsible for the design of the application only, this may be true. However,
    `architect` is a widely used term these days, and if the architect in question
    is responsible for the hardware or software platform, making changes later can
    become a very complicated and expensive option. The goal should be to focus on
    the essential: the features and functionality that will provide the results the
    customer requested while planning for the likely direction of the final product.
    Short release cycles and iterative development provide you with feedback to ensure
    you are interpreting our customer''s requests accurately. The feedback you receive
    provides the first clues when your product''s direction needs to shift.'
  raw: 'People who hear me say this are usually surprised. After all, I wrote a paper
    back in 2008 called “An Industrial Engineer''s Guide to Database Management.”
    In my paper, I noted ways that good database management practices were similar
    to Industrial Engineering, and processes and standardization were very heavily
    emphasized. I still believe that process and standardization are very important
    to building a reliable product with a repeatable build but if the existing process
    is not making it easier for the team to get their job done, the process is flawed,
    not the team. Just like a user will readily use an application that makes it easier
    to do their job, a team will follow a process that makes it easier to do theirs.
    The first sign of a flawed process is that people don''t like to follow it. The
    best fix is to ensure that the process is adding value and that the benefits are
    visible. If the process is adding value but using the process is painful, then
    you need tools to make it easier to comply. Processes are most beneficial when
    they are consistently followed by everyone on the team, and teams are generally
    very willing to comply with processes that make it easy to comply with a known
    requirement.


    This is, of course, a circular argument but that''s not a bad thing. In this case,
    you have a healthy feedback loop in that people will follow a process that adds
    value; as more people follow the process, the more valuable it becomes. Early
    Industrial Engineering techniques, i.e. Taylorism, recognized the importance of
    finding and eliminating bottlenecks in process (system) optimization but they
    did so at the expense of the humans involved in the process. Later techniques,
    such as those proposed by Dr. W. Edwards Deming and used in Lean Manufacturing,
    recognized the value of the individuals within the process. By changing processes
    to optimize the team''s ability to get their job done in the simplest and most
    expedient way possible, Toyota was able to build better quality cars faster at
    a lower cost than the companies who followed the recognized processes of that
    time period. This is what agile is all about: focus on the values and the goals
    of the team, define the principals that support those goals, and then create the
    process (practices) that ensure members are able to achieve their goals as effectively
    and as efficiently as possible.


    ### Using PL/SQL with Evolutionary Data Modeling


    In this section, I''ll list some of the techniques that have I have either experienced
    or seen to be effective. This isn''t an exhaustive list, nor is it intended to
    be a list of commandments that must be followed. As you read through these techniques,
    consider the values in The Agile Manifesto. Each of the techniques below aligns
    with at least one of the core values and supports the team''s ability adapt to
    changes, keep change visible, and continuously improve their software products.


    #### Define the Interface


    Rather than beginning by designing a database schema, start by defining the interface
    between the database and the front-end application. What is the functionality
    the application must perform? Define the data needed by the users and the values
    they will enter to request the result set. Define the data they need to update
    and how they will confirm their updates. If data needs to be manipulated or transformed,
    determine what needs to happen to it and how the transformation can be verified.
    This process should include database architects, database developers, and application
    developers, and when it''s complete, the end result is an agreement of the functionality
    the database will provide for the application. The agreement must include names
    of any object the application team will call. If views are needed, column names
    and data types should be included. Procedure definitions should include all required
    input and output parameters. Once an agreement is reached, everyone should have
    what they need to focus on optimizing the design within their area of responsibility.
    Any changes must be negotiated. If bugs are identified later that indicate a mismatch
    between the database and application, a review of the interface agreement will
    help identify how the bug should be resolved. The process of defining the interface
    increases the direct interaction between team members and engages them on the
    most important topic: the functionality needed by the end user.


    #### Think Extensible


    One of the principles behind The Agile Manifesto is simplicity and minimizing
    the work to be done. Some interpretations of agile use the idea of minimizing
    work to insist that nothing but the minimal code to provide for the immediate
    needs should be written. The problem with this kind of thinking is that performance
    and scalability can''t be added to the build when the customer notices response
    time is slowing. I''ve heard people say “The customer isn''t paying for a Cadillac.
    Just build the Yugo for now.” However, has anyone ever successfully turned a Yugo
    into a Cadillac? Anyone who knows cars—or software—knows that it just doesn''t
    work that way.


    Instead, you need to start by building a solid and extensible frame. Structural
    changes are major changes for cars, houses, or software systems. If you have a
    solid foundation, you can add functionality so that your Yugo/Cadillac begins
    to take shape and gives the customer an initial feel for what is possible. Maybe
    the customer will be happy with a Yugo; maybe the application will be so successful
    it will eventually become a Cadillac. Using an evolutionary approach to database
    design and using PL/SQL as an API allows you to adapt the database to changing
    needs while controlling how and when changes are implemented in the next layer
    of the application.


    Many proponents of agile mention how easy it is to make the changes later when
    new customer needs are identified. This depends on which system components are
    considered part of the design. If the team has an architect and that architect
    is responsible for the design of the application only, this may be true. However,
    *architect* is a widely used term these days, and if the architect in question
    is responsible for the hardware or software platform, making changes later can
    become a very complicated and expensive option. The goal should be to focus on
    the essential: the features and functionality that will provide the results the
    customer requested while planning for the likely direction of the final product.
    Short release cycles and iterative development provide you with feedback to ensure
    you are interpreting our customer''s requests accurately. The feedback you receive
    provides the first clues when your product''s direction needs to shift.'
  trans: '

    听到我这么说的人通常会感到惊讶。毕竟，我在 2008 年写过一篇题为《工业工程师的数据库管理指南》的论文。在论文中，我指出了优秀的数据库管理实践与工业工程的相似之处，并非常强调流程和标准化。我仍然相信流程和标准化对于构建可靠、可重复构建的产品非常重要，但如果现有流程并未让团队更轻松地完成工作，那么缺陷在于流程本身，而非团队。正如用户会欣然使用能简化工作的应用程序一样，团队也会遵循能让工作更轻松的流程。流程存在缺陷的首要迹象就是人们不愿意遵循它。最佳解决方案是确保流程能创造价值且其效益显而易见。如果流程确有价值但执行过程令人痛苦，那么你需要工具来简化合规操作。当团队中每个人都持续遵循流程时，其效益才能最大化，而团队通常也非常愿意遵循那些易于满足已知要求的流程。


    这当然是一个循环论证，但并非坏事。在这种情况下，你拥有一个良性的反馈循环：人们会遵循创造价值的流程；随着更多人遵循该流程，其价值也随之提升。早期的工业工程技术（即泰勒主义）认识到在流程（系统）优化中发现并消除瓶颈的重要性，但他们的做法是以牺牲流程中涉及的人员为代价的。后来的技术，如
    W·爱德华兹·戴明博士提出的方法及精益制造中的应用，则认识到了流程中个体的价值。通过优化流程以提升团队以最简单、最便捷的方式完成工作的能力，丰田公司能够以更低的成本、更快地生产出比同时期遵循公认流程的公司质量更高的汽车。这正是敏捷的核心：聚焦于团队的价值和目标，定义支持这些目标的原则，然后创建能确保成员尽可能有效且高效地实现目标的流程（实践）。


    ## 在进化数据建模中使用 `PL/SQL`


    在本节中，我将列举一些我亲身经历或认为有效的技巧。这并非详尽无遗的清单，也无意成为必须遵循的教条。在阅读这些技巧时，请思考`《敏捷宣言》`中的价值。以下每项技巧都至少符合一项核心价值，并支持团队适应变更、保持变更可见性以及持续改进其软件产品的能力。


    ### 定义接口


    不要从设计数据库模式开始，而是先定义数据库与前端应用程序之间的接口。应用程序必须实现哪些功能？定义用户所需的数据以及他们为请求结果集将输入的值。定义他们需要更新的数据以及确认更新的方式。如果需要操作或转换数据，请确定需要对其执行的操作以及如何验证转换过程。此过程应包括数据库架构师、数据库开发人员和应用程序开发人员，完成后，最终达成关于数据库将为应用程序提供何种功能的共识。该协议必须包含应用程序团队将调用的任何对象的名称。如果需要视图，则应包括列名和数据类型。存储过程定义应包含所有必需的输入和输出参数。一旦达成共识，每个人都应获得所需信息，以便专注于其职责范围内的优化设计。任何变更都必须经过协商。如果后续发现表明数据库与应用程序不匹配的错误，审查接口协议将有助于确定如何解决该错误。定义接口的过程增加了团队成员之间的直接互动，并让他们聚焦于最重要的主题：最终用户所需的功能。


    ### 考虑可扩展性


    `《敏捷宣言》`背后的原则之一是简洁性，即最小化待完成工作。对敏捷的一些解读将最小化工作理解为仅应编写满足当前需求的最小限度代码。这种思维方式的问题在于，当客户注意到响应速度变慢时，性能和可扩展性无法后期添加到构建中。我曾听人说：“客户又不是在买单凯迪拉克。现在先造辆尤格就行。”然而，有人曾成功地将尤格改造成凯迪拉克吗？任何懂车——或懂软件——的人都知道这根本行不通。


    相反，你需要从构建一个坚实且可扩展的框架开始。对于汽车、房屋或软件系统而言，结构性变更都是重大变更。如果你有一个坚实的基础，就可以添加功能，让你的尤格/凯迪拉克初具雏形，让客户初步了解其可能性。也许客户会对尤格感到满意；也许应用程序会非常成功，最终成为凯迪拉克。采用进化式的数据库设计方法，并使用`PL/SQL`作为`API`，可以使数据库适应不断变化的需求，同时控制变更在应用程序下一层中实现的方式和时间。


    许多敏捷倡导者提到，当识别出新的客户需求时，后期进行变更非常容易。这取决于哪些系统组件被视为设计的一部分。如果团队有一位架构师，而该架构师仅负责应用程序的设计，那么这可能是真的。然而，`架构师`是当今广泛使用的术语，如果所讨论的架构师负责硬件或软件平台，后期进行变更可能会成为一项非常复杂且昂贵的选择。目标应该是聚焦于本质：提供客户所请求结果所需的功能特性，同时为最终产品的可能走向做好规划。短发布周期和迭代开发为你提供反馈，确保你准确理解客户的请求。当你收到反馈时，它就提供了产品方向是否需要转变的第一线索。

    '
- fmt: '#### Test Driven Development


    敏捷开发和极限编程中最有用的工具之一就是测试驱动开发。其概念很简单：在编写任何代码之前，先设计好测试，以证明计划的代码变更已达成目标。有人可能会问，如何为尚不存在的软件功能编写测试？但不妨反过来想：如果成败的标准尚未定义，又该如何编写代码呢？


    当使用 `PL/SQL` 作为 `API` 时，确定必要测试的第一步是考虑约定的接口。接口提供了有关过程名称、参数和预期结果的信息。当然，对过程进行的变更测试应包括验证结果的准确性，但还有哪些其他类型的错误可能影响过程的行为呢？思考这个问题时，你会发现改进代码的机会。某些错误条件可以被捕获，然后过程可以向前端应用程序返回一条消息。如果应用程序传入了一个完全意想不到的值，会发生什么？当结果不符合预期时，会发生什么？当调用过程的应用程序会话在未完成任务的情况下消失时，又会发生什么？这些情况对于任何应用程序来说都是真实存在的可能性，但当代码能够捕获错误并以一种能帮助开发者识别输入为何无效或结果如何被影响的方式处理它们时，最终的应用程序对最终用户来说会更加健壮和稳定，从而显著提升软件的价值。


    每个过程测试都应该是可编写脚本且可重复的。这些可重复的脚本构成了回归测试的基础，提供了一种工具来确认对一个过程的更改不会影响应用程序的其他部分。附带的好处是，这些脚本可以提供给其他人，作为故障排查或验证系统集成的工具。一旦测试可重复，它们就可以被整合到一个测试框架中，允许将整个测试序列作为一个包来执行。如果测试脚本可以使用
    `shell` 脚本或 `PL/SQL` 代码执行，那么数据库开发者就能在应用程序开发端开始使用接口之前，确认接口协议要求的所有功能是否按预期工作。这将最小化前端开发团队在整合其变更与数据库变更时遇到的问题。更好的是，如果应用程序开发者确实遇到了错误，可以将数据库单级测试的结果与下一级开发中的参数和结果进行比较。这能加快故障排查和错误纠正，使开发过程的双方都更加敏捷。


    #### Use Schemas and Users Wisely


    使用 `PL/SQL` 作为接口层的一个优势是，可以更改结构对象、重新编译数据库代码，并检查数据字典以确认整个模式有效。如果新变更对其他包、过程或视图有任何影响，它将立即可见，并且可以在错误传播到其他应用层之前进行修复。为了能够做到这一点，应该有一个包含所有应用程序对象的单一应用程序模式。在复杂的应用程序中，功能可以划分为模块，允许独立测试部分代码子集。这并不意味着不应执行完整的系统集成测试，或者应该将其推迟到项目后期。但如果能缩小问题的范围，问题通常可以更轻松、更快地解决。


    创建一个独立的应用程序用户，并授予该用户执行接口协议和中心模式中定义的过程的权限。如果授予该应用程序用户更多访问权限，就会有人在其他部分构建直接的 `SQL`
    语句的风险，这将使编译测试失效。这也会使识别拟议变更影响了多少应用程序代码变得更加困难，给规划过程增加复杂性和不确定性。


    虽然限制应用程序用户 `ID` 的访问权限和权限有好处，但重要的是要注意，开发者需要访问模式对象，这不仅对数据库开发者是如此。前端应用程序开发者对 `DBMS`
    及其内部数据了解得越多，他们就能越好地利用这个工具集。应鼓励开发者安全地探索数据库模式，有几个选项可以实现这一目标。在开发周期早期尽可能多地提供对数据库的访问，随着变更从开发数据库迁移到功能测试、系统集成测试和质量测试，逐步减少访问。如何提供这种访问取决于团队的技能。如果团队精通数据库知识，则允许直接访问模式。如果他们对
    `DBMS` 和数据库技术缺乏经验，则创建具有不同权限类型的额外用户。这也为监控带来了好处：如果你发现一个失控的查询，但该进程是由只读用户发起的，而不是预期执行应用程序中过程的用户发起的，那么可以安全地终止该进程而不影响应用程序。如果开发者不值得信任，会在未经授权或在迁移过程的错误阶段更改代码或数据，则不应给予他们直接访问权限。审计提供了一种准确且简便的方法，使数据库内进行的所有更改都透明可见。


    ### Summary


    敏捷性是指能够快速适应不断变化的条件。不仅如此，能够适应和演变以满足变化的条件和需求，对于保持竞争力至关重要。`DBMS` 软件本身并不限制你实施变更的能力，但你如何选择使用该软件以及如何设计应用程序却会带来限制。首先，你需要承认并为即将到来的不可避免的变更做好准备。然后，你需要评估项目目标以及你为实现这些目标所拥有的工具。支持敏捷开发流程**同时**拥有设计良好的数据模型是可能的。使用
    `PL/SQL` 作为 `API` 可以通过提供一种允许数据库和应用程序演进并支持不断变化的客户需求的方法，来缓冲一些需要进行的变更。


    ## C H A P T E R  13'
  raw: '#### Test Driven Development


    One of the most beneficial tools to come from agile and Extreme Programming is
    test driven development (TDD). The concept is simple: before any code is written,
    design the test that will prove that the planned code changes have achieved their
    goal. Some people wonder how a test can be written for software functionality
    that doesn''t exist yet, but turn that question around. How can code be written
    if the measures of success or failure have not been defined?


    When using PL/SQL as the API, the first step to determining the necessary tests
    is to consider the agreed upon interface. The interface provides the information
    about the procedure name, the parameters, and the desired results. Testing changes
    made to a procedure should include verifying the accuracy of the results, of course,
    but what other kinds of errors might influence the procedure''s behavior? As you
    consider this question, you will see options to improve the code. Some error conditions
    can be captured, and then the procedure can return a message to the front end
    application. What will happen if the application passes a completely unexpected
    value? What happens when the results are not what are expected? What happens when
    the application session calling a procedure goes away without completing its task?
    Each of these conditions represents a real possibility for any application but
    when the code is able to capture errors and handle them in a way that helps the
    developer identify why the input was invalid or how the results were influenced,
    the resulting application becomes more robust and stable for the end user, which
    increases the software''s value significantly.


    Each procedural test should be scripted and repeatable. These repeatable scripts
    form the foundation for regression testing, providing a tool to confirm that changes
    to one procedure did not impact other areas of the application. As a side benefit,
    these scripts can be made available to others, providing a tool for troubleshooting
    or verifying system integration. Once tests are repeatable, then they can be incorporated
    into a test harness, allowing an entire series of tests to be executed as a package.
    If the test scripts can be executed using shell script or PL/SQL code, then the
    database developer can confirm that all the functionality required by the interface
    agreement is working as expected before the application development side begins
    working with it. This will minimized the issues the front end development team
    experiences as they incorporate their changes with the database changes. Better
    yet, if an application developer does hit an error, the results from the database
    only level testing can be compared to the parameters and results at the next level
    of development. This expedites troubleshooting and error correction, making both
    sides of this development process more agile.


    #### Use Schemas and Users Wisely


    One of the advantages of using PL/SQL as the interface layer is that structural
    objects can be changed, database code can be recompiled, and the data dictionary
    can be checked to confirm that the entire schema is valid. If the new changes
    had any impact on other packages, procedures, or views, it will be visible immediately
    and “bugs” can be repaired before they''ve propagated into other application layers.
    In order to be able to do this, there should be one application schema containing
    the all the application objects. In a complex application, the functionality can
    be divided into modules that will allow subsets of the code to be tested independently
    of each other. This does not mean that complete system integration testing should
    not be performed, or that it should be delayed until late in the project. But
    problems can often be solve more easily and quickly if the scope of the problem
    can be narrowed.


    Create a distinct application user and grant that user permission to execute the
    procedures defined in the interface agreement and central schema(s). If you grant
    more access to the application user than this, you run the risk that someone will
    build a direct SQL statement into another part of the application and this will
    defeat the compile test. It will also make it more difficult to identify how much
    application code is impacted by a proposed change, adding complexity and uncertainty
    to the planning process.


    While limiting the access and permissions of the application user IDs provides
    benefits, it''s important to note that the developers need access to schema objects
    and this is not just true for database developers. The more the front-end application
    developers know and understand about the DBMS and the data within it, the better
    use they will be able to make of this toolset. Developers should be encouraged
    to safely explore the database schema, and there are a couple of options for achieving
    this goal. Provide as much access as possible to the database early in the development
    cycle and reduce access as changes are migrated from the development databases,
    through functionality testing, systems integration testing, and quality testing.
    How this access is provided depends on the skill of the team. If the team is knowledgeable
    about the database, allow direct access to the schema. If they are inexperienced
    with the DBMS and database techniques, create additional users with different
    kinds of permissions. This also provides benefits in monitoring: if you see a
    runaway query but the process was initiated by the read only user rather than
    the user expected to execute the procedures in the application, the process can
    be safely terminated without impacting the application. If developers cannot be
    trusted to NOT change code or data without authorization or at the wrong stage
    of the migration process, they should not be given direct access. Auditing provides
    an accurate and easy way to make all changes made within the database transparent.


    ### Summary


    Agility is being able to adapt quickly to changing conditions. More than that,
    being able to adapt and evolve to meet changing conditions and requirements is
    critical to your ability to remain competitive. The DBMS software doesn''t limit
    your ability to implement change, but how you choose to use the software and how
    you design our applications can. First, you need to acknowledge and prepare for
    the inevitable change that will come your way. Then you need to evaluate the goals
    of your projects and the tools you have to meet these goals. It is possible to
    support an agile development process AND have a well designed data model. Using
    PL/SQL as an API can buffer some of the changes that will need to be made by providing
    a means to allow the database and the application to evolve and support changing
    customer needs.


    ## C H A P T E R  13'
  trans: '

    #### 测试驱动开发


    敏捷开发和极限编程中最有用的工具之一是测试驱动开发。其概念很简单：在编写任何代码之前，先设计好测试，以验证计划的代码变更已达成目标。有人可能会问，如何为尚不存在的软件功能编写测试？但不妨反过来思考：如果成败的标准尚未定义，又该如何编写代码呢？


    当使用 `PL/SQL` 作为 `API` 时，确定必要测试的第一步是考虑约定的接口。接口提供了有关过程名称、参数和预期结果的信息。当然，对过程进行的变更测试应包括验证结果的准确性，但还有哪些其他类型的错误可能影响过程的行为呢？思考这个问题时，你会发现改进代码的机会。某些错误条件可以被捕获，然后过程可以向前端应用程序返回一条消息。如果应用程序传入了一个完全意想不到的值，会发生什么？当结果不符合预期时，会发生什么？当调用过程的应用程序会话在未完成任务的情况下消失时，又会发生什么？这些情况对于任何应用程序来说都是真实存在的可能性，但当代码能够捕获错误并以一种能帮助开发者识别输入为何无效或结果如何被影响的方式处理它们时，最终的应用程序对最终用户来说会更加健壮和稳定，从而显著提升软件的价值。


    每个过程测试都应该是可编写脚本且可重复的。这些可重复的脚本构成了回归测试的基础，提供了一种工具来确认对一个过程的更改不会影响应用程序的其他部分。附带的好处是，这些脚本可以提供给其他人，作为故障排查或验证系统集成的工具。一旦测试可重复，它们就可以被整合到一个测试框架中，允许将整个测试序列作为一个包来执行。如果测试脚本可以使用
    `shell` 脚本或 `PL/SQL` 代码执行，那么数据库开发者就能在应用程序开发端开始使用接口之前，确认接口协议要求的所有功能是否按预期工作。这将最小化前端开发团队在整合其变更与数据库变更时遇到的问题。更好的是，如果应用程序开发者确实遇到了错误，可以将数据库单级测试的结果与下一级开发中的参数和结果进行比较。这能加快故障排查和错误纠正，使开发过程的双方都更加敏捷。


    #### 善用模式与用户


    使用 `PL/SQL` 作为接口层的一个优势是，可以更改结构对象、重新编译数据库代码，并检查数据字典以确认整个模式有效。如果新变更对其他包、过程或视图有任何影响，它将立即可见，并且可以在错误传播到其他应用层之前进行修复。为了能够做到这一点，应该有一个包含所有应用程序对象的单一应用程序模式。在复杂的应用程序中，功能可以划分为模块，允许独立测试部分代码子集。这并不意味着不应执行完整的系统集成测试，或者应该将其推迟到项目后期。但如果能缩小问题的范围，问题通常可以更轻松、更快地解决。


    创建一个独立的应用程序用户，并授予该用户执行接口协议和中心模式中定义的过程的权限。如果授予该应用程序用户更多访问权限，就会有人在其他部分构建直接的 `SQL`
    语句的风险，这将使编译测试失效。这也会使识别拟议变更影响了多少应用程序代码变得更加困难，给规划过程增加复杂性和不确定性。


    虽然限制应用程序用户 `ID` 的访问权限和权限有好处，但重要的是要注意，开发者需要访问模式对象，这不仅对数据库开发者是如此。前端应用程序开发者对 `DBMS`
    及其内部数据了解得越多，他们就能越好地利用这个工具集。应鼓励开发者安全地探索数据库模式，有几个选项可以实现这一目标。在开发周期早期尽可能多地提供对数据库的访问，随着变更从开发数据库迁移到功能测试、系统集成测试和质量测试，逐步减少访问。如何提供这种访问取决于团队的技能。如果团队精通数据库知识，则允许直接访问模式。如果他们对
    `DBMS` 和数据库技术缺乏经验，则创建具有不同权限类型的额外用户。这也为监控带来了好处：如果你发现一个失控的查询，但该进程是由只读用户发起的，而不是预期执行应用程序中过程的用户发起的，那么可以安全地终止该进程而不影响应用程序。如果开发者不值得信任，会在未经授权或在迁移过程的错误阶段更改代码或数据，则不应给予他们直接访问权限。审计提供了一种准确且简便的方法，使数据库内进行的所有更改都透明可见。


    ### 总结


    敏捷性是指能够快速适应不断变化的条件。不仅如此，能够适应和演变以满足变化的条件和需求，对于保持竞争力至关重要。`DBMS` 软件本身并不限制你实施变更的能力，但你如何选择使用该软件以及如何设计应用程序却会带来限制。首先，你需要承认并为即将到来的不可避免的变更做好准备。然后，你需要评估项目目标以及你为实现这些目标所拥有的工具。支持敏捷开发流程**同时**拥有设计良好的数据模型是可能的。使用
    `PL/SQL` 作为 `API` 可以通过提供一种允许数据库和应用程序演进并支持不断变化的客户需求的方法，来缓冲一些需要进行的变更。


    ## C H A P T E R  13

