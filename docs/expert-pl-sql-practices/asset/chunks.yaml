    The teardown process is designed to reset or restore the status, such as returning
    the table and the data to the same state it was in before the procedure was executed.


    The procedure in this example doesn’t update or affect any data, so there is no
    need for either the startup or the teardown processes, thus they are empty. If
    you only have a single test, you may have startup and teardowns before and after
    the test run. You can add multiple startup and teardown processes to a unit test.
    You can also add a number of tests to a test suite. In this case, it is possible
    to move all the startup and teardown processes to the top level, so that you prepare
    the environment by running all the startup processes before the suite starts.
    Then you run the suite of tests and the teardown processes return the situation
    to normal at the end. This depends on the procedures themselves, what you are
    developing, and the impact one test may have on the next.


    #### Collecting Code Coverage Statistics


    Collecting the code coverage numbers is a good idea, especially as the number
    of procedures or functions in a project grows. You can ascertain how much of the
    code there is and how much of it you are testing. You may well have a test that
    is 100 percent successful, but if it only tests 10 percent of the procedure, then
    you can hardly call it a useful test. All code coverage statistics gathered are
    available in the Test Runs and Suite Runs code coverage reports, which you will
    find in the Reports node in the Unit Test navigator.'
  trans: "\n### 构建单元测试\n\n让我们从为一个简单的 PL/SQL 代码片段构建单元测试开始。我已经从代码体中移除了任何有趣的逻辑，因为我想专注于参数输入和测试构建，因此清单\
    \ 5-1 中的示例代码只是一个过程的骨架，它期望接收一个参数。通过此示例，你将了解如何创建一个测试、测试的组成部分以及如何运行测试；通过扩展此示例，你将了解如何扩展测试能力。\n\
    \n**清单 5-1.** 单元测试的骨架代码\n\n```sql\nCREATE OR REPLACE PROCEDURE simple_parameter\n\
    \ (p_x in NUMBER)\n AS\nBEGIN\n   NULL;\n   -- 在此处添加有用的 PL/SQL 代码\nEND simple_parameter;\n\
    ```\n\n许多过程都期望输入参数，因此编写一个测试，在其中可以传入一系列参数或值，并确保它们都产生正确的结果，这一点很重要。通过编写单元测试，你可以提供各种各样的测试值，并随着时间的推移更改和增加这些值。\n\
    \n要创建该过程，请打开一个新的 SQL 工作表并执行代码。对于这些示例，我使用一个与仓库所有者不同的数据库用户，名为 `repos_user`。请确保该过程编译成功并且你可以运行它。一旦你有了一个成功编译的过程，就可以开始了。\n\
    \n#### 使用单元测试向导\n\n开始创建单元测试最直接的方式是从“连接”导航器中的过程或函数列表直接操作。在 SQL Developer 中打开“连接”导航器，展开你为用户创建的连接，并找到你想要测试的\
    \ PL/SQL 程序单元。对于此示例，在你执行了创建过程的代码后，展开 `Procedures` 节点。\n\n找到并选中正确的过程，右键单击调出上下文菜单，然后选择\
    \ `创建单元测试`。这将调出你用来创建所有测试的单元测试向导。该向导引导你完成测试执行时各个阶段的创建。因为你正在处理一个 PL/SQL 骨架，它只期望一个参数且不执行任何其他操作，所以不需要额外的设置或验证，因此你可以接受默认的测试名称\
    \ `SIMPLE_PARAMETER`，选择“使用单一虚拟实现创建”选项，并单击 `完成`。\n\n你现在已经创建了你的第一个测试。选择 `视图` ![images](img/U001.jpg)\
    \ `单元测试` 菜单调出单元测试导航器，展开 `测试` 节点，然后选择你的测试。你现在可以查看测试的完整结构和测试组件。\n\n#### 创建第一个实现\n\
    \n一个 Oracle SQL Developer 单元测试包含一个或多个实现。如果你展开你的测试，你将看到单元测试向导创建的第一个实现。你可以为一个单元测试创建任意数量的实现，每个实现都有自己的参数集和预期结果。使用单元测试向导，你可以从创建单个实现开始，也可以为测试预置多个实现。对于这两种情况，你都可以在测试向导完成后继续添加实现。只需在测试名称上右键单击，然后从上下文菜单中选择\
    \ `添加实现`。这个单一的默认实现期望为每个输入参数提供一个值，你可以在向导中创建实现时添加，也可以在向导完成后添加。在图 5-4 中，`测试实现 1`\
    \ 部分中的输入参数为 null，等待被填充。\n\n![images](img/0504.jpg)\n\n**图 5-4.** 单元测试详情\n\n利用图\
    \ 5-4，下一节将根据 `详细信息` 选项卡中列出的内容，回顾单元测试的组成部分。\n\n#### 添加启动和拆除过程\n\n构建单元测试的主要优势之一是你可以运行并重新运行它们。你无法以完全相同的方式手动测试你的过程。如果你有一个会更改数据值、可能向表中插入行或更新表中记录的过程，这一点尤其重要；运行和重新运行它会持续更改数据。你需要能够在再次运行代码之前将环境或数据重置回起始点。启动过程的目的是评估当前状况；例如，你在测试执行该过程之前，为表和数据制作一个备份副本。然后你可以运行测试，从而运行该过程，让它按设计进行更新，然后运行拆除过程。拆除过程旨在重置或恢复状态，例如将表和数据返回到执行过程之前的状态。\n\
    \n此示例中的过程不会更新或影响任何数据，因此不需要启动或拆除过程，因此它们是空的。如果你只有一个测试，你可以在测试运行前后有启动和拆除过程。你可以向一个单元测试添加多个启动和拆除过程。你也可以向一个测试套件添加多个测试。在这种情况下，可以将所有启动和拆除过程移到顶层，这样你就可以在套件开始之前通过运行所有启动过程来准备环境。然后你运行测试套件，拆除过程在结束时将情况恢复到正常状态。这取决于过程本身、你正在开发的内容以及一个测试可能对下一个测试产生的影响。\n\
    \n#### 收集代码覆盖率统计\n\n收集代码覆盖率数据是一个好主意，尤其是随着项目中过程或函数数量的增长。你可以确定有多少代码以及你正在测试其中的多少。你可能有一个\
    \ 100% 成功的测试，但如果它只测试了过程的 10%，那么你很难称其为有用的测试。所有收集到的代码覆盖率统计信息都可在 `测试运行` 和 `套件运行`\
    \ 代码覆盖率报告中找到，你可以在单元测试导航器的 `报告` 节点中找到它们。\n"
- fmt: '#### Specifying Parameters


    Use the `Parameter Grid` in the `Test Implementation` section to add or update
    the input parameters the procedures or functions expect. You can either add these
    input values as you progress through the steps of the `Unit Test Wizard` or manually
    in the `details tab`, just before you run the test. The wizard creates the parameter
    listing, deriving these from the input parameters listed in the procedure or function.


    [Figure 5-5](#Chapter05.html#fig_5_5) shows the parameter page of the `Unit Test
    wizard`. Here you see that you can have either a static input value or a `Dynamic
    Value Query`. With the `Dynamic Value Query`—instead of a hardcoded value—you
    can use or query a table of values. The unit test queries the table and passes
    the results back to the procedure, using each value or set of values in turn as
    the input parameter(s) for the procedure. Adding a single value, as this example
    does, to verify that the test is working is a useful way to start, but you are
    not taking advantage of the power of automating your tests. Again, emphasizing
    the advantage of building unit tests, not only can you automate the process, but
    you can also pass in a wider set of test values for a single test run using the
    `Dynamic Value Query`. Moreover, by using a table of values, you can change and
    update the values in the table and hence pass a different set of values to the
    test without having to update the test.


    The `expected result` of the execution of the procedure may be success or failure
    and you can test for either outcome. In this example, you expect an outcome of
    success. If you are testing for a failure, then the expected outcome is failure
    and you can add in the failure or error number here. In this case, when you run
    the test and you hit the expected the error, the test has succeeded and the final
    report will return a success!


    ![images](images/0505.jpg)


    **Figure 5-5.** Adding parameters to the test implementation


    #### Adding Process Validation


    The last section of the test details page is the process validation. The execution
    of the procedure generally results in a change of status, whether you are updating
    records in a table or calculating a value. In these situations, you can provide
    a validation of the expected result. [Figure 5-6](#Chapter05.html#fig_5_6) provides
    a list of possible process validation types. For example, if you are updating
    a column value in a table, you might want to verify that none of the values is
    above a certain amount. You can verify this by writing a `select` statement against
    the table and using the “Query returns no rows” option. In the case where you
    pass in a set of parameters, allowing the procedure to be run multiple times for
    each parameter(s), you may want to verify that every run of the procedure passes
    the required condition.


    ![images](images/0506.jpg)


    **Figure 5-6.** Selecting process validations


    #### Saving Tests


    Once you have run the `Unit Test wizard`, the test and its implementation(s) are
    saved to the `Unit Test Repository`. Any changes you make, such as changing the
    input parameter or switching from a static to dynamic query value, need to be
    saved to the repository before running the test. If you make a change and then
    try running the test, `SQL Developer` prompts you to save these changes.


    #### Debugging and Running Tests


    You can run tests in two ways: either from the command line or using the `Unit
    Test Details` window shown in [Figure 5-7](#Chapter05.html#fig_5_7). To run tests
    from inside the tool, click the green run button or use `F9`.


    ![images](images/0507.jpg)


    **Figure 5-7.** Running a test


    The test results are sent to the `Results tab`; you can review them there initially
    and then later in the test reports.


    I find it useful to debug the test before running it, as this throws up any issues
    you might overlook before you run the test. For example, if you forget to add
    any input parameters, this is flagged in the debug window, as shown in [Figure
    5-8](#Chapter05.html#fig_5_8).


    ![images](images/0508.jpg)


    **Figure 5-8.** Debug window


    ### Broadening the Scope of the Tests


    Another advantage of building unit tests is that having built a single test, you
    can easily extend it to test a wide variety of input parameters. You can do this
    by running the same test implementation and just manually changing the input value;
    alternatively, you can create new implementations for each of the values you want
    to test. If you only need to test a few cases, then adding a few more implementations
    to the test is fine, but if the values you want to test vary over time or if you
    want to test a long set of values, then manually adding implementations is not
    a practical approach. `Oracle SQL Developer`’s unit tests accept parameter values
    from a static list of values and from a dynamic query. You can use any of the
    following mechanisms to add input parameters:


    *   A static list of lookup values, using the drop-down list to populate each
    test implementation you create.

    *   A static list of lookup values to seed the implementations dynamically based
    on the permutations of available values.

    *   A dynamic query to populate a single implementation, using each of the values
    returned by the query as input parameters.


    The next sections show examples of each of these and how they can add value to
    your tests.'
