    `END;`\n\nConceptually, `select … into` is like the two procedural blocks shown\
    \ in the listing. However, an implicit cursor’s `for … in` processing performs\
    \ an array fetch (as of Oracle10g), and is really, therefore, more like a bulk\
    \ fetch and collect, making it much more efficient than its explicit cursor counterpart.\n\
    \nThe `select … into` cursor uses different keywords and should be implemented\
    \ when you expect zero records to, at most, one record. The `for … in` cursor\
    \ should be implemented when you expect to be processing more than one record.\
    \ Once you `SELECT … INTO` some PL/SQL variable, the cursor is initialized with\
    \ the `SELECT` keyword, it *fetches* `INTO` the PL/SQL variable implicitly, then\
    \ *closes* automatically because it has no more data to retrieve."
  trans: "\n### 隐式游标\n\n与显式游标不同，隐式游标在使用前无需声明（当然，如果你愿意，也可以声明，稍后你会看到声明隐式游标的一个示例）。此外，隐式游标也无需显式地打开、提取和关闭。它们不使用\
    \ `open, fetch, close` 语法，而是使用 `for … in` 语法或简单的 `select ... into` 语法。一个典型的隐式游标示例如清单\
    \ 10-5 所示。\n\n**清单 10-5.** 用于仅获取一个值的隐式游标\n\n```sql\nCREATE FUNCTION f_get_name\
    \ (ip_emp_id IN NUMBER) RETURN VARCHAR2\nAS\nlv_ename emp.ename%TYPE;\nBEGIN\n\
    \   SELECT ename INTO lv_ename FROM emp WHERE emp_id = f_get_name.ip_emp_id;\n\
    \   RETURN lv_ename;\nEND;\n```\n\n你可能认出了这里询问的业务问题。它与清单 10-2 中询问的业务问题相同。两者的主要区别在于，显然，清单\
    \ 10-5 中的解决方案采用了隐式游标。当你的目标仅仅是获取一个值时，应始终优先考虑使用隐式游标。将这段代码的简洁性与清单 10-2 中显式游标示例的冗长和易错性进行比较。在这个隐式游标示例中，没有对\
    \ `SQL%FOUND` 或 `SQL%NOTFOUND` 进行检查。代码非常清晰。这是一个简单的 `select ... into` 游标。如果只选择了一个名字，那么就返回一个名字。可以编写一个异常处理部分来处理两种情况：一是输入的员工\
    \ ID 没有对应的姓名，二是由于数据错误存在多个姓名。\n\n![images](img/square.jpg) **注意** 请注意，到目前为止的示例都省略了异常处理部分。这是有意为之。如果你的代码中存在错误，并且你没有异常处理部分，Oracle\
    \ 将会显示你的 PL/SQL 代码中发生错误的确切行号。如果有了异常处理部分，显示的错误行将是你的异常处理部分开始的地方。如果你正在向用户提供传递到堆栈的指令，以便用户在与你的程序交互时采取不同的操作，这可能是有用的。然而，如果错误信息是给你和其他程序员的，那么指出发生错误的确切行号对于你能够快速有效地进行调试至关重要。\n\
    \n当你提出的问题最多只有一个答案时，根本不需要 `for … in` 游标。在这种情况下，使用简单的 SQL `SELECT` 语句来检索一个可能包含零条或一条记录需要处理的答案。清单\
    \ 10-5 假设所提出的业务问题永远不会返回多条记录。如果是这种情况，简单的 SQL `select … into` 语句是实现该解决方案的最佳编程选择。如果存在多条记录，你的程序将返回一个错误。这是一件好事。你需要知道数据是否有误。同样，如果不存在任何记录，你的程序也会返回一个错误。你的程序期望有且仅有一个答案——任何其他结果都是错误，你的程序会立即失败。使用显式游标通常不会有第二次提取（如清单\
    \ 10-2 中描述的）来测试是否存在更多行，那将是一个错误。而 `select … into` 版本是“无错误的”。\n\n#### 隐式游标的剖析\n\n\
    如前所述，隐式游标可以采用两种形式之一。它可以使用 FOR LOOP 实现，或者更具体地说，使用 `for ... in` 形式实现；也可以使用简单的 SQL\
    \ `select … into` 语法实现。隐式游标不需要你显式打开它。当使用 `for … in` 形式实现隐式游标时，请牢记以下几点：\n\n*  \
    \ 一旦你的隐式游标进入其 for 循环结构，游标即被初始化，结果集也被确定。\n*   `IN` 步骤与“显式游标的剖析”一节中概述的 `FETCH` 步骤非常相似，但有一个关键区别。使用显式游标时，如果你想确保没有更多行需要处理，你需要添加类似下面的语法（示例见清单\
    \ 10-3 和 10-4）：\n    ```sql\n    EXIT WHEN cursor%NOTFOUND;\n    ```\n    这种额外的语法对于隐式游标不是必需的。它们不需要检查游标是否有更多数据要处理来知道何时退出。\n\
    *   同样，`CLOSE` 语法对于隐式游标也不是必需的，因为它会在 `FOR` 循环终止后自动退出。\n\n`select … into` 游标的行为方式与\
    \ `for … in` 游标不同。清单 10-6 说明了这两种实现之间的区别。\n\n将每个 `BEGIN … END` 匿名块与紧随其后的 `DECLARE\
    \ … BEGIN … END` 匿名块进行比较。\n\n**清单 10-6.** 一个 Select … Into 游标与一个 For … In 游标\n\
    \n```sql\nBEGIN\n   FOR x IN (SELECT * FROM dual) LOOP ... END LOOP;\nEND;\n```\n\
    \n```sql\nDECLARE\n   CURSOR c IS SELECT * FROM dual;\nBEGIN\n   OPEN c;\n   LOOP\n\
    \      FETCH c INTO …\n      EXIT WHEN c%NOTFOUND;\n       …\n   END LOOP;\n \
    \  CLOSE c;\nEND;\n```\n\n```sql\nBEGIN\n   SELECT *INTO ...FROM dual;\nEND;\n\
    ```\n\n```sql\nDECLARE\n   CURSOR c IS SELECT * FROM dual;\n   l_rec dual%ROWTYPE;\n\
    BEGIN\n   OPEN c;\n   FETCH c INTO l_rec;\n      IF (SQL%NOTFOUND)\n      THEN\n\
    \         RAISE NO_DATA_FOUND;\n      END IF;\n   FETCH c INTO l_rec;\n      IF\
    \ (SQL%FOUND)\n      THEN\n         RAISE TOO_MANY_ROWS;\n      END IF;\n   CLOSE\
    \ c;\nEND;\n```\n\n从概念上讲，`select … into` 就像清单中所示的两个过程块。然而，隐式游标的 `for … in` 处理执行的是数组提取（从\
    \ Oracle10g 开始），因此实际上更像是批量提取和收集，使其比对应的显式游标高效得多。\n\n`select … into` 游标使用不同的关键字，应在你期望最多处理零条到一条记录时实现。而\
    \ `for … in` 游标应在你期望处理多条记录时实现。一旦你 `SELECT … INTO` 某个 PL/SQL 变量，游标就会随着 `SELECT`\
    \ 关键字被初始化，它*隐式地* `INTO` PL/SQL 变量进行*提取*，然后由于没有更多数据需要检索而*自动关闭*。\n"
- fmt: "### The Implicit Cursor and the Extra Fetch Theory\n\nAn oft batted-around\
    \ theory regarding why implicit cursors should be avoided (and one that has been\
    \ debunked for many years, though I still see it outlined in the odd company policy\
    \ database programming guideline) is that implicit cursors engage in wasted work\
    \ by performing an extra row fetch to test for row existence. This theory has\
    \ been proposed in several (to remain anonymous) independent educational texts\
    \ regarding the Oracle RDBMS. The problem with this theory is that it is rarely\
    \ supported with actual evidence. It is easy enough to test this theory on any\
    \ version of Oracle from version 7.1 onwards. In fact, it should be your moral\
    \ imperative to challenge any edict that makes its way into a company database\
    \ programming policy. If it is stated, then it should be provable. If it is not\
    \ provable, then you should question whether it is an edict that should remain\
    \ in force.\n\nIt is simple enough to test this theory using any implicit cursor\
    \ of your choosing. For illustrative purposes, you may want to try a more universally-available\
    \ case like a simple `SELECT` from an Oracle data dictionary table to test this\
    \ theory. [Listing 10-7](#Chapter10.html#list_10_7) outlines a simple test case:\n\
    \n**Listing 10-7.** A Simple Implicit Cursor Fetch Test Case\n\n```sql\nSQL> DECLARE\n\
    \  2      v_test NUMBER := 0;\n  3  BEGIN\n  4      SELECT user_id INTO v_test\
    \ FROM all_users WHERE username = 'SYS';\n  5  END;\n  6   /\nPL/SQL procedure\
    \ successfully completed.\n```\n\nThis is an easy test to conduct because it includes\
    \ no looping constructs. At least and at most one value is expected. If the `SELECT`\
    \ statement needs to perform an extra fetch, then the extra fetch should be visible\
    \ in the TKPROF output of a simple SQL traced session. [Listing 10-8](#Chapter10.html#list_10_8)\
    \ displays the TKPROF output for the test case illustrated in [Listing 10-7](#Chapter10.html#list_10_7).\n\
    \n**Listing 10-8.** TKPROF Output for Implicit Cursor Extra Fetch Test (11.2.0.1)\n\
    \n```\n********************************************************************************\n\
    \nSQL ID: bs5v1gp6hakdp\nPlan Hash: 3123615307\nSELECT USER_ID\nFROM\n ALL_USERS\
    \ WHERE USERNAME = 'SYS'\n\ncall     count       cpu    elapsed       disk   \
    \   query    current        rows\n------- ------  -------- ---------- ----------\
    \ ---------- ----------  ----------\nParse        1      0.00       0.00     \
    \     0          0          0           0\nExecute      1      0.00       0.00\
    \          0          0          0           0\nFetch        1      0.00     \
    \  0.00          0          6          0           1\n------- ------  --------\
    \ ---------- ---------- ---------- ----------  ----------\ntotal        3    \
    \  0.00       0.00          0          6          0           1\n\nMisses in library\
    \ cache during parse: 1\nOptimizer mode: ALL_ROWS\nParsing user id: 84     (recursive\
    \ depth: 1)\n\nRows     Row Source Operation\n-------  ---------------------------------------------------\n\
    \      1  NESTED LOOPS  (cr=6 pr=0 pw=0 time=0 us cost=3 size=32 card=1)\n   \
    \   1   NESTED LOOPS  (cr=4 pr=0 pw=0 time=0 us cost=2 size=29 card=1)\n     \
    \ 1    TABLE ACCESS BY INDEX ROWID USER$ (cr=2 pr=0 pw=0 time=0 us cost=1 size=26\
    \ card=1)\n      1     INDEX UNIQUE SCAN I_USER1 (cr=1 pr=0 pw=0 time=0 us cost=0\
    \ size=0 card=1)(object id 46)\n      1    TABLE ACCESS CLUSTER TS$ (cr=2 pr=0\
    \ pw=0 time=0 us cost=1 size=3 card=1)\n      1     INDEX UNIQUE SCAN I_TS# (cr=1\
    \ pr=0 pw=0 time=0 us cost=0 size=0 card=1)(object id 7)\n      1   TABLE ACCESS\
    \ CLUSTER TS$ (cr=2 pr=0 pw=0 time=0 us cost=1 size=3 card=1)\n      1    INDEX\
    \ UNIQUE SCAN I_TS# (cr=1 pr=0 pw=0 time=0 us cost=0 size=0 card=1)(object id\
    \ 7)\n\n********************************************************************************\n\
    ```\n\nAs you can see from the TKPROF output, no extra fetch is performed. Therefore,\
    \ I can think of only a handful of reasons why you would not want to do everything\
    \ you can to ensure that you are using implicit cursors over explicit cursors.\
    \ As mentioned in the “Explicit Cursors and Bulk Processing” subsection, when\
    \ needing to perform `FORALL` bulk processing on data fetched from the database,\
    \ you will need to use explicit cursors. In other words, if you are merely selecting\
    \ data and using `htp.p` to output the data in APEX, or you are using `utl_file.put_line`\
    \ to send the selected data to a file, for example, there is no need to bulk process\
    \ using an explicit cursor. Behind the scenes, the Oracle RDBMS already *is* bulk\
    \ processing in those types of instances.\n\nIt is only when you fetch data out,\
    \ process it procedurally, and then put it back into the database using `FORALL`\
    \ updates, inserts, and/or deletes that you would have a need for explicit cursor\
    \ processing. In the same section, REF cursors were briefly illustrated as yet\
    \ another reason to use explicit cursors if your requirement is to pass data to\
    \ a client (residing outside of, but connecting to, the database) application.\
    \ The next two sections introduce the two types of REF cursors available to you."
  raw: '#### The Implicit Cursor and the Extra Fetch Theory


    An oft batted-around theory regarding why implicit cursors should be avoided (and
    one that has been debunked for many years, though I still see it outlined in the
    odd company policy database programming guideline) is that implicit cursors engage
    in wasted work by performing an extra row fetch to test for row existence. This
    theory has been proposed in several (to remain anonymous) independent educational
    texts regarding the Oracle RDBMS. The problem with this theory is that it is rarely
    supported with actual evidence. It is easy enough to test this theory on any version
    of Oracle from version 7.1 onwards. In fact, it should be your moral imperative
    to challenge any edict that makes its way into a company database programming
    policy. If it is stated, then it should be provable. If it is not provable, then
    you should question whether it is an edict that should remain in force.


    It is simple enough to test this theory using any implicit cursor of your choosing.
    For illustrative purposes, you may want to try a more universally-available case
    like a simple `SELECT` from an Oracle data dictionary table to test this theory.
    [Listing 10-7](#Chapter10.html#list_10_7) outlines a simple test case:


    ***Listing 10-7.** A Simple Implicit Cursor Fetch Test Case*


    `SQL> DECLARE`

    `  2      v_test NUMBER := 0;`

    `  3  BEGIN`

    `  4      SELECT user_id INTO v_test FROM all_users WHERE username = ''SYS'';`

    `  5  END;`

    `  6   /`

    `PL/SQL procedure successfully completed.`


    This is an easy test to conduct because it includes no looping constructs. At
    least and at most one value is expected. If the `SELECT` statement needs to perform
    an extra fetch, then the extra fetch should be visible in the TKPROF output of
    a simple SQL traced session. [Listing 10-8](#Chapter10.html#list_10_8) displays
    the TKPROF output for the test case illustrated in [Listing 10-7](#Chapter10.html#list_10_7).


    ***Listing 10-8.** TKPROF Output for Implicit Cursor Extra Fetch Test (11.2.0.1)*


    `********************************************************************************`


    `SQL ID: bs5v1gp6hakdp`

    `Plan Hash: 3123615307`

    `SELECT USER_ID`

    `FROM`

    ` ALL_USERS WHERE USERNAME = ''SYS''`


    `call     count       cpu    elapsed       disk      query    current        rows`

    `------- ------  -------- ---------- ---------- ---------- ----------  ----------`

    `Parse        1      0.00       0.00          0          0          0           0`

    `Execute      1      0.00       0.00          0          0          0           0`

    `Fetch        1      0.00       0.00          0          6          0           1`

    `------- ------  -------- ---------- ---------- ---------- ----------  ----------`

    `total        3      0.00       0.00          0          6          0           1`


    `Misses in library cache during parse: 1`

    `Optimizer mode: ALL_ROWS`

    `Parsing user id: 84     (recursive depth: 1)`


    `Rows     Row Source Operation`

    `-------  ---------------------------------------------------`

    `      1  NESTED LOOPS  (cr=6 pr=0 pw=0 time=0 us cost=3 size=32 card=1)`

    `      1   NESTED LOOPS  (cr=4 pr=0 pw=0 time=0 us cost=2 size=29 card=1)`

    `      1    TABLE ACCESS BY INDEX ROWID USER$ (cr=2 pr=0 pw=0 time=0 us cost=1
    size=26 card=1)`

    `1     INDEX UNIQUE SCAN I_USER1 (cr=1 pr=0 pw=0 time=0 us cost=0 size=0 card=1)(object`
    ![images](images/U003.jpg)

    ` id 46)`

    `      1    TABLE ACCESS CLUSTER TS$ (cr=2 pr=0 pw=0 time=0 us cost=1 size=3 card=1)`

    `1     INDEX UNIQUE SCAN I_TS# (cr=1 pr=0 pw=0 time=0 us cost=0 size=0 card=1)(object`
    ![images](images/U003.jpg)

    ` id 7)`

    `      1   TABLE ACCESS CLUSTER TS$ (cr=2 pr=0 pw=0 time=0 us cost=1 size=3 card=1)`

    `1    INDEX UNIQUE SCAN I_TS# (cr=1 pr=0 pw=0 time=0 us cost=0 size=0 card=1)(object`
    ![images](images/U003.jpg)

    ` id 7)`


    `********************************************************************************`


    As you can see from the TKPROF output, no extra fetch is performed. Therefore,
    I can think of only a handful of reasons why you would not want to do everything
    you can to ensure that you are using implicit cursors over explicit cursors. As
    mentioned in the “Explicit Cursors and Bulk Processing” subsection, when needing
    to perform `FORALL` bulk processing on data fetched from the database, you will
    need to use explicit cursors. In other words, if you are merely selecting data
    and using `htp.p` to output the data in APEX, or you are using `utl_file.put_line`
    to send the selected data to a file, for example, there is no need to bulk process
    using an explicit cursor. Behind the scenes, the Oracle RDBMS already *is* bulk
    processing in those types of instances.


    It is only when you fetch data out, process it procedurally, and then put it back
    into the database using `FORALL` updates, inserts, and/or deletes that you would
    have a need for explicit cursor processing. In the same section, REF cursors were
    briefly illustrated as yet another reason to use explicit cursors if your requirement
    is to pass data to a client (residing outside of, but connecting to, the database)
    application. The next two sections introduce the two types of REF cursors available
    to you.'
  trans: "\n\n### 隐式游标与额外获取理论\n\n一个常被讨论的、关于为何应避免使用隐式游标（尽管多年来已被证伪，但我仍会在奇怪的公司政策数据库编程指南中看到它被提及）的理论是：隐式游标通过执行一次额外的行获取来测试行是否存在，从而进行了无用功。该理论已在多本（为保持匿名）关于\
    \ Oracle RDBMS 的独立教育著作中提出。该理论的问题在于，它很少有实际证据支持。从 Oracle 7.1 版本开始，测试这个理论在任何版本上都相当容易。事实上，挑战任何被写入公司数据库编程政策的命令，应该是你的道德责任。如果它被陈述出来，那么它就应该是可证明的。如果它无法被证明，那么你就应该质疑它是否应该继续作为一条有效的命令。\n\
    \n使用你选择的任何隐式游标来测试这个理论都相当简单。出于说明目的，你可能想尝试一个更普遍可用的案例，比如从 Oracle 数据字典表中进行一个简单的 `SELECT`\
    \ 查询来测试这个理论。代码清单 10-7 概述了一个简单的测试案例：\n\n**代码清单 10-7.** 一个简单的隐式游标获取测试案例\n\n```sql\n\
    SQL> DECLARE\n  2      v_test NUMBER := 0;\n  3  BEGIN\n  4      SELECT user_id\
    \ INTO v_test FROM all_users WHERE username = 'SYS';\n  5  END;\n  6   /\nPL/SQL\
    \ 过程已成功完成。\n```\n\n这是一个易于执行的测试，因为它不包含任何循环结构。预期至少且最多返回一个值。如果 `SELECT` 语句需要执行一次额外的获取，那么在简单的\
    \ SQL 跟踪会话的 TKPROF 输出中应该可以看到这次额外获取。代码清单 10-8 展示了代码清单 10-7 中测试案例的 TKPROF 输出。\n\n\
    **代码清单 10-8.** 隐式游标额外获取测试的 TKPROF 输出（11.2.0.1）\n\n```\n********************************************************************************\n\
    \nSQL ID: bs5v1gp6hakdp\nPlan Hash: 3123615307\nSELECT USER_ID\nFROM\n ALL_USERS\
    \ WHERE USERNAME = 'SYS'\n\ncall     count       cpu    elapsed       disk   \
    \   query    current        rows\n------- ------  -------- ---------- ----------\
    \ ---------- ----------  ----------\nParse        1      0.00       0.00     \
    \     0          0          0           0\nExecute      1      0.00       0.00\
    \          0          0          0           0\nFetch        1      0.00     \
    \  0.00          0          6          0           1\n------- ------  --------\
    \ ---------- ---------- ---------- ----------  ----------\ntotal        3    \
    \  0.00       0.00          0          6          0           1\n\nMisses in library\
    \ cache during parse: 1\nOptimizer mode: ALL_ROWS\nParsing user id: 84     (recursive\
    \ depth: 1)\n\nRows     Row Source Operation\n-------  ---------------------------------------------------\n\
    \      1  NESTED LOOPS  (cr=6 pr=0 pw=0 time=0 us cost=3 size=32 card=1)\n   \
    \   1   NESTED LOOPS  (cr=4 pr=0 pw=0 time=0 us cost=2 size=29 card=1)\n     \
    \ 1    TABLE ACCESS BY INDEX ROWID USER$ (cr=2 pr=0 pw=0 time=0 us cost=1 size=26\
    \ card=1)\n      1     INDEX UNIQUE SCAN I_USER1 (cr=1 pr=0 pw=0 time=0 us cost=0\
    \ size=0 card=1)(object id 46)\n      1    TABLE ACCESS CLUSTER TS$ (cr=2 pr=0\
    \ pw=0 time=0 us cost=1 size=3 card=1)\n      1     INDEX UNIQUE SCAN I_TS# (cr=1\
    \ pr=0 pw=0 time=0 us cost=0 size=0 card=1)(object id 7)\n      1   TABLE ACCESS\
    \ CLUSTER TS$ (cr=2 pr=0 pw=0 time=0 us cost=1 size=3 card=1)\n      1    INDEX\
    \ UNIQUE SCAN I_TS# (cr=1 pr=0 pw=0 time=0 us cost=0 size=0 card=1)(object id\
    \ 7)\n\n********************************************************************************\n\
    ```\n\n正如你从 TKPROF 输出中所看到的，并没有执行额外的获取。因此，我只能想到少数几个理由，说明你为什么不想尽一切努力确保使用隐式游标而非显式游标。如“显式游标和批量处理”小节中所述，当需要对从数据库获取的数据执行\
    \ `FORALL` 批量处理时，你将需要使用显式游标。换句话说，如果你只是选择数据并使用 `htp.p` 在 APEX 中输出数据，或者使用 `utl_file.put_line`\
    \ 将所选数据发送到文件等，则无需使用显式游标进行批量处理。在这些情况下，Oracle RDBMS 在后台*已经*在进行批量处理了。\n\n只有当你将数据取出，在过程中进行处理，然后使用\
    \ `FORALL` 更新、插入和/或删除将其放回数据库时，你才需要显式游标处理。在同一小节中，REF 游标被简要说明为另一个使用显式游标的原因——如果你的需求是将数据传递给位于数据库之外但连接至数据库的客户端应用程序。接下来的两节将向你介绍可用的两种\
    \ REF 游标类型。\n\n"
- fmt: "### Static REF Cursors\n\nAs mentioned in the section “REF Cursors in Brief,”\
    \ if you are returning a result set to a client, REF cursors (also referred to\
    \ as *reference* cursors or *cursor variables*) are the best way to do so. A REF\
    \ cursor often depends on the input of the client to decide exactly which cursor\
    \ to open, and therefore, which result set to return. Given the quantity of unknowns\
    \ that can be present when returning data to a client, the ability to select (no\
    \ pun intended) the query to be run at runtime provides your program with a great\
    \ amount of flexibility. This ability also helps you to avoid writing repetitive\
    \ code. You see an example of a static REF cursor in section “REF Cursors in Brief.”\
    \ [Listing 10-9](#Chapter10.html#list_10_9) illustrates an expansion on this example\
    \ of a static REF cursor with package parameter specifications:\n\n**Listing 10-9.**\
    \ A Static REF Cursor Declared in a PL/SQL Package (11.2.0.1)\n\n```sql\nCREATE\
    \ OR REPLACE PACKAGE product_pkg\nAS\n   -- In Package Specification, declare\
    \ the cursor variable type\n   TYPE my_cv IS REF CURSOR;\n\n   PROCEDURE get_concepts\
    \ ( ip_input    IN  NUMBER,\n                            op_rc      OUT  my_cv);\n\
    \nEND product_pkg;\n\nCREATE OR REPLACE PACKAGE BODY product_pkg\nAS\n   -- In\
    \ Package Body procedure, declare the cursor variable using the type declared\
    \ in\n   -- the package specification\n\n   PROCEDURE get_concepts (ip_input \
    \   IN  NUMBER,\n                           op_rc      OUT  my_cv)\n   IS\n  \
    \ BEGIN\n      IF ( ip_input = 1 )\n      THEN\n         OPEN op_rc FOR\n    \
    \         SELECT * FROM prod_concepts\n              WHERE concept_type  = 'COLLATERAL'\n\
    \                AND concept_dt    < TO_DATE( '01-JAN-2003', 'DD-MON-YYYY');\n\
    \      ELSE\n         OPEN op_rc FOR\n             SELECT * FROM prod_concepts\n\
    \              WHERE concept_category = 'ADVERTISING';\n      END IF;\n   END\
    \ get_concepts;\n\nEND product_pkg;\n```\n\nThe package and package body in [Listing\
    \ 10-9](#Chapter10.html#list_10_9) illustrate code that makes use of a cursor\
    \ variable. The package specification declares a REF cursor type, as shown by\
    \ this line of code:\n\n```sql\nTYPE my_cv IS REF CURSOR;\n```\n\nNote that this\
    \ type of cursor variable is `weak-typed`. The `weak-typed` cursor variable provides\
    \ you with more flexibility as to the result set returned. However, because it\
    \ is not created as a specific type of record like the following\n\n```sql\nTYPE\
    \ my_cv IS REF CURSOR RETURN prod_concepts%ROWTYPE;\n```\n\nor\n\n```sql\nTYPE\
    \ ProdConTyp IS RECORD (\n     prod_id                  NUMBER,\n     con_id \
    \                  NUMBER,\n     req_id                   NUMBER,\n     concept_type\
    \       VARCHAR2(30),\n     concept_category   VARCHAR2(30),\n     concept_dt\
    \                DATE);\n     TYPE my_cv IS REF CURSOR RETURN ProdConTyp;\n```\n\
    \nit is more prone to error. If you find yourself having to use cursor variables,\
    \ it is better to create them `strong-typed` (as just shown), than `weak-typed`\
    \ whenever possible. The type declared in the package specification is then referenced\
    \ in the package body to declare the actual cursor variable, as illustrated with\
    \ the following line of code:\n\n```sql\nop_rc      OUT  my_cv)\n```\n\nFrom this\
    \ point forward, this cursor variable may be used and re-used for any result set\
    \ you would like, as evidenced by the following code that opens the REF cursor\
    \ and returns it as an out parameter in the procedure `get_concepts`:\n\n```sql\n\
    IF ( ip_input = 1 )\nTHEN\n   OPEN op_rc FOR\n             SELECT * FROM prod_concepts\n\
    \              WHERE concept_type = 'COLLATERAL'\n                AND concept_dt\
    \   < TO_DATE( '01-JAN-2003', 'DD-MON-YYYY');\nELSE\n          OPEN op_rc FOR\n\
    \             SELECT * FROM prod_concepts\n              WHERE concept_category\
    \ = 'ADVERTISING';\nEND IF;\n```\n\nNote that in this code, all columns from the\
    \ `PROD_CONCEPTS` table are returned dependent upon the `WHERE` clause that ultimately\
    \ is executed. In this case, it would be better to `strong-type` the cursor variable\
    \ used to return either of these result sets since they both contain the same\
    \ column list. However, for purposes of illustration, if a third outcome were\
    \ possible, expanding the `IF` statement as follows\n\n```sql\nELSIF ( ip_input\
    \ = 2 )\nTHEN\n   OPEN op_rc FOR\n             SELECT prod_name FROM products\
    \ p, prod_concepts pc\n              WHERE p.prod_id    = pc.prod_id\n       \
    \         AND concept_type = 'COLLATERAL'\n                AND concept_dt   <\
    \ TO_DATE( '01-JAN-2003', 'DD-MON-YYYY');\n```\n\nthis result set would be completely\
    \ different from either of the others. In this particular instance, all things\
    \ being equal, a `weak-typed` cursor variable such as the example shows would\
    \ be the only type of cursor variable that would work for this scenario. In other\
    \ words, because the example’s chosen type of cursor variable can accept virtually\
    \ any type of result set, it will likely succeed.\n\nHowever, because its structure\
    \ is not known to the compiler at compile time, if a failure were to occur regarding\
    \ this REF cursor, it would occur at runtime. You always take a risk when you\
    \ sidestep possible compiler errors and allow them to occur (if they are going\
    \ to occur) at runtime because such errors affect your users. Remember, just because\
    \ you *can* use a particular type of cursor, doesn’t mean it is your best choice.\
    \ Your goal is to write PL/SQL as efficiently as possible. If you are using a\
    \ REF cursor, it is assumed that either\n\n*   You are passing a result set to\
    \ a client, and/or\n*   You don’t know until runtime what the query will be, and/or\n\
    *   There is no method available to you in achieving your goal using implicit\
    \ cursors.\n\nThere are several items to keep in mind when using REF cursors.\
    \ REF cursors are owned by whomever (whether a client program or a PL/SQL program)\
    \ is processing/fetching their records at a current point in time. Because a REF\
    \ cursor is a pointer to a cursor and can, in fact, be pointed to many different\
    \ cursors, it is not cached in PL/SQL. Statement caching is extremely important\
    \ in reducing overall parse calls and, therefore, increasing application scalability.\
    \ Repeated parsing of the same SQL lowers your scalability and increases the amount\
    \ of work you do. By using non-REF cursors in PL/SQL, you decrease your parsing\
    \ greatly. More regarding the PL/SQL cursor cache is discussed in the section\
    \ “A Few Words About Parsing.”\n\nThere is a caveat to this in that you can limit\
    \ the amount of soft parsing work (or rather, the amount of work soft parsing\
    \ performs, since you cannot limit soft parsing) that will inevitably take place\
    \ by setting your initialization file’s value for the `session_cached_cursors`\
    \ parameter appropriately. With REF cursors, PL/SQL doesn’t know what the cursor\
    \ will be until a request is made for it and the associated code is run. Therefore,\
    \ since the overhead is slightly higher in using REF cursors, it’s a good idea\
    \ to see if you can accomplish what you’d like to do by using regular cursors\
    \ first.\n\nWhy are all of these points important? Because there are a slew of\
    \ restrictions on using cursor variables. If you think you’ve chosen the easy\
    \ way to accomplish your goal by using REF cursors instead of using non-REF cursors,\
    \ you’ve actually chosen a method that will be much harder to manage long-term."
  raw: '### Static REF Cursors


    As mentioned in the section “REF Cursors in Brief,” if you are returning a result
    set to a client, REF cursors (also referred to as *reference* cursors or *cursor
    variables*) are the best way to do so. A REF cursor often depends on the input
    of the client to decide exactly which cursor to open, and therefore, which result
    set to return. Given the quantity of unknowns that can be present when returning
    data to a client, the ability to select (no pun intended) the query to be run
    at runtime provides your program with a great amount of flexibility. This ability
    also helps you to avoid writing repetitive code. You see an example of a static
    REF cursor in section “REF Cursors in Brief.” [Listing 10-9](#Chapter10.html#list_10_9)
    illustrates an expansion on this example of a static REF cursor with package parameter
    specifications:


    ***Listing 10-9.** A Static REF Cursor Declared in a PL/SQL Package (11.2.0.1)*


    `CREATE OR REPLACE PACKAGE product_pkg`

    `AS`

    `-- In Package Specification, declare the cursor variable type`

    `TYPE my_cv IS REF CURSOR;`


    `PROCEDURE get_concepts ( ip_input    IN  NUMBER,`

    `                         op_rc      OUT  my_cv);`


    `END product_pkg;`


    `CREATE OR REPLACE PACKAGE BODY product_pkg`

    `AS`

    `-- In Package Body procedure, declare the cursor variable using the type declared
    in` ![images](images/U003.jpg)

    ` the package specification`


    `PROCEDURE get_concepts (ip_input    IN  NUMBER,`

    `                        op_rc      OUT  my_cv)`

    `IS`

    `    BEGIN`

    `       IF ( ip_input = 1 )`

    `       THEN`

    `          OPEN op_rc FOR`

    `             SELECT * FROM prod_concepts`

    `              WHERE concept_type  = ''COLLATERAL''`

    `                AND concept_dt    < TO_DATE( ''01-JAN-2003'', ''DD-MON-YYYY'');`

    `       ELSE`

    `          OPEN op_rc FOR`

    `             SELECT * FROM prod_concepts`

    `              WHERE concept_category = ''ADVERTISING'';`

    `       END IF;`

    `    END get_concepts;`


    `END product_pkg;`


    The package and package body in [Listing 10-9](#Chapter10.html#list_10_9) illustrate
    code that makes use of a cursor variable. The package specification declares a
    REF cursor type, as shown by this line of code:


    `TYPE my_cv IS REF CURSOR;`


    Note that this type of cursor variable is *weak-typed*. The weak-typed cursor
    variable provides you with more flexibility as to the result set returned. However,
    because it is not created as a specific type of record like the following


    `TYPE my_cv IS REF CURSOR RETURN prod_concepts%ROWTYPE;`


    or


    `TYPE ProdConTyp IS RECORD (`

    `     prod_id                  NUMBER,`

    `     con_id                   NUMBER,`

    `     req_id                   NUMBER,`

    `     concept_type       VARCHAR2(30),`

    `     concept_category   VARCHAR2(30),`

    `     concept_dt                DATE);`

    `     TYPE my_cv IS REF CURSOR RETURN ProdConTyp;`


    it is more prone to error. If you find yourself having to use cursor variables,
    it is better to create them *strong-typed* (as just shown), than weak-typed whenever
    possible. The type declared in the package specification is then referenced in
    the package body to declare the actual cursor variable, as illustrated with the
    following line of code:


    `op_rc      OUT  my_cv)`


    From this point forward, this cursor variable may be used and re-used for any
    result set you would like, as evidenced by the following code that opens the REF
    cursor and returns it as an out parameter in the procedure `get_concepts`:


    `IF ( ip_input = 1 )`

    `THEN`

    `   OPEN op_rc FOR`

    `             SELECT * FROM prod_concepts`

    `              WHERE concept_type = ''COLLATERAL''`

    `                AND concept_dt   < TO_DATE( ''01-JAN-2003'', ''DD-MON-YYYY'');`

    ` ELSE`

    `          OPEN op_rc FOR`

    `             SELECT * FROM prod_concepts`

    `              WHERE concept_category = ''ADVERTISING'';`

    `END IF;`


    Note that in this code, all columns from the PROD_CONCEPTS table are returned
    dependent upon the `WHERE` clause that ultimately is executed. In this case, it
    would be better to strong-type the cursor variable used to return either of these
    result sets since they both contain the same column list. However, for purposes
    of illustration, if a third outcome were possible, expanding the IF statement
    as follows


    `ELSIF ( ip_input = 2 )`

    `THEN`

    `   OPEN op_rc FOR`

    `             SELECT prod_name FROM products p, prod_concepts pc`

    `              WHERE p.prod_id    = pc.prod_id`

    `                AND concept_type = ''COLLATERAL''`

    `                AND concept_dt   < TO_DATE( ''01-JAN-2003'', ''DD-MON-YYYY'');`


    this result set would be completely different from either of the others. In this
    particular instance, all things being equal, a weak-typed cursor variable such
    as the example shows would be the only type of cursor variable that would work
    for this scenario. In other words, because the example’s chosen type of cursor
    variable can accept virtually any type of result set, it will likely succeed.


    However, because its structure is not known to the compiler at compile time, if
    a failure were to occur regarding this REF cursor, it would occur at runtime.
    You always take a risk when you sidestep possible compiler errors and allow them
    to occur (if they are going to occur) at runtime because such errors affect your
    users. Remember, just because you *can* use a particular type of cursor, doesn’t
    mean it is your best choice. Your goal is to write PL/SQL as efficiently as possible.
    If you are using a REF cursor, it is assumed that either


    *   You are passing a result set to a client, and/or

    *   You don’t know until runtime what the query will be, and/or

    *   There is no method available to you in achieving your goal using implicit
    cursors.


    There are several items to keep in mind when using REF cursors. REF cursors are
    owned by whomever (whether a client program or a PL/SQL program) is processing/fetching
    their records at a current point in time. Because a REF cursor is a pointer to
    a cursor and can, in fact, be pointed to many different cursors, it is not cached
    in PL/SQL. Statement caching is extremely important in reducing overall parse
    calls and, therefore, increasing application scalability. Repeated parsing of
    the same SQL lowers your scalability and increases the amount of work you do.
    By using non-REF cursors in PL/SQL, you decrease your parsing greatly. More regarding
    the PL/SQL cursor cache is discussed in the section “A Few Words About Parsing.”


    There is a caveat to this in that you can limit the amount of soft parsing work
    (or rather, the amount of work soft parsing performs, since you cannot limit soft
    parsing) that will inevitably take place by setting your initialization file’s
    value for the `session_cached_cursors` parameter appropriately. With REF cursors,
    PL/SQL doesn’t know what the cursor will be until a request is made for it and
    the associated code is run. Therefore, since the overhead is slightly higher in
    using REF cursors, it’s a good idea to see if you can accomplish what you’d like
    to do by using regular cursors first.


    Why are all of these points important? Because there are a slew of restrictions
    on using cursor variables. If you think you’ve chosen the easy way to accomplish
    your goal by using REF cursors instead of using non-REF cursors, you’ve actually
    chosen a method that will be much harder to manage long-term.'
  trans: "### 静态 REF 游标\n\n正如“REF 游标简介”一节所述，如果你需要将结果集返回给客户端，REF 游标（也称为 *reference*\
    \ 游标或*游标变量*）是实现这一目标的最佳方式。REF 游标通常依赖于客户端的输入来决定具体打开哪个游标，从而决定返回哪个结果集。鉴于向客户端返回数据时可能存在的未知因素，能够在运行时选择（此处无意双关）要执行的查询，为你的程序提供了极大的灵活性。这种能力也有助于你避免编写重复代码。你已在“REF\
    \ 游标简介”一节中看到了一个静态 REF 游标的例子。清单 10-9 在此静态 REF 游标示例的基础上进行了扩展，加入了包参数规范：\n\n**清单 10-9.**\
    \ 在 PL/SQL 包中声明的静态 REF 游标 (11.2.0.1)\n\n```sql\nCREATE OR REPLACE PACKAGE product_pkg\n\
    AS\n   -- 在包规范中，声明游标变量类型\n   TYPE my_cv IS REF CURSOR;\n\n   PROCEDURE get_concepts\
    \ ( ip_input    IN  NUMBER,\n                            op_rc      OUT  my_cv);\n\
    \nEND product_pkg;\n\nCREATE OR REPLACE PACKAGE BODY product_pkg\nAS\n   -- 在包体的存储过程中，使用包规范中声明的类型来声明游标变量\n\
    \n   PROCEDURE get_concepts (ip_input    IN  NUMBER,\n                       \
    \    op_rc      OUT  my_cv)\n   IS\n   BEGIN\n      IF ( ip_input = 1 )\n    \
    \  THEN\n         OPEN op_rc FOR\n             SELECT * FROM prod_concepts\n \
    \             WHERE concept_type  = 'COLLATERAL'\n                AND concept_dt\
    \    < TO_DATE( '01-JAN-2003', 'DD-MON-YYYY');\n      ELSE\n         OPEN op_rc\
    \ FOR\n             SELECT * FROM prod_concepts\n              WHERE concept_category\
    \ = 'ADVERTISING';\n      END IF;\n   END get_concepts;\n\nEND product_pkg;\n\
    ```\n\n清单 10-9 中的包和包体展示了使用游标变量的代码。包规范声明了一个 REF 游标类型，如这行代码所示：\n\n```sql\nTYPE my_cv\
    \ IS REF CURSOR;\n```\n\n请注意，这种游标变量是 `弱类型` 的。`弱类型` 游标变量在返回结果集方面为你提供了更大的灵活性。然而，因为它不像下面这样被创建为特定类型的记录\n\
    \n```sql\nTYPE my_cv IS REF CURSOR RETURN prod_concepts%ROWTYPE;\n```\n\n或\n\n\
    ```sql\nTYPE ProdConTyp IS RECORD (\n     prod_id                  NUMBER,\n \
    \    con_id                   NUMBER,\n     req_id                   NUMBER,\n\
    \     concept_type       VARCHAR2(30),\n     concept_category   VARCHAR2(30),\n\
    \     concept_dt                DATE);\n     TYPE my_cv IS REF CURSOR RETURN ProdConTyp;\n\
    ```\n\n所以它更容易出错。如果你发现自己不得不使用游标变量，应尽可能创建 `强类型` 的（如上所示），而不是 `弱类型` 的。包规范中声明的类型随后在包体中被引用，以声明实际的游标变量，如下列代码所示：\n\
    \n```sql\nop_rc      OUT  my_cv)\n```\n\n从这一点开始，这个游标变量可以用于并重复用于任何你想要的结果集，如下面的代码所示，该代码打开\
    \ REF 游标并将其作为存储过程 `get_concepts` 中的输出参数返回：\n\n```sql\nIF ( ip_input = 1 )\nTHEN\n\
    \   OPEN op_rc FOR\n             SELECT * FROM prod_concepts\n              WHERE\
    \ concept_type = 'COLLATERAL'\n                AND concept_dt   < TO_DATE( '01-JAN-2003',\
    \ 'DD-MON-YYYY');\nELSE\n          OPEN op_rc FOR\n             SELECT * FROM\
    \ prod_concepts\n              WHERE concept_category = 'ADVERTISING';\nEND IF;\n\
    ```\n\n请注意，在此代码中，从 `PROD_CONCEPTS` 表返回的所有列取决于最终执行的 `WHERE` 子句。在这种情况下，最好对用于返回这两个结果集的游标变量进行\
    \ `强类型化`，因为它们包含相同的列列表。然而，为了说明目的，如果可能存在第三种结果，如下扩展 `IF` 语句\n\n```sql\nELSIF ( ip_input\
    \ = 2 )\nTHEN\n   OPEN op_rc FOR\n             SELECT prod_name FROM products\
    \ p, prod_concepts pc\n              WHERE p.prod_id    = pc.prod_id\n       \
    \         AND concept_type = 'COLLATERAL'\n                AND concept_dt   <\
    \ TO_DATE( '01-JAN-2003', 'DD-MON-YYYY');\n```\n\n那么这个结果集将与其他两个完全不同。在这个特定情况下，在所有条件相同的情况下，如示例所示的\
    \ `弱类型` 游标变量将是唯一适用于此场景的游标变量类型。换句话说，因为示例中选择的游标变量类型几乎可以接受任何类型的结果集，所以它很可能会成功。\n\n\
    但是，因为其结构在编译时对编译器是未知的，所以如果与此 REF 游标相关的故障发生，那将是在运行时。当你规避可能的编译器错误并允许它们（如果它们会发生的话）在运行时发生时，你总是要承担风险，因为这样的错误会影响你的用户。请记住，仅仅因为你*可以*使用某种特定类型的游标，并不意味着它是你最佳的选择。你的目标是尽可能高效地编写\
    \ PL/SQL。如果你正在使用 REF 游标，则假定你符合以下条件之一：\n\n*   你正在将结果集传递给客户端，并且/或者\n*   你直到运行时才知道查询会是什么，并且/或者\n\
    *   没有其他方法可用于实现你的目标，只能使用隐式游标。\n\n使用 REF 游标时，有几点需要牢记。REF 游标属于在当前时间点处理/获取其记录的任何一方（无论是客户端程序还是\
    \ PL/SQL 程序）。因为 REF 游标是指向游标的指针，并且实际上可以指向许多不同的游标，所以它不会被缓存在 PL/SQL 中。语句缓存对于减少总的解析调用次数并因此提高应用程序可扩展性至关重要。重复解析相同的\
    \ SQL 会降低你的可扩展性并增加你的工作量。通过在 PL/SQL 中使用非 REF 游标，你可以大大减少解析。关于 PL/SQL 游标缓存的更多讨论见“关于解析的几句话”一节。\n\
    \n这里有一个注意事项：你可以通过适当设置初始化文件中 `session_cached_cursors` 参数的值来限制必然会发生的软解析工作量（或者更准确地说，是限制软解析执行的工作量，因为你无法限制软解析）。对于\
    \ REF 游标，PL/SQL 在发出请求并运行相关代码之前，不会知道游标将是什么。因此，由于使用 REF 游标的开销稍高，最好先看看是否可以通过使用常规游标来实现你的目标。\n\
    \n为什么这些要点很重要？因为使用游标变量有大量限制。如果你认为通过使用 REF 游标而不是非 REF 游标来达成目标是选择了简单的方法，那么实际上你选择了一个长期管理起来会困难得多的方法。"
- fmt: "# Cursor Variable Restrictions Laundry List\n\nConsider these very important\
    \ points regarding cursor variables:\n\n*   You can’t declare cursor variables\
    \ in a package (specification or body, that is). They may only be declared in\
    \ a procedure or function.\n*   You can’t pass cursor variables back and forth\
    \ over a database link. If you pass a host cursor variable to PL/SQL, you can’t\
    \ fetch from it on the server side unless you also open it within the same server\
    \ call.\n*   Cursors and cursor variables are not interoperable. You can’t use\
    \ one where the other is expected.\n*   You can’t use comparison operators to\
    \ test cursor variables for equality, inequality, or nullity.\n*   You can’t use\
    \ a `REF CURSOR` type to specify the element type of a collection. Therefore,\
    \ collection elements can’t store the values of cursor variables. This may be\
    \ something to consider, especially if you are planning on using `REF` cursors\
    \ to aid in bulk processing, for example.\n*   By the same token, you can’t use\
    \ `REF CURSOR` types to specify column types in a `CREATE TABLE` or `CREATE VIEW`\
    \ statement. In other words, database columns can’t store the values of cursor\
    \ variables.\n*   You can’t assign null values to a cursor variable.\n\nThis is\
    \ a lot to think about. Given all of these restrictions on using cursor variables,\
    \ your choice to use them, therefore, must be well considered. However, using\
    \ cursor variables is definitely preferable to putting all of your database access\
    \ logic directly into the application. So, if you choose to use cursor variables,\
    \ it’s important to not only have an idea about how you’d structure your PL/SQL\
    \ code portion, but additionally, how you’d structure your Java code portion.\n\
    \n# Your Client and REF Cursors\n\nRemember that the client `owns` the `REF` cursor\
    \ once it is returned to them. Your PL/SQL program opens the `REF` cursor, sometimes\
    \ based on input it receives from the client, and then returns the result set\
    \ it opens to the client. [Listing 10-10](#Chapter10.html#list_10_10) provides\
    \ a brief example of a Java program used to accept the result set received from\
    \ the PL/SQL program outlined in [Listing 10-9](#Chapter10.html#list_10_9).\n\n\
    ## Listing 10-10. A Java Program Used for REF Cursor Processing (11.2.0.1)\n\n\
    ```java\nimport java.sql.*;\nimport java.io.*;\nimport oracle.jdbc.driver.*;\n\
    class ProdConRefCursor\n{\npublic static void main (String args [ ])\nthrows SQLException,\
    \ ClassNotFoundException\n{\n   String query  = \"BEGIN \" + \"product_pkg.get_concepts(\
    \ ?, ?); \" + \"end;\";\n   DriverManager.registerDriver\n        (new oracle.jdbc.driver.OracleDriver());\n\
    \   Connection conn =\n       DriverManager.getConnection\n       (\"jdbc:oracle:thin:@proximo-dev:1521:mozartora112dev\"\
    , \"mktg\", \"mktg\");\n   Statement trace = conn.createStatement();\n   CallableStatement\
    \  cstmt = conn.prepareCall(query);\n   cstmt.setInt(1, 37);\n   cstmt.registerOutParameter(2\
    \ ,OracleTypes.CURSOR);\n   cstmt.execute();\n   ResultSet rset = (ResultSet)cstmt.getObject(2);\n\
    \   for(int i = 0;  rset.next(); i++ )\n        System.out.println( \"rset \"\
    \ + rset.getString(1) );\n   rset.close();\n}\n}\n```\n\nThis is a rather simplistic,\
    \ yet straightforward example of a client accepting the result set returned by\
    \ a `REF` cursor. The salient parts of this are the following code snippets:\n\
    \n`cstmt.registerOutParameter(2 ,OracleTypes.CURSOR);`\n`cstmt.execute();`\n`ResultSet\
    \ rset = (ResultSet)cstmt.getObject(2);`\n\nYour return type is a cursor of `OracleTypes`.\
    \ Once you receive the cursor, you iterate over each record until there are no\
    \ more records to process on the client side, like so:\n\n`for(int i = 0;  rset.next();\
    \ i++ )`\n`        System.out.println( \"rset \" + rset.getString(1) );`\n\nFinally,\
    \ it is the job of the client to close the `REF` cursor. It cannot pass the `REF`\
    \ cursor back to your PL/SQL program. Therefore, once it is done processing the\
    \ records returned by your `REF` cursor, it simply closes the cursor with the\
    \ following statement:\n\n`rset.close();`\n\n# A Few Words about Parsing\n\nThough\
    \ this may sound like a bit of an aside, parsing is something to be kept high\
    \ on your list of priorities when choosing which cursor will suit you best for\
    \ each type of programmatic situation. As mentioned earlier, `REF` cursors, even\
    \ the static type, generally perform a soft parse each time they are opened (see\
    \ the caveat regarding setting a value in `session_cached_cursors` mentioned earlier).\
    \ Though a soft parse is infinitely better than a hard parse, it is `much` worse\
    \ than no parse at all. Your goal when writing any kind of SQL or PL/SQL is to\
    \ reduce parsing whenever and wherever possible. So what can you do to reduce\
    \ parsing?\n\nIf you are using PL/SQL implicit cursors or explicit (non-`REF`)\
    \ cursors and you are not using literal values for your predicates, you are using\
    \ bind variables. This means that, by default, you have opened up the opportunity\
    \ to reduce parsing since you have reduced the number of unique SQL statements.\
    \ Your cursor queries will parse the first time they are accessed and remain in\
    \ the shared pool to be reused by multiple accesses until they are aged out. This\
    \ is a huge savings for the runtime and scalability of your application. Your\
    \ cursor queries will not be seen as individual, new cursors to be parsed, executed,\
    \ closed, and reopened (wash, rinse, repeat) over and over again.\n\nIn addition\
    \ to being cached in the shared pool, PL/SQL itself can “cache” these queries.\
    \ It will cache them in an `open` state. This means they can be executed later\
    \ again without having to even open (parse) them. So, not only will you have excellent\
    \ shared SQL in the shared pool, but you’ll also eliminate all but one parse call\
    \ per SQL statement in your session. That is one of the best reasons to use non-`REF`\
    \ cursors. PL/SQL does not close them, it keeps them open and avoids the parse\
    \ altogether.\n\n`REF` cursors, on the other hand, always perform a soft parse.\
    \ On the one hand, they provide you with great coding flexibility, particularly\
    \ if you are required to pass a result set back to a client, which many database\
    \ applications are required to do. On the other hand, that flexibility comes with\
    \ the tradeoff of possible reduced scalability and excessive soft parses. And\
    \ with excessive soft parsing comes possible latch contention. So if you can’t\
    \ write static implicit cursors and you must write `REF` cursors, what can you\
    \ do to work towards reducing the effects of inevitable soft parsing?\n\nConsider\
    \ setting an appropriate value for your `session_cached_cursors` initialization\
    \ file parameter. Your goal is to reduce the effects (latching) of excessive soft\
    \ parses. Caching cursors system-wide is generally a very good thing because it\
    \ will reduce the effects of too much latching and help your application to avoid\
    \ latch contention. Using `session_cached_cursors` helps you to make a soft parse\
    \ softer. It makes soft parsing `easier`, so it is, therefore, a good setting\
    \ to have in place when your applications use `REF` cursors. When you close a\
    \ cursor in PL/SQL, implicitly or explicitly, PL/SQL does not close the cursor.\
    \ It caches it open. And the size of the PL/SQL cache is controlled by the value\
    \ supplied for the `session_cached_cursors` parameter.\n\nStatic SQL using non-`REF`\
    \ cursors in PL/SQL is what helps to reduce parsing, due to the PL/SQL cursor\
    \ cache. More than one parse will take place when the application parses the query\
    \ more than once. The parses might be hard or soft. For example, say you have\
    \ a script similar to the following:\n\n`ALTER SESSION SET SQL_TRACE = true;`\n\
    \n```sql\nBEGIN\n    FOR i IN 1 .. 2000 LOOP\n        FOR x IN ( SELECT /*+ implicit\
    \ cursor query goes here */ * FROM dual )\n        LOOP\n            NULL;\n \
    \       END LOOP;\n    END LOOP;\nEND;\n/\n```\n\n```sql\nDECLARE\n    TYPE rc_type\
    \ IS REF CURSOR;\n    rc rc_type;\nBEGIN\n    FOR i IN 1 .. 2000 LOOP\n      \
    \  OPEN rc FOR SELECT /*+ REF cursor query goes here */ * FROM dual;\n       \
    \ CLOSE rc;\n    END LOOP;\nEND;\n/\n```"
  raw: '#### Cursor Variable Restrictions Laundry List


    Consider these very important points regarding cursor variables:


    *   You can’t declare cursor variables in a package (specification or body, that
    is). They may only be declared in a procedure or function.

    *   You can’t pass cursor variables back and forth over a database link. If you
    pass a host cursor variable to PL/SQL, you can’t fetch from it on the server side
    unless you also open it within the same server call.

    *   Cursors and cursor variables are not interoperable. You can’t use one where
    the other is expected.

    *   You can’t use comparison operators to test cursor variables for equality,
    inequality, or nullity.

    *   You can’t use a REF CURSOR type to specify the element type of a collection.
    Therefore, collection elements can’t store the values of cursor variables. This
    may be something to consider, especially if you are planning on using REF cursors
    to aid in bulk processing, for example.

    *   By the same token, you can’t use REF CURSOR types to specify column types
    in a CREATE TABLE or CREATE VIEW statement. In other words, database columns can’t
    store the values of cursor variables.

    *   You can’t assign null values to a cursor variable.


    This is a lot to think about. Given all of these restrictions on using cursor
    variables, your choice to use them, therefore, must be well considered. However,
    using cursor variables is definitely preferable to putting all of your database
    access logic directly into the application. So, if you choose to use cursor variables,
    it’s important to not only have an idea about how you’d structure your PL/SQL
    code portion, but additionally, how you’d structure your Java code portion.


    #### Your Client and REF Cursors


    Remember that the client *owns* the REF cursor once it is returned to them. Your
    PL/SQL program opens the REF cursor, sometimes based on input it receives from
    the client, and then returns the result set it opens to the client. [Listing 10-10](#Chapter10.html#list_10_10)
    provides a brief example of a Java program used to accept the result set received
    from the PL/SQL program outlined in [Listing 10-9](#Chapter10.html#list_10_9).


    ***Listing 10-10.** A Java Program Used for REF Cursor Processing (11.2.0.1)*


    `import java.sql.*;`

    `import java.io.*;`

    `import oracle.jdbc.driver.*;`

    `class ProdConRefCursor`

    `{`

    `public static void main (String args [ ])`

    `throws SQLException, ClassNotFoundException`

    `{`

    `   String query  = "BEGIN " + "product_pkg.get_concepts( ?, ?); " + "end;";`

    `   DriverManager.registerDriver`

    `        (new oracle.jdbc.driver.OracleDriver());`

    `   Connection conn =`

    `       DriverManager.getConnection`

    `       ("jdbc:oracle:thin:@proximo-dev:1521:mozartora112dev", "mktg", "mktg");`

    `   Statement trace = conn.createStatement();`

    `   CallableStatement  cstmt = conn.prepareCall(query);`

    `   cstmt.setInt(1, 37);`

    `   cstmt.registerOutParameter(2 ,OracleTypes.CURSOR);`

    `   cstmt.execute();`

    `   ResultSet rset = (ResultSet)cstmt.getObject(2);`

    `   for(int i = 0;  rset.next(); i++ )`

    `        System.out.println( "rset " + rset.getString(1) );`

    `   rset.close();`

    `}`

    `}`


    This is a rather simplistic, yet straightforward example of a client accepting
    the result set returned by a REF cursor. The salient parts of this are the following
    code snippets:


    `cstmt.registerOutParameter(2 ,OracleTypes.CURSOR);`

    `cstmt.execute();`

    `ResultSet rset = (ResultSet)cstmt.getObject(2);`


    Your return type is a cursor of OracleTypes. Once you receive the cursor, you
    iterate over each record until there are no more records to process on the client
    side, like so:


    `for(int i = 0;  rset.next(); i++ )`

    `        System.out.println( "rset " + rset.getString(1) );`


    Finally, it is the job of the client to close the REF cursor. It cannot pass the
    REF cursor back to your PL/SQL program. Therefore, once it is done processing
    the records returned by your REF cursor, it simply closes the cursor with the
    following statement:


    `rset.close();`


    #### A Few Words about Parsing


    Though this may sound like a bit of an aside, parsing is something to be kept
    high on your list of priorities when choosing which cursor will suit you best
    for each type of programmatic situation. As mentioned earlier, REF cursors, even
    the static type, generally perform a soft parse each time they are opened (see
    the caveat regarding setting a value in `session_cached_cursors` mentioned earlier).
    Though a soft parse is infinitely better than a hard parse, it is *much* worse
    than no parse at all. Your goal when writing any kind of SQL or PL/SQL is to reduce
    parsing whenever and wherever possible. So what can you do to reduce parsing?


    If you are using PL/SQL implicit cursors or explicit (non-REF) cursors and you
    are not using literal values for your predicates, you are using bind variables.
    This means that, by default, you have opened up the opportunity to reduce parsing
    since you have reduced the number of unique SQL statements. Your cursor queries
    will parse the first time they are accessed and remain in the shared pool to be
    reused by multiple accesses until they are aged out. This is a huge savings for
    the runtime and scalability of your application. Your cursor queries will not
    be seen as individual, new cursors to be parsed, executed, closed, and reopened
    (wash, rinse, repeat) over and over again.


    In addition to being cached in the shared pool, PL/SQL itself can “cache” these
    queries. It will cache them in an *open* state. This means they can be executed
    later again without having to even open (parse) them. So, not only will you have
    excellent shared SQL in the shared pool, but you’ll also eliminate all but one
    parse call per SQL statement in your session. That is one of the best reasons
    to use non-REF cursors. PL/SQL does not close them, it keeps them open and avoids
    the parse altogether.


    REF cursors, on the other hand, always perform a soft parse. On the one hand,
    they provide you with great coding flexibility, particularly if you are required
    to pass a result set back to a client, which many database applications are required
    to do. On the other hand, that flexibility comes with the tradeoff of possible
    reduced scalability and excessive soft parses. And with excessive soft parsing
    comes possible latch contention. So if you can’t write static implicit cursors
    and you must write REF cursors, what can you do to work towards reducing the effects
    of inevitable soft parsing?


    Consider setting an appropriate value for your `session_cached_cursors` initialization
    file parameter. Your goal is to reduce the effects (latching) of excessive soft
    parses. Caching cursors system-wide is generally a very good thing because it
    will reduce the effects of too much latching and help your application to avoid
    latch contention. Using `session_cached_cursors` helps you to make a soft parse
    softer. It makes soft parsing *easier*, so it is, therefore, a good setting to
    have in place when your applications use REF cursors. When you close a cursor
    in PL/SQL, implicitly or explicitly, PL/SQL does not close the cursor. It caches
    it open. And the size of the PL/SQL cache is controlled by the value supplied
    for the `session_cached_cursors` parameter.


    Static SQL using non-REF cursors in PL/SQL is what helps to reduce parsing, due
    to the PL/SQL cursor cache. More than one parse will take place when the application
    parses the query more than once. The parses might be hard or soft. For example,
    say you have a script similar to the following:


    `ALTER SESSION SET SQL_TRACE = true;`


    `BEGIN`

    `    FOR i IN 1 .. 2000 LOOP`

    `        FOR x IN ( SELECT /*+ implicit cursor query goes here */ * FROM dual
    )`

    `        LOOP`

    `            NULL;`

    `        END LOOP;`

    `    END LOOP;`

    `END;`

    `/`


    `DECLARE`

    `    TYPE rc_type IS REF CURSOR;`

    `    rc rc_type;`

    `BEGIN`

    `    FOR i IN 1 .. 2000 LOOP`

    `        OPEN rc FOR SELECT /*+ REF cursor query goes here */ * FROM dual;`

    `        CLOSE rc;`

    `    END LOOP;`

    `END;`

    `/`'
  trans: "# 游标变量限制清单\n\n关于游标变量，请务必考虑以下关键点：\n\n*   不能在包（无论是规范还是主体）中声明游标变量。它们只能在过程或函数中声明。\n\
    *   不能通过数据库链接来回传递游标变量。如果您将宿主游标变量传递给 PL/SQL，则无法在服务器端从中提取数据，除非您在同一服务器调用中也打开它。\n\
    *   游标和游标变量不兼容。不能在预期使用一种游标的地方使用另一种。\n*   不能使用比较运算符来测试游标变量是否相等、不等或为空。\n*   不能使用\
    \ `REF CURSOR` 类型来指定集合的元素类型。因此，集合元素无法存储游标变量的值。在计划使用 `REF` 游标辅助批量处理等场景时，这一点尤其需要考虑。\n\
    *   同样，不能在 `CREATE TABLE` 或 `CREATE VIEW` 语句中使用 `REF CURSOR` 类型来指定列类型。换言之，数据库列无法存储游标变量的值。\n\
    *   不能将 null 值赋给游标变量。\n\n需要考虑的限制确实很多。鉴于使用游标变量存在所有这些限制，因此在选择使用它们时必须经过深思熟虑。然而，使用游标变量绝对比将所有数据库访问逻辑直接放入应用程序中要好。因此，如果选择使用游标变量，重要的是不仅要考虑如何构建\
    \ PL/SQL 代码部分，还要考虑如何构建 Java 代码部分。\n\n# 客户端与 REF 游标\n\n请记住，一旦 `REF` 游标被返回给客户端，客户端便\
    \ `拥有` 了它。您的 PL/SQL 程序打开 `REF` 游标（有时基于从客户端接收的输入），然后将打开的结果集返回给客户端。清单 10-10 提供了一个\
    \ Java 程序的简要示例，该程序用于接收清单 10-9 中概述的 PL/SQL 程序返回的结果集。\n\n## 清单 10-10. 用于处理 REF 游标的\
    \ Java 程序 (11.2.0.1)\n\n```java\nimport java.sql.*;\nimport java.io.*;\nimport\
    \ oracle.jdbc.driver.*;\nclass ProdConRefCursor\n{\npublic static void main (String\
    \ args [ ])\nthrows SQLException, ClassNotFoundException\n{\n   String query \
    \ = \"BEGIN \" + \"product_pkg.get_concepts( ?, ?); \" + \"end;\";\n   DriverManager.registerDriver\n\
    \        (new oracle.jdbc.driver.OracleDriver());\n   Connection conn =\n    \
    \   DriverManager.getConnection\n       (\"jdbc:oracle:thin:@proximo-dev:1521:mozartora112dev\"\
    , \"mktg\", \"mktg\");\n   Statement trace = conn.createStatement();\n   CallableStatement\
    \  cstmt = conn.prepareCall(query);\n   cstmt.setInt(1, 37);\n   cstmt.registerOutParameter(2\
    \ ,OracleTypes.CURSOR);\n   cstmt.execute();\n   ResultSet rset = (ResultSet)cstmt.getObject(2);\n\
    \   for(int i = 0;  rset.next(); i++ )\n        System.out.println( \"rset \"\
    \ + rset.getString(1) );\n   rset.close();\n}\n}\n```\n\n这是一个相当简单但直截了当的客户端接受 `REF`\
    \ 游标返回结果集的示例。其关键部分是以下代码片段：\n\n`cstmt.registerOutParameter(2 ,OracleTypes.CURSOR);`\n\
    `cstmt.execute();`\n`ResultSet rset = (ResultSet)cstmt.getObject(2);`\n\n您的返回类型是一个\
    \ `OracleTypes` 类型的游标。一旦收到游标，您就在客户端迭代每条记录，直到没有更多记录可供处理，如下所示：\n\n`for(int i = 0;\
    \  rset.next(); i++ )`\n`        System.out.println( \"rset \" + rset.getString(1)\
    \ );`\n\n最后，关闭 `REF` 游标是客户端的责任。它不能将 `REF` 游标传回给您的 PL/SQL 程序。因此，一旦它处理完 `REF` 游标返回的记录，只需使用以下语句关闭游标：\n\
    \n`rset.close();`\n\n# 关于解析的几点说明\n\n虽然这听起来可能有点题外话，但在为每种编程情况选择最适合的游标类型时，解析问题应始终是您优先考虑的重要事项。如前所述，`REF`\
    \ 游标（即使是静态类型）通常在每次打开时执行一次软解析（请参阅前面提到的关于设置 `session_cached_cursors` 值的注意事项）。尽管软解析无限优于硬解析，但它\
    \ `远` 比完全不解析要糟糕。编写任何类型的 SQL 或 PL/SQL 时，您的目标都是尽可能减少解析。那么，您可以做些什么来减少解析呢？\n\n如果您使用\
    \ PL/SQL 隐式游标或显式（非 `REF`）游标，并且没有对谓词使用字面值，那么您就是在使用绑定变量。这意味着，默认情况下，您已经开启了减少解析的机会，因为您减少了唯一\
    \ SQL 语句的数量。您的游标查询将在首次访问时解析，并保留在共享池中以供多次访问重用，直到它们被老化清除。这对应用程序的运行时性能和可扩展性是一个巨大的节省。您的游标查询不会被视作单个、新的游标而被反复解析、执行、关闭和重新打开（周而复始）。\n\
    \n除了在共享池中被缓存外，PL/SQL 本身也可以“缓存”这些查询。它会将这些查询以 `打开` 状态缓存。这意味着以后可以再次执行它们，甚至无需打开（解析）它们。因此，您不仅在共享池中拥有出色的共享\
    \ SQL，而且还会在会话中为每条 SQL 语句消除除一次解析调用之外的所有解析调用。这是使用非 `REF` 游标的最佳理由之一。PL/SQL 不会关闭它们，而是保持它们打开状态，从而完全避免了解析。\n\
    \n另一方面，`REF` 游标总是执行软解析。一方面，它们为您提供了极大的编码灵活性，特别是在需要将结果集传递回客户端时（许多数据库应用程序都需要这样做）。另一方面，这种灵活性是以可能降低可扩展性和过度软解析为代价的。而过度的软解析又可能带来门闩争用。因此，如果您无法编写静态隐式游标而必须编写\
    \ `REF` 游标，您可以做些什么来努力减轻不可避免的软解析所带来的影响呢？\n\n考虑为您的 `session_cached_cursors` 初始化文件参数设置一个合适的值。您的目标是减轻过度软解析的影响（门闩争用）。在系统范围内缓存游标通常是一件非常好的事情，因为它将减少过多门闩的影响，并帮助您的应用程序避免门闩争用。使用\
    \ `session_cached_cursors` 有助于让软解析变得更“软”。它使软解析 `更容易`，因此，当您的应用程序使用 `REF` 游标时，这是一个值得设置的好参数。当您在\
    \ PL/SQL 中隐式或显式关闭游标时，PL/SQL 并不会真正关闭游标。它会将游标以打开状态缓存。而 PL/SQL 缓存的大小由为 `session_cached_cursors`\
    \ 参数提供的值控制。\n\n在 PL/SQL 中使用非 `REF` 游标的静态 SQL 有助于减少解析，这要归功于 PL/SQL 游标缓存。当应用程序多次解析查询时，就会发生多次解析。这些解析可能是硬解析或软解析。例如，假设您有一个类似于以下内容的脚本：\n\
    \n`ALTER SESSION SET SQL_TRACE = true;`\n\n```sql\nBEGIN\n    FOR i IN 1 .. 2000\
    \ LOOP\n        FOR x IN ( SELECT /*+ 隐式游标查询在此 */ * FROM dual )\n        LOOP\n\
    \            NULL;\n        END LOOP;\n    END LOOP;\nEND;\n/\n```\n\n```sql\n\
    DECLARE\n    TYPE rc_type IS REF CURSOR;\n    rc rc_type;\nBEGIN\n    FOR i IN\
    \ 1 .. 2000 LOOP\n        OPEN rc FOR SELECT /*+ REF 游标查询在此 */ * FROM dual;\n\
    \        CLOSE rc;\n    END LOOP;\nEND;\n/\n```"
