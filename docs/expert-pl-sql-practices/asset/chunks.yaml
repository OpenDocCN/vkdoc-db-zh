  trans: '

    ### 数据库与敏捷开发


    迭代开发并非新概念：已有大量书籍和专家探讨软件开发与迭代设计。但涉及数据库时，关于如何管理迭代数据库设计的有用信息却寥寥无几。与此同时，越来越多的应用数据库是在缺乏充分数据库设计的情况下创建的。无论是概念设计、逻辑设计还是物理设计，一个共同的主线是：在太多情况下，有意的设计规划是缺失的。这导致了一种极为常见的后果：数据库与应用未能达到预期性能。应用或许能通过功能测试要求，但一旦承受预期用户负载，其性能可能远不可接受。虽然让设计不佳的应用运行得更好是有可能的，但要构建一个能在并发用户不断增多、数据量持续增长的情况下依然满足性能预期的数据库，**必须**拥有一个设计精良的模式。你可以增加硬件资源来提升性能，但请思考一下：这些硬件资源中有多少仅仅是在弥补糟糕的设计？如果设计缺陷不存在，你本可以从硬件投资中获得多少额外收益？当模式存在缺陷时，应用代码所需的返工量会增加。这造成一个巨大的问题：数据库模式随时间推移被冻结，而应用功能却持续扩展。随着变更请求不断涌入，以及额外字段被强行添加到本已问题重重的模式设计中，性能问题变得越来越难以修复。


    这类问题的最终结果是，架构师和开发者们得出结论：解决方案是尽可能在数据库中少放功能。这或许可以理解：因为他们已将数据库变更视为痛苦之事，于是试图通过避开数据库来规避这种痛苦。他们甚至避免使用数据库执行其最擅长的任务，因为他们担心未来可能需要变更它。对"**数据库无关性**"的追求加剧了这一问题，导致
    DBMS 中一些最佳特性和功能未被使用。不幸且颇具讽刺意味的结果是：一个非常昂贵的 DBMS 闲置着，而团队却费力地尝试重新创建那些在现有许可下已经可用且已付费的功能。选择授权一个强大的产品，然后却像购买了最低公分母一样来设计应用，这是开发团队可能犯下的最昂贵错误之一。无论
    DBMS 是 Oracle、MySQL、Postgres 还是 SQL Server，都是如此。优秀的开发者很难得。为何要让他们花费时间去重新创建其他公司已构建、而你们公司已购买的功能？如果目标是构建一个有竞争力的产品，在最大化我们投资回报的同时满足客户需求，那么你应该充分利用你所购买的
    DBMS 平台中每一个有用的功能。


    至此，我列举了软件开发项目中相互矛盾的目标：你需要快速构建；你需要在掌握足够知识之前就开始推进；你需要设计以支持长期性能目标，而这些性能目标很可能也是未知的。如果你还没有产品，你如何知道将来会吸引多少用户？如果你创造出令人惊叹和创新的东西，你将在比预期短得多的时间内获得比你想象中更多的用户。然后，你热情的用户将迅速使系统过载，导致又一个关于最新软件产品遭遇公开失败的头版新闻。你需要在追求稳定性的同时，通过迭代设计过程鼓励变更。你希望系统透明且易于使用，使用户无需每次连接都重新学习步骤就能完成工作，但你必须认识到，你对用户工作的理解可能并不准确。考虑到项目可能无法应对这些挑战的所有潜在方式，软件项目究竟如何才能成功？有一件事你不能做，那就是让时光倒流到开发速度没那么快的时代。相反，你必须预期设计将会变更，并配备数据库管理员、数据库开发者和应用开发者，以管理当今的变更，同时持续关注这些变更将对系统整体产生的长期影响。


    ![images](img/square.jpg`) **注意** 在本章中，将提及*数据库开发*和*应用开发*。这两个标签都可能指同一应用的开发，且一个开发者可能负责这两个层面的开发。本章旨在区分访问和处理数据的代码，与构建工具向终端用户展示数据的代码，而非暗示需要一个额外的组织层级或一组人员。

    '
- fmt: '# Evolutionary Data Modeling


    ## 理念阐述


    尽管前面描绘的图景充满挑战，但我相信你的目标是可以实现的——关键不是减少在数据库管理系统（DBMS）中的工作。要创建一个敏捷的开发环境和一个真正敏捷的应用程序数据库，最好的方法是在数据库内部编码更多功能，并充分利用DBMS最擅长的工作类型。你的数据库设计需要随着开发团队、客户和最终用户不断变化的需求而演进和适应。你需要在一条精细的线上行走：构建当前所需，同时放眼未来并为之准备。这就是为什么我更喜欢“演化式数据建模”（evolutionary
    data modeling）这个术语，而非“迭代式数据建模”（iterative data modeling）。“迭代”意味着设计周期在整个开发过程中重复：这是一个好的开始，但还不够。“演化”也意味着持续的变化，但伴随演化，每一次变化都建立在迄今已创建的基础之上。当设计演进时，你认识到它应该能够扩展以满足尚未完全定义的需求。你仍然不想在需求出现之前就构建功能，但也不应该以“你不会需要它”（YGANI）的名义做出限制未来选项的选择。你做出的一些设计决策会为后续设计阶段创造更多选项，而另一些则会移除选项，并限制下一轮开发中的潜在解决方案。在你确定接下来要发生什么之前，请做出尽可能保留更多开放选项的选择。


    ![images](images/square.jpg) `Note` 据我所知，“演化式数据建模”这个术语起源于 Scott W. Ambler 在其网站
    `agiledata.org` 上的内容。他还合著了一本书《重构数据库：演化式数据库设计》，其中包含了一些适用于敏捷开发的优秀方法论。本章描述的实现易于重构数据库的方法，与迄今为止我所看到的
    Ambler 先生提出的任何建议都不同。


    ## 案例分析


    例如，一个开发项目的数据库是从客户提供的 .csv 文件加载的。该文件中大约一半的列在第一轮功能规范中没有明确的用途。开发团队对于如何处理这些多余字段分成了两种观点。一方认为，所有不需要的列都应该被移除，因为它们没有被积极使用。另一方则认识到，尽管这些字段未被使用，但其值与应用程序核心数据值有明确的关系。他们认为这些字段可能有助于团队更好地理解所需数据以及最终用户如何处理这些数据。


    这些不必要的字段被保留了下来。虽然它们看起来像是核心表中数据的父值，但解决方案是将这些字段保留为属性，以便可以进一步评估关系，而不会给数据库开发人员带来额外的工作（以及后续的返工）。这个决定打破了传统数据建模的几条规则：表中包含了不必要的数据，并且模式中的某些数据未被规范化。由于核心表仍然很小且宽度合理，违反规则的影响微乎其微。几个版本之后，客户开始提及这些未使用的字段，这证实了先前怀疑的关系。随着新功能的请求，这些数据值逐渐被整合到应用程序中，有些数据值移动到了父表，而另一些则作为属性保留下来。过早移除数据会限制团队的选择。如果过早地将数据正式整合到模式中，保留数据则可能造成返工。在这种情况下，以对影响最小化的形式保留数据，同时为日后使用敞开大门，是更好的决策。


    ## 后续内容预告


    在下一节，你将看到演示简单模式变更的代码，以及此类变更如何在典型的开发环境中产生连锁反应。接下来，你将研究为什么使用 PL/SQL 作为 API 通过使得在不影响其他应用程序组件的情况下更轻松地重构数据库设计，从而支持演化式设计。之后，你将回顾一些敏捷开发概念，并讨论演化式数据建模和
    PL/SQL API 如何支持敏捷开发的价值观和原则。'
  raw: '### Evolutionary Data Modeling


    In spite of the challenging picture I''ve painted, I believe it is possible to
    achieve your goals—but it''s not by doing less in the DBMS. The best way to create
    both an agile development environment and a truly agile application database is
    by coding more functionality inside the database and exploiting the DBMS for the
    kind of work it does best. Your database designs need to evolve and adapt to the
    changing needs of the development team, the customer, and the end users. You need
    to walk a fine line of building what is needed now, while keeping your eyes on
    the future and preparing for it. This is why I prefer the term *evolutionary data
    modeling* to *iterative data modeling*. The term *iterative* implies that the
    design cycle is repeated throughout the development process: this is a good start
    but it''s not enough. *Evolutionary* also implies ongoing change, but with evolution,
    each change builds on the foundation created thus far. When the design evolves,
    you recognize that it should be capable of extending to meet needs and requirements
    that are not fully defined. You still don''t want to build functionality before
    it is required, but neither should you make choices that limit options in the
    name of YGANI (You Ain''t Gonna Need It). Some design decisions you make create
    more options for future design phases, while others remove options and limit the
    potential solutions in the next round of development. Until you are certain about
    what is coming next, make the choice that keeps as many options open as possible.


    ![images](images/square.jpg) **Note** To the best of my knowledge, the term “Evolutionary
    Data Modeling” originated with Scott W. Ambler on his website at `agiledata.org`.
    He also coauthored a book, *Refactoring Databases: Evolutionary Database Design*,
    which includes some excellent methodologies for Agile development. The approach
    described in this chapter for achieving an easily refactorable database differs
    from any recommendation I''ve seen by Mr. Ambler to date.


    For example, the database for one development project had been loaded from a .csv
    file provided by the customer. About half of the columns in the file did not have
    a defined use in the first round of functional specifications. The development
    team was divided into two schools of thought as to what should be done with the
    extraneous fields. One side stated that all the columns that were not required
    should be removed as they were not being actively used. The other side recognized
    that although these fields were not in use, the values had a clear relationship
    to the data values that were central to the application. They thought the fields
    might have value in helping the team better understand the required data and how
    it was processed by the end users.


    The unnecessary fields were retained and although they appeared to be parent values
    of the data in a central table, the solution was to leave the fields as attributes
    so the relationships could be further evaluated without creating work, and eventually
    rework, for the database developers. This decision broke several rules of traditional
    data modeling: the table contained unnecessary data and some of the data in the
    schema was not normalized. Since the central table was still small and reasonably
    narrow, the impact of the rule breaking was negligible. A few releases later,
    the customer began to make references to these unused fields, which confirmed
    the previously suspected relationships. Gradually, those data values were incorporated
    into the application as new functionality was requested, with some data values
    moving to parent tables while others were left as attributes. Removing the data
    too soon would have limited the team''s options. Retaining the data could have
    created rework if the data had been formally incorporated into the schema too
    early. Keeping the data in form that minimized the impact on the application while
    leaving the door open for later use was the better decision in this case.


    In the next section, you''ll see code that illustrates a simple schema change
    and how such changes can ripple through an average development environment. Next,
    you''ll examine why using PL/SQL as the API supports evolutionary design by making
    it easier to refactor the database design without impacting other application
    components. Later, you''ll review some agile development concepts and discuss
    how evolutionary data modeling and a PL/SQL API supports the values and principles
    of agile development.'
