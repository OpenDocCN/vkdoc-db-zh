    You can see from the calls to the SQL inside the `rates` function that there were
    1,460 cache misses, which is identical to the earlier scalar subquery cache and
    Result Cache examples. This accounts for a dramatic reduction in the number of
    lookups against the `RATES` table. However, remember that the Result Cache also
    eliminated the calls to the `GET_RATES` PL/SQL function itself. In this respect,
    the user-defined cache is less optimal as calls to the `RATES_PKG.GET_RATES` function
    are not reduced at all; in fact, the function calls account for all of the additional
    runtime.


    By using your own PL/SQL array cache, as I have done, you are essentially tuning
    the function rather than reducing or eliminating its use. Nonetheless, the user-defined
    PL/SQL session cache is a useful tuning technique for reducing the cost of SQL
    embedded in PL/SQL functions.


    ![images](images/square.jpg) `Caution` If you choose your own PL/SQL array cache
    over the Result Cache, you should be aware of three potential shortcomings. Firstly,
    each array cache will be visible to a single session and will not be shared. Secondly,
    each session will need to cache its own copy of the data at the expense of private
    PGA memory (conversely, the Result Cache stores a single shared copy of its results
    in the SGA). Thirdly, and most critically, is that if you cache data from tables
    that are regularly updated, you’ll need some form of cache-management, which will
    be difficult to implement. The Result Cache comes with this facility “out of the
    box”, but in your PL/SQL programs, you’ll not have this luxury.


    ### Summary


    To wrap up this chapter, I have demonstrated a range of costs that you should
    consider when designing PL/SQL functions into your applications and queries. In
    addition, I’ve demonstrated a wide range of techniques that are at your disposal
    to eliminate, reduce, or optimize the use of PL/SQL functions in your SQL statements.


    ## Chapter 10


    ## Choosing the Right Cursor


    **by Melanie Caffrey**


    Anyone who has ever written a PL/SQL function or procedure that performs any looping
    logic knows the pain of choosing just the right type of cursor—or the pain of
    choosing the *wrong* type of cursor. Choosing the right type of cursor for the
    right programmatic situation is what this chapter strives to teach you. Choosing
    the wrong type of cursor may result in your users, your peers, or your managers
    (or all of them) losing faith in your ability to serve the technical needs of
    the business requirements. Choosing the wrong type of cursor may also lead to
    a great amount of time debugging system slowdowns in production and, as what you
    may deem a worst-case scenario, a diminished paycheck. Given the potential pitfalls
    and consequences, every PL/SQL programmer should strive to choose a type of cursor
    that works best for each individual technical problem she must solve.


    This chapter highlights four types of cursors—not because they are the only four
    types of cursors available to you, but because they are the most *common* types
    of cursors most PL/SQL programmers typically implement. Implementing them correctly,
    given a particular set of business requirements, is key to having PL/SQL code
    that is performant and scalable. The four types of cursors discussed in this chapter
    are


    *   Explicit

    *   Implicit

    *   Static `REF` Cursors

    *   Dynamic `REF` Cursors


    Your goal in writing any PL/SQL program that obtains sets of records for processing
    programmatically (either individually or in bulk) is to choose a type of cursor
    that allows you and the Oracle database to obtain the correct answer with the
    least amount of work. It is really just that simple. Of course, there are many
    types of cursors you *can* use in many situations. But *should* you? This is the
    question you need to ask yourself each time you write a PL/SQL program. Choose
    knowledgeably. Know first what business question you are trying to answer, and
    then choose the best programmatic tool to answer it quickly and correctly given
    each individual situation.'
