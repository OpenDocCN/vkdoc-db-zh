- fmt: '# Introduction


    Rarely do I take the opportunity to introduce a book that I''ve helped create.
    Normally I am content with my place in the background where book editors rightfully
    belong. I make an exception this time because the content in this book brings
    back so many memories from own experiences as a developer in days gone by.


    `Expert PL/SQL Practices` is about wielding PL/SQL effectively. It''s not a book
    about syntax. It''s a book about how to apply syntax and features along with good
    development practices to create applications that are reliable and scalable—and
    maintainable over the long term.


    With any tool, one of the first things to know is when to wield it. Riyaj Shamsudeen
    deftly tackles the question of when to use PL/SQL in his opening chapter `Do Not
    Use!`. I put that chapter first in the book because of personal experience: My
    best-ever performance optimization success came in the late 1990s when I replaced
    a stack of procedural code on a client PC with a single SQL statement, taking
    a job from over 36 hours to just a couple of minutes. PL/SQL was not the culprit,
    but the lesson I learned then is that a set-based approach—when one is possible—is
    often preferable to writing procedural code.


    Michael Rosenblum follows with an excellent chapter on dynamic SQL, showing how
    to write code when you don''t know the SQL statements until runtime. He reminded
    me of a time at Dow Chemical in the early 1990s when I wrote a data-loading application
    for a medical record system using Rdb''s Extended Dynamic Cursor feature set.
    I still remember that as one of the most fun applications that I ever developed.


    Dominic Delmolino tackles parallel processing with PL/SQL. He covers the benefits
    that you can achieve as well as the candidate workloads. Just be careful, okay?
    One of my biggest-ever blunders as a DBA was when I once unthinkingly set a degree
    of parallelism on a key application table in order to make a single report run
    faster. It was as if the Enter key was connected to my telephone, because my phone
    rang within about a minute of my change. The manager on the other end of the line
    was most unpleased. Needless to say, I decided then that implementing parallelism
    deserved just a tad bit more thought than I had been giving it. Dominic''s chapter
    will help you avoid such embarrassment.


    Several chapters in the book cover code hygiene and good programming practices.
    Stephan Petit presents a set of useful naming and coding conventions. Torben Holm
    covers PL/SQL Warnings and conditional compilation. Lewis Cunningham presents
    a thought-provoking chapter on code analysis and the importance of truly understanding
    the code that you write and how it gets used. Robyn Sands helps you think about
    flexibility and good design in her chapter on evolutionary data modeling. Melanie
    Caffrey tours the various cursor types available, helping you to make the right
    choice of cursor for any given situation.


    Other chapters relate to debugging and troubleshooting. Sue Harper covers PL/SQL
    unit testing, especially the supporting feature set that is now built into SQL
    Developer. (I remember writing unit test scripts on paper back in the day). Save
    yourself the embarrassment of regression bugs. Automated unit tests make it easy
    and convenient to verify that you''ve not broken two new things while fixing one.


    John Beresniewicz follows with a chapter on contract-oriented programming. A key
    part of John''s approach is the use of asserts to validate conditions that should
    be true at various points within your code. I first learned of the assert technique
    while doing PowerBuilder programming back in the Stone Age. I''ve always been
    happy to see John promote the technique in relation to PL/SQL.


    Arup Nanda helps you get control over dependencies and invalidations. Dependency
    issues can be a source of seemingly random, difficult-to-repeat application errors.
    Arup shows how to get control over what must inevitably happen, so that you aren''t
    caught out by unexpected errors.


    We could hardly leave performance and scalability out of the picture. Ron Crisco
    talks about profiling your code to find the greatest opportunities for optimization.
    Adrian Billington talks about the performance aspects of invoking PL/SQL from
    within SQL statements. Connor McDonald covers the tremendous performance advantages
    available from bulk SQL operations.


    An unusual aspect of scalability not often thought about is that of application
    size and the number of developers. Is PL/SQL suited for large-scale development
    involving dozens, perhaps hundreds of programmers? Martin Büchi shows that PL/SQL
    is very much up to the task in his chapter on PL/SQL programming in the large
    by recounting his success with an 11-million line application maintained by over
    170 developers.


    You can probably tell that I''m excited about this book. The authors are top notch.
    Each has written on an aspect of PL/SQL that they are passionate and especially
    knowledgeable about. If you''re past the point of learning syntax, then sit down,
    read this book, and step up your game in delivering applications using the full
    power of PL/SQL and Oracle Database.


    Jonathan Gennick

    Assistant Editorial Director, Apress


    ## C H A P T E R 1


    ### Do Not Use


    **By Riyaj Shamsudeen**


    Congratulations on buying this book. PL/SQL is a great tool to have in your toolbox;
    however, you should understand that use of PL/SQL is not suitable for all scenarios.
    This chapter will teach you when to code your application in PL/SQL, how to write
    scalable code, and, more importantly, when not to code programs in PL/SQL. Abuse
    of some PL/SQL constructs leads to unscalable code. In this chapter, I will review
    various cases in which the misuse of PL/SQL was unsuitable and lead to an unscalable
    application.


    **PL/SQL and SQL**


    SQL is a set processing language and SQL statements scale better if the statements
    are written with set level thinking in mind. PL/SQL is a procedural language and
    SQL statements can be embedded in PL/SQL code.


    SQL statements are executed in the SQL executor (more commonly known as the SQL
    engine). PL/SQL code is executed by the PL/SQL engine. The power of PL/SQL emanates
    from the ability to combine the procedural abilities of PL/SQL with the set processing
    abilities of SQL.'
  raw: '## Introduction


    Rarely do I take the opportunity to introduce a book that I''ve helped create.
    Normally I am content with my place in the background where book editors rightfully
    belong. I make an exception this time because the content in this book brings
    back so many memories from own experiences as a developer in days gone by.


    *Expert PL/SQL Practices* is about wielding PL/SQL effectively. It''s not a book
    about syntax. It''s a book about how to apply syntax and features along with good
    development practices to create applications that are reliable and scalable—and
    maintainable over the long term.


    With any tool, one of the first things to know is when to wield it. Riyaj Shamsudeen
    deftly tackles the question of when to use PL/SQL in his opening chapter *Do Not
    Use!* I put that chapter first in the book because of personal experience: My
    best-ever performance optimization success came in the late 1990s when I replaced
    a stack of procedural code on a client PC with a single SQL statement, taking
    a job from over 36 hours to just a couple of minutes. PL/SQL was not the culprit,
    but the lesson I learned then is that a set-based approach—when one is possible—is
    often preferable to writing procedural code.


    Michael Rosenblum follows with an excellent chapter on dynamic SQL, showing how
    to write code when you don''t know the SQL statements until runtime. He reminded
    me of a time at Dow Chemical in the early 1990s when I wrote a data-loading application
    for a medical record system using Rdb''s Extended Dynamic Cursor feature set.
    I still remember that as one of the most fun applications that I ever developed.


    Dominic Delmolino tackles parallel processing with PL/SQL. He covers the benefits
    that you can achieve as well as the candidate workloads. Just be careful, okay?
    One of my biggest-ever blunders as a DBA was when I once unthinkingly set a degree
    of parallelism on a key application table in order to make a single report run
    faster. It was as if the Enter key was connected to my telephone, because my phone
    rang within about a minute of my change. The manager on the other end of the line
    was most unpleased. Needless to say, I decided then that implementing parallelism
    deserved just a tad bit more thought than I had been giving it. Dominic''s chapter
    will help you avoid such embarrassment.


    Several chapters in the book cover code hygiene and good programming practices.
    Stephan Petit presents a set of useful naming and coding conventions. Torben Holm
    covers PL/SQL Warnings and conditional compilation. Lewis Cunningham presents
    a thought-provoking chapter on code analysis and the importance of truly understanding
    the code that you write and how it gets used. Robyn Sands helps you think about
    flexibility and good design in her chapter on evolutionary data modeling. Melanie
    Caffrey tours the various cursor types available, helping you to make the right
    choice of cursor for any given situation.


    Other chapters relate to debugging and troubleshooting. Sue Harper covers PL/SQL
    unit testing, especially the supporting feature set that is now built into SQL
    Developer. (I remember writing unit test scripts on paper back in the day). Save
    yourself the embarrassment of regression bugs. Automated unit tests make it easy
    and convenient to verify that you''ve not broken two new things while fixing one.


    John Beresniewicz follows with a chapter on contract-oriented programming. A key
    part of John''s approach is the use of asserts to validate conditions that should
    be true at various points within your code. I first learned of the assert technique
    while doing PowerBuilder programming back in the Stone Age. I''ve always been
    happy to see John promote the technique in relation to PL/SQL.


    Arup Nanda helps you get control over dependencies and invalidations. Dependency
    issues can be a source of seemingly random, difficult-to-repeat application errors.
    Arup shows how to get control over what must inevitably happen, so that you aren''t
    caught out by unexpected errors.


    We could hardly leave performance and scalability out of the picture. Ron Crisco
    talks about profiling your code to find the greatest opportunities for optimization.
    Adrian Billington talks about the performance aspects of invoking PL/SQL from
    within SQL statements. Connor McDonald covers the tremendous performance advantages
    available from bulk SQL operations.


    An unusual aspect of scalability not often thought about is that of application
    size and the number of developers. Is PL/SQL suited for large-scale development
    involving dozens, perhaps hundreds of programmers? Martin Büchi shows that PL/SQL
    is very much up to the task in his chapter on PL/SQL programming in the large
    by recounting his success with an 11-million line application maintained by over
    170 developers.


    You can probably tell that I''m excited about this book. The authors are top notch.
    Each has written on an aspect of PL/SQL that they are passionate and especially
    knowledgeable about. If you''re past the point of learning syntax, then sit down,
    read this book, and step up your game in delivering applications using the full
    power of PL/SQL and Oracle Database.


    Jonathan Gennick

    Assistant Editorial Director, Apress


