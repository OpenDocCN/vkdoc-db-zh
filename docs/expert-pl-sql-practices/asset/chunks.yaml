    \ = '23456')\n        ) then\n                :new.follow_up := 'Y';\n       \
    \ else\n                :new.follow_up := 'N';\n        end if;\nend;\n/\n```\n\
    \n注意子句 `follows tr_pay_risk_rating`，它指定该触发器应在风险评级触发器之后执行。现在您可以保证触发器的执行顺序：风险评级触发器先触发，然后是跟进触发器。使用这个新设置后，如果您重新执行前面的示例，将看到以下结果：\n\
