    \ 是模式级别的对象。我可以如下创建一个银行交易的基类型：\n\n![images](img/square.jpg) **注意** Oracle 对用户定义类型（UDT）使用两个同义词。在《*数据库对象关系开发者指南*》中，它们被称为\
    \ *对象类型*，因为 Oracle 想要支持数据库中的面向对象。同一个术语 *对象类型* 更早就被用作 `all_objects` 中条目的类型，例如包和表。第二个同义词\
    \ *抽象数据类型*（ADT）用于《*PL/SQL 语言参考*》，因为 UDT 可用于实现 ADT 的数学概念——即由一系列操作和这些操作的属性定义的数据结构。我在本章中使用明确的术语\
    \ *UDT*。UDT 包括 varrays 和嵌套表，这里不作讨论。UDT 作为外部调用的子程序参数类型很有用。\n\n```sql\ncreate or\
    \ replace type t_bank_trx_obj is object (\n  s_id                  integer\n ,s_amount\
    \              number\n\n  ------------------------------------------------------------------------------\n\
    \  -- 返回交易金额。\n  ------------------------------------------------------------------------------\n\
    \ ,final member function p_amount return number\n\n  ------------------------------------------------------------------------------\n\
    \  -- 记账交易。\n  ------------------------------------------------------------------------------\n\
    \ ,not instantiable member procedure book(\n   i_text               varchar2\n\
    \  )\n) not instantiable not final;\n```\n\n类型 `t_bank_trx_obj` 有两个属性 `s_id` 和\
    \ `s_amount` 来保存状态。此外，它有两个方法。函数 `p_amount` 被声明为 `final`，意味着它不能在子类型中被覆盖。过程 `book`\
    \ 被声明为不可实例化（抽象），意味着它只被声明和指定，但没有实现。类型体的语法是 PL/SQL 扩展了子程序的修饰符，如下所示：\n\n```sql\n\
    create or replace type body t_bank_trx_obj is\n  final member function p_amount\
    \ return number\n  is\n  begin\n    return s_amount;\n  end p_amount;\nend;\n\
    ```"
- fmt: "## 继承与UDT的动态调度\n\nUDT 支持继承。我可以将支付交易类型定义为通用银行交易类型的特化。\n\n```sql\ncreate or\
    \ replace type t_pay_trx_obj under t_bank_trx_obj (\n  ------------------------------------------------------------------------------\n\
    \  -- Creates a payment transaction. Amount must be positive.\n  ------------------------------------------------------------------------------\n\
    \  constructor function t_pay_trx_obj(\n   i_amount             number\n  ) return\
    \ self as result\n\n ,overriding member procedure book(\n   i_text           \
    \    varchar2\n  )\n);\n```\n\n我还可以添加一个显式构造函数，以禁止创建负金额的支付交易。构造函数仅将金额作为输入参数，假设\
    \ ID 是从序列初始化的。关键字 `self` 表示当前实例，类似于其他语言中的 `this`。\n\n![images](images/square.jpg)\
    \ `Note` Oracle 会按声明顺序为所有属性创建一个默认构造函数，并以属性名作为输入参数。为了防止这种情况（例如，允许调用方创建负金额的支付），必须声明一个与默认构造函数签名相同的显式构造函数。\n\
    \n```sql\ncreate or replace type body t_pay_trx_obj is\n  constructor function\
    \ t_pay_trx_obj(\n   i_amount             number\n  ) return self as result\n\
    \  is\n  begin\n    if nvl(i_amount, -1) < 0 then\n      raise_application_error(-20000,\
    \ 'Negative or null amount');\n    end if;\n    self.s_amount := i_amount;\n \
    \   return;\n  end t_pay_trx_obj;\n\n  ------------------------------------------------------------------------------\n\
    \  overriding member procedure book(\n   i_text               varchar2\n  )\n\
    \  is\n  begin\n    dbms_output.put_line('Booking t_pay_trx_obj \"' || i_text\
    \ || '\" with amount '\n     || self.p_amount);\n  end book;\nend;\n```\n\n现在我可以使用这两种类型来说明动态调度。我将一个支付交易赋值给一个类型为\
    \ `t_bank_trx_obj` 的变量，并调用 `book` 过程。即使该变量的静态类型是 `t_bank_trx_obj`，执行的是实际类型 `t_pay_trx_obj`\
    \ 的实现。\n\n```sql\nSQL> declare\n  2    l_bank_trx_obj             t_bank_trx_obj;\n\
    \  3  begin\n  4    l_bank_trx_obj := new t_pay_trx_obj(100);\n  5    l_bank_trx_obj.book('payroll\
    \ January');\n  6  end;\n  7  /\nBooking t_pay_trx_obj \"payroll January\" with\
    \ amount 100\n\nPL/SQL procedure successfully completed.\n```\n\n## UDT 的局限性\n\
    \n到目前为止，你已经看到了 UDT 在面向对象编程方面的优点。不幸的是，UDT 也有两个主要缺点。\n\n*   UDT 只能在其规范中使用 SQL 类型，而不能使用\
    \ PL/SQL 类型（如记录和 Boolean），因为 UDT 可以在 SQL 中持久化。\n*   与 PL/SQL 包不同，UDT 不支持信息隐藏。无法将任何属性或方法声明为\
    \ private，也无法在包体中添加更多属性和方法。任何客户端都可以访问所有成员，如下面的示例所示，我在其中直接修改了金额：\n\n```sql\ncreate\
    \ or replace procedure access_internal\nis\n  l_bank_trx_obj             t_bank_trx_obj;\n\
    begin\n  l_bank_trx_obj := new t_pay_trx_obj(100);\n  l_bank_trx_obj.s_amount\
    \ := 200;\n  l_bank_trx_obj.book('cheating');\nend;\n```\n\n至少 PL/Scope 提供了一种检测此类访问的方法。以下查询列出了所有对声明类型及其子类型外部的属性和私有方法（以\
    \ `p_` 为前缀）的静态访问：\n\n```sql\nSQL> select us.name, us.type, us.object_name, us.object_type,\
    \ us.usage, us.line\n  2  from   all_identifiers pm\n  3        ,all_identifiers\
    \ us\n  4  where  pm.object_type  = 'TYPE'\n  5     and (\n  6              pm.type\
    \ = 'VARIABLE'\n  7           or (pm.type in ('PROCEDURE', 'FUNCTION') and pm.name\
    \ like 'P\\_%' escape '\\')\n  8         )\n  9     and pm.usage        = 'DECLARATION'\n\
    \ 10     and us.signature    = pm.signature\n 11     and (us.owner, us.object_name)\
    \ not in (\n 12           select ty.owner, ty.type_name\n 13           from  \
    \ all_types ty\n 14           start with ty.owner     = pm.owner\n 15        \
    \          and ty.type_name = pm.object_name\n 16           connect by ty.supertype_owner\
    \ = prior ty.owner\n 17                  and ty.supertype_name  = prior ty.type_name\n\
    \ 18         );\n```\n\n```\nNAME      TYPE      OBJECT_NAME      OBJECT_TYPE\
    \  USAGE       LINE\n--------  --------  ---------------  -----------  ----------\
    \  ----\nS_AMOUNT  VARIABLE  ACCESS_INTERNAL  PROCEDURE    ASSIGNMENT     6\n\n\
    1 row selected.\n```\n\nPL/Scope 区分了赋值和引用。不幸的是，以属性作为 `out` 或 `in out` 参数实际参数形式的隐藏赋值仅显示为引用。\n\
    \n## UDT 的持久化\n\n对象类型可以作为表列或对象表持久化。例如，所有交易可以存储在下表中：\n\n```sql\ncreate table bank_trx_obj\
    \ of t_bank_trx_obj(s_id primary key)\nobject identifier is primary key;\n```\n\
    \n此表可以存储任何子类型的对象，例如支付交易。\n\n```sql\nSQL> insert into bank_trx_obj values(t_pay_trx_obj(1,\
    \ 100));\n\n1 row created.\n```\n\n一开始看起来简单的事情，当类型规范发生变化时，会变得非常复杂和麻烦。细节超出了本章的范围。此外，对于具有表依赖项及其子类型的类型，基于版本的重定义类型（以及从\
    \ 11gR2 开始，类型体）是不可能的。将 UDT 存储在表中是一种不好的做法，可能只在高级队列表和某些 varrays 中是合理的。当然，也可以将 UDT\
    \ 的内容存储到关系表中，每个 UDT 属性对应一列，如下文对记录的描述。\n\n## 使用 PL/SQL 记录进行面向对象编程\n\nPL/SQL 记录类型为\
    \ UDT 提供了一种替代的实现基础，用于在 PL/SQL 中进行面向对象编程。我认识的大多数在 PL/SQL 中进行面向对象编程的人都使用记录。使用记录代替\
    \ UDT 解决了几个问题。\n\n*   PL/SQL 类型允许用作字段的类型和子程序的参数。\n*   多重继承和子类型化是可能的。\n\n使用记录的缺点是你必须自己实现动态调度。在我讲动态调度之前，我将描述如何在内存中运行时创建任意数量的对象实例以及如何引用它们。"
  raw: '##### Inheritance and Dynamic Dispatch with UDTs


    UDTs provide for inheritance. I can define a payment transaction type as a specialization
    of the general banking transaction type.


    `create or replace type t_pay_trx_obj under t_bank_trx_obj (`

    `  ------------------------------------------------------------------------------`

    `  -- Creates a payment transaction. Amount must be positive.`

    `  ------------------------------------------------------------------------------`

    `  constructor function t_pay_trx_obj(`

    `   i_amount             number`

    `  ) return self as result`


    ` ,overriding member procedure book(`

    `   i_text               varchar2`

    `  )`

    `);`


    I can also add an explicit constructor to prohibit payment transactions with negative
    amounts. The constructor only takes the amount as input parameter, assuming that
    the ID gets initialized from a sequence. The keyword “self” denotes the current
    instance, like “this” in other languages.


    ![images](images/square.jpg) **Note** Oracle creates a default constructor with
    all attributes in the order of declaration and the names of the attributes as
    input parameters. To prevent that, the default constructor creates a loophole
    (e.g., allowing the caller to create a payment with a negative amount), an explicit
    constructor with the same signature as the default constructor must be declared.


    `create or replace type body t_pay_trx_obj is`

    `  constructor function t_pay_trx_obj(`

    `   i_amount             number`

    `  ) return self as result`

    `  is`

    `  begin`

    `    if nvl(i_amount, -1) < 0 then`

    `      raise_application_error(-20000, ''Negative or null amount'');`

    `    end if;`

    `    self.s_amount := i_amount;`

    `    return;`

    `  end t_pay_trx_obj;`


    `  ------------------------------------------------------------------------------`

    `  overriding member procedure book(`

    `   i_text               varchar2`

    `  )`

    `  is`

    `  begin`

    `    dbms_output.put_line(''Booking t_pay_trx_obj "'' || i_text || ''" with amount
    ''`

    `     || self.p_amount);`

    `  end book;`

    `end;`


    I can now use the two types to illustrate the dynamic dispatch. I assign a payment
    transaction to a variable of type `t_bank_trx_obj` and call the procedure book.
    Even though the static type of the variable is `t_bank_trx_obj`, the implementation
    of the actual type `t_pay_trx_obj` is executed.


    `SQL> declare`

    `  2    l_bank_trx_obj             t_bank_trx_obj;`

    `  3  begin`

    `  4    l_bank_trx_obj := new t_pay_trx_obj(100);`

    `  5    l_bank_trx_obj.book(''payroll January'');`

    `  6  end;`

    `  7  /`

    `Booking t_pay_trx_obj "payroll January" with amount 100`


    `PL/SQL procedure successfully completed.`


    ##### Limitations of UDTs


    So far, you have seen the good aspects of UDTs for object-oriented programming.
    Unfortunately, UDTs also have two major shortcomings.


    *   UDTs can use only SQL types, but not PL/SQL types (such as record and Boolean)
    in their specification because UDTs can be persisted in SQL.

    *   Unlike PL/SQL packages, UDTs don''t support information hiding. It is not
    possible to declare any attributes or methods as private, or to add more attributes
    and methods in the body. Any client can access all members, as shown in the following
    example, in which I directly modify the amount:


    `create or replace procedure access_internal`

    `is`

    `  l_bank_trx_obj             t_bank_trx_obj;`

    `begin`

    `  l_bank_trx_obj := new t_pay_trx_obj(100);`

    `  l_bank_trx_obj.s_amount := 200;`

    `  l_bank_trx_obj.book(''cheating'');`

    `end;`


    At least PL/Scope gives you a way to detect such accesses. The following select
    lists all static accesses to attributes and private methods, indicated by the
    prefix p_, from outside the declaring type and its subtypes:


    `SQL> select us.name, us.type, us.object_name, us.object_type, us.usage, us.line`

    `  2  from   all_identifiers pm`

    `  3        ,all_identifiers us`

    `  4  where  pm.object_type  = ''TYPE''`

    `  5     and (`

    `  6              pm.type = ''VARIABLE''`

    `  7           or (pm.type in (''PROCEDURE'', ''FUNCTION'') and pm.name like ''P\_%''
    escape ''\'')`

    `  8         )`

    `  9     and pm.usage        = ''DECLARATION''`

    ` 10     and us.signature    = pm.signature`

    ` 11     and (us.owner, us.object_name) not in (`

    ` 12           select ty.owner, ty.type_name`

    ` 13           from   all_types ty`

    ` 14           start with ty.owner     = pm.owner`

    ` 15                  and ty.type_name = pm.object_name`

    ` 16           connect by ty.supertype_owner = prior ty.owner`

    ` 17                  and ty.supertype_name  = prior ty.type_name`

    ` 18         );   `


    `NAME     TYPE     OBJECT_NAME     OBJECT_TYPE USAGE      LINE`

    `-------- -------- --------------- ----------- ---------- ----`

    `S_AMOUNT VARIABLE ACCESS_INTERNAL PROCEDURE   ASSIGNMENT    6`


    `1 row selected.`


    PL/Scope distinguishes between assignment and reference. Unfortunately, hidden
    assignments in the form of passing an attribute as actual parameter for an out
    or in out parameters are visible only as references.


    ##### Persistence of UDTs


    Object types can be persisted as table columns or as object tables. For example,
    all transactions can be stored in the following table:


    `create table bank_trx_obj of t_bank_trx_obj(s_id primary key)`

    `object identifier is primary key;`


    This table can store objects of any subtype, such as payment transaction.


    `SQL> insert into bank_trx_obj values(t_pay_trx_obj(1, 100));`


    `1 row created.`


    What looks easy at the beginning becomes very complex and cumbersome when type
    specifications change. The details are beyond the scope of this chapter. Furthermore,
    edition-based redefinition of types (and as of 11gR2, type bodies) is impossible
    for types with table dependents and subtypes thereof. Storing UDTs in tables is
    bad practice that may be justified only in Advanced Queuing tables and for some
    varrays. Of course, it is also possible to store the content of UDTs into relational
    tables with a table column per UDT attribute as described for records below.


    #### Object-Oriented Programming with PL/SQL Records


    PL/SQL record types provide an alternative implementation basis to UDTs for object-oriented
    programming in PL/SQL. Most people I know who do object-oriented programming in
    PL/SQL use records for object-oriented programming. Using records instead of UDTs
    solves several problems.


    *   PL/SQL types are allowed as types of fields and as parameters of subprograms.

    *   Multiple inheritance and subtyping are possible.


    The disadvantage of using records is that you have to implement the dynamic dispatch
    yourself. Before I get to the dynamic dispatch, I will describe how to create
    an arbitrary number of object instances at runtime in memory and how to reference
    them.'
