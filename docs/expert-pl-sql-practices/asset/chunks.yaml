  raw: '#### Using SQL Alternatives


    It is, however, quite rare that a PL/SQL function will be quicker than a SQL-only
    expression or built-in function. You should consider whether it is possible or
    desirable to change some of your application’s critical queries (that use PL/SQL
    functions) to use SQL-only alternatives. If you are developing new applications,
    you have a good opportunity to build-in performance from the outset.


    Some considerations will be required here, of course, and if any of the following
    are true, you might decide to favour some PL/SQL functions over a SQL implementation:


    *   A PL/SQL function is not heavily used.

    *   A PL/SQL function is too complicated to be easily expressed in SQL.

    *   A SQL statement is not displaying any of the issues I’ve described.

    *   You have simply too much SQL to change or regression-testing would be too
    prohibitive.


    I’ll demonstrate the performance benefits of using SQL and offer some alternative
    techniques that you can use to refactor those critical SQL statements (or even
    consider as a standard for new applications).


    ##### Use SQL


    In [Listing 9-12](#Chapter09.html#list_9_12), I ran a sales report that generated
    over 918,000 executions of a `GET_RATE` PL/SQL function. I demonstrated that a
    SQL-only implementation of the same report (i.e. a simple join to the RATES table)
    reduced the runtime of that query from 66 seconds to just 1 second (there was
    also a massive reduction in logical I/O). The SQL-only technique can also make
    a difference to the elapsed time of queries that use quicker PL/SQL functions,
    such as those that don’t contain any SQL.


    SQL is an extremely flexible and rich language for processing sets of data quickly.
    Assuming that performance is your goal, you can use SQL such as analytic functions,
    subquery factoring, and a wide range of applications of the built-in functions
    to refactor your PL/SQL functions to SQL (visit the OTN SQL and PL/SQL forum or
    [`http://oraqa.com/`](http://oraqa.com/) for examples of innovative uses for SQL).


    ##### Use a View


    An argument in favour of retaining PL/SQL functions is that they encapsulate and
    centralize application logic, preventing a proliferation of the same rules throughout
    the code base. There are alternative encapsulation methods, such as using views,
    which have the added benefits of also providing the performance of SQL. In [Listing
    9-26](#Chapter09.html#list_9_26), I’ve converted the sales report by calendar
    year and product from using the `GET_RATE` PL/SQL function to using a view, where
    the logic is encapsulated in a SQL expression.


    ***Listing 9-26.** Encapsulating Function Logic in a View*


    `SQL> CREATE VIEW sales_rates_view`

    `  2  AS`

    `  3     SELECT s.*`

    `  4     ,      s.amount_sold * (SELECT r.exchange_rate`

    `  5                             FROM   rates r`

    `  6                             WHERE  r.base_ccy   = ''USD''`

    `  7                             AND    r.target_ccy = ''GBP''`

    `  8                             AND    r.rate_date  = s.time_id) AS amount_sold_gbp`

    `  9     FROM   sales     s;`


    `View created.`


    With this view, I’ve converted the `GET_RATE` PL/SQL function to a scalar subquery
    lookup. The entire rates conversion is now projected as a single column. I’ve
    used a scalar subquery instead of a simple join to RATES to take advantage of
    an optimization with views known as column-elimination. With this optimization,
    the scalar subquery will only be executed when the AMOUNT_SOLD_GBP column is referenced
    in a query. This means that queries that don’t need the converted rate can also
    take advantage of this view without penalty, widening the scope for re-use. The
    timing and statistics for the sales report when using this view are shown in [Listing
    9-27](#Chapter09.html#list_9_27).


    ***Listing 9-27.** Exploiting Column-Elimination in Views (No Column-Elimination)*


    `SQL> SELECT t.calendar_year`

    `  2  ,      p.prod_name`

    `  3  ,      SUM(s.quantity_sold)   AS qty_sold`

    `  4  ,      SUM(s.amount_sold)     AS amt_sold_usd`

    `  5  ,      SUM(s.amount_sold_gbp) AS amt_sold_gbp`

    `  6  FROM   sales_rates_view s`

    `  7  ,      times            t`

    `  8  ,      products         p`

    `  9  WHERE  s.time_id    = t.time_id`

    `10  AND    s.prod_id    = p.prod_id`

    ` 11  GROUP  BY`

    ` 12         t.calendar_year`

    ` 13  ,      p.prod_name;`


    `272 rows selected.`


    **`Elapsed: 00:00:01.29`**


    `Execution Plan`

    `----------------------------------------------------------`

    `Plan hash value: 625253124`


    `------------------------------------------------------------`

    `| Id  | Operation                      | Name     | Rows  |`

    `------------------------------------------------------------`

    `|   0 | SELECT STATEMENT               |          |   252 |`

    **`|*  1 |  INDEX UNIQUE SCAN             | RATES_PK |     1 |`**

    `|   2 |  HASH GROUP BY                 |          |   252 |`

    `|*  3 |   HASH JOIN                    |          |   918K|`

    `|   4 |    PART JOIN FILTER CREATE     | :BF0000  |  1826 |`

    `|   5 |     TABLE ACCESS FULL          | TIMES    |  1826 |`

    `|*  6 |    HASH JOIN                   |          |   918K|`

    `|   7 |     TABLE ACCESS FULL          | PRODUCTS |    72 |`

    `|   8 |     PARTITION RANGE JOIN-FILTER|          |   918K|`

    `|   9 |      TABLE ACCESS FULL         | SALES    |   918K|`

    `------------------------------------------------------------`


    `Statistics`

