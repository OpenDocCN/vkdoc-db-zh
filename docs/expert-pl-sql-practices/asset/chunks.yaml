    \nSQL ID: dybuvv2j10gxt\nPlan Hash: 272002086\nSELECT /*+ implicit cursor query\
    \ goes here */ *\nFROM\n DUAL\n\ncall     count       cpu    elapsed       disk      query    current        rows\n\
    ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
    Parse        1      0.00       0.00          0          0          0           0\n\
    Execute   2000      0.01       0.02          0          0          0           0\n\
    Fetch     2000      0.03       0.04          2       6000          0        2000\n\
    ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
    total     4001      0.05       0.07          2       6000          0        2000\n\
    \nMisses in library cache during parse: 1\nOptimizer mode: ALL_ROWS\nParsing user\
    \ id: 84     (recursive depth: 1)\n\nRows     Row Source Operation\n-------  ---------------------------------------------------\n\
    \      1  TABLE ACCESS FULL DUAL (cr=3 pr=2 pw=0 time=0 us cost=2 size=2 card=1)\n\
    \n********************************************************\n```\n\n此 TKPROF 输出展示了该查询被解析了\
    \ 1 次，执行了 2000 次。PL/SQL 缓存了该游标。输出中的“Misses in library cache during parse”行也证明这是一次硬解析。它在共享池中未被找到。这里是另一个例子：\n\
    \n```\n********************************************************************************\n\
    \nSQL ID: gc72r5wh91y0k\nPlan Hash: 272002086\nSELECT /*+ REF cursor query goes\
    \ here */ *\nFROM\n DUAL\n\ncall     count       cpu    elapsed       disk      query    current        rows\n\
    ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
    Parse     2000      0.02       0.02          0          0          0           0\n\
    Execute   2000      0.02       0.02          0          0          0           0\n\
    Fetch        0      0.00       0.00          0          0          0           0\n\
    ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
    total     4000      0.04       0.05          0          0          0           0\n\
    \nMisses in library cache during parse: 1\nOptimizer mode: ALL_ROWS\nParsing user\
    \ id: 84     (recursive depth: 1)\n\nRows     Row Source Operation\n-------  ---------------------------------------------------\n\
    \      0  TABLE ACCESS FULL DUAL (cr=0 pr=0 pw=0 time=0 us cost=2 size=2 card=1)\n\
    \n********************************************************************************\n\
    ```\n\n这次 TKPROF 输出表明该查询被解析了 2000 次。它是使用 REF 游标打开的，而 PL/SQL 无法缓存此类游标。输出还表明有一次硬解析和（因此）1999\
    \ 次软解析。第二次解析是通过在共享池的库缓存中找到已存在的执行计划完成的。最佳情况下，你应该看到 `parse =1`，但看到 `parse = execute\
    \ = N` 也并不罕见。\n\n### 动态 REF 游标\n\n从所有实际用途来看，动态 REF 游标与静态 REF 游标非常相似，只有几个显著的区别。动态\
    \ REF 游标的查询直到运行时才知晓，并且也是动态构建的。你可能会问，这与静态 REF 游标有何不同，因为静态 REF 游标的查询同样直到运行时才知晓。强类型\
    \ REF 游标无法被动态打开。弱类型 REF 游标则可以被动态打开。\n\n#### 示例与最佳实践\n\n考虑清单 10-11 中概述的使用动态 REF\
    \ 游标的过程示例：\n\n`清单 10-11.` 使用动态 REF 游标的过程 (11.2.0.1)\n\n```\nPROCEDURE get_concepts\
    \ (ip_input      IN  NUMBER,\n                        ip_con_type   IN  VARCHAR2,\n\
                            ip_con_dt     IN  DATE,\n                        ip_con_cat    IN  VARCHAR2,\n\
                            op_rc        OUT  my_cv)\nIS\n    lv_query VARCHAR2 (512)\
    \ DEFAULT 'SELECT * FROM prod_concepts';\n    BEGIN\n         IF ( ip_con_type\
    \ IS NOT NULL )\n            lv_query := lv_query ||\n            '  WHERE concept_type\
    \ LIKE ''%''||:ip_con_type||''%'' ';\n         ELSE\n            lv_query := lv_query\
    \ ||\n            ' WHERE (1 = 1 OR :ip_con_type IS NULL) ';\n         END IF;\n\
             IF ( ip_con_dt IS NOT NULL )\n            lv_query := lv_query ||\n            '  AND\
    \ concept_dt < :ip_con_dt ';\n         ELSE\n            lv_query := lv_query\
    \ ||\n            ' AND (1 = 1 OR :ip_con_dt IS NULL) ';\n         END IF;\n         IF\
    \ ( ip_con_cat IS NOT NULL )\n            lv_query := lv_query ||\n            '  AND\
    \ concept_category LIKE ''%''||:ip_con_cat||''%'' ';\n         ELSE\n            lv_query\
    \ := lv_query ||\n            ' AND (1 = 1 OR :ip_con_cat IS NULL) ';\n         END\
    \ IF;\n            OPEN op_rc FOR\n                lv_query USING ip_con_type,\
    \ ip_con_dt, ip_con_cat;\n\n    END get_concepts;\n```\n\n那么，这个版本的 `get_concepts`\
    \ 过程与清单 10-9 中展示的那个有何不同？首先，与静态的 `OPEN-FOR` 版本不同，动态版本有一个*可选的* `USING` 子句——之所以说*可选*，是因为也可以使用字面量（而非绑定变量）来编码此过程，类似于下面这样：\n\
    \n```\n'SELECT * FROM prod_concepts\n  WHERE concept_type  = ''||COLLATERAL||''\n\
        AND concept_dt    < ''||TO_CHAR(''''01-JAN-2003''', '''DD-MON-YYYY''')||''';'\n\
    ```\n\n显然，这似乎是构建查询的一种非理想且笨重的方式。这也会导致可怕的硬解析，因为所有查询都将是唯一的，这会*扼杀*性能。如果必须构建任何形式的动态查询，请先问明原因。在以下情况下你需要动态\
    \ SQL：\n\n*   你想执行一条 SQL 数据定义语句（如 `CREATE`）、数据控制语句（如 `GRANT`）或会话控制语句（如 `ALTER\
    \ SESSION`）。在 PL/SQL 中，此类语句无法通过静态 SQL 执行。\n*   你希望获得更大的灵活性。例如，你可能希望等到运行时再选择使用哪些模式对象。或者，你可能希望程序为\
    \ `SELECT` 语句的 `WHERE` 子句构建不同的搜索条件，正如清单 10-11 中所做的那样。动态构建 `WHERE` 子句是使用动态 SQL\
    \ 的一个非常常见的原因。更复杂的程序可能会从各种 SQL 操作、子句等中进行选择。\n\n如果你不需要执行上述任何操作，但确实需要 REF 游标，那么你应该使用静态\
    \ REF 游标。如果你*确实*需要使用上述任何功能，请确保使用绑定变量，如清单 10-11 中的第一个示例所示。"
- fmt: "## 关于 REF 游标与 SQL 注入风险的讨论\n\n现在，由于你使用的是 REF 游标结构，它仍然会执行软解析。但至少，如果你使用了绑定变量，它就不会执行硬解析。因为游标*可能*不同，Oracle\
    \ RDBMS 认为它可能是不同的（因为它是动态的），所以总会进行某种解析。在你必须选择的所有游标类型中，这一个绝对应该是你的最后手段。动态 SQL 极其脆弱，难以编码、难以调优，也难以维护。代码依赖链不复存在，因此你只能*希望*数据结构的改变不会对你的代码产生不利影响。\n\
    \n但你在前一节已经了解到，REF 游标至少会执行软解析。除了动态 REF 游标带来的繁琐编码之外，避免使用它们的其他原因可能是什么？我能想到的避免动态 REF\
    \ 游标的最大原因是 SQL 注入的可能性。SQL 注入是对你的应用程序，更重要的，是你的数据的一个真实威胁。如果你的应用程序代码允许恶意用户将他们自己的\
    \ SQL 语句附加到你动态构建的查询中，此类攻击会对你的数据安全构成危险威胁。\n\n### SQL 注入的威胁\n\n允许用户在不使用绑定变量的情况下将字符串连接到语句中的动态\
    \ SQL，不仅是一个解析、可扩展性和可维护性的噩梦；它还带来了一个非常切实的安全威胁。每次你允许某人提供来自你控制范围之外的输入时，你的数据就不再安全。更糟糕的是，恶意用户因为他们使用的是*你的*代码，所以是以*你*的身份执行他们的语句。你打开了大门，让你的数据变得脆弱。考虑[Listing\
    \ 10-12](#Chapter10.html#list_10_12)中的例子，它概述了一个看似无害但易受 SQL 注入影响的存储过程。\n\n**Listing\
    \ 10-12.** 一个易受 SQL 注入影响的过程 (11.2.0.1)\n\n```\nPROCEDURE get_concepts (ip_input\
    \      IN  NUMBER,\n                        ip_con_type   IN  VARCHAR2,\n    \
    \                    ip_con_dt     IN  DATE,\n                        ip_con_cat\
    \    IN  VARCHAR2,\n                        op_rc        OUT  my_cv)\nIS\n   \
    \ BEGIN\n       IF ( ip_input = 1 )\n       THEN\n       OPEN op_rc FOR\n    \
    \         'SELECT * FROM prod_concepts\n               WHERE concept_type  = ''||ip_con_type||''\n\
    \                 AND concept_dt    < ''||ip_con_dt||''' ;\n       ELSE\n    \
    \      OPEN op_rc FOR\n             'SELECT * FROM prod_concepts\n           \
    \    WHERE  concept_category = ''||ip_con_cat||''' ;\n       END IF;\n    END\
    \ get_concepts;\n```\n\n如果有人希望做一些他们不应该做的事情，例如获取访问权限或进行破坏，那么这些看似无害的参数（显然用于输入产品概念数据）很容易被操纵，以至于最终生成的动态\
    \ SQL 查询最终看起来类似于以下内容：\n\n```\nCREATE OR REPLACE\n    PROCEDURE get_concepts (ip_input\
    \      IN  NUMBER,\n                            ip_con_type   IN  VARCHAR2,\n\
    \                            ip_con_dt     IN  DATE,\n                       \
    \     ip_con_cat    IN  VARCHAR2,\n                            op_rc        OUT\
    \  sys_refcursor )\n    IS\n        BEGIN\n           IF ( ip_input = 1 )\n  \
    \        THEN\n                   DBMS_OUTPUT.PUT_LINE(\n                'SELECT\
    \ * FROM prod_concepts\n                  WHERE concept_type  = ''' ||ip_con_type||\
    \ '''\nAND concept_dt    < ''' || to_char(ip_con_dt, 'dd-mon-yyyy' )\n ||''''\
    \ );\n          ELSE\n                   DBMS_OUTPUT.PUT_LINE(\n             \
    \   'SELECT * FROM prod_concepts\n                  WHERE  concept_category =\
    \ ''' || ip_con_cat||'''' );\n          END IF;\n       END get_concepts;\n  \
    \ /\nscott%ORA11GR2> variable x refcursor\nscott%ORA11GR2> exec get_concepts(\
    \ ip_input => 2, ip_con_type => null, ip_con_dt => null,\n ip_con_cat => '''||admin_pkg.change_app_passwd(\
    \ ''INJECTED'' ) --', op_rc => :x );\nSELECT * FROM prod_concepts\n WHERE concept_category\
    \ =\n''||admin_pkg.change_app_passwd( 'INJECTED' ) --'\n\nPL/SQL procedure successfully\
    \ completed.\n```\n\n这里发生了什么？在这个过程的调用中，用户提供的输入不关心匹配 `concept_type` 或 `concept_dt`，而是提供了他们实际要执行的\
    \ SQL：`admin_pkg.change_app_passwd('INJECTED');`。在该输入的末尾添加符号 `--`，表示 SQL 注释的开始。这是一个巧妙的方法来*消耗*应用程序提供的最终引号，而无需担心匹配它。\n\
    \n正如你所看到的，动态 SQL 为恶意入侵者敞开了大门。任何时候你不使用绑定变量，你不仅阻碍了应用程序性能，还将你的数据置于严重风险之中。因此，既然动态\
    \ REF 游标（以及任何形式的动态 SQL）是脆弱的，容易出错且具有风险，你需要问问自己，使用 REF 游标编码应用程序所带来的额外灵活性是否值得承担安全风险和可维护性的麻烦。如果你别无选择只能使用\
    \ REF 游标，请记住以下几点：\n\n*   如果必须使用 REF 游标，请使用强类型静态 REF 游标。\n*   如果无法使用静态 REF 游标，那么请确保你的动态\
    \ REF 游标使用绑定变量。\n\n### 描述 REF 游标的列\n\n在过去的 Oracle 版本中，描述 REF 游标的列是不可能的。如果你想拥有这个功能，必须使用数据库外部的客户端工具。这种情况从\
    \ Oracle 11.1 及更高版本开始发生了变化。从 Oracle 11.1 开始，`DBMS_SQL`（一个提供的包，允许你像 JDBC 一样以程序化方式处理结果集）与\
    \ REF 游标功能协同工作，使你能够在打开 REF 游标后以编程方式描述你的列。这种功能是可能的，因为 Oracle 11g 允许将 REF 游标转换为\
    \ `DBMS_SQL`，反之亦然。考虑[Listing 10-13](#Chapter10.html#list_10_13)中的例子。\n\n**Listing\
    \ 10-13.** 使用 `DBMS_SQL` 描述列的 REF 游标 (11.2.0.1)\n\n```\nDECLARE\n            lv_ref_cursor\
    \   SYS_REFCURSOR;\n            lv_col_cnt      NUMBER;\n            lv_desc_tab\
    \     DBMS_SQL.DESC_TAB;\nBEGIN\n            OPEN lv_rcursor FOR SELECT * FROM\
    \ prod_concepts;\n\n            DBMS_SQL.DESCRIBE_COLUMNS\n            ( cur_id\
    \      => DBMS_SQL.TO_CURSOR_NUMBER(lv_ref_cursor),\n              col_cnt   \
    \  => lv_col_cnt,\n              desc_tab    => lv_desc_tab );\n\n           FOR\
    \ i IN 1 .. lv_col_cnt\n           LOOP\n                   DBMS_OUTPUT.PUT_LINE(\
    \ lv_desc_tab(i).col_name );\n           END LOOP;\nEND;\n/\n```\n\n这个例子的关键部分是以下代码片段：\n\
    \n```\ncur_id      => DBMS_SQL.TO_CURSOR_NUMBER(lv_ref_cursor)\n```\n\n函数 `TO_CURSOR_NUMBER`\
    \ 可以将任何 REF 游标（无论是强类型还是弱类型）转换为一个 SQL 游标号，然后可以将其传递给任何 `DBMS_SQL` 子程序。你可以在 REF 游标处理中利用\
    \ `DBMS_SQL` 的能力，为你的程序提供更大的灵活性。但请注意，一旦将 REF 游标转换为 `DBMS_SQL` 游标号，就不能再使用原生动态 SQL\
    \ 操作来访问它。你可以使用 `DBMS_SQL.TO_REFCURSOR` 函数将游标号切换回 REF 游标，但请注意，这个最新版本的 REF 游标将是弱类型的，即使它最初是强类型的。因此，与任何其他\
    \ PL/SQL 游标功能一样，在充分了解其副作用以及好处的前提下使用此功能。"
  raw: 'Now, because the structure you are using is a REF cursor, it will still be
    performing soft parses, but at least, if you are using bind variables, it won’t
    be performing hard parses. Because the cursor *could* be different, the Oracle
    RDBMS assumes that it might be, since it is dynamic, and therefore some type of
    parse always takes place. Of all the cursor types you have to choose from, this
    one should definitely be your last resort. Dynamic SQL is extremely fragile, hard
    to code, hard to tune, and simply hard to maintain. The chain of code dependencies
    no longer exists and you are therefore *hoping* that data structure changes do
    not adversely affect your code.


    But you learned in the previous section that REF cursors perform, at a minimum,
    soft parsing. Other than the cumbersome coding that dynamic REF cursors present,
    what might be other reasons to avoid them? The biggest reason I can think of to
    avoid dynamic REF cursors is the possibility of SQL injection. SQL injection is
    a very real threat to your applications and, more importantly, your data. If your
    application code allows malicious users to attach their own SQL statements to
    your dynamically built queries, such attacks can pose a dangerous threat to the
    security of your data.


    #### The Threat of SQL Injection


    Dynamic SQL that allows a user to concatenate strings into statements without
    bind variables is not only a parsing, scalability, and maintainability nightmare;
    it also presents a very tangible security threat. Each time you allow someone
    to provide inputs from outside your control, your data is no longer safe. And
    to top it all off, the malicious user, because they are using *your* code, is
    executing their statements as *you*. You’ve opened the door and left your data
    vulnerable. Consider the example in [Listing 10-12](#Chapter10.html#list_10_12)
    that outlines an innocent-looking procedure subject to SQL injection:.


    ***Listing 10-12.** A Procedure Subject to SQL Injection (11.2.0.1)*


    `PROCEDURE get_concepts (ip_input      IN  NUMBER,`

    `                        ip_con_type   IN  VARCHAR2,`

    `                        ip_con_dt     IN  DATE,`

    `                        ip_con_cat    IN  VARCHAR2,`

    `                        op_rc        OUT  my_cv)`

    `IS`

    `    BEGIN`

    `       IF ( ip_input = 1 )`

    `       THEN`

    `       OPEN op_rc FOR`

    `             ''SELECT * FROM prod_concepts`

    `               WHERE concept_type  = ''''||ip_con_type||''''`

    `                 AND concept_dt    < ''''||ip_con_dt||'''''' ;`

    `       ELSE`

    `          OPEN op_rc FOR`

    `             ''SELECT * FROM prod_concepts`

    `               WHERE  concept_category = ''''||ip_con_cat||'''''' ;`

    `       END IF;`

    `    END get_concepts;`


    If someone wishes to do something they shouldn’t, such as gain access or something
    destructive, then these harmless looking parameters (obviously intended for input
    regarding product concept data) can easily be manipulated to where the resultant
    dynamic SQL queries end up looking similar to the following:


    `CREATE OR REPLACE`

    `    PROCEDURE get_concepts (ip_input      IN  NUMBER,`

    `                            ip_con_type   IN  VARCHAR2,`

    `                            ip_con_dt     IN  DATE,`

    `                            ip_con_cat    IN  VARCHAR2,`

    `                            op_rc        OUT  sys_refcursor )`

    `    IS`

    `        BEGIN`

    `           IF ( ip_input = 1 )`

    `          THEN`

    `                   DBMS_OUTPUT.PUT_LINE(`

    `                ''SELECT * FROM prod_concepts`

    `                  WHERE concept_type  = '''''' ||ip_con_type|| ''''''`

    `AND concept_dt    < '''''' || to_char(ip_con_dt, ''dd-mon-yyyy'' )` ![images](images/U003.jpg)

    ` ||'''''''' );`

    `          ELSE`

    `                   DBMS_OUTPUT.PUT_LINE(`

    `                ''SELECT * FROM prod_concepts`

    `                  WHERE  concept_category = '''''' || ip_con_cat||'''''''' );`

    `          END IF;`

    `       END get_concepts;`

    `   /`

    `scott%ORA11GR2> variable x refcursor`

    `scott%ORA11GR2> exec get_concepts( ip_input => 2, ip_con_type => null, ip_con_dt
    => null,` ![images](images/U003.jpg)

    ` ip_con_cat => ''''''||admin_pkg.change_app_passwd( ''''INJECTED'''' ) --'',
    op_rc => :x );`

    `SELECT * FROM prod_concepts`

    ` WHERE concept_category =`

    `''''||admin_pkg.change_app_passwd( ''INJECTED'' ) --''`


    `PL/SQL procedure successfully completed.`


    What has taken place here? In the call to this procedure, the input the user provides
    does not care about matching either the `concept_type` or the `concept_dt` and
    thus provides the actual SQL they intend to execute: `admin_pkg.change_app_passwd(''INJECTED'');`
    . The addition of the notation, `--`, just at the end of that input marks the
    start of an SQL comment. This is a clever way to *consume* the final quote provided
    by the application and not worry about having to match it.


    As you can see, dynamic SQL leaves the door wide open to malicious intruders.
    Any time you are not using bind variables, you are not only impeding application
    performance, you are putting your data at severe risk. Therefore, since dynamic
    REF cursors (and dynamic SQL of any kind) are fragile and prone to both error
    and risk, you need to ask yourself whether the added flexibility of coding applications
    that use REF cursors is worth the security risks and maintainability headaches.
    And if you have no other choice but to use REF cursors, keep the following in
    mind:


    *   If you must use REF cursors, use strongly-typed static REF cursors.

    *   If you cannot use a static REF cursor, then ensure that your dynamic REF cursor
    uses bind variables.


    #### Describing REF Cursor Columns


    In Oracle versions gone by, it was never the case that you could describe the
    columns of a REF cursor. You had to use a client external to the database if you
    wanted this functionality. This situation has changed as of Oracle version 11.1
    and later. As of Oracle 11.1, DBMS_SQL, a supplied package that lets you procedurally
    process a result set much like JDBC, works in tandem with REF cursor functionality
    to allow you to be able to describe your columns programmatically after opening
    your REF cursor. This functionality is possible because Oracle 11g allows a REF
    cursor to be converted to DBMS_SQL and vice versa. Consider the example in [Listing
    10-13](#Chapter10.html#list_10_13).


    ***Listing 10-13.** A REF Cursor That Uses DBMS_SQL to Describe Columns (11.2.0.1)*


    `DECLARE`

    `            lv_ref_cursor   SYS_REFCURSOR;`

    `            lv_col_cnt      NUMBER;`

    `            lv_desc_tab     DBMS_SQL.DESC_TAB;`

    `BEGIN`

    `            OPEN lv_rcursor FOR SELECT * FROM prod_concepts;`


    `            DBMS_SQL.DESCRIBE_COLUMNS`

    `            ( cur_id      => DBMS_SQL.TO_CURSOR_NUMBER(lv_ref_cursor),`

    `              col_cnt     => lv_col_cnt,`

    `              desc_tab    => lv_desc_tab );`


    `           FOR i IN 1 .. lv_col_cnt`

    `           LOOP`

    `                   DBMS_OUTPUT.PUT_LINE( lv_desc_tab(i).col_name );`

    `           END LOOP;`

    `END;`

    `/`


    The salient part of this example is the following code snippet:


    `cur_id      => DBMS_SQL.TO_CURSOR_NUMBER(lv_ref_cursor)`


    The function `TO_CURSOR_NUMBER` can convert any REF cursor (either strongly or
    weakly typed) to a SQL cursor number, which can then be passed to any DBMS_SQL
    subprograms. You can harness the capability of DBMS_SQL within REF cursor processing
    and provide your programs with further flexibility. Be aware, however, that once
    you convert a REF cursor to a DBMS_SQL cursor number, you can no longer use native
    dynamic SQL operations to access it. You can use the DBMS_SQL.TO_REFCURSOR function
    to switch the cursor number back to a REF cursor, but be aware that this latest
    version of the REF cursor will be weakly typed, even if it was strongly typed
    originally. So, as with any other PL/SQL cursor functionality, use this functionality
    with full knowledge of its side effects, as well as its benefits.'
  trans: "\n## 关于 REF 游标与 SQL 注入风险的讨论\n\n现在，由于你使用的是 REF 游标结构，它仍然会执行软解析。但至少，如果你使用了绑定变量，它就不会执行硬解析。因为游标*可能*不同，Oracle\
    \ RDBMS 认为它可能是不同的（因为它是动态的），所以总会进行某种解析。在你必须选择的所有游标类型中，这一个绝对应该是你的最后手段。动态 SQL 极其脆弱，难以编码、难以调优，也难以维护。代码依赖链不复存在，因此你只能*希望*数据结构的改变不会对你的代码产生不利影响。\n\
    \n但你在前一节已经了解到，REF 游标至少会执行软解析。除了动态 REF 游标带来的繁琐编码之外，避免使用它们的其他原因可能是什么？我能想到的避免动态 REF\
    \ 游标的最大原因是 SQL 注入的可能性。SQL 注入是对你的应用程序，更重要的，是你的数据的一个真实威胁。如果你的应用程序代码允许恶意用户将他们自己的\
    \ SQL 语句附加到你动态构建的查询中，此类攻击会对你的数据安全构成危险威胁。\n\n### SQL 注入的威胁\n\n允许用户在不使用绑定变量的情况下将字符串连接到语句中的动态\
    \ SQL，不仅是一个解析、可扩展性和可维护性的噩梦；它还带来了一个非常切实的安全威胁。每次你允许某人提供来自你控制范围之外的输入时，你的数据就不再安全。更糟糕的是，恶意用户因为他们使用的是*你的*代码，所以是以*你*的身份执行他们的语句。你打开了大门，让你的数据变得脆弱。考虑清单\
    \ 10-12 中的例子，它概述了一个看似无害但易受 SQL 注入影响的存储过程。\n\n**清单 10-12.** 一个易受 SQL 注入影响的过程 (11.2.0.1)\n\
    \n```\nPROCEDURE get_concepts (ip_input      IN  NUMBER,\n                   \
    \     ip_con_type   IN  VARCHAR2,\n                        ip_con_dt     IN  DATE,\n\
    \                        ip_con_cat    IN  VARCHAR2,\n                       \
    \ op_rc        OUT  my_cv)\nIS\n    BEGIN\n       IF ( ip_input = 1 )\n      \
    \ THEN\n       OPEN op_rc FOR\n             'SELECT * FROM prod_concepts\n   \
    \            WHERE concept_type  = ''||ip_con_type||''\n                 AND concept_dt\
    \    < ''||ip_con_dt||''' ;\n       ELSE\n          OPEN op_rc FOR\n         \
    \    'SELECT * FROM prod_concepts\n               WHERE  concept_category = ''||ip_con_cat||'''\
    \ ;\n       END IF;\n    END get_concepts;\n```\n\n如果有人希望做一些他们不应该做的事情，例如获取访问权限或进行破坏，那么这些看似无害的参数（显然用于输入产品概念数据）很容易被操纵，以至于最终生成的动态\
    \ SQL 查询最终看起来类似于以下内容：\n\n```\nCREATE OR REPLACE\n    PROCEDURE get_concepts (ip_input\
    \      IN  NUMBER,\n                            ip_con_type   IN  VARCHAR2,\n\
    \                            ip_con_dt     IN  DATE,\n                       \
    \     ip_con_cat    IN  VARCHAR2,\n                            op_rc        OUT\
    \  sys_refcursor )\n    IS\n        BEGIN\n           IF ( ip_input = 1 )\n  \
    \        THEN\n                   DBMS_OUTPUT.PUT_LINE(\n                'SELECT\
    \ * FROM prod_concepts\n                  WHERE concept_type  = ''' ||ip_con_type||\
    \ '''\nAND concept_dt    < ''' || to_char(ip_con_dt, 'dd-mon-yyyy' )\n ||''''\
    \ );\n          ELSE\n                   DBMS_OUTPUT.PUT_LINE(\n             \
    \   'SELECT * FROM prod_concepts\n                  WHERE  concept_category =\
    \ ''' || ip_con_cat||'''' );\n          END IF;\n       END get_concepts;\n  \
    \ /\nscott%ORA11GR2> variable x refcursor\nscott%ORA11GR2> exec get_concepts(\
    \ ip_input => 2, ip_con_type => null, ip_con_dt => null,\n ip_con_cat => '''||admin_pkg.change_app_passwd(\
    \ ''INJECTED'' ) --', op_rc => :x );\nSELECT * FROM prod_concepts\n WHERE concept_category\
    \ =\n''||admin_pkg.change_app_passwd( 'INJECTED' ) --'\n\nPL/SQL procedure successfully\
    \ completed.\n```\n\n这里发生了什么？在这个过程的调用中，用户提供的输入不关心匹配 `concept_type` 或 `concept_dt`，而是提供了他们实际要执行的\
    \ SQL：`admin_pkg.change_app_passwd('INJECTED');`。在该输入的末尾添加符号 `--`，表示 SQL 注释的开始。这是一个巧妙的方法来*消耗*应用程序提供的最终引号，而无需担心匹配它。\n\
    \n正如你所看到的，动态 SQL 为恶意入侵者敞开了大门。任何时候你不使用绑定变量，你不仅阻碍了应用程序性能，还将你的数据置于严重风险之中。因此，既然动态\
    \ REF 游标（以及任何形式的动态 SQL）是脆弱的，容易出错且具有风险，你需要问问自己，使用 REF 游标编码应用程序所带来的额外灵活性是否值得承担安全风险和可维护性的麻烦。如果你别无选择只能使用\
    \ REF 游标，请记住以下几点：\n\n*   如果必须使用 REF 游标，请使用强类型静态 REF 游标。\n*   如果无法使用静态 REF 游标，那么请确保你的动态\
    \ REF 游标使用绑定变量。\n\n### 描述 REF 游标的列\n\n在过去的 Oracle 版本中，描述 REF 游标的列是不可能的。如果你想拥有这个功能，必须使用数据库外部的客户端工具。这种情况从\
    \ Oracle 11.1 及更高版本开始发生了变化。从 Oracle 11.1 开始，`DBMS_SQL`（一个提供的包，允许你像 JDBC 一样以程序化方式处理结果集）与\
    \ REF 游标功能协同工作，使你能够在打开 REF 游标后以编程方式描述你的列。这种功能是可能的，因为 Oracle 11g 允许将 REF 游标转换为\
    \ `DBMS_SQL`，反之亦然。考虑清单 10-13 中的例子。\n\n**清单 10-13.** 使用 `DBMS_SQL` 描述列的 REF 游标\
    \ (11.2.0.1)\n\n```\nDECLARE\n            lv_ref_cursor   SYS_REFCURSOR;\n   \
    \         lv_col_cnt      NUMBER;\n            lv_desc_tab     DBMS_SQL.DESC_TAB;\n\
    BEGIN\n            OPEN lv_rcursor FOR SELECT * FROM prod_concepts;\n\n      \
    \      DBMS_SQL.DESCRIBE_COLUMNS\n            ( cur_id      => DBMS_SQL.TO_CURSOR_NUMBER(lv_ref_cursor),\n\
    \              col_cnt     => lv_col_cnt,\n              desc_tab    => lv_desc_tab\
    \ );\n\n           FOR i IN 1 .. lv_col_cnt\n           LOOP\n               \
    \    DBMS_OUTPUT.PUT_LINE( lv_desc_tab(i).col_name );\n           END LOOP;\n\
    END;\n/\n```\n\n这个例子的关键部分是以下代码片段：\n\n```\ncur_id      => DBMS_SQL.TO_CURSOR_NUMBER(lv_ref_cursor)\n\
    ```\n\n函数 `TO_CURSOR_NUMBER` 可以将任何 REF 游标（无论是强类型还是弱类型）转换为一个 SQL 游标号，然后可以将其传递给任何\
    \ `DBMS_SQL` 子程序。你可以在 REF 游标处理中利用 `DBMS_SQL` 的能力，为你的程序提供更大的灵活性。但请注意，一旦将 REF 游标转换为\
    \ `DBMS_SQL` 游标号，就不能再使用原生动态 SQL 操作来访问它。你可以使用 `DBMS_SQL.TO_REFCURSOR` 函数将游标号切换回\
    \ REF 游标，但请注意，这个最新版本的 REF 游标将是弱类型的，即使它最初是强类型的。因此，与任何其他 PL/SQL 游标功能一样，在充分了解其副作用以及好处的前提下使用此功能。\n"
- fmt: '### 总结


    为应用需求选择合适的游标类型可能决定应用的成败。如果有机会使用静态SQL，请务必使用，不要犹豫。在隐式游标和显式游标之间选择时，尽可能优先使用隐式游标。你的性能将得到提升，可扩展性将变得可衡量，你的用户也会表示赞赏。然而，如果你在执行需要同时以过程方式处理数据的批量处理，或者将结果集传递给客户端应用，那么你将别无选择，只能使用显式游标。


    当需要选择`REF`游标（你的应用已确定不可避免）时，看看是否可以通过使用强类型的`REF`游标来实现目标。创建编译器可知的代码应是你的首要目标之一。请记住，动态代码本质上是脆弱且容易出错的。但如果你必须使用动态`REF`游标，请确保你使用了绑定变量——不仅仅是为了运行时的性能提升，也是为了安心于安全。SQL注入正伺机攻击任何掉以轻心的应用。


    作为开发者的职责，是为正确的工作使用正确的工具。所有这些游标类型都有其适用的特定场景。确保你对其风险和缺陷以及好处有充分的理解。你的游标选择应以最大化性能、减少担忧、并在应用用户群中提升你的受欢迎度的方式做出。所以，尝试用不同的方法实践。权衡一种方法与另一种方法。牢记优先顺序，并且当你不得不使用隐式游标之外的东西时，要明智而审慎地使用。


    ## 第11章


    ## 大型PL/SQL编程


    **作者：Martin Büchi**


    大多数业务应用都是数据密集型的，因此其核心需要一个数据库。这些应用通常会使用数年甚至数十年。在此期间，用户界面有时会被完全替换或扩展以保持其先进性。而数据模型和业务逻辑，通常随着所支持的业务流程更稳定地演进。许多这类应用最终会变得庞大，无论它们是从小处起步（例如用APEX替代电子表格）还是从一开始就复杂。因此，我们需要一种适合开发和维护面向数据的业务逻辑、并能持续多年的架构和编程语言。Oracle数据库中的`PL/SQL`理想地契合了这些需求。


    `PL/SQL`中的业务逻辑可能导致大量的`PL/SQL`代码；例如，我公司的旗舰应用有1100万行代码，并由170名开发人员维护。这才是真正的大型编程。在任何语言中进行有效且高效的大型编程都需要良好的模块化和基于严格遵循编程规范的高度一致性。`PL/SQL`为实现和强制这些方面提供了坚实的基础。此外，它还支持面向对象编程，这显著提高了代码重用率，从而带来成本降低和质量提升。


    本章首先描述在何时以及为何使用`PL/SQL`编写业务逻辑是一个好的选择，然后解释掌握大型`PL/SQL`编程关键成功因素的方法。


    ### 作为基于`PL/SQL`的应用服务器的数据库


    软件架构和编程语言必须选择以最好地满足业务需求。因此，用`PL/SQL`编码业务逻辑最有说服力的论据是基于此架构的长期成功的应用。Avaloq银行业务系统就是这样一个应用，并作为案例研究。从这个案例研究中，我推导出这种架构的优势。因为没有一种架构是普遍适用的，了解其局限性也很重要。


    #### 案例研究：Avaloq银行业务系统


    Avaloq银行业务系统（ABS）是一个完整的核⼼银行业系统，具备支付、投资和融资功能。它提供最终用户图形界面（GUI）以及对消息和文件的批处理。超过65家银行，每家有20到5000个并发最终用户，在七个国家使用它。实时联机事务处理（OLTP）和报告都在同一个数据库中实现。


    ABS采用物理三层架构，如[图11-1](#Chapter11.html#fig_11_1)所示。用`.NET`实现的瘦富客户端提供了高效的用户交互和最佳的`Windows`集成。中间层负责电话集成、外部认证以及`Oracle
    Net`与`Windows Communication Foundation`之间的协议转换，这样桌面上就不需要`Oracle`客户端，防火墙可以禁止来自最终用户`PC`的直接`SQL`访问，并且客户端网络中的网络加密是免费可用的。客户端和中间层都不包含任何业务逻辑；事实上，它们可以不经修改地用于任意的`ERP`应用。


    业务逻辑驻留在后端——即`Oracle`数据库中。数据库充当基于`PL/SQL`的应用服务器，并基于具有数据访问层、业务逻辑层和表示层的逻辑三层架构。相同的`PL/SQL`业务逻辑代码在批处理和图形界面会话中执行。例如，无论是从文件读入系统还是由职员在图形界面上输入，支付交易都以相同的方式处理。


    在Avaloq银行业务系统中，图形界面会话的状态存储在`PL/SQL`包体全局变量中。每个字段值都被发送到服务器进行验证和派生字段的计算。业务事务在`PL/SQL`内存中构建，并在用户最终确定后持久化。会话状态的最佳存储位置（数据库表、数据库服务器内存、中间层或客户端）是一个常引发激烈争论的话题。因为即使会话状态不保存在数据库中，大部分业务逻辑也可以用`PL/SQL`实现，所以无论你的应用将会话状态存储在哪里，本章内容都具有相关性。


    ![images](images/1101.jpg)


    **图 11-1.** Avaloq银行业务系统技术架构


    Avaloq银行业务系统的开发始于1993年，使用`Oracle 7`。将业务逻辑放在`Oracle`数据库中的基本架构自那时起一直保持不变。最初的图形界面是用`HyperCard`编写的；此后它被`Java
    AWT`、`Java Swing`和基于`.NET`的实现替换过三次，并且未来很可能成为`Web`图形界面。


    Avaloq是一家希望利润最大化的商业公司。我们选择所描述的架构是为了最大化客户满意度和开发者生产力，并定期对其进行重新评估。诚然，在1993年Avaloq银行业务系统开发开始时，还没有商业应用服务器。然而，我们保留当前的架构是因为它运行良好，而不是因为迁移到应用服务器的成本会非常高昂。事实上，我们在2006年由一位具有`JEE`背景和`Java`认证的工程师设计数据库供应和持续集成系统时，选择了类似的架构。我们有时需要解释架构选择的原因，但在过去的17年里，我们从未因架构问题而丢失一单销售。


    许多其他`ERP`和银行业应用，包括`IFS Applications`、`Oracle E-Business Suite`和`Oracle Fusion
    Applications`，都包含数百万行`PL/SQL`代码。`Oracle`对`PL/SQL`的坚定承诺体现在其用`PL/SQL`实现`Application
    Express (APEX)`上，以及对`PL/SQL`的持续增强，例如在11gR2中引入的基于版本的重定义。'
  raw: '### Summary


    Choosing the right types of cursors for your application needs can make or break
    your application. If you have the opportunity to use static SQL, do so and don’t
    look back. When choosing between implicit and explicit cursors, defer to implicit
    cursors whenever possible. Your performance will be increased, your scalability
    will be measurable, and your users will thank you. However, if you are performing
    bulk processing where you need to also process the data procedurally, or you are
    passing a result set to a client application, you will have little choice but
    to use an explicit cursor.


    When choosing a REF cursor (that your application needs have deemed inevitable),
    see if you can meet your goal by use of a strongly-typed REF cursor. Creating
    compiler-aware code should be one of your paramount goals. Remember that dynamic
    code is fragile and error-prone by its very nature. But if you must use dynamic
    REF cursors, ensure that you are using bind variables—not just for the runtime
    gains, but for the security peace of mind as well. SQL injection is just waiting
    for any application caught unaware.


    Your job, as a developer, is to use the right tools for the right job. All of
    these cursor types are right for a particular purpose. Ensure you have a good
    understanding of the risks and pitfalls, in addition to the benefits. Your cursor
    choice should be made in a way that maximizes your performance, decreases your
    concerns, and increases your popularity amongst your application user community.
    So, try out things different ways. Weigh one method versus another. Keep the order
    of precedence in mind, and when you must use something other than an implicit
    cursor, do so judiciously and wisely.


    ## C H A P T E R  11


    ## PL/SQL Programming in the Large


    **by Martin Büchi**


    Most business applications are data-centric and therefore require a database at
    their core. These applications are commonly used for years or even decades. During
    this time, the user interface is sometimes completely replaced or extended to
    keep it state of the art. The data model and the business logic, on the other
    hand, usually evolve more steadily along with the supported business processes.
    Many of these applications end up large, whether they start small (such as an
    APEX replacement of a spreadsheet) or are complex from the onset. Thus, we need
    an architecture and a programming language suitable for developing and maintaining
    data-centric business logic for years. PL/SQL in the Oracle database ideally fits
    these requirements.


    Business logic in PL/SQL can lead to lots of PL/SQL code; my company''s flagship
    application, for example, has 11 million lines and is maintained by 170 developers.
    This is true programming in the large. Effective and efficient programming in
    the large in any language requires good modularization and high uniformity based
    on strict adherence to programming conventions. PL/SQL provides solid foundations
    to implement and enforce these aspects. Furthermore, it allows for object-oriented
    programming, which significantly increases reuse and thereby leads to a cost reduction
    and quality increase.


    This chapter first describes when and why business logic in PL/SQL is a good option,
    then explains ways to master the key success factors for PL/SQL programming in
    the large.


    ### The Database as PL/SQL-Based Application Server


    Software architectures and programming languages must be chosen to best satisfy
    business requirements. Therefore, the most convincing argument for coding business
    logic in PL/SQL is a long-term successful application based on this architecture.
    The Avaloq Banking System is such an application and serves as case study. From
    this case study, I deduce the strengths of this architecture. Because no architecture
    is universally applicable, it is also important to know its limits.


    #### Case Study: The Avaloq Banking System


    The Avaloq Banking System (ABS) is a complete core banking system with payment,
    investment, and financing functionality. It provides an end-user GUI and batch
    processing of messages and files. Over 65 banks with 20 to 5,000 concurrent end
    users each use it in seven countries. Real-time OLTP and reporting are implemented
    in the same database.


    The ABS has a physical three-tier architecture, as depicted in [Figure 11-1](#Chapter11.html#fig_11_1).
    The thin rich client implemented in .NET provides for efficient user interaction
    with optimal Windows integration. The middle tier is responsible for telephony
    integration, external authentication, and protocol conversion between Oracle Net
    and Windows Communication Foundation, so that no Oracle client is required on
    desktops, firewalls can prohibit direct SQL access from end-user PCs, and network
    encryption in the client network is available for free. Neither the client nor
    the middle tier contains any business logic; in fact, they could be used as-is
    for an arbitrary ERP application.


    The business logic resides in the backend—that is, the Oracle database. The database
    serves as a PL/SQL-based application server and is based on a logical three-tier
    architecture with data access, business logic, and presentation layers. The same
    PL/SQL business logic code is executed in batch processing and GUI sessions. For
    example, a payment transaction is handled the same way whether it is read into
    the system from a file or entered by a clerk on the GUI.


    In the Avaloq Banking System, the state of GUI sessions is stored in PL/SQL package
    body global variables. Every field value is sent to the server for validation
    and calculation of derived fields. Business transactions are built up in PL/SQL
    memory and are persisted upon finalization by the user. The best location of the
    session state (database tables, database server memory, middle tier, or client)
    is an often emotional topic of debate. Because large parts of the business logic
    can be implemented in PL/SQL even if the session state is not kept in the database,
    this chapter is relevant no matter where your application stores the session state.


    ![images](images/1101.jpg)


    ***Figure 11-1.** Avaloq Banking System technical architecture*


    Development of the Avaloq Banking System started in 1993 with Oracle 7\. The basic
    architecture with the business logic in the Oracle database has been the same
    since the beginning. The original GUI was written in HyperCard; it has since been
    replaced three times by Java AWT, Java Swing, and .NET based implementations and
    may well become a Web GUI in the future.


    Avaloq is a commercial company that wants to maximize profit. We have chosen the
    described architecture to maximize customer satisfaction and developer productivity
    and periodically reevaluate it. Admittedly, no commercial application servers
    existed in 1993 when development of the Avaloq Banking System started. However,
    we keep the current architecture because it works very well and not because a
    migration to an application server would be very expensive. In fact, we chose
    a similar architecture for our database provisioning and continuous integration
    system, which was designed in 2006 by an engineer with JEE background and Java
    certification. We sometimes have to explain the reasons for our architecture choice,
    but we haven''t lost a single sales case in the past 17 years because of our architecture.


    Many other ERP and banking applications, including IFS Applications, Oracle E-Business
    Suite, and Oracle Fusion Applications contain several million lines of PL/SQL.
    Oracle''s strong commitment to PL/SQL is manifested by its implementation of Application
    Express (APEX) in PL/SQL and by the continuous enhancements of PL/SQL, such as
    edition-based redefinition in 11gR2.'
  trans: '### 总结


    为应用需求选择合适的游标类型可能决定应用的成败。如果有机会使用静态 SQL，请务必使用，不要犹豫。在隐式游标和显式游标之间选择时，尽可能优先使用隐式游标。你的性能将得到提升，可扩展性将变得可衡量，你的用户也会表示赞赏。然而，如果你在执行需要同时以过程方式处理数据的批量处理，或者将结果集传递给客户端应用，那么你将别无选择，只能使用显式游标。


    当需要选择`REF`游标（你的应用已确定不可避免）时，看看是否可以通过使用强类型的`REF`游标来实现目标。创建编译器可知的代码应是你的首要目标之一。请记住，动态代码本质上是脆弱且容易出错的。但如果你必须使用动态`REF`游标，请确保你使用了绑定变量——不仅仅是为了运行时的性能提升，也是为了安心于安全。SQL
    注入正伺机攻击任何掉以轻心的应用。


    作为开发者的职责，是为正确的工作使用正确的工具。所有这些游标类型都有其适用的特定场景。确保你对其风险和缺陷以及好处有充分的理解。你的游标选择应以最大化性能、减少担忧、并在应用用户群中提升你的受欢迎度的方式做出。所以，尝试用不同的方法实践。权衡一种方法与另一种方法。牢记优先顺序，并且当你不得不使用隐式游标之外的东西时，要明智而审慎地使用。


    ## 第 11 章


    ## 大型 PL/SQL 编程


    **作者：Martin Büchi**


    大多数业务应用都是数据密集型的，因此其核心需要一个数据库。这些应用通常会使用数年甚至数十年。在此期间，用户界面有时会被完全替换或扩展以保持其先进性。而数据模型和业务逻辑，通常随着所支持的业务流程更稳定地演进。许多这类应用最终会变得庞大，无论它们是从小处起步（例如用
    APEX 替代电子表格）还是从一开始就复杂。因此，我们需要一种适合开发和维护面向数据的业务逻辑、并能持续多年的架构和编程语言。Oracle 数据库中的`PL/SQL`理想地契合了这些需求。


    `PL/SQL`中的业务逻辑可能导致大量的`PL/SQL`代码；例如，我公司的旗舰应用有 1100 万行代码，并由 170 名开发人员维护。这才是真正的大型编程。在任何语言中进行有效且高效的大型编程都需要良好的模块化和基于严格遵循编程规范的高度一致性。`PL/SQL`为实现和强制这些方面提供了坚实的基础。此外，它还支持面向对象编程，这显著提高了代码重用率，从而带来成本降低和质量提升。


    本章首先描述在何时以及为何使用`PL/SQL`编写业务逻辑是一个好的选择，然后解释掌握大型`PL/SQL`编程关键成功因素的方法。


    ### 作为基于`PL/SQL`的应用服务器的数据库


    软件架构和编程语言必须选择以最好地满足业务需求。因此，用`PL/SQL`编码业务逻辑最有说服力的论据是基于此架构的长期成功的应用。Avaloq 银行业务系统就是这样一个应用，并作为案例研究。从这个案例研究中，我推导出这种架构的优势。因为没有一种架构是普遍适用的，了解其局限性也很重要。


    #### 案例研究：Avaloq 银行业务系统


    Avaloq 银行业务系统（ABS）是一个完整的核⼼银行业系统，具备支付、投资和融资功能。它提供最终用户图形界面（GUI）以及对消息和文件的批处理。超过 65
    家银行，每家有 20 到 5000 个并发最终用户，在七个国家使用它。实时联机事务处理（OLTP）和报告都在同一个数据库中实现。


    ABS 采用物理三层架构，如图 11-1 所示。用`.NET`实现的瘦富客户端提供了高效的用户交互和最佳的`Windows`集成。中间层负责电话集成、外部认证以及`Oracle
    Net`与`Windows Communication Foundation`之间的协议转换，这样桌面上就不需要`Oracle`客户端，防火墙可以禁止来自最终用户`PC`的直接`SQL`访问，并且客户端网络中的网络加密是免费可用的。客户端和中间层都不包含任何业务逻辑；事实上，它们可以不经修改地用于任意的`ERP`应用。


    业务逻辑驻留在后端——即`Oracle`数据库中。数据库充当基于`PL/SQL`的应用服务器，并基于具有数据访问层、业务逻辑层和表示层的逻辑三层架构。相同的`PL/SQL`业务逻辑代码在批处理和图形界面会话中执行。例如，无论是从文件读入系统还是由职员在图形界面上输入，支付交易都以相同的方式处理。


    在 Avaloq 银行业务系统中，图形界面会话的状态存储在`PL/SQL`包体全局变量中。每个字段值都被发送到服务器进行验证和派生字段的计算。业务事务在`PL/SQL`内存中构建，并在用户最终确定后持久化。会话状态的最佳存储位置（数据库表、数据库服务器内存、中间层或客户端）是一个常引发激烈争论的话题。因为即使会话状态不保存在数据库中，大部分业务逻辑也可以用`PL/SQL`实现，所以无论你的应用将会话状态存储在哪里，本章内容都具有相关性。


    ![images](img/1101.jpg)


    **图 11-1.** Avaloq 银行业务系统技术架构


    Avaloq 银行业务系统的开发始于 1993 年，使用`Oracle 7`。将业务逻辑放在`Oracle`数据库中的基本架构自那时起一直保持不变。最初的图形界面是用`HyperCard`编写的；此后它被`Java
    AWT`、`Java Swing`和基于`.NET`的实现替换过三次，并且未来很可能成为`Web`图形界面。


    Avaloq 是一家希望利润最大化的商业公司。我们选择所描述的架构是为了最大化客户满意度和开发者生产力，并定期对其进行重新评估。诚然，在 1993 年 Avaloq
    银行业务系统开发开始时，还没有商业应用服务器。然而，我们保留当前的架构是因为它运行良好，而不是因为迁移到应用服务器的成本会非常高昂。事实上，我们在 2006
    年，由一位具有`JEE`背景和`Java`认证的工程师设计数据库供应和持续集成系统时，选择了类似的架构。我们有时需要解释架构选择的原因，但在过去的 17 年里，我们从未因架构问题而丢失一单销售。


    许多其他`ERP`和银行业应用，包括`IFS Applications`、`Oracle E-Business Suite`和`Oracle Fusion
    Applications`，都包含数百万行`PL/SQL`代码。`Oracle`对`PL/SQL`的坚定承诺体现在其用`PL/SQL`实现`Application
    Express (APEX)`上，以及对`PL/SQL`的持续增强，例如在 11gR2 中引入的基于版本的重定义。'
- fmt: '#### 业务逻辑置于数据库中的优势


    Avaloq 从业务逻辑编码于数据库中获得了以下优势：

    *   **简单性**：大多数开发人员只需为单一层次使用一种语言进行编码。他们可以编写完整的业务功能，而无需花费时间与其他层次的开发人员协调和等待他们完成工作。此外，并发模型使得开发与其他程序并行运行的程序变得容易。

    *   **性能**：包括批量操作在内的数据访问在数据库内部直接执行是最快的。这与 Exadata 的基本思想相同：让处理更接近数据，并仅在网络上发送最少的数据。对于批处理（这是大多数
    OLTP 银行业务活动），所有处理都可以在数据库中完成。

    *   **安全性**：定义者权限（definer rights）存储过程更容易确保未经授权的人员无法从数据库外部访问关键信息。所有数据都可以驻留在锁定的模式中，外部访问可以限制到少数几个包。不需要授予直接的表或视图访问权限。如果业务逻辑位于数据库外部，那么（至少在一段时间后）会有多个应用程序直接访问数据库。这使得难以强制执行一致的安全性。存储在应用服务器中的密码很容易被滥用来直接访问数据。此外，服务器中的会话状态可以防止欺骗攻击。

    *   **一致性**：我信任 Oracle 的读一致性。如果我必须在繁重的 OLTP 活动的同时基于中间层缓存显示实时的客户投资组合，我会睡不安稳。

    *   **来自任何环境的可用性**：许多应用程序需要与其他应用程序交互。存储过程可以通过`JDBC`、`OCI`、`ODBC`等从任何语言调用。当然，这对于
    Web 服务也是如此。

    *   **参与分布式事务**：分布式事务对于业务系统中的接口至关重要，以确保只执行一次。Oracle 作为事务参与者的分布式事务设置简单，并且得到大多数事务协调器的支持。另一方面，在连接到多供应商环境中数据库的
    Web 服务或`CORBA`中间层上，为任意接口设置分布式事务是一场噩梦。

    *   **集中的单层部署**：大多数增强功能和错误修复只需要在单个层次上进行更改，即使需要修改表和业务逻辑。

    *   **可扩展性**：得益于日益强大的服务器和通过`Real Application Cluster`实现的水平扩展，Oracle 数据库在单机箱内扩展良好，并可横向扩展。

    *   **稳定性和可靠性**：Oracle 数据库是一个异常稳定可靠的执行环境。


    三层架构的大部分优势源于数据访问、业务逻辑和呈现的逻辑分离而非物理分离。这种逻辑分离以及由此带来的好处，也可以通过数据库内部的模块化来实现，如下所述。


    存储过程可以用`PL/SQL`、`Java`、`.NET`或几乎任何语言作为外部过程来编码。`PL/SQL`是我的默认选择。


    ##### PL/SQL 存储过程


    `PL/SQL`是一种命令式`3GL`语言，专为无缝处理`SQL`而设计，为编写业务逻辑提供了额外的好处。图 11-2 展示了其部分关键优势。


    ![images](images/1102.jpg)


    `Figure 11-2. Selected key benefits of PL/SQL`


    此外，基于版本的重定义（edition-based redefinition）为`PL/SQL`代码与其他对象类型的在线应用升级提供了支持。`PL/SQL`也在`TimesTen`内存数据库中运行，从而将相同的优势带到缓存在内存中的数据，以实现更高的性能。


    ##### Java 存储过程


    Java 存储过程不像`PL/SQL`那样提供无缝的`SQL`集成。事实上，Java 没有`Figure 11-2`中列出的任何优势。此外，从 Oracle
    11gR2 开始，从 Java 存储过程内部调用`SQL`的性能明显低于从`PL/SQL`或数据库外部运行的 Java。考虑到从数据库外部使用`JDBC`的性能非常出色，这种情况很可能会改善。另一方面，使用
    11g 即时编译器的算法性能优于`PL/SQL`，并且几乎与数据库外部的 Java 相当。


    如果某些功能在`PL/SQL`中无法实现（例如 Oracle 10g 之前的`OS`调用），或者现有 Java 库能极大简化工作，Avaloq 会使用 Java。例如，Avaloq
    安装程序使用 Java 检查`ZIP`文件的签名，数据库供应系统使用 Java 通过`JDBC`在数据库之间传输`LOB`——而不是使用仅在`DDL`中支持`LOB`而不支持`DML`的`PL/SQL`通过数据库链接传输。许多库的可用性绝对是
    Java 生态系统的优势。然而，这一事实经常被高估。对于业务应用程序，通常只有基础设施库有用，而且即使这些库也可能不够。例如，没有一个 Java 日志框架支持每条目安全、将同一问题的日志调用分组到单个条目中，或在条目上进行工作流处理。此外，新库的不断出现可能导致“强迫性最新框架采用障碍”（Compulsive
    Latest Framework Adoption Disorder），其典型表现是在一个产品中使用许多相似的库，因为对大型产品进行完整重构的努力是巨大的。最后但并非最不重要的一点是，`PL/SQL`也附带了大量的库：`PL/SQL
    Packages and Types Reference`在 11gR2 中已增长到 5,900 页。


    Java 的一个好处是相同的代码，例如数据验证，可以在数据库和另一个层次中运行。后者的另一种选择是从领域特定语言生成`PL/SQL`和另一种语言的代码。在
    Avaloq 银行系统中，超过一半的`PL/SQL`代码是从更高层次的领域特定语言生成的。


    虽然 Oracle 允许开发人员在基于子程序（过程或函数）的基础上决定使用`PL/SQL`或`Java`作为实现语言，但我尽量避免难以维护的混乱混合。


    `Java stored procedure`（Java 存储过程）实际上是一个用词不当的术语。Oracle 数据库包含一个完整的 Java 虚拟机（`JVM`）。因此，可以用数十种能够生成
    Java 字节码的编译器的语言来编写存储过程。然而，从使用`AspectJ`的面向切面编程到使用`Scala`的函数式编程，没有一种语言具备无缝的`SQL`嵌入。


    `SQLJ`是 Java 的基于预处理器的扩展，为更简单的`SQL`集成和自动绑定变量添加了语法糖。然而，它缺乏对嵌入式`SQL`的编译时检查以及对引用对象修改后自动失效的依赖项跟踪。自动失效将需要对`JVM`进行增强，无法通过语言扩展的方式添加。


    `SQLJ`的支持情况参差不齐。很少有`IDE`支持`SQLJ`。Oracle 自己在原始的 10g 版本中停止了对`SQLJ`的支持。在客户投诉之后，`SQLJ`在
    10.1.0.4 补丁集中重新出现。


    ##### .NET 和基于 C 的外部过程


    外部过程（在 Oracle 文档中也互换地称为子程序）是具有`PL/SQL`调用规范并在另一种语言中实现的子程序。通过在`.NET`中编码存储过程，您将自己限制在
    Windows 上运行 Oracle 数据库。用 C 或其他可从 C 调用的语言编写的外部过程会阻碍可移植性。此外，它们在自己的进程中运行。因此，基于 C
    的外部过程与在中间层中的业务逻辑相比没有显著优势，除了它们可以通过数据库调用。'
  raw: '#### Strengths of Business Logic in the Database with PL/SQL


    Avaloq profits from the following strengths of coding the business logic in the
    database:


    *   *Simplicity*: Most developers need to code in only one language for a single
    tier. They can code complete business functions without losing time coordinating
    with and waiting for developers of other tiers to do their jobs. Furthermore,
    the concurrency model makes it easy to develop programs that run parallel to others.

    *   *Performance*: Data access including bulk operations is fastest directly in
    the database. It''s the same basic idea as in Exadata: bring the processing closer
    to the data and send only the minimum over the network. For batch processing,
    which is the majority of the OLTP banking activity, all processing can be done
    in the database.

    *   *Security*: Definer rights procedures make it easier to ensure that no critical
    information can be accessed by unauthorized persons from outside the database.
    All data can reside in locked schemas and external access can be restricted to
    a few packages. No direct table or view access needs to be granted. If the business
    logic is outside the database, there are (at least after some time) multiple applications
    that directly access the database. This makes it hard to enforce consistent security.
    Passwords stored in application servers can be easily misused to directly access
    data. Furthermore, the session state in the server prevents spoofing attacks.

    *   *Consistency*: I trust Oracle''s read consistency. I wouldn''t sleep well
    if I had to display real-time customer portfolios based on middle-tier caches
    simultaneous with heavy OLTP activity.

    *   *Availability from any environment*: Many applications need to interface with
    others. Stored procedures can be invoked from any language through JDBC, OCI,
    ODBC, etc. Of course, this is true for web services as well.

    *   *Participation in distributed transactions*: Distributed transactions are
    crucial for interfaces in business systems to ensure once and only once execution.
    Distributed transactions with Oracle as transaction participant are simple to
    set up and are supported by most transaction coordinators. Setting up distributed
    transactions for arbitrary interfaces over a Web service or CORBA middle tier
    connected to a database in a multi-vendor environment, on the other hand, is a
    nightmare.

    *   *Centralized, single-tier deployment*: Most enhancements and bug fixes require
    a change on only a single tier, even if tables and business logic need to be modified.

    *   *Scalability*: The Oracle database scales nicely in the box thanks to ever
    more powerful servers and horizontally outside the box with Real Application Cluster.

    *   *Stability and reliability*: The Oracle database is an exceptionally stable
    and reliable execution environment.


    Most benefits of three-tier architectures stem from the logical rather than the
    physical separation of data access, business logic, and presentation. The logical
    separation, and therefore the benefits, can also be achieved with modularization
    inside the database, as described later.


    Stored procedures can be coded in PL/SQL, in Java, in .NET, or in almost any language
    as external procedures. PL/SQL is my default.


    ##### PL/SQL Stored Procedures


    PL/SQL, an imperative 3GL designed specifically for seamless processing of SQL,
    provides additional benefits for coding business logic. Selected key benefits
    are illustrated in [Figure 11-2](#Chapter11.html#fig_11_2).


    ![images](images/1102.jpg)


    ***Figure 11-2.** Selected key benefits of PL/SQL*


    Furthermore, edition-based redefinition provides for online application upgrades
    of PL/SQL code together with other object types. PL/SQL also runs in the TimesTen
    in-memory database, thereby bringing the same advantages to data cached in memory
    for even high performance.


    ##### Java Stored Procedures


    Java stored procedures don''t provide the same seamless SQL integration as PL/SQL.
    In fact, Java doesn''t have any of the benefits listed in [Figure 11-2](#Chapter11.html#fig_11_2).
    Furthermore, as of Oracle 11gR2, the performance of SQL calls from within a Java
    stored procedure is significantly worse than those from PL/SQL or Java running
    outside the database. This may well improve given that with the JDBC performance
    from outside the database is excellent. The algorithmic performance with the 11g
    just-in-time compiler, on the other hand, is better than that of PL/SQL and almost
    on par with Java outside the database.


    Avaloq uses Java if something is not possible in PL/SQL, such as OS calls prior
    to Oracle 10g, or where an existing Java library greatly simplifies the work.
    For example, the Avaloq installer checks the signature of ZIP files using Java
    and the database provisioning system transfers LOBs between databases using Java
    over JDBC—rather than PL/SQL over database links, which only support LOBs in DDL
    and not DML. The availability of many libraries is definitely a strength of the
    Java ecosystem. This fact is, however, often overrated. For business applications,
    often only infrastructure libraries are useful, and even those might be insufficient.
    For example, none of the Java logging frameworks support per-entry security, grouping
    of log calls of the same problem into a single entry, or a workflow on entries.
    Furthermore, the constant appearance of new libraries can lead to Compulsive Latest
    Framework Adoption Disorder, which commonly manifests itself in many similar libraries
    being used in a single product because the effort for a complete refactoring of
    large products is prohibitive. Last but not least, PL/SQL also comes with a formidable
    number of libraries: the *PL/SQL Packages and Types Reference* has grown to 5,900
    pages in 11gR2.


    A benefit of Java is that the same code, such as data validation, can run in the
    database and in another tier. An alternative for the latter case is the generation
    of code in PL/SQL and another language from a domain-specific language. In the
    Avaloq Banking System, over half of the PL/SQL code is generated from higher-level
    domain-specific languages.


    Whereas Oracle lets the developer decide between PL/SQL and Java as implementation
    language on a subprogram (procedure or function) by subprogram basis, I try to
    avoid a difficult-to-maintain wild mix.


    *Java stored procedure* is actually a misnomer. The Oracle database includes a
    complete Java Virtual Machine (JVM). It is, therefore, possible to write stored
    procedures in any of the dozens of language with a compiler that generates Java
    byte code. From aspect-oriented programming with AspectJ to functional programming
    with Scala, however, none of the languages sport a seamless SQL embedding.


    SQLJ, a preprocessor-based extension of Java, adds syntactic sugar for simpler
    SQL integration and automatic bind variables. However, it lacks compile-time checking
    of embedded SQL and dependency tracking for automatic invalidation after modifications
    of referenced objects. Automatic invalidation would require an enhancement of
    the JVM and cannot be added by means of a language extension.


    SQLJ support is spotty. Few IDEs support SQLJ. Oracle itself ceased supporting
    SQLJ in the original 10g release. Following customer complaints, SQLJ reappeared
    in the 10.1.0.4 patch set.


    ##### .NET and C-Based External Procedures


    External procedures, or subprograms as they are interchangeably called in the
    Oracle documentation, are subprograms with a PL/SQL call specification and an
    implementation in another language. By coding stored procedures in .NET, you restrict
    yourself to running the Oracle database on Windows. External procedures, written
    in C or another language callable from C, hamper portability. Furthermore, they
    run in their own processes. Thus, C-based external procedures have no significant
    advantage over business logic in a middle tier except that they can be called
    through the database.'
  trans: '#### 业务逻辑置于数据库中的优势


    Avaloq 从将业务逻辑编码于数据库中获得了以下优势：

    *   **简单性**：大多数开发人员只需为单一层次使用一种语言进行编码。他们可以编写完整的业务功能，而无需花费时间与其他层次的开发人员协调和等待他们完成工作。此外，并发模型使得开发与其他程序并行运行的程序变得容易。

    *   **性能**：包括批量操作在内的数据访问在数据库内部直接执行是最快的。这与 Exadata 的基本思想相同：让处理更接近数据，并仅在网络上发送最少的数据。对于批处理（这是大多数
    OLTP 银行业务活动），所有处理都可以在数据库中完成。

    *   **安全性**：定义者权限（definer rights）存储过程更容易确保未经授权的人员无法从数据库外部访问关键信息。所有数据都可以驻留在锁定的模式中，外部访问可以限制到少数几个包。不需要授予直接的表或视图访问权限。如果业务逻辑位于数据库外部，那么（至少在一段时间后）会有多个应用程序直接访问数据库。这使得难以强制执行一致的安全性。存储在应用服务器中的密码很容易被滥用来直接访问数据。此外，服务器中的会话状态可以防止欺骗攻击。

    *   **一致性**：我信任 Oracle 的读一致性。如果我必须在繁重的 OLTP 活动的同时基于中间层缓存显示实时的客户投资组合，我会睡不安稳。

    *   **来自任何环境的可用性**：许多应用程序需要与其他应用程序交互。存储过程可以通过`JDBC`、`OCI`、`ODBC`等从任何语言调用。当然，这对于
    Web 服务也是如此。

    *   **参与分布式事务**：分布式事务对于业务系统中的接口至关重要，以确保只执行一次。Oracle 作为事务参与者的分布式事务设置简单，并且得到大多数事务协调器的支持。另一方面，在连接到多供应商环境中数据库的
    Web 服务或`CORBA`中间层上，为任意接口设置分布式事务是一场噩梦。

    *   **集中的单层部署**：大多数增强功能和错误修复只需要在单个层次上进行更改，即使需要修改表和业务逻辑。

    *   **可扩展性**：得益于日益强大的服务器和通过`Real Application Cluster`实现的水平扩展，Oracle 数据库在单机箱内扩展良好，并可横向扩展。

    *   **稳定性和可靠性**：Oracle 数据库是一个异常稳定可靠的执行环境。


    三层架构的大部分优势源于数据访问、业务逻辑和呈现的逻辑分离而非物理分离。这种逻辑分离以及由此带来的好处，也可以通过数据库内部的模块化来实现，如下所述。


    存储过程可以用`PL/SQL`、`Java`、`.NET`或几乎任何语言作为外部过程来编码。`PL/SQL`是我的默认选择。


    ##### PL/SQL 存储过程


    `PL/SQL`是一种命令式`3GL`语言，专为无缝处理`SQL`而设计，为编写业务逻辑提供了额外的好处。图 11-2 展示了其部分关键优势。


    ![images](img/1102.jpg)


    `图 11-2. PL/SQL 的部分关键优势`


    此外，基于版本的重定义（edition-based redefinition）为`PL/SQL`代码与其他对象类型的在线应用升级提供了支持。`PL/SQL`也在`TimesTen`内存数据库中运行，从而将相同的优势带到缓存在内存中的数据，以实现更高的性能。


    ##### Java 存储过程


    Java 存储过程不像`PL/SQL`那样提供无缝的`SQL`集成。事实上，Java 没有`图 11-2`中列出的任何优势。此外，从 Oracle 11gR2
    开始，从 Java 存储过程内部调用`SQL`的性能明显低于从`PL/SQL`或数据库外部运行的 Java。考虑到从数据库外部使用`JDBC`的性能非常出色，这种情况很可能会改善。另一方面，使用
    11g 即时编译器的算法性能优于`PL/SQL`，并且几乎与数据库外部的 Java 相当。


    如果某些功能在`PL/SQL`中无法实现（例如 Oracle 10g 之前的`OS`调用），或者现有 Java 库能极大简化工作，Avaloq 会使用 Java。例如，Avaloq
    安装程序使用 Java 检查`ZIP`文件的签名，数据库供应系统使用 Java 通过`JDBC`在数据库之间传输`LOB`——而不是使用仅在`DDL`中支持`LOB`而不支持`DML`的`PL/SQL`通过数据库链接传输。许多库的可用性绝对是
    Java 生态系统的优势。然而，这一事实经常被高估。对于业务应用程序，通常只有基础设施库有用，而且即使这些库也可能不够。例如，没有一个 Java 日志框架支持每条目安全、将同一问题的日志调用分组到单个条目中，或在条目上进行工作流处理。此外，新库的不断出现可能导致“强迫性最新框架采用障碍”（Compulsive
    Latest Framework Adoption Disorder），其典型表现是在一个产品中使用许多相似的库，因为对大型产品进行完整重构的努力是巨大的。最后但并非最不重要的一点是，`PL/SQL`也附带了大量的库：`PL/SQL
    Packages and Types Reference`在 11gR2 中已增长到 5,900 页。


    Java 的一个好处是相同的代码，例如数据验证，可以在数据库和另一个层次中运行。后者的另一种选择是从领域特定语言生成`PL/SQL`和另一种语言的代码。在
    Avaloq 银行系统中，超过一半的`PL/SQL`代码是从更高层次的领域特定语言生成的。


    虽然 Oracle 允许开发人员在基于子程序（过程或函数）的基础上决定使用`PL/SQL`或`Java`作为实现语言，但我尽量避免难以维护的混乱混合。


    `Java stored procedure`（Java 存储过程）实际上是一个用词不当的术语。Oracle 数据库包含一个完整的 Java 虚拟机（`JVM`）。因此，可以用数十种能够生成
    Java 字节码的编译器的语言来编写存储过程。然而，从使用`AspectJ`的面向切面编程到使用`Scala`的函数式编程，没有一种语言具备无缝的`SQL`嵌入。


    `SQLJ`是 Java 的基于预处理器的扩展，为更简单的`SQL`集成和自动绑定变量添加了语法糖。然而，它缺乏对嵌入式`SQL`的编译时检查以及对引用对象修改后自动失效的依赖项跟踪。自动失效将需要对`JVM`进行增强，无法通过语言扩展的方式添加。


    `SQLJ`的支持情况参差不齐。很少有`IDE`支持`SQLJ`。Oracle 自己在原始的 10g 版本中停止了对`SQLJ`的支持。在客户投诉之后，`SQLJ`在
    10.1.0.4 补丁集中重新出现。


    ##### .NET 和基于 C 的外部过程


    外部过程（在 Oracle 文档中也互换地称为子程序）是具有`PL/SQL`调用规范并在另一种语言中实现的子程序。通过在`.NET`中编码存储过程，您将自己限制在
    Windows 上运行 Oracle 数据库。用 C 或其他可从 C 调用的语言编写的外部过程会阻碍可移植性。此外，它们在自己的进程中运行。因此，基于 C
    的外部过程与在中间层中的业务逻辑相比没有显著优势，除了它们可以通过数据库调用。'
- fmt: '#### Limits of the Database as PL/SQL-Based Application Server


    If you are a hammer, everything looks like a nail. As a software engineer, on
    the other hand, you should be aware of the applicability limits of an architecture
    blueprint. The described business logic in `PL/SQL` in the database solution is
    an excellent fit for data centric `ERP` applications. On the other hand, it is
    not a good fit for computationally intensive applications requiring little data
    interaction.


    Furthermore, `PL/SQL` is not my first choice for the following tasks:


    *   `CPU` intensive tasks: `PL/SQL`’s algorithmic performance is below that of
    `C` and `Java`. Furthermore, `Oracle` license costs apply to `PL/SQL`. `Java`
    in commercial application servers incurs similar license costs, whereas no runtime
    license is required to run `C` or standalone `Java` programs. In the `Avaloq Banking
    System`, less than 50 percent of the `CPU` usage is `PL/SQL`; the rest is `SQL`.

    *   Programs using very large collections in memory: `PL/SQL` collections may
    require significantly more memory than their `C` counterparts. I take an in-depth
    look at memory usage later in this chapter.

    *   Very complex data structures: `PL/SQL` collections and records are sufficient
    for most tasks. However, others can be more easily expressed in a language with
    generic types, in-memory references, and automated garbage collection.


    ![images](images/square.jpg) Note: Vendor independence is sometimes cited as a
    reason against proprietary stored procedure languages. This argument is invalid
    because most applications are never ported to another database and because achieving
    good performance and correct concurrency handling on different databases requires
    multiple specific implementations rather than a single generic implementation.
    Tom Kyte argues this point in detail in *Expert Oracle Database Architectures*
    (Apress, 2005). I support every word he says on this topic in his book (and my
    paycheck doesn''t come from `Oracle`). It''s a different point if you don''t like
    a particular database vendor. But you should make the best use of the database
    you choose.


    #### Soft Factors


    Even though `Java` may have more sex appeal than `PL/SQL`, I’ve found that it
    is not harder (and, unfortunately, not easier) to hire `PL/SQL` programmers than
    to hire their `Java` counterparts. The learning curve is not much different. `PL/SQL`
    is easy to learn. The big challenges, especially for new graduates, are to understand
    the business requirements, learn programming in the large, grasp the application-specific
    frameworks and patterns, and write efficient `SQL`.


    `SQL` is also a problem if the business logic is written in `Java`. Of course,
    the trivial `SQL` statements can be generated by an object relation mapper. But
    the `SQL` statements that follow a few simple patterns are not the problem in
    `PL/SQL` either—it’s the complex statements that must be hand coded for optimal
    performance.


    Making the start easy for a new hire in a company with a multimillion line application
    is one of the main requirements of successful programming in the large.


    ### Requirements of Programming in the Large


    Having established the case for business logic in the database, let’s see how
    best to master all the `PL/SQL` you will write. Programming in the large can involve
    programming by larger groups of people or by smaller groups over longer time periods.
    Often the people maintaining a software solution change. As a case in point, none
    of the creators of `PL/SQL` in `Oracle 6` work in the `PL/SQL` group anymore.
    Because it is common for over two thirds of the lifetime cost of a piece of software
    to go to maintenance, efficiency in maintenance is a key requirement.


    Programming in the large requires an approach that delivers in time, budget, and
    external product quality to the users during the initial creation and future maintenance
    of software. Ignoring the process aspects, which are largely independent of the
    architecture and programming language, you need a high internal product quality
    to achieve the external goals. The main factors of internal product quality are
    simplicity, ease of understanding, extendibility, and reusability. The business-logic-in-the-database
    architecture is the cornerstone for simplicity. The other goals are achieved with
    naming and coding conventions, modularization, and object-oriented programming.
    The implementation of these aspects differs among programming languages. In this
    chapter, I explain how to implement these aspects in `PL/SQL`. Due to space constraints,
    I omit other relevant aspects of programming in the large, such as tooling, and
    of handling the usually associated large data volumes, such as information lifecycle
    management and design for performance and scalability.


    Successful programming in the large requires successful programming in the small.
    If code that somebody else wrote five years ago crashes, you will be thankful
    if she or he followed proper exception handling and error logging practices (which
    I omit in this chapter for brevity). Likewise, you''ll be glad if the code you
    modify contains unit tests or contracts in the form assertions, so you know you
    aren''t likely to break any of the 200 callers of the subprogram you change to
    fix the bug. Any type of programming requires logical thinking and pedantic exactness.'
