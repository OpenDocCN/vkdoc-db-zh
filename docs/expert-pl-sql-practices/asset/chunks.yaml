  trans: "\n# 批量收集的性能与内存开销\n\n## 集合类型性能比较\n\n再回到应使用哪种集合类型的问题上，从批量收集性能来看，所有类型似乎都差不多。以下演示（`bulk_which_collection_type.sql`）对三种集合类型的运行结果几乎完全相同：\n\
    \n```sql\nSQL> set timing on\nSQL> declare\n  2    type t_va is varray(1000) of\
    \ number;\n  3    type t_nt is table of number;\n  4    type t_aa is table of\
    \ number index by pls_integer;\n  5\n  6    va t_va;\n  7    nt t_nt;\n  8   \
    \ aa t_aa;\n  9  begin\n 10    for i in 1 .. 10000 loop\n 11\n 12      select\
    \ rownum\n 13      --\n 14      -- 注释掉你想测试的集合类型\n 15      --\n 16      bulk collect\
    \ into va\n 17      --bulk collect into nt\n 18      --bulk collect into aa\n\
    \ 19\n 20      from dual\n 21      connect by level <= 1000 ;\n 22    end loop;\n\
    \ 23  end;\n 24  /\n```\n\n```\nPL/SQL 过程已成功完成。\n```\n\n## 监控批量收集的开销\n\n在你急于将所有\
    \ PL/SQL 游标转换为使用批量收集操作之前，了解批量收集将对数据库会话产生的一项重要影响至关重要。如本章开头所述，数组处理是关于将数据检索到`缓冲区`中。该缓冲区必须存放在某处，而那个地方就在你会话的内存中。用\
    \ Oracle 的术语来说，你会话的内存是会话的用户全局区（UGA）。根据数据库的配置方式，会话 UGA 可能私有地保存在连接会话的进程全局区（PGA）中，也可能在系统全局区（SGA）中跨进程共享。关于\
    \ Oracle 专用服务器与共享服务器架构优缺点的讨论超出了本书范围；只需知道 PL/SQL 集合会消耗会话内存，如果你的集合很大或数据库中有大量并发会话，这很容易成为一个重要的考虑因素。\n\
    \n对于接下来的示例，将假设最常见的配置，即专用服务器连接，因此内存消耗的重点将放在 PGA 上。让我们探讨一下随着为批量收集使用越来越大的集合尺寸，内存消耗的变化情况。我还将介绍可用于`BULK\
    \ COLLECT`语句的`LIMIT`子句。\n\n![images](img/square.jpg) **注意** 接下来的示例将文本与代码交错呈现。你可以在名为`bulk_collect_memory.sql`的文件中找到完整的代码。\n\
    \n首先，我将重新连接以重置会话级别统计信息（包括 PGA 消耗）。\n\n```sql\nSQL> connect\nEnter user-name: *****\n\
    Enter password:  *****\n\nSQL> set serverout on\nSQL> declare\n  2    type t_row_list\
    \ is table of hardware.descr%type;\n  3    l_rows t_row_list;\n  4\n  5    l_pga_ceiling\
    \  number(10);\n```\n\n接下来，我将定义一个不同获取大小的数组，用于从 HARDWARE 表中检索一组行。因此，在第一次迭代中，将获取\
    \ 5 行，然后是 10 行，接着是 50 行，依此类推。\n\n```sql\n  7    type t_fetch_size is table of\
    \ pls_integer;\n  8    l_fetch_sizes t_fetch_size := t_fetch_sizes(5,10,50,100,500,1000,10000,100000,1000000);\n\
    \  9\n 10    rc      sys_refcursor;\n 11  begin\n 12    select value\n 13    into\
    \   l_pga_ceiling\n 14    from   v$mystat m, v$statname s\n 15    where  s.statistic#\
    \ = m.statistic#\n 16    and    s.name = 'session pga memory max';\n 17\n 18 \
    \   dbms_output.put_line('初始 PGA: '||l_pga_ceiling);\n 19\n 20    for i in 1 ..\
    \ l_fetch_sizes.count\n 21    loop\n```\n\n对于每个获取大小，我将使用`LIMIT`子句从表中获取一组行。\n\n\
    ```sql\n 22      open rc for select descr from hardware;\n 23      loop\n 24 \
    \        fetch rc bulk collect into l_rows limit l_fetch_sizes(i);\n 25      \
    \   exit when rc%notfound;\n 26      end loop;\n 27      close rc;\n 28\n```\n\
    \n然后，执行获取后，我将捕获会话级别的 PGA 统计信息，以查看该获取操作是否影响了数据库服务器上会话消耗的内存。以下是执行此操作的代码：\n\n```sql\n\
    \ 29      select value\n 30      into   l_pga_ceiling\n 31      from   v$mystat\
    \ m, v$statname s\n 32      where  s.statistic# = m.statistic#\n 33      and \
    \   s.name = 'session pga memory max';\n 34\n 35      dbms_output.put_line('获取大小:\
    \ '||l_fetch_sizes(i));\n 36      dbms_output.put_line('- PGA 最大值: '||l_pga_ceiling);\n\
    \ 37\n 38    end loop;\n 39\n 40  end;\n 41  /\n```\n\n```\n初始 PGA: 3175904\n\
    获取大小: 5\n- PGA 最大值: 3175904\n获取大小: 10\n- PGA 最大值: 3175904\n获取大小: 50\n- PGA 最大值:\
    \ 3241440\n获取大小: 100\n- PGA 最大值: 3306976\n获取大小: 500\n- PGA 最大值: 3306976\n获取大小:\
    \ 1000\n- PGA 最大值: 3372512\n获取大小: 10000\n- PGA 最大值: 4224480\n获取大小: 100000\n- PGA\
    \ 最大值: 12482016\n获取大小: 1000000\n- PGA 最大值: 95122912\n```\n"
- fmt: "`PL/SQL procedure successfully completed.`\n\n## 内存消耗与可扩展性问题\n\n一旦提取的大小超过\
    \ 1,000 行，PGA 消耗会从 3MB 增长到 95MB（当在单个提取调用中批量收集完整的 1,000,000 行数据集时）。如果你有数百个会话，每个会话都消耗数百兆字节的内存，这无疑会成为一个可扩展性威胁。除非你持有内存芯片公司的股票期权，否则使用过大的批量收集大小可能是个坏主意。因此，建议在不知道结果集大小（或近似大小）的情况下，永远不要在没有\
    \ `LIMIT` 子句的情况下对结果集执行 `FETCH BULK COLLECT`。\n\n## 极端情况演示\n\n极端情况下，一个失控的集合可能会耗尽服务器上的所有内存，并可能导致其崩溃。例如，下面的演示试图将十亿行数据批量收集到一个\
    \ PL/SQL 集合中；这个过程挂起了我的笔记本电脑（这就是为什么在本书的下载目录中找不到这个演示的脚本！）。\n\n```sql\nSQL> declare\n\
    \  2    type t_huge_set is table of number;\n  3    l_the_server_slaminator t_huge_set;\n\
    \  4  begin\n  5    select rownum\n  6    bulk collect into l_the_server_slaminator\n\
    \  7    from\n  8      ( select level from dual connect by level <= 1000 ),\n\
    \  9      ( select level from dual connect by level <= 1000 ),\n 10      ( select\
    \ level from dual connect by level <= 1000 );\n 11  end;\n 12  /\n```\n\n```\n\
    ERROR at line 1:\nORA-04030: out of process memory when trying to allocate 16396\
    \ bytes\n```\n\n## 关于 `pga_aggregate_target` 参数的说明\n\n你可能会认为数据库初始化参数 `pga_aggregate_target`\
    \ 能使你的系统免受此类问题的影响。这种想法并不正确。该参数仅适用于数据库可以按需内部调整的内存分配，例如用于排序或哈希的内存。如果你为 PL/SQL 集合内存请求\
    \ 100GB 的 PGA，数据库将尝试满足该请求，无论这可能带来多大的麻烦。\n\n## 利用自动优化进行性能权衡\n\n因此，表面上看，在使用批量操作时，需要在性能和内存消耗之间取得平衡。让我们通过利用隐式游标循环中的自动批量收集优化来探讨这个问题（当\
    \ `plsql_optimize_level` 设置为 2 或更高时，这在 10g 及以后版本中是默认设置）。我将重新连接以重置会话级别统计信息，然后从\
    \ `HARDWARE` 表中提取全部 1,000,000 行，这相当于上一个消耗了 95MB PGA 的示例的最后一次迭代。以下示例（`bulk_collect_perf_test_2.sql`）演示了使用自动批量收集优化提取\
    \ 1,000,000 行：\n\n```sql\nSQL> connect\nEnter user-name: *****\nEnter password:\
    \  *****\nSQL> alter session set plsql_optimize_level = 2;\n\nSession altered.\n\
    \nSQL> begin\n  2    for i in (\n  3      select descr d3\n  4      from   hardware\
    \ )\n  5    loop\n  6      null;\n  7    end loop;\n  8  end;\n  9  /\n```\n\n\
    ```\nPL/SQL procedure successfully completed.\n\nElapsed: 00:00:01.78\n```\n\n\
    请注意，其性能与完整批量收集示例相当。通过检查会话跟踪，可以确定自动批量收集的提取大小。以下是先前 PL/SQL 块的跟踪输出：\n\n```\nSELECT\
    \ DESCR D3\nFROM   HARDWARE\n\ncall     count       cpu    elapsed       disk\
    \      query    current        rows\n------- ------  -------- ---------- ----------\
    \ ---------- ----------  ----------\nParse        1      0.00       0.00     \
    \     0          1          0           0\nExecute      1      0.00       0.00\
    \          0          0          0           0\nFetch    10001      1.03     \
    \  1.13          0      18907          0     1000000\n------- ------  --------\
    \ ---------- ---------- ---------- ----------  ----------\ntotal    10003    \
    \  1.03       1.14          0      18908          0     1000000\n```\n\n通过 10,001\
    \ 次提取调用获取 1,000,000 行，表明提取大小为 100 行。尽管发出了 10,000 次提取调用而不是 1 次，但性能大致相同。一旦你的提取数组大小超过数据库块中的行数，收益就会递减，因此\
    \ 100 左右的提取大小通常是最佳平衡点。与其仔细基准测试每一段代码来确定最佳批量收集大小，仅仅通过重构游标循环来利用编译器中的自动批量收集优化，其效果就已经接近最优了。\n\
    \n#### 重构代码以使用批量收集\n\n到目前为止，将代码转换为使用批量收集听起来好得令人难以置信。非常简单的代码更改（或者如果你已经在使用隐式提取游标循环，则无需更改）就能带来巨大的性能提升。然而，在重构代码时，你需要防范几个陷阱。"
  raw: '`PL/SQL procedure successfully completed.`


    Once the fetch sizes exceed 1,000 rows, the PGA consumption grows from 3MB up
    to 95MB when bulk collecting the entire set of 1,000,000 rows in a single fetch
    call. If you have hundreds of sessions all consuming hundreds of megabytes of
    memory, then that certainly is a scalability threat. Unless you have stock options
    in a memory chip company, massive bulk collect sizes are probably a bad idea.
    For this reason, it is recommended you never issue a `FETCH BULK COLLECT` on a
    resultset without a `LIMIT` clause when you do not know ahead of time the size
    (or approximate size) of the resultset.


    Taken to extremes, a runaway collection could exhaust all of the memory on your
    server and possibly crash it. For example, the demo below attempts to bulk collect
    one billion rows into a PL/SQL collection; it hung my laptop in the process (which
    is why you will not find a script for this demo in the download catalog for this
    book!)


    `SQL> declare`

    `  2    type t_huge_set is table of number;`

    `  3    l_the_server_slaminator t_huge_set;`

    `  4  begin`

    `  5    select rownum`

    `  6    bulk collect into l_the_server_slaminator`

    `  7    from`

    `  8      ( select level from dual connect by level <= 1000 ),`

    `  9      ( select level from dual connect by level <= 1000 ),`

    ` 10      ( select level from dual connect by level <= 1000 );`

    ` 11  end;`

    ` 12  /`


    `ERROR at line 1:`

    `ORA-04030: out of process memory when trying to allocate 16396 bytes`


    ![images](images/square.jpg) **Tip** You may be thinking that the database initialization
    parameter `pga_aggregate_target` will insulate your system from such problems.
    This is not correct. This parameter only applies to memory allocations that the
    database can adjust internally as required, such as memory for sorting or hashing.
    If you ask for 100GB of PGA for PL/SQL collection memory, the database will try
    to honor that request, no matter how much trouble that may cause.


    So on the surface, it would appear a compromise between performance and the memory
    consumption is required when using bulk operations. Let’s explore that issue by
    taking advantage of the automatic bulk collect optimization with implicit cursor
    loops, when `plsql_optimize_level` is set to 2 or higher (which is the default
    from 10g onwards anyway). I’ll reconnect to reset the session level statistics,
    and then fetch all 1,000,000 rows from the HARDWARE table, which is equivalent
    to the last iteration of the previous example that consumed 95 megabytes of PGA.
    The following example (`bulk_collect_ perf_test_2.sql`) demonstrates the fetch
    of 1,000,000 rows using the automatic bulk collect optimization:


    `SQL> connect`

    `Enter user-name: *****`

    `Enter password:  *****`

    `SQL> alter session set plsql_optimize_level = 2;`


    `Session altered.`


    `SQL> begin`

    `  2    for i in (`

    `  3      select descr d3`

    `  4      from   hardware )`

    `  5    loop`

    `  6      null;`

    `  7    end loop;`

    `  8  end;`

    `  9  /`


    `PL/SQL procedure successfully completed.`


    `Elapsed: 00:00:01.78`


    Notice that performance is just as good as when the full bulk collect example.
    By examining a session trace, it’s possible to determine what the bulk collect
    fetch size is for automatic bulk collect. The following is the trace output from
    the previous PL/SQL block:


    `SELECT DESCR D3`

    `FROM   HARDWARE`


    `call     count       cpu    elapsed       disk      query    current        rows`

    `------- ------  -------- ---------- ---------- ---------- ----------  ----------`

    `Parse        1      0.00       0.00          0          1          0           0`

    `Execute      1      0.00       0.00          0          0          0           0`

    `Fetch    10001      1.03       1.13          0      18907          0     1000000`

    `------- ------  -------- ---------- ---------- ---------- ----------  ----------`

    `total    10003      1.03       1.14          0      18908          0     1000000`


    1,000,000 rows fetched via 10,001 fetch calls suggests a fetch size of 100 rows.
    Although 10,000 fetch calls have been issued instead of 1, the performance is
    about the same. There are diminishing returns once your fetch array sizes get
    above the number of rows in a database block, so it’s common for a fetch size
    of around 100 to be the sweet spot. Rather than carefully benchmarking every piece
    of code to determine the optimal bulk collect size, simply refactoring cursor
    loops just to take advantage of the automatic bulk collect optimization in the
    compiler is going to be close to optimal anyway


    #### Refactoring Code to Use Bulk Collect


    So far, converting your code to use bulk collect almost sounds too good to be
    true. Very simple code changes (or even none, if you are already using implicit
    fetch cursor loops) lead to tremendous performance improvements. However, there
    are a few pitfalls you need to guard against when refactoring your code'
