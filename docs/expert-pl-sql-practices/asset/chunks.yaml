    \ 的内容存储到关系表中，每个 UDT 属性对应一列，如下文对记录的描述。\n\n## 使用 PL/SQL 记录进行面向对象编程\n\nPL/SQL 记录类型为\
    \ UDT 提供了一种替代的实现基础，用于在 PL/SQL 中进行面向对象编程。我认识的大多数在 PL/SQL 中进行面向对象编程的人都使用记录。使用记录代替\
    \ UDT 解决了几个问题。\n\n*   PL/SQL 类型允许用作字段的类型和子程序的参数。\n*   多重继承和子类型化是可能的。\n\n使用记录的缺点是你必须自己实现动态调度。在我讲动态调度之前，我将描述如何在内存中运行时创建任意数量的对象实例以及如何引用它们。\n"
- fmt: "## Subtypes\n\n在说明动态分派的实现之前，我将介绍支付交易子类型。与 UDT 实现类似，以包形式存在的子类型包含一个构造函数及其 `book`\
    \ 过程的专门实现。以下是子类型的代码：\n\n```sql\ncreate or replace package body pay_trx#\nis\n\
    \  function pay_trx#new(\n    i_amount                  number\n  ) return bank_trx#.t_bank_trx\n\
    \  is\n  begin\n    if nvl(i_amount, -1) < 0 then\n      raise_application_error(-20000,\
    \ 'Negative amount');\n    end if;\n    return bank_trx#.bank_trx#new(\n     \
    \ i_bank_trx_type_id => bank_trx_type#.c_pay_trx\n     ,i_amount           =>\
    \ i_amount\n    );\n  end pay_trx#new;\n\n  ------------------------------------------------------------------------------\n\
    \  procedure bank_trx#book(\n    i_bank_trx           bank_trx#.t_bank_trx\n \
    \  ,i_text                   varchar2\n  )\n  is\n  begin\n    dbms_output.put_line('Booking\
    \ t_pay_trx \"' || i_text || '\" with amount '\n                          || bank_trx#.bank_trx#amount(i_bank_trx));\n\
    \  end bank_trx#book;\nend pay_trx#;\n```\n\n包体 `pay_trx#` 引用了银行交易子类型的列表。常量声明包\
    \ `bank_trx_type#` 可以手工编码或生成。\n\n```sql\ncreate or replace package bank_trx_type#\n\
    is\n  -- LIST OF SUBTYPES OF BANKING TRX. HAS NO BODY. --\n  c_pay_trx       \
    \ constant bank_trx#.t_bank_trx_type := 1;\nend bank_trx_type#;\n```\n\n## Dynamic\
    \ Dispatch\n\nUDT 原生支持动态分派。对于作为记录的对象，你需要自己实现动态分派。这可以通过动态 SQL 或静态分派器完成。\n\n###\
    \ Dynamic Dispatch with Dynamic SQL\n\n针对每种银行交易类型调用的 `bank_trx#book` 语句存储在一个表中。\n\
    \n```sql\nSQL> create table bank_trx_dsp(\n  2    method_name                varchar2(30)\n\
    \  3   ,bank_trx_type_id           number(9)\n  4   ,stmt                    \
    \   varchar2(200)\n  5   ,primary key(method_name, bank_trx_type_id)\n  6  ) organization\
    \ index;\n\nTable created.\n\nSQL> begin\n  2    insert into bank_trx_dsp(\n \
    \ 3      method_name\n  4     ,bank_trx_type_id\n  5     ,stmt\n  6    ) values\
    \ (\n  7      'bank_trx#book'\n  8     ,bank_trx_type#.c_pay_trx\n  9     ,'begin\
    \ pay_trx#.bank_trx#book(i_bank_trx => :1, i_text => :2); end;'\n 10    );\n 11\
    \    commit;\n 12  end;\n 13  /\n\nPL/SQL procedure successfully completed.\n\
    ```\n\n过程 `bank_trx#.bank_trx#book` 的实现根据 `bank_trx_type_id` 执行正确的动态 SQL：\n\n\
    ```sql\n  procedure bank_trx#book(\n    i_bank_trx               t_bank_trx\n\
    \   ,i_text                   varchar2\n  )\n  is\n    l_stmt                \
    \   bank_trx_dsp.stmt%type;\n  begin\n    select stmt\n    into   l_stmt\n   \
    \ from   bank_trx_dsp\n    where  method_name      = 'bank_trx#book'\n       and\
    \ bank_trx_type_id = b_bank_trx_list(i_bank_trx).bank_trx_type_id;\n    execute\
    \ immediate l_stmt\n    using i_bank_trx, i_text;\n  end bank_trx#book;\n```\n\
    \n所有部分就绪后，我就可以创建并记账一笔支付交易。\n\n```sql\nSQL> declare\n  2    l_my_payment      \
    \         bank_trx#.t_bank_trx;\n  3  begin\n  4    l_my_payment := pay_trx#.pay_trx#new(100);\n\
    \  5    bank_trx#.bank_trx#book(l_my_payment, 'payroll');\n  6  end;\n  7  /\n\
    Booking t_pay_trx \"payroll\" with amount 100\n\nPL/SQL procedure successfully\
    \ completed.\n```\n\n通过动态 SQL 进行的调用比静态 PL/SQL 调用更慢且可扩展性更差。得益于 10g 及更高版本中的单语句缓存，如果每个会话主要使用一种类型的银行交易，差异很小。与静态调用的另一个区别是，如果动态调用返回异常，则会回滚到调用前隐式设置的保存点。\n\
    \n### Dynamic Dispatch with a Static Dispatcher\n\n静态分派器（以 `if` 语句的形式）是动态 SQL\
    \ 的替代方案。这种分派器可以从元数据生成或手工编码。过程 `bank_trx#.bank_trx#book` 使用交易类型调用分派器。\n\n```sql\n\
    \  procedure bank_trx#book(\n    i_bank_trx               t_bank_trx\n   ,i_text\
    \                   varchar2\n  )\n  is\n  begin\n    bank_trx_dsp#.bank_trx#book(\n\
    \      i_bank_trx          => i_bank_trx\n     ,i_bank_trx_type_id  => b_bank_trx_list(i_bank_trx).bank_trx_type_id\n\
    \     ,i_text              => i_text\n    );\n  end bank_trx#book;\n```\n\n分派器（这里只展示其主体）简单地根据类型调用正确的实现。\n\
    \n```sql\ncreate or replace package body bank_trx_dsp#\nis\n  procedure bank_trx#book(\n\
    \    i_bank_trx               bank_trx#.t_bank_trx\n   ,i_bank_trx_type_id   \
    \    bank_trx#.t_bank_trx_type\n   ,i_text                   varchar2\n  )\n \
    \ is\n  begin\n    if i_bank_trx_type_id = bank_trx_type#.c_pay_trx then\n   \
    \   pay_trx#.bank_trx#book(\n        i_bank_trx => i_bank_trx\n       ,i_text\
    \          => i_text\n      );\n    else\n      raise_application_error(-20000,\
    \ 'Unknown bank_trx_type_id: ' || i_bank_trx_type_id);\n    end if;\n  end bank_trx#book;\n\
    end bank_trx_dsp#;\n```\n\n如果子类型非常多，分派器中的 `if` 语句就会有很多分支。在这种情况下，使用嵌套 `if` 语句的二分查找能提供最佳的运行时性能。如果分派器是手工编码的，它可以实现在\
    \ `bank_trx#` 中，而不是一个单独的包中。\n\n## Additional Attributes and Methods in Subtypes\n\
    \n如果支付交易需要普通银行交易中不存在的额外方法，我只需将它们添加到包 `pay_trx#` 中。如果支付交易需要一个额外的属性（例如，结算类型），我会在\
    \ `pay_trx#` 的主体中创建对应的记录类型和关联数组，如下所示：\n\n```sql\ncreate or replace package body\
    \ pay_trx#\nis\n  type t_pay_trx_rec is record (\n    settle_type_id         \
    \ t_settle_type\n  );\n  type t_pay_trx_tab is table of t_pay_trx_rec index by\
    \ bank_trx#.t_bank_trx;\n  b_pay_trx_list            t_pay_trx_tab;\n\n  function\
    \ pay_trx#new(\n    i_amount                  number\n   ,i_settle_type_id   \
    \       t_settle_type\n  ) return bank_trx#.t_bank_trx\n  is\n    l_idx      \
    \              bank_trx#.t_bank_trx;\n  begin\n    if nvl(i_amount, -1) < 0 then\n\
    \      raise_application_error(-20000, 'Negative amount');\n    end if;\n    l_idx\
    \ := bank_trx#.bank_trx#new(\n      i_bank_trx_type_id => bank_trx_type#.c_pay_trx\n\
    \     ,i_amount           => i_amount\n    );\n    b_pay_trx_list(l_idx).settle_type_id\
    \ := i_settle_type_id;\n    return l_idx;\n  end pay_trx#new;\n```\n\n为了释放额外的状态，我还需要\
    \ `bank_trx#.bank_trx#remv` 通过分派器调用 `pay_trx#` 中的移除方法。"
  raw: '##### Subtypes


    Before I illustrate the implementation of the dynamic dispatch, I will introduce
    the payment transaction subtype. As with the UDT implementation, the subtype in
    form of a package contains a constructor and its specialized implementation of
    the procedure book. Here is the code for the subtype:


    `create or replace package body pay_trx#`

    `is`

    `  function pay_trx#new(`

    `    i_amount                 number`

    `  ) return bank_trx#.t_bank_trx`

    `  is`

    `  begin`

    `    if nvl(i_amount, -1) < 0 then`

    `      raise_application_error(-20000, ''Negative amount'');`

    `    end if;`

    `    return bank_trx#.bank_trx#new(`

    `      i_bank_trx_type_id => bank_trx_type#.c_pay_trx`

    `     ,i_amount           => i_amount`

    `    );`

    `  end pay_trx#new;`


    `  ------------------------------------------------------------------------------`

    `  procedure bank_trx#book(`

    `    i_bank_trx           bank_trx#.t_bank_trx`

    `   ,i_text                   varchar2`

    `  )`

    `  is`

    `  begin`

    `    dbms_output.put_line(''Booking t_pay_trx "'' || i_text || ''" with amount
    ''`

    `                          || bank_trx#.bank_trx#amount(i_bank_trx));`

    `  end bank_trx#book;`

    `end pay_trx#;`


    The package body pay_trx# references the list of banking transaction subtypes.
    The constant declaration package bank_trx_type# can be hand coded or generated.


    `create or replace package bank_trx_type#`

    `is`

    `  -- LIST OF SUBTYPES OF BANKING TRX. HAS NO BODY. --`

    `  c_pay_trx        constant bank_trx#.t_bank_trx_type := 1;`

    `end bank_trx_type#;`


    ##### Dynamic Dispatch


    UDTs natively support dynamic dispatch. With objects as records, you need to implement
    dynamic dispatch yourself. This can be done with dynamic SQL or a static dispatcher.


    ###### Dynamic Dispatch with Dynamic SQL


    The statement to be invoked for bank_trx#book for each type of bank transaction
    is stored in a table.


    `SQL> create table bank_trx_dsp(`

    `  2    method_name                varchar2(30)`

    `  3   ,bank_trx_type_id           number(9)`

    `  4   ,stmt                       varchar2(200)`

    `  5   ,primary key(method_name, bank_trx_type_id)`

    `  6  ) organization index;`


    `Table created.`


    `SQL> begin`

    `  2    insert into bank_trx_dsp(`

    `  3      method_name`

    `  4     ,bank_trx_type_id`

    `  5     ,stmt`

    `  6    ) values (`

    `  7      ''bank_trx#book''`

    `  8     ,bank_trx_type#.c_pay_trx`

    `  9     ,''begin pay_trx#.bank_trx#book(i_bank_trx => :1, i_text => :2); end;''`

    ` 10    );`

    ` 11    commit;`

    ` 12  end;`

    ` 13  /`


    `PL/SQL procedure successfully completed.`


    The implementation of the procedure bank_trx#.bank_trx#book executes the correct
    dynamic SQL based on the bank_trx_type_id:


    `  procedure bank_trx#book(`

    `    i_bank_trx               t_bank_trx`

    `   ,i_text                   varchar2`

    `  )`

    `  is`

    `    l_stmt                   bank_trx_dsp.stmt%type;`

    `  begin`

    `    select stmt`

    `    into   l_stmt`

    `    from   bank_trx_dsp`

    `    where  method_name      = ''bank_trx#book''`

    `       and bank_trx_type_id = b_bank_trx_list(i_bank_trx).bank_trx_type_id;`

    `    execute immediate l_stmt`

    `    using i_bank_trx, i_text;`

    `  end bank_trx#book;`


    With all pieces in place, I can create and book a payment transaction.


    `SQL> declare`

    `  2    l_my_payment               bank_trx#.t_bank_trx;`

    `  3  begin`

    `  4    l_my_payment := pay_trx#.pay_trx#new(100);`

    `  5    bank_trx#.bank_trx#book(l_my_payment, ''payroll'');`

    `  6  end;`

    `  7  /`

    `Booking t_pay_trx "payroll" with amount 100`


    `PL/SQL procedure successfully completed.`


    The call with dynamic SQL is slower and less scalable than a static PL/SQL call.
    Thanks to single statement caching in 10g and newer, the differences are small
    if every session uses mostly one type of banking transactions. Another difference
    to the static call is that if a dynamic call returns an exception, a rollback
    is performed to the savepoint set implicitly before the call.


    ###### Dynamic Dispatch with a Static Dispatcher


    A static dispatcher in form of an if statement is the alternative to dynamic SQL.
    Such a dispatcher can be generated from metadata or coded by hand. The procedure
    bank_trx#.bank_trx#book calls the dispatcher with the type of the transaction.


    `  procedure bank_trx#book(`

    `    i_bank_trx               t_bank_trx`

    `   ,i_text                   varchar2`

    `  )`

    `  is`

    `  begin`

    `    bank_trx_dsp#.bank_trx#book(`

    `      i_bank_trx         => i_bank_trx`

    `     ,i_bank_trx_type_id => b_bank_trx_list(i_bank_trx).bank_trx_type_id`

    `     ,i_text             => i_text`

    `    );`

    `  end bank_trx#book;`


    The dispatcher, of which I only show the body, simply calls the correct implementation
    based on the type.


    `create or replace package body bank_trx_dsp#`

    `is`

    `  procedure bank_trx#book(`

    `    i_bank_trx               bank_trx#.t_bank_trx`

    `   ,i_bank_trx_type_id       bank_trx#.t_bank_trx_type`

    `   ,i_text                   varchar2`

    `  )`

    `  is`

    `  begin`

    `    if i_bank_trx_type_id = bank_trx_type#.c_pay_trx then`

    `      pay_trx#.bank_trx#book(`

    `        i_bank_trx => i_bank_trx`

    `       ,i_text         => i_text`

    `      );`

    `    else`

    `      raise_application_error(-20000, ''Unknown bank_trx_type_id: '' || i_bank_trx_type_id);`

    `    end if;`

    `  end bank_trx#book;`

    `end bank_trx_dsp#;`


    If there are very many subtypes, the if statement in the dispatcher has many branches.
    A binary search with nested if statements provides the best runtime performance
    in this case. If the dispatcher is coded by hand, it can be implemented in bank_trx#
    instead of a separate package.


    ##### Additional Attributes and Methods in Subtypes


    If payment transactions require additional methods not present in general banking
    transactions, I just add them to the package pay_trx#. If payment transactions
    require an additional attribute (say, a settlement type), I create a corresponding
    record type and associative array in the body of pay_trx#, show in bold here:


    `create or replace package body pay_trx#`

    `is`

    **`  type t_pay_trx_rec is record (`**

    **`    settle_type_id          t_settle_type`**

    **`  );`**

    **`  type t_pay_trx_tab is table of t_pay_trx_rec index by bank_trx#.t_bank_trx;`**

    **`  b_pay_trx_list            t_pay_trx_tab;`**


    `  function pay_trx#new(`

    `    i_amount                 number`

    **`   ,i_settle_type_id         t_settle_type`**

    `  ) return bank_trx#.t_bank_trx`

    `  is`

    **`    l_idx                    bank_trx#.t_bank_trx;`**

    `  begin`

    `    if nvl(i_amount, -1) < 0 then`

    `      raise_application_error(-20000, ''Negative amount'');`

    `    end if;`

    `    l_idx := bank_trx#.bank_trx#new(`

    `      i_bank_trx_type_id => bank_trx_type#.c_pay_trx`

    `     ,i_amount           => i_amount`

    `    );`

    **`    b_pay_trx_list(l_idx).settle_type_id := i_settle_type_id;`**

    `    return l_idx;`

    `  end pay_trx#new;`


    To free the additional state I also need bank_trx#.bank_trx#remv to call a remove
    method in pay_trx# through the dispatcher.'
