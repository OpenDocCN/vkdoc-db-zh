    \ name, type, usage, prior name, object_type, line, col\n  FROM source_ids si\n\
    \  WHERE type IN ('VARIABLE', 'ITERATOR', 'CONSTANT')\n    AND usage = 'DECLARATION'\n\
    \    AND EXISTS (\n      SELECT count(*), name\n        FROM user_identifiers\n\
    \        WHERE object_Name = si.object_name\n          AND name = si.name\n  \
    \        AND usage = si.usage\n        GROUP BY name\n        HAVING count(*)\
    \ > 1 )\n  START WITH usage_context_id = 0\n  CONNECT BY PRIOR usage_id = usage_context_id\n\
    \    AND PRIOR object_type = object_type;\n```\n\n查询结果如下：\n```\nNAME     TYPE\
    \        USAGE       PRIORNAME    OBJECT_TYPE   LINE     COL\n-------- -----------\
    \ ----------- ------------ ------------- -------- ------\nI        CONSTANT  \
    \  DECLARATION SCOPE_PKG    PACKAGE       3        3\nI        VARIABLE    DECLARATION\
    \ PROC1        PACKAGE BODY  5        5\nI        ITERATOR    DECLARATION PROC1\
    \        PACKAGE BODY  8        9\n```\n\n变量 `I` 在包规范中、体内的一个过程中、以及同一过程的循环迭代器中被声明。\n\
    \n你可以向查询中添加额外的条件，只返回那些明确冲突的值。你可以通过包含层级关系来实现——如果一个声明包含在一个 `USAGE_ID` 中，而这个 `USAGE_ID`\
    \ 又被一个更高的 `USAGE_CONTEXT_ID` 所覆盖，例如当这个使用（usage）是前一个使用的子项时。\n"
- fmt: "##### Data Types Checks\n\n在 USER_ARGUMENTS 部分，我展示了如何验证数据类型，但也指出了其局限性——仅限于参数。通过\
    \ PL/Scope，我可以将验证扩展到程序中定义的任何变量。使用相同的示例过程 `BAD_DATA_TYPES_PRC`，以下查询展示了如何找到这些变量（和参数）：\n\
    \n```sql\nSELECT * FROM (\nWITH source_ids AS (\n  SELECT    line,\n         \
    \   col,\n            name,\n            type,\n            usage,\n         \
    \   usage_id,\n            usage_context_id,\n            object_name\n    FROM\
    \ user_identifiers\n      WHERE object_name = 'BAD_DATA_TYPES_PRC'\n        AND\
    \ object_type = 'PROCEDURE')\nSELECT  prior name \"Identifier\",\n        CASE\n\
    \        WHEN prior type IN ('FORMAL IN', 'FORMAL OUT', 'FORMAL IN OUT')\n   \
    \     THEN 'PARAMETER'\n        WHEN prior type IN ('VARIABLE', 'CONSTANT', 'ITERATOR')\n\
    \        THEN 'VARIABLE'\n        ELSE prior name\n        END \"Identififer Type\"\
    ,\n        Name \"Data Type\",\n        Usage\n  FROM source_ids\n  START WITH\
    \ usage_context_id = 0\n  CONNECT BY PRIOR usage_id = usage_context_id\n  ORDER\
    \ SIBLINGS BY line, col\n)\nWHERE usage =  'REFERENCE';\n```\n\n查询结果如下：\n\n```\n\
    Identifier      Identififer Type     Data Type       USAGE\n--------------- --------------------\
    \ ------------- -----------\nP_DATA_IN       PARAMETER            CHAR       \
    \    REFERENCE\nP_DATA_OUT      PARAMETER            LONG           REFERENCE\n\
    V_CHAR          VARIABLE             CHAR           REFERENCE\nV_VARCHAR     \
    \  VARIABLE             VARCHAR        REFERENCE\nV_LONG          VARIABLE   \
    \          LONG           REFERENCE\n```\n\n目前仍然无法验证数据类型是否是锚定的。如果 PL/Scope 能将此作为标识符声明的子项提供，那就太好了。你可以推断（使用\
    \ `user_arguments`）数据长度或数据精度意味着参数是锚定的，但 `null` 并不意味着未锚定。例如，日期数据类型没有精度。\n\n###\
    \ Performing Dynamic Analysis\n\n从静态分析转向动态分析，让我们看看 Oracle 数据库（11g 之前版本）中可用的工具（`DBMS_PROFILER`\
    \ 和 `DBMS_TRACE`），以及 11g 之后版本中可用的工具（上述工具加上 `DBMS_HPROF`）。尽管 `DBMS_HPROF` 是用于性能指标的更好的工具（在我看来好得多），但\
    \ `DBMS_PROFILER` 和 `DBMS_TRACE` 在代码覆盖测试方面仍然提供了一些可用性。\n\n本节并非关于如何使用这些内置包的教程，但会涵盖一些基础知识以帮助你入门。本节将指出这些内置包中哪些部分对于了解你的代码是有用的。\n\
    \n使用这些 Oracle 提供的工具进行动态分析有两个主要好处。首先是洞察应用程序的性能特征。通过分析，你可以在代码投入生产前识别瓶颈。其次，算是一个无意的附带好处，就是能够测试代码覆盖率（稍后会详细介绍）。\n\
    \n请注意，[第13章](#Chapter13.html#ch13) 专门从性能角度介绍了性能剖析和插桩，但没有涵盖本章讨论的 Oracle 提供的包。关于这些包的完整介绍，请参阅\
    \ Oracle 文档，其中概述了所有参数等信息。\n\n#### DBMS_PROFILER 和 DBMS_TRACE\n\n`DBMS_PROFILER`\
    \ 是一个平面剖析器。它提供 PL/SQL 程序中两个过程调用之间的时间信息。你“打开”剖析器来启动计时器，然后在想停止计时时“关闭”它。“开启”和“关闭”之间的时间就是运行所需的时间（加上来自\
    \ `DBMS_PROFILER` 代码的一些最小开销）。\n\n从性能角度看，`DBMS_PROFILER` 与 `DBMS_TRACE` 结合使用时最为强大。`DBMS_TRACE`\
    \ 包为 `DBMS_PROFILER` 收集的计时提供了上下文。它提供了 PL/Scope 提供的静态层次结构的动态版本。PL/Scope 按可能发生的顺序向你显示标识符，并由此推断代码。PL/Scope\
    \ 向你展示了每一种可能性；`DBMS_TRACE` 向你展示的是*实际*执行的层次结构。\n\n`DBMS_TRACE` 要求所有要追踪的代码都必须使用\
    \ `DEBUG=TRUE` 编译。不建议在生产环境中运行为调试而编译的过程，因此 `DBMS_TRACE` 包作为插桩工具是无用的。然而，作为一种了解代码的方式，该包仍然有价值。\n\
    \n`DBMS_TRACE` 会话的输出显示哪个过程调用了哪个过程，按顺序排列。`DBMS_TRACE` 的输出与 `DBMS_PROFILER` 的逐行剖析相结合，是我找到的进行半自动化代码覆盖的最简单方法。即使在\
    \ 11g 之后的世界里，`DBMS_TRACE` 和 `DBMS_PROFILER` 仍然具有一些无法以其他方式获得的价值。`DBMS_TRACE` 会为执行的每一行创建一条记录。当与\
    \ PL/Scope（仅限 11g+）结合使用时，你就得到了一个用于面向行的代码覆盖的强大工具。\n\n##### 配置 DBMS_PROFILER 和 DBMS_TRACE\n\
    \n设置这两个工具是一个相当简单的过程。你需要对 `DBMS_PROFILER` 和 `DBMS_TRACE` 都拥有 `EXECUTE` 权限。这些包应该已经存在于数据库中。\n\
    \n在使用这些工具之前，你（或 DBA）需要运行几个脚本来创建底层表。这些脚本位于 `$ORACLE_HOME/RDBMS/ADMIN` 目录中。`PROFTAB.sql`\
    \ 将为 `DBMS_PROFILER` 创建所需的表，`TRACETAB.sql` 为 `DBMS_TRACE` 创建表。注意，`TRACETAB.sql`\
    \ 必须以 `SYS` 身份运行。这些脚本中创建的表将在后面描述。\n\n如果你在单个服务器上运行多个应用程序，你可能想创建一个通用的 `PROFILER`\
    \ 用户，并以该用户身份运行 `PROFTAB.sql`。这样，你可以授予对表的访问权限并为它们创建同义词，所有应用程序都可以共享相同的表。当你运行关于程序调用之间关系的报告时，可以跨越模式。如果你想保持每次运行分离，或者你只有一个应用程序模式，你可以在脚本所在的模式下运行它。\n\
    \n运行 `DBMS_PROFILER` 和 `DBMS_TRACE` 时，你必须具有特定的权限和编译器选项设置。对于任何要追踪或剖析的代码，你需要对被剖析的模式授予\
    \ `EXECUTE` 权限。此外，对于 `DBMS_PROFILER`，它需要对要剖析的任何程序单元拥有 `CREATE` 访问权限。最后，`DBMS_TRACE`\
    \ 要求程序单元必须使用 `DEBUG=TRUE` 编译。\n\n你需要对你连接的用户账户授予 `SELECT` 权限，以便查询 `DBMS_TRACE`\
    \ 表。如果你连接的数据库用户是 `DBMS_PROFILER` 表的所有者，则不需要额外的授权。如果一个通用的剖析器用户拥有这些表，则该模式需要向你的模式授予\
    \ `SELECT` 权限。\n\n配置就到此为止。完成这些设置步骤后，你就可以开始收集一些信息了。"
  raw: '##### Data Types Checks


    In the section on USER_ARGUMENTS, I showed how you can validate data types but
    also how it is limited to just parameters. With PL/Scope, I can extend that to
    include variables defined anywhere in a program. Using the same demo procedure,
    BAD_DATA_TYPES_PRC, the following query shows how you can find those variables
    (and parameters):


    `SELECT * FROM (`

    `WITH source_ids AS (`

    `  SELECT    line,`

    `            col,`

    `            name,`

    `            type,`

    `            usage,`

    `            usage_id,`

    `            usage_context_id,`

    `            object_name`

    `    FROM user_identifiers`

    `      WHERE object_name = ''BAD_DATA_TYPES_PRC''`

    `        AND object_type = ''PROCEDURE'')`

    `SELECT  prior name "Identifier",`

    `        CASE`

    `        WHEN prior type IN (''FORMAL IN'', ''FORMAL OUT'', ''FORMAL IN OUT'')`

    `        THEN ''PARAMETER''`

    `        WHEN prior type IN (''VARIABLE'', ''CONSTANT'', ''ITERATOR'')`

    `        THEN ''VARIABLE''`

    `        ELSE prior name`

    `        END "Identififer Type",`

    `        Name "Data Type",`

    `        Usage`

    `  FROM source_ids`

    `  START WITH usage_context_id = 0`

    `  CONNECT BY PRIOR usage_id = usage_context_id`

    `  ORDER SIBLINGS BY line, col`

    `)`

    `WHERE usage =  ''REFERENCE'';`


    `Identifier      Identififer Type     Data Type     USAGE`

    `--------------- -------------------- ------------- -----------`

    `P_DATA_IN       PARAMETER            CHAR          REFERENCE`

    `P_DATA_OUT      PARAMETER            LONG          REFERENCE`

    `V_CHAR          VARIABLE             CHAR          REFERENCE`

    `V_VARCHAR       VARIABLE             VARCHAR       REFERENCE`

    `V_LONG          VARIABLE             LONG          REFERENCE`


    One thing that is still not available is being able to verify if a data type is
    anchored or not. Having that as part of PL/Scope as just another child of the
    identifier declaration would be excellent. You can infer that (using user_arguments)
    a data length or data precision means that an argument is anchored but null does
    not mean not anchored. Date data types, for example, do not have a scale.


    ### Performing Dynamic Analysis


    Moving on from static analysis to dynamic analysis, let''s look at the tools available
    in a pre-11g Oracle database (DBMS_PROFILER and DBMS_TRACE) and what is available
    in post 11g (those plus DBMS_HPROF). Even though DBMS_HPROF is a better tool for
    performance metrics (much better, in my opinion), DBMS_PROFILER and DBMS_TRACE
    still provide some usability for code coverage testing.


    This section is not intended to be a tutorial on how to use the built-in packages
    mentioned, but it will cover some basics to get you up and running. This section
    will point out which parts of the built-ins are useful for knowing your code.


    There are two primary benefits to be gained by running dynamic analysis using
    these Oracle-provided tools. The first is insight into the performance profile
    of your application. By profiling, you can identify bottlenecks in your code before
    putting it into production. The second, which is sort of an unintentional side
    benefit, is the ability to test for code coverage (more on this later).


    Note that [Chapter 13](#Chapter13.html#ch13) specifically covers profiling and
    instrumentation from a performance perspective but does not cover the Oracle-supplied
    packages discussed here. For a complete introduction to the packages discussed
    in the chapter, the Oracle documentation outlines all of the parameters and such.


    #### DBMS_PROFILER and DBMS_TRACE


    DBMS_PROFILER is a flat profiler. It provides timing information between two procedure
    calls in a PL/SQL program. You “turn on” the profiler to start a timer and then
    “turn it off” when you want to stop the timer. The time between the “on” and “off”
    is the amount of time that it took to run (with some minimal overhead from the
    DBMS_PROFILER code).


    Form a performance perspective, DBMS_PROFILER is most powerful when used with
    DBMS_TRACE. The DBMS_TRACE package provides context for the timings that are gathered
    by DBMS_PROFILER. It provides a dynamic version of the static hierarchy provided
    by PL/Scope. PL/Scope shows you identifiers, and by inference the code, in the
    order that it can happen. PL/Scope shows you every possibility; DBMS_TRACE shows
    you the hierarchy that was *actually* executed.


    DBMS_TRACE requires all code that will be traced to be compiled with DEBUG=TRUE.
    Running procedures compiled for debug is not recommended in production, so that
    makes the DBMS_TRACE package useless as instrumentation. However, as a way to
    know your code, there is still value to the package.


    The output of a DBMS_TRACE session shows which procedure called which procedure,
    in order. The output of DBMS_TRACE combined with the line-by-line profiling from
    DBMS_PROFILER is the easiest way to do semi-automated code coverage that I have
    found. Even in a post 11g world, there is still some value to DBMS_TRACE and DBMS_PROFILER
    that can''t be captured any other way. DBMS_TRACE will create a record for every
    line executed. When used in conjunction with PL/Scope (11g+ only), you get a great
    tool for line-oriented code coverage.


    ##### Configuring DBMS_PROFILER and DBMS_TRACE


    Setting up both tools is a fairly simple process. You need EXECUTE on both DBMS_PROFILER
    and DBMS_TRACE. The packages should already exist in the database.


    Before using the tools, you (or a DBA) will need to run a couple of scripts to
    create the underlying tables. The scripts are available in the $ORACLE_HOM/RDBMS/ADMIN
    directory. `PROFTAB.sql` will create the tables needed for DBMS_PROFILER and `TRACETAB.sql`
    for DBMS_TRACE. Note that `TRACETAB.sql` must be run as SYS. The tables that get
    created in these scripts will be described later.


    If you are running multiple applications on a single server, you may want to create
    a common PROFILER user and run `PROFTAB.sql` as that user. This way, you can grant
    access to the tables and create synonyms for them and all applications can share
    the same tables. When you run reports about relationships between program calls,
    you can span schemas. If you want to keep runs separate or you only have a single
    application schema, you can run it as the script schema.


    When running DBMS_PROFILER and DBMS_TRACE, you are required to have specific permissions
    and compiler options set. For any code to trace or profiled, you will need execute
    granted to the profiling schema. Also, for DBMS_PROFILER, it needs CREATE access
    on any program units to be profiled. Finally, DBMS_TRACE requires that the program
    unit be compiled with DEBUG=TRUE.


    You will need SELECT access granted to your user account to query from the DBMS_TRACE
    tables. If the database user you are connecting as owns the DBMS_PROFILER tables,
    you will not need any additional grants. If a common profiler user owns the tables,
    that schema needs to grant SELECT to your schema.


    That''s it for configuration. After performing these setup steps, you are ready
    to gather some information.'
