    `before update`

    `on payments`

    `for each row`

    `begin`

    `        dbms_output.put_line (''This is tr_pay_follow_up'');`

    `        if (`

    `                (:new.risk_rating = ''HIGH'' and :new.pay_mode = ''C'')`

    `                or (:new.risk_rating = ''MEDIUM'' and :new.pay_mode = ''K'')`

    `                or (substr(:new.credit_card_no,2,5) = ''23456'')`

    `        ) then`

    `                :new.follow_up := ''Y'';`

    `        else`

    `                :new.follow_up := ''N'';`

    `        end if;`

    `end;`


    `/`


    I have deliberately placed the dbms_output lines to show the execution of the
    triggers. After these two triggers are created, perform an update on the table.


    `update payments`

    `set credit_card_no = ''1234567890123456'',`

    `    amount = 100000,`

    `    pay_mode = ''K'';`


    `This is tr_pay_follow_up`


    `This is tr_pay_risk_rating`


    `1 row updated.`


    After this, select from the table.


    `SQL> select * from payments;`


    `    PAY_ID CREDIT_CARD_NO   AMOUNT P RISK_R F`

    `    ------ ---------------- ------ - ------ -`

    `         1 1234567890123456 100000 K HIGH   N`


    If you examine the above output, you will notice that the payment amount is more
    than 10,000—a condition for RISK_RATING to be HIGH. The trigger computed that
    condition and set the value correctly. The mode of payment is cash (PAY_MODE is
    set to “K”) and the amount is 100,000 and the credit card number matches the pattern
    “23456”—all the conditions for the FOLLOW_UP to be “Y”; but instead it is “N”.
    Did the trigger not fire? No, it did, as you saw in the output after the update
    statement “`This is tr_pay_follow_up`”. If the trigger fired, why didn''t it set
    the value properly?


    The answer lies in the order in which trigger executed. Note the output after
    the update statement was issued. The first trigger to fire was tr_pay_follow_up;
    not tr_pay_risk_rating. When the trigger fired, the values of all the columns
    satisfied the condition for follow-up, but not the RISK_RATING, which was NULL.
    Therefore, the trigger didn''t find the row to satisfy the condition for follow-up.
    After the other trigger fired, it properly set the RISK_RATING column, but by
    that time the previous trigger had already executed and would not have executed
    again. However, if the order of execution of triggers were reversed (the risk
    rating trigger followed by the follow-up trigger), the situation would have been
    as you would have expected.


    This is a great example of how the order of trigger execution is vital to application
    logic. Clearly the present example would be considered a bug in the application
    code. What''s worse, the scenario is not reproducible at will; sometimes the order
    will be as expected and other times will be reverse. If you have a large number
    of such triggers, the potential for bugs will be even higher.


    You can address this issue with putting all the code inside a single pre-update
    row trigger to control the execution code. You can create separate procedures
    for each trigger logic and call them inside a single pre-update row trigger. This
    may work but is not advisable because you have one trigger. What if you want to
    suppress functionality of one of the triggers? If you had multiple triggers, you
    could just disable that trigger and enable when needed again.


    In Oracle Database 11g Release 1, there is an elegant solution. You can specify
    the order of execution of triggers.


    `create or replace trigger tr_pay_follow_up`

    `before update`

    `on payments`

    `for each row`

    **`follows tr_pay_risk_rating`**

    `begin`

    `        dbms_output.put_line (''This is tr_pay_follow_up'');`

    `        if (`

    `                (:new.risk_rating = ''HIGH'' and :new.pay_mode = ''C'')`

    `                or (:new.risk_rating = ''MEDIUM'' and :new.pay_mode = ''K'')`

    `                or (substr(:new.credit_card_no,2,5) = ''23456'')`

    `        ) then`

    `                :new.follow_up := ''Y'';`

    `        else`

    `                :new.follow_up := ''N'';`

    `        end if;`

    `end;`

    `/`


    Note the clause “follows tr_pay_risk_rating,” which specifies that the trigger
    should be executed after the risk rating trigger. Now you can guarantee the execution
    of the triggers: the risk rating trigger will fire first and then the follow-up
    trigger. With this new setup, if you re-execute the previous example, you will
    see the following:


    *`… perform the same update as before …`*

    `This is tr_pay_risk_rating`

    `This is tr_pay_follow_up`


    `1 row updated.`


    `SQL> select * from payments;`


    `    PAY_ID CREDIT_CARD_NO   AMOUNT P RISK_R F`

    `    ------ ---------------- ------ - ------ -`

    `         1 1234567890123456 100000 C HIGH   Y`


    `1 row selected.`


    The order of execution is now tr_pay_risk_rating and then tr_pay_follow_up— *guaranteed*.
    The first trigger set up the column values properly, which allowed the second
    trigger to compute the follow-up flag correctly. This functionality now allows
    you to build modular code that you can just turn on and off at will.'
