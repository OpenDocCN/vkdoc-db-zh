    allows me to drill down into procedure `p` to see all of the database and system
    calls made that comprised the response time. Since the module and action names
    are emitted in the trace file as well, I''m also able to drill down specifically
    into calls corresponding just to procedure `r`.


    First, I would like to see where my response time went for each module/action
    pair. Summarizing the response time data in the trace file looks like this:


    `Module:Action        DURATION       %  CALLS      MEAN       MIN       MAX`

    `-------------------  --------  ------  -----  --------  --------  --------`

