    `SQL> commit;`


    `Commit complete.`


    `SQL> alter table employees drop column phone_number;`


    `Table altered.`


    With the changes shown in [Listing 12-7](#Chapter12.html#list_12_7) complete,
    you achieved your target design immediately. The new table has been created and
    populated and the old data column as been removed. There is no need to code to
    keep duplicate values synchronized or to revisit this change later to remove the
    old column and the code built to support it. You''ve reduced the work that must
    be done by both the application and by the development team. [Figure 12-2](#Chapter12.html#fig_12_2)
    shows your new schema design.


    ![images](images/1202.jpg)


    ***Figure 12-2.** Human Resourse schema, target design*


    Once you''ve populated the new table and dropped the old column, be sure to check
    for any objects in the application schema that have been invalidated by your changes.
    [Listing 12-8](#Chapter12.html#list_12_8) will show that not only is your GetEmployeeData
    procedure invalid, as expected, but two triggers have been invalidated. The first
    thing you need to do is see what these triggers do and how they are associated
