    DEBUG) and noisy (optionally producing a lot of data). It''s much better to use
    DBMS_PROFILER.


    DBMS_HPROF is an 11g+, hierarchical profiling tool that is non-intrusive and simple
    to use. DBMS_HPROF provides timing information, like the flat profiler DBMS_PROFILER,
    but it also includes contextual information like DBMS_TRACE. It can deliver some
    reports that are very valuable for performance tuning but it also populates some
    tables that you can then write queries against. This is very beneficial for comparing
    metrics over time and as an additional tool for understanding your code.'
  trans: '

    ## 自动化代码分析


    代码分析，也称为程序分析，是对源代码进行的分析。手动代码分析是由人进行的代码审查。此类分析还可能包括审查来自运行程序的日志数据和系统输出。自动化分析可以让分析师（根据我的经验，通常是开发人员）跳过分析中枯燥的部分，直接进入更有趣的工作。你不再需要逐行人工审查，而是可以运行某种程序来为你完成这些繁琐的工作。


    让我们举个例子。假设你是一名开发人员，正在工作中。你接到一些新的需求，这意味着你必须修改一个现有的过程。可能是某个计算逻辑发生了变化，这个过程需要增加一个变量。业务部门希望你评估一下完成这项改动所需的时间。更有趣的是，编写并维护这个过程多年的那位同事最近中了彩票辞职了。你甚至从未见过这段代码（在代码审查那天你请病假了）。


    你如何提供这个估算？凭空猜测一个数字？根据我的经验，我见过不少这种方法，但从未真正成功过。


    我见过的第二种方法是手忙脚乱地找出源代码，进行紧急审查。快速浏览后，你认定这是个简单的改动，只需两个小时来编码和单元测试。


    很好。快速分析之后，你准备开始编码了。一位业务人员对你能在 673 处调用此计算的地方（这是一个*非常*流行的计算）全部修改调用感到惊讶。现在你有点担心了。你在文件系统中快速执行了
    `grep` 命令，查看所有调用该过程的地方。


    意识到你的过程被如此多的地方调用后，你将最初的估算时间乘以二。这通常比不乘更准确一些，但还有更好的方法。如果我说你可以通过运行几个简单的查询就能找到所有调用它的地方，你会相信吗？这些查询不仅能找到函数被调用的位置，还能涵盖影响分析、命名标准合规性检查，并展示代码和变量使用情况、作用域冲突以及测试的代码覆盖率。


    你可以通过手动审查源代码、程序日志数据等获取所有这些信息，但通过自动化这个过程，你将获得一个可重复、可预测、不易出错且大大节省时间的流程。在解读自动化或手动分析提供的数据方面，优秀的开发人员是无法被替代的，但自动化能为你节省大量时间。


    ### 静态分析


    静态分析是指在不实际运行程序的情况下分析其源代码。你关注的是编译器在编译时已知的信息。静态分析根据程序中实际使用的功能提供有关程序的信息。


    静态分析可以提供有关正在使用的数据类型、命名标准、安全性、访问的对象等方面的信息。静态分析可以直接利用源代码，也可以使用工具。如果你手动审查代码以确保符合命名标准，你就是在对该源代码进行手动静态分析。同行评审就是一种静态分析。如果你曾在审查同事的程序时发现一个
    `SQL` 注入漏洞，你就理解了静态分析的重要性。


    在 `Oracle PL/SQL` 中，有多种途径可以获取分析所需的信息。你通常会从数据字典开始。随着每个版本的发布，Oracle 都会用有价值的数据增强数据字典。稍后，在“执行静态分析”章节，我将带你了解一些重要的数据字典视图（以及一些分析查询），然后向你介绍一个将代码分析带入
    21 世纪的新数据字典视图。这个新视图由 `PL/Scope` 提供，它是 `11g` 版本中增加的编译器功能。


    ### 动态分析


    动态分析告诉你程序运行时会发现什么。动态分析也称为程序性能剖析。通过性能剖析，你运行一个程序，并以侵入式或非侵入式的方式收集程序执行路径和行为的统计数据。


    `DBMS_PROFILER` 和 `DBMS_TRACE` 是 `11g` 版本之前的性能剖析工具。`DBMS_PROFILER` 是一个平面性能剖析器。平面性能剖析器提供简单的时间信息，例如不同的过程和函数调用耗时，但不包含上下文信息，比如哪个函数被调用以及调用顺序是什么。Oracle
    通过 `DBMS_TRACE` 添加了调用上下文信息，但最终创建的工具具有侵入性（需要 `DEBUG` 权限）且输出繁杂（可能产生大量数据）。使用 `DBMS_PROFILER`
    要好得多。


    `DBMS_HPROF` 是 `11g` 版本及之后提供的一个层次化性能剖析工具，它非侵入且易于使用。`DBMS_HPROF` 像平面剖析器 `DBMS_PROFILER`
    一样提供时间信息，但也包含了像 `DBMS_TRACE` 那样的上下文信息。它可以生成一些对性能调优非常有价值的报告，同时也会填充一些表，你可以随后对这些表编写查询。这对于随时间比较指标以及作为理解代码的额外工具非常有益。

    '
- fmt: '### When to Analyze?


    The whole purpose of analyzing your code is to understand your code. The vast
    majority of people who use these analysis tools (at least those who have asked
    me how to use these tools) are doing so at crunch time: an upgrade gone bad, users
    screaming about a slow database, a nasty logic bug that seems to be hiding.


    Like performance tuning, code analysis can be called upon when things go bad.
    But wouldn''t you agree that a system designed for performance is less likely
    to wake you up in the middle of the night? The same is true for a well analyzed,
    standards compliant system: both static (human or automated) and dynamic. Both
    types of analysis should be baselined.


    Analysis should be performed when an application is written (or when you take
    ownership of it). I have no doubt that everyone is familiar with a code review.
    As mentioned, a code review (or peer review) is a human-powered type of static
    analysis. The automated analysis provided by Oracle (especially `PL/Scope`) should
    be considered an extension to the code review.


    This pre-production analysis/review should be documented, version controlled,
    and retained. The automated analysis, being data in a dictionary view, is very
    easily archived and can be recalled whenever needed (although you need to build
    that functionality yourself). With each and every change, a new version of your
    analysis will need to be gathered and saved. In addition to saving the analysis,
    you have to look at it. You really should study it.


    With static analysis (as discussed with the data dictionary and `PL/SCOPE`) you
    will understand the dependencies of your code, the identifiers used by your code,
    and where/how those identifiers are used. With dynamic analysis, you can see the
    bottlenecks in your code (fixable or not); you can see how varying input data
    changes the execution profile of your code; you can validate code coverage; etc.


    Using reports provided by the various tools (or written in SQL yourself), you
    will have an excellent start for debugging any issues that should pop up in the
    middle of the night. You will also have documentation to share with new developers
    (or to convince management you are actually doing some work).


    Once your code is in production, you will be able to use the old information you''ve
    collected and verify that everything is still performing to expectations. While
    you''re developing, you will use the profiler to continually verify that your
    code is working correctly, both from a code path perspective as well as a performance
    perspective. There''s no need to save every profiler run to a version control
    system, but you should save a version that was run before every implementation
    or upgrade.


    ### CODE ANALYSIS VS. INSTRUMENTATION


    Sometimes there is confusion between analysis and instrumentation. The term `instrumentation`
    refers to code added to a system in support of analysis, especially dynamic analysis.
    Instrumentation enables analysis, but it is not the same thing.


    To decide what kind of instrumentation an application needs (and if it does need
    instrumentation) or to do any performance tuning, you will have to analyze the
    code (to a degree). Profilers are a kind of instrumentation and are valuable for
    tuning. Likewise, understanding the performance profile of an application or code
    base is important to really understanding your code. How will the application
    handle various loads, data inputs, and so forth? The answers to these questions
    are some of the things you want to capture during analysis.


    I say all this to make the point that none of this analysis is done in a vacuum.
    Code analysis is performed to ensure compliance to the standards you want, or
    are forced, to follow. A program that can''t perform is worthless. A program that
    can''t be maintained is just as worthless. Over the life of a program, the vast
    majority of time (and money) will be in maintenance. Maintainability is determined
    at design time.


    Instrumentation is a tool, used over the life of an application, to log interesting
    information. Code analysis is a tool to provide interesting information about
    your program before it''s running in production. Both are critical to a successful,
    performant, maintainable application.


    ### Performing Static Analysis


    You can perform static analysis using two resources. First, you have the data
    dictionary at your disposal. Every database, no matter the version, implements
    a data dictionary, and the information you can derive from this dictionary can
    be incredibly helpful in analyzing your code. The dictionary is your first line
    of offense, and it is always available.


    If you''re running Oracle Database 11g or higher, you also have available a feature
    called `PL/Scope`. It gives you visibility into compile-time data that otherwise
    is not available from the data dictionary. I''ll discuss both resources—the dictionary
    and `PL/Scope`—in the following two subsections.


    #### The Data Dictionary


    Since you''re reading this book, I will assume that you are at least somewhat
    familiar with Oracle''s data dictionary. If not, you are probably reading this
    chapter a bit early in your career. I''m not going to explain what the data dictionary
    is; there are plenty of other books that cover that topic.


    I am, however, going to discuss the views that are pertinent to understanding
    your code. I''m not getting into a discussion about `DBA_*`, `ALL_*` and `USER_*`.
    I am going to use `USER_*` for this discussion but you can assume, that the `ALL`
    and `DBA` counterparts exist. In the same vein, I am not going to do a bunch of
    describes on these views. I''ll stick to covering the columns pertinent to this
    particular discussion.


    ![images](images/square.jpg) `Note` I am providing examples that use partial strings
    and string formats. In a real life, implementation of the concepts shown in these
    examples, the select criteria and things in the where clause, the format strings
    and such, would exist in a table rather than being hardcoded. For brevity, I am
    hardcoding such values into the examples. Also, in a real implementation you may
    use regular expressions to narrow down query results. However, I stick with regular
    PL/SQL functions as most readers will be familiar with them.


    If you''ve compiled the example code provided for this chapter (available from
    the book''s catalog page at `apress.com`), you will have the basic set of programs
    that I will show as the results of the examples. It will make it much easier to
    follow along with the text if you have that code. It might make it more interesting,
    though, if you run it against your own schemas and see what kind of results you
    get.'
