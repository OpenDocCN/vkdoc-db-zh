    ## 基础知识


    条件编译仅包含少量指令。指令以 `$`（美元符号）开头，用于控制程序流程或引发错误。


    系统定义的指令包括：`$IF`、`$THEN`、`$ELSIF`、`$ELSE` 和 `$END`。可以使用 `$ERROR … $END` 指令引发自定义的编译错误。可以查询静态布尔表达式或静态常量。除了创建自定义的查询变量外，Oracle
    还提供了一些可用的内置查询变量，后续将会看到。


    入门条件编译最简单的方法是从一个例子开始。此示例将展示如何为存储过程启用计时信息日志记录，该过程用于测量运行过程所需的时间以及过程运行的时间。以下是示例代码（行号已标出以便后续引用）：


    ```sql

    1 CREATE OR REPLACE PROCEDURE LEVEL2 AS

    2 $IF $$TIMING_ON $THEN

    3 $ELSIF NOT $$TIMING_ON $THEN

    4 $ELSE

    5    $ERROR '' The PLSQL_CCFLAG TIMING_ON, Must be set to either FALSE or TRUE
    before

    compileing procedure '' ||  $$PLSQL_UNIT||''.''

    6    $END

    7 $END

    8 $IF $$TIMING_ON $THEN

    9    L_start_time TIMESTAMP;

    10 $END

    11 BEGIN

    12 DBMS_APPLICATION_INFO.SET_MODULE($$PLSQL_UNIT, ''RUN'');

    13 $IF $$TIMING_ON $THEN

    14    L_START_TIME:=CURRENT_TIMESTAMP;

    15 $END

    16 -- -----------------------------------------------

    17 -- Application logic is left out

    18 -- -----------------------------------------------

    19 $IF $$TIMING_ON $THEN

    20   LOGIT (P_PG=>$$PLSQL_UNIT, P_START_TIME=>l_start_time, P_STOP_TIME=>CURRENT_TIMESTAMP);

    21 $END

    22 DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);

    23 END LEVEL2;

    24 /

    ```


    以下是对代码清单的解释：


    *   第 2-7 行：如果查询变量 `$$TIMING_ON` 在编译时未设置（即既不是 `FALSE` 也不是 `TRUE`），则将引发错误，并指出存储过程的名称以及发生错误的位置。注意，允许使用空语句——一个
    `$IF … $THEN` 后面可以没有任何操作。

    *   第 8 行：如果查询变量 `$$TIMING_ON` 等于 `TRUE`，则声明变量 `l_start_time`。注意，`$END` 后面没有像
    PL/SQL 中的 `END IF` 那样的 `IF`，也没有分号。

    *   第 12 行：这里调用 `DBMS_APPLICATION_INFO.SET_MODULE` 过程，该过程将设置 `V$SESSION` 视图中的
    `MODULE` 列；你使用 Oracle 查询变量 `$$PLSQL_UNIT` 来保存存储过程的名称，或者如果它在包（`PACKAGE`）中被引用，则保存包的名称。在之前的
    Oracle 版本中，你必须创建一个函数来执行 `OWA_UTIL.WHO_CALLED_ME` 过程（该过程返回调用者的名称），然后调用该函数来获取名称。调用
    `DBMS_APPLICATION_INFO.SET_MODULE` 非常有用，如果你需要查询 `V$SESSION` 来定位你的会话，或者你使用扩展跟踪（Extended
    Trace）以便在过程启动时开始跟踪。


    **注意**：如果使用 SQL*Developer 开发存储过程，可以修改保存 `CREATE PROCEDURE/FUNCTION` 模板的模板，以包含对
    `DBMS_APPLICATION_INFO.SET_MODULE($$PLSQL_UNIT, ''<action>'')` 的调用，确保其始终被包含。这可以通过菜单
    “Tools” -> “Preferences” -> “Database:SQL Code Editor Templates” 来完成。


    *   第 13 行：如果查询变量 `$$TIMING_ON` 等于 `TRUE`，则在变量 `l_start_time` 中注册开始时间戳。

    *   第 16-18 行：这里将是 PL/SQL 代码。

    *   第 19 行：如果查询变量 `$$TIMING_ON` 等于 `TRUE`，则调用第 20 行的 `LOGIT` 过程。`LOGIT` 过程是记录计时信息的日志过程。该过程在此不描述，因为它并不重要。

    *   第 22 行：清除 `DBMS_APPLICATION_INFO` 的调用。


    在将过程添加到数据库之前，需要设置编译器标志 `TIMING_ON`。可以在系统、会话或程序级别设置此标志。在此示例中，它在会话级别设置。在设置标志之前，尝试将代码添加到数据库以触发
    `$ERROR` 错误（假设代码保存在名为 `level2.sql` 的文件中）。


    `SQL@V112> @level2`


    `Warning: Procedure created with compilation errors.`


    执行 `show error` 来显示错误，如下所示：


    `SQL@V102> show error`


    `Errors for PROCEDURE LEVEL2:`


    `LINE/COL ERROR`

    `-------- -----------------------------------------------------------------`

    `5/4      PLS-00179: $ERROR:  The PLSQL_CCFLAG TIMING_ON, Must be set to`

    `         either FALSE or TRUE before compileing procedure LEVEL2.`


    现在设置标志，如下所示：


    `SQL@V112> ALTER SESSION SET plsql_ccflags=''TIMING_ON:TRUE'';`


    `plsql_ccflags` 的数据类型可以是布尔静态表达式、`PLS_INTEGER` 静态表达式或 `VARCHAR2` 静态表达式，具体取决于你分配给它的值。注意，设置
    `plsql_ccflags` 不会强制重新编译任何代码；必须发出 `ALTER PROCEDURE … COMPILE` 命令。


    `SQL@V102> ALTER PROCEDURE LEVEL2 COMPILE;`


    `Procedure altered.`


    **注意**：请记住，在设置了会话 `plsql_ccflags` 之后编译的每个存储过程都将继承该 `plsql_ccflags` 设置。


    要检查在存储过程编译期间 `plsql_ccflags` 被设置为什么，请执行以下查询：


    `SQL@V102> col plsql_ccflags for a80 wrap`

    `SQL@V102> select NAME, PLSQL_CCFLAGS FROM USER_PLSQL_OBJECT_SETTINGS;`


    `NAME                         PLSQL_CCFLAGS`

    `------------------------------ --------------------------------------------`

    `LEVEL1`

    `LEVEL2                       TIMING_ON:TRUE`

    `LOGIT`

    `…`


    如下例所示，如果一次设置了多个 `plsql_ccflag`，它们必须用逗号分隔。`plsql_ccflag` 值不区分大小写。


    `SQL@V112> ALTER SESSION SET plsql_ccflags=''TIMING_ON:TRUE,Standard:True'';`

