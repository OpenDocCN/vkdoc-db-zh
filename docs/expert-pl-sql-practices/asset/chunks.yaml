    \  7      insert into hardware values l_row;\n  8    end loop;\n  9  end;\n 10\
    \  /\n\nPL/SQL procedure successfully completed.\n```\n\n在批量绑定 DML 中，仍然有一个填充了值的变量，但该变量现在是一个数组，并且\
    \ DML 操作被延迟到数组被填满用于批量绑定的值之后才执行。`FORALL`关键字表明这是一个批量绑定 DML。例如 (`bulk_bind_2.sql`)\
    \ 等效于上面逐行插入的示例，但它通过一次调用插入 100 行，而不是 100 次调用：\n\n```sql\nSQL> declare\n  2    type\
    \ t_row_list is table of hardware%rowtype;\n  3    l_row t_row_list := t_row_list();\n\
    \  4  begin\n  5    for i in 1 .. 100 loop\n  6      l_row.extend;\n  7      l_row(i).aisle\
    \ := 1;\n  8      l_row(i).item  := i;\n  9    end loop;\n 10\n 11    forall i\
    \ in 1 .. 100\n 12      insert into hardware values l_row(i);\n 13  end;\n 14\
    \  /\n\nPL/SQL procedure successfully completed.\n```\n\n![images](img/square.jpg)\
    \ **注意** 尽管`FORALL`看起来暗示某种循环处理，但它实际上是对数据库执行 DML 的单次调用。这可以通过会话级别的跟踪轻松确认。\n\n```sql\n\
    INSERT INTO HARDWARE\nVALUES  (:B1 ,:B2 ,:B3 ,:B4 )\n\ncall     count       cpu\
    \    elapsed       disk      query    current        rows\n------- ------  --------\
    \ ---------- ---------- ---------- ----------  ----------\nParse        1    \
    \  0.00       0.00          0          0          0           0\nExecute     \
    \ 1      0.00       0.00          0          1          6         100\nFetch \
    \       0      0.00       0.00          0          0          0           0\n\
    ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
