    SQL@V102> exec level2\n\nElapsed: 00:00:20.60\n```\n\n而使用条件编译（`TIMING_ON` 设置为\
    \ `TRUE`），你会得到：\n\n```sql\nSQL@V102> exec level2\n\nElapsed: 00:00:20.49\n```\n\
    \n这里的差异只有零点几秒。这样短的时间是为换取条件编译的好处而付出的微不足道的代价。\n\n## 失效\n\n依赖于其他对象的对象，可能会在它们所依赖的对象发生变化或因某些原因失效时变得无效。让我们通过创建一个调用\
    \ `LEVEL2` 过程的 `LEVEL1` 过程，来稍微扩展一下这个想法。第一个例子运行在 Oracle 10.2 上。\n\n```sql\nSQL@V102>\
    \ CREATE OR REPLACE PROCEDURE LEVEL1 AS\n2  BEGIN\n3    LEVEL2;\n4  END;\n5  /\n\
    Procedure created.\n```\n\n当你必须编译一个较低层级的过程时，如果存在依赖关系，Oracle 将使较高层级的过程失效，从而在下次调用较高层级过程时强制进行自动重新编译——当然，前提是它之前没有被手动编译过。\n\
    \n创建 `LEVEL1` 过程后，重新编译 `LEVEL2` 过程。\n\n```sql\nSQL@V102> ALTER PROCEDURE LEVEL2\
    \ COMPILE REUSE SETTINGS;\n\nProcedure altered.\n```\n\n然后检查这些过程的 `STATUS`。\n\n\
    ```sql\nSQL@V102> SELECT OBJECT_NAME, STATUS FROM USER_OBJECTS WHERE OBJECT_NAME\
    \ IN\n ('LEVEL1','LEVEL2');\n\nOBJECT_NAME                    STATUS\n------------------------------\
    \ -------\nLEVEL1                         INVALID\nLEVEL2                    \
    \     VALID\n```\n\n执行 `LEVEL1` 过程将强制重新编译并验证该过程。\n\n```sql\nSQL@V102> exec LEVEL1\n\
    \nPL/SQL procedure successfully completed.\n\nSQL@V102> SELECT OBJECT_NAME, STATUS\
    \ FROM USER_OBJECTS WHERE OBJECT_NAME IN\n ('LEVEL1','LEVEL2');\n\nOBJECT_NAME\
    \                    STATUS\n------------------------------ -------\nLEVEL1  \
    \                       VALID\nLEVEL2                         VALID\n```\n\n`LEVEL1`\
    \ 过程已被动态重新编译，现在再次有效。这与条件编译无关——这只是它的工作方式。\n\n> **注意**\n> 在一个系统中有数百个存储过程相互调用，然后有意或间接地重新编译一个过程，可能是一场灾难。让我用一个真实的故事来强调这一点。在一家拥有数百并发用户的公司中，一次手动更新表的操作出了错误——一个列被设置成了错误的值。于是数据库管理员使用\
    \ `SELECT AS OF TIMESTAMP` 创建了该表的一个副本。到目前为止，一切正常。然后他重命名了原始表，并快速将副本的表重命名为原始名称。嗯，Oracle\
    \ 会注意到这种名称交换，如果存在任何依赖关系的话。在这个案例中，该表被一个低层级过程引用，该过程变为无效，导致所有依赖于此过程的所有过程也变为无效。这使得几乎所有的用户会话都排队等待重新编译代码。由于没有人能在系统上工作，数据库不得不重启。重启后，系统照常工作。\n\
    \n在 Oracle 11g 中，Oracle 放宽了对依赖对象失效的规则。如果你不更改过程参数的足迹，Oracle 不会强制使依赖对象失效，无论它遇到的是包中的过程还是独立过程。如果你在\
    \ Oracle 11g 而不是 Oracle 10g 中重新运行前面涉及 `LEVEL1` 和 `LEVEL2` 的例子，结果将如下所示：\n\n```sql\n\
    SQL@V112> SELECT OBJECT_NAME, STATUS FROM USER_OBJECTS WHERE OBJECT_NAME IN\n\
    \ ('LEVEL1','LEVEL2');\n\nOBJECT_NAME                    STATUS\n------------------------------\
    \ -------\nLEVEL1                         VALID\nLEVEL2                      \
    \   VALID\n\nSQL@V112> ALTER PROCEDURE LEVEL2 COMPILE REUSE SETTINGS;\n\nProcedure\
    \ altered.\n\nSQL@V112> SELECT OBJECT_NAME, STATUS FROM USER_OBJECTS WHERE OBJECT_NAME\
    \ IN\n ('LEVEL1','LEVEL2');\n\nOBJECT_NAME                    STATUS\n------------------------------\
    \ -------\nLEVEL1                         VALID\nLEVEL2                      \
    \   VALID\n\nSQL@V112>\n```\n\n注意，两个过程最终都是有效的。因为你在 Oracle 11g 中，并且因为你的过程足迹没有改变，Oracle\
    \ 不会强制重新编译。"
- fmt: "#### Controlling Compilation\n\nHaving different `plsql_ccflags` for each\
    \ procedure—and thus a large number of compiler flags—may be confusing. Even though\
    \ you may execute an `ALTER PROCEDURE <procedure name> COMPILE REUSE SETTINGS`,\
    \ at some point you may accidently compile a procedure without having set the\
    \ appropriate compiler flags. And if you don't check in your conditional compilation\
    \ code whether a `ccflag` is set, your code may compile with the “wrong” setting.\
    \ A way to avoid this could be to build a small framework that controls the recompilation,\
    \ as in the following example:\n\n```\nSQL@V112> CREATE TABLE CC_FLAGS (\n2  OWNER        VARCHAR2(30),\n\
    3  OBJECT_TYPE  VARCHAR2(30),\n4  OBJECT_NAME  VARCHAR2(30),\n5  CCFLAGS       VARCHAR2(4000));\n\
    \nTable Created.\n```\n\n`Add the rows with information for each procedure.`\n\
    \n```\nSQL@V112> INSERT INTO CC_FLAGS (OWNER, OBJECT_TYPE, OBJECT_NAME, CCFLAGS)\
    \ VALUES('ACME' ,\n![images](images/U003.jpg)\n 'PROCEDURE', 'LEVEL2', 'TIMING_ON:FALSE');\n\
    \n1 Row created.\n```\n\n```\nSQL@V112> INSERT INTO CC_FLAGS (OWNER, OBJECT_TYPE,\
    \ OBJECT_NAME, CCFLAGS) VALUES('ACME' ,\n![images](images/U003.jpg)\n'PROCEDURE',\
    \ 'LEVEL1', '');\n\n1 Row created.\n```\n\n```\nSQL@V112> COMMIT;\n\nCommit complete.\n\
    ```\n\n```\nSQL@V112> BEGIN\n2  FOR I IN (SELECT * FROM CC_FLAGS) LOOP\n3   EXECUTE\
    \ IMMEDIATE 'ALTER ' ||I.OBJECT_TYPE||' '||I.OWNER||'.'||I.OBJECT_NAME||' COMPILE\n\
    PLSQL_CCFLAGS='''||I.CCFLAGS||'''';\n4 END LOOP;\n5 END;\n6 /\n\nPL/SQL procedure\
    \ successfully completed.\n```\n\nSo after running this anonymous PL/SQL block,\
    \ the procedures are compiled with their settings. This could (or should) perhaps\
    \ be a stored procedure, perhaps even with parameters to control whether one or\
    \ all should be compiled; if so, don't put that procedure in the `CC_FLAGS` table\
    \ or you will end up in a deadlock situation when the running procedure tries\
    \ to compile itself.\n\nCompiling a stored procedure with special `plsql_ccflags`\
    \ by hand would look like the following example:\n\n```\nSQL@V112> ALTER PROCEDURE\
    \ SPECIAL1 COMPILE PLSQL_CCFLAGS='SPECIAL_ONE:42';\n\nProcedure altered.\n```\n\
    \nIn your development environment, you could use this framework and from it generate\
    \ deployment scripts. If some stored procedure after deployment needs to be compiled\
    \ with special flags, say you need to debug a procedure, it can be done as shown.\n\
    \nWhen creating deployment scripts, I ensure that I set the `PLSQL_CCFLAGS`, `PLSQL_WARNINGS`\
    \ before I add stored procedures; should there be different flags and warnings,\
    \ I set them before each stored procedure, as shown in the following code:\n\n\
    ```\n…\nALTER SESSION SET PLSQL_CCFLAGS='TIMING_ON:FLASE';\nALTER SESSION SET\
    \ PLSQL_WARNINGS='ENABLE:SEVERE,ENABLE_PERFORMANCE,ERROR:7204';\n@@ GET_T1_KEY\n\
    ALTER SESSION SET PLSQL_WARNINGS='ENABLE:SEVERE,ENABLE:PERFORMANCE';\n@@ SET_T1_KEY\n\
    …\n```\n\n#### Inquiry Variables\n\nSo far, I've been talking about the `plsql_ccflags`\
    \ parameter and conditional compilations. You can use conditional compilations\
    \ without having to set the `plsql_ccflags` parameter. You do that by querying\
    \ your own package constants or those defined by Oracle. Let's work through an\
    \ example.\n\nFirst, you create a `PACKAGE` specification holding a constant named\
    \ `TIMING_ON` set to the value `FALSE`.\n\n```\nSQL@V112> CREATE OR REPLACE PACKAGE\
    \ TIMING AS\n2     TIMING_ON CONSTANT BOOLEAN := FALSE;\n3  END;\n4  /\n```\n\n\
    Then you recreate the stored procedure referencing the `PACKAGE` constant.\n\n\
    `TIMING.TIMING_ON`\n\n```\nSQL@V112> CREATE OR REPLACE PROCEDURE LEVEL2 AS\n2  $IF\
    \ TIMING.TIMING_ON $THEN\n3     L_START_TIME TIMESTAMP;\n4  $END\n5  BEGIN\n6  DBMS_APPLICATION_INFO.SET_MODULE($$PLSQL_UNIT\
    \ ,NULL);\n7  $IF TIMING.TIMING_ON $THEN\n8     L_START_TIME:=CURRENT_TIMESTAMP;\n\
    9  $END\n10  -- -----------------------------------------------\n11  -- Application\
    \ logic is left out\n12  -- -----------------------------------------------\n\
    13  $IF TIMING.TIMING_ON $THEN\n14    LOGIT (P_PG=>$$PLSQL_UNIT, P_START_TIME=>L_START_TIME,\
    \ P_STOP_TIME=>CURRENT_TIMESTAMP);\n15  $END\n16  DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);\n\
    17  END LEVEL2;\n18  /\n\nProcedure created.\n```\n\nCalling the `DBMS_PREPROCESSOR.PRINT_POST_PROCESSED_SOURCE`\
    \ shows you that the code has been preprocessed with `TIMING_ON = FALSE`, as expected.\n\
    \n```\nSQL@V112> CALL DBMS_PREPROCESSOR.PRINT_POST_PROCESSED_SOURCE('PROCEDURE',\
    \ 'SCOTT','LEVEL2');\nPROCEDURE LEVEL2 AS\nBEGIN\nDBMS_APPLICATION_INFO.SET_MODULE(\
    \ 'LEVEL2'    ,NULL);\n-- -----------------------------------------------\n--\
    \ Application logic is left out\n-- -----------------------------------------------\n\
    DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);\nEND LEVEL2;\n\nCall completed.\n\
    ```\n\nChanging the `PACKAGE` constant to `TRUE` will set all stored procedures\
    \ that reference this package to an invalid state. Hence, they all need to be\
    \ recompiled.\n\n```\nSQL@V112> CREATE OR REPLACE PACKAGE TIMING AS\n2     TIMING_ON\
    \ CONSTANT BOOLEAN := TRUE;\n3  END;\n4  /\n```\n\n```\nSQL@V112> SELECT OBJECT_NAME,\
    \ STATUS FROM USER_OBJECTS WHERE OBJECT_NAME IN\n![images](images/U003.jpg)\n\
    \ ('TIMING','LEVEL1','LEVEL2');\n\nOBJECT_NAME                    STATUS\n------------------------------\
    \ -------\nTIMING                         VALID\nLEVEL1                         INVALID\n\
    LEVEL2                         INVALID\n```\n\nAfter the recompilation of the\
    \ code, it will match the `TIMING_ON` value. In this case, you have enabled timing\
    \ measurements in all dependent stored procedures. Bear in mind the warning that\
    \ I gave previously regarding recompiling all your code in a production environment."
  raw: '#### Controlling Compilation


    Having different plsql_ccflags for each procedure—and thus a large number of compiler
    flags—may be confusing. Even though you may execute an ALTER PROCEDURE <procedure
    name> COMPILE REUSE SETTINGS, at some point you may accidently compile a procedure
    without having set the appropriate compiler flags. And if you don''t check in
    your conditional compilation code whether a ccflag is set, your code may compile
    with the “wrong” setting. A way to avoid this could be to build a small framework
    that controls the recompilation, as in the following example:


    `SQL@V112> CREATE TABLE CC_FLAGS (`

    `2  OWNER        VARCHAR2(30),`

    `3  OBJECT_TYPE  VARCHAR2(30),`

    `4  OBJECT_NAME  VARCHAR2(30),`

    `5  CCFLAGS       VARCHAR2(4000));`


    Table Created.


    `Add the rows with information for each procedure.`


    `SQL@V112> INSERT INTO CC_FLAGS (OWNER, OBJECT_TYPE, OBJECT_NAME, CCFLAGS) VALUES(''ACME''
    ,`![images](images/U003.jpg)

    ` ''PROCEDURE'', ''LEVEL2'', ''TIMING_ON:FALSE'');`


    `1 Row created.`


    `SQL@V112> INSERT INTO CC_FLAGS (OWNER, OBJECT_TYPE, OBJECT_NAME, CCFLAGS) VALUES(''ACME''
    ,`![images](images/U003.jpg)

    `''PROCEDURE'', ''LEVEL1'', '''');`


    `1 Row created.`


    `SQL@V112> COMMIT;`


    `Commit complete.`


    `SQL@V112> BEGIN`

    `2  FOR I IN (SELECT * FROM CC_FLAGS) LOOP`

    `3   EXECUTE IMMEDIATE ''ALTER '' ||I.OBJECT_TYPE||'' ''||I.OWNER||''.''||I.OBJECT_NAME||''
    COMPILE`

    `PLSQL_CCFLAGS=''''''||I.CCFLAGS||'''''''';`

    `4 END LOOP;`

    `5 END;`

    `6 /`


    `PL/SQL procedure successfully completed.`


    So after running this anonymous PL/SQL block, the procedures are compiled with
    their settings. This could (or should) perhaps be a stored procedure, perhaps
    even with parameters to control whether one or all should be compiled; if so,
    don''t put that procedure in the CC_FLAGS table or you will end up in a deadlock
    situation when the running procedure tries to compile itself.


    Compiling a stored procedure with special plsql_ccflags by hand would look like
    the following example:


    `SQL@V112> ALTER PROCEDURE SPECIAL1 COMPILE PLSQL_CCFLAGS=''SPECIAL_ONE:42'';`


    `Procedure altered.`


    In your development environment, you could use this framework and from it generate
    deployment scripts. If some stored procedure after deployment needs to be compiled
    with special flags, say you need to debug a procedure, it can be done as shown.


    When creating deployment scripts, I ensure that I set the PLSQL_CCFLAGS, PLSQL_WARNINGS
    before I add stored procedures; should there be different flags and warnings,
    I set them before each stored procedure, as shown in the following code:


    `…`

    `ALTER SESSION SET PLSQL_CCFLAGS=''TIMING_ON:FLASE'';`

    `ALTER SESSION SET PLSQL_WARNINGS=''ENABLE:SEVERE,ENABLE_PERFORMANCE,ERROR:7204'';`

    `@@ GET_T1_KEY`

    `ALTER SESSION SET PLSQL_WARNINGS=''ENABLE:SEVERE,ENABLE:PERFORMANCE'';`

    `@@ SET_T1_KEY`

    `…`


    #### Inquiry Variables


    So far, I''ve been talking about the plsql_ccflags parameter and conditional compilations.
    You can use conditional compilations without having to set the plsql_ccflags parameter.
    You do that by querying your own package constants or those defined by Oracle.
    Let''s work through an example.


    First, you create a PACKAGE specification holding a constant named TIMING_ON set
    to the value FALSE.


    `SQL@V112> CREATE OR REPLACE PACKAGE TIMING AS`

    `2     TIMING_ON CONSTANT BOOLEAN := FALSE;`

    `3  END;`

    `4  /`


    Then you recreate the stored procedure referencing the PACKAGE constant.


    `TIMING.TIMING_ON`


    `SQL@V112> CREATE OR REPLACE PROCEDURE LEVEL2 AS`

    `2  $IF TIMING.TIMING_ON $THEN`

    `3     L_START_TIME TIMESTAMP;`

    `4  $END`

    `5  BEGIN`

    `6  DBMS_APPLICATION_INFO.SET_MODULE($$PLSQL_UNIT ,NULL);`

    `7  $IF TIMING.TIMING_ON $THEN`

    `8     L_START_TIME:=CURRENT_TIMESTAMP;`

    `9  $END`

    `10  -- -----------------------------------------------`

    `11  -- Application logic is left out`

    `12  -- -----------------------------------------------`

    `13  $IF TIMING.TIMING_ON $THEN`

    `14    LOGIT (P_PG=>$$PLSQL_UNIT, P_START_TIME=>L_START_TIME, P_STOP_TIME=>CURRENT_TIMESTAMP);`

    `15  $END`

    `16  DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);`

    `17  END LEVEL2;`

    `18  /`


    `Procedure created.`


    Calling the DBMS_PREPROCESSOR.PRINT_POST_PROCESSED_SOURCE shows you that the code
    has been preprocessed with TIMING_ON = FALSE, as expected.


    `SQL@V112> CALL DBMS_PREPROCESSOR.PRINT_POST_PROCESSED_SOURCE(''PROCEDURE'', ''SCOTT'',''LEVEL2'');`

    `PROCEDURE LEVEL2 AS`

    `BEGIN`

    `DBMS_APPLICATION_INFO.SET_MODULE( ''LEVEL2''    ,NULL);`

    `-- -----------------------------------------------`

    `-- Application logic is left out`

    `-- -----------------------------------------------`

    `DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);`

    `END LEVEL2;`


    `Call completed.`


    Changing the PACKAGE constant to TRUE will set all stored procedures that reference
    this package to an invalid state. Hence, they all need to be recompiled.


    `SQL@V112> CREATE OR REPLACE PACKAGE TIMING AS`

    `2     TIMING_ON CONSTANT BOOLEAN := TRUE;`

    `3  END;`

    `4  /`


    `SQL@V112> SELECT OBJECT_NAME, STATUS FROM USER_OBJECTS WHERE OBJECT_NAME IN`![images](images/U003.jpg)

    ` (''TIMING'',''LEVEL1'',''LEVEL2'');`


    `OBJECT_NAME                    STATUS`

    `------------------------------ -------`

    `TIMING                         VALID`

    `LEVEL1                         INVALID`

    `LEVEL2                         INVALID`


    After the recompilation of the code, it will match the TIMING_ON value. In this
    case, you have enabled timing measurements in all dependent stored procedures.
    Bear in mind the warning that I gave previously regarding recompiling all your
    code in a production environment.'
  trans: "\n#### 控制编译\n\n为每个过程设置不同的 `plsql_ccflags`，从而产生大量编译器标志，可能会令人困惑。即使你可以执行 `ALTER\
    \ PROCEDURE <过程名> COMPILE REUSE SETTINGS` 命令，但在某个时候，你可能会在未设置适当编译器标志的情况下意外编译了一个过程。并且，如果你没有在条件编译代码中检查是否设置了某个\
    \ `ccflag`，你的代码可能会以“错误”的设置进行编译。避免这种情况的一个方法是构建一个小型框架来控制重新编译，如下例所示：\n\n```\nSQL@V112>\
    \ CREATE TABLE CC_FLAGS (\n2  OWNER        VARCHAR2(30),\n3  OBJECT_TYPE  VARCHAR2(30),\n\
    4  OBJECT_NAME  VARCHAR2(30),\n5  CCFLAGS      VARCHAR2(4000));\n\n表已创建。\n```\n\
    \n`添加包含每个过程信息的行。`\n\n```\nSQL@V112> INSERT INTO CC_FLAGS (OWNER, OBJECT_TYPE,\
    \ OBJECT_NAME, CCFLAGS) VALUES('ACME' ,\n![images](img/U003.jpg)\n 'PROCEDURE',\
    \ 'LEVEL2', 'TIMING_ON:FALSE');\n\n已创建 1 行。\n```\n\n```\nSQL@V112> INSERT INTO\
    \ CC_FLAGS (OWNER, OBJECT_TYPE, OBJECT_NAME, CCFLAGS) VALUES('ACME' ,\n![images](img/U003.jpg)\n\
    'PROCEDURE', 'LEVEL1', '');\n\n已创建 1 行。\n```\n\n```\nSQL@V112> COMMIT;\n\n提交完成。\n\
    ```\n\n```\nSQL@V112> BEGIN\n2  FOR I IN (SELECT * FROM CC_FLAGS) LOOP\n3   EXECUTE\
    \ IMMEDIATE 'ALTER ' ||I.OBJECT_TYPE||' '||I.OWNER||'.'||I.OBJECT_NAME||' COMPILE\
    \ PLSQL_CCFLAGS='''||I.CCFLAGS||'''';\n4 END LOOP;\n5 END;\n6 /\n\nPL/SQL 过程已成功完成。\n\
    ```\n\n因此，运行完这个匿名 PL/SQL 块后，过程将按照它们各自的设置进行编译。这或许可以（或应该）是一个存储过程，甚至可以带参数来控制编译一个还是全部；如果是这样，不要把这个过程放在\
    \ `CC_FLAGS` 表中，否则当正在运行的过程尝试编译自身时，你会陷入死锁局面。\n\n手动编译带有特殊 `plsql_ccflags` 的存储过程如下例所示：\n\
    \n```\nSQL@V112> ALTER PROCEDURE SPECIAL1 COMPILE PLSQL_CCFLAGS='SPECIAL_ONE:42';\n\
    \n过程已变更。\n```\n\n在你的开发环境中，你可以使用这个框架，并从中生成部署脚本。如果某些存储过程在部署后需要使用特殊标志进行编译，比如说你需要调试某个过程，可以按所示的方法完成。\n\
    \n在创建部署脚本时，我会确保在添加存储过程之前设置好 `PLSQL_CCFLAGS`、`PLSQL_WARNINGS`；如果存在不同的标志和警告，我会在每个存储过程之前进行设置，如下列代码所示：\n\
    \n```\n…\nALTER SESSION SET PLSQL_CCFLAGS='TIMING_ON:FLASE';\nALTER SESSION SET\
    \ PLSQL_WARNINGS='ENABLE:SEVERE,ENABLE_PERFORMANCE,ERROR:7204';\n@@ GET_T1_KEY\n\
    ALTER SESSION SET PLSQL_WARNINGS='ENABLE:SEVERE,ENABLE:PERFORMANCE';\n@@ SET_T1_KEY\n\
    …\n```\n\n#### 查询变量\n\n到目前为止，我一直在讨论 `plsql_ccflags` 参数和条件编译。你可以在不设置 `plsql_ccflags`\
    \ 参数的情况下使用条件编译。方法是通过查询你自己的包常量或 Oracle 定义的常量。让我们通过一个例子来演示。\n\n首先，你创建一个 `PACKAGE`\
    \ 规范，其中包含一个名为 `TIMING_ON` 的常量，其值设置为 `FALSE`。\n\n```\nSQL@V112> CREATE OR REPLACE\
    \ PACKAGE TIMING AS\n2     TIMING_ON CONSTANT BOOLEAN := FALSE;\n3  END;\n4  /\n\
    ```\n\n然后你重新创建引用该 `PACKAGE` 常量的存储过程。\n\n`TIMING.TIMING_ON`\n\n```\nSQL@V112> CREATE\
    \ OR REPLACE PROCEDURE LEVEL2 AS\n2  $IF TIMING.TIMING_ON $THEN\n3     L_START_TIME\
    \ TIMESTAMP;\n4  $END\n5  BEGIN\n6  DBMS_APPLICATION_INFO.SET_MODULE($$PLSQL_UNIT\
    \ ,NULL);\n7  $IF TIMING.TIMING_ON $THEN\n8     L_START_TIME:=CURRENT_TIMESTAMP;\n\
    9  $END\n10  -- -----------------------------------------------\n11  -- 应用逻辑已省略\n\
    12  -- -----------------------------------------------\n13  $IF TIMING.TIMING_ON\
    \ $THEN\n14    LOGIT (P_PG=>$$PLSQL_UNIT, P_START_TIME=>L_START_TIME, P_STOP_TIME=>CURRENT_TIMESTAMP);\n\
    15  $END\n16  DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);\n17  END LEVEL2;\n\
    18  /\n\n过程已创建。\n```\n\n调用 `DBMS_PREPROCESSOR.PRINT_POST_PROCESSED_SOURCE` 显示，代码已经过预处理，且\
    \ `TIMING_ON = FALSE`，符合预期。\n\n```\nSQL@V112> CALL DBMS_PREPROCESSOR.PRINT_POST_PROCESSED_SOURCE('PROCEDURE',\
    \ 'SCOTT','LEVEL2');\nPROCEDURE LEVEL2 AS\nBEGIN\nDBMS_APPLICATION_INFO.SET_MODULE(\
    \ 'LEVEL2'    ,NULL);\n-- -----------------------------------------------\n--\
    \ 应用逻辑已省略\n-- -----------------------------------------------\nDBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);\n\
    END LEVEL2;\n\n调用完成。\n```\n\n将 `PACKAGE` 常量改为 `TRUE` 会使所有引用此包的存储过程变为无效状态。因此，它们都需要重新编译。\n\
    \n```\nSQL@V112> CREATE OR REPLACE PACKAGE TIMING AS\n2     TIMING_ON CONSTANT\
    \ BOOLEAN := TRUE;\n3  END;\n4  /\n```\n\n```\nSQL@V112> SELECT OBJECT_NAME, STATUS\
    \ FROM USER_OBJECTS WHERE OBJECT_NAME IN\n![images](img/U003.jpg)\n ('TIMING','LEVEL1','LEVEL2');\n\
    \nOBJECT_NAME                    STATUS\n------------------------------ -------\n\
    TIMING                         VALID\nLEVEL1                         INVALID\n\
    LEVEL2                         INVALID\n```\n\n代码重新编译后，它将与 `TIMING_ON` 的值匹配。在这种情况下，你已在所有相关的存储过程中启用了计时测量功能。请记住我之前关于在生产环境中重新编译所有代码的警告。\n"
- fmt: "#### Final Words on Conditional Compilation\n\nOracle offers a number of enquiry\
    \ variables. Besides the `$$PLSQL_UNIT` enquiry variable, the `$$PLSQL_LINE` is\
    \ becoming one of my favorites because it can be used for debugging.\n\n*   `$$PLSQL_CCFLAGS`\
    \ hold the current `PLSQL_CCFLAGS`.\n*   `$$PLSQL_WARNINGS` holds the current\
    \ `plsql_warnings` setting.\n*   `$$PLSQL_OPTIMIZE_LEVEL` holds the `PLSQL_OPTIMIZE_LEVEL`\
    \ parameter value.\n*   `$$PLSQL_LINE` holds the line number where the `$$PLSQL_LINE`\
    \ variable is located.\n*   `$$PLSCOPE_SETTING` holds the current value of the\
    \ session `PLSCOPE_SETTINGS` parameter.\n*   `$$PLSQL_CODE_TYPE` holds the current\
    \ value of the parameter `plsql_code_type`. Either `NATIVE` or `INTERPRETED`.\n\
    *   `$$NLS_LENGTH_SEMANTICS` holds the `NLS` lengths semantics is `BYTE` or `CHAR`.\n\
    \nAs a “normal” user, you're not able to execute the command `show parameter <parameter>`\
    \ to show the value of the parameters such as `plsql_ccflags` or `plsql_warnings`.\
    \ Therefore, these enquiry variables may come in handy. Create a script with an\
    \ anonymous PL/SQL block and execute the script to show the value of inquiry variables\
    \ in the current session, like so:\n\n```sql\nset serveroutput on\nBEGIN\n  dbms_output.put_line('PLSQL\
    \ Unit      : ' ||$$PLSQL_UNIT);\n  dbms_output.put_line('PLSQL CCFLAGS   : '\
    \ ||$$PLSQL_CCFLAGS);\n  dbms_output.put_line('PLSQL Warnings  : ' ||$$PLSQL_Warnings);\n\
    \  dbms_output.put_line('Optimize Level  : ' ||$$PLSQL_OPTIMIZE_LEVEL);\n  dbms_output.put_line('Line:\
    \ ' ||$$PLSQL_LINE);\n  dbms_output.put_line('PLSCOPE setting: ' ||$$PLSCOPE_SETTING);\n\
    \  dbms_output.put_line('PLSQL code type: ' ||$$PLSQL_CODE_TYPE);\n  dbms_output.put_line('NLS\
    \ length semantics: ' ||$$NLS_LENGTH_SEMANTICS);\n END;\n/\n```\n\nExecute the\
    \ script to see the value of the inquiry variables.\n\n```sql\nSQL@V112> @plsql_inqvar.sql\n\
    PLSQL Unit     :\nPLSQL CCFLAGS  : TIMING_ON:TRUE\nPLSQL Warnings : DISABLE:INFORMATIONAL,ENABLE:PERFORMANCE,ENABLE:SEVERE,ERROR:\
    \  7204\nOptimize Level: 2\nLine           : 6\nPLSCOPE setting:\nPLSQL code type:\
    \ INTERPRETED\nNLS length semantics: BYTE\n\nPL/SQL procedure successfully completed.\n\
    ```\n\nWith this small script you are able to see the current value of the inquiry\
    \ variables. The `$$PLSQL_UNIT` inquiry variable is empty, as its value is being\
    \ queried from an anonymous block.\n\n![images](images/square.jpg) `Note` The\
    \ PL/SQL inquiry variables are evaluated and translated at compilation time, so\
    \ having this in a stored procedure would require a recompilation of the procedure\
    \ if any of the flags have changed, in order to show the correct value.\n\nYou\
    \ could issue the following command to show the current value of `$$PLSQL_CCFLAGS`:\n\
    \n```sql\nSQL@V112> exec dbms_output.put_line($$PLSQL_CCFLAGS);\n\nTIMING_ON:TRUE\n\
    ```\n\nOne common use of conditional compilation is to enable specific code, depending\
    \ on the Oracle version; in other words, to define variables as either `NUMBER`\
    \ or `BINARY_FLOAT`, like so:\n\n```sql\n...\n$IF DBMS_DB_VERSION.VERSION >=11\
    \ $THEN\n   VAR BINARY_FLOAT;\n$ELSE\n  VAR NUMBER;\n$END;\n...\n```\n\nIn the\
    \ Package specification of `DBMS_DB_VERSION`, there are a number of Boolean “version”\
    \ constants that can be used to include or exclude code.\n\n```sql\n…\n$IF DBMS_DB_VERSION.VER_LE_11_2\
    \ $THEN\n  …\n$ELSE\n  …\n$END\n…\n```\n\nPutting it a bit to the extreme you\
    \ can make parameters to stored procedures conditional as shown in the example\
    \ here.\n\n```sql\nSQL@V112> CREATE PROCEDURE EXTREME (P_PARAM VARCHAR2 $IF $$INQ_FLAG\
    \ $THEN, P_PARAM2 VARCHAR2 $END) IS\n   2   BEGIN\n   3     NULL;\n   4   END;\n\
    \   5   /\n```\n\nSo depending on the `$INQ_FLAG` you would have either one or\
    \ two parameters - it can be done, but not advisable.\n\n### Summary\n\nIn this\
    \ chapter, you learned what you may gain from enabling warnings. You looked into\
    \ how to enable warnings at the session, system, or procedure level. You have\
    \ explored how to either promote warnings to become errors or how to ignore them\
    \ by disabling them. You saw that PL/SQL warnings would certainly help you to\
    \ make your code perform better and make it more robust. It will, though, give\
    \ you an extra administrative task, especially if you have too many exceptions\
    \ for which warnings should be enabled, disabled, or promoted to be errors.\n\n\
    ![images](images/square.jpg) `Note` You will not necessarily have to enable PL/SQL\
    \ warnings on your production system if your code is checked in the development\
    \ environment.\n\nIn looking at conditional compilation, you saw that using conditional\
    \ compilation can limit the size of memory used by PL/SQL by only enabling logging\
    \ or debugging information when required. You also saw that by using conditional\
    \ compilation and setting a flag and performing a recompile, you were able to\
    \ enable or disable code without having to edit the code. Conditional compilation\
    \ is widely used in languages such as C++. Now you can have it as part of your\
    \ PL/SQL toolbox, too.\n\n## PL/SQL Unit Testing\n\n**by Sue Harper**\n\nAny developer\
    \ accessing the Oracle Database uses SQL whether running SQL reports and queries\
    \ developed personally or provided by another developer. While it may not be true\
    \ to say that every developer runs and uses PL/SQL when working with the Oracle\
    \ Database, the number is no doubt very high as any procedural access to the Oracle\
    \ Database is best done using PL/SQL. As a developer, if you create and work with\
    \ PL/SQL, you should be debugging and testing the PL/SQL to ensure accurate and\
    \ efficient code.\n\nIn this chapter, you’ll look at PL/SQL unit testing: what\
    \ is meant by unit testing, why it’s important in the development lifecycle, and\
    \ how to build tests. There are a few tools and utilities available to help you\
    \ build tests. It doesn’t matter which you use. What does matter is that you get\
    \ into the habit of building and running tests against your code. I use Oracle\
    \ SQL Developer to do any testing and so that is the tool I’ll use to illustrate\
    \ an approach to building and running PL/SQL unit tests.\n\n### Why Test Your\
    \ Code?\n\nSoftware and application developers all write code; some write better\
    \ code than others, but everyone tries to write code that does what it is meant\
    \ to do and hopes it does that well. That is hardly a vote of confidence for writing\
    \ good code! Not only is it essential your code is accurate and performs well,\
    \ it is also important to know that it is robust and able to stand the test of\
    \ time. This means that the code should perform in the same way, producing the\
    \ same results over time regardless of changes made to the environment around\
    \ it.\n\nHow can you guarantee this? Perhaps you can’t because you can’t be 100\
    \ percent certain of all the changes that may happen in the future, but if you\
    \ write regression tests that can be run whenever you want or need to, then you\
    \ can determine whether a program unit performs as expected and continues to do\
    \ so. The more tests you write, with more variations, the closer you get to ensuring\
    \ that the program units are robust and still working as intended.\n\nIt is crucial\
    \ that not only do you know that your code is working today, but also that you\
    \ can *prove* that it works—and that at any time in the future you can prove the\
    \ same results. Depending on the requirements of the program unit, your code may\
    \ have to support a range of scenarios or use cases, and you should be able to\
    \ test a wide range of use cases. If you can show numerically that you have tested\
    \ a broad spectrum of these use cases and rerun these test cases, you come closer\
    \ to empirically proving that the code is robust. If you are able to rerun tests\
    \ at any time and once again verify the results, you can quickly determine the\
    \ points of failure and address them.\n\nWithout regression tests, you can’t know\
    \ if your code is working or when it stopped working. Even the best code may be\
    \ unreliable, but you can’t prove it one way or the other."
