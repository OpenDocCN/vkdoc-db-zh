    \ NAME = 'LEVEL2';\n\nNAME           TYPE          SOURCE_SIZE PARSED_SIZE  CODE_SIZE\
    \ ERROR_SIZE\n-------------- ------------- ----------- ----------- ----------\
    \ ----------\nLEVEL2         PROCEDURE               521         996        510\
    \          0\n```\n\n`SOURCE_SIZE` 列显示给定过程的源代码大小。源代码在编译期间必须加载到内存中。`PARSED_SIZE`\
    \ 是当其他已编译的程序引用它时，给定程序所需的内存量。`CODE_SIZE` 是程序执行所需内存的起始大小。最后，`ERROR_SIZE` 列是编译期间错误信息在内存中占用的字节数。在本例中，`ERROR_SIZE`\
    \ 为 0，因为编译期间没有发生错误。\n\n假设您创建了相同的过程，但让一个 PL/SQL 编译器标志来控制计时测量调用，使代码看起来像这样：\n\n```sql\n\
    SQL@V112> CREATE OR REPLACE PROCEDURE LEVEL2 AS\n2  $IF $$TIMING_ON $THEN\n3 \
    \    l_start_time TIMESTAMP;\n4  $END\n5  BEGIN\n6  DBMS_APPLICATION_INFO.SET_MODULE($$PLSQL_UNIT\
    \ ,NULL);\n7     $IF $$TIMING_ON $THEN\n8       l_start_time:=CURRENT_TIMESTAMP;\n\
    9     $END\n10     -- -----------------------------------------------\n11    \
    \ -- 应用逻辑部分已省略\n12     -- -----------------------------------------------\n13\
    \     $IF $$TIMING_ON $THEN\n14       LOGIT (P_PG=>$$PLSQL_UNIT, P_START_TIME=>l_start_time,\n\
    P_STOP_TIME=>CURRENT_TIMESTAMP);\n15     $END\n16  DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);\n\
    17  END LEVEL2;\n18  /\n过程已创建。\n```\n\n将 PL/SQL 标志 `TIMING_ON` 设置为 `FALSE` 会导致以下代码大小：\n\
    \n```sql\nSQL@V112> SELECT * FROM USER_OBJECT_SIZE WHERE NAME = 'LEVEL2';\n\n\
    NAME          TYPE          SOURCE_SIZE PARSED_SIZE  CODE_SIZE ERROR_SIZE\n-------------\
    \ ------------- ----------- ----------- ---------- ----------\nLEVEL2        PROCEDURE\
    \               530         857        364          0\n```\n\n`SOURCE_SIZE` 与第一个示例中的大小几乎相同，尽管添加了\
    \ `$IF` 结构来控制变量 `l_start_time` 的定义和引用。第一个示例在代码中也包含参数解析，所以两者在那方面差异不大。但是 `PARSED_SIZE`\
    \ 和 `CODE_SIZE` 的值都减小了。\n\n现在让我们看看启用计时时的情况。将编译器标志 `TIMING_ON` 设置为 `TRUE` 来编译过程\
    \ `LEVEL2` 会得到以下结果：\n\n```sql\nSQL@V112> SELECT * FROM USER_OBJECT_SIZE WHERE\
    \ NAME = 'LEVEL2';\n```\n"
- fmt: "# Oracle条件编译与对象失效\n\n```sql\nNAME          TYPE          SOURCE_SIZE PARSED_SIZE  CODE_SIZE\
    \ ERROR_SIZE\n------------- ------------- ----------- ----------- ---------- ----------\n\
    LEVEL2        PROCEDURE             530         917        478          0\n```\n\
    \n与使用 `TIMING_ON` 设置为 `FALSE` 编译的代码相比，`SOURCE_SIZE` 没有差异，但 `PARSED_SIZE` 和 `CODE_SIZE`\
    \ 值略有增加。这是由于调用了过程 `LOGIT`。\n\n现在看看原始 `LEVEL2` 过程的大小，这个是将 `TIMING_ON` 设置为 `TRUE`\
    \ 的。\n\n```sql\nSQL@V102> select * from USER_OBJECT_SIZE WHERE NAME = 'LEVEL2';\n\
    ```\n\n```sql\nNAME          TYPE          SOURCE_SIZE PARSED_SIZE  CODE_SIZE\
    \ ERROR_SIZE\n------------- ------------- ----------- ----------- ---------- ----------\n\
    LEVEL2        PROCEDURE             730         917        497          0\n```\n\
    \n`SOURCE_SIZE` 比没有条件编译的 `LEVEL2` 过程要大，但 `PARSED_SIZE` 和 `CODE_SIZE` 与有条件编译的有限版本\
    \ `LEVEL2` 相同或几乎相同。这是因为在编译期间，条件编译代码被剥离了。因此，你可以看到使用条件编译会导致在源代码中和编译期间（以及由依赖项触发的自动重新编译期间）占用更大的空间。如果\
    \ Oracle 执行自动重新编译，会使用 `REUSE SETTINGS` 编译选项。\n\n因此，不使用条件编译，你会得到：\n\n```sql\nSQL@V102>\
    \ exec level2\n\nElapsed: 00:00:20.60\n```\n\n而使用条件编译（`TIMING_ON` 设置为 `TRUE`），你会得到：\n\
    \n```sql\nSQL@V102> exec level2\n\nElapsed: 00:00:20.49\n```\n\n这里的差异只是零点几秒的事情。这样短的时间是为换取条件编译的好处而付出的微不足道的代价。\n\
    \n## 失效\n\n依赖于其他对象的对象可能会在它们依赖的对象发生变化或因某些原因失效时变得无效。让我们通过创建一个调用 `LEVEL2` 过程的 `LEVEL1`\
    \ 过程来稍微扩展一下这个想法。第一个例子运行在 Oracle 10.2 上。\n\n```sql\nSQL@V102> CREATE OR REPLACE\
    \ PROCEDURE LEVEL1 AS\n2  BEGIN\n3    LEVEL2;\n4  END;\n5  /\nProcedure created.\n\
    ```\n\n当你必须编译一个较低层级的过程时，如果存在依赖关系，Oracle 将使较高层级的过程失效，从而在下次调用较高层级过程时强制进行自动重新编译——当然，前提是它之前没有被手动编译过。\n\
    \n创建 `LEVEL1` 过程后，重新编译 `LEVEL2` 过程。\n\n```sql\nSQL@V102> ALTER PROCEDURE LEVEL2\
    \ COMPILE REUSE SETTINGS;\n\nProcedure altered.\n```\n\n然后检查这些过程的 `STATUS`。\n\n\
    ```sql\nSQL@V102> SELECT OBJECT_NAME, STATUS FROM USER_OBJECTS WHERE OBJECT_NAME\
    \ IN\n ('LEVEL1','LEVEL2');\n\nOBJECT_NAME                    STATUS\n------------------------------\
    \ -------\nLEVEL1                         INVALID\nLEVEL2                         VALID\n\
    ```\n\n执行 `LEVEL1` 过程将强制重新编译并验证该过程。\n\n```sql\nSQL@V102> exec LEVEL1\n\nPL/SQL\
    \ procedure successfully completed.\n\nSQL@V102> SELECT OBJECT_NAME, STATUS FROM\
    \ USER_OBJECTS WHERE OBJECT_NAME IN\n ('LEVEL1','LEVEL2');\n\nOBJECT_NAME                    STATUS\n\
    ------------------------------ -------\nLEVEL1                         VALID\n\
    LEVEL2                         VALID\n```\n\n`LEVEL1` 过程已被动态重新编译，现在再次有效。这与条件编译无关——这只是它的工作方式。\n\
    \n> **注意**\n> 在一个系统中有数百个存储过程相互调用，然后有意或间接地重新编译一个过程，可能是一场灾难。让我用一个真实的故事来强调这一点。在一家拥有数百并发用户的公司中，一次手动更新表的操作出了错误——一个列被设置成了错误的值。于是数据库管理员使用\
    \ `SELECT AS OF TIMESTAMP` 创建了该表的一个副本。到目前为止，一切正常。然后他重命名了原始表，并快速将副本的表重命名为原始名称。嗯，Oracle\
    \ 会注意到这种名称交换，如果存在任何依赖关系的话。在这个案例中，该表被一个低层级过程引用，该过程变为无效，导致所有依赖于此过程的所有过程也变为无效。这使得几乎所有的用户会话都排队等待重新编译代码。由于没有人能在系统上工作，数据库不得不重启。重启后，系统照常工作。\n\
    \n在 Oracle 11g 中，Oracle 放宽了对依赖对象失效的规则。如果你不更改过程参数的足迹，Oracle 不会强制使依赖对象失效，无论它遇到的是包中的过程还是独立过程。如果你在\
    \ Oracle 11g 而不是 Oracle 10g 中重新运行前面涉及 `LEVEL1` 和 `LEVEL2` 的例子，结果将如下所示：\n\n```sql\n\
    SQL@V112> SELECT OBJECT_NAME, STATUS FROM USER_OBJECTS WHERE OBJECT_NAME IN\n\
    \ ('LEVEL1','LEVEL2');\n\nOBJECT_NAME                    STATUS\n------------------------------\
    \ -------\nLEVEL1                         VALID\nLEVEL2                         VALID\n\
    \nSQL@V112> ALTER PROCEDURE LEVEL2 COMPILE REUSE SETTINGS;\n\nProcedure altered.\n\
    \nSQL@V112> SELECT OBJECT_NAME, STATUS FROM USER_OBJECTS WHERE OBJECT_NAME IN\n\
    \ ('LEVEL1','LEVEL2');\n\nOBJECT_NAME                    STATUS\n------------------------------\
    \ -------\nLEVEL1                         VALID\nLEVEL2                         VALID\n\
    \nSQL@V112>\n```\n\n注意，两个过程最终都是有效的。因为你在 Oracle 11g 中，并且因为你的过程足迹没有改变，Oracle 不会强制重新编译。"
  raw: '`NAME          TYPE          SOURCE_SIZE PARSED_SIZE  CODE_SIZE ERROR_SIZE`

    `------------- ------------- ----------- ----------- ---------- ----------`

    `LEVEL2        PROCEDURE             530         917        478          0`


    Compared to the code that was compiled with TIMING_ON set to FALSE, the SOURCE_SIZE
    does not differ, but the PARSED_SIZE and CODE_SIZE values have been increased
    slightly. This is because of the call to the procedure LOGIT.


    Now take a look now at the size of the original LEVEL2 procedure, this one with
    TIMING_ON set to TRUE.


    `SQL@V102> select * from USER_OBJECT_SIZE WHERE NAME = ''LEVEL2'';`


    `NAME          TYPE          SOURCE_SIZE PARSED_SIZE  CODE_SIZE ERROR_SIZE`

    `------------- ------------- ----------- ----------- ---------- ----------`

    `LEVEL2        PROCEDURE             730         917        497          0`


    The SOURCE_SIZE is larger than the LEVEL2 procedure without conditional compilation,
    but the PARSED_SIZE and CODE_SIZE are the same, or nearly so, as the limited LEVEL2
    with conditional compilation. This is because the conditional compilation code
    is stripped during the compilation. Thus, you can see that using conditional compilation
    results in a bigger footprint in source and during compilation (and also during
    automatic recompilation triggered by dependencies). If Oracle executes an automatic
    recompilation, the REUSE SETTINGS compile option is used.


    So, without conditional compilation, you get this:


    `SQL@V102> exec level2`


    `Elapsed: 00:00:20.60`


    And with conditional compilation (TIMING_ON set to TRUE), you get this:


    `SQL@V102> exec level2`


    `Elapsed: 00:00:20.49`


    Here the difference is only a matter of fragments of seconds. Such a small period
    of time is an inconsequential price to pay in return for the benefits of conditional
    compilation.


    #### Invalidations


    Objects dependent on other objects may be invalidated if the objects they dependent
    on change or get invalidated for some reason. Let''s expand this idea a bit by
    creating a LEVEL1 procedure that calls the LEVEL2 procedure. The first example
    is running in Oracle 10.2.


    `SQL@V102> CREATE OR REPLACE PROCEDURE LEVEL1 AS`

    `2  BEGIN`

    `3    LEVEL2;`

    `4  END;`

    `5  /`

    `Procedure created.`


    When you have to compile a procedure at a lower level, Oracle will invalidate
    the procedure at the higher level if dependencies exists and thereby force an
    automatic recompilation the next time the higher level procedure is called—if
    it''s not compiled manually beforehand, that is.


    After creating the LEVEL1 procedure, recompile the LEVEL2 procedure.


    `SQL@V102> ALTER PROCEDURE LEVEL2 COMPILE REUSE SETTINGS;`


    `Procedure altered.`


    Then examine the `STATUS` of the procedures.


    `SQL@V102> SELECT OBJECT_NAME, STATUS FROM USER_OBJECTS WHERE OBJECT_NAME IN`![images](images/U003.jpg)

    ` (''LEVEL1'',''LEVEL2'');`


    `OBJECT_NAME                    STATUS`

    `------------------------------ -------`

    `LEVEL1                         INVALID`

    `LEVEL2                         VALID`


    Executing the LEVEL1 procedure will enforce a recompilation and validate the procedure.


    `SQL@V102> exec LEVEL1`


    `PL/SQL procedure successfully completed.`


    `SQL@V102> SELECT OBJECT_NAME, STATUS FROM USER_OBJECTS WHERE OBJECT_NAME IN`![images](images/U003.jpg)

    ` (''LEVEL1'',''LEVEL2'');`


    `OBJECT_NAME                    STATUS`

    `------------------------------ -------`

    `LEVEL1                         VALID`

    `LEVEL2                         VALID`


    The LEVEL1 procedure has been dynamically recompiled and is now valid again. This
    has nothing to do with conditional compilation—that''s just how it works.


    ![images](images/square.jpg) **Caution** Having hundreds of stored procedures
    calling one another in a system and then making a recompilation either on purpose
    or indirectly of a procedure may be a disaster. Let me emphasize this with a true
    story. In a company with hundreds of concurrent users, a manual update of a table
    had gone wrong—a column was set to a wrong value. So the Database Administrator
    created a copy of the table with a `SELECT AS OF TIMESTAMP`. So far, everything
    was fine. Then he renamed the original table and quickly renamed the copy of the
    table to the original name. Well, Oracle will notice such a swapping of names,
    should there be any dependencies. In this case, this table was referenced by a
    low level procedure, which went invalid, causing all procedures that relied on
    this procedure to go invalid as well. This made almost all user sessions line
    up for recompilation of the code. The database had to be restarted, as nobody
    could work on the system. After the restart, the system worked as usual.


    In Oracle 11g, Oracle has loosened the rules for invalidation of dependent objects.
    If you don''t change the footprint of the parameter of a procedure, Oracle will
    not force an invalidation of dependent objects, whether it encounters procedures
    in packages or stand-alone procedures. If you rerun the preceding example involving
    LEVEL1 and LEVEL2 in Oracle 11g rather than Oracle 10g, the result will look like
    the following:


    `SQL@V112> SELECT OBJECT_NAME, STATUS FROM USER_OBJECTS WHERE OBJECT_NAME IN`![images](images/U003.jpg)

    ` (''LEVEL1'',''LEVEL2'');`


    `OBJECT_NAME                    STATUS`

    `------------------------------ -------`

    `LEVEL1                         VALID`

    `LEVEL2                         VALID`


    `SQL@V112> ALTER PROCEDURE LEVEL2 COMPILE REUSE SETTINGS;`


    `Procedure altered.`


    `SQL@V112> SELECT OBJECT_NAME, STATUS FROM USER_OBJECTS WHERE OBJECT_NAME IN`![images](images/U003.jpg)

    ` (''LEVEL1'',''LEVEL2'');`


    `OBJECT_NAME                    STATUS`

    `------------------------------ -------`

    `LEVEL1                         VALID`

    `LEVEL2                         VALID`


    `SQL@V112>`


    Notice that both procedures end up as valid. Because you are in Oracle 11g and
    because your procedure footprints have not changed, Oracle does not force a recompile.'
