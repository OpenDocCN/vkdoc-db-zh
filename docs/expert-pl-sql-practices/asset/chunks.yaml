    ```\n"
- fmt: "# Exiting a Loop\n\nWhen fetching within a cursor loop with the conventional\
    \ row-at-a-time mechanism, it is implicit when there are no more rows left in\
    \ the result set. You issue a fetch call; if it fails, you’re done. Things are\
    \ slightly more complicated than that when you fetch in bulk—a fetch call may\
    \ retrieve sufficient rows to fill the array, or it may retrieve no rows, or it\
    \ may receive some rows but not enough to completely fill the array. This leads\
    \ to a common program mistake when using the `LIMIT` clause.\n\nFirst, here again\
    \ is the row-at-a-time code (`bulk_limit_exit_1.sql`) as presented earlier in\
    \ the chapter:\n\n```sql\nSQL> set serverout on\nSQL> declare\n  2    cursor c_tool_list\
    \ is\n  3      select descr\n  4      from   hardware\n  5      where  aisle =\
    \ 1\n  6      and    item between 1 and 25;\n  7\n  8    l_descr hardware.descr%type;\n\
    \  9  begin\n 10    open c_tool_list;\n 11    loop\n 12      fetch c_tool_list\
    \ into l_descr;\n 13      exit when c_tool_list%notfound;\n 14      dbms_output.put_line('Fetched\
    \ '||l_descr);\n 15    end loop;\n 16    close c_tool_list;\n 17  end;\n 18  /\n\
    Fetched Description 1\nFetched Description 2\nFetched Description 3\n[snip]\n\
    Fetched Description 23\nFetched Description 24\nFetched Description 25\n\nPL/SQL\
    \ procedure successfully completed.\n```\n\nNote that 25 rows were fetched and\
    \ displayed on the screen. Now the code is converted to bulk collect with the\
    \ `LIMIT` clause in what appears to be the intuitive way, but as it turns out,\
    \ the wrong way. Here is the incorrect solution (`bulk_limit_exit_2.sql`) and\
    \ its output:\n\n```sql\nSQL> set serverout on\nSQL> declare\n  2    cursor c_tool_list\
    \ is\n  3      select descr\n  4      from   hardware\n  5      where  aisle =\
    \ 1\n  6      and    item between 1 and 25;\n  7\n  8    type t_descr_list is\
    \ table of c_tool_list%rowtype;\n  9    l_descr_list t_descr_list;\n 10\n 11 \
    \ begin\n 12    open c_tool_list;\n 13    loop\n 14      fetch c_tool_list\n 15\
    \      bulk collect into l_descr_list limit 10;\n 16      exit when c_tool_list%notfound;\n\
    \ 17\n 18      for i in 1 .. l_descr_list.count loop\n 19        dbms_output.put_line('Fetched\
    \ '||l_descr_list(i).descr);\n 20      end loop;\n 21    end loop;\n 22\n 23 \
    \   close c_tool_list;\n 24  end;\n 25  /\nFetched Description 1\nFetched Description\
    \ 2\nFetched Description 3\n[snip]\nFetched Description 18\nFetched Description\
    \ 19\nFetched Description 20\n\nPL/SQL procedure successfully completed.\n```\n\
    \nNotice that the cursor loop has been exited prematurely: 25 rows (exactly like\
    \ the row-at-a-time example) should have been output, but the code stopped after\
    \ 20. The problem lies with line 16: `exit when c_tool_list%notfound`. 10 rows\
    \ per fetch call are being requested with the `LIMIT` clause. On the third pass\
    \ through the loop, there are only 5 rows left to be fetched. Because all of the\
    \ rows are now fetched, the `%NOTFOUND` attribute becomes true and the loop exits\
    \ `without` processing those remaining 5 rows in the array.\n\nThe solution is\
    \ simple, either defer the checking of the cursor attribute until after processing\
    \ any rows found in the fetch array or change the exit condition to be `<array>.count\
    \ = 0` (which would also mean one extra iteration through the fetch loop).\n\n\
    The following is an example of the first solution in which the code defers checking\
    \ of the cursor attribute until *after* processing any rows in the array (`bulk_limit_exit_3.sql`):\n\
    \n```sql\nSQL> set serverout on\nSQL> declare\n  2    cursor c_tool_list is\n\
    \  3      select descr\n  4      from   hardware\n  5      where  aisle = 1\n\
    \  6      and    item between 1 and 25;\n  7\n  8    type t_descr_list is table\
    \ of c_tool_list%rowtype;\n  9    l_descr_list t_descr_list;\n 10\n 11  begin\n\
    \ 12    open c_tool_list;\n 13    loop\n 14      fetch c_tool_list\n 15      bulk\
    \ collect into l_descr_list limit 10;\n 16\n\nNote that because it is possible\
    \ that there are no rows fetched, you cannot make any assumptions that there are\
    \ rows in the array. All processing must be mindful of that fact and must honor\
    \ the value from the array’s count attribute, or you may get errors due to illegal\
    \ references to array indexes. In the following code, the use of `l_descr_list.count`\
    \ ensures that the loop will not even be entered if there are no entries in the\
    \ array:\n\n```sql\n 17      for i in 1 .. l_descr_list.count loop\n 18      \
    \  dbms_output.put_line('Fetched '||l_descr_list(i).descr);\n 19      end loop;\n\
    \ 20      exit when c_tool_list%notfound;\n 21    end loop;\n 22\n 23    close\
    \ c_tool_list;\n 24  end;\n 25  /\nFetched Description 1\nFetched Description\
    \ 2\nFetched Description 3\n[snip]\nFetched Description 23\nFetched Description\
    \ 24\nFetched Description 25\n\nPL/SQL procedure successfully completed.\n```"
