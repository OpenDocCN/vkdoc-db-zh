- fmt: '## Automated Code Analysis


    Code analysis, also known as program analysis, is the analysis of source code.
    Manual code analysis is code review by a human. Such analysis may also include
    reviewing log data and system output from running programs. Automated analysis
    allows an analyst (usually a developer, in my experience) to skip the boring parts
    of analysis and jump to the more interesting things. Instead of eyeballing everything,
    you get to run some kind of a program to do the tedious work for you.


    Let''s take an example. You''re a developer and you''re at work. You''re handed
    some new requirements that mean you must change an existing procedure. Maybe a
    calculation has changed and the procedure will need to add a variable. The business
    wants an estimate of the time it will take to make the change. To make it really
    interesting, the person who wrote this procedure and has maintained it for years
    recently won the lottery and quit. You''ve never even seen the code (you were
    out sick on the day of the code review).


    How do you provide the estimate? Reach up high (or in deep) and pull a number
    out of the air (or somewhere else)? I have seen that method used quite a bit and
    it''s never really been all that successful in my experience.


    The next method I''ve seen is to scramble, pull out the source code, and make
    an emergency review of it. After a quick perusal, you decide that it''s a simple
    change and you only need two hours to code and unit test it.


    Nice. A quick analysis and you''re ready to start coding. One of the business
    people is amazed that you can change the call in all 673 places where this calculation
    is called (it is a *very* popular calculation). Now you get a bit worried. You
    do a quick `grep` in the file system to see all the places from where the procedure
    is called.


    Realizing your procedure is called from so many places, you multiply your original
    estimate by two. That''s usually a bit more accurate than not multiplying, but
    there is a better way. Would you believe me if I said you can find everywhere
    it is called by running a few simple queries? Not only can you find where the
    function is being called but these queries can also cover impact analysis and
    naming standards compliance as well as show code and variable usage, scope collisions,
    and code coverage for testing.


    You can get all of this information by manually reviewing source code, program
    log data, etc., but by automating the process, you get a repeatable, predictable
    process that is less error-prone and vastly less time consuming. You can''t replace
    a good developer when it comes to interpreting the data provided by automated
    or manual analysis, but automation saves you a lot of time.


    ### Static Analysis


    Static analysis is analyzing the source code of a program without actually running
    it. You are looking at things the compiler knows at compile time. Static analysis
    provides information about the program based on the functionality actually utilized
    within the program.


    Static analysis can give information about the data types being used, about naming
    standards, about security, about objects accessed, etc. Static analysis may utilize
    the source code directly or may use tools. If you manually review code for compliance
    to naming standards, you are performing a manual static analysis of that source
    code. Peer reviews are a kind of static analysis. If you have ever found a `SQL`
    injection flaw in a co-worker''s program while reviewing it, you understand the
    importance of static analysis.


    In `Oracle PL/SQL`, there are a variety of places where you can get information
    for your analysis. You will generally start with the data dictionary. With each
    release, Oracle enhances the data dictionary with valuable data. Later, in the
    “Performing Static Analysis” section, I will walk you through some important data
    dictionary views (as well as some analysis queries) before introducing you to
    a new data dictionary view that brings code analysis into the 21^(st) century.
    The new view is provided by `PL/Scope`, an `11g` compiler addition.


    ### Dynamic Analysis


    Dynamic analysis tells you what you will find out when you run the program. Dynamic
    analysis is also called program profiling. With profiling, you run a program and
    either intrusively or non-intrusively gather statistics of where the program has
    been and what it has done.


    `DBMS_PROFILER` and `DBMS_TRACE` were the pre-`11g` profiling tools. `DBMS_PROFILER`
    is a flat profiler. A flat profiler provides simple timing information such as
    how long different procedure and function calls take without any contextual information
    such as which function was called and in what order. Oracle added call context
    to the mix with `DBMS_TRACE`, but ended up creating a tool that was intrusive
    (required `DEBUG`) and noisy (optionally producing a lot of data). It''s much
    better to use `DBMS_PROFILER`.


    `DBMS_HPROF` is an `11g`+, hierarchical profiling tool that is non-intrusive and
    simple to use. `DBMS_HPROF` provides timing information, like the flat profiler
    `DBMS_PROFILER`, but it also includes contextual information like `DBMS_TRACE`.
    It can deliver some reports that are very valuable for performance tuning but
    it also populates some tables that you can then write queries against. This is
    very beneficial for comparing metrics over time and as an additional tool for
    understanding your code.'
