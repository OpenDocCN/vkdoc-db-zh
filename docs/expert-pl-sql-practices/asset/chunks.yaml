    total   100002      1.17       1.00          0     100004          0      100000\n\
    ```\n\nYou can see that out of this 90 seconds, only one second was spent actually\
    \ doing work in the database. The other 89 seconds are spent jumping back and\
    \ forth across the network. The database is doing nothing, but from the perspective\
    \ of the client application, it is waiting on the database. In motoring parlance,\
    \ I’m spinning my wheels but going nowhere. At my current workplace, whenever\
    \ we encounter 3GL programs on the middle tier server exhibiting this behavior,\
    \ we call it \"`middleware fail`.\" It is amazing how labeling poor quality code\
    \ in this way sharpens the focus of the development team!\n\nNow, let’s apply\
    \ this newfound knowledge of bulk processing to fetch the data from the database\
    \ in bulk and pass that data back to the client in bulk. The following code (`bulk_network_2.sql`)\
    \ is the new implementation and the performance will be much better:\n\n```sql\n\
    SQL> create or replace\n  2  package PKG2 is\n  3\n  4   type t_num_list is table\
    \ of hardware.item%type index by pls_integer;\n  5\n  6   procedure open_cur(rc\
    \ in out sys_refcursor);\n  7\n  8   procedure fetch_cur(rc in out sys_refcursor,\
    \ p_rows out t_num_list);\n  9\n 10  end;\n 11  /\n```\n\n`Package created.`\n\
    \n```sql\nSQL> create or replace\n  2  package body PKG2 is\n  3\n  4   procedure\
    \ open_cur(rc in out sys_refcursor) is\n  5   begin\n  6     open rc for select\
    \ item from hardware;\n  7   end;\n  8\n  9   procedure fetch_cur(rc in out sys_refcursor,\
    \ p_rows out t_num_list) is\n 10   begin\n 11     fetch rc bulk collect into p_rows\
    \ limit 1000;\n 12   end;\n 13\n 14  end;\n 15  /\n```\n\n`Package body created.`\n\
    \nRerun the demo. Each time, 1,000 rows will be bulk collected from the database\
    \ and passed back to the client. Because SQL Plus does not natively understand\
    \ the array that comes back, the data will simply be appended to a large `VARCHAR2`\
    \ variable (`the_data`) to simulate the client receiving the array data. Here\
    \ is an example (`bulk_multi_fetch_in_bulk.sql`):\n\n```sql\nSQL> variable rc\
    \ refcursor\nSQL> exec pkg2.open_cur(:rc)\n\nPL/SQL procedure successfully completed.\n\
    \nSQL> select to_char(systimestamp,'HH24:MI:SS.FF') started from dual;\n\nSTARTED\n\
    ------------------\n12:39:09.704000\n\nSQL> variable the_data varchar2(4000);\n\
    SQL> set termout off\n\nSQL> declare\n  2    n pkg2.t_num_list;\n  3  begin\n\
    \  4    :the_data := null;\n  5    pkg2.fetch_cur(:rc,n);\n  6    for i in 1 ..\
    \ n.count loop\n  7      :the_data := :the_data||n(i);\n  8    end loop;\n  9  end;\n\
    [repeated 100 times]\n\nSQL> select to_char(systimestamp,'HH24:MI:SS.FF') ended\
    \ from dual;\n\nENDED\n------------------\n12:39:09.837000\n```\n\nThe difference\
    \ is astounding. Immediate turnaround time is down from 90 seconds to 0.13 seconds.\
    \ Re-running the demo with trace enabled reveals the reduction in database trips.\n\
    \n```sql\nSELECT ITEM\nFROM HARDWARE\n\ncall     count       cpu    elapsed       disk      query    current        rows\n\
    ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
    Parse        1      0.00       0.00          0          0          0           0\n\
    Execute      1      0.00       0.00          0          0          0           0\n\
    Fetch      100      0.04       0.04          0        256          0      100000\n\
    ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
    total      102      0.04       0.04          0        256          0      100000\n\
    ```\n\n100,000 rows were still fetched (far right column), but 100 fetch calls\
    \ were made. I cannot overstate the benefit that has been realized here, even\
    \ with just this simple demo. It’s not uncommon for customers of Oracle to spend\
    \ large sums of money performing optimization exercises in order to glean perhaps\
    \ an extra 10-15 `percent` performance out of their system through such methods\
    \ as caching, index creation, SQL tuning, etc. Sometimes, customers even purchase\
    \ more hardware along with associated license cost increases. But consider the\
    \ performance benefits gained here in this demo:\n\n> From 90 seconds down to\
    \ 0.13 seconds, an almost 700-fold improvement.\n\nAs an application developer,\
    \ if you’re making modifications to code that makes it hundreds of times faster,\
    \ that’s going to make your applications that much more successful and you very\
    \ popular! Reducing network trips in a client application’s interaction with the\
    \ database comes down largely the tools at the disposal of the developer in the\
    \ language of their client application, the design of the application to take\
    \ advantage of passing data to the database in an intelligent fashion, and the\
    \ diligence of the developer. But as a `database` developer, if you can ensure\
    \ that your PL/SQL interfaces to the database are equipped to allow client applications\
    \ to pass and receive data in bulk, then you are that much closer to successful\
    \ application performance."
