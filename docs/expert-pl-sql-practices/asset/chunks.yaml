    Converting each of those constructs to a bulk collection model is easy and straightforward.
    The following are the three bulk processing constructs that are the analogs of
    the non-bulk constructs just shown.


    ##### 1\. Implicit Cursor BULK Mode


    A standard SQL query (SELECT-INTO) can now be used to retrieve multiple rows of
    data into a collection type simply by adding the `BULK COLLECT` keywords. Here’s
    an example (`bulk_implicit_2.sql`):


    `SQL> declare`

    `  2    `***`type t_descr_list is table of hardware.descr%type;`***

    `  3    l_descr_list t_descr_list;`

    `  4  begin`

    `  5    select descr`

    `  6    `***`bulk collect`***

    `  7    into   l_descr_list`

    `  8    from   hardware`

    `  9    where  aisle = 1`

    ` 10    and    item between 1 and 100;`

    ` 11  end;`

    ` 12  /`


    `PL/SQL procedure successfully completed.`


    ##### 2\. Explicit Fetch Calls BULK Mode


    The only changes required are to define a collection type to hold the results
    and to add the `BULK COLLECT` clause to the `FETCH` command. All of the rows in
    the cursor resultset will be fetched into the collection type variable in a single
    call. Here’s an example (`bulk_explicit_2.sql`):


    `SQL> declare`

    `  2    cursor c_tool_list is`

    `  3      select descr`

    `  4      from   hardware`

    `  5      where  aisle = 1`

    `  6      and    item between 1 and 500;`

    `  7`

    `  8    type t_descr_list is table of c_tool_list%rowtype;`

    `  9    l_descr_list t_descr_list;`

    ` 10`

    ` 11  begin`

    ` 12    open c_tool_list;`

    `13    fetch c_tool_list` ***`bulk collect`*** `into l_descr_list;`

    ` 14    close c_tool_list;`

    ` 15  end;`

    ` 16  /`


    `PL/SQL procedure successfully completed.`


    ##### 3\. Implicit Fetch Calls BULK mode


    Things gets even easier when converting the hybrid approach to bulk collect because
    there are ***no*** code changes to make. One of the best features to arrive in
    Oracle 10g was the “automatic bulk collect” enhancement for FOR loops. Because
    a FOR loop on a cursor will, by definition, fetch ***all*** of the rows in the
    cursor (unless an explicit EXIT command is present within the loop), the PL/SQL
    compiler can safely employ a bulk collect optimization to retrieve those rows
    as efficiently as possible. You will automatically get this optimization if you
    are on at least version 10 of Oracle, and the database parameter `plsql_optimize_level`
    is set to at least 2 (the default). The following example (`bulk_implicit_fetch_2.sql`)
    shows the database optimization level followed by a FOR loop that is automatically
    implemented for you using the bulk processing features:


    `SQL> select banner from v$version where rownum = 1;`


    `BANNER`

    `----------------------------------------------------------------------------`

    `Oracle Database 11g Enterprise Edition Release 11.2.0.2.0 - 64bit Production`


    `SQL> select value from v$parameter where name = ''plsql_optimize_level'';`


    `VALUE`

    `----------------------------------------------------------------------------`

    `2`


    `SQL> begin`

    `  2    for i in (`

    `  3      select descr`

    `  4      from   hardware`

    `  5      where  aisle = 1`

    `  6      and    item between 1 and 500 )`

    `  7    loop`

    `  8       null;`

    `  9    end loop;`

    ` 10  end;`

    ` 11  /`


    `PL/SQL procedure successfully completed.`


    It’s not immediately apparent that bulk collection is taking place in the previous
    code. You’ll soon see how you can verify that the code is indeed fetching multiple
    rows with a single call.'
  trans: "#### 开始使用 BULK Fetch\n\n将代码迁移到利用 PL/SQL 中的批量操作的一大优势在于，它易于实现，并且与现有代码有直接的映射关系。在\
    \ 8.1 版本引入批量操作之前，你可以使用以下三种构造之一在 PL/SQL 中检索一行数据。\n\n##### 1. 隐式游标\n\n一个标准的 SQL\
    \ 查询 (`SELECT-INTO`) 用于从表中将单行数据或该行的某些列检索到目标变量中。如果没有检索到行或检索到的行超过一行，则会引发异常。示例如下\
    \ (`bulk_implicit_1.sql`)：\n\n```sql\nSQL> declare\n  2    l_descr hardware.descr%type;\n\
    \  3  begin\n  4    select descr\n  5    into   l_descr\n  6    from   hardware\n\
    \  7    where  aisle = 1\n  8    and    item = 1;\n  9  end;\n 10  /\n```\n`PL/SQL\
    \ 过程已成功完成。`\n\n##### 2. 显式提取调用\n\n在 PL/SQL 声明部分显式定义一个游标。然后打开该游标并从中提取数据，通常在一个循环中进行，直到耗尽所有可用行，此时关闭游标。示例如下\
    \ (`bulk_explicit_1.sql`)：\n\n```sql\nSQL> declare\n  2    cursor c_tool_list\
    \ is\n  3      select descr\n  4      from   hardware\n  5      where  aisle =\
    \ 1\n  6      and    item between 1 and 500;\n  7\n  8    l_descr hardware.descr%type;\n\
    \  9  begin\n 10    open c_tool_list;\n 11    loop\n 12      fetch c_tool_list\
    \ into l_descr;\n 13      exit when c_tool_list%notfound;\n 14    end loop;\n\
    \ 15    close c_tool_list;\n 16  end;\n 17  /\n```\n`PL/SQL 过程已成功完成。`\n\n#####\
    \ 3. 隐式提取调用\n\n第三种类型是前两种方法的混合。一个 `FOR` 循环负责游标管理，该游标要么是预先显式定义的，要么是直接在 `FOR` 循环内部编码的。示例如下\
    \ (`bulk_implicit_fetch_1.sql`)：\n\n```sql\nSQL> begin\n  2    for i in (\n  3\
    \      select descr\n  4      from   hardware\n  5      where  aisle = 1\n  6\
    \      and    item between 1 and 500 )\n  7    loop\n  8       `<处理每一行的代码>`\n\
    \  9    end loop;\n 10  end;\n 11  /\n```\n`PL/SQL 过程已成功完成。`\n\n将上述每种构造转换为批量集合模型都简单直接。以下是与刚展示的非批量构造相对应的三种批量处理构造。\n\
    \n##### 1. 隐式游标批量模式\n\n通过简单地添加 `BULK COLLECT` 关键字，一个标准的 SQL 查询 (`SELECT-INTO`)\
    \ 现在可以用来将多行数据检索到一个集合类型中。示例如下 (`bulk_implicit_2.sql`)：\n\n```sql\nSQL> declare\n\
    \  2    `type t_descr_list is table of hardware.descr%type;`\n  3    l_descr_list\
    \ t_descr_list;\n  4  begin\n  5    select descr\n  6    `bulk collect`\n  7 \
    \   into   l_descr_list\n  8    from   hardware\n  9    where  aisle = 1\n 10\
    \    and    item between 1 and 100;\n 11  end;\n 12  /\n```\n`PL/SQL 过程已成功完成。`\n\
    \n##### 2. 显式提取调用批量模式\n\n唯一需要的更改是定义一个集合类型来保存结果，并向 `FETCH` 命令添加 `BULK COLLECT`\
    \ 子句。游标结果集中的所有行将在一次调用中被提取到集合类型变量中。示例如下 (`bulk_explicit_2.sql`)：\n\n```sql\nSQL>\
    \ declare\n  2    cursor c_tool_list is\n  3      select descr\n  4      from\
    \   hardware\n  5      where  aisle = 1\n  6      and    item between 1 and 500;\n\
    \  7\n  8    type t_descr_list is table of c_tool_list%rowtype;\n  9    l_descr_list\
    \ t_descr_list;\n 10\n 11  begin\n 12    open c_tool_list;\n 13    fetch c_tool_list\
    \ `bulk collect` into l_descr_list;\n 14    close c_tool_list;\n 15  end;\n 16\
    \  /\n```\n`PL/SQL 过程已成功完成。`\n\n##### 3. 隐式提取调用批量模式\n\n将混合方法转换为批量收集甚至更容易，因为**无需**进行代码更改。Oracle\
    \ 10g 引入的最佳特性之一就是针对 `FOR` 循环的“自动批量收集”增强功能。因为游标上的 `FOR` 循环根据定义会提取游标中的**所有**行（除非循环内存在显式的\
    \ `EXIT` 命令），所以 PL/SQL 编译器可以安全地采用批量收集优化来尽可能高效地检索这些行。如果你使用的是至少 Oracle 10g 版本，并且数据库参数\
    \ `plsql_optimize_level` 设置为至少 2（默认值），你将自动获得此优化。以下示例 (`bulk_implicit_fetch_2.sql`)\
    \ 展示了数据库优化级别，随后是一个为你自动实现批量处理功能的 `FOR` 循环：\n\n```sql\nSQL> select banner from v$version\
    \ where rownum = 1;\n\nBANNER\n----------------------------------------------------------------------------\n\
    Oracle Database 11g Enterprise Edition Release 11.2.0.2.0 - 64bit Production\n\
    \nSQL> select value from v$parameter where name = 'plsql_optimize_level';\n\n\
    VALUE\n----------------------------------------------------------------------------\n\
    2\n\nSQL> begin\n  2    for i in (\n  3      select descr\n  4      from   hardware\n\
    \  5      where  aisle = 1\n  6      and    item between 1 and 500 )\n  7    loop\n\
    \  8       null;\n  9    end loop;\n 10  end;\n 11  /\n```\n`PL/SQL 过程已成功完成。`\n\
    \n在之前的代码中，批量收集的发生并不明显。你很快将看到如何验证代码确实在一次调用中提取了多行数据。"
- fmt: "#### 三级集合风格数据类型\n\n前一节最后三个示例以嵌套表数据类型获取行。自 Oracle 8.1 以来，有三种集合风格的数据类型，可以批量获取行。\n\
    \n*   `Varray`\n*   `Nested table`\n*   `Associative array`\n\n决定使用哪种集合类型通常取决于哪种最适合您的应用程序。这些类型并非互斥。除了在\
    \ PL/SQL 程序之间传递集合外，您还可能在 PL/SQL 与驻留在数据库服务器之外的基于 3GL 的应用程序之间来回传递这些集合。许多用于与 Oracle\
    \ 数据库通信的流行 3GL 技术都有简单有效的接口与 PL/SQL 例程交互，这些例程接受*关联数组*作为参数，但不一定接受*varray*或*嵌套表*。\n\
    \n例如，\n\n*   在 JDBC 中，方法`setPlsqlIndexTable`和`registerIndexTableOutParameter`可用于通过\
    \ PL/SQL 关联数组向数据库传递数据和从数据库接收数据。\n*   在 Pro*C 中，C 语言中的主机数组可以直接映射到 PL/SQL 参数中的关联数组。\n\
    *   在 ODP.NET 中，Oracle 参数可以直接映射到关联数组，即 `Param1.CollectionType = OracleCollectionType.PLSQLAssociativeArray;`\n\
    \n相比之下，如果您选择“对象”路径，创建包含 varrays 和/或嵌套表的用户定义类型，那么通过相同的 3GL 与 PL/SQL 交互可能会变得更加复杂。需要转换工具，例如\
    \ Pro*C 的对象类型转换器或 ODP.Net 的自定义元数据映射。因此，如果您有强烈的 3GL 应用程序代码与 PL/SQL 的交互，那么关联数组很可能是最佳选择。或者，鉴于业界当前对面向服务的架构（SOA）的痴迷，其中数据交换媒介是\
    \ XML，3GL 应用程序可能更容易将 XML 传递到 PL/SQL 中，并利用 `XMLTYPE` 数据类型内的功能将传入的 XML 转换为 PL/SQL\
    \ 对象类型。以下是此类转换的示例（`bulk_xml_to_obj.sql`）：\n\n```sql\nSQL> create or replace\n\
    \  2  type COMING_FROM_XML as object\n  3     ( COL1 int,\n  4       COL2 int)\n\
    \  5  /\n\nType created.\n\nSQL> declare\n  2    source_xml xmltype;\n  3    target_obj\
    \ coming_from_xml;\n  4  begin\n  5    source_xml :=\n  6       xmltype('<DEMO>\n\
    \  7                  <COL1>10</COL1>\n  8                  <COL2>20</COL2>\n\
    \  9                </DEMO>');\n 10\n 11    source_xml.toObject(target_obj);\n\
    \ 12  end;\n 13  /\n\nPL/SQL procedure successfully completed.\n```\n\n相反，如果您的应用程序以\
    \ PL/SQL 为中心（Oracle 自己的 Application Express 就是一个完美的例子），那么使用嵌套表和 varray 类型可能是更好的选择，因为这些数据类型的变量有广泛的集合操作符可用。有关可以对嵌套表类型执行的各种集合操作的详细信息，请参阅《对象关系开发者指南》的[第\
    \ 5 章](#Chapter05.html#ch5)。\n\n当然，您可以自由混合搭配。3GL 可以通过关联数组将数据传递给您的 PL/SQL，然后您可以在\
    \ PL/SQL 中将这些数组转换为更灵活的对象类型以进行后续处理。\n\n#### 为什么我要费心？\n\n正如您所看到的，将逐行获取调用转换为使用批量集合的代码只需要额外几行代码。那么，您为什么要费心添加这几行代码呢？五金店的比喻表明，批量处理行是为了效率，那么让我们比较一下多次前往五金店（`HARDWARE`\
    \ 表）取每件物品与仅使用一个足够大的手推车（嵌套表）单次前往的结果。以下代码示例（`bulk_collect_ perf_test_1.sql`）比较了逐行代码及其批量收集等效代码的响应时间：\n\
    \n```sql\nSQL> declare\n  2    cursor c_tool_list is\n  3      select descr d1\n\
    \  4      from   hardware;\n  5\n  6    l_descr hardware.descr%type;\n  7  begin\n\
    \  8    open c_tool_list;\n  9    loop\n 10      fetch c_tool_list into l_descr;\n\
    \ 11      exit when c_tool_list%notfound;\n 12    end loop;\n 13    close c_tool_list;\n\
    \ 14  end;\n 15  /\n\nPL/SQL procedure successfully completed.\n```\n\n**`Elapsed:\
    \ 00:00:21.39`**\n\n```sql\nSQL> declare\n  2    cursor c_tool_list is\n  3  \
    \    select descr d2\n  4      from   hardware;\n  5\n  6    type t_descr_list\
    \ is table of c_tool_list%rowtype;\n  7    l_descr_list t_descr_list;\n  8\n \
    \ 9  begin\n 10    open c_tool_list;\n 11    fetch c_tool_list bulk collect into\
    \ l_descr_list;\n 12    close c_tool_list;\n 13  end;\n 14  /\n\nPL/SQL procedure\
    \ successfully completed.\n```\n\n**`Elapsed: 00:00:02.20`**\n\n通过减少为获取数据而访问数据库的次数，速度提高了\
    \ 10 倍。此外，如果启用会话跟踪重复前面的示例，您将从生成的跟踪数据中得到一些有趣的结果。现在让我们启用会话跟踪并重新运行演示：\n\n```sql\n\
    SQL> alter session set sql_trace = true;\nSQL> [repeat demo]\nSQL> alter session\
    \ set sql_trace = false;\n```\n\n在格式化的跟踪文件中，如果搜索列别名“`D1`”，您将找到受单行获取调用影响的 SQL 查询。\n\
    \n```sql\nSELECT DESCR D1\nFROM   HARDWARE\n\ncall     count       cpu    elapsed\
    \       disk      query    current        rows\n------- ------  -------- ----------\
    \ ---------- ---------- ----------  ----------\nParse        1      0.00     \
    \  0.00          0          1          0           0\nExecute      1      0.00\
    \       0.00          0          0          0           0\nFetch  1000001    \
    \  8.17       8.15          0    1000010          0     1000000\n------- ------\
    \  -------- ---------- ---------- ---------- ----------  ----------\ntotal  1000003\
    \      8.17       8.15          0    1000011          0     1000000\n```\n\n在跟踪文件的后面部分，您将找到包含\
    \ `D2` 别名的查询，该查询是通过批量获取获取的：\n\n```sql\nSELECT DESCR D2\nFROM   HARDWARE\n\ncall\
    \     count       cpu    elapsed       disk      query    current        rows\n\
    ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
    Parse        1      0.00       0.00          0          1          0         \
    \  0\nExecute      1      0.00       0.00          0          0          0   \
    \        0\nFetch        1      1.85       2.08          0       9001        \
    \  0     1000000\n------- ------  -------- ---------- ---------- ---------- ----------\
    \  ----------\ntotal        3      1.85       2.09          0       9002     \
    \     0     1000000\n```\n\n请注意，除了减少经过时间外，CPU 消耗也显著减少。使用批量收集，不仅应用程序性能得到提升，其 CPU\
    \ 占用也会减少，这使得它们更具可扩展性。\n\n![images](images/square.jpg) **提示** 有关如何生成会话跟踪文件并使用 `tkprof`\
    \ 格式化它们的详细信息，请参阅 Oracle 11.2 数据库文档中的《性能调优手册》第 21 章。"
  raw: '#### Three Collection-Style Datatypes


    The final three examples in the preceding section are retrieving their rows in
    a nested table datatype. Since Oracle 8.1, there are three collection-style datatypes
    into which rows can be fetched into in bulk fashion.


    *   Varray

    *   Nested table

    *   Associative array


    Deciding on what collection types to use typically will come down to which suits
    your application most. The types are not mutually exclusive. As well as collections
    being passed between PL/SQL programs, you may also be passing these collections
    back and forth between PL/SQL and your 3GL-based applications residing away from
    the database server. Many of the popular 3GL technologies used to communicate
    with Oracle databases have simple and effective interfaces to PL/SQL routines
    which take *associative arrays* as parameters, but not necessarily *varray* or
    *nested tables*.


    For example,


    *   Within JDBC, the methods `setPlsqlIndexTable` and `registerIndexTableOutParameter`
    are available for passing data to and from the database via PL/SQL associative
    arrays.

    *   Within Pro*C, host arrays in C can be directly mapped to associative arrays
    in PL/SQL parameters.

    *   Within ODP.NET, Oracle parameters can be directly mapped to associative arrays,
    namely, `Param1.CollectionType = OracleCollectionType.PLSQLAssociativeArray;`


    By comparison, if you head down the “object” path by creating user defined types
    comprising varrays and/or nested tables, then interacting with PL/SQL via these
    same 3GL’s can start to get more complicated. Translation utilities are required,
    such as the Object Type Translator for Pro*C or custom metadata mapping for ODP.Net.
    For this reason, it may well be the case that associative arrays are the best
    choice if you have a strong interaction between your 3GL application code and
    PL/SQL. Alternatively, given the industry’s current obsession with Service Oriented
    Architecture (SOA) where the data exchange medium is XML, it may be easier for
    3GL applications to pass XML into the PL/SQL and use the facilities within the
    XMLTYPE datatype to cast the incoming XML into an PL/SQL object type. Here is
    example of such a translation (`bulk_xml_to_obj.sql`):


    `SQL> create or replace`

    `  2  type COMING_FROM_XML as object`

    `  3     ( COL1 int,`

    `  4       COL2 int)`

    `  5  /`


    `Type created.`


    `SQL> declare`

    `  2    source_xml xmltype;`

    `  3    target_obj coming_from_xml;`

    `  4  begin`

    `  5    source_xml :=`

    `  6       xmltype(''<DEMO>`

    `  7                  <COL1>10</COL1>`

    `  8                  <COL2>20</COL2>`

    `  9                </DEMO>'');`

    ` 10`

    ` 11    source_xml.toObject(target_obj);`

    ` 12  end;`

    ` 13  /`


    `PL/SQL procedure successfully completed.`


    Conversely, if your application is PL/SQL centric (Oracle’s own Application Express
    is a perfect example of this), then perhaps using nested table and varray types
    are a better option, due to expansive ranges of set operators available on variables
    of these data types. See [Chapter 5](#Chapter05.html#ch5) of *The Object-Relational
    Developer’s Guide* for details on the various set operations you can perform on
    nested table types.


    Of course, you are free to mix and match. 3GL’s can pass data to your PL/SQL via
    associative arrays, and then you could cast these arrays into more flexible object
    types within the PL/SQL for ongoing processing.


    #### Why should I bother?


    As you have just seen, converting row-by-row fetch calls into code that uses bulk
    collection requires just a few extra lines of code. So why should you bother with
    these extra few lines? The hardware store metaphor suggests that processing rows
    in bulk is all about efficiency, so let’s compare the results between making many
    trips to the hardware store (the HARDWARE table) to pick up every item and just
    a single trip with a suitably large trolley (the nested table). The following
    code example (`bulk_collect_ perf_test_1.sql`) compares the response time of a
    row-by-row code and its bulk collect equivalent:


    `SQL> declare`

    `  2    cursor c_tool_list is`

    `  3      select descr d1`

    `  4      from   hardware;`

    `  5`

    `  6    l_descr hardware.descr%type;`

    `  7  begin`

    `  8    open c_tool_list;`

    `  9    loop`

    ` 10      fetch c_tool_list into l_descr;`

    ` 11      exit when c_tool_list%notfound;`

    ` 12    end loop;`

    ` 13    close c_tool_list;`

    ` 14  end;`

    ` 15  /`


    `PL/SQL procedure successfully completed.`


    ***`Elapsed: 00:00:21.39`***


    `SQL> declare`

    `  2    cursor c_tool_list is`

    `  3      select descr d2`

    `  4      from   hardware;`

    `  5`

    `  6    type t_descr_list is table of c_tool_list%rowtype;`

    `  7    l_descr_list t_descr_list;`

    `  8`

    `  9  begin`

    ` 10    open c_tool_list;`

    ` 11    fetch c_tool_list bulk collect into l_descr_list;`

    ` 12    close c_tool_list;`

    ` 13  end;`

    ` 14  /`


    `PL/SQL procedure successfully completed.`


    ***`Elapsed: 00:00:02.20`***


    It’s 10 times faster, just by reducing the number of trips made to the database
    for data. Moreover, if the previous example is repeated with a session trace enabled,
    you’ll get some interesting results from the resulting trace data. Now let’s enable
    session tracing and re-run the demo:


    `SQL> alter session set sql_trace = true;`

    `SQL> [repeat demo]`

    `SQL> alter session set sql_trace = false;`


    Within the formatted trace file, if you search for column alias “D1”, you will
    locate the SQL query that was subject to single row fetch calls.


    `SELECT DESCR D1`

    `FROM   HARDWARE`


    `call      count       cpu    elapsed       disk      query    current        rows`

    `-------  ------  -------- ---------- ---------- ---------- ----------  ----------`

    `Parse         1      0.00       0.00          0          1          0           0`

    `Execute       1      0.00       0.00          0          0          0           0`

    `Fetch   1000001      8.17       8.15          0    1000010          0     1000000`

    `------- -------  -------- ---------- ---------- ---------- ----------  ----------`

    `total   1000003      8.17       8.15          0    1000011          0     1000000`


    And further along in the trace file, you will find the query containing the D2
    alias, which was fetched from using bulk fetch:


    `SELECT DESCR D2`

    `FROM   HARDWARE`


    `call     count       cpu    elapsed       disk      query    current        rows`

    `------- ------  -------- ---------- ---------- ---------- ----------  ----------`

    `Parse        1      0.00       0.00          0          1          0           0`

    `Execute      1      0.00       0.00          0          0          0           0`

    `Fetch        1      1.85       2.08          0       9001          0     1000000`

    `------- ------  -------- ---------- ---------- ---------- ----------  ----------`

    `total        3      1.85       2.09          0       9002          0     1000000`


    Notice that along with reduction in elapsed time, there has been a marked reduction
    in CPU consumption as well. With bulk collect, not only are you are getting increased
    performance in your applications, their CPU footprint will shrink as well, which
    makes them more scalable.


    ![images](images/square.jpg) **Tip** See Chapter 21 of the *Performance Tuning
    Manual* in the Oracle 11.2 database documentation for details on how to generate
    session trace files and format them with tkprof.'
  trans: "\n#### 三级集合风格数据类型\n\n前一节最后三个示例以嵌套表数据类型获取行。自 Oracle 8.1 以来，有三种集合风格的数据类型，可以批量获取行。\n\
    \n*   `Varray`\n*   `Nested table`\n*   `Associative array`\n\n决定使用哪种集合类型通常取决于哪种最适合您的应用程序。这些类型并非互斥。除了在\
    \ PL/SQL 程序之间传递集合外，您还可能在 PL/SQL 与驻留在数据库服务器之外的基于 3GL 的应用程序之间来回传递这些集合。许多用于与 Oracle\
    \ 数据库通信的流行 3GL 技术都有简单有效的接口与 PL/SQL 例程交互，这些例程接受*关联数组*作为参数，但不一定接受*varray*或*嵌套表*。\n\
    \n例如，\n\n*   在 JDBC 中，方法`setPlsqlIndexTable`和`registerIndexTableOutParameter`可用于通过\
    \ PL/SQL 关联数组向数据库传递数据和从数据库接收数据。\n*   在 Pro*C 中，C 语言中的主机数组可以直接映射到 PL/SQL 参数中的关联数组。\n\
    *   在 ODP.NET 中，Oracle 参数可以直接映射到关联数组，即 `Param1.CollectionType = OracleCollectionType.PLSQLAssociativeArray;`\n\
    \n相比之下，如果您选择“对象”路径，创建包含 varrays 和/或嵌套表的用户定义类型，那么通过相同的 3GL 与 PL/SQL 交互可能会变得更加复杂。需要转换工具，例如\
    \ Pro*C 的对象类型转换器或 ODP.Net 的自定义元数据映射。因此，如果您有强烈的 3GL 应用程序代码与 PL/SQL 的交互，那么关联数组很可能是最佳选择。或者，鉴于业界当前对面向服务的架构（SOA）的痴迷，其中数据交换媒介是\
    \ XML，3GL 应用程序可能更容易将 XML 传递到 PL/SQL 中，并利用 `XMLTYPE` 数据类型内的功能将传入的 XML 转换为 PL/SQL\
    \ 对象类型。以下是此类转换的示例（`bulk_xml_to_obj.sql`）：\n\n```sql\nSQL> create or replace\n\
    \  2  type COMING_FROM_XML as object\n  3     ( COL1 int,\n  4       COL2 int)\n\
    \  5  /\n\nType created.\n\nSQL> declare\n  2    source_xml xmltype;\n  3    target_obj\
    \ coming_from_xml;\n  4  begin\n  5    source_xml :=\n  6       xmltype('<DEMO>\n\
    \  7                  <COL1>10</COL1>\n  8                  <COL2>20</COL2>\n\
    \  9                </DEMO>');\n 10\n 11    source_xml.toObject(target_obj);\n\
    \ 12  end;\n 13  /\n\nPL/SQL procedure successfully completed.\n```\n\n相反，如果您的应用程序以\
    \ PL/SQL 为中心（Oracle 自己的 Application Express 就是一个完美的例子），那么使用嵌套表和 varray 类型可能是更好的选择，因为这些数据类型的变量有广泛的集合操作符可用。有关可以对嵌套表类型执行的各种集合操作的详细信息，请参阅《对象关系开发者指南》的第\
    \ 5 章。\n\n当然，您可以自由混合搭配。3GL 可以通过关联数组将数据传递给您的 PL/SQL，然后您可以在 PL/SQL 中将这些数组转换为更灵活的对象类型以进行后续处理。\n\
    \n#### 为什么我要费心？\n\n正如您所看到的，将逐行获取调用转换为使用批量集合的代码只需要额外几行代码。那么，您为什么要费心添加这几行代码呢？五金店的比喻表明，批量处理行是为了效率，那么让我们比较一下多次前往五金店（`HARDWARE`\
    \ 表）取每件物品与仅使用一个足够大的手推车（嵌套表）单次前往的结果。以下代码示例（`bulk_collect_ perf_test_1.sql`）比较了逐行代码及其批量收集等效代码的响应时间：\n\
    \n```sql\nSQL> declare\n  2    cursor c_tool_list is\n  3      select descr d1\n\
    \  4      from   hardware;\n  5\n  6    l_descr hardware.descr%type;\n  7  begin\n\
    \  8    open c_tool_list;\n  9    loop\n 10      fetch c_tool_list into l_descr;\n\
    \ 11      exit when c_tool_list%notfound;\n 12    end loop;\n 13    close c_tool_list;\n\
    \ 14  end;\n 15  /\n\nPL/SQL procedure successfully completed.\n```\n\n**`Elapsed:\
    \ 00:00:21.39`**\n\n```sql\nSQL> declare\n  2    cursor c_tool_list is\n  3  \
    \    select descr d2\n  4      from   hardware;\n  5\n  6    type t_descr_list\
    \ is table of c_tool_list%rowtype;\n  7    l_descr_list t_descr_list;\n  8\n \
    \ 9  begin\n 10    open c_tool_list;\n 11    fetch c_tool_list bulk collect into\
    \ l_descr_list;\n 12    close c_tool_list;\n 13  end;\n 14  /\n\nPL/SQL procedure\
    \ successfully completed.\n```\n\n**`Elapsed: 00:00:02.20`**\n\n通过减少为获取数据而访问数据库的次数，速度提高了\
    \ 10 倍。此外，如果启用会话跟踪重复前面的示例，您将从生成的跟踪数据中得到一些有趣的结果。现在让我们启用会话跟踪并重新运行演示：\n\n```sql\n\
    SQL> alter session set sql_trace = true;\nSQL> [repeat demo]\nSQL> alter session\
    \ set sql_trace = false;\n```\n\n在格式化的跟踪文件中，如果搜索列别名“`D1`”，您将找到受单行获取调用影响的 SQL 查询。\n\
    \n```sql\nSELECT DESCR D1\nFROM   HARDWARE\n\ncall     count       cpu    elapsed\
    \       disk      query    current        rows\n------- ------  -------- ----------\
    \ ---------- ---------- ----------  ----------\nParse        1      0.00     \
    \  0.00          0          1          0           0\nExecute      1      0.00\
    \       0.00          0          0          0           0\nFetch  1000001    \
    \  8.17       8.15          0    1000010          0     1000000\n------- ------\
    \  -------- ---------- ---------- ---------- ----------  ----------\ntotal  1000003\
    \      8.17       8.15          0    1000011          0     1000000\n```\n\n在跟踪文件的后面部分，您将找到包含\
    \ `D2` 别名的查询，该查询是通过批量获取获取的：\n\n```sql\nSELECT DESCR D2\nFROM   HARDWARE\n\ncall\
    \     count       cpu    elapsed       disk      query    current        rows\n\
    ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
    Parse        1      0.00       0.00          0          1          0         \
    \  0\nExecute      1      0.00       0.00          0          0          0   \
    \        0\nFetch        1      1.85       2.08          0       9001        \
    \  0     1000000\n------- ------  -------- ---------- ---------- ---------- ----------\
    \  ----------\ntotal        3      1.85       2.09          0       9002     \
    \     0     1000000\n```\n\n请注意，除了减少经过时间外，CPU 消耗也显著减少。使用批量收集，不仅应用程序性能得到提升，其 CPU\
    \ 占用也会减少，这使得它们更具可扩展性。\n\n![images](img/square.jpg) **提示** 有关如何生成会话跟踪文件并使用 `tkprof`\
    \ 格式化它们的详细信息，请参阅 Oracle 11.2 数据库文档中的《性能调优手册》第 21 章。\n"
- fmt: "# Bulk Collect Performance and Memory Overhead\n\n## Collection Type Performance\
    \ Comparison\n\nReturning briefly to the question of which collection type to\
    \ use, all appear to be equivalent in terms of bulk collection performance. The\
    \ following demo (`bulk_which_collection_type.sql`) ran virtually identically\
    \ for each of the three collection types:\n\n```sql\nSQL> set timing on\nSQL>\
    \ declare\n  2    type t_va is varray(1000) of number;\n  3    type t_nt is table\
    \ of number;\n  4    type t_aa is table of number index by pls_integer;\n  5\n\
    \  6    va t_va;\n  7    nt t_nt;\n  8    aa t_aa;\n  9  begin\n 10    for i in\
    \ 1 .. 10000 loop\n 11\n 12      select rownum\n 13      --\n 14      -- Comment\
    \ in the collection type you want to test\n 15      --\n 16      bulk collect\
    \ into va\n 17      --bulk collect into nt\n 18      --bulk collect into aa\n\
    \ 19\n 20      from dual\n 21      connect by level <= 1000 ;\n 22    end loop;\n\
    \ 23  end;\n 24  /\n```\n\n```\nPL/SQL procedure successfully completed.\n```\n\
    \n## Monitoring Bulk Collect Overheads\n\nBefore you leap into converting all\
    \ of your PL/SQL cursors to using bulk collect operations, it’s important to be\
    \ aware of one significant impact that bulk collect will have on your database\
    \ session. As mentioned at the start of the chapter, array processing is about\
    \ retrieving data into a `buffer`. That buffer has to be held somewhere, and that\
    \ somewhere is in your session’s memory. In Oracle parlance, your session’s memory\
    \ is the session’s User Global Area (UGA). Depending on how your database has\
    \ been configured, the session UGA will be held either privately for the connected\
    \ session in the Process Global Area (PGA) or it will be sharable across processes\
    \ in the System Global Area (SGA). A discussion on the pros and cons of Oracle’s\
    \ dedicated versus shared server architecture is beyond the scope of this book;\
    \ just know that PL/SQL collections will consume session memory, which can easily\
    \ become an important consideration if you either have large collections or large\
    \ numbers of concurrent sessions in your database.\n\nFor the examples that follow,\
    \ the most common configuration will be assumed, namely dedicated server connections,\
    \ and thus the memory consumption focus will be on the PGA. Let’s explore the\
    \ memory consumption as larger and larger collection sizes are used for bulk collect.\
    \ I’ll also introduce the `LIMIT` clause, which can be used on the `BULK COLLECT`\
    \ statement.\n\n![images](images/square.jpg) **Note** The example that follows\
    \ intersperses text with code. You can find the entirety of the code in the file\
    \ named `bulk_collect_memory.sql`.\n\nFirst, I’ll reconnect to reset the session\
    \ level statistics (including PGA consumption).\n\n```sql\nSQL> connect\nEnter\
    \ user-name: *****\nEnter password:  *****\n\nSQL> set serverout on\nSQL> declare\n\
    \  2    type t_row_list is table of hardware.descr%type;\n  3    l_rows t_row_list;\n\
    \  4\n  5    l_pga_ceiling  number(10);\n```\n\nNext, I’ll define an array of\
    \ different fetch sizes that will be used to retrieve a set of rows from the HARDWARE\
    \ table. So in the first iteration, 5 rows will be fetched, then 10 rows, then\
    \ 50 rows, and so forth.\n\n```sql\n  7    type t_fetch_size is table of pls_integer;\n\
    \  8    l_fetch_sizes t_fetch_size := t_fetch_sizes(5,10,50,100,500,1000,10000,100000,1000000);\n\
    \  9\n 10    rc      sys_refcursor;\n 11  begin\n 12    select value\n 13    into\
    \   l_pga_ceiling\n 14    from   v$mystat m, v$statname s\n 15    where  s.statistic#\
    \ = m.statistic#\n 16    and    s.name = 'session pga memory max';\n 17\n 18 \
    \   dbms_output.put_line('Initial PGA: '||l_pga_ceiling);\n 19\n 20    for i in\
    \ 1 .. l_fetch_sizes.count\n 21    loop\n```\n\nFor each of the fetch sizes, I’ll\
    \ use the `LIMIT` clause to fetch a set of the rows from the table.\n\n```sql\n\
    \ 22      open rc for select descr from hardware;\n 23      loop\n 24        \
    \ fetch rc bulk collect into l_rows limit l_fetch_sizes(i);\n 25         exit\
    \ when rc%notfound;\n 26      end loop;\n 27      close rc;\n 28\n```\n\nThen,\
    \ having performed the fetch, I’ll capture the session level PGA statistics to\
    \ see if the fetch has had an impact on the memory being consumed by the session\
    \ on the database server. Here’s the code to do that:\n\n```sql\n 29      select\
    \ value\n 30      into   l_pga_ceiling\n 31      from   v$mystat m, v$statname\
    \ s\n 32      where  s.statistic# = m.statistic#\n 33      and    s.name = 'session\
    \ pga memory max';\n 34\n 35      dbms_output.put_line('Fetch size: '||l_fetch_sizes(i));\n\
    \ 36      dbms_output.put_line('- PGA Max: '||l_pga_ceiling);\n 37\n 38    end\
    \ loop;\n 39\n 40  end;\n 41  /\n```\n\n```\nInitial PGA: 3175904\nFetch size:\
    \ 5\n- PGA Max: 3175904\nFetch size: 10\n- PGA Max: 3175904\nFetch size: 50\n\
    - PGA Max: 3241440\nFetch size: 100\n- PGA Max: 3306976\nFetch size: 500\n- PGA\
    \ Max: 3306976\nFetch size: 1000\n- PGA Max: 3372512\nFetch size: 10000\n- PGA\
    \ Max: 4224480\nFetch size: 100000\n- PGA Max: 12482016\nFetch size: 1000000\n\
    - PGA Max: 95122912\n```"
