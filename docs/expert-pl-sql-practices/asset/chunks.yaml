- fmt: "# 分析与解决 Oracle 并行函数数据分布问题\n\n## 问题复现与观察\n\n```\n        l_key_value_pair.key_item\
    \ := substr(p_input,i,1);\n        l_key_value_pair.value_item := 1;\n\n     \
    \   pipe row(l_key_value_pair);\n\n      end loop;\n\n      return;\n\n    end\
    \ result_set;\n\nend single_map_letter_count;\n/\n```\n\nNow test your `Reduce`\
    \ function by using it to reduce the results from a single map, like so:\n\n```\n\
    select * from table(\nreduce_letter_count.result_set(\ncursor(select * from table(\n\
    single_map_letter_count.result_set('Hello, world!')\n))))\norder by key_item;\n\
    ```\n\n```\nKEY_ITEM                         VALUE_ITEM\n--------------------------------\
    \ ----------------------\n                                 1\n!              \
    \                  1\n,                                1\nH                  \
    \              1\nd                                1\ne                      \
    \          1\nl                                2\nl                          \
    \      1\no                                1\no                              \
    \  1\nr                                1\nw                                1\n\
    \n12 rows selected\n```\n\nThat doesn't look right! You have two rows each for\
    \ the letters ‘l’ and ‘o’. What could have gone wrong?\n\n## 问题根源分析\n\nLet's look\
    \ at the `Reduce` code and pay particular attention to any assumptions you may\
    \ have made in coding it up. Right away you should see that you had assumed that\
    \ the data handed to the `Reduce` function was coming in sorted or clustered such\
    \ that like letters would appear one after another from the Map output. However,\
    \ the `PARTITION … BY ANY` option you used specifically told the server that you\
    \ didn't care which letters went to which Reducer and you also didn't tell the\
    \ server that you wanted the data sets sent to the Reducers in a such a way as\
    \ to make sure that the items would come in clustered or sorted.\n\nHow can you\
    \ tell Oracle that you want like letters sent to the same Reducers?\n\n## 控制数据分布的方法\n\
    \nBy replacing the generic `sys_refcursor` with information about columns in the\
    \ cursor (in this case, the actual key/value pairs), you now have several ways\
    \ to distribute rows to your parallel function instances. The full syntax for\
    \ specifying the distribution is as follows:\n\n```\n{[ORDER | CLUSTER] BY `column_list`}\n\
    PARALLEL_ENABLE({PARTITION p BY [ANY | (HASH | RANGE) column_list]} )\n```\n\n\
    Using these keywords, *partitioning* refers to the method used to divide the rows\
    \ among the parallel function instances, while the *ordering* and *clustering*\
    \ options refer to how the rows are pushed or “streamed” into each parallel function\
    \ instance. You should be aware that specifying more control over the distribution\
    \ and ordering/clustering of the rows adds overhead to your process and reduces\
    \ both your speedup and scale up. Here are some descriptions and examples of these\
    \ options:\n\n### ORDERING vs. CLUSTERING\n\nThese options refer to how data is\
    \ delivered to each parallel instance after it has been partitioned or divided.\
    \ They're probably best explained by an example.\n\nAssume your function is going\
    \ to work on the following subset of data values from a dataset:\n\n`5,4,5,6,8,3,2,3,4,5,6,1,2,4,6`\n\
    \n*   **Clustering** would deliver the values in such a way that equivalent values\
    \ would come in directly one after another, but not necessarily sorted\n\n   \
    \ `6,6,6,3,3,8,1,4,4,4,5,5,5,2,2`\n\n*   **Ordering** would deliver the values\
    \ completely sorted\n\n    `1,2,2,3,3,4,4,4,5,5,5,6,6,6,8`\n\nBoth of these options\
    \ add overhead to the process, as they are performed prior to the parallel function\
    \ instance receiving data. Ordering the set takes more time than clustering like\
    \ values.\n\n### PARTITION BY ANY\n\nAs stated earlier, this method simply provides\
    \ each parallel function instance with a random set of rows from the source set.\
    \ Each function instance gets roughly the same number of rows, but they can't\
    \ make any assumptions about the rows they're receiving.\n\nTechnically, you can\
    \ specify that you'd like those rows `CLUSTERED` (or grouped) by particular column\
    \ values, or even that you'd like the entire set of data allocated to each parallel\
    \ function to be completely `ORDERED`. However, since you don't know which rows\
    \ are going to which function instance, these options are of limited value. With\
    \ a random distribution of rows, you would not be able to assume that your clustering\
    \ would contain all values that match the cluster, and while you could ask for\
    \ the rows to be ordered, you would not know if you were missing any rows that\
    \ were assigned to other parallel instances.\n\n### PARTITION BY HASH\n\nThis\
    \ method hashes the values from the columns you list to create subsets of data\
    \ to be portioned out to the parallel function instances. Since values hash consistently,\
    \ individual values from the master data set will essentially be grouped together\
    \ and sent to each function instance. It's possible that multiple values will\
    \ be sent to an instance, and they may not be adjacent values, but you can rely\
    \ on the fact that each function instance will receive the full set of equivalent\
    \ values. Basically, this is like using the `CLUSTERING` option when dividing\
    \ up the data. One or more complete value clusters will be sent to each function\
    \ instance. This method provides a relatively even distribution of data to each\
    \ function, while also making sure that specific data values remain together.\n\
    \nAfter the data has been divided, it can be further `CLUSTERED` or `ORDERED`\
    \ for consumption by the parallel function.\n\n### PARTITION BY RANGE\n\nThis\
    \ method sorts the data before dividing it among the parallel function instances.\
    \ This is like using the `ORDERED` option for portioning out the data. It ensures\
    \ that data values will be grouped together for each function, and that functions\
    \ will only deal with adjacent data values. The risk here is that if your data\
    \ has any extremely skewed distributions, you will have unbalanced parallelism—some\
    \ of the parallel function instances will have a lot more work to do than others.\
    \ Like the `PARTITION BY HASH` option, the data can be further `CLUSTERED` or\
