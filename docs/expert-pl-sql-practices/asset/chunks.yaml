    \ 3GL 程序时，我们称之为“`中间件失败`”。用这种方式给劣质代码贴上标签，竟能如此有效地让开发团队*聚焦*问题，这真令人惊叹！\n\n现在，让我们应用刚刚学到的批量处理知识，从数据库中批量获取数据并批量传回客户端。下面的代码\
    \ (`bulk_network_2.sql`) 是新的实现方式，其性能将会好得多：\n\n```sql\nSQL> create or replace\n\
    \  2  package PKG2 is\n  3\n  4   type t_num_list is table of hardware.item%type\
    \ index by pls_integer;\n  5\n  6   procedure open_cur(rc in out sys_refcursor);\n\
    \  7\n  8   procedure fetch_cur(rc in out sys_refcursor, p_rows out t_num_list);\n\
    \  9\n 10  end;\n 11  /\n```\n\n`Package created.`\n\n```sql\nSQL> create or replace\n\
    \  2  package body PKG2 is\n  3\n  4   procedure open_cur(rc in out sys_refcursor)\
    \ is\n  5   begin\n  6     open rc for select item from hardware;\n  7   end;\n\
    \  8\n  9   procedure fetch_cur(rc in out sys_refcursor, p_rows out t_num_list)\
    \ is\n 10   begin\n 11     fetch rc bulk collect into p_rows limit 1000;\n 12   end;\n\
    \ 13\n 14  end;\n 15  /\n```\n\n`Package body created.`\n\n重新运行演示。每次，将从数据库批量收集\
    \ 1000 行数据并传回客户端。因为 SQL Plus 本身不理解返回的数组，数据将简单地追加到一个大的`VARCHAR2`变量 (`the_data`)\
    \ 中，以模拟客户端接收数组数据的过程。这是一个示例 (`bulk_multi_fetch_in_bulk.sql`)：\n\n```sql\nSQL> variable\
    \ rc refcursor\nSQL> exec pkg2.open_cur(:rc)\n\nPL/SQL procedure successfully\
    \ completed.\n\nSQL> select to_char(systimestamp,'HH24:MI:SS.FF') started from\
    \ dual;\n\nSTARTED\n------------------\n12:39:09.704000\n\nSQL> variable the_data\
    \ varchar2(4000);\nSQL> set termout off\n\nSQL> declare\n  2    n pkg2.t_num_list;\n\
    \  3  begin\n  4    :the_data := null;\n  5    pkg2.fetch_cur(:rc,n);\n  6    for\
    \ i in 1 .. n.count loop\n  7      :the_data := :the_data||n(i);\n  8    end loop;\n\
    \  9  end;\n[重复执行 100 次]\n\nSQL> select to_char(systimestamp,'HH24:MI:SS.FF')\
    \ ended from dual;\n\nENDED\n------------------\n12:39:09.837000\n```\n\n差异是惊人的。直接周转时间从\
    \ 90 秒下降到了 0.13 秒。启用跟踪重新运行演示，揭示了数据库访问次数的减少。\n\n```sql\nSELECT ITEM\nFROM HARDWARE\n\
    \n调用     次数       CPU 耗时    总耗时       磁盘 I/O      查询次数    当前状态        行数\n-------\
    \ ------  -------- ---------- ---------- ---------- ----------  ----------\nParse        1      0.00       0.00          0          0          0           0\n\
    Execute      1      0.00       0.00          0          0          0           0\n\
    Fetch      100      0.04       0.04          0        256          0      100000\n\
    ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
    total      102      0.04       0.04          0        256          0      100000\n\
    ```\n\n仍然获取了 100,000 行数据（最右列），但只进行了 100 次获取调用。我无法过分强调这里所实现的好处，即使只是一个简单的演示。Oracle\
    \ 的客户花费大量资金进行优化工作，试图通过缓存、创建索引、SQL 调优等方法从系统中额外榨出 10-15`%`的性能，这种情况并不少见。有时，客户甚至会购买更多硬件，并伴随相应的许可证成本增加。但请考虑一下这个演示中所获得的性能提升：\n\
    \n> 从 90 秒降到 0.13 秒，提升了近 700 倍。\n\n作为一名应用程序开发者，如果你对代码的修改能让其速度提升数百倍，那将使你的应用程序更加成功，并让你广受欢迎！在客户端应用与数据库的交互中减少网络往返，很大程度上取决于开发者在其客户端应用语言中可用的工具、应用的设计（以智能地利用向数据库传递数据的方式）以及开发者的勤奋程度。但是，作为一名`数据库`开发者，如果你能确保你的\
    \ PL/SQL 数据库接口允许客户端应用程序批量发送和接收数据，那么你就离成功的应用程序性能更近了一步。\n"
- fmt: '### Summary


    One of the reasons I enjoy writing, presenting, or talking about the bulk operations
    in PL/SQL is that using them is virtually a guaranteed success story. Many Oracle
    features, new or old, apply only to a particular niche of customers or address
    a specific technical issue, and moreover, require a large amount of careful testing
    to ensure that using the features does not result in negative impacts elsewhere
    within the database or its applications. On the other hand, adopting bulk collection
    and bulk binding in PL/SQL benefits applications in the overwhelming majority
    of occasions. The effort required to move from row-centric fetching of data to
    the set-centric bulk fetching of data is small or perhaps even zero. Your choices
    are pretty simple.


    *   If you are already using `FOR cursor_variable in (QUERY or CURSOR)` syntax,
    then getting bulk collection is simply a matter of being on a recent version of
    Oracle and ensuring the PL/SQL compilation settings are at their default.

    *   If you are not that fortunate, then it’s still just a matter of some simple
    re-coding to change `FETCH CURSOR INTO` style to the `FETCH CURSOR BULK COLLECT
    INTO`. Just a couple of keywords and some PL/SQL type definitions and you’re done!


    The effort required to move from row-centric modification of data to set-centric
    bulk bind modification of data is equally small.


    *   If you are already issuing DML (`insert`, `update`, `delete`) in a loop, simply
    adding some appropriate type definitions and recasting the FOR loop into `FORALL`
    and the job is done.


    It is that easy, and whereas performance improvement in applications is often
    described in terms of a few-percentage-point gain here and there, you’ve seen
    in this chapter that moving to bulk operations can give `orders of magnitude`
    improvements in performance. In past releases of Oracle, some elements of PL/SQL
    did not support bulk operations (for example, native dynamic SQL and dynamic ref
    cursors). However, all of these restrictions have been lifted in the recent releases
    of the database, thus there’s never a reason why bulk operations can’t be considered.


    So the effort is small, the risks are low, and the payback is huge. The moment
    your approach within PL/SQL becomes set-centric, you’ll be amazed at how quickly
    your newfound, set-centric thinking will spread to other areas of your Oracle
    skillset. You will find yourself achieving more in SQL rather than by procedural
    logic and you will also be taking of advantage of facilities that process data
    en-masse such as pipeline functions. The same skills you learn with bulk operations
    will become the motivations for a set-centric mindset throughout all of your database
    development.


    I hope you share my excitement about bulk operations, and that you will see the
    rewards at your own workplace. As for me, I’m off to the hardware store—this time
    with a trolley.


    # Chapter 7: Know Your Code


    **by Lewis Cunningham**


    The name of this chapter is “Know Your Code.” You might think that if you wrote
    a piece of code, you know it well. You probably do. You know it at least as well
    as anyone else. Even if you''ve written the code, however, you will still make
    assumptions based from your memory. These assumptions will likely move further
    and further from reality as time goes on. You have a best guess—an educated assumption—but
    that is subjective and dependent on human frailty. And if you didn''t write the
    code, all bets are off.


    Why guess when you can know? I first heard that question in a performance context.
    I think it was Cary Milsap (author and performance guru) who said it (at least
    the first time I heard it). I''ll talk more about knowing your code from a performance
    perspective later but the concept holds true for so much more than just performance.


    If you are making a big purchase and need to write a check, are you just going
    to hope (and assume) you have enough money in your account? What if it is within
    a few hundred dollars of what you think is in your account? Would you use an ATM
    or a web page to verify first? My bank even allows me to send an SMS message and
    get my balance. Why would I guess when I can know?


    Oracle gives you ATM access to your code. Everything you could possibly need to
    know about your PL/SQL code can be found within the Oracle data dictionary and/or
    by using tools provided by Oracle. You don''t even need a PIN code (although you''ll
    need to log into the database and perhaps get a few permissions).


    This chapter will show you where to find the best place for an account update.
    Instead of SMS, you''ll send some SQL. The chapter starts with a static analysis
    of your code using the Oracle data dictionary (as it relates to your PL/SQL code)
    and `PL/Scope`. It will then move on to time-based and event-based profiling (pre-11g)
    and finally context-sensitive, time-based profiling (11g+).


    By the end of this chapter, you will be able to take a piece of code you have
    never seen before and know what the code looks like, the data types used, what
    variables are using them, and where they are using them. You will know where runtime
    is spent (efficiently or not) within the application. By the end of this chapter,
    you will have the tools to know your code. No guesses; you will know the code.'
