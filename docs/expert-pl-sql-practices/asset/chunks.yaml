- fmt: "##### USER_TYPES\n\nThe `USER_TYPES` view provides information about your\
    \ types. While you may not think of types as PL/SQL objects, many types, but not\
    \ all, have type bodies. A type body is PL/SQL like any other program unit. From\
    \ a purely PL/SQL point of view, the important columns in this view are the number\
    \ of methods, `local_methods`, and the supertype columns, `name` and `owner`.\
    \ I am going to assume an understanding of Oracle's object type system for the\
    \ next couple of paragraphs.\n\nA quick query of this view can determine if the\
    \ type contains any PL/SQL. If the number of methods is greater than 0, there\
    \ will be code behind the spec (i.e., a body). Also, if the supertype columns\
    \ are not null, this means that this is a sub-type. It contains an inherited spec\
    \ (and potentially an inherited body) from its supertype. Also important is the\
    \ `LOCAL_METHODS` column; this is the number of methods defined in the sub-type\
    \ (0 if not a sub-type or maybe 0 if nothing is over-ridden or extended).\n\n\
    The following query is running against the three object types provided in the\
    \ demo code for this chapter. The three types include a type with no body (no\
    \ PL/SQL), a collection type, and a type with a body.\n\n```sql\nSELECT type_name,\
    \ typecode, attributes, methods, supertype_name, local_methods\nFROM user_types;\n\
    ```\n\n```\nTYPE_NAME          TYPECODE     ATTRIBUTES     METHODS    SUPERTYPE_NAME\
    \       LOCAL_METHODS\n------------------ ------------ -------------- ----------\
    \ -------------------- -------------\nCODE_INFO          OBJECT       7      \
    \        0\nCODE_INFOS         COLLECTION   0              0\nDEMO_TYPE      \
    \    OBJECT       1              3\n```\n\nYou can see from the output that `CODE_INFO`\
    \ has seven attributes, no code (no methods), does not inherit from a supertype,\
    \ and that means no local methods. `CODE_INFOS` is a collection. Notice that it\
    \ has no attributes of its own. `DEMO_TYPE` has a single attribute and three methods.\
    \ That one has PL/SQL for you to look at.\n\n##### USER_TYPE_METHODS\n\nWhen debugging\
    \ PL/SQL in a type body, there is important information you need to know—not just\
    \ in how the code is written but in how the methods are defined. While all of\
    \ the columns have value, the important ones for knowing your code are `METHOD_NO`,\
    \ `METHOD_TYPE`, `PARAMETER`, `RESULTS`, `OVERIDING` and `INHERITED`.\n\nWhen\
    \ you join `USER_TYPE_METHODS` to `USER_PROCEDURES`, you join the type name in\
    \ `USER_TYPE_METHODS` to the `OBJECT_NAME` in `USER_PROCEDURES` and the `METHOD_NO`\
    \ to the `SUBPROGRAM_ID`. The `SUBPROGRAM_ID` also flows into the `USER_ARGUMENTS`\
    \ view.\n\nIf you have overloaded methods, the `OVERLOAD` column will have an\
    \ incremental sequence. If `OVERLOAD` is null, the method is not overloaded. Overloading\
    \ methods are very common when using Oracle's type system, especially with constructors.\n\
    \nThe following query shows that the `DEMO_TYPE` type provides three methods.\
    \ The `OVERLOAD_PROC` member procedure is overloaded and the `FUNC` member function\
    \ is not.\n\n```sql\nSELECT utm.type_name, utm.method_type, utm.method_name, up.overload,\n\
    \       utm.parameters, utm.results\n  FROM user_type_methods utm\n  JOIN user_procedures\
    \ up\n   ON (utm.type_name = up.object_name\n       AND\n       utm.method_no\
    \ = up.subprogram_id)\n  WHERE utm.type_name = 'DEMO_TYPE';\n```\n\n```\nTYPE_NAME\
    \      METHOD_TYPE METHOD_NAME    OVERLOAD   PARAMETERS    RESULTS\n--------------\
    \ ----------- -------------- ---------- ------------- ----------------------\n\
    DEMO_TYPE      PUBLIC      FUNC                      2             1\nDEMO_TYPE\
    \      PUBLIC      OVERLOAD_PROC  1          2             0\nDEMO_TYPE      PUBLIC\
    \      OVERLOAD_PROC  2          2             0\n```\n\n`METHOD_TYPE` tells you\
    \ the basics of the method. Is it a `PUBLIC` method (regular usage) or is it an\
    \ `ORDER` or `MAP` type (for equivalency)?\n\n`PARAMETERS` and `RESULTS` provide\
    \ the input and output to a method. These two columns actually provide the number\
    \ of values in and out, respectively. In an upcoming example, I will show how\
    \ using this view and your knowledge of the `PARAMETERS` to lookup the parameters\
    \ via `USER_ARGUMENTS`. You might be wondering why all of the methods say they\
    \ have two parameters when they are defined with only a single parameter. Type\
    \ methods always include the `SELF` parameter, even when it is not included in\
    \ the spec or referenced in the body of the method. It is `always` passed in.\n\
    \n`INHERITED` and `OVERRIDING` tell you if the method was inherited from a supertype\
    \ or if it is overriding a method from a supertype, respectively. Knowing if the\
    \ code comes from the supertype is important when debugging and analyzing. It's\
    \ important to ensure you are looking at the right code.\n\nNot only can `USER_TYPE_METHODS`\
    \ be joined to `USER_PROCEDURES` but it can also be joined to `USER_ARGUMENTS`\
    \ for additional detailed information about your object types. The following query\
    \ shows a few lines of results from the join. It is a great query for validating\
    \ your naming standards and/or catching invalid data type usages.\n\n```sql\n\
    \  SELECT utm.type_name, utm.method_name, ua.argument_name,\n       position,\
    \ sequence, data_type\n  FROM user_type_methods utm\n  JOIN user_procedures up\n\
    \   ON (utm.type_name = up.object_name\n       AND\n       utm.method_name = up.procedure_name)\n\
    \  JOIN user_arguments ua\n  ON (up.procedure_name = ua.object_name\n      AND\n\
    \      up.object_name = ua.package_name)\n WHERE utm.type_name = 'DEMO_TYPE'\n\
    \   AND rownum < 5;  -- usign rownum just to keep the example short\n```\n\n```\n\
    TYPE_NAME   METHOD_NAME      ARGUMENT_NAME  POSITION   SEQUENCE  DATA_TYPE\n-----------\
    \ ---------------- -------------- ---------- --------- ------------\nDEMO_TYPE\
    \   FUNC                          0          1         NUMBER\nDEMO_TYPE   FUNC\
    \              SELF         1          2         OBJECT\nDEMO_TYPE   FUNC    \
    \          P_VALUE      2          3         VARCHAR2\nDEMO_TYPE   OVERLOAD_PROC\
    \     SELF         1          1         OBJECT\n```\n\n##### USER_TRIGGERS\n\n\
    `USER_TRIGGERS` contains information about triggers that are defined in your database.\
    \ While it is a useful place to find code, and it does contain useful information\
    \ about the trigger and how the trigger is defined, it does not contain much information\
    \ about the code. Use this view as a loop through `USER_SOURCE` to quickly view\
    \ the code line by line."
  raw: '##### USER_TYPES


    The USER_TYPES view provides information about your types. While you may not think
    of types as PL/SQL objects, many types, but not all, have type bodies. A type
    body is PL/SQL like any other program unit. From a purely PL/SQL point of view,
    the important columns in this view are the number of methods, local_methods, and
    the supertype columns, name and owner. I am going to assume an understanding of
    Oracle''s object type system for the next couple of paragraphs.


    A quick query of this view can determine if the type contains any PL/SQL. If the
    number of methods is greater than 0, there will be code behind the spec (i.e.,
    a body). Also, if the supertype columns are not null, this means that this is
    a sub-type. It contains an inherited spec (and potentially an inherited body)
    from its supertype. Also important is the LOCAL_METHODS column; this is the number
    of methods defined in the sub-type (0 if not a sub-type or maybe 0 if nothing
    is over-ridden or extended).


    The following query is running against the three object types provided in the
    demo code for this chapter. The three types include a type with no body (no PL/SQL),
    a collection type, and a type with a body.


    `SELECT type_name, typecode, attributes, methods, supertype_name, local_methods`

    `FROM user_types;`


    `TYPE_NAME          TYPECODE     ATTRIBUTES     METHODS    SUPERTYPE_NAME       LOCAL_METHODS`

    `------------------ ------------ -------------- ---------- --------------------
    -------------`

    `CODE_INFO          OBJECT       7              0`

    `CODE_INFOS         COLLECTION   0              0`

    `DEMO_TYPE          OBJECT       1              3`


    You can see from the output that CODE_INFO has seven attributes, no code (no methods),
    does not inherit from a supertype, and that means no local methods. CODE_INFOS
    is a collection. Notice that it has no attributes of its own. DEMO_TYPE has a
    single attribute and three methods. That one has PL/SQL for you to look at.


    ##### USER_TYPE_METHODS


    When debugging PL/SQL in a type body, there is important information you need
    to know—not just in how the code is written but in how the methods are defined.
    While all of the columns have value, the important ones for knowing your code
    are METHOD_NO, METHOD_TYPE, PARAMETER, RESULTS, OVERIDING and INHERITED.


    When you join USER_TYPE_METHODS to USER_PROCEDURES, you join the type name in
    USER_TYPE_METHODS to the OBJECT_NAME in USER_PROCEDURES and the METHOD_NO to the
    SUBPROGRAM_ID .The SUBPROGRAM_ID also flows into the USER_ARGUMENTS view.


    If you have overloaded methods, the OVERLOAD column will have an incremental sequence.
    If OVERLOAD is null, the method is not overloaded. Overloading methods are very
    common when using Oracle''s type system, especially with constructors.


    The following query shows that the DEMO_TYPE type provides three methods. The
    OVERLOAD_PROC member procedure is overloaded and the FUNC member function is not.


    `SELECT utm.type_name, utm.method_type, utm.method_name, up.overload,`

    `       utm.parameters, utm.results`

    `  FROM user_type_methods utm`

    `  JOIN user_procedures up`

    `   ON (utm.type_name = up.object_name`

    `       AND`

    `       utm.method_no = up.subprogram_id)`

    `  WHERE utm.type_name = ''DEMO_TYPE'';`


    `TYPE_NAME      METHOD_TYPE METHOD_NAME    OVERLOAD   PARAMETERS    RESULTS`

    `-------------- ----------- -------------- ---------- ------------- ----------------------`

    `DEMO_TYPE      PUBLIC      FUNC                          2             1`

    `DEMO_TYPE      PUBLIC      OVERLOAD_PROC  1          2             0`

    `DEMO_TYPE      PUBLIC      OVERLOAD_PROC  2          2             0`


    METHOD_TYPE tells you the basics of the method. Is it a PUBLIC method (regular
    usage) or is it an ORDER or MAP type (for equivalency)?


    PARAMETERS and RESULTS provide the input and output to a method. These two columns
    actually provide the number of values in and out, respectively. In an upcoming
    example, I will show how using this view and your knowledge of the PARAMETERS
    to lookup the parameters via USER_ARGUMENTS. You might be wondering why all of
    the methods say they have two parameters when they are defined with only a single
    parameter. Type methods always include the SELF parameter, even when it is not
    included in the spec or referenced in the body of the method. It is *always* passed
    in.


    INHERITED and OVERRIDING tell you if the method was inherited from a supertype
    or if it is overriding a method from a supertype, respectively. Knowing if the
    code comes from the supertype is important when debugging and analyzing. It''s
    important to ensure you are looking at the right code.


    Not only can USER_TYPE_METHODS be joined to USER_PROCEDURES but it can also be
    joined to USER_ARGUMENTS for additional detailed information about your object
    types. The following query shows a few lines of results from the join. It is a
    great query for validating your naming standards and/or catching invalid data
    type usages.


    `  SELECT utm.type_name, utm.method_name, ua.argument_name,`

    `       position, sequence, data_type`

    `  FROM user_type_methods utm`

    `  JOIN user_procedures up`

    `   ON (utm.type_name = up.object_name`

    `       AND`

    `       utm.method_name = up.procedure_name)`

    `  JOIN user_arguments ua`

    `  ON (up.procedure_name = ua.object_name`

    `      AND`

    `      up.object_name = ua.package_name)`

    ` WHERE utm.type_name = ''DEMO_TYPE''`

    `   AND rownum < 5;  -- usign rownum just to keep the example short`


    `TYPE_NAME   METHOD_NAME      ARGUMENT_NAME  POSITION   SEQUENCE  DATA_TYPE`

    `----------- ---------------- -------------- ---------- --------- ------------`

    `DEMO_TYPE   FUNC                            0          1         NUMBER`

    `DEMO_TYPE   FUNC             SELF           1          2         OBJECT`

    `DEMO_TYPE   FUNC             P_VALUE        2          3         VARCHAR2`

    `DEMO_TYPE   OVERLOAD_PROC    SELF           1          1         OBJECT`


    ##### USER_TRIGGERS


    USER_TRIGGERS contains information about triggers that are defined in your database.
    While it is a useful place to find code, and it does contain useful information
    about the trigger and how the trigger is defined, it does not contain much information
    about the code. Use this view as a loop through USER_SOURCE to quickly view the
    code line by line.'
  trans: "\n##### USER_TYPES\n\n`USER_TYPES` 视图提供关于你所拥有的类型的信息。虽然你可能不认为类型是 PL/SQL 对象，但许多（尽管不是全部）类型都有类型主体。类型主体就像其他任何程序单元一样是\
    \ PL/SQL。纯粹从 PL/SQL 的角度来看，此视图中重要的列是方法数量 (`METHODS`)、`LOCAL_METHODS`，以及超类型列 `SUPERTYPE_NAME`\
    \ 和 `OWNER`。在接下来的几段中，我将假定读者对 Oracle 的对象类型系统有所了解。\n\n快速查询此视图可以确定该类型是否包含任何 PL/SQL。如果方法数量大于\
    \ 0，则规格说明（spec）背后就会有代码（即，一个主体）。此外，如果超类型列不为空，这意味着这是一个子类型。它从其超类型继承了一个规格说明（以及可能继承了一个主体）。同样重要的是\
    \ `LOCAL_METHODS` 列；这是在子类型中定义的方法数量（如果不是子类型则为 0，或者如果没有覆盖或扩展任何内容，也可能为 0）。\n\n以下查询针对本章示例代码中提供的三个对象类型运行。这三个类型包括：一个没有主体（没有\
    \ PL/SQL）的类型、一个集合类型和一个带有主体的类型。\n\n```sql\nSELECT type_name, typecode, attributes,\
    \ methods, supertype_name, local_methods\nFROM user_types;\n```\n\n```\nTYPE_NAME\
    \          TYPECODE     ATTRIBUTES     METHODS    SUPERTYPE_NAME       LOCAL_METHODS\n\
    ------------------ ------------ -------------- ---------- --------------------\
    \ -------------\nCODE_INFO          OBJECT       7              0\nCODE_INFOS\
    \         COLLECTION   0              0\nDEMO_TYPE          OBJECT       1   \
    \           3\n```\n\n从输出中你可以看到，`CODE_INFO` 有七个属性，没有代码（没有方法），不从超类型继承，这意味着没有本地方法。`CODE_INFOS`\
    \ 是一个集合。注意，它自身没有属性。`DEMO_TYPE` 有一个属性和三个方法。后者有 PL/SQL 供你查看。\n\n##### USER_TYPE_METHODS\n\
    \n在调试类型体中的 PL/SQL 代码时，有一些重要的信息你需要知道——不仅在于代码如何编写，还在于方法如何定义。虽然所有列都有其价值，但对于了解你的代码来说，重要的列包括\
    \ `METHOD_NO`、`METHOD_TYPE`、`PARAMETERS`、`RESULTS`、`OVERRIDING` 和 `INHERITED`。\n\
    \n当你将 `USER_TYPE_METHODS` 与 `USER_PROCEDURES` 连接时，需将 `USER_TYPE_METHODS` 中的类型名连接到\
    \ `USER_PROCEDURES` 中的 `OBJECT_NAME`，并将 `METHOD_NO` 连接到 `SUBPROGRAM_ID`。`SUBPROGRAM_ID`\
    \ 也会流入 `USER_ARGUMENTS` 视图。\n\n如果你有重载的方法，`OVERLOAD` 列会有一个递增的序列号。如果 `OVERLOAD`\
    \ 为空，则该方法未被重载。在使用 Oracle 类型系统时，重载方法非常常见，尤其是在构造函数中。\n\n以下查询显示 `DEMO_TYPE` 类型提供了三个方法。成员过程\
    \ `OVERLOAD_PROC` 是重载的，而成员函数 `FUNC` 不是。\n\n```sql\nSELECT utm.type_name, utm.method_type,\
    \ utm.method_name, up.overload,\n       utm.parameters, utm.results\n  FROM user_type_methods\
    \ utm\n  JOIN user_procedures up\n   ON (utm.type_name = up.object_name\n    \
    \   AND\n       utm.method_no = up.subprogram_id)\n  WHERE utm.type_name = 'DEMO_TYPE';\n\
    ```\n\n```\nTYPE_NAME      METHOD_TYPE METHOD_NAME    OVERLOAD   PARAMETERS  \
    \  RESULTS\n-------------- ----------- -------------- ---------- -------------\
    \ ----------------------\nDEMO_TYPE      PUBLIC      FUNC                    \
    \  2             1\nDEMO_TYPE      PUBLIC      OVERLOAD_PROC  1          2   \
    \          0\nDEMO_TYPE      PUBLIC      OVERLOAD_PROC  2          2         \
    \    0\n```\n\n`METHOD_TYPE` 告诉你方法的基本信息。它是 `PUBLIC` 方法（常规用法），还是 `ORDER` 或 `MAP`\
    \ 类型（用于等价性比较）？\n\n`PARAMETERS` 和 `RESULTS` 提供了方法的输入和输出。这两列实际上分别提供了输入和输出值的数量。在接下来的示例中，我将展示如何使用此视图以及你对\
    \ `PARAMETERS` 的了解，通过 `USER_ARGUMENTS` 来查找参数。你可能想知道为什么所有方法都说有两个参数，而它们定义时只有一个参数。类型方法总是包含\
    \ `SELF` 参数，即使它没有包含在规格说明中，或者在方法体中被引用。它总是被传入的。\n\n`INHERITED` 和 `OVERRIDING` 分别告诉你该方法是从超类型继承的，还是覆盖了超类型中的方法。在调试和分析时，知道代码是否来自超类型非常重要。确保你正在查看正确的代码是至关重要的。\n\
    \n`USER_TYPE_METHODS` 不仅可以与 `USER_PROCEDURES` 连接，还可以与 `USER_ARGUMENTS` 连接，以获取关于你的对象类型的更多详细信息。以下查询显示了连接后的几行结果。这是一个用于验证命名规范和/或捕捉无效数据类型使用情况的绝佳查询。\n\
    \n```sql\n  SELECT utm.type_name, utm.method_name, ua.argument_name,\n       position,\
    \ sequence, data_type\n  FROM user_type_methods utm\n  JOIN user_procedures up\n\
    \   ON (utm.type_name = up.object_name\n       AND\n       utm.method_name = up.procedure_name)\n\
    \  JOIN user_arguments ua\n  ON (up.procedure_name = ua.object_name\n      AND\n\
    \      up.object_name = ua.package_name)\n WHERE utm.type_name = 'DEMO_TYPE'\n\
    \   AND rownum < 5;  -- usign rownum just to keep the example short\n```\n\n```\n\
    TYPE_NAME   METHOD_NAME      ARGUMENT_NAME  POSITION   SEQUENCE  DATA_TYPE\n-----------\
    \ ---------------- -------------- ---------- --------- ------------\nDEMO_TYPE\
    \   FUNC                          0          1         NUMBER\nDEMO_TYPE   FUNC\
    \              SELF         1          2         OBJECT\nDEMO_TYPE   FUNC    \
    \          P_VALUE      2          3         VARCHAR2\nDEMO_TYPE   OVERLOAD_PROC\
    \     SELF         1          1         OBJECT\n```\n\n##### USER_TRIGGERS\n\n\
    `USER_TRIGGERS` 包含有关在你的数据库中定义的触发器的信息。虽然它是查找代码的有用位置，并且确实包含有关触发器及其定义方式的有用信息，但它不包含太多关于代码本身的信息。请将此视图与遍历\
    \ `USER_SOURCE` 结合使用，以便逐行快速查看代码。\n"
- fmt: '# PL/SCOPE


    PL/SCOPE 是 PL/SQL 编译器的一项功能，它为数据字典扩展提供数据。该功能获取编译时收集的信息（编译器本就需要的信息）并将其放入一个视图（通常有三个：`USER_*`、`ALL_*`
    和 `DBA_*`）中，名为 `USER_IDENTIFIERS`。数据字典提供有关在 PL/SQL 代码中使用的变量和其他标识符的信息。除了显示所有标识符的名称外，它还能识别变量是什么（数据类型以及变量与参数等的区别）、它们如何被使用（声明、引用、赋值等）以及它们在何处被使用（声明、赋值等的上下文）。


    ![images](images/square.jpg) `Note` PL/Scope 是版本 11g 及以上的一个特性。如果您仍在使用低于 11.0 的版本，您将需要升级才能同时利用
    PL/Scope 和 `DBMS_HPROF`（动态分析将在后面讨论）。如果您使用的是早期版本，您可以从前面讨论的字典视图中获取部分此类信息。我建议升级，因为在
    11g 中您将受益于除代码分析之外的许多其他功能。


    您代码中使用的每个标识符（这对任何语言都适用，而不仅仅是 PL/SQL）都有一个上下文。这个上下文是使用分析中最重要的部分。一个变量可能在包（`DECLARATION`）内的一个过程（`DEFINITION`）中定义。值的赋值可能在定义时发生，也可能在后面的代码主体中作为赋值步骤发生。对于变量或迭代器，您将能够看到代码中任何未被引用（`REFERENCEd`）的变量。对于过程或函数，您可以发现它是否曾被调用（`CALLed`）。接下来我将更详细地展示这方面的示例。


    ## 什么是标识符？


    标识符是您可以在代码中使用的任何东西。您可以使用一个过程（您调用它）。您可以使用一个变量（您可以给它赋值或从中读取值）。您可以使用数据类型（看起来很奇怪，但当您声明变量、常量、迭代器等时就会用到它们）。您可以使用触发器、同义词、形式参数，甚至异常。标识符基本上是您可以在代码中使用或引用（嵌入式
    SQL 除外）的任何东西。


    以下是您在使用 PL/SQL 时会遇到的不同类型的标识符：


    *   使用的数据类型和子类型（包括集合）

    *   游标和 REF 游标

    *   过程

    *   函数

    *   包和包体

    *   触发器

    *   对象类型和类型体

    *   参数

    *   函数返回值

    *   变量、迭代器、常量

    *   异常

    *   同义词（不会解析为任何实际对象，没有验证）


    每个在 `USER_IDENTIFIERS` 视图中都有一个唯一的签名列。这个签名是由 Oracle 提供的十六进制字符串——它在数据库中是唯一的。如果您有一个名为
    `v_my_id` 的标识符在两个不同的包或独立过程中声明，那么签名在这些程序单元中将是唯一的。如果您在同一个程序单元内的多个作用域中标识了同一个变量，每个变量都将有自己的签名。包内重载的过程也会有两个不同的签名。


    ## 标识符的作用域


    PL/Scope 通过理解上下文，可以提供变量的作用域，因此得名 PL/Scope。这种能力在大多数情况下并非至关重要，但在某些情况下会有所帮助。一个例子是，当您在两个作用域中定义了同一个变量却没有意识到时。您可能认为您正在为较高作用域的变量赋值，但实际上是在为局部作用域的变量赋值。PL/Scope
    显示的赋值无法告诉您您原本想做什么，但至少您会看到同一个调用栈中在多个作用域声明了相同的变量（不良实践警示）。您可以通过始终引用变量的命名作用域来最小化这种危险，但我发现这会使代码更难以维护而不是更容易。我只是尽量不重用名称。


    同样地，PL/Scope 通过理解上下文，可以提供过程代码的调用栈。动态代码分析（稍后将介绍）的用途之一是验证代码覆盖率。代码覆盖率是在回归测试中实际执行所有代码。PL/Scope
    可以给您一个静态视图，至少显示每个程序单元被引用。如果您有一个定义了但从未被调用的过程，这不一定是坏事（它可能从外部上下文被调用），但它确实提供了可以审查的额外信息。


    说到外部上下文，PL/Scope 确实会显示在外部上下文中被调用（`CALLed`）或引用（`REFERENCEd`）的标识符。只要外部上下文是用 PL/Scope
    开启编译的，您就可以连接到该外部引用。例如，当您声明一个 `NUMBER` 类型的变量时，它会对外部的 `DATATYPE_NUMBER`（在 `DBMS_STANDARD`（一个
    Oracle 标准包）中声明的子类型）进行外部引用。这将是一个外部上下文（从当前程序单元的角度看是外部的）。


    如果一个程序单元中的一个过程调用了另一个程序单元中的一个过程，并且两个过程都使用了 PL/Scope，您就可以看到完整的调用栈。您无法跟踪栈进入外部 C 过程或
    Java 单元，因为它们不受 PL/Scope 覆盖。相反，您会看到调用（`CALL`），而栈将在此处终止（嗯，不是终止；当外部引用返回时，您会重新拾起栈）。'
  raw: '#### PL/SCOPE


    PL/SCOPE is a feature of the PL/SQL compiler that provides data for an extension
    to the data dictionary. This feature takes information gathered at compile time
    (information the compiler needs anyway) and drops it into a view (the usual three:
    USER_*, ALL_* and DBA_*) called USER_IDENTIFIERS. The data dictionary provides
    information about variables and other identifiers that are used in your PL/SQL
    code. In addition to showing the name of all identifiers, it also identifies what
    the variables are (data types as well as variables vs. parameter vs. etc.), how
    they are used (declared, referenced, assigned, etc.) and where they are used (the
    context of the declaration, assignment, etc.).


    ![images](images/square.jpg) **Note** PL/Scope is a version 11+ feature. If you
    are still using a version less than 11.0, you will need to upgrade to take advantage
    of both PL/Scope and DBMS_HPROF (dynamic profiling is discussed later). If you
    are using an earlier version, you can get some of this information from the dictionary
    views discussed earlier. I recommend an upgrade because you will benefit by many
    more things in 11g than just code analysis.


    Every identifier used in your code (and this is true for any language, not just
    PL/SQL) has a context. This context is the most important part of usage analysis.
    A variable may be defined in a procedure (DEFINITION) within a package (the DECLARATION).
    The assignment of a value may be with the definition or it may come later as an
    assignment step in the body of the code. For a variable or iterator, you will
    be able to see any variables not REFERENCEd anywhere in the code. For a procedure
    or function, you can find if it has ever been CALLed. I will show examples of
    this in more detail next.


    ##### What is an identifier?


    An identifier is anything that you can use within you code. You can use a procedure
    (you CALL it). You can use a variable (you can give it values or read values from
    it). You can use data types (seems odd but you use them when you declare a variable,
    constant, iterator, etc.). You can use triggers, synonyms, formal parameters,
    and even exceptions. An identifier is pretty much anything you can use or reference
    (with the exception of embedded SQL) within your code.


    The following are the different types of identifiers that you will encounter when
    working with PL/SQL:


    *   Data types and subtypes used (including collections)

    *   Cursors and ref cursors

    *   Procedures

    *   Functions

    *   Packages and package bodies

    *   Triggers

    *   Object types and type bodies

    *   Parameters

    *   Function return values

    *   Variables, iterators, constants

    *   Exceptions

    *   Synonyms (are not resolved to any actual objects, there is no validation)


    Every identifier has a unique signature that is a column in the USER_IDENTIFIERS
    view. This signature is a HEX string provided by Oracle—it is a unique string
    across a database. If you have an identifier named v_my_id declared in two different
    packages or standalone procedures, the signature will be unique across those program
    units. If you have the same variable identified at multiple scopes within the
    same program unit, each will have its own signature. An overloaded procedure within
    a package will also have two different signatures.


    ##### Scope of Identifiers


    PL/Scope, by understanding the context, can provide the scope of a variable, hence
    the name PL/Scope. This ability is not super important for the most part, but
    it can help in some situations. One example is that when you have a variable defined
    in two scopes and don''t realize it. You may think you are assigning a value to
    the variable at the higher scope when in fact you are assigning to the local scope.
    The assignment that PL/Scope shows can''t tell you what you meant to do, but at
    least you will see the same variable declared at multiple scopes in the same call
    stack (bad practice alert). You can minimize this danger by always referencing
    the named scope of a variable but I find this makes the code less maintainable
    rather than more. I just try not to reuse names.


    PL/Scope, also by understanding the context, can provide a call stack of procedural
    code. One of the uses of dynamic code analysis (which will be covered later) is
    to verify code coverage. Code coverage is the actual execution of all code in
    a regression test. PL/Scope can give you a static view that at least each program
    unit is referenced. If you have a procedure that is defined but never called,
    that''s not necessarily a bad thing (it may be called from an external context),
    but it does give additional information that can be reviewed.


    Speaking of external contexts, PL/Scope does show identifiers CALLed or REFERENCEd
    with an external context. You can then join to the external reference as long
    as that external context is compiled with PL/Scope turned on. An example of this
    is when you declare a variable of NUMBER, it makes an external reference to DATATYPENUMBER,
    which is a subtype declared in DBMS_STANDARD (an Oracle standard package). This
    would be an external context (external from the view point of the current program
    unit).


    If a procedure in one program unit makes a call to a procedure in another program
    unit, you can see the complete call stack if both procedures are utilizing PL/Scope.
    You would not be able to follow the stack into an external C procedure or a Java
    unit as they are not covered by PL/Scope. Instead, you would see the CALL and
    the stack would end there (well, not end; you would pick the stack back up when
    the external reference returned).'
  trans: '

    # PL/SCOPE


    PL/SCOPE 是 PL/SQL 编译器的一项功能，它为数据字典扩展提供数据。该功能获取编译时收集的信息（编译器本就需要的信息）并将其放入一个视图（通常有三个：`USER_*`、`ALL_*`
    和 `DBA_*`）中，名为 `USER_IDENTIFIERS`。数据字典提供有关在 PL/SQL 代码中使用的变量和其他标识符的信息。除了显示所有标识符的名称外，它还能识别变量是什么（数据类型以及变量与参数等的区别）、它们如何被使用（声明、引用、赋值等）以及它们在何处被使用（声明、赋值等的上下文）。


    ![images](img/square.jpg) `注意` PL/Scope 是版本 11g 及以上的一个特性。如果您仍在使用低于 11.0 的版本，您将需要升级才能同时利用
    PL/Scope 和 `DBMS_HPROF`（动态分析将在后面讨论）。如果您使用的是早期版本，您可以从前面讨论的字典视图中获取部分此类信息。我建议升级，因为在
    11g 中您将受益于除代码分析之外的许多其他功能。


    您代码中使用的每个标识符（这对任何语言都适用，而不仅仅是 PL/SQL）都有一个上下文。这个上下文是使用分析中最重要的部分。一个变量可能在包（`DECLARATION`）内的一个过程（`DEFINITION`）中定义。值的赋值可能在定义时发生，也可能在后面的代码主体中作为赋值步骤发生。对于变量或迭代器，您将能够看到代码中任何未被引用（`REFERENCEd`）的变量。对于过程或函数，您可以发现它是否曾被调用（`CALLed`）。接下来我将更详细地展示这方面的示例。


    ## 什么是标识符？


    标识符是您可以在代码中使用的任何东西。您可以使用一个过程（您调用它）。您可以使用一个变量（您可以给它赋值或从中读取值）。您可以使用数据类型（看起来很奇怪，但当您声明变量、常量、迭代器等时就会用到它们）。您可以使用触发器、同义词、形式参数，甚至异常。标识符基本上是您可以在代码中使用或引用（嵌入式
    SQL 除外）的任何东西。


    以下是您在使用 PL/SQL 时会遇到的不同类型的标识符：


    *   使用的数据类型和子类型（包括集合）

    *   游标和 REF 游标

    *   过程

    *   函数

    *   包和包体

    *   触发器

    *   对象类型和类型体

    *   参数

    *   函数返回值

    *   变量、迭代器、常量

    *   异常

    *   同义词（不会解析为任何实际对象，没有验证）


    每个在 `USER_IDENTIFIERS` 视图中都有一个唯一的签名列。这个签名是由 Oracle 提供的十六进制字符串——它在数据库中是唯一的。如果您有一个名为
    `v_my_id` 的标识符在两个不同的包或独立过程中声明，那么签名在这些程序单元中将是唯一的。如果您在同一个程序单元内的多个作用域中标识了同一个变量，每个变量都将有自己的签名。包内重载的过程也会有两个不同的签名。


    ## 标识符的作用域


    PL/Scope 通过理解上下文，可以提供变量的作用域，因此得名 PL/Scope。这种能力在大多数情况下并非至关重要，但在某些情况下会有所帮助。一个例子是，当您在两个作用域中定义了同一个变量却没有意识到时。您可能认为您正在为较高作用域的变量赋值，但实际上是在为局部作用域的变量赋值。PL/Scope
    显示的赋值无法告诉您您原本想做什么，但至少您会看到同一个调用栈中在多个作用域声明了相同的变量（不良实践警示）。您可以通过始终引用变量的命名作用域来最小化这种危险，但我发现这会使代码更难以维护而不是更容易。我只是尽量不重用名称。


    同样地，PL/Scope 通过理解上下文，可以提供过程代码的调用栈。动态代码分析（稍后将介绍）的用途之一是验证代码覆盖率。代码覆盖率是在回归测试中实际执行所有代码。PL/Scope
    可以给您一个静态视图，至少显示每个程序单元被引用。如果您有一个定义了但从未被调用的过程，这不一定是坏事（它可能从外部上下文被调用），但它确实提供了可以审查的额外信息。


    说到外部上下文，PL/Scope 确实会显示在外部上下文中被调用（`CALLed`）或引用（`REFERENCEd`）的标识符。只要外部上下文是用 PL/Scope
    开启编译的，您就可以连接到该外部引用。例如，当您声明一个 `NUMBER` 类型的变量时，它会对外部的 `DATATYPE_NUMBER`（在 `DBMS_STANDARD`（一个
    Oracle 标准包）中声明的子类型）进行外部引用。这将是一个外部上下文（从当前程序单元的角度看是外部的）。


    如果一个程序单元中的一个过程调用了另一个程序单元中的一个过程，并且两个过程都使用了 PL/Scope，您就可以看到完整的调用栈。您无法跟踪栈进入外部 C 过程或
    Java 单元，因为它们不受 PL/Scope 覆盖。相反，您会看到调用（`CALL`），而栈将在此处终止（嗯，不是终止；当外部引用返回时，您会重新拾起栈）。

    '
- fmt: "# PL/Scope 数据收集与配置\n\n##### Data Gathered\n\nPL/Scope 收集的数据包括标识符的名称、用法及其使用上下文。它还包括定义标识符的对象、对象类型以及使用的行和列。\n\
    \n用法是指标识符被使用的方式。数据类型由变量定义使用；过程可以被声明、定义和调用。以下是 PL/Scope 跟踪的用法：\n\n*   **Declaration**：首次识别标识符，例如包。\n\
    *   **Definition**：标识符的实现，例如包体中的过程。\n*   **Assignment**：更改标识符的值，例如变量或迭代器。\n* \
    \  **Reference**：检查标识符的值（包括引发异常）。\n*   **Call**：执行标识符，例如过程、函数、游标。\n\n![images](images/square.jpg)\
    \ **Note** 数据类型是标识符的上下文，而不是属性，因为并非所有标识符都有数据类型。过程是标识符但没有数据类型。\n\n`USER_IDENTIFIERS`\
    \ 视图中的所有列都很重要。[Table 7-1](#Chapter07.html#tab_7_1) 包含了视图中的列及其简要描述。\n\n![images](images/t0701.jpg)\n\
    \n为了更好地理解用法列，你需要查看视图中的原始数据。以下是对该视图的一个示例查询。输出结果是你在自己的查询中会看到的典型情况。请注意，在你使用 PL/Scope\
    \ 编译代码（下一节“Configuring PL/Scope”将解释）之前，该视图将为空。\n\n```sql\nSELECT * FROM (\n  SELECT\
    \ object_name, name, type, usage, usage_id, usage_context_id\n    FROM user_identifiers\n\
    \    WHERE object_name = 'JOBS_API'\n      AND object_type = 'PACKAGE BODY'\n\
    \    ORDER BY line, col, usage_id)\nWHERE rownum < 6; -- keeping it small\n```\n\
    \n```\nOBJECT_NAME  NAME          TYPE         USAGE       USAGE_ID   USAGE_CONTEXT_ID\n\
    ------------ ------------- ------------ ----------- ---------- ----------------------\n\
    JOBS_API     JOBS_API      PACKAGE      DEFINITION  1          0\nJOBS_API   \
    \  JOB_EXISTS    FUNCTION     DEFINITION  2          1\nJOBS_API     JOB_TITLE\
    \     FORMAL IN    DECLARATION 3          2\nJOBS_API     V_JOB_ID      VARIABLE\
    \     DECLARATION 4          2\nJOBS_API     V_JOB_ID      VARIABLE     ASSIGNMENT\
    \  5          2\n```\n\n第一个用法（`USAGE_ID = 1`）是包定义。这个程序单元的上下文是 0。它是程序单元中的第一个用法，所以\
    \ `USAGE_CONTEXT_ID` 是 0。你不能在程序单元之间混合匹配用法或上下文，甚至在规范和包体之间也不行。\n\n第二行是一个函数定义。`USAGE_ID`\
    \ 是 2，上下文是 1。这意味着 `USAGE_ID` 2 是 `USAGE_ID` 1 的子项。该函数属于这个包。\n\n第三行是一个参数，第四行是一个变量声明，第五行是对第四行定义的变量的赋值。所有这些用法都是该函数的子项，因此\
    \ `USAGE_CONTEXT_ID` 是 2（它们都位于函数体内）。\n\n如果你有一个重载的程序单元，`SIGNATURE` 列将唯一标识正在调用的是哪个版本。签名始终是所引用标识符的签名，不一定是对象中的当前标识符。\n\
    \n以下查询显示，重载的过程即使名称相同，也会有不同的签名：\n\n```sql\nSELECT name, usage, signature\nFROM\
    \ user_identifiers\nWHERE object_name = 'PLSCOPE_SUPPORT_PKG'\n  AND object_type\
    \ = 'PACKAGE'\n  AND name = 'SOURCE_LOOKUP'\nORDER BY line, col, usage_id;\n```\n\
    \n```\nNAME                       USAGE       SIGNATURE\n------------------------------\
    \ ----------- --------------------------------\nSOURCE_LOOKUP              DECLARATION\
    \ A633B1818ABD9AE3739E5A0B6D86EBB8\nSOURCE_LOOKUP              DECLARATION 3ED2FA822BD27B5B10F44226DCB93E0E\n\
    ```\n\n##### Configuring PL/Scope\n\nOracle 文档指出，PL/Scope 面向应用开发人员，通常用于开发阶段。我对此持保留态度。它应该被任何编译\
    \ PL/SQL 的人使用，并且应该在你工作的任何数据库（开发、测试和生产）中使用。PL/Scope 将其数据存储在 `SYSAUX` 表空间中，占用空间非常小（所以这不应该成为问题）。运行\
    \ PL/Scope 也是一项编译时活动，而不是运行时活动，因此没有性能损失（不像开启调试编译那样）。它可能会稍微增加编译时间，但我自己并未察觉到。\n\n\
    PL/Scope 非常容易配置。如前所述，它是一项编译时活动，因此在编译程序单元之前启用。使用的编译器设置称为 `PLSCOPE_SETTINGS`。用户，或者更可能是用户的\
    \ IDE，将使用 `ALTER SESSION` 命令来开启 PL/Scope。你也可以通过 `ALTER SYSTEM` 全局设置，或使用 `ALTER\
    \ COMPILE` 语句针对单个程序单元进行设置。下面我将展示每种方法的示例。\n\n目前，它只有一个开启（ALL）或关闭（NONE）的开关，但将来可能会允许一些粒度控制。在\
    \ 11.2 及更低版本中，默认值是 NONE。我预计随着时间的推移，ALL 会成为默认值，但这只是我的个人偏好。\n\n要在会话级别开启 PL/Scope\
    \ 收集，请使用以下命令：\n\n```sql\nALTER SESSION SET PLSCOPE_SETTINGS = 'IDENTIFIERS:ALL';\n\
    ```\n\n要关闭标识符收集，请使用以下命令：\n\n```sql\nALTER SESSION SET PLSCOPE_SETTINGS = 'IDENTIFIERS:NONE';\n\
    ```\n\n在系统级别开启和关闭类似。我不打算详细介绍 `ALTER SYSTEM` 命令及其存储值的方式，但一个例子可能是：\n\n```sql\nALTER\
    \ SYSTEM SET PLSCOPE_SETTINGS = 'IDENTIFIERS:ALL';\n```\n\n要编译一个带有标识符收集的对象，请使用相应的\
    \ `ALTER` 命令（`PROCEDURE`、`PACKAGE`、`TRIGGER`、`FUNCTION`、`TYPE` 等），如下所示：\n\n```sql\n\
    ALTER PACKAGE batch_overlord COMPILE PLSCOPE_SETTINGS = 'IDENTIFIERS:ALL';\n```\n\
    \n编译程序单元后，你可以使用视图 `USER_PLSQL_OBJECT_SETTINGS` 来查看设置，如下所示：\n\n```sql\nSQL> SELECT\
    \ type, plscope_settings\n     FROM user_plsql_object_settings\n    WHERE name\
    \ = 'EMPLOYEE_API';\n```\n\n```\nTYPE         PLSCOPE_SETTINGS\n------------ ---------------------------------------------------------------------\n\
    PACKAGE      IDENTIFIERS:ALL\nPACKAGE BODY IDENTIFIERS:ALL\n```\n\n就是这么简单。一旦设置完成，你就可以开始使用它了。别忘了在开启\
    \ PL/Scope 的情况下重新编译你的代码。"
  raw: '##### Data Gathered


    The data gathered by PL/Scope includes the name of an identifier, the usage, and
    the context of the identifier''s usage. It also includes the object where the
    identifier is defined, the type of object, and the line and column of the usage.


    Usage is the way the identifier is used. A data type is used by a variable definition;
    a procedure can be declared, defined and called. The following are the usages
    tracked by PL/Scope:


    *   **Declaration**: First identification of an identifier, such as a package.

    *   **Definition**: Implementation of an identifier, such as a procedure in a
    package body.

    *   **Assignment**: Change the value of an identifier, such as a variable or iterator.

    *   **Reference**: Inspect the value of an identifier (including raising an exception).

    *   **Call**: Execute an identifier, such as a procedure, function, cursor.


    ![images](images/square.jpg) **Note** Data Type is a context of an identifier,
    as opposed to a property of an identifier, because not all identifiers have a
    data type. A procedure is an identifier but it has no data type.


    All of the columns in the USER_IDENTIFIERS view are important. [Table 7-1](#Chapter07.html#tab_7_1)
    contains the columns in the view and a brief description of the columns.


    ![images](images/t0701.jpg)


    To understand the usage columns a bit better, you need to look at the raw data
    in the view. The following is an example query against the view. The output is
    representative of what you will see in your own queries. Note that the view will
    be empty until you have compiled your code with PL/Scope turned on (which is explained
    in the next section “Configuring PL/Scope”).


    `SELECT * FROM (`

    `  SELECT object_name, name, type, usage, usage_id, usage_context_id`

    `    FROM user_identifiers`

    `    WHERE object_name = ''JOBS_API''`

    `      AND object_type = ''PACKAGE BODY''`

    `    ODER BY line, col, usage_id)`

    `WHERE rownum < 6; -- keeping it small`

    `OBJECT_NAME  NAME          TYPE         USAGE       USAGE_ID   USAGE_CONTEXT_ID`

    `------------ ------------- ------------ ----------- ---------- ----------------------`

    `JOBS_API     JOBS_API      PACKAGE      DEFINITION  1          0`

    `JOBS_API     JOB_EXISTS    FUNCTION     DEFINITION  2          1`

    `JOBS_API     JOB_TITLE     FORMAL IN    DECLARATION 3          2`

    `JOBS_API     V_JOB_ID      VARIABLE     DECLARATION 4          2`

    `JOBS_API     V_JOB_ID      VARIABLE     ASSIGNMENT  5          2`


    The first usage (USAGE_ID = 1), is the package definition. The context for this
    program unit is 0\. It is the first usage in the program unit so the USAGE_CONTEXT_ID
    is 0\. You can''t mix and match usages or contexts between program units, not
    even between a spec and a body.


    The second row is a function definition. The USAGE_ID is 2 and the context is
    1\. This means that USAGE_ID 2 is a child of USAGE_ID 1\. The function falls under
    the package.


    The third row is a parameter, the fourth line is a variable declaration, and the
    fifth row is an assignment into the variable defined on row four. All of these
    usages are children of the function so the USAGE_CONTEXT_ID is 2 (they all fall
    within the function body).


    If you have an overloaded program unit, the SIGNATURE column will uniquely identify
    which version is being called. The signature is always the signature of the identifier
    being referenced, not necessarily the current identifier in the object.


    The following query shows that overloaded procedures will have different signatures
    even though they have the same name:


    `SELECT name, usage, signature`

    `FROM user_identifiers`

    `WHERE object_name = ''PLSCOPE_SUPPORT_PKG''`

    `  AND object_type = ''PACKAGE''`

    `  AND name = ''SOURCE_LOOKUP''`

    `ORDER BY line, col, usage_id;`


    `NAME                           USAGE       SIGNATURE`

    `------------------------------ ----------- --------------------------------`

    `SOURCE_LOOKUP                  DECLARATION A633B1818ABD9AE3739E5A0B6D86EBB8`

    `SOURCE_LOOKUP                  DECLARATION 3ED2FA822BD27B5B10F44226DCB93E0E`


    ##### Configuring PL/Scope


    The Oracle documentation states that PL/Scope is intended for application developers
    and is usually used in development. I would extend that. It should be used by
    anyone compiling PL/SQL and it should be used in any database you work in (development,
    test, and production). PL/Scope stores its data in the SYSAUX tablespace and uses
    very little space at all (so that should not be a concern). Running PL/Scope is
    also a compile time activity and not a runtime activity so there is no performance
    penalty (as there is with compiling with debug turned on). It may slightly increase
    compile time but not enough that I have been aware of it.


    PL/Scope is very easily configured. As mentioned, it is a compile time activity
    so it is enabled prior to compilation of a program unit. The compiler setting
    used is called PLSCOPE_SETTINGS. The user, or most likely the user''s IDE, will
    use an ALTER SESSION command to turn on PL/Scope. You can also set it globally
    by ALTER SYSTEM or per program unit with the ALTER COMPILE statement. I''ll show
    an example of each below.


    At this point, there is only an on (ALL) or off (NONE) switch, but in the future
    there may be some granularity allowed. The default in 11.2 and below is NONE.
    I would expect that in time ALL would be the default but that''s just my personal
    preference.


    To turn on PL/Scope collection at the session level, use this command:


    `ALTER SESSION SET PLSCOPE_SETTINGS = ''IDENTIFIERS:ALL'';`


    To turn off identifier collection, use this command:


    `ALTER SESSION SET PLSCOPE_SETTINGS = ''IDENTIFIERS:NONE'';`


    Turning it on and off at the system level is similar. I''m not going to go into
    the details of the ALTER SYSTEM command and how it stores the values, but an example
    might be the following:


    `ALTER SYSTEM SET PLSCOPE_SETTINGS = ''IDENTIFIERS:ALL'';`


    To compile an object with identifier collection, use the appropriate alter (PROCEDURE,
    PACKAGE, TRIIGER, FUNCTION, TYPE, etc.), like so:


    `ALTER PACKAGE batch_overlord COMPILE PLSCOPE_SETTINGS = ''IDENTIFIERS:ALL'';`


    Once you have compiled the program unit, you can use the view USER_PLSQL_OBJECT_SETTINGS
    to see the settings, like so:


    `SQL> SELECT type, plscope_settings`

    `           FROM user_plsql_object_settings`

    `          WHERE name = ''EMPLOYEE_API'';`


    `TYPE         PLSCOPE_SETTINGS`

    `------------ ---------------------------------------------------------------------`

    `PACKAGE      IDENTIFIERS:ALL`

    `PACKAGE BODY IDENTIFIERS:ALL`


    That''s all there is to it. Once it''s set up, you can start using it. Don''t
    forget to recompile your code with PL/Scope turned on.'
