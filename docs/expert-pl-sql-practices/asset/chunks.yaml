  trans: "\n# 注释\n\n在代码中插入注释有两种方式：以 `--` 开头的单行注释，或用 `/*` 和 `*/` 包裹的整段注释块。我决定使用 `--`\
    \ 语法。我认为它能很好地突显文本本身，因此你无需寻找注释的起始和结束位置。此外，它还具有一些技术优势：即使代码块中包含一些注释（以 `--` 开头），你仍然可以使用\
    \ `/*`... `*/` 来为调试目的而注释掉整块代码，而如果代码本身使用的是 `/*`... `*/` 语法，则无法做到这一点。它稍微繁琐一些，但可能非常方便。由你选择。有任何疑问吗？\n\
    \n以下是我如何在代码块中添加注释的示例：\n\n```\nl_book_author := NULL; -- 我确保此变量中没有旧值\n\nIF l_book_id\
    \ < 0 THEN\n  -- 除非书籍丢失，否则不应发生此情况。\n  -- 继续检查丢失书籍列表。\n  ...\nEND IF;\n```\n\n\
    ![images](img/square.jpg) **注意** 尽可能多地使用注释！今天对你显而易见的事情，明天对其他人（甚至对你自己）来说可能难以理解。\n\
    \n### 比较运算符\n\n使用 `<>` 而不是 `!=`。`<>` 语法可以避免在快速阅读时与 `=` 混淆。\n\n# 缩进\n\n如果说有什么编程话题能引起争议，那很可能是如何缩进代码的问题。所有语言的程序员几十年来一直就此争论不休。COBOL\
    \ 程序员可能最轻松。至少在他们的语言中，许多关键的缩进是由语言规范规定的。\n\n以下部分讨论了缩写 PL/SQL 代码的特定方面。总体目标是便于阅读代码并直观地识别逻辑块。我选择使用两个空格。有一点：避免使用制表符（tab），因为不同的软件开发环境和打印机会以不同的方式解释它们。\n\
    \n### 通用缩进\n\n使用两个空格表示一个代码块是另一个代码块的子块，如下所示：\n\n```\nBEGIN\n  l_author := 'Pierre\
    \ Boulle';\n  IF p_book_id = 123456 THEN\n    FOR l_counter IN 1..100 LOOP\n \
    \     ...\n    END LOOP;\n  END IF;\nEXCEPTION\n  WHEN NO_DATA_FOUND THEN\n  \
    \  -- 处理此错误\n    ...\nEND;\n```\n\n### Select 语句\n\n每个查询列占一行，每个变量占一行，语句的每个元素占一行。这种方法会占用一些空间，但便于阅读和理解整个语句。参见以下示例中对齐各种项目的有用方法：\n\
    \n```\nSELECT editor\n      ,publication_date\n  FROM books\nWHERE book_id = 12345\n\
    \   OR (book_title      = 'Planet of the Apes'\n       AND book_author = 'Pierre\
    \ Boulle'\n      );\n```\n\n![images](img/square.jpg) **注意** 此示例还展示了如何对齐括号以清楚地显示其起始和结束位置。也请注意等号（或者当编码变成绘画时！）的微妙对齐。\n\
    \n此示例展示了如何使用表别名：\n\n```\nSELECT b1.book_title\n      ,b1.book_id\n      ,b2.book_id\n\
    \  FROM books b1\n      ,books b2\n WHERE b1.book_title = b2.book_title\n   AND\
    \ b1.book_id <> b2.book_id;\n```\n\n### Insert 语句\n\n每个列占一行，每个值占一行。始终指明列名以避免歧义。此示例展示了如何对齐：\n\
    \n```\nINSERT INTO books (\n            book_id\n           ,title\n         \
    \  ,author\n           )\n    VALUES (\n            12345\n           ,'Planet\
    \ of the Apes'\n           ,'Pierre Boulle'\n           );\n```\n\n### Update\
    \ 和 Delete 语句\n\n它们看起来非常相似。每个列和值占一行，语句的每个元素占一行。\n\n```\nUPDATE books\n   SET publication_year\
    \ = 1963\nWHERE book_id = 12345;\n```\n\n```\nDELETE FROM books\n WHERE book_id\
    \ = 12345;\n```\n\n### If 语句\n\n每个元素占一行。为了更好地阅读，在 `END IF` 关键字后添加注释很有用，特别是当它与匹配的\
    \ `IF` 之间间隔了许多行时。以下是一系列 `IF` 块的示例：\n\n```\nIF l_var IS NULL THEN\n  ...\nELSE\n\
    \  IF l_var > 0 AND l_var < 100 THEN\n    ...\n\n  ELSE\n    ...\n  END IF; --\
    \ l_var 在 0 和 100 之间\nEND IF; -- l_var 为空\n```\n\n![images](img/square.jpg) **注意**\
    \ 在 `IF` 块中，确保你始终有一个 `ELSE` 部分，以避免未处理的情况，除非你确信根本无需做任何事情。那么，写一个简短的注释是件好事，只是为了记住\
    \ `ELSE` 并非被纯粹地遗忘。未显式处理的情况可能会使你的应用程序行为异常且难以调试。\n\n### Case 语句\n\n每个元素占一行，如下所示：\n\
    \n```\nCASE l_var\n  WHEN value_1 THEN\n    -- 解释\n    ...\n  WHEN value_2 THEN\n\
    \    -- 解释\n    ...\n  ELSE\n    -- 解释\n    ...\nEND CASE;\n```\n\n### 游标\n\n\
    使用小写命名游标，并使用后缀 *_cursor*。注意关键字在左侧的对齐方式，如前面的示例所示，这提高了语句的可读性。\n\n```\nCURSOR books_cursor\
    \ IS\n  SELECT book_id\n        ,title\n    FROM books\n   WHERE registration_date\
    \ >= TO_DATE('1971-01-01', 'YYYY-MM-DD')\n   ORDER BY title;\n```\n\n### For…loop\
    \ 语句\n\n使用 *l_* 前缀命名循环中使用的变量。当循环遍历游标时，使用游标的名称和后缀 *_rec*。这样在阅读代码时，更容易理解值的来源，如此示例所示：\n\
    \n```\nFOR l_book_rec IN books_cursor LOOP\n  FOR l_counter IN 1..100 LOOP\n \
    \   ...\n  END LOOP; -- 计数器\n  ...\nEND LOOP; -- 书籍列表\n```\n\n### 字符串拼接\n\n每个被拼接的元素占一行。这样更易于阅读和修改。由多个部分构建字符串如下所示：\n\
    \n```\nl_text := 'Today, we are '||TO_DATE(SYSDATE, 'YYYY-MM-DD')\n          \
    \                ||' and the time is '\n                          ||TO_DATE(SYSDATE,\
    \ 'HH24:MI')\n                          ;\n```\n"
- fmt: "### Dynamic Code\n\nDynamic SQL can be an open door to SQL or statement injection.\
    \ Using coding templates can help in forcing the use of bind variables, which\
    \ is one solution against such a threat. The following example shows how it can\
    \ be dangerous to execute a statement built by concatenating strings, one of them\
    \ given by an end user (as a parameter, for instance).\n\nImagine a module that\
    \ registers books reservations at a library. It may contain some dynamic code,\
    \ for instance because the table into which the data are inserted depends on the\
    \ type of book. It may look like this:\n\n```sql\nl_statement := 'BEGIN'\n   \
    \          ||'  INSERT INTO book_reservations ('\n             ||'           \
    \   res_date'\n             ||'             ,res_book_id'\n             ||'  \
    \            )'\n             ||'      VALUES ('\n             ||            \
    \   SYSDATE\n             ||'             ,'\n             ||               p_book_id\n\
    \             ||'             );'\n             ||'END;'\n             ;\nEXECUTE\
    \ IMMEDIATE l_statement;\n```\n\nThe user is simply asked to input the requested\
    \ book ID. In case of a gentle and standard user, the generated statement would\
    \ look like the following, with “123456” the given input:\n\n```sql\nBEGIN\n \
    \ INSERT INTO book_reservations (\n              res_date\n             ,res_book_id\n\
    \              )\n\n      VALUES (\n              SYSDATE\n             ,123456\n\
    \              );\nEND;\n```\n\nBut if the end user has bad intentions, he or\
    \ she can use the same input to inject malicious code. Giving the following input\
    \ “123456); delete from books where (1=1”, the generated statement is this one:\n\
    \n```sql\nBEGIN\n  INSERT INTO book_reservations (\n              res_date\n \
    \            ,res_book_id\n              )\n      VALUES (\n              SYSDATE\n\
    \             ,123456\n              );\n  DELETE FROM books where (1=1);\nEND;\n\
    ```\n\nThe operation to be executed would then be made of two statements: a harmless\
    \ one followed by a very nasty instruction emptying a table.\n\nThe following\
    \ is a rewrite of the code using a bind variable. The use of the bind variable\
    \ prevents any user-entered string from being interpreted as part of the statement\
    \ itself. The risk of SQL or statement injection is eliminated.\n\n```sql\nl_statement\
    \ := 'BEGIN'\n             ||'  INSERT INTO book_reservations ('\n           \
    \  ||'              res_date'\n             ||'             ,res_book_id'\n  \
    \           ||'              )'\n             ||'      VALUES (:p_date'\n    \
    \         ||'             ,:p_book_id'\n             ||'             );'\n   \
    \          ||'END;'\n             ;\nEXECUTE IMMEDIATE l_statement\n  USING IN\
    \ SYSDATE\n       ,IN p_requested_book_id\n       ;\n```\n\n### Packages\n\nAlthough\
    \ it is possible to compile standalone stored procedures and functions in a database,\
    \ it can quickly become a nightmare to search for one module in a large, flat\
    \ list. Instead, use packages to group procedures and functions by semantic field\
    \ or by usage. It is quicker to scan a correctly named package that is most probably\
    \ containing what you are looking for than it is to scan a list of all functions\
    \ and procedures in your whole schema.\n\nSeparate the `kernel` packages (the\
    \ ones directly dealing with the data) from the ones that are responsible for\
    \ `user interface`. More than helping their management and usage, this will allow\
    \ you to fine tune execution grants, such as having wide access on interface package,\
    \ more restricted access on kernel packages used as APIs, and no access at all\
    \ to the very core of your application.\n\nName your packages using upper case\
    \ (avoid double quotes around object names, making them case sensitive) and meaningful\
    \ names. Use prefixes to indicate the type of modules that a package contains.\
    \ For example, you might use the following prefixes:\n\n> `KNL_` for a package\
    \ containing kernel modules.\n> \n> `GUI_` for a package containing modules dealing\
    \ with user interface.\n\nYour package names might look as follows:\n\n> `PACKAGE\
    \ KNL_BOOKS;` for a package containing modules dealing with books.\n> \n> `PACKAGE\
    \ GUI_LIBRARY;` for a package containing modules dealing with a library's user\
    \ interface.\n\n### Stored Procedures\n\nStored procedures (standalone or in a\
    \ package) should be considered black boxes that perform a given task. The term\
    \ “black box” means that they are expected to cope with any kind of input (valid\
    \ or not), and then do their job or leave the database in the same state as when\
    \ they were called (for example, in case of error). Usually you want procedures\
    \ to report any problem encountered in doing the work.\n\nIt is better to dedicate\
    \ one procedure to one single task. This is the basis for good modularity in your\
    \ application. It is better to have several small modules that you can use and\
    \ reuse as elementary bricks than to have a few large and heavy modules that are\
    \ difficult to reuse.\n\nThe various kinds of tasks can be separated as follows:\
    \ retrieving records, checking information, inserting or modifying data, handled\
    \ by kernel or API packages, producing display for a user interface, handled by\
    \ interface packages.\n\nNext I'll show you a way of naming stored procedures\
    \ according to the kind of task they perform. This procedure naming policy, in\
    \ combination with the package separation naming policy, will ensure an easier\
    \ understanding of the source code. Moreover, it can also act as a guide for good\
    \ modularity.\n\n#### Naming\n\nUse upper case and meaningful names. Use a prefix\
    \ that indicates the type of the procedure (the $ sign is here as a cosmetic element\
    \ to visually make a difference with package names and to separate the type prefix\
    \ from the name). For example, the following are some prefix examples:\n\n> `CHK$`\
    \ for a procedure checking data.\n> \n> `GET$` for a procedure retrieving information\
    \ from the database or calculating something.\n> \n> `EXE$` for a procedure inserting,\
    \ modifying, or deleting data.\n> \n> `DSP$` for a procedure displaying information\
    \ in a user interface.\n\nAnd the following are some actual procedure names developed\
    \ using the preceding list of prefixes:\n\n> `PROCEDURE CHK$BOOK_AVAILABITLIY;`\
    \ for a procedure checking the availability of a book.\n> \n> `PROCEDURE GET$BOOK_AUTHOR;`\
    \ for a procedure retrieving the author of a book.\n> \n> `PROCEDURE EXE$STORE_BOOK;`\
    \ for a procedure storing data about a book.\n> \n> `PROCEDURE DSP$BOOK_INFO;`\
    \ for a procedure displaying information about a book in a user interface.\n\n\
    Also consider developing the habit of adding a comment repeating the name of the\
    \ procedure after the final `END` closing the declaration. Doing so eases the\
    \ task of reading packages containing a long list of modules, as you can see here:\n\
    \n```sql\nPROCEDURE CHK$TITLE_LENGTH (\n                      p_title        \
    \              IN          VARCHAR2\n                     ) IS\nBEGIN\n  ...\n\
    END; -- CHK$TITLE_LENGTH\n```"
