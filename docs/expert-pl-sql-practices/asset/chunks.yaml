    This time, the query completes in half the time and the logical I/O decreases
    again. This is because the RATES table lookup has been eliminated from the view
    projection at runtime. The execution plan and projection in [Listing 9-29](#Chapter09.html#list_9_29)
    clearly demonstrate this.


