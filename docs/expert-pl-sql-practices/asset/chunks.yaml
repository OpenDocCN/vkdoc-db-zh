  trans: '#### 资源利用率


    考量性能的另一种方式是测量软件在执行业务任务期间所使用的资源。常见的指标包括 CPU 利用率、内存使用情况和 I/O 延迟。典型的诊断通常只讨论这些指标的聚合形式——换句话说，与单个业务任务的执行分离开来。尽管这些指标对于整体描述系统健康状况很有用，但我发现它们作为性能问题诊断的起点并不那么有效。相反，我认为当它们与响应时间的测量紧密结合时，会实用得多。请看下面的例子。


    内森抱怨月末销售报告运行得实在太慢了。上个月它只用了 5 分钟就完成了。而这个月，他 15 分钟前启动了报告，到现在还没完成。系统监控显示 CPU 利用率高达
    95%。平均磁盘 I/O 延迟看起来很好，只有 4 毫秒，网络管理员告诉我们吞吐量远低于容量，为 9,000 tx/s。表 13-1 展示了此信息的摘要。


    ![images](img/t1301.jpg)


    马特抱怨月末工资单报告运行得实在太慢。上个月它只用了 5 分钟就完成了。在这 5 分钟里，20%的时间用在了 CPU 上，70%用在了磁盘 I/O 操作上，10%用在了网络调用上。而这个月，他
    15 分钟前启动了报告，到现在还没完成。响应时间指标显示，在这 15 分钟里，5%的时间用在了 CPU 上，25%用在了 I/O 操作上，70%用在了网络调用上。表
    13-2 展示了此信息的摘要。


    ![images](img/t1302.jpg)


    考虑到所提供的信息，我更愿意处理马特的情况。这两张表格在视觉上相似，但传达的信息却截然不同。当试图根据表 13-1 来诊断内森的问题时，我只能*猜测*CPU
    利用率是否是销售报告的问题所在，因为数据的聚合掩盖了我需要的细节。我当然知道整个系统的 CPU 使用率很高，但为了给销售报告解决问题，我需要知道该任务是否真的在等待
    CPU 资源才能完成。


    在马特的例子中，我获得了关于仅应用于其任务的资源利用率的宝贵信息。借助表 13-2，我可以*明确知道*该从哪里入手，并且充满信心地开始调查工资单报告如何以及为何在网络层消耗了时间。


    #### 性能是一项功能


    你应该将性能视为一项功能。它不是你工作的一个偶然结果；相反，它是你在设计和交付产品时有意为之的东西。卡伦·莫顿真正抓住了这个概念的重要性，她说：


    > 因此，首先也是最重要的，我认为管理性能就是将一个简单的原则融入你的思维模式：**我对自己编写或维护的代码的性能负责。**

    >

    > ——卡伦·莫顿，《Expert Oracle Practices》（Apress 2010）


    无论你遵循敏捷还是瀑布，极限编程还是快速应用开发，原型法还是螺旋模型，性能都应该在过程开始时、进行中以及过程“完成”后，都作为一个突出的功能特性。


    功能需求应当伴随着性能期望，在某些业务场景中，这些期望是作为服务水平协议（SLA）表达的正式需求。这些期望不能在软件交付后强行施加。这似乎是一个显而易见的陈述，但在实践中，现实世界中发生的恰恰是这种情况。卡伦·莫顿的引述描述了软件开发团队中每个角色、每个人所必需具备的基本思维模式。从一开始，性能就必须包含功能和时间这两个概念。


    当马特打电话抱怨工资单报告的性能时，他会打给谁？很可能是负责该应用的 DBA。而这个 DBA 可能从未参与过软件开发过程。软件应用文档会手把手地引导 DBA
    完成问题诊断吗？很可能不会。它应该吗？绝对应该！软件本身会提供足够的信息来指引 DBA 找到可能的原因吗？很可能不会。它应该吗？当然应该！为什么性能问题在生产环境实现中被视为缺陷，而在开发和测试过程中却不是呢？


    无论原因如何，最终解决问题的责任落在了 DBA 或性能分析师身上。他们解决问题的能力将取决于他们能收集到的关于该问题的信息质量。如果马特抱怨“整个系统都很慢”而没有指明具体问题，那么解决他的问题可能会令人痛苦。系统范围的、通常是抽样聚合的数据，可能无法揭示影响马特报告的问题。如果分析师仅依赖聚合数据，他们可能会花费无尽的时间和金钱去追逐错误的问题。他们可能会改进系统的某些部分，但在解决导致马特报告变慢的根本问题之前，他们并不算真正完成。


    这并不是说优秀的 DBA 和性能分析师没有一直在解决像马特这样的问题——他们当然会。他们会提出能引向问题解决的好问题，例如：


    *   系统变慢时，你具体在做什么？

    *   当我告诉你系统不再变慢之后，你会立即执行哪项业务任务，以测试我的判断？


    性能分析师使用各种工具来测量关键细节——在执行该业务任务期间，时间花在了哪里、消耗在了什么资源上。那么，你应该如何编写代码，才能真正帮助性能分析师——即编写出能提供超出功能需求之外的性能信息的代码？


    ### 什么是性能剖析？


    性能剖析是在代码步骤执行时记录其日志。在某些情况下，剖析不强调时间，而是更侧重于事件序列和迭代次数。在其他情况下，每个代码步骤都会记录一个耗时测量值。


    性能剖析对于许多软件开发人员来说是一项常见活动，甚至是日常实践。性能剖析是在开发过程中了解代码的好方法。第 7 章 描述了如何使用 Oracle 提供的包来剖析
    PL/SQL 代码。你可能从其他软件语言中认识这些剖析器：


    ```

    gcc –pg …; gprof …

    ```


    ```

    java –prof …; java ProfilerViewer …

    ```


    ```

    perl –d:Dprof …; dprofpp …

    ```


    这些工具都以不同的方式展示剖析结果。为了能更清晰地描述最适合性能的剖析结果，我将首先快速解释一个能帮助开发人员更清晰地理解时间流逝的工具：序列图。'
- fmt: '### 序列图


    作为统一建模语言的一部分，序列图主要用于按交互发生的顺序展示对象之间的交互。在软件架构中，这些对象通常定义为应用层，如数据库、Web服务器或浏览器。


    在软件开发中，这些对象有时定义为应用代码中的层级，高层过程调用连续的低层过程。在最底层，这些过程通常代表对基本系统资源的调用。


    当引入时间元素时，序列图对性能优化的价值最大。可视化地查看每个消耗响应时间的层级或层，且每个交互按所耗时间的比例缩放，可以使您专注于能获得最大性能提升的代码区域。


    图表对于高层次理解流程非常有效，但随着越来越多对象和交互被添加到图中，细节会如此拥挤以至于丢失了整体价值。当我迷失在细节中时，我发现最有帮助的方法是汇总或聚合数据以找到我需要的信息。


    ### 配置文件的魔力


    *配置文件*是序列图的表格化表示。它是对响应时间的分解，通常按组件响应时间贡献的降序列出。杂货店收据是类似的分解（虽然通常不按成本排序），在底部提供支付的总额，并列出所购每件商品的成本。表
    [13-3](#Chapter13.html#tab_13_3) 展示了一个任务消耗了60秒时间的配置文件，该任务被分解为其组成函数。


    ![images](images/t1303.jpg)


    配置文件可以被聚合，使得对同一函数的所有调用都报告在一行中。在表中添加一列显示每个函数被调用的次数有时很有帮助，特别是如果您想知道每次调用的平均响应时间。


    当您确切地看到慢任务将60秒花在了哪里时，魔力就发生了。您现在*知道*任务70%的响应时间被`r`函数调用消耗。同样有帮助的是，您知道任务*没有*在哪里花费时间。


    ### 性能分析的好处


    以这种方式分析代码有许多好处。真正的关键是这种独特格式的配置文件所提供的可见性。好处包括：


    *   您*知道*代码的时间花在哪里。没有准确的响应时间测量，您只能*猜测*。

    *   您只优化相关的代码路径。配置文件将您的注意力集中在响应时间的主要贡献者上。没有这些信息，您会陷入强迫性调优障碍（CTD），调优所有能调优的东西，并且永远不知道何时才足够。Gaja
    Krishna Vaidyanatha 在[第7章](#Chapter07.html#ch7)的《Oracle 洞见：橡木桌的故事》（Apress 2004）中定义并描述了CTD。

    *   您将学习集中在当前对您重要的话题上。如果您的响应时间完全由 `latch: cache buffers chains` 调用主导，那么今天是您的幸运日：您只需要研究
    Oracle 数据库中超过1000种可插桩调用类型中的一种。

    *   当您的目标达成时，您可以停止优化。通过配置文件，您知道业务任务每个组件可能的改进。您使用真实数据来证明您的断言，从而做出关于改进的经济决策。

    *   您可以定量地*预测*您的补救措施将产生的影响。然后，您可以使用与预测时相同的度量单位直接验证结果。配置文件因此既是优化工具，也是所获收益的证明。


    以这些方式使用配置文件只会让您成为更好的软件开发人员。为了完全负责代码的性能，您必须养成进行性能分析的习惯。


    ## 插桩


    作为一名音乐家和软件开发人员，“插桩”这个词对我来说当然也有多种含义。当我思考音乐时，插桩被定义为特定音乐作品或编曲中要使用不同乐器的数量和种类。作曲家规定所需不同乐器的数量以及每种乐器所需的最少演奏者数量，记为独立的声部。作品的指挥和演奏者根据期望的音乐效果和可用的正确数量的音乐家，最终决定有多少演奏者将表演每个声部。


    当我思考软件时，插桩具有不同的含义。如果配置文件是通过聚合顺序测量构建的，那么测量值从何而来？插桩是您代码中提供这些测量值的部分。就像音乐插桩一样，您的代码所提供的测量类型和数量会影响软件的整体性能。


    考虑通常引发插桩主题的情况。当出现问题，程序的性能无法接受时，神奇的问题就出现了：“为什么这个程序这么慢？”'
  raw: '#### Sequence Diagrams


    As part of the Unified Modeling Language (UML), sequence diagrams are used primarily
    to show the interactions between objects in the sequential order that those interactions
    occur. In software architecture, the objects are usually defined as application
    tiers like the database, web server, or browser.


    In software development, the objects are sometimes defined as layers in the application
    code, high level procedures calling successively lower level procedures. In the
    lowest layers, these procedures typically represent calls to basic system resources.


    A sequence diagram is most valuable for performance optimization when the element
    of time is introduced. Seeing a visual representation of each tier or layer where
    your response time is consumed, with each interaction scaled in proportion to
    the duration of time elapsed, allows you to focus your attention on the areas
    of code where the most performance gains can be achieved.


    Diagrams work wonderfully for high level understanding of processes, but as more
    and more objects and interactions are added to the diagram, the details crowd
    the picture so much that the overall value is lost. When I get lost in details,
    I find it most helpful to summarize or aggregate the data to find the information
    I need.


    #### The Magic of Profiles


    A *profile* is a tabular representation of a sequence diagram. It is a decomposition
    of response time, typically listed in descending order of component response time
    contribution. A receipt from the grocery store is a similar decomposition (although
    usually not ordered by cost), providing the total amount paid at the bottom and
    a list of the cost for each of the individual items purchased. [Table 13-3](#Chapter13.html#tab_13_3)
    shows a profile of a task that consumed 60 seconds of time, decomposed into the
    component functions of the task.


    ![images](images/t1303.jpg)


    A profile can be aggregated so that all calls to the same function are reported
    in one row. Adding a column in the table showing the number of times each function
    was called is sometimes helpful, especially of you would like to know the average
    response time for each call.


    The magic happens when you see exactly where your slow task spent the 60 seconds.
    You now *know* that 70% of your task''s response time is consumed by function
    `r` calls. Just as helpful, you know where your task is *not* spending time.


    #### Benefits of Profiling


    There are many benefits to profiling your code in this way. The real key is the
    visibility provided by the unique format of the profile. The benefits include
    the following:


    *   You *know* where your code is spending its time. Without accurate measurement
    of response time, you can only *guess*.

    *   You optimize only relevant code path. The profile focuses your attention on
    the top contributors to response time. Without that information, you succumb to
    Compulsive Tuning Disorder (CTD), tuning everything you can and never knowing
    when enough is enough. Gaja Krishna Vaidyanatha defines and describes CTD in [Chapter
    7](#Chapter07.html#ch7) of *Oracle Insights: Tales of the Oak Table* (Apress 2004).

    *   You focus your learning on the topics that matter to you right now. If your
    response time is completely dominated by `latch: cache buffers chains` calls,
    then today''s your lucky day: you''ll need to study only one of the more than
    1,000 types of calls that are instrumented within the Oracle Database.

    *   You can stop optimizing when your objective is achieved. With the profile,
    you know the possible improvement for each component of the business task. You
    make economic decisions about improvement with real data to prove your assertions.

    *   You can *predict* what impact your remedies will have, quantitatively. Then
    you can verify the results directly in the same units of measure as you predicted.
    Profiles act then as both the tool for optimization and the proof of benefits
    gained.


    Using profiles in these ways simply make you a better software developer. In order
    to take full responsibility for the performance of your code, you must make a
    habit of profiling.


    ### Instrumentation


    As a musician and a software developer, of course, the term instrumentation also
    has multiple meanings to me. When I''m thinking about music, instrumentation is
    defined as the number and types of different instruments to be used in a particular
    musical composition or arrangement. The composer specifies the number of different
    instruments required and a minimum number of players required for each instrument,
    notated as separate parts. The conductor and performers of the composition make
    the final decision on how many players will perform each part, guided by both
    desired musical effect and availability of the correct number of musicians.


    When I''m thinking about software, instrumentation takes on a different meaning.
    If a profile is built by aggregating sequential measurements, where do the measurements
    come from? Instrumentation is the part of your code that provides those measurements.
    Like musical instrumentation, the type and amount of measurements provided by
    your code contribute to the overall performance of your software.


    Consider the circumstance that typically leads to the topic of instrumentation.
    When something goes wrong and the performance of a program is not acceptable,
    the magic question arises: “Why is this program slow?”'
  trans: '

