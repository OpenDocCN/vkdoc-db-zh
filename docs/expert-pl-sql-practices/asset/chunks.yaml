- fmt: "### Explicit Cursors\n\nThe most common type of cursor used in any PL/SQL\
    \ program, hands down, is the explicit cursor. Everyone learns the explicit cursor\
    \ upon first learning the PL/SQL language, and most PL/SQL programmers feel instantly\
    \ drawn to it because they are under the impression that it gives them more programmatic\
    \ control over their processing. Programmers (at least the newly minted ones)\
    \ are all about control; their impression is often that if they do not have control\
    \ over every aspect of their program, then it will not execute correctly.\n\n\
    Explicit cursors are often referred to as `open`, `fetch`, `close` cursors due\
    \ to their required keywords: `OPEN`, `FETCH`, and `CLOSE`. If you write an explicit\
    \ cursor, you are required to explicitly open the cursor, fetch from the cursor,\
    \ and close the cursor. So far, that doesn’t sound too bad and may even give an\
    \ all-about-control programmer peace of mind. However, it is important to find\
    \ out not only in which cases such types of cursors may reasonably be used, but\
    \ also in which cases they may actually be doing more harm than good. Consider\
    \ the following explicit cursor example in [Listing 10-1](#Chapter10.html#list_10_1):\n\
    \n***Listing 10-1.** An Explicit Cursor Used to Fetch Just One Value*\n\n```sql\n\
    CREATE FUNCTION f_get_name (ip_emp_id in number ) RETURN VARCHAR2\nAS\nCURSOR\
    \ c IS SELECT ename FROM emp WHERE emp_id = f_get_name.ip_emp_id;\nlv_ename emp.ename%TYPE;\n\
    BEGIN\nOPEN c;\nFETCH c INTO lv_ename;\nCLOSE c;\nRETURN lv_ename;\nEND;\n```\n\
    \n![images](images/square.jpg) `Note` The naming conventions for parameter names\
    \ and variable names in this chapter are as follows: `ip_` for `input parameters`,\
    \ `op_` for `output parameters`, `lv_` for `local variables`, and `gv_` for `global\
    \ variables`. When input and output parameters are referenced in a function or\
    \ procedure, they are prepended with the function or procedure name in order to\
    \ avoid confusion and to illustrate scope. In the previous example, in [Listing\
    \ 10-1](#Chapter10.html#list_10_1), `ip_emp_id` is referenced as `f_get_name.ip_emp_id`.\n\
    \nAt first glance, this function probably looks like any typical example of a\
    \ `get` function (a function whose sole purpose is to obtain, or *get*, one row\
    \ or even one value). The business requirement is obviously to grab at least one\
    \ (and at most one) employee name, `ename`, from the `emp` table given an entered\
    \ employee ID, `emp_id`. The cursor is opened; the single value is fetched from\
    \ the open cursor and placed into the variable, `lv_ename`; the cursor is closed;\
    \ and finally the function returns the value stored in the `lv_ename` variable\
    \ to the calling program. So, why might this type of cursor be an inappropriate\
    \ choice for this type of business requirement? Because the function, `f_get_name`,\
    \ is a bug waiting to happen.\n\nWhat might end up in `lv_ename` after a fetch\
    \ that fetches nothing? You wouldn’t know whether you received a value or not.\
    \ Furthermore, what if the data is bad? What if there ends up being more than\
    \ one row returned for your entered `ip_emp_id` value? [Listing 10-2](#Chapter10.html#list_10_2)\
    \ illustrates a more correct version of this explicit cursor:\n\n***Listing 10-2.**\
    \ A More Correct Explicit Cursor Used to Fetch Just One Value (11.2.0.1)*\n\n\
    ```sql\nCREATE FUNCTION f_get_name (ip_emp_id IN NUMBER) RETURN VARCHAR2\nAS\n\
    CURSOR c IS SELECT ename FROM emp WHERE emp_id = f_get_name.ip_emp_id;\nlv_ename\
    \ emp.ename%TYPE;\nBEGIN\n   OPEN c;\n   FETCH c INTO lv_ename;\n      IF (SQL%NOTFOUND)\
    \ THEN\n         RAISE NO_DATA_FOUND;\n      ENDIF;\n   FETCH c INTO lv_ename;\n\
    \      IF (SQL%FOUND) THEN\n         RAISE TOO_MANY_ROWS;\n      ENDIF;\n   CLOSE\
    \ c;\n   RETURN lv_ename;\nEND;\n```\n\nAs you can see, however, this is becoming\
    \ really complex. This is why an explicit cursor is a bad choice when coding a\
    \ simple `get` function. It becomes quickly apparent that your simple function\
    \ is suddenly not so simple. The problem is two-fold:\n\n*   Many people do the\
    \ open/fetch/close and that’s it. That is a bug waiting to happen.\n*   If, on\
    \ the other hand, you code correctly, you are writing *much* more code than you\
    \ need to. MORE CODE = MORE BUGS. Just because you *can* get the right answer\
    \ to the previous business question using an explicit cursor doesn’t mean you\
    \ should. In the section “Implicit Cursors,” you will see an example of this same\
    \ business problem answered with the use of an implicit cursor.\n\n#### The Anatomy\
    \ of an Explicit Cursor\n\nKnowing how an explicit cursor goes about its work\
    \ can help you to decide whether it is appropriate for your business function.\
    \ It was noted earlier that explicit cursors have the syntax: `open, fetch, close`.\
    \ So, what does this mean? What is actually happening during each step? The following\
    \ outlines the process or programmatic function each step performs:\n\n1.  `OPEN`:\
    \ This step initializes the cursor and identifies the result set. Note that it\
    \ does not actually have to *assemble* the result set. It just sets the point\
    \ in time the result set will be “as of.”\n2.  `FETCH`: This step executes repeatedly\
    \ until all rows have been retrieved (unless you are using `BULK COLLECT` (described\
    \ later), which fetches all of the records at once).\n3.  `CLOSE`: This step releases\
    \ the cursor once the last row has been processed.\n\nAdditionally, as [Listing\
    \ 10-1](#Chapter10.html#list_10_1) illustrates, an explicit cursor must be *declared*\
    \ before it is fetched from. An explicit cursor must always be declared in the\
    \ declaration section of any procedure or function (or package, as it can be declared\
    \ globally in a package specification or body) before it is actually invoked.\
    \ However, what makes it *explicit* is that you have to explicitly open/fetch/close\
    \ from it. Note that you can declare a cursor and then use it implicitly. Declaring\
    \ a cursor is not what makes it explicit; it’s how you code your subsequent interaction\
    \ with it. In the “Implicit Cursors” section, you’ll see that when using implicit\
    \ cursors, this declaration step is not necessary. Implicit cursors *may be* declared,\
    \ but, unlike their explicit counterparts, they don’t *have to be*.\n\n![images](images/square.jpg)\
    \ `Note` `REF` cursors (discussed shortly) are not explicitly declared with the\
    \ actual `SELECT` statement. The `SELECT` statement does not come into play until\
    \ they are explicitly opened.\n\nThe details involved in working with a cursor\
    \ are a lot to keep track of, especially if you happen to have multiple cursors\
    \ open and in the process of fetching records. Given the amount of work an explicit\
    \ cursor goes through (as outlined previously in the three-step list), it is important\
    \ to only use an explicit cursor when absolutely necessary. So in which cases\
    \ might an explicit cursor be needed? The most obvious reason to use an explicit\
    \ cursor is when you have a requirement to process records in bulk."
  raw: '### Explicit Cursors


    The most common type of cursor used in any PL/SQL program, hands down, is the
    explicit cursor. Everyone learns the explicit cursor upon first learning the PL/SQL
    language, and most PL/SQL programmers feel instantly drawn to it because they
    are under the impression that it gives them more programmatic control over their
    processing. Programmers (at least the newly minted ones) are all about control;
    their impression is often that if they do not have control over every aspect of
    their program, then it will not execute correctly.


    Explicit cursors are often referred to as *open*, *fetch*, *close* cursors due
    to their required keywords: `OPEN`, `FETCH`, and `CLOSE`. If you write an explicit
    cursor, you are required to explicitly open the cursor, fetch from the cursor,
    and close the cursor. So far, that doesn’t sound too bad and may even give an
    all-about-control programmer peace of mind. However, it is important to find out
    not only in which cases such types of cursors may reasonably be used, but also
    in which cases they may actually be doing more harm than good. Consider the following
    explicit cursor example in [Listing 10-1](#Chapter10.html#list_10_1):


    ***Listing 10-1.** An Explicit Cursor Used to Fetch Just One Value*


    `CREATE FUNCTION f_get_name (ip_emp_id in number ) RETURN VARCHAR2`

    `AS`

    `CURSOR c IS SELECT ename FROM emp WHERE emp_id = f_get_name.ip_emp_id;`

    `lv_ename emp.ename%TYPE;`

    `BEGIN`

    `OPEN c;`

    `FETCH c INTO lv_ename;`

    `CLOSE c;`

    `RETURN lv_ename;`

    `END;`


    ![images](images/square.jpg) **Note** The naming conventions for parameter names
    and variable names in this chapter are as follows: `ip_` for *input parameters*,
    `op_` for *output parameters*, `lv_` for *local variables*, and `gv_` for *global
    variables*. When input and output parameters are referenced in a function or procedure,
    they are prepended with the function or procedure name in order to avoid confusion
    and to illustrate scope. In the previous example, in [Listing 10-1](#Chapter10.html#list_10_1),
    `ip_emp_id` is referenced as `f_get_name.ip_emp_id`.


    At first glance, this function probably looks like any typical example of a `get`
    function (a function whose sole purpose is to obtain, or *get*, one row or even
    one value). The business requirement is obviously to grab at least one (and at
    most one) employee name, `ename`, from the `emp` table given an entered employee
    ID, `emp_id`. The cursor is opened; the single value is fetched from the open
    cursor and placed into the variable, `lv_ename`; the cursor is closed; and finally
    the function returns the value stored in the `lv_ename` variable to the calling
    program. So, why might this type of cursor be an inappropriate choice for this
    type of business requirement? Because the function, `f_get_name`, is a bug waiting
    to happen.


    What might end up in `lv_ename` after a fetch that fetches nothing? You wouldn’t
    know whether you received a value or not. Furthermore, what if the data is bad?
    What if there ends up being more than one row returned for your entered `ip_emp_id`
    value? [Listing 10-2](#Chapter10.html#list_10_2) illustrates a more correct version
    of this explicit cursor:


    ***Listing 10-2.** A More Correct Explicit Cursor Used to Fetch Just One Value
    (11.2.0.1)*


    `CREATE FUNCTION f_get_name (ip_emp_id IN NUMBER) RETURN VARCHAR2`

    `AS`

    `CURSOR c IS SELECT ename FROM emp WHERE emp_id = f_get_name.ip_emp_id;`

    `lv_ename emp.ename%TYPE;`

    `BEGIN`

    `   OPEN c;`

    `   FETCH c INTO lv_ename;`

    `      IF (SQL%NOTFOUND) THEN`

    `         RAISE NO_DATA_FOUND;`

    `      ENDIF;`

    `   FETCH c INTO lv_ename;`

    `      IF (SQL%FOUND) THEN`

    `         RAISE TOO_MANY_ROWS;`

    `      ENDIF;`

    `   CLOSE c;`

    `   RETURN lv_ename;`

    `END;`


    As you can see, however, this is becoming really complex. This is why an explicit
    cursor is a bad choice when coding a simple `get` function. It becomes quickly
    apparent that your simple function is suddenly not so simple. The problem is two-fold:


    *   Many people do the open/fetch/close and that’s it. That is a bug waiting to
    happen.

    *   If, on the other hand, you code correctly, you are writing *much* more code
    than you need to. MORE CODE = MORE BUGS. Just because you *can* get the right
    answer to the previous business question using an explicit cursor doesn’t mean
    you should. In the section “Implicit Cursors,” you will see an example of this
    same business problem answered with the use of an implicit cursor.


    #### The Anatomy of an Explicit Cursor


    Knowing how an explicit cursor goes about its work can help you to decide whether
    it is appropriate for your business function. It was noted earlier that explicit
    cursors have the syntax: `open, fetch, close`. So, what does this mean? What is
    actually happening during each step? The following outlines the process or programmatic
    function each step performs:


    1.  `OPEN`: This step initializes the cursor and identifies the result set. Note
    that it does not actually have to *assemble* the result set. It just sets the
    point in time the result set will be “as of.”

    2.  `FETCH`: This step executes repeatedly until all rows have been retrieved
    (unless you are using `BULK COLLECT` (described later), which fetches all of the
    records at once).

    3.  `CLOSE`: This step releases the cursor once the last row has been processed.


    Additionally, as [Listing 10-1](#Chapter10.html#list_10_1) illustrates, an explicit
    cursor must be *declared* before it is fetched from. An explicit cursor must always
    be declared in the declaration section of any procedure or function (or package,
    as it can be declared globally in a package specification or body) before it is
    actually invoked. However, what makes it *explicit* is that you have to explicitly
    open/fetch/close from it. Note that you can declare a cursor and then use it implicitly.
    Declaring a cursor is not what makes it explicit; it’s how you code your subsequent
    interaction with it. In the “Implicit Cursors” section, you’ll see that when using
    implicit cursors, this declaration step is not necessary. Implicit cursors *may
    be* declared, but, unlike their explicit counterparts, they don’t *have to be*.


    ![images](images/square.jpg) **Note** REF cursors (discussed shortly) are not
    explicitly declared with the actual `SELECT` statement. The `SELECT` statement
    does not come into play until they are explicitly opened.


    The details involved in working with a cursor are a lot to keep track of, especially
    if you happen to have multiple cursors open and in the process of fetching records.
    Given the amount of work an explicit cursor goes through (as outlined previously
    in the three-step list), it is important to only use an explicit cursor when absolutely
    necessary. So in which cases might an explicit cursor be needed? The most obvious
    reason to use an explicit cursor is when you have a requirement to process records
    in bulk.'
  trans: "\n### 显式游标\n\n毫无疑问，在任何 PL/SQL 程序中，最常用的游标类型是**显式游标**。每个人在初次学习 PL/SQL 语言时都会学习显式游标，大多数\
    \ PL/SQL 程序员会立刻被其吸引，因为他们觉得显式游标能提供更多对处理过程的程序化控制。程序员（至少是新手）都热衷于控制；他们的印象往往是，如果不能控制程序的每个方面，程序就无法正确执行。\n\
    \n显式游标常被称为 `open`、`fetch`、`close` 游标，因为它们需要使用这些关键字：`OPEN`、`FETCH` 和 `CLOSE`。如果你编写一个显式游标，就必须显式地打开游标、从游标中提取数据并关闭游标。到目前为止，这听起来还不算太糟，甚至可能让追求控制的程序员感到安心。然而，重要的是不仅要弄清楚在哪些情况下合理使用这类游标，还要明确在哪些情况下它们可能弊大于利。请看下面清单\
    \ 10-1 中的显式游标示例：\n\n***清单 10-1.** 用于仅获取一个值的显式游标*\n\n```sql\nCREATE FUNCTION f_get_name\
    \ (ip_emp_id in number ) RETURN VARCHAR2\nAS\nCURSOR c IS SELECT ename FROM emp\
    \ WHERE emp_id = f_get_name.ip_emp_id;\nlv_ename emp.ename%TYPE;\nBEGIN\nOPEN\
    \ c;\nFETCH c INTO lv_ename;\nCLOSE c;\nRETURN lv_ename;\nEND;\n```\n\n![images](img/square.jpg)\
    \ `注意` 本章中参数名和变量名的命名约定如下：`ip_` 表示 `输入参数`，`op_` 表示 `输出参数`，`lv_` 表示 `局部变量`，`gv_`\
    \ 表示 `全局变量`。当在函数或过程中引用输入和输出参数时，会加上函数或过程名作为前缀，以避免混淆并说明作用域。在上面的示例中，即清单 10-1，`ip_emp_id`\
    \ 被引用为 `f_get_name.ip_emp_id`。\n\n乍一看，这个函数看起来就像任何典型的 `get` 函数（其唯一目的是获取一行甚至一个值）。业务需求显然是根据输入的员工\
    \ ID `emp_id`，从 `emp` 表中获取至少一个（至多一个）员工姓名 `ename`。游标被打开；从打开的游标中提取单个值并放入变量 `lv_ename`；游标被关闭；最后函数将存储在\
    \ `lv_ename` 变量中的值返回给调用程序。那么，为什么这种游标可能不适合这类业务需求呢？因为函数 `f_get_name` 是一个潜在的错误。\n\
    \n在提取操作中，如果未能提取到任何数据，`lv_ename` 中最终会是什么？你将无法知道是否收到了值。此外，如果数据有问题怎么办？如果对于你输入的 `ip_emp_id`\
    \ 值，最终返回了多行数据怎么办？清单 10-2 展示了这个显式游标的一个更正确的版本：\n\n***清单 10-2.** 用于仅获取一个值的更正确的显式游标\
    \ (11.2.0.1)*\n\n```sql\nCREATE FUNCTION f_get_name (ip_emp_id IN NUMBER) RETURN\
    \ VARCHAR2\nAS\nCURSOR c IS SELECT ename FROM emp WHERE emp_id = f_get_name.ip_emp_id;\n\
    lv_ename emp.ename%TYPE;\nBEGIN\n   OPEN c;\n   FETCH c INTO lv_ename;\n     \
    \ IF (SQL%NOTFOUND) THEN\n         RAISE NO_DATA_FOUND;\n      ENDIF;\n   FETCH\
    \ c INTO lv_ename;\n      IF (SQL%FOUND) THEN\n         RAISE TOO_MANY_ROWS;\n\
    \      ENDIF;\n   CLOSE c;\n   RETURN lv_ename;\nEND;\n```\n\n然而，正如你所看到的，这变得非常复杂。这就是为什么在编写简单的\
    \ `get` 函数时，显式游标是一个糟糕的选择。很快就显而易见，你原本简单的函数突然变得不那么简单了。问题有两个方面：\n\n*   许多人只做打开/提取/关闭操作就完事了。这是一个潜在的错误。\n\
    *   另一方面，如果你正确编码，你需要写的代码*远远*多于必要的代码。更多的代码 = 更多的错误。仅仅因为你可以使用显式游标对之前的业务问题得出正确答案，并不意味着你应该这样做。在“隐式游标”一节中，你将看到使用隐式游标解决相同业务问题的示例。\n\
    \n#### 显式游标的剖析\n\n了解显式游标的工作方式可以帮助你决定它是否适合你的业务功能。前面提到显式游标具有语法：`open`、`fetch`、`close`。那么，这是什么意思？每一步实际发生了什么？下面概述了每一步执行的进程或程序功能：\n\
    \n1.  `OPEN`：此步骤初始化游标并标识结果集。注意，它实际上不必*组装*结果集。它只是设置结果集将“依据”的时间点。\n2.  `FETCH`：此步骤重复执行，直到所有行都被检索出来（除非你使用\
    \ `BULK COLLECT`（稍后描述），它一次性提取所有记录）。\n3.  `CLOSE`：此步骤在最后一行处理完毕后释放游标。\n\n此外，如清单\
    \ 10-1 所示，显式游标必须在从中提取数据之前*声明*。显式游标必须始终在过程或函数（或包，因为它可以在包规范或包体中全局声明）的声明部分中声明，然后才能实际调用。然而，使其成为*显式*的是你必须显式地打开/提取/关闭它。请注意，你可以声明一个游标然后隐式地使用它。声明游标并不会使其成为显式游标；关键在于你如何编写后续与之交互的代码。在“隐式游标”部分，你会看到使用隐式游标时，这个声明步骤不是必需的。隐式游标*可以*被声明，但与显式游标不同，它们*不必*被声明。\n\
    \n![images](img/square.jpg) `注意` `REF` 游标（稍后讨论）不是用实际的 `SELECT` 语句显式声明的。`SELECT`\
    \ 语句只有在它们被显式打开时才会发挥作用。\n\n使用游标涉及的细节很多，尤其是如果你碰巧有多个游标打开并处于提取记录的过程中。考虑到显式游标所经过的工作量（如前面三步概述所示），只在绝对必要时使用显式游标非常重要。那么，在哪些情况下可能需要显式游标呢？使用显式游标最明显的原因是当有要求批量处理记录时。\n"
- fmt: "# Explicit Cursors and Bulk Processing\n\nIn instances where it is necessary\
    \ to process thousands (or millions) of records at a time, you cannot process\
    \ all records at once. Sure, you may *try*. But the performance slowdown would\
    \ be so tremendous that you wouldn’t want to. In instances where you must process\
    \ a very large dataset in smaller chunks, bulk processing is one of the best ways\
    \ to handle the requirement. Consider the following bulk processing example in\
    \ [Listing 10-3](#Chapter10.html#list_10_3).\n\n**Listing 10-3.** An Explicit\
    \ Cursor Used to Perform Bulk Processing\n\n```sql\nCREATE OR REPLACE PROCEDURE\
    \ refresh_store_feed AS\n   TYPE prod_array      IS TABLE OF store_products%ROWTYPE\
    \ INDEX BY BINARY_INTEGER;\n   l_prod               prod_array;\n   CURSOR c IS\n\
    \      SELECT  product\n        FROM  listed_products@some_remote_site;\n   BEGIN\n\
    \   OPEN C;\n   LOOP\n   FETCH C BULK COLLECT INTO l_prod LIMIT 100;\n   FOR i\
    \ IN 1 .. l_csi.COUNT\n   LOOP\n      /*    ... do some procedural code here that\
    \ cannot be done in SQL to l_csi(i) ... */\n   END LOOP;\n      FORALL i IN 1\
    \ .. l_csi.COUNT\n         INSERT INTO store_products (product) VALUES (l_prod(i));\n\
    \   EXIT WHEN c%NOTFOUND;\n   END LOOP;\n   CLOSE C;\n   END;\n   /\n```\n\nSince\
    \ bulk processing that involves piece-wise processing like that illustrated in\
    \ [Listing 10-3](#Chapter10.html#list_10_3) cannot be accomplished using an implicit\
    \ cursor, you must use an explicit cursor to complete the task. In the previous\
    \ example, you may ask “If the goal is simply to select from one table and insert\
    \ into another, why not simply use `INSERT AS SELECT` methodology?” It’s a reasonable\
    \ question, since using SQL before resorting to PL/SQL is usually the fastest\
    \ way to accomplish a task. But not in the case outlined in [Listing 10-3](#Chapter10.html#list_10_3).\
    \ If you must perform some type of intermediate processing on the data just after\
    \ you’ve selected it—but before you insert it—and you’d like to perform the task\
    \ in bulk, then you’ll need an explicit cursor. Furthermore, though you can use\
    \ an implicit cursor to array fetch (as of Oracle10g, an implicit cursor will\
    \ automatically perform an array fetch of 100 rows), and you can process them\
    \ (read them, then perform DML), you cannot perform DML in bulk. Only when using\
    \ `FORALL` functionality can you perform DML in bulk. And only when using an explicit\
    \ cursor can you use `FORALL` functionality.\n\nAnother example of when you would\
    \ need to use an explicit cursor is somewhat dynamic in nature. It may sound counterintuitive,\
    \ but when you do not know until runtime what the query will be, then you need\
    \ a special type of explicit cursor to help you determine what result set will\
    \ actually be processed. In this case, the type of explicit cursor you would use\
    \ is called a REF (for *reference*) cursor. If you need to return a resultset\
    \ to a client, this is one of the easiest ways to do it. A REF cursor offers you\
    \ flexibility that regular PL/SQL cursors cannot.\n\n# REF Cursors in Brief\n\n\
    Though there are two other sections in this chapter that cover REF cursors more\
    \ fully (“Static REF Cursors” and “Dynamic REF Cursors”), a brief overview regarding\
    \ these types of cursors warrants mention in this section due to their structure:\
    \ they must be explicitly opened, fetched from, and closed. If you are returning\
    \ a result set to a client, a great way to avoid lots of repetitive code is to\
    \ use a REF cursor. Essentially, the cursor you open usually depends on what input\
    \ you receive from the requesting client. [Listing 10-4](#Chapter10.html#list_10_4)\
    \ provides a brief example of a REF cursor scenario in PL/SQL:\n\n**Listing 10-4.**\
    \ REF Cursors Work Dynamically, But Are Declared\n\n```sql\nDECLARE\n   prod_cursor\
    \ sys_refcursor;\nBEGIN\nIF ( input_param = 'C' )\nTHEN\n      OPEN prod_cursor\
    \ FOR\n         SELECT * FROM prod_concepts\n          WHERE concept_type = 'COLLATERAL'\n\
    \            AND concept_dt   < TO_DATE( '01-JAN-2003', 'DD-MON-YYYY');\nELSE\n\
    \      OPEN prod_cursor FOR\n         SELECT * FROM prod_concepts\n          WHERE\
    \ concept_category = 'ADVERTISING';\nEND IF;\nLOOP\n       FETCH prod_cursor BULK\
    \ COLLECT INTO .... LIMIT 500;\n       ...procedural code to process results here...\n\
    \       EXIT WHEN prod_cursor%NOTFOUND;\nEND LOOP;\n   CLOSE prod_cursor;\nEND;\n\
    ```\n\n[Listing 10-4](#Chapter10.html#list_10_4) illustrates how REF cursors are\
    \ opened dynamically dependent on the input received from the client. In the example\
    \ displayed in [Listing 10-4](#Chapter10.html#list_10_4), if the input received\
    \ is ‘C,’ then one cursor is opened. However, if the input is not ‘C,’ an entirely\
    \ different cursor is opened. Only after the correct cursor is opened is it then\
    \ fetched from and closed. This works because the name of the cursor variable\
    \ does not change—only its contents do.\n\nIt is important to note that this REF\
    \ cursor is an example of a *static* REF cursor. It is called a static REF cursor\
    \ because it is associated with a query known at compile time, as opposed to a\
    \ *dynamic* REF cursor whose query is not known until runtime. The query associated\
    \ with a static REF cursor is *static* (never changing). When using REF cursors,\
    \ if it is possible to use a static REF cursor, you should do so. Dynamic code\
    \ of any kind breaks dependencies since you are waiting until runtime to discover\
    \ either\n\n*   the number or types of columns you will be working with, or\n\
    *   the number or types of bind variables you will be working with.\n\nIf you\
    \ *do* know both of these things before creating your REF cursor, then you should\
    \ defer to creating a static REF cursor. Static code is almost always better than\
    \ dynamic code since it is known to the RDBMS at compile time and, therefore,\
    \ the compiler can catch many errors for you. Dynamic code is not known to the\
    \ RDBMS until runtime and can therefore be unpredictable and prone to error.\n\
    \nREF cursors will be elaborated upon in subsequent sections. For now, it is enough\
    \ to know that a REF cursor is yet another reason to use explicit cursors. There\
    \ are only a handful of situations in which explicit cursors would actually be\
    \ a more useful programmatic choice than implicit cursors. When performing bulk\
    \ processing that cannot be performed using SQL or when returning a dataset to\
    \ a client, you need to use explicit cursors. In almost all other cases, you should\
    \ try to use SQL or implicit PL/SQL cursors before resorting to explicit cursors."
  raw: '#### Explicit Cursors and Bulk Processing


    In instances where it is necessary to process thousands (or millions) of records
    at a time, you cannot process all records at once. Sure, you may *try*. But the
    performance slowdown would be so tremendous that you wouldn’t want to. In instances
    where you must process a very large dataset in smaller chunks, bulk processing
    is one of the best ways to handle the requirement. Consider the following bulk
    processing example in [Listing 10-3](#Chapter10.html#list_10_3).


    ***Listing 10-3.** An Explicit Cursor Used to Perform Bulk Processing*


    `CREATE OR REPLACE PROCEDURE refresh_store_feed AS`

    `   TYPE prod_array     IS TABLE OF store_products%ROWTYPE INDEX BY BINARY_INTEGER;`

    `   l_prod              prod_array;`

    `   CURSOR c IS`

    `      SELECT  product`

    `        FROM  listed_products@some_remote_site;`

    `   BEGIN`

    `   OPEN C;`

    `   LOOP`

    `   FETCH C BULK COLLECT INTO l_prod LIMIT 100;`

    `   FOR i IN 1 .. l_csi.COUNT`

    `   LOOP`

    `      /*    ... do some procedural code here that cannot be done in SQL to l_csi(i)
    ... */`

    `   END LOOP;`

    `      FORALL i IN 1 .. l_csi.COUNT`

    `         INSERT INTO store_products (product) VALUES (l_prod(i));`

    `   EXIT WHEN c%NOTFOUND;`

    `   END LOOP;`

    `   CLOSE C;`

    `   END;`

    `   /`


    Since bulk processing that involves piece-wise processing like that illustrated
    in [Listing 10-3](#Chapter10.html#list_10_3) cannot be accomplished using an implicit
    cursor, you must use an explicit cursor to complete the task. In the previous
    example, you may ask “If the goal is simply to select from one table and insert
    into another, why not simply use *`INSERT AS SELECT`* methodology?” It’s a reasonable
    question, since using SQL before resorting to PL/SQL is usually the fastest way
    to accomplish a task. But not in the case outlined in [Listing 10-3](#Chapter10.html#list_10_3).
    If you must perform some type of intermediate processing on the data just after
    you’ve selected it—but before you insert it—and you’d like to perform the task
    in bulk, then you’ll need an explicit cursor. Furthermore, though you can use
    an implicit cursor to array fetch (as of Oracle10g, an implicit cursor will automatically
    perform an array fetch of 100 rows), and you can process them (read them, then
    perform DML), you cannot perform DML in bulk. Only when using FORALL functionality
    can you perform DML in bulk. And only when using an explicit cursor can you use
    FORALL functionality.


    Another example of when you would need to use an explicit cursor is somewhat dynamic
    in nature. It may sound counterintuitive, but when you do not know until runtime
    what the query will be, then you need a special type of explicit cursor to help
    you determine what result set will actually be processed. In this case, the type
    of explicit cursor you would use is called a REF (for *reference*) cursor. If
    you need to return a resultset to a client, this is one of the easiest ways to
    do it. A REF cursor offers you flexibility that regular PL/SQL cursors cannot.


    #### REF Cursors in Brief


    Though there are two other sections in this chapter that cover REF cursors more
    fully (“Static REF Cursors” and “Dynamic REF Cursors”), a brief overview regarding
    these types of cursors warrants mention in this section due to their structure:
    they must be explicitly opened, fetched from, and closed. If you are returning
    a result set to a client, a great way to avoid lots of repetitive code is to use
    a REF cursor. Essentially, the cursor you open usually depends on what input you
    receive from the requesting client. [Listing 10-4](#Chapter10.html#list_10_4)
    provides a brief example of a REF cursor scenario in PL/SQL:


    ***Listing 10-4.** REF Cursors Work Dynamically, But Are Declared*


    `DECLARE`

    `   prod_cursor sys_refcursor;`

    `BEGIN`

    `IF ( input_param = ''C'' )`

    `THEN`

    `      OPEN prod_cursor FOR`

    `         SELECT * FROM prod_concepts`

    `          WHERE concept_type = ''COLLATERAL''`

    `            AND concept_dt   < TO_DATE( ''01-JAN-2003'', ''DD-MON-YYYY'');`

    `ELSE`

    `      OPEN prod_cursor FOR`

    `         SELECT * FROM prod_concepts`

    `          WHERE concept_category = ''ADVERTISING'';`

    `END IF;`

    `LOOP`

    `       FETCH prod_cursor BULK COLLECT INTO .... LIMIT 500;`

    `       ...procedural code to process results here...`

    `       EXIT WHEN prod_cursor%NOTFOUND;`

    `END LOOP;`

    `   CLOSE prod_cursor;`

    `END;`


    [Listing 10-4](#Chapter10.html#list_10_4) illustrates how REF cursors are opened
    dynamically dependent on the input received from the client. In the example displayed
    in [Listing 10-4](#Chapter10.html#list_10_4), if the input received is ‘C,’ then
    one cursor is opened. However, if the input is not ‘C,’ an entirely different
    cursor is opened. Only after the correct cursor is opened is it then fetched from
    and closed. This works because the name of the cursor variable does not change—only
    its contents do.


    It is important to note that this REF cursor is an example of a *static* REF cursor.
    It is called a static REF cursor because it is associated with a query known at
    compile time, as opposed to a *dynamic* REF cursor whose query is not known until
    runtime. The query associated with a static REF cursor is *static* (never changing).
    When using REF cursors, if it is possible to use a static REF cursor, you should
    do so. Dynamic code of any kind breaks dependencies since you are waiting until
    runtime to discover either


    *   the number or types of columns you will be working with, or

    *   the number or types of bind variables you will be working with.


    If you *do* know both of these things before creating your REF cursor, then you
    should defer to creating a static REF cursor. Static code is almost always better
    than dynamic code since it is known to the RDBMS at compile time and, therefore,
    the compiler can catch many errors for you. Dynamic code is not known to the RDBMS
    until runtime and can therefore be unpredictable and prone to error.


    REF cursors will be elaborated upon in subsequent sections. For now, it is enough
    to know that a REF cursor is yet another reason to use explicit cursors. There
    are only a handful of situations in which explicit cursors would actually be a
    more useful programmatic choice than implicit cursors. When performing bulk processing
    that cannot be performed using SQL or when returning a dataset to a client, you
    need to use explicit cursors. In almost all other cases, you should try to use
    SQL or implicit PL/SQL cursors before resorting to explicit cursors.'
  trans: "\n# 显式游标与批量处理\n\n在需要一次处理成千上万（或数百万）条记录的情况下，你无法一次性处理所有记录。当然，你或许会*尝试*。但性能下降会非常严重，以至于你不想这么做。当必须将一个非常大的数据集分成较小的块进行处理时，批量处理是满足这一需求的最佳方法之一。请参考清单\
    \ 10-3 中的批量处理示例。\n\n**清单 10-3.** 使用显式游标执行批量处理\n\n```sql\nCREATE OR REPLACE PROCEDURE\
    \ refresh_store_feed AS\n   TYPE prod_array      IS TABLE OF store_products%ROWTYPE\
    \ INDEX BY BINARY_INTEGER;\n   l_prod               prod_array;\n   CURSOR c IS\n\
    \      SELECT  product\n        FROM  listed_products@some_remote_site;\n   BEGIN\n\
    \   OPEN C;\n   LOOP\n   FETCH C BULK COLLECT INTO l_prod LIMIT 100;\n   FOR i\
    \ IN 1 .. l_csi.COUNT\n   LOOP\n      /*    ... 在这里对 l_csi(i) 执行一些无法用 SQL 完成的过程性代码\
    \ ... */\n   END LOOP;\n      FORALL i IN 1 .. l_csi.COUNT\n         INSERT INTO\
    \ store_products (product) VALUES (l_prod(i));\n   EXIT WHEN c%NOTFOUND;\n   END\
    \ LOOP;\n   CLOSE C;\n   END;\n   /\n```\n\n由于像清单 10-3 所示的那种包含分段处理的批量处理无法使用隐式游标完成，因此你必须使用显式游标来完成任务。在上面的例子中，你可能会问：“如果目标仅仅是从一个表查询并插入到另一个表，为什么不直接使用\
    \ `INSERT AS SELECT` 方法？”这是一个合理的问题，因为在不得不使用 PL/SQL 之前先使用 SQL 通常是完成任务的最快方式。但在清单\
    \ 10-3 概述的情况下并非如此。如果你必须在数据被选出来后——但在插入之前——对其进行某种中间处理，并且你希望以批量方式执行该任务，那么你将需要一个显式游标。此外，虽然可以使用隐式游标进行数组提取（从\
    \ Oracle10g 开始，隐式游标会自动执行 100 行的数组提取），并且可以处理它们（读取，然后执行 DML），但你无法批量执行 DML。只有在使用\
    \ `FORALL` 功能时，才能批量执行 DML。而且只有在使用显式游标时，才能使用 `FORALL` 功能。\n\n另一个需要使用显式游标的情况本质上是有些动态的。这听起来可能违反直觉，但当你直到运行时才知道查询将是什么时，就需要一种特殊类型的显式游标来帮助你确定实际要处理的结果集。在这种情况下，你将使用的显式游标类型称为\
    \ REF（*reference* 的缩写）游标。如果你需要向客户端返回一个结果集，这是最简单的方法之一。REF 游标提供了常规 PL/SQL 游标无法提供的灵活性。\n\
    \n# REF 游标简述\n\n尽管本章还有另外两个更全面介绍 REF 游标的章节（“静态 REF 游标”和“动态 REF 游标”），但由于它们的结构——必须显式地打开、提取和关闭——值得在本节简要概述一下。如果你要向客户端返回一个结果集，使用\
    \ REF 游标是避免大量重复代码的好方法。本质上，你打开哪个游标通常取决于从请求客户端接收到的输入。清单 10-4 提供了一个 PL/SQL 中 REF\
    \ 游标场景的简要示例：\n\n**清单 10-4.** REF 游标动态工作，但需声明\n\n```sql\nDECLARE\n   prod_cursor\
    \ sys_refcursor;\nBEGIN\nIF ( input_param = 'C' )\nTHEN\n      OPEN prod_cursor\
    \ FOR\n         SELECT * FROM prod_concepts\n          WHERE concept_type = 'COLLATERAL'\n\
    \            AND concept_dt   < TO_DATE( '01-JAN-2003', 'DD-MON-YYYY');\nELSE\n\
    \      OPEN prod_cursor FOR\n         SELECT * FROM prod_concepts\n          WHERE\
    \ concept_category = 'ADVERTISING';\nEND IF;\nLOOP\n       FETCH prod_cursor BULK\
    \ COLLECT INTO .... LIMIT 500;\n       ...在这里处理结果的程序化代码...\n       EXIT WHEN prod_cursor%NOTFOUND;\n\
    END LOOP;\n   CLOSE prod_cursor;\nEND;\n```\n\n清单 10-4 说明了 REF 游标如何根据从客户端接收到的输入动态打开。在清单\
    \ 10-4 所示的示例中，如果接收到的输入是 ‘C’，则打开一个游标。但是，如果输入不是 ‘C’，则会打开一个完全不同的游标。只有在打开正确的游标后，才会从中提取数据并关闭它。这之所以可行，是因为游标变量的名称不会改变——改变的只是其内容。\n\
    \n需要注意的是，此 REF 游标是一个*静态* REF 游标的例子。它被称为静态 REF 游标，因为它与一个在编译时已知的查询相关联，这与*动态* REF\
    \ 游标相反，后者的查询直到运行时才知晓。与静态 REF 游标关联的查询是*静态*的（永不改变）。使用 REF 游标时，如果可能，应使用静态 REF 游标。任何类型的动态代码都会破坏依赖关系，因为你需要等到运行时才能发现\n\
    \n*   你将要处理的列的数量或类型，或者\n*   你将要处理的绑定变量的数量或类型。\n\n如果你在创建 REF 游标之前*确实*知道这两件事，那么你应该选择创建静态\
    \ REF 游标。静态代码几乎总是优于动态代码，因为它在编译时对 RDBMS 是已知的，因此编译器可以为你捕获许多错误。动态代码在运行时才被 RDBMS 所知，因此可能不可预测且容易出错。\n\
    \nREF 游标将在后续章节中详细阐述。目前，知道 REF 游标是使用显式游标的又一个理由就足够了。实际上，只有少数几种情况下显式游标会比隐式游标成为更有用的编程选择。当执行无法使用\
    \ SQL 完成的批量处理或向客户端返回数据集时，你需要使用显式游标。在几乎所有其他情况下，在不得不使用显式游标之前，你应该尝试使用 SQL 或隐式 PL/SQL\
    \ 游标。\n"
- fmt: "### Implicit Cursors\n\nImplicit cursors, unlike their explicit counterparts,\
    \ do not need to be declared before they are invoked, though they can be, if you\
    \ prefer (you’ll see an example of declaring an implicit cursor shortly). Additionally,\
    \ implicit cursors do not need to be opened from, fetched from, and closed from\
    \ explicitly. Instead of the `open, fetch, close` syntax, they use either the\
    \ `for … in` syntax or a simple `select ... into` syntax. An example of a typical\
    \ implicit cursor is shown in [Listing 10-5](#Chapter10.html#list_10_5).\n\n**Listing\
    \ 10-5.** An Implicit Cursor Used to Fetch Just One Value\n\n```sql\nCREATE FUNCTION\
    \ f_get_name (ip_emp_id IN NUMBER) RETURN VARCHAR2\nAS\nlv_ename emp.ename%TYPE;\n\
    BEGIN\n   SELECT ename INTO lv_ename FROM emp WHERE emp_id = f_get_name.ip_emp_id;\n\
    \   RETURN lv_ename;\nEND;\n```\n\nYou may recognize the business question being\
    \ asked here. It’s the same business question asked in [Listing 10-2](#Chapter10.html#list_10_2).\
    \ The main difference between the two is that, obviously, the solution in [Listing\
    \ 10-5](#Chapter10.html#list_10_5) employs the use of an implicit cursor. When\
    \ your goal is merely to fetch just one value, you should always defer to using\
    \ an implicit cursor first. Compare the simplicity of this code with the verbosity\
    \ and error-proneness of the explicit cursor example in [Listing 10-2](#Chapter10.html#list_10_2).\
    \ In this implicit cursor example, there are no checks for `SQL%FOUND` or `SQL%NOTFOUND`.\
    \ The code is very clear. There is one simple `select ... into` cursor. If just\
    \ one name is selected, then just one name is returned. An exception-handling\
    \ section could be written to handle the two cases where either no name exists\
    \ for an entered employee ID or more than one name exists due to bad data.\n\n\
    ![images](images/square.jpg) **Note** Notice that the examples thus far omit an\
    \ exception-handling section. This is intentional. If there is a bug in your code\
    \ and you don’t have an exception-handling section, Oracle will display the exact\
    \ line item within your PL/SQL code where the error occurred. With an exception-handling\
    \ section, the error line displayed is where your exception-handling section begins.\
    \ This may be useful if you are providing instructions delivered up the stack\
    \ to the user for the user to do something differently when interacting with your\
    \ program. However, if the error message is for you and other programmers, then\
    \ noting the exact line item on which your error occurred is essential for you\
    \ to be able to debug quickly and effectively.\n\nWhen there is at most one answer\
    \ to the question you are asking, a `for … in` cursor is not necessary at all.\
    \ In that case, use a simple SQL `SELECT` statement to retrieve an answer that\
    \ could potentially have either zero records or one record to process. [Listing\
    \ 10-5](#Chapter10.html#list_10_5) assumes that the business question asked will\
    \ never return more than one record. If that is the case, the simple SQL `select\
    \ … into` statement is the best programmatic choice for implementing the solution.\
    \ If more than one record exists, your program would return an error. That is\
    \ a good thing. You want to know if the data is bad. Similarly, your program would\
    \ return an error if no record exists. Your program is expecting one and only\
    \ one answer—any other result is an error and your program would fail immediately.\
    \ Using the explicit cursor would typically not have the second fetch (described\
    \ in [Listing 10-2](#Chapter10.html#list_10_2)) to test whether there are more\
    \ rows and that would be a bug. The `select … into` version is “bug free.”\n\n\
    #### The Anatomy of an Implicit Cursor\n\nAs mentioned previously, an implicit\
    \ cursor can take one of two forms. It can be implemented using either a FOR LOOP\
    \ or, more specifically, using the form `for ... in`, or it can be implemented\
    \ using simple SQL `select … into` syntax. An implicit cursor does not require\
    \ that you open it explicitly. When using the `for … in` form to implement an\
    \ implicit cursor, keep the following in mind:\n\n*   Once your implicit cursor\
    \ enters its for loop structure, the cursor is initialized and the result set\
    \ is identified.\n*   The `IN` step is very similar to the `FETCH` step outlined\
    \ in the “The Anatomy of an Explicit Cursor” section, with one key difference.\
    \ When using an explicit cursor, if you want to ensure that there are no more\
    \ rows to process, you need to add syntax similar to the following (an example\
    \ of this is illustrated in Listings 10-3 and 10-4):\n    ```sql\n    EXIT WHEN\
    \ cursor%NOTFOUND;\n    ```\n    Such extra syntax is not a requirement of implicit\
    \ cursors. They do not need to check whether the cursor has more data to process\
    \ to know when to exit.\n*   Similarly, the `CLOSE` syntax is not required of\
    \ an implicit cursor as it will exit automatically once the `FOR` loop has terminated.\n\
    \nThe `select … into` cursor behaves differently from the way the `for … in` cursor\
    \ behaves. [Listing 10-6](#Chapter10.html#list_10_6) illustrates the difference\
    \ between the two implementations.\n\nCompare each of the `BEGIN … END` anonymous\
    \ blocks with the `DECLARE … BEGIN … END` anonymous blocks that immediately follow.\n\
    \n**Listing 10-6.** A Select … Into Cursor vs. a For … In Cursor\n\n```sql\nBEGIN\n\
    \   FOR x IN (SELECT * FROM dual) LOOP ... END LOOP;\nEND;\n```\n\n```sql\nDECLARE\n\
    \   CURSOR c IS SELECT * FROM dual;\nBEGIN\n   OPEN c;\n   LOOP\n      FETCH c\
    \ INTO …\n      EXIT WHEN c%NOTFOUND;\n       …\n   END LOOP;\n   CLOSE c;\nEND;\n\
    ```\n\n```sql\nBEGIN\n   SELECT *INTO ...FROM dual;\nEND;\n```\n\n```sql\nDECLARE\n\
    \   CURSOR c IS SELECT * FROM dual;\n   l_rec dual%ROWTYPE;\nBEGIN\n   OPEN c;\n\
    \   FETCH c INTO l_rec;\n      IF (SQL%NOTFOUND)\n      THEN\n         RAISE NO_DATA_FOUND;\n\
    \      END IF;\n   FETCH c INTO l_rec;\n      IF (SQL%FOUND)\n      THEN\n   \
    \      RAISE TOO_MANY_ROWS;\n      END IF;\n   CLOSE c;\nEND;\n```\n\nConceptually,\
    \ `select … into` is like the two procedural blocks shown in the listing. However,\
    \ an implicit cursor’s `for … in` processing performs an array fetch (as of Oracle10g),\
    \ and is really, therefore, more like a bulk fetch and collect, making it much\
    \ more efficient than its explicit cursor counterpart.\n\nThe `select … into`\
    \ cursor uses different keywords and should be implemented when you expect zero\
    \ records to, at most, one record. The `for … in` cursor should be implemented\
    \ when you expect to be processing more than one record. Once you `SELECT … INTO`\
    \ some PL/SQL variable, the cursor is initialized with the `SELECT` keyword, it\
    \ *fetches* `INTO` the PL/SQL variable implicitly, then *closes* automatically\
    \ because it has no more data to retrieve."
  raw: "### Implicit Cursors\n\nImplicit cursors, unlike their explicit counterparts,\
    \ do not need to be declared before they are invoked, though they can be, if you\
    \ prefer (you’ll see an example of declaring an implicit cursor shortly). Additionally,\
    \ implicit cursors do not need to be opened from, fetched from, and closed from\
    \ explicitly. Instead of the `open, fetch, close` syntax, they use either the\
    \ `for … in` syntax or a simple `select ... into` syntax. An example of a typical\
    \ implicit cursor is shown in [Listing 10-5](#Chapter10.html#list_10_5).\n\n***Listing\
    \ 10-5.** An Implicit Cursor Used to Fetch Just One Value*\n\n`CREATE FUNCTION\
    \ f_get_name (ip_emp_id IN NUMBER) RETURN VARCHAR2`\n`AS`\n`lv_ename emp.ename%TYPE;`\n\
    `BEGIN`\n`   SELECT ename INTO lv_ename FROM emp WHERE emp_id = f_get_name.ip_emp_id;`\n\
    `   RETURN lv_ename;`\n`END;`\n\nYou may recognize the business question being\
    \ asked here. It’s the same business question asked in [Listing 10-2](#Chapter10.html#list_10_2).\
    \ The main difference between the two is that, obviously, the solution in [Listing\
    \ 10-5](#Chapter10.html#list_10_5) employs the use of an implicit cursor. When\
    \ your goal is merely to fetch just one value, you should always defer to using\
